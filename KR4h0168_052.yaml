front:
  text: 全唐文欽定全唐文卷五十二德宗三
  hash: sha256:27717e3fd28c6f2ad0c3805f482adc4f741c8b7918dea05539d832c18c699a49
body:
  text: 南正北正司天地之職羲氏和氏統日月之官蓋所以幽贊神明發揮歷象經百王而不易涉千古而無疑慎竈疊跡於前甘石比肩於後莫不仰稽次舍俯察禨祥克窮盈縮之端備極陰陽之際朕臨御區宇多歷歲年眷彼清臺罕聞其妙豈人不逮昔將求之未盡雖天道難知固以不言示教而時君取戒寧可遐棄厥司宜令諸州及諸司訪解占天文及歷算等人務取有景行審密者並以禮發遣速送所司勿容隱漏常參官比來請假東都拜掃多廢曠職事任遣子弟以申情禮夫至道無名強假名而崇道至真無諡必求諡以明真惟其可稱實在全德故南嶽元陽宮道士張太空混元育粹元之又元煉骨三清存神八景衡峯養德時近百年依罔象以冥搜挾鴻濛而沖用棲遲浩氣太古真形頃在先皇敷崇道妙望乎元鶴之駕錫以紫霓之裳我有輔臣格言高躅永懷仙子恨不同時聊申嘉尚之情式降昭旌之命策名表德庶永無窮可贈元和先生中書門下常參官曾為牧守理行有聞者具名聞奏與諸薦守宰論政事知所任者具名封進應被舉官等令御史臺及吏部檢校勘資次勿令踰越然後臨試處分仍永為常式興至化者務積於人故欲薄斂長國家者以義為利故使以時朕撫臨區夏宵旰忘勞苟可以助化濟人常思大小皆益近以中夏甫寧頗勤經費遂收諸道停減將士糧料用叶權宜言念疲氓重茲供億其貞元四年已徵到及在路者即依前送其在百姓腹內者並放免五年已後每年合收一百萬八十八貫石亦宜放免委本道觀察使各具當管州所放聞奏並曉示百姓四序嘉辰歷代增置漢崇上巳晉紀重陽或說禳除雖因舊俗與衆共樂咸合當時朕以春方發生及仲月勾萌畢達天地和同俾其昭蘇宜助暢茂自今宜以二月一日為中和節以代正月晦日備三令節數內外官司休假一日釋道二教福利羣生館宇經行必資嚴潔自今州府寺觀不得宿客居住屋宇破壞各隨事修葺懷舊念功仁之大也興滅繼絶義之宏也昔蔡叔圯族周公封其子於東土韓信干紀漢后爵其孥以弓高侯君集之不率景化我太宗存其嗣以主祀詳考先王之道洎乎烈祖之訓皆以刑佐德俾人嚮方則斧鉞之誅甲兵之伐蓋不得巳而用也曩歲盜臣竊發國步多虞朕狩於近郊指期薄伐將振昆陽之旅以興涿鹿之功徵師未達於諸侯衛士且疲於七萃而李懷光三軍夙駕千里勤王上假雷霆之威下逐虎狼之衆議功方始守節靡終潛構禍胎拒違朝命棄同即異捨順效逆為臣至此在法必誅猶示綏懷庶其牽復而梟音益厲豨突莫遷大戮所加曾無噍類雖自貽伊戚與衆棄之而言念爾勞何嗟及矣以其前效猶在孤魂無歸懷之恍然是用悽軫豫欲布陳大惠冀以化成保合太和期於刑措宜以懷光外孫燕入八賜姓李氏名承緒授左衛率府胄曹參軍承懷光之後仍賜錢一千貫任於懷光墓側置立莊園侍養懷光妻王氏并備四時享奠之禮嗚呼朕實不德臨於兆人泣辜宥罪素誠所志爾其保姓受氏宣力承家勉紹乃考之建國庸無若爾父之違王命明經舉人所習爾雅多是草木鳥獸之名無益理道宜令習老子道德經以代爾雅其進士同大經例帖昔我烈祖乘乾坤之滌蕩掃隋季之荒屯體元御極作人父母則有熊羆之士不二心之臣左右經綸參翊締構昭文德恢武功威不庭康不乂用端命於上帝俾懷柔於四方宇宙既清日月既正王業既成泰階既平乃圖厥容列於斯閣懋昭績效表式儀形一以無忘於夕朝一以永垂於來裔君臣之義厚莫重焉貞元巳巳歲秋九月我行西宮瞻宏閣崇構見老臣遺像雍然肅然和敬在色想雲龍之叶應感致業之艱難覩彼思今取類非遠且功與時並才為代生苟蘊其材遇其時尊主庇人何代不有在中宗則桓彥範等著匡戴之績在元宗則劉幽求等申翼奉之勳在肅宗代宗則郭子儀等掃殄氛祲今則李晟等保寧朕躬咸盡力肆勤光復宗祏繼之前烈夫豈多謝闕而未録孰謂旌賢況念功紀德文祖所為也在豫曷其敢怠有司宜敘年代先後各圖其像列於舊臣之次仍令皇太子書朕是命紀於壁焉庶永播嘉庸昭示天下俾後之來者尚揖清顏知元勳之不朽法令者國之典章藩嶽者朕之屏翰封域既列疆里有經必守信誠用永終始干紀難虧於常憲念功宜貸於新恩酌於厥中是有茲命義武節度易定觀察等使檢校司空平章事張孝忠受委旌鉞作鎮方夏頃興士旅擅入邊城朝命既臨不遠而復有過能改此誠可嘉是畀左揆之授俾參論道之職懋昭來效勿替舊勳可檢校尚書左僕射同平章事如故於戲君人執信臣人執忠忠信允叶邦家乃乂朕奉祖宗之法期於慎守託王公之上務以存誠畫野分圻皆有定制踰憲章則彼此交惡保封疆則蒸庶獲安偃甲息人所存者大咨爾方嶽宏宣永圖各守爾典欽承王度勳賢列辟宜體至懷本置兩館學士皆選勳賢胄子蓋欲令其講藝紹習家風固非開此幸門墮紊典教且令式之內具有條章考試之時理須精核比聞此色幸冒頗深或假市門資或變易昭穆殊虧教化之本但長澆漓之風未補者務取闕員巳補者自然登第用廕既巳乖實試藝又皆假人誘進之方豈當如此自今巳後所司宜據式文考試定其升黜如有假代並準法處分崔位素行無良巳有容貸忝職州佐殊不知非尚蓄姦謀罪當極法且委王叔雍決重杖一頓處死頃來賜衣文彩不常非制也朕今思之宜有定制節度使宜以鶻銜綬帶取武毅以靖封內觀察使宜以鴈銜威儀取其行列有序牧人有威儀也百姓困窮弊繇奸吏政苟不擾人皆自安其司農寺供宮內及諸廚冬藏菜並委本寺自供其菜價仍委京兆尹約每年時價支付更不得配京兆府和市其諸陵守當夫宜委京兆府以價直送陵司令自雇召並不得差配百姓應寒食雜差配及樹柴修橋柴木選場等便於戶稅錢內剋折不得更令和市天下諸州府應納義倉及諸色斛斗二合耗外切宜禁斷仍委度支鹽鐵分巡院及出使郎官切加訪察郭晞男鋼在法叛亡巳上道者斬父母妻子皆有連坐朕以先尚父翼戴肆勤安固邦國不忍以子忘其先勞今並原之俾復其位其諸不坐皆釋放惠下恤人先王之政典視年制用有國之常規故有出公粟以賑困窮弛歲征以寬物力乃者諸道水災臨遣宣撫省覽條奏載懷憫惻其州縣遭水漂損乏絶戶宜共賜三十萬石度支即與本道節度觀察使計度各隨所近支給委本使擇清幹官送米給州縣卿之表弟早悟大乘遠自西方來遊上國宣六根之奧義演雙樹之微言念以精誠所宜欽重是令翻譯俾用流行卿夙慕忠勤職司禁衛省覽表疏具見乃懷所謝知朕端拱虛懷精求至理弼違獻可允屬台臣卿道著直方識通今古思振淹滯以敘彞倫罄竭謀猷裁成議列志在裨贊實沃豫衷克彰奉職之誠深得大臣之體再三省閲良多嘉重焉槍甲之屬不蓄私家令式有聞宜當遵守如聞京城士庶之家所藏器械宜令京兆府宣示俾納官司他如律令前祠部員外郎于公異頃以才名升於省闥其少也為父母之所不容宜其引慝在躬孝行不匱匿名跡於候安否於門閭俾其親之過不彰庶其誠之至必感此閔子騫王休徵所以著名於前古也而公異安於棄斥遊學遠方忘其溫清之勤竟至存亡之隔為人子者忍至是乎宜放歸田里俾自循省其舉公異官尚書左丞盧邁宜奪俸兩月屬者春秋令節朝野多歡乃與公侯庶寮俾同宴賞今西河吳楚連被水災悼於厥心實未寧息尚軫憂念豈遑偷樂其九日宴會宜罷王者欽若天道惠綏下人修己以導其和平推心以恤乎災患康時濟理何莫由斯朕以薄德託於人上勵精庶政思致雍熙而誠不動天政或多闕陰氣作沴暴雨薦臻自江淮而及於荊襄歷陳宋而施於河朔其閒郡邑連有水災城郭多傷公私為害損壞廬舍浸敗田苗或親戚漂淪或資産沈溺為之父母所不忍聞興言疾疚良深愧憫夙夜祗畏悼於厥心是用寢不獲安食而忘味特加賑恤庶洽幽明宜令中書舍人奚陟往江陵府及襄郢復隨鄂申光蔡等州左庶子姚齊梧往陳許宋亳潁徐泗濠等州祕書少監雷咸往恆冀德棣深趙等州京兆少尹韋武往揚楚廬壽滁潤蘇常湖等州宣撫應諸州百姓因水漂蕩家業湮損田苗交至乏絶不能自存者委宣撫使賑給沈溺死者各加賜物仍並以所在官中兩稅錢物地稅充給其溺死人所在官為斂收埋葬用申惻隱以慰幽魂其田苗所損委宣撫使與觀察使刺史約所損多少速具聞奏於戲一夫不獲一物失所刑罰不中賦斂不均皆可以失陰陽之和致水旱之沴其州縣應有繫囚及獄訟久未決者委所在長吏即與踈理務從寬俾伸冤滯貪官暴吏倚法害公特加懲肅用明典憲災傷之後切在撫綏咨爾方鎮之臣洎於守宰咸宜悉乃心力設法救人以恤凶災以補傷敗庶令安集式副憂勤宣布朕懷使各知悉設險守國易象垂文有備無患先王令典況修復舊制安固封疆按甲息兵必在於此鹽州地當衝要遠介朔陲東達銀夏西接靈武密邇延慶保捍王畿乃者城池失守制備無據千里亭障烽燧不接三隅要害役戍其勤若非興集師徒繕修壁壘設攻守之具務耕戰之方則封內多虞諸華屢警由中及外皆靡寧居深惟永圖豈忘終食顧以薄德至化未孚既不能復前古之封致四夷之守與其臨事而重擾豈若先備而即安是用宏久遠之謀修五原之壘使邊城有守中夏克寧不有暫勞孰能永逸宜令左右神策軍及朔方河中絳邠寧慶兵馬副元帥渾瑊朔方靈鹽豐夏綏銀節度都統杜希全邠寧節度使張獻甫左神策行營節度使邢君牙夏綏銀節度使韓潭鄜坊丹延節度使王栖曜振武麟勝節度使范希朝各於所部擇馬步將士合三萬五千人同赴鹽州左神策將軍兼御史中丞張昌宜充右神策軍鹽州行營節度使權知鹽州刺史兼御史大夫杜彥光可鹽州刺史兼御史大夫應所板築及緣修城雜役等宜共取六千人充其餘將士皆列布營陳戒嚴設備明加斥以警不虞其修城板築功役將士各賜絹布有差其鹽州防秋將士三年滿與代更加給賜仍委杜彥光具名聞奏悉與改轉其防遏將士等畢事便令放歸仍賜布帛有差其諸軍吏士都賜帛七千匹朕情非為己志在靖人咨爾將相之臣忠良之士輸誠奉國陳力忘勞克茂功勳永安疆埸必集兵事實惟衆心各相率勵以副朕意王者設教勸學攸先生徒肄業執禮為本故孔子曰不學禮無以立又曰安上治人莫善於禮然則禮者蓋務學之本立身之端居安之大猷致治之要道屬辭比事而不裁之以禮則亂疏通知遠而不節之以禮則誣實百行之本源為五經之戶牖雖聖人設教罔不會通而學者遵行宜有先後自頃有司定議計功記習不量教化淺深義理難易遂使修傳學者例從冬集習禮經者獨授散官敦本勸人頗乖指要姑務宏獎以廣儒風自今以後明經習禮記及第者亦宜冬集如中經兼習周易若儀禮者量減一選應諸色人中習三禮者前資及出身人依科目例白身人依貢舉例每經問大義三十條試策三道仍令主司於朝官學官中選精通經術三五人聞奏主司與同試問質定通否義策全通為上等轉加超獎大義每經通十五條巳上策通兩道巳上為次等依資與官如先是員外試官者聽依正員例其習開元禮人問大義一百條試策三道全通者為上等大義通八十條巳上策兩道巳上為次等餘一切並準習三禮例處分其諸館學士願習三禮及開元禮者並聽仍永為常式前利州刺史狄博濟惟乃曾祖梁文惠公啓佑天后定紹復之策幽贊中興宜錫祚裔垂於無窮矧博濟郡人懷之理有異等可衛尉少卿皇帝遣宮闈令第五守進致誠旨於故太尉兼中書令西平郡王贈太師之靈曰天祚我邦是生才傑稟陰陽之粹氣實山嶽之降靈宏濟患難保佑王室掃蕩氛祲廓清上京忠誠感於人神功業施於社稷匡時定亂實賴元勳洎領上台克諧中外訏謨帝道叶贊皇猷常竭嘉言以匡不逮情所親重義無閒然方期與國同休永為邦翰比嬰疾恙雖歷旬時日冀痊除重期相見弼豫在位終致和平豈圖藥餌無徵奄至薨逝喪我賢哲虧我股肱天不憖遺痛惜何極嗚呼大厦方構旋失棟梁巨川未濟遂亡舟楫君臣之義追慟益深循省遺章倍增感切卿一門裔緒朕必終始保持況願等弟兄承卿教訓朕之志意豈忘平生卿縱不言朕亦存信比者卿在之日却未見朕深心今卿與朕長乖方冀知朕誠志無以為念發言涕零是用躬述數行貴寫所懷得盡臨紙遣使不能飾詞魂而有知當體朕意冬薦官其令諸司尚書左右丞本司侍郎引於都堂訪以理術兼試時務狀考其通否及歷任考第事跡定為二等並舉主名姓録奏仍令御史一人監試如授官有課效尤著及犯贓不任者仍委御史臺及觀察使聞奏以殿最舉使君臣之際義莫重焉每聞薨殂深用惻悼宜厚哀榮之禮以申終始之恩文武朝臣有薨卒者自今以後其月俸料宜合給仍更準本官一月俸料以為賻贈若諸司三品以上官及尚書省四品官仍令有司舉舊令聞奏弔祭之禮務從優厚用稱朕懷元誼李文通等皆有勳庸久於戎旅頃者事因疑誤城守經時自致危懼比獻章表請率師人願赴京西用申誠效亦遣使宣慰待之如初俟至闕庭期於任使而行李之際士衆攜離雖非本圖情亦可恕且處之東夏鎮在西郊皆我王事誠為一體況田緒任兼將相寄重方州委之撫綏必能加輯言念將士素著勤勞既有申明各宜安堵仍委田緒切加存恤以副朕懷先聖忌辰才經敘慰戚里之內固在肅恭而乃遽從宴遊飲酒作樂既乖禮法須有所懲前汾州長史郭煦宜於袁州安置前南鄭縣尉郭暄於柳州安置曹自慶配流永州其駙馬郭曖王士平仍令並歸私第干紀挾邪罪在無捨立忠效節賞不踰時善惡之理明懲勸之義著李萬榮男乃包藏奸險違背君親悖慢朝章扇動軍旅縱其豺狼之性徇其梟獍之心迫脅使臣妄有希覬厭蠱其父謀害其兄名教之所不容臣子之所同棄而又恣為不道虐及無辜伊婁說張伾劉叔向並是忠良橫遭殺戮萬榮臥疾不能制止永言及此深用軫懷李乃稔惡貫盈宜正刑典其伊婁說等三人委中書門下即與追贈仍令與一子八品正員官應在汴州將士等志堅金石節厲冰霜叶奉邦家咸懷憤激不受熒惑問罪奸凶執縛軍中傳獻闕下勳庸特茂遐邇所知宜獎忠勞各加優賞並與進秩仍令董晉三日內具名銜聞奏仍共賜錢三十萬貫委董晉逐便取鹽鐵轉運使錢物分給宣武軍節度都虞兼御史大夫鄧惟恭都押衙兼御史大夫杜皓大將王應鳳曹元侃楊燕奇劉惟清陳文朝陳沛張庭芬薛文翰趙藏用李庭光宇文淡李國信並竭忠效誠績用昭著惟恭可檢校左散騎常侍依前兼御史大夫賜實封百二十戶一子七品正員官並賜物四百段杜皓英幹並可右散騎常侍依前兼御史大夫應鳳巳下各加官賜貫庭芬同節度副使十將等二百六十五人並優與改官在城將士被李乃脅從邀逼制使者事不由己朕所深知並一切不問宋州刺史兼御史大夫劉逸準亳州刺史兼御史大夫食封五十戶許孝常潁州刺史兼御史大夫高五立等咸竭維城之節各懷奉國之心並可檢校右散騎常侍各賜實封一百戶其本官並如故仍各賜物二百五十段其三州將士等別賜錢十萬貫亦並委董晉準前逐便收取鹽鐵轉運使錢物分給仍委董晉速具名聞奏當與甄録
