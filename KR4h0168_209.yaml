front:
  text: 全唐文欽定全唐文卷二百九子昂字伯玉梓州射洪人文明初舉進士詣闕上書武后奇其才擢麟臺正字再轉右拾遺聖歷初以父老解官歸侍縣令段簡覬其富因事繫獄憂憤卒年四十三
  hash: sha256:7cd9eb2b74dc08d40d7ee04e679f5260bce6394db93c7fa79f6ee4f62709a984
  markers:
  - {type: head, offset: 12, content: 陳子昂(一), id: KR4h0168_NFKB_209-h1, level: 1}
body:
  text: 甲子歲天子在洛陽時余始解褐與祕書省正字太子司直宗秦客置酒於金谷亭大集賓客酒酣共賦座上食物命余為塵尾賦焉天之浩浩兮物亦云云性命變化兮如絲之棼或以神好正直天蓋默默或以道惡強梁天亦茫茫此仙都之靈獸固何負而罹殃始居幽山之藪食乎豐草之鄉不害物以利巳不營利以同方何忘情以委代而任性之不忘卒罹網以見逼愛庖丁而惟傷豈不以斯尾之有用而殺身於此堂為君雕俎之羞厠君金盤之實承主人之嘉慶對象筵與寶瑟雖信美於茲辰詎同歡於疇昔客有感之而歎曰命不可忍神亦難測吉凶悔吝未始有極借如天道之用莫神於龍受戮為醢不知其凶王者之瑞莫聖於麟遇害於野不知其仁神既不能自智聖亦不能自知况林棲而谷走及山鹿與野麋古人有言天地之心其間無巧冥之則順動之則夭諒物情之不異又何有於猜矯故曰天之神明與物推移不為事先動而輒隨是以至人無巳聖人不知子欲全身而遠害曾是浩然而順斯臣聞大人升階神物紹至必有非人力所能存者上招飛鳥下動泉魚古之元皇祗承上帝所以協人祉匹天休卓哉神明昭格上下莫不以之矣是故物有可則而道有可宗謂之文獻其原上也緬哉有唐欽崇天命三祖繼統品物咸章元歷改元黃瑞告神皇出地軸陟天階歷軒轅登太昊集乎初始之極以授我皇符鳥之肇開辟元台女希氏姓神功大哉莫不盛於茲日矣乃察璿璣稽寶命發元讖升紫圖則天粲然皇文炳也非夫升光之曜魄寶之精其孰能威神皇赫赫若斯者哉是時三階底平百揆時序天下昌矣元功溥矣西土耆老欣然來稱曰至哉天子恤我元元勤勞下都升聞上帝臣聞天無二日土無二王皇帝嗣武以主匕鬯豈不宜乎神皇窅然乃登崑崙之臺修三統觀五始探命歷之紀則知元氣之所造也方採鍾龍象鳴鳳協林黃之律以因生賜姓九月戊申朔八日乙卯神都耆老遐荒夷貊緇衣黃冠等萬有二千餘人雲趍詣闕請曰臣等聞王者受命必有錫氏軒轅皇帝二十五子班為十二姓高陽氏才子二八命為十六族書云祇台德先不拒朕行然則聖人起則命歷昌必有錫氏之規臣等伏惟陛下受天之符為人聖母皇帝仁孝肅恭神明可以纂武承家以克永代陛下崇錫類垂憲章不易日月天人交際斯亦萬代之一時臣等固陋不達大道敢冒死上聞神皇穆然方御珍圖謙而未許也越翌日丙辰文武百寮又與耆老夷貊道俗等五萬餘人守闕固請曰蓋臣聞聖人則天以王順人以昌今天命陛下以主人以陛下為母天之丕律元命也人之大猷定姓也陛下不應天不順人獨高謙讓之道無所憲法臣等何所仰則敬冒昧萬死固請是時闕一字踵昆吾有鳳鳥從南方來歷端門㣥鳥數千蔽之又有赤雀數百從東方來㣥飛映雲回翔紫闥或止庭樹有黃雀從之者又有慶雲休光半天傾都畢見㣥臣咸覩於是衆氓雲萃囂聲雷動慶天應之如響驚象物其猶神咸曰大哉非至德孰能覩此昔唐虞之瑞逖聽矣今則見也天物來聖人革時哉况鳳者陽鳥赤雀火精黃雀從之者土也土則火之子子隨母所以纂母姓天意如彼人誠如此陛下曷可辭之昔金天鳳凰鎬京黃鳥赤氏朱鴈有吳丹烏皆紀之金册藏之瑞府以有事也陛下若遂辭之是推天而絶人將何以訓於是皇霈然曰俞哉此亦天授也乃命有司正皇典恢帝綱建大周之統歷革舊唐之遺號在宥天下咸與惟新賜皇帝姓曰武氏命為嗣皇崇乎紹天統物其赫胥大庭之上事巳乃獻頌曰天命神鳳降祚我周彩容有穆其儀孔休惟我有周實保天德上帝臨命纂承皇極人曰天祐有皇女希造天立極緬然猷徽赫我皇帝乃先厥微匪天之命鳳鳥誰歸因生錫氏革號循機豈不順乎天而應乎人帝曰俞哉臣子昂言臣聞昔周道昌而頌聲作遂能昭配天地光烈祖宗垂之無窮永為代典伏惟神聖皇帝陛下闡元極升紫圖光有唐基以啓周室不改舊物天下惟新皇王以來未嘗覩也臣聞仲尼曰聖人邱不得而見之矣又曰舜禹之有天下邱不豫也又曰鳳鳥不至河不出圖邱巳矣夫皆傷不得見大道之行而鬱悒也臣草野愚陋生長休明親逢聖人又覩昌運舜禹之政河洛之圖悉皆目見幸亦多矣今者鳳鳥來赤雀至慶雲見休氣升大周受命之珍符也不稽元命探祕文採風謠揮象物紀天人之會以協頌聲則臣下之過也有國彞典其可闕乎臣不揣朴固輒獻神鳳頌四章以言大周受命之事誠未足以潤色鴻業揄揚盛美亦小臣區區丹慊之至謹輒詣洛城南門奉進塵冒旒冕伏表慚惶臣妾某言今月日伏承軒宮載誕皇嗣克昌品物咸歡天人交慶臣妾聞聖人多子祝美於堯年螽羽宜孫稱道乎周頌自非璿圖配永寶祚靈長何以茂對天休光紹大業伏惟皇太后陛下星虹授祉月夢延禎餘慶集於天孫榮光流於帝子玉衣方泰瑤渚增輝其竊寵中姻承恩外戚塗山之慶既裕於夏臺高禖之祠未陪於殷薦竊以潢汙之品可享王庭元秬之微有芳天獻豈圖美於豐侈信有厚於由衷敢用擬議蘋蘩精誠菽藿洗心而薦竊希瑤席之珍潔意而羞以陪金鼎之實謹獻食若干輿冒黷珍膳沾汙象筵追用慚惶伏表悚灼臣某言臣以今月日奉敕於武成殿喚臣入問骨篤祿等賊請降事臣以愚瞽得踐赤墀對揚天休具奏其狀天恩特賜臣溫顏又降問云洛陽宮室皆隋朝營制歲月久遠方有隳頽樓閣內殿凋落者衆補一壞百無可施功唯此武成確然端立土木丹綵光色如新不知何故得自如此卿之博識應知其説臣當時造次略奏其梗概退而再省未涉萬分臣恭惟聖言緬求神像研幾太極幽贊元符上以稽驗神謀旁以合契冥數信有至道允在於茲臣聞聖人有言曰清明在躬志氣如神嗜欲將至有開必先天降時雨山川出雲此蓋言神應必有其物陛下至尊至神為天下主宰御㣥品威統百靈宸居尊嚴品物昭泰自天而祐於是用寧抑臣又聞物之有靈如人之有神神之和暢則支體便利用人繁昌則物必豐茂所以見其俗知興廢之數覩其氣識盛衰之由服物猶然况其大者今陛下應天受命括地登樞先飛名於祕籙終據圖於寶座今則當千載之運得三統之元帝氣氤氳祚基於元命皇圖幽藹象顯於天成夫以德之休明尚榮草木化之昭慶且變煙雲况皇皇真君龍居其極武成合慶土木增榮獨超衆殿夫何足怪臣聞敬其事者必載其文美其業者必頌其德臣所恨才非墨妙思乏筆精不能贊揚休祚歌詠聖德臣請以此事付之史臣千代知神萬載知述伏願天恩特垂降許臣某言臣糞土殘魂合竄荒裔特蒙陛下施再生之德赦萬死之誅起骨九泉同列編戶臣誠萬死無以上答况恩全賤命生在帝鄉伏見陛下至德配天化及草木天不愛寶洛出瑞圖地不藏珍河開祕籙陛下恭承天命因順子來建立明堂式尊顯號成之匪日功若有神萬國咸歡百靈同慶元正肇祚品物惟新陛下郊祭旻天總受㣥瑞神靈慶戴萬福攸宜斯實曠古莫聞於今始見喙飛蠕動莫不歡心臣以糞土窮骸不合輒同朝賀以古來大禮莫盛於今昔登封泰山七十四主明堂布政無三數君誠以陛下道冠古今恩溢天地昆蟲草木猶或相歡况臣久蒙驅策今日又拔死為生溝壑殘骸而得再造遂得恭聞大禮側聽鴻名臣伏惟宇宙之中含氣之類蒙恩負德獨臣最甚向非陛下慈造曲被鴻私臣巳灰滅遐荒肝塗邊壤豈得尚存骸骨恭聞聖慶臣所以匍匐冒死不避誅戮冀申螻蟻之情以同燕雀之慶然臣自惟罪纍不可比人在於禮經尤宜自絶所以屏營糞土不敢先聞今既萬國禮終百神慶畢昆蟲鳥獸亦並歡寧故臣螻蟻之誠始敢冒死上賀臣伏知冒禮違法罪合誅夷臣生見明時豫聞嘉慶臣今即殞滅實萬死為榮不勝歡踴戴賀之誠臣等言臣聞天視自我人視天聽自我人聽故堯臣放命降震怒之災姬聖尊仁受昭事之福先王所以恭畏上下祇奉天人於是有昭德塞違懲惡勸善所以明枉直正典刑一昨伏奉恩敕宣示司農卿宗晉卿所奏日者王德壽等承使失旨虐濫無辜災感蝗蟲毒痡慈竹寧歲為之飢饉氓庶以之流離寃魄冥呻元感上惻乃降明制發德音恤淫刑蠲虐典於是幽魂雪憤遺噍昭蘇枯竹由其再生蝗蟲為之韜眚一作隕迹牂蠻動色瘴癘收氛當夭札之凶年致升平之稔歲非夫聖靈昭感天人合符何吉凶之徵報同影響天下幸甚臣等聞聖人法天所以順物小人違道則必亂常故虞稱欽明嚴四凶之罪魯有仁義正兩觀之誅所以邦家用昌苛慝不作王某等色厲內荏心僻行堅弄措一作指刑之文為商夷之法以訟受服同惡自尤竟招殛竄之辜允肅政刑之序今日蒼鷹斂翼乳虎含牙朝廷無腹誹之憂天下有刑措之頌信可以懲殘創酷誘善旌寃永清侮弄之階共登仁壽之域臣等謬贊臺閣忝守藩維實思仰奉大猷以穆中典幸屬至聖崇德小人勿用凡在庶品實百恆歡雖成康頌聲文景默化刑清政肅曾何足云伏乞書之國經頒示天下使四方風動萬國歸仁垂範後昆以為炯戒無任慶抃之至臣某言今月日得遼東都督高仇須等月日破逆賊契丹孫萬斬等一十一陳露布並捉得生口一百人送至軍前事三軍慶快不勝踴躍臣聞天之所棄雖暴必亡人之共讐在遠彌戮况凶羯遺醜未及犬羊固作孽以招誅自辜恩而取滅伏惟陛下威加四海子育百蠻鬼神尚不敢違凶狡豈能逃罪逆賊萬斬等天奪其魄生自為殃仇須等謹奉廟謀遠憑國計短兵才接㣥逆銷亡返風回煙薰睛掩目此乃天威潛運神道密周豈止人謀抑由靈助今盡滅殃病孽固折服飢災兼至凋弊日滋未加天兵應自糜爛臣訓勵士馬今日剋行大軍一臨凶寇必殄獻俘在即拜闕有期預喜承恩思勝慶賀無任抃快之至臣某言今月日臣等令中道前軍總管王孝傑進軍平州十九日行次漁陽界晝有白鼠入營孝傑捕得籠送者身如白雪目似黃金頓首跧伏帖若無氣將士同見皆謂賊降之徵臣聞鼠者坎精孽胡之象穿竊為盜凶賊之徒固合穴處野居宵行晝伏今白日歸命素質伏辜天亡之徵兆實先露自孝傑發後再有賊中信來不謀同詞皆云盡滅病死親離衆潰匪朝即夕臣訓兵勵勇取亂侮亡昔宋剋鮮卑蒼鵝入幕今聖威遠振白鼠投營休兆同符實如靈契凡在將士孰不歡欣執馘獻俘期在不遠臣某言伏見某月日御製秋景務餘聊觀競渡故陳先作式佇來篇凡六韻天文爰降品彙咸亨金簡潛開瑞圖斯見臣聞白雲興詠漢遊汾水之祠黃竹申歌周舞瑤池之駕然而志崇遠轍事或勞人故文思之化未光太清之道猶闕伏惟聖母神皇陛下太虹齊聖感月含神元德茂於皇階文明照於天下用能提玉斗挹璿衡百神景從三靈協贊青雲出洛爰開受命之符赤甲榮河終御興王之寶非窮神之至德者其孰能與於是哉既而黃屋務間紫機時暇洞庭張樂思接軫於軒遊媯水披圖想同驂於堯輦然而遠而勞物者未若近而安人動而勤巳者豈比靜而泰神於是從金蹕鳴玉鸞清禁林御池殿肅波神一作臣而戒事命舟子為水嬉彩鷁蓮歌乍起江吳一作吳江之引青龍桂楫時搖甌越一作時謳越女之風鳥逝虬驚沸珠潭而競逐雲飛電集橫玉浦而流光信可以娛樂惟靈發揮文物皇歡允洽白日俄光於是奏薰風於管絃詠叢雲於林竹彳缶亍示帝歌爰作天藻攸彰黼帳帷宮縟文房之繡綵祥雲瑞景霏翰苑之榮光信探道一作賾於元包得斯文於紫極太平允矣元首康哉方欲朝明堂之宮輯㣥后之瑞尊崇顯號光啓聖圖封玉嵩邱以接千年之統泥金少室攸增萬歲之規卓哉煌煌聖君之表也微臣曲學蓬戶竊位蘭臺未聞驄馬之謠非有雕龍之思鞠躬霜署謬覩於天章逖聽鈞臺側聞於帝樂天文尊貴一作賁不遠於下臣帝寶珍崇曲宣於近貴竊以君唱臣和固不隔於尊卑宮變商從方允諧於金石輒用齋心扣寂假翰求詞將以攀日月之末光繼螢爝之微照不勝云云臣謬藉葭莩叨榮圭組元戎出塞違鳳扆而逾年班師入朝拜鸞闈而有日策勛飲至頻承湛露之恩獻壽奉觴未申行潦之薦所以白茅微藉願享於鈞臺黃汚菲誠思奉於瑤水謹輒獻食一百輿伏知金雞瑞鼎盈上帝之珍羞玉女行廚盡㣥仙之品味以茲菲薄有類蘋蘩多慚在藻之歡竊有獻芹之志所願皇慈俯納丹慊獲申天子萬年永慶南山之壽微臣百拜長承北極之恩無任誠懇之至右金吾衛大將軍兼檢校洛州長史河內郡王臣懿宗加爵一等勳五轉司賓卿兼羽林大將軍建安郡王攸宜加爵一等勳七轉臣某等言伏奉月日制書録臣等在軍微功特加前件勳封嘉命聿至寵渥載優伏對慚魂殞首顛越云云臣聞古者名將先士卒而後身故其功勸末世庸將窮人力以寵巳故其政乖然則簞醪投河三軍告醉刓印在手萬夫以離夫與衆共功專巳獨利成敗之理興亡繼焉賞者國之大事故不可忽日者林胡搆孽敢亂燕陲陛下徵義兵誅不道天下士庶焱集星馳皆忘身憂國紓禍郤難至於躬先矢石血塗草莽冒艱險歷寒溫氣騰青雲精貫白日誠亦勤矣雖聖靈威武逆虜自滅然士卒戮力亦盡其勞今大功未酬衆議猶在而臣等駑怯猥加先封臣等不能折衝虜廷還師袵席今坐加茅土之賜以先將士之勤使鶡冠虎臣將何以勸今戰士留滯於外府軍吏咨嗟於下寮臣等胡顏敢冒天造夫賞一勸百猶恐未孚利一沮萬其弊誰救爵命不可以招謗國章不可以假人伏願天光俯回昭發軍禮請以臣等前件勛封回受戰人及立功將士等上以明國之大賞下以雪臣等謬功使人悅忘勞士感知死然後兵可訓勵賊可誅屠此誠國之元經不可苟而利者臣等不勝區區臣某言臣以專蒙叨幸近侍陛下不以臣不肖特敕臣攝侍御史監護燕然西軍臣自違闕庭歷涉秋夏徒居邊徼無尺寸之功臣誠暗劣孤負聖明然臣久在邊隅夙夜勤灼莫不以蕃事為念俾按察之比以突厥離亂事迹參驗委曲窮問往來竊有以得其真莫不自為鯨鯢遞相吞食流離殘餓莫知所歸臣誠愚不識事機然竊以往古之變考驗於今乃知天亡凶醜之時陛下收功之日然臣聞之難得易失者時也易遇難見者機也聖人所貴者去禍於未萌今陛下體上聖之資開太平之化胸奴為中國之患自上代所苦久矣合天降其災以授陛下萬代之業在于今時臣請以秦漢以來事迹證明之伏願陛下少留聖聽尋繹省察天下幸甚臣聞始皇之時併吞六國制有天下按劒叱吒八荒奔馳然胸奴強梁威不能服牧馬河內以侵邊疆始皇赫然使蒙恬將四十萬衆北築長城因以逐胡取其河南之地七百餘里當時燕齊海岱贏糧給費徭役煩苦人以不堪故長城未畢而閭左之戌巳為其患二世而亡莫不始於事胡也至漢興高祖受命率㣥雄乘利便以三十萬衆窘迫白登七日被圍僅而獲免自是歷呂太后至孝文帝單于桀驁益凌漢家文帝徒以遜詞致獻金帛但求其善和而巳不敢有圖賈誼所以哭之痛文帝以天下之盛而卑事戎狄以倒懸天下也至景帝時邊受其患於是漢武踐祚以承六代鴻業屬乎文景元默之化海內乂安太倉之粟紅腐而不可食內庫之錢貫朽而不可校財力雄富士馬精強忿胸奴之驕慢將報先帝之辱遂使王恢韓安國將三十萬衆以馬邑誘單于師出徒費竟無毫髮之功於是大命六師專以伐胡為務首尾三十餘年中國騷然大受其弊至於國用不足軍興不給租及六畜算及船車盜賊㣥興京師起亂竟不能制單于之命一日而臣服之漢宗衰殘幾至覆社稷也故漢武晚年厭兵革之弊乃下哀痛之詔罷輪臺之遊封丞相為富民侯將以蘇中國也至宣帝代罕復出師屬胸奴數窮天降其禍虛閭權渠單于病死右賢王屠耆堂代立骨肉大臣自不相服又立虛閭權渠子為呼韓邪單于擊殺屠耆堂諸名王貴人各自分立為五單于更相攻擊以至大亂殘虐死者計萬億數畜産耗減十至八九人以飢餓相燔燒以求食於是寄命無所諸名王貴人右伊秩訾且渠當戶以下將兵五萬稽首來降於北方晏然靡有兵革之事直至哀平之際邊人以安臣竊以此觀胸奴之形察天時之變盛衰存亡之機事可見也然則胸奴不滅中國未可安臥亦明矣夫以漢祖之略武帝之雄謀臣勇將勢盛雷電窮兵黷武傾天下以事之終不能屈一王服一國宣帝承衰竭之後撫瘡痍之人不敢惕然有出師之意然而未有遺矢之費而臣僕於單于之長者其故何哉蓋盛衰有時理亂有數故曰聖人修備以待時是以正天下如拾遺陛下肅恭神明德動天地今上帝降胸奴之災孽遺陛下之良時不以此時順天誅建大業使良時一過胸奴復興則萬代為患雖後悔之亦不及矣古語曰天與不取反受其咎今天意厚矣陛下豈可違之哉臣比在同城接居延海西逼近河南口其磧北突厥來入者莫不一一臣所委察比者歸化首尾相仍攜幼扶老巳過數萬然而瘡痍羸憊皆無人色飢餓道死頗亦相繼先九姓中遭大旱經今三年矣野皆赤地少有生草以此羊馬死耗十至七八今所來者皆亦稍能勝致始得度磧磧路既長又無好水草羊馬因此重以死盡矣不掘野鼠食草根或自相食以活喉命臣具委細問其磧北事皆異口同辭又耆老云自有九姓來未曾見此飢餓之甚今者同羅僕固都督早巳伏誅為亂之元其自喪滅其餘外小醜徒侵暴自賊耳本無遠圖多獵葛復自相讐人被塗炭逆順相半莫知所安回鶻諸部落又與金州橫相屠戮㣥生無主號訴嗷嗷臣所以願陛下建大策行遠圖大定北戎不勞陛下指揮之間事業可致則千載之後邊鄙無虞中國之人得安枕而臥豈不在陛下斷哉且胸奴為中國患非獨秦漢之間臣竊惟先聖時衛公李靖蓋中國之一老臣徒藉先帝之威用妙勝之策當頡利可汗全盛之日因機逐便大破虜庭遂繫其侯王裂其郡縣六十年將於今矣使中國晏然斥堠不警書之唐史傳之無窮至今天下謂之為神况陛下統先帝之業履至尊之位醜虜狂悖大亂邊陲皇天遺陛下以鴻基之時陛下又得復先帝之迹德之大者其何以加若失此機事巳過往使李靖豎子獨成千載之名臣愚竊為陛下不取也伏見去月日敕令同城權置安北都護府以招納亡叛振胸奴之喉臣伏慶陛下見幾於萬里之外得制胸奴之上策臣聞隗囂言漢光武見事於萬里之外制敵應變未嘗有遺今陛下超然神鑒遠照實所謂聖明之見覩於無形也臣比住同城周觀其地利又博問諳知山川者莫不悉備其地東西及北皆是大磧磧並石鹵水草不生突厥嘗所大入道莫過同城今居延海澤接張掖河中間堪營田處數百千頃水草畜牧供巨萬人又甘州諸屯犬牙相接見所聚粟麥積數十萬田因水利種無不收運到同城甚省功費又居延河海多有魚鹽此所謂強兵用武之國也陛下若調選天下精兵采拔名將任以同城都護臣愚料之不用三萬陛下大業不出數年可坐而取成臣比來看國家興兵但循於常軌主將不選士卒不練徒如驅市人以戰耳故臨陳對寇未嘗不先自潰散遂使夷狄乘利輕於國威兵愈出而事愈屈蓋是國家自過計於敵爾故非小醜能有異圖臣竊以為陛下今日不更為之圖以激勵天下忠勇但欲以今日之兵今日之將冀收功於異域建業於中興則臣之愚蒙必以為未可得也陛下即以突厥為萬代之患則臣所言願加察若以夷狄荒服不臣小人非所敢諫臣今監領後軍某等取某月即渡磧去計至某日及劉敬同謹當請按行磧計至比巳來地形及突厥滅亡之勢當審虛實續以奏聞伏願陛下省臣此章為國大計儻萬有可一中者請與三事大夫熟圖議之此亦萬代一時也伏願少留聖意間暇念之天下幸甚陛下採臣芻蕘臣請執殳先驅為士卒啓行橫行胸奴之庭歸報陛下臣死之日庶無遺恨不勝云云
