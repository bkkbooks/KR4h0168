front:
  text: 全唐文欽定全唐文卷二十六元宗七
  hash: sha256:6295eabb56408b3f0af64ce17f022d2c03af94e82bb2489c9df0d954fbadda80
body:
  text: 犬以守禦雞以司晨有用於人不同常畜好生之德遍宜令及自今並不得屠殺朕奉天明命虔受睿圖而皇室子弟未能稱職堂姪餘慶承煦紹宗行淹祚洽再從弟璲志謙等不能謹身奉法而乃輕侮國章擯斥邊隅未為塞責朕憫其愚昧屈法申恩並追赴京令於國子監安置讀書如悔過自新克復先訓所司條奏當議其官皇宗親更有左貶嶺南邊遠州非惡逆緣坐等色亦宜準此其有見任別駕年齒尚幼未堪理百姓者宜委中書門下及新興郡王晉李思訓等擇追赴京其祿俸一事巳上並委本州勾當每季附送入京給付其餘慶等本州祿亦準此宗親中有才行灼然為衆推挹者按察使具名以聞朕當擢以不次自今後有犯贓私違禮經者準法科處刑茲無捨庶敦睦之情必聞於九族自家刑國允洽於㣥心宜各勉勵以識朕意法憲之設期於無私本以救人蓋非獲巳故得情存於勿喜折獄貴於哀矜至如斷決諸罪皆著科條若守而不失自為良吏如聞近日州縣罕習章程率情嚴酷或致殞殂假令事應重辟固當明啓刑書豈可輒因夏楚輕絶人命太上皇仁覃萬宇澤被㣥生子愛黎氓慎恤刑罰豫恭承天訓虔奉睿圖旰食載勤納隍兢慮凡厥長吏宜達此懷務遵法式勿仍前弊如或有違當置嚴法宣示黔庶咸使聞知卑宮致美愛人之力靈臺罷營重費之廣景彼前烈吾無間然頃以所居殿院素非宏敞時方暑雨頗有蒸鬱上稟聖慈式遵時令將修別寢順彼高居雖復庀徒所須止於蕃匠補葺所擬無煩外力然以麥秋爰及農務方勤維夏在辰執役為弊營之則衆物有勞而一身逸罷之則我躬未泰而萌庶安夫生人樹君將利之也勞人自奉豫所不為其修大明宮宜即待間月方使畢功宣示具寮使知豫意所有先役工匠即優還價值勿令懸欠仍即放散致化之道必於求賢得人之要在於徵實頃雖屢存賁帛無輟翹車而駿骨空珍真龍罕覯豈才之難遇將舉或未精且人匪易知取不求備瑰琦失於俗譽韜晦嘆於後時宜其博詢州里明揚幽側使管庫無遺楃萵軸咸舉其諸州有抱器懷才不求聞達者命所在長官訪名奏聞武勇者具言謀略文學者指陳藝業務求實用以副豫懷太平公主子薛崇執心奉國勵節忘私早辨忠邪每有規諫因被嫌嫉加以鞭笞事不見從忠實可紀宜甄逆順復其官爵仍賜姓李燕國夫人竇氏慈慧和順掌執禮經女憲母師獨高柔則朕在孩幼躬勞乳養遠惟恩義寧忘夙昔瞻既往而莫追見如存而永慕撫渭城之事未足為言視南陽之書益增其感俾錫朝寵微申朕懷俸料祿課等一準職事三品給瑞木表靈奇文自現用彰大慶以福洪圖配五德於易經迎萬葉於休運宣誠告謝仍付史官其檜片藏於內庫兼賜諸王宰輔及道衆夫詩者動天地感鬼神厚於人美於教矣朕志之所尚思與之齊庶乎採詩之官補朕之闕且古者封禪升中告成朕以菲德未明於至道竦然以聽頗壯相如之詞惕然載懷復慙夷吾之語卿洽聞殫見溫故知新建此發揮益彰忠懇豈非討蓬山之籍心不忘於起豫因蘭殿之祥言固深於啓沃朕循環覽諷用慰於懷今賜卿衣裳一副物五十段以示無言不酬之信也得所進白烏符彩明媚助日揚輝白羽翩翻淩霜比色況乎反哺斯重能仁是高對之有觀情不能巳又覽所進放言體物詞藻瀏亮尋繹研味披玩無厭所謂文苑菁華詞場警策也今賞卿金五挺銀十挺朕聞諸易曰先天而天不違後天而奉天時天且弗違況於人乎因斯而言則君事於天養於人行月令順時物也朕以不德恭膺斯運靜言詢政每用憂勞屬獻歲發春東風解凍土膏脈散草樹自樂而天久不雨元元何辜孰可以授農事拯彼飢者豈布德利施慶惠尚不及歟豈掩骼埋胔無麛無卵尚不及歟豈名山大川修祭命祀尚不及歟欽若令典惟增所懼緬懷大猷思補其闕有司可稽春令以稱朕心其有直諫昌言宏益政理者朕將親覽罔或隱避不急之務一切停息見禁囚徒速令處置宜從寬大勿使稱寃本州本軍刺史軍將境內所有名山大川能興雲致雨者並宜祈祭其有僵尸暴骸無主收斂者亦仰埋掩量致祭訖各具狀奏聞應須酒脯宜用官物古者雪寃婦於東海問刑人於北寺則以旱之故應時如響至於山不童澤不竭使霈然以降興而致之復何遠也將達精誠務修蠲潔俾幽坎遂性飛走從宜則冀天之愛人月離于畢禺禺之望感而遂通布告遐邇令知此意章服所施貴賤攸別苟容僭越未為獎勸承前諸軍人多有借緋及魚袋者軍中卑品此色甚多無功賞借深非道理宜敕諸軍鎮但是從京借魚袋及無灼然功軍中權借者並委州軍長官敕到並即收取待立功日據功合得即將巳上者委軍將先借後奏其靈武和戎大武幽州鎮軍赤水河源瀚海安西定遠等軍即臨賊衝事藉懸賞量軍大小各封賞金魚袋五十枚並委軍將臨時行賞青州刺史韋安石太子賓客韋嗣立刑部尚書趙彥昭等往在先朝曲蒙厚賞因緣幸會久在廟堂朋黨比周聞於行路景龍之末長蛇縱禍倉卒之間人神憤怨未聞捨生取義直道昌言遂削太上皇輔政之辭用韋氏臨朝之策比常隱忍復以崇班將期愧畏稍懲前惡而尚款回邪苟安榮寵宜從謫官之典以勵事君之節安石可沔州別駕嗣立可嶽州別駕彥昭可袁州別駕並員外置園陵之地衣冠所遊凡厥有司罔不祗事禮存則先王是訓禮失則後代何觀欽若永圖敢忘舊典頃者別致鷹狗供奉山陵至於料度極多費損況昔誡禽荒既非尋常所用遠惟龍馭每以仁愛為心彼耕象與耘鳥且增哀慕豈飛蒼而走黃更備畋獵有乖儀式無益崇嚴載懷虧紊良深悚惕諸陵所有供奉鷹狗等並宜即停朕聞鵝鴨坊比供米粟恨不早知久令虛費今百姓飢阻未能周給鳥享人食是何理焉其料宜即停并雞坊亦準此古之學士始入小學見小節入大學見大節知父子長幼之序君臣上下之位然後師逸功倍化人成俗莫不由之子不云乎遠而有光者飾也近而逾明者學也故道行於上祿在其中所謂貴於速成不唯於遲達自頃州里所薦公卿之緒門人衆矣孰嗣子音國胄禺然未臻吾道至使鑽仰之地寂寥厥風貴於責實務於求仕將去聖滋遠尚沿澆薄為敦儒未宏不行勸沮朕承百王之末居四海之尊惟懷永圖思革前弊何以發後生之智慮垂先王之法則朕甚懼之敢忘於是天下有業擅專門學優重席堪師授者所在具以名聞自今以後貢舉人等宜加勗勉須獲實才如有義疏未詳習讀未遍輒充舉送以希僥幸所由官並置彞憲有司更申明條例稱朕意焉今歲諸州多非善軌及京師每勞轉運員外等官人數倍廣俸祿之輩何以克周諸色員外試檢校官除皇親諸親及五品以上並戰陳要籍內侍省以外一切總停至冬放選量狀迹書判與正員外官其未經考者先與處分仍不拘選格聽集自今以後除戰功以外非別敕不得輒注擬員外等官我國家統一寰宇歷年滋多九夷同文四隩來暨夫其襲冠帶奉正朔禺禺然嚮風而慕化列於天朝編於屬國者蓋亦衆矣我則潤之以時雨照之以春陽淳德以柔之中孚以信之元風既同㣥物茲遂莫不自天壤窮海域厥角以請吏執贄以來庭皇唐之德於此為盛今外蕃侍子久在京國雖威畏之及自遠畢歸而羈旅之志重遷斯在宜命所司勘會諸蕃充質宿衛子弟等量放還國契丹及奚延通質子並即停追前令還蕃首領等至幽州且住交替者即旋去朕欲以鳥獸咸若華戎俱泰來則納其朝謁之禮去則隨其生育之心推我至誠崇彼大順含宏之施德莫厚焉尚書禮閣國之政本郎官之選實藉良才如聞諸司郎中員外郎怠於理煩業唯養望凡厥案牘每多停擁容縱典吏仍有貨賕欲使四方何以取則事資先令義貴能改宜令當司官長殷勤示諭并委左右丞勾當其有與奪不當及稽滯稍多者各以狀聞吐蕃小寇僻處大荒先朝外撫許其內屬結以和戎之好優以外臣之禮野心易動朝獎遄忘不度德以量力敢窺邊而犯塞薛訥等擁旌為將按節持兵驅之逐之指期殄滅使苞桑莫繫破竹無遺實賴宗廟之靈兼資將士之力比來酬敘多歷歲年命賞逾時有乖勸善巳令紫微舍人倪若水就軍敘録即有處分佛教者在於清淨存乎利益今兩京城內寺宇相望凡欲歸依足申禮敬下人淺近不悟精微覩菜希金逐焰思水浸以流蕩頗成蠧弊如聞坊巷之內開鋪寫經公然鑄佛口食酒肉手漫羶腥尊敬之道既虧慢狎之心斯起百姓等或緣求福因致飢寒言念愚蒙深用嗟悼殊不知佛非在外法本居心近取諸身道則不遠溺於積習實藉申明自今巳後禁坊市等不得輒更鑄佛寫經為業須瞻仰尊容者任就寺拜禮須經典讀誦者勒於寺取讀如經本少僧為寫供諸州寺觀並準此雕文刻鏤衣紈履絲習俗相誇殊塗競爽傷風敗俗為弊良久珠玉錦繡概令禁斷準式三品以上飾以玉四品以上飾以金五品以上飾以銀者宜於腰帶及御鐙酒杯杓依式自外悉鑄為鋌婦人衣服各隨其夫子其巳有錦繡衣服聽染為皂成段者官為市取天下更不得採取珠玉刻鏤器玩造作錦繡珠繩織成帖縚二色綾綺羅作龍鳳禽獸等異文字及堅撊錦文者決杖一百受雇工匠降一等科之兩京及諸州舊有官織錦坊悉停朕聞士之生代始於事親中於事君終於立身此其本也若乃移孝成忠策名委質命有泰山之重義徇則為輕草有疾風之力節全則知徑況君臣之相遇而故舊之不遺乎銀青光祿大夫殿中監楚國公薑皎簪紱聯華圭璋特秀寬厚為量體靜而安仁精微用心理和而專直往居藩邸潛款風雲亦由彭祖之同書子陵之共學朕常遊幸於外至長楊鄠社之間皎於此時與之纍宿私謂朕曰太上皇即登九五王必為儲副凡如此者數四朕叱而後止寧知非僕雖玩於鄧晨可收護軍遂訶於朱祐皎復言於朕兄弟及諸駙馬等因聞徹太上皇太上皇遽奏於中宗孝和皇帝尋遣嗣虢王雍等鞫問皎保護無怠辭意轉堅李通之讖記不言田叔之矒鉗罔憚乃為宗楚客紀處訥等密奏謫皎炎荒中宗特降恩私左遷潤州長史讒邪每構忠懇逾深戴於朕躬憂存王室以為天且有命豫睹成龍之徵人而無禮常懷逐鳥之志遊辭枉陷旋罹貶斥嚴憲將及殆見誅夷履危本於初心遭險期於不二雖禍福之際昭然可圖而艱難之中是所繄賴洎朕祗膺寶位又共翦姦臣拜以寵光不忘撝挹敬愛之極神明所知造膝則曾莫詭隨匪躬則動多規諫補朕之闕斯人孔臧而悠悠之談嗷嗷妄作醜正惡直竊生於謗考言詢事益亮其誠昔漢昭帝之保霍光魏太祖之明程昱朕之不德庶幾於此矧夫否當其悔則滅宗毀族朕負之必深泰至其亨則如山如河朕酬之未補豈流言之足聽而厚德之遂忘謀始有之圖終可也宜告示中外咸令知悉古者三夫人九嬪二十七世婦八十一御女以備內職焉朕恭膺大寶頗修舊號而六宮曠位未副於周禮八月算人不行於漢法至於薑后進諫永巷脫簪袁絲有言上林引席此則朕之所慕未曾忘也頃者人頗喧譁聞於道路以為朕求聲色選備掖庭豈豫志之未孚何斯言之妄作往緣太平公主輒進人入宮朕以事須順從未能拒抑見不賢莫若內省欲止謗莫若自修改而更張損之可也妃嬪以下朕當擇使還其家宜令所司將車牛今月十二日赴崇明門待進止朕光宅四海撫御百蠻屬疆場未寧軍國多費每欲指揮方略親率軍師故召募爾等擬從朕行知爾等材力冠㣥藝能拔萃但以不教人戰豈知金鼓之聲授以兵律方辨干戈之勢所以且遣薛訥等於隴右防禦使令教習爾等既練韜鈐須明隊伍使投石拔劒以勵威鋒裹糧坐甲待清逋寇若能因機立效遇敵邀勳酬以官榮必超格例然後陪朕輿駕從戎塞垣俾爾先驅敬聽後命今宴勞爾等并賜錢三千貫可節級領取即宜好去明王垂訓則罪不相及善人懼罰則刑不可濫由是母嘗有言豈坐趙括魚既從戮寧遺叔向古之道也朕所務焉衛尉少卿崔滌竭誠奉國忘軀事君曾同下杜之遊頗寄中陽之舊誠表於先覺節全於後凋其兄湜素蓄異圖交結凶黨滌雖懷在原之急深憂闔室之刑動靜則聞始終必盡為臣無隱惟滌有之言念厥功曷云從坐況老父就殞諸兄繼歿搖落變衰有聞矜憫賞罰勸懲宜判忠邪滌家除兄湜一房外餘並不須為纍古之為政先於尚老居則致養禮傳三代行則就見制問百年蓋皇王之勸人教黎庶之為子朕寅奉休歷祗膺聖謨因秋歸而歲成屬星見於郊祀念其將至尤重乞言俾伸恩於几杖期布惠於鄉國九十以上宜賜几杖八十以上宜賜鳩杖所司準式天下諸州侍老宜令州縣逐穩便設酒食一準京城賜几杖其婦人則送几杖於其家乞力徐等天迷神怒背義忘恩憫其下人制在凶帥積骸暴露潤草塗原言念於茲豈忘惻隱其吐蕃戰死人等宜令所在州縣速與瘞埋俾有申於弔拯庶無隔於華裔疇庸賞善百王攸先追遠飾終千載同德故尚書左丞相太子少傅贈司空荊州大都督許國文貞公王褱履正體道外方內直悉心奉上卑身率禮協贊帷幄三朝有鹽梅之任燮諧台衮九命為社稷之臣先朝晏駕釁起宮掖國擅稱制之姦人懷綴旒之懼凶威孔熾宗祀幾傾顧命遺恩太皇輔政逆臣刊削韋氏臨朝遂能首發昌言侃然正色列諸視聽暴於朝野松檟巳遠風烈猶存緬懷誠節良深耿歎可賜實封一百戶比來緣邊鎮軍每年更代兵不識將將不識兵豈惟緣路疲人蓋是以卒與敵其以西北軍鎮宜加兵數先以側近兵人充並精加擇其有勞考等色所司具以條例奏聞戰兵別為隊伍專令教練不得輒有使役仍令兵部侍郎裴漼大常少卿薑皎往軍州計會便支配有見集後軍兵宜令兵部侍郎韋抗紫微舍人王珽即擇以聞陳詩展義問俗觀風乃王者之所務也頃屬農事皆隙歲功有成近歷酆鎬左連岐雍見江山秀麗溝塍綺錯長楊鄠杜之間竹林園果之富相望於道家給人足謂之時邁頗慰豫懷思所以問耆老恤淹滯舉逸人旌賢士庶協巡遊之典以符行在之恩駕所過之縣見禁囚徒以下咸宜放免流以上罪具犯狀奏聽進止古者親問百年存養耆老年九十以上并篤疾各賜物四段綿布各一束北戎為患南牧是膺叛而伐之服而捨之春秋格言是謂通典葛邏祿陰山都督部落驕天縱毒月為妖桀驁之心久矣脅從之禍深矣而冒其攜阻思我恩化來七旬而就格逾萬里而歸誠稽顙邊陲披肝塞下宜令左散騎常侍解琬攝御史大夫持節往北庭宣慰突厥部落緣邊降戶要在便宜處分君以人為本人以食為天雖水旱蟲螟代則常有有一於此胡寧不恤間者河北河南災蝗水潦之處聞其困弊未獲安存念之憮然不忘寤寐宜令禮部尚書鄭惟忠持節河南道宣撫百姓工部尚書劉知柔持節河北道安撫百姓其被蝗水之州量事賑貸務安其俗稱朕意焉河南河北去年不熟今歲亢旱全無麥苗雖令賑給未能周贍所在飢弊特異尋常如聞至今猶未得雨事須存問以慰其心從此發使又恐勞擾宜降恩制令本道按察使安撫其有不收麥處更量賑恤使及秋收仍令勸課種黍稌及旱穀等使得接糧應有事急要者宜委使人量停事有不便於人須有釐革者準此古者名將在乎養兵故疾則吮癰渴不先飲撫循慰藉恩義感激所以奮不顧身戰無完陳如聞諸將總管巳下不遵師律多役兵士帳中厭梁肉之娛麾下罹勤瘁之色人既勞力軍亦挫氣豈孫吳養士之方韜鈐用兵之法春秋責帥典憲斯在自今巳後總管以下私使兵士計庸以受所監臨財物論頒下諸軍咸使知悉無知之徒自罹刑憲一遭縲絏坐變星琯長吏依違不時疏決過成滯獄豈曰當官況三陽在辰德澤思布一物失所勤恤是殷惟懷永圖俾申幽枉其所在見禁囚未斷決者令所在長官親加按理仍令御史及按察使訪察隨事糾繩默啜殘凶倔強邊徼吐蕃小醜孤負聖恩我國家豫在懷柔未遑弔伐而乃敢肆蜂蠆屢犯疆陲虔瓘心蘊六奇折衝千里追奔邁於三搜受降逾於萬計建功若此朕實嘉之天下寺觀屋宇先成自今巳後更不得創造若有破壞事須條理任經所繇陳牒驗然後聽許命彼太師聞乎周頌安得猛士欽若漢圖朕懷柔百蠻茂育萬姓綏之則教人息戰靖之則去兵不用故獯戎是逐前史嘗載夷狄為亂先王必征所以罰其浸驕徵其即敘朔方軍壘接太原之備胡右地城池控張掖之遮虜是用誡於師旅揚我兵威誰其任之肅此將命右羽林軍大將軍上柱國河東郡開國公薛訥左衛大將軍上柱國太原郡開國公郭虔瓘等既明且哲緯武經文登壇有大將之容辭第有忠臣之志或斬其愛子掃塵而清北風或俘其名王却地而盡西海故可以率如羆之勇當非熊之寄然則井陘之間昔不成列河源之路舊多鑿空設險而張遠謀總戎而獻長策俾爾之效在于斯舉固當殲其種落告成于王豈為完我甲兵逸而待寇而巳訥可持節充涼州鎮軍大總管赤水建康河源及緣邊州軍並受節度仍與郭虔瓘張知運杜賓客相知共為表裏夙設方略虔瓘可持節充朔州鎮大總管和戎大武及并州以北緣邊州軍並受節度仍與張知運甄道一相知共為犄角勿失權宜訥便特於涼州住涼州都督楊執一為副大總管虔瓘於并州住并州長史王晙為副大總管宜排比兵馬精加教練幽州有事即令虔瓘將和戎兵馬從常山土門與甄道一計會共討凶逆其同華等兵及精騎健兒并鞍馬等依三月十五日制仍令遠探量事續遣
