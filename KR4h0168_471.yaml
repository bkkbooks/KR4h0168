front:
  text: 全唐文欽定全唐文卷四百七十一陸贄十二
  hash: sha256:f863743f7055357070b7abc051b27162aaab76d16e36bfc813dbf5fcebc77f0e
body:
  text: 右德亮承旨幷錄先所散失內人名字令臣撰詔書以賜渾瑊遣於奉天尋訪以得為限仍量與資裝速送赴行在者頃以理道乖錯禍亂荐鍾陛下思咎懼災裕人罪已屢降大號誓將更新天下之人垂涕相賀懲忿釋怨煦仁戴明畢力同心共平多難止土崩於絕岸收板蕩於橫流殄寇清都不失舊物實由陛下至誠動於天地深悔感於神人故得百靈降康兆庶歸德苟不如此自古嘗有棄擲宮闕失守宗祧繼逆於赴難之師再遷於蒙塵之日不踰半歲而復興大業者乎今渠魁始平法駕將返近自郊甸遠周寰瀛百役疲瘵之甿重傷殘廢之卒皆忍死扶病傾耳竦肩想聞德聲翹望聖澤陛下固當感上天悔禍之眷荷烈祖垂裕之休念將士鋒刃之殃愍黎元塗炭之酷以致寇為戒以居上為危以務理為憂以復言為急損之又損尚懼汰侈之易滋艱之惟艱猶患戒慎之難久謀始盡善克終已稀始而不謀終則何有夫以內人為號蓋是中壼末流天子之尊富有宮掖如此等輩固繁有徒但恐傷多豈憂乏使翦除元惡曾未浹辰奔賀往來道路如織何必自虧君德首訪婦人又令資速赴行在萬目閱視眾口流傳恐非所以答慶賴之心副惟新之望也夫事有先後義有重輕重者宜務之於先輕者宜措之於後故武王克殷有未及下車而為之者有下車而為之者蓋美其不失先後之宜也自翠華播越萬姓靡依清廟震驚三時乏祀當今所務莫大於斯誠宜速遣大臣馳傳先往迎復神主修整郊壇展禋享之儀申告謝之文然後弔恤死義慰犒有功綏輯烝黎優問耆耋安定反側寬宥脅從宣暢鬱堙裦獎忠直官失職之士復廢業之人是皆宜先不可後也至如崇飾服器繕緝殿臺備耳目之娛選巾櫛之侍是皆宜後不可先也宜後而先則為君之道喪宜先而後則理國之義差古之興王必慎於此陛下將務興復又安可不慎乎且散失內人已經累月既當離亂之際必為將卒所私其人若稍有知不求當自陳獻其人若甚無識求之適使憂虞自因寇亂喪亡頗有大於此者一聞搜索懷懼必多餘孽尚繁㣥情未一因而善撫猶恐危疑若又懼之于何不有昔人所以掩絕纓而飲盜馬者豈必忘其情愛耶蓋知為君之體然也以小妨大明者不為天下固多美人何必獨在於此易曰危者安其位者也亂者有其理者也故君子安不忘危理不忘亂是以身安而國家可保也春秋傳曰或多難以固其國或無難以喪其邦誠以處危則思安之情切遭亂則求理之志深切於思安深於求理國之固也不亦宜乎及夫居安而驕恃理而怠驕則縱肆其奢欲怠則厭惡於忠言奢欲日行忠言日梗國之喪也不亦宜乎昔衞獻出奔久而復國大夫迎於境者執其手而與之言迎於門者頷之而已言其驕怠之易生也齊桓將圖霸功管仲戒之以無忘在莒懼其情志之易變也今臣亦願陛下企思危固國如不及懲忘亂喪國如探湯以在莒為書紳之規以衰衞為覆車之鑒則德為帝範理致時雍與夫貪逸欲而踐禍機其利害亦云遠矣所令撰賜渾瑊詔未敢承旨伏惟聖裁謹奏右欽溆奉宣聖旨省卿所奏蕃軍退歸及關中體勢理皆切當甚慰朕懷然渾瑊李晟等諸軍須有商量規畫令其進取朕見欲遣使宣慰卿宜審細條疏速奏來者臣聞將貴專謀兵以奇勝軍機遙制則失變戎帥稟命則不威是以古之賢君選將而任分之於閫誓莫千也授之以鉞俾專斷也夫然故軍敗則死眾戰勝則策勳不用刑而師律貞不勞慮而武功立其於委任之體豈不博大哉其於責成之利豈不精覈哉自昔帝王之所以夷大艱成大業者由此道也其或疑於委任以制斷由已為大權昧於責成以指麾順旨為良將鋒鏑交於原野而決策於九重之中機會變於斯須而定計於千里之外違令則失順從令則失宜失順則挫君之嚴失宜則敗君之眾用捨相礙否臧皆凶上有掣肘之譏下無死綏之志其於分畫之道豈不兩傷哉其於經綸之術豈不都謬哉自昔帝王之所以長亂繁刑喪師蹙國者由此道也茲道得失兵家大樞當今事宜所繫尤切蓋以寇盜充斥乘輿播遷人心有觀變之搖王室無自固之重秦梁迴繚千里迢遙臨之以威則力勢不制授之以策則阻遠不精頃者驟降詔書教諭㣥帥事無大小悉為規裁及乎章表陳誠使臣復命進退遲速率乖聖謀豈皆樂於違忤哉亦由傳聞與指實不同懸算與臨事有異故也設使其中或有肆情于命者陛下能於此時戮其違詔之罪乎臣竊恐未能也陛下復能奪其兵而易其將帥乎臣亦恐未能也是則違命者既不果行罰從命者又未必合宜徒費空言祗勞睿慮匪唯無益其損實多何則時方艱屯下陵上替凡在執干戈而衛社稷者皆自謂勳業由已義烈發心安於專行病於覊制陛下宜俯徇斯意因而委之遂其所安護其所病敦以付授之義固以親信之恩假以便宜之權待以殊常之賞其餘細故悉勿關言所賜詔書務從要慎其言以取重深其託以示誠言見重則君道尊託以誠則人心感尊則不嚴而眾服感則不令而事成其勢當令智者騁謀勇者奮力小大咸極其分賢愚各適其懷將自效忠兵自樂戰與夫迫於驅制不得已而從之者志氣何啻百倍哉夫君上之權特異臣下者唯不自用乃能用人其要在順於物情其契在通於時變今之要契頗具於茲儻蒙究思或有可取謹奏右件官比緣性行無良多為時議所惡頻被封章論奏言其心挾兩端若不提防恐妄生窺伺謂宜斥絕用杜姦邪近者鳳翔使來絕不蒙恩召見滯留數輩並未放還伏恐陛下不忍忿心頗從輿議以臣惷戅竊謂非宜李楚琳乘時艱危俶擾岐下賊殺戎帥欵結兇渠奉天之圍頗亦有助其於叛亂海內彰聞論者今始紛紜一何知見之晚耶但以乘輿未復大憝猶存勤王之師悉在畿內急宣速告晷刻是爭商嶺則道迂且遙雒谷復為盜所扼僅通王命唯在裦斜此路若又阻艱南北遂將敻絕以諸鎮危疑之勢居二逆誘脅之中洶洶㣥情各懷向背賊勝則往我勝則來其間事機不容差跌儻或楚琳發憾公肆猖狂南塞要衝東延巨猾則我咽喉梗而心膂分矣其勢豈不甚病哉且楚琳本懷惟惡是務今能兩端顧望乃是天誘其衷故通歸塗將濟大業陛下誠宜深以為念厚加撫循得其持疑便足集事儻能遷善亦可濟師今若徇褊狹之談露猜阻之跡懼者甚眾豈唯一夫自昔能建奇功或拯危厄未必皆是絜矩之士溫良之徒驅駕擾馴唯在所馭朝稱兇悖夕謂忠純始為寇讎終作卿相知陳平無行而不棄忿韓信自王而遂封蒯通以折理獲全雍齒以積恨先賞此漢祖所以恢帝業也置射鈎之賊而任其才釋斬袪之怨以免於難此桓文所以宏霸功也然則當事之要雖罪惡不得不容適時之宜雖仇讎不得不用陛下必欲精求素行追宿疵則是改過不足以補愆自新不足以贖罪凡今將吏豈得盡無疵瑕人皆省思孰免疑畏又況阻命之輩脅從之流自知負恩安敢歸化斯釁非小所宜速圖孔子曰人而不仁疾之已甚亂也又曰小不忍則亂大謀君陳曰無忿疾于頑又曰必有忍其乃有濟伏願陛下必以英主大略聖人格言為元龜固不可納豎儒小忠以虧撓興復之業也臣不勝憂國至計謹啟事以聞謹奏右欽漵奉宣聖旨比在奉天將士並賜名定難功臣今宰臣等商量扈從中官辛苦至甚亦合依例並賜此名朕以南衙朝士之中有經奉天重圍又似卿等昨者奔赴行在涉歷危險亦極艱難今不問中官朝官但經重圍又到山南者並擬賜名定難功臣卿宜商量豈不穩便者陛下惠霑執目御仁洽庶寮念隨難之憂危恤從巡之勞苦議增寵飾將錫嘉名事雖未行意則已就凡在貴近固知銜恩睿旨淹詳復詢庸賤惟精惟慎允謂防微顧省何知屬當下問臣若自貪榮號傍懼怨憎因循順成不極所見心且知負如天鑒何是以不揆言之淺深不計身之利害但輸狂直唯聖所裁臣聞賞以懋庸名以彰行賞乖其庸則忠實之效廢名浮於行則瀆冒之弊興一足以撓國權一足以亂風俗授受之際豈容易哉頃以駐蹕奉天迫於患難竟攘兇逆實賴武人遂旌定難之勳特賜功臣之目名頗符實事亦會時所霑雖多誰曰非允至如宮闈近侍班列具臣雖奔走恪居各循厥職而驅除翦伐諒匪所任又屬皇輿再遷天禍未悔見危無補曷謂功臣致寇方深孰云定難縱使遭罹圍逼跋履崎嶇難則當之定將安據勞或有矣功其謂何大凡有生之倫莫不各親其類賤彼貴我抑惟常情黜異獎同亦是常性臣忝搢紳之列又當受賜之科竊自校量猶知不可而況於公議乎況於介冑之士乎人之多言靡所不至必謂陛下溺愛近習故徇其苟得之情汎該㣥司以分其私昵之謗怨不在大釁皆自微必將沮戰士激勵之心結勳臣憤恨之氣所悅者寡所慍者多所與者虛名所失者實事所悅者臣下之夸志所病者國家之大猷利害皎然不為難辨且名者眾之所評也是曰公器亦為爭端覈之至精猶患相軋處或乖當安能勿踰以漢高之制服雄豪太宗之削平區㝢天下既定乃論功勳有蕭曹之殊庸有房杜之碩畫戰守經略倬乎殊倫猶謂豐沛故人刀筆文吏諸將不服頗相訐揚乃至攘袂指天拔劍擊柱偶語謀反諠譁訟寃矧今國步猶艱王化未洽方資武力以殄寇讎蓋非恩倖競進之時文儒角逐之日當功而獎尚恐未孚獎又非功固宜見誚儻有節效尤著理當裦崇賞典甚多何必在此其餘別無績用例徇驅馳且俟賊平甄錄非晚謹奏右先頒敕旨已定行期所司供承亦聞粗備但以霖潦方甚道路阻艱眾情同憂莫敢論奏今發日漸逼陰雲尚繁小大嗷嗷愁懼轉甚臣雖闇鈍亦竊揣量豈不知元惡初平餘氛未殄乃是逆順將分之際吉凶多變之時須速鎮安理宜促駕向使霖潦為害人功可施其備禦由於智能其役用止於煩費其所患不及於性命其可憂但在於人臣則當公私罄財上下竭力務寧大業奚恤暫勞各應叶奉聖規安敢復忤成命良以裦斜峻阻素號畏途緣側逕於巔巖綴危棧於絕壁或百里之內歷險且千或一程之中涉水數四若遇積雨滯浸㣥峰澍流巨石崩奔訇殷相繼深谷瀰漫往來不通悉非功力之所支籌略之所遏斯須之頃跬步之閒倉黃遘殃皆不可測匹夫單騎尚且過防況萬乘時行千官景從而可以蹈不存之險冒無禦之災乎如或磴路潀崩閣道淹圯環衛之儀少缺屬車之馬微驚縱有億徒何所為用陛下欲無駭慮其可得乎又或霪滯更深谿澗皆溢逕路既絕傳送無由連山萬重進退不可一日乏食將如之何陛下欲無軫憂固亦難矣人主舉措宜圖萬全必先事以防危不臨危而求幸幸而獲濟貽媿已深不幸罹災追悔何及孔子曰欲速則不達誠哉是言臣今非敢阻陛下欲速之情但頗以不達為慮耳儻迴睿旨少俟開晴則發期雖延涉路無滯不疾而速允叶乾行知幾其神是謂天鑒竊聞㣥議輒以上陳慺慺懇誠實冀昭納謹奏右欽溆奉宣聖旨前者共卿商量趙貴先欲恕其罪朕朝來更問諸將皆云貴先順從朱泚則是逆人合依常刑不可寬捨眾人意既如此應難釋放卿宜知悉者臣愚以為貴先從逆之罪法當不容貴先陷身之由情則可恕陛下所議矜宥原其情也諸將所請誅戮據於法也據法而除君之惡者人臣之常志原情而安眾之危者人主之大權臣主之道既殊通執之方亦異言各有當體各有宜事或相駁而無傷此之謂也往以襄城告急詔命隴右發兵齊映率眾東行貴先即其部將于時軍至昭應適遇駕幸奉天齊映馳歸鳳翔貴先獨主營幕進無總帥退閡亂兵遂為賊泚所招紿以同迎鑾駕泚既反狀未露貴先安得勿從已受邀留遂遭劫制身縻偽職兵隸兇徒雖居賊中亦不見任首末事跡在天心臣亦親承德音非獨聞於傳說其於情狀頗有足矜所可受責之辜唯在不能守節而死耳貴先儻能守節即是忠烈之徒固獲裦旌豈資寬捨凡所議讞蓋緣獄疑罪疑惟輕實編令典脅從罔理亦載聖謨況復懷光未殲希烈猶熾遭罹誘陷其類實繁今京邑初平皇猷更始乃是汚俗觀化之日聖王布德之時所用刑章尤宜審慎一輕一重理亂攸生宥之以恩則自新者咸思歸命斷之以法則懷懼者姑務偷生眾心既偷賊勢愈固不忍一朝之忿而貽累歲之憂苟循匹夫之談以興億眾之役為計若此夫何利之有焉曩者羯胡亂華染汚士吏肅宗興復累降赦書罪止渠魁餘所不問河朔遺孽既聞德澤之宏被且幸脅汚之見原人人皆自怨尤各悔歸國之晚及乎三司按罪繼用嚴科未降之流復喜得計慶緒將消而再結思明已附而重攜浸長厲階至今為梗豈不以任法吏而虧權道小不忍而亂大謀者乎昔漢高帝既定四方見諸將往往偶語謀反乃問張良曰為之奈何良曰陛下所最恨者為誰帝曰雍齒與我有舊而數窘我良曰今急封雍齒則人人自堅矣帝用良計諸將果安皆云雍齒且侯吾屬何患蓋以圖霸王者不牽於常制安反側者罔念於宿瑕今陛下有漢高之英貴先無雍齒之加戮不足威暴逆矜全可以定危疑明恕而行盛德斯在何所為慮尚勞依違微臣區區上言蓋為將來張本凡非首惡皆願從寬庶使負累之徒莫不聞風而化消姦兇誘惑之計開叛亂降附之門此其大機不可失也陛下前意固為善矣伏惟不為浮議所移謹奏右欽漵奉宣聖旨李楚琳不可久在鳳翔欲候朕到日擇一人替楚琳充節度使楚琳別與一官便隨朕歸京既有迎駕諸軍威勢甚盛因此替換亦是權宜卿宜商量穩便否者臣聞王者有作先懷永圖謀必可傳事必可繼不因利以苟得不乘便而幸成故能上下相安而理可長久也彼楚琳者固是亂人乘國難而肆逞其姦賊邦君而篡居其位按以典法是宜汚瀦既屬多虞不遑致討乃分之以旄鉞又繼之以寵榮逮至南巡頗全外順道途無壅亦有賴焉雖朝命累加蓋非獲已然王言一出則不可渝縱闕君臣之恩猶須進退以禮今若因行幸之威勢假迎扈之甲兵易置以歸是同虜執以言乎除亂則不武以言乎務理則不誠禍變繁興為日久矣負釁居位豈唯一人以此時巡後將安入以此撫御誰其感懷昔漢高偽遊韓信見獲功臣繼叛天下幾危征伐紛紜以至沒代其徼倖之不可也如此陛下得不為至戒哉議者謂之權宜臣又未諭其理夫權之為義取類權衡衡者稱也權者錘也故權在於懸則物之多少可準權施於事則義之輕重不差其趣理也必取重而捨輕其遠禍也必擇輕而避重苟非明哲難盡精微故聖人貴之乃曰可與適道未可與立可與立未可與權言知機之難也今者甫平大亂將復天衢輦路所經首行脅奪易一帥而虧萬乘之義得一方而結四海之疑乃是重其所輕而輕其所重謂之權也不亦反乎以反道為權以任數為智君上行之必失眾臣下用之必陷身歷代之所以多喪亂而長姦邪由此誤也夫以韓信才略當時莫儔且負嫌猜已遭告訐縱之足以亂區㝢除之可以安國家幸而成擒猶謂失策當時被攻戰之害百代流詭詐之譏況楚琳卒伍凡材厮養賤品因時擾攘得肆猖狂非有陷堅殪敵之雄出奇制勝之略頗同狐鼠乘夜雎盱晨光既升勢自跧縮今郊畿已乂武衞方嚴隴鎮壓於其西邠涇扼制於其北顧是岐下若居掌中以楚琳劣之資處掌中控握之地縱令蹢躅何惡能為願陛下姑務含宏普安反側促駕遄止錄功犒勤敷肆眚之恩布維新之令然後徵韋皋楚琳俾入分文武之職擇元勳宿望命出總岐隴之師則彼承詔欣榮奔走不暇安敢蠆芥復勞誅鋤措置得宜萬無一跌何遽過動不為後圖仰希睿聰試更詳慮謹奏
