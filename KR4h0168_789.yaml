front:
  text: 全唐文欽定全唐文卷七百八十九蛻字復愚自號文泉子長沙人大中時擢進士纍遷右拾遺中書舍人忤宰相令狐綯出為華陰令終商州刺史
  hash: sha256:8d7ebdc0ed3351b0d7c021675397cf9abc7d45aaa1fdbd66e2ef247c6beecffe
  markers:
  - {type: head, offset: 14, content: 劉蛻, id: KR4h0168_NFKB_789-h1, level: 1}
body:
  text: 臣伏見新除左拾遺令狐滈大中之時其父執政傳家乏子弟之法布衣干宰相之權瘡痏者莫匪浮憎進拔者悉皆有謂凡四方節鎮價同交關三署官司精專與奪潛行遊宴頗雜倡優鼓扇輕浮以為朋黨籌謀日夜聚蚊如雷變化施張赤地成海天下側足有識寒心竊以官列諫垣號為供奉縱遣人同列鸖然則職貴存羊夫陷父之義居家不為孝子事君之後見利豈為忠臣伏惟陛下敦崇教化懲艾澆漓凡曰名器不當猥濫事之可惜體難盡言臣於滈家本無嫌舋于陛下則是職司謀其身則身輕舉其職則職重不然臣何故結冤權豪之族輕踐危亡之機白日所臨赤誠可見况物如脂膩近則汚人官若薰蕕固難同器誓以愚見義不比肩干冒聖聰乞回成命復何事哉弓矢乎制敵之事今為導衛羽儀金革乎勇衆之器今為節奏和聲射宮蓬蒿幽燕少年恥蹈其下文之用莫過乎當時文之人莫過乎閣下復何事哉漢既治世詩書禮樂皆已逸墜求亡書者冬官考工開千金之購議帝制者進退贊拜定茅蕝之中而今河洛冢壁圖簡編修登降俯仰不倒步序便蕃之儀莫過乎當時優游之學莫過乎閣下復何事哉材力既以相譽忠正得以相扶及秦世為之妖言東漢為之黨禁公道畏忌相顧而野死今布衣匹夫得歌王公大人之盛德先進達生得薦布衣匹夫之事業唯其公當舉之不以為疑扶之不以為黨無私之道莫過乎當時舉能之心莫過乎閣下嗚呼苟有其時而無其人雖有舉能之心斯為閣下惜有其人有其時而閣下苟不留意屬念斯為來世弔蛻生二十餘年已過當時之盛棲遲困辱者未遇當時之人書成而嘗樂乎其時出車滿於道路而才高於蛻忌蛻侵已才下於蛻畏蛻擅名是以深知之者不得終其朝欲振之者又自無其力也謂其書空為來世弔已矣乎不意得與閣下不為異世同乎文字所謂當時之人斯非閣下者乎則其人未死口能言手能書閣下見之復用何禮以接之既接之復用何詞以譽之譽之得盡其才接之得盡其禮斯人也讀書業文得有知已居窮守道死且不朽復何事哉蛻嘗感近世知已隳離交道沈廢不忍終日疚之於心思出其門閭上謁於公卿水行吳楚之城陸走商周之甸旁聽天下歲晚而歸卒無所遇是十六國之故墟四瀆之隅落未足為大也卒不能副蛻也區區之望况有一言解相印一見爵上卿者乎斯不無人晚乃遇之不自紹介之口不因媒屬之勢纓綏車佩下入蓬蒿一言而膠附不離有憂其終始出處之事者况蛻之遇執事於南康也其來六月而餘無不得日奉論議欲變陰谷為生植之地起死人為奔走之夫返覆踰時將止復動雖人有昆弟親戚之愛哭其死憂其病榮其達則或過於執事之心至於誘掖殷勤不遽以違命見絶者則昆弟親戚相強一不相從則終身不復意之蛻前日來求人為知已交道之心一旦得遇昆弟親戚之愛又自思之而夫人之身宜如何以報謝將報謝復與執事何所補哉然有意益厚違命固難者則不敢書具式託之於韓繁秀才風雪滿硯不獲多書天下固有良時既去而悲歌嘆泣之不同故當時則嘆已去而泣過時而歌然君子居其位則恥聞之不在其位則恥不能言之其為士君子之心不忍聞之與聞之而不忍棄之則一也夫思慮可以精安危步驟可以負戈殳彊徑莊勇持久有守臨事不亂然而良時不與斯不得不嘆既而信不見任知不見謀周遊而晚歸風雨相半苦其精力良時不集而畏事之不成斯不得不泣及其田園已暮始反鄉里白頭無成或反自疑斯不得不歌是其為人皆有憂天下而欲用其道者也不私其身之安佚而休者也既不私其身則公於悲歌者歎泣者也而是人豈以富貴而後天下之心哉蛻也歌之則己太蚤泣之則不得不豫計嘆之則正當其時而君子未聞雖然閣下及其少壯而用之無使後時泣歌恥纍君子幸甚太元曰當時則貴已用則賤其不可後也已矣况當今巖無人矣溪無人矣佐王活人之術一皆以文學進苟文學進而君子不動心則蛻也不知其所以得罪所謂大丈夫豈天使為之哉以其進為天下利退有百世名顯為諸侯師默成萬世法而已為退默者為避人得時而退默者為自進為進顯者為必行不得時而進者為失志是以雄才盛德不可以不兼其時故無其時不可行也有其時而志未達又不可行也志達而未信於天下又不可行也上位之人有不可故下位之人有踰垣塞牖而自遁者又豈惟退默而已矣方今天下百姓不敢爭步畝四夷不敢犯守陲自元和已後國家不傷一夫不亡一矢雖有豎子弄兵曾無根穿皮蠹之患尋己伏誅然而閣下不謂無其時乎昔雍邱不能以才達求討吳蜀以自試班超不能守其家儒然後得官校尉夫文家之不遇清世不免操弓矢而擐甲胄也今則仕由文學著官自清顯尊閣下不謂志未達乎夫南海實管榷之地有金珠貝甲修牙文犀之貨非茂德廉名國家嘗重其人閣下不謂未信於天下乎當其時士亦故不以天下之廣居自隘其身不以天下之道自負以不知已故賂媒請介則不忍為守媒待介或有所自棄故退默者不得不自進矣閣下以為時乎未可也嗚呼蛻之生於今二十四年雖天有南無可置其門雖天有東不得開其序伏臘不足於糗糧冬夏常苦於皸濕然而因時著書滿十卷自謂不有得於今必有得於後不有得於人必有得於鬼神今則力疲而天下笑日暮而郵舍閉今閣下進為天下利而又顯為諸侯師之時奈何得為踰垣塞牖之蛻乎故先自棄南嚮再拜不勝懇懇窮泰有時未可知也謹貢舊投刺書一卷以其最近於情雜歌詩共二卷以其頗有逸事伏惟周賜觀覽無憚僇笑男子生而射四方所以有四方之志故懷其道不可以退已非其人又不可以動心今蛻也伏念仁人在位野無君子不敢隱忍自置削簡授僕夫堂上猶遠况千里之悠悠哉亦將天未甚棄果遇閣下響不私岸谷與高下為應不戮其使得復廬下而又重幣厚辭素未嘗遇知者嘗為齊桓公之明活俘而相晏平仲之賢贖隸而友夫俘未至而鮑子先言之桓雖智不逮安得勿相隸未言而晏子已見其色雖智不逮安得勿友豈如左右無先言之人閣下未見蛻之色而與之歎息乎與之教道乎然後心因閣下而動己為閣下而知不復遺恨幸甚幸甚雖然敢不再拜以謝知己而自道其所得罪蛻早不量己嘗欲與其道以死生樂之自以得其位即欲立殊節於君友不得其位即欲垂長幅於後世然而以為身屈則道不勝語卑則道不明以其喧譁不敢安己矜道也不敢矜於口也伏惟閣下以忘道而圖己孰若道勝而已勞乎從俗而飽其親孰若道在有君子而後顯其親乎閣下不以行已失態天命拙塞乃復書問曰恃才傲物歟論議險直歟儕伍擠毀歟夫承貴仕之後身尊而食足然踞辱卒吏猶有陷人於急况蛻近世無九品之官可以藉聲勢而又當時無綿絡之舊無一簞之食設有乘人之氣而窮賤奪其氣矣何能為也使蛻一旦為病狂妄人而行之俄而自成怪笑不止人之怪笑也然則希權門以媚嬖媵隨衆口以贊曲私瞻視行坐傾身預起則信乎對南面如濠壁之相峙也如此豈曰恃才傲物乎險直之在己不得其人而盡言之則有殺身磔尸之禍得其人而盡言之則有忠義諒正之名使蛻前不得其人而言之則身死已久得其人而言之則安得困而至此故豈曾論議險直乎蛻伏以冠衣不完潔趨拜未識威儀又伏念春秋時四人受縣而後見魏子則古之人之見也其不在受恩之後乎謹重遣前使以謝殊遇以結後計蛻再拜今日街東見詔書以執事拜右拾遺朝廷之意將有在擇能言者而使之言哉雖執事材氣壯健它日無不乘之若驟以地遷邪未嘗有也故蛻謂朝廷之意將有在也魯欲用樂正子為政孟子聞之喜而不寐僕不止為執事且為天下不寐也丞相致主上復貞觀之業自此敢伺察者必得伺察敏口舌者必得口舌舊所嫌忌出棄者稍稍引用蛻幸未老一二年得見朝廷治平著歌謠為訓詁也然人世幾何時不可遭伏惟執事飲食起居無忘丞相意臨其事不能苟有待而先自請者閣下以為難乎贊功論美近乎諂飾詞言已近乎私低陋摧伏近乎鼠竊廣博張引近乎不敬鉤深簡尚則畏不能動乎人偕儷相比又畏取笑乎後情志激切謂之躁詞語連綿謂之黷夫臨其事而自言者其難如此也然不有聽者之明言者無病則固當背惶踖踧俟乎知者而自知也用者而自用也安得持一言於已難之時者哉然或不得己而言之者亦將自言而已矣又豈敢因其時而遽言大體哉蛻少時不知小人通生有自可之事樹之為梔茜種之為穀粟賈於市釣於江亦以老也無何羅絡舊簡附會時律懷筆啓於縉紳家十二三年矣謂丱而習之齕而成基壯而歷級乘時無難梗寒苦之疲今者欲三十歲矣所望不過抱關輸力求粟養親而已何者家在九曲之南去長安近四千里膝下無怡怡之助四海無強大之親日行六十里用半歲為往來程歲須三月侍親左右又留二月為乞假衣食於道路是一歲之中獨留一月在長安王侯聽尊媒妁聲深况有疾病寒暑風雨之不可期者雜處一歲之中哉是風雨生白髮田園變荒蕪求抱關養親亦不可期也及今年冬見乙酉詔書用閣下以古道正時文以平律校郡士懷才負藝者踴躍至公蛻也不度入春明門請與八百之列負階待試嗚呼蛻也材不良命甚奇時來而功不成事修而名不副將三十年矣今而後閣下進之蛻亦得以至公進閣下退之蛻亦得以至公退進退者由閣下也未可知也干瀆尊嚴敢忘僇辱情或須露豈曰圖私不然則蛻也豈敢蛻再拜蛻性甚冥頑識不及高嘗以當今由文學求用遲其顯遇在執事未知如何蛻輒自愛而庶幾不惑也故進不暇視地食不及卒哺起居不忘於文窮泰不忘於文雖分不出畛實愛且專也執事以為愛乎未也蛻為人子二十二年唯初七年持瓦石為爼豆戲其餘卒不離前之志也執事以為專乎未也伏念方今人人自謂力然沛若有餘今日以執事如重星輪月爭下堂而觀之畏已後耳宜乎人之心適在往越而使去有人正從越來執車而問於路執事以為可教與否如曰吾幸知其徑途安得勿教則執事正可以其手呼而指畫也果遇他人以其有往而猶不逆則蛻云所愛而專者有謁執事之餘勇也深如此而已可則道合而服從不可則道異而更學蛻早懷忿懥常有所欲言而卒不得發今雖蠱惑病妄猶將自復其意况逢足下以中正許身以仁義自任者乎伏以釋氏之疾生民也比虞禹時曷嘗在洪水下比湯與武王時曷嘗在夏政商王下比孔子孟軻時曷嘗在禮崩樂壞楊墨邪道下然而聖主賢臣欲利民而務除民害如此其勤也今釋氏夷其體而外其身反天維而亂中正自晉以來相率詭怪而往之半天下而化其衣冠苟未往者不其欺亦不資其生矣聖人之教棄不相守者幾數百年唐初有天下以為刑政禁民乘間作詐僞以欺刑政果所不能公禁之也故寖護其事以愚其民為殃罪疾苦隨所作詐僞而及諸身也是欲教化固天下之心以助行政教化之一道耳今天子聰明以為中正衣冠之所棄則刑政教化亦無所取故絶其法不使汙中土未半年父母得隸子夫婦有家室是以復出一天下也僕故謂其功業出禹湯武王孔子孟軻之上萬萬不類然而洪水開則有禹貢商周平亂則有誥誓孔子孟軻則至今歌誦之足下以文用於時為百家所託善惡焉其不為則已若為之斯其時也勿疑夫立言者不唯能言亦欲言得其時得其時不汙若奚斯史克者也無其時雖多述前事猶有譏焉僕早傳古學身處草野知其時而無位敢言又竊見足下未有其意故以移云漢武帝聞子虛賦初恨不與相如同時既而復喜其人之在世也若然者居蓬蒿而名聞於天子富貴固不足疑其來爵土固不足畏其大今按其本傳云官則止於使者居家初則甚貧嗚呼有才如相如有好才如武帝然而不達者蛻知之矣於時武帝以四境為心中國耗弱爵土酬於謀臣金帛竭於戰士雖念一篇之子虛固不能減十夫之口食宜矣蛻也生值當時天下無事以文爭勝得居第一獨蛻居家甚困白身三十過於相如者蓋無人先聞子虛於天子今又不然使有聞之於今藩翰大臣則其人自不廢棄老死者也嗚呼時異矣事古矣相如之時雖遇天子不能致富貴於今之時遇藩翰大臣則足以叙材用伏惟執事以文學顯用士之得失無不經於心謂小子之言何如哉太原王生嘗移耆老書以江陵故楚也子胥親逐其君臣夷其墳墓且楚人之所宜怨也而江陵反為之廟世享其人丸謂耆老而忘其君父也吾以為不然楚人之性慓悍大能復其人丸讐其後自懷王入武關楚人怨秦不忘干戈况其人之性能忘胥之所以破其國家而事之乎且今江陵之人牽牛羊而祀其廟者將祈年穀而獲凶荒禱疾病而得死亡者乎如厚其餼而虛其報則江陵知胥之不可祠而不祀矣若果祈年穀而得豐穰禱疾病而獲康強有其餼而尋其報則破人之國而居其土辱人之君而受其饗遇一食而自忘楚人之殺其父兄則胥自為無勇也何獨江陵之人而忘習讐乎吾以為其廟申包胥之廟也包胥有復楚之功年代寖遠楚人以子胥嘗封諸申故不謂包胥耳不然則子胥何為饗人之食而江陵何為事仇人之神乎耆老得書速易其版曰申胥之廟無使人神皆愧耳昨日送貢士堂上得觀大禮之器見籩豆破折尊盂穿漏生徒倦怠不稱其服賓主向背不習其容嗚呼天下所以知尊君敬長小所以事大者抑非其道乎天下之用其道不過於一日尚猶偷惰如此况天下尊君敬長能終日者乎是以朝廷時誅不順鄰里日起紛爭固當然也夫布衣匹夫始則用其道自達故化耕稼而王侯化陶漁為公卿其變化不測若此然而一旦居上位既不預興俯拜揖之事尚不能素嚴有司時閲其威儀乎嗚呼則蛻謂王公大人耆老衰罷固當然也然而有擎跽稽首於矒褐之前畏敬戒慎有終日不敢嗜酒殽不敢近妾婦者其于誣惑之道尚能去其情自化之術則不能一日勤其容唯王公大人無慚矒褐乎矒褐尚能自大其法王公大人反以其道信之乎即其奉矒褐能速化其耕稼陶漁者則矒褐者可以有土地而制王公大人矣是不知升乎科者不由夷狄言遷乎資者不由矒褐授昭昭然奈何哉抑不知孔子之道如商君乎以其法自敝也伏惟閣下務速有司按諸禮圖修其器服戒將事而隳者時訓習之毋使每歲臨事而隳其容幸甚幸甚蛻再拜於西華主之降也其三月辛卯夜未半野水入廬漬壞簡策既明日燎其書有不可玩其辭者噫當初不能自明其書十五年矣今水之來寇余命也已矣故自褐衣以來辛卯以前收其微詞屬意古今上下之間者為外內篇焉復收其怨抑頌記嬰於仁義者雜為諸篇焉物不可以終雜故離為十卷離則名之不絶故授之以為文泉泉之時義大矣哉蓋覃以九流之文旨配以不竭之義曰泉崖谷結珠璣昧則將救之雲雷亢粢盛乾則將救之豫豈垂之空文哉自辛卯迄甲午覆研於襄陽之野不得時者之言太古也無為而人化其禁畏也以使待令而從之也夫既為之君又為之師以受令而教其供也畏生而自禁畏令而後從則是不待君令而為太古時人也既君令之不立與人且猶不辨孰能得人心而化其無為哉夫天下之服一人也必其有所相須果身服歟自化也己果心服歟而心無為也已誰為太古之人也而勤何居焉夫庖犧氏之用契書也始代結繩則太古之政安用契無為之心太古之家安用契無為之信果使有其心則是賤教而尚不教者也夫人之祭也必待詔相教而後能敬若豺獺也則不教而祭君子苟受其不教而能則豺獺亦敬也何貴人為故曰不得時者之言無有天下而不知秦之焚書也無世而不謂不用聖人之道所以亡也嗚呼秦亡自亡也安能焚書為秦亡耳天下不用秦如聖人之道故秦不得其道而用也當其時天下一家而尊己外無非心之人故深法禁人之惡也則不當去法以禁人之善是則果習天下之離心而背已也豈秦區區之心歟蓋天必以秦之強暴非大敗無以叛其四海之心故先絶其事君敬長之術而後從天下以亡其天下焉夫天與秦則書存不與秦則書焚而秦終無自焚之心也且聖人宮先自藏其書是秦未始有焚書之心聖人之家先有其心矣故曰秦亡其自亡矣且聖人之道與天地合其久與鬼神合其微則不得毀置之在秦也久矣陶唐氏之水前有聖人之化後有聖人之勤而後民知事君敬長之術自秦之火前聖已遠後聖不作而其術不數世亦已成矣豈非天之欲有絶而先絶其術欲有立而先立其術歟今或怨秦之火不全其道也不知秦火息矣古之記惡將以鑑惡而後世為昏諛淫逆徒而將徵於古謂古不盡善若其涕泣以信其詐罪已以固其恩陰謀反覆從書以滋其智矣然而記惡者將以懼民也去善者不足懼昔紂讀夏書而嘗笑其亡國嗚呼惡既不足以鑑則刊可也古無其迹可也無其迹可也小子出都城見邑大夫為民之禱者屬石燕不飛商羊不舞民有焦心請大夫祈龍波祠以厭民望役巫歌伶吹竹鼓栧呼空者訖唱屢夕俄然微灑輕霎若神之來意似憫巫之役是也作辭以弔民云公邑之南兮禱龍之潭空波鄰天兮雲物中涵鱗颸縠碧兮淵怪相參風翼輕翔兮帶直煙嵐吏不政兮胥為民蠶政不繩兮官為胥酣彼民之不能口舌兮為胥之緘進不得理兮若結若鉗陰戾陽返兮民之不堪爍日流焰兮赫奕如惔奫泉沸涌兮如湯而炎役巫女兮鼉鼓坎坎平聲叶韻風笛搖空兮舞袂衫衫胥不虔祈兮官資笑談胡不戮狡胥兮狥此潔嚴胡不罪已之不正兮去此貪婪荷天子之優祿兮胡為而不廉又何役巫女而一作兮禱此空潭吳郡朱氏言昔之夜夢龍入井客之好誕者作佳占以祥朱氏豫曰豫未嘗識周公孔子者也然而使豫得夢一丈夫苟冠衣之古者因謂之周公孔子人必知其自欺也未嘗識越不知越之城郭宮室途巷苟或夢之未可自知其何城也然則朱氏之所夢入井者朱氏安知其龍乎豈非嘗見畫工者屈其脊拏其爪施甲鬣雲氣於身則似乎其所入井者邪是朱氏之夢畫者也殆非夢龍矣自夏后以來人不見龍然而言龍者信其畫而已漢魏之數見者見其畫者也薄姬之娠者亦畫者也時門之鬬者亦畫者也史皆謂之龍且明史之妄况朱氏之學妄哉夫龍不輕出又不可褻乎婦人有德不鬬故知皆非龍乎嗚呼龍以變化為德也故孔子曰惟龍也不可知是則德也而如蚓如蠖如蛇如魚未可知不為龍也或者謂如所畫亦可謂之龍也則朱氏所夢曾何龍乎以功不就而受誅則可謂勤民而死乎曰不然然則夏之郊也奚不尋其先安得以鯀配曰以功不就則不可謂勤民而死也以誅其身則可謂勤其家也不怨君誅而尋父功鯀當誅也傳曰不以家事辭王事既勤其家為天下故報其勤家於夏郊而已矣有鯀之誅而不廢其功禹為其子也不得以天下而擇其功者禹為之事鬼神也微禹之為子先人之罪將不食矣故其子之功由勤父嗣也然則夏郊宜矣于是君誅其怠也而子不怨其家祭其勤也民神弗畔蓋禹以天下不逮事其父而致孝乎鬼神云治天下之野見之於夏功而未見先於夏功者久矣夫八年之間生聚非不壞也委積非不耗也帝憂則民愁樂則民喜故以憂樂隱顯而助之常能治其心者故禹後雖以身先天下而不以一身負天下之土石以其得治世之心而易使也嗚呼必不得和心之人而為可以智治則豈羽山之下忍不以智獻其父者歟天下見濡手足之禹則不見土階之上以治憂樂者也故曰心治乎人也功治乎水也其可獨禹云乎豫於山上著書一十八篇大不復物意茫洋乎無窮自號為山書天地之氣復則結者而為山也融者而為川也結於其所者安靜而不動融於其時者疏決以忘其及其及一作反故山之性為近正川之性為革為革為一作融是以處其結者有一作為君子處其融者為利人天地之先未嘗有形故字其形為人民為禽蟲萬物然後受其字據其形之動曰生形之靜曰死嗚呼我苟不生乎天地先而未嘗用其形竅以出納斯非混沌之似乎故吾以混沌不嘗在天地先而在我之不為萬物鑿者而已矣壞人者天地也使其數出故觀數以象動則有爭殺亂患夫數始乎手足故離吾之指為五視其指而心亦離則數數入乎心矣故知指生六而為有餘生四而為不足不足與有餘也為體不備嗚呼心既分身之有餘與不足也則爭殺亂患何嘗不足盡其數出聖人重其生以榆出光濟其用故甘羶之臭出於榆末而後網罟不足於野以牢養於宮中故天下忘身以自給嗚呼上古食而棄其餘一作榆熱而棄其皮亦足矣是知聖人欲化而更亂其死生聽鳳鳴而吹管果象也故有象竹之聲者必有象葭之器然則造其為一作鳴而恥葭學者鳳也故不世而來造其象而恥人學者聖人也故末世而不出嗚呼江河鑿而山木泣以為川既出而必伐舟也舟既入水而蛟魚相市以其居泉而遠於殺者也今則造泉之具成是大道存而異其質大道亡而運一作連其禍利以觀天下利盡而天下畔道以歸天下道薄而天下去嗚呼為利物所間一作惡為道亦不僞故始受其應者終亦將以應人然則利盡所畔者必滅其後道薄而所去者貴不殺其孤而已城郭溝池以固民也有竊城郭溝池以盜民者則殺人甚於不固夫有竊固之具必有攻固之利苟有利之物寇必生其下是以太古安民以巢故於野則無爭巢固民則相殺車服妾媵所以奉貴也然而奉天下來事貴者賤夫有車服必有雜佩有妾媵必有娛樂聖人既為之貴賤是欲鞭農父子以奉不暇雖有杵臼吾安得粟而舂之嗚呼教民以杵臼不若均民以貴賤古之弓矢所以防惡也懷惡者在內所以能避一作持弓矢也故射惡未及死而奪械可以殺人於天下天下從而禁畜私械者嗚呼古之弓矢所以防惡也今則不然反防人之持弓矢也萬物無常聲而主聲者定其悲歡則聽在心而耳職廢也謂雷為可畏則以畏聲聽之不知有時雷可長養也謂瑟為可狎則以狎聲聽之不知有時瑟可流哀也則有幽思之深砧聲之悲也去家日遠雨聲之愁也嗚呼悲愁果在心也雷與瑟無常聲也為學豈有歲故勞於農夫以其有遇世也故佚於使人然而雖佚不忘學以其勞而未嘗遇是故死而不得止一作正其心古有志者猶悲日月之易於人也故謂飛烏走兔在其中付大藏之鑰未必有信之友也夫取人之鑰必薦信以入其中受人之託必有情以寄其內故大信者不使人付一作信有道者不使人求棺衣之厚葬以王禮百姓不貪其死以其愛名不甚於愛身任時之重必多怨借君之權必易死是於名則君子愛身不甚於百姓焉聖人有意哉故勸善以爵使利爵者樂修夫惡殺人與殺盜鈞為仁人之心則亦召盜以爵嗚呼使聖人無意則勸善不以爵矣故君子為善不獨樂欲為一作與聖人而出是以見仁人之術使爵以召盜乎食秦人之炙則懷其妻子聞秦婦之嫁則垂涕悲其身當是時亦疑天下之妻矣吾過富貴之門則懷其爵矣及聞秦人有以爵死者則垂涕悲其身當是時不顧天下之貴矣有惡雀鹿之甚者揮帚以驅雀結罟以禁鹿夫帚罟既可以駭物則帚罟必足以取物嗚呼執其具以逐雀鹿安知不有學其具以取之故善去惡者不必惡其名善逐者不必示人以其具猿鳴不過薜蘿以其有蔓蔓者必組物夫能過其組必自硋一作駭其心嗚呼髻之組吾髻也帶之組吾腰也線之組吾衣也亦是矣今蔓在天下安得復硋一作駭其心哉謹案題云一十八篇文祇十六篇當有闕誤功以救於民賴其功者有違順德以化於民敦其民者有疾徐夫以三月除穀地五月穀入土雖當世不拔其苗後世不毀其穀其飲食之道順於情也故生不疵癘其道死則俎豆其功聖人救壞以禮垂世以法當世伐其樹後世毀其法所以禮違其情法違其欲者也是以生為旅人疵癘於天下肉腐於俎酒乾於器然後為聖人是愚民賴聖人之功忘聖人之道嗚呼禮亡而爭器矣雖有粟弱者安得而食之法壞奪其三時矣雖有山澤農者安得而種也盜惡名也取之有以合聖人若取其亂而理之取其死而名之則民樂其取也後豈擇其故歟故昏夜之盜為小人衰亂之盜為丈夫能知其取者而嘗蹈其背也故不以無人而棄其守者有大棄天下者仁義盜其名有小棄其國者小人有盜其器故春秋不貶其器聖人以正其名嗚呼盜非惡名也左右前後亦可懼哉叟行山逐禽而逢虞人虞人反以罟而獵叟叟欺虞人以事鬼神而得逸他日叟之子壯圍山而讐獵吾父者曰今日凡在山澤殺無赦虞人亡于大澤虞之父教之以漁漁利厚于罟末之年富於澤上反聞叟將殺其子于帝側帝教之以漁天下天下之利厚于陶稼末之年富于九州漁者常以此自笑而聞于士師士師以法執之漁者對曰始臣學漁不學笑天下而天下又臣笑舜聞之亦曰始朕學事叟不學受天下禪而天下禪朕晦冥之後漁者啼而奔帝辛曰始風微水上魚聚臣舟臣垂之十鉤魚方眂臣鉤未及吞而雷驚臣舟夫雷不發而震盍戮于燮理者辛應曰爾不得魚市不闕魚亦殷人得魚耳夫多魚而垂之十鉤魚必爭而且威後其餌然而猶相與眂其鉤豈非君其餌薄乎何戮之有微子自旁聞之亦曰殷餌薄矣臣不受戮殷民驚矣抱祭器而入周暮有二舟還而爭一舟于中流空舟中者恃其無傷舟中也則盛鬬以薄兩舟果與俱覆明日訟于王王以其罪均也乎于二漁既而空舟者歸告其子曰吾勝矣覆彼所載載魚者歸亦告其鄰曰吾勝矣其鄰笑曰罪均而子獨覆所載孰謂勝乎有置魚于葦間仰見鳴鳶集其上乃冠木于器旁以懼之明日澤西漁者乃刻材澤畔前日置魚者目眂而去而三年不敢漁其妻笑曰始僞以紿一器之魚學僞得盜一澤之利會昌甲子歲豫于西塞巖下見版洗而得漁父書七篇尚多古文然其三篇甚怪妄淺近類詞賦今皆捨之其四篇豫特為之箋正其文字然前二篇文有高致後二篇則託寓鄙狎以其頗有譏勸余亦存之然不知其年代故謂之古漁父吁三閭大夫之事司馬相如班孟堅各有言蛻不載故也噫大夫之賢懷王之事蛻得之涕泗下衣濡毫瀝辭集作血噫大夫之為臣千萬年其誰肖宋玉淮南王劉向東方朔王褒繼有悼語蛻一小儒也思賢人之作悲哿人之佞著弔屈原集無原字辭三章弔公之志也雨濛湘波浮楫搖歌既集無既字而悲伸紙波辭祈公兮采之悵二之淚竹圓紅滴滴兮臨乎湮沚竦枝與修幹兮吟哀風之不已搖徑節而錦舒兮垂高蔭而自美招翔鸞之與翠鳳兮緝晴霞之數里繁柯重乎舜祠兮瘦影謺乎湘水諒高節之自任一作佳兮匪庭篠之云比鄙衆蔭之延接兮恥凡羽之棲止入清溪之浪聲兮無笙簧之相擬恨葉翻波兮騷屑之風露滴煙蒙兮濯纓之子悵靈均之節兮依然想貞姿兮千年若此清江之上兮心夷猶清江之下兮煙波浮風軟雨絲兮湘波高雲昏竹暗兮鬼神愁遠霞開兮鳥文苑作烏帆隨碧江平兮歸楫移帶隱虹兮衣凝雲披一作被薜荔兮扈江蘺歲華高兮水東注秋色下兮紅蘭渡瓴甋合兮荊和喪岐鳳翔兮龍媒去又曰心既潔兮道雲端水之浪兮人之一無之字波瀾浪可平兮人心不可平波瀾一翻兮孰測其情水之深兮不曰深悵前恨兮淚沾襟招湘靈兮澄瀾之渚雲蔽煙沈兮明月之浦唱宵歌兮撫雲璫擊鳴桹兮薦清醑鸞去鳳飛兮雲不歸九疑謺翠兮橫湘雨颯輕揚兮揚微波激楚怨兮下湘娥緝荷蓋兮集雲壇潔桂席兮紉芳一作奠椒蘭霞為裳兮瓊為珮舉雲旗兮持風幡若有來兮窸窣敲懸珂兮珊珊張孔蓋兮臨瑤臺月凝袖兮雲裁冠目兮千里春悵一作恨無言兮蒼梧濱戢蕙帶兮握芳芬撫一作拂瑤琴一作瑟兮淚斑筠乘桂華兮下清湘拖無一作金波兮涉滄浪一作茫九疑之翠兮不可尋懷沙之水兮恨之深文冢者長沙劉蛻復愚為文不忍去其草聚而封之也蛻愚而不鋭於用百工之技天不工蛻也而獨文蛻焉故飲食不忘於文晦冥不忘於文悲戚怨慣疾病嬉遊㣥居行役未嘗不以文為懷也適當無事而天下將以文為號文明代生殖明晦皆效文用故日月星辰文乎旗常昆蟲鳥獸文乎彞器徐方之土文于侯社夏翟之羽文於旌旄登龍於章升玉於藻百工婦人雕礱染練以供宗廟祭祀之文用豈獨蛻也生知效用不及時文哉然而意常獲助於天而不獲助於人故其窮雖窮無憾也當勤意之時不敢嚏不敢咳不敢唾不敢跛倚嗜欲躁競忘之於心其祇祇畏畏如臨上帝故有粲如星光如貝氣如蛟宮之水又有黯如屯雲如久陰如枯腐熬燥之色則有如春陽如華川逶逶迤迤則有如海運如震怒動蕩怪異夫十為文不得十如意少如意則豈非天助乎帝欲使天下聞之而必行覩之而必蹈散之茫洋以為道演之浸淫以及物然後為農文之使風雨以時兵文之使戎虜以順文于野文於市使得其所幽隱之士以出口者使之言材者使之用然而自振者無力終知者甚稀豈非不獲於人助乎嗚呼十五年矣實得二千七百八十紙有塗者乙者有注揩者有覆背者有朱墨圍者於是以周易筮之遇復之同人筮者曰鳴於地中殷殷隆隆七日其復復來而天下昭融乎他日更召龜而令之將聽襲吉卜於火如秦兆惟曰不吉卜於水不成乎河洛兆則亦惟曰不吉卜於土而閟之土叶吉纍纍為冡則汲之兆乎峭峭為壁則魯之兆乎且其占曰土之文為山河為華英將不崩不竭為滋味而傳乎結為邱陵為其設險乎融為川瀆率其朝宗乎華為百穀以潔祭祀之粢盛乎不然使其速腐為墟壞生芻藳以食牛羊乎化塗泥為陶方瓦以作器乎將塊為五色而茅社分封乎流於樂為土鼓為桴以泄其和聲乎夷為都邑以興宮廟坎為汙池以澤生殖乎祀為壇竈乎窾為井墓乎吾皆不得而知也當既不為吾用惟速化為百工之用慎無朽為芝菌以怪人自媚慎無堅為金鐵以作貨起爭慎無潏為醴泉以味乎諂口慎無禱為城社以狐鼠憑妖慎無聳為良材以雕斫傷性慎無萌為蘭茝以佩服見褻嗚呼介而為石使之能言舒而為蚓使之飲泉既而他年遊魂之未返者亦命巫師而弔三招之號曰在几閣而來歸兮奄為塵垢在耳目而來歸兮奄視聽汝醜在口吻而來歸兮譽不汝久噫絶筆之年而麟見祟文其無祟乎唅非珠玉斂無裙襦後世詩禮之儒無驚吾之幽墟其冡也在莽蒼之野大塊之邱時有唐大中之丁卯而戊辰之季秋銘云文乎文乎有鬼神乎風水惟貞將利其子孫乎
