front:
  text: 全唐文欽定全唐文卷一百四後唐莊宗二
  hash: sha256:27d3d674608d7cf554bbbc35e4afe28e1d96adbf1f9b2340c9e3506d46dc78b3
body:
  text: 邇聞京百官俸錢至薄骨肉數多支贍不充朝夕難遣偽庭時刻削嚴急不敢披陳今既混同是行優恤下御史臺在班行有欲求外職或要分司各許中書門下投狀奏聞爰遣內臣遠頒成命師號既旌於戒行紫衣無爽於受持久屬當仁匪宜多讓朕親驅義旅徑下偽庭凶讎雖已翦除內外或聞騷擾貴行招諭以示綏懷應諸色官員並仍宜舊勾當當軍百姓各自安居永無勞弊之虞共睹昇平之代如無量之輩扇動人心便仰密加追捕嚴行處斷貴從寧謐當體朕懷朕猥以寡德謬荷丕基順天行誅因衆除亂刷宗祧之大恥快億兆之歡心車書將致於混同寰海漸從於開泰所宜樂虔清廟禮答圜丘已定良辰率遵舊典朕取今月二十四日幸洛京十二月二十三日朝獻太微宮二十四日朝獻太廟二十五日有事於南郊經過州縣隨事供備不得妄有侵擾百姓應諸處節度防禦刺史等不得遠赴京都擅離治所務從儉以副朕懷朕大平國患顯紹帝圖廓天地之妖氛救生靈之塗炭方懷至理永保鴻休敦去華務實之規成革故從新之化足可塞僥倖之路絕繁費之源協我無私告爾有位應隨處官吏務局員寮諸軍將校等如聞前例各有進獻直貢奏章不唯褻瀆於朝廷實且旁滋於誅歛速宜止絕以肅風化左降官均州司馬劉岳有母年踰八十近聞身故既鮮兄弟別無骨肉孤魂旅寄誰為蓋棺準本朝故事許歸終三年喪服闋如未量移即赴貶所李德休譽洽朝端任隆臺憲將舉行於舊典請刪定其法書載閱申陳備見公切自十數年來屢經戰陣殺傷暴露有足閔嗟其德勝寨莘縣楊劉鎮通津鎮胡柳陂戰陣之所宜令逐處差人簡收骸骨埋瘞取係省錢備酒紙招祭以慰亡魂當聖祖舊殿生枯檜新枝應皇家再造之期顯大國中興之運同上林仆柳祥既協於漢宣比南頓嘉禾瑞更超於光武宣標史冊以示寰瀛宜委本州太清宮副使常加簡察兼令功德使差道士一人往彼告謝仍付史館編錄頃以未平國恥須運戎機十年親統於驍雄千里久違於定省寧辭櫛沐嘗切晨昏今已翦蕩元凶宅居中土仰禀庭闈之訓獲寧宇宙之心恨不得躬詣汾川攀迎法駕皇太后遠涉山阻將及近畿朕何以端坐闕庭為拘常禮雖云舊制未叶斯懷朕今親至懷州奉迎朕自雀臺創業兔苑平凶救生聚之倒懸俾寰區之反正凡云機密深繫憂勤每事多委密司權令決遣貴無停滯要速施行今則四海一家萬邦同德中土之宸居顯定圜丘之祀禮方終既整皇綱合依舊制使百官各舉其職庶事不失其宜貴合通規以成永例此後應有公事何色件合歸樞密院何色件合付京百司至於軍幕之中並在精詳分擘內外免侵其職分高低貴叶其規程其或百姓軍人事關爭訟先經州縣都將須依次第披論或致淹停可詣臺省至若懷冤抑要達禁庭即許投狀匭函別議申雪此或情非的確理涉僭踰推詰有聞必行朝典兼有衣冠士族參選官寮或獻所業文章或述從前行止因依駕幸抵冒乘輿希望恩榮隨張物體更有軍人百姓亦敢將狀衝突須各示條章絕其容易宜令御史各下諸司河南府及諸道分明曉示訖其本朝百官有司所行公事仍令御史臺各取狀申中書門下朕禋祀天地朝享祖宗百司各具其威儀郡吏遂蒙其置攝希因霈澤以錄微勞然而躁妄之徒經求競進參雜之道真濫莫分勘職名則半是冗員語人數則又盈千計若無簡舉並與寵榮不惟開僥倖之門兼恐撓銓衡之務須明條例方別等差應諸司行事官並付三銓各遣取告勅考牒解繇入仕歷子等磨勘如文書盡備只欠一選者便與依資注官欠兩選者與注同類官欠三選四選者與減一選欠五選至七選者與減兩選欠八選至十一選者與減三選一奏一除未合入選門者許自同光二年數本官選數滿日赴集其太常寺先以白身差攝本寺官應奏祠祭勞考稍深者追取元額補牒勘不虛即與正授如因大禮差補行事有前任官及出身者即須準諸司例追告勅磨勘其諸色黃衣欠兩選者與減一選應官資已高不合銓司注擬者亦委子細勘送名中書門下如全無文書稱失墜官告勅勅甲又無證據只有格式公騐并諸司諸州府公憑及試授官文牒兼文書過格年月深遠者並宜落下所冀官無濫受恩不虛行選舉二門仕進根本當掄擇於多士全委仗於有司苟請託是從則踰濫斯極況方行公事已集羣材須行戒勵之文俾絕倖求之路宜令吏部禮部掄材考藝必盡於精詳滅私徇公無從於請託仍委三銓貢院牓示省門曉告中外史館提舉赦書節文購求經史頗為允當宜許施行今宜添進納四百卷已下三百卷已上皆成部帙不是重曡及紙墨書寫精細已在選門未合格人一百卷與減一選無選減數者注官日優與處分無官者納書及三百卷特授試官朕祗膺大寶虔奉鴻名勉承夷夏之心以副天人之望雖德音尋降赦宥近行猶恐恩有所未孚德有所未洽自朱溫劫遷昭宗至洛京已來內外臣寮有無辜妄遭刑戮者更宜廣令搜訪各與次第贈官如有子孫並委敘錄治國之由安民是本如聞今歲麥田雖繁而結實不廣其四京諸道百姓於麥地內察種得秋苗並不徵稅應御史臺河南府行臺馬步司左右軍巡院見禁囚徒據罪輕重限十日內并悉決遣申奏仍委西京諸道州府見禁囚徒速宜䟽決不得淹停兼恐內外刑勢官員私事寄禁切要止絕俾無冤滯三川奥壤四海名區為帝王光宅之都乃符瑞荐臻之地周都始建卜年遂啟於延洪漢室中興即土是圖於遠大咸茲建極至我本朝壯麗可觀浩穰為最千門萬戶實為富庶之鄉接廡連甍宛有升平之俗而自偽梁僭逆諸夏憑陵尋干戈而虐用蒸黎恣塗炭而毒流草木依憑兔苑嘯聚梟巢遂令輦轂之閒鞠興蕪沒之歎朕自削平大憝纂嗣丕圖重興卜洛之都永啟朝宗之會將資久遠須議葺修務令壯觀於九重實在駢羅於萬戶京城應有空閒地任諸色人請射蓋造藩方侯伯內外臣寮於京邑之中無安居之所亦可請射各自修營其空閒有主之地仍限半年本主須自修蓋如過限不見屋宇亦許他人占射貴在成功不得虛占舉選二門國朝重事俱要精確難議權停宜準常例處分張全義首冠王臣心明佛性資善宏於淨衆增福聚於皇基將欲壇啟琉璃人銓鴛鷺實彰忠節宜示允俞大名重地全魏奥區成予定霸之基致我興王之業蓋以土田沃衍庶士忠勤載想夤緣得無睠矚近者頻令按察頗樂和平既堅望幸之誠宜舉省方之典取來年正月七日朕當巡幸東京買賣人所使見錢舊有條流每陌八十文近訪聞在京及諸道市肆人戶皆將短陌轉換長錢今後凡有買賣並須使八十陌錢如有輒將短錢興販仰所在收捉禁治諸道州府約勒見錢素有條制若全禁斷實匪通規宜令三京諸道州府城門所出見錢如五百以上不得放出兵吏部以臺省禮錢為名所司妄有留滯在京者遽難應付外來者固是淹延須至條流冀絕訛弊自此後特恩授官侍衞軍功改轉內廷諸司帶職外來進奉闕廷綾紙並宜官給無令收買舊例朱膠一切停廢禮錢亦不徵取又慮所司困闕人吏不辦食直糧課逐月兩司各支與錢四十貫文至於臺省禮錢宜特蠲減比舊數五分許徵一分其特恩已下並不得徵納禮錢仍令中書門下條流勅畫經過諸司無至停滯其官告如是宣旨除授及品秩合進呈者準例送回餘並送納中書門下點給付勅書到本司十通已上官限三月內印署了三十通已上限五日五十通已上中書門下與催促如臨時緩急宣賜不拘此限少府監鑄造印文元屬禮部兩司無有推注停滯諸道使臣廣徵銅炭價錢納後別須邀索自此凡鑄印宜令本司限勅到五日內進呈不計諸道在京並不得徵納銅炭價錢所破料物並計數於租庸院請領仍預常給付價錢使盡計帳於租庸院更請或有故違必行憲典朕顧惟寡德獲嗣丕圖奉先之道嘗勤送往之誠靡怠爰自重興廟社載展郊禋旋蕩滌於瑕疵復涵濡於慶澤蓋憂勞靖國曠墜承祧御朽若驚涉川為懼繇是推移歲月鬱滯情懷恭念昭宗晏駕之辰少帝登遐之日咸罹虺毒遽殞龍髯委冠劒於仇讎託山陵於梟獍靜惟規制豈叶度程存愴結以彌深固寢興而增惕虔思改卜式慰允懷宜令所司別選園陵備禮遷葬貴雪幽明之故以申追慕之心凡百臣寮體朕哀感會計之重鹹鹺是先矧彼兩池實有豐利頃自兵戈擾攘民庶流離既場務以隳殘致程課之虧失重茲葺理須仗規模將立事以成功在從長而就便宜令李繼麟兼亠兊州節度度支安邑解縣兩池榷鹽使便可制置一一條貫所有合置官吏等亦委自使選差禮部所放進士符蒙正等四人既慊羣情實干浮議近令覆試俾塞輿言及再覽符蒙正並成僚等程試詩賦果有疵瑕若便去留慮乖激勸儻無升降即昧甄明況王徹體物可嘉屬辭甚妙桑維翰差無紕繆稍有功夫其王徹升為第一桑維翰第二符蒙正第三成僚第四亢陽稍甚祈禱未徵將致感通難避勞擾宜令河南府於府門造五方龍集巫禱祭徙市時雨少愆恐妨農事須命祈禱冀遂豐登宜令差官分道祈禱百神時雨尚未霑足宜令河南府徙市閉坊門依法畫龍置水祈請令宰臣於諸寺燒香關內諸陵頃因喪亂例遭穿穴多未掩修其下宮殿宇法物等各令奉陵州府據所管陵園修製仍四時各依例薦饗及逐陵仰差近陵百姓二十戶放雜差遣充陵戶備灑掃其壽陵等十二陵亦一例修掩可量置陵戶有善必賞所以勸忠孝之方有惡必誅所以絕姦邪之迹其或罪狀騰於衆口醜行布於近親須舉朝章冀明國法汝州防禦使張繼孫本非張氏子孫自小丐養以至成立備極顯榮而不能酬撫育之恩履謙恭之道擅行威福嘗恣姦凶侵奪父權惑亂家事從鳥獸之行畜梟獍之心有識者所不忍言無賴者實為其黨而又橫征暴歛虐法峻刑藏兵器於私家殺平人於廣陌罔思悛改難議矜容宜竄逐於遐方仍歸還於姓氏俾我勳賢之族永除汙穢之風凡百臣寮宜體朕命可貶房州司戶參軍同正兼勒復本姓罰罪賞功大朝常憲掩瑕宥過前聖格言工部侍郎李鏻宗正少卿李瓊等早在公途忝居班列靡思畏懼各犯刑章因補置官吏之秋見詐偽依違之迹自招罪狀合寘嚴科但以常預臣僚始當興復特示哀矜之旨俾寬流遣之文降秩趨朝殊為輕典推恩念舊所宜慎思鏻可責授朝散大夫司農少卿瓊可責授朝議郎守太子中舍諸司人吏授官從來只繫勞考年滿赴選方許離司近日已來頗隳條制到司曾無考課公事尚未諳詳便求薦論深為僥倖遂使故事都失蓋繇舊人不存豈惟勞逸之無均兼致司局之曠敗自今年除勞考滿三銓注官即許赴任非時不得奏薦如有注掌難重勞績可稱許本司奏聞當與減選或是顯然事迹在司年深齒髮祗役不任即許解職赴任餘切依格條處分凡窺奇異盡繫休明所獲錢文式昭元貺得一者佇歸於一統順天者式契於天心道煥一時事光千載殊休繼出信史必書宜付史館如聞天津橋未通往來百官以舟船濟渡因茲傾覆兼踣泥途自今文武百官三日一趨朝宰臣即每日中書視事霖雨未止恐傷苗稼及妨收穫宜令差官於諸寺觀神祠虔心祈禱仍令河南府差官應有靈迹處精虔祈止符習累居藩翰屢顯政能靜以臨人寬而得衆撫俗已彰於惠愛輔時又致於休徵因得和氣濳蒸靈芝遽產同九莖而表瑞比三秀以呈祥載閱奏陳良深嘉歎朕以蜀部封疆本是我唐境土爰從兵革遠阻江山當偽梁篡弒之時致宗廟震驚之難遂滋割據益遂便安雖行建號之謀乃是從權之道況復蜀主先父素是本朝舊臣常懷忠孝之心每俟興隆之運惟期恢復却效傾輸朕以初殄寇讎重興社稷撫諭之恩既廣憂勤之意常深須務綏和貴諧混一遂令元子兼命宰臣遠安徯后之心既協來王之願遐想王師行李已及彼地城池遠降詔書明行示諭料其素志必協夙心當符魚水之歡永保山河之誓偽蜀文武官寮等或本朝舊族或當代英賢或抱節於軍戎或著名於鄉曲久從暌隔常軫情懷宜知乃睠之恩各勵輸誠之節今已降勅命誡約諸道兵帥如西川果決歸降到城不得驚擾但思效順勿致懷疑本朝徵科唯有兩稅至於折紐比不施為宜依李琪所論應逐稅合納錢物斛斗及鹽錢等宜令租庸司指揮並準元徵本色輸納不得改更若合有移改須具事由聞奏請下中書門下商量別勅旨今歲自春以來水澇為患物價騰湧人戶多於西京收糴斛斗近聞京西諸道州府逐道皆有稅錢遂不通行乃同閉糶宜令宣下京西諸道州府凡收糴斛斗不得輒有稅錢及經過水陸關防鎮縣妄有邀難三川涇鳳秦隴等州縣官員數目極多其上佐官自少尹已下依本朝舊制各具見任員闕申奏其州判司準近制置錄事參軍司戶司法參軍各一員縣置縣令主簿各一員餘並停其出替選任一準三銓常式
