body:
  text: 夫天地之性惟人最靈者蓋以智周萬物惟睿作聖明貴賤辨尊卑遠嫌疑分情禮也是以古之聖人徵性識本緣情制服則有申有厭天父天夫故斬衰三年情禮俱盡者因心立極也生則齊體死則同穴比陰陽而配合同兩儀之化成而妻喪杖周情禮俱殺者蓋遠嫌疑尊乾道也父為嫡子三年斬衰而不去職者蓋尊祖重嫡崇禮殺情也資於事父以事君孝莫大於嚴父故父在為母罷職齊周而心喪三年謂之尊厭者則情申而禮殺也斯制也異於飛走別於華夷羲農堯舜莫之異也文武周孔所同遵也今若捨尊厭之重虧嚴父之義略純素之嫌貽非聖之責則事不師古有傷名教矣姨兼從母之名又即母之女黨加於舅服有理存焉嫂叔不服遠嫌疑也若引同爨之緦以忘推遠之迹既乖前聖亦謂難從謹詳三者之疑並請依古為當謹議臨淄辨闕一字學以致祿懲彼不勤見嗤朽木激之忠孝貽毀新穀政事登科而不庇族客問主人曰小戴之學行之已久康成銓注見列學官傳聞魏公乃有刊易又承制旨造疏將頒未悉二經孰為優劣主人答曰小戴之禮行於漢末馬融注之時所未覩盧植分合二十九篇而為説解代不傳習鄭絪子幹師於季長屬黨錮獄起師門道喪康成於竄伏之中理紛拏之典志存探究靡所咨謀而猶緝述忘疲聞義能徙具於鄭志向有百科章句之徒曾不窺覽猶遵覆轍頗類刻舟王肅因之重茲開釋或多改駮仍按本篇又鄭學之徒有孫炎者雖扶元義乃易前編自後條例支分針石間起馬胄增革向踰百篇葉遵刪修僅全十二魏公病㣥言之錯雜紬衆説之精深經文不同未敢刊正注理睽誤寧不芟礱成畢上聞太宗嘉賞賚縑千匹録賜儲藩將期頒宣未有疏義聖皇纂業耽古崇儒高曾規矩宜所修襲乃制昏愚甄分舊義其有注遺往説理變新文務加搜窮積稔方畢具録呈進敕付㣥儒庶能斟詳以課疏密豈悟章句之士堅持昔言特嫌知新欲仍舊貫沉疑多月擯壓不申優劣短長定於通識手成口答安敢銓量客曰當局稱迷傍觀見審纍朝銓定故是周詳何所為疑不為申列答曰是何言歟談豈容易昔孔安國注壁中書會巫蠱事經籍道息族兄臧與之書曰相如常忿俗儒淫詞冒義欲撥亂反正而未能果然雅達通博不代而生浮學守株比肩皆是衆非難正自古而然誠恐此道未申而以獨智為議也則知變易章句其難一矣漢有孔季産者專於古學有孔扶者隨俗浮沈扶謂産云今朝廷皆為章句內學而君獨修古義修古義則非章句內學非章句內學則危身之道也獨善不容於代必將貽患禍乎則知變易章句其難二矣劉歆以通書屬文待詔官署見左氏傳而大好之後蒙親近欲建斯業哀帝欣納令其討論各遷延推辭不肯置對劉歆移書責讓其言甚切諸博士等皆忿恨之名儒龔勝時為光祿見歆此議乃乞骸骨司空師丹因大發怒奏歆改亂前志非毀先朝所立帝曰此廣道術何為毀耶由是犯忤大臣懼誅求出為河南太守宗室不典三河又徙五原太守以君實之著名好學公仲之深博守道猶迫同門朋黨之議卒令子駿負謗於時則知變易章句其難三矣子雍規元數十百件守鄭學者時有中郎馬昭上書以為肅繆詔王學之輩占答以聞又遣博士張融案經論詰融登召集分別推處理之是非具呈證論王肅酬對疲於歲時則知變易章句其難四矣卜商疑聖納誚於曾輿木賜近賢貽嗤於武叔自此之後唯推鄭公王粲稱伊洛巳東淮漢之北一人而已莫不宗焉咸云先儒多闕鄭氏道備粲竊嗟怪因求其學得尚書注退而思之以盡其意意皆盡矣所疑之者猶未喻焉凡有兩卷列於其集又王肅改鄭六十八條張融核之將定臧否融稱元注泉深廣博兩漢四百餘年未有偉於元者然二郊之祭殊天之祀此元誤也其如皇天祖所自出之帝亦元慮之失也及服虔釋傳未免差違後代言之思宏聖意非謂揚巳之善掩人之名也何者君子用心願聞其過故仲尼曰過也人皆見之更也人皆仰之是也而專門之徒恕已及物或攻先師之誤如聞父母之名將謂亡者之德言而見壓於重壤也故王邵史論曰魏晉浮華古道夷替洎王肅杜預更開門戶歷載三百士大夫恥為章句唯草野生以專經自許不能究覽異義擇從其善徒欲父康成兄子慎寧道孔聖誤諱聞鄭服非然於鄭服甚憒憒鄭服之外皆讎也則知變易章句其難五也伏以安國尚書劉歆左傳悉遭擯於曩葉見重於來今故知二人之鑒高於漢廷遠矣孔季産云物極則變比及百年外當有明直君子恨不與吾同代者於戲道之行廢必有其時者歟僕非專經罕習章句高名不著易受輕誣頃者修撰殆淹年月賴諸賢輩能左右之免致愆尤仍叨賞賚內省昏朽其榮巳多何遽持一巳之區區抗㣥情之噂捨勿矜之美成自我之私觸近名之誡興犯衆之禍一舉四失中材不為是用韜聲甘此沈默也替否字協時京兆萬年人景龍中為左拾遺睿宗朝遷右臺殿中侍御史開元中纍轉潁王府長史天寶初卒年八十餘臣聞聖人廣視聽於四方納謳謠於九有者蓋欲以上通下達遠聞邇信元首惟聖股肱惟明若此則國可長久時無災害者也臣聞君上牧養黎庶莫不慎器與名畏怨重禍不激詭以求進不貨賄以要榮公侯伯子男五等各以功為先後卿大夫士九品各以德為次等劉毅無賣官之誚仲經無免爵之謠則格於皇天光於后土何風雨不順陰陽不和之有哉臣聞古之建官員不必備九卿己下皆有其位而闕其選賞一人謀乎三事職一人訪乎㣥司負寵者畏權勢之在躬求榮者避權門而不入故稱賞不僭官不濫士皆完行家有廉節朝廷有餘俸百姓有餘食下忠於上上禮於下委裘而無倉卒之危垂拱而無顛沛之患夫事有惕耳目動心慮作不師古以行於今者蓋有之矣伏惟陛下百倍行賞十倍增官金銀不供其印束帛無充於錫何愧於無用之臣何慙於無力之士至於公府補授罕存推擇遂使富商豪賈盡居纓冕之流鬻伎行巫咸陟膏腴之地一旦羊頭入興狗尾生謠將恐巍巍盛唐取議於後臣聞於古人曰福生有基禍生有胎伏惟公主陛下之愛女選賢良以嫁之設官職以輔之傾府庫以賜之壯第觀以居之廣池籞以嬉之可謂之至重也可謂之至憐也然而用不合於古義行不根於人心將恐變愛成憎轉福為禍何者竭人之力人怨也費人之財人怨也奪人之家人怨也愛一女子而取三怨於天下使邊疆之士不盡力朝廷之士不盡忠人之散矣獨恃所愛何所恃乎向者魯王賞同諸壻禮等朝臣則亦有今日之福無曩時之禍人徒見其禍不知其禍之所來所以禍者寵愛過於臣子也去年七月五日巳見其徵矣今猶事無改更理尚因循棄一宅而造一宅忘前禍而忽後禍臣竊謂陛下憎之矣非愛之也何利於公主臣聞君以人為本本固則邦寧邦寧則陛下之夫婦母子長相保也伏惟外謀宰臣為久安久寧以存之不使姦臣賊子以伺之臣聞微不可不防遠不可不慮當今疆場驚駭倉廩空虛揭竿守禦之士賞不及肝腦塗地之卒輸不充野多食草人不識穀而方大起寺舍廣營第宅伐木空山不足充梁棟運土塞路不足充牆壁誇古耀今踰章越制百寮鉗口四海傷心臣聞釋教者以清淨為基慈悲為主故常體道以濟物不為利欲以損人故常去已以全真不為榮身以害教三時之月掘山穿地損命也殫府虛帑損人也廣殿長廊榮身也損命則不慈悲損人則不濟物榮身則不清淨豈大聖大神之心乎臣以為非真教非佛意違時行違人欲自像王西下佛教東傳青螺不入於周前白馬方行於漢末風流雨散千帝百王飾彌盛而國彌空役彌重而禍彌大覆車繼軌曾不改途晉臣以佞佛取譏梁主以捨身構隙若以造寺必為其理體養人不足以經邦則殷周已往皆暗亂漢魏已降皆聖明殷周已往為不長漢魏已降為不短臣聞夏為天子二十餘代而殷受之殷為天子二十餘代而周受之周為天子三十餘代而秦漢受之自漢已後歷代可知也何者有道之長無道之短豈因其窮金玉修塔廟方建長久之祚乎臣聞於經曰若菩薩心住於法而行布施如人入暗則無所見又曰一切有為法如夢幻泡影如露亦如電臣以為減雕琢之費以賑貧人是有如來之德息穿掘之苦以全昆蟲是有如來之仁罷營構之直以給邊陲是有湯武之功回不急之祿以購廉清是有唐虞之理陛下緩其所急急其所緩親未來而踈見在失真實而冀虛無徇俗人之所為而輕天子之功業臣竊痛之矣當今出財依勢者盡度為沙門避役姦訛者盡度為沙門其所未度惟貧窮與善人耳將何以作範乎將何以租賦乎將何以力役乎臣以為出家者捨塵俗離朋黨無私愛今殖貨營生非舍塵俗援親樹知非離朋黨畜妻養孥非無私愛是致人以毀道非廣道以救人伏見今日之宮觀臺榭唯京師之與洛陽不曾修飾猶恐奢麗陛下尚欲填池塹捐苑囿以賑貧人無産業者今之天下之寺蓋無其數一寺當陛下一宮壯麗甚之矣用度過之矣是十分天下之財而佛有其七八陛下何有之矣百姓何食之矣雖以陰陽為炭萬物為銅役不食之人使不衣之士猶尚不給況資於天生地養風動雨潤而後得之乎臣聞國無九年之儲國非其國伏惟計會倉廩量度府庫百寮供給百事用度臣恐卒歲不充況於九年之積乎一旦風塵再擾霜雹薦臻沙門不可執干戈寺塔不足攘飢饉臣竊惜之矣臣嘗以為古之用度不時爵賞不當破家亡國者口説不如身逢耳聞不如眼見臣請以有唐以來理國之得失陛下之所眼見者以言之惟陛下審之聽之擇善而從之則萬歲之業自可致矣何憂乎黎庶之不康福祚之不永伏以太宗文武聖皇帝陛下之祖撥亂反正開階立極得至理之體設要之方省其官清其吏舉天下職司無一虛授用天下財帛無一枉費賞必俟功官必得雋所為無不成所征無不剋不多造寺觀而福德自至不多度僧尼而殃咎自滅道合乎天地德通乎神明故天地憐之神明祐之陰陽不風雨合度四人樂其業五穀遂其成腐粟爛帛填街委巷千里萬里貢賦於郊九夷百蠻歸款於闕自有帝王已來未有若斯之神聖者也故得享國久長多歷年所陛下何不取而則之中宗孝和皇帝陛下之兄居先人之業忽先人之化不取賢良之言徒恣子女之意官爵非擇虛食祿者數千人封建無功妄食土者百餘戶造寺不止枉費財者數百億度人不休免租庸者數十萬是使國家所出加數倍所入減數倍倉不停卒歲之儲庫不貯一時之帛所惡者逐逐多忠良所愛者賞賞多讒慝朋佞喋喋交相傾動容身不為於朝廷保位皆由於黨附奪百姓之食以養殘凶剝萬人之衣以塗土木於是人怨神怒衆叛親離水旱不調疾疫屢起遠近殊論公私罄然五六年間至於禍變享國不永受終於凶婦人寺舍不能保其身僧尼不能護妻子取譏萬代見笑四夷此陛下之所眼見也何不除而改之依太宗之理國則百官以理百姓無憂故泰山之安立可致矣依中宗之理國則萬人以怨百事不寧故纍卵之危立可待矣頃自夏已來霪雨不解穀荒於隴麥爛於場入秋已來亢旱成災苗而不實霜損蟲暴草菜枯黃下人咨嗟未知賙賑而營寺造觀日繼於時檢校試官充臺溢署伏惟陛下愛兩女為造兩觀燒瓦運木載土填坑道路流言皆云計用錢百餘萬貫惟陛下聖人也無所不知陛下明君也無所不見既知且見知倉有幾年之儲庫有幾年之帛知百姓之間可存活乎三邊之上可轉輸乎當今發一卒以禦邊陲追一兵以衛社稷多無衣食皆帶飢寒賞賜之間迥無所出軍旅驟敗莫不由斯而乃以百萬貫錢造無用之觀以賈六合之怨乎以違萬人之心乎伏惟陛下族阿韋之家而不改阿韋之亂政忍棄太宗之理本不忍棄中宗之亂階忍棄太宗久長之謀不忍棄中宗短促之計陛下又何以繼祖宗親萬國昔陛下與皇太子在阿韋之時危亡是懼常切齒於㣥凶今貴為天子富有四海而不改㣥凶之事臣恐復有切齒於陛下者也陛下又何以非㣥凶而誅之臣往見明敕自今以後一依貞觀故事且貞觀之時豈有今日之造寺營觀加僧尼道士益無用之官行不急之務而亂政者也臣以為棄其言而不行其信慕其善而不遷其惡陛下又何以刑于四海往者和帝之憐悖逆也為姦人之所誤宗晉卿勸為第宅趙履溫勸為園亭損數百家之居侵數百家之地工徒斫而未息義兵紛以交馳卒使亭不得遊宅不得坐信邪佞之説成骨肉之刑此陛下之所眼見也今茲造觀臣必知非陛下公主之本意得無有趙履溫之徒將勸為之冀誤其骨肉不可不明察也臣聞出家修道者不干預於人事專清其身心以虛泊為高以無為為妙依兩卷老子視一軀天尊無欲無營不損不害何必璇臺玉榭寶像珍龕使人困窮然後為道哉且舊觀足可歸依無造無營以取窮竭若此行之三年國不富人不安朝廷不清陛下不樂則臣請殺身於朝以令天下言事者伏惟陛下行非常之惠權停兩觀以俟豐年以兩觀之財為公主施貧窮填府庫則公主之福德無窮矣不然臣恐下人怨望不減於前朝矣前朝之時賢愚知其必敗人雖有口而不敢言言未發聲禍將及矣韋月將受誅於丹徼燕欽融見殺於紫庭此人皆不惜其身而納忠於主身既死矣主亦危矣故先朝誅之陛下賞之是陛下知直言之士有裨於國臣今直言亦先朝直言之人也惟陛下察之堅字元固湖州長城人神龍初纍遷給事中封慈源縣子以禮部侍郎為修文館學士睿宗朝進東海郡公遷祕書監左散騎常侍元宗改麗正書院為集賢院以堅充學士副張説知院事加光祿大夫十七年卒年七十餘贈太子少保諡曰文臣聞上天之道先春而後秋聖人制法外刑而內禮故知三辟之設王者不得已而用之今帝命惟新六合光宅遠無異望邇無異言亦宜安彼反側示以寬典臣竊見神都諸部勘當所尋有敕停勘迄至於今猶尚追攝豈非勘當使等志希僥幸執斯刻薄以為已能哉長姦濫之源傷醇和之化伏願即停之臣又聞書有五聽慮失情實也令著三覆恐致虛枉也比見有敕勘當反逆令使者得實便決然人命至重死不可生儻萬分之中有一不實欲訴無路懷枉誰明飲恨吞聲赤族從戮豈不痛哉此不足以肅姦逆而明典刑適所以長威福而生疑懼臣望絶此處分依法覆奏則死者甘伏知泣辜之恩生人歡悅見詳刑之意又法官之任人命所懸若不擇恐招枉濫諸官僚之內有用法寬平為衆所稱者願親而進之處事深酷不允人望者願疏而退之囹圄無冤億兆幸甚臣又聞罰不及嗣虞帝之明規罪不至孥漢君之茂德故郤芮作亂而郤缺登朝嵇康被刑而嵇紹入用終能立功白狄效死湯陰千載美談斯為稱首父子猶其若此餘親尚何疑哉竊見逆人之親選曹廣責至於無親無服亦數十條士子之中十將三四今聖人在上寶命惟新有道賤貧實為深恥遂令此等長從遐棄懷才抱器將何望哉是以聖意哀矜頻降恩制令同常例各使坦懷姚璹之徒皆逢委任而在下僚列不識天心苟求微疵不宏大體又準敕逆人同堂親不得任京官及兩畿三輔官準法刑戮緦麻親不得充近侍宿衛臣望申敕有司敕令逆人外不得輒為勘責收其賢能示之曠蕩斯巍巍之德作範百王穆穆之風垂裕千祀臣謹按禮稽命徵虞夏五廟殷六廟周七廟諸侯五廟而魯用天子之禮並后稷薑嫄為七廟故知五帝殊時不相沿樂三王異世不相襲禮伏以中宗孝和皇帝受命中興化民以德雖別廟薦享而聖心未安將革前規移入太廟臣參詳自古廟制夏殷周漢各自立廟不同一處漢光武以中興崇儉故七室共堂而歷代遵行以為折衷今太廟七室皆有神主孝和皇帝既須入廟先有夾室見空望奉移向此室內既同太廟八室祭享是同在於情理實為允愜伏惟皇帝陛下二儀合德百姓為心一物不安納隍興想竊見關西戶口負募赴都聖旨含宏不言差送是以樂住之色數萬餘家受使之人苟徼勞效務選高戶抑此陪郭然高戶之位田業已成安土重遷人之恆性使者強送僶俯進途一人怨嗟或傷和氣數千餘戶深宜察之臣望令檢勘先投牒樂住者並令赴都其差定陪郭者各任還貫若神都須人雍同等州先有工商戶在洛者甚衆令檢括兼樂住之人微有資財情願在洛城者並酬其宅鋪之地令漸修立則洛城不少於邑戶黎庶得安於本業此管子所謂順於人心施宏均養之人則臣希冀痊平有朝覲之望容居散秩免負乘之無任悃迫之至臣等謹按顯慶年修禮官長孫無忌等奏改燔柴在祭前狀稱祭祀之禮必先降神周人尚臭祭天則燔柴者臣等按禮迎神之義樂六變則天神降八變則地祇出九變則鬼神可得而禮矣則降神以樂周禮正文非謂燔柴以降神也按尚臭之義不為燔之先後假如周人尚臭祭天則燔柴容或燔臭先以迎神然則殷人尚聲祭天亦燔柴何聲可燔先迎神乎又按顯慶中無忌等奏稱晉氏之前獨遵古禮周魏以降妄為損益者今按郭璞晉南郊賦及注爾雅祭後方燔又按宋忠所論亦祭後方燔又檢南齊北齊及梁郊祀亦飲福酒後方燔又檢後周及隋郊祀亦先祭後燔據此即周遵後燔晉不先燎無忌之事義乃相乖又按周禮大宗伯職以玉作六器以禮天地四方注云禮為始告神時薦於神座也下文云以蒼璧禮天以黃琮禮地皆有牲幣各如其器之色又禮器云有以少為貴者祭天特牲是知蒼璧之與蒼牲俱各奠之神座理節不惑又云四圭有邸以祀天旅上帝即明祀昊天上帝之時以旅五方天帝明矣其青圭赤璋白琥元璜自是立春立夏立秋立冬之日各於其方迎氣所用自分別矣今按顯慶所改新禮以蒼璧與蒼牲蒼幣俱用先燔蒼璧既已燔矣所以遂加四圭有邸奠之神座蒼牲既巳燔矣所以更加騂牲充其實俎混昊天於五帝同用四圭失特牲之明文加為二犢深乖禮意事乃無憑儀禮喪服經繼父同居齊縗周謂子無大功之親與之適人所適亦無大功之親而所適者以貨財為之築宮廟歲時使之祀焉者也鄭元曰大功之親同財者也築宮廟於家門之外者神不歆非族也以恩服耳未嘗同居則不服也小戴禮記繼父服並有明文斯禮經之正説也至於馬融王肅賀循等並稱大儒達禮更無異文唯傅元著書以為父無可繼之理不當制服此禮焚書之後俗儒妄造也袁準作論亦以為此則自制父也亂名之大者竊以父猶天也愛敬斯極豈宜靦貌繼以他人哉然而藐爾窮孤不能自立既隨其母託命他宗本族無鞠養之人因託得存其繼嗣在其生也實賴其長育及其死也頓同之行路重其生而輕其死篤其始而薄其終稱情立文豈應如是故袁傅之駮不可為同居者施焉昔朋友之死同爨之喪並制緦麻詳諸經典比之於此蓋亦何嫌繼父之服宜依正禮今女子母攜重適人寄養他門所適慈流情均膝下長而出嫁始不同居此則笄總之儀無不畢備與築宮立廟實無異焉蓋有繼父之道也戴德喪服記曰女子子適人者為繼父服齊縗三月不分別同居異居梁氏集説亦云女子子適人者服繼父與不同居者服同今為服齊縗三月竊為折衷公諱索字邏天山莎勒人也昔周宣擇南仲晉武選吳彥其斯二將赫怒干戈啓陳雲旗暈天金鉞眩日靜當時之患治紛紛之亂者孰能預於此而為鱗次者乎公受乾靈之英姿稟坤祇之正氣峻兮若太嶽之壯勢淡兮若大江之澄靜雄材傑出俊德挺生誠千仞不足議其高實萬頃不足疇其量風神穎悟器識宏深其少也計深慮遠急國家之難而樂盡人臣之力乃率賓邊土辭廾鄉閭圖東南而歸聖朝明君親與話言懿其忠信授冠軍大將軍行左豹韜衛中郎將爰從自爾參委諸軍建非常之功懷赤心而冒白刃深踐戎馬之地遠託燭龍之鄉俄敘七擒闢乎四鎮浩蕩天地之間心無怵惕之驚者其惟公乎夫人生於代貴能立功若斯忠勤罕能崇闕一字上嘉其功授右驍衛大將軍上柱國金河郡開國公食邑五千戶其長也敦信明義元覽知微位列於九有恩霑於四人浩浩焉汪汪焉奧乎不可測也其衰也志惟慈愍恤下愛賢聲名遠彰朝野籍甚㣥公側席者多矣既漸垂顏鶴髮耳順從心尚夜寐夙興情不懈怠聖主明鑒知久勤勞未及懸車之請遂許致仕乃辭朝廷退歸私里想百行之善敘三樂之歡獵祕教於情田訪真流於智海專精念道捨廾俗營執德居尊恬淡清雅主上懷貴耆之道追想舊臣念曩昔之功錫今者之慶制曰顏年雖晚壯志不渝宜復舊資更承新命乃再升禁衛重握權衡凡厥公卿孰不遵仰善政之謀斯著治化之道無虧行年九十有八以開元中薨於私第聞之遐邇無不懷崩心之感朝廷慘怛聽政不怡㣥寮痛惜食不甘味識與不識並懷惋嗟地中喪三品之賢天上減七星之曜嗟乎赤將積效無徵陳兵按屯之法自此長淪斬將搴旗之謀於茲永絶人誰不沒貴有餘聲敬寫譽傳芳沈礎幽室歷想高德乃為銘曰聖代高士明時將軍英姿雄勇夙著功勳聲名遠振獨秀邁㣥天崖地角無處不聞千秋萬歲名列典墳再升榮級德契明君敬敘煩文顯揚雅調小道徒陳大夜何曉見素字會微彭城郡公贈幽州都督湊子第進士襲父爵擢纍諫議大夫天寶十三載拜武部尚書同中書門下平章事集賢院學士從元宗入蜀兼左相封豳國公肅宗立除右僕射罷知政事授太子太師加開府儀同三司寶應元年卒年七十六贈司空諡曰忠貞法者天地大典帝王猶不敢擅殺而小人得擅殺是臣下之權過於人主也去榮既殺人不死則軍中凡有伎能者亦自謂無憂所在暴橫為郡縣者不亦難乎陛下為天下主愛無親疏得一去榮而失萬姓何利之有於律殺本縣令列於十惡而陛下寬之王法不行人倫道屈臣等奉詔不知所從夫國以法理軍以法勝有恩無威慈母不能使其子陛下厚養戰士而每歲少利豈非無法邪今陝郡雖要不急於法也有法則海內無憂不克況陝郡乎無法則陝郡亦不可治得之何益而去榮末技陝郡不以之存亡王法有無家國乃為之輕重此臣等所以區區願陛下守貞觀之法
