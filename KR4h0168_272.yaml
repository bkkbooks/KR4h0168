front:
  text: 全唐文欽定全唐文卷二百七十二行沖名淡以字顯河南人舉進士纍官太常少卿開元中為國子祭酒拜太子賓客宏文館學士封常山郡公致仕十七年卒年七十七贈禮部尚書諡曰獻
  hash: sha256:95918f87ef5d6449c54198ba860b57803f413db5b8cbaaac3c74288c959735cb
