body:
  text: 臣某言臣聞尚書萬機實為政本伏尋此選授受誠難是以八座比於文昌二丞方於管轄爰至曹郎上應列宿苟非稱職竊位興譏伏見比來尚書省詔敕稽停文案壅滯臣誠雖庸劣請述其源貞觀之初未有令僕於時省務繁雜倍多於今而左丞戴胄右丞魏徵並曉達吏方質性平直事應彈舉無所回避陛下又假以恩慈自然肅物百司匪懈抑此之由及杜正倫續任右丞頗亦厲下比者綱維不舉並為勳親在位器非其任功勢相傾凡在官寮未循公道雖欲自強先懼囂謗所以郎中與奪唯事咨稟尚書依違不得斷決或憚聞奏故事稽延案雖理窮仍更盤下去無程限來不責遲一經出手便涉年歲或希旨失情或避嫌抑理勾司以案成為事了不究是非尚書用便僻為奉公莫論當否遞相姑息唯務彌縫且選賢授能非才莫舉天工人代焉可妄加至於懿戚元勳但宜優其禮秩或年高耄及或積病智昏既無益於時宜當致之以間逸久妨賢路殊為不可將救茲宿弊且宜精簡尚書左右丞左右司郎中如並得人自然綱維備舉亦當矯正趨競豈唯息其稽滯而已臣聞郊迎四方孟侯所以成德齒學三讓元良由是作貞斯皆屈主祀之尊申下交之義故得芻言咸薦睿問旁通不出軒庭坐知天壤率由茲道永固鴻基者焉至若生乎深宮之中長乎婦人之手曾未識憂懼無由曉風雅雖復神機不測天縱生知而開物成務終由外獎匪夫崇彼干籥聽茲謠頌何以辨章庶類甄核彞倫歷考賢聖咸資琢玉是故周儲上哲師望奭而加裕漢嗣深仁引園綺而昭德原夫太子宗祧是繫善惡之際興亡斯在不勤於始將悔於終是以朝錯上書令先通政術賈誼獻策務前知禮教竊惟皇太子玉裕挺生金聲夙振明允篤誠之美孝友仁義之方皆挺自天資非勞審諭固以華夷仰德翔泳希風矣然則寢門視膳已表於三朝藝宮論道宜宏於四術雖春秋鼎盛飭躬有漸實恐歲月易往墮業興譏取適宴安言從此始以臣愚短幸參侍從思廣離明輕願聞徹不敢曲陳故事請以聖德言之伏惟陛下誕睿膺圖登庸歷試多才多藝道著於匡時允文允武功成於纂祀萬方即敘九圍清宴尚且雖休勿休日慎一日求異聞於振古勞睿思於當年乙夜觀書事高漢帝馬上披卷勤過魏后陛下自勵如此而令太子優遊棄日不習圖書臣所未諭一也加以暫屏機務即寓雕蟲紆寶思於天文則長河韜映摛玉華於光札則流霞成彩固巳錙銖萬代冠冕百王屈宋不足以升堂鍾張何階於入室陛下自好如此而太子悠然靜處不尋篇翰臣所未諭二也陛下備該衆妙獨秀寰中猶晦天聰俯詢凡識聽朝之隙引見㣥官降以溫顏詢以今古故得朝廷是非里閭好惡凡有巨細必關聽覽陛下自行如此而令太子久入趨侍不接正人臣所未諭三也陛下若謂無益則何事勞神若謂有成則宜申貽厥後蔑而不急未見其可伏願俯推睿範訓及儲君授以良書娛之嘉客朝披經史觀成敗於前蹤晚接賓遊訪得失於當代間以書札繼以篇章則日聞所未聞日見所未見副德逾光㣥生之福也竊以良娣之選遍於中國仰惟聖旨本求典內防微慎遠之慮固非㣥下所測暨乎徵簡人物則與聘納相違監撫二周未延一士愚謂內既如彼外亦宜然者恐招物議將謂陛下重內而輕外也古之太子問安而退所以廣敬於君父異宮而處所以分別於嫌疑今太子一侍天闈動移旬朔師傅以下無由接見假令供奉有隙暫還東朝拜謁既疏且事俯仰規諫之道固所未暇陛下不可以親教宮寀無因以進言雖有具寮竟將何補伏願俯循前躅稍抑下流宏遠大之規展師友之義則離徽克茂帝圖斯廣凡在黎元孰不慶賴太子溫良恭儉聰明睿哲含靈所悉臣豈不知而淺識勤勤思效愚忠者願滄溟益潤日月增華也臣聞帝王之與臣庶聖哲之與庸愚上下相懸擬倫斯絶若乃以至愚而對至聖以極卑而對極尊徒思自強不可得也陛下降恩旨假慈顏凝旒以聽其言虛襟以納其説猶恐㣥下未敢對揚況動神機縱天辨飾辭以折其理援古以排其議欲令凡庶何階應答臣聞皇天以無言為貴聖人以不言為德老君稱大辨若訥莊生稱至道無文此皆不欲煩也是以齊侯讀書輪扁竊議漢皇慕古長孺陳譏此亦不欲勞也且多記損心多語耗氣心氣內損形神外勞初雖不覺後必為纍須為社稷自愛豈為性好自傷乎竊以今日升平皆陛下力行所致欲令長久匪由辨博但當忘彼愛憎慎茲取舍每事敦朴無非至公若貞觀之初則可矣至如秦政強辨失人心於自矜魏文宏才虧衆望於虛説此才辨之纍皎然可知伏願略茲雄辨浩然養氣簡彼緗圖淡焉怡目固萬壽於南嶽齊百姓於東戶則皇恩斯畢天下幸甚敬宗字延族杭州新城人武德初補秦府學士貞觀時纍除著作郎封高陽縣男高宗朝為禮部尚書册拜侍中進封郡公拜中書令太子少師同東西臺三品咸亨元年致仕仍加特進三年薨年八十一册贈開府儀同三司揚州大都督初諡謬改字恭臣忝班下列胥宇上京欣託巢之有庇體墐戶之全生爰鑿小池依於勝地引八川之餘滴通三涇之洋泌慕鑒止而端形乃遊智而清志爾其潺湲繞砌瀲灩縈除擬高陽而不足比蹄涔而有餘遊瑩劒之微鳥躍露鼎之纖魚乃若椅井傍通桃蹊俯映仰天津兮共淡潔秋景兮俱淨倒列宿以疑珠含望舒而似鏡覩江使之潛處玩波臣之沈泳於是翻光甕牖漾影蓬門溜激石兮長嘯鳧鼓浪兮相喧竹凝露而全弱荷因風而半翻足以澡瑩心神澄清耳目對昆明而取況喻春蘭與秋菊不羡寶於河宗豈希光於暘谷彼瑤池之高宴固幽遠而空傳此坳堂之信遠遂騰譽而聞天降臨渭之睿藻連橫汾之曩篇何微生之一日荷大賚於千年臣聞人靈貴損天道忌盈朱火中而炎景謝金波滿而哉魄生察遞來於四序揆迭運於三精淺智昧於成象通識詳於未萌務循虛而守約處崇高而慎傾爰製宥巵勗茲居位藏丹楹之峻宇偶清廟之彞器禮虛舟之漾空鑒撲滿之延祟彼遊鱗之盤樂咸見亡於芳餌此貪夫之死權誠覂駕於名利唯達人兮服道執溫恭兮靜志居泰山以思危騁高衢而不躓在大明之元覽猶垂旒以蔽聰履克讓之貞吉尚養正以希蒙矧㣥材之小器忘戒溢而虧沖悟負乘之必蹶敬循崖而飭躬由是鳴謙君子卑以自牧如彼景山猶藏疾於林麓譬諸巨海亦素王於百谷庶辭滿而常正固懷空而靡覆若乃求中軌範流慶資源峰潤由於韜王葉茂本於根深草卷葹而不死木交讓以俱存梅飛英而斂笑桃絢采而無言燕迎秋兮遁迹鶯移春兮息喧皆順序而行止得妙物之元門道雅合於斯器故保精而養魂覽先哲之英華遊舊典之場圃善逾遠而斯應德既昭而必溥見漢屏於睢陽驗周藩於有魯表商邱而作鎮規楚室而興宇亦何代其無人諒吾王之邁古於是命世作弻含章挺英允文允武惟誠惟明聽甘棠之暇隙想叢桂之幽情瞰浮雲而志遠瑩寒井而神清乃命僕夫整駕山隅騰鳴笳於通谷擁飛蓋於高衢逍遙仁智之境放曠道德之區造中天而式宴陵倒景而為娛星懸珠網日對金鋪雲承綺棟霓縈繡櫨既而近矚玲瓏遠眺溟濛隔翠微而半顯歷丹穴而才通等玉京之仙化侔銀闕之神功於時百卉敷榮六合清朗霞淡水而川媚風飄林而澗響聳絶壁之千尋挂懸流之萬丈蔽日月而孤峙吐雲霓而秀上循折坂而邅回躡危嶠而來往鑿離暉於石鏡挹瑞露於雲掌爾其花藥芬披蹊徑參差舒英冒渚擢幹臨崖乍莽蒼而橫植忽葑茸而倒垂扇晨飈而裊裊含宿霧而猗猗蔭町疃之毛㣥哢間關之羽族或相賀於甍棟或競馳於原陸駒食藿而馴場鶯含桃而出谷德澤加於飛走榮光周於草木日云暮時稍闌暢神襟而體物紀盛迹以濡翰發詞林之華藻瀉筆海之波瀾命小臣而並作賦大雅而承歡辭曰芳園兮鬱鬱高岫兮峩峩君王兮遊豫軒蓋兮經過花同林兮異彩鳥各囀兮相和野獸鳴兮應鍾石山英開兮間綺羅侍荊臺之入夢舞洛汭之凌波懸清暉於日月同眉壽於山河臣聞五土異宜四氣分序考宿麥於生類起嚴秋於溽暑扇漸秀於梅風潤岐苗於穀雨於時陽翹總暢陰呂潛生當隆曦之首節韞秋令之初萌雜藝黃於緑野參肅殺於朱明始自天而下降終因地而斯成疇中氣爽壟際風清引神飈於綺殿指明月於紈扇砌積玉兮疑冰庭飛花兮似霰矯微陽於修景溽寒露於方甸棟刻桂兮含英井雕蓮兮發絢雲標峰而勢詭氣登商而節變若乃葉幄垂秀條帷泛光鶯傳枝而裊娜蜂散蕊而芬芳對銀縚而偶穟並金縷而分芒如炎炎之鑠石若懍懍之懷霜資高明以納豫順中和以自芳非甘泉而滌景異寒氣而浮涼却冰紈於寶笥屏珍簟於披香命載筆於蓬渚贊天文於柏梁幸千齡兮此遇奉萬壽兮稱觴惟修竹之徑節偉聖賢之留賞覽山經而逖聽詠周詩而遐想掩寰中而獨秀非庶物之所仰若夫嶰谷著美稽山見知衛國之稱淇澳梁園之賦夾池山陽之翻密葉江潭之竦喬枝雖有聞於在昔諒無得而標奇乃徙植於廣庭爰移根於禁苑亘蓂草而界列繞醴泉而右轉修幹橫於松徑低枝拂於蘭畹對紫殿之初旭臨丹樓而向晚望威鳳而來儀佇化龍之為遠爾乃春光變色夏景開松枝藏戲鳥葉間殘虹上便娟而妨露下檀欒而來風散歸雲之掩翳引落日之玲瓏雖復嚴霜曉結驚飈夕扇雪覆層臺寒生復殿惟貞心與徑節隨春冬而不變考衆卉而為言常最高於歷選門下上蒼育物大德基於施生前哲至仁大造源於去殺是以矜慎庶獄得其情而泣辜兼濟含靈窮其巢而解網朕懷此道逾切古人彼蒼垂鑒使膺司牧爰自幼齒乃屬時屯五嶽為封豕之墟四海被長鯨之毒茫茫區夏並懸命於焚原蠢蠢窮黎咸轉骨於冰谷是用仁心內發龔討外申吟嘯風雲揭日月而清大祲簸跳山河補乾坤以正封域救其垂餌之厄惠其壽考之安煦以陽和同被發生之貺溽以膏潤申茲凱澤之錫粵自斯壤首建鴻名資此義徒遂登大寶夫小物不忘稟靈周於兆庶惟朕懷舊植性同其五情語地雖異中陽論心不殊代邸今茲黃髮已留連於廣宴在彼赭衣宜霑恩於宥罪可曲赦並州管內貞觀二十年正月十六日申時以前大辟罪已下已發覺未發覺已結正未結正繫囚見徒皆赦除之其犯十惡故殺人劫賊傷人謀殺人已傷官人枉法受財監治主守自盜所監治並常赦不免者不在赦例其有挾藏軍器亡命山澤百日不首復罪如初敢以赦前事相告言者以其罪罪之門下高明之天資星辰以麗象博厚之地藉川嶽而成形況於帝王體元立極臨馭萬物字養生民者乎所以致治之君遠讒佞近忠良屈已以伸人故能成其治為亂之主親不肖疏賢臣虐下以恣情用能成其亂明君遵彼而興國暗主行此而亡身是以朽壤毀於蓮峯巨蠧傷於翠葉蓮峯墜澗竟無反嶺之期翠葉隨風終無歸林之望故知亡者難以復生敗者不可重全所以御朽臨冰銘心自戒宵興旰食側席思賢庶欲博訪邱園搜採英俊弻我王道臻於太平可令天下諸州明揚側陋所部之內不限吏民其有服道栖仁澄心礪操出片言而標物範備百行以綜人師質高視於琳琅人不間於曾閔潔志邱園揚名里閈或甄明政術曉達公方稟木鐸於孔門受金科於鄭相奇謨開發明略可以佐時識鑒清通偉才堪於幹國或含章傑出命世挺生麗藻遒文馳楚澤而方駕鉤深覩奧振梁苑以先鳴業擅專門詞高載筆或辨調春囿談瑩秋天發研機於一言起飛電於三寸蓋期奔箭未遂揚廷並宜推擇咸同舉薦以禮將送具狀奏聞限以今冬並與考使同赴庶擬焚林之舉咸矯翼於巖廊尺木之階方振鱗於遊霧翹心俊乂稱朕意焉主者施行臣某等言臣緬尋三古縱觀百王裁玉牒之靈文酌金繩之雅誥稽諸列辟用考當今徵天意於禨祥昭昭乎溢目察人心於謠詠洋洋乎盈耳參三才之奧賾驗百神之感通諒可出震登封申明聖政乘春告禪仰答元功而睿旨謙沖固違僉願徇茲小讓淹斯大典臣等愚思竊所未喻臣某等誠惶誠恐頓首頓首死罪死罪臣聞崇高不極至哉乾象之尊博厚無涯大矣坤靈之德若乃代兩儀以亭育體覆燾之無私法四序以平分運陰陽而不測者非聖人孰能與於此乎是以天道運昌靈命係於元后帝圖昭格禋禮歸於昊穹鴻名列乎三大廣運由乎一體齊明合德抑斯之謂歟粵自生民肇興司牧朱襄皓英之日黃軒葛天之世莫不雷鼗振響節萬舞於雲門大路脂輪籍千藳於嬴里使夫空桑孤竹仰鈞天而合奏十碑再纍齊厚地以相終斯道既行常為稱首奉天之務義極於茲伏惟皇帝陛下陶冶生靈雕鎪品彙立四維於草昧再造寰區射九日之流金鬱興精耀德淪垓表功凝帝先於是戶牖三光提封六合不言而化搴炎燧之菁華無為可則軼堯舜之文軌故已道光紫極慶溢乾元豈與夫七十二君可齊年而語矣是以圓精朗鑒眷欽明之同德方祇效祉祚至仁之比義馳薰風而驛膏露靈心急於置郵驟澤馬而騖山車神物切於推轂上帝之情已見天人之際乃交推之不居疇克與讓臣等中謝臣又聞之太嶽臨雲登其峰而小天下岱宗零雨不崇朝而彌海內信天地之關鍵為人祇之會同雖復稽社分區云亭允峙陰崖俯禪猶或多途陽嶠乾封必歸斯境自九皇而發迹歷萬代而無差曩者帝道浸微淳風不競南茅北秬綿百世而寂寥升中告成歷千祀而湮墜使太山靡紀梁甫曠巡復盛禮於休明企來蘇於肆覲大夫之樹傾柔荑以望塵仙人之閭聳危峰而佇貺中外禔福幽明會徵敬候翠華之旗紀號青陽之日實望夙恭儲祉仰副元符召圓冠徵博帶緝無懷之逸憲採夷吾之舊文式道揚鑾錯事介邱之表飛英騰茂展采日觀之前闡絶代之丕業盡天子之能事榮貺融於往初尊號洽乎區有則懷生之類冠帶之倫甘夕死於朝聞傾朝野而相賀接萬齡於旦暮亦何樂以如之臣等預在普天咸蒙大造叫帝閽而引領佇神儀之改容昧死干陳期於獲命不任悃欵之至謹詣闕奉表以聞臣某等言臣聞靈心不測叶至道以升聞上帝無聲候休明而降祉同夫影響在感斯通相彼天心實交其際伏惟皇帝陛下垂光御極體睿凝圖始自憂勤寧㣥飛於海外賜之仁壽拯塗地於寰中總絶代之英聲實無為之美政三秦咸泰六府斯歌首冠往初功無取譬德澤共二儀潛運清明與七曜齊光是以邇無不安遠無不屆雕題鏤齒之類欵郊甸以相趨氊裘板屋之酋入提封而請吏上騰下漏天平地成嘉氣內充卿雲以之舒彩盛德外發非煙由其散色竊見守洪州長史張惟善等稱以六月二十六日於城內見慶雲自旦及申然後方散謹按瑞應圖曰慶雲者太平之應孝經援神契曰德至山林則景雲出又曰天子孝則慶雲見金枝玉葉若臨軒帝之營蕭索氤氳復入唐臣之詠自非工侔造化道格上蒼光含六幽恩流四海安能致茲神感式彰靈貺元黃間起朱紫相輝千載合符如斯之盛也雖復駢枝合穎匹此為輕絳雪元霜曾何足喻凡諸率土預在肖形沐浴皇風用伸鳧藻況以臣等謬忝衣簪旦夕巖廊親聞錫瑞相呼抃躍實百常情不勝悅豫之至臣某言臣聞休氣降祥與聖人而合契明靈之貺候昌辰而咸通自五帝寂寥九皇悠緬神龍逃夏中之世一去莫追景靈歇伊帝之朝千齡不嗣逮乎茲日翔驟來儀天道去人何其交際伏惟皇帝陛下化隆乾棟施厚大爐馭三光以照臨總萬宇而光宅雖復荒陬之遠億兆之多一物不安則宵衣載惕四夷有罪則納隍興歎日者東師作梗類農皇之夙沙交河阻兵等軒后之獯獫元戎所鞫大漢申湧醴之奇齊斧裁加昌海效靜波之慶既而西師獻捷東岱希封日告禎禨歲登靈稼表裏禔福彰外平而內成幽顯合符叶天意於人事伏見杭州刺史潘求仁表稱於錢唐縣界見青龍一又江州刺史左難當稱尋陽縣界見青龍二又得汝州及沂州狀稱所部各有慶雲見又延州刺史席辨稱臨貞縣界有朱草生臣等以管窺天之意若曰青者方色宜順動以東巡龍者帝間可騑驂於大輅非煙五色雜雲旗於翠華朱草三英代靈芽於芳籍豈非以茲幽旨警悟皇情促升中以奉高與臣等自慶一生預逢千載雖復仲尼將聖恨出圖之未期夷吾大賢嗟比翼之難致㣥臣庸昧竊譬古人幸遇休明勝之多矣披祥溢目觀祕驚心庇大廈以相歡荷施生而罔謝無任鳧藻之至臣某等言臣聞徇齊御極元扈表其麟鳳文思則天黃河貺其龍馬是知利充於物乾坤應而合符行出於身明靈感而幽贊伏惟皇帝陛下道登邃古功濟懷生發軫升陑墾災除害坐玉帳振金鼓運天機掩區縣然後散服林塞偃伯靈臺羈左袵以長纓同文軌於遐裔禮高年以執酒酳闕通孝敬於神明猶且昧旦丕顯凝旒庶政臨草纓而罪已削金牒以勝殘化洽風移禮循樂備是以百靈效職四海夷波物不疵厲人無啙窳煙雲動色星辰叶契儀雙觡之駿奔奠飛甘之清醴黃金掞彩紫玉摛英粵自驪陸之前其事無得而聞羲軒之降書契可略而詳焉未有茂實鴻名若斯光大休徵美瑞如此感通伏見隰州刺史表裏疑異度表稱某日月青龍見隰州城北大四五圍長八九丈謹按瑞應圖云青龍水之精乘雨而下不處深泉王者有仁則出竊惟升雲騰霧孔氏論而不知淩江負舟大禹對而猶懼豈如丹文緑錯驟簡皇情或躍日飛極遊明世蒸哉懿已絶名闕考歷觀圖將何取譬臣等撫躬私抃鼓腹相歡忽以微生同沾大賚逢物覩之昌運覽天祚之禎符開闢以來未聞斯遇千齡一會猶謂比肩何幸之深親承旦暮燕雀相慶實百常情不勝悅豫之至臣某言臣聞聖人作而萬物覩神靈滋而百寶用是以飛龍御天五雲勝彩潛龍涵池四海夷波軒帝由其受圖太昊以之為紀莫不遊泳宮沼騑服輿鑾玉牘丹文與會昌而契合金繩緑錯候休明而降祥伏惟皇帝陛下道極上蒼功成下武重光煥籙體睿凝圖至德充於兩儀大孝刑於四表網地張天之謂武制禮裁樂之謂文惟幾惟深運神樞而不測無為無事致寶歷於平分故能網絡九重琢磨三代溥天之下用至道而不知懷生之倫荷大造而無謝於是湛恩洋溢休氣氤氳上格天下漏泉不私其照日月為之揚彩不愛其道鱗介所以騰文神物有徵於斯不忒伏見常州別駕終文英表稱所部晉陵縣尉信都叔卿等七人以六月十三日於縣城南雲雨之際見有青龍長數十丈大八九圍久之乃沒謹按熊氏瑞應圖曰有仁聖君子在外不肖斥退則見惟皇作極感而遂通惟德動天無遠不應是使四靈嘉瑞叶千祀之登期五色榮光高萬古之靈貺方且以茲嘉祉造類云亭頌其徽猷歸功清廟豈與夫魚生露鼎蔡上荷心竹葦凝珠晨昏合璧校其優劣何可同年而語哉臣等運偶明時預聞靈慶不任鳧藻之至臣某等言臣等歷選前辟皇王之道詳焉遐觀曩載致治之方備矣竊聞垂衣垂裳之世追獯鬻而匪寧乘舟乘橇之期即析支而僅敘堯民有竄徒謂可封湯禱無徵非能具美道光史册幽贊禎符各擅鴻名俱為稱首况以括地成象中天作鏡代元功而造物叶神化以開祥取譬前修豈同年而語矣伏惟皇帝陛下受初或躍嘯命風雲廓彼重昏裁成法晷張維立極不盈少選之間邁五登三度越千齡之表施生靈於動植日用者不知混覆燾於華戎航深者忘遠巍巍乎赫赫乎書契已來未聞之也猶且留神昧旦克念終朝去歲以膏澤遲時撤八珍而罪已今春以濯枝未降輟萬騎於甘泉徇物為心憂勤至矣於是天先致感畝積餘糧聖敬日躋虛心效祉近得富平縣令獨孤仁宗奏云十二月一日白龍見又得沂州刺史李道遷狀云去年二月內景雲出又臣聞之天飛水遊洞陰陽而不測雲行雨施混神妙而無端龍之謂靈義彰於此至乃千年韓疑慶四和克瑞名叶堯歌色符軒紀卿雲所貺復在於斯陛下挺睿哲之資納明靈之祐是以沖天宛宛貫六位以呈祥祕景紛紛亂五章而發彩故能遠安邇肅理定功成動而弗違告禪展禮禋祀報功使夫同和之樂與鈞天而並奏無體之禮對上蒼而比隆超出萬古之前獨立九皇之上道格區宇何其盛歟臣等屬會昌辰曲成惠日倏聞嘉瑞再佇升中慶賴之深實兼歡忭不任鳧藻之至臣聞乾坤資始上元開歷象之端日月還流朔旦正璇衡之本事韞有形之表理遂無物之先故能運彼神樞材成庶類麗茲黃道孕育㣥生惟聖則天允執在躬之歷惟皇作極必叶履端之契所以書稱敬授易曰明時克正隆平無非此道伏惟皇帝陛下聲凝祕籙功宏造化縱如神之宏覽體不言於四海發就日之光華同無私於七曜階蓂循晷阿鳳吟辰元精究開闢之初握先窮名數之始裁炎涼於玉管節雨露於金渾道格彼蒼仁霑無外八紘受朔盡入封疆九譯承風遠遵文軌昆蟲涵於凱澤草木泛於榮光由是上感天而下漏泉不愛道而效其寶肇一元於甲子致希世之貞符挾五始於長至播光前之茂禮伏見宣義郎李淳風表稱竊見古歷分日起於子半勘得今歲十一月甲子朔旦冬至而故太史令傅仁均欲苟異張曹元法減餘稍多子初為朔遂差三刻用乖天正然自初及半日月全未相離算與太初事皆符合奉敕付有司及經術者詳加考定以議奏聞於是鴻生碩儒咸稽茂典研精覃思俱考舊文國子祭酒臣孔穎達十有一人與尚書八座參議得失咸以為仁均定朔事有微差淳風推校理尤精密謹按漢書云古者黃帝合而不死應劭云歷合天心而得仙也又按益部耆舊傳云洛下閎改顓頊法更作太初歷自云後八百歲此歷差一日有聖人出定之斯乃差日濫觴久著之於冥兆聖出之驗叶當今之有徵俯會八百之期遠叶九仙之道臣等緬惟邃古歷考前王若乃萌氣黃鍾兆根元牝闡其幽而藏其用窺其奧而開其文列聖存而不論故無得而稱也自圖書爰始三統騰鑣皇王以來六家分軫帝軒垂憲大撓汨其洪源伯禹嗣興小正窮其至賾命羲叔於唐歷考箕子於周年以或元乙司分翠虬定箭登清臺而索隱揆圭表以知微事緒多途無聞感應猶且各稱書契並擅鴻名改年號以應元符禮日觀而為稱首豈與夫兩儀同德五緯齊明景延南正星足廠田坴北陸聯珠候朔的皪清漢之間合璧規天徘徊紫霄之上校先代之優劣豈同年而語哉庶當玉輅徐輪金泥祕檢塗山之下會百神而合符介邱之側朝萬玉而光輝天人交際不亦休歟臣等生屬壽昌纍逢祉福至於今慶曠古無儔何幸如之親承旦暮不任欣躍之至臣某言奉今月十一日敕伏開瑤檢等鑿竅而覩虹霓載荷絲言似假翼而騰雲漢臣以愚劣本乏詞情比加衰耄更增才盡年踰郭北滯守周南引領天庭望丹霄而結戀馳魂魏闕懼黃落而長違忽預聞韶方深擊壤之慰詞均鄭璞匪無遼豕之慚精衛銜芻豈究靈鼇之境秋螢繼日安測陽羽之升天澤滂濡恩光曲照剪拂錫其容彩吹噓飾其羽毛雕朽為妍竊比鏗金之響涸鱗霑潤縱遊陸海之深不勝抃躍之至謹附右崇衛副率賀拔儼奉表陳謝以聞謹言臣綸言臣質輕散木運忝連姻濫叨右戚之榮曲荷睦親之禮攀鱗切漢顧毛羽而多慙雕朽成姿撫簪纓而自失在梁之誚甲子徒深大造之恩涓塵靡報常懷戰灼夙夜無忘况以蒲柳易衰犬馬將暮沈疴歲積惛耄日侵雖復年未杖鄉而疾乖陳力愒陰理務沈迷簿領之書伏枕當官敢斁彞倫之序久尸寵祿事等曠官內省愆尤何顏在職冒乞骸骨退就廬田庶得休間微加攝餌則皇天有施生之惠庸臣免偷安之責倘蒙恩許負嶽為輕但頓憊在躬方違旦夕仰輕檻而增戀望霄極以長懷伏紙陳誠心靈戰越不任悲愴之至臣聞先王慎罰務在恤刑往哲寬仁義在宥過聖人之道莫尚乎茲竊見廢宮官僚五品以上除名棄斥頗歷溫寒但庶人疇昔之年身處不疑之地包藏悖逆陰結宰臣所預姦謀多連宗戚禍生慮表非可防萌宮內官僚逈無關預今乃投鼠及器孰謂無寃焚山燬玉稍同遷怒伏惟陛下至德欽明哀矜庶類聖情冥感昭格上蒼是天監孔明重申靈命神襟喜悆恩加率土爰詔寬鞫覃被普天惟此數人未沾洪造伏尋先典例有可原昔吳國陪臣則爰絲不坐於劉濞昌邑中尉則王吉免緣於海昏譬諸欒布乃策名於彭越比乎田叔亦委質於張敖主以凶逆陷其誅夷臣以賢良荷彼收擢歷觀往代此類尤多近者有隋又遵斯義楊勇之廢罪止加於佞人李綱之徒旨不預於刑網古今裁其折衷史籍稱為美談而今張元素令孤德棻趙宏智裴宣機蕭鈞等並砥節礪操有雅望於當朝經明行修播令名於天下或以直言而遭箠朴或以忤意而見猜嫌一概雷同並罹天憲恐於王道傷在未宏臣早預藩寮深蒙録舊趨馳左右二十餘年伏見絲言每求輿誦所懷狂狷輕敢以聞按禮記文王世子凡學官春釋奠於其先師鄭元注云官謂詩書禮樂之官也彼謂四時之學將習其道故儒官釋奠各於其師既非國學行禮所以不及先聖至於春秋二時合樂之日則天子視學命有司典秩即總祭先聖先師焉秦漢釋奠無文可檢至於魏武則使太常行事自晉宋以降時有親行而學官主祭全無典實且名稱國學樂用軒懸樽俎威儀蓋皆官備在於臣下理不合專况凡在小神猶皆遣使行禮釋奠既準中祀據理必須稟命今請國學釋奠令國子祭酒為初獻祝辭稱皇帝謹遣仍令司業為亞獻國子博士為終獻其州學刺史為初獻上佐為亞獻博士為終獻縣學縣令為初獻縣丞為亞獻博士既無品秩請主簿及尉通為終獻若有闕並以次差攝州縣釋奠既請遣刺史縣令親為獻主祭望準祭社同給明衣修附禮令為永式謹按司馬彪續漢書建武三十二年封太山求元封故事所施用者有司奏用玉牒書藏方石中厚五寸長尺三寸廣五寸有玉檢厚二寸長短濶狹一如玉牒又按説文云簡牒也則知牒是簡之別名且牒是片竹故其字從片封禪牒雖用玉其制宜與竹同廣厚五寸何名簡牒又按孝經鉤命決云六經册長尺四寸孝經册長尺二寸遍檢古之簡牒無尺三寸之制臣等參詳典故務取折衷其玉牒請同玉簡册長尺二寸廣寸二分厚三分以金繩連編固簡之數隨文多少盛之玉匱封牒石內則合古文於事為允
