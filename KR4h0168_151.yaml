front:
  text: 全唐文欽定全唐文卷一百五十一洎字思道荊州江陵人仕蕭銑為黃門侍郎銑敗歸國授南康州都督府長史貞觀七年纍拜給事中封清苑縣男纍遷侍中太宗征遼兼太子左庶子檢校民部尚書留輔太子監國十九年為褚遂良所誣賜死文明初詔復爵
  hash: sha256:454692fcb7078b46f8be02a5a9b0acd9aedbc04ce0f81b6311351be536357b22
