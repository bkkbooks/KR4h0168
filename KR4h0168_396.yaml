front:
  text: 全唐文欽定全唐文卷三百九十六雲將開元中官監察御史遷殿中侍御史內供奉
  hash: sha256:590684bacc8e26decc490e9223d953ba6e7b85a2b6597e5491d51047e85e710b
  markers:
  - {type: head, offset: 14, content: 氾雲將, id: KR4h0168_NFKB_396-h1, level: 1}
body:
  text: 學古入官式著墳典陳力就列聞諸聖人丁則鯫生頗為高尚欽陶公之五斗初聞折節同方朔之一囊且安卑位作勞州縣早結梁生之悲挂幘公門晚慕伯魚之操齊季鷹而命駕不俟秋風想仲翁之辭榮近歸蘿月江湖道逸狎魚鳥而為㣥龜墨信榮將松菊而齊致况大君有命廊廟須才旌帛日賁於邱園山林不容於隱遯欲將無悶未可即依侯伯之城中五之一苟不以度事或有虞甲恪居官曹慎固封守魯大夫之為政必葺其垣晉獻子之城周先仞其邑豈謂澤門之皙見詛於邑中之子于垣載關於詩頌眷言於乙深昧從時且人之比周既貽官謗而牆之隙壞誰執其愆今遐邇乂寧邊鄙不聳苟不從命亦何懵焉遽嗾夫獒棄人何甚况屬於古令出惟行欲加典刑可以理遣少微滎陽人開元時對策擢第官中書舍人歷金部員外郎戶部郎中門下中大夫行中書舍人張均等竝藻珪璋騰華綸綍文行致美駮議惟精肅侍嚴禋咸稱盛禮宜覃行慶之典俾承加等之榮可依前件問三雄鼎立四海瓜分魏氏獨跨於中原孫劉割據於南土五勝更襲惟受命以當塗四大居尊咸仗義而稱帝二十八宿指躔次於何方三十六郡列封疆於何所醇化懿綱非無寬猛之規愛國治人自有弛張之度皇皇祖考並建鴻名眇眇子孫俱聞失德為功業之厚薄而存亡之後先至如獻納忠規縱橫武節既自方於樂毅或見比於張良各有其人詳諸史傳所行事迹咸試縷陳對漢氏失德魏圖爰啟孫劉建號脣齒相依咸能廓帝緒以定業振皇綱而握紀雖數有五勝運鍾當塗而土無二王終殊霸業然則封疆畫界俯稽於地理瞻星揆景仰煥於天文東井發曜於梁岷傍分蜀漢南斗連輝於吳會遠接荊衡詳魏土之分野當畢昴之躔次伊洛列三川之郡曹公居四隩之中毗陵在吳華陽惟蜀疆理所得其在茲乎至於開國基行政令垂統履順永傳來葉創業興緒克昌後昆咸終數代一何倫比雖鴻名休德將崇貽厥之謀而繼代守文頗著聿脩之美是以堂構始於祖考功業由於厚薄負荷因其子孫存亡以之先後至於忠規動俗武節冠時異代齊名孔明自方於樂毅死而可作文若偶比於張良懷獨見之明既一謀於匡濟行闇合之策終不謝於孫吳謹備諸前庶幾萬一謹對禮訓成俗負販有尊明義在躬德威不侮講學脩業固無取於筆耕興義輔仁事必資於善誘而由衷靡及旁狎是崇疑宓子之引肘類徒人之袒背議諸私室雖一抶之何傷列在公庭抵三尺而誰咎他物毆擊法所難逃肅然北庭不敢南牧有備無患尚勞我師都護副彼軍容屬當戎旅理宜躬擐甲冑靜柝邊城焉得留翫弈碁撓師亭候懷爛柯之末技虧授鉞之良謀苟失律而否臧况慢令而致寇逗撓之罪已孼難逃糾按之明職司其舉宜拘司敗以正爰書智士敏德難進易退明識流鑒察微知彰與善無求於貌恭選能何限於廝役一言而善三語攸升交匪竭歡談仍詣理不乏吾事在小吏而非辜無速我尤何主吏之頗類不從棄黜深謂得宜賦命多途勞生各業或務農而敦本或易地以求安潘岳閑居且樂邱園之事樊遲學圃寧忘稼穡之勤惟甲平人名編比屋和風不應地罕膏腴百穀不登兩鄉偏儉歲聿云暮年儲屢空苟貧賤而焉欲在窮途而周流適彼樂土雖美擇鄰之詞宜敬維桑將悟詩人之戒稱為穀伯難更邑居韙長卿之絕塵邈下眎於屈宋思眇眇以入微辭蔚跂而易貢騖八紘之津涯括動植而錯綜擢篆籒於重泉斡形聲而罄控當其奮翼巴庸前無古人拾阨灰之斷簡搜屈壁之遺文紛齊魯之老師徒騁辯於說鈴蛻筆上梗鼻端運斤專兔園之右席麾鄒枚於嚬呻顧天西之櫟社悵夜錦之未晨念絃歌之石友傷落魄於情親夫何嫠人之豔豔兮感熠燿之霄光矚綺疏以託誠兮佩徽音而曷忘嗟父母之不聰兮昧彼都之臧丰盼星河之照闈兮徑溯洄而往從搢紳先生而為此歟涼德汚行既不勝誅誾誾烈女世未乏諸足不下堂步中瑀琚紉幽蘭以為裳兮鈿美玉以為車豈無泳漢之游女兮亦有采桑之秋胡秉周禮以律身兮諒冰雪之難渝裨化國之陰教兮飾家道之權輿爾弗安於正吉兮蒙惡聲於簡書訪舊壚於故老莽榛蕪之離離眢井乃貪泉之戒修梧實曲木之規渴者勿汲暍者勿栖噫嘻余觸類取譬操觚默惟滔滔儒服相遠幾希摟處子者迷忠義之大閑窺鄰牆者闇富貴之危機斥雁幣之聘媒妁之辭墦閒之夫河閒之婦等亡羊耳未容勝負又奚獨料理十日卜之與典午耶參開元時布衣曹州布衣袁參頓首謹上梁公閣下參將自託於君長為君欲用之乎參之託君何以利君也若使君常懷相印不失通侯壽客滿堂黃金橫帶則參請以車軌所至馬首所及而掩君之短稱君之長使天下之人不能議君矣若使君當不測之時遭不測之禍身從吏訊妻子滿獄則參請以翳翳之身渺渺之命伏死一劒以白君冤使酷殺之刑不能陷君矣若使君因緣謗書不得見察卒至免逐為天下笑則參以一寸之節三寸之舌抗義犯顏解於闕廷使逐臣之名不能汙君矣君有盛忿之隙睚眦之怨朝廷之士議欲侵君則參請以直辭先挫其口不爾則更以眥血次汙其衣見陵之羞不能醜君矣若使君事至不可知千秋萬歲後而君門闌卒有饑寒之虞則參請解參之裘推參之哺勉勉不怠終身奉之使子孫之憂不能累君矣此五者參之所以利君而自託也君其可乎夫人不易知知人不易參於君非有食客之舊門生之恩今便欲自託於君長為君用得無不知參意而疑參妄乎然妄心實亦有之何也參行年已半春秋客復數載黃金盡烏裘敝脣腐齒落不得成名而親之在堂終莫有慰日暮途遠不知所為然獨念非君無足依者故今敢以五利求市於君冀君一顧見試使得慰親恐懼參聞言為必聽者出義為知已者行丈夫雄心能無感激况今以親親之故而祈德於君使君歡然卒不見拒爾後即參尚何面目遂得默然而已哉本向時之言終不負德夫幽則有鬼天則有神鬼神之閒參所必有如使參敢負於君者則鬼神之靈共誅之敬以自盟惟君之惠信也且君以偉才四入為相艱難情偽君盡知之至於進人亦多矣然亦能有以參之五利而許君乎參必愚儕鯫生而自守取咎爾則君之相士何其備耶至愚殆欲窺君之鑒矣頓首頓首參今亦不敢盛稱譽上紿於君然竊自言之正參亦非天下庸人也今君若見相以義則參之本圖若見相以才則惟君所識今幸君之力能必致參顧此時坐而相棄語曰厚利可愛盛時難再失利後時終必有悔君獨不聞蒯人之泣乎昔蒯人為商而賣冰於市客有苦熱者將買之蒯人自以得時欲邀客以數倍之利客於是怒而去俄而其冰亦散故蒯人進且不得冰二者俱亡自泣而去今君坐青雲之中平衡天下天下之士皆欲附矣此亦君賣冰之秋而士買冰之際有利則合豈宜失時苟使君強自遲迴至冰散則君尚欲開口其事焉得哉願少圖之無為蒯人之事也參頓首友直開元三年官將作監主簿女十一孃字心河間人也年十九適馮貞祜敬極如賓禮優侍櫛雖靡他之誓將固於同心而與善之徵竟虧於異物嗚呼哀哉春秋廿以開元二年七月二十日終於洋州興道縣廨舍開元三年四月九日葬於陳倉縣之新平原禮也惟父與母恩深骨肉痛切哀憐方備儀於幽隧用畱念於終天迺為銘曰天道懸遠神理難明嗟彼淑譽淪乎此生荒埏月照古樹風驚人誰不死爾獨傷情士良開元時人在周之宣帝錫我別祖蜀公命曰附海至衞實齊之封胙爾太師以守茲土况大闕幼沖豈撫寧闕人將社稷是衞且受遺旨震悼於厥心誓當仗順四征遂荒區外俾君三古闕薦瘥大盜闕國幽孺子以矯制陷純臣闕於是不克有成殆懼隕墜枕干闕師方結征東之陣闕武賁少却待起未行天假滔淫既合而北志懸魏闕身行孤闕而飛白羽救兵路斷上下七旬謂姪成平郡公勤曰汝親當矢石吾已竭闕周命若之何其奮劒大呼止之不及而卒三軍慟哭夷夏慕之荀息縊死闕奉君傳闕也洎有唐撥亂反正崇德報功式闕忠貞之封更優賵贈之禮以稱教甫沒代垂仁闕若名臣試郡粵天下師通禮樂以布和撫幽明以靖厲歷典凡百獨惟張公曰嘉祐相國河闕也汾吐金景嶽生雲氣不然豈光贊紫文俾五星同舍威宣丹禁而三柱克闕於闕代由是殿中受略鄴下分憂俗隱咸柔政闕必舉闕我先正勤君死難闕直書副闕之誠請軒綴斯翼庭植有幽儼惟肖以赫靈肅應虔而麗福屬夏正闕羞告期旁午焚蕭而片雲飛蓋整策而沛澤隨車霽後宵初天清月滿忽有雙鶴闕而去公之族有侍御史環賦膏雨美其事鄴縣主簿郭坦以為鶴者闕聞天闕其闕既而秋霖昏作將害粢盛公祈以巫應時晴朗飛蝗自魏蔽日而西公祝以誠闕焉故嘉種黃茂歲則大熟百姓歌曰張公張公清且明蝗蟲避境闕成正晴闕雨闕晴公每見闕沴不常甿俗忤政閉閣引咎而異自銷京兆理劇之能闕博物乃知志以系性性正而神不違忠以奉法法一而人不犯神人從天地當此其闕魁壘闕刃投虛淪鑒象著於述職奇士傳其詳士良忝沐家聲徒知祖德闕詞闕紀諸貞石銛開元朝官殿中侍御史內供奉歷度支金部員外郎遷給事中公主初昔降婚梧桐半死逮乎再醮琴瑟兩亡則生存之時已與前夫義絕殂謝之日合從後夫禮葬今若依繇所請却祔舊姻但恐魂而有知王同皎不納於幽壤死而可作崔詵必訴於元天國有典章事難逾越原繇此意雖申罔極之情求禮而行或致不稽之請謬膺駮正敢曠司存請傍移禮官并求指定儋字藏諸廣平人開元中以宇文融薦為祕書省校書郎自一接拜情同弟兄沈吟緬懷固非小子之所勤及也榮質前謝恐乖昔賢共弊之道晦事勿語且絕詩人匪報之實遲佪循軀緬俛未已殆將有辰矣足下多可不怪高情內含如筠斯清比蕙又暢儋不以感氣厚而修詐自廣不以撫已多而私頌作德未致力謝馳懷宣書何陳萬一也悚息今秋盡野外草木變衰長郊蕭條風物淒緊清都久客莫復相親足下退食公庭睡罷私室櫛沐晞景收視解聽豈念歲華不待厭倦為旅之士哉頃者釀玉初令絃絲正調竟欲左攜鄭君幽指藥妙右對董叟高談道微情酣世忘浩去塵粃思足下能順試實其事為何如哉時聞真聲迥閒笙鶴此復異於人境耳可以息宴可以嘯歌久不間然期今日之事也倚候騎氣自豫光臨幸甚謹馳疏不復具宋儋白上闕祐所闕識曠劫誰比次有闕大禪師乎禪師法諱道安俗姓李氏闕獨闕塵惑闕被艱難行洞精苦越生於開皇洎夫大業龍戰在野烝人狼顧無家而塵垢惟深不霾珠曜冰霜惟慘不奪松貞闕乘揚闕以曳闕禪池冽淨以通原是日大師宏忍傳禪要於蘄下闕密闕會同闕片言洞闕念闕則佛池淨其法身圓月湛於清空傳燈闕達摩納衆流以成海總闕沙以立身一香普聞千光分照闕而闕大師大師每歎曰予嘗有願當令一切俱如沙門獲所安樂學人多矣闕秀闕安闕徵請之八師受禪要禪師順退避位推美於玉泉大通也從此就闕泉足以澡潄與道而遊不樂何求竟居嵩山會善寺焉夫日登渾天苦遙夜者利見火闕忝爾懷誓塗我闕拂衣而起却遊以辭益指於荊州玉泉已而返覆年序矣闕有涕闕若夫高密詣耶則無務薄言神梵儀耶則無閒往教哲后躬親禪窟咨闕道門闕而以月繫年非道妙動於時能仁感於俗安至如是乎遂不得已而心副於世闕或闕以闕遣義維遠悟之者意豁而無住昧之者思絕而失常闕詬或揚而闕虛空渾大得之同體日月融朗得以同暉始自山門徧於天下也烏感韶樂者美克紹之闕心於禪師有之惟景龍二年二月三日中夜禪師忽而令門弟子等謂闕以山無闕無闕深以林闕因之野火尋焚而滅惟吾之初願也操必化之闕大闕自書馳闕納闕相渝至八日遂闔戶去人臥脇黑足而闕詢諸耆宿蓋云闕其聖道闕其歲時故莫得實其報闕也嗚呼是生如電隨風闕盡即風如我隨闕從遊者不能盡造希聲者不能畢聞門人之間故有百身請代闕血闕而不得者既而闕主君輟朝可其付託侯王哀赴侑以禮儀道遠惟光闕嵩巖焚餘起幽闕於道場瑞氣結於林頂異虹奇鳥首末連見因感盛賢之去也以予度禪師之至採闕由下而轉高斯固道以生之德惟天縱者也以為教必稱師是有雙峯之學貞不愚俗自有闕洞於存沒勝被於師資一為聖胎一為僧寶是以弟子慧遠者襲明承慶演末裕源東傳之闕高標業精深寄永慕師道長懷友風緣幽石以形言向遺履以投體式資墨客而揚德馨闕闕定之以清沄沄者心慧之以明定復伊何清照萬有慧復伊何明徹重垢是訓是學惟德惟師闕俗諦闕真如萬法都脗五蘊何儲堂堂如月光流不極撫照餘暉取拾無得衆所瞻仰香闕齊致離會同然永痛斯日載奉何年解吾人之慍妙覺常存化吾人之道淨戒彌尊勿闕令欽開元時官著作佐郎歷左金吾衞倉曹參軍肅宗朝遷倉部郎中昔陰康氏之王也元氣肇分災沴未弭水有襄陵之變人多腫膇之疾思所以通利關節於是制舞舜作歌以平八風非慆心也春秋之時齊遺魯以女樂晉梗陽之大宗亦以上獻子始淫聲色矣施及漢室有若衞子夫以歌進趙飛燕以舞寵自茲厥後風流彌盛晉氏兆亂塗歌是作終被諸管絃載在樂府呂光之破龜茲得其樂名稱多亦佛曲百餘成我國家元元之允未聞頌德高宗乃命樂工白明逵造道曲道調元宗之在蕃邸有散樂一部戢定妖氛頗藉其力及膺大位且羈縻之常於九曲閱太常樂卿姜晦嬖人楚公皎之弟也押樂以進凡戲輒分兩朋以判優劣則人心競勇謂之熱戲於是詔寧王主蕃邸之樂以敵之一伎戴百尺幢鼓舞而進太常所戴即百餘尺比彼一出則往復矣長欲半之疾仍兼倍太常㣥樂鼓噪自負其勝上不悅命內養五六十人各執一物皆鐵馬鞭骨檛之屬也潛匿衷中雜於聲兒後立坊中呼太常人為聲兒復候鼓噪當亂捶之皎晦及左右初怪內養鹿君至竊見衷中有物於是奪氣褫魄而戴幢者方振搖其幢南北不已上顧謂內人者曰其竿即自當折斯須中斷上撫掌大笑內伎咸稱慶於是罷遣翌日詔曰太常禮司不宜典俳優雜伎乃置教坊分為左右而隸焉左驍衞將軍范安及為之使開元中余為左金吾倉曹武官十二三是坊中人每請祿俸每加訪問盡為予說之今中原有事漂寓江表追思舊遊不可復得粗有所識即復疏之作教坊記記曰夫以廉潔之美而道之者寡驕淫之醜而陷之者衆何哉志意劣而嗜慾強也借如涉畏途不必皆死而人知懼溺聲色則必傷夭而莫之思不其惑歟且人之生身所稟五常耳至有悅其妻而圖其夫前古多矣是違仁也納異寵而薄糟糠凡今衆矣是忘義也重袵席之娛輕宗祀之敬是廢禮也貪耳目之玩忽禍敗之端是無智也心有所愛則靦冒苟得不顧宿諾是棄信也敦諭履仁蹈義修禮任智而信以成之嗚呼國君保之則比德堯舜士庶由之則齊名周孔矣當為永代表式寧止一時稱譽儻謂修小善而無益犯小惡而無傷殉嗜慾近情忘性命大節施之於國則國風敗行之於家則家法壞壞與敗不其痛哉是以楚莊悔懼斥遣夏氏宋武納諫遽絕慕容終成霸業號為良主豈比高緯以馮小憐滅身叔寶以張貴妃亡國漢成以昭儀絕冢嗣燕熙以符氏覆邦家乎非無元龜自有人鑑遂形簡牘敢告後賢東名開元十四年官鄠縣尉道不虛行必將有授受聖教者非律師而誰律師諱思恒俗姓顧氏吳郡人也曾祖明周左監門大將軍祖元隋門下上儀同三司萊蕪郡開國公使持節洪州諸軍事行洪州刺史父藝皇朝恒州錄事參軍竝東南之美江海之靈係丞相之端嚴散騎之仁厚以積善之慶是用誕我律師焉律師稟正真之氣含太和之粹生而有志出乎其類越在幼沖性與道合兒戲則聚沙為塔冥感而然指誓心乃受業於持世法師咸亨中勅召大德入太原寺而持世與薄塵法師皆預焉律師深為塵公所重每歎曰興聖教者其在茲乎遂承制而度年廿而登具戒經八夏即預臨壇參修素律師新疏講八十餘遍弟子五千餘人以為一切諸經所以通覺路也如來金口之言靡不該涉菩薩寶坊之論皆所研精天下靈境所以示聖跡也乃涉方山五臺聞空聲異氣幽巖勝寺無不經行感而遂通所以昭靈應也嘗致舍利七粒後自增多移在新瓶潛歸舊所有為之福所以濟㣥品也造菩提像一鋪施者不能愛其寶建塗山寺一所仁者於是子而來洗僧乞食以生為限寫經設齋惟財所極忘形杜口所以歸定門也詣秀禪師受微妙理一悟真諦果符宿心寂爾無生而法身常在湛然不動而至化滂流於是能事畢矣福德具矣以見生為過去則廾愛易明以遺形為息言則證理斯切乃脫落人世示歸其真開元十四年十一月二十六日終於京大薦福寺年七十有六初和帝代召入內道場命為菩薩戒師充十大德統知天下佛法僧事圖像於林光殿御製畫讚律師固辭恩命屢請歸閑歲餘方見許焉其靜退皆此類也屬纊之夜靈香滿室空樂臨門悠爾而逝若有迎者蓋應世斯來自天宮而蹔降終事則往非人寰之可留弟子智舟等彼岸仍遙津梁中奪心猿未去龍象先歸禪座何依但追墳塔法侶悲送且傾都鄙其年十二月十五日葬神禾原塗山寺東各願託勝因思陳盛美法教常轉自等於圓珠雕斵斯文有慚於方石銘曰聖立萬法法無二門以身觀化從流討源有為捨栰無生定猨律師盡妙像教斯存我有至靜永用息言示以形逝留乎道尊有緣有福求我祇園休烈開元二十五年官京兆府倉曹參軍嘗聞見性為本知常曰明幽探元珠相付法印必將有主人無閒言故如來立三世之事也大師諱惠源俗姓蕭氏蘭陵人也曾祖梁孝明皇帝大父諱瑀皇中書令尚書左右僕射司空宋國公父諱釴給事中利州刺史紛綸葳蕤奕世名家原大師之始誕也惠音清越閒氣沖亮稟天真於太和集神祐於純嘏及數歲後養必申敬動皆合理發跡契道出言有章屏金翠而窒其繁華絕葷羶而割其嗜欲超然戰勝但思出家天鑒孔明精心上感年二十二詔度為濟度寺尼如始願也受戒和上闕寺大德尼闕道之崇也羯磨闍梨太原寺大德律師薄塵法之良也迺延師立證登壇進律僧夏歲潔戒珠日明奉以周旋不敢失墜初大師纔至九歲遘先大夫之酷二十有七執先夫人之憂皆泣血茹哀絕漿柴毀古之孝子烏足道哉每秋天露下衰林風早棘心欒欒若在喪紀不忘孝也亦能上規伯仲旁訓弟姪嗈嗈閨門俾其勿壞則天倫之性過人數級夫其內炳圓融外示方便恂恂善誘從化如流亦猶獅子一乳魔宮大隤則感激有如此者行住坐臥應必皆空慈悲喜捨用而常寂黃裳元吉清風穆如則龜鏡有如此者後遇高僧義福者常晏坐清禪止觀傳明殊禮印可又有尼慈和者世莫之識知微通神見色無礙時人謂之觀音菩薩嘗於大衆中目大師曰十六沙彌即法華中本師釋迦牟尼之往號也非大師心同如來孰能至於此而更精承密行親佩耿光十數年閒演其後事他日大師厭世示疾以開元二十五年秋九月二日從容而謂門人曰死生者天之常道身沒之後於少陵原為空遷吾神也言卒右脇而臥怡然歸寂始知至人不滯於物矣嗚呼天喪門人曷以仰曷以律時大師享年七十有六即以十一月旬有二日從事於空遵理命也志無疆之德旌不刊之典不亦可乎銘曰猗那明行足不復還至人去兮逍遙天地之閒光開元二十五年官太子司議郎法師法名進俗姓高氏渤海蓨人也自錫土派姜而世官懿德姓牒代闕詳之矣法師天縱淑靈性與真粹越在嬰弱已現殊表每闕有侘傺之心闕嫛婗以笑闕髫丱就學便耽習真典年始闕歲闕誦萬言闕十二部經春秋廿而畢闕多劫闕慧異於今闕哉文明年中占闕而闕仙遊山闕將闕超絕世闕經行於闕中闕菩提樹下三明所照五蘊皆空闕潛闕播諸方闕衆闕為闕著禪味利益闕身不闕門津梁萬物闕菩薩闕用如來心大闕㣥迷將登正覺歸依者歲廣鑽仰者日多始遷香積闕終闕溫國大德闕由已牽闕在闕衆藉綱維闕寺主頃之闕上座闕餘之心雖無闕為所應終闕清闕涅槃仍經闕身世如閱闕嗚呼始闕師遘疾之初闕彩雲闕所及大闕道俗省問三百餘人闕異香闕氳闕樂髣髴至闕感闕測粵丙子歲開元二十四年八月闕日終闕十五日窆茲隧禮也弟子乘偘闕十闕恩闕諸比邱比邱尼闕講闕密闕毒不可勝數闕為天地長闕人代遷闕刊記曷播徽烈闕乃銘之曰闕相蕩薄滅闕寂闕乃為樂如如我師淨無著音容一去長冥寞允之開元朝官懷州獲嘉縣主簿聞夫謂天蓋高敬授羲和之職謂地蓋廣俯窮章亥之步元珪降瑞故別於九州玉衡正時迺分於七曜伊恍惚其尚爾況泡幻之為言豈若世雄湛然不生不滅在有為而是空入無閒而非假豪光發照徧近遠而咸燭法雨散霑普大小而同潤運其自在海變成酥現以威神移山闕三字輕舟於彼岸濟以浮生儼高駕於長衢誘其愚子示方便力說最上乘難可以聲求難可以色見智慧具足功德巍巍者歟臨高寺者西魏闕一字書闕一字劉謙之宅捨充寺焉處高臨下茲以建號杏壇竹徑舞闕二字樓孰為列㦸之門俄成布金之地溉白石之澗斜帶逶迤枕黃軒之原傍連邐迤闕二字更興替代易侯王川嶽多沸騰征戌匪遑晏祿去公室政行私門天網於是不恢法輪由其暫息樂崩禮壞寧復云乎遂令象教凋殘梵宇淪落歇滅之望雖異歎於蕪城慞惶之遊未殊悲於火宅若行若坐每是思惟於戲我唐德淳仁洽歲無荒札邊盡封守鴻儒碩秀繼踵於闕一字臺赤烏朱鴈接翼於祥府仍精想道意銳念真寂昇乾用尊於九五世界載廣於三千有若大比邱上座釋法震俗閻氏也寺主智琬俗楊氏也德祖踵美於魏公續伯見賢於太傅行祛五濁心清六塵登於仁壽之路超以閻浮之境都維那曇一俗賈氏也朝廷獲寵恃外戚而相國洛陽馳聲勞文章而佐郡濟拔貪著汲引津梁搖玉柄而開談鴈聽不去坐銀牀而入定鳥乳何驚衆比邱釋惠琬彥莊嘉闕法琇法會法海道林闕超談論曇晞希逸惠靜等竝庇影禪林凝情定水已除疑網其振頹綱彌天掞天之才詞光麗藻東山北山之部義了精微力役將候於子來制作共符於造化闕一字是或杖錫或乘杯踰嶮槎木以攸往泳淙編桴而利涉途窮理迫便作是念言順志柔而為譬諭喜檀施之衆以大伽藍罄衣鉢之餘以崇輪奐事惟靡盬誠無怠遑諦聽則被物如雲降伏則偃人猶草資供霧濩轠轤霆砰然後詳共工之度費審班匠之施巧經之營之不盈不縮珠貝之寶非獨漢皐松石之材寧專岱甽再加剞劂重肆彫礲勢戢孴以攢倚狀支離而分赴造宮觀於天路日月出入於其閒浮梁柱於星躔煙霞棲泊於其表千櫨競糺大鵬垂而欲飛百栱爭高翔闕仰而何逮松搖塵尾直對香鑪巖聳鷲頭下臨禪窟長廊䆗窱曲榭周流叢階珠草而未名倒井瑞蓮而幾色璀璀粲粲金碧炯晃而燐亂煒煒煌煌丹青炳煥而昭彰映以甘泉之玉樹隱以崑崙之銀闕北據竹箭激波浪以成池南距荊衡峙峯巒以層閣塵飛劫石似拂雲衣風觸鳴琴乍傳天樂故知功高由志業廣由勤功成而其頌可宣業就而其名可著將持聖勣在勒豐碑陵谷可遷相好常住敢憑此義不朽斯文銘曰皇矣能仁空即是真青蓮曜目丹果開脣恒沙世界累劫微塵作禮圍遶誰之與鄰其一曰若比邱仁精行修究竟微妙洞達元幽言驚黑鼠先乘白牛欲設方便思伏其柔其二聲高道安業尊惠遠禪林永邁寂路忘返德洽雲搖信行風偃將植龍樹先經鹿苑其三爰始結構廣茲闕宇鐸迥風吟闕一字危雲聚叢倚闕一字立杈牙邪豎璧露銀泥繩交金縷其四遠瞻迢遰迴望崔嵬文以粟玉藻以玫瑰彫甍鳳翥畫壁龍來自然風角何必天台其五雲蔚霞爍赫奕彰灼下極窅冥上肆寥廓瑤林瓊樹蕙樓芸閣海變成田此其如昨其六
