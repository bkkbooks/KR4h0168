  text: 全唐文欽定全唐文卷七百四十八牧字牧之駕部員外郎從郁子第進士復舉賢良方正文宗朝官殿中侍御史遷左補闕轉膳部比部員外郎歷黃池睦三州刺史遷司勛員外郎轉吏部授湖州刺史入拜考功郎中知制誥遷中書舍人卒年五十
  hash: sha256:c4a4d82f1f913ddb446063a74ec3128d7f7b8e9751f430a41b841b81c1009079
