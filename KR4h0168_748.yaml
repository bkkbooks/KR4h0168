body:
  text: 六王畢四海一蜀山兀阿房出覆壓三百餘里隔離天日驪山北構而西折直走咸陽二川溶溶流入宮牆五步一樓十步一閣廊腰縵迴簷牙高啄各抱地勢鉤心鬬角盤盤焉囷囷焉蜂房水渦矗不知乎幾千萬落長橋臥波未雲何龍複道行空不霽何虹高低冥迷不知西東歌臺暖響春光融融舞殿冷袖風雨凄凄一日之內一宮之間而氣候不齊妃嬪媵嬙王子皇孫辭樓下殿輦來於秦朝歌夜絃為秦宮人明星熒熒開粧鏡也綠雲擾擾梳曉鬟也渭流漲膩棄脂水也烟斜霧橫焚椒蘭也雷霆乍驚宮車過也轆轆遠聽杳不知其所之也一肌一容盡態極妍縵立遠視而望幸焉有不得見者三十六年燕趙之收藏韓魏之經營齊楚之精英幾世幾年剽掠其人倚疊如山一旦不能有輸來其間鼎鐺玉石金塊珠礫棄擲邐迤秦人視之亦不甚惜嗟乎一人之心千萬人之心也秦愛紛奢人亦念其家柰何取之盡錙銖用之如泥沙使負棟之柱多於南畝之農夫架梁之椽多於機上之工女釘頭磷磷多於在庾之粟粒瓦縫參差多於周身之帛縷直欄橫檻多於九土之城郭管絃嘔啞多於市人之言語使天下之人不敢言而敢怒獨夫之心日益驕固戌卒呌函谷舉楚人一炬可憐焦土嗚呼滅六國者六國也非秦也族秦者秦也非天下也嗟夫使六國各愛其人則足以拒秦秦復愛六國之人則遞三世可至萬世而為君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也余固秦人兮故園秦地念歸途之幾里訢余心之未歸兮雖繫日而安至既操心之大謬欲當時之奏技技固薄兮豈易售矧將來之歲幾人固有尚珠金印節人固有為背憎面悅擊短扶長曲邀橫結吐片言兮千口莫窮觸一機而百關俱發嗟小人之顓蒙兮尚何念於逸越余之思歸兮走杜陵之西道巖曲天深地平木老隴雲秦樹風高霜早周臺漢園斜陽暮草寂寥四望蜀峰聯嶂葱蘢氣佳蟠聯地壯繚粉堞於綺城矗未央於天上月出東山苔扉向關長烟苒惹寒水注灣遠林雞犬兮樵夫夕還織有桑兮耕有土昆令季強兮鄉黨附悵余心兮捨茲而何去憂豈無念念至謂何憤慍悽悄顧我則多萬世在上兮百世居後中有一生兮孰為壽夭生既不足以紉佩兮顧他務之纎小賦言歸兮余之志世徒為兮紛擾秋日晚晴樊川子目于郊園見大者小者有狀類者故書賦云雨晴秋容新沐兮忻遶園而細履面平池之清空兮紫閣青橫遠來照水如高堂之上見羅幕兮垂乎鏡裏木勢黨伍兮行者如迎偃者如醉高者如達低者如跂松數十株切切交峙如冠劍大臣國有急難庭立而議竹林外裹兮十萬丈夫甲刃摐摐密陣而環侍豈負軍令之不敢囂兮何意氣之嚴毅復引舟於深灣忽八九之紅芰姹然如婦斂然如女墮蘂黦顏似見放棄白鷺潜來兮邈風標之公子窺此美人兮如慕悅其容媚雜花參差於岸側兮綘綠黃紫格頑色賤兮或妾或婢間草甚多叢者束兮靡者杳兮仰風獵日如立如笑兮千千萬萬之容兮不可得而狀也若予者則謂何如倒冠落佩兮與世闊疎敖敖休休兮真狥其愚而隱居者乎勅昔有虞氏貴德尚齒言於四代其道最優今吾卿老富有道德以大冡宰表率㣥寮顧予敢專得於僉議前山南東道節度管內觀察處置等使銀青光祿大夫檢校尚書使持節襄州諸軍事兼襄州刺史御史大夫上柱國渤海縣開國男食邑三百戶高元裕始以御史諫官在長慶寶歷之際匡拂時病磨切貴近罔有顧慮知無不為復以諫議舍人在大和末詞摧凶魁坐折左宦繼為中丞京兆公卿藩服朕始在位徵歸朝廷爰自尚書裂分茅土為政以德行已惟仁信而履之服而樂之餘三十年道益昭著夫中外之任迭有重輕今者干戈蘊藏戎狄信順將欲詳考典禮開張教化使吾丞相已降有所咨稟非爾元裕其誰膺之至於官業豈勞倚任祇聽出納無忘教戒可守吏部尚書散官勳封如故勅喉舌百官之本綱轄天下之要戎政國之大事三人為衆一舉得之唯君知臣予不敢讓正議大夫尚書左丞上柱國賜紫金魚袋崔璪德可標準言成文章揚歷中外道益光顯左省駁議不畏強禦分憂陜服尹茲東郊政既安人化能被俗擢任藻鑒旋職牢籠材皆適宜官無逋事分鎮股肱之郡遂成功實之臣陟處綱曹副以中憲每師蘧瑗常慕史魚抨彈之勇正當時病翰林學士承旨銀青光祿大夫行尚書兵部侍郎知制誥武功縣開國男食邑三百戶蘇滌行冠人倫爵高天秩仁義禮樂之是務克伐怨欲之不行翺翔禁闈出入諷議汲黯為郡嘗聞臥理下惠去國皆以直道洎宣室思賈甘泉召雄造膝盡忠代言稽古近以微恙懇請自便君子之道進退可觀正議大夫前權知尚書戶部侍郎上柱國博陵縣開國子食邑五百戶賜紫金魚袋崔璵上知自得不器難名既擅高文兼通古學掌言綸閣典貢春闈詞同三代之風士掇一時之秀振舉職業昭宣令名詩曰多士文王以寧禮曰官備天子為樂咨爾璪等實瑞清時予為爾之德隣爾膺予之慎選典刑不忘於哀敬提綱唯在於公勤舉司馬法勿踵近習各膺重位企佇上酬宜於夙夜無孤官業璪可守刑部尚書散官勳賜如故滌可行尚書左丞散官封如故璵可權知尚書兵部侍郎散官勳封賜如故勅冉有仲由孔門之高弟也尚曰處於小國可為具臣况今照臨百官撫御四海綰牢籠漕輓之職掌五兵六師之重次第超擢為吾大寮若非僉諧豈敢輕授正議大夫守尚書兵部侍郎兼御史大夫統諸道鹽鐵轉運等使上柱國河東縣開國子食邑五百戶賜紫金魚袋裴休仁義禮樂文行忠信積此八者以為成人前宣歙池等州都團練觀察處置等使大中大夫檢校左散騎常侍兼御史大夫上柱國河東縣開國男食邑三百戶賜紫金魚袋裴諗在元和代理惟帝念功四夷九州文化武服咨爾先父實著大勳天必祚仁門有令嗣道直才富行備名高文學而浹洽專精率履而清淨恭儉而皆周歷華顯踐更臺閣處事可法出言成章咸輟自綸闈任寄方伯教訓以禮生聚以仁千里封疆一口歌詠休乃命以取士時稱得人用其公方委之管搉事為之制曲為之防鉤校奸贓末減賦取公財不耗疲人樂生望為準繩立作據依名實兼備德位兩高漢史曰理行尤異者就加禮曰有功於人者進律秩崇八座官副夏卿舉以授之予亦何恡夫宰相佐天子公卿助宰相股肱指臂任同一身有事必言未為越局無自愛惜勉荅寵榮休可禮部尚書依前統諸道鹽鐵轉運等使諗可權知尚書兵部侍郎散官勳封賜各如故勅士師臯陶之恤刑司寇蘇公之用獄既盡哀敬能致治平擢為大寮膺茲慎選出於予志命以誠臣翰林學士朝散大夫守中書舍人上柱國平陰縣開國男食邑三百戶賜紫金魚袋畢諴學臻壺奧文越拘攣常以忠信用為前後爰自郎署擢居內庭謀議有同於壽王奇異輒委於嚴助竭盡心力裨補機要既久歲序須議遷昇今者耕夫服田戎馬不駕欲使凡一手足皆獲措置是故用汝典予刑罰汝其往哉吾今告汝吾聞孔子曰古之聽獄求所以生之今之聽獄求所以殺之宜念格言深思倫要勉服休命以稱朕意可權知尚書刑部侍郎散官勳封賜如故勅昔貞觀開元之為理也遠隱必見情偽必知天下如一家兆庶如一人無他道也綱目皆振法令必行祖宗在天方冊在地人存政舉行之非艱故用正臣委之邦憲朝請大夫守尚書刑部侍郎上柱國賜紫金魚袋韋有翼戴仁而行抱義以處牆仞裏峻壇宇外寬介特守君子之強文學盡儒者之業周歷華貫擢為諍臣攻予甚專言事頗切願試佐輔移理陜郊馮翊之恐失倪寬潁川之意得黃霸壺漿迎路襁屬攀車徵為公卿愈見風采恤刑慎罰守法當官巍然立朝為時準直今者跡其率履委之糾繩爾其念惠文彈理之言思立秋授署之旨三尺律令四海紀綱所宜公共無鄉上意古人有言曰凡為虎鼠計於用舍今之倚任佇觀爾能唯君知臣無累所舉可守御史中丞散官勳封賜如故勅仲尼曰慎擇爾臣為人之道夫語言應對之選為顧問耳目之官若非善良必致壅害朝散大夫守太子賓客上柱國漢中郡開國公食邑二千戶賜紫金魚袋趙真齡其先君子祇事祖宗出入屏毗餘四十載爾為令嗣克肖素風好學頗專樹善不倦凡曰賢彥無不與遊雲水登臨多聞放志風塵趨競殊不縈心是以長人有慈惠之名處官無纎介之失其為行已斯亦多矣丹墀文陛之內貂羽金蟬之榮超以授之無忝所舉可守右散騎常侍散官勳封賜如故勅朝散大夫守尚書水部郎中上柱國韓賓等尚書天下之本郎官皆為清秩非科名文學之士罕與其選以賓端貞有守以處權俊乂出㣥以璲才能適用皆茂鄉里之稱咸為名實之士各服休命勉於官業可依前件勅朝議郎行尚書職方員外郎上柱國賜緋魚袋鄭處晦御史中丞韋有翼上言曰御史府其屬三十人例以中臺郎官一人稽參其事以重風憲如曰處晦族清冑貴能文博學人倫義理無不講求朝廷典章飽於聞見乞為副貳以佐紀綱以爾處晦常居內庭草具密命自以疾去于今惜之頗俞其言如我自得有翼為爾之知己余為有翼之德隣上下交舉豈有私愛勉修職業所報非一可守本官兼侍御史知雜事散官勳賜如故勅天下為公選賢與能也况乎拔出流輩超侍帷幄豈唯獨以文學止於代言亦乃密參機要得執所見若非賢彥豈膺選擢將仕郎守起居舍人庾道蔚善行必備重價無對嘗自侯府升為諫臣每直言而盡誠不違忠而偶意朝議郎行尚書禮部員外郎上柱國賜緋魚袋李文儒才行冠時名聲譁衆揚歷臺閣宣昭職業無入而不得其道守正而莫混其源並為儒者之英咸蘊賢人之操久遊安在相見何晚禮曰君子稱人之美則必爵之我既言矣亦能縶維宜盡忠讜以酬寵遇並可守本官充翰林學士餘各如故勅書曰庶獄庶事予罔敢知此乃周文王之所以理天下也惟獄惟事會於南宮求郎之難豈敢輕易將仕郎侍御史內供奉李朋能積行實發其詞華勁正端慎言業克舉天平軍節度副使朝議郎檢校尚書祠部員外郎兼侍御史賜緋魚袋李從誨宗室子弟美秀而文嘗經磨湼不改堅白今者取自憲府擢於幕吏各有所授皆為清秩當自宣室受讞之際思滿堂飲酒之言至於刑章尤繫念慮予曰罪爾勿罪予曰寬爾勿寬問法何如無鄉上意各宜勉勵勿自輕怠朋可守尚書刑部員外郎散官如故從誨可守尚書都官員外郎散官如故勅文林郎守尚書水部員外郎權審湖嶺旱暵百姓枵耗老弱死道上強壯入賊中爰求使臣以救其弊執事者上言爾審學古有文通知理道遂使乘驛視吾飢人果能臨事知權受命達旨慰撫流散宣導恩澤蠲貸逋逸能裁闊狹大小輕重各合事宜雖古所謂直指繡衣美俗使者言之於爾無以過焉用超名曹以酬往效無曠官業勉服休命可守尚書戶部員外郎散官如故勅夫聖人之理百代同道無他術也綱紀盡舉而關轄不寬故提綱主轄之司為邦立理之本言於其屬豈敢輕取浙西道都團練副使朝議郎檢校尚書刑部員外郎兼侍御史賜緋魚袋皇甫鉟鄉里秀人臺閣名士能以文學發為官業朝議大夫前守河南縣令上柱國鄭潀生於清族克肖素風凡守郡邑皆著理行會府藂委之任憲司抨彈之職委之授汝得不戒之夫為政也日夜思之勤而行之此乃子產之言也剛亦不吐柔亦不茹此乃詩人之所稱也四海百司之條目舉之在勤破制壞法之奸蠹糾之在敢率是二者可曰當官各服寵榮無忝遷擢鉟可尚書右司員外郎散官賜如故潀可侍御史內供奉散官勳封如故勅仲尼見負版者則必式之此言為國根本不敢不敬况其官屬豈可輕用漢家授署御史多於立秋蓋以風霜始嚴鷹隼初擊古人垂旨可以知之朝議郎行殿中侍御史韋退之等皆章甫高危逢掖襃博表裏文行師法典常退之嘗歷憲臺久居官次性既安靜事皆達練德融典校延閣服膺㣥書美價廣譽旁溢遠暢穎佐賢侯名聲藉甚畱滯在外而非所宜地官為郎南臺持斧皆有職業佇見風彩各思率勵以副甄昇並可依前件勅將仕郎守殿中侍御史李蔚劒南西川節度判官朝議郎檢校尚書禮部員外郎兼侍御史上柱國賜緋魚袋盧潘等夫法不立而化行惡不去而善進雖使堯舜在上未之有也故御史之舉職者前代有埋輪都亭之奏國朝亦有戴豸正殿之劾若非端勁知名之士不在斯選蔚以文行進用已著勞効潘以儒雅流聞今膺拔擢有司列狀詞旨頗公使吾綱目盡張隄防不壞不在法吏其在他乎朕闢祇宮之門開天下之口企以待理無有厚薄爾等吐茹侮畏之道能不愧於詩人斯塞職矣可不勉之蔚可侍御史散官如故潘可殿中侍御史散官勳如故勅承奉郎行京兆府長安縣尉直史館盧告朕觀不理之代無他道也取唯諾之士為耳目之官是以太宗皇帝之理天下也德為聖人尊為聖帝三日不諫必責侍臣况予寡昧固多遺闕不官才彥安能知之告是吾賢卿老之令子弟也以甲科成名以家行著稱取自史閣拔居諫垣夫朕之不德吏之不平政之失中人之不寧四者之闕悉陳其志此乃漢文帝開諫諍之詔也忠告不倦爾當奉職自用則小予不吝過勉思有犯無事遜言可依前件勅禮至則無怨樂至則不爭揖讓而理天下者禮樂是也今國家上法三代下採兩漢質文隆殺皆有舊章今命博士非欲革其儀法但使提舉考習而已登仕郎守祕書省著作佐郎蕭峴聞爾昆弟之間著友愛之稱復能於知已依投之地竭力報効况乎富有文學默守恬退執心處已不亦多乎爾其為吾折中輕重詳校疑似使祝宗卜史之徒不敢以近習欺爾斯則可矣勉於自強可守太常博士散官如故勅守左拾遺杜濛爾五廟祖嘗佐太宗同安生人共為天下者也爾能自以文學策名清時升為諫臣豈曰虛授如聞同列牆進而不爾容爾亦拜章自陳極辭貢憤乃令徵辨盡知其由僉曰爾以齒少有才不能韜晦或處衆矜已或遇事褊衷言於慎微則亦乖矣仕於清貫斯豈廢乎考衆惡必察之言懲怨不在大之說官移禮寺跡去掖垣屈既伸眉事亦存體酌此二者頗得中道况乎職業至重蘊蓄可施無使衆多復有窺測可太常博士勅前度支河東振武天德等道營田供軍使檢校太僕卿兼御史中丞馬曙等或以文學策名或以吏才進用久更官次皆著勞効西漢趙充國八十老將通知四夷以為排折羌虜非穀不可今浚稽山南遮虜障北坐甲待食不下十萬曙以文學之暇頗好論邊果能峙糧飽吾戰士固比為郡亦報善政球倅賓席得專畱事兵於其郊所命皆具東朝崇秩列寺貳卿各服官榮以俟昇擢可依前件勅壯武將軍檢校太子賓客前兼右金吾衛將軍監察御史上柱國襲岐國公食邑三千戶食實三百七十戶賜紫金魚袋李叔玫等夫伊呂之為將也每以救扶為心故其苖裔福隨殷周我西平王功存社稷慶流後嗣子孫多賢裂土分茅玫宏毅知書洵美且武儒士多譽將才頗高慶忌一門盡有爪牙之用金敞舉族皆著忠厚之名置將軍之符列卿寺之任曰文曰武唯上所命酋為才士實曰寶臣証之與汾為吏歲久文學績效皆有可觀清江武當有人有賦豈自薄小宜遵詔條無忝寵榮以稱朕意可依前件維大中六年歲次壬申五月丁卯朔十六日壬午皇帝若曰國有元老道可咨稟天命不助倏然去我宜加褒命以慰重泉咨爾故淮南節度副大使知節度事管內營田觀察處置等使金紫光祿大夫檢校尚書右僕射兼揚州大都督府長史御史大夫上柱國贊皇縣開國公食邑一千五百戶李立德行道繼長增高貴而益修老而彌篤在文宗朝徧歷清近內備顧問嘗摧奸兇外領事權善提故典爰付魁柄實肖象求鎮撫四夷莫不信順訓導百吏皆有程品左官荒服衆寃非罪事君以道知我其天李固之確論無私周公之金縢終啟自朕統御尊敬舊老分委戎輅作鎮孟津訓兵令行治人化洽飽聞聲譽渴見風彩以大冡宰徵歸朝廷讜直忠貞骨鯁魁礨凡所陳啟無非法誡遂乃裂授東夏表率諸侯能救饑艱克為康泰初陳微恙請捐重寄驛騎奔問待醫臨理旋聞大病却食涕流命也柰何痛悼不及今遣使某官某副使某官某持節冊贈爾為司空魂而有知鑑茲誠意嗚呼哀哉勅有祿位而享富貴啟手足而歸壤樹身沒名著生榮死哀蔚為大臣宜遵贈典故金紫光祿大夫守太子太傅分司東都上柱國晉陵郡開國公食邑二千戶歸融發於文華揚歷清近業冠前輩才高當時揔領屬官預聞政事凡曰繁劇無不踐更刃皆有餘施無不可徧處重位內修典法三乘戎輅外作屏毗富而不驕貴而愈謹曾參三省太叔九言服以行之終身不倦實士林之君子為朝廷之表臣未究高年遽聞長夜爰舒痛悼用加顯位命之寮長以慰重泉可贈尚書僕射勅朕有表臣作鎮南服天不助我遽此殲奪用崇飾終之典以舒痛悼之誠故桂州本管都防禦觀察處置等使銀青光祿大夫檢校左散騎常侍持節都督桂州諸軍事兼桂州刺史御史大夫上柱國令狐定始自結髮至於壽考直道而行靡有悔德初以友愛藹閨門之風中以文學膺鄉里之選終以德業為名實之臣爰自郎吏至於藩翰事藂必理刃皆有餘去載桂陽雖云旱耗聞其風俗芬若椒蘭昔爾元昆輔我聖考今汝猶子相予沖人公忠貞正衡鏡法式煥乎當代萃於一門上有佽助急難之名下有慈愛教誨之道聞於論者爾其得之跡去難畱川逝不捨追命宗伯以慰重泉往而有知鑑我厚意可贈禮部尚書勅仲尼以舉賢才則理大禹以能官人則安况西界浙河東奄左海機杼耕稼提封七州其間繭稅魚鹽衣食半天下不有可仗豈宜委之正議大夫使持節華州諸軍事守華州刺史兼御史中丞充潼關防禦鎮國軍等使上柱國隴西縣開國男食邑三百戶賜紫金魚袋李訥溫良恭儉齊莊中正實以君子之德華以才人之辭揚歷清顯昭彰令聞輟自掌言式是近輔子貢為清廟之器仲弓有南面之才智莫能欺剛亦不吐表率教化皆有法度今者兵為農器革作軒車言於共理在擇循吏是故用已效之績託分寄之任擁蒨斾而服元玉化千里而有三軍儒者之榮莫過於此孔子曰仁者愛人智者知人愛人則疲羸可蘇知人則才幹不棄土宇既廣殺生在我達此二者可以報政榮加副相用壓大邦爾其勉之無忝所舉可使持節都督越州諸軍事守越州刺史兼御史大夫充浙江東道都團練觀察處置等使散官勳封賜如故勅夫立人長伯此周文王所以敬事上帝也况廬江五城環地千里口衆賦重豈可輕授朝議郎守尚書刑部郎中上柱國賜緋魚袋盧博以文學策名才能入仕周歷臺閣嘗宰繁劇鬱有佳譽兼報善政今者出郎官之帳懸太守之章言於清時不為不遇上有命則違之上有好則效之此乃成王命君陳之言也故行令不如行化律人不如律身念茲二者可長人矣無忝分寄爾其勉之可使持節廬州諸軍事守廬州刺史散官勳賜如故勅夫三尺律令人情出於其中耳苟情有不可亦法無本條正議大夫權知宗正卿上柱國隴西縣開國伯食邑七百戶賜紫金魚袋李文舉宗室子孫初以地進累居官次皆著能名是以取自遠藩擢為宗正大則提舉㣥吏灑掃守奉次則整訓屬族次第昭穆唯此二者爾之職焉今則狂盜公然侵犯陵寢毀櫝之罪已坐首令責師之義固難矜寬勉於分憂足以補過可使持節睦州諸軍事守睦州刺史散官勳封賜如故仍馳驛赴任勅朝散大夫使持節台州諸軍事守台州刺史上柱國竇宏餘朝議郎前使持節虔州諸軍事守虔州刺史上柱國賜緋魚袋蘇莊等南郡盜作而蕭育拜河內政美而寇恂畱為人擇官因重而撫考於兩漢行古道也宏餘廉使上言父老有請其為政也長育多方惠訓不倦凡設教令皆有科指莊任南康悉心為理謹身律下節用愛人南陽古都近者小擾臨海越俗尤惜良吏就加超拜各叶所宜仕至二千石可庇人矣無異文律不自貴重副疲羸之望者須念始終坐狂愚之罪者勿理深汚各膺寵祿無忝分寄宏餘可檢校太子右庶子餘如故莊可使持節鄧州諸軍事守鄧州刺史散官勳賜如故勅中散大夫使持節亳州諸軍事守亳州刺史充本州團練鎮遏使雲騎尉賜紫金魚袋李暨等昔貞觀末遣孫伏伽等二十二人各以六條巡察郡縣以能進者止二十人獲死者七人流竄黜免僅千百輩以太宗皇帝上聖憂勤之切百執事奉法公謹之心守臣為奸如此之衆况今黜陟久廢仕進多門緬思疲人每渴良吏牧守之念予常軫懷暨實文士出典兵郡不薄為吏愛我百姓盜賊奸究寢而不作鰥寡孤獨皆有所養中庸再分符竹聞立善政凡為理者皆高仰之今用已效之才各委共理之任簿書刀筆俗吏事耳慈惠教化君子宜之二者較然爾欲何取慶乃身帶兩綬兵分禁營得佩牛刀立於交㦸或有鄉里之譽克肖友悌之風百里長人在王畿內各思答效無忝寵榮可依前件
