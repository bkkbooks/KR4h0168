front:
  text: 全唐文欽定全唐文卷一百十七晉高祖四
  hash: sha256:a3a0493e4588dbac78451d7c06df5fa02faa0f0d66cc73ae086804781845cd03
body:
  text: 朕猥以眇沖式承眷命雖宵衣旰食不敢怠荒而一日萬幾有虞曠闕應在朝文武臣寮等早升班序並蘊器能懷康濟之才展經綸之術既逢昌運宜罄讜言須務救時各思舉職勿取容而避事勿尸祿以曠官或時經未叶於和平必思獻替或命令未諧於允當必在針規苟有敷陳並當開納俟汝匪躬之節副豫仄席之求凡在朝廷共裨寡德咨爾卿士宜體朕懷朕自祗膺大寶虔奉丕圖每念創業之艱難未嘗終食而懈惰所冀照臨之內將臻康泰之風庶幾億兆之中漸息瘡痍之痛雖疚心罔暇而逆耳無聞豈視聽之不開致針規之未貢應在朝文武臣寮等各懷異術早踐通班宜陳經濟之謀用贊興隆之道勿失讜直之議無拘循避之規咸罄乃誠同規不逮宜令在朝文武臣寮每人各進封事一件仍須實封通進務裨闕政用副虛懷凡百寀寮宜體朕意百官曾有宣示令進封事據到者未及十人朕雖無德自行敕後數月至懵人也應有一件事食祿於朝卒無一言可不知貞觀政要説言而不用朕所甘心用而不言誰之責也朕自承天命肇啓帝圖期四海之混同法五載之巡狩眷惟全魏實曰奧區人物殷繁山河雄壯地雖升於都邑民未識於乘輿皆傾望幸之情宜展省方之義取今月五日暫幸洛都沿路供頓並委所司以官物排比州縣官不得科率人戶其隨駕內外官員并馬步兵士等不得擾人踐踏苗稼中外遐邇宜體朕心唯天福三年歲次戊戌十一月甲辰朔五日戊申皇帝若曰王者握圖立極崇德報功或開國以建邦或苴茅而錫壤乃樹藩屏式奬忠勳古先哲王率由斯道惟朕薄德敢忽彞章況夫奠南服之奧區鎮東甌之重地懋績雖高於列土殊榮未繼於肯堂得不申加等之恩降非常之命用紀代天之業特頒鏤玉之文乃擇吉辰爰敷盛典咨爾興邦保運崇德志道功臣天下兵馬副元帥鎮海鎮東等軍節度浙江東西等道管內觀察處置兼兩浙鹽鐵制置發運營田等使開府儀同三司檢校太師守中書令杭州越州大都督府長史上柱國吳越王食邑一萬五千戶實封一千五百戶錢元瓘嶽靈稟粹天象儲精蘊文武之兼材受乾坤之間氣寵承吳越功邁桓文運妙略以平凶用奇兵而制變祗嗣基構表率英雄淮彞之屏氣銷聲海嶠之波澄浪息而況興我昌運竭乃忠規懋勳庸而首列韓壇奉玉帛而誠先禹貢語尊奬則獨標大節顧封崇則未稱鴻名宜舉徽章俾奉先正矧其天文當南斗之分地志控勾踐之都眷茲舊封允屬全德是用異車服於羣后盛簡册於列藩正二國之土疆錫九天之寶瑞表豫嘉命纘乃舊邦大振家聲夾輔王室今遣使大中大夫尚書左丞上柱國賜紫金魚袋王延使副中散大夫尚書司門郎中柱國賜紫金魚袋張守素持節備禮册爾為吳越國王於戲服衮衣而佩元玉位壓羣侯駕戎輅而握兵符名尊九伐馭貴之重象賢之榮爾其祗荷天光勉清國步往綏厥位永孚於休戒之慎之勿忝前烈古者君臨大寶子育黎民爰當御歷之初宜布惟新之令將冀昭蘇品物蕩滌瑕疵大推作解之恩俾樂咸亨之運恭以明宗皇帝經綸草昧統御寰瀛垂衣而八表歸心負扆而十年無事必謂盤維永固鼎社無遷立萬代之基圖為百王之軌範洎遺弓劒遂起干戈逆豎延災宗英失守劫奪神器侮亂天常誅戮至親虐害無告顧豫何咎忽有異謀無名而大舉甲兵不道而廣勞生聚寰中板蕩天下驚騷內外離心遐邇積怨嗷嗷士庶若無所依契丹皇帝不忘先朝特存舊好親提鋭旅遠殄羣凶未整鸛鵝盡殲蛇豕而復念中原之無主憫四海之倒懸欲泰羣情特申大義猥惟涼德俾纂寶圖成命不回固讓莫得殷湯以東征西怨乃踐帝圖夏禹以地平天成遂興王業矧豫寡昧有愧推崇雖勉副羣心恭臨大位將何以祗膺眷祐統和人神以是馭朽興懷宵衣在念躋生民於富壽保社稷於延洪頒歷紀年既有遵於典册推恩行慶將普及於幽遐宜改長興七年為天福元年大赦天下十一月九日昧爽巳前應在京及諸州郡邑罪犯及曾受偽命職掌官吏并見禁囚徒巳結正未結正巳發覺未發覺罪無輕重常赦所不原者咸赦除之應曾相連賊黨軍人百姓有奔竄山谷者一切不問任歸本貫如卻願在軍者亦仰所司申送當令本軍收管易俗移風宜遵善教尊本敬始自有常規明宗朝所行敕命法制仰所在遵行不得改易悉力為時罄財助國苟不推於恩信亦何示於賞酬自舉義巳來應借率人戶及經抄括商旅資財錢物委所司明置文籍候平定之後當議給還京城將士降附軍戎自舉義巳來悉聞忠藎宜加賞賚以勸勤勞應在京諸軍將領兵士等候並破賊寨當議各加優賞有沒於王事者各與贈官其子孫並與量才敘用文武官寮等久輸推戴之誠宜示奬酬之道應在京文武官寮及軍府將校并勸進官等兼前資官內自五月後來未曾分掌職任並各與遷轉官資自五月後來巳曾受官者不在此限其軍府諸色職掌將吏等巳及押衙職者并與加官未及押衙職者各與遞遷職次應超魏府行營及係侍衛諸軍將校等并巳加恩外所有六軍及諸道本城并替換在諸處將校未加恩者凡執干戈皆為社稷雖守役或分等次而傾心盡著勤勞且被渥恩各升官秩用奬輸忠之效俾堅禦侮之誠其六軍及諸道州府本城并替換在諸處將校未加恩者宜令并與依資轉官仍令六統軍及諸道州府據前項軍都自副將巳上分析名銜申奏鹽麥之利軍府所須倘不便於戶人宜別從於條制所期濟衆無患妨公在京鹽貨元是官場出糴自今後並不禁斷一任人戶取便糴易仍下太原府更不得開場糶貨其麴每斤與減價錢三十文恩推掩骼義顯燭幽允諧遐邇之心冀叶陰陽之序應自舉義巳來或有因事抵法之人及九月十四日後殺戮賊寇所在暴露骸骨未有骨肉收認無主者委逐處長吏埋瘞弓旌聘士巖穴徵賢式光振鷺之班將起維駒之詠應山林草澤賢良方正隱逸之士委逐處長吏切加採訪咸以名聞當議量才敘任昨以寇戎久在郊境頗傷禾稼賦租應近畿五十里內委逐處令長檢覆當與免今秋稅租差科於戲甘澤配天萬物以之膏潤震雷出地百卉繇是發生將欲道和氣於八方示深仁於三面永康聖歷普洽民心凡百庶寮洎方伯連帥克奉明恩勉揚厥職共臻至化稱朕意焉赦書日行五百里敢以赦前事言者以罪罪之布告中外咸使聞知蓋聞神無常祀惟德是歆民無常懷非賢不乂歷數有歸者人祇共贊文明懷遠者龜筮叶從所以周開七百之基夏作三王之首伏自莊宗失馭天下分離萬國懷賢三靈改卜明宗皇帝潛符景運克紹寶圖一蒞寰區八周星律偽主從珂始因微績序在維城遇大國之多艱以列藩而入統勦絶裔嗣屠害忠良臨大寶而罔以德聞御諸侯而惟將威脅朕以明宗皇帝每宏厚遇益勵微誠無纖粟而使人可疑無絲毫而事君不謹豈期深苞禍釁暗抱猜嫌欲用姦謀擬相魚肉初以北門之事委朕一生忽將汶上之田遷豫十乘二三其德始終違心既欲害於無辜孰肯扶其不道而遇北朝皇帝英明鑒古威武冠今嫉彼不平閔豫多難遂致纍殲凶寇繼納降兵每借巨功俾成大業朕自興基構頗歷艱難冀兆億而保安敢興寐而輒怠今則重光日月再造乾坤宜覃在宥之恩以布鼎新之命可大赦天下今月二十九日昧爽巳前應在京及諸州府凡有所禁囚徒巳發覺未發覺巳結正未結正罪無輕重常赦所不原者咸赦除之雷雨作解瑾瑜匿瑕宜加蕩滌之恩用示包容之應中外諸色職掌官吏有受偽命者一切不問既除巨蠧亦愍俱焚難全者須正呂刑可恕者特開湯網偽庭賊臣張延朗劉延皓劉延朗等並姦邪害物貪猥弄權罪巳滿盈理難容貸除此三人巳行敕命外其有宰臣馬裔孫樞密使房皓宣徽使李專美河中節度韓昭裔等四人雖元事偽庭咸居重位每持忠慤不務詭隨偽主不任才謀遂致傾覆朕昔在藩邸備所諳知今並釋放一切不問應中外官寮之外有自舉義巳來歸順者委中書門下別加任使應偽庭貶降官未量移者與量移巳量移者與復爵受官亦與復資應徒流收管人並放還伏以少帝地居嫡裔位纂洪圖王從珂始構異謀非理屠害一家骨肉將正承祧之典式敦敬始之名宜令中書門下追尊定諡擇日禮葬妃孔氏宜行追册祔葬應有宿舊臣寮並與量加敘用昨者舉義之地稱師之邦必蹂踐於川原要矜蠲於輿賦其河東管內諸縣稅租今年秋及來年夏稅各與減放一半警蹕經過之地望幸雖榮蕃漢雜處之兵禁暴難備既頒渥澤須示優矜昨大軍兵士自河東以至京畿沿路擾踐之處宜委逐處長吏公當檢覆據頃畝特與蠲放今年秋稅一半朕昨於霸府創置新軍救時昔在於從權恤下今徇於所欲河東所有新招置義勝軍人並放逐便賞罰二柄激勸萬方倘稽甄奬之恩何答勤劬之效應扈駕及相次歸順軍都並與重加優賞但緣宮內庫藏虛乏宜令三司疾速抽徵諸道稅物以充賞給其指揮使等並與超轉官資五月後來巳曾受恩命者亦與依資轉官高懸朗日照臨必備於遐陬大扇仁風亭育罔遺於纖芥應天下歸順節度使刺史下賓席郡職及將校等委中書門下各與改轉官資覆車難襲弊政宜遷恤鄉邑之瘡痍救民人之疾苦其北京管內鹽當戶合納逐年鹽利昨者偽命指揮使每斗須令人戶折納白米一斗五升極知百姓艱苦自後宜令人戶以元納食鹽石斗數目每斗依時價計定錢數所取人戶便穩折納一人湯沐之奉實在王畿兆民凋弊之風宜行仁恕其洛京管內逐年所配人戶食鹽起從來年每斤特量減價錢十文應諸道州府所徵百姓正稅斛斗錢帛等除係省司文帳外所在州府並不得衷私增添紐配稅物應有懷才抱器隱遁山林方切務於旁求宜遍行於搜訪委所在長吏備達朝旨具以名聞致仕官或筋力未衰才能可任將表乞言之敬難從歸老之心委中書門下商量奏聞當議升擢義夫節婦孝子順孫委逐道奏聞當加旌表應自起義巳來或盡節捐軀歿於王事宜加褒贈兼恤妻孥俾義激於忠貞庶恩霑於幽顯鳴諫鼓以俟讜言列柱石以申寃滯將聞善以自戒思與物以垂恩備著前規用光大業或直辭可貢或有理可矜各務奏陳皆當鑒納明宗朝屬之內宿舊之中或功名曾著於輿情或材氣可裨於公政宜委中書門下量才敘録關防凡有征稅省司曾降條流慮多時而或有隱藏因肆赦而再頒條貫應諸道商稅仰逐處將省司各收稅條件文牒於本院前分明張懸不得收卷榜內該名目分數者即得收稅如榜內元不該説著係稅物色即不得收稅宜令所在長吏常加覺察如敢有違條流不將文榜張懸將不合係稅物色收稅欺罔官法停滯商賈盡時具名申送奇伎淫巧往誥不容務實去華哲王所尚應有浮虛假偽之物不鬻於市肆委所在常加覺察犯者加重刑責士流之內有懷才抱器碩學殊能者委中書門下搜訪任使勿拘門地資歷於戲愛民如子王者之所以勃興損巳從人眇躬而安敢自忽況朕驟主百靈之祀創開萬乘之基朽索在懷求衣益勵更賴庭中多士閫外諸侯咸罄良籌共裨不逮初寧鯨浪適啓龍圖冬陽開溫照之光春雨灑涵濡之澤惟新正令不宰元功中外臣寮體豫深意歷代省方蓋觀風而設教前王展義皆利國以便民雖今古以有殊在皇王而無異朕艱難創業宵旰臨朝每軫念於瘡痍敢自辭於癯瘠近以浚郊奧壤梁苑名區乃舟車通會之都實人物殷繁之地春秋租稅可贍給於兵師遠近蒸民免煩勞於饋運爰從清洛遂整鳴鑾六飛既議於按巡四海漸期於開泰今則巳臨汴水宜順薰風思覃渙汗之恩特布如綸之命普安區宇首念狴牢況當長養之時曲示矜寬之澤應天福二年四月五日昧爽巳前諸道州府見禁囚徒大辟巳下罪無輕重並從釋放凡關布澤務在及民宜加軫憫之恩俾遂蘇舒之望天福元年巳前諸道州府應係殘欠租稅並特除放諸道係徵諸色人欠負省司錢宜令自偽主清泰元年終巳前所欠者據所通納到物業外並與除放或水旱為災蟲螟作沴儻無軫恤何致阜豐朕昨行至鄭州滎陽縣界路旁見有蟲食及旱損桑麥委所司差人覆量與蠲免租稅河陽管內酒戶百姓應欠天福元年閏十一月二十五日巳前不敷年額麴錢並放其諸處應經兵火者亦與指揮當罪即誅式明常典既往可憫宜示深仁偽主清泰中臣寮內有從誅戮者並許收葬要荒之內鄉黨之中宜宏養老之規式表問年之道天下百姓有年高八十巳上者與免一子差徭仍令逐處置上佐官過滎陽而因思紀信屆夷門而尚想侯嬴著高義者猶足歎嘉蹈忠節者固宜旌賞事資激勸恩在褒揚梁故滑州節度王彥章效命當時致身所事凜千年之生氣流百代之令名宜令超贈太師子孫量才敘録亡命藏姦此自欃槍之際好生惡殺宜宏曠蕩之恩應諸道州府管界內有自偽命抽點鄉兵之時多是結集劫盜因此畏懼刑章藏隱山谷宜令逐處曉諭招攜各令復業自今年四月五日巳前為非一切不問如兩月後不來歸業者即令所在長吏嚴加捕逐復罪如初於戲撫俗安民御宇式明於敏政行慶施惠為君用顯於推誠況潛躍之時開創之始外則五侯九伯協力裨助內則四輔三公同心翼戴巳寧華夏實賴忠良既光帶礪之勳無忘盤盂之誡凡百有位更竭乃誠共致隆平永輔寡昧布告遐邇宜體朕懷自昔聖皇明帝膺圖受命必觀風而設教或展義以省方上則順彼天道下則從其人欲朕創開基業每遵舊章期四海之混同法五載之巡狩乃眷全魏肇啓新都頃屬經綸嘗茲潛躍宜從望幸俾慰來蘇遂整明鑾旋臨舊地雷雨作解式覃曠蕩之恩日月無私用廣照臨之道應三京新都諸道州府天福六年八月十五日昧爽巳前諸色罪犯巳結正未結正巳發覺未發覺罪無輕重常赦所不原者咸赦除之其持仗行劫并殺人賊免罪移鄉仍配逐處軍都收管其犯枉法贓人雖免罪即不得再有任用或始因罪犯久處竄流特行洗滌之恩各遂歸還之望應配流人并巳前逢赦不在放還人等并放還徒罪年限未滿者並放偶負瑕疵爰從黜降俾量移於近地宜漸復於舊資應貶降官等未量移者與量移巳量移者約資敘進用或歲因災沴民用艱辛久係逋懸宜示蠲免應欠天福五年終巳前夏秋稅租并沿徵諸色及營田租課並與除放朕頃當開創爰在并汾或傾歸順之心首謀翊戴或擁驍雄之旅力效推崇洎汜水興妖鄴城待罪每令致討皆立奇功漸臻開泰之期愈念艱危之際宜頒殊渥允答茂勳應河東起義之初佐命效順收復鄴都汜水立功臣寮將校等並與加恩其亡歿者更與追贈子孫巳有官職者與遷改未有身名者與敘用經過郡縣迎奉乘輿既供億以為勞宜旌酬而示寵自東京至鄴都沿路供頓官員職掌等並與加恩六飛行幸萬騎扈從慮旁午於路歧微損傷於苗稼應沿路有傍道稍損卻田苗處其合納苗子及沿徵錢物等據畝數並與除放載念雀臺昔居侯服撫綏六郡臨蒞四年眷彼職員依然父老無吝推恩之典仍敦尚齒之風鄴都并相澶貝博衛等州官員職掌內有頃歲潛龍時在職者並與加恩管內耆老八十巳上者並與版授上佐官為國之規利物為本農器俾從於改革耕民必致於便宜諸道鐵冶三司先條疏百姓農具破者須於官場中賣鑄時卻於官場中買鐵今後并許百姓取便鑄造買賣所在場院不得輒有禁止攪擾擢文武之才今之急務旌孝義之行古有明文贊治道以克隆致人倫之式序山林草澤內有文才武藝為衆所推者委長吏切加搜訪具以名聞當議量才敘用孝子順孫義夫節婦並與旌表門閭天覆地載無所不容改過自新於斯為美應亡命山澤負罪潛藏者並放罪招攜各令歸業所在切加安撫如過百日不出者復罪如初唐室忠臣鄴臺靈廟濟蒼生於一境正皇統於中區宜命褒崇用彰激勸唐梁國公狄仁傑與追贈官秩主掌曠敗錢物逋懸宜示矜容聊加蠲免應天福三年終巳前諸色場院官欠負官中錢物人等纍經徵理通勘實無錢物家業者並與除放其人免罪任從逐便不得再任使無黨無偏徇至公之道去泰去甚戒求利之心私下債負徵利巳及一倍者並與除放如是主持者不在此限邊陲管界蕃部經繇言念疲羸良深軫恤欣代蔚并鎮州管界內有經蕃部踐踏卻苗稼者其合納苗子沿徵錢物等據頃畝與除放其經燒舍室殺傷人命者據戶下合徵苗稅並與除放於戲居域中之大為天下之君按巡既展於盛儀渙汗宜覃於慶澤人情允洽帝道有光更期忠藎之臣永贊隆平之運布告遐邇知朕意焉天有四時首布和陽之命君臨萬國先宏曠蕩之恩所以垂眚肆之文則周基遠大示寬仁之詔則漢業興隆朕猥以眇躬獲膺大寶顧惟涼薄每懼顛隮旰食宵衣恐一夫之失所臨深履薄憂庶政之未孚雖粗致小康而未臻大化一昨災纏沙鹿兵駐銅臺擐甲執兵頗勞師旅飛芻挽粟重困生靈賴天地垂休將相叶力克寧邦宇永靜煙塵凱歌共樂於班還喜氣實騰於遠邇豈一人之感召蓋羣后之扶持弓矢載櫜大慶巳流於中外雷雨解作普恩宜被於寰區庶使齊人咸霑霈澤可大赦天下應十月二十五日昧爽巳前除犯十惡光火殺人偽行印信官典犯贓合造毒藥屠牛鑄錢外其餘罪無輕重巳結正未結正巳發覺未發覺咸赦除之侵官潤巳爾其有誅督責暴征我所不忍應係欠省司課利場院官等宜依近行宣命期限磨勘徵督內有送納所欠錢物得足者其違限愆罪特放如有沒納本人及保人家業盡抵外尚欠錢物更無抵當者其所欠並與蠲放其逐人罪犯特從減等其去年降宣命月日後來欠負者不在此限昨以水旱為沴什一未均冀便蒸黎因令檢覆未明公法或彰隱漏之愆爰念小民宜示矜寬之典近令檢田有隱漏合當罪犯者並放所有合罰令倍納租稅者特放並令卻依實頃畝輸納貨泉所聚徵督必行況係省之逋懸宜應期之供辦但以兵戈之後帳籍空存巳行蠲放之恩尚憂未普再示優饒之命式表推恩天福元年應經兵火處州府諸色場院因此失陷錢物等先曾指揮蠲放一半者今並全放未曾經減放者今與蠲放一半天災或降地分所招攜老幼以流離棄田園而蕪沒深懷惻憫宜示招安蒲同晉絳滑濮魏府鎮定等州人戶或經亢旱或屬兵戈逃移人戶等應移戶所欠今年巳前諸雜稅物並特除放宜令州縣曉示招攜如有復業者仍放一年秋夏租稅二年諸雜差徭爰自攻圍每多徭役或因兵死尚有戶存言念傷痍屢宜優恤應差赴魏府城下人夫內有中傷身死者除巳支贈外特放戶下三年諸雜差徭勤官奉國既彰盡瘁之誠賞善酬勞爰舉必行之命應魏府側近州或曾祗應供饋或曾部領人夫當職員寮及州縣官等宜令逐處速具名銜分析申奏當與加恩區宇之表咸在照臨疆埸之間寧容隔限示王者之無外期國家之大同應淮南西川兩處邊界自今後不得阻滯商旅明堂欲搆必自羣才大道曲全俱無棄物將期多士詎可遺賢纍朝廢棄官員與量才敘用頃者借率猶有逋懸方務優饒豈宜徵督先率借洛京舍錢其所欠並放七萃師徒五營吏士偶因罪負遂至逋逃念曾效於忠勤宜顯行於招誘自用軍巳來應有諸軍及諸色負罪逃背諸處人等限一百日內許所在陳首並不問罪卻與放管如限內不出復罪如舊諸州府應有見禁此色人家口骨肉並從釋放恩隆加等固有明文道在恤孤宜宏異渥自去年出師來諸軍將校有沒於王事者子孫並與量才敘録臯陶五刑既從流放商王一德用解網羅想其憔悴之容爰示哀矜之道應貶降官與量移巳量移者與復資流配人等並放還仁及枯骨澤渥重泉眷哲后之芳蹤乃有國之令典魏府管內用軍巳來墳墓所毀無主者委逐處官吏指揮隨事修整祭奠仍費官中支給賦斂未省杼軸猶空言念疲羸聊得蠲貸諸道州府營田戶部院務省莊等天福元年秋夏租課錢帛斛斗諸雜物色等除巳納外應有逋欠並與蠲放於戲萬靈蠢蠢生成咸賴於上元六合茫茫舒慘悉由於元首朕每興念慮莫釋焦勞遂覃在宥之恩將合好生之德朝野士庶中外臣寮體豫蕩蕩之懷贊我巍巍之治無怠於協謀勠力共期於偃革修文益勵乃誠永裨寡德布告遐邇咸使知聞大晉皇帝奉書大蜀皇帝伏自中原多故大憝繼興朱氏不道而皇天不親沙陀背義而蒼生失望不期景運猥屬眇躬方鼎足以分疆宜鄰好之講睦況有姻親之舊敢交玉帛之歡機務方殷保攝是望昨者災生安陸釁接漢陽當三伏之炎蒸動兩朝之師旅豈期邊帥不稟上謀洎復城池備知本末尋巳捨諸俘執還彼鄉閭不惟念效命之人兼亦敦善鄰之道今承來旨將正朝章希循宥罪之文用廣崇仁之美其杜光鄴等再令歸復
