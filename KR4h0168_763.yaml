front:
  text: 全唐文欽定全唐文卷七百六十三景讓字後巳贈太尉憕孫寶歷初為右拾遺沈傅師觀察江西表以自副歷中書舍人禮部侍郎商華虢三州剌史自右散騎常侍出為浙西觀察使入為尚書左丞拜天平節度使徙山南東道封酒泉縣男大中中進御史大夫拜西川節度使病丐致仕以太子少保分司東都卒年七十二贈太子太保諡曰孝
  hash: sha256:137923dd8137d8b10afd1ef7e5ccea5af7928fd720aa682ee24df8af2a23aa9a
