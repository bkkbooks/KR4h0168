body:
  text: 青門之左兮層宮嶙峋資睿覽以臨下得嘉名於望春故在東以就乎陽位當出震必俟於良辰乃發惠和式遵夫月令無勞轍迹自表於時巡其初也度宏規法大壯標上苑而獨出儼復道而明望遠天聽以遂於㣥生浹皇情用交乎四暢鮮飈微扇籠輕靄於高臺淑氣初臨鎖浮光於綵仗吾君於是縱目前檻馳神遠郊散晴煙於地表拂佳氣於林梢覩青陽之煦然載懷祈穀聽倉庚之鳴矣不使覆巢布政有孚宸遊是假察微明於遠嶠睇新緑於平野南山之翠色盈前渭水之素光在下蓋將賦籍田於晉代豈比選吉日於周雅美矣哉矗雲楣以重謺煥藻井以輝潤居高而遠無不臨涵澤而動無不順諒可裨於恭默非取樂於崇峻况乎流鶯欲囀初柳生姿懿祥風之習習增麗日之遲遲偉鳳闕之樓臺萬邦仰止盼龍鱗之原隰五稼惟時聖上所以成化用彰克勤是務元功廓以遐及仁術紛其大布斯宮寧泰侈之為斯望匪盤遊之故既而天地叶神人和修文以昭士耀武以止戈然則賦望春之事宜乎播大雅而登歌戴禮有之曰五嶽視三公四瀆視諸侯古之禮於嶽瀆尚矣在昔夏后氏隨山濬川以畫九州華陽黑水界我庸蜀劍閣之陽益都饒焉岷山導江東別為沱禹績也瀆者曰江曰河曰淮曰濟導積石桐柏沇水凡四流皆發源注海者也唐天寶六載開元神武皇帝加封南瀆為廣源公其三者亞焉漰沛滈汗自峽奔荊且北且東百川會同爰及吳楚萬里歸海水府怪神非江不安水物族生非江不全海門二山送我為滄由岷激沱遠邁無壅斯所謂祇上天而被下土南瀆之為大也壯矣開元皇帝古禮是式詔曰惟夏四月肇辰迎氣太守其率祭官祀南瀆於益州設玉筐及洗樽罍簠簋既舉冪初獻祝進神左右跪揚我詞其文曰維某年歲次月朔闕子嗣天子遣某官某昭告于南瀆大江惟神包總大川朝宗於海功昭潤化德表靈長今因夏首用率常典敬以玉帛犧牲粢盛庶品明薦于神尚饗至于今不衰詔之歲歲直丁亥逮及戊寅當大中十二年合一百一十有二歲越五月朔辛酉日甲戌臣景讓承聖敬文思和武光孝皇帝詔自御史大夫檢校吏部尚書尹成都鎮蜀西川又五日戊寅復加檢校尚書右僕射其他如故凡再命皆以兼御史大夫寵焉秋七月庚午乘輅至止遂謁瀆廟惟神盛烈著金石刻他所必見於斯闕耶惟神奉大禹之休得蠶藂魚鳬望帝之勳開明之沒玉壘李冰之穿二江嘉而保之沃此黎首水旱不作于今賴之赫哉成功其可默耶乃作銘曰滔滔沱江發自岷山浪溢流飛走峽之荊逮及吳楚百川以歸南北東西萬里湯湯電激雷馳水府神宅鮫人陽侯世不可窺南瀆之功載主載張陰烈希夷上戴大禹丕承我唐開元其期先主不容天絶劉宗匪瀆殆而洸洸孔明鞠躬墮星匪瀆不悲念此下民於萬斯年九穀繁滋我來守土敬揚神休以琢豐碑珣宣宗朝官中書舍人以禮部侍郎出為浙東觀察使門下周禮將軍以六官參選漢庭拜郡俾九卿迭處出入中外發揮聲績選用之重古今所難銀青光祿大夫行尚書工部侍郎紇干臮惟爾元和中以文學德行升為甲科貞規藹然雅有公器火化而方知玉性歲寒而益見松心洎振拂朝纓抑揚官閥章羽儀於省署煥詞藻於綸闈朕以瀕江之西悍俗難理輟爾禁掖委之藩條果能宣愷悌之風著循良之迹南臺起部無展爾庸所宜將我舊章化彼南服於戲朕垂衣裳以臨四海因性分以撫㣥生必欲叶軌而同文不敢重近而輕遠况駱越故地蠻夷錯居尤須謹廉以察封部青綬繫趙堯之印皂幨分鮑永之兵同升將壇式表豫意爾其往哉勉移風俗不挹於貪泉無使珠璣獨還於合浦門下昔孫宏以儒學進身寵兼裂土鄧禹以勳庸著效儀比三司是皆內外同規古今所重再揚新命允屬元臣特進守司空兼門下侍郎同中書門下平章事充招討山南平夏招撫黨項兵馬都統制置等使白敏中才智可以贊元功誠明可以匡大務事君惟恐不盡守道惟恐不遜而能以無心為待物之心以無用為當官之用朕君臨之歲首付台衡六更星霜勤節如一自羌戎犯塞師旅屯邊招懷莫來征伐無狀爰用命爾往其鎮之果能潛移梟獍之心坐絡豺狼之首始自夏半及于秦正大建功勞克寧烽驛終此誠意非卿而誰今封部既清是用休爾之討伐馬牛皆散是用罷爾之統臨不移論道之榮更帖持衡之貴纂乃舊事對豫勤懷可守司空同中書門下平章事充邠寧節度觀察使門下彭城重鎮西楚故都壺關奧區上黨雄寄一則控長淮之津要一則衛洛邑之封疆撫制稱難才謀是急爰得二帥乃建戎麾前四鎮北庭涇原節度使康季榮方面信臣軍旅良將氣振金鼓義激風雲慕耿恭拜井之誠有王翦請田之計武寧軍節度使鄭涓梓宏材圭璋秀質明能燭物利可剸犀挺翁歸文武之能繼叔度循良之美或藝習韜鈐性惟忠義擅威聲於百戰布雄名於五營作鎮邊方克彰勳業或早踐華資夙揚休問騰芳猷於詞囿振官業於吏途纍膺寄任必流政聲並用推馭衆才蘊斡時器績效既宣奬擢是命建高牙於徐土移大斾於邢郊用展良能務從委著爾其分蒞茲土敬敷國恩嚴號令於三軍信賞罰於百吏使轅門推戴閭井謳歌再膺九揆之榮更峻六卿之命仍兼亞相式寵中權無替前功勉收壯節門下星以斗牛鎮臨吳楚有重江復關之奧實通都大邑之雄控制上遊儀刑㣥后自非台衡舊德廊廟宏材則何以膺茲喬嶽之求副彼經邦之寄高選中外無踰碩臣劒南西川節度使杜琮間氣孕賢相門襲慶韓安之國器宏茂元凱之武庫深嚴禮樂文身守而勿失政刑體要用之則行夙振英聲薦登相位廟堂之上有所不為縉紳之間共稱其道象賢祖德嗣美前修體平陽之縝密暢黃瓊之練達自持瑞節作鎮靈關盛有建明衆推理行故疆盡復嚴道益清夷洛威懷軍儲流衍德政有同於冬日邊封不犯於秋毫朕以禹貢九州淮海為大幅員八郡井賦甚殷分閫權雄列鎮罕比通彼漕運京師賴之自江已南近聞歲歉黎民稍困流庸是虞思得慈惠之師以行惻隱之德黃霸在位朕無憂焉汝為司空兼持邦憲慎乃出令以臨其人務遵訓誡勉宏休績門下寅亮天工既稱星琯葺寧戎塞頗茂功庸信出入之有勞顧優崇而宜及况梁岷巨鎮全蜀奧區有彭濮之富饒帶巴峽之險要非圖舊德難洽新恩邠寧節度使白敏中嶽降英靈時推才傑周旋文雅城府寬宏久侍禁闈備流聲績及居鈞軸頗茂芳猷朕起滯淹網羅賢彥外野無孤鴻之響歸軒有連茹之征揚於王庭鬱矣皇士莫匪爾績動契豫衷洎羌寇憑陵殿茲西土戎醜斂路柵堡相望既收功於郇邠宜移斾於井絡於戲勿以地遠而怠於躬親無以位高而忽於微細勗思後效無替前勞懋哉懋哉服我成命門下漢制郡守有善政者增秩賜金周官諸侯有聲名者加地進律前代令典我將因之天平軍節度使李景讓早以文學德行列於四科中含柔嘉表以堅白直比汲黯孝如曾參素懷淡然清節可貴峻風規於臺閣流愷悌於方州居為國楨出作藩柄朕惟憲宗親除狡穴手復全齊付任在豫敢不祇授以爾事親既孝於我必忠俾之鎮臨果茂聲績是用載新社土改築齋壇不可使萃美於東方所宜遷仁於南國况荊衡舊服江漢上遊天作城池地連襟帶昔曹王以法繩封部歲久則弊除于頔以共東征徭人流而賦在不有斯惠安能理之勉圖官守式副令聞門下登壇仗鉞訓整為先攬轡登車澄清是切膺一方之寄任兼二事之重難不有宏才孰允茲選銀青光祿大夫守刑部尚書韋損稟天之粹體道之和接物如冬月之溫操心若寒松之徑導詞源而不竭泛學海而莫窮久服大僚早揚休聞纍更中外迭處清崇善政克著於藩方雅量見推於朝右朕以天平巨鎮慎擇帥臣割據魯衛之封控帶山河之壯臨制綿遠戎旅驍雄非仁惠無以蘇疲人非威信無以正師律以爾才周物務識洞事先斷自余懷得之長理爾其推誠撫士布德安人容易則惠姦苛察則撓政害於事者必去無顧慮以妨公利於俗者必行勿因循而不決當竭乃力副我知人升崇班於五兵啓元戎之十乘服茲寵渥勉恢令圖門下陶唐古郡晉國全服掌北門之管鑰控朔塞之河山貔虎連營氐羌萬落用鎮興王之地必求易俗之才果獲碩臣允膺謀帥銀青光祿大夫檢校司空兼太子少師盧鈞玉山當晝水鑑澄秋揣摩政經淬勵心術蘊賢人之大業蹈君子之中庸進取不爭於險夷操尚無移於風雨歷踐華貫早揚淑聲便蕃大僚始終一致屢委戎寄亟聞獻功番禺清紹於隱之江漢愛侔於叔子壺關所復汙俗惟新解亂繩而有條遷惡子而從化洎佩囊天府受鉞夷門克樹風猷薦舉方策今以塞垣未靜虜族多虞莫善綏懷愈生疑二道路既聞於漁奪凶殘頗見其鴟張尚念前勞猶寬肆伐爰擇待時之器式觀禦衆之能輟於朝端俾之鎮府爾其賞罰無私德刑公用以清靜之方闡吾聲教以愷悌之義宣我化條理必成於恩威政無庸於煩紊勉爾令典副豫知人於戲北虜熾周南仲有往城之績西羌擾漢營平陳保勝之方疇其嗣之必有能者寵秩既光於論道恩榮仍亞於台庭以壯戎旃勉服休命門下鎮臨白馬介趙魏之封陲地控黑山振羌渾之衝要儔茲並命允屬長才前河東節度使李業宗室誠臣幹時良傑傳山西之將略襲隴右之家聲右金吾衛大將軍契苾通早擅英姿常推壯志挺鶚立鷹揚之操知玉鈐金匱之書或建斾雄藩功宣保塞或馳軺異俗績茂和戎咸竭器能載光任使穆撝謙於大樹蘊風望於長城以爾威足靖邊故委以疆場之事政能檢下故授以統馭之權於戲整旅訓戎觀風涖俗仗誠明以懷獷悍布惠化以恤疲羸將務息人無或生事明典刑以謹侯度示恩信以洽戎心用叶睦鄰宜籌經遠換騎省八貂之貴仍地卿六職之榮勉恢壯猷無忝登壇之寄行膺休命用收制閫之功門下太公經武首述文韜春秋謀帥亦啓義府大暢弛張之道必求通變之才况乎撫易動之羌戎扞難集之關郡安邊禦侮斷付能臣權知刑部侍郎畢諴端慤知善文學致身氣則沉詳思有高妙早馳榮問亟踐清途該洽憲章抑揚臺閣聿來禁署益茂芳猷孔光之溫樹不言王褒之洞簫曾諷憲慮必振於遠大抗志不避於重難擢於文昌以酬職效強明不滯朕心器之固可以式是師干授之龍節况地雄秦塞境壓邠郊壯南牧於盛秋作西陲之巨屏是宜平其險難繕彼甲兵貞律臨戎推誠馭衆遠明邊務贍闕軍儲厚衣食之恩養闕闕之勇稱於無事之日常為有備之謀連營苟示於嚴莊種落自當於柔服布我大信深仗親規於戲竇嬰賜金不為廊廡之有營平積粟免煩餽挽之勞減費惠人於斯為急節宣柄任稱朕意焉貴視漢貂榮兼趙印茲為寵數以耀啓行門下王者建諸侯以鎮撫方域立將帥以藩屏皇家受任惟難選命斯重而况控三江之黎庶總六郡之賦輿必得兼能乃膺成奬前鄭滑觀察使韋慤紳冕令才人倫粹器業光經濟道茂溫恭蘊冒雪之貞姿挺發硎之利刃自馳聲詞苑耀價儒林雅範蘭馨詞雄綺麗踐更華貫揚歷顯途懿效彰明布於臺閣洎職司誥命參二春官業彌振於訓詞道愈光於得士及再遷會府休聞尤彰由是嘉乃良才俾升節制流美化於洪河之曲布威聲於白馬之津宜舉寵光用酬休績乃眷夏口實曰雄藩通波遠接於荊衡作鎮式臨於漢沔由是再新戎斾改築齋壇興滑臺之詠歌慰鄂渚之黎庶爾其以信義為理本以賞罰為政柄法亞夫訓旅之術以肅轅門採龔遂理人之方以清郡國崇秩兼寵無易舊恩勉乃令圖勿替前志門下撫千里者必仗於誠信統三軍者固資於良帥况地雄鄜畤壤接王畿總貔武精鋭之師制犬羊雜種之俗聿求上將以鎮近郊守太子少傅李彥佐夙負雄明早通軍志生知忠義旁閲詩書計擬六竒功高百勝聚米而山川可料變幟而壁壘盡傾奮廉藺之明謀蓄關張之妙用頃者常膺奬任纍踐藩垣信洽戎夷愛深師旅有馭衆安人之效著在邊方有廉平貞慎之規騰於朝論自避榮私室物論尤歸朕以雕陰重藩羌渾小擾蓋由乖於撫馭遂失和寧思得長才往圖鎮理爾其敷我恩信戢其猖狂靜彼戎疆用資壯略於戲廉頗雖老尚請臨戎李牧居邊未嘗生事遐觀前舉勉副徽猷榮加五教之尊仍帖三臺之貴服茲休命無忝寵光門下乃眷岐陽襟汧擁漢古稱右輔以扶助王圻今為別京以屏翰戎落載煩元老往撫舊邦實資經國之謀高副安邊之寄守太子少保崔珙稟粹嶽靈挺生國戚門容駟馬族盛八龍胸襟洞開智略輻赴早以茂業踐於台衡宣力致君有犯無隱怙叔敖之喜慍體伯玉之卷懷洎服休天朝保洛邑誠明之道華皓不踰能全素履之真雅得大臣之體方叔之猷克壯師尹之望攸歸朕以保塞禦戎深圖良算餽軍艱食常在勞懷由是渴王商之儀刑佇營平之籌畫伏蒲之奏前席忘疲既符咨嶽之求宜舉齋壇之典自閫以外爾實專之斷守宏才庶集吾事勉敷恩信務洽華夷且慰恩思善圖政柄峻槐庭之禮命寵茅社之侯封服我徽章敬茲有土門下乃眷營邱表於東海富強號千乘之國繁雜聚四方之人假上將之威權壯中軍之垣翰將疇閫寄必在信臣守尉衛卿韋博文苑騰芳儒林擢秀襟靈曠遠風度詳間周通爰表於器能強濟式彰於事任早以重價踐遷清途諫垣流謇諤之名通邑擅神明之稱頃自移曹九緩步八磚沖淡安身卷舒惟道應茲圖任允叶僉諧懿彼全齊實為右壤禹貢別九州之盛海濱綜五郡之雄昔周命太師漢封韓信啓土用申於帶礪分茅克懋於藩維選任之隆古今攸重於戲平仲盡規之節夷吾當俗之方經堂阜而徽猷可循指牛山而忠讜如在餘波未泯遺愛斯存禮節既洽於里閭風謠尚傳於古老為政之暇無忘咨詢盛鐵馬於師壇帖金貂於騎省祇膺成命勉服寵光門下將相大臣中外迭任入奉股肱之寄出為藩翰之雄無爽具瞻式彰注意金紫光祿大夫守中書侍郎兼戶部尚書同中書門下平章事充集賢殿大學士上柱國河東縣開國子食邑五百戶裴休氣稟嶽靈夢叶巖瑞威鳳孤翔於玉圃仙鶴獨步於芝田學精典墳文緯邦國自彤庭對策諫列升班粉署擅二卿之榮綸闈回五字之妙洎司饋運整葺牢籠策畫每得於親聞功庸必見於顯效章程軌範歷試無差是用付以權衡宜承任委咨之遠略炳然大綸四后協心萬邦繫爾今百度有截庶績其凝前時屢以疾辭猶煩臥理豈無優賢之道因遂由衷之意乃眷梁苑實為重藩荒大東於周疆接小沛於漢壤富庶將及悍勇無譁仁化巳洽於一方清風漸扇於全境閉關自固懸瞂不鳴可仗台臣置之靜理爾其踐厥位暢厥庸侯服既增相印不解輔弼莫繫於遠邇聲容暫間於朝昏敬哉戒哉服我重命可檢校戶部尚書同中書門下平章事使持節汴州諸軍事行汴州刺史充宣武軍節度副大使知節度事汴宋亳等州觀察處置兼亳州太清宮等使散官勳封如故門下秦之舊都漢為右地扼戎疆之要害作上國之藩籬旁聯封畿前抗巴蜀其所受任必擇忠良刑部尚書兼宗正卿李玭生王侯之大家傳帶礪之盛業夙負才術顯於官名周旋令圖佩服義教信以自立誠而致明北海著輯睦之規南方流愷悌之化潔清知巳寬猛協中連委翰垣載高理行朕心所屬物議與能洎擢處月卿掌我天旅不忝維城之寄副豫同姓之求今以昆夷來朝願納故壤將復河湟之境必資整訓之方遂結疆場付爾汧隴於戲惟昔乃祖曾顯是邦勿隳貽謀光膺分閫兼尹正察廉之重帖文昌憲府之崇勉副家聲以酬殊奬吉大中時人今上元年春正月楚州新作內城之南門何以言新因舊之云也何以言作更從王制也王制若何曰天子諸侯臺門也何稱內城別於外郛也春秋傳曰南門者法門也南面而治者政令之所出也楚大邦也日者草創南雖設譙門卑且陋但闔兩扇為露棚於前振軍旅焉露棚不能蔽風雨亟理而亟壞由是剌史兼御史中丞李公新作之公名荀隴西成紀人用文學德行進嘗言於賓客曰走前為戎曹郎白於執政曰太平時天下有府兵今散矣而折衝果毅郎將戌官等輩尚冗食焉艱難後天下有府兵而軍籍多空名庫兵皆刓腐安不忘危易道也有備無患軍志也晉室尚清言胡馬譟河洛天寶怙富庶燕盜腥中原職司其守言非出位幸相公財之當時執政雖似不為意他日揖走於列曰泝淮而上達於穎而州兵之益團練者纚聯五郡焉楚最東為名郡疆土綿遠帶甲四千人征賦二萬計屯田五千頃凡兵賦食三者相通也公嘗亟言兵願試鋒穎焉召對延英得列以聞可脂轄矣故遂授銅虎符竹使符來此公始下朱轓遽視城洫簡兵甲閲卒伍若不適於意者楚人再無歲負租逋穀甚多乃去鄉胥之啄害良民斂賦與之緩期人戴其惠征租力人入矣得善用籌者勾稽公物之出入抉負財且二百萬俾軍吏之敏察者覘公田之稼得將隱謾之穀不翅萬斛掌公財而坐於市占軍籍而蔽其家計其入僅足其廩食牧財而斥其人外廏有征馬雖不滿四千蹄而藳粟脂藥之用圉牧將卒之列繁且耗公曰幸天下無事就有道而此悉罷去之月省費三萬藏有墆財矣乃完補卒伍乃犀利甲兵乃飫飽吏士乃恢崇規制掾曹有公膳牙門有常饔胥史有官厨衛卒有給食合而言之曰廩餐錢者三百七十人先是以歲用不足常自正月迄于仲夏凡曰廩餐錢者皆半之俟斂新賦而后復之或災沴水旱賦不畢入亦終歲不復公曰寧損他費焉有責其盡力而使之歉復耶悉賙之仍筆於檢日用約若今歲後或不易羊羹之敗其無虞乎由是吏胥醺其德將卒許之死矣士伍寒燠有若賜衣詔以歲貢征緡賦之嚮者泉輕而幣重賦之以帛而士得其贏今也泉重而幣輕猶賦之以帛官受其利公曰吾心有不安焉盍賦之以緡苟不足即與帛而時其物之價而直之既聞令歡聲動壁壘皆曰有君如此使我蹈水火可也乃新南門巉然而樓增以舊五之二焉劃為雙門出者由左入者由右夾築高阜類觀闕而非者九軍壘皆爾命之曰却敵慮壚土之喜陂陀也鱗臂而塗固之周施檻楯其暘也建大斾鳴笳鼓以司昏曉焉其雨也卷斾援袍於樓中以謹擊柝以嚴教令以壯都鄙以張軍聲為理若此足塞執政之云兵賦食三者相通試鋒穎之説矣凡畚築攻木瓴甓塗暨者無慮備於軍伍而州閭人皆來縱觀耳既休役勞工顧謂吉曰子學舊史願為我記日月不願黼飾空言曰古者國有史舉事必書國有詩王者採之知其國之風自秦郡縣天下史之與詩皆止矣獨有銘功記事文之金石者近於國史國風之類歟然言之不文不能播遠請將俟作者公曰否子焉用辭既不得命乃考三實以書往歲有將作少監李姓陽氷名善籀書尤工為大字瑰碩多力郡邑省寺得其署題者榮而葆之大歷中客有楚因大署州門昔人措之於西偏至是公易之於南門以表揭遠近或曰宏制異迹公相期於數十年間斯盛事也不可以不識故著之於末仲春貞陵復土㣥臣上言請御端門赦天下改元上思慕未許故猶以大中紀年十四年四月二十一日謹記均字之材泉州南安人官昭州剌史大禹分九州之産生物各有其處獨人之善惡無區別之地是聖人知民心牽於所化也夫理有風而化有本國者風帝王之理邦者本牧守之化二漢以還風化相蕩貪波勃漲人不棲身故有得一郡若豪虎之暴豚羊焉猛既有餘化宜不善也有唐洗叔世之弊惟牧守不新其規實乃知風化之本未可移去然則祿食者任國不務其理為邦不敞其化愚而不知夫祿食之道也惟閩嶠拔一臂西指則建安在焉其郡襟山而束水其人猱黠而易隨等閩之支屬特稀聞善化者得非地深法蠧會斂無時猾吏坐恣姦欺黎庶日為蜂蠆哉皇帝遠懷疲俗樂有嘉政使君前剌三郡雅稱善化今茲東授必能伸病俗以紓重寄矣將期後賀特以序行唐武宗二年余遷斯境其場由西十里右協精廬前距危岫形拘勢促不似公門故其人輕而險其官屑而殘時非厭遷殆有數也今巳卯年覲季父于此視㕓里若巨邑覽風物如大邦鱗鱗然廨宇之羅靄靄然煙火之邦一派趨碧㣥峯走青橫飛而野鶴沖塵曠望而晴郊遠去是以俗阜家泰官清吏間凌晨而舟車競來度日而笙歌不散故知興廢有時吉凶由地不然何勞於舊宇而逸於新亭耶吾友王顓字還古鶯泊未遷祿為親屈莫邪曾試犀象無全是年冬枉車再至蓋有為也先是知豫謀展覲視驟謁簾幃去才旬月歸諧素志知還古不日青雲暫適我願耳徒服其所刊變風易俗嘗聞期月之內變為大縣乎是亦斯場人士之所願也其他故事前記巳詳其或加豫未可無述涒灘歲越垠曠旱塞諸陽遷市不雨祈山川庶神又不雨觴土龍舞巫覡愈不雨或言邦有術人能捕退龍而譟之昔歲嘗然農剩其澤及召術人至而旱色如故太守怒亟命擒之術人遁去矣其遺囊有書一幅目曰人旱旱有三曰天旱國旱人旱曷為天旱蹇陽肆凶下土祇慎雖六七歲黎人不飢曷為國旱君道熾災德涸仁枯貪風暴氣蒸為時癘曷為人旱邦燬其政吏賊其行千里人心燥不為陰夫天旱求諸仁仁洽而時豐國旱求諸德德潤而澤流人旱求諸政政清而俗阜今貨遊於上刑黷於下百姓焦愁結成恨暑所謂人旱者也邦守不清其政而逮龍貨雨是猶乘檋適海豢羊望翼於何可冀乎太守得書增怒是歲自正月不雨至於五月明年殍死者數千人而太守亦以財禍學者多稱仲尼歷聘不遇吾謂仲尼觀禮行道不歷聘不遇吾謂仲尼觀禮也夫二國交歡曰聘以臣使於君亦曰聘男輸財於女國駕帛於士皆曰聘故無財與無君國之命不曰聘也當德蝕衰周道徂七國蓋仲尼傷禮樂不起是以學韶於齊求師於周將欲鑄義以鏡國張仁以羅俗使明笥為宗資也且去魯適衛蓋辭在於仕矣自宋之鄭殆非臣矣絶糧於陳蔡亦無財矣官至司寇果不為士安謂聘哉吾聞夫子觀夏道則之觀殷道則之宋較是而言雖他國可知也安謂歷聘哉客有抽時賢待巳之禮舉葉君愛龍意於座曰葉公好假而憚其真誠然乎均曰即飛出丹青者殊未真翔來庭宇者愈假矣何則夫靈濟於物無求於物無求於人實龍徒也今聞葉公鱗畫其象則摹形趨之是欲滋乎豢育宛蛇魚類耳真烏在哉曰然則擾於夏鬬於鄭者非邪曰妖而怪所以幽王眚身子産不禮焉率假物矣彼其真龍者道能神化其流多派或蟠於天或巢於田或翼於人或為馬或為劍有侔於此靡徒不居其在天也機紐陰陽不蹉厥常其在田也贍腴疆土庶彙蕃廡其在人也珠媚心瀾呀成智門其為馬也匝體柔油遍崇九州其為劍也鬼淚淫淫秋江萬尋至如挾雲則十雨時濡銜照則三光遞舒是㣥龍也帛丿糸古今而不僵渥生人以無倦聖賢在上將利益於物天下無道必亢悔於時豈獨矯矯欄端露威於葉公而誇爪喙哉是謂妖怪假物也客皺眉而俯不復抽言頗宜春人會昌三年進士官監察御史孔子曰唯天子受命於天士受命于君故君命順則臣有順命君命逆則臣有逆命嗚呼君人者得不鑒戒於是言乎王者將順天行道而臣下自修德矣苟逆於天命而臣下隨所化矣然忽湯文居其下則將因是逆以原於德搖民心於宇內為其上者無危乎故為君不易而作臣者知難不易則德明知難則畏命是故夏殷周秦漢魏晉宋齊梁陳隋末之為理內逆於心外亂於身豈不以受天命者耶故夫十二朝之亡也十二朝之作矣雖小民女童必知其過矣何者為君以為賢為臣以為然常不觀于前無慮于後大渙一時之榮而巳矣歷以度之咸失於此嗚呼君人者得弗鑒戒於是言乎景元吳郡人古今畫品論之者多矣隋梁巳前不可得而言自國朝以來惟李嗣真畫品録空録人名而不論其善惡無品格高下俾後之觀者何所考焉景元竊好斯藝尋其蹤迹不見者不録見者必書推之至心不愧拙目以張懷瓘畫品斷神妙能三品定其等格上中下又分為三其格外有不拘常法又有逸品以表其優劣也夫畫者以人物居先禽獸次之山水次之樓殿屋木次之何者前朝陸探微屋木居第一皆以人物禽獸移生動質變態不窮凝神定照固為難也故陸探微畫人物極其妙絶至於山水草木粗成而巳且蕭史木鴈風俗洛神等圖畫尚在人間可見之矣近代畫者但工一物以擅其名斯即幸矣惟吳道子天縱其能獨步當世可齊蹤於陸顧又周昉次焉其餘作者一百二十四人直以能畫定其品格不計其冠冕賢愚然於品格之中略序其事後之至鑒者可以詆訶其理為不謬矣伏聞古人云畫者聖也蓋以窮天地之不至顯日月之不照揮纎毫之筆則萬類由心展方寸之能而千里在掌至於移神定質輕墨落素有象因之以立無形因之以生其麗也西子不能掩其妍其正也嫫母不能易其醜故臺閣標功臣之烈宮殿彰貞節之名妙將入神靈則通聖豈止開厨而或失挂壁則飛去而已哉此畫録之所以作也邈天成四年官主客郎中知制誥臣聞身體髮膚受之父母不敢毀傷所以樂正子春下堂傷足三月不出而有憂色民間多有割股上聞天聽者伏以堯代則共推虞舜孔門則首舉曾參皆以至孝奉親不聞割股肉療疾或真有懷怙恃之感報劬勞之恩孝起因心痛忘遺體實行此事自是人子之常情不合鼓扇聲名希霑恤賚伏惟陛下道齊覆載孝治寰區漸致升平全除矯妄乞願明敕遍下諸州更有此色之人不令舉奏所冀真誠者自彰孝感詐偽者免惑鄉閭咸歸朴素之風永布雍熙之化絳會昌時人公諱島字浪仙范陽人也自周康王封少子建侯于賈因而氏焉誼則大漢太傅寅則晉尚書由是徽音流遠祖宗官爵顧未研詳中多高蹈不仕公展其長材間氣超卓挺生六經百氏無不該覽妙之尤者屬思五言孤絶之句記在人口穿楊未中遽罹誹謗解褐授遂州長江主簿三年在任卷不釋手秩滿遷普州司倉參軍諸侯待之以賓禮未嘗評人之是非丰骨自清冥搜至理悟浮幻之莫實信無生之可求知矣哉又工筆法得鍾張之奧所著文篇不以新句綺靡為意淡然躡陶謝之蹤片雲獨鶴高步塵表長沙裁賦事略同焉攸望遭時紫泥必降優遊華省遊泳清塗噫修短定期數豈能越會昌癸亥歲七月二十八日終于郡官舍春秋六十有四嗚呼未及浹旬又轉授晉州司戶參軍榮命雖來於公何有痛而無子夫人劉氏承公遺旨粵以明年甲子三月十七日庚子葬于普南安泉山慮陵谷變遷刊石紀時絳忝公知已見命為志詞仍為之銘曰猗歟賈君天縱竒文名高天下鶴不在雲蚤振聲光高步出㣥今則已矣馨若蘭薰
