front:
  text: 全唐文欽定全唐文卷三百二十八翹清河武城人官禮部尚書東都留守
  hash: sha256:fd73278c5a2e71fa13a1b4645cc73645056cef3cfbdfb179459a128800dccfe5
  markers:
  - {type: head, offset: 14, content: 崔翹, id: KR4h0168_NFKB_328-h1, level: 1}
body:
  text: 臣聞上元成命錫禎符以應期聖皇乘時受神策於興運是以啓殊祥於景福崇大號於至公伏惟陛下纘重元之耿光嗣五聖之丕緒大德侔於天地至化貫於陰陽感元道之尊運百辟之議三冒闕下纍陳鴻名陛下猶以固讓為心不以至公為意臣等請以符瑞重敘明之日者五星如連珠兩曜如合璧卿雲蔚膏露凝天之貺也瑤英産於金戺元記開於玉洞神光見真誥傳地之祥也固知天地以鴻休報陛下陛下以至德通乾元允宜合符克配徽號伏奉乙卯詔書曰志存要妙理却虛名臣又聞之天不讓高地不辭大五帝法之而成象三王參之而比德先天地者道也聖祖已著於強名合天地者聖也陛下允膺於明稱式彰妙用豈曰虛名況禎祥感通既著於彼靈應參會又符於此是以封章再獻而雲日重光徽號三陳而烟霄降澤天人交感影響必臻若然者陛下安得闕三才之大端抑萬姓之勤願違祖宗之眷命曠天地之符文臣等固陋猶知不可況真宗示慶祕簡呈文乘王氣於玉行擁神休於寶運伏願光臨大寶允答洪休嘗垂覆載之仁永保延長之歷天下幸甚自今辛亥至於癸丑纍表誠祈請紀榮號聖心恭默冲讓再三臣等伏讀綸言退增祗栗敢重瀝愚懇期諸必遂臣聞聖人之言與春秋而同信上天之宰將影響而合符昭報不可以久稽成命不可以固拒今靈山警蹕望玉鑾之升中儒林展儀思金匱之盛禮發祥儲祉喻以封山人事天時不可失也伏惟開元天地大寶聖文神武應道皇帝陛下祖武宗文重熙纍洽霑風化而砥礪在動植而昭蘇外戶不扃餘糧栖畝其神功至道廣瑞殊祥前表縷陳安敢浮說夫修德以俟命勒功以告成將欲竭款神祇雍熙帝載未為過越也伏惟覽公卿之儀考封禪之禮陟華蓋於翠微轉鈎陳於雲路泥金於菡萏之上刻玉於明星之前使三五六經復再聞於唐典七十二姓不獨紀於夷吾敷景福以浸黎元錫大慶而後天地蒼生之望也朝廷之幸也無任誠懇悃款之至謹詣朝堂奉表陳請以聞臣翹等伏稽古訓上請增封再奉明旨未蒙允諾臣等承詔惶駭失圖臣聞省方展義君人之大典登封告成王者之丕業是以古先哲后道洽則封所以答神祇之功增兆庶之福無私於已故行之者不思必順於天故言之者難奪敢昧萬責竭誠終請伏惟開元天地大寶聖文神武應道皇帝陛下紹文武之丕烈合君臣於昌運均雨露和陰陽四海無波而靜默㣥生自樂而仁壽繇是德懷蠻貊澤洎昆蟲宗廟祀典罔不祗肅要荒殊俗亦莫不庭自皇王已來載籍所記未有混區宇窮貞祥地平天成德茂道洽若今日之盛者與固可告太平之功展封崇之禮故臣與王公侯伯黎老緇黃纍陳白奏備竭丹懇豈謂聖恩猶阻皇鑒未回伏奉癸丑詔書曰輕修大典所不願為臣等戰栗匪遑寧處實以陛下功成道洽理實升中且夫龜龍咸格天意也夷夏大同人事也時和年豐太平也無為清淨至理也允應大典豈謂輕修乎奉若靈命安可不為乎臣等敢冒宸極重明其義竊以西嶽華山實鎮京國皇虞之所循省靈仙之所依憑固可封也況金方正位合陛下本命之符白帝臨壇告陛下長生之籙發祥作聖抑有明徵又可封也昔周成王以翦桐為戲唐叔因是而定封蓋人君之言動有成憲斯事至細猶不忽也況陛下眷言封祀宿著神明道已洽於升平事未符於琬炎豈可抑至公於私讓棄誠信於神明乎固不可得而辭也日者封章纍奉嘉應必臻一獻而甘雨流再陳而瑞雪降則知人天之意影響合符若然者陛下安得稽天命以固辭違人事以久讓太平不告其若休祥何至理不答其若神祇何伏願仰答天心允祗靈貺上以揚祖宗之盛烈下以副億兆之懇誠克崇上報永光大典臣等幸甚易不云乎仰觀時變詩有之矣上列昭回國家蓋轉銅渾灰飛玉律曙光侵而鼓應暝色下而鐘鳴月穆穆而增波烟藂藂而不散苟非其局必置刑名甲令家僮心謀窺管至如長雲氣色京房有隱士之占德星夜聚太史有賢人之奏儻泛言古事自合張裕之流如私習天文請置呂刑之訓必也業傳弓冶名隸保章寧失不經豈濫無罪待窮由緒方正科條廣漢之郡實惟沃壤江波濯錦斜分白馬之津山嶂吐雲近對黃牛之峽皇明撫運文軌大同自北徂南東被西漸徒以窪盈異等風候殊宜草木偏早於陽春金火不取於令日炎蒸郁育未見行車毒霧氛氳唯看墜鳥論其恆式違帝者之金科語以憲章符漢王之故事是非之理其在茲乎顧兔離星商羊應雨浸厚地而沮洳灑長天而蕭索凝雲不動履雙闕而朝躋行潦坐流匝四溟而夜下遂使鵲橋牢落虹影欹傾石杠沈而鐵鎖暗移舊枝壞而新查亂墜兩城之內是曰帝居作曹自合修營赤縣元非管屬輒被推按乃涉濫刑至於司存事資懲罰牒問由緒方正科條先王制物禮器為先商周虞夏形容各異象樽之儀爰刻象以成形玉斚之名遂以玉而為飾罍雲采采如開五色之雲彞鳥軒軒似翥六時之鳥舟其足也夫復奚疑少府自有常儀太常非無舊準更請裁下未爽公方至於規模並在於此如愚管見謂叶通途嵩初舉進士常以邊任自許代郭虔瓘為安西都護開元十年轉太原尹開元十有四年冬孟月張子出玉塞秉金鉞撫循邊心窺按窮髮走汗漫之廣漠陟崢嶸之高闕徒觀其風馬哀鳴霜鴻苦聲塵昏白日雲繞丹旌虜障萬里戍沙四平乘蒙恬之古築得拓跋之遺城伊昔晉人失政亡彼金鏡海水朝飛欃槍夕映鵝呈而二京繼覆馬渡而五胡交盛慨逐鹿而爭雄空瞻烏而莫定於是魏祖發大號鼓洪爐天授宏略神輸祕圖北清獯獫南振荊吳繇是一太陰以建極則廣莫而論都遂徵板幹庀徒卒鏟嶕嶢剞崛屼因方山以列榭按長城以為窟既雲和而星繁亦邱連而嶽突月觀霞閣左社右廠墨元沼泓汯湧其後白樓嵲興其前開士子之詞館列先王之藉田靈臺山立璧水池圓雙闕萬仞九衢四達羽旄林森堂殿轇轕當其士馬精彊都畿浩穰始摧燕而滅夏終服宋而平梁故能出入百祀聯延七主擊魯衛之諸侯廓秦齊之土宇禮興樂盛修文輝武講六代之憲章布三陽之風雨亦云已矣哉俄而高祖受命崇儒重才南巡主鼎之邑北去軒轅之臺鵬搏海運鳳舉天回嗤紇真之鳥死憶新野之花開自朝河洛地空沙漠代祀推移風雲蕭索溫室樹古瀛洲水涸城未哭而先崩梁無歌而自落魏家美人聞姓元新聲巧妙今古傳昔日流音遍華夏可憐埋骨委山樊城闕摧殘猶可惜荒郊處處生荊棘寒飇動地胡馬嘶若個征夫不沾臆人生榮耀當及時白髮須臾亂如絲君不見魏都行樂處只今空有野風吹乃載歌曰雲中古城鬱嵯峨塞上行吟麥秀歌感時傷古今如此報主懷恩奈老何晧開元三年朝請大夫祕書丞兼昭文館學士夫應順相成君臣有待豈不以參庸作輔闕二字移屯象闕不可以不臨山川不可以不守於是開分都野對乂天人高爵命於儀刑大雍熙於品物五侯九伯公實當之公諱懿字善意其先吳興郡大姓明考以宦歷陝圻遂留家於硤石也昔有虞惟舜其姓惟姚欽若神明蓋云祖始子孫蕃邈而逮於茲曾祖宣業陳世系表作梁征東將軍吳興郡公祖安仁隋青汾二州刺史遠圖膺錫大石垂休父祥隋懷州長史檢校函谷關都尉煬帝誥以武能守於天險高門晉燭何象賢之紛光哉公都尉之季子毅烈昭融蓄大容遠藝工非習學遠無師燕雀闕一字知鴻鵠自若以待奮也年十八屬亂隋無象㣥盜生郊授公本縣令以先人部曲少用輯寧太宗濟河聞公名密遣相聞公告於州將曰王充非主天命在唐宜速舉衆以應義不爾恐貽後戚因間道入謁高祖嘉歎者久之乃降賜墨書金帛以此闔州離患太宗東伐王充授鷹揚郎將長沙縣男水陸道總管洎賊平將舉籍議功有妄譖者云公曾通僞鄭因見疑黜又以明略用多每為朋儕所忌乃築室於硤石東北重岡之曲將以道德幽棲高尚其事右二陝左二陵北河南陰南山北趾中養浩氣外衍遐風紫芝淹留赤松不返俄而貶授晉州高陽府折衝都尉公抗疏自列謝病而退乃除常州長史亦堅以疾辭尋除硤州刺史纍加銀青光祿大夫公舉六察按百城導齊江門茂育雲澤龍朔初卭蠻作梗乃除公使持節巂州都督公正以馴吏嚴以蓄戎不罰而徵不戰而服能以毀遠壽以衰遷啓全告終返真於始以二年十二月一日終於官舍春秋七十有三嗚呼哀哉以三年七月十五日藳葬於硤石縣安陽公之原未備遷禮也公門傳孝義代蒙旌榜至若雞鶩家禽牛羊圈畜互以相乳不限所生豈非明德繼修應形殊類也公青雲誰與白日相鄰武傑文英幽深天理孝原忠極保合神庭餘力所存致心無害雖五善三變窮妙曲成而藏器待時移官於位乃作藩翰以制要荒綏之以誠不以言震之以威不以暴遠夷文順㣥物緝熙存立大功歿昭餘訓豈無明主而有遐遺命矣哉公初娶張氏李氏並早殂歿後娶劉氏纍封彭城郡夫人則隋左常侍降之孫唐襄州長史志逵之女今紫微令崇故宗正少卿元景之母也夫人於資福祉實受靈和四德待行三從及嗣祗先導後在閾成家二子少孤一門所恃長幼咸若禮訓所陶出有庶官入惟丞相乃敷皇極遂廣人和至矣哉蓋由內則有方外成其大而况乎衆姜㣥婦罔或不宗於休夫人豈古之明達者矣以神龍三年正月八日終於洛陽慈惠坊之私第嗚呼遺令曰生以形纍死以魂遊然事尊在冥無遠不至何必合葬然後為禮昔邴根矩沐德信並通儒達識咸以同窆為非實獲我心當從其議無改吾志爾惟孝乎歿已可於龍門山外用為窀穸冀近家園以慰吾平生之好耳崇等敬遵遺旨以景龍二年歲次戊申九月庚寅朔十五日甲辰葬於萬安山之南陽令公純德佐時高堂生感永思不待長號罔極以為東塋已異西兆未殷占考歲辰奏加封樹以開元三年歲次乙卯十月已酉朔十三日辛酉庀徒有作初景龍年以時宰先人特旨追贈幽州都督而神道貴靜元宅不移重廣冥域因成象制天子於是乎昭寵大臣追崇舊烈又制贈吏部尚書諡曰文獻公命五品官監護賜米粟各二百石絹布四百端匹庶事官供特令優厚蓋念功悼存發榮而資哀者也版築相麗賁飾其儀豐不近奢薄不違儉名山大谷異勢盤紆密壙重墳靈祇式敘是惟幽極可以永安撰德昭文長垂不已銘曰氏原德先裔裔帛丿糸帛丿糸曷時無雋曷位無賢重象曜質紛紛秩秩潔齊相亨休復於吉於時保之文獻非他我生則睟天爵云多粵有符彩寧施琢磨英圖烈烈利用峨峨瞻天歷象謁帝關河庸勛遠大錫命駢羅行行駟馬作藩荒遐職職悟人為範陶鈞政閒誰黷時修物育陟遐未窮歸冥不復慈告式明卜宅離塋東畢西賁幽封大成尊尊孝子昭發家聲繇鄭州人嗣聖元年進士開元初為岐王長史夫有名之域有象之中惟水能淨惟鏡能空水則無心而皎徹鏡則照噡而幽通遇物斯應匪我求蒙爾其決之則流盈而不闕泛金碧而色潤開玉匣而光發其清也不煜和風其鑒也不同朗月爾乃雲收白日粉拭紅塵拂芰葉而交映抱菱花而獨春直注千里旁通四鄰成美惡之元鑒闕六字攬鬢興嗟濯纓為足惜容輝之易晚歎功名之難續況復影圓鳳沼聲激龍門可驚飛於神鵲可搖動於靈鯤同大道之自然合重元之衆妙冰潭洞達石崖含耀亦由裴楷清通王戎簡要知之類之疑意忘疲於屢照邱字仲山光祿卿同皎從子年十一擢童子科他童皆誦經而邱屬文由是知名及冠舉制科授奉禮郎開元中纍拜黃門侍郎御史大夫改太子賓客襲父爵宿預男以疾徙禮部尚書天寶二載卒贈荊州大都督諡曰文門下朝議大夫給事中崔翹學行自中方直形外明而能晦簡不違謙始方蔚於文章終激揚於吏道駮議既久要密遞遷宜自珥貂之司俾參鳴鳳之掖可守中書舍人散官如故敕朝議郎檢校吏部郎中裴敦復等並行標純一材蘊經通或學辨文鼠核綜兼於隱賾或詞握靈蛇光輝映於等夷職居要劇聲振發揮近密之職搜擇宜精俾對掌於絲言兼聯華於省闥可依前件休光京兆人鄉貢進士世之業生滅若輪環者則雖塵沙作數草木為籌了無遺纖哉吁不可知者其惟流浪乎夫木性生火水中有月以凡筌聖從道場而至道場通因及果非前際而於後際行之於彼得之於此禪師諱法藏緣氏諸葛蘇州吳縣人昔㣥雄角力三方鼎峙蜀光有龍吳恃其虎瑾之後裕蟬聯姑蘇曾祖吳郡太守蘇州刺史祕書監銀青光祿大夫上柱國開國男大父穎隨閬州刺史銀青光祿大夫父禮皇唐少府監丞吳會旗棠東南旖旎洗墨而清夷落衣錦而燭江鄉山海禁錢蓬萊祕府屢遊清貫歷拜寵章禪師即蘇州使君之曾孫少府監丞之第二子也年甫二六其殆庶幾知微知章克岐克嶷此寺大德欽禪師廣世界津航人非鑽仰禪師伏膺寂行禮備師資因誦經至永徽中頗以妙年經業優長奉敕為濮王度所謂天孫利益禪門得人禪師自少出家即與衆生作大善知識道行第一人天殊勝開普門之幽鑰酌慈源之密波由恐日月居諸天地消息每對天龍八部晝夜六時如救頭然曾未暫捨非乞之食不以食以至於頭陀非掃之衣不以衣得之於蘭若禪師自少於老駝騾象馬莫之聞乘也以為鎔金為象非本也裂素抄經是末也欲使賤末貴本背僞歸真求諸如來取諸佛性三十二相八十種好衆生對面而不識奈何修假以望真且夫萬行之宗衆相之本生善之地修善之境禪師了了見之矣夫鐘鼓在庭聲出於外如意元年大聖天后聞禪師戒行精最奉制請於東都大福先寺檢校無盡藏長安年又奉制請檢校化度寺無盡藏其年又奉制請為薦福寺大德非禪師戒固居龍象之首清淨開人倫之目不然焉使天文屢降和衆相推揚覺路之威儀總禪庭之準的護珠圓朗智刃雄鳴伏違順之鬼魔碎身心之株杌廢情屬境卑以自居如谷王之流謙百川委輸若周公之吐哺天下歸心菩薩下人名在衆生之上悲哉三界即火宅之所四大將歲時之速既從道來亦從道去遂拂衣掩室脫舄繩牀惟惚惟恍不驚不怖粵以開元二年十二月十九日捨生於寺報齡七十有八門人若喪考妣乃相謂曰和上云亡吾徒安放乃抆血相視仰天椎心即以其年十二月草闕一字日施身於終南山楩梓谷尸陀林由是積以香薪然諸花㲲收其舍利建土窣睹波於禪師塔右自佛般入涅槃於今千五百年矣聖人不見正法陵夷即有善華月法師樂見離車菩薩愍茲絶紐並演三階其教未行咸遭弒戮有隨信行禪師與在世造舟為梁大開普敬認惡之宗將藥破病之說撰成數十餘卷名曰三階集録禪師靡不探賾索隱鈎深致遠守而勿失作禮奉行是故弟子將恐頽其風聲乃掇諸景行記之於石銘曰有若禪人凝棱心不易兮身世澒洞探討真賾兮寂行沖融渙其冰釋兮軒裳蟬聯清暉相射兮奕裔不梁乾乾衣錫兮蕭灑喧譁地自虛僻兮元關洞開亡珠可索兮吾將斯人免夫過隟兮魂兮何之聲流道格若使天地長久而可知即相與托實刊之於石兮
