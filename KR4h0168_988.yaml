front:
  text: 全唐文欽定全唐文卷九百八十八闕名二十九
  hash: sha256:b225567b363dbe3c6efdf5c7cecb03d77403f87194d64b361e5b01d20d31e45a
body:
  text: 大唐文武孝德皇帝與大蕃聖神贊普舅甥二主商議社稷如一結立大和盟約永無渝替神人俱以證知世世代代使其稱讚是以盟文節目題之於柱也文武孝德皇帝與闕六字都贊陛下二聖舅甥濬哲鴻被曉今永之屯亨矜愍之情恩覆其無內外商議叶同務令萬姓安泰所思如一成久遠大善再續慈親之情重申鄰好之義為此大和矣今蕃漢二國所守見管都闕九字興實已西盡是大蕃境土彼此不為寇敵不舉兵革不相侵謀封境或有猜阻捉生問事訖給以衣糧放歸令社稷叶同如一為此大和然舅甥相好之義善理每須通傳彼此驛騎一闕七字舊路蕃漢並於將軍谷交馬其綏戎柵已東大唐祗應清水縣已西大蕃供應須合舅甥親近之禮使其兩界煙塵不揚同聞寇盜之名復無驚恐之患封人撤險鄉土俱安如斯樂業之闕六字美之闕一字遍於日月所照矣蕃於蕃國受安漢亦漢國受樂茲乃合具大業耳依此盟誓永久不得移易然三寶及諸賢聖日月星辰請為知證如此盟約各自契陳刑牲為盟設此大約儻不依此誓蕃漢君臣闕五字未闕二字禍也仍須備守及為陰謀者不在破盟之限蕃漢君臣並稽告立誓周細為文二君之合終以雍和登壇之臣親署姓名於柱如斯誓文藏於王府屬闕二字沉迷勝利莫測求闕一字者闕四字為上役者福利河沙况乃揀良工瑩南山之奇石選釋氏書西國之梵闕效無處酬恩今創造佛頂尊勝寶幢一所經教具明存歿獲益張公乃俗務之下不倦修崇禮樂之餘無闕心香風佛體夙願無不稱遂南北無虞合家平安永增福慶詞曰善住之後次至張公今時修福還與昔同寶幢嵯峨闕二字寧闕夫實相真闕三字色取導引㣥品必假有為故庶類歸心闕一字修淨域非闕一字於此中便為正闕二字覩相生闕二字蓋於萬分佛頂尊勝陀羅尼幢者濟闕一字海闕四字慧闕二字震顧惟不闕四字邊闕三字而有謀實元闕一字之宏備遂因務闕一字躬詣他山召工人斫貞石闕一字報德建茲幢闕三字之塵望尊崇於邱嶽闕一字區區闕一字志庶毫末於闕二字才闕一字色闕一字翰慙垂闕一字但以虔心願切不敢闕一字能輒握管以自陳明懇誠而力竭讚曰採石建幢闕一字旌聖教湛然清淨洞闕一字元妙香風扇闕一字慧炬移昏有為之路闕一字善之源齊心刻鐫樹闕三字綿連日影拯濟諸苦凡曰含靈永惟斯祚最勝殊妙甘露行門佛祕密心大總持印入三昧之樞轄會萬法之要機陀羅尼之微旨也佛頂尊勝者佛陀波利自天竺以來傳誓睹文殊入清涼而不返因流梵唱大布寰中其有豎幢剎於四衢飾芳辭於百寶塵霑影觸罪闕一字銷泮於朝陽心誦目闕一字福海潛盈於夜注清信士朱常慶等卅餘人並英髦間代禮樂超倫家流敬誠門光善瑞從居浮幻不染囂塵雖服儒冠闕三字戒共輸金闕一字合建洪因立貞石以刊真文樹良闕一字而雕相好追琢將就爰命紀時乃為讚曰佛頂章句微妙難名梯航萬彙福利㣥生雕鐫翠炎聳立於庭霑風度影垢滅塵輕琢玉字以光煥鎮寶彩以晶熒期劫石而將朽斯巨祉而無闕一字善哉如來曠劫修行闕一字等並覺無滅無生愍念罪苦説尊勝經舟航闕一字溺度脫有情猶如慧日普照幽冥今茲崇建用報先靈佛弟子彭城郡夫人劉氏為亡夫建造尊勝幢一所願福資生界因覩斯善讚曰彭郡夫人母儀欽則追緒亡靈爰憑佛力建妙寶幢闕一字空搆日其闕一字及身萬罪消釋所願良因莊嚴亡識百千萬祀傳之貞石闕一字濟州歷城縣維那劉長清等八人為闕一字中金剛經邑會之長曾同邑內信直者十數公俱禮南靈臺山禪大德僧闕一字方為出世之師師以太和六年授靈嚴寺請命詣闕進本寺圖將聖旨再許起置鎮國般舟道場之鴻澤師行能二備慕止京畿首末三秋無疾而謝世維那劉公等痛惠焰絶照法鏡闕一字光無明益昏大道荒塞乃率邑內諸人等家財同心奉為沒故禪大闕一字建此彌勒像一軀侍菩薩兩軀於南靈臺山先師宴坐之地上答生前法誨之恩惠矣闕一字先身得授佛記菩薩號問逸多今為次闕一字四天天中最滿無上妙解脫正真理補處一闕一字攝用歸於圓寂無數天人隨其六事行果聞見親疏近者薰其闕一字種清淨至不退地遠者著快妙樂天福盡還墮乃五十六億萬歲滿降生閻浮當翅頭末城孕大妙梵婆羅門含闕一字主生長少厭塵迹悟無常無我因寶臺起觀知了竟終空灰心滅智法證無生度能人正像末遺法白黑弟子闕一字百八十二億數曰慈氏如來即彌勒佛之本稱器界攢縮草木芬香環海闕一字銷濤湧澄徹一蒔七寶人壽過仙迷浮覺休坤成金色有輪王出興號儴佉與闕一字及嬙嬪等皆墮髮修空迷證道果雞闕一字山為之峰裂迦葉波定盡捧釋氏闕二字授慈氏竟化火而謝僧尼女男万万計俱發無上道意故今之刻像已想未來彌修闕一字佛之良因冀入龍華之大會者也讚曰鍊行三祇劫當來證法王四維千萬土闕二字玉毫光下界牢籠固天闕一字歲月長衆生淪溺苦俟降竺乾方原乎佛者大覺之號也像者行教之相也歸依則不墮諸塗精進則克寸登彼岸於戲茫茫障海浩浩昏衢闕既解脫阿育王之興寶塔華夷八萬四千區梁武帝之建蓮宮國土三百八十所是知宏深之願充逸寰瀛虔敬闕瑞流芳慈雲垂八極之中惠日照六虛之內寅緣益盛性相兼資生知者印印相承積習者如如不斷惟神闕塔廟遍於沙界蓋以敷揚萬法化諭㣥生者焉當縣大秀山大泉院山連吳楚地控人煙從前雖有住持僧闕垧籬壁傾欹簷楹摧毀太和七年清源僧行真巡禮此地喜覩靈蹤遂乃駐留懇於香火每嘆金容蘚剝寶座闕發宏願特地興修自捨衣鉢錢一百五十貫文兼諸檀信等共捨錢七十貫文并及工力用搆良緣永成不朽闕三間今已圓滿并殿內功德相次就成朱柱峩峩虹梁岌岌星排畫栱牙插層昂簷張而鸞鳳將飛瓦疊而鴛鴦闕山川草暗煙深像桃源之景置其齋堂厨庫門屋軒廊並更以茆茨重成瓦裝所有殿內功德皆端嚴相好彩塑闕來蔭浮濃之地而況前臨紫陌有水陸之縱橫後枕青山多松雪之鬱茂時或三春正麗九夏方濃經商來看玩之時闕名花夾路瑞鳥盈山駐行役以徘徊仰精嚴而讚嘆可謂井邑祈思之所神祇集福之方足以固護衆生闡揚巨善伏願聖壽壽比山河永助皇風風清寰海府主太傅德山高峻福海汪洋永鎮雄藩常持瑞節縣尊郎中琴堂著美龜印呈祥早移華邑之資即領朱輪之貴西廳司直金石蘊德松桂懷貞更上碧霄別光鴻漸院主僧行真意珠堅固心鏡圓明將除煩惱之網羅克寸就菩提之歧徑檀信等色身永保覺性常通既茲回向之心必離蓋廠田坴之趣伏冀慈風永扇法海常流遐邇晏清黔黎安泰然妙善菩薩指南皆是其道場而華光如來報應盡從於供養弟子常探二諦每樂三乘所嗟文昧摐金目迷問乳偶茲良會可息塵機輒述斐詞以為讚曰大覺之門方便之域上古為用百王不易巢邑之南魏關之側茲有精舍蓁闕草漏茆穿塵侵雨滴舊址堪傷餘迹可惜奇哉真公於茲挂錫捨以衣鉢創其功德檀信之侶鄉耆之籍闕各施金璧功既遂成妙唯雕飾玳瑁梁紅鴛鴦瓦碧後枕青山前臨紫陌水陸霞光山凝黛色闕長為利益福及生聚恩霑道釋鐘梵無虧香燈不息護國護人銷災銷厄釋子之願法王之力闕常資邦國唐保大二年甲辰歲五月一日記碧溪之月清鏡中頭我師我化天下趙州後魏太史令朝崇修渾儀以視星象按其儀以永興四年歲次困敦創造傳至後魏末入齊往周隋至於大唐歷年久遠儀蓋傾墜日以太史去景雲三年奉勒敕重令修造使銀青光祿大夫檢校將作少監楊務廉與銀青光祿大夫行太史令瞿曇悉達正議大夫行太史令李仙宗試太史令殷知易荊州都督祕書監兼右衛率薛玉銀青光祿大夫檢校祕書監吳師道正議大夫行祕書少監閻朝隱等首末共營各盡其思至先天二年歲次赤奮若成其銘曰周天三萬七千里分寸無欺成歲三百六十日盈縮有期敬之敬之以授人時蓋如如實際性相平等念念虛假緣業萬殊是以導之以解脫禮樂未之闕一字誨之以究竟象繫所不言鄜州寶室寺上座羅漢等漏茲獨善俯宏六度不捨㣥生服膺四攝以大唐貞觀三年攝提在歲蕤賓御律景丁統日己巳司辰用銅三千斤鑄鐘一口法天地以為爐假飛廉而扇炭剋闕一字侔造化巧麗若神工感蜀山而自響擬漢殿而遠聞莛弗能發理切含宏扣而斯應義均虛受聿警四部式遵六時未假於箭漏靡資於雞鶴懺誦顧而有節精進因而無怠方諸几杖小大之用既殊譬以盤盂洪纎之理多裕輒緣斯義乃為銘曰眇眇三界悠悠四生愛染有著沉沒無明法輪覺夢慧炬照冥大空罔得微妙焉名無為不往有為不盡去彼常樂來深慈愍然頭拯救摩足汲引且戒且禪或檀或忍爰造洪鐘晨昏取則和會攸仰禮懺無忒並航欲海俱遊淨國開物成務是鐫是勒原夫闕一字樹開宗道德希夷之際尼邱誕聖仁義韁鎖之間終不能脫略生滅之途輕舉塵牢之域大矣哉我能仁利見也慈雲觸石沃熛炭於炎廬慧筏廣乘濟沉骸於欲岸清信女張氏懷州獲嘉縣人白水之源遂廣傍控九河黃石之道克隆遠敷三略像賢接武襲冶分翹祖德家風可得而言矣昔在襁褓慈父闕二字言念惟桑不忘造次乃蒿簪藿食宴坐經行載闕一字陟岵之恩忍絶乘龍之慶未嬪高援年已弱笄以為寫闕三字薰修之末迹訓組織紝俗中之常纍非出代之要道闕二字仰止高山有終焉之志以垂拱二年二月十八日因遊此寺遂自投此崖殉身飢獸昔尸毗慈悲於一鳥山童踊躍於八字殆無以過也母朱氏恨起漢皋之珠怨結秦樓之鳳乃發茲宏願造浮圖五級其地也丹崖如削青松似蓋巖泉瀑布山石開蓮騎鱗餌术之賓坐桃源而長嘯驂鴻轡鸐之士披竹徑以吹笙斯乃出代之佳遊者也大周如意元年歲次壬辰七月甲午朔十五日戊申功用斯畢敢以此福上為聖神皇帝陛下及闕二字七代祖神德祖闕一字高父言堪見存母朱姊大娘二娘妹娘子弟知微并諸眷屬法界蒼生同登彼岸恐陵谷遷貿乃勒銘云猗歟張氏堅操日新凝姿月浦垂耀闕一字津徘徊漢曲飄颻洛濱去彼穢纍來斯善因志遊五淨心出六塵欲求闕一字境先棄今身其一哀哀慈母言念傷情建斯功德構此經營下臨闕一字地上出太清高峙邈邈孤秀亭亭闕五字搖鐸聲庶千秋而萬歲長不朽而無傾其二猗歟法鼓儼形規矩頂峙飛龍腰凝鸞舞響震花飄聲留鳥聚遠徹普天遙聞率土警集仙衆覺悟俗伍四生棟梁三界門戶永鎮珠宮長懸紫府創器一成邈然千古景龍二年太歲己酉十月二十三日夫至道潛運不言而化成大象孕靈不宰之功遂斯則神元妙賾雖日用而莫知况耳目不該豈視聽之能識由是給園多士並赴緇林方丈比邱咸歸奈苑有想非想住法非常樂之宗色空即空生滅豈菩提之果於是清信士易州新安府折衝都尉李文安遊心正覺妙達苦空知勞生之有涯設津梁於彼岸乃於范陽縣西雲居寺為亡妻河東郡君薛氏敬造石浮圖一所旁求琬玉荊岫為之獻琛遠召良工班輸以之呈巧盤螭隱伏與雲絳而相交靈鳳將翔共陽烏而接翼飛空七級狀多寶之移來騰虛四回疑衆仙之涌出兼以山含萬象地蘊靈奇蓮沼澄光似猴池之浴日松枝引籟若祇樹之吟風衆妙難名約敷厥美冀同拂石萬劫茲山銘曰麗哉宏璧出矣崑山磨礱不日神儀宛然亭亭淨域峩峩給園光浮十界色照三天其一衆妙功德莫惟斯重鏤鳳傍矯雕龍上聳買地有巢福田無種利益潛通存沒偕奉其二自從戎旅竭鯁忠誠居家有理理之風在職著勤勤之德屬西蕃獻屢入和親遂建鴻勳名芳麟閣自謂年逾耳順永閟泉扃痛深巾札之情悲愴克諧之道今罄盡家資為造功德伏惟幽途所感昭察志心光其不朽之名以表芳猷之績於戲哀哉乃為銘曰日轉星回暑往寒來陵夷海變功立人摧痛悲繐帳哀結夜臺千秋兮萬歲厥德兮隆該粵我皇唐之經六合總萬方撫緑圖尊紫極九十有八年矣實用進忠直黜佞邪尚有功任有德一臻斯道而天下密如雖堯舜之治禹湯之政對而為語誠固何慙然以股肱要闕一字物務殷綜俾將撫字實冀惟良任難其人博選髦傑則有我劉公首膺榮命上闕一字天心詢事考言帝俞則寄牽朱絲而就職擁墨綬以臨人察察焉兢兢焉允光明王之舉也故嘗以德惟善政政在養人言念孤弱殆將流涕於是設教敷化寬獄緩刑黠吏移心凶渠束手誨我子弟植我田疇庶績其凝人用胥悅加以樽搖晚酌息前庭之訟端琴弄宵間坐北堂之微月則使觽童蠶妾咸曰來蘇杖老耕夫僉謀再借然公以志崇元寂契入道真悟法性空不生不滅解如來意無我無人則鐘鼎非度世之資軒裳豈出塵之具方欲潔誠洗慮高致清虛解帶抽簪遺纍天壤乃闕一字茲祿闕一字發此淨心敬樹幡竿於柏梯山寺之西南岑也錯綜繒綺雕飾梓材匠人盡斧斤之奇女工窮縟繡之妙規模逾逸今古莫儔迫而察之有若神化然則前臨峻嶠北負平原崢嶸萬仞蕭條千里風生牝谷韻清響於禪林澗入猴池靜涓流於定水長蘿絓日層峰擁雲幽溪不春邃壑無景殊形詭狀不可殫論信山嶽之神秀靈仙之所窟宅然僕識闕三字材行庸疏式踐文場猶迷閫閾初航學海未辨波潮好事必旌常有其志闕三字寺都維邢法泰上人為豫傳之偉其事績目雖闕一字覩耳所暫聞粉墨抽毫式銘景福其銘曰於皇有唐紹統三光功侔往帝名超上皇四海無外率土賓王克明峻德俗阜人康其一英英劉公恪闕一字榮秩臣道斯備黃裳元吉取則韋弦性兼舒疾人闕一字宗闕二字猶冬日其二思絶鐘鼎契入幽真念茲含識幾慟心神乃眷南顧廣樹冥因華幡闕一字日雕竿倚雲其三直侵黃道迥瞰紫微晴虹偶影度鳥驚飛莊嚴孔備功德巍巍配山河兮永固與天地而同歸夫闕六字不能闕二字其光秦臺寶鏡萬像不能增減其明道元體闕六字著光自闕四字有大師俗姓員釋號湛闕一字族本闕二字朝邑人也天闕二字生地靈秀出體間溫闕二字養沖和童齓闕五字長學道承闕二字依戒律聽聞四闕三字秉闕四字歲於闕二字因過薦福寺大德明觀和尚開三階之奧理示一性之法王敷普闕一字之闕一字演收慈之本乃悟六入趣精闕四字遂舍闕二字方就普利闕二字傳授無我無人食任精粗一衣一衲觀公謂曰吾久住皇州欲闕一字汝法流外於是大師隨侍闕一字適蒲城誘迷降闕八字餘周復遷闕二字封送終闕二字畢闕二字蘊藉功著妙義闕一字道闕五字佛主闕五字法界闕二字晈闕三字聖貞元十四載闕三字寺舉充三學大德屆於住持日往月來草三載內觀實相外博經文闕一字益闕二字至終南梗梓岡側殂歸松柏之下備儀安厝建立寶幢門闕一字慟楚法似悽然痛道樹傾摧法舟淪覆攀慕難及乃為銘曰善哉大士幼懷高闕一字頓捨繁華猛登初地承師稟授一周二紀善任他收惡當已示衣惟一衲食非重味戒律內持威儀外備有無雙遣闕一字智俱亡本體清淨大乘法王言説現相如如我常㣥迷導引苦海津梁三學教授一燈傳光醍醐灌頂甘露渙腸緣闕一字時遠亦歸圓寂祖城終南神宜就涉門人攀戀法侶哀戚原野蕭蕭雲煙闕二字刊石建銘千古遺迹原夫覺尊千佛理勝萬法闕一字於闕三字中闕十五字悟八性之闕二字珠必遊於滄海修善可依於大乘闕一字猶月光除八極之昏佛惠破九幽之闕羅尼之謂闕二字乎梵闕者也闕二字宣於帝室所謂三世如來之密迹百千諸佛之元樞乃假佛心共為濟拔闕謹於亡妻塋內闕一字以旌其善也乃命闕二字良工闕二字山之闕是以善住天子親承佛旨意念總持捨宿業之塵昏超殊勝之妙果爰以建立仰希佛闕皆蒙利啓虔誠之意奉貞闕一字之心用表發輝永闕三字乃為銘曰上闕佛頂闕覺闕刻石傳經闕三字敻俗事閻公惟賢奉聖蘭殿歸依無為惠定闕夫老釋之教本乎利於人故廣其門而論於衆得其門者尚鮮矣日有故右神策軍裏樂防秋同正將兼押衙銀青光祿大夫檢校太子詹事上柱國董府君公諱敘洞達至理敬崇佛書積善承家慶流於後有嗣子曰瑾未冠從仕信義已立孝闕三字瘵之際勵闕一字度家殯儀所須完闕一字不賫卜筮叶吉窆於斯原卒哭之前喪事云畢夫人夏侯氏灑泣喪次撫孤訴天緬公之平生非善不作思契神路唯福是先乃命工人斫貞石峯勢屹立斯幢告成亦以為至哀飾也故秉筆書事昭乎闕五字維彼闕一字人維善是親如影如響昭昭福因公之歿代星歲闕一字改令子成家慶餘斯在精魂悠悠莫知何求緬濟神路斯幢乃修闕一字名狀璧闕二字間飾熒熒光光頂載虛碧松柏蒼蒼龍蛇亂行貞石孤立直墳之陽斯幢之妙幽明有闕一字萬古闕六字嘗聞妙覺空寂福潤四生帝德無垠包含萬有僕恭念纍稔無方奉答乃攬諸闕一字義可建以炬幢遇良匠運奇巧班輸豈能説其妙遂盤石開蓮雕星寫月神仙鼓樂天梵飛香刻真相具三乘寶身勒金偈説十種功德不日而就立乎此方乃為頌曰聖智深妙體用無量現之巨海湧於毫末隱之須彌滅於芥藏行藏若是廣利含識瞻仰圍繞名傳淨域寶燈建兮有時劫石壞兮無虧表凡愚兮敬作惟聖者兮所知夫登涅槃山者要馮戒足入佛法海者必藉慈航幽栖寺尼正覺闕一字香靉馥定水澄清潤三草而布慈雲警四山而雷法鼓不謂三龍從毒蔭宅將危二鼠挻災憂殘意樹遂即傾天祕寶構此蜂臺竭地藏珍將營鴈塔其塔乃岧嶢入漢與玉兔而爭暉嵬嶪侵雲共金烏而合曜即願危藤永茂朽樹長春覩遣情塵聞銷意垢闕二字其詞曰晈見顧高葺此臺塔妍巖疑語凝源擬業武德五年歲次壬午八月十五日甲子揚州總管府造青銅鏡一面充癸未年元正朝貢其銘曰上元啓祚靈鑒飛天一登仁壽於萬斯年清河曉月澄雪皎波月曉河澄雪皎波清曉河澄雪皎波清月波清月曉河澄雪皎清波皎雪澄河曉月波皎雪澄河曉月清皎雪澄河曉月清波雪澄河曉月清波皎右花上八字環旋讀之得十六句清光耀日菱芳照室光耀日菱芳照室清耀日菱芳照室清光日菱芳照室清光耀清室照芳菱日耀光室照芳菱日耀光清照芳菱日耀光清室芳菱日耀光清室照右枝上八字環旋讀之得十六句篇章隱約雅合雍熙鉛華著飾盡瘁妍媸旋軀合配懿德章施宣光炳耀列象標奇先人後已閲禮崇詩懸堂象設啓匣光馳傳芳遠古照引毫釐堅惟瑩徹迹異磷緇連星引月藻振芳垂妍齊錦繡色配漣漪虔思早暮守謹閨闈圓虛配道象罔齊儀煙凝綴玉影表方枝捐瑕滌怪釋怨忘疲蓮芳表質日素凝姿編辭衍義質動形隨前瞻後戒雪拂雲披聯翩動鵲映掩辭螭蟬輕約鬢柳翠分眉全斯節志敬爾尊卑鮮含翠羽影透輕池源分派引地等天規延年益壽代變時移筌簡等義繪綵分詞詞分綵繪義等簡筌移時變代壽益年延規天等地引派分源池輕透影羽翠含鮮卑尊爾敬志節斯全眉分翠柳鬢約輕蟬螭辭掩映鵲動翩聯披雲拂雪戒後瞻前隨形動質義衍辭編姿凝素日質表芳蓮疲忘怨釋怪滌瑕捐枝方表影玉綴凝煙儀齊罔象道配虛圓闈閨謹守暮早思虔漪漣配色繡錦齊妍垂芳振藻月引星連緇磷異迹徹瑩惟堅釐毫引照古遠芳傳馳光匣啓設象堂懸詩崇禮閲已後人先奇標象列耀炳光宣施章德懿配合軀旋媸妍瘁盡飾著華鉛熙雍合雅約隱章篇右輪間百九十二字左旋讀之自篇字起至詞字止右旋讀之自詞字起至篇字止得九十六句賈林疑己酉歲秋八月幾望身王休合二金二鎰有四兩規三咫闕一字神先生銘之曰鑒容儀永保其貞晉陽之銅闕二字山龍有玉辭夏惟金去秦俱隨革故共集鼎新儀天寫質象日開輪率舞鸞鳳奔走鬼神長懸仁壽天子萬春神冶有因志鍊成真玉堂偏親長宜子孫絶照覽心圓輝矚面藏寶匣而光掩挂玉臺而影見鑒羅綺於後庭寫衣簪乎前殿湅治銅華清而明以之為鏡因宜文章延年益壽去不祥與天無極而日月之光永保命水銀星陰精百鍊得為鏡八卦壽象備衛神日初升月初盈纖翳不生肖茲萬形是曰攖寧瑩乎太清
