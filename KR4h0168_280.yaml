body:
  text: 臣聞王者列職分司為人求理求理之道必在用賢得其人則公務克修非其才則厥官如曠官曠則事廢事廢則人殘漸至陵遲率由於此頃者選曹授職政事官人或異才升多非德進皆因依貴要互為粉飾苟得是務曾無遠圖上下相蒙誰肯言及臣聞官爵者公器也恩幸者私惠也只可金帛富之粱肉食之以存私澤也若以公器而為私用則公議不行而勞人解體以小私而妨至公則私謁門開而正言路塞憸人遞進君子道消日削月朘卒見凋弊者為官非其人也昔漢館陶公主為子求郎明帝謂曰郎官上應列宿出宰百里苟非其人則人受其殃賜錢十萬而已此即至公之道不虧恩私之情無替良史直筆將為美談於今稱之不輟於口者也臣又聞唐虞之時建官惟百秦漢之後命爵逾多故官衆則事繁人撓則偽起當今列位已廣冗員倍多希求未厭日月增數陛下降不訾之澤近戚有無涯之請賣官利已鬻法徇私臺寺之內朱紫盈滿官秩益輕朝綱日壞憸利之輩冒進而莫識廉隅方雅之流知難而斂分邱壟則才者莫用用者不才二者相形十有其五故人不效力而官為匪人欲求其理實亦難遂臣竊見宰臣貴戚及近侍要官子弟親眷多居美爵忽事則不存職務恃勢則公違憲章徒忝官曹無益時政陛下若因循往轍不革前非為弊已成返改難及惟陛下詳參之詩云東人之子職勞不來西人之子粲粲衣服私人之子百寮是試或以其酒不以其漿鞙鞙佩璲不以其長此言王政不平衆官廢職私人之子列試於榮班苟非其才徒長其佩飾無德而祿有類素餐而詩人之言多存諷刺因國風之有暢冀王道之不偏前人之所譏後王之所戒願陛下想居安慮危之義行改絃易張之道貴惜爵賞審量材識官無虛授人必為官進大德於樞近退小人於間僻法令惟一威恩以信私不害公情無撓法則天下幸甚臣伏見貞觀永徽故事宰相子弟多居外職此蓋為勢要親戚罕有才藝遞相囑託虛踐官榮伏願陛下遠稽古典近遵先聖特降明敕令宰相已下下及諸司長官各通內外緦麻以上見任京官九品已上精加檢擇每家量勒一人在兩京餘並改授外官庶望分職四方共寧百姓表裏相統遐邇乂安非直抑強宗分大族亦以退不肖進賢才雖言之稍難而行之甚易其外官有行能久著淪滯未申者望令巡使察名以聞即加進用冀四海之內無復遺才八埏之中同歌聖德湜字澄瀾閭州刺史仁師子第進士神龍初纍擢考功員外郎桓彥範當國引湜使伺武三思姦謀湜反以彥範計告三思驟遷中書舍人景龍二年拜中書侍郎同中書門下平章事為李尚隱所劾貶襄州刺史韋氏稱制復為中書侍郎同中書門下三品先天元年拜中書令元宗將誅蕭至忠召湜對問失旨徙海外宮人元氏稱嘗與湜密謀進鴆乃追湜賜死年四十三先天二年十月僕客於郢山之胡氏胡氏之子體道之疑命與僕有忘年之厚焉常以暇日登高縱觀見火燎於野壯而偉之因謂僕曰吾讀文多矣未嘗見有賦於是者試為吾賦之僕時負譴觸物多興援毫斐然豈近聲律其詞曰郢國東走楚藩南極江關蒼茫千里一色在季月之窮會方短辰之驟匿霜皚皚而夜途霰淅淅而朝逼百草同死萬木皆枯瞻彼灌莽鞠為榛蕪葉煩拏而積蔓根擁腫而盤株既攘壑以擢阜亦纍塍而冒塗及乎農聚告畢澤虞縱燎遠靡不焚近無不燒灼地而山川卷色炎天而日月穨照固玉石以俱銷何芝蘭之不燋豈害物以利獲將順時而通教沃我公田之饒遂及我私之效盧城之曲客遊者聞之訊之其足觀也乃命我賓僕束吾征馬登於高岡一瞰平野是時牧童樵豎匍匐交馳提爝秉炬斯焉取斯爾其剃崇蘊縮茅始吹殘芳未爇短炬猶羸或蠢蠕蓊勃或宛延冶迤晶翳翳而莫振力帛丿糸帛丿糸而可羈不利進而求退每違高而趨卑狀君子之攝勇同哲人之守雌及乎旭日照爛晴風蕭索憑燥鼓威倏忽而作光赩赩而傍翥氣曈曈而上薄翻紫焰於半天迸紅星而四落騞爾電烈雄然雷奔泉汨飇飄沙騰霧昏其始也杳然若六氣含象開混元其少進也赫焉若十日揚光登天門迫而察之既似乎驚鑣失轂駭平原遠而望也又似乎列羽攢旗馳塞垣於是走熾狂忤衝煙怒擊咆林吼叢欱谷噴壁或霍濩以磷亂乍轟嗃而揊拍風肅如萬壑之崖崩拉若千巖之石坼經雪窟而歊靄突冰凌而沸液棲禽失竄以驚嘷伏獸迷奔而墮蹶應接不既吁其可畏能使烈士賈勇懦夫增氣開耳目之溷濁蕩胸襟之滯欷登農山之嶺既瑣瑣焉觀廣陵之濤亦復何謂及乎炎盛亢極途窮勢摧赫赫掃地滅成煙煨何倏興而忽歇何有往而不來無介推之生氣見韓安之死灰僕乃愀然歎息而謂胡公曰夫物忌太甚火亦如之得茲在茲失茲在茲徒觀其進德并命策名逢時三階式踐六柄初持方望會於朝論亦謀明乎帝思居則擊鐘陳鼎出則長戟幡旗咄嗟而嚴霜夏落顧盼而腐草冬滋道路多望塵而拜朝廷以轉日相期及乎過進受傷滿盈致缺或身辱名替或氣隳心折或朝失卿相之權或暮為匹夫之列客稍引而多去友雖求而巳絶高門翳羅雀之叢曲池淪涸魚之轍伊焰焰而不禁固炎炎而就滅聊假興於斯文庶投鑒於來哲易曰吉凶悔吝生乎動也傳曰禍福無門惟人所取則蹈網罟嬰徽纏聯桁楊貫桎梧可怨天尤人哉左臺精舍者諸御史導㣥愚之所作也蓋先王用刑所以彰善疸惡聖人明罰是以小懲大誡故崇崇清憲以糾以繩而檮杌頑嚚罔知攸畏冒於貨賄貪於飲食荓蜂不歌猘犬自噬棼棼泯泯而陷於茲者歲以千計㣥公等目而戚之乃言曰天孽可逃自咎難逭夫能度一切苦厄者其惟世尊乎所以僉捨衆資議立斯宇欲令見者勇發道慧勤探妙根悟有漏之緣證波羅之果纓珞為施菩薩之導引衆生塔廟有成天人之護持正法不有善者人焉賴哉長安初湜始自左補闕拜殿中侍御史至止之日其構適就遊於斯詠於斯稽首於斯咨夫衆寶嚴身非如來之意方丈為室蓋維摩之心故立像不務於珍華度堂罔圖其豐壯至若丹雘並棄剞劂都捐則歸依之心或未多也君子之作其得中焉觀其椓之橐之是尋是尺掎徂徠之松攻荊藍之石疊櫨駢栱規欑矩亘錯盤螭以頓梲鏤蹲武虎貝以銜鋪緑窗黕煙丹柱皓日香泉數曲環繞琉璃之地靈草百品藂蒔黃金之階信可滌慮洗心逃殃置福為利甚博獲報無量㣥公以豫忝文儒之林固以碑表相託辭不獲已而作銘曰惟佛之國黃金界道吁嗟下人誓不相好胡不歸命以自保惟佛之土白銀為臺吁嗟下人為惡不回胡不稽首以逭災彼君子兮福所履兮是度揆兮不日成兮若神營兮利㣥生兮良玉吐曜非媚荊人之斫幽蘭懷芳豈珍楚客之奏若夫克抱厥德不揭其明四海順風以宏道萬乘渴日而致用見於元公矣公諱希聲字某河南洛陽人也蓋顓頊之裔十三代祖魏昭成帝勳格皇天惠孚庶物駿啓靈命大昌於後故我曾大父隋尚書左丞宏尊賢愛人開物成務我大父隋南郡司法義恭禮樂是蹈詩書是好我皇考黃州刺史孝節政以禮成名以德舉奕代集禮以洎於公公含真蘊靈幼有成量承顏善對實談實訏母氏鞠育備於典訓三歲便善草隸書客有聞而謬之者公援毫立就動有楷則故當時目曰神童焉七歲屬文邈有高致十四通五經大旨百家之言先儒未諭一覽冰釋四方儒墨之士由是嚮風矣雅尚沖漠脫落人事鼎鐘黼黻罔汨其志妙於鼓琴尤工幽居緑水之操常抵傲縱恣不求聞達兄通理以其聲華太高諭其從事不得已舉進士授相州內黃主簿臨下以人用宜之黃州府君薨浹旬不怠期而不懈至性之酷異類同傷於是昆弟胥命纍互勉負畚荷鍤躬自成墳故族稱元氏之孝服闋調補校書郎轉右金吾兵曹萬年主簿公之始至萬年也河洛肇基於天邑崤函分守於懿親鄎國公武攸望地在維翰寄深鎮撫以公文吏之美僉為判官凡有箋疏皆自公出朝廷嘉焉徵拜司禮博士則天大聖皇后萬幾之餘屬想經籍思欲撮㣥書之要成一家之美廣集文儒以筆以削目為三教珠英蓋一千二百卷公首膺嘉命議者榮之書成克厭帝旨遷太子文學主客考功二員外賞勤也皇帝纘膺大業擢中書舍人是時天地初復中外多務章奏交馳文誥疊委公操斧則伐懸衡不欺至於獻納多所施用然而不樂處煩屢乞外補上優而不許轉太常少卿無何吏部缺公雖虬蟠不奮欲固其節而鶴鳴有聞終迫其用乃拜吏部侍郎實能考才施以諗所立振幽滯以器所用而能通清而不介輪桷畢舉衆論休之天錫不永清羸遘疾春秋四十有六景龍元年某月終於某天子悼焉賻以粟帛含襚之事即以景龍三年某月歸葬於某禮也懿交昵友平生詞賦之客聚泣而評曰公事寡嫂撫孤姪以義聞居閨門接昆弟以禮著黃州之酷昭其行也鄎國之徵表其才也太常之舉見其高也吏部之僉彰其用也況乎體道之要心無疵瑕包身之防口絶臧否非夫全德具美自天離祉曷能臻此君子患道之不立不患壽之不永公道行矣奚其多傷而已哉有文集三十卷行於世嗣子寄童齔之子嬰兒之慕夫人李氏故亳州刺史某之女今主客郎中禺之從父妹也華首喪天帷堂哭晝藐視孤疚哀感草木託詞於我故人庶以紀百代之盛余與公一遇相得二紀同遊聯光粉闈接袂華禁容範之好宛猶在目宴謔之言未忘於耳追慨疇曩援毫涕集公執交兵部侍郎南陽張説吏部侍郎范陽盧藏用當代英秀文華冠時而盧兼有臨池之妙故張述銘盧篆石天下稱是碑有二美焉挺之名浚以字行華州華陰人舉進士并擢制科開元中纍官至尚書左丞出為洛州刺史徙絳州元宗欲大用為李林甫所擠言其老病乃授員外詹事令詣東京就醫鬱鬱成疾自為墓志與浮屠惠義善卒葬其塔左臣浚言微臣竊惟陛下應天順人發號施令躬親大禮昭布鴻澤孜孜庶政業業萬幾蓋以天下心為心深戒安危之理此誠堯舜禹湯之德教也奈何親御城門以觀大酺纍日兼夜臣愚竊所未諭夫酺者因人所利合醵為歡無相奪倫不致糜弊且臣卜其晝史册攸傳君舉必書帝王重慎今乃暴衣冠於上路羅伎樂於中宵雜鄭衛之音縱倡優之樂陛下還淳復古宵衣旰食不矜細行恐非聖德所宜臣以為一不可也誰何警夜伐鼓通晨以備非常古之善教今陛下不深惟戒慎輕違動息重門弛禁巨猾多徒儻有躍馬奔車厲聲駭叫一塵聽覽有軫宸衷臣以為二不可也且一人向隅滿堂不樂一物失所納隍增慮陛下以北宮多暇西墉暫陟青春日長已積塵埃之弊紫微漏永重窮歌舞之樂儻令有司跛倚下人飢倦以陛下近猶不恤而況於遠乎聖情攸聞豈不凜然祗畏臣以為三不可也且元正首祚大禮頻光百姓喁喁咸謂業盛配天功垂曠代今陛下恩似薄於衆望酺即過於往年王公貴人各承微旨州縣坊曲競為課稅吁嗟道路貨易家産損萬人之力勞百戲之資適欲同其歡而乃遺其患復令兼夜人何以堪臣以為四不可也書曰罔咈百姓以從已之欲況自去夏淫霖經冬亢旱農乏收成市有騰貴損其實崇其虛馳不急之務擾方春之業前代聖主明王忽於微細而成過患者多矣陛下豈可效之哉伏望晝盡歡娛暮令休息要令兼夜恐無益於聖朝惟陛下裁擇夫聖人以仁德育物者則醴泉潛應而湧嘉禾不播而植神功以不宰寧運者則元宗會境而立正法由因而備然則有靈允答爰九疇而式敘無為克成超萬象而宏濟暨今上文明大開淨業溥福利真慈之澤闢權智衆善之門精求覺藏汲引僧寶往必與親念則隨應張皇通達之路騰演元亨之衢者其惟我大智禪師乎禪師諱義福上黨銅鞮人也俗姓薑氏系本於齊官因於潞載鴻休於邦牒踐貞軌於家範曾祖鴈門令大父烈考並棲尚衡門禪師始能言已見聰哲稍有識便離貪取先慈矜異遺訓出家年甫十五遊於衛觀藝於鄴雖在白衣已奉持沙門清淨律行始為鄴衛之松柏矣乃遠迹尋詣探極冥搜至汝南中流山靈泉寺讀法華維摩等經勤力不倦時月遍誦略無所遺後於夜分端唱經偈忽聞庭際若風雨聲視之乃空中落舍利數百粒又於都福先寺師事朏法師廣習大乘經論區析理義多所通括以為未臻元極深求典奧時嵩嶽大師法如演不思議要用特生信重夕惕不遑既至而如公遷謝悵然悲憤追踐經行者久之載初歲遂落髮具戒律行貞苦自爾分衛一食而已聞荊州玉泉道場大通禪師以禪惠兼化加刻意誓行苦身勵節將投勝緣則席不暇暖願依慈救故遊不滯方既謁大師率呈操業一面盡敬以為真吾師也大師乃應根會識垢散惱除既而攝念慮棲榛林練五門入七淨毀譽不關於視聽榮辱豈繫於人我或處雪霜衣食罄匱未嘗見於顏色有厭苦之容積年鑽求確然大悟造微而內外無寄適用而威儀不捨大師乃授以空藏印以總持周旋十年不失一念雖大法未備其超步之迹固以遠矣後大師應召至東都天宮寺現疾因廣明有身之患惟禪師親在左右密有傳付人莫能知後聖僧萬回遇見禪師謂衆人曰宏通正法必此人也神龍歲自嵩山嶽寺為㣥公所請邀至京師遊於終南化感寺棲置法堂濱際林水外示離俗內得安神宴居寥廓草年所時有息心貞信之士抗迹隱淪之輩雖負才藉貴鴻名碩德皆割棄愛欲洗心清淨齋莊肅敬供施無方或請發菩提或參扣禪契有好慕而求進修者有厭苦而求利益者莫不懇誓專一披露塵惱禪師由是開演先師之業懋宣至聖之教語則無像應不以情規濟方圓各以其器陶津緣性必詣其實廣燎明哲之燈洞鑒昏沈之路心無所伏故物無不伏功不自已乃功無不成迷識者以悟日新愛形者由化能革不遠千里曾未旬時騰湊道場延袤山谷所謂旃檀移植異類同薰摩尼回曜衆珍自積其若是乎如來以四諦法濟三乘衆生以八正道示一切迷惑其或繼之者善成之者性非夫行可與真靜齊致道可與法身同體者固難議於斯開元十年長安道俗請禪師住京城慈恩寺十三年皇帝東巡河洛特令赴都居福先寺十五年放還京師草一年恩旨復令入都至南龍興寺曰此人境之靜也遂留憩焉沙門四輩靡然向風者日有千數其因環里市絶葷茹而歸向者不可勝計草三年秋八月始現衰疾閉關晦養不接人事誡諸門徒曰吾聞道在心不在事法由已非由人當自勤力以濟神用衆以為付屬之萌也明年夏五月加疾減膳草四日申酉之間有白虹十餘道通亘輝映久而不滅草五日際晚攝念開顏謂近侍數人云本師釋迦示現受生七十有九乃般槃吾今得佛之同年更何所住又云臥去坐去亦何差別便右脅枕手壘足而臥此則知身非實處疾不亂奄忽棄世無覺知者皇帝降中使特加慰賵尋策諡號曰大智禪師即大智本行皆悉成就以禪師能備此本行也禪師法輪始自天竺達摩大教東派三百餘年獨稱東山學門也自可璨信忍至大通遞相印屬大通之傳付者河東普寂與禪師二人即東山繼德七代於茲矣禪師性篤仁厚天姿通取舍自在深淨無邊苦已任真曠心濟物居道訓俗不忘於忠孝虛往實歸尤見其囦默有無不足定其體名數安能極其稱元波難挹高棟云摧既離形器之表當會神通之域粵七月六日遷神於龍門奉先寺之北岡威儀法事盡令官給搢紳縞素者數百人士庶喪服者有萬計自鼎門至於塔所雲絶雷慟信宿不絶棺將臨壙有五色祥雲白鶴數十雲光鶴影皆臨棺上鬱靄徘徊掩而散近古歸墓靈相未有如斯之盛也禪師之季曰道深力方墳而心靜弟子莊濟等營豐碑而志勤伊余識昧昔嘗面稟非以文詞取拙將為剋慕在懷覽江夏立銘涕增橫墜覩太原成論悲甚慨然攀緣苦集願望都斷有太僕卿濮陽杜昱者與余法利同事共集禪師衆所知見實録其餘傳聞不必盡記且離生滅是究竟無餘鏤盤盂乃古今難沫顧才不稱物短綆汲深猶昔人稽首東向獻心廬嶽者以為懇慕之極況鐫刻永世不猶愈乎其銘曰契真慈者道為物先靈力幽授降劫生賢爰茲大士寂照宏宣惠超三業心空四禪德溥甘露言感清泉翱軒宗極念護無邊猶彼檀施兮福未嘗有如彼戒瓶兮物無不受石無磷兮白不柏耐霜兮竹亭雪今將離世兮無有量永離蓋纏兮辭生滅門人法侶兮無歸仰刻石雕金兮狀高節望廬山兮摧慕瞻朗谷兮悲絶天寶元年嚴挺之自絳郡太守抗疏陳乞天恩允請許養疾歸間兼授太子詹事前後歷任二十五官每承聖恩嘗忝獎擢不盡驅策駑蹇何階仰答鴻造春秋七十無所展用為人士所悲其年九月寢疾終於洛陽某里之私第十一月葬於大照和尚塔次西原禮也盡忠事君叨載國史勉拙從仕或布人謠陵谷可以自紀文章焉用飾為遺文薄葬斂以時服琚懷州河內人甫冠與駙馬都尉王同皎謀刺武三思事泄亡命傭揚州富商家識其非庸人以女嫁之厚給以資元宗為太子獵韋杜間輒止其家太子巳平內難琚説太子除太平公主纍授太子舍人兼諫議大夫常豫祕謀太子受內禪擢中書侍郎公主謀亂益急琚請帝決策除之事平進戶部尚書封趙國公眷委特異豫大政事號內宰相歷拜九刺史琚性豪侈右相李林甫恨琚恃功使氣使人發其宿贓貶江華員外司馬又使羅希奭按其罪琚懼仰藥未及死希奭縊殺之寶應元年贈太子少保凡射必中席而坐一膝正當垜一膝橫順席執弓必中在把之中且欲當其弦心也以弓當左膝前豎接席稍吐下弰向前微令上傾向右然後取箭覆其手微拳令指第二節齊平以三指捻箭三分之一加於弓亦三分之一以左手頭指受之則轉弓令弦稍離身就箭即以右手尋箭羽下至濶以頭指第二指節當濶約弦徐徐送之令衆差池如鳳翮使當於心又令當濶羽向上弓弦既離身即易見箭之高下取其平直然後撎弓離席目睨其的接手頤下引之令滿其持弓手與控指及右膊肘平如水準令其射可措杯水故曰端身如幹直臂如枝直臂者非初直也架弦畢便引之比及滿使臂直是也引弓不得急急則失威儀而不主皮不得緩緩則力難為而箭去遲惟善者能之箭與弓把齊為滿地平之中為盈貫信美而術難成要令大指知鏃至然後發箭故曰鏃不上指必無中矢指不知鏃同於無目試之至也或以目視鏃馬上與暗中則乖此為無術矣故矢在弓右視在弓左箭發則靡其弰厭其肘仰其腕目以注之手以駐之心以趣之其不中何為也矢量其弓弓量其力無動容無作色和其支體調其氣息一其心志謂之楷式知此五者為上德故曰莫患弓軟服當自遠莫患力羸恆當引之但力勝其弓則容貌和發無不中故始學者先學持滿須能制其弓定其體後乃射之然其的必始於一丈百發百中寸以加之漸至於百步亦百發百中乃為之術成或升其的於高山或致其的於深谷或曳之或擲之使其的縱橫前却所以射禽獸與敵也凡弓惡右傾箭惡其襦頤惡傍引頸惡却垂胸惡前亞背惡後偃皆射之體髓疾也故身前竦為猛武方騰額前臨為封兕欲鬬出弓弰為懷中吐月平箭濶為弦上縣衡此皆有威容之稱也又曰凡控弦有二法無名指壘小指中指壓大指頭指當弦直豎中國法也屈大指以頭指壓勾指此胡法也此外皆不入術胡法力少利馬上漢法力多利步用然其持妙在頭指間世人皆以其指末齪弦則致箭曲又傷羽但令指面隨弦直豎即脆而易中其致遠乃過常數十步古人以為神而祕之胡法不使大指過頭指亦為妙爾其執弓欲使把前入扼把後當四指本節平其大指承鏃却其頭指使不得闕則和美有聲而俊快也射之道備矣
