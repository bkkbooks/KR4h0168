front:
  text: 全唐文欽定全唐文卷二百八十至忠沂州丞人神龍初以附武三思自吏部員外擢御史中丞遷吏部侍郎中書侍郎兼中書令轉黃門侍郎同中書門下平章事拜侍中景雲初坐韋后黨出為晉州刺史召拜刑部尚書轉吏部先天二年復為中書令封酇國公以太平公主黨伏誅
  hash: sha256:712d0f572ee2f608203fa0d4068dfbb6bf07ce4142419d1ce56c603e31ec73f6
  markers:
