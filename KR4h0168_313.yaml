front:
  text: 全唐文欽定全唐文卷三百十三孫逖六
  hash: sha256:b1645ae51f893ab88f7da8d89aea7e05675d3b9878ddb41bdd110107baf4ef0c
body:
  text: 洪範五福一曰壽三曰逌好德全生養形者為壽而已非有德而不彰履仁蹈義者為德而已非有後而不昌天生大賢神降元吉倚福祿而登祚允者在宿預公焉公諱同晊字某琅琊臨沂人也其先有太子晉以啟其初牒有將軍翦以固其元冑有中尉吉以大其儒門有丞相導以蕃其鄉族自導至公十有一代禮樂增業衣冠濟美天下之人謂之著姓曾祖寬陳侍中祖誨之皇朝祕書郎父知無祿早世皆先達之良也公夙遭閔凶不稟嚴訓聖善所育孩提有成體恬淡之性資醇醲之德學無常主言不為華踐行而隱其轍迹襲明而晦其光耀湛然以靜淵然以默故談者無得而名焉儀鳳調露之間太夫人春秋高矣願及親以筮仕豈要君而擇祿繇是解褐鄧州南陽丞六安不樂吾聞其語公則喜焉孝子之致養也秩滿授濟州司法參軍垂拱中寃獄起州將嶭顗伏法以公坐是失職十有餘載十年不調人以為難公即坦然仁者之處約也久之選授吉州司法參軍以丁內憂哀毀過於禮幾至不全喪服既除哀心未盡遂不茹葷血於身矣神龍初調補司農寺主簿時從父弟同皎選尚公主拜駙馬都尉公以國親封宿預縣開國男食邑三百戶得而勿喜知來者之不可去也尋坐駙馬所累調建州司倉參軍失而無慍知去者之不可止也洎睿宗受命兦辜開釋授公申王府主簿尋又增秩朝散大夫於是乎見倚伏之回宀儿矣居歲餘制攝安州都督府司馬除太子舍人轉太子中舍人歷太子家令拜宗正少卿遷左庶子東封之歲表請歸閒制授亳州刺史致仕凡官歷二紀將更五君險阻則遇屯和平則之泰康強則陳力羸老則向晦命非吾有委運推移身非吾有與時消息動斯可效靜斯可則古之至人謂是全德春秋八十有四開元十六年七月十二日遘疾終於京兆安興里之私第皇上以公春華秋實之稱著於兩宮故贈以太子詹事飾終之禮厚莫重焉有司以公天經地義之德冠乎百行故諡之曰孝易名之典善莫大焉公束帶於朝端然齊肅目不迕視體無懈容其從官也常避右職其御下也務存大旨不矯舉以求是不憂務以近名所謂建陵之長者也公雅好釋典尤邃禪門爰有別業使營精舍懸車之後隱几於茲不出戶庭彌入真寂斯所謂維摩之梵行也公身居顯位子至大官萬石集門伯禽拜後而能謙約自退忠儉有恆占田必先於窮僻卜宅不更於爽塏所謂公綽之不欲也公屬之內開魯館者二人六姻之中降虞嬪者再世而能進不求寵退不失親遠而不攜進而不逼斯所謂山甫之保身也詩曰瑟彼柞棫民所燎矣豈弟君子神所勞矣宜王公之受茲茀祿式是繁祉享高年以有終保令聞而不已者也初公娶於安定皇甫氏即太子舍人德參之孫洛陽縣丞寡過之女溫惠成性徽柔作則降年不永先公即冥安厝之日公為郡掾雖班秩有等邱封尚卑而精靈所寧歲月滋久而公之克葬禮用上卿同於舊穴是廢王命祔於新塋未達神理卜夢通感子孫是依魂無不之合乃非古以開元十六年十月七日葬我孝公於偃師縣首陽山之南原夫人舊塋之東禮也嗣子太子賓客邱懿文軌時清行動俗為國大器作人元龜不有教忠孰興於嗣不有移孝孰榮其親豐石未琢行楸已拱敷求作者枉逮門人昇闕里之堂實難論賦表太邱之墓多媿題銘銘曰泱泱淮水世祚王氏於穆孝公是為端士動合元化靜符真理以道觀身以忠教子北諦邙阜南瞻洛川還依舊穴更表新阡從古之制非今則然峩峩雙壠松柏生烟昔萬石君建陵侯皆以訥言敏行前史稱為長者然必式路馬未免於無文常盛賜劍且疑於任職大鈞所冶粹美為難秉純德而苞偉量吾見之王公矣公諱敬從字某京兆人也其本曰魏公子信陵君之後秦人滅魏其處者為王氏氏族之世著於關輔焉漢有河南尹尊啟鴻軌於前載周有尚書令羆建休勳於近代羆生明遠隋司金上士遠生壽隋州都七職主簿壽生喆皇朝同州河西縣令喆生慶皇朝冀州棗強主簿宰相世系表作蒲州長史武氏革命之後實秉楚龔之節杜門自絕沒齒邱園公棗強府君之次子也元精之所稟和高行之所貽訓德義之所府聚文儒之所膏潤宜其炳秀騰實蘭薰而玉振者也曩者大定中舉文擅詞場景雲歲辟茂才異等開元初徵文藻宏麗公三對策詔皆為甲科明試必可高明益著爾其用之吏事則岐州陳倉主簿京兆府武功縣尉長安縣尉能理煩也施之儒術則祕書省校書郎太常博士著作佐郎能辨惑也繇是三入華省再登禁闥歷尚書禮部司勳員外考功郎中給事中拜中書舍人是時也張曲江李晉公更踐中樞公與徐安貞韋陟孫逖繼揮宸翰每至密命先發詔書即舍人草創之二相討論之王言式臧天監允洽訓誥之地斯焉得人逖於諸大夫無能為役也居數歲命公御史中丞又改太子右庶子所以穆清彞憲翼亮元儲咸事正人疇與為言若夫軍旅之事公能兼之故信安王褘張忠敬引以咨度清白之業公能守之故源乾曜韋抗皆有裦闕人之疾苦公能惠䘏故宣撫江淮克諭中旨國之軌度公能筆削故刊定格式允叶闕二字材於位詢於事若斯之飭備也而能葆光用晦體道安貞言寡尤行無悶勇於為善而不好立名直以全誠而未嘗忤物括囊君子之德脗合至人之心以此持身全身保性之術也以此刑國鎮俗安人之具也而年不登於下壽位不極於宗公未之或知自昔然矣春秋六十有二以開元二十八年五月二十八日終於西京靜恭里之私第其年八月十八日葬於咸陽洪瀆原禮也公兄曰易從故吏部侍郎弟曰擇從今京兆府士曹咸以文學齊名當代公始以對策高第則易從同科迨乎典校祕文而擇從亦作其後歷青瑣掌黃縑兄既先登公能繼美萼跗之詠凡今莫如則難兄難弟之喻也公夫人宏農縣君楊氏一子曰寥左驍衞錄事參軍楊有敬姜之德寥有曾參之行號天哭晝寧戚過毀公克葬之日雷雨頓歇於通衢反虞之際靈芝或生於靈寢神明昭格姻族嗟稱此又孝妻孝子之誠感也兄弟妻子生榮死哀士則嬪儀盡在於是嗚呼昔人所重同官為僚默而無述豈為心盡況承兄友之深託復感其孤之至言宿草之墓雖云絕哭他山之石可以題銘用標京兆之阡願比延陵之劍其辭曰昔與兄友雙遊鳳池平生景行非我誰知政事文學唯所設施溫良恭儉不忘謙卑雅道無悔高年未極逝者如斯人焉取則墓門何有蒼蒼荊棘天道寧論空傳令德夫作春秋者必見於行事論將帥者葢知其為人余為郎時南皮公實掌小司馬之職接武官次亟聞話言故思其人詢其事可知而見之矣公諱虛心字某京兆杜陵人也甄六氣之純粹協九疇之正直沈靜端慤仁慈隱厚忠之屬也清貞本於至公孝之終也毀瘁過於寧戚斯所以行成於內名揚於世者已越在童冠升於膠序介然獨立異於諸生國子博士范頤嘗與均禮考功員外郎李迴秀擢以高第及夫岐下參卿河東主吏能於細謀其長御史賈虛舟舉以勸中丞侯令德與從常辨習於學也如彼材諸位也若此欲無顯得乎明明天法廷尉攸序命公作大理司直大理丞以至於卿肅肅王度憲臺是式命公作侍御史以至於中丞長人之官以視百姓命公作歙曹二州刺史荊潞揚三州長史以至於太原尹司會之府允庶績命公作倉部左司二員外戶部兵部右司三郎中左右丞兵部侍郎以至於工部尚書其餘掌吏部選採訪處置使東都留守皆大任也又能兼之清風暢於臺寺陰雨膏於郡國所居致理所去懷德德以處事事以度功功成而義不愆事正而名不悖故今之任職者祖南皮焉初景龍中西域羌胡或謀背誕天威逮捕吏議咸劉公理其獄旬時伏念以為刑者所以明除害也誅其桀黠可以除害捨其脅從可以明德繇是全活者千有餘人洎皇帝二十四年鑾駕還長安之月有坐殊死在繇繫者時迫季冬將寘嚴法公為之請曰攸徂之慶方喜來蘇好生之德宜加在宥上可其奏咸許從流此則蘇公之繇獄釋之之聽理也曩者竇懷貞姦佞之尤欲行私惠劉幽求勳庸既茂將復私讎各有愛憎公嘗按驗皆舉直以明枉不詭隨而曲從秉心惟一蹈尾無懼其後荊有大賈利合權門揚有貪吏婚連相國公亦既條察先訐姦家或命出其罪給郵置於三舍或撻記其過啟刑書於五宅此即山甫之不吐石奢之無避也爾其富人興利導俗閑邪於壽春則引芍陂以溉田於廬江則縣舒城以止盜茭牧之地實生稻粱萑蒲之澤遂均廬井此即信臣之方略少卿之理化也若乃擇賢親仁度材委政謂唐休璟盧從愿先達之宗也故輯寧關右嘗與偕行謂趙良器劉琯後來之選也故廉問淮濆舉以為介此則欒武之從善趙宣之使闕一字也疇若予工實諧俞往上方倚相適會云兦享年七十以開元二十九年某月日遘疾薨於東都寧仁里之私第皇帝悼焉贈揚州大都督府印綬賻物一百五十匹米粟一百五十石賜諡曰貞明年某月日葬貞公於京兆之高陽原祔先塋禮也昔者豕韋作伯扶陽仍相寘德於後莫之與京公曾祖叔謙事太宗為考功郎中與兄叔諧季武同在郎署時人謂三列宿大父曰知人事高祖歷司庫員外郎贈職方郎中公烈考曰維事睿宗歷戶部郎中終於左庶子贈絳州刺史季弟曰虛舟事皇帝歷戶部司勳郎中今移左司唐興已來歷仕華省析薪齊美棠棣同升述職為奉先在常僚為克友人物之盛凡今莫儔先是庶子府君之為戶部郎署天庭之內首種行柳公及令弟能業其官曾是封殖益以蕃廡比行年而不朽將樹德之偕茲仙臺譽之棠歌勿翦君子有以知韋氏之昌阜未可量也貞公之軌度所及遠也有美如是可無述焉肆其孤有方增永世之業先人之志俾余論綴故作是銘曰龍旂翼商勳績惟光祚允其昌簪紱斯皇東郊處守北里居方時清任大運促人兦貞公之德柔和諒直始終不忒存歿為則高墳有平豐石有泐芳名可久永永無極公諱無競字仲烈其先瑯琊人也因官遂居東萊自宋太尉宏至棣州司馬偘十一世世濟其美不隕其名公即棣州府君之次子也克廣前烈於昭令聞翩翻海瀕焜燿京國夫乂用三德正直居首子有四教文行為先公蔚其文高其行據於直歸於正生而知之實稟其性弱冠以應制擢第解褐授趙州欒城縣尉歷麟臺正字轉右衞倉曹洛陽縣尉監察御史殿中侍御史太子舍人神龍初坐以嘗詆權幸貶於嶺外終於廣州春秋五十四工文則學必從之故登麟臺侍龍樓也好直威必濟之故吏京邑秉天憲也行高則眾必疵之故陷非罪謫殊方也噫良工能為闕五字順君子能為道而不能為容士師黜宣尼困屈原逐賈生憤公其近之矣初天冊中公與故人魏州牧獨孤莊書忿林胡之倡狂哀冀方之阢隉誡以軍志示之死所客有薦其書者則天見而異之有制召見驟膺寵渥相如之賦感人主未云速也迺者恩澤侯張昌宗位極大官寵震㣥后公著書東觀與之聯事曾是貽籍未嘗暱就色莊見憚象恭益深長孺之抗禮將軍曷足議也公嘗執簡中禁司察位班時三事大夫有族談錯立者公進而言曰朝有著定所以道威儀邦之具瞻所以昭軌物不道不恭不敬不從其可是耶則肅然就列次矣公之舉劾大臣庸可異也嗚呼人各有能且又不朽公則具舉其誰與京公生於齊長於魏不忘吾黨常操土風嗣子某虔卜遠日奉成先志以開元十六年某月某日徙殯於館陶歸葬於東萊之舊塋書順也夫人范陽盧氏祔焉從周也窀穸之事可無記乎辭曰萬靈秀百夫特萬卷精多才克詩可興筆餘力人之望邦之直何不仁俾大棘厄炎厲哀明德卜佳城於舊國銘景行永無極有唐之德讓君子曰原武男鄭公諱孝本字某滎陽開封人也父曰荊州松滋令乾瓚松滋之父曰士志祕書祕書之父曰華州刺史襄城公諱某世有令德時稱華冑蕃衍六姻阜昌百祿非夫緇衣之慶羔裘之仁平惠之勳厲宣之親則孰能光宗保族若斯之盛也公秉彞中和服義先訓孝惟不匱友則因心敦詩以言習禮以立用此道也行於國施於政善氣潛暢清風高翔何嚮不可所居則化矣始以明經高第解褐潤州參軍厥初奮庸克勤小物吏曹以文敏於從事也故與之縣授泗州虹縣令魯人稱之璽書降焉衞人賴之碑頌立焉先大夫張文瓘人之望也典掌台衡督課郡國以公課為第一且曰雖居下邑聲聞上繇天下長吏樂以為式若占疑於龜筮如觀法於象魏矣特敕授蒲州虞鄉縣令理如故迹帝是用臧乃詔公為隴右道廉察使疑有闕堪其事也又為本道使杜求仁特表薦以賢舉也制授朝散大夫雍州鄠縣令已而永淳大饑關輔尤甚能布其德而恤災人不離散下無損瘠乃耕乃畝嗣歲以登時皇儲監國多公善政特賜考詞裦異睿文光被列郡榮之改懷州司馬歷夏州長史以母老乞罷官優詔換瀛州長史東表不寧也命公為平州刺史兼充使知營府支度營田刺郡實邊能成二事中土之作也命公為洛陽令又轉洛州司馬理煩佐劇為則四方尋以丁內艱去職欒欒骨立人倫傷慟既練有制起復又除洛陽司馬公泣血固讓不獲已強拜禮從恩奪而瘠由哀甚忝君之命有以知奉上之心執親之喪有以見過人之戚臣子之道仁遠乎哉尋除貝州刺史轉安西都護以疾不堪詣部改授滄州刺史公自重拜洛師再臨河朔曾是遘閔常多移病隱几而敬讓興行閉閣而姦邪消釋德敷於下貝邱多請禱之人功格於上滄海有臥理之詔老氏云鎮之以無名之樸其在是矣聖歷元年九月以致仕終於東郡之敦行里春秋六十有七凡束帶在位三十餘祀理京師訓郊甸惠華夏清朔漠九變復貫百度維貞其養人也寬而栗其行已也儉而一撫孤無隔於外姻博施不崇於內實葢德行之具美而政事之首出壺遂深中未登漢皇之相國僑遺愛遽感鄭人之泣公娶於王氏夫人曰瑯琊郡公正員外令思之孫司刑大夫允壽之女稟訓齊大作嬪韓樂淑慎威儀循守典禮雖貴膺展狄而躬事組紃有雞鳴之賢有螽斯之盛自嬰晝哭遂契明因忘心味禪悟理根善總斯純懿貽厥高門宜錫難老何孤淨德以開元十八年五月終於東都懷仁里享年八十有四明年正月某日合葬於某所從先塋也嗣子尚舍奉御暉之兵部郎中倩之洛陽令偘之皆保世之主也克荷三徙之訓俱登五命之服養極其樂喪盡乎哀閔騫之人無間言石建之門傳孝道復見之矣詩曰爾女士從以孫子原武有焉銘之下泉表是真宅銘曰闕府君諱嘉之字某魏郡武水人也故屬安樂葢齊大夫書之後至晉長秋卿道恭有子曰顗避地河朔後世居焉顗五世孫魏光祿大夫惠蔚為本朝大儒自時厥後不隕其業公即光祿元孫也曾祖孝敏隋大業中并州晉陽縣令所居之聚聊設衡關至稱為晉陽里祖仲將皇朝鄆州壽張縣丞父希莊皇朝韓王府典籤自晉陽至府君四世而傳一子故五服之內無近屬焉府君四歲而孤無所怙恃外祖劉士傑因官居於潞之涉縣府君自幼及長外族焉依克自激昂允迪前烈弱冠以文章著稱因此遊太原涉西河以觀陶唐之風河汾之間有盛名矣垂拱載初之際始詣洛陽獻書闕下極論時政言多抵忤所如不合遂投迹大學託名常調天冊中以進士擢第與崔日用蘇晉俱為考功郎中李逈秀特所標賞久視初預拔萃與邵炅齊澣同昇甲科解褐蜀州新津縣主簿又補河南府緱氏縣尉改王屋縣主簿府君少好攝生之術自王屋受訣於司馬先生便欲罷官學道而官微祿薄曰衰門無儲宗黨孤眇無所仰給繇是願效六百石長吏焉歷洺州曲周宋州襄邑二縣令秩滿之後遂絕迹人世屏居園林怡神太和以適初願居數歲適長子逖拜中書舍人實掌絲綸皇上以府君有義方之訓特授朝散大夫宋州司馬仍聽致仕手詔裦美親族榮之享年八十三以開元二十七年四月二十四日棄背於東都集賢里之私第府君性聰明而志高邈學該百氏而不為章句文窮三變而尤工氣質早有大名晚從卑位於是知命之不偶道之不行隨時委運澹然無營而疇昔輩列平生雅故當軸處中者多矣葢未嘗跬足而近之恬於勢利乃如此也然所莅之職必悉心為政不以小而易之人到於今遺愛矣爾其閨門之教子孫之謀猷之必遠誨則無倦萬石不假於誚讓太邱惟聞於善誘保乂於後無慚古人夫人廣平宋氏蒲州安邑縣令斌之孫滑州司士參軍郁之女淑德賢行深慈至柔有子四人皆著名於詞學有女六人俱涉迹於圖史非獨府君之善訓亦有夫人之內則焉享年六十以開元十年十一月二十三日先棄背於河陽別業逖遹遘迨等遭天不憗遺降此鞠凶創鉅以深荼蓼又集永惟宅兆未立精靈未安猶力尫瘵尚存餘喘即以府君違世之年八月十二日遷厝於邙山陶村之西原合祔焉禮也北據岡阜南瞻城闕一以託州原之勝勢一以近庭闈之故居諸孤等亦願朝奠几筵暮掃松柏往來密邇以寘哀懷伏惟尊靈安此真宅小子痛極豈復能文泣血書事言多失緒其辭曰惟先府君不隕厥問克惟厥訓惟先夫人慈範是經柔德是程昊天罔極曷其報德敢述舊聞言豈為飾唐之宗盟有若武都公者諱暠英華註云涼武昭王亦名暠天寶間方追贈字某太原景皇之穆也淮安靖王之允也姓族本系存乎帝籍王之子曰虢州刺史諱某世系表云清河郡公靈州都督孝節虢州之子曰鄭州世系表云鄭州刺史瑜生公世載明德實維邦翰昔我高祖之造區夏也則淮安王擐甲冑誅暴強以佐經綸之業洎我皇帝之垂衣裳也則武都公秉衡石傅儲貳以宏邕熙之化允武允文同心同德本枝百世不亦宜哉公應大賢之期含正氣之秀弱而孤藐克自激揚六射五書包禮樂之㣥藝九流三變探古今之至賾生八年而當天授革命之事宗室懼禍至乃不全艱貞保身以免於難久視之後密網少寬公以太夫人在堂無底祿之養願辱身以報德豈養高而循名解褐授荊州枝江縣丞維此之故也蒍賈尚幼嶭宣有能深為州牧張漢陽所器重嘗謂所親曰唐宗一日千里吾見其人國未可量也神龍興復拜通事舍人其後歷尚書工部司勳員外屯田郎中太僕衞尉太常三少卿汝汴二州刺史兵部黃門二侍郎太原尹太常卿工部尚書東都留守兵部吏部尚書太子少傅自枝江至於少傅凡十有九遷人臣寵秩備更之矣先是國朝舊制不以宗親任權開元以來內舉無避唯善所親擢拜右職公為首也公體正心直色莊言厲明而可畏寬而能服故所莅之職必姦邪衰止禮義興行國人宜之有由然也曩膺列宿迨亞象河當官而行既立名節及夫典汝濆之國為夏卿之貳天下歸最朝廷讓能寵光大來公望首出矣黃門政之樞也公執事舉直以替其否太原邦之扞也公滅私寬賦克壯其猷六官之長是為人樞三命益恭遂掌邦理綜覈流品終始七年凡所作法皆成故事其賞能拔異寘彼周行者可勝記乎上難其人公是以久而深煩職事累請歸閒留侯有疾猶傅太子尼父不憗終萎哲人以開元二十八年五月十日薨於位春秋五十有八壽不配德皇慈震悼追贈益州大都督親親尊賢焉禮也其年十二月七日葬於河南縣九嶺山之南原惟公以文學政事之才贍祗庸孝友之德揚親有立身之顯何止能養執喪有過人之戚匪惟率禮公兄曰昇弟曰暈兄愛弟敬夫和妻柔閨門之間內外以正均養猶子不殊所生豈引而進之乃因心則至公為居守也暈寢疾私第沈痼彌年公損膳絕葷消形瘁色及病革之際冒禁而歸終以為職守管籥不敢久留喪次長號撫櫬雨泣還臺至性傷人酸感行路昇之喪公也哀亦如之死喪孔懷其在是矣所謂曾閔生九宗之地邢茅為萬石之門葢本乎國風而為世範者嗣子造等八人無改於道聿修厥德永為罔極靡所寘懷以逖嘗參使臣之戒且為冢卿屬久承話言猥託銘誌文仲事君之教何日敢忘鮑叔知我之恩曷其能報徒竭心於所事終有恨於斯文其辭曰高陽之族才子克生禮樂為憲親賢是程六官尤重祈父天卿二柄皆執理均政平汲直多病留侯強起尚傅重明俄驚閱水泣盡遺愛感深知巳銘德下泉庶通神理余年有五爾實以生四十餘載而為弟兄撫髫並育接袵相成奈何棄予長隔幽明爾之德器寬仁溫厚天道何欺不假爾壽爾之緣飾文學政事天道何欺不假爾位未至中秩纔過強仕奄忽如斯嗟何及矣予兼右職爾位中司兩京為別數稔於茲頃雖一見倏已三時會合常少悠悠我思近有東訊駕言西上顧日望期心存目想當乘疾置以戒徂兩方欲再馳豈圖常往毉不及診藥不及嘗壯年殞命暴疾罹殃無一言以告訣有萬恨於冥茫長號永痛裂膈抽腸爾逢天威余限王事倉卒之辰急難靡寄遣奠之日奔臨莫遂痛緒彌深哀端益至今也來斯驟移時律目絕遺象心催虛室顧天倫之有戚若具體之喪一諒修短之同歸在先後而相恤撫遺孤而流動氣腷臆而內圯伊物情之共傷豈余心之忍此蓬也未立稷英華本作穆兮仍稚以吾視之何但猶子神本不滅爾則有知精爽如在知今心期同蔬永絕采藻空施銜酸沃酹哀不能支
