  text: 全唐文欽定全唐文卷九百五十八
  hash: sha256:61dc8d402841e92788d48c33f372c844746d02639dc5dc4c3654cfc95130ce1a
  markers:
  - {type: head, offset: 14, content: 傅夢求, id: KR4h0168_NFKB_958-h1, level: 1}
body:
  text: 待隱之園神仙所都世隔兩塵維以逍遙云爾飲過三爵不有博奕者乎於是巍巍邃翁黃扉巨儒召曲阿之仲子延相水之堯夫枰設文楸之木子出滇南之爐值天清而地僻命對壘以為娛小子不敏拜賜良圖抽毫進牘以博胡盧夫其取法象於天地分剛柔於陰陽參駢羅於列宿措經營於四方衍圖書之定位非巧歷之能詳頗牧生乎尊俎良平坐乎帷幄轉盼變乎風雲倏忽交乎電雹乃局面之一新豈依傍而保角若夫揮戈退日指掌回天寶鑑造形而炳髮鸞刀迎刃而割鮮譬當路之不遐何決機之復連踡至如中外戒嚴連烽繹騷蜀道之難若破竹秦關之卒如燎毛韜神機於密授見一著之孤高別有龍戰收功虎穴得子倒載干戈勝心不起享乾坤之清夷悟盈虛之妙理期大雅之明哲誠國手之擅美嗟夫智者創法萬變無形達人大觀一順無情稽古今之因革等陵谷之紛更通無方之妙用均多歧之錯行於是翁也首肯尊俎無聲相與推枰而一笑目送浮雲之遐征農為國本本固邦寧人生在勤勤則不匱爰以習壤夙駕命農匪雞則鳴已驅人於里巷白駒未照方執耒於疆場克始克終惟掇惟採帛丿糸蕝豈禮儀之用縮酒非祭祀之須彼茅所資桑田為事時若見奪不利於人宵爾索綯惟彼南畝田畯之喜意在東皋將以息末取源還淳反朴致君於堯舜貽厥於孫謀農人性未適時智非及遠苟徒沮事妄作薄言豈遇雨而可憑欲將雪而無禮建邦設都天秩有禮襲裘紹冶人教攸先甲以榮冠鼎宗躬忝門子對謝庭之蔭蔚玉樹搖春窺陳氏之英靈珠光聚夜纂乃舊服誠宜象賢故違正徒而冒狂疾伯夷去周雖則有諸酈生不狂誰信其妄若棲心讓美宜從溫睦之規如譎行沽名須遵復禮之議自然日蕃錫馬晉彖明受寵之文庭有懸鶉詩人寢伐檀之刺至公之道其在茲乎學古入官選才署吏以賢制爵無替舊典必加明試抑有前聞惟彼司存綜乎推擇課以經藝節其通敏或奉常以述職乍春坊而視事遂使朝錯通經將智囊而見擢東方答客議雄辨以登難然則服勤滿歲人實勞心才補卒史報亦何輕無儒雅之超升執刀筆之叨據訟如功令誠謂有孚而作主今未有主故以重當主漢閣官儀揚眉可見魯門喪紀拊膺何言觸甲前由竹符持手稽乙今迹桐杖摧心專城無時堊室云入輀車尚動落畫弩於尊前杯棬猶存飄繐帷於舍下芝泥有制則五馬歸來柳翣無因則九雛相失周人已歿合殷禮之前虞漳濱未痊罷淮陽之獨臥稱賜則元非奏請出自宸衷言主則今者始為乃關喪後病不堪理河內無借寇之談門或以施淹中絶問喪之禮哀欲從重法貴從輕既無不敬之刑恕此訴云之罪三削藳札十捫蓬心恨流落之多年辱清通之此問愚所不盡謂愜事宜漢代之季天下不得不三分蓋有由矣曹氏挾王室之威重孫氏藉父兄之餘業劉氏獨不階尺土開國於亡命行旅之間天贊一武侯即鼎足之勢均也公諱亮字孔明身長八尺嘗躬耕隴畝好為梁甫吟雖經綸之材櫽括未用而寥廓之志舉措輒形既先主扶世奠民渴明智用謀之佐致三顧見咨當代之畫公於是輕重中夏揣摩全吳定王業於胸心決神機於掌握由是身為先主所起計為先主所用自北徂南周爰執事夷險平亂靡所不之卒使劉氏以岷峩之地為已封梁益之人為已蓄曹操不敢以兵強驟進孫權不敢以境闊妄動彼相之力焉屬先主創業未半中道而歿遺詔邦家之事大録於公敕後主事公如事父至於職為臣行令如君其名近嫌也位為君事臣如父其形近猜也不然豈周公賦鴟梟之詩成王啓金縢之誥此雖大小有異託付不殊竟能上不生疑心下不興流言苟非誠信結於人格於神移於物則莫能至是公復總戎仗律無歲不征將繼舊邦之業用復先君之命所以南擒孟獲而不殺志在綏戎狄矣西拔祁山而不賀志在吞河洛矣設木牛流馬濟人之力已紓矣制陳圖兵法敵國之軍可玩矣故得三關不封二邦喪氣大勳未集行師而殞戎夷野祠氓庶巷祭遺愛所使豈求而得之噫國之將亡本必先顛且以蜀之連山峻極其險不為公死而平沃土富饒其利不為公死而薄甲兵士卒其衆不為公死而減府藏穀帛其富不為公死而貧及鄧艾揚聲於前鍾會躡迹於後滅蜀三十萬戶如撓㣥羊劉禪竟不免面縳壘門身為降虜天事歟人事歟天事遠吾不知之矣以人事而論使武侯常存隱若一敵國勝於本朝百萬之師北向爭衡司馬懿復惕息而不敢戰足明中原非曹丕所有也舉其大略真命世之雄未可以身許小國之君延霸王之佐因曰才有所詣不逮前賢向令伊呂並世而生殷周易地而處則太甲不放桐宮而四海咸理諸侯不誓孟津而天下大定但為天不假年志畫莫就生居於後功績在其下耳然非先主之識武侯或不能輔成於王業使百代令君用人必由此道欲使社稷不振賢智逃於藪澤其可得邪公死之日遺令葬漢中定軍山祭法曰法施於民以死勤事以勞定國則之至今官書廟食成不刊之典一山之內每有風行草動狀帶威神若歲大旱邦人禱之能為雲為雨是謂存與歿人皆福利生死古今一也死而不朽反貴於生銘曰漢室大壞掃地無依人心各動天命未歸角力爭負有翼者飛突兀臥龍吟嘯待時一論世事超拜軍師魚水相得生死以之仗順收兵行權略地氣蓋全吳胸吞大魏國政成三人臣莫二乃建社稷興王之器既得武侯臲卼魏都敵國未滅謀臣已殂大本去矣不降得乎荒墳四頽拱木皆枯尚餘精爽能禁樵蘇人生異代仰止山隅侯少習武辨雄猛豁達為時豪傑習兵法征南越大擊醜虜闕於唐季功業甚著避祿辭榮退居西山四十里號曰陳巖峭峯歲時往還挈鞍秣馬憩於驛之東偏乃留弓劒一夕而斃始疑侯殆豪傑之士功成不偶避世桃林若介推范蠡之為者歟赤帝司節朱明肇位月當既望時屬正陽理通幽化之急須長明生之氣商人徇利小子鬻賈同長房之居産不得神仙類弦高之聚財寧宜犒士遂焚灰上路曝布長衢既觸陰科且亂陽禁躔次有纍於干紀草木不滋於殖豐梅登所守薄有笞刑精氣為物頽齡俄謝論辜不知於內外定罪須憑於繩墨家人雖訴須審而行一作如何求百行之規矩考三才於典墳歎撝謙之上德出雅誥之明文天得之而配地臣得之而輔君昭明茂緒啓迪洪勳匪招益而日益不求聞而自聞謙之伊何慎爾攸止益之伊何介爾繁祉謙持益兮為輔為車益賴謙兮成綱成紀在寵思辱居終慮始昧之者所謂憸人行之者是稱君子其在炎漢英髦盛集京房辭榮疏廣撝挹挂衣冠以長往辭闕廷而不入棄人間而遠遊顧君恩而尚及斯謙德之尤著軼㣥賢而獨立降及南山綺季谷口子真逃居避竄遠害全身既逍遙以齊物獨放曠以懷仁斯受益之為用在有聞而足珍固知將欲求益莫如好謙覽孫宏之為針滿而恐撲觀周廟之作誡其難更添若露才而揚已寧韜光而自潛勿謂天蓋高其道正直勿謂神無形恆處幽默既惡盈而惡滿斯好謙而好德同形影之相隨在毫而靡忒既警既戒念茲在茲慮日月之逝矣當寤寐而求之凡曰儒行如何勿思吁嗟謙兮惟道之性能執一以無舍一作私在神明而輔正惟觀鉛素希易象之一謙仰望銓衡歌周官之八柄受祿必資善戒飭躬且務勤王反是不思罪亦難逭彼丁何者忝曰吏人苟徇私親以減公用式彰不令曾是養求重斂聚財可謂同於碩鼠食貨棄命曾不思於伐檀若情在恤貧志懷賙急奉其祿秩則可給於公廨而何雖曰衆賓終為多僻郡司所糾允執厥中至哉塤之自然以雅不僭居中不偏故質厚之德聖人貴焉於是挫煩淫戒浮薄徵甄人之事業暴公之作在鈞成性其由士冖柘籥隨時自得於規矩任素靡勞於丹雘乃知瓦合成亦天縱既敷有以通無遂因無以有用廣才連寸長匪盈把虛中而厚外圓上而鋭下器是自周聲無旁假為形也則小取類也則大感和平之氣積滿於中見理化之音激揚於外邇而不逼遠而不背觀其正五聲調六律剛柔必中清濁靡失將金石以同功豈笙竽而取匹及夫和樂既翕燕婉相親命矇瞍鳩樂人應仲氏之箎自諧琴瑟雜伊耆之鼓無相奪倫嗟乎濮上更奏桑間迭起大希之音見遺里耳則知行於時入於俗曾不如折楊之曲物不貴人不知豈大雅守道之無為夫其高則不偶絶則不和是以桓子怠朝而文侯恐臥豈虛然也為政者建宗立樂者存旨化人成俗何莫由此知音必有孚以盈之是以不徒忘味而已南鄰退食兮北里朝回門列長戟兮庭張吹臺珠簾半捲兮錦筵四開蛾眉戾止兮寶笛爰來狎主人與愛客侑珍羞及玉杯方見稱於嘉賓因得搜其所徵厥草創自羌首更尚本乎所營伐竹之貞寫龍之吟宰匠於是董制伶倫於是審聽狀以材力質來正直是揮刀斧乃約繩墨斷絶肌膚刳穿胸臆周繞運同長短合得器雖蹈乎舛庸性故傷於剸刻故知懷寶者見毀抱明者自煎向無適於所任始孰多於是焉闕二字何止將就其美苟成乎名奚惜違理幸承薦揚得奉恩光濡君口手之澤冒君懷袖之芳不濫吹噓端含雅正堅外守節虛中俟命有若違親事主適道釐政樹以風聲達乎天聽美其窮不易規管能有截柔指斜據丹脣上列引氣內填流音外泄更微迭盛將聯復絶及乎和暢平施百志熙熙拂怨爰作萬夫矍矍協宮商以節宣隨應變以牢絡俾簫不獨舞鳳瑟不獨躍鱗嘯無以振木歌無以驚塵諒飛動之咸運豈金石之足倫願罄能兮宅君之掌握願度曲兮布君之禮樂儻不遺於賓筵顧何辭於朴斫山有梧兮猗猗乍雲鬱而風披豈雅琴之獨得諒箜篌之可為操斧者取則不遠度木者形之又奇篌以姓而得箜以坎而知考宮商於制氏窮巧妙於般倕虛受其心北牖之清風合韻曲全其勢南樓之華月半虧雕鏤雜錯絲組懸垂倚銀屏而燭爛拂綺褒而彰施矧陰陽之應節蓋風俗之能移况乎度曲無方安位必中呼韓美其寵錫師曠加其撫弄調而合雅聲則殊衆鄙羌笛之吟龍輕秦樓之吹鳳既而越豔秦娥南鄰北里玉戶卷兮真珠箔清揚婉兮瓠犀齒青樓何處倚城向日九烏雛綺帳初開綵綬銜花雙鳳子斥瑤琴而不御彈箜篌以為美緪朱絃揮玉指邀鄭舞以徐進雜吳娃而競起靡靡乎蕩心洋洋乎盈耳窮斯樂只我有酒兮嘯也歌歎彼狂且公莫度兮宛其死苟哀樂之能變可謂感人情之不已且禮則常履樂焉可闕禮處身而不至樂因心而乃發惟宏雅兮鏗鏘守之不變豈桑間與濮上而能亂越恨牙琴之不知奚由瑟之自伐我皇開元首正禮交樂舉智力者盡其謀能聰明者竭其視聽不勤爾職自貽伊咎相彼鳧氏實乃鯨鐘理宜鎔鑄有方必使功程無闕鐘之為用其大矣哉至若密勿九重奏晷漏於銅史鏗鍧萬樂應官懸於玉階可以和人神可以節寒暑庚乃不率厥典坐於縱墮鉛錫未足胡不倡言尸曠有歸虛為詭欣且六師分掌四方取則既參詳於甲令亦簡孚於庚罪績用莫展誠自得之寮佐斯替固其宜矣粵若雲橫於斗月離於畢石燕初化泥牛未失重陰潤礎看澍雨而交飛行潦浸階見浮漚之亂出爾其合散無常漂蕩自然形色虛潔表裏澄鮮似珠胎之出漢若星象之浮川拂還風而獨轉偶倒景而雙圓夫其仁也不輕蛙黽之穴夫其勇也不怯蛟龍之泉觸奔槎而遽碎近浮藻而還連觀夫繞砌潢汙回塘緑水長簷連屬通溝表裏排亂滴而攢生逼潀流而細起乘川則逝遇坎則止雖有近於泥沙信無纍於囂滓既生既滅如幻如夢體象明媚上下沖融徘徊未息展轉何窮識盈虛之不定知造化之皆空則知生也若浮榮兮如寄秉陰守不競之德就下保撝謙之義清虛自若有高尚之風隱顯無恆有行藏之智則有縉紳公子思浮思沉乘時趨勢佩玉鏘金見浮漚之形象息狙詐之機心况乎失路書生懷憤胸臆規術恬靜節行孤直覺萬化之俄頃知千齡之瞬息能不操紙殫毫敘浮漚之德義重所守雲輕不居苟崇高而非據等飄薄之無餘比赫赫之榮不因於道德似悠悠之質且寄於空虛推在天之所自諒於我其焉如昔宣父以飲水為娛枕肱方息原憲在左顏生侍側感落落以抱影見英英之改色明徵瞰室之誡窮彼吉凶遙憐出岫之容齊乎失得且曰得之不處生也若浮放於利而安仰止於天而不留將以輕列爵動諸侯雖南國佳人漫學如蟬之鬢西園危檻空齊似蜃之樓察彼載浮異茲長守高冠始加而已失雅歌式遵而非久象往來之車蓋圓影難追映躞蹀之馬蹄嘉名何有誠以善惡不昧卷舒有時由得之而濫矣果飄然兮已而暴則不居異郁郁紛紛之狀求而非道同朝朝暮暮之姿然則觸石而起者如苟得之易從風而滅者非能散之義顧炎炎之色鼎食皆虛仰片片之多煙空如寄倏忽時變悠揚日曛垂一言於百代揖萬國之孤雲月榭風臺空復散其蕭索藻扃黼帳皆不駐於氤氳可以定聖哲之窮達審是非於得不山川之氣俄失高明之象速朽至乎哉如雲之喻傳於二三子之口惟茲風之興寂獨元妙而無形託萬物以成象隨八卦而立名大則宇宙普洽小則纖毫必經翕翕習習清清泠泠排春樹而如動帶秋蓬而似輕所以炎清順夏徑厲隨冬入金縢而彰聖道通蘭臺而表雌雄飄玉蕊於濃草零圭葉於衰桐候吳範於帷內御列子於空中爾乃下振方輿上飛圓蓋懷壯士之適秦悅高皇之還沛乍靃靡於衆卉時颼飀於叢籟若乃乘陵高迥出入幽微搖寶叉於雲髻動環珮於羅衣飄遊絲於陰映舞輕雪以零飛銅烏迎而回翼胡馬聽而思歸乍來復往有聲無象驚塵則白日晝昏卷霧則珠星夜朗蕭瑟長松之下嘹唳高樓之上送夕鼓而傳音振晨鐘而成響出幽巷而搖拂擊草堂而清敞浸淫遷延散漫聯綿送清聲於琴上落細粉於窗前乍卷通天之霧時飄覆水之煙勃起則大木斯拔暫息則洪波肅然或動或靜時來欻失聆之兮有聞察之兮無質形乃虛無體兼散逸雖含毫而搦管豈神仙之能述柔條之杪兮低垂和風之起兮舒遲極柔而動搖斯易至和而音響則遺習習兮便人順以巽也嫋嫋兮不紊默而識之風自南而薰條可結如線氣引容裔色搖蔥蒨穆若無聞蠢然可見中林靜拂寧喧許子之瓢圓葉孤翻似動班姬之扇霽景相煦芳塵共飛條冉冉以順動風徐徐而表微蕩弱質以婀娜視之若有播清飇之溥暢聽之則希觀其谷興隧出匪徐匪疾彼條暢而無聲信木訥而可匹此焉表瑞既偶聖於萬年於以應期恆不違於五日荏苒虛徐條風相於將墜而復舉若卷而還舒契彼無言靜入桃蹊之上示諸有德潛來草偃之餘細影中糅浮光外透示諸扇其微和豈將摧其獨秀諧清淨之理助發生之候風如以諷俾聖教以無私條若以調配樂和而不奏飄以長逝翛然遂多煦大塊而爰發泛柔木而惟和髣佛兮還同轉蕙寂寥兮無撓靜柯道合知微時方太古嫋其長而輕揚含其和而不吐暗起軍營之柳取象於銜枚潛飄清廟之松同和於土鼓彼化鵬摶於九萬此至人御於十五與夫不鳴之道兮曾何足數初生微月若無若有出城中兮才廣於眉入堂上兮不盈於手若乃金壺稍滴銀漢將流暗鵲驚夜寒蛩送秋天清暈滅露白光浮臨皓壁而添粉映珠簾而半鈎纖光潤海重明表壑的的飛上娟娟未落銜破鏡而飛斜抱彎弓而勢却蓂稀葉少桂短花新無篋笥之團扇有虛空之半輪悵徘徊以將失情鬱結而莫伸命後車之文雅恭進牘於詞人千里著明者唯月百尺崇高者曰樓月照耀而莫大樓宏敞而寡儔光含雪淨勢寫雲浮生滄海而皎皎度飛宇而悠悠皓天地而彌廣沉氛埃而已收於是隱映澄寂特起峻峭月上樓高樓明月耀黃鶴驚而欲翥素娥集而匪召垂輪簾外疑鈎勢之重懸透影窗中若鏡光之開照其望也可以相思其登也可以遠眺及夫高秋廓落寒夜肅清四空迥而晃朗九層屹而崢嶸列歡宴會友生去洞房兮即重屋滅華燈而臨前楹玉檻連彩粉壁迷明動鮑昭之詩興銷王粲之憂情則有離居獨處愁思未歇持鳳管而坐樓矜蛾眉而對月徘徊宵際悵怏明發步蓂葉而盈盈顧桂華而忽忽錫以忠貞庶諧輕典嗟乎漢吏眷彼寧成不見德音唯聞刻薄乳虎之怒士卒所驚貪狼之名區宇攸震擅南方之利益志在徇私叛西土之寵章心懷背國刻傳既稱虛假論辜深是乖違宜置金科方形玉律惟上天降厥瑞瑞著於川惟君人臨厥聖聖通於天由盛德之應矣化清洛之溫然當短至之時景為凜烈及暄變之際應在淪漣散彼皇明受茲靈貺奚獨稟於和氣乃潛感於深浪遂使清冰不戒於洲渚之曲白露罷凝於蒹葭之上狎而玩信溫溫以異流迫而觀亦滔滔以難量爾其發自山谷會於河濱其外也皎兮如鏡其中也煦然如春夏蟲不疑失輕冰於曲渚秋鴻欲去戀微暖於通津豈止元覽不昧呈祥有因測彼淺深窮茲浩渺方將表瑞氣於澄潔豈獨激巨浪於昏曉揭厲之輩謂祁寒初失於波中遊泳之徒疑薰風遠至於天表若夫德至則應天且不言就其深則酌之不竭變其性乃即之也溫狀真宰為爐於其底意鄒子吹律於其源若彼火井之熒煌湯泉之滃鬱徒及時於四氣寧善利於萬物德之感其感良多水之瑞其瑞惟何方將吹籟之共凜忽猶鼓士冖柘之相和霽日初懸似陽燧之藏深瀨紅霞不散若陰火之在空波方今地不藏寶天惟瑞聖茲水也有時而溫由一人之德盛禹別山河周開井邑諸侯建國錫土之義載光大夫稱家食采之文攸著甲因門緒得賦圭田傳冀缺之封襲耐班之賞外繇取給私室是殷雖居五等之尊猶均什一之稅縣司情深奉法志在優人庶貢賦之取均冀上下之攸利權豪罔避貧弱是優所俾無得其人今訴誠難為理
