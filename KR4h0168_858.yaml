front:
  text: 全唐文欽定全唐文卷八百五十八凝式字景度華陰人昭宗朝舉進士再遷祕書郎梁開平中纍遷考功員外郎後唐同光初歷給事中史館修撰明宗即位拜中書舍人長興中歷右常侍工戶二部侍郎清泰初遷兵部侍郎晉天福初以禮部尚書致仕開運中除太子少保分司於洛漢乾祐中歷少傅少師周廣順中以右僕射致仕顯德初改左僕射又改太子太保致仕卒年八十五贈太子太傅
  hash: sha256:52dc1abb2b406f5789188334457fc4a947355e5cc7e1188db1534402f937f588
