body:
  text: 諸祠祀之所並無齊宮遣前染院使周重興監造與留司計會具料度事件以聞其太廟郊社要補葺處仍便撿計晝寢乍興輖飢正甚忽蒙簡翰猥賜盤飧當一葉報秋之初乃韭花逞味之始助其肥羜實謂珍羞充腹之餘銘肌載切謹修狀陳謝伏惟鑒察謹狀聖朝神武文德恭孝皇帝御極之七載歲在執徐三月二十八日天慘東南星昏牛斗惟靈臺之觀祲慮吳鄉之薄祐還九夏之生魄覽萬里之飛奏當青帝之回時果真王之歸壽何國不幸而殄瘁於此辰謂天無私乃殲奪於茲晝聖上投袂震駭當寧惻怛雪泣盈於重瞳視朝廢於丹禁以為鋒摧倚天劍柱折不周山愴宸衷於既往增寵章於未備司禮以之考儀執事其無安位或贈襚以軫悼或易名以昭賁將作監李鍇銜吊祭之命有加於賵賻太常博士段禺等議始終之蹟定諡為武肅贈既絶於人爵葬乃錫其王禮睿思聖感星繁波委煌煌焉冠今古而無儔穆穆焉充區宇而何已尚慊為王稱霸之雄命世誕生之德簡冊雖著金石未刊豈使太邱延陵翻存不朽之跡沂山峴首獨彰可久之文非好辭無以敘元勳非貞珉無以輝億載廢而不舉闕孰甚焉遂詔工部侍郎楊凝式曰爾以儒素簪裾嘗為我左右侍從撰論之稱人謂爾宜匡合之功爾為豫志俾披文仰止等高大於崑邱垂裕無窮掩帛丿糸長於淮水臣凝式百拜稽首仲宣體弱馬卿思遲寅奉絲言俯伏金戺倣徨憂畏凌兢周章荷明天子旨當大手筆挾泰山而越滄海猶或云易染柔翰以勒丹碑孰敢無愧僶俯述作採托幽祕訪小說於稗官徵實録於史氏謹肅然奉詔斐然抽思蓋聞雷雨方作天機發而龍蛇起象緯騰秀星精降而賢哲生百六草昧之時九三經綸之際海縣則雲蒸霧湧雄傑則虎變鷹揚日月為之昏霾山河由其分裂或力侔八柱或敵號萬人或水灌晉陽或泥封函谷召兵車之會上落欃槍啓國社之崇旁開分野鬼神叶力河嶽同功攝干將而佩烏號瞰扶桑而瞵濛汜望高於周召業盛於桓文越前代以成家冠㣥后而為德者吳越國王蓋其人也王姓錢氏諱鏐字具美杭州安國人其先出自黃帝武德中陪葬功臣潭州大都督巢國九隴之八代孫由軒后而疏宗本枝已茂因彭祖而受姓祚允彌興或仕宦移家烏城成其舊地或精神滿腹晉室重其英聲騰實家牒傳芳肉譜乃江南之大姓固海內之強族大王父沛宣州旌德縣令纍贈吏部尚書王父宙纍贈太尉烈考寬威勝軍節度推官職方郎中遷禮部尚書賜紫金魚袋纍贈開府儀同三司太師皆代有馴行世濟偉人宣慈惠和溫良恭儉垂芳餌以釣國偶乏良時積陰德以貽孫遂開洪緒王則太師之長子也五行鍾秀四氣均和白雲起於封中丹霞呈於日側地不愛寶賢惟間生吉夢先來既享鈞天之樂壯心未遂常為梁甫之吟識者多奇衆皆暗許乃人中之瑞實天下之雄虎踞龍盤江山為之作氣鷹瞵鳳喙英傑以之成形由是元悟神姝應期靈叟罔久事於筆硯思在屬於櫜鞬遂罷計偕言參戎律鵝鸛鳥雲之勢堪輿風角之術洞若生知宛如神授雖陳相出奇祕風后善孤虛與之同年雅有慙德屬時艱已甚天隟方開值庚子之亂離同戊辰之俶擾入夜則日高三丈當參則暈結七重見蚩尤之張旗逢王良之策馬人烟斷絶原野有厭肉之謠山嶽沸騰黎庶無息肩之地兵興之苦江東尤深王以出衆之才膺冠軍之號八都倡義張正正之旌旗一呼連衡結堂堂之行陳深明去就多識變通或開君子營或坐將軍樹斬嚴殺厲孰為貞律之師靖亂平妖獨有勤王之志時彭城漢宏亂常干紀負濬憑嶚刻孫述之僞文采齊巫之狂說晝伏夜動豕突鯨吞為患滋多尋戈未己王刑牲釁鼓按劍陳師若李廣之飛來效賈復之深入長風破浪得艅艎於水中利刃摏喉取蝥弧於城上士怒未泄賊壘俄平有壯戎容遂光霸業不久仙芝竊發黃巢暴興心恣豺狼牙磨猰㺄盜淮南之郡邑為世上之瘡痍人苦倒懸力疲奔命王英謀電發鋭氣星馳應高駢之羽書舉臨安之組甲舳艫所至烈火之燎鴻毛旌旃所及太華之壓鳥卵國家方虞多壘克賴藎臣併録奇功遐頒好爵乃命為杭州刺史尋移潤州鎮海軍額授節制焉名登王府位列侯藩雨露方濃聖主願觀其畫像鄉閭不改故人皆羡於晝行昔王與董氏爰在初服同興義旅定神交於擾攘陳大節於匡扶酒染血匙共結忠貞之誓心明河水長存慷慨之詞對壘握兵夾江為郡言猶在耳董己渝盟幸乘輿順動之時假圖讖不經之語嬰城自固竊號稔奸王執鋭披堅瞋目張膽令如時雨勢若疾雷橫金鼓以指妖巢揮羽扇而蕩強寇睂皆見軾大陵為之無光首盡奔闕一字京觀由是特起時三精上黷萬乘西巡王報國推心誓江立志獻戎捷而自遠問官守以無虧多難識忠臣疾風知徑草昭宗聞名早歎見節彌嘉得竇融於西河既寧天保倚安國於東界尋輟宵衣遂命兼領越州仍頒鐵契丹青示信帶礪言盟列在世家藏於宗廟慶天門之奇士才督八州畫雲臺之功臣不過四縣論德則彼或無取較寵則斯實居多自此外繕甲兵內修耕織好賢寶穀親仁善鄰張管子之四維樹周書之八枳開拓疆宇延任英豪謀無不臧人思盡力五蛇為輔遂隆霸主之基九武訓戎屢喪敵人之膽廢興由其指顧遠近憚其威聲況俯接閩川遐通楚塞琅琊則時稱賢帥扶風則世號寵王皆戰艦凌空征旗蔽野據東甌而保大處南海以稱雄莫不欣接犬牙請徵於盟會願為龍虎以詫於輔車而乃楊氏阻兵據廣陵作梗繼渝鄰好屢警邊烽頃常全率車徒擅侵封部王妙陳三覆宏肆七擒才揮善戰之師遽見數奔之衆示武經而戡定取戎首以凱旋尋乃玉磬請和銅盤受制初聞釋憾還君子之鍾儀無復當鋒見人傑之韓信疆場自謐方略特高精貫元穹義形霜雪總中權而作翰陳左袒以輸誠許國致君不渝於金石獻琛奉贄罔限於高深固得三鎮節旄千里疆土令僕調鼎之重師保論道之尊生祠列康衢畫㦸羅私第備隆徽數仍啓全吳輶軒旁午於道途綸誥葳蕤於藩屏名垂信史功在景鐘近世以來求之未得及梁園興僭皇運中微前在列藩敦魯衛之兄弟洎當新室修秦晉之婚姻殊禮洊加積功是仰王以為時有否泰道屬汙隆明且未傷義無或爽乃受其尚父守尚書令之命尋加天下兵馬元帥莊宗皇帝參墟振翼牧野成功應黃星以御宏圖仗白旗而行大戮九江既導江漢於是朝宗七曜重新天地以之貞觀乃眷星紀時惟國楨定傾之碩略遐彰蓋世之宏勳斯在再造之始大典將融唐堯之光宅未遑周武之下車興會超於徽數簡自聖心遂命有司擇日備禮冊為吳越國王賜金印玉冊臨軒遣吏部侍郎李德休往行冊命尚父守尚書令天下兵馬元帥如故大矣哉若是之禮也昔武王問師尚父曰三皇五帝之道存乎師尚父曰在丹書乃齊戒端冕西面道丹書之言武王拜而受之此尚父之事也周禮王者以六轡御天下又李固有言曰北斗為天之喉舌尚書亦天子之喉舌令也者總是六官納於百揆為大化之本居會府之宗此尚書令之職也昔太公賜履五侯九伯實得征之又授晉文大輅戎輅之服彤弓玈弓之數命之曰以綏四方糾逖王慝此元帥之謂也成王以周公為有勳勞於天下封於曲阜地方七百里革車千乘命之以禮樂旌旗言廣魯於天下此立國之道也高皇漢法無尺土之封故大封同姓又刑白馬為盟有非漢世而王天下共擊之此重王之義也有一人於此人猶貴之而五事在躬四方拭目名器莫之大也功業莫之高也人臣莫之比也豈不謂非常之人而有非常之事者乎皇帝西京立議北極居尊執大象以臨人宅中州而撫運重熙纍洽端拱垂衣恨七聖之迷途未還淳朴樂三王之無事高謝干戈而內注宸襟遐思列土坐明堂而布政稱伯舅以圖勳特下天書遐頒驛騎顯舉不名之典愈宏敬老之文王戴舜彌堅尊周益至苞茅縮酒恆共於閟宮葵藿向陽不違於黃道屬天禍吳越疾在膏盲未及浣腸之醫遽聞含玉之賜桑田忽變悲夫橫海之鱗霜露俄高已失蟠桃之樹嗚呼哀哉薨於正寢之日享年八十有一理命諸子曰吾遭乾綱隳地之時為雄豪所推服奮臂起義為國朝除暴亂屢蒙以功進律賜壤賜圭天寵所臨辭不獲命至於憂愧在位尊獎王室不敢以貴驕人不敢以功自伐爾曹亦見之矣且知足不辱道宗明誡吾謝之後慎勿踵吾之跡惟忠為令德可以長有富貴諸車服府舍有過制者悉命撤去之無存王庭之儀當可奉而行也天子聞而歎悼之以長興五年歲次甲午正月壬申朔十一日壬午葬於吳越國杭州都督府安國縣衣錦鄉勳貴里禮也公室豐碑既遵遠日珠襦玉匣永閉佳城臨水流闕之祥邢山高顯之勢風急雲愁自昏闕整題湊以將歸揭素旗而先遠湮波闕一字暮田橫之薤露淒涼闕一字氣歸天周勃之闕一字簫嗚咽王闕二字紹闕二字叔王侯代歷纍朝時更五紀處至崇之位著不賞之功必得其祿必得其壽子孫保之祠廟享之其福德也如此保大定功建邦啓土四海膏腴之地六朝文物之鄉握貔貅以主諸侯控江山以尊天子昔泰伯斷髮端委以開吳句踐嘗膽辛勤而霸越舉一羽之策兼三國之雄其霸王也又如此洗兵海島振旅江城戈船蔽於長洲戎輅盈於欈李盛氣而風雲回合援枹而山嶽動搖以此摧敵何敵不陷以此守土何土不興其強大也又如此闕四字地利天時章郡積於青銅海陵厭於紅粟決渠降雨鄭國不足語其豐連袵成帷臨淄不足論其衆其富庶也又如此麟趾公子不下百人鳳穴羽儀皆居五等或對升鼎鉉或俱列土茅比屋未蘇則任棠水薤鄰兵尚熾則鍾會戈矛所以生在謝庭闕四字遊於豐市但見公侯其允緒也又如此八千子弟昔且散亡五百功臣今稱闕二字成及奮爪牙之力建徽獻腹心之謀故得帳下偏裨皆持瑞節幕中賓客盡陟齊壇其將佐也又如此廣明之後大亂相仍朝廷有失鹿之虞鑾輅見逐螢之窘蜂飛蝟起幸殷室之邱墟霧集飇馳問周鼎之輕重義士猶或失節奸雄俱已搖心王能運機籌不迷風雨偕程昱之捧日兼以梯航類袁安之憂時形於涕泗其忠藎也又如此以寡敵衆背水囊沙說禮樂而敦詩書擊東南而備西北取薛朗如摧朽敗徐約若建瓴臨變生機圖難於易張子房之帷幄頓覺空虛謝安石之棋枰不為匆遽其韜略也又如此愛如父母政若神明雖左右咸見於得人而大小多聞於躬決棄申韓為末造實黃老為上科法簡秋荼威收夏日遂使吳中子弟羞論磔鼠之才浙右封陲杜絶成牛之氣其善改也又如此虛心應物屈己臨人船問闕四字齊闕三字郊碣石之宮才聽商歌即吐麒麟之哺未加楚醴不張瑁之筵其待士也又如此律呂笑談文章草隸縱橫自得冠絶時人雖復觀周樂之知音卻衛軍之大辨顏延之雕繢滿目張伯英筋肉俱全闕一字不罷聽而吞聲面牆而閣筆闕二字屢闕一字篇迦葉闕一字監多存真跡其才藝也又如此雅洞真筌居為外護慕佛乘之妙道割天性之深慈法相太師子妙雲太師女也既脫屣軒裳拂衣羅綺謝有為而宴坐悟闕一字利以出家於是對櫂慈舟雙興闕一字殿山陰都講時間出於空門剡縣相闕一字飛闕二字於貝葉其崇信也又如此浪起海門潮衝羅剎若天綱之雕瘵震地軸以連軒雷公翻然其憑凌犀炬莫窮其怪異王激拔山之志踵立埭之規百萬為徒晝夜交作塞洪波而為大陸排巨浸而廣名區輕塵不飛失闕一字胥之憤氣長川罷沷雪精衛之寃心其神闕一字也又如此丕變荊榛廓開衝要既冠山而構臺閣又亘野以啓郊郛飛甍上拂於招搖赬壤旁吞於坱圠率由心匠似匪人功歷九土之繁華闕一字方巨麗覽八都之詞賦不遠宏規其創業也又如此五十年之生聚一千載之井田德澤仁風家至戶到方安福地遽失藏舟莫不走㣥望以無階萎哲人而有慟興謠輟想悲深子産之亡罷市冰鬚痛極羊公之謝其遺愛也又如此今復起雲麾鎮海鎮東等軍節度使新授守中書令元瓘紀地四溟麗天闕二字應龍得水雕虎生風闕一字引可大之年聞詩聞禮荀羡中書之歲且公且侯知機元悟於寶花好德早承於良冶雅通金匱屢坐寅車振妙算於中堅遏驚飈於四面英華外散和順內凝中嶽稱其降神左氏書其有後皇帝得之巨屏既若長城聞觸地以無容念分閫而何寄難闕三字制書墨晉侯之斬縗從魯公之金革疇庸疏爵仍正位於黃樞移孝資忠又增華於蒨斾自天降命延賞推恩九霄之寵詔星飛一境之歡聲雷動今復起中吳建武等軍節度使檢校太尉兼中書令元璙久臨闕一字部克著嘉猷雖情厚闕五字拘金阜今起復靖海軍節度使檢校太傅元瓚早秉圭符遙分節鉞方藉求瘼難避奪情並奕世勳名同時將相雖元成繼美襲鳳詔以持衡紀隲承家賜雲屏而隔坐未足多也又何加焉其紹續也又如此至於立德立言允文允武宏五霸之略垂萬世之闕五字遂道全經緯英概必舉振古莫儔自列國以來未有如吳越國王者矣夫如是則隘燕然之石未可殫書罄嶰谷之筠不能盡紀臣凝式胸中學淺日下名輕敘事多謝於子長待詔有慙於徐樂恭承睿旨從事斯文每懷響而必彈庶為陵而更顯雖五藏在地終非吐鳳之詞而百代可知請俟獲麟之筆謹為銘曰茫茫宇宙悠悠帝先成形在地成象在天有精有粹為英為賢復振勳烈出正危顛三辰不軌四郊多壘運否時屯風飛雲起鏌鏌耀耀英豪自喜始學龍韜終惟虎視時乃真王出自軒皇金玉蘊器融結殊祥奮臂有勇其鋒莫當知機應變取亂侮亡八都義舉㣥凶膏斧俾爾除殘推我作主失律斯凶止戈為武是曰壯師信如是兩漢宏興僞董氏憑妖徐約屭贔薛朗咆虓披攘蕩拂果毅戎昭魚爛於鼎鳥焚其巢明明天子念動闕一字古命為諸侯分茅胙土忠作唐臣尊稱仲父有赫旗常無忝宗祖纍清多難屢播奇功既開赤社亦賜彤弓吳越全壤齊晉舊風千雲比峻負海稱雄年過八十勢高二伯乃子乃孫羅旃設㦸惟天所相不索而獲亮此霸圖光乎史冊一寒一暑如水斯傾適來適去孰肯忘情香銷玉釜露盡金莖還茲厚穸非復長生縿幕晨張塗車永去劍履空存杯盤不御今日豐碑昔時棠樹萬古千秋凝陰宿露蔚字德升長安人後唐莊宗伐蜀詔令權領軍府事晉天福中歷開封廣晉少尹少帝嗣位拜左散騎常侍轉工部左右侍郎開運初出為亳州防禦使入為戶部侍郎漢初拜御史中丞轉兵部侍郎周祖入立遷太常卿顯德二年卒年七十一前朝改祖孝孫所定十二和之名文舞曰治安之舞武舞曰振德之舞今請改治安為政和之舞振德為善勝之舞前朝改貞觀中二舞名文舞曰觀象之舞武舞曰講功之舞今請改觀象為崇德之舞講功為象成之舞又議改十二成今改為順十二順樂曲名祭天神奏禋成請改為昭順之樂祭地祇奏順成請改為寧順之樂祭宗廟奏裕成請改為肅順之樂祭天地宗廟登歌奏肅成今請改為感順之樂皇帝臨軒奏政成請改為治順之樂王公出入奏弼成請改為忠順之樂皇帝食舉奏德成請改為康順之樂皇帝受朝皇后入宮奏扆成請改為雍順之樂皇太子軒懸出入奏允成請改為溫順之樂元日冬至皇帝禮會登歌奏慶成請改為禮順之樂郊廟俎入奏騂成請改為禋順之樂皇帝祭享酌獻讀祝及飲福受胙奏壽成請改為福順之樂梁武帝改九夏為十二雅以協陽律陰呂十二管旋宮之義祖孝孫改為十二和開元中乃益三和前朝去二和改一雅今去雅只用十二順之曲祭孔宣父齊太公廟降神奏師雅請同用禮順之樂三公升殿下階履行同用弼成今請同用忠順之樂享藉田同用寧順之樂知損字化機大梁人少為藩鎮從事入拜左補闕晉天福中纍遷右司郎中漢初除左司郎中兼侍御史知雜事周廣順中拜右諫議大夫責授棣州司馬世宗即位除名配沙門島卒於海中王昶僭踰名器漫瀆朝廷雖天罰之未行在國章而當正所頒命詔過示寬恩且匹夫犯法之贓尚猶徵納而遐裔不臣之物豈可放還伏請禁錮來人籍沒綱運臣以前承御札許進言者直書其闕況臣在諫司不敢避事臣近聞衆議云國家將變鹽法有司即欲宣行竊以諸道所糶賣鹽令逐處更添一倍委州司量其屋宇均配城內戶人每歲勒兩限俵鹽隨二稅納價言之雖易作之極難此法若行甚非穩便然則歷代變法先取其益國利人前王開基本在於安時恤物設國無所益人不聊生斯乃害時之理昭然變法之功何有今添配鹽貨資困弊者有二作敗亂者有三何則念寰海蒸民屬梁朝季運困之以兵革重之以科徭幾經宗社改更刑法變換地經百戰往年之事力都無室告九空到處之鄉村未復止於州城衆戶所在貧乏者多臣頻曾守職藩方莫不詳觀利病且常年城內居戶例於屋稅請鹽比其徵納之時備見艱難之狀以至須勞鞭朴尚有逋懸況所請之數甚微應督之期猶失若以逐州場院鹽貨於合賣數增倍俵之以稅錢均攤則貧富高低而不等以屋宇紐配則盈虛剩少以難齊於功罕全與物為病其資困弊者一也逐處州府必委官吏行之官雖強明而吏藏姦幸斯蓋必然之理可得而知儻官乏能名吏多欺詐則力不足者重傷於增配家已給者卻獲其輕均是則率百姓而困國家虐貧窮而由胥吏其資困弊者二也且諸州糶鹽收利省司差官置場所掌者國家之利權安得假厚薄而輒廢所立者國家之法制豈可㳂輕重而濫施使四方之人何以取則聞一朝之令孰不見疑散利權於諸州變鹽法於天下俵給不均而民弊徵催不便而民逃國無利而喪權民積困而失業其作敗亂者一也所在之處多有土鹽或煎而食之或藏而貨之流行既深紊亂非細如無告訐莫得追尋若配俵之權憑於官吏誡嚴之法委自藩方則民漸困以何辜國轉虛而何利其作敗亂者二也天下鹽鐵國家大權當重慎於弛張助國家之經費喻河流之不竭同嶽鎮以無傾蓋轉運所引行之如水禁嚴其固挺之若山豈可緣支用而絶本源為迫切而摧重大權衡一失整頓甚難利害再思辨明極易是則民有害而可救國無利而何圖其作敗亂者三也困弊敗亂願陛下細而思之審而行之恐不宜以為常事而不軫聖慮也大凡錢穀之利祇以聚斂為能至於度支之司唯以濟辦為效殊不知人心小失所憂之事非常王道大行所悅之方蓋遠臣竊慮有司以配鹽事件敷奏聖聰必云百姓賒得食鹽半年然後納價國家隨其二稅頭段徵得鹽錢場院既免遷延官典更無逋缺民獲其濟國有所資臣請詰之以解前說且百姓窮困十八九焉或市肆經營取錐刀宜利至於日食鹽酪辦即買之偶或無錢不妨淡食今以半年鹽味配給貧民請歸其家殆非所濟當俵鹽之日己不欣歡及納價之時可量困躓復有稅租甚大舍屋頗多骨肉替零家事牢落官中以戶門而須配本人懼條法以難辭剩請官鹽莫之為用都徵省債無足可償以此通民何州不有以此編戶何處不空則是百姓因之逃亡鹽鐵固所虧失省司指本州本使不管流移州司追鄰人保人須令攤配如此則己傷殘而重困未逋逃而復驅益國濟民其利安在蠧時害政不亦多乎所司或對曰自古理民有利則有害當今贍國不斂則不充諫官祇以憂民為詞不知經國之務臣請再詰以證斯言夫國家取利之方王者安民之道雖或甚利於國微損於民聖君尚以割股啖腹而為言本固邦寧而垂誡何況有甚害於物而小益於時者乎必欲糶賣鹽錢須要倍於往日唯宜減落鹽價慎選場官示諭諸州峻整公法凡經半課利但令逐處較量比及周正必期集事如糶賣倍於元數課租濟於朝廷則必授以殊資別委主之重務如或所賣不及於元數所資不濟於朝廷則必顯示斷懲永更不令任使既鹽價極輕而鹽法甚重則民間不犯而貨易自通州府以公家在心場院以貞幹為事自然國有其利民無所傷與夫配百姓而失經費之資其利害懸於天壤矣伏惟皇帝陛下每憂勤庶政嘗咨訪㣥臣當明君求諫之秋是微列得言之日臣近自作補闕擢闕員外守刑法之司非諫諍之任雖越職干議典制固所不容而為臣事君聞見宜其無隱臣晚於相國寺內忽覩聚衆殺病瘦馬或說奉旨宣賜臣愚昧所見竊有感傷大凡天下耕牛不可宰殺有所犯者罪在無赦國家切有禁防蓋以力耕為用今之瘦馬抑有前勞是皆久歷戰征備經辛苦以致筋齒疏尨飲齕細微振奮莫能廢損及此當於佛寺被衆軍人以布巾蒙其頭大钁鎚其胸及刳剝之際為觀者所傷方今時未銷兵軍非厭馬木曜方臨於鄭分鑾輿暫幸於梁園誠能回賜與之恩亦憫傷之旨矧復京師之內不同營寨之中況軍人米糧無所乏缺病馬肌肉不濟烹炮伏望明敕所司應有病散令宣賜要者任便餵養顯示不殺之恩念羸牛之力耕猶存令式恤老馬之苦戰願立新規臣謬列清朝無裨聖運苟有所見合具上聞
