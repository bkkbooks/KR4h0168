front:
  text: 全唐文欽定全唐文卷八百龜蒙字魯望蘇州人舉進士一不中從湖州刺史張搏游為湖蘇二郡佐去居松江甫里自謂江湖散人或號天隨子甫里先生以高士召不至李蔚盧攜素與善及當國召拜左拾遺詔下日卒光化中韋莊表贈右補闕
  hash: sha256:2acbe7c5c09742f85237a16c6bded29e00af4fafce6b6300b25a0333d5fd9bb2
  markers:
