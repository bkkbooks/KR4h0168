body:
  text: 江文通嘗著青苔賦盡苔之狀則有之懲勸之道雅未聞也如此則化下風上之旨廢因復為之以嗣其聲云天地閉風雨積門逕秋莓苔植離方抱圓累紫疊碧始分封於危亭之下終畧地於荒畦之側侵竹塢而縱步占蘭疇而盈尺麗色何似嘉名孰為高有瓦松卑有澤葵散巖竇者石髮補空田者垣衣在屋曰昔邪在藥曰陟釐質被綠錢之美香聞艾納之奇或薄或卄直毛或蘚或菭諒含姿而是類斯感物以隨時則有衞霍天姻金張世族侯以恩澤拜館以形勝築壁僭塗椒階緣墄玉牀丹徼之象盡帳蒼梧之翠禿謂爵祿不必仁守英髦可以力服行叶四凶身圖五福一日盈滿中年顛覆斯苔也染婕好之篲殆晚偏青封廷尉之門經秋更綠彼失寵以亡家者鮮不慟哭則必林塘倚薄衡泌蕭條茅茨上古机格南朝晝偃則書淫畫聖晡歸則婦餉兒樵溝通壞壍路隔危橋雨霽而魚驚沫聚霜乾則鶴刷翎飄浪求名而蠖屈虛卜命而龜焦窗欹癭枕樹挂風瓢山無價買隱有詞招斯苔也周內史宿酒壺邊煙翍思起屈大夫擣衣砧上黛點情饒彼遺形而放志者能無獨謠謠曰苔之生兮自若人有哀兮有樂哀者貴兮樂者賤貴者危兮賤者宴噫哀樂兮何時止貴賤循環兮而後已余抱病三年於衡泌之下醫甚庸而氣益盛藥非良而價倍高每一把臂一下杵未嘗不解衣輟食而後致也其為窮且否亦已至矣聖人云五福六極之數曰壽曰富曰康寧曰貧曰疾曰憂既貧且疾能無憂乎憂既盈矣能無傷乎人既傷矣能無奪壽乎是不蒙五福偏被六極者也誰其憐之作自憐賦噫天地兮何德以生子付邃古之道兮惠而行諸聖人耕吾亦耕聖人漁吾亦漁聖人窮或過乎是聖人達曾不依子既不獲築說莘伊委身而理天下又不及箕巢潁許散髮而類鶉居率幽憂之情抱將退伏於林廬謂之積兮繁其疏搜羅以虛謂之枵兮輔其儲涵潢乃瀦旁無垠兮上無初退不足兮進有餘先寒束縮後燠敷舒首蓬隆以半散肢棘瘠而枯疎中躁兮熸炮之蟹外撓兮冠帶之狙凌兢兮上坂之馬帖捻兮橫沙之魚行則左人而右杖臥則夕擁而晨袪冒忌者即席奮擊責功者越月紆徐痿寧忘起憤亦懷攄天難致問道竟何如孟子之言得矣盡信不如無書雖武成取其二三策而已又焉知是歟非歟臯陶瘖師曠瞽子則視瞻而言語卻克跛行父禿子則趨蹡而櫛沐幸固陋而或全豈乖離乎素躅敢諫鼓不陳進善旌不理布衣之說無由自通乎天子丞相府不開平津閣不立布衣之說無由自通乎宰執苟吾君吾相不聞天下之名言則蒼生何由弛械而去縶傳云垂之空言不若存之於事業易曰未繘井羸其缾凶歎水德之莫及哀吾材之不試徒抱影以中泣一蝎在木兮柯瘍葉痿寒暑三病兮吾寧禦衰服猛鷙兮捕龍螭吾無力支大舜禹兮張孔姬吾其庶幾託斯文之赴愬冀君子之攸宜苟家聾戶塞之弗寤老死空山兮已而宋玉雲夢侍從賦成酒闌君王慘憺顧曰春寒玉少進曰大王之國三分水居其一大王之官庭女子充溢洪波浮其空幽憂積其中不得不雨不得不風風橫雨斜天地溟濛寒之中人有異於嚴冬其來也低迷其狀也惆悵理雖辨而詞怍色雖莊而意蕩明滅薰罏留連繡帳相逢置酒則少避駞顏獨自登樓則偏凌遠望臨窗戶遶池塘絲輕畏偪花怯愁當游蜂為之絕跡好鳥為之深藏齊紈失色越絮騰光掩抑兮幽襟更遠連牽兮別緒彌長芳神失職陰御爭強朝耕犢戰暮箔蠶僵民病如此君何勿傷襄王於是下席稱謝撤燕戲省嬪嬙以黃金為玉壽然後返駕於高唐江上有田田中有廬屋以菰蔣扉以籧篨笆籬楗微方竇櫺疎簷卑欹而立傴僂戶偪側而行趑趄蝸旋頂隆龜拆旁塗夕吹入面朝陽曝膚左有牛樓右有鷄居將行月登遮未起啼驅宜從野逸反若囚拘天隨子愀然而吁復自諫曰祿以代耕如無祿歟無祿無耕為工商歟有沮溺之賢以仕易農乎有輪扁之道以仕易工乎有弦高之義以仕易商乎今則不然能無說焉葢仕不愧祿而揣政咸率人以奉己使農工之洎民棄其守而趨仕農之仕墮於力而希歲工之仕巧於文而幸貴商之仕射其肥而㗖利所以國靡凶荒之儲家乏完堅之器人闕有無之備莫不由是加以上多而下寡不勝剝喪之苦轉從盜聚而充熾嗚呼吾丁此時何以逭之將提新書抱野史上干天子之有司如怒鼃之跳梁於風而自謂登乎龍籍不其遠而有牛角角有田棊棊不值惡歲未嘗孔饑今則陽亢而驕苗渴而萎千穗百粒穫夫涕洟饘於是粥於是信夫鼎銘之我欺彼為聖人儉者茅茨勞者胼胝顧予懦夫勤陋何疑有鰥在下者舉舜之德毋惟汝諧者授禹之辭不舉不授雖聖胡為乃繼而為詩道不可不若天不可不樂謹爾溝塍利我錢鎛聊以卒歲更俟東作孔子曰吾志在春秋予以求聖人之志莫尚乎春秋得文通陸先生所纂之書伏而誦之作求志賦語稱人之所好必舉嗜慾以為志余之生也百無一厚者惟古學庶幾乎可媚嗚呼師道之不存安能盡識乎疑義樂夫夫子之春秋病三家之若讐得啖趙疏鑿之與損益然後知微旨之可求乃服膺而誦之見聖人之遠猷長風廓其㣥翳赤日臨乎大幽又似車堅馬良善御者涉乎康莊高颿巨舟工泛者順其安流如魚之就貫如繭之獲抽伊尹和齊於五鼎箕子區分乎九疇酌大中於萬古偉聖心之獨斷宜乎沮齊侯於夾谷斬正卯於兩觀溝公墓以掩廢逐隳私城而防僭亂用千載之遺法發一辭而可判况先生之指歸屹波濤而畔岸雖戇昧而不開亦思之而過半范武子曰君子之於春秋也沒身而已矣吾謂斯言之不誕椒梧既謝屈原增傷菱先雁敗柳徇蟬荒日落深宮十四等皆為麗絕雲愁大澤九百里盡欲飛揚暑退未退宵長未長傍寶階以尋冷當綺疏而薦香飄飄拂拂悄悄悵悵省團扇以搖清昵瑤琴而泛雅石穩將臥笻輕欲把沈尹見王筠佳詠不覺書之謝傅感桓伊哀箏無端涕下單栖悟早共賞情多應從遠壑定降明河病樹一枝度日空懷越奏輕帆十幅乘秋好唱湘歌殷浩休談楊宏自舞粉初漬而題媚塵適消而畫古正在安榴館裏寂寞饒潘暫登酸棗臺時凄凉付庾潛生翠被暗箸金樓銖銖減癖斛斛量愁草元者逐貧無暇梯附者結客而游暮雨陵邊有魏主常聞之樂夕陽池上有蔡姬曾蕩之舟恨鎖疎煙襟披遠水露桂方澹風篁或倚鄂侯之餘冷猶在江令之宿酲初起道氣全衰離情遍駛許玉斧神超碧落仰接應難成花君怨別青宮追傷未已於惟聖人志氣如神百物自化四靈薦臻是以鳥獸浸其惠澤昆蟲懷其深仁福應尢盛休祥日新不然何以靈龜挺出飛龍來賓羽族降而集鳳鳥毛㣥格而畜麒麟莫不率彼飛走荷此陶鈞或㣥或友是擾是馴夫其時然後動動而斯中叶休明之德邁川岳之貢負圖騰大河之龍銜詔引丹穴之鳳介蟲稱長將開奧以應期肉角為仁示有武而不用原夫契時也其感不一效靈也其數惟四為皇極之休徵作太平之盛事然後魚鮪不淰知化而號玉禽獸不狘懷德而鹿君至非夫天子睿哲黎元厎寧惠化廣被品物流形則何能光有九土克擾四靈美元功而不宰仰洪德而惟馨在郊藪則棲託以自適聞簫韶則率舞而來庭且如羲之道昌龍圖有章姒之功成龜書呈祥或馴麒麟或降鳳凰彼皆一者之或出未若四者之來王又若龍鬬鄭洧麟傷魯野鳳有詠何德之衰龜有靈而夢是假興宣父之歎運未遇焉叶夏后之祥道之行也出處則以待時乎隱現而允符王者聖德可大靈物可嘉遊宮沼兮騤騤無懼鳴苑囿兮鏘鏘不譁遼東獻豕又何足數越裳貢雉失其所誇惟明王之理天下也垂衣恭己修禮達義儀形陰陽昭蘇品彙天不愛道則乾符應命地不愛寶則坤珍表瑞然後萬物可得而賓四靈可得而致敗壁秋立昆蟲夜鳴蠆者角者旁行卻行一不知其詭狀空太息於繁聲俱霑品彙共費生成穴陰階而負固抱枯蘚以圖榮退無力役進不爭名體肖翹而易動音嗚咽而難平深宮淚迸逆旅魂驚香殘漏永月昊樓明謝臨川行樂微吟應侵古調劉越石登陴坐嘯更裊餘清唧嘖懷讒悽嘶往愬縷急如斷絃么欲怒或自奇而不屈或相先而並妬亦有騷客裁錄詞人暫賦己矜牀下之光輝遽笑草間之霜露悲夫病枕潛移愁屏屢顧耿耿宵夢悠悠遠走耳乚朱雲沒後方知直氣無前馮衍歸來始歎高才不遇天隨子宅荒少墻屋多隙地著圖書所前後皆樹以菊春苗恣肥日得以採擷之以供左右杯案及夏五月枝葉老硬氣味苦澀旦暮猶責兒童輩拾掇不已人或歎曰干乘之邑非無好事之家日欲擊鮮為具以飽君者多矣君獨閉關不出率空腸貯古聖賢道德言語何自苦如此生笑曰我幾年來忍饑誦經豈不知屠沽兒有酒食邪退而作菊賦以自廣云惟惟菊偕寒互綠或穎或苕煙披雨沐我衣敗綈我飯脫粟羞慚齒牙苟且粱肉蔓延駢羅其生實多爾未爾菊未莎其如子何其如子何書編百氏病載千名將有濱於九死諒無敵於餘酲窗間落月枕上殘更意欲問而無問夢將成而不成心悄悄目瞠瞠愛靜中而人且語愁曙後而雞已鳴才遭轥轢適別恩情屈大夫之獨醒應難共語阮校尉之連醉不可同行氣縷支帛丿糸神雜色沮前歡己誓於拋擲往事空經乎思慮有馘卓擒伶之伍我願先登有殛狄放杜之君臣能執御聿當拔酒樹平麴封掊仲榼碎堯鍾先刊美椽次削真龍編虎鬚者寧教畔去持蟹螯者不要相逢欲倚還眠將詞又默深窮寂寞之境別有凄凉之域黃昏細雨迷途而不到長亭白晝繁花失意而初歸故國背枕求穩牽幃就黑愁應平子分與渴是相如傳得感物逾嗟懷人有惻謝月鏡共王清去去不乏風流杜蘭香別張碩來來更無消息冠纓不御桮桉空陳徒殲燕燕之髀浸費猩猩之脣牛心表異熊掌稱珍翦雲夢卄豈採泮宮芹周子之菘向晚庾郎之韭初春加以歐川桂蠧潁谷榆仁雖馳心於萬品且忘味於茲辰莫話三年誰云五斗從齊奴車騎如水任阿風姿似柳仙莫得而媒豔何能而有麟毫簾近遮雲母不足驚心琥珀釧將還玉兒未能迴首或乃強迎賓友力答牋書落魄不啻壓伊有餘襜褕猶懶整解散固慵梳卞七蔚專諷蝦蟇誠堪竊笑莊周子化為蝴蝶實是憑虛客曰雖鯖鮓能珍微風可折豈比夫榴花竹葉之味酃水中山之碧必能醺骨酡顏潛銷暗釋况前覆乃後車之警獨行為衆人之僻不然吾將受教於聖賢敢忘乎歡伯彼碧者草云書帶名先儒既沒後代還生有味非甘莫共三山芝校無香可媚難將九畹蘭爭叨詞林畔種在經苑中榮翠影臨波恐被芙蓉見鄙貞姿傍砌愁為芍藥相輕發葉抽英因天受性紛稚圭池上之宅拂仲蔚門前之徑不省教施異術安得返魂未嘗輙入明廷何當指佞幾臨寒日幸到青春莎蕋未傳於漁父蒲茸竊詠於詩人霜亦曾霑潘令偏知白䪥風嘗徧起宋生惟道青蘋栽培只倚於賢鄰搴擷長憂乎稚戲出慙無用舒還有異當琴操發伯牙山水之情值儒編動鑿齒陽秋之思敢曰求友寧忘慕義吳娃楫上空羨苔滋魏主帷中惟通蕙氣或乃蘭榮越徼薰茂周原幽搜莫及興詠徒存此則對仲舉蕭疎之室處子山搖落之園不識深宮豈是曾為帝女非侵遠道誰言能憶王孫徒愛其歛疎煙披曉露弱可攬結勻能布濩蕭蕭而不計榮枯漠漠而何于好惡金燈照灼尚驚秦帝之焚粉蝶留連真謂羽陵之蠹爾乃高超籬菊瑞許階蓂我則惟親志士每聚流螢豈便離蒿萊於隙地希杜若於遙汀倘遇翰林主人之一顧庶長保於青青葯白芷也香草美人得以比之君子定情屬思聊為賦云日正融冷春歸飾荒覩一時之流恨撫萬古之遺香問人則不屈不宋說地則非瀟非湘搴其榮煙攜而動色擢其體雪挺而騰光諷畔牢愁子雲於焉華皓吟哀時命曼倩由是摧藏情思矜年慵情畏晚胡繩繫晷以難駐揭車載春而不返陋君折楊柳須為送行陋君採芙蓉仍勞贈遠豈如陰晴互出稚豔相迎隈回鳳喜怨盻鴻驚侍笑者青琴作號顧謂者碧玉為名偷襞積競縈盈目斜波而水怯鬢疊葉而雲爭蘭在口以時聞嬌如連瑣蕙牽心而不定飄若懸旌契叩難申融怡自許石能潛遁以求偶山亦浮來而命侶誓不為巖阿竹冉冉孤生誓不為澗底松亭亭獨處於是欺皓本掩縮蕤房紅者自破蒂縹者誰披望懷沙之浦詠遺襟之詞煙分而麝墨猶濕綺斷而龍刀合知只言長信長門年年可恨未必傾城傾國箇箇生悲臨階躑躅以虛徐當戶薔薇兮綽約蜂咋葉而先盡鶯踶枝而易落未若北堂公子樹芳草忘憂南國佳人佩生香辟惡露茁煙冶風條翠謔不知海傍之期遠不信人間之命薄休為上計掾空尋寶釵聊作侍中郎且乘金絡別有廬江小吏蜀郡長卿或支離而築恨或調笑以衷情不同乎稟簪裾而霧悄秉禮義以霜明鄭交甫則江邊佩解萼綠華則席上詩成彼貽神而致問皆護節而含貞竦擢自持雖陳辭而往愬遷延却立終抱恨而難平淚滴堪穿腸迴好繫蟲絲織怨以成段象酒蠲愁而判劑江僕射之孤燈向壁不少凄迷張記室之少婦當壚應還細麗景方駘蕩思已低摧酒疲於子建為使花困於靈均作媒何庶物之相負痛妍華而未回莫與心傷瑤圃從驚鶗鴂如防膽怯空屏宜畫魁堆剩欲追尋徒嗟緬邈桮形連理而終在扇樣合歡而可學若遇劉公伯雅夢亦沉沉如逢王母少兒晝還數數余讀玉谿生蝨賦有就顏避跖之歎似未知蝨作後蝨賦以矯之衣緇守白髮華守黑不為物遷是有恒德小人趨時必變顏色棄瘠逐腴乃蝨之賊試問花翁得㮋李之春叢移來砌下出自山中長霑澗雨迴灑巖風曾不得次玉堂而展低豔承畫閣而逞微紅虛在芳菲之數徒干造化之功弱植欹危繁梢襞積一枝上能萬其膚萼一萼中自參其丹白且桃以天而蕣以華芍藥為贈兮芙蓉可嘉誰為翦緗綺碎明霞鳳葆䓤蘢於水殿霓旌掩苒於雲車靜倚庭楹徐飄蕋氣落幽閨怨別之夢寫空谷遺榮之思初侍東陵聖母冶態嫣妍近辭北燭僊人愁容委墜嗟其結莓苔之地抱林麓之姿蝶善舞而相掠鶯能言而見欺香憐墜少蔕戀飄遲當杯者不顧守道者應知請看嵇康高士傳莫信長安輕薄兒謝文靖桓宣武王東亭郄北府相與叩易論元驅今駕古散入神明之賾中稽道德之祖理窟未窮詞源漸吐支上人者浮圖其形左擁竹杖右提山銘於焉就席引若潛聽俄而齧缺風行逍遙義立不足稱異才能企及公等盡矚當仁咸云俯拾道林乃攝艾衲而精爽捉犀柄以揮揖天機發而萬目張大壑流而百川入於戲世路欹斜藏訛掩瑕陽矜莊而靜默暗奔競而喧譁貞襟枳棘奧旨泥沙雖然絕代清談客置此聊同王謝家獬廌出乎唐堯之年神羊至於我后之前雖一物異見實兩時皆然既曰珍祥亦稱絕異是考其迹莫問所至乃審厥生不知其自步元墀以龍擾向彤庭而鶚視夫其紅纖之狀周正之儀搏風比毳素絲類皮人間之所常覩天下之所備知葢神羊之末事羌難得而稱奇及至一人視朝百辟咸矚張羅梓列布瓊玉雖衣冠有貌槐棘祇肅為公卿以是匿匪神靈而不觸爾羊來思其儀孔嘉望表知裏揆瑜識瑕於是騰雙眸而舉柱聳特角而觸邪當之者則立成於犴獄見之者則固節於邦家無正不彰無姦不屈常在公而為言匪從巳而犯物百發百中或受命於神祇無黨無偏寧奉辭於綸綍則知為聖得一以理人得一以靈豈比羵羊下潛空呈怪於季井商羊上舞徒表珍於齊庭日者神直簪筆風潛衣繡順素節以擊揚奉白簡而彈奏指之者豺狼不避觸之者回邪莫漏彼神羊之信靈請從古而歸獸陸子居全吳東距長洲故苑一里闔關不通人事且欲吟詠情性曰燕居則仲尼有之矣曰卜居則屈原有之矣曰閒居則潘岳有之矣曰郊居則沈約有之矣既抱幽憂之疾復為低下之居乃作幽居賦其序云余少學窮元早持堅白其生也懸贅附疣其材也戴癭銜瘤居無養拙之資出有倦遊之歎初張蓬矢嘗逞志於四方末佩椒蘭敢違仁於一日雖家風未泯而世德將衰門等韋平材兼魏邴激清芬而鎮俗追雅望於圖形荀勗乃天下表儀裴秀為朝端領袖朱輪十乘紫誥千篇炳若星辰粲乎竹帛俯觀圖牒謬辱孫謀五鼎蕭條賜書零落漆工酒保幾欲沉淪故栗空桑屢瞻摧折劉超劉毅俱無儋石之儲許邁許詢但有山林之志思鑿坯而遯聊倚樹而吟師道氣於龜腸扣兵鈐於魚腹窮年學劍不遇白猿隔日伏痁未擒黃鷁止則葭牆艾席行則葛履柴車仲宣方翫於棊枰叔夜還眠於鍛竈既以草知晦朔木讓榮枯因推墨別為三復悟儒分至八何晏之言道德不及王生鄭元之注春秋才同服氏初陳梗概漸入精微探桓範之智囊掘張憑之理窟遺其耳目然後謂之聰明差若毫釐焉足言乎大小加以病惟鬬蟻力止戡蟬簾帷非翡翠之榮鐘鼓豈爰居所樂遂求衡泌聊以棲遲建一畝之宮忝稱儒者置十金之產雅叶中人晏子以囂塵可容曹公以泥水自蔽羅含宋玉嘗少出於荊蠻蕭相武侯亦潛居於僻巷楊德祖家惟弱柳殷仲文庭只枯槐馮衍薑辛繁欽苔碧復有稻名半夏藥號恒春長榆亦降星精修竹乃生雲母潘安館裏嘗聞柰素瓜甘庾信園中亦話棗酸梨酢竊觀留詠雅尚清風今古攸同聖賢何遠武仲遊於沛澤伊尹耕於有莘予欲無言回不願仕神交六位方為賣卜之人歌動五噫竟作賃舂之客况有布縚綸帽尚足朝昏羽扇貂裘猶堪寒暑得以書抽虎僕射用牛螉自理茶租閒被釣褐經稱小品還下二百籤賦謂名都畧點八十處下問得犂塗之義涂聽聞愬怒之詩既已逢原遂成摛翰非因授簡初擬遺鞭不能粉飾大猷且用元黃稗說貽於好事希逢得意而傳責以壯夫甘受子雲之笑賦云泰伯勾吳通侯舊里地接虎邱門連鶴市比顏巷兮非陋方賜牆兮猶峙樂令有名教之樂必以仁行莊生乃道家者流咸從達起彼既得矣予何謝焉欲神遊於浩氣法大隱於遺編魯仲孫衣止七升之布欒武子食無一卒之田賤不容憂貧惟可賀冥心而姑務藏疾卷舌而誰能擊墮爭先敢脫乎牛車自給方營於馬磨噫秦時亡命竟作帝師吁漢末遺臣皆稱王佐吾焉用此僕病未能藝合歡求解憂之力餌陟釐明攻冷之徵悲少歌於趙壹喜長嘯於孫登萬古騷人遠追乎橘浦百金䱷事近出於松陵非慕偷桃還憐嗜芰何慙尺蠖之屈未損丈夫之志投簪隱几聊思夷甫談元搦札彈毫恥效文通奏記夫靜者躁之君名者實之賓進不參於多士退宜追乎逸人頌厥土之三壤託高風於四鄰纔袪燥濕稍遠囂塵以日繫時且復窮於魯史穿池種樹正欲類於齊民室乏崇壇墉非縮板因坎窞以為洫藉蒙籠而表限孟戒無是非之心阮通能青白之眼龜牀鹿幘訝招隱兮何遲橡飯菁羹笑謀生之太簡是知名安可釣筆不堪耕有白鳳之才乃先為贅客有雕龍之辯然後為狂生雄自投而幾死檷流慟而將行外嬖方施孟子虛陳乎仁義中讒既勝韓非徒恃其縱橫况復支離壹鬱尫陋謇吃才甚微而寡文體素羸而多疾陰鏗藥銚披曉幌以皆來徐邈酒鐺擁寒爐而必出自然忘物我混窮通將大宗師理叶與握真宰情同優游塞馬脫落冥鴻竊慕王晞眷戀於良辰美景深符謝眺留連於明月清風得不分碕岸而飾荒臺輟金錢而營佳樹蓴絲兮欲縈千里草帶兮初圍十步頺垣抱碧無非海髮山衣暗座飄香盡是松肪桂蠹加以籬邊種菊堂後生萱覆井之新桐乍引臨窗之舊竹猶存花妨過帽柳礙移門鹿去而雲遮絕洞樵歸而水遶孤村遇境逍遙就魚鳥之性樂開襟散誕見羲皇之道尊早濯元泉屢遊庭苑憂廢學而將落懼無文而不遠豹管閒窺羊歧忘返搜束皙之亡缺補陳農之遺遯梁世祖府充名畫或得奇蹤任敬子家聚㣥書率多異本何嘗髣髴莫究分毫徒羡玉杯珠柱之號美象格犀簪之態高寧容朴野不稱蓬蒿悵殘編之未構奚雅具之為勞况乎棲平蕪古木之地壯被褐擁篇之事宜其梓合巾箱藤交餅笥炊秕稗以為食剖瓠匏而作器荷蓧而行據梧而睡妖寧勝德休占賈誼承塵醉可全真但舞王戎如意其間豁爾此外蕭然姜肱則惟臥一被江革則還留半氊望夫子之門墻仍過數仞顧先生之履韤不啻雙穿敢驚時而獨行聊內視而返聽豈可浪發元關虛搖譚柄夜將半而誰容月每旦而誰評清言不屈孫劉詎減於中軍善講無窮支許那輕於小令或抽易軸或扣元端演精微於簡易消澹泊於危難澄如止水畟若長竿與牛心者赴敵持塵尾者登壇交衡而矛戟初利頓挫而風霜正寒興公雅韻仲祖旁觀始信何才當指地於丞相方知習捷抗彌天之道安彼濩落而無容且蕭條而高寄兼耳目以咸外曷邱園之足賁幸春物之向榮列天姿而見遺陰者負而陽者勝孰謂兩儀瘠者緩而腴者先奚云一氣真宰難問洪鈞肯留人間未適象表何求縱使陶煙霞而傲睨騎日月以嬉遊乘剛直上攝景冥搜縱橫兮四海飛揚兮十洲讀仙苑之琅書安能解慍傾洛公之金醴幾得消憂不假大招寧馳別國悲故鄉之何在望平原之無極陸鄉在平原乃遠祖所封之地歎鐘鼎之沉光向漁樵而騁力庚桑有道猶居畏壘之顛接輿佯狂亦取杶櫨之食徐誇下舍陶愛吾廬上法於陵之畦圃旁分建業之村墟時牽殗歹自把渠疏友乏惠施莫解連環之義醫無文摯誰知方寸之虛存其道而或通失其居而久旅才將命兮分坎窞性與時兮甘齟齬閒遊廣澤願學弋於蒲且終蹈滄溟更移家於苧嶼夫動以勞吾身靜以休吾神苟能推其用舍自足究乎天人思任誕於窮簷何辭井臼不求容於側徑何患荊榛沉冥者朴素之源毀譽者浮華之轍蓍名聚雪仍招死草之譏琴號落霞尚被枯桐之說值聖則幽贊成功逢賢則雅音攸發同於德者大亦宜然殷宗命相於巖下周武迎師於渭邊有東山北郭之風纔能養素無左車右侯之計未足圖全嗟浩歎而長吟畏蘭凋而蕙歇清樽方灩於瑤水寶瑟坐凝於華月歸田少接猶疑斥鷃追飛羽獵相逢可謂無鹽唐突荀卿子有蠶賦楊泉亦為之皆言蠶有功於世不斥其禍於民也余激而賦之極言其不可能無意乎詩人碩鼠之剌於是乎在古民之衣或羽或皮無得無喪其游熙熙藝麻緝纑官初喜窺十奪四五民心乃離逮蠶之生繭厚絲美機杼經緯龍鸞葩卉官涎益饞盡取後已嗚呼既豢而烹蠶實病此伐桑滅蠶民不凍死桮可延年簾能照夜直為絕代之物以速連城之價爾材雖足重質實無妍徒親翰墨謾費雕鑴到處而人爭閣筆相逢而竟欲投篇若遇左太冲猶置門庭之下如逢陸內史先焚章句之前寶跗非鄰金匣不敵真堪諫諍之士雅稱元靈之客謝守邊城雨細題處堪稱陶公嶺畔雲多吟中合惜或若君王有命璽素爭新則以火齊水晶之飾龍膏象齒之珍窺臨舊牘襞染生春衞夫人悶弄彩毫思量不到班婕妤笑提丹筆眄睞無因若自蕺山如當榧几則叨居談柄之列辱在文房之裏誠非刻畫幾受譴於纖兒終假磨礲幸見容於夫子可以資雪唱可以助風騷莫比巾箱之貴堪齊鐵硯之高吟洞庭之波秋聲敢散賦瑤池之月皓色可逃若有白馬潛心雕龍在口鉤羅不下於三篋裁翦無慙於八斗零陵石化肯後於雙飛元晏書成願齊於不朽辱示近年作者論文書二篇使僕是非得失於其間僕性雖極頑冥亦知惴息汗下見言互訶之甚難招怨患之甚易也况僕少不攻文章止讀古聖人書誦其言思其道而未得者也每涵咀義味獨坐日昃案上有一杯藜羹如五鼎七牢饋於左右加之以撞金石萬羽籥也未嘗干有司對問希品第未嘗歷王公丐貸飾車馬故無用文處江湖間不過美泉石則記之聳節概則傳之觸離會則序之值巾壘則銘之簡散誕放無所諱避又安知文之是歟非歟生過聽德我太甚苟嘿嘿不應非朋友切切偲偲之義也故扶病把筆一二論之曰我自小讀六經孟軻楊雄之書頗有熟者求文之旨走耳乚規矩無出於此及子史則曰子近經經語古而微史近書書語直而淺所言子近經近何經史近書近何書書則記言之史也史近春秋春秋則記事之史也六籍中獨詩書易象與魯春秋經聖人之手耳禮樂二記雖載聖人之法近出二戴未能通一純實故時有齟齬不安者葢漢代諸儒爭撰而獻之求購金耳記言記事參錯前後曰經曰史未可定其體也按經解則悉謂之經區而別之則詩易為經書與春秋實史耳學者不當渾而言之且經解之篇句名出於戴聖耳王輔嗣因之以易為經杜元凱因之以春秋為經孔子曰學詩乎學禮乎易之為書也原始要終知我以春秋罪我以春秋未嘗稱經稱經非聖人之旨也葢出於周公諡法經緯天地曰文故也有經書必有緯書聖人既作經亦當作緯譬猶織也經而不緯可成幅乎緯者且非聖人之書則經亦後人強名之耳非聖人之旨明矣苟以六籍謂之經習而稱之可也指司馬遷班固之書謂之史何不思之甚乎六籍之內有經有史何必下及子長孟堅然後謂之史乎孔子曰吾猶及史之闕文也又曰質勝文則野文勝質則史又曰董狐古之良史也此則筆之曲直體之是非聖人悉論而辨之矣豈須班馬而後言史哉以詩易為經以書春秋為史足矣無待於外也謂經語古而皆微則易曰履霜堅冰至初筮告再三凟凟則不告苦節不可貞之類果純古而微乎謂史語直而淺則春秋書考仲子之宮初獻六羽及齊師戰於乾時我師敗績辛巳有事於太廟仲子遂卒於陲壬午猶繹萬入去籥之類果純直而淺乎經不純微史不純淺又可見也言文之不可立論則曰春秋不當言無使滋蔓又曰春秋舉軍旅會盟豈非叙事耶引左氏傳語徵左氏叙事悉謂之春秋可乎春秋大典也舉凡例而裦貶之非周公之法所及者酌在夫子之心故游夏不能措一詞若區區於叙事則魯國之史官耳孰謂之春秋哉前所謂自小讀六經頗有熟者求文之旨走耳乚規矩不出於此妄矣又一篇曰某文也某辭也文既與辭異是文優而辭劣耳易之翼曰繫辭繫辭曰齊小大者存乎卦辨吉凶者存乎辭故卦有小大辭有險易又曰觀其彖辭則思過半矣易之辭非文耶書載帝庸作歌皐陶乃賡載歌又歌五子之歌皆辭也書之辭非文耶屬辭比事春秋教也春秋之辭非文耶禮有朝聘之辭娶夫人之辭樂有登歌薦之辭禮樂之辭非文耶法言曰往者楊墨塞路孟子辭而闢之廓如也孟軻之辭非文耶太元曰元之辭也沉以窮乎下浮以際乎上楊雄之辭非文耶是知文者辭之總辭者文之用天之將喪斯文也天之未喪斯文也不當稱辭吉人之辭寡躁人之辭多不當稱文文辭一也但所適者有宜耳何異塗云云哉又曰聲病之辭非文也夫聲成文謂之音五音克諧然後中律度故舜典曰詩言志歌永言聲依永律和聲聲之不和病也去其病則和和則動天地感鬼神反不得謂之文乎猶繪事組繡中有精觕耳太凡辭人之說不敢避墉垣援膚爪而自矜於堂奧心府也要在引學者當知是事以明之而已矣師道不行後生多泥於所習有陷而溺者力能援之可也如或不同請觀過而後罰天地萬物雜然而生聖人居其中強為之命稱或以義或以形或因其自然天地取其義者也日月取其形者也鳥獸因其自然者也人既列氏賜族矣得不務佳名而紀之葢取嬰兒三月目能眴與人喜笑相答因以名分之以入生人之籍貴賤一也故傳曰子生三月之末擇吉日翦髮為鬌妻以子見於父執子之手咳而名之夫告宰曰某年某日生宰告閭史書為二其一藏於閭府其一獻於州伯州伯命藏諸州府諸侯世子則名而告之廟為宗主也天子則告於郊見於天明當繼父承天也二十而冠冠而字之表其成人也所謂名以立身字以表德也申繻曰名有五有信有義有象有假有類以名生為信若魯公子有以德命為義若文昌武發以類命為象若孔子首象尼某取於物為假若伯魚名鯉取於父為類若子同與父同生日不以國不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故也三代之時至殷尚質直以生日名之太甲太乙武丁是也周以伯仲次之太伯仲雍叔達季歷是也自周以降隨事而名之至有黑臋黑肱之鄙羊肩狐毛之異負芻之賤禦寇之強杵臼籧篨矒頑狂狡無知無忌不壽不臣皆名不正而言不順也魯叔孫莊叔之敗狄也以虺豹名其子晉穆姜以條之役生太子命之曰仇其弟生又以千畝之戰命之曰成師師服曰異哉君之名子也始兆亂矣漢靈帝名二子曰史侯董侯既立為帝矣後皆退之為諸侯之應也如此吉凶悔吝於是乎皆在古人生而名之長而行之尚存其樸也末世浮偽日生幼雖行於閨門長不達於州里故又有官名小名之別苟不因事而載之則幼之名沒然不聞於後矣彼吉凶悔吝何從而知之今自秦漢以來編而紀之至於神仙玉女之名婦人臧獲之字亦無棄焉及名涉怪奇近於圖讖者亦附於內謂之小名錄夫近者詳遠者略勢使然也其間遺落請俟博聞藂書者藂脞之書也藂脞猶細碎也細而不遺大可知其所容矣乾符六年春臥於笠澤之濱敗屋數間葢蠧書十餘篋伯男兒纔三尺許長石為齒猶未徧教以藥劑象梧子大小外研墨泚筆供紙札而已體中不堪羸耗時亦隱几強坐內壹鬱則外揚為聲音歌詩賦頌銘記傳叙往往雜發不類不次渾而載之得稱為藂書自當諼憂之一物非敢露世家耳目故凡所諱其中畧無避焉龜蒙讀揚雄所為書知太元準易法言準論語晚得文中子王先生中說又知其書與法言相類道之始塞而終通子雲軌範不足當也何者子雲仕於西漢末屬莽賢用事時皆進符命取寵雄獨默默以窮愁著書病不得免人希至其門止一侯巴從之受太元法言而已文中子生於隋代知聖人之道不行歸河汾間修先王之業九年而功就謂之王氏六經門徒弟子有若鉅鹿魏公清河房公京兆杜公代郡李公咸北面稱師受王佐之道隋亡文中子沒門人歸於唐盡發文中子所授之道左右其理太宗每歎曰魏徵教我功業如此恨不使封德彞見之逮今十八聖舉其君必曰太宗舉其相必曰房魏上下之心恥不及貞觀則生人受賜足矣豈非文中子之道始塞而終通乎丈人文中子外諸孫也誦文中子之書不絕於口率弟兄耕稼以自給一旦訪龜蒙曰吳中兵荒來人不足犬豕之食安能遂民藏耶吾從子相天下矣吾西而見之龜蒙曰丈人外族之門人實作良輔今復家有丞相必以房魏之道致君中興是內外有德於四海也此行徒東歸乎昔丞相未升甲科時年纔出弱冠龜蒙幸得參遊中以兄事之許與膠固形於詠歌及丞相為朝鉅儒居侍從之列龜蒙江湖邊叟病不能起一耒而耕一船而漁有文三十編有書數千幖未嘗干東諸侯故沒沒然無一人道著名字今丞相方築太平之基架㣥材立清廟丈人承間宴語幽仄試丞相意復念以小杜城北秋霖聲高中夜對榻有苦吟生耶因丈人之行叙房魏得王佐之道丞相追貞觀之風小子復言曩日之分雜而書之用以為送侯生嘗舉進士名彤作七言詩甚有態度不見十年自云再貢於有司藝不中度輙得黜齟齬不與世合去入老子法中作道士更名雲多居太白山在雍西南梁州之地苦寒霜雪恒積雖夏五六月赫日在上㣥峯若焚我獨皓然玉竦巖壁澗壑之木不數百年不能為材及其堅良又不與他等民乘是氣皆壽而不衰况養生者耶吾今南遊天台既將復而老焉余曰夫物命乎天者人不能有存乎人者天不能奪推其氣則謂之一考其命則有懸絕不類者焉居恒寒之地而不夭者吾不信也居恒燠之地而不壽者吾不信也信其命乎天者人不能有而已矣傳曰仁者壽則恒寒之地不仁者夭而死矣恒燠之地仁者壽而生矣苟恒寒之地壽其不仁者恒燠之地天其仁者是寒燠為不祥之氣又何以佐天地之生植乎哉如此則居寒而壽居燠而天吾益不信也信其存乎人者天不能奪而已矣或曰仁者壽不仁者亦壽不仁者天仁者亦夭吾又不知命乎天存乎人果可信乎未也無乃自壽自夭自仁自不仁耶天不能與之又安能奪耶信矣子姑務乎仁無以山寒自欺則吾亦信子之壽矣小雞山在震澤西出吳胥門背朝日行四十里得野步市曰光福光福西五里得土山山土多石寡無大林木率生小櫟樸木敇皆薪材直吳之爨此為助焉連延廣袤不一其主為書畫界疆以相授自冡至麓凡二百弓東北倍高而加半焉余所置多少如此余家大小之口二十月費米十斛飯成理魚蓛輩十斛薪然後巳四時賓祭沐浴澣濯疾病湯藥糜粥在外歲入五千束足矣其掌而供事者曰顧及小鷄之樵甿也乾符六年春弗雨夏支流將絕八月暴雨而巨艑可實而行之矣九月朔方置薪二百五十於門召而責之曰吾一夏來撤敗屋拔庭草以炊雨之明日望雨來矣何數廉而至晚得非赭吾山而為汝之利耶老而欺如名惡何及笑曰吾年餘八十矣元和中嘗從吏部遊京師人言國家用兵帑金窖粟不足用當時江南之賦已重矣迨今盈六十年賦數倍於前不足之聲聞於天下得非專地者之欺甚乎吾有丈夫子五人諸孫亦有丁壯者自盜興以來百役皆在亡無所容又水旱更害吾稼未即死不忍見兒孫寒餒之色雖盡售小鷄之木不足以濡吾家况一二買名為偷乎今子一煬竈不給而責吾之深吾將欲移其責於天下之守則吾死不恨矣余歎之曰汝之言信也然不當發於余汝姑歸與之酒繼之以歌云長其舩兮利其斧輸予薪兮勿予侮田予登兮穀予庾突晨煙兮蓬縷縷窗有明兮編有古飽而安兮惟編是伍時不用兮吾無汝撫
