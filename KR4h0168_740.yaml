front:
  text: 全唐文欽定全唐文卷七百四十庾懿宗時人
  hash: sha256:f23da6595026ea41c59b9f68d34d62ea40943973390022b61bcbb8d890ec99b3
  markers:
  - {type: head, offset: 13, content: 李庾, id: KR4h0168_NFKB_740-h1, level: 1}
body:
  text: 臣伏見漢諸儒若班固張衡者皆賦都邑盛稱漢隆當王道升平火德丕赫數子歌詠發著後代今自隋室遷都而我宅焉廣狹榮陋與漢殊狀言時則有六姓千齡之變言地則非秦基周室之故宜乎稱漢於彼述我於此臣幸生聖時天下休樂雖未及固衡之位敢效臯陶奚斯庶幾之誠謹冒死再拜獻兩都賦凡若干言以詘夸漢者昭聞我十四聖之制度請付史氏賦曰洛汭先生客於上京問里人以秦漢咸陽故事里人曰先生不習乎哉秦址薪矣漢址蕪矣西去一舍鞠為墟矣代遠時移作新都矣先生曰賓者不識藐然老沉懵歲亡而日遠願聞古而知今為我源說恭承玉音里人曰昔者帝兆唐居命隋先基乃假隋權是開中原既權二年為唐遷都周榛秦莽平蕪枿餘文驅煬逆卒於侑傳若天使項氏死勞而授漢休也唐開禪壇新都之門闢殿乾宮以朝諸侯時則有若房魏作弻英鄂執律南陽故人河間帝室戎衣既脫瑞氣洋溢歡聲傳於億兆煬燎致乎太一乃會漢酺發周賚謐萬類渟四海遂開國以報功差子男之五等然後構閣圖形榮號凌煙指河帶以山礪書天子之縉紳其制度也擁乾體正坤儀平兩曜據北辰斥咸陽而會龍首右社稷而左宗廟宣達周衢址以十二棊張府寺局以百吏環以文昌二十四署六部提統按星分度儼憲臺而西列肅陰館於北戶建倍員於前王總維綱於御史端國家之朝儀實周察乎左右其內則有太極承端通址含元日出東榮月沉西軒倚九嵏之下麓涵太液之清瀾龍道雙回鳳門五開烟籠凝碧風靜蓬萊東則左閣當辰延英耽耽宣徽洞達溫室隅南接以重離帛丿糸乎少陽是為二宮復道邃廊西則月華重啓銀臺內向中書在焉密用宰相宦者別省延緣右藏建子亭於屏外設蘭錡於廡下天子端朝明庭九賓發少府之冕旒陳奉常之書勳肅勾陳以辟護翼雉扇而對分雞人乃下鶴唱先聞千官就日萬品趨雲漏遲遲而東轉風習習而南薰外則國子招徒疏館開軒左立太學前惇廣文膳豐中廚就教九年稽以博士總之成均祕書典籍品命校郎橫閣三重闡正鉛黃若六藝之條貫百氏之縱橫交錯發論禮形而樂聲太傅在前少傅在後載言載筆出納謨誥鵷動鸞飛振玉鏘金殷廟羞瑚璉之器楚材慚梓之林已而燮和陰陽經緯天地採托軒昊牢籠虞夏闢孔子之學堂敷一代之風雅此王者之文教也親兵百萬制以神策紫身豹首金腰火額獵霞張斾剝犀綴革奮目而虎眥振髯而蝟磔柔六鈞貫七札對天仗以司戈分玉墀而執㦸別有陳旌賜鉞閫外四七依榆關以作鎮拒柳營而開壁逐虜則出塞飛塵伐叛則救暘作澤此王者之武威也唐禮既行三代同風徵叔孫之春官命伯夷之秩宗則有封禪巡狩謁天拜祖明堂辟雍王者之事有司勿失次有朝廷之位班爵之序器服車馬以節文武不僭不濫㣥臣之事有司以告下有內族外姻以殺以隆五禮各殊陳吉儀凶一室是形天下大同百姓之事有司以教故以內則敬以外則嚴以家則肥以國則昌卿士翼翼公侯皇皇在野熙熙在朝蹌蹌夫如是夸周而正魯胡可殫詳洎乎樂之設也以德配樂陳器以作革木匏竹簨簴磬鏄命官二署諧以協律以奏廟貌祖考來格以陳宮庭簫韶九成鳳凰來儀以布天下手之舞之足之蹈之及乎御允衣集舞童或獻凱作銘以宣帝功或布字綴行以達皇風此禮經之所未紀夔戛之所不同刑期無刑辟以止辟三章置漢祖之德肆赦緩穆王之法於是天子御端門詔天下渙汗發澤與民更始建金雞於仗內聳修竿而揭起其下則稅三關解銀鐺追其工徙歡兜煦舜絃浹堯年臺收白簡史閣丹筆總秋官之計料不踰乎三十斥匡衡之失論罪溫舒之不足司刑無鬼哭之庭大理有烏巢之獄又若薦祖建宮元元之庭霞帔雲冠飄飄太清天子將有事也歲豆時籩夏簋殷鉶傳金爐之御煙開甲帳之琳琅此王者之示孝也對里連街帝宅王家青門列檻棠棣分華勤政外名花萼中題屹雲中而佩鳳杳天外而舒霓於是天子設千席羞百醴家人齒筵愈愈濟濟此王者之示悌也盛則長隄砥平錯則纓辨繁夥佩印分魚九參六佐肅威儀於行蓋指戒途於前馬待漏未開朝騎沓街雞鳴朱邸火度青槐先導擘雲後車奮雷遞以嚴聲不生微埃人寒物栗統以京尹臨人秉殺罔敢不謹豪家戚里金張許史走騎如龍行車若水拉枯請命曾不仰視配前秦與後趙固異代而殊擬其地勢也負秦章臺倚漢甘泉帶涇渭之富流挾終南之壽山指重城於二華拓外門於兩關元素交川灞滻在焉斷虹偃蹇而亘梁拖輪走驟而蹄奔度萬國以向朝趨魏闕之通門赤縣統劇停阡帝鄉長安萬年乾封明堂藍田左掎鄠杜前張分圻連乎馮翊畫疆接乎岐陽排吳山而抵蜀亘氐谷而通商天子穆清環衛陳兵將軍之號三番六營至乃辨曉警昏主在金吾鼓列六條外傳通衢備以嚴兵羅以周廬禁動息人用戒不虞其中則御水分溝昆明下流在野決溉入宮環洲菰織蒲紉芡贄菱羞渚戲元鷁沙眠白鷗其遠也深有蛟潭泒作龍湫涘接河漢波通女牛其近也方塘含春曲沼澄秋戶閉煙浦家藏畫舟爾乃農家東作厥土黃壤樹以桑柘翳薈乎南畝以粳以稌以黍以稷以輸太倉天子之儲土厚地中溫寒以宜門多杖老室有蕃兒承化發謠帝力不知則有程鄭之家白闥朱軒崇基峻砌待駟高門木秀茸葩紅舒緑繁挺碩果於華林育豐蔬於中園珠箔晝晴金缸夜明羅繡巾㡚鼓瑟吹笙譁族陳賓以樂乎太平貨隧分廛物次駢連中署肆師夕咽朝昏越璞楚琛蜀賄巴賨裁綺張繡紋軸蕉筒聲教之所被車書之所通交錯雜沓斯焉會同黃宅緇廬金篆玉扃以張帝居用壯天庭千形萬聲不可多名天子奉堯舜之道勤后稷之功當仲夏而獻繭立中和而視農然後黼黻時備粢盛告豐其接下情也則堯鼓不懸晉木不列鎔金作軌四門是揭人靡迷邦士無諱訐示收才而問眚上諫行而寃達當其萬國貢珍四夷納賮賦用舟通財因輦進地官計國度支主吝百姓既足斯焉充牣復若天府萬品以備供職登饌則光祿獻廚命駕則太僕承軾其樂人也大啓九門分開三殿齒㣥臣於次坐徵公族於內宴於以訓恭儉於以示慈惠戲族咸在百弄迭改視仙童之霓裳覩壯夫之角抵御階晝陰帝座春深繽紛宦闥窈窕嬪林既受賜於逮昏盡拜帛而懷金與衆之樂一日於此先生獨不習乎其四郊也或有乘時之舊址亡國之遺蹤天子迎四氣衋然改容曰是足以懷傷於耳目作戒於心胸昔秦政肆刑秦民共傾楚澤大呼分隳列城徒罷驪山役休上林秦址既遷鴻門至今此東郊之事也隋苑廣袤罝籠南山占地萬頃不為人間齊門失耕禽遊獸閒代謝物移繚垣不完此南郊之事也豐水悠悠文王作周傳難子孫衰平遂遷乃眷鎬都武王宅居國失赧遜酆鎬乃蕪此西郊之事也漢設五畤以主淫祀欒誑徐誣將求永久天子親拜太牢黍牲事亡地存為天下笑此北郊之事也故因迎春則鑑秦敗知恃刑不如恃德也因迎夏則鑑隋怠知獵獸不如獵賢也因迎秋則鑑周勤知祖基作艱傳萬年也因迎冬則鑑漢誤知去淫即正獲天祚也四鑑以陳澤於生人四德以懋格於上下故我高祖一呼大定安都居正傳今皇帝一十四聖是知禪國也禪都也非得隋之命是得天之命先生曰富哉言乎堯舜之事吾知之矣然天地旁魄奧區不一九衢六陌亦稱河洛始乎周卜今日隋革進八百里作唐東宅成者居者余得其故用悉聞見丕我王度子不識乎顛煬僨華中原毒痡順天應人文皇赫圖王充不來建德相依阻我東人不蘇義旗高祖西安文皇舞干一挂戎衣邦人保完彭城獻級東功乃立則創業之事不獨於西也高祖至天后朝匪伊是居於焉逍遙明帝大同出震開宮恩波爾鄉泄源於東則太平之事不獨於鎬也若乃用洛為池帶河為沼洞八門之會要控二梁之天矯在隋之始移劃前規之隘侈舊制之陋指半舍而新布乃集工而成就重城不居萬盜齊構訖大業於義寧廓皇家而遜授既而天踵以正地産以實禎符所紀嘉名不一表賢則河水變清瑞聖則洛圖屢出帝功既成封禪禮行顯祖光宗勒岱而祈嵩我甸我郊三聖之靈壇在焉赤縣神州與京比儔徑山東之貢賦扼關外之諸侯直齊梁而駕輅引淮汴而通舟太行枕甸發址崇垓覃懷鎮封上干昭回鑿門導伊兩阜屏開育仁頤智堂奧庭隈爾其左掖通東右掖洞西籠故地之銅駝抱舊里之玉雞御溝接泒苑樹通隄抗鳳樓於內庭矗端門於天街上陽別宮丹粉多狀鴛瓦鱗翠虹梁疊壯橫延百堵高量十丈出地標圖臨流寫障霄倚霞連屹屹言言翼太和而聳觀側賓曜而疏軒若蓬萊之真侶瀛洲之列仙鸞駕鶴車往來於中天嚴城曉啓千門萬戶建衛對營開扃接牖翠華在鎬分官以守監署惟三卿曹亦九臺閣高閌支馭東方仍俾二官別持憲綱赫若夏日凜如秋霜威動乎甌閩之國風行乎燕薊之鄉郊圻作固屯兵孟津千里無煙萬夫狺狺實兼武牢以食濟溫惟是咽喉屬於將軍禮樂所流厥惟舊周追魯俗而為鄰化殷頑而作柔異材挺擢多士優游原膴膴而耕溺水濺濺而洗由士得天爵孝稱行原身行大節里有旌門以繼前修以垂後昆榮一時之史籍聳當代之人倫兄友弟恭位皆崇榮石記標衢棣萼為名螭首龜趺嶷峙雙形指兩馮而遠邁對二陸而遐征至若里巷之新名閭閻之近革或區區於傅說或瑣瑣於典冊非警戒於將來何侈言之敢作且二誥尚存始卜惟艱四姓所都季年乃遷或得於聞或得於傳幸子弗譁試為子發乎齒牙里人曰諾先生曰郟鄏之地中居帝域賢相聖營龜符墨食成王定鼎以休姬德三十承孫八百祚年祖功寖微衰平乃遷幽用婦烽諸侯疾怨夷元敬朔太史不頒百派分波爭涸其源汜水而鄭陽翟而韓晉盟河陽秦戍新安一旅之兵一成之土嬴氏乘之不享文武此周之失都也南陽真人復運漢基舊邦惟新上稱康時光武而釀明醴和醨冲質不長桓靈自縱后戚立權內官分弄四星耀斗百桷摧棟陽弱陰強劉輕曹重此後漢之失都也魏丕徙許促齡四十疆臣執柄三嗣徒立政由氏王髦莫奮瓦解土崩炎居奐遜此魏之失都也晉始三世亂興永嘉蕭牆構兵沈閼稱戈浩浩逆流天下墊波八王既分五馬南奔左袵之裘乃來中原此西晉之失都也故權在諸侯則姬氏平權在內官則漢室傾權在強臣則魏狃權在親戚則晉走是四者各以其故權與勢移運隨鼎去從古如斯謂之何如世治則都世亂則墟時清則優偃政弊則戚居勿謂往代試言前載開元太平海波不驚乃駕神都東人誇榮時則轔轔其車殷殷其徒行者不齎衣食委衢冠冕之夫綺羅之婦百室連歌千筵接舞高樓大觀陳賓宴侶金堂玉戶絲哇管語我道如堯我稅如貉貧庾而稻賤笥而裼比屋相視恥衣空帛開場分肆不列牟麥同軌同文晝呼夜歡父懌子愈去徑即盤既兆既億動動植植無聲之樂薰然不息稽成康之周隆考文景之漢休榷代繫時不為彼優我俗既饒我人既驕安不思危逸而忘勞故天寶之季漁陽兵起逆旗南指我無堅壘匝甸鼙動衝天羯腥門開麗景殿據武城殺人如刈焚廬若剃蜀駕先移允師後誓傷四年之委燼奮二將以建勳天落妖彗風摧陳雲及夫掃臺榭之灰收京野之骨徵郡國之版在驗地官之籍列太平之人已十無七八至德復興六紀於茲七聖儲休平癰補痍故含識之士女植髮之童兒皆能痛其喪亂而期我康時今四方之事叟不知也惟洛泱泱濱盈萬室惟城職職市廛駢集比年大有稍藏以實都人嬉賀有笑無栗咸曰將睹乎貞觀之風開元之日鄉里之人思萬乘之威儀幸物阜而時和指康衢而引領作望幸之賡歌歌曰曉雲行兮西風慶搖裔兮龍在中望雲光兮拜千百西澤霈兮均東澤里人曰誠哉是言前年日南至天子謁太清宮太廟郊天祀地既畢事執謙端珽謂公卿大夫曰豫在人上歷祀三四年穀比登未極於富人庶稍蕃未臻於壽動植小遂猶有枯夭日月所至猶照叛土戎狄雖貢西地猶虜今行大禮得不愧望於天而獻羞於祖是尚以聖政為憂未意於行幸也先生曰大哉為君用是言也埋是事也則千里如郊萬里如圻在西而東均處內而外肥吾歸息鄉里之謠安堯舜之時將齊驅於壽域何近喜而遠悲則知鑒四姓之覆轍嗣重葉之休烈用是言也理是事也即所都者在東在西可也寬夫贈工部尚書伯芻子寶應中為監察御史轉左補闕郡府之有録事參軍猶文昌之有左右轄南臺之有大夫中丞也糾正邪慝提條舉目俾六聯承式屬邑知方致上闕於坐嘯舉綱維之未振俾側者不敢挾其側姦者不敢萌其姦法令修明典章不紊此其任也大梁當天下之要總舟車之繁控河朔之咽喉通淮湖之運漕丞相治所鵷鷺成列地闢土沃兵多甲堅人尚矜豪氣率驕蹇有梁園兔苑之遺事當四會五達之通莊雜燕趙悲歌之人邇吳楚剽輕之俗為吏之道不倫他邦滔滔來往齗齗阡陌任剛毅則失於突犯守謙卑則病於委隨剛則害身隨則弛法貞元以來戎帥自擅威令已出無復國章隄防不完徽纆蕩失調補斯任者但疊跡斂手以脫禍為心何有意於勾稽而敢思其職業者哉太和二年琅琊郡葛公元方由天長令而蒞焉至則以為當今聖上務治丞相鎮靜以至清肅㣥下以至公奉朝廷凡所建啓惟道是適苟踵弊於斯日不分畫於茲辰則緣姦積蠹無時而去於是端誠守職以正束邪以儉慎律同僚以直方吹屬邑綽綽自立職分隨來故得上下叶和遠近修整法有刊定之制軍無侵漁之患人存政舉其在於斯游刃恢恢肯綮無滯主畫諾而克勝其任司準繩而無忝厥官從容其間進退不苟其唯葛君乎元和中憲宗皇帝勵進理道注意法律特設科以招士欲問明廷後詔有司核其妍否先君僕射公時為司績外郎實專斯寄絶因緣之舉以公其為先於數十人中得君充詔故君之行實敢不詳知夫公署有記其來自遠燦名氏於屋壁示成敗於將來俾善惡克彰韋絃斯在此蓋春秋之旨也豈可闕哉葛君以余從事斯文叨官倚相見託論撰無愧直書太和三年記朝廷以新平扼東西夏鎖鑰郊圻將帥得人則虜馬不敢東嚮而牧今上注意邊事元年命左僕射河東柳公專護塞之任公祇承詔旨不敢怠遑覽風俗以施化酌損益以制宜文武交修威和迭用搜刓蠹於積弊張綱維於盡隳完兵甲齎軍糧樂瘡痍粒饑餓以信為囿築法為垣人知嚮方卒乘輯睦我潔巳而貪冒自革我不動而云為曷生表正形端俗為丕變邠之父老重沐皇風仲尼每言為政之道可使三年有成公孫宏對漢武且云臣宏尚竊遲之始為孟浪今於河東公信之矣既而定名分補廢闕飾賓署宏講宴視使院之狹湫顧會食之無所因喟然而歎曰夫為政之本在於得人燕以尊賢是稱衛以多士為美今鰌瑗在列而堂館未嚴非所以重樽俎咨帷幄之意也因是從觀馬之舊亭敞公府之新宇增階陛所以示尊威也卜高明所以啓顧慮也大不踰制崇不近奢榱桷礎闥無不中度翼張四簷洞開雙扉冬霜不到夏日潛却可以備盤餐之品式可以叙主客之威儀可以寄琴樽之笑傲可以籌政令之得失君子是知河東公之為政也必自邇而逮遠自身而及物以理易亂以實易虛以宏深易卑圯以廣壯易隘陋皆此類也府中僚介無非正人有若司馬韋君節度判官皇甫君皆卿材也無面從退言之誚無躬厚薄責之嫌其他或幄中號寶或席上稱珍並擅價一時不可遍舉韋君皇甫君以余載筆赤墀粗知舊史可以傳言命為記之時太和二年六月日記竹記左史院邇宸居之正地直日華之東偏俗塵不飛人意自遠閟邃幽閴似非官曹有竹一叢翠接階所其虛中潔外之操蔭座袪煩之能紫微郎高公嘗賦之固以備盡然而歲月滋久蔓衍浸淫大小相依高下叢茂俾日光不透陰氣常凝暝色為之早來陽春為之減煦四序不正一庭常昏蚊虻曹飛雀鷃自遂披圖散帙觀覽不快二年冬侍軒之暇載筆之餘偶步庭除病其蔽翳因命斤斧將治其蕪沉吟即時乃用申誡且謂其徒曰礪爾器用端爾瞻視謹爾操執慎爾區分有其質微而葉環苯䔿者去之從風而不能自正者去之大而倚者去之聚而曲者去之竅而不能備笙簧之用者去之挺而不能棲鸞鳳者去之其有㣥居不亂獨立自持振風發屋不為之傾大旱乾物不為之瘁堅可以配松柏徑可以淩雪霜密可以泊晴煙疏可以漏宵月嬋娟可玩徑挺不回者爾其保之既而芟剪成功繁蕪立盡去者存者邪正乃分不浹旬扶疏一林歷歷可見有清風澡慮之效皎日明奸之機檀欒風生韻合宮徵君子是以知竹箭之美尚科別之功即其他不俟言而詳矣或以斯為小可以伸之因記一時之妙廣而述之元素寶歷三年官黃梅縣令溧水縣尋仙觀仙壇山道士宋文幹字上仙以大唐垂拱五年因山石自然形似修立仙壇三所洎長壽元年縣令王通字元覽在任清勤戶口增益因開三鄉遂以仙壇名鄉奉仙號里逮寶歷二年善政縣令岑仲休以德義當官仁威養俗百姓畏愛真如父母每施香油琢石為像夫修道者上消天災保鎮帝皇下禳毒害福潤兆生而道倍生元素竊刊元石貽厥來賢乃為銘曰無名道始有德仁基求仙因此為政由之崆峒葉縣導帝匡時童女三洞俱會無為無為久恆服食丹松神仙不死羽化飛空後來君子可躡高蹤潁敬宗時擢書判拔萃科西域遐方獻純精之天産申重寶之帝鄉豈不以至誠感而靈必自順惟德動而坤珍莫藏不然何有慕於中土而走無脛於外荒彼珠之靈積陰之魄稟金氣而堅固韞河潤之耀澤布指而大小無差洞物而纖毫不隔逈夜常滿初月每讓其圓明爽曙欲凝高星自掩其孤白信殊方所祕亦稀代難致奪夏璜以為美齊楚璧而積異將配天光以輔三助皇明而照四積石峰峻燉煌路遠馳輝於晦磧之中流晶於白日之晚將為表龍旗而綴鸞輅必將誇池臺而耀宮苑殊不知一作可以萬邦為慮一作憲者此獻則違以三德為寶者此寶則非價越千金我當俯念其十産光含徑寸吾將靜照於九圍乃遂沉泉而反璞俾其媚川而自輝且立德者惟儉之本作貢者亦土之任剖蚌而獻既不編於夏書為器成之尚有干於時禁苟奪山川之精魄是虧雨露之恩浸所以前代有訓不珍異物誇齊威者再論而皆慚求蘇則者一言而自屈豈若我全明德體大道照耀也不假隋侯之珍貞靜也自同罔象之寶由是化中國而及外夷如風之偃草之本不許國崇太學禮尚師儒教失其源人將安放學官懵夫古訓好是多方徒探儒行之辭俾從瓦合罔思潔矩之道不改松心雖百行殊途在來者之所擇而四教闡載何先師之不遵苟訓導以生常懼毀方之易性樂正禁之非禮亦有明徵胄子順以嚮方幸無迷復恆敬宗時擢書判拔萃科敬業服勤冀聞立身之本傳經作誡寧違從衆之規惟彼國庠典夫胄子以為公侯之允自伐淹中謂其禮樂之家難為人下故毀方瓦合承聖人之情使慕賢容衆臻儒者之旨正唯弟子可學何慮成均見非逢敬宗時人臣等聞王者之孝不可與士庶同萬幾不可以逡巡曠典策所載古今必然伏惟皇帝陛下出震纘圖體乾御極荷祖宗之丕烈啓運祚於雍熙自大故以來孝思罔極天地以之慘戚臣庶以之震駭而節文有變遺旨無違伏乞稍抑哀懷俯親庶政冀使生靈獲泰日月重明臣忝列台司謬參樞務無任懇悃之至臣某言伏以萬幾事繁不可久曠今則披瀝血誠乞親庶政聖情哀塞未允愚衷夙夜兢憂是再陳啓伏惟皇帝誕受欽明夙成睿哲道光王室運屬承天而孝感因心悲摧過毀一自國故殆逾半旬誠四海哀號如喪考妣而萬靈禺若未覩乾坤伏冀思繼體之大猷棄執哀之小節行帝王代天之法破曾閔匹夫之情特抑哀懷俯躬朝政宗廟之業永遂和寧社稷之靈知其允答况事非為已道本徇公仰惟聖慈俯塞㣥望臣等叨逢景運獲列樞衡昧死竭愚布露丹懇伏紙隕越庶垂天鑑臣伏奉大行皇帝知陛下至性自天恐陛下執哀過毀上惟九廟之重下念萬務之殷故遺詔丁寧俾遵舊典今百辟卿士禺然在庭瞻望清光巳七日矣固陳誠請猶未允從內外憂惶莫知所出臣聞大孝之本繼志為難酌禮之情尚中為貴是以哀迷期數哭泣有常俯而就之聖人所重知難繼也君子不為伏願少抑哀情仰遵禮命以副神祇之望以安億兆之心光祖業於無窮流德化於天下凡在臣子孰不悲戴不任哀懇誠切之至臣某等言伏以萬幾事重遺旨難違再獻表章上塵旒扆精誠徒竭天意未回內外遑遑人神企望臣聞王者之孝異於匹夫禮不相沿道資適變向承平之代故殷帝宅憂而不言遇有事之時則周王未葬而誓衆况今戎車猶駕邊候多虞兩河之寇盜雖除百姓之瘡痍未合亂者思理危者求安天下嗷嗷正在今日誠宜抑其至性以副㣥心成先帝之大功繼中興之盛業豈可寢苫啜泣庶政闕然九廟之靈何報萬方之望何塞臣等職參樞近誠切邦家若陛下未忍臨軒尚持前志臣等有死而已不敢奉詔不勝哀迫懇切之至臣聞樹之元后以牧蒸人猶日月之照臨不可以少曠如天地之覆育不可以暫虧故歷代明王取鑒於此必屈已以徇物遂抑哀而從宜期為彞章行於往古聖心哀迫未體至公㣥臣憂疑罔知所措伏惟皇帝陛下溫恭允塞邁德文明承二百年之丕圖當十三聖之大業生靈所屬負荷不輕豈宜直疑貌棘心蹈小節而自遂寶符神器委大計而未臨且萬幾事殷九有望切運當克構政在惟新禺禺蒼生日有所冀伏乞皇帝以安黎庶為念以保社稷為心對越上元克揚顧命俯從人願用答天休臣之慺慺實在於此况萬國將至七月非遙須務山陵以申孝敬在於營奉不可曠違抑有前規固無徇已伏惟特膺順變允叶情文抑至性而副㣥誠略小善而章大道則天下幸甚宇內和寧臣等生忝明時位當樞軸敬同㣥品重啓宸嚴悃愊之誠至於死請臣等昧死上表以陳備竭肝膈聖情超遠未蒙聽覽臣等中謝臣等謬膺燮贊猥奉恩私未回日月之光是負股肱之寄豈臣心不忠無能感寤今者萬幾之曠四海同憂禺禺衆心不安寢食以陛下聽政之期未克寸執喪之志尚堅臣等當伏閣叫閽殞身碎首所期宸鑒下察微誠不勝迫切之至臣等言今月日已後纍陳七表請御萬方忽蒙宣旨尚未聽許臣等驚怖不知所裁敢徵前言以奉萬一伏惟漢朝諸帝文稱明聖而著易月之典以為後代之法光武以降迄於我唐繼有睿哲之君不無明聖之主豈皆乏殷宗之孝豈盡無陛下之心但以所守者祖考之丕圖所臨者生靈之重事不敢徇其已以屈萬姓不欲申其志以蓋百王具在典謨莫得逾越况元和已前十一聖矣皆以孝理化於萬國迭承次守無議改縗大行皇帝恭承昌緒亦遵前訓當陛下舊規或墜忠言莫從遠棄漢文之風烈近乖先帝之遺躅獨徇一時之至性臣恐掩祖宗之舊儀不足以流範越大行之性度不足以揚名夫喪以敬為上哀亦次之著在禮經陛下之所鑑也伏惟以社稷為心以邦國為念以奉山陵為至敬以安社稷為至勤薄曾閔之非名纂堯舜之盛業副中外之丹款濟蒼生之血誠臣等慺慺不寧寢食况臣等備任宰衡時逢昌運答先朝之眷遇承陛下之文明伏乞俯察愚心允茲㣥望期於得請昧死上陳今樞務之目曠廢已久朝野心惑人祇望切安可盤桓更延時日伏乞更賜允許以慰上下億兆之誠立俟聖諭晷刻是望敦儒寶歷中官起居郎朝拜陵寢禮經無文列聖相沿久為故事就中四陵尤乖典禮請如太常所奏其二太子廟謹按禮記云殤於無後者從祖祔食又曰王不祭殤亡又曰有陰厭有陽厭陰謂嫡殤也注云為宗子之殤祭於奧爾雅云西南隅謂之奧此明幼殤而死故祭於祖廟陰暗之處也陽厭謂祭庶殤也疏云祭於宗子之家祖廟之內當室顯露之處故曰陽厭所以明嫡庶也過焉以往則不祭也伏以惠昭太子位登諸門專業當主鬯親則高祖神堯皇帝之宗子屬則於皇帝為伯祖父雖禮文於旁親無服而骨肉之恩不移於宗子若坎室於德宗皇帝廟內西南隅遷祔神主以特牲展祭不舉樂無折俎去元酒不告利成庶合古禮若准魏晉故事即晉愍懷太子殤太子哀太孫仲太孫皆於祖廟北墉置陰室歲時祔饗以至親盡今伏以國家變三代之典從東漢之制九廟既有周殿之隘一室難修處奧之儀况別廟陰室具為變禮依前享獻於事為宜其廟請不廢禮官或云惠昭太子棄東宮之日已過殤年若合祼享宜同祭臣以為古處於奧今祀於廟雖不以成人而別以合過殤之禮矣又或云若以成人合有主後臣以為惠昭太子裔嗣皆在宮中若未勝冠自宜抱奠文以同姓為尸者今但令宗正官屬主奠即雅符祀典矣其文敬太子生非繫本之重歿有追命之榮今於皇帝為曾叔祖非大功之親禮經為庶而服屬已遠列於常祀實為非經請依太常所奏又隱太子以下神主或纍朝嫡嗣或聖代名藩今其子孫皆居列土因緣食祿亦謂承家各令自列廟祧用申嚴配臣伏詳開元中敕諸贈太子有後者咸令自主其祭今請復行此制各使子孫奉迎神主歸祔私廟庶別子為祖符列國不祧之尊遠裔傳家聞聖王教孝之典其無後之廟及真順皇后神主即請依太常所奏其贈奉天皇帝贈承天皇帝神主既有常號禮不可黷蓋王者不享於下士諸侯不敢祖天子之義縱有主後法不當祭亦請依太常所奏亮官汴州刺史考秩已終言歸有日千里無代步之馬三月乏聚糧之資食惟半菽室如懸磬苦心清節從此可知不旌此人無以激勸無頗文宗朝宏文館學士氣之為毬合而成質俾騰躍而攸利在吹噓而取實盡心規矩初因方以致圓假手彌縫終使滿而不溢苟投足之有便知入門而無必時也廣場春霽寒食景妍交爭競逐馳突喧闐或略地以丸走乍淩空以月圓可轉之功混成之會雖無侶而是匹諒有皮之足貴傅毛非取奚資蔚矣之文實腹可嘉且養浩然之氣觀夫渾兮無覆瑰若有形方勞擊觸曾匪遑寧其升木也許子之瓢始挂其墜地也魏王之瓠斯零懼欲擠於溝壑將不出於戶庭智不待乎扃鎖妙乃存乎苞裹堅彊斯致雖吐納之在君蘊蓄為功信盈虛而自我念修完之是急如穿鑿之忘一作不可勿懷棄擲委質操持舍之則藏豈凝滯之興誚蘇而復上猶輕舉之可思彼跳丸之與蹴踘又何足以加之喜文宗朝為宏文館學士會昌時官左司員外郎海日赫赫出暘谷以騰輝過咸池而浴色宛轉波動回還影側昭晰兮泉源漸沸掩映兮津涯乍黑紅光下射疑萍實之欲沉赤氣上浮訝林雲之不息當其玉漏未盡金波正凝背崦嵫而六龍騁騖望穹蒼而三足飛騰經厚地而休光暫匿連巨浸而暖氣潛蒸當晷度之未至信輝赫之徒增洎夫良夜欲闌繁星漸沒轉紅輪於沙礫濯朱輝於溟渤映龍川之華洞照天壇而秀發遠岸燭耀而乍明長波蹙縮而未歇觀其蕩水府滌踆烏重輪輝煥而增潤雙翼翩翻而盡濡勢動雲端運規規而未止影搖波底潛赫赫而不渝逝矣莫及皎然可望照蜃樓於圻岸寫蛟室於溟漲由是發五色煥九圍歷渤澥而羲和整馭映島嶼而光耀傍飛碧浪沸騰罷浴貞明之質洪漣瀰漫難留畏愛之輝時也天地漸分雲霞屢改違細柳而已遠拂扶桑而猶在聊將出地辭潤澤於波瀾從此麗天布輝華於寰海既而逈出崟岑高懸萬尋杲杲而光無停晷炎炎而色欲流金始素波而將滌倏黃道而是臨信終古而不昧長曜景於天心魴寶歷時人惟帝世聖時必有符命在昔黃帝始受河圖而定王籙宓羲得神蓍而垂皇策堯配璇璣玉衡以齊七政舜繼成六德文王獲赤雀丹書而演道定謨豫亦以謂禹探鬼申穴得開世之符而成厥水功夫神人合謀而行變化天地定位陰陽潛交五行迭王斗建司節嶽尊山而瀆長川乃至日星雷風禎祥祕奧三綱五紀萬樂百禮人人物物各由厥生無非元功冥持至數吻合以及之者王者奉天而行故聖神焉帝王焉彼聖如仲尼有德而無應故位止於旅人福弗及生靈乃歎曰鳳鳥不至河不出圖吾已矣夫然後知元命者軒告命者羲受命者唐與虞成命者禹備命者文仲尼不受命乃假人事而言故有宗豫之說後代無作焉立言者一仁義以束世教瞽瞶蚩蚩使絶其非望法業之外存而不論豫讀夏書無是說司馬子長自叙始云登會稽探禹穴不然萬祀何傳焉惑矣蒼山之瀦呀如淵如陵徙谷遷此中不騫雨洗煙空咸今然莫窮噫實禹跡之所始終唐興二百八祀寶歷庚午秋九月豫從事於是邦感上聖遺軌而學者無述作禹穴碑廉察使舊相河南公見而銘之
