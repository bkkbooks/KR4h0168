front:
  text: 全唐文欽定全唐文卷五百五十二韓愈六
  hash: sha256:806b205e2420f6c2f2c576475ed9a7d91e73f379b58f73d807b166b095746b68
body:
  text: 裴子自城來得足下一書明日又於崔大處得足下陜州所留書翫而復之不能自休尋知足下不得留僕又為考官所辱欲致一書開足下并自舒其所懷含意連辭將發復已卒不能成就其說及得足下二書凡僕之所欲進於左右者足下皆以自得之僕雖欲重累其辭諒無居足下之意外者故絕意不為行自念方當遠去潛深伏隩與時世不相聞雖足下之思我無所窺尋其聲光故不得不有書為別非復有所感發也僕少好學問自五經之外百氏之書未有聞而不求得而不觀者然其所志惟在其意義所歸至於禮樂之名數陰陽土地星辰方藥之書未嘗一得其門戶雖今之仕進者不要此道然古之人未有不通此而能為大賢君子者僕雖庸愚每讀書輒用自愧今幸不為時所用無朝夕役役之勞將試學焉力不足而後止猶將愈於汲汲於時俗之所爭既不得而怨天尤人者此吾今之志也懼足下以我退歸因謂我不復能自彊不息故因書奉曉冀足下知吾之退未始不為進而眾人之進未始不為退也既貨馬即求船東下二事皆不過後月十日有相問者為我謝焉斯立足下僕見險不能止動不得時顛頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也足下猶復以為可教貶損道德乃至手筆以問之扳援古昔辭義高遠且進且勸足下之於故舊之道得矣雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子之不以丈夫期我也不能默默聊復自明僕始年十六七時未知人事讀聖人之書以為人之仕者皆為人耳非有利乎已也及年二十時苦家貧衣食不足謀於所親然後知仕之不唯為人耳及來京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試賦詩策等以相示僕以為可無學而能因詣州縣求舉有司者好惡出於其心四舉而後有成亦未即得仕聞吏部有以博學宏詞選者人尤謂之才且得美仕就求其術或出所試文章亦禮部之類私怪其故然猶樂其名因又詣州府求舉凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退因自取所試讀之乃類於俳優者之辭顏忸怩而心不寧者數月既已為之則欲有所成就書所謂恥過作非者也因復求舉亦無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂博學者豈今之所謂者乎夫所謂宏詞者豈今之所謂者乎誠使古之豪傑之士若屈原孟軻司馬遷相如揚雄之徒進於是選必知其懷慙乃不自進而已耳設使與夫今之善進取者競於蒙昧之中僕必知其辱焉然彼五子者且使生於今之世其道雖不顯於天下其自負何如哉肯與夫斗筲者決得失於一夫之目而為之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具裘葛養窮孤其大得蓋欲以同吾之所樂於人耳其他可否自計已熟誠不待人而後知今足下乃復比之獻玉者以為必竢工人之剖然後見知於天下雖兩刖足不為病且無使勍者再剋誠足下相勉之意厚也然仕進者豈捨此而無門哉足下謂我必待是而後進者尤非相悉之辭也僕之玉固未嘗獻而足固未嘗刖足下無為為我戚戚也方今天下風俗尚有未及於古者邊境尚有被甲執兵者主上不得怡而宰相以為憂僕雖不賢亦且潛究其得失致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乘之若都不可得猶將耕於寬閒之野釣於寂寞之濱求國家之遺事考賢人哲士之終始作唐之一經垂之於無窮誅奸諛於既死發潛德之幽光二者將必有一可足下以為僕之玉凡幾獻而足凡幾刖也又所謂勍者果誰哉再剋之刑信如何也士固信於知己微足下無以發吾之狂言愈再拜六月二十六日愈白李生足下生之書辭甚高而其問何下而恭也能如是誰不欲告生以其道道德之歸也有日矣况其外之文乎抑愈所謂望孔子之門牆而不入於其宮者焉足以知是且非耶雖然不可不為生言之生所謂立言者是也生所為者與所期者甚似而幾矣抑不知生之志蘄勝於人而取於人耶將蘄至於古之立言者耶蘄勝於人而取於人則固勝於人而可取於人矣將蘄至於古之立言者則無望其速成無誘於勢利養其根而竢其實加其膏而希其光根之茂者其實遂膏之沃者其光煜仁義之人其言藹如也抑又有難者愈之所為不自知其至猶未也雖然學之二十餘年矣始者非三代兩漢之書不敢觀非聖人之志不敢存處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注於手也惟陳言之務去戛戛乎其難哉其觀於人不知其非笑之為非笑也如是者亦有年猶不改然後識古書之正偽與雖正而不至焉者昭昭然白黑分矣而務去之乃徐有得也當其取於心而注於手也汨汨然來矣其觀於人也笑之則以為喜譽之則以為憂以其猶有人之說者存也如是者亦有年然後浩乎其沛然矣吾又懼其雜也迎而距之平心而察之其皆醇也然後肆焉雖然不可以不養也行之乎仁義之途游之乎詩書之源無迷其途無絕其源終吾身而已矣氣水也言浮物也水大而物之浮者大小畢浮氣之與言猶是也氣盛則言之短長與聲之高下皆宜雖如是其敢自謂幾於成乎雖幾於成其用於人也奚取焉雖然待用於人者其肖於器耶用與舍屬諸人君子則不然處心有道行已有方用則施諸人舍則傳諸其徒垂諸文而為後世法如是者其亦足樂乎其無足樂也有志乎古者希矣志乎古必遺乎今吾誠樂而悲之亟稱其人所以勸之非敢裦其可裦而貶其可貶也問於愈者多矣念生之言不志乎利聊相為言之愈白愈白李生生之自道其志可也其所疑於我者非也人之來者雖其心異於生其於我也皆有意焉君子之於人無不欲其入於善寧有不可告而告之孰有可進而不進也言辭之不酬禮貌之不答雖孔子不得行於互鄉宜乎余之不為也苟來者吾斯進之而已矣烏待其禮踰而情過乎雖然生之志求知於我耶求益於我耶其思廣聖人之道耶其欲善其身而使人不可及耶其何汲汲於知而求待之殊也賢不肖固有分矣生其急乎其所自立而無患乎人不已知未嘗聞有響大而聲微者也况愈之於生懇懇耶屬有腹疾無聊不果自書愈白月日前某官某謹東向再拜寓書浙東觀察使中丞李公閤下籍聞議論者皆云方今居古方伯連帥之職坐一方得專制於其境內者惟閤下心事犖犖與俗輩不同籍固以藏之胸中矣近者閤下從事李協律翺到京師籍與李君友也不見六七年聞其至馳往省之問無恙外不暇出一言且先賀其得賢主人李君曰子豈盡知之乎吾將盡言之數日籍益聞所不聞籍私獨喜常以為自今以後不復有如古人者於今忽有之退而自悲不幸兩目不見物無用於天下胸中雖有知識家無錢財寸步不能自致今去李中丞五千里何由致其身於其人之側開口一吐出胸中之奇乎因飲泣不能語既數日復自奮曰無所能人乃宜以盲廢有所能人雖盲當廢於俗輩不當廢於行古人之道者浙水東七州戶不下數十萬不盲者何限李中丞取人固當問其賢不賢不當計盲與不盲也當今盲於心者皆是若籍自謂獨盲於目爾其心則能別是非若賜之坐而問之其口固能言也幸未死實欲一吐出心中平生所知見閤下能信而致之於門耶籍又善於古詩使其心不以憂衣食亂閤下無事時一致之座側使跪進其所有閤下憑几而聽之未必不如聽吹竹彈絲敲金擊石也夫盲者業專於藝必精故樂工皆盲籍儻可與此輩比並乎使籍誠不以畜妻子憂饑寒亂心有錢財以濟醫藥其盲未甚庶幾其復見天地日月目得不廢則自今至死之年皆閤下之賜也閤下濟之以已絕之年賜之以既盲之視其恩輕重大小籍宜如何報也閤下裁之度之籍慙靦再拜愈白故友李觀元賓十年之前示愈別吳中故人詩六章其首章則吾子也盛有所稱引元賓行峻潔清其中狹隘不能包容於尋常人不肯苟有論說因究其所以於是知吾子非庸眾人時吾子在吳中其後愈出在外無因緣相見元賓既沒其文益可貴重思元賓而不見見元賓之所與者則如元賓焉今者辱惠書及文章觀其姓名元賓之聲容怳若相接讀其文辭見元賓之知人交道之不汚甚矣子之心有似於吾元賓也子之言以愈所為不違孔子不以雕琢為工將相從於此愈敢自愛其道而以辭讓為事乎然愈之所志於古者不惟其辭之好好其道焉爾讀吾子之辭而得其所用心將復有深於是者與吾子樂之况其外之文乎愈頓首愈白陳生足下今之負名譽享顯榮者在上位幾人足下求速化之術不於其人乃以訪愈是所謂借聽於聾求道於盲雖其請之勤勤教之云云未有見其得者也愈之志在古道又甚好其言辭觀足下之書及十四篇之詩亦云有志於是矣而其所問則名所慕則科故愈疑於其對焉雖然厚意不可虛辱聊為足下誦其所聞蓋君子病乎在已而順乎在天待已以信而事親以誠所謂病乎在已者仁義存乎內彼聖賢者能推而廣之而我蠢焉為眾人所謂順乎在天者貴賤窮通之來平吾心而隨順之不以累於其初所謂待已以信者已果能之人曰不能勿信也已果不能人曰能之勿信也孰信哉信乎已而已矣所謂事親以誠者盡其心不夸於外先乎其質後乎其文者也盡其心不夸於外者不以已之得於外者為父母榮也名與位之謂也先乎其質者行也後乎其文者飲食甘旨以其外物供養之道也誠者不欺之名也待於外而後為養薄於質而厚於文斯其不類於欺與果若是子之汲汲於科名以不得進為親之羞者惑也速化之術如是而已古之學者惟義之問誠將學於太學愈猶守是說而竢見焉愈白使至辱足下書歡愧來并不容於心嗟乎子之言意皆是也僕雖巧說何能逃其責耶然皆子之愛我多重我厚不酌時人待我之情而以子之待我之意使我望於時人也僕之家本窮空重遇攻劫衣服無所得養生之具無所有家累僅三十口攜此將安所歸託乎捨之入京不可也挈之而行不可也足下將安以為我謀哉此一事耳足下謂我入京城有所益乎僕之有子猶有不知者時人能知我哉持僕所守驅而使奔走伺候公卿閒開口論議其安能有以合乎僕在京城八九年無所取資日求於人以度時月當時行之不覺也今而思之如痛定之人思當痛之時不知何能自處也今年加長矣復驅之使就其故地是亦難矣所貴乎京師者不以明天子在上賢公卿在下布衣韋帶之士談道義者多乎以僕遑遑於其中能上聞而下達乎其知我者固少知而相愛不相忌者又加少內無所資外無所從終安所為乎嗟乎子之責我誠是也愛我誠多也今天下之人有如子者乎自堯舜以來士有不遇者乎無也子獨安能使我潔清不汚而處其所可樂哉非不願為子之所云者力不足勢不便故也僕於此豈以為大相知乎累累隨行役役逐隊饑而食飽而嬉者也其所以止而不去者以其心誠有愛於僕也然所愛於我者少不知我者猶多吾豈樂於此乎哉將亦有所病而求息於此也嗟乎子誠愛我矣子之所責於我者誠是矣然恐子有時不暇責我而悲我不暇悲我而自責且自悲也及之而後知履之而後難耳孔子稱顏回一簞食一瓢飲人不堪其憂回也不改其樂彼人者有聖者為之依歸而又有簞食瓢飲足以不死其不憂而樂也豈不易哉若僕無所依歸無簞食無瓢飲無所取資則餓而死其不亦難乎子之聞我言亦悲矣嗟乎子亦慎其所之哉離違久乍還侍左右當日歡喜故專使馳此候足下意并以自解愈再拜九月一日愈再拜受牒之明日在使院中有小吏持院中故事節目十餘事來示愈其中不可者有自九月至明年二月之終皆晨入夜歸非有疾病事故輒不許出當時以初受命不敢言古人有言曰人各有能有不能若此者非愈之所能也抑而行之必發狂疾上無以承事於公忘其將所以報德者下無以自立喪失其所以為心夫如是則安得而不言凡執事之擇於愈者非為其能晨入夜歸也必將有以取之苟有以取之雖不晨入而夜歸其所取者猶在也下之事上不一其事上之使下不一其事量力而仕之度才而處之其所不能不彊使為是故為下者不獲罪於上為上者不得怨於下矣孟子有云今之諸侯無大相過者以其皆好臣其所教而不好臣其所受教今之時與孟子之時又加遠矣皆好其聞命而奔走者不好其直己而行道者聞命而奔走者好利者也直己而行道者好義者也未有好利而愛其君者未有好義而忘其君者今之王公大人惟執事可以聞此言惟愈於執事也可以此言進愈蒙幸於執事其所從舊矣若寬假之使不失其性加待之使足以為名寅而入盡辰而退申而入終酉而退率以為常亦不廢事天下之人聞執事之於愈如是也必皆曰執事之好士也如此執事之待士以禮如此執事之使人不枉其性而能有容如此執事之欲成人之名如此執事之厚於故舊如此又將曰韓愈之識其所依歸也如此韓愈之不諂屈於富貴之人如此韓愈之賢能使其主待之以禮如此則死於執事之門無悔也若使隨行而入逐隊而趨言不敢盡其誠道有所屈於己天下之人聞執事之於愈如此皆曰執事之用韓愈哀其窮收之而已耳韓愈之事執事不以道利之而已耳苟如是雖日受千金之賜一歲九遷其官感恩則有之矣將以稱於天下曰知已知已則未也伏惟哀其所不足矜其愚不錄其罪察其辭而垂仁採納焉愈恐懼再拜愈頓首胡生秀才足下雨不止薪芻價益高生遠客懷道守義非其人不交得無病乎斯須不展思想無已愈不善自謀口多而食寡然猶月有所入以愈之不足知生之窮也至於是而不悔非信道篤者其誰能之所示千百言畧不及此而以不屢相見為憂謝相知為急謀道不謀食樂以忘憂者生之謂矣顧無以當之如何夫別是非分賢與不肖公卿貴位者之任也愈不敢有意於是如生之徒於我厚者知其賢時或道之於生未有益也不知者乃用是為謗不敢自愛懼生之無益而有傷也如之何若曰彼有所合吾不利其求則庶可矣生又離鄉邑去親愛甘辛苦而不厭者本非為是也如之何愈之於生既不變矣戒生無以示愈者語於人用息不知者之謗生慎從之講禮釋友二篇比舊尤佳志深而喻切因事以陳辭古之作者正如是爾愈頓首七月三日將仕郎守國子四門博士韓愈謹奉書尚書閤下士之能享大名顯當世者莫不有先達之士負天下之望者為之前焉士之能垂休光照後世者亦莫不有後進之士負天下之望者為之後焉莫為之前雖美而不彰莫為之後雖盛而不傳是二人者未始不相須也然而千百載乃一相遇焉豈上之人無可援下之人無可推歟何其相須之殷而相遇之疎也其故在下之人負其能不肯諂其上上之人負其位不肯顧其下故高材多戚戚之窮盛位無赫赫之光是二人者之所為皆過也未嘗干之不可謂上無其人未嘗求之不可謂下無其人愈之誦此言久矣未嘗敢以聞於人側聞閤下抱不世之才特立而獨行道方而事實卷舒不隨乎時文武唯其所用豈愈所謂其人哉抑未聞後進之士有遇知於左右獲禮於門下者豈求之而未得耶將志存乎立功而事專乎報主雖遇其人未暇禮耶何其宜聞而久不聞也愈雖不才其自處不敢後於恒人閤下將求之而未得歟古人有言請自隗始愈今者惟朝夕芻米僕賃之資是急不過費閤下一朝之享而足也如曰吾志存乎立功而事專乎報主雖遇其人未暇禮焉則非愈之所敢知也世之齪齪者既不足以語之磊落奇偉之人又不能聽焉則信乎命之窮也謹獻舊所為文一十八首如賜觀覽亦足知其志之所存愈恐懼再拜自足下離東都凡兩度枉問尋承已達宣州主人仁賢同列皆君子雖抱羈旅之念亦且可以度日無入而不自得樂天知命者固前修之所以禦外物者也况足下度越此等百千輩豈以出處近遠累其靈臺耶宣州雖稱清涼高爽然皆大江之南風土不並以北將息之道當先理其心心閒無事然後外患不入風氣所宜可以審備小小者亦當自不至矣足下之賢雖在窮約猶能不改其樂况地至近官榮祿厚親愛盡在左右者耶所以如此云云者以為足下賢者宜在上位託於幕府則不為得其所是以及之乃相親重之道耳非所以待足下者也僕自少至今從事於往還朋友閒一十七年矣日月不為不久所與交往相識者千百人非不多其相與如骨肉兄弟者亦且不少或以事同或以藝取或慕其一善或以其久故或初不甚知而與之已密其後無大惡因不復決捨或其人雖不皆入於善而於已已厚雖欲悔之不可凡諸淺者固不足道深者止如此至於心所仰服考之言行而無瑕尤窺之閫奧而不見畛域明白淳粹輝光日新者惟吾崔君一人僕愚陋無所知曉然聖人之書無所不讀其精麤巨細出入明晦雖不盡識抑不可謂不涉其流者也以此而推之以此而度之誠知足下出㣥拔萃無謂僕何從而得之也與足下情義寧須言而後自明耶所以言者懼足下以為吾所與深者多不置白黑於胸中耳既謂能麤知足下而復懼足下之不我知亦過也比亦有人說足下誠盡善盡美抑猶有可疑者僕謂之曰何疑疑者曰君子當有所好惡好惡不可不明如清河者人無賢愚無不說其善服其為人以是而疑之耳僕應之曰鳳凰芝草賢愚皆以為美瑞青天白日奴隸亦知其清明譬之食物至於遐方異味則有嗜者有不嗜者至於稻也粱也膾也夕肉也豈聞有不嗜者哉疑者乃解解不解於吾崔君無所損益也自古賢者少不肖者多自省事以來又見賢者恒不遇不賢者比肩青紫賢者恒無以自存不賢者志滿氣得賢者雖得卑位則旋而死不賢者或至眉壽不知造物者意竟如何無乃所好惡與人異心哉又不知無乃都不省記任其死生壽夭耶未可知也人固有薄卿相之官千乘之位而甘陋巷菜羹者同是人也猶有好惡如此之異者况天之與人當必異其所好惡無疑也合於天而乖於人何害况又時有兼得者耶崔君崔君無怠無怠僕無以自全活者從一官於此轉困窮甚思自放於伊潁之上當亦終得之近者尤衰憊左車第二牙無故搖動脫去目視昏花尋常閒便不分人顏色兩鬢半白頭髮五分亦白其一鬚亦有一莖兩莖白者僕家不幸諸父諸兄皆康彊早世如僕者又可以圖於久長哉以此怱怱思與足下相見一道其懷小兒女滿前能不顧念足下何由得歸比來僕不樂江南官滿便終老嵩下足下可相就僕不可去矣珍重自愛慎飲食少思慮惟此是望愈再拜愈再拜愈之獲見於閤下有年矣始者亦嘗辱一言之譽貧賤也衣食於奔走不得朝夕繼見其後閤下位益尊伺候於門牆者日益進夫位益尊則賤者日隔伺候於門牆者日益進則愛博而情不專愈也道不加修而文日益有名夫道不加修則賢者不與文日益有名則同進者忌始之以日隔之疏加之以不專之望以不與者之心而聽忌者之說由是閤下之庭無愈之跡矣去年春亦嘗一進謁於左右矣溫乎其容若加其新也屬乎其言若閔其窮也退而喜也以告於人其後如東京取妻子又不得朝夕繼見及其還也亦嘗一進謁於左右矣邈乎其容若不察其愚也悄乎其言若不接其情也退而懼也不敢復進今則釋然悟翻然悔曰其邈也乃所以怒其來之不繼也其悄也乃所以示其意也不敏之誅無所逃避不敢遂進輒自疏其所以并獻近所為復志賦以下十首為一卷卷有標軸送孟郊序一首生紙寫不加裝飾皆有揩字註字處急於自解而謝不能竢更寫閤下取其意而畧其禮可也愈恐懼再拜垂示僕所闕非情之至僕安得聞此言朋友道闕絕久無有相箴規磨切之道僕何幸乃得吾子僕常閔時俗人有耳不自聞其過懍懍然惟恐已之不自聞也而今而後有望於吾子矣然足下與僕交久僕之所守足下之所熟知在京城時囂囂之徒相訾百倍足下時與僕居朝夕同出入起居亦見僕有不善乎然僕退而思之雖無以獲罪於人亦有以獲罪於人者僕在京城一年不一至貴人之門人之所趨僕之所傲與己合者則從之游不合者雖造吾廬未嘗與之坐此豈徒足致謗而已不戮於人則幸也追思之可為戰慄寒心故至此已來剋已自下雖不肖人至未嘗敢以貌慢之况時所尚者耶以此自謂庶幾無時患不知猶復云云也聞流言不信其行嗚呼不復有斯人也君子不為小人之恟恟而易其行僕何能爾委曲從順向風承意汲汲然恐不得合猶且不免云云命也可如何然子路聞其過則喜禹聞昌言則下車拜古人有言曰告我以吾過者吾之師也願足下不憚煩苟有所聞必以相告吾亦有以報子不敢虛也不敢忘也愈再拜
