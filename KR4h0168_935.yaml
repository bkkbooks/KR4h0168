front:
  text: 全唐文欽定全唐文卷九百三十五杜光庭七
  hash: sha256:1494c0c1254648e0de2add1ae7a8cf9d4163793af8626f1ffe6cdbfed8fa29b2
body:
  text: 伏聞至道希夷真精元寂宏化於混元之表凝光於太極之先散淳一之根潛分步驟鼓生三之氣以制寰瀛所以乘龍襲氣之君畫卦垂衣之后順敷道要創厥皇基恢妙用而福寰中布神功而利天下昭彰帝紀炳蔚人文允屬睿朝誕膺天睠皇帝儀乾受命應運開圖繼軒皇帝頊之靈源茂亶父文王之至德纂承土運光啟金衡端旒扆以穆清慕唐虞而真正思洽大同之理以康九土之民稼穡連豐華戎咸泰皇儲輝重明之美遐方贊有道之風中外恬夷生靈輯睦况屬三元令序大宥昌辰宜虔齋潔之誠共祝君親之壽拂瑤壇而展禮按金籙以陳儀龍綵質心香花備信焰九光之蓮炬下照冥津飄三素之檀煙上聞真域必冀三天降祐萬聖延慈宗社隆昌寶圖安鎮齊乾坤於聖壽等日月於睿明文德武功綏寧八極天枝寶允輝映萬齡儲皇享椿柱之年常扶大業后潔蘋蘩之德共翼宸居朱邸清朝彌臻景貺外藩內輔益履殊榮常樂雍熙皆登富壽其有宿殃積釁往債前冤年辰命運之災算紀飛旗之厄秉茲懺謝竝乞消平即冀宗廟尊靈生神三境臣等九元七祖受福諸天貽祚流祥傳休無極上願天文昭著象緯澄清回直符太一之旗息玉彗金芒之耀蕩憂患於井參之野延福祥於梁益之墟九穀無虞五兵斯戢螟蝗水旱無肆沴於農功疫癘凶荒靡非災於閭里幽關舒泰品類滋榮海岳歸仁寰區稟化至有立功將士往逝都頭勣著勤王忠推致命每因齋薦皆為懺祈必離冥漠之鄉更遂逍遙之樂或幽陰尚滯渙澤未霑或嗣續已無奠羞多闕九宮符命即為遷神三籙洪恩俱令濟苦勿為疵癘速詣福廷動植飛沈盡登真道蓋聞歷代帝王受天符命咸宗至道以御鴻圖莫不用慈寶以臨人仗元功而濟物克致雍熙之運仍頒祥瑞之文顧以薄躬猥臨大寶寰區尚擾思偃武而未臻法令頒行念措刑而莫得內惟兢業莫敢遑寧今年七月漢州什邡縣百姓郭迴芝於仙居觀採藥耕地掘得銅牌長七寸廣四寸上有六十字老子通天紀云丁卯年甲戌乙亥人王生享二百年天子王從建王元膺王萬感王嶽王則王道義五字篆文後云北邙化張宏道天寶留此明聖代欽承元貺虔佩靈符識大道之垂休知卜年之惟永爰傾丹懇用答殊休按九等之科儀修靈寶之法事所願丹心徑達聖鑒俯臨社稷永昌休徵必應四時合序萬物以嘉俾令率土之賓盡保無疆之福稽首謹詞伏聞三元大宥乃諸天降福之辰九夜長幽是厚地重陰之境將消積暗爰假神燈上納三光下照㣥爽經科所重濟護攸先今屬序屆中元壇開黃籙三時朝懺萬罪蠲消輒備香油同申供養伏冀鸞輝鳳焰凝光地府之中星布蓮敷散景泉扃之內盡超苦走耳乚永出冥津九祖生天六親介福災祛未兆善洽無疆奉上安家竝希元吉臣聞包容萬象至道為亭育之尊宏濟㣥生天尊演虛無之道莫不恩覃纖芥澤普存亡明真開玉匣之書長夜釋重陰之苦丹誠上感元貺必臻臣過咎夙彰神明垂譴纔逾一月繼喪二男憔悴中年寂寥孤影痛蒸嘗之將絕念冥漠以何依懼彼營魂尚為拘滯伏思遷拔惟仗焚修捨其服用之資助此香燈之會凉飇韻磬應聞泉曲之中秋月凝壇想照夜臺之下願乘齋福俱出幽關鍊魄朱宮生神絳府各遂逍遙之路盡登清淨之鄉永奉正真長居道域人間天上終際會於善緣萬劫千生更團圓於眷屬昭昭願力真聖鑒知不任涕咽虔祈之至至道流慈元皇垂貺三宮四赦爰孚作解之恩品物昭榮共樂如春之澤皇壇巨祐幽顯無遺臣以庸愚叨逢聖運早承寵祿常戒滿盈猶恐年歷之間星辰之內因躔厄會尢切兢憂輒因黃籙道場虔申悔謝仰希上聖俯鑒沖襟密賜福祥潛袪災咎壽年增益家眷康宜存沒幽明同臻景祐律移朱夏節應素秋鼓夷則於西郊斂火雲於南極裁非戒惡允屬茲辰猥以塵凡叨親道化身參丹籙名隸元臺而過尢易結世網難祛動靜行藏未混融於大道年辰宿曜猶躔集於眾災輒因黃籙寶壇助營香供冀蒙聖力俯鑒愚衷開罪書而解赦愆尤豁塵累而蕩蠲厄難九元受賜舉族霑榮永承祐護之恩誓竭歸依之願臣以宿因獲承積祐早參職務旋忝官榮而所主重難常深憂懼尚慮行年災滯星曜加臨遂履困蒙莫知祈告今屬元冥屆節水帝司辰星杓方指於孟冬朔氣正雄於北陸年光遷貿修奉彌專敢因九奏之壇虔瞻上聖盡瀝萬重之懇願降殊慈賜臣罪咎消平災凶殄息前冤宿債乘功德以和寧往世今生荷懺祈而濟拔九元享福舉族霑榮克承憫祐之功永勵歸依之懇伏以大道垂文澤周存歿天尊演化恩及幽冥廣敷九等之科以拯重冥之苦敢持哀懇仰叩元關今月二十六日亡妣隴西郡君贈隴西郡太夫人李氏忌辰詣玉局靈壇因上元勝會同修香供用禱福祥伏願亡妣鍊景朱陵棲神元圃悟恬澹希夷之道契長生永劫之真元會無為克臻妙果伏聞黃籙明科紫陽具典元元勝力丹宣恩拯拔幽沈照臨冥夜古今宗稟生死銜恩有感必通所祈克應今月二十六日是臣亡妣贈隴西郡太夫人忌辰輒因玉局壇場中元齋薦同申修奉冀達真靈伏願亡妣乘此福緣高昇道境遊神碧落蛻影丹臺永登快樂之鄉克證希夷之道伏以黑帝御時元冥肇序下元勝會大宥昌辰所宜虔祝上真勵精下土用祈禎貺以福存亡今以玉局靈墟瑤壇展禮輒持法信用助齋誠敢希眾聖鑒臨萬真昭祐九元開度超離冥漠之鄉五族而協和長荷安貞之福災凶殄息罪咎消平永誓丹襟仰承洪澤伏聞齋敷九等節啟三元是萬方禱福之辰是眾聖宣恩之日今屬元元真化玉局靈壇陳黃籙之儀按元都之品九時奏御三日焚修精助香燈同申懺滌伏冀高尊錫祐大道流慈採納精誠降頒洪福九祖遂超昇之願六親霑覆護之仁消厄滯於將來解冤讎於既往罪咎原釋疾苦痊平壽祿增延凶災除蕩克叶發生之德敢忘大道之恩伏以元帝司辰水官統序乃請福延恩之節是凝心滌慮之期况玉局仙蹤瑤壇盛禮九時焚祝必介於休禎三日齋莊敢同於懺謝所冀災躔殄息冤債消平罪咎咸蠲存亡共泰永虔修奉以答元慈伏以大道周行三元立訓陟明考校毫末無遺臣早慕元虛夙宗清淨每展恪勤之懇以祈昭祐之慈今以玉局靈壇上元福會輒賫香燭同助焚修所祈消解災凶滌除罪咎蠲平疾厄延益年齡善功克被於存亡禎貺旁周於眷屬永勤丹慊仰副元慈伏以考校良辰先春令序當上元陟明之節乃㣥生舒泰之期式罄齋誠以申虔祝今屬錦都靈化玉局瑤壇啟黃籙之真儀展元科之盛禮輒持香信同助良因伏惟眾聖垂慈萬真昭鑒憫其修奉錫以禎祥惠暜存亡遐祛罪咎解災纏於未兆增祿壽於惟新永勵丹心上副元貺伏以四始周行三元定籙陟明顯晦考校無遺臣素奉道科早師元寂每逢良會必勵修崇今以玉局朝元霜壇蕆事輒賫香燭潔助齋功所祈大宥之恩允降自天之澤疾恙痊愈祿算增延仰薦先靈旁沾眷屬永承丕祐欽贊元勳不任歸命丹切之至伏以水德配時元冬叶候當二氣謹藏之節是諸天校會之期所宜勵志重元凝心至道滌瑕悔過請福希恩况玉局皇壇錦城福會敢營香幣同助齋修三日肅虔九時朝懺冀蒙昭祐廣錫休祥賜臣元祖超昇陰冥開泰存亡濟度災咎消平釋冤債於夜庭落罪尢於地疾厄痊復算紀遐長誓傾嚴奉之誠常副真靈之祐伏聞道出虛無之表識在生成德超仁義之先功包慈育化綿億劫教暜㣥方由是三皇以道御乾坤五帝以德承天地人臻福壽俗致雍熙雖金木運遷步驟時革理家康國惟道為先行之則四海晏清代還淳樸違之則中原板蕩物變澆漓我國家師太古之風紹元元之訓懷道抱德祖舜述堯故能縱神武以滌埃氛中興鳳歷光聖文而安社稷克固鴻圖臣等夙荷道慈獲逢昭運微功未著寵澤已深思虔齋潔之誠仰報君親之德今屬天官統序木帝司方當上元持戒之期是下土精修之節共賫法信同詣靈壇修玉籩金豆之儀陳十極四華之禮蓮釭散焰續陽景以燭幽關蘭炷飄煙御星纏而達卑懇必冀眾真迂駕萬聖迴軒俯鑒㣥心洪施巨福上扶宸極安帝業以天長仰奉廟謨鎮坤維而地久邊烽不警氣序式和穀稼滋豐生靈舒泰寰瀛輯睦車軌混同妖沴不興禎祥薦委臣等存亡介福七祖生天族屬霑榮三災弭息或前生今世罪網未祛或往債宿冤過尢未解或刑章有失或宰割不明或故殺誤傷因成果報或運心履行有犯神明或土木奢華服用繁侈三官紀過五帝司非憑此懺祈皆希洗蕩賜臣等壽齡延永祿祚遐長災厄蠲消冤讎和釋其有同心事主戮力勤王風露先驚古今俄隔緬惟夜府願享福緣爰伸濟拔之因俱遂超昇之路其次蒸嘗曠絕冥漠無依亦俾往生勿為淪滯龍神正秩五廟靈司乘黃籙之殊恩沐元都之景貺肅清風景安鎮方隅疫毒無侵干戈不作蛸翹異品動植殊形六走耳乚四生三途五苦九龍符命三寶威光暜沐神功竝登真道伏聞道本至無化分妙有功包覆燾恩暜幽明家國稟之以安寧存亡得之以開濟神威靈澤妙用無窮臣以玉局洞天神仙奧府將申瞻敬式表宸儀遂為元祖幽扃塑造真像睟容端穆侍衞駢羅疑珠宮下降之初若玉座浮空之際臣功既就妙相益嚴日角月庭煥矣㣥生之主綠睂皓髮巍乎萬聖之尊永福一方以鎮靈化是用虔修表讚載展誠祈披玉匱之科備明真之典轉經行道然燈炷香瀝懇上元冥心下土伏冀傾光三境迴駕九清憫鑒塵微降流禎貺潛扶寶祚密祐聖朝契自然清淨之風臻太古無為之理次願坤維肅穆川境晏安符瑞有聞災凶不作臣九元幽爽七祖魂神出長夜之庭昇洞陽之館毀絕地籙超翥天衢洎乎有識含生三塗六趣俱霑景福各遂生成臣積罪銷平宿瑕除蕩災躔霧廓道化風行得罔象之元珠入希夷之祕籙誓精修奉以答元恩伏聞妙道融真高出混元之表天尊立教光敷浩劫之先歷代化人隨機濟物惟邦國暜及幽明俱賴神功咸承景貺臣等叨逢聖運夙稟真詮欽元元道德之宗覩烈祖神仙之躅尚拘世網未脫樊籠分地用天恭守元儒之訓節財約已敢忘覆載之私今屬至聖垂衣元勳撫俗五兵罷警百穀薦登野洽謳歌人歸富壽當九井降生之月是三台誕瑞之期將報洪恩莫先黃籙是敢博求眾力同備信儀嚴飾仙蹤遵依祕格披心十極歸命諸天然燈炷香馳誠達懇伏冀三尊駐景下察丹襟萬聖迴軒旁流元澤上扶社稷配天地以安禎仰贊聖躬同日月而輝煥台星福曜常鎮坤維將畧廟謀永宣井邑一方昭泰四境乂安疫毒無侵戈鋋不作臣等九元七祖超度泉扃五族六親允蒙禎祐消平罪咎和釋災凶農蠶克保於豐穰幽苦咸期於扶濟龍神鎮守風雨均調道化周行靈威廣被茫茫九土擾擾四生承黃壇暜懺之緣因太上九龍之命俱昇道果暜陟仙階飄浮絕祭之魂霜露霑零之魄勿為疵癘各遂往生道力所覃永叶元吉伏以清淨之宗託重元而設教生成之本資妙用以宣功家國稟之而允昌古今運之而不竭粵惟道化首出帝先今屬睿聖御天元台分閫敷宏道德字育蒸黎法伊堯媯舜之仁遵后稷皋陶之德萬方有泰四境無虞共感殊恩何階上答是用率勉寮屬考按經科嚴飭壇場備申齋潔精香燈而達懇奉信幣以表誠注念九清馳心三境伏冀元光下燭至聖冥通俯鑒㣥情滂流巨澤上扶帝業光讚聖猷比三辰以竝明媲兩儀而等固鯤池鳳穴之野聲教遐傳桑津蒙谷之鄉車書混一保寧藩部匡祐元戎天祿永增壽涯彌廣臣九冥元祖超苦趣於幽關五族周親享善緣於道域封隅之內三農有積於倉箱政化之中㣥瑞日編於冊干戈靜息疵癘無侵其有滯骨飄魂久悲風露傷墳敗廟常苦凋荒乘此勝因咸臻妙樂龍神安鎮士庶昭甦蠢動有生同昇福界臣聞惟道為大運元功而生育乾坤惟帝為尊握洪樞而主張造化廣司萬國遐統㣥生承景命於三清定洪基於九土由是瑤圖積瑞銀漢騰華載誕元良恢宏大業今屬祥虹泛綵寶電飛光當重離啟耀之期是率土虔誠之節敢披雲笈恭詣仙壇備靈寳之道場儼長生之勝會鯨鐘鳳磬飄逸響於九天鶴焰龍煙達精誠於三境伏冀皇圖隆永均雨露以無窮聖壽高崇與渤溟而比大六宮內職協讚宸居萬彙㣥方昭宣睿德皇太子龍文鳳質嶽固松貞超漢盈周賢扶一統大同均化旁及黔黎共宗有道之期竝洽無為之運臣某不任禱祝虔祈歸命之至臣聞上聖垂科天真設教神功救物無遺動植之中惠力宣恩暜及昇沈之內粵自上古逮於茲辰荷澤蒙慈莫知紀極由是酆山北部潛祛邪沴之塵斗極南昌廣布生成之煦必資虔潔方獲感通臣猥以凡微叨榮道廕遭逢睿奬踐歷官常入侍天階高陟九霄之上出持符竹寵臨千里之中或齊肅師徒須行刑憲輯寧封部須舉威章慮乖折衷之宜自掇過尢之目以茲兢灼常寘肺懷今則臣母竇氏本命甲子某月日生災運所躔遂嬰疾苦雖勤服餌未獲痊平恐是往債宿冤尚為注訟前生今世旋結罪名或星曜所臨或年辰所歷凶災淩撓命祿衰微曉夕憂惶罔知救護况臣主持王事迢遞道途不得躬奉庭闈親調藥膳心馳萬壑目斷千山惟憑大道之慈冀集感通之効是用歸依靈觀稽首華壇修黃籙道場告元真上聖願迴聖鑒俯介福祥賜臣母氏易短促之齡益遐長之祚蠲消厄會蕩滌災衰使六氣均調百關康愈咎瑕除解冤債和平克瞻日月之華別降生成之福三途幽夜六趣殊倫同享勝因共臻善貺九元開度五族安寧臣當奉二親得勵旨甘之願榮朝聖主永勤忠赤之誠惟誓丹襟上副元祐不任瀝懇望恩虔祈之至謹詞臣聞妙本希微至真虛寂運神功而化育陶品物以生成應感無私周流靡及所以九元三古咸宣燾載之慈天上人間共沐涵濡之澤金科玉律雲篆瑤章先萬法以垂文具九流而拯世大哉至教無得而稱臣夙荷道恩欣逢景運優游元造沐浴皇風逸豫順於天和俯仰榮於大化早參祕籙常勵明誠燧燭焚香每肅虔於曉夕瓊儀寶韞敢有怠於敬恭族屬周親常臻蔭護是用精修黃籙上奉元休案十華三境之儀備羽磬霜鐘之禮歸心萬聖稽首諸天伏惟俯鑒丹襟曲垂元造憫茲誠錫以休祥賜臣九祖七元生天證道六親五族受福霑榮存亡均康濟之仁動靜獲安貞之賜災凶殄息冤債和平罪咎蠲銷祿算延益暜天含識率土懷生俱承道德之緣永樂雍熙之化不任歸命虔祈之至謹詞臣粵自塵微早依真教叨深元渥夙荷靈休迫以俗機縈躔世綱久拘職宦罔遂初心思羽褐以未期欲奮飛而徒切依棲修敬敢怠私誠而過咎所鍾女子殞逝光陰遄往傷痛難勝但女子初筓之年歸於儀氏夫歿之後誓志道門已造製法衣繕寫經籙永期頂冠佩服虔奉修持值臣以王事征行未果前願俄嬰疾恙奄此淪亡抱幽懇而莫申念冥關而增恨伏惟三尊慈憫眾聖哀憐曲迴鑒祐之恩特降遷昇之澤俾其魂魄得契歸依積生之冤債銷平在世之罪瑕蠲釋拔度幽泉之苦獲居善爽之中道力元功常加祐護其亡女所修寫法籙道衣等謹於道場前焚燒上奏伏惟至聖鑒照愚衷勅其魂神開度領受臣不任瀝懇虔祈哀痛迫切之至謹詞臣聞天地分靈君臣定位必資輔贊用致昇平猶風虎以相須若雲龍而感契由是吹塵入夢諭鼎養賢審像求形商王思阿衡之美闢門籲俊虞庭齊軒后之風莫不輝灼帝圖光昭史筆以康億兆以福寰區今屬嵗紀壬辰日乘庚午朔居天候月合水衡凝南斗之禎休集東陵之瑞彩景風入律星火開祥誕昴降嵩允當令序叨備青襟之列輒祈元聖之恩虔詣華壇願崇鴻福蘭釭夜燭檀穗朝飛仰陳三奏之儀必達九天之鑒伏冀青函紫筆延生題東極之書絳朱編得道署南昌之籍壽同山峻祿竝海深樂鏡增澄萊衣顯德雁序繼三台之美鯉庭超七葉之雄陶冶九圍匡扶元聖政歸一統俗洽大同暜覃夷夏之方永鎮雍熙之化臣某受恩隆異省已虛孱惟叩靈真曾明感激不任瀝懇虔心歸命之至謹詞伏聞大化無方神功廣被洞幽明而赴感暜生死以垂恩拯度無遺古今蒙澤臣頃者專征北陸統領師徒橫黑弰以臨戎誓傾臣節奮琱戈而效命志洗國讎山川有登涉之遙糧饋有輓輸之重惟期辦集正切憂兢又一軍之人苦於瘥疫死傷枕藉相望道途兼小男昭允疾恙所嬰性命懸迫發丹誠而啟願冀元聖之鑒臨尋遂迴戈免貽曠闕再朝丹陛祗奉皇慈恭荷道恩敢申昭謝是用按洞元品格披靈寶典儀考九幽長夜之科遵玉匱明真之式精修齋真上答靈慈伏冀三界照臨諸天憫護賜九元七祖超苦走耳乚於幽關眷屬親緣享福祥於昭代臣積生釁咎往世冤讎及主務以來公私負犯或賞刑不當或裁斷失宜俗有怨嗟過傷陰步馬致使動貽障塞莫值亨通晝夜循懷常增憂惕因今齋謝竝乞懺除亡男昭允未及壯年飄魂異境憫其淪謝悲痛尢深或有邪沴侵傷或是幽靈拘制虔祈道力俾遂生神度南丹流火之庭昇上境洞陽之府參元證品悟道登真罪咎蠲除冤債和釋臣等災躔超解厄運清消祿秩壽涯更期延益惟勤誠節永酬聖主之恩克勵焚修仰副真靈之祐
