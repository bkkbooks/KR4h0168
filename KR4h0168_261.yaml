front:
  text: 全唐文欽定全唐文卷二百六十一雍字泰和祕書郎善子長安初拜左拾遺唐隆元年拜殿中侍御史改員外郎郎中屢貶幾中法死以軍功纍轉括淄滑三州刺史天寶初為汲郡北海太守旋為吉溫羅織敕使就郡決殺之時年七十餘後因恩例得贈祕書監
  hash: sha256:3bdf5ae39736379808b076227f0e7bfc2508c4a435212c46462c9a698a47b555
  markers:
