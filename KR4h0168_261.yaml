body:
  text: 代有遠遊子植杖大野周目層巖覩巨石而嘆曰茲盤礡也可用武而轉乎茲峭峙也可騰趠而登乎觀其淩雲插峯隱霄橫嶂峻削標表汗漫儀狀劃鎮地以周博崛戴天而雄壯默元雲之暮起赩丹霞之朝上若使矗布長城嶷聯高壁遏西戎而分塞截東胡而度磧張九州之地險蹙四夷之天隔固可以眇絶驕子遐阻勍敵歸華夏之甲士却邊荒之羽檄別有列在王庭地當文砌疑貞琬之粉澤豔重錦之光麗承聽政之梁柱納進賢之階陛匪徒夾植桃李因芳茝蕙降神女之徜徉拂仙衣之容曳若乃苔蘚剝落雨露淋漓冰碧藻曜繪畫紛披不邀代之所貴不欲人之見知罔懷金而則異曷剖玉而方奇至若危堞孤援懸門禦衝出陳摧鶴乘城起龍炮與矢而飛雨磁當途而列墉金鼓為之沮氣戈矛為之輟鋒借如奕秋沈思蜀相興圖秉節制以全勝縱劫殺以論都鄙宋緘之謬識嘉禹鑿之神模落五星而多懵坐千人而不孤惟磨礱之所取任圓方之自殊支空留於織室編尚想於兵符鳥何恨而填海山何言而望夫徒以貞者不黷堅者可久臥如羊於山野蹲似武於林藪知作鼓之希聲信為人之無偶梁架海以東注鎮臨江而南守庶投水而克成將補天而何有豈獨砥礪利器盤踞真王鏃來肅慎門通越裳屹特立以興主駕能言以發祥邇開蓮兮表華遠倚劒兮疏梁保茲城而永固結彼交而不忘何止藏書入室勒篆離經翕湘川之飛燕伏昆池之駭鯨膏久服而顏駐碑一觀而涕零豈如扣角匡坐且悲歌於白水尋山小住止危途於翠屏而已哉伊鷙鳥之雄毅有俊體之超特意凝緩而無營體閒整而自得陰沈其情慘淡其色固未足以異於衆禽也夫一指一呼一擊一搏為主之用騁人之樂凜然神動翕然氣作殞三窟之狡兔斃五里之仙鶴勝霄漢而風捲透原野而星落萬乘為之顧眄六軍為之揮霍歡聲動於天地逸氣靄於林薄至若逐烏舛類射隼殊名獲不相讓遊不同征何至德而能制每協義而不爭偶坐推食雙飛和鳴殺敵齊力登樓比形夫其嚴冬沍寒烈風迅激或上林或依危壁身既稟於喬木骨將斷於貞石營全鳩以自暖罔害命以招益信終夜而懷仁仍詰旦而見釋矧乃戀主不去徇食猶止豈貪利而永言將效誠而必死甘閉於籠分從於使寧竭力之利人曷戢翼以存己則知負力干勢爭啄奪肉始飛聲而遠引或側翅而橫蹙遇之者夭當之者覆壯士感之驚歎行子羡之回矚故能連擊縱便臨事莫違一超雲以高舉一隨物以低飛驅逐妙於人智促節合於兵機禽雖小而不陋獸雖捷而無依或則九霄擊下萬里接來風行電轉月上雲開乍差池而不中終棄置而不回彼俊異之英決豈凝滯於嫌猜觀夫愛子防嚴惜巢忌物吻戛戛而雄厲翅翩翩而徑逸觜距者先中而命處帛丿糸蠻者異狀而同疾苟精別而棲條同賞心而無失肇木德以周仁啓春生而賦質二儀泰而廣運三正合而元吉和氣靄兮充㝢光風瀏兮被物豈因時而則舒亦樂道而奚恤我聖君大撫萬國肆覲㣥后受天之禧嘉歲之首文物粲於南宮兵戈森於北斗攬百辟以同心貢千春之遐壽於是明詔有司攄求時令邁惟一之德究吹萬之性勦土木之庶功阜稼穡之勤政畋漁止殺狴牢復命至若固陰往閉蟄戶未開蛇盤地蓄燕伏巖猜穴蟻斂翼冰魚鼓鰓蠢蠢宛委戢戢低徊遲擊蒙兮久矣耿獻歲兮悠哉謂將死而沒代俄作解而驚雷廓視聽於元壤脫飛騖於焚萊瞰青陽以書物事白日而登臺觀乎旬時甫田宿昔曾薄驚洪濤之神用偉元化之工作卷山河之變衰置天地之和樂律何谷而不暄光何容而不灼植也知歸動焉咸若爾乃楊回曲沼李雜芳園條煙濃而曳地花錦縟而當軒玉顏景照羅袂風翻惋良人之愆信省賤妾而銜恩蝶栩栩兮夢感鳥嚶嚶兮思存戛瑤柱以絙瑟引金斚而浮樽俯侯軒而下泣眙韶物而何言借如老軍追虜遠使窮河宵驅鳥逝野次星羅冰皚皚而雪下風颯颯而霜過遲日一煦挾纊嘗多遣疇歲之寒栗襲初節之妍和千巖為之動色萬壑為之流波將回轡而秦望請舉手而豳歌則有第高公族鼎貴侯家丹樓廠田坴於御道畫閣聳於朝霞明珠買妾黃金擲蛙列行遊衍直視驕奢誇浮雲之寶騎頓流水之香車漫平郊而藉草總上苑而觀花飛鞭蹴鞠旋舞琵琶麾戚里之途遠駐長安之日斜豈知夫東門在野北渭需沙散歸閒之邵父隱養正之姜牙趣下里之潦倒喧樂士之繁華苟炙背而垂釣但開田而種瓜惟元氣之播儀式景曜之騰烈倚崇蓋而西轉駿流光之東晰豈盈縮兮彌歲亦畏愛兮異節暾淑色而布和赫炎氛而生熱所謂純精至高至明燭龍照灼以首事踆烏奮迅而演成開天地之司目為帝王之我兄文思以之寅餞神武以之揭行是以節朝有政逮昃未餐揚暉而四方動色霽景而萬物聳觀豁雲霧之凝暗解雪霜之沍寒願揮戈兮再晝俟傾藿兮長安至若瑞氣浮烟休徵抱戴乍出海而融朗忽飛天而光大千里發乎主明五色見於時泰將閉谷兮永言豈覆盆兮貽悔則有懷人惆悵酌醴獻酬冥一醉兮千日渴一日兮三秋昔定鼎兮卜洛彼升天兮上遊處立觀於溟渤遂測景於嵩邱借如夸父棄策奔走何益夫子重陰道業所欽歎遲遲之春日阻悠悠之宿心惜落照於崇木重遙思於竹林粵若飛箭易及長繩難駐知息影之未寧喜傾蓋之相遇始曝書兮多暇復炙背兮成趣見蘭蕙之有暉想桃李之可樹別有誓以期皎至以憂長既中時而必熭亦後甲而見陽與聖人兮齊朗宜君子兮借光卜在地而占吉說通夢而尋昌匪直燭之滅私行之惟則若御車之有輪豈摶空之無翼固斡運兮誰使諒周行而不息重光起於一人合璧旋於八極觀乎翠萍生實赤羽從軍儻一編之欲授曷三餘之敢聞夕沒銜於黛巘朝隮夾於火雲何白駒之激急致華髮之繽紛若乃江湖積氣霧雨經時莓苔連於枕石泥濘汨於川坻仰蒼蒼而不見俟杲杲而常欺將遣慰兮安適每沈冥兮自悲借如謫居海上喟息天間有哀猿兮斷續無飛鳥兮往還事填膺於瘴癘情滿目於雲山未回光於東闕猶屈指於南蠻乃舉手而歌曰披雲覩日兮目則明就日瞻雲兮心若驚日爾一日兮何道時哉幾時兮此生東吳王孫嘯傲閶門魚橫玉劒蟻沸金樽賓僚霧進遊俠星奔桂舟兮錦纜碧澗兮花源爾乃輟輕棹登水閣絲管遞進獻酬交錯雲欲起而中留塵將飛而遂落既而酣歌徙坐取物為娛徵羽毛之好鳥得渤澥之仙鳬出籠而振少步而趨唼喋爭食離褷帶雛隨緑波而淡淡向紅藻而敖愈鳬之為物也說類殊種遷延遲重其聚則同而不和其鬬則仁而有勇參差聱耴颯沓繽紛其浮蔽水其旋如雲共沿波而弄吭各求匹而為㣥繞菰蒲而相逐隔洲渚而相聞於是乎會合紛泊崩奔鼓作集如異國之同盟散若諸侯之背約迭為擒縱更為觸搏或離披以折衝或奮振以前却始勠力兮決勝終追飛兮襲弱聳謂驚鴻回疑返鵲逼仄兮掣曳聯翩兮踴躍忽驚迸以差池倏浮沈而閃爍號噪兮沸亂傾耳為之無聞超騰兮往來澄潭為之濆濩排錦石蹴瓊沙披羽翰簸煙霞避參差之荇菜隨菡萏之荷花駐江妃之往棹留海客之歸槎爾乃擁津塞浦旁觀如堵空里廠墨訇厲天蛙黽兮失穴龜魚兮透泉專場之雞沮氣傾市之鶴慙妍其為狀也不一其為態也且千豈筆精之所擬非意匠之能傳良戒之於在鬬俾聞義而忘筌臣雍等言伏見中書門下章仇兼瓊奏稱吐蕃數萬圍逼於城皆遵奉九重決勝萬里臣聞雷之震者可以破山風之威者可以蕩海伏惟陛下允答天地丕應鬼神吸之而百川却流吹之而萬物倒植是以暫勞貔武一掃戎羌高屋用於建瓴銛戈申於破竹豈云懷縣獨有獲嘉何止絳城復稱聞喜光風動處草樹為之欣榮晴天轉時日月為之融朗況臣等分官寄切報國身輕蹈舞徘徊恐門庭之地窄詠歌踴躍賀邦家之慶深無任欣悅豁快之至謹詣朝堂奉表陳賀以聞臣雍言伏奉今月日恩制萬方士庶九土軍戎昭洗宸波光被聖渥臣誠歡誠喜載欣載躍頓首頓首死罪死罪臣聞沐雨露者草樹自樂荷陶鈞者動植皆春故知則而象之守而行之所謂則天之明立人之極有慶斯大無得而名者也伏惟陛下尊崇聖祖肅恭道教子物天德序位代工惣三五之妙勳統億兆之全業戈甲謐息華戎底平故得真容慶應潛通帝夢寶符靈貺允叶神心加號所以發祥郊天所以昭報大禮盛事光赫旬時作解周仁廓開宇宙天京褒稱雲紀變名風物光華再馳暉於日月河山保界重賦質於乾坤同一氣之建初與四時而浸遠天長地久呼萬歲於太平國泰朝歡舞九韶於聖主臣忝私守郡常荷戴天空馳就日之誠未盡歌雲之慶無任欣躍竦抃之至臣雍等言伏見昨宣示於新殿為萬姓祈禱神鐘自鳴是知聖作升聞天意下降道開皇極潤及生人臣等中賀臣聞光覆動植者莫如天臨照幽遐者莫如日自非齊聖妙用曷以則而象之元化至德曷以感而通之伏惟陛下道心沖叶神教昭宣以四海為家萬人為子常恐水旱遞有干戈暫勞所以供祀百神用祈五福德澤被物聖靈動天睿情注於一時景鐘鳴於別殿夫衆者萬有也廣者四維也今陛下惣萬有一四維潛運方寸之間充塞宇宙之外則何聖不鑒何神不昭豈惟一鐘乎況南面之位屈陛下之至尊西方之金啓陛下之本命非無情之應是有由而來自然㣥龍扶持九天欣戴保億兆之元后登千萬之永年時覯雍熙代階仁壽此天所以告鐘所以鳴臣等幸朝上京欣遭大慶一舞一蹈未極臣子之心再詠再歌徒知天地之德無任抃躍之至臣雍言伏奉今月日制書至德感神通夢聖祖告以莫大之福示以無疆之期上賀國歡下敷人願以抃以躍且舞且歌臣某中賀臣聞百川所歸者謂之大海萬有所仰者謂之聖人今四海獲安聖人致壽臣子之願允塞乾坤之應克諧粵自書籍以來感慶之深福祐之盛未有如斯者也伏惟陛下道用御天德心子物事無事以集休明至明以元悟人天乃接福貺爰臻故得真仙見靈異相昭應言皆合天心證非外將恢宏聖慮照自宸衷啓之大年授以元祐麻姑觀海歷歲彌長王母記桃與時無準則幽明所載宗廟所鍾兆庶子孫百靈齊集知億年之永託沐萬代之延休草樹自榮魚鱉咸若五風異色四氣同和鼓天地之大爐鑄邦家之鴻業八極猶小不足受其禎符萬物每輕不足答其成造況恤獄宥死符以再生寵賢達人宴以旬日耆艾衢陌工賈旗亭高興太平之時歡言上古之化撫家族以自慰詣州邑以相誇官不驕人人不畏吏識天之覆熙然如春惟聖之慈陶然如醉無任抃躍慶喜之極謹附表陳賀以聞臣雍誠歡誠喜頓首頓首臣雍言臣素無藝能積負訕謗衆多之口自可銷金怨讎之心每堪殞首伏惟陛下至明大聖察之纖微盛德在人洗之瑕穢山川納者不擇薰蕕天地覆之是霑雨露且人荷惠渥大抵官榮今臣蒙國恩私及軀命事出涯分之外恩加父母之深已逝之魂復歸朽質既乏安地尚忝高班雖欲殺身未能報主彌慙持祿有以保名但秋燕將辭必徘徊於大廈老馬雖去終顧步於華軒況臣今茲六十有七光陰荏苒行止欹危就木之時不知幾日懸車之歲僅有三年即以今日歸州不任違遠涕戀之極謹奉表以聞臣某言伏奉某月日制除臣濠州刺史聖澤天臨寵章霞煥身微草芥施重邱山臣某中謝臣某奉詔字人星言即路三省不及二過有懷棄短之恩竭力難負悔非之感瀝血未申以某月日到州上訖臣履冰誓心飲水銘骨勵精為政刻意求仁實望昭發宿誠宣揚大化上酬天地之德下盡臣子之忠萬死足矣臣某言伏奉某月日恩制除臣淄州刺史以今月日便道至任自遠江左近守河南收弊死灰建置生路別荷成造兼冀升遷三慶集身百齡踰外中謝臣聞天地大德含育及於昆蟲雨露深仁霑霈及於蕭草又不限微品有愧洪爐職臣之謂歟伏惟陛下道總三才在璿齊政運超四孟與物為春元造加於萬方聖慈周於一物子人開化議事立權張皇連城勸勉㣥嶽身同京職承祿賜之恩榮子預選曹廣門閭之惠澤是以龔黃蓄鋭卓魯專精竭盡公忠宏宣績用但駑駘之力不足以騁長衢朽木之資不足以施長桷徒遷厚祿無益聖朝撫事捫躬慙魂局影伏以東臨巨壑借渤澥之水寬西望京師就長安之日近臣雍言伏奉七月十五日恩敕許臣會計京師者止水一杯忽聞朝海枯查八月更得浮天臣某中謝臣以幽遐必察者日月之照明憔悴皆霑者雨露之恩廣伏惟陛下天德陰隲神功獨斷咸造吹萬容至於工養報通三大及於小豈臣微物得預洪爐在昔全生已承曲記斯今上計再荷特恩戴盆之心仰天有望出籠之鳥飛空可期方將蹈舞闕庭慙戴咫尺葉公宿願一覩真龍岐下遺氓欣逢聖主無任喜躍慙荷之至臣某言伏奉今月日聖恩鑑以薄能光賜上考御詞激物睿獎動時戴天不勝局地無所臣某中謝臣聞荷再造者遍於有情勸庶工者盡於有位莫不宣其力竭乃誠欣赴前儔恥居後殿者蓋以萬數則區區揚化眇眇納忠自比彭蠡之魚更是海濱之鴈伏惟陛下大和布氣巨壑流津宇宙開明既昭纖草山河鮮潤每納昆蟲豈臣凋枯復霑雨露天漢之上遙記嚴平宣室之中興言賈誼摧羽插翼忽飛翥於雲霄暴鰓揵鰭重游泳於溟渤豈有循吏得預詞林鼷鼠軒墀鶢鶋鐘鼓徒驚獎飾益用慙惶況乎政術空虛褎述纍積文高日月辰象法之不逮德厚嵩華㣥嶽朝之莫階雖郭隗濫觴明主有所蓄意然邵信敦本微臣不敢負人慶抃則深憂懼亦切無所報國空以誓心不任感荷欣惕之至臣雍言內使左立真至伏奉去年五月二十日御札慰問並賜綵綾章服跪捧天書勢在龍武仰瞻禮物色映虹霓慙戴汗流戰懼心栗臣某中謝臣聞食曰人天實生生之厚道稱物母得存存之多伏惟陛下載以坤輿覆以乾宇排衆口之謗開獨見之明生臣存臣至於數四寵及問及彌於再三豈魯陽宵人杲日回照荊樹散木慶雲結陰臣是以坐有所思行冀所得求西山之藥願補聖躬論東戶之人以分帝念識愚不足以廣聽事躓不足以動忠夫何望焉非所隱也豈謂塵壤見納推言不遺獎以及誠許以佳士澤深巨海德重崇邱曷云家奉賜書光華九族物延恩舊褒寵百齡淥水之龜且能回首黃華之鳥將以誓心惟報主之末由恐殺身之無益不任載荷欣躍之極謹因內使左立真附表云云臣某言伏奉去年月日御札特賜臣章服綵綾等八體神變回龍鳳之殊姿五色暈開動雲霞之仙氣臣誠歡誠喜頓首頓首臣聞礎之潤也是足興雲戈之鋒也或能照水雖言微物有以上通常未察焉今可明矣伏惟陛下一武一文廓彌綸之道乃神乃聖疏造化之元盛業極天鴻休紹古子育庶物臣伏百蠻溟渤不波沙朔無障太平之律大聖之功不得已而用之猶且增高彌短廣大衆流録賢傾㝢內之心捨過求天下之俊所以喁喁者將百身以效節區區者願一報以瀝肝況臣拔自九原出於萬死再收駭骨更造衣冠舌在不足以歌堯命存未能以報國豈謂上仁德廣澤利無益之臣博愛理深慈育不才之子天門下詔橫筆陳於長山御府賜衣列錦川於淄水臣道子道何顏受之今恩昔恩曷云報者戴天知重望日懷慙無任悚惕震惶感戴抃躍之極謹昧死遞表陳謝以聞臣雍等言臣聞昔時人君之德也大撫萬國必親諸侯是以通下情序賓禮伏惟陛下因遇上巳收接下臣順發生之時宏在鎬之宴仙廚和鼎浹洽於廣筵舜瑟歌風均調於曲水士女車騎充溢山川林薄光華纚連城闕臣等撫躬何幸報德無階空慙尸素之名豈適輪轅之用不任戴荷抃躍之至謹詣朝堂奉表以聞臣某言伏奉今年某月日恩旨恕臣重責護臣小才月日之明早曜絲髮雷雨之施振起昆蟲臣某中謝臣二十餘年數從遠謫流離辛苦契濶死生因陛下興聖謀行天討救萬人之命解四海之懸臣所以脫於往危保於今泰者為此頃歲昌宗執柄三思弄權臣與宋璟同論桓敬俱奏貶臣為富一作常州司戶實荷陛下誅韋氏之後收正人之餘特拜臣左臺侍御史此陛下活臣之命貸臣之榮一也頃歲譙王重福謀立東都臣當留臺與洛州司戶一作馬崔日知挫其逆形收其餘孽東都底定職臣之功自文林郎拜朝散大夫除戶部員外郎岑曦崔湜之輩以臣再用往還并忌崔隱甫倪若水等恐為陛下之助與臣同制各貶官仍聯翩左遷為崖州舍城縣丞及陛下正位紫宸臣又自嶺南九品遠惡官除朝散大夫戶部郎中又荷陛下活臣之命貸臣之榮二也頃歲陛下東封將還臣路左謁見猥承聖顧廣録舊文朝議恐陛下用臣薛自勤與外生庫狄履溫羅織臣至死仍承陛下免其罪授臣官又荷陛下活臣之命貸臣之榮三也臣出入嶺南自經一紀自澧州司馬加朝散大夫兼此州牧解青綬垂彤襜去瘴毒之艱遂江山之性又荷陛下活臣之命貸臣之榮四也且臣遠覽前書頗聞故事一餐之惠尚可殺身況臣蒙聖主千年之恩救愚臣萬死之急至若訓誨委積率諭再三蚊力負山不勝其重螢火向日徒失其晶必當閉戶絶交澄心去欲下以安所部上以報所天豈徒殞軀喪元焚妻夷族而已無任生死肉骨恐懼感戴之至臣雍言一昨瑞雪期農人阻望陛下以億兆勤慮倉廩貽憂禋祀元冥祈禱黑帝固能至誠應物聖德動天朔雪下於龍山海神朝於鳳闕是以途歌邑舞野慶朝歡荷一人之渥恩為四海之膏澤臣仰思揚化伏念輔時雖力減鴻毛而情殷鶴立無任喜躍慶賀之至謹昧死詣金闕門陳表貢詩一章臣雍誠惶誠恐臣某言臣聞禽獸殊祥卉木奇狀自古感者必有應焉伏惟陛下德合天地道通神明天物所以來神物所以見且麟者仁獸主仁者則呈馬者文身君文者即降曾是上叶尊號下報太平也觀夫豹蔚騰文龍章助聖書籍所未載耳目所未聞即知非常之君必有非常之物臣不勝抃躍欣慶之至謹遣某官馳表奉進以聞臣某誠惶誠恐蓋人有感一餐之惠殞七尺之身況臣為陛下官受陛下祿而目有所見口不言之是負恩矣自陛下親政日近復在九重所以未聞在外㣥下竊議道路籍籍皆云普思多行詭惑妄說妖祥惟陛下不知尚見驅使此道若行必撓亂朝政臣至愚至賤不敢以胸臆對揚天威請以古事為明證孔子云詩三百一言以蔽之曰思無邪陛下今若以普思有奇術可致長生久視之道則爽鳩氏久應得之永有天下非陛下今日可得而求若以普思可致仙方則秦皇漢武久應得之永有天下亦非陛下今日可得而求若以普思可致佛法則漢明梁武久應得之永有天下亦非陛下今日可得而求若以普思可致鬼道則墨翟干寶各獻於至尊矣而二主得之永有天下亦非陛下今日可得而求此皆事涉虛妄歷代無效臣愚不願陛下復行之於明時惟堯舜二帝自古稱聖臣觀所得故在人事敦睦九族平章百姓不聞以鬼神之道理天下伏願陛下察之則天下幸甚右高力士奉宣口敕以臣臨政特令賜宴恭承惠渥伏念庸微天地周仁木石知感不勝惶悚戴荷之極臣死罪死罪臣歷觀自古君臣凡所際會或因緣黨進或收接功成故未謁而知不言而信豈有地孤援寡毀衆謗深察蒙蔽之中致昭曠之外逢陛下特達之遇當陛下明聖之朝事出常均恩重今昔臣誓將瀝血足可竭誠徒欲殺身豈能報德至如勵精勤政舉直徇公副陛下憂人之心行陛下宏道之化豈敢失墜以負神明但函關路懸長安日遠不任戀主慺慺之至夫古之諡在乎勸沮將杜小人之業冀長君子之風故為善者雖存不貴仕而沒有餘名此賢達所以砥節也為惡者雖生有所幸死懷所懲此回邪所以易心也嗚呼巨源嘗未斯察而乃聞義不從與惡相濟蓄罔上之志協㣥凶之謀苟容聖朝貪昧厚祿自以宰臣之貴不崇朝而賈害者固鬼得而誅之也彼則匹夫之微未受命而行刑者固人得而誅之也幽明之憤斷焉可知天地之心自此而見矣頃者皇運中興功臣翼政時序未幾邪逆執權姦慝者拜爵於私門忠正者降黜於藩郡巨源此際用事方殷且於阿韋何親而結為昆季於國家何力而纍忝大官此則暗通中人附會武氏託城社之固亂皇家之基其罪一也又國之大事在祀與戎酌於禮經陳於郊祭將以對越天地光揚祖宗既告成功以觀海內惟昔亞獻不聞婦人阿韋蓄無君之忱懷自達之意潛圖帝位議啄皇孫升壇擬儀拜賜明命將預家事無守國章巨源創跡於前悖逆演成於後時有禮部侍郎徐堅太常博士唐紹蔣欽緒彭景直並言之莫從其罪二也又上天不弔先帝遇毒悔禍無徵阿韋將篡畫計未果逆心尚搖周章夷猶倉卒迷謬於是太平公主矯為陳謨上官昭容紿草遺詔故得今上輔政阿韋參謀將大業垂成而休命中輟者職由巨源躡韋溫之足楚客附巨源之耳梟聲遽發狼顧相驚以阿韋臨朝以韋溫當國其罪三也又人為邦本財實聚人奪其財則人心自離無其人則國本何恃巨源屢踐台輔專行勾徵廢越條章崇尚侵刻樹怨天下剝害生靈兆庶流離戶口減耗況以三思食邑往在貝州時屬久陰災逢多雨租庸捐免申令昭明匪今獨然自古不易三思慮其封物巨源啓此異端以為稼穡湮沈雖無菽粟蠶桑織絍可輸庸調致使河朔黎人海隅士女去其鄉井鬻其子孫飢寒切身朝夕奔命其罪四也但巨源長於華宗仕於纍代作萬國之相處具瞻之地蔽日月之層輝負邱山之重責今乃妄加褒述安能分謗者哉
