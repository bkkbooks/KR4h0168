  text: 全唐文欽定全唐文卷三百十五李華二
  hash: sha256:fdf63d6f9f4858c535603730a728a047083caefe834b0a5134f6b8979f945ee5
body:
  text: 三兄報汝吾疹疾一定汝憂吾疾令吾將息一一用汝語念汝知之且作判官事中丞叔父小心戒慎不離使司昔田仁任安俱為大將軍舍人臥馬廏中無何詔大將軍出征匈奴遣大夫趙禹選大將軍官屬舍人衣服鮮明二子冠帶顦顇趙禹獨與二子言論於禁中即日召見皆拜二千石汝有二子之實未遇趙公之舉馬廏高眠古今一也又仲尼嘗為委吏歎曰富貴如可求雖執鞭之士吾亦為之魏舒為郎官時屬沙汰乃襆被而出自言曰當自我始大才當大用如時人不識何為歎憤哉先師曰不患無位患所以立汝能自修況事叔父吾之休廢永無榮耀於伯仲之間自非深仁高義長才厚德又焉肯惠於朽壞枯木哉莒省吾書當努力也不次三兄報八月八日外兄李華敬簡盧十五弟則之處秋風漸高路出泗上將詣職役如所料乎往返勞止當與時俱暢也華疹疾無聊賢姊與諸君尋常耳福卿漸減弟勿憂之與弟別來十餘年比聞在代朔之地明時道舉出身乃能上為寡姊下為孤甥求為雁門主簿束身戎馬之間始終無過之地此一難也時方艱危動隔生死骨肉妻子寄在河朔一身萬里省姊淮南此二難也喪亂以來時多苟且松貞玉粹亦變頹流唯弟卓然介立寒俗文詞學問守正不移金石之聲汵然在聽此三難也五姓之中盧為峻茂根源上古歷世著明降及聖唐仁賢不絕外家陵替稍久弟其勉之盧氏有諶翁祭法又世以書聞華恨未見弟為廣訪求也南祖分於何祖帝師今有四房誰各承後弟為華具條流相報也頃撰軍器舅神道碑後其房族由來意欲如軍器之志廣外家之美令萬代聞見不復討譜牒也華質性鈍弱而慕汲黯卜式之直晚歲思夫子互鄉之見林宗賈淑之後若悟此道仁在其中坤元之說曰含宏光大品物咸亨大雅曰既明且哲德合天德老氏所宏夫子所述既自以為戒亦規弟持正也弟正直太過不能容納時人以是相箴努力無忽近有鄭五書信否四姊處得消息無怱怱不次華敬簡八月十五日翁告崔氏之子兩孩省吾出身入仕行四十年晚有汝母已養汝二人矣吾逮事裴氏鄭氏崔氏諸姑于氏堂姑皆賢明淑哲為內外師範意欲與汝言之裴氏姑恩慈見吾一善未嘗不流涕祝吾成立見吾伯仲書題誨責疎略話及舊事云無此例吾伯仲書題比今日中外書題其間疎密不啻百十也吾小時猶省長幼每日兩時櫛盥起居尊行三時侍食飲食訖然後敢食猶責不如禮今者諸子日出高眠爭覽盤器何曾有此儀可為歎息世教如此何得不亂婦人亦要讀書解文字知今古情狀事父母舅姑然可無咎詩序云哀窈窕思賢才而無傷善之心焉是關雎之義也易曰主中饋無攸遂婦人但當主酒食待賓客而已其餘無自專之禮詩云將翺將翔佩玉瓊琚此奉舅姑助祭祀之儀也又曰將翺將翔弋鳬與鴈此主酒食待賓客之儀也禮經所載汝其記之又婦人將嫁三月教於公宮祖廟既毀教於宗室嫁則廟見不見廟者不得為婦今此禮淩夷人從苟且婦人尊於丈夫㣥陰制於太陽世教淪替一至於此可為墮淚汝等當學讀詩禮論語孝經此最為要也吾小時南市帽行見貂帽多帷帽少當時舊人已歎風俗中年至西京市帽行乃無帷帽貂帽亦無男子衫袖蒙鼻婦人領巾覆頭向有帷帽羃離必為瓦石所及此乃婦人為丈夫之象丈夫為婦人之飾顛之倒之莫甚於此觸類而長不可勝言舉其一端告及汝耳勿謂幼小不遵訓誡所見所聞頹風敗俗故申明舊事不能一一也阿馬來說汝誦得數十篇詩賦麗麗已能承順十五姉顏色十七伯極鍾念吾旅病乍聞甚慰意凡人不患尊行不慈訓患身不能承順耳汝承十五姉仁慈十七伯訓誘又質性柔順當不扶自直吾所告者括羽汝耳不次翁告崔氏二子省文章本乎作者而哀樂繫乎時本乎作者六經之志也繫乎時者樂文武而哀幽厲也立身揚名有國有家化人成俗安危存兦於是乎觀之宣於志者曰言飾而成之曰文有德之文信無德之文詐臯陶之歌史克之頌信也子朝之告宰嚭之詞詐也而士君子恥之夫子之文章偃商傳焉偃商歿而孔伋孟軻作葢六經之遺也屈平宋玉哀而傷靡而不返六經之道遯矣論及後世力足者不能知之知之者力或不足則文義寖以微矣文顧行行顧文此其與於古歟帝唐文行大臣太子賓客贈禮部尚書博陵孝公崔氏諱沔字若沖安平公暟之少子也世為德表門為上族振發純英滋漸名訓大包淑和高厲遐清行先乎孝藝裕乎文資孝可以股肱王室揆文可以弻成邦教進士登第舉賢良方正對策第一召見拜校書郎歷陸渾主簿朝廷以公直躬正詞擢左補闕以公嫉邪忿佞除殿中侍御史文端武淑遷起居舍人學該典禮拜尚書祠部員外郎議事惟允遷給事中立言成訓改中書舍人辭乞就養授虞部郎中節高天下擢御史中丞剛亦不吐降著作郎道冠儒林遷祕書少監動為人範除左庶子宜均大政拜中書侍郎望尊地逼出為魏州刺史人惟求舊入為左散騎常侍貳東宮居守集賢院學士祕書監太子賓客兼懷州刺史罷州復職副守薨於位時開元二十四年冬仲月旬有七日春秋六十七贈禮部尚書海內冠帶涕哀宗師公為御史緩輸誠之囚持國屬之罪為給事中拒貴倖怙恩之詔削大臣忤旨之刑為中丞數發太倉減上林禽鳥之給以賑艱食陝東之人仆而復起宦官犯法執以按劾權寵屏息朝章大行權貢舉時得陸尚書景融來揚州瑱宋上黨遙宋兵部鼎等僉為國器在中書詔命之出上考天時下從人心異於斯者必替其否在魏州屬雨水敗稼乃弛禁便人先行後聞活者萬計公自為常侍賓客恆任介正德播天下而不容於朝置之散地竟孤其道時乎初公與元兄御史渾齊名弱冠遊京師縉紳儒學之士皆曰崔氏伯仲必至台司既而御史君夭沒公終於副守則向之所屬適為人慟悲哉公之侍疾也孝達於神祗居憂也哀貫乎天地喪期有數而茹蔬終身慈不貸姦貞不肆直道勝而齊物德全而及人博厚崇高篤實有耀儔於古烈葢魯衞之君子歟在魏州車駕東巡關外諸侯公為上第由是分掌選署仕進之族知勸焉親友隣里饑者待公而炊寒者待公而裘烝嘗之奠待公而後具故祿廩雖厚家未嘗足開元中天下富穰車服過制公菲飲食卑宮室濯衣澣冠俾人瞻我而化其不化者亦慙乎心矣見天下之善如不及從而佐之見天下之不善如探湯從而誨之則卒蹈於中庸飜然於不迪已過半矣中朝議政或疑㣥謀未允公援六經伸百氏覆於時事事舉其中天下莫不諷誦焉文集經亂離多散逸今其存者二十九卷長子成甫進士擢第校書郎陝縣尉知名當時不幸早世嗣子祐甫論譔先志一卷為第三十卷傳祖禰之美合於禮經見公文章知公行事則人倫之敘治亂之源備矣豈唯化物諧聲為文章而已乎奉詔修道德經疏藏於三閣行乎天下反魏晉之浮誕合立言於世教其於道也至乎哉祐甫純孝而文直清而和希公門者謂公存焉明發不寐泣次遺文以華北州隣壤婚姻之舊嘗趨公門備閱家編祐甫代華為校書郎華以是味公之道也熟詞則不敏有古之直焉開元天寶間詞人以德行著於時者曰河南元君德秀字紫芝其行事趙郡李華為墓碣已書之矣以文學著於時者曰蘭陵蕭君穎士字茂挺梁鄱陽忠烈王之後曾祖某官大父某官考諱某莒縣丞咸有德不至尊位君七歲能誦數經背碑覆局十歲以文章知名十五譽高天下十九進士擢第歷金壇尉桂州參軍祕書正字河南參軍辭官避地江左永王修書請君君遁逃不與相見淮南節度使表君為揚州功曹參軍相國諸道租庸使第五琦請君為介君以先世寄殯嵩條因之遷祔終事至汝南而歿嗚呼春秋若干天下儒林為之顦顇君為金壇尉也會官不成為揚州參軍也丁家艱去官為正字也親故請君著書未終篇御史中丞以君為慢官離局奏謫罷職為河南參軍也寮屬多嫉君才名上司以吏事責君君拂衣渡江遇天下多故其高節深識皎皎如此君以為六經之後有屈原宋玉文甚雄壯而不能經厥後有賈誼文詞最正近於理體枚乘司馬相如亦王褱麗才士然而不近風雅揚雄用意頗深班彪識理張衡宏曠曹植豐贍王粲超逸稽康標舉此外皆金相玉質所尚或殊不能備舉左思詩賦有雅頌遺風干寶著論近王化根源此後敻絕無聞焉近日陳拾遺子昂文體最正以此而言見君之述作矣君以文章制度為己任時人咸以此許之不幸歿於旅次有文十卷卷行於代其篇目雖存章句遺落古所謂有其義而無其詞者也後之為文者取以為法焉今海內至廣人民至眾求君之比不可復得難乎哉君有子一人曰存為蘇州常熟縣主簿雅有父風知名於代以華平生最深見託為敘力疾直書云爾開元天寶之間海內和平君子得從容於學以是詞人材碩者眾然將相屢非其人化流於苟進成俗故體道者寡矣夫子門人德行言語政事文學四者無人兼之雖德尊於藝亦難乎備也後之學者希慕先賢其著也亦名高天下行修言道以文吾見其人矣宏農楊君諱極字齊物隋觀德王之後祖正基魯王府諮議父珣永平令得進士舉邦族高之君幼孤事繼母以孝聞讀書務盡其義為文務申其志義盡則君子之道宏矣志申則君子之言信矣舉進士時刑部侍郎樂安孫公逖以文章之冠為考功員外郎精試㣥材君以南陽張茂之京兆杜鴻漸瑯邪顏真卿蘭陵蕭穎士河東柳芳天水趙驊頓邱李琚趙郡李㟧李欣南陽張階常山閻防范陽張南容高平郗昂等連年高第華亦與焉既而丁艱禮足哀餘名教稱之外調補太子正字歷右驍衞騎曹參軍求道於宏正禪師百千人中獨受心要與清河張茂之房安禹鉅鹿魏幼卿為禪慧之交河南元德秀陸據崔器范陽盧治為道義之交大官薦賢使臣請介莫不推君為首以方外為意不之受也識者讜議以論道許之質純氣和動必由道談笑中雅名理入元所著文章多入元中雅之才者也不幸嬰風疾逝於京洛享年五十八向道之流聞之涕洟君及張房既沒而狂胡起逆殘虐天下神祐善人安靜其終始乎終始之理至矣遊方之內為哀遊方之外為道或固然歟永泰二年余旅疾延陵故人之孤更來候余君孤子年十餘一身奉親孝敬和敏有先人風與余隣居炊汲相望候余小間捧君之集十卷詩賦贊序頌記策凡一百七十五篇咨余為序眎之愴然且名之曰德元字之曰長宗昔許衞尉與徐孝穆友善衞尉孤善心年在童孺奉孝穆牋曲盡情理孝穆憐之延譽當時況德元在羇旅之中集先人文拜乎床下求宣往烈余於孝穆之感不其倍乎乃如其篇第因舉其行事以德元幼孤不知先父之執故為備陳之侍御韋公延安威清江漢舅氏員外象名高天下賓主相待賢乎哉王師雷行北舉幽朔太尉公分麾下之旅付帷幄之賓與前相張洪州夾攻海寇方收東越夏首地當郵置吉語日聞喜氣填塞於江湖生人鼓舞於王澤頭陁古寺簡棲遺文境勝可以澡濯心靈詞高可以繼聲金石二大夫會臺寺之賢攜京華之舊十有餘人燦如瓊華輝動江甸涉金地登朱樓吾無住心酒亦隨盡將以斗擻煩襟觀身齊物日照元氣天清太空無有遠近皆如掌內辨衡巫於點黛指洞庭於片白古今橫前江下茂樹方黑春雲一色曰屈平宋玉其文宏而靡則知楚都物象有以佐之舅氏謂華老於文德忘其瑣劣使為諸公敘事不敢煩也詞達而已矣侍御歷總漢上湖陰江左之賦王府之入不匱愛人之頌有餘前相國劉公居佐帝庭行恤人隱侍御時賢高譽盛府舊僚傳檄速駕江城風動當天心厭兵品物思理將束貪狼之口掩破骨之傷濡足而前化危為安此大丈夫懸弧四方之志與夫竄身漁釣山林枯槁異日論也天下有道貧且賤焉恥也今聖人在上夔龍宣力而老夫甘心貧賤得非人生窮達固有分耶方理舟潯陽追跡幽人解纓網陵顥淳雖病痼齒衰而神王顦顇之中齊榮辱一視聽是非哀樂無自入矣侍御忽告余行余知悒焉軫心豈紛累未滌將悲亦有道且以簪擊茶甌歌而餞之曰江沈兮雨淒淒洲渚沒兮元雲低傷別心兮聞鼓鼙舅氏適越華拜送西階之下俟命席端舅氏曰吾交侍御鮑君夫玉待琢者也知我者鮑君成我者鮑君是以如越求琢於鮑昔子路去魯告顏生曰何以贈我夫贈人以言古之道也況背楚山淩淛河覩會稽之險棹鏡水之波窺禹穴之冥冥仰秦望之峨峨如不誡我汝將若何華拜手曰柔而立咎繇所以成九德也寬而靜師乙所以諧五聲也文犀明珠之珍伏於掌握之間此君子所以恢令名也再拜稽首君子既學之患不能行也河南房敬叔其行之者歟我思古人之道其房君哉安親於羇旅之中講道於茅茨之下不改其樂以文會友吾與房也顏子屢空曾參衣敝聞宋之君子落落有奇節奇節發於仁義者也以顏曾之行求仁義之均勉旃斯有望士之舒羽毛宣聲調不在高位在有道自王充元晏左思名盛當時價壓百代嶭都卿以夷澹養素以文章導志自浙右游湖左一句一韻遍於衣冠江山為之鮮潤烟景以之明滅其餘情性所得葢古人之儔歟南陽有略兼有道之高元晏之道論其措意則王充左思豈其遠乎惠然訪余告以行邁將棹溪吳越濡札江嶠東南勝事落爾胷中況為諸侯上賓知大夫之官族古所貴勉之哉病叟李遐叔贈中明檢而能曠年邁體衰而人罕知之陽羡山深水濶海隅幽阻而人罕知之以中明之元姿默識陽羡之清漪秀石人乎哉清乎哉之子所以為貴也詩者輔佐情懷其舊俗則泰伯之讓德延陵之高風因是而佐王孫緣物而興之遠也矣邯鄲遐叔風病目疾家貧不能具藥爰以言自醫南陽張士容引帽攝策晨告余行曰雖耕楚田而無耰費相里杭州刑部郎李君以道教我以文博我將求飦粥於二賢可乎余諗之曰嘗讀大雅美張仲之德子其後乎欲而求仁愚以為可今賢士君子多在江淮之間吾子見二大夫必開館拂席聆相如之玉聲盡家之有無也不爾者人而不仁如禮何人而不仁如樂何息言息言此獲麟之絕筆也見觀送蘭州兄詩敬不踰節情而中禮是篇也得詩人之一端矣先王省方命太師陳詩以觀人風固非遠嶠之松雪清江之雲月變也久矣將如之何觀其勉之在昔蘭陵府君平棘闕公柏人懿公兄弟三人有重名於天下鉅鹿蘭陵之穆也故揚州孝公後之觀之世父也高平平棘之嫡也吾後之宣成文昭公柏人之嗣也故中丞蘇州後之夫知卿大夫之族姓班位之高下見貴春秋而此道將兦自族之不知況他人乎觀於經感士丐郯子之祖德於史慕子長孟堅之自敘羇旅無書往吳中蒐以備家傳之遺闕附之於篇吾病矣老矣是行也慰我祗命聿修之心永泰二年四月庚寅叔父華序廬江何秀才棹流千里候余柴門執弟子見師之禮余竦然自愧何德以堪之意者賢大夫賈廬州待余異等談余過實是以致秀才神邁氣專文詞有調孤雲超忽逈出秋江若游公卿間必成名然赤光湛盧擬物冰斷其發也在礪磨而已用此申千里之報也何氏之先喆比干德通神明受策阜昌世為大官有勳有德遹追來孝亦以祝秀才也元老趙公華忝疇年之歡夫貴與尊議功論德不究其涯秀才將奉郡之命宣方面之烈我思古人實獲我心華與二賢早相得偕修君子之儒而獨無成偕勵人臣之道而獨失節偕遇文明之運而獨衰病天寶中奉詔廉軍政北至朔垂駐車山陰辱司徒公太尉公一盼之恩先時為伊闕尉忝相公尚書約子孫之契不幸孤負所知虧頓受汙流落江湖於今六年大明升於陽谷幽蟄附於光輝元惡掃除太階如砥天下衣冠謂華為相府故人詔書屢下促華赴職稽首震惶恨無毛羽左司員外郎張公侍御史相里公殿中侍御史張公監察御史范公嚴公望高職雄持斧登車江湖霜清道路風起華也潦倒龍鍾百疾叢體衣無完帛器無兼蔬以妻子為童僕以笠履為車服並轂無由呻吟舟中大別之陽有焞龜之父揲蓍之老華請占命之厚薄乃裹龜囊蓍而言曰三靈人為宗則人過於蓍龜也耳目主於心則心過於視聽也足下被儒者之服讀先聖之書與身消息足知性命胡為而煩予予之二物不足占足下華病不能拜拳拳扣顙敬陳先生況服勤西方之教久齊生死之域言其外者則儒不成矣與匹夫同敗名節矣與墨劓同既衰病矣與廢疾同雖牽率危憊匍匐顛沛君父含宏宰政不遺適為朝廷之穢相府之羞也又安得恃為故人哉其內者則大師微旨幸遊其藩甘露灌注於心源寶月照明於眼界無得之分可與進矣負薪之憂忍不為言江亭憑檻平視漢皋武昌柳暗湓城花發一榮一枯有懽有慼離別之念又焉得不悲乎四言詩雅之遺也以貺雅士盍以雅為贈乎則知車馬佩玉之多反為末也病夫李華序
