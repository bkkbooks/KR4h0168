front:
  text: 全唐文欽定全唐文卷九百九十九默棘連姓阿史那氏號小殺初為突厥左賢王開元四年其弟默啜討九姓拔曳固戰死兄闕特勒殺默啜子而立之是為毗伽可汗二十年為其大臣梅録毒死
  hash: sha256:8b51156fb9d8565b4d1031a44a1b2037f54e134e5107330dfc64bcf92006dd07
  markers:
  - {type: head, offset: 14, content: 突厥可汗默棘連, id: KR4h0168_NFKB_999-h1, level: 1}
body:
  text: 自遣使入朝已來甚好和同一無虛誑蕃漢百姓皆得一處養畜資生種田力作今許降公主皇帝即是阿助卑下是兒一種受恩更有何惡謹使可解栗必謝婚他滿達千請期獻馬四十匹充押函苾伽骨咄祿可汗默棘連子其兄伊然可汗死繼立開元二十八年冊為登利可汗為其從父判闕特勒所殺頂禮天可汗如禮諸天奴身曾祖已來向天可汗忠赤每徵發為國出力今新年獻月伏願天可汗壽命延長天下一統所有背恩逆賊奴身共拔汗那王盡力支敵如有歸附之奴即和好今謹令大首領伊難如拜賀娑葛西突厥十姓之一其部落名突騎施初為唱鹿州都督景龍二年其父烏質勒死冊封金河郡王三年為部將闕啜所殺與漢本來無惡只讐於闕啜而宗尚書取闕啜金枉擬破奴部落馮中丞牛都護相次而來奴等豈坐受死又聞史獻欲來徒擾亂軍州恐未有寧日乞大使商量處置夷男姓薛氏乙失鉢可汗孫其先滅延陀而有其衆因號薛延陀部為西突厥屬國貞觀三年遣使朝貢冊為真珠毗伽可汗十二年封其二子為小可汗高昌雖貌事至尊而翻覆不實擅發兵與欲谷設擊天子所立之國奴受國厚恩常思報效乞發所部為官軍前驅以討之處木毗匐延闕律啜西突厥十姓之一開元二十一年與拔塞幹部落鼠尼施部落阿悉結部落弓月部落哥舒部落同請內附二十八年以處木毗匐延闕律啜為右驍衛員外郎大將軍臣等生在荒裔久闕朝宗國亂主薨互相攻殺賴陛下聖恩遐布愍念蒼生令磧西節度使蓋嘉運統領兵馬撫臣遠蕃誅暴拯危存恤蕃部臣等伏願稽首聖顏兼將部落於安西管內安置永作邊扞長為臣子今者載馳驤首天路不任喜躍之至棄宗弄讚論贊素贊普子亦名棄蘇農亦號弗夜氏貞觀中遣使求昏妻以宗女文成公主永徽元年授為駙馬都尉封西海郡王進封賨王是年卒聖天子平定四方日月所照之國並為臣妾而高麗恃遠闕於臣禮天子自領百萬度遼致討隳城陷陳指日凱旋夷狄才聞陛下發駕少選之間已聞歸國雁飛迅越不及陛下速疾奴忝預子壻喜百常夷夫鵝猶雁也故作金鵝奉獻棄隸蹜贊器弩悉弄贊普子長安三年嗣立景龍二年遣使俄宗請昏以雍王守禮女為金城公主妻之天寶十載卒仲冬極寒伏惟皇帝舅萬福使典軍馬集併吐蕃使判悉獵等同至其書共傳語并悉具委所緣和事者孝和帝在日其國界並是逐便斷當訖彼此亦已盟誓漢宰相等官入誓者僕射豆盧欽望魏元忠中書令李嶠侍中紀處訥蕭至忠侍郎李迥秀尚書宗楚客韋安石楊矩等一十人吐蕃宰相等亦同盟誓訖遂迎公主入蕃彼此安穩於後太上皇登極親好並相和同雖復如舊其漢宰相入誓者並已歿於後宰相不知已前要契當令望重立盟誓舅甥各親署盟書宰相依舊作誓彼此相信亦長安穩此處使人論乞徐尚奔時俄宗等前後七回入漢比論皇帝舅親署誓書事復遣宰相作誓外甥亦親署宰相亦作呪如此使七回來去阿舅却報言舅甥親自手署誓書及彼此宰相作呪阿舅云大是好事及至今日阿舅手署不見宰相作呪亦無又西頭張元表將兵打外甥百姓又李知古亦將兵打外甥百姓既緣如此違誓失信所以吐蕃遂發兵馬今奉阿舅書以前所有嫌惡並悉不論自今以後依前和睦大是好事在此外甥亦同阿舅來意阿舅必定和好所以遣使人往來亦得文不須重盟誓者緣孝和皇帝時舊漢宰相人盟誓者並無阿舅必以和好不重作盟誓彼此不相信要須新立盟誓即日未知國事亦不繇官寮並皆自決但是百姓擬遣安業久長快活阿舅書上雖道和好意中不專知有何益今日必定和好此處速却回的實相報來書云乞力徐此集兵馬者准舊例兵馬新舊交替若道別集兵馬並是虛言又往者平論地界白水已來中間並合空閒昨秋間郭將軍率聚兵馬於白水築城既緣如此吐蕃遂於界內亦築一城其兩國和同亦須迎送使命必若不和其城彼此守捉邊境又以北突厥骨吐祿共吐蕃交通者舊時使命實亦交通中間舅甥和睦已來准舊平章其骨吐祿阿舅亦莫與交通外甥亦不與交今聞阿舅使人頻與骨吐祿交通在此亦知為不和中間有突厥使到外甥處既為國王不可久留外國使人遂却送歸即日兩國和好依舊斷當吐蕃不共突厥交通如舅不和自外諸使命何入番任使伊去來阿舅所附信物並悉領外甥今奉金胡瓶一瑪瑙杯一伏惟受納外甥是先皇帝舅宿親又蒙降金城公主遂和同為一家天下百姓普皆安樂中間為張元表李知古等東西兩處先動兵馬侵抄吐蕃邊將所以互相征討迄至今日遂成釁隙外甥以先代文成公主今金城公主之故深識尊卑豈敢失禮又緣年少枉被邊將讒搆鬬亂令舅致怪伏乞垂察追留死將萬足前數度使人入朝皆被邊將不許所以不敢自奏去冬公主遣使人婁衆失力將狀專往蒙降使看公主來外甥不勝喜荷護遣諭名悉獵及副使押衙將軍浪些紇夜悉獵入朝奏取進止兩國事意悉獵所知外甥蕃中已處分邊將不許抄掠若有漢人來投便令却送伏望皇帝舅遠察赤心許從舊好長令百姓快樂如蒙聖恩千年萬歲外甥終不敢先違盟誓謹奉進金胡瓶一金盤一金碗一瑪瑙杯一羚羊衫段一謹充微國之禮使人李行禕至奉書又尚他辟回日所令傳語並具承命且漢與吐蕃俱是大國又復先來宿親自合同和天下蒼生悉皆快活贊揚盛德當無盡期及至久長亦無改變恐彼此邊界黎庶不委長和慮有惡人妄生亂意請彼此差使相監從沙州已來洮州已來分明報告使無疑慮即將永定今奉皇帝金銓馬瑙胡瓶羚羊衫段金銀餅盤器等以充國信可黎可足元和十二年立為贊普長慶元年遣使請盟會昌二年卒蕃漢二邦各守見管本界彼此不得征不得討不得相為寇讐不得侵謀境土若有所疑或要捉生問事便給衣糧放還今並依從更無添改坌達延吐蕃宰相舊唐書作大將坌達焉開元二年上書請盟兩國地界事資蚤定界定之後然後立盟書大夫解琬昔在安西界望使會於河源相與展議蕃之願也鼎東謝大酋長官正議大夫檢校蠻州長史繼襲蠻州刺史資陽郡開國公貞元十三年奏請朝貢前件刺史建中三年一度朝貢自後更不許隨例入朝今年懇訴稱州接牂牁同被聲教獨此排擯竊自慙恥謹遣隨牂牁等朝賀伏乞特賜優諭兼同牂牁刺史授官其牂牁兩州戶口殷盛人力強大鄰側諸蕃悉皆敬憚請比兩州每年一度朝貢仍依牂牁輪環差定并以才幹位望為衆推者充異牟尋姓蒙氏南詔王閣羅鳳孫大歷十四年嗣立貞元十四年遣使求內屬賜黃金印文曰貞元冊南詔印元和三年卒異牟尋世為唐臣曩緣張虔陀志在吞侮中使者至不為澄雪舉部惶窘得生異計鮮于仲通比年舉兵故自新無由代祖棄背吐蕃斯孤背約神川都督論訥舌使浪人利羅式眩惑部姓發兵無時今十二年此一忍也天禍蕃廷降釁蕭牆太子弟兄流竄近臣橫汙皆尚結贊陰計以行屠害平日功臣無一二在訥舌等皆冊封王小國奏請不令上達此二忍也又遣納舌逼城於鄙敝邑不堪利羅式私取重賞部落皆驚此三忍也又利羅式罵使者曰滅子之將非我其誰子所富當為我有此四忍也今吐蕃委利羅式甲士六十侍衛因知懷惡不謬此一難忍也吐蕃陰毒野心輒懷搏噬有如偷生實汙辱先人辜負部落此二難忍也往退渾王為吐蕃所害孤遺受欺西山女王見奪其位拓拔首領並蒙誅刈僕固志忠身亦喪亡每慮一朝亦被此禍此三難忍也往朝廷降使招撫情心無二詔函信節皆送蕃廷雖知中夏至仁業為蕃臣吞聲無訴此四難忍也曾祖有寵先帝後嗣率蒙襲王人知禮樂本唐風化吐蕃詐紿百情懷惡相戚異牟尋願竭誠自新歸款天子請加戍劍南西山涇原等州安西鎮守揚兵四臨委回鶻諸國所在侵掠使吐蕃勢分力散不能為強此西南隅不煩天兵可以立功云貞元十年歲次甲戌正月乙亥五日己卯雲南詔異牟尋及清平官大軍將與劍南西川節度使巡官崔佐時謹詣點蒼山北上請天地水三官五嶽四瀆及管內川谷諸神靈同請降臨永為證據右異牟尋乃祖乃父忠赤附漢去天寶九載被姚州都督張虔陀等離間部落因此與漢阻絶經今四十三年與吐蕃洽和為兄弟之國吐蕃贊普冊牟尋為東主王亦無二心亦無二志去貞元四年奉劍南節度使韋皋僕射書具陳漢皇帝聖明懷柔好生之德七年又蒙遣使段忠義等招諭兼送皇帝敕書遂與清平官大軍將大首領等密圖大計誠天地發於禎祥所管部落誓心如一去年四月十三日差趙莫羅眉楊大和眉等賫僕射來書三路獻表願歸清化誓為漢臣啓告宗祖明神鑒照忠款今再蒙皇帝蒙劍南西川節度使韋皋僕射遣巡官崔佐時傳語牟尋等契誠誓無遷變謹請西洱河點蒼山神祠巖盟牟尋與清平官洪驃利時大軍將段盛等請全部落歸附漢朝山河爾利即願牟尋清平官大軍將等福祚無疆子孫昌盛不絶管諸睒首領永無離二興兵動衆討伐吐蕃無不剋捷如會盟之後發起二心及與吐蕃私相山乃合或輒窺侵漢界白田地即願天地神祇共降災罰宗嗣殄滅部落不安災疾臻湊人戶流散稼穡産畜悉皆減耗如蒙漢與通和之後有起異心規圖牟尋所管疆土侵害百姓致使部落不安及有患難不賜救恤亦請准此誓文神祇共罰如蒙大漢和通之後更無異意即願大漢國祚長久福盛子孫天下清平永保元疆之祚漢使崔佐時至益州不為牟尋陳說及節度使不為奏聞天聽說牟尋赤心歸國之意亦願神祇降之災今牟尋率衆官具牢禮對西洱河奏請山川土地靈祇請漢使計山乃發動兵馬介心戮力共行討伐然吐蕃神川崑崙會同已來不假天兵牟尋盡收復鐵橋為界歸漢舊疆宇謹率㣥官虔誠盟誓共剋金契永為誓信其誓文一本請劍南節度隨表進獻一本藏於神室一本投西洱河一本牟尋留詔城內府庫貽誡子孫伏惟山川神祇同鑒誠懇嵯顛南詔弄棟節度王弄棟地名南詔別部元和十一年以南詔王勸龍晟不道殺而立其弟勸利賜姓蒙氏太和三年西川節度使杜元穎治無狀嵯顛陷卭戎巂三州四年上表請罪蠻軍比修職貢遽敢侵邊但杜元穎不恤三軍令入蠻疆作賊移文報彼都不見信故蜀部軍人繼為鄉導蓋蜀人怨苦之深祈我此行誅虐帥也誅之不遂無以慰蜀士之心願陛下誅之回相州人天寶中舉明經授巂州西瀘令巂州陷為南詔王閣羅鳳所虜更名蠻利以為清平官貞元中說異牟尋內附恭聞清濁初分運陰陽而生萬物川嶽既列樹元首而定八方道治則中外寧政乖必風雅變我贊普鍾蒙國大詔性業合道智覩未萌隨世運機觀宜撫衆退不負德進不慚容者也王姓蒙字閣羅鳳大唐特進雲南王越國公開府儀同三司之長子也應靈傑秀含章挺生日角標奇龍文表貴始乎王在儲府道隆三善位即重離不讀非聖之書嘗學字人之術撫軍屢聞成績監國每著家聲唐朝授右領軍衛大將軍兼陽瓜州刺史洎先詔與御史嚴正誨謀靜邊寇先王統軍打石橋城差詔與嚴正誨攻石和子父子分師兩殄凶醜加左領軍衛大將軍無何又與中使王承訓同破劍川忠績載揚賞延於嗣遷左金吾衛大將軍而官以材遷功由幹立朝廷照鑒委任兵權尋拜特進都知兵馬大將二河既宅五詔已平南國止戈北朝分政而越析詔餘孽于贈恃鐸鞘騙瀘江結彼凶渠擾我邊鄙飛書遣將皆輒拒違詔弱冠之年已負英斷恨茲殘醜敢逆大隊固請自征志在掃平梟于贈之頭傾伏藏之穴鐸鞘盡獲寶物並歸解君父之憂靜邊隅之祲制使奏聞酬上柱國天寶七載先王即世皇上念功旌孝悼往撫存遣中使黎敬義持節冊襲雲南王長男鳳迦異時年十歲以天寶入朝授鴻臚少卿因冊襲次又加授上卿兼陽瓜州刺史都知兵馬大將既銜厚眷思竭忠誠子弟朝不絶書進獻府無餘月將謂君臣一德內外無欺豈期奸佞亂常撫虐生變初節度章仇兼瓊不量成敗妄奏是非遣越雟都督竹靈倩置府東爨通路安南賦重役繁政苛人弊破南寧州都督爨通路歸王昆州刺史爨日進黎州刺史爨祺求州爨守懿螺山大鬼主爨彥昌南寧州大鬼主爨崇道等陷煞竹倩兼破安寧天恩降中使孫希莊御史韓洽都督李宓等委先詔招討諸爨畏威懷德再置安寧其李宓忘國家大計躡章仇詭蹤務求進官榮宓阻扇東爨遂激崇道令煞歸王議者紛紜人各有志王務遏亂萌思紹先績乃命大軍將段忠國等與中使黎敬義都督李宓又赴安寧再和諸爨而李宓矯僞居心尚行反間更令崇道謀煞日進東爨諸酋並皆驚恐曰歸王崇道叔也日進弟也信彼讒搆煞戮至親骨肉既自相屠天地之所不佑乃各興師召我同討李宓外形忠正佯假我郡兵內蘊奸欺妄陳我違背賴節度郭虛已仁鑒方表我無辜李宓尋被貶流崇道因而亡潰又越雟都督張虔陀嘗任雲南別駕以其舊識風宜表奏請為都督而反誑惑中禁職起亂階吐蕃是漢積讐遂與陰謀擬共滅我一也誠節王之庶弟以其不忠不孝貶在長沙而彼奏歸擬令間我二也崇道蔑盟搆逆罪合誅夷而郤收録與宿欲令讐我三也應與我惡者並授官榮與我好者咸遭抑屈務在下我四也築城收質繕甲練兵密欲襲我五也重科白直倍稅軍糧徵求無度務欲敝我六也於時馳表上陳屢申寃枉皇照察降中使賈奇俊詳覆屬豎臣無政事以賄成一信虔陀共掩天聽惡奏我將叛王乃仰天嘆曰嗟我無事上蒼可鑒九重天子難承咫尺之顏萬里忠臣豈受奸邪之害即差軍將楊羅顛等連表控告豈謂天高聽遠蠅點成瑕雖布腹心不蒙矜察管內酋渠等皆曰主辱臣死我實當之自可齊心戮力致命全人安得知難不防坐招傾敗於此差大軍將王毗雙羅時等揚兵送檄問罪府城自秋畢冬故延時序尚佇王命冀雪事由豈意節度使鮮于仲通已統大軍取南溪路下大將軍李暉從會同路進安南都督王知進自步頭路入既數道合勢不可守株乃宣號令誡師徒四面攻圍三軍齊奮先靈冥祐神炬助威天人協心軍㣥全拔虔陀飲鴆寮無出走王以為惡止虔陀罪豈加衆舉城移置猶為後圖即便就安寧再申衷懇城使王克昭執惑昧權繼違拒請遣大軍將李克鐸等帥師伐之我直彼屈城破將亡而仲通大軍已至曲靖又差首領楊子芬拜雲南録事參軍姜如之齎狀披雪往因張卿讒搆遂令蕃漢生猜贊普今見觀釁浪穹或以衆相威或以利相導儻若蚌鷸交守恐為漁父所擒伏乞居存見亡在得思失府城復置幸容自新仲通殊不招承劫至江口我又切陳丹款至於再三仲通拂諫棄親阻兵安忍吐發惟言屠戮行使皆被詆訶仍前差將軍王天運帥領驍雄自點蒼山西欲腹背交襲於是具牲牢設壇墠叩頭流血曰我自古及今為漢不侵不叛之臣今節度背好貪功欲致無上無君之討敢昭告於皇天后土史祝盡詞東北稽首舉國痛切山川黯然至誠感神風雨震霈遂宣言曰彼若納我猶吾君也今不吾納即吾讐也斷軍之機疑事之賊乃召卒伍間然登陴謂左右曰夫至忠不可以無主至孝不可以無家即差首領楊利等於浪穹參吐蕃御史論若贊論史通變察情分師入救時中丞大軍出陳江口王審孤虛觀向背縱兵親擊大敗彼師因命長男鳳迦異大軍將段全葛等於邱遷和拒山後贊軍王天運懸首轅門中丞逃師夜遁軍吏欲追之詔曰止君子不欲多上人況敢淩天子乎既而合謀曰小能勝大禍之胎親仁善鄰國之寶遂遣男鐸傳舊大酋望趙佺鄧楊傳磨計及子弟六十人齎重帛珍寶等物西朝獻凱屬贊普仁明重酬我勳效遂命宰相倚祥葉樂持金冠錦袍金寶帶金帳牀安扛傘鞍銀獸及器皿珂貝珠毯衣服駝馬牛鞻等賜為兄弟之國天寶十一載正月一日於鄧川冊詔為贊普鍾南國大詔授長男鳳迦異大瑟瑟告身都知兵馬大將凡在官僚寵幸咸被山河約誓永固維城改年為贊普鍾元年二年漢帝又命漢中郡大守司空襲禮內使賈奇俊帥師再置姚府將軍賈瓘為都督僉曰漢不務德而以力爭若不速除恐為後患遂差軍將王兵各絶其糧道又差大軍將洪光乘等神州都知兵馬使論綺里徐同圍府城信宿未踰破如拉朽賈瓘面縛士卒全驅三年漢又命前雲南郡都督兼侍御史李宓廣府節度何履光中使薩道懸遜惣秦隴英豪兼安南子弟頓營隴坪廣布軍威乃舟楫備修擬水陸俱進遂命軍將王樂寬等潛軍襲造船之師伏尸遍昆舍之野李宓猶不量力進逼澄川時神州都知兵馬使論綺里徐來救已至巴蹻山我命大軍將段附克等內外相應犄角競衝彼弓不暇張刃不及發白日晦景紅塵翳天流血成川積尸壅水三軍潰衄元帥沉江詔曰生雖禍之始死乃怨之終豈顧前非而亡大禮遂收亡將等尸祭而葬之以存恩舊五年范陽節度安祿山竊據河洛開元帝出居江劍贊普差御史贊節羅于恙結齎敕書曰樹德務滋長去惡務除本越巂會同謀多在我圖之此為美也詔恭承上命即遣大軍將洪光乘杜羅盛段附克趙附于望羅遷王遷羅奉清平官趙佺鄧等統細于藩從昆明路及宰相倚祥葉樂節度尚檢贊同伐越巂詔親帥太子潘圍逼會同越巂固拒被僇會同請降無害子女玉帛百里塞途牛羊積儲一月館穀六年漢復置越巂以楊庭璡為都督兼固臺登贊普使來曰漢令更置越巂作援昆明若不再除恐成滋蔓既舉奉明旨乃遣長男鳳迦異駐軍瀘水權事制宜令大軍將楊傳磨侔等與軍將欺急歷如數道齊入越巂再掃臺登滌除都督見擒兵士盡虜如是揚兵卭部而漢將大奔回斾昆明傾城稽顙可謂紹家繼業世不乏賢昔十萬橫行七擒縱略未足多也爰有尋傳疇壤沃饒人物殷湊南通渤海西近大秦開闢已來聲教所不及羲皇之後兵甲所不加詔欲革之以衣冠化之以禮義十一年冬親與僚佐兼總師徒刊木通道造舟為梁耀以威武喻以文辭款降者撫慰安居抵捍者繫頸盈貫矜愚解縛擇勝置城祼形不討自來祁鮮望風而至且安寧雄鎮諸爨要衝山對碧雞波環碣石鹽池鞅掌利及牂歡城邑綿延勢連戎僰乃置城監用輯攜離遠近因依閭閻櫛比十二年冬詔候隙省方觀俗恤隱次昆川審形勢言山河可以作藩屏川陸可以養人民十四年春命長男鳳迦異於昆川置拓東城居二詔佐鎮撫於是威懾步頭恩收曲靖頒告所及翕然俯從我王氣受沖和德含覆育才出人右辨稱世雄高視則卓爾萬尋運籌則決勝千里觀釁而動因利興功事協神衷有如天啓故能攻城挫敵取勝如神以危易安轉禍為福紹開祖業宏覃王猷坐南面以稱孤統東偏而作主然後修文習武官設百司列尊敘卑位分九等闢三教賓四門陰陽序而日月不愆賞罰明而奸邪屏跡通三才而制禮用六府以經邦信及豚魚恩霑草木厄塞流潦高原為稻黍之田疏決陂池下隰樹園林之業易貧成富徙有之無家饒五畝之桑國貯九年之廪蕩濊之恩纍沾蠢動珍帛之惠遍及耆年設險防非憑隘起堅城之固靈津蠲疾重巖湧湯沐之泉越睒天馬生郊大利流波濯錦西開尋傳祿郫出麗水之金北接陽山會川收瑟瑟之寶南荒奔湊覆詔願為外臣東爨悉歸步頭已成內境建都鎮塞銀生於黑觜之鄉候隙省方駕憩於洞庭之野蓋繇人傑地靈物華氣秀者也於是犀象珍奇貢獻畢至東西南北烟塵不飛遐邇無剽掠之虞黔首有鼓擊之泰乃能驤首卭南平眸海表豈惟我鍾王之自致實賴我聖神天地贊普德被無垠威加有截春雲布而萬物普潤霜風下而四海颯秋故能取亂攻昧定京邑以息民兼弱侮亡冊漢帝而繼好時清平官段忠國段尋銓等咸曰有國而致理君主之美也有美而無揚臣子之過也夫德以立功功以建業業成不記後嗣何觀可以刊石勒碑志功頌德用傳不朽俾達將來家世漢臣八王稱乎晉業鐘銘代襲百世定於當朝生遇不天再罹衰世賴先君之遺德沐求舊之鴻恩政委清平用兼耳目心懷吉甫愧無贊於周詩志效奚斯願齊聲於魯頌紀功述績實曰鴻徽自顧下才敢題風烈其詞曰降祉自天福流後允瑞應匪虛禎祥必信聖主分憂遐荒聲振襲久傳封受符兼印兼瓊秉節貪榮搆亂開路安南攻殘面爨竹倩見屠官師潰散賴我先王懷柔伏叛祚不乏賢先猷是繼郡守詭隨貶身遐裔禍連虔陀亂深豎嬖殃咎匪他途豕自殪仲通制節不詢長久徵兵海隅頓營江口赤心不納白刃相守謀用不臧逃師夜走漢不務德而以力爭興師命將置府層城三軍往討一舉而平面縛㣥吏馳獻天庭李宓總戎猶尋覆轍水戰陸攻援孤糧絶勢屈謀窮軍殘身滅祭而葬之情繇故設贊普仁明審知機變漢德方衰邊城絶援揮我兵戎攻彼郡縣越巂有征會同無戰雄雄嫡嗣高名英烈惟孝惟忠乃明乃哲卭瀘一掃軍㣥雙滅觀兵尋傳舉國來賓巡幸東爨懷德歸仁碧海效祉金穴薦珍人無常主惟賢是親土宇克開煙塵載寢轂擊梨坑輯熙㣥品出入連城光揚衣錦業留萬代之臺倉貯九年之廩明明贊普揚天之光赫赫我王實賴之昌化及有土業著無疆河帶山礪地久天長辨稱世雄才出人右信及豚魚潤深瓊玖德以建功是謂不朽石以刊銘可長可久智盛高昌王文泰子貞觀十四年嗣立尋為太宗所滅以其地置西州拜智盛左武衛將軍封金城郡公有罪於天子者先王也天罰所加身已喪背智盛襲位未幾不知所以闕冀尚書哀憐謹按天罰以下舊唐書作咎深譴積身已喪亡智盛襲位無幾君其赦諸王名無考其國即為東印度境弟子凡夫習染世樂於佛法中未知回向今聞外國僧名身心歡喜似開道芽之分師復不許其來此乃欲令衆生長淪永夜豈是大德紹隆遺法汲引物哉不勝渴仰謹遣重咨若也不來弟子則分是惡人近者設賞迦王猶能壞法毀菩提樹師謂弟子無此力耶必當整理象軍雲萃於彼踏那爛陀寺使碎如塵此言如日師好試看王名無考其國即為北印度境弟子行次烏荼見小乘師恃憑小見製論誹謗大乘詞理切害不近人情仍欲張鱗共師等一論弟子知寺中大德並才慧有餘學無不悉輒以許之謹令奉報願差大德四人善自他宗兼內外者赴烏荼國行從所達摩烏萇國王其國在天竺北貞觀十六年因陀訶斯遣使奉表獻方物大福德至尊一切王中上乘天寶車破諸黑暗譬如帝釋能伏阿修羅王奴宿種善根得生釋種拜至尊因獻龍腦香王名無考咸亨二年遣使請發兵取象訶迦國有白象首垂四牙身運五足象之所在其土必豐既有威靈又弭災患力兼十象強制百人以水洗牙飲之愈疾請發兵迎取以獻之烏勒伽姓溫氏昭武開元初遣使入貢七年與大食戰不勝來乞師二十七年卒臣烏勒伽言臣是從天主普天皇帝下百萬里馬蹄下草土類奴臣種族及諸胡國舊來赤心向大國不曾反叛亦不侵損大國為大國行裨益事從三十五年來每共大食賊鬬戰每年大發兵馬不蒙天恩送兵救助經今六年被大食元率將異密屈底波領衆軍兵來此共臣等鬬戰臣等大破賊徒臣等兵士亦大死損為大食兵馬極多臣等力不敵也臣入城自固乃被大食圍城以三百拋車傍城三穿大坑欲破臣等城國伏乞天恩知委送多少漢兵來此救助臣苦難其大食只合一百年強盛今年合滿如有漢兵來此臣等必是破得大食今謹獻好馬一波斯駱駝一䮫二如天恩慈澤將賜臣物請付臣下使人將來冀無侵奪篤薩波提氏昭武與康國同族其國名東安亦曰喝汗開元十四年遣弟阿悉爛達拂耽發黎來朝後八年又遣使入貢臣篤薩波提言臣是從天主領普天賢聖皇帝下百萬里草土類奴在遠叉手胡跪禮拜天恩威相如拜諸天自有安國已來臣種族相繼作王不絶并軍兵等並赤心奉國從此年來被大食賊每年侵擾國土不寧伏乞天恩慈澤救臣苦難仍請敕下突厥施令救臣等臣即統領本國兵馬計會翻破大食伏乞天恩依臣所請今奉獻波斯䮫二拂菻繡毺一鬱金香三十斤生石蜜一百斤臣今借紫訖伏乞天恩賜一員三品官又臣妻可敦奉進柘必大毺二繡毺一上皇后如蒙天恩慈澤請賜臣鞍轡器仗袍帶及賜臣妻可敦衣裳妝粉哥邏僕羅氏昭武與康國同族天寶元年遣使貢方物詔封懷德王宗祖以來向天可汗忠赤嘗受徵發望乞慈恩將奴國土同為唐國小州所須驅遣奴身一心忠赤為國征討伊捺吐屯屈勒氏昭武與康國同族別姓石開元初封其父莫賀咄吐屯為石國王九年伊捺吐屯屈勒嗣立請討大食不許奴身千代已來忠赤於國只如突厥騎施可忠赤之日部落安貼后背天可汗腳底火起今突厥屬天可汗在於西頭為患唯有大食莫踰突厥伏乞天恩不棄突厥部落打破大食諸國自然安貼支汗那阿史那葉護子其國在葱嶺西永徽三年列其地為月氐府以阿史那為都護開元七年支汗那嗣立十五年為大食所苦遣使請救獻解天文人大慕闍其人智慧幽深問無不知伏乞天恩喚取慕闍親問臣等事意及諸教法知其人有如此之藝能望請令其供奉并置一法堂依本教供養奴身罪逆不孝慈父身被大食統押應徹天聰頌奉天可汗進旨云大食欺侵我即與你氣力奴身今被大食重稅欺苦實深若不得天可汗救活奴身自活不得國土必遭破散求防守天可汗西門不得伏望天可汗慈憫與奴身多少氣力使得活路又承天可汗處分突厥施可汗云西頭事委你即須發兵除却大食其事若實望天可汗却垂處分奴身緣大食稅急不求得好物奉進望天可汗照之所欲驅遣奴身及須已西方物並請處分奴身一一頭戴不敢怠慢失里忙迦羅天寶八載遣使朝貢朅師引吐蕃攻吐火羅失里忙迦羅請安西兵助討元宗出師破之臣鄰境有一胡號曰朅師居在深山恃其險阻違背聖化親輔吐蕃知勃律地狹人稠無多田種鎮軍在彼糧食不充於箇失蜜市易鹽米然得支濟商旅來往皆著朅師國過其王遂受吐蕃貨求於國內置吐蕃城堡捉勃律要路自高仙芝開勃律之後更益兵三千人勃律因之朅師王與吐蕃乘此虛危將兵擬入臣每憂思一破凶徒若開得大勃律已東直至干闐焉耆臥涼瓜肅已來吐蕃更不敢停住望安西兵馬來載五月到小勃律六月到大勃律伏乞天恩允臣所奏若不成請斬臣為七段緣箇失蜜王向漢忠赤兵馬復多土廣人稠糧食豐足特望天恩賜箇失蜜王敕書宣慰賜衣物并寶鈿腰帶使感荷聖恩更加忠赤僕羅吐火羅葉護那都況利弟神龍元年入朝留宿衛僕羅克吐火羅葉護部下管諸國王都督刺史總二百一十二人謝䫻國王統領兵馬二十萬衆罽賓國王統領兵馬二十萬衆骨吐國王石汗那國王解蘇國王石匿國王悒達國王護密國王護時健國王范延國王久越德建國王勃特山王各領五萬衆僕羅祖父已來並是上件諸國之王蕃望尊重僕羅兄那都泥利承嫡繼襲先蒙恩敕差使持節就本國冊立為王然火羅葉護積代已來於大唐忠赤朝貢不絶本國緣接近大食吐蕃東界又是西鎮僕羅兄每徵發部落下兵馬討論擊諸賊與漢軍相知聲援應接在於邊境所以免有侵漁僕羅兄前後屢蒙聖澤愧荷國恩遂發遣僕羅入朝侍衛玉階至願獻忠殉命以為臣妾僕羅至此為不解漢法鴻臚寺不委蕃望大小有不比類流例高下相懸即奏擬授官竊見石國龜茲并餘小國王子首領等入朝元無功效並緣蕃望授三品將軍況僕羅身恃勒本蕃位望與親王一種比類大小與諸國王子懸殊却授僕羅四品中郎但在蕃王子弟娑羅門瞿曇金剛龜茲王子白孝順等皆數改轉位至諸衛將軍唯僕羅最是大蕃去神龍元年蒙恩敕授左領軍衛翊府中郎將至今經一十四年久被淪屈不蒙准例授職不勝苦屈之甚忽提婆俱羅國王其國與吐火羅接壤亦名俱蘭貞觀二十年遣使朝貢如雪如珠如雲如月潔白高遠是文夫枝清涼一切如須彌山又如大海威力自在如那羅延如日光明大王中王大漢國勝天子名流四海俱羅那國王忽提婆謹修禮拜羅火拔謝䫻國使臣謝䫻在吐火羅西南開元八年冊葛達羅支頡利發誓屈爾為王十二年遣其臣羅火拔來朝謝䫻國去箇失蜜國一千五百里箇失蜜國去吐蕃金城公主居處七日路程公主去年五月遣漢使二人偷道向箇失蜜國傳言曰汝赤心向漢我欲走出投汝容受我否箇失蜜王聞其言大喜報曰公主但來竭心以待時箇失蜜王又遣使報臣國王曰天子女欲走來投我國必恐吐蕃兵馬來逐我力不敵乞兵與我即冀吐蕃破散公主得達臣國王聞之極歡遣使許諾於箇失蜜王令臣入朝面取進止那羅延開元中遣使獻胡旋女表言為大食所苦其國在吐火羅東北臣曾祖父叔兄弟等舊來赤心向大國今大食來侵吐火羅及安國石國拔汗那國並屬大食臣國內庫藏珍寶及部落百姓物並被大食徵稅將去伏望天恩處分大食令免臣國徵稅臣等即得久長守把大國西門伏乞照臨臣之願也
