front:
  text: 全唐文欽定全唐文卷二十二元宗三
  hash: sha256:65e78ebda008b9d4e3a6db0457db8adb5128aedbe00efac9d0578bd5a79a6d7a
body:
  text: 古之良臣實難其人掌邦國之事明勸懲之道是以淑駿宏茂先博物爰自重臣式膺兼領銀青光祿大夫吏部尚書兼黃門監上柱國廣平郡開國公宋璟明允篤誠有犯無隱銀青光祿大夫行紫微侍郎黃門平章事上柱國許國公蘇頲忠肅恭懿察微知章並光我國禎熙我帝載在公聞山甫之頌抗直有史魚之節王言斯典曾是獻替君舉必書亦惟襃貶宜崇鼎鉉之任更述盤盂之篇並可修國史餘各如故主者施行朕聞理莫大於孝所以通神明事莫大於祀所以謁宗廟顧此薄德獲承丕緒恭虔夙夜弗敢遑寧去歲爰命有司增營太室尋以匠者功就饔人禮奉雖是傚是則率由舊章而不躬不親曷盡誠敬粵自河洛旋於京師聿修齋祭致用蠲潔屬㣥方駿奔庶位咸旅祼奠式受感懷載殷聖靈在天若享精意伊爾王公卿士下逮黎蒸道存念茲惠乃錫類七廟元皇帝以上三祖枝孫恐有失官序者宜各與五品京官皇祖妣諸家有子孫今在選敘者量加甄擇內外官三品以上有廟者各賜絹三十匹以修祭服俎豆緣謁廟亞獻邠王守禮終獻宋王憲各賜三百匹夾侍岐王範薛王業各賜絹二百五十匹自餘行禮及供奉三品以上賜一百六十匹四品一百四十匹五品一百二十匹六品一百匹七品八十匹八品六十匹九品四十匹鹵薄六引官各減一等押仗官又減一等攝官依本官給有兼充諸使者加一等兩京文武官并朝集使諸方道表一品七十匹三品六十匹四品五十匹六品七品四十段九品三十段從者加一等皇親諸親準品等禮儀置頓營幕使各賜物一百段副使八十段判官及修定儀注官各減三分之二行所州縣刺史上佐縣令等各準行從官與賜其給賜人應兩處以上者從一多給唯有廟官之賜聽兼給謁廟有所修造專當官及當頓官始末不絕者各賜一半上考知頓州各免一年租及地稅傍州緣頓供承者亦準此行事齋郎及權補充者各賜物十段升階者各賜物十五段三衞飛騎萬騎并仗內無品人等賜五段十月正番衞士等各賜三段緣道路及置營幕損百姓麥苗者宜令州縣檢量優還價直餘應得而制書缺載者所司類例以聞建侯樹藩命賢裂土以惇戚屬乃率典常司徒兼絳州刺史上柱國申王撝玉林分彩銀河䟽液厥保慶靈未繁裔緒宋王憲男嗣英魯廷學禮楚館聞詩德輝日盛忠概特立宜其釋猶子之序居承嫡之位廬江大郡形勝攸屬用圖爾居莫如茲地是錫分珪之寶俾承磐石之宗可封懷寧郡王食邑三千戶在昔王者旌賢睦姻莫不存賁寵光歿加禮冊故開府儀同三司王仁皎神仙望族禮樂通材履道純粹執心夷自大邦有子中闈作合以外舅之勞參上公之位績宣揚歷誠著始終方保期頤遽從薨落興言震悼用惻於懷宜依常典式慰塋魂可贈益州大都督贈物三千段米粟二千石喪葬事並官供務從優厚仍賜東園祕器宜令銀青光祿大夫守工部尚書上柱國彭城郡開國侯劉知柔攝鴻臚卿監護通議大夫行京兆尹上護軍崔琬為副銀青光祿大夫守太子詹事上柱國安南縣開國侯龐承宗持節齎書弔祭左庶子上護軍白知慎為副在京五品以上官更須就弔官為立碑爰分寶玉載錫綏章必在親賢致之侯甸開府儀同三司兼涇州刺史上柱國宋王憲儀表碩望忠肅令名藝總經書才推禮樂列上公之位兼大藩之寵瞻彼行圍舊稱茅邑孰如北地今邇西都宜考良日之封用宏景風之命可改封寧王食邑三千戶餘如故元良所以主匕鬯奉社稷貞於萬國祝以三加皇太子居長德之地務親仁之道爰就師保克修志業寢門問安而資敬大學齒冑而徵善大猷且酌元服宜申史稱周誦之年傳紀魯襄之禮粵若敬始謂之成人逮茲建正式展嘉事可以來年正月加元服所司擇日奏聞禮官博士詳考故實允符令典頃者以庸調無憑好惡須準故遣作樣以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端苟欲副於斤兩遂則加其丈尺有至五丈為匹者理甚不然闊尺八寸長四丈同文共軌其事久行立樣之時巳載此數若求兩而加尺甚暮四而朝三宜令所司閱有踰於比年常例尺丈過多者奏聞故道士鴻臚卿員外置越國公葉法善天真精密妙理幽暢包括祕要發揮靈符固以冥默難原希夷罕測而情棲蓬閬迹混朝伍保黃冠而不拔加紫綬以非榮卓爾孤秀冷然獨往勝氣絕俗貞風無塵金骨外聳珠光內映斯乃體應中仙名昇上德朕嘗聽政之暇屢詢至道公以理國之法數奏昌言謀參隱諷事宣宏益歎徽音之未泯悲懸解之俄留何莫憗遺殲良奄及永惟平昔感愴於懷宜申禮命式賁泉壤可贈越州都督五刑之用以禁奸慝三宥之設以矜愚耄朕永康四海憂在兆人俾遵大化爰措庶獄而愚妄之輩抵犯或聞向隅可哀當宁興軫今天地既肅申嚴在命時分其令罪則無留載懷幽犴思布生德宜崇減死之恩式明宥過之典其京城內犯罪人等時令按覆其中造偽頭首及謀殺人斷死者決一百配流嶺南惡處雜斷罪死者決一頓免死配流遠處雜犯流移者各減一等杖罪巳下並免源弼等父在樞近深惟謙挹恐代官之咸列慮時才之未序率先庶僚崇是讓德既請外其職復降官以授傳不云乎晉范宣子讓其下皆讓晉國之人於是大和道之或行仁豈云遠因令文武百寮父子兄弟三人併任京司者任自通融依資次處分國家祖武宗文重熙累洽克清寰極大庇生人元德獨化放乾元而資始至道無名合帝先而首出自削平區宇混一車書六合晏然百有餘歲則我文武之業大造於上靈朕嗣守丕運纉承洪緒恐不能誕敷前烈光闡睿圖夙夜祗畏如臨泉谷曷嘗不恭默思道夢寐求政從人之欲每以萬姓為心屈己之勞嘗矜一物失所但以法久而弊法弊則通制國以立法為先教人以占著為事自屬清晏人多偷怠國章或弛甿偽實繁今正朔所及封疆無外雖戶口既增而稅賦不益莫不輕去鄉邑共為浮惰或豪人成其泉藪或奸吏為之囊橐逋亡歲積流蠧日滋州縣不以為矜鄉隣實受其咎雖朕之薄德罪則在予非官無政吏不守法耳若浸以久安而肆之則國之隄防於是踰紊今欲去其末而歸其本閉其邪而正其德使法有所立人知向方是用恤孤窮免逋貸式廣自新之路俾申莫厚之恩諸州背軍逃亡人限制到日百日內各容自首準令式合所在編戶情願住者即附入簿籍差科賦歛於附入令式仍與本貫計會停徵若情願歸貫及據令式不合附者首訖明立案記不須差遣先牒本貫知容至秋收後遞還情願即還者聽待本鄉訖免今年賦租課役如滿百戶以上各令本貫差官就戶受領過限不首並即括取遞邊遠附為百姓家口隨逃者亦便同送若限外州縣公私容在界內居停及事有未盡所司明為科禁其天下勾徵逋懸及貸糧種子地稅在百姓限內先有追收之文案未納者自開元七年十二月以前並宜放免官典隱欺不在免限將使百度伊始萬邦在宥人復其業官修其方凡厥庶寮各虔爾職俾率訓典以康政途布告遐邇使知朕意門下乾坤以陰陽化成后王以輔相興理所以寅亮天工緝熙帝圖非夫大賢孰寄斯任天兵軍節度大使右羽林將軍兼并州長史攝御史大夫燕國公兼修國史張說挺其公才生我王國體文武之道則出將入相盡忠貞之節亦前疑後丞諒可以宏此大猷總其邦政允釐庶績保乂皇家可守兵部尚書同中書門下三品勳封修國史如故仍即馳驛赴京朕頃自鎬京省方於雒本以息轉輸之費即河瀍之殷今屬宗廟改修禮崇昭事永言配享必在躬親又眷彼晉陽是稱重鎮將陳詩以問俗式安邊而訓武雖來往祗供頗有煩役而國之大事不可云勞宜以明年正月三日發雒幸并州取便路還京應須支計所留準式緣頓祗承一事巳上並用當處官物不許科歛百姓其遞運及從兵馬官寮等務須從減省所在公私并不得輒有進獻違者所繇州縣官及進獻人各量事貶罰布告遐邇咸使聞知祕書監姜皎往屬艱難頗效誠信功則可錄寵是以加既忘盈滿之戒又虧靜慎之道假說休咎妄談宮掖據其作孽合處極刑念茲舊勳免此殊死宜決一頓配流欽州朕君臨宇內子育黎元內修睦親以敘九族外協庶政以濟兆人勳戚加優厚之恩兄弟盡友于之至務崇敦本克慎明德今小人作孽巳伏憲章恐不逞之徒猶未能息凡在宗屬用申懲誡自今巳後諸王公主駙馬外戚家除非至親以外不得出入門庭妄說言語所以共存至公之道永協和平之義克固藩翰以保厥休貴戚懿親宜書座右混成不測入寥自化雖獨立有象而至極則冥故王屋山道士司馬子微心依道勝理會元遠遍遊名山密契仙洞存觀其妙逍遙自得之場歸復其根宴息無何之境固以名登真格位在靈官林壑未改遐霄巳曠言念高烈有愴於懷宜贈徽章用光丹籙可銀青光祿大夫號真一先生漳州懷恩縣尉員外置鍾紹京夙負藝能早申誠節錄其殊效賜以崇班未答恩私自招瑕累雷雨作解品物惟新言念舊勞稍加甄敘可郴州別駕百官等祿秩既優勳賢是寄皆合守其正道無宜聽彼異端至如卜祝之流妄陳休咎占之輩假託徵祥誑惑既生違斯作因搆讒慝遂行訕毀取陷網羅良增歎息懲一足以勸百有犯不可無刑姦狡以此累身百僚誠宜飭己自今巳後各宜謹慎並不得與如此等色及無職人交遊來往仍令御史訪察有即彈奏當加嚴罰龍樓內範輔成元良之德鳳邸中闈克諧樂善之美自非門地兼茂容則聿修何以式副好逑允茲華選薛縚第六女竇希瑊第四女戚里承休渭陽傳慶婉順成性柔閒有容言必圖史之規動遵珩珮之節惠問蘭郁清心玉映足以儷青宮之寵伉朱邸之義式昭閫訓用光嬪則縚女可皇太子妃瑊女可慶王妃仍令所司備禮至都冊命炎漢盛禮蕃國是和烏孫降公主之親單于聘良家之子永惟前史率由舊章故成安公主女韋氏六行克昭四德聿備漸公宮之訓承內家之則屬林胡拜命扞塞無虞柔遠之恩巳歸於上略采楚之慶載睦於和親宜正湯沐之封式崇下嫁之禮可封東光公主出降饒樂郡王魯蘇漢圖既采蕃國是親公主嫁烏孫之王良家聘氈裘之長欽若前志抑有舊章餘姚縣主長女慕容氏柔懿為德幽閒在性蘭儀載美蕙問增芳公宮之教夙成師氏之謀可則今林胡請屬析津闕雖無外之仁巳私於上略而由內之德亦資於元女宜光茲寵命睦此蕃服俾遵下嫁之禮以叶大邦之好可封為燕郡公主出降與松漠郡王李鬱于經邦創制建都設險必因時順人統物立極我國家以神武聖德應天受命龍躍晉水鳳翔太原建萬代之模為億兆之主猶成湯之居亳有周之興岐顧朕眇身纂承昌運守宗社之大寶恢中原之鴻業叶時卜狩始經此都事本因心情兼惟舊近者嘉祥薦至休瑞屢臻此皆宗祏降靈神祇潛暨豈予匪德獨享厥休昔堯理唐郊式建丹陵之地漢居洛邑更表南陽之都今王業正興宮觀猶在列於邊郡情所未安非所以恢大聖之鴻規展孝思之誠敬其并州宜置北都改州為太原府刺史為尹司馬為少尹太原晉陽為赤縣諸縣為畿縣官吏品第視京洛兩府條理朕爰自瀍雒有事省方乘發生之和因豫動之慶將欲恤鰥寡問老疾陳詩展禮黜幽陟明使滯伏必申微物咸遂其行幸所至處宜令刺史縣令存問百年老病鰥寡惸獨及行人家如有單貧不濟不能存活者量加賑給其侍老仍各賜物三段見禁囚徒除十惡及身犯反逆并造偽頭首以外自餘雜犯流死等罪各減一等徒以下放免百姓有賢良官人有清白並令中書門下採訪名聞其貪濁之吏委御史覺察彈奏中書令張嘉貞備位宰相夙承恩命不能勵其公節以訓私門其弟嘉祐頃緣獎愛遷在清秩憑寵自肆黷貨有彰豈可仍踐台階儀刑百辟貶居藩守俾肅朝倫可幽州刺史中書政本實管王言咨爾夏部僉曰惟允兵部尚書同中書門下三品燕國公張說道合忠孝文成典禮當朝師表一代詞宗有公輔之材懷大臣之節儲宮侍講早申翼賛台座訏謨備陳匡益入則式是百辟出則賦政四方嘉績於朕心茂功著於王室賚予良弼光輔中興廼眷專車是稱樞密宜兼出納之任式副具瞻之舉可兼中書令自古受天之命作神之主崇德祀地盡孝配親存乎禮經不可闕也朕承累聖之緒仗卿士之力方隅清謐宇宙乂安北狩并都南轅汾上覽漢武故事修葺舊祠時惟仲春地氣萌動將先政本為農祈穀齋戒惟寅粢盛惟潔仲尼曰吾不與祭如不祭豈非躬盡孝敬以致神祇乎而經始壝壇寶鼎出地奠茲玉帛榮光塞河將何以幽答神心上膺靈貺朕又懼焉今大典克舉美祥允洽自天之祐豈予一人思與百辟同茲嘉慶亞獻邠王守禮終獻寧王憲各賜物七百匹申王撝岐王範薛王業各賜物五百匹餘升壇官三品巳上賜爵一等四品巳下各加一階應入三品五品現任四品巳上官先授三品四品巳上階經三十考者六品巳上官先授五品六品巳上階經十六考者令所司勘責奏聽進止諸緣大禮有職掌官賜勳兩轉餘陪位官賜勳一轉中書門下三品六尚書御史大夫食實封三品以上功臣與各一子官其立功萬騎身亡歿者雖預創業不見盛時念功思舊情有感惻並令所司檢勘亦各與一子官改汾陰縣為寶鼎縣官同升壇官例賜一階門下周稱內史以司號令漢曰尚書是主喉舌用平邦典以佐王教兵部尚書兼中書令張說履道體正經邦立言吏部尚書王晙忠肅剛博聞宏識並才包王佐望重時英內訓五品外清九服嘉謨必盡庶績允釐宜參五臣之命以正三台之象說可中書令晙可兵部尚書同中書門下三品周建司馬以申九法漢用丞相兼撫四夷伐畔柔服於是乎在朔方古郡實曰新邦雖夷狄巳平河縣無事境隣戎馬地雜坰牧瞻言備豫深仗威謀王晙學綜九流才苞七德武稱敵國文乃時宗憂邊之誠所懷必盡奉上之道知無不為出則守於四方入則式是百辟辨茲旗物制我封疆賞不失勞舉無遺德俾憑廟堂之策克平邦國之事可持節兼朔方軍節度大使其河西隴右河東河北諸軍征馬並委晙檢察置之崇建宗廟禮之大者聿追孝享德莫至焉今宗以立尊親無遷序永惟嚴配致用蠲潔棟宇式崇裸奠斯受顧茲薄德獲承禋祀不躬不親曷展誠敬宜用八月十九日祗見九室帝王承天必崇告類之典文武尊祖是遵嚴訓之義所以克荷成命昭升前烈蓋王者之子道乃聖人之神教朕以寡昧猥承丕緒獲主祭祀一紀於茲輔相之宜下不足以被物馨香之德上不足以動天故歲或不登刑且未恤內省為愧大禮猶鬱星晷驟遷夙夜祗懼今四夷內附諸侯率職㣥生和洽百物阜蕃猶恐教或未孚求之皇極誠有不達觀於國風故親巡河東祈穀脽上神歆有答歲物以豐此皆先聖無疆之休上元啟佑之貺冀因報謁式展誠敬宜以迎日之至允備郊天之禮所司詳擇舊典以聞獻歲之吉迎氣方始敬順天時無違月令所由長吏可舉舊章昔皐繇與禹言乃曰在知人在安人此皆念在邦本光於帝載乾乾夕惕無忘厥旨而長吏不稱蒼生靡寧深思循良以矯過弊仍重諸侯之選故自朝廷始之王邱等行為時宗才稱人秀實有懿德著於衣冠加之善政布在臺閣咸以修身之府載深經國之圖朕所明知躬自推擇是有煩卿之寄用彰恤下之心俾牧人宣條無媿於明哲而變風致理可輯於遺黎爾其克沃朕心式欽往命事君之節在於匪躬為臣則忠期於無隱黃門侍郎同中書門下平章事宇文融幸藉藝能俾承推擇往以封輯田戶漕運邊儲用其籌謀頗有宏益三遷憲府再入禮闈仍仗以訏謨委其密勿雖十旬八拜一日九遷方此超騰彼未為速庶違爾弼朕則佇於昌言謀而不臧近頗彰於公論交游非謹舉薦或虧將何以論道三台具瞻百辟宜輟中樞之位居外藩之寄可汝州刺史國之宗盟樹以藩屏用親九族以制萬邦朕恭默思道懋勤庶政將欲克復古訓貽範方來頃以王國絕紀旁宗入繼事非允正奚妨命停而立愛自親推恩由近禮雖云異情所未忘況其嗣侯巳積年歲永言主祭因心怵惕宜降殊常之澤俾申敦睦之道再從兄將作大匠嗣江王褘為信安郡王祕書少監嗣蜀王褕為廣漢郡王再從叔太子員外率更令嗣密王徹為濮陽郡王再從兄太子員外家令嗣越王思順為中山郡王尸利佛誓國三尸利陀羅拔麾遠修職貢載勤忠款嘉其乃誠宜有襃賜可遙授左武衞大將軍賜紫袍金鈿帶德盛者必享休名道高者必膺殊典況人倫之重義切因心天屬之深情殷追遠故司徒申王撝叡哲聰明本乎天性溫恭孝友挺自生知樂善好書清猷邁於兩獻深仁厚義美化侔於二南可謂具瞻百僚儀刑列辟朕將永康兆庶方自友于天不憗遺奄從薨逝永惟仁範哀慟纏懷用表非常之榮少寄天倫之戚可追贈惠莊太子宜令所司備禮就加冊命陪葬橋陵惟刑是恤止殺之深仁寧失不經好生之大德朕躬膺丕業思濟元元下之陷辜上教不至在予之責何咎於人今履端肇緒陽和獻歲思布德澤惠此囹圄將宏愷悌之恩以順發生之氣其天下見禁囚徒死罪宜降至配流巳下罪悉原之都城內委中書門下當日䟽決處分京城委留守制到日處分仍令中丞蔣欽緒往河南大理少卿明珪往關內刑部郎中張樽往河東水部郎中崔恂往山南東道右庶子高仲舒往江南西道職方郎中鄭績往劒南道祕書丞張履冰往淮南道殿中侍御史孫濟往隴右道賛善大夫張景幽往河西道右諭德李林甫往山南道主客郎中張烈往江南東道並即馳驛發遣所至之處䟽決囚徒宣慰百姓其有窮乏交不存濟及侍老行人之家有疾苦者各令州縣量加醫療及賑恤其嶺南五府磧西四鎮非流配効力等見禁囚徒各委節度使及本管都督府處分布告遐邇知朕意焉李邵固等輸忠保塞乃誠奉國屬外寰中無遠不屆而華裔靡隔等數有加宜賜休名俾承慶澤如聞在外州多有矯稱勅使詐乘傳驛或託採藥物言將貢獻或妄云追人肆行威福如此等色猶須禁斷若緣別使皆發中使以此參察固易區分宜令州縣嚴加捉搦勿容漏網襃崇名器所以尊德也光昭典禮所以飾終也況天倫之愛親親之至乎故太子太傅上柱國岐王範特亶聰明率由孝友好書不倦樂善無忘固已作則列藩儀型百辟方憑魯衞之政率流雍穆之風豈圖輔德期殲良奄及想同氣而莫遂望驂駕而何追言念平生情深震動宜加殊禮之命用寄孔懷之哀可追贈惠文太子先親之義所以敦敘廣封之道所以利建故澤王男義珣漸慶元族分榮帝系早承光寵列在戚藩中因閒言久不立嗣既宗英有譽而邦翰用崇宜順景風之典俾宏宅土之命可封嗣澤王天下諸郡逃戶有田宅產業妄被人破除并緣欠負稅庸先以親隣買賣及其歸復無所依投永言至此須加安輯應有復業者宜並却還縱巳代出租稅亦不在徵陪之限國之役力合均有無比來應定門夫殊非得所每縣中男多者累載方始一差中男少者一周遂役數過既緣偏併豈可因循自今巳後諸郡所載門夫宜於當郡縣通率準式納課分配令得均平元元皇帝仙聖宗師國家本系昔草昧之始告受命之期高祖應之遂於神降之所置廟改縣曰神山近日廟庭屢彰嘉瑞虔荷靈應祗慶載深宜令本州擇精誠道士七人於龍角山廟中潔齋焚香以崇敬奉明乎國史所以宏闡大猷觀乎人文所以化成天下自非鉤深學海囊括詞林盛周公之典謨懸仲尼之日月何以纂敘鴻業允諧僉能兵部尚書兼中書令蕭嵩自天生德惟國之楨孝友溫仁稟於性與明密忠謹自然道合禮樂資其黼藻風雅由其發揮足以掌書殿之祕文紬史策之徽烈論道而講學司論而記言俾垂作範之規用成不刊之典可兼集賢院學士知院事兼修國史餘並如故主者施行徐州處士王希夷絕學棄智抱一居貞久謝囂塵獨往林壑屬封巒展禮側席旌賢賁然來思克應嘉召雖紆綺季之跡巳過伏生之年宜命秩以尊儒俾全高於尚齒可朝散大夫守國子博士聽致仕還山每歲春秋州縣致束帛酒肉仍賜衣一副絹一百匹朕欽承丕緒司牧黎元訟息刑清遠安邇肅思宏備位式樹藩維列鎮而考其政聲謀帥而訓其戎旅徵皇漢之故事並建親賢採分陝之遺塵化行江汜爰崇磐石永固宗祧慶王潭等並稟秀玉林分華瓊苑夙彰韶譽久踐義方閱禮敦詩好賢樂善履忠肅而無替遵法度而不器蘊謀猷才兼文武任茲連帥統彼元戎幹略攸歸賢能是擇分麾作鎮授鉞專征式茂朝章宜恭嘉命以慶王潭為涼州都督兼河西節度大使忠王浚為單于大都護朔方節度大使棣王洽為太原以北軍州節度大使鄂王涓為幽州大都督兼河北諸州節度大使榮王滉為京兆牧兼隴右節度大使光王涺為廣州都督兼嶺南經略大使儀王濰為河南牧穎王澐為安東都護平盧軍節度大使永王澤為荊州大都督壽王清為益州大都督兼劒南節度大使延王洄為安西大都護兼四鎮節度大使盛王沐為揚州大都督朕粵自鎬酆省方瀍洛屬九服寧晏四時順成殊徵龎殷景福紛委遂荷靈睠登於介邱先天成功允答休佑蓋敬天知命不敢以寧也我來於東歲亦數稔而西土耆老傒予多怨況關輔之地頃則有年宜叶卜征之祥式展時巡之義可以今年閏九月十日取北路幸長安所司準式緣頓支供一事巳上並用當處官物不須科歛百姓其遞運及行從官僚等物從減省所在公私不得輒有進獻宣布遐邇知朕意焉朕君臨區宇子育黎元每懷勤恤不欲勞煩而鎬京之地陵寢所在自展義河雒巳歷歲年所以式遵卜征有事時邁抑惟常典寧敢憚勞將欲西巡元取北路今同州有暴水浸於邑居載懷憂惕無忘鑒寐且從南路幸長安所司準式朕作人父母為天下君豈將巖廊為逸嘗以億兆為念何嘗不養之如子視之如傷驅彼代俗躋之仁壽使勝殘之道自我王政好生之德治於人心皆遷善以遠罪亦有恥而且格靡然向風以致刑措今秋典戒令理官議獄愍此愚者猶聞抵冒當宁發想興言疚懷宜布惠和之澤用申矜降之典俾率土之內知朕意焉天下見禁囚犯死罪者特宜免死配流者配邊州効力徒巳下罪並放免官人犯贓罪不在此例其未有斷結者各處本犯定刑名準此處分故益州長史張守潔故桂州都督員嘉靜等並守委藩鎮克著忠勤奄隨化往良深震悼言念旅櫬猶在遐方用加優恤以慰泉壤宜官造靈轝給傳還鄉所緣葬事並委有司支給
