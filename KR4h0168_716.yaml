body:
  text: 霜天慘慘兮楓樹之杪構彼層巢兮翩然宿鳥盻喬柯以上下慙弱羽之卑小周匝經營翻飛繚繞履危而金彈不發送喜而珠簾乍開逐初心之眷戀無利嘴之嫌猜架木末居巖隈容足之前望一枝以棲息翻身之際歷衆木以飛來拂曙聲多排空意遠惜光陰於朝暮迷飲啄之往返于是攫腐草銜飛蓬重謺尺箠回環翠空凌寒而且近朝日構思而偏愁夜風俯仰求容冀資拾芥之力縱橫居止願就積薪之功必使輕舉得便㣥飛會同遊嬉遂鄰於清籞窘朿長謝其雕籠所謂托實以來憑虛相借不然則六翮摧毀三冬徂謝飛鶯將出乎深谷黃雀亦誇其大厦所以踰遠林戾前除仰窺肅爽遠慕扶疏當繞樹之時暫隨烏會在來巢之日常畏鳩居非微禽之敢競幸嘉木之有餘嗟乎搖尾馴擾斂容萃止依乎主人來若處子匪能言以呈慧不善舞以招美倘抵玉無虞搏風資始故巢林以何報惟化印而後已營巢有因惟鵲無倫始自小寒之日不當太歲之神辨向背以經營必先避地顧縱橫而委積足以藩身且其矯翼徘徊向隅棲息時懷擇木之智日就積薪之力若在離宮之內不可巢南如當子午之中無因逐北所以率先表異選勝知歸應時節而遷易辨方隅之是非念彼明神自易地而攸處顧茲弱羽信何枝而可依時也苟遂居安寧辭力役銜腐草而構思向高柯以容跡動觀所忌殊古人之橧巢理契不齊如方士之工歷擇地已有知風豈無方一枝而自託雖小數之能拘且相質以和鳴喜同于雀乃卜居而類聚趨甚于鳬况復籍用茅茨殊荷庇蓋任風雨而自適豈陰陽而去泰念土宜之是顧足見知方信天理以自然焉能向晦爾乃節屆元律時方沍寒顧地角而知禁豈天時之可干無起土功異銜泥而戾止知于歲杪聊寓跡以求安既而飲啄無虛推移不滯得厭勝之良術誠棲遲之上計潛軫明條之慮必附枳枸之勢摧枯拉朽已完葺于崇朝命侶引雛聊優游于卒歲顧末俗之無違信微禽之可繼燈者火也尊而不親奚斯蟲之眇質翻體密而意馴必將蹈火而後止是以疑冰之與鄰雖異探湯執熱之情可見不蒙明照暗投之罪則均是以雁飛無忘于避繳龍蟄有貴乎存神于以知無知之智有以同自知之人無損于明雖光暉可借自貽其咎與壓溺同塵始其焰焰中開青烟爰發薨薨四足白羽若月焦爛唐突離披觸蹶人心卒然天意若曰嬰焚灼者何如玉石之俱盡處高明者曷若烏兔之屢闕且繼彼覆車雖百夫死難而無餘納諸密網狀衆鳥驚飛而在初循環責實宛轉投虛沈脂膏則屈死觸煙焰則焚如自我搆患非天禍子愛水螢之光載浮熠熠笑鼎魚之樂其斃徐徐阽乎焦原可叶其義投炎火莫之知避曷若晨雞候明以自得火鼠就燥而無纍莫不守之以為順居之以為智是蛾也餘光可託留影如寄排朱焰扇輕吹胡糜爛于瞬息為腐餘之容易若然者蠢蠢之類將外強而必乖炎炎之著非內熱之所懷既油然相煦于膏火亦瞥然相忘于形骸吾所以知捐軀于鼎鑊與是道而孔皆服牛是比合土成美將十鈞之重斯得而一撮之多有以雖欲勿用泥蟠之質初分誰謂爾無塊立之形酷似是月也採呂氏時令徵圬人巧指始辨塗附寧分脈起誠安愧乎角立復何勞于肉視然後遵土訓啓人時戒曉而出迎春是資于以審先後之節有以占疾徐之期仰白榆之文慙其晥彼叶蔥犗之色則而象之能首出于泥滓豈㣥分于毫釐彼芻狗之列飾文繡以求媚泥龍之興因舞雩而取類曷若標國典配田器比物以作則順時以相示同乎非馬契莊叟之至言偶彼真龍殊葉公之繪事質美埏埴巧逾覆簣那慮食角之患寧假瑩蹄之異俾遊刃者訝全之于目運斤者喜墁之在鼻且耒耜斯呈我則正春扈于農耕干戈既偃我則歸郊馬于歲晚將物候自然諒人情何遠必也攬紅縻親紺幰覩似是之足尚謂來思使畜疑之人猶將屢飯由是出五種命三農乃修故事于彼窮冬闢我疆則厥壤爰度考爾牧則其犉有宗今也物被殊私形分大造載之以厚地之德奉之以先天之道時將敬授在三推播植之前物或肇牽察庶物生成之早其用則大其儀可考故曰如土委地者豈必以戴牛為寶班固曰人含五常貴於萬彙剛柔緩急音聲不同繫水土之風氣則謂之風其好惡取舍動靜不恆隨君上之情欲聖唐四三王而六五帝一六合而光宅覽職方圖山川盡見歲七月木鐸徇于路命州里舉賢良於我睢陽古之大郡也惟君子能通天下之志也其辭曰吳季札挻生江國自南徂北聽㣥樂之存亡觀諸夏之臧慝乃言夫大雅小雅周南召南陳俗夸而奢其國無主韓地薄而險其人不堪燕都渤碣秦負隴俠客憑陵世家淫勇顓頊之居衛也桑間濮上務耽聲色太公之存齊也冠帶衣履唯勤組織洙泗之間既富財力觜畢之下彌重獵弋冀州則紂之餘烈易為讐寇合浦則蠻之獷俗相尚戰鬬吳南有豫章之基燒銅山而煮鹽海楚東有雲夢之區鞭火耕而驅水耨豈若睢陽城臨氐房其地平促其人溫良昔者舜漁雷澤堯作平陽天乙都亳沛公潛梁故地多君子而風有先王富禮樂盛文章魚鹽委積士馬精彊亦有顏邑野人居宋而生孔子漆園傲吏隱周而號蒙莊韋氏以占星著族楚宮以揆日居方宓子賤聽訟築臺坐空囹圄巫馬期勸農作宰克正封疆亦有高辛故郡下邑軍場蔡走定陶之國晉入沙隨之鄉與夷出盟於瓦屋郤缺來會於承筐聊采綴而為賦叙菁華而未央言其國之始祖微子封於斯土先膺宗周之錫命招納暴殷之餘戶宅陶唐火正之監就彭城鐵官之估於是孟諸為澤芒山為圃日尋干戈雲列㣥伍起臺十仞作室百堵按弓甲飛樓櫓橫釣臺伐金鼓討曹滅衛侵鄫掠魯會盟於鴻口之亭繳射於龍遊之浦及其楚國圍急澤門役苦外則睅目而歌內則析骸而哺妖星去國所移者三怪石隕空視之則五其後漢分元弟出食於梁文帝則錫茅而建社景帝則肅桂而稱觴由是綵艇畫樓鋪鴈池以千里蘭軒竹閣澄猿巖而四起徵廄馬於邊徼選宮人於街市千乘出車百金練士煌煌煒煒而軍容備矣南面稱霸而朝天子若乃秦名碭郡禹作豫州城池競於春色車騎溢於川流惠連則詠南山以作賦長卿則背西蜀而來遊入瓜亭而避暑臨穀熟而迎秋弔仙人於蒙邑祠閼伯於商邱想華門之瘈狗歎梁野之妖牛並忘歸於此地充近侍而淹留別有忠臣壯士貞夫孝子五侯競立三王俱死英靈遞見商榷未已雖埋骨於黃塵俱列名於青史當今奄有萬國承平百年化被則如春露之霑草文同則若夜星之拱天惟茲都之宏壯比列土而居先屬城有師何代無賢伊昔全盛莫之與競食客駢闐諸侯聘命旌斾互出臺殿交映忽瓜剖而豆分若煙收而雨竟已矣哉中則傾兮滿則缺陰靈起兮陽精滅始看春樹歇芳菲已見秋源漲沙雪自昔雄材與壯氣莫不埋恨而吞咽七十里之城郭仍在一千年之綺羅都絶京兆杜公久遊關東臨少昊之秋月過梁王之舊宮食水土問人風執官曹而正直抱身鏡而清通識寶者不遺於草澤懷材者喜遇於良工但能任土而作貢則我梁國之不空惟國生賢囊錐喻焉囊之體也柔不能挫其鋭錐之資也利可以攻其堅固脫㯋而出矣豈潛芒而蔑然當其組織而備鍛鍊而利既括之而旡咎亦藏之而轉祕察其所安觀其所自則錐也遇處囊之日囊也為置錐之地爾其舍之則藏耀然有光匪宣其利將掩其鋩質雖蒙其磨錯鋒已露其雪霜既隱之而斯見亦抑之而復揚笑矢之在櫜潛而勿用殊玉之被褐暗然不彰無謂其利博其功細用每施於補履色更因於作礪彌堅者觸之必通嘗巧者用無不濟是以銛鋒不得而永潛輕縷不得以久蔽其受也含虛其出也有餘柔以外表剛而內居囊若擲於荊卿我殊於藥囊若焚於郭璞我異於書亦當蓄其鋭露其㯋固退尺以韜光每進寸而懸影漏褚中之物比之不同爭錐末之人窺之自警誰謂利器密其彌縫用之則行或可執其柄動而逾出不可當其鋒宜掌握而為美豈緘縢而是從別有藏器未遇飾躬有素囊之既處嗟毛遂之未知錐之可方倘平原之一顧甚哉言之出口也電激風趨過乎馳驅掉三寸以發越應千里於須臾逝不可追空勞於駟馬行而無跡豈繫於九衢故君子念彼尤悔本乎虛無苟出話之不復將起羞而是虞且舌之鼓也有時而馳騖類扣虛之莫獲同捕影之難遇蕭蕭之響徒繫於下風逐逐之音已疲於中路信樞機之爰發隨小大而作故儻善守乎輔車何遽煩乎騏遲速相懸奔走徒然言出於身所謂往而不反馬竭其力猶歎瞻之在前雖欲適遠邇課後先如流之巧已失若滅之態何宣嗟夫以駸駸之足追言言之速豈能之而不欲蓋窒喋喋之喧喻駿駿之奔在誡之而不言肇自微渺倏爾騰翻疾既甚於過隙患必防於屬垣斯事也罔念則狂克念則聖誤片言之既往知逸足之難競自然有蹻之造勿謂載翕其居此不矜於哿矣彼何患於班如不然者其出彌遠其來愈疏是以慕宿諾於季路悔聽言於宰豫至哉詩惡翩翩書懲靡靡方憑響於無際豈絶塵之可彌易象又著夫寡辭禮經亦防其苟訾未若古人之深誡饘於是兮粥於是魚也者重泉之微因筌而索與元珠而同歸筌也者虛舟是依因魚而棄將緣木而有違始鉤深以假器於是終釋手而喻指之非詎比弓藏方隨槁木靡因火化奚貴焚機所以乍觀象於十日終遺形於九圍其得也且非貪餌誰曰在藻既涉無而恬鱗斯獲將遺有而虛室是寶其忘也寧捨不材匪投有昊同絶巧棄智故然雖愛必捐若遁圓離方孰謂不由其道故無用者木上之則虧有情者在梁之翼何為彼用拙徒觀於進退此情留寧識於推移故曰因動而忘筌為後覺投虛自得魚非前知豈殊舟既焚而空濶先濟屣將脫而止足由斯於以探幽落焉藏往方之俯拾故何啻於盈筐爰取坐遷義非同於解網必也窺清泚憑浩蕩是務得一不矜牽兩夤緣而來為得魚之象必也袪其意窒其源舟無五覆道遣三幡展轉而棄為忘筌之言使彈鋏嘉賓不樂烹鮮之味投竿公子何勞餌犗之煩若然者諒非赴澤在虛心而自適諒非卷懷將適道以孔皆然後蟬蛻萬象鴻毛百骸有漁人聞而辨之曰是言也始以神遇將終理遣謂鱗介非掩豆之實以巨浸為覆盆之淺然乎哉吾何必鳴榔而遊衍元鼎元和中官大理卿兼御史中丞攝營田副使惟唐承天撫有八紘聲教所臻靡不來廷兢業齊栗懼其隕顛纘武紹文疊慶重光克彰濬哲罔忝洪緒十有二葉二百有四載則我太祖權明號而建不拔鋪鴻名而垂永久類上帝以答嘉應享皇靈以酬景福曷有怠已越歲在癸丑冬十月癸酉文武孝德皇帝詔丞相臣植臣播臣元穎等與大蕃和使禮部尚書訥羅論等會盟于京師壇于城之西郊坎于壇北凡讀誓刑牲加書復壤陟降周旋之禮動無違者蓋所以偃兵息人崇姻繼好懋建遠略規恢長利故也原夫昊穹上臨黃袛下載茫茫蠢蠢之類必資官司為厥宰臣苟無統紀則相滅絶中夏見管維唐是君西裔一方大蕃為主自今而後屏去兵革宿忿舊惡廓焉消除追崇舅甥曩昔結援邊堠撤警戍烽韜煙患難相恤暴掠不作亭障甌脫絶其交侵襟帶要害謹守如故彼無此詐此無彼虞嗚呼愛人為仁保境為信畏天為智事神為禮有一不至搆災于躬寒山崇崇河水湯湯日吉辰良奠其兩疆西為大蕃東實巨唐大臣執簡播告秩方元鼎踰成紀武川抵河廣武梁故時城郭未隳蘭州地皆粳稻桃李榆柳岑蔚戶皆唐人見使者麾蓋夾觀至龍支城耋老千人拜且泣問天子安否言頃從軍沒于此今子孫未忍忘唐服朝廷尚念之乎兵何日來言已皆嗚咽密問之豐州人也過石堡城崖壁峭堅道回屈夷曰鐵刀城右行數十里土石皆赤夷曰赤嶺而信安王禕張守圭所定封石皆仆獨夷所立石猶存赤嶺距長安三千里而贏蓋隴右故他也曰悶恆盧川直邏娑川之南百里臧河所流也河之西南地如砥原野秀沃夾河多柳柳山多柏坡皆邱墓旁作屋赭塗之繪白虎皆夷貴人有戰功者生衣其皮死以旌勇殉死者瘞其旁度悉結羅嶺鑿石通車逆金城公主道也至麋谷就館臧河之北川贊普之夏牙也周以槍纍率十步植百長槊中剚大幟為三門相距皆百步甲士持門巫祝鳥冠虎帶擊鼓凡入者穴八夕索乃進中有高臺環以寶楯贊普坐帳中以黃金飾蛟螭虎豹身被素褐結朝霞冒首佩金鏤劍鉢掣逋立于右宰相列臺下唐使者始至給事中論悉答熱來議盟大享于牙右飯舉酒行與華制略等樂奏秦王破陳曲又奏凉州胡渭録要雜曲百伎皆中國人盟壇廣十步高二尺使者與夷大臣十餘對位酋長百餘坐壇下上設巨榻鉢掣逋外告盟一人自旁譯授于下已歃血鉢掣逋不歃盟畢以浮屠重為誓引鬱金水以飲與使者交慶乃降元鼎還夷元帥尚塔藏館客大夏川集東方節度諸將百餘置盟策臺上遍曉之且戒各保境毋相暴犯策署彞泰七年尚塔藏語元鼎曰回鶻小國我嘗討之距城三日危破會國有喪乃還非我敵也唐何所畏乃厚之元鼎曰回鶻有功且如約未嘗妄以兵取尺寸地是以厚之塔藏默然元鼎踰湟水至龍泉谷西北望殺俺川哥舒翰故壁多在湟水至濛谷抵龍泉與河合河之上流繇洪濟梁西南行二千里水益狹春可涉秋夏乃勝舟其南三百里三山中高而四下曰紫山直大羊同國古所謂崑崙者也夷曰悶摩黎山東距長安五千里河源其間流澄緩下稍合衆流色赤行益遠它水并注則濁故世舉謂西戎地曰河湟河源東北直莫賀延磧尾殆五百里磧廣五十里北至沙州西南入吐谷渾寖狹故號磧尾隱測其地蓋劍南之西元鼎所經見大略如此師簡元和時人太上立德立言以宏其教生人活國其用不極繇乎恬淡者則詣真理乘化出入人紀罔窮廣成枉軒皇之尊關令闡元元之訓冥搜虛極呼吸日月上賓之軒代有其人茅真君伯氏仲氏虔奉元樞退然若喪脫履萬類騰跡三清學宗其門者綿代不絶時謂朝山之月肩駕擊轂白鶴紫氣必應其晨或者詭說則曰真君長往亦以綰吳越司命籍人寰生死吾不知故闕書且嘗遺一畝之宮于山之陽去而復返其號下泊之治榛蕪積焉游者憮然則有東周黍離殷墟麥秀之歎矧靈仙何處哉我河東廣平公此藩吏之師法實奉黃老以根政源嘗謂開元承平之代上奉無為以宅清靜元門垂祐有國有家者屬焉繇是捨俸入之錢以宏其棟宇置真君之像惟肖其儀形設雲幄于兩楹分玉座而鼎足以嚴其觀雙侍童衛焉以備其教龍虎君翊焉升其堂塗稽首拜手忽若前後左右旄節羽衛從諸天行揖其冰容以敬以肅則若美其目口流涕發論破人昏惑往真之跡將墜復振此教之演翳事而宏深其率教者曰興廢繼絶則由乎人蒙福獲祉必感乎至公恆以黃籙法會元辰修畢仍歲必緝敷紫陽玉真當負扆而頒命列陪位而贊拜聲雜天籟宵燭如星奉章上元昭啓昊帝蓋所以保和封內儲慶皇家門閥之祥我事某禱至哉賢侯之業也粵元和甲午歲十二月二日新宮始成無傷物力公之宇內百姓不知有嚴有翼如合造化道士孫智清元門龜龍以標儀矩受成事指顧而叶焉乃欲章明靈跡延耀丕業請介于戎政者撰而刊之師簡諗于良畫故不敢沒其美云寰德宗朝官都知兵馬使歷保義軍橫海軍綏銀節度使皇上御宇之三祀春三月旬有八日晉慈等州都團練觀察處置使檢校左散騎常侍兼御史大夫賜紫金魚袋李寰齊沐虔潔祠于神山慶唐觀聖祖元元皇帝禮成謁于高祖太宗高宗中宗睿宗元宗六聖之真廟靈感昭發休光動天然後登龍角升華池陟林嶺瞻翠微見瑞柏之奇狀審循葛之延蔓龍鳳交貫垂于廟庭次生新枝有以表聖祚於百萬年矣上元之意必將使茂聳貞固樹之無疆當大歷十四年之三月曾生一枝以備圖牒當今年三月又生一枝故知歷數昌期邈不可算帝王符自合元經寰忝列宗枝謬當廉察聞斯靈迹心不遑安乃首擇吉日禮祈尊像遂與監軍使朝議郎行內侍省內府局丞員外置同正員上柱國賜緋魚袋吳再和左神策軍監鐵冶使朝議郎行內侍省內府局丞張令綰等同檢驗所植柏樹高下葛蔓尺寸仍令工者圖畫其形狀具表上聞乃刻碑陰用傳不朽宗經元和時人維大唐乙酉祀蜀帥薨鎮其倅曰闢盜庫兵脅市人逆命于蜀門毒瀰浸淫軼制踰封自左綿抵黔渝八郡五十城俘掠單産驅逐守吏四面攻焚煙塵晝昏明年皇帝嗣寶位會朝神京采衛侯甸蠻夷君長偕集庸蜀不至乃授南平王太乙靈旗玉節油幢統禁衛太原馮翊扶風之師問罪於岷陽越三月師次葭萌賊將宵遁涪潼以避我鋒涪濱萬戶隨師而復夏六月賊又成城於鹿頭列柵於此山公移師翌日乃次山下視其鑿峻址以回塹架層峯以結櫓旗轉霞光鼓雷雲中謂制勝在德義行權在形勢勝而臨之示建瓴之易也乃召中軍將以短兵二旅魚貫而登闢黨冒鋒而殪者什四奔墮崖谷而斃者又什二則向之險固反為我資公乃開玉帳以建牙旗列霜㦸以周崇壘下瞰賊城如在掌中與都監使劉公監軍使徐公觀變禦敵分營守要自是凶徒居則魄悸魂落出則輿尸折首面縛倒戈請命轅門因命降者先導鋭師繼襲氛氳氣象遂清岷峨我帝授公所封之土以守之所活之氓以字之公威肅其令仁敷其政和氣煦之金痍盡平退食之暇延想所歷以戰骨雖瘞遊魂尚痛非大聖之力不能息苦海非象設之教無以聳善心乃命庀徒鳩工度材揆力紺宇俄就絶如化城嚴鼓息而振金鐘戰聲寂而流梵響慈惠所庇菑疾不生峨峨金界擢秀㣥嶺公初宅此營有神龜由壁門來於牙旗之下公命投之遠澗翌日重至議者以龜介蟲之長介蟲斯服蜀有龜城其城是師即日乃受降此山既靈及其祥遂以名龜勝山因以山名道場中敏字藏之隴西人元和末進士文宗朝拜給事中出為婺杭二州刺史卒雨不時降夏陽驕愆苖欲槁枯陛下憂勤降德音俾下得盡言臣聞昔東海誤殺一孝婦大旱三年臣頃為御史臺推囚華封儒殺良家子三人陛下赦封儒死然三人者亦陛下赤子也神策士李秀殺平民法當死以禁衛刑止流宋申錫位宰相生平饋致一不受其道徑正姦人忌之陷不測之辜獄不參驗銜恨而沒天下士皆指目鄭注臣知數寃必列訴上帝天之降災殆有由然漢武帝國用空竭桑宏羊興管榷之利然卜式請烹以致雨况申錫之枉天下知之何惜斬一注以快忠臣之魂則天且雨矣臣據舊例所有投匭進狀及書策文章等皆先具副本呈匭使其有詭異難行者不令進入臣檢尋文按不見本敕所由但云貞元中奉宣恐是一時之事臣以為本置匭函每日從內將出日暮進入意在使冤濫無告有司不為申理者或論時政或陳利害宜開其必達之路所以廣聰明而慮幽枉也若令有司先見裁其可否即非重密其事俾壅塞自伸於九重之意臣伏請自今已後所有人進狀及封章等臣但為封狀以進取捨可否斷自中旨庶使名實在茲以明置匭之本意瑀冀州蓨人纍官太僕卿出領忠武軍節度使加檢校尚書右僕射徙節寧武拜太子少傅復領忠武軍節度使卒贈司空唐元和十二年九月十二日徐之從事立石紀氏於府庭之南端初元戎岐公辛卯歲自夏臺帥奉詔朝於京師天子當扆對百辟卿士登公于明庭曰自理朔陲邊風變和氈裘垂臂斂袵從教豫嘉于衷文武僉同今之徐方控臨東極淮海閩越千里遙賴地産堅金俗風用剛河山鬱盤我武宜揚故有鈇鉞印綬之賜豫之戎柄期于光大郡邑之長司我風教蒸人壽夭繫厥二吏故別以符印備以僚屬豫之耳目期于觀聽大野東原既豬且平纖縞草木咸在征賦故當命使期于營度城一十六戶一十萬兵六十旅矛盾戈㦸戎車鐵馬洎翔潛動植宜咸領焉公拜稽首激誠淚血俯仰交感左右動色讓德不獲改轅而東紅旌大斾發自闕二字都人縱觀光騰九衢以功紹復再統幢節近古無儔自歲十一月四日至于理所從一日至于百千日無一息無一頃暫忘嚮之帝命舊府無積衣食矌乏則軍聲武備其可知矣假財于鄰從儉于身戎裝貔集將卒驍敢野夫行謠四郡咸康故以戰則克以祀則福境有飛運水無驚波有征之師以徐為則上多乃茂績俾位冠于㣥帥故有左揆之拜時無等焉皇乎哉岐公之德宜在鼎彞矣噫連帥大府今天下三十有九皆顯才聞人為佐為賓誠明中和從事之道也離明誠中和非從事之道也扶善與能鬼神潛光誰或紿幽暗而謂神無知故豫之同府常恐懼乎不至誡慎乎不聞用明誠怡神離明誠愧神將此道也奉我公省厥躬期此布名氏之不朽則可轉之石焉足道哉讓潭州刺史渭子官太子右庶子稽聖人棟宇之用博矣太上垂典法利衆庶其次革壞弊鎮形勝其次辨尊卑示升降最下炫彩色飾土木華其視榮其體而已若參而合之則賢智公侯之居也若捨其本而務其末則貨殖匹夫之居也能是制者不亦鮮乎揚州屬都楚實甚大提兵五千籍戶數萬其事雄富同于方伯然則刺史大廳卑而且儉紊諸侯之等威每冬至歲首文武畢集內不足以陳俎豆外不足以容卒衛及夏秋之交淮海蒸溼之氣中人為病多至煩熱憤悶居常無以逃其虐有事宴于斯皆翕翕流汗往往仆于地不卒其會而散自刺史至將校百吏盡知其不可思欲改造而久遠已來為日者巫人稱陰陽鬼神之事以沮之且曰歲深有物來憑更之則不利小以罪貶大以凶終雜然其說如出一口前守或有構材定日視之惕息卒不敢毀而止太和七年天子以大理少卿滎陽鄭公活無辜當刑者四十餘人殊其績命守于楚既至纍月威肅仁覆罔不得理戎行農室遽告無事公將易前非誠詢于衆衆果以咎徵止公公笑而諭曰吉凶由已災不自起况陰陽變化人事之符勿忌勿拘以道為模苟不失正無二其圖敢斷不疑鬼神隨之與衆共利曷慮于危秉直在公余為蓍龜乃築崇基乃創宏規悅使樂成不亟不遲法度既備丹素亦施清氣和風旦暮颸颸氛厲不干笑語自怡大會其中寒暑皆宜駢羅鼓鐘間發塤篪劍士伎兒飲食熙熙以以容逮于養厮觀邇及遠何物不綏不祥之詞沉寂無為守正之報必及其期則鄭公持大權臨大節不撓其惑者用此心也昔賢行事亦有據經合道不奪陰陽鬼神之說然未有决然違俗與衆禍福之見牢甚不可破如此其著者豈非明識達量以義忘私不苟一時遺利後代耶使有土二千石去蠹除弊悉若是舉天下何憂于不理哉且詩咏斯干易規大壯皆美居處有制度可以化人成俗也八年夏豫罷郡西歸道出于此而是廳新成忝春秋之徒也見不朽之作而無述焉心竊恥之請書本末以告來者其他善政能事有風俗言故不採列于記上太和八年八月一日記鷺歷官戶部員外郎郎中司封郎中開成十年為淮南節度副使仙都有山山出萬山直上千尋入烟霞深圓如筍抽高突雲陰標表下國權輿象帝日歟月歟萬有千歲東西大鎮川澤四衛造化無言莫知往制晴嵐依依宿霧洞開髣佛有像神仙下來灝氣氤氳靈鳥環回永殊塵雜不鼓纎埃絶頂霄崿澄湖在上人罕戾止孰窺其狀日燭雲披風飄液飛如雨雨空微灑霑衣谷來松音潭影曙暉往往鶴唳不知所歸唐垂百年元宗體元響應萬歲聲聞上天帝祚明德祠堂在焉永懷軒后功成此地丹竈猶存龍升萬里事列方志道高青史無復仙容空流溪水百越之內此山為大恍若壺中疑生象外直而不倚高而不殆古往今來獨立滄海胄官戶部員外郎冰井皚兮星歲闌冰候井於春泮井含冰而晝寒其質也惟至貞而可鑒其量也惟極深而可觀夫其碧甃熒熒清光炯炯呀爾莫測堅爾而靜閉土膏之潛脈奪霜空之麗景濟時方候其獻羔利物不資于短綆前王何以貴冰而鄴臺尚開乎舊井下視千尺旁窺百尋足使貪夫勵志君子戒心或以慮危則取象于履薄或以思險則取類于臨深豈徒遠自窮谷而納于凌陰其道有恆其迹無固當未用也雖處幽而無悶當其用也雖向炎而不懼縱居井之未深亦在冰而守素若乃天地閉河海凝風落木霜寒冰或呈六出以表符瑞或因五行而見咎徵寧比夫在坎窞而不耀遇陽和而自升故知井之為德莫之可比爰若汲引于焉賓祭是以頒之也遍出之也時雖應用而無倦終待命于有司東風可解西陸可期不以深而見棄不以輕而見遺側玉盤而有望仰金門而可入質惟務施固不戀于深山道貴能行亦何慙于改邑懿夫吾王之政無不修化無不及猶慮霜雹之為災故冰井所以立推高陽人余與憲臺察史博陵晦叔有遺世保形超蹈山海之契嘗共語求學之士探擬賒謬恥營近實虛務遐闊未易凡鄙便冀飛升謂金丹坐延而仙籍立致夫處心不置于道鍊形未異于常齒髮不駐顏色隨謝是氣血內耗而容狀外變病疾未脫嗜欲交煎天生速死不及常理區區貪昏多此類也今所為異必求良方先驗容齒與俗流自別知常限不迫方可冀久視修仙材鍊神清虛求餌芝玉約索精要近拯形骸有新聞閲互相曉導晦叔異日謂余曰有客話裴都尉者鶴髮早垂童顏近復訪其所餌曰靈飛散之功共知此方在千金第二十八卷晦叔又曰聞勳曹員外郎范陽君彞嘗與修氣道客吳舍人丹講求此方丹曰千金近略率多不真定此方本出太清仙經可求正文如法合餌君彞私志亦未卜所獲時寓纍于故李中書泌之宅暇日偶入一小室有書籍盈几皆斷爛罕全雜委無次軸閲將半忽遇一軸褾首完整文墨甚華題曰太清真經發視乃靈飛散方卷君彞執讀欣契誠求即齎靈文驟告于丹乃焚香頂奉滌手持捧謂君彞曰此真官曲遺靈應特延紀于仙書足勸後學晦叔以余與君彞莫逆分至傳信可憑約就咨訪便求傳寫余驅乘詣門問與聞叶因得抄録與晦叔同之又方中分味以雲粉為主是歲余授鍾陵奏辟而廬阜在封部之內爐峯跳波脉注溪壑居人方士皆引湍舂雲水汰日曝流霜瑩雪丸珠旋螺宛若天造貨于村市資為衣食常肆所積日取無限此方雖要惟茲一物有是行也實天借心謀亦將旁利同志不然何契會如此以先約話余私貯靈感不忘寢興行商洛數程息豹藏舍郵客有自內鄉來者曰有鄧掾融攝宰前邑年踰從心之五而姿鬢不老目瞳不昏理劇接賓與強仕等力問其所得曰嘗獲神方余至邑徵訪乃靈飛散所致考其傳授及藥力驗應云昔歲見唐主簿有道流口付說是靈仙上方欲窺功用可立變鬢髮融有親容顏鬢已衰將試靈驗因求合分服三十日融之親容顏髮頓易前狀融半劑之效亦保數十年不改恨其藥力未成便闕服餌又遠謫窮悴資貨多乖今比凡流猶有所異復說在長安日傳張裴二駙馬皆目變效重符前聞則此方神奇驗實相接眼覿口問積為明徵又孫處士道問上流精窮方要掇此編録固非偶然余與晦叔幸君彞之遇果求向之約誓心服食以邀效證他日之異續此編書元和七年四月五日高陽齊推書心記實奕官尚書兵部員外郎太常考馬暢之行舉夙夜就事廉方徑正之敬以易其名異乎無所苟于言也比建中興元間暢以父有征討之勳推恩而授爵位父薨家富于財以酒色自娛貞元中嘗傾産交中官因獻田宅以求幸德宗薄其人而終不信用生前與孤姪寡嫂分居競財醜聲聞于時歿後使孽子孀妻披姦抉私公言盈于庭此皆章著于視聽者可以諡為敬乎議者云先司徒之籌畫而暢揣摩者策而遺焉暢參計于閨庭之內苟所言屢中而不可隱當指明其效實而書之俾行道者無所惑不然則莊武公之才略光于典策矣而乃飾虛辭以攘其善為子請諡得非繆濫之甚耶又稱名儒端士皆從之游未知孰為其田蘇邪孟軻云尹公他端人也其取友必端矣夫孰與端士而游乎暢之門况諡法夙夜就事者以其績用已紀非謂其曠日引月以至乎終身也廉方徑正則暢處已行事未嘗造次而踐其途焉何以諡為敬乎太凡言功伐議德行尊其跡有以勸善貶其名有以懲惡固非庸者事也如暢之輩烏足以黷典法哉若有司以有為而為之則宜乎貶之例也請下太常重定其諡宏開成中擢進士第鑿之冰井厥用可觀井因厚地而深始將乎人力冰以積陰而壯必本乎司寒所以候立春而氣至當嚴寒之律殘順乎時不愆於夏歷守其典必驗於周官若乃冽井者泉藏冰者井至陰相合表虛受之無瑕聚氣而堅叶坤柔之至靜况乎元律涸沍寒光凝冷積風塵於四郊封雪霜於萬嶺者哉觀其啓隈隩洞幽深矗如雪聚皎若月臨抱堅精之素質體元妙之精心期三凌以示乎遍用言一日方屬乎窮陰且泄其井不愆於度爰納其冰轉增其固妍媸必表將金鏡而分形明皎相鮮與瓊漿而競素影淋漓而未泮質晶耀而凝沍若玉壺之洞開似金波之始露其初也小人是承剪乎荊棘陟彼邱陵當元冥之用事供北陸而藏冰出窮谷而方結下重泉而轉凝託影超象因物為比或瓊碎而星流或峰聯而嶽峙為王者之恆典俾㣥生而是以穿重壤之十仞以表藏周候朝覿而夏頒用不私已稽夫井以不變為德冰以至堅自持井非冰而不能全其淨冰非井而不能應其時體剛居中且異乎泄而不食力柔其重方同乎順以致辭其功克廣其用斯給慎以祓除節其出入異彼廬陵之瑞空存三色之名同夫甲子之祥用彰七月之什當其舊典不廢新令是緝喜災害之無虞頌皇王之御立
