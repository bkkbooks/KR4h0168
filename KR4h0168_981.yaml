front:
  text: 全唐文欽定全唐文卷九百八十一闕名二十二
  hash: sha256:a03c6e502332952352f8f26df78b5ec27a8e51b0dcff7f2b1dee9b8b7270281c
body:
  text: 命理多途幽明罕測甲惟愚品乙也狂夫憑仲子之有文相士行之當貴虛論骨象謬定吉凶豈識李固之龜文莫辨條侯之縱理聖人不相抑有前聞鄙夫何為則預於此利百變法功十易器地平天成罔有降格為農服賈厥道何常丙市井其心負販為業以貧求富則農不及工朝盈夕虛乃末勝於本提緗入肆見無利求於冰紈操斧登山更求材於霜刃去彼取此亦以有之在於四人于時一作時則度木顧惟遷貨何必守株鄰人有言告者非是瓦者髺墾薜暴惟彼陶者為藝之卑讀天半之書豈工埏埴異河濱之迹顧學陶匏智不逮於挈瓶心未忘於抱甕莫遇林宗之賞詎為顏闔之逃髺墾若茲姦巧逾露合懲虛器以肅旗亭瓦人判百族萬商會日中之市范金合土利天下之人是以陶器必良誡其渝濫用器乖度非所貿遷甲畎畝編甿陶方瓦居業郊泉歸壤已復志於千秋涇水非臨自餘泥於數斗不作無益未見存誠罔守爾典旋彰矯迹濫居闤闠之地豈成埏埴之功鬻斯薜暴眩乃邊鄙臨財作偽嗟日拙以成勞於義且忘喻雲浮而何取遂使漆園傲吏無任扣歌潁陰逸人難從抱汲同射鮒於井谷敝甕斯聞疑飲馬於重邱毀瓶攸在守不假器雖將智者之謀灌若漏巵終匪居人之用不軌不物既為亂政之流刑期無刑難從緩刑之義上智利人遵乎古道下愚樂業勤是貿遷且貨殖乃資政之由龜貝作為生之本所以五行嘉於權量九府鑄其圓規宏羊算金充物少府壽昌論穀興利大農文馬有權幣分輕重之價青蚨致準物辨錙銖之則當較固而有禁在乾沒而難容甲也探情善諮鈎距欲贏其貨寧惡其囂閑諸駔儈之言曉彼質劑之契縱使鈎顱去賣先窺卜式之羊瑩蹄來鬻預問李斯之犬參伍不失毫釐匪差實廣漢之為能非釋之而不調里仁為美夫復何言立冬而郊先王之大禮備物以祭國家之舊章祝史正詞孚聖德於上帝牲牷肥腯降景福於明神犧象既陳匏竹攸設所司莅職寧闕禮經三獻式陳且不乖於祭法九成既奏何必在於由庚苟辭亡而樂在闕遽茲奪俸無乃非辜彼有辭焉捨之可也講信修睦禮行於時人和年豐神降以吉屬歲聿云暮田畯至喜農事不作役車告休於是乎具器孚薦陳粢戒掌答成功於衆神設禋祀於大蜡雖既滌既灌不愆不忒日違精擇神將曷歆吁嗟是司不謹有職昔仲尼觀魯助祭興於喟然今太卜差時儐神失於禺若祝史陳信其多媿詞司存不舉坐寘恒罰祭盡於敬是敦孝享備其鼎俎潔爾牛羊克孚濟濟之容實受穰穰之福眷言宗廟罔黷烝嘗甲何人斯每事無問干彼祫典昧斯國經靡虔於寢之儀苟踰立廟之制有禱而祭實越等威我高我曾雖罄由衷之道為壇為墠且貽僭上之責前言匪習後命奚施待窮越禮之詞然正恤刑之典孝以思親祭之如在既申怵惕式備烝嘗惟甲承家方茲主鬯遵先王之法有事宗祊讀非月之書方申禘典既而享獻其潔壇墠克除在祀之敬不乖陳信之儀無闕有何所犯旋告不經請從後命之詞靡取無稽之訟瞻彼洛矣其水泱泱雲澄綠潭樹夾青岸天作霖雨時維浸溢縱柏舟而難泛豈一葦之可航永惟主司能業爾職載懷黔首用祭元冥巨浪無倪已不分於牛馬明德可恃乃展敬於牲牷漢皇之歌彰夫舊史周官之禮著自前聞彼何人斯所謂末學事則有據非將奚為國家大禮畢具無文咸秩聲名赫乎上古享獻周於百神每窮谿澗之毛誰爽粢盛之備太常宗廟攸奉禘祫爰司張君理窟之才王肅儒宗之望請供鬯酒擬實卣罇允得事宜雅符恒典光祿以無匠不造又用靡草為辭有司以沿革不同兼引藉田特比犧牲不廢愛禮斯深鬱鬯莫供司存何劣且鬯人之職須預其材釀金草之芳酌充藑茅之既灌何得不供所務輒替彞章光祿拒之於前祠部送之於後事均齊楚得失而兩兼理同臧穀亡羊而一揆况國禮明著安可闕如咸請推窮方結刑憲祀典所興人倫共仰違越行事章程不容匹士下流陋巷微物奇材有慙於梓漆利器無逮於干將事於鬼神陳於俎豆如在申敬惟馨展禮著於行潦無妨於預詞輒薦太牢載虧於非月既斯故犯宜寘於刑殷之六瑚周之八簋始有列於雞象終見釁於豭豚陳其犧牲備以鼎俎用嚴莊敬則著品章是以有舟有罍資適用之恒理廢禁棜禁分貴賤之攸宜賻布之餘則以是具畫布之羃則見將施苟禮典而是違信奢僭而逾限甲祧廟其主祭器為先方用展於烝嘗忽謬崇於樸斵博以庶物損其葆大考揮風之妙思得天巧之良工規制旋開鱗甲斯覩聞絃樂影宛似出於重泉擁劍潛形坐見儀於四豆雕其物象紊所欽崇况黍稷而非馨何刻畫而為用且外骨內骨連行仄行同於剞劂之功以儷陶匏之器非取義於卿士本嚴禮於邦家託以私門實忘公憲同管仲之鏤簋昔所為非擬季氏之舞庭孰不可忍此而捨罪予其何誅尚未覩於滅口實有違於噬嗑惟彼營州實建司牧既班禮樂復典山川遵夏后之前謨佐皇朝而作乂且醫閭作鎮祀典攸該或每歲以薦誠或隨時而致享克敷禺若式備牲牷國之大儀允有常憲眷言州將奚紊舊章涓吉日而非時捨祀官而莫預自貽伊戚其可捨諸始也非因大祭苟為小祀去黍稷之非馨存乎明德採蘋蘩而式薦將以昭儉未爽正途難貽濫罰片言將折兩聽猶疑期於無刑請重推鞫宗廟為先是營宮室犧賦為次則備牲牷甲運偶光華羽成儀飾必復其始遂見稱家利涉大川爰假有廟一昭一穆佇列烝嘗經之營之旋終黝堊詳夫釁禮崇彼祔儀方有聞於容聲何不務於豐潔且始養為畜卜日曰牲未就質明之期忽斃致齋之夕萬化先往寧俟刲刳三廟便陳實忘嚴敬用過乎儉誠不在斯事神則難深宜捨此祭器不鬻明君子之雖貧牲斃則埋乃先王之制禮靡尋典訓苟務所懷縱匪若敖之憂終近晏嬰之隘祭則受福義必闕如刑以正邪孽何可逭以本牲而文過豈精意而為心實昧惟馨宜懲彼黷就賢體遠稱以動衆親師觀奧知乎成植甲允迪厥訓克懋存誠宏道惟人修詞在已視博習之志初遊焉息焉觀絜矩之心後不寢不食况早承函丈嘗忝儒林讀夫子之微言習門人之正義學而已講吾其不憂歲月之微梁木斯壞子在川上歎逝者之如斯人之云亡痛吾徒之安仰常時講位乍起於悲風他日荒墳俄懸於苦月輪奐斯在歌哭還升仰生前之令名存歿後之遺象上棟下宇不革故而廟成自堂徂軒咸鼎新而貌立藏衣冠而不墜委琴書而宛在且心喪三年是則是效亭傳四序有嚴有翼彼猶薄訴此實厚誣道雖謝於周書理亦殷於魯典緘彼言者不亦可乎鼓以格神金能制樂各率爾職斯謂守官國家展禮汾陽祈穀脽上享祀不忒威儀孔昭薦鼎已覆於黃雲配俎必資於清奏神人式序金石克諧坎其以都疑進不失旌樂之時義其大矣哉相彼鼓人佑我祭典理宜徹茲六變以出地祇何得舛此八音坐罹天討曲誠有誤聞迴顧於周瑜聲無可聽闕稱美於吳札法司按罪其如有詞請議叩鐲之刑捨此援桴之失精靈不測有上下之神祇敬誠無文有春秋之禴祀若昭之以明德聽之以和聲則澗溪沼沚之毛可一羞於宗廟蘋蘩蘊藻之菜可一薦於鬼神若無肅敬之心而有淫昏之祀則卜郊非禮國史由其致譏齋戒不嚴天皇於是流譴充人早霑明化忝曰司存職三犧之純養供六牲之蕃物固宜調其豢芻之食潔其文繡之衣豈容不整羽毛曾無博碩致令瘦損須寘科條家塾黨庠著以訓人之道儒生辯士分其志學之門擊磬同心琢玉殊制登四科而未覿鑿三窟而斯聞是以馮軾下齊未譽酈生之說處囊辭趙還推毛遂之言藉以師資成平藝業是有服膺之義攸呈緩頰之期甲道茂人倫才標鬼谷青溪託志自餘千仞之幽絳帳尊居早訓三端之藝摳衣鼓篋游夏斯均合從連衡蘇張式擬合生徒之五百類門人之三千濟濟分儀循循善誘服勤請益聞聚照於丹螢日就月將都試詞於黃馬卒以明試從而謝歸言遵掘窖之由庶察懸河之辯交頤泫泣知感激之攸同礪角含姿識牽援之或異事乃師古跡匪干誅告以為妖此情何謬學古入官不學將落聖人所以畱範君子誰非用心猗哉甯生勤亦至矣手繩口誦何劉寔之能匹負書擔笠豈蘇秦之可加悠悠長途是諷是詠撫中襟而始勵經巨險而方歸師以來晚見嫌聊申檟楚令以罰非其罪乃起異端在師雖則傷嚴遣謝又乖通論且尊無謝卑之禮卑有順上之心蒙雖不才此未為允曲阜境帶龜蒙地鄰鳧繹淹中禮樂仲尼之盛德不渝闕里詩書洙泗之英規尚在孔禮家承道學業崇詞林黃金滿籯白珪無玷泮宮刷羽方宣鳳德之儀沂水騰鱗再起龍蹲之教壇花啟一作發杏設絳帳而橫經市葉抽一作分槐據緇帷而闡教經來斯講式崇函丈之規龍見而雩大備嚴禋之禮顏恭躬忝冑子跡齒顓門叨承俎豆之間竊聽絃歌之末爰崇奠祭乃肅粢盛方執爨於吳樵忽飛塵於范甑師乃未飯豈可先嘗神且將歆寧宜預食不恭之罰罪合寘於嚴科無禮一作失禮之刑理或存於宥過州司忽罰頗涉深文臺局寬刑實遵平典龍首高居總㣥材以成務鴻翼漸陸入會府以參名既而樂鏡晨披山書密奏或連輝於喬木乍忝迹於場苗九流多材百司職廣既稱隨牒理籍符文麴紹窮巷無資傭書有素兩臺之妙雅善於銀鈎什一之求近通於金市挂迴鸞之健筆徇鳧鏹之輕資事既叶於私求迹已論於明憲况籤授之法本在職司擅鳴既達一作違且無條貫惟公書寫終自利刑既紊三章須窮兩造但選人以輕酬致怨麴紹以苟得生嫌若使不食先言便招後訟寘之嚴典惟會直繩六合為家萬方同貫用人文以成化藉鳥章而理物由是簿書嶽峙文帳波流酬答極於嵇康沉迷昏於公幹案牘之理義在隨時曹局之資固宜適用即有年代浸遠事跡淪沒寘諸幽閣疑孔壁而生塵納以嚴扃同汲書而有蠹桃花之色對春園而欲脫魚網之彩俯秋水而將沉羊續則不任補袍揚雄乃纔堪葢醬令式既標年歲州縣自有準繩何事強申方求取決請以狀下任依彞途不伏科罪周公制禮玉女騰規吐飛電於壼中躍流星於箭裏周旋之禮非無賓主之文進退之言自有威儀之法豈得妄申鄙見輒觸公方徒事曲躬虛持枉矢既投常憲復挂彞章此而不繩法將焉措請詳條斷宜準禮科按理詳文將謂為允圭廛勝壤鼎邑名都八達開衢傍連鶴嶠九重危堞近枕龜津鐵鏁長橋衣冠不絕金錢廣埒車馬相望楊忠擢以茂材宰斯京縣屬虹梁落構翠瀲驚波滯商賈於平川阻騑驂於上路將以日躔南陸氣叶冬郊當此沍寒難於修葺役徒未集且叶愛人船舫有私何乖蒿事杜威蘊德載述風猷廉使繩違遽投霜翰究其所以蓋取義於隨時觀其所由亦何煩於褒貶貨以貿遷日中為市化能柔遠天下通商爰詰犯禁之人以明有截之制矧惟市賈實主販夫競彼錐刀當展誠而平肆取諸噬嗑方易有而均無既泉布之攸歸何器用之或異梯山款塞胡虜初喜其來王懷寶越鄉周官方驗其不物事既告於邊吏罪方書於賈人且觀爾實來則銀錢是入既按其闌出何璽節無憑舉貨既麗於司關附刑當置於圜土一成定法理官可貸其全生三宥是思憲部宜允於從贖貨有廢居政惟通變以收以斂實著於周經或與或求蓋存乎易象苟罔率厥典則其誰曰然伊甲者何不時而買屬蘋蘩有薦霜露盈懷家迫屢空曷求仁者之粟國崇救乏爰假所由之貨理宜給茲稽市遵彼貿遷期不過旬將貧窶之是恤勒夫從主豈出納而為吝異乎闕吏孰曰均官且濟俗利人操贏善貸誠為體國之要亦取隨時之宜如存理而無傷何飾詞而不與遂使開倉長孺徒歸美於漢庭餼粟子皮獨垂芳於鄭志請辨而以授無質以為疑仍旌泉府之規用徵國服之息儻從愚見庶為式臧必藉美言爰資善價化其小大是等精粗乙之蚩蚩參市為業取諸噬嗑乃競錐刀既不我虞遂成爾詐惑亂為意高下在心覽文惠之書漏畧豈宜免罪披蕭何之律鄣固安得無辜縣吏守文加杖刑而為當郡僚無智寧以盜而深疑請據明文斯為適理聖人有作鬱為令典車服禮器貴賤有班文物采章高下無濫我君開運朝儀式序敦樸素之風無虛麗之飾錦文不鬻於肆冠佩必加於賢而鞶厲沓光事華來今鑾蕤靄飾理煥前古瞻彼緒帶有標令則官所云市法乃酬傭盍亦采均輸之餘濟鹽鐵之潤焉可減茲稍廩以虛國財靜言所司或匪通論四人異業百工居次事有資於軍國理無隔於纖微納帙所成多慙美質緝叢殘於鴛綺同衆製於狐裘行因針縷之工坐得烟霞之迹雖遠殊於法物遂有入於官須但物異新成幸非科作論市唯應見物論濫寧可別求物既不任供官退亦何成頡頏不伏却領仍事薄言豈可加刑終希理遣當州導江山川雖間貿絲抱布來往是常矧今赤羽開元黃旗啟聖布堯心於萬國復禹迹於九州書等同文車無異軌雖夷夏殊俗而交易何妨趙璧尚入秦庭楚材猶歸晉用使人志清天下望重星軒標鐵柱之嚴班握金龍之使節未聞從善翻見求瑕鳥隼為旟有虧於正直鷹鸇逐雀稍涉於煩苛事不可詢期乎勿用惟德動天無遠不屆北極燭龍之國屈膝稱臣南窮火鼠之鄉傾心向化眷茲真臘早挹淳風自昔雷同由來霧集豈假鑄銅之力無勞刻石之銘所以來往邊州市馬峯部論其由緒未乖從有之方驗以逗畱豈爽求無之道御史職惟激濁志在揚清疑彼姦非欲嬰羅網都護為相知捉搦先有稟承濫投一面之科寧杜三緘之口向若邊烽變擾論情不可免辜今既市馬往來據理難書厥罪御史科結有謝於彈珠都護有詞無慙於辨璧宜依薄訴用叶通途食哉人時農乃國本受利班爵必資敦勸苟昧茲道其惟謬官乙隨牒下車彈冠莅職蠢茲商賈嗟彼耕桑苟征稅之匪差則黎甿之獲乂况鬻良雜苦豈販夫之可矜霑體塗足實農人之是愍故可經其壟畝重以郛廛將趨本而棄末杜惟利而是視所以時入芻藳歲課田租人必樂康俗寧凋瘵類信臣之仕漢姑正溝塍殊晏嬰之相齊爰知屨踊必若誅求無度杼軸其空乃利晉以闕秦是瘠魯而肥或云之訟今則未詳停其摭實式將丕蔽閑人者五列在周官雖去家而不歸終寓世而無職喬木空在乘白雲而不見斷蓬斯飄待涼風而未得今乃請移執事願効劬勞請自強而不息復知迷而可尚必也末遊是恣浮迹難悛許之而行未敢聞命如或恪居爾職無俾我虞遂其由衷是亦奚擾况復存乎案牘置以隄防自可定於職司亦何請於華省
