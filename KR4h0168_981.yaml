  - {type: head, offset: 3084, content: 對寫告身判, id: KR4h0168_NFKB_981-h43, level: 2}
  - {type: head, offset: 3084, content: 麴紹違法寫告身邀勒選人為選人所告, id: KR4h0168_NFKB_981-h44, level: 2}
  - {type: head, offset: 3263, content: 對故紙判, id: KR4h0168_NFKB_981-h45, level: 2}
  - {type: head, offset: 3263, content: 州申遠年故紙請賣充公廨支用, id: KR4h0168_NFKB_981-h46, level: 2}
  - {type: head, offset: 3413, content: 對投壼判, id: KR4h0168_NFKB_981-h47, level: 2}
  - {type: head, offset: 3413, content: 得乙進枉矢於賓賓不拜前云魯鼓不作失儀, id: KR4h0168_NFKB_981-h48, level: 2}
  - {type: head, offset: 3507, content: 對私雇船渡人判, id: KR4h0168_NFKB_981-h49, level: 2}
  - {type: head, offset: 3507, content: 洛水中橋破絕往來渡縣令楊忠以為時屬嚴寒未可修造遂私雇船舫於津所渡人百姓杜威等連狀舉忠將為幹濟廉使以忠懦弱不舉職事以邀名欲科不伏, id: KR4h0168_NFKB_981-h50, level: 2}
  - {type: head, offset: 3648, content: 對市賈為胡貨判, id: KR4h0168_NFKB_981-h51, level: 2}
  - {type: head, offset: 3648, content: 甲為市賈為胡貨物有犯禁者大理以闌出邊關論罪至死刑部覆云賈人不知法以誤論罪免死從贖, id: KR4h0168_NFKB_981-h52, level: 2}
  - {type: head, offset: 3806, content: 對貨有滯於人用判, id: KR4h0168_NFKB_981-h53, level: 2}
  - {type: head, offset: 3806, content: 貨有滯於人用者甲不時而買請賒之所由不與云不過旬日勒從其主云已從其有司, id: KR4h0168_NFKB_981-h54, level: 2}
  - {type: head, offset: 4002, content: 對買賣不和判, id: KR4h0168_NFKB_981-h55, level: 2}
  - {type: head, offset: 4002, content: 乙買賣不和鄣固以取財科杖罪郡以盜論乙並不伏, id: KR4h0168_NFKB_981-h56, level: 2}
  - {type: head, offset: 4100, content: 對和市給價判, id: KR4h0168_NFKB_981-h57, level: 2}
  - {type: head, offset: 4100, content: 和市緒帶準法合即給價直少府監以稍入供之, id: KR4h0168_NFKB_981-h58, level: 2}
  - {type: head, offset: 4217, content: 對行人供濫物判, id: KR4h0168_NFKB_981-h59, level: 2}
  - {type: head, offset: 4217, content: 官市納帙行人將濫物供所由揀退云被頡頏不伏却領, id: KR4h0168_NFKB_981-h60, level: 2}
  - {type: head, offset: 4330, content: 對熟羌市易判, id: KR4h0168_NFKB_981-h61, level: 2}
  - {type: head, offset: 4330, content: 當州熟羌十月來導江縣市易按察使科彭州刺史罪訴云並蠶崖外不伏, id: KR4h0168_NFKB_981-h62, level: 2}
  - {type: head, offset: 4454, content: 對真臘國人市馬判, id: KR4h0168_NFKB_981-h63, level: 2}
  - {type: head, offset: 4454, content: 真臘國人來云於峯州市馬御史科安南都護罪訴云為相知捉搦陸路不伏, id: KR4h0168_NFKB_981-h64, level: 2}
  - {type: head, offset: 4631, content: 對稅商判, id: KR4h0168_NFKB_981-h65, level: 2}
  - {type: head, offset: 4631, content: 乙為吏請稅商以勸農或云稅重時物倍貴則商不失利人受其弊, id: KR4h0168_NFKB_981-h66, level: 2}
  - {type: head, offset: 4802, content: 對傭賃判, id: KR4h0168_NFKB_981-h67, level: 2}
  - {type: head, offset: 4802, content: 有客戶閑人請移執事許之恐因有流散不許則見無常職欲允其請仍立案牒為其限約州以為擾具請省裁, id: KR4h0168_NFKB_981-h68, level: 2}
