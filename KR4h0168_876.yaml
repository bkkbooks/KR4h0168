body:
  text: 南唐保大二年春二月廉使彭城公新建大廳者所以延賓旅服不庭也載筆之士得以總敘興復叛亂始龍蛇之起陸旋戎馬以為墟萬井之桑田垂變由是㣥雄角立諸化風行而列郡之俗猶尚草創爰屬大統土德中興漢戀劉宗寶祚重尊於光武夏思禹力鴻圖復霸於少康我烈祖光文肅武孝高皇帝反正宗祧光宅寰宇雲龍自契風虎相符乃命我公解印黃岡擁旌袁水公半千應運七葉襲勳鄭武公則父子匡周乃賦緇衣之什賈太守則兄弟理洛爰刊棠棣之詩方枝幹以猶疏比源流而未濬夏日冬日莫之與並一酪一酥俱弗如也初客省司徒清河公監臨是郡乃究尋往制奏復舊基召良工而方切運斤奉急徵而遽回丹闕公才臨理所歷覽區中公署則頗極欹邪巷陌而仍多燥溼翼日與通判員外中山郎公議蕆斯事且曰馬文淵所過都城皆理叔孫婼所館一日必葺豈位居牧守運叶昌期而不崇廨署者乎矧又輿情攸願帝命曰俞乃蠲帑廩以市楩楠創陶冶以備瓴甓物無苛費人不告勞日居月諸厥功克就所建立郡齊使宅堂宇軒廊東序西廳州司使院備武廳毬場上供庫甲仗庫鼓角樓宜春館衙堂職掌三院諸司總六百餘間仍添築羅城開闢濠塹所役將士皆均其勞逸賑其饑寒氣等指梅言如挾纊同孫仲謀之砌壘咸矜鐵甕之堅異皇國父之築臺取謗澤門之皙終乃圖施丹雘表進斯庭飛章陳戮力之功丹鳳降紫泥之詔褒崇逈異賞賜有差先是茲郡鬻竹木柴炭者有耐門之稅公乃復南頓之免於是豐財足用士庶易其居第二載之內闤闠櫛比逮於三載周而貌輯焉公儉於身而富於人孝理家而忠奉國心惟惻隱德契清寧故千里之稼穡登豐四序之雨風調順昔漢宣帝有言曰與我共理者其惟良二千石乎即我唐得斯人也暨先皇晏駕聖上御圖慶賜遂行無有不當敕升袁州都團練觀察處置等使賜明威將軍食邑三百戶褒政績也邸之大廳舊有壁記以紀方伯除任授代自干戈俶擾歲月微失其本末唯存姓氏乃命筆吏敘而補焉故使刊勒復紀於壁其年五月一日記贊初官沔王長史後仕南唐保大十三年守司士參軍嘗表奏試太常寺奉議郎夫大道昭然運天地無疆之福神功卓立持陰陽不測之機足以助化唐堯流澤區宇况屬寶祚中興之日式當明君嗣業之朝闢四門而慶洽神人納萬闕而闕垂顯晦緬循古轍宜演遺芳遵其相則物理順闕設其狀則人倫生敬將闕世俗爰建祠庭非莊嚴而豈顯威嚴儼塑像而方殊衆像彥能洎旋叨睿渥任彼藩垣既陳如在之儀躬薦惟馨之奠遽覩茲廟門廓湫隘軒墉而已半隳頽堂殿依稀四面而渾無遮截因追曩昔倍感精誠竊思闕二字初年竹馬之歲常遊東都大廟每乃如歸殿中之花果香毬或時將去座右之彞樽祀器玩弄為常爰自繼忝天波連分閫寄今逢聖母別顯當時顧其此日之升華益荷皇家之驅策合圖葺創上報慈闕矧當大國之南隅乃是元戎之舊鎮宜加壯麗以振闕綱敕恩蘋蘩常潔於二時豆俎罔遺於千古闕三字首每詣虔祈儻蒸嘗之舉匪嚴則昭感之微闕降特俾重新展換裏外裝修闕塑聖母真儀仍置帳座別添左右部從共計三十闕身并起遮殿行廊及畫壁鬼神隊仗二十餘堵闕楹高敞盤瑞起而每壯金湯儀衛駢羅闕三字而晴寒毛骨足以光輝井市鎮壓闕霓闕而闕三字下遙天顯神通而豐壤九土闕二字聰哲密布禎祥萬歲千秋永霸有唐之日月澄今煥古常闕汝水之軍民今則締搆成功彩繪告畢已成慶賽皆獲周圓式仰奇縱宛昌洪範莫不昭彰遐邇興洽往來丹心既肅於威稜翠炎宜施於鐫勒庶闕星紀罔墜興修固非稱讚徽猷祇冀直書其事時太歲乙卯巨唐保大十三年孟秋月喬字子喬廬陵玉笥人南唐先主時纍遷中書舍人嗣主遷南都留喬輔太子監國後主襲位歷門下侍郎兼樞密使及貶制度改右內史侍郎兼光政院使輔政宋師圍金陵喬欲與後主同殉國而口不忍言遂自縊臣聞有物混成其來尚矣天地得之而覆載日月得之而運行四時得之而變通萬物得之而繁庶卷之則無餘舒之則無垠求於外則勞求於內則獲聖人取法而俯正八紘上士勤行而仰遊十極深矣遠矣恍兮惚兮逖聽妙言強名曰道然則真風已續大道久隳居一者以嗜欲滑和就能司契在三者笑神仙可學誰務谷神悠悠多中智之君寂寂罕持盈之士華胥之國不復神遊無何之鄉空停羽駕天其或者將有俟焉皇帝陛下極大道之頺綱維列仙之絶紐乃眷正一屬之真人思與神交遂崇廟貌天師道宇所以興盛於今日也天師姓張氏諱道陵字輔漢沛國豐人也若乃六世相韓之盛七葉佐漢之名服冕乘軒重規纍搆在人間之世雖炳煥以可知而太上之家亦寂寥而何有况前史詳之備矣故斯文略而不書天師紺髮黛髯青眸朱口儲精於八十一氣校德於七十二仙雖嗣世勳靡嬰代網粃糠聲利桎梏衣冠被鳳褐而御龍書外嚴聖服吞玉英而潄金醴內養丹元初杖策以遊吳忽拂衣而向蜀地惟蠶市峯號鶴鳴有異荊臺即謂忘歸之所諒同朱閣還稱不死之庭巖桂留人因停翠蓋山椒考室更寫丹邱時巴蜀初夷神姦未刈菱花縱吐罕照山精棘矢雖陳莫除㣥厲遘茲妖孽毒我蒸人上元貽西顧之憂下土夭北邙之骨天師心存絳闕精徹蒼旻玉輦來過因受驅治之法金墉至止爰膺誥命之文平變怪之猖披致生靈於清靜聲流華夏惠洽幽明若夫宣揚微言指明奧義著為道帙貽厥學徒斯並祕在靈壇貯於瓊笈丹青妙揵鼓吹真科有陋赤松空留八戒翻嗤鴻烈尚雜百家既而鄙方外之猶羈念寰中之未返飄然輕舉若遐征三十六天徒見驂鸞之去二十四治不窺化鶴之歸昭灼仙踪葳蕤來裔竟留仙宇上契昌期皇帝陛下仙李分陰夙承上聖之孕弊樟擢秀實報中興之符高居穆清虔奉宗廟動作興事等雲雷之經綸內平外成見天地之交泰無為而理有感則通至若盛烈殊休亦可得一二而言也蕞爾越徼介於海隅沉閼斥爭曹談無禮文身相顧崩角同憂初款塞以求哀俄盈庭而請命實興我役薄言徂征偏師一征擴地千里斯則聖人之弔伐也秦密二郡關河幾千家乃漢臣身縻僞爵馬援方居隴坻竇融亦保河西日飲皇風思沾元化率有卒伍擁乃黎元協力同心聿來胥會斯則聖人之柔服也絶域殊方搜奇蘊異驗青雲之不散仰白日之高懸梯山如覆簣之功航海如容舠之隘不愆其素咸造於庭常滿之杯豈弗索而何獲難得之貨蓋不求而自來斯則聖人之懷遠也澤盈碧露井有黃雲山涌龜蛇之金匣鳴龍虎之劍九苞神鳳窺阿閣以來儀八翼靈禽背羽山而戾止斯則聖人之符瑞也又若陋常鈞之瑣瑣篤至德之巍巍當大道既隱之時行自昔所無之事宅於望苑命我天倫洪惟至公實冠百辟在昔卯金撫運代邸承祧高視前王良無愧色洎定建儲之計始無必子之言徒自飾情竟成虛語何則五帝官天下三皇家域中有自來矣雖甚盛德莫能行之然猶紀其功者燦若雲編頌其德者溢於玉牒苟以今而泥古諒如日而映星重以並見戚播特逾舊制姬周異姓為後何足道哉炎漢非劉不王既聞命矣踰千越萬絶後光前皇太弟以天縱之姿懋日新之德初開鳳邸東平之善尤彰旋正龍樓北閣之遊殆絶開物成務藏往知來大元帥齊王下士好賢經德秉哲分茅建社荒十二之雄都佐國庇人得五千之深旨副元帥燕王拔乎㣥萃體自吾君居無求安不以珥貂自貴坐進此道豈以駟馬為先咸樹風聲同守社稷中外既理華夷已清然而上心猶或未足思致人於壽域每澄慮於大庭寤寐通仙闡揚元教以為德如可尚豈隔於古今道之將行必先於崇奉乃詔執事建天師新廟於信州龍虎山是山也夙號洞天由來福地南襟百越北帶三吳台嶺前瞻恍惚赤城之狀廬峯回盼依稀紫霄之形豈猶羅浮洞中潛通勾曲祝融壇上平視長沙彼詞人之炫四朝方士之稱三島欲將擬議猶或荒凉至如璇房瓊室之深嚴金樓玉臺之祕邃蕙圃芝田之芬馥霓裳鶴蓋之蹁躚道士之青牛仙翁之白鹿固已紛綸於祕籙雜沓於靈篇更著丹崖青壁之奇谷隱巖棲之美纎蘿夕動聞天籟之寥寥瀑布晨飛動日華之杲杲孤桐倥偬上出雲霄修竹檀欒下凝烟霧倚樹而多稱君子採藥而更遇王孫宅之者潛契希夷遊之者自袪鄙俗天師頃來江左尚憩茲峯旋指漢川實留遺愛厥後運當典午年在永嘉有美後昆聿來遘止遂崇真宇以永靈風亦猶緱嶺之旁子晉之祠盛啓阜亭之下安期之廟聿興仇生膺石室之祈稷邱享太上之祀諒同條而共貫實接武以均芳自是日薄星回時遷代改雖桑田日變而瑤島長春迄皇運之中微屬旻天之不弔蚩尤作梗暴海內之衣冠回祿為災延壺中之日月千尋建木俱為柏殿之灰八景靈壇但有蕪城之草鐘隨鼎折磬逐杯飛荒階之苔蘚易侵空餘玉磶廢井之梧桐半在不見銀床洎區中之厭兵乃江表之無事永惟仙胄猶固頺基雖漸務修崇然終非博廠成乃集靈之所鍾乎好道之若及此庀徒遂期永逸事當農隙人若子來既遴麈尾之松仍采雉㣥之木桂雖有蠧實出小山柏縱後雕竟辭大谷公輸剞劂王爾鈎繩競呈巧以致功乍星羅而霧集回廊四合忽若雲垂祕殿百尋矗如山立芝栭繡桷藻井綺疏上赬壤以騰文下朱霧而動彩飛梁偃蹇疑螮蝀之橫空碧瓦參差狀鸚鵡之㣥集凌兢失視坱圠無垠寶座既嚴睟容惟穆朱幡不動有若存神羽服如飄還疑上漢差差仙仗肅肅靈官顧望增輝遊從生敬演茲大教衛我興朝天子萬年與南山而永固本支百世將西伯以齊芳其福祉也既如此其壯麗也又如彼縱高岸之為谷必靈光之巋然二十二代孫秉一體備清和氣凝元寂鈎深致遠所得者金簡玉書吐故納新其驗者赤筋青骨許掾之靈風未振呂恭之道蔭彌高豈徒三世無慚斯固一言以蔽再光先搆不亦宜乎夫妄啓精廬誕作楚室猶存碑表必播聲詩況簡在帝心成茲妙果以祈蒼生之福以崇元牝之門苟匪頌宣孰傳來者臣才非黃絹腹謝青繒學壯武之討論未窺鐵硯佐元元之述作又乏金壺輒罄謏聞強為銘曰天地萬物未生厥初道乃特立為之權輿惟寂惟寞不盈不虛帝返金闕神傳玉書聖教以宣列仙繼作陟降朱陵優游碧落身雖化去功乃昭灼猗歟真人用實宏博真人者何堂堂乎張家藏鵲印代富貂璫區區田竇瑣瑣袁楊我獨高謝於何不臧訪道求真存元守一九鼎傳芳飛仙得術內養靈符外宏陰隲衆邪奔潰㣥生寧謐我功既著我惠既敷上瞻絳府旁睨蓬壺仙蹤去蜀廟貌留吳正一之教今寧遠乎赫赫我唐明明天子親詣崆峒精求赤水尊道貴德任賢尚齒禹好昌言堯稱光被甌閩恃險談疑我興戎室家相弔杼柚其空帝思俾乂師乃徂東曾無遺鏃俄已韜弓澤浸殊鄰聲覃絶域條支入朝竇融歸國方賄連延襁負匍匐樂我王道誓依有德義高睦族舉必至公脫略常法從容古風命我棣草口咢處我桂宮亦建賢戚施於無窮能事畢修聖功益茂思致華戎同躋仁壽耽味道腴表揚仙胄乃聖真祠宇茲名岫庀徒揆日舍舊謀新燕山斬桂嶰谷誅筠不遺文水仍采貞珉隱如山積響若雷震功匪浹旬成由決日敞作陽臺邃為陰室璀石粲珠金熒煌丹漆子午非速瓊華詎匹峩峩祕殿穆穆睟容衆真列侍仙裔相從如聆夕唱似喜晨鐘洪惟妙用實亞猶龍元覽前閥恭聞往誥自匪哲王孰云好道我后統天升堂睹貌光揚真科必膺厚一作豐報仁肇建陽人閩臣仁翰弟少事閩為裨將閩亡入南唐擢淮南屯營應援使進授鎮海軍節度使移鎮武昌開寶時為後主鴆死觀夫善人宏願冶氏畢功簨高懸蒲牢迭應無間始息奪震響於春雷㣥動初驚壓雄聲於曉鼓結界之地布金之園設比堅牢同為壯觀伏願上窮碧落歷淨方而聽必咸歡下徹泥犁遍業趣而聞皆離苦觸類聞此俱脫羽鱗然後軍庶之閒城隍之外昃耳俱登於善道正心長叶於妙因宗社興隆皇王福履以至仁肇身宮克固祿位恆延保眷屬之利貞踐歲華而安吉所有信心衆士福利同增仗此良因永為不朽時唐乾德五年大歲丁卯二月庚申朔二十五日甲申記惟簡饒州鄱陽人仕南唐為國子博士集賢殿侍講以虞部侍郎致仕金陵受圍起授給事中副徐鉉使宋國亡入宋纍官至水部員外郎卒夫金剛經者乃衆經之源諸法之本為苦空之風骨為寂滅之綱闕一字者矣蓋如來示密獨在斯文闕三字以歸諸無見諸無而捐一有在傳講之遺法者類圖相以現容也月在秋潭智者觀之不足以為有唐發空谷聖者聞之不得以為無實堅高前後之所元乃指視隨迎之不及有道禺上人者闕二字神秀語淡行孤夙持慧劍之鋒已斷煩惱之縛早攜瓶錫久涉雲泉南闕二字水之鄉北歷淮湄之道次於寓泊受闕一字斯經闕一字歷耳中尋了心下更於研究轉得元微可謂繫寂寞之得聲視恍惚之見物因升應而釋松帚遂啓卷以化聽徒莫不緇侶雲臻白衣霧集如是者周遊五六郡首尾八九年歘舉闕四字倚錫於桂嶺遂於此寺序以安焉時遇彭城太傅鎮於是府府主太傅修韓白之謀以衛其國習周孔之教以飾其躬游釋老之門以理其性所以化被四人之內咸興十著之心於是上人開講是經日不唯僧衆而與俗流靡不仰上人闕一字真風俟上人之指授勤拳闕四字鴈序而列之敬奉側聽者若闕一字而謺之是以日往月來周而復始上人忽一日講餘謂聽從曰道闕一字雖闕一字剖幽微引喻闕二字尚慮後來者不共與於斯說焉欲刊闕二字刻諸茲典為不朽之事化未聞之人不知以為可乎而且一問未畢衆諾俱旋施者求先咸稱甚善乃化錢以搆此碑者也遂具狀疏申達於府主太傅既覽所陳亦加欣譽因役斧闕二字良匠費楩柟之異材預建高亭為之衛庇惟簡叨請直紀諸不繁書延已一名延嗣字正中廣陵人仕南唐纍遷中書侍郎同平章事除昭武昭義軍節度使周師入改太子太傅宋建隆元年卒年五十八諡忠肅皇上即位之九年詔以廬山書堂舊基為寺寺成會昭武軍節度使馮延已肆覲於京師上賜從容於便殿語及往事顧謂曰廬山書堂已為寺矣朕在藩時簪履輩唯卿在耳朕置此書堂之本意卿亦預知頗記憶否延已對曰陛下真誠懸諸日月微臣固陋何敢忘之昔在吳邦唐運中缺陛下齡方志學龍潛鼎司洪惟聖心邈焉高蹈一作趣咳唾權政疣贅經綸慕崆峒之師幾勞軒拜聞富壽之祝亦固堯辭注念煙蘿每懷宴息恩尋爽塏之境以備華胥之遊匡廬天下之名山江表之勝概圖諜具載靈仙咸棲果有潛夫來獻茲地已酬善價遽闢崇基才俾芟夷未遑畚築旋則中興在運夏物重歸陛下位屬元良務煩監撫寢門雞唱方視燠寒嵩高鳳鳴寧諧好尚逮乎出震嗣服雖欲從之巢許之蹤其可繼耶堯舜不得已而治天下豈虛言哉方今陛下日照天臨風行草偃勤儉以化焦勞思理求賢草澤盡善於百王推公友于邁德於千古蟲蝗殞於靈雨旱歉轉為豐年大信既孚殊方徯后威惟取亂仁實懷柔所以建水僭稱肉袒而詣吏楚邦亂略俯首而來朝矧彼長沙恃險與固隔絶聲教五紀於茲一旦砥平易於反掌兵不血刃市不易肆拓土宇於數千里復正朔於四十州可大之功冠乎史冊猶且納隍軫慮馭朽兢懷物暢皇猷民知王度洋洋焉蕩蕩焉混一車書豈遠乎哉言未及終上曰是皆然矣抑朕又聞古先哲王握圖御宇惟德是務與善同歸俯仰抑揚不失其正久於其道而天下化成恆沙如來出世濟俗依空說性性外無空信則修崇悟則解脫始乎正法終乎象教使人趨清淨之域息貪競之心民用以淳理道何遠是則菩提之教與政通焉朕以此寺基是朕當年思欲遁世之地棄之草莽則可惜搆之棟宇則無名不若興建伽藍以居禪衆示人至理亦造化之一端也其創置之規奢儉之度績用之費卿復知耶延已對曰起置之始適已上奏逮茲成寺臣亦粗知肇乎程土工度山木豫章之材間出般輸之藝屢獻運一作揮斤若雨荷鍤如雲力不勞於中民財不傷於外府歲月未幾厥功已集駭多寶之湧出疑化城之突然邃殿正門重軒復檻高牆虬轉修廊翼舒香厨旁開僧堂內闢法筵清淨宛是祗陀之園方丈精嚴更類維摩之室托菩提之地位儼如來之相好功呈敏手則塑像如生妙屬良工則丹青若活而況依林附麓左嵓右壑瀑布懸呂梁之勢凌雲挺闍崛之形溪徹湓江表法流於不斷峯開石鏡同慧日之長明其或寥泬雲收戶庭雨霽鐘鳴谷響猿啼樹深仰止則峻巘連空寫望則長川無際僧間境寂似出世間信有為之勝因實安禪之嘉所足使迷者得于逵之漸達者得不二之門苟非聖人用心其孰能與於此乎上曰卿知其始也既如彼知其末也又如此文以記事非卿而誰延已對曰臣才學本空筆硯久廢雖然盛德之事固願詠歌慚匪當仁庶符不朽乃跪而進頌曰彭蠡之陽匡廬峻峙積純和氣竦搘天勢峯連奇秀谷藏靈異鶯洞之前勝復為最懿乎我后河清運契仁聖文明肅恭寅畏堯舜其心巢父其志思憩大庭因開福地帝出乎震龍飛在天梯航合遝符瑞駢闐推公固本舉正求賢九功既敘七德俄宣貞師一奮建人來庭神兵再發楚邦蕩平威震四海疆開百城日新之盛無得而名恢恢睿謨游刃多餘因思是境昔擬華胥夙心不獲締搆猶虛改命梵宮俾奉真如榛蕪既闢棟楹崛起雕甍繡栭重欄謺砌後倚崇一作層崖前臨無地屈曲延袤高低迤邐炳煥丹青端嚴塑像表上乘法示天人相清衆晝閒禪關夜敞十二類生孰不瞻仰聖君旨趣古佛因緣教化之本治平之原其功莫京其福無邊皇圖帝齡永永萬年保大十二年歲次甲寅正月丙子朔十日乙酉馮延已奉敕撰佑幽州人仕南唐為祕書省正字後主在東宮開崇文館佑預其選及襲位纍遷中書舍人開寶五年貶儀制改內史舍人上疏極論時政後主怒收佑佑聞命自殺年三十六三軍可奪帥也匹夫不可奪志也臣乃者繼上表章凡數萬言詞窮理盡忠邪洞分陛下力蔽奸邪曲容諂僞遂使家國愔愔如日將暮古有桀紂孫皓者破國亡家自已而作尚為千古所笑今陛下取則姦回敗亂國家不及桀紂孫皓遠矣臣終不能與姦臣雜處事亡國之主陛下必以臣為罪則請賜誅戮以謝中外僕與足下叨纍世之盟雖疆畿阻濶休戚實同敢奉尺書敬布腹心昨大朝伐楚足下疆吏弗靖遂成釁隙初為足下危之今敝邑使臣入貢皇帝幸以此宣示曰彼若能幡然改圖華車之使造廷則百萬之師不復出矣不然將有不得已者僕料大朝之心非貪土地也怒人不賓而已且古之用武不計強弱小大而必戰者有四父母宗廟之讐一也彼此烏合民無定心二也敵人進不捨我退無守路戰亦亡退亦亡三也彼有敗亡之勢我乘進取之機四也今足下與大朝無是四者而坐受天下之兵決一旦之命安國家利社稷者固如是乎夫強則南面而王弱則玉帛事大屈伸在我何常之有違天不祥好爭危事天方相楚尚未可爭而況今日之事邪地莫險於劍閣而蜀亡矣兵莫強於上黨而李筠失守矣竊意足下國中必有矜智好謀之臣獻尊主強國之策以謂五嶺之險非可遽前堅壁清野絶其餉道依山阻水射以強弩彼雖百萬之兵安能成功不幸而敗則輕舟浮海猶足自全豈能以萬乘之主而屈於人哉此說士之常談可言而不可用異時王師南伐水陸並舉百道俱進豈暇俱絶其餉道盡保其壁壘或用吳越舟師自泉州航海不數日至足下國都矣人情恟恟則舟中皆為敵國忠義敢死之士未易可見雖有巨海孰與足下俱行乎近奉大朝諭旨以為足下無通好之心必舉上秋之役即命敝邑速絶連盟雖善鄰之心期於永保而事大之節焉敢固違恐煜之不得事足下也臣子之情尚不逾於三諫煜之極言於此三矣是為臣者可以逃為子者可以泣為交友者亦惆悵而遂絶矣煜與足下叨纍世之睦繼祖考之盟情若弟兄義同交契憂戚之患曷常不同每思會面抵掌交議其所短各陳其所長使中心釋然利害不惑而相去萬里斯願莫申凡於事機不得款會屢達誠素冀明此心而足下謂書檄一時之儀近國梗概之事外貌而待之汛濫而觀之使忠告確論如水投石若此則又何必事虛詞而勞往復哉殊非夙心之所望也今則復遣人使罄申鄙懷又慮行人失辭不盡深素是以再寄翰墨重布腹心以代會面之談與抵掌之議也足下誠聽其言如交友諫爭之言視其心如親戚急難之心然後三復其言三思其心則忠乎不忠斯可見矣從乎不從斯可決矣昨以大朝南伐圖復楚疆交兵已來遂成釁隙詳觀事勢深切憂懷冀息大朝之兵求契親仁之願引領南望於今纍年昨命使臣入貢大朝大朝皇帝纍以此事宣示曰彼若以事大之禮而事我則何苦而伐之若欲興戎而爭我則以必取為度矣見今點閲大衆仍以上秋為期令敝邑以書復敘前意是用奔走人使遽貢直言深料大朝之心非有唯利之貪蓋怒人之不賓而已足下非有得已之事與不可易之謀殆一時之忿而已觀夫古之用武者不顧大小強弱之殊而必戰者有四父母宗廟之讐此必戰也彼此烏合民無定心存亡之幾以戰為命此必戰也敵人有進必不捨我求和不得退守無路戰亦亡不戰亦亡奮不顧命此必戰也彼有天亡之兆我懷進取之機此必戰也今足下與大朝非有父母宗廟之讐也非同烏合存亡之際也既殊進退不捨奮不顧命也又異乘機進取之時也無故而坐受天下之兵將決一旦之命既大朝許以通好又拒而不從有國家利社稷者當若是乎夫稱帝稱皇角立傑出今古之常事也割地以通好玉帛以事人亦古今之常事也盈虛消息取與翕張屈伸萬端在我而已何必膠柱而用壯輕禍而爭雄哉且足下以英明之資撫百越之衆北距五嶺南負重溟藉纍世之基有及民之澤衆數十萬表裏山川此足下所以慨然而自負也然違天不祥好戰危事天方相楚尚未可爭若以大朝師武臣力實謂天贊也登太行而伐上黨士無難色絶劍閣而舉庸蜀役不淹時是知大朝之力難測也萬里之境難保也十戰而九勝亦一敗可憂六奇而五中則一失何補況人自以我國險家自以我兵強蓋揣於此而不揣於彼經其成而未經其敗也何則國莫險於劍閣而庸蜀已亡矣兵莫強於上黨而太行不守矣人之情端坐而思之意滄海可涉也及風濤驟興奔舟失馭與夫坐思之時蓋有殊矣是以智者慮於未萌機者重其先見圖難於其易居存不忘亡故曰計禍不及慮福過之良以福者人之所樂心樂之故其望也過禍者人之所惡心惡之故其思也忽是以福或修於慊望禍多出於不期又或慮有矜功好名之臣獻尊主強國之議者必曰慎無和也五嶺之險山高水深輜重不並行士卒不成列高壘清野而絶其運糧依山阻水而射以強弩使進無所得退無所歸此其一也又或曰彼所長者利在平地今舍其所長就其所短雖有百萬之衆無若我何此其二也其次或曰戰而勝則霸業可成戰而不勝則汛巨舟而浮滄海終不為人下此大約皆說士孟浪之談謀臣捭闔之策坐而論之也則易行之如意也則難何則今荊湘以南庸蜀之地皆是便山水習險阻之民不動中國之兵精卒已逾於十萬矣况足下與大朝封疆接畛水陸同途殆雞犬之相聞豈馬牛之不及一旦緣邊悉舉諸道進攻豈可俱絶其運糧盡保其城壁若諸險悉固誠善莫加焉苟尺水橫流則長隄虛設矣其次曰或大朝用吳越之衆自泉州泛海以趨國都則不數日至城下矣當其人心疑惑兵勢動搖岸上舟中皆為敵國忠臣義士能復幾人懷進退者步步生心顧妻子者滔滔皆是變故難測須臾萬端非惟暫乘始圖實恐有誤壯志又非巨舟之可及滄海之可遊也然此等皆戰伐之常兵家之預謀雖勝負未知成敗相半苟不得已而為也固斷在不疑若無大故而思之又深可痛惜且小之事大理固然也遠古之例不能備談本朝當楊氏之建吳也亦入貢莊宗恭自烈祖開基中原多故事大之禮因循未遑以至兵交幾成危殆非不欲憑大江之險恃衆多之力尋悟知難則退遂修出境之盟一介之使才行萬里之兵頓息惠民和衆於今賴之自足下祖德之開基亦通好中國以闡霸圖願修祖宗之謀以尋中國之好蕩無益之忿棄不急之爭知存知亡能強能弱屈已以濟億兆談笑而定國家至德大業無虧也宗廟社稷無損也玉帛朝聘之禮才出於境而天下之兵已息矣豈不易如反掌固如太山哉何必扼腕盱衡履腸蹀血然後為勇也故曰德輶如毛鮮克舉之我儀圖之又曰知止不殆可以長久又曰沉潛剛克高明柔克此聖賢之事業何恥而不為哉況大朝皇帝以命世之英光宅中夏承五運而乃當正統度四方則咸偃下風獫狁太原固不勞於薄伐南轅返斾更屬在於何人又方且遏天下之兵鋒俟貴國之嘉問則大國之義斯亦以善矣足下之忿亦可以息矣若介然不移有利於宗廟社稷可也有利於黎元可也有利於天下可也有利於身可也凡是四者無一利焉何用棄德修怨自生讐敵使赫赫南國將成禍機炎炎奈何其可嚮邇幸而小勝也莫保其後焉不幸而違心則大事去矣復念頃者淮泗交兵疆陲多壘吳越以纍世之好遂首為厲階惟有貴國情分愈親歡盟愈篤在先朝感義情實慨然下走承基理難負德不能自已又馳此緘近負大朝諭旨以為足下無通好之心必舉上秋之役即命敝邑速絶連盟雖善鄰之懷期於永保而事大之節焉敢固違恐煜之不得事足下也是以惻惻之意所不能云區區之誠於是乎在又念臣子之情尚不逾於三諫煜之極言於此三矣是為臣者可以逃為子者可以泣為交友者亦惆悵而遂絶矣莊周有言得者時也失者順也安時處順則哀樂不能入也僕佩斯言久矣夫得者如人之有生自一歲至百歲自少得壯自壯得老歲運之來不可卻也此所謂得之者時也失之者亦如一歲至百歲暮則失早今則失昔壯則失少老則失壯行年之去不可留也此所謂失之者順也凡天下之事皆然也達者知我無奈物何物亦無奈我何也其視天下之事如奔車之歷蟻蛭也值之非得也去之非失也燕之南越之北日月所生是為中國其間含齒戴髮食粟衣帛者是為人剛柔動植林林而無窮者是為物以聲相命是為名倍物相聚是為利彙首而藝藝是為事事往而記於心為喜為悲為怨為恩其名雖衆實一心之變也始則無物終復何有而於是強分彼我彼謂我為彼我亦謂彼為彼彼自謂為我我亦自謂為我終不知孰為彼邪孰為我邪而世方狥欲嗜利繫心於物局促若轅下駒安得如列禦寇莊周者焚天下之轅釋天下之駒浩浩乎復歸於無物與
