front:
  text: 全唐文欽定全唐文卷八百七十六仁贍字守惠彭城人仕南唐纍官武昌節度使徙清淮軍節度使鎮壽州周師入淮仁贍堅守不下會病甚其副使孫羽以城降世宗命舁至帳前賜以玉帶御馬拜檢校太尉兼中書令天平軍節度使是日卒年五十八追封彭城郡王
  hash: sha256:4b7fdc35420613fdc817a9f15ef4a2b2c7155510ea3501b014057d6038d227f7
