body:
  text: 臣聞統天下者禮法也救天下者權數也拯難者常以權變禮以數易法有國者則尚德而賤數尊禮而晦權何者禮法行則民安其分務於修身權數騁則人思變常務於苟得安其分理之源也思變常亂之本也故救一時之弊者事不可貽於將來垂萬世之法者道不必行於當代竊以武成王殷臣也見紂之暴不能諫而佐武王以傾之於周則社稷之臣矣於殷謂之何哉且夫尊其道者必師其人必尚其行使天下之人入是廟也登是堂也稽其人可以思見師其道所由致法則俾夫立節死義之士安所措其心乎聖人所以尊堯舜賢夷齊不法桓文不贊伊呂先之以敬讓尊之以禮樂蓋謂此也使武成之名與文宣為偶權數之略與道德齊衡恐非不刊之典也臣愚為宜罷上元追封立廟之制依貞觀於磻溪置祠令有司以時享奠斯得禮之正也臣竊尋七年百寮所議雖有一十六狀總其歸趣三端而已于頎等一十四狀並云復太祖之位張薦狀則云並列昭穆而虛東向之位韋武狀則云當祫之歲獻祖居於東向行禘之祀太祖復延於西謹按禮經及先儒之說復太祖之位位既正矣義在不疑太祖之位既正獻懿二主當有所歸詳考十四狀其義有四一曰藏諸夾室二曰置之別廟三曰遷於園寢四曰祔於興聖藏諸夾室是無享獻之期異乎周人藏於二祧之義禮不可行也置之別廟始於魏明之說禮經實無其文晉義熙九年雖立此義巳後亦無行者遷於園寢是亂宗廟之儀既無所憑殊乖禮志事不足徵也惟有祔於興聖之廟禘祫之歲乃一祭之庶乎亡於禮者之禮而得變之正也淳聞於師曰秉仁義立好惡方之內者也等是非遺物我方之外者也冥內而游外聖人也聖人吾不得見之矣方內者時有焉其惟方外之徒莫得而測也豈踐迹之道易忘言之理難邪將㣥於人而內自得邪何乃莊叟之後帛丿糸歷千祀幾於是道者余得之王君焉心與物冥德不外蕩隨變而適即分而安忘所居而迹不害教遺其纍而道不絶俗故有陶公之去職言不怨時有阮氏之放情行不忤物曠哉淵乎真可謂樂天之君子者矣生於隋季人莫之知故其遺文高跡不顯余每覽其集想見其人恨不同時得為忘形之友故祛彼有為之詞全其解懸之志庶乎死而可作無愧異代之知音爾其祖宗之由出處之行前序備矣此不復云啖子所撰統例三卷皆分別條疏通會其義趙子損益多所發揮今故纂而合之有辭義難解者亦隨加注釋兼備載經文於本條之內使學者以類求義昭然易知其三傳義例可取可舍啖趙俱已分析亦隨條編附以袪疑滯名春秋集傳纂例凡四十篇分為十卷云啖先生諱助字叔佐關中人也聰悟簡淡博通深識天寶末客於江東因中原難興遂不還歸以文學入仕為台州臨海尉復為潤州丹陽主簿秩滿因家焉陋巷狹居晏如也始以上元辛丑歲集三傳釋春秋至大歷庚戌歲而畢趙子時宦於宣歙之使府因往還浙中途過丹陽乃詣室而訪之深話經意事多嚮合期反駕之日當更討論嗚呼仁不必壽是歲先生即世時年四十有七是冬也趙子隨使府遷鎮於浙東淳痛師學之不彰乃與先生之子異躬自繕寫共戴以詣趙子趙子因損益焉淳隨而纂會之至大歷乙卯歲而書成傳曰惟天為大惟堯則之韶盡美矣又盡善也武盡美矣未盡善也又曰禹吾無間然矣推此而言宣尼之心堯舜之心也宣尼之道三王之道也故春秋之文通於禮經者謂凡郊廟朝聘雩社婚姻之類是也斯皆憲章周典可得而知矣其有事或反經而志協乎道紀侯去其國之類是也跡雖近義而意實蘊奸楚子虔誘蔡侯般之類是也或本正而末邪楚殺徵舒楚子入陳之類是也或始非而終是晉人納捷葘不克納之類是也賢智莫能辨彞訓莫能及則表之聖心酌乎皇極是生人已來未有臻斯理也豈但撥亂反正使亂臣賊子知懼而已乎今故掇其微旨總為三卷三傳舊說亦備存之其義當否則以朱墨為別其有與我同志思見唐虞之風者宜乎齊心極慮於此得端本清源之意而後周流乎二百四十二年褒貶之義使其道貫於靈府其理浹於事物則知比屋可封重譯而至其猶指諸掌爾宣尼曰如有用我者期月而已可也豈虛言哉豈虛言哉超建中四年官渝州刺史余誠不才位忝州牧乾乂恭守五載臨茲前後三度見茲石矣切觀前賢記録明文咸曰此石出則年豐歲稔比亦未能記之昨為去年季冬五度雪降三回盈尺實冀蒼生有豐稔之望今又河南河北有不匡之徒蟻聚蜂屯我本道節度使僕射李公奉詔發甲兵萬人從此而下遠伐不順有此事由因銘之記時唐建中四年歲次癸丑正月戊寅朔三日庚辰勝河東人贈刑部侍郎存誠父登進士第文王有聲惟聖能審初彈雅操知德音而有懷稍奏遺音覺儀刑之可稟黮然之狀已究鏘然之響可尋述而不作載好其音德必不孤諒前聖合於後聖道乃無二誠此心達於彼心其神也邂逅相遇其慮也罔或不欽則知奄四方而氣正加一絃而義深曲引蒸哉調吟皇矣穆穆乎順帝之則洋洋乎令聞不已同聲相應雖千古而會徽音異日而論猶萬邦而聆遺美所以聖賢不遠古今一揆且將合於心豈獨盈乎耳既而溫故知新若聖與仁千里同風自冥契於風韻千里一聖當間出於聖人玉指回軫朱絃應律運八風而吹萬迭五音而不一既而文德在茲以寧王道宥密斯操也必俟後賢吾無間然陟降因我而著昭穆因我而宣符盍徹之言無毫釐乖於是叶同音之理豈合度差於前是謂惟神所受繼聖之後自得於心匪傳於口稽帝謂之意勤止豈無非天縱之才生知何有無音不合無德不宜翼翼之心因心而會亹亹之善盡善而知師襄於是作而言曰子聖人也與文王而同規皇帝大誇胡人以八方平泰百戲繁會令壯士千人分為二隊名拔河於內實耀武於外伊有司兮晝爾於麻宵爾於紉成巨索兮高輪囷大合拱兮長千尺爾其東西之首也派別脈分以挂人胸腋各引而向以牽乎強敵載立長旗居中作程苟過差於所志知勝負之攸平於是勇士畢登囂聲振騰大魁離立麾之以肱初拗怒而強項卒畏威而伏膺皆陳力而就列同拔茅之相仍瞋目贔屭壯心憑陵執金吾袒紫衣以親鼓伏柱史持白簡以鑒繩敗無隱惡強無蔽能咸若吞敵於胸中憯莫蒂芥又似拔山於肘後匪勞凌兢然後一鼓作氣再鼓作力三鼓兮其繩則直小不東兮大不東允執厥中鼉鼓逢逢士力未窮身挺拔而不動衣廉襜以從風鬬甚城危急逾國蹙履陷地而滅趾汗流珠而可掬陰血作而顏若渥丹脹脈憤而體如癭木可以揮落日而橫天闕觸不周而動地軸孰云遇敵遷延相持蓄縮而已左兮莫往右兮莫來秦皇鞭石而東向屹不可推巨靈踏山而西峙嶷乎難摧繩㩧撲而將斷猶匍匐而不回大夫以上停眙而忘食將軍已下虓闞而成雷千人抃萬人咍呀奔走岔塵埃超拔山兮力不竭信大國之壯觀哉嗟夫虛聲奚為決勝在場實勇奚為交爭乃傷彼壯士之始至信其鋒之莫當洎標紛以校力突繩度而就強懦絶倒而臆仰壯乘勢而頭搶紛縱橫以披靡齊拔刺而陸梁天子啓玉齒以璀璨散金錢而瑩煌勝者皆曰豫王之爪牙承王之寵光將曰拔百城以賈勇豈乃牽一隊而為剛於是胸奴失筯再拜稱觴曰君雄若此臣國其亡季貞建中二年自節度判官除括州刺史混茫既分乾坤成列形下曰器禹別九州漢通百越茲山惟揚東甌之地也西走嶺嶠南以後詞俱原闕未詳遠近觀乎傑出氛靄勢凌霄漢峭斷穹壁呀開石門闕溪層巒萬仞瀑布千尺奔崖照日望為晴虹觸石乘風散為絶境天下之勝槩也雖呂梁懸水天台飛流方之標奇層巒蓄翠風木含韻陰鶴朝唳孤猿暝吟曜金碧於澄潭散霞闕可勝言哉謝公詩云連岩覺路塞密竹使徑迷暝投雲闕雖立意可嘉而象物殊略若非陰陽偏顧造化有情則曷闕幽人肥遁之志梁闕余因守此藩行縣至闕遊憩永日修闕智之所欲欲之不已則躁禍生焉棲隱者高情之所志闕歸焉寧將違樂趨禍以敗其身乎捨躁取靜以全其貞乎前哲儻有退有歸耕之田處有周急之資必當揖二疏高風追闕屑屑碌碌終勞形於世務耶聊勒石紀事以貽諸來者亦闕冀道之不孤也元混播形厚載孕靈雄冠㣥山孤高亭亭挺拔俊秀氛氳青冥嵐凝丹穴霞駮雲屏上摩九霄旁礙五星龍髯莫覩鳳管時聽降自穆武求之靡寧徒聞荒政曾不延齡物有殊異昔人乃銘爰勒斯文縉雲之坰說建中朝官祠部左司員外郎務農重穀徹田為糧布教頒常示人以信不足於二且異魯侯拾而糴三非如漢吏况決渠降雨神皋奧區既稱百二之雄何辭什一之稅殊大桀而小桀且如茨而如梁杼軸其空則我豈敢膏腴兼倍於爾何傷徒誶語以無稽須甘心而受諜抵欺赤縣曾是迷愚家財若不助邊軍實如何取給訴云過半誠為罔上之人又曰不農恐涉要君之責載翕其舌無厚爾顏封建中時進士伊嘉卉兮昔生軒庭蓋歷代而莫觀其狀至我后而方覩其形對右平與左墄間朱草與彤庭薰風晝灑湛露宵零所以彰吾君之睿聖所以表吾君之德馨匪然何以於昭其異有赫厥靈根莖竦擢枝葉靜好惡夫佞允叶乎聖心作乎祥特異於靈草况今勤施五至克奉三無多忠良之士絶讒佞之夫非斯草之助化何以臻於此乎指佞之為德也廣指佞之為瑞也深逢聖斯生介一人之景福有佞必指俾百寮而革心故能殊衆芳之質標㣥瑞之首彼獬豸之觸邪抵罪在法則嚴伊平露之傾葉知方於人何有孰若我應明聖指邪佞昔之輔德告軒后之功成今也呈祥贊吾君之理定一名屈軼千載挺出有佞則指孰云無必豈比夫萐蒲空扇於堯廚芝房徒歌於漢室哉足以彰致理薦嘉祉君子在位我則恭默以傾心佞人入朝我則無私以直指信可以美芳聲於雅頌垂不朽於國史諷建中時人不宿食以晨飲困鍾盂以沈寢永春晝而高扃隨幅巾而橫枕及乎酒適衷腸神游異方烟生喉舌惝然如狂爰瞰甃以窺汲諒不任於呼吸俄據河而俯瀆乃器舟而杯斛倒魚鱉之窟宅見蛟龍之委伏猶胃腸之不浹資宴飲而未足由是奔九江走五湖手不暇於斡運心不息於躊躇見波漸竭而百川如線岸益高而底淤將枯腹慊爾而未覺肺燥然而不濡尋至大溟茫然連清豈爾浩瀚而吾量不盈斟酌未幾倏見涯涘百靈稽首乞留濡溉吾腹未充豈汝為意俄傾竭於浩渺奄滴瀝而無漬瑤宮貝闕盡列平地三山赤城可以步至鯤鯨噞喁相喣以呬大鵬驚攫巨鼇愕眙四顧燥涸悒然興情此情何奇非吾所知恨滄海之可罄不足充吾之所思周遭有截塊然墆土臬水府萬族咸呼帝闕帝且不聞吾欲未竭方將尋蟻蛭期耿恭問姜母以何在訪舒姑而欲從辨夸父於渭上弔相如於臨卭萬計已盡六腑如燼窗日斜照飛蚊繞鬢既驚既覺可嘆可笑飲不盡器枯腸已療搘頤沈吟其意逾深以吾此日之一夢見自古不足者之心直方德宗朝官左司員外郎歷中書舍人試太常卿貞元二十一年自韶州刺史移贛州刺史遷司勳郎中自西漢始置幕府得顓辟士其聘舉之盛與公府署吏王國命官為比於是有班固傅毅崔駰蔡雍陳琳阮瑀之徒出焉大抵多巡禦封略經參戎事居無恆處秩靡常品故命之曰賓國朝篤方嶽之任慎求其佐頒以職貢為之定制或辟自諸侯或降於朝廷皆命於天子其所司也調政教之和策軍算之祕出入聘覲應對賓客其立署也行有戎次處有公堂與方伯周旋彌縫潤色而已王畿之腋劃為巨防外殿朝那作捍西疆中拱皇都以臨諸夏漆沮之仁既遠華夷之俗相猾非王褱材英傑莫典封守非莊明純固莫參氓佐六年春皇帝勞韓侯牧圉之勤俾尹西夏申命御史中丞王君等九人為之使介既而師貞於律農勤其功惠和威武澤浸火烈孟秋述職耀兵河塞亭障蕭條千里晏清然後用虎旗蛇矛定功於蒲入覲皇都增秩受賜旋師舊服勳明德舉非元臣雄略能賢嘉績蔑用濟此先是尚父郭公開府是邦搜賢勿二俊乂咸集不十數年持樞衡治邦憲司誥命者咸布職於清朝今韓侯亦能詳延端士輔相威德是府將來宜為俊賢之郊藪榮達之閫閾衛多君子邠其有之夫敬其事則命始春秋之誼也是邦當徵號朔方而以名師建為三郡肇基於我書事舉德宜始韓侯此記舊題於堂之北牖慮他日文字湮滅作者之文莫傳遂刻石以紀之新作白蘋亭書時且志政也梁太守柳惲賦詩於始因以名州今邦伯李公成室於終茲用目亭度乎事則位均考乎地則境同合美配德古今相望亭之時義至矣吳江之南震澤之陰曰湖州幅員千里棊布九邑卞山屈盤而為之鎮五溪叢流以導其氣其土沃其候清其人壽其風信實公之始至也用恭寬明恕以懷之敬事眘罰以勸之賦令之先必度其物宜而咨於前訓故居者逸亡者旋或蹈境而留或聆聲而遷提封之內無榛灌繩墨之下無姦傲既而外邑多材郡不能泄公命懸諸善價俾代常徭於是乎幽巖之巨木斯出積歲之逋租必入公家受其利山氓蒙其惠繇是白蘋之制經矣洲在郡城南東亂霅溪而即焉白沙如浮流波環之前有大野帛丿糸雲繚以萬峰後有名都壓水駢以千室邑居可望而喧埃不及空水交映而雲天在下造物之工若有私於是焉茭菰叢生鳧鶴朋游嘉名雖曜清境或棄公於是相顯爽之宜立卑高之程據洲之陽揆日之正揭大亭一焉修廊雙注北距於霅浮軒轍流峨水亭二焉大可以施筵席小可以容宴豆凡棟宇之法輪奐之美銛刮密石用成翬飛施宏壯而有度備彤紫而不踏內則庭除朗潔彌望鋪雪曲沼逶迤以中貫飛梁夭矯而對起紫桂翠篁辛荑木蘭碧枚丹實蛇走珠綴鮮飆暗起縈葉振蘂落英飄颻灑空浮水天目神池之上多不名之卉洞庭水府之下産怪狀之石嶙峋乎玉容葳蕤乎瑤芳衆榮偶植羅列布濩外則差以白蘋間之紅蕖川與天遠百里如組邦君之來肅肅旆旌綵舟徐移魚躍鳥鳴亭成之日三吳之賢大夫集焉公用鼓鐘羽籥以樂之然後使臣之臨重客之來獲游是者恍乎有遺區之歎則為邦之成績作亭之良規參合二美游揚四海坐馳而逝與廄置偕矧蘋之為用風有季女之奠騷有放臣之望夫以澗溪之賤微而可充王公之殷薦是故君子重之今扶贊勝賞也如彼哲賢咏歌也如此則是亭憑眺之外又有傳經之道焉若乃乘農隙之暇時購武夫之羡功廛閭不煩財用不屈揚昔人之休烈垂不朽之遐觀咨其創物之智有以加人不如是烏能及此己卯歲冬十月豫將浮浙河上會稽凌縉雲觀赤城道出公之仁宇目覽亭之崇構舉書其實合春秋傳信之經後之人無視十洲孟浪之說而沒其誼云維年月日中散大夫試太常少卿上柱國李直方謹以清酌庶羞之奠敬祭於故三丈相公之靈天作雷雨山川出雲帝思理平英髦並生爰自弱歲植此休德宏重不器仁聲淵塞旋升外臺乃居察視輔人成化入為右史文學溥博德度謙沖載領絲言粉澤天工詞簡理詣燦然昭融俾國家詔命上逾十代與周漢同風爰登禮曹實司選士人罕其再我三專美雄文懿行善價端士禺卭周行鱗集鹿君至朝推厥德乃作天官庶職惟允九流序焉帝念儲皇輟居調護九法闕理乃遷兵部禮樂不綱斯為奉常神人以和鶱飛廟堂鼎飪三載萬方咸賴退為宗伯碩望彌赫惟梁思理建節來萃教化惠和流庸洽至憶昔攸往火旗雷麾今也來思白馬龍輀哀笳凝咽以增感丹旐悠揚而獨飛嗚呼哀哉直方昔在南宮擢遷綸閣提攜推薦忘其菲薄顧庸淺而難持竟鴻飛而終卻今佳城行啓哀挽徐吟跪靈筵而號慟淚橫墮而不禁伏惟尚饗
