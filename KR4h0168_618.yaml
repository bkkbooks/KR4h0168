  text: 全唐文欽定全唐文卷六百十八淳本名質因避諱改名纍官左司郎中順宗時徵為太子侍讀貞元二十一年卒
  hash: sha256:592a24bffe7a7fb5f6be3710e24e59c54e7c91ffbbab72f6a7e1c12c33276c2e
