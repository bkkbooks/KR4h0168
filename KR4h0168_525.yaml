body:
  text: 至樂之極兮德教所畜德者體中和而定剛柔教者正情性而端耳目既垂法於國胄亦布政於方族四術允正三明祗肅所以明俊選之標表所以致才賢之蘊育比師嚴而道尊信仁行而禮復樂正初協司成理該被其風而道其志滌其濫而釋其回持筋骸以固束刷性靈而洞開德義可依異射宮之取士程準斯在同梓人之理材樂且致之行之廣運內無聲以是託表中庸以垂訓在敬遜以務時資端慤而待問斯乃成性所臻斆學相因既廣博而克已抑直易以藩身不待考擊兮教備無假拊搏兮行醇以道應物以樂和人事且符於米廩義且暢於成均將俟乎綺紈之子率變何患乎膏粱之性難馴苟以我於木鐸爾宜必誠必信苟以我於藻鏡爾寧不智不仁庶居之也泄泄諒誨之乎諄諄在聲音之道兮以律度是維諧和是司在德教之術兮以友敬為儀忠孝為師固舍彼而取此念鑽之而仰之足使放心精正體道希夷罷鏗鏘於師氏識明命於后夔寧鼓篋而徒至必摳衣以慎茲俾行乎鄉黨尊尊長長俾立乎黌孰庸庸祗祗夫然則寬願者日益傲者日損習語舞而殊源敦詩書而異壼斯教也教之至誠天下之本昔耿恭躬受斧鉞志清煙塵奮長策以討虜由至誠而感神於是堅疏勒之壁依澗水之濱據以為備期乎來賓既而胸奴奔敗而伺隙澗泉壅絶而不至雖礪乃戈矛而渴我將吏遂乃處孤城而穿井窺重泉而闕地深餘十丈曾無一勺之多職長千夫幾敗三軍之事困不見其成績憤將達於精意俄而外整衣服中懷果敢推赤心於神祗禱素液於坎窞拜未及起叫天以無辜言未及終觸地而有感閟其質若俟仁人發其蒙俄成淡淡灌濯執熱祛除積慘明矣大漢士卒所以歸心惕爾㣥胡君長於焉破膽乃知以精誠激物何物不覃以忠烈靖難何難不戡自我而來且見不虛其請由中而出孰云先竭其甘是日也飲人如醴帝教勃焉而光啓蕩寇之功將略忽爾而元通如惔如焚既洌清而可食一拜一起遂觱沸而無窮斯乃道靡不宏虛無不有諒歸之於感激豈間之於博厚所以二師至境決泉脈於喬嶺校尉臨邊發水源於眢井疲羸因之盡濟狂孽由之遠屏則知在物無必至誠有孚如聲之響如形之影有浚其井當時未知功已成於岸甃道尚失於瓶羸潤氣寧發潛源且卑此遇鑒明而足用彼將心惻以何為蓄利惟多含清信久幸可溉於鼎鑊惜無施於綆缶塗泥既去方應用以虛心汲引攸難希有成於假手况復桐色無點桃陰不生思輒輸其涓滴望無廢於澄泓同美玉於斯將沽有待比嘉肴不食其味焉呈蓋由混衆雖分處幽多棄盥潄無及空知冽彼下泉顧盼可期猶謂居之善地淵然日久望是光臨懼以名徵想貪泉尚酌登諸薦品豈行潦獨任屬時非於疏勒惜地異於漢陰願先竭以當仁期分甘苦俟一窺而見愛焉測淺深噫夫穿鑿多勤鑒臨斯及佇將成於勿幕恐致變於改邑因以纖綆可施一勺可挹實有備於烹飪之日惟夫深知而用汲問皇帝若曰朕觀古之王者受命君人兢兢業業承天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徵極諫而文學稍進匡時濟俗罔不率繇厥後相循有名無實而又設以科條增求茂異捨斥己之至論進無用之虛文指切著明罕稱於代茲朕所以歎息鬱悼思索其真是用發懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間歡然相與子大夫得不勉思朕言而茂明之我國家光宅四海年將二百十聖宏化萬方懷仁三王之禮靡不講六代之樂罔不舉漏澤於下升中於天周漢已還莫斯為盛自禍階漏壤兵宿中原生人困竭耗其大半農戰非古衣食罕儲念茲疲氓未遂富庶督耕殖之業而人無戀本之心峻榷酤之科而下有重斂之困舉何方而可以復其盛用何道而可以濟其艱既往之失何者宜懲將來之虞何者當戒昔主父懲患於朝錯而用推恩夷吾致霸於齊桓而行寓令精求古人之意啓迪來哲之懷眷茲洽聞固所詳究又執契之道垂衣不言悉之於下則人用其私專之於上則下無其功漢元優遊於儒術盛業竟衰光武責課於公卿峻政非美二途取捨未獲所從余心浩然益所疑惑子大夫熟究其言旨屬之於篇興自朕躬毋悼後害對臣聞千變萬化聖帝哲王聲烈遐戴者無他中心無為以守至正而已矣以謀大化而已矣伏惟皇帝陛下垂拱六極始初清明丕揚纍休渙發于詔啓天宇而遡古薰至和以拯今咸懷浸沉罔不濡澤誠至正也誠大化也猶復乃遠乃近乃左乃右旁求下問舉薦奔走履衆美而不顓儲神明其如遺銓邦政之肥瘠鏡人事之善敗優遊紬繹以循始終外其牽制常其忌諱恢恢乎輮車蘭百王之獨致也臣愚智能淺薄不明大體時用之宜術業暗昧不充才識兼茂之稱徒冒萬一觸罪以聞臣伏讀聖策首陳禹拜漢徵之旨求索真之要臣聞上古之君薰能同和不敢自是必求讜諫以諭缺敗用心之過則薄獎其人言之失中則寬容無虞使人上得其情下得流通也後代帝王雖有作者道或外是已實內非言之或臧寥寥無聞言之或違隄防斯至雖科條增設適足張其亂目矣叩擊切害適足寵其直聲矣聞之失得君之效歟今陛下躬神聖之資痛源流之塞較量至當加迪來今黜退姦邪資謀體要誠猜雄者之所共遠亦狹隘者之所共難凡曰胸臆是皆聳實詳近語直之幸也伏見聖策咨問兵戰商農之道臣請指事而言之臣聞兵者以謀全以氣勝以謀全制度為神耳得其數則威令格物少能成功失其數則黷武無別多益為弊寖用不制刑于宇內今國家自兵興以來僅數十年生物以之暴殄人情以之盩違殆握兵者建置失其道歟何者天下之甲兵其數則不廣屯置散地且或至半而兵柄之臣率好生事不思戢伏貴弄威名則有崇廣卒徒之員聚擁虓闞之㣥厚斂殘下偷取一切要君養敵張軍自衛望容攻守之至復有懷弱軟以內顧務備蓄以託私倚行伍之數訖資廩之具外實內虛守以藉之固者及殷而成之熊一作態而戰之其中未必有也朝廷又影響誅罰索其效死其可得乎此兵之所以煩而益病也而人之所以困而不解也大抵不賢者得掌其兵百則思兵千尋掌其兵千又思兵萬尋掌其兵萬又思兵數萬以因其力以贍其欲長疑一日之廢代謀萬里之策勳徒仰費於縣官高疑病於悠久誠何謂矣陛下盍亦慮之乎伏望躬親視其將帥之為苟非任盡易之不令其凝留而後圖也嚴備其要地之屯苟不切盡罷之不令其廣置而出入也其所閲揀非實不用其所樹置兵精不在多使名弓者必用沓發之巧名劒者必有刺擊之妙名騎者必有超乘之捷名步者必有卒奮之奇自外徂中歸乎一體自然無冗軍無惰人以守則固以戰則勝軍無大半之耗人懷反業之志此減兵之術也富庶之教於是乎生亦何必遠取於古法也然而思戀本之心蠲重賦之困又在於賦稅之道矣臣請得而具之臣聞古者因地以料人今則稅人而捨地古者任土而作貢今則溢貢而棄土古者均田而抑富今則與富而奪貧是以人口翦耗而不息田畝汙萊而甚曠者非人懷苟且之志樂懈惰之方迫不可忍勢有由耳王者在上量入以出祿食賜與歲養經費必厚下以為用助而不稅廛而不征亦非無其事也用菽粟藁秸有常稅人不愛也絲枲布帛有常賦人不艱也雖雜以凶荒接以喪死間以興廢子弟父兄猶復勉勵卒徒不更其業何者制度專也以臣觀之則今之賦稅仍舊貫籍斂不加重而犬畝流離窮困無告殆執事有殊陛下之意乎必有急令暴賦發取無厭徭山役海詭求無狀奇貢珍獻希冀無怠託公寄私崇聚無極於是一水一土一草一木圭要殫利俯榷仰算草泣之官焉專守之刀兵焉商不得回睨農不得舉手既奪其利又却其人此而不困孰以為困榷酤之道如是乎人顧其上猶仇讎安能思戀骨肉乎人視其居猶鳥獸安肯繫著桑井乎人慳其取猶寇盜安望輕重元本乎所以遁走苟免死亡不顧財日窮而事日削地益蕪而人益煩猶前事也伏惟陛下審念之其有不經不度之人不常不正之調必禁其所萌必罰其所自則姦官濫守慎不敢生事生生之理阜繁矣陛下又以禮節其情以樂樂其志又何患乎不復其盛不濟其難臣伏見聖策顧問既往將來之事臣謹以江淮凶旱之事明之臣聞凡有災傷水旱之處歷代所説多聞詭隨之詞媚時主必曰帝堯乎有懷山襄陵之運也成湯乎有流金鑠石之運也是皆曲骫非愚則誣臣嘗私怪之何不曰大舜乎無雷風霜雹之運也神禹乎無飛流彗孛之運也不直其詞因循若是天運之時集變易水旱歲時未為災也理或失中感動陰陽頃刻為災也故精舒謹孚則七年不足罹其咎誣輕忽則一日二日亦未成其災修政著誠端心復德既往之事陛下宜以此為懲矣然臣之所慮江淮又急者禦災之術將來之戒復憂於斯願悉數於陛下矣今國家內王畿外諸夏水陸綿地四面而遠而輸明該之大貴根本實在於江淮矣何者隴右黔中山南巳還墝瘠嗇薄貨殖所入力不多也嶺南閩蠻之中風俗越異珍好繼至無大贍也河南河北河東已降甲兵長積農厚自任又不及也在最急者江淮之表裏天下耳陛下得不念之乎屬頃者連郡五十蒙被災旱長老聞見未之曾有涯脈川澤坌為埃塵草木發為煙火斗粟之價重於兼金餓莩之家十有七八聞乞僕於男女者何暇保其家室乎聞立死於道路者何暇思其粳粃乎嗷嗷蒸徒展轉無所灰燼狼顧至今未寧且今日狼顧明日狼顧力大勢詘禍欲何圖此臣所為陛下惜也長吏者又間或非良善厚其毒忍療痏而問威剝而自虞則陛下雖有賑發不輕得及雖有蠲放不輕得獲雖有詔諭不輕得聞此臣所為陛下疑也然欲安存緝理斯終何由以臣計之視長吏之悖理者選其重臣代之不待其為蛇為虺也察郡縣之受災者擇其實以勞之不使其寃而無告也如此則朝令夕悅江淮保全則四嚮賦稅轉輸肩摩轂擊關中坐固而根本不搖猶無凶旱矣臣故曰將來之由在此而已矣臣伏見聖策次問推恩寓令之計夫漢朝錯陳諸侯削地之制謀之至者主父偃獻子弟推恩之令計之術者削地之制行則轉弛為急七國之難結推恩之令下則強幹弱枝一王之理定猶見之熟與不熟法之漸與不漸在於漸也則寒暑得其相成以暴則天地不能速化求之昔意庶取於今又齊桓之霸國管仲之寓令晝戰足以目相識夜戰足以耳相聞將取威於鄰敵俾逞志於天下五霸之事仲尼之門五尺童子猶羞言之若此者則小國權臣之細術耳臣固不能為陛下述伏讀聖策次問專委儒術者臣聞聖王在上賢臣在下道德兼濟材智樂備專於上則聰明倍資安有無其效耶委於下則公器相率安有用其私耶然今以陛下之資材清光㣥臣其敢及若集事者在陛下必躬必親之謂乎躬之無偏親之有制則垂衣執契亦不爽矣孝元則制自左右非用儒之失也光武則弊及㣥下非用課之得也儒近於得而所用者宜一變其弊若臣所見今之大者政或貴此可得而言國朝自武德已來典章甚明職員甚列官吏甚該備而道不宏政要或未臻者其官非人歟理非道歟略其大歟録其小歟臣所謂小者則天官卿采之調閲致驗選書至於一簿一尉一掾之末銓次升降勞而後罷是詳於核小也及其揣量親人撫字之官又未喻也臣所謂大者天子之庭日相日受軼越倫輩乃有名邦聞邑㣥居之柄不階課最是非未聞蹤迹賢不肖歀言喧譁隨其所來轉化容易似不留聽是鹵莽於天下也詳核及小鹵莽及大輕重反殊使盜名死官之徒波走飇馳惟恐居後狂扇誘掖寵賂為事以相終始夫復何望夫持尺寸之祿懷輕握微齟齬施為尚猶不堪况明權不制資藉殺生之柄兼兵馬之衆連數十城之地庸雜橫恣偷居其上何以堪之設曰不堪耳目陰附事亦無由得而聞悔之何益耶陛下得不慎其所授乎臣以為今之郡縣長帥之官最關生人性命用在百里之父母莫如縣宰君乎千里之父母莫如刺史列城之父母莫如郡統使一得之必小康二得之必中康三得之必大康矣陛下雖不在驅天下之人洽於理乎終亦無由誠不在多惟慎此三官而已矣臣又聞書曰爵罔及惡德春秋傳曰官之失德在所納邪惟君無邪則不納邪矣夫偏聽獨任牽於左右所自邪也小臣大祿制度失中所自邪也錦文珠玉淫佚充斥所自邪也教令察視壅遏不宣所自邪也掊克聚斂億度於上所自邪也依阿求同徑而不道所自邪也煩察繳縳弊歸於下所自邪也坐躋仁壽陛下又何疑乎不得浩然其心此微臣之志也伏惟審察之伏惟審念之臣伏見聖策終有究旨屬篇之説者臣固無以道師之説僅能勿墜耳俯仰睿問偃薄無所震其心熟知不免寧不自勝攀懇之至謹對瑜建中時官藍田尉惟德星兮聚于中天伊賢人兮集于潁川人以文而會也星不言而信焉彼星惟德彼人惟賢不然安得萃于中夜格于上元猗歟陳氏德必有鄰展矣乾象應亦如神繄伊人之所感諒皇天之無親蓋以彰矣星辰旌乎逸人人也維何賢之衆也星也維何靈之大者人之有感故昭昭而應上星之不諂亦煌煌而臨下于是太史既奏潁川斯會賢之生兮五百年中賢之聚兮五千里內星見而粲粲爛爛人集而無小無大至若雲開天碧迥然可覿接青漢之皎皎含白榆之歷歷參差其貌炳煥其色九霄列而再揚光芒萬里視而不違咫尺既含曜而應物亦昭賢而表德觀夫天經嘒彼德星稟物高遠垂象青冥五緯不能亂其色七紀不能雜其形明麗乎天則高而可仰光燦于夜亦爛而有靈且其賢者人之所重星者人之所仰伊賢之契星猶影之與響者也是故星垂天際應彼潁上克明克信不忒不爽拂皓月而火微點晴空而珠朗借如三星現而在戶五緯聚而表祚氣沖斗而劒出客犯斗而槎度少微興處士之憂熒惑感景公之懼曷若乎名實可久古今是慕也則那抑賢人之聚客有遠人寰家海泬聲銷迹卷兌塞巧絶浩然太素之和氣徑然喬松之全節當鬱島以間安就靈濤以怡悅喜仙查之千里每秋風之八月知必至之不欺乃乘流以長發爾乃制芰俶裝舂菰裹糧以晝以夜若行若藏沈浮于渤潏之中央蕩搖乎聱軋之大方豈靈怪之歷討實險阻之備嘗獨出於有間之世轉入於無何之鄉聽不聞其聲類馮異之依大樹久乃有所遇若伊尹之在空桑乘悠遠兮不知其行道渺瀰兮無遺其迹人與木兮俱浮天與海兮同碧次黃道之的的穿白榆之歷歷反不記其所從又焉知其所適飲牛於津者誰子弄杼於室者何人軋軋有聲繽綺縞兮如雪盈盈不語粲明眸兮若神忽眙以相顧雖婉孌而不親既持石以贈子令致問於嚴遵當是時也星則知客犯爾位客不知星則吾身何碧空之無涯乃飄然而獨往非智力之所及實風波而是仰昔未乘查也則在地而成形今之乘查也則在天而成象若不資巨浪之潛運安得排青冥而直上倬彼星漢自天而垂淡橫河之清淺皎列宿以參差客無查徒勞勤而事何可濟查非客雖往來而世莫之知信其致人於霄漢者不必輕舟迅楫之力忘情於夷險者亦無波臣川后之欺吾既異此事乃斯焉而賦斯畋者所以講武賢者所以輔弻能順時以宏閲逢名世之間出得賢於搜狩之場效獲乎霸王之術且以展時巡之明義昭至化之陰步馬將入林之有期寧即鹿而無必哉是以賦車攻練吉日駕駟牡之既間儼七騶以齊蹕於是列卒滿路張罘竟天傾藪刮野搜林蕩川小殷湯之教祝同周文之獵賢治國之規必聞獻可從禽之樂寧假獻豜如斯則沃心之期乎説啓乃入夢之知夫兆先觀夫獵車未貫大綏將弭得賢之繇既符非熊之姿宛是馬足不極皮軒遽回解雲羅之周布廣天仗以全開用割鮮之能我則曾事於屠釣誇染輪之味我則將和於鹽梅且夫博采為聖旁求斯盛寧知校獵之遊更展弓旌之命白駒皎皎無煩空谷之維束帛戔戔不待中園之聘薄狩有隙畋遊有恆陳虞針以炯戒得呂望以光膺馳騖乎道德之囿故逸飛之遺走將賢能之是擇在麋鹿而何有十旬失位悲夫洛汭之歌三品充庖詎比渭濱之叟此威容兮我武既成彼非熊兮惟時之英來儀則邁種靡怨佐理則日月宣明盛哉三驅之致用也永代垂聲湯既有殷聖德日新敬畋遊必因於無事取禽獸不為乎資身於是設無私之網當去殺之辰加一目而雖期於用開三面而蓋取諸仁乃言曰遂爾之性啓豫有聖悲羅者之所重傷詔虞人悉除其令恢恢雖設不為四校之防蕩蕩無疑必遂三驅之命是用施諸大麓祝以嘉辭舉數隅而罔煩曲取當直道而豈假周維故得獸安狂顧鳥釋危疑弗慮弗圖自樂已生者足矣若亡若存不用吾命者縶之當夫搜狩有常稼苗是寶將遂乎驅逐豈煩乎窮討所以釋從禽之利以絶一源解竟野之罟欲窮諸道遂得行無所阻物不懷猜念㣥生而東西必遂嘉衆路而遠近咸開弱羽飛空未見觸絲之患微行走地曾無繫足之哀故曰聖道克美深仁及此雖有畋獵而無荒雖有罝罘而必弛所以冠百王而不怍歷萬祀而無慙正其德而惟守一用其網而必去三芳隨事遠化與恩覃則里革斷罟之心庶修遺美西巴放麛之感足繼清談今天子意在搜田志清郊甸庖羲之網屢設成湯之心未變已焉哉誰能述三代之所興庶可垂永於南面洞庭之遠兮亘全楚而連巨吳路悠悠以窮塞波渺渺而平湖遠國之奧壤中華之外區風土所宜兮四方各異珍果斯出兮諸夏或無至於白商謝元律改風落瑤林寒生窮海枇杷落而將盡荔枝摘而不待然後浮香外散美味中成照斜暉而金色帶晚潤而霜清圓甚垂珠琪樹方而孰可味能適口玉果比而全輕在禹貢非他於周制則冉充厥包於林下發使者於江沱襄橙不得而雜楚柚不得而和所獻者皆歎其美所貴者不以其多歲崢嶸而已晚路崎嶇而自遠齊萬物以坌入離本枝而不返其價可重其味可珍固緑蒂而未變施素錦而猶新若夕發於南國已朝奉於北辰匪雕飾以自媚實羽翼以因人獻芹者既非其匹敵獻桃者何足以等倫豈比夫江北則枳江陵則洲隨樝梨而莫遂備職貢而無由同碩果而已矣望君門兮阻修美哉植物斯多結實者衆斯橘也栽則隔乎淮浦生則主乎雲夢獨專美於當今及歲時而入貢
