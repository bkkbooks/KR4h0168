front:
  text: 全唐文欽定全唐文卷七十二文宗四
  hash: sha256:cd01d1b30e61ac3b8cb49ddb7476cfb0a97960fa538f5f7971ede102a5b46013
body:
  text: 方面大臣皆吾股肱心膂思與相見無時暫忘想其戀闕之心願奉修覲之禮其於忠懇悉亦可知但緣兵革初停務先安輯或地鄰戎寇須有防虞或鎮重軍雄切於綏撫臨機處分要合便宜自今巳後諸道節度團練防禦經略等使有朝覲者但先獻表章得詔旨允許即任進發使行止之際臨時不失事機故此宣示想各知悉河東兵戈之後亢旱踰年倉廩空虛黎元困乏若無救恤恐至流亡宜借便粟十萬石方春用事寒氣稍侵京城見禁囚徒慮有冤結宜令御史兩人各就本司疏理以聞朕以菲德奉茲丕構雖虔恭修己不敢暇逸而誠亮格物未能宏敷遂使姦凶懷非覬之端藩戚陷無君之責外詿宰臣傍連禁吏怵惕自咎中宵靡寧親臨鞫訊改置刑典顧為大義實愧御家猶慮憸狡之徒忿怨相冒遂至誣引或連非辜載懷靦慙宜諭深旨應緣漳王及宋申錫等被論告事除今月六日巳前準敕旨處分並捕捉王師文一人外餘並一切不問宣示中外用體朕懷史官記事用戒時常先朝舊制並得隨仗其後宰臣撰時政記因循斯久廢墜實多自今後宰臣奏事有關獻替及臨時處分稍涉政刑者委中書門下丞一人隨時撰録每季送史館庶警朕闕且復官常所修陵寢事至嚴重計崇飾須得精實宜令度支郎中盧商將作少監韋長同往諸陵子細計具合修與不合處聞奏如聞頃來京城內衣冠子弟及諸軍使並商人百姓等多有舉諸蕃客本錢歲月稍深徵索不得致蕃客停滯市易不獲及時方務撫安須除舊弊免令受屈要與改更自今巳後應諸色人宜除準敕互市外並不得輒與蕃客錢物交關委御史臺及京兆府切加捉搦仍即作條件聞奏其今日巳前所欠負委府縣速與徵理處分南曹勘廢置詳斷選人倘有屈事足以往覆辨明近年巳來不問有理無理多經中書門下接訴致令有司失職莫知所守選人踰分惟望哀矜若無條約恐更滋甚起今巳後其被駮選人若巳依期限經廢置詳斷不成自謂有屈任經中書門下陳狀狀到吏部後銓曹及廢置之吏更為詳斷審其事理可收即收如數至三人巳上廢置郎官請牒都省罰直如至十人己上具事狀申中書門下取處分如未經廢置詳斷公然越訴或有巳經詳斷不錯輒更有投論者選人量殿兩選當具格文榜示冀無冤濫亦免幸求新除太子少師蕭俯代炳台曜躬茂天爵文可以經緯邦俗行可以感通神祇夷淡粹和精深敏直以忠讜侍從於憲祖以器能弼諧於穆宗皋陶陳九德之謀楊震有四知之慎進退由道周旋令名近以師傅之重疇於舊德俾從優禮冀保頤貞而抗疏辭疾勇退知止嘗亦敦諭確乎難拔遂茲牢讓厚我時風俾進秩於端僚仍加榮於貴綬疊示光寵式彰名臣於戲昔干木偃息猶藩魏君子房嗇神亦扶漢嗣無使二哲專美於前始終懿圖敬服休命可銀青光祿大夫守尚書左僕射致仕鄆曹濮淄青登齊萊亠兊海沂密等十二州自頃年收復巳來屬中外多故徵賦輕重或未均平今三道守臣無非循吏百姓安逸流亡盡歸須於此時立一經制宜令諫議大夫王彥威充勘定兩稅使仍與令孤楚等審商量其兩稅榷酒及徵物匹數虛實估價並留州留使上供等錢物斛斗比類諸道一一開項分折平均攤配立一定額使人知常數不可加減回日具件聞奏昔在乃祖貞觀中諫疏十上指事直言無所避諱每覽國史未嘗不沈吟伸卷嘉尚久之爾為拾遺其風不墜屢獻章疏必道其所以至於備灑掃於諸王非自廣其聲伎也恤髫齓之宗女固無嫌於徵取也雖然疑似之間不可家至而戶曉爾能詞旨深切是博我之意多也噫人能匪躬謇諤似其先祖吾豈不能虛懷延納仰希貞觀之理歟而謨居官日淺未當敘進吾豈限以常典以待直臣可右補闕朕聞王者之理天下一物失所興納隍之咎一夫不獲歎時豫之辜雖飢疫凶荒國家代有而陰陽祲沴警戒朕躬自諸道水旱害人疫疾相繼宵旰罪己興寢疚懷屢降詔書俾副勤恤發廩蠲賦救患賑貧亦謂至矣今長吏申奏札瘥猶甚蓋教化未感於蒸人精誠未格於天地法令之或爽官吏之或非百姓稱冤稅役多弊姦贓未去農業失時有一於茲皆傷和氣並委內外文武常參官一一條疏各具所見聞奏必當親覽無憚直言其諸道應災荒處疾疫之家有一門盡歿者官給凶具隨事瘞藏一家如有口纍疫死一半者量事與本戶稅錢三分中減一分死一半巳上者與減一半本戶稅其疫未定處並委長吏差官巡撫量給醫藥詢問救療之術各加拯濟事畢條疏奏來其有一家長大者皆死所餘孩稚十二至襁褓者不能自活必至夭傷長吏勸其近親收養仍官中給兩月糧亦具數聞奏江南諸道既有凶荒賦入上供悉多蠲減國用常限或慮不充其度支鹽鐵戶部及百司除諸軍衣糧布帛及宗廟祭享切急所須並常科用外所有舊例市買貯備雜物一事巳上並仰權停待歲熟時和別舉處分於戲朕自臨御於今七年兢兢乾乾不敢自逸而沖昧寡德未能燮調暵旱水災或罹於藩郡夭亡疾苦或害於生人悼於厥心省己自責其州府長吏各奉詔條勉加拯恤凡在中外宜體朕懷理道所關制度最切近者風俗踰侈歲月滋甚人隳本業用多費財爰命有司載舉彞制務從朴度可久行將使尊卑有倫刑罰少息其喪葬婚嫁吉凶禮物皆有著定尤聞僭差雖不在條件之物亦委所司準令式勾當仍切加捉搦不得輒有容縱軍國異容古今通禮禁軍仗衛雜飾及諸道節度等使應緣軍裝衣服即不在此限或有留令慢法委御史臺彈奏當坐長吏用清頽風秋稼方茂時稍愆亢慮有冤繫致傷和氣應內外諸司見禁囚徒各委本司長吏隨罪疏決務從寬典副我憂懷禮重承祧義存繼體思崇守器必務建儲王者所以固大本而貞萬國也魯王永溫仁寬明聰敏孝愛動合至性居無放心樂善承顏曠度容衆恭勤詩書之教率由忠願之風懿茲徽猷光我上嗣朕纂奉寶位丕寧聖圖欽若舊章用建儲二爰俾主鬯以率問安統正龍樓之榮昭宣甲觀之兆宜膺茂典允屬元良可册為皇太子仍令所司擇日備禮册命朕以否德纂承睿圖業業乾乾懼不克荷是用法天地無私之道以成化象日月無私之照以燭幽慕唐堯虞舜之為君繼貞觀開元之致理朕以夕惕宵興不遑暇逸冀將紹復聖哲保綏華夷至於洪名尤不輕議尚未富庶豈可屬心卿等台鉉重臣翼宣元化宜翊朕志臻於緝熙今陰雪傷和尚資寬宥乃以文武至德加於朕躬省視奏章難從虛美宜斷來表深諒豫懷朕嗣纂聖圖覆育生類兢業寅畏上承天休而陰陽失和膏澤愆害我稼穡災於黔黎有過在豫敢忘咎責是用避殿徹樂減膳省刑思惕慮以覃思庶薦誠而致雨時澤未降巳來朕當避正殿減供膳太常教坊聲樂權停閲習飛龍廄馬量減食粟其百司官署廚饌亦且權減陰陽鬱堙縶繫傷害有紊和氣是乖燮調今放出宮人一千人其諸道今年合進鷹犬宜數內停減一百頭聯在五坊者宜減放一百頭聯京城囚徒慮有冤滯巳委疏決務從寬降宜令鄭覃令狐楚速具條疏聞奏內外諸司先有修造稍非急切者並宜停省公卿百僚及戚里舊將相之家如有僭侈踰制委御史臺糾察聞奏諸州府長吏及縣令有貪縱苛暴者委御史臺訪察聞奏名山大川及能興雲致雨者各委長吏精誠祈禱於戲朕受天眷佑為人父母暵旱作沴焦勞匪寧遍祀山川靡愛圭璧菲食罪己緩獄消災載深勤雨之心冀警納隍之戒凡百士庶宜諒豫懷前後制敕應諸道違法徵科及刑政冤濫皆委出使郎官御史訪察聞奏雖有此文未嘗舉職向外生人勞弊朝廷莫得盡知自今巳後應出使郎官御史所歷州縣其長吏政績閭閻疾苦及水旱災傷並一一條録聞奏郎官宜委左右丞勾當法官委大理卿勾當限朝見後五日內聞奏並申中書門下如訪知所奏事不實必加懲責其奏舉稱職者則議優獎聖人立極教本奉先王者配天義惟尊祖我太祖元元皇帝肇開寶運垂祚有唐致六合於大同躋羣生於壽域保茲鴻業實賴貽謀如聞亳州太清宮頻經水潦頗以摧毀永惟誕聖之地敢忘崇本之誠宜令宣武軍節度使李程兼充亳州太清宮使仍委漸加修葺以時致敬稱朕意焉鄆曹濮等州元和以來地本殷實自分三道十五餘年雖頒詔書竟未入賦殷侑承兵戈之後當歉旱之餘勤力奉公謹身守法才及周歲以致阜安而又體國輸忠率先入貢成三軍奉上之志陳一境樂輸之心尋有表章良用嘉歎蘇州大水飢歉之後編戶男女多為諸道富家並虛契質錢父母得錢數百米數斗而巳今江南雖豐稔而凋殘未復委淮南浙江東西等道如蘇湖等州百姓願贖男女者官為詳理不得計衣食及虛契徵索如父母巳歿任親收贖如父母無資而自安於富家不厭為賤者亦聽朕比屬暇日周覽國史伏讀太宗因閲明堂孔穴經見五臟之繫咸附於背乃下制決罪人不得鞭背且人之有生繫於臟腑灸針失所尚致夭傷鞭撲苟施能無枉橫況五刑之內笞最為輕豈可以至輕之刑傷至重之命朕躬承丕業思奉貽謀言念於茲載懷惻隱其天下州府應犯輕重罪人除情關巨蠹法所難原者其他過誤罪愆及尋常公事違法並宜準貞觀四年十一月十七日制處分不得鞭背今年巳後每至夏至巳後立秋巳前犯罪人就州府常條之中亦宜量與矜減速為疏理不得久令禁繫委御史臺切加糾察永為常式如聞大理寺所覆諸州府刑獄皆盤勘微細節目不早詳斷道路遐遠往返經年非惟囚禁多時有傷和氣兼亦覬望恩澤故涉稽留為弊頗深須有提舉宜令御史臺切加糾察準敕限較科推狀中有贓數異同及罪人伏款未盡者即許移牒盤問其他煩碎事條不關要節者並不得更令移牒勘覆忌辰修齋雖出近制斟酌損益貴於得中況在不遷之宗允資異數之禮五月六日二十六日兩忌設齋人數宜各加至二千人太穆文德皇后忌日亦宜各加倍數其寺觀仍舊十二月八日忌宜於五所寺觀共設四千人宜令所司準式近者咎徵所集陽亢成災靡神不宗未獲嘉應豈刑政之尚乖其當將獄犴之未察其冤夙興以思庶答天譴宜令尚書右僕射李逢吉御史大夫鄭覃於尚書省疏理刑獄輕繫者咸從於決遣重條者議所以矜寬小大以情必詳必慎致誠無怠稱朕意焉時屬亢陽慮有冤繫應諸州府囚徒各委所在長吏疏理處分務從寬降其緣制獄未決遣者委刑部大理寺速立限奏覆稍涉留滯者仍令御史臺糾劾舉奏不待年而求謝於理身之道則至矣其如朝廷之望何銀青光祿大夫新授太子太傅上柱國襲徐國公蕭俯朕以肇建元良精求師傅遐思漢朝故事韋元成石慶並當時名德咸為此官吾以元子幼沖慎於教誡欲以纍汝發明古今冀忠孝之道日聞於耳特輟左右至於林廬而卿高蹈翛然屏絶進趣遠遣令弟還吾詔書天爵自優冥鴻方遠不轉之志堅然若山循省來章致煩為愧終以呂尚之秩遂其疏廣之心勵俗激貪所補多矣有益於政寄聲以聞亦有望於舊臣也可太子太傅致仕官至丞郎皆朕所委不幸云亡者宜其為之廢朝況朝會班列本在諸司三品之上比限近敕或乖通理時因敬休殞喪載深傷惻自今丞郎宜準諸司三品官罷朝一日王者受天地之明命續祖宗之鴻業所以祗服大事致誠嚴禋盡其孝敬之心崇其郊祀之禮必在匪懈不忒粢盛豐潔古今丕訓無易於此朕嗣位十載恭臨萬邦務三時以厚生睦九族以修教每厲薄德汔茲小康中宵內愧懼不克稱實天地之眷佑祖宗之威靈思欲罄其精誠奉以昭報豈聿懷之敢望實如在而齋心如聞近歲有司因循將事不恪牲牷無滌具之別籩豆乏靜嘉之容鼎俎雖陳薦羞多闕祠官或怠於齋肅胥吏有至於喧呶虧禮瀆神莫斯為甚永言重事用懼深衷起今巳後太廟郊社齋郎先事前一日委監察御史子細點如有替代非正身者當時禁身推問聞奏當重科懲既責躬親須議優獎其齋郎委中書門下商量量與減選應緣祠祭官下至齋郎及太常樂人吏等致齋日有博奕飲酒喧呼爭競者亦委御史臺糾察聞奏其牲牢準禮循行之際合視肥瘠之宜近日相承臨時取辦既乖誠敬頗失舊章委太僕寺準禮令處分如無本色牛羊速具聞奏至於酒醴醯醢簠簋膳羞各委本司準禮令切加提舉凡在廟壖所宜肅敬縱云隙地豈廢修崇如有耕墾藝植者亦委御史臺糾察聞奏攝事公卿雖約官品將朕誠敬必在得人委尚書省差定之時稍加慎選其祭器禮物中如有欠闕及濫惡須慎補改張者委太常宗正光祿太僕寺少府監諸司速具條疏聞奏仍委中書門下即與疏理處分於戲禮崇明祀神享至誠上下苟無其違心虔恭必冀於備物繇是怵惕興感齊莊致詞咨爾庶工各揚厥職式遵禮典稱朕意焉旌勸是先允協念功之義薦羞爰舉聿追配饗之儀贈太師渾瑊鍾秀誕靈逢時翼聖銘鏤金石帶礪山河績既著於先朝業宜光於後嗣俾之從祀用表遺勳宜配享德宗廟庭朕承天之序燭理未明勞虛襟以求賢勵寬德以容衆頃者或台輔乖弼亮之道而具僚扇朋附之風翕然相從實斁彞憲致使薰蕕共器賢不肖並馳退迹者成後時之夫登門者有迎吠之客繆盩之氣堙鬱和平而望陰陽順時疵癘不作朝廷肅清班列和安自古及今未嘗有也今既再申朝典一變澆風掃清朋比之徒整飭貞廉之俗凡百卿士惟新令猷如聞周行之中尚蓄疑懼或有妄相指目令不自安今斯曠然明諭朕意應與宗閔德裕或親或故及門生舊吏等除今日巳前黜遠之外一切不問各安職業勿復為嫌布告中外令其知悉朕以寡德祗荷睿圖於茲十年夙夜惟寅嘗恐至誠不達景化未敷屈已以安四方推信以待百辟豈有患生毗倚變起姦凶亦以失於任人致此氛沴然朕為人父母子育生靈憂萬姓之靡寧懼一物之失所況至理之代先德而後刑以上下歡康中外清晏慮有連纍即傷太和宜賞不逾時式彰褒勸其今月二十一日排難宣力功成謀議及能應機梟斬鄭注者節級各加官賞其次立功及軍隊將士合在賞級者即有差等處分其將校等合與改轉委本軍條疏具名聞奏謀逆之人巳斷腰領子戮家破俾當極誅元惡李訓王涯家族除巳處置外妻女奴婢並入官資貨産業天下所在切加責據數聞奏其餘親黨除同居知情外不同謀計者一切不問諸色官吏所繇其受逆長指合欲出力同惡者並巳兩軍推問尋捕處斬訖尚慮因緣讎隙妄告平人自今巳後縱同官司微涉詿誤者一切不問潛藏疑懼者許三日內各歸本司不得輒相恐動韓約首為詐惡逆罪滔天雖羅捕未獲終天網不漏宜委御史臺京兆府兩金吾速催促所繇齊出搜索獲日聞奏如輒有人隱藏不告者罪及一門如知處隱藏密來告説者必當厚有賞賜於戲朕求理之心惟才是與聽言信行不慮包藏豈謂邪人負我如此其中誘陷必有脅從須挂刑名載深冤歎其中節目疏理未盡須更商量者委中書門下續即條奏宣示遠邇咸使聞知中書門下吏部各有甲庫籍天下諸色出身以防踰濫諸道應奏諸色官改轉悉下三庫以稽其實委給事中中書舍人吏部格式郎中各與本甲庫官具有無異同申中書門下然與進擬如諸司使所奏不實或以無為有各加懲殿以絶姦源故雍州都督府録事參軍衛方厚妻程氏乃者吏為不道虐殺爾夫詣闕申冤徒步萬里崎嶇逼畏濱於危亡血誠既昭幽憤果雪雖古之烈婦何以加焉如聞孤孀無依晝哭待盡俾榮祿養仍錫疏封可武昌縣君仍賜一子九品正員官朕每覽國史見忠烈之臣未嘗不嗟歎久之思有以報如聞從覽宏式實杲卿真卿之孫永惟九原既不可作旌其嗣續諒協典彞考績巳深於宦途者命列於中臺官次未齒於搢紳者俾佐於左輔庶使天下再新義風遠人征賦每歲徵輸言念辛苦暫為蠲免其安南今年秋稅悉宜放免委都護田早集百姓曉示恐軍用闕絶宜賜錢二萬貫以嶺南觀察使合送兩稅供錢充朕因暇日嘗幸戚藩引見諸王爰加錫宴而故信王孫林行列之間皤然白首問其年齒則七十而有七詢其昭穆則元宗之雲孫朕仰思開元之時威明之禮大體承訓逮於朕躬惕然動懷當食興歎況尊祖之義立愛自親尚齒之文繇家刑國觀其威儀甚整視聽不衰載懷愍矜所宜敬異永惟烈祖之德用錫孝孫之慶旌其祚裔特舉徽章遽申開府之秩寵以分茅之貴俾從異等式是殊恩可封信王仍賜開府儀同三司仕雜工商實因鬻爵尚須命使改以賜財其入蕃使舊例與私覿官十員宜停別與錢五十貫文令度支分付永為定例
