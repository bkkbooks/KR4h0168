front:
  text: 全唐文欽定全唐文卷二百四十七李嶠六
  hash: sha256:638cbac13e45914032137f86adfd9d7497baed05ce4f381d3a972b708a738e12
body:
  text: 陛下創置右臺分巡天下察吏人善惡觀風俗得失斯政途之綱紀禮法之準繩無以加也然猶有未折衷者臣請試論之夫禁網尚疏法令宜則法易行而不煩雜疏則所羅廣而無苛碎竊見垂拱二年諸道巡察使所奏科目凡有四十四件至於別準格敕令察訪者又有三十餘條而巡察使率是三月已後出都十一月終奏事時限迫促簿書填委晝夜奔逐以赴限期而每道所察文武官多至二千餘人少者一千以下皆須品量才行褒貶得失欲令曲盡行能則皆不暇此非敢惰於職而慢於官也實才有限而力不及耳臣望量其功程與其節制使器周於用力濟於時然後進退可以責成得失可以精核矣又今之所察但準漢之六條推而廣之則無不包矣無為多張科目空費簿書且朝廷萬機非無事也機事之動恆在四方是故冠蓋相望郵驛繼踵今巡使既出其外州之事悉當委之則傳驛大減矣然則御史之職故不可得間自非分州統理無由濟其繁務請大小相兼率十州置御史一人以周年為限使其親至屬縣或入閭里督察姦訛觀採風俗然後可以求其實效課其成功若此法果行必大裨政化且御史出持霜入奏天闕其於勵已自修奉職存憲比於他吏可相百也若其按劾姦邪發摘欺隱比於他吏可相十也陛下試用臣言妙擇賢能委之心膂假溫言以制之陳賞罰以勸之則莫不盡心而效死矣何政事之不理何禁令之不行何妖孽之敢興哉自寶命中興鴻恩溥及唯以爵賞為惠不擇才能任官授級加階朝廷多改正缺不足加以員外非復求賢助理多是為人擇官接武隨肩填曹溢府無益政化虛請俸祿在京則府庫之財殫竭在外則黎庶被其侵漁伏願微惜班榮稍減除授使匪服之議不興於聖朝能官之謠復光於曩載竊見朝廷物議遠近人情莫不重內官輕外職除授牧伯多是貶纍之人風俗不澄實由於此望於臺閣侍監妙賢良分典大州共康庶績臣等請輟近侍率先具僚臣以法王慈敏菩薩護持唯擬饒益衆生非要營修土木伏聞造像稅非戶口錢出僧尼不得州縣祗承必是不能濟辦終須科率豈免勞擾天下編戶貧弱者衆亦有傭力客作以濟糇糧亦有賣舍貼田以供王役造像錢見有一十七萬餘貫若將散施廣濟貧窮人與一千濟得一十七萬餘戶拯饑寒之弊省勞役之勤順諸佛慈悲之心霑聖君亭育之意人神胥悅功德無窮元首之尊居有重門擊柝之衛出有清警戒道之禁所以備非常息異望誠不可易舉動慢防間也陛下厭崇邃輕尊嚴微服潛遊閲廛過市行路私議朝廷驚懼如禍産意外縱不自惜奈宗廟蒼生何又分職建官不可以濫傳曰官不必備惟其人自帝室中興以不慎爵賞為惠冒級躐階朝升夕改正闕不給加以員外內則府庫為殫外則黎庶蒙害非求賢助治之道也願愛班榮息匪服之議今文武六十以上而天造含容皆矜恤之老病者已解還授員外者既遣復留恐非所以消敝救時也請敕有司料其可用進不可用退又遠方夷人不堪治事國家向務撫納而官之非立功酋長類靡俸祿願商度非要者一切放還又易稱何以守位曰仁何以聚人曰財今百姓乏窶不安居處不可以守位倉儲蕩耗財力輕殫不足以聚人山東病水潦江左困輸轉國匱於上人窮於下如今邊場少踈恐逋亡遂多盜賊㣥行何財召募何衆閉遏乎又崇作寺觀功費浩廣今山東歲饑糟糠不厭而投艱厄之會收庸調之半用吁嗟之物以榮土木恐怨結三靈謗蒙四海又比緣征戍巧詐百情破役隱身規脫粗賦今道人私度者幾至數十萬其中高戶多丁黠商大賈詭作臺符羼名僞度且國計軍防並仰丁口今丁皆出家兵悉入道征行租賦何以備之又重賂貴近補府若史移沒籍産以州縣甲等更為下戶當道城鎮至無捉驛者役逮小弱即破其家願許十道使訪察括舉使姦猾不得而隱又太常樂戶已多復求訪散樂獨持叢鼓者已二萬員願量留之餘勒還籍以杜妄費臣特蒙天慈擢在樞近恩私屢及寵命頻加粉骨糜軀雖久誓於心府纖埃滴水竟無補於川嶽是用晨宵載惕啓處增慙素自庸愚加以疾疹心緒遺忘耳目昏沈實恐虛曠天工傾敗鼎餗伏思大臣引咎之義輒露微軀陳力之請豈敢避鞅掌之職就優游之間臣每思古人竊仰遺事充國則臥而陳策子囊則死不忘忠臣自念妨賢甘從屏退敬竭芻蕘之議庶裨日月之明所以固欲辭違昧冒陳上智識庸短自速尤伏奉綸言俯垂怪責心膽飛越五情無厝局天蹐地伏待刑科死罪死罪無任戰懼之至謹詣明福門奉狀陳謝以聞八月十五日三原縣尉趙國李嶠謹再拜奉書明長史執事嘗聞諸師曰易稱君子或出或處蓋君子與時消息從道汙隆故其處則閉重元坐虛白龍盤鳳峙桂郁蘭芬下生川嶽之氣上發星辰之象其出則摛景光吐文質風雲相召日月爭明撫八翼而登太階提七星而酌元氣夫然故終始亨吉進退利貞今嶠當休明之期權去就之分滄洲密邇未貞嘉遁之名閶闔洞開不列亨衢之步顧嘗希仕尺寸徇祿斗升僮僕之與鄰趨走之為役婆娑塵垢之下踸踔藩籬之際區區短懷亦云可見矣抑貧賤實難降志顛沛不可違仁是用終夜九回一朝三省懼斯言之或玷將細德之為纍至於有文無害之政得玉喪寶之談服以周旋庶乎聞達然以守其愚直任此拙難入門無為言之侶出谷罕求聲之援生平琴曲惟以下調相哀疇昔朋遊詎有中人見識誠不幾乎幽蘭芳蕙實有愧乎枯木朽株自獲忝微班預聞賤事佩紛綸之雅訓承肅穆之清塵有日矣亦曾越嚴序趨下風希口吻之芳音候眉宇之陽氣而堂上百里鬷明無撤器之因門下三千毛遂乏處囊之地雖願披心膽欲進款誠雲漢逾邈風流遂遠夫客果有能不孤彈劍之食士實難盡誰知執矢之工此昔人所以慷慨於神交殷勤於知已者也伏惟君侯日門翔照天池撫翼廚開銘鼎庭列歌鐘吐亹亹之言植堂堂之望河陽春樹開四照於詞林洞庭秋水清九流於心鏡若夫標置度量權衡物理蕭公畫策不探宏遠之規孟子持籌未極精微之數粵若登金闕排玉堂利見九五差蹤二八或奏昌言伏丹墀而心啓或回天獎憑紫樞而目送南宮祕署出入生光西京神輔指麾成俗固已羽儀振鷺黼藻㣥龍者焉下走家本燕南君侯昔臨趙北負書懷刺方致維桑之感賁帛翹車幸枉錯薪之薦愷悌之慈允洽敷腴之好不忘洎解褐中林易農下邑希光東壁猶是貧女舊鄰激水西江非復達人前惠鄙賤之質未改提獎之恩已別昔時薑桂早因得地而生今茲桃李翻以無言受棄豈非時亨其會命塞其通者乎今餘秩無幾解巾有日便當斂襟初服收拙後塵何去何從罷龜策之臧否自開自落任天地之榮枯宜其卷舌吞聲滅影削跡不干執事之紀無煩左右之聽徒恨勤誠纍歲而丹慊不通服道彌年而白頭成諺所以低回岐路抒軸蓬心搦翰操觚而不能自已者也夫引往納來江海所以深廣損上益下乾坤所以光大是以虛已之求有屈位而伸道泛接之愛或開懷而受物乃能崇峻官垣扃鑰閫奧使屬睇之目隔愈深而照窮仰止之心限彌高而望絶御賓以之失位篲客以之亡門將恐慕義之夫思為黃鶴之舉企景之客不作真龍之遊願君侯垂古人之風申國士之分假其白璧之契接以黃金之言不忽當年要之卒歲則重如熊掌府中饒取義之賓輕若鴻毛節下有狥身之士矣敢薦狂妄惟君侯擇焉嶠再拜月日三原縣尉趙國李嶠謹再拜致書於崔録事司馬録事執事嶠聞彩異彰施不足以遇離婁之目聲殊操暢未可以接延陵之耳況乎元黃莫主宮徵舛節將何以移於好事藉賞知音者乎伏惟公等思侔天假道合神契清襟與秋水俱映縟藻共春葩競發風雲感其聲律牆仞深其閫奧羽陵緗遙開博綜之門洞庭金石近入鏗鏘之韻固以重規坐右連華史筆深思匠之真筌畢文心之能事嶠學術蕪淺才藝寡薄弓冶遺業獨事斯文而衣冠後進多慙接武頃以三餘暇景四時風月斗酒娛樂嚶鳴感召春還江北時興楚客之謠木落淮南乍動潘生之思有同狂簡無近雅什不意頻降德音猥垂訪逮恭承嘉惠揣摩虛寡鑒淄水而慙容遵壽陵而恧步但以螢燭光耀尚增輝於暘谷畎澮微流且朝宗於水府敢緣斯義上呈如別大夫攄思空擬於登高小子裁章顧羞於調下某再拜安成足下伏聞高義之日久矣緬維徽範虔想德音山川闊契風月勞心何嘗不煎九回苦百慮向清風而披襟仰高門而企躅然執事者庸詎知哉蓋理或冥符雖違必契物有彙感雖遠必臻龍虎鬱風雲魚龍歸林壑同聲相應孔父精微之書同翼共飛馬生通博之史僕竊不遜仰希古人以為天下襟期四海兄弟款平生於千載感氣義於一言道或乖膠漆不能同其異志苟合楚越無以異其同萬里比鄰寧須㣥聚而會百年叶契何必偃伏而遊昔者鍾君西入邀蔣生為臭味延陵北遊款國僑為舊識斯並未言而信不介而親芬若椒蘭婉同琴瑟何哉誠相期之有素也若下官者落拓無繫支離少合何嘗效一藝於友朋關一奇於卿相形淪散冗名棄草澤通人未曾接賞談士不以挂言行為誚纍動成嗤鄙然敢獻區區之心者徒以螢燭之光不逮日月而稟照之理同涓滴之水無覬江河而體潤之原一也故輒布之於左右以為魏蜀兩俊可復生於今吳鄭兩賢不獨美於古此褊心所度足下豈有意耶且僕智不效於一官謀不周於千慮德慙季路訴甚伯寮畏此書就茲文墨首路之日馳情下風不謂燕雀聯翩鴻鵠已遠形留神往室邇人遐孤此宿心延佇何極然喜遇賢季得抒幽襟直置心許居然目擊竊以通家自任更將覩奧為歡聊下拂塵之榻便登勒銘之座芝蘭在室久久逾芳花萼連枝韡韡交映徒觀其室居閒曠庭草蕪沒高窗納景密樹栖煙筵有邱中之琴案有濠上之帙王褱情落落無事草元虛館陰陰自然純白此傲吏之遺賞高人之遠致也加復披玩華藻終朝忘倦珠明玉潤霞蔚雲舒符彩相燭稀聲閒起雕逾繪素采奪華蟲之飾韻動旋宮響入飛龍之奏三月忘味疇足為多一朝投筆於是乎在想望光景若覩清顏下官才不逮人學非通敏徒以聞長者之餘論忝好事之末流有時感激斐然牽課但短綆之才嗟於不及挈瓶之智患在屢空頃者關塞羇遊風塵旅泊抒情歌事略有短篇未足追踵詞人亦以言其所志竊不自外思知音所冀南郢之聲時參委巷東里之潤或被庸章則駑駘獲薦於九方腹背可儔於六翮矣仍恐豚肩禱薄未足享盈車之報犗餌非香不能致吞舟之獲耳僕事已清白尋就西轅仰承背夏涉秋方期戾止契濶不會我勞如何勉敬風猷時敦景行李某咨月日涇州安定縣尉趙國李嶠謹再拜上書明公足下側聞幽明三光止水洞窮神之察雷電六爻連山繹噬膚之象是以金祇獻序肅帝典於秋霜瑞節宣風播皇華於春澤鷞鳩司讞黃沙俟清問之仁神獬摧姦素飛惠文之筆賓舜門而佇穆指軒郊而靜害一作豁疑分聽之寄其在茲乎伏惟某公孤官授社昂臣疏宗登雅譽於祥鳧照禎黻於瑞鵲青衣西指標玉壘之英詞紫蓋南浮燮金陵之閒氣若乃地華承懿天才嗣武連十珥於中陽疊雙都於上國遺編默覽粹識表於神聰化池昭業精藝鄰於聖道仙查泊宿懸河通博望之津天口飛鉗鬼谷禪縱橫之術文用足矣學而優矣然後銅章砥務絃佩維襟泱泱大風泛游歌而成韻巖巖崇岫應宓琴而度曲誠招異感春狎仁童德憚靈遊夜呼神女屬二星齊鶩八駿駢驅議馬良規茲承不冤之裔誅狼駿概是寄埋輪之風乃者繡衣耀日錦傳詢風下璿樞而稟渙劑玉關而致職宰鮮東夏舊辨淄澠道鼠西源近分涇渭鎬池十乘端衡制其輕重清河二天直繩糾其枉紊故使神雞輟唱於酸吻夜鵲緘謠於苦哀置剗束薪之苛食苗愜甘荼之戮矣嶠西垂之賤吏耳技非專業未始存於劍書迹惟太居然弊於刀筆頃以亨衢覩物窮路迷方自谷罕求聲之資挺險無擇陰之暇是用沿流委逝遇抵而止乘日愒景沍陰斯芘而涸鱗不懸於枯肆更想江湖衰羽未摧於墜繳緬窺雲漢退求鄙尚旋顧微軀雖質異鳳毛飾慙豹鞟然嗣徽良冶挹道聖衢至於組織身文筌蹄意象照神交於千載得奧旨於三復貞筠範操秉楛羽以銘丹秀蕤敷搴菁華而抒素砥礪希割鉛之效巾緹庶沾玉之資豈期事以命迍迹隨冗擯沈泣與涇泥共滓悲歌將隴泉俱咽彩叨靈鑒觖三獻而孤憤影昧天機懷九方而纍悒顧以為探幽詣極元宰之貞分閲祕甄微知音之妙賞且夫清英傃雲出於煨燼之末光華孕日生自泥沙之下是知賤有可尊明眸不忽陋而或寶清耳無遺明公銜綍帝廷彯纓天闕片言之賞飛闞言於日署尺一之奏抗陳德於星階伏冀晰鑒蘭苗綴思茅茹俾夫集螢收曜攀若華而翳景射鮒堙流泝扶津而飲液野籟叶編鐘之韻甘藜味和鼎之滋則樹李其緘反拋疑知執昔鯷濱據地抗嘉言於直指龍門蹈閫邀遠好於司隸兩賓不嫌於黷進二主無忤於歡接並雕芳憲序灼美清流然則古之望今亦猶今之視昔矣投翰魄沮授心馳不宣某頓首君白辭閒纍月益深勤系秋後尚熱惟兄動靜云云君粗爾推免昨自歷亭路還至臨清展一慟於崔氏舉目酸咽良不可任變故幾何氣序遄革舊館荒毀殘蟬悲鳴夫情生於有情之地古人所以登峴山而淚下聽鄰笛而淒涼誠有以也亡友崔生才高位下盛年夭閼同志遽絶絃之傷有識深埋玉之恨此而可忍孰不可忍其藻綴鮮華姿彩秀舉故巳久處大府呈諸水鏡可略言也所未盡者此君幼無怙恃終鮮兄弟有田一廛桑竹靡樹孀姊返室諸甥數門移愛敬之慕以奉之假友悌之歡以臨之貧病為感概之資羇栖無學植之伴終能抗跡泥滓高步京華交結盡一時之俊文章滿談者之口亦為難矣加以重襟期敦賑施良辰美景故或自遠而至一俎一觴繼以繒紵亦無絶於時所以薄俸不資於目前孤高遠遺於身後古人稱清吏真不可為者豈徒言哉兄仁及遺竹替禮縟追賻千古之下凜然而高凡百賓寮孰不激節然其懸罄之室所費多端舊業偃師交質他族淹泊已及又頻濟施贖莊之餘颯爾復盡今授衣附及窀穸有期合門嗷嗷靡所控告亡友卒日惠愛若人吏氓追感道路屑泣而書是懼贈襚莫申夫所以惡貪叨而懲貨賄者豈不憑怙作威紊我公道耶今則異於是積東里之仁既將萬化同盡企西江之潤方為萬口所懸適足以重仁恩而敦教義也惟兄實深圖之儻一言辱及㣥願獲申豈惟崔氏獨受其賜亦二三朋友所佩服焉幸甚幸甚明日西上不果拜辭伏惟珍重某啓近於録事參軍杜延昌處伏見公秋月遙想洛城十韻之作曲中之妙傳乎郢客之聲天下之珍得自隋侯之掌鳳鳴六呂龍文九光駭屬奇觀相趨動色若乃政理餘隙翱翔多暇臨八水之高秋企三河之上國衣冠濟濟入青瑣而步丹墀車馬喧喧下銅衢而赴金谷人物仙舟之會風塵俠窟之遊莫不屬想心目託情謠詠九回靈府遙馳雨露之郊千里神畿近接風雲之思雕文將錦繡同美惠氣與芝蘭等馥用過秦肆懸輕呂氏之金持入周京即貴洛陽之紙足使兩都賓主羞談翰墨二陸兄弟恥論詞賦死者可作賈生為入室之徒來者難誣潘子得扶輪之地某學異通敏才非沈鬱刀筆為吏趨馳之歲月已多黼藻成文雅頌之風流尚缺平原從者終慙入楚之遊闕里門人空積後陳之歎徒以夙承光彩早延提拂曾將薄伎見知思以庸音自效輒忘固陋敢有和歌登卞肆而論寶入夔門而撫節擬託非倫揣摩增靦謹啓昔者龍負河圖八卦列明時之象龜呈洛字九疇開叶紀之文青巖啓而六甲飛黃壤堙而五行缺故知乾策遠坤符靈祕法效用常邀乎聖期研幾測深必貫於神道皇軒於是乎合而不死帝皡於是乎推而致福自重黎並命叔仲分官理八節而調四時部三元而齊七政權衡度律在虞夏而兼修正朔陰陽及殷周而備舉既而王風版蕩戰國縱橫瞽史忘三家之言疇人失二官之業履端闕而歸餘壞攝提差而孟陬殄廢時亂日非直羲和湎淫亡甲喪子豈唯商辛暴虐漢興草創肇謀紀綱而方士異詞天官橫議張倉從甲乙之術未叶變通鄧平用丁丑之元旋聞疏濶當塗圯隔典午陵遲戎狄升僭僞之壇㝢縣乏神祇之主三辰九野壓析景而分躔二象七衡孰當期而合度建元高而不競沿木火而無譏興百代之闕文復千齡之大統匪我昌運疇能離此國家草昧區夏權輿品物萬方同會獄訟之往南河五緯運謀神靈之入東井然元圭受命紫籙登樞回玉斗而察璿璣把珠囊而膺歷數勤於水土大禹之平滌山川禮乎方圓高辛之迎送日月應天神龍皇帝大橫綦極元良繼體乃神乃聖三王接袂而扶轂允武允文五伯連衡而擁篲於是乎東明捧日西掖占風南震雄王之廛北清驕子之落粟同水火人類胥庭犴圄徒施干戈不用上庠講道而宣化比屋耕田而鑿井功成理定之業協律登歌疇德瑞聖之符陳郊謁廟萬官咸事百度已康猶且存省闕遺徵求典故以為欽若歷象哲后之恭天事神敬授人時明君之勸農闢土自麟德創紀四十餘年雖斗憲未移而渾儀漸變蔡伯喈所謂術無恆是洛下閎所謂歷後當差昔太初肇規便易高皇之制元和新造旋移孝武之法因時通變厥有前聞爰命典司更從刊正金紫光祿大夫行祕書監駙馬都尉上柱國楊慎交鐘鼎貴遊山河寶氣赤泉疏社軒裳接於五公朱輪贈言翰墨連於七子資玉環之舊德擁金埒之新慶簫吹鳳管朝升烏鵲之樓漸疑閲龍章暮下麒麟之閣臨西山典籍之府總東壁文章之事九源百氏之說盡入胸襟六家三統之書咸歸掌握永言董率實竚詳明左散騎常侍兼修國史上柱國陳留縣開國公柳沖望重竹替纓才高瑚璉家風推其直道帝範藉其謨明吐白鳳而草元言垂紫貂而步黃閣參司國典時望允諧副掌天書朝寄斯在鎮國大將軍右驍衛將軍知太史局事迦行志中散大夫守禮部侍郎上騎都尉嚴善思正議大夫行太史令上護軍傅志忠等或禮閣兵鈐以賢才而入用或天門地理緣道術而見知皆學富偃韋藝超甘石窮神盡智之妙暗落銅丸測遠窮高之方懸裁玉表朝請大夫行太史局令瞿曇悉達朝請郎行司歷徐保文承議郎行司歷南宮說等或善分天部或工言算法稽長短之效無煩於驗讖披圖察休咎之徵非假於登臺上庫凡此衆哲各承朝委悉達等則專司課務據核其真志忠等則監共討論用裨其闕雖異體而各術並同心而合契於是精研六位通考十端立東西之定儀採南北之遺事會數於天九地十起元於子二丑三追日暮之行按星分之度以推四時之發生以步三元之盈縮然後分至啓閉無愆於玉衡弦望躔離必應於銅史才窺幽室巳見飛灰雜候清臺仍看合璧追論古法師驗前章八十一寸為日分徒言精密六百八年為歲紀終非允當歷祀之所紕繆異端之所穿鑿莫不裁之繩準格以銓衡究天道之精微開日官之軌憲容成再出不能參黍纍之功壽王重生無以議分毫之失豈比夫時乖兩閏始載鄒人之語亥有二首方聞絳老之年序臨安寧歲次強圉皇帝撫天下之三載也珍圖改御寶歷初調授以丹鳳之官頒以元鳥之署候耕耘之節非藉杏花亶昏夕之期詎須蓂葉參幽明而制術邁古今而垂範玉儀既正金鏡逾明知聖祉之無疆識懷生之永泰元符允合可以觀天地之心能事畢甄可以為帝王之式盛矣美矣無得而稱紀次勒成名曰大唐神龍歷云爾
