body:
  text: 君有德兮必體道以傳芳物有靈兮必順時以呈祥君感物而德著物應君以名彰於皇有虞道光先聖既受終於納麓乃禋宗而齊政光被人神澤周遐敻故得靈祥效祉西母來朝霓裳璀璨羽服飄颻駕鸞鶴兮御松喬陵碧落兮戾丹霄宴瑤池於旭日賓魏闕而崇朝其始至也天地氤氳彤庭赫其奕奕其既覿也階墀皓白干素琯爛其昭昭既而森列夔龍張皇金石仙侶齒於臣位靈物陳其賓席真質貞明神光激射可使青失翠丹墀罷赤舞獸見而回眸儀鳳觀而委翮信希代之名寶旌有虞之光格若乃虛心守白圓質懷貞功高律呂用等權衡價奪昆山之價聲如嶰谷之聲則趙之璧楚之珩杯遇殷而入用玦因魏而來呈雖見稱於中古固難可以與京是知琯之為物信其直而不屈琯之既神乃歷代而可珍始與時而沿革竟隨物而沉淪否不可終得之於道既逢奚景之賞寧從卞和之抱人亦如斯堅貞美好願同和而見用以窺天而不寶曹劌者何魯國英士將有征而無伐必慮終而謀始是以揣人情究物理決勝則若火燎原發言則如石投水智非爾及鄉人胡乃以措辭謀必我臧莊公固無其逆耳今小大是恤忠信是履故劌謂公曰此可一戰而已於是陳車乘備甲兵顧謂斯戰請從而行敵已料却計當宿成魯有奇才將吞之於度內齊無良算詎得知其禍萌俟彼三鼓而退諒此一掃而平若臨穽扼獸竭海斬鯨則何以逞其情哉觀其揚紅旗耀白日兩軍山峙千騎櫛比揮戈電飛激箭飈疾我鼓振兮其威初厲彼氣衰兮其律已失果當轍亂而旗靡孰謂無固而無必既而齊師敗績奔走俶擾殺氣凝於空間驚塵接於雲表鴻門之會比其功而莫高涿鹿之師齊其陳而猶小餘勇未終地盡川窮師旋而雲烟晝廓兵殄而山河夕空已矣哉千古崇崇仰夫英風被褐之時賈勇當百夫之特登軾之日指縱為三軍之雄益使魯君去其奢抑其欲永兢兢而刑獄擇其善從其能得翼翼之股肱故君子曰猗歟曹劌經國之大俾夫肉食者終有慚於曖昧碧鮮之竹採而為筒定名以律式成厥功厥功伊何所指必捷下彼高鳥紛如墜葉徒觀夫抱朴見素旨遠謀深不煩筋角不飾碧金直道而行故外端其體當無有用故內空其心於是步郊原窺林樾律凝其影運一氣以潛通箭戢其芒出數尋而徑發鏃如擊電羽若奔月我命處而精誠彼不虞而殞越亦如毛生擢穎初晦跡以躊躇周氏銜枚竟收功於倏忽烟棲霞宿擇木排空莫不洞胸裂眥奪魄喪躬朝在林泉之上夕登柈俎之中足使掇蟬失妙彈雀非工潘令慚黃間之弩廣既尹賤緑沉之弓有士遇之喟然嘆曰律者氣之管法之名竹者材之徑性之貞兼此而用之匪亨向也杍人不録虞氏不營混樗散而長棄何器用之能成孔父云舍之則藏用之則行信不虛矣凱樂象功曲成斯獻既宣威而是奏亦飾喜而攸建播師律於六律寰海用寧揚軍聲於五聲華夷知勸原夫飲至云畢告捷在茲陳簨簴之列歌杕杜之詩天地同和盡樂止戈之武生靈咸若俱歡反旆之師觀其鐘鼓克諧羽旄繁會伊德音所發實神功是賴粗而厲彰乎樂在其中感而通俾夫聲聞於外回八風以柔服叶七德而保大鏗鏘既薦乎成文條暢有符於交泰若乃昭聲教定武功肅軍容於清廟和樂節於皇風奏在偃旗之時寧惟三捷獻於歸馬之日何愧一戎於是洪稜奮盛禮陳感怒聲而色作駭壯觀而氣振且流歡於遠邇乃昭慶於神人耀德是資克戒熊羆之士審音斯取不忘將帥之臣則知伐叛既在乎師獻功必資乎樂綴兆若習於部伍進退如分其犄角矧乎侁侁之功斯立鏘鏘之韻相符始理心而啓聖終盈耳以為娛彼周伐玁狁漢征單于皆窮欲而黷武故人殘而力無未若我配盛德永維圖將使自東自西聆至音而斯為盛矣盡善盡美欣元德而不亦樂乎既而一人有作萬物皆覩掩軒后之咸池陋周王之大武播丕績於宮徵獻盛樂於宗祖客有擊拊而歌聖功願比身於率舞延陵季子節高神融博辨精通其識達其聽聰方辭吳而聘魯因請樂以觀風主人於是設嘉饗進樂工陳金石絲竹於堂上舞干戚羽旄於庭中客乃凝情滌慮幽聽遐想翕如也見雅調之始作美矣哉歎至德之彌廣自周而下自鄶以上備聞變態之音默見興亡之象時則崇牙對望猛簴相向槌鐘擊鼓乍陵厲而清壯鳴磬戛絃又發越而寥亮八音宣六律暢馬弭髦而仰秣魚竦鱗而躍浪信可以察邦國政教之盛衰見造化陰陽之情狀及夫曲已終奏斯闋言之者莫隱觀之者咸悅足使夔曠心沮牙期思絶是知大樂與天地同和大禮與天地同節乃為理之樞柄化人之軌轍者也夫聽者納於耳而察於心伊事也傳於古而繼於今陽春白雪之歌其和寡流水高山之曲其意深姑使清濁不亂鄭衛莫侵雖千載之後亦何謝乎前賢之知音樂而無聲和之至聲而有象樂之器特飭樂以彰物非克和之大義故保和而遺飾然後至樂之道備樂不可以見見之非樂也是樂之形樂不可以聞聞之非樂也是樂之聲天廣其覆地厚其生四時和萬物成絪縕煦嫗何樂能名豈非有之為粗無之為精魚泳重泉獸安茂草鳥頡頏於雲路人逍遙於至道咸自適於中情亦何擊而何考厥初造化衆籟末吟寂兮寥兮有此至音無聽之以耳將聽之以心漠然內虛充以真素處此道者無日不聞于律度倏爾中動遷於內形涉此流者沒身而不得一聽得意貴於忘言得魚貴於忘筌堯人致歌於擊壤陶令取逸於無絃音留情以待物亦同禮於自然此樂也平而不偏正而不回貧且賤不以之去富與貴不以之來顏生得之陋巷而自然殷紂失之北鄙而人哀樂云樂云鐘鼓云乎哉木造天水窮元森森擢千丈之秀汪汪澄萬頃之鮮散而成衆木疏而為百川梓之材備矣江湖之量存焉竊聞源長而下流不竭未見本盛而枝葉先顛志士託以垂陰無假惡木渴者飲而滿腹何求盜泉故樹善於人人懷則甘棠不朽泛愛於衆衆凑則德水長懸方將成不言之蹊廣利涉之路俾出幽之鳥仰喬幹而能遷未濟之人因餘波而可渡鳥豈木之所擇非擇木而不棲人奚水之作鑒亦鑒水而取喻徒聞其移橙渡北不能苞貢於王國導漾之東是以昭回於昊穹木誠戀於南枝常得地而專美水豈忘於西土乃凌雲而獨崇用不用也非結根之有異高莫高兮將聞源而實同葛藟猶能庇其本江漢所以朝其宗固宜大樹蔭庥而千牛可蔽洪河浸潤而九里旁通寧效有喬而不可休息於其下至廣而不可游泳於其中者哉則有青青弱幹獨秀未立涓涓細流餘清可挹植翰苑以蕭散赴龍門而驚急企樛木之逮下望恩波之流濕巧乎道者承蜩之叟蜩擇木兮有翼叟持竿兮在手物我相絶嗜欲靡同彼不飛兮焉待此將掇兮何工丈人曰我有道也初五六日纍丸為術槁木其臂朽株其質不墜者二則失之錙銖不墜者三則失之十一既纍五而咸若寧絶四而無必由是步平地之上入深林之下耳目俱營心手相假葉空密而皆見枝雖繁而不舍豈伊拾芥將同注瓦或挾三而兼兩或指多而就寡期於百中則啼猿之射乎曾不孑遺殊慕鴻之弋者彼飲露為事蛻殼有期顧非鼎俎之實尚何彈射之疑庸詎知絶俗猶纍凌虛亦危以無用之質遇有求之時始則長鳴聲嘒唳而中絶方將一舉翅蕭條而半垂豈獲戾於不食而搆患於有緌且觴深操舟大馬捶鈎三十仞磨崖不溺十九年肯綮皆游徒聞其事未見其優豈知天覆地載四荒八極不以萬物易蜩之智不以萬物易蜩之翼惟精惟一無反無側用志凝神何求而不得若以叟為臣以蜩為賊亂繩斯理背陳斯克一言以蔽可詳周公之風一矢所加何遠蠻夷之域螳蜋之捕兮信劣黃雀在後兮安得至哉丈人功並孫息說苑晉靈公造九成之臺孫息以纍十二棊加九雞子為諷鴆彼飛鳥在河之洲一飲一啄載沉載浮賞心利涉之地浴德清波之流守道而行風水無情於六翮度才自處雲霄有望於雙眸聯翩失伴顧步無儔因潔身而獨立聊拂羽以孤遊蓋貞以不㣥鷙而有別將擇木以未暇乃漸磐而自悅窺形弄影欣得地以徘徊哀響奇音冀聞天而清切亦猶鴻志非燕鶴㣥豈雞雖孕形於羽族諒稟性於天倪慎其獨焉知無心於黨與需於沙者必不至於沉泥豈比夫鸞對鏡而方舞鳳非梧而不棲候鴈有銜蘆之懼黃鳥興止之悲夫何出處之情遠而攝生之智迷況乎食粟貪榮乘軒取媚珍禽見育敗德於明主鷙鳥云亡行刑於下吏非靈應之攸止乃進趨之所致豈若動非干物息能擇地盜泉不飲得廉士之風止水常遊侔至人之智道有可鑒才無不備屬瑞鳥之昌期將遷鶯之厚意顧得振羽毛展精鷙君不信其飛鳴試假借於名位觀其處啓閉辨分至然後知沙州之獨鳥非凡禽之類門下昭事嚴配之禮成敘勞行慶之恩備凡我有位共承神庥朝請大夫使持節蒙州諸軍事蒙州刺史賜紫魚袋方處嵩昔以端誠率修公議美利歸於內服外譽著於中華雖述職之早各思其局而在公之效同歸于治俾授大夫之秩以為多士之榮可依前件臣郢言伏奉今月二十七日敕除臣太常卿曲降殊私猥被凡器非才荷寵聞命自驚臣聞太常者舜臣秩宗之任周室春官之職其所典者禮樂所奉者郊祀故班冠九選重歷代臣學識凡近遭逢聖明管庫無遺久塵貢士之列疲駑不逮常獻避賢之疏特蒙天鑒俯及容光煦嫗之仁允前請而既幸綢繆之寵沐今授而增忝將何以欽承睿獎備舉官司顧慚匪服之嗤上纍能官之謗恩深命淺報效無階伏准建中元年正月五日制常參官授訖上表讓一人自代者臣竊見銀青光祿大夫守太子賓客上柱國鄭縣開國公杜黃裳識度深遠志業忠厚達於大體練於故實㣥而不黨和而不流與臣同在周行臣頗知其優裕伏請準制舉以自代臣郢無任感戴欣惕之至臣郢言伏奉今月二十一日恩命除臣太常卿充禮儀使者纍歲守藩每馳心於魏闕一朝聞命得備位於周行上慚叨忝之深下慰違離之思臣某中謝臣聞秩宗之任典司三禮奉常之選班列九卿前古以來用人為重非有實望不宜謬居臣昔叨此官已積負乘之懼今復再歷益增濡翼之憂況專職禮儀別蒙委遇明時大禮方奉郊禋末學謏聞何徵損益飲冰斯切俟駕靡遑螻蟻之微無階報國犬馬之戀但喜歸朝臣不深感戴欣懼之至臣某言伏奉恩旨以告祔禮畢賜臣錦綵一百五十匹銀碗一無庸受恩不知所措臣某中謝臣伏以禘祫元祀從祔大經酌禮求中聖情合於天地奉先致孝精意刑於四海臣職叨禮祔獲奉皇猷欣盛典於無窮顧微生而何補謬霑慶賜竊自慚惶無任臣郢言臣聞量力而仕臣下之審分知止不殆道經之明訓所以七十致仕禮式其期臣犬馬之年去春已滿頃者方欲陳乞屬蒙新授今任欣時忘老祇命戀恩復屬王師出征聖軫方切輒求安退又所不敢伏惟睿聖文武皇帝陛下德廣天地道孚干羽承宗順命伏罪效誠制告班師萬方軌道昆蟲草木各遂其性臣早當告謝無忘夙心不應遲回更俟終日況復夏官任重賢路久妨時制已過衰疾兼甚實懼夜行之罪上纍明時之寵伏乞許遵恆典特賜餘年止物議之貪榮洽宸慈於休老微臣之願庶蒙矜允臣竊惟塵曠謬迹三朝叨承睿獎中外六任竟無毫髮上答恩私齒盡請骸終慚且惕徘徊積戀戰汗陳愚天闕一辭朝車永稅方從野老共樂堯年臣郢不勝感恩兢惶之至臣郢言臣上陳丹懇非敢飾辭前月二十三日中使梁士平奉宣旨賜臣還詔聖慈曲念未忍棄捐綸音下臨特加裦獎心魂震悚拜舞靦容臣某中謝臣血氣既衰戒之在得鐘漏云盡行者當止臣今所乞已過常期若志悅前言事違往行雖稱守命誰曰非貪況臣升朝以來歷忝清貴歲時久曠功用蔑聞前恩無報後效焉取使蚉負山欲彊何由臣伏以戀主之心古今齊致暫從外補猶所不樂永違闕庭豈遑勇退竊以菌蟪生促無幾光陰駑駘齒窮匪任衡軏加以疾疹時廢筋力日耗與曠官而叨寵寧量已以乞恩庶蒙聖鑒昭回愚悃特許臣得從時休息以禮進退免於黃耉猶負素餐全度庸微生成莫大天無私覆冀收惠渥歲不與臣敢忘披露再黷宸聽辭隨涕零臣郢不勝感戀兢戰之至臣郢言再表陳情一心仰施瞽言無感宸眷不回今月四日中使魏寶羲至奉宣進止賜臣還詔倍加榮獎未允愚衷驚寵循涯伏躬殞越臣某中謝臣聞勞生佚老天理自然蠕動翾飛日入皆息時不期而必至物雖強而無由禮經所以制限疲薾所以獲退自非貢禹之守經據古趙喜之正身匪懈韓暨之志節高潔山濤之道德模表人皆顧望禮以至公縱過常期詎為貪冒其有當仁不讓急病忘身豈止君命猶宜自舉故以魏待秦師唐睢請約車而西說漢謀邊將充國對無踰於老臣所謂臣事君以忠君使臣以禮忠無不納禮亦從宜如此則選舊任能足供國用優年加惠得遂時歸古之進退鮮不如此臣以不才叨辱高位幸而免戾年及乞骸茍蒙得請之恩實受終身之賜若叨榮不怍當退而留則上纍皇明下重臣罪況臣身少力薄不如等夷年老氣衰現就羸憊形因榮弊疾與齒并榮衛每乖膝脛多痺既憂廢職又懼妨賢內外交攻生涯轉迫窮暮之懇不遑起居芻蕘之詞已罄肝膽一物有關於亭毒容光時假於照臨顧西山而駭目瞻北闕以馳心臣郢不勝戰惕感戀之至臣邁言今月十四日以在假百日進狀上聞某日中使某奉宣進止令臣在家養疾損日朝參者力疾受恩慚懼交集臣病滿百日法當罷免恩自九天優以賜告伏念手足餘疾運用未平風毒常作療除多久臣今若臥叨厚祿坐待全痊豈惟日月易淹實亦恩私過幸且台輔為任周行所瞻臣匪服以居既貽官謗沉疴不退又廢公法夙夜循省心愧靡寧雖宸慈曲臨有所不忍而王道平施則惟無私臣既內懷尸曠之慚外迫支體之慮竊恐所攻非一望損靡遠徒闕遵常之典增延憫下之仁如蒙特恩俯遂微懇得從解紱專一就醫則冀形魂兩安物議皆息全度之澤於此為深無任感恩之至謹奉表陳謝以聞臣昕言伏奉今月二十三日制除臣太子少師致仕仍給半祿料其宴會及朝朔望並依常式者桑榆暮齒忽遂休閒犬馬微誠仍參朝會臣某中謝臣本書生資於巾褐每歷清列尸曠徒深早迫流年止足有素特以四朝受任千載逢時難勝戀闕之心久滯乞骸之疏陛下俯憂羸老曲被庸愚三印之辰更加新命懸車之後且許時朝榮賜俸祿澤深惠養昊天罔極思上報而無階餘日幾何奉湛恩而不朽無任感戴欣忭之至八月二十五日草莽臣前鄉貢進士高郢昧死再拜稽首獻書闕下從諫如流者君之明也有犯無隱者臣之忠也君明臣忠國之利也當陛下至明之化納諫之日臣敢愛其死以隱其忠乎臣伏見奉為先太后造章敬寺陛下大孝因心與天罔極蒸蒸之思惟舜其難至德要道無以加也然臣伏見以畢力追孝誠有所益妨時勦人亦有所損先太后聖德不必以一寺增輝國家永圖無寧以百姓為本捨人就寺何福之為以臣愚蒙不知其所昔魯莊公丹桓公廟楹而刻其桷可為孝乎然而春秋書之為非禮漢惠帝及孝景孝宣令郡國諸侯立高祖及太宗高宗代宗之廟當時創制不據禮經至元帝時與博士議郎斟酌古禮一朝而罷之豈元帝不敬宗廟乃王者示人以軌物也夫廊廟者宗社之所在神靈之所憑猶不可無故而飾之越禮而立之況此寺非宗社所安神靈所宅而殫萬人之力以邀二梵之報其不可亦明矣間者昆吾孔熾薦食生人今猶不悛偷居宇下百姓凜凜無日不惕遣將攘卻無尺寸之功隴外壤地委之豺狼太宗文武皇帝封殖萬有傳之陛下一夫不獲尺土見侵告成之時猶恐有闕況甚於一夫尺土者乎用武已來十三年矣傷者不救死者不收繕乘補卒至今未已夫興師十萬日費千金則十有三年百萬之衆資糧屝屨取足於人人之困竭胡可勝紀勞疲宛轉十不存二父子兄弟相視無聊延頸嗷嗷以俟王命此皆陛下宜伸勤恤之恩降哀痛之詔縱未暇分散穀帛以贍鰥寡猶當務省侈費以噢咻之奈何戎虜未平侵地未復金革未戢疲人未撫太倉無終歲之儲大農有榷酤之弊陛下忍以此時興力哉自八月以來時雨候禾稼少損菽麥失時黔首狼顧憂在艱食歲若不給將何以救無寺猶可無人其可乎臣竊料此寺數年方成土木之勞工用之費不虛府庫將焉取給府庫既竭則又誅求儻窮匱不堪鼠竊之盜起戎狄乘間狗吠之驚急得不為陛下深憂乎臣聞聖人受命於天以人為主苟功濟於天天人同和其功大矣自然上則宗廟受其福下則子孫賴其慶故孝經云德教加於百姓刑於四海蓋天子之孝也又云明王事父孝故事天明事母孝故事地察又云周公郊祀后稷以配天宗事文王於明堂以配上帝是以四海之內各以其職來祭詩曰無念爾祖聿修厥德又曰既受帝祉施于孫子是知王者之孝在於承順天地嚴配宗考敬慎德教以臨兆人俾四海諸侯歡心助祭延福流祚永永無窮耳豈聞崇建梵宮雕琢金玉之為孝乎且佛本無相不可以有相求道本無為不可以有為得陛下豈馳心於有為之境而邀福於有相之功哉臣竊為陛下不取也臣聞夏禹卑宮室而盡力乎溝洫人到於今稱之梁武窮土木而致飾乎寺宇人無得而稱焉陛下若節用愛人當與夏后齊駕何必勞人動衆而踵梁武之遺風乎制造初興役費尚淺人貴量力不貴必成事貴相時不貴必遂陛下若回一人之慮從萬姓之心必是陛下聖德孝思格于天地湛恩沛澤濟乎生靈生靈效誠天地幽贊千福萬祿先后受之豈與一寺較其功德乎陛下以臣言諫於誑妄疑伏請令公卿列士廷議可否得其中則天下幸甚臣郢不勝愚忠懇直之至謹投招諫匭以聞九月二十日草莽臣前鄉貢進士高郢昧死再拜稽首獻書闕下臣聞聖主開直言之道者豈好其犯顏忤旨乎誠欲因天下之心以慮則無不得因天下之目以視則無不見也忠臣不避誹謗之誅者豈貪其死諫之名乎誠以君所行有否焉不隱忍偷生以負於時也臣伏見奉為先太后造章敬寺陛下奉先思孝興福除禍而㣥黎百姓不知聖情議者皆以為蕃戎未殄兵革暴露國用不贍元元匱竭曾未小康又興此寺雖睿思罔極而人力有限也臣聞衆心成城衆口鑠金則輿人之誦不可輕也故書曰罔咈百姓以從已之欲易曰聖人感人心而天下和平詩曰愷悌君子神所勞矣此言王者將有為也將有行也必稽於衆而順於人則自然之福不求而自至未然之禍不除而自絶矣臣愚考之於古則詩書與易如此聽之於今則百姓之議如彼拳拳之極不敢不言昨八月二十五日奏書闕下事寢無報不知天門深遠愚不得上達歟聖意所斷臣言不足聽受歟伏躬待罪旬八日矣臣聞神人無功聖人無名神人無功者不為有功之功聖人無名者不為可名之名也不為有功之功故功莫大焉不為可名之名故名莫厚焉臣又聞古之明王積善以致福不費財以求福修德以消禍不勞人以禳禍陛下之作此寺也臣竊惑之若以為功乎則天覆地載陰施陽化未曾有為也若以為名乎則至德要道以順天下未曾有待也若以致福乎則通於神明光於四海不在于費財也若以禳禍乎則方務厥德罔有天災不在于勞人也今興造急促人徒竭作土木並起日計萬工晝不遑食夜不遑息力不逮者隨加搒笞愁痛之聲盈於道路以此望福臣恐不然陛下戡定多難以定宗社勵精思理日昃不暇內不邇聲色外不樂游畋務行寬仁以幸天下聖人之德廣大悉被太平之風將可見矣而興動此役固違㣥情回正道於內心求微助於外物徇左右之過計傷皇王之大猷臣竊為陛下惜之是以敢冒死至於再諫伏惟陛下留神省察臣不勝愚懇切直之至周公居攝七年致政而歿成王康王追思其德命魯侯代之祀以天子禮樂魯君得乘大輅建太常外祭郊社內祭禘嘗虞夏商周之服器與官兼而用之以廣魯於天下郢竊謂自天子至於庶人尊卑貴賤待禮而別豐者不可殺殺者不可豐成康過賜非禮也魯君受賜亦非禮也何則郢聞有其位而後行典禮仲尼不臣門人非君也季札不嗣吳爵非長也周公不王而以禮樂王者是以非禮誣周公也設若誣周公以非禮曾為昊天上帝亦可以誣乎奈何使魯人郊昔孔子憤歎於衰周而欲求禮於魯及觀其僭乃言曰魯之郊禘非禮也周公其衰乎魯用天子禮樂者本以郊上帝既非聲名文物之當用可知矣又恐來者以宋用王禮為疑因言之郊也禹也宋之郊也契也是天子之事守也宋二王之後得守先祖禮樂魯何守而用之耶猶恐其未能又言曰天子祭天地諸侯祭社稷祝嘏莫敢易其常古是謂大嘏此乃申言名位不同禮樂亦異數之定分也夫子之言昭昭如揭日月而學者或以為事更聖人未聞可否難措辭於魯議者於謙默之道則可矣於發揮之義恐未盡也詩曰爾之教矣人胥效矣魯侯用王禮其臣亦用侯之禮故季氏舞八佾旅泰山設公廟歌雍徹嗟乎禮之不早辨也如此古者父為天子諸侯子為士祭禮從子不得從其父干晉應韓武王之穆得用備物享武王乎若享非禮之裦是周公不得為聖人也如其不享是成康祗以王者禮樂餒周公於魯矣安在其為成康乎且周公之績孰與伊尹成康之明孰與太戊崇異伊尹不過號為保衡至於沃丁太戊亦不加以王禮或謂周公叔父也於伊尹而為親故尊而異之夫太伯太王之長子三以天下讓於王季王季得之以傳祚於文武故孔子曰太伯其可謂至德也已矣及武王克紂追王太王王季文王而不追王太伯豈武王忘太伯之德而不親乎蓋以等威之禮名分之別為萬代之準不為一人之私也夫人情無常以禮為常以禮從情動則為悖且如王者祖有功而宗有德祖宗之廟代代不毀大凡繼體之君皆欲尊崇其父至於德功未著則不敢妄加廟稱者情非不欲限禮而已矣故禮之行於宗廟父子不得遂其私而況成康又得以天下之公器大典獨私於周公乎周公有大勳於周土田附庸以益之則可秬鬯圭瓚以賜之則可若天子禮樂成康所恃以為尊也胡可以假人成康雖欲尊於周公伯禽其忍受之以出僭其君入陷其父乎若周公躬制禮樂墳土未乾而子孫弗克負荷首亂王者之度孔子稱其衰不亦宜乎衛司寇惠子之喪也其子虎見廢不得為嗣子游為之麻衰以譏之將軍文子既悟而虎得復位載在禮典先儒是非之說禮闕四字戲人書曰盛德不狎侮使彌牟能知禮也是君子也當書直以救失為不知禮耶是小人也當務其闕能提耳喻之何狎侮之為乎觀文子未正虎位非不知也重違惠子之志將候告者而行之偃奈何以廣自許以狎待人重其話言輕其重服乘人之失伐已之明又非美之位疑不可謂無辱且多識前言闕二字其失而回遹若此設使立人之朝闕人之政至於講大禮臨大節獻可替否任賢去邪言可得聞乎無以乃裂冠毀冕行怪而已矣遠觀望之疑未見其可直人不以其直也不敢以道循物而忘其身赴井救人傷教害義殆非所謂習禮者矣姜嫄者炎帝之後有邰氏之女姓姜字嫄帝嚳之元妃后稷之母也公劉者后稷之曾孫周文王之十一代祖也姜嫄嘗出游見巨人跡而履之載震載夙時維后稷以居然生子心所不康初置之隘巷再置之平林三置之寒冰皆有以全度者既而收之遂名之曰棄生有赫靈之異長有躬稼之勤法施於人以濟粒食堯乃命為農師而封諸邰農師實后稷也古初造物首出㣥理事必生成之本言必天地之際當虞舜之時稱禹平水土布五教稷布百穀咎繇明五刑地平天成萬代永賴舜以奮庸命禹禹讓於稷咎繇及以元后命禹禹獨讓於咎繇曰朕德弗克人不依咎繇邁種德德乃降黎民懷之茲大禹所以言天意永命之所歸也夏有天下載祀四百禹之祚也商有天下載祀六百契之祚也周有天下載祀八百后稷之所祚也自時厥後百王澆季而咎繇之積纍在天天祚永歸有所砥止乃以無疆之歷命我聖唐盛德大業與天地準追視三代猶指掌矣昔者周文武之烈本於后稷后稷之生本於姜嫄故詩曰厥初生民時惟后稷后稷之子曰不窋失官而奔於戎狄不窋之孫曰公劉往遷於邠居以平西戎以篤前烈故詩曰篤公劉於邠斯館是知姜嫄有德於周公劉有德於邠先賢所出立祠舊矣我國家稱秩元祀咸秩無文山川鬼神亦莫不寧而姜嫄公劉之廟舊制卑隘湫隘在市非所以崇明祀敬鬼神也貞元四年邠寧節度觀察使檢校刑部尚書兼御史大夫邠寧郡王張公獻甫戎醜是膺授鉞而至肅肅王命維公將之烈烈征士維公成之略地千里亭障嚴於外啓行一戰弓矢櫜於內卒乘睦而知禮風俗康而狎野覩此二廟獨為匪安公曰嘻精潔莫重於神明喧囂莫甚於市㕓奈何雜處乎夫小人者知鼓舞之事神而不知褻狎之慢神知事神之求佑而不知慢神之賈禍茂草一去遺塵萬祀使神而無知則已若曰有知而喧囂瀆易之狎中夫札瘥夭昏之患者得非長吏慈惠之不足耶乃以不忍人之心行不忍人之政且為神告既而卜遷粵以貞元六年十一月九日作新廟於南郭焉地則郊野之閒左水右山有清謐之勝材則懋遷之至上棟下宇非徵斂之煩擇農務之隙量功命日無妨奪之弊移嘉木而樹之考良辰而落之神於是嚴威而蠲乎所處人於是祇惕而遠乎所瀆是惠人於無過之地而寧神於不怒之境仁為已任不亦厚乎夫神聰明正直者也惟忠肅恭懿乃能承之順此而祭不必多品故雖澗溪之毛潢汙之水而君子率是四德陳於二簋行之以禮奉之以慤潔之以齊達之以和則神可得而祀焉祜可得而致焉夫子曰某之禱久矣抑為尚書張公以文武之憲純一之良知無不為忠也正色率下肅也執事有恪恭也擇善而從懿也自先豳州大夫以來一門四人義方繼踵勳績為時心膂所資非他忠肅恭懿而已用能承天之寵獲神之勞以屏王室以揚家聲也宜哉祠成三歲矣而銘記尚闕將恐寖遠失其所由乃陳梗概爰此刊刻詞曰何賢乎姜嫄曰克生后稷何賢乎后稷曰克降農植后稷之道至今賴之姜嫄之德如何勿思何賢乎公劉曰肇宅邠土何樂乎邠土曰平戎之所乃今乃古有廟有宇宇亦既卑廟亦既摧闤闠朝合囂塵暮開蚩蚩㣥氓屑屑徘徊瀆禮非敬祀神有災明寧戾止理化咸集財豐衆和暴禁兵戢惟此墻屋公私必葺矧伊明祀風雨所及是度是築乃遷乃立奉我皇德達於有神揚神之威靜乎虜塵亦惟正直克贊忠純勒銘茲庭永示邑人
