front:
  text: 全唐文欽定全唐文卷四百四十九郢字公楚衛州人寶應初進士應制舉登茂才異行科纍遷中書舍人進禮部侍郎拜太常卿貞元十九年進位銀青光祿大夫守中書侍郎同中書門下平章事順宗立轉刑部尚書罷知政事元和初以右僕射致仕六年卒年七十二贈太子太保諡曰貞
