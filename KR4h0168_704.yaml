front:
  text: 全唐文欽定全唐文卷七百四李德裕九
  hash: sha256:8bdd42adb23b9ef3f5089ca132e7df75b4dff98ed8952b205751ac6f67b361aa
body:
  text: 右臣等舊讀實録不至遺忘伏思纍聖以來未有此例謹按左傳諸侯不相遺俘昔魯受齊俘見譏左氏諸侯尚為非禮况在台臣臣等忝備鈞衡須謹繩墨若苟受私遺不守舊章則何以上戴聖君儀刑百辟伏望聖恩盡許卻還從此便為故事仍望許臣與一書報答令其深諭國體其書草續撰進上以聞右胡震博通六經華皓一志家在海郡筋力未衰臣童幼之時於震受業豈謂年逾四紀位列三公雖自君恩亦因儒訓臣伏以元和二年前揚州士曹參軍薛元造緣與臣亡父授經具表論薦憲宗授越州諸暨縣令臣幸因家門舊事輒敢薦聞伏希聖慈特授浙東管內一官所冀臣報其舊恩獲繼先志既顯蓽門之士實為儒者之榮臣不任懇款兢皇之至右河東等道或興王舊邦或陪京近地州縣之職人合為樂只緣俸祿寡薄官同比遠元和六年閏十二月十二日及元和七年十二月二十四日敕河中鳳翔鄜坊邠州易定等道令戶部加給俸料錢共當六萬二千五百貫吏曹出得平留官數百員時議以為至當自後訪聞戶部所給零碎兼不及時觀察使以為虛折皆別將破用徒有加給不及官人近地好官依前比遠伏望今日以後戶部卻與實物仍及時支遣諸道並委觀察判官專判此案隨月加給官人不得別將破用如有違越觀察判官遠貶觀察使奏取進止又選人官成後皆於城中舉債到任填還致其貪求罔不由此其今年河東隴州鄜坊邠州新授比遠官等望許連狀相保戶部各借兩月加給料錢至支給時除下所冀初官到任不帶息債衣食稍足可責清廉右訪聞自有還僧以來江西劫殺比常年尤甚自上元至宣池地界商旅絶行緣所在長吏掩閉道路頗甚怨嗟望每道令揀前件人解弓弩又諳江路者每一百人置遊奕將一人須清白強幹稍有見會者充如法造遊奕船船五十隻一百人分為兩番長須在江路來往淮南遊奕至池州界首浙西遊奕至宣州界首江西遊奕至鄂州界首常須每月一度至界首交牌各知界內平安申報本使其下番人便於沿江要害處置營不得抽歸使下其糧餉春冬衣委使司差人就營所支給如三度以下擒捉得賊委使司超與職名其官健以下便以賊贓物賞給務令優厚如兩度有賊不覺察遊奕將科責差替如容縱賊盜不問有贓無贓並委本道差人所在集衆決殺如賊大段巢穴去處仰數道計會一時掩捉倘去根本軍將授官酬賞所貴鄰接之地同力叶心江路盜賊因此斷絶臣等今月二十五日已於延英殿面奏伏蒙聖恩允許未審可否臣等聞恤貧寬疾著於周典無告常餼存於王制國家立悲田養病置使專知開元五年宰臣宋璟蘇頲奏所稱悲田乃關釋教此是僧尼職掌不合定使專知請令京兆按此分付其家元宗不許至二十二年十月斷京城乞兒悉令病坊收管官以本錢收利以給之今緣諸道僧尼盡已還俗悲田坊無人主管必恐病貧無告轉致困窮臣等商量緣悲田出於釋教並望更為養病坊其兩京及諸州合於子録事耆年中揀一人有名行謹信為鄉閭所稱者專令勾當其兩京望給寺田十頃大州鎮望給田七頃其他諸州望委觀察使量貧病多少給田五頃三二頃以充粥飯如州鎮有羡餘官錢量與置本收利最為穩便若可如此方圓不在更望給田之限各委長吏處置訖聞奏右臣等雖不習兵鈐昧於邊事然酌其物理情實可知伏希聖慈特賜詳覽比者陛下常慮回鶻國中離散未是實情今據我阿尼伊難珠合等書云此間更無活處即是實耗又回鶻安孝順云赤心宰相問漢國中看你回鶻好無足知依倚大國意甚勤懇今若許田牟徇黨項貪利之心不自量力犯必死之虜絶歸款之誠事捷亦損耗甲兵大虧恩信不成則永為邊患取笑四夷况窮鳥入懷尚須矜憫遠人慕義曾未犯邊自六月至今未嘗捉烽戍一人奪黨項一物披誠款塞望闕哀鳴昨者所獻表章詞懇意順棄而不納先務誅夷此不可一也若回鶻國中無釁種落皆安嗢沒斯叛逆而來即須拒絶可汗既自失國牙帳已無攜挈傷殘寄命他所嗢沒斯等迫於飢困各欲求生田牟執稱背國亡命是去年為惡徒黨都似與德彞雪屈為黨項報讐察其用情殊非體國此不可二也漢宣帝五鳳中胸奴大亂議者多曰胸奴為害日久可因其壞亂舉兵滅之蕭望之對曰宜遣使弔問救其災患四夷聞之咸貴中國之仁義其後南單于果是臣服六十年邊境無事今縱不能扶其微弱豈宜因此幸災此不可三也伏望具詔太原振武排比騎兵於邊上嚴防侵軼待犯國家城鎮然後以武力驅除若只於黨項退渾小有劫奪任部落自相仇報亦未可助以甲兵常令大信不渝懷柔得所彼雖戎狄必合感恩待張賈使回足知情實仍望詔田牟不得擅出詭計妄邀奇功兼詔仲武不得納將吏惑詞為國生事如蒙允許伏望付翰林酌此意處分一據太原奏事官孫儔稱昨來回鶻到橫水柵殺戮軍人百姓今抽在釋迦泊東約西去可汗三百里未知此回鶻是郍頡特下為復是可汗遣來今且須以此回鶻為罪人云不受可汗指揮擅自劫掠邊界請密詔劉沔與仲武計會先經略此賊如可以討逐事亦有名摧此一支可汗必自知懼一比聞公主與可汗常別居帳幕每見漢使亦是別見望密詔劉沔與忠順守志每有使去即令將密意看方便説諭公主知親廟子孫只合死生為國常須作計自拔歸投國家不合與可汗同行擾亂邊界如萬一迎得公主亦不得便令赴闕須且留在邊上制置回鶻縱力不能及只要假公主名號制服蕃人一又慮回鶻於山林安置老弱家口將精兵逼近城柵攪擾百姓如有此事即須堅壁清野不得與戰其小城堡兵力薄少不堪固守處並望抽入大城回鶻縱得小城亦無用處即別選驍將潛出兵掠其家口輜重此最是制勝之術右謹件如前望各賜密詔潛令以此為意伏準建中元年正月五日敕常參官上後三日舉一人自代者昔東漢以陳蕃為三公其上表曰不夭夭心不忘率由舊章臣不如太常胡廣臣伏見前件官五朝舊老一代名臣孔門四科實居其首臯陶九德無不備包足以燮和陰陽允叶人望當唐虞讓德之舉副陛下則哲之知伏望察臣至誠實非飾請所冀虞邱無蔽賢之咎臧文免竊位之譏謹録奏聞伏候敕旨臣伏見今月二十二日制書制授臣司徒仍令所司擇日備禮册命者臣竊位妨賢允宜黜免聖慈宥擢授中台局蹐慙惶若臨泉谷伏以明庭授册上路乘軒豈可以靦冒之容再塵清廟不稱之服重列天衢為衆目之所嗤致處士之橫議臣且自愧况在周行又以伐叛之時所宜務簡炎蒸之候不可勞人伏見太和四年裴度受司徒平章事固辭册禮竟獲允從既有近例足得循守伏望陛下察臣懇款皆自至誠册命之禮特賜停罷臣不任哀懇屏營之至臣今日蒙恩進封趙國公承命哀惶不任感涕臣亡父先臣憲宗寵封趙國先臣與嫡子嫡孫中小名三趙意在傳嫡嗣不及支庶臣前年恩例進封合是趙郡臣以中之故改就中山臣亡祖先臣曾居衛州汲縣竟以汲縣解進士及第倘蒙聖恩改封衛國遂臣私誠庶代受殊榮免違先志如蒙允許望賜帖麻施行臣不任悲懇屏營之至謹奉狀奏聞臣某言伏以謫見天文以警在位稽於前史皆有明徵臣某中謝臣才非時須量乖公器因緣門蔭遂忝華資出入藩宣已逾三紀早負素餐之責常愧周行老無黃髮之謀空竊高位夙夜思省冰炭在心近伏見熒惑順行稍逼上相實懼天譴以致身災武德七年熒惑犯左執法右僕射蕭瑀遜位貞觀十五年熒惑犯上相左僕射高士廉遜位國史之內此例至多臣人微才輕位忝上相倘冒恩寵猶自懷安忽至顛隮必傷元化雖竭誠報國心不愧於神明盡禮事君志實貫於冰雪所慮物忌其滿天與之災局蹐兢惶不知所據伏望聖慈察臣單緒海內孤根百口童蒙仰臣覆露一門宗祀須臣主持特免上公退歸私第所冀中衢擊壤復比於堯君舊里懸車不慚於漢相臣不任祈恩皇迫之至右今月日仲武判官華封輿到臣宅送前件書並信物等已聞奏訖臣素具懇誠實非飾讓臣登朝序垂三十年未曾為宰相撰碑所悉蓋緣雕蟲薄技已忝榮名不願鬻文更受財貨比見文士或已居重位或已是暮年矻矻為文只望酬報臣心鄙恥所不樂聞太和中幽州刺史李載文撰碑斂取太過軍亂之際怨詞頗甚况今陛下聖明御宇風教鼎新文德邁於羲軒武功高於周漢河朔節將皆竭忠誠尤宜示以典章令知法度臣忝居台鉉過受殊恩若不守廉隅坐受厚賂何以仰裨元化表率庶僚倘以仲武之情不可全阻許臣量受一千匹已是乖臣本心伏希聖慈鑒臣丹懇仲武書謹封進上右高品孟公度至奉宣聖旨緣河朔體大令臣即受者伏以浩蕩之功生靈共載擊壤之內謳歌必歸昨者藩臣拜章願紀貞石臣謬當臣願獲聖功才力至微神武難備莫能相質空愧雕蟲豈敢廣受縑素增其蕪鄙虧於事體乖臣本心昨日進狀懇辭誠非飾讓實以文至淺陋已慚黃絹之工取又不廉益昧素絲之節愚衷上啓宸鑒未回特降王人重宣聖旨捧戴慚懼進退倣徨臣事君之心實無所隱終希允臣誠懇獲守典章使廉儉興行皇風遐暢謹再狀以聞伏以漢宣帝時呼韓單于來朝京邑然待以客禮未備漢儀至後漢建武二十六年單于慕先人之義歸心中國光武修祖宗之業柔服北邊因其稱藩始加冠帶厥後綿歷五代僅及千年惟聞征伐之勤莫覩來廷之盛伏惟陛下功高漢后威服窮荒不勞六月之師坐俟七旬之格故得嗢沒斯誓心向闕稽首歸忠自獻刑馬之書仍酌留犁之酒永勵臣節以保塞垣今則榮以彯纓解其衣毳簪笏就列威儀可觀推徑悍之心豈勞戴鶡服禮義之化寧比冠雞鑒于丹青益表神化臣等謬參樞近獲覩成功歡忭之心倍萬常品高品楊文端至奉宣聖旨賜臣前件圖等伏以桑梓雖存久隔兵戈之地松楸浸遠已絶霜露之思運屬承明時逢開泰戎臣效順寰海大同故國山河因丹青而盡見祖宗基構尋碑版而可知祗戴天慈載深感泣不任荷恩榮惕之至奉宣卿所進異域歸忠傳兩卷宜寫賜嗢沒斯序中仍云奉敕撰者臣才識淺近學藝空虛輕黷宸嚴方懷兢惕豈望聖慈宏貸特假寵光頒賜歸國之功仍榮奉敕之字草木承雨露之澤皆被鮮輝煙霞照日月之光盡成綵繢顧臣璅陋獲奉殊恩竹帛垂榮傳于不朽不任荷恩感戴之至今既奉敕撰序與臣自進不同序中已改兩處訖謹同封進上如允聖意伏望宣付中書門下今日款義行深至奉宣聖旨卿所進圖傳深愜於懷者伏以陛下大化神明百蠻震疊故遠夷慕義萬里來朝誠宜圖以丹青録於編傳之千古以燀威靈臣學術空虛文藝淺薄輒為傳序莫究聖功陛下遽納微誠特賜宣示寵渥所及搢紳為榮不任荷恩感戴之至伏以遠夷率服大國綏懷一失良圖千古不復悉怛謀仰天歸命空壁求降據其款誠已絶羌戎之望執之為戮實傷義士之心受降之時臣與其盟詛力不能救心實懷慚運屬聖明合申幽枉輒敢論奏豈望聽從陛下用周文之心已同葬骨念汧城之枉仍賜策書臣忝補鈞衡嘗居戎帥仰感元造倍百㣥情臣不任荷恩感戴之至高品劉傳奉宣聖旨賜臣批示以臣所請宣示史館特賜允從者伏以橘性不遷楚詞所載聖情封植禁蘌結根此六合同風九州共貫之應也元宗朝種柑結實亦是乘太平之休氣道德之仁風事協祖宗實光册臣目覩佳瑞慙無潤色之工心感元猷莫盡揄揚之美豈謂天慈曲被特允微衷擊壤庸音獲知于皇鑒雕蟲薄技謬列于青編千古光榮百生何幸不任感恩踴躍之至謹奉狀陳謝以聞高品馮至珣至奉宣聖旨并賜臣批答以臣昨所陳請未賜允從者蜉蝣淺命未報君恩犬馬微誠敢忘臣節迫以服藥瞑眩抱疾沉羸心力衰殘形氣減耗承訏俞之命或慮闕遺奉密勿之機實憂不逮輒陳誠款冀或聽從陛下特降綸言再加褒飾德音撫慰自合忘生睿獎至深豈敢言病謹當策勵疲蹇上副天慈竭盡肺肝以修官業不任荷恩感戴之至行深紹宗奉宣聖旨豈政理有失風俗有乖何遽退辭一二年分憂不用進表者伏以自古臣得其君最為難遇非龍顏英主良平無以效其謀非日角聖姿寇鄧莫能申其志則知致理不由于臣力成功皆系于上心伏以陛下明過高光德侔天地常制勝于千里之外動合機先不取材于三傑之臣皆躋慮表故能征伐必克擒縱無遺臣謬忝鈞衡親稟宸算竟微獲兔之效內展指蹤又無汗馬之勞外施武力每奉聖詔屢獎丹誠夙夜自思冰炭交集况今四表無事六氣斯和簫勺可致于治平文軌盡同于元化時雨既降浸灌何施鴻明照臨爝火宜息昨者輒陳誠懇上黷宸嚴所冀守介石之誠或能回日寧敢慕揮金之樂取適當年陛下至德矜愚深慈宥過其罪戾重降恩私唯願盡螻蟻之生勉自陳力豈復顧蜉蝣之命更徇微衷上戴皇明尤增靦懼臣不任荷恩感激之至今日行深紹宗奉宣聖旨卿太尉官自朕意與不是他門僥求而得不要更引故事辭讓者臣跪受聖旨惶灼無地臣昨者以位高疾仆器滿忌傾實懷瞰室之憂敢喜在閭之賀輒陳微懇退積慙惶陛下察臣孤立事君寵拔皆由於睿鑒一心守道進取不近於回邪勉以至公絶其辭讓臣敢不祗奉明詔克勵貞規慕孔父益恭之誠遵叔敖愈卑之志豈比罪無所禱孫賈黜于聖人久不自安崔烈詢于厥子仰思宸眷倍積光榮不任荷恩感激之至謹奉狀陳謝以聞奉今月二十七日敕臣封衛國公者仰戴天慈獲遂私懇以感以泣榮惕載深伏以支庶嗣侯雖存故事元成以兄有譴乃紹扶陽之封耿霸以父屬愛遂繼牟平之爵開元中蘇頲特封許國公亦無襲字然地居嫡長受則無嫌伏思亡父先臣開國全趙亡兄已經繼襲未得傳孫臣每念貽謀豈宜不正若苟安殊寵實愧幽明輒罄愚衷果蒙聽察况衛國疆畛密邇叢臺先祖之所成名由茲光大微孫得以啓土實謂至榮祗奉寵章益慚非據不任荷恩感戴之至伏奉今月十二日制書授臣散官特進者伏以漢氏之制勛望優隆則位加特進服以文冕列侍清祠榮亞三台品居第二自非學深張禹功重竇融則何以膺是寵章允茲瞻望臣器本凡薄才在下中遭逢聖明謬忝樞務近者展采清廟祗事圓丘獲親日月之光已驚殊寵又沐雲霄之澤更荷新恩雖臣隕身豈能上報惟冀飲冰效節介石存誠居若對于神明動罔夭夭心于風雨保其一志少答鴻私不任荷恩惕懼之至今日奉宣縱纍陳情終不允遂者臣荏苒六年徒竭丹款竟無一善稍補皇猷靦冒難居屢祈退免面請則每慮煩瀆口陳則莫盡肺肝頻以懇誠託於同列因臣不對得為上聞豈意天慈矜愚聖德念舊尚取涓塵之效未徵尸素之尤纍降近臣再宣慈旨實恐罄蜉蝣之命無以報天所冀盡犬馬之心惟知戀主仰戴皇澤倍切微衷不任荷恩兢惕之至中使田獻鍔至奉宣聖旨賜臣前件錦綵銀器等臣伏聞虞舜舞干而苗人來格周穆徂征而荒服不至即知王者之功莫大于耀德戢兵安人柔遠伏以陛下聖德廣運神武照臨息雷霆之威而蠻夷自服宏天地之德而邊鄙乂安臣願以鴻猷播於蕃帥因綴古今之事庶堅忠義之心豈意慈容厚加寵錫班行聳聽里閈生光非止闔門之榮實增後代之價仰慚恩覆倍積兢惶臣不任欣忭感戴之至高品劉行宣至奉宣聖旨以臣撰真容讚特賜前件錦綵銀器等臣學非稽古文不逮人徒以運遇聖明職叨宰弼宸心向屬榮寵荐加得以淺陋之詞上述鴻明之德敘帝堯之奇表非可強名讚軒后之英威空慚竭思豈謂皇慈曲被厚錫俄霑錦綵窮華麗之文器物呈雕鏤之妙跪受榮感報效無階臣不任欣荷感恩之至高品駱遂泰至奉宣聖旨者臣承命兢皇不知所處臣緣抱疾歲久服藥過多形體虛羸筋力不逮實恐妨廢機務轉積愆尤所以輒獻懇誠願辭繁劇每于延英奏事陛下常假慈顏心肺肝懷無所不盡更無他故須有上陳只以衰羸自憂顛仆况臣四海之內孤獨一身唯將赤誠仰戴明主豈敢輒懷願望上負天慈伏望更許兩日將息即冀朝謁臣不任云云高品王克諫至奉宣聖旨卿小有違裕昨日于延英面奏乞假將息實疚余懷宜善頤養當就痊平所要內庫食物及藥物無致嫌疑但具數奏來即令宣賜者臣緣常服冷藥十五餘年屬蒲柳年侵衰憊日甚風毒腳氣往往上衝頃刻之間心腹悶痛飯食至少筋力漸羸所以冒昧上陳請三數日在家將息陛下恩深覆育軫父母唯疾之憂德過生成念犬馬至微之命恤問稠疊沉痼頓痊臣食物未得更無所闕天慈下降感極涕零不任感恩兢惕之至右自回鶻近邊人情疑恐聖化所感威德克宣果得嗢沒斯望闕歸心率徒效命必在優賞昭示四方使戎狄遠聞皆感恩信望速降中使宣慰嗢沒斯特勒及王子等並多攬將軍共七人望各內賜錦綵銀器其嗢沒斯下兵馬望賜米五十石度支給絹三千匹以戶部物充度支速差正綱般送仍許不分散部落待委知事情續議制右嗢沒斯下將士既與衣糧又加冠帶賜其軍號實壯邊聲撫循其人莫切於此臣等商量望賜號歸義軍仍望翰林賜敕書宣示嗢沒斯下歸義軍將士等其嗢沒斯望且令兼充歸義軍使如蒙允許便添入加工部尚書制宣行仍與中書門下敕牒右臣等見今日天德軍奏事官王可度云每有回鶻投降及城來捉得十人五人緣不敢留在軍城問得事情後便皆處置伏以回鶻窮困情亦可憐屢有殺傷恐傷仁化望付翰林賜田牟仲武詔前後更有此類便遞送太原令配在諸州安置稍為允愜未審可否
