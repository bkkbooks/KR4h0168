front:
  text: 全唐文欽定全唐文卷九十三帝諱柷昭宗第九子景福元年生乾寧四年封輝王名祚天復三年二月拜開府儀同三司充諸道兵馬元帥天祐元年八月朱全忠矯昭宗遺詔立為皇太子改今名尋即位四年三月禪位於梁梁奉帝為濟陰王遷於曹州開平二年二月遇害在位四年年十七諡曰哀後唐明宗追諡曰昭宣光烈孝皇帝
  hash: sha256:03e4f168d09bbdd0e8e6cbdd0b6605559bf4e5eeb1f9fc8f8c16bc25b0a4cdad
  markers:
  - {type: head, offset: 12, content: 哀帝, id: KR4h0168_NFKB_093-h1, level: 1}
body:
  text: 門下持鈞軸以燮陰陽是資至德掌地征而富邦國必仗通才難虛作礪之求式叶為霖之望金紫光祿大夫守尚書吏部侍郎上柱國宏農縣開國伯食邑七百戶楊涉代襲軒裳業通墳典踐履華胄周旋大寮陳太邱雅尚清貧葛稚川不貪榮祿綽有休問喧在羣言往典貢闈則文行兼採近司銓管則清濁咸分至必可稱動皆垂範朕嗣守丕祚虔思小康是用授以鈞衡委之征賦爾其克申蘊蓄用副旁求使干戈速偃於四郊玉帛繼歸於內帑仍司仙殿更重化源勉輔沖人臻於理道可尚書吏部侍郎同中書門下平章事充集賢殿大學士判戶部事散官勳封並如故門下入則秉鈞衡而凝庶政出則正冠冕以長百寮式資夙舊之臣咸謂重難之地銀青光祿大夫守尚書右僕射兼門下侍郎同中書門下平章事充太清宮使宏文館大學士延資庫使諸道鹽鐵轉運等使上柱國河東郡開國侯食邑一千戶裴樞周事四朝慎守三紀再持國柄屢竭訏謨光祿大夫門下侍郎兼兵部尚書同中書門下平章事監修國史上柱國博陵郡開國公食邑二千戶崔遠語默有程得喪無擾中樞洊履盡瘁克彰俱宣夙夜之勤備罄匡扶之業是用均其勞逸顯爾便蕃燮調暫輟於劇權師長並資於碩望無虧懿效式使當仁或增疏爵之榮更表優賢之禮樞可光祿大夫守尚書左僕射仍進封開國公加食邑一千戶勳如故遠可守尚書右僕射散官勳封並如故朕以涼德獲嗣丕圖將宏至公以凝庶績憲章不濫賞罰惟宜俾恢理政之風用正紀綱之典其有常居宰輔但協姦邪苟玉石之未分則稂莠而將茂須行黜責用致澄清吏部尚書陸扆早以文儒亟揚華顯自先皇帝議征嵕隴而扆確有救論果犯雷霆旋經遷貶其後託茂貞之勢援憑閹監之梯媒尋復舊官再升重位惟知周比寧務燮和邇來多難罔不由此工部尚書王溥亦茂貞奧主崔允門人驟歷禁闈俄塵衮職但恣詭隨之志曾無匪懈之稱崔允既置嚴誅而溥獨居清列況朕恭承大寶思拯彞倫非為洗垢求瑕但冀懲惡勸善兼宜斥於外掾不可容在中臺尚謂寬恩勉當省過扆可濮州司戶參軍溥可淄州司戶參軍明罰飭法固有彞章懲惡除邪用攄衆怒責授官登州刺史柳璨素矜憸巧每務回邪幸以庸才驟持重柄曾無微效顯負明恩詭譎多端包藏莫測但結連於凶險獨傾陷於賢良罪既貫盈理宜竄殛尚處一麾之獨任虧三尺之常刑將塞羣言須行重典自貽顛覆無或怨尤可貶密州司戶參軍朕以痛深創巨園陵有期冀當復土之辰以慰終天之報而公卿大臣敷陳典故援引今古以為一日萬幾不可斯須而曠既執禮而愈切難順情而有違深抑荼蓼之哀懷俯徇股肱之讜議議爰因晨省巳啓慈顏倍極哀摧勉從來請朕以宰臣巳下常拘官局罕獲歡娛今膏澤不愆豐年有望將臻上瑞宜示優恩及此芳辰當茲麗景稍令暇逸俾務遊從宜令自今月十二日至十六日各令逐便選勝遊宴朕以宿麥未登時陽久亢慮闕粢盛之備軫豫宵旰之憂所宜避正位於宸居減珍羞於常膳諒惟眇質深合罪躬庶期昭感之祥以致滂沱之澤今月八日巳後不坐正殿及減常膳元元皇帝肇基聖緒敷佑神孫璿派靈長共乾坤而莫極瑤圖堅固與日月而無窮是以我朝追崇奕葉昭祀禮因尊祖爰陳恭敬之文事惟求真且異虛無之旨比者當如九廟別置一宮東遷以來欲修奉而未暇北觀之內遂薦享以從宜每備粢盛靡稽古實祝史正辭而追遠雖屬猶龍宰臣肅拜於當陽如求罔象徒陳玉斚莫對瓊彞璨練達舊章振舉重職爰思改作頗謂協宜庶不愆而不忘致來顧而來享又尋元圃如得瀨鄉古殿閟清喬木陰翳可以仰規紫府便號清宮捨短從長斯為智士尋源正始實賴賢臣合議允俞殊可嘉獎設官分職各有司存銓衡既任於吏曹除授寧煩於宰執但所司注擬申到中書過驗酌量苟或差舛難可盡定近年除授其徒實繁占選部之闕員擇切當之優便遂使三銓注擬之閒皆曠職務且以宰臣所任提舉百辟唯務公平將致無私克臻有道應天下州府令録並委吏部三銓注擬中書門下自天祐二年四月十九日後並不除授或有諸道薦奏量留據狀詳度可否施行庶幾各司其局免致繁隳宰相提綱永存事體東上西上二閣門制置各別至於常事則以東上居先或大忌進名遂用西閣為便同於禮式何表區分頃緣閹豎擅權乃以陰陽取位不思南面但啓西門邇來相承未議更改詳其稱謂似爽規儀自五月一日巳後常朝取東上閣門或遇忌日奉慰即開西上閣門永為定制法駕遷都之日雒京再建之初慮懷土有類於新豐惟更門以合於舊制今則妖星既出於雍分高閎難倣於秦餘宜復別門之名以壯卜年之永是用分疆畫界實顯驗於否臧東雒西京靡互參於制度其京都見在門同西京門名者並宜改復雒京舊門名多稼如雲巳稱大稔異畝同穎益表殊祥張全義尹正邦畿從容廊廟動必垂於惠化靜每著於燮調佐時之略彌彰阜俗之風益顯爰昭元貺可卜豐年訓農遐掩於衛文獻瑞迥同於唐叔載觀禎異尤切歎嘉仍付史館所有百官俸料實繫國用盈虛昨自去冬領給全俸及支遣之後公帑不充蓋道途初通綱運未集徒挂憂勤之念尚牽經費之資若不議均分則必至懸絶量其物用須有指揮其百官逐月料錢宜令左藏庫自今年正月支半俸比者吏部注官只憑格式送闕近以諸州不申闕解且從權指揮選人指射之時既不詳審銓司注唱之際遂使交加頗屬弊訛頻起論訟所司釐革合議允從朝廷命官量能授職中書奏擬旋巳施行掄才既備於班員立政兼伸於沈滯況遷都之後制度聿興新授官者翔於外藩不議赴闕前資任者蟄於列屏自謂安時矧爾代受國恩身榮朝請養高保性既不能解印挂冠論級嗜名又不能擘肌分理況新羅渤海外國遠戎奔程巳至於新都入貢不虧於舊典復於朝士有愧夷人既除官者尚不歸班則前任者良難戀主宜令諸道節度觀察防禦刺史等如部內有新除朝官前資朝官敕到後三日內發遣赴闕仍差人監送所在州縣不得停住苟或稽違必議貶黜付所司應合赴吏部常調選人等三銓公事素有條流近年多不公平遂致授任重謺既聞爭競須暫停留今者元帥梁王動靜推公周旋陳理或慮選人羈旅特請準式施行兼緣巳及深冬所司未有起請若或稽滯必緩程期功在考詳務令精當今年冬常調選人宜委三銓並準舊例處分如或踰濫輒違格文罪在官曹非止猾吏其四鎮管內官員須候本道申闕到省方可注擬遜嘗為張濬租庸判官又王溥監修日奏充判官授工部侍郎又與趙崇裴贄為刎頸之交昨裴樞等得罪之時合當連坐尚矜暮齒且俾懸車可本官致仕司勳員外郎李延古世荷國恩兩葉相位幸從筮仕纍忝寵榮多歷歲時不趨班列而自遷都卜洛紀律載張去明庭而非遙處別墅而無懼罔思報效姑務便安為臣之節如斯貽厥之謀何在須加懲責以肅朝倫九寺勾稽尚謂寬典可責授衛尉寺主簿上天眷祐靈兔效珍道既協於坤慈祥乃彰於月窟雪霜是比皎皛可觀全忠道貫神明功高鼎鼐果因嘉瑞歸善天庭俾頒示於有司冀流光於不朽再三嘉玩歎注良深百寮入朝兩廊賜食遷都之後所司闕供元帥梁王欲整大綱復行故事罔思勞費悉自再圖是使端在廷咸思感悅峩冠就列益任優隆備覩寵規彌增欽歎宜賜詔獎飭仍付所司祕是故崖州司戶參軍孫乘親弟其兄既處極典其弟難貸餘生宜除名配流愛州充長流百姓仍委御史臺差人所在賜自盡宰臣文武百辟藩嶽庶尹明聽朕言夫大寶之尊神器之重儻非德充宇宙功濟黔黎著重華納麓之功彰文命導川之績允熙帝載克代天工則何以統御萬邦照臨八極元帥梁王龍顏瑞質玉理奇文以英謀睿武定寰瀛以厚澤深仁撫華夏神功至德絶後光前緹油罕紀其鴻勳謳誦顯歸於至化二十年之功業億兆衆之推崇邇無異言遠無異望朕惟王聖德光被八紘宜順元穹膺茲寶命況天文符瑞雜沓宣明虞夏昌期顯於圖籙萬幾不可以久曠天命不可以久違神祇叶心歸於有德朕敬以天下傳禪聖君退居舊藩以備三恪今敕宰臣張文蔚楊涉等率文武百僚備法駕奉迎梁朝勉勵肅恭尊戴明主沖人釋茲重負永為虞賓獲奉新朝慶泰兼極中外列辟宜體朕懷朕奉太后慈旨以兩司綱運未來百官事力多闕旦夕霜冷深軫所懷令於內庫方圓銀二千一百七十二兩充見任文武常參官救接委御史臺依品秩分俵三月二十三日嘉會節伏以大行皇帝仙駕上升靈山將卜神既遊於天際節宜輟於人閒準故事嘉會節宜停楚三閭大夫屈原正直事君文章飾己當椒蘭之是佞俾蕙草洍之不香顯比干之赤心躡彭咸於緑水雖楚烟荊雨隨強魄於故鄉而福善禍淫播明靈於巨屏名早流於竹素功有益於州閭爰表厥封用旌良美宜封為昭靈侯彥威等主典禁兵妄為扇動既有彰於物論兼亦繫於軍情謫掾遐方安能塞責宜配充本州長流百姓仍令所在賜自盡據太常禮院奏於十二月內擇日冊太后者朕近奉慈旨以山陵未畢哀感方纏凡百有司且虔充奉吉凶之禮難以並施太后冊禮宜俟山陵畢日庶得橋山攀慕彰盡節於羣臣蘭殿承榮展盛儀於朕志情既獲遂禮實宜之付所司朕祗荷丕圖仰惟先訓方追號弓之痛俯臨同軌之期將展孝思宜親營護皇太后義深鳴鳳情極攀龍亦欲專奉靈輿躬及園陵寢廟冀盡追摧之道用終哀敬之儀其大行皇帝發引日朕當從皇太后親至陵所宜令中書門下準此指揮
