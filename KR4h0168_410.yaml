front:
  text: 全唐文欽定全唐文卷四百十衮京兆人天寶末舉進士累授起居郎寶應中選為翰林學士考功員外郎中知制誥永泰初遷中書舍人加集賢院學士大歷元年遷禮部侍郎拜門下侍郎同平章事封河南郡公貶潮州刺史建中初遷福建觀察使四年卒年五十五贈左僕射
  hash: sha256:9ab61ffde7028401fc4bdd5a279770676aac2441ba7350eef8fb3f505724a363
