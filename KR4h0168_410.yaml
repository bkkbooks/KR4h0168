body:
  text: 上方究心政理惕慮遊畋順時而行仁育之恩克洽酌古取則春蒐之義攸先所以示軍容於有眾發號令於初年時維仲春景則清晝列武卒於天仗選龍媒於御廏野有鳴鹿爾則食君之苹巷無居人我亦從王於狩其儀可覿其理可究春者蠢也象其動以宣威蒐者求焉薄於求而在宥固將明其校閱非取樂於馳驟想熊羆之士必在於求賢驅貔豹之師寧惟於逐獸夫其將陳於野先訓於國執鐃備卒伍戰陣之教執鐲盡進退疾徐之則六軍之節制可觀三畋之禮文斯得而原其初也勅司馬致高旗行火弊薙畬菑彎良弓而發彼破修眥以斃之擇可取而克成舊事捨將孕而用表深慈雖四海久清禮且崇於國典三冬尚隙役無奪於農時然後算其獲否以行賞勸皆賈藝以求功必極忠而上獻若然者豈徒倒逸材之獸落翰飛之禽大發以彰其武力小殺以宜其道心事且載於周禮跡寧誡於虞箴夫如是子雲無以諷其羽獵相如未足言其上林於是天旋景從飊軼電雜皮冠且進虞人之守斯存綵仗前驅天子之圍方合有司乃申誓人之詞具表貉之禮獻禽以報其生植充豆以遵其孝悌君子謂是蒐焉足觀國家之大體居洪泉而不根植者惟浮萍而已矣不懷芳以賈害不衒以標美動不忤物卑以安已乘流則遊得坻則止如識變而知時似委命而順理故能無幽不涉無遠不尋隨長汀而自汎值驚浪而不沈既不遷其清濁亦何避乎淺深可以明逍遙之意可以警滯著之心然而推移河海凌歷隈澳溜緩而去遲水急而浮速秋遇楓浦與墜葉以齊奔春暖桃源共落花而相逐披拂丹藻搖演青蘋出入經其潭洞高下歸其奫淪擇利而行有似見機之士不常厥所同乎漂梗之人歌曰大江之水東西流別有孤萍朝夕浮莫言此中長汎汎終當結實觸王舟勅有天下者祭百神蓋存乎統法也山川出雲而致風雨列在明祀其來久矣春秋傳曰水旱癘疫之不時於是乎禜之致其誠信與其忠敬精意以享則神明保佑命之不疾而速古之岳瀆秩視公侯以其所生者繁所濟也廣鎮厚地而不動朝滄海而不洩如是正直長發其祥百王相承五等不易先朝禮神以明德恭事以嚴禋進其位號崇其典策用三代之樂金石必備合九州之味籩豆有加俾國之大臣每歲頒祀則執事而有恪亦莫不寧也朕纂戎八載外寇未平多廢舊章尚勞戎備巡狩之事有曠於虞書封禪之儀尚慙於漢史雖命方伯牧長以時致祭而事之不親誠有不達所以分遣八使禱於㣥望各供於事以服官常宜令某官等分祭名山大川仍勅有司備具禮物敬陳明薦無失正辭勅天文著象職在於疇人讖緯不經蠧深於疑眾蓋有國之禁非私家所藏雖裨竈明徵子產尚推之人事王彤必驗景畧猶寘於刑典况動涉訛謬率皆矯誣者乎故聖人以經籍之義資理化之本仄言曲學實紊大猷去左道之亂政俾彞倫而攸敘自四方多故一紀於茲或有妄庸輒陳休咎假造符命私習星歷共肆窮鄉之辯相傳委巷之談飾詐多端順非而澤熒惑州縣詿誤閭閻懷挾邪妄莫逾於此其元象器物天文圖書讖書七曜歷太一雷公式等準法官人百姓等私家並不合輒有自今以後宜令天下諸州府切加禁斷各委本道觀察節度等使與刺史縣令嚴加捉搦仍令分明牓示鄉村要路并勒鄰伍遞相為保如先有藏蓄者限勅到十日內齎送官司委本州刺史等對眾焚毀如限外隱藏有人糾告者其藏隱人先決杖一百仍禁身聞奏其糾告人先有官及無官者每告得一人超資授正員官其不願任官者給賞錢五百貫文仍取當處官錢三日內分付訖具狀聞奏告得兩人以上累酬官賞其州府長史縣令本判官等不得捉搦委本道使具名彈奏當重科貶兩京委御史臺切加訪察聞奏準前處分咨爾方面勳臣洎十連庶尹罔不誠亮王室簡於朕心無近憸人慎乃有位端本靜末其誡之哉勅左道疑眾王制無捨妖言蠧時國朝尢禁且緇黃之教本以少思寡欲也陰陽者流所以敬授人時也而有學非而辨性挾於邪輒窺天道之遠妄驗國家之事仍又託於卜筮假說災祥豈直閭閻之內恣其誑惑兼亦衣冠之家多有厭勝將恐寖成其俗以生禍亂之萌明艱已來禁網疎濶至令此輩尚有矯誣害政之深莫過於此將歸正道必絕姦源宜令所司舉舊條處分勅釋教本以助化道家先於理國懲惡勸善以齊死生薰然慈仁美利天下所庇者大所益者深故歷代崇尚而弗易也朕以元元烈祖慶我昌運西方聖人福茲下土常所盡敬敢忘致誠且至真之體尚於精潔流俗所尊不宜褻慢如聞天下寺觀多被軍士及官吏諸客居止狎而黷之曾不畏忌緇黃屏竄堂居毀撤寢處於眾設之門庖廚於廊廡之下緬然遐想慨歎良深自今已後切宜禁斷其軍士委州縣長吏與本將商量移於穩便處安置其官吏諸客等頻有處分自合遵承仰勅到當時發遣應尊像有損壞處俾隨事修補其有諸神所居載在祀典靈跡昭著福及生人者如有毀廢亦宜增葺且王者以清淨統法聖人以神道設教精意所在感而遂通非徼福於朕躬期降祥於黎庶申明詔旨用悉勞懷勅軍興以來十有四載未息戎備尚勞師徒各以名數隸於麾管朕念三軍之勤役率萬姓以供饋躬自節儉而贍濟之定尺籍伍符厚其資糧屝屨掖庭織室俾給戎衣鈎盾弄田亦調軍食推誠惠養靡不至焉雖感激忠義勇於赴難而差次官賞固不遺勞誠宜戮力以永所事如聞諸節度及團練使下官健多有逃入諸軍去其所從犯我明禁在於國令固合懲姦眷其戎勳尚容改過自今已後切宜禁止應有此諸軍不得輒容差人遞還各付所統其額內官健有逃死者不須更填宣示軍州令知朕意勅古者分建戎號以張威武必因事而制亦有時而戢以天下征伐之重方鎮之大宜有總一則以元老撫和之乃者國家平定之後闕一字理之始與其休息則以諸侯訓緝之自河南之南至於滄海往屬難故久勞師徒連城之鎮累百授鉞之將十數主其經畧委在台臣號令耳目以之咨稟服柔滅叛罔不肅清今萬里無塵思解戎備况分閫之重各任勳賢悉心憂國所統皆理何必更有闕屬適重其煩軍書取決又失要會息人罷鎮闕亦便之河南淮南西山南東等道副元帥宜停其兵馬宜充東都畱守兵馬張延賞宜權知東都畱守事常休明宜充副畱守兼東都鎮守兵馬使勅堯之敦敘以協萬邦周之宗盟必先同姓莫遠具邇懷德惟寧俾強捍於京師思同獎於王室所以洽中和之道明補察之義也惟我近屬聯華本支以文昭武穆之宗有錫土建侯之嗣往以艱難之際流寓頗多或僻在江山載經時序或雜居州里亦既淹畱等威不分無以自給儉將逼下卑或踰尊將恐合族展禮之文闕燕毛序齒之儀廢言念及此良深耿耿其三等已上親除州縣官及帶職掌應在外者委本道節度觀察量事給發遣赴上都仍先錄名聞奏勅詩有豳風陳王業也八月剝棗以助男功蠶月條桑俾修女事贍人之道必廣於滋殖分地之利非止於耕耘益之以織紝雜之以果實則寒有所備儉有所資如旨蓄之禦冬豈無衣以卒歲頃屬多難艱食必資樹藝以利於人庶俾播種之功用申牧養之化天下百姓宜勸課種桑棗仍每丁每年種桑三十樹其寄住寄莊官蔭官家每一頃地准一丁例仍委節度觀察州縣長吏躬親勉率不得擾人務令及時各使知勸一一勉諭訖具數奏聞勅間者戎旅未息徵求煩重四郊之賦乃至五稅其一居人蕩析邦廪空虛遂命宰臣大修農政天下郡國散諸屯田轉漕入關以資均濟兼詔中尉左右內史表屬州縣閑田分署農官俾其耕鑿南至於華瀕渭而東林麓州渚之間榛莽窊邪之處非吾人所占者悉舉籍勸分載芟載柞稼多農碩畝獲數鍾歲既少殷軍儲差贍郡縣之稅於是十而減七數從其舊殆復厥常今宿麥頗登秋苗益茂私田加闢公用漸充華州人戶土地非廣其屯田並宜給以貧下百姓自頃關中乏牛力封圻千里半是邱荒置屯田已來皆變良沃惠散其利以及困窮藏之於人孰與不足宣示郡縣宜悉朕懷門下侍從出入贊清禁之事管轄糾正錄中臺之書多用儒雅必求公亮正議大夫守尚書吏部侍郎集賢待制隴西縣開國子賜紫金魚袋李季卿碩量寬宏雄詞典麗道素可尚風猷自遠銀青光祿大夫前行尚書右丞兼御史大夫充河北宣慰使襄武縣開國公李涵文以禮樂主於忠信雅有學行通於理體並才望推重聲華茂著竭誠之效早見於艱虞從政之績備彰於事任簡廉無私純白不染守以直道行其至公載馳輶軒善喻中旨歷踐臺閣率由舊章拔選部之滯才畱左曹之駮議士林公族歸美攸多或久次懋官已深於滿歲或外除過禮且聞於踰月宜遷顧問之職俾膺總典之授季卿可守右散騎常侍餘如故涵可尚書右丞散官封如故主者施行門下散騎以贊導侍從承答顧問前代參用言語政事之臣俾其盡規忠益以穆朝化也今位望逾重選之更精銀青光祿大夫前京兆尹兼御史中丞博陵縣開國子崔昭經之以文敏紀之以憲則直而不肆剛而能容精識知微長材致遠不易於風雨之晦不爭於險易之途常所委遇多在雄劇理平之美居最一時任畿甸千里之重齊趙張三王之政事當其適義合於權檢肅姦豪撫懷孤老資奉軍國從容贍濟翼翼之化布於四方子欲左右有人訪求得失服茲舊列俾爾迴翔可守右散騎常侍散官封如故門下聯八貂之貴同二府之品望尊而事不親地近而職非密蓋賢達之所尚俾勞臣而處休命所以廣其員而盛其選也太子賓客兼光祿卿上柱國河南郡開國公能元皓以忠烈自將以勇謀用師夷險一心精剛百鍊不奪之節貫於風霜殊常之勳銘在鐘鼎累更任遇休有令聞出入龍樓已先調護之列優游騎省載昇顧問之地可行左散騎常侍餘如故勅切問之司實參朝議僉諧之命允屬時髦同朔方節度副使特進試殿中監察御史大夫充朔方先鋒司馬使上柱國太原郡開國公郭睎文武成器公忠亮節言多雅正理適經通詩禮之方服於庭訓韜鈐之畧禀自朝謀以少年之才雄有老成之持重俾張我武克定西疆業其勳以象賢大其門而出將兵嚴既解朝選攸歸舉以令聞允茲近侍可行左散騎常侍散官勳封如故門下獻納之重周爰是咨必擇通賢用光近對銀青光祿大夫光祿卿上柱國汝南郡開國公蔣渙德宏禮器學貫儒流孝友彰其令名文詞是其餘力合大雅之明哲達中庸之隱微清方有恒華皓益固直道而處風猷自高爰藉論思之才用膺侍從之事副予良選佇爾嘉言可右散騎常侍散官勳封如故門下中散大夫行尚書吏部郎中賀若察講求學術藻飾藝文顧言行以檢身酌智能以經務任參六典選重一時從容管劇每識通而理當達練起草亦體大而思精聲猷益茂公望維允分曹殿中職在論駮尚書奏議俾爾平之可給事中散官如故主者施行門下銀青光祿大夫御史中丞東都畱臺崔侁俊而能通和而有節朝議郎守太子左庶子賜紫金魚袋蕭直性資高朗識詣沖妙各以文儒致用貞亮處心持綱憲府必執其中贊事宮坊允歸於正彰聞望於公器振英華於士林顧茲掖垣素用髦彥文昌奏議多所論駮俾承並命式副良選侁可行給事中散官如故直可守給事中散官賜如故主者施行門下朝議郎檢校尚書吏部郎中兼御史中丞賜緋魚袋趙涓純白高朗儒林表儀炳文揚彩時謂清拔早以賢良茂異服我周行歷踐三台之列嘗參二陝之佐其於事典多所精詳頃毗荊舒尋罷戎務近侍方缺選才正難評南宮之上書次東廂之奏事夙夜思職爾無面從可守給事中散官賜如故門下通議大夫行尚書吏部郎中彭城郡開國公韋諤在人之德承家積厚先致美以施政終秉彞以存誠朝之清序多所階歷參我六典冠於諸曹學以辨疑文以決滯五年勤職時謂淹才宜守殿中以平臺議詔書未當實得封還官能守常事尠失中是有選用爾其揚之可行給事中散官封如故主者施行勅通議大夫檢校尚書兵部郎中兼侍御史上柱國宋晦忠潔簡惠和而不流理暢思精適於㣥務位以才達政以禮成往者理軍岐陽贊我戎事重艱貞之操義有可懷臺閣更拜久於清秩外掌邦賦任居其艱底慎均節以資經費事皆求當慮不及私積勞可書責實當進加以亮直行之有恒屬諫臣之高選參髦士之大用以匡不逮無伏嘉言可行諫議大夫散官勳如故勅書曰后德惟臣不德惟臣實賴左右前後有位之士匡其不及天子有諍臣職在司過若有犯無隱獻可替否則曠然丕變時惟休哉中散大夫前行尚書兵部郎中贊皇縣開國男李收敏而好學文以彰之清澹寡欲不以得喪干慮往屬時難保茲艱貞事君之節足以存勸歷踐郎署率由舊章而仗雅居正可參諷議無或尸官以罔聞當灼見以箴闕也可諫議大夫散官封如故勅朝散大夫檢校尚書司勳郎中郗昂沖和簡朴不飾其外有雄俊之才可變風雅有精深之學實究儒元加以忠敬兼之亮直率由茲道可謂正人夫化成天下在於文匡朕不逮主於諫敷暢綸音箴規朝闕所掌皆重爾其懋哉可守諫議大夫知制誥散官如故勅中大夫行尚書吏部郎中上柱國庾準檢校尚書兵部郎中充山南副元帥判官賜緋魚袋楊炎等詔令之重潤色攸難其文流則失正其詞質則不麗固宜酌風雅之變參漢魏之作發揮綸旨其在茲乎爾各以茂才碩學敏識純行俾其對掌可謂得人仍轉郎位式光朝選準可行尚書職方郎中知制誥散官勳如故炎可守尚書禮部郎中知制誥賜如故勅宣議郎試太常博士東都河南江淮南等道轉運使判官孔述睿左右史正用第一流其選殆精於尚書郎也今東觀諸儒皆約注記而修簡冊事之當否多取正焉以某聖人之允歷代儒首博通古訓述作可傳出入起居期於秉直可守起居舍人散官如故勅朝請郎前行萬年縣丞薛兼適兄弟致美士林推重詞清行潔政以幹稱在煩劇而有餘守貞方而不易文章侍從朝夕論思參我諍臣以箴朝闕可行左補闕散官如故誥獻再試文學考入第三等處士趙闡等或懿丈清拔四科之美或純孝彰著百行之先或以言精梗概闕八字屬觀風省俗頓網求賢幽滯靡遺精麤咸紀俾昇榮於中外庶有光於獎擢可右拾遺勅前渭南縣尉郎士元等有君子之行有詩人之風頃尉於畿亦克用乂匪躬之故無以易焉進思直言入告於內勿使流議壅於上聞懋乃所職其無遺政可依前件門下左右丞相師長庶官無人則闕詔德而授以其久次是有轉遷特進檢校尚書左僕射知省事兼揚州大都督長史御史大夫充淮南節度觀察處置等使上柱國崔圓山東偉才忠厚成性文高大雅學富全經直道而行匪躬之故謀參經始節貫嚴凝嘗決議於廟堂早書勳於王府外綏戎政久鎮名都苦心恤人精力勤職圖艱思易適要除煩敦風化而少長有禮齊法令而軍戎知禁正身不渝奉上彌恪有大賂南京之貢有浮泗達河之漕事多宏濟人不疲勞淮海晏然朕實毗倚寵章所以裦善大任所以寄賢俾升禮秩無替成命可檢校尚書左僕射餘並如故主者施行勅文昌所以法成象端右所以長庶寮秦漢則內掌武事魏晉或外綏戎政今之垣翰重任勤勞有功歷踐六卿始終一德必訪㣥議然後當盛選淮西節度觀察處置等使開府儀同三司檢校工部尚書兼安州蔡州刺史御史大夫上柱國西平郡王李忠臣忠厚純茂信而可親寬肅靜深通而必正備五才之用有百勝之全往者寇孽亂常關洛多故爰奮其旅以先啟行大城名都所麾必克元兇巨猾傳首相望定齊休士有建威之得雋破趙會食亦淮陰之用奇漢東汝南專制千里總三軍之號令兼八使之澄清約已撫人守公遵職訓師以禮載寧於戎閫庀賦從薄繼入於王府四封不聳一紀于茲况忠衞之勳邦家是賴陝郊巡幸憂國存誠能釋位以勤王亦見危而致命疾風逾勁何日忘之申伯于蕃目當裦勸韓侯入覲宜有寵光式是南宮俾崇禮秩可檢校尚書右僕射知省事餘並如故勅中臺萬事之會端右庶僚之式所以總詳參貳恢演協宣勳德兼崇則殊在師長之重勤勞於外則不親損益之煩凡命此官必書於冊極茲朝選用屬時賢滑亳等州節度使開府儀同三司檢校工部尚書持節滑州諸軍事兼滑州刺史御史大夫上柱國霍國公令狐彰腹心純臣忠允明亮有張仲孝友之行有吉甫文武之才秉其直方資以簡厚早擅韜畧尤工墨妙艱危致命出入勤王中興之勳㣥帥難尚雖驃騎之北至高闕淮陰之東下井陘積事度長抗衡異代自受任千里疆于兩河靖安軍戎肇正封域宏布風教宣明憲章優禮意於文吏洽仁化於甿俗息馬論道讓其保塞之勞愛人省刑守我中朝之典載修職貢以奉京師頃者復彼河流省其役費除歷年之所病匪踰月而成功開濟良謀東藩是賴不忘利國益見深衷予嘉乃休朝有明勸念齊侯之勞賜同申伯之封賞厚其禮秩允答奉公可檢校尚書右僕射餘並如故門下萬事之本歸於司會百僚之師屬我端右所以綜詳名實參貳紀綱詔德選勞於是乎在開府儀同三司檢校兵部尚書使持節汴州諸軍事兼汴州剌史御史大夫充汴宋等州節度使上柱國信都郡王田神功忠敬孝友寬厚沈毅經之以詩書緯之以韜畧言能顧行勇必體仁信義不愆於風雨智謀自叶於蓍蔡早膺戎寄式是師貞有决勝合變之奇有明賞必罰之當精貫白日氣陵高秋馭盧龍之軍萬里橫海討淮夷之叛一戰平吳統制濟河懋昭聲績往以犬戎內奰華夏多虞入勤服勞扈從能力忠衞社稷勳書甲令建牙移鎮在浚之郊守龜蒙鳧繹之險當曹宋齊魯之會牧人馭眾憂國奉公宣文教以布朝章訓武經以明軍法修職貢之禮率先閫外通轉輸之利益贍關中疆宇不聳田萊加闢風俗澄一河南晏然夫以勳業之崇而等威未峻報功優異豈允僉屬固宜副文昌之長總周官之任仍兼連率益重方隅可檢校尚書右僕射兼充本道觀察處置使餘並如故主者施行
