front:
  text: 全唐文欽定全唐文卷八十八僖宗三
  hash: sha256:5da0118e2446f2dd8cde102faa0af74e3c6f22ba99055c15174eb932bc7c3110
body:
  text: 朕每念艱難之本思拯濟之圖理少亂多古猶今也蓋搜揚之未至非爵賞之不行況自鄉里沽名物情賈怨朝市有爭先之黨山林多獨往之人彼豈自窮而莫知返其有文苞經緯道貫儒元貞遁自肥浮名不染豈無加等之命以待非常之流今委使臣遠近徵訪必行備禮以聳羣方且幾貴研深用惟體要運當無事固垂拱而可持時屬多虞非拔奇而不振或有材優將略業洞兵鈐辨勝負於風雲計長短於主客妙得神傳之決恥成兒戲之名不俟臨機方期制變或銷聲於屠釣或屈志於風塵勿媿自媒當期致用至乃旁規國病動適時宜深探貨殖之源備得富強之術排於浮議鬱彼良圖又有志擅縱橫久潛緇褐材雖超異見辱儕流苟全一藝之工不必萬夫之敵亦有推研歷象挍步星辰言必效於機先術豈疑於億中是資奇器孰曰異端亦在勸來佇加殊賞噫功名可慕少壯幾何在君親則忠孝相資念國家則安危同切勿甘流落猶徇宴安並委使臣牓示訪求長吏津置發遣同心體國無使淹延懸賞俟能必期升擢朕雖鍾艱否亦謂憂勤高祖太宗之在天固當垂祐社稷生靈之有主夫豈乏賢達我敷求咨爾將命勿孤翹矚苟自因循其閒儒學優游軍謀宏遠密陳時務願應制科者巳從別勅處分跅遺才沈淪末位不礙文武並須升聞布告天下咸使知悉食乃人天農惟國本兵荒益久漕輓不通關中鄭白兩渠古今同利四萬頃沃饒之業億兆人衣食之源比者權豪競相占奪堰高磑下足明棄水之由稻浸稑澆乃見侵田之害今因流散尚可經營宜委京兆尹選強幹僚屬巡行鄉里逐便相度兼利公私或署職特置使名假之權寵或力田遞升科級許免征徭因務勸分冀能兼蓄亦宜速具聞奏古者進善翹旌蔽賢削地苟異至公之選適開浮黨之門要在拔奇方資濟理昔貞觀戡亂既久理具畢張而馬周徒步獻書上猶前席魏徵直言替否下得竭誠況朕久致履危實惟懵道欲新庶政益賴羣才巳詔中外臣僚必使搜羅淹滯仍令文武各陳所見冀有可裨苟申籌國之謀是濟同舟之患非無上賞佇稱勤求布告遠近咸使知悉政在有經動惟可久事能師古安則易持今者初復舊京須申定制大漢之術兼王霸先儒之權有弛張重舉綱條且務輯睦未遑改作尤貴適時夫萬乘抗威四方從令雖資強幹是切安人迎駕諸軍都士等扈從經年鄉關積念永言忠力合假恩優節級議功爵秩無恡其情願住京邑者便充填兩軍欲歸本道者即仰所司各與公牒到本道後遞加糧賜別立名額給復終身如諸都中人數稍多優賞未徧即令所司計其積欠指揮某郡某縣或各逐將校任去處上供財賦令自差人請領神策軍自經亂離久未訓整孤兒漸散壯騎多亡羽林之垂象空存天陣而疾雷不震雖言無戰豈忘有虞宜委中書門下與本軍商量案舊籍裁減冗數惟務摭實仍令三司資助各修營壘貴使繕完又金吾諸衞等城禁日嚴徼巡務切須令集事不可闕人亦宜條錄修補近京贍國之資榷鹽為本法禁久廢姦蠹實繁陷誤藩方依憑城社須知根柢乃可改張委本司選周術通財庶期革弊其江淮食貨利害亦須詳究指揮沿路占留遣使親諭兵革之後銅鉛至多折納鑄錢尚資興利亦要議其可否不令旁撓農商朕猥以寡德丕承耿光宵旰雖勤干戈繼作困生靈於豺豕委宮闕於榛蕪罪己則深噬臍何及尚賴天地悔禍祖宗降靈內之則公卿大臣外之則方伯元老上憑眷祐下憫蒸黎允叶一心克濟四海靖妖氛於㝢縣剗戎壘於郊圻雖復舊都匪遑高枕於戲大恥才雪羣生未蘇文武典章墜無半在威權法制行亦幾何土疆徒繫於地官征賦罕歸於國帑肅恭常祀尤在正辭昭格上元寧容溢美卿等同匡艱運當識深衷加以虛名斯為不急步驟錙銖之際自有至公照臨明晦之閒寧資外獎當勤納誨宜斷來章朕以寡昧嗣守丕圖思臻太和不敢寧處干戈載戢稼穡少登禮樂中興聲教遂被是用郊上元以報本解密網以緩刑豈非九廟降靈羣賢叶力共賛薄德致茲小康永惟眇躬實懼虛飾卿等上稽天意下採人謠旁訪典謨仰奉明訓以為天地之道既不讓於強名皇王之心宜屈己而從物累貢殷勤至於再四雖鑿井耕田未及勳華之理而樂推欣服難違億兆之情既徇衆詞疑終溢美勉俞來請深用愧懷門下朕幼荷丕構夙夜不遑蓋以三百年之鴻基十七聖之大業守文重事偃武貞期惟懼冲人不克負荷果致干戈四處寇盜連年再省藩維兩違陵廟上媿高祖太宗之締構下慙中外羣后之匡扶既積殷憂俄成疾疹而上天降祐中道獲痊萬乘還宮六龍挽駕御端門而肆赦閱諸夏而駿奔雖有愧中興而克全舊物繄爾中外方事報功寧期瘥疾未瘳尚嬰沈痼徒思勿藥詎報有徵腠理是加連綿莫療永惟八方之大萬務之殷既不躬親固當擁滯朕親弟壽王傑天資永悟生稟溫文孝友通於神明仁愛格於上下必能體我憂惕濟我艱難用叶和平得就頤養宜冊為皇太弟知軍國政事咨爾內外大臣羣方庶尹悉宜聽監國處分盡心輔戴寧國安人酌變從宜同厎於理布告天下咸使聞知門下朕以沖眇祗荷鴻基每惟祖宗之締構艱難念中外之始終匡輔常同馭朽豈忘納隍而乃重去廟朝兩違陵寢始則黃巢犯闕後則朱玫干天險阻道塗蒼黃播越唯思罪己但念勞人宗社降靈妖氛尋盪六龍回轡萬乘還宮方將陳玉帛以充庭會蠻夷而向闕寧期殷憂成疹宵旰奪神走羣望而靡徵希勿藥而罔效臣僚愛我攻療無遺曾未小瘳以至大漸於戲修短定分古今常期著在格言斯為達理是用降茲訓誓祗聽朕言皇太弟知軍國事敏聽政明敏孝友天資聰明神助龍顏表異日角標奇居大麓而風雨不迷輔中興而山河備歷寬宏及物清明在躬必能保守宗祧奉承天地內撫百姓外鎮四夷實億兆之念同固威靈而是屬付託無恨予復何憂宜令所司備禮於柩前即皇帝位仍以太保兼侍郎韋昭度攝冢宰軍國事重不可暫闕以日易月抑惟舊章皇帝三日而聽政十三日小祥二十五日大祥二十七日釋服天下節度觀察防禦等使及監軍諸州刺史職守非輕並不得離任赴哀應天下人吏百姓告哀後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉釋服之後無禁舉樂文武官朝晡臨時十五舉音宮中當臨者非時不得擅哭五坊鷹犬除備蒐狩外餘並解放醫官及伎術人等晝夜勞苦知無不為宜各安存勿或加罪噫朕念兵革以來耕農久廢尤傷畿甸莫不流亡豈堪復土之規獨昧弔人之旨且累朝遺制畢及山陵以漢文薄葬之詞為列聖循常之命約錦繡金銀之飾禁奢華雕麗之工皆例作空文而並違先旨今者流離若是痛毒堪悲仗百姓即百姓一空捐國用則國用無取不可踵從前之計度困此日之生靈俾朕厚顏下見先帝應緣山陵事務宜令中外商量比從來每事十分各減六七桐棺瓦器朕所慕之況在今晨勿欺大夜咨爾股肱重臣內外文武爪牙之士腹心之徒合志同心輔予令弟布告天下咸使聞知進士策名向來所重由此從官第一出身誠宜行止端莊宴遊儉約事務率醵動合兢修保他日之令名成在此之慎靜豈宜縱逸唯切追歡近年以來澆風大扇一春所費萬餘貫錢況在麻衣從何而出力足者樂於書罰家貧者苦於成名將革弊訛實在中道宜令禮部切加戒約每年有名宴會一春罰錢及鋪地等相許每人不得一百千其勾當分手不得過五十人其開試開宴並須在四月內稍有違越必舉朝章仍委御史臺當加糾察勅東都留守王渢河南尹劉允章及分司御史官僚皇城將吏府縣官僧道耆壽百姓等朕端居上京默念東洛常恐宗廟不得嚴肅宮闕或至蕭條省寺荒涼井鄽凋耗府縣有疲羸之苦郊原貽蝗旱之災雖鑾輅翠華未期巡幸而臨軒負扆常注憂勤昨者草寇憑陵王師討伐勤勞車甲綿歷星霜巡環於十二郡閒塗炭於數千里內方聞翦滅又致猖狂王仙芝等縱脅生靈聯攻縣邑纔收陽翟又破郡城不日復陷汝州兼擄郡守監軍使凶黨既盛人心易搖尋聞洛邑震驚都城紛擾舊相護几筵迴避羣官挈妻子奔逃工商失業以無依黎庶捨家而竟出朕每聞奏報彌切驚憂心如納隍手若馭索便罷重陽內宴以示焦怛之懷而宗社降靈神祇助順尋聞寇盜不敢侵踰吹燎火以南旋却洪波於北注今則官兵漸集王室頓安公卿可以還舊居閭巷足得復生業況聞秋田大稔物價稍低雖蹔履於艱危必終成於康濟今差左諫議大夫楊授工部員外郎李巢專往宣慰凡居長吏官僚等切在條理安存必令減節征徭均平賦稅無使虐吏重困疲人諸道師徒多巳屯集累勅有司官吏不令供餽闕遺亦委使臣勞諭將卒專俟凱旋之日當行慶賜之恩福建觀察使李播荊州刺史楊權古蔚州刺史王龜範璧州刺史張贄濮州刺史韋浦施州刺史婁傅會邢州刺史王回撫州刺史崔理黃州刺史計信卿等刺史親人之官苟不諳詳豈宜除授比為朕養百姓非獨榮爾一身每念疲羸實所傷歎李播等九人授官之時衆詞不可王回等三人到郡無政惟務貪求實汚方州並宜停任君后惻隱之心必先於濟物朝廷發生之澤本務於弔人納隍雖軫於四維滅燎尚延於數月朕每念愁毒良增震嗟王仙芝尚君長等跡自椎埋結成嘯聚呼澤而豺狼相應掠地而雞犬無遺是以所寇州城便為荊棘黔首盡逃於山谷遺骸欲遍於邱墟皆由時平不務於講兵歲久遂至於忘戰以至望風喪敗迎刃殲夷縣道皆空人靈胥怨嘆凶徒之未服念赤子之無辜蓋朕誠信未能感昭慰曉莫能通達須漸資於完復俾稍慰於流離爰命腹心往詢疾苦今故遣國子司業李夷遇將我惠渥卹彼荒殘拯塗炭之沈淪解瘡痍之呻痛應汝隨申安蘄黃等州凡經王仙芝尚君長所攻劫處悉加撫育遍問存亡其有巳歸復人戶仰所在州縣各酌量遭罹重輕減放租稅其今年并至來年春季內所有差役並宜放免其田苗如經軍馬踐踏兼人戶有戰陣死亡者全與放免其有衣冠士族經亂兵橫罹殺戮者仰於屬省錢內量給衣衾槥櫝速與葬送并為設祭慰其營魂衆暴骨遺骸委在城郭郊野無親故收認者宜作大塚以瘞之將校常主牙旗新曾加戰折股斷臂解脛陷胷進不念身誓思報國亡歿者當與襃贈見在者終身不停衣糧仍令本州縣官吏闕遇難不撓臨危向公枉陷兵鋒合嘉名節仰所在錄名奏聞當與追贈其有道路郵館之所傳遞警急之時或驛吏驚奔賊徒焚爇仰宣慰使量所在物力重為經營冀備追風免妨乘馹其衣冠將吏軍人百姓遭焚劫甚者委州縣審細檢勘以義倉斛斗賑救且令粗濟饑危所在府庫囷倉亦有不經劫盜或恐奸吏乾沒隱欺切仰勘騐虛實分析申奏其有留州留使錢物皆是十月巳前秋賦之初須仗循良漸自收歛節其橫費酌彼軍須講於耕戰之餘用濟公私之急其須添器械更峻城隍猶防烏合之徒重有鯨衝之勢推我隱憂之意俾觀急病之能況十室之中必有忠信數郡之內漸復人煙所宜互佩韋弦重張琴瑟全由良吏善撫疲人應有緩急之閒便宜所切州縣之利病奏請之未行仰宣慰使與所在刺史縣令細詳事由逐件聞奏兼期知我萬機之重俟黎元而共安九重之深願風俗而常泰委是將命以布朕心亳州太清宮是混元降聖之地名高道祖福蔭皇基九龍之瑞井涵空一塵之仙蹤在木累代之祺祥可紀近年之感應尤彰所宜嚴盛於福庭安可荒涼於淨宇潘稠能施善政久染真風廣出俸錢備修宮觀垣牆棟桷無不精新像設丹青彌加煥麗觀圖考事深可慰嘉其住宮威儀道士吳重元可賜紫仍號凝元先生道士馬含彰孫棲梧並賜紫潘稠加金紫光祿大夫檢校工部尚書餘如故元氣斯剖維山結成孕雲雨於林巒乃神仙之窟宅丈人即天關紫府鎮於蜀郡青城方象外之崑邱狀海邊之蓬島南巡鶴廟軒皇與元祖俱來少駐鑾車展敬則封崇宜及俾使琅函署德常傳萬歲之聲玉檢銘功速建太平之業其山宜封希夷公仍令本州刺史親備香齋冀申虔祝供奉官袁易刺史王茲縣令崔正規等入山致醮行禮朝廷懸爵賞之科設掄才之政言其藻鑒在乎清通況當求理之時方切任賢之術將宣至化實賴平衡宜於取捨之閒必叶公忠之論如聞羈棲旅食貧苦選人守數考而方及選期望一官而時希寸祿注唱纔畢旋又更移多被逗遛莫遂便穩脂膏之地須因有賄而昇遷避之官即是孤寒所受言斯猥弊乃積歲年縱有條流尋亦隳改況今行在宜溥渥恩不欲使歎惋栖遲吁嗟屈滯歸乎允當倚在有司宜令中書門下切在條流如選人實有考課堪理繁劇者臨時注擬可以甄昇繫生民之慘舒任銓衡之推擇勿令留滯切速指揮仍將朕意宣示百寮及吏部三銓并選人等各令知悉逆賊偽宰相蕭遘鄭昌圖裴徹皆代荷國恩身極人爵或兩府鈞衡之任或六官兵賦之權所宜罄竭丹誠祗膺茂寵而遽乖臣節輒肆逆謀挾扶䟽屬之人遂成篡奪驅脅端良之士大恣猖狂扇惑藩方馳書邊徼妄徵故事欲動人情並居偽廷同干相位事主之道何以為心賴遠近輸誠祖宗垂祐忠臣發憤妖孽就誅今則興復有期廟朝重正顧惟涼德益所兢慙然則刑賞之科所以示天下而申懲勸也其於用舍朕不敢私撫事論辜難逃極典宜令所在集衆斬訖聞奏宣示天下宜體朕懷移縣就宮必多穢瀆縣依舊所宜準萬年例昇為赤縣仍降青詞修齋告盟天地運無私之道以遂羣生帝王宏在宥之仁是章含垢得不廣沾沛澤昭洽寰區爰施解網之恩用忻垂衣之化朕君臨大寶子育含靈前歲中外臣僚藩方將帥獻我徽號詢於典章雖云前赦不遙既受鴻名咸施慶澤稟列聖之法嗣致兆人之勸康然以赦宥恐頻變通宜審權停舊典再及新春每念貶降遐荒遷流裔土傾心望闕延頸祈哀繫於朕懷常深惻憫宜順陽和之追行盪滌之恩自乾符四年正月五日巳前京畿及天下州府大辟罪巳下見禁囚徒各委長吏遞減二等限五日決遣唯十惡五逆故殺人及官典犯入巳贓持刀行劫合造毒藥不在此限於戲朕居億兆之上於今四年業業兢兢如履冰馭朽苟有闕教道何致時雍未嘗不更自勞心尤思致理況允契羣臣之望欽承列聖之規特降鴻恩獲遵彞典今則巳覃惠澤俾洽生成復遇陽春同均煦育宣布中外深體朕懷
