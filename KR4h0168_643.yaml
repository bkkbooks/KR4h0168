front:
  text: 全唐文欽定全唐文卷六百四十三王起三
  hash: sha256:2fc9538c8eb2d2ff1b41f4650dd683020214a631bf586ee7794f7940cbb41d84
body:
  text: 伊浩汗之鵬壑有岧嶢之蜃樓不因材而結構自以氣而飛浮閟然無朕赫矣難儔出彼波濤必麗天以成象化為軒檻寧假日以銷憂足以掩鼇山於別島漏蛟室於懸流若乃霧歇烟銷雲歸月朗千里目極八紘心賞惟錯之類咸伏陽侯之波無響於是吐氛氳騰泱漭隱隱回出亭亭直上乍明乍滅舒渤澥而新鮮若合若離結麗譙而博敞雖舟子來萃國工是仰莫不驚天地之赫靈覩井幹而成象赫奕奕而有光紛郁郁而難詳影臨貝闕彩曳虹梁比繩墨之曲直如規矩之圓方嶽嶽之仙乍窺於天表盈盈之女且愧於路傍八窗未工百尺非峻伴祥烟於巨浸雜佳氣於重潤仰層構之如翬必巨川之化蜃大壯冥立全模洞開吐而侔華宇呼吸而象瑰材翔鯤拂而不散賀燕往而復來依稀碧落想像瑤臺旁輝日域下瑩珠胎比落星之流點綴疑明月之照徘徊則知夫霞駮雲蔚有壯麗之貴棟折榱崩無壓覆之畏既變態於倏忽亦憑虛而髣佛豈比夫鼎居汾水赩赩以騰文劍在豐城雄雄而增氣方今聖功不宰海物咸在固知吐為樓閣以全其軀豈爭彼魚鹽弗加於海周穆窮轍迹之所經駕黿鼉而感靈所以濟浩汗所以通杳冥蜲蜲蜿蜿以代造舟之利匪雕匪刻皆連外國之形諒人力之不勦信神功而永寧當其師旅闐闐旌旗肅肅臨九江而澶汗駐八駿而踡局望既濟於未濟終歎無梁思載沉而載浮孰能刳木得不乞靈於水府假道於介族則黿也不得而深藏鼉也不得而潛伏既而擘波有聲異狀可驚出層潭而櫛比駕飛浪而砥平連足俄維比浮柱之初立鏤甲疊映同版築之相成齊首而繩墨勿用曳尾而規模自呈其利惟博其安無傾殊滄海之龜構異銀河而鵲征彼詭類之可覽實至誠之所感假贔尸貝以臨深託盤跚而習坎其勢邐迤其狀參差無遠不屆惟危具持照赫奕之五刃度張皇之六師乘以周旋且異琴高之鯉載於沈溺還符毛寶之龜漁者徒驚工人有恥同罛共羅而罔及畫鶂雄虹而莫擬題之不可殊長卿之見書抱之則難謝尾生之沈水是知伐鼉以冒鼓其用匪良解黿而染指其謀匪臧孰若奮功於舟楫感聖於君王昔在深泉懼屑沒於其穴今符至德忽結構而成梁固蹂躪而無害將騰躍而有光我皇仁洽道豐文修武偃要荒畢服淳離斯返何必驅鼉而駕黿勞師以襲遠客有羡魚者立河壖俯臨泉窺緑藻瞰紅蓮彈鋏之歌逾切觀濠之意彌堅則有赬尾殊品紫鱗異質或依蒲而自娛或擁芡而爭出揚鬐奮鬣巳見其由戢尾貫腮未知其術是用乘良辰守通津望噞喁而注目聆瀺灂以勞神乃歎曰深不測者水藏諸水者鱗營之何及獲之何因彼不脫於泉徒求於泉下彼不蕩於水奚求於水濱喪志而退問於漁人漁人曰噫子過矣君子謀不失利動必合理禽之中也先夫矰繳獸之獲也資乎弓矢夫吾子坐金隄降玉趾無罶而窺其發發無笱而思其唯唯此所謂自包其羞不求諸己向若有具施之於水則和羹可待食肉茲始不為緣木之難自叶忘筌之美斯言富哉感激而回求詹公之術盡任子之才器必備藝咸該將中否之不惑希取舍之無猜羡之可以巳也是以結網而復來聽之微者不必五音伊焦桐之逸韻契伯喈之明心氣逐炎炎始將隨於槁木聲飛烈烈終見用於雅琴當其大匠未收樵人所利圭葉零落孫枝殘瘁以薪見迷以竈求媚聲連而丹焰乍飛響送而紅星忽墜聞之者徒謂木之槁火之熾殊不知八音之珍佇五絃之至彼美中郎神妙無方樂無不審音無不詳聽執爨之間克諧律呂聞就燥之處乍合宮商乃言曰惜乎斯桐韻實天假可以加雕斫可以暢韶雅何混彼樗林而棄於薪者於是收質焰焰求音泠泠撲滅其色鱗皴其形被之以絃佇水流而山立鼓之為操必鶴舞而魚聽則知桐之成器待其人而克定桐之有聲非其人而靡聽向若清耳不傳王褱材遂捐希聲率爾聾俗猶然則半死之根誰一收其餘燼孤生之幹將久滅於青烟桐之爇兮人之德焚身之缺兮躬忽見屈殊不知焦尾為珍竟獲伸於多識至矣哉感知音者願是效而是則駜彼名馬産茲元朔得遐方之徑氣是禀嚴凝應上聖之禎符其來帛丿糸邈固可以飾和鸞之鐬鐬就鉤膺之濯濯始其同㣥豐草挺質寒鄉名超茲白瑞掩飛黃伊六轡之爰設非九重之孰當爾其走險鹿駭望雲龍驤縶之維之登歌不慚於西極若滅若沒獻狀聿來於北方於以效伏皂之勤於以釋長鳴之怨流離而走血來格濩落而執靮斯獻計鴻鵠之舉彼未居多涉燕宋之遙我方適願柔心有待逸足未宣權奇於絳闕之下沛艾於紫庭之前稟月未匹追風莫先所以闡幽都之美所以增華廏之妍既佶且間軼其㣥兮相萬視遠如邇遵其路兮且千一人既瞻八駿初比彼千駟花發六騶雲起其止也可齊乎足其行也無踰於里信愕視於華原而騰輝於良史伊茲駿之間出在前王而殊寡或鑾輅而見捐或鼓車而不捨我皇昭景福錫純嘏稱德以喻夫俊乂服勞以勸夫忠者豈惟同兩漢之帝獲千里之馬先賢鑄金之英為馬之形馬無疆而致用金不朽而垂名瞻之在前則至寶山立寂然不動則異體峯平固將六龍可驗八駿斯營遐追絶足遠契長鳴豈徒玩熒煌之彩眄熠爚之情哉始其模既全體將具思求絶塵之貌是假在鎔之鑄踴躍其液渥窪之形未出撲滅其烟浮雲之姿已露方中矩兮圓中規勢倜儻兮精權奇誠可傳而可繼每不驅而不馳其巧既畢安貞莫移豈貪夫而是徇諒工者之所為若乃大閲㣥騶旁搜萬國獻絳闕而咸萃充華廄而尚惑乃審厥象俾臻其極仰從革之輝光知代勞之軌則駑駘沓至自乖百鍊之形駔駿俱來允叶萬邦之式其狀惟肖其義孔昭仰沛艾以龍翥若驂驔而鹿超摧秣勿施異乘黃之伏皂縶維罔及殊赭白之來朝翼翼雄姿煌煌壯觀恆引耀以錯落每騰精而泮渙牛以石兮多慚駝以銅兮非玩是知武皇之制博伏波之旨深用之則行昔飛聲於東道確乎不拔終成象於南金高門洞闢祕殿旁臨將萬古以駭目俾四方而宅心豈作賂大宛其形見棄為神蜀郡厥祀方歆者哉固宜無逃於衆寡不昧於取舍永作鏡於域中比懸衡於天下則稱驥德頌駉牧者未若似是而非常以馬而喻馬岌岌高冠是加於首將服之以入仕遂彈之而去垢纖埃不染知潔巳之為先法服是從明干祿之非久豈比裂之而無用挂之而勿有也當其貢公不仕王陽未榮風起緇布塵飛玉纓積歲月而無色混風姿而莫呈豈知點綴則價重拂拭則光生蓋以斷金之人未達於清世陸沈之士猶勞其赤誠是故置之而有待褚之而勿營洎夫大漢登庸伊人有所同松茂而柏悅將龍翔而鳳舉於是取章甫而言曰冠者首之飾人之規盛服將朝此為大者結髮從仕曷莫由之吾方策名於丹闕委質於彤墀顧將盡飾以為美豈薄汚而見嗤及解彼珠纓彈於玉指彰久要之必信表從政之有使拂舊彩以增鮮振浮埃而暫起由是發光耀正容止朝廷濟濟具瞻夫哲人巾櫛鏘鏘用表夫君子則知碩量之所包賢人之與交其賤也樂夫伐木其貴也同夫拔茅則爵位相先者以彈冠而自鑒金蘭合契者因彈冠而有感故能致美搢紳不嬰垢氛將總會於元髮期入仕於青雲豈比夫晏子濯以入朝是稱賢相屈生彈於新沐方俟明君二師之伐大宛也耀武經闡王靈入絶域討不庭近取諸身拔寶刀之錯落上善若水出山溜而清泠則誠之所至危無不寧挹既思於跋石利遂因於新硎當其大漠之北窮山所次萬流皆涸甘泉斯祕堯人不能以鑿井考叔徒稱其闕地思㣥飲而駿奔懷載渴而穈至大兵懸命夸父之拔策是憂上將失容曹公之指梅莫致維石巖巖將破以至誠憂心慘慘將慰以元感乃拯經營陟崢嶸綴旒之急貫日之精念爐中鍛鍊之利成山下決蒙之情孤環出銛鍔明賴黑壤而暫啓迸元泉而可驚活活兮有甘井忽開之兆泠泠兮奪醴泉自出之名飛流乍凝乎淬刃濯血又同於洗兵三軍激心始觀切玉之利萬夫駭耳俄聞潄玉之聲咸曰將軍發丹懇勞赤誠俾竭涸流濕枯槁增榮亹亹之流既控清而引濁濟濟之衆咸出死而入生豈一勺之多實一瓢為貴既挹注之有待知福祿之來為刀惟百鍊不銼其鋒鋩泉則九重未存其觱沸此畫地之成川如開流之納泉酌焉不竭瞻之在前何盡心之禺若致滿腹之怡然向使以誠為後以力為先動而有悔鑽之彌堅則佩彼孟勞諒無施於磽塉拜同疏勒亦何望於潺湲於戲人之有志物莫能禦刀為短兵兮曷用泉居厚地兮不阻中石之箭處危疑而則那駐日之戈於精誠而誰與故能飛名域外獻功王所豈不以至誠如神達之於六府奉宣今日巳後百官並不得於京城內置廟者臣等伏據禮記云君子將營宮室宗廟為先廄庫為次居室為後又韋彤五經精義對曰古制廟必中門之外吉凶大事皆告而後行所以親而尊之不自專也今令城外置廟稍異禮文書於史籍恐乖聖政伏以朱雀門及至德門凡有九坊其長興坊是皇城南第三坊便有朝官私廟實則逼近宮闕自威遠軍向南三坊俗稱圍外地至甚間僻人鮮經過於此置廟無所妨礙臣等商量今日巳後皇城南六坊內不得置私廟至朱雀門緣是南郊御路至明德門夾街兩面坊及曲江側近亦不得置餘圍外深僻坊並無所禁冀不違禮意感悅人心臣等頻奉聖旨有事許再三論奏輒罄所見貴補聰明讓皇帝廟去月二十四日詔下太常寺委三卿及博士同詳議聞奏者臣等伏以讓皇帝追尊位號恩出一時別立廟祠不涉正統既非昭穆禘祫所及無子孫饗獻之儀親盡則疏歲久當革杜鴻漸所議禘祫之月時一祭者蓋以時近恩深未可頓忘故也今睿宗元宗既巳祧去又文敬等七太子中亦有追贈奉天承天皇帝之號當以停廢則讓帝之廟不宜獨存臣等參詳伏請准中書門下狀便從廢罷㳂情定禮實議叶宜伏以禮部放榜巳是成名中書重覆尚未及第若重覆之中萬不一定則放榜之後遠近誤傳其於事理實為非便請今年進士堪及第者本司考試訖其詩賦先送中書門下詳覆候敕却下本司然後准例大字放榜准今月十日堂帖天寶初置七太子廟異室同堂國朝故事足以師法今欲聞奏以懷懿太子神主祔惠昭及悼懷太子廟不虧情禮又甚便宜送太常寺三卿與禮官同商量議狀者伏以三代巳降廟制不同光武為總立一堂㣥主異室親盡廟毀昭穆遞遷此蓋祖宗之廟也然則太子廟出於近或散在他處別置一室或尊卑序列共立一堂伏准國初太子廟散在諸方至天寶六載赦文章懷節愍惠宣等太子宜與隱太子列次同為一廟應緣祭事並合官給號為七太子廟又准大歷三年三月以榮王天寶中追贈靜恭太子神主未祔詔祔七太子廟加一室今懷懿太子為姪以姪祔叔享獻得宜請於惠昭太子廟添置一室擇日升祔邦國之禮祀為大事圭璧之儀經有前規謹按周禮天地四方以蒼璧禮天黃琮禮地青圭禮東方赤璋禮南方白琥禮西方黑璜禮北方又云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月星辰凡此九器皆祀神之玉也又云以禋祀祀昊天上帝鄭元云禋烟也為玉幣祭訖燔之而升烟以報陽也今與開元禮義同此則焚玉之驗也又周禮掌國之玉鎮大寶器若大祭既事而藏之此則收玉之證也梁氏崔靈恩撰三禮義宗云凡祭天神各有二玉一以禮神一則燔之禮神者訖事却收祀神者與牲俱燎則靈恩之義合於禮經今國家郊天祀地祀神之玉常用守經據古禮神之玉則無臣等請下有司精求良玉創造蒼璧黃琮等九器祭訖則藏之其燎玉即依常制所冀國禮可久之文守而不失周官巳墜之典舉而更新伏以九宮貴神位列星座往因致福詔立祠壇降至尊以稱臣就東郊以親拜在祀典雖云過禮庇㣥生豈患無文思福黔黎特申嚴奉誠聖人屈巳以安天下之心也厥後祝史不明精誠亦怠禮官建議降處中祠今聖德憂勤期臻壽域兵荒水旱寤寐軫懷爰命臺臣輯興墜典伏惟九宮所稱之臣即太乙攝提軒轅招搖天符青龍咸池太陰天一者也謹按黃帝九宮經及蕭嵩五行大義一宮其神太乙其星天蓬其卦坎其行水其方白二宮其神攝提其星天芮其卦坤其行土其方黑三宮其神軒轅其星天衝其卦震其行木其方碧四宮其神招搖其星天輔其卦巽其行木其方緑五宮其神天符其星天禽其卦離其行土其方黃六宮其神青龍其星天心其卦乾其行金其方白七宮其神咸池其星天柱其卦兌其行金其方赤八宮其神太陰其星天任其卦艮其行土其方白九宮其神天一其星天英其卦離其行火其方紫觀其統八卦運五行土飛其中數轉於極雖敬事迎釐不聞經見而範圍亭育有助昌時以此兩朝親祀而臻百祥也然以萬物之精上為列星星之運行必繫於物貴而居者則必統八氣總萬神斡權化於混茫賦品彙於陰隲與天地日月誠相參也豈得繄賴於敷佑而屈降於等夷又據太尉攝祀九宮貴神舊儀前七日受誓誡於尚書省散齊四日致齊三日牲用犢祝版御署稱嗣天子臣圭幣樂成比類中祠則無等級今據江都集禮又開元禮蠟祭之日大明夜明二座及朝日夕月皇帝致祝皆率稱臣若以為非泰壇配祀之時得主日報天之義卑緣厭屈尊用德伸不以著在中祠取類常祀此則中祠用大祠之義也又據太社太稷開元之制列在中祠天寶三載二月十四日敕改為大祠自後因循復用前禮長慶三年正月禮官獻議始準前敕稱為大祠唯御署祝文稱天子謹遣某官某昭告文義以為殖物粒人則宜增秩致祀稱禱有異方丘不以伸為大祠遂屈尊稱此又大祠用中祠之禮也參之日月既如彼考之社稷又如此所謂功巨者因之以殊禮位稱者不敢易其文是前聖後儒陟降之明徵也今九宮貴神既司水旱降福禳災人將賴之追舉舊章誠為得禮然以立祠非古宅位有方分職既異其司存致祝必參乎等列求之折中宜有變通稍重之儀有以為比伏請自今巳後却用大祠之禮誓宜備物無有降差惟御署祝文以社稷為本伏緣巳稱臣於天帝無二尊故也惟唐開成元年歲在執徐十二月三日檢校禮部尚書東川節度使長樂公享年七十薨於位天子不視朝一日贈以天官之秩是月公之喪歸於西都其來也梓潼之人如亡顧復其至也京師之人咸嗟殄瘁其親戚號於中唐而鄰里感其朋友慟於外寢而搢紳弔咸以公孝友忠信清廉正直仁偉度可以韜當世弼諧遠略可以經大邦而位不充量才屈於算斯所以感人深矣其明年五月克葬於京兆萬年縣崇道鄉白鹿原從先人塋禮也既葬其孤纍然泣血以公勳伐德善之狀請被於文而刻此石云公諱宿字拱之冀州長樂人漢光祿勳奉世草五代孫也自光祿勳立功於漢其下十四葉立國王燕是為昭成皇帝其下七葉至五代祖周烏氏侯諱早惠闕一字隋為隰州司戶皇朝為婺州常山令常山生高祖皇婺州糾曹掾諱文儉糾曹生曾祖茂才高第括州松陽令諱道儀松陽生大父文林郎宋王府記室參軍贈禮部員外郎諱嗣員外生先府君南昌令新安郡長史贈尚書左僕射諱子華咸以茂德光耿史牒僕射天寶中明皇以四子列學官時與計偕一鳴上第藏器不耀以孝節聞享年八十纍贈尚書左僕射先妣彭城劉氏皇成都府參軍沔之女嬪則母範惟家之肥纍贈彭城郡太夫人公即僕射之元子也奇偉倜儻與人誠直言無詭隨行不苟合望之也長㦸森於武庫即之也大圭植於瓊田丱歲侍僕射府君廬於員外府君之墓左有靈芝産於埏隧白兔擾於松檟僕射惡其顯異抑而不言識者咸謂純孝殊祥又重之以陰德其門必大也弱冠以工文碩學稱年草六舉進士是時明有司即兵部侍郎陸公贄其人也又應宏詞科試百步穿楊葉賦雖為勢奪而其文至今諷之後生以為楷巳而有志於四方歷東諸侯為彭門僕射張公建封所器異因表為試太常寺奉禮郎充節度巡官張公傑邁簡達尊賢禮能幕府始建㣥彥翹首與公同升者李藩韓愈之倫皆諸侯之選及公曳裾之後有置醴之遇其書檄奏記公皆專焉及張公寢疾公常出入臥內獻替戎事一軍感其誠明逮其薨落也武夫感義閭里懷慕蚩蚩洶洶無帥乃亂立其子愔稱留後焉未王命也先是李師古之叛也其將李洧以徐方效順至是師古將伐有喪且復故地公內則整訓叛徒明利害之鄉外則移檄敵人示逆順之理卒能寢師古之謀遏徐方之亂衛監戎於鋒刃之上免闔境於磔裂之勢公之力也而終身杜口不言定徐之功議者高其不伐及德宗以愔得衆因而善之表公為留後判官試金吾衛兵曹公以危邦是戒倚門方切乞歸江左以奉色養巳而越師潛章請置閫幄授大理評事徐之軍吏惜公之去也繼公職者害公之能也合為他誣貶泉州司戶公得喪不形以詩書自娛歲餘移闕一字州司戶太夫人終堂孺慕柴毀阽於滅性喪復常從事浙右徵拜憲府監察歷太常博士凡為國家定諡皆闕一字善貶惡不吐不茹時人偉其文而與其直遷虞部員外郎丁先府君艱欒枝在疚哀禮皆極既祥除都官員外郎憲宗時吳元濟以淮西叛詔相國裴公東征於是妙選廷臣為幕中闕一字由是表公為彰義軍節度判官於是有朱紱銀章之錫淮西平酬勞報功拜比部郎中為持權者所忌會韓文公愈以京師迎佛骨上疏切諫忌公者因上之怒也誣公實為之出刺歙州先是中書舍人缺僉謂公之述作動合謨訓綸言之任旦夕待遷及一麾出守㣥情大駭公則神怡氣暢視虧若成此則老氏之齊寵辱令尹之無喜慍也在歙周歲鋤兼并活矜寡有襦袴誰嗣之謠徵拜刑部郎中遷兵部郎中知制誥時問罪河朔書命疊委公應用神速不能自休詞理典奧文采煥逸大凡六百餘章為染翰者程準天子以深州刺史牛元翼納忠效順詔除襄州節度使時重圍不解未克之官下江漢上游舟車四會久虛統帥弛紊由之因思文武全德姑攝其任上曰侍臣有魁岸奇表珥貂蟬者為誰丞相以公對上曰峴南留務斯人可矣爰命金印紫綬官相憲丞倅闕一字以闕二字之下車則軍旅安闕一字閭里清寧後元翼自闕一字內來詔公歸闕二字又或願借子翼且留一年或追送君闕一字有逾百里其遺愛在去有如此者即日拜中書舍人妄為飛語闕一字中闕一字改為太常闕五字遷散騎常侍闕六字直闕三字之士闕六字試第其上下得人之闕二字為至公遷華州刺史以州名犯先公諱固讓不拜復闕二字加集賢殿學士闕四字同之阻命於闕二字也王闕一字興闕二十一字以闕七字之臣有才者宣撫之擇使數輩闕三字之事公以食君之祿危事不闕一字急國之闕三字盡心遂闕二字政闕四字屬虐暑溽雨泥行谷宿闕二字險阻闕八字不言闕一字由是出入闕六字危者安之闕一字者勇之棣城闕二字公闕二字助其闕二字事國有如此者矣三川浩穰尹正斯闕一字時闕一字之闕二字公闕一字理及闕二字必信賞必罰人急吏闕二字著無闕一字兼并闕一字必闕六字部曲闕五字有闕二字為闕一字吏闕六字於杖下闕十二字禁止再闕一字報政行工部侍郎加闕十五字曹郎議闕二字公以闕一字路闕一字以誅闕六字之闕三字以為得闕十二字格後敕五十卷闕一字百闕七字兵部侍郎進爵為公會衆闕四字上闕四字之忠重推轂之闕二字檢校禮部尚書使持節梓州諸軍事兼梓州刺史御史大夫充劍南東川節度副大使知節度事管內觀察處置靜戎軍等使上柱國公闕一字節闕一字臨整闕二字紀外闕三字內闕二字毗推赤心於三軍之腹而闕一字郡以六闕三字禮樂修明苛闕一字用去闕四十二字國人闕二字心太和初闕一字師闕二字南闕一字入寇抵於闕二字犬掠而闕一字公以善闕一字不闕五字隨則無惠安必闕三十七字上問之曰守土之臣當如是乎豈闕一字山鎮一方亦可波及他闕一字詔用闕四字巫之闕五字公闕四十二字嘗一旦天助十萬錢於我家故鄉人號為孝馮家吾今壽登闕二字位列方面陰德之闕一字其可誣乎闕四十七字重闕一字家闕三字之以闕四字曰命之短長天闕三字之闕五字吾不闕一字也闕五十六字天下表其闕八字貞百維大唐開成三年歲次戊午十月乙酉朔十六日庚子皇太子薨於少陽院十七日辛丑遷座於大吉殿十一月乙卯朔二十四日戊寅命冊使太子太師兼右僕射門下侍郎國子祭酒平章事鄭覃副使中書侍郎平章事楊嗣復持節冊諡曰莊恪十二月乙酉朔十二日景申葬於驪山之北原莊恪陵禮也玉琯歲窮金壺漏盡祖奠告徹哀笳將引庭滅燎而月寒路搖旍而風緊皇帝念主鬯之缺位悼佩觿之夭年銅樓巳閉銀牒徒懸方追思於對日遽冥寞而賓天典冊具舉文物咸備爰詔侍臣顯揚上嗣其詞曰皇矣帝緒肇基綿古種德尊道宗文祖武上聖開成天下和平儲祉發祥是生元良覃訏之初岐嶷用彰蘊才游藝玉裕金相既免孩提是加封殖俾維城於東魯錫介圭於上國辭榮朱邸正位青宮尊師重傅養德含聰畏馳道而不絶問寢門而益恭招賢警戒齒胄謙沖冀日躋於三善奉天慈於九重漢莊好學既顯於外魏丕能文方循於內美不二於顏過嘉得三於鯉退焜耀甲觀鏗鏘瑜珮方積善於為山何反真而游岱嗚呼哀哉憂兢損壽沉疴始遘㣥望並走百靈宜祐吳客之問徒為越人之方靡救占前星之掩曜知東朝之降咎天垂象而則然人由巳而何有嗚呼哀哉稅駕承華兮即宮夜臺鳳笙長絶兮蜃輅徐來啓青宮而右出歷元灞而左回度凋林兮魂斷入曠野兮心摧水助挽而幽咽雲帶翣而徘徊悲佳城之巳掩見新廟之方開嗚呼哀哉授經兮曷期執紼兮增欷九原作兮何嗟及七日還兮安可希有少海之波逝無西園之蓋飛商山之羽翼巳散望苑之賓客咸歸瑟彼玉簡閟於泉扉用傳信於文字願不昧於音徽嗚呼哀哉
