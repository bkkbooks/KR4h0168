front:
  text: 全唐文欽定全唐文卷一百九十八駱賓王二
  hash: sha256:29a0aa02fe19cfac971e5fde57d51c14373a9dc1780b9394c466173355558188
body:
  text: 賓王啟側聞戢翮觸籠負垂天而跼影伏櫪羈蹄望絕塵而踠足故以遊蓮遇絏悟宋王於嬰羅在藻迷波顧蒙莊於煦轍是以臨淄遣婦寄束縕於齊鄰邯鄲下客效處囊於趙相伏惟明府公締址瓊峰靈岳蔽丹霄之景圖基珠浦神流沃清漢之波玉札飛文綜宏詞於楚傅金籝緝藝味雅道於扶陽孕蘭畹而生姿澧灞鍾高門之慶產銅溪而寫鍔荊藍資象德之禎幼辨羝羊演飛龍之祕策夙談孔雀對家禽之麗詞赤野浮衒價之光珠胎瑩色丹穴陪來儀之迅鳳彩含姿靈襟轉璧絢逸照於蘭池神府驚蘋韻清音於桂浦談叢散馥韞餘氣於九蘭筆海飛濤駭洪波於八水綰銅麟甸製錦鳧郊化洽下車恩孚攬轡德聲含詠仁風飄十地之雄道化編謠惠露灑三天之渥狎中牟之馴雉豈懼驍媒驚重泉之瑞鸞非關照舞雖則塵飛范甑垂銀有結綬之華而乃調理宓絃烹雞屈函牛之量加以招攜白屋勸誘青衿遂使潄流逸客望驥足以雲蒸棲泌遺才欵龍門而霧會某緯蕭末品拾艾幽人寓迹雩壇挹危直之祕說託根磬渚戢戰勝之良圖幸以奉訓趨庭束情田於理窟從師負笈私默識於書林至於九流百氏頗探其異端萬卷五車亦研其奧旨將欲優游三樂負杖以終年棲遲一邱鳴絃而卒歲諒以糟糠不贍甘旨之養屢空簞食無資朝夕之歡寧展是以祈安陽之捧檄儗毛義之清塵思魯國之執鞭蹈孔聖之餘志屬以蛬秋應節雁序戒時飆金將露玉共清柳黛與荷緗漸歇實含毫振藻之際離經析理之期不揆雕朽之材竊冀遷喬之路輒期泛愛輕用自媒儻荊璞無見致疑夜光不逢桉劍則沈骸九死終望銜珠殞首三泉徒希結草載塵清矚跼影外慙冒瀆威嚴循心內駭謹啟某啟學士袁慶隆奉宣教旨垂示閨情詩並序跪發珠韜伏膺玉札類西秦之鏡照徹心靈同指南之車導引迷誤竊惟詩之興作肇基邃古唐歌虞詠始載典謨商頌周雅方陳金石其后言志緣情二京斯盛含毫瀝思魏晉彌繁布在縑簡差可商略李都尉鴛鴦之詞纏綿巧妙班婕妤霜雪之句發越清迥平子桂林理在文外伯喈翠鳥意盡行間河朔詞人王劉為稱首洛陽才子潘左為先覺若乃子建之牢籠㣥彥士衡之藉甚當時並文苑之羽儀詩人之龜鏡爰逮江左謳謠不輟非有神骨仙材專事元風道意顏謝特挺戕伐典麗自茲以降聲律稍精其間沿改莫能正本天縱明眷卓爾不㣥聽新聲鄙師涓之作聞古樂笑文侯之睡以封魯之才追自衞之迹宏茲雅奏抑彼淫哇澄五際之源救四始之弊固可以用之邦國厚此人倫俯屈高調聊同下里思入態巧文隨手變侯調慙其曼聲延年愧其新曲走以不敏謬蒙提及謹申奉和輕以上呈未近詠歌伏深悚恧謹啟側聞魯澤祥麟希委質於宣父吳坂逸驥實長鳴於孫陽是則所貴在乎見知所伸由乎知巳故雕其樸嶧山有半死之桐賞其聲柯亭無永枯之竹伏惟太常伯公儀天聳搆橫九霄而拓基浸地開源控四紀而疏派自赤文薦祉曲阜分帝子之靈紫氣浮仙函谷誕真人之秀本支百代君子萬年道叶神交黃石授帝師之略德由天縱白星降王輔之精峰秀學山列三墳而仰止瀾清筆海委四瀆以朝宗登小魯之巖辨練光於曳馬臨大吳之國識寶氣於連牛垂秋實於談叢絢春花於詞苑辯河飛箭激流翻白馬之津文江散珠圓波潄驪龍之穴是用德茂麟趾削桐葉以分珪道煥鶴池映桃花而曳綬既而揆留皇鑒忠簡帝心奉職春宮爍離光於青殿代工天府明台曜於紫宸綜理元風燮調元氣含輝禮樂皎愛日以流光毓彩文昌映德星而開照若乃識度宏遠器宇疏通明允篤誠盛業隆於后土惠和忠肅元功格於上天則伊陟謝其緝熙巫咸慙其保乂舉才應器與士無私水鏡澄花炫金波於靈府氷壺徹鑒朗玉燭於神機則鄧攸莫際其瀾盧毓罕窺其術故使妍女各安其分輕重不失其權五教克敷百揆時敘折衝千里魯連談笑之工師表一時郭泰人倫之度加以分庭讓士虛席禮賢片善經心揖仲宣於蔡席一言合道接然明於鄭階某蓬蘆布衣繩樞韋帶自弱齡植操本謝聲名中年誓心不期聞達上則執鞭為士王庭希干祿之榮次則捧檄入官私室庶代耕之願然而忠不聞於十室學無專於一經退異善藏進殊巧宦摶羊角而高翥浩若無津附驥尾以上馳邈焉難托實欲投竿垂餌晦名迹於渭濱抱甕灌園絕機心於漢渚幸屬乾坤貞觀烏兔光華嵩山動萬歲之聲德水應千年之色雖無為光宅欣預比屋之封而有道賤貧恥作歸田之賦於是朅來甕牖利見金門指帝鄉以望雲赴長安而就日美芹之願徒有獻於至尊蟠木之姿誰為容於左右明公決幾成務論道經邦一顧之隆駘足逾於仙驥片言之重魚目軼於靈蛇庶望顧兔離箕動薰風於舜海從龍潤礎霈甘澤於堯雲則膾餘之魚希振鱗於吳水膳後之豕翻化龜於魯津拜伏階墀增懼木谷謹啟賓王啟竊惟陰陽作炭化一氣以陶甄天地為鑪混萬物為芻狗然則璧輪均照或流景於萊城玉燭平分獨翔寒於黍谷是汙隆迭襲榮悴相循得氣者繁滋失時者零落伏以君侯疏乾激派龍門開竹箭之波鎮地橫基鵠翅峙蓮花之嶺曜重暉於若月炳謺彩於非烟至若瑞動赤符著元勳於東漢烽驚紫塞宣武功於北征奕葉龍光聯蟬龜紐德由天縱白星降王輔之精道叶神交黃石授帝師之略故得三千運北擊舜海以遊鱗九萬圖南望堯雲而矯翰折衝千里魯連談笑之功師表一時郭泰人倫之度於是九重銜紱懸星彩於宸維四達埋輪振霜威於權石加以分庭讓士虛坐禮賢片善必甄揖虞翻於東箭一言可紀許顧榮以南金賓王蟠木朽株散樗賤質牆面難用灰心易寒退無毛薛之交進乏金張之援塊然獨居十載於茲矣然而日夜相代笑溝壑之非遙貧病交侵思薜蘿而可託欲乘幽控寂進綺季於青山樂道棲真從魯連於滄海幸屬舜門廣闢漢幣交馳遂得佇嘯高邱應箕文而動韻聆吟大野浮艮岫以流陰將恐在藻纖鱗終寡登龍之望棲榆弱羽徒仰摶鵬之高所冀曲逮恩光資餘潤於東里襲承導引托輕夢於南柯撫已多慙循躬增懼謹啟側聞未遇孫陽鹽車無絕塵之迹時逢和氏荊山有連城之珍豈若聽清音於爨餘則枯桐發響收夜光於元璧則怪石騰輝在物猶然况於含識者乎伏惟明使君鳳穴振儀龍門標峻瓊雕岳立表秀干雲霞煥霜霏澄虛鑒物既而代工天府忠簡帝心擁熊軾而撫百城建隼旟而臨千里坐棠敷惠恩纏去思剖竹垂仁式歌來暮清凝夜燭化警晨烏外勖九農內宏五教道之以禮樂齊之以刑書約法遵寬設蒲鞭之恥立言惟信控竹馬之期甘雨隨車雲低輕重之蓋還珠合浦波含遠近之星至如臥理稱難坐嘯匪易披裳問疾垂愛景以字人搴帷廣聽穆薰風而扇物飛霜秋降叶隼擊而防小人零露春濡飾羔旌而禮君子於是仁必有勇吏不忍欺美譽鬱於三齊芳聲騰於萬古若乃清規遠鏡皎月色於靈臺元鑒虛凝穆松風於智府研幾十篋探頤九流縟翠萼於詞林綷仙花於筆苑文江翻浪織玉瀲以韜霞學海驚瀾綴珠連於濯錦加以懸榻待士擁篲禮賢汲引忘疲奬題不倦懷經味道之客望範圍而駿奔兼流包略之夫窺義園以遐集求小善於毫芥顧正禮於二龍振幽滯於泥沙許公明以一驥某淹中故俗體朴厚之清規稷下遺甿陶禮義之餘化頗遊簡素少閱縑緗每蟋蟀淒吟映素雪於書帳莎雞振羽截碧蒲於翰池既而學異懷蛟才非夢鳥價不齊於南漢芳不重於東山幸屬日月光華雲霞紛郁方結羨魚之網將謠扣角之詞奮短翮於槍榆希高標之餘拂濯纖鱗於涓滴望鴻澤之微霑所冀顧盼曲流翦拂增價則鉛刀起一割之用跛鼈致千里之行是知竊混吹於齊竽濫飛聲於郢唱抱山雞而自恧顧遼豕以多慙輕觸威嚴不遑流汗謹啟側聞豐城戢耀駭電之輝俄剖沙邱踠迹躡雲之轡載馳然則激溜侵星佩潛蛟於壯武騰鑣歷塊騁蹀駿於咸陽且煦轍波鱗側羨鼇潭之躍觸籠雲翼扃望鵬程之迅是以齊郊夕唱牛歌掞白石之詞漢境朝趨車候警拂塵之思伏惟某公騰瀾浴景濬靈派以含珠擢幹捎雲翊孤巖而聳桂崇基謺秀匡霸道於周盟茂緒聯輝贊文場於漢戚偉龍章之秀質騰孔雀於觿年叶鳳彩之英資辯蟾精於弱歲靈臺宏遠騁霄練於霜潭冊府幽深絢朝虹於璧渚心波湛漢泳耀魄於黃陂情岳干天韜風雲於嵇巘龍津共濟競欣登御之車蕪室欽賢必攬澄清之轡鬱文條而耀彩藻逸潘花蔚詞鋒而衒奇光浮衞玉然則崑溪既琢必見山川之精樹羽已懸行嗣雲韶之響是以佐龜陰而演化務肅百城翼麟壤以宣風恩覃千里徽猷克著逾盛德於休徵聲績聿宣軼英規於恭祖佩呂刀而邵美已贊褰帷之遊屈龎驥而流芳將騁仁風之駕加以側階引彥鑒鬷子之微言倒屣延賓辯王生之雅量故使圓流之下探照乘於長波高岫之巔剖連城於幽石某瓶筲小器蟭蚊末材環帶嶧桐戢晞暘之厚德傍鄰汶篠慕貫時之貞勁但以容膝一邱曲阜之瓢遽切枕肱五畝成都之壁已窮擔石厭於糟糠負薪疲於裋褐然而少奉過庭之訓長趨克巳之方弋志書林咀風騷於七略耘情藝圃偃圖籍於九流洒惠渥於羊陂屢泛文通之麥峻曲岸於鶯谷時遺公叔之冠雖不能縱逸韻於霜皋唳野致九天之響而頗亦蓄餘香於露薄垂芬有十步之芳而乃恧跡魯鴻非荊山之抵鵲簉名韓犬歎稽阜之橫梁方今玉琯躔秋金風動籟吳宮歸乙望陰岫以依遲素林返雁候陽潮而低舉籝金味道之子侔纁帛以彈冠屑玉含毫之人望弓旌而翹足竊不揆於庸識輒輕儗於揚庭所冀曲逮恩波時流咳唾儻能分其斗水濟濡沫之枯鱗惠以餘光照霜棲之寒女得使伏櫪駑蹇希騏驥而蹀足竄翩翾排鴛鸞而刷羽則捐軀匪恡碎首無辭雖復投報楊金君子以之貽戒效誠魏草小人之所懷恩輕瀆威嚴深懼履尾載塵聽覽迫甚蹈氷謹啟某啟竊聞網澗緝裳傃指雲於偃蓋排虛止棘附絕電於纖離然則左右為容鏘金有階於蟠木無因而至桉劍致懼於連城是以賃牘干榮發仞資於禽息求光抱燧束髮濟於于矒伏惟某官瓊峯聳峭儼曦觀而爭峙瑤派驚瀾泝天潢而比濬漢臺引路夕翊浮雲之陰晉閤垂璫朝煜文星之苑劍池濯彩耀震德於渥津弱水摛祥炫離精於丹穴辨懸瞳於朗鏡肇自觿年對似魄於虧陽光乎弱歲言阿激箭浴紫貝以飛湍情岳驚峯蔽丹霄而傑峻文條擢秀馥長坂之幽蘭筆苑揚葩煜小山之丹桂松飆結韻搢紳藉以雌黃嵓電流光通賢資其月旦於是佐褰帷於魯甸威讋列藩匡露冕於梁陰恩覃絕境緝諧麟甸下白鶴於仙庭輔弻鳧郊重黃金於帝里加以奬拔幽滯汲引英髦錫以吹噓暖燕郊之陰谷延之顧盼焰漢圄之寒灰某篠派庸微桐巖賤伍託根鄒邑時聞闕里之音接閈雩津屢聽杏壇之說加以承斷織之慈訓得銳志於書林奉過庭之嚴規遂容情於義圃方欲閉門却掃養拙以終年幽遁鑿坏甘貧而卒歲直以栖遲五畝獲鷦鷯之數粒蕭條三逕匱侏儒之斗儲雖則放曠林泉頗得閒居之趣而乃寂寞蓬戶唯深色養之憂是以望檄動容慨南陽而聞寂祈名夙駕嘆郢路而依遲方今涼秋屆節嚴飆扇序衡陽極浦振朝音於負霜寒皋迴甸驚宵吟於靜野弓旌之禮斯及辟聘之際是期不揆庸愚輕斯自衒所冀分其末照惠以餘波得預觀光全由咳唾倘雲鑣釋絏申其潄玉之音霜匣開輝照以盤蛟之影則陰山之雀敢懷飡蘂之心漢東之蛇期致投珠之報不勝窘迫之至謹啟某啟昔者薛邑聞歌揖馮驩於彈鋏夷門命駕顧侯嬴於抱關何則志合風雲戴笠均乎乘馬情諧道術忘筌貴乎得魚是以挹蘭言於斷金交蓬心於匪石庶清音動聽賞流水於牙絃妙思通神叶成風於郢匠伏惟公疏源白水浸地軸以輪波纂慶黃軒感星精而誕命綴珠華於七曜聯玉葉於五雲至夫神石摛祥靈鈎表貺千年馭鶴振仙駕於帝鄉七葉珥貂襲榮光於戚里固以紛綸國牒昭晰家聲洎乎鹿走周原輔秦圖而興霸蛇分沛澤翌唐運以開基常山王之玉潤金聲博望侯之蘭薰桂馥羽儀百代掩梁竇以霞搴鍾鼎一時罩袁楊而岳立故得重規遠鏡湛月路以流清茂祉遐鋪架雲門而擢秀英飛鳳穴藻五色以凝華穎躍龍泉涵九重而毓潤風情踈朗霜明月湛之資氣骨端嚴雪白氷清之概若乃性符神授道擅生知挫三端於情峯朝九流於學海博聞強識辯晉國之黃熊將聖多能識吳門之白馬言泉潄迥驚瀑布以飛瀾文江澹清含濯錦而翻浪鬱槐市而增茂穆蘭室以流芳於是翔鱣應符觀光上國飛龍成卦利見大人摶羊角以垂天展驥足而騰景化貳藩邸紹敬祖之清廉光贊外臺陳君回之亮直推公平而折獄磔鼠謝其嚴明擁端慤而字人化蛇慙其智勇加以清規日舉湛虛照於氷壺元鑒露凝朗機心於水鏡謙光自牧恭巳愛人片善必甄揖虞翻於東箭一言可紀許顧榮以南金某疾抱支離材均擁腫進不能握蘭分竹綰銀黃於雲臺退不能絕粒茹芝煉金丹於地胏而出沒風塵之內淪漂名利之間游無毛薛之交仕乏金張之援塊然獨處者一紀於茲矣然而日夜相代恐溝壑之非遙貧病交侵思薜蘿之可托常願處幽控寂追夏黃於商山樂道棲真從魯連於滄海豈圖語默易爽心迹難幷題橋之恨愈深攀桂之情徒結是用絕深乾沒躭閱邱墳謁子將於南荊訪康成於北海西遊梁益效司馬王揚之風東入臨淄慕淳于管晏之智瞻言前古徒欲思齊俯惟當今空勞懷刺不意雲浮礎潤霜落鐘鳴揖郭泰於仙舟有道斯在賞鬷明於樽俎盛德猶存雖雅調清歌誠寡和於郢路而庸音濫吹竊混奏於齊竽輕撮課囊揄揚盛德庶金波離畢零陵之石自飛瑤光建寅蕭邱之火漸爇學慚麟角德類鴻毛愧汗如漿憂心若厲謹啟賓王啟每讀書見古人負米之情捧檄之操未嘗不廢書輟卷流涕傷心何則情蓄於中事符則感形潛於內迹應斯通而悅帝力以栖魂情欣養素仰皇華而暢慮敢用披丹伏惟公源控玉輪激神濤而涵地基疏金闕架飛岊以韜雲洎乎鹿走周原霸燕圖於即墨蛇分沛澤封漢爵於華城福祿攸鍾公侯必復炳靈丹穴習吉黃裳若乃峯秀學山列三墳而仰止瀾清筆海委九流以朝宗登小魯之山辯練光於飛馬臨大吳之國識寶氣於連牛垂秋實於翰林絢春花於文苑清規湛秀照月旦而雕談素論凝元開夜光於妙辯既而業成麟角引茅茹而彈冠道映鳳池絢桃林而曳綬揆留皇鑒忠簡帝心奉職春宮標離光於青殿代工天府明台燿於紫宸故得龍綍垂光戢兩星而開照鶴蓋浮影翼五雲以連陰某大塊流形小人餘慶幸河神入昴映白榆以流祥江使負圖泛青蓮而薦兆薰風廣扇聖日多煇進不能高議雲臺談社稷之上務退不能銷形地胏揖箕潁之餘芳而出沒風塵湮淪名利十年無棣萬里惟桑既而日遠長安出蓬門而西笑雲飄吳會遡松浦以南浮冀塵迹邱中絕漢機於俗網承歡膝下馭潘輿於家園不悟地絡遐張維白駒於空谷天羅迥布弋黃鶴於高雲顧巳駑鈍並從媒衒力農賤事未免東皋之勞反哺私情遽切南陔之詠少希顧復輒布悃誠雖噬指思歸空軫倚閭之望而囓臂求仕非圖高蓋之榮明公資孝履忠恕己及物惟幾成務論道經邦庶顧兔離箕動薰風於舜海從龍潤礎霈甘雨於堯雲則白羽書生自銘恩於食稻黃裳童子將賽德於餐花拜首迴惶傾心霂謹啟賓王啟側聞樞精嘯谷韻清瀨於驚蘋震德昇乾靉元枝而布暖雖涸鱗濡沬尚觖望於鯨波而決羽搶榆頗思遷於鶯樹伏惟公瓊基謺秀積珠構於三龍玉翰驚華煜瑤林於八桂仙飛有道縈河泛高尚之舟德驗通神靈策動幽明之鏡產耶溪而濯質霜鐔廓豐匣之姿孕鍾嶺而飛華虹玉絢荊巖之氣松秋表勁翊赬霞而插極菊晚馳芳涵清露而炫沼鑒懸龍鏡明逸照於咸陽韻入鳧鐘驚洪音於長樂心源泛藻控鼇壑以朝宗情嶽披蓮掩龜岑而作鎮惠牛曜辯驚荀鶴於談叢揚鳳摛文詠鄒龍於筆海故佐銅章於磬渚側扇文鰩之風貳墨綬於銅郊讚誘祥鸞之化絃揮單父弻清韻於嵇琴化洽中牟翊馴翬於潘雉加以延賓置驛接士軾廬採拔芻微邁欽賢於司馬提奬幽滯軼取俊於淳于某甕牖輕生席門賤品幸以參名比屋悅康衢以自娛預迹耦耕欣日出而知作又以家傳素業弋書林而騁志少奉庭訓馳文圃以遊魂至於白簡青箱頗測探其奧旨竹書石記亦幽求其邃原雖未能呌徹帝閽聲馳宰府而頗亦見推里閈譽浹鄉閭方今銀箭纏秋金壺應節吮墨翹足希造杖於一枝味道彈冠望橫經於重席不量庸昧竊冀揚庭伏乞恩波暫垂迴盼倘使陳留逸調下探柯亭之篠會稽陰德傍眷餘溪之蔡則迴眸之報不獨著於前龜清亮之音誰專稱於往笛雖滄溟遠量敢不愧於牛涔而嵩岱洪恩終曾酬於蟻垤輕喧視聽憂讋惟深猥瀆階庭兢惶交集謹啟竊聞薛邑聞琴揖馮諼於彈鋏夷門佇駕顧侯嬴於抱關何則志合風雲戴笠均乎乘馬情諧道術忘筌貴乎得魚是用挹蘭言於斷金效蓬心於匪石庶清音動聽賞流水於牙絃妙思通神叶薰風於郢匠伏惟某公儀天峙構層基控射牛之峯浸地開源驚濤疏釣鼇之浦至夫封侯廟食掩金張以騫翥三主七公罩袁揚而岳立故得重規遠鏡湛月露以流清茂趾霞鋪駕雲門而擢秀若乃博聞強記辨晉國之黃熊將聖多能識吳門之白馬言泉潄迥驚瀑布以飛瀾文江澹虛涵濯錦而翻浪於是功超食跖位典烹鮮水鏡澄瀾照孤鸞之舞影鳴琴動操叶馴翬之雅音既而盛德有隣佐皇華而省俗居㣥不器扈輶軒而觀風某疾抱支離材均臃腫自弱齡植操本謝聲名中年誓心不祈聞達始則執鞭為仕帝里希干祿之榮次則捧檄入官私庭庶代耕之樂然而忠不聞於十室學無專於一經退異善交進殊巧宦摶羊角而遐翥浩矣無津附驥尾以上馳邈焉難託實欲垂竿投餌晦名迹於渭濱抱甕灌園絕機心於漢渚幸屬乾坤貞觀烏兔光華嵩山動萬歲之聲德水應千年之色雖無為光宅忻預比屋之封而有道賤貧恥作歸田之賦明公顧盼成飾咳唾為恩漏微潤於江波流末光於隣燭幽禽遷木侶丹山於帝梧鳴石浮川應黃鍾於僊管敢布心也詎能望焉謹啟謹桉此據永樂大典本採入與今傳本詳略互異附載其後靈隱集上梁明府啟云昔者聞歌薛邑賞彈鋏於馮驩佇駕夷門揖抱關於侯子豈惟成風之斲妙思通神流水之絃清音入聽況夫志合者蓬心可采情諧者蘭味寧忘伏惟公儀天聳搆層基控射牛之峯浸地開源驚濤疏釣鼇之浦至夫封侯廟食掩金許以霞搴三主八公罩袁楊而岳立於是功超振鷺位典烹鮮水鏡澄瀾照翔鸞之舞影吟琴動操叶馴雉之雅音既而盛德有鄰佐皇華而撫俗君子不器扈輶軒以觀風某蒲石橘遷聲鄉蓬轉不叶十室無專一經攀驥逸而無由仰鵬飛而自失公顧盼成飾咳唾為恩庶微潤於江波冀末光於鄰燭使幽禽遷木侶丹山於帝梧鳴石在川應黃鐘於僊管敢布心也詎能望焉謹啟賓王啟昨引注日垂索鄙文拜手驚魂承恩累息楚翬丹質在荊南以懷慙遼豕白頭望河東而載恧賓王散樗易朽蟠本難容雖少好讀書無謝高鳳而老不曉事有類揚雄徒以易象六爻幽贊通乎政本詩人五際比興存乎國風故體物成章必寓情於小雅登高能賦豈圖榮於大夫蓋欲樂道遺榮從心所好非敢希聲刻鵠竊譽雕蟲至若資醜行以自媒衒庸音而苟進固立身之殊路行巳之外篇矣君侯蘊明略以佐時虛靈臺以照物觀梁父之曲識臥龍於孔明聽康衢之歌得飯牛於甯戚是用異人翹首俊乂歸誠獨此疵賤之姿謬奉清通之盼雖仲由之瑟終闕響於邱門而宋玉之謠儻均音於郢路敢忘下里輕用上呈庶道叶起予陳卜商之四始恐吾幾失子效然明於一言拜首增慙憂心如醉謹啟
