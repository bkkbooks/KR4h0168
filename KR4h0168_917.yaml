body:
  text: 朱校書至猥辱書問並示孟處士碑篆端由捧讀彌日抃躍無次夫旌善人採遺美蓋有位君子之所行志豈伊薄劣敢議發揮言輕賜重益用惶駭又於朱校書處恭覩製作約數十篇高格侔山嶽迅勢擬波濤邁氣薄雲霄遠思躡鴛鴻當世翰墨都無此手臟腑恍恍至今悸動斯可謂煥乎文章也一昨奉辭伐罪統貔虎之師沈謀偉略洞入神鬼以鎮則有制以戰則有威巍巍赫聲振怛寰海斯可謂盛乎武事也文武吉甫佐天子贊襄使姦臣賊子無萌芽於禍亂者我尚書之謂矣小人君子咸知幸甚某一凡夫也棲遁匡廬垂二十年讀書不及於豎儒把筆才過於常談泯泯人事鄰乎強仕斯亦不足畏也然徒欲有愚妄之意愛大名慕大節懸芳竹帛為千古榮勤勤懇懇正謂此耳小子聆閣下之事業英姿豪韻迥如古人私心歡喜動作顛沛况前旨稠謺猥賜誘喻令一至峴首一作山追賞風景一作光小生何人當此珍重誠宜奔走拜伏旌麾間識征南之儀觀揖當陽之談話凝襟滯想從茲泄露屬入夏多病氣力衰羸火雲始生道路且遠瞻仰尊重魂爽飄然若望溟海未知濟涉如此誠激何緣上達唯有牘可寄肺腸今故持差祇承人呂及自潯陽專往奉狀塵獻鈴閣伏惟鑒察愚朴不責狂瞽幸甚幸甚候問起居之禮謹俟異日此無多談權三從事足下傳吏至辱書謬蒙發揚殊增悚恧觀其立言典麗文明意精實耳目所未接也幸甚幸甚貧道隳名之人萬慮都盡強留詩道以樂性情蓋繇瞥起餘塵未泯豈有健羡於其間哉初貧道聞足下盛名未覩製述因問越僧靈徹闕古豆盧次方僉曰楊馬崔蔡之流貧道以二子之言心期足下日已久矣但未識長卿子雲之面所恨耳先輩作者故李員外遐叔故皇甫補闕茂正故嚴祕書正文故房吳縣元警故閻評事士和故朱拾遺長通故處士韋此數子疇昔為林下之遊遐叔當時極許貧道四十韻之作其略曰中宵發耳目形靜神不役色天夜清迥花漏明滴瀝東風吹杉梧幽月到石壁此中一悟心可與千載敵又曰不然作山計改服乘下澤君隳元亮冠我脫潛師屐各倚高松根共逃金閨籍又能秀二祖義門讚其略曰二公之心如月如日四方無雲當空而出遐叔因此相重元警著道交論比於高雲獨鶴意謂關於詩而不關於事貧道亦無推焉今再遇足下見知則東山遺民時免檘琴絶弦於知已矣靈徹上人足下素識其文章挺拔王褱奇自齊梁以來詩僧未見其偶但此子跡冥纍遷心無營營雖然至於月下風前猶未廢是公遠之友豆盧次方才識超邁所得經奇飄飄然有淩雲之氣而不輕浮此乃山僧惠眼遠見亦嘗與論物理極天人之際言至正意不虛誕足下精鑒豈無此子乎在於貧道不得不言耳承索弊文見已繕寫問元二十一判官木夾中緘封甚難以此未及寄上彼來使無限請近作三五章至至之言旁通我法佇以適山情助禪教耳幸甚十二月二十日皎然白自湖上一辭十有餘載公貴為方伯晝跡在空林出處殊疏音塵不接蓋理然也晝從辭後自謂年多志固名疏道親惟慕空門若有所詣然未曾遇知已嘗戲為一章自詠曰樂禪心似蕩吾道不相妨獨悟歌還笑誰言老更狂昔謝太傅每賞支公善標宗要若九方堙之相馬略其元黃而取其駿逸晝今日於公即道林逢太傅之秋也又晝於文章理心之外或有所作意在適情性樂雲泉亦何能苦健羡於其間哉頃者目疾相嬰濛濛如隔煙霧兼患腳氣行李不進昨承至止病中不獲躬詣門闌披敘離濶形礙神往有所恨也謹馳狀兼雜文晝性野思拙機淺忽若偶中風律終期匠者賞鑒不遺幸甚幸甚釋晝白改年伏惟永感罔極晝之理心本在忘情及經節序惘然悲愴去嵗馬某往已奉狀計上達孟春猶寒伏惟中丞尊體萬福即此晝蒙免一昨見秋晚離披菊一章使晝却顧鄙拙盡欲焚燒凝思三復彌得精旨中丞寄重任大堆案日盈而言詩至此豈非凝心悉到耶今海內詩人以中丞為龍門賢與不肖雷同願登仰測中丞之為心固進善而拒不工也晝無西施之容不合輒議西施之美然心之服矣其敢蔽諸今之馳疏實有所薦有會稽沙門靈徹年三十有六知其有文十餘年而未識之此則聞於故祕書郎嚴維隨州劉使君長卿前殿中皇甫侍御曾嘗所稱耳及上人自浙右來湖上見存竝示製作觀其風裁味其情致不下古手不傍古人則向之嚴劉皇甫所許疇今所覿則三君之言猶未盡上人之美矣讀其道邊古墳詩則有松樹有死枝冢上唯莓苔石門無人入古木花不開答范祕書作則有緑竹嵗寒在故人衰老多雲門雪夜作則有天寒猛虎呌巖雪松下無人空有月千年像教人不聞燒香獨為鬼神說石帆山作則有月色靜中見泉聲深處聞題李尊師堂則有古廟茅山下諸峯欲曙時真人是皇子玉堂生紫芝題曹溪能大師蔣山作則有禪門至六祖衣鉢無人得登天姥岑望天台山作則有天台衆山外嵗晚當寒空有時半不見崔嵬在雲中傷古墓作則有古墓碑表折荒壠松柏稀福建還登黎嶺望越中作則有秋深知氣正家近覺山寒九日作則有山僧不記重陽日因見茱萸憶去年宿延平津懷古作則有今非古獄下莫向斗間看又有歸湖南詩則有山邊水邊待月明暫向人間借路行如今還向山邊去惟有湖水無行路此僧諸作皆妙獨此一篇使晝見欲棄筆硯伏惟中丞高鑒宏量其進諸乎其捨諸乎方今天下有故大賢勤王輒以非急干請視聽亦昭愚老不達時也然上人秉心立節不可多得其道行定慧無慙安遠嘗著律宗引源二十一卷為緇流所歸至於元言道理應接靡滯風月之間亦足以助君子高興也晝疾弊未期奉展伏深瞻望近應府公三五首謹憑靈徹上人呈上年暮思蹇多慮迷錯所希宗匠一為指瑕幸甚幸甚晝白夫詩者衆妙之華實六經之菁英雖非聖功妙均於聖彼天地日月元化之淵奧鬼神之微冥精思一搜萬象不能藏其巧其作用也放意須險定局須難雖取繇我裏而得若神表至如天真挺拔之句與造化爭衡可以意會難以言狀非作者不能知也洎西漢以來文體四變將恐風雅浸泯輒欲商較以正其原今從西漢已降至於我唐名篇麗句凡若干人命曰詩式使無天機者坐致天機若君子見知庶有益於詩教矣貞元初余與二三子居東溪草堂每相謂曰世事喧喧非禪者之意假使有宣尼之博識胥臣之多聞終朝目前聆道侈義適足以擾我真性豈若孤松片雲禪坐相對無言而道合至靜而性同哉吾將深入杼峯與松雲為侶所著詩式及諸文字併寢而不紀因顧筆硯而笑言曰我疲爾役爾困我愚數十年間了無所得况爾是外物何纍乎我哉住既無心去亦無我今將放爾各原其性使物自物不關於余豈不樂乎遂命弟子黜焉至壬申夏五月會前御史李公洪自河北負譴遇恩再移為湖州長史初與相見未交一言恍若神合余素知公精於佛理因請益焉先問宗源次及心印公笑而後答溫兮其言使寒藂之欲榮儼乎其容若春冰之將釋余乃受辭而退他日言及詩式余具陳夙昔之志公曰不然因命門人出草本一覽而歎曰早嵗曾見沈約品藻惠休翰林庾信詩針三子之論殊不及此奈何學小乘偏見以夙昔為詞耶再三顧余敢不唯命因舉邑中詞人吳季德即梁散騎常侍均之後其文有家風余器而重之昨所贈詩即此生也其詩曰別時春風多掃盡雪山雪為君中夜起孤坐石上月公欣然因請吳生相與編録有不當者公乃點而竄之不使琅玕與碔砆齊列勒成五卷粲然可觀矣語曰死生有命富貴在天蓋垂教之意也或曰盜跖日殺不辜而終天年顏回積仁纍行而不幸短命天之報施是耶此皆本於天也今請以釋氏論之夫生生之理罔有不關於業則報施有歸報施有歸則因果不爽因果不爽則空見不生有去來三世之殊故巨細必顯有染淨二心之別故涇渭既分性自我能命自我有豈神授而天與乎涅槃經云無有自作他人受果豈怨天尢聖乎知遍計有如龜毛兔角決定無也依他緣生非自然也圓成寶性體則妙有相乃真空其一切恆沙功德不周靈空無為而無用也右若沙門法海字文允俗姓張氏朱方人也圓入一性學階空王擅當代獨悟之名剖先賢不決之義一時學外儒釋該通六書究其源流三易窮於變化嘗謂豫曰佛法一門獨開心地皆椎輪也於戲天造溟涬惑網高張非大圓真詮曷能示明明之義俾㣥生知正修之路哉日者象季之數吾道陵夷朋溺妄空謂無因果公乃救將弛式紙反之教哀弱喪之子其報應昭驗見聞可憑者因採而記之編為三卷鱗羽有性之類亦皆附焉以為動物尚爾而况於人乎况於鬼神乎下以軌正於邪宗以上裨益於真理若佛日未墜於地庶幾將有證焉山陰有古臥石一枚即晉永和中蘭亭廢橋柱也大歷八年春大理少卿盧公幼平承詔祭會稽山攜至居士陸羽因而得之生好古者與吾同志故讚云古橋石柱亭亭殊類渾璞璘玢亂錢蒼翠遺在蘭渚遷於客位雲狀未銷水痕猶潰在物頗重則人無棄石豈有心求人所貴若瓊與玉呈瑙蘊異如彼陸生不文其器此猶可轉豈君同志我師西來傳於真訣大輪當路小乘忘轍冥冥世人初見日月權迹有歸光雲不滅我立三觀即假而真如何果外強欲明因萬像之性空江月輪以此江月還名法身裁玉為璧一體殊稱二聖淵淵果名同證安贊天后寂佐元宗卷道就迹與時從容邈邈安公行越常致高天無言九有咸庇大海無心百川同味不授心印但以無言應世而物無不化曈曈大照有跡可覩不異六宗無慙七祖禪岡一傾人天何怙二公之心如月如日四方無雲當空而出三乘同軌萬法斯一南北分宗亦言之失大動之地我安其中高景無氛靈鶴在空出生死厄隨物有終牙夊廠刀形駭俗借繢開蒙常攜刀尺精意誰通觀淨之筌斯言不住四色蓮花白花為喻應知離相或未圓通吾師惠心雲開天空真見之體知而不知性猶無主禪何有支我本圓寂湛而不移聿來化人慈力所為繪工匠意通幽若菩薩出現湛兮凝心於內怡然示相於表非法王妙用何哉誰其主之即湖州刺史諫議大夫樊公夫人范陽縣君盧氏所造也初夫人有恤允之兆嘗念觀音夢雲初懷育月方誕命曰是女且不正名蓋取宜子之意也公以積德樹仁膺其錫羡雖菩薩大慈不昧亦江漢間氣所鍾詩云維嶽降神生甫及申斯蓋申甫之儔乎於戲至誠既敷上願思答乃於寶勝殿內按經圖變祇於壁上觀示現之門不捨毫端禮分身之國詞曰聖人之體兮有而無迹至人之心兮用而常寂公之小君兮惠性造微我之大士兮慈心莫違保幼子兮永貞無悔覿真儀兮常明不昧慈為雨兮惠為風灑芳襟兮襲輕珮佛以大慈療生死巨瘵示藥師名以大知證圓明妙身受琉璃稱無私之鑒湛乎不動誠懇之至感而遂通湖州刺史諫議大夫樊公夫人范陽縣君盧氏得之矣頃因懷妊默念於心先徵佩印之祥載見懸弧之至遂圖此變以答佛慈光射金扉日月不開於天上影朧珠綴煙霄自出於壁間東方如來瞻仰長世輒揚盛美有愧謏才詞曰藥師之仁隨心至兮十二上願慈不遺兮琉璃之身為我示兮八十種好相畢備兮繪像報德公夫人兮初祝允子果克禋兮早見才童邁人倫兮將成大器應甫申兮如來惠父長可親兮貽厥孫謀壽萬春兮烏程魯邑異日同風洋洋絃歌復聞我公元真跌宕筆狂神王楚奏鏗鍧吳聲瀏亮舒縑雪似頒彩霞狀點不誤揮毫無虛放藹藹武城披圖可望咫尺之內天高水清月疑山吐風恐松聲晴雨雲住春冬草榮比公為政德暖生成盛烈暉暉雙揚厥靈誰識英姿披圖宛在月動光芒風生神彩勻毫點眹天質無改聽似欲言窺不敢怠佩可鳴玉冠宜附蟬鸞翔鶴顧志氣翛然侯伯之量於斯鑒焉性正氣高外爽神徹遠人瀅渟秋天寥泬鋭工傳逸點漆開頤風儀秀發毫髮無遺當獨立處似不言時如嚬如顧何慮何思披影相對真身是誰畫與理冥兩身不異淵情洞識眉睫斯備欲發何言正思何事一牀獨坐道具長隨瓶執堪瀉珠傳似移清風拂素若整威儀識洞才高天貸神與霜縑之上逢君不語聳聳山立翹翹鶴舉置之巖石邈然無侶虎頭將軍藝何極但是風神非畫色方顙明眸亦全得我豈無言道貴默雙飛曙起趺坐時百千門人自疑惑東漢始有佛塔之制或冶金埏壞琢珉雕杼觸類可作蓋惠門之扃鐍也我唐大歷丁巳嵗建子月某日沙門某洎居士若干人於思村東北古隄之上樹修塔焉粉櫺素簷炯如雪積雖埃氛晝晦月魄宵淪重重入空千里可矚使夫倦鳥有托迷客知歸燎叟韜弧以革心漁童卷緡而易慮作者之志其仁溥哉崇崇靈塔掃氛孤出平砌沓雲層輪麗日瓊容皓曜雁影依稀初驚地湧忽視天飛塔何情矣監惡斯止塔何言哉誘善不回至人默默與我同德寂語忘教而人自效明明者闕一字曷可齊焉上階於天下窮於淵深谷為陵其功不騫水月無根緣生則有莫辨其端莫窺其後以有為瑕以無為垢不廢不立誰觸誰受寂念淵元紛然何咎魏晉中穎邁之士多尚出塵白足高步於海隅青目遐視於湘表千有餘祀禪律師宗吾知若人出秉伊說之鈞處躡黃綺之躅亦躬圭之與和璞隱顯之殊乎我律師其人也法諱道先俗姓褚氏踰齔出家方冠受具詣光州和尚學通毗尼於時夏淺德崇壇場屬望蓋天賚真士為東南義虎雲雨慈味笙鏞道聲常持法華兼創佛廟洎沒身不怠也世壽七十九惠壽五十八上元庚子嵗仲秋月示滅於本寺是日馳陽昧昧雨颸颸烈風崇朝嘉禾為折乃東土福盡之徵也俄然喜氣五色亭亭如蓋移晷不散遍映精廬即西方往生之意也初吾師未歿其月三日質明支疾凝神視色觀身彌陀具相忽現師前滿庭碧花昔所未覩其四日昧爽有異人請師謂師為和尚遂開目彈指曰但發菩提心五之日曼陀羅華自天而雨悲夫非哲匠去世安至是耶門人神烈義精等攝齊何仰繞塔徒哀履名跡而可師書琬玉之不墜詞曰我法未季哲人是生真慈在物澤灑飈清高戒嚴身佩月與瓔貽訓徒張逝不可作瑞花冥濛卿雲縈薄靈轜何止於此山椒寒鼯斷續影塔蕭寥五峯諸子泣望終朝夫萬有朝徹獨立而不改其妙空乎洎鴻濛以還民溺情海安不幻之跡喪全真之旨若識浪不作幻何有哉我釋迦本師獨開宗極遽而告滅降蘊魔也在而言逝為狂子也以八萬四千正法首付飲光飲光以下二十四聖降及菩提達摩繼傳心教有七祖焉第六祖曹溪能公能公傳方巖秉策公乃永嘉覺荷澤會之同學也方巖即佛川大師也大師諱惠明俗姓陳氏漢太邱長實之後世居潁川顯祖某永嘉南遷為司徒掾陳氏受禪四代祖仲文有佐命之勳封丹陽公祖某雙溪穀熟二縣宰考某蘭陵人也大師雖世有榮閥而未嘗自稱蓋處塵世之餘纍矣先夫人初感之日如持佛戒足惡履於葷圃口不嘗於鮮器神夢髣佛長聞法音既而誕焉年漸及丱方祈捨俗大人從之至受具時即開元七年也耳未誘於聲戒眼不瑕於色塵清行剋終如鑒寒玉嘗謂人曰昔者繁刑首作伯成子高遁焉吾雖不捨律儀而惡乎淨論紛若心即心之法至矣哉西詣方巖頓開心地於戲冥冥其機赫赫其師寂乎大空之淵而不疑放乎萬緣之律而不變天寶年將有願於清涼山淮汴阻兵師乃旋策偶與禪侶西之宛陵闕文於上石為神明奈何使我蒼生每被血食豈知此事殃爾業耶神曰非弟子本意人自為之禮懺再三大師乃授以菩薩戒神欣然曰若和尚移寺弟子願捨此處永奉禪居言畢不見其後果移寺焉於祠側獲銅盤之底篆文是吾師法號更有異器略而不書建中元年春忽顧左右愀然而歎曰夫人生百年蓋一念耳昧者安知揭日月以趨新哉吾將往淨方爾曹勉之於時報年八十四僧臘五十一以其年正月十一日有疾其日庭木春悴山雨畫冥猛虎繞垣悲嘯而去十二日奄然長往二月十二日建塔於佛湘川西山有慈烏滿林舉衆驚異受法門人自湘淮楚不遠而至有若孤秉律網默持心印惠解比邱即其人也德與物敷言隨性寢聲采不飾世謂渾金惠敏比邱即其人也外學以文內修心行跡不疑聖機能造微如知比邱即其人也菩薩戒弟子刺史盧公幼平顏公真卿獨孤公問俗杜公位裴公清惟彼數公深於禪者也謝太傅之通於宗要殷深源之造於精微常恐大師之言將墜於地顧謂小子志之豫曰必使覩至人之奧知地位之極則未敢聞命若盛美之跡人所見聞何嘗敢忘請退而記之刻諸靈石詞曰青山我廬白雲我曹吾師處焉人遐跡高跡高伊何降心鍊魔傳教方巖傾珠竭河持而不檢放而不過匪雲異月如水與波見獨超超證法無兩生死誰羈我不可鞅若搖空輪如蹴風響何為告滅亦由狂子忽示雙桐空棺隻履佛去川在人亡寺留使吾舊境寂寞長秋泣露草繁悲風樹滿此物無心盡如凄斷門人千萬昔為法來悟者不蹙常情自哀祥花雨墜靈峯晝開真子相顧全身在哉天作高山山孕人靈其間氣則賢人當之而動用有異夫黃鶴遊於天驪龍樂乎淵從其性也賢人治世則匡贊我后出世則誕敷上乘圯山禪祖其人也師諱神悟字通性隴西李氏之子其先屬西晉板蕩遷家於吳之長水世襲儒素幼為諸生及冠忽嬰業疾有不可救之狀咎心補行力將何施開元中詣前溪光律師請醫王之方執門人之禮師示以遣業之教一日理懺二日事懺此神聖所授行必有徵遂於菩提像前秉不屈之心爇難捨之指異光如月朦朧紺宮極苦可以感明神至精可以動天地蓋菩薩之難事歟洎天四中受具足戒身始披緇天八中舉尢異行名隸寺逮其晚節益見苦心每嵗置法華道場九旬入長行禮念觀佛三昧於斯現前因語門人曰夫陰薄日而何傷風運空而不動苟達於妄誰非性耶方結宇於勞勞山東中據石圯達分仙渚猛獸馴於禪榻祥雲低於法堂中夜有山神現謂禪師曰弟子即隋故新成曹世安生為列侯死典南嶺今和尚至止願以此永奉經行言訖隱而不見故吏部員外李公華今殿中侍御史崔公益嘗問孔老聖教優劣於吾師對曰路伽也典籍皆心外法味之者勞而無證其猶澤朽思春乾水取月之相去天何遠乎去辛卯年春寢疾大漸於戲悼死樂生下士之事吾師了性空豈關情哉便趺坐告終歸於寂樂其時世壽六十三惠壽二十六闍維之日獲舍利五百餘粒珠顆纍纍燦然在矚蓋由專精所致門人湛一圖一潔身力行夏淺功崇亦分河不絶之意也吾聞古之君子生有名而死有諡勳業昭乎彞器針規煥乎方冊何有哲匠作人天師遺德不書吾誰仰則銘曰聲傳於籥剖之無根象出於鑒窮之不源至人應物體寂名存寂可神照名宜性泯妙用無生示生而盡燈留火續骨化珠分真子徒仰慈聲不聞堂披遺影地起方墳萬木春析諸天晝曛年年世上空望歸雲
