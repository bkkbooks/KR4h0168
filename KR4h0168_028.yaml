front:
  text: 全唐文欽定全唐文卷二十八元宗九
  hash: sha256:0916e9fe6cd247e301c1d95ef6eee55b186493e61e5593ee9f641500a8e63c76
body:
  text: 兩京來去乃是尋常緣頓所須皆用官物至於百姓縱暫祗承處置有條不合辛苦其中侵擾莫非橫干或漁獵畜養以將進獻觸途使役以徇聲名實由紀綱未樹教令不行去年從京向都嘗亦處分蒲州刺史程行湛同州刺史李朝隱陝州刺史姜師度至其州界咸有進奉惜其能官善政乃屈法收情憶至於今豈能無怪冬中西幸不可踵前其有輒進送及餉遺從官弁別有煩擾者必科以法御史明加糾察隨事奏聞有司及奏事皆合對仗公言比日巳來多仗下獨奏宜申明舊式誥語令知如緣曹吏司細務及有祕密不合對仗奏者聽仗下奏朕於百事考之無如文籍先王要道盡在於斯是欲令經史詳備聽政之暇遊心觀覽修身貴乎慎始篤學在乎自幼朕諸子巳各髫丱須聞詩禮宜於儒官中選德行耆宿三五人入閤教授朕自臨御天下介於人上萬邦在念百姓為心慎日以兢因時載惕眷茲茂育寧忘鑒寐今歲河南諸州頗多水潦稼穡不稔閭閻阻饑方屬西巡更深東顧不加存問孰副優軫宜令工部尚書劉知柔馳驛充使往河南道巡歷問應免租庸及賑恤並量事便處分兼察人民冤苦官吏善惡還日奏聞宋亳陳許之閒遭澇尤甚其應緣賑恤宜倍優賞明經進階雖著於甲令儒道敦俗宜申於舊章其選人有能仕優則學所業不廢者當在甄收以示勸獎其能舊經外更業者準初出身例加階比每晝至側景夜至分宵期聞政要用忘寢食但能會理不責其文貝州張希嶠上表詞義鄙淺有同諧弄據其不遵理度固合與罪恐後來正直其謂我何故特矜愚不置於法且令河南府示語遞還本貫調斂惡繁差科在每思量人賤畜之政輕徭薄賦之宜廄馬略配於諸軍課駒總留於畜牧則應稅之草不假循前今年所支巳減舊數可於此數內更三分減一孝經者德教所先自頃以來獨宗鄭氏孔氏遺旨今則無聞又子夏易傳近無習者輔嗣注老子亦甚甄明諸家所傳互有得失獨據一說能無短長其令儒官詳定所長令明經者習讀若將理等亦可兼行其作易者兼帖子夏易傳共為一部亦詳其可否奏聞孝經尚書有古文本孔鄭注其中指趣頗多蹖駁精義妙理若無所歸作業用心復何所適宜令諸儒併訪後進達解者質定奏聞朕以全經道喪大義久乖淳感之性浸微流遁之原未息是用旁求廢遠及缺文欲使發揮異說同歸善道永惟一致之用以開百行之端閒者諸儒所傳頗乖通義敦孔學者冀鄭門之息滅尚今文者指古傳為誣偽豈朝廷並列書府以廣儒術之心乎況孔鄭大宗固多殊趣諸生會議曾無所申而推求小疵其細巳甚聚訟之訛人無則焉其何鄭二家可令仍舊行用王孔所註傳習者希宜存繼絕之典頗加獎飾子夏傳逸篇既廣前令帖易者停在於朕躬庶事戒慎天下或恐不稱所望卿為朕耳目焉上天降省良有以也深輔朕之不逮朕以匪德嗣膺丕命雖日慎為誡政期以康而天災流行誠或未感自孟秋在雨澤足永念農畝用懷宵旰在予之責萬方何罪視人如傷一物增怵且夫修政之要恤刑之重雖得情勿喜寧僭無濫將恐此輩猶有冤人或傷於和而作此厲法惟明慎事藉躬親故爰加案省開其幽滯雖士師不冤時稱閱實而愚者自陷朕甚愍焉故屈常法特申寬典爰自春首頗甘澤眷茲近甸將損嘉苗人天謂何夙夜增怵豈刑罰莫省罪獄其紛倘致吁嗟是生災亢故京師囚繫親慮原減而郡縣狴牢將何慎恤平分之道載軫於懷天下諸州見繫囚徒宜令所繇長官便慮有司即此類作條件處分今月之初雖降時雨自此之後頗甘液如聞側近禾豆微致焦萎深用憂勞式資祈請某禱則久常典宜遵即令禮部侍郎王邱太常少卿李暠分往華嶽河瀆祈求比來書籍缺亡后多錯亂者良由籍歷不明綱維失序或須披閱難可尋今麗正殿寫四庫書各於本庫每部別為目錄其與四庫目不類者依劉歆七略排為七志其經史子集及天文以時代為先後以品秩為次第其三教珠英既有缺落宜依書目隨次修補朕當披覽無使缺遺東都道俗有來請駕者東西來去雖則為常每歲來請豈能無擾宜以禮告示仍於朝堂賜食即發遣并勅陸象先莫令更相倣效儒道惟百王之政元良乃萬國之貞屬太學舉賢賓庭貢士當其謁講故行齒奠所以宏風闡教尚德尊師宜有頒賜以承光寵陪位官一品宜賜五十匹二品三品四十匹四品五品三十匹六品七品二十匹八品九品十五匹緣行禮及職掌者各遞加一等六品以下五匹為等五品以上十匹為等坐主加二等學生賜物三匹待舉者及諸方貢人各賜五匹皇太子以守器之重有成人之量屬陽和肇歲甲子惟日加乃元服循於舊章慶因雷洊歡洎雲上王公卿士中外寀寮布以慈惠廣茲頒賜應在會官一品一百匹二品九十匹三品八十匹四品六十匹六品五十段七品四十段八品九品二十段諸州都督刺史上佐諸軍及副使亦同在會例宜以當處物給朕臨御寰極永思政理黃屋成屈己之勞紫宸多在予之念常恐微物或失大道未臻私奉睿圖載深寅畏去年諸處並多水旱歲儲不給生業靡安言念下人用增憂旰天下遭損州逋租懸調及勾徵特宜放免國家偃武教修文德百年於茲矣自運屬清平人忘爭戰俎豆之事嘗聞之矣軍戍之禮我所未暇且五材並用誰能去兵四方雖安不可忘戰故周禮以軍禁糾邦國以蒐狩習戎旅不教人戰是謂棄之宜差使於兩京及諸州且㨂取十萬人務求灼然驍勇不須限以蕃漢皆放番役差科唯令團伍教練辨其旗物其車徒習攻取進退之方陳威儀貴賤之等俾夫少長有禮疾徐有節將以伐叛懷服將以保大定功叶於師貞以宏武備應須集期及有蠲免所司明為條制別作優異法奏聞昔史起溉漳之策鄭白鑿涇之利自茲厥後聲塵缺然同州刺史姜師度識洞於微智形未兆匪躬之節所懷必罄奉公之道知無不為頃職大農首開溝洫歲功猶昧物議紛如緣其中款足嘉委任仍舊暫停九列之重假以六條之察舊藏過半績用斯多食乃人天農為政本朕故茲巡省不憚祁寒將申勸恤之懷特冒風霜之弊今原田彌望畎澮連屬繇來榛棘之所遍為秔稻之川倉庾有京坻之饒關輔致珠金之潤本營此地欲利平人緣百姓未閒恐三農虛棄所以官為開發冀令遞相教誘功既成矣思與共之其屯田內先有百姓挂籍之地比來召人作主亦量準頃畝割還其官屯熟田如同州有貧下欠地之戶自辦功力能營種者準數給付餘地且依前官取師度以功特加金紫光祿大夫賜帛三百匹肇有書契是興冊所以彰乎得失示以勸懲非夫詳而有體辨而不華含陽秋之蘊總墳誥之賾豈能光我司典崇其立言右羽林軍將軍攝御史大夫權檢校并州大都督府長史持節天兵軍節度大使燕國公張說多識前志學於舊史文成微婉詞潤金石諒可以昭振風雅光揚軌訓可兼修國史仍齎史本就并州修撰朕以聽政之餘因時遊矚觀古人之制度懷先王之卑菲聊遇所覽直書其事雖文詞非麗亦不忘於言卿職在史官君舉必記將以朕之素意頒示庶寮循諷表章益深祗勉庸愚之人自犯踈網至於公憲誠則難容然服念泣辜昔賢懿躅惟刑是恤不可暫忘如聞囚徒或有冤滯久在幽縶情何以堪其外州巳有使覆京城內宜令中書門下就禁司按理如有枉濫隨事奏聞先王制法度立師長將以為理也夫刺史者受方岳之寄為吏人之表以宣法則以樹風教故得人則河潤九里京師蒙其福非材則虐流百城黎庶受其害所以漢宣云與我共理者其惟良二千石歟中大夫前守嵐州刺史蕭執珪通議大夫前守復州刺史盧季恂中散大夫前守銀州刺史崔憬等各藉階資謬居藩牧不率法度情匪在公憑此尸素黷其貨賄豈有奉條察之委居道化之先顓利無厭貪以敗類固上行而下效豈澄源以正本有靦面目實虧風憲雖罪無所漏巳置刑章而情頗難容宜從遠謫執珪宜除名配隸營府即差使所在馳驛領送至彼不得東西季恂可恩州司馬憬可施州司馬并員外置同正員即發遣赴任仍頒於郡國以勵在官武有七德所以安人禁暴臣稱三傑所以戰勝攻取蜀乃一方之主尚得孔明齊為九合之君斯繇管仲況宇宙至廣人物至多豈乏英賢無聞韜略蓋用與不用知與不知今邊境未清統邊須將頃林胡蹔擾柳城非捷北虜勿驚西軍莫振罪繇失律過在無謀曹劌不言寧知登軾之効毛遂緘口豈彰處囊之奇長想古人是思擢士其有雖霑簪紱猶晦跡於下流或蘊智謀尚沈名於大澤不加精訪何以甄收其兩京中都及天下諸州官人百姓有智合孫吳可以運籌決勝有勇齊賁育可以斬將搴旗或坐鎮行軍足擬萬人之敵或臨戎却寇堪為一堡之雄各聽自舉務通其實仍令州縣具以名進所司遣立限期隨表赴集如聞天下有馬之家州縣或因郵遞軍旅即先差遣帖助兼定戶之次緣被此百姓嫌疑多不養畜遂令騎射之士頓減曩時益國富人何繇可致自今巳後諸州百姓不問有蔭無蔭若能每家畜馬十匹巳上緣帖驛郵遞及征行並不得徧差遣帖助若要須供擬任臨時率戶出錢市買定戶及差重色役亦不須以馬充財數諸府衞士役重人微既每征行又當番上言念艱辛更無是過不稍優矜何以存濟自今巳後征行及當番處衞士除公乘配手力廳事及復身以外官人輒私抽役使宜令御史金吾按察使嚴加採察四海清晏百年於茲雖戶口至多而逃亡未息良繇牧宰之任訓道無方不能綏撫令其浮惰且寰宇一統天下為家去此就彼孰非州縣使其離鄉者則亦無改成其逋藪者何以居官遂令邦賦不入人偽斯甚政術不理豈過於茲宜令所司商量作一招攜捉搦法奏聞內典幽微惟宗一相大乘妙理寧啟二門聞化度寺及福先寺三陛僧創無盡藏每年正月四日天下士女施錢名為護法稱濟貧弱多肆奸欺事非真正即宜禁斷其藏錢付御史臺京兆河南府勾會知數明為文簿待後處分制國立軍以為武備安人和衆諒在師貞必將其車徒務其蒐獮不教人戰何以訓兵今寰宇雖寧燧燔時警故設備邊之政更深用武之略其劒南磧西關內隴右河東北通燕薊既接邊隅是防夷狄據山川險要量寇賊多少分置軍旅足成修備有事赴敵可以拉朽摧枯無事養人可以拔距投石而將吏非謹甲兵不修加之侵暴仍且役使雖則屢提綱領然猶故忽科條豈法有未明將官無所畏永言此弊增歎於懷又諸道軍城例管夷落舊戶久應淳熟新降更佇綏懷如聞頗失於宜蕃情不得其所若非共行割剝何乃相繼離散既往者理宜招討見在者須加安全熟戶既是王人章程須依國法比來表奏多附漢官或洩其事宜不為聞達或換其文狀乖違本情自今巳後蕃臣應有表奏並令自差蕃使不須更附漢官雖復化染淳風終是情因本性刑罰不中心固不安其有犯法應科不得便行決罰具狀奏聞然後科繩咨爾軍僚勉我王事兵必須賈勇奮力馬必須芻牧秩養器仗必須磨礪糧儲必須贍積馭蕃夷必須以威以恩誓將士必須以罰以賞辨於旗物稱爾戈矛使有勇而知方將料敵而常勝所謂文武並用國之大經團結十萬衆兵別令訓習分割數萬匹馬皆有供須什物備陳行裝具足時而動我武惟揚俾夫涼風至白露下將以執有罪覆昏慝宏厥戎略振斯天聲清彼四方期此一舉其諸軍官吏輒更私役兵及侵漁一錢巳上兼失偵仍墮教習倉儲或乏器械莫修番部不能安窮寇不能制有一違犯國有嚴誅事或未同仍令所司作條件處分自昔明王恤人為念朕君臨㝢縣子育黎庶一物乖宜常切納隍之慮萬方有罪再軫泣辜之責故勸農務穡國政攸先捨過錄功帝圖惟永況麥風炎序梅律歊辰言念狴牢情深惻隱宜申緩獄之令以布宥刑之澤其天下見禁囚徒犯流巳下徒巳上特宜免以常科並遣隨軍展效仍令所司明為年限條例隨便近諸軍分配冀能竭力勉樹勳庸其杖巳下即令釋放使務農業蘭池胡久從編附皆是淳柔百姓乃同華夏四乂康待賓等敢亂天常俱為禍首驅率㣥衆嘯聚沙泉使良善失業而兇渠逞志人祇發怒魁首者並自誅夷鋒刃揮芒陣敵者亦聞梟戮元惡既盡餘黨無多本是脅從初非爾罪今乃潛竄須示其誠朕亭育蒼生皆同赤子每一物之失所寧寸心之得安莫不念切在予情深責己故先之以德亦寬之以恩乃遣常侍趙元通又命御史大夫韋抗附以招慰俱不稟承儻滋蔓繁多恐邊甿塗炭非願勤於兵馬蓋須申於弔伐朔方軍大總管王晙隴右節度使郭知運等虔奉廟謨恭行天討所有殺戮爰及俘囚或因戰敵相交灼然好惡無辨驚波繇是共溺烈火所以俱焚自孽誰尤欲逃何去巳滅亡者其如咎譴未歸附者是可哀憐或反側懷憂或嫌疑多懼宜開自新之命以矜莫大之罪其胡賊及勾引諸蕃同叛逃在山谷沙藪閒疑懼不出者並原其罪宜令夏州都督陽欽明依前處分安慰仍以左監門將軍安慶為副依理宣慰量加招輯各令復業務使安存訖奏聞若不順從猶持向背須別處分亦具奏來化度寺無盡藏財物田宅六畜並宜散施京城觀寺先用修理破壞尊像堂殿橋梁有餘入常住不得分與私房從貧觀寺給仍令御史張樽與禮部侍郎崔據京兆尹孟溫禮取元奏數揀京城大德戒行灼然者共檢校量事均融處置訖奏聞諸州長官及按察司所察錢物以委州使準此共勾當散配處分訖申所司國家天覆萬方子育庶彙要荒所列並入提封日月所照俱為臣妾莫不熙我德澤納之仁壽神人以和鳥獸咸若河曲之地密邇京畿諸蕃所居舊在於此自服王化列為編甿安其耕鑿積有年序而翻然造謀搆此紛孽勞我師旅擾其邊隅不思亭育之愛坐取滅亡之道官軍纔及一鼓而潰雖肇其首謀則有元惡然率以從亂咸為匪人朕思宏其在宥之恩振以好生之惠伐彼有罪捨其脅從使反側自安胡耉靡獲則譸張之釁爾實自取生成之德我則有焉宜令朔方軍大總管兵部尚書王晙宣崇恩命示以柔服諸軍戰士應須酬錄功勳及却投來吐渾党項左右廂降戶雜蕃并胡殘部落或善惡未分或久長取穩若須釐革一事巳上並委王晙敘錄處置訖奏聞朕身居九重心在萬姓恐情未達下政或乖方頃者故命近臣分道巡撫為屬農月且停使車今秋稼方收時亦將隙命中書舍人何鸞等宜所到之處宣慰百姓令悉朕懷其有水旱之州或須貸給不可遠更奏聞宜便量事處置征鎮之家各令州縣檢校優賞其中無兼丁存濟者仍加賑恤如聞鹽夏兩州百姓及六州胡等被胡賊殺掠宜令御史韓朝宗皇甫翼齎書分往慰問便復損數其被損之家務令存恤應須給貸蠲免量事處置訖迴日奏聞王者觀俗以賦政考祥以省方必將協於人和而奉若天命朕祗承鴻業用康黎庶思振德以惠物豈勞人以尊己頃年關輔之地轉輸實繁重以河塞之役兵戎屢動千金有費九載未儲懷此勞軫以增旰昃且夫苟利於物可隨方而變通將適於人故因時以巡幸卜雒萬方之隩維嵩五嶽之中風雨之所交舟車之所會流通江汴之漕控引河淇之運利俗阜財於是乎在今欲省其費務以實關中即彼敖庾少留河邑乘歲陽之吉展遊順之儀豈惟龜筮不違故亦詢謀是協修五禮問百年車輿動而不勞玉帛會而胥悅所謂先天以宏道因人以為利也宜以明年正月十五日幸東都如聞朝官子弟未曾經歷即坐要司及京畿并州縣理人官或侍郎受財追遊怠墮或恣行決罰妄作奸非刑憲不可徧矜父兄莫能訓導苟陷於法良軫於懷宜令本司及州府長官按實驗察有此色并少年未諳時事可移與閒散官如聞諸道兵募丁防年滿應還或征役處分及在路死者不得所繇牒報本貫無憑破除仍有差科親鄰受弊宜令今年團日勘責同行火隊的知實死即與破除自今以後每有兵募丁防放歸令州軍具存亡夾名牒本貫釋道二門施其戒律緇黃法服衆亦崇尚苟有踰濫是無憲章如聞道士僧尼多有虛挂名籍或權隸他寺或侍養私門託以為詞避其所管互相掩匿共成姦詐甚非清淨之意也自令巳後更不得於州縣權隸侍養師主父母此色者並宜括還本寺觀國之設法本以閑邪苟無所施雖立安用朕以寡昧纉承丕業夙夜怵惕恐不克勝馭朽徒知其所危涉川罔知其所濟是用寤寐永歎常思罪己冕旒不欲見其臧否黈纊不欲聞其是非隱忍含容十載於茲矣不能使令行禁止訟息刑清家習禮讓之教人興廉恥之節此朕之不德也河南府雒陽縣主簿王鈞貪殘其性暴虐其心輕侮我章程殘剝我黎獻處事不遵乎法理黷貨不知其紀極此而可恕孰不可容且輦轂之下事猶如此想於遠處人何以堪然而當發生之時屬陽和之月朕情存惡殺不加殊死且從杖罪以肅朝端可與朝堂集衆決殺自今巳後內外官有犯賄至解免以上縱使逢恩獲免並宜勿齒終身御史憲司職當推劾不存糾舉多有顏情綱紀不施誰任其咎又府縣寮寀上下相承犯法公然無聞按詰若或知而故縱即是職務不舉各自思審何以當官自今巳後所進擬御史皆須歷職清白衆所推者不得虛相引進僥倖祈榮凡厥朝臣宜悉朕意朔方之地雍州之域密邇關輔是稱河塞頃者胡孽為寇擾其居人王師有征戎事斯大戍役之弊邊甿既勤雖妖醜厎清而政理未洽不有經制曷云昭蘇且和衆為武者所以詰姦慝總軍命將者所以訓甲兵匪夫大賢孰允茲任兵部尚書中書門下三品燕國公張說天與明秀自然才傑光備九德宏宣七政爰掌邦理實為國楨謀而必忠言則無隱寅亮之美用熙帝載談笑之餘更陳戎備所謂善行樽俎事立封疆宜以上台之尊遙統中軍之任可持節兼知朔方軍節度大使餘如故罪不在大本乎情罰必在行不在重朕垂範作訓庶動植咸若豈嚴刑逞戮使手足無措者哉裴景仙幸藉緒餘超升令宰輕我憲法蠧我風猷不慎畏知之金詎識無貪之寶家盈黷貨身乃逃亡殊不知天孽可違自愆難逭所以不從本法加以殊刑冀懲貪暴之流以塞侵漁之路然以其祖父昔預經綸佐命有功締搆斯重緬懷賞延之義俾協寬政之典宜捨其極法以竄遐荒仍決杖一百流嶺南惡處朕以懷州去年偏併不熟宜令刺史崔子源察審問貧下不支濟者量加賑貸朕聞王者乘時以設教因事以制禮沿革以從宜為本取捨以適會為先故損益之道有殊質文之用甚異且夫至德之謂孝所以通於神明大事之謂祭所以虔於宗廟國家握紀命歷重光累盛四方繇其繼明七廟可以觀德朕嗣守丕業祗奉睿圖聿懷昭事罔不恤祀嘗覽古典爰詢廟制遠則殷周事異近則漢晉道殊雖禮文之不一固嚴敬之無二朕以為立愛自親始教人睦立敬自長始教人順是知政以道存禮從時變特因宜以創制豈法古而限今況恩以降殺而䟽廟以遷毀而廢雖式瞻古訓禮則不違而永言孝思情所未足享嘗則止豈愛崇而禮備有禱而祭非德盛而流永其祧室宜列為正室將使親而不盡遠而不祧廟以貌存宗由尊立俾四時式薦不閒於毀主百代靡遷匪惟於始廟所謂變以合禮動而得中嚴配之典克崇肅雍之美茲在又兄弟繼及古有明文今中宗神主猶居別處詳求故實當宁不安移就正廟用彰大典仍創置九室宜令所司擇日啟告移遷如聞百官及庶人家殯葬頗違古則無復哀戚遞相誇尚富者踰於禮法貧者殫其資產無益於死徒損於生傷風敗化斯斁尤甚自今巳後送終之儀一依令式至墳墓所仍不得聚飲肉食宜令所繇嚴加禁斷更有違者科違勅罪
