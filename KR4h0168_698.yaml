front:
  text: 全唐文欽定全唐文卷六百九十八李德裕三
  hash: sha256:76b64bacfa552616d75abd1dbf040f947e8e5071e7566612dbdc2e262f6b73c3
body:
  text: 勅淮南勁兵伏灌夫之勇河內雄屏委寇恂之忠各用所長俾專大任以茲制勝斯為良圖忠武軍節度使銀青光祿大夫檢校工部尚書兼許州刺史御史大夫上柱國王宰結髮從軍擁旄為將一劍橫陳萬筭皆全陰則難窺勇能重閉亞夫急緩之任繼父絳侯祭彤禦侮之才為吾子路近者狂寇憑阻屢犯顏行茂元莫遑定居驟聞三捷願言奮旅方展六奇遽屬爽秋暫嬰寒泄誠威重之可倚顧臥護之未任是用改爾乘軒總齊諸校隱如敵國禦彼奔衝昔韓信建旗出井陘之隘鄧艾束馬越陰平之艱皆立奇功稱為名將爾宜自厲無愧前良勅自古哲王撫寧荒服忠於國者則有繼絕之恩順於道者則有固存之義所以厚其嚮化優以報功回鶻累代姻親久修臣禮服我聲教保茲信誠昔以國難識其忠良嚴霜見其貞松疾風知其勁草永言勳力豈忘予懷如聞為黠戛斯所攻兵折眾叛畜產大耗國人薦飢流離轉徙遠踰沙漠近因太和公主遣使入朝已知新立可汗寓居塞下告窮請命未有所歸每念艱危載深憫惻今欲捄卹窮困撫慰瘡痍使四方知朕不忘舊勳保其大順昔匈奴乖亂呼韓款塞漢宣帝轉粟賑救權時施宜故得三代稱藩北邊罷警前代令典可不務乎宜令左金吾衞大將軍兼御史大夫王會持節充安撫大使宗正少卿兼御史中丞李師偃充副使專往慰問仍賑米粟二萬石俾其安輯離散漸就漠南再復舊疆永言恩好宣示中外宜體朕懷昔東漢中夏既寧匈奴饑饉臧宮請命將臨塞圖刻石之功光武報云柔能制剛弱能制強且傳聞之事常多失實雖滅大寇不如息人朕每覽前史為之興歎又以大舜修德有苗歸心周穆徂征荒服不至固存取亂在擇良圖回鶻頃以本國薦飢種落貳紇扢斯乘其衰亂遂覆危巢既焚老上之庭盡剪名王之族可汗失地遠客來附塞垣朕言念姻親不忘勳力諭以呼韓款塞漢氏舊章戎不亂華國之大典且分兵食捄彼飢人令歸漠南方議賑贍屬可汗久嬰沉痼酋長異心雖隨畜薦居固無定所而控弦深入頗亦渝盟邊將戎臣屢抗其疏策藩渾部落咸請其驅除朕以王者之師以全取勝匈奴見短嘉婁敬之善籌馬邑設權戒王恢之兵首推誠含垢亦以踰時况朔野沍寒有皸瘃之患陰山逕路多曲折之艱宜以德綏豈勞兵卒某官劉沔久臨沙漠頗識虜情既啟十乘之行必致六吂月馬凡之遁委之告諭方俟成功可守本官充招撫回鶻使如不自改悔終須驅逐其諸道行營兵馬使權令指揮主者施行門下古人云兵者所以明德除害也故舉得於外則福生於內朕每念戎事務安生靈既獲遠圖宜恢長筭回鶻可汗寄託塞上未歸虜庭近者遣使薊門懇陳誠宋人病告於子反朝鮮心附於樓船翳我信臣實得要領幽州盧龍軍節度副使知節度事觀察處置押奚契丹兩蕃經畧盧龍軍等使銀青光祿大夫檢校工部尚書兼幽州大都督府長史御史大夫蘭陵郡王食邑三千戶張仲武風雲感契鳧藻協誠自升將壇首剪狂寇戈鋋亟聞於彗埽牛馬殆至於谷量故能望影揣情已探致虜之術豈止聞風破膽益堅慕義之心遽奏封章願申告諭彼既率服寧忘懷柔况虜騎往來疾於風電沙場敻貇介以山川臨敵應機固難統一昔衞霍之襲葷狁異道而行辛趙之擊䍐羌兩從其志成予廟勝之策在舉髦傑之臣俾爾鷹揚挫其狼顧將復蠻夷之叛固在七擒勉思將帥之風無忘五利崇以夏官之秩委其統制之權當竭一心敬茲休命可檢校兵部尚書兼充東面招撫回鶻使其當道行營兵馬使及奚契丹室韋等並自指揮餘如故主者施行門下夫天之所廢難施繼絕之恩人之所棄當用侮亡之道朕每思前訓豈忘格言回鶻比者自恃兵強久為桀鷔凌虐諸部結怨近鄰黠戛斯潛師彗掃穹廬瓦解種族盡膏於原野區落遂至於荊榛今可汗亡逃失國竊號自立遠逾沙漠寄命邊陲朕深念衰殘尋加賑恤每陳章表多詐諛之詞接我使臣如全盛之日無傷禽哀鳴之意有困獸猶鬬之心去歲潛入朔川大掠牛馬今春掩襲振武逼近城池可汗皆自率勁兵首為寇盜不恥破敗莫顧姻親河東節度使劉沔料敵伐謀乘機制勝發胡貊之騎以為前鋒搴翎侯之旗弋彼在穴短兵鏖於帳下元惡軼於彀中况乘匪六吂月馬凡眾纔一旅儲糧已竭計日可擒太和公主居處不同情義久絕懷土多畏亟聞黃鵠之歌失位自傷寧免綠衣之歎念其覊苦常軫朕心今者脫於豺狼再見宮闕上以攄宗廟之宿憤次以慰太皇太后之深慈永言歸寧良用欣感其回鶻既已破滅義在剪除宜令諸道兵馬使並同進討河東立功將士以下優厚賞給續次條疏處分應在京外宅及東都修功德回鶻並勒冠帶各配諸道收管其回鶻及摩尼等莊宅錢物等並委功德使與御史臺京兆府各差精強幹事官點檢收錄不得容諸色職掌人及坊市富人輒有影占如有犯者並當極法錢物納官摩尼等僧委中書門下即時條疏聞奏於戲昔漢宣帝值匈奴乖亂推亡固存呼韓單于國歸命入朝保塞漢后所以有擁護之恩郅支單于背叛禮義傷毀威重漢史所以明可誅之罪二虜禍福皆自取焉四夷百蠻宜以為鑒布告中外深體朕懷主者施行門下古之命帥必重其名假三事之崇允萬夫之望故韓信以丞相擊魏樊噲以相國伐燕克成茂功賞抑有典成德節度使鎮冀深趙等州觀察處置兼充北面行營招討澤潞等使金紫光祿大夫檢校司徒兼鎮州大都督府長史御史大夫駙馬都尉雲騎尉王元帥逵生禀忠厚天資信誠奇正得於心機嚴莊表於師律去病之畧無假孫吳翁歸之才實備文武屬狡童逆命自固穴巢果能揚義聲以載馳繇直道而先奮鋒逾駭電勢盛疾雷宣士卒上據層巒削成垣壘下臨平壤盡見秋毫始擒伏莽之戎遽拔升天之險尋又陳兵原野漸洗堯山摧困獸之鬬心挫螳螂之怒臂棄甲者萬計折首者千人先獻戎俘益彰臣節彼則望王師之陳草木為兵聞吾帥之風椒蘭比德顧其殘孽豈獲稽誅夫賞不逾時速人為善雖卨敷五教已列三公而禹分兵麾宜佩相印是用命爾升於鼎司於戲昔吳起有大功者三不為魏相竇嬰破藩國者七未踐漢台豈非名器之重曷嘗虛受爾其奮揚威武殲厥渠魁當感激而成功勿遷延而玩寇服茲休命可不戒哉可檢校司徒同中書門下平章事兼鎮州大都督府長史依前充成德軍節度使鎮冀深趙等州觀察處置兼充北面招討澤潞等使散官駙馬勳如故主者施行門下兵家之策戒在勢分故楚為三軍破於英布光武料敵非劉尚之別營葛亮出師制魏延之異道專其大任方見成功斷自朕心授之戎律天德軍豐州四城都防禦本管押蕃落等使兼充晉絳行營諸軍副使銀青光祿大夫檢校左散騎常侍豐州刺史御史大夫上柱國石雄倜儻仗義沉密有謀近者被羽先登搴旗深入剪彼葷允碎其穹廬勇乃冠軍威能振敵屬壺關逆命羽檄交馳命征虜奉公之心思成臯過險之將嘉其壯節召自極邊既而亞夫會兵馳六乘之傳庶乎馬武力戰為眾軍之鋒朕以彥佐早升大將之壇久服上公之衮資其碩望任以指蹤鄧禹之鎮關河功雖未遂羊祜之守吳會身不自行罷戎役以會朝待寇寧而撫俗親授方畧慰彼蒸黎爰擢奇才付予重事爾其再申兵法奮起士心去病無以家為勿邀天幸臧宮保於常勝實在貴謀敬聽朕言副茲寵寄可守本官兼充晉絳行營諸軍節度使餘並如故主者施行勅堯之舊臣伯益顯庸於舜禹周之元老召公流美於成康永惟其人是屬良相裴度始以謀策除害佐烈祖之中興終以忠貞立朝毗累聖之鴻業經緯之志華皓不衰功勳爛然圖史煇焯奸邪所忌臲卼於時暨氛霧既開魚水將叶條風孰見其喜慍零雨皆美其來歸未踐明庭遽嬰沉痼威鳳莫翔於舊沼虛舟常往於夜川殂謝之初朋黨異議贈典不稱人情鬱然屬告類上元渙流大號載懷先正宜有褒崇寵既極於維師恩有加於在昔豈必望酇侯之壟方念茂功過梁道之祠乃思遺美以茲為勸可不務乎勅昔柳莊云亡輟宗廟之祭公叔既歿表貞惠之名前代所以追往悼懷飾終加禮永言髦傑宜峻舊章故河中節度晉絳磁隰等州觀察處置等使檢校司徒兼河中尹御史大夫陳夷行身為儒宗位致宰相言必體要行歸於周得壺遂之深忠持顏子之極樂信能感物桃李所以不言思在無邪藜藿由其不採朕纘成鴻業再授鈞衡陳㣥立朝道無適莫葛亮稱物心匪重輕雖壯趾為災躧步為蹇朕之毗倚方固初終任以建牙暫去岩廊之上射不穿札遂居將帥之間方期永年為我良翰遽聞淪謝痛悼於心是用禭以衮章載之冊言念舊德尚懷黃髮之謀緬想貞風爰舉素絲之節以茲縟禮用慰幽魂勅孔子以顏冉之行首於四科漢代以荀陳之門方於八凱乃眷時哲保茲令名用舉飾終之恩以抒殲良之嘆故山南西道節度使銀青光祿大夫檢校吏部尚書兼興元尹御史大夫上柱國崔琯誠明履正粹密鄰幾有子政之精忠得公綽之不欲禮樂二事以為身文仁義五常自成家範往以茂器列於大僚屬賢相受誣廟堂議法用長孺之道以右正人微京兆之言豈聞非罪既是魏其之直益彰王鳳之邪莊色於朝㣥公聳視讜詞不撓淑問攸歸歷踐名藩皆有遺愛居常慎獨清則畏知爰自青衿迄於白首厲翼之志終始不渝未陟台階實孤公望追榮左揆式示優崇勅昔許穆公身歿於師贈以侯服王事加等春秋所書言念勞臣終於盡瘁舉茲盛典用峻彞章王茂元幼則服儒長能習吏晚為邊將頗振軍聲近者元戎啟行大斾臨境誓陟羊腸之險寧辭馬革之勞來必挫鋒去者奪魄挑戰孤壘自揭高旌坐觀火之蓬方解迎刃之竹必當樽俎制勝枕席還師勢如風霆功在刻漏遽嬰沉痼莫展良圖伏波之壯志不衰呂蒙之療護無及日未回於三舍星已旋於再周列諸葛之鼓旗徐驅而返閱祭遵之車騎悼往則深亦既聞其綏復是宜加於衮斂勉爾㣥帥知予報功勅昔班固有言何武王嘉區區以一簣障江河用歿其身朕常以固作一代之典非所以垂法勸後也若觀時以避禍量力以圖全則三綱之道幾於絕矣故右衞將軍李安靜其祖太子少師綱謇諤大節炳於青史安靜聿修厥德不隕令名往者產祿擅朝充躬交亂每念王室殆於阽危不憚芳蘭之焚竟全孤竹之志廣稱遺老抗感憤之詞荀不食言由忠貞之故永懷臣節遠邁前良近者深戒有司下令遴揀惟爾苗裔靡有孑遺昔庭堅不祀臧文所嘆仲宣無後魏祖興嗟榮以先王之臣褒以揚名之典懋茲休寵用慰冥魂勅兵家之法地有必爭遠則漢氏之得陰山匈奴慟哭近則張愿之城河外朔邊底寧乃眷維州實為險隘有金湯之固居襟帶之衝沒為戎疆垂六十載故蕃維州城副使悉怛謀嘗解辮髮獻其壘垣議臣託以和盟沮其誠尋令束縛歸戮虜庭彼獲甘心且無噍類昔常山臨代為全趙之寶符河西絕羌斷西戎之右臂棄茲要害用長寇讐至今蜀人言必流涕豈陳湯之專命由匡衡之廢忠言念始謀久罹幽枉爰加寵贈用慰貞魂勅昔汲黯薄淮陽守願出入禁闥補過拾遺則諫諍之任實資諒直我求其比今得正人吏部郎中元晦往在內廷嘗感先顧奮發忠懇不私形骸俯伏青蒲至於雪涕數共工之罪不蔽聖聰辨垣平之詐益張文德近因旌別邪正宰弼上言以魯公藏罟莫如置革於左右漢后輯檻孰若列游於公卿是用命爾登於文陛爾其副我寵擢不替初心勿沽小名以枉大節勉服官業期於有終可諫議大夫勅朝議郎殿中侍御史內供奉上柱國徐商于公以容駟高閎虞氏以升卿名子其所全活不聞大賢猶誠感幽神慶流苗裔矧乃徂往以淑問嘗為理官屬政在呂宗謀傾王室將相陷辟忠良受誣而深念㣥獄之寃固拒詔使分別楚囚之濫自履危機義激命輕仁為已任有是陰德宜覃後昆爾風度粹和文詞溫麗列於清憲雅有貞標既旌先正之忠爰舉賞延之典勉修官業無替家聲勅古者聖人之教子也皆妙選天下之端士以衞翼之漢代梁王好書則以賈誼經緯之才推明其志淮陽好政則以元成禮讓之節鎮靜其浮前王令猷百代良法况朕建立元子錫之奧區朱邸初開黃髮是憲以兼謨慷慨納說有爰絲正席之忠以柬之取捨俟時有貢禹彈冠之操皆行不苟合誠無暗欺歷職有聲居正無撓舉其素行擢在首僚爾宜廣德義之風明孝愛之道俾其嚴於問寢敬不絕馳化與心成中道若性服我休命可不慎歟勅予欲左右前後皆得正人朝夕交戒儆予之闕所以分左右而備箴諫也思見大儒骨鯁白首耆艾論議通古今喟然動眾心所以增其秩而厚其祿也朝散大夫守諫議大夫兼宏文館學士上柱國鄭朗等皆以貞正守道列於左掖從容諷諫每竭嘉猷况朗璜近因陛見乃能庭爭執以言責本於志誠昔峻岅乘危爰絲攬轡期門近出耿况當車增主之明二臣之力我求端士用繼前良期爾盡規致予無過拾遺左右汲黯之願已諧祿賜愈多貢禹之誠當勵勉思厥職無忝優思勅宣議郎前行京兆府參軍驍騎尉滎陽縣開國子鄭裔綽昔漢武帝云有社稷之臣汲黯近之矣緬懷先正實邁前良况兩代持衡皆有貞節守正持法遺風凜然爾生於德門早服儒訓黃金不遺唯守於一經白環比德方榮於四代嘉其勵行不隕令名俾從丹地之遊佇繼緇衣之美可京兆府渭南縣尉直宏文館散官勳如故勅賈誼云守圉扞敵之臣誠死城郭封疆聖人有金城者此物此志也若火焚岡而不改其貞風振野而獨標其勁臨危自奮見義必為得不寵以名城列於上賞忻州刺史兼御史中丞李丕幼而倜儻長負不覊才耀奇而㯋出智釋結而觹解禦侮是寄益德冠於三軍騷動得人劇孟雄於一敵昔在爾祖志康國屯翼龍而飛既濡其雨露刑馬而誓已表於山河貽厥孫謀載揚休問近者生參伐盜起汾川保信都之城不為威惕戮邯鄲之使終以節全戎士間行奏章狎至閱其忠可謂著明乃眷西河控於大廈文侯舊壤干木遺風以節㮣著者居之固其宜也勉圖嘉績以保令名勅晉謀元帥必有佐軍漢制出師皆立副貳所以重戎事而肅王命也李丕頗有大慮常好奇功自為攻拒之書尤邃揣摩之術淬其智刃斫未兆之機森其禮干得備嚴之稱既蟬蛻丹水鵬搏赤霄未及歲暮累見誠節今以玉璧重地汾河要津俾換珪符用佐樽俎庶乎易行而誘成苗賁之為不冑而驅效葉公之入勉於盪寇副我知臣卿道崇德茂體方行正業成廊廟心存邱壑往以時事來還宰旅秉此難進確然莫奪雖違乂辟之望實有鎮浮之益深惟元老想見高風師範之尊東宮莫二舉茲崇秩明昭有德公器斯在雅道有光宜畧常謙即膺成制勅回鶻嗢沒斯特勒那頡啜特勒頡于伽思於解亦阿躭于思莫賀達于宰相伊難朱密伽諦畧摩咄將軍諦畧等天德軍遞所奏表至再三省覽憂屬良深彼蕃自忠義毗伽可汗以來代為親隣連降愛主恩禮特異古今莫及朕君臨萬國撫育殊方苟有未安則宜來告况特勒等乃祖乃父歸誠累朝昨遣嗣澤王溶弔冊先可汗回始聞卿國中喪亂諸部乖離救患䘏隣豈忘令典方圖鎮撫以命使臣今又知堅昆等五族深入凌虐可汗被害公主及新可汗播越他所未歸城邑特勒等力不能制思存遠圖相率遁逃萬里歸命又知欲奉公主朝覲忠謀不從已逾大漠之南同五原之塞發此單使布其赤心言念艱危惻然軫嘆料卿等皆英酋貴族覊寓沙場懷土之情如何可處豈非欲討除外寇匡復本蕃抱此至忠託於大援但緣未知指的難便聽從又慮邊境守臣見卿忽至或懷疑阻不副朕心故遣鴻臚卿張賈馳往安撫朕既獎卿忠報以信誠雖隔塞垣已如相見卿須深明朕衷盡吐所懷一一言於使臣令其速還聞奏佇聞誠願續有指揮必當副彼急難固不惜於事力勉於謀度用保忠勳秋熱卿及部下諸官幷左相阿彼兀等部落黑車子達怛等平安好遣書指不多及勅回鶻嗢沒斯特勒那頡啜特勒悉勿啜特勒烏離思特勒赤心宰相等張賈等回知卿等欲遠赴闕庭自申忠眷言深志豈忘予懷聞卿等本國頃因飢荒遂至離散親屬內叛諸部外侵新立可汗猶未安定既是國中所奉則為卿等君親古人云未有仁而遺其親者義而後其君者想卿等本心必思推戴况回鶻代雄朔漠威服諸蕃今已破傷足堪悲憤若皆自爭雄長不顧其君各據一隅必更衰弱深慮從此之後為諸蕃所輕與卿等本國代結婚親久修鄰好每念於此良用惻然與卿等為謀須務遠大莫若自相率勵同奉可汗興復本蕃再圖強盛朕欲召卿赴闕親諭此懷又恐可汗聞知謂朕幸其艱危因有招納葢欲深全國體兼為卿等避嫌以此思之難遂於請卿等宜早歸本國不更滯留卿等表請器甲朕君臨萬國非止一蕃祖宗舊章不敢逾越國家未曾賜諸蕃器甲卿等亦合備知若一處開恩必自茲援例朔州般次舊例須待可汗遣駞馬迎聖方令進發可汗信使未至難於遣行今有賜物具在別錄以卿等率先向發特示優恩緣新立可汗未受朝廷冊命數降使至卿等部落亦恐非宜所有賜賚止於此度想卿等明識深諒朕懷便令高品魏敬休宣諭想宜知悉呂衞等至知卿與可汗不能戢下頗擾邊疆既告諭不悛須兵勢驅逐卿忠誠奮發願立奇功請退渾沙陁等部落合勢及戰馬器甲等並已允卿所奏各有別勅處分今令左衞將軍何清朝蔚州刺史契苾通分領蕃渾部落取卿指揮朕已切戒何清朝等令其協盡心力副卿忠誠進取之時一切取卿方畧卿宜每事與宏順等商量審度事機勿為輕進但得可汗抽退不敢稽留塞上安寧即是卿之勳力必不可落其奸計以損國威兼令高品駱遂秦權監行營將士卿與之籌慮續續奏聞勅劉沔等自回鶻本國殘破寄命北邊朕以其艱難之時常効勳力平寧之後結以姻親義切懷柔情深兼愛亦既轉粟賑捄降使撫循示信推恩朕無所愧而狼顧塞上鼠首雲中聞有備雖暫移營稍乘隙復來近塞察其情計殊未歸還朕祗荷丕圖撫臨萬國守祖宗之法制思黎庶之乂安豈可蓄虺穴於塞垣養蠆毒於懷袖乘其馳突必欲驅除昔晉侯報楚之功避子玉於三舍先軫背秦之惠覆孟明於二崤安國庇人大義斯在卿宜遣使告諭明示朕懷如或遲留尚為巧詐即須犄角相應臨以兵威勉務良圖副茲委遇勅仲武周璵至省表知可汗猶有疑懼近日移營卿自總戎麾累剪狂寇英威所震桀驁皆從仁義所綏降附相繼昨者可汗來依塞表已在彀中豈謂黠虜之奸心尚懷翻覆柔服之際又此遁逃遠揣虜情必終難保信昔去病深入大漠方殄獯戎近李靖再襲穹廬始擒頡利况卿伐謀制勝才出古人宜選練勁兵掩其無備使呂嘉懷貳而受首孟獲雖縱而必擒特立奇勳永光千古朕已令劉沔旋師去入東境候卿本道成功即令歸鎮經畧之事全以付卿須及塞草未青虜騎方困一舉便克寸使無孑遺卿先發馬步一萬人於大界原防戍今緣可汗入卿掌握已在網羅豈得更屯精兵守無用之地即宜追赴本道同力剪除緣卿師旅至多費用尤重其出界糧料已令所司依前支給卿宜勉於盡敵以副朕懷
