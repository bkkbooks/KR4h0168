  text: 全唐文欽定全唐文卷八百六十九端吳天祐十三年為興元軍觀察巡官檢校尚書禮部員外郎兼侍御史
  hash: sha256:8f77e6c571e62bf0a65ae742fa5609aa963b0a4b682434d6dc472cd5268f4346
  markers:
  - {type: head, offset: 14, content: 劉端, id: KR4h0168_NFKB_869-h1, level: 1}
body:
  text: 上闕明覆載以稱功浩渺百川峻嶒五嶽顯陰陽而自異呈動靜以為徵莫不隱靈祇彰聖化欲見而非見示威而不威福善禍淫有今古無差之理聰明正直豈鴻纎偏照闕妙難窮之跡蘊幽元罕測之基昭然憮然哿矣大矣驅至道而牢籠萬彙啓範圍而埏埴㣥倫敬之遠之寒暑不於四序恭也禮也扎瘥闕一字適於千門況闕還當夏氏之興且特修王母之祠未盡善也逈致高禖之祭胡可比焉豈若恆嶽霞峯安天疊廟鎮撫堯分之所輯寧禹別之方闕一字氣勻鋪壯闕二字勢巍巍藏雲龍而均風雨如生肅肅將魚水而睦君臣遠邇垂恩公私布惠解濟黔黎之苦能蠲皇闕之憂魑魅亡魂姧回縮脰怖盤拏闕一字黃鉞逃粉碎闕春秋祇若興五侯懇薦於蘋蘩黍稷非馨唯於饗德備腯咸有但以依人伏又河朔名區海西樂土雖寡魚鹽之利尤多耕織之資密邇并燕絶六狄七戎之闕一字交居趙魏招闕境是諸華之則三軍為百代之規整頓朝綱獨立功臣之貴平除國難孤標取亂之勳況大唐二十餘帝乾坤三百年間社稷龍魚數見闕二字頻生聲振闕萬方之禮樂無雙堯舜芳猷既參差於竊比商周政柄徒卼於揚名宇宙升平煙塵帖泰泛宸恩於草木鍾睿澤於惸嫠屬以失味闕二字輕漂舟楫闕玉輅東西豈為春搜之故銀鈎南北唯論秋煞之因荏苒九州依稀六國運偶二三之變時遭百六之艱伏以闕歸於神授英通盡出於天生昴宿光芒契叶賢王之瑞金精照灼潛符霸主之徵執禮宏仁廉刑薄斂遍沐怡顏之貺闕一字遵難犯之威闕彰形影於冰壺不意小瑕留心大節賽桓文之令望超周召之嘉音謀始要終理煩去惑皎潔三秋之月泓澄萬頃之波而又世襲闕五孝從五帝而至如今加以武庫規繩儒門綱紀著述五兵之策研精萬卷之書稼穡偏知但見啓期之樂刑罰獨斷旋除庶女之風惻隱肥家忠貞活國勳闕大展謨謀深行理治每設補天之術恆修縮地之方由是訪沉淪求疾瘼崇佛理重神明廢置伽藍總就增修之命傾頽廨宇俱當造化之功闕一字嶽廟以天寶闕洎乎舜歷頻移秦正屢改將新舊而分巧拙方彼此而日古今屬以山粢欹傾丹楹朽腐只取於素來基址特興於此際規模遂命押衙充都闕一字修造使檢校工闕畚梮藉罄竭於心匠惟臻至於忠勤百役子來三時農隙選攘甍於異木詮柱石於幽巖梓鸞椓琉璃鴛瓦想楚宮之枉設誇漢殿以虛詞斤斧奇能闕一字偶闕長鬣千千似禀銜枚之命驌騻萬萬疑聞聳轡之聲福壽要津神祇會府閬苑亘瑤林之茂銀扉衝朱檻而開未既十旬其庸一旅勞而不怨告厥成功實為陰闕嶝凌空展梯闕二字莫達清波忽泛浮梁棟以旋來黯黯坤元踊一攢之勝概明明星紀聯百雉之清虛佛土裝嚴猶虧鳳髓蓬瀛景致只缺鼇頭豐省亡機疾闕北討南征蓋闕二字神之助人安俗阜深憑陰德之功而又巨夏多艱中原盡蠢大厲久離於四表太平永在於三州闕絶闕一字圖貽厥孫謀宏宣祖業社稷類金湯之固山河齊日月之榮端負笈微人食魚末客少琢磨於焉學深闕二字於斯文謬歷煙霞愧闕異披砂闕二字拾芥有濡毫而稽顙無香桂以甘心進思盡忠煦育之闕荒蕪冀闕一字寵命敘虛襟而寧極修實録以何窮但以闕如誠非作者雖乖雅頌輒縱賡歌闕國泰密闕一字年豐一人肅敬八表欽崇諸神際會闔境和同公私唯孝左右純忠威降巨祲力制㣥戎寶裝廟宇山是屏風其一精專建造巧竭元微高攢闕繫日光暉龍拿虛噴師從兵圍前壇後菀左驂右騑尊卑森森去就依依俄興木鐸待整璿璣其二匡時舟楫間代公侯洪橋架海皓月當秋恢宏至道以闕巍巍清廟岌岌危樓家財已捧制置增修行藏實録今古難儔其三名超八凱鑒若三辰忠貞輔國禮樂親鄰始終霸道左右賢臣一方受煦萬物逢春闕奉命文不驚人微書盛事永載貞珉其四振吳天祐時人歲在單閼律應蕤賓太尉中書令楚王重修二妃廟於洞庭岸所以酬靈感而答前願也在昔有鰥側陋將宏試可之功降觀刑始協嬪于之德於是化流媯汭德洽堯聞罔矜帝子之尊盡執家人之禮洎南巡不返北渚俱來莫追龍馭之蹤空見象耕之所違天有恨甘委骨於重泉同穴無期分捐軀於積水芳流舊俗德被遺黎煥廟貌於千秋儷精靈於二聖魂歸紫府想從西母之游迹瘞黃陵猶錫斯民之福有祈皆應無感不通權水旱於鄉關運慘舒於生植吞刀吐火越巫而但騁蹁躚桂酒椒樽楚老而猶通肸蠁我太尉中書令楚王撫戎多暇訪古遺蹤敬神而遠之非鬼不祭也以二妃廟基頽毀棟宇傾摧荊榛翳薈於軒墀苔蘚斕斒於像設靈蹤未泯寧無步襪之塵祀事不嚴亦繫褰帷之政乃命魯工削墨郢匠運斤初洞啓於崇扉忽鳥翔於峻宇圬墁雲布畚鍤星羅在三農而不妨雖一日而必葺蘭椽櫛比桂柱翬飛梁間之螮蝀不收簷際之鴛鴦欲起黛眉斯斂若含黃屋之愁繡臉如生將下翠筠之淚始者欲為經度盡自內財仍奏皇明請崇徽號奉唐景帝天祐五年六月十有四日敕旨以黃陵祠封懿節廟竊以世遙三古事遠重華褒揚必在於正人寵數方加於異代故可使窮泉發耀貞魄有歸非至德何以通神明非至靈何以感直氣厥功既就盛德將書鐫銘永託於他山悠久便同於元造宜求彩筆以述芳詞振跡忝前旌名微候館仰承嚴命俯扣庸音無陸氏之患多有景純之未寤它年岸上應知杜預之功今日江邊且愧曹娥之作噫楚懷失道遠君子而近小人靳尚讒言興浮雲而蔽白日子也含寃靡訴抱直無歸叩閽而天且何言去國而人皆不弔徘徊澤畔憔悴江濱吟貝錦以空悲佩崇蘭而自喻雲裝羽駕東皇君忽爾來游斂袵端蓍鄭詹尹於焉靡說懷忠履潔憂國愛君驚禽而徒欲繞枝棄婦而豈忘回首離騷詠盡不回時主之心靈璅長辭竟葬江魚之腹救溺之蘭橈競逐招魂之角黍爭投寖為午日之風播作三閭之事式瞻遺廟尚巋崇基綿歲月以斯多黯精靈而未歇然即金鋪零落蘭寮摧頽蝸涎全染於杏梁蟲蠧半穿於桂柱苔生玉座塵壓珠簾蓬蒿漸蔽於軒楹風雨垂侵於像設我太尉中書令楚王道惟濟物德必神通思闕政而感修想忠魂而有感況靈符禱請事著聰明能資上相之兵威克靖二凶之沴氣遂得拜章上請疏爵遙封爰旌感應之功是錫昭靈之號相府乃減淨財於厚祿模大壯於遺祠規圓矩方上棟下宇華榱錦簇將日曜而月輝彩檻帶縈或龍盤而獸走飛檐鳥企瑤砌砥平靈官與鬼將爭趨海若共波神並侍陰風暝起應朝澤國之靈落月春深但哭巴山之鳥前依積水逈壓高邱占形勝於一隅奠馨香於萬古其或征人輟棹歸客憑軒當洞庭木落之初是枉渚波生之後千聲鼓枻猶傳濯足之歌一紙沉書曾弔懷沙之恨風急始知於草徑火炎方辨於玉貞當時之瓦釜雖鳴異代之桐圭忽及況重新廟貌光被綸言固可以大刷幽靈全攄憤氣想直躬而若在披遺像以如生爰終結構之功欲紀經營之跡豈期嚴命猥及下寮振道愧談賓名參霸府居唯代舍歸來敢歎於無魚地實長沙日晚誰驚於有鵩從軍稍暇訪古多懷正吟招屈之辭忽捧受辛之旨勒他山之翠炎序有土之殊功風聲永播於無窮追琢便期於不朽何人讀罷起三十里之沉思今日斐然慙二百年之述作直書盛跡用告將來金吳順義時人中書門下牒先據袁州刺史王安狀申伏以當州名山古迹南仰靈祠擬巨嶽以齊高聳㣥峯而逈出福流一郡威播四方凡有啓祈無不響應頃以本州郭內頻遭災火人戶不安苗稼亢陽泉源涸竭遂虔誠禱祝專詣殿堂乞火燭頓銷人心寧帖及希降於雨暘遂許具狀申聞伏見此廟七郎先朝天祐十一年內封感勝侯禮部尚書九郎封司農少卿既靈異以昭彰宜遷崇於爵秩伏乞特加封贈庶助境疆冀祈雨順風調永保鴻圖帝業伏候指揮者奉敕民為神主神乃民宗苟有昭彰諒宜封贈袁州仰山廟宅於萬仞奠彼一方秉聰明正直之風納黍稷馨香之薦無所不應有感則通矧乃本州列其靈祐乞加旌獎以福蒸黎贈禮部尚書感勝侯蕭某宜加贈尚書右僕射仍進封廣惠公贈司農少卿蕭某宜加贈工部尚書仍封昭靈侯其所贈公侯仍下所司準令咸製造冠裳等給賜牒至準敕故牒順義五年十一月三日記元浩吳太和時人述曰堯舜為君仁化唯該於域內周孔設教軌儀但備於寰中尚乃千古從風百王禀敬而況釋氏興世妙用難思慈悲遍洽於含生行願廣宏於沙劫智即權實相顯有無運六舟而橫截四流嚴萬德而高超三界於五險空聚示一大事因緣由是多子塔前迦葉授無法之法震涅國內達摩傳非心之心印印相承燈燈不絶咸歸實際運照無窮祖宗之源派既分解脫之法門永闢厥有特禀異氣別包粹靈生法王家為如來子當後五百歲紹彼元風者則惠從長老其人也師生緣漳水允嗣夾山早獲衣珠游泳而安間若海已收髻寶卷舒而自在如雲兩入五臺再遊三楚顧巨廬之名嶽實釋道之所依翹心於五老峯前駐跡於大孤山側永安院者唐乾寧中高僧如義卜焉結茆單棲屢更寒燠嘗有龎眉之叟不知何許而來四望巖巒三興嘉歎曰斯之勝地後必聚徒義公省自道孤乃讓鄰德甲戌歲遂往執袂付院傳券檢田此則擁錫而來彼則挈瓶而去仙居禪宇自是聿興參學之流遠邇輻湊鄙其舊制易創新基芟闢荒蕪締建精舍袪彼茆茨之陋儼其鴛瓦之容回廊掩正殿香廚虛檻枕法堂僧室洞源深處樓臺而屹若仙宮雲霧開時境界而迥殊人世布露不唯於心匠土木悉自於躬親師又運四無量心行四攝法事以詩禮而接儒俗以衣食而求孤惸來者安之終者葬之其間羈旅書生咸成事業告行之日復遺資糧登祿仕者甚多榮朱紫者不一施食施法為渚為洲枯木寒灰外形骸而是幻碧潭秋月指影象以非真所坐道場別承靈貺託嘉言於物象寄妙旨於筌蹄其遠則迅雷疾風其致則渾金璞玉而又體其莊老會彼元真恢欲投機啐啄相應所謂得語言三昧獲無礙辨才三界寒暄唯一布毳二紀林麓不適人煙洎大吳大和三年歲次辛卯江州資福禪院闕下尊宿宏持時節度使德化王敬奉釋門興隆遺教仰師法眼思挹真風既多景慕之心乃切請迎之志遂遣左排衙使江鼎動持書達命師性便泉石不樂城隍抗彼使人未從嘉召以至封函數四俯仰旬餘下風之禮既堅開士之情尋允到日列闔郭緇俗備幡蓋威儀如自雪山迎歸舍衛親王降駕人天共瞻復陳香積之筵以慶醍醐之說洪鐘任扣響應隨機王深味元津愈生珍敬由是法輪宏敞真範高傳契王侯匡護之心賴龍象誕生之德鬱興舊院仍改額為悟空師雖處廠墨闤終思巖穴約與猿鳥相狎畢此浮生指期故廬禺俟回錫矣弟子恆迷覺路靡究真空久居曠野稠林杳隔菩提彼岸雖逢善友難求罔象之珠縱遇醫王莫味阿伽陀藥唯當敬奉隨順親近善知識而已幸居幕職每接慈顏不度短材爰述斯記庶使名山勝概永載貞珉而不朽其本院所有山林界至及買置常住新舊田園物業並具土名界段碑陰冀於他時免有侵越時大和四年歲次壬辰八月巳酉朔六日庚戌題熙吳天祚二年官武昌縣尉大師俗姓劉氏法諱懷溢本無諸倚郭閩縣人也即巨唐相國彭城劉公瞻之次子也童年慕道不習儒宗時齠齓之歲厥父攜同詣京師固辭弗往漸登九歲俄自發心棄捐俗務投立磨山普資院杜禪師門下求為弟子願侍巾瓶禪師立性孤僻抱直嚴難未許升堂不容入室且堅苦節每勵勞形涉歷年華經逾炎冷身齊槁木心類寒灰一自入山久淹出谷十年精闕一字午夜志疲師長念及功勤知為志器於年十九方為落髮披闕一字結束法衣遣求和合恭承嚴旨高別林泉星夜登途望風取路遙山獨步峻嶺孤征時往日來俄之中嶽會善寺琉璃壇欣逢法侶敕啓霜壇大扇律風高懸戒月夙緣諧偶曩善冥符不上牛車便探衣寶併三衣而為一衲棄五事而整一盂松下冢間行頭陀行雖行是行參問匪忘遍歷遐方訪尋知識無道場不逢古德有請皆遇宗師其奈不湊元機情源擁塞如渠聚土狀當衢須議芟剃終期決抉而乃直拋衡嶽專簉灌溪函杖而誓扣元關摳衣而立融階雪澧源和尚一觀奇特許厠門牆久而彌芳漸升堂室況乎居猶學地道未博通仍於異時侍立左右和尚演於法頌云五蘊山中古佛堂毗盧晝夜放圓光大師才聆妙說頓入清涼悟即剎那迷流沙劫一言契合萬慮情亡豁若雲開皎同月朗既除疑滯不慕遊方遰襲傳燈嗣何宗禰即曹溪六祖付法讓大師讓大師授馬祖馬祖傳百丈百丈分黃蘗黃蘗之林際得林際密旨者惟灌溪焉入灌溪室續焰挑燈者誰即雲蓋大師矣大師然以元天月白覺海波清真燈未燭於祖堂雷振停開於蟄戶維廣明初之上都值黃戎犯闕僖宗皇帝駕幸三峯暫避狂徒敕選十員禪律經論詩賦文章大德駕前供奉和尚禪宗一位也敕賜福田禪師止三峯再賜大自在禪師爾後狼煙息爇草孽停爭時屬太平寰宇寧靜光宅四海慶洽萬邦特軫睿毫更于歲號為光化元年實謂山呼海蹈舜日堯雲百辟稱慶於龍廷三寶承歡於帝澤悉銜雨露亟被霑濡和尚特光化大師仍頒命服禪袍改為椹色簡誥迥錫皇恩旋聞海晏河清遠播民舒物泰鑾駕將回於萬乘寶位卻復於九重帝績丕昌龜圖鼇負皇帝升於大內慶叶千靈金雞才樹於琅玕瑞渥旁流於遐邇遂抽御槧揮當玉扆之前茂發金言綴向霜箋之上遂改光化為天復元年當年秋上表乞養疾以歸南別天顏而出北既遙鳳闕堅駐龍沙山二年時有唐鎮南軍節度使中書令南平王鍾公作鎮乘時虛襟扣寂位崇列土心仰元門一禮慈悲三申延請洪鐘預扣難藏衆耳之音幽谷傳聲已播多人之口和尚弗能違命遂許宣揚志出池隍深奇水石府主鐘公捐清俸鬻白源立山雲闕一字為稱伐材搆院奏額龍壽彰名既畢莊嚴遂陳延請開堂演法垂手度人蟻聚禪徒蜂來道侶於茲三十餘載問法千數萬人於吳大和六年甲午歲杪夏十一日示疾松堂逮於中秋二十八日夜子時歸真丈室俗齡八十八僧臘六十七當年冬十月二十闕一字日移龕瘞乎真塔去院法堂東北隅二十步之外初終覼婁見罄樹豐碑事集一時彌流永古上足小師充院主道歸典座小師道環維那僧紹微直歲小師道聰堂中上座僧照照徒衆僧師蕩等並禪河舟楫奈菀芝蘭咸佇分燈續開籌室慮以先師歲華迢遠莫紀芳猷故鏤貞珉命為斯記熙儒宗後派學苑微材恨罔侍於指南嗟未親於丈室恭承來命合掌虔誠頂想慈悲敢為銘曰開士垂儀覺皇真子洞究元微達乎志理不受毫寧容彼此法嗣灌溪燈分林際水上呈鞾長安駿驥拽杖京師皈崇明帝師號紫衣僖宗恩賜處世界兮如把虛空若蓮華兮真不著水故演慈悲強云出世南平鍾公虔迎駐止㣥生緣盡化終已矣出沒難拘浮沉自在月隱元天龍潛覺海師示來兮混四生中師歸去兮超三界外勞生戀兮謾自悲傷若蟬蛻兮有何惜愛台符歙州人好學善為文徐知誥鎮金陵自草間上書陳民間九患及利害十餘條為宋齊邱所沮貽書誚之齊邱怒使人沉之於江天不欲蓋地不欲載兩曜不欲凝萬根不欲生玉石一塵賢愚一邱則神人不得不降聖人不得不作我唐不得不興越公不得不起起而不失進退存亡者越公得之矣隋鹿不醒㣥雄率起公矯翅一鳴聲著千古提山掬海沃沸顛危掃平反側之源歸我唐虞之際武德四年高祖下制曰汪華往因離亂保據州郡鎮靜一隅以待寧晏識機慕化遠送款誠宜從裦寵授以方牧可使持節歙宣杭睦婺饒等六州諸軍事感天人知已趨玉闕言懷龍劒一沉死而不朽貞觀二十三年也有棠棣之詩無良人之難固得父老請建祠堂在廳之西大歷十年刺史薛雍遷於烏聊東峯元和三年刺史范傳正又遷于南阜即今廟是也中和四年刺史吳公圖克荷冥應復新棟宇迄今司空潯陽公景慕英塵經始靈宮凡三遷三飾物不告勞民惟求舊濟於時死於國功宣教化則祭之其餘不在祀典狄梁公按察江淮焚淫祠七百所朝野韙之所謂能執干戈以衛社稷越公欲蓋而彰雖焚不可得矣且湯不乾堯不濕曷顯聖人之政唐歷十有九帝二百八十年其間時有奴狂僕醉觸破王化洎僖皇歲庚子盜起曹南逆塵犯蹕我淮王宏農公大呌義聲千里奔命宣池濠壽舒廬滁和十有九郡繞我馬箠分我君憂苟無將將之雄莫破錚錚之膽我司空潯陽公獨庖仁義禮樂餌舒池常潤於歙最多為政第一慰本城之人築久長大本豈矜壯麗一時企望六郡直在乎開物成務遺愛金石者也台符越公之裔潯陽之吏祖能神主能賢辭或不直作神之羞辱主之命咨我邦人同歸典實庶可與言文論政矣龍集壬戌十二月十有一日謹記
