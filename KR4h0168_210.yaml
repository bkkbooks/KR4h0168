front:
  text: 全唐文欽定全唐文卷二百十陳子昂二
  hash: sha256:dcee5d58b0f2d46320bc08cc28aa7940a5211a703f34aed7c207334016dbe848
body:
  text: 臣門衰祚薄少遭險舋行年三歲嚴父早亡慈母鞠育哀惸相養臣又尫羸少多疾病零丁孤苦僅得成人老母憫臣孤蒙恐不負荷教誨師氏訓以義方家貧無資紡績以給束修衣褐並出母指臣既無姊妹寡有兄弟衡門獨立唯形與影母子相視惸惸靡依罹此艱虞歷二十歲臣稍以成立忝迹朝班薄祿微資始期色養私情獲遂母子相歡殃罰不圖老母見背攀號何及泣血漣洏於時日月非宜權殯京兆歲序遷速於今集年臣本貫河東墳隧無改先人邱壟桑梓猶存母亡客居未歸舊土宿草成列拱樹荒涼興言感傷增以崩咽今卜居宅兆將入舊塋明年吉辰最是良便除此之際未有剋期臣謬齒王人職在驅役今歲奉使巳至居延單行虜庭絶漠千里臣雖萬死無答鴻恩恐先朝露有負眷知一作老母伏惟陛下仁隱自天孝思在物哀臣孤苦降鑒幽冥使臣來年得營葬具斬草舊域合骨先墳保送羈魂獲申子道烏鳥之志獲遂私情遷窆事畢馳影奔赴雖即殞歿草心無憾糞土臣某言臣以殃釁姪構凶逆臣合宗族誅戮以顯國刑不謂天慈哀矜宥從寬典全臣骸骨生竄遐荒窮魂再造以崩以躍中謝臣聞忠臣事君如子事父窮痛之至則呼所親何者君父恩深臣子懇切况臣蒙陛下恩遇如子於母今為子不孝為臣不忠長辭闕庭永沒荒裔悲窮痛恨荼毒誰依即使朽骨埋魂長滅泉壤懇誠莫展幽翳明恩實恐隱匿於君不盡臣節明神誅殛瞑目貽殃輒敢隳裂肝心罄竭誠懇殘喘冒死期以少謝伏惟聖母神皇陛下哀憐垂察中謝臣聞犬馬賤畜尚知主恩草木無心猶感德化臣雖駑猥不足比人負榮懷恩能無感激臣山東孤賤朝無親故性識愚鈍材無可堪非能矯跡立方飾行軌物假借名譽為時吹噓遂得宿衛階墀忝職郎將勤勞莫紀尸素巳多任經十有三年竟無一階升録臣之駑劣於此可見而貪冒榮寵尚不知歸陛下應天受圖恢纂大業又不以臣駑鈍特見褒升擢任中郎委以心膂在職未幾即檢校將軍才逾一年又加正授未盈三歲貴顯朝端寵渥隆崇莫與臣比每刻肌骨曉夜思維臣以何功謬私天造超㣥越輩顯赫明朝應由天性專愚志一守直行不負物心不愧神盡忠事君竭力養母所以聖慈幽鑒曲照懇誠寵任無疑委同親近不然愚臣何以叨此殊恩臣凶險罪深母不終養爰初遘疾以至終亡天慈再三降醫賜藥酒脯珍膳繼踵臣門優問殷勤若同親戚臣之母子何德於天子貴母榮恩禮重疊臣誠不孝至頑至嚚蒙此恩榮豈無感戴臣愚性為善不願人知非敢自矜用為僥幸皇天后土實見赤心臣往任郎將之日陛下特以臣貧賜銀及綵臣以天恩非分矜慜賜臣懷戴之心祈懇冥報遂用於天宮寺寫書造像半為聖人半為老親臣以君親之恩所宜並報報是當理不合人知自爾造成一無知者臣今日獲罪不合上言實以事君之心所宜罄盡善惡有隱恐負赤誠恐臣長沒黃泉無見聖日區區之意安可不陳臣每以陛下恩深微臣命淺嘗願湮宗滅族獲報萬分何圖誠效未申凶孽先集逆天反道背德辜恩污辱門宗虧缺臣節此臣所以椎心泣血仰天號咷長負陛下之恩終無上報之日煩寃荼毒心肝以麋比者待罪幽囚以殞身碎首為奉陛下賜書示喻照察臣心所以捧戴偷生假恩殘喘今既蒙寬法兄弟獲全投竄遐荒甘禦魑魅臣之慶賴復何可言所恨亡母廾背即遭此禍几筵塗炭孤魂煢煢存者流離亡者哀痛辛酸幽顯為世所悲應由臣不孝不忠延此禍酷何以面目下見先臣何以心顏拜辭天闕生死無措永訣於今即以某月日部勒妻子奔波就道即應死滅結草幽泉伏願聖母神皇陛下至尊寶神為萬姓加膳天下禔福以祐蒼生壽若南山永永無極不勝戀慕感咽之至臣某言臣無教訓家有逆子臣合污宗滅族以顯國刑天慈哀矜放從流竄臣為慶賴巳是非圖今月遂蒙天恩以臣所坐流刑特從放釋窮骸枯骨一朝再生踴躍章惶再崩再殞中謝臣山東孤子朝無親故性識愚魯非有才能陛下超㣥越輩崇以榮寵昔任郎將十有三年遂無涓塵一階升録自陛下踐極謬荷恩私冒寵叨榮超絶時輩從郎將檢校將軍才逾一年即加正授皆從宸眷非有因人寵渥隆崇莫與臣比臣之孤賤榮顯知慚臣又凶殃積罪甘投魑魅孤負陛下之恩永為遐荒之鬼肝腦塗地無以微酬豈謂天造曲矜恩及枯骨收骸溝壑返魄幽泉使魑魅窮魂重生聖日糞土殘命不滅荒陬荷德感恩萬死無報不勝感荷再生之慶臣聞帝功既乂必昭告於上元元命攸尊必升封於厚載故七十二主能恢萬代之規三五六經以為百王之典伏惟陛下應天受命握紀登樞包括乾坤之靈亭毒神明之化故能開天寶闡地珍溫洛所以升圖榮河由其薦籙㣥神既贊衆瑞交馳謳歌於是大歸禮樂以之咸備陛下仰順天意允答神休垂顯號以居宸建明堂而治物百寮惟允萬國咸寧然則嵩嶽神宗望玉鑾而來禪天中仙族佇金駕而崇封實大禮一作德之昌期膺告成之茂典况神都為八方之極太室居五嶽之尊陛下垂統紫微大昌黃運報功崇德允協神心應天順人雅符靈望皇圖盛業實在於茲臣等叨願堯封久忘帝力竊聞聖人封禪天下所以會昌山嶽成功皇壽由其配永臣等既為陛下赤子陛下又為萬姓慈親實願上報天功下順人望勒成嵩嶽大顯尊名不勝慶幸之至臣聞子貴親榮聖人典禮故姬文受命尊太王之名漢祖登宸加上皇之號而皆事美帝籍業盛昌圖臣伏見中山大王道合先天功成佐命昔高祖神堯皇帝義旗爰建大號初興首贊皇基定策京邑用能神驅電掃應天順人龍躍紫微光宅區夏實賴大王之德翼成高祖之勳開國成家猶未奉答况陛下應命受天協運披圖正顯位於明堂昭大明於天下功崇五帝業盛三皇可謂寶極洪名尊崇光大今者追尊之義猶闕於顯陵榮親之典未聞於帝號臣聞商周革命封宋之君春秋正名美虞晉之祀夫以興王繼絶尚不闕於禮經况乎大孝尊親豈可虧於祀典臣等餐和白屋沐慶元門幸為可封之人叨遇永昌之運伏見陛下則天法地崇孝臨人方且示天下以事親正皇猷以達禮蒼生之慶實賴惟新不任區區伏請上中山大王尊號遠以光祖宗之德下以順黎元之望臣某言臣以險舋私門不造亡父故某官先臣某早先朝露永謝休明日月不居星紀云暮伏以先臣策名委質冠帶早年始自解巾即陪軒禁終於結綬纍忝榮私三歷名卿職參於河海八居州牧任叨於股肱而報效未聞零落先及啓足之日露首之慚是以臣克奉詔言志期冥報請以當家子弟三兩人奉為高宗大帝出家歸道而孤煢在疚遺屬未申奉以哀號實貫心髓今者大帝登仙之忌以及茲辰先臣懇誠未效他日所以乞遂冥願敢覬天恩庶菩提之因發揮於正覺槃之證幽贊於宸階先臣夙心無恨泉壤伏願上天降鑒微誠可哀因緣獲展存沒交慶不勝崩迫云云臣禍釁所鍾早日孤露墳塋莫掃松柏凋荒臣之不天實有由咎死罪死罪昔先臣下代遺訓未忘而殃罰不圖家禍潛構兄弟無故並為參商中冓之言所不可道孤臣不孝萬死餘責死罪死罪然臣之負譴實陷無辜吏議不明以投魑魅自泣血去國寄命南荒歷年被病再以生死炎山漲海氣瘴窮天戴白之老俗無聞者孤臣疲薾豈望須臾分謂委骨窮溟餌身魚鱉狼荒之鬼永悲長逝不意慶雲垂澤天渙宏流拂拭霧露生見白日踴躍昭泰情何以勝死罪死罪而餘殃未泯凶故薦臻亡兄濟江合家淪溺嫂姪俱逝一不生存尋途未中臣妻又殞重疊亡沒契闊山川至止之日生意盡矣誓將守死陵墓歿齒家園不圖恩幸曲成寵章仍及題輿別駕職是恩州再造生涯天實為德死罪死罪臣自歸日淺塋廟未修荊棘荒然祭祀無主今即便祇皇命遠職邊夷歲月方賒拜掃何日瞻言出涕感貺崩摧伏惟陛下仁養㣥生孝理天下萬物咸遂各得其宜臣獨向隅有以長戚伏願天慈愷悌憐憫孤窮寬以簡書之刑賜其告歸之請使得駿奔西土長號北陵獲申存沒之悲生謁園塋之樹稽顙松關謝不睦之辜肉袒山門祈自新之路刻誓肌骨奉以周旋然後退死蠻夷沈骸糞土甘心朽滅庶無遺恨儻昊天鑒照孤誠可哀則臣之鯫生志畢今日不勝崩迫之至草土臣某言去年某月日奉哀陳請乞終喪制今某月日奏事官賫臣所奏表回伏讀報詔不勝悲懼陛下為臣纍有政能特見任用使臣移孝為忠即斷來表臣內愧不孝外慚無能污辱聖聰措身無地臣某中謝臣聞時方偷薄勸人以孝時方趨競勸人有禮有不至者誅而教之臣今不病固合辭避况臣疾發日久亡母未葬忍偷餘生望畢家事敢汙人倫以傷風俗昔山濤與時主有舊溫嶠亦功存當代濤起應禮嶠不歸葬守禮法者議而薄之臣於國家無濤嶠之功舊必依詔命兼濤嶠之可薄俯仰人間豈獨羞恥聖朝用法合置誅殛前者直省賫敕勒臣赴任使司準敕移責州縣所由官吏畏懼威嚴臣所經行停留不得待臣出界然後奏報臣氣力羸憊奔波道路悲憂惶恐舊疾加極半身不遂手節拘急行步飲食須人扶助近又兩目昏暗如有瘴冒雖生猶死不堪力強特望聖慈乞臣骸骨歸奏几筵及葬州里在臣私情死生願足臣今病在桂州俯伏待命臣風昏謬妄舉動失常頻犯天威不勝震恐謹遣某官奉表陳乞以聞草土臣某言臣先患風疹并兩目昏暗右手不能制物一足不自運動前後頻有表狀請停官職臣自到桂州病轉增劇更加瘴虐臥在床枕兩目漸不見物起動皆須扶引死在朝夕敢偷祿位伏恐陛下謂臣尚顧禮教以疾辭讓遷延歲月待畢喪紀臣除官巳來向欲一歲頻違詔命合正典刑陛下縱不忍罪臣殘喘乞臣餘生固不可為臣曠官待臣痛損特望天恩即為臣替不任荒懼哀懇之至臣聞玁狁不恭周王致其大戮將軍失律漢將被其嚴刑未有逆命驕天而逋舋鼓之罰亡師沮衆遂寬載社之誅伏惟天冊金輪皇帝陛下肅恭上帝子育㣥生萬國所以宅心百蠻由其屈膝而契丹凶狡敢竊陲邊毒虐生靈暴殄天物皇兵順伐仗仁義以共行窮寇姦回憑險阻而猶鬬臣等仁虧聖略智昧詭圖遂以熊羆之師挫於犬羊之旅誠合結纓軍壘抵罪國章陛下以堯舜深仁且緩三苖之伐禹湯罪巳不與萬方之辜遂得齒劒餘魂更參授鉞之任死綏之魄復同挾纊之恩四夷義以來蘇三軍感而抃舞痍瘡再起俘馘是圖將士同心誓雪孟明之恥殤魂共憤思亢杜回之讐臣等殉義忘生報恩惟死不任感激慶戴臣某言伏奉某月日巳前赦書赦臣萬死才削見任官秩還復本將軍名始慶再生即榮寵命宛轉踴躍感戴慚惶中謝臣聞鑿門受律本合忘生對敵臨戎殉節唯死此乃國家恆典軍政嚴科臣妄以庸才謬叨重任不能深圖遠算馘醜摧凶以宣廟略之威永息邊人之患屬前軍挫衄士卒奔亡臣復繼驅馳戰鬬交合川谷地險客主勢殊步馬相懸左右受敵決命爭死力盡塗窮遂以貔貅之師衄於犬羊之衆誠宜刎首謝國殺身報恩陛下洪湯禹之仁務寬大之典愚臣同孟明之侶遂免嚴誅白骨再榮丹慊未泯誓將枕戈嘗膽殄逆梟凶躬為士卒之先以雪殤魂之憤肝腦塗地少答鴻私不勝荷戴再生榮幸之至臣今月日千騎田楷至伏奉恩敕賜臣紫衫旱衫袴等一副臣萬死骷骨垂朽蒙榮載戰載殞肝心塗地中謝臣以駑朽叨承重任憑奉聖略誅討元凶實合震曜天威俘斬逆首而智力淺短進退無規被王孝傑陷鋒于前臣則接戰於後躬先士卒苦鬬山林自辰至酉殺賊無數嵓谷峻狹車乘相旋被孝傑敗兵回相衝突逆賊乘便重襲臣軍士卒被傷子將多死臣決命爭首陷陳摧凶日暮兵疲瘡痍相半鳥散山谷人無鬬心臣獨無依遂失師律即欲刎頸陳下委骨顯誠實恐身死克寸傷未雪國恥所以含垢忍辱圖死闕庭今月六日至幽州即囚繫獄戶延頸戢魄惟待嚴刑湯鑊在前分委灰土豈謂天慈矜鑒回憲增榮以其伏鑕之魂更辱賜衣之寵煩寃踊躍載兢載惶泣血嘗膽誓復國讐刻骨刻肌敢忘天造不勝巳死再生感戴欣躍之至臣某言中使某至伏奉某月日敕書慰問將士官吏僧道耆老等並賜臣手詔及冬衣兩副大將等衣一十五副者天慈遠致聖澤傍流海隅臣庶抃舞相慶臣某中謝伏維陛下道宏文武任切藩維遠念戎旅之勤亟頒時節之賜臣以謬膺寄理載涉炎涼效績無聞負敗將及恩私每降慚懼不寧今又俯浹宸慈曲延寵賚當戒寒之初候沐挾纊之殊榮佳氣集於城池喜容生於草木三軍叶慶萬井相歡况臣荷寵逾涯忝恩滋甚螢燭無裨於景曜畎澮徒願於朝宗悚踴遐方感戀俱切無任感恩荷懼屏營之至臣攸宜言伏奉聖慈敕借臣廣既馬四匹星旗方列天馬忽來祇拜恩榮抃躍兼集臣名慚白馬陳昧青龍徒憑廟勝之威竊總元戎之首皇師久露凶羯未孚方欲親負干戈身先士卒金山深入期突厥之功玉壺遂臨叨得駿之賜昔開東道今見西來感燕骨而長鳴君恩罔報向朔雲而驤首踏頓方擒坐馳千里實愧三軍寵貴非圖榮多增懼臣某言伏奉中使宣敕旨賜貧道藥總若干味肅恭休命敬受慚惶猥以眇身叨蒙大賴室殊方丈同問疾之榮施等醫王感能仁之惠雖赭鞭神授未可比其英蕤赤斧仙圖固以謝其靈氣方將駐茲營魄蠲彼衰痾以要上品之經將希大年之壽人微惠重答施何階不勝云云草土臣某頓首稽顙臣言今月日中使某至奉宣敕旨以臣母喪贈物若干以給凶事孤臣鞠凶禮辱天貺稽顙拜命號絶迷圖中謝孤臣不天早失父蔭兄弟孤藐並未成人亡母哀惸鞠育見保不墜於地以及於茲煢煢私門幽顯為慶榮忝之望非有始圖陛下親親敦念末屬憫臣孤賤惠降恩休孤門載昌實始天造母子之賴以喜以惶兢兢孤臣未知攸答陛下又恢大運崇號寵章時復私臣弟兄超登顯位母子光寵榮養以申豈臣單微所能及此早誓先沒以為親榮而天不禍臣延及先母號訴無及荼毒煩寃陛下降哀又見憫悼惠賜禮物過越典章生榮死哀重疊若此孤臣殘喘胡顏冒德一作日月而臣之迷塞荒謬禮經先遠之期又勞聖問有無之禮憂若家人天實為之臣復何及即此殞絶期以謝恩號咷崩鯁伏表迷塞不勝荒迫之至草土臣某頓首稽顙言今月日伏奉恩敕以臣亡母初七特降上宮若干人給使黃門若干人並賜物若干段以給護齊事天恩過禮伏念號惶孤臣殃謺尚未殞滅荼毒如昨奄將一旬崩號無及肝心糜潰陛下慈惻哀念孤窮復憂齊祭恐有闕禮既賜束帛又降上宮恩慈再三若猶未足自國家寵貴未聞此榮草茅孤臣何以堪處不日銷滅永負聖恩號泣昊天以崩以訴不勝荒迫之至草土臣某頓首稽顙言伏奉某月日恩敕以臣亡母遷祔特降敕給人夫及車牛服用物若干以護送靈柩至京祇奉恩私頓首崩殞臣未亡滅假息苫廬日月永往奄及先遠荒迷在疚不知禮儀陛下哀矜憫其不逮恐有顛沛憂及亡靈備物象設並自天賜祖載營送又遣官供威儀在途魂魄光寵行路延佇而以為榮孤臣窮凶何圖至此天德彌厚殘喘待終泣血扶靈方滅歸路號感恩造窮絶迷圖不勝號噎戀恩殞絶僧某言一昨預內道場講恩敕殊奬賜有褒稱死罪死罪某實專蒙昧於至道徒以早栖真實委質香緣遂以濫越殊私光照寵渥日者法宮聞道講賜承恩叨玉塵之榮預金閨之議遂得對揚真會咫尺天威徒有明恩卒無幽贊不能絶王倪之問以默夸詞息毗耶之言冥通得意天休光被曲見稱揚㣥議允懷猥忘其陋顧揣涯分實靦心顏將何翼亮緇徒發揮元極以念嘉惠怵惕惟憂載懷愚瞽而心况知愧無任慚荷之至臣某言月日司刑少卿郭某奉宣敕旨以臣所犯特從放免伏對恩命魂魄飛揚中謝臣巴蜀微賤名教未聞陛下降非常之恩加不次之命拔臣草野謬齒衣冠臣私門祖宗幽顯榮慶豈止微臣一身而巳臣宜肅恭名節上答聖恩不圖誤識凶人坐緣逆黨論臣罪纍死有餘辜肝腦塗地不足塞責陛下宏慈育之典寬再宥之刑矜臣草萊憫臣愚昧特恕萬死賜以再生身首獲全巳是非分官服具在臣何敢安臣若貪冒寵私靦顏恩造復塵舊職以玷清猷螻蟻微心實慚面目臣伏見西有未賓之虜北有逆命之戎尚稽天誅未息邊戌臣請束身塞上奮命賊庭效一卒之力答再生之施庶陛下威命綏服荒夷愚臣罪戾時補萬一若臣獲死鋒鏑為厲犬羊古人結草實臣懇願不勝大造再生荷戴之至臣某言臣父某守官不謹獲罪自躬犯非清廉法宜不赦實由臣為子不孝使父陷刑天恩不肅嚴科放全首領臣得父子相見巳是非圖豈謂天澤無涯更垂休命臣父子兄弟免罪從榮載惶載殞實慶實躍中謝臣父子凡品守道幽微天恩矜憫見垂采録叨承恩幸側列陪臣自侍奉巳來於今十有八載雖業藝無紀勞勩不聞小心恭勤實免愆過明明昊天實昭實察不敢有二不敢有私夙夜兢兢祇惕若厲所以父母兄弟皆荷恩私叨職謬官並豫供奉摩頂至趾豈足上酬愚臣兢兢實慚實悚不意臣父衰耄恃寵忘公貪潤微財取犯朝憲應是臣不忠不孝事父無良廉恥不羞幾諫有闕遂使陷於刑法有玷國章臣之萬死無補此責刻肌刻骨泣血泣天恨負聖恩以愧朝列臣宜代父蒙罪自殞闕庭不合偷安尚求苟免誠以天波昭洗得更自新所以忍垢偷生克寸躬自勵期效萬一補過酬恩灰軀糜骨以甘心願伏惟神皇陛下恩同父母矜照懇誠信其赤心實有罄竭臣某言臣兄某前某官特蒙恩詔擢授豫州司馬未及赴任即以某月日改亳州司馬再三策命叨荷恩私在臣宗門實為慶幸中謝臣兄自解巾從仕三十餘年五為縣宰三遷州佐政皆通顯職實恭勤直道在公有終始之節平心應物無造次之在於周行頗蒙推薦近屬虺貞搆逆惑亂豫州詿誤平人自貽梟滅陛下憫荊河之俗遭此無辜弔汝濆之人使其昭慶以為奉揚皇化者必藉其才撫馭窮人者亦資有德臣兄貞固濫承天奬遷授豫州在於天恩實為超擢今者未及赴任復降授亳州重謺承恩翻同貶降朝廷體例實亦為尤臣兄弟叨榮濫竊非據天慈改授不合冒聞但以始者承恩蒙越抽擢今有何過遂同左遷區區懇誠輒敢祈訴天澤伏願皇慈有裕降昭奬之恩臣兄竭忠獲展才之地小臣死日猶生之年臣某言伏奉某月日詔書以臣為尚食奉御肅恭休命祇拜寵章榮慶既崇慚荷交集臣某中謝臣才虧琢玉學昧籯金徒以席寵葭莩榮光日月叨承雲渥既曠天工而榮更恩升位非德舉無階而進坐致於青霄有慶方來載光於朱紱臣聞瑤庭任切猶稱六尚之榮玉食禮尊實總八珍之貴臣術慚緣鶴業匪豢龍將何致美瓊芳式和金鼎宏私曲被殊寵降臨天命既不可違聖恩允宜祇戴循涯揣分實所非圖臣等昨陳愚懇請上魏國大王尊號天慈恩孝降順㣥情宇宙咸歡品物知泰云云臣聞一人有慶萬國歡心况乎道洽奉先義光尊號伏惟聖母神皇陛下鑣官受命寶極披圖以大孝而居尊勤至仁而育物用能光於四海化及萬方緬惟尊祖之儀實美前王之典宸心載穆盛百辟之誠求帝冊終開見千年之盛禮蒼氓以之禔福皇極由其永昌凡在含靈孰不歡慶臣某言伏奉月日恩制依舊授臣中大夫守司農卿臣枯骨再生更蒙寵命魂魄競越不知所圖臣某中謝臣實庸愚本無名節庇身公族竊軒冕之餘假翼宗枝濫衣冠之末因循寵服纍歷榮班素餐之責每深效拙之勤未補橫被逆賊徐敬真以私讐架禍誣臣云與叔孝逸交通逆豎獄官執法置以極刑臣腰領之誅巳甘灰粉泉壤之魄分隔幽冥不圖天地之恩再生枯骨日月之照曲被幽泉察臣非辜慜臣無罪不牽文法之議特垂赦宥之慈螻蟻微軀復得全活自非陛下克明克聖至德至仁臣之魂骸不保今日臣免死為幸豈敢期榮陛下重加寵章還臣舊職典司宗伯以睦周親愚臣胡顏敢冒朝典况臣叔孝逸推使未回在於臣愚更深待罪安敢私一作訟職以玷國章伏乞天恩照臣愚懇不勝感戴生榮之至云云臣某言伏奉今月日詔書以臣為鳳閣舍人榮命自天寵章非次祇奉惶越顛沛失圖中謝臣以諸生宦不期達徒以時逢昭泰迹忝周行非有君子瑚璉之材通儒青紫之秀巳得評刑北寺執憲南臺鷞鳩之政無聞驄馬之榮巳極陛下天飛踐祚雲紀命官陽館初開庶政惟始金章玉式允恃其人如臣疲駑宜所遐棄豈圖尚矜庸劣昭覩欽明任同信臣寵優時輩豫參詳於詔獄叨奬渥於宸階省巳循躬實知非分陛下不以榮過其量職越其才遂欲超絶親賢參掌樞要司言鳳綍揮翰龍池愚臣何人敢冒天造臣聞紫機務重青鎖任隆位匪其人政由有闕臣才無經濟識昧典章將何以光贊帝猷奉揚休命物無異議政允其中臣雖小人必知不可何况乎君子豈曰能賢伏望妙選時英亠包方求衆議僉曰惟允以弻良圖愚臣懇誠非敢飾讓臣某言伏奉某月日敕授臣某官祇拜寵光魂首飛越中謝臣聞王者敬慎懋在典刑天下允平取茲廷尉苟非其任法不虛行臣本庸微名術無紀皆緣際會昭遇盛明謬得揚歷簪徽陪奉鴛鷺綢繆榮祿荏苒平時毫髮之功無聞於官守素餐之責每積於公朝何嘗不悚迫惟憂夙夜祇畏而天恩方被寵命仍加復蒙璽誥之榮驟綰銀章之貴永言非據稽首知慚伏惟陛下恭巳受圖任賢興化方其合符皇極代理天工臣亦何人敢妨賢路伏見某官弱冠登仕早有能名每以清白洗心不為寒溫變節誠使榮加天寵職察雲司必能利用文明哀矜庶獄弻成五教無謝於虞臣典載三墳允諧於周議愚臣暗昧不識大猷請乞以所授官讓與某官庶使官允其才名不失實聖明有得人之盛愚臣無冒貴之譏實在聖慈鑒非虛謬臣某言伏奉月日制以臣為資州剌史恭承璽命祇拜寵章匪服知慚循榮如失中謝臣學慚名術才乏器能而寶歷逢時金章坐忝題輿佐嶽無展驥之庸剖竹專城闕懸魚之化坐嘯徒積主諾空慚伏惟陛下革命開基造天立極方且宏宣帝典大啓皇猷而四嶽觀風不虛其任六條班政允屬其才臣疲朽巳侵循良久昧將何式光刺舉允協得人伏願博選英才克諧僉議使人光理政洽惟良大周之命惟新愚臣之責攸息其所讓人具如別狀臣某頓首死罪上言臣聞軍政不臧春秋責帥故揚干之亂魏絳致戮所以國有明賞下無濫功臣幸以常才文武兼闕始年十八投筆從戎西踰流沙東絶滄海南征北伐無所不至席寵門緒忝迹軒墀屬高宗崇德深仁孝理天下以臣祖父一作父子兄弟一門五人皆伏節盡忠身死王事遂超臣不次授原州都督臣時年三十二一作四十二職兼五印榮絶一時階緣此恩纍忝藩翰持節統部前後八州皆居塞垣當賊衝要國之重寄莫與臣比雖無長策恤戎伏胡恭守朝章保完免失屬陛下大聖矜老容愚不以臣駑怯更加寵命授以青紫遣督幽州林胡搆凶王師出討士馬雲集軍務星繁糧饋軍甲動以億計臣無田疇鄉導之策又乏杜預度支之才空竭疲駑晝夜不息以勤補拙首尾三一作二年彌縫闕漏幸無乏張元遇等不謹師律賊得乘機遂敢長驅燕陲深入趙際臣又無李牧東胡之略實愧吳起西河之守使凶狡兌攴襄遂擾邊氓論之國憲合刎頸謝罪陛下又不以臣為辜更授清邊軍副大總管五月恩制六月到軍逆虜天亡臣又無效至於軍功戰籍敘勳定勞副職日淺未及精覆大兵旋斾王師獻功而漢庭將軍未聞辭第雲中太守巳論增級今乃竊功謬賞有忝朝章忠誠殉節不昭國議實由臣濫其職任過其才上不能允副聖心中不能匡正戎律傍招物議有紊軍容臣罪何逃孰執其咎伏願乞賜骸骨貶歸私第式清朝序永覩師貞不勝待罪惶懼之至
