front:
  text: 全唐文欽定全唐文卷四百七十五陸贄十六
  hash: sha256:5c2c46c75bf3105ebef002c968f0a7fb634ca26df2399670b119b3cb15e75dfe
body:
  text: 右希顏奉宣進止凡是官吏貪濁取受錢物猶並徵贓竇參負朕至深廣納賄貨又更交結謀行惡事其莊宅錢物奴婢之類豈不合收納入官竇參身既遠貶亦恐被人破除隱沒今欲使人勾當收拾卿等商量可否者謹按國家典法沒入官産唯有兩科一謂姦贓一謂叛逆皆須先鞫犯狀審得實情憲司察冤法寺論罪會府覆奏掖垣參詳如是悉無異詞然後謂之獄成而聞于天子其有抵于深辟者制可既下所司猶三五覆奏庶或宥之聖王愛人恤刑乃至如此精慎罪法既定方合徵收叛逆則盡沒其家姦贓則止徵所犯蓋示懲戒匪貪貨財何嘗有罪未斷有法未詳而可以納其資産者也伏惟聖德廣大如天包含懲忿於彞憲之中念終於常情之外已存惠貸不置嚴刑今若簿録其家竊恐以財傷義猥蒙下問實荷皇明輒罄愚誠所祈天鑒謹奏右田緒使節度隨軍劉瞻送書與臣其書意緣奉進止令為其亡父承嗣撰遺愛碑文故送前件馬絹等以申情貺臣先奉恩旨令撰碑文於今半年竟未綴緝良以勸戒之道忠義攸先裦貶之詞春秋所重爵位有僥幸而致名稱非詐力可求將使循軌轍者畏昭憲而莫渝怙姦妄者顧清議而知恥仲尼修春秋而亂臣賊子懼豈必臨之以武脅之以刑哉裦貶苟明亦足助理田承嗣阻兵犯命靡惡不為竟逭天誅全歸土壤此乃先朝所愧恨義士所惋嗟今田緒尚于宸嚴請頌遺愛微臣隘局實憤於心謬承恩光備位台輔既未能滌除姦慝匡益大猷而又飾其愧詞以贊凶德納彼重賂以襲貪風情所未安事固難強是以屢嘗執翰不能措詞輒投所操太息而止緣承聖誨姑務懷柔昨見田緒使人臣亦婉為報答但告云所為碑頌皆奉德音既異私情難承厚貺候稍休暇續當撰成既無拒絶之言計亦不至疑阻其來書謹封進所送馬及絹等令劉瞻便領却回訖不敢不奏謹奏京兆府先奏當管蟲食豌豆全然不收請據數折納大豆奉敕宜依度支續奏稱據時估豌豆每斗七十價已上大豆每斗三十價已下京兆府所請將大豆替豌豆望令據估計錢數折納則冀免損官司者求瘼救災國之令典求瘼在知其所患救災在恤其所無只如螟蜮為殃豌豆全損檢覆若非虛謬地稅固合免徵直道而行大體斯在府司折納充數已為克寸下從權度支準估計錢乃是幸災規利所得無幾其傷實多傷風得財非謂理道且豌豆為物入用甚微舊例所支唯充畜料準數回給大豆諸司誰曰不然計價剩徵義將安在理無所據事不可從望依前敕處分未審可否右希顏奉宣聖旨適得李萬榮奏劉士寧因出遊獵三軍將士遂閉城門不放入發遣令赴朝廷萬榮安撫軍州今已寧帖卿等宜知悉者伏以劉士寧昏荒暴慢惡貫久盈聖情愛人久為含忍親離衆叛自取奔亡不勞師徒克靖方鎮恭承宣諭欣賀實深然梁宋之間地當要害鎮壓齊魯控引江淮得其人則安則強失其人則危則弱今士寧見逐雖是衆情萬榮總軍且非朝旨此亦安危強弱之機也陛下審之慎之或恐奏事之人苟私所奉之將妄陳體勢輒欲徼求承前授任失宜多為此輩所誤假使心無詐罔其如識乏經通與之籌量鮮不撓敗今軍州既定足得安詳望且選一朝臣馳往宣勞更淹旬日徐察事情見情而後圖之則冀免有差失候至來日續更面陳謹先狀以聞謹奏右希顏奉宣進止萬榮安撫有功聞亦忠義甚得衆心若更淹遲却恐事不穩便今商量除一親王充節度使且令萬榮知留後其節度制便從內出萬榮須與改官卿等即商量進來者臣性習懦頑藝識空乏辱當將任待罪宰司事關安危不敢容默雖服戎角力諒匪克堪而經武伐謀或有所見夫制置之安危由勢付授之濟否由才勢如器焉唯在所置置之險地則覆致之夷地則平材如負焉唯在所授授踰其力則踣授當其力則行故負重者不可以微劣勝器大者不可以輕易處有巨力而加重負猶懼蹶跌之不虞擇安地而置大器尚慮傾覆之難備焉有委非所任置非所安而望其不顛不危固亦難矣劉士寧窮凶極暴衆所不容李萬榮因人之心閉城拒逐為國除害亦有可嘉誠宜星夜上聞請擇節將今所陳奏頗涉張皇但露徼求之情殊無退讓之禮據茲鄙躁殊異純良又聞本是滑人偏厚當州將士與之相得才止三千諸營之兵已甚懷怨據此頗僻亦非將材且邀君而力取其位不忠逐帥而謀代其權不義犯此二者而加之非材得志驕盈不悖則敗悖謂犯上敗謂僨軍俱為厲階莫見其可今雖遽加寵命務饜貪求曲示保持冀消凶慝然其所行不遜所得無名縱之則反側而益疑奪之則觖望而肆惡夫善始而克終者猶寡況始於不善而求能以義自全者乎又緣嘗自蓄謀以危主將及居人上恆恐見圖必於部校之間多有疑阻之釁上下猜二何能久安縱未干紀亂常亦必喪師蹙境所以承前方鎮之任選建才德而不副所委者則有矣其不由才德而授終能殿邦固節者未之有也是猶置器欲安而不擇可安之勢負重欲濟而不量可濟之材處非所宜不敗何待陛下若謂臣說體迂濶有異軍機引喻乖踈不同事實臣請指陳汴宋一管近代成敗之跡皆陛下之所經見者以為殷鑒惟陛下覽而察之往者田神功作鎮河南領汴宋徐泗亠兊鄆曹濮八州之地兵食兼足職貢備修左肅青齊右彌滑魏南控淮浙北輔滎殷如長城不震不聳此由制置於可安之地付授得可濟之材其為利宜斯謂大矣及神功入覲遘厲不還先皇帝示眷悼之優崇貪因循之便易知神玉才不勝任排衆議而竟授之既而維御無方經略失制權歸豪將勢散列城禍機一興內叛外破委三軍於暴帥陷五郡於匪人轉輸所經塗路亟阻此由制置於必危之地付授於必躓之才其為敗傷亦已甚矣近者劉元佐驅攘巨猾砥復大梁即鎮如茲幾將十載雖不能勤身節用以撫疲氓畢力竭誠以揚丕烈然尚號令由已部屬畏威緝修戎旅振耀聲勢遠邇談矚且為完軍制持東方猶有所倚及元佐殂沒朝廷命吳湊代之士寧凶頑輒敢眦睚素非得衆且甚不材緩之旬時必自離沮隨機制馭指顧可平陛下念深黎元姑務容養適使姦徒得計庸竪作狂但肆醜厲之詞豈懷任置之惠運路幾絶生人重殘殷然垣翰之軍鞠為汙染之俗追思致患之本豈不失於苟且哉今若又授萬榮則與士寧何異負力而取誰曰不然邀取而除孰為非據苟邀則不順苟允則不誠君臣之間勢必嫌阻與其圖之於滋蔓不若絶之於萌芽忘久遠而樂因循固非英主御天下長算遠慮之計也且為國之道以義訓人將教事君先令順長用能彌爭奪之禍絶窺覬之心聖人所以興敬讓而服暴強禮達而分定故也假使士寧為將慢上虐人萬榮懷奉國之誠稟嫉惡之性棄而違之斯可矣討而逐之亦可矣謀其帥而篡其位則不可焉何者方鎮之臣事多專制欲加之罪誰則無辭若使傾奪之徒便得代居其任利之所在人各有心此源潛滋禍必難救非獨長亂之道亦開謀逆之端四方諸侯誰不解體得一夫而喪㣥帥其何利之有焉矧茲一夫猶未可保徒亂風教以生人心昨者所逐士寧蓋起於倉卒諸郡守將固非連謀一城師人亦未協志況又待之不一撫之不均黨助萬榮其能有幾仍各計度於成敗之勢回遑於逆順之名安肯捐軀與之同惡今所以未即變者皆為萬榮所誘許其賞給貨財且相服從以候制旨陛下但於文武㣥臣之內選一和惠寬敏素為軍旅所愛信者命為節度仍降優詔慰勞彼軍獎萬榮以撫定之功別加寵任裦將士以輯睦之義厚賜資裝衆知保安人且懷惠舍此助亂更將何求揆其大情理必寧息萬榮縱欲跋扈勢何能為三軍既自離心列城又不為援緣其迫逐主將諸道必復憎嫌邇無所親遠無所與不勞天討必自殲夷陛下何所為虞而欲受其邀致臣雖孱怯竊有未安昨因希顏宣旨却回已與趙憬等同附口奏展轉申吐慮多闕遺臣更通夕詳思恐亦無易於此不勝拳拳愚懇謹復密啓以聞如蒙聖恩察納臣即與趙憬等商量應須處置事宜具作條件聞奏儻後事有愆素臣請受敗撓之罪謹奏度支奏緣當年稅草支用不充諸場和市所得又少所以每至秋夏常有缺闕請令京兆府折今年秋稅和市草一千萬束便令人戶送入城輸納每束兼車腳與折錢二十五文既利貧人兼濟公用希顏奉宣進止宜依者伏以制事之體所貴有常順人之情尤重改作革而能當尚恐未孚動且非宜曷由無擾臣等每承睿旨常以百姓為憂審知事不可行安敢默而無述每年蓄聚芻藳所司素有恆規計料稅草不充即便開場和市既優價直復及農收人皆樂輸事不勞擾陛下追想往年之事豈嘗有緣草不足上關宸慮者乎延齡欲衒已能頗隳舊制苟收經費之用以資贏羡之功遂使儲備空虛支計寥落廣既圉告闕頻煩聖聰去歲已然今夏尤甚此乃不遵舊制之過也舊制何害而變之哉臣等謹檢京兆府應徵地稅草數每年不過三百萬束其中除留供諸縣館驛及鎮軍之外應合入城輸納唯二百三十萬而已百姓般運已甚艱辛常迫春農僅能得畢今若更徵一千萬束仍令並送入城即是一年之間併徵三年稅草計其所加車腳則又四倍常時物力有窮求取無藝其為騷怨理在不疑甸服且然四方安仰假使時當豐稔家悉阜殷有草可輸有車可載然於途程往復理須淹歷歲時牛廢耕犂人妨播植東作既闕西成曷期況蒸黎之間貧富不等收穫之際豐耗靡均今忽併役車牛雇車傭必騰貴併徵稅草買草價必倍高是使豪富之徒乘急令以邀其利窮乏之輩因暴斂以毀其家非所謂均節財物準平賦法之術也臣等又勘度支京兆比來雇車估價及所載多少大率每一車載一百二束每一里給傭錢三十五文百束應輸二束充耗今京畿諸縣去城近者七八十里遠者向二百里設令遠近相補通以百里為程則雇車載草百束悉依官司常估猶用錢三千五百文即是一束之草唯計般運已當三十有五文買草本價又更半之而度支曾不計量自我作古徑以胸臆斟酌限為二十五文謂之加徵則法度廢隳謂之和市則名實乖反儻可其奏人何以觀豈如官自置場要便收市欲少市則平其估以節費欲多市則優其價以招人買賣既和貧富俱便有餘者趨加饒易售之利不足者免轉求貴賃之資比之抑徵固不同等幸有舊制足可遵行何必捨易而即難棄利而從害臣誠暗滯未見其宜伏望戒敕度支令依舊例和市承前既有恆用以後不得闕供稍峻隄防使知懍懼妄作但不施用歲計必免愆違陛下若以軍廣既之中馬畜漸衆度支所營芻藳才可供給當年或慮水旱不虞別須蓄積為備今屬歲稔亦是其時但要收斂有方不宜科配致擾若度支併市延齡必復辭難須有區分使之均濟望委京兆尹勾當別和市草五百萬束以充貯備其所和市並隨要便官自置場每場貯錢旋付價直時估之外仍稍優饒交易往來一依市利勿令官吏催遣道路遮邀但不抑人自當趨利其市草價直並於年支留府錢數內以給用不盡者充每市滿十萬束一度聞奏便以府司郵遞車牛并更雇腳相添轉徙場所般載送付苑中輸納如蒙聖恩允許臣即依此宣行既免擾人又不增費以資儲蓄足禦凶災度支謹守恆規亦自不闕常用臣等商度將為合宜謹録奏聞伏聽進止右竄謫之徒皆在遐僻或迫於衰暮顧景思還或困於瘴癘翹心望徙既關霈澤許以量移企躍之情遠想可見若準所司舊例須俟州府録申盤勘檢尋動踰年歲上稽恤宥之旨下虧慶賴之心臣等商量恐須釐革望令所司據承貞元六年恩赦檢勘己量移未量移官及貞元六年恩後左降官等除遷改亡歿之外具名銜及貶責事由年月速報中書門下不須更待州府申請臣等據所司報到則便進擬不出歲內冀悉霑恩未審可否謹録奏聞伏聽進止右伏以國之令典先德後刑所後者法當舒遲故決罪不得馳驛行下所先者體宜疾速故赦書日以五百里為程誠以聖王之心務宏慶惠必回翔於行罰而企躍於舒恩不加罰於典法之外不虧恩於德令之內則受責者莫得興怨荷貸者咸思自新所謂威之斯懲宥之斯感懲以致理感以致和致理則尊致和則愛為人父母必在兼行陛下德配上元澤流下土頃因郊祀普降鴻恩凡是貶責之人並許量移近處臣等任叨輔翼職在宣行尋具奏聞請便進擬聖心精一務欲均齊令待所司檢尋一時類例處分其左降官內或罪非可棄才有足甄亦許別狀商量不拘常例獎用臣等據所司檢勘左降官及流人送名到者都比擬量移及別追用分為三狀前月十二日封進其流人量移狀已蒙印出行下訖餘兩狀至今未奉進止竊以赦書宣布僅欲半年若更淹遲恐乖事體又諸州刺史及臺省官等繼有事故頗多缺員睿旨精於選求至今常不充備以眚掩德見非古人録用棄瑕允歸聖造願廣含宏之美庶增誘掖之徒謹奉狀陳聞伏聽進止右希顏奉宣進止舊例左降官每準恩赦量移不過三百五百里今度進擬稍似超越又多是近兵馬處及當路州縣事非穩便宜更商量伏以罰宜從輕赦宜從重所以昭仁恕之道廣德澤之恩也夫位尊者其惠不可以不重言大者其實不可以不豐位尊而惠輕則體非宜言大而實寡則人失望陛下躬行盛禮渙發德音念謫居之荒遐哀負纍之沉棄俾移近處將合新恩赦令初行室家相慶惠亦至矣言亦大矣竊料竄逐窮僻喜聞霈澤降臨固必破産以飾行裝計日而俟休命荏苒淹息復經半年儻又所移之官還與舊任鄰近竊恐乖陛下垂愍之意虧制書行慶之恩口惠重而事實輕非所以揚鴻休而布大信也謹按承前格令左降官非元敕令長任者每至考滿即申所司量其舊資便與改敘縱或未有遷轉亦即任其歸還逮于開元末李林甫固權專恣凡所斥黜類多非辜慮其却回或復冤訴遂奏左降官考滿未別改轉者且給俸料不須即停外示優矜實欲羈係從此已後遂為恆規一經貶官便同長往回望舊里永無還期縱遇非常之恩許令移遠就近雖名改轉不越幽遐或自西徂東或從大適小時俗之語謂之橫移馴致忌克寸之風積成天寶之亂展轉流弊以至於今天下咸病此法深苛而不能改從舊典者良以猜嫌之慮易惑上心將謂負譴之人悉包樂禍之意已經黜責遂欲隄防故高論則痛嫉林甫之陰邪而密網則習行林甫之弊法憸邪為蠧乃至於斯然則左降永絶於歸還量移不離於僻遠蓋是姦臣詭計殊非國典舊章且貶黜之中情狀各異犯有輕重責有淺深固非盡是回邪皆須備慮王者之道待人以誠有責怒而無猜疑有懲沮而無怨忌斥遠以警其不恪甄恕以勉其自新不警則浸及威刑不勉則復加黜削雖屢進退俱非愛憎行法乃暫使左遷念材而漸加進敘人知復用誰不增修何憂乎亂常何患乎蓄憾如或以其貶黜便謂姦凶恆處防間之中長從擯棄之例則是悔過者無由自補蘊才者終不見伸凡人之情窮則思變含悽貪亂或起於茲雖則何患能為亦足感傷和氣謂非帝王開懷含垢之大體聖哲誘人遷善之良圖也臣等昨進擬商度非不精詳既審事宜亦尋舊例參求折衷兼務齊平大約所擬之官各移近地一道郡邑稍優於舊任官資序進於本銜並無降差亦不超越其有纍經移改已至關畿則但以大州增其常秩所冀人皆受賜施不失平上副鴻恩下塞延望才將得所殊匪為優今若裁限所移不過三五百里則有改職而疆域不離於本道遷居而風土反惡於舊州徒有徙家之勞是增移配之擾又當今郡府多有軍兵所在封疆少無館驛應合量移之例約有二百許人道路須計其遠邇之差州縣則校其高下之等若必選非當路復不近兵則恐類例失倫署置偏併示人疑慮體又非宏幸希聖聰更賜裁審其擬官狀並未敢改革謹重封進伏聽進止右兵之所屯食最為急若無儲蓄是棄封疆自昔敗亂之由多因餽餉不足臣以任當體國職合分憂奏減河運腳錢用充軍鎮和糴幸蒙聖恩允許又屬頻歲順成二年之間㳂邊諸軍共計收糴米粟一百八十餘萬石準元敕各委當道節度及監軍中使度支知巡院官同勾當檢納仍以貯備軍糧為名非緣城守乏絶及不承別敕處分並不得輒有費用若能堅守此制有用隨即却填則是邊城常貯十五萬人一歲之糧以為急難之備永無懸絶足固軍情去歲版築五原大興師旅所司素無備擬臨事支計缺然齎送悉貸此糧乃得軍行辦集過事之後準敕合填逮今二年竟不支遣加以諸鎮軍食例皆闕供及其告急上聞宣旨下迫則又請貸貯粟以充將士月糧既務廢隳且無愧畏所未匱竭其能幾何夫栽植至難毀拔至易古人以植楊為喻能不為之歎惜哉況水旱流行固宜有備戎狄為患可不為虞將欲安邊先宜積穀今當歲稔令益軍儲反罄聚蓄之資用供朝夕之費儻遇災難則如之何惟陛下詳思後圖不貽他日所悔臣之願也疆埸之幸也不勝區區慮患之意謹冒昧以聞謹奏右臣聞於經曰濟濟多士文王以寧又曰無曠庶官天工人其代之蓋謂士不可不多官不可不備敦付物以能之義闡恭已無為之風此理道得失之所由也夫聖人之於愛才不唯仄席求思而已乃復引進以崇其術業歷試以發其器能旌善以重其言優祿以全其操歲月積久聲實並豐列之於朝則王室尊分之於土則藩鎮重故詩序太平之君子能長育人才書比梓人之理材既勤朴斫惟施丹雘禮著造士易尚養賢蓋以人皆含靈唯所誘致如玉之在璞抵擲則瓦石追琢則圭璋如水之發源壅閼則汙泥疏濬則川沼是以書籍所載歷代同途祚屬殷昌必時多雋乂運鍾衰季則朝乏英髦當在衰季之時咸謂無人足任及其雄才御㝢淑德應期賢能相從森若林會然則興王之良佐皆是季代之棄才在季而愚當興而智乃知季代非獨遺賢而不用其於養育獎勸之道亦有所不至焉故曰人皆含靈唯其誘致漢高稟大度故其時多魁傑不羈之材漢武好英風故其時富王褱詭立名之士漢宣精吏能故其時萃循良核實之能逮乎哀平桓靈昵比小人疏遠君子故其時近習操國柄嬖戚擅朝權是知人之才性與時升降好之則至獎之則崇抑之則衰斥之則絶此人才消長之所由也臣每於中夜竊自深惟朝之乏人其患有七不澄源而防末流一也不考實而務博訪二也求精太過三也嫉惡太甚四也程試乖方五也取舍違理六也循故事而不擇可否七也夫多少相繆非嘉量不平輕重相欺非縣衡不定用之苟不得其道則主者實病而權量無尤故按名責實者選吏之權量也宰相者主權量之用也宰相之主吏猶司府之主財主吏在序進賢能主財在平頒秩俸假使用財失節則司之者可以改易而秩俸不可以不頒主吏乖方則宰之者可以變更而賢能不可以不進其行甚易其理甚明頃者命官頗異於是常以除吏多少準量宰相重輕宰相承寵私則援引雖濫而必進宰相見疏忌則擬議雖當而罕俞是使㣥材仕進之窮通唯繫輔臣恩澤之薄厚求諸理道未謂合宜夫與奪者人主之利權名位者天下之公器不以公器循喜心不以利權肆忿志不以寡妨衆不以人廢官或其此處有脫誤阻執事而擁㣥材所謂不澄源而防末流之患也經曰無以小謀亂大作無以嬖人疾莊士蓋務大者不拘於小纍謀小者不達於大猷嬖者或行異於莊莊者必性殊於嬖理勢相激宜其不同進賢援能諒君子之事遏惡揚善非小人所能君子以愛才為心小人以傷善為利愛而引之則近黨傷而沮之則似公近黨則不辨而遽疑似公則不核而縣信是以大道每隳於橫議良才常困於中傷失士啓讒多由於此所謂不考實而務博訪之患也夫人之器局有圓方大小之殊官之典司有難易間劇之別名稱有虛實之異課績有升降之差將使官不失才才不失序在乎制法以司契擇人而秉鈞制之不得厥中則其法可更而其契不可亂也擇之不當所任則其人可去而其秉不可奪也如或事多錯雜任靡適從而但役智以求精勞神而救弊則所救愈失所求愈粗故書曰元首明哉股肱良哉庶事康哉元首叢脞哉股肱墮哉庶事隳哉頃之輔臣鮮克勝任過蒙容養苟備職員致勞睿思巨細經慮每有闕官須補或緣將命藉才宰司慎擇上聞必極當時妙選聖情未愜復命別求執奏既不見從則又降擇其次如是至於再至於三所選漸高所得轉下或斷於獨見罔徇僉諧或擢自旁求不稽公議權衡失柄進取多門等差不倫聲實相反此所謂求精太過之患也臣閒耀乘之珠不能無纇連城之璧不能無瑕矧伊有情寧免愆吝仲尼至聖也猶以五十學易無大過為言顏子殆庶也尚稱不遠而復無祗悔為美況自賢人以降孰能不有過失哉珠玉不以瑕纇而不珍髦彥不以過失而不用故元元之教曰常善救人則無棄人文宣亦云赦小過舉賢才齊桓不以射鈎而致嫌故能成九合之功秦穆不以一眚而掩德故能復九敗之辱前史序項籍之所以失天下曰於人之功無所記於人之過無所遺管仲論鮑叔牙不可屬國曰聞人過終身不忘然則棄瑕録用者霸王之道記過遺才者衰亂之源夫登進以懋庸黜退以懲過二者迭用理如循環進而有過則示懲懲而改修則復進既不廢法亦無棄人雖纖芥必懲而才用不匱故能使黜退者克勵以求復登進者警飭以恪居上無滯疑下無蓄怨俾人於變以致時雍陛下英聖統天威莊肅物好善既切計過亦深一抵譴責之中永居嫌忌之地夫以天下士人皆求宦名獲登朝班千百無一其於修身勵行聚學樹一作蒞官非數十年間勢不能致而以一言忤犯一事過差遂從棄捐沒代不復則人才不能不乏風俗不能不偷此所謂嫉惡太甚之患也臣聞君子約言小人先言君子之道暗然而日章小人之道的然而日亡孔子曰始吾於人也聽其言而信其行今吾於人也察其言而觀其行又曰舉直錯諸枉則民服舉枉錯諸直則民不服然則舉錯不可以不審言行不可以不稽訥訥寡言者未必愚喋喋利口者未必智鄙朴忤逆者未必悖承順愜可者未必忠故明主不以辭盡人不以意選士凡制爵祿與衆共之先論其材乃授以職所舉必試之以事所言必考之於成然後苟妄不行而貞實在位矣如或好善而不擇所用悅言而不驗所行進退隨愛憎之情離合繫異同之趣是猶捨繩墨而意裁曲直棄權衡而手揣重輕雖甚精微不能無謬此所謂程試乖方之患也天之生物為用罕兼性有所長必有所短材有所合亦有所暌曲成則品物不遺求備則觸類皆棄是以巧梓順輪桷之用故枉直無廢材良御適險易之宜故駑驥無失性物既若此人亦宜然其於行能固不兼具前志所謂千年一聖五百年一賢者才難不其然乎夫唯聖人方體全德賢之為目猶有未周且以未周之才彌五百年而有一造次求備曷由得人若夫一至之能偏稟之性則中人以上迭有所長苟區別得宜付授當器各適其性各宣其能及乎合以成功亦與全材無異但在明鑒大度御之有道而已帝王之盛莫盛唐虞臣佐之盛莫盛稷禹稷禹之比無非大賢然猶各任所能不務兼備故尚書序堯舜命官之美自稷禹咎益以降凡二十二人所命典司不踰一職用能平九土播百穀敷五教序五刑禮樂興和蠻夷率服洎鳥獸魚鱉亦罔不寧蓋由舉得其人任得其所鑒擇付授審之於初不求責於力分之外不沮撓於局守之內是以事極其理人盡其材君垂拱於上臣濟美於下功焯當代名施無窮及其失也則升降任情首末異趣使人不量其器與人不由其誠以一言稱愜為能而不核虛實以一事違忤為咎而不考忠邪其稱愜則付任逾涯不思其所不及其違忤則責望過當不恕其所不能是以職思之內無成功君臣之際無定分此所謂取捨違理之患也今之議者多曰內外庶官久於其任又曰官無其任則闕之是皆誦老生之常談而不推時變守舊典之糟粕而不本事情徒眩聰明以撓理化古者人風既朴官號未多但別愚賢匪論資序不責人以朝夕之效不計事於尺寸之差不以小善而裦升不以一眚而罪斥故虞書三載考績三考黜陟幽明是則必俟九年方有進退然其所進者或自側微而納於百揆雖久於任復何病哉漢制部刺史秩六百石郡守秩二千石刺史高第者即遷為郡守郡守高第者即入為九卿從九卿即遷為亞相相國是乃從六百石吏而至台輔其間所歷者三四轉耳久在其任亦未失宜近代建官漸多列級逾密今縣邑有七等之異州府有九等之差同謂省郎即有前中後行郎中員外五等之殊並稱諫官則有諫議大夫補闕拾遺三等之別洎諸臺寺率類於斯悉有常資各須循守若依唐虞故事咸以九載為期是宜高位常苦於乏人下寮每嗟於白首三代為理損益不同豈必樂於變易哉蓋時勢有不得已也至如鯀洪水績用靡成猶終九年然後殛竄後代設有如鯀之比者豈復能九年而始行罰乎臣固知其必不能也行罰欲速而進官欲遲以此為稽古之方是猶却行而求及前人也頃者臣因奏事論及內外序遷陛下乃言舊例居官歲月皆久朕外祖曾作祕書少監一任經十餘年董晉將順睿情遂奏云臣於大歷中曾任祠部司勳二郎中各經六考陛下之意頗為宜然以臣蠢愚實有偏見凡徵舊例須辨是非是者不必渝非者不必守況於舊例之內是有舛駁之異哉先聖之初權臣用事其於除授類多徇情有一月屢遷有積年不轉逮至中歲君臣構嫌姑務優柔百事凝滯其於選授尤所艱難始以頗僻失平繼以疑阻成否至使彞倫闕敘庶位多淹是皆可懲曷足為法夫核才取吏有三術焉一曰拔擢以旌其異能二曰黜罷以糾其失職三曰序進以謹其守常如此則高課者驟升無庸者亟退其餘績非出類守不敗官則循以常資約以定限故得殊才不滯庶品有倫參酌古今此為中道而議者暗於通理一概但曰宜久其任得非誦老生之常談而不推時變者乎夫列位分官緝熙帝載匪唯應務兼亦養才是以職事雖有小大間劇之殊而俱不可曠缺者蓋備於時而用耳故記曰天子以騶虞為節樂官備也唯經邦贊國之任則非有盛德不可以居故記曰設四輔及三公不必備惟其人議者昧於明徵一概但曰官無其人則闕得非守舊典之糟粕而不本事情者乎今內外㣥官考深合轉陛下或言其已有次第須且借留或謂其未著功勞何用數改是乃循默者既以無聞而不進著課者又有成績而見淹雖能否或差而沈滯無異人之從宦積小成高至於內列朝行外登郡守其於更歷多已長年孜孜慎修計日思進而又淹逾考限亟易星霜顧懷生涯能不興歎殊異登延之義且乖勸勵之方夫長吏數遷固非理道居官過久亦有弊生何者時俗長情樂新厭舊有始卒者其唯聖人降及中才罕能無變其始也砥勵之心必切其久也因循之意必萌加以盈無不虧張無不弛天地神化且難常全人之所為安得皆當是以分分而度至丈必差銖銖而稱至鈞必謬蒞職既久寧無咎愆或為姦吏所持或坐深文所糾偶以一跌盡隳前功至使理行不終能名中缺豈非上失其制而推致以及於斯乎故聖人愛人之才慮事之弊採其英華而使之當其茂暢而獎之不滯人於已成之功不致人於必敗之地是以鋭不挫而力不匱官有業而事有終此理之中庸故書以為法遷轉甚速則人心苟而職業不固甚遲則人心怠而事守浸衰然則甚速與甚遲其弊一也陛下俯徇浮議謂協典謨久次當進者既曰務欲且留缺員須補者復曰官不必備則才彥何由進益理化孰與交修此所謂循故事而不擇可否之患也伏惟陛下憂勤務理夢想思賢體陶唐有虞聰明之德以敷求法太宗天后英邁之風以拔擢然而得人之盛尚愧前朝砥乂之功未光當代良以七患未去三術未行而又睿察太深宸嚴太峻常人才器曷副天心故雖獲超升亦驟從黜廢人物殘瘁抑斯之由而議者莫究致弊之端但思革弊之策反以廣於進用為情故以梗於除授為精詳以避謗為奉公之誠以摘瑕為選士之要乃至稱毀紛糅美惡混并凡有遷升必遭掎托聖德廣納不時發明小人多言益敢陰詐以是眩惑目無全人進用之意轉疑汲引之途漸隘舊齒既凋敗既盡下位或滯淹罕升故令官序失倫人才不長資望漸薄砥礪浸微高卑等衰殆不相續臣以竊位屬當序才懼曠庶官亟黷宸扆昧識不足以周物微誠不足以動天徒勤進善之心轉積妨賢之罪慚惶交慮焚灼盈懷凡除吏者非謗刺之所生必怨咎之所聚宰臣獲戾多起於茲屢屢上干何所為利但以待罪鈞轄職思其憂兼迫於感恩願效之誠不得不冒昧言之耳其於裁擇用捨惟陛下圖之謹奏維貞元元年歲次乙丑十一月癸已朔十一日癸卯嗣天子臣某敢昭告于昊天上帝顧惟寡昧不克明道丕膺眷命俾作神主常恐獲戾上下而播災於人兢兢業業夙夜祗畏居位五祀德馨蔑聞皇靈不歆是用大警殷憂播蕩踰歷三時誠懼烈祖之耿光墜而不耀側身思咎庶補將來上帝顧懷誘衷悔禍勦凶慝之凌暴雪人神之憤恥舊物不改神一作臣心載新茲乃九廟遺休兆人介福以臣之責其何解焉間屬寇虞久稽告謝今近郊甫定長至在辰謹以玉帛犧牲粢盛庶品冀憑禋燎式薦至誠太祖景皇帝配神作主尚饗維貞元元年歲次乙丑十一月癸巳朔十一日癸卯孝曾孫嗣皇帝臣某敢昭告于皇曾祖考元宗至道大聖大明孝皇帝皇祖妣元獻皇后楊氏臣猥承聖緒獲主大器懼德不嗣靡所安寧任重道悠竟貽顛越京闕生變神人無依臣懷永圖不敢自棄忍恥含憤逮于載遷戴天履地俯仰慙惕幸賴烈祖遺澤感深于人人心攸歸天意允若肆豫小子憑宗廟之積慶再復于鎬京在臣愆尤曷云有補豈敢自蔽以重于厥辜頃以寇孽在郊禮物未備久稽告謝伏積兢惶今祗見閟宮引慝請罪謹以一元大武柔毛剛鬣明粢薌合薌萁嘉蔬醴齊因時備物虔奉嚴禋尚饗維貞元元年歲次乙丑十一月癸巳朔十一日癸卯孝孫嗣皇帝臣某敢昭告于皇祖考肅宗文明武德大聖大宣孝皇帝皇祖妣章敬皇后吳氏臣嗣服先業不克負荷人流於下事失其中姧魁乘釁作亂京邑播遷之咎臣實自貽震驚宗祧曠時乏祀外憂內愧若墜深泉勵已誓心期刷大恥實賴聖祖中興之業全育兆人澤深慶遠流福裔嗣故上天悔禍㣥孽就誅非臣寡昧所能纘服今祗率百辟見于廟廷謹以一元大武柔毛剛鬣明粢薌合薌萁嘉蔬醴齊備物潔誠聿申告謝尚饗維貞元元年歲次乙丑十一月癸巳朔十一日癸卯孝子嗣皇帝臣某敢昭告于皇考代宗睿文孝皇帝伏惟元德廣運重光盛業武平多難仁育㣥生謂臣克堪付以大寶臣自砥不類再罹播遷宗祧乏享億兆靡依下辜人心上負先顧敢愛隕越苟全眇身大懼社稷阽危以增九廟之愧由是忍恥誓志庶補前羞列聖在天鑒臣精懇敷錫丕祐俾之纘承凶渠殄夷都邑如舊茲臣獲執犧牲圭幣載見于廟廷感慕慚惶若罔攸厝謹以云云陳誠待罪式奉嚴禋尚饗維貞元元年某月某日皇帝遣某官以牢醴之奠敬祭于大禹之靈惟王德配乾坤智侔造化拯萬類於昏墊分九州於洪波經啓之功于今是賴巍巍蕩蕩無得而名顧以眇身辱承大寶時則異于今古道寧間于幽明雖依聖垂休諒非可繼而勤人勵已竊有所希逮茲八年理道猶昧沴氣鬱結降為凶災邦無宿儲野有餓殍上愧明哲下慚生靈夙夜憂惕如蹈泉谷所資漕運用拯困窮砥柱之間河流迅激舟楫所歷罕能獲全爰命工徒鑿山開道避險從易涉安代危嗷嗷蒸人俟此求濟仰祈幽贊以集丕功享于克誠庶答精意
