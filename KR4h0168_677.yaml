front:
  text: 全唐文欽定全唐文卷六百七十七白居易二十二
  hash: sha256:21eda31ab111a7ca31a283c11093e83b53c37b0a81924e436a9a8ea78460fba0
body:
  text: 論曰忠孝智勇四者為臣為子之大寶也故古之君子奉以周旋苟一失之是非人臣人子矣漢李陵策名上將出討胸奴竊謂不死於王事非忠生降於戎虜非勇棄前功非智召後禍非孝四者無一可而遂亡其宗哀哉豫覽史記漢書皆無明譏竊甚惑之司馬遷雖以陵獲罪而無譏可乎班孟堅亦從而無譏又可乎按禮云謀人之軍師敗則死之故敗而死者是其所也春秋所以美狼瞫者為能獲其死所而陵獲所不死得無譏焉觀其始以步卒深入虜庭而能以寡擊衆以勞破逸再接再捷功孰大焉及乎兵盡力殫摧鋒敗績不能死戰卒就生降噫墜君命挫國威不可以言忠屈身於夷狄束手為俘虜不可以言勇喪戰勳於前墜家聲於後不可以言智罪逭於躬禍移於母不可以言孝而引范蠡曹沫為比又何謬歟且會稽之恥蠡非其罪魯國之羞沫必能報所以二子不死也而陵苟免其微軀受制於彊虜雖有區區之意亦奚為哉夫吳齊者越魯之敵國胸奴者漢之外臣俾大漢之將為單于之擒是長寇讎辱國家甚矣况二子雖不死無陵生降之名二子苟生降無陵及親之禍酌其本末事不相侔而陵竊慕之是大失臣子之義也觀陵答子卿之書意者但患漢之不知己而不自內省其始終焉何者與其欲刺心自明刎頸見志曷若效節致命取信於君與其痛母悼妻尤君怨國曷若忘身守死而紓禍於親焉或曰武帝不能明察下聽流言遽加厚誅豈非負德答曰設使陵不苟其生能繼以死則必賞延於世刑不加親戰功足以冠當時壯節足以垂後代忠孝智勇四者立而死且不朽矣何流言之能及哉嗚呼豫聞之古人云人各有一死死或重於泰山生或輕於鴻毛若死重於義則視之如泰山也若義重於死則視之如鴻毛也故非其義君子不輕其生得其所君子不愛其死惜哉陵之不死也失君子之道焉故隴西士大夫以李氏為愧不其然乎不其然乎元者諸天之先始者萬靈之母混而成一強以為名至哉無上尊得以是為號正月二十有三日德宗神武孝文皇帝在九仙之月遏八音之日也皇帝教宏元訓業奉真宗承文祖之貽謀申孝孫之誠敬以謂元始天尊者真儀不遠隨相而生神用無方應念而至故命設繪素展儀刑五彩彰施七寶嚴飾所以表當寧之瞻仰感在天之聖神通元應於希夷集靈祐於肸蠁詞臣承命跪唱讚云元聖何在天上天欲往從之窅無緣命工設色五彩宣忽如真相見於前聖應聖兮元又元薦百福兮垂萬年道用無窮統之者大聖神化不測感之者至誠非圖像無以示儀形非供養無以展嚴敬故一念一禮而福隨之畫大羅天尊者奉為順宗至德大聖大安孝皇帝忌辰之所造也皇帝祖元元之風嗣清淨之理志在善繼心惟孝思申命工人彰施繪事粹容儼若真相炳焉憑志誠而上通垂景福而下濟詞臣奉詔恭為讚云真通之象孝感之心率土瞻仰在天照臨蓄為精誠發為圖畫如從大羅應念而下唐元和己丑歲四月十四日畫大羅天尊一軀成奉為睿聖文武皇帝降誕之辰所造惟歲之春惟月之望誕千年一聖之始降百祥萬壽之初電繞樞而夜明雷出震而時泰皇帝孝敬寅畏憂勤勞謙以謂無疆之休雖肇自於元聖莫大之慶恩廣被於㣥生爰命國工俾陳繪事真相儼若元風穆如疑從大羅感聖而降至誠上通於一德景福旁濟於萬靈休命耿光自茲無極詞臣承詔恭為讚曰大羅天兮高不測浩無倪兮杳無極中有聖兮無上尊惟元德兮可升聞圖相好兮仰高真誠上感兮福下臻俾百祥兮與萬壽配聖日兮而長新歲正月十九日順宗仙駕上升之日月也皇帝嗣位六載每及茲晨齊居孝思明發不寐以為元祖之教本乎道先帝之神在乎天故畫大羅天尊像者欲以最上勝因而成本功德也然則知之者不如念之者念之者不如仰之者是用諦念真力虔仰尊儀命設色之工圖其儀形命掌文之臣贊其功德達孝誠於天上致孝理於域中斯蓋宏願發於我皇景福薦於先后稽首奉詔跪稱讚云維大羅兮天上天維天尊兮仙上仙高真之鑒照下界孝敬之心達上元每一念兮以一仰感罔極兮福無壥騶虞仁瑞之獸也其所感所食暨形狀質文孫氏瑞應圖具載其事元和元年夏有以騶虞圖贈豫者豫愛其外猛而威內仁而信又嗟曠代不覿引筆讚之詞曰孟山有獸仁心毛質不踐生芻不食生物有道則見非時不出三季已還退藏於密我聞其名徵之於書不識其形得之於圖白質黑文猊首虎軀是耶非耶孰知之乎已矣夫已矣夫前不見往者後不見來者吁嗟乎騶虞貘者象鼻犀目牛尾虎足生南方山谷中寢其皮辟瘟圖其形辟邪豫舊病頭風每寢息常以小屏衛其首適遇畫工偶令寫之按山海經此獸食鐵與銅不食他物因有所感遂為讚曰邈哉奇獸生於南國其名曰貘非鐵不食昔在上古人心忠質征伐教令自天子出劍㦸省用銅鐵羡溢貘當是時飽食終日三代以降王法不一鑠鐵為兵範銅為佛佛像日益兵刃日滋何山不剗何谷不隳銖銅寸鐵罔有孑遺悲哉彼貘無乃餒而嗚呼非貘之悲惟時之悲壽安令白昊豫宗兄也得丹青之妙傳寫之要毛㣥羽族尤是所長長慶元年以畫雕貺豫豫愛之因題讚云鷙禽之英黑鵰丁丁鈎綴八爪劍插六翎想入心匠寫從筆精不卵不雛一日而成軒然將飛戛然欲鳴毛動骨活神來一作采著形始知造物不必杳冥但獲天機則與化爭韓幹之馬籍籍知名薛稷之鶴翩翩有聲研工核能較真鬬靈豈無他人不如我兄晉建威將軍劉伯倫嗜酒有酒德頌傳於世唐太子賓客白樂天亦嗜酒作酒功讚以繼之其詞云麥麥曲之英米泉之精作合為酒孕和産靈孕和者何濁醪一樽霜天雪夜變寒為溫産靈者何清醑一酌離人遷客轉憂為樂納諸喉舌之內淳淳泄泄醍醐沆瀣沃諸心胸之中熙熙融融膏澤和風百慮齊息時乃之德萬緣皆空時乃之功吾嘗終日不食終夜不寢以思無益不如且飲會昌二年春香山寺居士白樂天命繢以寫和尚真而贊之和尚姓陸氏號如滿居佛光寺東芙蓉山蘭若因號焉我命工人與師寫真師年幾何九十一春會昌壬戌我師尚存福智壽臘天下一人靈芝無根寒竹有筠溫然言語嶷然風神師身自假師心是真但學師心勿觀師身南贍部州大唐國東都城長壽寺大苾芻一作芻道嵩存一惠恭等六十人與優婆塞士良惟儉等八十一人以太和八年夏受八戒修十善設法供捨淨財畫兜率陀天宮彌勒菩薩上生內衆一鋪眷屬圍繞相好莊嚴於是嵩等曲躬合掌焚香作禮發大誓願願生內宮劫劫生生親近供養按本經云可以除九十九億劫生死之罪也有彌勒弟子樂天同是願遇是緣爾時稽首當來下生慈氏世尊足下致敬無量而說讚曰百四十心合為一誠百四十口發同一聲仰慈氏形稱慈氏名願我來世一時上生西方阿彌陀佛與閻浮提有願此土衆生與彼佛有緣故受一切苦者先念我名祈一切福者多圖我像至於應誠來感隨願往生神速變通與三世十方諸佛不侔噫佛無若干而願與緣有若干也有女弟子宏農郡君姓楊號蓮花性發宏願捨淨財繡西方阿彌陀佛像及本國土眷屬一部奉為故李氏長姊楊夫人滅宿殃追冥佑也夫範銅設繪不若刺繡文之精勤也想形念號不若覩相好之親近也即造之者誠不得不著感不得不通受之者罪不得不滅福不得不集爾時蓮花性焚香合掌跪唱讚云金方剎金色身資聖力福幽魂造者誰宏農君受者誰楊夫人繡西方阿彌陀佛一軀女弟子京兆杜氏奉為皇妣范陽縣太君盧夫人八月十一日忌辰所造也五綵莊嚴一心恭敬願追冥福誓報慈恩讚曰善始一念千念相屬繡始一縷萬縷相續功績成就相好具足金身螺髻玉毫紺目報罔極恩薦無量福故尚書膳部郎中太原白府君諱行簡妻京兆杜氏奉為府君祥齊敬繡救苦觀音菩薩一軀長五尺二寸濶一尺八寸紉針縷綵絡金綴珠衆色彰施諸相具足發宏願於哀懇薦景福於幽靈稽首焚香跪而讚曰集萬縷兮積千針勤十指兮虔一心嗚呼鑑悲誠而介冥福實有望於觀世音淨淥水上虛白光中一覩其相萬緣皆空弟子居易誓心歸依生生劫劫長為我師有鳥有鳥從西北來丹腦火綴白翎雪開遼水一去緱山不回噫吳興郡孰為來哉寶歷之初三元四齊天無微飇地無纖埃當白晝下與紫雲偕三百六十拂壇徘徊上昭元貺下屬仙才誰其居之太守姓崔高昂字敖曹渤海草修人也姿體甚異膽力過人纍經戰伐皆著功績官至驃騎大將軍儀同三司冀州刺史其勇敢忠壯冠於一時時稱為名將後竟以攻戰死於王事年四十八贈太尉諡曰忠武讚曰敖曹之容好配子羽生揚勳烈死諡忠武武不顧身忠不忘主誠哉選士無以貌取貞元十有五年天子命中書舍人渤海公領禮部貢舉事越明年春居易以進士舉一上登第洎翌日至於旬時伏念固陋懼不克副公之選充王之賓乃自陳戒於德作針言曰我聞古君子人疾沒世名不稱恥邦有道貧且賤今我生休明代二十有六年乃策名名既聞於君乃干祿祿將及於親升聞逮養繄公之德公之德之死矢報之報之之義靡他帷勵乃志遠乃猷俾德日修道日就是報於公匪報於公是光於躬匪光於躬是華於邦吁其念哉其勗哉庶俾行中規文中倫學惟時習罔怠棄位帷馴致罔躁求惟一德五常陶甄於內惟四科六藝斧藻於外若御輿既勤銜策乃克駿奔若冶金既砥淬礪乃克利用無曰擢甲科名既立而自廣自滿尚念山九仞虧於一簣無曰登一第位其達而自欺自卑尚念行千里始於足下嗚呼我無監於止水當監於斯文庶克欽厥止慎厥終自顧於針言無作身之羞公之羞唐受天命十有二聖業業惕惕咸勤於政鳥生深林獸在豐草春搜冬狩取之以道鳥獸蟲魚各遂其生君民朝野亦克用寧在昔元祖厥訓孔章馳騁畋獵俾心發狂何以驗之曰羿與康曾不是戒終然覆亡故我列聖鑒彼前王雖有畋遊樂不至荒高祖方獵蘇長進言不滿十旬未足為歡上心忽悟為之輟畋故武德業垂二百年降及宋璟亦諫元宗溫顏聽納獻替從容及璟趨出鷂死握中故開元事播於無窮噫逐獸於野走馬於路豈不快哉銜橛可懼噫夜歸禁苑朝出皇都豈不樂哉寇戎可虞臣非獸臣不當獻針輒思出位敢諫從禽螻蟻命小安危計深苟裨萬一臣死甘心太和九年夏有山客贈余磐石轉置於履道里第時屬炎暑坐臥其上愛而銘之云爾客從山來遺我磐石圓平膩滑廣袤六尺質凝雲白文折煙碧莓苔有斑麋鹿無跡置之竹下風掃露滴坐待禪僧眠留醉客清泠可愛支體甚適便是白家夏天牀席崔子玉座右銘余竊慕之雖未能盡行常書屋壁然其間似有未盡者因續為座右銘云勿慕貴與富勿憂賤與貧自問道何如貴賤安足云聞毀勿戚戚聞譽勿欣欣自顧行何如毀譽安足論無以意傲物以遠辱於人無以色求事以自重其身遊與邪分歧居與正為鄰於中有取捨此外無疏親修外以及內靜養和與真養內不遺外動率義與仁千里始足下高山起微塵吾道亦如此行之貴日新不敢規他人聊自書諸紳終身且自勗身歿貽後昆後昆苟反是非我之子孫道本無象功成強名生一氣之先為萬物之母吹煦寒暑陰陽節而歲功成輔相乾坤上下交而生物遂故能阜蕃動植啓迪雍熙邦家保安夷夏咸若今以時殷獻歲節及上元女道士某等奉為皇帝焚香行道敬修功德伏願聲聞紫極丕降元休大庇㣥生永康四海流光垂慶億萬斯年彭城劉夢得詩豪者也其鋒森然少敢當者豫不量力往往犯之夫合應者聲同交爭者力敵一往一復欲罷不能繇是每制一篇先相視草視竟則興作興作則文成一二年來日尋筆硯同和贈答不覺滋多至太和三年春以前紙墨所存者凡一百三十八首其餘乘興扶醉率然口號者不在此數因命小姪龜兒編録勒成兩卷仍寫二本一付龜兒一授夢得小兒崙郎各令收藏附兩家集豫頃以元微之唱和頗多或在人口常戲微之云僕與足下二十年來為文友詩敵幸也亦不幸也吟詠情性播揚聲名其適遺形其樂忘老幸也然江南士女語才子者多云元白以子之故使僕不得獨步於吳越間亦不幸也今垂老復遇夢得得非重不幸耶夢得夢得文之神妙莫先於詩若妙與神則吾豈敢如夢得雪裏高山頭白早海中仙果子生遲沉舟側畔千帆過病樹前頭萬木春之句之類真謂神妙在在處處應當有靈物護之豈唯兩家子姪祕藏而已己酉歲三月五日樂天解廬山自陶謝洎十八賢已還儒風綿綿相續不絶貞元初有符載楊衡輩隱焉亦出為文人今其讀書屬文結草廬於巖谷間者猶一二十人即其中秀出者有彭城人劉軻軻開卷慕孟子為人軻秉筆慕揚雄司馬遷為文故著翼孟三卷豢龍子十卷雜文百餘篇而聖人之旨作者之風雖未臻極往往而得豫佐潯陽郡三年軻每著文輒來示豫豫知軻志不息異日必能跨符楊而攀陶謝軻一旦盡賫所著書及所為文訪豫告行欲舉進士豫方淪落江海不足以發軻事業又羸病無心力不能遍致書於臺省故人因援紙引筆寫胸中事授軻且曰子到長安持此札為豫謁集賢庾三十二補闕翰林杜十四拾遺金部元八員外監察牛二侍御祕書蕭正字藍田楊主簿兄弟彼七八君子皆豫文友以豫愚直嘗信其言苟於今不我欺則子之道庶幾光明矣又欲使平生故人知我形體已悴志氣已憊獨好善喜才之心未死去矣持此代書三月三日樂天白湯征諸侯葛伯不祀湯始征之作湯征葛伯荒怠敗禮廢祀湯專征諸侯肇徂征之湯若曰格爾三事之人逮於有衆啓乃心正乃容明聽余言咨爾先格王有彞訓曰祿無常荷荷於仁福無常享享於敬惠乃道保厥邦覆乃德殄厥世惟葛伯反易天道怠棄邦本虐於民慢於神惟社稷宗廟罔克尊奉暨山川鬼神亦靡禋祀告曰罔犧牲以供俎羞豫厥牛羊乃既於盜食曰罔黍稷以奉粢盛豫佑厥稼穡乃困於仇餉今爾衆曰葛罪其如子聞曰為邦者祗奉明神撫綏蒸民二者克備尚克保厥家邦吁廢於祀神震怒肆於虐民離心頃繩契以降暨於百代神怒民叛而不顛隮者匪我攸聞小子履以涼德欽奉天威肇征有葛咨爾有衆克濟厥功其有警師徒戒車乘敬君事者有明賞其有罔率職罔戮力不恭命者有常刑明賞不僭常刑無赦嗚呼朕告汝衆君子監於茲欽哉懋哉罰及乃躬不可悔太和元年十月皇帝降誕日奉敕召入麟德殿內道場對御三教談論略録大端不可具載賜紫引駕沙門義休太清宮賜紫道士楊宏元中大夫守祕書監上柱國賜紫金魚袋臣白居易言談論之先多陳三教讚揚演說以啓談端伏料聖心飽知此義伏計聖聽飫聞此談臣敢略而不言唯序慶誕贊休明而已聖唐御區宇二百年皇帝承祖宗十四葉太和初歲良月上旬天人合應之期元聖慶誕之日雖古者有祥虹流月瑞電繞樞彼皆瑣微不足引喻伏惟皇帝陛下臣妾四夷父母萬姓恭勤以修己慈儉以養人戎夏乂安朝野無事特降明詔式會嘉辰開達四聰闡揚三教儒臣居易學淺才微謬列禁筵猥登講座天顏咫尺隕越於前竊以釋門義休法師明大小乘通內外學靈山嶺岫苦海津梁於大衆中能獅子吼所謂彼上人者難為酬對然臣稽先王典籍假陛下威靈發問既來敢不響答義休法師所問毛詩稱六義論語列四科何者為四科何者為六義其名與數請為備陳者孔門之徒三千其賢者列為四科毛詩之篇三百其要者分為六義六義者一曰風二曰賦三曰比四曰興五曰雅六曰頌此六義之數也四科者一曰德行二曰言語三曰政事四曰文學此四科之目也在四科內列十哲名德行科則有顏淵閔子騫冉伯牛仲弓言語科則有宰我子貢政事科則有冉有季路文學科則有子游子夏此十哲之名也四科六義之名數今已區別四科六義之旨義今合辨明請以法師本教佛法中比方即言下曉然可見何者即如毛詩有六義亦猶佛法之義例有十二部分也佛經千萬卷其義例不出十二部中毛詩三百篇其旨要亦不出六義內故以六義可比十二部經又如孔門之有四科亦猶釋門之有六度六度者六波羅蜜六波羅蜜者即檀波羅蜜尸波羅蜜羼提波羅蜜毗梨耶波羅蜜禪定波羅蜜般若波羅蜜以唐言譯之即布施持戒忍辱精進禪定智慧是也故以四科可比六度又如仲尼之有十哲亦猶如來之有十大弟子即迦葉阿難須菩提舍利弗迦㫋延目乾連阿那律優波離羅喉羅是也故以十哲可比十大弟子夫儒門釋教雖名數則有異同約義立宗彼此亦無差別所謂同出而異名殊途而同歸者也所對若此以為何如更有所疑請以重難法師所難十哲四科先標德行然則曾參至孝孝者百行之先何故曾參獨不列於四科者曾參不列四科者非為德行才業不及諸人也蓋繫於一時之事耳請為終始言之昔者仲尼有聖人之德無聖人之位棲棲應聘七十餘國與時竟不偶知道終不行感鳳泣麟慨然有吾已矣夫之嘆然後自衛反魯刪詩書定禮樂修春秋立一王之法為萬代之教其次則敘十哲論四科以垂示將來當此之時顏閔游夏之徒適在左右前後目擊指顧列入四科亦一時也孝經云仲尼居曾子侍此言仲尼閒居之時曾參則多侍從曾參至孝不忍一日離其親及仲尼旅游歷聘自衛反魯之時曾參或歸養於家不從門人之列倫擬之際偶爾見遺由此明之非曾參德行才業不及諸門人也所以不列四科者蓋一時之闕耳因一時之闕為萬代之疑從此辨之又無可疑矣儒書奧義既已討論釋典微言亦宜發問維摩經不可思議品中云芥子納須彌須彌至大至高芥子至微至小豈可芥子之內入得須彌山乎假如入得云何見得假如去出云何得知其義難明請言要旨僧答不録法師所云芥子納須彌是諸佛菩薩解脫神通之力所致也敢問諸佛菩薩以何因緣證此解脫修何智力得此神通必有所因願聞其說僧答不録儒典佛經討論既畢請回餘論移問道門臣居易言我太和皇帝祖元元之教挹清淨之風儒素緇黃鼎足列座若不講論元義將何啓迪皇情道門楊宏元法師道心精微真學奧祕為仙列上首與儒爭衡居易竊覽道經粗知元理欲有所問冀垂發蒙黃庭經中有養氣存神長生久視之道常聞此語未究其由其義如何請陳大略道士答不録法師所答養氣存神長生久視之大略則聞命矣敢問黃者何義庭者何物氣養何氣神存何神誰為此經誰得此道將明事驗幸為指陳道士答不録法師所問孝經云敬一人則千萬人悅其義如何者謹按孝經廣要道章云敬者禮之本也敬其君則臣悅敬一人則千萬人悅所敬者寡而悅者衆此之謂要道也夫敬者謂忠敬盡禮之義也悅者謂悅懌歡心之義也要道者謂施少報多要之義也如此之義明白各見於經文其間別有所疑即請更難法師所難云凡敬一人則合一人悅敬二人則合二人悅何故敬一人而千萬人悅又問所悅者何義所敬者何人孝經所云一人者謂帝王也王者無二故曰一人非謂臣下衆庶中之一人也若臣下敬一人則一人悅敬二人則二人悅若敬君上雖一人則千萬人悅何以明之設如人有盡忠於國盡敬於君天下見之何人不悅豈止千萬人乎設如有人不忠於國不敬於君天下見之何人不怒亦豈止千萬人乎然敬即禮也禮即敬也故傳云見有禮於其君者事之如孝子之養父母也如此則豈獨空悅乎亦將事而養之也見無禮於其君者誅之如鷹鸇之逐鳥雀也如此則豈獨空不悅乎亦將逐而誅之也由此而言則敬不敬之義悅不悅之理了然可見復何疑哉臣伏惟三教談論承前舊例朝臣因對揚之次多自敘才能及平生志業臣素無志業又乏才能恐煩聖聰不敢自敘謹退樂天常有願願以今生世俗文筆之因翻為來世讚佛乘轉法輪之緣也今年登七十老矣病矣與來世相去甚邇故作六偈跪唱於佛法僧前欲以起因發緣為來世張本也十方世界天上天下我今盡知無如佛者堂堂巍巍為天人師故我禮足讚嘆歸依過見當來千萬億佛皆因法成法從經出是大法輪是大寶藏故我合掌至心回向緣覺聲聞諸大沙門漏盡果滿衆中之尊假和合力求無上道故我稽首和南僧寶毛道凡夫火宅衆生胎卵濕化一切有情善根苟種佛果終成我不輕汝汝無自輕無始劫來所造諸罪若輕若重無小無大我求其相中間內外了不可得是名懺悔煩惱願去涅槃願住十地願登四生願度佛出世時願我得親最先勸請請轉法輪佛滅度時願我得值最後供養受菩提記唐貞元十九年秋八月有大師曰凝公遷化於東都聖善寺塔院越明年二月有東來客白居易作八漸偈偈六句四言以讚之初居易常求心要於師師賜我八言焉曰觀曰覺曰定曰慧曰明曰通曰濟曰捨繇是入於耳貫於心達於性於茲三四年矣嗚呼今師之報身則化師之八言不化至哉八言實無生忍觀之漸門也故自觀至捨次而讚之廣一言為一偈謂之八漸偈蓋欲以發揮師之心教且明居易不敢失墜也歸而升於堂禮於牀跪而唱泣而去偈曰以心中眼觀心外相從何而有從何而喪觀之又觀則辨真妄惟真常在為妄所蒙真妄苟辨覺生其中不離妄有而得真空真若不滅妄即不起六根之源湛如止水是為禪定乃脫生死慧之以定定猶有繫濟之以慧慧則無滯如珠在盤盤定珠慧定慧相合合而後明照彼萬物物無遁形如大圓鏡有應無情慧至乃明明則不昧明至乃通通則無礙無礙者何變化自在通力不常應念而變變相非有隨求而見是大慈悲以一濟萬衆苦既濟大悲亦捨苦既非真悲亦是假是故衆生實無度者
