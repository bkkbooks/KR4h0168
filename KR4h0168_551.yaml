  text: 全唐文欽定全唐文卷五百五十一韓愈五
  hash: sha256:ad14cd21a9ad38738291a8d79e125188418b0c8ed00808f59b0e81a391219cab
body:
  text: 曾子稱小功不稅則是遠兄弟終無服也而可乎鄭元注云以情責情今之士人遂引此不追服小功小功服最多親則叔父之下殤與適孫之下殤與昆弟之下殤尊則外祖父母常服則從祖祖父母禮沿人情其不可不服也明矣古之人行役不踰時各相與處一國其不追服雖不可猶至少今之人男出仕女出嫁或千里之外家貧訃告不及時則是不服小功者恆多而服小功者恆鮮矣君子之於骨肉死則悲哀而為之服者豈牽於外哉聞其死則悲哀豈有間於新故死哉今特以訃告不及時聞死出其月數則不服其可乎愈嘗怪此近出弔人見其顏色戚戚類有喪者而其服則吉問之則云小功不稅者也禮文殘缺師道不傳不識禮之所謂不稅果不追服乎無乃別有所指而傳注者失其宗乎伏惟兄道德純明躬行古道如此之類必經於心而有所決定不惜示及幸甚幸甚泥水馬弱不敢出不果鞠躬親問而以書悚息尤深愈再拜愈始者望見吾子於人人之中固有異焉及聆其音聲接其辭氣則有願交之志因緣幸會遂得所圖豈惟吾子之不遺抑僕之所遇有時焉耳近者嘗有意吾子之闕焉無言意僕所以交之之道不至也今乃大得所圖脫然若沈疴去體灑然若執熱者之濯清風也然吾子所論排釋老不若著書囂囂多言徒相為訾若僕之見則有異乎此也夫所謂著書者義止於辭耳宣之於口書之於何擇焉孟軻之書非軻自著軻既歿其徒萬章公孫丑相與記軻所言焉耳僕自得聖人之道而誦之排前二家有年矣不知者以僕為好辨也然從而化者亦有矣聞而疑者又有倍焉頑然不入者親以言諭之不入則其觀吾書也固將無得矣為此而止吾豈有愛於力乎哉然有一説化當世莫若口傳來世莫若書又懼吾力之未至也三十而立四十而不惑吾於聖人既過之猶懼不及矧今未至固有所未至耳請待五六十然後為之冀其少過也吾子又譏吾與人人為無實駮雜之説此吾所以為戲耳比之酒色不有間乎吾子譏之似同浴而譏裸裎也若商論不能下氣或似有之當更思而悔之耳博塞之譏敢不承教其他俟相見薄晚須到公府言不能盡愈再拜吾子不以愈無似意欲推而納諸聖賢之域拂其邪心增其所未高謂愈之質有可以至於道者浚其源導其所歸溉其根將食其實此盛德者之所辭讓况於愈者哉抑其中有宜復者故不可遂已昔者聖人之作春秋也既深其文辭矣然猶不敢公傳道之口授弟子至於後世然後其書出焉其所以慮患之道微也今夫二氏之所宗而事之者下及公卿輔相吾豈敢昌言排之哉擇其可語者誨之猶時與吾悖其聲嘵嘵若遂成其書則見而怒之者必多矣必且以我為狂為惑其身之不能恤書於吾何有夫子聖人也且曰自吾得子路而惡聲不入於耳其餘輔而相者周天下猶且絶糧於陳畏於匡毀於叔孫奔走於齊魯宋衛之郊其道雖尊其窮也亦甚矣賴其徒相與守之卒有立於天下向使獨言之而獨書之其存也可冀乎今夫二氏行乎中土也蓋六百年有餘矣其植根固其流波漫非所以朝令而夕禁也自文王沒武王周公成康相與守之禮樂皆在及乎夫子未久也自夫子而及乎孟子未久也自孟子而及乎揚雄亦未久也然猶其勤若此其困若此而後能有所立吾其可易而為之哉其為也易則其傳也不遠故余所以不敢也然觀古人得其時行其道則無所為書書者皆所為不行乎今而行乎後世者也今吾之得吾志失吾志未可知俟五六十為之未失也天不欲使茲人有知乎則吾之命不可期如使茲人有知乎非我其誰哉其行道其為書其化今其傳後必有在矣吾子其何遽戚戚於吾所為哉前書謂我與人商論不能下氣若好勝者然雖誠有之抑非好已勝也好已之道勝也非好已之道勝也已之道乃夫子孟子揚雄所傳之道也若不勝則無以為道吾豈敢避是名哉夫子之言曰吾與回言終日不違如愚則其與衆人辨也有矣駮雜之譏前書盡之吾子其復之昔者夫子猶有所戲詩不云乎善戲謔兮不為虐兮記曰張而不弛文武不能也惡害於道哉吾子其未之思乎孟君將有所適思與吾子別庶幾一來愈再拜與足下別久矣以吾心之思足下知足下懸懸於吾也各以事牽不可合并其於人人非足下之為見而日與之處足下知吾心樂否也吾言之而聽者誰歟吾倡之而和者誰歟言無聽也倡無和也獨行而無徒也是非無所與同也足下知吾心樂否也足下才高氣清行古道處今世無田而衣食事親左右無違足下之用心勤矣足下之處身勞且苦矣混混與世相濁獨其心追古人而從之足下之道其使吾悲也去年春脫汴州之亂幸不死無所於歸遂來於此主人與吾有故哀其窮居吾於符離睢上及秋將辭去因被留以職事默默在此行一年矣到今年秋聊復辭去江湖余樂也與足下終幸矣李習之娶吾亡兄之女期在後月朝夕當來此張籍在和州居喪家甚貧恐足下不知故具此白冀足下一來相視也自彼至此雖遠要皆舟行可至速圖之吾之望也春且盡時氣向熱惟侍奉吉慶愈眼疾比劇甚無聊不復一一愈再拜愈白愈少駑怯於他藝能自度無可努力又不通時事而與世多齟齬念終無以樹立遂發憤篤專於文學學不得其術凡所辛苦而僅有之者皆符於空言而不適於實用又重以自廢是故學成而道益窮年老而智愈困今又以罪黜於朝廷遠宰蠻縣愁憂無聊瘴癘侵加喘喘焉無以冀朝夕足下年少才俊辭雅而氣鋭當朝廷求賢如不及之時當道者又皆良有司操數寸之管書盈尺之紙高可以釣爵位循次而進亦不失萬一於甲科今乃乘不測之舟入無人之地以相從問文章為事身勤而事左辭重而請約非計之得也雖使古之君子積道藏德遁其光而不曜膠其口而不傳者遇足下之請懇懇猶將倒廩傾囷羅列而進也若愈之愚不肖又安敢有愛於左右哉顧足下之能足以自奮愈之所有如前所陳是以臨事愧恥而不敢答也錢財不足以賄左右之匱急文章不足以發足下之事業秵載而往垂士冖柘而歸足下亮之而已愈白月日將仕郎前守四門博士韓愈謹載拜奉書尚書大尹閣下愈來京師於今十五年所見公卿大臣不可勝數皆能守官奉職無過失而已未見有赤心事上憂國如家如閣下者今年以來不雨者百有餘日種不入土野無青草而盜賊不敢起穀價不敢貴百坊百二十司六軍二十四縣之人皆若閣下親臨其家老姦宿贓銷縮摧沮魂亡魄喪影滅迹絶非閣下條理鎮服宣布天子威德其何能及此愈也少從事於文學見有忠於君孝於親者雖在千百年之前猶敬而慕之况親逢閣下得不候於左右以求效其懇懇謹獻所為文兩卷凡十五篇非敢以為文也以為謁見之資也進退惟命愈恐懼再拜伏聞今月五日營田巡官陳從政獻瑞兔毛質皎白天馴其心其始實得之符離安阜屯屯之役夫朝行遇之迫之弗逸人立而拱竊惟休咎之兆天所以啓覺於下依類託喻事之纖悉不可圖驗非睿智博通孰克究明愈雖不敏請試辨之兔陰類也又窟居狡而伏逆象也今白其色絶其㣥也馴其心化吾德也人立而拱非禽獸之事革而從人且服罪也得之符離符離實戎國名又附麗也不在農夫之田而在軍田武德行也不戰而來之之道也有安阜之嘉名焉伏惟閣下股肱帝室藩垣天下四方其有逆亂之臣未血斧鑕之屬畏威崩析歸我乎哉其事兆矣是宜具迹表聞以承答天意小子不惠猥以文句微識蒙念覩茲盛美焉敢避不讓之責而默默耶愈再拜十二月九日將仕郎守江陵府法曹參軍韓愈謹上書侍郎閣下愈少鄙鈍於時事都不通曉家貧不足以自活應舉覓官凡二十年矣薄命不幸動遭讒謗進寸退尺卒無所成性本好文學因困厄悲愁無所告語遂得究窮於經傳史記百家之説沈潛乎訓義反復乎句讀礱磨乎事業而奮發乎文章凡自唐虞以來編所存大之為河海高之為山嶽明之為日月幽之為鬼神纖之為珠璣華實變之為雷霆風雨奇辭奧旨靡不通達惟是鄙鈍不通曉於時事學成而道益窮年老而智益困私自憐悼悔其初心髮禿齒落不見知己夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者難遇也伏以閣下內仁而外義行高而德巨尚賢而與能哀窮而悼屈自江而西既化而行矣今者入守內職為朝廷大臣當天子新即位汲汲於理化之日出言舉事宜必施設既有聽之之明又有振之之力寧戚之歌明之言不發於左右則後而失其時矣謹獻舊文一卷扶樹教道有所明白南行詩一卷舒憂娛悲雜以王褱怪之言時俗之好所以諷於口而聽於耳也如賜覽觀亦有可采干黷嚴尊伏增惶恐愈再拜愈白尉遲生足下夫所謂文者必有諸其中是故君子慎其實實之美惡其發也不掩本深而末茂形大而聲宏行峻而言厲心醇而氣和昭晰者無疑優遊者有餘體不備不可以為成人辭不足不可以為成文愈之所聞者如是有問於愈者亦以是對今吾子所為皆善矣謙謙然若不足而以徵於愈愈又敢有愛於言乎抑所能言者皆古之道古之道不足以取於今吾子何其愛之異也賢公卿大夫在上比肩始進之賢士在下比肩彼其得之必有以取之也子欲仕乎其往問焉皆可學也若獨有愛於是而非仕之謂則愈也嘗學之矣請繼今以言辱書并示表記述書辭等五篇比於東都略見顏色未得接言語心固已相奇但不敢果於貌定知人堯舜所難又嘗服宰豫之誡故未敢決然挹亦不敢忽然忘也到城以來不多與人還往友朋之中所敬信者平昌孟東野東野吃吃説足下不離口崔大敦詩不多見每每説人物亦以足下為處子之秀近又得李七翺書亦云足下之文遠其兄甚夫以平昌之賢其言一人固足信矣况又崔與李繼至而交説耶故不待相見相信已熟既相見不要約已相親審知足下之才充其容也今辱書乃云云是所謂以黃金注重外而內惑也然恐足下少年與僕老者不相類尚須驗以言故具白所以而今而後不置疑於其間可也若曰長育人才則有天子之大臣在若僕者守一官且不足以修理况如是重任耶學問有暇幸時見臨愈白伏蒙示文武順聖樂辭天保樂詩讀蔡姬胡笳辭詩移族從并與京兆書自幕府至鄧之北境凡五百餘里自庚子至甲辰凡五日手披目視口詠其言心惟其義且恐且懼忽若有亡不知鞍馬之勤道途之遠也夫澗谷之水深不過咫尺邱垤之山高不能踰尋丈人則狎而玩之及至臨泰山之懸崖窺巨海之驚瀾莫不戰掉悼栗眩惑而自失所觀變於前所守易於內亦其理宜也閣下負超卓之奇材蓄雄剛之俊德渾然天成無有畔岸而又貴窮乎公相威動乎區極天子之毗諸侯之師故其文章言語與事相侔憚赫若雷霆浩汗若河漢正聲諧韶濩徑氣沮金石豐而不餘一言約而不失一辭其事信其理切孔子之言曰有德者必有言信乎其有德且有言也揚子雲曰商書灝灝爾周書噩噩爾信乎其能灝灝而且噩噩也昔者齊君行而失道管子請釋老馬而隨之樊遲請學稼孔子使問之老農夫馬之智不賢於夷吾農之能不聖於尼父然且云爾者聖賢之能多農馬之知專故也今愈雖愚且賤其從事於文實專且久則其贊王公之能而稱大君子之美不為僭越也伏惟詳察愈恐懼再拜正月二十七日前鄉貢進士韓愈謹伏光範門下再拜獻書相公閣下詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣其詩曰菁菁者莪在彼中阿既見君子樂且有儀説者曰菁菁者盛也莪微草也阿大陵也言君子之長育人材若大陵之長育微草能使之菁菁然盛也既見君子樂且有儀云者天下美之之辭也其三章曰既見君子錫我百朋説者曰百朋多之之辭也言君子既長育人材又當爵命之賜之厚祿以寵貴之云爾其卒章曰泛泛楊舟載沈載浮既見君子我心則休説者曰載載也沈浮者物也言君子之於人才無所不取若舟之於物浮沈皆載之云爾既見君子我心則休云者言若此則天下之心美之也君子之於人也既長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而教育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能長育天下之人才將非吾君與吾相乎孰能教育天下之英才將非吾君與吾相乎幸今天下無事小大之官各守其職錢穀甲兵之問不至於廟堂論道經邦之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞鳴而起孜孜焉亦不為利其所讀皆聖人之書楊墨釋老之學無所入於其心其所著皆約六經之旨而成文抑邪與正辨時俗之所惑居窮守約亦時有感激怨懟奇怪之辭以求知於天下亦不悖於教化妖淫諛佞譸張之説無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畝之宮其可懷遑遑乎四海無所歸恤恤乎飢不得食寒不得衣濱於死而益固得其所者爭笑之忽將棄其舊而新是圖求老農老圃而為師悼本志之變化中夜涕泗交頤雖不足當詩人孟子之謂抑長育之使成材其亦可矣教育之使成才其亦可矣抑又聞古之君子相其君也一夫不獲其所若己推而內之溝中今有人生七年而學聖人之道以修其身積二十年不得已一朝而毀之是亦不獲其所矣伏念今有仁人在上位若不往告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧往告焉若不得志則命也其亦行矣洪範曰凡厥庶民有猷有為有守汝則念之不協於極不罹於咎皇則受之而康而色曰豫攸好德汝則錫之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰豫攸好德汝則錫之福之謂也抑又聞上之設官制祿必求其人而授之者非苟慕其才而富貴其身也蓋將用其能理不能用其明理不明者耳下之修己立誠必求其位而居之者非苟沒於利而榮於名也蓋將推已之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳苟以是而為心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓其自舉也可進而進焉不必廉於自進也抑又聞上之化下得其道則勸賞不必遍加乎天下而天下從焉因人之所欲為而遂推之之謂也今天下不由吏部而仕進者幾希矣主上感傷山林之士有逸遺者屢詔內外之臣旁求於四海而其至者蓋闕焉豈其無人乎哉亦見國家不以非常之道禮之而不來耳彼之處隱就間者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猿狖之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉而方聞國家之仕進者必舉於州縣然後升於禮部吏部試之以繡繪雕琢之文考之以聲勢之逆順章句之短長中其程式者然後得從下士之列雖有化俗之方安邊之畫不由是而稍進萬不有一得焉彼惟恐入山之不深入林之不密其影響昧昧惟恐聞於人也今若聞有以書進宰相而求仕者而宰相不辱焉而薦之天子而爵命之而布其書於四方枯稿沈溺魁閎寬通之士必且洋洋焉動其心峩峩焉纓其冠于于焉而來矣此所謂勸賞不必遍加乎天下而天下從焉者也因人之所欲為而遂推之之謂者也伏惟覽詩書孟子之所指念育才錫福之所以考古之君子相其君之道而忘自進自舉之罪思設官制祿之故以誘致山林逸遺之士庶天下之行道者知所歸焉小子不敢自幸其嘗所著文輒採其可者若干首録在異卷冀辱賜觀焉干黷尊嚴伏地待罪愈再拜二月十六日前鄉貢進士韓愈謹再拜言相公閣下向上書及所著文後待命凡十有九日不得命恐懼不敢逃遁不知所為乃復敢自納於不測之誅以求畢其説而請命於左右愈聞之蹈水火者之求免於人也不惟其父兄子弟之慈愛然後呼而望之也將有介於其側者雖其所憎怨苟不至乎欲其死者則將大其聲疾呼而望其仁之也彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後往而全之也雖有所憎怨苟不至乎欲其死者則將狂奔盡氣濡手足焦毛髮救之而不辭也若是者何哉其勢誠急而其情誠可悲也愈之強學力行有年矣愚不惟道之險夷行且不息以蹈於窮餓之水火其既危且亟矣大其聲而疾呼矣閣下其亦聞而見之矣其將往而全之歟抑將安而不救歟有來言於閣下者曰有觀溺於水而爇於火者有可救之道而終莫之救也閣下且以為仁人乎哉不然若愈者亦君子之所宜動心者也或謂愈子言則然矣宰相則知子矣如時不可何愈竊謂之不知言者誠其材能不足當吾賢相之舉耳若所謂時者固在上位者之為耳非天之所為也前五六年時宰相薦聞尚有自布衣蒙抽擢者與今豈異時哉且今節度觀察使及防禦營田諸小使等尚得自舉判官無間於已仕未仕者况在宰相吾君所尊敬者而曰不可乎古之進人者或取於盜或舉於管庫今布衣雖賤猶足以方乎此情隘辭蹙不知所裁亦惟少垂憐焉愈再拜三月十六日前鄉貢進士韓愈謹再拜言相公閣下愈聞周公之為輔相其急於見賢也方一食三吐其哺方一沐三捉其髮當是時天下之賢才皆已舉用姦邪讒佞欺負之徒皆已除去四海皆已無虞九夷八蠻之在荒服之外者皆已賓貢天災時變昆蟲草木之妖皆已銷息天下之所謂禮樂刑政教化之具皆已修理風俗皆已敦厚動植之物風雨霜露之所霑被者皆已得宜休徵嘉瑞麟鳳龜龍之屬皆已備至而周公以聖人之才憑叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而已豈復有賢於時百執事者哉豈復有所計議能補於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得於天下之心如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺捉髮為勤而止哉惟其如是故於今頌成王之德而稱周公之功不衰今閣下為輔相亦近耳天下之賢才豈盡舉用姦邪讒佞欺負之徒豈盡除去四海豈盡無虞九夷八蠻之在荒服之外者豈盡賓貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政教化之具豈盡修理風俗豈盡敦厚動植之物風雨霜露之所霑被者豈盡得宜休徵嘉瑞麟鳳龜龍之屬豈盡備至其所求進見之士雖不足以希望盛德至比於百執事豈盡出其下哉其所稱説豈盡無所補哉今雖不能如周公吐哺捉髮亦宜引而進之察其所以而去就之不宜默默而已也愈之待命四十餘日矣書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之説焉閣下其亦察之古之士三月不仕則相弔故出疆必載質然所以重於自進者以其於周不可則去之魯於魯不可則去之齊於齊不可則去之宋之鄭之秦之楚也今天下一君四海一國捨乎此則夷狄矣去父母之邦矣故士之行道者不得於朝則山林而已矣山林者士之所獨善自養而不憂天下者之所能安也如有憂天下之心則不能矣故愈每自進而不知愧焉書亟上足數及門而不知止焉寧獨如此而已惴惴焉惟不得出大賢之門下是懼亦惟少垂察焉瀆冒威尊惶恐無已愈再拜
