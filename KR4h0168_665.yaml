front:
  text: 全唐文欽定全唐文卷六百六十五白居易十
  hash: sha256:e625152cbebe47593d5a2c2f36c4f34c1710ed5bf6fcca0bb64757559b3df5ed
body:
  text: 敕茂昭王日興至省所奏今月十八日大破賊衆一萬七千人並擒斬收獲訖者具悉卿親率徑兵誓平妖寇竭股肱之力中有奇謀勵父子之軍前無強敵故能深入賊境大破凶徒殺傷既多俘獲亦廣具詳奏報備見忠勞眷屬之懷發於寤嘆將士等各懷勇烈同忿寇讎激於衆心致此殊效况荷戈於炎暑之際奮身於鋒刃之間永念於茲未嘗暫忘故令宣慰宜並悉之敕昭義軍節度下親事將士等盧從史受恩至重負國至多衆所不容追令赴闕朕以誤曾任使貴全始終今則止於貶官此蓋曲從寬典卿等抱忠懷義朕所素知頃以諸營同事從史三軍一體俱是王臣既不相干又能自效朕方優賞以酬功勳何至不安有此疑懼必恐從史已追之後元陽未到之間卿等當營乍無主將或被外人扇誘令衆意憂疑勢使之然事非獲已朕雖在此遠見軍情料卿本心必無此意况元陽勤儉恤下寬厚愛人久在河陽甚近澤潞元陽臧否卿等合諳以卿忠義之軍故擇仁賢為帥已有詔示宣諭元陽若到行營一無所問乃至將士家口亦令優恤安存卿復何憂必得其所况昭義將士艱難以來保守忠貞未嘗虧失天下稱嘆卿亦自知又卿父母妻兒家田墳墓一物以上並在潞州頃刻之間豈忍便棄朕之此語卿宜細思各相勉諭同保忠順計元陽已合到彼卿等便聽元陽指麾想卿等心必副朕意故令宣慰並宜知悉敕成德軍節度下將士等朕以王者之道與物無私若違命執迷則罔有容捨若知非改悔則無不含宏不窮無告之人不塞自新之路頃屬姦臣從史謀構異端致使恆陽隔於恩外六郡之地皆廢農桑三軍之人並懼鋒鏑每一念至中心惻然今卿等繼獻表章遠輸誠款省承宗之勤懇艱阻其情思武俊之功勞不能無念况事因詿誤而理可哀矜今已降制書各從洗雪承宗仍復舊官爵充恆冀深趙德棣六州觀察使成德軍節度使將士等官爵實封並宜仍舊待之如初卿等各宜協力同心知恩感德共保終始稱朕意焉故令宣慰宜並知悉敕吐蕃宰相沙門鉢闡布論與勃藏至省表及進奉具悉卿器識通明藻行精潔以為真實合性忠信立誠故能輔贊大蕃叶和上國宏清淨之教思安邊陲廣慈悲之心令息兵甲既表卿之遠略亦得國之良圖况朕與彼蕃代為甥舅兩推誠信共保始終覽卿奏章遠叶朕意披閲嘉嘆至於再三所議割還安樂秦原等三州事宜已具前書非不周細及省來表似未指明將期事無後艱必在言有先定今信使往來無壅疆場彼此不侵雖未申以會盟亦足稱為和好必欲復修信誓即須重畫封疆雖兩國盟約之言積年未定但三州交割之後剋日可期朕之衷情卿之志願俱在於此豈不勉歟又緣自議三州已來此亦未發專使今者贊普來意欲以再審此言故遣信臣往諭誠意即不假別使更到東軍此使已後應緣盟約之事如其間節目未盡更要商量卿但與鳳翔節度使計會此已處分令其奏聞則道路非遙往來甚易頗為便近亦冀速成更待要約之言皆已指定封疆之事保無改移即蕃漢俱遣重臣然後各將成命事關久遠理貴分明想卿通才當稱朕意曩者鄭叔矩路泌因平涼盟會沒落蕃中比知叔矩已亡路泌見在念茲存沒每用惻然今既約以通和路泌合令歸國叔矩體骨亦合送還表明信誠兼亦在此其論與勃藏等尋到鳳翔舊例未進表函節度不敢聞奏自取停滯非此稽留昨者方進表函旋令召對今便發遣更不遲回仍令與祠部郎中兼御史中丞徐復及中使劉文璨等同往其餘事宜已具與贊普書內卿宜審於謀議速副誠懷兼有少信物賜卿具如別録至宜領也冬寒卿比平安好遣書指不多及敕吐蕃宰相尚綺心兒等論思諾悉至省表並進奉具悉卿等才器特茂識略甚明仗義立身資忠事主上佐贊普下康黎元以尋盟納款為謀繼好息人為請是卿上策叶朕中心每覽表章輒用嘉嘆朕與彼蕃國代為舅甥日結恩信自論盟會頗歷歲時常欲速成以為永好雖誠明之內彼此無疑而言約之間往復未盡今故略收來意重示所懷想卿通明當所鑒悉河隴之地國家舊封論州郡則其數頗多計年歲則沿來甚近既通和好悉合歸還今者捨而不言豈是無心愛惜但務早成盟約所以唯言三州則沒於彼者甚多歸於此者至少猶合推於禮讓豈假形於言詞來表云此三州非創侵襲不可割屬大唐來且此本不屬蕃豈非侵襲所得今是却歸舊管何引割屬為詞去年論與勃藏來即云覆取進旨贊普便請為定今兩般使至又云比之小務未合首而論之前後既有異同信使徒煩來去雖欲速為盟會其如無所適從靜言二三固不在此若論和好即今各無侵軼己同一家若議修盟即須重定封疆先歸三郡若三郡未復兩界未分即是未定封疆憑何以為要約彼若吝惜小事輕易遠圖未能修盟且務通好至於信使一往一來但令疏數得中足表情意不絶彼有要事即令使來此有要事亦令使往若封境之上小小事意但令邊頭節度兩處計會商量則勞費之間彼此省便前般蕃使論悉吉贊至緣盟約事大須審商量未及發遣後使雖是兩般所論只緣一事故令相待今遣同歸在於日時亦未淹久所送鄭叔矩及路泌神柩及男女等並已到此良用惻然厚贈遠歸深嘉來意其劉成師原非劉闢子姪本是成都郡人已令送還本貫其餘事目並在贊普書中卿等宜審參量以副朕意使回之日可備奏聞今遣兼御史中丞李銛及中使與回使同往各有少信物具如別數至宜領之秋涼卿等各得平安好遣書指不多言敕新羅王金重熙金獻章及僧沖虛等至省表兼進獻及進功德並陳謝者具悉卿一方貴族纍葉雄才仗忠孝以立身資信義而為國代承爵命日慕華風師旅叶和邊疆寧泰况又時修職貢歲奉表章進獻精珍忠勤並至功德成就恭敬彌彰載覽謝陳益用嘉嘆滄波萬里雖隔於海東丹慊一心每馳於闕下以茲嘉尚常屬寢興勉宏始終用副朕意今遣金獻章等歸國並有少信物具如別録卿母及並副王宰相已下各有賜物至宜領之冬寒卿比平安好卿母比得和宜官吏僧道將士百姓等各加存問遣書指不多及敕驃國王雍羌卿性宏毅勇代濟貞良訓撫師徒鎮寧邦部欽承王化思奉朝章得睦鄰之善謀秉事大之明義又令愛子遠赴闕庭萬里納忠一心稟命誠信彌著嘉想益深今授卿檢校太常卿並卿男舒難陀那及元佐摩訶思那等二人亦各授官誥往至宜領之此所以表卿勳勤申朕恩禮敬受新命永為外臣勉宏令圖以副遐矚今有少信物具如別録想宜知悉也冬寒卿比平安官吏百姓等並存問之遣書指不多及敕南詔清平官段諾突李附覽爨何棟尹輔首段谷普李異傍鄭蠻利等段史倚至知異牟尋喪逝朕以義重君臣情深軫悼卿等哀慕所切當何可任又知閣勸繼業撫人輸誠奉教蒸蒸咸乂封部獲安皆是卿等同竭忠謀佐成休績永言及此嘉慰良深勉終令圖以嗣遐矚今遣諫議大夫兼御史中丞段平仲持節册命閣勸想當悉之卿等各有少信物具如別録至宜領也春寒卿等各得平安好遣書指不多及皇帝敬問回鶻可汗夏熱想比佳適可汗有雄武之姿英果之略統制諸部君長一方纂承前修繼守舊好故得邑落蕃盛士馬精強連挫西戎永藩中夏况嚮風之義每勤於朝聘事大之敬常見於表章動皆由衷言必合禮朕所以深嘉忠款追想風規至於寢興不忘嘆矚勉宏令德用副誠懷達覽將軍等至省表其馬數共六千五百匹據所到印納馬都二萬匹都計馬價絹五十萬匹緣近歲以來或有水旱軍國之用不免闕供今數內且方圓支二十五萬匹分付達覽將軍便令歸國仍遣中使送至界首雖都數未得盡足然來使且免稽留貴副所須當悉此意頃者所約馬數蓋欲事可久長何者付絹少則彼意不充納馬多則此力致歉馬數漸廣則欠價漸多以斯商量宜有定約彼此為便理甚昭然况與可汗禮在往來義存終始親鄰既通於纍代思好益厚於往時所以萬里推誠期於一言見信遠思明智固體朕心其東都太原置寺此令人勾當事緣功德理合精嚴又有彼國師僧不必更勞人檢校其見撚拓勿施塢達於等今並放歸所令帝德將軍安慶雲供養師僧請住外宅又令骨都祿將軍充檢校功德使其安立請隨班次放歸本國者並依來奏想宜知悉今賜少物具如別録內外宰相及判官摩尼師等並各有賜物至宜準數分付內外宰相官吏師僧等並存問之遣書指不多及敕浙西立功將士等朕自臨寰宇已再逾年以忠恕牧萬人以恩信馭百辟動必思於恤隱靜無忘於泣辜庶乎馴致小康寖興大道也李錡因緣屬籍踐歷官常包藏禍心素懷梟獍之性彰露凶德忽發豺狼之聲朕念以宗枝務於容貸諭以迷復卒無悛心而乃保界重江竊弄凶器抗拒朝命驅脅師人背德欺天亂常干紀蜂蠆之毒流於郡縣犬彘之行肆於閨門惡稔禍盈親離衆叛人神共棄天地不容卿等忠憤暗彰義勇潛發變疾風雨謀先鬼神中推赤心前蹈白刃率其膂力死命於軍前擒其凶魁生致於闕下廓千里之沴氣濟一方之生人誠感君親義激臣子臨危見不奪之節因事立非常之功豫嘉乃誠一念三嘆至於圖勞懋賞詢事策勳各有等差續當處分故先宣慰宜並悉之冬寒卿等各得平安好遣書指不多及卿先父頃逢多難嘗立大功每想忠勞豈忘存歿念先臣之績雖書名於太常推同姓之恩更附籍於宗正俾增榮於一族兼延寵於九原卿等或詩禮承家或弓裘奉業咸鍾新命慶屬本枝省所謝陳深嘉誠懇朕思求理化親閲典墳至於去邪納諫之規勤政慎兵之誡取而作鑒書以為屏與其散在圖書心存而景慕不若列之繪素目覩而躬行庶將為後事之師不獨觀古人之象卿詞彰恭順義見忠規省覽再三深叶朕意所賀知朕烈祖太宗以古為鏡用輔明聖實臻理平垂作孫謀每懼乎失墜取為殷鑒遂飾之丹青至若明君直臣前言往事森然在目如見其人論列是非既庶幾為座隅之誡發揮獻納亦足以開臣下之心况卿等職在儀刑政當補察各勤所任共副茲懷所賀知卿文通吏道學達政源凡歷官常輒聞績效觀能以授俾亞理於三川見可而遷宜專臨其一府盡委封畿之政仍兼運漕之權歲時之間佇有勤效勉恭爾職重副豫懷所謝知朕祗膺統序恭守典常爰推至公乃命長子使主國鬯用貞邦家册畢禮成良增感慶卿等各司軍衛同奉表章備見忠誠益深嘉嘆所賀知朕臨馭天下以懲勸為先有惡必誅無功不念顧承宗之罪誠合討除思武俊之勳宜令嗣襲况墳墓禁其翦伐將校許以歸降庶明用師蓋非獲巳卿職修卿寺誠奉本枝省茲賀章備見忠藎先臣武俊功不可忘後嗣承宗過而能改朕所以捨其罪悔議以勳親垂宥過之恩尚宜及爾十代引泣辜之責誠合在豫一人與其黷武而取威不若匿瑕而務德卿等重居台輔密贊謀猷發於衷誠有此稱賀省閲章奏嘉嘆久之帝者之道蕩然無私唯推赤心以牧黔首故一夫不獲若納之於隍一物歸誠則容之如地况卿家聯懿戚寵自先朝祖立茂功賞延後嗣因人詿誤不汝疵瑕滌以恩波煦之寵澤撫舊封而廉察六郡進新律而統制三軍蕩穢加恩何以過此及覩來表乃見深誠言必由衷事皆知感承家襲慶誓繼力於前修補過酬恩願指期於報效永言爾志甚叶朕懷勉思始終用副眷矚所謝知卿有忠貞之節立於險中有清重之名鎮於朝右而能始終有道進退有常援禮引年遺榮致政人鮮知之卿獨能行不惟振起古風亦足激揚時俗於卿則確然難奪在朕則情豈易忘誠鑒乃懷未允來表卿自登台輔每竭忠貞一身秉彞百度惟序致君盡力久積股肱之勤憂國勞心微生腠理之疾暫從休告遽獻表章所陳雖是卿心所請殊非朕意宜加調攝速就平和以副虛懷無為固讓卿幼承義訓長有令聞能遵忠孝之風不墜弓裘之業朕所以命加異等寵冠常倫特授雙旌超登八座豈惟延賞亦在任能將懋前修勉申後效載省章疏深鑒誠懷所謝知卿修文立身經武致用每誓心於忠勇常濟事以智謀自副戎車已屬時望及分節鉞果愜軍情况武義之師輸忠仗順所期撫慰以就輯寧何至撝謙有茲陳讓所進官告今卻賜卿宜體朕懷即斷來表卿疾病以來表疏相繼雖辭乞之誠頗切而注望之意方深所以來章久而未報然念卿勤懇之請至於再三若心不甚安即疾難速愈是用輟樞劇之務加崇重之官稍遂優間佇期痊復勉從爾志深抑豫懷卿自居鈞軸日獻謀猷戴君常竭其股肱憂國每形於顏色及嬰疾病益不遑安未踰四旬以至三讓撝謙秉易退之道堅懇陳難奪之詞遂抑朕心俯從卿請而七命印綬五兵尚書官秩甚崇事務稍簡就以優養冀乎和平載省表章深見誠意朕勤求道本廣挹教源以真如不二之宗助清淨得一之化况斯經典時為大乘名理精微翻譯成就雖契心則離於文字而得意亦假於筌蹄庶使發揮因為述序卿等精通外學懇竭忠誠引經贊揚奉表稱賀再三省覽嘉嘆久之大仙經典最上法乘來自西方閟於中禁將期利益必在闡揚遂命僧徒譯其句偈兼詔卿等潤以文言昨因披尋深得真諦悟本生不滅之義證心地無相之宗方勤護持聊著序引永言述作猶愧聖明卿等賀陳良深嘉尚夏口重鎮屬在時賢非明肅不能理其軍非儉不能阜其俗以卿有仁厚之質謇直之風纍踐班行皆著名節遂輟中憲往臨外藩知己下車深慰人望佇茲報政用副朕懷所謝知卿抱兼人之才秉徇公之節每登要職悉著能名若刃發硎投而不滯如玉在佩動必有聲朕以距淮而南人物繁會非廉明何以貞師察俗非惠何以通商綏農前勞既彰後效何遠載省來表知已下車勉副虛懷佇觀新政所謝知朕自君臨幸逢休泰時歲豐稔凶醜殄夷此皆宗社降靈忠賢宣力顧惟寡德敢受鴻名卿中發懇誠上尊美號雖屬人望難貪天功宜悉所懷勿固為請朕自嗣耿光每多惕厲念必先於除害志無忘於安人李錡大負國恩自貽天罰師徒未動於疆場父子俱肆於市朝信上天之禍淫與率土而同慶省視來表深鑒乃誠所賀知朕以薄德嗣守丕圖不敢荒寧以宏理道幸屬歲時豐稔凶寇梟夷風雨不愆禮圜丘而報本雷霆未震舋太社而服刑斯皆十聖降靈幽贊寡昧百辟叶德馴致和平永惟宏名實懼虛美卿上稽祖訓下酌㣥情陳獻表章請加徽號暨於王公卿士降及耆艾緇黃咸一乃心各三其請朕嘗以宰元化者曲成於物法天道者從欲於人雖恤隱泣辜未臻三五之化而樂推欣戴難違億兆之心德非稱焉讓不獲已勉從所請深愧於懷朕自臨萬邦僅經三載位雖托於人上化未洽於域中永念眇身敢當大號卿等義深宗室忠盡君親一其情誠三有陳獻迫以人望厭於天心遂抑所懷勉從其請固辭而事非獲已撫德而何以堪之再省謝章彌增惕厲朕統承大寶時屬小康伐謀而吳蜀克清示信而華夷有截斯皆宗社垂祐天地降和非豫沖人所能馴致卿上稽十聖之訓下酌萬人之心以為不讓強名未傷於體道屈己循物何爽於至公遂抑素懷俯從衆望雖鴻名未稱每勞蹐地之心而人欲不從即爽法天之德勉依勤請良用愧懷朕每念雍熙慙未及於億兆永言徽號讓已至於二三而文武具寮緇黃庶老懇陳誠款明引訓謨開豫以天地無私之心起豫以聖宗不易之訓以大道者無求於物物尊而不辭至公者非欲其名名立而不讓迫於固然之禮不得已而許之卿等誠至感通義深欣戴再煩陳謝益用愧懷卿用兼文武識合變通輟綱領於中朝授麾幢於外閫吏能足以惠物將略足以董戎人望所歸豫心是賴知卿已到本鎮當慰疲人深藉撫綏之方以安凋弊之俗日期報政歲望成功勉勤所圖用副朕意銷沴致和幸逢昌運加名建號豈稱眇身而文武具寮黎獻庶老引古今之明訓陳億兆之懇誠謂德有所歸謳歌不可以苟讓謂功有所獻徽號不可以固辭遂抑中懷俯從衆望庶增修乎茂實冀克副於鴻名卿發誠自中歸美於上勉依所請彌愧於心朕以眇身嗣於丕業心雖勞於惕厲化未及於雍熙永惟強名實懼虛美上自一二元老下及億兆黎人大洽詢謀明徵典訓增豫以巍巍之號感豫以禺禺之誠既迫所懷俯從其請卿義深奉上志切戴君再省謝陳彌增愧惕在昔哲王居於人上推其憂樂與衆共之頃屬三凶薦興二載連獲凡百有位咸一其心誠念嘉謀共致昭泰今四表無事三農有年想與㣥情同其具慶是宜削苛察之前弊煦寬裕之新恩仁及下而啓迪歡心澤先奏而導迎和氣昨逢多故主憂且使臣勞今致小康上安則宜下樂庶欲解人之慍粗申推已之恩豈曰殊私煩於陳謝朕自御萬方僅經三載運逢休泰俗漸和平當朝野無虞之時見君臣相遇之樂是故去滋彰之化宏優貸之恩近自宗親下及士庶賜其宴衎遂以優遊蓋以己之所安思與人之共樂雖夕惕而若厲每戒志於無荒賜春遊以發生宜助時而有慶卿等榮崇宗寺恩重本枝省所謝陳彌嘉誠懇卿久踐吏途纍聞能政及居藩鎮尤見忠勤訓導而㣥黎向方廉察而列郡承式實嘉乃績每豫心宜遷雄劇之藩以廣循良之化勉於為理副朕所懷所謝知朕以寡德嗣承睿圖俯從衆誠勉受鴻稱慶之大者豈在豫一人推而廣之宜及爾萬姓爰因受册之禮遂施作解之恩俾與㣥生同斯大慶卿盡忠訓旅推美奉君省茲賀陳深見誠至敕劉濟省所奏茂昭送卿管內百姓殷進能等七人奏前後事由具悉卿為國大臣與君同體寬而得衆忠以忘身每循公而滅私能虛懷以容物與茂昭疆場之事小有違言曲直是非朕已明辨卿外崇藩翰內贊謨猷念屈已以為心或難容忍思戴君而是力宜務叶和勉卿寬裕之懷助朕含宏之化想宜知悉卿男從史為國重臣自領大藩厥有成績公忠茂著政理殊尤勒石所以表勳賜文所以褒德惟功是念有善必旌是國舊章非豫私渥昨又請移卿貫願隸京邑家聲益振臣節逾章雖清望標門崇冠山東之族而丹心戀闕恥為關外之人載省懇誠彌深嘉嘆所謝知卿道贊謨猷功成輔弼師損克承訓義雅有令名豈惟賞延兼以能選班行久次頗積功勤郎署積遷未為渥澤省茲章奏深見懇誠所謝知卿自領大藩纍彰殊效惠安百姓表正一方雖戀闕誠深然殿邦寄切既執圭而肆覲宜返斾而勞旋况淮海要衝旌旄重任永言共理已有成功方注意於撫綏何瀝誠而陳讓難允來請宜體所懷致理之道審官為先以卿有文武之才故授卿以將相之任所冀外為藩翰張爪牙之威內贊謨猷宣股肱之力僉諧允屬衆望攸歸方注意於安危何執謙而陳讓所進官誥今却賜卿無或再辭即斷來表將相兼委實難其人非其德不可謬承當其才不在懇讓朕非虛授卿勿固辭宜斷來章即奉成命已具前詔當體朕懷三川封畿實重其任二職綱紀亦難其人卿素懷器能纍著聲績亞理以明慎選專領以展長才知已下車當親綏撫佇聞報政用副憂勤所謝知水旱流行江淮艱食朕明申詔旨親遣使臣蠲其逋租賑以公廩爰興利物之利用表憂人之憂庶俾疲氓均霑惠澤卿克勤乃職共理為心省茲賀陳深見誠意古先聖王托於人上與百姓同其欲與天下共其憂唯推是心可底於道朕臨御萬國逮茲五年惕厲之懷雖勤於夙夜愆伏之候猶害於歲時思革弊以救災在濟人而損已是用欽刑緩死責己恤貧罷郡國之貢珍省宮廄之煩費延春令而布仁行惠先南風而解慍阜財庶憑歡心以召和氣卿等或匪躬獻替或悉力弼諧啓沃之間已申霖雨之用燮理之際佇見陰陽之和各宜勉之以輔豫理所賀知朕統承鴻緒子育蒼生纍歲有秋今春不雨在陰陽之數雖有盈虛為父子之心敢忘惻隱俾除人弊以蕩歲災卿等任重宗卿恩連屬籍省茲陳賀深見忠誠朕以時陽舛候春澤愆期思備旱之方無如貶省務動天之德莫若精誠是以修己恤人去煩節用冀答天戒以致時和卿志竭邦家職修軍衛省茲表章深用嘉之所賀知朕以春候發生歲功資始順陽和而布政賑貧乏而勸農載念罪人因除弊事隨其所利施以為恩富庶之端實漸於此卿等義敦宗戚誠竭君親省茲賀陳用增嘉歎朕勤求人隱慎恤農功念播植之時必資首種慮懸磬之日多乏見糧將便公私宜從斂散卿等名登庶老業守先疇各勉農人以副朕意所謝知上天降休下土效祉將表豐年之兆故生同穎之祥顧慙寡德受此嘉瑞披圖省表閲視久之卿發誠自中歸美於上亦宜勉勤匡贊馴致雍熙庶洽升平之風以叶和同之慶所賀知
