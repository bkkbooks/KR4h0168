front:
  text: 全唐文欽定全唐文卷九太宗六
  hash: sha256:d9c982cc129917a24d89f8c24a6e92d6a73c20ba4903e50af48fcf1e6656a8f8
body:
  text: 朕以隋末亂離毒被海內率土百姓零落殆盡州里蕭條十不存一寤寐思之心焉若疚是以日昃忘食未明求衣曉夜孜孜惟以安養為慮每見水旱降災霜雹失所撫躬責己自慚德薄恐貧乏之黎庶不免飢餒傾竭倉廩普加賑恤其有一人絶食若朕奪之分命庶僚盡心營救去年關內六州及蒲虞陝鼎等復遭亢旱禾稼不登糧儲既少遂令分房就食比聞刺史以下及百姓等並識朕懷逐糧戶到遞相安養回還之日各有贏糧乃別齎布帛以申贈遺如此用意嘉嘆良深一則知水旱無常彼此遞相拯贍不慮凶年二則知禮讓興行輕財重義四海士庶皆為兄弟變澆薄之風敦仁慈之俗政化如此朕復何憂其安置客口官人支配得所並令考司録為功最養戶百姓不吝財帛巳敕主者免今年調物宜知此意善相勸勉比來有司斷獄多據律文雖情在可矜而不敢違法守文定罪或恐有冤自今門下省視有據法當死而情在可矜者録狀奏聞配德元良必俟邦媛作儷儲二允歸冠族祕書丞蘇亶長女門襲軒冕家傳義方柔順表質幽間成性訓彰圖史譽流邦國正位儲闈實惟朝典可皇太子妃所司備禮册命主者施行夫建官之道實資明德列爵之義必俟茂親故晉鄭佐周功宣於寅亮間平輔漢業崇於藩屏惟爾業尚忠肅器懷恭懿幼稟庭訓早膺朝寵仁恕聞於封畿廉平著於方策荊衡作鎮江漢為紀包括巴濮之域跨躡吳越之郊褰帷永諧分圭僉屬是用備茲令典錫以休命奄有楚甸代為唐輔可不慎歟故禮部尚書文懿公虞世南德行純備文為辭宗夙夜盡心志存忠益奄從物化忽移時序昨因夜夢倏覩斯人兼進讜言有若平生之日追懷遺美良用悲悼宜資冥福申朕思舊之情可即其家齋五百僧造佛像一軀禮經殘缺其來巳久漢代戴聖爰記舊聞古今所宗條目雜亂先儒傳授多歷年所咸事因循莫能釐正特進鄭國公徵文高翰林學綜册府服膺典禮有志討論乃依聖所記更事編録以類相從別為篇第并更注解文義粲然遂得先聖微言因茲重闡後之學者多有宏益宜付祕書觀卿書不如尋常憂惋之情切朕懷意處卿至此堂為宏濟黎元經圖達化耳豈為朕一人而巳何事果來相謝不見數日憂憤甚深自顧過巳多矣言巳失矣行巳虧矣古人云無鏡無以鑑鬚眉可謂實也比欲自往恐勞卿所以使人來去若有聞知此後可以信來具報朕少尚威武不精學業先王之道茫若涉海覽所撰書博而且要見所未見聞所未聞使朕致治稽古臨事不惑其為勞也不亦大哉近來疹病何似漸得可未卿患日久言面巳賒理國立家方知難耳比日自為勞思委頓始驗任人則逸自任則勞非虛言也此懷公想知之可以意得書何盡心略而言耳漢之太子四皓為助我之賴公即其義也知公疾病可臥護之夫選賢之義無私為本奉上之道當仁是貴列代所以宏風通賢所以叶力卿忠肅恭懿明允篤誠草昧霸圖綢繆帝道儀刑禮閣庶政惟和輔翼春宮望實斯在而忘彼大體徇茲小節雖恭教諭之職乃辭機衡之務豈所謂弼余一人共安四海者也宜聽此懷無煩固讓元齡德為時秀位隆朝右業履恭儉志懷沖退頻表陳誠固辭執法朕昃食思治虛己欽賢方資啓沃共康兆庶豈得申其雅尚用虧彞典便可斷表即令攝職丹陵啓聖華渚降祥叶德神居克隆鴻業朕丕承大寶奄宅域中遠藉郊禋之慶仰惟樞電之祉思園之禮既宏撫鏡之情徒切而永懷慈訓欲報無從靜言因果思憑冥福通義宮皇家舊宅制度宏敞以崇神祠敬增靈祐宜捨為尼寺仍以興聖為名庶神道無方微伸凱風之思主者施行朕聞為官擇人者治為人擇官者亂竇誕比來精神衰耗異常時知不肖而任之覩尸祿而不退非唯傷風亂政亦恐為君不明考績黜陟古今常典誕可光祿大夫還第昔年師旅卿常入幕今茲遐伐君巳懸車倏忽之間移三十載眷言疇昔我勞如何今將遂良東行想公於朕不惜一兒於膝下耳故遣陳離意善居加食神道設教慈惠為先元化潛通亭育資始朕恭膺大寶撫愛黎元矜愍之心觸類而長是用旁求冥貺幽贊明靈所冀九功惟敘五福斯應比嚴霜早降秋實不登靜言寡薄無忘慚惕今百穀滋茂萬寶將成猶恐風雨失時字養無寄敢藉聖明介茲多祉宜為普天億兆仰祈嘉祐可於京城及天下諸州寺觀僧尼道士等七日七夜轉經行道每年正月七月例皆準此以卿兼資文武志懷貞確故委藩牧當茲重寄比在州鎮聲績遠彰念此忠勤無忘寤寐使遣獻鷹遂不曲順論今引古遠獻直言披露腹心非常懇到覽用嘉歎不能巳巳有臣若此朕復何憂宜守此誠始終若一詩云靖共爾位好是正直神之聽之介爾景福古人稱一言之重侔於千金卿之此言深足貴矣今賜卿金壺瓶金碗各一枚雖無千鎰之重是朕自用之物卿立志方直竭節至公處職當官每副所委方大任使以申重寄公事之間宜觀典籍賜卿荀悅漢紀一部此書敘致要論議深博極為政之體盡君臣之義今以賜卿宜加尋閲兵者凶器不得巳而用之故漢光武云每一發兵不覺頭鬚為白自古以來窮兵極武未有不亡者也苻堅自恃兵強欲必吞晉室興兵百萬一舉而亡隋主亦欲必取高麗頻年勞役人不勝怨死於匹夫之手至如頡利往歲數來侵我國家部落疲於征役遂至滅亡朕今見此豈得輒即發兵但經歷山險土多瘴癘若我兵士疾疫雖克翦此蠻亦何所補言語之間何足介意夫天命之重緑錯奉其圖書天子之尊赤縣先其司牧而功兼造化橋山之樹巳陰業致升平蒼梧之駕方遠至於平寇亂安黎元灑洪災攘大患黃帝之五十三戰商湯之二十七征以此申威曾何足算昔者亂階斯永禍鐘隋季罄宇凝氛曀昏辰象帛丿糸區作梗搖蕩江河朕拂衣於舞象之年抽劒於斬蛇之地雖復妖千王莽戮首軘車凶百蚩尤釁尸軍鼓垂文暢於炎野餘勇澄於斗極前王不闢之土悉請衣冠前史不載之鄉並為州縣再維地軸更張乾絡禮義溢於寰瀛菽粟同於水火破舟船於靈沼收干戈於武庫辛李衛霍之將咸分土宇縉紳廊廟之材共垂帶綬至於比屋黎元關河遺老或贏金帛或齎倉儲朕於天下士大夫可謂無負矣朕於天下蒼生可謂安養矣自櫛風沐雨遂成弭沴憂勞庶政更起沈疴況乃漢苦周勤禹胼堯臘以矜百姓之所致也道存物往人理同歸掩乎元泉夫亦何恨矣皇太子治大孝通神自天生德纍經監撫熟達機務凡厥百僚㣥公卿士送往事居無違朕意屬纊之後七日便殯宗社存焉不可無主皇太子即於柩前即皇帝位依周漢舊制軍國大事不可停闕尋常間務任之有司文武官人三品巳上並三日朝晡哭臨十五舉音事畢便出四品巳下臨於朝堂其殿中當臨者非朝夕臨無得擅哭諸王為都督刺史任者並來奔喪濮王萊王不在來限其方鎮嶽牧在任官人各於任所舉哀三日其服紀輕重宜依漢制以日易月園陵制度務從儉約昔者霸陵不掘則朕意焉遼東行事並停太原元從人見在者各賜勳官一級諸營作土木之功並宜停斷吾與如晦君臣義重不幸物化追念勳舊痛悼於懷卿體吾此意為之製碑文也殷薦祖考以崇功德比雖加以誠潔而廟樂未稱宜令所司詳諸故實制定奏聞虞世南與我猶一體也拾遺補過無日暫忘當代名臣人倫準的吾有小失必犯顏而諍之今其云亡石渠東觀之中無復人矣痛惜豈可言耶往者如來滅後以末代澆浮付囑國王大臣護持佛法然僧尼出家戒行須備若縱情淫佚觸塗煩惱關涉人間動違經律既失如來元妙之旨又虧國王受付之義遺教經者是佛臨涅槃所説誡勸弟子甚為詳要末俗緇素並不崇奉大道將隱微言且絶永懷聖教用思宏闡宜令所司差書手十人多寫經本務在施行所須紙筆墨等有司準給其官宦五品已上及諸州刺史各付一卷若見僧尼行業與經文不同宜公私勸勉必使遵行朕才謝圭璋言慙博達至於內典尤所未間昨製序文深為鄙拙唯恐穢翰墨於金標瓦礫於珠林忽得來書謬承褒讚循躬省慮彌益厚顏善不足稱空勞致謝佛道形像事極尊嚴伎巧之家多有造鑄供養之人競來買購品藻工拙揣量輕重買者不計因果止求賤得賣者本希利潤唯在價高罪纍特深福報俱盡違犯經教並宜禁約自今巳後工匠皆不得預造佛道形像賣鬻其見成之像亦不得銷除各令分送寺觀令寺觀徒衆酬其價直仍仰所在州縣官司檢校敕到後十日內使盡卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪而漢文帝不封禪後世豈以文帝不及始皇耶且事天掃地而祭何必登泰山之巔封數尺之土然後以展其誠敬乎晚來腫勢漸歇肉色如故體中亦自勝常昨日恐卿等為憂略此相報敕維貞觀某年月日皇帝遣使某官某持節册命曰於戲惟爾前魏王府咨議參軍楊恭道第三女門襲鍾鼎訓彰禮則幽間表質柔順為心備職後庭實惟通典是用命爾為婕妤往欽哉其光膺徽命可不慎歟維貞觀某年月日皇帝使某官某副使某官某持節册命曰於戲惟爾兼徐州都督府司馬崔宏道長女門稱著姓訓有義方婉順為質柔明表行宜升後庭備茲內職是用命爾為才人往欽哉其光膺徽命可不慎歟維貞觀年月日云云於戲惟蕭鏗第二女幼習禮訓夙表幽間胄出鼎族譽聞華閫宜遵舊章授以內職是用命爾為才人往欽哉其光膺徽命可不慎歟維貞觀年月日云云於戲蕭鑠第二女稟訓冠族著美家聲習禮流譽鏡圖有則宜升後庭允茲令典是用命爾為美人往欽哉其光膺徽命可不慎歟維貞觀十七年歲次甲辰四月某朔日皇帝若曰於戲惟爾并州都督右武大將軍晉王治忠肅恭懿宣慈惠和仁孝出於自然信義備於成德禎祥夙著睿哲日新永言少陽匕鬯是寄疇咨朝列卿士協從是用命爾為皇太子往欽哉爾其思王道之艱難遵聖人之炯戒勤修六德勉行三善無或舉非法度忘恭儉而好驕奢無或理乖彞倫遠忠良而近邪佞非履道無以彰名非任賢無以成德爾身為善國家以安爾身為惡天下以殆睦九族而禮庶僚懷萬邦而憂遐裔兢兢業業無怠無荒克念爾祖宗以寧我宗社可不慎歟於戲惟王建都惟聖垂範安兆民者實敦親戚固鴻業者必樹藩衛惟爾使持節都督徐譙泗三州諸軍事徐州刺史徐王元禮器能明敏業履詳和幼聞詩禮早膺車服海岱及淮俗兼齊魯胙土按部僉曰爾諧是用斟酌前代率由令典俾屏乃辟傳爾後昆朕聞曰友于兄弟施于有政弗學牆面蒞事惟煩緬求大訓茲為要道往欽哉爾其執心於忠孝踐行於儉約無好逸豫以犯非禮無縱嗜欲以邇宵人明率舊章以保疆土可不慎歟維貞觀某年某月某日甲子皇帝若曰於戲在昔哲后受命君臨並建茂親以為藩衛然則古之列國今之按部循名或異立政實同皆所以共治黎元俱獎王室克隆鼎祚咸悉由之惟爾雍州牧左武大將軍越王泰生而韶敏幼而好學樂善不倦才藝日新地則維城禮優分器惟彼三魏實號五都非親勿居夾輔攸屬是用命爾為使持節都督相衛黎魏洺邢貝七州諸軍相州刺史改封魏王傳之子孫長為藩翰古人有言皇天無親惟德是輔民心無常惟惠之懷往欽哉爾其鑒此格言無自驕奢無邇邪佞兢兢業業以保爾茅土可不慎歟惟爾祕書丞蘇亶長女族茂冠冕慶成禮訓貞順自然言容有則作合春宮實協三善曰嬪守器式昌萬葉備茲令典抑惟國章是用命爾為皇太子妃往欽哉其光膺徽命可不慎歟維貞觀年月日册命曰於戲惟爾兼太常卿扶風郡開國男韋挺長女地胄高華質性柔順訓彰禮教譽表幽間作儷藩闈實惟朝典是用命爾為齊王妃往欽哉維貞觀年月日皇帝遣使持節册命曰於戲惟爾刑部尚書彭城縣開國公劉威德第二女地胄清華志懷婉順訓彰圖史譽聞邦國式遵典禮作儷大藩是用命爾為虢王妃往欽哉其光膺徽命可不慎歟維貞觀某年月日甲子皇帝若曰於戲開府儀同三司齊國公無忌設官分職允代天工致治興邦實資台輔永覽前哲咸在得人故能成寅亮之功宏燮理之業惟爾識宇沖邈風範光昭才稱棟幹器惟瑚璉協贊皇基克隆鼎業譬彼舟楫同茲魚水任重禮闈則璣衡以穆位班職衮則風雨不愆固巳同軌前烈齊聲往彥褒德美功有國常典經邦論道僉曰爾諧是用命爾為司空往欽哉其光榮寵命可不慎歟維貞觀某年月日甲子皇帝若曰於戲昔周建五等漢班六條經邦之制既宏載祀之祚惟永是以樊侯申伯功成藩翰喬卿叔節績宣刺舉惟爾特進吏部尚書許國公高士廉識宇宏正風鑑秀激地惟姻戚才稱棟幹雲雷在運參霸圖於艱難龜鼎有歸奉王猷於獻替廊廟推重縉紳佇德總方牧之寄勝殘播美綜銓衡之職得人流詠固巳聲高多士功書太常桐柏作鎮長淮設險形勝之地允屬勳賢是用命爾為使持節申州諸軍事申州刺史改封申國公傳之子孫世為唐輔往欽哉率循典禮勉固誠節垂裕來葉以保黎庶可不慎歟維貞觀某年月日甲子皇帝使某官持節册命曰於戲列爵者必俟茂勳設官者咸資懿德所以翼贊王室宏宣帝載惟爾光祿大夫行并州大都督府長史太子左衛率曹國公李績識量恢宏風略閎遠忠以奉上信以立身獻款西歸鄘風美分麾東略虢鄭景從預艱難於藩邸參經綸而方面南定維揚北清大漠威振殊俗勳書册府及入司禁旅出帥藩鎮勞勤表於夙夜功用成於期月蘄黃之地濱帶江淮鎮捍之重允屬功烈是用命爾為使持節蘄州諸軍事蘄州刺史改封英國公任重六條地優五等為朕藩屏傳爾子孫往欽哉其祗膺朝命克固臣節勤恤黎元垂裕後世可不慎歟維貞觀某年月日甲子皇帝使某官某副使某官某持節册命曰於戲蓋宣條作牧胙土建侯共治長寄藩翰斯在惟爾左領軍大將軍檢校原州都督宿國公程知節志懷鋭穎氣幹強果業預艱難效宣行陳入司禁衛勤誠著於軒陛出鎮方隅惠化洽於黎俗疇庸有典式隆寵命是用命爾為使持節朗州諸軍事朗州刺史改封盧國公傳之子孫長是藩屏往欽哉爾其戒典謨之訓固臣子之節勤修政道以貽爾後可不慎歟維貞觀某年月日甲子皇帝若曰於戲夫經邦之道必資長策利建之義式固無窮是以周之列國祚世藩屏漢之功臣永垂帶礪惟爾兵部尚書潞國公侯君集體業貞固識量恢凱任切腹心寄深文武草昧伊始奉一匡於藩朝光華在運典九伐於禮樂入陪禁中出臨閫外贊嘉謀於樽俎掃逋寇於遐荒誠量歲寒勳勒庸器宛邱之地實惟舊鎮胙土作牧允屬朝望是用命爾為使持節陳州諸軍事陳州刺史改封陳國公傳之子孫世為唐輔往欽哉爾其克固臣節思勗王度夙夜匪懈無替典則可不慎歟維貞觀某年月日甲子皇帝若曰於戲夫計功裂土量能分職所以光贊王室康乂黎元惟爾左驍衛大將軍樊國公段志元理懷沈毅氣幹強雄蜀漢委質早效忠款潁川從我備盡心力預艱虞於藩朝陪戎征於閫外勤宣階陛功表旌旗西城之地襟帶巴蜀藩翰之重實俟勳庸是用命爾為使持節金州諸軍事金州刺史改封褒國公傳之子孫世為藩輔往欽哉爾其勉固一心勗茲六行克勤政術無數彞典可不慎歟於戲突厥部衆代居沙漠元戎才舉龍城克定三部種類十角酋渠咸襲冠帶俱為臣妾朕光宅六合亭育萬品爰降大造存其亡國既復故庭乃樹君長惟爾右武大將軍化州都督懷化郡王李思摩器量明遠識用宏通地稱貴種望高賜姓忠孝之節於朕心明智之材重於蕃落朕用是命爾為乙彌泥孰俟利苾可汗傳之子孫為唐藩屏上鑒自古下觀近代守誠節者咸保其國人為凶惡者必及於覆敗往欽哉爾其鑒茲往事祗聽朕言奉國以丹赤為先御下以信義為本勉正爾身勤恤爾衆無昵邪佞無遠忠良無恣驕奢無趨貪暴兢兢業業以綏爾疆土可不慎歟臣聞至敬無文至誠不飾地居臣子不以小忠撓志情兼家國不以細行嬰心臣蒙獎厲擢居天策戰必以死實深愍於黎庶奮不顧命願無忝於宗社規摹指麾皆稟聖算人心神誘遂得成功安敢貪天自稱己力前以聖人大寶濫鍾愚懦臣謂肅成理務禮通監撫日慎一日不敢推辭今奉茲詔更垂獎豫以四海乂安褰裳紫極歸尊軒轅天下幸甚臣自當啓誦不覺厚顏頃者陰陽尚愆嘉穀未稔政治有虧刑典不措恐眇身多罪以及萬方伏願天慈仍安太極待民知堯力玉燭順序網開湯祝金科削編然後降輦西宮於事非晚付臣宣室亦敢當仁臣志在忘私冒陳丹款
