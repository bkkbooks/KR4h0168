body:
  text: 於穆我皇受天明命與乾坤而合德配唐虞而齊盛成功斯著射中九霄之禽文教已宣道應千年之聖想彼禽矣雍雍可珍配玉帛於前禮齊山木於至人棲必擇處翔無失倫候律南徂洞庭之芳草猶碧順時北向上林之繁花已春苟應弦以啓聖同殺身以成仁爾乃雲收遠天水落上苑風蕭蕭而徑夕日杳杳而低晚於是聖人悅年豐修武功有直斯矢有弨其弓因肅殺之候遊苑囿之中彼雁于飛斜當禁掖帶輕雲之微素映遙天之晴碧雖逄蒙之絶藝莫敢措心固離婁之明眸其才能覿我弓斯張我矢斯射算分數之遠近則舍拔而應鏑質毛紛其已墜弦聲振猶未釋聞之者足蹈手舞覩之者目駭心惕彼貫心稱妙穿葉無怍一則三年而後發一則百步以為約豈如料必中於飛動騁絶伎於寥廓雁以遠而矢發矢既發而雁落異哉莫高者天戾天者飛彼摶空之逸翰尚無所違矧荒服之逆命曷不咸歸則知皇聖有作夷夏無間鄙楚莊之戲猿笑晉平之失鷃固將威九土肱而清八荒豈直落翔雲之一雁日為炎精君實陽德明至乃照臨下土德盛則光被四國天垂象聖作則候春分之節時則罔愆順周官之儀事乃不忒於是載青旗儼翠華蓋留殘月旗拂朝霞咸濟濟以皇皇備禮容於邦家天子躬整服以待曙心既誠而望賒倏而罷嚴更闢禁城五輅齊駕八鸞啓行風出郊而草偃澤先路而塵清卷餘靄於林薄動神光於斾旌初破鏡而半掩忽成輪而上征杲耀榮光分輝於千品萬類煙熅瑞色均燭於四夷八紘一人端冕以仰拜百辟奉璋而竭誠故曰天為父日為兄和氣旁通帝德與日德俱遠清光相對帝心與日心齊明時也春事既用夾鐘律中登觀臺而瑞集覩芳甸而農衆東為陽位故出拜於國東仲居時中乃展禮於春仲既而盛禮畢陳鍚鑾回輪家有罄室巷無居人備禮服之燦燦殷游車之轔轔人望如草我澤如春惟天德與聖壽配朝日而長新伊茲禮之可持歷前代而修之漢拜庭中成煩褻之細事魏朝歲首失禮經於舊時國家欽若天命率由時令矯前王之失德修古典而施敬俾伯夷之掌禮侔軒后以作聖恭承命於春卿遂觀光而興詠桃野之右蒼茫古原草木春慘風煙晝昏攬豫轡以躊躇見立表而斯存乃漢武戾嗣勦命地也然後築臺以慰遺魂吁自古有死胡可勝論苟失理以橫斃雖千祀而猶寃當武帝之季年德不勝而耄及浮誕之士至詭怪之巫繼集忠見疑而莫售讒因隙而競入忘嗜欲之生疾意巫詛而是因將搜蠱以滌災縱庸瑣之姦臣言何微而莫讐寃雖毒而奚伸搆儲后以掛殃矧具寮與齊人旋激怒而誅充竟奔湖而滅身異哉漢后因姦邪之是誘俾冡嗣而罹咎彼傷魂之冥冥故築臺其何有嗟爾戾嗣盍入明以見志遽興戈而自棄諒君父之是叛雖竄身其焉置嗚呼一失其理孝慈兩墜不其傷哉夫邪不自生釁亦有託信其讒興利則妖作恣鬼神之愆變實人事之紛錯故子不語於怪亂道亦貴乎淡泊蓋為此也水滔滔而不歸日杳杳而西馳時徑往兮莫追人共盡兮臺隳榛焉莽焉俾永代而傷悲月配陽含虛而明湖止水體柔而平光無不臨故麗天並耀清可以鑒因取鏡表名月包陰以成象水稟月而為精兩氣相合實不入而疑入二美交映伊本清而又清色皎潔而秋天愈靜波演漾而宵風乍輕類泗濱之磬見疑合浦之珠明至明洞幽至清無垢同元澤無遠不遍等達人以虛而受滿不可恃望之足戒以虧盈形或未分鑒之則辨其妍醜輕靄不起纎塵莫過沉璧彩而為鏡碎金輝以成波皓質未判空聞田鶴之唳香風乍度暗傳蓮女之歌萬象皆總湛清光而不動極望靡窮凝虛皓而如空照同心千里之外洞游鱗百丈之中櫂影乍浮如上天邊之漢桂華不定多因蘋末之風白晝誠窮殘夜將短臨遠峯而欲落沉餘景而猶滿月之德也朗而迥水之性也柔而靜照有餘暉光無匿影滿而將缺顧兔自殊於太陽導之則流無禽豈同於舊井原夫德無不應理必相符湖以柔而藏月月因朗而彰湖不私其明明則有裕無逆於物物乃不孤異投珠而按劍等藏冰而耀壺惟水月之叶美與君子而同塗樂自上古兮和洽是聞日至南極兮陰陽肇分名太和而順氣取初陽而配君則知天授聖而正歷聖應天而放勳惟至也去陰就陽惟樂也偃武修文八佾初陳雜鸞鳳而容裔九奏既畢降佳氣之氤氳爾其順元辰體乾德赫容衛之森肅儼宸位之恭默班禮樂于千品陳贄幣於萬國濟濟皇皇威容孔彰望北辰以列位指南山而獻觴慶雲協符榮觀臺之加麗太陽臨照熅魏闕而增光於是太常導干羽而前曰八音自設千古靡隔所以賞諸侯之功暢聖君之澤失其度則惉滯寢興適其儀則上下咸格清淨順氣而不擾和樂自心而來宅可以導情欲可以滌煩劇既而筍簴齊列笙竽互傳偕肅肅而合雅亦啾啾而同元備以四夷識四海之無外成於九土知九德之咸宣崇易簡豈同於濮水務德化寧比於鈞天既損之而又損蓋斯焉而取焉故所以移風易俗發號施令周天地而不流匝寰宇而無競斥鄭衛而不御暢柔和而全正㣥黎足蹈而手舞百僚儀肅而心敬則知一人作則萬邦維憲來遠人以干舞播聲頌而吹萬則鄭之細晉之思不可以勸湯之放武之伐而猶有怨豈比我照二儀形九有舒太和之至德居盛陽之元首咸有典而有則固可大而可久明明我后於斯萬壽春發生以煦物臺居高而處明俯而望焉舒郁郁之和氣登可樂也暢怡怡之遠情觸類斯感衆芳俱榮風出谷以天霽雲歸山而景晴俯視平皋傍臨遠嶠窮漢苑以周覽匝秦城而回眺林巒彩翠浮佳氣於遙天宮觀參差麗飛甍於夕照望莫若兮望遠感何深兮感春登其臺則歷階而至極應乎律故陰慘而陽伸令行斯順澤布惟均視雖微而必審思何遠而不親懿夫情之誘人人罔或舍時之感物物莫能假臺有春而必望春何情而不寫條風始至散灼灼之紅桃穀雨初收潤萋萋之緑野天何言哉生衆彙人有靈兮感元氣既望春而可樂亦升高而足貴賞同沂水聊舞雩以詠歌登異觀臺寧覩蠟而增欷周望既極含情則多媚遲日之未下愛清風之屢過目以心遠野悠悠而氣和可以樂芳時之景物壯皇室之山河豈比夫羈士登樓而作賦碩人在軸而為歌者哉春無物而不滋臺無遠而不覽豈老氏之或論伊潘生之所感稽其趣時之規遠創意之義深春非臺而何樂臺非春而罔尋故望春者惟臺是履登臺者惟春是臨繄在物之可用必從時之所任儻自下而可託庶升高而至今深不測者道大無疆者空空非羽而何適道匪人兮孰通通於道者是謂君子適於空者莫如漸鴻故聖人託象以明義務勤以飭躬將自邇而圖遠必因卑而致崇始其素卵新化青春戲融一之日乳哺衡陽之曲二之日翺翔彭蠡之中且爰居以樂水亦從正而養蒙毳毛其成洞庭之芳草初緑弱羽云就武陵之繁華已紅而見其進未知其終美夫姿淑偉麗飛鳴有檢動靡求棲遊皆遠險思奮志於寥廓且藻容於菱芡升不越次先冒履木之危進而得中孚及于磐之漸漸如何其往有攸措方去渚而戾止俄躋陵而遐顧風水遙輔於羽毛烟雲未通於道路嗈嗈相召驚月夜而亂趨肅肅連行拂天池而徑度信梁燕之莫儔豈谷鶯之足慕亦猶九層起於纍土千里始於投迹琢玉者日就其功為學者月將其益皆自微以成著固何求而不適異夫出陸摶空驤首矯翮順寒暑以攸往亘山川而罔隔以言乎鳥也尚不忘進以言乎人也如何勿思思者所以志道進者所以修辭誠既往而莫返冀將來而可追蒙亦有望於斯漸敢不肅然而勉之門下致理興化必在推誠忘已濟人不吝改過朕嗣守丕構君臨萬方失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有復於將來明徵厥初以示天下惟我烈祖邁德庇人致俗化於和平拯生靈於塗炭重熙積慶垂二百年伊爾卿尹庶官洎億兆之衆代受亭育以迄于今功存于人澤垂于後肆豫小子獲纘鴻業懼德不嗣罔敢怠荒然以長于深宮之中暗于經國之務積習易溺居安忘危不知稼穡之艱難不察征戍之勞苦澤靡下究情不上通事既壅隔人懷疑阻猶昧省已遂用興戎徵師四方轉餉千里賦車籍馬遠近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不解甲胄祀奠乏主室家靡依生死流離怨氣凝結力役不息田萊多荒暴命峻於誅求疲氓空於杼軸轉死溝壑離去鄉閭邑里邱墟人煙斷絶天譴於上而朕不悟人怨於下而朕不知馴致亂階變興都邑賊臣乘釁肆逆滔天曾莫愧畏敢行凌逼萬品失序九廟震驚上辱於祖宗下負于黎庶痛心靦貌罪實在豫永言愧悼若墜深谷賴天地降佑神人叶謀將相竭誠爪牙宣力屏逐大盜載張皇維將宏永圖必布新令朕晨興夕惕惟念前非乃者公卿百寮纍抗章疏猥以徽號加于朕躬固辭不獲俯遂輿議昨因內省良用矍然體陰陽不測之謂神與天地合德之謂聖顧惟淺昧非所宜當文者所以成化武者所以定亂今化之不被亂是用興豈可更徇㣥情苟膺虛美重余不德祇益懷慙自今以後中外所上書奏不得更稱聖神文武之號夫人情不常繫于時化大道既隱亂獄滋豐朕既不能宏德導人又不能一法齊衆苟設密網以羅非辜為之父母實增愧悼今上元統歷獻歲發生宜革紀年之號式敷在宥之澤與人更始以答天休可大赦天下改建中五年為興元元年自正月一日昧爽以前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之李希烈田悅王武俊李納等有以忠勞任膺將相有以勳舊繼守藩維朕撫馭乖方信誠靡著致令疑懼不自保安兵興纍年海內騷擾皆由上失其道下罹其災朕實不君人則何罪屈已宏物豫何愛焉庶懷引慝之誠以洽好生之德其李希烈田悅王武俊李納及所管將士官吏等一切並與洗滌各復爵位待之如初仍即遣使分道宣諭朱滔雖與賊泚連坐路遠未必同謀朕方推以至誠務欲宏貸如能效順亦與維新其河南河北諸軍兵馬並宜各於本道自固封疆勿相侵軼朱泚大為不道棄義蔑恩反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其應被朱泚脅從將士官吏百姓及諸色人等有遭其扇誘有迫以凶威苟能自新理可矜宥但官軍未到京城以前能去逆效順及散歸本軍本道者並從赦例原免一切不問天下左降官即與量移近處已量移者更與量移流人配隸及藩鎮效力并緣罪犯與諸使驅使官兼別敕諸州縣安置及得罪人家口未得歸者一切放還應先有痕纍禁錮及反逆緣坐承前恩赦所不該者並宜洗雪亡官失爵放歸勿齒者量加收敘未復資者更與進敘人之行業或未必兼構大厦者方集於㣥材建奇功者不限於常檢苟在適用則無棄人況黜免之徒沉鬱既久朝過夕改仁何遠哉流移降黜亡官失爵配隸人等有材能著聞者特加録用勿拘常例諸軍使諸道赴奉天及進收京城將士等或百戰摧敵或萬里勤王扞固全城驅除大憝濟危難者其節著復社稷者其業崇我圖爾功特加彞典錫名疇賦永永無窮宜並賜名奉天定難功臣身有過犯遞減罪三等子孫有過犯遞減罪二等當戶應有差科使役一切蠲免其功臣已後雖衰老疾患不任軍旅當分糧賜並宜全給身死之後十年內仍回給家口其有食實封者子孫相繼代代無絶其餘敘録及功賞條件待收京日並準去年十月十七日十一月十四日敕處分諸道諸軍將士等久勤扞禦纍著功勳方鎮克寧惟爾之力其應在行營者並超三資與官仍賜勳五轉不離鎮者依資與官賜勳三轉其纍加勳爵仍許回授周親內外文武官三品已上賜爵一級四品已下各加一階仍並賜勳兩轉見危致命先哲攸貴掩骼薶胔禮典所先雖效用而或殊在惻隱而何間諸道兵士有死王事者各委所在州縣給遞送歸本管官為葬祭其有因戰陳殺戮及擒獲伏辜暴骨原野者亦委所在逐近便收葬應緣流貶及犯罪未葬者並許其家各據本官品以禮收葬自頃軍旅所給賦役繁興吏因為姦人不堪命咨嗟怨苦道路無聊汔可小康與之休息其墊陌及稅間架竹木茶漆榷鐵等諸色名目悉宜停罷京畿之內屬此寇戎攻劫焚燒靡有寧室王師仰給人以重勞特宜減放今年夏稅之半朕以凶醜犯闕遽用于征爰度近郊息駕茲邑軍儲克辦師旅攸寧式當裦旌以志吾過其奉天宜升為赤縣百姓並給復五年尚德者教化之所先求賢者邦家之大本永言茲道夢想勞懷而澆薄之風趨競不息幽棲之士寂寞無聞蓋誠所未孚故求之不至天下有隱居行義才德高遠晦跡邱園不求聞達者委所在長吏具姓名聞奏當備禮邀致諸色人中有賢良方正能直言極諫及博通墳典達於教化并洞識韜鈐堪任將帥者委常參官及所在長吏聞薦天下孤老魚衆寡惸獨不能自活者並委州縣長吏量事優恤其有年九十已上者刺史縣令就門存問義夫節婦孝子順孫旌表門閭終身勿事大兵之後內外耗竭貶食省用宜自朕躬當節乘輿之服御絶宮室之華飾率已師儉為天下先諸道貢獻自非供宗廟軍國之用一切並停應內外官有冗員及百司有不急之費委中書門下即商量條件停減聞奏布澤行賞仰惟舊章今以餘孽未平帑藏空竭有乖慶賜深愧于懷赦書有所未該者委所司類例條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里布告遐邇咸使聞知門下致理之體先德後刑禮義興行故人知格教令明當則俗致和平然後姦慝不萌暴亂不作古先哲后莫不由斯國家受命百七十載八聖儲慶敷佑下人邁種寬大之德纍蠲苛酷之令蓋仁之所積者厚故澤之所流者深茲豫小子獲主重器懵於理亂之本溺於因習之安授任不明賞罰乖當立法以齊衆而犯命愈甚興戎以除害而長亂益繁賊臣蓄姦乘釁竊發九廟乏主兆人靡依猰㺄肆其吞噬豺狼穴於宮闕歲未云半載罹播遷仰慚穹昊俯愧臣庶敢愛霣越苟全眇躬誠懼益縱寇讎重辱宗社忍恥誓志庶補前羞賴億兆宅心不忘先德諸帥勠力恭行天罰俾余寡昧再膺多祐總乾綱於既紊復天柱於將傾言旋鎬京不改舊物宗祧有序朝享有期責重慶多深增感惕嗚呼君者所以撫人也君苟失位人將安仰朕既不德致寇興禍使生靈無告受制凶威苟全性命急何能擇或虧廢名節或貪冒貨利陷於法網事匪一端究其所由自我而致不能撫人以道乃欲繩之以刑豈所謂恤人罪已之誠含垢布和之義滌清汚俗咸與更新可大赦天下自興元元年七月二十三日昧爽已前大辟罪已下已發覺未發覺已結正未結正見繫囚徒常赦所不原者咸赦除之今年五月二十八日已前左降官即與量移未復資者更與移近處流人及犯配隸藩鎮效力並即放還亡官失爵放歸不齒者量加收敘已經收敘未復資者更與進改其黜免人等有素著行能旁遭譴纍特加録用勿以為負不有忠者誰復社稷不有勞者誰從巡狩連帥之重所以殿邦禦侮也二千石之任所以分憂共理也方鎮將校勤奉戍役中外寮吏恪居官次國有大慶所宜同之內外文武及致仕官三品已上賜爵一級四品已下加一階仍並賜勳兩轉司徒兼中書令晟英特傑立光輔中興再定皇都一匡天下推恩之典貽慶無窮宜與一子五品正員京官侍中瑊沉邃忠厚服勞王家保全危城翦除大憝嘉乃茂績次于寵章宜與一子六品正員京官鎮國軍潼關節度使檢校右僕射駱元光京畿渭南商州節度使檢校右僕射尚可孤邠寧等州節度使檢校右僕射韓遊王褱奉天行營諸軍節度使檢校右僕射戴休顏咸秉大節著于艱難同勳叶忠翼我興運宜各與一子七品正員官諸道節度使及行營都知兵馬使興元扈從左右金吾大將軍等各與一子八品正員官諸道團練觀察處置等使各與一子九品正員官應諸軍赴上都收復將士等俱以純誠奮其勇節連年帶甲百戰摧鋒有忘身以效命有滅親以徇義誓平國難如復私讎競揚貔虎之雄克清梟獍之孽策勳行賞傳嗣榮親播乃功名與國終始自去冬已來未經甄敘者即與超八資改轉已經甄敘者更與超三資進改三品已上祖父母在先無官封者量與致仕官及邑號亡者並與追贈四品已下父母在先無官封者亦授致仕官及邑號亡者並與追贈其賞錢委所司即依元敕支給應扈從將士三品已上賜爵兩級四品已下各加兩階仍並賜勳三轉其祖父母父母封贈並準收京城例處分應扈從官普恩之外三品已上更加爵一級四品已下更加一階若常參官祖父母父母在先無官封者量授致仕官及邑號亡者並與追贈諸州刺史普恩之外賜爵一級諸道進奏陪位者更加一階其奉天定難及元從功臣宜令本軍本使即定名聞奏所司各準元敕優賞其諸道軍鎮及行營將士三品已上賜爵一級四品以下加一階仍準今年正月一日制速與甄敘成德淄青魏博等節度并諸軍應歸順將士等各蘊誠義積著功勞由朕失於撫綏頃歲暫懷疑阻尋能勵節不替舊勳是資宴犒俾洽王澤宜委所司即約額支計各賜錢物賞設仍委本道節度準前後敕速條疏甄敘其朔方并諸軍應在河中管內及同州將士等自遠赴難解其重圍念茲功勞並未酬報雖遭脅制情有可矜應到行營未經甄敘者並準元敕超五資改轉其賞錢比收京城將士例各給一半委本軍兵馬使條録名銜聞奏所司支計給付其食實封者亦便配額令其請受應天下諸道諸軍將士等如有年老及疾患尫弱不任軍旅願歸鄉里者並給終身優復州縣切加安存勿令侵擾如無家可歸者量給田宅使得存濟見危致命先典所尚況忠衛社稷殺身成功朕於斯人義有加等贈太尉秀實天授貞烈沮茲姦邪蒼黃之中獨蘊雄斷將紓國難詭收寇兵凶謀既虧吾事果濟忠誠奮發手擊渠魁英風凜然振邁千古宜即差官致祭并旌表門閭府縣護其喪事緣葬所要一切官供仍於墓所官為立碑以揚徽烈其所賜實封五百戶嫡子正員三品官諸子授正員五品官委中書門下即準元敕處分應諸道諸軍將士有身死王事者委本道本使具名銜聞奏即與裦贈仍以在身官爵授其子孫內外文武官及諸親諸色人等有橫遭逆賊殺害者各聽其家人親識人於所司陳牒勘實聞奏亦與追贈如跡著忠烈衆所明知仍訪其子孫量加優恤尚齒養老王風之首三代制理未或遺年朕將遵古典以興化本人心而教孝用優秩賜式慰里閭京兆府耆壽年八十已上並與版授刺史仍賜紫八十已下及諸州府耆壽年八十已上並與版授本縣令仍賜緋天下侍老耆壽亦各與版授官如年九十已上者州縣長吏歲時躬親省問貧弱不能自存者量賜粟帛頃屬多難人流俗弊加之以師旅因之以饑饉賦役繁起農桑失時哀我疸人汔可小息然以國計猶歉軍實靡充未盡復除良增愧悼應天下建中四年年終已前所有諸色逋缺在百姓復內者一切放免百司及諸軍諸使舉放利錢今年六月已前百姓缺負未納者亦並停徵京兆府百姓普恩之外給復一年其供頓官吏委京兆尹類例具名銜聞奏量與優獎古者計戶以署吏因時而建職既不乏事亦無冗員今田畝汙萊版圖凋耗齊人編戶託庇官曹貪吏猾胥誘為囊士冖䂞啓奸隳業為害尤深應在京百司色役人及流外等委御史大夫即與諸司使長官審詳商議據見所掌事之間劇定額聞奏仍校名送中書門下務從減省副朕憂人以後應須署置並定名先奏仍永為常式今年正月一日赦書節目有所未行者所司並舉而行之赦書或有不該即比類條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里布告遐邇咸使聞知
