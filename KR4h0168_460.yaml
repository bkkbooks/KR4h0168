front:
  text: 全唐文欽定全唐文卷四百六十贄字敬輿蘇州嘉興人大歷八年進士中博學宏詞科又以書判拔萃補渭南尉遷監察御史德宗立召為翰林學士從駕幸奉天轉考功郎中從幸梁州轉諫議大夫還京轉中書舍人貞元七年拜兵部侍郎八年為中書侍郎同門下平章事十年罷知政事除太子賓客十一年貶忠州別駕順宗立徵還未至卒年五十二贈兵部尚書諡曰宣
