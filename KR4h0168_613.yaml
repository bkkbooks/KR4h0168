front:
  text: 全唐文欽定全唐文卷六百十三少儀憲宗朝官國子司業大理卿
  hash: sha256:ae653cfe132dd58d77878748974c10deb3d9992568c1ca1e00c6c3a50b10ae05
  markers:
  - {type: head, offset: 13, content: 武少儀, id: KR4h0168_NFKB_613-h1, level: 1}
body:
  text: 羽族紛紛彼飛隼兮獨徑捷而莫㣥心耿介以騰踊毳斑斕而被文擊每依於素節翔亦致於青雲匪全身以自愛寧有齒而見焚貫矢落庭既垂名於孔宣父搏鳩陷網又伏罪於信陵君今也何時輕乎所履伊廣甸不遊乃高墉爰止信非位乎是蹈宜賈害而鬻死吾嘗問術於列禦寇學藝於熊渠子爾或舍諸吾斯過矣我矢惟良我弓未藏度中而發於何不臧矧專精而致用奚得失之難量哉於是正色斂容凝心定志睨目引滿注矢神萃驚弦駭括將辟易以翻飛裂臆洞胸已披離而迸墜觀彼隼之貽戚諒吾人之會意故君子周而不比用則擇地無苟進以躡高位無躁求以享厚利智昧於是安往而免夫顛躓然則懷貪怙力者怨所聚材小任崇者覆可待故聖人明彖象以立言懸日月而不改或有人兮修其詞遇其時三覆射隼之兆載質射隼之期幸寸長而罔貴冀一聞而在斯徐先生相馬不相色不相力相其德奧乎不可測何以徵之鬣青絲兮風生眼黃金兮電光蹄盤攤而散花毛翕赩而成章衆人觀之已駢於路傍不啻於堵牆一曰為龍一曰為鹿中間何敢乎比方先生則異於是忘筌於毛質之外引鏡於肺腑之裏見其心兮如思勿思見其目兮如視非視虛舟為動喬木為止合大道而自然喪一齊至人而何處有似若此者足不以遵地影不以逐形騰六合噴四溟截飛鳥遺流星日車為之不轉風馭為之中停二師為之罷貢伯樂為之焚經卓然擅天下名宜乎不爾直中繩曲中鈎徘徊閶闔之遊圓中規方中矩蜿蟺交衢之舞亦以其次噫徐公不至駑駘共皂於騏驥徐公一來騏驥出㣥於駑駘由此觀之世上賢才用則虎否則鼠何以異哉小人也內顧無國馬之賢遇君有徐公之術早已蒙於一顧至今長鳴猶未騁於千里更思翦拂超然自得恍然自失儻受恩兮果如前則平生之願畢矣琅琊王易簡今之獨行士也雖承冠冕之緒不踐名利之途怡心曠淡篤志廉直精識雅鑒洞元鏡微司徒相國好山水之遊深吏隱之興啓沃多暇不孤勝賞遇良辰麗景必載酒攜賓將陶性情屢造郊野每車馬鹿君至簪裾蒲席布褐之客唯王生焉得賢而親亦可知矣岐公有林園亭沼在國南朱陂之陽地名樊川鄉接杜曲卻倚峻阜舊多細泉縈樹石而散流瀝沙壤而潛耗注未成瀑浮不勝杯王生睨之歎而言曰天造斯境人有遺功若能疏鑿控會始可見其佳矣公乃命僮使具畚鍤稽度力用而請王生主之生於是周相地形幽尋水脈目指頤諭浚微導壅穿或數仞通如一源竇巖腹渠惣引涓溜集於澄潭始旁決以淙瀉復涌流而環曲觴斚徐泛自符洛汭之飲管絃乍舉若試舒姑之泉映碧甃而夏寒間蒼苔而石淨懿夫曩滴瀝以珠墮今潺湲而練垂又何以助清瀾於荷池滋雜芳於藥囿不易舊所別成新趣岐公乘閒留玩畢景忘疲優游宴適更異他日矣王生之靈襟巧思不其至歟在昔神龍景龍之間故人中書令韋公嗣立有別業在驪山之下雲松泉石奇勝幽絶中宗皇帝嘗親幸焉既而第從臣之篇詠為國朝之盛美因詔改其谷名幽棲谷賜韋公號逍遙公渥恩稠謺時罕為比上之愛女安樂公主恃寵驕恣求無不得遂奏請買韋公此莊以為遊觀之地上不許之曰大臣所置宜傳子孫不可奪也公主竟慙而止信足以輝煥史筆作程將來况茲池臺林圃密邇舊廬所居之別館也貽厥百代保之無窮猗彼瀑泉亦與慶流而不竭矣少儀忝公門客竊跡翰苑謬當授簡俾紀王生之能事因獲略而敘焉其餘則已具奉常權公之記述故不復重列云高平古泫氏邑也其沿代改名圖經詳矣初相地而居之蓋以土厚水深為善農鑿井而飲者則以穿壤剖石為艱故千家之中數井而已綆以遠引而多絶瓶以難升而驟羸則雖有端賜之機智無施其巧捷雖有管寧之仁惠無杜其忿鬬况牛馬俟乎滿腹必遵乎十里之河而瓜蔬期乎給口常望一旬之雨朝夕勞苦歲時饑饉可勝道哉嘻凡為前敝滋久終俟後賢乃革不然豈子男百輩而莫之是恤貞元七年潞州屯留令平原明濟受連帥相國大司空義陽王李公之命假領茲邑撫桉疲黎其清勤簡惠不異於屯留之政政可知也下車之日咨訪故老問人疾病僉曰公之至也俗詠其蘇矣惟水之歉詎敢求救於公耶明侯聞之若疚於心且形於色曰夫窮必有泰固常理也此豈無望前或未思吾將退而慮之由是發智周之妙躬循郊原目究川谷度高下之勢相引決之宜有丹水者始自縣之西北山源高而派平可議壅以導明侯載審厥事將利於人乃下謀於鄉耋次白於郡守上言於節制才獲所請爰臧其功乘井稅之暇候農桑之隙先儲乎薪芻之物次具乎鍬鍤之器然後量功命日使里人樂助競子來而展力故不更數宛其有成始瀦流而為潭因疏渠以繞郭築防以補其陷隟刳木以道其險阻脈分枝散貫邑周閭瀰瀰苔草之間陰陰槐柳之下遂使家開沼沚戶植芰荷濫觴可以寄傲垂釣可以烹鮮豈直豐畦圃之沃灌恣閭閈之飲濯路有奉漿之義井為應汲之泉人無荷擔之勞畜無奔走之困而已也復於潭側特建水祠列樹敞亭別成佳境將俾水依神而永久人賴水而無極庶功用不再且祈報有歸焉明侯覩夫衆情之欣洽足以閒居而賞玩化舄之餘閲王鳧之雙飛臨堂之際調宓琴而合響不其美爾君子曰政無大小以勤民為良事無工拙以利物為貴如明侯者實兼而有之其由我大司空義陽王以至公且明推獎而致此者矣子偶以行役經過於斯耳聆嘉謠目覽異績緇黃耆艾因請豫以記事豫誠忝跡於文者姑具述義陽王之德舉明侯之善亦何辭焉是則勉而志之貞元癸酉建士諤泰山人貞元元年進士元和初官監察御史擢戶部郎中出為資州刺史伏以某日誥命爰以令辰太上皇后光膺典冊盛化既行中外同慶臣某中賀皇太后母德降祥坤儀垂訓堯門誕聖時逢寶歷之興彤管紀言道光內輔之業九族承序萬國乂安伏惟皇帝展禮南宮奉觴北極榮超簡冊慶浹寰區凡在生靈孰不傾戴臣以遠守藩鎮不獲抃舞闕廷臣某言今月日吏部符下奉恩制加臣銀青光祿大夫朝命遠臨殊私曲被喜躍無措惶懼惟深臣某中謝臣謬忝方隅實淹歲序幸逢昌運得備職官昨者纍狀封章輒有陳乞敢希獎進虛荷恩榮而陛下不思天功為臣已力詔曰二千石便安吾人理有異等則就行賞典不繫年序夫人神休泰自感陶鈞封域乂安是恭理化雖云六稔無裨三載之文况當退思乃叨進秩之典濫憑微績陟在綸言超踐清階猥登明勸榮深載造光被生華匪臣孱愚所宜忝竊惟奉宣時令敬尊農祥保率土之康寧贊遠黎之生植而邱山施重螻蟻效輕上報無階稽首知懼無任感戴屏營之至臣某言臣以菲才親奉昌運受藩隅之重任效犬馬之微誠惟君知臣特受恩獎夙興夜惕榮懼積中臣某中謝伏以租稅之殷江鄉為重閭井之化水旱是虞臣職在分憂期於富庶宣陛下雨露之惠令獲小康守朝廷刑賞之規敢思中立條賦斂以辦集除疾苦而均安閉閣齊心仰思元造竊以聖慈廣被每念遐方臣忝守官合具聞達越部凡七郡三十有八邑提封所加旁合溟海由是崇元侯之命建東征之府其鎮曰會稽山其神為永興公國朝接周漢之統元化大備禮茲百神受職祀典錫以嘉號視為諸侯貞元九年夏四月連率安定皇甫公以前月丁酉詔旨奉元玉制幣禱於靈壇勤報功之享循每歲之法致齊野次虔捧祝冊夜漏未盡禮成三獻君子謂公能宣命以展敬故祀神而降祉克靖甌越大康東南我修德刑以牧黔首神作雷雨用登有年明訓式敷幽贊斯效觀夫高麓回抱以蔽景大澤下浸而蒸雲沈潛龍虎之姿泱漭風霆之氣靈衛交㦸閟宮洞門神其在焉寵被侯服是宜札瘥不生水旱罔沴允答宸慮長於衆山乃銘石壖垣以代彞器其辭曰天秩喬嶽奠茲南方精合晦明化備柔剛帝念下土延神致祥清廟既闢華蟲有光乃卜元辰爰詔方伯爾克精享神其昭格蘋薦惟誠金奏匪樂時臻太和人受景福元德孔鑒虔恭肅祗陳信不匱形乎正辭有唐左拾遺贈使持節舒州諸軍事舒州刺史扶風竇公洎夫人汝南袁氏繼室贈臨汝太君闕一字元和二年秋八月十七日闕一字啓殯自丹陽郡覆釜山克葬於河南之偃師北原闕一字慶大名凜然闕二十一字御史中丞闕五字東階之闕一字以先大夫之家傳闕二字於闕一字府闕一字敢揚其不朽闕十四字居闕一字陵代績闕三字於漢闕一字號多元侯上將亦闕一字後宮賢家河西郡公闕二字代祖紹左武衛大將軍改封茌平公高祖善衡承慶闕一字郡守曾祖元闕一字亠兊州任城令闕二字茌平烈考允同昌郡司馬建節拖紳偃風蠻俗闕一字列子男闕四字督闕一字之闕七字歲以文闕二字方秉筆待問闕一字王賢士大夫傾闕一字慰闕一字俄而天寶後元闕二十六字陵縣闕一字陌尉帶本官充租庸從事代州刺史闕一字抗時闕二字良將闕六字及移鎮闕一字州辟都闕一字州封闕一字詔闕八字下闕縣闕三字書之闕二字府闕二字賢俊闕一字與公善重闕一字方伯闕一字下闕三字藩魏之節使闕一字觀感者獻聞詔闕六字下闕二字取每歸厚於公時闕一字難既夷闕十字下闕二字於是徵拜左拾遺內供奉闕三字紳議矣闕二字下闕一字而嘉謀泉闕一字振鐸而雅什風行雍容內廷方俟闕九字陵朝來釋氏世病於權臣由是與二三諫官闕一字移闕二字於京闕六字文集七卷闕一字於代嗚呼道闕一字前席闕一字傳下闕夫人有子曰常殿中侍闕二字內供奉賜緋魚袋湖南都團練判官次曰牟下闕繼室闕一字臨汝太君有子曰㣥御史中丞賜紫金魚袋次曰庠殿中侍御史內供奉鎮海下闕征闕二字彼門闕二字為鄉闕四字人皆中書令南陽王闕二字之孫給事中下闕女弟孝下闕休闕三字族德宗皇帝闕四字克念遺賢中丞以闕一字器臥闕一字之姿遇闕三字下闕五字室室既闕二字見一拜右拾遺遂登闕二字祿驟升侍御史簡自上心闕一字遷膳部闕六字州刺史闕四字御史中丞闕五字使真拜吏部郎中闕一字執邦憲其間當先朝闕二字今上嗣位國有大慶家延寵光推恩闕一字天明闕三字第闕十三字其作闕一字於闕三字在君子謂闕二字立身慎忠追遠四者盡在於中憲乎銘曰猗歟君侯宣力諫臣沃心無隱直質而文賡歌柏梁闕十一字南薰闕十一字化糾謬言責其道屈伸斯人損益盡忠稱職事光運迫令嗣執憲三朝匪躬易著闕二字詩闕十一字石闕一字啓闕五字垂裕後昆觀德無窮元和三年歲次戊子十月己酉朔五日癸丑建賁毗陵人後徙宜春貞元中進士調江陰縣主簿權知無錫縣遷毗陵太守聖日呈貺至德所加布璀璨之五色被輝光於四遐纖塵乍收爛彼雲間之彩清漣既動煥乎川上之華且夫德惟純一瑞符祚九彼合璧而未方顧抱珥而何有豈若青赤以之彩錯光芒屏其氛垢星同色而莫儔露成文而曷偶至乃天衢將曙春雨新霽廓彼長空斂其纖翳煥羲車而逾媚映彤庭而轉麗同象德於金天陋再中於漢帝於時宸眷屢回聖心方契恆旰食以為慮豈浮雲之能蔽觀其往復黃道隱現非一彰有德而天下文明照無私而海內清謐馴翬對而沮色儀鳳臨而委質光浮石壁謂媧皇之補天影入詞林疑江淹之夢筆彼連珠之代王字之日雖得以載其圖牒實難以為其儔匹未若光分五色德合三無明天道以下濟與人事而同符較茲嘉祉超於邃古杲杲而五色成文郁郁而萬物咸覩祥光旁燭偏宜連畛之瓜瑞彩下臨更並建社之土於以光被四表昭彰元聖播頌聲於管絃流喜氣於歌詠矧其堯舜為理羲和奉職仰以陽精象於我德不然何以照曜六合元黃五色出於震位煥夫皇極仰其耀希煦嫗以資成傾其心比葵藿之生植儻餘光之可借庶分陰之有得立之貞元中進士惟皇動天辨方正位稽大明於北陸郊上元於南至五夜祗肅載惟列祖之誠三日罔愆用表致齊之意於是乘法駕鳴和鸞玉漏聲曉金波影殘環衛儼以星拱簪裾列而雲攢備肅肅之盛禮咸濟濟於靈壇大呂雲門既六變而斯闋嘉栗旨酒感百神而具歡矧器用陶匏藉以包茅光逾泰畤馨邁周郊朱火煬烟遠浮於華蓋元酒明水近映乎長旓懿夫宇宙氛氳晴郊景曛宗伯司禮保章辨雲榮光燭於九野佳氣覆於六軍飄飄颻颻郁郁紛紛足以昭上帝瑞吾君時謂唐時歌卿雲之五色德稱虞德詠南風之再薰是以惟聖惟壽可大可久既豐稔之足徵復災癘之何有既而旋天步回象輿大孝是展皇情未攄將欲超羲軒於上古方淳朴於太初俾時和俗阜塗謠史書土階攸則而瓊室靡居且慮乎賢哲尚屈所以敦於雲物緬乎德化未覃所以郊於國南祈動植之攸濟匪娛樂而是甘然後景福來格無疆在茲笑竹宮之求應鄙宣室之受釐是以降哀矜之詔宣惻隱之慈布政施德逮惸與嫠舉沈淪於是日庶聞之於有司遵貞元中進士新豐之路兮朝元有歸客見初陽於東嶺照層閣於南陌惟閣也憑高不傾惟日也臨下有赫既曈曚而延燭曷埃壒之能隔陽烏之翼兮若駐禁林羲和之轡兮若頓高岑蒼蒼之質才辨杲杲之光稍臨發璇題之麗色開玉戶之宿陰浮輝外融峻勢無不呈其壯引曜中朗邃宇無以閟其深於原之表揭雲之杪映朱檻以沖融凝粉垣而皛皎司晨而見異星樓之麗霄質明乃光殊日觀之生曉陽彩舒文昭然可分晞拂簷之夜霰辨出棟之朝雲類列仙降真祥光帛丿糸羃疑大君臨御瑞氣氤氳諒清旭之初起非反照之猶曛日惟至麗閣亦蓋高竦莫大之標洪纖奚比委無私之照巨細何逃是以詭狀摩天殊姿詳悉欒虯欲動謂起蟄於春光井蓮倒披若爭開於夏日的皪交映岧嶢上軼不殊南榮之明奚獨東方之出閣之峙矣於彼高岡閣之麗矣於彼朝陽據厚載於秦雍鄰皓氣於穹蒼豈比崑崙之山俟燭龍銜耀鳷鵲之觀俟金波寫光孰若列皇都之次鎮王畿之位近白日之貞明總離宮之蒼翠祥雲不散意往仙如存耀景每臨誠望幸可冀因徘徊而寓目遂含毫而寫意前王之立制也取象於明翬森然如六翮之布煥乎分五彩之輝其位也夾輔於皇極其用也咫尺於天威故歷代奉之而不替我后行之而不違若夫朝彥晨趨天仗宿設分鴛鷺而式斜儼貔貅而成列視容具瞻誠意咸竭司儀克仰之以取則對揚必候之以為節禮斯恭敬斯崇倏傳詔而初合知大君之居中俄承命而復啓見天顏之在空謂儀鳳於烟閣若飛龍於霞宮列丹楹之左右分玉扆於西東爛兮方照其朝景颯然如度其薰風光彩絢練羽儀廣殿接鈞天以成形洎億兆而咸見高其中也如捧聖日於雲霄散而行也似扇皇風於㝢縣當合朝之滿盈闢凝旒於穆清無謂其求進也所以應時而至待命而行無謂其速退也示不敢蔽人之望掩君之明既進退而有則在行止而何情且蔚其文寧以自耀布其彩非其競照象舞羽於舜階異總干於周廟輝映皇居間列綺疏來若鱗萃去如翼舒指北辰之期可久待南面不替其初故先君而出待朝而畢合儀不爽其疾徐舒布亦獲其疏密前拂瑞氣傍臨旭日永效用於君前願竭盡其微質矣惟肇祀於上元必展禮於南至至者作候故用其吉辰南則嚮明故就於陽位蓋取諸吉土以父事天降皇車以盡敬奉蒼璧以告虔至誠遂通禎祥不能以自閟幽贊不昧雲物於是乎昭宣及夫盛禮既畢大駕言旋兆人仰觀於空際太史伏奏於君前曰當此和煦靜無纖氛照曜兮天垂愛景霏微乎山出祥雲度青霄而匪徐匪疾向丹闕而乍合乍分應乎一陽之始煥乎五彩之文氤氳搖曳去來無際望之雖曰崇朝慶之知其嗣歲誰謂其有葉本乎觸石而來誰謂其無心偏舒捧日之勢豈非夫表王者之殊祉答泰壇之親祭者也天子乃命百辟詔有司載筆以茲記事祝史叶其正辭國慶可徵寧虞於水旱年豐有待先詠其京坻自躋仁壽之域肯繼春秋之時且南正上言休徵無咈肯比夫觀臺之望將為備於雲物子月之祀陰陽始交豈比夫魯史所紀候啓蟄而乃郊我禮踰舊我祥靡究望歲而知歲之穰祀天而受天之佑五雲八風之異寸眸遂占三百六旬之期一日可候不然者何以炳煥圖牒發揮草奏是知郊祀而漢武奚匹推歷而軒后懷慚照臨之明兮將日月並出覆載之廣兮與天地同參臣有覩盛儀而瞻瑞物願齊聖壽於終南扇有異體六角其尤雖嘗巧而是鬻非好奇而不求故須借聲於墨工之類假手於札家之流伊彼姥矣裨販是以鏤竹於蕺山之陽求錢於越人之市柄一條而有象形六折而難擬翳杲日規模莫成搖清風綺紈而已逸少遇諸濡翰而書兩行而露垂花散五字而龍盤鳳居絶筆以授高價是就觀之者雲集售之者輻輳騰驤乎六體之先彈壓乎九華之右既而厥價載殷厥聲載聞賈之者但慙於老婦鬻之者寧忘於右軍且手非扇之所題扇實手之所藉一自以翳飛塵一自以防朱夏何握提之見投而毫芒之忽借既盡攜之之妙亦長鬻之之價是知物不自貴惟人貴之向使松烟不染翠管不持則是扇也入晉鄽而陋賤彼老姥也同班妾之見遺又安得用六角之善獲五銖之資哉嗟乎小因大而事罔不行美加醜而用無不可故扇待書而色貴人假扇以財夥姥曰右軍惠而好我紓貞元中進士元和朝官戶部郎中處州泝浙江東南七百里連山洞溪負海踰嶠帛丿糸歷更置至隋始為處州後復號栝國朝置十道處州列在江南第居於上天寶初為縉雲郡大歷末復之刺史更置迭廢州郡沿革官則隨之大凡親人輔化任莫重焉大和五年紓自司駕員外郎奉符典州大懼不稱其職且以地險而瘠人貧而勞繭絲之稅重倍他郡故逢穰歲亦未若他郡之平年也為是邦者得不謹節而乃自封乎夫為惻隱可以安疲羸忠信可以美風俗待物以誠飲人以和可以去刑法矣是三者紓未之逮而有志焉因書之壁以自警
