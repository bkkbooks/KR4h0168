front:
  text: 全唐文欽定全唐文卷一百八十五王勃九
  hash: sha256:5828d3aa50b9eea92e33f12d18619737953c4f57f7e14dc8c3380ad466622f54
body:
  text: 若夫元機默運披睿烈於三精素鍵潛融肇神功於萬彙則有靈期肸蠁龜龍負河洛之圖帝緒氤氳賢哲舉乾坤之策雖功懸日月終植軌於寰中業靜雲雷未逃規於象外爾其譯雉林之寶偈詮鷲嶺之真圖抽紫玉於禪山朗元珠於智水不生不滅光臨妙物之津無去無來璿發乘時之契仗三明而獨運施洽平分據二諦而同歸功超邃古故能使三千法界向風知袵席之師百億天王聞道失巖廊之貴非釋迦之神化其孰能與於此乎既而正法將隱微言不嗣應身既沒遺儀間起恆星夜掩西天銜風霧之悲夢日宵成東漢肅壇場之禮由是鹿園層敞象教旁流宣妙獎於希夷範靈蹤於顯晦瑤龕寶座光華震旦之墟鳳剎霓裳斧藻閻浮之域其寺蓋梁大同中年所建地分彭蜀嶺對岷峨憑廣漢之遺墟藉犍為之舊壤西馳峭崿山連白雉之郊東赴長川江走黃牛之峽崇墉去峙之勢庭衢四會勝里九曲之分閭閻萬積危冠袨服參差軒蓋之前露渚風畦隱軫亭皋之望是惟仙境實啓香城煥若神明恍同化出紺壇煙屬疏絶閣而三休紫殿雲深徹回廊而四注重欒復棟霧緝霞張繡桷雕楣鸞伸鶴跂珍臺控景羲和獲練轡之因綺榭裁氛屏翳得停鑣之所連甍積翠交玉瑣於星衢洞戶流丹綴金鋪於月竇垂珠網露傍傾漢浦之琛列鐸吟飈上合鈞天之樂固以輪奐之美冠真宰以先鳴雕範之奇告靈基而得雋乃造彌勒下生像一座相好端足華姿朗備貞觀末年靈暉繼發房櫳匝曜疑連不夜之城戶牖皆明似出重昏之境自非理參幽贊道叶冥機宣佛鏡於無方演慈燈於已絶豈能寫丹青於實相妙色長存圖銑鋈於真容神光不昧若乃時暄福地低落照於晴暉候肅禪房汛初華於霽景千千寶樹若在雙林一一妙香仍清八味山翬傃晚跂葉嶼而相鳴野燕迎晨拂花簾而自樂松楹秀蔓曲成蘿薜之衣砌石生蓮直起芙蓉之座則有施身童子戾止巖扃忍辱仙人來儀澗戶都人野彥希梵席而投裾趙美燕姝望齋庭而繼履莫不青鳧委貫俱欣不捨之壇紫貝蒹明共化無緣之力故能使雕形畫塔象設年滋彩帙瑤箱龍編月久豈西周之道備南國之風成者乎爰有寺主等覃機色外練迹塵間浴甘露於身田集祥風於性宇栖情不二忽起初地之權援手大千猶擁彌天之具縣令等或公侯百代元貂列駟之門或文史三冬吐鳳回鸞之客銅章墨綬任切臨人鐵印黃簪功宣漸陸局牛烹而待價肆蠖屈以求伸揮鋒九仞之隅作鏡雙流之外録事柳元等丹軒紫紱家傳方面之勳驥子魚文地列膏腴之右昔承隋運屢委天書爰自皇初顓流帝禮等賨渝之奉漢類微濮之匡周咸申白馬之盟並受飛龍之託故能遺風罔墜代濟其美望重西南功宣法俗咸以為絃歌小政猶篆德而垂芳鍾鼎微榮尚銘勳而作鑒况乎神威自在方傳宰匠之功豈可棟宇常存不勒山河之贊爰託幽鄙奉揚徽猷敢宣此義而為頌曰天地定位君臣作極道在巖廊功霑寰域尚清皇盼猶歌帝力况我能仁惟神不測誕生迦室利見王城機覃有應業會無生長驅定境振旅魔營恩兼動植勢絶隨迎燕山傾仞鶴林埋景慧日西沈慈波東騁競窺靈相爭參佛影月殿分城雲龕動嶺長江舊域廣漢遺區川分潼峽塞接岷渝閭閻四會亭障威紆爰開寶地實控名都霞牆百雉雲甍四注紫闕尋煙頳樓結霧波流虹起雷奔蠖步網罩星鶉璫栖月兔靈機藻繂禪室安間雕金範玉舉翠浮丹神宮不夜虛室長寒光超有色貺出無端清露花徑飛泉業戶澗緑苔秋山蒼樹古茫茫庶類巍巍淨土鵝鷺同歸華夷共聚第一義諦寥廓法門迹離生滅思舉乾坤情迷則復道在為尊惟名與器萬古長存辨夫神州括地寰中分五嶽之圖巨壑浮天海上擢三山之秀造化之所樞紐靈仙之所窟宅故得昭灼天漢發揮雲氣牛頭山者即廣漢之名峯也圓裔幾乎數里直上逾乎百仞若乃巖泉銑石之什風煙草木之狀傾九圍而得雋環四時而競爽蒼岑隱嶙旁分玉砌之階碧洞逶迤下掬金陵之苑實㣥聖之所託也隋開皇中王秀作牧益州來窺勝地首旌嘉號仍疏淨域因危裂戶就嶺磴之成規跨險分榮借岡巒之迥勢工窮雕鏤妙出丹青飛棟神行回甍靈構又於山頂別建浮圖隋運告遷明皇首出軒疏凋昧基石止堙蕪奄興宣榭之災施及柏梁之燼鄉望等馳心妙律夙契禪居悲梵宇之摧梁痛珍臺之絶構思宏法願重緝奇功黨集且千家惟巨萬以為玉樓星峙稽閬苑之全模金闕霞飛得瀛洲之故事指香城而聳睇臨火宅而危魂參妙範於神明騁良工於宇宙飛廉按轡定樞臬於風衢羲和頓策揆鉤繩於日路雕簷畫栱龍回紫漢之間復霤重欒鳳舉丹霄之外瓊扉暮敞推明月於金鋪繡桷晨開落繁星於玉砌每至兩江春返四野晴初山川霽而風景涼林甸清而雲霧絶沙汀送暖落花與新燕爭飛城邑迎寒涼葉共初鴻競起則有都人襲賞憑紫楹而延襟野客含情俯丹櫺而極睇窮百年之後樂寫千里之長懷信可以澡雪神襟清疏視聽忘機境於紛擾置懷抱於真寂者矣且勃旅遊岷徼漂舉涪鄉年晷一窮時灰七變王陽西上方驚斂轡之心王粲南征實動登樓之思我之懷矣乃作頌曰大塊甄貝名山作紀登地龍盤干霄鳳峙風雪萬邑岡巒千里絶域天成珍臺地起揆剎元嶺圖基丹嶠層棟崢嶸重簷穴呌窱有隋紊歷重明改照事與時遷迹從原燎義均除舊事切為新如或繼者代有其人聲飛隴蜀望動州鄰爭開禪施競植靈因控險裁標循危列搆巖煙接廡風雲對霤鐸運星衢璫懸月竇紫軒霧合丹梁露透暮春疏節新秋戒序照滿暄郊氣銷寒渚樹濃鶯亂川長雁舉流涕寫懷魂馳意與偉哉靈宇壯矣全模窮高極麗遠覽長圖賞因時合筆為神驅有情君子誰為捨乎若夫考龍圖而括運撫麟筆以傷時天地閉而賢人隱周孔逝而微言絶豈非太階無象三辰鮮逌敘之因滄海為陵百川有橫流之勢况乎法身長往顧糟粕以空存化迹繁流仰舟航而遂遠雖復功推八正猶迷鶴樹之談道亞三明未覩龍宮之籍則有妙音難遇瞻雪嶺而投軀真諦希聲仰雲山而破骨優曇企景新雕白玉之龕般若尋風舊化黃金之像三千寶座迥出天宮八萬珍臺遙臨淨域非慧圖之冥感孰能臻於茲乎福慧寺者隋開皇中之所建也爾其峯巒霧列東分井絡之光樓雉雲橫西覩禺同之奧北彌豐邑里閈千甍南控平江波潮萬里擁亭皋之絶勢升林野之殊形肇開修竹之園式揆旃壇之剎法川高闢慈宮峻敞文璫寶綴環日月於重廊翠栱丹楹起虹霓於復殿真容俯映福衆爰依梵筵交燭禪房互啓山神獻果還棲承露之臺天女持香即繞飛花之閣輪輝夜滿抽紫焰於金山毫相晨臨發珠華於玉地爰有縣令柳邊河東令族大業之年來光上邑高人捧檄功為銅墨之先令宰鳴琴課稱絃歌之最眷香城而惻念披道肆而驚魂示懷延獎思宏末教乃於寺內起重閣一所乘煙置臬揆日端繩層榭三休雕簷四注奔星挂廡混珠網而同歸明月窺軒雜璿璫而共貫仍抽麗筆俯刊貞炎詞源迅委振法海之波瀾義宇宏深接禪宮之閫奧昔者陶潛彭澤罔聞仁慈之風潘嶽河陽未入菩提之域兼其美者蓋在我柳君乎俄而帝隋方否三官失龍鳳之圖皇業未昌九野被豺狼之毒雖復餐砂茹石窺劍道而回心蜂聚梟騰指銅梁而革面自非法雲西眷潛消火宅之氛慧日東來迥朗昏衢之景則安能冥資福地顯阻魔軍波清於振壑之隅燎息於炎崑之曲洎乎大鈞無事神器有歸清玉戶而帝寰中轉金輪而王天下元場佛境與天下而惟新鶯樹雞林共風雲而改旦功既成矣時既貞矣紫宸有裕蒼氓胥悅都人狎至瞻雁塔而歡心野老相趨尋鹿園而頓顙或至誠冥發爭知不盡之虛或道思旁流竟委忘緣之施乃於寺內造菩提塑像一座實彭氏絶㣥之迹洞參瑤銑體備丹青得埏範之奇模盡陶甄之能事功分實相變入冥機丹果長春青蓮不染靈儀若動似臨王舍城中神足疑行即坐菩提樹下銀牀地湧寶帳猶懸珍木天成金花不落總章元年又奉為皇帝更造八菩薩像成於淨境別峻崇堂而力寄㣥緣功難獨舉遂令衆情馳騖空懷更始之圖靈座端嚴未得安居之地時有宏演上人自丹烏下日昌帝籙於明堂青鶴乘霄降仙苗於太室軒冕將風雲交映鐘鼎與山河共遠法師夙成真諦幼挺殊姿拔五翳於長驅登四禪於回觀以為德因時建澄什繼踵於西都道冀人宏林遠隨肩於南國痛迷生之詭矯悲正覺之陵夷思欲樹真氣於未萌緒崇因於已往遍遊淨境歷騁遐方至總章二年憩於茲剎身持寶印口出神珠心動巴南化行蜀右法羅潛舉馴鳥性於慈林慧鏡旁開息猿心於定水亦有情鉤五縛遙騰解脫之川想瘞六塵迥拔沈迷之域名臣長者捐玉珮於銀庭善女靈姬落金環於寶地貪機霧滌法施泉流林衡掄梓之材班匠獻鉤繩之巧千欒電糾萬桷霞張飛陸緣甍層構架景瓊釭沓照乘紺壁而宵分珠箔重華掩青疏而曉亂紅葩植井彩綴河宮丹桂承梁香交列肆天倡梵樂肅然忉利之天藻蓋雕璫煥若摩伽之殿其精力之元感而神化之曲成乎直歲寺主等州閭盛族鶖鷺榮因升慧圃而功成踐魔庭而戰勝排四門而獨往共極㣥緣攀十地而遐征同趨覺路縣令虞洽旌旗百代劍履三朝匡帝座而南征擁台庭而北面星象垂祉川嶽載靈豫章七歲麒麟千里雄情負俗鬱王佐之宏圖英識邁時得公門之逸氣既而拂衣華族入天邑而觀光列板仙臺出靈關而作宰泉魚狎夜多單父之深恩隴翟遊春嗣中牟之善政有條不紊施緩政於繁繩斷訟有神下高鋒於錯節因以激揚大化潛滋比屋之封光啓令圖預積攀輪之慕縣丞裴休家接朱欄譽流丹闕軒裳照緒忠孝榮門鳥鳴有伐木之歌龍文非刈蓬之具高材列務盛德分司翰墨不足留神琴樽申其獨性十旬休沐奄有泉林千里邀迎乃疲風月青驪躞蹀終噴玉而懸雲素鶴徘徊且銜珠而犯露加以沈研有地題橋八解之津誘勸無方叱馭三乘之路故能使幽明仰德法俗依仁攀海祇而如歸挹衢樽而下瞰鄉望等龜靈高族驥子名家關錦室於中堂分綺疏於甲第或望雄都鄙代列歌鐘或業預雲雷門藏璽詔文場促席有江漢之英靈武觀連衡得岷峨之鋭氣並能馳心彼岸欲臨海而蹇裳投足化城下悲思而反袂下官薄遊江右旅寄城隅懷道術於百齡接風期於四海依然梵宇欣象教之將行莞爾公庭惜牛刀之遂屈雖文殊辨論妙懸解而忘言而伯喈雄管敘真宗而罔愧敢巡此義乃作頌云金堤迥色玉峽長瀾城闕紛亂江山聳盤雲屯勝邑霧啓禪壇右縈層雉左接崇巒竹園精舍檀山香閣萬栱騰虬千楣跂鶴晚星疏翠朝霞泛雘鼓奏泉流鐘鳴霜落時經失道代歷交呈神宮不撓法衆無驚金輪邃曉玉鏡施明功照佛剎化被王城帝圖冥運真儀濬發貝齒含星流毫耀月鳥離山扃龍還海闕寶樹形留天宮匠設爰有真人式宣慈主發迹江甸馳聲蜀宇望遠連規攀澄襲矩力窮興道功周廊廡㣥緣肸蠁衆福氤氳叢楹列電高棟銜雲銀龕曙撫玉座宵分瓊璣有爛藻繪多文鬱彼巖邑猗歟上宰松桂連華鴛鸞集彩禪津有裕至公無待火宅可辭舟航斯在我之飄寓邈矣來遊山川俯仰道義淹留承風郭外撰綴江幽元機勝筆天地相周粵若真元混沌抱一氣於天門象化童蒙構三靈於地戶由是金城逆順山河假成器之因玉燭沈浮風火兆流形之蘖懸大明於日月適滯泉宮設巨浸於雲雷終迷燬宅太極所以散而為兩洪飈所以吹而為萬雖復卑高異列俱沈方內之遊坌集橫流共失環中之契豈夫槃深視不背色以求真般若長驅每乘空而得靜則知一名同出陰陽為破道之墟萬象皆空天地即降魔之境莫見其俯仰不知其去就至自於太虛復歸於無物其建言立德開業成務握大柄而推造化執洪爐而詰元始西門幽闢顧非相而遲回三駕晨嚴臨有為而出頓豈不知羈孤長路終嬰旅泊之虞舟楫中流未釋風濤之苦將以宅心者寂虛室所以合符應物者神明鏡由其不倦故能商榷宇宙指麾權實演㣥生而非其力存庶品而非其有千巒閉景似居蓬艾之間雙闕臨空若在江湖之上其釋迦之沖用乎龍懷山者井絡之所交會岷隅之所控帶攢峯北走吐沓嶂於元霄巨壑南馳噴洪濤於赤岸香城寶地左右林泉碧岫丹岑往來煙雨時有法會禪師者俗姓褚氏吳郡錢塘人也金章鍚美河陰傳九命之尊玉鉉乘榮江左受三台之貴地靈人傑自朔野而重光學府文宗冠南都而獨秀法師紫星降彩紅雲受氣應積善於高門契冥於纍世果浮觴引潛圖彼岸之功聚礫延砂即揆為山之業靈樞密運闢仁路而長鳴慧刃高揮斬邪關而洞照以為冥機體化毫髮莫滯其真執數逐微乾坤不容其算於是四禪幽觀破銅堞而出無明三昧雄圖排鐵圍而泯非相法雲自在吐納龍宮賢聖不仁奔馳象域將使三千塔廟知真實之元津萬億幡幢入空虛之祕藏安心樂土遁影靈關以開皇元年憩於茲嶺靈墟福地已被神功玉榜金繩未光朝命蜀王秀以文昭建國帝子專征仗巴服之尊名裂卭荒之寶命彤騑僭帝蹕萬騎於銅梁皂蓋圖王警千乘於玉宇鏡山南望志狹彭渝錦水西浮恥朝江漢開實沈之壁壘嘯京叔之風塵擁龜堞而託殊方憑爵堂而傲天子威權所制勝兵數十州雄視所臨經塗五千里三英賦雪瞻秋月於梁臺八叟吟風傳朝雲於楚館思宏正法廣召名僧振錫雲趨乘杯霧合禪師括囊泉石韜迹煙霞攀紫桂而同塵守青蓮而向晦衝飈蕩嶽寧移忍地之靈烈火焚山不撓堅林之色王心有悟時加優禮順風拜道封山謝失發淨財於廣內揆仙室於重幽因嶂為壁憑崖列戶以開皇五年始賜額為龍懷寺地鄰帛丿糸左遂均帛丿糸上之恩山似龍盤即建龍懷之剎爾其崇巒經復復澗縈回高邱泄雲長林翳日增瓊垣於下麓揆瑤構於中巖香闕神行珍臺妙立玉虬銜靄絶遊氣而負蒼天金鳳連甍排烈風而瞰元圃延緑房於謺巘上拂霞莊蔓丹闕於重磎下披泉戶陽開陰闔變霜露於旋回蠖動螟飛起雷霆於指顧玉堂朝亘影襲長虹珠殿宵浮光含列宿禪師歿後爰有孝恭法師智開法師宏嚮法師寶積闍黎四上人者並禪師之上足而法門之領袖也五明衢路控引情宮八解源流朝宗性海其深為寶拔白玉於嶄巖無礙居真得元珠於象罔住持真界栖息妙塗俱深寂滅之源各證菩提之域雖業定人境照已極於無方而道寄生成功遂覃於有相演中乘之奧義增上棟之宏規萬栱不騫千門有閌俄而帝隋大去皇家小往天地閉而賢人隱雲雷屯而巨寶衰毒龍橫霧四天沈暗逆之悲醉象驅風三界溺崩離之酷上人慧機幽晤定識潛融知佛日之恆明審王風之尚靜芝歌商嶽揆雞嶺而同歸茅藉磻溪與猴江而共致遁俗無悶因時有待洎丹陵啓秩赤縣居尊迦維授手波旬革面十千天子新朝帝釋之宮八萬仙人始向毗耶之國一音演而荒景服三聖澄而禮樂備由是巴方舊彥蜀城遺老仰慈門而知戶牖升福田而喜耕鑿雕鞍繡轄瞻燕崿而馳魂黼帶綖裾指鸚林而鶩款寶瓶宵注潤浹堯旬玉塵晨麾風調舜歷咸以為假沈其性迷生安視聽之功動亂其心窮子失肌膚之戀江連巫峽始絆心猿山對禺同終維意馬貞觀年中積闍黎等乃宣昭遺址發揮精舍容成校歷揆日用於天經隸首陳章算神功於地籙回廊穴呌窱自吐風飈列榭崢嶸坐含雲雨圖竭宮之妙質儼盧舍之真容寶珠周映銀龕備色逸多垂足似臨兜率之天師利分身若赴維摩之境靈仙可接藻繪無施真應難徵雕鐫有寄若乃巡積岨歷森沈天花照而高月落地籟驚而幽泉湧紫蘭花徑香侵柏葉之爐緑草文茵影入芙蓉之座真童鳳策即踐金沙仙女鸞衣還窺石鏡巖莊轉梵杳冥松桂之墟澗戶栖橰寂寞藤蘿之院法鼓奏而寒山曠洪鐘鳴而曉壑靜頳苔翠蘚具不盡之靈衣石乳瓊漿入無生之妙饌肅肅焉遙遙焉信調御之珠庭而列真之甲第也爰有上座元鑒法師等並六塵無我四諦非他奉乾越之微言守楞伽之奧府法雷潛吼鼓動風煙慧日揚明照臨邱壑青溪坐定見心宅之恆靈丹洞行忘覺身城之每化須彌不動迥鎮閻浮闍崛安居下觀忍利開四生之廣路敘六趣之彞倫足以導揚真績恭宣來命者矣縣令柳公諱明獻字太初河東人也太元降氣中黃授彩襲周魯之榮基吐河汾之靈液四科高第振風翮於三冬萬室崇班局雲驂於百里既而政成黎頌道洽氓謳假無上之幽筌毗不言之景化絃歌在韻將寶偈而齊歸銅墨成章與梵天而共貫瓊波湛淡沃蕩雲雷珠灌蕭條蔽虧煙雨貞機罕應良談放好事之遊朗調多奇高賞盡名山之曲下走東皋事失南州塗窮歎孔席之栖遑笑陽歧之浩蕩薄遊茲邑喜見高人三接而定琴樽七縱而擒風月林宗有道相期清濁之間平叔能言見許天人之際從容宴語契濶胸懷欣性情之同冥感形骸之共遣雖元都妙域已挂於忘言而義孰文場竊申於知已敢作頌曰妙象無倪神功有涉湛淡名器奔驣事業慧路翹車禪河艤楫控引㣥品輪回庶劫縱橫宇宙反覆山川言因境立道寄形詮爰稽福地式揆珍田丹溪漏日碧洞栖煙闍都玉檻須彌石室榛灌溟濛風雲蕭瑟晬容乃眷禪徒有謐業磴三休花巖四密崇巒架殿謺嶂營樓千楣鳳起萬栱鸞浮星開紺髮月湛青眸神宮不夜邃閣長秋戶臨重崿窗分絶嶺半漢香浮中天梵警鶴林聖迹龍泉佛影鳥思山空猿悲峽靜森森巨柏落落長松月出東岫霞生北峯山人自狎野老相逢白雲屢斷青溪幾重彭澤之令臨卭之客比德山藪重規泉石法宇成言慈門致役粳粃吏隱薜蘿心迹吾生擾擾與道遑遑殷勤頌詠惆悵津梁投功翠碣助化元場百年之後苔蘚蒼蒼某州縣洪飈未翔靈鳳垂翼景雲不燭神龍宛頸豈非時不可以苟遇道不可以虛行聖人作而萬物覩神功資而百寶用是非山川倒徙太階懷息亂之臣天地乖離元首佇康時之具則有得其數者於平原公見之矣自星虹沓沚開寶籙於軒圖雷電窈冥載休徵於魯讖龍驤鳳起霸圖存玉壘之雲紫蓋黃旗王迹著金陵之野故得卿才表秀謺彩駢蹤卑蓋朱幡連州比郡公侯必復子孫承百代之基餘慶不忘仁義應千齡之運公鼎門疏照穴岫翔輝分嶽秀於樊侯稟辰精於傅説折旋儒館以六藝為笙簧軒翥翰林用兩京為鼓吹經邦化俗涉遊夏之門庭減竈麾兵得孫吳之閫奧皇天眷命聖武膺圖覩物懷人思功去罪寰中有事曹參希執帛之榮閫外多虞周緤企中軍之寵見危授命藏器及時攀鳳羽於九霄候龍顏於千里蕭王內寢頻獻雅誠韓信齋壇屢遷優秩武德三年授中郎將俄遷大將軍秦王統軍皇基肇闢天步猶難宸扆應上相之榮仙夢受中權之寄被廬講將實賴宏圖今日僉謀先應時望於是弄兵竊舉猶勤甲胄吞沙餌石尚阻河梁公制變以奇蕩除以殺七擒三捷之略緒著轅門拔旗穿札之能勳在盟府五年六月加上柱國隨班列也翦桐疏爵分茅建社下斷物土上格星躔唐虞著其升降周漢明其損益所以羽儀帝室蕃衛王畿懲惡勸善庸賢敘德高祖勳逾黜夏業擅戡黎置酒醴於南宮揚旌斾於東府建皇帝之號安不忘危覽徹侯之籍榮而思報以公乃誠匪懈原始要終望嚴雪而識寒松觀疾風而知徑草九年封望都縣男貞觀元年改封縣侯文貔禁旅實著趫雄清道啓行允茲多士自非譽高朝諷價重人謠仍窺博望之儀必亂鉤陳之選公早陪戎律夙簡帝心揚歷二宮當仁不讓授左衛中郎俄遷右虞侯率蔥山狄壤蒲海蠻陬信要服之外區乃胸奴之右地境鄰澤乘徑敵而雕騰郡邇酒泉候宵塵而鶚視天子乃停旒側聽負扆晨驚振洪策於古今溢嚴勳於覆載將使八紘昭泰銀臺應益地之圖九縣平夷瑤水流尋仙之駕貞觀某年授高昌道行營總管公道凝三略功標五才逸氣縱橫雄精貫月象物而動鼓鼙肅戰士之容推信而行歌舞表將軍之德裹糧坐甲輕死等於鴻毛投袂衝冠重義均於熊掌鑒空歸惠荒度來賓收鄭吉之前蹤復張騫之故事廟堂頌德魏闕疇庸光贊六條非公莫可某年授某州剌史尋以江沱奧域衡霍名區楚情剽狡吳風澆競火耕水耨郡闕婺女之精竦劍危冠人尋鱄諸之弊分宣演化臥理切於宸襟易俗遷訛行吟佇於人望貞觀某年遷睦州剌史政刑不慝考績連最俄授使持節松州都督今上鈞臺嗣歷鼎邑凝圖百城勞晉武之心千里揚漢宣之詔璽書加秩禮縟諸藩綸煥層班事高恆典永徽中改沙州剌史屬鼇山亂德鴻水稽誅扶桑落日之濱妖朋蟻結孤竹尋雲之際孽黨蜂騰百濟遺黎託懸巢而斬氣三韓別種附危幕而遊魂玉帳搜兵佇責苞茅之貢金壇令律將收楛矢之琛龍朔年中授公熊津道總管公昔從幕府早厠戎行覽兵法於軒轅受陰陽於呂望三門五壘得破敵之奇謀火艦雲梯總行軍之妙法故得戰無全陳野靡堅城摐金將躍馬暫臨銜璧與牽羊相繼豈惟秋方息亂遙聞定遠之名春谷投心遐想度遼之策若斯而已矣及三軍獻捷諸將論功帝嘉乃勳作鎮炎野授公廣州都督改封平原公以途鄰北戶地接南池珠崖魑魅之鄉銅柱貪殘之境纍藩斯寄歷任稱難於是受以春風臨以夏日明冠婚於縣邑布庠孰於閭閻薤本誅強姦豪屏氣棠陰察獄惸獨申哀理龔遂之亂繩解虞卿之錯節黃霸得循良之譽績未衒於邊城陳湯有方面之勳位不登於剌舉兼方具美其式茲乎朝廷以公屢參伯牧駿歷班條吏不忍欺人無胥怨伏情馭極留連稷野之童託義訓毗惆悵耶溪之老雖有黃槐紫棘無以易堯盛嶽名都猶聞借寇麟德元年改授金紫光祿大夫常州剌史既而天機忽爽大漸彌留白玉徒煎黃金難化台階側席方膺雉冕之尊玉女停機俄逢鵲衣之變以某年某月日春秋若干薨於公舍鳴呼哀哉惟公間氣呈姿靈和叶慶鳳鳴千仞鵬搏萬里情關峻遠得意於衆妙之門性宇沈凝忘筌於毀譽之境因心以至孝悌表於鄉閭臨義而行祿賜均於宗族故得虬驟蠖屈服冕乘軒歸漢於締構之辰遊梁於駭亂之際章溝霧闢曳鶡尾而晨趨甲館煙開奉旄頭而夜警鳴鼙出塞進李牧之奇誠露冕巡方受蘇章之直筆方當獻納黃屋揖拜青墀入東寺而掌壺處南臺而曳履不謂藏舟夜涉負杖朝興丹邱之化未尋元扃之痛俄及故怨深撤樂悲躔罷市者乎謹狀
