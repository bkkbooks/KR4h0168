front:
  text: 全唐文欽定全唐文卷六百八十一白居易二十六
  hash: sha256:ad7d7484e9e856d7c28ae08025c9fa271275e3744a9485bc397a60d750b6f822
body:
  text: 丞相隴西公出鎮於汴州軍司馬御史大夫陸長源實左右之二年而軍用寧司空南陽公作藩於徐州軍副使祠部員外郎鄭通誠實先後之三年而民用康暨十五年春隴西薨浹辰而師亂大夫以直道及禍十六年夏南陽薨翌日而難作員外以危行遇害惜乎大夫人之望也員外國之良也咸克潔於身儉於家勤於邦又申之以言行文學智謀政事故其歷要官參劇務如刀劍發鉶割而無滯如鐘磬在懸動而有聲識者以為異時登天子股肱耳目之任必能經德秉哲紹復隴西南陽之事業以藩輔王家嗚呼善人宜將鍾奕葉之慶而不免及身之禍天乎報施之眹何其昧歟昔詩人有黃鳥之章以哀三良不得其死今斯文亦以哀二良名其篇云伊大化之無形兮浩浩而茫茫中有禍兮若機之張梁之亂兮陸受其毒徐之難兮鄭罹其殃惟善人兮邦之紀綱邦之瘁兮正人先亡謂天之惡下民兮胡為乎生此忠良謂天之愛下民兮胡為乎生此豺狼我欲階冥冥問蒼蒼蒼蒼之不可問兮俾我心之衋傷悲夫而今而後吾知夫天難忱而命靡常某年日月某官某敬以醴幣祭於外城北門某聞北鄘四門之神有水旱之災於是乎禜之今年春天作淫雨將害於農墊於民惟城積陰之氣惟北太陰之位是用昭告於城之北門惟門有神裁之某以天子之休命殿於是邦大懼夭厲之不時俾黎民阻飢敢以正辭告神神若之何不聽敢以至誠感神神若之何不弔尚克陰沴不作時暘咸若百穀用成庶民用寧實惟鄘之神門之靈於戲北鄘北門之神明聽斯言罔俾雨水昏墊以作某之憂神之羞維元和十二年歲次丁酉二月辛酉朔二十一日將仕郎守江州司馬白居易謹以清酌之奠敢昭告於匡山神之靈恭惟神正直聰明扶持匡廬福利動植居易賦命蹇薄與時參差願於靈山棲止陋質遺愛寺側既置草堂欲居其中參禪養素而開構池宇在神域中往來道途由神門外輒用酒脯告虔於神神其聽之歆此薄奠非敢僥福所期薦誠尚饗維元和十二年歲次丁酉二月二十五日乙酉將仕郎守江州司馬白居易以香火酒脯告於廬山遺愛寺四旁上下大小諸神居易夙聞匡廬天下神秀幸因佐宦得造茲山又聞永遠宗雷同居於是道俗並處古之遺風而遺愛西偏鄭氏舊隱三寺長老招豫此居創新堂宇疏舊泉沼或來或往棲遲其間不惟耽玩水石以樂野性亦欲擺去煩惱漸歸空門儻秩滿以來得以自遂餘生終老願託於斯今葺構既成遊息方始爰以潔敬薦茲馨香不敢媚神不敢禳福但使疫癘不作魑魅不逢猛獸毒蟲各安其所苟人居之靜謐則神道之光明齋心露誠庶幾有答尚饗維元和二年歲次丁亥十二月甲寅朔十九日壬申皇帝遣某官某以庶羞之奠致祭於故婕妤之靈曰惟爾和順積中柔明奉上動靜合肅雍之體進退得婉孌之儀選自良家備茲內職修令顏以碩德蘭幽有香守明節而保身玉潔無玷方資懿範以茂嘉猷彼美有聞於何不淑遽茲淪逝深用惻傷既卜日晨爰申奠酹以爾有班氏之明智故贈以婕妤以爾有宓之姿容故葬於洛浦魂兮不昧歆此誠懷尚饗維元和五年歲次庚寅二月辛未朔二日壬申皇帝遣內侍省內府局丞賜緋魚袋孫士玫以清酌庶羞之奠致祭於故彰義軍節度使贈司徒吳少誠之靈曰惟爾武毅挺質韜鈐奮身負勇果之雄材蓄變通之明識自察廉列郡節制成師貞且有為勤而不擾軍戎戢睦封域底寧從義而致誠仗順而保福既延寵渥方茂輝榮遽此幽淪深用傷悼逝波不捨去日苦多想松檟以軫懷聞鼓鼙而興嘆恩加遣奠禮舉褒崇念爾有靈知豫此意尚饗維元和三年歲次戊子三月癸未某日皇帝遣某官某以庶羞之奠致祭於故咸安大長公主覩濬毗伽可敦之靈曰惟姑柔明立性溫惠保身靜修德容動中規度組紃之訓既習於公宮湯沐之封遂開於國邑及禮從出降義重和親承渥澤於三朝播芳猷於九姓遠修好信既申洽比之姻殊俗保和實賴肅雍之德方憑福履以茂輝榮宜降永年遽歸長夜悲深訃告寵極哀榮爰命使臣往申奠禮故鄉不返烏孫之曲空傳歸路雖遙青冢之魂可復遠陳薄酹庶鑒悲懷嗚呼尚饗維長慶元年歲次辛丑月日皇帝遣使朝議大夫檢校右散騎常侍兼少府監御史大夫雲騎尉賜紫金魚袋裴通致祭於故愛登羅汨沒密施毗伽保義可汗之靈粵以英武之姿雄奇之策撫有九姓制臨一方氣吞諸戎名播上國况能嚮風納繼好息人代為親鄰歲入職貢方賴威略共清寰瀛倚為長城永固中夏而天殲驕子國喪名王奪氣色於陰山霣精光於昴宿凶訃云至悲懷用深故遣使臣往將國命展弔奠之禮申哀榮之恩猶有明靈當鑒誠意尚饗維元和三年歲次戊子七月辛巳朔二十七日丁未皇帝遣某官某以清酌之奠致祭於故鳳翔節度使贈某官張敬則之靈惟爾挺武毅之質負將相之才名以忠聞位由勤致自膺閫職益茂勳猷惠葺疲氓威吞黠虜一方膏雨千里長城繼博望之功勞能恢代業傳子房之籌略不墜家聲方誓山河遽捐館舍逝川無捨遠日有時徽績空存書旗常而播美音容不見聽鼙鼓而增思永念忠勤彌深軫悼往陳遣奠庶鑒悲懷嗚呼尚饗維貞元十七年某月某日從祖弟居易等謹祭於苻離主簿六兄之靈嗚呼聖忘情愚不及情情所鍾者唯居易與兄豈不以親莫愛於弟兄別莫痛於死生斯親也而有斯別也孰能不哀從中來而失聲去年春居易南遊兄亦東適黟歙之間欣然一覿相顧笑語相勉行役中途遽別情甚感激孰知此別為生死隔矧兄遇疾於路路無藥石歸全於家家無金帛環堵之室不容弔客稚齒之子未知哀戚自古孔懷之痛亦莫我之與劇古人有言神福仁天福敬又曰惡有餘殃善有餘慶惟兄道源乎太和德根乎至性以孝友肥其身以仁信羶其行而位不登於再命年不及於知命何報施之我欺俾吾兄之不幸嗚呼已焉哉既卜遠日就宅新阡春草之中畫為墓田濉水南岸苻離東偏其地則邇其別終天惟弟與家人儼拜哭於車前魂兮有知鑑斯文歆斯筵知居易之心煢煢然維元和八年歲次癸巳二月某朔二十五日仲兄居易季兄行簡以清酌之奠致祭於亡弟金剛奴嗚呼川水一逝不復再還手足一斷無因重連惟吾與爾其苦亦然黃墟白日相見無緣每一念至腸熱骨酸如以刀火刺灼心肝况爾之生生也不天苗而不秀九歲夭焉昔權殯爾濉南古原今改葬爾渭北新阡祔先塋之北次就卑位於東偏冀神魂之不孤庶窀穸之永安嗚呼自爾捨我歸於下泉日來月往二十二年吾等罪逆不孝殃罰所延一別爾後再罹凶艱灰心垢面泣血漣漣松檟之下其生尚殘昔爾孤於地下今我孤於人間與其偷生而孤苦不若就死而團圓欲自決以毀滅又傷孝於歸全進退不可中心煩寃仰天一號痛苦萬端嗚呼爾魂在几爾骨在棺吾親奠酹於爾床前苟神理之有知豈不聞吾此言尚饗維貞元十五年七月七日從祖弟居易謹以清酌庶羞之奠敬祭於故烏江主簿十五兄之靈易云積善之家必有餘慶書曰非天夭人人中絶命則冉牛斯疾顏回不幸何繆舛之若斯諒聖賢之同病惟兄之生生而不辰孩失其怙幼喪所親旁無兄弟藐然一身自強自立以致成人蓋以孤子靡託孝友彌敦自居易與兄及高九行簡雖從祖之昆弟甚同氣之天倫故雖百里信宿之別曷常不惻然而悲辛矧終天之永訣知後期而無因徒撫膺而隕涕諒沈痛之難伸追思乎早歲離阻各悲零俜中年集會共喜長成同參選於東都俱署吏於西京居則共被而寢出則連騎而行友于四人同年成名優遊笑傲怡怡弟兄雖不侔八龍三虎亦自謂當家一時之榮及兄辭滿淮南薄遊江東居易亦以行邁忽逆旅而相逢或酒或歌宴衎從容何朝不遊何夕不同常以兄仁信根於心孝悌積於躬謂至行之有答必景福以來從嗚呼位始及一命祿未遇數鍾年又不得四十而歿於道途之中鬱壯志而不展結幽憤於無窮况舊業東洛先塋北邙三千里外身歿陵陽有妹出嫁無男主喪悠悠孤旐未辨還鄉宣城之西荒草道傍旅殯於此行路悲涼秋風蕭蕭白日無光聚今晨之弟姪對前日之杯觴稽首再拜魂兮來享進三奠而退一慟孰不神酸而骨傷哀哉伏惟尚饗維元和十三年歲在丁酉閏五月己亥居易等謹以清酌庶羞之奠再拜跪奠大兄於座前伏惟兄孝友慈惠和易謙恭發自修身施於為政行成門內信及朋僚廉幹露於官方溫重形於酒德冀資福履保受康寧不謂才及中年始登下位辭家未踰數月寢疾未及兩旬皇天鑒遠降此凶酷交遊行路尚為興嘆骨肉親愛豈可勝哀舉聲一號心骨俱碎今屬日時叶吉窀穸有期下邽南原永附松檟居易負憂繫職身不自由伏枕之初既闕在左右執紼之際又不獲躬親痛恨所鍾倍百常理嗚呼追思曩昔同氣四人泉壤九重剛奴早逝巴蜀萬里行簡未歸煢然一身漂棄在此自兄至止形影相依死灰之心重有生意豈料避弓之日毛羽摧頽垂白之年手足斷落誰無兄弟孰不死生酌痛量悲莫如今日宅相癡小居易無男撫視之間過於猶子其餘情禮非此能伸伏冀慈靈俯鑑悲懇哀纏痛結言不成文嗚呼哀哉伏惟尚饗維長慶元年歲在辛丑五月丙申朔十月乙巳中散大夫守中書舍人翰林學士上柱國賜紫金魚袋元稹朝議郎守尚書主客郎中白居易謹以清酌庶羞之奠敬祭於故刑部侍郎贈工部尚書隴西李公杓植之靈於戲代重名義公能佩服德潤行羶溫溫郁郁凡嚮善者如蟻慕肉時重爵位公負楨幹春秋天官是攝是贊尚書六職公理其半朝重文翰公掌詔令西閣絲言內庭密命公實出入迭操二柄家重隆盛公暨陳許兩掖中臺差肩接武青幢赤茀叔出季處門重婚嗣公娶令族鏘鏘振振和鳴似續男女七人五珠二玉年重壽考公亦云老心雖壯健髮已華皓五十加八亦不為夭人重康寧公體豐盈逮乎奄忽不失和平啓手足夜無呻吟聲古稱五福公有七福凡人得一死猶瞑目矧公兼之豈有不足所不足者不在其身怏怏惻惻其在他人為門戶惜主為骨肉惜親為吾儕惜良友為朝廷惜賢臣况稹也不才居易無似辱與公遊十九年矣昔貞元歲俱初筮仕並命同官蘭臺令史以公明達以我頑鄙度長潔能信非倫擬一言吻合不知所以莫逆之交實從茲始清問登近遞罹讒毀江澧通州左遷萬里或合或散一伏一倚浩浩世途是非同軌齒牙相軋波瀾四起公獨何人心如止水風雨如晦雞鳴不已不因紛阻孰辨君子以膠投漆如弧有矢所以綢繆見於生死前年去年次第徵還或先或後俱到長安水流火就松茂柏堅置酒欲飲握手何言初論瘴癘次敘艱難三心六眼同一澘然稹與居易旋登禁掖公領銓衡職勤務劇私室多故公門少隙歡會實稀光陰虛擲不相勸勉急務歡適且曰朱顏已去白日可惜花寺春朝松園月夕大開口笑滿酌口喫言約則然心期未獲嗚呼杓植而忍遺我棄我何處捨我何之豈反真歸冥漠然而無所為將精多魂強的然而有所知恍如聞兮倏如覩未甘心於永辭彼有靈兮此有夢胡不一來兮質我疑逝川渺其不回日月忽乎有時指岐下以歸祔備大葬之威儀禮有進而無退祖於庭而送之畿旌竿舉兮轜輪動遂不得少留乎京師嗚呼杓植其鑒於茲爵盈不飲豆乾不食如之何勿思公兒號我公馬嘶我如之何勿悲嗚呼杓植已而已而哀哉尚饗維元和二年歲次戊子八月辛亥朔十九日己巳將仕郎守左拾遺翰林學士太原白居易謹以清酌庶羞之奠敬祭於陳氏楊夫人之靈惟夫人柔明治性溫惠保身靜修言容動中規度洎承訓師氏作嬪良人茂四德而蘭幽有香潔百行而玉立無玷發為淑問著為芳猷姻族有輝閨闈是式噫福仁何昧積慶無徵宜享永年遽歸長夜浮生若此永痛如何嗚呼生必有涯人誰不沒所甚感者其唯情乎故事劇者情易鍾感深者理難遣夫人雖宜其室竟未辭家蓄和順之誠不得施於娣姒蘊孝敬之德不得展於舅姑有志莫伸何恨過此况一嬰沈痼自夏徂秋伏枕七旬姊妹視疾歸櫬千里弟兄主喪凋桃李之花夫遠不見失乳哺之愛女小未知乃使哀情倍鍾血屬洛川迢遞秦野蒼茫日慘不光雲愁無色姊妹且病親老尤慈哭別一聲聞者腸斷居易早聆懿範近接嘉姻維私之眷每深有慟之情何已敬陳薄奠庶鑒悲誠尚饗維太和三年歲次己酉六月己酉朔三十日戊寅中大夫守太子賓客分司東都上柱國晉陽縣開國男食邑三百戶賜紫金魚袋白居易謹以茶果之奠敬祭於故中書侍郎平章事贈司空韋公德載惟公忠貞大節輔弼嘉謨倚注深恩哀榮盛禮伏見册贈制中已詳惟公世祿官業家行士風茂學清詞沖襟宏度伏見碑志文中巳詳此不重書但伸夙願公佩服世教棲心空門外為君子儒內修菩薩行常接餘論許追高蹤元和中出守開忠二郡日公先以喻金礦偈相問往復再三繇是法要心期始相會合長慶初俱為中書舍人日尋詣普濟寺宗律師所同受八戒各持十齋繇是香火因緣漸相親近及公居相位走在班行公府私家時一相見佛乘之外言不他及誓趨菩提交相度脫去年臘月勝業宅中公云必結佛緣無如願力因自開經篋出大方廣佛華嚴經中十願品一通合掌焚香口讀手授云自持護始傳一人會未經旬公即捐館追思覆視似不偶然今即日於道場齋心持念一願一力如公在前以至他生不敢廢墜至若與公同科第聯官僚奉笑言蒙推獎窮通榮悴之感離合存歿之悲盡成虛空何足言歎今茲薦奠不設葷腥庶幾降臨鑒察精意噫浮生是幻真諦非空靈鷲山中既同前會兜率天上豈無後期嗚呼韋君先後間耳伏惟尚饗維太和二年歲次戊申十二月壬子朔三十日辛巳二十二哥居易以清酌庶羞之奠致祭於郎中二十三郎知退之靈日月不居新婦龜兒等釁酷如昨俯及歲暮奄過大祥禮制云終追號永遠哀廠田坴手足悲裂肝心痛深痛深孤苦孤苦嗚呼自爾去來再周星歲前事後事兩不相知今因奠設之時粗表一二吾去年春授祕書監賜紫今年春除刑部侍郎孤苦零丁又加衰疾殆無生意豈有宦情所以僶俯至今待終龜兒服制今已請長告或求分司即擬移家盡居洛下亦是夙意今方決行養病撫孤聊以終老合家除蘇蘇外並是通健龜兒頗有文性吾每自教詩書二三年間必堪應舉阿羅日漸成長亦勝小時吾竟無兒窮獨而已茶郎叔母以下並在鄭滑職事依前蘄蘄卿娘盧八等同寄蘇州免至飢凍遙憐在苻離莊上亦未取歸宅相得彭澤場官各知平善骨兜竹石香鈿等三人久經驅使昨大祥齋日各放從良尋收膳娘新婦看養下邽楊琳莊今年買了並造堂院已成往日亦曾商量他時身後甚要新昌西宅今已買訖爾前後所著文章吾自檢尋編次勒成二十卷題為白郎中集嗚呼詞意書迹無不宛然唯是魂神不知去處每開一卷刀攪肺腸每讀一篇血滴文字擬憑崔二十四舍人撰序他日及吾文集同付龜羅收傳前年以來合家所造齋供功德皆領得否朔望晨夕饗奠復嘗來無不諭音容潛歿已久乃至夢寐相見全稀豈幽冥道殊莫有拘礙將精爽遷散杳無覺知不然何一去三年而茫昧若此吾今頭白眼暗筋力日衰黃壤之期亦應不遠但恐前後乖隔不知得見爾無下邽北村爾塋之東是吾他日歸全之位神縱不合骨且相依豈戀餘生願畢此志嗚呼奠筵將徹幃帳欲收此生之間豈有見日未死之際應無忘期仰天一號心骨破碎猶冀萬一聞吾此言痛心痛心千萬千萬尚饗維太和四年歲次戊戌七月癸酉朔十九日辛卯中大夫守太子賓客分司東都上柱國賜紫金魚袋白居易內從表弟朝請大夫守少府監上柱國李翺謹以清酌庶羞之奠敬祭於故相國興元節度贈司徒李公惟公之生樹名制節忠貞諒直天下所仰惟公之歿遭罹禍亂寃憤痛酷天下所知雖千萬其言終不能盡故茲奠次但寫私誠居易應進士時以鄙劣之文蒙公稱獎在翰林日以拙直之道蒙公扶持公雖徇公愚則受賜或中或外或合或離契濶綢繆三十餘載至今豆觴之會軒蓋之遊多奉光塵最承歡惠眷遇既深於常等痛憤實倍於衆情永訣奈何長慟而已翺情兼中外分辱眷知綿以歲時積成交舊敢申薄奠庶鑒微衷嗚呼哀哉伏惟尚饗維太和五年歲次已亥十月乙丑朔十七日辛巳中大夫守河南尹上柱國晉陵縣開國男食邑三百戶賜紫金魚袋白居易以清酌庶羞之奠敬祭於故相國鄂嶽節度使贈尚書右僕射元相微之惟公家積善慶天鍾粹和生為國楨出為人瑞行業志略政術文華四科全才一時獨步雖歷將相未盡謨猷故風聲但樹於藩方功利不周於夷夏噫此蒼生之不遇也在公豈有所不足耶詩云淑人君子胡不萬年又云如可贖兮人百其身此古人哀惜賢良之懇辭也若情理憤痛過於斯者則號呼抑鬱之不暇又安可勝言哉嗚呼微之貞元季年始定交分行止通塞靡所不同金石膠漆未足為喻死生契濶者三十載歌詩唱和者九百章播於人間今不復敘至於爵祿患難之際寤寐憂思之間誓心同歸交感非一布在文翰今不重云唯近者公拜左丞自越過洛醉別愁淚投我二詩云君應怪我留連久我欲與君辭別難白頭徒侶漸稀少明日恐君無此歡又曰自識君來三度別這回白盡老髭鬚戀君不去君須會知得後回相見無吟罷涕零執手而去私揣其故中心惕然及公捐館於鄂悲訃忽至一慟之後萬感交懷覆視前篇詞意若此得非魂兆先知之乎無以寄悲情作哀詞二首今載於是以附奠文其一云八月涼風吹白幕寢門廊下哭微之妻孥親友來相弔唯道皇天無所知其二云文章卓犖生無敵風骨精靈歿有神哭送咸陽北原上可能隨例作埃塵嗚呼微之始以詩交終以詩訣絃筆兩絶其今日乎嗚呼微之三界之間誰不生死四海之內誰無交朋然以我爾之身為終天之別既往者已矣未死者如何嗚呼微之六十衰翁灰心血淚引酒再奠撫棺一呼佛經云凡有業結無非因集與公緣會豈是偶然多生以來幾離幾合既有今別寧無後期公雖不歸我應繼往安有形去而影在皮亡而毛存者乎嗚呼微之言盡於此尚饗維元和四年歲次己丑七月日皇帝遣某官某以清酌庶羞之奠致祭於故祕書監贈兵部尚書盧虔之靈惟爾質性端和風猷茂遠名因文著位以才升秉大節而事君始終一致陳義方而訓子忠孝兩全甲族推華士林增美久在貂蟬之列近遷圖籍之司方延寵光遽閟幽穸褒獎之命雖已表於哀榮遣奠之恩宜再申於軫悼魂兮不昧鑒此誠懷尚饗
