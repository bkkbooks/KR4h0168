  text: 全唐文欽定全唐文卷二百五壽龍朔中官右春坊主事
  hash: sha256:1bcd9f5863768a8180fbd6e1328cebd0f26d4cf690e0b4343233b4cc05ff2a5c
  markers:
  - {type: head, offset: 12, content: 謝壽, id: KR4h0168_NFKB_205-h1, level: 1}
body:
  text: 一敕云君親之義在三之訓為重愛敬之道凡百之行攸先者此實先王之要道也今請申其禮竊尋教有外教內教之別人有在家出家之異在家則依乎外教服先王之法服順先王之法言上有敬親事君之禮下有妻子官榮之戀此則恭孝之躅理叶儒津出家則依乎內教服諸佛之法服行諸佛之法行上捨君親愛敬之重下割妻子官榮之戀以禮誦之善自資父母行道之福以報國恩既許不以毀形易服為過豈其責以敬親事君之禮異乎孔老之教所以理絶常境不抑拜禮無損於國也一敕云宋朝暫革此風少選還依舊貫者自佛法東流六百餘載帝代相次向有百王莫不敬崇佛法樹福僧田者故以染衣剃髮同諸佛之容儀割親辭榮異衆人之愛戀天龍敬重號為福田故佛告憍曇彌莫供養我當供養僧此則大聖誠言理不可棄如其佛語可棄請總除廢豈容存之欲求其福辱之而責其拜禮也伏惟太宗文皇帝聖智則無所不達神威則無所不伏於時僧衆豈不易令跪拜故以佛法可敬長其容善又恥好異亂常之迹故不為也但願近依先朝聖化之道遠棄晉宋邊鄙之法則萬古不怪道俗心安矣一敕云朕稟天經以揚孝資地義而宣禮者比見普天之下俱行孝道親在則盡心色養親歿則追思遺迹者皆稟陛下至孝之道也今忽改棄先朝正淳之軌遠慕晉宋矯異之風今僧等雖復暗昧竊為陛下不取也伏願追思先迹還依貞觀之法此則至孝之道不化而自行矣一敕云連河之化付以國王裁制之由諒歸斯矣臣竊尋付囑之意恐不如此何者佛以像法末年淳心漸薄邪見增長正法衰替四部之衆無力宏宣是以付囑國王令王擁護如其王者不護法當衰沒自壞豈勞付囑令王毀壞今僧徒雖復凡鄙而容儀似佛使之跪拜還如佛拜一至於此疑則存之無益且夫去好異順大同者君子之道也故先朝云以人從欲亂於大道君子所恥此風未遠伏願依行人或問曰經中既説新學比邱禮維摩詰足不輕菩薩亦致敬於慢衆况今聖主示為白衣神德則不謝於維摩立行則不同於慢衆今使僧拜正合其宜更有何辭敢不從順答不可以一人別行而亂於大教若以比邱頂禮於居士則令五衆設拜於君親俗人有居母喪而不哀豈使天下喪親而不哭至如莊周對婦尸而歌樂知存歿如四時孟孫居母喪而不戚達死生乎一貫此皆體道勝軌何不令天下俱行若以體道之情不可施於國法者彼亦證理之行豈得施於大化之議疑風也夫議者蓋欲取其大理以成畫一之法三教之法即國王法其法既成終天不易若不行用則須除廢若行用之必須述其教迹昔聞帝王禮佛未見佛禮帝王所以帝王敬法服者以先勝國王受佛付囑歷代尊承佛教故也父母敬其袈裟不可屈其佛衣招父母之過自古帝王度人出家去其鬚髮與其佛衣不拘常俗令作導師敷演法教而作福田若令其禮拜則屈其尊服付囑之義安在今欲改變恐昧理之流心有疑惑因生其過譬由敬泥龕木像以其圖寫佛容若不覩相欽承泥木一何可貴泥木尚假佛儀僧尼還託法服無假無託舋伐誰伐如愚所見望請循舊不拜為定謹議千石龍朔中官詳刑寺丞竊惟君臣契重忠孝之義本隆父子恩深愛敬之情攸切存日用之理荷生成之大受其蔭者豈有忘其德餐其惠者寧有闕其禮斯固在三隆訓盡一垂範乃理叶神衷義符聖詔然而域內之法與老釋殊制方外之軌共堯孔異轍筌蹄不能喻性相兩忘小大所不拘天地齊一不以色養為孝不以棄親為疑神道經久此而莫止尋其要旨亦有助化故詭服無點彞章毀形不傷教義超然出塵之表紛然不羈之賓沖而無替嶷爾圓湛雖因果難了至理窅冥若存若亡因循自昔往者釋遠著論晉庾息談與其慢也寧崇其敬今若尊其道而毀其法要其福而屈其身是使鳴錫趨劍佩之容捧爐端簪笏之理緇衣並列敬弛雙行斯則袈裟忸金翅之威鉢盂慚呪龍之術其為教也安所施乎遜等預忝芻蕘言非可擇輒申愚管伏深戰懼謹議慶道龍朔中官奉常寺丞夫孝養所以事親髮膚為立孝之始敬忠所以奉上跪拜申資敬之容此固仰究天經俯窮人理至夫真如寂滅言行俱盡元妙希夷窅冥難測陛下恢宏正道闡闢妙門興彼法徒膺茲冥祐然而教非域中之政形乃方外之儀衣異國容身無首飾何以參搢紳於下拜厠筓總而長跪愚謂紹法象賢可以朝不屈節毀形自絶可以家無降禮且同巢許之流有異勛華之盛付囑之託因循為善既奉明敕敢陳正議謹議欽泰龍朔中官司戎太常伯護軍臣聞三災變火六度逾凝二字為經百成攸緬是以白毫著相闡一乘於萬劫紫氣浮影混萬殊於一致爰有儒津復軔殊軫秀天地陰陽之稟禮君臣父子之穆故知循名責實矩迹端形則教先於闕里齊心力行修來悔往則化漸於連河釋為內防雅有制於魏闕儒為外檢不能括其靈臺別有元宗素範振蕩風物翾鵬逸鷃促椿遼菌無為無事何得何失然則道佛二教俱為三寶佛以佛法僧為旨道以道經師為義豈真攝生有托陶性通資信亦為政是基裨聲濃化而比邱未喻先生多僻恃出俗而浮逸以矜傲為誇誕處匹夫之賤直形骸於萬乘忘子育之恩不降屈於三大固君父所宜革乃臣子所知非遂降綸璽是攻其弊雖履孝居忠昌言改轍而稽古愛道參酌㣥情懷響者谷不銷聲撫塵者山無隔細必備輿人之頌以貢芻蕘之説何則柱史西浮千有餘祀法流東漸六百許年雖歷變市朝而事無損益惟庾冰責沙門之拜桓元議比邱之禮幸有何充進奏慧遠陳書事竟不行道終不墜是以大易經綸三聖蠱象不事王侯大禮充牣兩儀儒行不臣天子亦有嚴陵踞謁光武亞夫長揖漢文介胄豈曰觸鱗故人不為嬰網惟舊詎先師道法侶何後戎昭上則九天真皇十地菩薩下則南山四皓淮南八公或順風而禮謁或御風而遊處一以貫之靡得而屈十室忠信亦豈無其人哉五刑之設關三木者不拜豈五德之具居三服者拜之罪之不責恭肅德之誠足容養然則含識之類懷生之流莫不致身以輸忠彼則不忠王者莫不竭力而遵孝彼則不敬其親雖約弛三章律輕三尺有一於此三千其大而不被以嚴誅置於臣責者豈不以道釋與堯孔殊制傷毀與禮教正乖蓮花非結綬之色貝葉異削圭之旨人以束帶為儀章道則冠而不帶人以束髮為華飾釋則落而不容去國不為不忠辭家不為不孝出塵滓割愛於君親奪嗜欲棄情於妻子理乃區分於物類不可涯撿於常途生莫重於父母子則不謝施莫厚於天地物則不答君親之恩事絶名像豈稽首拜手可酬萬分之一者歟出家之與君父豈曰全無輸報一念必以人天為願首四諦則於父母為宏益方袪塵劫永離死生豈與夫屈膝為盡忠色養為純孝而巳矣必包之俗境處之儒肆屈其容降其禮則不孝莫過於絶嗣何不制以婚姻不忠莫大於不臣何不令稱臣妾以袈裟為朝服稱貧道而趨拜儀範兩失名稱兼乖深恐一跪之益不加萬乘之尊一拜之勞式彰三服之墜則所不可而豈然乎王者無父事三老無兄事五更君人之尊亦有所敬法服之敬不敬其人若屈其數則卑其道數而可卑道則云缺矣豈若存敬於巳存道於物敬存則巳適道在則物尊尊道所以敬於物敬於物所以尊於巳也况復形猶身也道若影焉身既如聲道亦如響形動則影隨聲揚則響應道崇則身寵身替則道息豈可使居身之道屈於道外之身豈可使方外之人存於身中之敬又彼守一居道不離塵俗若可拜之是謂俗之道而可俗俗又參道則一當有二而道不專行矣安可以區道之常域保專一之至誠哉據僧祇律敬袈裟如敬佛塔謂袈裟為福田衣衣名銷瘦取能銷瘦煩惱鎧名忍辱取能降伏魔軍亦喻蓮花不染泥滓亦為諸佛之所幢相則袈裟之為義其至矣夫若損茲佛塔壞彼幢相將輕忍辱更貶福田甚用危疑終迷去取解服而拜則越俗非章甫之儀整服而趨則緇衣異朝宗之典故闡幽舍衛之境步屏高門之地理絶朝請事乖榮謁豈不謂我崇其道所以彼請其來請而卑之復何為者廬山為道德所居不在搜簡之例甘棠為聽訟所息或致弗翦之恩山與樹之無心且以德而存物法與道之有裕豈崇道而遺人語曰人能宏道則道亦須人而行也王人雖微位在諸侯之上行道之輩焉復可卑其禮若謂兩為欺詭則可以而寢之寢之之道則芟剃之之謂是則所奪者多何止降屈而巳若謂兩為濃助則宜崇之崇之之道則尊貴之之謂豈可尊貴其道而使其恭敬哉假以金翠為真儀不以金翠而增肅假以芻狗而尊像不以芻狗而加輕肅敬終寄於道輕重不係於物物之不能遷道亦猶道之恆隨於物矣沙門橫服於巳資法服而為貴莫不敬其法服而豈係於人乎不拜之典義高經律法付國王事資持護法為常也常行不易一隅可隔千門或爽通有護法之資塞有墜法之慮與其墜之曷若護之何必屈折於僧容盤辟於法服使萬國歸依者居蒂芥於其間哉語曰人因所利而利之則利之之術亦可因其精詣而為利矣洎乎日光上照皇運攸宗海接天潢枝連寶構藉無上之道闡無疆之業別氏他族敬猶崇往神基靈派道豈偽今此為甚不可一也月氏東國寶祚斯俟定水元波法雲彩潤高解脫之慶演常住之福王前帝昔尚或攸遵主聖臣良胡寧此變臣愚千慮萬不一得儻緣斯創造無益將來於恆河沙劫有豪釐之纍雖率土碎首㣥生粉骨何以塞有隱之責蠲不忠之罪此為甚不可二也臣所以汲汲其事區區其誠搔首捫心隳肝瀝膽伏願聖朝重興至教恆春奈苑永轉法輪心歡録其人百祚遠光於帝業則雖死猶生朝夕可矣竊惟詔旨微婉義難適莫天情畫一則可使由之睿想旁求則誰不竭慮臣以庸昧何足寓言以兩教為無則崇於聖運聖而崇之則非無矣以兩教為有則筆削明時時而削之恐非有矣斯所以歧路裴回兩端交戰道宜存迹理未厭心管豈窺天蛙焉測海理絶庶幾之外事超智識之表自懷鉛閣筆扣寂銷聲而欲鳥處程言竽中竊吹將聾聽而齊俗舉瞽視而均叟雖有罄於心靈終不詣於聞見也直以八風逈扇萬籟咸貢其音兩曜升暉千形不匿其影茲焉企景是庶轉規就日心葵輸涓驛露而靦顏漿夏履薄冰春兢惕巳甚赧畏交集謹議泉龍朔中官內侍監給事竊以耆山闡化泛幽津而鼓楫碧落垂訓趣真境而揚言德總四天挺教殊乎俗檢義均一指資敬異乎常倫故致禮堅林至理與恆情別統屈身河上元功共即事巳乖是知緇服黃冠非闕廷之飾禪林洞府豈臣子之榮至於功深利益道備宏誘列三乘之旨則理極四生示五千之文則言包萬象執慧刀而割煩惱棄有欲而習無為存歿仰其舟航動植資其含養性相非研機所盡希夷豈探賾所窮況乃轉法輪以翼帝功則功濟塵劫浮真氣而基聖道則道冠混元蕩乎大乎固無得而稱矣今欲奬同名教令依俗禮綸言既降誰曰不宜竊恐高尚之風因斯遂往元妙之理流蕩忘歸伏惟陛下愛敬隆於百王德教敷於四海凝神體物宏道為心何必約此二門混同真俗之路限茲兩教亂彼默語之途戒律既異於恆科跪拜豈通於常禮因循之迹請依恆軌謹議誠心龍朔中官萬年縣令竊以老釋之教雖曰沖元君父之尊終資嚴敬况所行化不出寰中義屬在三須遵孔禮但為落髮不可加冠法衣不可加帶無冠無帶拜伏失儀如愚管窺依舊為允謹議隱客字少微太原人贈太子少保琚從父官鳳閣侍郎若夫雞渾起一龍聖開三飛羲畫而踰繩泛軒文而越契端宸肅扆題尊玉宇之中斑屣彯琚光佐璿逵之右洪猷僅於禮樂秀業止於仁義亦有棲月籠霞之俊乘黿控鯉之英窒欲蟺姿茹丹菌於祕洞休糧蛻影吸青露於神邱終驚迅節之期徒侈浮歡之會豈若能仁撫運梵典開宗撰妙輪而曾擊俶寶騎而高引無生之生究生生於至賾不滅之滅窮滅滅於幽源大千通智炬之輝盡億曳法蠡之響繁冖八且弛網邁三咒於湯年苦浪堙洪軼四乘於夏序浸㣥方而演澤濟悠劫而凝勳襲其儀者便屈紫皇之敬入其道者乃標黔首之尊為愛習之良資作塵勞之依止洎乎星潯禠照日夢飛光東徙休屠之像西漸罽賓之化高人響係敷妙説於琅函茂德肩隨暢真詞於貝牒列辟以之崇奉帛丿糸代以之欽尚故苻秦肅念紆翠輦而同嬉劉漢虔誠下緗輿而致禮唯有牛圖晚運慧星曖而還明龍緒衰辰德水凝而復渙我大唐澄飛日海撲燎霞昆延喜流禎昭華獻吉財成紫宙葳蕤改粒之勳大比蒼黎茵靄遷裳之業皇帝乘雷震極鑠電離宮驅九駮以曾馳駕八驥而橫厲希風崛岫啓鶴苑於神畿仰化連河構蜂臺於勝壤敷攝誘之徽範敦愛敬之洪模而以控國必俟於忠裝家實資於孝爰命僧尼之輩將申跪拜之儀則裕凝懷誶通規於會府因心在念捨輿頌於英寮雖囂議相攻各言其志而宸襟歷選遂率於常特懷顧復之恩仍致升堂之拜悰上人沖宇淹穆秀器韶雅逈韻道通峻詞間綽身城浪謐飛寶仞以衝天意樹紛披聳珍翹而拂漢既洽九儒之要還探三藏之微緇徒擅其姱節素侶挹其徽望固巳偶迹乘杯侔聲飛錫者矣將恐迷生曲學近識孤聞以適俗之權為會真之實叩鳳閽而莫遂叫鸞掖而無從爰興護念之心載啓發揮之作粵自晉氏迄於聖代凡其議拜事並集而録之總合三篇分成六卷為之贊論格以通途縟旨含鏘雕文振彩信所以激昂幽致刷蕩冥津者也隱客業寡才疏名蕪槩淺坐煙郊而晦迹泊風戶以棲神徒以早尚華編深崇葉篆欣茲盛事綴而序之秋蟲粦輕光匪助奔羲之曜春蛙陋響寧裨大樂之音聊以宣情詎云摛藻與我同志幸無誚焉元明龍朔中官左威衛録事原夫覺海澄圓涵萬流而濬宗極神機闡妙被衆象而凝至真明慧日而鏡六幽泄慈雲而沛八宇演一音而懸解逸三乘以遐騖體陳如之牛器津有有於鹿園照善現之滿機繹空空於鷲嶺雖絶塵於常斷詎遺筌於有空顯無上之靈宗凝中道於茲教逮金河滅景派淳源而不追玉牒霏華緒澆風而競扇於是二十八見迷喪應於五天一十六師亂牛雲於四主半千將聖茲惟世親實賢劫之應真悔生知以提化飛光育彩誕映資靈曜常明於八蘊藻初情於六足秀談芝於俱舍摽説有之餘宗攝元波於大乘賁研空之至理化方升而照極湛沖一於斯頌唯識三十偈者世親歸根之遺制也理韜囦海泛浮境於榮河義鬱煙飈麗虹章於元圃言舍萬象字苞千訓妙旨天逸邃彩星華幽緒未宣冥神絶境孤明斂映祕思潛津後有護法安慧等十大菩薩韞元珠於八藏聳層搆於四圍宅照二因樓清三觀升暉十地澄智水以潤賢林鄰幾七覺皎行月而開重夜優柔芳烈景躅前修箭涌泉言風飛寶思咸觀本頌各裁斯釋名曰成唯識論或名淨唯識論空心外之二取息滯有之迷塗有識內之一心遣歸空之妄執晦斯心境苦海所以長淪悟彼有空覺岸於焉高蹈九十外道亂風轍而靡星旗十八小乘軔羬軒而扶龍轂窮神體妙詣賾探機精貫十枝洞該九分顧十翼而搏仙羽俯九流以濬瓊波盡邃理之希徽闡法王之奧典稱謂雙絶筌象兼忘曜靈景於西申閟虹光於震旦濟物宏道眇歸宗德粵若大和尚三藏法師元奘體睿含真履仁翔慧九門禪晏證靜於融山八萬元津騰流於委海疊金牆而月曜峻玉宇而遐騫軼芳粹於澄蘭孕風華於龍翼悼微言之匿彩嗟大義之淪暉用啓誓言肆茲遙踐泳祥河之輟水攀寶樹之低枝循鏤杠以神遊躪霙峰而安步升紫階而證道瞰元影以嚴因採奧觀奇徙蒼龍於二紀緘檀篆具旋白馬於三秦我大唐慶表金輪禎資樞電奄大千而光宅御六辨以天飛神化潛通九仙賮寶元猷旁闡百靈聳職凝旒邃拱杳通夢於霄暉掞組摛華煥騰文以幽贊元奉綸旨溥令翻譯敕尚書左僕射燕國公于志寧中書令高陽公許敬宗等潤色沙門釋神泰等證義沙門釋靖邁等質文肇自貞觀十九年終於顯慶之末部將六十卷出一千韜軼蓬萊池湟環渤載隆法寶大啓㣥迷頌德序經並紆宸藻元風之盛未之前聞粵以顯慶四年龍棲叶洽元英應序厥閏惟陽糅茲十釋四千五百頌彙聚㣥分各遵其本合為一部勒成十卷月窮於紀銓綜云畢精括詁訓研詳夷夏調驚韶律藻掞天庭白鳳甄奇紫微呈瑞遂使文同義異若一師之製焉斯則古聖今賢其揆一也三藏弟子基鼎族高門玉田華胄壯年味道綺日參元業峻林遠識清雲鏡間儀玉瑩淩道邃而澄明逸韻蘭芳掩法汰而飛辨緒仙音於八梵舞霄鶴以翔禎摛麗範於九章影桐鸞而絢藻升光譯侶俯濳睿而融暉登彩義徒顧猷暢而高視秀初昕之璇景晉燭元儒矯彌天之絶車翕騰邁真俗親而四辨言奬三明疏發戶牖掖導津涉績功資素通理寄神綜其綱領甄其品第兼撰義疏傳之後學教蟠黃陸跨合璧於龜疇祥浮紫宮掩連珠於麟籀式罄庸謏敘其宗致云震字元振以字顯魏州貴鄉人舉進士授通泉尉唐休璟破吐番元振參預其謀以功拜主客郎中睿宗景雲二年纍官至同中書門下三品封館陶縣男以誅太平公主功進封代國公兼御史大夫持節為朔方道大總管未行元宗於驪山講武坐軍容不整流新州尋以舊功起為饒州司馬道病卒開元十年追贈太子少保彥昭以女巫趙五娘左道亂常託為諸姑潛相影援既因提挈乃踐台階或驅車造門著婦人之服或攜妻就謁申猶子之情於時南憲直臣劾以霜憲暫加微貶旋登寵秩同惡相濟一至於此又張易之兄弟勢傾朝野嗣立此際結為甥舅神龍之初巳合誅死天網疏漏腰領誤全安石託附阿韋編諸屬籍中宗晏駕削大皇輔政之制定阿韋臨朝之策此時朝野危懼人神怨憤乾坤交泰宇宙再清不加貶削法將安措臣忝司清憲敢不糾彈請付紫微黃門準法處分臣聞利或生害害亦生利國家奄有天下園囿八荒而萬機百揆之中最難消息唯吐蕃與默啜受命是將大利於中國若圖之不審則害亦隨之如防害有方則利亦隨之今欽陵所論唯分裂十姓地界抽去四鎮兵防此是欽陵切論者若以為可允則當分明斷決之若以為不可允則當設策以羈縻之終不可直拒絶以阻其意使興邊患也臣竊料此事關隴動靜之機豈可輕舉措哉使彼和望未絶則其惡意亦不得頓生請借人事為比設如人家遭盜一則攻其內室一則寇其外落主人必不先於外寇而憂在內室矣何則以內患近而外患遠也今國之外患者十姓四鎮是內患者甘涼瓜肅是復關隴之人事屯田向三十年臣料其力用久竭弊矣脫一朝甘涼有不虞此中豈堪廣調發耶臣實病之不知朝廷以為何如夫善為國者當先料內以敵外不貪外以害內今議事者捨近患而靡恤務遠患而是貪臣愚駑罔識厥策必以四鎮殷重事不可依何不言事以答之如欽陵云四鎮諸部與蕃界接懼漢密近蘭鄯比為漢患實在茲輩斯亦國家之所要者今宜報欽陵云國家非吝四鎮本置此以扼蕃國之尾分蕃國之力使不得並兵東侵今若頓委之於蕃恐蕃力強易為東擾必實無東意則宜還漢吐渾諸部及青海故地即俟斤部落當以與蕃如此足塞欽陵口而和事未全絶如後小有乖則曲在彼兼西邊諸國款附歲久論其情義豈與吐蕃同日而言今未知其利害未審其情實徑有分裂亦恐傷諸國之意非制馭之算待籌損益知其利便續以有報如此則亦和未為絶更使彼蕃懸情上國是亦誘人之方伏願省擇使無遺算以惠百姓也臣揣吐蕃百姓倦徭戌久矣咸願早和其大將論欽陵欲分四鎮境統兵專制故不欲歸款若國家每歲發和親使而欽陵常不從命則彼蕃之人怨欽陵日深望國恩日甚設欲廣舉醜徒固亦難矣斯亦離間之漸必可使其上下俱懷猜阻往者吐蕃所爭唯論十姓四鎮國家不能捨與所以不得通和今吐蕃不相侵擾者不是顧國家和信不來直是其國中諸豪及泥婆羅門等屬國自有攜二故贊普躬往南征身殞寇庭國中大亂嫡庶競立將相爭權自相屠滅兼以人畜疲癘財力困窮人事天時俱未稱愜所以屈志且共漢和非是本心能忘情於十姓四鎮也如國力殷足之後則必爭小事方便絶和縱其醜徒來相吞擾此必然之計也今忠節乃不論國家大計直欲公為吐蕃作鄉導主人四鎮危機恐從此啓頃緣默啜憑陵所應處兼四鎮兵士歲久貧羸其勢未能得為忠節經略非是憐突騎施也忠節不體國家中外之意而別求吐蕃吐蕃得志則忠節在其掌握若為復得事漢往年吐蕃於國非有恩有力猶欲爭十姓四鎮今若效力樹恩之後或請分于闐疏勒不知欲以何理抑之又其國中諸蠻及婆羅門等國見今攜背忽請漢兵助其除討亦不知欲以何詞拒之是以古之賢人皆不願夷狄妄惠非是不欲其力懼後求請無厭益生中國之事故臣愚以為用吐蕃之力實為非便又請阿史那獻者豈不以獻等並可汗子孫來即可以招脅十姓但獻父元慶叔僕羅兄倭子並斛瑟羅及懷道豈不俱是可汗子孫往四鎮以他匐十姓不安請册元慶為可汗竟不能招脅得十姓却令元慶沒賊四鎮盡淪頃年忠節請斛瑟羅及懷道俱為可汗亦不能招脅得十姓却遣碎葉數年被圍兵士飢餒又吐蕃頃年亦册倭子及僕羅並拔布相次為可汗亦不能招得十姓皆自磨滅何則此等子孫非有惠下之才恩義素絶故人心不歸來者既不能招攜唯與四鎮却生瘡痏則知册可汗子孫亦未獲招脅十姓之算也今料獻之恩義又隔遠於其父兄向來既未樹立威恩亦何由即遣人心懸附若自舉兵力勢能取則可招脅十姓不必要須得可汗子孫也又欲令郭虔瓘入拔汗那稅甲稅馬以充軍用者但往年虔瓘巳曾與忠節擅入拔汗那稅甲脫馬臣在疏勒其訪不聞得一甲入軍拔漢那胡不勝侵擾南勾吐蕃即將倭子重擾四鎮又虔瓘往入之際拔汗那四面無賊可勾恣意侵吞如獨行無人之境猶引倭子為蔽今此有娑葛強寇知虔瓘等西行必請相救胡人則內堅城壘突厥則外伺邀遮必知虔瓘等不能更如往年得恣其吞噬內外受敵自陷危道徒與賊結隟令四鎮不安臣愚揣之以為非計臣昨見唐休璟張錫等衆議商量其吐谷渾部落或擬移就秦原注今天水郡隴原注今汧陽郡或欲移近豐原注今九原郡靈原注今靈武郡貴令漸去邊隅使居內地用為防間之要冀免背叛之虞臣以為並是偏見之一端未為長久之深策若近秦隴則與監牧雜居如在豐靈復與默啜甫邇必以慮其翻覆須有遷移縱至中土安可易其本性至如耽爾乙句貴往年王孝傑奏請自河源軍徙居靈州用為愜便及其逃叛之日穿監牧掠馬㣥所在傷夷大損州縣是則遷居中土無益之明驗矣往者素和貴雖背聖化只從當所居地叛走其於中國無所損傷但是失少許吐渾耳豈與句貴之為害同日而語哉今吐谷渾之降者非驅略而來皆是渴慕聖化衝鋒突刃棄吐蕃而至者也臣謂宜當循其情以為制勿驚擾之使其情地稍安則其系戀心亦日厚當涼州降者原注今武威郡則宜於涼州左側安置之當甘州原注今張掖郡肅州降者原注今酒泉郡則宜於甘肅州左側安置之當瓜原注今晉昌郡沙降者原注今燉煌郡則宜於瓜沙左側安置之但吐渾所降之處皆是其舊居之地斯輩既投此地實有戀本之情若因其所投而便居之其情易安因數州而磔裂之則其勢自分順其情分其勢而不擾於人可謂善奪戎狄之權矣何必要纂聚一處如一國使情通意合如一家脫有異志則一時盡去傷害州縣為患慮深何如分置諸州使每州皆得吐渾使役欲有他懷必不能遠相連結總去臣愚輒以為勝策如允臣此見其所置之處仍請簡取當處強明官人於當處鎮遏之則小小為非亦易杜絶兼每使達蕃情識利害者共宣超兄弟一人歲往巡按以撫護之無使侵削其生業日就樂戀自亦深矣如此臣實以為羈縻戎狄之良策設使後有去就不過邊州失少許吐渾終無傷於中國今此輩心悠揚而無主未知所安必在早定安置之計無令驚擾速生邊患
