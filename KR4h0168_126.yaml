front:
  text: 全唐文欽定全唐文卷一百二十六周世宗二
  hash: sha256:e130c057bc9c13f8a09b585d3169ece9544423c00d78dc5ba20478eb7dd0b41d
body:
  text: 朕自遘閔凶再經晦朔山陵巳卜日月有期未忘荼蓼之情豈願干戈之役而河東劉崇幸災樂禍安忍阻兵乘我大喪犯豫邊境勾引蕃寇抽率鄉兵殺害生靈覬覦州縣朕為萬姓之父母守先帝之基扃聞此侵陵難以啓處所宜順天地不容之意從驍雄共憤之心親御甲兵往寧邊鄙務清患難敢避驅馳凡在衆多當體茲意取此月十一日親率大軍取河陽路親征竚平妖孽永泰寰區應沿路排當並不得差遣百姓科配州縣及於人戶處借索劫掠遠近節度刺史並不得輒離治所求赴朝覲應諸司各宜應奉公事者即仰從駕諸無事者不在扈隨務從省要免至勞煩故茲札示想宜知悉朕以中原雖靜四表未寧臨戎罔憚於躬親問罪須勤於櫛沐今訓齊驍鋭巡幸邊陲用壯軍容永安國步宜取此月內車駕進發暫幸淮上凡關舊儀有司準式朕躬臨庶政志靜八方顧淮海之未賓命師徒而致討克捷相繼殺獲甚多料彼孤危安能抵拒然以將士在外攻戰踰年竭力盡忠摧凶破敵念茲辛苦常軫憂勞暫議省巡親行慰撫且地里之不遠諒回復以非遙今取二月內暫幸淮上應自來緣路供頓務從省略凡有費用並以官物供備所在不得科配其諸約束條件一如近年巡按之例向者以淮甸未平王師致討實賴忠貞之力繼成克捷之功漸屬嚴凝念彼征役況今邊陲無事軍旅正雄須議省巡躬親撫問將布混同之化罔辭櫛沐之勞止期一月閒車駕卻還京闕凡在中外當體朕懷今取此月內暫幸淮上應往來沿路供頓務從省略凡有費用並以官物供備所在不得科配朕猥以涼德紹此丕圖既為萬乘之君宜去兆民之患雖晨興夕惕每常思於萬機而紫塞黃河猶未親於經略秋夏則波濤罔測三冬則邊鄙警騷將期安國利人豈憚櫛風沐雨今取此月內駕幸滄州巳來應沿路排頓並以官物充餘依舊例朕承宗社之靈居億兆之上祗臨大寶於茲再周每念晉漢以來朝野多故疆宇日削生聚未堪常懷拯救之心冀答天人之意至於夙夜不敢荒寧求安邊拓境之謀思濟世息民之計乃眷秦鳳地接巴邛頃屬亂離因茲阻隔千里之地大朝之聲教不通十年之中百姓之艱苦難狀昨者興發師旅經略封陲鼓鼙絶震於郊原蛇豕難逃於鋒刃僵尸遍野棄甲如山秦成階等州管內將校官吏軍人百姓等喜寇孽之逋逃舉城壘而歸順飛章送款協力同謀父老相歡山河如故而僞署鳳州節度使王環等獨迷去就尚據城池朕念彼孤危繼令招諭惜一城之士庶開三面之網羅豈期拒轍之徒不體好生之德遂令攻擊立見蕩平渠帥就擒秦隴無梗宜降惟新之澤庶隆及物之恩應秦鳳階等州管內自顯德二年十一月巳前有罪犯者無問輕重一切釋放應馬步行營將士等各與恩澤其有歿於王事者自副兵馬使巳上並與贈官仍賜賻贈物城下攻歿百姓為矢石所害致死者本戶除二稅外放免三年差徭仍賜本家孝服絹三匹其倍署人夫州縣官並與加階減選秦成階等州歸明將士自長行巳上等第支賜優給其官吏將校職員等並與加恩其中有西川人員除恩澤賞賜外如願駐留者厚與請受如願歸去者並給盤纏用慰衆情免違物性應收捉到賊軍將校一切放罪並令押送赴闕各與恩澤自何重建等歸投西川巳來訪聞管內州縣連歲饑荒百姓軍人倍加勞役科斂頻併法令滋章既為吾民宜革前弊今後除秋夏兩稅徵科外應僞蜀所立諸般科率名目及非理徭役一切停罷德音未該者宜令所司相次指揮王者經營四方式遏亂略懷安逸而忘戰伐則雄圖莫震有雪霜而無雨露則歲功不成日者革輅親征靈旗問罪正陽之役吳師無匹馬之歸六合之征楚甲有齊山之積今長江以北半為我疆實賴將相協謀貔貅宣力破彼勍敵成茲茂勳宜敷曠蕩之恩用慰輕揚之俗澤既霑於動植寵豈忘於忠勤聲教惟新甄賞斯在可特赦淮南道諸州管內見禁罪人取顯德三年六月十一日巳前凡有違犯不問輕重並不窮問其江北諸州縣有未收復處宜令行營大將明申招諭儻能知幾變歸順朝廷其向來名位俱一切如故仍選名藩大郡厚加旌賞其軍都自長行巳上並與優給其中有願歸江南者亦聽自便應隨駕淮南行營諸軍等或破敵成功或攻城效力或收降州縣或護衛乘輿咸積忠勤宜加酬奬各與等第優給從駕職官及諸色人員等從征在外奉事有勞各與加恩以奬勤幹諸州夫役自來有沒於矢石者其本戶放免三年差徭仍每人支賜贈孝絹三匹淮南道諸州縣先屬江南之時頗有非理科徭無名配率今後一切停罷事有不利於民無益於時者宜令長吏條奏以聞疆埸未寧旗鼓下出師之命氛霾既靜雲雷覃及物之恩四維張而載戢五兵武功成而必修文德朕戎衣再御三載親征令行而霆霹爭雄陳起而龍蛇合勢蓋舟車之所及諒聲教以咸臻敢言涼德之懷柔實賴忠臣之宣力積水激朝宗之浪事等疏川客星回拱極之光瑞增懸象今則斗柄建午火正司南順元穹長養之心伸有國亭毒之令眷彼戎士咸遵武經或從我征行久服勤於甲胄或守茲城邑能安定於封圻宜舉彞章首膺懋賞應侍衛殿前及諸道馬步軍將士等各賜等第優給餘從宣命處分疾風徑草既驗忠誠臨難捐軀所宜旌異應淮南行營將士歿於王事者各與贈官逐人若有親嫡子孫並與敘録內有傷痍殘廢不任征行者等第各給救接錢帛排難疆場馬革無慙於壯志遺骸暴露牛岡有軫於深仁載尋掩骼之文俾釋窮泉之恨凡經戰陳處應有暴露骨骸仰逐處州縣收拾埋瘞淮南界內逐處墳墓有曾遭發掘處委逐處州縣差人掩閉用兵之際力役是供當矜貸之在辰諒優給之宜被自去年十月後來沿淮人戶曾充夫役內有遭傷殺不回者本家各給絹三匹仍放免本戶下三年諸雜差役江南疲俗克復方新特示蠲除俾令存濟揚泰通滁和濠泗楚光壽舒廬蘄黃州連水漢陽汶川等縣自去年終巳前所缺秋夏殘稅及諸色徵科配斂博徵物色等並與除放自東南用兵首尾三載沿淮州郡應奉軍期飛挽頻仍力役勞併念其艱苦深軫所懷其徐宿宋亳陳潁許蔡等州人戶所缺去年秋夏稅並與除放於戲江表來賓顧車書之巳混寰中未乂資將相之同心所宜共率憲章動遵王度咨爾三事達於庶官當整嘉謀弼豫不逮凡神聖之功乃開基以創業惟帝皇之德遂垂制而立文生成參天地之靈悠久鍾子孫之福寧禹湯而獨美豈堯舜以無倫先皇帝出震安時膺乾啓運改相仍喪亂之轍造勃興開泰之邦儉靜其身寬慈於物寒耕熱耨之苦常念三農宵衣旰食之勤不忘萬務恩霈庶彙義結羣心周室肇興安神器而方固軒臺遽往望仙駕以不回肆豫沖人獲紹丕構孤藐自視寡昧何知稟治命之丁寧副衆情之推奉中心憂塞罔有津涯易月之禮制尋終在天之感慕無巳負荷斯重恭默以居宜從作解之文以洽當陽之澤可大赦天下應三月七日昧爽巳前所犯罪人巳結正未結正巳發覺未發覺常赦所不原者咸赦除之諸貶降責授官等量與升陟敘用應配流徒役人及縱逢恩赦不在放還並嘗知所在者並放逐便諸處有草寇團集仰所在州府及巡使臣曉諭恩赦招喚各令歸農兩京及諸道州府人戶所缺去年秋夏稅租及沿徵物帛並與除放其鄉村逃移人戶並仰招喚歸業內外見在文武職官致仕官及諸軍將校並與加恩其前任京官幕職州縣官至今授官日施行諸軍將校自開創以來有沒于戰陳及身死疆埸者並與追贈如有親嫡子孫未曾録用者並與録用文武外朝官及內諸司使副使禁軍都指揮使以上諸道行軍副使藩方馬步軍都指揮使父母在者並與恩澤亡歿者與封贈其妻未敘封者特與敘封應沿邊州府接近西川河南契丹河東界處仰所在州府及巡使臣鈐轄兵士及邊上人戶不得侵擾外界及虜掠人畜務要靜守疆埸勿令騷動其投來人戶仍仰倍加安撫大行皇帝山陵有期準遺命不得勞擾百姓者宜令所司奉承先旨無至隳違應緣山陵公事合使工人役夫並須先給錢物雇覓諸雜費用一切取官物供給不得差遣人戶科配州縣文武班列親近臣寮愛國誠堅致君心切苟或聞朕躬之過失覩時政之否臧無惜敷陳以輔寡昧苦口良藥逆耳忠言裨益至多翹竚惟切今後內外臣寮或有所見及有所裨益可具實封章表以聞或欲面對便仰閣門司畫時引見懷才抱器出衆超羣或養素於衡門或屈迹於末位孤寒難進志業何伸咸用搜羅待以爵秩諸隱遁不仕及卑官下位中有文武幹略灼見可稱者所在具名以聞化理之本孝弟為先苟或虧違實亂名教其有士庶之內凶率之徒不順於父兄不恭於尊長狂悖難狀訓誨莫從親族容隱而不言里巷畏避而不告傷風敗俗莫甚於茲今後或有不孝不義之人違戾尊長喧悖毀辱及父母在異財別居略不供侍如此之輩不計官宦軍人百姓之家宜令御史臺及本軍本使所在州縣廂界彈舉覺察如或容縱不切舉罪有歸處其有孝子順孫義夫節婦宜所旌表以厚人倫恭惟先皇帝推誠損巳集思勞神念將士之忠勤知戰伐之辛苦餱糧祿賜無非經手經心土地官封不惜酬勳酬效生靈是念稼穡為憂罷非理之差徭去無名之侵耗不貪遊宴盡去奢華減後宮冗食之人停諸司不急之務方嶽止甘鮮之貢殿庭絶珠玉之珍獄訟無冤刑戮不濫凡關物務盡立規繩豫小子纘紹丕基恭稟遺訓仰承道法不敢踰違更賴將相公卿左右前後共遵先旨同守成規庶裨沖人不墜洪業赦書有所未該所司速具聞奏昨者劉崇縱肆毒螫勾引蕃戎困我生民深入澤潞朕所以泣辭神御親總甲兵抑荼蓼之哀懷殄豺狼之凶黨誠賴元穹垂祐將士輸忠大翦寇讎尋清原野覽賊寇經繇之地深切憫傷當城池圍閉之時良資捍禦適因駐蹕宜示特恩應潞州諸縣取今月二十七日巳前見禁罪人除死罪外並宜與釋放當州數縣昨經賊軍傷殘處人戶所徵今年夏稅斛斗錢帛三分與放一分內有村坊元不遭賊寇殘傷者不在蠲放之限潞州昨經圍閉將校職員同力守禦兼以大駕駐蹕迎奉無闕應在城將校官吏職員宜令本州具名銜以聞各加恩澤昨殺戮賊軍之處及四面山谷閒尸首絶多宜令逐處官吏差人收斂埋瘞勿令暴露逐處墳墓曾被賊軍發掘者指揮掩閉河東及契丹敗散兵士其中有潛竄山谷閒者並令招喚不得輒有傷害如是義軍百姓便可放歸本家若是軍人及諸色人並監送至駕前各與穩便安排遼沁二州新屬潞州久陷賊境深可憫傷委本道節度使倍加安撫所有劉崇煩苛事件並與蠲放朕受天明命繼統中區寰瀛將保於大同征伐蓋非於獲巳一昨以壽春未拔吳寇重來內外張皇烽火相接罔避暫勞之役須興再駕之師步騎長驅水陸齊進戈船寨柵一鼓蕩平劉仁贍以衆意憂危援兵覆沒遣子上表瀝血求哀矜彼含生許其納款兵革之後黎庶未安念孤壘之初開解踈羅而示德宜覃在宥之澤俾安向化之心可赦壽州管內見禁罪人自今月二十一日昧爽巳前凡有過犯無問輕重並從釋放應歸順官吏將校職員並與等第加恩壽州管界去城五十里內與放今年及明年秋夏租稅自來百姓有曾受江南文字聚集山林者押逐處長吏使臣招喚歸家並不問罪如曾有傷害者今後不得更有相讎及經官論訴兼自用兵巳來被虜劫骨肉者不計遠近並許本家識認官中給物收贖所在不得藏占曾經陳敵處所暴露骸骨仰差人收拾埋瘞自前後政令有不便於民者委本州條列聞奏當行釐革頃自有唐失御天步方艱巢蔡喪亂之餘朱李戰爭之後中夏多故六紀於茲海縣分英豪鼎峙自為聲教各擅蒸黎連衡而交結四夷乘釁而憑陵上國華風不競否運所鍾凡百有心孰不興憤朕猥承先訓恭荷永圖德不逮於前王道未方於往古然而擅一百州之富庶握三十萬之甲兵農戰交修士卒樂用思欲報纍朝之宿怨刷萬姓之包羞是以踐位巳來懷安不暇破幽并之巨寇收秦鳳之全封兵不告疲民有餘力一昨回軍隴上問罪江干我實有辭咎將安執朕親提金鼓尋渡淮淝上順天心下符人欲前鋒所向彼寇無遺棄甲僵尸動盈川谷收城徇地巳過滁陽豈有落其爪牙折其羽翼潰其心腹扼其吭喉而能不亡者哉早者泗州主將遞送到書一函尋又使鍾謨李德明至賫所上表及貢奉衣服腰帶金銀器幣茶藥牛酒等近差健步進到第二表今月十六日使人孫晟等至賫到第三表及進奉金銀等並到行朝觀其降身聽命引咎告窮所謂君子見幾不俟終日苟非達識孰能若斯但以奮武興戎所以討不服惇信明義所以來遠人五帝三王盛德大業常用此道以正萬邦朕今躬統戎師龔行討伐告於郊廟社稷詢於將相公卿天誘其衷國無異論苟不能恢復外地申畫邊疆便議班師真同戲劇則何以光祖宗之烈厭士庶之心匪徒違天兼且咈衆但以淮南部內巳定六州廬壽濠黃大軍悉集指期克寸日拉朽焚枯其餘數城非足介意必若盡淮甸之土地為大國之提封猶是遠圖豈同迷復如此則江南吏卒悉遣放還江北軍民並當留住免違物類之性俾安鄉土之情至於削去尊稱願輸臣禮非無故事實有前規蕭察奉周不失附庸之道孫權事魏自同藩國之儀古也雖然今則不取但存帝號何爽歲寒倘堅事大之心終不迫人於險事實真慤詞匪枝游俟諸郡之悉來即大軍之立罷質於天地信若丹青我無彼欺爾無我詐言盡於此更不繁云苟曰未然請從茲絶竊以陽春在候庶務縈思願無廢於節宣更自期於愛重音塵匪遠風壤猶殊翹想所深勞於夢寐朕自類禡興師麾旄問罪絶長淮而電擊指建業以鷹揚旦夕之閒克捷相繼至若兵興之所自釁起之所來勝負之端倪戎甲之次第不勞盡諭必想具知近者金陵使人繼來行闕追悔前事委質大朝非無謝咎之辭亦有罷軍之請但以南邦之土地本中夏之封疆苟失克復之期大孤朝野之望巳興是役固不徒還必若自淮以南畫江為界盡歸中國猶是遠圖所云願為外臣乞比湖浙彼既服義朕豈忍人必當別議崇封待以殊禮凡爾將佐各盡乃心善為國家之謀勉擇恆久之利皇帝恭問江南國主劉承遇至賫到草表分割廬舒蘄黃等州畫江為界兼重曡見謝者頃逢多事莫通玉帛之歡適自近年遂搆干戈之役兩地之交兵未息蒸民之受弊斯多一昨再辱使人重尋前意將敦久要須盡縷陳今者承遇爰來封函復至請割州郡仍定封疆猥形信誓之辭備認始終之意既能如是又復何求邊陲頓靜於烟塵師旅便還於京闕永言欣慰深切誠懷其常潤一路及沿江兵棹今巳指揮抽退兼兩浙荊南水路將士各降詔示並令罷兵其廬黃蘄三路將士亦遣抽拔近內候彼中起揭逐處將員兵士及軍都家口了畢只請差人勾喚在彼將校交割州城所有江內舟船或慮上下須有往來巳指揮只令就北岸牽駕盡合披陳幸惟體認皇帝恭問江南國主煮海之利在彼海濱屬疆壤之初分慮供食之有闕江左諸軍素號繁饒然於川澤之閒舊無斥鹵之地曾承素旨常在所懷願均收積之餘以助軍旅之用皇帝恭問江南國主竊以道契昌隆撫有疆宇控朱方而定霸總澤國以稱雄五嶺三江風聲自遠重光奕世基構無窮不有奇傑之才孰副民庶之望朕猥以涼德奄宅中區接風壤以非遙幸馬牛之相及引領南望久渴徽猷果契素誠獲親高義一昨繼勞使介頻奉好音方在行朝未遑報命近還宮闕合遣軺車俾伸玉帛之歡少答歲寒之意朕居大寶之尊為萬邦之主體穹昊從人之意法禹湯罪己之心豁開襟懷昭示寰海方務協和之德豈忘曠蕩之恩載想融明諒應鑒認相次收到江南諸軍員寮兵士四千六百八十七人今並放歸皇帝致書恭問江南國主星聚湖關挺生英哲命世既崇於基構承家撫有於江山願寡昧之膺圖與君王之契協屬茲誕日遂舉舊章仍輟近臣往修國命導所懷於樂土期福履之無疆今差樞密承旨曹翰押生辰國信往彼到希見領皇帝致書恭問江南國主茲覩來章備形縟旨敘此日傳讓之意述向來高尚之心仍以數載巳來交兵不息爰陳追悔之事無非克責之詞雖古者省咎責躬因災致懼亦無以過也況君血氣方剛春秋鼎盛為一方之英主得百姓之歡心即今南北才通疆埸甫定是玉帛交馳之始乃干戈載戢之時豈可高謝君臨輕辭世務與其慕希夷之道孰若懷康濟之誠且天災流行國家代有昔之聖哲所不能逃苟盛德之日新斯景福之彌遠勉修政理勿倦經綸保高義於初終垂遠圖於家國流芳貽慶不亦美乎諒惟英敏必照誠懷帝諱宗訓世宗子廣順三年生顯德六年六月封梁王其月即位七年正月禪位於宋降封鄭王在位一年入宋十三年薨年二十一宋諡曰恭皇帝天生蒸民樹之司牧二帝推公而禪位三王乘時以革命其極一也豫末小子遭家不造人心巳去國命有歸咨爾歸德軍節度使前都點檢趙匡允稟上聖之姿有神武之略佐我高祖格於皇天逮事世宗功存納麓東征西怨厥績懋焉天地鬼神享於有德謳謠獄訟附於至仁應天順民法堯禪舜如釋重負豫其作賓嗚呼欽哉祗畏天命
