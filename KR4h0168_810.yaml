front:
  text: 全唐文欽定全唐文卷八百十司空圖四
  hash: sha256:d31da3d45a97a1953503aa02f9ab2fc1310ac30e309b184804c76630f27c4f17
body:
  text: 臣伏念天人之慶靜則統和於天化動則保定於中興莫不肇擁元符已濟昭登之德旁徵幽契亦伸叶佐之能內著彌綸外宣風績克延休命共贊昌期雖復地輔登皇星樞延聖八極柱斷鼇之表百靈趨駕象之塵信謂元方猶勤致乂至若錫戈祚土賜履專征止圖九合之威亦賴五臣之佐况頃者運屬履危時當戡難㝢縣尚搖於坱軌蜫蚊方駭於沸騰欲拯橫流是資傑出漢庭劍履名臣之禮秩皆優烟閣丹青上將之風稜如在我國家之御歷也厚恢周德寬富殷人蕩千古而獨駕雄圖掩八紘而同開壽域宏材構廈常扶不拔之基獷俗傾風盡仰升平之化皇帝明融睿作剛體乾行深研不測之機廣被無私之照常經多難時亦濯征掃氛沴於靈旗碎瓶罌於天斧文思緯俗廓貞觀之英圖神武定基符開元之大業克諧注意本在知臣叶風力以陳謨駕昆彭而騁績克綏中外保奉宗祧大順二年月日首議陟明纍宣恩詔以命河中節度使王重盈加檢校太傅兼中書令河汾蓄寶閥閲資祥代濟賢豪業傳詩禮自標奇瑋難藏豹蔚之姿本俟遭逢果振螭蟠之舉式膺妙簡允著宏規不有褒崇孰明獎勸且自古英達致用風範相殊政則以理為先化則以人為本雖或議參草昧名列循良集東觀之㣥儒皆令贊像推南山之汗簡盡使書勳尚有間然孰當全美道之必合聖亦罕言大易所謂窮神不言而速哲人所以垂訓不令而從蓋率以身先用如響應公幼推至性動必有方色養不違友于兼備在閨庭而惟謹處鄉里而無尢衛公靖幼實師儒寧妨勇烈英公績貴能事長果保宗良是乃化己行于人子也且移孝資忠自家移國信風行而草偃若傳命于置郵故亂離以前委寄即重效彰理劇誠著讓夷課實最於西河榮遂臨于分陝車未及境寇已陷城僵仆如邱烟埃翳日公乃唱大順振義聲招葺逋逃撫循瘡痏誅榛剃梗漸闢樂郊撲魅驅狸潛消沴氣檄馳東夏饋賑西師四海搖心盡攝鯨吞之勢重關失險獨當豕突之衝壯我金湯剖其牙角實挫滔天之暴非徒捍境之勤大寇既逃鄰封共慶遽求罷任本切歸寧堅避成功益彰傑操是乃化己行於人臣也且恤刑育物往哲至論於兵法之中亦叶道家之理雖戰同九地或於危地爭先術用八方乃以生門為上勿輕士類方保衆心盛衰之由寬猛可驗雄名震敵忌唯在於殺降隆德傳家慶本延於慎獄公明為照意在勝殘深防巧詆之文每用惟疑之典或有狂妄自掛網羅罪皆止于一身恩必加於百口神明洞感福佑宜鍾是乃化巳行於宰守也夫約己裕人招懷必信推誠體國嫌釁自平公實寬宏且無猜沮每示坦夷之道不行讒佞之言延納羇孤優容僚吏位雖益重謙則惟光泛愛皆周親仁每見賓賢備禮耆英盡綴於詞林將略求材劍㦸自森於武庫况路當衝要時犒師徒使車旁午於軍中將迎益至羽檄交馳於境上談笑忘疲志切匡扶義惟尊戴每承詔命若覲天顏亦常因拜飛章大集戎旅誓堅金石同報寵光保九重高枕之無憂絶五夜甘泉之有警內則頒宣朝旨外則鎮撫人心竟用綏和到今繄賴是乃化巳行於藩閫也且將圖豐逸必正本源侈與驕期莫能勝弊儉唯德固乃不移風苟曰聚人必先濟物公幼負四方之志家無一擲之資意氣所傾英豪共感今則欲均公用不樹私恩動有常規賞無濫費上勤時貢下贍軍須月未及於授衣士已欣於挾纊農商競勸役不奪時關市薄征肆無滯貨利每推於近盬惠豈計於傷威靡尚虛名多仍舊制雖風亭月觀不增遊玩之華而城雉軍營足壯藩方之氣均能勸勇儉足養廉誡滿持全居豐處約是乃化已行於閭里也率是五者施于一方薰為和氣屢致嘉祥故得疵癘不生豐登相繼自竄渡河之獸如驅避境之蝗禮讓俱興人有恥格征徭漸省俗賴歡康貨殖殷繁井閭填咽街無促步巷有安歌壯千葉之威稜冠三河之富盛關防旦啓誰候鳴雞徒侶宵行罕聞吠犬此蓋罔存小察唯總大綱用宏寬簡之規克贊雍熙之運景福元年正月上自將佐下逮緇黃五郡聯屬四封耆艾共欣宏庇請建生祠牢讓纍陳至誠難沮五月日都押衙録事參軍又詣讓軍使特進思猷請奏別立碑紀上亦俯從人願有命微臣伏以祀典闕文朝恩特允雖或徵於近史亦宜本於衆情丞相仁傑之撫疲羸僕射元振之安夷夏皆留盛躅孰繼美談豈不若峻峙在前人皆仰望洪流非遠日可窺臨所以別創祠堂嚴陳像設者蓋皆蒙美利并荷豐功願申報德之誠別置表虔之所且公抗衡右族著籍本州顯沂水之華宗煥晉陽之貴胄盤聯日下輝映關東前修則家牒流芳後嗣則卿材森列公先君勳華早振政績頻彰巳結義於鄉閭仍種恩於部伍永言積慶實異他門况元昆頃鎮河潼遠推表則仲弟鎮臨此地惠愛斯人季弟植性謙沖宣勞宿衛次子今陝州相國能傳善教大濟仁聲長子瓘故蒞平陽季子瑤今為慈牧并遵誥誡皆稟廉明諸子等庭列鐘林大笥傳組綬靡忘承家之訓方滋視履之祥而公又領蒲之初也深自竄伏過於推奉越人燻穴蓋虐求賢晉國乞盟始聞定難既抗言而誓衆方攬涕以登車里巷相歡風雲動色宸衷夙注寵詔遽臨致闔境之允洽固本朝之是衛况家豐光烈治陟殊尢流寓安得不歸士庶安得不感且自漢儀重整周室甫寧三畿則橫被隩區九鼎則深盤王氣山河益壯日月猶新心膂連營蓄雷霆於北落股肱重鎮寄柱石於東門允副分憂合膺異渥宜其恢宏棟宇瞻奉威容上顯聖慈下諧人欲極當時之盛美標抗古之殊榮美矣哉臣跡本寓居心非昧利久懷贊激竊聽謳謠奉眷獎於絲綸素慙鴻筆圖嘉庸於簡冊先琢貞珉方備編修敢辭紀述銘云貞符奉我誕命維唐跨轢三古牢籠萬方雲蒸日煦賮輦琛航基仁德厚祚德逾昌數有屯夷時嬰否隔海嶽搖蕩人祇憤激軒傒垂衣舜勤舞戚皆安寵利宜恤社稷殷憂將變興運有開涵濡動植揮斥雲雷地岌重正天旋更恢疇庸乃眷共致康哉寶鼎傳銘雄圖作固儀形九牧光昭百度威濟家聲功寧國步蒲人熙熙是禱是祠孰歌且舞童頂龎眉何以祝之祝公之福險夷不渝保是寵祿何以祝之祝公之壽左山右河惟公克守何以祝之祝公宴喜公樂之人如酒斯旨何以祝之祝公之安公安可久附衆惟寬公之報國人亦報公提嬰撫稚必敬必忠人之報公神亦報之拂災禦暴不流不移通衢共仰華搆崇之峩冠傑表煦物溫容蔚然喜氣靡若和風樹之可愛蒲之所賴帝慈允屬天鑒不昧條峯顏顏城在碑在夫爽貫五行粲星芒而騰列靈標萬彙挺人傑以降祥式贊鴻鈞乃符元感恆運絪縕之化潛融士冖䂞籥之和然而拂日貞松必生於喬嶽環天重器亦鑄于洪爐水積厚而脫鵬門愈高而容駟克蕃令緒固在華宗况自緱嶺上征姬邦委馭代為著姓人不乏賢或濟美于參墟或炳靈于沂水祥分鐵印系總璇源西晉殊勳則榮連邸第北朝雅望則地顯官婚貽謀各著于承家致用皆光其佐命朱輪華冕豈獨推恩甲令門風實先種德是資奕葉誰與提衡公諱縱字希聖太原祁人也曾祖某譽合貴遊跡追高矩冥鴻不失天爵逾優祖勗皇任潭州端氏縣令價重儒林行熟士範早推仁于宰字巳屬望于公台父載皇任檢校祕書少監贈少卿早振宏猷雅多奇節自激封侯之志欲垂濟代之名位鬱于時慶延其後宜鍾秀氣歷佐昌期公幼挺英姿夙彰傑操鎔金入用百汰唯精建木標奇千尋自植稟說禮敦詩之教蘊經文緯武之材欲紹家聲遂參戎右研精玉帳演祕金韜陰符必勝之機制于掌握敵國相吞之策決在毫釐氣蓋三河聲高六郡長慶初以力戰拜監察御史名藩振跡初加馭貴之榮憲府揚威更帖承華之秩太和九年授河中馬步都知兵馬使別選材官教成騎陳自茲出討所向無前開成宰相鄭公肅允屬鎮臨尢稱鑒略仰賢有素授任不疑擢奏馬步都虞候總中權之劇務示列國之上卿喜動旌旗威生里巷得人之盛他鎮罕儔會昌二年武宗以回紇纍葉憑驕緣邊扇酷久定掃平之計尢難將領之權既而蒲帥石公雄授命濯征總戎出塞公為都知兵馬使捐家誓報蓄鋭別營虜陳猶堅軍鋒稍壯未振鼓行之勢空稽廟算之籌公內決一奇中分千騎出徒間道擊若疾雷巳繼捷書方麾大斾豈俟排山之力乃成破竹之資火烈風驅震天駭地血滂大漠則澒洞傾河顱積高山則亘連絶塞單于傾種貴主還都克宣宗社之靈頓雪人祇之憤腥羶盡滌氛祲皆消萬里長城允膺朝寄九重高枕永殄國難粃糠麟閣之雄孰為上將贊頌龍庭之績彼獨何人上乃遣中貴人劉英侔賫詔慰勞自殿中侍御史超拜兼御史中丞太尉李公久秉大權素無濫賞倘非公論莫致驟遷又拜晉州司馬上黨興祅復提王旅太原崇亂兼領郡符授沁州刺史外訓驍雄內蘇疲瘵殊庸既顯善政亦聞擢邢州刺史充本州團練使山東叛命積年人為難理公揣情設教俗乃驟移禮讓既行閭里相勉旋當謝疾莫遂乞留驥路未伸雀羅無慍志詎忘于憂魯言恐及于平吳久之拜右龍武將軍仍知事環翼宸居僉諧宿德剗煩苛于積弊罷浮墮于竄名心膂所資貔貅自肅雖居中而持重每急病而讓夷宣宗皇帝以河隴陷戎祖宗遺憤將謀恢復翹注忠賢又屬鹽州守臣政失人和釁連羌部雅重專城之選仍當錯節之難公簡在宸衷對於便殿伏波強記備述山川充國勇行請圖方略仍授鹽州防禦使檢校常侍凋殘之後輯睦維艱虜交未固于解仇漢爵已頒于款塞兵農競勸夷夏肅齊既而間使行邊飛章言狀上乃臨軒歎激纍詔褒揚獨授中規希其重任繕魯州之堅壘食力兼儲資隴右之威聲墟郊漸闢和薰獷俗惠洽惸婺已彰拓境之勤即議疏封之賞方延渥澤別立雄藩而運鬱時來福虧冥報連中峯而嶽裂襲右將以星沈色慘朝端悼深宸極雖荊州罷市衡紀屢遷而蜀郡奉祠歌謠未息古之遺愛無以加焉咸通三年三月三日薨享年六十八理命具存憂邊是切益勵鑿楹之誡如傳鏤鼎之勳某月遷窆于某處附先塋禮也地啓佳城儀陳詔葬舞鶴既占于形勢謀龜乃兆于公侯封樹增嚴音容如在皆知世祀之必昌矣初大理府君娶于隴西李氏追贈隴西郡太君簪組聯華蘋蘩頌美公實為嫡嗣娶某郡石氏今封祁國太夫人四德兼崇六姻推敬早貽芳于閨範宜應禱于河靈保是鍾祥成其鼎貴五子長曰重章少稱豪爽深究韜鈐從擊胸奴著勞盟府歷諸衛將軍終威州刺史次曰重簡今任華州防禦使檢校兵馬尚書朗拔逸㣥惠和得衆左憑致捷宏略居多次曰重盈今任陝虢觀察使檢校左僕射沈幾中濟雅量外夷撫寧西河鎮靜東道次曰重榮今任河中節度使平章事明澄海鏡響震霜鐘體先覺以通奇應旁求而聘績錙銖王佐表映人宗自北府初援副車即持戎律外師謀入危城勢搖四鄰閉境以相觀一柱中天而獨立首排㣥議決策勤王賑贍諸郡指揮突將破連營以通西路質季弟而撫北軍同華既平關防盡闢繼納歸明之衆遽成克復之功羈制奸豪保安封守而又處勞期逸推俸僦徒環築解城峻增關壘舉無遺策動必中機巨極底寧議勳殊等次曰重益勇而知義和以秉謙履險不疑輸忠必竭以任子拜左千牛衛將軍初先公之捐館也清塵未遠儉節彌彰産薄一㕓家徒四壁太夫人保和安遺演訓擇鄰俾蹈前修皆能聳搆且及親之貴自古罕兼老萊則空耀彩衣多慚紱冕潘嶽則唯稱壽酒固乏鼎彞豈同大國進封高堂拜慶劉加二驥荀併八龍相印師壇共觀晝錦金相玉映各炫晨葩猶陳斷織之規寧軫倚門之念一女早適溫氏致克和于鄉族亦秉教于母儀而又慈訓諸孫蔚為令器亦升寵秩森列庭闈方傳帶勵之盟實冠古今之盛夫力攘大患顯致陰功則必降祐上元紹熙來裔永夷堅敵纍洽仁風果培樹善之基益遵勝殘之報司徒相公以豐功繼志異政傳芳褒崇致感于漏泉紀述欲先於表道謀刊懿烈辱命蕪詞合伸起敬之誠敢避非才之誚竊以祥渾流裔文武爭驅家牒雖分靈根共貫至公崇上宰績贊中興彼江右之蟬聯昔慙丕運我晉陽之龜組今煥盛時綿祚層瀾盍雕豐砥銘曰維德有融維賢克嗣禮法貽譽勳華命瑞雜躡芳塵紛綸寶氣武烈披顯儒風橫被績茂佐秦名高輔魏繼祖無忝圖徽罔墜天臨我唐瑞降文昌驅崦逸發駕浪雄張虹攄耀采雷震飛鋩英標激俗峻節凌霜研奇制變料敵摧強量吞巨壑威攝窮荒申命寶臣允茲薄伐壯志逾勵沈謀獨決日逐偷魂天驕浴血魚寶竄鼎蟻懼搜穴轒轀下碎攙搶上決利盡長驅聲稜有截我武惟揚我伐用張俾侯寵錫謁帝休光和如金石著在旗常內司環衛外峻巨防通班石室進秩銀璫臨機必斷視物如傷兩地輯綏五原惠愛禦侮材難開疆計大日駐麾戈雲橫出塞白虜迎降青羌自潰戒守益嚴資儲永賴轉軸摧旃揚旍委斾禎融積慶祚表垂仁綿休自遠啓映維新恭恭令嗣濟濟良臣名藩重寄暢轂文茵門交華㦸地鼓洪鈞推忠致主履孝榮親潤接靈長勝資磅礡此兆松阡昔圖烟閣漢詔騰褒夏卿薦渥林蔚逾繁源深不涸刊爾將來緬懷可作克濟寵珍永延懿鑠臣嘗跪讀貞觀政要伏覩太宗文皇帝即位之初每以為將致治平必先仁義在德賢而作乂乃錫祚而永延古治足徵格言可鑒豈不以化訓則易服威肅則難齊者哉然政教初張德刑具舉文衰則削將弊也其風必佻武瀆則危將亂也其政必暴始于厚俗方克濟和視今足以知昔矣聖唐照臨萬方韜軼三代固資天力實廓帝圖神靈蓄不測之威正朔被無垠之族皇帝中興昌運丕顯耿光洞德澤于六幽雲蒸其潤仰徽明于八表日煥其文內輔外藩而允諧上祇下肅而乃勸太平之祉可固矣乾寧元年上御便殿遂出鎮國監軍使董重彥所奏前後將吏軍人百姓僧道等懇請為其帥置生祠紀德政表章俾揚陟狀宜允衆情宰臣亦僉謂近鎮大臣諒能推心及物草因牢讓久蓋嘉庸宜徵托實之詞用著不嚴之治翼日遂下詔前戶部侍郎司空圖條次所上刊示無窮謹按華州節度使太尉穎川郡王許昌人也汝穎標奇勳華襲煥偉登壇而挺佐壯柱國以連榮間氣迥鍾英材卓振鎮為岑鼎用作雄鋩志不急于封侯誓惟堅于效節纍陳祕策俄領偏師潔身而遽出險中振跡而旋歸行在詳觀機變乃控河潼既申匡復之謀實顯肅清之效師徒自輯都邑晏然大駕旋回宸衷乃眷撫綏益至疲瘵漸蘇初王之至任所也公署僅存人煙殆絶晝靜而狐狸傲視風驚而雞犬蔑聞王寢興匪寧吏士相勉山祇應禱膏澤以時稍實倉箱漸知禮義才逾朞月日復流移兒童沿路而不驚草木罹霜而亦潤關畿無阻旅次皆安汙萊盡闢甍宇兼培其新附土衆亦競課農桑凡資生聚莫不蕃息加墾公私田若干頃畜牧藝植亦皆稱足但三縣兵荒之後雖賴招懷數都節制之師必伸威略匪招懷何以附衆匪威略何以安人動則經戎靜則濟理餐和自化別為君子之營伏順無前亦有諸侯之劍其始王之入守京室也商州程景思乘虛掩襲欲恣攻凌公馳自青門戰于赤水其蔡軍臨陳翦滅驅係而王並解甲縱之明年春宗權復遣賊將圍逼陝郊虢州刺史張存背陝迎降旋又持疑搆隙遂密表請狀部伍據關捍敵曾未浹旬遽聞失守蔡將張琢席卷深入兵近五千王所統見軍不逾六百率先士卒盡殪凶渠不崇朝而復收州城自此藩方改觀矣又交鋒之暇恤物尢勤遺犢棄蠶皆令護養扶羸挈幼免復驚奔斯乃稔其庶富及天師北征招討使以繄仰請行指撝務重瀝懇固讓拜章纍陳竟慮上軫主憂久稽朝旨臨危不憚赴救遠征及向道阻艱物情沮撓猶嬰孤寨常保萬全前後獨當八十五陳擒戮五千餘衆并收奪堡塞七所而我軍未嘗敗衄王初欲事行旁無取濟至於糧仗皆自賫持及猜沮班師險夷著節所經千里不犯一毫竟能亘抵為梁楘旗振旅俾感撫循之德悉平憤激之心又屬楊復泰楊守亮之佐在興元密叶狂謀顯逆狀既連商略逾逼封畿王知嶽拒命不悛迎鋒立潰朝廷乃詢故實益委制臨巖險悉平農商庶悅及邠岐合勢梁漢須隙殘寇才奔凶威尚熾乃命都將選精鋭兵五百趂商州南鄙俾其捍禦授以機權奮少擊多排山壓卵魁渠折首支黨束身凡梟擒之外其所歸降並家屬尚數萬衆實資神算大振國威爵賞既行中外同慶遂冊太尉本郡王食邑若干戶王嘗謂滿能招損貴必期驕斡宰造之權無容入巧弭間離之隙莫若推誠誡在未能形于崇讓故自加相印太保及今封拜凡瀝懇數次上言無不至人以為煩朝旨莫回絲綸纍降鄰藩方睦勉諭萬端至于恭命之時猶切履冰之懼噫為臣為子安家固俟交修乃能爾訓推其錫類足以及人體忠貞則其道適同且非黨憂社稷則其心不隱意亦何尢內絶私嫌外周泛愛此又持政之難也致政僕射雖著義方罕於嚴訓王恭勤備至浣濯必親臨敵惟恐貽憂居常未曾掛慮怡顏侍膳局影修牆此又力行之難也識以濟才學而敏政退公齊慮開卷忘疲雅好咨詢尢敦名教每用通儒之術時開講禮之筵此又聳勸之難也洞達物情深涵雅度邪諛必照狷直皆容心稱自平毫端靡忒幕中取士必以精修麾下選材亦兼敦說舉無遺策用即成功此又鑒局之難也勝殘之本往哲所先聽訟之明片言立辨王自治軍蒞政才及壯年照忒揣情必研精慮司法吏乞常陳具獄縲囚等三數輩巳甘抵刑王察其深寃果驗真款所司考校奏陟殊尢不示威強惟修輯睦匪犬漢疑之好入無聲妓之娛惠不費于公財利不腴于私室以是訓服可行蠻貊又常滋種德非止恤刑危者不擠窮者必拯昭報果符于冥感嘉祥屢表于有年亦奉真宗庶能柔物慮苟希致福必將強斂于人唯申孝思自致精舍有詔褒慰仍賜陟屺為名而又創製都門崇嚴嶽廟僦徒繕壘賦食修營皆役不奪農悅能集事凡築新城若干尺增構營舍若干間架又添主客軍額若干人至乃上勤時貢下濟朝班每于均節之中須用方圓之術英規茂績輝爍古今昔周人之錫彤弓漢氏之刑白馬用昭信誓實賴匡扶故命歷之延更逾于定鼎山河之誓共慶于貽孫煦作春臺恢為壽域其間偶躔災數暫翳妖氛方搖發殺之機已屈爭衡之力糾踐土兵車之會敢瀆齊盟稽防風玉帛之期終嬰大戮况我國家仁敷行葦澤及漏泉協宣睿作之規茂對昭升之列運符幽贊賢為時生金石俱諧草方斤常並煥其或疇茲戡定別紀修良既允屬于當仁宜更標于刻石今據都押衙録事參軍等狀具言乞置生祠巳令罷請其制碑事王雖遵恩詔唯飾詞纍命賓僚致書申諭且道由屈已久則惟艱舉不避仇非徒禦怨言而必察孰敢隱情研深本在于防微慮禍莫先于輕敵靡忘慎恪方保初終以此持危自鍾全祉旁徵明哲載考聲猷久副宏慈果膺異獎臣僑居郡境備聽人謠雖乏潤色之功夙慕陽秋之旨今則虔承綸煥俾振寵光將致不刊敢濱溢美抑太華捧天之跡力可扶危縈渭川潮海之瀾人知注意竊惟尊戴克盡褒揚庶用永孚斯為炯戒銘曰天視唐德丕祐一人克文惟睿克武惟神乃戡乃乂自我憂勤興運巳固萬國益親有君有臣內祇外肅載庸碩勳以輔以牧惟此戎藩控臨近服惟此韓王華人之福既忠既孝上行下效靡剛靡柔惟王之教王之士伍化王仁勇鼓之而抃賞之如恐王之農夫化王勤瘁乃積而輸乃糧而峙王之吏屬化王明恕察而不煩嚴而不暴王之賓朋化王德義惟窮是恤惟善是富王之親鄰化王服儉人有羸財官惡橫斂王之僑寓化王悅古蚤夜孜孜里如鄒魯匪勵匪率孰濟厥庸匪誠匪藎孰表厥衷華郛惟鄭郭氏舊鄉始終敬慎千古汾陽誰克繼之兢兢韓王明宜祥發興國無疆碑于道周于王何有銘于王心而后可久儒臣奉詔俾圖不朽永保休光在王克守嘗覽淑德之傳多矣其有存所以保千鍾之養歿所以固九族之安始著宜家終由訓子遂致忠資報國叶宗社以貽休憂不貽親指山河而獻壽永惟作範必在擇鄰今見之于太傅相公王公矣夫人姓石氏其先樂陵人也積德濬源疏封命氏勳華相煥名教所宗碏著義方騰褒魯史慶稱醇謹作表漢廷武則西晉元功文則東都勝會門資天爵代有人豪曾祖士端信洽州邦聲高河朔雖抱不侯之憤巳呈展驥之姿紫蓋干霄青萍溢匣早膺曳裾之選實惟拯物之仁父獻直岑鼎傳銘雕戈錫祚拔聊城而騁辨倒趙幟以標奇上略攻心敵自窮于術內雄藩踠足位實冠于軍中娶某氏夫人生稟間華動循禮法父兄加敬閨閫肅然字必待于勝笄聘已徵于鳴鳳來歸于我鹽州常侍公纍更劇郡兼總貞師臨危無暇于憂家抗志唯聞于辭第夫人恭勤自始輔佐必伸柔以濟剛儉能周給表齊眉之敬我在得忠成克已之名公非無助及哀當晝哭室乃磬懸萬里爰歸諸孤未立共誓食貧之旨惟懷均養之慈有令子五人長曰重章皇威州刺史志殄國仇威清塞表仲子重簡皇華州節度使贈司空化高列嶽功顯本朝季子重盈今任河中節度使嶽立一方波澄萬里潛施和煦則闔境皆蘇洞感神明而亂根自翦振家聲以光前烈獎京室以定中興益著恩威方膺倚注次子重榮皇河中節度使贈太師允集大勳以光前烈次子重益居常唯謹履險不疑並稟教母師嚴申子道克濟高門之慶亦符外族之禎及巨寇長驅橫流孰拯太傅相公首臨分陝太師旋鎮河中司空亦作牧華州共勤王事皆遵勉勵大濟艱難由是中使褒崇冊封祁國太夫人特彰禮秩之優纍降珍華之錫而陝華與蒲各持龍節遞陟鴒原每屬歲時競先迎養宗姻列侍士庶聳觀三鎮旌旗出導潘園之樂一門鼎鉉入調殷飪之滋福履既豐善基彌固而諸孫顯達者威州僕射之子某司空院某宏材入用逸氣超㣥太傅相公長子故晉州刺史瓘洞究韜鈴兼明吏理次子今任陝州節度使珙庭挺為端表隱若長城又次子檢校僕射瑤禮備趨庭謙光待士太師院三子皆葆和自晦樂善相成共宏襲搆之規不忘折笄之試蕃衍盈盛古今罕儔豈同曹氏紀行惟觀宰邑穎州列會徒仰聚星慈仁之報宜哉溫凊之榮極矣光啓丙午歲八月二日薨于興教里第年八十有二期頤克享飲膳稍違方當棄養之辰猶切防危之慮風雲變色里巷纒悲詔自行朝進封燕國太夫人初太傅相公遠奔喪次俄逼衆情金革從權苴麻終制運頻遷于星籥用方叶于蓍龜孝思罔極號奉先違以龍紀元年十月遷祔于河東縣某里琅琊公之塋禮也同盟致享備物充庭蔣欽之帷帳重新傅氏之威儀特盛眠牛勝地兆克繼于公侯弔鶴殊祥事更傳于簡冊所以光昭懿範表識元扃猥屬短才不容牢讓仰閨儀之作則盍揭貞標愧墨客之摛詞徒列幽碣銘曰飛星降彩德水流璜發于二姓兆彼百祥貴游標譽賢媛流芳同蠲嚴祀備養高堂敵傾秦晉好睦潘楊充閭必顯昭社宜昌四德具修六宗皆慶纂組雖工紛華靡竟孀室栖貧真空喻性辛謝徽柔班慙韜映勗以輸忠資其積慶御府移珍天錫人命五家邑里五子封疆通衢賜第異姓稱王三牲上膳萬石奉觴庭羅鼎綬室纍銀璜追軒咽軌駐日回光兒童意氣旌斾飛揚榮冠一時報臻五福達惟體順歸寧改卜拱樹高低連岡起伏孝子終禮行人望哭哀樂周環短修同躅永閟珈珮空彰明淑雖谷變而陵遷兮信惟蘭而與菊公諱凝字成庶太原人禮法冠昏著于雅族國朝忠惠公克振農烈而河東衡州皆德優位下宜其集祉于當世也公幼孤英發有神檢整襟受業瑞氣鬱然㣥輩莫敢輕狎相公鄭公肅實公舅也一見聳異命子約為師友孝愛識度宜其大成年十五舉孝廉上第其為文根六經必先勸試著都邑六岡銘益振時譽魏相國扶主貢籍選中甲科崔公操首辟鹺府周相國墀鎮東蜀裴公休廉問宣城操幣者交于門視其所知知其立矣崔公龜從入相拜鄠縣尉校理集賢孔公溫業鎮宣州辟為上介韋公有翼初為御史丞盛選僚屬公首狀拜監察會鄂州鹽鐵使贓狀上聞有力者持為滯獄公馳傳即訊涉旬辨決轉殿中侍御史崔魏公出撫淮甸奏為節度判官始以省秩命服似助準的著之美談崔太保慎由浙西又拜徵左史而大誇得人之盛遷禮部員外宣宗朝嘗待制獨被顧問正色讜言不附權戚及內署進擬竟為所擠歷兵部考功員外前史稱第一流必為第一官唯公資望人謂無愧轉司封郎中相國蕭公置判版籍請公分佐其務俄拜長安令政無私撓奸猾革心鄭公處誨總憲綱公以考功郎中知雜事不示峻厲僚吏自肅相國夏侯公用為中書舍人旋以同列或非清議遂移疾乞免拜同州防禦使兼御史中丞賜金紫勵精為治表率列城吏民守闕乞留遮道宰相言狀上降璽書褒允竟謝疾葺居華下中外之議謂公不司文柄為朝廷闕政竟拜禮部侍郎韋澄邁在內廷懸入相之勢其弟保殷干進自謂殊等不疑黨附者又方據權亦多請託攘臂傲視人為寒心公顯言拒絶及榜出沸騰以為近朝難事噫仁人之勇其可力奪哉久之時宰竟用抗己內不能平遂至商於之命尚書御史大夫以塞㣥議商病屬邑頗濱於都主吏驟更破産而不給南鄙山阻屬役尢難公俾相資贍得以均濟又治賦羡銀例皆推估以優俸公命即賫月市驛駟橫擾既絶謠訟溢境明年加檢校常侍廉問湖外理潭如商罔不慰悅先是內外使臣自江陵理棹則緣境數州皆弊挽舟之役公舉奏條約結官緡以僦水工自是行役不淹人遂安逸又支郡牧守選用素輕小大之獄不能專斷繫驗往復動涉歲時公命擢法以降得自裁決苟或滯寃方許詣府陳理奸絶宿稔政賴滌煩此皆勤恤之尢者也上初即位講求名德徵拜兵部侍郎至京未幾以本官判鹽鐵峻望所服科條自振征挽之入歲中兼倍然賦財制用不可以私干當路者多不便遂以祕書監分務生徒有言于洛下者公神意無忤且曰吾豈受其任而怠其事者耶幸非得罪于君耳何憾既更歲持權者以公論所歸遂將復用遂以大河南綴之內園吏士冖䂞奸傲法人不聊生公捕伏辜都下震肅初汴州黑風之變帑藏一空今滑士冖䂞中令雖持軍有術力且不振時公方領鹺務因詔旨遂使便宜以漕米二萬石立賑懸給及中令復大柄推功上前且行陟勸之典乃加檢校禮部尚書按察宣歙池三郡公即治未朞人知化矣既而賊黨濟自九江且將入屠至德公命偏將樊儔扼險以候繼儔違命輕進遂斬之以徇令既必行人亦自固淮南環其境皆為盜有公命強弩據采石陳斾以為聲援次將馬頻又以舟師乘夜鼓譟立解和州之圍明年凶渠復大入而都將王涓亦自永陽赴敵公宴勞加禮且諭曰盜匿詐情吾盡得之緩則抵虛以自張急則始降而脫死無他謀也今席勝益驕謂吾城不勞而可綴奮臂而可東前無絙髮之礙若知吾堅壁待之其勢自衄將軍第按甲稔威以伺其隙慎無與之驟戰也涓意鋭自州日趨四舍至南陵未會食而陳遂死之明日中貴人復斂敗卒尚四五千人傷痛之聲與塵埃相雜而至江南雅自怯獨幸北軍以為援乃聞涓敗相顧失色賴公前策涓不足恃拒守益嚴又城下水乏而泉自躍出人心不搖竟免攻圍之患其後日夕撫循常若盜復至者先是有星直寢廷而墜術者謂保境之勞足以暴列于上因遂請告災變可攘公曰東南國用所資宣為其屏吾遽規脫禍則一方尚何賴哉誓與此城相存亡矣勿復為言竟寢疾猶日請監軍使親授規謀以虞侵軼其儲蓄繕完之利到今賴焉乾符五年八月七日薨于位享年五十八上震悼輟朝發使臨弔贈吏部尚書惟公博厚深宏端潔明懿極天人之儀品不陷于浮挺文學之宗師不炫其價儉惟國寶身革時風訓閨門以孝慈育生靈以仁惠固已彰彰于四海奚俟贊揚而後顯哉或曰近古所謂清賢止于乘德秉彞高拱以服物蓋謂徵其材則浼其譽今王公聲望足以貽于信史而狀之所述先必功實損益之效豈相補哉愚曰君子踐修以溉其本耳其外力或可濟豈知之而不為公以是志其大者非汲汲于致用也斯可蓋乎圖忝跡門下義服終始兢命撰德唯以漏略為愧易名有典敢俟至公竊以修名校德非無可久之規稽實圖芳亦在飾終之典恭惟故府尚書王公標延雅道藻耀儒林業裕匡時仁周濟物洛下則神仙元禮威振邊陲江南則談笑謝公勳高冊府必宏聲價未浼風華中外具瞻淺深莫際方啓釣川之兆俄纒罷市之悲慤實不彰清塵遽遠褒揚未盡增一字而何慚聳勸可神登九原而如在共仰推公之志敢忘報效之心克振彞章必光僉議謹狀容成侯金炯者本蜀郡嚴道人附山而居同族中多見搜採其先因秦時調發詣尚方輸作世苦之乃誡子孫易其服色必以清厲自進後徙居上洛會郡中盧生范生皆傳修煉之術委質相資因砥磨以致用上聞而器之召見嘉其鑒局且謂毫髮無隱屢顧之歷試臺閣號為明達挾奸邪以事上者見之膽栗輒自披露至於婦人女子媚惑之態亦不能掩也其察察如此是雖造物無私圓方不礙然疵陋者終惡忌積毀於上以為背面不相副炯亦自病於狹中不能以塵垢混其跡也竟被擯斥後亟有月蝕之變時宮中漏下數刻上臨軒念其規益復急召俾其道所以然者扣之響應不疲上異焉命以容成侯奉朝請而宗人派別於廣陵者炫飾求售陷為輕薄于權戚中或嫵然自喜則狎玩不厭至或被以組繡蓋便其俯仰取容雖穿鼻服役亦無恥耳既稍進炯又鄙其為人乃復以讒廢歸老於家太史公曰炯之遠祖當軒轅時以化服于祝融氏得薦於上能強記天象地形草木蟲介萬殊之狀皆視諸掌握蓋其術亦規摹於洪範耳物怪遇之莫不揣息自廢後益親幸上晨興必先至則與冠冕者偕進號為壽光先生不名也子孫雖下衰然流寓太原者始尚元亦以精鍊見重觀炯雖任用兢兢惟恐失墜不善晦匿果為邪醜所嫉幾不能免噫大雅君子既明且哲以保其身難矣哉段章者不知何許人咸通十年吾中第在京章以自僦為馭者亦無異於他傭也夏歸蒲久之力不足以賙給乃謝去廣明庚子歲冬十二月寇犯京愚居崇義里九日自里豪楊瓊所轉匿常平廩下將出㣥盜繼至有擁戈拒門者熟視良久乃就持吾手曰某段章也係虜而來未能自脫然顧懷優養之仁今乃相遇天也某所主張將軍喜下士且幸偕往通他不且仆藉於廾車辰中矣愚誓不以辱章惘然泣下導至通衢即別去愚因此得自開遠門宵遁至咸陽橋復榜者韓鈞濟之乃抵鄠縣贊曰時方治平士君子足以相濟而禍亂之作必厮役者乃能脫事患古人所以安不易危耳且章之服役吾待以常傭耳及濱于死竟賴其義而獲免安知他日吾屬報及其所奉果致不愧于爾曹耶乃志于篇期以自警云河南竇氏朝邑令畢某之妻也四年秋同民叛其帥李瑭瑭走蒲令挈其拏竄望仙里既夕盜作乃仇家也捽令壞其首志必死之令妻蔽捍泣且拜益急乃持其袂重傷猶不置令竊視竟得逃匿而免里人列狀於府賚之酒帛醫亦馳乘而至幾死者數矣逮逾月方克偕全愚寓居渭濱得備聞於里中梁生生言操史牘者苟當和平紀王庭琛瑞之美誠幸矣然傑異之操化導宗族里閭俾男必為貞夫女必為烈婦是有國有家皆賴之豈徒炫於視聽哉愚以為知言乃著其事贊曰蓄千金之資雖止憂患尚有不安其息哉况蹈危觸難何以相保哉且婦人女子扣盎足以駭之而白刃之下獨不顧死以免其夫是果能一於所從而不悔者也豈化漸之有所自耶吾知為臣為妾者必繼有其人免貽史氏之愧矣
