front:
  text: 全唐文欽定全唐文卷七百三十六沈亞之三
  hash: sha256:730244706343008101e18447010fe1d82126966ff82915cfa0b8cf97813f5018
body:
  text: 元和四年三月五日杭州報恩寺長老與其鄉閭父子將徙故佛像歸復於其寺佛至乃饗長老使白其由於亞之而求詳録焉沈子曰西域之有佛教流於東域中者其教像法其法者名曰佛自稱曰天人師又曰世尊出其言亦曰經驗其經之說佛去世而後模其形焉像其真與衆瞻仰之故法之言像由斯也其或範金鐵以為之合土木以為之堅之以脂膠飾之以丹漆五色然後形神儼然成其像舉其數體有為尊而坐者有為卑而拱立者有跪而如受教諭者有執樂而絃者吹者有具其形怪荷戈而勉強者有瞋目而咤叱者摹鬼神焉此為像之外者也其性之旨為戒慎正邪去惡為濟渡力道盲聾警沉溺使民無不善如我仁誼慈惠然此為像之內者也又說有已來之生來生之後為福則福應為禍則禍應因緣化而設其旨或由是舉域大敬自天子達於庶人一信佛之來於今八百餘年矣其間亦時神怪焉先天中其寺之佛事具足如向之稱者無何水火災生民流沉溺於是邦其寺之佛事卑而拱立者跪如受教諭者執樂而絃者吹者衛而荷戈叱咤者皆毀也散其宇皆落唯尊而坐者獨巋焉而存由是納去又重其莊敬焉數歲其鄉人後生敵惡者十誡其三四故此鄉之人思其功力復求而歸之與其敵惡誡而敬順之道明矣嗟乎忠信仁誼不舒信於人久矣而皆以已生來生之後因緣禍福之說化行焉今豫因長老請豫記移佛之由遂得道教之所以意者欲使㣥生隨其機以悟之其機高者其性慧見其內像而內覺發其心而能至其正其機下者其性回見其外變而外覺反其心而後歸其正是故精粗其內外之像以陳之皇都左輔其屬縣朝邑縣令王鄆言能改作便民嘗有緇衣遷寺戒業民不便鄆復之初蒲寇李懷光既虜其屬將收其散卒聚之長春宮城圜朝邑室廬皆殘燼寺宇益毀其後緇衣以為居近郭苦遊賓乃聚黨與謀遷之西岡縈垣侵社地又治殿廡諸墓墳隴當其下者輒平去是時鄆為尉固止之緇衣之魁得他吏與交通為助故尉終不能制日縱其徒於民間為禍福語以動惑之民無老幼男女爭相率以奉所欲顧畏已後耳及鄆為令乃元和七年也明年召緇衣宿老師弟子與語曰緇衣之道非能逾仁誼以無害故天子許留國中前者緇衣無狀徙其居西岡之上侵社地壞邱隴夫社國之尊祭也邱冢人之反本也今而曹自為其居侵壞之是寧無害耶某昔爭之不得身常栗栗抱痛願得自劾以快意今能亟復之幸善不能亦且論繁矣民聞之皆大喜故以其年十一月悉還其故九年豫東適邯鄲走蒲關朝邑令為具既酣前奉酒於豫因請以其事次於文尉之曹兵法居末兵法之任在天下郡首長之臣且難其理而况畿之在尉乎櫟陽其瘠沃相半豪戶寒農之居三分以計而豪有二焉其父子昆弟皆卒名南北東西軍圜衛雜幸之恃或籍書從事星臺樂局織館雕坊禽兒膳者之附而又媵女為之盤絡是多類者非獨不得為縣民之衆馭之而已亦且馮緣蔓橫以業吞漁獄之所操動繫於此而禁局強曹垂攀於前援者持符以解之固能移情以二法使終決不必理從高級下相承而邪而不能竟者尤還於尉其受役惟單産孱民日徵之一人輸徑宮門至於內廡遞漏嚴夜給事諸王家及池園大廄皆校尉遣之豈尉之無慮也永貞前諸畿自進士而得尉而升班者十六七他入之尉而升者百一二是尉皆摩心清視以事察決用以此自價朝之末以此市若是今雖統曹不能強尉於無當近世恩臣負幸惡其踵進自致即白上約下以為尉未足拜且塞譽排能使升班之恩必有自令視尉之風益賤而今益輕矣由觀為尉者俯俯自度民之吞者肆其懲弱者甘其困姦者隟其欺邑是者畏其為尤屬而決之其兵法之原使無撓濁其易乎哉其易乎哉古者盤盂有書蓋誡其當器受量不陷也鐘磬必銘勗其全聲有待也鑄鼎記刑子産之為也尉也兵法之曹類此不復矣敢不有記故附署而屬誡焉盩厔道巴漢三蜀南極山不盡三十里北沮渭短長之補於南而近其野半為澤麓故鼠倚穡而居雖善捕伐不能無傷於稼說者以為漢孝武帝嘗夜出射熊於是而田人輒留執帝從者由此觀之民情阻狠古為難理時猶逼畏指諫即稍罷然佞臣竟以帝恥不忘遂籍民人田為五五柞長楊矣今又徙甌越卒留戍邑中神策亦屯兵角居俱稱護甸而三蜀移民游手其閒市閭雜業者多於縣人十九趨農桑業者十五又有太子家田及竹囿皆募其傭藝之由是奸民豪農頗輸名買橫緩急以自蔽匿民冒名欺偷浮詐相樛雖賢宰處之而丞與曹或不類莫能盡枉直之情也夫丞之職也贊宰之政以條諸曹其有不便於民者丞能得不可今丞也余從祖居之既滿歲民諍不作如此則宰之所宰丞之所贊可謂知方也已長慶初余思相如進諫之風南歷長陽至於射熊五柞訪其遺迹因退舍是邑遂悉論山川里俗之事題於丞之署云便署所以接賓也櫟陽岐諸陵走左輔蒲太原燕趙魏山東至於胸奴雜虜之道而諸侯使者及戎王聘貢之臣交馳出是無虛日而邑頗瘠于擾費然而遊宦客子出入往來者則公賓為寡也夕館而晝饌自宰丞簿尉或不能支於給饋而賓去嘗悒悒不快長慶初燕趙魏侯者失理卒亂辱殺之更自立新帥大臣皆進意請討圜其境之諸侯咸會兵襲戰飛蹄走轡之奏傳呼相追而又降嫁胸奴中故使者日至若是宜謂私賓不能加也然又遣使陳蔡許滑大梁彭城皆發卒戌河北督責米帛於兩江之閒使百郡所挽無西入由是天子之使出入潼關者日數十輩大者乘馬至百小者不下十餘郵馬盡死於道凡往來乘馬畜者無問其誰皆奪之故遊宦客子俱輳道櫟陽中計其衆寡復與公賓之數相高矣是時櫟陽丞當公主降胸奴女使及迎者之部千人天子使後宮貴御行餞於道侍嫁大臣從官衛士亦數千人夕頓田氏遣丞供奉具以能不擾民一縣之吏稱善辦及歸乃計曰夫遊賓四時之來獨夏其一作而為稀耳我且與理一署使其密溫禮以待之然後以為家之給與賓僕相等是寧有忿一作忽賓哉既以賓之來者視其館之窮罄雖勇寒猛餒必抱愧自饜於所饗嗟呼隆否之跡由夫履也其構在公堂之左一作右正寢西南隅其形類廂二閒覆廈於南陲其就在長慶元年八月甲子也國家自誅叛以來於今十年征徭息繁不勝於籍租榷之法居閒為民起橫縣令不得專以子養之化理之蒲鹽田居解邑下歲出利流給雍洛二都三十郡其所會貿皆天下豪商猾估而奸吏踵起則解之為縣益不能等於他縣矣鹽田主官用郎吏其佐二下不出御史操法繩縻十九關於縣令而不得專但奉府曹侯長之教而已鹽田細吏皆縣民其田園雖業籍於縣而令不得親但以縣民之衆馭之而已若是為令與尤悔日爭焉苟非智良不能日脫於橫今令者豫之從祖也且滿歲而尤不及豈其厚於智乎而又招亡民還業者數百至於公堂便館葺飾者凡十餘構工不勞民又何多方也長慶二年豫客其地因受命而著一作書記云國朝設官無高卑皆以職授任不職而居任者獨參軍焉觀其意蓋欲以清人賢胄之子弟將命試任使以雅地出一作任之耳不然何優然曠養之如此其差高下則以五府六雅一作雄為之次第蒲河中界三京左雍三百里且以天子在雍故其地益雄調吏者必以其人授焉噫今之衆官多失職不失其本者亦獨參軍焉長慶二年余客蒲河中城一作府某參軍某族世皆清胄又與始命之意不失矣乃相與請余記職官之本於其署渭水東附河輸流逶迤於帝垣之後倚垣而跨為梁者三名分中東西天廩居最東內淮江之粟而㣥曹百衛於是仰給惟平輕重之準為難即主官不職其咎何如哉長慶中得儒臣杜生以行御史主之能謹法整吏絶輕出重入之尤明量信叙無先貴後賤之弊故官曹士衛之所仰給者如取之家食焉居再歲加為外郎因指其署曰夫渭津傍控甸邑諸陵道左輔出入河東藩而公賓游士過必臨我我儒世家也宜飾宇俟賢以誠其敬今公齊陋冗無足為禮於是盡去之募市其傑棟巨楹文梁徑桷既已具構顧其中可叙百榻而儒良至者必與講談其道隨其能否而梯級之得久留其下者雖孱車弊衣則名日彰矣今觀渭津之創開署宇為嚴虛廣敞意者得無欲天下之士見其胸中之曠大乎戰國南北書更言故世諸豪爭據於壽春或兵至百萬有不能得者豈地勢為要津乎自建中以來淮夷窟叛於蔡天子之詔或討或赦由是壽春備為東塞矣為之守者皆佩將軍印募府符書之設擬於方鎮而有副使之官焉元和中韋公武以殿中侍御史為之九年秋蔡州叛壽春守令狐通引兵屯霍邱副使得孱卒百餘人留郡中冬蔡兵大入馬塘寇鄧家城殺其將卒五千餘人盡虜民男女焚壞邑室而去郡中驚駭民人多流其家而東副使因言壽春其地塹水四絡南有淠西遮淮潁東有淝下以北注激而回為西流環郛而濬入於淮此天與險於是也假如愚民能棄其業西流即為蓬徙鹿走耳安與國是為利耶乃出家奴與民戶一丁俱為水工决安豐已南陂池會其流於城傍野中浸注如澤以故居民流心稍稍復定時馬塘鄧家城既陷霍邱方畏寇乘其虛復飛語為謠以惑其俗曰狐死首邱井閭多傳言之耆老曰果守不能保是矣守聞之益恐遂棄其城亡歸是日霍邱焚行未及郡會日暮使吏馳告副使以歸狀令得夜開壁吏至壁卒捍關不得入呼罵其卒副使立城上曰某得命於詔城晝受即晝復之今守獨入而卒露無為也如驅與俱來寧不知盜居其閒得夜則禍成矣或幸止於郵平明闢關介士陳兵夾道驗其號以入卒無敢越伍而趨居有頃守謫去詔以李將軍代將軍西出強兵臨萬勝城復以副使掌留事明年陟其能得加侍御史是歲亞之東觀戰至壽春得副使之跡題之於署下以記行事之時云昔制戎於西安瀚海之時而隴汧去塞萬三千里其處內居安如此朝之命守猶以為重地必拔其良能當時之務其難者不過理寵門大家之田園陂池而已觀升平之基其需賢如此今自上邽清水已西六鎮五十郡既失地地為戎田城為戎固人為戎奴婢顧隴涇鹽靈皆列為極塞而隴益為國路凡戎使往來者必出此視其守由主人也其言語威儀豈容易而處近世者朝之命守殆未能注意耳今清河崔公承寵世仕安西軍司馬公生長於戎然而神性傑異行賢智之路頗通諸書又能博九州山川之理而國中之士知而仰者無幾人近歲西戎纍款塞前年今上即位欲以姻交北虜以輔中國上書兩言蕃之事天子覽書以為必能伺戎夷之情故命使之今年拜守隴州拜之日朝之卿士咸謂隴之得賢為賀居郡而戎來者必憚愛而去嗚呼何向之命守未能注意而今之郡守得其人賢何向之知者無幾而今之稱者盈朝豈一郡之事有時而理耶一郡之人有時而幸耶智者之道有時而用耶長慶初余西視戎至於隴下聞郡人之所美故列署而刻記焉今天下邦郡之望莫與太華等然而公堂宴臺無別位顧几硯與餼樂之具日更廢置於其閒寧地勢之要為守者無久留於任而經慮莫及此乎隴西公為守未滿歲郡中既治因窺其庶屋可攻一作改者乃先問其吏曰政之為困何始也吏曰纍更其守耳公曰吏知其病哉夫几硯者公事之重器也以宴而遷以一作徹宴而復則居不得常屢更其所政之為困不由此耶且吏入公門望其居則必莊是几硯之處宜其嚴也今朝徹而暮置事之者既勞固以慢矣而况酒行樂作婦女列坐優者與詼諧搖笑譏左右侍立或銜哂壞容不可罪也夫狎久則不敬豈吾之獨患其吏亦醜之明日解冗宇一構於正寢西南隅塹其外數步土基之飾故材以輳用垢者磨其淄弱者承其輕決流於其所以便塗者補棟續楹不涉旬而功就沼沚之湄隨而比矣嗟乎轉疣為安不費而功吾知其由人長慶元年四月甲子吳興沈亞之仰公之跡因請張文其下紀其功焉國家始以輸邊儲塞不足於用遂以鹽鐵榷估為助使吏曹計其入於郡縣近利之地得為院鹽場之署以差高下之等顧杭州雖一場耳然則南派巨流走閩禺甌越之賓貨而鹽魚大賈所來交會每歲官入三十六萬千計近歲淮河之閒頗聞其費自是汲利之官益重矣前年京兆韋子諒官始縣主簿有能名及秩謝當歸是時尚書職方郎崔稜為揚子留後使聞其行遂邀署之既到滿歲利榷大登吏無敢怠與其為縣主簿加勤也或謂亞之學史詞無苟故用是記焉謫掾沈亞之廨居負江方葦為牆止於隄防之下堂序四闢巽隅道門雖江風奔怒鷗漾鷺澡顧檐廡之閒而拏緒不發方暑即盡提枕簟假庥於佛域之中雖緇衣煩厭乃陽為不省也一日謀廨其西廂將面水以敞之而筆吏王扃前語之曰掾俸簞而食或不能給尚能及堂屋之為乎且廨宇非久託即更之得不為尤乎况葦茅之葺輕弱易腐人人動歷歲時寧任再滿所用直使罄裝人併食以為之無所顧則郢壞阜磔而澤游木生多不能材漢流聳急朿木代寡上縱有必修巨闕重價又不當是用曷若無易其故歟亞之曰誠爾也然則吾以為肝者膽附庸其中為棲魂之館故能專視而佐意隨姿而啓情今漢流右吾之居不過數步壅擁之患不得日覩由鄰顏冉而不親其德也吾何能薄其實而厚其浮哉遂召工人庸人茅塗之者與計之磨淄洗故得充用者十五太守聞之與其薪十四其餘則搜剪補輔然後配材就搆雖細短不委各輻輳以任一棟七柱助柢楣二桷覆廈狹廡重左而單右若翅之將翔然蕉旗竹篲分植叢列為帚風篩月之餌方檻短折面江虛波炳嶂委霞影對綵紅碧幟捨奔給於所矚遠邇高卑龍若交黨為宵清曉爽之借暴陰色蒸雷扇蹈震神冶鼓焰如金緪騰摎趠柔羽戉為颭燭揮鋩之駭蓊然頽雲若然漏曜倏閃態狀若笑若怒相為端緒馮坐之中足以自廣時太和五年五月十九日也汴水別河而東合於淮淮水東米帛之輸關中者也由此會入其所交販往來大賈豪商故物多遊利鹽鐵之臣亦署致其閒因擇官分曹以榷庶貨而部貢之吏盡令鹽鐵諸官校遣之疾徐用賞罰大梁彭城控兩河皆屯兵居卒食出官田而犬畝頗夾河與之俱東仰澤河流言其水溫而泥多肥比涇水四月農事作則爭為之派決而就所事視其源帛丿糸帛丿糸不能通槁葉矣天子以為兩地兵食所急不甚阻其欲舟艫曝滯相望其閒歲以為常而木文多敗裂自四月至七月舟傭食盡不能前元和九年隴西李稼為鹽鐵官掌淮口院病其涸滯思欲以為救而乃與揚子留使議之曰今閩越已西百郡所貢輳挽皆出於是而以炎天纍月之久滯於咫尺之地篙工諸傭盡其所儲不能賑十年之食只益奸偷耳幾或有終歲而不得返其家者今誠得十敖之倉列於所便以造出入計無憂也正月河冰始泮盡發所蓄而西六月之前虛廩以待東之至者如此則役者逸而弊何從生哉議定即以狀白得遂其便於是稼度泗土卑溼無堪地遂創庾於淮南都梁山十二年詔以誅蔡之師食窘促令鹽鐵所挽皆趨郾城下是時下淮南倉發舂吏計舂其工人曰舂材必櫟若榆吏欲令工就山林剪市之稼曰夫火方焚日將燋萬家當頃刻之閒雖得弊穢之器奮濁汚之波百夫汲而揚之立足滅患如曰不然我欲利其器待我柘桂之杓致滂沱之流操以救之彼言而後謀則然灰尚不可望而況全者今縣軍十萬旦暮不賑其為急也閒不容釐今待汝訪山求材然後用何異乎柘杓滂流之語耶其倉材所剪之餘大可以為臼小可以為杵長可以為杵之梁簿可以為䏶樞夾峙促命裁之即日而舂成百具其餘米與吏分辦之先以家奴就役次及㣥吏各有差所舂凡二十八萬石不涉旬俱得浮淮而西矣十三年夏泗水大災淮溢壞城邑民人逃水西岡夜多掠奪更相驚恐號呼而鹽鐵貨帛十餘萬乃囊之於布緘用吏名載與渡貨帛無遺尺乃納倉中不能盈一敖其餘皆蔭仕家之急時余過泗上得其事故與悉論善濟之方而著之以明其績閩城吻海而派江輔山以居先時無安沼平池為遊舟娛席之地而娉花媚竹散生擲華故酒笑酣視之晨而佳思莫極矣及高平公牧察之餘乃經度隟空之所因卑汚塹而岸之浦嶼環回之勢所造必勝㣥山左右瀉影浮秀者輳空而入十一月辛卯新池成明日軍副者亞之疾閒公延護軍及從事絃工吹師裾袖之曹游池而酒既坐謂軍副亞之曰吾疏汙隟以就此而海波朝夕盈來之候遞輪足給必為我狀而石之以期乎不朽軍副亞之不敢讓遂執卮俯船祭清于其流因祝且詞曰水能濁酒首冠五行波流已大有神為宰環塘縈縈為公藻鏡新池泱泱與地興祥嘉鯉鮐魴于水息昌饞鮞噓虺即水與死翡翠鵁鶄浴涘眠晴新蒲剪剪扇荷擎擎時未云來勞思乃馨柘槿紺竹滲縮醞沃延榮接姿以水為祿輔佑堙隍吐孕百福惟我公之明之通之智之忠保壽考兮與池之無窮軍副者亞之詞既復再拜跪卮奉壽於公前公大喜還列就坐以酒以歌日入而起昔者秦青之弟子韓娥從學久之以為能盡青之妙也即辭去青送之將訣且歌一歌而林籟振蕩再歌則行雲不流矣娥心乃裒然然韓娥亦能使逶迤之聲環梁而游凝塵奮飛微舞上下者三日不止能為人悲亦能為人喜其後漢武時協律李延年為新聲亦云能感動人至唐貞元元年洛陽金谷里有女子葉學歌於柳巷之下初與其曹十餘人居獨葉歌無等後為成都率家妓及率死復來長安中而轂下聲家聞其能咸與會唱次至葉當引弄及舉音則弦工吹師皆失職自廢既罷聲黨相謂約慎語無令人得聞知是時博陵大家子崔莒賢而自患其室饒乃曰吾緑組初秩寧宜厚畜以自封耶遂大置賓客門下縱樂與之遨遊極費無有所吝他日莒宴賓堂上樂屬因言曰有新聲葉者歌無倫請延之即乘小車詣莒莒且酣為一擲目作樂乃合韻奏緑腰俱矚葉曰幸終聲葉起與歌一解一坐盡眙是日歸莒莒沉浮長安數十年葉之價益露然以莒能善人而優曹亦歸之故卒得不貢聲禁中葉為人潔峭自處雖諧者百態爭笑於前未嘗換色元和六年莒從事岐公在朔方時余往謁焉會與公賓舍於郵在莒鄰夜聞其歌有一人坐泣甚悲良久復悅及卒聲而悲悅再三曰孰為之是欲吾不得自任耳明旦問其狀乃葉為也後莒復從岐公來彭城十年余過其居問葉安在曰近逝矣自趙璧李元馮世稱為知音之尤皆擅鼓弦及為余言葉之歌使其妙自備則音屬不知和矣嗚呼豈韓娥之嗣與惜其終莫有能繼其聲者故余著之欲其聞於後世云沂水北一百里有峴曰將軍甚靈民置祠於路左享之不已將軍曾為五郡牧常姓名元通因築城失主將意而斬之其尸數日不仆今有臺曰立尸臺西南有山曰鞍山山北有關謂之穆陵李師古不臣作鎮於此防遏不意元和初罷之西有沂山山有廟則東安公也沂州刺史每春自禱恩是山山有谷九十九所河分八曰沂曰汶汶東注沂南流入清道沂州山東南有山曰太平山頂平可八九十里頃歲有寇曾居之山北十餘里有樹五檀也邯鄲人妓婦李容子七夕祝織女作穿針戲取笤篁芙蓉雜致席上以望巧所降其夫以為沈下賢攻文又能創窈窕之思善感物態因請撰為情語以導所欲詞曰惟雲渚之晨秋兮天曠碧以凝暮懸韶桂於姹月泫明淚之清露即河房之將期儼龍輪以就馭恭聞司巧之多方妾修馨香以奉具竊獨溺於自私希靈娥之所付㻁一作羽碧凝其異質兮韻隆虹於霾霽假文羽於孔雀兮而使擅夫佳麗載雲蟬之重緌兮塗蠻金於綺篲細綃縷於藕腸兮差蓮跗以樣齒一作齒緻命纖爪之蟲絲兮裊檐機之夕綴是物之巧功善飾願賜妾於針紉也葩萼鬱於濃妍色多宜以善喜引纖吹於輕飇若將翔而復倚醉春光之流景播清香於萬里霓烟出乎無閒縹窈渺以斐亹若披若曳兮扯平林兮橫曉水襲霽旦之繁芬兮因隱映而增綺淡冉冉其冶容兮世無隱以偕此是物之巧容善態願委妾於態媚也短蒲狹涘兮曲溜溢鵁鶄鵷雛兮引乳娣戲音清諧兮蕩演曳牽游裾之低凝兮蔓春心於淇裔枯寒徑幹兮憶棄葉擺風叫夜兮留燥雪流韻淒澀兮泱咽吟夢語之漣漣感霜鐘之流越是物之巧音善感願付妾於管絃也郭昈郭航本不同族皆家平盧軍昈父珍岑天寶七年及第以舉進士與權臯著作同上第天寶末燕人叛雖以戮自是而齊趙之閒頗聞其強矣昈既壯能習先人所業復舉進士時權相國為禮部尚書書其所立欲擢之及聞家居非地即罷選歸而亦為師古所辟昈與故渤海人高鉥為等伍師古死師道代之復用鉥昈為從事有頃常山帥卒其卒請嗣帥未得命師道亦遣甲卒數千人北渡河屯平原以為顧望鉥昈相與議語謂燕蔡之侯初封欲令師道先為朝省以樹大功乃說曰傭有操鋤為人治稼者既勤穀滅稂歲得均穡至於傭子既專地自入其伍益相辦助或謂之語曰田人百畝成而餉之直幾半足以飽三冬之腹至於所取非任賴主人上廣且寬之則曰可苟設一旦篤其不奉亦奪矣是屬固不殍乎此借言於家人尚爾况傭於天子乎今河北之傭方責其專田君侯寧可以假非於不理者誠能此時因經圖以盡入其地親謁闕下則君侯之功莫可與等保餉世世雖孱孫亦終不奪豈不幸哉夫舉食於人當渴饑之望也一飯千金未足者不能十金及飫而進於前雖海陸備鼎顧與糠籺齒尚何所愧願君侯省之無為人後事將行左右更沮之曰猛虎所以使物畏而不敢犯者以其能威自居也故盤林橫谷奮晴以拿怒掉尾以倚嘯厭噉於熊豕麕麚之肉及棄其所長而欲弭耳委首以待餒是知命懸於執者之手雖麀兒得以狎而搏如欲伸步於咫尺安得自遂也今公舍自食而就待餒其後亦能無恨乎孰為公計其事於是師道果大悔遂殺高鉥而昈以能善人左右者開之故得無殺幽於蔡之鄙縣使人守其門親屬通往來輒籍署更十餘歲當元和九年蔡帥少陽死其子元濟欲以其父之地請於天子天子怒發兵圍之既急師道亦悖乃陰為之助明年秋師道兵萬餘東寇彭城入蕭豐沛且敗而還因艱四境出入者月餘昈乃為練繒書緘之絮帑如顆遣航持詣彭城請其帥願得上奏將行執航手曰努力慎勿泄書不吾名蓋假齊人劉諒耳非見帥無得言吾書者航至彭城航宗人運為武寧虞候都使始航欲舍之會運將兵出定豐未還航直詣賓府見郭行餘因曰母之姊子劉諒有帛書奏記陳叛兵者山川曲折之狀願見將軍行餘得之喜悅起告其帥航見帥獨謂帥曰書郭昈為之畏泄故假劉諒劉諒者師道所信之吏也遂發書書詞云願以兵三千人出滄州用戈船浮海入萊淄之上此時海不備所處皆罪人謫吏無所與堅遂與上奏於是天子遣告彭城帥知之帥以為非昈書疑師道為之以相詿誤故航歸不得書報獨告以信語航不敢復故道道回遠凡數千里乃及昈所處未見昈且為師道所召既行與昈兄子會於道因竊謂曰今者航無狀受召豈前事之露耶且露航獨死終無所敗無憂也昈聞之幾自引死航本萊人常以氣敢聞於平盧軍及師道欲叛盡縻絡敢士故航在召中初航不知其召之所以也意謂知前謀竟憂死明年元濟誅又明年師道反詔遣大梁楚彭城蔡許滑魏之師合而四入於是彭城軍下魚臺入金鄉楚軍圍海取其二縣大梁軍攻考城得之滑蔡許共拔斗門至臨濮魏軍渡楊流占東阿再戰涉商屯鄆西六十里兵最近賊賊益敗故師道遣右將軍劉晤將握前後兵三十萬人出當魏魏兵日急晤亦為師道所篤乃歸斬師道盡以鄆城降得拜為滑帥在十四年二月乙亥也高鉥以前著跡追為尚書蓋言寵之昈得以外郎為滑從事詔令行餘為記室行餘與昈會於河關之閒昈謂行餘曰昈前者使航馳帛奏至彭城聞其還不聞其問今已死矣君知其請乎行餘曰請者云何昈猶能盡語章中之詞矣行餘曰果然嗚呼航竟死矣莫有聞者嗟乎十四年余與李褒劉濛宿白馬津俱聞之於郭記室明日復皆如濟北濟北之人盡能言昈之節故悉以論著將請於史氏云
