  - {type: head, offset: 1166, content: 鄭州劉元禮載梨向蘇州蘇人宏執信載橘來鄭州行至徐城水流急兩船相衝俱破梨及橘並流梨散接得半橘薄盛總不失元禮執信索陪執信不伏, id: KR4h0168_NFKB_985-h20, level: 2}
  - {type: head, offset: 1378, content: 對盜稻橘判, id: KR4h0168_NFKB_985-h21, level: 2}
  - {type: head, offset: 1378, content: 會稽楊真種稻二十畝縣人張辨盜將令訪知收辨科罪訴楊真盜辨木奴復合科罪, id: KR4h0168_NFKB_985-h22, level: 2}
  - {type: head, offset: 1515, content: 對負甕判, id: KR4h0168_NFKB_985-h23, level: 2}
  - {type: head, offset: 1515, content: 甲甕負被乙盪倒索陪乙不伏, id: KR4h0168_NFKB_985-h24, level: 2}
  - {type: head, offset: 1658, content: 對二月不供宮人炭判, id: KR4h0168_NFKB_985-h25, level: 2}
  - {type: head, offset: 1658, content: 鈎盾二月不供宮人炭請處分, id: KR4h0168_NFKB_985-h26, level: 2}
  - {type: head, offset: 1758, content: 對鑿井獲鏡判, id: KR4h0168_NFKB_985-h27, level: 2}
  - {type: head, offset: 1758, content: 鑿井得古鏡不送官司鄰告違法, id: KR4h0168_NFKB_985-h28, level: 2}
  - {type: head, offset: 1860, content: 對方領為衣判, id: KR4h0168_NFKB_985-h29, level: 2}
  - {type: head, offset: 1860, content: 甲為方伯以黃紈方領為衣丁告不伏, id: KR4h0168_NFKB_985-h30, level: 2}
  - {type: head, offset: 2015, content: 對貲次如苴卜得乾坤判, id: KR4h0168_NFKB_985-h31, level: 2}
  - {type: head, offset: 2015, content: 甲貲次如苴乙強力為甲持錢舉半以遺侯家, id: KR4h0168_NFKB_985-h32, level: 2}
  - {type: head, offset: 2283, content: 對登城而指專席而坐判, id: KR4h0168_NFKB_985-h33, level: 2}
  - {type: head, offset: 2283, content: 甲登城而指乙告其惑衆甲云實無妖言又丁專席而坐庚遂弔之或以為失禮庚不伏, id: KR4h0168_NFKB_985-h34, level: 2}
  - {type: head, offset: 2468, content: 對旄人奏散率木修防判, id: KR4h0168_NFKB_985-h35, level: 2}
  - {type: head, offset: 2468, content: 日本請吏賜宴於朝旄人奏散不以靺為惠文冠所持辭云屬鞮鞻氏又柴桑備陽侯修防率土木丁獨不從曰將俟息壤無何堤成徒告其妖縣以為瑞科告不伏並仰正斷, id: KR4h0168_NFKB_985-h36, level: 2}
  - {type: head, offset: 2645, content: 對常好種荔繼母出服判, id: KR4h0168_NFKB_985-h37, level: 2}
  - {type: head, offset: 2645, content: 戴子恭平居常好種荔時人以為不道又曾元母出不知服, id: KR4h0168_NFKB_985-h38, level: 2}
  - {type: head, offset: 2866, content: 對結交四騎獲豹不賞判, id: KR4h0168_NFKB_985-h39, level: 2}
  - {type: head, offset: 2866, content: 南郡元栖好黃老通德結交四騎所由以為非宜又捕鳥鼠獲元豹訴不酬賞, id: KR4h0168_NFKB_985-h40, level: 2}
  - {type: head, offset: 2954, content: 對被髮禱斗學盤盂書判, id: KR4h0168_NFKB_985-h41, level: 2}
  - {type: head, offset: 2954, content: 甲被髮禱於北斗乙告其詛云侯家恐盜又丁學盤盂書庚相為引重後遂舉行其罪或止之甲云以此報德, id: KR4h0168_NFKB_985-h42, level: 2}
  - {type: head, offset: 3146, content: 對漆室染瘡緋衣版授判, id: KR4h0168_NFKB_985-h43, level: 2}
  - {type: head, offset: 3146, content: 甲逢故人引入漆室遂患漆瘡訴云料理又景版授刺史著緋袍村正云不合, id: KR4h0168_NFKB_985-h44, level: 2}
  - {type: head, offset: 3332, content: 對萊田徵稅閒人執事判, id: KR4h0168_NFKB_985-h45, level: 2}
  - {type: head, offset: 3332, content: 萊田舊不應稅縣令有徵納又客戶閒人請移執事, id: KR4h0168_NFKB_985-h46, level: 2}
  - {type: head, offset: 3552, content: 對損名馬式直講考經判, id: KR4h0168_NFKB_985-h47, level: 2}
  - {type: head, offset: 3552, content: 損名馬式又直講請考專經, id: KR4h0168_NFKB_985-h48, level: 2}
  - {type: head, offset: 3729, content: 對父友操杖諸母潄裳判, id: KR4h0168_NFKB_985-h49, level: 2}
  - {type: head, offset: 3729, content: 得甲造父友操杖從之友將為謀已命子毆之又乙脫犢鼻裩命諸母潄之庶弟告違禮, id: KR4h0168_NFKB_985-h50, level: 2}
