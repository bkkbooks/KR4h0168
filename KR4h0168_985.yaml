front:
  text: 全唐文欽定全唐文卷九百八十五闕名二十六
  hash: sha256:119ab2b43f2f13e57b7b481b357baba007e3dd3bb33750a0e5e259e9282c2a50
body:
  text: 大璞不雕國寶為貴許田私假諱朝宿之邑秦城可易獻章華之臺况祀地郊天或充禮物來朝入聘以表威儀然則聖人制禮特崇於饗薦王者之孝莫先於崇稷而三后在天聖靈浸遠四時成歲祭典聿修有事廟庭載陳圭璧太常所主大禮攸存凡厥薦陳須明制度惟此璧禮不虧玉書色侔截肪肉倍於好同楚人之鄙識妄有疵瑕當魯禮之明祠而致違闕曠其所職不得無辜六節崇儀制參龍虎五瑞分命列自公侯備以寵章異其文質嚴國朝而式序戒原隰而斯皇莫不尚以圭璧為之制度氣中浮曜本自生虹山下沉暉由來抵鵲擬秦城而韞價邁燕石以推珍璞琢言敷采就無僭起以軍旅恤其凶荒易行除慝之規結好和難之義咸崇馭下克著彞倫將忝厥司實資謀政甲搢紳高踐符節光臨既載馳而飲冰豈四方之辱命蒲璧云始早逾列於子男穀圭致榮遂專城於方嶽克謹天戒肅將明威居不失中思非出位寧遑啓處務協仇讎得晉侯之平戎有宣公之靜莒奚為不可而欲論刑易行本在剡圭此謬請分陶璧節彼南山森乎灌木百工爰度庶人斯採厲禁攸施妄掄材而必制操斧以進何斬伐之乖宜斬陽蓋取乎陰時伐陰須在乎陽月古訓則爾今令惟宜若斷彼良輈剡乎服耜考工有典諒亦難違儻蓽路載馳析薪負荷藍縷是阻巖險何階隨時之宜蓋取諸此江皋芊眠盧橘是植珠樹金實含芬吐芳班史埒富於封君李衡取方於僮僕詳窺夏策珍味猶錯於包貢式遵周禮物生必載於版圖何厚産之闕書而薄言於田賦置於徽纆誠為得宜王城福田禪宇清界忍草駢植天花亂開裛香雨而增紅淡祥煙而泛緑徵其種類已備神農之書覽彼芳菲取惑愚僧之目狀稱平慮驗乃忘憂初欲薦其禎祥終用彰於紕繆只可樹之於背玩彼芳香何乃言之於公取尤眩惑足以發周客之笑生燕人之慙未全害於政經不可罹於刑典王者立制諸侯附庸海內之化可宏任土之宜克著軍國既有彞準州縣非無舊式眷茲鄘衛築新臺於浼浼帶以淇澳挺菉竹之猗猗雖禹貢分圻尚乎納秸而唐年作賦送彼王芻既失奉於芝泥自投刑於棘署司法科罪正叶其宜輒為詞訴殊是疏僻且虧效職之方須速謗官之罪錢客家鄰白社業在青門米實蔥花光浮五色藍皮密理美至三搖長懷洗玉之珍方有致金之望洪崖行乖夔足道契狼心不能李徑遺冠翻乃瓜田躡履徇茲猿臂因採掇而全空眷彼龍蹄隨指揮而忽見寧勞宋灌自含冰谷之文不假曾鋤俄結火山之實錢既迷於術化洪乃集彼回邪於是釋此妖人將殊盜者初觀帶母似逐仙來後察空苗疑因夢失幻人為幻幻已去而無瓜迷者知迷迷既袪而有悟論妖疑切誨盜情深雖陳莠口之詞莫辨訛言之實洪崖不在丹筆何施客告未曉真虛崖實未知州縣更宜尋問方可裁量我疆我理蓋取其宜采葑采菲止存其善甲以鑿井而飲耕田而食藝彼芋區安厥蓬戶不知堯舜之力聿求天地之利有斯而享同計然於范子無悶乃可均沃壤於岷山鄙哉彼丁好訐為直昧長沮之自樂訝夫子之不勤告以惰農未聞其可或恐人慙相鼠務彼蹲鴟匪斧析薪頗黷綱紀則片言難折審慎攸宜請俟三緘方申一剖柏禽操深介直期在公清用理於家可移於國東家之棗昔聞去婦之悲南鄰之椑今見侍兒之執論其嫉惡雖曰至公究其飾情終為小行所盜不言多少量情應有重輕請更詳求方可裁斷滎澤名區長洲奧壤土宜雖異川路攸通故使賈客相趨乘時射利商人遞委從有之無大谷元光言移汴北江陵朱實欲渡淮南於是鼓帆侵星俱辭故國扣船忘夕並屆徐城兩鷁爭飛雙帆不背異虛舟而見觸均鬬艦之相逢遂使橈逐蘭摧疑建平之柿下棹隨桂折若河上之查來落果於焉星散傍人由其鶩沒一遊一泳橘包裹而全收載沉載浮梨漂零而半失然防慮之術未聞責已而深溺之弊直欲尤人乍尋似合酬填審細便難允許何者梨因散失船則共傷若為梨覔陪過自歸於毀櫝如損船索償理乃齊於指馬既非情故徒事披陳汙泉芳稻風傳十里之香江陵木奴地均千戶之封青花竟吐色亂煙波朱實方成影分霞錦楊真張辨植業營生楚既失之齊亦未得且覆車改轍前代之通宜牽牛蹊田往賢之深誡豈有一彼一此俱行盜竊之心以公以私深失是非之路鍾離牧之推讓曾不留心淳于恭之助收豈知勵俗論犯雖知先後語罪諒乃同歸請勘兩家之贓方定片言之獄惟彼負徒行者固宜矜避至於顛仆蕩者豈其故為甲且有詞愧林宗之妙賞乙為無狀殊叔寶之情言謹守既謝於挈瓶敝漏方憂於射鮒欲令陪價須盡事由必其廣陌修衢往來不接故為搪突是有常刑儻若狹路重闤風塵暗起誤而擊觸毀亦可矜刑故則罪合宜加捨誤則陪何足算但官之議事貴在量情言蕩非故犯之名稱負乃小人之事勒陪半價將謂合宜弄田之所鈎盾是司牽絲效官掌炭成務形雖比漆燒則如金入侍女之燻爐香焚百合處仙人之丹竈巧液千金變寒作暄轉冷成熱投其鑄冶可以方其造化驗其燥溼可以測其陰陽充百郡之時須為萬邦之日用二月不供三章有犯違令抵罪依條請科玉甃浮輝珠星湛耀漢陰舊址方除飾智之心譙國開源忽遇神仙之兆乙乃劬勞是務穿鑿為功暫因梧樹之傍遂覽菱花之照光芒駭目騕裊明心見飛鵲之時來覩回鸞之屢舞雖則私獲合送官司愛而欲留法將焉許自招其責誰復哀矜鄰人告之雅符公正分土建邦地方千里擇賢授職榮加九命將以大煒時憲欽奉國儀惠康庶績宣揚大化甲為方伯實佩儀章既剖竹以分憂佇坐棠而行政理宜潛潤德教廣扇仁風用申象闕之儀以副專城之望何得異文翁之簡化昧朱邑之廉平擅易長裾忽為方領效韓延之東郡有制黃紈比胡質之南荊曷無清譽且簪紱之節禮有等威踰矩不祥僭奢斯咎服之不稱身之為災自投三尺之書須免六條之秩甲告乙盜用錢乙云望依權力人不敢負又景之宋卜得乾坤丁告違禁不伏資貨山積行役如流四人別其工商六位占其來往惟景與甲食利遇時等朱公之在陶慕梁生之適越豐其家産列次於苴觀彼國風將之乎宋小人窺利冀獲浮雲之財君子于行希就隕星之郡既假人而出舉實跂豫而望之乙寡貞廉欲附其末既虧典禮誠不足徵異管仲之處南陽同孔子之去東魯所持雖則減半將存故未全賒縱見遺於侯家實無追於殷道徒資權要空遇乾坤據法律而未通在禮經而無禁甲稱盜用頗涉盜由丁告差違豈為差謬文飾其過猶掩耳而盜鐘詰問其源殊疾行而惡迹乙則有罪景乃無辜彼按三章用肅嚴霜之典此詳五聽須寬纇玉之條狀迹既造殊途割斷豈宜同罪禮經爰備喪紀攸設君子行之以立身賢者俯之以合道理須非禮勿動循不忒之威儀臨而必哀弔有喪以匍匐甲也未達自貽登城之罪庚也有儀俄驚失禮之謗彼則戾矣此何誤焉且登而不言既異仲宣之賦弔而未爽無違孔父之經撫事勞於三思片言申其一割但指則為惑何必有於妖言弔其有喪寧可科其失禮向若登而不指乙告即曰誣人坐而不專庚弔便為失禮况理則無昧事其可觀自邀惑衆之科未闕弔人之禮置甲之罪斯為得歟論庚之辜頗多失矣朔南聲教萬國賓王神靈滋液百珍寶用日本歸獻越沙海而西浮陽侯順流泛滄江而東徙衣冠所列是同於中外帷蓋其飛有觀於今昔而賜之禮樂飾以隄防歌鐘之奏已聞土木之功爰事將使陳茲禁靺無差絶國之音乘彼柴桑有廣通津之備彼而奏發稍失有常此獨不從實乖於衆遽彰糾禁幾抗成詞初引罪於鞮鞻竟登期於息壤職司之分是則可矜妖妄之疑未應為允惠文所劾旄人不可置刑息壤既成縣斷理宜稱瑞各從案記庶用平反易曰出處語默非一途語曰慎終追遠民歸厚則所好不等有如其面合禮而作難責因心戴恭戴安之餘曾元曾參之後二十八宿外當處士之星七十二人中有至孝之性幽寂水石高山景行多所仰止信而欽風絃歌取樂無忘種荔霜露增感早切采蘭居然傲時遵是繼母春池湛淡萋已緑風樹蕭條靜復鳴莖葉相依亦謂盛矣屺岵無托則可親之將備歉歲無情故匣佇期剪緝別偶雙飛將高奇致化成異物結而為裳思得其趣不苟制服曷所見尤楚客興歌江潭可想周公範法日月斯懸彼俗何知正刑不濫與其嗤誚豈如勿言道存固合賞人義盡理難論罪乘軺持斧漢家有直指之使鳥獸草木舜典標山澤之官考行議能以先清舉選徒校獵自符月令抱甕矯俗已見褎升徒搏異物不聞加賞假漢廷之迹猶或心勞越周家之雄乃聞手格州科妄罪須正本條使稱違式未詳其事律防姦慝書垂勸誡有犯無赦德懋必彰載以玉條藏之金匱使邪妄知禁忠義有憑至如北斗星象東臺祕迹非愚庶之所規祈實詞儒之所探練甲被髮以淫禱丁伏膺以獵精乙摘詛以明辜庚引重以旌譽詰理則事窮討賊原心則情在崇儒證漢代之浮訛荐彰其蠹習殷時之典訓載穆其方且祝詛星歷刑莫重焉銘頌盤盂道亦斯在息夫妄惑其術昔時已滅其身李尤刻緝其詞後世亦高其旨曲而不離請標舋於詳刑婉而且微聞舉罪以酬德乙之所訴請置金科或人止之恐昧前典甲以芝蘭同味早託葵歌景以蒲柳侵年方欣艾壽煙火相接昔是往來雷雨或覃即承恩造鶉居鶩飲共申東戶之遊鶴髮雞皮載煦西山之景既無猜於杵臼遂有奉於絲綸攜手入門引故人於漆室披襟就服僭常例於緋衣乙如聶政之容相看不識景方龎統之秩即事何慙頭面有瘡自均無過耳目不審豈假論辜拊其訴端堪取笑於周客詳其告狀欲何罪於堯封染患自是晦明在法寧加老耄探情未虧於通恕據律不犯於正條便置嚴霜慮傷非罪乙與村正咸釋為宜國家分出輶車董諸田戶斂我唐典藝夫周舊別農郊於沃塉貫流傭於版圖何疑於萊田之征而失於間人之職豈徘徊中曲候周郎之顧將疑後素招子夏之詞然乃疆名既訓嗇業須分上下宜繫井邱有災而畬均其易歲自門及野化以同人若未給於棠陰或恐隨於蓬轉惡夫外臺徵稅尚起異門客戶請移方徇常職且禮有恆斂豈宜據於故人改執事何必越於鄉置加於刑便以愛羊廢禮立案為限知其為蛇畫足必也政宏通變人急遷移稅錢或致於所收州縣難辭於為擾事未重詰愚或痛諸而執簡書刑使不若凶年人散省其謂何現在甄詳方可鑒定六藝式崇執馭為重九流分派經明可尚執鞭投策先古所宗聞道尊儒禮訓攸著凝想攸乙思所出㣥瞻言於丁學優而仕規玉臺之妙式遠求名馬崇金籯之奧義載想蹲龍故得權奇之形事光於鎔鑄切磋之道譽闡於膠庠紫燕雲飛影弄珂前之雪青襟日就來呈席上之珍既而欲騁長途遂得榮參直講且乙之無故或至損傷丁以有功理宜褎進免科已從寬宥合賞須即告知職司既在專經可得更邀他伎判放之筆詎曉通途告濫之詞未為高見凡適於尊必聞操杖欲敬諸母豈可潄裳見父之執雖退讓而明禮逢彼之怒遂嫌疑而未防且挂竿之資誠為穢服几杖之類克謀長者將害已而令毆此已負人取諸衣而見滌亦彰無禮子承父命或迫嚴顏季論昆非攸乖禦侮一未離於飛鳥兩難漏於吞鯨
