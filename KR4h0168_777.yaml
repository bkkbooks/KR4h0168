front:
  text: 全唐文欽定全唐文卷七百七十七李商隱七
  hash: sha256:684ad9182ca7beb961f6725ecc173c0551117b9a7ca020c7173fd7e0dc96c3a1
body:
  text: 某聞量力省躬典刑之深旨度材任事聖哲之良規某雖甚愚頗嚮斯義屬者謬圖仕進因藉時來伏值相公顧以外藩夙通襟契憫羊曇之未立早託謝家憐康伯之無歸常依王氏拔於幽滯處以周行遂俾南憲中臺屢承闕乏內庭西掖比辱昇遷邁越時流塵汚中旨恩渥非次性分難移徒當侍從之榮莫有論思之效竟使懼因福過疾以憂成外雖全人中抱美疢常願青蒲瀝懇紫殿披誠進退未聞過累仍積及正名綸閣收跡翰林尋欲竊候休旬伏拜蕭屏謝昔年之朝奬抒他日之私誠而機事且繁燮和少暇齋沐累至肝腸莫從旋屬虜帳夷氛壺關伐叛絳臺北控有元戎大集之師鄭國東臨過列鎮在行之眾任當調發事屬供須豈斯擇材皆在非據周旋三郡帛丿糸歷兩霜頒宣詔條祗惕廟畫雖無咎悔亦乏殊功今幸四海無塵六州嚮化靈臺偃伯衢室歸尊是修明禮律之初舉拔俊賢之始而鄭之為地右臨梁苑左倚成皋比之列藩實為劇郡山東望族幾同屈景之強洛邑頑民常雜萑蒲之聚永言出牧豈易其人而又孔道所因使車旁午送迎或闕則怨讟流詞館餼稍乖則職司貽辱託之金器猶或難居矧在朽材寧宜久處某伏思自隨宦牒遽忝恩榮位至圭符寵當金紫或筋骸無苦心志有餘即豈願踞熊軾以告勞指隼旟而辭疾直以攝生寡妙舊恙無全儻或形言懼塵清聽每朝昏改候霧露消威則或至問俗有違在公多廢坐為尸祿行有媿顏而又貪明盛之時有婚嫁之累未敢高論止足直乞退休是以輒疏精誠上千陶冶伏惟相公雲龍協應舟檝呈功比屋可封期於屈指一夫不獲固以動心如蒙曲鑒深情猥從志願置之他所以遂其愚則吳楚列城江關別郡雖居鄰佐亦委緝綏獲安病躬豈敢擇地猶希磨淬鉛鈍撫養疲羸積以歲時少裨塵路伏惟試賜恩照圍減帶緩髮稀弁傾窅然向風目極心往下情無任攀戀感激惶懼之至某少悲羈絏不承師友之親規晚學文章麤致鄉曲之名譽謬汙官秩遂彯華纓握蘭清曹視草禁掖貪叨過極憂責非寧蚤為寒暑所侵頗染肺腸之疾自頃以慶雲結蔭宸極繫心當就望以推誠於煎調而寡裕前歲伏蒙任使奉遠承明值朝廷興問罪之師原野有宿兵之餽絳城甚苦鄭馹非完加之以降虜移鄉仍之以貴臣銜命飛輓之外將迎實繁旁奉廟謨上尊詔旨動繁調發居勞撫安抱疾以臨為日斯久伏幸姦兇克乂濡澤橫流是大朝黜陟之初良冶埏鎔之始此郡路通四境名冠六雄軒葢以來原野交錯萑蒲有聚武吏貽憂雖清時無杼柚之虞而常日有逋懸之賦必在假之賢守屬以強材然後謠詠克興公私不廢豈可使某素兼疴恙本乏良能久於是邦以主東道饋飧將藥甌並進假牒與公案相隨含意不言貪榮是罪相公漢籌始運殷鼎將調度材任官歸於至當存誠愛物決在無頗竊敢自託緘封遠干樽俎俯期恩意以保衰微且某運偶昌期年初知命豈不願臨劇郡稍冀榮途但以力有所不任心有所不逮雖欲勉強實憂傾敗彼吳楚偏鄉非舟車要路永言凋瘵亦藉緝綏儻特降優容遙聞擬議則朽質有報恩之所羸軀收曠位之譏宿疢或痊理劇未晚伏惟試賜裁度嚮風披懇服義陳詞仰台耀以瞻輝望洪鈞而佇惠干冒尊聽伏積兢惕謹啟某啟伏以秉大鈞者以物得其所為先執大化者以材適於任為急將以致理在明命官使輕重合宜大小有裕然後人稱其職職無廢人此相公之所明知也某材術素寡聲光莫聞偶叨承平謬登華顯洎分符竹使絕籍金閨一授專城再易灰琯且解巾臨郡前賢攸重一麾出守昔人所榮雖積戀於本朝實俯光於單緒况又此州管叔舊國帝鴻遺墟接彼㠂嶢浸以京索聚山東之右族邇洛表之宸居內揣非才頗虛信任而復以通莊所自假道攸繁載惟餞迓之勞實半頒宣之務必屬於壯齒付彼全人用以責功僅能集事某早年被病晚歲加深衣袴無取於潔清藩溷動淹於景刻徇己則坐墮物務業官則立致蕭衰欲俱濟於公私實加憂於寤寐矧茲仍歲適有外虞降卒征人旬時併集飛芻輓粟星火為期以此疚心彌深舊恙今寰瀛大定雨露旁流高步翰飛一呼而至雲羅場藿萬里無遺將調斯人以求良牧得才為美今也其時儻蒙允贊聰明曲聽奏記俯憐哀薾稍賜優容則亦不敢便掛簪纓遽離陶冶江湖偏郡襦袴須人無根節之難少舟車之會俾之養理使得便安庶麤致人謠以酬廟算則某所謂材有稱職時無廢人凡在宦途皆仰時化伏惟試賜恩察違離漸久刺謁末由昔在孔門常忝四科之列今瞻魯史將期一字之恩下情無任感戀兢惶之至某啟某本洛下諸生山東舊族麤霑科第薄涉藝文謬藉時來因成福遇青縑赤管巳忝於清華黃紙紫泥仍參於宥密相公早容薄伎獲寄光塵別殿朝迴禁林夜直每披襟素常賜話言知蔣琬之為公敢矜先見哀馬卿之多病亦辱來言圭律未遐銘鏤斯在相公鹽梅調味舟楫濟時晉水擒兇韓都蕩梗以不剛不柔貞百度以無偏無黨定九流若某者實有何能可叨出牧絳田巳非厥任滎波轉過其材間歲以來為政非易有南遷之降虜有西出之戎師資扉所供餼牽之備未嘗造次敢怠躬親今梟獍埽除馬牛歸放將使坐臻富庶必先用得才能此地名高六雄實控東道分憂之寄自昔為榮况在疏蕪敢忘涯分但以輶軒坌至賦貢川流非惟撫字之難兼有送迎之遽舊疴加甚朽質難堪假故稍頻曠廢為懼又以宦游既久故里多違陶令之田園將蕪向平之婚嫁未畢顧惟羈絆未可歸休竊敢遠疏丹誠上干清重非獨祈恩於時宰實將誓款於已知儻蒙以然諾為心誠明濟物垂憂不逮賜議所安則吳楚之間郡邑非少不當衝要或異膏腴使之頒條庶可求瘼昨賊平之後啟事尋成冰霜始嚴筆札未暇又伏慮內庭展顧稱己推遷外郡寓詞頗乖流品沈吟有日鬱抑經時今則情素坐煎驅馳行久若猶緘嘿是負陶甄伏惟曲賜恩鑒誠懸書殿戀積台階比殷浩之空函情同事異望孫宏之東閣魂往形留下情無任感激攀戀之至謹啟伏承天恩榮加寵秩伏惟感慰伏以蓬果兇徒遂為逋寇三里霧未能成市五斗米乃欲誘人聯接坤維依憑艮險蹷跳鋒刃冒觸罾當尚書四丈機在掌中兵存堂上爰擇幕府俾帥軍行羊祜理戎輕裘緩帶祭遵臨敵投壺雅歌一舉而張角師殲再戰而孫恩黨盡長清沴氣永變巫風雖合勢於三川實先鳴於二子仰惟殊渥允謂簡勞當從鈐管之榮便執陶鈞之柄蒼生之望孰不喁喁某早忝生徒復叨參佐漢祖以蕭何為人傑晏子以仲尼為聖相當今昌運繫我師門雞樹鳳池不勝心禱無任抃賀之至福啟福聞雀辭楊館常懷寶篋之恩燕別張巢永結雕梁之戀推誠況物某有類焉始者尚書晞髮丹山騰身紫府曉趨清禁則瓊樹一枝夜直皇闈則金釭二等人寰莫見塵路難逢而某志在諱窮勇於求益輒干皁隸自露菲葑寶肆迴腸只期和氏毉門投足永念倉公果蒙愍彼顓愚溢為品目勾萌始達依周囿以揚翹滴瀝纔分託靈光而振響輕軒短羽驟化窮鱗每欲陶冶肺肝耕耘筆硯麤調宮徵以謝陽秋而義有多塗情非一概辭繁轉野意密彌賒雖塗逭如韓遂之書反覆若葛洪之紙終無髣髴可得端倪去歲洛陽獲陪良宴頻趨絳帳累坐青氊况聞懇拒台階請從藩屏舉郗超之幕畫數阮瑀之軍書懸以嘉招形於善謔何言違阻復積光陰潼水千波巴山萬嶂接漏天之霧雨隔嶓冡之煙霜皓月圓時樹有何依之鵲悲風起處巖無不斷之猿煎向義之初心軫懷仁之勁氣竊惟秦鏡當詧衞桃一昨伏承擁節浚郊建牙隋岸將求捧幣申好裂裳就塗接枚叟之餘光奉鄒生之末座又伏慮旋登殷夢俄奉周畋徵詔巳行拜塵無及徘徊失措抑鬱誰聊必也華榻長懸簡書無廢即割任安之席堪哂無圖負田叔之鈐可嗟非據伏惟慎安寢膳勉護興居早秉信圭速調大鼎至於禱祝實倍等倫半菽思貯於神倉一勺願投於靈海道之云遠更開殷浩之函書不盡言重洒楊朱之淚攀戀感激不知所裁伏惟俯賜鑒照謹啟某啟伏奉公牒辟署節度巡官兼伏奉榮示賜及疋帛等才異當仁事從非望拜受失度跪捧難勝某符彩無奇局量有限徒以杜林外氏學富文華謝朗舉宗皆親儒墨齠年有志壯歲無名瞻遺構以自驚奉成書而未遂重以零丁屬釁息類非蕃決稚圭之甲科則行有違離之苦效敬通之卻掃則坐無供養之資徘徊盛時鬱抑衷懇敢思聘召忽賜降臨尚書分戚天家揚輝王國攻文而丹青讓巧論兵而鉤觡慙能頃者言自執金雄推受脤河橋三壘當弟子之輿尸易水一城值將軍之下世功深式遏道著綏和中間衞朔拒君邢洺起亂紀侯去國汾晉挺災語其巢穴之間在我封鄰之側而又潛調遠轡密運良籌輕敵殘人則勇於不敢伐謀持重則令在必行今者趙北變風淮南受賜戎麾始至賓驛初開固合大選英髦以充僚屬豈期思慮遂及孱微賁帛豐盈寓圭重復慈親喜問孀姊號驚姓名遂列於㣥英簪笏遽光於單緒感深肌骨戴重邱山未伸投刺之誠巳定糜軀之誓伏以久將栖託兼議扶迎更涉旬時方遂行李漆園之蝶濫入莊周之夢竹林之蝨永依中散之身蓮幕含誠金臺結想瞻仰恩顧伏撓精魂謹奉啟陳謝謹啟福啟伏奉公牒伏蒙辟署觀察巡官某早辱梯媒獲沾科第吳公之薦賈誼未塞前叨竇融之舉班彪仍當後忝仰觀蓮幕俯度桂科卵翼不自他門頂踵實非己物但齎灰粉遠逐旌方童雖有命以酬實無言可謝伏惟俯賜鑒諒福啟錢若干伏蒙賜備行李竊以白馬從軍青鳧受聘磨文難滅校貫知多陸賈方驗於火花郭况莫矜於金穴感戴之至不任下情謹啟傑遜啟今月某日伏蒙辟奏節度掌書記敕下徒有長裾曾無綵筆初疑誤聽久乃知歸感激慚惶不知所喻某受天和氣而鮮雄才幸承舊族之華遂竊名場之價頃者湮淪孤賤帛丿糸隔音塵其後從事梓潼經塗天漢初筵末席披霧覩天自爾以來懷恩莫極鄭元之腰腹若掛丹青崔炎之鬚眉常存夢寐方思捧持杖屨廁列生徒豈望便上仙舟遽塵蓮府尚書士林圭臬翰苑龜龍方殿大藩將求記室是才子懸心之地詞人效命之秋豈伊疎蕪堪此選擢思曾顏之供養念陳阮之才華自公及私終榮且忝伏以家室憂繁初解山川跋涉未任須至季秋方離上國撫躬泣下尚遙郭隗之門閉目夢遊已入孔融之座下情無任攀戀銘鏤之至潛啟伏奉榮示伏蒙猥賜奏署今月某日敕旨授官承命恐惶不知所措某文乖綺繡學乏縑緗負米東郊止勤色養獻書北闕未奉明恩撫京洛之塵素衣穿穴訪江湖之路白髮徘徊大夫榮自山陽來臨沙苑固以室盈東箭門咽南金豈謂搜揚乃加孱眇府稱蓮沼慚無倚馬之能地號雲門竊有化龍之勢便居帷幄遽別蓬蒿袁生有望於樵蘇楚子永辭於籃縷刻諸肌骨知所依歸伏惟特賜鑒察謹啟潛啟錢若干伏蒙仁恩賜備行李重非半兩輕異五銖子母相權飢寒頓解細看銅郭徐憶牙籌雖云神有魯襃便恐癖如和嶠辦無闕通刺有期感戴之誠不知所喻謹啟月日從姪某官某謹齋沐裁誠著於啟事跪授僕者上獻於司徒相國叔父閤下某伏遠牆藩亟踰年籥抱徽音於故器雖賞逐時遷竊餘潤於奧雲亦情由類至中阿弭節末路增懷沈吟易失之時悵望難邀之會石崇著引徒願思歸殷浩裁書其如慕義伏惟相公丹青元化冠葢中州㣥生指南命代先覺語姬朝之舊族莊武慚顏敘漢代之名門韋平掩耀將鄰三紀克佐五君動著嘉猷行留故事陶冶於無形之外優游於不宰之中始者主上以代邸承基瑯琊纘業明發不寐懷清廟之景靈日晏忘飧念蒼生之定命爰徵元老允在賓臣五載於茲六符斯炳頃單于故境獯鬻遺疆屢緣喪荒亟致攜貳夙沙自縛其主冒頓忍射其親遂去北邊欲事南牧既赫斯而貽怒乃密勿以陳謀管氏將來屢發新柴之井留侯每入便聞借箸之籌㣥帥受成中樞獨運前軍露板方事於羽馳清禁壽觴旋聞於月捷仍其貴種慕我華風或辨姓寫誠推諸右校或釋兵伏義列在周廬潞子離狄而春秋書徐夷朝周而大雅詠其餘麕驚鳥散風去雨還亘絕幕以銷魂委窮沙而喪膽胡琴公主巳出於襜襤毳幕天驕行遺其湩酪向若非薛公料敵先陳三策充國為學盡通四夷則何以雪高廟稱臣之羞全肅宗復京之好此廟戰之功一也惟彼參伐實興皇家天漢美名方之尚陋舂陵王氣比此非多而物眾藏姦地寬長孼敢起在行之眾因興逐帥之謀遂使起義堂邊台臣夙駕晉陽宮下逆豎宵奔翻勢將冀於連雞勇鬬尚同於困獸詎知長算已出奇兵金僕靈鉟靡留於旬朔箯輿貫木已集於都街此廟戰之功二也潞寇不懲兩豎之兇徒恃三軍之力干我王略據其父封袁熙因累葉之資衞朔拒大君之詔人將自棄鬼得而誅蛙覺井寬蟻言樹大招延輕險曾微吳國之錢藏匿罪亡又乏江陵之粟所謀者河朔遺事所恃者巖險偷生今則趙魏俱攻燕齊併入奉規於帷幙遵命於指蹤亞夫拒吳驚東南而備西北韓信擊魏艤臨晉而渡夏陽百道無飛走之虞一縷見傾危之勢計其反接當不踰時是則陳曲逆之六奇翻成屑屑葛武侯之八陣更覺區區此廟戰之功三也三寇殄滅萬方率同將盪海騰區夷山拓宇高待泥金之禮雄專瘞玉之辭煙閣傳形革車就國盡人臣之極分煥今古之高名况又奉以嘉聲諧茲國檢鬬文賜糗遠箴醉飽之徒晏子朝衣橫勵輕肥之俗比周息慮孤介歸仁紹續勳家扶持舊族罔容私謝皆事公言景風至而慶賞先行仲呂協而賢良必遂豈直杜伯山之令子大邑傳家陶彭澤之孤孫西曹受署重以心游書囿思託文林提枹於絕藝之場班揚掃地鞠旅於無前之敵江鮑輿尸故矯枉則黃冶之賦興游道則知止之篇作辭窮體物律變登高文星留伏於筆間綵鳳翺翔於夢裏此固談揚絕意倣效何階若某者徒預宗盟早塵清鑒而行藏遷貿岐路差池今將抽實吐誠推心敘款緘猶未寫詞已失煩某爰自弱齡實標孤操寒郊映雪暑草搜螢雖有謝於天姿或無慚於力學庾持奇字信未皆通敬禮小文頗常留意太和中敢揚微抱竊獻短章方候明誅忽蒙復命荊州一紙河東百金叨延月旦之評長積竹林之戀竟以事將願背蹇與身期離索每多交攀莫遂武陵被病洛表求醫未及上言先蒙受代肩輿而至杜門以居蓬藋荒涼風霜迅厲今巳稍痊美疢獲託休辰殷鈞體羸尚能為郡馬卿疾罷猶可言文退無井臼之資進乏交朋之助是以徘徊軒幄託附緘封冀陳蔡之及門庶江黃之列會敢渝孤直仰累清光東浪驚年西飈結欷矢心佩賜畢命銜輝道阻且躋書不盡意金楹假蔭望同相賀之禽珠岸迴光庶及不枯之草明懸肝膽唯所鑪錘干冒尊嚴伏用兢灼謹啟某啟散兵馬使陳朗至伏奉榮示兼奉公牒伏蒙召署攝成都府參軍充安撫巡官者師襄鼓缶或近翫人和氏搜珉能無驚物跪受高命莫知所裁某藏豹不堅雕龍未巧徒承庭訓遂廁人曹比衞家之一兒天懸鵬鷃望鄴中之七子風逸馬牛已忝決科敢思筮仕伏惟相公以仁義禮智信為基構用溫良恭儉讓為藩籬堯時則業貫夔龍殷代則道符尹說入秉文教出曜兵權揮神鋒而劍合陰陽述雅誥而筆開造化况天有井絡地稱坤維控三巴百濮之雄帶南詔西山之險人稱奧府帝謂殊藩固已廣集英豪用資參佐玳簪珠履綠水紅蓮成籍籍於淮山致憧憧於燕路若某者徒將慕藺何足望回又安敢拂其塵埃加以冠履伏思相公直以大人頃居班列獲奉恩私羅照乘於驪淵覬歸昌於鳳穴未見其可處之不疑曾不念木朽石頑雕鐫莫就榆瞑豆重性分難移古人所以有以榮為憂受恩如敵斯言之作珪也有焉今月六日辰時輒奉辟書具聞晨省仰承嚴旨便定行期而又內奮弟兄外誘交友傅翼類虎生角如麟事誠實於顯榮勢莫知其報效但須旬日方拜旌旄當洗心為齋延頸以望持千尋之建木想像王褱姿周萬傾之澄波比量曠度戴恩揣己投命依仁神之聽之百生如一謹啟某啟伏蒙榮示賜及前件衣服段及束絹等謹依處分捧受訖伏以大人自處通班彌修儉德田園惟恐蕪沒子弟不免飢寒去春成名首秋歸覲雖才非張載未刊劍閣之銘而志慕胡威敢問荊州之絹豈意相公復以簡書召署筐篚加恩古者贖百里奚纔持五羖誚程不識猶惜一錢况某碌碌無奇容容自守敢邀厚幣來自雄藩品目難名珍纖可玩仰李膺之德尚未登門讀戴聖之書已驚潤屋下情無任戴荷悚懼之至謹啟某啟伏奉榮示令將前件馬及行官延接者某將仕大藩苦無遠道得蒙恩禮曲賜優崇扶以武夫濟之良馬經過燕館將耀於鳴騶夢寐梁園只思於飛鞚感佩之至不任下情謹啟某啟某聞不祥之金大冶所惡自衒之士明時不容斯實格言足為垂訓然或顧逢伯樂但伏鹽車聽屬鍾期不調綠綺皋壤搖落老大傷悲同劉勝之寒蟬效子綦之枯木則亦跡歸棄世行闕揚名某價乏琳琅譽輕鄉曲麤沾科第薄涉藝文錐不穎於囊中水竟深於山上淹留侯國祗事戎麾插羽佩鞬從相公於關右束書載筆隨校尉於河源自北徂南巳秋復夏心驚於急絃勁矢目斷於高足要津而又永念敝廬空餘喬木山中桂樹遠媿於幽人日暮柴車莫追於傲吏捋鬚理鬢霜雪呈姿弔影颺音煙霞絕想徒以相公遠敦世故容在恩門存趙氏之孤受梁王之禮竽將濫吹石有參瓊咳唾隨風眄睞成飾追維疇曩曾是逢迎蜀郡登文翁之堂上國醉曹參之酒吹噓盡力撫愛形顏雖以捧承莫能銜戴况許之高選光彼宦情以曲臺之任用猶輕憲署之發揮方盛仍期官牒不越歲時今則節邁白藏候臨元律燕雖戀主馬亦嘶風郭伋還州尚不欺於童子文侯校獵寧爽約於虞人苟四時之信是孚亦一諾之恩斯及况自元和以後公侯冢嗣卿士子孫與之同時歷然可數莫不翔踰鳥道泳出龍津或並命南臺或迭居青瑣金朱照耀軒葢追隨某雖忝伊人亦惟華冑比王謝之子弟誠有重輕在嵇呂之交朋宿常連接而獨分光鄰女貸潤監河野鶴天麟絕比倫於朝右髯參短簿困擬議於軍前竊聽重言常興深嘆是以願馳蹇步誓奉光塵儻或廁錯薪之斯翹詠歸荑之自牧少窺上路試睨重霄擊水三千蹔隨鵬運墱流十二免使魚勞猶能贊敘燮調謳歌鎔範庶無雅拜以累於君公不使繁聲見憂於仲子心懷台席夢結邊城寓尺牘而畏達空函寫丹誠而慙非健筆仰望恩顧下情無任攀戀感激惶懼之至某啟某竊覩貞觀朝書伏見文皇帝因夢吹塵方求風后於畋問卜始載磻溪事偉於王圖道光於帝載下惟敷衽上則虛襟纏綿圖緯之前窈窕天人之際崇基立極四足雖斷於神鼇開物成功七竅仍沾於混沌禹羞乘木卄大車舜恥彈琴白烏已見於將雛朱草仍聞於滯穗共工蚩尢之輩與貳負同拘豕韋晉耳之徒與七騶共御是以今上以貽謀負扆相公以餘慶持衡用十一德之資贊七百年之祚古猶今也仁豈遠乎伏惟相公日觀同光天球並價揚鋒露鍔則武庫常開散藻摛華則文星鎮見一言悟主三接承恩季孟伊繇友朋蕭邴漢皇發論十萬常媿於淮陰齊后推誠一二皆歸於仲父百度既已貞矣九流又復清焉牆東竈北隱淪者咸欲呈材猿飲鳥言僻陋者皆思入貢莊生獻臂楊子拔毛三百篇之詩更無諷刺二百年之史永絕譏嫌斯乃百代可知一言以蔽豈立錐側管可折齒尋環巍乎煥乎盛矣美矣若某者剖心寡竅對面多牆小比焦螟敢矜巢窟微同觸氏寧務戰爭徒以簪紱承家階庭受訓堂中得桂已有前叨幕下開蓮仍當後忝所宜括囊無咎綵服為榮絕方朔之上書罷禰衡之投刺直以措心賢路誓志昌時既慕義無窮思有道則見伏惟相公霧能蔚豹雷可燒龍為百氏之指南作九州之木鐸任安彥國巳在於廏中揚子馬卿並歸於門下而猶渴飢未副影響無寧請客者不解衾裯當關者空存皮骨此某所以淮山遠至漢棧斯來望姬旦之吐飧冀張華之倒屣以昇堂客衆擁篲人多苟無鬷蔑之言難佐仲宣之陋今輒以常所著文若干首上獻伏惟少迴巖電微駐台星固無望於討論庶或觀於指趣儻蕭稂可刈管蒯無遺蒙文宣一字之襃得元晏三都之序便若神巫去厲司命添年禱祝之誠造次於是門遙閶闔路隔瀛洲於人世存思空移氣序以塵中仰望未見端倪希陪上士之流終預㣥仙之末祈恩望德乃百斯生干冒威嚴下情無任惶懼感激之至謹啟某啟某材術空虛行能無取因緣慰薦蒙記姓名劉宏一紙之榮方斯未重季布百金之諾比此猶輕昨者李涿侍御北來又蒙降以重言將之厚意望輝光而便同簪履在負荷而何啻邱山况某婚姻早聯門館外舅以列藩之故家人延自出之恩重疊依投綢繆顧遇東牀坦腹早以媿於郗公朱邸曳裾復欲階於謝掾儻復清風時至丹慊獲申實於生前識其死所伏希恩詧謹啟某啟某聞師曠之琴不鼓之則無以召元鶴楊羲之石不用之即無以聘應龍物既有之言亦猶是伏惟侍郎學士絪縕降秀翕闢資華天上比方但有文星麤爾人間擬議未將太華為然爰自妙齡遂肩名輩當時人物何戢惟效於褚公邇日風流杜乂難方於衞玠加以宏成與石郭璞傳毫渙水倘來皆逢藻繢荊峯若至只有璆琳合沓縑緗縱橫筆硯三都作序不勞皇甫士安萬乘為寮只有東方曼倩况從近歲且有外虞傅介子在樓蘭國中奇功未就班仲升於玉門關外報命猶賒雖太平之業巳隆而震耀之威尚作侍郎又綢繆武帳密勿皇圖九天九地之兵寧因舊學七縱七擒之術固已元通用視草之工解按劒之怒手為天馬心繪國圖九重之中蹔煩前箸萬里之外輒散衡車位誠在於論思功已參於鎮撫圖書之府鼎鼐之司伊咎懸遺恨之誠夔說貯妨賢之媿載惟後命夫豈踰時抑某又聞之昔管仲經邦賓客有二周公待士吐握皆三丙丞相之車茵寧彈醉客平津侯之賓館不礙布衣並脂粉簡編冠纓圖史後之披卷皆若升堂侍郎美譽旁流高節彌折擔簦者成市躡蹻者如雲此乃前賢後賢不殊軌轍往哲來哲非異門牆縱燕有黃金之臺齊為碣石之館料其棟宇必巳荒蕪若某者陋若左思醜同王粲鬚眉不及於崔炎腰腹無預於鄭元若值庭蘭固多慙德如逢巖電不望齊名重以惠劣禰生專非董氏殊顏回之易鑄若宰我之難雕徒欲萬卷咸披且乏五行俱下叨從歲賦勉致文編戶戶醬瓿唯聞見辱人人虀臼不肯留題再困於魚登一慚於雁序其長兄兩舉及第然天付直氣家傳義方雖在顓蒙不苟述作廣絕交之論抑有旨焉移太常之書非無為也頃者曾干閽侍獲拜堂皇既容納之有加遂希望之滋甚爾後以毛傷垣彈鱗損任鉤拔刺不遷噞喁無暇既乖受教便以經時今孝秀爰來風霜已積秦人屢出自欲焚舟楚卒數奔誰教拔斾是以更持魚目當夜肆以沽諸復挈豚蹄祝天時之未已義誠多媿志亦可憐倘蒙猶枉鉛華更施丹雘俾其恩地不在他門雖不及采椽備枝梧於大廈亦庶乎稊米增流衍於神倉與夫九九之能猶或萬萬相遠誠深詞切聲急響煩仰郭泰之龜龍望仲尼之日月濡毫伏紙億萬常心干冒尊嚴伏用戰灼謹啟某啟某少承嚴訓早學古文非聖之書未嘗關慮論都之賦頗亦留神徒以不授彩毫未吞瑞鳥馳名江左陸機莫及於才多擅譽鄴中王粲終聞於體弱上下㣥士差池累年頃者輒露疎蕪不思狂簡捧爝火以干日御動已光銷抱布鼓以詣雷門忽然聲寢不謂郎中授材路廣登客門寬望犬附書冀雞談易特垂題目曲賜丹青旋屬滎嶓從行神州視膳同孟陽之覲蜀比孝若之歸齊雖佩恩私竟乖陳謝光陰荏苒誠抱勤拳今此秋期遂有天幸更奉禰衡之刺敢無鬷蔑之言某在京多時自夏有疾失外郡薦名之限俯神皋試士之期物情既集於宗師公選果歸於令季懷材者皆云道泰抱器者自謂時來以卞和為玉人無不收之瓊玖得蹇修為媒氏無不嫁之娉婷是以願託一拳潛布百兩顧方流而有託慮良會之猶賒伏惟郎中與先輩賢弟價重兩劉譽高二陸比李膺則仙舟對棹方馬融則絳帳雙褰若某者雖陋若左思瘦同沈約無庾信之腰腹乏崔炎之鬚睂然至於感分識歸銜誠議報將酬楊寶則就雀求環欲答孔愉則從龜覓印推其異類不後他人謹復軸新文重干清鑒馬卿室邇孔子牆高遲面莫由隳肝無所任重道遠方懷驥坂之長鳴一日三秋空詠馬嵬之清什知深可恃言切成煩幽谷未見於鶯喬曲沼空勤於鳧藻仰瞻几閣伏待簡書謹啟羲叟啟伏奉前月二十八日敕旨授秘書省校書郎知宗正表疏續奉今月五日敕改授河南府參軍依前充職者小宗伯之取士早辱搜揚大宗正之薦賢又蒙抽擢未淹旬日再授班資任重本枝職齊載筆方殊王逸惟注楚辭有異郝隆但攻蠻語此皆相公事均卵翼勢作風雲特於汨沒之中俯借扶搖之便孔龜效印未議於酬恩楊雀銜環徒聞於報惠感忭之至罔知所裁謹啟羲叟啟伏蒙奏署知表疏官伏奉前月二十八日敕旨授祕書省校書郎續奉今月五日敕改授河南府參軍者某少實艱屯長無才術徒以與周同姓從魯諸儒託阮籍之竹林攀郄詵之桂樹曲蒙題目猥被薦聞惟我大朝克崇宗祏敘文昭武穆之位敦紹堯纘禹之親豈以斯文失於能者况一蒙旌錄再忝恩榮班資將廁於郄超職業幾踰於孫楚感結所至死生以之即以今月某日發赴所職登門在近縮地是思惟勒肺肝恨無毛羽伏惟特賜恩詧謹啟
