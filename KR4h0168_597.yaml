front:
  text: 全唐文欽定全唐文卷五百九十七歐陽詹三
  hash: sha256:2f9883952977e1e8e8cd4dbdd48eb11be188480f01e9a7acba58f94a9bf28446
body:
  text: 新授鹽山尉孝廉郎濟南林君脂轄東轅蒞官也鹽山滄州之屬邑也滄州戎狄接境之地國家虞守之會東南居恃力之卒西北有矜功之衆從事之劇惟天下先若非機足應權達能通變則不之與也公以二善而時與之夫騏驥未馳知有致遠之力干將未割知有剸堅之功堂堂林君假道試使嶧桐嶰竹必中音律勉以能事為邦之光祿者所以食人為國奉者所以衣人贊時豫知之而君豈不知之苟知之何往而不利始未與周相接二年間於貢府稠人中見之年甚華神甚清英如穎如若金在沙若松在林常奇之曰誰家千里駒可羡也豈權衡藻鏡而遺於是邪今春獻藝果登孝廉上第豫以片言隻字進亦同年成名既昔情所佳又今跡斯叶或因有覿獨與之語宮商起於朱絃薑桂在乎太牢泠然可聽芬乎可嘗已比郤詵之玉思懷陸績之橘夏五月自京而東賃廡陋居回軒見別豫則不敏輒奉以言會稽之竹既鏃矣宜羽之荊山之璞既琢矣宜礱之雖休勿休古有光大晨昏之暇勿忘則謺札之望可酬連城之價可取勉哉有如君材蓋不易得幼秀裴侃昨自江湖西入關遊京師今自京師東出關遊江湖十二斯冠才氣卓異身猶三尺交友四海著文數篇其措意規格儲乎遠大旬時闕下鬱發聲聞公卿名德待以優禮告離之日祖軷相屬由晨及暝方容升車軒蓋相追百有餘兩長沙歐陽某企以芳馥亦驅弊轏將欲分手詔之自愛曰楩楠出地知為梁為棟鸞鳳在鷇知摩霄薄雲子之他日豈在乎此不獨斯為㣥公斯謂子姑行無忽所謂非徒謂也無生永存旨不易源帛丿糸兮在煩澄兮處渾釋氏子味其實歸其根其教雖傳非言可言唯相似者復到其門無知上人其到門者歟上人從儒至道從道至釋如歷星月以得白日若棄扇霎而灑長風真空洞照熱惱頓盡水其性雲其身周四海以終靜出六合而非寄維揚秋杪方至自閩日未成旬作臺山之適目關河於不計擬衣食乎隨施怡如也淡如也此行逢流得抵虛舟無程峨峨五峰幾日而上登異清涼侶善知識所至也之至元之又元乎豫弱冠之年同時諦之學神不遠逮溺在名利禮足而別悽然自傷歧路既殊聊各以行勉哉無知公勉哉歐陽生儒有馭百行駕六藝曳長裾於王侯之門以禮待楊夫子是日之告謁漳浦李太守之行行儒之事也子幾於儒久矣李太守天枝之英金鏡之明盛物之量稱物之衡夫子姿容不孤其鑒多少有登其槩何往而不利高梧始華瑤草欲碧去矣夫子時景宜往諸侯歲貢俊才於天子故陳侯今年有觀光之舉白露肅物青天始高雲回鴻盤言遵永途吾觀夫雄心鋭志將領能事則夷山堙谷不盡其力何東堂一枝南荊一片足塵其慮邪勉哉陳有其才奏其試知其成矣三月三日以酒食出於野曰禊飲古俗也有唐今上御宇之九年年定三節一以二月一日之中和終取九月九日之重陽次取此日之禊飲賜㣥臣大宴登高臨流與時所宜洎四方有土之君亦得自宴其僚屬貞元十二年暮春月哉生明一日則其日也臨汝魯山令趙郡李胃恭國令宴於縣南滍濱先宴曰夫宴者古所以示慈惠而期合歡者也國家錫以斯宴者情亦古情焉况食在充腸不在充目酒在成禮不在溺神歌發其所自和舞登其所自樂窮八珍竭千鍾強發揚課絲竹則有勞有逸豈合歡之意歟於是首設一席肉一肩酒一壺命自天子命為佐者次一席酒肉亦如之命自已命以為吏者次一席酒肉亦如之命鄉閭許以耆年有德者肉既飽酒既酣因化育之宿洽有歌謠者進有舞蹈者作皆誠激乎中章乎形容婆娑慷慨與習而為者不類然後漁者請以其舟農者請以其器圃者請以其蓄弋者請以其鮮啐濁嘗漉浮泛漪瀾風恬日和川晴野媚以熙以怡萬心一之至義之門大順之家父兄子弟一族一堂之中不是過也非仁德淳化其孰能至於是邪旅遊之子實窺盛事茲宴也雖溥於天下百里不同風雨恐他邑之景物此辰不得似公之邑也一方不同教化恐他邑之歡樂此辰不得似公之邑也故序之泛舟餞行別禮之重也昔李郭有之降自近代名望之士亦往往而用皆其殷勤敻出於人意文雅足賦乎時物俾操執之容可觀風景之媚不孤理未符此事罔得舉清源郡春正月客有河東裴參和將南遊郡司戶置同正前大理評事扶風竇公因攜俎豆展故實蓋厚裴而昭己德也奇哉英秀哉其裴歟明嶷乎風姿王褱麗乎詞華朗如嵩如輝如煥如豫翰苑十年之遊飽覩四方之彥九霄寸步一日千里者豫得識之如其人如其人是餞也主賢賓賢譬古無怍指方舟以直上繞長河而屢回絃管鐃拍出沒花柳勝趣則深離觴且酣斜日應程賓辭及固噫停橈一挹裴其升車美哉裴何往而不利况此選列郡莫非哲人有知之鑒其豈相失遊意儻盡姑為時起豫從此更詣承明竇公不日應召宣室秋風似緊當共天衢佇羊角而來一舉磨蒼蒼矣詩人同志之三折肱為良醫豫五升詞場四遭掎托是以竊知乎文則洪氏子舉秀才前後勝負豫得而度夫子黼黻之性加好勤苦之節紡績墳典組織篇什觀經緯機杼則重錦繡段日日當成今年秋貢士果居首薦歌鹿鳴以飲餞想鵬摶而飭駕金欲求鍛玉將就磨光鋩穎耀朝夕以冀回雁賓海秋風落山雖難別離向慶無恨中鵠餘矢猶思再發升冬元月期會於闕下水不注川者在藪澤則曰陂曰湖在苑囿則為池為沼苑之沼囿之池力墾而成則多天然而有則寡茲池者其天然歟循原北峙回岡旁轉圓環四匝中成窞坎窙窖港洞生泉吸源東西三里而遙南北三里而近當天邑別卜繚垣未繞乃空山之濼曠野之湫然黃河作其左塹清渭為其後洫褒斜右走太一前橫崇山濬川鈎結盤護不南不北湛然中渟西北有地平坦彌望五六十里而無窪坳紫蓋凝而不散黃旗鬱以常在實陶鈞之至造化之功沙汰一氣之辰財成六合之日既以磽確外為寰宇敞無垠堮以居億兆又選英精內為區域束以襟帶用宅君長若人斯生支體具矣有心以繫其神焉若堂斯考廊廡設矣有室以處其尊焉彼如紫蓋黃旗之氣豈陶鈞造化者用宅君長英精之所耶夫物苟相表裏制必同象泄夫外則廓以靈海導夫內則融乎此湫歷代帝王未得而有豈降巢宅土之後聯帛丿糸千百之代建卜都邑不欲合夫天意而居乎將天意尚伺其根深蒂固可與終畢者而命處之故涸於有隋兆我皇唐之在孕逮其季主營之以須焉揆北辰以正方度南端而制極墉隍劃趾勾陳定位地回帝室湫成厥池既由我署才成伊去真主巍巍龍盤虎踞爰自中而軌物取諸象以正名字曰曲江儀形也觀夫妙用在人豐功及物則總天府之津液疏皇居之墊隘潢污入其洞徹銷涎漦以下澄汙廅隨其佳氣蕩鬱攸而上滅萬戶無重膇之患千門就爽塏之致其流惡含和厚生蠲疾有如此者皎皛如練清明若空俯睇沖融得渭北之飛雁斜窺淡濘見終南之片石珍木周庇奇華中縟重樓夭矯以縈映危榭巉巖以輝燭芬芳蔭滲滉漾電烻凝煙吐靄泛羽遊鱗斐郁郁以間麗謐徽徽而清肅其涵虛抱景氣象澄鮮有如此者皇皇后辟振振都人遇佳辰於令月就妙賞乎勝趣九重繡轂翼六龍而畢降千門錦帳同五侯而偕至泛菊則因高乎斷岸祓禊則就潔乎芳沚戲舟載酒或在中流清芬入襟沈昏以滌寒光炫目貞白以生絲竹駢羅緹綺交錯五色結章於下地八音成文於上空砰輷沸渭神仙奏鈞天於赤水黤藹敷俞天人曳雲霓於元都其洗慮延歡俾人怡懌有如此者至若嬉遊以節宴賞有經則纖埃不動微波以寧熒熒渟渟瑞見祥形其或淫湎以情泛覽無斁則飄風暴振洪濤噴射崩騰駱驛妖生禍覿其棲神育靈與善懲惡有如此者小子幸因受遣觀光上國身不佞而自棄日無名以多暇詢奇覽物得之於斯矚太始之元造訪前蹤於碩老天生地成之理識之於性情物儀人事之端徵之於耳目夫流惡含和厚生蠲疾則去陰之慝輔陽之德也涵虛抱景氣象澄鮮則藻飾神州芳榮帝宇也洗慮延歡俾人怡悅則致民樂土而安其志也棲神育靈與善懲惡則俗知所勸而重其教也號惟天邑非可謬創一山一水拳石草樹皆有所謂茲池者其謂之雄焉意有我皇唐須有此地以居之有此地須有此池以毗之佑至仁之亭毒贊無言之化育至矣哉以其廣狹而方於大則小矣以其淵洞而諭夫深則淺矣而有功如彼有德若此代之君子蓋有知之而不述令民無得而稱焉輒粗陳其旨刊諸岸石庶元元荷日用之力也萬物闐闐各由襲沿無襲無沿而忽以然苟非妖怪實為珍慶斯石像者其珍慶歟始孕靈韞質兆眹未見則峨峨巨石巖峭山立鎮郡城之前阜壓蓮宮之上界海若鞭而莫動天時泐而終固皇唐天寶八年五月六日清晝忽騰雲旁涌驟雨來集驚飆環駭軯訇杳冥雄雄者雷騞然中震迸火噴野大聲殷空岑嶺躨跜潭洞簸蕩須臾風雨散雲雷收激劈輪囷斬然中闢南委地以梯落北干霄而碣樹不上不下不西不東亭亭厥心隱隱真像三十二相具八十種好備列侍環衛品覺有序莊嚴供養文物咸秩端然慈面儼矣儀形似倚雪山而授法如開月殿以趺坐異矣哉不曰博聞乎未聆於既往不曰多智乎罔測其所來且物之堅莫堅於石况高厚廣袤又㣥石之傑一朝瓜剖中有雕琢其為造石之初致有相以外封乎其為有石之後入無間以內攻乎噫不可以人事徵請試以神化察巍巍釋氏發揮道精其身既傾其神不生等二儀以通變齊四大而有力教於時有所頽靡人於教有所忸怩則為不可思議以煦以吹故示此無跡之跡難然之然俾知我存存入我之門經曰千百億化身蓋隨感而應茲身者則千百億之一焉昔諸佛報現皆託於有命有命則有生有生則有滅曷若因其不朽之物憑乎不動之基形既長存法亦隨是與夫為童男而出世假長者以來化元元之徼則雖一永永之利則不侔可以禮足而悔罪寄影以安樂豫則求福不回者焚香跪仰或從釋子之後故於巉巉之餘仞聊書其所由來釋名曰樓瞜也謂其高明覿遠瞜瞜然也建於第宅則以閲園林有媚樹於雉堞則以警寇盜不虞故墨子曰城三十步一坐候樓百步一立候樓茲樓者蓋此郡北墉之立候樓也卜築之始微而具之袤不倍常廣唯再尋製造日遠土木力殆左騫右陊上露下圮有年數矣邦牧安定席公貞元七年下車至九年牧之三祀重民力而未形言是年暮秋歲豐農隙有司率常典告有事於土功公曰斯郡之南極也元后帝鄉實在於北詩不云乎心乎愛矣遐不謂矣欲因戀主向北瞻矚惟此有樓半傾半摧日夜闕登陴擊柝之所風雨憂折榱復隍之患政因時令爾其營之俾有布席跪立之地間更人防卒之蒞事豫將時躋展北面拱辰之心焉受命者感公之意如公之意野人㣥庶感公之誠如公之誠川朝子來壞崩易蠧趾有餘而不剗基墌自延材有長而不翦棟宇自崇既望庀徒未晦成功倚層霄於軒檻納千里乎窗牖如鱗之廨署若岸之軍壁得之之狀若連山之有重巒長江之蹙洪濤氣勢繇是以雄焉公每子牟情來莊舄思生俯仰於斯徘徊於斯夫完城壯邑有邦之本也戀闕愛君為臣之節也善矣哉公廣茲樓也遠得有邦之本近貞為臣之節執邦之本曰公謹臣之節曰忠唯公與忠公斯昭矣小子家在委巷多聞輿頌藝忝儒術每侍公居上志下衷兩獲而達敬書其事為之記以獻至若眺四維之雲物臨萬井之煙景遐象佳致眸莫勝觀非公有樓之素故不之載勝屋曰亭優為之名也古者創棟宇才禦風雨從時適體未盡其要則夏寢冬室春臺秋戶寒暑酷受不能自減降及中古乃有樓觀臺榭異於平居所以便春夏而陶湮鬱也樓則重構功用倍也觀亦再成勤勞厚也臺煩版築榭加欄檻暢耳目達神氣就則就矣量其材力實猶有蠧近代襲古增妙者更作為亭亭也者藉之於人則與樓觀臺榭同製之於人則與樓觀臺榭殊無重構再成之糜費加版築檻欄之可處事約而用博賢人君子多建之其建之皆選之於勝境今年暮春月邦牧安定席公別駕置同正員前相國天水姜公念茲邦川逼溟渤山連蒼梧炎氛時回溼雲多來又日臨胃次斗建辰位和氣將徂畏景方至月令云可以升山陵可以居高明蓋謂是月况地理卑庳而不擇爽塏以蕩夫污廅乎因問風俗相原隰郭東里所共得奇阜高不至崇庳不至夷形勢廣袤四隅若一含之以澄湖萬頃挹之以危峰千嶺點圓水之心當奔崖之前如鐘之紐狀鼇之首二公止旌輿以回睇假漁舟而上陟幕煙茵草玩懌移日心謀意籌有建亭之算而未之言也二公既回邑人踵公遊於斯者如市登中隆觀媚麗前來後至異口同詞昔漢帝不曰百姓安其田里而無愁怨之聲者其由良二千石乎是謂政平教成時和境清使俗泰而民以寧者也虞書不曰股肱良哉庶事康哉是謂翼帝藩皇調陰序陽使物阜而民以昌者也席公今日之化育吾徒是以寧姜公昔歲之弼諧吾徒是以昌且以之寧又以之昌愷悌君子也詩云愷悌君子民之父母二公者真吾父母也茲阜二公攸選尚而加愛務休訟簡必復斯至上露下蕪忍令父母憩之乎遂偕發言為公就亭之功如牆而前陳誠於縣尹縣尹允其請而為之辨方經跖環當上頂誡奢訓簡以授子來於是家有餘糧圃有餘木或掬一抔土焉或翦一枝材焉一心百身蜂還蟻往榛莽可去以自剃瓦甓無脛而奔萃一之日斤斧之功畢二之日圬塓之傭息再晨而成二公莫知層梁亘以中豁飛甍翼而四翥東西南北方不殊致糊白墳以呈素雘頳壤而垂繪通以虹橋綴以綺樹華而非侈儉而不陋煙水交浮巖巒謺迥精舍奉其旁達都城企其遐際容影光彩漪入瀾澄指朱軒於潭底閲雲岑乎波裏爌熿由演如飛若動又釣人飄颻於左右游禽出沒乎前後一盼一睞千趣萬態稅息之者若在蓬壺方丈之上二公重清曠於舊賞納衷懇乎㣥庶尋幽探異常於斯勞賓祖客常於斯加以平疇開闢通途在下可以親耕耨可以采謳謠作一亭而衆美具噫天造茲阜其固與人為亭歟不然何不遠郛郭而博敞詭秀之若此非常之地意待非常之人故越千萬祀而至二公方覿也邑人想之復言曰事無隱義物有正名地為二公而見亭從二公而建斯亭也可署曰二公亭雖芻蕘之云中實有謂二公不忽遂以為號小子藝忝於文曾觀光上國去之日歷越遊吳歸之辰踰荊泛漢會稽之蘭亭姑蘇之華亭襄陽峴首豫章湖中皆古今稱為佳境或棟宇猶在或基趾未沒山川物象遍得而覽方之於此遠有慚德懿哉二公智周德厚卜地如此感民若彼某非飾說入吾邑者升吾亭者知之古之製器物造宮室或有銘頌以昭其義斯亭也豈無斆古而為之章句者小子薄劣不敢議其事粗述其旨姑為之記兼借二公之名紀於左以為邦榮在位賓僚亦以次序從公而列貞元八年刺史安定席公為邦之二祀冬造六曹之都堂公表微而慮遠也天子建六官以紀綱天下分刺史六司用經緯封中猶天之有四時而人之有四肢一時不若則歲罔成功一肢不和則體莫全用公以六司之掾如股肱思安之與身之安也火流定中將壞城郭親覽廨宇首視斯署既隤而隘非凝神揆務之所日撫人民不則有國營宮室是亦為政乃量羡府以度用指斯宇而命易又曰處湫居卑非智也煩人蠧財非仁也吾欲全仁而就智蕆事者志之有司於是審基址程廣袤山節藻梲僣也削而不取土階茅櫩逼也革而是捐非約非豐允執厥中然後計具材量日力山木則酬之如市人功則稅之若時物樂民願未旬而畢飛梁五道而通負連楣六接以都豁陽軒遐引陰室旁啓挹以重屏翼以回廊暗黑乞黑乞以祕邃屹崇崇而宏敞夏處其達則炎天以凉冬居其隩則凄風以溫足以寧肌靜心以厥職者也夫哲人有作不唯利身在利人不惟利今在利後相斯堂者公侯卿士禮隔殊品公不之降也斯不亦利人不唯利於身歟堅壯固護存延千祀人不之逮也斯不亦利後不唯利於今歟覩斯堂見公之意時某處某乙為司功某處某乙為司戶司倉司法司兵司田皆外莊內融懷材抱忠無回邪以蒞下有謇諤以承上當時之彥也請列於記左庶後之君子覩名訪德知夫是日堂有人焉使有副副之言繼也其一繼之輔也所以繼其或缺而又輔其違焉其亦總使之務歟皇街使之副其職大矣天子外有六合故內闢六街以達之彼為庭除此為堂室靜諸外必先諸內乃置使以清之我唐新典也蓋以警正天衢糾逖王慝領環遊式曷之卒專扞掫徼循之令夫京師豪傑英俊之都會蠻夷戎狄之來萃排輪重足馮衆多撓我防則戶伊動必由我察則目伊瑕必見繇是九城之中乘避貴負敬長金玉可拾遺則猶土幼弱可欺遇則如傷出門若有賓讓路若有神雲興烏合而無暴自東自西以咸萃憧憧焉斯焉而能在其中悖悖焉斯焉而謹在其中六合澄晏六街源之則街使之功副使攸同也貞元八年上以元舅兵部尚書大金吾濮陽公兼右街使俾訪忠良以自佐濮陽公先以節行選次以材能擇加之以更歷因之以故舊得建州別駕前尚衣奉御高陽許公以聞上素知公名即日召見敷對器實有符曩聲當錫紫綬金章於殿庭而允其請濮陽公本官用視茲佐得人街之政悉以相付公靜而敏清而貞堅鑰禁樞深鋤事根不誡而部伍增肅不桉而逵陌倍理日出作日入息三條四出風恬月靜職斯有述公此無怍遷蘄州別駕副使如故旌其勞且藉能也夫跡以行生言由事立公釐斯署之績得國家建斯署之義遂書其義昭其績為公廳之壁記云其或接公之武踐茲位者任是既重德亦無輕列公之左雖百代可也說釋典籍謂之講講之為言耩也如農之耕田疇焉田疇將植而求實雖耕矣必耩分其畦壟嘉穀由是乎生典籍將肄以求明雖習矣必講窮其旨趣儒術由是乎成我國庠春享先師後更日命太學博士清河張公講禮記成儒術也聖祖三刊九經公通其六精於五而禮記在乎其中禮也者御人之大故首於㣥籍而講之束修既行筵肆乃設公就几北坐南面直講抗牘南坐北面大司成端委居於東少司成率屬列於西國子師長序公侯子孫自其館太學師長序卿大夫子孫自其館四門師長序八方俊造自其館廣文師長序天下秀彥自其館其餘法家墨家書家算家輟業以從亦自其館沒階雲來即集鱗次攢辨如星連襟成帷公先申有禮之本次陳用禮之要正三代損益得失定百家疏義長短鎔乎作者之意注乎學者之耳河傾於懸風落於天清泠灑蕩幽遠無泥所昧鏡徹於靈臺所疑冰釋於心泉後一日聞於朝百司達官造者半後一日聞於都九域知名造者半皆尋聲得器虛來實歸豫職在下庠亦掌有教道不足訓領徒從公惟始洎終覩公之美敬書盛事記諸屋壁并列當時執簡摳衣者於左偏說文曰尉畏也亦慰也主也故字從尸示寸寸者寸量禮度以敬上示者示陳教令以諭下尸者典職司以居位敬上所謂畏諭下所謂慰居位所謂主全茲三者以蒞王爵則仕義周是以古之人嘉用尉字為官號陶唐有太尉周有軍尉秦亦有太尉輿尉東南尉洎漢則復命縣掾曰尉自是以名至於我唐無或易所命善也我唐極天啓宇窮地闢土列縣出於五千分為七等第一曰赤次赤曰畿次畿曰望次望曰緊次緊曰上次上曰中次中曰下赤縣僅二十萬年為之最畿縣僅於百渭南為之最望縣出於百鄭縣為之最緊縣出於百夏陽為之最上縣僅三百韓城為之最上之最次於緊之最非最之緊無與焉緊之最次於望之最非最之望無與焉望之最次於畿之最非最之畿無與焉畿之最次於赤之最非最之赤無與焉最之縣長於餘縣如麟鳳五靈之長於㣥靈也數長不數類則韓城之稱與萬年渭南鄭縣夏陽並自緊而上簿尉皆再命三命已往而授資歷至之而至也上縣而下則自解褐授韓城既上縣之最簿尉解褐之貴者唯三員伺其闕非年年之有或一員之闕天下皆知之授之日亦皆知之曰某人授韓城尉是其人則頌非其人則誹雖一命之官其為人尚也如此則主司慎擇才地精美縣亦有六曹尉二人一判功戶倉其署曰東廳一判兵法士其署曰西廳茲廳兵法士之廳也根之州則司兵司法司士盡在形之國即兵部刑部工部盡在兵主武法主刑士主工今武未大威務尚繁刑未大措訟尚生工與人興無時休州縣司或雙曹六人分其職國則部屬僚八九十人分其職一人理六人八九十人之理雖大小有異而揆緒不殊其緒不殊其官不易能至於易者則人無敢易之人無敢易之則國必重之國重之則踐洪鈞大柄所由乎此也貞元十五年春余友人滎陽鄭伯義授焉鄭自上纍葉聲名為天下聞鄭以明經登科又三舉進士屈於命詞學亦流輩推內行第一其受命之年五月余詣焉十月又詣焉見東廳有記西廳無記因請書其姓氏序於左其或先於鄭芳馨猶在者亦得之至於鄭繫於鄭譜皆繫之若土壤廣狹物産有無尉非得主不敢僣序
