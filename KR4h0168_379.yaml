front:
  text: 全唐文欽定全唐文卷三百七十九勛南陽人
  hash: sha256:86dc9d71a6ac18f0f31e33ecc464795899ed4fc5526f9a82c610f86a2bda9271
  markers:
  - {type: head, offset: 14, content: 岑勛, id: KR4h0168_NFKB_379-h1, level: 1}
body:
  text: 粵妙法蓮華諸佛之祕藏也多寶佛塔證經之踴現也發明資乎十力宏建在於四依有禪師法號楚金姓程廣平人也祖父並信著釋門慶歸法允母高氏久而無妊夜夢諸佛覺而有娠是生龍象之徵無取熊羆之兆誕彌厥月炳然殊相岐嶷絶於葷茹齠齔不為童遊道樹萌芽聳豫章之楨幹禪池犬澮涵巨海之波濤年甫七歲居然厭俗自誓出家禮藏探經法華在手宿命潛悟如識金環總持不遺若注瓶水九歲落髮住西京龍興寺從僧籙也進具之年升坐講法頓收珍藏異窮子之疾走直詣寶山無化城而可息爾後因靜夜持誦至多寶塔品身心泊然如入禪定忽見寶塔宛在目前釋迦分身遍滿空界行勤聖現業淨感深悲生悟中淚下如雨遂布衣一食不出戶庭期滿六年誓建茲塔既而許王瓘及居士趙崇信女普意善來稽首咸捨珍財禪師以為輯莊嚴之因資爽塏之地利見千福默議於心時千福有懷忍禪師忽於中夜見一水發源龍興流注千福清澄泛灔中有方舟又見寶塔自空而下久之乃滅即今建塔處也寺內淨人名法相先於其地復見燈光遠望則明近尋即滅竊以水流開於法性舟泛表於慈航塔現兆於有成燈明示於無盡非至德精感其孰能與於此及禪師建言雜然歡愜負畚荷鍤于橐于囊登登憑憑是板是築灑以香水隱以金鎚我能竭誠工乃用壯禪師每夜於築階所懇志誦經勵精行道衆聞天樂咸嗅異香喜歎之音聖凡相半至天寶元載創構材木肇安相輪禪師理會佛心感通帝夢七月十三日敕內侍趙思侃求諸寶坊驗以所夢入寺見塔禮問禪師聖夢有孚法名惟肖其日賜錢五十萬絹千匹助建修也則知精一之行雖先天而不違純如之心當後佛之授記昔漢明永平之日大化初流我皇天寶之年寶塔斯建同符千古昭有烈光於時道俗景附檀施山積庀徒度財功百其倍矣至二載敕中使楊順景宣旨令禪師於花萼樓下迎多寶塔額遂總僧事備法儀宸眷俯臨額書下降又賜絹百匹聖札飛毫動雲龍之氣象天文挂塔駐日月之光輝至四載塔事將就表請慶齊歸功帝力時僧道四部會逾萬人有五色雲團轉塔頂衆盡瞻覩莫不崩悅大哉觀佛之光利用賓於法王禪師謂同學曰鵬運滄溟非雲羅之可頓心遊寂滅豈愛網之能加精進法門菩薩以自強不息本期同行復遂宿心鑿井見泥去水不遠鑽木未熱得火何階凡我七僧聿懷一志晝夜塔下誦持法華香烟不斷經聲遞續炯以為常沒身不替自三載每春秋二時集同行大德四十九人行法華三昧尋奉恩旨許為恆式前後道場所感舍利凡三千七十粒至六載欲葬舍利豫嚴道場又降一百八粒畫普賢變於筆鋒上聯得一十九粒莫不圓體自動浮光瑩然禪師無我觀身了空求法先刺血寫法華經一部菩薩戒一卷觀普賢行經一卷乃取舍利三千粒盛以石函兼造自身石影跪而戴之同置塔下表至敬也使夫舟遷夜壑無變度門劫算墨塵永垂貞範又奉為主上及蒼生寫妙法蓮華經一千部金字三十六部用鎮寶塔又寫一千部散施受持靈應既多具如本傳其載敕內侍吳懷實賜金銅香爐高一丈五尺奉表陳謝手詔批云師宏濟之願感達人天莊嚴之心義成因果則法施財施信所宜先也主上握至道之靈符受如來之法印非禪師大慧超悟無以感於宸衷非主上至聖文明無以鑒於誠願倬彼寶塔為章梵宮經始之功真僧是葺克成之業聖主斯崇爾其為狀也則嶽聳蓮披雲垂蓋偃下欻崛以踴地上亭盈而媚空中暗暗其靜深旁赫赫以宏敞碝磩承陛琅玕綷檻玉瑱居楹銀黃拂戶重簷謺於畫栱反宇環其璧璫坤靈贔屭以負砌天祇儼雅而翊戶或復肩加手鷙鳥肘擐修蛇冠盤巨龍帽抱猛獸勃如戰色有奭其容窮繪事之筆精選朝英之偈贊若乃開扃璚窺奧祕二尊分座疑對鷲山千帙發題若觀龍藏金碧炅晃環珮葳蕤至於列三乘分八部聖徒翕習佛事森羅方寸千名盈尺萬象大身現小廣座能卑須彌之容欻入芥子寶蓋之狀頓覆三千昔衡嶽思大禪師以法華三昧傳悟天台智者爾乃寂寥罕契真要法不可以久廢生我禪師克嗣其業繼明二祖相望百年夫其法華之教也開元關於一念照圓鏡於十方指陰界為妙門驅塵勞為法侶聚沙能成佛道合掌已入聖流三乘教門總而歸一八萬法藏我為最雄譬猶滿月麗天螢光列宿山王映海蟻垤㣥峯嗟乎三界之沈寐久矣佛以法華為木鐸惟我禪師超然深悟其貌也嶽瀆之秀冰雪之姿果脣貝齒蓮目月面望之厲即之溫覩相未言而降伏之心已過半矣同行禪師抱玉飛錫襲衡台之祕躅傳止觀之精義或名高帝選或行密衆師共宏開示之宗盡契圓常之理門人苾芻如巖靈悟淨真真空法濟等以定慧為文質以戒忍為剛柔含朴玉之光輝等旃檀之圍繞夫發行者因因圓則福廣起因者相相遣則慧深求無為於有為通解脫於文字舉事徵理含毫強名偈曰佛有妙法比象蓮花圓頓深入真靜無瑕慧通法界福利恆沙直至寶所俱乘大車其一於戲上士發行正勤緬想寶塔思宏勝因圓階已就層覆初陳乃昭帝夢福應天人其二輪奐斯崇為章靜域真僧草創聖主增飾中座耽耽飛簷翼翼荐臻靈感歸我帝力其三念彼後學心滯迷封昏衢未曉中道難逢常驚夜杌還懼真龍不有禪伯誰明大宗其四大海吞流崇山納壤教門稱頓慈力能廣功起聚沙德成合掌開佛知見法為無上其五情塵雖雜性海無漏定養聖胎染生迷鷇斷常起縛空色同謬薝蔔現前餘香何嗅其六彤彤法宇繄我四依事該理暢玉粹金輝慧鏡無垢慈燈照微空王可託本願同歸其七崇敬字正禮蘇州吳郡人擢明經調四門助教天寶中舉博通墳典科高第纍遷膳部郎中大歷中為國子司業兼集賢學士貶饒州司馬建中時纍授光祿大夫加特進檢校戶部尚書改兵部致仕貞元十五年卒年八十八贈左僕射諡曰宣準制皇太子時幸太學行齒胄之禮者伏請每至春秋國學釋奠之時所司先奏聽進止其釋奠齒胄之禮如開元禮或有未盡請委禮儀使更以古議詳定聞奏東都太廟不合置木主謹按典禮虞主用桑練主用栗重作栗主則瘞桑主所以神無二主猶天無二日土無二王也今東都太廟是則天皇后所建以置武氏木主中宗去其主而存其廟蓋將以備行幸遷都之所也且殷人屢遷前八後五前後遷都一十三度不可每都而別立神主也議者或云東都神主已曾虔奉而禮之豈可以一朝廢之乎且虞祭則立桑主而虔祀練祭則立栗主而埋桑主豈桑主不曾虔祀而乃埋之又所闕之主不可更作作之不時恐非禮也按舊禮立春之日迎春於東郊祭青帝立夏之日迎夏於南郊祭赤帝先立秋十八日迎黃靈於中地祀黃帝秋冬各於其方黃帝於五行為土王在四季生於火故火用事之末而祭之三季則否漢魏周隋共行此禮國家土德乘時亦以每歲六月土王之日祀黃帝於南郊以后土配所謂合禮今彭祖請用四季祠祀多憑緯候之說且據陰陽之說事涉不經恐難行用又議祭五人帝不稱臣云太昊五帝人帝也於國家即為前後之禮無君臣之義若於人帝而稱臣則於天帝復何稱也議者或云五人帝列於月令分配五時則五神五音五祀五蟲五臭五穀皆備以備其時之色數非謂別有尊崇也禮記王制曰天子學曰辟雍又五經通義云辟雍養老教學之所也以形制言之雍壅也辟璧也壅水環之圓如璧形以義理言之辟明也雍和也言以禮樂明和天下禮記亦謂之澤宮射義云天子將祭必先習射於澤宮故前代文士亦呼云璧池亦曰璧沼亦謂之學省後漢光武立明堂辟雍靈臺謂之三雍宮至明帝躬行養老於其中晉武帝亦作明堂辟雍靈臺親臨辟雍行鄉飲酒之禮又別立國子學以殊士庶永嘉南遷唯有國子學不立辟雍北齊立國子寺隋初亦然至煬帝大業十三年改為國子監今國家富有四海聲明文物之盛唯辟雍獨闕伏請改國子監為辟雍省又祭酒之名非學官所宜按周禮師氏掌以美詔王教國子請改祭酒為太師氏位正三品又司業者義在禮記云樂正司業正長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設簴崇牙樹羽則業是懸鐘磬之栒簴也今太學既不教樂於義則無所取請改司業一為左師一為右師位正四品上又五經六籍古先哲王致理之式也國家創業制取賢之法立明經發微言於衆學釋回增美選賢與能自艱難已來取人頗易考試不求其文義及第先取於帖經遂使專門業廢請益無從師資禮虧傳受義絶今請以禮記左傳為大經周禮儀禮毛詩為中經尚書周易為小經各置博士一員其公羊穀梁文疏既少請共準一中經通置博士一員所擇博士兼通孝經論語依憑章疏講解分明注引旁通問十得九兼德行純潔文詞雅正儀刑規範可為師表者令四品以上各舉所知在外者給驛年七十以上者蒲輪其國子太學四門三館各立五經博士品秩上下生徒之數各有差其舊博士助教直講經及直律館算館助教請皆罷省其教授之法學生至監謁同業師其所執贄脯修一束清酒一壺衫布一段其色隨師所服師出中門延入與坐割修斟酒三爵而止乃發篋出經摳衣前請師為依經辨理略舉一隅然後就室每朝晡二時請益師亦二時居講堂說釋道義發明大體兼教以文行忠信之道示以孝悌睦友之義旬省月試時考歲貢以生徒及第多少為博士考課上下其有不率教者則檟楚撲之國子之不率教者則申禮部移為太學生太學之不變者移之四門四門之不變者歸本州之學州學之不變者復本役終身不齒雖率教九年而學不成者亦歸之州學其禮部考試之法請無帖經但於所習經中問大義二十得十八為通兼論語孝經各問十得八兼讀所問文注義疏必令通熟者為一通又於本經問時務策三道通二為及第其中有孝行聞於鄉閭者舉解具言於習業之下省試之日觀其所實義少兩道亦請兼收其天下鄉貢亦如之習業考試並以明經為名得第者授官之資與進士同若此則教義日深而禮讓興禮讓興則強不犯弱衆不暴寡此由太學中來者也抱玉本安興貴曾孫世居河西始名重璋乾元初李光弻引為裨校天寶末元宗以戰河西有功改今名至德二載上言恥與逆臣共宗詔賜姓李徙居京兆進右羽林大將軍攝御史中丞陳鄭潁亳節度使佐李光弻破史思明功第一封欒城縣公代宗立以功授兵部尚書武威郡王懇辭王爵徙涼國公進司徒廣德中以尚書左僕射同中書門下平章事河西隴右副元帥大歷中加山南西道副元帥兼節度使十二年卒贈太保諡昭武臣志誠有涯寄任過分嘗懼覆敗自貽譴責且授其旄節扞彼蕃戎所掌之兵須自訓練如臂使指若網在綱則人有固心前無彊敵今以臣守在西鄙兼統漢中撫循實難威令不及況自隴坻達於扶文綿亘邊陲二千餘里雖山谷險阻足為藩蔽其中賊路不一皆要防虞加之夷狄無厭憑陵滋甚去年既侵右地復擾西山倘至前秋兩道俱下臣若固其汧隴則不救梁岷若進兵扶文恐患逼關輔首尾不應進退無從伏惟陛下居安慮危圖難於易其前件使及梁州刺史伏請別擇能者悉以委之令臣西備隴關竭其誠節國家大計敢不上陳起吳興人天寶十年進士釋褐祕書省校書郎大歷中官司勳員外郎司封郎中終考功郎中惟大唐之握乾符聲諧六律化廣三無能使乘黃服皂龍馬負圖必將登高率舞豈獨載馳載驅歲八月也一聖之生千秋之首舉天慶丹陵之會率土獻南山之壽上乃御層軒臨九有張葛天氏之樂醉陶唐氏之酒感百獸之來儀即八駿之孔阜於是陳金石儼簪裾廣場天近彩仗晴初有騢有驈有驔有魚雲聚日下花明露餘帝曰司僕舞我騏馵可以敷張皇樂可以啓迪歡趣須臾金鼓奏玉管傳忽兮龍踞愕爾鴻翻頓纓而電落朱鬣驤首而星流白顛動容合雅度曲遺妍盡庶能於意外期一顧於君前噴玉生風呈奇變態雖燕王市駿骨二師馳絶塞豈比夫舞皇衢娛聖代表吾君之善貸向使垂耳長坂翹足遠坰天驥之才莫用鹽車之役不停安得播天樂輝皇靈服御惟允簫韶是聽則知絶㣥稱德殊藝逸貌足之舞之莫匪聖人之教則陳力者願驅策而是效上將恢帝宇壯神皋斷景山之松用而有節感子來之衆役不告勞成仙閣之宏敞配紫極之崇高先是徵規模宏大壯經始聖迹責成梓匠當桂戶而八水悠遠植玉階而千巖相抗升陽烏於赤霄之表棲玉兔於翠微之上可以吞貝闕壓崑閬盛矣哉亦神明之化也不可得而稱狀觀乎儉以示德高即因山虹梁天近丹陛雲還漢武求仙望蓬萊於海上吾君有道致方士於人閒厥構既崇其寧惟永正色深沈於木末浮光嶙亂於山頂如翬斯飛獨出於熲農務暇霜氣澄天門闢龍輅升俯人烟於萬井小雲樹於五陵天臨宇宙日照黎蒸是時也靈仙響集品物交感因高載著於人風有象寧遺於睿覽聖人垂化稽古上清彼會昌之構宇得朝元之美名不奪穡地知庶心胥悅高標靈阜表聖壽長亨襟懷動植指掌寰瀛將九圍載廣與三光克明斯乃棟宇之大也雖前史莫之與京夫如是古之濬城隍飭宮苑孰比我君居高而致遠唐六葉嘉祉降皇威宣師出以律將有事於金天赫矣神武感通上元雙龍呈瑞一色皎然惟白也昭素秋誕聖惟龍也主殺氣清邊不爾者寧出乎海不躍於泉穆乎白龍之為物也潛依水德利用天下精異冥通騰驤神假苟非君行其道物有其官則鬱湮不育潢汙而蟠隱見罔知其旨窅冥孰見其端故我君宣八風之惠化澄四海之波瀾覆幬斯極生靈以安惟此上瑞灼然可觀其始見也精光皓耀溟漲清廓曳冰雪於半空晏雷霆於萬壑若長雲帶水而不散雙劒倚天而中落忽虹立而電回其儀不可彌度表其祥同乘黃之偶運處其度掩嘉魚之有樂偉夫鱗介之族莫智於龍苟靈應無兆豈休明再逢昔軒以負圖為景福舜以入壇為神變殊旨同歸千載一見是以天祚明德幽贊貞符彼二龍之萃止合一聖之有孚皓爾其真異葉公之藻繪超然將舉同正禮之友于是時也西戎駭目莫不感化而風趨夫如是則在宥之理足徵無疆之休可待洋洋歌頌日聞於四海者也有虞氏提地享天命光啓九有緝熙八政能使坤德以寧祥符錫慶神矣王母通靈感聖獻爾寶圖昌爾金鏡嗣堯之美於斯為盛固知冥貺有則休明無極非天私我有虞惟神歸於至德必將永其歷數寧惟錫彼封域俾皇鑒之昭昭豈神明之默默諒可耀寰宇盛邦國蓋地如何匪茲不克懿此圖籙實昭應感廣豎亥之遐步資重華之睿覽規方遠近微妙元通致蠻貊於度內出山川於卷中可以明四目達四聰易曰不出戶知天下何莫假此神功徒稽其囊括也吞八極盡四溟霜露所墜日月所經莫不總天目入帝庭嗤秦政得燕圖以拓境小穆公夢鶉首以稱靈亦有周王御天漢君求仙窮人力於宇宙遍轍迹於山川孰與夫高居深視探微洞元得地理於冥契擁神休以永年則知明德在茲景福是降播頌聲以洋溢洎寰海與里巷美矣哉歷選列辟符瑞巨萬雖元圭告成白環入獻曷若斯圖之用也九土宏而庶績建考星象之躔次探瑞氣之奧源得泰階於前史總六符以為言既出沒以候君德有熒煌以麗乾元元德升聞慶一人而祥發白雲夜卷映九霄而色繁爾其祥德而發觀瑞而明德正則正俗平則平何君王之播理俾品物以咸亨股肱掩於稷契輔翼賢於阿衡人迹其卑憑至誠而上感天象守默因列宿而下呈配兩曜以齊美非衆宿之敢爭豈比夫聚彼德星潁上賢人所感託於箕尾巖閒傳說之精而已哉故符之燦兮有明義符之爛兮有深意其形昭晰其理奧祕朝發於天而應於地向夜月而滅沒拂曙光而蒼翠上通其象分三台而為六下應於人感一德之不二皆英主之所有匪常君之能致原其所出將表上帝之心考其所歸實惟天子之利爾其臨大國懸太清德之所感符乃無情既依高以託質亦以數而為名與物無競避太陽之光色相時而作表明王之利貞火映元天似燭龍之銜吐珠沈漢水無巨蚌之虧盈豈光輝之足異亦感應之可驚忝觀光於上國仰霄漢以屏營先帝之革隋也應歸運而大義舉獲仁人而鴻業集及乎計伐録功日不暇給寶玉不足以勸賞故茅土是封鐘鼎不足以昭宣故圖贊是緝傳厥象於繪事壯崇臺於天邑貔武之臣忽披雲而鶚視股肱之任乃捧日而山立何惟肖而斯在皆凜然而可挹初庶賢遇聖神器未定天有彗兮歷象昏雲從龍兮川谷應帝曰隋失厥御國將頽弛人心如惔王室如燬膺圖受籙明徵在豫保大定功克成伊爾由是十亂輔主三傑制戎敢揚休命克贊聖功掃乾坤之墋黷濟品物之屯蒙闢天關而七曜再朗回地軸而萬㝢來同暨王道清夷乃念茲而在茲既艱難是毗亦四方是維享其勳力嘉彼令德懿我武之雄成賴爾謀之剛克宜其藏勳庸於盟府圖冠劒於紫極則是繪也其麗不億倬哉㣥彥丹青彪炳列盛服之暉華儼高居之祕靜斜月在壁疑假寐以將朝頽陽半軒同處陰而休影胡像設之既固將山河而惟永則知我唐大賚光掩前載功高賜履追呂望於周年鳥盡藏弓異韓信於漢代盛矣哉容貌方崇光靈不昧聖有制作人具爾瞻是環也用之撝謙成乎其規故有典有則全乎其素故匪雕匪刻動法天旋溫如玉色可以觀象見意可以取文昭德終日佩之其儀不忒懿夫圖通既固雅麗且殊皓質中徹騰光外敷守其明也處暗室而不昧偕其道也映素服而如無鄙南容之圭貞而猶玷嗤卞氏之璧瑾而不瑜升諸組綬不亦宜乎或有黃雀酬恩鄭商所利其名則一其實則異皆浮俗之所珍乃老氏之遐棄寧若斯為美也將君子而比義文而不華垂之如墜循環無極參日月之在躬佩服有常於韋弦而戒事固知宣尼之旨有要有倫於此表禮創物乃將卑服謙身是以成形而不受其彩散璞而不失其真瑩爾情性潔白惟純導爾情性貞明日新捨之則禮容若缺用之則法度是循物既合權古稱其善常虛心以隨運雖匪石而可轉覩妙用之昭宣知前哲之舒卷麗哉豹舄文彩彬彬豹則雕虎齊價舄與君子同身故得飛聲入楚見賜留秦曩者胡為隱霧而不下今復何幸對雪而迎賓蓋因虞者之獲成於匠者之手苟當時以為用雖殺身而何有於以履之美且無度既居下以禦濕亦迎前而啓路花映香塵光生玉步借使登朝廷列臺閣規矩不改會同自若投其跡必陟鴛鷺之行取其文不改犬羊之鞹詩人歌其事春秋美其名舍則止用則行拂漢齊飛遙分鄴令之術入朝曳響近雜尚書之聲彼糾糾葛屨珊珊珠履一則固窮一則僭起制度首出憲章俱美嘗試殫論其茲舄而已士或覽之而言曰象以齒而焚龜以骨而斃況之豹也憑巖穴以逞欲以爪牙而自衛而有用於人竟以皮而戾一朝寢處成此新偉夫斑文散渙毳毛蒙密映鶴氅以凝暉臨翠被以曜質於斯時也不可談悉亦有刻意未參卑秩東郭之曳履長穿王生之結襪何日思蔚然而一變歌豹舄以自畢豹何為兮鬱矣其文材賈害兮用之楚君用之則那為舄几几雖工興其飾亦天鍾厥美奢以則之衆目所視異哉惟雜爾巧有詭其制也青蔥掩其真赤繶慙其麗動容而彩射金屋舉趾而聲傳玉砌諒服玩之惟奇知侈靡之無藝徵夫至理也匪威儀不忒匪古訓是則甚葛屨之失禮同鷸冠之敗德何役智以宣驕乃自躬而刑國噫先王立極念茲在茲服有常度行無越思何爾舄之豹飾雜珠綺與文貍若昭其泰無乃彞是舄也君子歎之觀乎異狀斑然復周蹙霞起煥爾文質當其踐履知我者謂我惡居下流不知我者謂我親承玉趾則知物有所歸天之冥數惟豹作舄殺身思遇惜其有美而來亦以禦寒之故雖雨雪而盈尺俾陽和而在步不然者寧踐於斯路客有感而言其文也何麗其用也何薄當思步武之閒徒異犬羊之鞹飾被已慙於翡翠為裘更羡於狐貉別南山之霧以奉進趨同鄴縣之鳧願翔寥廓洋洋乎軒轅之作也陶元化以發生運神武之不殺張至樂之淳備播皇風之坱圠舉端於素得太始之自然克成於和蕩生靈之夭札何必管聲為五羽數惟八然後合夫大戛請言斯樂也不振而其聽博不眩而其意深大而不摦樂而不淫將使儉者得中和之紀奢者已醉飽之心君子曰是樂也不朽之德音於是一僨一起于彼南國真聲暢和氣塞其靜也洞庭安波其清也楚山霽色百蠻以之神化六狄由斯仰德是樂也乃不朽之德音於是柔克可以上享天心可以蕃屏人則知武也美而未盡濩矣猶有慙德觀其妙矣則天地盛而氣不乖陰陽感而六律諧惟精惟一嗤萬舞之奕奕無荒無怠見鐘鼓之喈喈觀其皎矣則合於自然施之無邊揮綽發越行流散遷事高太古功儷鈞天其曲直其音至飾諸喜以平諸心極乎天而蟠乎地率是樂也何享而不利原夫樂之契道也在心而心正在聽而聽聰故至人定和而守一合愛而流通必以濟刑政之理行山川之風豈徒耳目是玩情性克充而已哉當是時也太虛遏雲寒谷生暖三光昭晰八極充滿何淳風之泱泱諒千古之纂纂吹伶倫之律惜彼時移繼炎氏之頌愧茲才短潢汙水之微也汲引之際人皆舍諸惟有德者知之薦鬼神以昭忠信則百川雖廣莫逮其用焉喻士先沈後升一作伸於知已也辭云潢汙之水天實降之雲散雨絶淵然在茲胡稟柔而成性能處下以任時善乎濁而徐清貯之將緑棄捐池沼之外隱翳林皋之曲接九派而何勞方一勺之自足至若雲霽地表霞開水陰乾天可鑒物象是臨山曉映而色近雲高淨而影深險阻不行芥舟寧覆盈滿知節鴻毛匪沈産蘋蘩同南㵎之有藻聚飛動異舊井之無禽斯其善利也乃至人之用心且夫出山者泉歸海者川汲引無絶隄防在焉彼苞蕭屢浸束楚不傳惟潢汙也獨此晏然其明若昧其壅若退竭而自中盈不侵外天資其潔德維貫神明人棄爾微道不行犬澮夫事有小而可廣運有塞而必通當休明之聖代徵泂酌之古風彼湛然以虛淨盍薦之於王公俾爾忠信昭明有融俾爾嘗祀景福延洪斯則椒漿與桂酒可以比美而同功瀲灩駭水奫淪始波引分寸之餘方從一勺激尋常之內無爽盈科勢將坌涌迹異盤渦蹙跬步以無數蕩分陰而自多觀其日色遙臨風生未已圓規可驗疑沈璧之舊痕前後相侔若浮書而競起跡謺相近萍縈有餘促漣漪之散漫擁跳沫以虛徐流脈中移類蠖影求伸之際浮光上透若雪花呈瑞之初湧以回回馳乎淡淡始㣥分而下瀨將積少以習坎生而有準動必若浮如投石以花散等覆杯而迹幽影不過於布指光遽溢乎寸眸洶洶安翔似欲將乎斗注沺沺增繞如潛運以環周無驚川后未發陽侯當淡以成之寧同瀑怒謂小為貴也爰進涓流淺漾風光輕蟠水力寸長所及知文在其中方折是回見動不過則散或往之浮彩轉初盈之淨色將潛寧戚之鯉半未能容若流張協之薪重而才得汾溫若沖溶潏相通未合流於曲岸方鼎沸於分風礐石愈蹙淪池不融是將寬其泓量誠有重於泉蒙濩也如委淪然可視茲延袤以上騰匪徒旋於中沚翠瀲交映璿源共紀將不退於大成固在乎有便於風水迥野遠色寒空繁聲眺莫媚於雨霽聆何長於鶴鳴孤飛而天宇澄曠獨立而霜皋砥平對明景之逾秀遡晨風而自清炯爾體空泠然響遞疑磬發而珮搖若霜標而雪麗林鷴之皓色難比雲雁之清音罕繼雖居下而在幽亦高聞而遠唳或引或罷以遊以遨顧塵寰而不雜仰天路而飛高懿夫秉心清迥稟質貞素偶影思侶矜容舉步忘機遂性豈思寵於乘軒遠害全軀每勞心於警露聽閒兮易感聲怨兮難度非陸氏之無聞想王生之可慕原其翔集元圃騰鶱翠微睨蓬壺而易感冒江海而懸飛情慕必止心徂匪違或㣥翔而反顧或孤賞而忘歸厭仙府而舉華亭思鳴皋而適緑野爰捧日以遐騖遂凌烟而獨下晴皋曙兮邈矣靜皓鶴鳴兮杳何永俄度曲於㵎瀨乍迷影於雲景聞幽而音響清越觀麗而羽儀閒整何霽野之無人獨仙禽之虛警
