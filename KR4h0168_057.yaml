front:
  text: 全唐文欽定全唐文卷五十七憲宗二
  hash: sha256:8ffb1d965b8dfb9e222103d4a429fae21f1d33eb7dcd822c836813742dfc3ab7
body:
  text: 門下王者布德行惠必順天時發廩賑乏蓋循舊典朕君臨宇縣念切黎元思欲咸致其安各阜其業事關恤下政在便人豫無愛焉斯為大本而甸服之內比年豐穰一歲不登遂至艱食豈非轂下賦役經制猶繁物力所資凋耗巳甚靖言於此愧歎良深今春陽發生田事具飭苟迫於歉乏不能自存而耕植頓虧秋成何望所以特加恩賚蠲彼徵求庶農桑之及時俟牟麥之方稔式當和煦之候載示憂勤之心我其永懷俾厚生殖京畿百姓宜共賑給粟三十萬石內八萬石以京兆府常平義倉粟充其餘以太倉粟充支給比者田穀致損芻藳隨之今巳過時益難濟辦其并職田草共一百一十五萬束並宜放免又有常賦錢穀蠲放之餘貧弊者多慮難輸入欲令寬息須有憂矜其京兆府欠去年兩稅青苗等錢二萬一千八百貫欠秋租雜斛斗及職田粟五萬三千三百石並宜放免元和六年春賑貸京畿百姓義倉粟二十四萬石亦宜放免朕誠意靡達黎人未康憂積於衷鑒寐增惕爰自去歲以迄於今存救之恩屢降明詔乃眷長吏職惟親人爾其極慮撫綏指陳利病將我惠澤被於鰥孤叶於便宜無使勞擾故茲示諭當悉朕懷宣力濟時為臣之懿躅辭榮告老行己之高風況乎任重公台義深翼贊秉沖讓之志堅金石之誠敦諭既勤所執彌固則當遂其衷懇進以崇名尚齒優賢斯王化之本也金紫光祿大夫守司徒同中書門下平章事兼充宏文館大學士充太清宮使上柱國岐國公食邑三千戶杜佑巖廊上才邦國茂器蘊經通之識履溫厚之姿寬裕本乎性情謀猷彰乎事業博聞強學知歷代沿革之宜為政惠人審羣黎利病之要由是再司邦用纍歷藩方出總戎麾入和鼎實聿膺重寄歷事先朝左右朕躬夙夜匪懈命以詔册登之上公肅恭在廷華髮承辨茲可謂國之元老人之具瞻者也朕纘承丕業思宏景化選勞求舊期致時雍方伸引翼之儀遽抗懸車之請而又固辭年疾乞就休間巳而復來星琯屢變有不可抑良用耿然永惟古先哲王君臣之際臣有耆艾以求其退君有優賜以徇其情乃輟鄧禹敷教之功仍增王祥輔導之秩俾養浩然之氣安於敬止之鄉庶乎頤神葆和永綏福履仍加階級以厚寵章其惟敬哉茲謂全致可光祿大夫守太保致仕宜朝朔望經邦制理先務於安人秉義納忠諒存乎體國其有堅持正性動合衆心才當與能善足垂勸則宜荷推轂之寄為分閫之臣建侯貞師宣我利澤魏博軍步射都知兵馬使同節度副使檢校祕書監兼御史中丞沂國公田興深明有融忠孝是力介若金石通乎弛張效用思齊於昔賢潔誠期報於君父生此王國迹淪戎藩逢時乃彰會節有立日者元臣即代裔子幼年小人任事以作威諸將屏息而增懼政理滋紊刑章亟乖羣臣危疑幾致顛越朕用憂閔方圖輯寧而興任在轅門深惟大體義勇斯奮姦雄伏辜士心所歸不令而肅征鎮安固厥庸茂焉既而保貴胄之家將致上國全故帥之績求復中軍表章屢疏情懇備至以勳則特異以義則可觀周旋令圖蓋有餘裕朕高懸爵命以待能賢嘉爾殊勞允宜懋賞晉軍謀帥郤縠嘗學於詩書漢將議功竇融實冠於名節魏郊巨鎮河上奧區杖鉞可以宣國威觀風可以率彞典習俗至於丕變疲氓徯而汔康佇光册書用寄心膂榮級繼登於七命顯秩超踐於六卿仍兼副相之雄以重元戎之寄服茲休命其懋戒哉可銀青光祿大夫檢校工部尚書兼魏州大都督府長史御史大夫充魏博等州節度管內支度營田觀察處置等使勳封如故奉君親竭忠孝人倫之大端也賢智所以盡心賞功勞懋名節國家之急務也皇王所以致理朕嗣服丕業恭臨萬邦每念政之未孚化有不暨怵惕惟厲載厪於懷嘗以為肖質稟靈皆思嚮善亦在甄明撫導推示至誠樹績必使其光揚罹患必圖其安緝永言及此終食豈忘魏博大藩東夏雄屏軍戎勇於見義黎庶懷於有仁自中原始兵革之虞河朔為用武之地抱才器者或感恩而盡力申節效者果因事而彰明時將大寧斯獲豫志近田季安薨謝其子幼童姦邪憑依妄肆威福一境危栗懼致覆亡比屋凋傷疲於杼軸田興仗義奮發翦去憸人大安方隅屢獻忠懇達三軍奉上之志激千里望闕之誠誓遵典彞丕變舊俗忠諫指切感於朕心是用特授旌旄俾靖封略言念將士同德叶謀守正如金石之堅凌寒挺松柏之操垂令名於不朽示臣節於將來清風載揚丹款可鑒嘉尚歎息勞於寢興賞不踰時式示旌勸其管內百姓等身勞耕稼力竭征徭每念豫懷用當憂憫宜令司封郎中知制誥裴度往魏博宣慰親諭朕意仍賜錢一百五十萬貫以河陽院諸道合進內庫綾絹綿等支送充賞給將士及六州縣百姓差科宜給復一年使之蘇息州縣之中或有殘破偏甚者委田興逐便宜處分朕以布澤之時務從人欲好生之德期洽衆心魏博管內宜赦見禁囚徒其與田興協心立功大將及判官等委興具名銜聞奏當有甄升如有父母在別加優恤當道從前以來官吏將校等或忠義可嘉而刑戮濫及如有此色委田興條録奏聞當加追贈如有家口見存宜厚加優恤管內高年惸獨或天寶遺人夙霑皇化或孤獨廢疾不能自存委田興差官存問仍量給粟帛管內有清勤奉職為衆所知者委田興具事迹奏聞當加進改如身在邱園行義素著或才兼文武名節可稱亦委田興具名聞薦贈太尉季安姻戚舊臣嘗任將相飾終之典宜示優崇其葬事委田興差官勾當禮物之間務從周厚田懷諫在疚之初政出羣小因致軍府騷然不寧以其幼年有足矜憫待其到京之日一門量加存恤嗚呼聳善念功惟恐不及恤人厚下惟恐不豐庶洽雍熙遂櫜弓矢為仁繇己其道信然樹德務滋在乎終始凡百多士宜悉朕懷楊歸厚頃以詞藝擢於諫垣自屬班行頗修職業但列於清近當慎威儀以婚姻之私假借公館表章上獻慢黷則多俾移秩於國庠仍分曹於雒邑可國子主簿分司東洛文昌六官宗伯掌禮選授之重自昔攸難非夫台衮之臣分全於終始縉紳之義素洽於羣倫則無以允是優崇膺茲名秩正議大夫守禮部尚書同中書門下平章事上柱國扶風郡開國公權德輿奧學雄詞虛襟曠度稟中和之氣宏信厚之規夙彰厥猷歷踐清貫乃者徊翔省閣祗服大僚咸推鎮俗之風遂致濟川之望朕永惟理本宵旰在懷嘗期獻納之功深屬弼諧之任爰徵僉論俾列鼎司勤勞亟涉於歲時謙挹每形於造次是用委春卿之職輟樞務之殷任事呈能庶先會府帥屬而理汝往欽哉可守禮部尚書門下邦國之興將相是資選衆而舉思賢俾乂故有台臣外撫宣力巳靖於四方衮職迭居懋功復凝於庶績允茲崇踐爰屬上才前劒南西川節度副大使知節度事管內支度營田觀察處置統押近界諸藩及西山八國雲南安撫等使銀青光祿大夫檢校吏部尚書兼門下侍郎同中書門下平章事成都尹上柱國臨淮郡開國公食邑二千戶武元衡粹厚端莊易常一有誠明之道以致用有宏茂之略以佐時貞方自得於性術操尚不愆於風雨加以懿文合雅聚學承師通禮樂刑政之源達古今治變之要歷登華貫休聞穆然洎處鈞衡中立不倚致君思堯舜之盛修職以邴魏為宗翼戴之勤夙夜彌亮彞倫攸敘鼎飪載和益部大藩比仗兼濟而能布宣威惠撫蒞蠻髦縣道輯寧疲黎安息推心而下皆率附正己而人自嚮方臨之纍年理有殊等朕以出納王命緝熙帝圖總庶官之職業為百度之扃鍵惟此重任屬於黃扉分憂遂輟於殿邦具瞻再歸於碩望爾尚行之以中正煦之以和平毗於一人膏潤天下祗膺禮命無替徽猷可守門下侍郎同中書門下平章事兼崇元館大學士充太清宮使輔相之任所貴乎納忠進退之宜實重於申禮其有以勞奉國以疾固辭聿懷謙讓之風是舉優崇之典朝議大夫守中書侍郎同中書門下平章事上柱國高邑縣開國男食邑三百戶賜紫金魚袋李絳端莊秉彞亮直循道抱凌寒之徑節標肅物之貞規嘗以懿文參於內署亦以公望二於地卿竭其器能茂著宦業洎居衮職左右朕躬遠慮必陳讜言無隱竭致君之志宏濟俗之方確然真心鬱有休問而步履嬰疹趨侍為難披誠上聞稽首求免乃眷毗倚久之未從星霜屢遷衷懇彌激宗伯秩禮時惟大寮宜從喉舌之班用輟鹽梅之寄庶因清俾遂賾真膺茲寵章敬服爾命可守禮部尚書散官封賜如故善為國者務蓄於人百姓未康君孰與足其或時逢水旱念切惸嫠於是有巳責之恩行散利之典古今通範何莫繇斯朕恭己勵精以臨兆庶永言憂濟終食豈忘思俾萬邦同臻富壽而去歲甸服氣序愆和夏屬驕陽秋多苦雨三農爽候五稼不滋比及收藏曾靡善熟如聞閭井之內儲備罕充産於地者既微出於力者宜困既牽公上之稅薦迫輸送之期循環歲時固亦勞止況羣司具列軍衛實繁供億之名制備存工役之科條未艾四方楨幹屬在京師念茲矜人良多愧歎今土膏方動東作其勤逋賦未蠲糧餉何望宜加惠渥式俾厚生趨澤務農庶乎勸化姑示納隍之旨佇寬艱食之虞煦育順時義斯可取應京畿百姓所欠元和八年稅斛斗青苗錢稅草等在百姓腹內者並宜放免仍以常平義倉斛斗三十萬石委京兆府條疏賑給務及貧人如常平義倉不足即宜以元和七年諸縣所貯折糴斛斗添給應緣賑給百姓等委京兆差擇清幹官於每縣界逐處給付使無所弊各得自資近歲以來屢宏德澤邦畿千里田號上腴阜安疲黎亦在循政咨爾京邑長吏洎於宰字之官各宜叶心將我詔意戒之以擾授之以仁宣示朕懷咸使知悉門下虞以為盛猶咨五臣殷之用興亦賴三后朕勵精恭己十載於茲常以國鈞委之公輔務熙庶績敢怠旁求思欲左右有人在廣股肱之任歷選列辟洎於藩維冀獲賢能俾匡正道爰茲所命允屬至懷河中晉絳慈隰等州節度支度營田觀察處置等使正議大夫檢校禮部尚書兼河中尹御史大夫上柱國高平縣開國子食邑五百戶賜紫金魚袋張宏靖德稟精微器含沖用溫恭諒實明允克誠素推君子之風雅有大臣之體蘊積稽古之學發揮經緯之文嘗司朕言動叶謨訓歷踐清貫具揚淑聲爰統方州載膺節制奉法遵制在公忘私人無不懷績用丕茂豫欲正百工之理成太平之階若臨巨川以重舟楫是用命爾列於中台每念臣鄰之規以貞棟崇之吉少翁積慶嗣德漢廷文子勤身繼匡晉室爾惟朝夕納誨以翊朕躬是資衮職之勤式重緇衣之美仍帥司寇之屬俾靖皋陶之刑懋宣厥猷往踐於位可守刑部尚書平章事散官勳封如故存樹風節謂之立名歿加褒飾所以誘善故朝散大夫試祕書省著作郎兼侍御史甄濟昔以文雅見稱當時嘗因辟召亦佐戎府而能保堅貞之正性不履危機覩逆亂之潛萌不從脅汙義聲可傳於竹帛顯贈未賁於松楸藩方上陳允叶彞典追加命秩以獎忠魂可贈祕書少監孝子劉敦儒生於儒門稟此至性王祥篤行起孝敬而不移曾參養志積歲年而罔怠用宏勸獎宜服官常分曹洛師俾遂私志可守左龍武軍兵曹參軍分司東都朕嗣膺寶位於茲十年每推至誠以御方夏庶以仁化臻於太和宵衣旰食意屬於此今淮西一道未達朝經擅自繼襲肆行寇掠將士等迫於受制非是本心思去三面之羅庶遵兩階之義宜以山南東道節度使嚴綬兼充申光蔡等州招撫使仍與鄰道將帥等即同糾率共申曉諭其淮西將士官吏等如有歸國者即量其高下便授職任仍具奏聞仰超授官爵縱舊有罪犯一切無問吳元濟如束身歸朝亦當棄瑕録用其百姓有歸投者仰便給糧食仍與田宅務加存恤使其安堵事平之後淮西將士宜共賜錢二百萬貫百姓給復三年詔書所不該者嚴綬量其所宜條流奏聞庶盡綏懷之義以申生育之恩若尚執迷不能遷善至於問罪自有常刑宜以誠懷使其知悉門下贊天地之化阜成萬物正邦國之紀康於羣生夢寐旁求精誠上達況乎明誠以久嘉猷日聞股肱之任耳目所注具官宏靖實天生德惟嶽降神端方靜深信厚溫霽質抱荊山之璞光含魏國之寶錯爾素履穆然清風出備爪牙總近關之紀律入膺喉舌練中臺之法制從容宰輔密勿鼎司誠惟在公慮必經國濟川舟楫人望具瞻和羹鹽梅朕志先定宜登右弼之任用正中台之曜纂乃祖考光於家邦於戲天工人代豫違汝翼必當悉乃力同乃心役天下之才以貞百度通天下之志以佐萬幾唯直道是行唯讜言是進內懷親附拯黎元之方困外思鎮撫偃兵甲於將興勿優養以崇名無逡循而避事對揚成命時乃之休可守中書門下平章事門下弼成大化參敘彞倫克光元首之明其服股肱之任朕所以不自暇逸務求賢能式重舟楫之才以宏經濟之道疇若豫志僉諧乃公中大夫守尚書右丞上輕車都尉賜紫金魚袋韋貫之清明在躬禮樂之器蘊圭璋特達之德茂廉正博雅之規靜而知微動必有守凡踐列位備聞嘉猷當官而行臨事能斷道可鎮於風俗望彌積於朝倫是宜和靖陰陽紀綱邦國命作心膂列於台階夫能慮四方揆百事愛利萬物辨論羣材示公忘私時乃之職而況圖靖藩服繫在廟謨爾惟順下以訓人奉上以宣力因衆功而致用熙衆志以為心朝夕獻可否之誠經綸砥文武之績祗膺厥命勿懈於時可守尚書右丞平章事散官勳如故天地之化由肅殺而成歲功帝王之道以威武而輔文德朕祗荷鴻業撫臨庶邦務先含宏每慎征戰俾懷仁者有且格畏罪者見善即遷而或昏迷不恭告命不及固興勃亂之孽自速原野之誅除害正刑國有彞典吳元濟逆絶人理反易天常不居父喪擅領軍事諭以詔旨曾無敬恭熒惑一方之人迫脅三軍之衆以其父少陽常經任使為之軫悼命申奠祭臨遣使臣凌虐封疆遂致稽阻絶朝廷之禮意忘父子之恩情旋又掩襲舞陽傷殘吏卒焚燒葉縣騷擾閭閻恣行寇攘無所畏忌朕嘗念賞延之義又重傷藩帥之門尚欲納於忠順之途處以顯榮之列未能飭法猶為包荒再以詔書俾申招撫而蠆毒滋長姦心靡悛壽春西南又陷鎮柵窮凶稔惡縱暴挻災覆載之所不容人神之所共棄良非獲巳致此興戎蓋以方伯連帥同請討除伐罪弔人故茲申命宜令宣武忠武太原武寧淮南宣歙等兵馬合勢山南東道及魏博荊南江西劒南東川等道兵馬與鄂南計會東都防禦使與懷汝鄭節度及劒南義成軍兵馬犄角相應同為進討吳元濟舊有官秩宜並削除大軍既臨計即戡殄嗟我淮右之衆本為勤王之師雖是脅從頻巳昭洗念此勳力未嘗弭忘適罹狡童又此詿誤心懷忠順迫在凶威苟能率誠即可收效其淮西將士有能梟斬凶渠者先是六品巳下官授三品正員官其先授五品巳上官者節級升進仍與實封五百戶莊宅各一區錢二萬貫如能率所管兵馬以城鎮來降者並超三資與改官仍學實封二百戶錢一萬貫以一身降者亦與改轉仍賜錢帛諸道應赴行營將士如有斬元惡者亦準此處分吳元濟如能束身歸朝並與洗雪若不能改過罪止其身其餘汙脅一切不問接賊界州縣百姓軍興巳來供饋繁併言念疲瘵良增憫然元和九年兩稅斛斗錢物等在百姓腹內者并十年夏稅並宜放免其有城鎮將士百姓守節拒賊身死王事者各委長吏優給其家仍具事迹申奏當加褒贈并賜錢帛仍與一子官三州百姓莫匪吾人諸軍所至不得妄加殺戮焚燒廬舍據奪財産并有拘執以為俘馘事平之後給復二年三州內有自置義營堡柵王師所至能相率來降各加酬獎時當春候務切農桑應緣軍務所須並不得干擾百姓如要車牛夫役及工匠之類並宜和雇情願仍給優價賊平之後應立功將士並與超資改官節級賜物於戲朕率理道靡敢荒寧思致中和以康億兆而德之寡薄化未昭宣爰用甲兵良深愧歎顧非重武其在止戈宣示中外咸令知悉門下輔相之任重作豫股肱經濟之才難注人耳目苟非慮周物表識洞事先則何以出納中樞平章大政詢於時論僉曰汝諧朝議郎守御史中丞兼尚書刑部侍郎飛騎尉賜紫金魚袋裴度徑直循道清通秉彞文融菁華行茂枝葉居然廊廟之器出於領袖之門西掖司言南臺執憲常懷遠略屢告嘉猷實宣力以徇公況外身而憂國霜雪無改雷風有恆朕欲旋觀其能用試於事俾歷戎閫載馳使軒王澤渙汗以遐宣軍情密勿而上達將議抽擢因罹震驚崇道德之藩籬士有致命資忠信之甲胄兵無容刃人具瞻爾天方賚豫昆命於龜爰立作相爾其展四體堅一心廣其道以用賢厚其風以易俗五兵未戢爾惟保定武功百姓未康爾惟勤恤人隱臨事必斷當官而行齊台階於砥平補衮職之有闕光膺慎選其戒之哉可朝議大夫守中書侍郎同中書門下平章事勳賜如故門下授鈇鉞之賜其惟爪牙掌管籥之司允歸心腹況乎天兵作鎮王業成都全晉山河陶唐風俗外以威懷七狄內以承衛二京操節制戎帥之權兼澄清列郡之寄訓齊五校表率一方歷選元僚無逾上相中書令張宏靖高蓋垂慶大圭含章和順在中莊敬發外翼翼有致君之道兢兢懷許國之忠言觀器能早授方任風謠果洽於分陝膏潤實彰於近關洎登為鼎臣輔我衮職出納萬務清明一心宏宣遠猷慎守成式夢帝所賚伊人是瞻朕以龍山之前卒乘殷會鴈塞之上稽胡雜居求明略以拊循資盛名而鎮定是用輟於鈞軸授以節旄崇高超列於天官密勿遙參於台席敬聽後命載揚先聲在貞元初乃考成肅公弼諧德宗以敷景化肆豫嗣位惟爾業官匪惟勤勞於我邦茲亦光輝於爾室於戲入而惟輔出而為藩行思永圖勿替舊服可檢校吏部尚書同中書門下平章事充太原節度使門下地拱宸居任膺宰執宣明大號佐佑丕圖失其道而庶事靡陳得其道而彞倫攸敘成吾柱石在乎鈞衡況今戎役方殷廟謀為切利用既彰於歷試崇名宜允於僉諧右丞韋貫之代秉謙清天資貞白奇文包於五色茂德體於千鈞含和抱公居易求己徊翔禮闥堅明以辨其妍媸綱轄仙臺密靜克修其班制動有直氣居無流心洎權登衮職參任樞務平章庶事屢入三臺遠猷是經中立不倚元成之慶靈斯集山甫之恭勤日聞俾重輝於相門爰正位於台座於戲宰相者實執人柄以為國楨化有未孚於休物有不遂其性佇爾高議副豫虛懷豫欲惠於兆庶爾思均賦之宜庸觀在位式序品物咸亨鼓時風以淳厚吾人流王澤以光昭乃辟服我成命仰而行之可守中書侍郎平章事
