front:
  text: 全唐文欽定全唐文卷五百十一絪字文明由進士宏詞高第纍擢翰林學士轉司勳員外郎知制誥憲宗監國遷中書舍人即位拜中書侍郎同中書門下平章事罷為太子賓客出為嶺南節度使歷兵部尚書河中節度使大和二年以太子太傅致仕三年卒年七十八贈司空諡曰宣
  hash: sha256:39e21d450c3ea7afe849adcfd679d1e333debe546a07a8a709f07a1aec0781bd
