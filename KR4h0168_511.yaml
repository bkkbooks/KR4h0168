body:
  text: 日初出兮露成文盤既潔兮光乍分凝素彩而泛灩鮮皓氣之絪縕忽炯爾以流景乍揭然而拂雲若乃勢倚金莖色映霞表倒初景以搖揚淡輕煙之縹眇承露華以逾明焜霽色而共曉煥然孤秀赫奕奕於長川爛爾生光照翻翻之高鳥盤以貞兮露以盈日既明兮天以清焜以相鮮若曙月之臨朝鏡粲然交映類瓊華之雜玉英金景發色玉壺奪明敷皓質以流耀含太陽之至精伊昔漢帝初營求仙是務我皇復立承天有裕乍髣佛於帝臺宛昭彰乎天路首出庶物表一人之大明光發四施照萬方而遐布豈有屑瓊蕊泫珠露冀靈物之來遊望神人之自遇懿夫合以成象麗然增光干浮雲以杲耀激旭日而悠揚仙掌斜分若蓮峯之曙景宸心回想如崑岫之晴霜豈比周穆西遊覲王母於崑嶽重華南狩怨帝子於瀟湘獨能覩雲闕而飲靈漿者乎徒觀夫素色上升清光下發分回彩以照耀焜長空而超越日華映兮光復臨露彩揚兮色彌深既炫晃以如玉乍晶明而散金且孤高者可擬之以抗志潔朗者亦仰之而為心况地表煙息天維氣整日之麗矣與星明而共融盤實堅然齊聖祚之悠永昔之頌靈液歌浪井曾不如賦露盤之瑞景惟先哲王光有天下必正邦本以立人極建儲二以承宗祧所以啓迪大猷安固洪業斯前代之令典也皇太子純體仁秉哲恭敬溫文德叶元良禮當上嗣朕奉若丕訓憲章古式永惟社稷之重載考春秋之義授之匕鬯以奉粢盛爰以令辰俾膺茂典今册禮云畢慶感交懷思與萬方同其惠澤自貞元二十一年二月二十四日已後至四月九日昧爽已前天下應犯死罪者特降從流流罪已下各減一等文武官常參官及諸州府長官子為父後者賜勳兩轉古之所以教太子必茂選師友以輔翼之俾法於訓詞而行其典禮左右前後罔非正人是以教諭而成德也給事中陸質中書舍人崔樞積學懿文守經據古以參講習庶叶於中可充皇太子侍讀天下孝子順孫先旌表門閭者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭禮萬國之本屬在元良主器之重歸於長子所以固社稷正邦統古之制也廣陵郡王淳孝友莊敬慈仁忠恕博厚以容物寬明而愛人祗服訓辭文皆合雅講求典禮學必承師居有令聞動無違德朕獲纘丕緒祗若大猷惟懷永圖用建儲二以承宗廟以奉粢盛爰舉舊章俾膺茂典宜册為皇太子改名純仍令有司擇日備禮册命門下有天下者傳歸於子前王之制也欽若大典斯為至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代子守邦爰以令辰光膺册禮宜以今月元日册皇帝於宣政殿仍令檢校司徒平章事杜佑充册使門下侍郎平章事杜黃裳充副使國有大命恩俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年自永貞元年八月五日昧爽已前天下應犯死罪特降從流流罪已下各減一等布告中外咸使聞知臣謹詳三代典禮上稽高祖太宗之制度未嘗有並建兩廟並饗二主之禮天授之際祀典變革中宗初復舊物未暇詳考典章遂於洛陽創立宗廟是行遷都之制實非建國之儀及西歸上都因循未廢德宗嗣統墜典克修東都九廟不復告饗謹按禮記仲尼答曾子問曰天無二日土無二王嘗禘郊社尊無二上所以明二主之非禮也陛下接千載之大統揚纍聖之耿光憲章先王垂法後嗣况宗廟之禮至尊至重違經黷祀時謂不欽特望擇三代令典守高祖太宗之憲度鑒神龍權宜之制遵建中矯正之禮依經復古允屬聖明伏以太微宮元皇帝三代睿宗文武孝皇帝神主參考經義不合祔饗至於遷置神主之禮三代以降經無明文伏望委中書門下與公卿禮官質正詳定敕付所司右今日中使某至奉某月日墨詔賜臣前件神刀及食金五挺并合子鎖等臣遠赴藩鎮上軫聖憂俯降王人特頒寵賜暢威懷於遠服佩以神刀矜微劣之庸軀賜之靈藥捧受戰越以忭以驚臣即以今日發藍田縣闕庭漸遠道里猶長瞻望天顏感涕交集無任戴荷結戀之極右中使某至奉敕旨借臣前件馬至京兆府界者王人在門天驥臨路寵光荐及行色增輝上感恩私何階答效自臣叨承戎寄纍軫皇慈念輸力於外藩降逸才於內廏分憂未酬於聖主代勞已及於微臣雖駑鈍莫施而疲羸頓解再馳猶勤於遠道三接已及於帝畿即以某日至京兆府界回瞻魏闕目斷白雲祗事王程指期丹徼無任感戀之至右件鷹臣去秋來頻令入草一一揀擇皆有所能試其搏擊下韜必中伏以上囿五方固多殊異之選下土一物實表臣子之誠敢望備羽獵於長楊從搜狩於天仗輕瀆旒扆無任屏營之至伏以王人戾止天書遠降於閩川星躔既回蓂歷猥頒於遐服推步允符於聖祚先天克合於歲功三百六旬斯須而咸覩二十四氣瞬息而可知又賜以蘭膏錫之絳雪衆香流澤芳潤忽光於悴容五藥蠲痾瘴癘潛銷於腠理仰榮知忝承寵益驚閶闔九門歲時結戀於雙闕方隅萬里展效期激於丹誠敷惠未洽於遠人拜賜濫同於重鎮觀風察俗志有立於涓塵比物省躬恩何酬於覆載臣某不勝歡躍屏營之至右臣伏以古者諸侯入覲必奉贄幣或以車馬或以圭璋用展誠敬著於典禮臣繆領藩鎮獲覲闕庭幸遇昌辰又當佳節用增聖壽以表微誠前件馬及器物謹差嶺南節度押衙某隨狀奉進至微至薄無任慙惶伏願如日之升如天之福垂莫大之慶保無疆之休於萬億年永康四海臣不勝懇款之至雄官尚書比部郎中從德宗幸梁州遇害贈同州刺史忠孝行之本也儒釋教之宗也信順勤於行本修證立其教宗精一也故太子賓客贈太子太保范陽盧公正已頃節制此道陳情奏置佛寺乾元元年三月十三日詔下而錫其名稽諸前人崇定非一求有徵名顧實若斯之美君子曰本教為孝資孝為忠太保對揚殊休傴俯無讓積於善者繁祉必應先於天者虔誠是歸道超三界之謂先德垂後裔之謂積太保先君河南府士曹參軍贈太子詹事履冰任蒲江縣尉太保生於蒲江太保自省郎守通川由通川纍劒南節度屬賊臣猾夏鑾輅巡方內輯黎氓外興軍旅日月回燭氛沴銷清故可以彰厥誠祈厥名申願力而闡皇明寺居縣東二十里南去主簿化十里西去靈泉寺五里緇黃高士契來遊寺前三十步名龍潭水流入江寺後三十步有古放生池幽遠平川草樹終古無絶乘時遞新初拍當州大德僧二十一人在上座戒暉餘或歿或歸碑陰具述又一十二人精選新人亦同勒名真儀粹容長廊廣殿龍象相屬緝緝增輝昔文翁以經籍興儒張天師以階籙興道太保以忠孝興佛備茲三教語無異源如仰冥鴻誰為甲乙儒之濟理旁兼老釋孝之飾躬動循愛敬太保守端迹俾進多門拜刑部侍郎奏讞平簡留司分守凋瘵昭蘇官歷三朝望高二府顏子之行宣尼説之矣詩曰媚茲一人應侯順德永言孝思孝思惟則於太保見之矣太保嗣子幹今吏部侍郎雄早趨風教卭州刺史博陵崔作詞場之舊録事參軍紇干著文吏之能與上座暉公寺主遺維都維那道義及蒲江縣侍老王璿等皆景善目火實期雄直敘銘曰道筌衆妙儒敘彞倫各專一教釋廣三身此生不住彼劫憑因勤功定力上願能仁生食無報身心未泯覺路求通慈舟俟引天書降鑒君子顯允兩致不差四維而準日宮月殿化宇靈廟精識緇黃高情華皓瞻山仰峴坐樹思棠薪傳燈續實茂聲長存德宗時人觀射堂之攸設知射侯之有以非取善於主皮蓋繹心而正已故王用制之而諸侯是務擇以習焉而射宮觀美莫不比乎禮樂和其容止將申明於德行必審固夫弓矢皇家之闡化也稽古議酌前修茲宇既啓茲道惟休職備乎司射事集乎司裘采蘋采蘩乃施有度以熊以豹實命不猶是用外直諸體內正乎志循聲而發彼有的得祭而益乎爾地苟斯義罔取或承之羞既於德可觀則無不利豈徒稱善者五舉正者四誠有國之恆規而擇賢之盛事曩者天下無虞羯胡生變動搖我區域辛螫我方面救弊者權必反常以合道靖難者武故訓人以知戰於是大閲禮行大射義息司馬無祭侯之事梓人罷棲鵠之職蓋弛張之道因時而沿革之宜可識方今寰海謐如以無事射堂巋然而獨存綵侯不張而遠國來屬貢士不習而盛德必敦故夫五帝殊儀三王異禮咸登太和與至理莫不雍雍而濟濟是知崇樂非鐘鼓之器立德為正鵠之體也鄙生乎堯日選乎璧池達弓矢之妙旨偉棟宇之宏規儻斯道而可復庶當見擇之刑儀王者嘉瑞曰四靈龜其一也皇帝握圖御宇十有一年秋七月旬有一日龜雄雌各一遊於內池甲耀金毛文滋緑彩帝乃出示百官以議其瑞僉曰至德之應也少司成命文士賦以美焉敢布下才同夫體物賦曰介蟲之長實曰靈龜明陰陽以應化察利害以俟時於穆我皇德無不被睿澤洋溢神物來萃雖四靈其必臻懿雙龜以時瑞陋衆水而不處選天池以自寄金甲炫晃帶璧日以流光緑毛丰茸度薰風而含吹不唼喋於蘋藻恣東西於荷芰爾其有金者剛有毛者柔示剛柔之合體表刑德之具修昭品類之得性備雌雄以共遊信皇德之上達俾靈物之告休觀乎巡金塘樂翠沼晦迹無競凝神不擾引修頸而鳥伸動圓目而珠皎映紅蕖而灼爍吸清露之縹眇天資獨智笑漁者而縈羅人謀既臧鄙太卜之問兆若夫百莖蓍下九派江中順衆流而五色斯易邁千齡而片雲在空豈比夫承天眷感宸衷盼青瑣兮鄰紫宮顧毛生之可寶瑞皇室兮無窮聖人之作樂也將以同和於天地崇祭也將以合奠於鬼神祭有倫而六宗不忒樂具象而萬國以親皇家握乾符以御宇廣樂教以同人雖功成而有作亦襲古而彌新皎如繹如風俗咸和而自化擊石拊石鳥獸率舞以來馴頃以賊臣不順悖於典常震驚我師旅竊犯我紀綱禮樂之儀雖可久而可大文武之道亦一弛而一張是以七德興而有輯六樂缺而未彰今五典丕用百度載光海外懷仁以有截天下好樂而無荒帝乃誕敷文教式奏薰絃命太常以修樂將享帝而配天於是繩五元以氣應考八能而術全侈弇不興兒氏之規惟妙上下合度磬師之法可傳爰設業以設簴備宮懸與宿懸爾其金石具陳鞉鼓間出和其戛擊節以徐疾五色不亂以成文八風不姦而從律大章彰之已合陶唐之代韶盡美矣不惟有虞之日既而樂復音和仲冬日至屆殷薦之祭典將孔明於祀事用享乎上帝乃奏夫圜丘撞黃鐘而角動扣太簇而徵流大不踰宮而清濁迭和細不過羽而終始相酬是以六變而天神可禮九成而帝德惟休大禮畢雅音收居清穆以合理思宥密而為猷雖化洽時和惟善政所致而風移俗易將復樂之由二儀斡化兮四運環周大火中而退暑白露泫而成秋元鳥去巢望雲海以幽蟄旅雁違漠指煙江而遨遊農事云就婦功聿修感蟲鳴之促織念客恨之衣裘慮之云誰彼姝者子弄機杼以成績秉刀尺以循理揣其修短運纖手以俱營善乃規模敏惠心而獨揆爾其上下有序度量有常咸循故以取制豈崇異而違方隨貴賤以合則處元素而有章伊四人之所授必九月之降霜彼美衣工獻華服之楚楚彼都人士被狐裘之黃黃清霜既降商飇亦厲衰草萎庭墜葉流砌氣蕭瑟以增冷天泬寥而澄霽雖人將入室知所以戒寒而時或無衣則何以卒歲是乃背豳風者無備遵月令者有繼也若乃白日向昏愁雲四展歸鳥時聚斷蓬孤轉風生虛室之寒服念輕裘之善則晏平仲悔纍年之未易桓將軍授新衣而不遣也爰有別江山之墨客遊他鄉而未歸驚歲序之云暮恨籌謀之尚違矧夫搖落秋聲淒切霜氣巡階除而不樂撫心曲而誰謂且士有知己而我獨無人皆授衣而我獨未因感時而增歎聊作歌以自慰歌曰秋霜落兮歲已終秋雁吟兮悲遠空短褐不完兮憂思充庭樹蕭蕭兮冷暮風晃德宗朝官劒南西川節度使右臣在福建與韋臯鄰近諳其為政甚得人心逃亡悉歸遠近皆悅頃在京兆以公造出官今領餘杭以理行高第馮異漢之名將初為赤眉所敗俄又大勝光武降璽書勞曰昔雖垂翅回溪今乃奮翼澠池可謂失之東隅收之桑榆矣臣以為韋臯之功亦馮異之比往雖小失今亦大理陛下既捨其過而使之則必激勵其氣百倍匹夫一言相為而死况君臣之義誰不感恩
