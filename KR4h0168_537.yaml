body:
  text: 昔漢宣帝休明允塞烜中葉之英聲示遠人以文德既而幸甘泉以居正朝呼韓於有北錫之紱冕俾之藩翊位居侯王之上侍在軒墀之側服之孔備垂懸綬之腰章髮則有餘映切雲之首飾且會朝之次昭明孔融雖加之以禮實誘之以衷厥錫既殊荷榮華之寵命其儀未習懵衣服之在躬此實可以閲帝聰播皇風亦何必貺玉帛之資空成耗國錫金石之樂用表和戎夫爵以賞功服以旌禮懿爾容之中順故我命之光啓矧乃來茲鳳闕踰彼龍沙知漢德之全盛厭胡俗之幽遐齊縞帶於周行獨明向化異元冕於醜類豈曰亂華錫之不聞於屢褫崇之豈俟夫三加想夫解辮懷恩動容思媚乍重譯而獻欵或稽顙而奉贄使㣥方之闓樂由一人之錫遂鏘之玉佩顧韋韝而多慙穎以金貂與厖服而自異是使孔熾之類率服而莫違悍戾之屬束帶而共歸知子之來贈同雜珮彰君之化德乃垂衣殊沐猴而可作方戴鶡而有威今我后散皇明而馳聖聽致戎夏之克定勤厲理而明弻諧故蠻夷之允懷尚冠帶於萬里舞干羽於兩階彼長纓之與五餌何斯道之孔乖皇帝嗣位之十三載寰海鏡清方隅砥平驅域中盡歸力穡示天下不復用兵於是銷鋒鏑而俶載南畝庤錢鎛而平秩西成所以殄凶器降嘉生收禍亂之根本致兆庶之豐盈者也既而清天步虛武庫劒鍔銷戟鋩露當時出匣揮獷俗以來賓今日在鎔唯良工之所鑄長鍛倏爾而從革覃耜忽焉而中度廢六月之遄征興三時之盛務觀乎聚而改煎歘飛焰而涌煙從而再造將分地而用天宜人之歌允符於假樂多稼之頌式合於大田若夫弓戈櫜戢於寧歲牛馬放歸於豐年徒虛語耳胡可比焉則知先利其器欲善其事俾汙萊之盡闢由兵革之不試洪爐既鍛失似雪之鋒鋩緑野載耕佇如雲之苗穟昔用之而有所雖弭之而不棄矧國家以教令為車徒故器械可得而無以道義為封域故戰爭可得而息由是執帝堯之允恭復后稷之訓農理化資於地力福祥致於天宗此乃慶自一人風行九野建中於上返本於下下臣系而稱曰秦金狄兮未仁周無射兮非雅豈若我后之重穀盡濟㣥生於良冶聖人之制祭也因物達情比象配類盡內心之享禮定黃目之彞器居樽之上察神之至黃其色保純固於中央目以名洞清明於幽邃將以贊禘祫報天地成形而百代猶傳遍祭而萬靈具醉懿夫周禮盡在殷薦孔明鬱鬯馨而外達湛醪華而內清濩落為用昭彰表誠自可配於龍勺焉取儔於兕觥當其霜露盛時金石奏廟告虔之始在物居要動明酌而曼醁騰光澄舊汙而圓規納照且禮經所紀象設有以首瑚璉之序助宗廟之美體含宏足擎巳心從祝之獻而如鼎之峙精氣皎於外飾黃潤豔於通理嚴敬而挹且見夫爵盈明德之歆詎聞乎罍恥若乃籩豆並置陶匏共陳亦可以備觀光之祭法攄素懷於蠟賓酌其中諒明明之取義華其睆將屬屬以交神至於夜燎之時宿設之所含霜若麗夫金質導氣更宜夫桂醑自合禮於宗彞匪齊名於杜舉是知純嘏將降明禋在茲達臭陰於勿勿駐靈駕之偲偲尚禮然也明王用之方今樂和同禮無體粢盛式務鬱器光啓客有習於聲詩願奉樽而觀禮茫茫積流祚聖有作動上天之密命假靈龜以潛躍蓋欲以慶遙源敷景鑠寫物象之精祕化人文之朴略豈不以河之德兮靈長龜之壽兮會昌載徵符先呈於古帝稱大寶後遺於寧王故將出也感天地動陰陽浮九折之澄碧散五色之榮光然後蹈箭流而泳花浪露元甲而明繡裳初若沉圓璧而未沒稍似泛孤鳬而欲翔既而降芳蓮蹈清沚五老遊而共覩列聖過而每喜出朝日如耀其寶圖伏靈壇狀陳其鏤簋布爻象之糾紛蘊天地之終始負謀謨之畫將化洪荒當授受之時豈思緑水非臆對之可述諒鈎深而有致所以出河宗作天瑞馮夷倚浪以相送神魚鼓舞而旋避於戲冥數窅然自我而傳外骨明賁中心善泉將後天而思永豈為贄而居前至如魚託素以達情鳳銜詔而展禮未若祥開八卦兆動四體闡文教寧木鐸之足儔贊貞明與日月而同啓洎乎形貌既著品物類分榮萬化之茫昧合一氣之絪縕讖用光於夏葉繇每煥於羲文此乃天理用彰神道設教故躍波而委質殊以文而飾貌觸綸誠怪於文鰩隱霧徒嗟乎元豹此悠久也可是則而是效翩彼靈烏賁然效質披圖牒而罔二叶邦家而得一備體有光至真無匹宗廟薦敬帝王之孝克孚天地感仁潔朗之容可述恥受彩以相混故莫黑而獨出上瓊樹而若無下瑤階而乍失懷恩反哺方去去以凌雲養素來儀且翻翻而就日觀夫載飛載止厥狀粲然不染而成因心之孝以立匪召而至感物之道遐宣向皇風而自舞與麗景而相鮮人具爾瞻既含章而效祉我無爾詐乃見素以守全乃知王澤竭而退飛帝道通而無遏彼明心兮不妄至知大節兮不可奪象潔白而攸歸知愛敬之旁達懿夫不汚其色罔違斯道秀質安倚凝光淨好美仁慈之及物故易色於昭昭惡赤黑之眩人乃成形於皓皓且夫應圖咸若鄙臯澤之鳴鶴瑞聖不還陋江湖之白鷴諒飲啄於仁義豈逃潛於阻艱所以其出無常其來有素雲凝標於羽族玉潤合於王度常從碧海隨杲日而悠揚今在華林遇盛時而瞻顧實由我后敬之昭假皇矣光宅垂拱而燭幽以明禽鳥乃化元為白逗祥光而聿至望休氣以來格時哉時哉奮翹英於紫陌古之畋獵自天子達諸侯秋則獮春則搜非有情於殺戮固無取於盤遊蓋以除時稼之所害示軍容之克修故王者有三驅之禮也職此之由夫生殺之柄主之於天生誠有之殺亦宜然是乃張我武出於畋植靈旗以準的應晉鼓以周旋兵作於後獸馳於前背主而去者以其逆而必殺委質而來者以其順而必全是知從禽之中有古義焉何哉三驅之義我則有以且以驅為名至三而止驅者以無合圍之道三者以有知足之理蓋以明上帝之心見聖人之旨初其擇吉日戒師期既逐獸以禮亦使人以時不如追軍詎設左右之翼有異捕鹿寧分掎角之師夫堯舜而來殷周以往皆順時而行令非害物以示養無違者不殺知有異於焚林犯德者取之固無間於漏網故知樹德務滋除惡務去所以欲萬國之畏威使四方之即敘柔者來服則必解其罻羅挺而背走則必烹於鼎俎若然者必沮其強梁而銷其旅拒也逮乎大漢遊盤是恣馳騁是耽崇苑囿而大開里寧止百取庖厨之饜飫畋豈惟三不然者何以子雲有長楊之諷相如有亡是之談我國家修古典斥遊宴狩不奪於三時網惟留於一面大田多稼聊會獵以長苗四海無虞徒因搜而教戰美矣哉三驅之禮因茲而又見嘉大樂之同和惟上帝之申錫豈功成之可致必神遇而來覿吉夢足徵奇音無斁爰升天表備聽乎皎如繹如方悟人間徒聞乎擊石拊石想夫秦穆趙簡遊魂太清下連霄而無覺上和奏而有聲感之深殊九變之曲神而化異三代之名則知昭假於下潛通在上俾晝作夜既尚寐而冥濛好樂無荒乃克諧而瀏亮翕然並作隱爾盡暢所以娛其精誠所以滌夫昏妄既而受天錫降天衢空恍惚於沖漠猶髣佛於虛無餘響愔愔而在聽撫躬眇眇而異途原夫育萬靈騰九有縱未央之娛樂表不息之悠久永為二主觀樂鈞天假夢中之高會豈邦內之歡然未若我皇沖一氣而獨運協六律而相宣發善令為鐘鼓播仁聲於管弦將興慶於乾坤之內非取樂於耳目之前不識不知順天之道旁流喜氣寧候於鏗鏘盡得歡心詎資於擊考斯乃常聞於率土不閟於重霄致中和而廣被誠教化之孔昭是曰鈞天之樂也又何萬舞之與九韶景麗天中君居人上觀星文之高朗見君德之洪暢矧乎景以為名氣之可望徒亘其二方之色靡知其千變之狀故隱不可思見無與期必潛拱而元感乃粲然而著之諒精誠之盡達若影響而相追且夫浩浩陰步馬昭昭元吉匪乘運而生將俟時而出方今統三才而不爽叶一德而無失所以列其數而惟三等其色而如一既參差而比象亦錯落而為質非煙非霧相羃歷以氤氳散彩耀芒遠精明而成實懿其燭彼天衢同日月之列於三無瑞我元首旌號令之敷於九有不然何以渾青赤之悠揚掩斗牛之熒煌或助月於晦朔或偶聖而昭彰昔在周公之攝贊幼主周武之肆伐大商皆立功而本政亦效祉而垂光未若明庭而治國無事而降康斯時也豈虛其應斯瑞也則惟其常是以瑩霏微之中形璀璨之色仰嘉氣之來輝煥喻他方之歸道德陋虞舜之近加於房小唐堯之才出於翼瞻之踴躍如北面之事一人照之清明若南向之觀萬國豈同乎嘒彼躔次行諸歲時昏在昴中示春物之將蠢爾申為斗建兆秋風之欲凄其雖窮運數於晷刻未甄邦國之清夷窅帛丿糸邈兮元造在休徵兮載考何煒煜於重霄信恢宏於治道手抃目駭兮載賡歌於大寶窮陰忽至品物盡瘁惟良木之堅貞映衰林而蔥翠桃蹊李徑聞別葉之互飛松澗柏陵見修條之自異諒本性以無易託斯時而不類雖殺菽之霜再三斷篷之風數四徒凜凜以終日竟青青而在地懿夫春夏榮滋我不競於芳時秋冬淒冽我不改其素節遙分郁郁之煙遠映霏霏之雪故其桑榆種其前後梓植其行列或蕭瑟以柯空或離披而條折何在昔而相混果迄今而旌別觀夫陽曜以芳菲為事陰凝而肅殺為名徒運彼以寒暑豈齊我於枯榮斯乃時纍不能纍其質天損不能損其貞亦被霜氣亦含風聲挺喬枝而易識在灌木而難并故蒼然以殊致豈蠢爾以叢生異其鬱鬱秀色亭亭高幹産二儀之內我獨後雕處㣥木之中孰云共貫當其黃隕方可瞻玩庭有槐兮落際山有榛兮雕陰見枯稿之無色識茂悅之有心愛日照而逾靜嚴飇吹而轉徑或出衆而標奇或處幽而表正雖結根山嶺移植軒屏如全真而率性客有擇木務材感衰歎盛悟標徑無永申蚍蜉之歌愛堅貞不渝發風雨之咏松兮柏兮猶君子之志行古者推歷生律懸法示人在寒暑之未兆已斟酌於至神故能推一陽之生為三正之始察黃鍾之氣煦然以升辨青帝之功微而可紀外去涸沍之節內見發生之理具無形而有聲徒明目而聰耳得於心而不昧藏諸身而有以人事尚昧於先春天統已彰於建子若夫衆象高懸可伺察於穹天㣥形多類可區別於厚地雖紛綸而靡極終視聽之攸記未若竹管之用前知歲時葭灰之動罔失毫釐物之先見應必在茲取竅厚而均者當微眇而候之是則陰陽之運變化之期易以形隱難以氣欺懿其十一月之節十二辰之首因積小以成大得出無而入有遂能以吹灰於中動穀於口亦猶道之生一宛在陽之初九觀乎窮天地之性興邦國之政洎純陰之始凝導太陽之將盛何制器之精微可驗物於遼敻故曰述之者明作之者聖所以觀一管之動靜效五音之邪正斯乃造物於又元考時於至賾就兩儀之茫昧先萬物而探索六律六呂由是以相生八風八音由茲而卒獲矧夫國家仰合天法俯回天眷既用晦而必明亦處蒙而可見敦氣數之元本去聲色於宇縣彼唐堯敬授羲和欽若未曰窮微而知變伊君子兮何師邈淳古而繹思儼然有章相威儀於樂只溫其如玉故切磋而佩之縝密是比貞明所資追琢斯成既殊張氏之印清美可羡寧匹孔侯之龜是用濯自丹水取諸元圃君求美質我則表溫潤於光容臣聽好音我則動淒清於步武結以紳帶綴以環組使感之者在約而思純服之者居今而行古豈比夫詩人無文贈雜佩兮夫君騷人著美紉幽蘭兮之子是以嘉其抱素貴以合貞想見白虹之氣思聞清越之聲發凝輝兮既昭我述鏘雅韻兮必俟君行是以敬慎侯度獨高人情至若斫以為壺徒玩其質執而為璧徒旌其秩豈若用之有方垂之無必威儀棣棣居則粲然之光進退瑲瑲動則泠然之律是以古之君子物有其章溫恭可象環珮其鏘既覩容而生敬諒播往以傳芳然則貞玉之質非賢無以服用昔賢之珮非玉無以表彰故佩斯敬覩斯莊方今野無遺賢山不藏玉彼華佩兮同昔時以入用彼君子兮思古人以自勗故能振休風播淳俗則今日之佩玉昔賢之高躅者也聖人順天道防人欲布和以調其性宣樂以察其俗氣將導志五聲發以成文化盡歡心百獸率而叶曲茫茫大空樂生其中聲隨化感律與天通交四氣之溥暢貫三光乎昭融將君子以審樂故先王以省風致同和於天地諒難究其始終惟樂之廣於何不有包陰陽兮不集不散降神靈兮或六或九故季札聆音而感深宣尼忘味於甘否昭覆燾兮煦嫗召遊泳以飛走演自窅冥發於性情將不動而為動自無聲而有聲王者通三我則貫三才而作陽數有九我則至九變而成不然者何以調大中何以繼光宅作終樂於數四歷君子之凡百其聲轉融其道彌赫大哉至樂於以洪覆收之而合乎希夷張之而散乎宇宙感天神與地祇格靈禽與仁獸扇風化而以攢則雍熙之可就大韶命曲大章同儕既和且樂亦孔之皆且簫為器之所細鳳為王之所懷若惉懘之音感清淨之化乖則歌已而於狂客孰來儀於克諧恭惟我君配天作主命工典樂考法師古浹聲教之汪濊合堯禹之規矩士有聞韶嘉於蘊道擊壤希乎可取同鳥獸之歸仁承德音而率舞臣某言臣聞知足不辱知止不殆若險危而久處駑劣而又病則顛隮之期斯須可待况臣本性褊狹久塵樞近衆所謂否心有可焉衆所謂可心有否焉則皆盡言莫敢畏避所以居多忤物動不適時聖恩雖為曲全人理終難自咎臣某中謝伏惟尊號皇帝陛下紹開洪業再受景命蕩諸夏之妖孽致㣥生於仁壽臣之厚幸遇此昌期徒荷聖功莫效分寸乞避賢路少安疲病臣不敢廣引前事崇飾虛辭直以折足為憂冀有保身之望若任在闕二字可以匡輔朝廷則臣以生前豈敢愛惜性命但以去之無損留則可哀儻受始終之恩是全進退之道無任悃欵之至臣聞天道君也高而下濟地道臣也卑而上行上下交感然後萬物生焉庶政成焉其或蓊鬱不通則為災沴之氣必在宣達使之光明太平之風實繫於此伏惟文武大聖廣孝皇帝洪覆品彙光宅寰區翾飛跂行皆得其所况臣器識庸陋遭遇便蕃始事憲宗過蒙驅策復事先帝猥加爵命大恩無報終懼且慙以至今日又承寵寄涓毫未效齒髮將衰起在山南不遠甸服宴安厚利拜受軒階此則為君之道下濟有餘為臣之道上行不足尸祿彌久心魂若驚日往月來寖成憂塞伏希降鑒特許入覲冀得少謝萬一使無壅情然後退歸里閭降避賢路雖則萬殞無恨可謂百生之幸况李光顏薛蘋皆武臣也淮海以為要重然猶邐迤而至述職明庭臣儒臣也梁漢無事道途孔邇若泰然自安貪冒榮顯任為公相衆所指名又何以表率四方儀刑多士臣不勝傾心延首瞻系天衢之至臣蒙恩授前件官準制取今月二十八日册命者伏以公台崇禮典册盛儀庸臣當之實謂忝越况纍承寵命亦為便蕃前後三度已行此禮令臣猶忝參樞近竊懼無以弻諧重此勞煩有靦面目伏乞天恩且課臣官效責臣事實册命之儀特賜停罷則素餐高位空負恥於中心辨冕輅車免譏誚於衆口不勝慚惶懇迫之至內府之珍先朝所賜既不敢將歸地下又不合留向人間謹却封進臣聞主聖臣直今既遇聖主輒為直臣上答殊私下塞㣥謗誓除國蠧無以家為苟獻替之可行何性命之足惜伏惟文武孝德皇帝陛下恭承丕業光啓雄圖方殄頑人之風以立太平之事而逆豎搆亂震驚山東姦臣作朋撓亂國政陛下欲掃蕩幽鎮先宜肅清朝廷何者為患有大小議事有先後河朔逆賊祗亂山東禁闈姦臣必亂天下是則河朔患小禁闈患大小者臣等與諸道戎臣必能翦滅大者非陛下制斷非陛下覺悟無計驅除今文武百寮中外萬品有心者無不憤怨有口者無不咨嗟直以威權方重獎用方深有所畏避不敢抵觸恐事未行而禍已及不為國計且為身計耳臣比者猶思隱忍不願發明一則以罪惡如山怨謗如雷伏料聖明自必誅殛一則以四方無事萬樞且過雖紀綱潛壞賄賂公行待其貫盈必自顛覆今屬凶徒擾攘宸衷憂軫凡有制命繫於安危痛此姦邪恣其欺罔干亂聖略非止一途又與翰苑近臣結為朋黨陛下聽其所説則必訪於近臣不知近臣已先私相計會更唱迭和蔽惑聰明所以臣自兵興以來所陳章疏事皆切要所奉書詔多有參差蒙陛下委寄之意不輕被姦臣抑損之事不少臣與佞幸亦無讐嫌祗是昨者臣請乘傳詣闕面陳戎事姦臣之黨最所畏懼知臣若到御座之前必能悉數其罪以此百計止臣此行臣又請領兵齊進逐便討賊姦臣之黨曲加阻礙恐臣統率諸道或有成功進退皆受羈牽意見悉遭蔽塞復與一二憸狡同辭合力或令兩道招撫逗留旬時或遣他州行營拖曳日月但欲令臣失所使臣無成則天下理亂山東勝負悉不顧矣為臣事君一至於此且陛下前後左右忠良至多亦有熟會典章亦有飽諳師旅足以任使何獨斯人以臣愚見若朝中姦臣盡去則河朔逆賊不討而自平若朝中姦臣尚在則河朔逆賊雖平無益臣伏讀國史見代宗之朝蕃戎侵軼直犯都城代宗不知蓋被程元振壅蔽幾危社稷當時柳伉乃太常一博士耳猶能抗表歸罪為國除害今臣所任兼總將相豈可坐觀凶邪有曀日月臣不勝感憤嫉惡之至謹附中使趙奉國奉表以聞倘陛下未甚信臣猶惑姦黨伏乞出臣此表令三事大夫與百寮集議彼不受責臣合伏辜天鑒孔明照臣肝血但得天下之人知臣不負陛下則臣雖死之日猶生之年臣某言臣聞木有蠧蟲其木必壞國有姦臣其國必亂伏以前件人為蠧為姦欺下罔上百辟卿士莫敢指名若不竄逐必為患難陛下他時追悔亦恐無及臣所以奮不顧身舉明罪惡其第一表第二狀伏恐聖意含宏留中不行臣謹再寫重進伏乞聖恩宣出令文武百官於朝堂集議必以臣表狀虛謬抵牾權幸伏望更加譴責以謝宏簡元稹如宏簡元稹等實為朋黨實蔽聖聰實是姦邪實作威福伏望議事定刑以謝天下臣今將赴行營誓除凶寇而憂在心腹不在四支憂在朝堂不在河朔伏感諸葛亮出師之時上表言事猶以宮中府中不宜異同科犯為善為惡請申刑賞臣才雖不逮諸葛亮心有慕於古人昧死聞天伏紙流汗魏博一軍不同諸道過河之後却退不得便須進擊方見成功若取黎陽渡河既才離本界便至滑州徒有供餉之勞又生顧望之勢况宏正光顏並少威斷更相疑惑必恐遷延然兵士不從中制一定處分或慮不可若欲於河南持重則不如河北養威不然則且秣馬厲兵候霜降水落於楊劉渡河直抵鄆州但得至陽穀已來下營則兵勢自盛賊形自撓臣昨於延英陳乞伏奉聖旨未遂愚衷切以上古明王聖帝致理興化雖繇元首亦在股肱所以述堯舜之道則言稷契臯夔紀太宗元宗之德則言房杜姚宋自古至今未有不任輔弻而能獨理天下者况今天下異於十年以前方馭駕文武廓清寇亂建升平之業十已得八九然華夏安否係於朝廷朝廷輕重在於宰相如臣駑鈍夙夜戰兢常以為上有聖君下無賢臣不能增日月之明廣天地之德遂使每事皆勞聖心所以平賊安人費力如此實繇臣輩不稱所職方期陛下博採物議旁求人望致之於輔弻責之以化成而乃忽取微人列於重地始則殿庭班列相與驚駭旋則街衢市肆相與笑呼伏計遠近流聞與京師無異何者天子如堂宰臣如陛陛高則堂高陛卑則堂不得高矣宰臣失人則天子不得尊矣伏以陛下睿哲文明惟天所授凡所閲視洞達無遺所以比來選任宰相縱道不周物才不濟時公望所歸皆有可取况皇甫鎛自掌財賦以苛為察以刻為明自京北京西城鎮及百司并遠近州府應是仰給支度之處無不苦口切齒願食其肉猶賴臣等每加勸誡或為奏論庶事之中抑令通濟比者淮西諸軍糧料所破五成錢其實祗與一成兩成士卒怨怒皆欲離叛臣到行營方且慰諭慮其遷延不進供軍漸難但能前行必有優賞以此約定然後切勒供軍官且支九月一日兩成已上錢俱各努力方將小安不然必有潰散今舊兵悉向淄青討伐忽聞此人入相則必相與驚憂以為更有前時之事則無告訴之處雖侵刻不少然漏落亦多所以罷兵之後經費錢一千三十萬貫此事猶可直以性惟狡詐言不誠實朝三暮四天下共知唯能上惑聖聽足見姦邪之極程雖人品凡俗然心事和平處之煩劇或亦得力但升之相位使在公卿之上實亦非宜如皇甫鎛天下之人怨入骨髓陛下今日收為股肱列在台鼎切恐不可伏惟圖之儻陛下納臣懇欵速賜移易以副天下之望則天下幸甚伏聞李修疾病亦求入來如浙西觀察使且與亦得臣知言一出口必犯天威但使言行甘心獲戾今者臣若不退天下之人謂臣不識廉恥臣若不言天下之人謂臣有負恩寵今退既未許言又不聽如火燒心若箭攢體臣自無惜惜陛下今日事勢何者淮西蕩定河北底寧承宗斂手削地程權束身赴闕韓宏輿疾討賊此豈京師氣力能制其命祗是朝廷處置能服其心今既繼開中興再造區夏陛下何忍却自破除使億萬之衆離心四方諸侯解體凡百君子皆欲慟哭况陛下任臣之意豈比常人臣事陛下之心敢同衆士所以昧死重封以聞如不足觀臣當引領受責陛下引一市肆商徒與臣同列在臣亦有何損陛下實有所傷不勝憤悶惶恐之至伏以頤養聖躬在於順適時候若飲食有節寢興有常四體惟和萬壽可保謹按道書春夏早起取雞鳴時秋冬晏起取日出時蓋在陽則欲及陰涼在陰則欲及陽暖今陛下憂勤庶政親覽萬幾每御延英召臣等奏對方屬盛夏宜在清晨如至己午之間則當炎赫之際雖日昃忘食不憚其勞仰瞻旒扆亦似煩熱臣等己曾陳論竊望聽納不勝懇迫之至比者陛下每月約六七度坐朝天下人心無不知陛下躬親庶政直至河北賊臣遠聞亦皆懾懼今自兩月以來入閣及開延英稍稀或恐大段公事須咨稟睿謀者有所壅滯伏冀陛下稍示憂勤乘涼數坐廣加延問使得盡誠
