front:
  text: 全唐文欽定全唐文卷五百三十七度字中立河東聞喜人貞元五年進士舉宏詞科纍拜中書舍人改御史中丞元和十年拜中書侍郎同中書門下平章事擢彰義軍節度淮西宣慰招討處置等使討吳元濟還朝策勛進金紫光祿大夫宏文館大學士上柱國封晉國公復知政事出為河東節度使穆宗敬宗朝凡三知政事文宗立加門下侍郎集賢殿大學士太清宮使進侍中拜中書令薨年七十五册贈太傅諡文忠會昌元年加贈太師
