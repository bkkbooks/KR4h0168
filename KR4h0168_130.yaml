body:
  text: 制左軍同十將充西扇都巖將頵早係轅門久居巖界星霜屢換警察無欺寡人自襲丕圖廣施慶澤眷茲勤瘁宜示陟遷克固前修更期後奬可銀青光祿大夫檢校太子賓客兼監察御史上柱國充十將餘如故恩旨賜臣金書鐵券一道臣恕九死子孫三死者出於睿眷形此綸言録臣以絲髮之勞賜臣以山河之誓鐫金作字指日成文震動神祇飛揚肝膽伏念臣爰從筮仕逮及秉麾每自揣量是何叨忝行如履薄動若持盈惟憂福過禍生敢冀慎初獲末豈期此志上感宸聰憂臣以處極多虞慮臣以防間不至遂開聖慮永保私門勗以功名申諸帶礪以上八字一作屈以常刑宥其不死雖君親囑念皆云必恕必容而臣子為心豈敢傷慈傷愛謹當日謹一日戒子戒孫不敢因此而纍恩不敢承此而賈禍聖主萬歲愚臣一心臣誠惶誠恐頓首頓首敕淮南鎮海鎮東等軍節度使牒將仕郎試祕書省校書郎鍾廷翰牒奉處分前件官儒素修身早升官緒寓居霅水纍歷星霜克循廉謹之規備顯溫恭之道今者願求録用特議掄材安吉屬城印曹闕吏俾期差攝勉效公方倘聞佐理之能豈超升之奬事須差攝安吉縣主簿牒舉者故牒前攝蘇州長洲縣令文林郎前守洪州都督府參軍張蘊牒奉處分宰千里之邑寄百里之命巽懦則絲棼繩亂用剛則土曠民離苟得適中庶幾可守前件官窮經任已明吏藩身御札承制正授常州江陰縣令表次録奏仍牒舉者敕淮南鎮海鎮東等軍節度正隨身劉仁規等牒奉處分前件人久在軍門志懷忠幹或比差隨逐皆推奉上之心或職列巡封備顯歲寒之節今者驂隨歸使合議甄升各加超擢之恩以示奬酬之寵事須改補節度散子將仍牒知者故牒乾化四年四月日牒使尚父守尚書令吳越王若夫古先垂訓賢哲修身莫大於上承祖禰之風下廣子孫之孝是故堯舜之化理天下其先則曰敦睦九族然後平章百姓協和萬邦詩不云乎無念爾祖聿修厥德是知為人子人臣之道無過於尊奉祖先揚名立身者也念豫遠承祖派紹襲宗風爰自幼年志攻學術屬世道之屯否憤豪猾之僭昏擲筆硯於天目之山練干戈於錢塘之域推赤心而效順仗一劒以除奸勦薛朗於姑蘇纍施擒縱殄漢宏於甌越粗展機謀鎮越安吳匡君輔國自兵符而升郡印以廉車而建節旄綰三鎮之藩方受六朝之委任尊居師右位極人臣雙封兩國之榮冊掌中臺之任家藏玉冊手執瓊圭襲華袞而駕輅車錫寶券而森門㦸榮光祖禰寵被親姻子孫皆忝勳華宗族盡沾爵祿長源衍慶纍葉承庥考本尋根實由祖德況賜甲第於茅山之下改鄉名於故府之前尋準敕書建制私廟昭三代追崇之盛耀祖先贈典之榮存歿光輝雲仍浹慶但以歷世帛丿糸遠慮乖次序余總戎政之暇考閲譜圖之祥乃命區分別為卷軸上自少典次及彭籛孚公更錢氏之文讓公為過江之祖高曾積善德厚流光棣萼既繁蘭芽轉茂遂各堂構析以諸房切慮百代之後流派愈多難窮婚宦之由有墜祖宗之業今則先鋪血脈次列尊卑粗明纂襲之風永奉蒸嘗之道傳示來葉勿墮箕裘若夫本大枝長源深派遠哲賢之後靈慶常存我錢氏實黃帝之苗彭祖之裔三季之前兩漢之際軒冕勳業翬映士林祖德家聲迄於唐史臨安縣有遺廟九所水旱祀焉俗謂錢氏九州廟年代寖遠銘記不存空仰威靈罔知官宦鏐始戡越難遂忝圭符復救吳災又叨節制因歸寧故里歷覽遺蹤噫承天子之優恩亦吾祖之餘慶也因以俸錢新其廟宇式刊貞石用播清塵鏐常閲家牒至讓公未嘗不執卷移時恍若神會讓公字德高仕後漢剛毅武勇學通韓詩時太守薛固舉孝廉遷歷陵安章等郡牧後固為廷尉所枉公朝賀之際大呼稱冤順帝令虎賁以矛楯夾腋問所陳之事公辨舌如流神色不異百辟莫不俯伏遷征東大將軍破賊功高為徐兗二州刺史後十四代孫逵字通甫出身入仕與讓祖相類梁大同中為廬陵王國侍郎羽林監及陳祖龍飛遷東海太守娶琅琊王氏生九子皆相次為將軍郡守因移家江南子孫隆盛初立祠堂年代綿邈居人祀焉故老相傳九州廟或作洲字非也元顯聖跡出在汀河故有此誤也豫鏖兵之暇與紀其事以示來者云第一造公字子榮陳蕩寇將軍遷高密二州牧第二瑋公字慧高陳太建中由句容令拜神武將軍遷都督虜山鎮使押禦北藩至唐武德中鎮唐溫滔州終於王事第三勢公字道摹陳太建中除伏波將軍又拜和戎將軍鎮威將軍鎮闕山第四環公字德冏太建中亦拜伏波將軍理新蔡第五瑤公字德圭太建中拜宣威將軍鄱陽王府中兵參軍至德四年除驃騎大將軍第六珍公字智武至德四年拜昭遠將軍隋大業十年授溪陽令唐武德七年與郡王平湯祐改授宜春第七瑱公字軒直太建十四年拜宣猛將軍隋大業九年平滄海道征與大將軍周法尚西討破賊楊元威加朝散大夫第八瑃公字子玉仕陳為親信子弟內衙直大業九年平滄海道征與瑱同破楊元威加朝散大夫第九瑜公字子橫亦為親信子弟羽林宿衛同破賊賞功與瑱瑃並同兄弟九人顯達相次時人以為荀龍賈虎無以相若也烈祖顯榮煥赫前史鏐忝為後裔粗繼清風特創新祠兼剖貞石時玉輅東還新主登極兩浙渠魁已殄十州內獲安將示後代宗支知於祖禰文德元年七月七日記大凡藩籬之設者所以規其內溝洫之限者所以虞其外華夏之制其揆一焉故魯之祝邱齊之小穀猶以多事不時而城況在州郡之內乎自大寇犯闕天下兵革而江左尤所繁併余始以郡之子城歲月滋久基址老爛狹而且卑每至點閲士馬不足回轉遂與諸郡聚議崇建雉堞夾以南北矗然而峙帑藏得以牢固軍士得以帳幕是所謂固吾圉以是年上奏天子嘉以拙政優詔奬飾以為牧人之道其盡此乎俄而孫儒叛蔡渡江侵我西鄙以翦以逐蹶於宛陵徑弩之次泛舟之助我有力焉後始念子城之謀未足以為百姓計東眄巨浸輳閩粵之舟楫北倚郭邑通商旅之寶貨苟或侮劫之不意攘偷之無狀則向者吾皇優詔適足以自策由是復與十三都經緯羅郭上上下下如響而應爰自秋七月丁巳訖於冬十有一月某日由北郭以分其勢左右兩翼合於冷水源綿亘若干里其高若干丈其厚得之半民庶之負販童髦之緩急燕越之車蓋及吾境者俾無他慮千百年後知我者以此城罪我者亦以此城苟得之人而損之巳者吾無愧與景福二年十一月日記天柱觀者因山為名按傳記所載皆云天有八柱其三在中國一在舒州一在壽陽洎今在餘杭者皆是也又按道經云天壤之內有十大洞天三十六小洞天如國家之有藩府郡縣遞相稟屬其洞天之內自有日月分精金堂玉室仙官主領考校災祥今天柱山即真誥所謂大滌洞天者也內有隧道暗通華陽林屋皆乘風馭景焂往忽來真蹤杳冥非世俗所測而況大江之南地兼吳越其峯巒西接兩天眼之龍源次連石鏡之嵐岫東枕浙江之迢派可謂水清山秀兼通大海及諸國往還此外又有東天目西天目及天竺之號得非抗蒼崖於穹昊聳絶壁於雲霄立天為名以標奇特耶若乃登高望遠則千巖萬壑金碧堆謺龍蟠虎踞靈粹滋孕代生異人非山秀地靈之所鍾襲其孰能與於此乎就中天柱風清氣和土腴泉潔神蛇不螫猛獸能馴自漢武帝酷好神仙標顯靈跡乃於洞口建立宮壇歷代祈禳悉在此處東晉有郭文舉先生得飛化之道隱居此山㣥虎來柔史籍具載乃於蝸廬之次手植三松虬偃鳳翹蒼翠千載今殿前者是也洎大唐創業以元元皇帝為祖宗崇尚元風恢張道本天皇大帝握圖御宇授籙探符則有潘先生宏演真源搜訪神境宏道元年奉敕創置天柱觀焉仍以四維之中壁封千步禁彼樵採為長生之林中宗皇帝玉葉繼昌元關愈闢特賜觀莊一所以給香燈於是臺殿乃似匪人工廊檻而皆疑化出星壇月砌具體而微則有被褐幽人據梧高士挹澄泉之味息青蘿之陰葉天師法善朱法師君緒吳天師筠暨天師齊物司馬天師承禎夏侯天師子雲皆繼踵雲根棲神物表骨騰金鎖名冠瑤編出為帝王之師歸作神仙之侶金錯標字翠珉流芳昭晰具存不俟詳録其餘三泉合派雙石開扉藥圃新池古壇書閣各有題品足為耿光鏐此際蒙聖朝謺委藩閫綰闔閭之封略統句踐之山河寵極蕭曹榮兼渾郭緬懷斯地實邇維桑素仰真風備詳前事但以此觀創置之始本對南方後有朱法師相度地形改為北向雖依山勢偏側洞門其洞首陰背陽作道宮而不可致左右岡壠與地勢以相違背洞門而不順百靈使清泉卻侵白虎致使觀中寥落難駐賢能皆為尊殿背水激衝之所致也乾寧二年鏐因歷覽山源周遊洞府思報列聖九重之至德兼立三軍百姓之福庭於是齊醮之餘遍尋地理觀其尊殿基勢全無起發之由致道流困窮二時而不辦香燈竟歲而全無醮閲遂抗直表上聞聖聰請上清道士閭邱方遠與道衆三十餘人主張教跡每年春秋四季為國焚修鏐特與創建殿堂兼移基址山勢有三峯兩乳兼許邁先生丹竈遺跡猶存遂乃添低作平減高為下改為甲向是五音第一之方而乃添培乳山卻為主案尋即一二年內法主兩霑渥恩道侶益臻常住咸備青牛白鹿堪眠琪樹之陰絳節霓幢不絶星壇之上得不因移山勢而再振元風者哉尋又續發薦章奏閭邱君道業聖上以仙源衍慶真派流輝方瑤水以遊神復華胥而入夢欲闡無為之化欣聞有道之人敕賜法號為妙有大師兼加命服雖寒棲帶索之士不尚寵榮在法橋勸善之門何妨顯赫其次畢法道士鄭茂章生自神州久棲名嶽元機契合負笈俱來鏐幸揖方瞳常留化竹副妙有大師三元八節齊醮同修福既薦於宗祧惠頗霑於軍俗尋發特表蒙鴻恩繼賜紫衣焚修於此其大殿之內塑天尊真人龍虎二君侍衛無闕其次別創上清精思院為朝真念道之方建堂乃陳鼎擊鐘之所門廊房砌無不更新天風每觸於庭除地籟時聞於窗戶兼為親奈糴觀額以炫成功非矜八體之能貴立永年之志妙有大師閭邱君靈芝稟異皓鶴標奇誕德星足廠田坴披靈霓洞朝修虔懇科戒精嚴實紫府之表儀乃清都之輔弻加以降神之地即舒州之天柱山也遊方有志躡屩忘疲自生天柱之前駐修天柱之下察其符契信不徒然此乃修崇實同搜抉所謂道無不在代有其人爰自開基至於功畢備仙家之勝概暢聖祖之真風遂録畫圖封章上進奉光化二年十一月二十七日詔旨敕錢鏐省所奏進重修建天柱觀圖一面事具悉我國家襲慶仙源遊神道域普天之下靈跡甚多然自兵革薦興基址多毀況茲幽邃豈暇修營卿考一境圖經知列聖崇奉親臨勝概重葺仙居仍選精慤之流虔備焚修之禮冀承元貺來祐昌期豈唯觀好事之方抑亦驗愛君之節既陳章奏披玩再三嘉歎無已想宜知悉冬寒卿比平安好遣書指不多及懿夫地出靈阜天開洞宮三皇之前真聖非一莫匪乘虛躡景出有入無雖或挂於傳聞不可知其名氏皆分洞天而理即大滌居其一焉天柱觀即漢以來迄於唐室修真之士繼躡清塵當四方俶擾之時見一境希夷之趣今也仙宮嶽立高道雲屯六時而鐘磬無虛八節之修齊罔闕有以保國家之景祚福兩府之蒸黎鏐今統吳越之山河官超極品上奉宗社次及軍民莫不虔仰神靈遵行大道時也聖明當代四海歸心忝蒙委以東南封爵功臣兼頒金券家山衣錦兼兩道之油幢上承一人倚注之恩次乃是正真護持之力元元至聖崇敬福生大道真科是無為化致乃及身於此合刊貞石用俟後賢時光化三年七月十五日記若夫陰陽共理之規人神相贊之道傳於史冊今昔同符切以浙東地號奧區古之越國當舟車輻湊之會是江湖衝要之津自隋末移築子牆因遷公署據臥龍之高阜雉堞穹崇對鏡水之清波風烟爽朗緬惟深固宜叶冥扶故唐右衛將軍總管龎君諱玉頃握圭符首臨戎政披榛建府吐哺綏民仁施則冬日均和威肅則秋霜布令屬牆愛戴黔庶歌謠尋而罷市興嗟餘芳不泯衆情追仰共立嚴祠鎮都雉之岡巒宰軍民之禍福殿堂隆邃儀衛精嚴式修如在之儀仰託儲靈之廕往載釁生劉氏妖起羅平豫躬稟睿謀恭行天討數年擐甲兩復越牆皆資肸蠁之功以就戡平之業特為重增儀像嚴潔牲牢邇來四野無塵重門罷析丁卯歲揚旌東渡巡撫軍民躬奠椒漿目瞻靈像每暢吳風越俗共歌道泰人安昔為兩鎮之疆今作一家之慶遂馳箋表請降崇封所冀朝恩與漢牧齊標美稱共泰巒對聳尋蒙天澤果賜允俞頒崇福之嘉名升五等之尊爵其所奉敕命具列如左嗚呼人惟神祐神實人依爰自始建金湯肅陳祠宇奠茲中壘三百年來雖享非馨未登列爵今則值豫佐國連統藩維啓吳越之雙封為東南之盟主況遇金星應籙梁德克昌道既泰於君臣澤遂加於幽顯獲申奏薦遽降徽章今則象軸煥新龍綸遠至表勳名於當代昭靈感於千秋固當永荷皇靈長垂幽贊衛我藩宣之地遐清災沴之源保泰斯民乂安吾土烜矣赫矣永作輝華今當吳越雙封一王理事亦仗土地陰步馬冥力護持神既助今日之光榮豫亦報幽靈之煥耀但慮炎涼改易星歲徂遷不記修崇莫原事始聊刊貞石以示後來時大梁開平二年歲在戊辰四月啓聖匡運同德功臣淮南鎮海鎮東等軍節度使檢校太師守侍中兼中書令吳越王錢鏐記吳越國王寶正三年八月十九日重開舜井收得重華石一片竊恐年移代遠莫測端由特令鐫刻用記年月己丑歲林鍾之月二十九日天下兵馬都元帥吳越國王記蓋聞天地氤氳運寒暑而滋品彙幽靈肸蠁司土地而福生民人神理在於相須顯晦期臻於感契雖先聖著難明之說而禮經垂嚴祀之文爰自五運相承百王理化或以勞定國或盡力勤王或利濟及於蒸民或威烈光於史策並皆立嚴祠於境土享廟食於春秋而況江浙古區魚鹽奧壤歷象則區分牛斗封維乃表裏江山昔年霸越強吳今日雙封列國曠代之靈蹤不少前賢之廟貌實多寡人自定亂平祅勤王佐命五十年撫綏軍庶數千里開泰土疆四朝疊受冊封九帝拱扶宗社改家為國興霸江南一方偃息兵戈四境粗安耕織上荷元穹眷祐次依神理護持統內凡有往帝前王忠臣義士遺祠列象古跡靈壇悉皆褒崇重峻於深嚴祀典常精於豐潔冀承靈貺同保軍民其有風山靈德王廟本係屬城近歸畿甸考諸舊記即先是武康縣風山又按史記云汪罔氏之君守封禺之山今屬吳興武康縣稽立廟之初則年華渺邈詳圖牒之說則詞理異同唯有元和年再構簷楹見存碑記彼既已具敘述此固不復殫論聊書封置之由直述旌崇之意丙戌年春寡人以玉冊疊膺於典禮清宮未展於嚴禋遂輟萬機暫歸錦里尋屬節當炎暑猶未却回闕刺史陸仁璋佐國精忠事君竭孝心懸扈從遍祝靈祇以風山靈德王昔年因舉兵師曾陳禱祝無虧響應顯有感通遂懇悃告虔許崇堂殿洎清秋却歸闕披覩闕陳既忠誠感動神明行褒贈先酬靈貺次乃親分指畫委仗腹心按山川展拓基坰順岡阜增添爽塏形勝並皆換舊規模一概從新居中而殿宇崇嚴四面而軒廊顯敞周回戶牖甃砌階墀搆之以梓楩柟飾之以元黃丹漆外則浚川源之澄徹內則添竹樹之青蒼至於廣廈神儀崇軒侍衛車輿僕從帳幄簾櫳鼎飪庖籩簦器皿請福祈恩之所獻牲納幣之筵並極鮮華事無不備丙戌年八月二十四日起首至其年十一月畢功土木皆是精新禋祀常嚴豐潔仍展牲牢簫鼓慶樂迎神耀威靈而萬古傳芳標懿號而千秋不朽一則酬忠臣之啓願二則答陰步馬之相扶唯冀明神永安締構稟元化而同垂恩福鎮土疆而廕護軍民保四時風雨順調闕永絶天灾地沴常歡俗阜時康巍乎煥乎美矣盛矣今則功用既就良願已酬因勒貞珉聊書托實所貴後來賢彥知豫精敬神明不假繁文粗紀年月時寶正六年重光單閼歲為相之月二十有三日記天下都元帥吳越國王錢鏐若夫真聖之教大道為先恍惚難名虛無罔象創極於元黃之始施功於融結之前籠罩九闕森羅萬物可大可久元之又元豈推步之能窮非名言之可載太上老君者神凝太素氣積混茫誕形雖感於星精崇德實標於道祖當驪陸犧軒之代則同出而異名洎陶唐殷夏之年乃殊途而一貫抗世立法為師為臣恢張沖漠之風振蕩希夷之迹及乎姬周建國仙聖膺期託孕元姝寓形楚國指李言姓視耳傳名雙柱三門式表儀形之異龎眉鶴髮更彰耆耋之尊然而隱跡公朝韜光柱史魯宣父起猶龍之嘆尹先生知望氣之祥莫不經演五千齡高八百唐朝將基王業遠託真源廣啓元關纍崇徽號由是普天之下悉立道宮皆以紫極為名冀以奉行齊醮當府頃嘗建置歲月已深後因大盜經過恣其煨燼緬惟道館久曠真風因為重興俾延多福竊詳載籍靜究源流但以老君稟虛無精應混元氣託神明之質先天地而生在三皇五帝之時則自號鬱華廣壽及殷商成周之代則官居柱史王師出入自然應期而現後以周王之世再誕於苦縣瀨鄉道震中華化行西域然而位居太乙尊號帝君統御十方施生萬物配三光而普照綿萬劫以長生前朝欲濬靈源仰攀仙系寧同血允聊比宗祊則老君自是大道之至真非唐家之枝派夫軒轅大聖必問道於崆峒周穆至仁亦學仙於瑤水是以追崇道教廣務勝因絳闕朱臺遠比蓬萊之境星壇月殿大新焚醮之場必冀元功克臻靈貺其餘隙地閒植松筠白鹿青羊自遨遊於春嶺清風皓月更縈帶於秋江立吳都元教之觀名千秋不朽改越國紫宮之真聖萬載永隆足使大道常興真風不墜大顯元元之教永資邦國之休宜刻貞珉式揚光烈蓋聞四靈表瑞則龍神功濟於生民百穀熟成則水旱事關於陰步馬而況浙陽重鎮自古吳都襟帶溪湖接連江海賦輿甚廣田畝至多須資灌溉之功用奏耕桑之業錢塘湖者西臨靈隱東枕府城澄千頃之波瀾承諸山之源派梁大同中湖干嘗置唐咸通中刺史崔彥曾重修鑿石為門蒸沙起岸自豫扶翊聖運移節建旄舊日湖隄盡為城宇澄滓有同於鏡水濟時每及於生靈一郭軍民盡承甘潤逐年開豁渺若浤闕長居一尺之深闕不竭元陽之失度其中菰蓮鬱茂水族繁滋蒸黎實藉以畋漁河道常資於灌注壯金城之一面不異湯池潤緑野之萬家常如甘澤固有神龍居止水府司存降景佑於生靈興旱涸之風雨原其自編祀典積有歲年雖陳奠酹之規未施展敬之所蓋為古來藩侯牧守不能建立殿堂豫統吳越山河綰天下兵柄前後纍申祈禱皆致感通既荷陰功合崇祠宇昨乃特於湖際選定基坰創興土木之功建立欒櫨之構至於殿庭廊廡門楹階墀悉親起規模指揮擘劃俱臻壯麗以稱精嚴然後慎選良工塑裝神像威容赫奕冠劒陰森陳將僚侍衛之儀列鐘鼓豆籩之位以至車輿僕馬帳幄盤筵祭器爨無不臻備馨香薦獻不闕四時況鏡水清流烟波浩渺其湖周百餘里其派數十餘川濟物於人功能及衆亦無龍君之廟貌豫遂與錢塘龍君一時建立廟堂同表奏聞乞加懿號果蒙天澤並降徽章其所奉敕旨具録如後敕錢塘重地會稽名邦垂古今不朽之基繫生聚無疆之福有茲舊跡特創新規豈曰神謀實因心匠蓋水府受天之職庇民之功歲時罔闕於牲牢祈禱必觀於肸蠁得一方之義化致兩境之安康錢鏐普扇仁風久施異政至誠所切遂致感通其錢塘湖龍王廟宜賜號廣潤龍王鏡湖龍王廟宜賜號贊禹龍王牒至準敕旨若夫人惟神贊神實人依信冥陽共理之言乃幽顯相須之義今者式嚴廟貌永受蒸嘗四時之殷薦不虧萬姓之禱祠無闕神其受天朝之寵賚闕千古之光輝常鎮吳邦豫消灾沴必使原田肥沃克昌廣潤之名穀稼豐登更表土龍之德今則嚴禋已立邃宇咸周聊記歲月刻於貞珉後來觀者其鑒之哉大道弟子天下都元帥尚父守中書令吳越國王錢鏐年七十七歲二月十六日生自統制山河主臨吳越民安俗阜道泰時康市物平和遐邇清晏仰自蒼昊降佑大道垂恩今則特詣洞府名山遍投龍恭陳醮謝上答元恩伏願合具告祈兼乞鏐壬申行年四時履歷壽齡遐遠眼目光明家國興隆子孫繁盛志祈元祝允協投誠謹詣太湖水府金龍驛傳於吳越國蘇州府吳縣洞庭鄉東臯里太湖水府告文寶正三年歲在戊子三月丁未朔二十六日壬申投元瓘字明寶初名傳瓘武肅王第七子乾寧元年授鹽鐵發運巡官又授金部郎中天祐中纍授檢校右僕射梁貞明中進檢校太尉同中書門下平章事龍德二年加特進檢校太尉兼侍中後唐同光二年授開府儀同三司檢校太師兼中書令長興三年武肅王薨襲位改今名加守中書令四年封吳王應順元年進封吳越王晉天福元年授天下兵馬副元帥五年授天下兵馬都元帥六年加守尚書令八月薨年五十五諡文穆竊念臣父天下兵馬都元帥吳越國王臣鏐爰自乾符之歲便立功勞至於天復之初已封茅土兩殄稽山之僭僞頻叨鳳詔之褒崇賜鐵券而礪嶽帶河藏清廟而銘鐘鏤鼎歷事列聖竭誠纍朝罄臣節以無虧荷君恩而益重楚茅吳柚常居㣥后之先赤豹黃羆不在諸方之後雲臺寫像盟府書勳勠力本朝一心體國常誡臣兄弟曰汝等諸子須記斯言父老起自諸都早平多難素推忠勇實效辛勤遂蒙聖主之疇庸獲忝真王之列壤恆積滿盈之懼豫懷燕翼之憂蓋以恩禮殊尤寵榮亢極名品既逾於五等春秋將及於八旬不諱之談爾當靜聽而況手殲妖亂親覩興亡豈宜自為厲階更尋覆轍老身猶健且作國王之呼嗣子承家但守藩臣之分臣等鯉庭灑袂鴈序書紳中心藏之敬聞命矣頃以濟陰歸邸梁苑稱尊所在英雄遞相倣斆互起投龜之詬皆興逐鹿之謀惟臣父王未嘗隨例從微至著悉蒙天子之絲綸啓土封王自守諸侯之土宇乙酉歲伏蒙莊宗皇帝遙降玉冊金印恩加曲阜營邱顯自大朝來封小國遂有強名之改補實無干紀之包藏兼使人徐筠等進貢之時禮儀有失尚蒙赦宥未置典刑敢不投杖責躬負荊請罪且爽為臣之禮誠乖事上之儀夙夜包羞寢食俱廢捧詔而神魂戰栗拜章而芒刺交并伏以皇帝陛下濬哲文思含宏光大智周萬物日闢四方既容能改之非許降自新之恕將功補過捨短從長矧茲近代相持豈足深機遠料且臣本道與淮南雖連疆畛久結仇讎交惡尋盟十翻九覆縱敵已逾於三紀弭兵才僅於數年諒非脣齒之邦真謂腹心之疾今奉詔書責問合陳本末端由布在衆多寧煩覼縷彼既人而無禮此亦和而不同近知侵軼荊門乖張事大儻王師之問罪願率衆以齊攻必致先登庶觀後效橫秋鵰鶚祗待指呼躍匣蛟龍誓平讎隙今則訓齊樓櫓淬礪戈鋋決副天威冀明臣節伏以臣父王鏐已於泛海繼有飛章陳父子之丹誠高懸皎日展君臣之大義上指圓穹其將修貢賦於梯航混車書而表率如虧奉職自有陰誅今春已具表章未蒙便賜俞允地遠而經年方達天高而瀝懇難通伏乞聖慈曲行明命淩霜益翠始知松柏之心異日成功方顯忠臣之節臣瓘等無任感激祈恩戰懼依投之至謹遣急腳閒道奉絹表陳乞奏謝以聞襲爵四年曾無顯效受鳳池之真命降龍冊以雙封臣特於府城外造寺一所前百步起樓號奉固其寺額乞以龍冊為名敕淮南鎮海鎮東等軍節度散子將充上直從散員旗副將檢太子賓客楊瑫等牒奉處分前人毅勇資身忠貞秉志或屢隨征討或頻效飛馳豫自紹統山河已曾遍施酬奬昨者疊膺雙冊繼耀土茅今則特均雨露之恩溥示維持之命更聞盡節薦可甄升事須改補節度子將仍牒知者故牒清泰三年正月日牒俶字文德文穆王第九子晉天福四年除內牙諸軍指揮使開運四年出鎮台州是年忠獻王薨弟宏倧襲位內牙統軍使胡進思廢宏倧迎俶立之漢乾祐二年授東南面兵馬都元帥鎮海鎮東等軍節度使開府儀同三司檢校太師中書令杭州越州大都督上柱國吳越國王三年加守尚書令周顯德中加天下兵馬都元帥宋建隆元年進授天下兵馬大元帥太平興國三年再朝京師遂上表納土封淮海國王雍熙元年改封漢南國王出為武勝軍節度使尋改封南陽國王表辭國王改封許王端拱元年徙封鄧王八月薨年六十追封秦國王諡忠懿詳夫域中之教者三正君臣親父子厚人倫儒吾之師也寂兮寥兮視聽無得自微妙升虛無以止乎乘風馭景君得之則善建不拔人得之則延貺無窮道儒之師也四諦十二因緣三明八解脫時習不忘日修以得一登果地永達真常釋道之宗也惟此三教並自心修宗鏡録者智覺禪師所撰也總乎百卷包盡微言我佛金口所宣盈於海藏蓋亦提誘後學師之智慧辨才演暢萬法明了一心禪際河游慧閒雲布數而稱之莫能盡紀聊為小序以頌宣行云爾敬天修德人所當行矧俶忝嗣丕圖承平滋久雖未致全盛可不上體祖宗師仰瞿曇氏慈忍力所沾溉耶凡於萬機之暇口不輟誦釋氏之書手不停披釋氏之典者蓋有深旨焉諸宮監尊禮佛螺髻髮猶佛生存不敢私祕宮禁中恭率瑤具創窣堵波於西湖之滸以奉安之規模宏麗極所未見極所未聞宮監宏願之始以千尺十三層為率爰以事力未充姑從七級梯旻初志未滿為慊計甎灰土木油錢瓦石與夫工藝像設金碧之嚴通緍錢六百萬視會稽之應天塔所謂許元度者出沒人閒凡三世然後圓滿願心宮監等合力於彈指頃幻出瑤坊信多寶如來分身應現使之然耳顧元度有所不逮塔成之日又鐫華嚴諸經圍繞八面真成不思議劫數大精進幢於是合十指爪以贊歎之塔曰黃云吳越國王錢俶拜手謹書於經之尾竊以奉空王之大教尊阿育之靈蹤崇雁塔於九重衛鴻圖於萬祀梵剎既當於圓就寶幢是鎮於方隅遂命選以工人鑿於巨石琢鞭來之堅固狀涌出之規儀玉削霜標花雕八面勒佛頂隨求之嘉句為塵籠沙界之良因所願家國咸康封疆永肅祖世俱乘於多福宗親常沐於慈恩職掌官僚中外寧吉仍將福祉遍及幽明凡在有情希沾妙善乾德三年乙丑歲六月庚子朔十五甲寅日立蓋聞慧炬西然法雲東被眷言興建實煥編我國家列壤受封帶河礪嶽既勤王而繼世諒荷寵以乘時言念真宗聿懷多福於是旁搜勝景廣闢宏規築湖畔之山岡搆城西之佛閣莫不遐森梓妙選楩柟營窣漢之基坰列倚天之像設釋迦化主中尊而高儼睟容慈氏彌陀分坐而淨標妙相仍於寶地對樹法幢雕築琅玕磨礱圭璧勒隨求之梵語刊佛頂之祕文直指丹霄雙分八面伏願興隆霸祚延遠洪源受靈貺於祖先助福禧於悠久軍民輯睦疆埸肅寧宗族以之咸康官僚以之共治四十八願永符法處之良因八十種好更備曇摩之圓智得大堅固不可稱量凡在含生同躋覺路天下大元帥吳越國王錢俶建時大宋開寶二年乙巳歲閏五月日羲初名延羲閩太祖審知少子康宗遇弒自稱威武節度使閩國王更今名改元永隆三年僭號皇帝六年為拱宸都指揮使朱文進閣門使連重遇所弒僭諡睿文廣武明聖元德隆道大孝皇帝廟號景宗久增景慕莫會光塵但循戰國之規敢預睦鄰之道一昨安州有故脫難相歸邊校貪功乘便據壘矧機宜之孰在顧茫昧以難申否臧皆凶乃大易之明義進取不止亦聖人之厚顏適屬暑雨稍頻江波甚漲指揮未到事實已違今者猥沐睿咨曲形宸指歸其俘獲示以英仁其如軍法朝章彼此不可揚名建德曲直相懸雖認好生匪敢聞命其杜光鄴等五百七人已令卻過淮北
