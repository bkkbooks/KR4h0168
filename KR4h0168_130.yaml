front:
  text: 全唐文欽定全唐文卷一百三十鏐字具美杭州臨安人乾符中為董昌裨將乾寧初纍授開府儀同三司同中書門下平章事封開國公二年討董昌授檢校太尉兼中書令領鎮海鎮東等軍節度使四年平田頵賜鐵券五年授檢校太師光化三年封南康王四年加守侍中改封彭城王天復二年改封越王天祐元年改封吳王梁開平二年進封吳越王兼淮南節度使揚州大都督充淮南四面招討制置使加守太保四年加守尚書令兼淮南宣歙等道四面行營都統貞明二年加諸道兵馬元帥尋進天下兵馬都元帥龍德三年冊封吳越國王後唐同光三年依梁前授官爵長興三年三月薨年八十一唐主詔以王禮葬諡武肅
