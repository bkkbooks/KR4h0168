front:
  text: 全唐文欽定全唐文卷六百九十符載三
  hash: sha256:29276c22ad08ba223a0613f99dc90a2b1731966b192d0231f03a33cf90ddeb2a
body:
  text: 六虛有精純美粹之氣其注人也為太和為聰明為英才為絶藝自肇有生人至於我儕不得則已得之必騰凌敻絶獨立今古用雖大小其神一貫尚書祠部郎張璪字文通丹青之下抱不世絶儔之妙則天地之秀鍾聚於張公之一端者耶初公盛名赫然居長安中好事者卿相大臣既迫精誠乃持權衡尺度之迹輸在貴室他人不得誣妄而覩者也居無何謫官為武陵郡司馬官間無事從容大府士君子由是往往獲其寶焉荊州從事監察御史陸澧字深源洎令弟曰灞曰潤曰淮皆以文行穎耀當世故含藻蘊奇之士多遊其門焉秋七月深源陳宴宇下華軒沈沈樽俎靜嘉庭篁霽景疏爽可愛公天縱之思歘有所詣暴請霜素願撝奇蹤主人奮裾鳴呼相和是時座客聲聞士凡二十四人在其左右皆岑立注視而觀之員外居中箕坐鼓氣神機始發其駭人也若流電激空驚飇戾天摧挫斡掣撝霍瞥列毫飛墨噴捽掌如裂離合惝恍忽生怪狀及其終也則松鱗皴石巉巖水湛湛雲窈眇投筆而起為之四顧若雷雨之澄霽見萬物之情性觀夫張公之藝非畫也真道也當其有事已知夫遺去機巧意冥元化而物在靈府不在耳目故得於心應於手孤姿絶狀觸毫而出氣交沖漠與神為徒若忖短長於隘度算妍媸於陋目凝觚舐墨依違良久乃繪物之贅疣也寧置於齒牙間哉嗚呼由基之弧矢造父之車馬內史之筆札員外之松石使其術可授雖執鞭之賤吾亦師之如不可求從吾所學則知夫道精藝極當得之於元悟不得之於糟粕衆君子以為是事也是會也雖蘭亭金谷不能尚此或闕歌頌取羞前人命鄙夫首敘諸公得揮其宏思耳才智宏傑者其人尊政教易簡者其民泰時節和暢者其遊盛地形盤鬱者其宴雄我尚書劉公挺天姿之英特采人心之愈樂乘上巳之暄淑趣北池之汗漫操四駕騰百祥皇皇煜煜氣象飄動真高會也况乎九天之澤滂沱下澍新握龍節保寧坤維苟或風流褊儉不耀是則欲憔悴寵榮也豈承荷錫命之意乎巖巖西蜀古稱天府之奧也江山數千里羌蠻萬餘落歲時風俗豪侈凡所好尚奇偉譎怪遭值此際得攄胸襟故尤為壯觀矣先期旬日也嚴經術洗涯岸洞篁篠熾臺榭有事之辰也擁幢蓋揖賓客寅及於近郊卯及於北池其降車也鼙鼓發登舟也絲桐揭解纜也百戲作覽水府摧江蘺叱天吳拉馮夷躍龜魚騰蛟螭召琴高嘯宓引蓬壺以回泊若雲蔚而霞帔一何壯也及乎耳煩目劇綿趣靜境稍自引去於空濶水波不動四羅郡山簪裾坐於天上思慮遊於象表又何曠也觀夫水嬉之倫儲精蓄鋭天高日晏思奮餘勇實有赤縣兩為朋曹獻奇較藝鈎索勝負於是劃萬人之浩擾豁一路之清泚南北穩徹中無飛鳥爰挂錦彩從風為標爛然長虹橫拖空碧乃計才力量遠邇一號令雷鼓而飛千橈動萬夫呼閃電流於目眥羽翼生於肘下觀者山立陰助鬬志肺腸為之沸渭草樹為之偃悴揭竿取勝揚旌而旋觀其猛厲之氣騰陵之勢崇山可破也青天可登也若使移於摧堅陷陳之地寧有對宇宙乎夫文質殊塗古今異宜君子作事得時也是都也有軍旅焉有南詔焉有西戎焉尚或以清流激湍一觴一詠為賓客之娛者是不知變也而識者咍之其觀一時之能事成千古之休烈在今辰也豈與夫永和少長咸集同日而言哉載自顧薄劣塵厠下介謬處陳璋之任被命首敘敢逡巡乎請賦八韻以耀蘭亭諸子也先是故太師韋公因是令節課賓寮賦詩乃取諸黃裳以為韻今尚書繼之以青蓋欲使其五色相宣耳井絡萬方之奧區也重陽四序之佳節也合江一都之奇勝也張此筵者中丞劉公焉監此軍者常侍賈公焉是亭鴻盤如山橫架赤霄廣場在下砥平雲截而東西南北敻然也場中羅崇牙大斾亭上列雕盤玉斚主人與賓朱紫爛然相與峩冠揖讓而臨之雷鼓震動壺觴波湧山川風景凌軒入坐地形勝天氣嘉人心洽三者既極遂成歡娛不知醉之無從也夫和樂之在人心也未嘗不激於衷而形於外此自然之數是言也其故何哉禮曰有為而為之曩者藩隅變故主帥殂歿而子繼弟及者有之毒民殺吏者有之逐將攘位者有之兵戈一動羶腥數歲今坤維禍起太尉公薨落山川之所控引兵車之所雜蹂蕃蠻之所連屬師漏於涓滴釁成於波瀾安危之計懸在絲髮我常侍沈斷元機發如飇馳以眄睞之力移山邱之勢我中丞聰明英傑動與神遇氶要約當談笑間萬形施張已在靈府遂乃推大誠布大賞誅橫猾拔雋異息老稚洗故瑕一日而聲作浹旬而恩被盈月而政成森然萬戶與令清淨麾幢之所至也自耆耋至於童孺瞻其馬首拜其玉顏唯恐其不為父母也故茲會之宴賞今日之愈樂與彼登桓景之山落孟嘉之帽飲菊酒佩絳囊者豈同日而言哉於戲非常侍無以康護全蜀非中丞無以恢建盛烈熊羆二美輝映一時若使載事者聆而書之可以聳忠良而驚姦慝也載忝幕府之舊謬親文翰憑良會之奇勝來㣥情之踴躍敢竭思慮紀其風流至於登臨眺聽之興煙霞草樹之狀即存乎大雅六韻之什此無備焉中和王節也萬國承之樂洪慶也夫天地之大德曰生發生之盛氣曰春春之於孟也萌動而方微於季也發泄而過強唯仲春木德乃茂沃生人之愷樂洗萬物之枯稿當三陽之正中凝四氣之太和以正星鳥以推律度五年春皇帝負黼扆臨前殿酌天心之旻美順人情之煦嫗啓襟宸於高瓊建嘉名於振古遂下明詔詔天下以每年春二月朔旦為中和之節焉凡八紘九州舟車所至之域莫不嚮風蹈躍承順帝則即今日之會我嶽鄂連帥御史大夫何公蓋所以祗明詔宣德教而歡萬民也夫景不和無以破昏蒙之氣地不雄無以壯光華之會且觀夫廣場削平空迥無涯黃鶴前峙以崢嶸大江旁注而逶迤朝之日晴陽始升鏡清無塵高楊如煙拂冠垂紳主人乃揖乎英僚上介洎簪裾耆老之客相與羅拜於北向已而敘登於阼階之上脫劍搢笏百戲具舉焉旌旗飄飄馬鳴蕭蕭始金鼓以一振忽端立而揚鑣鐵衣錚鏦白羽在腰列高的於虛碧翻大斾於回飇既而鏗絲桐耀丸劍齊入體以岑崟罍湧而川注暄風徐來春日未斂美人盤跚緩步前墀態生橫波怨拂蛾眉感青春之不再歌朱實之離離音綿眇以切雲塊遠放而如遺樂及於繁奏爵及於無算檢一變至於歡歡一變至於醉莫不載時之交泰飲公之惠洽恬悅饜飫充塞臟腑而已哉大夫涵青雲之器極黃裳之美忠厚方直清明而深竭至忠以輔國啓大誠以御物下車於江夏自始至於茲日德行浹人於骨髓禮義澤人於思慮馨香問望久而益茂故地方千里民蓋百萬口親愛如父母威畏如神明利劍水鏡日懸戶牖此所以無留訟無寃志熙熙穆穆為清淳之俗焉今天子以皇極大中之道居鴻寶之位垂二十載矣如天之覆如地之幬如春之仁如秋之威神聖聰明文武溫龔侔羲農之遐想軼唐虞之絶軌况乎稷契咎夔訏謨其內也如彼韓侯申甫輯柔其外也如此則何憂乎北邊何患乎犬戎異日也若飛詔發來大夫有鼎鉉之拜則天下之理又未可量矣鄙夫朴野亦承玉斚之一人也授教序述慙靦無措請咸賦八韻用極中和之美焉豐城有神劍非司空無以發沈塞揚光彩為天下之大寶江夏有善地非亞相無以起雄峙作亭榭為天下之至勝虛極必盈晦極必明開物之務繫於賢者此自然之理也先是郡中寺曰頭陀名與碑並登臨鍾萃大雲氣色下配礫石公攻教既備遊心佛寺慨此頽落乃沛然而張之聳阿閣矗長檻嚴像設熾臺塔凡所相好皆鼎新也方務翦伐用探勝會一時景歟值甘心冞入意謂粹絶余將獲之乃緣後殿穿窈窕出乎蒼莽之巔果有實境待我而啓萬古不偶今為知音通塞之際若有感也觀乎經營之初也鏟嵽嵲堙坎窞斬榛楛掘株枿翳薈掃盡天形嶷然山川雲氣一朝噴泄公智動於內形象於外口疏手指煥然成亭侈儉無過因歸於中當於是延賓介洎郡之士君子相與開襟而登之殊解乎淩泱漭駕崢嶸壓夏口撑大別開井閈於砌下擁城闉於宇後倚檻凝立在青冥中連山積水悠悠渺渺長想一去周流物表何如宇宙於此為細繇是言之因知公宏邁可以拔幽陋材智可以陶品彙應用不測與造物者為徒乎崇崇夏籍南峴何羊祜之事齊芳永久夫詩者比興而詠志也凡我登覽盛美惰傲無述豈文士之意乎况主人唱首韻鏗金石得不搜思上承獻酬請咸繼大夫之後賦六韻之作耳甘子堂近取嘉木以名之也戊寅歲常侍李公陋舊制畫新制茲堂一構官舍增氣概巍然也堂中廣數筵環軒有六閣閣有雅琴古籍繪圖篆隸砌下有短松弱柳蘭荃芳杜名花百品羅植左右自春陽至於沍寒之際未嘗不鋪霞雪照爛庭廡新花驟發不留故態佐以壺酒與賓娛之其興宴當高會雖登山臨水不敵也或月滿清夜簾帷沈沈洞開㣥扉斂袵端坐此際有以見公萬纍去百靈集氣衝寥廓與古為徒豈獨馳心政術區區於鍾陵之氓而已矣是知此堂也外可以延風景內可以輔性靈改作之思符規中律請因以所覩一物賦三韻極書當時之美使將來君子知李公有深旨焉十八年秋七月余自潯陽來赴丞相府與評事始相值初揖其風貌次聆其嘉話終覽其篇詠如遊三山入仙洞沈深窈窱稍造異境煙霞草樹別有姿狀使人淡然忘歸也夫詩之所主大者存諷刺備勸戒觀風俗之美惡細者眄江山采雲物導性情之幽滯評事公之什才思凝遠高韻孤枝躍出寥廓至於天池雲飛鶴去不可附近尚使名聲濩落晚歲不偶斯乃執文柄者之咎也薛生何有哉廣陵握手秋往汾晉渺渺長路蕭辰氣清想君馬上見落葉聽候鴈一吟一嘯自有遐趣亦足以開遊子顏也千里之別勿復恨恨國朝以進士擢第為入官者千仞之梯以蘭臺校書為黃綬者九品之英其有折桂枝坐藝閣非名聲衰落體命轗軻不十數歲公卿之府緩步而登之袁生富有春秋挺豪健之姿心氣剛明端行美文余始見於海昏抵湓浦西遊長安長安士大夫甚多之日者昌黎韓公尹京兆朗鑒之下應鄉試浩浩千輩生為甲冠繇是為聞秀才焉天官侍郎以判銓調士生涉高級繇是授讐校之官焉於戲人之生也患詞不修誠不立苟進取行己者盡併生也欲逃問望傲富貴其可得乎去年秋有休浣之請來覲於伯兄展禮於亞相棣萼增韡韡之盛賓主得厭厭之樂道光事備青春北歸柳茁帝里蘭芳省署嘯侶持觴吟弄風月藉藉當年為樂何如走以嘉禮一來江夏相值於諸侯之館因得與㣥彥賦祖行詩實亦從此旋歸舊隱偶長松老鶴為度時之適豈復以華鬢為肺腸之慮哉中朝圭組君子大半皆匡廬之舊間濶久矣為余揖其休暢也今四方諸侯裂王土荷天爵開蓮花之府者凡五十餘鎮焉以禮義相推以賓佐相高長城巨防懸在一士苟人非髦彥延納失所雖地方千里財賦百倍有識君子咸舉手而指之我主君常侍李君以南昌軍倅辟於崔君真得賢也崔君名稅字文約天資方厚氣色淳重有端正之行業有操斷之利用柔則水順剛乃山峙工文章善笑謔言語飲酒可百觴交朋好與遊者如攀瓊枝坐瑤圃油然竟日而不知厭也始以貞幹調補義興尉參河南府軍事割而不細曠而能斷蹤迹清直風聲鬱然是知動公卿之顧走郡府之檄士林籍籍有自來矣十六年冬自洛陽抵襄州歷江夏將祗承本府之命大夫何公上才碩望作鎮茲地十四年矣急才愛士與飢渴等每賓客至登膺門下陳榻者輒損折威重降就禮數歡愈周旋襟期洞開况與常侍交分重邱山疆場連風煙見我從事暫如會面不得不留連繾綣以道平生之意乎繇是窮勝賞酬宴醵景無徒盡花不浪發江夏郡東有黃鶴山山中頭陀大雲精舍皓師竹院惟一師茶圃又有東城石壁壁前有桃李樹千株澤國多雨芳華久困適值寒食前後天野清明衆花齊發火然雪白是日也或嗤丸劍之跳躍鄙絲桐之嘈囋大夫乃減徒御挈琴酒相與屢遊乎其間遭石而坐觸陰而息雅杯徐行微微春風好鳥一聲為我笙鏞往復如此彌旬纍晝皆所以竭主人之志盡公約之歡也明發理棹黯然愁慕南浦悠悠別如之何於戲古人云良辰美景賞心樂事四者難並今實並之矣常恐後會追之不及恨恨正在於此耳公約得不思之乎得不念之乎展布才力好輔君子以成賓主之美乃所望也副相視事久困倦劇未能操觚抒思故小生敢於敘述冠於首章不知慙怍之無從也請咸賦春中一物為道路之志乙卯歲主君以清淨之理治洪州之三年也侍御史盧公自江夏展禮於我來之日至往之日凡甲子四焉享勞租軷慊然不足即客之重輕可知也將行主人賦五言詩一首韻諧金石光寵道路亦命酬和璨如編玉顧謂部從事符載序而導之云端公名泰卿字成業有當世才幹瑰瑋磊落不縈苛細工為文能讀三略六韜觀其發論指畫規模宏拔真卓然之士也中歲轗軻竄逐江湖萍泛雲遊二十餘年常侍於公有松柏之心有管鮑之知故再遊長沙一至鍾陵相望益重相歡逾劇方翻驊騮之足簸雕鶚之翮電發千里風生九霄豈止於實其橐而已哉蓋通塞有時難與命言悠悠北歸悵望如何山有木工則度之常時而語矣况在其封域焉載知副相必起羸發困結攬賢傑延於參畫之地寧使涉洞庭波視木葉落歸守蓬戶飢餓旦夕哉勉矣風水唯當痛飲醉高秋之別今天子纘嗣鴻業也雨露雱然洗濯八荒藩隅安謐交修聘問是以侍御史盧君奉本府司空王公之命以乘馬玉帛展禮於我焉夫使之來也擁萬里之傳結四鄰之歡大或議兵食細即道欵曲重輕之齊懸於俯仰非才人快士之選即何以當之端公少而能斷壯而宏遠練時務之畫負豪爽之聲始至也其氣直而肅其詞遜而婉其儀恭而和折旋應對雅會機要我太尉公悅而延坐與語目為雋異顏色禮數橫加其間可謂賓之秀發者也繇是先太師之意達賢司空之禮備胸襟之志也展賓主之好也深則皇華之美盡在此矣亦何必誦詩三百然後為得乎太尉南康公作坤維之梁柱二十三年矣大勳大德播塞宇宙藻藉今古迥無其曹明司空英姿粹氣授於天造忠厚義烈繼芳前休異日也合德同心翊戴是思勤於王家康活民庶小子見史臣載事之筆濡翰流離之不暇也實近為司空抃手而遙知端公徘徊此地久而彌暢太尉嚴館戒吏厚餼具牢米禾芻薪亦如之唯恐其超然道別也端公感惜恩貸屢回征駕自去歲之鑿冰至今歲之流火方遂其行焉蟬鳴嘒嘒涼飇欲動繚繞長路愁懷若何九月十月之交想端公下太行抵常山停車騎拂霜雪嚴城旦開矛戟如林復命於雙旌之下赫然有光也主君以尊重之命下介引而敘之抽毫之際臨深履薄之不啻也咸賦四韻以代雜佩之贈焉持俯仰全檢劑從容溫謹之地齷齪之士也跨時俗尚奇偉抗志風雲之表從橫之才也監察御史范陽盧公神宇聳峙襟靈爽拔脫苛細於塵垢得豪雋於意氣義分形於造次才畫充於懷抱邁迹遐逸與人無倫年未弱冠為鄱陽尉目事必割間無留刃勢掩曹輩快聲飇馳江西伯常侍鮑公祭酒李公寵以賓介之目授以叢劇之務政或闕漏我能補焉無幾何馳車遠遊北至恆冀聞以利計於司徒王公司徒器之開深沈之懷垂沛然之愛歡則膠固義存諷諭故能不四五年始自黃綬歷廷評司直冠惠文冠御史雖取恩知己實自躡青雲之梯也况年才黑髮采色照地奮於名迹其心嶷嶷則氣高五白之博室有千金之數直大夫豪達之事豈足纍隘目之視耶昨扁舟南行次廬陵郡下適值侍御將歸華幕幸接便道為共濟之遊話酣意密備取賢主君之盛業歡喜失次若無所從因輒以狂瞽私自忖度以為人生於世其公者樹勳烈銘鼎鼐休聲巍巍垂之無窮其私者富貴壽考而已矣今令公功德格皇天忠義貫古人地方數千里甲兵十餘萬身為上公壽方無疆英英三子殷如川瀆尚書以寬厚保師旅大夫以沈毅威暴亂都尉以才智承恩澤一門雄雄洪業所鍾生人之美盡於斯矣成天下之務者時也射萬世之利者勢也若當此時抗雙旌驅四牡星馳丹陛對揚休命彼燕趙東平之諸侯恥不若也皆執玉帛爭修覲禮使純誠動鬼神之感光耀增日月之輝君臣之道穆穆皇皇則史册之美又盡於此矣夫何犬戎之瑣細而敢為大國之患難紆令公之思慮哉侍御犀額燕頷骨狀甚貴懸知是行也必能露丹懇騁飛辨大陳明義以酬國恩山中異日偶承來問聞侍御褒衣結綬從公於北闕之下明天子以卿大夫印綬加之不可得而讓也窮秋葉脫鴈號霜徑矣行道開襟下帆鍾陵衆君子圭璋偉士英英照爛美侍御之所從也樂請抒詩什以貺之載懦夫也酺觴疑所謂以附於敘末今天下司王職之官官立帥帥立屬制置滋久繁冗日甚二年春皇帝以易簡之道大黜冗吏詔近臣冠惠文冠者四人分行郡國以權之所至之邦刀布粟帛有廢供給辦二千六百石得自考課殿最以聞朝廷重其寄能其人以監察御史敬公清明上才克荷斯任故自黔中距於南海盡得而董之夏四月辛巳至於江夏六月丁酉馳於嶺嶠鄂管連帥御史大夫盧公闢以高館羅以籩豆搜文以餞之禮也先是侍御之至風威儀稜江湖飇馳如霜氣肅物莫不震惕我大夫政有和裕賦無逋曠饔夕餼朝問候君子有以見天王之臣行者以威重居者以恪敬也且國家尚兵以來百萬軍食仰給黎庶者數年矣至於靡弊等劇矣今㣥寇底定人生始泰如飢腸凍骨易施饘褐是行也軌大中扇仁風決滯寃察賢良使海隅蒼生沐浴汪濊者正在於是豈獨責稽逋之賦乎小子濫以儒列厠末座大夫欲卑賤者得申其志至猥而命之載久栖山林詞朴意拙跪受簡牘伏用靦汗然各請賦五言二章頌皇皇之盛也樹生人之本寵天下之利鹽鐵而已矣非剸犀切玉之器操劃利病之權務通泉貨上充天府下活人命則不得而居之國家委中丞李公以王賦之柄輕重之權實才授也去年春三月至於秋八月不雨關中飢饉職司憂焉以豫章江夏長沙諸郡地産王褱材且憑江湖將刳木為舟以漕國儲乃命河東裴從事承檄擁傳與三諸侯圖之從事名滉字瀾之風緒高華中和而深敬恭文敏羽翼吏道始以幹局為萬年尉中歲遠竄乎南徼會恩澤下降李公聆其才而辟之方今藩維大臣奉法謹文所至之邦朝令夕供加以瀾之禮以持外誠以發內溫溫多可中無疵吝故方帥地主瞻其顏色聽其聲氣略去形體相與歡愈盞斚之下暗然事緝斯所謂賢士哉若人也與夫用威造勢者豈同年而語耶眇眇千帆從風飛揚復命主人賓亦有光或者云勤不報屈不伸余不信矣况我公於公揖圭璋之望於私敦中外之愛感歎流落慨然盈懷即異日調和鼎鼐掄才取士得不與中丞同力合謀也水國方夏白波無邊檣烏一動吟嘯千里主公知非文什無以紓離志奉送將歸猥令首敘腆焉如缺但欲言鼓韶濩者之唱調耳道舊者同志之至歡乎送遠者有情之至悲乎二者激人中腸我獨何為鍾此懷抱始余與徐君識面余獨一言道合遂相顧攬載即亟往候太傅夫人起居他年余及楊郎中偕詣梓潼依李太傅生亦相從其於講道藝攻闕漏時上下郪中諸山賦詩舉酒吟嘯風月每至忘形骸也爾後鳥飛雲散南北四去邈邈悠悠凡十餘年昨余被命召為江西從事生乃枉道顧訪病劣不任罷歸潯陽生亦策馬相隨余有茅居在郡南西嶺下前有芙蓉菱芡後有高梧大竹家貧無他具日為徐君舂黃梁爚園蔬魚居鱐數器相顧下筯頽然簷下快然偃仰至宵夜即燎薪火觴白酒引滿之際更語曩事襟期浩然如太古時人間萬纍無非粳粃斯一何為樂之甚也徐君僑寓成都日久常欲扶持尊老歸家洛陽寒氣綿薄不與意會有澤潞從事尚書郎郤君士美生之姑之子也長材端操敦好中外將自茲始裂裳而從之開顏未熟執袂相送歲暮風雪獨遊萬里會面寄書杳杳何期又一何愁慕之深也徐君方厚有志氣履行醇固善為文匿華為晦叩之乃應加以身長七尺聲如笙簧能飲酒斗餘談語眄睞自有標韻所至之地方伯牧守洎賢士大夫莫不為子前席倒屣即士道其幾乎喪矣况山東望雄諸侯賢明舉才擕雋樹勳當世豫章之幹寧逃於班輸之目乎厚自珍重無患知己崔君行先齊君照豫之舊友也郤君士美盧君頊豫得之友人蕭易簡也此數君子皆以宏才賓盡幕中寒暑推謝為余問其無恙否耶復以是便代雙鯉載弱年與北海王簡言隴西李元象洎中師高明會合於蜀四人相依然約為友遂同詣青城山斬刈蓁葦手樹屋宇俱務佐王之學初載未知書其所覽誦章句而已中師發明大體擊去疵雜誘我於疏通廣博之地示我於精淳元皓之際偲偲之道實有力焉無幾何共欲張聞見之路方乘扁舟沿三峽造潯陽廬山復營蓬居遂我遁棲二三子以道德相播以林壑相尚精綜六籍翺翔百氏繇是聲譽殷然為江湖聞人居五六年載出廬嶽歸蜀問起居中師愛惜離思振衣相送泝九江歷楚抵秭歸而旋執袪之際互修前志己巳歲自成都至中師自長安僑寓荊州羈旅相依各被婚娶困於柴水去歲迄今凶問洊臻王李二生相次殞零草堂無主雲林索寞鄉風長想不知涕之橫墜也噫青城匡廬岑嶔際天下有煙霞上有神仙緬懷曩昔逍遙其下背負素琴手持道書掬泉掃石吟嘯終晝是時年少無事費傲光景造適則止不知其他孰謂倏忽與中師啓煩襟期晦明一十二年於茲矣辭山林墮塵滓五變星霜矣歲月馳於外憂喜攻於內動非濟當世之務靜不庇環堵之室泥塗碌碌視日旦暮永言念此厚用慚穢思欲攀石門之松桂宿靈溪之煙月可再得乎然局度者多繫乎出處知幾者不滯於進取前年冬中師聊整文思起嘗於禮闈間飛聲騰陵譟動公卿常伯輸教俯授高第雖不當素尚亦天路之鴻漸也世之繇此而進者必聯振六翮聿求升翥苟有便捷躍登青冥十六七矣中師旅食淹恤內顧勤窶策馬南向慰其家室未幾而囊金中罄庖煙屢絶乘時蒸鑠將遊炎方又何其濩落也相國齊公挺鸞皇之儀鬱經緯之譽新荷天寵鎮安越服執事行業明白且曰親舊或將修假道之禮不為丁寧結約求以自輔乎重慎舟楫無畏遠道議者云五嶺風候加餐飯日舉醇酒數觴可以佐助正氣生其志之有沃田有良耜土膏脈發凌春而耕之播穜稑之種極耘耨之力其或七年旱九年水穫不登於秉庾者此天時也非為農之不精也用聰明端思慮古先典籍鑽研而求之以道德為冕辨以仁義為組綬其名不光其位不及身尚嬰於貧賤者此人時也非為學之不至也山人誦堯舜之言服堯舜之行四十年矣鬢毛斑白龍鍾布褐得不曰命之水旱歟山人名復氣清骨植凡態不入揖讓應對甚有素士之風探賾以知章居易以安貧立誠以守晦服勤以樹善始結茅於滁上有琅琊山青泉白石羅在戶牖耕漁之暇時時開素卷飲濁醪以雲霞為賓友以林籟為簫管頽然竟歲不知其他頃有好事者日抵其廬舍莫不叢口一意頌我中丞崔君之賢明山人聞風裹足於蓬戶齋心於宣城手持短書候獻鈴閣中丞厚德如山愛敬士大夫降千乘之嚴貴納縫掖之憔悴相與談話惠其氣色枯株旱草霢霂膏雨嗟夫古人云國士遇我正在此耳何必他感然後捐軀乎况復與其文藝之優贍慨其羽毛之頽弱將欲借搏扶之力鴻漸之勢拔自泥滓化窮為通黎君心腸得不快然哉中丞下車日久政成俗阜倉廩實禮義立府中清淨白晝無事遂甘心於賓客焉朱軒洞開四壁風涼彈絃清歌絡繹行觴簪裾荷惠陶然一醉居無何山人有歸歟之興中丞乃抽妙思動高韻以大雅之什貺之文人幕客聯和瓊璧組繡鄙夫知到山之日猿鶴顧迎視有喜色也嗚呼幽蘭生於大澤香薰芬馥過時不採摧於蓬蒿矣黎君隱於滁上蘊才蓄力是行不偶老於風塵矣去矣自愛謹候休問載卑客也才識短陋猥以敘述冠於㣥什如處泰山之上兢惶惴恐之不暇也敢為首乎良郢法師多聞強學風表端淨拔乎出萃者也始童子剃落轉持塵尾講仁王經白黑讚歎生希有想既進具酷自砥礪加之以聰明迅發至於修多羅毗尼達摩書雜如是若干種法上人悉知解以佛門言之文學則遊夏也以法將則韓彭也異日必能破魔軍闡元風當來像教不墜於地矣甲申歲夏六月中丞楊公下車長沙之三年也余自故山扁舟一葉主人舍我於東館師荷簦振策惠然相顧始見其青蓮眼目水田衣裳其心則歡如也次聞縱論雲湧波委甚嚴如也居纍日報余以羅浮之行雲心不定稍欲引去噫沙門釋子棄捐萬慮擕三衣鉢乞食自給晦宿聚落朝行亂山心明境界何樂如此悲夫塵勞之士校名利溺愛縛區區於尋尺之內寧復拱懷於方外之遊哉嘗聞説者云有蓬萊一島浮至與羅山合並因命曰羅浮風煙草樹木有異態余未嘗踐履其心技癢師到日為我殷勤手疏寄北來檀越也玉在寶族拔乎其萃者也濡天地之沖和納陰陽之粹精堅剛滋潤配德君子故為璉為瑚為圭為璋以奉乎神祗人鬼以飾乎車服冕辨非是則禮樂之道有墜於地焉當其沈耀隱璞墮汨沙泥中枯稿暗藹光明不發庸工睨之譬頑塊意方拾之惑而復投此卞氏所以喑嗚珉瓀所以長王去聲也及其逢值英匠識密鑒洞掇於瓦礫而不疑扣之鏗然琢之爛然如蒸栗截肪氣吞蛇文珍貫魚目是時也即趙不得私愛秦不得暴取坐齊宮而後見藉綈繡而後執委連城如脫屣割土地如裂帛以償其價猶恐其不直玉則尚然人豈無之士君子含纍蘊器困於側陋塵垢被身體蓬茨沒四壁智不贍饘褐道不信妻子闒茸視之猶聱夫也及其乘時運之會遭知己之顧鬱起耕釣作時功勳上以戴大君下以福生人澤流萬世聲塞九宇是時也一言受卿相再詞啓茅社以厚其禮猶謂之不重於戲有至物必有至人有盛才必有大用歷觀前代不知則已苟或知之則古獄之劍不為朽鐵也鹽車之馬不為病駒也爨下之桐不為樵薪也磻溪之士不為憊叟也蘭陵蕭易簡韜沈邃之識抱宏偉之材業巨命隘與時濩落若嚮者之事尚或不泯則道必有所明志必有所行指顧樹勳績呼嘯取金紫是夫人也肯昧茲數而隕穫於此際哉人謂甚病余固知甚泰矣然三峽孱顏驚波觸天行客易愁况聞哀猿苟有鍾粟尺帛之可共則寧使賢者栖栖沿泝其間去矣自愛余一嘆矣且玉有盛美可以况德亦感乎和璞之事故為説玉以餞之楚國主人嗜材搴異有樹美松於庭者培沃土灌甘澤根柢深固柯葉暢達居二三年起盈尺挺於纍丈始筳筯大於拱抱高姿傑然若陵重芬主人方凝睇結意曰是可採之矣將行斧焉客有遇之者曰噫其甚也是木有戛雲之姿有構厦之材繩墨大速恐夭其理今植於庭除之間克耳目之玩尚見狎近氣色不振若徙於嵩岱之間沆瀣之華注於內日月之光薄於外祥鸞嗷嗷戲其上流泉湯湯鳴其下巖岫重復漠漠然清淨靈風四起聲掩竿籟是時也當境勝神王拔地千丈根實黃泉枝摩青天則可以柱明堂而棟大厦也豈暇曠之旨捨此而取其榱桷棼橑哉主人曰客言雖濶而無岸然余終能大之矣世人丹青得畫遺迹張公運思與造化敵根如蹲虬枝若交戟離披慘淡寒起素壁高秋古寺僧室虛白至人凝視心境雙寂丞相灞陵公以虎符龍節清鎮淮海凡十五年矣有盛德美化加於民可以刻金石以圖其形遂於龍興佛廟大修繪事自相國洎監軍使樊常侍賓僚將校羅乎素壁森然也有部從事殿中侍御史穆賞作灞陵志太常寺奉禮郎符載作寫真讚以頌之夫蘊二儀統萬類役百靈者莫善於人故得全氣者為至聖堯舜周孔是矣得間氣者為大賢夔龍伊尹是矣自敻古達於茲日一時之理百化之損益未嘗不繇是矣然則造時者必繫乎君輔時者必繫乎臣也至於蘊咎夔之業得輔相之道者其灞陵公之謂乎公參三才之粹氣包五行之靈用以太和為正性以至仁為厚德以神明為視聽以禮樂為肢體涯岸宏大才智傑出注百川而溟海不動臨萬象而元機獨運修眉廣顙睟容玉色如祥鸞彩鳳徘徊瑞氣得不謂人倫之上才歟公之為政也根柢於誠信柯幹於刑賞枝葉於禁忌達時之通變識人之好惡聽覽而不察寬裕而有制故蒙澤者如膏雨畏刑者如秋霜萬情浩擾懸我條貫生生之分各得其性得不謂民之父母歟公之為學也冠冕六籍衣裳㣥史履屨百氏每讀書取其實而不取其華深研著述號為通典大抵自開闢旁行至乎歷代有兵食財賦職官禮樂交關於當世者莫不摘拾其英華滲漉其膏澤截煩以趣約裁疏以就密其有覽之者如熱得澤如飢得食五車萬卷盡為冗廢得不謂立言垂範歟守藩歲久哀乞朝覲上賜優詔聽答悃欵伏見車騎煜煜星馳闕下明天子闢閶闔負黼扆延國老於雲臺之下鋪陳皇王之道德發明古今之教義上以揚君后之鴻化下以言理國之大要是知經天地戡禍亂敦五教端百揆大君以此柄授公知公不得而讓也夫漢之麒麟唐之凌煙愛其德即圖其人覩其人則景行其事復銘景鐘樹甘棠此皆以遺芳餘烈浹於人骨髓者也異日廣陵之民懷公之惠愛嗅公之馨香企公之軌躅帷袂接武沈吟茲地嚴目而視捧手而指必知夫咨嗟慨詠之聲發於肺肝矣載山林野賤之士猥辱眄睞塵厠下界恭覩盛德敢無詞乎不書爵氏灞陵公之尊也讚曰碩德昂昂智圓德方武庫矛戟禮容圭璋神氣端凝風儀高張晴天鶴立秋水龍驤擁旄淮南俗阜民康休聲四塞入覲天王天王虛懷待公廟堂始終進退赫然有光後人來斯環繞長廊以此淨域便為甘棠戊辰歲尚書韋公授鉞之四年也初尚書以隴殊勳拜執金吾天子猶以為功重而報輕俾作鎮於蜀得自開幕府延納賢雋焉韋公虛中下體愛敬士大夫故四方文行忠信豪邁倜儻之士奔走接武鹿君至幕下搢紳峩峩為一時偉人時符子客於成都歎其盛美又咸得衆君子之歡而嘗思欲讚頌之事無由緣殆似行佞蘊蓄浩思殊鬱鬱不快也適會有沙門義全者善丹青尤工寫真諸公博雅好事皆使圖畫之山客由是得書曩意因述寫真讚十三章使士林才彥不獨仰大府得賢之盛抑亦欲屬詞比迹各明其為人也河目犀額材為國楨幹局方大質文光明霞出海嶠鸞翔玉京式瞻冠紱褊吝不生襟靈灑散揮斥塵細佩服五常翺翔六藝儲和養正含器經世風裁伊何空山松桂風儀朗邁振拔氛囂玉氣凝潤鶴情超遼文燭翰苑德成士標問望何有羽儀中朝英明淳粹凝作正氣沈益神明默分涇渭世或蕩本我則歸至高閲繪圖憲章有寄體岸恢峻神機宏廓河發崑崙風生廣莫道以義見文由雅作彰善繩僣讜言無怍中和曼溢為祥聖代彩鳳翺翔卿雲霮䨴誠多被物迹則用晦神宇森森形諸粉繪疏通亮直落落公材馴義立則求仁不回松吟石潤雪灑瑤臺高張粉繪清風四來王生嶷嶷精粹在體雪山孤峙瑤池見底靜必感神動則有禮共事騫舉出納雲陛皎皎太初器傑文雄靈蟠出水秋鶚乘風爐化宇宙無所不攻他時圖畫麟閣之中質器渾素實曰清儒三獻俎豆八音笙竽擺落羇局沈研道樞高播屹立無得而踰和順中積英華外發碧海靈珠秋天朗月風度可法文章無轍何許鳳棲峩峩雙闕雲摩氣英百戰知名蓮花劍利騂角弓鳴臨敵有勇奉身以誠志清淮海材冠戎兵皎皎素壁雄雄華精每遊秦苑翻疑柳營姿觀王褱奇和門之雋龎首箕口虎頭鷹瞬臨戎激勵撫上下信虛實知兵龍蛇識陳機謀宏遠墻宇高峻何處功名下邳古鎮
