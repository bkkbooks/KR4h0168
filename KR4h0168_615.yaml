front:
  text: 全唐文欽定全唐文卷六百十五長孺河東人貞元中鄉貢進士
  hash: sha256:b5b8da3b71a4faa7d4c12dde7352ecb04054d421f0d080976333fe485cda8254
  markers:
  - {type: head, offset: 13, content: 薛長孺, id: KR4h0168_NFKB_615-h1, level: 1}
body:
  text: 張氏之先運籌博物風靡萬民公其裔焉公諱敬詵馮翊同川人也皇朝左金吾衛大將軍太常卿元長府君之孫皇朝中散大夫撫州長史崇讓府君之次子公禮度清曠育德含章蘊晏樂佐理之謀猷懷吳周匡弻之骨梗弓裘不墜文武攸稱清貫克序加朝請大夫以博雅周才授鴻臚少卿以公忠推德錫金章紫綬東都副留守河南尹裴公謂命公為押衙奉上以忠貞撫下以信義休聲遐著寮友欽之方申呂父之榮遽染劉貞之疾以貞元十年八月二十三日卒於洛陽縣永泰里之私第春秋六十八以其年九月二十四日窆於瀍澗之陽邙山之新塋禮也允子三人曰叔重叔威叔齊皆年始能言昂逸足疑有女五人長女從緇隸寧剎寺次女歸杜氏三女歸王氏兩女尚幼夫人樊氏淑順傳芳霜明徑節移天墜翼同穴後時哭不絶聲撫孤增慟永懷陵谷爰託松銘其詞云神理茫茫兮倏明忽幽人世營營兮生勞死休更相泣送兮萬古千秋隴樹白楊兮悲風飀飀彙貞元十年進士伊惟仲秋日在端午我皇帝出震蘭殿誕膺紫微祥光夜合佳氣晨飛聖人作而萬物覩固先天而天不違是以禮容之盛六葉交映或體天以設軌或因時而布令乃啓新節獻金鏡形於四海加於百姓虛以受物則萬象必涵金以平心而九流惟正當其時也天宮戚里公侯卿士各薦其明用伸知已雖大小而殊致必規圓而相似且夫考工垂典匠人有作或鑄或鎔是磨是削刻以為龍鏤以成鵲初臨玉扆透鸞影而將飛未對金墀拂菱花而不著徒觀其用之則滿舍之則虛固無私於物類非取鑒以焉如爾其提握見重光芒未歇若清潭之無比類瑤池之有月如以題古字隱盤龍無藏菲薄無漏纖濃映空而天地且霽照遠而山河更重豈獨淋漓玳瑁之牀澄徹芙蓉之帳熒熒綺疏之下皎皎青樓之上有美人兮無良媒飾蛾眉而相向者也所以吾君欽崇萬化錫賚百官其表不枉其形必端詩所謂我心匪鑒豈不戒於遊盤別有照象無疲含光未知方有期於見膽竊自比於臨池儻先容之可致庶斯焉而取斯方慶貞元中進士煥彼景星麗於蒼昊其隱也陰魄晦而氛霧作其見也夜景明而欃槍掃敷大信以何言抑殊祥而是考祥所以叶天經符帝道既表應而無欺亦照臨而不私祚聖而德斯至矣懸象而人皆仰之向晦且殊於中見在天寧比乎明夷垂至精而契至理宏蕩蕩而播巍巍不然出房孰稱乎舜德居翼何貴乎堯時今我皇齊七政以作則奉三無以御極上天降祥景星昭德固云其道不遠孰謂其神不測晦明始見助皇化之惟明動息靡常類乾健而不息應陽精乃三其數彰土德乃黃其色既不孤而有鄰信元吉而柔克時也雲斂遙素天澄遠青纖塵不起微露斯零掩映孤月乘陵衆星回燭北辰似將朝乎帝座傍窺南極疑欲覲乎天庭激高風以熠熠耿斜漢之熒熒青赤以辨其方合散以通其變連二氣而初吐混三光而乍見否泰之運式孚天地之心可見景星之瑞也曷與為雙俾具瞻於萬邦景星之德也配乎悠久粲熒煌於九有於以贊高明於以示休咎察無聲之載非我何知彰有道之邦非我何守不私其用胡繼明於月晦之時克保其謙故騰輝於日入之後是時天鑒匪遙德聲孔昭煥赫帛丿糸古光揚聖朝豈徒並連珠而邁同色流碧落而耀青霄風之過兮一氣之作簫之應也衆音以殊雖高下以異響終合散而同塗體宮商而自得均清濁以相須動必造適用當其無冥然理順昭與道俱以由一人之化為而不有萬物之心以虛為受帝於何力各自遂其生成天且不言乃能恆於悠久觀夫指大塊之噫氣裁衆管而聲隨始飂飂兮清越終杳杳以逶迤遠而聆之初疑白虎方嘯迫而察也旋驚丹鳳來儀知化本之有眹見天籟之在斯道固無名物罔不感彼命宮而商應信陽舒而陰慘雲何事而從龍水何情而習坎故達人作用而虛其清心大道不疵乃滌其元覽之風也扇其輕重之簫也應以洪纖彼若疾而揚我則以號以噭彼若和而靜我則若沈若潛曷異夫暴心感而粗以厲敬心感而直以廉爾其斷續清空蕭寥永夜歷虛無而輕颷自遠拂松竹而幽韻相借微聞闕下伴金奏之發天庭迥徹雲中疑笙歌之隨羽駕莊生託之以齊物子綦由是而觀化化之至矣茲焉可知風乃不私其用簫亦自得其宜元元立言事無事我后垂拱為無為君子曰風簫也罔有爭而善勝契不言而自應是將觀彼以成化豈獨因之而比興道倫貞元中進士帝堯有君人之大德恢理國之令圖將啓納善之懷於四方之士乃立進善之旌於五達之衢所以訪政化之本招賢俊之徒告善員來故進而無妄聞善必納信言而有孚類諫鼓所陳同謗木之設彼思聞過而遷善此俾明善而就列善既陳而一人有慶旌既立而萬姓咸悅寧同旟旐之翩翩奚貴干旄之孑孑九達之上大逵之中直影而晴分瑞日孤懸而晝引祥風置之則上德下布就之則下情上通既至者固當授之以祿將來者不假招之以弓初孰為此自陶唐氏制乃有常張而不弛嶷然而孤標獨立迥爾而中立無倚示華夏則綏之斯來化要荒而罔不率俾厥旌既陳盛德日新使樂善之儔得因旌以進知建旌之意固惟善是親可以光被區宇統和天人比垂衣於百代異舞干於七旬繇是廣達四聰必徵片善咸望雲而就日若風行而草偃求其善理知百寮之師師采其善言得王臣之蹇蹇今大君聰明文思庶政無遺善以求人固以達於政矣旌可進善亦在推而廣之士有敦詩書懷忠信學頗師於鄒魯君幸逢於堯舜比潛鱗而待躍同弱羽之思振欣逢進善之時庶以善言而進承宣貞元八年進士大和中官檢校吏部尚書天平軍節度使絲之為體兮柔以順德絲之為用兮施之則直從其性而不改成其音而罔忒故君子體直以為象履中而立身豈委曲而取媚將徑挺而維新既端懿以難匹想高張而莫倫初未為絃兮信任其舒卷既比夫矢也諒難乎屈伸寧懼不合於衆而改操不同其類而易真雖立質以假物立音而因人敦夫㡛氏之功辨夫園客之養非繞指以可悅將如絲而是仰志士以是而興歎詩人因此而取象清廟之瑟非我而莫聞空桑之琴非我而奚響惟直是與惟端是求惡靡然以從俗恥紛若以隨流天心保貞側媚見而用侮神道助正謇諤鑒而無憂信乎去邪以受福孰不履正而身修間其色兮未嘉素其質兮孰美信挺挺而直繩是若固奕奕而渥丹無比欲衆之好我染之而匪他知代之惡邪直之而有以非矯其俗將遷其時寧三思而有贊諒一向而無疑道在斯而為得文舍此而何之古所以嗟是非而莫分怨邪正之難考多將任情而媚俗鮮能率性而行道何不鑒朱繩而獨異與㣥類而且殊其美雖偶其道則孤儻斯言而是當又可得而已乎昔如來以善惡無所勸為之說因果修因果者無所從為之存像教像教設而功德爰立因果著而報應彰明至於聚沙亦獲多福矧闕二字縱廣之高大其功德曷可思量哉惟唐貞元己卯歲孟夏四月旬有九日聖君降誕之辰也煌煌乎溥天之大慶率土之盛事窮祥絶瑞略而不談人神幽贊品類歡樂闕一字自京邑達於海隅各獻珍寶以賀昌運先是觀察使柳公監軍闕一字魚公相與言曰聞夫西方之聖者闕一字崇福之本至仁之教故報君莫大於崇福崇福莫大於樹善樹善莫大於佛教教之本其在浮圖闕三字今皇帝道邁往初澤漸無垠天下之人登壽域樂太平者二十有一年於茲矣含氣之類尚猶知感矧臣子之心當於茲辰焉於是會釋徒謀建置作為浮圖以塔名之夫塔者上闕一字諸天下鎮三界影之所蔭如日月之照破昏為明鈴之所響如金石之奏聞聲生善如是諸福盡歸闕二字謀之既臧相顧踊躍願力闕一字果事無不諧齊心至諴三卜皆吉相地面勢依山憑高標勝槩於南方跨上游於福地食王祿者樂於檀施荷帝力者悅而獻工役無告勞功用斯畢皇帝嘉焉御扎題額錫名貞元無垢淨光之塔屹然峻然高立雲外露盤而星象可接金榜而鸞鳳交馳從何處生如踊諸地侔金剛而難壞與劫石而齊堅取舍利以置其中闕三字以表其外俾夫觀覽者名號斯識瞻禮者利益居多異夫經營之初墾鑿之始周其基址下現盤石五色闕六字意將靈祇先有所待盤石之上又生異表瑩徹冰淨淋漓玉顏如物之牙粲然攢植訊諸博識得未曾有非闕一字孝之感動神祇之協贊則何以有斯靈異乎况河東公以仁德鎮撫海隅砥安魚公以忠闕五字輯睦二臣協心一方康寧建彼崇塔赫然丕績上以資大君無疆之福下以遂衆生闕九字亦至矣盍刊諸貞石以示於將來小子備從事之末奉銘敘之命豈知竺乾之道空為闕二字之闕三字瞻彼靈塔巍巍崇崇疑自地踊若將天通作鎮海隅高標閩中影護下界形儀太空金盤闕十字贊茲盛功侯其建之臣子之忠闕二字福之聖壽無窮彼思者誰思李公也所慰者何慰邦人也曷以思之政成而惠及也曷以慰之刻石而播美也侯其能紀其所以慰今節度使淮陽郡公袁公尚賢嘉善之旨也於戲郡國者土地人民之謂也藩鎮者軍旅鈇鉞之謂也皇家綜核名實襟束體要上有成則下無分權於是慶位寵命極其數殺生刑賞專其柄政理教化仰其成任之莫大也事之莫重也唯其聰明可以盡聽覽唯其材智可以適利害唯其忠誠可以竭肺肝然後能聳動乎㣥倫師範乎四方作帝垣翰為人膏澤歷選授命非全器備用則不稱茲職焉德宗臨御既久鍛鍊惟精鑒洞㣥下舉無遁情以四方之少事專將帥於賢良得禮樂詩書之精英盡典法政化之根本居則物受其福砥於康寧去則人慕其德形於謠詠古之作者又何加焉貞元歲公自給事中纍月除尚書右丞上方倚以為輔而㣥望僉屬會東軍闕帥時許蔡不靖撫安鎮定之寄咸又與能用賢先於急病簡兵符於注意是使澤潤之功未及於天下乂安之理獨賚於一方麾幢既行寵冠㣥后茲鎮之地據當要害風俗之舊號為堅強兵甲精而氣勝疆土沃而人逸界大藩之雄盛邇王畿之德澤善否之政難於厥初矧自賈相國之寬厚居外略其法度李僕射以制作求理未及惠化姚以靜而潛用盧以促而不暇軍雖和未及於整人雖安未遂其泰官雖備未盡其理法雖張未一其門遂使強力暴氣時黷武經黠胥豪家時漁細民署職祿士時或幸致斷刑察獄時或情及公乃明示畫立程軌利銜策以謹其不度峻隄防以遏其淫心開通耳目改易視聽先之以端莊肅怠惰齊之以精爽攻矯誣清明燭於無間機權制於有眹十萬之室不可以戶曉三軍之衆不可以心期正身行令罕不率俾桉典籍無冗員以敗法閲部伍無寵私以居職入閭井有敬讓禮節以厚俗行田野無汙萊蕪穢之不理儲倉庫本乎節用水旱因得而備也從人欲本乎省事教化因得而興也苟理道之可究志意之可留小無不勤大無不備一貫其道七年有初公積孝友發為聰明本學術施於政事儼容而居公可畏莊色而非義不干手衡目鏡毫釐無隱竹操松心風霜彊徑春秋稱子産以寬猛相濟為善理晉史美元凱以文武盡在為全材古今異時賢哲同道今皇帝纂大統之二歲元和紀號方將郊上元謁清廟乃詢大政於二三元老俾第郡國之聲績懿重望以居內副祀之任歷永歲時詔書遂東有待而起及黃霸赴召韓侯入覲營舍空其將校府署盡其官吏巷無有居室無有處或擁塞遮邊或饌酒饋餼咸曰獸草魚水夫何所依寒裘飢食復何所自思念之音亹亹不絶者逮於今焉夫民者氓也未易其感動庶者衆也又難其一心非功利之積及於下惠澤之漸漬自久胡不唱而同和不約而同期誠之所孚在物知感自後出鎮浙右入掌邦計聲先路以人悅政不言而事理由滑之所以著焉淮陽公代公守鎮琴瑟異質雅音同致邦人重濡其厚惠是用思報其前政於是左廂都押牙兼御史大夫房士郢右廂都押牙兼御史大夫范山才攝白馬縣令盧乾真洎耆老張西雲等詣庭詣閣宣贊功德淮陽公乃跡事録實纍表上聞願刊石垂休以慰人望公遂懇白執政讓形於色由是所請不時得下淮陽公嘆曰仁極於政義臻於讓誠君子之用心也紀事揚美之道其在豫乎今宜名碑遂賢者之志述於文抒東人之思顧謂觀察判官殿中侍御史庾承宣以從事在茲詳備聞見盍敘之而昭示永永焉公名元素字大朴其先趙郡人也若崇基峻源清門茂閥歷官之前後修身之事業則紀名臣傳循良得以耀竹帛焉今不書不敢專也乃編邦人之詠係於篇末俾采詩之官得以薦馨香云其辭曰我所思兮春之陽氣熙愈兮物芬芳枯者茂兮焚者息曷以比之公之德我所思兮親之慈察痛癢兮知寒飢充寒飢兮延性命曷以比之公之政我所思兮正始音薰然和兮天地心興敬讓兮去姦詐曷以比之公之化我所思兮鑑澄徹淨冰玉兮皎霜雪幽隱盡兮研精英曷以比之公之明我所思兮河之水靡晝夜兮波瀰瀰我所思兮嵩嶽之名山仰申甫兮霄漢間居霄漢兮興雲雨霖旱歲兮澤九土俾吾侯兮終獲祜望而祝之享天祚於戲節義立則人倫之風厚忠孝彰則君親之恩大罔極之報非死不盡臣子之心非盡不明決去就於至誠擇利害而無撓其生也挺身為萬夫之特其終也成名於泰山之重淩視千古高居上游斯人伊何魏博節度使田公布字敦禮之謂也初公烈考曰宏正輔佐憲宗掃除寇逆為侍中魏博節度使今上嗣位鎮州軍吏以節度使王承宗死上聞詔宏正除中書令代焉居一歲兵亂遇禍公時為涇原節度詔追至京聞喪公卿獻議以為討鎮莫若用魏魏強而近又公恩德積洽於魏以鉞賜其子布布復有能則魏之士欣戴而效死焉詔從之公泣血號天而辭不能者再詔不許乃曰報君恩復父讎在此舉也如不濟則無其生以謝之別兄弟妻子屏門之內辭賓客朋友於西階之下喪輿遂北至魏則徒跣行號以見將士將士蓍艾者父兄事之齒類者骨肉親之毀家以結人心辭祿而贍公用明求報之道竭勵士之方冀其協心以副私志異哉魏之風俗久悖聲教魏之將士素染很戾懷安自固忽感激之勇節積驕成惰無戰鬬之剛腸初猶哀公之誠悅公之賞雖未心化暫忘舊風無何奉詔出師抵冀之南宮縣邇賊而振威也時討幽鎮諸軍庶事草創計司荒略供饋大虧公乃以本部六州之租入權以自濟冰雪方盛飛挽阻艱衆相言曰頃常出軍賴朝廷供給優贍軍府因以完濟今者瘠已肥國尚書無乃太公忠乎旋以滄景喪敗王師不振諸軍顧望莫有鬬心賊使間諜騰肆飛語以不固之志加懷怨之心望風聽聲將欲謀亂咸有見者宜圖其休全身保軍以俟後舉公仰而號曰天子徵兵以討叛亂吾特授旄鉞復其家冤將軍雖死國典斯在豈蓄縮完守為不忠孝之臣乎衆知公不可迫因師行而遂潰中軍不同其謀奉公達於魏城衆又言曰魏土不知朝化久矣刑賞禮樂皆自已出近以保富貴遠以貽子孫苟能從衆之謀則捧戴如舊公知其不可以道化又難以力服時太尉之靈座在魏之官署公陽以入臨人不以虞慟哭伏劍衆驚至而絶矣春秋三十八噫相國李公訴先公帥魏衆以貪亂李不能制閉域以自固重幣以貸死及公初至悖氣尚存邀賞撓法一唱萬和况鎮之軍於魏舊有救敗德兩軍相觀如親戚焉寧有一人之忠義化六萬之肝膽三月之將帥移六十年之舊風強其陸梁計其相觀同騃愚蔽知其不可李石有言曰重耳教訓三歲而後敗楚勾踐生聚二十年而後滅吳以中古之慤信晉越之馴伏尚且遲之况今魏乎聞者信之及公終也賊衆感義而退守王師聞風而憤激達於朝廷天子壯其節而哀其死為之廢朝公卿洎百執事咨嗟悽憫久而不絶及喪至則弔周懋恤禮備而恩加焉贈尚書右僕射以長慶二年八月二十六日葬於萬年縣白鹿原公之大王父曰廷輝安東都護司馬贈右僕射王父曰玠相州刺史烈考中書令贈太尉而勳高位崇至公而名重節立蓋以茂德為濬源大忠為厚址克生賢哲焯耀邦國初自魏之裨將以謹幹至大將自侍御史以討叛勞至大夫以平蔡功為金吾將軍以長材鎮要衝為河北節度以多略靜邊陲為涇源節度在裨將則辨冤囚太尉無淫刑矣領征軍則備賊之驚突諸軍因之立功矣為金吾抑同列而不遏諫官聖朝有容直之美矣帥河陽也則省將而多戰卒滅賊而守詔條於是乎兵實而人安矣鎮涇源則勸其力穡教其騎射於是糴賤而人能矣其大材敏識有名臣之體要深謀善計得良將之精華善而不伐高則思降無豪貴之侈欲慕廉讓之高風惜乎壯年有志不立豈天意用斯人以激其怠惰警其奸凶者哉伏劍之辰手操遺表陳凶逆之根本明將帥之儀矩聖君因得辨邪正可謂始終之善者也其遺孤及門吏知豫夙奉周旋感激名義請揚盛烈於萬斯年銘曰具體皆人能恥者誰輕死重義謂之有思豺狼貪婪力不能支部下將二誠無所施上虧國恩中冤父私兩志莫遂顧生奚為明者獨斷勇夫不疑忍恥偷安犬彘等夷靦顏冒寵復何人斯誠貫心膂竟違我期利刃貫胸血殷喪帷軍士喧駭逆黨忸怩義風激揚征車不衰自居所重賢人得之地察天明稱為神祇雅有節鉞流聞邊陲青史長存馨香葳蕤奕貞元時人幽山淨土生此芭蕉無心起喻覺路非遙元亮字晦叔磁州昭義人貞元十一年進士元和中纍轉駕部員外郎出為密歙湖三州刺史文宗朝遷右散騎常侍歷虢州刺史卒年六十六贈禮部尚書學於是專教所以立信尊賢可上在易性難從眷彼儒流職司學校誠宜警不及之誡懼將落之辭苟毀方以為心雖容衆而奚用且非善誘在傳授而則乖曾是詭隨於博裕而何有不可以訓無易由言請從司業之規無取學官之見絳為魏博節度使田緒賓佐與同府侯臧爭權緒子季安斥為下縣尉俄召還生瘞之維天以五星辨經紀維人以五常垂教化奉天者皇王牧民者侯伯故五星失次舍而天綱乖五常悖倫理而人紀壞非夫人神厭禍天地合德俾降英傑以靜邦家則無以正綱紀成教化矣皇唐九葉今上馭歷之五載得佐命戡難之臣曰田公諱緒字某北平盧龍人也系自唐虞盛德載世祚於全齊醇仁酣和衰周鼎遷暴嬴璧返劉項角逐正者得之則齊王橫去國隕身與義終始議郎疇立功逃賞興讓澆薄十數世家於北邊議郎即公之十五代祖也至皇鄭州別駕璟生公大王父安東合都護贈戶部尚書有遮虜護塞之勳而生不登貴位加之以齊王之秉節議郎之遺榮濬源茂本故尚書克生太尉承嗣歷檢校戶部尚書兼御史大夫魏博貝相滄德州節度度支營田觀察處置等使尚書左僕射司空同中書門下平章事兼魏州大都督府長史封鴈門郡王歿贈太保纍贈太傅復魏州大都督公太傅第六子也乘博厚之慶得堅剛之氣君臣之大節理亂之形兆實天賦不言而知侯王之姿見於童孺太傅朗識異而器焉以諸侯之嫡拜京兆府參軍兼五領騎士深得將略鳴弓上馬雄稜挺然無何太尉寢疾或以措置故事不歸於公聖朝載懷輯綏永顧勳績爰命從子俾侯於蕃既履四封乃遷六官付畀於天威惠在已主恩寵章赫赫煌煌孝未昭而忠隳正不悟而邪及志惟悖德動則無名是以河朔塵飛隴右霧塞青亠兊既叶幽冀未同見多壘於魏郊發天兵於隴坻曠日持久連年不平履危者若安處禍者皆樂囂然相視孰辨其非公斷天下之疑達天下之務以為君親可報也世德不可墜也犯是二者生將何為於是欷歔流涕冀其感寤靡有虛日而無正言及京師變生翠華順動人望愈惑堅不可離星辰之間戎帥薨謝師人將士退迫公理軍公清望威名衆所欣戴且曰吾先公太傅之冢子也仁而能斷嚴不至殘當去禍就福化危使安敢以死請期乎息肩公雖懇辭人實誠奉於是三軍之裨將列城之守宰及士吏卒伍大和會於旌門之外而聽命焉公乃陳其逆順曉其利病西嚮稽顙如對天顏萬人歡呼式抃且舞受公相誓如履夷途曾不崇朝而獻狀行在於時黃屋南巡於巴濮元凶僭盜於鎬京握兵者鱗差失節者踵武公挺身禍敗拔跡危難掃氛祲之未開定危疑於已變乃分遣寮屬結約諸侯回成德向闕之心合昭義勤王之志雖漁陽之徑悍北虜之猖狂公精誠籲天鋭氣蟠地能走馬實於魏壤覆朱滔於貝邱希烈勢孤賊泚援絶訖於收復經啓自公巍巍碩勳孰與公比由是捷書上聞未幾而降優詔拜魏博節度管內支度營田觀察處置等使銀青光祿大夫魏州大都督長史兼御史大夫君臣之契運昭泰之元符千載一時灼見茲日及六龍駕返九有風清然後議刑賞頒慶賜則公之茂績結於宸衷即日加工部尚書節度等使如故上復以麾幢之任賢賢也腹心是託親親也親賢之選簡於帝心賜公姻戚尚嘉誠長公主公主肅宗文明武德皇帝之孫代宗睿文孝武皇帝之子今上之妹玉潤貞質蘭芳粹容德配元臣道光卿族降自九天歸於列藩獎納忠之誠重匡戴之績由此見公之寵畀㣥后也昔漢張敖曹窋皆因緣戚屬稱榮主第若公之分茅胙土樹牙推轂上自振古迄於聖朝一人而已尋遷尚書右僕射特封常山郡王食邑三千戶明德也改封鴈門真食五百戶襲慶也公惠訓封圻桉部師律恢皇威以勉㣥師敷渥澤以潤蒸人禮讓興行廩積斯實修整人紀統和天常夷難戴君每為己任朝廷褒是休烈爰咨弻諧以本官就拜同中書門下平章事公既參廟謀又統兵柄方將刳胎禍之未兆措理本於永貞張三光之明調六氣之府致君堯舜身作夔益豈獨鎖結燕趙連衡齊魯嘉言有聞而遽嬰寢疾以貞元十有二年四月十日薨於戎府享年六十有三天子震悼不臨朝者三日列辟相弔邦人大慘即日詔遣尚書職方員外郎房挺申賻襚之恩備君臣之分追是勳伐冊贈司空詔書褒寵禮加常典不踰時而命公令子節度副使兼都知兵馬朝散大夫試光祿少卿兼御史大夫季安纂厥戎政式光茂烈雖哀過乎禮而義貴從權寧息魏人藩翰王國稟君之命移孝作忠生而顯榮歿有遺祉薰灼今昔在公一門越以其年十月四日葬我公於魏州貴鄉縣金堤鄉吳河原邇先太傅之塋禮也嗚呼公精彩朗徹志氣雄厲性通事表心達化權二十總戎三十作相俾魏博為順本功以之高奉家國於正初孝以之大忠孝斯立福壽攸歸何蒼生失望國棟斯折古今之恨可勝言哉公有子三人長曰孝和朝散大夫使持節澶州諸軍事澶州刺史兼御史中丞充本州防禦使少曰季直朝議郎殿中侍御史內供奉銀青光祿大夫檢校工部尚書兼魏州大都督府長史御史大夫充魏博相貝澶衛等六州節度管內支度營田觀察處置等使季安公之次子也十五授鉞為唐名臣固河山葉奕之封奉貴主慈嚴之命光闡前烈其不朽與公左右王家砥靜藩閫功勳大略書於惇史若乃垂休聲於開國之地申罔極於元侯之恩刊勒豐碑光顯舊壤門人之事也追慕恩顧直而不文其辭曰三光昏霾兩儀否閉爰資英傑用贊開濟天人合符斯人命世其一塞直盧龍山橫紫蒙元精委輸慶發於公其勳惟茂其德惟崇其二建中季年兩河難作淮圻怙亂燕趙濟惡洶洶鯨奔狺狺獸搏其三翠華順動關右塵飛戎輅載駕苞茅不歸且懷疑顧孰就是非其四時惟我公拔迹艱阻率彼叛徒悉為王旅白日精貫丹誠自許其五婪婪燕寇嗇禍稱兵動搖東夏應援咸京旌旗蔽野獯虜連營其六公仗天威修鄰叶志忠見於時泰生於否十萬姦凶一敗塗地其七帝嘉殊績乃授藩維輯寧有土惠訓成師威令自肅仁風載馳其八乃作官師真食茅土窮寵極貴封王尚主恩光顯融獨映今古其九既司右揆爰作上台皇猷允穆俗阜爰來人望匡弻天胡降災其十冊贈司空念深宸扆道則致君人而知子帝命元侯傳封四履其十一高墳峩峩先隴之旁河掃通氣沙麓連岡歿而可作公其不亡其十二應貞元十一年進士歷官戶部員外郎郎中顓業就師有大小之間函丈待扣慎先後之傳故得怡然有孚相悅以解甲強學自立博習成性摳衣以往如趨闕里之前請益而來疑在舞雩之上宜務知遠者而願學焉仲尼先乎祖述傅說念以終始豈可異子皮之言淺者何效師卜商之業末也無如或屢聞長者之言將習少儀之禮心善魏勃宜拘袂於席前志異陳蕃或灑掃於庭內不議罪此無施勞心禮不與奢慎微以從事用過於儉在貴而能貧乙也不愆其儀匪解其位詎聞不擊不考同詩人之鼓鐘而乃翕如純如類文侯之冠冕東山逸態事比謝安後庭曲施意齊田蚡法司所舉允執厥中儻人惟通班列四備之嘉樂國成有命因五利以和戎理宜捨之以勸能者播字明揚其先太原人父恕官揚州遂家焉貞元中進士舉賢良方正異等憲宗朝纍官禮部尚書充劍南節度使穆宗立拜刑部尚書進中書侍郎同中書門下平章事出為淮南節度使敬宗朝加檢校司空文宗朝加檢校司徒拜尚書左僕射復輔政封太原郡公太清宮使大和四年卒年七十二贈太尉諡曰敬諸縣皆有鎮軍並隨逐水草木放牛馬賊徒因茲假託挾帶軍器晨夕混雜善惡不分伏請從今日已後牧放之徒不得躬帶刀劍器杖等牧放仍請詔下後十日外有犯者百姓所在集衆決重杖二十屬軍者許臣擒捉牒送本鎮亦准例科決仍便解退其近城弋獵准前後敕並以禁斷公郡駙馬將軍子弟子鷹鷂准敕但許城南桉放不得輒越諸界並請不得別持刀劍等所冀邦畿之內盜賊屏息居人行客晨夕獲安准故事御史到館驛已處上廳中使後至即就別廳如中使先至御史亦就別廳近日多不遵守中使或不諳往例貴欲逾越御史若不守故事俱失憲章喧競道途深乖事體伏請各令遵奉故事冀其守分天德軍五城及諸邊城配流人等臣竊見配流人每逢赦恩悉得歸還唯前件流人皆被本道重奏稱要防邊遂令歿身終無歸日臣又見比年邊城所配流者多是胥徒小吏或是鬬毆輕刑據罪可原在邊無益伏請自今已後流人及先流人等準長流格例滿六年後並許放還所以抵法者足以悛懲滿歲者絶其愁怨準本年九月十七日敕自今已後兩京及關內河東河南河北淮南河東西等道州府犯罪繫囚除大逆及下手殺人外其餘應入死罪者委所任官長審量事狀但情非巨蠹並免死配流天德五城諸鎮臣謹言敕文除大逆下手殺人外餘入死罪科目至多若不舉其條流或慮中外處斷不一今請犯十惡及故殺鬬謀劫私鑄錢造僞並京兆界持杖強盜不論並依律文及前後格敕處分自餘死刑即請準今敕減死配隸天德五城有妻者仍準式勒隨流人其父祖子孫欲隨去者任去伏以軍興之時在繫財賦國用之本出於江淮頃者劉晏掌領鹽鐵租庸每自巡桉至於錢穀利病州縣否臧隨以上聞使得釐革臣緣在城務重不獲躬行伏望遣臣副使程特以詔命出巡江淮其諸州府上供錢米如妄託水旱輒有破除伏請委程一切勘責聞奏其度支戶部並臣當司合送上都行營錢物并令急切催促其遠年逋缺亦委具可徵之數聞奏東渭橋每年北倉收貯漕運糙米一十萬石以備水旱今纍年計貯三十萬石請以今年所運者換之自是三歲一換率以為常則所貯不陳而耗蠧不作
