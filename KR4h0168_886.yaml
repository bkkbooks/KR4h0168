front:
  text: 全唐文欽定全唐文卷八百八十六徐鉉九
  hash: sha256:4b1a3c9d6b29c86fc627430de3a8c79f3fc6470733e30b898de5d4075f2c14c4
body:
  text: 君諱某字某其先太原人也昔者諸侯共職起末運於髭王儲后上賓示靈期於瞽史緱山維岳啟翦賁之崇基汾水遂荒導沈渾之遠派其後金行云季貴種言還行者制禮樂於土中處者保邱園於淮左世濟之德鄉人所宗故今為廬江人也曾祖廬江令祖洪州長史皆有廉讓之風純粹之行得祿於仕不累於高考吳尚書左司郎中贈太府卿負適用之才獲愛人之譽應星辰而列位道邁朝倫視河海以命官禮優贈典君則府卿之第三子也門風漸教天質孕和翼翼服勤真保家之主愔愔若訥多長者之言墨妙筆精固禀於性奕思琴德咸是所長幼有令聞獲鍾慈愛及加冠之嵗以門子敘資漢室孝廉方從令史晉時英俊更屈下僚晨昏之養有歸州縣之勞靡憚乾貞二年自黃州司馬遷洪州都督府別駕治中懋績屏星煥其增華公府見知佩刀由其受賜俄拜尚書度支員外再遷虞部郎中皆判吏部兵部事夫當官匪懈伏閤之勤也照奸得情坐曹之能也前史所韙君皆則焉頃之以親累解官君雅好元言夙尚閑適由是角巾私第閉關却埽交游罕得見其面窮達不以介其懷用晦而明居貞以利高皇帝受禪之始牽復疏恩拜工部郎中轉禮部郎中寓直中書省豫聞機密彤庭宏敞禁垣清切絲綸之出堯言於是惟行樞機之微省樹由其勿洩方將振鱗溟渤驤首雲霓而生也有涯仁而不壽昇元六年夏六月二十有六日卒於建康翔鸞里之官舍享年五十有一嗚呼哀哉惟君孝於事親悌於承長和以接上廉以在公胥吏臣僕靡不被仁恕之惠家人妻子未嘗見喜慍之容學古觀書如恐弗及䘏舊敬老周知其疲三德聿修五福斯闕即世之日遺愛存焉卜遠不從旅殯京邑後四嵗春二月五日嗣子延紹延貞等始備大葬之禮窆於江都縣某鄉里從先卿府君大塋與夫人李氏合祔焉禮也鉉以世親之舊承子妻之知怨明德之不常痛祖行之斯在退食自公薄送於畿刊樂石以爰紀庶令名之不虧嗚呼哀哉其銘曰汾川溶溶淮源渢渢興我宗兮世濟其美家餘其慶生我公兮靖恭正直言行名迹存南宮兮與義相扶知命不憂永考終兮邗城之右蜀岡之陽馬鬣封兮道不虛行有令之子遵遺風兮君諱宣輔字仲申其先天水人也累世從官不常厥居曾祖全真工部員外郎滕州刺史祖倚太子校書考台歙州海寧令君即海寧府君第三子也生於廣陵長於江左幼而俊敏博綜㣥書尢善名法之學烈祖輔政方申明紀律君以是中選釋褐補江都府文學直刑部明年改信州司法參軍察獄詳刑號為祥練久之召赴闕以本官權參元帥府法曹事踰年改大理評事元宗嗣服之初精心庶獄權要舉不附已者因中傷之君坐黜為饒州司士參軍明年王師伐閩護軍查君表君才可煩使以本官判軍司事時頓兵深入自冬涉秋經朿馬懸車之塗督飛芻輓粟之役事集師克君有力焉師還加朝散大夫行常州義興令推誠率下民用協和丁憂去職復為江州錄事參軍時連帥議浚湓浦以屯舟師詔從之君以無益戎備而勞民力乃指陳利害抗疏極論上甚嘉之即命止役由是遷大理司直通判蘄州軍州事明年遷檢校水部員外郎充建州觀察推官通判軍府事會越人闚邊使間誘建民將以為亂君廉得其實盡按誅之優詔裦美賜衣一襲遷檢校屯田員外郎三年徵拜守水部員外郎判度支時師旅薦興軍食不給命君為松江催運使軺傳所至轉輸如流朝議以姑孰居畿甸之間實供億之始徙君為當塗令踰月復徵為主客員外郎判大理寺賜紫金魚袋始君以理官得罪至是上知其無私故復任焉守官循理挺然中立轉工部員外郎仍判寺事今上嗣位上疏論時政以為刺史縣令親民之先而考績掄才未盡其理上深然之遷朝議大夫戶部員外充宣歙常潤等道安撫使以刺舉無避為權臣所排宸鑒昭明故得無咎使還以本官判兵部事廬陵㣥盜充斥州兵不能制上憂之亟命君為奉化軍節度判官判吉州事轉主客郎中擒姦摘伏克舉其職其年秋九月七日遇暴疾翌日終於郡之官舍享年六十有一明年春二月歸葬江寧府某所禮也夫人查氏吉王府長史昌之女工部尚書文徽之妹婉嬺之德閨房之秀內助著美士林所推子七人長曰鈞袁州新喻尉次曰錯樞密院承旨次曰鍾舉進士次曰銓前國子監三禮次曰金匽鉞金奥皆國子監生女一人適祕書省正字周希定君有孝弟之性聞於宗族敦然諾之信稱於友朋守已有常事君不諂位未達而知足祿雖優而彌貧其當官持事也必盡已所長不為利回不為威惕故屢失大臣意然好直之士亦以此多之鉉多塵近職熟君操行直筆聳善以告後人故銘其墓曰英英趙君松茂蘭薰應用以法飾身以文道直詞正心平氣純如何不淑今也為塵金陵仙鄉古多名人歸骨於是與善為鄰泉臺不曉壟樹空春勒銘挂劍慷慨霑巾公諱熙載字叔言其先南陽人傳稱武王之穆詩美韓侯受命晉以六卿升降漢以三傑重輕至東晉末征西從事延之以忠義之節踐艱屯之運避亂遠徙遂家昌黎餘慶流光最為繁衍曾祖均太僕卿祖殷侍御史考光嗣祕書少監淄青觀察支使故又為齊人公秉夙成之智負不羈之才文高學深角立傑出年始弱冠游於洛陽聲名藹然一舉擢第同光之亂藩郡崩離公以國難方興家艱仍搆瞻烏擇木杖策渡江烈祖孝高皇帝納麓在辰側席時彥得公甚喜賓禮有加於時有吳肇基庶事草創公以俊邁之氣高視名流既絳灌之徒弗容亦季孟之間不處以校書郎釋褐出為滁和常三州從事公亦怡然不以屑意詠風月游山水而已中興受命上嗣撫軍以公有七子之才膺四友之拜徵為祕書郎掌東宮文翰元宗深器之及踐位以為虞部員外郎史館修撰賜緋又以大禮繁謺加太常博士時有司議孝高廟宜稱宗司門郎中蕭君儼上疏論之公與給事中江公文蔚協同其議凡書疏論難皆成於公手由是廟號尊諡定於一言君子以為真博士也頃之以本官權知制誥初公但以文章際會未嘗與政及其當維新之運感知己之恩未及聽政章疏相屬或駮正失禮或指摘時病由是大為權要所嫉竟罷其職丞相宋公朝之元老勢逼地高公又廷奏黨與詞旨深切天子優容之而用事者滋怒旋貶和州司士參軍數年移宣州節度推官徵還復為虞部員外郎遷郎中史館修撰賜紫俄而拜中書舍人從時望也公雖才識優贍而質性疎散凡在位者道復不同於是深居移病罕與朝謁時兵興之後國用不充公援古酌今請以錢為幣時獻計者甚眾元宗獨以公議為長即拜戶部侍郎充鑄錢使今上踐位改吏部侍郎兼修國史初鑄錢之作也自宰執而下相與沮之故百司不供久未能就上為之曉譬事理親加督責而公猶不勝其忿嘗因對見聲色俱厲因徙為祕書監不踰年復拜吏部侍郎新錢既行大濟經費詔賜錢二百萬拜兵部尚書充勤政殿學士承旨公少而放曠不拘小節及年位俱高彌自縱逸擁妓女奏清商士無賢愚皆得接待職務既簡稱疾不朝家人之節頗成寬易雖名重於世人亦訝其太過上不得已左遷太子右庶子分司南都於是謝遣伎樂單車首路留之未幾復為兵部尚書學士如故是時嵗比旱歉主上憂勤公復論刑政之源明防救之術又上格言五篇手詔嘉納即拜中書侍郎充光政殿學士承旨初上選近侍數臣直宿禁中常御光政殿召對夜分乃罷故命公此職以寵異之霖雨之望方深鐘漏之期遽逼春秋六十有九庚午嵗秋七月二十七日沒於京鳳臺里之官舍上省奏震悼為之涕流有司奏當輟朝三日手批天不憖遺碎我瑚璉辭章乍覽痛切孤心嗟乎抗直之言而今而後迨不得其過半聞聽者乎可別輟朝一日贈右僕射平章事仍官給葬事士庶聞之知與不知莫不為之悲嘆有司考行易名曰文靖即以其年九月某日葬於某所禮也夫人隴西郡君李氏生簪纓之族有桃李之芳內則有光夜川先逝繼室北海縣君蔣氏長子疇為奉禮郎早卒次子伉為校書郎聰慧夙成無忝世德次曰佩曰份曰儼曰侹曰儔曰俛女四人或作儷公族或為尼出家嗚呼哀哉公之為人也美秀而文中立不倚率性而動不虞悔吝聞善若驚不屑毀譽提獎後進為之聲名片言可稱躬自諷誦再典嵗舉取實去華故其門人多至清列屢從譴逐殆乎委頓俯視權幸終不降心見理尢速言事無避凡章疏焚藳之外尚盈編軸焉審音妙舞能書善畫風流儒雅遠近式瞻向使檢以法度加以慎重則古之賢相無以過也俸祿既厚賞賜常優忘懷取適不事生計身歿之日四壁蕭然衣衾槥櫝皆從恩賜詔集賢院編其遺文藏之祕閣凡所開卷可知也鉉與公鄉里遼敻年輩相懸一言道合傾葢如舊綢繆臺閣契濶江湖區區之心困而獲雪一生一死何痛如之援毫反袂識彼陵谷其銘曰猗嗟韓公有蔚其文俊才絕俗逸氣淩雲高名直道玉振蘭薰猗嗟韓公天賦忠規君臣之際言行俱危其身可辱其節寧虧猗嗟韓公屈亦能伸松寒益茂玉焚始真乃感明主乃為大臣送往事居不緇不磷嗚乎韓公胡為而然閟此相印歸於夜泉茂陵遺簡京兆新阡斯文不朽此別終天哀哉郢匠已矣牙絃勒銘圓石永識桑田士有放懷夷曠介然中立外物無累於心沒齒不違於道吾友喬公嘗從事於斯矣公諱匡舜字亞元廣陵高郵人也曾祖譚祖泰皆不仕考鴻漸本縣尉家世清操州閭稱之故其子孫必有興者公少好學善屬文弱冠游京都詞藻典麗容止都雅烈祖輔政見而器之補祕書省正字丞相宋楚公初獲進用位望日崇聞君之名辟置門下每為文賦詩詠輒加稱賞由是名譽日洽而卿士大夫皆前席待之累遷大理評事司直監察御史屯田員外郎從宋公出藩為江西浙西掌書記府公告老歸九華山公乃升朝為駕部員外郎未幾守本官知制誥就遷祠部郎中中書舍人典掌樞機周慎靜默凡十餘年值邊境俶擾師出無功詔旨親征中外憂懼公上疏極諫坐沮撓軍勢黜居臨川頃之宋公獲譴又以故吏為累由是累年沈廢今上即位徵為水部員外郎改司農少卿判太常寺轉殿中監修國史拜給事中權知貢舉又兼獻納使遷刑部侍郎公自徵還數年間連歷清望蓋舊齒直道上簡聖心至是以老病不堪朝謁聞上知其家貧詔以貳卿之秩養疾壬戌嵗九月二十有三日卒於京師濱江里官舍享年七十有五遺命以周易孝經置棺中太常考行易名曰貞即以其年冬十月二十有三日葬於江寧縣某所禮也夫人太原縣君郭氏代公元孫晉陵令喻之女也餘慶所備門風甚高婦德母儀聞於宗族一子僧孺祕書省正字早卒孫諝亦為正字公之為人寬簡真率常以詩酒自適不以勢利縈心毀譽讒慝之詞聞之晏如也從事楚公府殆二十年凡為府公見知者皆詭譎傾側公獨淡然無營守正不諂故但以文藝知賞未嘗任用烈祖下詔公卿舉可以親民者楚公所薦非其人烈祖甚不悅謂給事中常公夢錫曰吾望其薦匡舜也常公及中書侍郎韓公熙載嫉楚公如讐而與公善嘗相謂曰宋公悞識亞元正可怪也公以歷任奉法循理似不能言者及其臨危擊節抗詞忤旨侃侃有古人之風黜官奪祿甘貧守約凡五年不形於言危恂恂然道家之流也故能享老壽保康寧歸全委順斯可貴矣公臨終數日舍弟往候之怡然言曰吾往矣君兄弟可各為一詩哭我翌日復告門生曰吾已得徐公兄弟許我詩餘無事矣其忘懷死生也如此嗚乎絮酒之禮已隔平生挂劍之信永天壤故以二章為誌閟於九原所撰集七十餘卷編紀之任屬於門人此不備書也公諱德成字仲德其先潁川人也帝媯餘烈侯滿崇封盛德之祀綿邈於百世光遠之慶蕃衍於萬國故我洪冑代雄建安王室中微閩方角立網羅英異宏濟艱難我曾祖茂新祖滔皆以雄才勇畧奮揚忠力將領之任生表其策勳督護之名沒垂於飾壤父誨檢校太尉兼侍中建州刺史忠義軍節度使諡忠烈殊勳大節有信史豐碑存焉公即忠烈公之長子也鍾粹和之氣秉沖淡之心通習韜鈐固其家法酷好墳典乃自天資就傅之年已著名譽先公剖符劍浦威信洽聞諍子之助實有其力弱冠為本郡裨將先公以身守邊郡心存本朝累表遣公入宿衞即擢拜右千牛衞將軍充殿直指揮使恭命畏法修身擇交先公每言邊事常密疏於紙遣公上啟默識強記敷奏閑習元宗甚嘉之累遷右靜江指揮使值淮上兵起王師不振公屢上書自奮詔隸西北面行營以舟師濟難破其屯戌遂入海陵與諸軍會勵兵固守強敵日益公連戰破之虜獲千計圍兵既遁乃涉長淮指下蔡別率戰艦分擊浮橋三中流矢神色自若自秋徂冬且戰且前凡五進軍壘皆以眾寡不敵之勢當輕悍卒至之師臨難忘身每戰必捷而元戎逗撓逆臣攜叛㣥帥失道公全軍而還遷右宣威軍廂虞候制曰獨此一軍之眾堪為百戰之師其見稱如此數月為和州刺史又為左天威軍廂虞候明年改池州刺史是時疆場甫定閭井未完公奉法循理正身率下庭無滯訟吏不生奸鐵軸牙檣無忘水犀之備輕裘緩帶常為峴首之游賦詩紀頌粲然可述元宗南狩從至石牌上每登臨置酒必命公陪侍訪山川之形勢問風俗之美惡應對詳敏咸有條貫捧觴上壽進退由儀求解印扈蹕優旨不許今上嗣服屢表乞還徵為右天德軍都虞候舊制常以舟師為下軍至是詔旨以南國之用尚於舟楫今而後知非是乃簡練精銳置龍翔軍以隸親衞命公為龍翔都虞候舟師之重自茲始也會先君來朝臥疾邸第公親侍醫藥躬執煩辱容貌瘠損衣不解帶客至問疾者不知其已貴也及丁憂制哀毀過禮扶護靈柩歸於建安詔起為歙州刺史本州團練使視事三載其理如初秩滿復為右龍翔諸軍都虞候遷都指揮使每仲秋講武訓兵仲冬而畢進退號令由公指顧威容嚴整覩者肅然頃之又為虔州巡檢使知州事五嶺之際地廣民悍內據谿洞外接蠻夷告訐兊攵襄攵習以為俗於是申以刑政示以嚴明廣視聽審情偽吏以微文出入者皆面詰其狀莫不惕息而退弊為之革人以之和於是浚溝隍嚴壁壘出私帑以助費因農隙以僝功書勞考績此其昭昭者也尋拜池州觀察使以其秩居虔州上以建安之地人思舊德且欲以晝錦之盛顯公之能乃除忠義軍節度使建州觀察處置等使留後公以違奉嵗久無以私為抗表來朝固辭不拜改右威衞大將軍充左右靜江都軍使又轉光祿大夫檢校太尉奉以建州之祿嵗計千萬甲第廄馬賜與優渥俄而被疾自識終期申告理命備有規度中使問疾但曰世受主恩未有以報唯此為恨耳又親問門吏草遺奏既成自益兩句曰苟游岱之有知必結草以為報上省表震悼手詔答之公猶捧詔向闕稽首流涕壬申嵗秋七月十有二日卒於建業濱江里之官舍春秋四十上痛惜之至再不視朝贈安南大都護遣中使監護葬事皆從官給有司考行易名曰烈即以其年九月日葬於某所從理命也夫人信都郡君刁氏故昭武軍節度使能之女容德之美閨房之秀宜家睦族光此門風子倩孝弟聰慧修詞好學以蔭起家授著作佐郎必大之慶其在於是嗚乎哀哉公生於戎馬之際長承鐘鼎之業修文習武全孝資忠風格端莊襟懷夷直嫉惡獎善如恐不及睦親念舊無有所遺先人之費公私畢給出入數載家為之貧在公之餘手不釋卷篇詠詞筆皆傳於時近代儒學將唯公而已凡四理藩郡皆有借留去思之美民到於今稱之由是恩顧特隆委遇無間修塗方騁天年不登知與不知皆為悲歎鉉與公非故特以道義相期雖復出處不齊班序致隔金蘭之分終始不渝寢門流慟痛生死之永已圓石表墓患陵谷之靡常亦公之遺言以此見託豈非慷慨之氣思振發於知己哉故為銘曰龍泉之靈武夷之英生我儒將垂茲令名臨戎有勇察俗有聲為臣之節與世作型位逼建牙秩參掌武才實膺時忠惟得主鬱此雄圖溘然中露謂天蓋高不可以愬悲哉俊氣永已荒邱鳳臺遺館梅嶺窮秋樹惟挂劍地即眠牛餘芳不泯淮水長流公諱延祿字世功其先上黨人昔者楚多淫刑賁始逃難晉賴謀主苗受其封高門之慶雄視欒郤綿綿瓜瓞翼翼孫謀存諸簡編可以揚搉延洪於我七代祖中書舍人延嗣光大於我六代祖太師晉卿源流繁衍蔚為甲族中朝喪亂後裔播遷匿迹淮楚之間今為盱眙人也先公諱鄰生於兵戈之間長習旗鼓之用遭遇英主建功立事出為泗州防禦使入為靜江軍統軍世卿之祀衰而復振公即靜江之長子也弱不好弄壯而有立負雄勇之量不以驕人秉剛直之資未嘗忤物持重善戰默識寡言時輩推之以為君子初先公奉王畧領偏師南破山越西定江楚東絕滄海北捍徐戎弓不解弮兵不匣刃公年甫弱冠實參其間搴旗斬將所向披靡宣力用於君父舒壯氣於風雲然而職以序遷蓋歸美於先公也烈祖孝高皇帝中興大業疇咨舊人命公領泗上精兵入為宣威軍裨將六卿之選以翼京師八屯之權實資宿衞歷紀受任一心靡渝今上祇嗣鴻圖益宣朝寄揔千牛之士以為心膂假五教之秩以崇班列會侍中燕王以帝子之重兼鎮兩藩詳求命卿以事大國俾公提步卒屯宣城凡甲兵壁壘之事皆聽於公夙夜惟勤燥溼生疾春秋六十一保大九年十月七日卒於宣州公署上省奏傷悼為之罷朝送終之禮有以加等即以其年十二月二十七日葬於江寧府縣里禮也夫人王氏淮南裨將唐之長女也先公負游俠之氣有征討之功勇冠三軍力制奔虎夫人麗桃李之質襲蘭蕙之芳婦禮聿修遺訓無墜君子以孝慈率教夫人以嚴正克家閨門之理實有內助以保大八年五月一日先公而逝今始祔焉子全厚全瞻全節全義全海皆有父風苗氏為不朽也鉉本自世親早為姻族歎侯封於李廣發哀詞於杜篤刻翠炎於荒阡擬高陵於深谷其銘曰才之俊兮將之雄位之侯兮壽未中天難諶兮人云亡川既逝兮嵗將窮素車兮丹旐白草兮青松悲雄心與壯氣漸荊棘兮蒙朧昔者鄭都涕產知懷仁之有誠孔門慟淵見福善之無驗遺恨千古可勝言乎君諱詠字義修其先延陵人漢大鴻臚咸之後也曾祖章祖岌皆眷戀本土卒於縣寮考洎遇故侍中寶之亂乃去仕唐吉州長史入吳終和州歷陽令政有遺愛故家焉今為歷陽人也君幼而岐嶷長而學問孝敬自律名利弗嬰安貧怡然綽有餘裕順義末丁先府君憂泣血絕漿杖而後起朝廷獎勸善政砥礪淳風即起君為歷陽主簿秩未滿移知含山縣令先是兵興之後循吏用稀君簡法紓刑約廉敦信縣無逋事吏不能欺莅官七考清嘯而已選授知虔州雩都令西楚之地南際殊鄰本之以蠻蜑之風因之以兊攵襄攵之眾長鯨之戮雖久碩鼠之刺猶繁君下車考政經察人病矯異俗均地征常為諸邑之最吏民上書借替期求真命者無虛嵗矣而懋賞弗臻成功輒去解印之日單車即塗君素多疾至是增劇以己亥嵗秋九月十九日終於歷陽馴翟里之私第享年四十有一以其年冬十一月六日葬於本縣本鄉許思里祔先君長史之塋禮也君前娶潁川陳氏後娶樂安花氏皆良家之子淑德不爽二子曰德容德鈞二女皆佩觽丱角之嵗君天資貞吉立性和雅尊敬師友敦睦親姻移之於官故所至皆理而位不參於朝籍年不登於下壽能無遺恨乎鉉兄弟少孤長於舅氏親承撫䘏勉以進修門構不傾君之力也嗚乎渭陽之贈已矣寧追西州之歎哀哉何極故拂貞珉紀述遺德庶深谷以徙遷見清芬之未泯夫資忠全孝含貞履潔君子所以沒身而守之聖人所以屈已而申之其道可傳其風可仰嗚乎劉君其殆庶乎君諱鄗字巨源其先彭城人徙居廣陵重世矣曾祖永澧州司戶參軍祖審不仕考王褱檢校戶部尚書贈右僕射君生而岐嶷有異常童五嵗而孤即稟至性年在幼學卓然老成初先君仕吳實幹近職而太夫人王氏與貞穆皇后復有姻舊故宣帝命君使事丹陽公府公龍飛以君為殿前承旨便蕃左右靖恭夙夜動必稱職人無間言二十年間累遷檢校禮部尚書充崇賢殿使及軍府代謝眾或將迎君侃然正色有死無二游說之詞不能入權利之勢不能動於是閹豎希旨以飛語中之坐除名流池陽郡明年有唐受禪烈祖嘉君盡忠亟召之還除常州長史悉還其官階田宅未幾又改和州長史聽歸廣陵舊居初元宗方在膠庠吳帝使君召拜郎中賜以章綬自爾至於為相每朝謁必先見君而後入及元宗即位召至京師復命太夫人入禁中如貞穆之時謂曰吾受吳朝恩禮不敢忘也今猶數夢讓皇帝執臣子之禮吾觀當時近臣唯夫人兒為長者帝意親之今復得在吾左右良足慰也君聞之遂稱足疾不任趨拜上仍賜第以居之嵗時賜賚甚厚時使親近諭旨竟不能移上乃加太夫人封邑召君受命於朝固辭以疾上歎息曰此子至孝今以其母故召之不來是必然也此亦古人所難吾何為奪其節耶久之以君為常州團練判官不使之任優其祿而已今上嗣位加檢校右僕射君家承鐘鼎之富少居綺紈之職時逢革故年甫壯室而遂閉門却掃高謝人間孜孜色養怡怡自得姻族以之肅穆士友以之景仰名節終始清風邈然丙寅嵗夏六月某日終於建安某坊之私第春秋五十有九初君葬太夫人於茅山良常洞之西因自卜塋地即以其年月日葬焉禮也前夫人張氏早亡今夫人吳氏實有萊妻之賢能從伯鸞之操天資玉映令問蘭薰子昭嗣女某等善慶所鍾家聲不隕愛敬哀慼在禮無違嗚乎令人其必有後鉉家世通舊復連懿親常以君抗節遺世既近代之孤標而元宗推誠聳善又列辟之難事足以激揚薄俗垂示將來乃為銘曰忠於事君孝於養親逢時有道以義衞身隱不絕俗居能保真我永終吉誰為古人地肺之原小茅之麓左盼崇岡右瞻柳谷欒棘新吹松楸再卜令問昭顯流光似續刻此苕華永芳蘭菊君諱某字某其先京兆人也因官徙牒遂居建康曾祖知章無祿早世祖某官考某官君幼而勤學長而力行孝悌著於家庭信義行於州里弱冠明經擢第釋褐太子校書千里之行時輩推許會上國喪亂遂南奔豫章連帥鍾公見而悅之辟為從事豫章府變始歸建康井邑更移親舊泯沒君慨然悲世難之未己感宦路之多艱於是抗志衡門息機世表樂山水寡言語極談不過經籍之事足迹不游卿相之門篤好六經嵗誦再遍雖憂慘疾病未嘗廢也孜孜焉修善如不及恂恂焉與人無間言保大丙寅夏四月日考終命臨終訓勵諸子備有嚴誡如魏顆之命無莊舄之吟春秋六十有九夫人徐氏通儒書有婦德先君而逝即以其年月日合葬於某所禮也子崇禮崇粲舉進士崇簡明法及第為舒州司法參軍秀茂之業聞於場中咸以為印氏之門其後必大諸子以我宗之自出故銘撰是求銘曰於惟穆氏代有君子恂恂若人亦既克似退不邱壑進不朝市體道居貞全高沒齒俊造之學施於後嗣昭昭令名與石無已君諱諤字直臣丹陽延陵人也粵我長源發於夏后分封受代著於會稽司農而後代有賢哲轉徙旁郡遂家延陵種德流光世為大姓曾祖章丹陽令祖岌潤州錄事參軍考洎和州歷陽令業官之美播於氓頌公以廣明庚子嵗生於丹陽長於戎馬之間遂好金鼓之政氣質慷慨而孝於事親材用敏幹而慎於畏法命不我與事多無成高皇帝兼總六師以輔王室署君牙門右職將進用之君以歷陽府君喜懼之年辭歸就養因隸歷陽軍中自是服勤祇役多在外郡家貧援寡仕不求聞三十餘年有勞無過養心知命以保遐齡交泰元年春二月日卒於鄱陽舟中春秋七十有九夫人危氏故賀州刺史諱德卿之女也婦道以順家政以嚴內慎有光六姻是則子三人曰會宗曰穎曰銳皆敬述先志勤修令名號奉靈輀俯就成制即以其年月日葬於江寧縣某里禮也鉉感深自出名謝貴甥載悲渭陽之詩永痛西州之墅敬書遺懿以鏤貞珉其銘曰猗歟府君世載其聞有道無命與俗同㣥代耕得祿全和保真享壽八十下從先人乃整歸艎秦淮之濱乃卜元宅句金之陵不可不識封邱勒銘悠悠餘慶永永芳塵
