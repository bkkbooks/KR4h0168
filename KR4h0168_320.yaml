front:
  text: 全唐文欽定全唐文卷三百二十李華七
  hash: sha256:bd7918fa672cd93f1f2bb5b8f75e855b8b99a3215dd7e798b328fe118f38f4a9
body:
  text: 百億三昧無非度門於覺照中而得自在過去大士時惟左溪傅氏之子法號元朗字惠明其先北地泥陽人漢魏大族隨晉南度家於義烏今為東陽義烏人也自江夏太守極梁居士翕賢達相承世謂居士為諸佛化身杳不可測左溪即居士六代孫梵行之門宜生上德母葛氏夢天降靈瑞而娠左溪心靜體安及於乳育生九年矣辭家入道兼綜㣥言曰此法門之畎澮也如意年中剃度隸義烏清泰寺尋光州岸律師受具戒就會稽印宗禪師商律部重山深林怖畏之地獨處巖穴凡三十年宴居左溪因以為號每言泉石可以洗昏蒙雲松可以遺身世吾以此始亦以此終於所居之方建立精舍約而不陋跪懺其間如來諸大弟子皆菩薩僧大迦葉之頭陀舍利佛之智慧羅喉羅之密行須菩提之解空由此四者皆最上乘同趣異名分流合體舍利佛先佛滅度佛以心法付大迦葉此後相承凡二十九世至梁魏間有菩薩僧菩提達摩禪師傳楞伽法八世至東京聖善寺宏正禪師今北宗是也又達摩六世至大通禪師大通又授大智禪師降及長安山北寺融禪師蓋北宗之一源也又達摩五世至璨禪師璨又授能禪師今南宗是也又達摩四世至信禪師信又授融禪師住牛頭山今徑山禪師承其後也至梁陳間有慧文禪師學龍樹法授惠思大師南嶽祖師是也思傳智者大師天台法門是也智者傳灌頂大師灌頂傳縉雲威大師縉雲傳東陽威大師左溪是也又宏景禪師得天台法居荊州當陽傳真禪師俗謂蘭若和尚是也左溪所傳止觀為本祇樹園內常聞此經然燈佛前無有少法因字以詮義因義以明理因理以同如定慧雙修空有皆捨此其略也菩薩或以性海度或以普門化香象至底彌樓最高其餘幽贊不知充滿法界夫知上法易行上法難修上法易證上法難明謂左溪為有則實無所行謂左溪為無則妙有常住視聽之表巍巍左溪因恭禪師重研心法唯十八種物行頭陀教厥後奉東陽威大師得最上乘詮第一義現聲聞像宏大覺心大無可名也偏袒跪膝奉觀音上聖願生兜率天親近彌勒殫罄衣鉢嚴具尊儀焚香稽首則舍利降靈光發寺非正陽屋宇凋落殿移則像毀財匱則力艱左溪錫杖指揮工人聽命如從舊貫儼若天成心不離定中口不嘗藥味耄期之歲同於壯齡告門人曰吾六印道圓萬行無礙戒為心本汝等師之天寶十三載九月十六日就滅春秋八十二僧夏六十一四輩號慟如慕如疑香花幢幡雷動山谷鄉人或夢左溪居寶閣第四重者寤告其鄰與之夢協兜率天者第四天也願力所屆廣度人天既荼毗已門人分舍利起塔於左溪之西源遵相法也城邑之人願獲親近分半舍利起塔於州之東原申永慕也左溪僻在深山衣弊食絶布紙而衣掬泉而齊如繒纊之溫均滑甘之飽誦經則翔禽下聽洗鉢則騰猿跪捧宴坐一室如法界之樂蕭然一院等他方之遊或問曰萬行皆空云何苦行對曰本無苦樂妄習為因衆生妄除我苦隨盡又問曰山水自利如聚落何對曰名香挺根於海岸如來成道於雪山未聞籠中比大遼廓至若旱蛙躍流瞽犬能視雷雲興而獵者捨弓矢鱗介絶而漁者壞梁舉其倬然曷可殫載弟子衢州龍邱九嵓寺僧道賓越州法華寺僧法源僧神雍本州靈隱寺僧元淨棲嵓寺僧法開蘇州報恩寺僧道尊皆菩薩僧開左溪之祕藏常州福業寺僧守真杭州靈曜寺僧法澄靈隱寺僧法真明州天寶寺僧道源淨安寺僧惠從本州開元寺僧清辨純得醍醐飽左溪之道味入室弟子本州開元寺僧行宣常州妙樂寺僧湛然見如來性專左溪之法門新羅僧法融理應英純理應歸國化行東表宏左溪之妙願菩薩戒弟子傅禮王光福等菩薩惠芽霑左溪之一雨清辨禪師等荷擔遺烈見請斯文銘曰磁石湊金澄流見月法與心起緣隨定設衆生未度我為舟筏將如趙代豈望荊越趨道云何知之在行殈煩惱歸寂滅城不住之住無生之生兜率天樂徘徊下迎潺湲左溪東入蒼海青松白日人亡地在四輩盡哀時乎不待頌德空嶺劫塵無改東南苾芻之上首曰長老雲公報年若干僧夏若干永泰二年某月日涅槃於潤州丹徒天鄉寺人天痛慕江海寂寥御史中丞韋公元輔頃臨潤州嘗申跪禮無何韋公兼觀察領浙西按部至京江來修謁問長老曰如來遺教付囑仁賢貧道有檀像一龕敬以相奉意深言簡聞者淒然韋公致別之明日長老繩牀跏趺無病而滅嗚呼至矣哉昔支遁與謝公為山水之遊竺法師與王度為生死之約古今同道如見其人長老每言曰得天師於牧馬求善法於鬻香不可不敬樂羊以食子見疑苾芻以草繫成忍不可不仁智瑤死於大縣頂生退於釋宮不可不廉留侯先期而黃石悅元謀懇乞而觀音降不可不信學此四者以為教端內訓緇褐外化㣥品其餘觸類而長道遍恆沙長老法號法雲獲度於神龍之歲俗姓申氏其先魏都之望出於姜姓左右宣王詩所謂惟嶽降神者也曾祖寧皇朝考功員外郎祖靖睦州遂昌縣令父儉不仕以復楚之忠烈相韓之勳伐蓄靈韜曜鍾美後人長老童丱入道誦法華經景龍歲受具於本州龍興寺元昶律師由是萬計俱圓名冠同列與鶴林絢律師偕往嵩潁求法於大照和尚以心眼視徹見無邊界果在掌中隨心舒卷喻菴羅熟終當自知此其端也道其兼愛故無棄物有志於道來問長老曰飲甘露者當淨其身有涉道未宏來問長老曰菩提為寶耶無知無德涅槃為空耶常樂我淨由是江表禪教有大照之宗焉至若願力所宏莊嚴佛教像飾同日月之照供盡人天之福積若山川流於他方凡聖去來緇素皆以天鄉為中路之化城也夫三界為牢鬼神同死使桎梏輪轉無解脫時佛性在煩惱之中佛身即衆生之體大法平等無所不同雪山滿月是為真語同音半字寧為妄說如來毫相始於東土菩薩求法遍在西方慈悲之間固非一致若乃昆明劫灰夏時同學化人來周穆之歲恆星隕魯莊之年甘泉金人之祀伊蒲浮圖之說謂之為妄則常情不測謂之為實則迂濶難明立定哀之時書隱桓時事憑魯史之文猶未之詳況乎視聽之外出乎名言之域固宜然也國史傍録往往合符者則宣尼稱西方有聖元老云吾師竺乾厥後感夢孝明漸於中國楚王英尢敦此道常奉縑贖罪詔曰王誦黃老之微言尚浮圖之仁祠潔齊三月與神而為誓其還縑以助伊蒲塞桑門之盛饌浮圖仁祠即塔廟也潔齊為誓即禮懺也伊蒲塞則優婆塞也至魏受禪洛陽宮中有浮圖毀除之沙門以佛舍利擲水生光由是移於車道廣開禪室僧會揚化於三吳惠持演教於三蜀震曜聾瞽無代無之法壞也因蓋吳同亂之積其後也賴曇休堅持之誓自菩提達摩降及大照禪師七葉相乘謂之七祖心法傳示為最上乘南方以殺害為事北方多豪右犯法故大通在北能公在南至慈救愍曲無不至其餘則澄公威神止石羯之虐惠始定力悛赫連之暴淨檢尼部之初曇柯律藏之始道安垂範羅什銓譯惠遠道生闡教於匡廬杯渡寶志著異於江浙公之慈靈鎮攝智者之遵揚真極法膺昏季在壞尋舉起稠公之衣而定興廢驗仲尼之記而崇建立我唐撫運同符聖覺中州徼外大智如林元奘無畏繼興夷夏不可悉數舉甚殊尢長老既滅門人僧某等戒還本源智人無學以某月十六日遷定於鶴林寺西江湖晦冥道路悽慟初吏部侍郎齊浣採訪江東見天鄉殿宇傾圯孰尸完葺乃請禪師與絢公當謂寺僧乾最得堅固力求真實智乾元初奏請天下一十五寺長講戒律天鄉即其一焉爾後率同心願善繕理禮部員外郎崔令欽常為丹徒宗仰不怠無何吳越震擾緇侶竄伏長老挺身於戈劍之間宴坐於虎狼之口大浸不溺大火不焚天鄉獲全長老之力也韋中丞以句容令田少文悅長老之風宏無生教故托句容護辦葬事刺史韋公損奉善逝甚深之旨行菩薩廣大之慈大理司直兼丹徒令史坦性淨道周如潤州長老之兄弟之子曰堂構為當代詞人修在家梵行與門人俾華贊德於萬斯年其文曰至哉元德高標法流法而不著行而不求輪王自在象寶調柔黑夜生月驚波起州洲淪大浸日落中夜方外常在人間代謝性不遷易法無高下億萬人天從吾受化從受化已委順知時諸佛如是我今得之清江朗月古本仁祠以我道法為人導師菩薩調伏身心具一切智調伏心者為定慧調伏身者為律儀假煩惱而後有身心有身心而後開知見權衡並用何莫由之如來於鹿野苑中為位具法輪始開此法持律第一有優波離如來謂戒為性源因定見性定為慧本因慧得常不依科教無所成實乃宣告四輩攝護身心命以優波長老集毗尼藏以優波無緣此土摩訶迦葉啓迪當來而付囑之與禪同祖者數世去聖滋遠枝剖條分今學者所宗四分為盛此間有數息諸觀以攝亂意是蓋禪那之濫觴也夫沙門奉律猶世間行禮若備中和易直之心而無升降周旋之節於義為非為義非為半人恭惟世間皆歸佛性體無分別俱會一乘勝妙法蠡爰傾海水明徹寶器方貯醍醐禪律二門如左右翼和尚執持戒律兼修定慧恩制落染為人式瞻六十年矣和尚法號懷仁其人也惟天寶十載十月十四日晨起盥潄繩牀跏趺心奉西方既曛就滅於龍興寺春秋八十三僧夏六十緇素弟子北拒泗沂南踰嶺徼望哭者千族會葬者萬人其上首曰越州開元寺僧曇一福州開元寺僧宣一常州興寧寺僧義宣杭州談山寺僧惠鸞東京敬愛寺僧璿光潤州栖霞寺僧法瑜僧乾印潤州天鄉寺僧法雲揚州崇福寺僧明幽延光寺僧靈一龍興寺僧惠遠等天下甘露正味調柔人中象王利根成熟音樂樹下長流福慧之泉雪山峯頂仰見清涼之日金剛決定煩惱無餘優曇開敷香潔盈滿罔不成實樂說辨才得法華三昧衆所知識物之依怙法施之恩重㣥居之感深哀奉色身經始靈塔於某原像教也幽公自幼及衰所親侍靜言元梵俯托斯文試言之曰先陀婆者分於一名摩醯目者夾於三點衆法歸善㣥緣體無道豈遠人宏之在我外離諸相猶行邪道內度四生方為靈覺至若調牛良田唯待天雨渡䭾巨海荷護持囊喻夫靈藥毒草同在林中甘泉淤泥共生地下疇能了達惟我宗師和尚太原郭氏厥後遷於淮左孩抱之歲誓齒道門親慈所鍾志不可奪因瑤臺成律師受具戒律文有往哲所疑時賢或誤一言曲分於象表精理自得於環中聲振京師如晞日月諸寺固請綱領乃默而東歸即還揚都俯允㣥願常誦金剛般若波羅密經如意輪陀羅尼般若佛心我得此心衆生亦如謂天台止觀是一切經義東山法門是一切佛乘色空兩亡定慧雙照不可得而稱也寒不加服暑不攝齊食不求飽居不易坐四方施捨歸於大衆一身有無均於最下朝廷之士銜命往復路出惟揚終歲百數不踐門閾以為大羞仰承一盻如洗饑渴和尚與人子言依於孝與人臣言依於忠與上人言依於敬佛教儒行合而為一慮學者流誤故親教經論延來者聽受故大起僧坊將警㣥迷故廣圖菩薩因地善護諸命故曲濟衆生壽量以文字度人故工於翰墨法皆佛法兼採儒流以我慢為防故自負衣鉢以規範為任故綱正緇林以發揮道宗故上紆睿禮以感慕遺迹故不遠他邦以龍象參議故再至京國以軌度端明故研精律部黃門侍郎盧藏用才高名重罕有推挹一見和尚慕味循環不能離坐退而歎曰宇宙之內信有當人黃門於院內置經藏嚴以香燈天地無疆象法常在太子太保陸象先吏部尚書畢構少府監陸餘慶吏部尚書崔日用祕書監賀知章禮部尚書裴寬中書侍郎嚴挺之河南尹崔希逸太尉房琯中書侍郎平章事崔渙禮部尚書李澄詞人汜水尉王昌齡等所共瞻奉願同灑掃建塔之地廣狹如素高卑得中周臨四衢平覩千里門人環蒔列柏薦以名香空曠寂寥以哀以慰夫子門人輕重諸侯之國如來子弟皆為釋梵之師敬悅其風以偈銘曰佛境無二佛心皆一隨其根源乃起禪律持戒外獎觀空內謐是藏私耶衆僧祕密昏醉億萬求醒者稀如來戒定與爾為歸性空因戒垢重初微彼上人者深乎道機真空不生妙果無得開明戒定洗去怨賊衣染波利鼻聞薝蔔白日正圓如何昏黑昏黑既已四輩號咷不見金櫬空圖白毫月明江濶木落山高逈野孤塔㣥心鬱陶訓迪真子森然朗達阿難苾芻迦葉菩薩仙髮承足諸天奉鉢智火遽然獨留緇褐月苦淮甸風悲楚川千株茂樹百道春泉佛日長晦浮圖巋然哀哀龍象大庇㣥緣道行無迹妙極無象謂體性空而本源清淨謂諸見滅而覺照圓明我天人師示第一義師無可說之法義為不二之門其定也風輪駐機其慧也日宮開照其用也春泉利物三者備體誰後誰先入無量而不動開法華而涌出湛兮以有無觀聽而莫測寥焉以遠近思維而不窮智德皆空為真實際大悲恆寂遍撫㣥迷月入百川之中佛匝千花之上修而證者元同妙有應而起者旁作化身先大師適來此土化身歟適去他方補處歟不可得而知也自如來現滅四魔橫恣人天無怙寄命崩崖勝大敵者那羅延身銷大毒者伽陀妙藥拔陷扶墜而生大師大師延陵馬氏諱元素字道清崇高紹興於法位胄緒不繫於人間慈母方娠厭患葷肉長至之日誕彌仁尊生有異祥乳育安靜既齓稽首父母求歸法門即日獲請出依精舍如意年中剃度隸江寧長壽寺既進具已戒光還照定水澄源鵝王之不受泥塵香象之頓除羇鎖未之比也身長七尺體無凡骨睂毛際臉口若方丹目不顧盻聲侔扣王入南牛頭山事威大師撞鐘大鳴入海同味迦葉以頭陀第一大師亦斗藪塵勞聞一知十未嘗請益觀法無本觀心不生喻金剛之最堅比獅子之無畏圓月照海高深盡明慧風吹雲宇宙皆淨威大師摩頂謂曰東南正法待汝興行命於別位開導來學於是騶虞馴擾表仁之至也衆禽獻果明化之均也接足右繞百千人俱大師悉以菩薩呼之教習大乘戒妄調伏自性還源無漸而可隨無頓而可入摩尼照物一切如之吾常默默無法可說或有信願雙極懇求心要於我渴仰施汝醍醐問禪定耶吾無修問智慧耶吾無得道惟心證不在言通懷帝釋輪終為世論自淨而已無求色聲既悟者小無微塵大無三界當悟者內珠雖隱猶作來因藥草萬殊根莖等潤貌和言寡饑至飽歸或有聞尊稱而遷善現色身而獨得我無示念一作爾念道溥慈圓食不問鹹酸口不言寒暑身同池水飽蚊蚋之饑渴道離人我順衆生之往來貴賤怨親是法平等故饋甘味而不辭同於糗糒奉上服而不拒齊於弊褐俾夫家有道侶府無爭人開元中本寺僧法密請至京口潤州刺史韋銑灑掃鶴林斯焉供養有屠者恣刃積骸如山聞大師尊名來仰真範忽自感悟懺伏求哀大師受之又白言和尚大悲當應我供大師衲衣跏趺未嘗出戶公侯稽首不為動搖至是如其懇求欣然降詣夫盜隱其罪虎慈其子仁與不仁皆同佛性無生無滅無去無來今濁流一澄清水立現諸佛所度我亦度之天寶中揚州僧希元密請至廣陵便風馳帆白光引棹楚人相慶佛日度江梁宋齊魯傾都來會津塞途盈人無立位解衣投施積若邱陵皆委於所在行無住捨禮部尚書李澄時為楊州牧齊心跪謁為衆唱首望慈月者誰不清涼傳百億明燈照四維上下塵沙之數皆超佛乘二州以貪法之心移牒踰月均吾喜捨成爾堅牢無非道場還至本處天寶十一載十一月十一日中夜坐滅嗚呼菩提位中六十一夏父母之生八十五年赴哀位者可思量否至有浮江而奠望寺而哭十里花雨四天香雲幢幡蓋網光蔽日月以其月二十一日四衆等號捧金身建塔於黃鶴山西原像法也州伯邑宰執喪師之禮率衆申哀江湖震悼曩於寺內移居高松互偃涅槃之夕椅桐雙枯虎狼哀號聲破山谷人祗慘慟天地晦冥及發引登原風雨如掃慈烏覆野靈鶴徊翔有情無情德至皆感初達摩祖師傳法三世至信大師信門人達者曰融大師居牛頭山得自然智慧信大師就而證之且曰七佛教戒諸三昧門語有差別義無差別㣥生根器各各不同唯最上乘攝而歸一涼風既至百實皆成汝能總持吾亦隨喜由是無上覺路分為此宗融大師講法則金蓮冬敷頓錫而靈泉滿溢東夷西域得神足者赴會聽焉融授巖大師巖授方大師方授持大師持授威大師凡七世矣真乘妙緣靈祥嘉應僉具傳録布於人世門人法鏡吳中上首是也門人法欽徑山長老是也觀音普門文殊佛性惟二菩薩重光道源門人法勵法海親奉微言感延霜露繕崇龕座開構軒楹時惟海公求報師訓廬孔氏之墓起淨明之塔世異人同泫然長慕僧慧端等蔭旃檀樹皆得身香菩薩戒弟子故吏部侍郎齊浣故刑部尚書張均故江東採訪使潤州刺史劉日正故廣州都督梁升卿故採訪使潤州刺史徐嶠故採訪使常州刺史劉同升故潤州刺史韋昭理故給事中韓延賞故御史中丞李丹故涇陽縣令萬齊融禮部員外郎崔令欽道流人望莫盛於此弟子嘗聞道於徑山猶樂正子春之於夫子也洗心瞻仰天漢彌高鏡公門人悟甚深者大理評事楊詣過去聖賢諸功德藏志之所至無不聞知魯史從告況乎傳信其文曰濁金清鏡在爾銷鍊磨之瑩之功至乃現膏潰炷然光明外遍陽升律應草木皆變啓迪瘖瞽惟吾大師息言成教捨法興悲辰極不動風波自移境因心寂道與人隨杳然元默湛入無為性本非垢云何淨除身心宴寂大拯淪胥內光無盡萬境同如甘露正味琉璃妙器遍施大千無同無異度未度者化周緣備道樹忽枯涅槃時至我無生滅隨世因緣吉祥殿上應化諸天寂寂靈塔滔滔逝川恆沙劫壞智月常圓維唐天寶十二載九月二十九日魯山令河南元公終於陸渾草堂春秋五十九服名節者無不痛心嗚呼堂內有篇簡巾褐枕履琴杖簞瓢而已堂下有接賓之位孤甥受學之室過是而往無以送終名高之士陸渾尉梁園喬潭賻以清白之俸遂其喪葬以明月十二日窆於所居南岡禮也公諱德秀字紫芝延州使君之子後魏七葉易為元公其裔也世有明哲承而述之幼挺全德長為律度神體和氣貌融視色知教不言而信大易之易簡黃老之清淨惟公備焉延州即世之後昆弟凋落慈親羸老無小無大仰飴於公及應府貢如京師不忍離親躬負安輿往復千里以才行第一進士登科丁艱聲動於心既過苴枲刺血畫佛像寫經以不資之身申罔極之報食無鹽酪居無爪翦者三年先人未祔於兆身迫當室緘未忘之哀參調求仕銓試超等補南和尉黜陟使以至行上聞授左龍武軍録事因墜傷足樂正之憂愀然滿容以甥姪婚仕為念授署魯山令以痼疾不能趨拜故後長吏僉以客禮待之常獲盜未刑屬濱山之鄉稱猛獸為害盜請於庭曰感明府慈仁願殺獸贖罪公哀而許焉僚佐堅請公無變慮乃從破械縱之盜果尸獸復命吏人老幼咨嗟震勤發於庭宇播於四鄰則政化之行可知也公自幼居貧纍服齊斬故不及親在而娶既孤之後單獨終身人或以絶後諭焉對曰兄有息男不曠先人之祀矣歷官俸祿悉以經營葬祭衣食孤遺代下之日柴車而返南遊陸渾考一畝之宅發八笥之直唯匹帛焉居無扃鑰牆藩之禁達生齊物從其所好時屬歉歲涉旬無烟彈琴讀書不改其樂好事者攜酒食以饋之陶陶然脫遺身世涵泳道德拔清塵而棲皓氣中古以降公無比焉知我或希晦而不耀故也是宜為國老更論道佐世而羔雁不至歿於空山可勝慟耶所著文章根元極則道演寄情性則于蒍于思善人則禮咏多能而深則廣吳公子觀樂曠達而妙則現題窮於性命則蹇士賦可謂與古同轍自為名家者也又其惡萬金之藏鄙十卿之祿富貴之辨吾得其真至哉元公越軼古今沖邃冥冥純朗朴渾範於生靈凡與門人吟慕遺風諡曰文行先生從古也夫誄德銘功厥義有三上以簡神明中以鋪光烈下以聳示後人斯文之作由此志也其銘曰天地元醇降為仁人隱耀韜精凝和葆神道心元微消息詘伸載襲先猷竭盡報親貞玉白華不緇不磷縱翰祥風蛻迹泥塵今則已矣及吾無身仰德如在瞻賢靡因懷哉永思泣涕銘云
