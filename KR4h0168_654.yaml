front:
  text: 全唐文欽定全唐文卷六百五十四元稹八
  hash: sha256:6a4d2a12c959e061075dc9c26d2f3ed11b580e5679fb55276659d37f4c365cbc
body:
  text: 按沙門釋惠皎自狀其事云永福寺一名孤山寺在杭州錢塘湖心孤山上石壁法華經在寺之中始以元和十二年嚴休復為刺史時惠皎萌厥心卒以長慶四年白居易為刺史時成厥事上下其石六尺有五寸短長其石五十七尺有六寸座周於下蓋周於上堂周於石砌周於堂凡買工鑿經六萬九千二百有五十錢十經之數經既訖又成二石為二碑其一碑凡輸錢於經者由十而上皆得名於碑其輸錢之貴者若杭州刺史吏部郎中嚴休復中書舍人杭州刺史白居易刑部郎中湖州刺史崔元亮刑部郎中睦州刺史韋文悟處州刺史韋行立衢州刺史張聿御史中丞蘇州刺史李諒御史大夫越州刺史元稹右司郎中處州刺史陳岵九刺史之外搢紳之由杭者若宣慰使庫部郎中知制誥賈餗以降鮮不附於經石之列必以輸錢先後為次第不以貴賤老幼多少為先後其一碑僧之徒思得聲名人文其事以自廣豫始以長慶二年相先帝無狀譴於同州明年徙會稽路出於杭杭民競相觀睹刺史白怪問之皆曰非欲觀宰相蓋欲觀曩所聞之元白耳由是僧之徒誤以豫為名聲人相與日夜攻刺史白乞豫文豫觀僧之徒所以經於石文於碑蓋欲相與為不朽計且欲自大其本術今夫碑既文經既石而又九諸侯相率貢錢於所事由近而言亦可謂來異宗而成不朽矣由遠而言則不知幾萬千歲而外地與天相軋陰與陽相蕩火與風相射名與形相滅則四海九州皆大空中一微塵耳又安知其朽與不朽哉然而羊叔子識枯樹中舊環張僧繇世世為畫師歷陽之氣至今為城郭狗一叱而異世卒不可化鍛之子學數息則易成此又性與物一相遊而終不能兩相忘矣又安知夫六萬九千之文刻石永永因衆性合成獨不能為千萬劫含藏之不朽耶由是思之則僧之徒得計矣至於佛書之妙奧僧當為豫言豫不當為僧言况斯文止於紀石刻故不及講貫其義云長慶四年四月十一日浙江東道都團練觀察處置等使通議大夫使持節都督越州諸軍事越州刺史兼御史大夫上柱國賜紫金魚袋元稹記舊制學士無得以承旨為名者應對顧問參會旅次班第以官為上下憲宗章武孝皇帝以永貞元年即大位始命鄭公絪為承旨學士位在諸學士上居在東第一閣乘輿奉郊廟輒得乘廄馬自浴殿由內朝以從揭雞竿布大澤則升丹鳳之西南隅外賓客進見於麟德則止直禁中以俟大禮大誥令大廢置丞相之密畫內外之密奏上之所甚注意者莫不專受專對他人無得而參非自異也法不當言用是十七年間由鄭至杜十一人而九參大政其不至者衛公詔及門而返事適然也至於張則弄相印以俟其病間者久之卒不興命也已若此則安可以昧陋不肖之稹繼居九丞相二名卿之後乎俯仰瞻睹如遭大賓每自誨其心曰以若之不俊不明而又使欲惡欹曲攻於內且決事於冥冥之中無暴揚報效之慮遂忿行私易也然而陰潛之神必有記善惡之餘者以君父之遇若如是而猶舉枉措直可乎哉使若之心忽而為他人盡數若之所為而終不自愧斯可矣昔魯共王餘畫先賢於屋壁以自警臨我以十一賢之名氏豈直自警哉由是謹述其遷授書於座隅長慶元年八月十日記歲太和己酉修桐柏觀訖事道士徐靈府以其狀乞文於余曰有葛氏子昔仙於吳乃觀桐柏以神其居葛氏既去復荒於墟墟有犯者神猶禍諸實唐睿祖悼民之愚乃詔郡縣厲其封隅環四十里無得樵蘇復觀桐柏用承厥初俾司馬氏宅時靈都馬亦勤止率合其徒兵執鋸鋁獨持斧鈇手締上清實勞我軀稜稜巨幢粲粲流珠萬五千言體三其書置之妙臺以永厥圖不及百年忽焉而蕪蕪久將壞壞其反乎神啓密命命友余徐徐實何力敢告俸餘侯用俞止俾來不虛曾未訖歲奐乎于于乃殿乃閣以廪以廚始自礎棟周於墁圬事有終始侯其識歟余觀舊志極其邱區我識全圮孰煩錙銖克合徐志馮陳協夫陛下以元年正月壬戌詔臣稹曰朕有臣宏正自魏入鎮魏人思之因守臣訴狀其德政乞文於碑爾司豫言其文以付臣拜稽首退而奏書於陛下曰始安祿山以元宗四十三年盜幽州兵劫擊郡縣踰關據京天下掉撓肅宗征之海內甫定而夾河五十餘州或服或叛更立迭奪廢置征伐朝覲賦入之宜皆自為意五紀四宗容受隱忍田承嗣始有魏博相衛貝澶之地承嗣卒以其地傳兄子悅悅傳緒緒傳季安既而季安悍誕淫驕風勃蠱蠧發則喜殺左右漸及於骨肉往往顧妻子曰安用此由是內外惴悸妻元氏因人不忍移置他所餘一月乃卒是歲先皇帝元和之七年八月也季安子懷諫始十餘歲衆襲故態名為副大使而家臣蔣士則逆虐用事士衆不分服日夜相告曰田中丞興博大孝敬於軍謹廉讀儒家書好言君臣事儻可依倚為將帥乎聞者皆踴躍一朝牙旗下一作丁衆來捧附興仆地不肯起衆亦不肯去乃大言曰爾輩即欲用吾語能不殺副大使且許吾取天子恩澤洗汝痕穢使千萬衆知君臣父子之道從我乎皆曰諾遂殺蔣士則等十數人以興知留後事移懷諫於外明年歸之朝蓋七年之十月四日也興乃圖六州之地域籍其人與三軍之生齒自軍司馬己下至於郡邑吏之廢置盡獻於先帝先帝詔興以工部尚書長魏博相衛貝澶之地仍敕司封郎中知制誥裴度使於興且以錢一百五十萬緡賜其軍曲赦管內使百姓一年勿復事問耆羸賑乏困褒殛誅之不以法者魏之人相喜曰歸天子乃如是耶興又悉取魏之僭服異器人臣所不當為者斥去之先帝曰興吾六州善心者田興也使興宏吾至正不亦可乎因名曰宏正先是魏諸賓猶僕役也將卒無畏避宏正始求副節度以下於朝至則迎迓承奉雖功勳將莫不乘者避謁者趨付授咨度始用賓禮先是諸將之外有權者莫不拘劫妻子以為固四方之來聘問者莫不防礙出入以為密士吏工賈限其往來人多懼愁稀復會聚至是皆曠然矣魏之人又相喜曰人之生不當如是耶滑以水害聞於朝請移河於衛之四十里且役衛工三萬餘詔宏正議之皆曰壞吾地役吾人以利他邑古無有也宏正曰魏於滑信彼此矣朝廷何異焉不時興工以教人讓魏俗丕變先帝多之以右僕射就加焉十三年又加司空以子布之會蔡有勞也是歲李師道燒河陰驚洛邑陰通元濟詔宏正誅之明年破賊五萬於東阿進收鄆之陽谷距其城四十里營焉二月壬戌劉悟斬師道加司徒平章事復歸於魏其年八月朝京師先帝待之有加焉乞留不獲詔加侍中以遣之又明年陛下以成德喪師詔宏正入焉初王武俊以戰朱滔功得有趙地傳子孫凡三十九年矣至承宗為盧從史李師道所詿誤先皇帝征而赦之者再憂畏戚恧不克來覲既而聞陛下天覆海深悉包悉受乃果自信將朝有時未行會病將沒以志付其弟承元聽命於朝陛下語宰相曰宏正在魏吾何患焉即日內出五詔詔宏正為中書令節度於鎮且詔父子皆為帥以大其威十一月甲寅成德獻狀曰宏正自去魏魏人哭之鎮人歌之奉宣詔條除去僭異猶魏政也且臣聞之德之至者有二政之大者有三三政一曰仁為惠政二曰法為善政三曰謙為和政二德一曰忠為令德二曰孝為吉德今宏正獻魏博六州之地平淄青四代之寇入鎮冀不測之泉可以為忠矣祖考食宗廟父子分土疆兄弟羅軒冕可以為孝矣始初山東鍵閉束縛泳而遊之歌而舞之可以為仁矣始初山東逼越廢怠裁而制之舉而用之可以為法矣始初山東傲狠侵取地德以讓之功以助之可以為謙矣謙法仁孝資之以忠不曰德政謂之何哉臣請奉制以一百九十二字付守臣訴銘之石用申約束銘曰帝命宏正豫言是聽理亂有數其道甚明亂則隱約理由亂生既理復亂生於玩輕唐受天命海內承平高祖太宗不荒不寧元宗抑厄其否乃革四十三年奄有丕宅始視燕寇胡雛弄兒雖我寵重彼將胡為所細所忽忽焉而罹四后垂顧山東不夷逮我聖父殷憂儉克乘其淫驕乃伐乃殛爾視㣥孽胡為而亡僭久而大頑昏暴狂爾亦自視胡為而昌憂畏逼側永思悠長曩爾之無今爾之有既克而有在克而守惟爾惟我而今而後爾雖穹崇無忘辱詬我雖平寧無忘燕寇銘之戒之以永聲臭豫稚男荊母曰安氏字仙嬪卒於江陵之金隈鄉莊敬坊沙橋外二里嫗樂之地焉始辛卯歲豫友致用憫豫愁為豫卜姓而授之四年矣供侍吾賓友主視吾巾櫛無違命近歲嬰疾秋方綿痼適豫與信友約浙行不敢私廢及還果不克見大都女子由人者也雖妻人之家常自不得舒釋况不得為人之妻者則又閨袵不得專妬於其夫使令不得專命於其下外已子不得以尊卑長幼之序加於人疑似逼側以居其身其常也况豫貧性復事外不甚知其家之無苟視其頭面無蓬垢語言不以飢寒告斯己矣今視其篋笥無盈丈之帛無成襲之衣無帛裏之衾豫雖貧不使其若是可也彼不言而豫不察耳以至於其生也不足如此而其死也大哀哉稚子荊方四歲望其能念母亦何時幸而立則不能使不知其卒葬故為志且銘銘曰復土之骨歸天之魂亦既墓矣又何為文且曰有子異日庸知其無求墓之哀焉豫讀詩至杜子美而知古人之才有所總萃焉始堯舜時君臣以賡歌相和是後詩人繼作歷夏殷周千餘年仲尼緝拾選練取其干預教化之尤者三百篇其餘無聞焉騷人作而怨憤之態繁然猶去風雅日近尚相比擬秦漢以還採詩之官既廢天下俗謠民謳歌頌諷賦曲度嬉戲之詞亦隨時間作逮至漢武賦柏梁詩而七言之體具蘇子卿李少卿之徒尤工為五言雖句讀文律各異雅鄭之音亦雜而詞意簡遠指事言情自非有為而為則文不妄作建安之後天下文士遭罹兵戰曹氏父子鞍馬間為文往往橫槊賦詩故其遒文壯節抑揚怨哀悲離之作尤極於古晉世風概稍存宋齊之間教失根本士以簡慢歙習舒徐相尚文章以風容色澤放曠精清為高蓋吟寫性靈流連光景之文也意義格力無取焉陵遲至於梁陳淫艷刻飾佻巧小碎之詞劇又宋齊之所不取也唐興學官大振歷世之文能者互出而又沈宋之流研練精切穩順聲勢謂之為律詩由是而後文體之變極焉然而好古者遺近務華者去實效齊梁則不逮於晉魏工樂府則力屈於五言律切則骨格不存間暇則纖穠莫備至於子美蓋所謂上薄風騷下該沈宋言奪蘇李氣吞曹劉掩顏謝之孤高雜徐庾之流麗盡得古今之體勢而兼昔人之所獨專矣使仲尼考鍛其旨要尚不知貴其多乎哉苟以為能所不能無可無不可則詩人以來未有如子美者時山東人李白亦以奇文取稱時人謂之李杜子觀其壯浪縱恣擺去拘束模寫物象及樂府歌詩誠亦差肩於子美矣至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫棄凡近則李尚不能歷其藩翰况堂奧乎豫嘗欲條析其文體別相附與來者為之準特病懶未就適子美之孫嗣業啓子美之柩襄祔事於偃師途次於荊楚雅知豫愛言其大父之為文拜豫為志辭不可絶豫因係其官閥而銘其卒葬云係曰晉當陽成侯姓杜氏下十世而生依藝今家於鞏依藝生審言善詩官至膳部員外郎審言生間間生甫間為奉天令甫字子美天寶中獻三大禮賦明皇奇之命宰相試文文善授率府曹屬京師亂步謁行在拜左拾遺歲餘以直言失官出為華州司功尋遷京兆功曹劍南節度使嚴武手叐為工部員外參謀軍事旋又棄去扁舟下荊楚間竟以寓卒旋殯嶽陽享年五十九夫人宏農楊氏女父曰司農少卿怡四十九年而終嗣子曰宗武病不克葬歿命其子嗣業嗣業以家貧無以給喪收拾乞丐焦勞晝夜去子美歿後餘四十年然後卒先人之志亦足為難矣銘曰維元和之癸巳粵某月某日之佳辰合窆我杜子美於首陽之山前嗚呼千歲而下曰此文先生之古墳南陽王姓張氏諱奉國本名子良以某年月日薨於家其子岌哭於其黨曰唐制三品以上歿既葬碑於墓以文其行我父當得碑家且貧無以買其文卿大夫誰我肯哀者由是因其舅捧南陽王所受制誥凡八通歷抵卿大夫之為文者豫與焉豫故聞南陽王忠功每義之然其請明日子岌狀其故聞官閥以告曰我南陽西鄂人我高祖盈左武衛將軍間廄使我曾祖蘭朝散大夫沙州別駕我祖景春朝請大夫太僕少卿我父南陽王太僕府君之第某子也少學讀經史子至古今成敗之言尤所窮究遂貫穿於神樞鬼藏之間而盡得擒縱弛張之術矣大歷末始以戎服事郭汾陽於邠建中中以騎五百討希烈於蔡遭太夫人喪號呌請罷遂克終制僕射張建封以壽帥移於徐始以渦口三城授於我僕射歿而徐師亂子乘亂以自立王不忍討以師二萬歸於潤德宗異之詔召至京授侍御史復職於浙西就加御史中丞又加國子祭酒是元和之元年也二年李錡叛王擒之以獻加檢校工部尚書兼右金吾衛將軍御史大夫上柱國進封南陽郡王食實封一百五十戶遂錫嘉名尋遷檢校刑部尚書充振武麟勝等州節度營田觀察處置等使復以刑部尚書兼左金吾衛將軍御史大夫歷左龍武統軍鴻臚卿就加檢校兵部尚書轉左驍衛上將軍充大內皇城留守以疾薨壽八十三特詔贈某官我南陽郡夫人熊氏祖元皓皇朝禮部尚書左金吾衛將軍進國公岌與嵩南陽夫人之二子也嵩任某官岌以某官奪喪制葬以某年月日於某地岌不肖能言先將軍之職官而不能知先將軍之勳業矣乞為碑豫按僕射張建封以貞元十六年薨於徐徐人立其子愔求命南陽王不義其所為以渦之衆盡棄去由是泗濠之守皆據郡愔不能令卒帖徐由南陽王之斷其臂也元和之二年潤帥錡求覲京師既許之不克覲辱中貴人殺其臣寮以令下楊帥鍔以叛告朝廷甚憂之初錡管鹽於潤有年矣削虐暴狠其下甚畏之而庫庾之藏以億計潤之師故南韓晉公之所教訓弩徑劍利號為難當是時初定蜀兵始散物力未完加誅於錡甚難之憲宗皇帝不得已下誅詔不浹日露章自潤曰十月十二日錡就擒從亂者無遺餘問其狀則曰錡既叛以是月十一日命南陽王田少卿李奉仙率鋭衆以圖池南陽王喜養士又能為逆順言明日與二將誓所部回討錡城守不敢出環其城是夕攻愈急錡衆壞散縋於城下遂就擒自是南陽王勳名顯於代性卑順不伐在振武時以檢儉同士卒勞苦居餘官皆謹慎專至如不及在朝廷十餘年似無功能者未嘗圖進取薨之日家甚貧幾無以葬其身天子憐之廢視朝賻布帛給班劍鼓吹以葬之嗚呼舉三十年為言其間至將相者凡百數耳目相遠之後非其子孫能識其姓名者十不能一二焉若南陽王縛錡棄愔全徐完潤自取爵位以貽不朽無幾希矣碑於其墓不亦宜乎銘曰在昔徐帥知於南陽付授兵柄渦俾為防徐喪其帥徐人恃強強以愔嗣不歸其喪我欲盡殄愔亦與亡不忍自我焚其構堂我或不去愔童必猖猖甚則蹶其能久長乃挈萬衆賓於鄰疆愔果惴惴不假不狂逮及終歿全歸其吭潤錡待我不踰於行一日叛誕肆其昏荒我乃遽取歸之天王非不可殺示人不戕報愔以惠報錡以常稱示厚薄俾之相當克勇克義不伐不揚銘於墓石以永無疆天下萬族言多大冠冕人物者凡八姓薛其一也自晉安西將軍懿避寇汾陰後世子孫遂與裴氏柳氏為河東三著姓近世諸薛㣥從伯季死喪猶相功縗者數十人迭居中外要秩皆邠州刺史寶允之二世三世孫公諱戎字元夫父曰湖州長史贈刑部尚書同母曰贈某郡太夫人陸氏尚書景融女祖曰河南縣令贈給事中縑河南於邠州為季子刑部五男乂終郎丹終賓客擁終御史公實刑部府君第某子今尚書兵部侍郎集賢殿學士放於公為季弟公初不樂為吏徒以家世多貴富門戶當有持之者會兩弟相繼舉進士皆中選公自喜遂入陽羡山年四十餘不出李衡為刺史能以禮下公及衡觀察江西求公為幕中賓公許衡衡遷復為觀察使齊映乞自佐映卒河南觀察使李巽遽辟之未幾福建觀察使柳冕奏署書下詔公判冕觀察府中事纍遷殿中侍御史冕俾公攝行泉州刺史事時貞元中寵重方鎮方鎮喜自用不用朝廷法公在郡用朝廷法不用冕所自用者冕惡之先是宦者薛盈珍譖馬總為泉州別駕冕諭公陷總總無罪公不忍陷冕怒并囚之值冕病俱得脫公由總以義聞冕卒閻濟美代冕使福建復請公副團練事始受五品服濟美使浙東公亦隨副之轉侍御史給事中穆質有直氣愛公稱於朝因拜尚書刑部員外郎改河南令王師出征以中貴人護諸將州府吏迎迓館穀畏不及持畚劚於道路者相接唯公境內按故道途無所役且制闤闠無得授留守卒壞公制公命置諸獄留守怒遣將率徒略出之公不與卒致留守諸市人皆賴之遷衢州刺史到所部視前刺史所為皆便俗公欣然無所改不周月而政就移刺湖州其最患人者荻塘河水瀦淤逼塞不能負舟公濬之百餘里改刺常州不纍月遽刺越州仍以御史中丞觀察團練浙東西所部郡皆禁酒官自為壚以酒禁坐死者每歲不知數而産生祠祀之家受酒於官皆醨偽滓壞不宜復進於杯棬者公即日奏罷之舊制包橘之貢取於人未三貢鬻者罪且死公命市貢之鬻者無所禁旬月之內越俗無餘弊朝廷宜之積纍歲不遷長慶元年以疾自去九月庚申薨於蘇州之私第始生歲丁亥至是七十五年矣天子廢視朝使使者贈賵賻祭臨且以左散騎常侍追加焉十一月庚申洎夫人韋氏葬偃師河南府君之墓左公後娶李夫人亦又歿於天子曰沂始九歲洽次之有女四人皆及其嫁公始以隱者心為吏不尚約束不求名譽人人便安尤惡苛雜為郡時有善歸之所部縣為鎮時有善歸之所部郡是以在郡在鎮時無灼灼可驚者既去人思賦斂多饒裕人然而儉於用豫視其庫庾案牘盈羡無逋負豫在中書時公既歿浙東使上公所羡之財貫緡積帛之數凡三十有九萬則其去他郡也可知矣惜乎今之人揚善政者少公既不自稱人亦莫能盡知公之所以理至於脫馬總之禍抗居守之略弛酒禁市貢橘惠施於人而歿而盈羡皆豫之適知者非公之不能有以多於此也性誠厚溫重然而歡愛親戚及為大官遠近多歸之衣食婚嫁之外無餘財一旦盡所有分遺親戚曰吾病矣爾輩各為歸去資親戚故舊皆哭泣盡散去及公去越之日徒御不過數十人觀者嗟歎多出涕公為河南令余以御史理東臺自是熟公之所為又嘗與公季弟放為南北曹侍郎公歿矣非我傳信孰當傳焉銘曰婉婉邠州厥生九子子又生孫實大以祉祉延於公有浙之東仲氏臨汝季氏南宮門戶有赫有赫斯融我祿斯美我族斯豐朋舊親戚羇離困窮無遠無邇有來斯雍公之喪矣族亦瘁止分散舟車各自鄉里有今之季悲哀不已前年孟亡今年仲死撫視遺孤瞻望墳壘何以推之古今同此貽之斯文以永來祀歲長慶之癸卯五月日乙亥處士祿汾以豫友保極喪訃於豫且告保極遺意欲豫志卒葬子哭泣受妻子賓友弔又哭泣退敘事保極諱頗姓劉氏漢燕王子孫之在其國者皆稱昌平人後世有清夷軍使拯為清夷軍使時會侯希逸叛遼海側近軍郡守將皆棄走拯獨不棄軍軍亂害及拯朝廷忠之以平州刺史告其第平州生表裏表裏官至深州長史亦用忠戰死於軍長史生子騫子騫官至銀青光祿大夫唐州刺史與周增等謀潰李希烈覺皆殺之君實唐州之長子希烈不忍其幼養之麾下凡攻戰必攜去年十四五始讀書希烈死得脫舉進士文詠詞調有古時人氣候不肯學蹙蹙近一題者試一不中遂不復試復田於唐唐刺史願得君為壻君不願為刺史壻刺史怒暴租其田君乃大集里中諸老曰刺史謂田足以纍我耶由是火其居出契書投火中盡諸老田棄去汝上讀書賦詩厚自期待刺史陸長源器異之三十餘試授祕書省校書郎復以協律郎從事於鄜元和初高崇文方下蜀宰相杜黃裳以君為大理評事畫於君後為壽安主簿適烏重允以懷汝之師來伐蔡請君為監察御史判懷汝營田事尋改節度判官賜章服是時賊始盛陳許懷汝之衆怯怯未振舉都統韓宏在大梁君乃請於烏曰青陵故城地高要得之可以據賊矣公能使我於韓可以得烏使之韓一見奇之竟夕與語遂命陳許懷汝大梁之衆據青陵克寸日遂據之自是官軍乃大振凡烏之戰陳謀取案牘書奏之事皆咨之常為烏啓事京師憲宗皇帝語及陳法曰卿何以知戰對曰臣固淮西之戰者也讀書餘事耳遭太夫人喪服闋以從來所賦詩投宰相令狐楚楚屢吟賞於有文章者宰相段文昌在蜀時愛君之磊落善呼吸人遂相奏天子以君為殿中侍御史銀州長史知刺史事先時銀之長不命於朝數十年矣諸將攝理奪其馬牛夷人苦益復叛遠君始受命指贏輸之白四足者謂豫曰君為我識之此馬苟無死不復易矣至所治黨項諸羌來會聚君告以忠信廉儉皆出涕無敢違告者歲餘受代酋長拓手叐建宗等七百餘衆遮擁不欲去君馳去之建宗等稍稍隨至境果以贏輸之白四足者歸京師自外無餘畜及君之沒諸羌之長不絶聘尋授河西令侍中宏方在蒲得君喜甚因請自二朝廷以水部員外郎兼侍御史充河中節度副使又歲餘君所善元稹為宰相朝謂君曰君將展矣亟薦之稹竟不能用尋除萬州刺史病於汝竟以長慶三年某月日卒所寓年若干以某月日葬某所君五男二女李氏婦洎處子皆女也統明既明越明坎明聰明皆男也處士祿汾始終視其喪始君善交人凡氣志豪健尚功名者多師之投分誓且死為收長用慈儉閭里皆愛惜少為陸尚書長源李尚書元素鄭司徒餘慶杜司空黃裳所知㣥公更處重位君亦不能遂所欲烏之知且委也事以喪廢韓之器且薦也卒不獲用命也已豫為監察御史時始與君更相許與為將相豫果為相而不能毫髮加於君非命也豫罪也抑不能專善善惡惡之柄耶不然何二世死忠之家既生如是之傑而卒不能成就之嗚呼銘曰氣成鬱噎必為風雲有志不泄死當能神神固不昧故吾有云天子思我朋嫉我恩雖我悴戚心我不泯誓致堯舜封山侍巡慟告君墓報君知人唐盩厔縣尉諱某字某姓元氏於有魏昭成皇帝為十四世孫曾曰尚食奉御某祖曰綿州長史贈太子賓客某父曰都官郎中嶽州刺史某母曰某望閻夫人妻曰隴西李氏女子曰某曰某女曰某君始以蔭入仕四仕為盩厔尉丁太夫人憂遂不復仕享年五十五以疾歿於衢州元和十五年四月某日歸祔於咸陽縣之某鄉某里君少孤力學通五經書善鼓琴能為五言七言近體詩事親愈愈然終身不忘嬰兒之慕奉兄恭恭然若童子之愛敬臨弟姪妻子煦煦然窮年無慍厲居官以謹廉貞順而仁愛寮友之悍誕鄙異者遊於君則必怡然無自疑於我矣嗚呼總是數者非古之所謂淑人君子歟不壽不達命適然也是月二十一日猶子晦跪於豫曰某日孤子震襄祔事請銘於季父由是銘銘曰或仁而夭或鄙而壽天乎不識人乎安究我之北原五世其墓子子孫孫前後左右歿有令人乃克來祔斯焉克終亦又何疚公諱倰字德長以孝公為從祖父則其官族可知也沔弟濤官至大理少卿濤生儀甫官至大理丞贈刑部侍郎公即刑部之第某子母曰范陽盧氏贈本部太君公再娶前夫人滎陽鄭之尚女後夫人范陽盧國倚女封范陽郡君七女三男三女既嫁鄭出也兩男三女出於盧逞千牛乃明經迅挽郎公以長慶三年二月四日薨於洛陽時雍里壽至七十一年官至戶部尚書贈太子少保階至正議大夫勳至上柱國爵至安平縣開國男紫服金魚之賜其尚矣葬以其年十一月之某日於某地公始以太廟郎再任為東陽主簿刺史李衡一見自得衡遷湖南賓置之府罷授宣州録事參軍觀察使崔衍狀為南陵會南陵賦錢三萬稅輸之戶天地相遠不可等度由是歲纍逋負人被鞭迫而又屠牛鑄錢賊殺吏卒莫敢禁止者公始至怗怗然無約束適有屠牛鑄錢之徒敗覺者盡窟穴誅之㣥盜皆散走一旦命負擔者三四人悉以米鹽醯醬之具置於擔從十數輩直抵里中佛舍下因召集老艾十餘人與之坐遍謂里中賦輸之粗等者吾不復問貧富高下之大不相當亟言之不言罪且死不實罪亦死既言之皆筆於書然後取所負米鹽醯醬飽所從而去又一里亦如之不數十日盡得諸里所傳書因為戶輸之籍有自十萬錢而降於千百者有自千百錢而登於十萬者卒事懸於門莫敢隱匿者是歲前逋負盡入焉宣使駭異之當去復留者凡七載歙州闕刺史府中賓皆願去宣帥衍不遣去以公攝理之用能也纍遷京兆府司録拜侍御史轉膳部員外郎轉運判官會朝廷始置兩稅使俾之聽郡縣授公檢校膳部郎中襄州湖鄂之稅皆涖焉且主轉運留務於江陵公乃取一大吏劾其贓其餘眇小不法者牒按之所涖皆震竦歲餘計奏憲宗皇帝深嘉之面命金紫加檢校職方郎中移治留務於揚子仍兼淮浙宣建等兩稅使尋拜蘇州刺史遷湖南都團練觀察處置使兼御史中丞潭州刺史破壞豪黠除去冗費歲中廩藏皆羡溢憲宗驛召至京城擢拜戶部侍郎判度支不纍月會上新即位頓掌內外修奉景陵一日下詔移五鎮幽州鎮州賜錢皆億萬郊天地上徽名太和公主嫁可汗吐蕃請降使使者往返凡數輩幽州囚將帥鎮州殺將帥食餉半天下兵自七月至十二月一出於有司則其供辦之能可知也陛下特加工部尚書以償之會鳳翔闕節度宰相奏名皆不可上曰得之矣明日出白麻書以公為檢校禮部尚書兼鳳翔府尹御史大夫充鳳翔隴州節度觀察處置使先是岐吳諸山多椽櫟柱棟之材薪炭粟芻之數京師藉賴焉負氣勢者名為相市實出於官公則求者無所與由是負氣勢者相與皆怨恨又無可為毀乃揚言曰以崔之峭削廉隘好是非人士衆不願久為帥陛下一旦問宰相豫雖心知其不然然亦惑於衆口卒不能堅辨上意賴上仁聖不受讒乃以公為檢校禮部尚書河南尹是後岐下諸將比比有來者豫謂曰公於里閭間吾不復問矣軍怨乎吏怨乎何為謗皆曰舉其一二可知也凡軍之怨怨不均也先是岐之軍食於府者同一斛食於省者盈一一焉公乃歲以六十四萬斛就其盈由是言之怨乎哉吏之怨怨不厚也先是鄭少師得請於上吏之俸有加焉然而後鄭者輒以所加之俸管於庫其府吏以下未嘗獲一錢公乃悉出所餘命糾掾以下均取之仍著令曰自是加俸貯於克寸府賞信易取也人人皆便之言訖歎憤多出涕理河南不旬月家家自謂有崔尹卒吏無敢過其門識事者皆云五十年無是尹都者是歲七月抗疏云臣七十當致仕詞意不可遏朝廷嘉之拜戶部尚書以遂之近世未有心膽既強聲勢方穩而能自引去者明年春暴疾薨於家豫與公更相知善有年矣公之氣性剛方理家理身廉儉峻直頗有文章考公之所尚仁孝友愛內外死喪婚嫁之不能自持者莫不已任之嘗以戶部侍郎為其兄乞換一五品致仕官天子憐其意特以太子諭德與其兄至於親戚僚友間無所闕由是議論不能饒借所無者而所無者亦以是畏避之為理尚嚴明勤於舉察胥吏輩始皆難於公然而終卒無大過詞色朗厲若不可支梧然而下於已者能以理千之無不即時換已見此其所多也銘曰讋怯聲佞直持徑正根乎性抑厄病橫耉壽景盛由乎命我用其徑齒與位併銘於子孫用我為鏡
