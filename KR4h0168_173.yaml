front:
  text: 全唐文欽定全唐文卷一百七十三張鷟二
  hash: sha256:45787d1056c77f28fd37027cfc335b447d63010f934eeb63af1d8152351236a7
body:
  text: 兼弱攻昧武之善經在祀與戎國之大事皇天震怒發雷電以申威王者矜殘用干戈而肅令蠢茲日逐蕞爾天驕苞玉塞以疏江控金微而作鎮韋韝毳幕射多食鼠之夫羶肉酪漿俗負乘羊之化鴟梟萬路憑陵燕趙之郊狐兔千㣥撓亂並幽之地梁亶忝司金鼓謬掌銅符既典軍容兼知州務理須擊蛇作陳列鶚為軍驅貔貅而掃蚩尤縱熊羆而撲玁狁山陵向背握元女之靈符日月虛空操黃公之祕術豈得拙於對寇怯於用兵擁堅甲以自防坐重城而固守不存邀截故縱奔馳脫翔鳥於高林送遊魚於深水無心捉搦鴟挂網而還飛有意寬疏鼠入士冖柘而重出空執全城之語慮貽縱敵之辜宜據刑書準條科結還本邑以激勵庶望生徒進益國子監二條大學小學尊師而敬道上庠下庠欽賢而貴德稽山之竹資括羽以宣功崑岫之珍待琢磨而為器東序西序離經辨志之原小成大成溫故知新之學積川為海蛟龍魚鱉處其中積土為山鸞鸑鵷雛翔其上學而從政罔不由茲學古入官其來尚矣祗如每年貢舉先有成規登上科者高步於龍門落下第者退飛於鷁路蹶足之馬尚想造途失晨之雞猶思改旦庶使鴻飛海浦仍懷漸陸之期鶴唳霜皋尚有聞天之望豈得一回試落便棄前功善誘生徒卻將未可昔蘇秦十上豈曰無才主父八條何妨有用尹勤西塘教首北海儒宗應知三絶之勞頗識百篇之訓隨藍改質實藉招攜題竹書名良資教授寧有棄古人之糟粕頓被疏遺受新生之束修頻為改換所請無理狀涉有情未可舉科且宜從記劉仁範青襟胄子黃卷書生非應奉之五行異王充之一覽天下第一希聞胡廣之才日下無雙罕見黃童之譽春秋一月徒棄光陰文史三冬虛淹歲月有司試策無鼂錯之中科主者銓量落公孫之下第理合逡巡斂分退坐受銓豈得俯仰自強肆情撾鼓伏稱問頭付晚策自難周銓退者即恨獨遲簡得者不應偏早訴人之口皆有愛憎試官之情終無向背傲不可長驕不可盈若引窺覘之門恐開僥幸之路豸冠奏劾自合甘從馬喙無冤何煩苦訴宜從明典勿信遊辭沈沈少府掌其山海之資隱隱內藏職在王褱奇之貨瑁象牙之寶萬里雲奔珊瑚瑪瑙之珍三邦輻輳百萬錢之重寶實表貞廉二千石之崇班方求清素薛宣之才茂行潔乃應斯榮王觀之守法不移方堪斯任賀敬挈瓶小智荷蕢庸才謝楊阜之公清非孔融之朗悟秪如桃笙象簟擬進乘輿翠被鴛裯咸供御用豈得外為鼠盜內縱狼貪未聞匡鼎之賢已蹈敬聲之譴赤襟之席輒入私家文夾之襟擬移公室盜物數逾三十斷流遂越二千理合甘從仍懷苦訴款稱物雖部分未進御前執此曲途深乖直道但供玩好奏進奇珍監當各有司存擬進便為御物何必要須入內方可為偷法有正條理須明典傳國之寶有道必資式開瑞象之文秪啓象麟之享白玉為檢映犀鈕以分輝黃金為繩瑩龍縑而動色既施寶玉復假金銀封以青布之囊帶以采組之綬杜元一介庸瑣千載寒微馳策十年之門始豫九流之選理須恪勤匪懈守孫賀之曹夙夜在公奉常林之教豈得小心之譽未出於街庭大憝之蹤已流於臺寺創此六璽輒盜一枚遽殘螭角之輝翻作裊蹄之用方寸妙篆奄就爐銷五字靈文俄從灰壞量其犯狀罪不容誅語其刑名死有餘責既投無赦之律合處不敬之倫禹泣既不原辜湯祝如何免罪宜從絞坐以肅朝章而不許御史彈非時興造付法不伏將作監二條九卿分統漢朝開土木之官百工惟時周禮置梓材之職斧斤動役測之以寒暑版築興功揆之以日星以人從欲傾宮就而紂亡以欲從人露臺休而漢盛吳淳任居大匠職重繕工踐李固之前規躡曹褒之舊迹建都河洛起役伊瀍百堵所以雲興九仞由其嶽立畚簣魚貫強脊者使之負持鍬杵雁行長脛者令其踏鍤優旃欲漆之郭雖復難同張儀覆錦之城於焉易就九重之邑無勞走馬之形萬家之都自有臥龍之異理須候隙啓閉務在從時下不奪於三農上不虧於八部倉庚遷木殊非濬洫之辰戴勝降桑豈是營都之日寧有自求微效廣棄人功既廢春疇宜從霜典千八百國王者以列郡分州三十六所聖人有離宮別館鵲宇銜月共五柞而連陰龍臺造天將九華而接影三陽地鄰崿坂境帶嵩邱斜瞻玉女之祠近瞰傅公之井爰茲勝壤聿啓深宮取酸棗之前基探棠梨之舊制柳佺職惟經搆位掌欂櫨拱木僝於林衡全模授於梓匠鳳池青瑣參差雁齒之階鸞庭綺窗錯落魚鱗之屋璿題耀日聳瑁之金椽珠網懸星洞琉璃之寶閣似王彬之勤苦自覔封侯匪魏霸之憂人怡然受樂仲華省費之譽未展其能伯直士卒之先罕聞其效壯麗則論功極大勞役則死者還多勤勞補拙而有餘功過相除而不足人未疲而事就乍可論優人半斃而功成若為徵賞加階放選已自偏矜撾鼓自強何為淺見輒驚聖聽不得無辜法有正條理宜科結水衡列職池苑分曹既知遊觀之娛兼總鑄錢之府河堤謁者服彼賢冠都水使司佩其蒼王允釐舟楫肅掌陂池陳協之績既深王延之效斯重斗柄停午律中蕤賓葛亮涉瀘之時田文始生之日續命之縷漸染成風辟兵之繒因循不絶朱絲約粽變成南楚之宜紫艾禳災大啓中州之俗翦鸜鵒之舌必是能言收烏鵲之腦自然懷戀爰因此日競渡為歡蘭橈鳴鶴之舟桂棹晨鳧之舸鴨頭泛濫與青雀而爭飛鷁首參差共飛龍而競逐黃頭執棹疑素鯉之凌波白衣揚櫓類蒼烏之拂浪競渡所用輕利為工創修十隻之舟費直五千餘貫金舟不可以泛水玉楫不可以乘湍造數計則無多用錢如何太廣玩物喪志所寶惟賢豈將有限之財以供無益之費所請非急未可輒依水曰潤下火曰炎上順性則易從違方則難理祇如漢江已北伊瀍之南巖嶂崷崒以造天岡嶝崢嶸而括地層峯切漢飛鳥迷林絶壑窮山奔豹失路探深泉之月兔罕有其功捉高標之日烏未聞其可后稷之播殖九穀不能使苗稼冬生夏禹之引決百川不能使江河西注鄭國才非識古智未趨今乏袁敏之多能謝酈長之博覽進不量力退不省躬逆地勢而開山絶天真以決水區區淺見輒與造化爭功瑣瑣庸情擬共陰陽競氣銜枚塞海為蠢已深捧土填河在愚彌甚妄為勞役虛費人功既貪罔上之條合處欺天之罪審問情狀方可論科滔滔碧海萬穴於是朝宗隱隱黃樞百靈由其納款長城絶地高闕凌空包玉塞而為險控金微而作鎮龍荒景促則飛雪千里龜林沍寒則木皮三寸韋韝毳幕人傳食鼠之風羶肉酪漿俗染乘羊之化處狼居而跋扈臺號單于阻馬坂以挻祅地名光祿千里辮髮望夷邸而爭趨五月披裘瞻洛橋而下拜聖朝仁以接物德以和人矜其屬國之情待以蕃臣之禮李秀職編沙苑位綰牧司輒隱肥羊翻將瘦羜一羊供國罕見滋繁三百維㣥如何檢察羸肌薄毳供旦餼而難充瘠骨穿皮濟晨炊而無用主簿之號空覩其髯大夫之家獨留其舌遂使賢王結恨恥大國之風輕驕子相嫌鄙中州之禮簿憲司彈劾允合公條大理糾繩固難私縱銅澤應序玉律調年暢彼三微均茲四氣中和之職節初元於鳳笙司歷之班分上序於虬箭獻鳩發歲放雀名晨盤薦五辛家承百福磔雞牖上迎媚景以禳災懸羊戶間應和風而助氣椒花起頌餞故迎新柏葉傳杯迎暄送冷受茲勝景方申藉穡之儀敬以吉辰允迪燔柴之典劉璥識非經遠智謝鉤深蘊剃草之庸才懷守株之小見請禁屠於齋月望省料於郊天欲崇釋典希延慶祚但五帝三王之代內教猶潛二莊兩明以來真如始泛已前無佛不廢禋宗今日祭神如何減省重人賤畜先哲之格言敬地尊天明王之令典棄而用犬尚有前譏爾愛其羊能無後誚邪情既虧正道小惠終亂大謀並付所司各依前式伊洛瀍澗八溪九谷之津少室嵩高五嶽三塗之險召公相宅灼龜墨以定王畿光武建都因鳳集而成帝業濯龍芳苑寶蓋成陰走馬交衢金錢滿埒謻門曲榭從來別館之基壽安永寧舊是離宮之地眷茲穀水俯瞰神州斜連四會之郊迥控兩京之路都人接畛桑棗成林逆旅分區閭閻撲地雖其原是苑內不合輒許人居四邊皆有業恆百姓苦為吞併天田大小先有規模御圃短長非無制度文王百里之囿不以為多齊宣四十之園猶嫌太廣利民之於利國相去幾何施人之於奪人失之彌遠何惜數頃之地頓傷百姓之情如愚所裁宜依舊定八州浩蕩控丹水以疏津九嶺參差繞黃山而作固相如健筆高談上苑之芳子雲清詞盛述長楊之麗露寒鳷鵲之觀古迹似存宜春屬玉之軒餘基尚在儲胥枍詣便開御幸之塗清暑甘泉實曰微行之處探封巒於漢制侈未及奢獲林光於秦餘儉而不陋何必廣開禁籞虛費人功優旃發使鹿之譏張昭有射彪之諫大誇宮館外取笑於由余廣設繚垣內興嗟於貢禹楊嗣諂諛佞士輕簿邪人矜奔競之褊懷昧公方之大體奉聖君於堯舜善迹無聞陷人主於桓靈醜聲先著鎮之以靜則俗阜財殷撓之以煩則政荒人散不應言而上言法有正條不應為而有為刑茲罔赦宜從貶論以肅朝章清勤惟知內外糾察必望百司清肅內侍省二條在天懸象天垂宦者之星在地標儀地有閽人之職莫不謹房室審宮閭既隆內宰之班實掌中門之禁以其體非全氣性實專良中常侍啓之於前大長秋建之於後金璫銀璫之貴光輝紫庭左貂右貂之榮寵盈黃闥蒙天建職參永巷位典長門出入後庭馳驅臥內專謀靜慎比鄭衆之元勳勤心納忠方史遊之補益舉能不倦繆賢之績尤彰進善無私曹騰之譽斯足省司稽其楨幹兼以行能久參內侍之雄清肅外曹之職但逐鹿之犬必無捕豹之材擊雁之鷹豈有追鵬之力巷伯興刺周道所以淪胥閹豎弄權漢風由其大壞景監見任趙良寒心同子參車袁絲變色骨鯁之士足以糾正朝儀刑餘之人豈可參謀國事其言不次無理告知元淹佞幸居懷諂諛成性同豎刁之狡獪翻覆邦家類伊戾之猖狂動搖州郡回天轉日之勢况此猶輕城狐社鼠之威方斯未甚有恭石之巨蠧濫奉前規無管勃之奇功叨居近習往還三輔威福甚高去來兩京風霜極烈苞苴未入墜以黃泉之深賄賂潛通招以青雲之上鞭笞士子恥辱官寮犬羊披虎豹之毛燕雀假鳳凰之翼豈可濫班九掖點穢罘罳宜可投諸四荒以禦魑魅馳驛速發無俾少留各下所司即宜催遣觀龍演卦未聞記事之書學鳥為文始立載言之典平林鬼哭經籍所以鬱興中山兔悲翰墨由其駿發紀功紀過沮誦肇之於前繫月繫時遲任蹤之於後莫不懲惡勸善激濁揚清千載覩其昏明一字成其褎貶吉甫緹紬藏室握槧詞林遵直筆於南史跨高蹤於東觀理須抑揚訓誥斟酌典謨辨而不華質而不俚退而隱惡慕周舍之堅貞進不虛美追揚雄之故事何得文隨意曲筆逐情偏非左氏之三家有劉公之一弊密會王道之輩聞而不言潛濟生人之徒捨而不録阿附宰相貴虛飾以佞一時諂事明君尚虛名而誇六國貪述冠冕遺衛霍之元勳競敘婚姻忘良平之上策有青蚨之鏹則倍事抑揚乏黃鳥之金則輒加刪削就腐刑於漢室便作謗書求斛米於梁州輒成佳傳毀譽在已高下由心異班彪之正色乖董狐之直道有姦雄之性無良史之才徒紊國經宜從屏退著作之司藝文之府既藉賢良實資英俊自非干寶贍學無以措其鋒穎孫盛宏詞詎可塵其簡牘安期才無半古學未全今性無異於朽材文有同於敝帚畫虎為犬疏拙有餘刻鳳為鴟庸才何甚文詞蹇鈍理路乖疏終取笑於牛毛徒自矜於雞口崔彥位參藻鏡職掌權衡未分麟鹿之殊莫辨梟鸞之異投鼠尸於玉府有穢奇珍擲魚目於珠叢深輕寶物躄士之追蹇兔罕見成功盲人之配瞎驢自然俱敗選曹簡要祕局清高理須放還以俟來哲中尉掌徼起自秦朝郎將司階行於漢制禦曹執革雕輪光紫陌之前武庫禁兵緹騎拂紅塵之外彎弧狀月肅肅盈衢挺劍含霜輝輝滿路辛慶忌之威重乃應斯榮漢光武之微時猶欽此職趙宜名參列校務總戎昭躡賈復之前規追寇恂之舊軌乳虎之號響溢於京畿蒼鷹之名聲充於輦轂既而鯨鐘隱隱路絶行人鶴鼓鼕鼕街收馬迹徐逖躬沾士職名屬法官應知玉律之嚴頗識鉤陳之禁豈有更深夜靜仍縱轡於三條月暗星繁故揚鞭於五劇前途尚遠歸望猶賒未侵豹衛之司忽犯獸冠之吏既缺瓜田之慎便招楚撻之羞付法將推狀稱有故但犯夜之罪惟坐兩條被捉之時曾鞭二十元犯已從決訖無故亦合停科罪既總除固宜從釋韋謙五陵貴緒三輔名豪忝司陰識之班謬總朱浮之任不能恪勤守職廉慎當官未懸主簿之魚頻窺亭長之肉貪婪之性無愧於維鵜叨餮之情有同於相鼠庖丁之室屢被侵欺朱亥之門恆遭刻削徐秀才之耿直詎肯庶幾韓安國之流通曾何仰止馬防名德雖未可追崔炎芳聲去之匪遠天津橋內實歸左衛之麾清化坊中豈是西曹之管越司侵職自有正條不合箠拷非無舊式依檢騰凌無厭未可全科設令咆哮不虛止從凡鬬宜從犯狀據法論刑期門騎士五營驍健之夫羽林孤兒六郡良家之子既兼都尉實號巖郎甘延壽之武勇傅介子之趫捷如貔獷烈莫與之爭如鶡衝飛死而無退自非鄧彪貴胄竇固名家豈可濫廁戎麾叨居武禁頃者鴟梟反噬蜂蠆成妖釁發牀褥之間災生肘腋之下虹穿白日星孛紫微時驚觸瑟之虞遽有獻圖之變敬偉不承制敕輒入宮闈騎列青規兵交黃屋犯龍苑之禁尚供嚴刑斬鹿門之關猶思干紀豈有白鷴飛閣列闔長驅元武仙樓衝扉直進侮弄兵器震動乘輿論功雖則可嘉議罪便當不敬以勤補拙終過重而勞輕以力酬愆即罪大而功小何者經綸祕算不忤於密圖君臣恆規理存乎大體故勃鞮斬袂晉主納其忠管仲射鉤齊桓任為相怒封雍齒勸一志於人臣泣斬下公懲兩端於軍將鄢陵述命竟守前榮里克施恩便招後譴春秋之明誡今古之崇規勞不足稱罪宜先結田達襟神徑烈志節堅貞天子之腹心皇朝之牙爪雞鳴高樹風雨不易其音塵尾長松冰霜不改其操一兵一馬咸待竹符門閉門開皆憑木契循環復奏務在從真倉卒輒來焉知非詐薛廣斷鞅情發於衷郅惲拒門意無非惡一心可以事百主百心不可事一君苟不踐於邪途固無虧於正道衛綰敦實謹厚見稱王陵朴沈真專可尚宜除舊過不奪前班則勸沮有歸政刑無失肆覲㣥后列聖所以乘時五載一巡明王以之順動周穆八駿車轍匝於寰區夏啓二龍騎迹光於宇縣漢家簫鼓屢向汾河魏帝鳴鑾式臨譙郡皇上俯從中路幸望西畿萬騎皎而星羅六軍發而雷動江騰海運擁列缺以前驅霧集雲屯命蒙公而啓路張忠家承積閥業盛良弓非無大樹之榮實有小棠之蔭公侯圭璧百代相仍帶礪山河千秋不絶腰鞭紫闥方申禦海之勞荷戟丹闈式展干城之效杜俊幼乏過庭少虧函丈濫荷苴茅之蔭叨居蘭桂之叢故得佩韘龍軒腰鞬鳳闕不能翕肩斂氣對黼帳以兢魂俯首曲躬臨玉階而側足豈得欽承聖旨曾無戰灼之心侍奉天威敢縱盧胡之笑石慶謹厚未著於朝儀鄧通驕淫已塵於國典不恭之罪付石碏以懲科無禮之徒從日磾而訓戒雖仗內落箭未見遺弓律有正條相須乃坐二罪俱發自合從重而論一狀既輕不可纍成其過銅街八會開十二之通門金城九重列三條之廣路嚴扃設禁隨日月之昏明祕鍵凝規順陰陽以開闔龜鋪掩映對金馬以翻光鶴鈕參差間銅人而亂色押門守當必藉身材擊柝防間良資壯健魯敬家臨海曲稟大海之精靈地邇江濱得長江之粹氣容儀絶大骨節非常批熊拉虎之威扛鼎翹關之力馮勤八尺象貌過人虞延十圍英資出衆置之階陛可以啓發朝端列於宮闈可以光輝廊廟昔季布使酒響振於河東樊噲飲巵功高於霸上典韋長啜身為時傾蔡裔雄聲才堪國用凶粗小失可峻之以刑書沈酗微愆可懲之以清憲宜漸戒勵未可退還魯慶位在監門職惟防禦理須孜孜匪懈恭慎小心耿耿恪勤方崇大略察姦非無隱伏知左道有孤虛上思郅惲之心下戒田仁之失但任土作貢玉帛星繁稅熟貢新糧儲嶽積赤馬之舸萬里連檣青牛之車千輈接軸豈得不遵公法直縱私求故作躊蹰專為頡頏鶴綾未入遂高臥而間間蚨鏹忽來即傾身而急急贓賄溢室謗訟盈庭外不懼於乘驄內無慙於相鼠待知贓估方可論刑宜更推窮以實裁斷皇天震怒發雷霆以申威聖帝除殘用干戈而肅殺莫不先聲後實轉敗為功就逆命以迎師因不庭而動將五十二戰非黷武而窮兵二十七征蓋除凶而翦暴期門七萃列刃以攢鏃衛尉八屯警夜而巡晝王林位參八校職列五營朝檢察於周廬夕嚴更於徼道請於都郭列置屯兵思患預防不虞先備但王者之貨藏之於天下王者之師守之於海外以騎數十振彼威容臥鼓歇鞍示其間暇豈有制兵城內列騎街中百賊叩門萬夫何用掩扉拒寇終為自死之人入井逃災乃是成埋之鬼虎豹在檻無復施其爪牙鷹鶚處籠何以張其羽翼縶猿廡下求其趫捷之功絆驥庭中責以超驤之用五尺童子尚以為愚三事大夫若為通計所請非理告記為宜主上股肱是為心膂漢高之得樊噲廓去妖氛曹公之有典韋克寧寰宇劉恭力齊烏獲勇若專諸非無孟悅之才實兼任鄙之狀登城斷布所向無前荷石投人誰當餘勇越稷門之宇俊健有聞舉大國之關驍雄可尚昔子夏喪目猶授講於河西左邱失明亦修書於東魯殷堪雖眇作牧於江濱丁儀止婚興嗟於魏帝用大掩小棄短從長川澤納汙山藪藏疾蛇銜輝乘不以細纇為嫌虹氣連城不以微瑕致損大材可録小疹何傷既要所須宜依舊定地稱窮髮星應髦頭既號胸奴實為驕子國宜羊馬逐水草以遷居境帶風塵抗沙場而雜處霜寒弓徑虜騎擾於邊庭月滿兵強胡笳匝於荒徼五千深入李陵於是失機十萬橫行季布猶其未許任季忝司武衛謬典戎昭既沾蘭錡之班須委韜鈐之略昔漢屯上谷未遑中權秦築長城惟聞下策乃欲出塞杜賊閉澗防胡纍之以石牆灌之以鐵汁長茲賊氣沮我軍容生敵國之凶頑示中州之怯懦但飛狐險徑與天地而同開度雁危峯共山河而並立咽喉塞絶血脈無以通流溪谷橫汙川澤如何引氣上虧天道下費人功無益皇威有同兒戲窮沙邐迤南北千重絶漠蕭條東西萬里豈有釘橛遍地斷十角之人蹤鐵樁插荒刺三邊之馬迹未逾數月朽木先摧不及周年危根遽爛費功庸於北塞人力已殫防寇賊於南庭馬蹄無損此愚夫之淺計非達士之宏圖未陳英將之規卻被夷人之笑不如命李廣選郅都斷胸奴之咽喉裁賢王之右臂元甲鏡野朱旗絳天掃雞鹿之妖廓鯨鯢之去而勿逐來而必擒織絲網以障魚張布囊而待鼠兔遊犬室詎有還期雀入狙叢終無去處上智之算此謂攸宜下愚所裁斯為長策蠻夷猾夏肇自遐年獯鬻不臣匪惟今日玁狁孔熾太原稱六月之兵冒頓不恭平城有七朝之弊儒學之士守玉帛以和親介胄之夫勵金旌而薄伐宋敬身參八校名班五戎分銅獸以握兵佩銀龜而按節長驅鹿塞須崇衛霍之勳直邁龍沙宜建班張之效祇如千尋紫塞遠接天山萬里黃河遙通瀚海雁飛霜早擁積雪而埋雲狐聽冰初跱層冰而裂地浮澌嶽聳詎煩王霸之機纍凍天平無勞宋玉之請斯顯河宗肅令風伯申威既夕破而晨凝亦朝開而暮合區區病卒遂與造化爭衡瑣瑣平人擬共陰陽角戾下泣添浪為拙已深低身負天在愚何甚胸奴獷俗戎狄獸心為惡比於豺狼作逆愈於梟獍同夫猛虎飢則食人類彼蒼鷹飽則高揚漢施亭堠三邊於是不虞秦築長城四海由其大亂東漸巨海西至流沙路阻三十六蕃途經八千餘里掘三丈之塹下徹九泉闊十步之壕傍通萬嶺鬼兵是役尚自難全人力所營如何克濟邊夷未損中國已空非直頓失天心亦復徒傷地脈所請非計無理在知
