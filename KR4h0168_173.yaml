  - {type: head, offset: 6382, content: 將軍宋敬狀被差防河恐冰合賊過請差州兵上下數千里椎冰庶存通鎮(左右領軍衞二條), id: KR4h0168_NFKB_173-h30, level: 2}
  - {type: head, offset: 6562, content: 中郎將田海請於舊長城塹東至遼海西至臨洮各闊十步深三丈並仰審利害, id: KR4h0168_NFKB_173-h31, level: 2}
