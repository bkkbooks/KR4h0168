  text: 全唐文欽定全唐文卷八百七十八鉉字丹臣會稽人初事吳為校書郎後事南唐纍授太子右諭德知制誥遷中書舍人後主時除禮部侍郎翰林學士御史大夫吏部尚書隨後主入宋歷左散騎常侍貶靜難行軍司馬卒年七十六
  hash: sha256:c11feb6f29b955843786201c39f0a78f0b4667a4ccf95d9eadfcd1ca5dc40155
