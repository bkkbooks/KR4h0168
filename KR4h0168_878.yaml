body:
  text: 伏惟先王之建國體皇極而垂制仰則觀於辰象俯則察於地義前星為帝座之輔蒼震乃少陽之位非明德與茂親不足膺茲主器故萬邦以貞而本支百世是必天錫嘉祉神輸百祥山河資其正氣日月分其融光膺期運以載誕配乾坤而永昌者也惟我儲后昭明俊德黃裳元吉沉潛剛克鉤深致遠曾莫挹其津涯問安視膳每或形於顏色在昔沖讓高追太伯乃剖麟符保釐東宅受道師傳稽疑典册化自誠心風行邦國乃擁干旌南徐之城左撫勾吳前對敬亭京師河潤盛德日新其畏如夏其惠如春謝傅圍碁靜一方之沴氣條侯高臥息萬里之驚塵今聞孔昭元功莫二人情不可以久鬱皇統不可以終避乃畏天命允茲儲二鳴玉軑以徐來與春郊而總至龍樓霧廓雞戟風生珍符疊委和氣交迎百度以之而式序多壘以之而載清史書有年衢傳頌聲豈人事之協贊信宗祊之降靈於是元圃凝陰瑤山密雪宣猷之緹幕半下濛汜之層冰乍結爰書慶誕之日始遇嘉平之節麗正晨啓重明夙設調護之客娛侍之臣峩冠煒煜佩玉璘玢咸稽首而再拜獻多福於萬春有宮坊之下吏乃捧觴而進稱曰自古聖賢率由輔導伊徇名與課實故成敗之異效粵若成王史佚周召左右前後惟仁與孝靡過不舉無善不告茲君臣之一體故風聲之克劭降及後代亦慎厥初實聘四老復延二疏咸由古道以佑皇儲若乃征和戾園有思臺博望之盛貞觀承乾有元齡魏徵之重或有其禮而無人或有其人而不用何擇禍之忘輕信非賢而罔共英英副君鑒古知今百揆在乎手萬務經其心朝廷之所寄者重蒼生之所望者深既賞興王之諫亦訪百官之針故曰生民在勤好問則裕不躬不親人將孰信一遊一豫樂有常度節八音以導其和平調五味以適其喜怒情義兼於家國故知無不為愛敬極於君親故惟道是諭儉以足用而施舍不可不行仁以接物而刑罰不可不具冗官宜省而才不可遺疆事漸寧而備不可去居安思危覩災而懼上分一人之憂以成天下之務俾中外之禔福與宗祧而永固伊下臣之不佞蒙國士之殊遇實含和而吐頌豈登高之能賦願降鑒於芻蕘庶效誠於塵霧頃歲鉉左宦江陵官舍數畝委之而去庭木蘭因移植於宗兄家及鉉徵還席不遑暖又竄於舒庸吾兄感春物之載華擬古詩而見寄吟玩感歎謹賦以和焉雖不足繼體物之作庶幾申騷客之情爾伊庭中之奇樹有木蘭之可悅外爛爛以凝紫內英英而積雪芬芳兮謝客之囊旖旎兮仙童之節許蒲茸之竊比聽蘭芽之並列於是辭下土之卑濕歷上京之繁華恥衒價於豪門乃托根於貧家資幽人之賞豫有好事之稱嗟一旦逐客程遠君門路賒削閨籍與印組豈獨留乎此花噫人屢遐棄花猶得地分兔苑之餘蔭向藩房而吐媚授簡多暇攀條屬思持香草以余比效騷辭而我寄感此生之百憂何斯物之足貴悲夫館客長吟山城夕陰想馨香之不改歎歡宴之難尋憑歸夢於飛翼寫商歌於素琴歌曰光景兮愁暮別離兮易久真宰兮無黨貞心兮不改誠知異日重滋田氏之荊但恐相逢共歎桓公之柳五月五日繁陰乍晴倬彼新月麗於太清映玉繩而絢彩掩銀漢以騰精對鳷鵲西南之影步明光東北之楹歷歷遲漏悠悠我情雖萬古之不易感一年而始生乃有騃女癡男朱顏稚齒欣春物之駘蕩登春臺之靡迤雜佩璀錯輕裾颯襹紛乎拜祝怡然宴喜人歲歲以潛換景年年而若此昔我當年胡云不然世路多故流光暗遷易壯心於大觀變元髮於華顛顧一毛之無濟愧兩綬之徒然况乎萬象虛明九門奧祕對宣室以方罷閲通宵而不寐憂心似醉既慷慨於君恩急景如馳更悽涼於往事想訴月以長歌遂抽毫而見意歲次辛酉月足廠墨仲冬王人徐鉉揚旍銅柱之鄉稅駕劍池之廟慨嘆靈迹徘徊故墟或曰龍泉太阿安得為寶出也不為當世之用佩之不免亡身之災天下固有虛名而無實效者歟愚以為不然夫聖人之於天下亦物耳所稟受者異故能與造物者並而為天下王是以聖人之作也天不愛其道地不愛其寶同聲相應同氣相求人謀鬼謀皆為聖人用無功無迹豈尋常所能識乎然則集陰陽之英萃山澤之精窮爐冶之妙極鋒鋩之利宜其冥合元造弼成聖功者也昔黃帝法月滿而鑄鏡用能照燭怪魅辟除不祥大禹收貢金以鑄鼎使民知神姦以遠不若漢高祖佩斬蛇之劍以撥亂除害奄有天下是三者皆人力之所為也咸能輔佐興運與時隱現其可誣乎在昔三分叔世咸有昏德天命將改寰宇混同斯劍知之故靈發於下氣浮於上應帝王之符命矚識者之觀瞻亦猶伊尹負鼎於莘墟仲尼動色於魯相千載一會聖賢所以汲汲也向使晉武能誕若天意克明俊德判忠邪之路絀驕侈之心則賢能盡其才神靈效其用淳耀之烈可續七百之期不爽而皇猷既鬱亂本斯成百姓失望㣥龍沮色於是斯劍也委質張雷之鑑一泄其憤遠迹劉石之醜復歸於潛其出也所以示神之不測其去也所以示惟德是依則其為用也遠矣昔者周過其數秦不及期是知天命之精微可以人事而延促前哲論之備矣若夫精真之誠修於內感召之致應乎外自然而然有道存焉不可以智求不可以言達王者得之則三五之功其餘事耳然則天下至寶本非人臣所服變化無方神物之事也忘身徇節忠臣之烈也兩造其極求仁得仁復何怨哉廟在豐城故縣俯瞰池岸壯武侯雷府君之像祀焉去今縣四十里而龍泉太阿之廟別在中路棟宇綿久皆將傾頽邑人朱輝等洽重熙之化感百世之祀獎率同志唯新壽宮千載光靈煥然如在縣令孟賓于尉孫舉皆以文行之懿中賢良之選接武連事惠此王畿推誠於民薦信於神風雨不愆耕鑿咸若先賢遺躅其不泯也宜哉是池廣不終畝深才數尺父老云近歲旦暮往往有雲霧蒙覆其中恍惚之理不可測已今中興三葉聖政惟新豈非靈命孔昭元貺將集天命不僭宏之在人使臣司言敢告有位乃為頌曰周室既衰仁獸率臻晉祚不融龍劍效珍神化無方天命無親德之不建與運俱淪歸潛厚載以俟真人惟劍之神惟賢之識湛湛靈沼綿綿廟食瑞氣長在元符靡測垂茲頌聲永永無極門下昔先王聰明時憲文質載周親親之義莫之或改乃知封建之重宗社攸賴友愛之美風教代宣寅奉舊章敢忘循舉二十弟某稟質沖粹慎德孝恭出言有章好學不倦故我文考慈訓備隆而能踐修嘉猷惠迪前哲卓爾令器時惟老成粵豫眇沖肇當纘服賴貽謀之啓後仰垂鑒之在天尚念多艱懼弗克荷是用睦懿親以佑涼德班宗彞以懷萬邦錫爾以山川表爾以車服師長之任申而寵之敦敘之恩於是乎在吁苴茅侯社禮莫縟焉連華棣草口咢親莫眤焉履信思順可以無悔尊師重道可以多聞盡愛敬以奉親顏極惠和以厚宗室勿佻勿墮有初有終服我訓詞永光懿烈可門下昔西周之分陝服則曰風聲所存南朝之治揚州則曰本根攸寄非親賢碩望不足以表東夏非輔相重位不足以副具瞻天下為公百王不易肆豫敷命匪敢有私長子某敦信厚之風秉孝恭之德凡迪前烈率由生知自剖麟符往綏淮甸尊敬師保奉行詔條有所問而不干知為善之最樂東楚之俗向風而安時以為能朕亦自慰夫陟明賞善有國大典苟得其所雖親何嫌是用特就留臺寵開相府崇貴之數儀制存焉噫為政無他勤則有繼舉德甚易終之實難無以安佚自居而忘夙夜之戒無以驕貴自負而忽藥石之言治亂善敗則有先聖之遺經憲章文物則有中朝之成式咨訪佩服身先行之敬哉慎哉無忝多訓可門下昔在先王任賢尚齒出將入相所以任賢也尊師重傳所以尚齒也况乎擇藩屏之寄膺轉導之求高步承華誕揚師訓克堪其選我有人焉某負貞幹之才稟純厚之德亟更庶尹歷事纍朝升元始基賴其獻納故陟鸞臺之位爰立作相保大踰歲藉其綏懷故委龍節之權受脤于社懋乃嘉績叶於朕心殿邦政成輯瑞來覲方圖位著爰得僉諧而昔自故相已嘗為保重煩耆德俾傅東朝尊敬之儀典章斯在噫昔者叔孫疏廣善於其職克繼來躅可不慎哉勉著嘉猷以副時望可門下姬周同德曹叔封於王畿炎漢功臣楊僕恥居關外是知藩翰之重所寄必同遠近之差以斯為寵我有成命爾其敬聽某識度恢宏風猷茂遠象勳蓋世不怙貴以驕人多難薦臻每忘身而濟物知能適變仁足亢宗來庭不俟於七旬保境豈徒於五郡劉總舉全燕之地宏正輸推魏之邦故實攸存懋章何吝是用加之飫賜尊以上公陟負璽之崇資委建身於列鎮虛襟而見前席與談言語有章威儀可則既叶跂豫之望且堅戀闕之心藹爾誠明形於表疏愈歎忠勤之操宜更節制之權而永泰全軍舒庸舊國地望無慙於汝水封疆密邇於王城用諧日近之言尚資河潤之福俾回新命往受中權於戲大義昭彰朝恩渙汗千里之地可以觀政三軍之帥可以圖功永樹風聲無忘多訓可門下爵賞之行憲章斯在急於務則適其變終其事則歸於禮將軍重任足以奪孝子之情特進崇班自昔冠諸侯之上申為懋典允屬公才某官馮延已儒雅積中機神應物風雲夙契魚水冥符處多士之朝副具瞻之望及移相府出鎮臨川封境綏懷聲猷茂遠頃集蓼莪之痛俯從金革之權露冕有誠輯瑞來覲疇咨舊德保佑東朝北疏傅之在前允諧擬議類魯公之拜後適就變除俾進崇階庶申優寵於戲將相之重資爾以惟聖儲兩之尊繄爾以成德知人則哲豫用弗疑勉揚令圖無忝多訓可落起復冠軍大將軍加特進餘並如故門下建侯樹屏有國之攸先崇德報功百王之所共斯為令典豫敢忘之鎮海軍節度浙江西道觀察等使留後金紫光祿大夫檢校太傅濟南縣開國伯食邑七百戶林仁肇稟此星芒鬱為時幹鼓鼙之氣指勍敵而愈高金石之心因時艱而益壯故能灼殊功於南部夷多壘於東門元戎所行績用昭著及總留務於浙之西成師著無犯之威察俗有惟清之化屹爾京口殷然長城豫惟汝嘉俾正藩守因爾才略樹之風聲雄師大邦所以屏王室尊官盛典所以懋官成惟惠惟和有嚴有翼使豫無東顧之慮者繄其賴焉克堅一心以永百祿可依前檢校太傅兼御史大夫使持節都督潤州刺史充鎮海軍節度使浙江西道管內營田觀察處置等使功臣散官勳封如故門下宗子維城良臣惟聖故有王社之數鼎司之權親親賢賢古之大訓也我有成命時惟至公第七子某識度淹通器質清粹就傅之歲威儀不忒出閣已來聞望所著向由邦政入踐中樞內形將順之規外盡彌綸知業人知親附俗待和平邦家之基斯實攸賴今六騑巡守萬乘啓行方資扈蹕之勤宜有酬庸之典畫南陽而錫壤掌邦土以命官併加馭貴之資益峻具瞻之望於戲義極君父愛敬之道兼焉任綜文武弛張之政存焉爾其佩服前訓咨詢舊德勿驕勿惰有初有終永樹風聲以保元吉門下膺昊天之眷荷宗社之重何嘗不嚴奉慈訓聿循孝理所以化成天下宏濟多艱親親尊尊教之大者也况沉潛之德丕顯於國風輔佐之勤光昭於王業今遺恩纍洽靈鑒在天俾豫小子恭踐大寶思宏任姒之烈紹恢三五之基彞章盛典敢忘祇奉宜上大行國主皇后尊號為太后門下崇德尚賢推恩録舊茲惟令典允屬時英豫以躬嗣承丕業戚藩之望羽翼之恩敢忘寵章用光師道某清直稟氣忠厚為資實戚里之所榮歷纍朝而見重敬慎即保家之主恭儉無出位之思爰自京口臨藩克貞師律鸞臺作相足厚時風留侯旋務於退身疏受更聞於稱職純誠益著雅望攸高昨者預奉綴衣導揚末命忠貞以濟典禮無違顧惟沖人懼德弗嗣當此承祧之日益堅重傅之懷是用就改崇資仍加食賦於戲班崇一品秩視三師苟非賢臣孰克臻此永期納誨無替令猷可門下古者諸侯之賢入為卿士上公之寵出為方伯故中外之任踐更攸宜我有勳臣咸曰名將藩維宿衛夾輔沖人肆豫仰成是用申告某家傳武略天賦純誠名因勇聞位以材致周旋數紀佐佑纍朝由裨將以統元戎勳勞滋茂自百城而登連帥聲政洽聞寵益盛而若驚位益高而愈讓豫纂服之始駿奔來朝且堅戀闕之心因處周廬之任忠貞彌固夙夜惟寅輦下肅清時乃之力永言舊德豈忘豫懷會九江元侯入奉朝任中流之寄非賢不居是用輟蘭錡之權付金符之重往分巨屏更佇殊庸噫簡師旅以壯軍聲明紀律以宣庶政可畏可愛富之教之是汝所長無替前效陟明有典厥惟欽哉可門下車服之寵所以報功藩閫之權可以觀政茲為令典允屬信臣某智勇推高忠貞特立秉武經以致用服戎政以居多誠悃洞然終始一揆及分符出守持節主留恩信並行詔車畢舉肅連營而無犯視赤子以如傷所臨之方去思仍在向鍾多難入衛京師憂國忘家令行禁止㣥情自固戎事以寧肆豫仰成時乃之力今疆場甫靜蒸黎未康宣城奧區國家巨屏方當謀帥是用策勳資果毅以壯先聲假惠和而蘇疲俗付爾節鉞往鎮撫之惟爾慈儉足以安民剛正足以行法必當望風自理投刃皆虛宜宏寬大之視以集中庸之德勉茲具美永振嘉猷可門下望高於朝則享師保之任惠加於物則進土田之封所以啓佑沖人藩屏王室者也我有寵數屬於元侯某山嶽儲精星芒稟異挺全才而應用激大義以致身而自際會先朝奮揚奇策靜二方之多難越萬里以來庭故得倚作藩宣誓之帶礪而能恩威洽著紀律修明戎政有經理聲日遠黎獻有不欺之頌朝廷無南顧之憂茂績忠規古難其比粵豫質嗣德弗明賴我友邦越乃賢帥推誠翼戴克荷景靈渙汗之恩唯恐不至是用增以井賦崇為太師美號峻階併伸殊渥噫乞言之禮可以觀德殿邦之寄可以樹勳勉揚令圖永錫繁祉可門下天作司牧必生丞弼非君臣同體道則不明非律呂交感功則不濟粵豫質負荷景重不有時賢豈戡多難敬若先意疇茲舊臣某純粹炳靈惠和成性襲台鼎之慶連肺腑之親歷奉纍朝亟更庶尹憂國家之事知無不為經夷險之間中立不倚言必由於忠信行必自於誠明勞而弗矜謙以自牧先朝鑒其誠志任以腹心頃當巡守之初俾二主留之寄盡規竭慮夜思晝行京輔以寧時乃之力及奉揚末命以佑沖人送往事居禮無違者忠勳茂績人無間然今二后在天萬物思理豫方乃眷民亦具瞻是用命作司空倚為左相兼國史樞機之任進升階食賦之資豈曰寵章是同憂責嗚呼受遺作弼厥惟艱哉爾其崇遠大之謨布簡寬之政詢針諫之士塞便佞之言滿假自賢則其智益蔽虛懷接物則其猷益光念茲在茲以底於道可門下唐堯之聖也既以序九族為先漢祖之隆也亦以守四方在念矧豫小子弗堪多艱實賴㣥后共康蒸民粵有賢侯亦在諸父庸勳表德敢或愛焉第二十叔某天賦機神生知禮樂肇開朱邸則孝敬之道升聞出建齋壇則威和之風遠振况五嶺之際俗雜地雄吏服其明民安其教煦如冬日隱若長城孤以不明祗奉丕業咨乃庶尹至於友邦師保之規既自家而刑國蓼蕭之澤當由親而及遠是用正左相之位崇三司之儀增賦進封併伸寵數於戲昔我文考並建懿親藩屏所繫社稷是衛燕翼之旨可不勉歟敬佇嘉猷以永繁祉可門下王者均慶推恩無遠弗及矧有舊德居然將臣方申求舊之懷豈吝疇庸之典某素推勇氣夙負壯圖立功旗鼓之間發迹風雲之會出分符竹入守關防翼衛天門董齊蘭錡咸著在公之績可觀適用之材享此期頤保茲優逸臻富壽之福全終始之名比之古人不可多得孤以質嗣守慶基方資無改之規式重後雕之節俾升階序仍進戶封於戲二品崇資三朝貴仕人臣寵祿何以過斯勉荷朝恩永揚令聞可門下睦親尊賢王者之盛業也中台上將有國之重任也是必疇咨公議稽若前經舉而行之謂之令典我有愛弟時維宗英論道經邦勳德滋茂肆豫有命允叶厥中某挺命世之才秉生知之哲機神穎邁器宇沖深自寶玉分封緇衣授職內蘊清明之德化宣寅亮之功持謙下之資以親附百姓體勤儉之節以表率時風學問該通每咨詢而自益忠誠孝悌常將順以無違昔者三后叶心十亂同德允茲古義非爾而誰粵豫躬惠迪先訓獲守大業汔臻小康實繄手足之賢以集股肱之寄無德不報雖親何嫌是用誕舉渥恩就加名數夫元帥者民之司命中樞者國之宗臣尹京所以表則四方增封所以藩輔王室毗倚之重何以加斯於戲義兼國家權總文武動靜之際治亂繫焉所先者在乎弼諧所慎者在乎聽受清如止水故是非之説不可欺平如懸衡故善惡之徵不能惑有犯無隱非好異也不違如愚非苟合也惟公是務惟道是從所務必老成所親必端士服茲多訓永樹英聲可門下豫嘗顧藩屏之重思黎獻之康欲使折衝之威迭行於封略惠和之化普及於方州既報政之屢聞乃改轅而敷寵咨爾賢帥聽吾話言某武毅致身忠厚成性踐更事任昭著勳庸倚若金湯誓之帶礪自持使節出鎮中流恢簡易之風立嚴明之令仁而有斷吏不敢欺故使萬井阜安連營輯睦藹爾殿邦之績叶豫進律之文率是通才何適不可豫以宣城列鎮甸服奧區久闕元戎未孚王化藉爾有成之政副吾共理之懷右相之崇宰司所重申為殊獎以極朝恩於戲有惠於民有功於國中台貴位纍鎮劇權苟非純誠何以臻此爾尚守益恭之節勵匪懈之心永懋嘉猷以光時望
