front:
  text: 全唐文欽定全唐文卷一百四十五于志寧二
  hash: sha256:4158bab30e4fc4e1078b8628a1266935a84f3fc1ceff414d2b6e262d8982e7c1
body:
  text: 蓋聞八卦已列書契之迹肇興六籍既陳禮樂之基斯闡是以厲鄉設教道德垂訓於百王涑水立言雅頌闕一字法于萬闕一字如欲化民成俗致遠鈎深非博闕二字以究其源非闕三字以宏其闕四字聖之幽贊為後進之範圍軼匡莊而驤首超賈杜而矯翼見之祭酒曲阜憲公矣公諱穎達字沖遠冀州衡水人也若夫順天開物黑帝寧區夏以干戈定樂闕十字霸闕四字令譽於鶴闕一字光贊闕二字振芳聲於龍鼎可謂長源眇眇將德水而俱遙曾構巖巖與削成而共峻其後公侯載德簪紱連暉備在縑緗可得而畧曾祖靈龜魏國子博士闕一字應闕一字之闕一字馳譽闕五字之闕一字識飛英庠序闕一字授魏治書侍御史冠錫神羊權豪為之屏跡任司衡象風俗以之肅清父安齊青州法曹參軍輕重之典情在公平大小之獄心敦寬簡公蘊靈闕一字智闕三字和闕二字篤闕一字之闕一字駿闕三字之足庭羅俎豆幼習升降之儀門列驂駔少懷遠大之操闕一字韜金匱覃思邁於西河學富石渠沈研冠於東閣詞光翰苑文麗綵虹思極掞天才華日闕一字蹈忠闕一字以行已踐仁信以闕一字身闕一字漢皇之名珠光映照車之珤抱金山之美玉價重連城之器聞之者未面而虛闕一字見之者忘言而傾蓋可謂儒宗之鏡闕一字學府之闕二字者焉昔大業膺圖更開橫塾賁帛而徵闕四字而辟闕八字業隆槐市大訪闕一字彥廣闕一字學徒公闕二字千闕一字苞括百氏牢籠曹許孕育毛王足使仲遠伏膺子幹闕一字道所以闕一字天資於漸陸紀地由乎濫觴居此高才闕五字家授闕三字博士尋除太學助教闕四字馭海縣分㝢甚闕三字踰楚岳巨猾於焉鴞視大憝所以鴟張比王粲之寓蹟荊門同班彪之銷聲隴坻闕二字尚阻還蜀無由暨六合同文八紘闕二字既闕三字之闕一字遂闕三字之遊闕二字司空闕一字國公禮部尚書黎陽公秘書監永興公為秦府文闕一字館學士闕二字學博士東膠西序講肆於是重興碣館闕一字宮文闕一字於茲愈闕二字年遷國子博士膏梁闕二字舉闕七字揮汗闕三字攝齊問感譬洪鍾而闕一字叩負笈質疑闕一字衢尊而闕二字聲實振於關右芳風蓋於淹中其年封曲阜縣開國男食邑三百戶析圭助土望闕十字德貞觀二闕一字改闕一字給闕一字中職亞闕一字卿位闕三字丹墀近侍允屬時英四年加員外散騎常侍行太子中允入陪玉裕出侍金輿闕一字重起居寄深獻替六年除國子司業闕二字太子右庶子七年闕二字庶子兼國子司業以公闕二字可闕三字有闕一字比闕一字君仲闕二字子闕一字十年奉勅共秘書監鄭公修隨書良直著乎青史微婉表於丹書跨固超遷含劉孕謝特蒙恩闕三字增闕二字散騎常侍闕二字庶子兼國子司業闕一字如闕一字制禮作樂沿革不同於是闕一字名多問委以刪定其大戴小戴之舛錯前鄭後鄭之危疑往哲之所不通前賢之所未釋公剖茲闕一字節鍼此膏肓足使儀刑闕三字澤王化闕一字成闕五字賞進爵為子邑七百戶賜物二百段其年以公匡弻副主屢進讜言與左庶子黎陽公特蒙恩詔又賜黃金一斤絹一百匹十二年除國子祭酒東宮侍闕一字封如故闕二字卿名闕一字齊闕一字膺茲寵命闕二字道光闕二字荷闕一字殊榮公乃再振頹風重宏絕業學徒盈於家室頌聲彰於國朝十四年車駕幸學親觀釋奠公闕一字總九流才兼六藝彞倫之所鑽仰闕一字德之所闕一字崇詔公闕一字於講筵闕四字連闕一字暫闕一字指闕二字其談鋒英辯一摛闕二字慙其河瀉下帷博學閉戶多聞競舉雲梯爭迴雄㦸公金湯易固樓雉難攻遂使輔嗣倒戈大春反斾宿疑舊惑闕一字順氷銷闕二字神衷闕四字悠悠闕三字見斯闕一字禮畢上釋奠頌一篇文豔雕龍將五色而比彩韻諧闕一字鳳與八音而同節逸思掩於子王麗藻超於闕二字蒙闕一字勅闕三字表讚其書曰闕二字幷上釋奠闕一字殊為闕六字清詞爛其盈闕五字逸氣闕一字已淩雲驪龍九重不足方斯綺麗威鳳五彩無以比其鮮華揚雄掞闕一字高蹤闕一字遠黃香闕十四字昔強秦之末政教闕一字遲搢紳以闕三字墳典以為灰燼逮炎漢握圖闕一字敷經學憲章斯教文藝聿修及自三國迄于晉宋書記可畧而言之近至隨運將終天下鼎沸闕八字鑑乎闕一字隨豈不愴恨朕少逢闕二字之闕一字長遇干戈之闕三字茲宸極執闕一字璇璣闕一字阪泉崇國之功闕一字有之矣靈臺辟雍之德則未可庶幾雖然亦嘗有意乎雕蟲存心乎儒史開獻書之路闕四字賢束帛蒲輪亦以多矣闕一字學謝闕二字文慙闕七字春三闕三字國老養於闕一字序庶老闕一字於西庠聽廣論而無闕一字導深義而闕一字席洪鍾待扣扣無不應幽谷發聲聲無不答闕十二字夙挺珪璋早闕四字羅百氏闕三字經闕一字涌珠泉情抽蕙闕一字關西孔子更起乎方今濟南伏生重興乎茲闕一字庶令宏四科於縹帙闡闕一字遍於青衿翰苑詞林闕一字其闕十字奉勅闕一字撰五經義疏公博極㣥書遊闕一字眾藝削前闕一字之紕繆闕一字往哲之闕二二字誠萬古之儀刑實一代之標的蒙勅賜名五經正義付國子監施行賜物三百段公敦老氏之止足追太史之鳴謙闕一字請歸闕一字優詔不許闕二字聞奏始蒙闕三字防閣闕四字又使中書令闕二字賫手闕一字存問榮寵之極曠古罕儔闕一字世室於國陽佇聞公玉之制告成功於日觀庭覩司馬之書闕五字光闕二字兩楹闕一字夢環海闕四字千月之闕一字以闕十字薨於萬年縣平康里第春秋七十有五哀感宸扆悲動搢紳甚魏主之惜桓階若晉人之傷衞玠詔贈物闕二字段陪葬昭陵喪事所須率由官給闕七字公禮也闕二字遺老陪闕一字陵而起墳闕三字臣奉峻陽而卜兆以今訪古隔代同符惟公氣稟五常道光六行得孔甫之具體總姬旦之多才延閣策府之奇書探賾索隱東館南宮之逸闕二字隩窮源闕三字於闕二字無闕三字之闕四字於闕二字不假張寬之闕一字道合者不以賤貧而易交行偽者無以權貴而投分志懷耿介性闕一字廣門有石奮之謙恭類宋宏之方闕一字推賢進士後已先人舉事而闕五字而成準的乃闕一字之翹楚闕二字之羽儀於時將創明闕一字令㣥儒詳審互陳聞見闕一字起異端公攈摭舊事憲章故實刪裴頠之制度畧蔡雍之節文酌今古之儀得豐儉之闕一字襃衣博帶闕一字不闕三字觀之始闕一字翬闕四字樂闕五字之禮之墜典記事記言之史俱資筆削大雅之詩咸佇刊定奉勅修隨史五十卷闕禮一百卷五經正義一百七十卷邁南董於曩策逾孟慶於闕一字書闕二字闠闕十一字論衡匹此未奇撰闕二字聞帝用嘉尚后倉制禮闕一字振曲臺孫通創闕一字榮光稷嗣以今方古彼獨何人豈謂食薪為災夢桑成闕一字魏旉之藥無效齊鵲之言闕二字遂闕一字山陽之闕三字長闕一字之闕二字宮之闕三字金石之聲世子志元等悲深陟岵思烏闕一字而無期恩極昊天對風枝而增慟恐鍾律易改陵谷難常乃闕一字氏英猷永傳五鼎楊公闕一字軌長勒四碑敬陳伐閱樹之闕五字赫赫華冑巖巖崇趾元鳥降神闕二字效祉德表溫室道光闕里績著太常芳流惇史誕生令悊卓犖絕㣥百丈挺秀九畹騰芬迢闕一字流畧囊括邱墳淩雲縟藻闕六字㣥籍網羅闕三字邁闕二字思窮五際糠粃名闕一字錙銖象繫落是潘詞巢高孫第世尚典故時敦學植賓雁成行翹車轉軾金馬待詔璧池攝職闕二字欽風闕二字詠德飛纓黃屋闕十字三闕一字獻書闕五字闡六學規模百寮冠冕星闕一字喪寶石折殲良闕一字矣武庫闕一字哉智囊塋嘶白馬墳瘞黃腸九泉雖閟千載名揚竊以仰觀俯察八卦於是列焉依類屬形六籍所以生矣陳卑高之序定君臣之義建國辨方化民成俗學闕四字不大哉于是西河闡以儒風北海敷以至教四方挹其茂範百代稟其徽猷况蹈六行以揚名蘊九德以闕六字為人師闕十四字正議大夫闕二字師矣公諱文達字藝成冀州信都人也闕五字高山以畫九州營邱佐姬平牧野以開四履鴻伐成家拖青分社人物奕業高軌銘于景鍾英傑蟬聯芳猷闕四字曾祖慶魏彭城王記室參軍樂陵郡守碣宮建肇即預大房茅土始封遂居分竹祖延齊安平王記曹從事闕四字超枚馬以騰芳驂駕魏國冠應劉以驤首父永隨幽州薊縣令德光馴雉化美去蝗仁聲表於絃歌政教彰於闕二字稟淳和之氣淩峻極之精雅量淹通識度開濟比子昂之德行聲動朝倫方季珪之容儀光照隣國懷清貞而闕三字重然諾而畧兼金博極石渠踰蔡雝之萬卷學該藏室邁惠施之五車縟藻麗於雕龍雄辨析于非馬入其室者如就芝蘭遊其門者若聞絲竹可謂照灼千祀籠葢一時者焉隨煬帝以當闕一字握圖大橫纂歷命翹車以闕一字英彥闕三字以召碩儒公以經明行修孤標獨秀大業三年授同安博士九年特勅除守國子助教洎三霛改卜六樂闕四字言于瞽宗崇函丈于泮水武德九年授國子助教今上韜光藩服歷試艱難虛左用佇奇才開館以紆闕五字辟來遊府朝遂得文預題鞭恩參置醴聖人嗣應寶歷君臨區宇業盛配天功齊造化循韶夏之舊規宏闕四字風以公學冠當時除國子博士雖曹志之篤行江統之高名未足連步成均比肩璧水十年詔授闕二字散闕四字諫議大夫國子博士如故懷匪躬之節抱忠公之心同少翁之善言仿紀山之鯁直十一年從駕洛陽宮闕四字補宏文館學士遊步銅駝待詔金馬切問資以辨對近侍屬於博文十二年詔授國子司業左學右學闕四字謀闕一字上庠下庠官曹待以綱紀十三年詔授兼蜀王師匡正藩條劉實以多聞見重師範磐石孔演以行闕五字古雖殊得人是一十六年丁毋憂居喪泣血至性逾于世公負土成墳孝德甚於泰伯誠可訓時勵俗作一闕一字之闕二字立教宏風為㣥寮之隱括於是逍遙誓誥每服止足之言組織典墳恒敦滿盈之誡觀陽元謝事意在抽簪闕三字車情在解綬所以退居邱壑有終焉之心十八年詔授正議大夫兼崇賢館學士鶴闕一字將啟闕二字矯翼之闕四字開更招託乘之容公曳裾永福躧履承華侍公宴玉輅之前陪飛葢銀牓之右豈謂峯頹東嶽聖人起奠楹之闕三字西州智士興云兦之嘆春秋六十有七薨雍州開化坊里第哀感宸極宮懸止於咸池悲動震方肅成輟於闕二字勅令贈物絹二百匹粟三百石喪事所頒率由官給即以其年十二月歸葬於舊塋禮也惟公英姿磊落闕五字竦千尋量包萬頃偶潘而稱連璧對郭而號仙舟學綜㣥書能兼眾藝羽陵蠧簡魏冡逸篇揣摩縱橫之辭闕四字之術囊括往哲高視前修定三豕之疑不假卜商之辨決二負之惑詎勞劉向之言鴻都於是推高曲臺所以闕二字或陪黃屋或侍青宮方樗里之智囊闕一字鎮南之武庫故能保元吉於當世垂嘉聲於後昆世子國子主簿宏式闕五字追悲罔極之艱難對窮泉而長慟思陟岵而永懷恐暑往寒來闕三字於延閣鐘移律改闕一字傳墜於闕三字此高碑以旌懿範乃為銘曰上闕二十六字層構奕奕崇基誕此英賢是為人秀薦紳盛族膏梁華冑珪璧方溫芝蘭比茂七步才速百家學富賁帛招賢弓旌訪士飛纓庠塾鏘金阜市折角標奇重席闕二字王賈齊衡匡張隸齒平臺騁步望闕一字飛英譽隆徐邈文高馬卿從政瑣闥作範維域蘭芬松茂玉振金聲忽嘆隙駒俄悲風燭未登臺闕一字遂編鬼籙薧里沈珠佳城瘞王四序難追百身何贖車轉熊軾闕一字列龍旂徘徊闕一字衞蹢躅驂騑墳闕二字霧樹曲闕一字威銘斯炎琬播美騰輝上闕㓨史上柱下闕子黎陽公于下闕夫闕三字蒸龍興豹闕二字天立極夷難開闕三字士以經綸駕㣥雄以戡翦然則輕車飛將靡㓨舉之方擁闕三字無折衝之畧其能入陪乘石闕二字於鉤陳出撫名藩文德被於江介總英謀以挺秀敷善政以遐征見之使君南安公矣君諱琮字文瑾武威姑臧人也夫運籌帷幄名闕一字三傑之先立闕三字功居八王之首屬金行不競㝢縣分崩涼王建定亂之勳成割地之業洪源將導江而俱遠層構與干雲而共高龜組相暉青紫交映闕一字在簡牒可畧闕三字祖誼魏驃騎將軍涼州刺史黃門侍郎散騎常侍武威郡公剖符作牧恩重璽書執㦸從官榮隆夕拜祖暠周驃騎將軍闕一字城郡太守死王事贈上柱闕三字總管河北壯公分竹宰民化光露冕臨難殞命節重結纓父辯隨上柱國使持節秦州諸軍事秦州總管潭州總管左武衞大將軍闕二字郡開國公建闕三字恩結湘流橫劍禁中聲高文陛惟公總煙霞之秀氣稟川岳之淑精器㝢深沉風調爽逸文闕一字叶上將之畧大樹表將軍之威幼挺縱橫綴幡為戲少闕三字聚米成圖起武安以振威邁淮陰以賈勇加以琢磨道德黼藻仁義砥名勵行聞諸鄉黨資孝為忠形乎家國少習文史尤工騎射沉沙減竈既練之闕三字持短入長亦精之於劍術公釋褐隨奮武尉于時東夷未賓阻遼水以為固頻擾黃龍之戍亟侵元菟之城隨煬帝親御貔貅以誅梟獍公壯踰投石闕三字旗命賞疇庸以居其最特蒙標異授朝散大夫尋除新鄭縣令公濟以寬猛施以韋弦遂使單父興謠萑蒲息盜善政既著俄遷潁川郡丞此乃魏室闕三字胡公之故國元冠成列朱輪接軫公綏之以淳化肅之以嚴威千里揚風百城仰德時屬隨人委馭海縣沸騰或裂壤而鴟張或分星而闕一字視丹野塗闕三字溺驂徒懷王允之心空軫賈生之哭既而晉野降白雲之瑞秦川開赤玉之圖稷契於是遷虞張陳所以歸漢高祖大武皇帝御紫極而統天坐元扈而則地文為治本資德教以化民武以除殘藉干戈以靜難擇賢分器量器授官除公驃騎將軍闕一字加上開府闕三字勳高沙塞任重中權黃君望亞鼎司寵光莫府以今方古彼何足云尋改授左衞中郎將劉武周稱兵馬邑結援龍城挻禍汾陰連橫河闕一字今上闕五字公陪從戎麾蒙授左三總管公知包三畧勇冠六軍運奇謀以抗千里舞勁劍而摧八陣兇徒既殄反斾還京除左衞長史其中郎將如故王世充闕五字以戎旃曾無勤王之心翻肆問鼎之志莽卓未足方其罪澆壹豈得比其辜遂使宗社淪胥懷生板蕩竇建德同惡相濟共為犄角王師運九變闕五字之士風驅電掃拉朽摧枯公預官渡之勳參崤陵之捷校功追賞超絕等倫劉黑闥建德餘孽尚蓄狼心擁兵趙魏搆難漳滏騁其闕一字突未革鴞闕五字纂此一戎遂清九宇於是稽天息浸飛岳闕一字塵飲至策勳蒙授上柱國封南安縣開國侯食邑七百戶又撿校參旗軍副又撿校左領左右中郎將闕五字衞率近臣侍奉委之以正人爪牙寄之以心膂貞觀元年授太子左衞率撿校右武衞將軍左領軍將軍四年蒙授雲麾將軍行左衞率如故闕五字坊恪勤晨夕標羽儀於甲觀擅風流於望苑十年授銀青光祿大夫行睦州刺史方當班六條於勁越歌兩岐於全吳望俗變文身風移鑿齒紹闕五字追降鳳於潁川豈謂日闕一字難翻閱川不息忽感何祇之夢遂同聲伯之悲貞觀十一年十二月之任在道寢疾薨於宋州館舍春秋五十有五痛闕五字行人考行受名諡曰懿公禮也即以十三年二月十一日遷厝於始平之原公德方琮琬照荊岫而騰暉材挺棟梁茂鄧林而聳幹破楚入郢闕五字齊之謀彈壓六奇籠蓋十策陳力草昧之始立功雲雷之初功著升陑勳高戰牧執㦸武帳八舍稟其軍容受律戎軒四校佇其神算加以地居闕五字卿帝鄉近親莫之比盛祖母李景皇帝之女贈信都郡大長公主母竇隨文帝之甥夫人長孫文德皇后之姊尚主賓王光華帝戚闕五字映濯龍未嘗富貴驕人恒以盛滿為戒方應參八駿之駕高宴瑤池陪七佐之遊問道襄野豈謂九轉之方莫効十闕一字之景難留奄切頹山忽悲闕五字子振等恐炎涼迭代星紀循環海變三山谷遷九地所以鑴闕勒石播美騰芳譬東都之前永識滕公之墓潼亭之側長標太尉之墳乃為銘曰上闕二字茂緒眇眇長瀾七葉輔漢五世相韓績參經啟業預艱難代總衡轡世襲衣冠山瀆降靈煙霞誕祉比德珪璧齊芳蘭芷衝斗浮光照車蘊美縱闕五字圖史運屬交喪時逢屯剝爭竊寶符競窺帝籙禮廢禋祀闕一字毀龜王兇甚拔山暴踰比角天地初闢光華方旦破袁奇策滅項神算受脤除殘執闕五字三傑績隣十亂霧撤雲銷功成治定屢典交㦸頻膺寵命裂壤恩隆分麾禮盛儲坊述職江皋從政歲月易度生涯若浮夕峰隱景夜壑遷舟闕六字迴輈式鑴翠石永樹芳猷蓋聞虞后納麓五臣膺其宏圖周王定霸四友贊其英畧故能撥亂闕一字極類帝禋宗闕三十六字至若獻籌綈構之始樹績雲雷之初成配天之功建定鼎之業經文緯武尊主庇人齊德夔龍連芳風力形圖麐閣銘勒宗彞則我開府固安郡公其人也公諱敦禮字安上闕十六字猷大公執鈞享四履而匡王業亭伯達旨之作闕二字詞林子玉闕二字之文思窮物理絓組奕葉方十紀之羽儀紳佩蟬聯比九世之卿闕十九字煨燼闕一字於緹紬藏闕一字被於簡牘曾祖宣猷周梁州總管隨大將軍通守汲郡大浸稽天預奠川之鴻闕一字可闕二字縞闕二十四字階大將軍代州總管太常卿禮部尚書固安縣公學窺典墳文韜雅頌言成表率行為師範盛德光於八士芳闕一字冠於十臣父壽周闕二字縣男闕三字通事舍闕十七字蜀定州諸軍事定州刺史委質平基藻思越於牧馬陪遊河曲鴻筆麗於應劉英聲振於生前哀榮備於身後揚暉鳳策播美龍圖公昭孝懷忠闕三十四字日闕一字之光渥水初騰騁千里以追電溟池將運摶九萬以摩霄文極詞條才高吞鳥學該繁露思逸夢蛟論道宰化之方體國經野之術齊暉稷契比美蕭張闕二字屬始闕十八字窮髮闕五字黃屋沒於望夷黔首墜於塗炭大唐循璣昇歷辯闕一字居元安車以禮通賢蒲輪以徵奇士公識芒碭之啟聖知梁宋之興王投刺轅門庇身有闕二十四字禮殆將闕一字主感鑽燧而增闕一字對風樹以興哀昔高柴泣血三年揚臻居喪七載校斯至性詎可相方武德二年奉勅奪情授左勳衞四年授通事舍人闕四字飛闕七字刑闕七字縉紳六年奉勅撿校右驍衞府長史闕二字右校叛換亟擾天田左賢陸梁將迴地軸蕩滌逋寇事藉謀猷奉勅副郢國公宇文士及往媯州經畧事了還京公乃闕一字元闕一字奉闕一字蒙忝闕二字曠闕五字之恩闕二字易名奉闕一字王之詔比斯闕二字彼何人哉闕二字四闕一字奉勅往幽州追都督廬江王李瑗時瑗陰預戾園之謀將據河朔之地嘯命兇醜肇為亂階公非理被囚意在嫁闕一字長闕一字不闕五字太宗嘉公乃誠闕十一字賜絹五百疋闕三字人金銀器皿十一件細馬一匹其年奉勅副御史大夫安吉郡公杜淹往武功遂簡闕一字還授中書舍人闕一字司陛闕一字申張武之茂功闕二字絲闕四字之闕二字貞觀元年封固安縣男闕一字土闕一字枋書之以山河開國成家傳之以茅賦六年授員外散秩常侍行中書舍人七年守太常少卿三雍七郊之禮則闕一字之於靈臺九成闕一字英之樂闕二字之於闕十一字山闕五字大闕二字使闕一字於漢中闕六字行旃於夏首化洽九江循吏於是彈冠貪夫為之解印聲高八俊譽邁二星九年屬有國哀靈駕進發以公攝侍中闕一字人闕一字喪事十年授闕二字少闕十字兵部侍郎闕二字靜闕一字兵機戢武之先闕二字定功戎昭禁暴之本闕一字選列代咸寄親賢今授此官允於僉望昔炎政闕一字季闕一字宇混淆六樂與沙鹿俱崩三禮將原火闕十三字之多闕十三字封固安縣子闕一字年加爵為侯拜護軍延陁恃燭龍之阻深騁射雕之小伎失事大之節懷淩長之心公運婁敬之良籌摛鄭眾之雄辨呼韓以之削枉闕二字於是闕十六字使還闕一字授闕一字部侍郎加上護軍隨班列也其年又奉使往延陁論和親事蒙賜絹三百疋其年授右屯衞將軍望超二衞闕一字重三軍方信布之爪牙比良平之心腹漢朝闕一字寵極闕一字魏闕十八字授銀青光祿大夫守靈州都督方李牧作宰聲震龍庭譬魏尚剖符威懾狼望膠折息蕭關之騎月滿絕甘泉之烽廾年授銀青光祿大夫守兵部尚書闕十七字七年闕一字駕闕十一字武侯大將軍闕一字左右相辟杖事位光七命職統五戎政典佇之以納言喉舌寄之以元凱聲馳禮閣譽滿周行尋正除兵部尚書撿校闕十七字之酋闕七字方之長浮闕一字海以來庭左雄之流譽東京韋賢之飛英西漢不之尚也其年副太尉趙國公撿校山陵鹵簿事畢蒙進爵為公食邑一千戶賜物五百段闕二十六字以贊時雍闕一字侍闕二字中書令闕四字載筆西省司八柄以奉綸言負璽左曹託七車以對明詔獻替旒扆損益機斷雖渭浦兆叶周傅陰夢感殷闕三字方闕十八字事闕九字纓玉裕曳闕二字絧樓漢室將次比肩晉朝與孝伯方駕心敦淡泊志尚清虛固讓機權願歸閒逸既而承華肇建望苑初開審喻藉以正人調護資於闕二十字男食邑三百戶授尚舍直長賜物八百段昔桓榮碩儒離經於副主臣闕一字通識訓從於儲君故以德茂曩賢名高往哲者也而東流難止西景易沈未登千月之期奄切九闕一字之闕一字以顯慶元年歲次闕三字月癸巳朔三日乙未薨於闕一字陽里第春秋六十有一哀感宸極痛結儲闈閭里於是興嗟簪裾為之揮涕輿駕於龍門舉哀詔祕書監駙馬都尉長孫沖職方郎中溫闕六字州都督開府儀同三司闕十一字陪葬昭陵鼓吹往還闕一字事葬事官給務從優厚仍令兼司農卿長孫知人監護太府少卿韋思齊為副又令中書侍郎李義府持節弔祭皇太子則闕五字仍令闕五字韋闕一字率更令蕭鈞致祭太常考行諡曰昭公禮也以其年十月壬辰朔十八日已酉窆於昭陵之南安鄉平美里惟公降辰昴之秀氣稟嶽瀆之精靈鬱鬱材聳棟梁汪汪量澄江海闕六字登闕七字乃闕五字博窮開闢洙闕一字之教聿興藻軼翰林睢渙之文斯著懷仁履信蘊德居貞為衣冠之表綴實朝倫之規矩自隨風不競海縣分崩三戶興滅秦之師八百起兦殷之眾人闕三字之闕一字家闕五字太宗膺赤闕一字之符殄綠林之闕一字再安地紀重正天綱公闕一字日月之暉獻戡翦之畧茂勳斯建神算遠聞吐納赤墀對揚流譽侍衞丹扆巡警有聲建節榆關塵清柳室張旃鹿塞霧布狼山闕一字銀闕二字朝闕十四字戶求才方令君之舉闕一字開門接士闕三字之待賢散金恤窮指囷濟物王孫慙其好施子敬愧其輕財博識古今超晉朝之武庫決勝樽俎冠秦官之智囊見闕一字之闕二字勞馬援之誡聞人之善闕二字曹邱之闕十二字多闕三字禾足儔崇荀孟儒雅之風鄙申商文峻之法可謂廊廟之王褱寶朝序之宗從者焉而眉壽莫終麥邱之祝遂爽日制未及闕二字之闕一字無闕一字便闕二十六字太子通事舍人闕一字業等哀厂田坴罔極痛切天經至性盡追遠之心孝德究慎終之道恐桑田變海深谷為陵懿範不傳徽猷永沒所以勒茲三闕一字繼公之遐蹤闕二十八字乃為銘曰儀天曾構控地長源大庭誕祉尚父開藩賦超雅頌論擬文言家傳積善世德高門其一辰象降精挺生闕二十一字畧括囊文史其二隨政道銷運終天祿戲亭軍喪漢濱舟覆日闕一字狐鳴星兦鬼哭懷生擇主元天改卜其三聖人有作乘時定亂負鼎經啟托劍匡贊屢獻嘉謀謺闕十其闕七一字四字防闕一字光闕六字一山戈玉塞杖節銅梁闕一字流典客聲高奉常其五八屯警衞六官述職龍池鼓鱗鳳條矯翼子房審喻長輿亮直儼若朝典隱如敵國其闕一六字機闕三其闕二十字七字畢陌陣列原阡闕一字窗遽闕一字金字方鑴佳城照日宰樹籠煙玉棺永閟寶劍空懸下闕蓋闕陟茂闕勳高方闕構而俯闕雅俗闕吏部侍闕深八闕之闕舉以孝廉闕一字而不就雖翹車結軫闕一字鴈闕一字㣥闕二字之闕之故事及闕一字茂陵之舊章莫不討本尋原探賾索隱闕其謀乃迎公太夫人闕一字氏置乎城內公闕一字在繈褓闕陳平餘智闕一字背項之謀許闕一字見機闕一字歸闕一字之闕之賓太沖闕一字其闕五字其多藝闕兼陜東道闕籌闕晉闕焉闕三字充功闕用闕成闕一字德祖闕五字薛氏之後代闕城飲至敘勳闕一字上柱國汾陽縣男食邑三百戶闕邪佞者多忠愕者少臣無君不立君無臣何以得安闕恩旨特隆以旌鯁直昔皋陶之對虞舜致闕嘉賓於東閣參愛客於西園既接闕疇昔闕一字弟孫之闕太宗與公闕五字敬書闕二字與卿闕若為存養知卿叔姪之情闕五字加安闕於記錄暨繼明闕夢君儀範傷悼特深旦敕所司賜以粟帛闕之闕一字鍵對逸簡於嵩岳多闕二字於闕戎馬交馳飛魯連之箭闕三字起草闕二字之書闕之功豈謂拂日曉枝倏墜千尋之幹闕一字天峻岳闕一字頹萬仞之峰闕昭陵儀仗送至墓所往還闕葬闕山移闕鼎闕夜闕
