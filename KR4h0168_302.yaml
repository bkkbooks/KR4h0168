front:
  text: 全唐文欽定全唐文卷三百二敬本潤州丹陽人開元中為四門助教以太常博士為集賢院修撰遷右補闕祕書郎
  hash: sha256:25206f094142d4e31ef3d82d780166c56013d6d8cbfe7ea987e1dc80207bd040
  markers:
  - {type: head, offset: 12, content: 施敬本, id: KR4h0168_NFKB_302-h1, level: 1}
body:
  text: 竊以紫宸殿者漢之前殿周之路寢陛下所以負黼扆正黃屋饗萬國朝諸侯人臣至敬之所猶元極可見不可得而升也昔周女出降於齊而以魯侯為主但有外館之法而無路寢之事今欲紫宸殿會禮即當人臣攝行馬入於庭醴升於牖主人授几逡巡紫座之間賓使就筵登降赤墀之地又據主人辭稱吾子有事至於寡人之室言詞僭越事理乖張既黷威靈深虧典制其問名納采等並請權於別所舊禮侍中跪取匜沃盥非禮也夫盥手洗爵人君將致潔而尊神故使小臣為之今侍中大臣也而盥沃於人君太祝小臣也反詔祝於天神是接天神以小臣奉人君以大臣故為非禮按周禮大宗伯曰鬱人下士二人贊祼事則沃盥此其職也漢承秦制無鬱人之職故使近臣為之魏晉至今因而不改然則漢禮侍中行之則可矣今以侍中為之則非也漢侍中其始也微高帝時籍孺為之惠帝時閎孺為之留侯子辟彊年十五為之至後漢樓望以議郎拜侍中邵闔自侍中遷步兵校尉其秩千石少府卿之官屬也少府卿秩中二千石丞秩千石侍中與少府丞班同魏代蘇則為之舊侍中親省起居故謂之執獸子吉茂見則嘲之曰仕進不止執獸子是言其為褻臣也今侍中名則古官人非昔任掌同燮理寄重鹽梅非復漢魏執獸子之班異乎周禮鬱人之職行舟不息墜劍方遙驗刻而求可謂謬矣夫祝以傳命通主人之意以薦於神明非賤職也故兩君相見則卿為上儐況天人之祭其肅恭之禮以兩君為喻不亦大乎今太祝下士也非所以重命而尊神之義也然則周漢太祝是禮矣何者按周禮大宗伯曰太祝下大夫二人上士四人掌六祝之辭大宗伯為上卿今禮部尚書太常卿比也小宗伯中大夫今侍郎少卿比也太祝下大夫今郎中太常丞比也上士四人今員外郎太常博士比也故可以處天人之際致尊極之辭矣又漢太祝令秩六百石與太常博士同班梁太祝令與南臺御史同班今太祝下士之卑而居古下大夫之職斯又刻舟之論不異於前矣又舊禮謁者引太尉升壇亞獻非禮也謁者已賤升壇已重是微者用之於古而大體實變之於今也按漢官儀尚書御史臺官屬有謁者僕射一人秩六百石銅印青綬謁者三十五人以郎中滿歲稱給事未滿歲稱權謁者又按漢書百官公卿表光祿勳官屬有郎中員外秩比二千石有謁者掌賓讚受事員七十人秩比六百石古之謁者秩異等今謁者班微以之從事可謂疏矣又舊禮尚書令奉玉牒今無其官請以中書令從事按漢武帝時張安世為尚書令遊宴後宮以宦者一人出入帝命改為中書謁者令至成帝罷宦者用士人魏黃初改祕書置中書監令舊尚書并掌制誥既置中書官而制誥樞密皆掌焉則自魏以來中書是漢朝尚書之職今尚書令玉牒是用漢禮其官既闕故可以中書令主之述京兆萬年人舉進士天寶初歷左右庶子加銀青光祿大夫遷工部侍郎封方城縣侯居史職二十年祿山之亂抱國史藏於南山後陷賊逼授僞官至德二載三司議罪流渝州為刺史辥舒困辱不食而卒廣德二年其甥蕭直上疏理述於蒼黃之際能存國史以功補過合霑恩宥乃贈右散騎常侍臣伏見貞觀永徽之時每有公卿大臣薨卒皆輟朝舉哀所以成終始之恩厚君臣之義上有旌賢録舊之德下有生榮死哀之美列於史冊以示將來昔智悼子卒平公宴樂杜蒯一言方始感悟春秋載其盛烈禮經以為美談今古舊事昭然可覩臣伏見故禮部尚書蘇頲纍葉輔弻代傳忠清頲又伏事軒陛二十餘載入參謀猷出總藩牧誠績斯著操履無虧天不憗遺奄違聖代伏願陛下思帷蓋之舊念股肱之親修先朝之盛典鑒晉平之遠跡為之輟朝舉哀以明同體之義使歿者荷德於泉壤存者盡節於周行凡百卿士孰不幸甚臣官忝記事君舉必書敢申舊典上黷宸扆希降恩貸俯垂詳擇謹按禮祭統曰凡天之所生地之所長苟可薦者莫不咸在水草陸醢三牲八簋昆蟲之異草木之實陰陽之物皆備薦矣聖人知孝子之情深而物類之無限故為之節制使祭有常禮物有其品器有其數上自天子下至公卿貴賤差降無相踰越百代常行無易之道也又按周禮膳夫掌王之食飲膳羞食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十甕則與祭祀之物豐省本殊左傳曰饗以訓恭儉宴以示慈惠恭儉以行禮慈惠以布政又曰饗有體薦宴有折俎杜元凱曰饗有體薦爵盈而不飲豆乾而不食宴則相與食之饗之與宴猶且異文祭奠所陳固不同矣又按周禮籩人豆人各掌四籩四豆之實供祭祀與賓客所用各殊據此數文祭奠不同嘗時其來久矣且人之嗜好本無憑準宴私之饌與時遷移故聖人一切同歸於古雖平生所嗜非禮亦不薦也平生所惡是禮則不去也楚語曰屈到嗜芰有疾召宗老而囑曰祭必以芰及祥宗老將薦芰屈建命去之曰祭典有之國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下安之不羞珍異不陳庶侈不以私欲干國之典遂不用此則禮外之食前賢不敢薦也今欲取甘旨之物肥濃之味隨所有者皆充祭用苟踰舊制其何限焉雖籩豆有加豈能備也傳曰太羹不致粢食不鑿昭其儉也書曰黍稷非馨明德惟馨事神在於虔誠不求厭飫三年而禘不欲黷也三獻而終禮有成也風有采蘋采蘩雅有行葦泂酌守以忠信神其捨諸若以今之珍饌平生所習求神無方何必師古簠簋可去而盤盂杯案當在御矣韶頀可息而箜篌笙笛當在奏矣凡斯之流皆非正物或興於近代或出於蕃夷入耳之娛本無則象用之宗廟後嗣何觀欲為永式恐未可也且自漢已降諸陵皆有寢宮歲時朔望薦以常饌此既常行亦足盡至孝之情矣宗廟正禮宜依典故率情變革人情所難又按舊制一升曰爵五升為散禮器稱宗廟之祭貴者獻以爵賤者獻以散此明貴小賤大示之節儉又按國語觀射父曰郊禘不過繭栗蒸嘗不過把握夫神以精明臨人者也所求備物不求豐大苟失於禮雖多何為豈可捨先王之遺法徇一時之所尚廢棄禮經以從流俗裂冠毀冕將安用之且君子愛人以禮不求苟合況在宗廟敢忘舊章請依古制庶可經久天生萬物惟人最取靈所以尊尊親親別生分類存則盡其愛敬沒則盡其哀戚緣情而制服考事而立言往聖討論亦已勤矣上自高祖下至元孫以及其身謂之九族由近而及遠稱情而立文差其輕重遂為五服雖則或以義降或以名加教有所從理不踰等百王不易三代可知日月同懸咸所仰也自微言既絶大義復乖雖文質有遷而必遵此制謹按儀禮喪服傳曰外親之服皆緦麻鄭元謂外親異姓正服不過緦麻外祖父母小功五月以尊加也從母小功五月以名加也舅甥外孫中外昆弟依本服緦麻三月若以匹敵外祖則祖也舅則伯叔父之別也姨舅伯叔則父母之恩不殊而獨殺於外氏聖人之心良有以也喪服傳曰禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其太祖天子及其始祖聖人究天道而厚於祖禰繫姓族而親其子孫近則別其賢愚遠則異於禽獸由此言之母黨比於本族不可同貫明矣且家無二尊喪無二斬人之所奉不可二也特重於大宗者降其小宗為人後者減其父母之服女子出嫁殺其本家之喪蓋所存者遠所抑者私也今若外祖及舅更加服一等堂舅及姨列於服紀之內則中外之制相去幾何廢禮徇情所務者末古之制作者知人情之易搖恐失禮之將漸別有同異輕重相懸欲使後來之人永不相雜微旨斯在豈徒然哉且五服有上殺之義必循源本方及條流伯叔父母本服大功九月從父昆弟亦大功九月並以上出於祖其服不得過於祖也從祖祖父母從祖父母從祖昆弟皆小功五月以出於曾祖服不得過於曾祖也族祖祖父母族祖父母族祖昆弟皆緦麻三月以其出於高祖其服不得過於高祖也堂舅姨既出於外曾祖若為之制服則外曾祖父母及外伯叔祖父母亦宜制服矣外祖加至大功九月則外曾祖合至小功外高祖合至緦麻若舉此而捨彼事則不均棄親而録疏理則不順推而廣之是與本族無異矣服皆有報則堂外甥外曾孫姪女之子皆須制服矣聖人豈薄其骨肉背其恩愛情之親者服制乃輕蓋本於公者薄於私存其大者略其細義有所斷不得不然苟可加也亦可減也往聖可得而非則禮經可得而隳矣先王之制謂之彞倫奉以周旋猶恐失墜一紊其敘庸可止乎且舊章淪胥為日已久矣所存者無幾又欲棄之雖曰未達不知其可請依儀禮喪服為定射以習戰樂本宣風雖君子之所爭乃先王之修訓惟甲幸逢光宅早踐榮班羔裘以朝未登三命之秩主皮為會咸茲五善之儀興舞與同必期多算和容中質不出於正節未及於采蘋事有歸於制氏欲加其罪竊謂誣辭且物有司存孔門垂教失官為慢春秋所規節以樂章誠則大夫之禮非禮不動實惟先聖之謨師古未表其明知禮反招其咎所由斯罰有異繩愆制氏有言誠為舉枉郊廟蒸嘗春秋禴祀執膰成禮受胙為榮甲位列周行職惟神監舉信從政須慎威儀屬有事宗祊無虧肅敬鄒人問禮非惟黍稷之馨祝史正詞抑亦牲牷必備既而三獻徹俎肆夏尸還天子多歡始預受釐之福先生有饌遂欣歸胙之榮初則視膳在堂終則降福於廟雖必嘗君賜頗取則於前規而不捨餕餘誠有違於昔典非復必齊之慎審乖如在之儀何慢神之致尤惟失禮而斯取述白忽枉書問詞高理博尋玩反覆罔知厭倦述聞登太山者覩藂薄而迷其方面涉瀛洲者挹波濤而懵其淺深蓋廣大則昧然難為究足下貫穿㣥言靡不該覽聞一以知十切問而近思詞人之淵藪僕誠不敏何以當斯乎足下無棄芻蕘輕投瓊玖講學先訓足以起豫啓發微言孰不賈勇謹當掃陋巷之庭宇望君子之軒車博約之道以俟會面韋某頓首春秋之義諸侯死王事葬之加一等蓋嘉其有功也而不及其賞也爰至漢魏則禭之即受寵被窀穸唯德是裦豈虛受也近代以來寵贈無紀或以職位崇顯一切優錫或以子孫榮貴恩例無加賢愚虛實為一貫矣裴光庭以守法之吏驟登相位踐我機衡豈不多愧贈以師範何其濫歟張燕公有扶翊之勳居講諷之舊秩躋九命官歷二端議者猶謂贈之過當況光庭去斯猶遠何妄竊之甚哉蓋名器假人昔賢之所惋也開元十六年五月內出二王真跡及張芝張旭等古跡總一百六十卷付集賢院令集字榻進尋且依文榻兩本進內分賜諸王後屬車駕入都却進真本竟不果進集字太宗貞觀中搜訪王右軍等真跡出御府金帛重為購賞由是人間古本紛然畢進帝令魏少師虞永興褚河南等定其真僞右軍之跡凡得真行二百九十紙裝為七十卷草書二千紙裝為八十卷小王及張芝等亦足隨多少勒為卷帙以貞觀字為印印縫及卷之首尾其草跡又令褚河南真書小字帖紙影之其古本亦有是梁隋官本者梁則滿騫徐僧權沈熾文朱異隋則江總姚察等署記太宗又令魏褚等卷下更署名記其後蘭亭一本相傳云將入昭陵元宮長安神龍之際太平安樂公主奏借出外榻寫樂毅論因此遂失所在開元五年敕陸元悌魏哲劉懷信等檢校分一卷為兩卷總現在有一百五十八卷餘並墜失元悌等又割去前代名賢押署之跡惟以巳之名氏代焉上自書開元二字為印以印記之王右軍書凡一百三十卷小王二十八卷張芝張旭書各一卷右軍真行書惟有黃庭告誓等四篇存焉蕭令尋奏滑州人家藏右軍扇上真書宣示及小王行書白騎遂等二卷敕令滑州給驛齎書本赴京其書有貞觀舊褾織成題字奏進書本留內賜絹一百匹以遣之竟亦不問得書所由嘗聞祀盛德者必及百世承大勳闕十四字錫允繁茂在商則為申為呂在周則為齊為許枝分派別更盛迭貴則太守章仇府君是其後也君諱元素字元素闕十字於紀裂繻去國筮仕於周世守保章因官為姓秦項之際有雍王章邯為漢闕一字併於闕三字位降處仇山取因生之舊名增卜居之新號章闕四字焉自是流離荒服六百餘載魏氏徙跡平城建都河洛君之六代祖馥闕一字參闕一字督始歸中原仕至寧南大將軍徐亠兊青齊相五州刺史馥闕二字州任城郡守挹鄒魯之舊風慕洙泗之餘俗遺命留葬因而家焉復因武陽遠於闕一字部代為魯郡闕二字任城人也大王父魏郡太守諱夔大父萊州闕三字政烈考博陵郡録事參軍諱孝方皆以友悌博雅德良清白增修其勛克開厥後君即博陵府闕一字之第三子也稟粹含和中溫外朗行必誠信闕四字之經學無浮華莫匪詩書之奧弱冠以孝廉登科授將仕郎無幾將有捧檄之闕三字艱不赴闕二字免喪乃喟然而歎曰士之所以降志辱身者闕四字然則隱居行義不患無位蓋所貴在乎全其道也故富貴非道則不取貧賤非道則不去齊景公千駟不如縫掖之一賢王氏五侯孰與簟闕五字關却掃拒絶辟命淡然歸真以壽而歿君子以為鴻飛寥廓罕能測其所至哉夫人渤海吳氏合宮丞少明之妹也嬪風婦則儀闕八字家終率禮而偕老嗣子銀青光祿大夫戶部尚書兼殿中監內外間廏等使兼瓊積祉所種濟美必復匪躬是徇為國藎臣拔自郎闕九字董戎驅輶軒而按俗自裦斜之外邛笮之內萬里澄清人安訟息間者闕一字戎負德蟻聚闕一字山職貢不供兵車屢駕稟聖皇之英算震大國之威靈一舉而闕四字再闕三字其噍類罷柝置吏班師舍爵天子議以殊賞酬其懋勛乃推錫類闕三字追遠闕一字寵開元草九載秋七月詔曰益州大都督府長史兼闕一字御史中丞持節劍南節度闕一字使營田副大使本道兼山南西道採訪處置使章仇兼瓊父故將仕郎元素氣含純粹才擅奇特資禮樂而秉彞負文詞而擢秀議能多通稟命不融德建昭代久淪幽壤雖馳暄易遠松檟成行而餘闕二字鍾芝蘭克茂瞻言允子每效忠公總節制之師致疆場之捷行賞為重爰贈爾先俾自葉而流根庶慰存而榮歿可贈宋州司馬天寶三載秋九月詔曰蜀郡大都督府長史兼御史大夫章仇兼瓊祖故博陵郡録事參軍孝方父贈雎陽郡司馬元素等闕一字才繼跡雅操宏風纍德成名克家存闕二字生令允幹用於時總戎懋其勳績秉憲肅其綱紀榮親廣行既資孝以為忠自葉流根載敷澤而彰善宜加禮贈俾昭餘烈孝方可贈汲州司馬元素可贈使持節東平郡諸軍事東平郡太守又詔曰兼瓊闕一字祖母王氏故母吳氏女則懿範母儀盛德何闕一字嘉慶傳嗣徽音誕此良才克昭遺訓闕二字褎賢之贈錫其有禮之封王氏可贈太原縣君吳氏可贈勃海郡夫人初尚書既孤伯父麻城令崇節及麻城之夫人馬氏親加訓育恩逾所生洎闕一字獻凱策勳泣奏其事上為之憮然特詔追贈麻城府君為楚州刺史馬夫人為扶風縣君嗚呼厚於仁者闕一字其闕一字愛其親者及其類所謂孝闕三字也故得明主感歎嘉乃誠心贈策闕二字哀榮薦至非夫慈惠恭儉福履所積肹蠁感通明神所勞則孰能臻於此哉於是載美策流芳琬炎永闕二字裔豈惟太原有道無愧闕二字之詞南陽文學空傳子闕一字之頌其詞曰系是炎皇惟裔之闕五字去紀為章拒漢協楚失其封疆言避華夏闕二字要荒魏氏徂南卜遷嵩邙我宗復昭列於周行纂闕一字軒裳闕六字東平晈如琳琅闕六字五常辭祿顧道戢耀含芳積善闕一字裕克生才良準繩憲府恢復戎場勳績所酬寵贈惟光乃立廟祧以榮邦鄉闕八字俾闕一字休烈如川之長臣烈不揚臣忠不彰子孫是詹永思勿忘抗字抗京兆萬年人中明經景雲初官右臺御史中丞開元中拜大理卿進刑部尚書封武陽伯十四年卒年六十贈太子太傅諡曰貞聞一知二闕四字冠訐就吳滅言行魯闕十六字向開元七年官右補闕臣聞千金之子坐不垂堂百金之子立不倚衡況居大寶之位也哉陛下宜保萬壽之體副三靈之望安可輕出入重盤遊乎天子三田前古有訓豈惟為乾豆賓客庖厨也哉亦將以閲兵講武誡不虞也詩美宣王之田徒御不驚有聞無聲謂畋獵時人皆銜枚有言聞而無喧譁也又曰悉率左右以燕天子謂悉驅禽獸順其左右之宜以安待王射也則知大綏將下亦有禮焉側聞畋於渭濱有異於是六飛馳騁萬騎騰躍衝翳薈蹴蒙蘢越嶄險靡榛叢紅塵坐昏白日將暗毛㣥擾攘羽族繽紛左右戎夷競申驍勇攢鏑亂下交刃霜飛而降尊亂卑爭捷於其間豈不殆哉夫環衛而居暴客攸待清道而出行人尚驚如有墜駕之虞流矢之變獸窮則搏鳥窮則攫陛下復何以當之哉靜言思之臣深為陛下戰栗也書曰不畏入畏又曰從諫則聖惟陛下深思遠慮以誡後圖則其天下孰不幸甚昂開元時官倉部員外郎遷考功郎中終吏部尚書觀彼乘石體自孤貞得崑山之片字掩穀城之偉名青苔備色堅確符情列㣥峰而無語縱衆溜而有聲爾其崔嵬岑絶涵霜貯雪竹徑烟曛松門景滅愜野叟之幽意抱山人之徑節橫碧岫以霞張噴紅泉而水咽借如巨形矗嶪勢若將飛隨匠人之採斫入天子之宮闈故得削跡青澗端容紫微幸至尊之踐履嘉菲陋之因依於是皇帝穆然乃登珍臺乘玉輅帷弸彋其拂汨鱗雜沓以駢布甸師清畿野廬掃路流星旄以燭日儼雲旌而彗霧往來斯登升降必步取其磨而不朽貞而無蠹不然此荒藪之微石何遭逢之多遇請言其本也生必深山峰壯自閒電烻霞駮樹雜苔斑奇形異質紛拏不一屹特立以樹空倚崩崖而構室銜箭羽而橫臥聳蓮峰而半出龍吟應物觸紫巖而吐雲虹梁中斷駕滄海而觀日故石之為物也不奢不僭無競無猜偶山髓而長往因和璞而俱來考之雲藉則建名古昔貫億祀而長存經百王而不易胡施而不可何用而不適願上吾君千萬年地久天長履茲石遐國華之容衛諒茲旗之多工文成日月影滅霜空乍逶迤而掛霧忽搖曳以張風排回驚鳥飛失斷鴻至若混羽旗以橫野則覩之者目駭雜金鼓而特設則見之者氣雄爾其誓將臨邊興師授律擁豹騎而長往指龍山而衝出月陳聯雲星旄鬬日回五翎以革面挫三庭而屈膝匪旗之佐彼軍容則何以沙場清謐明明我君四海無塵立徽號建鴻勳為旗削蚩尤之跡畫蛟龍之文信侔功於巢燧諒比德於姜雲奄有天下體國經野覽茲旗之財成故可得而言者儼孤峙以標衆列廣形而助寡隨時卷舒任用行舍不務功以伐謀良有足而稱也徒觀其進退繽紛旖旎三軍可仰可則光輝一國車閵示迷於指南何登車而逐北塞斷連營幸遇時清對岌岌之臺殿閒悠悠之斾旌陵紫霄而風掃逗碧落以雲縈擺帝樓之晴樹弄天門之曉旌高則可仰犯乃不傾每低昂以自守常居滿而望盈時亨大畜於何不育永端容於太階沐皇風之清肅聖有謨訓明徵定保於昭大社德洽生人雖烈山巳還勾龍作配而享祀不忒國容孔彰鍠鍠雲門宛是天樂備物致用覺鳴鳳之不飛感靈動幽識潛魚之入聽是知樂之至也乾坤由是混和祭必肅然神祗所以丕祐國家九變具設六府孔修器陶匏而不奢聲鏗鏘以合雅泂酌明信神其享諸非楚使之誇秦異曹翽之諫魯列聖敷典則有其義商均不奏豈為失禮鳳凰司歷象疑謀託算象生有數感而遂通邈探渾元是知元妙覩雲物必在精微情至紛擾則他想交亂形質濁穢則寄鑒不明焉可以見天地之心窮鬼神之狀幽變未測孰辨端倪相彼歷生迹參日御臺觀是忝泉蒙未豁唐都不作糟粕誰傳趙達何追菁華莫繼失秒忽之度曷以敬授人時若歸奇於扐履端於始則毫釐不爽黍纍無愆如或未精法將焉捨
