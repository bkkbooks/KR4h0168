front:
  text: 全唐文欽定全唐文卷六百八十六皇甫湜二
  hash: sha256:86441c5aaf1fc032ef7fd8a80973df673a1cc234257cf3efb212a84fd5e62c5a
body:
  text: 吾居河陰邱生敲門請曰儒貴求知予謹自露願以是非賜决語其學如猗頓之富聽其文如清廟之樂觀其刻意厲行如奉商鞅之法而懼秦刑吾驚而與之游踰年鬬其藝於洛下吾遠來遊洛下諭之曰子知市乎懷貝玉以如名都之肆未有置而不售者也挈而之三家之墅未有不盜而困矣子將安賈哉京師賢才市也一人不知子也他人知子一門不容子也他門容子謹持其所有以徃未有不成者也今子之類固少勢能移事者稀為一不知為一相移白變而為黑倒上而為下吾末如之何也矣生不信而試果困而見吾酌酒而賀之曰謹持貝玉以徃之都市可矣曰諾乃叙其行鳳羽而麟毛鳥與獸也經傳以比聖人豈非以其心不以其形者耶師雖佛名而儒其行雖夷狄其衣服而仁義其心雖未齒於士與鳳麟類矣不猶愈於冠朝冠服朝服或溺於淫怪之說以斁彑倫者耶嗚呼師吾獨賢也刑部侍郎昌黎韓愈既貶於潮浮屠之徒讙快以抃師獨憤起訪余求叙行以資適潮不顧蛇山鰐水萬里之險毒若將朝得進拜而夕死可者嗚呼悲夫吾絆不得侶師以馳浮屠之法入中國六百年天下胥而化其所崇奉乃公卿大夫野益荒人益饑教益頹天下將蕪而始渾然自上下安之若性命固然也孫生天與之學獨曉然於厚夜聰然於大醉發憤著書攻而指斥之其詞骫骳痛入肝血乃忘力之不足以死為斷庶幾萬一悟主救人者嗚呼不得古人而與之必也生乎遂除肉刑一女言也能移高山一翁願也彼矒褐雖翳地其無足憂乎西江之涯值生盡出其說以為贄而見余余既悲而異之乃約其言始湜於江陵望見王膠而異之知其為膠又悅其膠名之不凡然未之諭不忍而問諸膠乃稱曰膠之為言猶牢固也膠痛今之人其始之心以利回其始之交以利遷將固吾初心與吾交勿以利遷將固吾心與吾交猶懼醉睡病昏之時忽然而忘之故以膠自名欲吾造次顛沛起居意問記吾心守與交也膠以進士舉進士尤輕其流懼混然與之化懼書紳銘坐之怠疎故以膠自名其始望見膠而異之又悅其名而為之交又悅其言誠其意耳又悅其與吾業同遂大悅之徵其文章乃出累百篇其歌詩高處用古人其錄述詞壯而有奇然後吾與膠見其才之全其為人之誠也今侍郎韓公余之舊知將薦膠而未具於西行叙以先之吳中山泉氣狀英淑怪麗太湖異石洞庭朱實華亭清唳與虎邱天竺諸佛寺鈞號秀絕君出其中間翕輕清以為性結泠汰以為質煦鮮榮以為詞偏於逸歌長句駿發踔厲徃徃若穿天心出月脇意外驚人語非尋常所能及最為快也李白杜甫已死非君將誰與哉君字逋翁諱況以文入仕其為人類其詞章常從韓晉公於江南為判官驟成其磊落大績入佐著作不能慕順為衆所排為江南郡丞累歲脫縻無復北意起屋於茅山意飄然若將續古三仙以壽九十卒湜以童子見君揚州孝感寺君披黃衫白絹鞳頭眸子瞭然炯炯清立望之真白圭振鷺也既接歡然以我為揚雄孟子顧恨不及見三十年於茲矣知音之厚曷嘗忘諸去年從丞相涼公襄陽有曰顧非熊生者在門訊之即君之子也出君之詩集二十卷泣請余發之涼公適移莅宣武軍余歸洛陽諾而未副今又稔矣生來速文乃題其集之首為序君子自數百里訪予羈病牽力迎門握手心喜宜涉旬日始至焉究孔釋之名理窮歌詩之麗則野墅孤島通舟必行漁梁釣磯隨意而徃餘興未盡告云遐征夫越地稱山水之鄉轅門當節金戊之重進可以自薦求試退可以閒居保和吾子所行蓋不在此尚書郎鮑侯知子愛子者將推食解衣以拯其極講德游藝以凌其深豈徒嘗鏡水之魚宿耶溪之月而已吾是以無閒勸其晨嶺南屬州以百數韶州為大其地高其氣清南北之所同貢朝之所途先時此州無政有聞土穢水煩人創吏侵田畝莠而不墾城郭牢而不實時唯李君奉詔而來一年麤洽二年稱治三年大成顧郡之城制狹而專門墻枳扃庭除湫底秋之澍雨沉氣乃上暑之燂爍清風不下人慢吏褻無嚴諸侯於是掠旁入之利乘可為之時端景相勢凝土度木經營未幾興就嶷然登閎豐崇高明朗融耽耽盡飾沈沈生白改積陰於多陽散溫沴為祥風公庭若虛炎天若秋茲焉觀遊其政優優密親嚴客嘉肴旨酒茲焉宴喜其樂亹亹朱衡旅楹君子攸寧飛磴雲基君子攸躋乃及月春乃擇清辰宴豆既陳賓寮有容肅肅纍纍訖聲以止天地若開山川如新原隰成文雲霞相凌蕩遠目於天涯叢一境於階端四座洸然若夜行之煜於光煩痾之脫於身畢夕皆下熙然滿足以其直城之東目為朝陽詩云鳳凰鳴矣于彼朝陽前代之良二千石若東萊潁川是鳥咸集茲樓可以樹修竹列高梧矣僉以君朝之望也而出刺是州不已屈以事高不心望以卑遠夙夜其官聲績用明羽儀之拜日月以數嗣而居者致遠請標疇克於將來京兆韋庇為殿中侍御史河南府司錄以直裁聽㣥細人增搆之責掾南康移治枝江百為得宜一月遂清乃新南亭以適曠懷俯湖水枕大驛路地形高低四望空平青莎白沙控祚緣崖澀芰圓葭誕漫朱華接翠裁綠繁葩春燭決湖穿竹渠鳴郁郁潛魚歷歷產鏡嬉碧淨鳥白赤洗翅窺喫纈霞縠烟旦夕新鮮冷唳喧啼怨抑情綿令君騁望逍遙湖上令君宴喜絃歌未已其民日致忻游成㣥使纓歎戀停車止征實為官業而費家貲不妨適我而能惠衆嗚呼是乃仁術也豈直目觀而已乎人知韋君若是也多惜以尺刀效小割異日賦政千里總戎疆場吾知其辦終也亦若是而已矣乃為作記刻於茲石以圖永久在易之爻二與四同功其善不同二多譽四多懼四之多懼以近君也今州之近縣當刺史理所其難為與支縣相百宜矣哉廬陵戶餘二萬有地三百餘里駢山貫江扼嶺之衝材竹鐵石之贍殖苞篚韗緝之富聚土沃多稼散粒荊揚故官人率以貪敗令日兩趨州衙退祗承錄判將校事之紛錯率相關臨煩言易生凡事難專故愈不理近年百姓創罷徵賦發斷其人益訛與處險易以亡匿尤輕犯禁夫以不專之理理益訛之俗承積弊之餘雖使冉季復生將不能也今清河張君儇為之理適得良二千石俾顓其政而展其材居未再稔最於一郡張君恂恂以奉上煦煦以字民剸繁決劇以通敏彈豪糾黠以沉斷清白之操較然絕類便安之謠流而遠聞宜舉其卓卓以敦沮勸縣之故習令將之邑佐發斂盛粻緍具車航千里迎拜君以讓却之單艇赴官則吏皆廉縣之故習令始至取官羨物益備器用團鄉次役以供芻粟君以法諭之一切禁絕則民知恥布其大信推以至誠促嚴吏家慰懋民戶故秋夏之稅先期而集宥過以容不逮獎能以勸不修為魁而萃頑者取一以警百故政刑之簡期月而治以俸錢葬枯而恩浹以家飲救渴而澤周艹口咢合兄弟之析居者而民以養麕復老弱之流庸者而疆以實和氣潛通連歲大穰庭內閒閒似密與蒲余既堙厄斥置於此始來而宏農楊君敬之具為余話君美談既接益久得實其聞乃刻山石鑱廳壁盛之以觀永久自江而南吉為富州民朋吏嚚分土艱政蓋以近歲適茲不幸紹繼無狀大官以降為者羞薄而不省務子弟以資授者縱欲而不顧法州遂瘡痍御史中丞張公歷刺縉雲潯陽用清白端正之治詔書寵褒賜以金紫移莅於吉下車之初視簿書簿書棼如絲視胥吏胥吏沸如糜召詰其官皆眊然如酲登進其民皆薾然而疲公噫眙良久於是大新其典為之開之以修省簡便鍵之以勤彊練密凡事從宜處約以躬率之省費一倍法防既周銖兩之姦無所容墨俗斯息單民得職威令神行惠利川流未及再朞庶富而教至於無事百姓扶老提穉載路而歌曰昔吏訑訑今吏詹詹公能馭之鈆亦為銛跖亦為廉始紲而苦終優以恬昔民嗷嗷今民咍咍公能撫之鰥寡有怡流亡既來徭稅先具汚茨盡開嚮覆官倉倉無斗糧公來幾時積粟埋梁嚮閱官庫庫無尺繒公來幾時山積層層瑞露溶溶降味公松瑞蓮猗猗合蔕公池公有異政神之祚之民歌路謠冀聞京師天子明聖恩光遠而於是掾吏將卒趨伏固請願書於公堂之北壁夫堂壁有記本以志善悛惡名氏遷次末也矧東西之舊則備今用紀編以首能為政垂為後式入州門東六曹之聯事所署都其任者廳於門西經始之意衆未喻也前刺史李君為政更年大惠一州記徵始聞而未至也思宜利所遺步覽庭內顧以茲為不厭慮材鳩庸即日即工馮顯構相前增葺儼然華就翩然樂遷六縣之駿奔於是乎肅序百胥之事於是乎總齊郡官之退食於是乎逶迤矣利不十不變法其斯之謂乎錄事參軍既荷寵飾有懷章示具以廳壁為記宜異也謂湜書之元和八年四月三日記荊山之南府壓上游置尹視京河置使視揚益同巴蜀吳越之治臻自上古為天下敵在今為咽腴之地置荊南之治否乃天下低昂也夫根之堅扶之必以枝轂之環運之必以輪其宜介之庸賢乃使之幽光也御史大夫河東裴公尹正大都節度㣥州置幙柬盡敬之誠以序賓客得宏農楊用乂首分於其軍膏宣燭明風助震聲蹲蹲貔螭萬肺如串乃新治所爰奠賓客前是相承即據而安以耆容菆以穉憑頑既謬既瀆瑟縮未帖茲止厥位俾齊厥務於是用乂立廳於此不偪不豐退食從公式治於中爰得我容思耆定於永久莫若書壁之白故用乂索我以文伯夷不降其志不辱其身非其君不事非其民不使乃至餓死而不顧是以孟子謂之清柳下惠辱其身降其志不羞汚君不辭小官乃至三黜而不去是以孟子謂之和若校之聖人則彼之所行皆一方之士也夫聖人之道可以進則進可以止則止是天下之是非天下之非出攣拘之域不凝滯於物通塞若水變化若龍動之謂聖靜之謂道非可以一善目非可以一行稱安肯立惡人之朝黜而不羞恥武王之粟餓而至死故曰彼之所行皆一方之士也即而評焉在於清和互有長短請列而辨之彼伯夷者揭標表於不滅蹈臣子之所難行信道之篤執之如山嫉惡之心惡之如鬼清風所激有心必動此其所長也至於傳之汎愛易之隨時聖人之權濟物之義豈止未暇亦將有妨若柳下惠辱已以求利物潔身以事無道唯斯人是哀唯吾道是存薰蕕雖同河濟不雜此其所長也至於無道則隱亂邦不居而飲盜泉水食不仁粟垂傲物之迹近身之仁又君子所不由矣則清和之用於與奪為功均然清之流矯於前而激於後使萬年亂臣賊子懼貪夫惡人恥且衆人之難為者也和之迹疑於往而敝於今使夫偷苟之輩有容貪利之徒得語且衆人之所易為者也顏回曰舜何人也孟子曰謂其身不能是賊其身夫然則士之率性飭躬立志希古當以聖人為準的中庸為慕尚力苟不足寧中止焉則清與和皆非通道不可準則若遁迹而辨以矯俗為心必不得已願附清者論曰古史編年至漢史司馬遷始更其制而為紀傳相承至今無以移之歷代論者以遷為率私意蕩古法紀傳煩漫不如編年湜以為合聖人之經者以心不以跡得良史之體者在適不在同編年紀傳繫於時之所宜才之所長者耳何常之有夫是非與聖人同辨善惡得天下之中不虛美不隱惡則為紀為傳為編年是皆良史矣若論不足以析皇極辭不足以杜無窮雖為紀傳編年斯皆辠人且編年之作豈非以事繫日以日繫月以月繫時以時繫年者哉司馬氏作紀以項羽承秦以呂后接之亦以歷年不可中廢年不可闕故書也觀其作傳之意將以包該事迹參貫話言纖悉百代之務成就一家之說必新制度而馳才力焉又編年紀事束於次第牽於混并必舉其大綱而簡於序事是以多闕載多逸文乃別為著錄以備書之言語而盡事之本末故春秋之作則有尚書左傳之外又為國語可復省左史於右合外傳於內哉故合之則繁離之則異削之則闕子長病其然也於是革舊典開新程為紀為傳為表為志首尾具敘述表裏相發明庶為得中將以垂不朽自漢及今代已更八年幾歷千其間賢人摩肩史臣繼踵推今古之得失論述作之利病各耀聞見競誇才能改其規模殊其體統傳以相授奉而遵行而編年之史遂廢蓋有以也唯荀氏為漢紀裴氏為宋略強欲復古皆為編年然其善語嘉言細事詳說所遺多矣如覽正史方能備明則其密漏得失章章於是矣今之作者苟能遵紀傳之體制同春秋之是非文敵遷固直如南董亦無上矣儻捨源而事流棄意而徵跡雖服仲尼之服手絕麟之筆等古人之章句署王正之月日謂之好古則可矣顧其書何如哉論曰王者受命於天作主於人必大一統明所授所以正天下之位一天下之心舜傳之堯禹傳之舜以德禪者也桀放於湯受殺於武以時合者也秦滅二周兼六國以力成者也漢革秦社稷以義取者也故自堯以降或以德或以時或以力或以義承授如貫終始可明雖殊厥跡皆得其正以及魏取於漢晉得於魏史策紀載彰明可知百王既通行萬代無異辭矣惠帝無道㣥胡亂華晉之南遷實曰元帝與夫祖乙之圯耿盤庚之徙亳幽王之居彘平王之避戎其事同其義一矣而拓跋氏種實匈奴來自幽代襲有先王之桑梓自為中國之位號謂之滅耶晉實未改謂之禪耶已無所傳而往之著書者有帝元今之為錄者皆閏晉可謂失之遠矣或曰元之所據中國也對曰所以為中國者以禮義也所謂夷狄者無禮義也豈繫於地哉用夷禮即夷矣子居九夷夷不陋矣沐紂之化商士為頑人矣因戎之遷伊川為陸渾矣非繫於地也晉之南渡人物攸歸禮樂咸在流風善政史實存焉魏氏恣其暴強虐此中夏斬伐之地雞犬無餘驅士女為肉蘺委之戕殺指衣冠為芻狗逞其屠刈種落繁熾歷年滋多此而帝之則天下之士有蹈海而死天下之人有登山而餓忍食其粟而立其朝哉至於孝文始用夏變夷而易姓更法將無及矣且授受無所謂之何哉又曰周繼元隋繼周國家之興實繼隋氏子謂是何對曰晉為宋宋為齊齊為梁江陵之滅則為周矣陳氏自樹而奪無容於言况隋兼江南一天下而授之於我故推而上我受之隋隋得之周周取之梁推梁而上以至於堯舜得天統矣則陳姦於南元閏於北其不昭昭乎其不昭昭乎論曰孟子曰人之性善荀子曰其善者偽也是於聖人皆一偏之論也推而言之性之品有三下愚中人上智是也聖人言性之品亦有三可上可下不移是也黃帝生而神靈幼而徇齊文王在母不憂在師不煩后稷不坼不副克岐克嶷之謂上智矣齊桓公以管仲輔之則理以易牙輔之則亂子夏出見紛華而悅入聞仁義而樂之謂中人矣越椒之生熊虎之狀叔魚之生谿壑之心謂下愚矣是故有生而惡者得稱性善乎哉有生而善者得稱性惡乎哉故曰孟子荀卿之言其於聖人皆一偏之說也窮理盡性惟聖人能之宜乎微言絕而異端作大義乖而偏說行孟子大儒也荀卿亦大儒也是豈特開異門故持曲辯哉蓋思有所未至明有所不周耳即二子之說原其始而要其終其於輔教化尊仁義亦殊趨而一致異派而同源也何以明之孟子以為惻隱之心人皆有之是非之心人皆有之性之生善由水之趨下物誘於外情動於中然後之惡焉是勸人汰心源返天理者也荀子曰人之生不知尊親長習於教然後知焉人之幼不知禮讓長習於教然後知焉是勸人黜嗜慾求善良者也一則舉本而推末一則自葉而流根故曰二子之說殊趨而一致異派而同源也雖然孟子之心以人性皆如堯舜未至者斯勉矣荀卿之言以人之性皆如桀跖則不及者斯怠矣書曰唯人最靈記曰人生而靜感於物而動則孟之言合經為多益故為賢乎生不能保七尺之軀死何故隔一棺之土然則衣衾所以穢尸棺槨所以隔真故桓司馬不如速朽季孫璠璵比之暴骸文公厚葬春秋以為華元不臣漢王孫親土漢書以為賢於秦始皇夫葬者藏也藏也者欲人不得見也而大為棺槨備存器物無異埋金路隅而書表於上也吾氣絕之後便即時服幅巾故衣以籧篨裹尸擇不毛之地穿坑下尺平生之物皆無自隨唯齎孝經一卷示不忘孝籧篨之外便以親土若不如此則寃悲沒世長為恨鬼
