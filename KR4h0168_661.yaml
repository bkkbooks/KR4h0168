front:
  text: 全唐文欽定全唐文卷六百六十一白居易六
  hash: sha256:627173d60c5f4c8a045bd52ad19d6408536102659f87f035b834feb63cd97622
body:
  text: 近歲京兆長吏數遷誠不便時抑有其故或鈐鍵不謹吏緣為姦或鉤距太煩人受其弊既非中道皆不得已而罷之宜求恬智寬猛相濟者親諭斯旨使久於其職以息吾人浙江東道觀察使御史中丞李遜十年以來連守四郡或紛擾之際或荒饉之餘威惠所加罔不和輯賞其殊績擢在大藩自臨會稽一如舊政况省科禁以便俗通津梁以息征動遵詔條深副朝旨江南列鎮良帥則多集課程功爾為稱首而內史之選久難其人今豫所求唯爾可使雖表率州部其委非輕然尹正京師所資尤急宜輟材於浩壤佇觀政於輦轂望爾有成無替厥命可權知京兆尹渾金璞玉方圭圓珠雖性異質殊皆國寶也是故能官人者亦辨而用之諫議大夫孔戣靜專貞白不涉聲利執言守事無所依違駕部郎中薛存誠廉潔直方飾以詞藻中立不倚介然風規吏部員外郎王涯端明精實加之以敏懿文茂學尤推於時並歷踐朝行恪勤官次諫垣郎署藹其休聲宜加公獎擢在近侍左右禁闥可以同升必能評奏臺議發揚綸誥臨事有立屬詞可觀各隨所長分命以職祗奉乃事無替厥猷戣存誠並可給事中涯可兵部員外郎知制誥敕六官之屬選部郎首之歷代以來諸曹郎之中擇其踐歷久考第高加以有器局律度者遷焉今之選任亦由是矣兵部員外郎李建文行才理公勤課績可謂具美宜居厥官歲調方殷勉勤爾事可吏部員外郎給事中劉伯芻以文雅才名給事左闥實掌駮議再逾歲時亦謂恪勤宜從遷轉而虢略近郡黎人未康藉爾良能為豫撫字懸賞佇效勉哉是行可授虢州刺史西受降城尤居邊要西戎北虜介乎其間委之郡符建以戎號將守之選宜乎得人前汝州刺史周懷義久列禁衛嘗從征伐又領軍郡率著勤功宜加獎用可屬憂寄况茲要鎮實扼戎吭犄角諸軍扃鐍右地牧人訓旅兼領非輕無替前勞在申後效可豐州刺史天德軍使師長之選重難其人况河上列城鄴中雄鎮初喪良帥思安衆心若親與仁方膺是命某官王某出忠入孝根乎至性好學樂善出於餘力發自修已施於為政可以守土可以長人今兩河之間三軍乏帥是用命爾領茲大藩澄清魏風輯理相土為我垣翰永孚於休往其欽哉無替厥職可魏博等州節度觀察使懋勳德者慶鍾於嗣襲忠順者教本於親於是乎有代及之恩有賞延之命所以光子道而激臣節也茲惟舊典可舉而行某官某惟乃祖父勤勞王家咸有忠功書於甲令降及於爾亦克負荷早承義訓久倅戎麾自罹憫凶能著誠敬恭俟朝命靖安人心雖在幼沖足可嘉獎今屬元戎初喪衆望禺然宜選親賢以為統帥留府之事俾爾專之加戎秩以奪哀遷冬卿以示寵奉揚新命無忘前修爾宜懋哉懸賞佇效可節度留後檢校工部尚書武牢以東至於白馬形勢之地水陸之會宜擇文武兼備者以為守臣右衛將軍薛平自司禁旅為我爪牙訓整警巡能宣其力嘗使於絶國可謂有勞嘗牧於大都亦聞有政况忠厚為質通明為用秉吏道之刀尺襲將門之弓裘可以為三軍之帥可以理千乘之賦俾輟才於北落往節制於東方爾宜式遏四封輯寧百衆明稽以實軍旅信賞罰以勸吏人勉率乃職無忝厥命仍以冬卿副相兼而寵之可檢校工部尚書兼御史大夫鄭滑潁等州節度使觀察處置等使君有舉左史得書之政有闕諫官得補之二職者歷朝之清選也前侍御史盧士玫嘗在西川時為從事亂危潛伏能潔其身前監察御史劉從周頃佐宣城奉公守正端士之操終然不渝時所稱論並宜甄獎况學術詞藻見推於衆並命清貫僉以為宜記事盡規各佇能效士玫可起居郎從周可右補闕前諫議大夫張正一學行器用為時所稱擢居諫官冀效忠讜雖年齒未暮而衰疾有加所宜頤養不可牽率俾移優秩以從致政可國子司業致仕浙右列城吳郡為大地廣人庶舊稱難理多選他郡二千石之良者轉而遷焉鄧州刺史張正甫自領南陽僅經三載廉平清以臨其人人安政和理行第一宜以大郡推而廣之用旌前勞且佇後效可蘇州刺史左司郎中崔清以才良行敏補尚書郎頗積功勤宜加獎任頃嘗為郡亦聞有政平陽舊壤時謂名藩得才與能方可共理安人訓俗佇有成績可晉州刺史敕中憲之設紏謬懲違一引其綱百職具舉非清與直不稱厥官諫議大夫柳公綽忠實有常文以詞學介然端直有古之遺風頃居臺憲纍次郎位持平守正人頗稱之擢首諫司器望益重今副相缺位中司專席惟有守者可以執憲惟無私者可以間邪詢事審官爾當是選光昭新命振起舊章宜一乃心以揚其職可御史大夫馭下安人其道不一或序能以次用或因效以拔才所命雖殊同歸共理某職某官田興時屬本軍初喪戎帥亂政咸啓㣥心不寧而興列在偏裨奮其義勇謀成必中事至能斷智略所及指麾所加一軍獲安百衆附悅連獻章疏恭俟制命有節有理朕用嘉之夫以將材如彼軍情若此允膺不次之舉可責非常之功是用寵之冬卿擢為大將仍以印綬就拜軍中其敬之哉無墮乃力可檢校工部尚書兼御史大夫魏博等州節度觀察等使東朝三少歷代重選不必備位在乎得人吏部尚書鄭餘慶貞明儉素有古人風發自修身施於為政出入中外多歷要重咸有勤績存於官次况動中禮法學綜儒元是謂羽儀之臣可居師傅之任輔我元子爾其勉歟可太子少傅江西七郡列邑數十土沃人庶今之奧區財賦孔殷國用所繫茲為重寄宜付長才同州刺史裴堪素蓄器幹久經任遇日者資其忠諒入為諫議大夫藉其良能出為左馮翊曾未周歲政立績成區區一郡未盡其用鍾陵要鎮可以委之夫其條章平其賦役徇公率正以臨其人而人不安未之有也祗服厥命往修乃官仍兼中憲以示優寵可江西觀察使兼御史中丞生有爵祿歿有褒贈此王者所以崇哀榮之禮厚君臣之恩况有輔臣所宜加等某官致仕佑以通濟之才公忠之節逢時入用為國大臣外領藩鎮內參台鉉積勤盡悴逮過三紀左右於位亦既八年天不憗遺奪我元老憫然興歎實軫於懷永言褒榮俾峻禮命上公之秩用賁幽靈嗚呼録舊旌勞知豫不忘可贈太尉京邑令缺多擇尚書郎有才理者補之兵部員外郎孔戢自御史府遷夏官之屬凡所涖職一心奉公在郎署間稱有名實加以文學緣飾吏能俾宰京劇佇有成效馮翊之地密邇郊畿分內史之政參京師之化俾善所職其在得人京兆少尹裴向器蘊利用學通政事久試吏治頗著良能纍守大郡入亞天府奉上撫下皆有可稱左輔之重爾膺其選况征賦猶重人庶未康實望良才與之共治勉副所舉往修厥官可同州刺史門下朕嗣守丕業殆將十年實賴一二輔臣與之共理故外鎮方域則仗以為將有絳侯厚重之質有邴吉寬大之風自登台司克厭人望頃屬巴蜀軍後人殘權委節旄俾往鎮撫信及夷貊恩加疲瘵每因利以施惠不易俗而修教政無苟得人用便安惠茲一方時乃之績報政既久屬望益深宜歸左輔以參大政夫坦然公道可以敘衆才曠然虛懷可以應㣥務弼違救失不以尤悔為慮進善絀惡不以親讎自嫌用此輔君足為名相欽率是道往復乃官可門下侍郎同中書門下平章事征鎮之大實惟蜀川西距於戎南漸於海有重江復山之險有長轂堅甲之旅水陸交會華夷雜居疇能治之我有良帥山南東道節度使李夷以正事上以臨下仗茲器用纍當任遇執憲之難也爾為臺丞其職甚舉司計之重也爾調邦賦其效可稱爰資長才出領重鎮自總符鉞於漢之南專奉詔條削去弊政均穀籍不一之賦罷舟車無名之征近悅遠來歸如流水俗用丕變人迄小康三載考功爾為稱首進其右秩遷於大藩以均惠乎四方以旌勸乎㣥吏昔文翁明於教化种皓優於政能巴蜀之間遺美猶在不替前效可以嗣之佇聞有成用光厥命可檢校吏部尚書劍南西川節度等使漢以二千石之良者入為公卿周以六官之賢者出兼侯伯內外之任所命則殊至於治軍國寵忠賢其致一也戶部尚書袁滋奉上甚勤臨下甚安人拊衆尤是所長須資其能移鎮東郡略其科禁緩其征徭政不滋彰人用休息在郡七載績成課高璽書徵還益聞遺愛老幼遮道事鄰古人朕方勤恤疲民褒獎循吏纍月再命其有旨哉舉鄭滑之政也故旌武公之美寵以司徒憂襄漢之人也故仗叔子之才委茲征鎮類能而使其在此乎勉揚厥聲無替前效可某官充山南東道節度等使敕近侍之列騎省為貴歷代迄今選任頗重必詢望實而後命之工部侍郎歸登朴忠沈厚心無詭詐介圭不飾止水無波淡然自居以致名稱抱此素行歷踐清貫掌議左掖二職冬官歲時滋深體望益茂可以備顧問應對之選列言語侍從之臣冠附貂蟬立之於右訪諸時論僉以為然可右散騎常侍隋州刺史李程頃自周行出分憂寄漢南大郡守之五年頗著良能宜當選獎况專習文學通知兵事西南重鎮初委元戎慎選副車爾當此舉三軍之重俾往二之仍加憲職以示優寵可御史中丞劍南西川行軍司馬金州刺史李甑雅有文藝飾以政事早從吏職久領郡符謹慎廉平頗副所任虞曹郎缺命以序遷敬茲寵命勉守厥位可尚書虞部郎中河南縣尉牛僧孺志行修飾詞學優長頃對策於庭其詞亮直纍從吏職頗謂滯淹訪諸時論宜當朝選俾升憲府以觀其才可監察御史華州刺史奏華陰令裴克諒在官清白奉法考秩向滿其政如初借留三年用觀成績朕方旌求良吏俾養黎元適副所懷宜可其奏前湖州長史張聿頃以藝文擢升朝列嘗求祿養出署外官名不為身志亦可尚喪期既畢班序當遷俾領水衡以從優秩可都水使者鄜畤延安抵於中部羌夷種落散在其間戎夏雜居易擾難理宜選寬明之使通知邊事者委以符節而糾綏之右金吾將軍薛伾服勤戎職練達吏道出入中外綿歷歲年能一乃心以宣其力自加寵遇再執金吾徼巡有嚴夙夜匪懈在公若是何用不臧况為人沈靜內肅外和按俗守封是其所善宜輟務於誰何俾宣風於廉察庶乎勞徠諸部綱紀列城奉詔條以安人參戎索以訓旅欽承厥命往復乃官仍踐冬卿式光重寄可檢校工部尚書充鄜坊等州觀察使敕太學博士韓愈學術精博文力雄健立詞措意有班馬之風求之一時甚不易得加以性方道直介然有守不交勢利自致名望可使執列為史官記事書法必無所苟仍遷郎位用示褒升可依前件宿州刺史李暈勳閥之門嗣生才略久參戎衛頗著勤勞試守列城觀其為政屬汴泗之右創畫州居府署城池委之經始一日必葺三年有成且聞公勤宜有遷轉重分憂寄再佇良能往安吾人無忝厥命可安州刺史前御史中丞竇易直器質智識厚重間敏文合法要學通政經纍踐臺郎擢司邦憲寬猛舉措甚得其中官不易方府無留事前因病免今以才遷俾升瑣闈以備顧問凡制令奏議官獄典章苟有依違皆得駮正所任不細宜敬乃官可給事中漢制二千石有政績者就加寵命不即改移蓋欲使吏久於官人安其化也常州刺史孟易勤儉以養其人政不至嚴心未嘗怠曾未再稔績立風行歲課郡政毗陵為最方求共理實獲我心宜加命服以示旌寵庶俾㣥吏聞而勸焉宜賜紫金魚袋河南縣令盧元輔早以學藝列在周行嘗守商都頗聞有政再領京縣益見其才江南列郡餘杭為大征賦尤重疲人未康藉爾登車往分憂矚勞徠安輯稱朕意焉懸賞旌能以佇報政可杭州刺史敕金紫光祿大夫使持節沂州諸軍事行沂州刺史兼御史中丞騎都尉傅良弼燕冀之間紛擾之際多壘失守孤城保全介於險中率乃麾下轉戰郊野來覲闕庭徇義滅親忘家喪子忠勤勇烈人所難能若不褒升何勸來者海沂剖竹未足報功溱洧頒條可兼觀政敬承後命無替前勞可使持節鄭州諸軍事行鄭州刺史兼御史大夫散官勳如故敕舊制副丞相缺中執憲得出入御史缺則於內外史中考核其實封奏其名以補之今御史中丞僧孺奏某官張徹某官宋申錫皆方直強毅可監察御史章下丞相府丞相亦曰可朕其從之並可監察御史敕某官殷彪等今之郡守古侯伯也今之邑令古子男也於吏有君臣之道焉於人有父母之道焉郡邑之間承上率下者州長史也凡此之官與吾共理使吾人安而無怨者其在吏良而政平乎金秦之郡也奏告專達得行異政以彪清平信惠臨事能守大小之職率著名績故仍憲俾往牧之南鄭梁之邑也上有賢帥無憂掣肘以同憲河陰有政可以移用故換銅印俾往宰之而絳為名藩辨實良士命之贊二亦叶其宜宜各悉心修舉三職可依前件考功員外郎知制誥獨孤郁學識文行時論所推選自外郎擢居右闥綸言樞命既重且難委以發揮甚聞稱職而端諒忠謹介然自居為臣若斯足可嘉獎官當滿歲職亦逾年宜從美遷以光近侍可司勳郎中知制誥敕中臺草奏內庭掌文西掖書命皆難其人也非慎行敏識夙學懿文四者兼之則不在此選祠部郎中翰林學士錢徽藹然儒風粲然詞藻縝密若玉端直如絃自參禁司益播其美貞方敬慎久而彌彰應對必見於據經奏議多聞於削藁逮今六載其道如初嘉其忠勤宜有遷擢俾轉郎吏仍參綸閣茲乃榮獎爾其敬承可依前件敕吾聞武德暨開元中有顏師古陳叔達蘇頲稱大手筆掌書王命故一朝言語煥成文章朕承祖宗思濟其美凡選一才補一職皆不敢輕易其庶幾前事乎刑部郎中馮宿為文甚正立意甚明筆力雄健不浮不鄙况立身守事端方精敏而我誥命忽思潤色之聽諸人言曰宿也可宿立朝歷御史博士郡守尚書郎在仕進途不為不遇然不登茲選未足其心故吾于今歸汝職業仍遷秩為五兵郎中勉繼顏陳無辱吾舉可尚書兵部郎中知制誥敕六官之屬升降隨時獨吏部郎班秩加諸曹之右歷代迄今未嘗改也則其典職之重選用之精可知矣洛州刺史盧元輔深於文敏於行加以剸犀之利洞膽之明挈而用之無往不適連領大郡至於三四剗訛剔弊迎刃有聲宜付劇司俾之藻制曹選郎缺用爾補員歲調方殷佇揚乃職可尚書吏部郎中敕給事中之職凡制敕有不便於時者得封奏之刑獄有未合於理者得駮正之天下冤滯無告者得與御史糾理之有司選補不當者得與侍中裁退之率是而行號為稱職固不專於掌侍奉讚詔令而已中大夫行諫議大夫雲騎尉滎陽縣開國男食邑三百戶鄭覃清節直行正色寡言先臣之風藹然猶在自居首諫益勵謇諤擢領是職必有可觀亦欲天下聞之知吾獎骨鯁之臣來諫諍之道也可給事中散官勳如故敕西川曰益部地有險府有兵礙戎屏華號為難理故吾命文昌為帥長俾鎮撫焉次命審規為上介俾左右焉又命虞仲戎向會等為庶寮俾咨度焉進言者謂文昌賢而審規輩才以才佐賢蜀必理矣輟三署吏贊丞相府假憲官職加臺郎暨一命再命之服以遣之其於張大光榮與四方征鎮之賓寮不侔矣爾等苟佐吾丞相以善政聞使吾無一方之憂吾寧久遺汝於諸侯乎爾其勉之可依前件
