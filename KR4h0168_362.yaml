front:
  text: 全唐文欽定全唐文卷三百六十二悅元宗時人著三國典略三十卷
  hash: sha256:b676b5a71e6a90c1e30278741fcc528da8b8cb47c9cb2c9528d9501e97b1c905
  markers:
  - {type: head, offset: 14, content: 邱悅, id: KR4h0168_NFKB_362-h1, level: 1}
body:
  text: 奉為亡妣扶陽郡太夫人天水趙氏所造夫人故司列少常伯仁本之女今左威衛將軍東都副留守諫之姊夫人幼柔婉長賢明詩禮天然圖史暗合家君之為相也特見奇異常謂女師輔佐君子能循法度是稱婦德徙宅垂訓多著才名斯為母儀年七十七薨合祔京兆終天永奪泣血無追唯托能仁用資冥果坎巖壁現真容因高製龕即空疏座東臨伊水百億津梁北走鼎門大千方便所願上升忉利功德證明晏坐耆闍神通無㝵斯石不朽茲山永固窮佛劫以長存拂天衣而無盡銘曰彌陀得道四劫前莊嚴幽路百福先法身不朽山石堅昊天罔極佛日懸利建天寶十三載柘城縣令初利建之登於王畿也聞宋有柘城大夫隴西李公之德能媚於神而和於人者久矣及是而與之差肩焉觀其闕一字揚闕二字祇率訓典逾灑然而異之亦既詢事考言果於入境知善邑老皆稱曰人之不安由黠吏肆暴政之不一或亂法滋彰公下車視俗執轡遵途豶豕之牙府庭憚其強項除馬之害閭井佽於洗心令修伍鄙之間理浹四封之內莫言一朝之便皆務闕一字身之功焉以為豪右兼并不均之所從也糾逖以裁制之孱弱轉移流亡之所起也勞賚以安輯之登其孤終協其出入倉廩既實闕一字理闕四字人之居矣阜其財求明其利弊㣥萃州處心安不遷士既閒燕以詳求典禮農服犬畝而察時節用商安市井識貿遷之利工守闕一字習辨功苦之宜是成人之事矣然後設奸宄之禁制吉凶之禮廉讓興而奪攘寢故扃鐍不用長幼順而闕二字達故絃誦日聞莓苔蔓聽訟之庭蛸蠨網思過之戶事無巨細必也躬親道有汚崇於焉適衷牛刀在握而窽卻餘地龍劒出匣而魑魅慙形到理聞其小康滿歲稱其大賴邑自成於保障賦不域於繭絲郡守襜冕唯頒詔令遊士幣帛兼禮才賢闕二字下於琴堂譽已充於軺傳以管子之術御下用平仲之心奉上莫不以石投水若礪資金故道不虛行人仰攸塈勝殘去殺百姓稱仁焉省徭薄賦百姓稱寬焉敬上愛下百姓稱順焉輕財重義百姓稱廉焉信有長闕一字使人之術寬肅宣惠之美寬所以保闕一字也肅所以濟時也宣所以施教也惠所以合人也若此而不令聞闕一字世者未之有也其或止灌壇之風雨息中牟之災沴則理符闕二字無得而書今太守越國李公明照肝膽首加賞譽十縣之內一人而已子徒見能政之所以成未識有開之所由然夫以理官謨九德柱天涼重元疑武昭王之勤恤遠黎姑臧公之發揮餘闕一字而不澤流後裔寵集時賢者乎太翁雲將皇給事中常州刺史與房元齡等十八學士曳裾秦邸可不謂文乎王父元道皇尚書右丞隴州刺史闕二字行已終始若一可不謂忠乎昭考絳皇職方郎中滑州刺史不闕三字克開後人可不謂榮乎公名仲華字仲華以隴州之忠而納之以常州之文閎之以滑州之闕一字露知事君必闕三字幼也闕二字以從令壯也闕一字志而用令冠也和安而闕二字曾謂成人矣加之闕二字山闕一字仞而闕一字戢雲雨玉闕一字千尋而潛伏珍奇歟爰以闕二字內闕一字之年闕二字擢闕一字賈誼登朝之歲分陝參卿以選授汝南郡録事參軍振闕二字凋章善疸惡六條隨其指顧八使任之耳目以清白上聞俾作宰於是邦適名著於彼遽政成於此庶幾坐闕一字廊廟廟闕一字是闕五字員外丞巨鹿魏崇仁故太師鄭公之曾孫也忠闕一字有闕一字祖遺風問望允時賢攸屬丞王嶷沈潛溫克潔淨闕八字實膏梁人惟俊穎耆壽等華髮含光顛毛闕一字齒闕一字督録事等謹身稟命所奉竭誠惕槐檀之火遷惜桃李之飧闕二字日闕五字光耿於人多矣闕一字欲社而稷之尸而祝之闕一字或闕二字期在他日姑務稱伐之典其庶銘勳之義由是述旨於闕二字假詞於闕四字為政如多方人利百倍故天錫純嘏神應嘉生夫自足於躬不知日用之力從事於此誠悟歲計之餘是用紀闕六字以遵之以光昭闕一字君之令德乃作頌曰隴山峩峩渭水湯湯輔我盛族兮與代偕昌左轄之孫專城之子誕守丕業兮世繼其美分陝參佐汝南綱紀聲聞于天兮作闕一字于輔闕二字乘馬稅于株野此邦之人自天祐者所祐何居茂宰綏之昔也股無胈今也足生氂適歎來暮旋嗟去思分勢駸駸高駕難闕一字千金闕一字字以立闕一字碣頌美闕二字啓闕三字端開元二十七年官崇文館校書郎歷監察御史自我大師堅林示化不有像設人何以依小大之功蓋存乎願瞻彼朔易有大像焉厥高羌而不可乎彌度則我前太守盧君之所立盧君諱暉字子晃自尚書郎保釐我郡張皇軍容簡而明慧而肅害必革利必興爰徙軍爰置邑創闤闠飾招提遠者懷近者悅戈甲以理奪虜氣於塞外童耋以樂被氓謠於域中然猶躬行屬縣求人之瘼相彼村閭古多精舍往往陀陊而法鼓存焉或播或柞或鬱或震莫睹筍簴之狀寧聞宮徵之音君曰咨時則有若黃耉鮐背之老數百人隨車而請曰惟是衆多之金委於草莽不敢散為凡器以速戾實願合為真容以祈禠君曰善且俾五臺沙門大端慮事樂施之力一惟百精誠之心百惟一炭嶺屬爐谷呀人雲屯士冖䂞雷動黃白之氣竭青氣生焉於是化天下之至剛為天下之至柔以至柔入無間亦既成像復歸於剛衆奔走而觀之則三十二相備矣計功者蓋莫知其衆寡徒駭其不日而成也度財者又莫知其少多徒歎其不召而至也非我人心之歸於君君惠之及於人何以能之是舉也可以觀政矣間一歲使臣以君政尤異聞於帝帝用嘉之錫以束帛有由然也伊追琢之功未既而惠盧君遷於瀛田君至自靈誕敷至化纘戎前功爛朗景彰飾道盡矣戊寅歲易人思邵父美杜母嘉願力謀不朽是用託頌於端端文館之吏也敢不祇若頌曰崇崇睟容法之尊兮優優庶政直而溫兮如茨如陵不騫不崩福永存兮愈元宗時官左拾遺大師諱景賢菩提大通法允也本姓薛氏汾陰人世為著族容貌秀偉見者肅然幼而神明周覽傳記弱冠投心大覺宿好都遣問道於闕一字陽智寶禪師師言法王大寶世傳其人今運鍾江陵玉泉次一佛出世亦難遭矣則星馳駿邁而得大通發言求哀揮汗成血大通照彼精懇喻以方便一見悟入冏然昭洗屬世議迫隘遠迹幽絶客居巴峽三抗山中山尋霓谷無景豺虎搏噬毒癘蒸鬱而我歲時宴居初無惱害豈闕一字為之守而神靈保綏良可知也久之廣大圓極悉心以獻大通怡然克荷相許付寶藏傳明燈為不讓矣時神龍闕一字歲也中宗聞風詔請內度法衆仰德乞留都下大師雅尚山林迫以祈懇或出或處存乎利濟化自南國被乎東京向風靡然一變於代蓋三世諸佛意闕一字法印妙極之用言外之功不可得而聞也觀乎萬形蠢蠢於黑暗千界熙熙於熱毒如來有以登大明灑甘露雖相示寂滅而業遵龍象則我先佛法身湛然常住者矣始先祖師達摩西來歷五葉而授大通赫赫大通濟濟多士寂成福藏爛其闕一字門同波派流分景並照亦東闕一字之盛也嘻世相不實應盡誰留菩薩知時示同於物開元十一年龍集癸亥歲八月在嵩山會善道場現有微疾沐浴宴坐神情儼然翌日而謝春秋六十有四雲山慘毒庭樹雕摧矧夫情靈痛可言也門人比邱法宣比邱慧巘比邱敬言比邱慧林等不勝感戀奉為建塔迢亭赩赫出於嵩半主上追懷震悼賜書塔額署曰報恩存沒榮幸山川光燭草年又起身塔於北巖下永奉安焉若其積微成著之勤乘定發慧之用堅剛勇猛之操大悲廣衍之業率皆碑版所詳不復多載也立佑開元朝官侍御史萬邦作乂同乎文軌百度為貞崇其禮樂祖考來格神人以和必四夷而克諧明庶土之交正國家一其區㝢無思不服歲覲有差方物斯備越裳重譯爰歸翡翠之賝大宛久開攸聞汗血之獻故得鞮鞻是別聲律會同諭彼來王昭其率舞擊石拊石歎入於豫以雅以任義興詩頌泉魚涵泳聽朱絃而屢升雲鳳騫回訓金奏而不去考都鄙之所習順操土風混夷夏之聲塵以廣朝命各得其所無相奪倫明九序之惟歌均兩階之無事甲之所訓亦無懵焉人則未從其為過矣且南方北方之樂惟禁惟任之名既人絶而路殊誠有條而不紊辨方正位允執其中明罰敕法亦可不罔和以人神文之金石所以發揮時政導揚國風惟景職在伶倫克諧聲律笙鏞以間本歌頌而知音鐘鼓是陳謂鏗鏘之在耳師也有教藝則不孤故得遠會生徒方來胄子教成難色功正在於發蒙獎勸多方亦何疑於進考季鴒元宗時人開元二十年有敕將幸太原重巡潞藩上顧謂侍中裴光庭先擇才能俾宿儲供公以左拾遺膺是選也潞州八邑屬時不稔上下克辦實多宏益朝廷稱之公名僅字沖用漢御史大夫廣漢之後以儒術學業遂登三公直言諫諍退官終寵其後自沛居河代有丕烈公七代祖辨後魏侍中汾陰武侯六代祖謙中書令涪陵元公英武忠肅魏書有傳曾祖範隋本州州都皇朝硤州刺史祖文度曹州刺史父元儉溧陽鄞二縣令光州司馬並政理清白見重於時公受天正性承家具美敦龐重朴負經濟大才優間江海紫薇令姚公黃門監盧公特奏有學有文身材拔萃起家授洪洞尉刺史蕭瑗許以公輔之器羽林大將軍楊敬述持節河西以才略奏請充管記秩滿授江陽丞長史王易從李朝隱以公清正直攝江陽江都海陵三縣令中丞宇文融殿中侍御史咸廙業並引為判官狀稱滑吏畏威而破膽㣥萌飲惠以息肩奏才學惟高公清特立公操斧則伐拂鐘無聲淮海之間義風一變會有制命舉才高未達沈跡下寮宏詞博識至公從正者上御紫宸殿親試親考入拜獻替之司正議鯁詞多所獻納御史大夫李朝隱屢有推薦竟無升擢及公之出宰也以擅美對揚推能撫字將化風俗且辭掖垣議者為屈公無慍色躬親庶務朝夕勤勞寒者衣之飢者食之二十一年人尤困餒公輸出私米兼賑官糧徙死得生百餘萬計敕使少保亠兊公深加器異當朝談獎狼暴出境鹿馴於邑廣開郵閈大創厫倉南填巨坑北防深水太原尹王公以殊政奏長史李植以異能上七年在任無風雨霜雹水旱蟲蝗之害長史李公又考其孤清耿介冰碧在懷乃居高平山業公與祕書監賀知章中書侍郎嚴挺之虞部郎中褚光為塵外之交嚴稱云難進易退翺翔宇宙之間廓然不可得而見褚每云暗與道合神超造化賀之篇翰往來精密公每讀古史及聞時說有一仁一義一忠一孝者未嘗不慷慨涕泣絶薰腥救窮急傲然獨得情智耿然君子稱之飄飄雲霄之氣磊磊棟梁之骨方將出地絡以遐邁超天衢而高視十七鄉父老崔亮臣郭全璧等五百餘人式刊善政季鴒作頌傳於終古詞曰我公兮肅英徽粹河汾穆崇闈我公兮深厥政稽邦典活人命我公兮豁虛受洞㣥友垂大久貽開元朝官侍御史內供奉求賢審官分職揆務必資慎擇乃罔姦邪惟彼禮闈式蒸髦士固宜品藻而無失夫何銓管而是昧所以懷山濤識量蘊毛玠公方擇其琳琅誰云非允刈乎梓孰曰謬賢嗟爾伊人議乎取士類匡衡之述古多所引經同谷永之上封獨將言事教隳邦典政敗豎儒且涉緣情殊非革弊天官嘉選是曰司存月卿薦賢恐成離局希言鄭惠王元懿孫鄂州刺史璥子開元中為右金吾大將軍再遷太子詹事楚州淮海北距江水南濱挹桐柏之遙源酌柴桑之遠派人沐無為之化家覃孝理之風殷賢志切茹荼誠深負土故得靈芝三秀如馬如龍甘露載垂為珠為玉鳴琴邑宰先以檢尋集竹州司欲加旌表但餐和飲德日用猶迷舞鶴翔鸞天心有屬瑞允彰於周德孝因感於殷賢梁靜雖陳還宜準此愔愔琴德先聖所營詠薰風以解慍歌白雪而成操士具不徹國有其官將以蕩滌放心發揚和氣不有君子其能爾乎乙學安絃同宣尼之不進伶將執撲異師襄之下拜已習其數又得其人聞諸禦寇之書是曰文王之操若伶人子弟先父職官苟慢常以致尤遂飾詞以文過則檟楚之道何所疑焉良嗣天寶時人王者制義所以祿賢能人臣奮庸於是受錫命甲自天祐實勞王爵大邦吉士小雅藎臣崇其徽章假其禮物漢詔求士寵錫惟重周官賜則命數未宏既曰不如守官且能辭不失舊密邇侯服公卿采地非成國之制無出就之義魯叔孫之朝王賜之先輅鄭豐段之如晉受以周田豈可比諸侯之撫封等功臣之就國薄言之訴誠謂有孚慎乃攸司寧宜假器維開元二十八年歲次庚辰月朔日寧王妃元氏薨於西京之第旋窆于某塋天未忘釁相次徂落其明歲十一月二十四日王薨在殯制冊為讓皇帝且有後命追諡妃為恭皇后蓋以王有讓統之實而妃有恭德之美所以考行追崇皆聖皇天倫篤愛有光於古先者也粵天寶元年五月乙已朔十七日庚申將遷祔于惠陵王薨及葬凡為七月天子之禮也命侍臣敘以書冊其詞曰皇矣有熊處乎元宮衣冠所在祗允無窮以武而興復于土中以文始大元氣比崇禮侔周恪慶漸柔風展我邦媛倫昭有融至靜委和如天克令莫莫中谷夭夭作詠黃繶遵容素紗增映鑒圖閲史陰儀壼政帝寵元昆妃承纍命降家人之禮擬陰安之盛鵲巢化行人倫以正或幾望於終古故守沖而益敬祥開夢兆服媚蘭蓀女延湯邑男受推恩緑車齊軫綵㦸盈門各稟柔訓常貽話言天授戩穀無非審諦歸賵事凶毀臺成沴圓月忽蝕朝雲亦霽滅綵韶陽收華邸第嗚呼哀哉魯宮未考津門遽哀帝以讓而追諡后從夫而永陪褕翬暫舉璋瓚誰開用小君之備物怨吾王之不來嗚呼哀哉娥輪半上蜃輅將移追雙旐兮遲遲卷六衣兮披披青門一別兮不駐素滻既濟兮相隨入長陵之松柏顧漢苑兮參差司馬門兮纍纍恭后墳兮在斯嗚呼哀哉會開元二十九年官郴州太守惟前漢蘇耽者長自郴邑稟之秀異幼則適野初因牧牛桂陽之邱每遊虞芮之畔遂因有間原之田縣人王懷步田閒值㣥鶴乃跪白其母潘氏曰忝在仙籙又逢真侶迫以騏驥之便切以庭闈之戀咒橘井愈疾為取給之資藥苗蔬畦為調膳之費有闕就養將升上清遂留連堂戶出涕如雨聳身而去莫知其所揮城郭以謝世乘羽翼於無際且五雲之路縹眇難追而一郡之人瞻望何及皆相謂曰蘇公以金骨邁俗瓊漿繕性能養其正不失其命亦猶梅子真之去仙非關市卒成武丁之輕舉元由鄉人傳其盛名布在方冊蓋殊倫矣及潘氏怛化之後仙公全以孝行棲于東山烟霧之中號哭不絶啼猿為之酸切流水為之嗚咽至若繫白馬於樹執慈母三年之喪所以竭哀戚之情也化赤龍為橋感太守一弔之禮所以重桑梓之敬也當此之時近覩之難可得而見遠察之才可得而辨豈不以貞氣有異囂塵無雜也且人之立身者一善則紀之一行則稱之猶與美談綽有餘裕况列仙是紀曠古莫儔將歸紫府之中相與赤松為交向非餐霞契道外物全真其孰能至於此矣巨唐開元二十九年也特有明詔追論偓佺俾發揮聲華嚴飾祠宅皎潔遺像似逢姑射之人氛氳晚花何異武陵之境深院風灑松聲為之淅瀝古壇烟橫苔色為之彬碧邑中耆艾禺然曰仙公之舊宅仙公之靈跡華表猶在空山相對今荷皇恩遠及祀典克明請考盛事皆願刊石時郴州太守樂安孫會文房之士也遂為之銘其詞曰靈啓道融降生仙公無宗無上冥感幽通至者不學學者不至莫知其然蓄踐神異孝悌是惇州壤是尊自藏於畔孰是其根襄城之野仙公牧馬桂陽之邱仙公牧牛千古一致比德同儔上清有命升元克寸日永言孝思敬授靈術既超世而離人復軫慕而哀親近賢者之喻夢表斯道之通神獨蘊殊行高標衆真至哉仙公邃古無倫符守故國載思載慕龍橋不留馬嶺如故徘徊塵跡髣佛雲步
