front:
  text: 全唐文欽定全唐文卷七百七十六李商隱六
  hash: sha256:4a5dead293858f5a510d409c4ab4c64ad98091b657deee37c3e0a15a3caf1704
body:
  text: 姚熊頃時鬬毆偶在坤維阿安未容决平遽詣風憲當道頻奉臺牒令差從事往推去就之間殊為未適顧惟敝府託近貴藩雖蒙與國之恩猶在附庸之列仰遵教指尚懼尢違敢遣賓僚往專刑獄自奉臺牒夙夜兢惶今謹差節度判官李商隱侍御往以今月十八日離此某素無材効早沐恩憐獲接仁風實為天幸頗希終始以奉恩光事大之心朝暾是誓其他並附李侍御口述伏為照察中丞閤下愚生二十五年矣五年讀經書七年弄筆硯始聞長老言學道必求古為文必有師法常悒悒不快退自思曰夫所謂道豈古所謂周公孔子者獨能邪葢愚與周孔俱身之耳以是有行道不繫今古直揮筆為文不能攘取經史諱忌時世百經萬書異品殊流又豈能意分出其下哉凡為進士者五年始為故賈相國所憎明年病不試又明年復為今崔宣州所不取居五年間未曾衣袖文章謁人求知必待其恐不得識其面恐不得讀其書然後乃出嗚呼愚之道可謂強矣可謂窮矣寧濟其魂魄安養其氣志成其強拂其窮惟閤下可望輒盡以舊所為發露左右恐其意猶未宣洩故復有是說某再拜子直足下行日巳定昨幸得少展寫足下去後憮然不怡今早垂致葛衣書辭委曲惻惻無巳自昔非有故舊援拔卒然於稠人中相望見其表得所以類君子者一日相從百年見肺肝爾來足下仕益達僕困不動固不能有常合而有常離足下觀人與物共此天地耳錯行雜居蟄蟄哉不幸天能恣物之生而不能與物慨然量其欲牙齒者恨不得翅羽角者又恨不得牙齒此意人與物畧同耳有所趨故不能無爭有所爭故不能不於同中而有各異耳足下觀此世其同異如何哉兒冠出門父翁不知其枉正女笄上車夫人不保其貞汙此於親親不能無異勢也親者尚爾則不親者惡望其無隙哉故近世交道幾喪欲盡足下與僕於天獨何稟當此世生而不同此世每一會面一分散至於慨然相執手嚬然相慼泫然相泣者豈於此世有他事哉惜此世之人率不能如吾之所樂而又甚懼吾之徒孑立寡處而與此世者蹄尾紛然蛆吾之白擯置譏誹襲出不意使後日有希吾者且懲吾困而不能堅其守乃捨吾而之他耳足下知與此世者居常紿於其黨何語哉必曰吾惡市道嗚呼此輩真手搔鼻皻而喉噦人之灼艮為癩者市道何肯如此輩邪今一大賈坐墆貨中人人往須之甲得若干曰其贏若干丙曰吾索之乙得若干曰其贏若干戊曰吾索之既與之則欲其蕃不願其亡失口舌拜父母出妻子伏臘相見有贄男女嫁娶有問不幸喪死有致饋葬有臨送弔哭是何長者大人哉他日甲乙俱入之不欺則又愈得其所欲矣迴環出入如此是終身欲其蕃不願其亡失口舌拜父母益嚴出妻子益敬伏臘相見贄益厚男女嫁娶問益豐不幸喪死饋贈臨送弔哭情益悲是又何長者大人哉惟是於信誓有大期漫然後罵而絕之擊而逐之訖身而勿與通也故一市人率少於大賈而不信者此豈可與此世交者等耶今日赤肝腦相憐明日衆相唾辱皆自其時之與勢耳時之不在勢之移去雖百仁義我百忠信我我尚不顧矣豈不顧巳而又唾之足下果謂市道何如哉今人娶婦入門母姑必祝之曰善相宜則祝曰蕃息後日生女子貯之幽房密寢四隣不得識兄弟以時見欲其好不顧性命即一日可嫁去是宜擇何如男子者屬之邪今山東大姓家非能違摘天性而不如此至其羔鶩在門有不問賢不肖健病而但論財貨恣求取為事當其為女子時誰不恨及為母婦則亦然彼父子男女天性豈有大於此者耶今尚如此况他舍外人燕生越養而相望相救抵死不相販賣哉細而繹之真令人不愛此世而欲往走遠颺耳果不知足下與僕之守是耶非耶首陽之二士豈蘄盟津之八百吾又何悔焉千百年下生人之權不在富貴而在直筆者得有此人足下與僕當有所用意其他復何云云但當誓不羞市道而又不為忘其素恨之母婦耳商隱再拜去一月多故不常在故屢辱吾子之至皆不覩昨又垂示東岡記等數篇不惟其辭彩奧大不宜為冗慢無勢者所窺見且又厚紙謹字如貢大諸侯卿士及前達有文章積學者何其禮甚厚而所與之甚下耶始僕小時得劉氏六說讀之嘗得其語曰是非繫於襃貶不繫於賞罰禮樂繫於有道不繫於有司密記之葢嘗於春秋法度聖人綱紀久羡懷藏不敢薄賤聯綴比次手書口詠非惟求以為已而已亦祈以為後來隨行者之所師稟已而被鄉曲所薦入來京師久亦思前輩達者固已有是人矣有則吾將依之繫鞵出門寂寞往返其間數年卒無所得私怪之而比有相親者曰子之書宜貢於某氏某氏可以為子之依歸矣即走往貢之出其書乃復有置之而不暇讀者又有默而視之不暇朗讀者又有始朗讀而終有失字壞句不見本義者進不敢問退不能解默默已已不復咨歎故自大和七年後雖尚應舉除吉凶書及人憑倩作牋啟銘表之外不復作文文尚不復作况復能學人行卷耶時獨令狐補闕最相厚歲歲為寫出舊文納貢院既得引試會故人夏口主舉人時素重令狐賢明一日見之於朝揖曰八郎之交誰最善綯直進曰李商隱者三道而退亦不為薦託之辭故夏口與及第然此時實於文章懈退不復細意經營述作乃命合為夏口門人之一數耳爾後雨應科目者又以應舉時與一裴生者善復與其挽洩不得巳而入耳前年乃為吏部上之中書歸自驚笑又復懊恨周李二學士以大法加我夫所謂博學宏辭者豈容易哉天地之災變盡解矣人事之興廢盡究矣皇王之道盡識矣聖賢之文盡知矣而又下及蟲豸草木鬼神精魅一物巳上莫不開會此其可以當博學宏辭者邪恐猶未也設他日或朝廷或持權衡大臣宰相問一事詰一物小若毛甲而時脫有盡不能知者則號博學宏辭者當有罪矣私自恐懼憂若囚械後幸有中書長者曰此人不堪抹去之乃大快樂曰此後不能知東西左右亦不畏矣去年入南塲作判比於江淮選人正得不憂長名放耳尋復啟與曹主求尉於虢實以太夫人年高樂近地有山水者而又其家窮弟妹細累喜得賤薪菜處相養活耳始至官以活獄不合人意輙退去將遂脫衣置笏永夷農牧會今太守憐之催去復任逕使不為升斗汲汲疲瘁低儽耳然至於文字章句愈帖息不敢驚張嘗自呪願得時人曰此物不識字此物不知書是吾生獲忠肅之諡也而吾子反殷勤如此者豈不知耶豈有意耶不知則可有意則巳虛矣然所以拳拳而不能忘者正以往年愛華山之為山而有三得始得其卑者朝高者復得其揭然無附著而又得其近而能遠思欲窮搜極討灑豁襟抱始以往來番番不遂其願間者得李生於華郵為我指引巖谷列視生植僅得其半又得謝生於雲臺觀暮留止宿旦相與去愈復記熟後又復得吾子於邑中至其所不至者於華之山無恨矣三人力耶今李生巳得第而又為老貴人從事雲臺生亦顯然有聞於諸公間吾子之文粲然成就如是我不負華之山而華之山亦將不負吾子之三人矣以是思得聚會話既往探歷之勝至於切磋善惡分擘進趨僕此世固不待學奴婢下人指誓神佛而後巳耳吾子何所用意耶明日東去既不得面寓書惘惘九月三日宏農尉李某頓首伏以春日青陽歲當更始思將萬壽以奉三台伏惟相公與國同休自天逢福唐堯之八十六載永奉宸聰周文之九十七年長承睿算某方臨征鎮伏賀無由攀戀禱祠不任丹懇伏以律中太蔟月貞孟陬迎祥既積於元正善祝方資於難老伏惟相公金相轉瑩玉德踰資小甘茂之十官倅叔敖之三相使巖廊之上永作吾家埏埴之功長為巳任某方臨戎鎮拜賀末由攀戀禱祠不任丹懇伏惟鑒察學士位以才昇官由德舉光揚中旨潤飾洪猷允謂當仁果從真拜墨丸赤管豈滯於南宮黃紙紫泥聊過於禁掖鳳池甚邇雞樹非遙副此具瞻當在後命某燒烽邊郡題鼓軍門仰鸞鶴於煙霄空悲路阻顧蟣蝨於介冑尚恨形留拜賀未期欽戀無喻不審近日尊體如何伏計不失調護鄴都奧壤漢相威名出則主諸侯之名以除叛亂入則峻將軍之令以養疲羸作大君之膂腸樹列國之標表名光圖史勳溢旂常凡在小藩永佩高義屬封疆僻左民落凋殊奇貨難求使材莫稱相公曲垂記奬先降尊嚴李押侍御右職名家多聞好禮遠持書幣逕冒風波受賜踰涯傳情曲盡載思復命未得其人輙託還裝用申徵獻路遙漳水夢隔頓邱未期胥命於蒲但仰餘波及晉勤拳夙夜師慕忠貞伏惟仁恩亦賜知察相公克佐昌期允符俊德耀握中之至寶高價難酬縱堂上之竒兵善師無敵述成徽冊導降恩波由中祕書兼大司寇羅含吞鳳追佳夢於當年少皡爽鳩集芳塵於此日百蠻仰化九縣畏威某早奉陶甄謬當藩服雖深抃賀未卜趨承遵呂刑而但戒守官望魯酒而必期盡醉抃躍瞻戀不任下情近巳有狀不審諸况比復何如待詔漢廷但成老大留歡湘浦蹔復清狂思如昨辰又巳改歲以公美之才之望固令早還廊廟速泰寰區而辜負明時優游外地豈是徐公多風亭月觀之好為復孟守專生天成佛之求幸當審君子之行藏同丈夫之憂樂乃故人之深望也李處士藝術深博議論縱橫敢曰賢於仲尼且慮失之子羽云於江沔要有淹留便假以節巡託之好幣十一月初離此訖末由披盡勤戀增誠其他並付使人口述不審近日諸况何若第高標令範早映朝端惠露仁風載光藩寄况地雄東海郡控南徐當皇心妙簡之難是國用取資之地斯焉假道以副具瞻况忝亢宗允俟嘉會此方且多雜俗又異奧區但餘江山記在方誌然將以比西州東府白下朱方則亦遼豕為慙葉龍知懼矣而里閭凋弊谿洞幽遐內惟短材常愧尸祿道路綿邈懷抱凄凉未期雲霧之披空屬池塘之思餘并附某乙口述伏見制書尚書克懷懋德心贊明時殊祥取貴於龜龍大樂受鈞於金石以秩宗典禮以司馬總戎况潁水遺封許田奧壤鞏洛亘其後宛葉居其前版籍則方城之外人幕府則淮陽之勁卒唯茲巨訪疑實屬當仁荀爽驟拜司空黃霸入為丞相遺踪且在後命非遙早忝恩加倍注誠款近者黨項侵擾西道崛強北邊仰聞天威將事電掃果從貴府首建行臺葢以藉司徒大鹵之先聲壺關之舊戌謀於㣥后允屬當仁凡在藩方不勝欣愜伏計上軍巳有行日諸將并受嚴期是賈復先登之秋乃樊噲橫行之日弓聲破漠劍氣凌雲但恐犬羊不足以當誅鋤鐘鼎不足以銘功業某素無韜畧謬忝恩榮當悲苦之餘值空困之後前騶負羽不展平生瞻望中權唯積私懇伏惟俯賜亮察相公祥金淬刃㣥玉排峯樂和而穴鳳來儀氣正而路牛無喘歸美既彰於天載懋官旋踐於春卿周官則日諧萬人虞書則日典三禮苟非全氣孰贊昌期係萬國之懸誠加一人之德色某早蒙恩異今創辭離蘭省春深伏謁尚遙於八座桂林夜靜仰占唯見於三台抃賀末由戀結空極蒙恩左遷不任感懼某謬居職守實昧官常不能朿矢窮辭鈞金就直屢移時序竟致紛披故府李相公案吏之初具獄來上某久為賓佐方副臺綱若其間必有阿私則先事固當請託實無一字難誑九泉崔監察是湖南李相公門生是某所拜雜端日御史遠差推事既無所囑求近欲呌寃豈遽能止遏不知何怨乃爾相窮容易操心加誣唱首門生之分尚或若斯常僚之情固無足算九重邃邈五嶺幽遐若從彼書辭信其文致即處於嚴譴未曰當辜直遇侍郎察以疎蕪知非侮鬻照姦吏之推過略崔子之枝辭特念遠藩獲用寬典纔移廉部尚處頒條實繄如燭之明敢不知風所自末由謁謝空抱款誠不審近日諸趣何如越水稽峯乃天下之勝概桂林孔穴成夢中之舊遊遐想風姿無不暢愜一分襟袖三變寒暄雖思逸少之蘭亭敢厭桓公之竹馬况去思遺愛遐布歌謠酒興詩情深留景物庾樓吟望謝墅遊娛方知繼組之難不止頒條之事今者冰消雪薄江麗山春訪古跡於暨羅探異書於禹穴不知兩樂何者為先幸謝故人勉自遵攝未期展豁唯望音符其他并附喬可方口述蒙恩左遷不任感懼某頃以疎拙謬副紀綱不能辨軍府之獻囚折王庭之坐獄將踰五載終辱三司過實巳招咎將誰執故府李相公知舊之分與道為徒戎幕賓筵雖則深蒙奬拔事蹤畫跡實非曲有指揮逝者難誣言之罔媿且崔監察元藻是湖南李相公首科門生是其所薦御史將赴淮海私間尚不囑求及還京師公共豈能遏塞昨蒙辨引稍近加誣座主既不免於款中雜端固無逃於筆下乘時幸遠背惠加誣既置對之莫由豈自明之有望若據其證逮按彼詞連則處以嚴科無所逃責猶賴九天知其乖運伏念非欲固用深文不從鍜鍊之科得在平反之數揣心知幸感分增榮拜謝末由惶戀無極近已遣押衙喬可方齎少信幣聘謁計程巳過衡湘方將遐仰清風不謂先霑膏雨今月二十日專使林押衙至緘詞重疊贈貺豐厚皆晉地之所生也而秦不產一物焉使乎方來巳承徵詔下車投兩則致謳謠高浪順風難窺飛止榮聞休暢何樂如之某頃副憲綱昧於官守早乖審克久乃發揚舊吏常僚微有誣引小藩遠地難自辨明若從文致之科合用投荒之典尚蒙恩宥獲頒詔條省罪撫心不任感懼鄙人嚮學之後操心有歸至於率履公塗承迎親友雖多乖時態或不愧座銘又用高明常所照信至於機微之會用捨之間既有命有時亦何思何慮更將尚口彌失處躬以今月二十三日南去家無甚累官忝古侯外以勸課蠻夷內以訓摩子弟惟將悔過以立後圖鄧禹之止望功曹赤也之願為小相古猶有是余獨何人不因遭值聖明階緣叨竊則修揚郡守乃山東書生禱祠之所求也負責雖懼循涯則驚多謝故人慎加頤保騰凌紫闥步武青雲時因南風不至遐棄厚幸某啟今月某日得當道萬安驛狀報伏承遣兵馬使陳朗賫幣帛鞍馬辟召小男者未敢尋盟遽茲聞喜遐瞻閽闥恨乏羽毛伏以自有搢紳誰無交結朋友不全素諾在古殊多父子同受深知當今罕見豈期令德圖於所難男珪曾未成人纔沾下第辦仲謀之菽麥雖則有餘况安石之芝蘭竊將不可忽依大府便厠英僚東吳之咍恐自此始西園之讌未知如何此皆相公以某謬接藩維久依繩墨克降由衷之信將酬事大之心不然則安得拔童子於舞雩禮諸生於白社身枝獲慶城府知歸感激恩光丁寧教誡永言銘鏤尚昧端倪伏候簡書來至敝邑則專請張覿評事奉啟狀申陳慕義無窮措辭莫盡攀附惶戢不能究陳謹啟某啟伏奉榮示伏蒙辟署某第二子前鄉貢進士珪充攝劍南西川安撫巡官并賜公牒舉者某去月得楊侍御書題微傳風旨初如吉夢終謂戲談非不尋思莫得端緒今乃竟詢仲允果降嘉招伸紙發緘悸魂流汗何者某頃居班列巳奉陶甄口裏雌黃屢加雕煥胷中雲夢過沐涵濡掀之以順風暖之以愛日茲辰議報不在他門一昨叨列土田謬分旗葢適當東道獲事西鄰豈望信在言前榮流意外坤維接畛何酬上相之知坎卦成名遂報中男之喜且渠譽乖郗桂名媿謝蘭未學周南召南纔得一科一第縱解問絹不能負薪將何以與先生並行從大夫之後仰塵帷幄佇雜簪纓况襟帶禺同咽喉巴濮求於安撫必也機謀深慮異時莫副虛佇然竊尋史傳所載語父子之間雖石苞獨異石崇而山濤不知山簡亦豈敢保其孱陋遽遣退藏但當授以一經訓之大杖庶將寡過以謝明恩染翰銜情封牋寫抱小人多事拜台席以猶賒童子何知上賓階而在即瞻望閽闥死生以之伏惟深賜鑒信謹啟伏奉別紙榮示欲令男珪仰從麾斾感激重顧寢興失常相公爰自奧區將臨巨鎮當求國器以耀戎旃渠書劒無聞癡黠相半昨者謬蒙與國命厠㣥僚發遣巳來憂慙未定豈可再升上榻重託後車混七子之聲塵列三公之掾屬所虞辱命安敢顧私况古之在三父生師教今世既無師道所奉之主當焉渠雖甚愚亦知斯義倘得永依油幕長侍絳紗雖闕晨昏乃在霄漢向垂詢度伏用兢惶以渠將遠依投猶須教督伏望許乘驛馬假道弊藩三五日即遣榜小舟倍程下水必令界內得及軍前恩紀綢繆光榮浹洽雖萬里將遠實人心不孤言路情塗所難申喻伏紙搦管死生以之今月某日巳遣某職鮮于位奉啟狀謁賀新寵至某日復遣脚力某乙奉啟仰諮行李願就坦夷今日蒙降專人且云告別正書輝握橫涕霑襟實影響以疚懷豈平生之易感伏承决取峽路東指廣陵相公亟歷雄藩惟循儉德空持經笥不事橐裝固以忠貫波神仁懷風伯自然利涉安有畏途雖二江雙流懸蜀土去思之懇而一日十旦慰揚州來暮之謠封域匪遐藩宣為累不獲仰瞻使節竊止仙舟感戀之誠寄喻無所今遣節度判官李商隱侍御往渝州及界首巳來備具餼牽指揮館遞伏惟俯從祖軷蹔駐征帆南望烟波恨無毛羽下情不任瞻戀感激之至今月某日潘押衙侍御至伏蒙仁恩榮賜手筆數幅某獲依大國切曰親隣將欲違離彌驚顧遇但當眗涕用對緘封伏承鳳詔巳頒鷁舟期艤日臨端午路止半千不獲親祝松年躬攀檜楫持百錢而莫追劉寵聞五鼓而空憶鄧攸仰望旌幢恨非巾履自觀符竹乃是網羅縱詞窮於刀筆之間終事溢於肺腸之外感恩戀德不知所為伏以水謝舊筩灰驚新律乘陰閉陽開之候見詠功祝壽之辰伏惟某官道以和光謙而受益皇恩三接且聞宣室之言清禁九重續奉台階之寄膺時納祐與國同休某方守藩維闕趨門屏無任結戀之至伏以水謝舊筩灰驚新律乘陰閉陽開之候見詠功祝壽之辰伏惟相公便自坤維更承兌澤遽收武節長轉洪鈞昔風后之佐軒皇不為外相傅說之毗殷帝無敢專征獲奉恩知實所欣賴屬緣戎鎮闕詣軒庭數攀戀以誠深與願望而俱切伏以節在一陽慶歸三壽君子既聞於齋戒小人寧望於禱祈伏惟相公芝鶴延年松龜定命上毗左契下轉洪鈞立蒿柱之前長辭舜琯侍土階之側永數堯萱某方限戎行不獲拜賀攀戀之至實倍常倫伏以周正具至魯朔爰來禱祠既集於良辰戩穀且歸於內署伏惟學士靈龜薦壽威鳳均祥居石室於西崑自通仙路坐銀臺於東海不接人寰豈惟與國同休兼亦後天而老某方叨戎律正遠霄階珪賀末由結戀增劇伏惟克隆多福永對休辰以竹苞松茂之姿奉周扆漢帷之化某方叨藩任款賀無由瞻戀之誠寄喻無所伏見某月日恩制相公登庸凡在藩方莫不稱慶相公恢宏廣度疎越正聲君子卷舒不違於仁義丈夫憂樂唯繫於邦家吳漢之不離公門袁安之每念王室今果明臺納諫武帳陳謨寧勞夢卜之資自契鹽梅之望况聖上儲精垂思保大定功推軒后師臣之䂓得周成畏相之道三古之英華未遠百王之損益可知仗乎元臣佇啟休運以不愆不忘貞百度以無偏無黨定九流仁遠乎哉古猶今也斯固祖宗降意華夏同誠某早忝恩光今當譴責思昔時之叨位媿汗仍流賀今日之登賢歡心莫寄矧復系通屬籍任處藩條至於馳誠實倍常品伏惟鑒察伏見今月某日制書伏承榮加寵命伏惟感慰伏以天垂北斗國有南宮伊法象之所存實根源之是繫伏惟相公中邱降瑞太昴垂芒列子以謂神全孟子之言性善抑揚今古秀絕天人動之則舟檝鹽梅不忘於康濟靜之則風松霞月莫究其孤高擅文武之無雙處品流之第一自頃事有消長時屬往居未啟金縢且分竹使而能用元元易守之道體金人不動之微神明無闕於保持柯葉罔聞於易置龍樓入護虎節出征重安四海之心實慶一人之福今又薦承雨露顯執銓衡惟彼天官是稱冡宰周以太保領晉以侍中兼步驟雖殊考課斯在固當復持大柄重上泰階未求李重之箴巳作臯陶之誥伏計仰緣宗社慎保寢興某早奉恩知又牽事任支離門下辛苦兵間非騏驥盛壯之時有手足凋零之痛遐思賀訴唯動禱祠戀德依仁不勝丹赤伏見除書伏承榮加寵命伏惟感慰伏以振域中之綱紀屬在南臺極河內之文章歸於西署唯茲出入不在尋常郎中學士吞鳥推華奪袍著美纔端風憲俄上雲衢昨暮繡衣尚遣蒼鷹出使今辰綵筆遂令丹鳳彳亍書聞仙家勿洩之言見人世未知之事便當圖南勢就拱北功成擊水摶風一舉千里某常懷疇曩叨奉眷知乏仰氷雪之清標空聞金石之孤韻敢言投分自賀知人今則坎軻藩維淹留氣律兵法雖慙於金版夢魂猶識於銀臺恨非犯斗之星蹔經寥泬徒用映淮之月遠比輝光抃賀之餘兼有倚望伏冀必賜監察憲啟憲質異楚材寶同燕石重以覊丱即定憫凶瞻遺構以闕然不堪多難奉成書而未就無處求生藐視流離屢經寒暑逮於既冠猶恤無家叨承師友之䂓獲忝簪纓之列此皆相公推孔李之素分念高國之舊家鎪朴雕頑披聾抉瞶沐膏雨以令植假順風而使飛不然則安得獲驪龍之珠假獬豸之角榮皆過望感豈勝言而猶悵望下風徘徊高義望賀燕以難去撫棲烏而不安者葢以相公以伊臯之事業佐大君以揚馬之文章輔昌運一登宣室遂借前籌以有征無戰之方彰明下武以永逸蹔勞之勢恢拓中華不舞梯䡴不鳴金鼓復數千里之沃野刷十五聖之包羞彼圍穀而穀人不知入鄭而鄭陴皆哭方茲決勝彼有多慚今百職聿修九功咸敘萬國佇登封之禮五山傾望幸之祥鰈至鶼來茅歸楛入馳湯驟夏轢漢陵周若憲者雖不能行舞舜戈坐耕堯壤至於獻千載河清之序裁二王助祭之詩歌咏相庭發輝帝載則其志願亦或庶幾伏希孫閤時開丙茵多恕克懋山公之德終全趙氏之孤擁篲瞻門封函即路苑沙宮樹雖吟左輔之風煙良夜慶霄唯望中台之晷度感恩撫巳誓志投誠仰惟輝光終賜埏埴下情無任感激攀倚惶戀之至某啟某聞被彩飾於無用之姿斯須或可垂休光於不報之地始卒攸難至有馬疲而尚服輕軒席敝而猶存華幄懷仁則極備用無聞雖有切於戀思宜自量其涯分嗚呼某者今甚類焉翰柔莫申語苦難聽聊憑牋素用寫肺膓伏惟少霽尊嚴猥賜披省某伏思早歲仰累深知龍尾貽譏敢通交契牛心前啗實愧時才世故推遷年華荏苒葭灰檀火屢變於寒暄靈濟泥涇遂分於清濁覊離管劄僶俛絃歌名汙柳營顏慚花縣竟以千金乏產三徑無歸初服莫從迷津亟問屬者伏幸相公羹梅調味川楫濟時起塌翼於衝風活枯鱗於涸轍登諸蘭署轄彼芸籤臺閣移文語薛夏而無取東南才子並張率以何能未報前叨旋承後顧版圖被召花幕分榮收駑駘於皁棧之中刻蚣蝑於樂懸之上勢高足跌道泰身屯未竭私誠巳嬰沈痼况某素無靈氣夙昧攝生乏單豹養內之功闕王吉實下之效湫底莫適節宣失中然猶深願待年少酬厚德三醫畢訪百藥皆投竟非旡妄之災莫見有瘳之候濱於九死敻彼十旬取煖則煩加寒必痢髮寧支弁帶不成圍謝述心虛方茲未逮田光精竭比此猶強豈可尚占職員但尸俸入久塵物議且速殘骸况相公職統薄違時登衆寡任崇按比務繫孤終職是賓僚豈宜虛曠固不可下私微物曲降深慈憫將盡於桑榆妨得材於梓是以推枕興感攝衾占辭願申斂跡之期以贖曠官之咎祇聽裁旨用息兢惶必也舊履流恩遺簪結念恤以孀孤非少婚嫁未終不使衰羸便辭祿仕致乎外地晞以末光未乖念錄之仁稍减憂慚之累亞尹諸府別乘近郊負荷無羞饘餬有繼則猶冀逢十全之藝延一日之生重登門牆再就埏埴是所願也非所望也詞多力殆感極涕繁避席承言未卜曾參之侍封函抒款畏遺殷浩之書瞻望清光實動魂守伏惟特賜優詧戡啟錢若干伏蒙賜備行李謹依數捧領訖多若鑿山積如別藏丙科擢第未全染於桂香盛府從知却自驚於銅臭禮於是重富而可求既不憂貧惟思報德伏惟俯鑒微懇謹啟
