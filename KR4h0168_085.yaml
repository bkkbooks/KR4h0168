front:
  text: 全唐文欽定全唐文卷八十五懿宗三
  hash: sha256:8253071a3102e31e58f1f79e002e7191c6b2125e04e51fb25afa115d6447a75b
body:
  text: 門下園陵之重典禮是崇故憲章既盡於舊儀嚴奉式遵於古訓載深追感用切哀懷公卿大臣洎百執事竭忠體國宣力叶心誠敬有加恭恪無懈永告勤瘁宜洽優恩山陵使所攝大行事官與一子九品正員官山陵禮儀使與一子出身內山陵副使昨者責辦事重與一子出身山陵使加一階仍賜物四十匹副使二十匹判官各十匹山陵監修橋道使賜物四十匹判官各十匹內山陵副使加一階仍賜物四十匹判官各十匹山陵置頓橋道使與一子出身副使加兩階判官巡官巡檢專知官各加兩階合選人前資見任各減兩選鹵簿使賜爵一級儀仗使加一階陵所造作押當官及中使等三品巳上賜爵一級四品巳下各加一階其中正員六品巳下合選人前資後任各減兩選白身各賜勳兩轉諸司諸使應緣山陵修造及專知造作諸色檢校執事當官白身及直司掌上巧兒工匠等五品巳上賜一階六品巳下各賜勳兩轉合選人前資見任各減一選白身各賜勳一轉其給直和雇者不在此限吉凶儀仗諸色行從官等五品巳上各加一階如巳至三品未合敘者賜勳兩轉四品巳下各加一階諸司諸使押當官置頓營幕往來檢校軍將中使等五品巳上六品巳下並各加兩階白身各賜勳一轉合選人前資見任各減一選兩儀衛官及中使大內皇城留守並押當官等五品巳上六品巳下各加一階白身賜勳兩轉撰諡冊哀冊諡議書冊及讀諡冊書寶讀寶官等三品巳上賜爵一級四品巳下各加一階鐫造冊寶裝寶及檢校官五品巳上各加一階六品巳下各賜勳兩轉合選人前資見任各減一選題神主官加一階舁寶冊官及舉寶官五品巳上各加一階六品巳下各賜勳兩轉其中合選人前資見任各減一選押鹵簿儀仗挽郎各加一階合選人前資見任各減一選山陵禮儀置頓使判官各加兩階合選人前資見任各減兩選儀仗鹵簿使判官及諸副使判官并省諸使諸司監當雜職掌官吏等各加一階白身各賜勳兩轉挽郎放出身後七選許集挽士挽歌等各減一年勞合選人前資見任各減一選無勞可減者各賜勳兩轉諸色行事官及齊郎禮生并陰陽生三品巳上各賜爵一級四品巳下各加一階合選人前資見任各減一選白身各減二年勞考滿人放出身其數處職任取穩便從一頭處分應緣儀仗三衛彍騎及諸色夫匠代選并緣山陵應役人夫車牛等各委本府長官本軍大使本司量事優賞太常禮直官及中書門下儀制官主務皆重事無遺缺特加一階如先巳加階者委中書優與進擬諸道應奉使赴山陵幕府軍將等各加一階諸色職長官吏中應合減選人如無選可減者令所司非時與處分如有諸司流外充者各與本色中量減一年勞無可減者優與處分充奉陵寢勞役實繁新澤所沾異渥斯及其奉先縣宜放今年夏稅青苗錢如巳有諸色折納者即放於秋稅斛斗據數矜免布告中外稱朕意焉門下朕聞惟天為大惟堯則之施及文王昭事上帝朕遐思古訓順考前聞仰止於皇王之閒規範於堯文之際始如徒涉而望超溟渤中若策蹇而求躡雲霄思逮於三希之則至由是力於恭己鋭以濟人九載於茲一致不怠然而德未甚腆信未甚孚雖懷汔可之詩敢企康哉之詠尚賴社稷降祐祖宗垂休兵革向寧朝野斯乂自頃誕施渥澤冀獲雱流猶慮莫及昭蘇愈多乏困今則夏田豐稔倍於常時不足之憂暫免興慮又以西成未保蟲蝗是虞永惟惠恤之宜庶叶消禳之要苟能利於百姓賴於四方可使稼穡有年邊疆無事則惟恐不及豈憚於必行是用更理闕遺載新提舉一陽斯始爰開蕩滌之恩晏陰將成式繼矜蠲之令副我誠切在爾司存應京畿及天下見禁囚徒暑毒之時要令疏理牢獄之內慮有滯冤宜令臺府及諸軍司并所在州縣長吏據見禁囚徒限德音到後七日內親詳罪名疏理訖聞奏不得更延引時日除非巨蠹有礙去年赦條外餘並節級遞減一等從輕處分左降官及諸色流人近雖纍有赦令皆巳沾恩欲其悔過自新豈吝頻施霈澤經去年赦條巳得量移者更與量移合復資者準前例處分其去年十一月十日後至今年五月以前續有左降官及流人亦便與量移如合放還者所司速與處分內人久在深宮常膺役使不惟勤勞可憫固亦親愛是思宜令揀選宮人五百人放出各歸其家屬俾無離怨用叶推恩現在宮人尚令揀放諸節進奉宜有指揮應諸親及公郡主等每年端午及延慶并妃嬪生日所進女口自今巳後宜並停進鷹鷂之設本資畋遊朕端居穆清不好馳騁所宜解放以遂物情左右神策軍各放二十聯五坊放三十九聯飛龍放一十一聯其左右神策軍每年進鷹鷂於數內停減春秋二社兩進九月十五日各停進鷹二聯共停一十四聯應租莊宅使司産業莊磑店鋪所缺租斛斗草及舍課地頭等錢所由人戶貧窮無可徵納年歲既遠虛繫簿書緣咸通七年赦條不該今宜從大中三年巳後至大中十三年巳前並令放免京兆府奏雲陽等一十二縣百姓論去年宿種麥苗下子後旋被蝗蟲食損今年盡不滋生雖京畿之閒去冬蠲放不少但以疲人懇訴須務哀矜巳令府司差官巡檢如有損處即時特與減放令府司具合放數指實聞奏戍役辛勤道途綿歷將還鄉土在贍供須安南雍州巳奏放回北軍其於頓遞經過本州縣界並須如法先自備辦排比切不得臨時差配百姓及借索擾人仍録前後德音赦條於鄉村分明榜示不得違越仍委所在長吏嚴立條制專加覺察枷禁所施在防奸蠹舉便缺負未涉重條如聞府縣禁人或緣私債及錮身監禁遂無計營生須有條流俾其存濟自今日巳前應百姓舉缺人債如無物産抵當及身無職任請俸所在州縣及諸軍司須寬與期限切不得禁錮校料令其失業又輒不得許利上生利及回利作本重重徵收如有違越勘實奏聞去年德音赦令條流事件極多貴其普及生靈惠沾寰宇尚聞所在未盡施行今重舉明俾無留滯宜令天下長吏差清強判官專勾當切更分明檢舉一一據事節施行訖奏聞如更因循必行朝典其所差判官仍速具名銜分析聞奏好生之德宜及禽魚卵育之時須加條制舊敕每年起三月一日至五月末不許採捕水蟲禽鳥雖有敕禁尚恐因循宜令臺府并諸軍司每及時禁之月更嚴提撕勿使違犯儉德之修聖賢所重近日俗多澆靡時尚矜誇朕常慕素風斯遵儉制去年赦文之內巳曾明有指揮所宜克副朕心用誡奢僭東川每年進蜜浸荔枝道路遙遠勞費至多自今巳後宜令停進布告中外稱朕意焉主者施行自纍年以來四方多故雖巳寧謐尚切防虞居安不忘於慮危有備可期於無患況海隅封略猶集戎兵天下租庸半資軍食而又徐泗戰爭之地瘡痍僅平江淮災沴之鄉流亡未占遂使物力凋耗人情艱危言念蒸黎良深憫惻朕臨寶位十有四年憂勤無一日之安怵惕居兆人之上紹先王之遺訓守列聖之丕圖所以未明求衣分夜方寢靜思致理罔敢怠荒顧臣寮而委以腹心視寰宇而同於掌握管弦娛樂不替於萬幾稼穡艱難每臨於千畝今又物惟豐茂歲獲順成宜宏覆燾之恩用作生靈之福應諸道州府軍人百姓委所在長吏各承詔令切務慰安瘡痏僅平者尤在撫綏流亡未占者倚深招諭物力凋耗之處速致安全人情艱危之時無更侵擾遠年逋缺且緩併徵近日歸還勿更加稅勸農重穀以備饑荒訓卒練兵用防寇盜但躬行儉約政不煩苛省宴樂則務贍軍需絶餉遺則盡資公用漸使疲羸蘇息帑藏充盈減朕之憂勤寬朕之怵惕雖臣子之分必竭其忠誠而君父之心寧忘其誡勵我有爵賞以訓有勞我有憲令以懲不一凡在方鎮嶽牧邑宰僚佐各揚爾職克副豫懷維咸通三年歲次月日皇帝若曰夫翦圭分器事炳周經裂地疏封道光漢冊莫不克隆盤石作固本枝並建親賢以崇藩翰朝有定制朕安得私爰稽盛時俾榮錫社咨爾長男佾通暉日月稟慶霄漢蔭若木之凝華派璿源之積潤天姿岐嶷神授聰明早彰樂善之規夙有辨牘之智卓爾器度藹然徽猷宜荷寵章以開土宇今遣使門下侍郎兼吏部尚書平章事杜悰副使左散騎常侍趙格等持節冊爾為魏王於戲河外名都漳滏奧宅爾其竭奉上之孝敬慎臨下之儀刑守道宜鑒於遠名尊賢無忘於置醴用新魯衛之政以昭閒平之德服我休命可不慎歟維某年月日皇帝若曰夫維城作扞實隆定鼎之業犬牙列國以盛建瓴之功故廣樹戚藩畢王子弟歷朝茂典列聖宏規舉而行之朕不敢廢咨爾第二男侹分暉紫極託質丹宮器度沈詳姿容端粹藹有成人之量形乎佩韘之年志玩楚詩情通沛易不勞師傅之訓動形忠孝之規爰嘉令猷俾建侯社今遣使門下侍郎兼吏部尚書平章事杜悰副使左散騎常侍趙格等持節冊爾為涼王爾其奄長洪河大啓西土紹於前烈恢我舊疆敬慎於朱邸之閒謹睦於玳筵之上靖恭其位克廣其心無從匪彞服我休命維某年月日皇帝若曰夫堯序九族周列五等事高維翰道在睦親況居帝子之尊宜荷封王之典用彰慶羡以固洪基咨爾第三男佶符彩昭融姿容朗悟騰英日域儲秀星樞巳多稱象之能才是勝衣之歲靜不好弄言必成文曾無紈綺之心每服詩書之訓嘉其幼智錫以大封今遣使門下侍郎兼吏部尚書平章事杜悰副使左散騎常侍趙格等持節冊爾為蜀王爾其宅於坤維建茲赤社疏以江漢鎮以岷嶓列為侯王邇我宮禁以謹恭而接下秉忠孝以律身服是寵光終於戒慎門下朕聞龍之騰天漢也則必乘風雲鼓雷電以震六合君之踐大寶也則必敷仁惠渙號令以煦萬方是以地不閒於幽遐事罔論於輕重洪聖興而皇渥溥德音振而庶類蘇故愆咎咸除枯沈盡起斯皆前代令典國朝成規委轡諒戒於惠奸凝命始懷於布澤肆豫寡德嗣纘丕圖夙夜乾兢若俯泉谷永惟我高祖太宗之艱難締構又惟我列聖之慈儉統承思所以克紹休明宏濟億兆剗氓俗之弊清理化之源肇祥導和應天順物致歡心於率土知恭己以臨人爰申在宥之恩用洽惟新之慶可大赦天下自大中十三年十月九日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之惟犯十惡叛逆及故殺人官典犯贓及持仗行劫並不在此限其故殺人者巳傷未死巳死更生意欲殺傷偶得免者並同巳殺人法處分又刑獄之內官吏用情推斷不平因成冤獄無問有贓無贓不在原免之限左降官量移近處巳經量移者更與量移其合復資者五品巳上中書門下即與處分六品巳下仍依常例選集丁憂去任及在憂制受貶者服闋日亦與量移如有親故在上都任經所司陳狀便與處分不必更待本州府申請其別敕因責受降資正官及曾因忤纍停免未經引用者並與進改流人配隸及別敕安置不問道路及巳到未到者並與量移近處先巳再經量移者仍並放還流貶人中縱元敕云雖逢恩赦不在量移之限或長流及充百姓終身勿齒者並與中書門下量與收敘處分及量移近處如巳亡歿家口欲還及須歸葬者聽隨所在便如緣葬事幼弱饑窮不能自濟者委所在長吏量給棺櫬優恤發遣坐纍歲深加刑巳衆纍經赦令久未該恩用宏開網之仁俾釋向隅之戚應元和末惡黨前後處斷人數巳多自今巳後宜一切不問先有敕令追捕未獲者亦更不復追尋應先關連上件配流人并家口等縱元敕云長流充百姓雖逢恩赦不在量移及放還限者並與量移近處如到流所經六載仍並放還如巳亡歿家口欲還並準前流人等例處分天德五城流人負罪素重元敕未經十載不得放還今屬鴻恩須令沾及宜減三年如年巳滿便放還如情願便住者亦聽左降官及流人先有官者如巳亡歿各還本官亡官失爵痕纍禁錮者並從洗滌惟自今年八月九日巳後坐事流貶並不該此新恩之限營奉園陵所資發未備慮其科率困撓黎元應緣山陵制及喪儀禮物宜委中書門下及諸官之長講求故實必誠必信務遵遺旨用副朕懷所緣山陵用度近巳出內庫及戶部錢物充給應緣人夫工價宜各速令所司以不折估匹段兼見錢分數支給不得令侵屈百姓山陵未畢情禮有異其降誕進奉宜且權停志方思於遂物心匪樂於從禽止備搜畋所宜節減諸道進鷹鷂每年共許進二百聯仍選擇堪處進奉餘悉放免貢獻無藝物力難充華靡不除時風豈厚諸道節度觀察使除大例合貢獻外不得別有進奉雕文刻鏤及異色綾錦難得寶貨一皆禁絶京畿賦役頗繁河洛凋瘵亦甚欲其綜息當在蠲除京兆府今年秋青苗錢宜每貫量放五百文所放錢如是府司占留色目即委戶部準舊例據數支填不得令有虛折其大中七年巳前百姓積缺兩稅斛斗及青苗榷酒並稅草職田麥屑䴬棘等徵收不得空繫簿書亦並放免如在官典所由腹內不在此限河南府今年秋青苗錢宜每貫量放三百文如是府司占額錢數亦委戶部準例支填應人戶積缺府司及度支戶部鹽鐵諸司大中七年巳前諸色錢物斛斗銀錫草等如身巳逃亡及身在貧窮家業蕩盡頻經校料終無可徵納者宜並放免如在主掌人吏所由腹內者不在此限逋負年多徵攤力竭咸令巳責庶可惠貧度支戶部鹽鐵三司應收管在城及在府州並諸色場鹽大中七年巳前缺負諸色錢物斛斗等除官典所由請領官錢和糴市及在場官招商所由腹內外其餘人戶所缺錢物如身家巳亡歿或在貧窮家業蕩盡無可徵納並逃竄捕捉未獲囚繫妻男攤徵保人等如此之類虛挂簿書終無填納之日宜並放免如聞後赦令蠲免放缺負所司不及時處分元係簿書徒有蠲免之名卻為分外攪擾今所放錢物宜各令本司差辦事官典據年額人戶姓名所缺錢物色目檢勘便下文帳不得更起條樣勘逐所徵可放生事擾人仍令所在場鹽院及州縣於要路分明懸榜示人戶俾令知悉仍仰所司各限月日處分訖具所放錢物單數分析聞奏災沴流行黎氓困窘免其租稅漸冀輯寧諸道州府有遭水損甚處其今年合納苗稅錢等委長吏酌量蠲放如大中十二年巳前缺負兩稅米在百姓腹內徵收不上者亦宜特放其實遭災沴處仍具分析聞奏抱器逢時諒思展用卑棲疏迹能不懷嗟如聞中外官僚或有滯屈雖限以員闕致此因循而念其考歷孰非勤舊宜令中書門下各量才分漸與遷改廣我四聰在於多士才宏景化思拜昌言諸色人若上封事極言時政得失有官司者官吏長收狀聞奏無祿位者任自投匭進狀當必親覽須務體國公言不得用情謗訕每想侯封歲闕思於荒稔莫非王土物合通其有無諸道州府閉糴禁錢頗為弊事前後赦敕纍有條具尚恐因循依前壅塞宜委出使郎官御史切加察訪如有違越即具奏聞叛徒相扇既巳翦除屬類潛逃宜從寬宥湖南江西嶺南宣歙等處去年所遭狂寇擾亂尚恐軍人百姓至今未安如先有為患者關連親族或逃竄尚未復歸今一切不問仍各委本道長吏分明曉諭切加招誘安存勿令疑懼如百姓曾經被賊俘劫錢物官與收獲得者仰分明勘認本主給還勿使曖昧欺隱仍具分析聞奏如聞京城內富饒之徒不守公法厚利放債損陷饑貧前後纍有敕文約勒非不丁寧無良者都不遵守致貧乏之人日受其弊宜令京兆府準寶歷三年四月二十日及開成二年八月二日敕文切加提舉曉諭嚴切約勒處分凶險之輩情狀難容如聞將吏傭保奴僕之徒或因愆過發遣之後輒生怨謗捃拾本使及郎主細微之事意在僥求苟無所得便成恐脅或暗投無主文字或擅進文狀此若不絶交害平人自今巳後宜準律文及大中二年九月十日及大中六年八月二日敕便於當處焚燒所由不得收領及與聞奏其擅進文狀宜勘責重加科誡如所由固違敕文不焚燒所投文書尚敢將出當與告訴者同罪其容修文狀挾奸蠹者委臺府及諸軍諸使切加察訪如有此色便捉獲送府縣推問須令痛懲天下州郡於所公用之餘收糴年穀自備水旱以救疲人賑絶及時免待奏請探聞惠物頗謂通規今年正月一日赦文但令不別置倉慮煩別差官吏主當所以令寄常平義倉任自分別支用如聞所在州郡未能盡喻詔旨衮入常平義倉縱遇年豐不務糴斂謬為廢閣切在舉明令所在州郡細詳今年正月一日赦條處分其刺史去任日仍委本道觀察使便以在任日所收貯斛斗多少支數以為考課言念士子祿以代耕選人例迫饑寒遠赴調集頻年被駐情實可矜宜令吏部準今年正月一日赦文處分廣敬坤儀當舉推恩之典垂仁磐石在霑霈澤之榮太皇太后及元昭皇太后第二等以上親委中書門下量才敘用大長公主嗣王各與一子出身九廟子孫陪位者普恩之外各加兩階無官者各賜勳兩轉仍據始封主後與一人出身委宗正寺卿檢詳圖譜一房最沈翳者充數具名奏聞宗子中有行義可稱才幹足用者亦委搜採具名銜事狀送中書門下量才敘用內外文武見任及致仕官三品巳上賜爵一級四品巳下加一階仍賜勳兩轉應入三品缺一考未足者考足日聽敘致仕官量與改轉依前致仕弼諧萬物鎮靖四方洎於文武具寮咸宣忠力並稟義方之訓宜推錫賚之恩追飾寵光式彰孝理中書門下及諸道節度使帶平章事祖父母亡歿未經追贈者並與追贈巳經追贈者更與改贈東都留守諸州府長守在京及分司常參官神策衛金吾六軍統軍將軍四衛十二衛將軍威遠營鎮國軍等使父母歿亡未經追贈者並與追贈品秩巳崇請回贈祖父母者亦聽父在無官者量與致仕官父歿母存量與邑號巳有邑號者量與進改竭力扶危捨生取義不旌後嗣曷表遺忠故尚父汾陽王贈太師晟贈太尉秀實子孫中各與一人正員官張巡許遠南霽雲顏真卿杲卿子孫中各與一人出身祗奉典冊誠禮無違宜被優恩以酬厥效即位日攝太尉奏詞中書令讀冊侍中進寶承旨宣制奏外辦禮畢各與一子正員七品官奉寶書綬讀冊及書玉冊官各特加一階書寶押寶綬舉舁寶冊官溥恩之外各加兩階合選人減一選其餘應職掌人行事及寫制令太常條選儀注等官三品巳上更賜爵一級四品加一階仍並賜勳兩轉中書門下儀制官內侍省內教各特加一階鐫造玉冊並填金字造寶裝寶冊人等各賜物五十段承顧命撰制冊文及寫制誥官並巳有升其餘自八月九日至十三日諸寫制誥官各加二階大明宮留守及緣國慶告郊廟太清宮行事官三品巳上賜爵一級四品巳下加一階應緣崇冊太皇太后及追諡元昭皇后冊禮職掌行事官及鐫造冊寶填金字人等節級賜物周詩歌白馬之客魯國闡素王之風尚德崇儒宜旌胄裔二王三恪文宣王子孫各與一子出身藩邸臣僚誠勤久著各加優獎用示恩榮鄆王府官今年八月九日巳前在任者五品巳上並與進改六品巳下所司非時與分流外番考巳足未足並放入流內侍省及鄆王府官三品巳上賜爵一級四品巳下加一階五品巳下賜勳兩轉八月九日至十三日北內當上及從駕者四品巳下溥恩之外賜爵一級五品巳下更加一階白身更賜勳兩轉神策六軍金吾威遠皇城將士三品巳上賜爵一級四品巳下加一階仍並賜勳兩轉馳奉章奏分居職役冊勳進級甄彼勤勞諸道進奏官及緣國慶奏表到京者溥恩之外各加一階仍賜勳兩轉翰林待詔並諸色直長及供奉人等三品巳上賜爵一級四品巳下加一階無階者賜勳兩轉飛龍間廣既宮苑典引掌扇內園總監栽接少府將作中尚書武德軍器內外弓箭庫等諸司諸使下白身及無品直司定額長者雜匠巧兒黃衣長上監門直長雜仗二衛七色引執駕細引執扇角手弩手彍騎武士天文觀生歷生漏生典鼓工人樂人主膳主酪典食手宰手掌間幕士駕士御醫工獸醫門僕藥童御書手流外行署等賜勳兩轉宿陳仗衛師旅有勞委質蕃方偏裨著效咸加獎賚庶洽恩榮應赴御樓立仗神策六軍金吾威遠及皇城等將士宜準舊制量賜錢帛其神策軍應在畿內鎮將亦各賜物有差應諸道將校三品巳上賜一級四品巳下加一階無階者賜勳兩轉遠人慕義上國貢獻將表懷柔俾霑寵錫鴻臚禮賓院蕃客等各賜物有差禮經重於問年宜加廩餼王化存於勸善用激里閭天下耆老八十巳上者各賜絹兩匹粟二石九十巳上各賜絹三匹粟米五石並以上供錢常平義倉粟充給仍令令長親致縣庭宣詔頒賜不得委人吏致有欺隱其九十巳上者仍加板授孝子順孫義夫節婦旌表門閭終身勿事先有旌表者準耆老例優賜除弊安人由於制命寢而不用致理良難大中以來頻有赦令有司廢閣多不遵行宜委中書門下檢尋提舉有便於人者次第施行或有事理未盡不便於人者仍委中書門下及所在長吏條具聞奏其守法詳斷刑獄今年正月一日赦書巳有條具處分仍本司切加提舉遵守施行不得輒有隳紊峻極靈長效祥興利俾申祀典以達明誠五嶽四瀆名山大川各委本道長吏以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該載者所司明作條具聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告遐邇咸使聞知主者施行我國家膺天明命光宅萬方二百有五十載矣梯航所及昭顯於夏殷文軌攸同敻逾於漢晉朕承十六聖之業居億兆人之上猥惟眇身欽荷丕構遠奉貞觀開元之至理近宗憲祖宣考之宏規常慕雖休勿休豈敢自暇自逸然而仁不遂於百姓德不參於二儀莫致感通更延災沴近者兵革未弭蟲蝗相仍方懷徵發之勞復起饑闕之歎雖頻加錫賚纍有蠲除尚慮澤未遍通信未旁及是用連宵假寐每食忘餐思所以拯我黎元臻其壽考或多方以革弊盡慮以鼎新庶或上下欲從人欲況善為國者以好生為首行王道者惟憫物是先苟可勝殘去殺亦冀止戈為武於戲誠明之志既悉於斯渙汗之恩夫何所愛可大赦天下自咸通七年十一月十日昧爽以前大辟罪巳下巳發覺未發覺巳結正未結正繫囚見徒罪無輕重咸赦除之惟犯十惡叛逆以上故殺人官典犯贓不在此限持仗打劫必欲害人苟遇支敵必行殺戮拒敵追捕肆意奸凶并故殺人者雖巳傷未死巳死更生意欲殺傷偶得免者並同殺人法處分其賣毒藥開劫墳墓及刑獄之內官吏用情推斷不平因成冤濫無問有贓無贓不在原宥之限朕君臨四海子育兆人常恐萬類之中一物失所況雲南素推誠節久慕華風顧帥臣撫御乖失不諭朝旨遂令滋擾邊隅初陷交雍旋侵越巂屢移星歲彌縱干戈靡思量力之言曾無事大之禮軼我疆理勞我隄防爰用徵兵諒非獲巳鋒刃之下多有殺傷每念於懷良深慚悼寧屈己以徇衆不窮兵以害人斷自豫懷更宏招諭應安南雍州西川等道諸軍兵士各守疆界不用進師仍委劉潼審詳事機明加曉諭如能重修和好信使如初朕當虛懷一切不問雲南先差專使昨巳有詔旨處分其先配隸習讀質子各本道供給續當指揮安南雍管西川三道軍士皆踰山越海擐甲荷戈志切勤王誠深報國固內侵之封域收巳失之城池盡欲捐軀咸思賈勇亘淪歷數終始一心言念忠勤誠用嘉歎今南蠻巳加招撫冀就弭寧日下但嚴守封疆且備要害雖未用更圖攻討亦未可便絶訓齊其將士等義感風雲志諧金石屯營既久立效巳多大功將成懇節無奪其歸款別有指揮仍委劉潼高駢李耽等具此慰勞以副豫懷其三道軍糧地界懸遠致其盡力當令充腸如諸道戍兵未免饑餒因之殞命尤用傷懷宜令常宙劉潼嚴加條流丁寧期限無使供饋更聞失時其府赴三道行營兵有親老及妻子在家者各委本道切加存恤勿使凍餒恓惶俾無回顧之憂以勵當鋒之志其諸將士勇敢用命當鋒歿身義節可嘉孤弱是念並委本道節度使據所申報各須安存如血屬單弱不能自存者即厚加給恤遺骸在野深可憫嗟今春巳降德音盡令優給收葬尚慮暴露未契幽陰今更舉明用慰泉壤宜令所在長吏訪尋收斂如法瘞葬仍以酒醪殷勤奠酹應三道兵士經過纍路州縣供應頓遞徵配里閭水程船夫陸路車役勞弊斯甚疲瘵可哀其嶽州湖南桂廣雍容管內沿路州縣今年二月一日德音巳蠲放今年夏秋兩稅各一半尚恐鄉村未普更要加恩宜於今年夏稅正錢每貫量放三百文沿路州縣亦甚凋傷先未沾恩今須優假宜於來年夏稅正錢量放一半仍各委本處長吏親自點檢明閲簿書勿使恩不布於疲羸幸或生於桀黠副豫深意必及遠人誠信之道蠻貊可行苟或未孚其肯懷惠應安南雍州容州黔南西川諸溪洞酋長首領務加優恤喻以恩信若須節級賜官秩賞給者委當管速具分析聞奏京畿之內蝗旱為災稼穡不收凋殘可憫其京兆府今年青苗地頭及秋稅錢悉從放免仍並出內庫錢二十四萬五千三百六十餘貫賜官府司充填諸色費用河南及同華陝虢等州遭蝗蟲食損田苗奏報最甚除合放免本色苗子外仍於本戶稅錢上每貫量放三百文如今年秋稅巳納即放來年夏稅其諸道有蝗蟲甚處並具奏聞亦議蠲減其河南府水災之後仍歲飛蝗想彼蒸黎尤多凋瘵宜別賜鹽鐵河陰人運米三萬石委崔璙充諸色用其諸道州縣應有逋懸兩稅斛斗青苗地頭榷酒等錢既存簿書不免徵剝咸通三年以前者並一時放免從四年至七年其中有準敕蠲者亦不得因此重徵京畿之內供億事繁色役差科曾無虛日黎人困苦深可憫傷更有逋懸日久徵迫無由收斂徒繫簿書應京兆府諸縣從大中八年後至咸通六年應缺諸司稅草斛斗糖棘番匠知食使玉蘇及府司缺延資并度支戶部錢物及賑貸折糴粟并諸縣缺填省修堰埭等錢匹莊宅監察使拆寺並佛堂材木樹等價及缺左右神策軍捉賊賞錢及諸縣應缺咸通三年至六年合送府夏秋稅錢物斛斗並麥屑䴬莊田地租及諸縣咸通三年至五年賑貸粟并長安縣大中八年先借太倉粟充賑貸除巳納外餘缺斛斗等並從放免兼簿書一時毀廢從今年以後別立帳內庫一年支放費用雖廣有司積久追呼固多虛繫簿書頗為煩弊朕方宏儉約深軫凋殘特示優矜用蠲逋責應度支積缺大盈庫年支匹段絲錢從太和八年以後至咸通元年以前并宜放免及缺瓊林庫年支金銀錫器錦綾器皿雜物等自開成五年以後至咸通元年以前并宜放免左降官量移近處巳經量移者更與量移如復資者任取本官選數聽集丁憂放還者服闋日各與量移並別敕因責降除正員官所司亦與處分其左降官及流人先有官者如巳亡歿各還本官失爵痕纍禁錮者並從洗滌左降官并流人元敕令終身勿齒及長流遠惡并云縱逢恩赦不在量移者並與量移如巳亡歿者並許歸葬如緣葬事困窮不能自濟者委所在官吏量給棺櫬優恤發遣中外前資見任官中其有頃因瑕纍未階録用者并左降官如事情可恕才行足稱者委中書門下量加拔隨能録用戎狄款塞邊陲無虞或使臣因備制弛慢切在搜訪利病濟便兵農勿以久安遽忘遠慮所宜常加備境每切訓戎將宏安撫之功須為經久之計其邊上方鎮本軍兵數節度使皆位崇元帥誓立殊功必能閲軍實以靜邊撫單寒以和衆素有定額固非空文然亦慮或因犯死亡停解不便招募闕額遂多並須檢勘分明仍委御史三司監院並加察訪即時聞奏江淮諸州百姓只合輸本分苗稅不合分外差科多為所在長吏權立條流臨時差配或強名和市都不給錢自今除納本分苗稅外一切禁斷牧守之任慈惠為先欲安遠人須求廉吏如聞雍容桂廣等道管內刺史每州皆管三縣人戶不少其閒選用尤要得人訪聞本道觀察使所奏監州官多是本土富豪百姓兼雜色人例皆署為本道軍職或作試銜便奏司馬權知軍州事既不諳熟文法又皆縱恣侵欺多取良家以為奴婢遂使豪酋搆怨溪洞不安若不條流生人轉困其雍容桂廣等道管內自今以後刺史必須精選賢良久歷官途不越資序者始許奏請其軍職試銜並不在奏署限藩條之例刺舉是資郡政之方邑宰是選斯紀綱共設次第相臨苟皆推公必無敗政如聞近者廉車殊無刺舉牧守率務并容邑宰非才疲人罹弊必在懲革以惠惸嫠自今以後委觀察使專刺舉之職如郡守不理或臨財不廉酬飲是營獄訟靡息以時奏劾按罪定刑如藩方不謹察廉或致下人上訴推覆得實觀察使別敕旨本判官遠加譴罰其郡守亦仰察訪縣令如或有過不舉停任後別有處分録事參軍重加削罰如刺史縣令有異政灼然可舉者仰具録奏必議超升人命至重在慎典刑國章苟隳必多枉撓近日執法之吏罕得其人或制敕不行曾無提舉或奸巧為患莫能辨明遂使可死者生可生者死而又縲絏繁壅斷決淹延乃致怨嗟或成災沴豫懷憯怛寢食靡寧宜委御史臺刑部大理寺慎擇官吏皆須素能折獄俾務盡心則人必闕法當畫一其天下州縣官等皆罕悉律令莫知重輕唯任胥徒因多枉濫委本道觀察使覺察聞奏又刺史縣令多務遊宴不思官常決遣既妨囹圄自滿永言冤滯豈不由斯委觀察使表率條流以懲深弊度支鹽鐵戶部三司缺負錢物頻有赦令據年額節級矜蠲如聞所司尚有徵迫妄豎可徵可放多因奸吏恣情遂使恩不及夫窮危事無補於經費其諸色人戶所由等應缺三司錢物自大中十二年以前並宜放免縣道之閒郵亭具列行李供億格敕著明如聞節度觀察刺史等所經過不遵品式公券之外私費至多或在道途有六百七百人行李所在地主務求交歡別差吏人號為置頓必皆率配弊及疲人自今以後所在長吏切加遵守格文不得違越赦令所在闕蘇疲瘵如聞遠處州縣告示不得分明今要條流永為定制赦書到後各委本道全寫録於縣門榜示但緣事理煩細紙數頗多減放矜蠲頭項埋沒鄉村百姓無因得知宜令所在長吏細詳各據本處百姓合得免科假一一豎項作小榜於要路曉諭令百姓知悉宗室子孫不合淩替班列之內人數至稀宜令宗正寺搜擇宗子有行義文學吏事堪有清實者具名聞奏委中書門下量才敘用如在郡縣年巳蹉跎士行可獎困於寒餒宜委所在長吏隨分驅策優假如聞編戶之中素非宗室因緣識故寫録諸書投入宗枝妄認房籍恃憑攪擾侵害鄉村近日此徒敗露非一雖巳行法未絶根源從今巳後委所在長吏切加收獲如涉疑妄即收録聞奏當加痛懲用安里閭前代為賓素闕德理合頒恩二王三恪及文宣公各賜物五十匹衡雕拱衛執玉會同俾申懷遠之恩用展酬勞之錫神策六軍威遠營金吾及皇城應緣御樓立仗將士等各賜物有差鴻臚禮賓院應在城內蕃客等并節級賜物功播一時名流千古念其後代觀以將來故尚父子儀贈太師晟贈太尉秀實各與子孫中二人八品官顏杲卿張巡許遠南霽雲子孫中各與一子出身中書門下儀制官及內侍省內教并特加一階勳著燮和道彰鎮撫牧守宣力卿士叶心永言盡瘁之誠宜給追榮之典中書門下及節度使帶平章者祖父母父母并與贈官封巳經追贈者更與改贈京文武常參官東都留守度支鹽鐵等使諸道節度觀察都防禦經略等使及神策金吾六軍將軍大將軍威遠營鎮國軍等使父母巳歿未經追贈者與贈巳追贈者亦與改贈父歿母存未封邑號者闕父見存未有官者量與致仕官其曾任常參官出為刺史縣令分司等官今巳得替兼前資郎官以上官其父母並準有見任常參官例與追贈冠冕相先懸車自遂紀綱之僕軒陛攸陳宜升階級之榮式進勳封之寵內外文武及見任及致仕官三品巳上贈賜爵一級四品巳下加一階神策六軍金吾威遠營皇城等將士普恩之外各賜勳兩轉天下百姓年九十巳上各贈米五石絹兩匹綿一屯羊酒有差仍令本縣令就家存問今州府方員多不給付所用無幾係體則深宜令以上供餘錢物充給訖各具分析聞奏朕以寡德纘承鴻業十有四年頃屬蠻寇猖狂王師未息朕憂勤在位愛育生靈遂乃尊崇釋教志重元門迎請真身為萬姓祈福今觀覩之衆隘塞路岐載念狴牢寢興在慮嗟我黎人陷於刑辟況漸當暑毒繫於縲絏或積幽冤有傷和氣關連追擾有妨農務京畿及天下州府見禁囚徒除十惡五逆故意殺人官典犯贓合造毒藥光火持仗開發墳墓外餘罪輕重節級遞減一等其京城軍鎮限兩日疏理訖聞奏天下州府敕到三日內疏理聞奏
