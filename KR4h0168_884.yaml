front:
  text: 全唐文欽定全唐文卷八百八十四徐鉉七
  hash: sha256:64329c76ddaf1001f3d4108f1c58bdd2ff2902db4b121d1f10cb65971eed93e1
body:
  text: 臣聞南正司天授宗祝史巫之職春官掌禮詔犧牲玉帛之儀皆所以別類人神統和上下三時不害力穡以之普存百物阜安薦信猶其多品用能舉明德而徼景福播和樂以致靈祇三五已還皆是物也若乃混元宣氣山岳成形雲雨於是乎生財用於是乎取故有毳冕之服璋邸之符或以肆瘞垂文或以庪懸著法虞舜聖帝也而有徧于之祀周武明王也而有惟爾之祈至於祊田高邑之都藻茝桑封之秩稰稌有羨蘭菊無虧大典奇篇論之備矣後王徂帝聞斯行諸金陵山者作鎮揚都盤根福地峙天險之左次瞰臺城之北隅陽嶺前瞻包舉青林之苑陰崖右轉經營元武之池絕巘嶔岑蔽虧日月深巖窈窕吐納風雲層臺累榭臨其巔涌泉清池湛其下白鹿鹿君䴥騰其藪鴛雛孔翠棲其林豫章梓之材橘柚樝梨之實赭堊丹青之美錫銀金碧之饒固以事異假珍富兼諸夏登於軌物掌以虞衡矧復奇怪中潛絪縕上屬真人末應瘞雜寶以祈年智士攸同指盤龍而建國亦何必嵩邱發峻始號降神岷嶺騰精獨稱建福自時厥後代富靈游刺史還都即有栽松之地諸生肄業非無講學之場岫幌雲關訪徵君於幽谷鹿巾霞帔集道侶於中林斯亦㣥帝之密都先王之冊府者也在昔霜鐘細品猶淹耕父之居反景微光尚駐長留之駕况乎皇州列岳宅怪儲靈不有吉神孰司陰隲蔣帝孕清明之氣禀正直之資實九德之所生與五龍而比翼自西江考績謝聯事於元夷北部申威輯庶功於黃綬於時祚終四百運偶三分人懷塗炭之愁家有剝廬之痛帝則勤勞徇物慷慨憂時既援張敞之桴即振李崇之鼓赤心未盡執漢節以忘生青骨難誣降北山而受享飛蟲顯俗生民之舒慘焉依白馬耀奇平昔之威容如在故使中都之印式報陰功長水之營旁旌同氣廬宮改命非因介子之焚廟貌崇壇詎比愚公之徙自是光靈茂遠代祀綿長或昭德而降祥或害盈而致罰黃旗紫蓋奉五馬之禎符朱鬣碧蹄殄高山之巨盜賢如謝傅猶繫草木之形親若始安亦假弟兄之助故得王封錫羨帝服歸尊追炎昊以齊稱躅虞黃以接武事光典冊惠浹幽遐任水木之遞遷顧高深而自改國家綠圖受祉黃鉞庇人分二牧於土中包九月有於宇下雖十聯百里亟更守宰之權而四望五郊不易宗彞之數及威名暫失龜鼎中遷瀛海飇迴坤輿幅裂而盤礡之際常奉周正封域之間獨為漢守衣冠舊族宛洛遺甿咸趨懷德之鄉共免永嘉之亂終使皇天眷祐百姓與能克昌再造之基奄有六朝之地烈祖功踰嗣夏體濬哲而致中興皇上德邁繼文懋元良而恢下武格天光表慰率土之歌謠累洽重熙漸㣥黎之肌骨所以珍符總至靈命畢陳極金篋以標年盡瑤編而紀瑞襲於六藝貫彼三墳矧復聖作無方神謀不測殷周損益文武弛張制在先機申於後甲百吏奉行而不暇兆民日用而不知帝典恢宏天文貞觀摛華發藻抉瞶披聾丹浦非好戰之師兩階有誕敷之舞坐知千里廓清五嶺之氛役不踰時底定七閩之難國風王澤自北而南樹立之權由來尚矣康無專享止崇藩屏之封穆弔不咸但著急難之詠未有極至公之舉正太弟之尊大義鴻猷如今日之盛者也副君膺則哲之寄有聖人之資由上德而貞萬邦用英才而總百揆麗正繼明之業仰奉宸謀持謙敬客之心俯懷庶品則有齊藩上寄紆盭綬而握兵符燕邸真王珥貂冠而掌宮籥周公則武王之弟夏啟則吾君之子故能緝熙帝載寅亮天工晏平仲之論和北宮子之謂禮自家刑國草偃風行上下之際既交華裔之情如一黑齒奇肱之俗款塞來王碧嵩素滻之濱除宮望幸后夔典樂已播薰絃司馬進稱行陳祕檢功既隆矣德亦厚矣尚復往而未止謙以益尊政靡不修思無不及以為無文咸秩訓誥之格言明祀是崇春秋之大義農祥晨正豐潔四馳密雲不雨馨香並薦載紆睿鑒爰顧遺祠詔曰蔣帝受命上元奠職茲土力宣往代澤被中區所謂有益於人以死勤事者也今號位已極名諡弗彰闕典未申朕甚不取其以勝敵克亂之業為民除害之功因姓開國追諡莊武仍令有司修飾寢廟備制度焉於是即舊謀新審形面勢農工告隙營室方中或懸水以為規或飭材而攻木摶埴之工麕至圬塓之伎星羅徑術常夷靡薙王孫之草荊榛舊闢寧誅宋玉之茅百堵齊興自嵗而畢繚垣十里重屋四周樹文玉於庭中交枝靃靡挺開明於閾外詭狀髬髟而納陛逶迤碧謺元州之石橫梁夭矯雪披後渚之梅豁朱戶之曈曨陽光不夕閟深宮之霮䨴暮靄常霏常上布筵楹間設奠管磬鐘鼓羅於下籩豆簠簋肆於前再變之音克諧永貞之祝無愧神光倏忽裷服連蜷孔葢翠旌若有光而罔覿蕙肴蘭藉若有云而不亡用是高揖靈元永司純嘏罔兩魑魅豈煩夏鼎之圖風雨雪霜無待桑林之禱則知民和而後降福事理而後不祈人祇之間如斯而已者也粵若先王命祀神道教人前哲令德之流九魁六宗之類或以公侯視秩或以戶邑奉祠子晉之為帝賓真階匪極傅說之騎龍尾景耀未融斯皆地勢本高升聞易達詎有權輕五校壤狹一同而能比鏡軒台分光堯日縱質文之迭改代奉典章及聖哲之丕承更加崇飾故金簡玉字興王之統可尋兩騎五車受職之期斯在雖將歷選安得同年昔者崑閬窮遊尚紀白雲之什燕然薄伐亦陳元甲之銘孰與冥貺昭彰壽宮宏麗水通懸圃萃氣色於閶門路接白楊煥丹青於坰野此而莫述後嗣何觀微臣潤色無功討論奚取思問神於先聖姑欲事君苟獲罪於元穹曷容媚竈惟於舊史想見英風適當罷役之初爰奉屬辭之詔西川作頌誠慙邑子見稱南國刊銘或望至尊所改庶使千八百國會執玉於茲峯七十二家配泥金於此地其銘曰茫茫元造萬物資始一經神怪一緯人理先聖則之以著綱紀仰觀俯察上天下地高卑既定品物咸宜宣氣者山配地曰祇三公是擬九牧攸司天作金陵蔣帝荒之巖巖金陵作鎮上國陰林巨壑材生物植洞穴巖房逶迤詰屈隱士無言仙童不食洪惟廟貌奠此名區位重天孫權傾陸吾薜荔之服辛夷之車若自空桑來游下都翼翼京揚馮馮輦轂運屬多壘聿祈深福峻殄堅夷勛亡景覆肸蠁元功威蕤帝籙皇唐膺命和悅人神崇名則舊受職維新祥圖雜集祀典紛綸終全王土以俟真人再造延洪繼文光大陰陽不測天地交泰沒羽梯航雕題冠帶成民致力祭神如在猶防闕典乃韻遺靈永懷簡冊欽若昭明克亂除害膺茲大名亦有制度備於祠庭式瞻昏定昏定既正爰揆農時農時弗虧虞衡肅給般爾交馳加之礱斲益以章施新廟既成神居既寧我有常祀蒸餚薦腥匪禜匪祈歆我惟馨三時不害大庖不盈昔在周家逮於漢室徒騁騏騄虛羅甲乙純嘏弗臻斯猷愈失載返真風爰歸聖日五衢植木四照栽花馳烟驛霧晦景韜霞方介十巫何憂一車行觀吉玉願折疎麻謝傅長逝王公不作獨我莊武先紆睿畧魯墳無棘遼城有鶴刻此苕華永傳嵩霍臣聞太初之氣其生也無始眾妙之門其本也無名積而成形散而為器乾坤運之而兩儀立王侯受之而天下貞是故斷鼇鍊石之功絕地通天之業衣裳軒冕之后干戈揖讓之時雖復遭罹異塗步驟殊致莫不協契於神明之域飲和於道德之原廣無為之為執無象之象萬物恃生而不有百姓日用而不知其迹也則格天光表化人而成俗其本也則收視返聽全真而養身至其玉檢登封蘿圖啟後游神象外脫屣區中鑄金鼎而乘白雲登寒門而立元極閟宮清廟式嚴觀德之場玉洞金壇別啟下都之所由是靈符綜集真籙歧分三元八會之文潛通髣髴七暎九華之室密擬形容足以徼福應於含生致孝思於時事聖人繼作靈構相望故茅山紫陽觀者今上敬為烈祖孝高皇帝元敬皇后之所重修也爾迺星紀儲精下為峻極河圖著錄縣示禎期自道氣融明真科流衍治化宏開於赤縣符圖廣被於名山而華陽洞天實㣥仙之都會金陵地肺又三茅之福鄉左憑柳汧烟霞韜暎右帶陽谷川源隱轔伏龍靡迤鎮以雷平之嶺鬱岡回合浸以護軍之潭郭真人叩舷之池不遷留岸許長史鍊丹之井自冽寒泉白霧紫烟照暎其上飇輪鶴馭往來其中高真七人四處茲地其後貞白真人以元德應世肇開朱陽之館以玉書演祕爰立昭真之臺堂構疏基元洲之蹤可擬生徒廣業白龜之迹斯存金紐鳳羅代相傳授龍車虎駕世有飛昇及元靜先生以沖氣含和體庚桑之嵗計元宗皇帝以尊師重道屈軒后之順風由是天眷遐臨皇心密契維新舊館再易華題丹鼎洞經潔修無倦芝泥龍簡投奉相望戶邑之民豈止奉明之縣樵蘇之禁寧惟柳下之墳故得雲物告祥芝英表瑞小周王之瑤水徒咏空歌異漢帝之猗蘭唯陳甲帳自茲厥後代有修崇上士名人時時解蛻雲軿羽葢往往降靈皆著之金石播於謠頌嗟乎四時代謝天道盈虛雖九氣長存歷劫以資其融結而三階有象隨時因表其晦明則斯觀也將世運以汙隆與皇圖而昇降赤明未啟猶多閴戶之悲白水方興始漸高門之慶孝高皇帝猶龍孕德指樹垂陰應樞電之殊祥肖中天之奇表甘盤就學和光於百六之初庖正分官利見於九三之際賓門納揆有大造於當時彤矢玈弓允至公於四海由是法堯受命祀夏中興補西北之不周應東南之王氣御明堂而揖㣥后輯瑞玉而覲諸侯既治定而功成更憂深而思遠乘奔御朽不以黃屋為尊旰食宵衣惟以蒼生是念知無為之無敗體上德之不德凝神姑射端拱穆清政舉其中事至而應愛民重法敦本訓農偃革銷兵守好戰必危之戒卑宮菲食懼以人從欲之譏故得百寶效靈三辰薦祉遠無不屆邇無不安少康光武之功獨高帝籙貞觀開元之業更啟孫謀今上承積德之基法自然之道變化無方之謂聖神武不殺之謂仁學洞精微守謙光而沖用明昭隱伏體大度以包荒動則庇民不矜功而尚智靜惟修政恒務嗇而勸分聞善若驚每察秋毫之細容光必照寧遺行葦之微化浹風隨時和俗厚嘗以為天下者烈祖之天下憲章者昇元之憲章垂裕無窮永懷罔極衣冠原廟未足盡思聲樂娛神良非致敬緬慕在天之駕因嚴訪道之宮尋屬長樂上仙濯龍興感載詠生民之頌思宏十亂之功迺眷靈巖誕敷明詔發虞衡之吏集般爾之工執藝駿奔飭材麕至果園之柰供其礱斲北邙之土給其圬墁迺新祕殿祕殿孔碩黯其霮䨴屹其穹窿璇題互照以晶熒珠網交疏而窈窱震殷雷於滴瀝拖宛虹於楯軒忽陰闔以陽開乍霞駮而雲蔚儼若虛皇之御穆然太上之容疑馭氣以迥躋眇陵雲而遐觀迺立高門高門有閌擬金闕之觚稜洞朱扉而煥照龍章鳳篆以之題署霓旌絳節茲焉出入迺建兩序紛邐迤而重深迺起層樓邈岧亭而顯敞北彌郭阡之路南亘姜巴之衢赫光景以燭坤麗丹青而藻野速如神運恍若化工每至日薄星迴嵗之云暮桐華萍合春聿載陽赤城旋軫之初白鵠會朝之際都人士女舉袂成帷襲靈風而共洽天和仰雲構而方知帝力豈止百年猶畏獨識軒轅之臺三壽作朋永閟姜嫄之廟大哉至矣無得稱焉夫妙本太無名垂不朽挺窮神知化之盛然後顯通幽洞靈之微立尊道貴德之教然後致還淳返樸之理漸於人為富壽被於樂為聲詩告於太史為典冊著於豐碑為銘篆耿光丕顯其在茲乎爰命下臣敬書令德其辭曰邈矣至道悠哉妙門黽黽無物綿綿若存是生清濁爰闢乾坤迺生之民廼作之君德盛惟皇功高曰帝訪道崆峒求珠赤水下或有知時稱至理三正循環鴻圖資始於惟基命赫矣皇唐運啟再造天垂百祥元德升聞既壽永昌時乘白雲至於帝鄉穆穆嗣君雄雄下武禮極配天教先尊祖明發盡思僾然若睹敬佇仙遊式嚴靈宇靈宇何在句金之陵丹霞夕暎白霧朝凝重屋四注崇臺九層雲生窈窱日麗觚稜三秀交蔭五便分逕丹砂流液元洲立靖柳谷絙烟雷池瀉鏡彷彿九華依稀七暎至誠則感有應斯來含真上客蕭閒逸才飇輪倏忽晨葢徘徊浮黎認土方丈凝臺昔在聖人建言敷教救物以慈奉先以孝敬佩真契恭聞大道顯妙用於言象鼓淳風於億兆薦純嘏於無窮仰皇猷之克紹嵗已未十二月一日建朝議郎守尚書祠部郎中知制誥武騎尉賜紫金魚袋徐鉉撰并書將軍諱瑜字公瑾廬江舒人也吳史列傳功炳乎丹青皖城遺祠頌闕乎金石嗚呼皇天有造物之柄有愛民之仁必待聖人而後行王者有承天之德有濟世之量必待聖人而後發故天人合應聖賢相須民之司命闕一不可雖復淩雲之構非一木之材千金之裘非一狐之腋然其建大號運長策總攬英傑宏濟艱難亦一二人而已故革夏者九有之師而伊尹為阿衡翦商者三千同德而呂尚為尚父秦為無道高祖誅之則酇侯葢於㣥后莽據閏位光武正之則仲華冠於四七漢宗失御孫氏奮發破虜討逆繼志勤王而將軍傾葢於千載之期濡足於百六之會策名江左宣力中朝殊勳盛烈曠代齊契何其偉哉於時王業始基㣥兇方熾國難薦及人心屢搖將軍情發於中義形於色履艱危之際貞節彌堅率振蕩之眾伸威方厲推誠以明大義故逆折游說之鋒屈身以表至公故首定君臣之敬摧赤壁之陣勢動九州建漢中之謀量包四海於是強敵懾迹㣥生延頸姦雄之智無所施焉漢室之隆未可量也嗚呼天未悔禍國之不幸修塗止於偏師大命殞於巴邱流慟於當時遺恨於終古豈四百之祚歷數難移三分之基疆宇有限不然何雄才大畧神授之如彼短命促齡天奪之若此曶乎茫昧不可得而詳也夫英聲由於茂實元功出於全德威棱所及非勉強之攸能績用斯存豈毀譽之可奪有吳為新造之國柴桑乃觀望之師大帝非爭衡之才子布有私室之顧將軍投袂而起橫戈以出魏蜀二主天下英雄或垂翅而宵奔或俛首而求救降茲以往烏足道哉至於分財推宅之仁觀樂審音之妙知人先覺之哲存交服物之懷實天縱其能亦行有餘力矣嗟夫民墜塗炭真主所以臞瘠天造草昧良佐所以驅馳非君臣同體不足以濟大業非帷幄共斷不足以制橫流將軍能沮幼生之譚而吳主亦能拒敵國之間將軍能畫不世之策而吳主亦能破㣥疑之心故得丕顯霸功若斯之盛當此時也如趙士之碌碌漢相之齪齪徒使有若林之會安能施一繩之維又况於市道之交署門之客哉此義夫節士所以感激於風雲惆悵於時運者也嗚呼微管之績既耀於中區盛德之祀遂崇於東夏歷世逾遠善慶彌彰翼子謀孫徙封移社而支庶繁衍故在舒庸召樹猶存魯堂無壞光靈不泯實生太尉中書令西平恭烈王焉半千之運懸符祖德萬夫之望允濟時屯始為定亂之雄終為佐命之老而仁風所被多在故鄉王與嗣子鄴皆節制廬江今仲子祚復刺舉灊部過里門而載軾瞻廟貌而長懷命梓人以新其堂奧督里宰以除其徑術教祝史以絜其籩豆率宗屬以薦其孝思肇建豐碑以永前烈懿哉象賢之美共理之勤民用接和嵗則大有戾夫不佞敢作頌云皇天上帝敷祐下民既命賢主亦生賢臣有若將軍救時之屯仗義秉信資忠輔仁堂堂定策謇謇忘身雄飛夏口橫厲江陵將軍猶生漢室不傾將軍既沒天下三分盛德之享嚴祠未壯夫擊節義士沾巾猗歟舊國赫矣雲孫嗣勳纂服長㦸高門壽宮有煥靈貌如存我紆蘭佩來挹犧罇懷賢慷慨用獻斯文域中之大曰道百行之先曰孝故孝心充乎內必道氣應乎外於是有聿修之德追遠之懷揚名顯親之善集靈徼福之舉用於邦國則臣節著施於家庭則子道光以之為政則民從乂以之薦信則神降福然則壇館之設焉得已乎池州紫極宮者本東晉之普明觀也浸之以秋浦鎮之以齊山北望陵陽竇真人飛升之所南瞻九子費徵君棲隱之鄉元風徘徊精氣交感代有奇士居為殊庭既奉元元之御因崇紫極之號治亂迭運隆替不常戊午嵗太守陳公始臨此郡歷垝垣而歎息步遺址而顧瞻役不徒興義將有屬公溈水洪派太邱舊族重世避地徙居建安祖德門風冠暎圖牒王師拓境閩方即敘撫納歸附旌訪賢能惟我嚴君首奮奇節芟夷逋穢宏濟艱難偏師所指無往弗克故十年之間由裨將歷郡守登上公建齋壇功名之盛近古無匹及王室多故邊城不寧復遣公督舟師率諸將萬里赴援三年轉戰算無遺策兵不頓鋒威行軍中勳在王府舍爵再命聿來是邦於是解甲釋兵頒條布政事從中典民用接和會文賦詩彬彬然有儒者之風矣俄而王妣國太夫人凶問至公孺慕出次烝烝永懷以為柔儀慈訓實大吾族鞠育仁愛兼倍諸孫嘗藥弗親執紼且違欲報之恩王事靡盬思所以薦祉於冥莫求神於希夷非龜山之宮必易遷之館然則琳房金闕瑤壇檜井迎列真之御資閬風之游仙經不誣勝事可作於是瞻星揆日飭用庀徒散廡下之金出荊門之絹人百其力工薦其能易其傾頹化以壯麗成於心匠不愆素期自某年月鳩工至某年月訖事凡出錢若干萬築室若干間正殿當陽三尊負扆享列宿之位於東序設三官之堂於西廂嚴饋奠之室於艮維所以盡時思之禮敞閑宴之庭於乾位所以極坐忘之懷矢棘雉飛霞駮雲蔚璇題行月煥城邑之晶光飛甍白日壯江山之氣色如是則飇歘之駕不得不臨肸蠁之福不得不集想見武夷之會足申令伯之心至矣哉善慶孫謀無得稱已嘗試論之曰神仙者君子之所歸也故真誥云至孝至貞之人皆先受靈職次為列仙嵗登降其幽明如人間之考績矣若乃盡忠於君純孝於親敷惠於民歸誠於仙而不得與夫餌芝术醮星斗者同躋真階吾不信也勗哉夫子其惟有終鉉扈駕南巡致禮名岳假道過此仰瞻久之博我以文輒不遜讓其銘曰我經池陽池陽既康化以至道民知嚮方乃新閒館以奉虛皇君子薦祉則惟其臧我登新宮新宮既崇深嚴耽耽丹彩彤彤九華散影十絕盤空若在宣岳如游閬風至道不煩元關甚邇孝享誠敬奉時祖妣善慶純嘏施于孫子三茅二許夫何遠已流芳金石永永千祀先儒有言曰山者宣也宣氣生萬物者也然則崇岳巨鎮蓋氣之雄者也其間靈峰奇岫又氣之粹者也是故帝以會昌神以建福感而生聖賢宅而為洞天奇怪恍惚非尋常所能測已西山者作鎮荊楚雄視衡巫勢靡迆而崇高氣清虛而和暢動植滋茂樵隱安閒昔邑人洪崖先生所居於此洪井之右澗水之濱喬木森羅長阜迴抱滄波縈帶奇峯橫翠如虎踞之形有伏龍之號唐乾元初山人申太芝上言其地有異氣詔於此立應聖之宮抗元元正殿於其前塑肅宗聖容於其上繚垣觀闕仰法於紫宮路門納階取規於丹禁光靈煥爛薦獻精嚴上士勤行守臣莅職秩祀之盛莫之與京廣明已還三灾在運望拜之地闕而莫修遼東之鶴徒還絳縣之人已老甲辰嵗有道士王守元者緱山仙裔茅嶺名流受命藩侯來膺道任翦荊棘於高閎之址構茅茨於隆棟之基不出焦先之廬自化庚桑之俗善言邇遠馴致其功二十餘年克甄舊址入室弟子劉德淳氣沖貌肅節苦行高恪恭以居次謙和以接物既嗣其業遂成厥終又十餘年締構云畢凡內外殿宇百有餘區材用善良工藝堅密其藻飾也不踰奢儉之節其廣袤也足展朝修之儀祕殿深嚴靈壇博敞晬容穆若列侍參然鐘磬在懸苾芬具薦燦旭景於軒檻延夕月於甍題蕭寥空洞之音希夷飇歘之御邈哉真境無得而名鉉爰在弱齡服膺至道先君頃參戎乘嘗莅此邦依然棠樹之人自是桐鄉之邑乃以庚申嵗遷奉松檟卜兆於鸞岡之陽敢言折臂之祥願占維桑之地明年復以王事再至山中祠虛皇於游帷之宮投龍簡於天寶之洞所經靈跡實與幽尋又是山有寶光初至之夕即見於中峯之上下至山麓倏忽聚散狀如野燎而精明眩目不可正視澗中有盤石石有三藥臼嵗端午日未曙前常有擣藥之迹餘滓在焉水流至此甘香如蜜取以灌潄心府瑩然斯皆載於舊經新所覆視者也此山登晨之士接武而洪崖為之冠列仙之墟連屬而洪井為之宗然則閬風元圃之在人間者也宜其篆刻金石永齊穹壤鄙儒不佞敢作銘曰江之右楚之墟峙靈岳為仙都洪井濱鸞岡隅建清宮應真符廢而興神之扶宮既成道既行校三宮朝百靈集景福薦皇明復淳化遂嘉生億萬年流頌聲事壽州刺史御史大夫上柱國彭城威侯贈太尉劉公神道碑聞夫郊圻內理牧萬民者是曰諸侯夷狄外攘守四方者其惟猛士然則安危異任文武殊塗故天下方爭韓彭英吳橫雕戈而震耀㣥生待理龔黃寇賈擁皁葢以從容及夫昭格寰區紛綸簡冊其歸一也代有人焉若乃總是全謀覃於奕葉流光受社潛齊累將之家崇德計功下視慙卿之族古難具美我則兼之公諱崇俊字德修其先彭城人高祖升調補山陽淮陰尉遂家焉即為縣人也岳峻洪基海疏遙派陽城相土千齡侯伯之封沛澤中興兩代帝王之允懷黃結紫論鼎甲以盱衡刻像圖形誓山河而捧袂國史家牒披卷可知頃者聖運中微㣥方暫擾驪山之北犬戎興戲水之師踐土之庭天子屈河陽之召公路擁南陽之眾僭號仲家隗囂據隴右之圖坐論西伯勤王問罪吳太祖始定揚州賜脤專征昭皇帝遂加殊禮於是揚旌北討遷寇迹於淮濱闢土西封謀守臣於諸將命我顯祖作牧鍾離乃固保障之嚴載施犬馬之備軍無粃政將期十萬之行師有見糧即聚九年之蓄方圖大舉已伏前殳永年不登未幾而歿長山㣥盜舊畏萊公西域故營願從班勇復命烈考嗣膺使符不還渭水之兵誓卒龍門之托故蓼城之戰斬獲過當汝陰之圍策勳居最先零委質鬬充國以無由玁狁驚魂射郢都而不中酬庸錫羨建清淮軍以壯中權加禮慎終贈太尉公以光幽穸既而鼓鼙悽愴部曲徘徊家有遺恩人思世德帝曰崇俊惟爾恭儉孝友誠明惠和任則中軍帥位則文昌長誕舉攸職予惟汝嘉濠梁之郊控扼遐裔惟乃祖金克懋厥始乃考仁規克慎厥中肆予命爾克成厥終往哉汝諧無廢朕命公銜䘏奉詔墨絰即戎鋪陳政經討閱軍實思有以光大前緒播揚國風初二先公之理也屬洛邑再遷浚郊作梗偽新竊據仍延十五之期黃武開元始創三分之業犬牙之地蠆尾常搖鋒鏑縱橫車徒奔走摧牙獸困尚遙匡復之謨赬尾魚勞未暇綏懷之術逮公之理也寇皆遠遁民佇息肩千里風從四方聳聽以為格物必在於立制也故减貢賦以息貪暴之端暢刑章以拯姦宄之極賞不虛授罰其必行以為富邦必在於務本也故使民以時相地之利持未熟之稻游惰自遷班再易之田兼并絕倖以為邊寧不可以忘武備也故修斥候浚溝隍竹與木而靡遺膏與苫而畢給亭障屹峙軍聲隱然以為強兵必在於實皇畿也故招懷邊甿講習戎事游兵冀馬俱為無犯之容晉勇齊雄並集選和之下嵗揀精銳歸之京師其餘庶政常經門見戶睹斯可畧而言也高皇帝禮均元老寵冠列藩受禪之初則進上公之秩肆類之際則委廉使之權言必見從無再却之奏君常高枕忘北顧之憂皇上欽奉重熙聿遵無改毗倚尢重親敬有加初先太尉公之薨也西北小驚戒嚴從便因詔執事移清淮軍於壽春及是復立定遠軍即命公為節度使仍以公少子匡符尚永嘉公主留侯操印初躋上將之壇帝子吹簫即降王姬之館禮優伯舅望重懿親於時公莅濠梁十有七年矣米鹽皆序丞史當才閉閤罕爭舉烽無警朝廷以公能光前烈雅得邊情清淮之師遺風仍在俾盛一家之美載嚴萬里之城改壽州刺史充清淮軍節度使鄧侯倏去鷄鳴傷父老之心長者聿來虎渡息鄉閭之患能事畢舉考功再期方將建大斾以風驅指函關而電掃雲中鷄犬八公之迹徒存夢裡膏肓二豎之妖遂作春秋四十保大四年夏六月十有六日薨於壽春公署皇上翦鬚靡及穿壁方遙投綠沉之悲哀竟日賜黃銀之帶慷慨霑襟廢朝三日中使護葬詔兵部侍郎李貽業持節冊贈太尉賜諡曰威即以其年秋九月十五日備鹵簿鼓吹葬於濠州鍾離縣大化里之原禮也前夫人李氏後夫人隴西郡君李氏皆太師趙忠懿王女也賴鄉仙李即開柱史之源參野飛龍遂紀宗卿之籍勳庸六鎮時高謝氏之門師範兩朝室有班姬之訓荃蘪蘭蕙映戚里以芬芳藻荇蘋蘩播婦儀而昭晰門內之理夫人有焉子八人二子幼長子節早亡次範滁州刺史次簡次策次霸時未仕次符祕書郎或得公之政事或得公之兵鈐學禮學詩惟忠惟孝皆推酥酪之味咸有芝蘭之芳所謂積善餘慶世濟其美者也惟公山河龍鳳凝粹彩於神姿緯候風雲集淵謀於靈府議公家之事不以身為行將軍之令每由剛克卒祖禰之成業可謂聿修膺牧伯之寵章訖無虛授所以始終匪玷福祿攸歸同族之間朱輪結軌季父仁贍作鎮夏口弟崇佑崇僖更典晉陵其餘將軍列侯中郎校尉銀黃照爛光浮通德之門珩珮陸離響雜高陽之里苟非自天攸相與國無疆其孰能與於此乎向使享大年敷遠畧鴻飛鵬舉功未可量也天命不然能無永悼昔者荊州從事猶牽墮淚之悲大宰舊寮亦有懷鉛之請况乎世功丕顯揭日月以高驤帝念惟隆會雲龍而下濟欲垂萬葉可不務乎微臣職典絲綸詞非清潤持赤管以承詔拂貞珉而投刃庶使蚩蚩萌隸觀迹而長懷眇眇來雲披文而盡信其銘曰惟彼陶唐有此冀方自天佑之後嗣其昌侯遷魯縣帝隱芒碭猗那大族嵩華配長渢渢彭城興我遐祚顯顯山陽著我高祖高祖伊何仁而不遇慶鍾令孫聿來繩武皇運中否諸侯起爭浚郊怙亂淮壖不庭吳王奮發受鉞專征命我顯祖守濠之城濠城嚴峻濠兵驍勇顯祖帥之㣥兇震恐將軍下世邊烽亦聳乃命象賢荷時之寵荷寵伊何載大其功蠢蠢梁寇言言潁墉是馘是俘兵無頓鋒爰有奇畧集於威公威公嗣侯不墜其訓戎事之隟民功是振為之中典著之令聞泗上風移高師河潤帝曰伯舅予嘉乃勳扞境則武安邦則文乃降王姬於爾慶門乃改乘轅於彼西軍西軍何在鎮彼衡霍威公來思式遏寇虐胡馬已遠將星俄落百身寧贖九原誰作明明天子惻愴聞鼙嵗云秋止返斾遲遲二藩士女泣涕漣洏賢侯逝矣吾誰與歸黯黯塗山湯湯淮涘駟馬悲鳴滕公所閉甘棠勿翦召伯攸憩是用刊碑永告來裔
