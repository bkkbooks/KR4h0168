front:
  text: 全唐文欽定全唐文卷一百三十七元齡字喬齊州臨淄人隋時本州舉進士授羽騎尉太宗徇地渭北元齡杖策軍門授秦王府記室封臨淄侯貞觀元年官中書令爵邢國公進尚書左僕射改封魏拜司空圖形淩烟閣加太子太傅二十三年薨年七十冊贈太尉并州都督諡曰文昭
  hash: sha256:6242d040983f48d46b5e0d87927008d06480c8d938bfc88f5b73b7e23b2e871f
