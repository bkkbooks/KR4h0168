body:
  text: 臣聞兵惡不戢武貴止戈當今聖化所覃無遠不屆洎上古所不臣者陛下皆能臣之所不制者皆能制之詳觀古今為中國患害無過突厥遂能坐運神策不下殿堂大小可汗相次束手分典禁衛執㦸行閒其後延陀鴟張尋就夷滅鐵勒慕義請置州縣沙漠以北萬里無塵至如高昌叛渙於流沙吐渾首鼠於積石偏師薄伐俱從平蕩如高麗者歷代逋誅莫能討伐陛下責其逆亂弒主虐人親總六軍問罪遼碣未經旬日即拔遼東前後虜獲數十萬計分配諸州無處不滿雪往代之宿恥掩崤陵之枯骨比功較德萬倍前王此聖主之所自知微臣安敢備說且陛下仁風被於率土孝德彰乎配天覩夷狄之將亡則指期數歲授將帥之節度則決機萬里屈指而候驛視景而望書符應若神算無遺策擢將於行伍之中取士於凡庸之末遠夷單使一見不忘小臣之名未嘗再問箭穿七札弓貫六鈞加以留情墳典屬意篇什筆邁鍾張辭窮班馬文鋒既振則宮徵自諧輕翰暫飛則花花競發撫萬姓以慈遇㣥臣以禮褒秋毫之善解吞舟之網逆耳之諫必聽膚受之訴斯絶好生之德禁障塞於江湖惡殺之仁息鼓刀於屠肆鳧鶴荷稻梁之惠犬馬蒙帷蓋之恩降乘吮思摩之瘡登堂臨魏徵之柩哭戰亡之卒則哀動六軍負填道之薪則精感天地重黔黎之大命特盡心於庶獄臣心識昏憒豈足論聖功之深遠談天德之高大哉陛下兼衆美而有之靡不備至微臣深為陛下惜之重之愛之寶之周易曰知進而不知退知存而不知亡知得而不知喪又曰知進退存亡不失其正者惟聖人乎由此言之進有退之義存有亡之機得有喪之理老臣所以為陛下惜之者蓋此謂也老子曰知足不辱知止不殆臣謂陛下威名功德亦可足矣拓地開疆亦可止矣彼高麗者邊夷賤類不足待以仁義不可責以常禮古來以魚鱉畜之宜從闊略若必欲絶其種類深恐獸窮則搏且陛下每決一死囚必令三覆五奏進素食停音樂者蓋以人命所重感動聖慈也況今兵士之徒無一罪戾無故驅之於行陳之閒委之於鋒刃之下使肝腦塗地魂魄無歸令其老父孤兒寡妻慈母望轊車而掩泣抱枯骨以摧心足以變動陰陽感傷和氣實天下之冤痛也且兵者凶器戰者危事不得已而用之向使高麗違失臣節而陛下誅之可也侵擾百姓而陛下滅之可也久長能為中國患而陛下除之可也有一於此雖日殺萬夫不足為愧今無此三條坐煩中國內為舊主雪恥外為新羅報讎豈非所存者小所損者大願陛下遵皇祖老子止足之誡以保萬代巍巍之名發霈然之恩降寬大之詔順陽春以布澤許高麗以自新焚淩波之船罷應募之衆自然華夷慶賴遠肅邇安臣老病三公旦夕入地所恨竟無塵露微增海嶽謹罄殘魂餘息預代結草之誠儻蒙録此哀鳴即臣死且不朽臣聞理國要道實在公平正直故尚書云無偏無黨王道蕩蕩無黨無偏王道平平又孔子稱舉直錯諸枉則民服今聖慮所尚誠足以極政教之源盡至公之要囊括區宇化成天下臣聞古之列國無不強陵弱衆暴寡今陛下撫養蒼生將士勇鋭力有餘而不取之所謂止戈為武者也昔漢武帝屢伐胸奴隋後主三征遼左人貧國敗實此之由惟陛下詳察武德中詔釋奠於太學以周公為先聖孔子配享臣以周公尼父俱稱聖人庠序置奠本緣夫子故晉宋梁陳及隋大業故事皆以孔某為先聖顏回為先師歷代所行古今通允伏請停祭周公升夫子為先聖以顏回配享謹按高祖長陵高九丈光武陵高六丈漢文魏文並不封不樹因山為陵竊以長陵制度過為宏侈二丈立規又傷矯俗光武中興明主多依典故遵為成式實謂攸宜伏願仰尊顧命俯順禮經按月令蠟法唯祭天宗近代蠟五天帝五人帝五地祇皆非古典今並除之季冬寅日蠟祭百神於南郊大明用犢二籩豆各四簋簠㽅俎各一神農及伊耆氏各用少牢一籩豆等與大明同后稷及五方十二次五官五方田畯五嶽四鎮四海四瀆以下方別各用少牢一其日祭井泉於川澤之下用羊一卯日祭社稷於社宮二十八宿五方之山林川澤邱陵墳衍原隰鱗羽贏毛介水墉坊郵表畷貓虎及龍鱗朱鳥白虎元武方別各用少牢一每座籩豆各二簋簠㽅俎各一蠟祭凡百八十七座當方年穀不登則闕其祀蠟之明日又祭社稷於社宮如春秋二仲之禮封禪者本以功成告於上帝天道崇質義取醇素故藉用藳秸樽以瓦甒又按梁甫是謂梁陰近代設禮壇於山上乃乖處陰之義今定壇位於山北將封先祭義在告神且備謁敬之儀方展慶成之禮固當於壇下址預申齊潔贊饗巳畢然後登封既表重慎之深兼示行事有漸今請祭於泰山下設壇以祀上帝以景皇帝配享壇長一十二丈高一丈二尺梁甫去泰山七十里又在東南至於行事未為穩便社首去泰山五里是周家禪處臣等參詳請禪社首金玉重寶質性貞堅宗祀郊禋皆充器幣豈嫌華美實貴精確況乎三神壯觀萬代鴻名禮極殷崇事資藻縟玉牒玉檢式韞靈奇傳之無窮永存不朽今請玉牒長一尺三寸廣厚各五寸玉檢厚二寸長短闊狹一如玉牒其印函請隨璽大小仍纏以金繩五周封禪之祭嚴配作主皆奠玉策肅奉虔誠今玉策四枚各長一尺三寸廣一寸五分厚五分每策五俱以金編其一奠上帝一奠太祖座一奠皇地祇一奠高祖座登配之策盛以金匱歸格藝祖之廟室今請長短令容玉策高廣各六寸形制如今之表函纏以金繩封以金泥印以受命璽舊藏玉牒止用石函亦猶盛書篋笥所以或呼石篋今請方石三枚以為再纍一作冊纍其十枚石檢刻方石四邊而立之纏以金繩封以石泥印以受命璽四出開道壇場通義南面八升於事為允今請介邱上圜壇廣五丈高九尺用五色土加之四面各設一階御位在壇南升自南階而就上封玉牒凡言封者皆是積土之名利建分封亦以班社立號謂之封禪厥義可知今請於圜壇之上安置方石璽緘既畢加土築以為封高一丈二尺而廣二丈以五色土益封玉牒書藏於內祀禪之土其封制亦同此謹詳前載方石緘封玉檢金泥必資印璽以為祕固今請依令用受命璽以封石檢其玉檢既與石檢大小不同請更造璽一枚方一寸二分文同受命璽以封玉牒石檢形制依漢建武故事勒石紀號垂裔後昆美盛德之形容闡后王之休烈其義遠矣陛下聲暢九垓威橫八極靈祇不愛其寶兆庶無得而稱但當贊述希夷以攄臣下之志其登封及禪并肆覲之壇並請刻頌立碑顯揚功業既至山下禮行告至柴於東方上帝望秩遍禮㣥神今請其壇方八十一尺高三尺陛仍四出其禪方壇及自餘儀式請從今禮仍請柴祭望秩同時行事距石之設意取牢固本資實用豈云雕飾既積土厚封足令與天長地久其大小距環壇石闕回建事非經誥無益禮義煩而非要請從減省案禮孫為王父尸案令祖有蔭孫之義然則祖孫親重而兄弟屬輕蔭重反流合輕翻死據禮論情深為未愜請定律祖孫與兄弟緣坐俱配流其以惡言犯法不能為害者情狀稍輕兄弟免死配流為允如晦字克明京兆杜陵人隋大業中以常調預選補滏陽尉尋棄官歸唐初為秦王府兵曹參軍太宗即位遷兵部尚書封蔡國公進尚書右僕射與房元齡共掌朝政談良相者稱房杜焉貞觀四年薨年四十六贈司空徙封萊圖形淩烟閣諡曰成天子有爭臣雖無道不失其天下仲尼稱直哉史魚邦有道如矢邦無道如矢世基豈得以煬帝無道不納諫諍遂杜口無言偷安重位又不能解職請退則與箕子佯狂而去事理不同昔晉惠帝賈后將廢愍懷太子司空張華竟不能苦爭阿意苟免及趙王倫舉兵廢后使讓張華華曰將廢太子日非是無言當時不被納用其使曰公為三公太子無罪被廢言既不從何不引身而退華無詞以答遂斬之夷其三族古人有云危而不持顛而不扶則將焉用彼相故君子臨大節而不可奪也張華既抗直不能成節遜言不足全身王臣之節固巳墜矣虞世基位居宰輔在得言之地竟無一言諫爭誠亦合死彥博字大臨黎國公大雅弟隋開皇末授文林郎復事羅藝贊歸唐武德中為中書侍郎貞觀初纍官中書令封虞國公遷尚書右僕射十一年薨年六十四贈特進諡曰恭請準漢建武時置降胸奴於五原塞下全其部落得為捍蔽又不離其土俗因而撫之一則實空虛之地二則示無猜之心若遣向河南則乖物性故非含育之道也天子之於物也如天地覆載有歸我者則必養之今突厥破滅之餘歸心降附陛下不加憐愍棄而不納非天地之道阻四夷之意臣愚甚謂不可遣居河南亦無所患所謂死而生之亡而存之懷我德惠終無叛逆臣聞聖人之道無所不通古先哲王有教無類突厥餘醜以命歸降我援護之使居內地我指麾之教以禮法數載之後盡為農人選其酋首遣居宿衛畏威懷德何患之有且光武有南單于居內郡為漢藩翰終乎一代不有叛逆德棻宜州華原人武德中官祕書丞貞觀中封彭城子纍除祕書少監高宗朝遷國子祭酒進爵為公乾封元年卒年八十四諡曰憲竊見近代巳來多無正史梁陳及齊猶有文籍至周隋遭大業離亂多有遺闕當今耳目猶接尚有可憑如更十數年後恐事跡湮沒陛下既受禪於隋復承周氏歷數國家二祖功業並在周時如文史不存何以貽鑑千古如臣愚見並請修之竊以釋老二教慈敬宏深有國因循遂開崇尚既久其法須從其道竊謂拜俗理恐未通何者削髮異冠帶之儀持鉢豈樽俎之禮申恩方祈定慧無勞拜跪嚴親報德有冀真如何必屈腰慈后山林既往非復廊廟之賓朝野裁殊理宜高尚其事今使責以名教有虧其旨臣等愚暗請從不拜為宜謹議謹按此篇從藏經采出廣宏明集所載與此不同今並存之竊以凡百在位咸隆奉上之道當其為師尚有不臣之義況佛之垂法事越常規剔髮同於毀傷振錫異乎簪紱出家非色養之境離塵豈榮名之地功深濟度道極崇高何必破彼元門牽斯儒轍披法服而為俗拜踐孔門而行釋禮存其教而毀其道求其福而屈其身詳稽理要恐有未愜又道之為範雖全髮膚出家超俗其歸一揆加以遠標天構大啓皇基義籍尊嚴式符高尚惟此二教相沿自久爰暨我唐徽風益扇雖王猷遐暢實賴天功而聖輪常轉式資冥助今儻一朝改舊無益將來於恆沙之劫起毫塵之纍則普天率土灰身粉骨何以塞有隱之責蠲不忠之罪與其失於改創不若謬於修文孔子曰因人所利而利之老子曰聖人無常心以百姓心為心二教所利宏益多矣百姓之心歸信衆矣革其所利非因利之道乖其本心非無心之謂請遵故實不拜為允伏惟陛下德掩上皇業光下問君親崇敬雖啓神衷道法難虧還留睿想既奉詢芻之旨敢罄塵嶽之誠懼不折衷追深戰惕謹議上闕出闕其闕金闕避難闕慶靈闕英賢闕南闕川闕亦闕傳太宗闕二字三闕三字公贈闕三字恆等闕一字州諸闕十四字績茂闕二字功闕三字跨闕二字之十亂邁炎靈之三傑祖義隋上柱國闕三字四州刺史闕七字公闕十五字重簪纓器名瑚璉位登上列政洽藩維父宣道隋車騎將軍上闕十六字開國闕四字孫殫身浴德既揮翰於鳳沼亦拊翼於龍樓闕七字光闕十三字沙五州諸軍事闕一字州刺史闕一字日闕一字漢闕一字欽無忌之闕三字重中郎之德以今望古何以闕四字章闕三字德降生稟闕六字英靈於嶽瀆亦猶嵩華峻極梓之所闕一字叢疏閬仙宮王褱産於焉孕育闕九字琢闕九字愧其闕五字其該博延闕一字曲臺之闕一字金闕一字玉之書冊府闕二字石渠闕一字要莫闕五字探賾鉤深辨漢陵之竹識楚江之萍實同陳室之未掃若董園之不窺韞廊廟之宏材懷佐闕一字之闕一字略闕二字而闕一字梁闕九字之闕四字重之曰斯闕一字隋仁壽之末調為闕二字挽郎闕一字拜朝請郎闕一字班例闕二字而隋德不競政紊朝昏公藏器待時逍遙文史恐以偃仰貽誚方就末班大業十年拜清河縣長爰屈上才闕二字下闕一字所闕二十五字宅心拯滄海之橫流撲崑峯之烈火闕四字覺闕一字乃時闕二字廾彼離心叶茲同德若公孫之歸漢似文若之違袁闕六字賜以乘馬即拜銀青光祿大夫太宗文皇帝闕十一字率闕一字旅闕三字中幕府初開俊賢翹首辟書既下以公為渭北道闕一字軍敦煌闕十七字軍闕三字羽闕三字公運比闕五字算闕三字之足樂異孔璋之闕一字富豈唯參預帷幄抑亦儀表人倫義寧元年代平闕一字師勳加授左光祿太宗進封趙公府寮亦並隨改及遷闕一字仕夏朝政惟新太宗胙土八川分封百二公復策名闕一字府仍司管記闕四字大闕二字討闕九字崇勳行賞闕一字授上柱國武德元年九月拜秦王闕一字曳裾碣館躡履平臺邁闕一字輔之闕二字繼祖仁之徽烈薛舉因隋末喪亂命儔嘯侶竊據汧隴毒害黎元聖朝愍茲塗炭龔行天罰乃詔太宗為闕一字討行軍元帥公復以闕十字皇基草創闕一字夏未賓闕三字分陜闕一字征以闕五字大行臺總維衆務公以本任兼度支郎中尋檢校行臺左丞並知膳部郎中事復奉敕為華州團割使仍授騎官軍副公厲兵秣馬明賞慎罰闕十四字公闕十四字薛舉破劉闥擒闕三字拒闕二字賊等勳封黎陽縣開國子邑三百戶并賚闕一字及馬又以劉闥重擾河北命公為河南道支度軍糧使明年又從太宗討楊幹於涇州拒胸奴於北地奉教判天策府從事中郎尋進爵為伯邑五百戶前後賞物七百段及乎闕十六字之闕三字衛尉少卿進爵為侯邑七百戶貞觀元年拜御史府長史高視首席匡贊闕一字藩無勞露居之請自諧匡正之寄三年進中書侍郎密勿闕六字同范寧之宏益闕二字若孔演之多識闕一字意尋闕二字部侍郎闕五字左庶子加散騎常侍以闕二字宮多所闕一字益賜黃闕一字一斤賜絹百匹太子闕三字侍春坊多闕二字歲既闕一字宏益宜加優賞七年檢校蒲州刺史尋闕一字調護寄闕二字舉闕四字綸闕四字部十年進爵為公邑一千戶闕三字太宗墨敕答曰忽省來表讜言周備若非至誠於國誰能披露乃心如斯情常然傅闕二字釣何以過也卿闕四字無闕二十字禮闕四字一闕一字實亦闕四字未及拜制即詔授本職公闕二字陳情敕令中書侍郎岑文本就家喻旨云忠孝不並我兒須人輔弼卿宜抑割豈可徇以私情公固陳哀苦竟被奪情以公闕三字札令闕三字公闕七字奉敕既而闕一字氏失德昵闕一字奸闕五字歸竭誠已闕七字以進闕一字規遂漸相疏斥潛謀毒害厚賂凶人密相要劫賴公積善幸免路隅及釁咎彰聞遂至廢黜春宮官屬皆羅闕一字譴以公闕八字及闕一字華闕三字求闕三字公闕一字在帝心復拜左庶子加銀青光祿於闕四字翼鶴闕一字飛闕一字邁闕二字之清塵跨應徐之勝跡十八年拜金紫光祿大夫行衛尉卿判太常卿事五禮任隆八屯寄重兼而歸我僉論無違又以本闕四字列闕一字草一年遷禮部尚書八闕一字清華五曹樞要官闕一字北斗名重南宮竭訏謀以佐時宏損益闕四字厲闕一字其明允闕二字稱其博聞草三年以本官兼太子左庶子因謝上謂之曰以卿恭厚長直為朝廷所知在府日共令田一種故重闕二字職尊奉闕二字遷闕一字侍闕一字今上闕一字元憂勞億兆公勵誠闕一字節闕一字往闕二字庶績咸闕一字彞倫攸敘永徽元年加授光祿大夫進闕一字燕國公邑三千戶大開茅社廣列山河榮命既隆朝望斯重二年八月拜尚書左僕射闕一字本闕二字端闕一字望重自非闕三字緯闕一字經闕一字安闕十五字務復以本官兼太子少師尋而肇建中宮以公兼司徒持節闕一字命副君初臨甲館重道尊賢公既翊正春宮綱維禮閣參贊百揆陪侍兩宮朝野仰其風猷搢紳欽其雅望俄進位太子太傅餘並如前鄧闕一字華闕七字職闕三字當代名闕一字方諧僉議以今方古差可同年公闕一字以闕一字當朝政恆懼盈闕一字頻表闕一字奏請收止足皇上弗許乃令中書令來濟宣旨喻懷云公以永徽巳來即當樞要藉公材用為朕股肱耳目公以年事衰闕一字抗表辭闕四字人闕二字深可闕一字尚然朕今欲巡闕二字鎮宗廟社稷付公一闕一字亦知公闕一字人疢闕一字即遣與立闕一字一員闕一字官不須辭退也及鑾駕東巡留公居守駕還之後屢更陳聞自此踰年方蒙恩許乃高謝左執遷太子太師同中書門下參闕六字事闕三字榮州刺史公闕一字言闕二字待罪鞠躬俄有恩詔遷岐州刺史考績入闕二字除華州闕四字為政頻蒞近畿忠信既孚鈎距勿用屢辭老病詔許懸車仍降殊恩聽朝朔望將欲參奉華蓋陪侍登封闕一字行至於洛闕二字疾闕三字屢闕四字竟無闕一字於膏肓以麟德二年十月草日薨於東都安衆里之第春秋七十有八皇情闕一字悼頻闕一字綸言喪葬所須並蒙官給各令京官五品檢校將送並給靈輿車乘言旋京宅追贈使持節都督幽易媯檀平燕六州諸軍事幽州刺史闕十字石闕一字以乾封元年歲次景寅十一月癸亥朔闕一字二闕一字甲申葬於雍州三原縣萬壽鄉清池里奉常考行諡曰定公禮也惟公局量宏遠識度淹通空谷無私虛舟不忤雖復孔墻數仞無以測其高深黃陂萬頃不足方其涯涘闕一字喜慍於闕一字色絶闕二字於胸襟闕五字終如始加以闕一字悅墳典崇尚闕二字備百行而無擇恥一闕四字緣情極綺靡之能體物窮瀏亮之趣雕龍謝其輝煥吐鳳慙其符彩所著文集勒成七十卷兼復情敦孝悌愛結州親因心竭闕一字義之闕十二字亦闕一字依仁