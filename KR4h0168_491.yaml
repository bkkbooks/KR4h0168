front:
  text: 全唐文欽定全唐文卷四百九十一權德輿九
  hash: sha256:d1cfc8ed5464420057055ddc297e94afa4565525953966d38df95ec537b41295
body:
  text: 始豫與公佐俱以圓冠裦衣息偃於江湖間練塘鏡溪樂在雲水師心自放相視莫逆其後則攻過內訟知道不遠人洗其心虛以順外逮三四年又俱以法冠翹車為諸侯賓攝衣塵中與俗駕並馳間關道路離憂多而歡言少七年詔書以禮官博士徵鄙夫於吳十六年以尚書祠部徵公佐於越其間間闊忽焉十歲心期寓書常若對面中朝大夫君子皆以推轂為已任未至如然亦既覯止笑與抃會月未再期麾幢在門繇是大夫之賢者士之仁者皆惜其去以公佐有端藻直質無巧言讇笑得之自是不得自是故也今天子加恩元元慎重吏師則列郡長人不輕於中都官明矣况宣城有賢長帥以廉風俗新安有佳山水以資勝踐為仁由已賦祿且厚此皆不期至而至者然則表課陟明疾若傳置行當以尺一徵書奪於是邦邦人雖欲遮道借留末由也已又惡用今日少別為戚戚耶公佐嗇神自愛以俟良會今年春上始命二小司徒主量入經費之節辨繇賦榷管之法皆內有郎吏外有從事多冠惠文冠分道將命督課郡國其或才軼㣥倫望重搢紳者則總二府之職而兼領之故執事有今茲南荊之命用能選也初執事以名聲文采為士林所仰方退然深居於華陽仙府講道肄業恬曠自居諸公之辟日至山下且以道勝於內則出處不殊儒衣昂然徐就知已及參總世務更居劇職動成故事去如始至論文變則能窮損益之旨商功利則能通輕重之權故數年之間三踐憲司赤紱在股襜如裦博諸生榮之歲十二月自鍾陵抵江陵驅車即路不憚冰雪况騷楚遺韻楓江遠目在此路也情如之何五言詩送別之始故自戴臨川蕭王二柱史已降皆徵文貺遠字用五而詞多楚者以地理所歷且行古之道也大君子所以貴者道合於上化流於下得時大行求福不回而已僕射南陽公鎮徐方十年師貞人和拜章請覲冬十月四牡雕戈至於京師或誦其德輝或歌其事功直道相賀懦夫立志公始以裦衣儒冠遊公卿間仁義博富名聲籍甚其後擁傳佐戎專城靖人福以至德惠之美利臨駭機以激大順奮州師以摧劇虜淮湖之間嶷然保障陟明加地再命元侯康衢自隨於趾步枉道不萌乎心術而文鋒師律奇正相合以氣為主與古為徒故其緣情放言多以莫耶自况然則天下之肯綮適所以資公之斷割耶上之注意也深公之誠慮也至貢端誠以無隱沃宸慮如合符盡直於內詭詞於外日降慶賜載淹旆旌元正前殿之賀中和內朝之直鏘鏘鸞聲湛湛露斯雖韓侯入覲吉甫燕喜無以過也逮茲春半受命言旋中朝賢士大夫皆舉酒為壽徵詩為禮蓋悅公之風而惜別也德輿辱當授詞不逮意姑以掖垣所賦類於左方云九年正月左史韋公移疾既踰時左曹以聞得請當免遂以角巾野服如東周舊山中朝廷搢紳先生之徒車轂擊於通馗觴酒交於竹林執其衣袪惜乎分陰弦晦屢移其歡不厭或發於歌詠以將厚意外孫權德輿序而言曰大凡士之生世有二道焉其出也宣其功緒播其利澤納忠服勞以服天下其處也味道之腴與古為徒休影息迹以間身世不如是者細則牽於利欲大則囿於得喪識真者羞之公之先扶陽始以丞相致仕為西漢盛典逍遙以安車不屈為北朝外臣至是左史又能伸其志以宏其世嘉遁德風盛乎一門况吾君用太和理萬物動者靜者各遂其方則陳力以致用潔身以宏教其利一也故左史得以聰明為駢枝以名聲為纏繳無耗氣無焚和退然葆真獨與道往鷗鳥不動家人忘貧是行也朵頤者知懼矣出車家林揮手青門擁途而祖者唯恐不及合歡也忘印紱之輕重陳詩也無章句之約束放言無擇造適則笑行觴無算既醉而罷虧成彼是曾不得棲於念慮之中而惠風間雲飄拂左右動用視聽無非大方推是類而廣之則泛清伊陟嵩邱又可知也小生無以為贈謹序其所以然附於編大易之言君子也有出處語默之異或有猷有為以宣事功或不營不忮以順天理則陳力廟廊之上潔身巖石之下皆其所也至於振風聲以助時化無乃處者裕乎丈人燕居積四十年而天爵人爵合發至京師周月而解巾致政之詔再下豈徒然哉初躬耕於延州三茅山之趾安仁食力聲利不入心虛曠而體胖道義富而家肥閨門淑行流於鄉黨泊然與白雲鷗鳥同其無事去年春鶴書下江南江南守臣多方以起之至止之日褐衣召見未受命而被以章綬既受命而侍於宮朝循性蹈道不遷於物抗章乞身詞直而明凡五上而後得請之詔下寵秩優禮周行聳視上以為天下之本至重必資賢人以奉三善故命職命官皆在於是及不得已而賜告也猶以審諭道德處之不然者豈無他豐祿耶蓋尊元良以貞萬國聖人之心也嚱夫士能自審出處之宜而不惑者鮮矣或圖於利欲四顧滿志或沒於黨類不能自還嚮非強志峻節皎然清厲大圭不琢獨鶴無侶難乎哉追思曩歲一踐巖徑蓋二十年矣徐話舊故有悲有歡唯冥冥翰飛不可及已輕喜束心與道勝軟輪徐驅故山有輝想夫草堂環合喬松千餘本交柯翳景吟泫風露幅巾長謠偃放其間一氣不耗四支交暢清時外臣其樂如何非仁聖不能全不奪之操非堅明不能果獨往之志惇史古風復行於今㣥公惜別飛蓋擁道如漢廷祖二疏故事而類之以歌詩德輿泝其心源也熟故斯言不怍徐生用經術歷太學太常二博士咨議於王門徊翔於天朝裦衣赤紱官品第五移疾請告歸息於讓王之舊鄉其進也量力其退也修性斯可嘉矣國朝禮文酌損三代最為詳正生所洽通而又采獲古今亡於禮之禮者考論稽合頗有條貫故顧居守夷仲徐左曹元封今歸侯公和皆深知之生喟然曰州閭達者凋落大半吾過縣車數歲已為壽班在下大夫不云賤况天爵貴於纓冕田廬樂於都邑思雲臥水宿食稻與漁則華榱列鼎不如是之適賈勇於退不能留行可以言賀胡為愴別鄙夫嘗遊息三吳間殆二十年每耳聞水國如話鄉黨則徐生亦吾之僑舊也可忘情耶商皓遠矣以不才者處之退朝隱几幸類休沐江海之思油然而生適因送歸愛此行色時歲荏苒去異粻無幾何多疾早衰筋骸日耗乞身自便雖未敢言涉江而南聊寄夢想秋九月太子賓客權德輿序昔路溫舒舉孝廉補石邑丞以二千石竟用文學推重漢廷今路君亦果於修身敏於試吏經術以端其行歌詩以導其和罷溧陽丞纍年矣廉故居約謙故後時塵緇逢掖不枉其道今自京師抵東吳且曰滑州尚書公之鎮南服也嘗假從事公實知之今將謁轅門以修賀詞整羸車以便歸路申舊展禮無所慁纍焉然而三揖善價之來雖欲逃之難矣膳部郎楊君之出也亟稱舅氏之賢徵詞於我敢附仁者之贈以宣不腆之言且嚮之溧陽猶古之石邑重之以賢侯盛府以發其道異時漢廷之慶又何疑焉暗然日彰在此舉矣左補闕權德輿序國家用文教明德懷徠外區今年春回鶻君長納忠內附譯吉語於象胥復古地於職方方帥條其功實聞於天子乃擇才臣以宣皇仁於是詔工部郎袁君加中憲之重被命服之貴將行又拜祠部郎中有司具儀法持節册命所以新其號而厚其禮也中丞端淳而清文敏而誠才以周物智以達變識柔遠之五利能專對於四方攝衣登車不問夷險朝賢搢紳是以壯其志而嘉其忠且滇池昆明為西南雄部嘗樂聲教是焉纂修奇功自效願為保障方今規模宏大八表一家然則俯首以帥化者吾君受之而不阻勤人於遠略者吾君薄之而不務彼唐蒙開地為好事之臣諸葛渡瀘蓋一方之利况今文武吉甫鎮安蜀都而中丞將大君之禮命固殊鄰之職約德行言語實在是行使邊人緩帶安枕無煙火之警酌古經遠才者能之金章瑞節光耀原隰近臣主文乃類歌詩鄙人不腆忝記言之職故西南之册命使臣之優詔皆得書之授於史官又嘗與中丞同為江西從事辱命內引所不敢辭祕書少監張君既受詔以執法持節錫命於北方弔其告終嘉其稱嗣致賜諭旨以宏天覆長幼養老以遂人和旁達休嘉上應古始聖人之道也况中丞用文學政事敏知達才彌綸諷議官業以序而又修史氏之職且逾一紀國家有殷薦嚴配之典必相其儀有受詞專對之重必將有命涖事不惑居常讓夷是行也知其習俗中其宜適粲然而接之以文歡然而加之以恩回車伏奏可以光大南宮衆君子固以類其歌詩陰方之氣俗四牡之踐履考功郎苗君序之詳矣掖垣寮舊又申以七言鄙夫承君之歡辭則不腆亦既辱命俾次㣥篇是用直書納諸士冖柘中而已昔鄒魯之諺以籝金不如者蓋一經耳今中丞文博究其五皆可名家則扶陽重侯之儒術為踐修矣自外臺從事不四三年歷左史尚書郎其取青紫易於地芥前此以盟津貞師則授以司武今茲以雞林纂代則俾之錫命藉奏議以中輟擇專對而遂行行止之間有以見文敏歸重也太平尚仁多識古訓訃終請嗣禮之重者宜乎以儒冠智囊弔祠臨存佩二印捧三册使有截之外家肥德洽將渥縟之命視勤遠如夷其忠信歟三臺雋彥歌詩宴軷至若辰韓息慎之俗懷方象胥之道賓將洽歡之盛致賜諭旨之榮自原隰之華至溟漲之大雲氣海物昕昏變化衆君子言之詳矣中丞以佐曹陳君之歷司封郎也今為之代以德輿之忝駕部郎也又為之代凡兩掖所賦盍偕序以為好宜徵作者猥及鄙人直書粗略敢謝不敏選部每歲以四才三實銓署㣥吏每三歲則有詔以諸曹郎分命南轅調其任次有黔江辰溪十五郡五十餘城賦其吏員便其習俗主客郎仲君實司之君始以岷峨諸生獻賦京師因文章典義濬發聲實自解巾校文三四遷至博士尚書郎邃於禮籍推本今古乖疑缺微者皆折中焉敏於奏議練程達品肯綮窾郤者每遊刃焉則南方之職業必序縣道必理固其彀中之細者况孔門之果於從政大雅之古訓是式皆子之家法也又何所規昔司馬長卿以駟馬車歸故里有郊勞負弩之榮今君道劒門抵左綿銅梁玉壘喬木可辨晝錦星軺其樂何如又想夫歸自涪陵出於南荊沿巴峽之風水冒陽臺之雲雨昏旦萬狀發於歌詩凡今漉酒祭軷者不可以不賦春二月武當耋老相率詣丞相府請以司門郎殷君為郡相府嘉之以其詞敷聞先是君嘗佐廉問於漢南會是邦缺守乘傳權領實有美利浹於人心懷思詠歎久而彌結上方酌漢宣故事綜核名實有分符竹以主郡國者初必召問以觀其言退而考察以質其效從人之欲即日詔下中朝相賀以為有古道焉且君富於文誼恬於利欲比興聲律播於士林故二十年間官薄不遷令問滋大去歲甫為尚書郎今茲持郡節動靜之道較然不回嚱夫父母一邦化條在已以此為政不亦重乎阜安之而平其吏由訓理之而示其典法用少卿之政徐考便宜行次公之道不從靡密由前日之理術首凡今之績課彼東觀論著之臣方操册以待循吏得不務乎君子於是舉也上美朝廷之命順於人下嘉武當之叟達於天則殷君之道從而可徵矣王城東南千里而近新紱在股兩轓有輝郡齋佳句佇與報政偕至吾徒賀徵拜之不暇又何愴焉盍用歌詩為禮以附其至皇帝惠慈元元夙寤晨興柬求官師寄重方國癸未詔書以地官淮陽公撫封於漢南公以全才碩望為上所器任故命相之初公登右輔維藩之選公在東郡徵還不纍月而推轂於茲中外宣力安危注意其以導迎休和輝耀光明愷悌四鬯英華外發心誠求之無不及焉洪範之有猷有守中庸之不疚不跲申伯之柔惠且直次公之外寬內明皆優為之贊畫辰告節印照路漢廷公卿留歡不足少傅滎陽公首為詩文二百言以餞滎陽公貴仕三朝算秉國成辭巨源之啓事就子房之優佚迅發麗則如黃鐘白珩襄峴之風物會離之情狀盡在是矣方今堯舜在上理臻平明罷宰政之臣或寄崇元侯或服在大僚然後見南國滔滔之盛大廷濟濟之美鄙人以鴻私寬宥猶汙文昌宮方謂與公入奉朝請歸聯衡軛今則命賜倍厚豈敢復以少別為愴耶六曹官諸曹兩掖近臣侍繼滎陽之唱者凡若干篇列於左方春三月禮部尚書扶風郡公權德輿載之序丈人承炎漢扶陽重侯之後代為多才鄖襄德勳戴翼周運其族滋大猶景山鄧林峻極扶疏昌阜蕃祉其理然也以仁義之根柢發文學之英華居夷處厚恬然自是凡五筮仕三以選部掄材升詳廷尉薦其進不苟始調為黃綬尉其後再歷郡都吏縣大夫皆有理效著於官下出入三十年間清議以法冠郡節處之而竟未至嚮者枉尺由徑與角逐者均其六轡則纍纍若若之佩不足取也而消息木雁精辨龜頤乃命復腰銅章實長王屋且以天壇日觀境非人間灑襟靈而清視聽揮慶霄以挹沆瀣然後用愷悌清靜之道惠於一同有吏有隱真君子之心也昔卓子康魯仲康之倫為密與中牟至司徒太傅皆教化之所自也仁遠乎哉猥以庸薄纍叨榮級宴軷佐酒恭聞話言徵孩提而見愛語中外以多感拜手授情如之何朝賢士友類詩以貺懿茲踐履之可書且俟其光大也司徒延德王握兵符相印專征於博陵上谷之地理下建都府以雄山東行師必直壯辟士必誠重州壤之內慤信是求士君子之宦遊寓去其本久矣亭伯子玉之裔幕庭賓榻之選行車撰日姻族榮之以執事之端敏肅給且故相國安平穆公之從父弟也腴潤於友愛琢磨於仁義謙以自牧實而不華閨門公府皆奉金鉉人倫之美無乃裕乎居則贊長轂名在諸侯之策行則侍介圭來近天子之光人生少別斯乃細故不當效兒女子戚戚在勉固志業而已至於道觀離宴歌詩感激則備於右拾遺獨孤郁前敘云每歲儀曹獻賢能之書於王然後列於祿仕宣其績用耳小司徒以楚金餘刃受詔兼領彭城劉禹錫實首是科始豫見其丱已習詩書佩觹韘恭敬詳雅異乎其倫及今見夫君子之文所以觀化成立憲度末學者為之則角逐舛馳多方而前子獨居易以遜業立誠以待問秉是嗛慤退然若虛况侍御兄以文章行實著休問於仁義義方善慶君子多之春服既成五綵其色去奉嚴訓歸承慈歡與侍御遊久者賀而祝之曰太邱之德萬石之訓亦將奉膳羞於公府敬杖履於上庠公卿無慚龜組交映不待異日而前知矣鄙夫既識其幼乃序夫㣥言耳叔通之文學政事若雄鋩百鍊窾卻中節比年由東曹郎給事黃門俄以中執法守上洛得幹支郡視方任焉及今亞尹洛師實顓府政冬十月至自繞霤來朝京師三接面命出車就道凡所以慈惠東人者得悉數焉以叔通之華資茂實而須長師於後命者蓋使洛邑耆老周知功化然後尺一詔條焜耀恩禮夫如是則吳公之理平第一不復專美於前書矣又豈以翺翔疾徐為叔通道耶岐燕元老理具惜別文昌六職夏官卿趙公而下舉白出祖交歡道舊鄙人病不能醉亦笑言擊節於其間衆君子皆賦愧序引之辱紳冕之士角逐於聲名者必以射策東堂校文石渠為稱首於公範言之皆其細者豫與公範尋世好以約交道獲申十年之敬出處多故及茲再會久飽諸公之議今日得之心包大猷口析精理可以稽合同異懸照是非夫然者焯當世之譽交大府之辟疾若機響不亦宜乎國家尚用兵車之會且思磐石之固俾賢王秉旄節主江西諸侯辟書四下大搜雋望公範拂拭縫掖從容長裾赴知己之命伸丈夫之志固當酌六經精義以贊軍政俾介胄之下禮讓興行且以中庸明誠之根本覃思於文藻致用於政事發硎投刃固在於遠者大者庸詎知今茲一舉非圖南之羊角耶臨歧話別迭以勉固志業而已若愀然涕下以聚散為念此可略也衆君子置之公範持江西辟書駕言即路其出處之迹與婉婉之畫鄙人不腆已為之序引且吳抵鍾陵二千里而遙凡我諸生愴離宴之不足故再徵斯會秋月若晝方舟泝沿笑言不譁引滿造適公範乃握管作三字麗句僕與二三子聯而繼之申之以四五六七以廣其事如其風煙月露與行者居者之思各見於詞豫初與知柔交相見之禮而退雖未知其歸而意其賢逮今七年方再會於鍾陵交歡歡甚言理理詣其容溫然而不飾邊幅其中曠然而不施扃鐍渴善好義困而彌彰締交親仁久而益敬其於官名虧成之際則得之自是不得自是故年過四十方一命典校諸生以為屈甚而張恬然儒冠峩峩不恥敝縕吟詠古道以文自娛獻歲南征者以寓環堵於長沙故也亦將參質文於屈宋詳歲時於荊楚楓樹千里片帆鳥飛晨征夜泊無非詩興彼湘君帝子之遺迹江蘺杜蘅之春色皆落君彀中矣而修軷者得無詞乎陸氏為江南冠族子容一門將以文藻行實振起風緒叔父㣥從歲為儀曹首科子容亦再登甲乙讎校祕書繇是君子謂春官天官之舉不失人子容之名不過實歲七月將泝江流如京師塗出練湖實訪豫言別豫業以貧病不能自振方具臺笠鎡基耕鑿吳門子容以名聲文采宦遊上國吳秦之遠道出處之殊致在此別也情如之何子容諸父深源方源我族之出有早歲遊處之舊故得君之道因是而深別離愀愴亦用加等於序引也所不敢辭丈人罷碭山尉之歲德輿年既齓寓居南徐拜手之初就傅未足以遜志歌詩未足以類事嬉於硯席不知包羞會離之際亦命之賦爾來向三十年矣因緣進越濫吹於朝而丈人以河陰丞滿歲參調亦既感泣悲歡相乘微辨風采乍疑夢想而又徵楊惲史氏之學發羊曇西州之歎家風代德有所未知遺文逸甫獲傳授以丈人素履厚行含章立誠黃琮白珩粲然內照可以書惇史激薄俗者有焉方安舒以潔已恥孟晉以枉道俯首受署不競於時方今王在在鎬東人望幸百執事之府署盡備擇才以理繕工之屬分領厥司所趨者靜其祿不薄且以嵩峯之下素業在焉與夫角逐於京劇者異日論也離觴舉白征蓋就塗因以弱歲菲詞發篋見示且曰今日之別其可默耶直書下情拜命之辱
