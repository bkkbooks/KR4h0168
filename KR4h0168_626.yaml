front:
  text: 全唐文欽定全唐文卷六百二十六呂溫二
  hash: sha256:5508159f8a5cc65b4c35a82bc41ea0bdf590f076856b0dcb4b7422fdf084846f
body:
  text: 臣元衡言今日中使某乙至臣宅奉宣聖旨賜臣槍旗器甲鞍馬并錦彩等禮殊其數物備其容肅以將威煥以昭寵雲澤濡體天光照門抃駭失圖兢惶罔據臣某誠荷誠感頓首頓首臣才無可取進不因人陛下憐其小心知其盡節特紆宸眷謬委台司匡輔之益無聞將明之效靡著方俟嚴譴忽被殊恩寄重西南任兼中外封開大郡秩正黃樞登壇於六符之階被衮為三軍之帥古今盛典盡在茲日人臣寵貴併集微躬豈臣孱庸所克負荷非臣隕越所能上報重錦名馬元甲朱旗王事靡盬儼有行色天顏咫尺忽當遠離感戀倣徨拜受涕咽折衝分閫愧非式遏之才榮耀自天猥辱專征之賜無任感恩激切之至謹奉表陳謝以聞臣某言臣聞上蒼垂象當分野者先知元后用心奉職司者方見是以堯稱光被四嶽得於疇咨舜號文明九官稟其分命豈非隨方表志因事立言陳力自參於化源造膝難迷於日用伏惟皇帝陛下睿圖濬發元德廣運恢纂鴻緒允升大猷振十聖之遺休復百王之墜典至如崇陵盡瘁率禮無違長信歸尊因心則感內成則仁敘九族外平則義協萬邦厚俗則寵及高年廣孝則榮加錫類能刑則朝無隱慝善任則野不遺才修文則戎蠻來威整武則南北繼捷此皆事懸日月聲洽寰區黔首之所謳歌搢紳之所抃蹈其或機參造物意兆先天事隔於人謠功隱於朝聽者若非奉職之臣官業所及諒無得而稱焉臣以庸劣謬膺寄任調盈虛而馭輕重關成敗而繫安危職思其憂夕惕若厲每因罄率披竭愚衷出奉溫顏纍承睿旨有以知造化之意有以見天地之心曠若發蒙析如愈疾管窺所至可得而言昨者臣以潮州刺史李璿放縱私鹽耗散公利請從免職以警慢官陛下以為法令改更且當申諭道塗悠遠容或未知俾為後圖用緩前責宏恕包於廣大明察貫於精微此則㣥臣不可望清光者一也江南西道觀察使楊憑奏以支郡旱歉經賦不充請征居地之羡且循稅茶之法陛下以為天災流行有時而息人怨滯結貽患則深縱無日新之美忍復已除之弊特令寢奏姑務通商有司知畫一之方負販有昭蘇之望此又㣥臣不可望清光者二也臣嘗使推官殿中侍御史崔太素奉使淮南臣以太素名秩甚卑濬決務重徵令郡縣釐訓役徒須示等威請賜章服陛下以為職任伊始勤效未成必有可觀乃申後命臣再陳所切方可其奏雖事從權與且符濟物之宜而賞不僭行已見永圖之旨此又㣥臣不可望清光者三也臣對揚之日親奉德音知臣使司支計闕少必擬昭明儉德振起素風率身為天下之先節用自中宮而始又曰臺殿舊制己當惕慮經營改作非所措懷將不崇三尺之階豈復議十家之産發自宸念形於天顏意開而河海自清言出而神祇知感此又㣥臣不可望清光者四也陛下光臨大寶星歲將周貴戚之賜與無聞恩幸之霑霈殆絶至於贍軍供國行賞報功則必鴻毛府庫糞土金玉遂使夏州諸將恨效淺而恩深劍外三軍知生輕而義重此又㣥臣不可望清光者五也夫唐虞盛烈文武餘風莫不傳誦聲詩布在方册且匹夫匹婦片善必書飛羽沈鱗一祥皆紀况陛下動關教化言在政刑理參至道之精躬行盛德之事而沖虛謙讓鬱而未發將何以光揚藝祖昭示後昆伏請宣付史館永為大法臣幸蒙恩遇獲奉昌期言必親聞事皆目睹分深骨髓義激血誠輕黷宸嚴魂宇飛越無任屏營之至臣某言臣聞周陳洪範王者之首政惟農魯作春秋國家之大事在祀農憂旱之為虐祀戒雨之失時亦由聖感節宣孰云冥數前定臣伏見比者冬陽愆候宿麥未滋陛下減膳撤懸晨興夕惕加以郊禋日近輦路飛塵竊慮增軫聖情微昏羽衛帝誠神應人欲天從果得風雨叶期陰明若契每至乘輿就次御幄寧居然後助澄掃於前驅效霑潤於清道及夫廟廷金奏則橫漢昭回壇墠煙升則纖蘿不動從容成禮鼓吹還宮御正陽之門施作解之令歡呼夷夏踊躍生靈三代之備物克終百王之能事斯畢神休坐降瑞氣潛蒸玉鸞僅輟其行音素雪己飛於前殿盈天表慶成花效奇洽萬國之歡心啓千載之昌運若非孝踰舜德勤過堯心則何以禮一接而幽報隨彰景未移而明徵遽至上辛受福獻歲告豐天地回動於精誠陰陽變化於宸念始悟竹宮望拜徒神無用之光交門作歌乃為語怪之事臣謬膺重任獲侍嚴祠嘉候殊祥愜心在目受恩既深於庶類同休豈止於恆情手之足之罔知攸措無任感躍屏營之至臣某言伏見今月十四日制命以尊尊親親之義虔祔獻祖懿祖於德明興聖廟室正太祖景皇帝東向之尊者十五日奉遷事畢十六日夾饗禮成日月貞曜乾坤定紀稱情靡忒合敬有歸百神得受職之方萬國知來敬之本中賀臣聞國有事莫大於嚴祀禮有經莫大於尊祖夏殷得之以繁祉周漢用之以休明爰自魏晉迄於隋氏或以祚短而不及祧正或以時艱而未遑計論紛綸興謝帛丿糸壙載祀竟虛盛典允屬昌期陛下道冠前王慶殷纍聖奉無競之烈克廣鴻休瞻有赫之靈思正大典精誠感念旰食疇咨內斷皇明俯裁㣥議奉祖宗於常尊之地定昭穆於二序之宜清廟肅雍元穹保祐奔走夷裔鼓舞生靈煥乎觀一代之光盛矣接千年之統臣等自鍾舛薄坐嬰衰瘵不獲躬執籩豆稱慶闕庭誠仰聖敬感深孝理形留神往倍百恆情無任竊欣之至臣某言伏奉恩制授臣檢校司徒充度支使兼鹽鐵轉運等使依前同中書門下平章事恩獎殊常授任非據承旨慶忭省躬慚惶中謝臣素無異能幸逢昌運頃因人舉纍荷國恩聲績靡聞塵忝增懼陛下丕承景命光闡鴻猷理財阜人尤所注意臣竊位時久妨賢愧深柄用之地甘心自絶豈謂大明私照元造曲成俾參論道兼領經費當至化鼎新之日在微臣遲暮之年將何以上副宸衷外弭官謗負乘為盜冰炭在懷庶遵周任之言敢飾范宣之讓伏惟睿鑒俯亮愚誠特降殊私賜寢嚴命則聖朝無虛授之議微臣遂審己之宜遐邇之間孰不知勸無任懇迫屏營之至臣某等言伏見今月十五日制命以天下經賦首於東南浙右諸州薦罹災歉全以逋債大敷湛恩人謠勃興朝聽震動中賀臣聞三王已降帛丿糸曠千祀為邦之政盡在欲理之主甚衆莫不知傳戒獨豐語稱與足至於愛人節用之際約躬紓國之時則必情隨事遷以欲忘道故曰人鮮克舉行之惟艱伏惟皇帝陛下濬發睿圖紹休聖緒躬行慈儉子育困窮皇明燭幽惠訓不倦撫臨萬國曾未再周深求疾苦之源屢下蠲除之詔裁戎祀之經費減乘輿之服御雖邦計之有羡入憂於未憂雖生人之所樂輸損之又損風行號令日貫精誠明神聽其德音和氣生於文字將舟車所及咸升至理之期豈江湖下方獨被曲成之澤臣等尸素有日獻納無聞尚勞聖心軫恤人隱甘同凡品不敢望於清光竊與疲氓共謝生於元造無任感忭之至臣元衡言伏蒙聖慈借飛龍馬若干匹至京兆府界首者臣謬處台司將明薄效自忝方任恩禮特加獎諭綢繆寵錫輝煥寒衣病藥悉出聖慈匹馬一人咸經御選遠覽圖史近徵耳目如臣蒙幸未見其倫實有何功敢當斯遇盡節竭誠在臣子之本分殺身致命報君親之常道竟將何力上答殊私空保丹誠以致灰粉王程靡處天駟言旋仰服皂之有期恨違顏之方始精魂自越顧步莫留權奇之姿向雲闕以驤首悃款之戀與星影而共馳瞻望天庭罔知所措無任感戴倣徨之至謹奉表陳謝以聞臣某言臣去年十月十七日蒙恩授使持節道州諸軍事守道州刺史奉命星馳不敢遑息以今月七日到州上訖祗寵自天戰局無地臣某誠兢誠感頓首頓首臣謬以孱庸早參朝序再塵憲府三踐文昌竟不能著稱彌綸贊肅綱紀合行殿黜翻蒙獎任共至公之理分子物之憂自古審官莫斯為重臣才乏吏用識昧政經將何以克副聖心撫寧遐俗唯當勤宣皇化虔奉彞章苦節勵精少酬萬一臣無任受恩感激之至謹奉表陳謝以聞臣某言伏奉五月一日恩制授臣使持節衡州諸軍事守衡州刺史散官勳賜如故謹以七月十五日到本州上訖恭承寵命循顧庸虛感忭失圖戰局無地臣某誠感誠懼頓首頓首臣聞三載陟明虞書盛典六條舉最漢制宏規必在上允帝俞俯諧師錫臣謬領郡務素無吏能虔守國章布宣皇化匪寧夙夜再換炎涼仰奉陛下憂勤以恤遠人凋瘵雖檢身肅下不敢愧於神明而阜俗移風竟未彰於績用將何以特膺睿獎簡在宸心當愷悌之旁求副循良之慎選省躬增愧殞首知慚謹當恪勵精誠策磨朽鈍冀立日新之效少酬天覆之恩實望聖慈照臣肝膽臣無任感躍屏營之至謹差某官某乙奉表陳謝以聞臣某言臣自遠離闕庭晨夜奔涉祗承寵命不敢遑寧謹以某月某日到所部上訖仰宣聖旨親諭遠人酬恩之效未期戀主之誠已積臣某誠恐誠懼頓首頓首臣本章句諸生器用無取徒以小心畏敬謬為先聖所知趨奏禁闈浸踰星紀屬內外危疑之際是非剖判之初實以艱貞自持中立無倚天高聽近愚款獲申神幽鑒明昌運斯屬遂蒙陛下擢於侍從超冠等倫用其憂國之寸心委以代天之重務俯僂三命炎涼五周登車奉馭朽之懷假寐感宵衣之志徒耗神用莫能將明篋盈謗而方賜駃騠鼎折足而未忘簪履竟以陳乞遂其優容無綺季夏黃之德而猥當調護無竇融賈復之勞而獲奉朝請以此沒齒猶為負恩豈意曾未踰年忽蒙抽獎廟授鈇鉞廷賜旌旗俾臣懦夫當此大任節制五嶺幅員萬里伏波之銅柱猶在永謝奇功士燮之鼓吹日聞彌慚武幹將何以宣美皇化振揚國威洗愆責於千齡答生成於再造唯當舉章修法苦節清心撫獷俗以思柔酌貪泉而無懼庶幾萬一仰副憂勤但以白日在天長安不見丹涯限地溟海方深顧蒲柳之前衰奉軒墀而尚遠無任感戀屏營之至謹差某官某奉表陳謝以聞臣某言伏奉制命擢臣右拾遺又中使毛進朝至宅奉宣進旨賜臣本官官告者澤濡窮鱗雷起幽蟄塵忝近侍冠軼常倫震驚失圖兢局罔據臣某中謝臣嘗學舊史承訓先臣皆以奉上自致為榮附下苟進為恥臣所以既孤之後義不因依賣洛中之薄田歸闕下之舊宅退藏其迹私誓於心不邀利於權門不求名於衆口星霜苦節夙夜精誠唯願投軀盛時自結明主愚誠神感人欲天從果蒙陛下自記姓名猥憐孤直振零丁於絶望拔曖昧於無階獨斷皇明超至清列俯降中貴內賜官告特違恆例光寵賤臣俾其不出戶庭坐生羽翼萬乘知已一鳴驚人公朝得盡節之方私室無謝恩之處顧惟凡陋叨此殊尤纏激血誠銘鏤膚骨采拔恩重泥塗感深畢性命以為期裂肝膽而何述唯當竭誠陳力效節明忠使丹心有孚白首無玷然後敢望披雲捧日一識天顏則闔門之灰粉知歸百生之志願斯畢臣家雖在城多適田野久廢簪笏皆須營備不獲當時隨例拜謝闕庭臣某言今月十三日面奉進旨其南郊賞設錢恐度支支計闕少以庫內錢充者臣聞王者以四海為家君道唯百姓與足象天平施而無別如地生財而不私薄奉已而厚奉公重從人而輕從欲知則孔易行之惟艱曠代莫聞今日斯遇伏惟皇帝陛下誕膺駿命富有萬邦而能保元光慈儉之宗奉列聖憂勤之緒臣謬司禹貢竊見堯心非戎祀之用無急宣非軌物之經無別獻土木之工遂聞於廢息恩幸之賜殆絶於霑濡固已行路謳吟搢紳抃歎者久矣伏以郊禋有日慶澤自天楚師思挾纊之恩漢將望解衣之惠國存舊典事有恆規臣在職司敢不供集陛下憐江淮甫罹旱歉念庸蜀新罷大兵雖經費有餘而聖慮猶軫昨因伏奏親奉德音悉擬發內府金錢御服繒綵約躬節用紓國贍軍允叶師和克虔祀事必知感神之德未酌獻而幽通動天之誠先燎煙而上達百祥所降萬福攸宜信可以光洽寰區敻掩圖篆家知自遂戶識至公風人寢杼軸之詩黔首臻富庶之域微臣何幸獲覩升平至德難名載深感懼無任喜忭激切之至謹奉表陳謝以聞臣慎言伏奉某月日敕授臣男宥安州刺史兼侍御史充武昌軍兵馬留後仍賜紫金魚袋者雷驚里巷日照閨門寵命自天戰局無地臣誠懼誠感頓首頓首臣聞惟君任臣固無虛授知子者父敢私不才臣頃者伏以聖政惟新時清無事遂絶指蹤之望求申戀主之誠陛下以臣統兵歲深周涉艱險長三軍之子弟積百戰之瘡痍將有去留念其情義理資感勵事貴便安爰敕臣男試總戎務臣雖訓之以義教之以忠而鈍拙有涯策磨靡及童兒代斫每懷傷手之憂小子在邊曾無折屐之喜將何遽膺寵數荐沐恩光真授竹符就加金組且祁午之為軍尉父已懸車陸抗之將父兵子非綵服豈比臣身居端右男領方州鳴玉會朝朱轓行縣焜耀中外超冠古今名數之樂何加人臣之事斯極千載至公之運獨被殊私萬物咸遂之辰先蒙曲澤瀝肝呈膽莫盡微誠毀族滅身寧足上報臣無任感恩隕越之至謹奉表陳謝以聞臣某等言今月二十三日宰臣奉宣進旨如聞百寮士庶等親友追遊公私宴集及晝日出城餞送每慮奏報自今以後各暢所懷者志存必信義切同休令行如春神應若響寒木暉潤嚴風變和推已感於人心發生先於天意臣某中謝臣聞與人同其樂者不必盡致於韶夏之庭在夫不奪其歡而已與物致於誠者不必日效於丹青之信在夫不察其細而已况乎搢紳之樂名教聚皆以類臣子之事君父遊必有方豈足輕聳物情遽塵天聽伏惟皇帝陛下光纂十聖威臨萬方神武功就人文化成窮溟無波豐歲將宴樂奏穆清感深乎共樂之道駕言遊幸思所以適人之方爰詔輔臣式將明命優諭卿士達於庶人琴築追遊無憚京輦輜軿送遠勿限嚴城禁吏司之苛察盡朝野之歡泰始覺飛沈之樂宇宙之寬物不自疑人知所措在宗載考夜飲承湛露之恩求友相鳴時宴奉祥雲之慶浹休聲於夷夏蒸喜氣於山川千載之昌運允符百王之遺美斯舉臣等謬膺寄任親奉休明方感生成之德更蒙優貸之詔恭承睿旨務竭歡心飽思屬厭醉念溫克戒竹林之虛誕去金谷之浮華君雖不察於泉魚臣敢有愧於屋漏且歡且懼居寵彌驚稽首知慚殺身何報無任感恩兢惕之至臣等言伏見今月十三日宰臣奉宣聖旨以肇建元和惟新寶歷極其幽賾冠以睿文恩示具寮慶昭萬國中謝臣聞清濁既判象數相生一元起於帝圖三統成於人道形器之表推步而得恍惚之際錙銖不差有開必先聖作物覩伏惟皇帝陛下誕膺駿命敬授人時爰詔日官砥定歷法啓開元氣節宣㣥生役五行於文字貫七曜於珠璧仰觀俯察允協於神休東作西成永貞於農候感動夷夏鼓舞飛沈天子之大政行焉聖人之能事畢矣臣等幸備朝序親奉昌期竊見天心敢迷日用無任蹈詠之至今月二十一日高品薛盈珍至鳳翔府奉宣進止賜臣緋衣魚袋笏并袋紫衣一副者發揚宸念昭灼恩光瞻奉自天戰局無地中謝臣孤陋無取過蒙奬録聖慈周洽天造曲成恩重出疆俾諧盡飾九重清祕不忘絶域之單車萬乘憂勤特記微臣之命服衣分內府錫及近藩未申汗馬之勞遽冒濡鵜之刺在笥增感撫躬若驚隕越兢慙罔知攸措臣某言孟秋猶熱伏惟聖躬萬福臣以去月二十一日到薄安山見蕃胡尚綺里徐等同令盈珍等卻回奏事令臣取今月發赴衙帳者伏惟聖德柔遠皇明燭幽蕃情大歡酋帥知感虔奉朝旨賓禮使臣迎勞肅躬饋餼豐潔益知嚮化彌表革心臣恭備單車不勝慶忭嚴程方始絶域未窮白日在天瞻仰如近青蒲之地伏奏猶賒感戀倣徨罔知攸措無任犬馬屏營之至謹因中使第五忠憲附表起居以聞臣某言臣聞惟睿作聖觀乎人文達則化成窮則垂訓先師所以祖述堯舜志在春秋懸衡百王撥亂三季正大當之本清至公之源通㣥方以誠貞天下於一動無不順道德之要機斷無不齊帝王之利器而梁木既壞生知蓋寡三傳得失索隱未周㣥儒異同致遠皆泥沒微言於滋蔓亡要旨於多岐奧室不開漫逾千祀天其或者將有俟焉伏惟陛下德合乾坤明並日月氣和物茂遠至邇安欲以人情為田講學而耨鎮定皇極耀光時雍道之將行實在今日臣不揣蒙陋斐然有志思窺聖奧仰奉文明以故潤州丹陽縣主簿臣啖助為嚴師以故洋州刺史臣趙匡為益友考左氏之疏密辨公穀之善否務去異端用明本意助或未盡敢讓當仁匡有可行亦刈其楚輒集注春秋經文勒成十卷上下千載研覃三紀元首雖白濁河巳清微臣何幸與道偕遇竊以德之匪鄰骨肉無應道苟欣合古今相知然則堯舜之心非宣尼不見宣尼之志非陛下不行庶因儀鳳之辰永洗獲麟之恨臣官忝國學思非出位以為家寶罪實欺天謹昧死寫前件書詣東上閣門奉進伏候聖旨輕黷宸嚴魂爽飛越無任臣某言臣聞元德上升三靈為之動色聖功下濟萬類所以傾誠臣州去秋之間時雨不足自陽風應律子月經年今月十二日晚降雪越至十四旦開霽絮飛千里花翻六出糅初梅而委苞封宿麥而垂津其日晡時西南有慶雲見為樓為閣圖閶闔之九重非錦非繡狀衣裳之五色其時又有日抱戴日晚澄廓天景淑清拖黃氣而重圍舒紅光而四溢臣與司馬樊元則并寮屬吏等三十餘人得所部貴鄉冠氏等縣申稱雪厚一尺以下并覩慶雲抱戴等瑞臣謹桉詩云上天同雲雨雪氛氛毛萇云豐年之冬必有積雪若煙泛勝之書云雪者五穀之精又桉史記云慶雲一名卿雲若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲喜氣也瑞應圖曰景雲者太平之應也一曰慶雲非煙五色氤氳謂之景雲援神契云天子孝則景雲出遊又桉援神契云王者德至於天則日抱戴在上曰戴在傍曰抱又云黃氣抱日輔臣納忠漢書曰宣重光李奇云太平之代日抱重光伏惟陛下受天寶命沖用情深豐食之要鑒寢憂勞雪為五穀之精麥為六田之首由是天降瑞雪其意若曰太平其有年乎雲者運氣立名布恩成義陛下仁霈草木惠及蟲魚揚祖宗之烈光垂天地之正色由是天降雲瑞其意如曰天子其大孝乎日者衆陽之宗人君之表由是天降日瑞其意若曰天下其大明乎魏州大明之慶基光封之舊國嘉祥備致靈貺綢繆豈徒然哉斯有由矣臣叨陪漢守肅奉堯親逢日月之貞明嘉煙雲之爛熳手舞足蹈地雖限於外臺桉牒披圖心己馳於雙闕不任感悅之至臣某言臣伏見某月日詔旨發更太原鳳翔及神策諸鎮兵赴劍南東川者陛下睿算無遺神武必斷與人除害順天行誅奮如霆之威乘破竹之勢期於久逸無憚一勞大正國經永清時祲百王盛事千古英聲天下幸甚然或時事之可否兵家之利害道途之險易將帥之宜稱不可不深圖遠計原始要終狂夫有可擇之言愚者有一得之慮管窺所至願效微誠臣竊以為古今用兵皆在將勇師和政齊計勝不必多兵廣衆然後成功今高崇文等諸將所統已約一萬五千餘人以整擊亂以順討逆授以廟算假之天威馘醜挫凶霈有餘力若更多徵征鎮廣命師旅臣竊計之其患有五一則高崇文素非大將拔自偏鎮忠勇雖著威聲未振本兵既少兼統則多將皆權隸士非素撫雖是鋭師勢同烏合居常則猶可脅致臨敵則何以指揮非惟崇文才分有限此亦自古兵家所難臣不敢廣引載籍上煩聖聽請直以近事明之哥舒翰潼關之守郭子儀相州之圍韓全義激水之役皆以兵多將雜而致敗衄許叔冀之保靈昌李光弼之全河陽李晟之收復京邑皆以兵少將一而建大功成敗昭然布在人口二則貞元以來天下無事四方節將人各懷安陛下覆燾惟新理先清靜今以西南小醜久稽天誅自春徂夏徵發已廣見在兵力破賊有餘若更務濟師屢聞動衆山嶮深阻暑濕為沴北人南役誰不憚行去土離家動生愁怨往年涇州叛卒職此之由事繫安危不可不察三則吐蕃約盟未定窺伺在心間諜往來急於郵傳又必持兩端之計與劉闢交通若聞發兵西南多取邊鎮秋風即至虜馬已肥冒隙乘虛必有侵軼事出萬一悔何可追四則劉闢窮寇保險逃死雖禍淫助順天道甚明而兵凶戰危人事難必脫或貔武之師少不如意蜂蟻猶聚假息旬時攻守之間動須應援固當潛鋒養鋭以逸待勞今便息兵後將何繼五則劍川磽塉居人食且不充蜀路險艱餉運無由多致今屯兵日費何啻萬金數州麥粟貴糴將盡千里飛挽所濟幾何若更加兵實難供贍一夫脫有菜色三軍無復鬬心幸可少以成功何必多而為患今太原及神策等軍已上道者其數頗多足辦戎事其鳳翔等鎮未發之兵伏乞聖恩且勒權停續候事宜以議行止臣謬膺重任過蒙恩遇輒率狂瞽輕黷宸嚴苟利國家甘心鼎鑊無任兢遑懇迫之至謹奉表陳奏以聞臣某等言臣等伏準故事每年二月一日以農務方興令百寮具則天大聖皇后所刪定兆人本業記奉進者中謝臣聞不愛牷玉祈穀於圜丘可以致誠未足以為勸躬秉耒耜籍田於千畝可以示勸未足以教人必也因天地之和順陰陽之理利其器用精厥法式變之而不倦動之而不勞四海靡而風行百姓迷其日用宏我政本實惟農書伏惟睿聖文武皇帝陛下德茂生成道光慈儉捐金而寶穀菲食而粒人考堯典以授時稽禹貢而任土潔粢盛而大事在祀銷劍戟而盡力為農豐年屢薦於郊歌嘉瑞繼書於國史而不自滿假惟懷永圖每至獻歲載陽仲春初吉俯察土膏之候仰觀晨正之祥經始歲功導揚生德徵有司之舊典奉先后之遺文深居穆清親覽奧妙匪崇朝而盡更田畝不出戶而遍洽人情見捽草抔土之艱知寒耕熱耘之苦宸心感念畎畝昭蘇一歎而時雨先飛三復而春雷自起臣等業慚學稼祿過代耕親承務本之風日奉在勤之訓三時不害觀玉燭於氤氳九扈孔修賀生靈於富庶謹繕寫前件書凡二十篇共成三卷謹詣東上閣門奉表陳獻以聞
