front:
  text: 全唐文欽定全唐文卷六百九劉禹錫十一
  hash: sha256:d51d0ab1cf827a11a1d5b01061848562b6025ad8a61fe48645b2745e759946e5
body:
  text: 嗚呼有唐清臣尚書吏部侍郎奚公貞元十五年十月甲子薨於位詔贈禮部尚書太常考行諡曰某是歲臘月丁酉葬於萬年縣之某原後三十有四年子為諸侯為大夫門戶有煒於是門下生琢石紀德揭於新阡云公諱陟字殷衡其先在夏為車正以功封於薛下古以降為譙郡人或因仕適楚復之秦今為京兆人隋唐之際再世以明經為博士家有賜書曾祖簡亦以文學為太子司議郎大父乾繹仕至光州刺史烈考諱某有道而尚晦終徐州司功參軍贈和州刺史由子貴也天以大運生萬物而以正氣鍾賢人至和來宅其德乃具公實有焉幼而擢陵苕之秀長而成清廟之器㣥倫月旦咸以第一流處之及從鄉賦洎升名太常果居上第明年詔郡國徵賢良設四科以盡材公居文詞清麗之目授宏文館校書郎時德宗新即位聲烜虜庭西戎畏威砥貢內附詔諫議大夫崔河圖持節即虜帳以報之使臣欲盛其賓寮以自大遂默表公為介授大理評事除書到門公方為人子不敢許以遠稱病弗果行歸寧壽春養志盡敬丞相楊炎勇於用材擢公為左拾遺奉安輿而西未幾再集荼蓼居後喪將闋是歲建中四年京師急變黃屋順動狩於巴梁公徒行閒道以歸王所既中月而詔授起居郎充翰林學士創巨愈遲病不拜職改太子司議郎從大駕回入尚書為司金元士且參榷管之務有頃持愍冊宣恩於薊門將行錫銀朱於青蒲上復命稱旨轉吏部員外郎是曹在南宮為眉目在選士為司命公執直筆閲簿書紛拿盤錯一瞬而剖時文昌缺左右丞都曹差重遂轉左司郎中尋遷中書舍人執事者繫公識精以斟酌大政非獨用文飾也會江淮閒民被水禍上愍焉特命公宣撫之許以便宜及物赤車所至如東風變枯條其利病復奏咸可轉刑部侍郎時主計臣延齡以險刻貴幸而與京兆尹相惡以危事中之尹坐譴已又逮繫其吏峻繩之事下司寇主奏議者欲文致而甘心焉公侃然持平挫彼嶽嶽君子聞之善其知道不私刑曹既清以餘刃兼領選事居一年授權知吏部侍郎又一年即真是秩言能審官者本朝有裴馬盧李四君子物論以公媲焉時得病發雍有國醫方直禁中上促遣如第且敕之曰某賢臣也悉術以治之及有司以不起聞上震悼加等公娶琅琊王氏石泉公之曾孫友壻皆一時彥士長子某蚤不祿第二子敬則歷太僕少卿今為濮州刺史兼侍御史中丞錫金紫以課最就加貴秩俾視九卿第三子敬元以詞藝似續登文科歷左補闕今為尚書刑部郎中第四子炅舉進士最小子某咸砥礪纂修宜為名公家子其邁德垂裕之光也乎公少以名器自任及顯達急於推賢視其所舉則在西省薦權丞相由右史掌訓辭在中銓表楊僕射由地曹郎綜吏部二公後為天下偉人凡執文章權衡以揣量多士一入中禁考策詞三在天官第章句披沙剖璞由我而顯者落落然居多推是風鑒移於大冶則鎔範之內無非祥金嗟乎天不遐其福而孤民望使由庚之什不作於貞元中惜也初公既終詔贈大宗伯後以第三子在郎位被霈澤再追褒至司空故昔之葬儀用常伯而今之碑制用三公云銘曰仁麟智龍為瑞一辰未若君子瑞於人倫惟唐德宗道類漢宣責實繩下風稜言言公丁斯時籍在雋賢從難表節執羈而還帝曰汝器黃流瑟然可為大寮左右化源乃飾王度乃馳輶軒既執刑柄亦操吏權陽和熙熙貯在顏間守法持正嶷如秋山火不侵玉幸臣畏伏鳳鳴祥煙梟噪低跧帝方倚用天不假年公寐無寤其名愈遠門人達者赤舄元衮公居甚卑其德愈尊兩子朝服駢驅朱輪佳城何在胄貴之里螭首龜趺德輝是紀嗚呼後人下拜於此縣內之大夫鮮有遺愛在其去者蓋邑居多豪政出權道非有卓然異績結於人心浹於骨髓安能久而愈思大和四年高陵人李仕清等六十三人思前令劉君之德詣縣請金石刻之縣令以狀申於府府以狀考於明法吏吏上言謹桉天寶詔書凡以政績將立碑者其具所紀之文上尚書考功有司考其詞宜有紀者乃奏明年八月庚午詔曰可令書其章明有以結人心者揭於道周云涇水東行注白渠釃而為三以沃關中故秦人常得善歲桉水部式決泄有時畎澮有度居上游者不得擁泉而顓其腴每歲少尹一人行視之以誅不式兵興以遷寖失根本涇陽人果擁而顓之公取全流浸原為畦私開四竇澤不及下涇田獨肥他邑為枯地力既移地征如初人或赴訴泣迎尹馬而上涇之腴皆權幸家榮勢足以破理訴者復得罪繇是咋舌不敢言吞冤含忍家視孫子長慶三年高陵令劉君勵精吏治視人之瘼如瘭疽在身不忘決去乃修故事考式文暨前後詔條又以新意請更水道入於我里請杜私竇使無棄流請遵田令使無越制別白纖悉列上便宜掾吏依違不決居二歲距寶歷元年端士鄭覃為京兆秋九月始具以聞事下丞相御史御史屬元谷實司察視持詔書詣白渠上盡得利病還奏青規中上以谷奉使有狀乃俾太常撰日京兆下其符司録姚康士曹掾李紹實成之縣主簿談孺直實董之冬十月百衆雲奔憤與喜并口謠手運不屑鼛鼓揆功什七八而涇陽人以奇計賂術士上言白渠下高祖故墅在焉子孫當恭敬不宜以畚鍤近阡陌上聞命京兆立止絶君馳詣府控告具發其以賂致前事又謁丞相請以顙血汙車茵丞相彭原公斂容謝曰明府真愛人陛下視元元無所丨吝第未周知情僞耳即入言上前翌日果有詔許訖役仲冬新渠成涉季冬二日新堰成駛流渾渾如脈宣氣蒿荒漚冒迎耜釋釋開塞分寸皆如詔條有秋之期投鍤前定孺直告已事君率其寮躬勞徠之蒸徒歡呼奮襏襫而舞咸曰吞恨六十年明府雪之擲姦犯豪卒就施為嗚呼成功之難也如是請名渠曰劉公而名堰曰彭城桉股引而東千七百步其廣四尋而深半之兩涯夾植杞柳萬本下垂根以作固上生材以備用仍歲旱沴而渠下田獨有秋渠成之明年涇陽三原二邑中又擁其衝為七堰以折水勢使下流不厚君詣京兆索言之府命從事蘇特至水濱盡撤不當擁者繇是邑人享其長利生子以劉名之君諱仁師字行輿彭城人武德名臣刑部尚書德威之五代孫大歷中詩人商之猶子少好文學亦以籌畫干東諸侯遂參幕府歷尹劇縣皆以能事見陟率不時而遷既有績於高陵轉昭應令俄兼檢校水曹外郎充渠堰副使且錫朱衣銀章計相愛其能表為檢校屯田郎中兼侍御史斡池鹽於蒲錫紫衣金章歲餘以課就加司勳正郎中執法理人為循吏理財為能臣一出於清白故也先是高陵人蒙被惠風而惜其捨去發於胸懷播為聲詩今采其旨而變其詞志於石文曰噫涇水之逶迤溉我公兮及我私水無心兮人多僻錮上游兮乾我澤時逢理兮官得材墨綬繠兮劉君來能愛人兮恤其隱心既公兮言既盡縣申府兮府聞天積憤刷兮沈疴痊劃新渠兮百畝流行龍蛇兮止膏油遵水式兮復田制無荒區兮有良歲嗟劉君兮去翱翔遺我福兮牽我腸紀成功兮鐫美石求信詞兮昭懿績僕射名孝章字得仁本北方之強世雄朔野其後因仕中國遂為靈武建康人曾祖道德贈右散騎常侍封懷澤郡王祖周洛銀青光祿大夫檢校太常卿兼御史中丞北海郡王贈太子太保考憲誠早以武勇絶人積功至魏博節度使終於河中晉絳慈隰等州節度觀察使檢校司徒兼侍中河中尹贈太保其薨也大臣中書令晉國公裴氏為之碑其名益顯公即侍中之元子母曰冀國夫人李氏幼而聰悟父母賢而加愛焉及長好學遷善秀出儕輩鄴下諸兒號為書生元和中太尉訴為魏帥下令掄材於轅門取大將家翹秀者為子弟軍列於諸校之上公獨昌言願效文職太尉深奇之遂假魏州大都督府參軍長慶二年常山衆叛害其帥沂國公田司徒於帳下沂公發迹於魏人猶懷之詔命其子布以尚書授鉞統魏兵問罪於此疆且報家禍布既啓行士氣不振渙然內潰獨與冗從之旅偃旗而歸百憤攻中卒自引決先侍中時為中軍都知兵馬使兼御史中丞全師在野閧然推戴之請為假侯以鎮定中貴人飛驛上聞穆宗夜召翰林學士草詔書以真侯命之實有魏土從衆而合權也是歲公自攝官轉本府士曹參軍兼監察御史賜朱衣銀印推恩以及子也一旦跪於父母前進苦言曰臣竊惟大河之北地雄兵精而天下賢士心侮之目河朔間視猶夷狄何也蓋有土者多乘兵機際會非以義取今臣家父侯母封化為貴門君恩至矣非痛折節礪行彰信於朝廷無以弭識者之譏寤明君之意節著於外福延於家乘時蹈機禍不旋踵言訖泣下數行父俞母贊天性交感三心既叶萬衆潛化天子聞而嘉之曰彼真孝子乃授檢校太子左諭德兼侍御史充節度副使纍遷至散騎常侍兼御史大夫賜金印紫綬既二軍政事如命卿弛張損益得以參決潛革故態人知嚮方大和二年滄景節度使李全略卒其子同捷竊據故地詔下以文誥弗革遂用大刑先侍中表請率先諸侯使元子以督戰制曰可公承君父之命乃捐其軀一舉而下平原壓滄壘由是加工部尚書及王師凱旋上表願一識承明廬詔允之遂赴北闕下得覿於便殿上曰嚮吾始征滄州議者皆曰彼魏之姻也慮陰為寇謀吾發使數輩以偵之其還也僉曰爾父瀝款於賓筵爾母抗詞於簾下願絶姻以立效其經始啓發出於爾心今滄海砥平策勳之日宜貴爾三族命爾父為侍中遷鎮於近地加爾禮部尚書析相衛澶三州為鎮以居之俾爾一門大榮以誇天下公拜稽首謝父遷讓已爵禮無違者翼日下詔於明庭人咸曰史氏之寵光古無有也牙旗碧幢方指東道侍中以帳下生變聞泰極而否當歌而哭迎柩於路仰天長號因葬於洛陽之北邙山冀國夫人祔焉寢苫枕塊以所仇同天為大酷未幾詔舉金革之義起為右金吾將軍纍表陳乞有司以違命督之輿疾即路間歲擢授鄜坊丹延等州節度觀察處置等使居四年遷鎮於滑一歲入為右領軍衛大將軍旋改右金吾大將軍又受鉞於邠土孟秋至治所首冬遘疾拜章入覲不克展和鸞鞗革之儀薨於靖恭里之私第享齡三十有九當開成三年十月二十日上聞而悼之不視朝一日贈尚書右僕射明年二月歸葬於洛都夫人琅琊王氏祔焉繼室深澤縣君博陵崔氏有一子曰煥生七年而孤僕射之喪自復魄至葬當門戶備祭祀建碑表皆縣君之能且命其家老具事功來請曰嫠不恤家而憂幼嗣不知其先人之官業乞詞以傳於後也君子以為知禮謹書之銘曰斗極之下崆峒播氣鍾於侍中孔武且貴奉上致命宜昌後嗣僕射承之良弓不墜耳煩鉦鼓心悅文字虎穴之中生此騏驥大和紀元滄景不虔子弄父兵跳踉海壖有鄰陰交蝟起雞連詔下薄伐艮隅騷然時維侍中實統魏師蓄鋭未發衆心危疑僕射為子陳謀盡詞興言涕零有感尊慈絶姻效節精貫神祇滄波砥寧王命褒之乃遷元侯來鎮近畿乃祚元子別建旌麾一門四節焜耀當時倏忽變生魏郊紛披喬木雖大盲風不知干雲之臺列缺焚之哀哀孝嗣丁此大酷迎護幃輤葬於東洛訴天觸地血染縗服禮有金革詔書敦促不遂枕戈驟膺推轂雕陰白馬暨於邠谷雖榮三鎮不荷百祿綺紈之間圭組纍纍如彼晨葩日中而萎有妻名家有子稚齒行號報禮歸窆蒿里洛水之陽修邙之趾昭尊穆敬幽顯同理舊松新柏亦象喬梓刻石記功垂於萬祀薛在三代為侯國介於鄒魯間傳世三十有一為齊所并其公子奔楚錫土田於沛漢末避仇之成都曹魏平蜀徙家汾陰遂為河東臨晉人自奚仲為夏車服大夫距今數千年乘軒服冕舄奕冠世言氏族者署為關內甲姓天意若曰始有功於車服錫爾子孫世世有之公諱謇字某曾祖寶允以名家子且有學行歷尚書郎雍州司馬邠州刺史王父繪有雋材刺三郡金密帛丿糸皆以治聞纍績至銀青光祿大夫封龍門侯烈考承矩以文亡害仕至大理丞公幼承前人之覆露補崇文生歲滿調主簿書於亳之譙苦二邑又尉於東畿之河清貞元中上方與丞相調兵食思得通吏治而習邊事者計相以公為對乃授監察御史裏行充京兆水運使局居雁門主穀糴具舟楫募勇壯且便弓矢者為榜夫千有餘人隸尺籍伍符制如舟師詔以中貴人護之聲震塞上每發粟泝河北行涉戎落以饋緣邊諸軍及乘障者雖河塞迥遠必克寸期如合符一歲中省費萬計纍加侍御史內供奉賜緋魚袋有司條白其勞入拜殿中內史未幾淮海節將以戎倅缺聞事下丞相御史擇可者僉曰公政事已試遂授檢校戶部員外郎兼御史淮南軍司馬尋轉駕部郎中錫以金紫遇府遷申命真相趙國公帶中書侍郎代之公主行臺留務趙公文茵及境視置郵供帳及郊視將迎部伍下車視簾幃器備乃曰信奇才也此不足以展驥朝廷知之擢為泗濱守既報政就加御史中丞俄遷福建都團練觀察使閩有負海之饒其民悍而俗鬼居洞寨家桴筏者與華言不通公兼戎索以治之五州民咸悅元和十年某日薨於位年六十七贈右散騎常侍夫人趙郡李氏無兒早世繼夫人隴西李氏檢校禮部尚書河東節度使說之女生子凝為嗣季子茂宏以諸侯禮儀返葬故里蛾眉原從周也後二十有三年元曰開成凝為平盧從事謹桉令甲礱碑石來乞辭以垂於悠久初公治粟於朔陲愚方冠惠文冠察行馬外事聆風相厚謂可妻也以元女歸之明年愚入尚書為郎職隸計司因白計相公召來會府行有日矣遇內禪惟新愚以緣坐左貶間關外役竟不克面然而公之為德善灌注心耳孝悌為根柢誠明枝葉之直方為天質禮讓緣飾之所至藹然繇此道也公初下世故人丞相李太師志其墓略曰宏深莊重幹敏絶人此與游者傳信之詞也豈誣也哉故作銘曰河汾奫淪鼎氣歊雲散為昌光凝為賢人常侍之生其宗孔碩從祖昆弟詵詵三百文館入仕幽龍未光尺木為階俄然欲翔司會知材績宣朔方邊師萬喉俟我贏糧泝於黃河路出戎疆募乃勇士皂衣挽航膺索臂弧穹廬在旁虜聞公名憚不敢襄支安北已南列城相望率有儲㣥皆成金湯入居殿中分巡輦下淮海軍大往為司馬軍中之治可移諸民乃牧於泗乃廉於閩閩悍而囂夷風脆急恩信綏之委然如蟄閩方不淑天奪其福公薨於寢元赬以復天王廢朝贈之金貂莓莓晉原鬱鬱中條大墓舊阡松楸蕭蕭笳鼓以歸德音孔昭常侍諱質字華卿始得姓自周靈王太子晉賓天而仙時人曰王子因去姬為王氏自秦漢以還世多顯名由今而上十有一代名傑仕元魏為并州刺史子孫因家遂為太原祁人并州六代孫名通字仲淹在隋朝諸儒唯通能明王道隱居白牛溪游其門皆天下雋傑著書行於世既沒諡曰文中子文中生福祚為蔡州上蔡主簿上蔡生勉舉進士試賢良皆上第仕至河中府寶鼎令寶鼎即公之曾祖也祖諱怡渝州司戶參軍考諱潛揚州天長縣丞贈尚書吏部郎中公其季子也始文中先生有重名於隋末其弟績亦以有道顯於國初自號東皋子文章高逸傳在人間議者謂兄以大中立言弟游方外遂性三百年間君子稱之雖四夷亦聞其名字公雅有遠志常自忖度我大名之後不宜無見焉遂力學厚自淬琢於春秋得之公是於禮得之約僑居淝水上躬督穡事善積於已而淮楚間㣥彥多與之游公慊然自少無進取意與游者激之曰卿文儒家子篤志如是盍求發聞俾家聲不頽今夫以文字芒洋當世者誰如華卿庸自棄耶入謀於閨門咸以外言為是因決策而西上在貢士籍天和內充不以時尚屑意角逐攻取初無此心如楩楠生於深林未始自貴而度材者一盼歆然在懷故以不爭而速售既登第東諸侯交辟之從主者書記於嶺南授正字參謀於淮右進協律郎其後佐許下暨梓潼南梁率為上介官至兼監察御史司憲聞其賢徵入南臺轉殿內歷侍御史改尚書戶部員外郎復為知已所薦遷檢校司封郎中攝御史中丞紫衣金章充山南西道節度副使入為尚書戶部郎中以方雅特立除諫議大夫會宋丞相坐狷直為飛語所陷抱不測之罪大寮進言無益公率諫官數輩日晏伏閣上為不時開便殿公於旅進中獨感激雪涕居多由是上怒稍懈得從輕比公終以言責為憂求為虢州刺史宰相惜去又重違誠請增之以兼御史中丞用示異於人也大凡以智謀而進者有時而衰以朴厚而知者無跡而固公雅為今揚州牧贊皇公所知人不見其迹方在虢略贊皇入相擢為左曹給事中凡有大官缺必寵薦居數月遷河南尹又未幾鎮宛陵是三者中外所注意不旬歲而周歷之時論不以為黨河南帝之別京其治尚體度風采而別白區處之宣城國之奧壤其治在束吏惠下蘇疲羸讋剽輕而勞徠澄汰之公兩得其道不由一揆率身以儉而素風存任人以誠而㣥務舉遇中貴以禮而故態革內潔其志下盡其忠外無以撓其理三者具求政之有秕曷由哉在鎮三載開成元年十二月八日薨於位享年六十八監軍使上言有詔軫悼不視朝贈左散騎常侍明年八月十一日葬於河南府永寧縣洛川鄉史原從舊阡也初公娶於滎陽鄭氏生三女而沒今蓋祔焉一子曰慶存方齔矣猶子前太原府參軍扶執宗長書來請曰扶也早孤蒙世父常侍之覆露今其嗣幼未任克家姑封琴書司管籥以俟其長竊懼世父之德音不揚思有以垂於後者以誠告於從叔大司農復命曰俞謹礱貞石以乞辭無忽豫昔為郎與常侍同列已熟其行實及讀墓志即今丞相益州牧趙郡李公之文自稱為忘形友其在宣州李公再入相議以第一官處之牢讓不取羔雁所禮則河東裴夷直天水趙皙隴西李行方吳郡陸紹梁國劉蕡博陵崔珦人咸曰得士夫揚州少與也而見器益州寡合也而見親六從事材不一也而畢樂用是足以觀德庸可勿紀焉銘曰隋有文中紹揚微言當時偉人咸出其門粹氣紆餘鍾於後昆常侍恂恂文中來孫發源高麓中泳後大蘭芽茁然秀出叢薈善不近名其聲日彰行勇於退其道愈光哲者知之冥於周行以正持憲以文為郎以和佐戎以惠臨邦以直司諫以公駮政守於三川頑民砥定乃鎮於宣先馳淑聲邑中婆娑瞻我旆旌問誰詢謀濟濟君子問誰出納潔潔廉士道本乎心暢於四支治本乎正形於百為黠吏斂手齊民揚眉江淮藪空夜析弗施公臥於齊邦民悽悽公衣升屋邦民行哭牙璋斯來柳翣言旋棠樹未老周人慕焉熊耳之陽泱泱洛川佳城在茲既固且安松楸飋然石馬矯然過者必敬宛陵之阡公諱俊字真長其先葉黃帝夫聖人之後與庶姓不同如河出崑崙潛於厚地欻焉振起奮為洪瀾環回自天非衆川也故自黃帝八代而生舜武王克殷求有媯之允滿封於陳是為胡公十三葉生完自以公子國難不得立乃抱樂器奔齊桓公以卿禮接之下又十一葉和以久為政陰浹於人遂有齊國三代稱王至建為秦所滅項羽入秦封建孫安為濟北王漢興失國齊人謂之王家因以為氏安子涓仕漢為鎮東將軍青州牧封劇縣伯自涓至彤凡一十九代兩漢公卿牧守如家牒然十代祖猛字景略符秦尚書令伉秦成霸業與孔明佐蜀同功故時人謂之王葛史云北海劇人遂著為族望九代祖休儀曹尚書八代祖鎮惡佐命宋長安擒姚宏至北齊五代祖田斤七兵尚書兄弟九人時號王氏九龍於齊史有傳高祖顗字君粹北齊著作郎燕郡太守曾祖敬忠成州刺史大父上客高宗封嶽進士及第歷侍御史主客兵部員外郎纍遷兵右金吾衛將軍冀州刺史靈州都督朔方道總管見職官儀及衣闕烈考瞰宣州宣城縣令贈工部郎中娶河東裴氏乃生僕射季睦餘力工為文始以崇文生應深謀祕策考入上第拜監察御史天之賦豫莫能兩大既揚令名而不以景福享齡五十五葬於河南府偃師縣亳邑鄉後以子貴纍贈禮部尚書至右僕射夫人江夏李氏祔焉李門多奇才父暄起居舍人暄子鄘門下侍郎平章事高叔祖善蘭臺郎崇文館學士注文選行於時善子雍北海郡太守有重名四方之士求為碑志者傾天下故夫人於盛宗禮範可法纍贈至江夏郡夫人僕射有三子長子早終次子處元少嬰沈恙慕道士養生之術高尚其趣強仕而沒積善不試後來果大焉季子彥威字子美始以五經登甲科歷太常博士祠部員外郎遷屯田郎中轉戶部司封並充禮儀使判官宏文館學士京兆少尹諫議大夫史館修撰以直諫出為河南少尹入為少府監司農卿改淄青節度使徵拜戶部侍郎判度支勢逼生患出為衛尉分司東都尋起為陳許節度使檢校禮部尚書充汴宋亳等州節度觀察處置等使北海縣開國子食邑五百戶娶潁川韓氏主客員外郎衢之女國子祭酒楊頊之外孫夫人有三弟皆材無子早謝已如禮祔葬於亳邑原僕射厚德覆露之尚書丕承之以蚤孤鋭意嚮學嘗閲詩至蓼莪篇感激流涕故其志如刃始淬及學成立遂為鴻儒入用為能臣參定儀制財成經費起書生擁旌節今又領全師鎮上游握神符垂三組皆嚮時感發之所激也志就而學成名聞而身達欲報無所外榮中悲人子之孝在乎揚其先德以耀於遠乃俾學古者書本系所自且銘於龜趺螭首云銘曰山積而高澤積而長聖人之後必大而昌由聖與賢或為霸強建不克嗣濟北疏疆齊人德之其族稱王佐於符秦北海重光僕射之生負材而起策於萬乘擢為御史同時條對干目仰視桂林一枝拾芥相似名動海內夫豈不偉種德而牙乃生令子出入鼎貴理財統師流根之澤密印纍纍峻其追崇幽顯有輝孝嗣之志歉然弗怡春露秋霜感傷履之時久能慕祿豐益悲明發不寐永懷孝思攄之無窮曷若豐碑景亳之原佳城在斯乃金石刻揭於道陲松耶柏耶有洛之湄過者必下來觀信辭
