front:
  text: 全唐文欽定全唐文卷八百五十四懌京兆人唐末進士入梁纍官翰林學士後唐莊宗入立貶懷州司馬入為衛尉少卿天成初復拜中書舍人充翰林學士轉戶部侍郎右丞充承旨晉天福中自工部尚書轉太常卿歷禮部刑部二尚書分司洛陽開運末卒年七十餘漢乾祐元年贈尚書左僕射
  hash: sha256:020a2e864d7a539645a47a69e8d720c12a27ee1b5b11753f197de41fdcdc26bb
  markers:
  - {type: head, offset: 14, content: 李懌, id: KR4h0168_NFKB_854-h1, level: 1}
body:
  text: 制曰惟天作元后所以保茲黎元惟王親諸侯所以建我藩屏蓋一人不能獨任故列辟布於四海自昔權輿匪今作俑檢校太師守尚書侍中兼中書令上柱國彭城郡王錢鏐浙江孕靈天目鍾秀武足以安民定亂文足以佐理經邦屬天步之維艱投筆而起憤皇靈之不振枕戈不忘人方效忠天未厭亂漢宏托金刀之讖董昌借越鳥之妖爾獨憂僭偽之爭強共行天討雪朝廷之深憤自造地維屢挫淮氛式遏廣寇俾爾浙郡邑永保金湯之固屬部人民永享袵席之樂爾四國有西歸之望豫一人無東顧之憂也昔平王東遷庸依晉鄭典午南渡允賴并涼卿之封地朕在不蔽援番君之故事環勾踐之舊疆建爾真王允茲東夏於戲節制兩藩車徒萬乘有子奪生死之權驕心易滿有人民社稷之奉侈心易生不存忠義之心曷保功名之盛書曰惟命不于常又曰常厥德保厥位欽哉欽哉勿替朕命可進封越王增食邑一千戶實封一百戶餘如故敕曰朕嗣登大寶統理萬方有推誠待人之心少撥亂反正之略京畿叛亂宗廟震驚來周公宅洛之謀定商王遷殷之業當茲更始式表殊勳檢校太師守尚書侍中兼中書令上柱國越王錢鏐一代偉人三朝元老定衰救亂素存忠義之心濟世經邦夙擅英雄之志鄉兵一起義聲四馳黃鉞初麾江表大定包茅時登乎天府版籍歲貢於有司日月塵昏牛女尋常拱北淮河鼎沸浙江日夜朝東用徙於越之封大勾踐之境爾其糾率侯服翼戴中朝選將練兵務農積粟進可參桓文之烈退可守吳越之區寧俾古人專美前史於戲夫差適顛沛之際罔替尊周仲謀方爭攘之時猶知有漢況爾名德殿此大邦必能宏濟艱難一匡天下豫一人實有賴焉詩不云乎幹不庭方以佐戎辟爾尚勉旃可徙吳王加食邑二千戶實封二百戶餘如故皇帝若曰天之視聽在人有人斯得國國之興廢在德有德則易興雖曰歷數有歸亦由人心允協此商所以割夏周所以克殷也乃者有唐告終王政日紊婦寺亂常於內蠻貊犯順於邊列鎮張膽而相攻大臣悶心而無措惟思家族遑恤朝廷朕起自兵戎歷階節度憂皇天之不弔閔黎庶之倒懸誓衆興師為民請命東征西怨共徯我后來蘇簞食壺漿咸若厥角墜地竟以數州之力大翦諸國之鋒歷試諸艱遂叨九錫稽舜禹之禪法隋唐之敕天步未夷人情習亂因商民之思紂嗾桀犬以吠堯職具不供何所不至咨爾啓聖光運同德功臣上柱國吳越王錢鏐山川育秀二五儲精以不世出之才行大有為之志納交伯府翼戴中朝清淮甸之邪氛不得紊我王氣斬羅平之妖鳥不得鳴我王郊逮乎授禪之初首遣宣諭之使頗知天命不效狂謀匪兼二國之封曷奬尊王之義今遣使金紫光祿大夫尚書上柱國姚垍使副尚書禮部主客員外羅衮持節備禮胙土分茅册爾為吳越國王於戲車徒萬乘何戎狄之不可膺節制三方何強梁之不可伏矧百粵夏后駐蹕之地三吳太伯肇封之疆勾踐用之以親周夫差以之而駕晉方賴率三軍而梃荊楚糾列國以平淮戎允為東海屏藩永保中原重鎮毋姑息以敗事毋誇大以墮功欽哉欽哉其聽朕命維翰字國僑洛陽人後唐同光中進士晉祖建號授翰林學士禮部侍郎知樞密院事改中書侍郎同中書門下平章事天福四年出為相州節度使歲餘徙鎮泰寧七年徙鎮晉昌少帝嗣位徵拜侍中守中書令封魏國公尋罷為開封府尹少帝將降契丹諷張彥澤害之嚮者陛下親禦胡寇戰士重傷者賞不過帛數端今優人一談一笑稱旨往往賜束帛萬錢錦袍銀帶彼戰士見之能不觖望士卒解體陛下誰與衛社稷乎竊以防未萌之禍亂立不拔之基局上繫聖謀動符天意非臣淺陋所可窺量然臣逢世休明致位通顯無功報國省己愧心其或事繫安危理干家國苟猶緘默實負君親是以區區之心不能自己近者相次得進奏院狀報吐渾首領白承福已下舉衆內附鎮州節度使安重榮上表請討契丹臣方遙隔朝闕未測端倪思陛下頃在并汾初罹屯種師少糧匱援絶計窮勢若綴旒困同懸磬契丹控弦玉塞躍馬龍城直度陰山徑絶大漠萬里赴難一戰夷凶救陛下纍卵之危成陛下覆盂之業皇朝受命於此六年夷夏通歡亭障無事雖卑詞降節屈萬乘之尊而庇國息民實數世之利今者安重榮表契丹之罪方恃勇以請行白承福畏契丹之強將假手以報怨恐非遠慮有惑聖聰方今契丹未可與爭者其有七焉契丹自數年來最為強盛侵伐鄰國吞滅諸蕃救援河東功成師克山後之名藩大郡盡入封疆中華之精甲利兵悉歸虜北即今土地廣而人民衆戎器備而戰馬多此未可與爭者一也契丹自克捷之後鋒鋭氣雄南軍因敗衄以來心沮膽怯況今秋夏雖稔而帑廩無餘黎庶雖安而貧弊益甚戈甲雖備而鍛礪未精士馬雖多而訓練未至此未可與爭者二也契丹與國家恩義非輕信誓甚篤雖多求取未至侵凌豈可先發釁端自為戎首縱使因茲大克則後患仍存其或偶失沉機則追悔何及兵者凶器也戰者危事也苟議輕舉安得萬全此未可與爭者三也王者用兵觀釁而動是以漢宣帝得志於胸奴因單于之爭立唐太宗立功於突厥繇頡利之不道方今契丹正抱雄武之量有戰伐之機部族輯睦蕃國畏伏土地無災孳畜繁庶蕃漢雜用國無釁隙此未可與爭者四也引弓之民遷徙鳥舉行逐水草軍無饋運居無竈幕住無營柵便苦止任勞役不畏風霜不顧飢渴皆華人之所不能此未可與爭者五也戎人皆騎士利在坦途中國用徒兵喜於走險趙魏之北燕薊之南千里之間地平如砥步騎之便較然可知國家若與契丹相持則必屯軍邊上少則懼夷狄之衆固須堅壁以自全多則患飛挽之勞則必逐寇而速反我歸而彼至我出而彼回則禁衛之驍雄疲於奔命鎮定之封境略無遺民此未可與爭者六也議者以陛下於契丹有所供億謂之耗蠹有所卑遜謂之屈辱微臣所見則曰不然且以漢祖英雄猶輸貨於冒頓神堯武略尚稱臣於可汗此謂達於權變善於屈伸所損者微所利者大必若因茲交搆遂成釁隙自此則歲歲徵發日日轉輸困天下之生靈空國家之府藏此為耗蠹不亦甚乎兵戈既起將帥擅權武吏功臣過求姑息邊藩遠郡得以驕矜外剛內柔上凌下僭此為屈辱又非多乎此未可與爭者七也願陛下思社稷之大計采將相之善謀勿聽樊噲之空言宜納婁敬之逆耳然後訓撫士卒養育黔黎積穀聚人勸農習戰以俟國有九年之積兵有十倍之強主無內憂民有餘力便可以觀彼之變待彼之衰用己之長攻彼之短舉無不克動必成功計之上者也惟陛下熟思之臣又以鄴都襟帶山河表裏形勝原田沃衍戶賦殷繁乃河朔之名藩實國家之巨屏即今主帥赴闕軍府無人臣竊思慢藏誨盜之言恐非勇夫重閉之意願回深慮免啓姦謀欲希陛下暫整和鑾略謀巡幸雖櫛風沐雨上勞於聖躬而杜禍防微實資於睿略省方展義今也其時臣受主恩深憂國情切智小謀大理淺辭繁俯伏惟懼於僭踰裨補或希於萬一謹冒死以聞擢漢天福十二年官右拾遺臣聞詩云哀哀父母生我劬勞又仲由云樹欲靜而風不止子欲孝而親不待皆以昊天所覆永報為難今陛下信及昆蟲孝理天下漏泉之澤倘尚拘於常制過隙之限誠何慰於孝思今請應在朝內外文武臣寮亡父亡母並請特與追封既存沒以知榮則寰區而荷德敬遷漢天福十二年官左衛將軍臣伏見天下鞍轡器械並取契丹樣裝飾以為美好安有中國之人反效戎虜之俗請下明詔毀棄須依漢境舊儀熙字績巨唐宰相齊國公光逢從子起家授祕書省校書郎後唐天成中纍遷南省正郎晉天福中授祕書少監遷右諫議大夫十二年漢祖入太原為晉州亂軍所殺伏以皇帝陛下應天御宇纘聖承乾咸從睿哲之功克致文明之運始自乾坤蕩定京輦廓清針規委諫諍之臣輔弼任賢良之士莫不盡編竹帛已播遐陬其有聖德憂勤睿謀沉密至理每叶於神化格言皆契於天時或拱極侍衛之臣或秉政樞機之地或陛下有籌畫之妙或大臣得應對之儀外班既不聞知直史憑何紀録實慮歲月深久永作遺文自此凡是內中公事及詔書奏對應不到中書者伏乞委內臣一人旋具抄録月終關送史館庶使簡編畢備言動無遺垂萬古之美談顯一時之盛事伏自陛下乘乾之後纘聖已來從諫如流求賢不倦遂令五日之內一度敷揚百辟之間咸陳管見伏覩武班朝士皆大國賢臣或繼委藩任或盡知民瘼或久諳師旅或深知兵機或將相子孫或貔貅列士或銜命每推於專對或臨戎嘗立於殊功蘊器業而不敢自陳有籌畫而無繇上奏方今蒸黎尚困兵革未銷儻一言仰合於天心一事有資於軍志可裨睿算便致小康抱材能者無愧於朝廷懷義勇者何慙於休運伏望令兩班更互奏對瑩字元輝華州華陰人梁龍德中舉進士為康延孝從事後唐明宗時晉祖為保義節度使以瑩為節度判官及即位纍遷門下侍郎同中書門下平章事兼吏部尚書少帝嗣位拜守中書令明年檢校太尉出為晉昌節度使移鎮華州入為開封尹開運末復知政事契丹滅晉從少帝北遷卒於幽州所修唐史首尾二十一朝帛丿糸歷三百餘載其於筆削斯實難辦必藉㣥才司分事任張昭等五人奉敕同撰內起居郎賈緯丁憂去官竊以刑部侍郎呂琦侍御史尹拙皆富典墳嘗親簡牘勸善懲惡雅符班馬之規廣記備言必稱董南之職上祈聖鑒俾共編修伏以唐室君臨歷年長遠至若王言帝載國史朝經治平之時充溢臺閣自季朝喪亂逮五十年四海沸騰兩都淪覆竹簡漆書之部帙多己散亡石渠金馬之文章遂成殘缺今之書府百無二三臣等虔奉綸言俾令撰述褒貶或從於新意纂修須按於舊書既闕簡編先憂漏落臣今據史館所闕唐書實録請下敕購求昔咸通中宰臣韋保衡與蔣伸皇甫煥撰武宗宣宗兩朝實録皆遇國朝多事或值皇輿播越雖聞撰述未見流傳其韋衡裴贄合有子孫見居職任或門生故吏曾託纂修或祕藏於士族之家或韜隱於巨儒之室聖代方編於舊史耆年有事於故朝聞此撰論諒多快愜況行恩奬以重購求請下三京諸道及中外臣寮凡有將此數朝實録詣闕進納請量其文武才能不拘資地與除一官如卷帙不足據數進納亦請不次奬酬以勸來者自會昌至天復垂六十年其初李德裕平上黨著武宗伐叛之書其後康丞訓定徐方有武寧本末之傳如此色類記述頗多復有世積典墳家傳史筆或收纂當時除目藏在私居或採托近代制書以為文集未逢昌運無以發明今屬搜揚誠為際會既伸志業佇見旌讐請下中外臣寮及明儒宿學有於此六十年內撰述得傳記及中書銀臺事史館日歷制詔册書等不限年月多少並許詣闕進納如年月稍多記録詳備請特行簡拔不限資序臣與張昭等共議所撰唐史祇敘本紀列傳十志本紀以綱帝業列傳以述功臣十志以書刑政本紀以綱帝業者本紀之法始於春秋以事繫日以日繫月以月繫時以時繫年刑政無遺綱條必舉須憑長歷以編甲子請下司天臺自唐高祖武德元年戊寅至天祐元年為甲子轉年長歷一道以憑編述諸帝本紀列傳以述功臣者古者衣冠之家書於國籍中正清議以定品流故有家傳族譜族圖江左百家軒裳繼軌山東四姓簪組盈朝隋唐己來勳書王府故士族子弟多自紀世功備載簡編以光祖考今宸恩渙洽屬意撰論卿士大夫咸多世族聞茲汗簡孰不慰心請下文武兩班及藩侯郡牧各敘纍代官婚名諱行業功勳狀一本如有家譜家牒亦仰送官以憑纂敘列傳十志以書刑政者五禮之書代有沿革至開元刊定方始備儀自寶應以來典章漸缺其祇見郊廟册拜公王攝事相禮之文車輅服章之數勢移權幸禮或僭差故軍容釋奠於儒宮舉朝議誚巷伯扈鑾而法服博士抗論年代既深禮文斯忒請下太常禮院自天寶已後至明宗朝己來五禮儀注朝廷行事或異舊章並據增損節文一一備録以憑撰述禮志四懸之樂不異前文八佾之容或殊往代隋唐已來樂兼夷夏乃有文舞武舞之制坐部立部之名天寶之初雲韶大備寶應之後音律漸衰郊廟殿廷舊章斯缺自咸秦蕩覆鐘石淪亡龍紀返正之年有司特鑄懸樂旋宮之義空有其文請下太常寺其四懸二舞增損始自何朝及諸廟樂章舞名開元十部用廢本末一一按録以憑撰述樂志刑名之制代有重輕隋唐以來疏為律令然纍朝雖有制敕相次增益舊條以此格律之文未能畫一後敕不編於實録諸制多在於法書請下大理寺自著律令己來後敕入格條者及會昌己來所經疑獄一一關報以憑撰述刑法志律歷五行天文災異中書實録前代具書自唐季亂離簡編淪落太史所奏並不載於册書謫見之文時或存於星歷請下司天臺自會昌己來天文變異五行休咎歷法改更據朝代年月一一條録以憑撰述天文律歷五行等志唐初定官品令三公三師為第一品尚書令僕射為第二品兩省御史臺寺監長官六尚書為第三品自定令己後官品錯舛比諸令文前後同異又有兼攝檢校之例資授册拜之文軍容或盛於朝儀使務漸侵於省局以此官無定令位以賞功臺府之權隨時輕重求諸官志前代無聞請下御史臺自定令己後文武兩班品秩或升或降及府名使額寺署廢置官名更改一一具析以憑撰述職官志畫野離強實均九貢帶河礪嶽爰命諸侯唐初守邊則有都督總管之號開元命將即有節度按察之名故刺史多帶於使銜郡閣更兼於軍額其後四安之地因亂多設於戎夷九牧之中乘寵遂邀於旄鉞故山河易制名類實繁請下兵部職方自開元己來山河地理使名軍額州縣廢置一一條列以憑撰述郡國志漢述藝文隋編經籍蓋以總括典墳之部牢籠流略之書唐初以迄開元圖書大備歷朝纂述卷軸彌繁若不統而論之何彰文雅之盛請下祕書省自唐初己來古今典籍經史子集元撰人姓氏四部大數報館以憑撰述經籍志臣名叨輔弼學愧裁成獲奉制書俾專信史伏以有唐纘歷纍葉承平文德武功己紛綸於圖牒記言載筆尚闕漏於簡書皇帝陛下永念淪胥深思揖讓周武謁成湯之廟不忘故朝漢皇封王赧之孫蓋悲亡國今則己覃優渥爰勤纂修凡在臣僚孰不知感所懼史才短淺識局荒唐實慮庸虛有孤宸委所陳條例如可施行請下所司庶幾集事鏻唐宗室子舉進士不第常山趙王鎔辟為從事後唐同光初授宗正卿兼工部侍郎出為河中節度副使明宗即位召入為太子賓客歷兵部戶部侍郎工部戶部尚書轉兵部尚書晉天福中守太子少保開運中遷太子太保漢祖即位授守司徒卒年八十八贈太傅朝班自四品己上官各許薦令録兩人五品六品官許薦簿尉兩人使廉慎能名者同受爵賞貪婪害物者並坐刑書各舉所知不蔽賢路敏字欲訥幽州永清人少仕州攝參軍後唐同光中纍遷兵部侍郎授北京副留守召為吏部侍郎入晉以本官判戶部遷尚書左丞開運中改工部尚書漢乾祐元年卒年六十三贈右僕射伏以臺司除御史中丞隨行印及左右巡事監察使并出使印等外其御史臺印一面先準令式即是主簿監臨近年已來緣無主簿遂至內彈御史權時主持嘗隨本官出入不定伏緣臺中公事不同諸司動繫重難常憂遲滯當奏申堂之際及牒州牒府之時事無輕重並使此印今準令式逐日有御史一員臺直承受制敕公文其御史臺印今欲勒留臺中不令在外選差令史一人帖司一人同知此印凡有諸色文按印發之時指揮諸司各置印歷一道具其事節件數書在歷中即於直官面前點簡印發其印至夜封閉候交直轉付下次直官共議執行保無差謬者伏以御史臺事總朝綱職司天憲所管人吏色役最多上至朝堂次及班列或在京勾簡公事或外地催勘稽違監守狴牢行遣按牘或隨從出使或祠祭監臨凡有係於臺司皆須藉其人吏俾無闕事以贊國容近年以來人數極少及月限者授官出外為官滿者追呼未來人吏既到不勉公事便至停滯切以往歲臺中亦闕人吏曾於諸州抽取今欲於諸州使院內量事差取十人據臺中諸司闕人臨時量才填補者一具臺中令史今欲條流凡出官考滿卻來歸司者便具到日申堂請以到日繫其選限如有經年不到追領不來即具申堂便乞除落名姓
