front:
  text: 全唐文欽定全唐文卷二百二十二張說二
  hash: sha256:18051d2298c0127feb71a3bc5322b7d2440bca14d5db0e0c4e0d4fd86e45ab5d
body:
  text: 客有嘲臣曰聖主正新歷握乾符百寮賡歌以美時六合鼓舞以頌德先生獨晏默書閣含翰詞林奚其為儓儗也臣應之曰斗水不能評巨壑之量隙光未足議大明之體何者見褊而守隘也握乾符者不謂執天命歟執天命者非夫廣德休歷交相表裏況命者夫子之所䍐言也焉可偏贊而總握符之盛哉如作者略大本舉小節不亦仲尼之門所聽營也是以涸思乾慮久難其述客無異焉客曰請終餘論粵若我大唐慶始白雲道昇紫氣屬漢東失馭淮南不返高祖舉晉陽之甲戡定關西太宗因傒后之師削平天下高宗收圖海外檢玉封中九域黎人重代飲澤雖鳴鸑改號神龍中興周鼎歸唐元圭祀夏中宗違代嬖孽窺國於是乎聖上起藩邸入鈎陳一麾水心㣥凶泥首崇復大聖越踐少陽受禪當宁而光大前烈垂統拜璧而慎寧後嗣四海有覆盂之安百代無委裘之隙是之謂聖人握符之大寶也四星入輔五將出禦倚禮樂為國計仗仁義為軍勢英賢集殿而文教成干戚舞階而武功振敬讓光於九族孝慈行於萬宇磧嶂西南渤瀚東北織皮火毳暍炎山汜熱海向風來王黑貂駮駿浮天溟絕冰漠連歲獻款鳥獸無猜人之意草木無不達之氣升中於天比天同貴是之謂聖人握符之大政也歷試上黨黃龍飛天入清中禁白虹指日瘞汾脽寶鼎見柴岱宗卿雲蔚非應事而呈瑞者雖多狎而不紀矣是之謂聖人握符之大祥也以數推氣以氣定朔以星殷時以閏成歲考星閒而革疏度置歲差而辨誤日立大衍之紀參大渾之晷合鐘律之聲極鬼神之情是之謂聖人握符之大歷也若夫仁聖根於內菁華發於外祥兆祕於前謠讖灼於後自然之理也彼洛下閎者漢太初時一巧歷耳云後八百歲當差一日有聖人正之斯人也抑將露才揚術預證來聖有耆舊之傳記無史策之明文然至隋之開皇及麟德聖歷三家創法一引為徵約之年代則鄰近稽之圖籙則暖昧未有如新歷之昭昭者矣在昔唐虞之際以斗精受命者七人得四均閒氣而生者又二十八人所謂三十五際者也禹以金德王故夏后之有天下也生數四百年契以水德王故殷人之有天下也成數六百年稷以木德王故周人之有天下也成數八百年伯益之命中天而堯族以火德乘之故漢室之有天下也生數再及二百年其閒距王而興不能復大禹九州之跡及勝殘百年之命者皆五神之餘氣也咎繇降德皇唐復興土精應王厚德載物生數五百成數千年命歷有歸此其大較修德增祚與天無窮轉筭之徒莫能究也緯以入元三百四歲為德運七百六十歲為代軌千五百二十歲為天地出符四千五百六十歲為七精返初天人相應合若符節自堯典命羲和修重黎之舊理顓頊之歷上元甲子千五百餘歲得孔聖而春秋之歷序暨開元十二年甲子凡三千四十歲遇聖上而大衍之歷興是時也土德入生數之元天命當出符之會信矣伏惟聖上聰明文思道德之具也豁達大度皇帝之體也藝總六經漢光之學也文通三變魏祖之才也緣情定制五禮之本也洞音度曲六樂之宗也神於弧矢黃軒之威也聖於翰墨蒼頡之妙也兄弟善友王季之心也子孫衆多周文之福也大寶以定天位大政以布廣德大祥以合靈符大歷以啟成命德位兼才臨照如此符命介福粲章如彼所謂廣德休歷交相表裏之效也善歷者必推來運以自神興王者不俟往言以表聖設徵夫洛下閎之語也其不有容成之事乎且如恃有命比於日孰是夏王之福也賴卜年衰其德豈謂周公之訓也故曰王者執天命在於俟天符致天符在於順天德布天德在於保天位四者備矣然後陳其盛德告於神明舍此道也胡可語正天歷握乾符哉謏臣懵學謝生元造樂虞典之歌舜羨周詩之美文敢不敷信詞薦清樂厭上客之誚託衆篇之後云爾維皇六葉於赫啟聖步玉斗握金鏡地維續天柱正山川授方雷雨施令清廟九祜堯門百慶郊稷尊祖擇昌定命德自我流藝從我修龜易八卦龍書九疇文含玉律字吐金鈎鳴絲鶴舞調箭猿愁集賢牓殿花萼名樓神用外表事行先兆萬目朝徹千心暗曉卿雲爛漫黃龍窈窕游姑射神人窅登太山天下小飛祥走瑞均靈踳類鞮譯窮天琛維盡地爍此金㦸鑄為農器匪直也然探元索祕軸止輪運辰居星轉得一神凝吹萬情辨發斂潛合晦明幽闡階蓂朝開宮槐夜卷正我長歷同符大衍天地清焉日月貞焉四時行焉萬物生焉窮神知化美功成焉金版玉牒遠頌聲焉我聞上古有聖人心入㣥有身包大空普觀察一切音聲其名曰觀音菩薩日月有盡光明無際天地有終神通不滅禮其形像隨緣而成功稱其名號因時而獲果龍門西龕等身像者此都人士思賢令蘇君之所造也天下之大都有五而河洛總其中皇居之赤縣有二而合宮是其一四隩輻湊萬商庬翏政頗財黠刑放寵怙所由然舊矣故強毅臨之則攫斂猋擾虣虐不辜以抶扑睚眄是稱辯吏寬厚處之則乾沒淫詭相詐莫禦以息偃怠謂之風流其傷弊一也武功蘇君名頲字廷碩隋右僕射邳國公之元孫今吏部尚書懷遠公之元子相門華列儒庭善訓雍容文雅當代知名通才博藝於何不可御史天憲也抗執之雄郎官星象也高握蘭之選帝車西幸皇眷東遙四方之極一臺歸妙蘇君於是乎始為政於京邑籍田戶以衍賦徹考資畜以程力任董逋逃以業浮廋詰姦慝以豫煢嫠制事典以示好惡敦術學以興禮義省法罪獄吏無作威煦郵驛圉人不敗產加以躬親足以勵勤謀始足以作則端莊足以易暴清儉足以息貪夫如是往而事行正身而人慕輕薄束修而歸厚流亡襁負而來復曾未期月遷給事中既而人吏父老聚而謀曰咨休哉明府之惠人也春風暢之時雨霂之心乎愛矣何以祝之朝廷豈不念下民之鬱陶乎奚其為奪我君而不省留也詩曰愷悌君子神所愛矣庶幾乎三珍依憑百祥臻降云爾乃購奇匠亻欣靈峯追琢鏡光鑱鑿電烻倚高壁臨懸關蹈石菂戴珉鬘縹緲雲聳嬋娟玉立模宰官之形儀現輪王之相好諦視瞻仰將莞爾而微笑攝心傾聽疑僁然而有聲其左右則福地園林香城基址前佛後佛大身小身亘岑嶺而相望遍虛空而無數此身不動觀大地之衆生彼佛何來見河沙之世界爾其北對宮觀南馳荊越闕路開豁而中斷伊水逶迤而長注修途交會車馬川流帝城風俗是焉游覽如鎮南之峴山似關西之灞岸暮春桃李上巳清明汎法池之綠波憑靜域之丹檻揚袂陰景躧步震山花散四天香聞八國以不居之歲月閱無窮之人代知妙容之常在覩永劫之因緣盛德相傳與此山而終始不其偉歟昔孔子化中都以攝魯相卓茂理干密以致漢治夫樹善有基建功無小蘇君春秋鼎盛德業日新方欲驤首天池整翮雲漢致大君於堯舜紹層構於韋平是宰也故以五路之椎輪九域之覆簣巳重宣此義而說偈曰大哉元聖心如明鏡深入禪定龍飛清淨觀我佛性靈相珍飾精窮妙極於嵓之側因空見色登我願力不競不絿不剛不柔敷政優優百祿是遒侑我蘇侯省表具知蠢茲戎狄侵軼邊鄙不交鋒刃自取敗亡既邊將之功亦天道所棄心之有慰與卿同之問有征無戰道存制禦之機惡殺好生化含亭育之理頃塞垣夕版戰士晨炊猶復城邑河源北門未啟樵蘇海畔東郊不開方議驅長轂而登隴建高旗而指塞天聲一振相弔俱焚夫春雪偎陽寒蓬易卷今欲先驅誘諭暫頓兵刑書箭而下蕃臣吹笳而還虜騎眷言籌畫茲理何從問夫子述孝經裁道德輔天相地樹之王化穆乎人倫既鈎命而合謨亦契神而盡性歷聽藏書同為代寶永言五孝不列六經將設教之有旨豈偏序之無法北宮㣥彥未始詳焉東觀諸儒不之辯也且禮樂二本古文漏失春秋三傳大議派分而備六籍於蘭臺懸九經於甲令今欲登孝道為七藝抑未前聞足經名為十部恐疑後進思觀義窟用定儒門問語人以倫鳴鶴斯和砥名礪節異代同歸子等溫古知今將施有政前言往行豈曰無聞至於顯仁義以基德標智信以習禮觸目青史比肩縹帙思齊其事各辯其人既呈役於扣鐘可徵賢於求燧肖形天地甄化陰陽五常配於五行六情同於六氣為所稟之各異葢因物而或遷仍分情氣之題目兼敘常行之方位問自昔帝王必有制作所以隆基天命器辯神姦至如或鑄昆吾或遷郟鄏虞邱之說尚疑周漢楚子之問未詳輕重通明舊史幸為指陳亦有弗父勒銘仲山傳器得於何代顯自何功魚遊之旨安施雉頌之文奚戒兼言鼎鼐之異及顯家國之宜問禮樂詩書將之本也德刑政事戰之資也自營州東覆趙郡南侵踐更塞下望獵塵而股戰擁麾隴上聞虛弦而心死中興皇歷大講戎機懸金待賞築壇思拜吾子才標美箭門襲良弓軍法盈懷兵規指掌未知獻何道使人興義進何政使人知禮施何方使人向信行何術使人有勇擇前王之令典合今日之權宜助武成於七德翼威加於四海又聞乎兵以正合戰以奇勝然則守信非乎尚詐成列異乎鼓儳去就之宜佇詳厥旨問良將者必精辯天時審詳人事兵家舊畧遺訓存焉借如歲在豕韋日交析木漢軍北戍胡騎南飛守則覩於星高戰則逢於陰盡何方以得天道何策以決時機應積沈謀勿參浮說且鬬由角力克在同心而子野歌風遙知不競亞夫望氣懸識將興豈雲物非繫于人或成敗不關於戰幸陳晉楚之術以定天人之理問輕齎遠襲取敵人為資敵人固守不我斯應疑圍則師老而力屈去則糧盡而途遙何策可以下城何謨可以召戰又兩軍相遇同阻一水必資其畧以致敵來傾俟良圖抗行前志問詩稱有截傳載無為必在其人方致斯道皇上心存元默政洽清虛坐五室以調氣舞兩階以柔遠溥天之下計日來庭尚有戎羯餘塵覷長城於塞北句驪舊壤走都護於安東棄招蹙國之譏取有疲人之患綏討之理用捨何從且夷狄異方地俗殊等借是斷山川之是利較戰守之所長嬴糧調兵幾何克濟選倫求將可者為誰靜聽嘉謀將聞執事問安西迥途磧北多寇自開四鎮於茲十年及戍人白首無代分閫節使丹旐方歸未悟恢邊之益且疑事遠之弊今赤曷既并於黃姓默啜復覘於庭州漢掖徒張胡臂未斷而內匱積穀外非足兵於何出踐更之師奚使閒穹廬之黨息人靜國有策存乎問五嶺山深三蜀地險篁竹之下時驚剽劫瓜芋之壤歲擾居人若縱兵揚麾則烏散谿谷及旋師反旆則蟻聚津途窮之乃一切歸降置之又無不反覆安輯之術敷陳其要臣聞上天示下災祥將以誘導人主先王仰觀休咎亦以順修政教易曰天垂象聖人則之言天人之際感通必矣臣伏見去年十月十七日月滿猶望應虧不虧今月十七日亦未少虧此易常之異也夫月者至陰之氣臣下之象當助天作明順時盈缺若過盛逾時盈縮乖度得非臣下之咎而上天之誡耶伏願陛下深察熟思而預防之臣又見近日內宴夜深方罷小臣無識抑所未安王在在鎬凱樂飲酒此誠大雅之美也臣卜其晝未卜其夜此葢春秋之義也伏願陛下宴樂之餘不及於夜臣職忝補闕昧死陳愚謹言臣說言臣說頓首死罪死罪言臣聞小忿不忍延起大患小罪不寬迫成大禍契丹奚背恩誠負天地不容之責然原其狀本是夷戎君臣不和自相誅戮耳所望聖慈且使其族類在朝者將勅書再三告讓因其所欲立酋長而便定之或可不戰而定也必告之不馴則大發兵馬東召靺羯西舉九姓來春未青數道齊入突干之首可拾而取未為晚也天恩若不忍以中國勞事蠻夷則嚴兵備塞棄兩蕃如糞土耳又許欽浹擁二萬餘衆據五丈之城有糧即守不可拔無糧即鼓而行歸何所慮也今遣史獻非時遠抄近掠其實甚難萬一未捷賊氣轉壯下臣愚昧不敢隱情伏願聖恩再加裁度臣說誠惶誠恐頓首頓首臣某言臣聞至德洞微天鑒不遠休徵祕景時和則見是知帛丿糸代曠歷慶牒祥經帝王有必感之符神靈無虛應之瑞伏惟天冊金輪聖神皇帝陛下金鏡御天璿衡考政欽若元象宏濟蒼氓茂功將大造混成純化與陽和俱扇朝百神之樂職宅萬國之懽心嘉氣內充淫雨外息豈止搖風紀月之草列蒔於階除儀簫銜籙之禽相鳴於戶閣而已固有發禎厚載抽貺泉源表元德之潛通顯黃祇之昭報臣於六月二十五日得所部萬年縣令鄭國忠狀稱去六月十四日縣界霸陵鄉有慶山見醴泉出臣謹差戶曹參軍孫履直對山中百姓檢問得狀其山平地湧拔周迴數里列置三峰齊高百仞山見之日天青無雲異雷雨之遷徙非崖岸之騫震歘爾隆崇巍然蓊鬱阡陌如舊草樹不移驗益地之祥圖知太乙之靈化山南又有醴泉三道引注三池分流接潤連山對浦各深丈餘廣數百步味色甘潔特異常泉比仙漿於軒后均愈疾於漢代臣按孫氏瑞應圖曰慶山者德茂則生臣又按白武通曰醴泉者義泉也可以養老常出京師禮斗威儀曰人君乘土而王其政太平則醴泉湧潛潭巴曰君臣和德道度協中則醴泉出臣竊以五行推之六月土王神在未母之象也土為宮君之義也水為智土為信水伏於土臣之道也水相於金子之佐也今土以月王而高水從土制而靜天意若曰母王君尊良臣善相仁化致理德茂時平之應也臣又以山為鎮國水實利人縣有萬年之名山得三仙之類此葢金輿景福寶祚昌圖邦固不移之基君永無疆之壽自永昌之後迄於茲辰地寶屢昇神山再聳未若連巖結慶並泌疏甘㣥瑞同區二美齊舉高視古今曾無擬議信可以紀元立號薦廟登郊彰賁億齡愉衍萬宇臣辱司京尹忝寄留臺牧西夏之疲人荷東蕃之餘寵游泳鴻露震悚明神禧祉有歸光啟茲部喜覩殊觀實百恒流踊躍一隅馳誠雙闕伏請宣付史館頒示朝廷無任鳬藻之至謹遣某官繪圖奉進臣聞天微地杳惟聖能通物寶靈禧在德斯感伏惟天冊金輪聖神皇帝陛下覆翼萬方植生㣥類化行至道風流太和白耀青光目日月之瑞赤文元甲手河洛之符既慶溢於山泉又嘉賁於草木臣今月三日得所部萬年縣令鄭國忠狀言縣界內霸陵鄉新出慶山南之醴泉北岸有瑞杏三樹再葉重花嘉禾三本同莖合穗臣謹差司兵參軍鄭味元檢覆皆實臣謹按孫柔之瑞應圖曰嘉禾者五穀之長也王者德茂則生昔炎帝教洽人心而嘉禾秀周公理合天道而嘉禾豐臣又以事可理推物有類驗蜀桑異葉李定知其有祥漢木奇枝終軍以為無外今植物搖落而瑞杏繁滋所謂仁育之風行於肅殺之序此葢聖道隆渥靈祚宏多朱萼素花彰孝理於詩傳一莖九穎合德耀於祥經曠代殊珍崇朝累集方俟山流石髓杏茂仙林醴挹軒漿禾登堯膳受天介福錫帝長齡覲王母於崑臺朝神人於谷口今綠苗尚艹侻黃粒未成當須晚秋不獲早獻臣忝尹茲部頻矚洪休抃躍之誠倍萬常品臣聞山川變見如來有得道之祥國土遠移至人任不思之力伏惟皇帝陛下宏惠福深勤人願滿蓮花授記應上聖之降生貝葉開圖握大雄之寶命司戶參軍孫履直伏承臣奏所部萬年縣新出慶山醴泉乃有天竺真僧於春首獻狀若以梵音所記此是祇闍山恒河沙佛必經林下虛空衆聖常處巖閒隱見外方湧秀中土岑泉可識體類宛然感應十號之尊示見千輪之主此實天威無礙地寶有歸化焜燿於裁成理窈冥於言說但瞻三山丹壁奄靈鷲而飛來三泉淥池逐神龍而吐沃峰高八百協周室之隆基地得萬年祈皇靈之資始儒書分載望偈希聞加以堅固開林吉祥被草重花瑞杏藻岫紅源九穎嘉禾葱巒黛壑原臨白鹿識鹿苑之仙游路邇朱城悟王城之鍾聽方俟迴輿雪嶺厭香積於㣥臣沈璧天池蔭靈枝於下國吹法螺而朝玉帛乘瑞象而會天人溢宇流觀殊鄰浹慶臣守符京郡奉神嶽於郊畿係葉皇柯仰慈雲於油露喜抃之極倍百恒誠臣某言臣聞靈感無方每先時以見象神鑑不昧必憑物以示人有德著而休歸或祥來而事應伏惟天冊金輪聖神皇帝陛下端冕馭天舞干柔遠南越瑞貢久通驛而歸仁西域奇山近隨方而應聖臣今日得所部萬年縣令鄭國忠狀送新出慶山下羖牝羊乳麞麑一頭狎擾因依動息隨戀如從所產若素同㣥理有可嘉事無前例竊以異類相育外方慕化之徵野畜自馴荒服來王之兆必有遠夷解辮歡心百獸之庭獷俗懷音稽顙三朝之會臣言可驗翹足是期昔馬或生羊易占得人安之體犬時養彘天鏡顯代康之文援此比蹤實為同貫況復晨飲醴浦夕下靈山翳仙杏之奇花拾嘉禾之餘穗羊禎甚玉麞慶如銀晦朔未移祥符累集福應之盛前古未聞臣忝尹京都屢薦嘉瑞抃躍之至兼倍恒流謹差某官奉表隨進臣某言臣聞天聽自人神和在德代非乏瑞䍐遇開泰之期福不虛徵必俟休明之主伏惟天冊金輪聖神皇帝陛下仁覆萬靈孝理四海功莫高於尊祖道莫大於配天嚴備郊禋崇肅宗祀秩百王之禮兼六代之樂恩溢膠庠訓優更老政每光於帝籍役不紊於農時嘉氣橫游祥風紛灑騰文煒色九光連合於貞明逸輩殊倫百寶駢滋於動植臣今月日奉進止告望鳳臺慶山醴泉之瑞其日於山陵東柏城內得嘉禾一本臣初見衆苗亘壟香穎垂秋嘉翫繁滋欲觀稃粒左右無識折以呈臣異其綠葉綬舒葱芒璧秀熟視奇狀乃知嘉祥下則異畝合莖上又同連雙穗昔雍熙之代政理之君雖導出應時而生不擇地未有託根神域彰孝德之能深吐秀壽宮助粢盛之豐潔此葢睿誠通感靈佑降祥中古以來未睹斯美臣籍慶宗枝久沐星潢之潤躬持瑞穎預奉天保之符抃悅之誠倍兼恒品臣攸宜言今日某乙從峽石山稱前軍王孝傑等以某日失利於峽石山忽聞殞絕心摧魂死上孤天威下慙士卒死罪死罪頓首頓首臣以駑怯謬職戎麾銜戴恩榮統率將士驅關隴之馬引淮海之餉旗幕亘於邊城弓甲傾於內府不堪任使撓失節度㣥帥無決勝之功偏師有挫衂之咎長犬羊之孔熾縱梟獍之未滅憤結靈祇怨毒骨髓臣實其罪罪非他人忍恥苟全遠愧胡顏之責引慝遄死內負猶鬬之心踧踖無顏進退靡處臣既不建師律有干常憲合即嚴科以塞重責然以見在兵馬交要部統未敢束手軍事委置旌節稽緩刑書伏深兢戰特乞更召嚴猛代臣統帥請歸罪司寇以正國刑囚伏邊陲唯待斧鉞草土臣說言臣私門凶咎喪紀未終不自毀滅苟存聖代忽降制書復臣工部侍郎尋奉後命授臣黃門侍郎震驚失圖哀悕隕絕臣說誠惶誠恐頓首頓首死罪死罪臣弱年早孤母氏訓立得紹基構忝列簪裾從宦歷年晨昏多闕播遷遠裔離別又苦顧復無荅報養何追心所摧感語不能喻甫至冬中禮及祥禫今巳春暮瞻言幾何是臣事朝廷日長戀几筵日短乞寢嚴命許達私情訴衷祈天所望矜遂無任荒迫之至謹詣朝堂路左奉表乞哀以聞謹言草土臣說言臣在疚承榮布哀陳款精誠無感天睠未迴假喘殘生悲懼轉集臣說誠惶誠恐頓首頓首死罪死罪臣聞苦者不覺聲哀窮者貴其言達情有至切辭無敢隱臣為少子慈愛所鍾每一離別輒加憂憫況臣生年多故違隔私庭終堂之日身限公事存既數違左右沒復不畢几筵痛心自傷特殊人類臣今望延數月企及再期乞恩無多報國非晚冒死重請冀蒙哀遂無任懇迫之至謹詣朝堂路左奉表陳乞以聞草土臣說言臣荒喘窮情再瀆旒扆懇誠不到未感天心誓將冒死祈恩分外中謝臣本書生門非代祿數葉單緒族無親房臣父遭憂曾祖未葬臣有兩兄一妹甥姪九人又有中表相依向成百口吉凶衣食待臣以辦臣今拜職黃閣侍奉丹墀厚祿清班一朝改官舉族榮賴為幸過甚人情所欲豈合稽恩正以煢煢苦心有所未盡臣亡母在日朝夕誡臣以臣獨立無徒好直多忤知子者母果驗所言往罹大獄竄命炎海晨出晚歸貽慮非一況涉危難傷心幾途追憶生平倍增摧慕侍養日少違離日多即臣母憂臣以終身臣其忍服縗以從事情既不同常例望在特降殊恩臣先患風緩近加虛痺陛下倘從臣數月容過再期非但寬其哀疚固亦全其生理亡身報國庶竭後圖木植有性枉之則折人願在心違之則苦雖強為用將何以堪銜泣仰天冀蒙哀允無任懇迫之至謹詣朝堂路左奉表陳乞以聞臣說言伏奉九月十九日制書到并州授臣兵部尚書同中書門下三品王人在門驛騎首路奉恩循分以慙以惕臣說中謝臣早以書生射策載筆聖朝晚以軍誌典兵秉旄乘塞祿非援進寵是宸衷久侍玉階四掌綸誥一心好直三黜其宜今復用之猶夫人也何足以舉明邦政光緝帝猷更策疲驂來塵法駕又臣巳受命司籍專意書所希散宂因閒就業忽叨劇職責大憂深人心有限事難兩濟國史無成臣執其罪上思薦賢以自代下願守分以全節竊見開府宋璟清介獨立倚法不回詹事陸象先清明向道臨事能斷其高明有素歷朝之所仗委其積行無疵衆人之所體信揆停往任未盡宿誠乞迴此恩以納來効必能補舊政之缺漏廣前途之軌轍雖探心角力臣頗與二子齊驅然校德考年彼皆有一日之長天下者累聖之公器宰相者萬方之具瞻臣所以廷讓彰言不陳密啟伏願聖恩聽與而舉俾諧僉矚儻朝任得人實海內幸甚無任力微任重惶懼之至謹奉表陳讓二年十月十七日臣說言伏奉制書除臣中書侍郎寵命俯臨驚魂自失臣說中謝臣聞雲構鬱起非枳之任天波暴集寧溝澮所容臣識無通方文不經國南宮華省巳忝前行西垣內閣將陪近侍心慚官謗跡愧時流何以承掌王言贊決機務當今二儀再造百度皆新太平之基惟賢是與渾成庶政責在中書豈以常才敢膺首選乞寢恩命改擇時髦惟慎庶官以諧僉議無任悃款之至謹詣朝堂奉表陳讓以聞臣所讓人別狀封進臣說言伏奉制書除臣右丞相兼中書令臣學慚稽古早侍春宮階緣舊恩忝竊樞近雖思致君堯舜而才謝伊臯今屬升中大封方求俊乂猥升端右實愧朝行乞停新令獲守舊職辭訥情懇希垂察諒無任屏營之至謹奉表陳讓以聞臣說言伏奉今月十日制書除臣尚書右丞相恩命自天戰跼無地臣說中謝臣少長儒門墾鑿墳史才非高格官不因人徒以命偶龍興位階鴻漸五入西掖七踐南宮中閒拙延謫放直招玷缺傷矢之禽聞弦虛墜賜環之客聽歌先泣此則魂為危感氣由懼奪安可重收廢器再辱端揆何以師長禮闈正持憲府當今典章革故風教鼎新野無四隱朝有三傑具瞻之地願擇時髦臣幸沐遺簪墮履之恩好生養志之德朝遊牘暮對圖書受賜無涯循榮過分豈更干處士之橫議招匈奴之遙哂艾骨自瘡負乘致寇雖則愚情懷戀靦冒求寵亦望聖慈限約令度餘年願停今授長守舊史罄陳肝膽非敢飾讓謹詣朝堂奉表自乞臣說誠惶誠恐頓首頓首死罪死罪謹言臣說言臣伏奉宣旨制書以臣同中書門下平章事承命戰汗拜舞失容臣說誠惶誠恐頓首頓首死罪死罪臣本書生器識凡近仕不望於通貴祿只期於代耕蒙時寵榮越踐臺閣局心守職竊所庶幾長筭經邦則無逮及伏以廟堂寄切軍國務殷循涯審分非臣攸處為國者為官擇人為臣者陳力就列若智小謀大力微任重豈敢顧惜微軀實恐上塵王政是以披露肝膽不暇飾詞乞停此授俯遂誠請無任怖懼慚惶之至謹詣朝堂奉表陳讓以聞臣說言伏奉今月十一日制授臣中書令恩渥自天震越無地臣說中謝伏惟陛下至孝安親大功定國六合翹首庶政惟新雍熙之化望在茲日中書理本臣叨首名將何以翊贊聖君光澤天下自臣攝官禁掖已涉七旬不知賢才以舉是不仁也不辨不肖以退是無勇也何足以備乎宰臣胡顏冒恩復受真拜臣之愚執正在於此不敢繁辭以塵聖聽乞迴榮授改擇時髦無任懇款之至謹詣朝堂奉表陳讓以聞臣所讓人別狀封進
