front:
  text: 全唐文欽定全唐文卷八百四十五希濟蜀後主時纍官翰林學士御史中丞國亡入洛後唐明宗拜為雍州節度副使
  hash: sha256:9d363fec7b5a30015967258ee6df1215744a691439c29152aeb1ecb62858b9ad
  markers:
  - {type: head, offset: 14, content: 牛希濟(一), id: KR4h0168_NFKB_845-h1, level: 1}
body:
  text: 周文之先自公劉后稷積德纍仁以至於文王天下之心歸焉猶服事於商武王從兆庶之心順歷數之命以取天下既而有疾嗣王幼弱乃命周公旦以輔相成王周公以弟之親叔父之尊公其心而不疑焉攝天子履萬乘車輅朝諸侯於明堂以施教化召公不悅四國流言伐四國戮管蔡以安社稷然後制禮作樂七年之後成王齒長德懋乃歸其政公亦不離王室乃命伯禽受封於魯思不變四海之望遠乎哉君子即周防也若是武王獨知周公之才之美兄弟之國天下之人皆不知也向非周公則非成王之天下也天下疑矣然武王之心公乎哉知子之弱而私之知弟之德而讓之且憂後世兄弟相及豈周之盛德為不及歟曰是知之深也所以能明輔相其子若有疑焉則與之天下希存其子亦難矣周公雖不為王者然其道則與太王王季文王為同德矣成康以降名仁者多矣孰可與之為伍蓋姬周之得天下未幾而武王崩紂之子祿父猶存若委少主無聖人之助則少康之舉嗣夏左傳作祀夏配天不其偉歟此周公所以孜孜焉為而不有夫其聖德過於武王遠矣今後王之嗣君也亦莫不蔽於私愛忘其善惡曰彼長也冡嫡也天下之本也莫之可易也至有不離襁褓之中童嬰之列而即大位焉亦使強臣而為之輔其詔制之旨曰周公然也成王然也豈惟政亂國危殆宗廟不血食者有之矣曹馬之君即其人也自征伐以來受命創業之主或起自布衣之中亭長之役部尉之列大夫之家卿相之位或歷試諸難或十年軍中足以知歷數在躬時運興廢經始之艱難臣下之忠良人情之巧偽是以出一言舉一事易一法必使合於典誥垂於後世守文之君也生於深宮長養婦人之手慈愛之鍾焉世子之教不行焉身軀則安於玉堂金殿輿服之盛耳目飽於聲色靡曼之樂曷能知君臣父子之道忠信邪佞之屬農桑艱難之本故小人易欺焉況幼稚乎且人君之心為天下之晦明仁者樂於明而匪仁者便於暗故時之晦也盜竊興焉魑魅行焉君之晦也賢良死焉邪佞用焉是以小人姦臣唯樂於幼君少主若保姆之態也以提其耳目導其言語教其喜怒行則行止則止易為之使欲求天下之治可乎況近世之嗣王也始自誕生厥月無問名之禮至於婚冠無金石之樂告廟之儀外莫聞焉春誦夏絃秋詩冬禮上庠齒胄之道或縱不知封爵之命掌言者亦不知其誰師保之道正其身乎左右之人賢與處乎其即位也降先君之册冡宰與百執事延頸內面而朝新君焉衮冕端拱元默於殿上雉扇熒煌香煙蓬勃左右紛紛焉莫之知也班列千百稱慶而退至於積年之中宰執大臣延英入閣稱述聖德舞蹈而已使有言者皆申有司徒空言耳敢及於時乎敢及於執權亂政之人乎設有一言明日之制行矣不復用矣歷觀前代明王賢后未嘗不與名臣賢士厚享宴之禮接見之儀俾其忠信相親亡於畏憚通於商較以正先王之得失以窮聖人之能事故兩漢金馬石渠文章之選以備顧問為侍從之臣至有大臣武帳之前亦奏謁或排闥於危疑之際以問安否以圖後事太宗文皇帝貞觀之初北門之選舉十六族也皆建功定策有布衣之交非天下文行之士不預焉既久與遊處非唯知民間之疾苦時之否臧從而更之以熙帝載至於臣下之情性好惡無不悉焉他日之任用莫不適其材矣近世朝廷豈無忠信謇諤之士徒欲致身之危救時之弊指陳千百於上前敷揚其達乎諫章其覽乎若復稍挂聖慮左右天顏得之矣又有以惑之矣其朝退也黃門伎女聲樂駢羅俳優之人調笑相雜擁衛以至於內殿又日幸於兩軍遊於其所其從樂乎斷可知矣故自乾符之亂至於今日莫可救止蓋少主姦臣之所為也或曰冡嫡之幼善惡未知思欲易之以卜長世廢嫡立庶聖人所惡未知其可也曰君人者上以安宗廟下以庇蒸人雖長嫡之義其不善易之可矣且仲雍王季之長子讓西伯之聖德斷髮文身以避於吳為吳太伯蓋成父之志也隱公魯之賢君居位稱攝欲讓其弟後其長矣吾將與之桓公聽羽父之譖以疑其兄致於篡弒又晉厲公之薨也子周有兄而不慧不能辨菽麥㣥臣迎公子周以立政是以治三駕而楚不能爭又襄公之亡也君無長子趙盾思欲立長君乃迎公子雍於秦將欲立之穆嬴朝夕抱太子以朝且泣曰先君以此子之賢吾受子之賜此子不才唯子是怨今君雖終言猶在耳此子何罪而外求君趙孟懼大義於衆人遂背秦好立靈公幼而好虐竟為所弒國是以亂漢高帝遷都長安也以呂后妬於糟粳其子盈為太子上以趙王如意似我知盈懦弱卒不能易及惠帝之世幾為呂嫗所滅非平勃之闕不能加誅及擇諸王之賢者迎王於代邸是為文帝不十年幾致刑措又昌邑之亂霍子孟定廢立之册立宣帝遂獲中興衛伯玉之於晉武也君臣之交矣知主鬯之不惠必傾世祚嘗撫其牀而嘆曰此座甚可惜也帝心不悟終以正度為君果致元海倡四方之亂宗廟焚燬兩京版蕩懷愍二帝俱為俘執而崩晉祚中絶國分為十六普天之下皆墜爐炭此惠帝之所為也是知冡嫡賢而臣擇立者必亡若立嫡為亂執古之道乎擇善為治曰亂嫡庶之制乎且天子之孝以安宗廟克荷祖考之業卜世於長久豈以擇善廢不肖為罪乎至唐虞之君知其子朱均不肖不可付以宗廟之重又懼其流毒於生民乃棄其子而禪於有德若次子之賢遽以配天之業授於他人乎是知君唯其明不必拘伯仲之制易曰明兩作離洊雷震若不明不法此覆國亡家之罪人也何長之為若君明於上小人比周之黨其能進乎其獲用乎其置於亂乎主少不明者亂之本也故曰元良者天下之本也莫若先以正之正之者非在廢長擇善而已無使叔孫之禱曰主少國家多難祝我者使我速死無及於亂此憂之深也悲哉聖人之德也有其位乃以治化為文唐虞之際是也聖人之德也無其位乃以述作為文周孔之教是也纂堯舜之運以宮室車輅鐘鼓玉帛之為文山龍華蟲粉米藻火之為章亦己鄙矣師周孔之道忘仁義教化之本樂霸王權變之術困於編簡章句之內何足大哉况乎澆季之下淫靡之文恣其荒巧之説失於中正之道兩漢以前史氏之學猶在齊梁以降國風雅頌之道委地今國朝文士之作有詩賦策論針判贊頌碑銘書序文檄表記此十有六者文章之區別也制作不同師模各異然忘於教化之道以妖豔為勝夫子之文章不可得而見矣古人之道殆以中絶賴韓吏部獨正之於千載之下使聖人之旨復新今古之體分而為四崇仁義而敦教化者經體之制也假彼問對立意自出者子體之制也屬詞比事存於褒貶者史體之制也又有釋訓字義幽遠文意觀之者久而方達乃訓誥雅頌之遺風即皇甫持正樊宗師為之謂之難文今有司程式之下詩賦判章而已唯聲病忌諱為切比事之中過於諧謔學古文者深以為慙晦其道者揚袂而行又屈宋之罪人也且文者身之飾也物之華也宇宙之內微一物無文乃頑也何足以觀且天以日月星辰為文地以江河淮濟為文時以風雲草木為文衆庶以冠冕服章為文君子以言可教於人謂之文垂是非於千載歿而不朽者唯君子之文而已且時俗所省者唯詩賦兩途即有身不就學口不知書而能吟咏之列是知浮豔之文焉能臻於理道今朝廷思堯舜治化之文莫若退屈宋徐庾之學以通經之儒居燮理之任以楊孟為侍從之臣使仁義治亂之道日習於耳目所謂觀乎人文可以化成天下也人君尊嚴臣下之言不可達於九重表章之用下情可以上達得不重乎歷觀往代策文奏議及國朝元和以前名臣表疏詞尚簡要質勝於文直指是非坦然明白致時君易為省覽夫聰明睿哲之主非能一一奧學深文研窮古訓且理國理家理身之道唯忠孝仁義而已苟不踰是所指自合於典謨所行自偕於堯舜豈在乎屬文比事況人君以表疏為急者竊以為稀況覽之茫然又不親近儒臣必使旁詢左右小人之寵用是為幸儻或改易文意以是為非逆鱗發怒略不為難故禮曰臣事君不援其所不及蓋不可援引深僻使夫不喻且一郡一邑之政訟者之辭蔓引數幅尚或棄之況萬乘之主萬幾之大焉有三復之理國史以馬周建議不可以加一字不可以減一字得其簡要又杜甫嘗雪房琯表朝廷以為庾辭倘端明易曉必庶幾免於深僻之弊夫僻事新對用以相誇非切於理道者明儒尚且抒思移時豈守文之主可以速達竊願復師於古但置於理何以幽僻文煩為能也有國家者未嘗不思治孜孜焉求才汲汲焉用人官無曠位命不虛日多不至於治者何哉蓋不知重其本也夫重其本莫若安人安人之本莫先於農桑上自天子下至庶人未有不須衣食以資養其生此情性之欲一也故率公卿以躬耕於千畝非獨致敬於粢盛也率嬪御以親蠶於繭絮非獨致美於黻冕也皆所以先民之教化也下之人必曰王者后妃尚勤於耕桑余何人哉若天下之人皆相率以耕織為務則穀帛可指期而取穀帛既賤人各足其所欲所欲之大唯衣食而已不飢不寒則時無怨嗟時無怨嗟則和風充塞則焉有不豐不稔之歲既庶且富然後仁義相及王道可行方困飢寒而能致於仁義者雖淳朴之世君子之人幾希矣今天下之人非不耕也非不蠶也率九州之人一人耕而百人食一人蠶而百人衣王者之征賦在焉諸侯之車服劍器在焉職官之祿廩資焉吏人之求取往焉俾一人耕一人織足上下百人之欲不亦難乎僕嘗客於山東寓於民舍觀其耕也候天時相地宜遠求穜稑胼胝手足朝昏引頸以望膏雨借貸以成其饋餉筋力竭盡於磽確汗流汙背忽以霂日熾其背無不黧黑又婦人之為蠶也髮鬢如蓬晨昏憧憧高條長梯蹈險履危稚女嬰兒目不暇顧歲時之成否斯在外矣其五稼登於場圃也未及簸揚蠶之為繭也擇未盈筐犬吠喧嘵悍吏繞於居烹茗飫食然後乃曰若干官之常也若干歲之逋也我求之何以應執事之欲若不從我他日之役余無庇爾焉民由是懼其督責之急憚其恐脅之言無不強足其欲粟之熟也糲食未飽蠶之績也家不及絲縷殆不旬五日皆己罄矣至有父子拱手屋壁相顧而坐向使不為盜不為非不鬻不時之物不犯及時之禁不受役於鄉豪不為汙詐之計以給其家可乎故孟子曰父母妻子對之飢寒而不為非未之有也誠哉是言且古者四人各業以成其國士世其詩書農本其耒耜工傳其繩墨商積其貨財今士大夫以先王言行政事自守恥趨時捷急之辨者固獲用於諸侯矣農人之家恆苦時弊工之屬也亦受其役而不受其直唯賈之利獨便於時若關禁之賦薄市井之不擾我取積其疑物以中之時如不我容捨而之他邦非劫取加諸之力不能為患農則不然父母存焉桑梓在焉妻子居焉懷土之戀居亦可知使盡室以往曰避煩賦他邦之政亦我邦也欲何以往所以今之世士亦為商農亦為商工亦為商商之利兼四人矣審利要時一中百得易於耕織人人為之故諸侯庶人亦爭趨之矣且四人之中其一為農亦已為鮮矣加之浮食之衆曷可勝紀其大者而有四焉自京達於閩嶺豪右兼并之家或纍思進達其身或求恃勢以庇鄉里者多以其子納於黃門俾為之侍且北宮之中唯有四星蓋上以備左右灑掃之用國家自開元天寶以來中官之盛不下萬人出詔旨使於四方或恃寵錫之命宣慰勞之恩千里伺其聲塵候騎從其所欲絶情於親愛抗禮於君父不蠶不農愛頑愚之施捨亦有積蓄寶貨爭名競利出入乃權幸之門指揮愈僕隸之中闕庸夫者一也道德之士反為謗議實可顯加甄別用永其道此為弊之深者二也即有衣紫帶金形貌魁偉酒食以招於交遊僕馬以溢於巷陌樗博擊毬以為之業自六軍遍於四方或擊毬一入於門中天子喜悅拜為上將或都城會府總統繁多阿黨小人撓於王法其目儒者勢欲吞食竊比仇讐曰我武也文武之事墜於地及問其日月風雲孤虛向背鐔鍔之所干戈之別三和六鈞之制一沉一浮之財九地之所宜五行之制變攻守之難易進退之是非莫我知也己失其為武然用之為將欲寄國家之成敗生人之性命其可乎況復喜怒以刑人視人如草芥嚴暴以及物唯物之利己以至於流亡以至於敗亂此為弊之深者三也復有製儒者之冠服習儒者之威儀語不知書百行無取亦有耳剽心記之學多背毀於冠蓋之士其誑不達我能是也又道不是者以勝謗之敗俗倨傲之儀咸致遊宦於州里其官也用刑為嚴納賄為能狡譎之行為長其行也總佞媚之術輕折朋友交結邪僻附近左右炫酒令之奧恃博奕之精諸侯遇之曰奇才也能狎宴昵吾與之私焉車服器用無所愛焉或引之於賓佐委之以紀綱授之以守令必盡刻削之能致聚散之力亦有薄通文藝尤飾狂妄升之於府政可知也薦之於朝時可知也冠章甫處同行望之君子哉乃小人也大凡小人之屬非高名厚祿貴胄之家而無之也負販之列行君子斯君子也軒冕之上行小人斯小人也率是小人在位為法必苛為政必僻肉食之外耗蠧齊人此為弊之深者四也吁皆遊惰無業殘於國害於農之大者自餘瑣瑣亦易驅除耳然無士不可以為治世無民不可以為國唯明王擇君子之人有輔相之才深治理之道與之為政先簡其事則闕省其吏則人易以安且今吏屬太廣實擾於時古者以十羊九牧不知所從今十羊百牧矣啖食之不足何從知事夫事簡吏省然後可以愛惜農人盡歸其時什一之外除其賦斂驅彼浮食遊手之衆使歸田穡即倉廩必實天下之民食斯足矣冠婚喪祭車馬第宅尊卑之制皆歸諸令式豪民富室不得衣文組金玉幃幕不得用繒綵茵褥不得施錦繡自宮中至於王公之家咸遵儉約無使枉費尺帛則天下之民衣斯足矣夫如是化之以道孰有不從或曰斯論也乃耳目之常夫儒者之言猶人之食若今日之食明日以為常欲不之致而不之食可乎況高祖太宗得天下之初從魏文公之言以王道為治不三年而化成立國之基斯為遠矣今復用其道莫若用賢良遠邪佞重農桑禁遊惰廢不急之務可以丕復祖宗之耿光堯舜豈遠乎哉何獨治為刑罰之用蓋將以革人之心勸之於善所以小罪輕刑以正其失大罪重罰以勵其衆將刑王者為之不舉以示仁恕之心也棄人必於市明其罪之死也皆欲遷人於善豈圖斷其肌膚殘其支體流其膏血盡其性命以逞於威怒者也三代之後五刑之用劓刖之屬最可以為恥於衆觀者則知其所犯毀其父母之遺體罔不憯痛於心犯者不能諱其罪亦可以永戒其惡所謂有恥且格及笞杖之法易隱其迹行鄉而無愧苟富貴而或得行者其暴犯者不以為恥誠哉免而無恥漢文帝感緹縈之一言廢肉刑用笞杖及後笞者多死文皇帝視明堂圖亦輕其罰天下之獄幾亂知刑罰者治之具也不可暫捨然罰無輕重杖無大小皆成之於胥吏之手斷之於出沒之文上之人其知乎夫鞫獄之法始於疑辨之中成於案牘之內吏與之者捨其罪而彰其是其不與者除其善而彰其惡又復刑律之中或一與一奪隨其取捨以為出入官必不盡知此為弊之一也畫灰為獄誓不願入刻木為吏誓不願對獄吏之尊聲色之大桎梏之重輕搒掠之多少率由其意孰可與爭此為弊之二也又或欲其偽而怒其真惡其輕而思其重或捽其首或批其頰詬辱毆擊無所不至又節其飲食嚴其徽纆外殘其軀內脅其心壯士勇夫且必流涕孤弱之人敢不從命此為弊之三也或上下其手以取其信或點染富室以求資賄則衆知其非不能即止此為弊之四也具獄既久改為疑讞遠取支證廣擒黨與淹延歲月以伺赦宥此為弊之五也捶拷之下易以強抑人之支體頑非木石若加其殘忍取其必然誠雖無罪百不能免蓋不勝其楚掠之毒寧甘心於一死狡猾之吏斷成其獄故戮死之後盜自他發衆方知其無辜且桎梏之苦笞捶之嚴輕罪者願重刑而獲出無辜者畏殘害而求死者狡猾之所能為也即平人孰敢與吏為敵公卿尊嚴察視不及臺寺懸遠訴訟無門死者不可再活親戚焉能申寃何以感致和氣平一水旱此為弊之六也復有衆皆知非難加以法當炎酷之時穢其傍而成其疾疫奪其餉而致其飢餓圜扉嚴邃守者羅列親戚之人胡能知其食與不食渴與不渴但成其困以取其斃此為弊之七也況外府法司又為不道或土囊以鎮其腹或濕紙以蒙其面拘録所至號呼莫聞瞑然而去孰知其由昔東海誤殺貞婦致三年之旱今天下之刑晝常雨血尚未足以泄其寃憤且刑罰者遠於人非近於人犯之者皆自求之也非刑之就於人也皆人就也上自天子下至庶人若為不道必歸於法故商辛夏桀懸首於白旗此天子之刑也則公卿之下獄黎庶之就戮又何足道哉是知上下皆有分故君子常懷畏懼夫厲聲變色揚眉張目樂刑罰以毒物之性命殆非人類信豺狼之心也故曾子曰如得其情則哀矜而勿喜又于定國每歲決獄先自流涕悲哉仁者之心深知刑獄之本所以衛人非以虐人也今天下之大九州之衆一歲決獄之多少皆由吏議豈能盡平莫若重明桎梏笞杖重輕之制禁計日月之遠近寒暑靜溫其所處饘粥每給其飢渴決罪遍求於刑律察詞必盡於疑辨庶幾少塞其弊當不濫於無辜以成王者之理仲尼之修春秋也先成其志後誅其意是以晉侯召王書曰天王狩於河陽本其尊奬其謀也許止不嘗藥書曰太子弒其君以為防微之道卿行稱字得所舉也師行稱人伐有辭也以一字稱褒貶之意為千載不刊之典亂臣賊子莫不知其善不可奪惡不可掩其懸之日月以為王化今國家公卿大臣文武將帥之初命也其為相者禹稷之化也蕭曹之上也燮理陰陽平和九州斯其人也及其被廢之日竊位之小人也亂國之小人也是不可忍也及復之日周公之被謗也召公之相疑也子文之三已也孫叔敖之三相也然後可以為賢人其為將者干城之材為國之屏也式遏寇虐底定王國斯其任也其被罪之日匹夫之勇也非國將之材也覆軍敗國棄戈奔北者矣殆不可用也復用之日荀林父再敗而勝孟明視三敗而後獲以何傷乎百執事之間率如是用捨觀其人或始於善終於惡中復可用後又不可用是非相渾善惡相離皆欲遵之王言以為之國乃姦謀之深蠹者也後有寒素者與奄人結刑社之盟以取鈞軸之任偶以章疏得罪上雖切齒朋援未移衆知必復其位時為執筆者乃大美其辭以謀其身必使朝廷怒而譴之一南行而已果皆中其旨未期年而舊相復入僅三歲而公亦入相台文非求宦者乃結宦者之深者又機巧之微密者也今之世若蘊曜嫉正之歸國奪其鹽鐵之柄乘休惡景望之文行同居鈞衡之列近師有尚父之號崔之猶子持謀臣之權采納而至中多議定出二相之口趨三鎮之師且曰興晉陽之甲誅君側之惡不逾月而二相被誅九廟以危外之人皆曰武臣之為亂也我知之矣此皆儒者之為亂也此意之深罪之明者仲尼皆所宜誅者究朝廷為亂之本始由君臣同心同德以誅宦官嫉之太甚須至於亂遂至所立必沖幼所命非賢良以階其亂以危社稷之人其知之乎不得以在位者為賢人負罪者為非材惜哉賢人之事業夫子之褒貶後之為史者當訪於長者之談求之於野人之説斯可以正之矣賞勸之典所以顯忠尊賢而待用闕感人之心使各盡其材以顯於時以為立身揚名之本故冠冕衣服車輅祭祀之儀皆以品秩為差君子之人其甘心焉孜孜於善希公朝之祿賞可以榮於家可以榮於宗廟祖考賞之義也大矣哉今國家懸高科虛重位此文士之賞也計首級視所傷此武士之賞也文不中理宗伯所棄殺傷奔北軍法所誅擇善勸人亦以明矣衰世之中文假他人之手身居書辭之列名陷澆浮之中坐登卿相之位射不穿札生不見敵榮持斧鉞之柄行居將帥之任皆藉纍世之基業或由勳伐之餘名竊位尸祿觀者憤歎而己至有文之衰也行為四海推重不成一名不沾寸祿老死凍餒之地或有獻一書陳一策探治亂之精微盡當時之利病君上不省察姦邪者深以為嫌縱未能顯加明誅倣徨焉擠之於散冗斥之於外任不復省問可勝言哉武之衰也弓聲劍氣立為勍敵馳突擊刺於橫陳之前出入如鬼神謀取必勝瘡痍遍於首面身委卒伍之中老棄瘦馬之列或有破一大敵擒一渠帥賞不踰外藩之職賜不越繒帛之微捷聲已振於萬里姓名未達於九重降符節益封土翻為統帥之福豈不悲哉文之求也既不因於行藝武之用也又不因於才力乃有溫溲溺之器以媚黃門者以繫鞋自名以從公相者履歷官常出入藩翰其餘資財以致名第以榮郡邑者不可遽數之況時君幼主有宴樂玉堂從禽豐草發自愈悅之意聽從左右之言淫樂之叟優倡之子錫以朱紫升於官秩下至飛禽犬馬之微物亦光於封賞且國家以五嶽四瀆為視公侯之秩乃崇其禮尊爵敬神之道也今厮養禽獸之屬皆列於官與士君子比肩於朝無神怨乎故志士仁人甘心草澤沒身白首不復思用力以在位者為深恥昔仲叔于奚救公孫文子之患請以繁纓假借也孔子猶曰不如多與之邑將以定永代之制杜萌漸之謂也漢明不以館陶子為郎寧賜之百萬曰夫郎出宰百里上應列宿不可虛授信夫為中興之嗣也且賞勸不恆服章紊亂君子在野小人在朝將難以守四海之業若善人在位紀綱大定賞罰必中百官稱職天下焉能為亂
