front:
  text: 全唐文欽定全唐文卷九百二惣丹陽人舉進士
  hash: sha256:591799ed48127c7e5822ce71cf57183e36654facd7e73d0f7b399ba42299f76b
  markers:
  - {type: head, offset: 12, content: 王惣, id: KR4h0168_NFKB_902-h1, level: 1}
body:
  text: 臣某言臣聞虞舜之朝九官皆讓西漢之盛二疏云去蓋上以淳風盪俗下以廉恥激節故也况寵辱之際不驚則愚進退之間不知則殆伏惟皇帝陛下德超邃古功格上元誕敷文教丕變頹靡天地日月載惟貞明動植翔泳罔不咸若臣某席以枝蔭階緣休運弱齡入仕四紀於茲三省微躬一何厚幸是以每莅一職每徙一官未嘗不心効權衡操懷竹柏雖齷齪廉謹曾無異績而毫釐過犯未汗簡書知臣在君匪敢矜述自陛下嗣臨寶位一十七年不以疲駑猥蒙獎拔授以疆土假以麾幢入居宗廟之司出典股肱之郡八座之貴臣拜者三六條之榮臣守其五四開戎幕一佐中軍至如宮相臺丞侍臣提印兼命稠謺累遷頻速光輝既極盈滿是憂間歲初領華州方宣聖澤俄以滑臺選帥非次及臣雙旌自天匹馬之鎮此州當四達之地控兩河之境兵唯勁逸人至凋殘臣遠仗皇威推誠撫眾服勤吏事盡瘁牧人遂得黎庶就耕織之時士伍知訓習之禮此皆大化光被臣敢貪天之功常恐三至奪慈孤立速謗此臣所以怵惕惟厲中夜以興願披血誠上達旒扆伏惟陛下少加憐察臣竊以酬恩徇節心實無涯引重致遠力誠有極臣先於嶺南染風毒脚氣今年春又患發鬢分將不起命即阽危幸沐亭育之恩免從帷葢之斃臣年逾知命齒髮已衰疾經沈痼方寸頓減久當繁劇必慮闕遺臣又聞制閫者以重鎮為雄仗鉞者以專征為務臣器幹不足以在任方畧不足以持權何以統節制之師貞定否臧之戎律臣且陳力就列訓誥攸存審才則然以病宜免巖廊多士宇宙無虞為官擇人皆出臣右胡可晏安冒寵尸素妨賢乞降賜骸之恩以全折足之咎臣獲退就散秩保養餘年候筋力之復彊申赴蹈而寧晚臣於當部勸課營田及以羨餘優䘏將士等事一一別具條奏冀明輯睦上副憂勤塵黷宸嚴冰炭交臆無任懇切屏營之至元貞官管城令諸侯力爭乃立冡土動眾興事受脤攸行同盟之君先尊霸主附庸之國亦屬大邦用鄫子於次睢皆嗤宋主將蹶由而釁鼓不利楚家此乃魯史明文殷鑒不遠靜思今者元君鄫生事有符於曩辰何不仁之太甚生鼻取血誰其忍之畜不將人獨將何若眷言其事實類傷殘告以為妖仍將未得况明君有道弓矢載櫜坐九重而納隍恐萬姓之失所有此殘酷其如律何志悌官宜壽尉三代命祀厥有禮文六官陳殷匪無名秩思不出職舉必在公神人之官各恭爾位俎豆之事實有司存伊彼宗人祭於菜地苟不失禮夫何間言殊季孫之見嗤旅於岱嶽異晉侯之有疾不祀羽泉今茲掌彼三辰不修其法紊我禋祀之道以猶鬼神之居祝詞爰論名物徒辨不以為禮神其享諸保章祠彼上元習茲左道不恕其咎何所逭逃德璉官司士參軍竊以敷土創於夏篇陳風著於孔什自斯已降頗復丹青好事相趨時聞汗簡是以張勃吳錄風俗靡遺揚雄蜀紀山川畢載陳畱耆舊之傳荊國歲時之書各擅一家咸詳土志既充渠閣亦散人間筆削所以騰芳記錄於焉不朽瞻高山而仰企紀景行而興慕僕幸因隨牒謬齒周行覽原隰之形訪古人之跡撰饒州記上下二篇至於林苑邱園立時為記青溪紫府創目亦書撰張仁之篇按徐湛之說水陸體勢習俗風謠目擊在斯言誠可錄然此地居澹浦邑帶番川轉轂閩禺朝宗江蠡玉山銀嶺連峭壁而削成大北小南漾碧漪而汎色競盤螭而互峙赴馬頰以飛湍縣始秦年郡開吳日修良闡於帝籍秀茂顯於天庭吳芮懷忠裂芳封而疏爵李愔論道應台宿以經邦賢俊挺生駌鴻間出復有證君書佐沈宗而泝千里忘家壯士盡節而衞三宮純粹曉於占天察豐城之寶氣妙技精於數術審盧穴之妖氛陳氏守節之妻化石巖而表異張家已亡之婦遭劫剝以通靈求祀神人稱陳涉而感夢乘煙童子契王喬而下迎長沙昔居祈潤泉而必應蜀守故宅尋往迹而猶存背主逆臣茲鄉儼其墟墓遁秦逋客絕壁竦其孤墳錢倉卓立於水濱羅石列行於林畔奇峯仙室鏤羽駕之遺書元洞瓊膏溢靈津於乳竇相思文梓之木吐霧凝煙丹青松桂之叢連雲罩日磊磊銀鑠委實稅以為琛顆顆金沙實瑤筐而入獻重以銅鉛間發青碧相輝哀鳥晨吟驚林聲於木末饑鼯夜嘯和風籟於山巔慈龜曳塗哀猿飲澗頳鯉戲沼綵雉馴郊白浪驚鷗聲如鐘鼓騰仙靈鶴響叶笙簧花間錦繡駢羅在目圖牒紀載不厭其詳洪纖竝舉而年代遷貿宰守更利而時事暌違或革或沿乍張乍弛遇於惠化餘頌在人聊復片言請從商較惟遠祖之明牧彌洙泗之高風成庠序之儀習鄉射之禮而枯樟再茂遺愛可觀瓜瓞寂寥堦基蕪滅末孫懷昔惟古興嗟宋齊已還分符繼軌程柳之輩元徐之徒坐嘯臥吟褰帷代襲或栽梧蒔竹或結廈穿池竝記傍求盡皆編次人亡地在念彼愴茲爰暨聖朝惟良簡帝前中書令杜使君中書令薛使君屈棟幹之資臨江湖之服既多惠愛金石已銘古老傳談豈煩載述其在此時畧復書之庶後披文翫其典麗也刺史南安縣開國男龎使君爰自參牧改臨此地曾未朞月惠化已覃黠吏畏威豪民斂跡偷生盜賊之伍旬月必擒經明行修之徒長材咸薦是以味道遷善俗咏其蘇沐德思齊時嗟來晚崇庸茂績遠襲箕裘趙璧琬圭曾微闕折仁惠風化善繼良難其營縣廢興各依界分府寺迴換皆悉備其山水川源蓋從事典序無遺漏也庶其觀者不出戶而備覽土地風俗焉魯登進士第今之君侯垂金印結紫綬處內則堂高數仞侍婢娟然衣羅紈鳴珥環出聲態者累百居外則㦸列重扉介夫毅然執弩矢擁鈇鉞俟指令者數千君侯目視飛鴻氣如橫蜺而貢士布衣有塵饑僮無色蹇驢竭蹷而來干謁誠志業不怍氣容自若且以干望為心亦不能無愧其望非望飲醲齧肥被鮮曳華指捷乘駿也所以望者蓋砥行立名之流非附青雲之士焉得施於世其愧非愧布衣糲食饑僮蹇驢也所以愧者彼何人也予何人也夫賈居闤廛藏其貨物俟有求者雖巨人必恭然而請賈人言其直則高之曰必若干乃得求者率不能小減而市矣及其人持物貨歷戶而自唱曰某好物某好貨其將市雖小兒童則艴然視之問其直幾何其唱者且平其值必愈卑之十七八戲耳誠金玉其物貨祇以盜有而竊置為宜然何以至是彼不求此望售也士之干人亦然士非不能隱山林㣥麋鹿脫俗姿態又思孔子十歷削逐如此而不足以求行道學孔子者又安得傲然自遂而獨善耶亦非得已富貴之人能趨求貧賤之人人必不謂假聲勢也又不謂諂佞也又不謂利也貧賤之人趨求富貴之人而大謂之假聲勢也中謂之諂佞也下謂之利也且見自書傳稱說當時英豪智能者或云禮士或云愛客或云薦寵後輩及言窮約節義者則不過不諂於富貴不慼於貧賤而已今之君侯不惟其不禮士不愛客不薦寵後輩蓋無意趨求貧賤之人貧賤之人趨求之往往得罪過不一二而已惟閣下有古英豪之氣必能招求窮困者大道之行則澤布四海矣不則雲卷一邱閣下識某之心非有覬於閣下而云云其說閣下且視之為何如其禮豈不然耶他俟盡於棨㦸之前某再拜昭明官益都令溫敏果行育德依仁游藝道鬱黃中聲芬白賁才充夢鳥針左氏之膏肓學綜成麟傳聖人之糟粕既而生也有涯嵗聿其逝情殷埋玉迹必應金類宣父之云亡還思有若同蔡邕之已歿更重虎賁雖其人已還而典刑可想或欽遺韻用展師資惟彰好道之誠何寘無儀之論縣令奉子男之秩守韋弦之戒非欲使提耳流訓掣肘無譏錯節盤根抑亦殊道移風易俗何妨異代縱有科罰未累德音無玷憲章竝宜告記彥矩廣平人府君其先河南郡人也曾祖祐任主客郎中祖澤同州韓城令厥考弁歷左金吾引駕仗押衙銀青光祿大夫檢校太子賓客俱積德行夤緣車服府君諱逵字正道少倜儻有氣不謹小節雖家藏巨萬視之蔑然輕玉帛若糞土重然諾不顧千金議者曰斯亦豪傑人耳初職繫懷州軍事押衙後改授山南東道節度散兵馬使加銀青光祿大夫檢校太子賓客兼監察御史由山南授東都畱守押衙其階與檢校賓客監察仍舊勳加柱國以府君之用心磊落蔚有才智觀其闕一字必可捍難闕一字敵揣其義必可赴湯蹈火則其位殆不稱闕四字然闕三字度有規將搆第渚宮豈止於榱桷宏壯甍棟膠闕六字岳卑溼結峻宇以疎氣鑿巨沼以瀦流竹樹森羅闕五字郡內將絕罔有鄰比世居馮翊慈親在焉闕六字遙不克迎養同氣八人更迭定省悉著行闕三字十四闕三字公事閞連計司輓運之勞咸稱幹蠱每休闕三字家屬闕三字間友愛睦如也里巷益多府君之闕二字以仰止闕四字未嘗不應人由是歸嗟乎未及下壽以其年五月六日闕三字卒於江陵府無競里私第享年卅有九娶河南闕四字男一人春郎六嵗嵗女相相六嵗嵗用當年十一月闕四字叶歸葬同州澄城縣武安鄉永平營親弟遜闕五字特以哀命見請銘於貞石文曰彼蒼者天禍福茫然欲問其緣杳漠無言俄闕三字曰有後先積善何為報應元元孰云有後闕五字期慶延在於他年暄官華陽令威儀有差賓聘所貴舉必執禮是為成人能曲直之不違則進退而皆中惟丁克荷前烈絕復舊典修上下之紀制財用之節不失天地之經尚陳文采之數此實大者夫何間焉同游吉得禮之初因於國產類趙簡習儀之際效彼魯侯奉以周旋誰敢失墮每事皆問無廢孔門之則一言之請將成晉國之風諒詞者之有據誠或人之妄責有禮則安不學將落方期化俗必在崇儒仰彼廬江抑惟循吏等文翁之從政遺德未忘類邵父之為邦餘芳尚在是故循其禮物隨此計偕豈燕昭之築臺自尊㣥士何楚元之設醴獨致書生將使洙泗之風永聞函丈舞雩之禮重見摳衣敢升夫子之堂是樂先王之道巡使揚君之化按俗而行疑爾所為因之問政足可嘉其稟命賞此承式誠勸人之有以非為已而何傷侯以明之射有觀者設中算以章物立其賓以相儀乙鄉黨稱賢進退有度將拜至而拜洗且三讓而三揖是欲體和容之節知曲藝之美匪惟訓人抑又觀德豈可空瞻棲鵠未盡主皮尚陳旅酬必候興答將疑飲數故異禮容既不爽於威儀亦何勤於徧拜謂之有闕宜乎未甘國著進賢之賞人思類能之用欽崇慰薦敦固引繩野無遺才邦有大任甲方伸己志將舉所知毛玠當仁克尊徐邈孔融明敏無棄禰衡見機乃通達之人失道為草介之士隨乎去就順以行藏不會適來之時將疑過後之行寧問管鮑之厚孰存莊惠之深其餘有司未曰知我居然請斥何哉失辭敬承畿縣素匪萊田是中邦之廬伍為上農之井賦日者旄頭失象狂寇亂華王師未赫國人猶恐是以苟安便地多出近關惜三逕之就荒歎五溝之不樹人迷可復土利宜敦等充國之大開時欣嵗足類信臣之廣闢每詠年豐今乃黎庶重遷歸還樂土服先疇之疆畝守故里之松榆將持襏襫願事藨蓘誠宜饁彼南畝勞乎東郊國本必於務農人安固在循業永言縣執何謝屯司庶官司局共為藏事各守爾典無廢厥職苟政令之或乖將會計而焉取甲理從邦教位列遂師甸稍縣都宜分地域封疆畎畝不奪人時而乃闕四井之菑畬廢五溝之種蓺女桑不樹見戴勝之徒飛夫田無征望竊脂而何啄既莫喜於田畯又非成於穡人尚阻農功孰供兵器焉見不勞而逸無業而居雖有愛人之詞難恕失官之罪徵書錄解題作之徵河南人乾象既分蒼牙應運三才闡位八卦昭彰故能道濟不通人用無極自茲已降視述多家田何傳於丁寬京房得之焦贛遂使異聞競起踳駮紛多深乖述作之由全誤聖人之見若使廣求文句博引證驗浮誕日興華偽滋蔓誠謂周鼠終虧於鄭璞魚目以混於隋珠今則但舉宏機纂其樞要先以王注為宗後約孔疏為理至於卦繇六位竝備而釋之彖以詳畧闕而不敘大抵舉其六卷分為上下兩經直以口訣為名義決要為旨或經象未顯輒提緯以證文傳疏未明將考名以消義遂使疑袪理悟還希述作之功學寡難周恥騰波於瀚海云爾南容見藝文志五子策林十卷南容居首問卦分江使圖演天文文籍於是濫觴書契以之抽緒皇墳帝典述紀言以聯鑣五傳六經紵禮樂而齊騖斯竝懸諸日月煥乎文章至於諸子相騰小說奔競有慙屑玉之化無異雜鉛之寶請用諸火恐招傅弈之譏將扇其風復爽芟夷之義上塗交戰一為解環百兩之篇孰關其善七分之術孰著其能誰求天下之書誰決塚中之籙識二簡者何子觀四轍者何人京兆耆舊之篇起於何代陳畱神仙之傳創自何人誰先孝子之圖誰首逸人之記倘無談於雕棘將有薦於拔茅對夫皇王範物經籍訓人澆浮之說漸列文質之規斯變故九流異軫百代齊鑣枝分葉布千門萬戶雖復言有踳駮理或叢殘時招屑玉之譏乍起雜鉛之議妨工惑善招惡塞違比夫㣥岳參差各有蔽虧之勢眾川浩蕩俱資潤澤之功且夫三代之道未能無弊六經之教尚皆有失其於子史何獨尢之若以失而便廢則書禮之法可舍短而從長去泰而除惡咸用於火竊未為得各言其志亦何傷乎乃好尚不同撰述各異竝流鉛槧咸著蓬山京房惟善於七分張霸心明於百兩荀勗決塚中之籙陳農求天下之書識二簡者廣微觀四轍者周穆京兆耆舊光武創其篇陳畱神仙阮蒼述其事梁雄作逸人之傳劉向修孝子之圖斯竝賢者傳之不朽謹對蟠白水人鄉貢進士法師名子成字彥美號妙明京兆霸陵人也少時為儒壯而從釋其性愛書史喜翰墨樂遊學好著述每與賢士大夫詩詞唱和一聯一句落在藂席人多傳之如鸚鵡詩云學得人言字字明便能巧語為通情不知身在樊籠裏猶向堂前弄舌輕晝寢云夢魂不管書擎手一帙南華墮枕邊閒遊云家家明月誰無分處處青山我有緣水心亭云綠芰青荷香滿池環亭冷浸碧琉璃高軒矮榻無纖暑臥看清波浴鷺鷥其長篇短偈例皆如此尢能洞明本宗佛法予昔嘗與縣大夫張昂請註心經五日而成萬二千言辭理精當至為不多得又嘗綴述本色法事文集僅二百首語句雄麗旨意渾成同袍得之囊蓄不出抑為艱得無意多傳頃以兵火之亂匿跡山林嘗與來客問難詰折事盡終始遂錄成軸名曰析疑論首之以序問終之以會名凡二十篇言簡而理當文約而義豐涵泳六經畧備諸子每一篇之中其引類證斷決析疑理甚明白若非具三昧辯才其孰能致於此乎且予與妙明為不請友其有年矣大凡著作不我之慳故於敘引母俟召而云時辛卯中秋八日書泚河東人上德願而鑄洪鐘仙聖依而人天從霜朝聞兮窈窕月夜聽而舂容蓮花生而腰淨頂銜繞於盤龍響上徹於天外聲下徹於九重庶長空於鬼獄魔屏跡而潛蹤季連河東汾陰人官工部侍郎天官分政載師任土必均三壤以務九農乙則匪人其何妄作將有樹於田畝誠害稼而傷農稽諸古經則有之矣考以令制誰曰其然里人有孚可以受服乙也非古宜乎褫帶芬櫟陽人官大理評事物有正而可尚者其繩則直如砥之平如竿之植不舒卷以隨用終勁挺而立極有旨哉為天下式且取其直也故能為道之逆旅為義之蘧廬為人之端操為政之權輿於以方內君子所如木從之則正君受之則聖猗歟猗歟原夫被物之際作巧之時運工人之手績寒女之絲是尋是尺經之綸之其為用也不資於善結其為興也蓋取於無私以之為準也則矯枉有度以之辨物也乃去邪勿疑大者遠者念茲在茲俾夫貪者慄慄智者兢兢其為舉直錯枉當有事於從繩京官蘇州司戶參軍我唐御注孝經刪定月令蓋為前儒用意未及精研後漢太學刊石撰集說文慮其日月浸深轉寫訛謬京也歷代傳授五經為業其於易道討覈偏深曾得王輔嗣韓康伯手寫註定傳授真本讀誦比校今世流行本及國學鄉貢學人等本或將經入注用注作經小象中間以下句反居其上爻辭注內移後義却處於前又兼有脫漏兩字顛倒謬誤增省義理不通今竝依定本舉正其謬仍於謬誤之處以朱書異之希好事君子志學通儒詳而觀之則經註通流雅鄭不紊都計一部中差謬處總一百三節列為一部具述訛舛因目為周易舉正分為上中下三卷傳諸志學者云
