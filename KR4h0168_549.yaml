front:
  text: 全唐文欽定全唐文卷五百四十九韓愈三
  hash: sha256:226483e91d9aa026eeb4149fee4247f54bb5ce04928d6eff6c79ce891fe3e102
body:
  text: 愈言上天降禍大行皇帝奄棄萬國伏惟攀慕永痛哀感難勝某承詔不任號絶限以官守拜慰末由伏增惶戀謹差某奉疏不宣韓愈再拜右其人為文甚古立志甚堅行止取捨有士君子之操家貧親老無援於朝在舉場十餘年竟無知遇愈常慕其才而恨其屈與之還往歲月已多常欲薦之於主司言之於上位名卑官賤其路無由觀其所為文未嘗不掩卷長歎去年愈從調選本欲攜持同行適遇其人自有家事迍邅坎軻又廢一年及春末自京還怪其久絶消息五月初至此自言為閣下所知辭氣激揚面有矜色曰侯喜死不恨矣喜辭親入關羈旅道路見王公數百未嘗有如盧公之知我也比者分將委棄泥塗老死草野今胸中之氣勃勃然復有仕進之路矣愈感其言賀之以酒謂之曰盧公天下之賢刺史也未聞有所推引蓋難其人而重其事今子鬱為選首其言死不恨固宜也古所謂知己者正如此耳身在貧賤為天下所不知獨見遇於大賢乃可貴耳若自有名聲又託形勢此乃市道之事又何足貴乎子之遇知於盧公真所謂知已者也士之修身立節而竟不遇知己前古以來不可勝數或日接膝而不相知或異世而相慕以其遭逢之難故曰士為知已者死不其然乎不其然乎閣下既已知侯生而愈復以侯生言於閣下者非為侯生謀也感知已之難遇大閣下之德而憐侯生之心故因其行而獻於左右焉謹狀右臣伏見今月十日敕今年諸色舉選宜權停者道路相傳皆云以歲之旱陛下憐憫京師之人慮其乏食故權停舉選以絶其來者所以省費而足食也臣伏思之竊以為十口之家益之以一二人於食未有所費今京師之人不啻百萬都計舉者不過五七千人并其僮僕畜馬不當京師百分之一以十口之家計之誠未為有所損益又今年雖旱去歲大豐商賈之家必有儲蓄舉選者皆齎持資用以有易無未見其斃今若暫停舉選或恐所害實深一則遠近驚惶一則人士失業臣聞古之求雨之詞曰人失職歟然則人之失職足以致旱今緣旱而停舉選是使人失職而召災也臣又聞君者陽也臣者陰也獨陽為旱獨陰為水今者陛下聖明在上雖堯舜無以加之而㣥臣之賢不及於古又不能盡心於國與陛下同心助陛下為理有君無臣是以久旱以臣之愚以為宜求純信之士骨鯁之臣憂國如家忘身奉上者超其爵位置在左右如殷高宗之用傅說周文王之舉太公齊桓公之拔寧戚漢武帝之取公孫宏清閒之餘時賜召問必能輔宣王化銷殄旱災臣雖非朝官月受俸錢歲受祿粟苟有所知不敢不言謹詣光順門奉狀以聞伏聽聖旨右臣伏以今年以來京畿諸縣夏逢亢旱秋又早霜田種所收十不存一陛下恩逾慈母仁過春陽租賦之閒例皆蠲免所徵至少所放至多上恩雖宏下困猶甚至聞有棄子逐妻以求口食坼屋伐樹以納稅錢寒餒道塗斃踣溝壑有者皆已輸納無者徒被追徵臣愚以為此皆㣥臣之所未言陛下之所未知者也臣竊見陛下憐念黎元同於赤子至或犯法當戮猶且寬而宥之况此無辜之人豈有知而不救又京師者四方之腹心國家之根本其百姓實宜倍加憂恤今瑞雪頻降來年必豐急之則得少而人傷緩之則事存而利遠伏乞特敕京兆府應今年稅錢及草粟等在百姓腹內徵未得者並且停徵容至來年蠶麥庶得少有存立臣至陋至愚無所知識受恩思效有見輒言無任懇款慙懼之至謹録奏聞謹奏右國家典章崇重庠序近日趨競未復本源至使公卿子孫恥遊太學工商凡冗或處上庠今聖道大明儒風復振恐須革正以贊鴻猷今請國子館並依六典其太學館量許取常參官八品已上子弟充其四門館亦量許取無資蔭有才業人充如有資蔭不補學生應舉者請禮部不在收試限其新補人有冒蔭者請牒送法司科罪緣今年舉期已近伏請去上都五百里內特許非時收補其五百里外且任鄉貢至來年春一時收補其廚糧度支先給二百七十四人今請準新補人數量加支給謹具如前伏聽處分右伏奉今月五日敕復讎據禮經則義不同天徵法令則殺人者死禮法二事皆王教之大端有此異同必資論辨宜令都省集議聞奏者朝議郎行尚書職方員外郎上騎都尉韓愈議曰伏以子復父讎見於春秋見於禮記又見周官又見諸子史不可勝數未有非而罪之者也最宜詳於律而律無其條非闕文也蓋以為不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寧其義於經而深沒其文於律者其意將使法吏一斷於法而經術之士得引經而議也周官曰凡殺人而義者令勿讎讎之則死義宜也明殺人而不得其宜者子得復讎也此百姓之相讎者也公羊傳曰父不受誅子復讎可也不受誅者罪不當誅也誅者上施於下之辭非百姓之相殺者也又周官曰凡報仇讎者書於士殺之無罪言將復讎必先言於官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自專訪議㣥下臣愚以為復讎之名雖同而其事各異或百姓相讎如周官所稱可議於今者或為官所誅如公羊所稱不可行於今者又周官所稱將復讎先告於士則無罪者若孤稚羸弱抱微志而伺敵人之便恐不能自言於官未可以為斷於今也然則殺之與赦不可一例宜定其制曰凡有復父讎者事發具其事申尚書省尚書省集議奏聞酌其宜而處之則經律無失其指矣謹議右臣伏準御史臺牒準中書門下帖奉進止錢重物輕為斃頗甚詳求適變可以便人所貴緡貨通行里閭寬息宜令百寮隨所見作利害狀者臣愚以為錢重物輕救之之法有四一曰在物土貢夫五穀布帛農人之所能出也工人之所能為也人不能鑄錢而使之賣布帛穀米以輸錢於官是以物愈賤而錢愈貴也今使出布之鄉租賦悉以布出帛丿糸絲百貨之鄉租賦悉以帛丿糸絲百貨去京百里悉出草三百里以粟五百里之內及河渭可漕入願以草粟租賦悉以聽之則人益農錢益輕穀米布帛益重二曰在塞其隙無使之泄禁人無得以銅為器皿禁鑄銅為浮屠佛像鐘磬者蓄銅過若干斤者鑄錢以為他物者皆罪死不赦禁錢不得出五嶺買賣一以銀盜以錢出嶺及違令以買賣者皆坐死五嶺舊錢聽人載出如此則錢必輕矣三曰更其文貴之使一當五而新舊兼用之凡鑄錢千其費亦千今鑄一而得五是費錢千而得錢五千可立多也四曰扶其病使法必立凡法始立必有病今使人各輸其土物以為租賦則州縣無見錢州縣無見錢而穀米布帛未重則用不足而官吏之祿俸月減其舊三之一各置鑄錢使新錢一當五者以給之輕重平乃止四法用錢必輕穀米布帛必重百姓必均矣謹録奏聞伏聽敕旨謹奏右今日某宣進止示臣前件白龜者伏以正祥之見必有從來物象既呈可以推究古者謂龜為蔡蔡者龜也今始入賊地而獲龜者是獲蔡也白者西方之色刑戮之象也是必擒其帥而得其地也提挈而來生致闕下此象既見其應不遙斯皆陛下聖德所施靈物來效太平之運其在於今臣等謬列台衡親覩嘉瑞無任抃躍之至右伏準貞元五年六月十一日敕停使郎官御史在城者委常參官每年冬季聞薦者前件官兼通三傳傍習諸經注疏之外自有所得久從使幕亮直著名朴厚端方少見倫比以臣所見堪任御史太常博士臣所諳知不敢不舉謹録奏聞伏聽敕旨右京兆尹李翛是王用親表傳用男沼等意請臣與亡父用撰前件碑文者伏以王用國之元舅位望頗崇豈臣短才所能裦飾不敢辭讓輒以撰訖其碑文謹録本隨狀封進伏聽進止其王用男所與臣馬一匹并鞍銜白玉腰帶一條臣並未敢受領謹奏右今日品官唐國珍到臣宅奉宣進止緣臣與王用撰神道碑文令臣領受用男沼所與臣馬一匹并鞍銜及白玉腰帶一條者臣才識淺薄詞藝荒蕪所撰碑文不能備盡事跡聖恩宏獎特令中使宣諭並令臣受領人事物等承命震悚再欣再躍無任榮忭之至謹附狀陳謝以聞謹狀外郎兼殿中侍御史賜緋魚袋樊宗師右件官孝友忠信稱於宗族朋友可以厚風俗勤於藝學多所通解議論平正有經據可以備顧問謹潔和敏持身甚苦遇物仁恕有材有識可任以事今左右史並闕員外郎侍御史亦未備員若蒙擢授必有補益忝在班列知賢不敢不論謹録狀上伏聽處分右臣伏準建中元年正月五日敕常參官授上後三日內舉一人以自代者前件官器質端方性懷恬淡外和內敏潔靜精微可以專刑憲之司參輕重之議况時名年輩俱在臣前擢以代臣必允衆望伏乞天恩遂臣誠請謹録奏聞謹奏右臣先奉恩敕撰平淮西碑文伏緣聖恩以碑本賜韓宏等今韓宏寄絹五百匹與臣充人事未敢受領謹録奏聞伏聽進止謹奏臣某言今日品官第五文嵩至臣宅奉宣聖旨令臣受領韓宏等所寄撰碑人事絹者恩隨事至榮與幸并慚抃怵惕罔知所喻中謝伏以上贊聖功臣子之職下霑㣥帥文字所宜陛下謙光自居勸勵為事各賜立功節將碑文一通使知朝廷備録勞效韓宏榮於寵賜遂寄縑帛與臣於臣何為坐受厚貺恩由上致利則臣歸慚戴兢惶舉措無地無任感恩慚懇之至右伏準建中元年正月五日制常參官上後三日舉一人自代者前件官文學治行衆所推與纍歷中外資序已深和而不同靜而有守敦厚退讓可以訓人臣所不如輒舉自代謹録奏聞右伏準建中元年正月五日制常參官及刺史授上訖三日內舉一人自代者前件官詞學優長才器端實早登科第亦更臺省往因過犯貶黜至今十五餘年自領漳州悉心為治官吏懲懼不敢為非百姓安寧並得其所臣在潮州之日與其州界相接臣之政事遠所不如乞以代臣庶為允當謹録奏聞右件官學有師法文多古風沈默靜退介然自守聲華行實光映儒林臣當司見闕國子監博士一員生徒藉其訓導伏乞天恩特授此官以彰聖朝崇儒尚德之道謹録奏聞伏聽敕旨右伏準建中元年正月五日制常參官上後三日舉一人自代者前件官學識該達器量宏深朝推直道代仰清節顯映班序十五年餘夷險一致風猷益茂屈居少列未副㣥情文昌政本侍郎官重尚德之舉顗宜當之乞回臣所授庶弭官謗謹録奏聞謹奏右臣與孔戣同在南省為官數得相見戣為人守節清苦議論平正今年才七十筋力耳目未覺衰老憂國忘家用意深遠所謂朝之耆德老成人者臣知戣上疏求致仕故往看戣戣為臣言已蒙聖主允許伏以陛下優賢尚齒見戣頻上三疏言詞懇到重違其意遂即許之此誠陛下仁德之至然如戣輩在朝不過三數人實可為國愛惜自古以來及聖朝故事年雖八九十但視聽心慮苟未昏錯尚可顧問委以事者雖求退罷無不殷勤留止優以祿秩不聽其去以明人君貪賢敬老之道也禮大夫七十而致事若不得謝則必賜之几杖安車七十求退人臣之常禮若有德及氣力尚壯則君優而留之不必年過七十盡許致事也詩曰雖無老成人尚有典刑此言老成人重於典刑不可不惜而留也今戣幸無疾疹但以年當致事據禮求退陛下若不聽許亦無傷於義而有貪賢之美况左丞職事亦極清若戣尚以繁要為詞自可別授秩崇而務少者今中外之臣有年過於戣尚未得退戣獨何人得遂其願然人皆求進戣獨求退尤可賢重臣所領官無事不敢請對蒙陛下厚恩苟有所見不敢不言伏望聖恩特垂察納右伏準建中元年正月五日制常參官上後三日舉一人自代者伏以近者京尹用人稍輕所以市井之閒盜賊未斷郊野之外疲瘵尚多前件官文武兼資寬猛得所屢更方鎮皆有功能若以代臣實為至當謹録奏聞謹奏右司天臺奏今日辰卯閒太陽合虧陛下敬畏天命克己修身誠發於中災銷於上自卯及巳當虧不虧雖隔陰雲轉更明朗比於常日不覺有殊天且不違慶孰為大臣官忝京尹親覩殊祥欣感之誠實倍常品謹奉狀賀以聞右臣蒙恩除尚書兵部侍郎伏準建中元年正月五日制常參官上後三日舉一人自代者前件官稟正直之性懷剛毅之姿嫉惡如仇讎見善若饑渴備更內外灼有名聲年齒雖高氣力逾勵甘貧苦節不愧神明可謂古之老成朝之碩德久處散地實非所宜乞以代臣以副公望右自今月二日後每奉公牒牒尾故牒字皆為謹牒字有異於常初不敢陳論以為錯誤今既頻奉文牒前後並同在愈不勝戰懼之至伏乞仁恩特令改就常式以安下情右臣伏以臣去年貶嶺外刺史其州雖與黃家賊不相鄰接然見往來過客并諳知嶺外事人所說至精至熟其賊並是夷獠亦無城郭可居依山傍險自稱洞主衣服言語都不似人尋常亦各營生急則屯聚相保比緣雍管經略使多不得人德既不能綏懷威又不能臨制侵欺虜縛以致怨恨蠻夷之性易動難安遂致攻劫州縣侵暴平人或復私仇或貪小利或聚或散終亦不能為事近者征討本起於裴行立陽旻此兩人者本無遠慮深謀意在邀功求賞亦緣見賊未屯聚之時將謂單弱立可摧破爭獻謀計惟恐後時朝廷信之遂允其請自用兵以來已經二年前後所奏殺獲計不下一二萬人儻皆非虛賊已尋盡至今賊猶依舊足明欺罔朝廷雍容兩管因此雕斃殺傷疾患十室九空百姓怨嗟如出一口陽旻行立相繼身亡實由自邀功賞造作兵端人神共嫉以致殃咎陽旻行立事既已往今所用嚴公素者亦非撫御之才不能別立規模依前還請攻討如此不已臣恐嶺南一道未有寧息之時一昨者併雍容兩管為一道深合事宜然雍州與賊逼近容州則甚懸隔其經略使若置在雍州與賊隔江對岸兵鎮所處物力必全一則不敢輕有侵犯一則易為逐便控制今置在容州則雍州兵馬必少賊見勢弱易生奸心伏請移經略使於雍州其容州但置刺史實為至便一比者所發諸道南討兵馬例皆不諳山川不伏水土遠鄉羈旅疾疫殺傷臣自南來見說江西所發共四百人曾未一年其所存者數不滿百嶽鄂所發都三百人其所存者四分才一續添續死每發倍難若令於雍容側近召募添置千人便割諸道見供行營人數糧賜均融充給所費既不增加而兵士又皆便習長有守備不同客軍守則有威攻則有利一自南討已來賊徒亦甚傷損察其情理厭苦必深大抵嶺南人稀地廣賊之所處又更荒僻假如盡殺其人盡得其地在於國計不為有益容貸羈縻比之禽獸來則捍禦去則不追亦未虧損朝廷事勢以臣之愚若因改元大慶赦其罪戾遣一郎官御史親往宣諭必望風降伏歡呼聽命仍為擇選有材用威信諳嶺南事者為經略使處理得宜自然永無侵叛之事右準律不許典貼良人男女作奴婢驅使臣往任袁州刺史日檢責州界內得七百三十一人並是良人男女準律計傭折直一時放免原其本末或因水旱不熟或因公私債負遂相典貼漸以成風名目雖殊奴婢不別鞭笞役使至死乃休既乖律文實虧政理袁州至小尚有七百餘人天下諸州其數固當不少今因大慶伏乞令有司重舉舊章一皆放免仍勒長吏嚴加檢責如有隱漏必重科懲則四海蒼生孰不感荷聖德以前件如前謹具奏聞伏聽敕旨
