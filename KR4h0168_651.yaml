front:
  text: 全唐文欽定全唐文卷六百五十一元稹五
  hash: sha256:9c7476d5914e893dc67bec0b97e2ce9f4e83d2a99b12547c6737e9c514e5d676
body:
  text: 今月二十一日車駕欲幸溫湯右臣等伏以駕幸溫湯始自元宗皇帝乘開元致理之後當天寶盈羡之秋葺殿宇於驪山置官曹於昭應警蹕於繚垣之內周行於馳道之中萬乘齊驅有司盡去無妨朝會不廢戒嚴而猶物議喧囂財力耗悴數年之外天下蕭然纍聖巳來深懲覆轍驪宮圮毀永絶修營官曹盡復於田萊殿宇半堙於巖谷深林有逸才之獸環山無匡衛之廬陛下若騎從輕馳則道途無拱辰之備若乘輿稍具則邑縣有駕肩之憂若帳殿宿張則原野非徼巡之所若鑾車夕入則門禁失啓閉之時六軍守衛於空宮百吏宴安於私室忝為臣子誰不惕然况陛下新御寶圖將行大典郊天之儀方設謁陵之禮未遑遽有溫泉之行恐失人神之望臣等謬居榮近冒死上言伏乞特罷宸遊曲回天眷稍待升平之後別卜遊幸之期則云亭之禪可登崆洞之駕非遠豈必驅馳一往竦駭㣥情勝境未周聖躬徒倦臣等無任懇迫忘軀之至謹詣東上閣門奏狀以聞伏候敕旨右奉宣某日日上有橫赤氣五色鮮明黃潤日兩邊各有嘉氣內赤外青宰臣稱賀云是五色雲見不知是否者謹按乙巳占有赤氣橫在日上謂之戴其分當有益土進爵推戴人君之象又人君當立王侯封建親戚以為福佑之徵竊見其日除王潛郭釗田布等官則陛下凡有舉措盡合天心微臣所引占書悉皆期驗伏請以戴氣宣付史官不可誤書五色雲見又云青赤短小在日旁謂之珥微曲向日謂之抱珥者纓珥之象天子有喜兼有和親之事又當拜將抱者扶抱向就之象鄰國臣佐來降天子有喜賀之事子孫之慶臣下忠誠輔主國中歡喜和合今非狄和親西戎通好時者承元請命其日三將同升萬姓歡呼四方來賀亦可謂陛下凡有舉措盡合天心微臣所引占書悉皆明驗伏乞亦以抱珥宣付史官不可誤書五色雲見以前件圖籍作載如右伏以五色慶雲蓋是小瑞戴氣抱珥所謂殊祥宰臣忽遽之間未暇精究其事此皆陛下禮行郊廟誠達神祗展百拜而忘疲入九室而流涕近臣興感上帝垂休克呈捧日之祥以展動天之德微臣同霑侍從別感恩慈方當鼓舞之時恨不呌呼而賀然臣以為陛下特宣手敕宰臣云今月二日卿等所言日旁五色雲見參驗圖書蓋是戴珥之象此皆祖宗積慶特示子孫之祥豈沖昧微誠能致昊穹之貺宜令有司擇日告廟上以奉高祖無窮之祐次以報憲宗有截之功誕告華夷並令知悉若此則陛下感通之德巳見九霄推讓之風將光萬葉爛然宸翰手敕以示於宰臣煥乎天文撰詔自生於聖旨事超萬古道冠百王伏惟天恩密賜裁察右臣伏準今月二十四日敕令臣撰前件碑文者伏以田宏正首變魏俗彰先帝之睿謀近入鎮州宣陛下之神武積成忠懇大有勳勞人懷去思願刻金石陛下所宜外詔台席內委翰林妙選雄文式揚丕績豈謂天光曲照御札特書猥付微臣實非常例臣頃以特恩手叐擢便欲效死仰酬遂竭愚誠纍蒙召對自去年九月已後橫遭謗毀無由再覩天顏分隨枯朽而凋永絶恩波之望豈料聖慈長在記憶姓名無人奏請撰碑便自宸衷宣付微臣忝非木石粗有肺腸空懷感涕之心未獲殺身之所無任感恩思報鏤骨銘肌之至右泰倫重晏至奉宣恩旨授臣前件官告身衣服匹帛及借馬者忽降天書乍乘雲驥頒衣煥目賁帛盈庭皆非朽陋之才宜受光揚之賜微臣無任抃躍慙惶之至况臣素守疏愚且無朋黨去年陛下擢自郎吏命掌書詞非因宰相奏論特是聖慈超授感恩深切頻獻封章遂遭分外侵誣不敢保全軀命豈謂恩光轉至睿澤逾深出自宸衷選居近地便令入院當日召見天顏口敕授官面賜章服手叐令承旨不顧班資近日寵榮無臣此例發言感泣指日誓心苟無死節之誠願受鬼誅之禍伏奉恩旨令臣明日本司赴上舊例更合中謝伏緣先有疏論邊事及幽州事宜兼李願入朝並要面自論奏伏料二十日入假已後南衙機務稍間特乞恩許臣中謝謹録奏聞伏聽進止右今日某乙奉宣恩旨賜臣就院設者臣聞推食之賜用勸勳勞置醴之恩以待賢彥微臣猥承天眷擢自內庭雨露頻施涓埃莫效陛下載分美祿特降珍羞空懷滿腹之慙未有沃心之鯁既充膚革誓極肺肝竊位素餐實非誠願微臣無任感激恩私之至右泰倫重晏至宣賜臣前件御劄其中聖旨云鎮州逆亂枉害忠良若與元翼鎮州節度使即是捨賊之門者伏以睿算若神聖慈猶父視凶狡之搆亂義在克清念台輔之銜寃期於必報此蓋仁深天地勇過雷霆臣實庸愚難議窺測况臣謀猷失次罪戾是憂宸翰忽臨天章煥發舞鳳回翔於懷袖飛龍顧盼於縑緗豈獨傳之子孫便可鏤於肌骨微臣無任踴躍光榮之至右前件碑文伏蒙御劄朱書遣臣撰述恩生望外事出宸衷銘鏤骨肌難酬雨露臣伏以陛下所以令臣與宏正立碑蓋欲遣魏博及鎮州將吏等並知宏正首懷忠義以致功勳臣若苟務文章廣徵經典非唯將吏不會亦恐宏正未詳雖臨四達之衢難掩萬人之口臣所以效馬遷史體敘事直書約李斯碑文勒銘稱制使宏正見銘而戒逸將吏觀敘而愛忠不隱實功不為溢美文雖朴野事頗章明伏乞天慈特留宸鑒其碑文謹隨狀封進謹具奏聞伏候敕旨右臣面奉聖旨令臣寫録雜詩進來者伏惟皇帝陛下學深江海文動星辰乙夜觀書秋風詠賦微臣入院之始學士等盛傳陛下親批賀雨一章體備鸞皇思深珠玉臣雖不得目覩宸翰臣實竊得心念聖言既仰燭龍之光難逞聚螢之照欲為陳獻益自慙惶况臣九歲學詩少經貧賤十年謫宦備極恓惶凡所為文多因感激故自古風詩至古今樂府稍存寄興頗近謳謠雖無作者之風粗中遒人之採自律詩百韻至於兩韻七言或因友朋戲投或因悲歡自遣既無六義皆出一時詞旨繁蕪倍增慙恐今謹隨狀陳進無任戰汗屏營之至右臣今月二日進京西京北圖一面山川險易細大無遺猶慮幅尺高低閲覽有煩於睿鑒屋壁施設俯仰頗勞於聖躬尋於古今圖籍之中纂撰京西京北圖經共成四卷所冀袵席之上欹枕而郡邑可觀遊幸之時倚馬而山川盡在又太和公主下嫁伏恐聖慮念其道遠臣今具録天德城以北至回鶻衙帳已來食宿井泉附於圖經之內并別寫一本與圖經序謹同封進其圖四卷隨狀進呈右臣先畫聖唐西極圖三面草本並畢伏候面自奏論方擬進呈前月十一日於思政殿面奉聖旨云諸家所進河隴圖勘驗皆有差異并檢尋近日烽鎮城堡不得令臣所畫稍須精詳伏緣臣先畫西極圖疆界闊遠郡國繁多若烽鎮館驛盡言即山川榜帖太密恐煩聖覽不甚分明愚臣數日之間別畫一京西京北州鎮烽戍道路等圖已畢纖毫必載尺寸無遺若邊上奏報煙塵陛下便可坐觀處所若欲驗臣此圖與諸家所進何如伏乞聖明於南衙及北軍中召取一久任邊將者或於中使內有經過邊上校熟者宣示其道辨別精粗即知臣愚一一皆有依憑不敢妄加增減其聖唐西極圖三本伏緣經略意大事須面自陳伏恐次及降誕務繁未敢進狀候對其京西京北鎮烽戍道路等圖并序謹隨狀進呈右臣當州元和十五年奉宣令採雙雞五聯各重四斤頻年採取一聯不獲自臣到州詢問採捕人等皆云二十年前採得一聯雙雞爾後更不曾採得昨旬日之內并獲兩聯斤兩輕重稍符詔旨况浚郊初啓既以大翦豺狼鷙鳥自來可以助清梟獍臣所恨身無羽翼不獲陪奉屬車擒狡兔之根源破妖狐之㣥黨臣某無任忘軀思奮覩物感恩之至謹遣某官某乙隨狀奉進謹進右臣竊聞道路相傳車駕欲暫遊幸溫湯未知虛實者臣職居守土侍從無由羡魏闕之埃塵猶隨日御恨新豐之雞犬亦聽車音目斷魂銷形留神往又得進奏官狀知河中華州京兆府並於昭應排比進獻臣當州素乏所出無以粗展丹誠臣既別受恩私又不合獨無壤奠伏以前件馬北方正色東道奇蹤調習多時備諳材色解擊毬者每嘉其環回斗轉動可愜心善獵射者皆歎其度塹踰溝走不換足欲隨正至獻賀竊慮㣥衆混同徘徊瞻顧蓄鋭斯久今者宸遊近甸地降靈泉施展是時戢藏何益伏望陛下揚鞭頓轡取驗其馴良結尾絡頭試觀其神彩臣某深恩未報愚志空存自慙駑鈍之姿莫展驅馳之效捫心戀主因馬喻身輕冒天威無任戰汗其馬謹隨狀進謹進右中使某乙至奉宣進止賜臣某官告身一通者鳳銜真誥虬捧天書錦帙金箋霞光日照臣聞高宗命説乃申納誨之詞大舜相龍爰有堲讒之訓空聞簡策未煥縑緗豈臣寵榮而足為諭慙惶增懼進退難安拜受恩光戰汗交集無任感戴殊私之至右中使竇千乘至奉宣進止以臣將赴山陵時屬炎暑賜前件紅雪等臣職司復土戀切攀髯方當匍匐而前敢有赫曦之懼豈謂天光下濟靈藥旁沾念臣有丹赤之愚故賜臣以洗心之物察臣有木訥之性故賜臣以苦口之滋就日疑不冶之清冰在合若遇圓之降雪恩加望外感極成悲無任局蹐屏營之至右某月日某乙奉宣恩旨賜臣母前件告身恩光灼耀捧戴兢惶對揚天休無任戰越臣家傳儒素母實劬勞每織屨以資臣宦遊嘗斷織以勉臣師學念臣庸昧本望非高所希捧檄之榮敢萌開國之慶陛下恩加望外簡自宸衷石窖封疆已光於萬業蘂珠文字重降於九霄朝野謂之殊私宗族以為榮觀臣及臣母以抃以歡誓將齋戒洗心永奉真人之誥緘縢在笥深藏大帝之符寶過金籯瑞同鵲印蓼蕭知感雨露難酬無任抃躍兢懼之至右臣伏奉某月日敕以所賜臣一子官回授臣弟定京兆府藍田縣尉寵過憂深恩殊感極倣徨自顧悚惕難居臣本凡愚猥當重任雖星辰軌道幸屬聖時而歲月環周實妨賢路未蒙罪退益自慙惶豈謂睿慈仍加渥澤特降推恩之命曲成友愛之私九族生光百身何報况藍田美邑黃綬清流旋觀冉冉之趨倍慶怡怡之樂手足交抃形影相輝空鏤肝心難酬雨露無任抃躍感恩之至右臣等伏奉今日敕旨以降誕之辰奉迎皇太后宮中上壽獲申歡慰宜集百寮及外命婦進名賀皇太后仍御光順門內殿與百寮相見便永為常式者伏以降聖嘉辰承天令節新恩肇降品彙咸休皇太后念樞星之祥重遊甲觀㣥執事排閶闔而入盡唱賡歌同沾就日之榮實慶溥天之樂况百官承式萬歲傳聲永為利見之規彌荷無窮之澤臣等謬參樞務親奉德音慶忭之誠倍萬常品無任鼓舞歡呼之至右據中書門下狀稱應徵兩稅起元和十六年已後並配端匹斤兩之物以為稅額不用計錢令其折納仍約元和十五年徵納布帛等估回計者伏以兩稅不納見錢百姓誠為穩便或慮土宜不等恐須更有商量請令天下州縣有山野溪洞無布帛絲綿之處得以九穀百貨一物已上但堪本處交易用度者並許折納便充留州留使錢數仍令依當處堪納兩稅匹段及雜貨估價計折輸納給用之時並不得令有加撎臣等又見比來州縣緣不納見錢抑令小戶數人並合共成端匹期會來往費擾倍多今請天下州縣有貧下戶兩稅數少情願輸納見錢者亦任穩便若此則上無抑配之名下有樂輸之利以茲折中實謂得宜又據中書門下狀稱鹽利酒利本以榷率計錢有殊兩稅之名不可除去錢額但合納見錢者亦請令折納時估匹段者伏以糶鹽價錢自有本使收管不要州縣條流至於榷酒利錢雖則名目不同其實出於百姓今天下十分州府九分是隨兩稅均配其中一分置店沽酒蓋是分外誅求一則厚取疲人二則嚴刑檢下上供既有定數餘利並入使司事實煩苛法非畫一今請天下州府榷酒錢一切據貫配入兩稅仍取兩貫已上戶均配兩貫已下戶不在配限先有置店沽酒處並請勒停若此則賦斂無名額之煩貧富有等差之異人知定準吏絶因緣臣等商量以此為便右據中書門下狀欲令諸道公私銅器各納節度團練等使令本處軍人鎔鑄其鑄本請以留州留使錢年支未用物充待一年後鑄銅器盡勒停其州府有出銅鉛可以廣鑄處每年與本充鑄者臣等約計天下百姓有銅器用度者分數無多散納諸使斤兩蓋寡創置爐冶器具頗繁一年勒停並是廢物軍人既未素習鎔鑄亦恐甚難又每年留州留使錢額本約一年用度支留若待鑄得新錢然遣當州給用必恐百事久闕不應時須臣等商量請令諸使諸州一切在所許百姓以銅器折納稅錢并度支給價收市每年每季隨便近有監冶處據數送納所冀爐冶無創置之勞工匠有素習之便不煩鑄本自有利宜其州府出銅鉛可廣鑄處請委諸道有銅鉛處長吏各言利害具狀申陳參酌衆情然議可否以前據中書門下奏請令中書門下兩省重議可否奏聞者臣等謹議如前謹録奏聞伏候敕旨右吏部以停年課資之格取宰邑字人之官公幹強白者拘以考淺疾廢耄聵者得在選中倒置是非無甚於此朝廷將欲漸去其弊所以特設舉薦之科明詔既行起請尋下有司再議釐革何以取信於人據吏部云增加新戶開墾荒田已是考課舊條獄絶繫囚寃人申雪亦是正途常事舉寮吏不法恐生告訐之風有利益公家又未指陳其目選授者例無異績尚得四考守常舉薦者縱未殊尤豈可二年便罷今請但行連坐舉主之文不必更依吏部分外條件又云見任官及處士散試官並請停集且起家散試固有才能見任他官何妨撫字若皆限其資歷即與常選何殊今請除見任縣令其餘並令赴集又云檢勘榜樣剝放程式及試書判並請準平選人例處分若此則案牘之吏得肆姦欺書判雖工何關政術有同減選赴集豈是特舉與官今請應舉薦人量納文狀便令注擬亦不在剝放及試書判之限又云並請注破碎之縣責其效實本舉良能冀蒙優獎皆居破碎之處恐同貶降之條以前數件蓋恐不可施行伏請但依起請節文處分仍請據今年縣令員先盡舉薦人數留有餘然後許注擬平選人等冀將允當同前五舍人同署嚴礪擅籍沒管內將士官吏百姓及前資寄住塗山甫等八十八戶莊宅共一百二十二所奴婢共二十七人並在諸州項內分析右臣伏準前後制敕令出使御史所在訪察不法具狀奏聞臣昨奉三月一日敕令往劒南東川詳覆瀘州監官任敬仲贓犯於彼訪聞嚴礪在任日擅沒前件莊宅奴婢等至今月十七日詳覆事畢追得所沒莊宅奴婢文案及執行案典耿琚馬元亮等檢勘得實據嚴礪元和二年正月十八日舉牒云管內諸州應經逆賊劉闢重圍內並賊兵到處所有應接及投事西川軍將州縣官所由典正前資寄住等所犯雖該霈澤莊田須有所歸其有莊宅奴婢桑柘錢物斛斗邸店碾磑等悉皆搜檢勘得塗山甫等八十八戶案內並不經驗問虛實亦不具事職名便收家産沒官其時都不聞奏所收資財奴婢悉皆貨賣破用及配充作坊驅使其莊宅桑田元和二年三年租課嚴礪並已徵收支用訖臣伏準元和元年十月五日制西川諸軍諸鎮刺史大將及參佐官吏將健百姓等應被脅從補署職官一切不問又準元和二年正月三日赦文自今日已前大逆緣坐並與洗滌况前件人等悉是東川將吏百姓及寄住衣冠與賊黨素無管屬賊軍奄至暫被脅從狂寇既平再蒙恩蕩嚴礪公違詔命苟利資財擅破八十餘家曾無一字聞奏豈惟剝下實謂欺天其莊宅等至今被使司收管臣訪聞本主並在側近控告無路漸至流亡伏乞聖慈勒本道長吏及諸州刺史招緝疲人一切却還産業庶使孤窮有托編戶再安其本判官及所管刺史仍乞重加貶責以懲姦欺嚴礪又於管內諸州元和二年兩稅錢外加配百姓草共四十一萬四千八百六十七束每束重一十一斤右臣伏準前後制敕及每歲旨條兩稅留州使錢外加率一錢一物州府長吏並同枉法計贓仍令出使御史訪察聞奏又準元和三年赦文大辟罪已下蒙恩滌蕩惟官典犯贓不在此限臣訪聞嚴礪加配前件草準前月日追得文案及執行案典姚孚檢勘得實據嚴礪元和二年七月二十一日舉牒稱管內郵驛要草於諸州秋稅錢上每貫加配一束至三年秋稅又準前加配計當上件草臣伏準每年旨條館驛自有正科不合於兩稅錢外擅有加徵况嚴礪元和三年舉牒已云準二年舊例徵收必恐自此相承永為疲人重困伏乞勒本道長吏嚴加禁斷本判官及刺史等伏乞準前科責以息誅求嚴礪又於梓遂兩州元和二年兩稅外加徵錢共七千貫文米共五千石右臣伏準前月日追得文案及執行案典趙明志檢勘得實據嚴礪元和二年六月舉牒稱綿劒兩州供元和元年北軍頓遞費用倍多量於梓遂兩州秋稅外加配上件錢米添填綿劒兩州頓遞費用者臣又牒勘綿州得報稱元和二年軍資錢米悉準舊額徵收盡送使訖並不曾交領得梓遂等州錢米添填頓遞亦無克寸折當州錢米處者臣又牒勘劒州得報稱元和元年所供頓遞侵用百姓腹內兩年夏稅錢四千二十三貫三文使司今於其年軍資錢內克寸下訖其米即用元和元年米充並不侵用二年軍資米數使司亦不曾支梓州遂州錢米充填者臣伏念綿劒兩州供頓自合準敕優矜梓遂百姓何辜擅令倍出租賦况所徵錢米數內惟克寸下劒州軍資錢四千二十三貫三文其餘錢米並是嚴礪加徵別有支用其本判官及梓州遂州刺史悉合科處以例將來擅收沒塗山甫等莊宅奴婢及於兩稅外加配錢米草等本判官及諸州刺史名銜并所收色目謹具如後擅收沒奴婢莊宅等元舉牒判官度支副使檢校尚書刑部員外郎兼侍御史賜緋魚袋崔廷都計諸州擅沒莊共六十三所宅四十八所奴一十人婢一十七人於管內諸州元和二年三年秋稅錢外隨貫加配草元舉牒判官觀察判官殿中侍御史內供奉盧詡都計諸州共加配草四十一萬四千八百六十七束加徵梓遂兩州元和二年秋稅外錢及米元舉牒判官攝節度判官監察御史裏行裴誗計兩州加徵錢共七千貫文米共五千石梓州刺史檢校尚書左僕射兼御史大夫嚴礪元和四年三月八日身亡擅收塗山甫等莊二十九所宅四十一所奴九人婢一十七人加徵三千貫文米二千石草七萬五千九百五十三束元和二年三萬一千七百九十三束元和三年四萬四千一百六十束遂州刺史柳蒙擅收沒李簡等莊八所宅四所奴一人加徵錢四千貫文米三千石草四萬九千九百八十五束元和二年二萬四千五百三束元和三年二萬五千四百八十二束綿州刺史陶鍠擅收沒文懷進等莊二十所宅十三所加徵草八萬八千六百八十八束元和二年三萬八千九十三束元和三年五萬五百九十五束劒州刺史崔實成擅收沒鄧琮等莊六所加徵草二萬一千八百一十七束元和二年九千三十九束元和三年一萬二千七百七十八束普州刺史李怤元和二年加徵錢草六千束三年加徵草九千四百五十束合州刺史張平元和二年加配草三千四百六十二束三年加徵草五千六百五束榮州刺史陳當元和二年加徵草九千四百三束三年加徵草五千六百二十七束渝州刺史邵膺元和二年加徵草二千六百一十四束三年加徵草三千七百二十七束瀘州刺史兼御史劉文翼元和二年加徵草三千八百五十三束三年加徵草三千八百五十一束資州元和二年加徵草一萬五千七百九十八束三年一萬六千二百二十五束簡州元和二年加徵草二萬四千一百四束三年二萬三千一百一十八束陵州元和二年加徵草二萬四千六百六束三年二萬三千八百六十一束龍州元和二年加徵草八百九十一束三年八百一十一束右已上本判官及刺史等名銜并所徵收色目謹具如前其資州等四州刺史或緣割屬西川或緣停替遷授伏乞委本道長吏各據徵收年月具勘名銜聞奏以前件狀如前伏以聖慈軫念切在蒼生臨御五年三布赦令殷勤曉諭優惠困窮事涉擾人頻加禁斷况嚴礪本是梓州百姓素無才行可稱久在兵間過蒙獎手叐陛下録其末效移鎮東川仗節還鄉寵光無比固合撫綏黎庶上副天心蠲減征徭內榮鄉里而乃橫征暴賦不奉典常擅破人家自豐私室訪聞管內産業阡陌相連童僕資財動以萬計雖即沒身謝咎而猶遺患在人謂宜諡以醜名削其褒贈用懲不法以警將來其本判官及諸州刺史等或苟務容軀競謀侵削或分憂列郡莫顧詔條但受節將指揮不懼朝廷典憲共為蒙蔽皆合痛繩臣職在觸邪不勝其憤謹録奏聞伏候敕旨中書門下牒御史臺牒奉敕籍沒資財不明罪犯稅外科配豈顧章程致使銜寃無由仰訴不有察視孰當舉明所沒莊宅奴婢一物已上並委觀察使據元沒數一一分付本主縱有已貨賣破除者亦收贖却還其加徵錢米草等亦委觀察使嚴加禁斷仍榜示村鄉使百姓知委判官崔廷等名叨參佐非道容身刺史柳蒙等任竊藩條無心守職成此弊政害及平人撫事論情豈宜免戾但以罪非首坐法合會恩亦以恩後加徵又已去官停職俾從宥重此典常其恩後加徵草及柳蒙陶鍠李怤張平邵膺陳當劉文翼等宜各罰兩月俸料仍書下考餘並釋放牒至準敕故牒山南西道管內州府每年兩稅外配率供驛禾草共四萬六千四百七十七圍每圍重二十斤右訪聞前件州府每年兩稅外加配驛草遂於路次州縣檢勘文案據諭後使牒並稱準舊例於兩稅外科配又牒山南西道觀察處置等使裴玢勘得報稱自建中元年已後每年隨稅據貫配率前件禾草將供驛用者伏準元和元年已後三度赦文每年旨條兩稅留州留使錢外加率一錢一物州府長吏並以枉法贓論又準今年二月三日制節文諸道兩稅外榷率比來制敕處分非不丁寧如聞或未遵行尚有欺弊永言奉法事理當然申敕長吏明加禁斷如刺史承使牒於界內榷率闕一字加懲責仍委御史臺及出使郎中官御史訪察聞奏闕一字伏以前件草並是兩稅外徵率準制合勒本道明闕四字州府長吏仍令節級科處分勘擇得實以前劒南東川詳覆使監察御史元稹奏謹具如前牒奉敕積習多年成此乖越然在長吏合尋根由循失政之規置無名之稅雖原情可恕而在法宜懲觀察使宜罰一月俸刺史各罰一季俸仍令自元和四年已後禁斷牒至準敕故牒右御史臺奏得東臺狀訪聞有前件事先牒湖州勘得報稱孫澥先準使牒差攝烏程縣令日判狀追村正沈朏不出正帖不用印奉觀察使七月十六日牒決孫澥臀杖十下仍差衙前虞候安士文監決第三等杖二十二日安士文到科決孫澥官忝字人一邑父母白狀追攝過犯絶輕科罰所施合是本州刺史且觀察使職在六條訪察事有不法即合具狀奏聞封杖決人不知何典數日致死又託以痢疾為念寃魂有傷和氣其湖州刺史受命專城過於畏懦受使司軍將科決縣令致死寢而不言並請準科以明典憲其諸道觀察使輒封杖決巡內官吏典法無文伏望嚴加禁斷庶使遐方士子免有銜寃敕封杖決人殊非文法因此致死有足矜嗟韓臯備歷中外合尊典憲有此乖越良所憮然罰一月俸料據決孫澥月日是舊刺史辛祕離任之後新刺史范傳正未到之時俱無愆尤不可議罰餘依據武寧軍節度使王紹六月二十七日違敕擅牒路次州縣館驛供給當道故監軍孟升進喪柩赴上都勾當部送軍將官健驢馬等轉牒白一道謹具如前又得東都都亭驛狀報前件喪柩人馬等準武寧軍節度轉牒祇供今月二十三日未時到驛宿者伏準前後制敕入驛須給正券並無轉牒供擬之例况喪柩私行不合擅入館驛停止及給遞乘人夫等當時追得都勾當押衙趙伾到責狀稱孟監軍去六月十四日身亡至七月五日蒙本使差押領神柩到上都領得轉牒纍路州縣並是館驛供熟食草料人夫牛等又狀稱其監軍只是亡日聞奏更不別奏只是本使僕射發遣亦別無敕追者謹檢興元元年閏十月十四日敕應緣公事乘驛一切合給正券比來或聞諸州諸使妄出食牒煩擾館驛自今已後除門下省東都留守及諸州府給券外餘並不得輒入館驛宜委諸道觀察使及所在州縣切加捉捕如違犯請資官所在勒留具名聞奏餘並量事科決仍具給牒所由牒中書門下者又準元和二年四月十五日敕節文諸道差使赴上都奏事及押領進奉官并部領諸軍防秋軍資錢物官及邊軍合於度支請受軍資糧料等官並在給券餘並不得給如違本道專知判官録事參軍並準興元元年十二月十七日敕處分者謹詳前後敕文並不令喪柩入驛及轉牒州縣祇供今月二十四日已牒河南府並不令供給人牛及熟食草料等仍牒都亭驛畫時發遣出驛並追得本道牒到在臺收納訖右件謹具如前伏以凶柩入驛穢觸典常轉牒祗供違越制敕正僕射位崇端揆合守朝章徇苟且之請紊經制之法給長行人畜甚衆勞傳遞牛夫頗多弊緣路之疲人奉一朝之私惠恐須明罰以勵將來伏準前後敕文給券違越並合申牒中書門下不敢別狀彈奏伏乞特有科繩其本判官等準敕並合節級科附謹具事由如前伏聽處分具狀上中書門下謹録狀上河南府應供行營般糧草等車準敕糧料使牒共雇四千三十五乘每乘每里腳錢三十五文約計從東都至行營所八百餘里錢二千八文共給鹽利虛估匹段絹一匹約估四千已上時估七百文紬一匹約估五千時估八百文約計二十八千得紬絹共六匹折當實錢四千五百已來五百乘準敕供懷州已來載草右件草準元敕令於河次收貯待河開般運送至行營績準度支奏令差河南鄭滑河陽等道車共一千乘般載今據每車強弱相兼用牛四頭每頭日食草各三束計一十二束從武德界至行營約六百里車行一十二日程往來二十四日并停住約三十餘日計每車須食草三百六十束料及人糧在外若自齎持每車更須四乘車別載緣路糧草若於纍路旋買計一千車每頓須買草六千餘束州縣店肆必無祗供得辦况今年河路元不甚凍及至車般載至發時已是來年正月上旬已後即水路自然去得只校旬日之間實恐虛成其弊三千五百三十五乘準糧料使及東都河陰兩院牒般載軍糧右件軍糧伏據中書門下奏稱若并糴貯恐事平之後無支用處且今收糴來年春季糧料今據邢洺魏博等州和糴已合支得纍月即前件糧亦合得春水路般載以前兩件車準敕並令和雇今據度支河陰匹段十乘估價召雇一乘不得令府司還是據戶科配况河南府耕牛素少昨因軍過宰殺及充遞車已無大半今若更發四千餘車約計用牛一萬二千頭假令估價並得實錢百姓悉皆願去亦須草木盡化為牛然後可充給頭數今假令府司排戶差遣十分發得一二即來歲春農必當盡廢百姓見坐流亡河南府既然即鄭滑河陽亦是小處假使凶豎即擒伏恐飢荒薦至萬一尚稽天討不知何以供求稹忝在官司備知利害伏以事非職任不敢上言仰荷陶甄冀裨萬一無任冒昧狂愚之至伏聽詳察處分謹録狀上當州自於七縣田地數內均配兩稅元額頃畝便請分給諸色職田州使田官田與百姓其草栗腳錢等便請於萬戶上均率又均攤左神策郃陽鎮軍田粟及特放百姓稅麻及除去斛斗錢草零數等利宜分析如後右件地並是貞元四年檢責至今已是三十六年其間人戶逃移田地荒廢又近河諸縣每年河路吞侵沙苑側近日有沙礫填掩百姓稅額已定皆是虛額徵率其間亦有豪富兼并廣占阡陌十分田地才稅二三致使窮獨逋亡賦稅不辦州縣轉破實在於斯臣自到州便欲遣官檢量又慮疲人煩擾昨因農務稍暇臣遂設法各令百姓自通手實狀又令里正書手等傍為穩審並不遣官吏擅到村鄉百姓等皆知臣欲一例均平所通田地略無欺隱臣便據所通悉與除去逃戶荒地及河侵沙掩等地其餘見定頃畝然取兩稅元額地數通計七縣沃瘠一例作分抽稅自此貧富強弱一切均平徵斂賦租庶無逋欠三二年外此州實冀稍校完全右臣當州百姓田地每畝只稅粟九升五合草四分地頭榷酒錢共出二十一文已下其諸色職田每畝約稅粟三斗草三束腳錢一百二十文若是京官上司職田又須百姓變米雇車般送比量正稅近於四倍加徵既緣差稅至重州縣遂逐年抑配百姓租佃或有隔越鄉村被配一畝二畝之者或有身居市井亦令虛額出稅之者其公廨田官田驛田等所稅輕重約與職田相似亦是抑配百姓租佃疲人患苦無過於斯伏準長慶元年七月赦文京兆府職田令於萬戶上均配與臣當州事宜相類臣今因重配原額稅地便請盡將此色田地一切給與百姓任為永業一依正稅粟草及地頭榷酒錢數納稅其餘所欠職田斛斗錢草等只於夏稅地上每畝加一合秋稅地上每畝各加六合草一分其餘腳錢只收地頭榷酒錢上分釐充數便足百姓元不加配其上司職田合變米送城者比緣百姓自出車牛及零碎舂碾動逾春夏送納不得到城臣今便於當州近城縣納粟官為變碾取本色腳錢州司和雇情願車牛搬載差綱送納計萬戶所加至少使四倍之稅永除上司職祿及時公私俱受其利右自置軍鎮日伏準敕令取百姓蒿荒田地一百頃給充軍田並緣田地零碎軍司佃用不得遂令縣司每畝出粟二斗其粟并是一縣百姓稅上加配偏當重斂事實不均臣今已於七縣應稅地上量事配率自此亦冀均平右準元和十三年敕緑夏陽韓城兩縣殘破量減逃戶率稅每年攤配朝邑澄城郃陽三縣代納錢六百七十九貫九百二十一文斛斗三千一百五十二碩一斗三升三合草九千九束零並不計臣今因令百姓自通田地落下兩縣蒿荒之外並據見定頃畝一例徵率自然兩縣已減元額稅地請更不令三縣代納差科右當州從前稅麻地七十五頃六十七畝四壟每年計麻一萬一千八百七十四兩充州司諸色公用臣昨因均配地稅尋檢三數十年兩稅文案只見逐年配率麻地並不言兩稅數內為復數外既無條敕可憑臣今一切放免不稅右從前所徵斛斗升合之外又有抄勺圭撮錢草即有分釐毫銖案牘交加不可勘算人戶輸納元無畸零蹙數所成盡是姦吏欺沒臣今所徵斛斗並請成合草並請成分錢並請成文在百姓納數元無所加於官司簿書永絶姦詐其蹙數粟麥草等便充填所欠職田等數其錢當州每畝元稅二十文三分六釐人戶元納二十一文整數臣今只收納二十一文內分釐零數將充職田腳錢二千六百餘貫便足更不分外攤徵回姦吏隱欺之贓除百姓重斂之困如此處置庶有利宜以前件謹具利宜如前逐縣兩稅元額頃畝并攤配職田分數及蹙成文分合等錢草斛斗數謹具分析在前件狀如前伏以當州田地鹹鹵瘠薄兼帶山原通計十畝不敵京畿一二加以檢責年深貧富偏并稅額已定徵率轉難臣昨所奏纍年逋懸其弊實由於此臣今並已均融抽稅又免配佃職田閭里之間稍令蘇息伏緣請配職田地充百姓永業事須奉敕處分然冀永有遵憑伏望聖慈允臣所奏謹録奏聞伏聽敕旨右件海味等起自元和四年每年每色令進五斗至元和九年因一縣令獻表上論準詔停進仍令所在勒回人夫當處放散至元和十五年伏奉聖旨却令供進至今每年每色各進一石五斗臣昨之任行至泗州已見排比遞夫及到鎮詢問至十一月二十日方合起進每十里置遞夫二十四人明州去京四千餘里約計排夫九千六百餘人假如州縣只先期十日追集猶計用夫九萬六千餘功方得前件海味到京臣伏見元和十四年先皇帝特詔荊南令貢荔枝陛下即位後以其遠物勞人只令一度進送充獻景靈自此停進當時書之史策以為美談去年江淮旱儉陛下又降德音令有司於旨條之內減省常貢斯皆陛下遠法堯舜近法太宗減膳恤災愛人惜費之大德也况淡菜等味不登於俎豆名不載於方書海物鹹腥增痰損肺俗稱補益蓋是方言每年常役九萬餘人竊恐有乖陛下罷荔枝減常貢之盛意蓋守土之臣不敢備論之過也臣別受恩私合盡愚懇此事又是臣當道所進不敢不言如蒙聖慈特賜允許伏乞賜臣等手詔勒停仍乞準元和九年敕旨宣下度支鹽鐵所在勒回實冀海隅蒼生同霑聖澤謹録奏聞伏候敕旨中書門下牒牒浙東觀察使牒奉敕如聞浙東所進淡菜海蚶等道途稍遠勞役至多起今已後並宜停進其今年合進者如已發在路亦宜所在勒回牒至準敕故牒奉進止當今百姓之困衆情所知減稅則國用不充欲依舊則人困轉甚皆由貨輕錢重徵稅暗加宜令百寮各陳意見以革其弊右閏正月十七日宰相奉宣進止如前者臣以為當今百姓之困其弊數十不獨在於錢貨徵稅之謂也既聖問言之又以為黎庶之重困不在於賦稅之暗加患在於剝奪之不已錢貨之輕重不在於議論之不當患在於法令之不行今天下賦稅一法也厚薄一概也然而廉能蒞之則生息貪愚蒞之則敗傷蓋得人則理之明驗也豈徵稅暗加之謂乎自嶺已南以金銀為貨幣自巴已外以鹽帛為交易黔巫溪峽大抵用水銀硃砂繒帛巾帽以相市然而前人以之理後人以之擾東郡以之耗西郡以之贏又得人則理之明驗也豈錢重貨輕之謂乎自國家置兩稅以來天下之財限為三品一曰上供二曰留使三曰留州皆量出以為入定額以給資然而節將有進獻以市國恩者有賂遺以買私名者有藏鏹滯帛以貽子孫者有高樓廣榭以熾第宅者彼之俸入有常也公私有分也此何從而得之又國家置度支轉運以來一則管鹽以易貨一則受財以輕費近制有年進月進之名有正至三節之獻彼之管鹽有常也受財有數也此又何從而得之且百姓國家之百姓也貨財國家之貨財也不足則取之有餘則捨之在我而已又何必授之重柄假之利權徇彼之徼恩成我之怨府哉今陛下初臨億兆首問㣥寮誠能禁藩鎮大臣不時之獻罷度支轉運別進之名絶賂遺之私節侈靡之俗峻風憲之舉深贓罪之刑精核考課之條慎選字人之長若此則不減稅而人安不改法而人理矣至於古今言錢幣之輕重者熟矣或更大錢或放私鑄或龜或貝或皮或刀或禁埋藏或禁銷燬或禁器用或禁滯積皆可以救一時之弊也然而或損或益者蓋法有行不行之謂也臣不敢遠徵古證竊見元和以來初有公私器用禁銅之令次有交易錢帛兼行之法近有積錢不得過數之限每更守尹則必有用錢不得加除之榜然而銅器備列於公私錢帛不兼於賣鬻積錢不出於墻垣欺濫遍行於市井亦未聞鞭一夫黜一吏賞一告訐壞一蓄藏豈法不便於時耶蓋行之不至也陛下誠能採古今救弊之方施賞罰必行之令則聖祖仁宗之法制何限前賢後智之議論何窮豈待愚臣盜竊古人之見自稱革弊之術哉謹録奏聞伏聽敕旨
