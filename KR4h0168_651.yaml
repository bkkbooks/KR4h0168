  - {type: head, offset: 4297, content: 中書省議舉縣令狀, id: KR4h0168_NFKB_651-h32, level: 2}
  - {type: head, offset: 4297, content: 元和十五年八月日中書舍人臣武儒衡等奏駕部郎中知制誥臣李宗閔中書舍人臣王起庫部郎中知制誥臣牛僧孺祠部郎中知制誥臣元稹, id: KR4h0168_NFKB_651-h33, level: 2}
  - {type: head, offset: 4297, content: 吏部重奏舉薦縣令節文, id: KR4h0168_NFKB_651-h34, level: 2}
  - {type: head, offset: 4702, content: 彈奏劒南東川節度使狀, id: KR4h0168_NFKB_651-h35, level: 2}
  - {type: head, offset: 4702, content: 劒南東川詳覆使言, id: KR4h0168_NFKB_651-h36, level: 2}
  - {type: head, offset: 4702, content: 故劒南東川節度觀察處置等使嚴礪在任日擅沒管內將士官吏百姓及前資寄住等莊宅奴婢今於兩稅外加徵錢米及草等謹件如後, id: KR4h0168_NFKB_651-h37, level: 2}
  - {type: head, offset: 7127, content: 彈奏山南西道兩稅外草狀, id: KR4h0168_NFKB_651-h38, level: 2}
  - {type: head, offset: 7163, content: 興元府二萬圍。內五千圍每年折徵價錢充使司雜用。每圍一百二十文。據元和三年使牒減免不徵。餘一萬五圍見徵率。, id: KR4h0168_NFKB_651-h39, level: 2}
  - {type: head, offset: 7163, content: 洋州一萬五千圍。, id: KR4h0168_NFKB_651-h40, level: 2}
  - {type: head, offset: 7163, content: 利州一萬一千四百七十七圍。, id: KR4h0168_NFKB_651-h41, level: 2}
  - {type: head, offset: 7435, content: 中書門下牒御史臺, id: KR4h0168_NFKB_651-h42, level: 2}
  - {type: head, offset: 7506, content: 論浙西觀察使封杖決殺縣令事, id: KR4h0168_NFKB_651-h43, level: 2}
  - {type: head, offset: 7506, content: 浙西觀察使潤州刺史韓臯去年七月封杖決湖州安吉縣令孫澥四日致死, id: KR4h0168_NFKB_651-h44, level: 2}
  - {type: head, offset: 7817, content: 論轉牒事, id: KR4h0168_NFKB_651-h45, level: 2}
  - {type: head, offset: 8467, content: 為河南百姓訴車, id: KR4h0168_NFKB_651-h46, level: 2}
  - {type: head, offset: 9104, content: 同州奏均田狀, id: KR4h0168_NFKB_651-h47, level: 2}
  - {type: head, offset: 9187, content: 當州兩稅地, id: KR4h0168_NFKB_651-h48, level: 2}
  - {type: head, offset: 9437, content: 當州京官及州縣官職田公廨田并州使官田驛田等, id: KR4h0168_NFKB_651-h49, level: 2}
  - {type: head, offset: 9825, content: 當州供左神策郃陽鎮軍田粟二千石, id: KR4h0168_NFKB_651-h50, level: 2}
  - {type: head, offset: 9911, content: 當州朝邑等三縣代納夏陽韓城兩縣率錢, id: KR4h0168_NFKB_651-h51, level: 2}
  - {type: head, offset: 10034, content: 當州稅麻, id: KR4h0168_NFKB_651-h52, level: 2}
  - {type: head, offset: 10123, content: 當州所徵斛斗草及地頭等錢畸零分數, id: KR4h0168_NFKB_651-h53, level: 2}
  - {type: head, offset: 10473, content: 浙東論罷進海味狀, id: KR4h0168_NFKB_651-h54, level: 2}
  - {type: head, offset: 10473, content: 浙江東道都團練觀察處置等使當管明州每年進淡菜一石五斗海蚶一石五斗, id: KR4h0168_NFKB_651-h55, level: 2}
  - {type: head, offset: 10890, content: 當道每年供進淡菜一石五斗海蚶一石五斗, id: KR4h0168_NFKB_651-h56, level: 2}
