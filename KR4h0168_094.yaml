front:
  text: 全唐文欽定全唐文卷九十四哀帝二
  hash: sha256:a0f8572e08f601bc166f0ec6e2d2289724d011f1630618ff4357fad50f4cee55
body:
  text: 文武二柄國家大綱東西兩班官職同體咸匡聖運共列明廷品秩相對於高卑祿俸皆均於厚薄不論前代祗考本朝太宗皇帝以中外臣寮文武參用或自軍衛而居臺省亦由衣冠而秉節旄足明於武列文班不令分清濁優劣近代浮薄相尚淩蔑舊章假偃武以修文競棄本而逐末雖藍衫魚當一見而便許升堂縱拖紫腰金若非類而無令接席以是顯揚榮辱分別重輕遽失人心盡隳朝體致有今日實此之由須議改更漸期通濟文武百官自一品以下逐月所給料錢並須均勻數目多少一般支給兼差使諸道亦依輪次差遣既就公平必期開泰叶羣情於天下崇故事於國初凡百臣庶宜體朕懷朕獲荷丕圖仰遵慈訓爰崇徽號巳定禮儀冀申為子之心以展奉親之敬昨所司定今月二十五日行皇太后册禮再奉慈旨以宮殿未停工作蒸暑不欲勞人宜改吉辰固難違命册禮俟修大內畢功日所司以聞朕以沖幼克嗣丕基業業兢兢勤恭夕惕彗星謫見罪在朕躬雖己降赦文特行恩宥起今月二十四日後避正殿減常膳以明思過付所司朕謬將眇質叨荷丕圖常懷馭朽之心每軫泣辜之念諒於黜責豈易施行左僕射裴樞右僕射崔遠雖罷機衡尚居揆路既處優崇之任未傷進退之規不能秉志安家但恣流言謗國頗興物論難抑朝章須離八座之榮尚付六條之政勉思咎己無至尤人樞可責授朝散大夫登州刺史遠可責授朝散大夫萊州刺史並委御史臺催促出京所在馳驛發遣上天謫見下土震驚致夙夜之沈憂恐生靈之多難不居正殿盡輟常羞益務齋虔以申禳禱果致元穹覆祐孛彗消除豈罪己之感通免貽人於災沴式觀陳奏深慰誠懷責授隴州司戶裴樞瓊州司戶獨孤損白州司戶崔遠濮州司戶陸扆淄州司戶王溥曹州司戶趙崇濮州司戶王贊等皆受國恩咸當重任罔思罄竭唯貯姦邪雖巳謫於遐方尚難寬於國典委御史臺差人所在州縣各賜自盡君臣之間進退以禮矧於求舊欲保初終苟自掇於悔尤亦須行於黜責特進守司空致仕上柱國河東縣開國公食邑二千戶裴贄早以公望常踐台司靡聞竭力以匡時每務養恬而避事洎從請老不謂無恩合慎樞機動循規矩雖云勇退乃有後言自為簿從之酋頗失人臣之禮謫居郡掾用正朝綱尚謂從輕所宜自咎可責授青州司戶刑部郎中李煦可萊州司戶衛尉少卿敬沼是裴贄之甥常纍於舅或以明經撓文柄或以私事竊化權贄巳左遷爾又何逭可貶徐州蕭縣尉禹別九州秦分百郡勉務隨方之職須資利物之源朕所以鄙蒟醬於漢朝慕菁茅於周室用為警戒以省征徭福建一道遠在海隅嘗勤土貢每年所進橄欖子頗甚勞役往來本因閹豎生長甌閩自為耽愛率令供進以為定規況非薦熟之珍仍異厥包之禮雖彰忠藎無濟闕如每年但供進臘面茶外不要進奉橄欖子永為常例漢代元勳鄧禹冠諸侯之上晉朝重位王導居百辟之先皆道著匡扶功宣寰宇其於崇寵迥異等倫朕獲以眇躬重興丕運凡關制度必法舊章實仗勳賢永安宗社副元帥梁王正守太尉中書令忠武軍節度使河南尹張全義亦正守中書令俱深倚注咸正台衡其朝廷册禮告祀天地宗廟其司空則差官攝行太尉侍中中書令即宰臣攝行今太尉副元帥任冠藩垣每遇行禮之時或不在京國即事須差攝太尉行事全義見居闕下任正中樞不可更差別官又攝中書令事其太尉官如梁王朝覲在京便委行事如却赴鎮即依前攝行所合差中書令便委全義以本官行禮其侍中司空司徒即臨時差官付所司前大中大夫尚書兵部侍郎賜紫金魚袋司空圖俊造登科朱紫升籍既養高以傲代類移山而釣名志樂潄流心輕食祿匪夷匪惠難居公正之朝載省載思當徇幽棲之志宜放還中條山梁王躬臨貔武收復荊襄手叐峴首若轉丸平荊門如沃雪連收兩鎮併走二凶乃眷勳庸載深嘉注宜賜詔獎飾洛城坊曲內舊有朝臣諸司宅舍經亂荒榛張全義葺理巳來皆巳耕墾既供軍賦即係公田或恐每有披論認為世業須煩按驗遂啓幸門其都內坊曲及畿內巳耕植田土諸色人並不得論認如要業田一任買置凡論認者不在給還之限如有本主元自差人勾當不在此限如荒田無主即許識認付河南府先定此月十九日親禮南郊雖定吉辰改卜亦有故事宜改取來年正月上辛付所司漢宣帝中興五日一聽朝歷代通規永為常式近代不循舊儀輒隳制度既姦邪之得計致臨視之失常須守舊規以循定制宜每月只許一五九日開延英計九度其入閣日仍於延英日一度指揮如有大段公事中書門下具榜子奏請開延英不計日數付所司宮嬪女職本備內任近年以來稍失儀制宮人出內宣命寀御參隨視朝乃失舊規須為永制今後每遇延英坐朝日只令小黃門祗引從宮人不得擅出內門庶循典儀免致紛雜蔣元暉身居密近擅弄威權鬻爵賣官聚財營第而包藏悖逆稔浸姦邪雖都市巳處於極刑而屈法尚慊於衆怒更示焚棄之典以懲顯負之蹤宜追削為凶逆百姓仍委河南府揭尸於都門外聚衆焚燒皇太后位承坤德有愧母儀近者凶逆誅夷宮闈詞連醜狀尋自崩變以謝萬方朕以幼沖君臨區宇雖情深號慕而法難徇私勉循秦漢之規須示追降之典其遣黃門收所上皇太后寶册追廢為庶人宜差官告郊廟朕以謬荷丕圖禮合親謁郊廟先定來年正月上辛用事今以宮闈內亂播於醜聲難以慙恧之容入於祖宗之廟其明年上辛親謁郊廟宜停太常卿張廷範太常少卿裴石間溫鑾祠部郎中知制誥張茂樞等蔣元暉在樞密之時與柳璨張廷範共為朋扇日相往來假其遊宴之名別貯傾危之計苟安重位酷陷朝臣既比陰謀難寬大辟柳璨巳從別敕處分廷範可責授萊州司戶裴石間等常同聚會固共包藏石間可青州北海尉鑾臨淄尉茂樞博昌尉並員外置張廷範性惟庸妄志在回邪不能保慎寵榮而乃包藏凶險密交柳璨深結元暉晝議宵行欺天負地神祇共怒罪狀難原宜除名委河南府於都市集衆以五車分裂溫鑾裴石間張茂樞並除名委於御史臺所在賜自盡柳璨弟瑀瑊送河南府決殺密州司戶柳璨交通悖逆背負明恩每稔禍於偷安欲危人而自固罔知畏憚惟肆姦回既凶惡以貫盈實朝野而共怒況復聚貪爵秩恣逞威權據其狡猾之端須降誅鋤之命宜除名配崖州長流百姓委御史臺差人所在賜自盡定亂安國功臣鎮海鎮東軍節度浙江東西道觀察處置等使淮南東面行營招討營田安撫兩浙鹽鐵制置發運等使開府儀同三司守侍中兼中書令杭越兩州刺史上柱國吳王食邑九千戶實封五百戶錢鏐總臨兩鎮早立殊功撫制三吳久聞異政一榮封爵再換星霜蓋緣道路阻艱遂致册書留滯近者潭洪水陸並巳通流元勳舉議請行典禮冀免稽於制命俾速達於朝恩須議施行實為允當明甄酬之寵諧僉屬之情其所封吳王策禮宜令所司擇日備禮册命取士之科明經極重每年人數巳有舊規去夏雖舉條流蓋慮所司踰濫今者國子監既有聞奏河南府亦具陳論不念遠人何以誘進只在乎升降之際切務公平又何必解送之時便為沙汰將免遺才之嘆須開積善之門特改舊條俾循往例國子監河南府所試明經並依準常例解送禮部所放人數亦許酌量施行但不得苟徇屬求遂致僥幸兼下諸道準此朝廷取士之科每歲擇才之重必資藝實以副勤求或來自遠途或久稽鄉薦今年就試多有屈人所司奏論是宜俞允苟叶無私之道俾開振滯之門切在精詳佇觀公當其禮部所放進士於舊年人數外宜令更添兩人天祐二年九月二十二日於金州置戎昭軍割均房二州為屬郡比因馮行襲叶贊元勳克宣丕績用獎濟師之效遂行割地之權今命帥得人疇庸有秩其戎昭軍額宜停其均房二州却還山南東道收管襄州近因趙匡凝作帥請別立忠義軍額既非往制固是從權忠義軍額宜停廢依舊為山南東道節度使貞觀大殿朝廷正衙遇正至之辰受羣臣朝賀比來視朔未正規儀其入閣自今後宜令宰臣文武百寮於崇勳殿候對付所司震就列朝行守官宗寺俄從私便久去上京既稍失於規程宜特示於黜免勒停見任并落下襲封牛羊司牧管御廚羊并乳牛等御廚物料元是河南府供進其肉便在物料數內續以諸處送到羊且令牛羊司逐日送納今知舊數巳盡官吏所繇多總逃去其諸處續進到羊並舊管乳牛並送河南府牧管其牛羊司官吏並宜停廢王茂章能分逆順捨彼狂迷廾楊渥之亂邦不同姦險投錢鏐之巨鎮思託賢良既明向國之心頗見立身之道元戎所薦義節昭然須行激勸之規用示獎酬之寵宜授金紫光祿大夫檢校太保兼御史大夫皇帝若曰咨爾天下兵馬元帥相國總百揆梁王朕每觀上古之書以堯舜為始者蓋以禪讓之典垂於無窮故封泰山禪梁父略可道者七十二君則知天下至公非一姓獨有自古明王聖帝焦思勞神惴若納隍坐以待旦莫不居之則兢畏去之則逸安且軒轅非不明放勳非不聖尚欲遊於姑射休彼太庭矧乎歷數尋終期運久謝屬於孤藐統御萬方者哉況自懿祖之後嬖幸亂朝禍起有階政漸無象天綱幅裂海水橫流四紀於茲羣生無庇洎乎喪亂誰其砥綏洎於小子粵以幼年繼茲衰緒豈茲沖昧能守洪基惟王明聖在躬體於上哲奮揚神武戡定區夏大功二十光著册書北越陰山南踰瘴海東至碣石西暨流沙懷生之倫罔不悅附矧豫寡昧危而獲存今則上察天文下觀人願是土德終極之際乃金行兆應之辰況十載之間彗星三見布新除舊厥有明徵謳歌所歸屬在睿德今遣持節銀青光祿大夫守中書侍郎同中書門下平章事張文蔚等齎皇帝寶綬敬遜於位於戲天之歷數在爾躬允執其中天祿永終王其祗顯大禮享茲萬國以肅膺天命
