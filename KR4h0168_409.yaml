front:
  text: 全唐文欽定全唐文卷四百九祐甫字貽孫太子賓客沔子舉進士纍遷中書舍人德宗朝貶河南少尹召拜門下侍郎同中書門下平章事改中書侍郎年六十薨贈太傅諡文貞
  hash: sha256:e64ba18c5459fbf9a0c6fc31d128fa6b02939412c14cb133c403bfa42d06483d
  markers:
  - {type: head, offset: 12, content: 崔祐甫, id: KR4h0168_NFKB_409-h1, level: 1}
body:
  text: 伏以先天二年令㣥臣直日待制以備顧問自今以後准元敕文官一品以下更直待制待奏事官盡退然後趨出便於兩廊賜食待進止至酉時後放陛下閒暇之際時有召問庶或上裨聖政右今月日中使吳承倩宣進止以籠盛貓鼠示百寮臣聞天生萬物剛柔有性聖人因之垂訓作則禮記郊特牲篇曰迎貓為其食田鼠也然則貓之食鼠載在祀典以其除害利人雖微必録今此貓對鼠不食仁則仁矣無乃失於性乎鼠之為物晝伏夜動詩人賦之曰相鼠有體人而無禮又曰碩鼠碩鼠無食我黍其序曰貪而畏人若大鼠也臣旋觀之雖云動物異於麋鹿鹿君兔彼皆以時殺獲為國家用此鼠有害亦何愛而曲全之貓受人畜養棄職不修亦何異於法吏不勤觸邪疆吏不勤捍敵又按禮部式具列三瑞無貓不食鼠之目以此稱慶臣所未詳伏以國家化洽理平天符荐至紛綸雜沓史不絶書今茲貓鼠不可濫厠若以劉向五行傳論之恐須申命憲司察視貪吏誡諸邊候無失徼巡則貓能致功鼠不為害臣忝樞近職司聰明不揆狂愚輒獻公議謹議殿中侍御史安定皇甫政字公理故尚書左丞之子文行兼茂不忝前烈雅度精識其儔蓋寡祐甫昔年嘗為左丞使介而公理又余之族甥故狎焉大歷七年余寓滁而公理寓楚適有來訊示余以所著喪朋友議余美其重禮義有古之遺範瞻望德門軌躅無替亦感思者之所慰幸也公理又諗余曰政自從事於文舅氏未嘗以一言見誨豈所望哉盍示今議之利病猗歟公理年未四十班在赤墀簪筆持簡為王近臣頃又佐廉問董淮海之部名遂矣權厚矣固當緩步闊視光車美服為貴為達而已矣乃不遺我謏狹不略我衰憊念噬膚之戚收門吏之舊周爰咨詢以師道見待吾亦何有但美子之求益不倦雖一勺而進可以浸天壤一卷之多可以鎮方域況其渺瀰既廣嶄崒已峻增之廓之於成名乎必矣皇甫氏有子哉因覽斯議忽憶永泰中於穆鄂州寧會客席與故湖南觀察韋大夫之晉同宴適值有發遠書者知鄭郴州炅知龎歙州濬或以疾而歿或遇戕於盜韋氏出涕沱若而言曰二刺史之晉之交友也於是斂匕箸離筵席因歸於所次而哭之三日人來弔之者韋則盡哀長號不徒戚容而已又間歲祐甫佐江南西道連帥魏尚書時屬幕中之參佐有加官者聚合樂餌卜日為宴宴前行人至知團練副使考功邢郎中宇捐館於荊南邢與魏鄉國接近且邢郎中則諸魏之出於尚書為內外昆弟適受朝命為尚書倅僕感杜簣規平公之事將入言於府主請罷宴若不可則請徹樂卒事而同列之士惡我者嗤鄙之詞充牣於聽謂我樵夫農叟之智也好我者顰戚而相誨曰慎無以方枘施圓鑿自取辱焉諄諄如不能已僕懦夫也因是而自悔乃其宴也大庖具酒車傾鄭衛之女列於賓席之末俳優侏儒設於公堂之下晝日不足繼之以燭使膳夫歘來酌曰曠飲斯必當見輿曳之無算又焉得終其詞哉使我不言適其宜也今者追想韋湖南猶孔門之訓其他則吾不知因縱言之以報公理示之義當矣又何以規議既成客謂祐甫曰韋湖南魏江西二觀察頗嘗知其風味公直簡諒魏則先之飾情強仁韋之志也今吾子之論無乃剝魏而附韋乎且子魏之上介也論議不隱恐非春秋內魯故宋之義盍辨焉祐甫應之曰噫寧以他規我是論也吾復之熟之有日矣韋湖南之晉飾情強仁誠如來議禮不云乎先王制禮賢者俯而就之不肖者企而及之子張曰先王制禮不敢不至焉韋氏之喪朋友縱不由衷亦與夫二者之義合矣吾雖欲不與其可得哉至於故府公魏尚書公直簡諒清身敬職郡人戴於下朝聽滿於上狼籍甚盛豈造次之所盡哉但於邢副使之喪若忍悲而就宴可謂哀樂失其節乃左氏傳所載樂祈告人曰君與叔孫其皆死乎及子招樂憂之謂也若情不至焉率而為宴則禮經所謂直情而徑行者戎狄之道也吾雖欲勿議又不可得也且吾之所論者因皇甫公理所著喪朋友議故縱言及之非敢定二觀察之裦貶韋湖南吾取節焉而已矣來議又以吾嘗為魏公使介今茲著論異於春秋隱魯故宋者茲又近而非中也僕才雖不腆中臺之劇曹郎且兼柱下史有名於著定矣受命為尚書介彌縫潤色之職事安可見責以敬故君之禮嗚呼晉悼公魏絳之君也絳戮悼公之弟韓厥趙宣之所任也厥戮宣子之僕及其終也悼公謝魏絳曰無重寡人之過宣子曰可賀我矣而絳厥無罪焉豈不慎重當公正之世論議之與刑罰當豈異哉子何見過深也嗚呼天下有至公有至當知賢而舉用之至公也臨事而平處之至當也各守其分復何尤哉自漢徐孺子於故舉主之喪徒步千里而行一祭厚則厚矣其於傳繼非可也歷代莫之非也近日張荊州九齡又刻石而美之於是後來之受舉為參佐者報恩之分往往過當或撓我王憲捨其親戚之罪負舉其不令子孫以竊名位背公私黨茲或近之時論從而與之通人又不救遂往而不返徐生徐生得非失中之履霜也常積憤悶因而書之某惶恐叩頭昔臧孫辰之詞曰賢者急病而讓夷然則當禦侮之權必居衝要受分憂之任不務懷安伏見判官李翥稱有教幕府移鎮江寧聞命瞿然不識其故何者逆賊安祿山稱兵犯順竊據二京王師四臨久未撲滅自河淮右轉關隴東馳詔命所傳貢賦所集必由之徑實在荊襄朝廷以大王鎮之重矣自麾旌至止政令所覃嶺嶠華夷吳楚城邑公私遠邇罔有不寧賊庭震懾莫敢南望儻左右有司謀慮未熟輕舉旄鉞僻處下流既失居要害之津且出封疆之外專命之責大王何以任之或啓寇讐之心來爭形勝之地則行李坐隔侵軼滋多安危大端不可不慎既往之失將且無追上皇天帝巡狩成都皇帝駐驆靈武臣子之戀大王兼之詠棠棣之詩講晨昏之禮其地逾遠胡寧以安假使別奉絲綸猶當執奏一則逆胡間諜矯詐須防二則國步艱難折衝宜近就閒樂土恐非良圖伏惟大王天縱仁明苞含光大某所以敢申讜議輕犯威嚴伏望廣延正人俯垂考核芻蕘之論萬一可收不勝憂憤悃迫之至謹奉箋惶恐惶恐叩頭祐甫惶恐惶恐叩頭昔諸葛孔明有言曰使一夫有尤亮之罪也嗚呼孔明以分崩離析之時事要荒割據之主尚能恢宏王度克廣德心魚鱉咸若引為已任千載之下以茲美談伏惟相公乘時間生略不世出光輔興運致於冡宰自明兩作離帝出於震發號施令無幽不達鼎新之業公實贊之煦嫗昭蘇孰不有望況祐甫當遺簪墜履之列懷救蛇養雀之惠雖報恩之分誓以終身而受庇之期亦望卒歲豈可不盡誠款使匹夫不獲而相公有孔明之憾哉祐甫天倫十人身處其季夙遭險釁幾不聞存沒左右提攜仰於兄姊頃屬中夏覆沒舉家南遷內外相從百有餘口長兄宰豐城間歲遭罹不淑仲姊寓吉郡周年繼以鞠凶呱呱孤甥斬焉在疚宗兄著作自蜀來吳萬里歸復羈孤之日斯所依焉豈期積善之人昊天不弔門緒淪替山頽梁折今茲夏末宗兄辭代顧眇眇之身巋然獨在寡弱嬰孺前悲後泣一門之中髮首相弔捨之而去必填溝壑昔者建寅初吉麾蓋將西猥承嘉話曲全之施不略微生許其待年致身徇國豈惟寮屬斯在山川鬼神實亦聞之今者相公大秉化源而小人拘牽於前命進於朝無一塵一露之益顧於家有死如棄如之患撫心自憐淚盡成血儻相公以天下為一堂也忍其向隅而傷和氣哉所以遲回周道欲行中止解懸之望屬在仁明藏之而不言小人之罪也一物失所伏惟相公圖之孟秋尚熱伏惟相公尊體起居萬福謹因洪州奏事官沁水府果毅徐冕奉箋塵黷清襟伏深戰灼祐甫惶恐叩頭叩頭天以日月經緯為文地以邱陵山川為文剛柔雜也其施於人也鐘磬笙竽文其樂九章三贄文其禮典謨詠歌文其言國之大臣業參政本發揮皇王之道必由於文故虞有臯陶洎益稷以嘉言啓迪舜禹以降伊傅周召訓命策誥並時而興秦之李斯著事而僻自茲厥後蜀丞相孔明有出師表晉司空茂先有鷦鷯賦皆輔臣之文也財成陶冶於是見焉我族叔父齊昭公諱日用佐命中朝光照千里玉山雲海迥然昭曠德宇道源深入其極弱冠鄉貢進士擢第周歷臺署振耀雄名元宗之在臨淄邸也公常遭逢於路先幾洞鑒式瞻異表還避而拜契合雲龍及唐元夷內難參謀輔翊天推大寶事協經綸入為將相燮諧戡靜道應元臣其大才明識如是公薨五十載嗣孫起居舍人儒以文事主便蕃禁闥追懷前烈思有以發揚垂裕奉昭公之文集以請焉伏覽碑頌志論章表贊序凡五十餘首詩幾三百篇卓爾孤標氣高調遠若雅琴度曲衆音無味則我遠祖長岑濟北雕龍之美昭公能纘承矣公嗣子宗之學通古訓詞高典冊才氣聲華邁時獨步仕於開元中為起居郎再為尚書禮部員外郎遷本司郎中時文國禮十年三月終於右司郎中年位不充海內歎息儒即右司之子有瓊瑩之質鸞鳳之章國家之寶也重名清貫三代於茲昭公之後其大矣祐甫先君左僕射與昭公道藝敦睦故贈答詩云棣華襲韡萼桂樹連芳根又接閈共懷鉛齊年俱賁玉祐甫之生也後不及昭公之當代儒曰叔父當代敘故敘焉絳人有成橋於稷山縣南汾河水上入境稱曰孝子詢之三十喪父母五十猶縗麻故其鄉黨捨氏不名貴之也初茲縣有具舟之役鄰邑有官修之梁自太原西河上黨平陽至於絳達於雍繇卒迫程賈人射利濟舟為捷渡口如肆孝子川上喟然歎曰夫來者如斯其可勝紀欲速不達式在茲乎見義不為非勇也臨難不濟非義也乃願棄家乞諸他郡枯槁籃縷日恆歲積自河間而東陶唐儉風食貨艱難閭里褊小率令遠邇馳驟饋餉耆耋喻美於編戶丁男捨耒而攻木義聲感也汾流湯湯河滸牽引潰沙徙岸呀呷轉騰畚築於激射之旁根柱於沸渭之下是慮是圖功就其十八九矣其年秋七月天作霪雨湍悍襄陵噫大水不仁前功蕩矣邑老鄉人涕泗而弔之曰力竭於子天不恤是而今已矣顧而不應且有後圖徵詩人之嘉謀參作者之遠慮曳索辮篾縶舟戾舸白露下而謀始止於凌澌壯春冰解而興功止於水潦降一夫不可奪志三年其有成功廣可方軌平可轉轂去其飾成無丹雘取其固勢異虹霓僉義於孝子之功也故曰義橋昔周王以懿戚封建吳札美盛德遺人西臨孟津北對姑射山河風土其肯徒然所以義表專門功烈鄰境難其一善矧乃兼之由是縣人志之於石檢校祕書少監兼和州刺史侍御史河南穆寧字子寧以正直登朝以嚴明作牧斯歷陽之人弗惟奉承侍御史之符候持三尺律期於禁暴懲姦而已乃能廣吾君之德靖人於教化教化之興始於家庭延於邦國事之體大且非謏聞者之所及也請言其家之教化焉使君有四子曰贊曰質曰賡曰賞聳秀之姿若瑤林植庭雪羽馴廡克岐克嶷突而偕辨方欲以六經百氏播禮樂務忠孝正名器導人倫如蘭有芳心泉有清源兆德之階於是乎始使君曰昔陳亢喜聞詩聞禮聞君子之遠其子於孔鯉今茲贊之儕也其年或成人或幾成人學詩學禮則亦既戒遠子之節吾事可不務哉於是考州之東四十里因僧居之外階庭戶牖芳草拳石近而幽遠而曠澶漫平田觱沸溫泉可以步而適可以濯而蠲謂爾㣥子息焉遊焉贊質暨賡賞拜手稽首曰應惟惠施之車仲舒之帷蘇秦之錐三物畢具而郡廷溫凊所在今也改晨昏為旬朔夫豈不懷家人有嚴君焉惟命之受曰俾爾斫俾爾茨俾爾負則使君之材使君之堂使君之薪成且美矣安在其習定省之近儀哉抑又嘗聞乃祖安陽府君傳洪範九疇究天人之際贊等祇荷嚴訓述修祖德穆氏之門欲不大不可得也祐甫不腆幸與使君有郎省之舊考槃在阿歲聿云莫誰謂相遠駕言出遊既覿邦君又適諸子之館使君第三子字紹古於伯季之間肄文史考故實甚精而成因見謂曰丈人吾父之友也從事於游夏之門久矣盍以文見誨如賡也宜何文也祐甫應之曰僕朴人也徒有志於文知文之阡陌而不知其精粹請道其所見而紹古自執焉欲以文經邦者宜董賈欲以文動俗者宜揚馬言偃之文鬱而不見卜商有詩序其體近六經屈原宋玉怨刺比興之詞深而失中近於子夏所謂哀以思刻石銘座者取崔蔡論都及政者宗班張飛書走檄者徵陳琳曹劉之氣奮以舉潘陸之詞縟而麗過此以往未之或知宋齊以降年代未遠有文之士胄系皆存議其優劣其詞未易故闕焉紹古曰盍書之因命筆而記之大歷七年十一月十八日檢校尚書吏部郎中博陵崔祐甫之辭也古之君子約已而裕人知和而勤禮接賓以願務施於豐鄭公孫僑論晉文襄之霸也宮室卑庳無觀臺榭而崇大諸侯之館故來者如歸今我連帥尚書汧公為國垣翰於東土軍禮肅人謠興新其亭傳以待賓客謀之有程設之有所力肆於悅巧悛於淫勿亟而成得其時制博敞高明倬然其閈閎沈深奧密杳然其堂室論者謂華之普德虢之閿鄉自昔為郵亭之甲今茲白馬可以抗衡汧公仁以愛衆儉以化下陋居室而恢賓館節豐華而廣蔭庥稱時計功永代為憲方操八柄揉此萬邦於以庇人其德宏大於是舉也見其端焉夫其去故就新之議屬徒揆日之制作而示後公實書之蓋聞傳春秋序風雅者邱明卜商之事也下吏敢亦庶幾今天子終諒暗易月之期不言既言之日詢於師保輔弻之臣曰將以國之明燭震下土俾兆人康乂有道哉四臣曰莫如擇賢而司牧之雖欲不理不可得也上曰用賢何先曰莫先於幽遠蠻貊之邦為急也即日命王人遽以制書就拜衛尉卿兼洪州都督張公為御史中丞廣州刺史嶺南節度經略觀察等使踰月而遽廟於洪洪之耆老嫠惸商販漁釣百類千品周聲奪魄於野於廛咸曰寧取我裳而裂之寧取我廩而焚之父也天只胡為奪我之君中丞受命而南舟不及泛馬不及秣國人懷慕之罔極曰清塵遠矣君不顧矣鬱陶之思何用哉盍用於揚名頌德乎故吏兵曹參軍張擢法曹參軍豫章縣令鄭鋒建昌縣令盧惟瑾新吳縣令塢賁州人東冶府果毅劉容耆壽喻乾相等討論之衆僉謂允於心曰自昔為政者知清之可以長人也而清者稀豈不欲清欲牽之也欲之所行不廉不儉為之舟輿也清之不立肆奢崇貨為之鑽鑿也於是撤其帷帳薦蓐之具便於身悅於目者二百餘物歸之有司減其俸錢稍食月幾十萬貫於軍府此皆前政之所督責而封已者我則推而遠之於是公儀之義申平仲之規見矣二之日謀於衆曰昔曹參去齊以獄市為寄以為擾於獄者輕重人之命煩於市者耗斁人之生苟鞭笞桁楊之無度侵牟肆奪之不改是國家以章綬印璽毒蒼生也豈致理哉於是平百貨之貴賤議刑罰之等差使其貪不下殘忿不私逞韓子求環而不可使人袒背而無傷夫然噬嗑之象成行葦之恩溥矣三之日謀於野曰不稼不穡民天安仰載馳載驅王命所急吾觀是邦農野未闢傳置未修豈不以使役無期供億失序倘野有餓殍賓不如歸亦諸侯之恥也於是減承城吏卒幾三千歸之隴畝而擊柝之守無闕焉賦豪富墆財數百萬賙於館餼而含糗之徒不知也其卒也不公之吏留以為厮其財也不法之臣受以潤屋我皆用之於愛人活國也於是阜蕃之望崇多大之儀備矣從政三月州人愛之如父母承之如松柏夫婦耕織之暇無他懼惟懼公速遷其餘煦嫗孕育發於中而形於言損其身而益於物可以激頽俗慰窮氓者豈勝道哉祐甫山東鄙人不好妄飾凡所聞見務存實録故採拾而書之公名休字祥幽州范陽縣人有晉司空茂先之遠裔也曾祖汲易州長史祖選幽州固安縣丞考價贈齊州司馬公起家石亭別將自是為縣令軍司馬州長史各一入為天子友儲君臣雖假以寵名而跡實戎索受命為范陽節度安祿山判官祿山以大權大寵外示忠而內謀逆太上皇推赤心而勿疑敢有聞之者死蹈虎尾犯龍鱗公密言其戎狄豺狼不可厭也當是時也視鼎鑊如歸焉神之聽之是與正直周旋鋒鏑之下出入寇讐之間而能終保元吉漸於貴仕進退存亡而不失其正其惟張公乎又牧濠舒潤三州而及此昔張黃門庭圭牧此州甚得人譽張丞相九齡次之逮府君又有裕焉故邦人有三張之目頌者美盛德之形容非魯僖公仲山甫不之獲今茲頌曰昔為豫章今有循良黃門之善於今不忘爰及丞相亦有烈光我君戾止是為三張立廉寶儉無怨無傷郵亭之下賓旅其康四封之內望歲千箱自春徂夏兮人相慶慶未畢兮聞後命朱幡玉節兮向番禺彼願適兮我望孤君乎君乎若歲大旱其誰見濡昔劉向稱賈誼言三代與秦亂之意其論甚美達於國體雖古之伊呂未能遠過又稱董仲舒有王佐之才雖伊呂無以加管晏之屬殆不及也於戲二君以偉才當盛漢之崇而位止於下國二千石祐甫聞於先君僕射曰主恩非臣下之所圖天命豈生人之所制有唐碩量深識之士曰獨孤常州諱及字至之河南洛陽人皇朝左千牛元慶之曾孫蔡州長史思暕之孫殿中侍御史贈祕書監通理之第四子仕而遭時鵠立於朝建旟東夏三著嘉績嗚呼痛乎奄忽捐館其時也大歷十二年夏四月二十九日其地也常州之路寢其壽也五十有三年中朝名公素見知者後進之士聞義嚮風者洎濠舒常三州之百姓莫不填膺流眥不宴不相浹辰彌月厚而惜之者往往失聲出涕沱若公有子朗郁等年未齠齔厥兄檢校水部員外郎兼侍御史泛方佐浙河東帥聞喪來奔半旬而至惋毒之甚如不欲生既受吏人賓客之弔乃忍哀謀事以六月六日引使君之柩去常州歸洛陽其年歲次丁巳十月朔七日葬我使君於河南府壽安縣某原先祕監之塋以夫人博陵縣君崔氏祔焉禮也水部曰天之降割於我家仲叔季盡矣吾將老矣吾弟常州之子未立今不刻石表墓則常州之令名何以傳於後乃託我故人敘而銘之常州稟元和以生幼有成人之量祕監府君親授以孝經常州一覽成誦祕監問曰汝志於何句對曰立身行道揚名於後世是所尚也自是遍覽五經觀其大義不為章句學成童丁祕監憂勺飲不入口者纍日先夫人同郡長孫氏諭以不可滅性之義由是微進饘粥杖而後起既免喪加於人一等鄉族稱其孝焉長孫夫人高行明識訓導甚至常州漸教成器卓然有立著延陵論君子謂其評議之精在古人右天寶末以洞曉元經對策上第詔拜華陰縣尉著古函谷關仙掌二銘格高理精當代詞人無不畏服俄屬中原兵亂避地於越丁太夫人憂毀瘠過禮既外除江淮都督使戶部尚書李峘奏為掌書記授左金吾衛兵曹參軍軍旅之事非其所好未幾返初服今上即位下詔收俊茂舉淹滯政之大者以公為左拾遺凡所諫諍直而不訐婉而不撓削藳詭辭不傳於外遷太常博士時新平大長公主之子裴倣尚永清公主初以太子少傅裴遵慶為婚主將行五禮公實相焉中使口宣詔旨易以大長公主後夫姜慶初常州曰婚姻之禮王化之階以異姓之人主之不可甚矣某不奉詔中書令汾陽王時為五禮使從焉又百官薨卒定諡之際綜核名實皆居其當與嚴河南郢酬答呂荊州諲諡議博而正當時韙之遷尚書禮部員外郎受詔考第吏部選人詞翰旌別淑慝朝廷稱正上方大恤黎庶精選牧守以公為濠州刺史平其徭賦恤其冤弱課績聞上加朝散大夫遷舒州刺史舒境瀕江傍山㣥盜所聚或蟠結林藪或趦趄城市公惠以柔之武以讋之釋矛服耒盡為良俗其他如在濠之政居一年璽書勞問就加尚書司封郎中錫以金章紫綬屬淮南旱歉比境之人流移甚衆公悉心以撫舒獨完安天子聞而休之擢拜常州刺史常州當全吳之中據名城沃土兵興之後中華翦覆吳中州府此焉稱大故朝之選牧恆屬意焉公宣中和平易之教務振人育德之體百姓蒙化遷善不知所以安而安之吏不忍欺路不拾遺餘糧棲畝膏露降庭公平生聞人之善必揄揚之氣盡與之不啻若身得之後進有才而業未就者教誨誘掖之惟日不足公之文章大抵以立憲誡世褎賢遏惡為用故論議最長其或列於碑頌流於歌咏峻如嵩華盛如江河清如秋風過物邈不可逮公有集二十卷行於代若夫贊堯舜禹湯文武之命為誥為典為謨為訓人皆許之而不吾試論道之位宜而不陟前是公之仲兄季弟伯姊三年之間繼歿執天倫之喪如荼如蓼竟以無祿天何不仁然則賈與董名位不盡其才吾先君之歎主恩天命斯見矣其銘曰常州之德孝行為大蒸蒸翼翼以敬以愛友於兄弟如捧如戴常州之義篤於朋友用之有恆行之可久扶危拯溺爾身我手常州之才施於有政撫柔三部謙以為柄龔遂國僑千古迭映常州之文究其元本質取其深艷從其損在星之緯在衣之衮常州之年止於中身去昭昭之盛世與萬鬼而為鄰白馬江上青烏洛濱脊鴒在原嗟爾元昆縗絰霑血長號訴冤纂述遺美謂豫不諼我見之子將二十年相投藥石胡疹不痊譬我於池子為之泉譬我於桐子為之絃榮不獨遂難不隻全如何淑明摧馥碎堅廞衣楚挽徘徊墓田望之不見赴之無緣貍首班如女手拳拳如天如天泣涕漣漣維大歷十四年歲次巳未夏五月二十二日寶應元聖文武皇帝崩於大明宮蓬萊殿遷座於大內二十六日景寅殯於太極殿之西階有司即南郊定儀上尊諡曰睿文孝武皇帝其年十月丁酉朔四日庚子將遷幸於元陵禮也東方啓明繁霜猶落風物淒於宮樹號啼隘於殷幕哀子嗣皇帝諱襲縗戚若泣血漣如感備物之如在索明靈於太虛聆哀挽之急節懼靈駕之將引捧玉斚之歔欷望龍輴而不忍恭惟大孝終揚盛名爰命司籍光昭德聲其詞曰於休我皇長發其祥咎繇翊舜種德四方元元去周闡流道光土實受命其牙則黃炎漢之後南北披攘天厭衆閏掃隋興唐有唐不煜帝命不叶豐融葳蕤盛於八葉其盛伊何聰明徇齊誕實匍匐聖敬日躋無幽不洞無遠不稽孝友濬哲聲達㣥黎天寶季歲竟天長彗騰犬瘈以螫以噬皇輿南巡帝出朔裔君父命我爰整六師驅駕熊羆左右蠻夷逆徒蟻聚言刈其旗一鼓冰碎日未改時席卷酆邑風清洛師天開地廓萬物斯睹安輿自蜀復於中土龍躍岐山正於九五帝子之孝軼邁千古子則戴親孫能敬祖乃登儲位問安三至一有元良儀形克類繼文纂緒道格元穹大明方中萬㝢發蒙豈無桀驁化而為忠豈無羿浞如燎遇蓬刑清政修遐邇懷柔王度如玉德音海流四靈皆擾三脊洊羞方輯㣥瑞登於介邱華封祝堯使聖人壽厭代何速奄捐九有天裂其高地傾其厚嗷嗷萬姓泣慕元首創巨痛深寧丁我后嗚呼哀哉肅肅正殿自炎徂涼漏滴盡兮夏日永燭華凝兮秋夜長階有苔兮委積庭有草兮藝黃嗚呼哀哉七月之期同軌畢至匝野筮壤因山開隧捨清禁而不留指平原而出次嘉德兮啓闈承天兮敞扉抵廟門兮駐嚴蹕順孝心兮傷永違嗚呼哀哉出朱雀兮度青門恨六龍之若奔傾萬邦而會九族送吾皇兮歸壽原風颼飀而簫鼓慘日曀昧兮郊野昏植柏兮青青彌岡兮亘山巠俯杳杳兮重壤想森森之萬靈偶嬪嫁兮像閽寺捧廞衣兮拱下庭嗟備物之偕列奉元堂兮永寧嗚呼哀哉仙馭兮何之九虞兮有期總千官兮萬騎返城闕兮如疑功高舜典美冠周詩於億萬載昭昭有辭嗚呼哀哉維寶應元年歲次壬寅月日祭於隴西董府君之靈曰秋日淒淒百卉具腓城寺無主人焉適歸矧蓄廕庥之望翻遇死喪之威弔隨慶集事與心違良知與主昨是今非嗚呼哀哉追惟曩歲永豐之遊清川倚棹廣路停輈道路契闊燕言綢繆倏焉陳迹曾不少留幾成海變何啻星周徑翮翺翔上陵蒼蒼俯憐燕雀畏逼藩牆議以銜羽將貽稻粱望國駿奔初念褚中之惠及門問故俄增掛劒之傷嗚呼哀哉干旐棨㦸撤而不見繐蒙戶而風悲葦繞庭而靈泣邦人輟舂殲良何速屬吏霑襟於何從祿永無像於形儀庶有憑於軌躅羞匏葉而為薦比隻雞而可續嗚呼哀哉尚享維大歷十二年歲次月日外從祖舅朝散大夫權知中書舍人賜紫金魚袋崔祐甫遣表妷前鄧州南陽縣尉李綜以清酌之奠祭於從外孫甥常州獨孤使君至之之靈往矣至之此時何時空原拱木荊榛狐貍林風月露以子增悲子之往也高格遠量秀氣茂姿亡兮何若有兮誰對豈流蘇寓馬從之已而嗚呼哀哉王事適我政事一埤益我在籠而不能求其釋獨有懷君之淚臨秋風而自滴平生相期聊復一敘一以豁胸中之憤氣二以明靈而晤語吾與至之思宏道義自家刑國張維舉墜吾與至之思敦交好平居琢磨遇死赴蹈吾與至之思邁純德言為士準動有時則吾與至之思全高節風雨如晦嘐嘐不輟吾與至之思闡斯文不俾皋契獨謨華勛吾與至之談空核元夢蝶喻筏去之蕭然吾與至之期諸晚歲偃臥山樊同披薜荔舉其大較良難名數念我交情千枝萬縷霜風掃葉或散或聚萬化紛然同歸野土向之所務孰云其主嗚呼哀哉爛然澄酤平昔共歡如何此奠取象於觀我思此飫子必吾劇目想道周暫留徒御所可懷者徐生之絮士淹開元時官侍御史再遷司勳郎中代宗朝禮部尚書禮儀使坐善魚朝恩貶官命分九等以庸制爵禮有五經莫重於祭先王所以致理孝子為能饗親乃如之人茲率厥典敬無忘於如在道有孚於不黷黍稷惟馨籩豆有楚哀樂相半必覩僾然之容軒裳已登非復傷哉之歎且禮或豐殺法從沿革無廟於寢在今令而則然求牲而饌徵古訓而奚失嗟夫御史所劾恐傷曾孫是宜凌人掌冰以待邦事深山窮谷居仲冬而益堅獻羔祭韭事司寒而方出且云一日二日亦惟秋刷夏頒在用捨而有時於出納而惟允嗟此三品俄嬰六極金章罷去玉襚方開具廞衣於庭中設夷盤於牀下國之老疾猶或不遺朝之榮貴理宜從給徒以氣則分乎寒暑用則期乎折衷司儀所告省括之道雖勤主者定詞挈瓶之智斯得夫北辰垂象南面居尊紫禁崇嚴彤庭奧密靜言近侍允屬能賢其誰見稱則有我陳府君矣公諱忠盛字懷泰潁川許昌人也其先出自帝舜至閼父為周陶正受封於陳子孫因以為氏粵若尚書孝德頒賜聞乎題劒太守高義禮賢為之下榻代襲堅貞門承軒冕因從官京邑今遂家於長安曾祖闕二字正議大夫內給事祖守節正議大夫內常侍父文叔銀青光祿大夫內常侍或肅或乂克寬克仁好古而探墳籍懋官而紆青紫公幼懷端慤夙著嘉聞飾躬以筮仕服勤以成業先天歲解褐補內侍省掖庭局監尋轉內僕丞內僕令秩滿遷內侍伯內謁者監加朝散大夫恪居官次夙夜惟寅爰被丹霄之澤載延朱紱之慶典新樂之絲桐名與公偕勤亦至矣騁高衢而方遠何景命之不融以天寶十三年五月二日遘疾薨於輔興里之私第春秋六十有五惟公黃中多可素履居貞宅心知訓執事有恪至若怡神以全道體命以適時義以拯物禮以從政故能奉絲言而無失馳驛騎而有光俄拜內給事內常侍尋除朝議大夫守內侍秩序斯崇恩華轉茂位益高而心益下德逾邁而氣逾和且以幹能尤膺任寄前後奉使者十有三焉至乃夢三清於太極之府是修功德志五樂於無何之鄉式瞻神異崇茲真廟獲彼靈符邁侯甸而訪仙經歷名山而隨羽客然後稽少陽之必舉懷令圖而允臧豈惟藝足侍書材優參乘巷伯刺讒之什史游忠益之規固可謂無競伊人溫恭淑慎者已以其年閏十一月之九日葬於長安縣承平鄉之原夫人上谷縣君成氏四德無虧三從罔失先天十四年正月二十九日後君而亡以乾元三年五月七日合葬於舊阡禮也長子仙鶴昭武校尉左衛豐浩府折衝次子仙鳳振威校尉行右金吾衛左中候仙甫才惟博達職在春官今上御極釋褐特賜銀章朱紱拜內謁者監仙賢仙管等太邱父子荀氏弟兄事國以忠奉先惟孝感寒泉而增慕卜幽宅而罔艱懼遷陵谷式揚碑版銘曰帝舜洪胄胡公令名三恪惟甫八代至成本仁祖義國史家聲椒聊之實莫我與京懿範彌昌宏材益振果行育德履信思順執心有恆改過不吝政符省括理必遊刃陟遐自邇休有烈光翻飛省闥翊侍巖廊導宣國命輝耀銀璫丹誠每竭朱紱斯皇乘遽周流奚往非適瑞徵桃塞藥獻梁益新廟真容名山靈迹爰典樂正爰稽市籍昊穹不憗殲我惟賢四星猶列一德空傳慘風雲於故里樹松檟於新阡載刊乎貞石永賁於幽泉維寶應元年歲次壬寅四月庚戌朔十八日丁卯大行文明武德大聖大宣孝皇帝崩於長生殿旋殯於兩儀殿之西階粵二年三月二十七日庚午將遷座於建陵禮也燭列瑤宮河低象闕檐擁宵霧庭微曙月森鷺翿以成行儼龍轀而將發哀子嗣皇帝諱充窮感慕躃踊傷摧奠元扆而增肅瞻白雲而不回雨泗噎兮千官泣天仗搖兮萬國陪懿業方永神暉濳翳乃詔有司騰芳後裔其詞曰高邱演慶元牝開祥寶系攸重靈源自長文昭武穆纍聖重光七葉增睿時惟我皇天帝褰裳全真養正窅然姑射欽哉有命謂禹知子踵堯傳舜伊昔休應虹流電驚猗蘭養德叢桂疏榮徇齊純孝宏裕欽明光含玉理秀發珠衡辨日多悟朝雲更輕尊師樂業問寢揚名三善克舉萬邦以貞叶契斷金觀書㣥玉性與兼愛道存濡足詢事考言登庸受籙運符提象輝同偶燭景星耀芒大風成曲戎羯緣間書稱猾夏轉斾秦川連兵朔野水靈濳衛山祇鬷嘏順時徙邑聿來岐下用翦修匪勤戎馬輯寧黎庶保乂宗社赫矣天府於皇樂都瑤壇饗帝璧沼崇儒進善求瘼明刑恤辜丹巖藏銑緑浦捐珠容成啓路王母獻圖功宣祀夏道洽歌虞物莫疵癘人用昭蘇櫟陽先惠棣華增睦冠帶麟洲賓延鳥服招諫懸鼓誓師推轂禮備樂和遠安邇肅恩猶覆燾義涵亭毒露臺愛費茅宇蠲奢北薦舂寶南牧若華卿雲聳蓋潏露垂葩畝秀同穎階榮指邪滌慮高居凝神下濟遠探仙訣深入真諦穆穆頌聲溫溫愷悌榮鍾三古牢籠八裔才生之亹爰集良已之文莫繼佇襄野而來巡怨祁宮而興沴嗚呼哀哉序分宏璧庭臨綴衣如天落構象曰徂輝棄璇㝢而奚速啓金縢而遂違鳥冊龍圖之瑞青邱丹浦之威瞻脫屣兮如在痛攀髯兮不歸巖岫晦兮愁雲積郊原空兮落景微嗚呼哀哉環瀛縞素鞮譯凝慕龜謀協吉象耕遐赴珠玉重而不藏襲稱廉而有數靜鉤陳於塋所閉閶闔於應路靡營南紀之廛空望西陵之樹嗚呼哀哉蒼旻浩然緹律亟遷既深悲於寒霰俄隕涕於韶煙背鳳城而紆鬱援蜃紼而聯翩息輿駕於懸圃聞鐘磬於廣川神理冥其造物皇情邈以終天嗚呼哀哉三光猶變九丹非術蛩隧蒼茫鮒隅蕭瑟渡清渭而徐轉指甘泉而半出薤曲嘶管以臨風松門倚巖而蔽日嗚呼哀哉式揚末命戒茲㣥后至德神功天長地久邁千祀之騰茂居百王之冠首俾下武而欽承彰典謨而不朽嗚呼哀哉維寶應二年歲次癸卯閏正月乙巳朔五日巳酉大行章敬皇后啓自先殯十六日庚申膺冊禮於行宮粵三月二十七日庚午將遷祔於建陵禮也素帟遐敞彞樽曉薦風藹椒塗月虛蘭殿哀子嗣皇帝諱悲深元夜慟切聖慈爰講六服之禮允迪二南之詩示寰區以壼則恭典冊以台司鸞斾曳音蜃輅遷轍辭臣奉詔敢揚徽烈其詞曰圓方配德耀魄齊明王化之本國風以清於穆宗盟貽謀先覺太伯崇讓延陵聽樂蘊夫純嘏施及繁昌斗維儲慶軒緯流祥入懷夢月滿室騰光蘋藻無替紘綖有章待年祕景率禮含芳象服是宜造舟成詠顧史垂則稱詩展敬啓迪四聰誕敷六行蘭芬桂郁霜皎冰靜燕集瑤筐鸞回金鏡化光葛藟務先穜稑載靡震驚宵淪朓朒柔明既進陰教惟肅必戒浮華遠登才淑寧觀戲馬嘗往濯龍堯門協慶莘野聯蹤褘袒凝彩璁珩有容志循易體備肅雍維德之行令問不已繡輪羽蓋玉階金戺式昭範於人倫竟韜華於地紀六宮揮涕於清禁萬㝢銜寃於神理嗚呼哀哉宗祧永固濬哲膺期仁涵動植慶浹華夷捧鏡奩而增欷臨甲觀而纏悲望松楸兮逾遠感霜露兮何追湘川有君漢陵宜付容衛攸崇禮章加數瑞雲呈紫而轉妍廞服變黃而無蠧想層城於北闕背壽原於東路應門寂寂以長閉同軌轔轔而畢赴嗚呼哀哉閟泉闈兮有侐引池紼兮方昭吟古木於靈囿遡悲風於渭橋繁笳凝而凄切輕斾轉而蕭條衣濳覆兮猶在香遠聞而不消嗚呼哀哉鳴雞奏而夙興服馬嚴而曉發慘河山之淑氣怨桃李之嘉月雖立極與觀圖繫馳光而禋設猗彤管兮有煒贊徽音兮無歇嗚呼哀哉
