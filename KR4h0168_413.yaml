front:
  text: 全唐文欽定全唐文卷四百十三常衮四
  hash: sha256:7854a7ee48b292617002b4bcad2c34f6172f360d02ce2426e0b6657eaa28e9f7
body:
  text: 敕朝議郎行尚書工部員外郎賜緋魚袋韋覃朝奉郎行尚書倉部員外郎上柱國賜緋魚袋徐演等器行純備文以彰之尤通政體必本經術直道以進當官而行執憲字人早揚厥職自參俊茂之選各舉彌綸之要遵我風化始於京邑素稱雄劇今則倉廩空虛戎車未寧兵食屢調稅有倍征之重用過經費之數公私抏弊人戶離逖雖難理之任又屬艱虞而制事之宜亦有工拙苟或貞介純白端誠奉公恭敬以仁明察以斷不虐鰥寡不阿貴強以茲撫馭庶有蘇息擇才而授政豈遠哉俾爾化神臯之俗分司隸之路考其能否當有遷黜勉思誡敕以副憂勤覃可守萬年縣令散官勳封如故演可守長安縣令散官勳賜亦如故敕朝議郎守尚書金部郎中楊晉性方行純識敏才達本以經術通於理體和而中禮善不近名仙署回翔士林推重字人京邑多選臺郎風雨所會俾分洛師之劇桴鼓不鳴佇繼董宣之政可守洛陽縣令仍賜緋魚袋散官如故敕朝議郎前守池州刺史上柱國賜緋魚袋柳子華藻飾以文周通於事剛腸正色奉法無私臨難而忠義侃然處煩而典禮不易頃者守春秋鵲岸之地介東南牛渚之險既明且察更不敢欺大姓悅從伏戎散落政殊績異風俗一清地雄神臯秩視京縣國朝舊制亦以刺郡入補副豫良選惠此疲人可守京兆府昭應縣令散官勳賜如故敕周以元老監方伯漢以丞相撫四夷則軍國之務中外一體自華陽而西至於隴坂涉河之右兼控五原總三將之師專萬里之寄詰禁經武宜有統制憂邊謀帥深仗輔臣開府儀同三司行兵部尚書同中書門下平章事潞州大都督府長史知鳳翔府事充懷鄭澤潞觀察處置等使仍充南道通和吐蕃秦隴臨洮已來觀察處置等使上柱國涼國公李抱玉文以經邦德以鎮俗孝友忠信人之模表禮樂刑政朝之訓式以道匡朕允升大猷參聽斷之可否載清靜以寧一兼委戎旅屏於方夏知謀變化潛合神明將校悅從親如父子事出韜鈐之外功成戰伐之前勤勞王家以衛社稷有致君庇人之績冠旗常彞鼎之銘顧以國之憑倚久任憂患兵車之半悉以咨之當不憚煩以時鎮定也可兼充山南西道觀察處置支度營田等使判梁州事隴右懷鄭澤潞等使如故充山南西道河西隴右等道副元帥門下天地之德資陰陽以成功帝王之道任將相而興化聿求左輔命掌元戎必藉文武之才用經軍國之務金紫光祿大夫行黃門侍郎同中書門下平章事兼宏文館崇元館大學士知館事仍充太清太微宮使太原縣開國伯王縉有高妙之行有宏達之識學該古訓文正國風夢帝賚豫濟川用汝百揆時敘四維克張纍陳造膝之言彌契沃心之道濱海之右自河而南王旅攸同戎車殷會監於方伯之國利用建侯之師天將息人豫有禦侮鎮漢沔淮淝之地統齊梁宋鄭之軍總制高牙紀綱㣥帥宏七伐四征之策成一匡九合之功式遏外虞底綏多難將授銅符之律爰咨瑣闥之謀往哉汝諧無替朕命可侍中持節都統河南淮南淮西山南諸道節度行營事仍進封郡公食邑二千戶餘並如故主者施行前河東節度使李業宗室誠臣幹時良傑傳山西之將略襲隴右之家聲可授鄭滑節度使敕朕以守將之重兼文武之寄休否得失實繫於茲至於海隅爰及鰥寡每以康濟為念終夜永懷所以方面久缺難於授任今大張藩政高選公卿銀青光祿大夫檢校戶部尚書知省事上柱國陳留縣開國公路嗣恭以仁義成準以清公致用練法修制可以宣明紀綱好謀全節可以協定危難素精吏事連辟宰府歷位忠恪始終秉彞城彼朔方靖我疆土早二六官之秩再分五曹之座議刑必中敷教亦寬休望華資積於久次大江之外封略曠遠用達憂勤之旨屬於親重之臣授以藩符建茲戎斾仍委廉課俾揚風聲夫潔其流者清其源正其末者端其本奉爾所守敬無廢命可使持節都督洪州刺史充江南西道都團練觀察處置等使檢校戶部尚書及散官勳封如故敕刺史案部外廉數州遵俗宣風所繫尤重今海內甫定方澄化源綱理郡縣大明黜陟安人之寄歷選惟難必二千石職連最者處之曉然明勸以訓天下銀青光祿大夫前澧州刺史兼侍御史上柱國義豐縣開國男崔瓘嘗守江潭有清靜易之化勤儉約已精誠感物小大之政必躬必親本於人情參以事典出言而信出令而從訟獄衰止流庸還定息貪官之豪奪懲大姓之雄強歲無札瘥俗致康乂及澧陽移鎮一其教理故郡黎庶靡然隨之望風欣然如得父母可謂明恕慈惠吏人之師也況本之以經術濟之以忠敬更於臺閣練達朝章而識略沈達可以專方面之任自湘之東制以連率委之監郡兼亦訓戎彼都之人夙所愛慕參領中憲以綏一方可使持節都督潭州諸軍事潭州刺史兼御史中丞充湖南都團練守捉使及觀察處置等使仍兼充諸道營田副使知本管營田事散官勳封如故敕王制千里之外設方伯選諸侯賢者而命之俾其遵俗宣風大明黜陟今以刺史條察列郡西漢成式厥惟舊哉銀青光祿大夫常州刺史充本州團練守捉使上柱國贊皇縣開國子李栖筠資朴厚之性秉禮義之宗其學博而精其文而當明以辨政居官可紀秩更三署名重一時抗黃扉之論駮舉冬卿之典制自守毗陵尤精藩職初翦橫江之盜猶多擊柝之虞言撫傷殘克施惠訓清靜少欲以臨其人禮讓之風行於東國考其績用實最方州震澤之北三吳之會有鹽井銅山有豪門大賈利之所聚姦之所生資於大才濟我難理加以中憲雄茲按部慎乃教令薄其征徭無倚法作威無割下附上勉副朝寄以綏一方可使持節蘇州諸軍事蘇州刺史御史中丞充浙江西道觀察使處置都團練守捉及本道營田等使散官勳封如故敕古者外薄四海咸建五長所以考察風俗懋宣理化苟或副憂人之旨有稱職之名彰善陟明存乎著令金紫光祿大夫使持節都督洪州諸軍事行洪州刺史兼御史大夫充江南西道都團練守捉觀察處置等使上柱國巨鹿郡開國公魏少遊端慤精敏沈和貞秉心以直臨事不回五踐天臺必辨疑而取正三尹京邑不吐剛而茹柔守其至公休有令問自十連分寄九江作牧式是方隅不渝操履停車決訟閉閣生風明示升黜蠲除疾苦清靜而百城自化講藝而三軍知禮定其賦稅之差勤於轉輸之役事必條理人皆便安亦既政成不資於周月遷其秩序豈待於滿歲宜分會府之坐載美方州之績可檢校刑部尚書洪州刺史御史大夫餘如故敕古以五長八使考察風俗彰善疸惡時而揚之則監部廉部其理也今之元戎有聲績優異者錫命兼領亦進律之制焉而又實其封邑蓋申之以明勸開府儀同三司試太常卿兼幽州大都督府長史御史大夫持節充幽州節度兼營田等副大使知節度事經略軍使兼盧龍節度并管內支度營田及押奚契丹兩藩等使上柱國朱希彩貞方以合義純厚以納忠智謀濬發才識精辨作我垣翰保於幽燕講求刑禮以參軍政敦洽敬讓以和人心正其綱條郡務大舉東罷渡遼之警北清戴斗之氣疆吏緩帶戎車稅鞅典從事方面以寧厥賦惟錯實於天府選勞則大銘在旗常勤職首公有光相寄委以連率加其真食懋乃勳節服茲寵章可兼充管內觀察處置使仍賜實封一百戶餘並如故敕觀察列郡之風督諸軍之事兼茲二柄守分一方其在素名俾之專任開府儀同三司試太常卿兼御史中丞同朔方節度副使上柱國晉昌郡王辛杲京居敬可久盡忠必誠精辦郡務通於典試謙恭下士齊其勞苦先帝簡拔五原從征嘗參領護早著勳節藩麾佐朕夷險一心關洛事平莫非勝謀纍書忠於甲令終不言於賞勞尋掌南北之軍復二河汾之鎮內外勤績厥惟茂哉憂國奉公每形於色牧人馭衆素有其才長沙故郡湘中千里往建南轅之斾仍領司空之秩訓戎遵俗寵以居之可使持節都督潭州諸軍事行潭州刺史兼御史大夫充河南都團練守捉及觀察處置使仍賜散官勳封如故敕左綿之東地方千里有被山帶江之險藉安人禦侮之能太中大夫檢校尚書駕部郎中兼侍御史充山南劒卭副元帥判官勾當劒南東川事賜紫金魚袋杜濟明敏通識達於政理本以忠信飾之文學利器能斷長才多可纍佐戎幕勤宣武經於蜀之疆積有邊效九伐之謀必勝三軍之士多師選在人望委茲藩守用能訓其師旅惠此閭閻俾參中憲之任兼茂臨戎之績可使持節梓州諸軍事守梓州刺史兼御史中丞充劒南東川防禦使散官賜如故敕開府儀同三司試太常卿使持節卭州諸軍事兼卭州刺史御史中丞劒南防禦使及卭南招討使上柱國巨鹿縣開國子柏貞節雅有器幹深於戎律蘊三略以經武秉一心而事君蜀之西疆久典戎務惠和馭衆義勇安邊克勵公忠尤彰名節令聞休績良深嘉重山硤雄鎮江關要衝實藉兼才俾膺茲任佇申禦遏之用仍懋緝綏之術可使持節都督夔州諸軍事兼夔州刺史依前兼御史中丞充夔忠萬歸涪等州都防禦使本官勳封如故敕上郡北地義渠故國臨制戎狄屏於關中當此襟要難於鎮守前朔方留後左廂兵馬使同節度副使開府儀同三司試太常卿兼御史中丞單于副都護充振武軍使上柱國辛德謙山西出將代有勳業長才偉略主之以忠峻節明斷服之以禮頃者職二留府朔陲分鎮橫絶大漠堅守孤城能詳武經載討軍實推以恩信濟其威懷士卒知方羌夷服化休有懋績著於北邊用勸勞臣俾膺重任委以藩事捍茲戎疆列在儲寀之右參於憲臺之長中外兼榮服我成命可試太子詹事兼御史大夫持節都督延州諸軍事兼延州刺史充丹延兩州都團練使守捉使散官勳封如故敕古有牧伯連率所以大明黜陟其後廉使監郡亦其任也奉六條詔書察二千石已下風化綱紀實所繫焉若居郡稱最則當遷復留以德授賜今或增秩存於令典銀青光祿大夫檢校祕書監兼衡州刺史御史中丞充湖南都團練守捉觀察處置等使上柱國扶陽縣開國男韋之晉以道自處行成乎身言合精理文多雅興學以潤政當孔氏之徒忠而好謀得兵家之要委在方面實參戎重鎮衡陽之一都刺湘中之諸郡清靜廉以禮化之三老孝悌遵其德訓百城強猾服其威懷薄刑名以宣慈均賦役而恤隱地臨南越溪洞伏戎能清篁竹之封屢入苞茅之貢事各條理俗皆便安非大信至公何以臻此處風憲之長旌理行之尤彰善勸能允茲休命可兼御史大夫餘如故敕宣城鄣郡有牛渚采石之險江左多以護兵之臣鎮焉國家舊制即廉使之部任兼將守寄切於今始務靖人中符朝美銀青光祿大夫守右散騎常侍博陵縣開國子崔昭長才大略濬發無前納忠事君強學濟吏何劇之不處何難之不居嘗領雍洛屬當殘弊令訟平官曹肅給懲姦攝暴都鄙以清風化可行於四方歌謠豈止於千里敬事憂國始終端誠再列貂行久承顧問從容喻旨軒闥增華方賴於左右羽儀以之匡益中外委遇其分一也急在要重時而迭之察俗訓戎歸於辨理參執間邪之憲仍加馭貴之爵奉法遵職俾人易從可使持節宣州諸軍事宣州刺史兼御史中丞充宣歙池等州都團練守捉及觀察處置等使并采石軍仍進封博陵縣侯食邑一千戶散官如故敕東南一尉在吳越之境海隅蒼生連甌閩之俗既分八使兼督諸戎録勳任良以濟煩重朝散大夫宣州刺史兼御史中丞宣歙池等州都團練守捉及觀察處置等使上柱國賜紫金魚袋陳少遊寅亮肅清識通才達度於禮而舉得其中積於理而動必歸當參考經術交修政刑列三台之郎吏首四方之俊選左輔內史嘗寄風化中軍大夫實毗鎮撫事任皆適聲華朗然自鄣郡分憂于湖申警悉心以周務忘已以愛人舉綱條之目繕完守之備忠敏內緝服而不離威略外懷親而不暴載清苛慝盡復流庸雖膠東之戶口八萬潁川之理行第一殆無以過也明試以功允茲章陟稱遷大鎮用表懋能仍副丞相以戒㣥嶽可使持節都督越州諸軍事守越州刺史兼御史大夫充浙江東道都團練守捉觀察處置等使散官勳賜如故門下東分九江南控百越總兵車之會當水陸之衝式遏澄清實難其任金紫光祿大夫行尚書刑部侍郎上柱國巨鹿郡開國公魏少遊當官而行直道而進有剛毅能斷之性守之以沖和有精密至察之才濟之以仁恕三尹京邑四方承流不私身以飾名多去秩之遺愛秋典二職夏臺無寃海隅蒼生疇咨俾乂眷求良吏出守雄藩宜兼亞相之重式光連率之寄可使持節都督洪州諸軍事守洪州刺史兼御史大夫江南西道洪吉虔撫信袁江饒等州都團練守捉觀察處置及莫徭等使散官勳封如故敕開府儀同三司試光祿卿使持節扶州諸軍事兼扶州刺史攝節度副使扶文兩州招討團練使兼綿劒龍遂渝合普漢扶文等一十一州行營兵馬都虞候上柱國交川郡王象武感器幹識略資之以經遠公忠廉謹守之而有常早探黃石之符久列朱轓之任外鄰戎境內撫疲民誠信不渝威懷相濟克懋分憂之化尤昭式遏之勳右地數州尚多艱阻將諭朝旨以綏邊虞不有兼才孰能成務俾參戎重之副仍賜賞延之寵可試殿中監使持節疊州諸軍事兼疊州刺史充本州團練守捉使兼充疊宕兩州招討使同隴右節度副使仍與一子六品官賜緋魚袋勳封如故敕荊吳邊帶之口江漢朝宗之會尚有戎備難於任人外攘內撫文武迭用銀青光祿大夫試祕書監壽州刺史兼侍御史本州團練守捉使及諸道營田使知本州營田事上柱國獨孤問俗才暢於理識通於政居之以敬濟之以廉能中朝清秩更於獎拔外臺雄鎮多所典領嘉績休聲較然明著壽春之課尤最當時守於一郡未展其用可以倚辦煩重保綏險要督數郡之戎事參中司之憲列陟明增秩懋爾在公可使持節都督鄂州諸軍事鄂州刺史兼御史中丞充鄂嶽沔等三州都團練守捉使散官勳如故敕彊楚之裔古之蠻方雜武溪之種落通夜郎之邊壤唐蒙開道馬援南征即其地也國朝舊制方數千里悉統於連帥今以遐濶難守遂分督以綏之正議大夫試光祿卿前兼海州刺史李昌岠素有識略達於事體剛柔相濟文武中立居職可紀實浮於名乃者以幹時之才刺瀕海之郡惠和潔所謂理平思我遠人眷求良吏撫辰陽之舊俗攘縣道之多虞訓戎數州俾爾專任參領中憲式榮按部可試祕書監使持節都督辰州諸軍事辰州刺史兼御史中丞充辰溪巫錦業等五州都團練守捉使散官如故敕平盧淄青節度都知兵馬使權知節度副使事開府儀同三司試太常卿兼御史中丞上柱國趙郡開國公李正己蘊經遠之方有盡忠之節雅擅韜略尤通政理任兼文武誠貫等夷海岱之間兵車所會嘉績明著濰淄其乂實藉循良符節之寄允茲僉屬必能敬事愛人以康流弊宜膺寵授用副分憂可使持節青州諸軍事兼青州刺史餘竝如故敕銀夏綏麟等四州兵馬使同朔方節度副使開府儀同三司前行銀州刺史兼御史中丞歸德州都督武威郡王論惟清智謀沈果政理甄詳睿忠之誠表於奉上幹事之用聞於在公佐戎律以成師布藩條而訓俗翟土開闢誾陰底寧威懷相濟聲實惟允晉之北鄙地即隰州介於河汾當此會要憂分式遏實藉良能宜兼中憲之榮式寵外臺之寄可使持節隰州刺史兼御史中丞歸德州都督充本州團練守捉使同朔方節度副使散官封如故門下秉德者必先於沖讓報功者亦資於禮秩遂其所執以彰明哲之心存其所賞以稱勳賢之策則勞臣知勸㣥議允從兵部尚書同中書門下平章事潞州大都督府長史知鳳翔府事充陳鄭澤潞觀察處置等使仍充南道通和吐蕃秦隴臨洮以來觀察處置等使上柱國李抱玉風雲所感挺此人傑文武相濟弻於朕躬竭股肱而宣力敷心腹而納誨道高可以咨訪言惠可以底行鎮撫四夷旌麾授其二柄決勝千里法令齊於一人端誠馭衆律略安邊究詩書之義府修德刑之戰器故使剛者有禮勇者有方三軍可用九伐皆剋西戎即敘中夏底寧而又精心吏職諭我朝旨茂周原之多稼省隴右之外徭老少安懷遠邇和洽社稷之衛邦家之光嘉乃丕績肆於時夏沖而不盈泰而彌損纍執范宣之志不言馮異之功辭禮閣之端右罷王畿之戎號足以光昭史冊軌度搢紳今之儀同未曰優異以其遜職是有進階式從彞序無替成命可開府儀同三司餘並如故敕鳳翔節度下歸順羌首領部落副使保寧州都督特進守右羽林軍試太常卿鍾庭光夙承勳望早勵誠勤自屬艱虞備申效用既臨危以見節亦因事以成功率先歸懷丹款昭著益表自新之志允茲從重之賞禮優八命秩比三司宜茂寵章式疇勳則可開府儀同三司餘如故敕儀亞槐庭寵分茅社議功而賞舊典斯存河西觀察判官特進檢校左散騎常侍兼泗州刺史上柱國李秀璋識慮深遠理懷明濟徑節不奪長才有餘湟中絶塞久毗戎幕車師前部仍領藩條萬里孤軍十年連戰主畫以貞師律推誠而得士心摧凶陷堅勝捷相繼軍吏緩帶邊人反耕緬思忠勞益用嘉歎宜進秩於八命更裦封於五等可開府儀同三司仍封隴州縣開國男餘如故敕淮西節度都虞候特進試太常卿上柱國張自勉體仁以成勇徇節以臨戎職在刺奸威屬整旅齊軍令之進退明師律之否臧南靖江黃北啓申息邊虞載戢亭候肅然舍爵議榮實居其右承景風之章敘比公府之命秩可開府儀同三司餘如故敕大將軍論誠信等咸有將才早彰臣節或往參締構業著總干或近歷艱難勳高負靮録功行慶啓號覃恩宜疏五等之封更寵三司之任誠信可開府儀同三司門下禮優八命秩比三台名器之崇勳賢所屬特進試太常卿使持節鄜州諸軍事兼鄜州刺史御史中丞充鄜坊等五州都防禦使上柱國鄭國公杜冕植性剛毅立誠忠烈夙有將帥之才早知軍旅之事任當禦侮政在親民宣七德以臨戎頒六條而訓俗地臨上郡時屬多虞軍令惟行高懸賞罰之柄王師所處不敗商農之業戎軒屢捷郊壘用寧制勝功高緝綏課最加以命數抑惟典常可開府儀同三司餘如故敕漢置十二卿其一尚禁中之事所以司正伯之訓奉詔奏之嚴高選令才俾之參掌具官吳承倩行本於孝性周於仁直而能溫和而有節文以禮樂達於典章自晦吉人之辭深得侍臣之體久在樞近通乎宥密順以聽命未嘗越思咨而後行動不踰矩志全金石之固事絶絲毫之嫌勤職有功靜專端一往逢多故亦既居難遐想純誠近從賜服雖疇其效未獎其能省之二官秩比千石懋茲寵授念爾忠勞可內侍省常侍
