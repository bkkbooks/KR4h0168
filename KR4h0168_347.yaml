body:
  text: 昔在天皇告成岱宗改元乾封經始明堂年紀總章時締構之未輯痛威靈之遐邁天后繼作中宗成之因兆人之子來崇萬祀之丕業蓋天皇先天中宗奉天纍聖纂就鴻勳克宣臣白美頌恭惟述焉其辭曰伊皇唐之革天創元也我高祖乃仗大順赫然電發以首之於是橫八荒漂九陽掃叛渙開混茫景星耀而太階平虹霓滅而日月張欽若太宗繼明重光廓區宇以立極綴蒼昊之頽綱淳風沕穆鴻恩滂洋武義烜赫於有截仁聲馺沓乎無疆若乃高宗紹興拓統錫羡神休旁臻瑞物咸薦元符剖兮地珍見既應天而順人遂登封而降禪將欲考有洛崇明堂惟厥功之未輯兮乘白雲於帝鄉天后勤勞輔政兮中宗以欽明克昌遵先軌以繼作兮揚列聖之耿光則使軒轅草圖羲和練日經之營之不彩不質因子來於四方豈殫稅於萬室乃準水臬攢雲梁罄玉石於隴坂空王褱材於瀟湘巧奪神鬼高窮昊蒼聽天語之察察擬帝居之將將雖暫勞而永固兮始聖謀於我皇觀夫明堂之宏壯也則突兀曈曨乍明乍蒙象太古元氣之結空巃嵸頽沓若嵬若嶪似天閫地門之開闔爾乃劃岝山額以嶽立郁穹崇而鴻紛冠百王而垂勳燭萬象而騰文窙惚恍以洞豁呼嵌嵓而傍分又比夫崑山之天柱矗九霄而垂雲於是結構乎黃道岧嶢乎紫微絡勾陳以繚垣闢閶闔而啓扉崢嶸嶒嶷粲宇宙之光輝崔嵬赫奕張天地之神威夫其背泓黃河垠潄清洛太行卻立通谷前廓遠則標熊耳以作揭豁龍門以開關點翠彩於鴻荒洞清陰乎㣥山及乎煙雲卷舒忽出乍沒岌嵩噴伊倚日薄月雷霆之所鼓蕩星斗之所伾仡拏金龍之蟠蜿挂天珠之硉矹勢拔五嶽形張四維軋地軸以盤根摩天倪而創規樓臺崛岉以奔赴城闕嶔崟而蔽虧珍樹翠草含華揚蕤目瑤井之熒熒拖玉繩之離離㨖華蓋以儻漭仰太微之參差擁以禁扃橫以武庫獻房心以開鑿瞻少陽而舉措採殷制酌夏步雜以代室重屋之名括以辰次火木之數壯不及奢麗不及素層簷屹其霞矯廣廈鬱以雲布掩日道遏風路陽烏轉影而翻飛大鵬橫霄而側度近則萬木森下千宮對出熠乎碧光之堂炅乎瓊華之室錦爛霞駮星錯波泐颯蕭寥以颼飀窅陰鬱以綿密含佳氣之青蔥吐祥煙之鬱律九室窈窕五闈聯綿飛楹磊砢走栱夤緣雲楣立岌以橫綺綵桷攢欒而仰天皓璧晝朗朱甍晴鮮赬欄各落偃蹇霄漢翠楹回合蟬聯汙漫沓蒼穹之絶垠跨皇居之大半遠而望之赫煌煌以輝輝忽天旋而雲昏迫而察之粲炳煥以照爛倏山訛而晷換跨蓬壺之海樓吞岱宗之日觀猛虎失道潛虯蟠梯徑通天而直上俯長河而下低玉女攀星於網戶金娥納月於璇題藻井彩錯以舒蓮天窗赩翼而銜霓扶標川而失足擬跟絓而罷躋要離歘曤而外喪精視冰背而中迷亘以復道通乎宮垣坌入西樓實為崑崙三事庶尹正儀躅以出入九夷五狄順方面而來奔其左右也則丹陛崿崿彤庭煌煌列寶鼎歊金光流辟雍之滔滔象環海之湯湯闢青陽而啓總章廓明臺而布元堂儼以太廟處乎中央發號施令采時順方其閫閾也三十六戶七十二牖度筵列位南七西九白虎列序而躨跜青龍承隅而蚴蟉其深沈粵密也則赤熛掌火招拒司金靈威制陽汁光權陰坤斗主土據乎其心若乃熠耀五色張皇萬殊人物禽獸奇形異模勢若飛動瞪眄睢盱明君暗主忠臣烈夫威政興滅表賢示愚於是王正孟月朝陽登曦天子乃拖蒼王轡蒼螭臨乎青陽左個方御瑤瑟而彈鳴絲展乎國容輝乎皇儀傍瞻神臺順觀雲之軌俯對清廟崇配天之規欽若肸蠁維清緝熙崇牙樹羽熒煌葳蕤納五服之貢受萬邦之籍張龍旗與虹旌攢金戟與玉戚延五更進百辟奉圭瓚獻琛帛周旋俯僂儼容疊迹乃潔菹醢修粢盛奠三犧薦五牲享於神靈太祝正辭庶官精誠鼓大武之隱轔張鈞天之鏗鍧孤竹合奏空桑和鳴盡六變齊九成㣥神來兮降明庭蓋聖主之所以孝治天下而享祀窅冥也然後臨辟雍宴㣥臣陰陽為庖造化為宰餐元氣酌太和千里鼓舞百寮賡歌於斯之時雲油雨霈恩鴻溶兮澤汪濊四海歸兮八荒會哤聒乎區宇駢闐乎闕外㣥臣醉德揖讓而退而聖主猶夕惕若厲懼人未安乃目極於天耳下於泉飛聰馳明無遠不察考鬼神之奧推陰陽之荒下明詔班舊章振窮乏散敖倉毀玉沈珠卑宮頽牆使山澤無間往來相望帝躬乎天田后親於郊桑棄末反本人和時康建翠華兮萋萋鳴玉鑾之鉠鉠遊乎升平之圃憩乎穆清之堂天欣欣兮瑞穰穰巡陵於鶉首之野講武於驪山之旁封岱宗而祀后土掩栗陸而包陶唐遂邀崆洞之道禮汾水之陽吸沆瀣之精英黜滋味之馨香貴理國其若夢遊華胥之故鄉於是元元淡然不知所在若㣥雲從龍衆水奔海此真所謂我大君登明堂之政化也豈比夫秦趙吳楚爭高競奢結阿房與叢臺建姑蘇及章華非享祀與嚴配徒掩月而淩霞由此觀之不足稱也況瑤臺之巨麗復安可以語哉敢揚國美遂作辭曰穹崇明堂倚天開兮巃嵸鴻濛搆王褱材兮偃蹇坱土莽邈崔嵬兮周流辟雍岌靈臺兮赫奕日星噴風雷宗祀肸蠁王化恢鎮八荒兮通九垓四門啓兮萬國來考休徵兮進賢才儼皇居而作固窮千祀兮悠哉白以為賦者古詩之流辭欲壯麗義歸博達不然何以光贊盛美感天動神而相如子雲競誇詞賦歷代以為文雄莫敢詆訏臣請語其大略竊或褊其用心子虛所言楚國不過千里夢澤居其大半而齊徒吞若八九三農及禽獸無息肩之地非諸侯禁淫述職之義也上林云左蒼梧右西極考其實地周袤才經數百長揚夸胡設網為周阹放麋鹿其中以搏攫充樂羽獵於靈臺之囿圍經百里而開殿門當時以為窮壯極麗逮今觀之何齷齪之甚也但王者以四海為家萬姓為子則天下之山林禽獸豈與衆庶異之而臣以為不能以大道匡君示物周博平文論苑囿之小竊為微臣之不取也今聖朝園池遐荒殫窮六合以孟冬十月大獵於秦亦將耀威講武掃天蕩野豈淫荒侈靡非三驅之意邪臣白作頌折衷厥美其辭曰粵若皇唐之挈天地而襲氣母兮粲五葉之葳蕤惟開元廓海宇而運斗極兮總六聖之光熙誕金德之純精兮潄玉露之華滋文章森乎七曜兮制作參乎兩儀括衆妙而為師明無幽而不燭兮澤無遠而不施慕往昔之三驅兮順生殺於四時若乃嚴冬慘切寒氣凜冽不周來風元冥掌雪木脫葉草解節土囊煙陰火井冰閉是月也天子處乎元堂之中餐八水兮休百工考王制兮遵國風樂農人之間隙兮因校獵而講戎乃使神兵出於九闕天仗羅於四野徵水衡與林虞辨土物之衆寡千騎飇掃萬乘雷奔梢扶桑而拂火雲兮刮月窟而搜寒門赫壯觀於今古嶪搖蕩於乾坤此其大略也而內以中華為天心外以窮髮為海口豁咽喉以洞開吞荒裔以盡取大章按步以來往夸父振策而奔走足迹乎日月之所通囊括乎陰陽之未有君王於是撞鴻鐘發鑾音出鳳闕開宸襟駕玉輅之飛龍歷神州之層岑遊五柞兮瞰三危挾細柳兮過上林攢高牙以總總兮駐華蓋之森森於是擢倚天之劒彎落月之弓崑崙叱兮可倒宇宙噫兮增雄河漢為之卻流川嶽為之生風羽毛揚兮九天絳獵火燃兮千山紅乃召蚩尤之徒聚長戟羅廣澤呵雨師走風伯稜威耀乎雷霆烜爀震於蠻貊陋梁都之體制鄙靈囿之規格而南以衡霍作襟北以岱恆作袪夾東海而為塹兮拖西冥而流渠麾九州之珍禽兮回千㣥以坌入聯八荒之奇獸兮屯萬族而來居雲羅高張天網密布罝罘帛丿糸原峭格掩路蠛蠓過而猶礙蟭螟飛而不度彼層霄與翳榛空翔鳥與伏兔從營合技彌巒被岡金戈森行洗晴野之寒霜虹旗電掣卷長空之飛雪吳驂走練宛馬蹀血縈衆山之聯帛丿糸隔遠水之明滅使五丁推峯一夫拔木下塹高頽深平險谷擺椿栝開林叢喤喤呷呷盡奔突於場中而田疆古冶之疇烏獲中黃之黨超崢嶸獵蒼莽喑嗚哮㘚風旋電往脫文豹之皮抵元熊之掌批狻手猱挾三挈兩既徒搏以角力又揮鋒而爭先行甝號以鶚睨兮氣赫火而歊煙拳封專肘巨狿梟羊應叱以斃踣猰貐亡精而墜巔或碎腦以折脊或噴髓而飛涎窮遐荒蕩林藪扼土伯殪天狗脫角犀頂探牙象口掃封狐於千里捩雄虺之九首咋騰蛇而仰吞拖奔兕而卻走君王於是峩通天靡星旃奔雷車揮電鞭觀壯士之效獲顧三軍而欣然曰夫何神讋鬼栗之駭人也又命建夔鼓勵武卒雖轥轢之已多猶拗怒而未歇集赤羽兮照日張烏號兮滿月戎車轞轞以陸離彀騎煌煌而奮發鷹犬之所騰捷飛走之所蹉蹶攫鹿君麚之咆哮蹂豺貉以挂格膏鋒染鍔填巖掩窟觀殊材與逸㣥尚揮霍以出沒別有白豸睂飛駮窮奇貙豸㒼牙若錯劒鬣如叢竿口吞殳鋋目極槍櫓碎琅弧攫玉弩射猛彘透奔虎金鏃一發旁疊四五雖鑿齒磨牙而致伉誰謂南山白額之足覩總八校搜四隅馳專諸走都盧趫喬林撇絶壁抄獑猢攬貊豸國囚鼬鼯於峻崖頓豰貜於穹石養由發箭奇肱飛車巧括更羸妙兼蒲且墜鸀鳿於青雲落鴻鴈於紫虛捎鶬鴰漂鸕彈地廬空神居斬飛鵬於日域摧大鳳於天墟龍伯釣其靈鼇任公獲其巨魚窮造化之譎詭何神怪之有餘所以噴血流川飛毛灑雪乍若乎高天雨獸上墜於大荒又似乎積禽為山下崩於林穴陽烏沮色於旭日陰兔喪精於明月思騰裝上獵於太清所恨穹昊之路絶而忽也莫不海晏天空萬方來同雖秦皇與漢武兮復何足以爭雄俄而君王茫然改容愀若有失居安思危防險戒逸斯馳騁以狂發非至理之宏術且夫人君以端拱為尊元妙為寶暴殄天物是謂不道乃命去三面之網示六合之仁已殺者皆其犯命未傷者全其天真雖翦毛而不獻豈割鮮以染輪解鳳凰與鸑鷟兮旋騶虞與麒麟獲天寶於陳倉載非熊於渭濱於是享獵徒封勞苦軒行炮騎酌酤韜兵戈火網罟然後登九霄之臺宴八紘之圃開日月之扃闢生靈之戶聖人作而萬物覩覽搜岐與狩敖何宣成之足數哂穆王之荒誕歌白雲於西母曷若飽人以淡泊之味醉時以醇和之觴鼓之以雷霆舞之以陰陽虞乎神明狃於道德張無外以為罝琢太朴以為杙頓天網以掩之獵賢俊以御極若此之狩罔有不克使天人晏安草木蕃殖六宮斥其珠玉百姓樂於耕織寢鄭衛之聲卻靡曼之色天老掌圖風后侍側是三階砥平而皇猷允塞豈比夫子虛上林長楊羽獵計麋鹿之多少誇苑囿之大小者哉方將延榮光於後昆軼元風於邃古擁嘉瑞臻元符登封於太山篆德於社首豈不與乎七十二帝同條而共貫哉君王於是回霓旌返鑾輿訪廣成於至道問大隗之幽居使罔象掇元珠於赤水天下不知其所如也豫昔於江陵見天台司馬子微謂豫有仙風道骨可與神遊八極之表因著大鵬遇希有鳥賦以自廣此賦已傳於世往往人間見之悔其少作未窮宏達之旨中年棄之及讀晉書覩阮宣子大鵬讚鄙心陋之遂更記憶多將舊本不同今腹存手集豈敢傳諸作者庶可示之子弟而已其辭曰南華老仙發天機於漆園吐崢嶸之高論開浩蕩之奇言徵至怪於齊諧談北溟之巨魚吾不知其幾千里其名曰鯤化成大鵬質凝胚渾脫鬐鬛於海島張羽毛於天門刷渤澥之春流晞扶桑之朝暾烜赫乎宇宙憑陵乎崑崙一鼓一舞煙蒙沙昏五嶽為之震蕩百川為之崩奔爾乃蹶厚地摩太清亘層霄突重溟激三千以崛起搏九萬而迅征背嶪太山之崔嵬翼舉長雲之縱橫左回右旋倏陰忽明歷汗漫以夭矯排閶闔之崢嶸鴻濛扇雷霆斗轉而天動山搖而海傾怒無所搏雄無所爭固可想像其勢髣佛其形若乃足縈虹霓目耀日月連軒沓拖揮霍翕忽噴氣則六合生雲灑毛則千里飛雪邈彼北荒將窮南圖運逸翰以傍擊鼓奔飇而長驅燭龍銜光以照物列缺施鞭而啓途塊視三山杯看五湖其動也神應其行也道俱任公見之而罷釣有窮不敢以彎弧莫不投竿失鏃仰之長吁爾其雄姿壯觀映背河漢上摩蒼蒼下覆漫漫盤古開天而直視羲和倚日以傍歎繽紛乎八荒之間掩映乎四海之半橫大明而掩晝若混茫之未判忽騰覆以回旋則霞廓而霧散然後六月一息至於海湄歘翳景以橫翥逆高天而下垂憩乎泱漭之野入乎汪湟之池猛勢所射餘風所吹溟漲沸渭巖巒紛披天吳為之怵栗海若為之躨跜巨鼇冠山而卻走長鯨騰海而下馳縮殼挫鬛莫之敢窺吾亦不測其神怪之若此蓋乃造化之所為豈比夫蓬萊之黃鵠誇金衣與菊裳恥蒼梧之元鳳耀綵質與錦章既服御於靈仙久馴擾於池隍精衛殷勤於銜木鶢鶋悲愁乎薦觴天雞警曉於蟠桃踆烏晣耀於太陽不曠蕩而縱適何拘攣而守常未若茲鵬之逍遙無厥類乎比方不矜大而暴猛每順時而行藏參元根以比壽飲元氣以為漿戲暘谷而徘徊馮炎洲而抑揚俄而希有見而謂之曰偉哉鵬乎若此之樂也吾右翼掩乎西極左翼蔽乎東荒跨躡地絡周旋天綱以恍惚為巢以虛無為場我呼爾遊爾呼我翔於是乎大鵬許之欣然相隨此二禽巳登於寥廓而斥鷃之輩空見笑於藩籬晨登太山一望蒿里松楸骨寒宿草墳毀浮生可嗟大運同此於是僕本壯夫慷慨不歇仰思前賢飲恨而歿昔如漢祖龍躍㣥雄競奔提劒叱吒指揮中原東馳渤澥西漂崑崙斷蛇奮怒掃清國步握瑤圖而倏升登紫壇而雄顧一朝長辭天下縞素若乃項王虎鬬白日爭輝拔山力盡蓋世心違聞楚歌之四合知漢卒之重圍帳中劒舞泣挫雄威騅兮不逝喑嗚何歸至如荊卿入秦直度易水長虹貫日寒風颯起遠讎始皇擬報太子奇謀不成憤惋而死若夫陳后失寵長門掩扉日冷金殿霜淒錦衣春草罷緑秋螢亂飛恨桃李之委絶思君王之有違昔者屈原既放遷於湘流心死舊楚魂飛長楸聽江風之嫋嫋聞嶺狖之啾啾永埋骨於緑水怨懷王之不收及夫李斯受戮神氣黯然左右垂泣精魂動天執愛子以長別歎黃犬之無緣或有從軍永訣去國長違天涯遷客海外思歸此人忽見愁雲蔽日目斷心飛莫不攢睂痛骨抆血霑衣若乃錯繡轂填金門煙塵曉沓歌鐘晝喧亦復星沈電滅閉影潛魂已矣哉桂華滿兮明月輝扶桑曉兮白日飛玉顏滅兮螻蟻聚碧臺空兮歌舞稀與天道兮共盡莫不委骨而同歸天之何為令北斗而知春兮回指於東方水蕩漾兮碧色蘭葳蕤兮紅芳試登高兮望遠極雲海之微茫魂一去兮欲斷淚流頰兮成行吟清風而詠滄浪懷洞庭兮悲瀟湘何豫心之縹眇兮與春風而飄揚飄揚兮思無限念佳期兮莫展平原萋兮綺色愛芳草兮如翦惜餘春之將闌每為恨兮不淺漢之曲兮江之潭把瑤草兮思何堪想遊女於峴北愁帝子於湘南恨無極兮心氳氳目眇眇兮憂紛紛披衛情於淇水結楚夢於陽雲春每歸兮花開花已闌兮春改歎長河之流速送馳波於東海春不留兮時已失老衰颯兮情逾疾恨不得挂長繩於青天繫此西飛之白日若有人兮情相親去南越兮往西秦見遊絲之橫路網春暉以留人沈吟兮哀歌躑躅兮傷別送行子之將遠看征鴻之稍滅醉愁心於垂楊隨柔條以糾結望夫君兮興咨嗟橫涕淚兮怨春華遙寄影於明月送夫君於天涯東風歸來見碧草而知春蕩漾恍惚何垂楊旖旎之愁人天光清而妍和海氣緑而芳新綵翠兮芊眠雲飄颻而相鮮演漾兮夤緣窺青苔之生泉縹眇兮翩帛丿糸見遊絲之縈煙魂與此兮俱斷對風光兮悽然若乃隴水秦聲江猿巴吟明妃玉塞楚客楓林試登高而望遠痛切骨而傷心春心蕩兮如波春愁亂兮如雪兼萬情之悲歡茲一感於芳節若有一人兮湘水濱隔雲霓而見無因灑別淚於尺波寄東流於情親若使春光可攬而不滅兮吾欲贈天涯之佳人咸陽之南直望五千里見雲峯之崔嵬前有劒閣橫斷倚青天而中開上則松風蕭颯瑟䫻有巴猿兮相哀旁則飛湍走壑灑石噴閣洶湧而驚雷送佳人兮此去復何時兮歸來望夫君兮安極我沈吟兮歎息視蒼波之東注悲白日之西匿鴻別燕兮秋聲雲愁秦而暝色若明月出於劒閣兮與君兩鄉對酒而相憶登九疑兮望清川見三湘之潺湲水流寒以歸海雲橫秋而蔽天豫以鳥道計於故鄉兮不知去荊吳之幾千於時西陽半池映島欲沒澄湖練明遙海上月念佳期之浩蕩渺懷燕而望越荷花落兮江色秋風嫋嫋兮夜悠悠臨窮溟以有羡思釣鼇於滄洲無修竿以一舉撫洪波而增憂歸去來兮人間不可以託些吾將採藥於蓬邱
