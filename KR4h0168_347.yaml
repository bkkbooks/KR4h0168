front:
  text: 全唐文欽定全唐文卷三百四十七白字太白興聖皇帝九世孫白生夢長庚星因以命之舉有道不應天寶初至長安賀知章言於元宗召見金鑾殿論當世事奏頌一篇詔供奉翰林忤高力士摘其詩激楊貴妃帝欲官白妃輒沮之白遂求還山乃賜金放還安祿山反永王璘辟為府僚璘起兵逃還彭澤璘敗長流夜郎會赦還代宗立以左拾遺召白已先卒年六十餘文集二十卷
