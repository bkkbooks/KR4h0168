front:
  text: 全唐文欽定全唐文卷四百六十一陸贄二
  hash: sha256:599e033c0e4b01bf590b2b89d51f2a34e33a25762705065727a0603e9f37b95e
body:
  text: 門下王者體元立極欽若乎天地纂業承統嚴奉於祖宗所以敬事修誠務本敦孝尊其上以御於下謹其身而訓於人百神允諧兆庶永賴立國之本斯其大經朕燭理不明違道招損往遭多難淪陷國都天地宗祧曠而莫主則是欽若嚴奉之義缺矣甚用懼焉洎復京師遽將告謝有司以人力耗斁禮物廢隳日居月諸歲聿云暮卜其吉日俯一作甫在上春齊心永懷坐以待曙而百辟卿士抗疏上言咸謂人心未寧不足以盡敬寇孽猶在不足以告功迫於㣥情俯抑誠願郊廟孔邇瞻言莫從悼心慚顏胡寧自處重以和平未洽災沴薦臻去歲旱蝗兩河為甚人流不息師出靡居加之以徵求因之以荒饉困窮殍餒轉死邱墟關輔之間冬無積雪土膏未發宿麥不滋詳思咎徵有為而致豈兵戎之後餘祲尚存將獄犴之中深寃未釋又河中淮右逆將阻兵汙脅齊人陷之死地雖欲自雪厥路無由抱義銜寃足傷和氣此皆由朕爽德播災於人為之父母實用愧恥今元陰已謝春日載陽勾萌畢伸幽蟄咸震思與海內同心自新發號更元用符天意宜改興元二年為貞元元年自正月一日昧爽已前大辟罪以下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之先準敕令量移收敘人所司據節文速與處分應河中脅從將士多是奉天赴難功臣本居朔陲夙尚忠節豈以一夫詿誤棄其纍代勳庸朕於此軍尤所不忍特宜洗滌待以初誠自非與官軍決戰死於鋒刃其餘雖臨陳擒獲亦並釋放如棄逆歸順者在身先有官爵實封一切如舊仍準前後制敕所在便給賞錢并與甄敘如有因危效節建立殊庸量其事績特加獎擢李懷光若能翻然悔過朿身赴朝念其嘗有大勳必當終始全護仍準前敕授之官封朕於功臣庶亦無負淮西將吏百姓等皆被劫制久為匪人詢事原情諒非獲已今王師四合計日誅夷玉石俱焚用增惻憫宜令諸道進軍之日唯罪首惡一人自餘徒黨悉從原宥如有歸順及立功者並準河中將士例裦獎夫為國之要在於審官共理分憂守宰彌切闔境性命繫乎其人將使里閭無愁苦之聲風俗興廉讓之教得不慎簡髦彥寄之化源自今已後諸州刺史有闕中書門下於朝官中精擇有理人才術者授之如刺史縣令在任頻年課績尤異者擢授侍郎給舍郎官御史中外迭處用觀其能賞罰必行期於競勸自頃選曹署吏唯以書判求人務騁浮華莫稽實行且能言者不必適用蘊用者或未能言為官擇人其在精核宜令清資常參官每年於吏部選人中各舉所知一人堪任縣令録事參軍者所司依資敘注擬便於甲歷之內具標舉主名銜仍牒報御史臺如到任後政理尤異及有贓犯事迹著明者所司録舉官姓名聞奏以為裦貶其內外官員及京城諸使名目委御史審勘會商量并省停減仍集百寮定議務從簡約息費便人其京外官職田及息利官錢等黠吏詆欺移易疆畔或貧人轉徙捕繫親鄰日月滋深耗弊彌甚亦令百寮議其折衷擇善而行往以賦役殷繁人不堪命定為兩稅事額易從比屬軍興或踰始制法無所守吏益為姦哀我勞人汔可小息自諸道州府除兩稅外應有權宜科率差使一切悉停京畿及近縣所欠百姓和糴價值委度支即勘會支給諸道非臨寇賊州縣自冬已來點召官健子弟並宜放散任營生業應經陷賊州縣百姓屋宇被災毀并貧病老弱及遭傷損之類所在量加優恤使得安存天下名山大川并自古聖帝明王賢臣烈士祠廟墳墓各委當處長吏擇日致祭必資精潔以達志誠班爵有差所以序賢也廩秩有等所以明勸也今或高卑失序中外相踰至於卿士之家尚罹凍餒之患忠信重祿豈其然耶內外官祿及俸錢手力雜給等委中書門下度支即參詳定額聞奏應赴奉天及收城將士等並功存社稷節著艱危中心藏之豈忘酬報頃緣府藏空竭賞給未周乃眷勳臣實用增愧應準元敕合請賞錢人等委所司節減在官及百司費用據所有財物速與給付應在京城及諸道立功將士等先有詔旨並許甄升所司勘會淹歷時月委中書門下即準元敕處分諸軍行營并河中朝邑被脅從將士家口在京及諸州府者宜令本道節度觀察使安存賑恤各令優給應諸軍諸使立仗見在城將士等共賜物七萬匹制書有未該備所司速比類條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里遐邇咸知門下君天下者受命於天地繼業於祖宗致其誠心惟敬與孝違敬莫大乎廢祀虧孝莫大乎黷神朕以身屬承大統縱欲敗度浸生厲階兵連禍深變起都邑六師播蕩九服震驚郊廟園陵陷於凶逆神人乏主將逮周星列聖大業幾墜於地違敬虧孝罪由朕躬撫臨萬邦甚用自愧側身思咎庶補將來股肱元臣比義叶德爪牙衆士勠力同心誅大憝而都邑廓清翦逋寇而關河砥定茲朕再與王公卿尹洎億兆之人備其盛容修其禮物薦誠清廟展敬圜丘陳謝罪夭夭心告雪憤恥感慕慙惕若無所容上帝顧懷再新景命豈伊匪德獨荷鴻休思與普天誕膺多福可大赦天下自貞元元年十一月十一日昧爽已前大辟已下已發覺未發覺已結正未結正繫囚見徒罪無輕重常赦不原者咸赦除之左降官量移近處流人及藩鎮效力並即放還應有痕玷禁錮前後恩赦節文未該及者亦宜洗雪勿以為纍李希烈僭逆不道誠所難容朕憫念蒼生務息征討頻有詔命許其自新若能歸降依前敕待以不死淮西管內將士官吏百姓等一切原宥與之如初先有官封亦皆復舊如能特建功效者當別超擢若家口親屬在諸道者長吏綏撫各使安存其歸順百姓仍委節度觀察使刺史給空間地任便安居優復終身務令全濟待事平已後聽歸本貫天下百姓去年十二月已前欠負官稅官租及諸色人逋懸一物已上但不在官典復內者一切免放內外文武官見任及致仕官三品已上賜爵三級四品已下加一階天下諸使諸將軍士三品已上賜爵一級四品已下加一階白身人賜勳三轉自頃凶渠倡亂逆臣附姦保據國都憑陵甸服朕出次郊邑再遷巴梁險阻艱難靡不經歷暴亂之後乃彰烈士之功憂危之中方見直臣之節録勳進善其可弭忘應奉天興元元年扈從立功并收京城將士食實封者各隨文武與一子官餘並加兩階仍賜勳三轉其文武百官應扈從到興元府者五品已上賜爵一級六品已下各加一階合入三品五品者不拘考限聽敘其五品已下父母未經追贈者與追贈應平河中將士即準元敕速與甄獎自建中四年已來有身死王事義烈著明未經裦贈者本道即具名銜事迹聞奏諸道有解退官健州府長吏切務安存仍量以空間田地給付免其差役任自營生社稷之勳以輔興王業統帥之任以總制戎麾參衮職者其德崇授麾節者其功大方鎮乃國之垣翰禁衛實豫之爪牙尹京實賴於肅清主計尤資於辦集所頒慶澤宜越常倫司徒兼中書令晟宜與一子五品正員官并四品階諸道副元帥各與一子六品正員官中書門下平章事充節度使各與一子七品正員官節度使及神策兵馬使六軍統軍金吾六軍大將軍判度支侍郎各與一子八品正員官都團練都防禦等使京兆河南尹金吾六軍將軍殿前射生兵馬使各與一子九品正員官多難以來三十餘載克平禍亂屬在戎臣或節著艱危或勳高戰伐受任雖專於總帥成功亦賴於㣥材懋賞推恩宜加裔嗣諸道大將功業崇高者各與一子官本使即詳定録名聞奏副元帥都統兼節度使下每道各二十人都團練都防禦使下各十人如大將子孫之中有藝業優長性行純確者本使具狀聞薦仍量事資給令赴上都朕當隨材授官以充侍衛庶使忠臣之後與國無窮故尚父子儀先朝元勳再復京邑贈太尉秀實以死為國節冠古今宜各與子孫一人五品正員官自至德以後節度使大將有忠烈績效著明其後淪翳者所司即條録聞奏與子孫一人正員官諸色人應在賊中潛奉神主頃已甄賞宜便賜優崇三品已上賜爵一級四品已下加一階江淮轉運使檢校左僕射同中書門下平章事韓滉勵精勤職夙夜在公漕挽資儲千里相繼事無夭夭心素人不告勞拯於凶災厥有成績可進封晉國公關畿之內連歲興戎荐屬天災稼穡不稔穀糴翔貴蒸黎困窮倉廩空虛莫之賑贍每一興念惻然痛心宜令度支取江西湖南見運到襄州米十五萬石設法般赴上都以救百姓荒饉如山路險阻車乘難通仍召貧人令其般運便以米充腳價務於全活流庸庶事優饒副朕勤恤立國之道始於親親所以厚骨肉之恩明教化之本況荐經艱故宗族漂淪敦睦之情有加常典大長公主長公主公主各與一子七品官嗣王郡王郡主縣主各與一子官出身應陪位皇親五等已上諸親三等已上者三品已上賜爵一級四品五品加一階六品已下及常選官散官等簡選日優與處分未出身人量授文武散官如宗子中有德行才能者宗正卿具以名聞當別獎任致理之本在乎審官審官之由資乎選士將務選士之道必精養士之方魏晉已還澆風未革國庠鄉校唯尚浮華選部禮闈不稽實行學非為巳官必徇人法且非精弊將安救宜令百寮詳思所宜各修議狀送中書門下參較得失擇善而行有虞建官三載考績在漢為吏或長子孫蓋吏久於官則人情不苟官久於事則理化有成日者制度廢隳考課乖舛淹速靡準升降無名欲令庶寮何所懲勸自今已後刺史縣令未經三考不得改移其餘非在職績效殊尤亦不得越次遷轉刺史停替須待魚書內外五品已上及常參官在任年考已深者即量才效用與改中外迭處以觀其能夫明目達聰務廣聞見或慮懷才抱器輸忠納諫之倫地處幽遐無由自達永言於此夢想不忘應諸色人有長策濟時忠規匡主任具陳所見詣所居之州委刺史略與討論觀其旨趣但有裨治道不涉私情便與附驛遞進朕當親覽自立兩稅經今百年或初定之時已有偏併或戶口減耗舊額猶存輕重不均流亡轉甚委度支即折衷條理以恤困窮古者雖有水旱人無菜色皆由儲蓄不匱勸導有方前代所置義倉國初亦循其制被災救乏甚便於人即宜準貞觀故事天下所墾見田上自王公下及百姓每豐稔之歲秋夏兩時州縣長官以理勸課據頃畝多少隨所種粟豆稻麥逐便貯納以為義倉如年穀不登即量取賑給官司但為立法勸諭不得收管仍各委本道觀察使逐便宜處置聞奏敦本厚生必資播殖當今所切莫甚於斯自今百姓有墾闢田疇加於常歲者所加之地不得輒徵租稅其刺史令長考課亦以本界墾田多少為殿最今年蝗旱損甚州府開春之後量給種子使就農功天下應荒間田有肥沃堪置屯田處委當管節度使觀察都團練都防禦等使刺史審細檢行以諸色人及百姓情願者使之營佃如部署精當收穫數多本道使刺史特加裦升屯田等節級優賞如是逃戶田地本主復業即却給還輦轂之下四方會同供應既多難為準定急賦繁役人何以堪宜令京兆尹與度支計會長安萬年兩縣每季各先支貯備錢五千貫文於縣庫收納定清幹官專知應緣卒須別索及雜供擬并工匠等縣令與專知官先對給價錢季終之後申度支勘會應關和市和雇並須先給價錢兩稅外一物已上不得科配百姓御史臺朝廷紀綱尚書省治化根本百度得失繫乎其人自頃制敕頒行所司多不遵守王臣奉職豈所宜然委御史臺左右丞切糾稽違無壅朕命南郊太清宮太廟應職掌行事官郊廟攝將軍中郎郎將及留守副留守內定行從官三品已上各賜爵一級四品已下加一階並賜勳兩轉其諸色支供作官司直長上流外灼然要職掌者並賜勳兩轉行事室長掌坐齋郎禮生贊者減二年勞無勞可減者簡選日優與處分崇賢館學生見在者減帖策各一道國子監陪位學生賜勳一轉介公酅公各與一子官如無子孫賜物一百匹神策六軍殿前左右射生英武威遠皇城左右金吾街使將士應緣大禮宿衛御樓立仗及守本庫本營者共賜物若干端匹天災作沴深警豫衷局蹐憂慚罔知攸措今穀價騰踊人情震驚鄉閭不居骨肉相棄流離殞斃所不忍聞公私之間廩食俱闕既無賑恤又復徵求財殫力竭繼以鞭箠弛征則軍糧乏贍厚取則人何以堪念茲困窮痛切心骨思所以濟浩無津涯補過實在於增修救患莫如於息費致咎之本既由朕躬謝遣之誠宜自朕始宜令尚食所進御膳每日各減下一半應宮人等每月惟供給糧米一千五百碩飛龍廏馬從今已後至三十日已前並減一半料京兆府應差科百姓及和市和買等諸色目事無大小一切並停公私債負容待蠶麥熟後徵理門下朕以寡德屬當大統皇天眷佑俾主兆人懼不克承夙夜祇畏緬懷前烈致於升平豫心浩然罔知攸濟小大之務曷嘗不勤芻蕘之言亦莫不敬慮每存於致理志常在於恤人中宵屢興終食纍歎一事乖弛惄焉疚懷一夫罹殃惻若傷體思與海內同臻大和息其戰爭保其生業降心從衆實匪有辭克已利人誠無所吝然以視聽有極思慮難周況乎長自深宮安於近習損益之理寧免過差幽遠之情固多未達由是兢兢砥礪悔往修來燭理所患於不明推心庶幾於無負日慎一日於今十有五年矣上靈降鑒多士叶誠五稼屢豐四鄙不擾方鎮輯睦干戈砥寧邊壘繕完殊方欵附協天地會昌之運實宗社無疆之休慶既荷於元功禮有昭於大報矧惟霜露之感永切孝思禋燎之儀每勤精意將申誠敬其在躬親是與公卿大夫虔奉犧牲恭奠圭璧陳其文物薦其馨香類秩於泰壇朝享於寢廟率職來助萬邦攸同備物致嚴百禮具舉誠慕獲展神人允諧明發永懷慶感斯集純嘏所錫豈惟朕躬思俾普天均承惠澤可大赦天下貞元九年十一月十日昧爽已前繫囚見徒大辟已下罪無輕重咸赦除之其見於官司辨對者亦並放免官人犯入已贓不可令其却上已後勿以為纍左降官及流人並量移近處其官已經量移未復資者還其階爵竄謫遐裔冀速沾恩比者準制量移所司比例申牒屢加盤覆纍涉歲年既甚淹遲且不均一宜令吏部刑部審勘檢本流貶及量移敕旨比類元犯事狀輕重兩月內與處分內外文武見任及致仕家居并諸軍諸使將士等三品已上賜爵一級四品已下加一階從我巡狩涉於艱難録其忠勞宜有優異應從奉天扈從至興元府文武官將士等普恩之外三品已上賜爵一級四品已下加一階兵興已來垂四十載稅額煩重人已困窮因之以流離加之以凍餒為人父母實切哀傷誠由德化未孚耗斁猶廣每欲蠲復使之小休迫於軍儲有意未就姑示勤恤減其田租惠貸非多良深憫愧天下百姓貞元十年地租斛斗應合度支收管者宜並三分減收一分如當管無屬度支斛斗即減放合送上都十分之一其所放斛斗錢物並委巡院官與觀察經略等使計會審勘定數分明榜示百姓仍具申奏去年以來所有貸糧種子並存百姓腹內者一切放免富國安人在於薄斂必不得已簡則易從自頃削去煩苛定為兩稅既無他撓頗便於時朕推誠御人所貴在信保此成法期於不踰凡百有司所宜遵守儻求取無節則因緣起姦獲利失人殊乖朕意諸司諸使及諸州府除兩稅外別有科配悉宜禁絶近年以來因和市和糴欠負百姓錢物並即填還已後官司應有市糴者各須先付價直不得賒取抑配因茲斂怨擾人水旱為災古人不免苟有豐蓄則無凶年間屬多虞里閭凋耗如務求於日給不遑慮於歲儲一穀不成人則艱食害至而救其傷已多俾無餒殍之憂將在備之而已宜委諸州府長吏每年以當管回殘餘羡錢物穀賤時收糴各隨便近貯納年終具有無多少報中書門下兼申考功以為考課升降如有替代各分交領準前申報若遇災異不稔即量事給與百姓輒有將充諸色用者以枉法贓罪之其勸課百姓自置義倉仍準貞元元年十一月十一日制處分立人之道惟孝與忠孝莫大於榮親忠莫先於竭節惟爾師長卿校洎乎方嶽列藩保乂皇家交修庶績竭節之效既昭乃誠榮親之恩宜洽國典內外文武清望職事官並節度觀察都防禦都團練經略等使父在未有官量授檢校五品官母在未有邑號者各封邑號父母亡沒者量與追贈已經追贈者更與改贈佐運之臣納忠之輔功既存於社稷慶宜及於子孫故周錫土田漢傳帶礪疇其爵邑與國始終固以明報德之恩勸為臣之節其或年代未遠利澤猶存祠宇已變於荒墟裔嗣不編於仕籍思其人猶愛其樹況奠享乏主而不加省録者乎興滅國繼絶代所以禮先賢也修宗廟敬祀事所以教追孝也化俗歸厚此其大端應九廟配享功臣及武德以來將相名節特高有封爵廢絶祠廟無主者宜許子孫一人紹封以時享祀自今以後應有家廟子孫但傳襲封爵者並許享祔於廟其有毀賣私廟及買之者各以犯教義贓論自古聖帝明王忠臣烈士各令所在長吏以禮致祭書敘明目達聰垂拱而理詩稱濟濟多士文王以寧舍已從人故能通天下之志棄瑕録用故能盡天下之才昔在太宗勤求理道納諫如響任賢勿疑致俗於太平垂範於永代朕獲承鴻緒追慕聖猷書之座隅常自警勵朝夕翹想庶聞嘉謀夢寐勞懷思得賢士凡厥在位所宜共成諸司官有陳便宜者各盡所見條疏封進事有冤滯政有闕遺悉當極言無或隱避詔敕不便於時者所司執奏以聞天下有蘊德懷才隱居不仕委所在觀察使表薦當以禮邀致諸色人中有賢良方正能直言極諫或博通墳典達於教化或詳練故事長於著述或精習律令曉暢法理或該明吏術可委理人或洞識韜略堪任將帥者委所在州府長吏及臺省常參官詳録行能舉奏仍牒報吏部其所舉人並限來年七月內到京朕當親試應緣大禮掌職行事仗內引駕攝將軍中郎郎將留守副留守並諸道表狀陪位法駕三引官等三品已上更賜爵一級四品已下加一階其郊壇宮廟行事官仍各賜勳兩轉皇親諸親應陪位者三品已上賜爵一級四品五品加一階六品已下及常選官至選日優與處分白身人及諸色應陪位官等各賜勳兩轉親王大長公主郡主縣主賜物各有差酅公介公各賜物若干段行事室長掌坐齋郎禮生贊者各減一年勞無勞可減者至簡選日優與處分崇賢館學生減策一道國子監學生陪位者及應緣祇應諸司作官直長長上流外要職掌內侍省白身諸州行綱考典兩京耆壽諸色番役當上在城並量留十月番人等各賜勳一轉鴻臚番客共賜物若干神策六軍英武威遠皇城金吾街使諸軍諸使將士應緣大禮宿衛御樓立仗及守本庫本營者共賜物若干端匹天下耆老百歲已上者各賜錦帛五段米五碩八十已上及鰥寡惸獨不能自存者委刺史縣令各加優恤應緣大禮加階及賜勳爵等申報敘奏期限並準貞元六年十二月二日敕處分餘依常式所司不須更作條件赦書日行五百里布告遐邇咸使聞知雲雷構屯宇縣興難非山嶽降神不生良弼非股肱叶契不集大勳故高宗得傅説中興殷邦宣王任吉甫重光周道天寶之季寇陷二京時則先臣子儀翼戴肅宗戡定禍亂再造區夏於今賴之肆豫小子獲纘丕構不克負荷失守宗祧天祚我唐降生忠烈有社稷之臣曰開府儀同三司檢校尚書左僕射中書門下平章事充神策軍節度鄜坊等州管內觀察處置等使京畿渭南渭北商華等州兵馬副元帥上柱國合川郡王李晟沈肅有勇堅明能斷聞難感憤誓軍徂征誠激於衷義形於色自河之右萬里濟師殷然雷奔大盜懾駭屬皇家不造戎帥誘姦重茲播遷郊甸震蕩而晟蓄鋭養士深壘固軍以謀吞元凶以義糾㣥帥躬擐甲胄率先啓行布忠信為軍聲持義烈為戰器廓清氛沴寧復皇都宗廟載安宇宙斯泰佐豫興運時乃茂功德厚者任崇業盛者報重升以元輔建於上公熙庶績而翼宣九歌擾兆人而敬敷五教用疇井賦貽厥子孫與國咸休永播丕烈可司徒兼中書令仍賜實封一千戶餘並如故俟還京後所司擇日備禮册拜宣示中外以彰元勳宰輔之任獻替為務內凝庶績外撫四夷調陰陽以成歲功贊化育而熙帝載若金用礪其弼豫違如旱為霖允從人望矧時屬多難彌切任賢朕未嘗不朝夕論思夢寐懷想道之所在人遠乎哉朝議大夫守戶部尚書兼御史大夫充荊襄江西等道都元帥統軍長史豐縣開國公賜紫金魚袋蕭復性質端亮理識精敏約已宏物體方用圓為邦必表其理能及霤亟聞於鯁議動可成範立不易方守尚書吏部郎中兼御史中丞充荊襄江西等道都元帥判官賜緋魚袋劉從一貞白其行溫恭其文居簡而適用必通體和而臨事有立持重能斷端慤有恆纍更委任多所宏益守京兆府戶曹參軍翰林學士賜緋魚袋薑公輔志懷濟物監必通理主文而諫忠靡退言經始以謀事皆前定道無屈撓智適變通並可以參贊大猷光膺僉屬兵戎未靖期爾經綸都邑未康期爾還定豫一人有過爾是用主伊萬姓不寧爾是用乂欽哉慎乃有位罔瘝厥官復可守吏部尚書同中書門下平章事散官封賜如故從一可守尚書刑部侍郎同中書門下平章事賜紫金魚袋公輔可守諫議大夫同中書門下平章事賜紫金魚袋兩漢制理由乎審官多以牧宰高第入居台輔黃霸自潁川而次遷丞相卓茂由密令而超拜三公蓋以為國本於親人舉賢先於稱職旌能勸善風化大端今革車薦興賦煩人散匡弼寡昧屬於才臣光祿大夫檢校吏部尚書兼成都尹御史大夫充劒南西川副大使管內度支營田觀察處置等使上柱國魏國公張延賞崇飭文行勵精理道踐歷中外所至有聲慮必周密心無屈撓簡廉以肅吏慈惠以愛人明以照姦和以定衆去若始至久而見思秉志不渝課績常最以爾循良之化佐豫綏兆人以爾經綸之才佐豫熙庶績仍資威重兼領蕃維式慰甘棠之思且繼緇衣之美懋昭邦典勿替家聲可中書侍郎平章事依前兼成都尹餘如故論道經邦興戎定亂執是二柄毗豫一人得諸全才康濟大難懋官胙土備舉彞章開府儀同三司檢校尚書左僕射同中書門下平章事兼靈州大都督府長史充靈鹽銀夏等節度管內觀察處置度支營田押蕃部落等使仍充朔方邠寧振武等道奉天永平軍行營節度副元帥柱國樓煩郡王渾瑊神降才傑天資忠厚叶于興運為國輔臣往以盜起上京駕言出狩㣥凶怙亂再犯郊畿時乃奮揚武威董制師律深居籌畫姦慝寢謀當敵指揮士旅增氣危城克固我伐用張重以賊臣蔑恩養寇資亂再罹艱阻播越巴梁時乃並轡載馳執羈從邁有見危致命之節有憂國滅私之誠凜然貞規介若金石縱橫有夷難之略感激陳復國之謀分總偏師徑出重險秉大節以誓㣥帥布寬令以宥脅從師次近郊摧凶靡抗軍臨近甸下邑如歸推成功以不居期盡敵以自效率其全衆揚旆前追雄威疾馳元惡授首柔德懷服餘黨歸心掃闢氛昏安復園寢懋乃嘉績其維格天范燮之讓能耿弇之殄寇總是二美瑊其有焉足以銘勳旗常垂美竹帛宜首台階之列仍疇井邑之賦祇膺時命無替厥庸可侍中仍賜實封八百戶餘如故
