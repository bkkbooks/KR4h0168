body:
  text: 宗閔讀孟軻書至於王霸之說未嘗不嘆曰嗟乎知其時之可者不知時之不可者也即牛鼎之事未嘗不歎曰嗟乎知其身之不可不知其身之可也於是退而著隨論上下篇因明王霸之所以興廢進退之所由同異且以解執事者之云爾客有問宗閔曰孟軻稱齊王由反手謂管仲為不足為若是則功業存乎人不存乎時不亦信乎宗閔曰非也可以王而王可以霸而霸非人之所能為也皆此時也人皆奉時以行道者也不能由道以作時者也能因變以建功者也不能由功以反變者也昔時紂為無道以流毒於㣥邦天下囂然不待文王之仁人然後欣戴之也苟有息肩之所則民莫不疾乎奔走如逃其水火焉當此之時有能扶義陵戎除去大憝則民莫不爭被矢石以報其父兄之仇故太公相武王起而革滅獨夫以成王業宜建其國雖無大惠於㣥邦天下順焉雖文王之仁且欲招而懷之也苟微虐殺之害則諸侯孰肯忘國從亂而違其天子焉當此之時有能匡飭暴彊夾輔王室則諸侯孰肯不爭奉盟誓以休其戰伐之勤故管仲相桓公從而撫之藩衛宗周以立乎霸功亦宜也誠使太公居管仲之勢而能以周王天下乎吾有以知其不能也太公管仲並時而起則吾未知孰前焉故仲尼稱管仲曰如其仁稱桓公正而不譎豈有非其道也而仲尼稱之且曰聖人之門無道桓文之事吾不信也客曰然則古人為天下者亦如是乎宗閔曰固也所由曰道道之不可易禮樂仁義之謂矣所遭曰時時之不可常應天順民之謂矣昔者陶唐氏之為天下也法天而則地授時以任民垂其衣裳而天下無為推其誠心而刑罰不用當此之時各順其情性樂其習俗保其奉命故謂之至闕一字時一大變及有虞之為天下也始放四凶以除民害是故勤而不德時又一變焉及夏后氏之為天下也始用肉刑以寒民心是故威而不能懷時又大變焉及湯武之為天下也始及干戈放殺昏虐是故勇而不能善時又大變焉及桓文之為天下也始合諸侯以匡王室是故順而不能革彼三王二公皆元德也夫豈樂為相反哉勢異則事殊時遷則俗易執一不可以通變循古不可以制變是故觀時而立功論世而創業唐虞各以其道而自帝三代各以其變而自王二公各以其時而自霸不其大哉吾故曰禮以因人苟有以因之不必法乎古也樂以和人苟有以和之不必法乎古也兵者除亂苟有以除之不必法乎古也為政者平理天下必法乎古人也况古之行法豈有常亦有從其宜當其道天下隨時而已矣然膠柱鼓瑟惡能成其音聲哉若乃誦前聖之言守已行之制遭變而不通得時而不隨夫如是可謂王莽宋襄公之言不足為有道者也昔者王莽嘗為德化矣不問可否語必援經不量人心動必據古於是天下煩潰從而喪之此不知變之禍也昔者宋襄公嘗為仁義矣楚人尚詐我必信彼兵尚奇我必正用欲以興商道霸諸侯一戰而為敵所執再戰而身死國削為天下僇笑此不知時之禍也易曰功業見乎變又曰隨之時義大矣非天下之至明孰能通乎變非天下之至聖孰能通乎時且軻之所言前王之遺跡矣君子亦云道而已矣何必履其故跡耶嗚呼自周室下衰諸侯放恣仁義之道隨沒於干戈微管仲中國幾為戎矣而曰不足為也孰可為之哉客有曰王霸之事既聞之矣或言伊尹負鼎百里奚飯牛而孟軻非之曰未聞枉已而直人者也又曰聖人之行不同潔其身而已矣又可信乎宗閔曰非也聖人以枉道為恥以屈道為辱不以屈身為辱唯守其道故雖辱其身而進焉非其道故潔其身而退焉進退豈有他唯道所在而已矣天生聖人者孰為然哉為行天下之大道也立天下之大教也利天下之人民也故天下有不由其道者聖人憂也天下有不知其教者聖人憂也天下之人民有不寧者聖人憂也聖人之職也如此聖人之憂也如此得其時遭其會上有明天子下有明諸侯遑遑然求合豈不曰今辱吾身則天下蒙其安百姓得其利不辱吾身則天下不蒙其安百姓不得其利吾寧以一身之故而危天下病百姓哉此伊尹之所以樂為割烹而不顧其恥也若不得其時不遭其會上無明天子下無明諸侯則必汲汲而求退豈不曰今辱吾身澤得施乎民道得行乎世吾往也今不辱吾身澤不得施乎民道不得行乎世吾止也雖然吾豈圖是安哉亦將激偷幸之風全百姓之教以為乎後之人耳此顏回所以樂窮巷而不動其心者也故易曰時止則止時行則行動靜唯其時故傳曰富貴可求雖執鞭之事吾亦為之取舍唯其義也然則趨時不可以潔已喪義不可以圖身亦猶追亡者趨拯溺者濡豈樂為之哉其勢則然也故曰觀逐者於其反也觀行者於其終也奈何君子之道豈可以小知哉非匹夫之為諒也觀懸爇之危有救之道小霸則可王則不可而曰非堯舜之事吾不忍為之是知堯舜之道乎是誦堯舜之言乎且軻之言過矣所惡夫干進務入者懼其為利也苟不知為利於辱何有哉客曰然則仲尼不蒙恥而進何也宗閔曰仲尼將蒙恥而不得當也豈不願之乎當仲尼之行也上之人害其道下之人壅其言猶且歷說諸侯環軒於天下冀幸時君之一悟王風之變其存心遇合惓惓而不能已焉終無可奈何故逐於魯斥於齊圍於匡蒲厄於陳蔡栖遑狼狽於楚鄭之間其道逾窮其進彌塞而不知者以仲尼之為欲顯榮其名位富貴其躬者也孰知聖人急於扶世而不恤其難者哉故嘗稱伯夷不辱其身且曰我異於是及公山弗擾以費畔而欲從之豈不將由是道行捨其恥焉可也今牛鼎雖為辱猶不愈於公山氏乎因斯而言仲尼亦有枉也惡有仲尼枉已而不能直人哉安得乎潔其身而已是故水受濁以濯物不傷其清石受磨以利物不磷其堅君子屈已以教人不害其義嗚呼進取之士誠能察伊尹顏淵之所以進退思仲尼執鞭亦為觀大易動靜不失其時後匹夫之果其行無忘兼濟之道則雖有甚於牛鼎之恥吾將歌誦之不暇又何譏焉若果孟軻之言則人之相率獨其善而已矣惡能理天下哉元和十五年夏六月有詔天平軍節度使檢校禮部尚書兼鄆州刺史御史大夫扶風縣開國伯馬公作三廟於京師秋九月新廟成冬十月有一日命公母弟推攝祭行升祔之禮既卒事推率其族人耋老相與言曰馬氏之先以功名顯於周漢之際下魏晉氏族世寢衰今公起自窮身遂為方伯克有宗廟勤亦至矣願得銘之於石以示後人俾其無忘艱難而世世享祀不絶其亦可乎咸以為然公名惣字會元扶風茂陵人也昔舜伯益掌上下草木鳥獸歷夏殷周世不失職其後造父事穆王有勞賜之趙城氏後七世至叔帶去周適晉事文侯後三世生夙為晉三卿遂專國事後八世與韓魏三分晉地建國稱王後五世趙之公族有名奢者將趙有功封馬服君其子孫因別為馬氏自奢七世至通為漢武帝侍中以二千石始自邯鄲徙茂陵於是屬右扶風故號扶風馬氏在三國時多仕於蜀更宋至宇文周連連有人公之五代祖曰士儒為隋江亳二州刺史亳州生伯達入唐舉進士為懷河內尉樂黃老長生之說棄官從孫思邈遊隱於茅山河內生頠舉進士又舉八科士於高宗天后朝為御史尚書兵部郎屬天下羅織熾起以不證皇族罪用失其官已而嘆曰吾雖不逢吾子孫宜有達者兵部生光粹五歲而能詩舉進士為滎陽令功化甚美縣人傳之滎陽生皇考諱賅年十歲則受左氏春秋日記萬言後方以經明行高歷仕諸侯由檢校尚書職方郎中為吉州刺史治行卓尤升聞於朝進褒州名加賜命服竟以官卒公既孤追念世業以為五代祖有文才仕隋官不過郡吏高祖父懷至道曾王父有陰德鬱積而未發王父皇考惠澤在人而皆存不議於朝歿而祭於寢重祥纍慶其不在茲乎乃刻心自修以道迎天之休學明德成名聲四聞於諸侯辟書交至公又言曰古之貧無以祭必求仁者之粟然則不以其道雖日用三牲不如魚菽之為潔也故在滑與中貴人忤在閩不協于柳冕是以濱於死而厄窮十年公亦不悔憲宗即位知公之賢追刺泉虔二州以御史中丞都護日南以國子祭酒觀察於桂以往升御史大夫師於百越徵拜尚書刑部侍郎尋副丞相晉公討淮西淮西平遂代晉公鎮其地加工部尚書治蔡州居一年蔡人和且寧遷於許州而並有殷蔡朝京師留拜禮部尚書華州刺史而為鎮國軍元和十四年齊寇始誅朝廷以其地廣人衆易生搖動析其都府別為一道而分曹濮之田以益之命為帥齊人之不廷於今六十年民窮而無告兵驕而好亂公至則布以誠信示之法式纎悉而不苟柔而有威居一年人盡安田益闢三軍百吏上下有節上聞之進封扶風伯加銀青光祿大夫復追贈王父為尚書工部郎中祖母韋氏為扶風郡太夫人封皇考為兵部尚書母鄭氏為滎陽郡太夫人以裦寵之命立三廟備致祭以告成功嗚呼人之富貴顯榮以祀其先祖世多有之如公之起不失政終始如其志者斯亦難矣得不謂之大孝乎明著後世可以無愧銘曰今皇帝即位六月東藩臣惣使使者上言有司以臣名數謬登禮當廟祠皇帝曰昔我憲考聰明聖武兵衛四出掃定郡邑愛敬忠良為民父母實命汝惣作藩於東始平淮亂遂撫鄆封庇宇二邦仍世不虔民痛無告卒驕而頑苞奸窺隙以萬以千汝來尸之莫不順然朕初即位汝適報政疇汝爵邑書於功令惣拜稽首敢辭休命皇帝曰咨我無汝私蔡人不龔汝則治之齊人不安汝則綏之勤亦至矣而賞何卑命汝為伯即封於岐惣拜稽首非臣之力陛下先臣實有明德臣蒙其慶幸以守職皇帝曰咨我今有詔追榮爾先以昭爾孝啓爾土宇錫爾宗廟惣拜稽首死無以報乃命季推作廟京師由門及堂不逼不夭夭心礱楹刻桶秩秩施施是卜是擇仲月吉日三廟之主第升於室登降享獻夔夔齊慓公猶居外推奉以行克薦誠敬如公在廷神祇安樂福祿來並維公之興蓋自諸生維艱維難乃克有成咨爾後嗣無忘此銘上即位五年正月丞相左僕射太原王公以癸已發疾其明日遂薨於位天子震悼慜惻遽命內謁者詣其室索其所以飲食寢作之端既詳其無他狀遂贈布帛菽粟率用峻等既又不塞痛軫之意加內府之絹千匹以錫之為之罷朝三日命兵部侍郎一人持節駕駟馬簫鼓出自正殿直抵柩前冊公為太尉葬有日官給祕器及就途遣王人亟臨視之命羽葆旗常輅車之飾皆及墓俟其返虞鼓聲四節於里第而還示不與常制等也其子鎮以宗閔晚陪公於相位之末稍窺公之行請銘其烈以垂於後且不宜拒遂鋪其犖犖所能言者於金石云公諱播字明揚太原人周靈王太子晉之後以歷世為王因而受氏高祖滿汾州長史生大璡嘉州司馬給事中司馬生升咸陽縣令太子少師少師生恕楊州倉曹參軍尚書左僕射公僕射元子也忠敬而本仁明而有制內顯而敏外肅而和貞元十年舉進士第是歲策賢良以直言校書於集賢殿其言平戎經國之術粲然可舉調尉盩厔斷獄首出御史中丞李汶愛之奏為監察御史按雲陽丞源咸季以贓免用疑文不宜調而調因謁於臺遂捕劾之追奸胥窮律旨奏流咸季刑曹郎罷所居官給事中以省詔非是奪俸緣而坐罪者甚衆自是風聲不可遏矣為侍御史時京兆尹李實文皇寵委能禍福卿士凡其榮衰繫所附背舉朝迎避其鋒公在途而實來揖公移文詆之其詞可羞實遂奏公為三原令求其不足於禮以持之公至尹署洎郡吏之館還其邑敬府之禮無不具實既出其算反加畏焉縣之編於戶者多中貴人前令率不能自為其政弛張牽之公悉召所謂貴人者入坐堂上拜曰敬桑梓宜如是也邑人大駭從其所指為長安令朝廷方恩于頔而以帝女嫁其子民有與于氏蒼頭同盜人馬者前令捕民而縱其蒼頭公始至縣即立取其奴與民均其法知御史雜事京師饑穀起價京西諸侯相率閉粟公移之書徵秦晉泛舟之說西鎮惴惴收去條令粟流於秦元和四年為御史中丞歲中知京兆尹六年為刑部侍郎充鹽鐵轉運使上言流人會赦而歸獨配囚為隔遂無還者請率以七歲為竟至今用之尋加禮部尚書益以御史大夫又以戶部尚書節度西蜀長慶初覲穆宗言中外之事遂留為刑部尚書復斡鹽鐵冬拜中書侍郎平章事仍其職匡維激發始以進賢為急上方有意河朔以財賦始出於方土二年公用相印為淮南節度使以其職隨之四年言事者謂鹽運之設宜留京師用制方土加檢校司空去其使未幾上念公成法又以使屬公加司徒今上踐祚急召徵公至即拜左僕射同中書門下平章事仍其使尋兼太清宮使纍進爵至太原郡開國公食邑二千戶進階至金紫光祿大夫年七十二而薨公入官三十二政逮事六帝出統楚蜀之師入極台宰之尊前後三總鹽鐵既出又復幾二十年天之所覆地之所載寧有獨私於公耶必有以當其然也一署吏苟不犯無能奪其任者歲時奏課上於策太史胥次遷亦如之故人用安其為善莫有欺公者雖遠至海裔若總轡笞捶窮年不死一吏貶一職而群務自濟凡朝廷平淮取鄆屠汴下滄景干戈不息者十五六年饋餉資費隨其緩急而立辦沛然若神給其間溝琵琶導潁河以漕輕舟師人坐受其飽疏三門挽沉石以濟巨艫關中遂忘其饑薦皇甫鎛之強敏而鎛反短公於上公猶不知上謂其長者論景宗信矯制釋逗撓之將期必抵於罪時服其敢為深涉徐境導齟齬而為忠概人曰真宰相器也權征之外有雜緡率貢內帑號為羡進貞元中歲不過十二萬緡及公歲貢百萬緡凡國有大征伐不慮其費之有無洎丞相晉公專征討之事兵食之給悉出於公公方從容以贊其成及滄景平公有叶力之助自御史中丞京兆尹總賦秉政未嘗書笏為記善於啓奏天子不能自守其喜怒公以專志持務密匡於上行已寡徒不喜伐露由是數帝任遇多被恩澤權利去留如在諸已人多意公能詭合於時及公再持相印與晉國洎一二公同輔於上趨嚮甚直雅符於道苟所舉公是公必扶之即非是公遂默默不和由是上知公厚重而同列亦聳待之乃見公之所為與嚮之所知者期公蓋甚戾也公既屈於名而伸於富貴豈非盛德君子神明之所祐耶故夫人清河崔氏給事中鋭之女嗣子式祕書丞砥服名教不以丞相子自居其身次曰冰始授京兆府參軍事器度宏遠公之仲弟曰炎季曰起與公三人俱用文學奮於江左西遊長安七中甲乙時議偉之公歿不幾日而起以戶部尚書司國之計門闥之士咸來哭賀郡吏之執籍繁夥一如公之時其亦於世難求也其從事故相國程公今荊州相國段公文昌其他分居中外羅諸臺閣者不啻三十人銘曰在歲太和惟帝聖神圖任舊臣乃相太原惟是太原福祥其奔再持化權樞揆聯聯兩統劇藩楚淮蜀坤始自元和公秉貨泉憲穆敬文洎茲聖君四帝財征去公孰親惟煮惟鑄惟範惟聚東掃北殄上之所怒帶甲百萬餱食惟巨俾公尸之不勞而具變通以時物無滯遺綱條一施莫越其規御衆以仁中控其機信行恩馳罔有詐欺公之惟揚漕務其將公之留庭職與公並首尾貫聯幾二十年相府使符隨其興殂公之敏智顯爵自至不紛其外姑直其裏始承其風畏公之邃及與之同泳公之義仁人之跡歿而乃熾揭於茲碑不仆不倚庚子歲嗣天子即位謂百執事曰先皇帝平定海內中興我唐惟二三臣工孰為大僉曰邠帥司空光顏其尤者始戰於夏又戰於蜀大戰於蔡終功於齊皆著嘉庸實為上將天子乃召至京師禮之於庭命為宰相賜甲第內宴以遣之曰姑復而所異日有事吾與公圖之居一年燕趙繼亂天子詔公以許昌精兵渡河北討未戰而軍罷留鎮於許昌又數月汴宋軍反逐其帥立其次將㝏以請天子聞之怒又詔公以全軍征之公既拜敕自以麾下萬人晝夜兼行一戰而摧其鋒遂傅於城下賊衆惶駭斬㝏首以獻汴宋平朝廷冊功拜公司徒兼侍中師還大饗勞於是百城之長與三軍之吏皆入賀讚詠功德公泣且曰此乃天子神靈賢士大夫之力光顏何有也然光顏曾祖父始自北土歸於天朝世總部兵為國保障先公太保功烈尤多而皆從事諸侯止於裨將儲休委祉集光顏弟兄今先人盛德未彰而光顏專享其報光顏之罪也何敢言功其軍司馬武功蘇遇起而言曰公位冠㣥后勳在王府明著先公之美於後世於古為可宜得宏達博雅之士以文之乃久而益傳使使請銘於禮部侍郎宗閔宗閔承命惶恐辭不敢當伏念百吏於宰相皆僚屬也又何敢讓退視公行狀而著其語曰太保諱良臣其先皇帝之子曰昌封於弱水之北因其夷狄而王之其後子孫世世為大人號阿跌部遂以為氏至太保王父諱賀之雄武而多大略諸部君長爭歸之嘗思因事立功以顯名中夏當此時唐初受命太宗文皇帝已即大位公率其所統南詣靈武請為內臣太宗召見與語奇其材能拜為銀青光祿大夫雞田州刺史充定塞軍使賜車服器用以寵之命築城邑以居始有宮廟官屬之制而族部滋益大矣當西戎北虜之間甚有威聲卒皇考諱楃氐豐嗣立襲雞田州刺史以功加開府儀同三司太常卿上柱國卒贈工部尚書太保素以厚勇敢為部下推服既襲位每謂其將校曰自吾祖歸國蒙唐厚恩願憑諸君期以上報未幾安祿山用幽燕徑卒反濟河陷洛而崤函不守元宗幸巴蜀肅宗幸靈武公聞之慟哭請於衆曰吾生平志業嘗已布於諸君今王室多故是吾死節之日諸君能從我乎衆皆感激許諾乃馳詣行在肅宗嘉之委以腹心王師收兩京平劇賊公之功居多拜開府儀同三司雞田州刺史充朔方先鋒左箱兵馬使事太尉汾陽王汾陽王愛公沉默多斷軍中之事一以咨公尋遷御史中丞別職如故以寶應二年七月二十三日薨於河中理所享年三十有六以貞元十一年八月葬於太原府城東南孝敬原太保少為阿史那可汗所重以其貴女妻之實生三子長曰光玭為朔方都將不幸早夭次曰光進朔方節度使刑部尚書薨贈左僕射少即司徒也元和中憲宗章武皇帝以僕射司徒功在第一賜姓李氏屬籍於宗正追封公為太保夫人史氏為燕國太夫人銘曰太保之先蓋出軒轅奄有北狄世為大人綿綿千載以至光祿雄材多斷率衆內屬是時闕一字帝初有天下實命光祿定居朔野錫之城邑車服旌旗北制獫狁西當昆夷尚書承業克有威令統部益繁兵車尤盛是生太保兩有忠孝誓酬國恩以承祖教燕盜南叛肅宗西巡傾河陷洛遂擾三秦公聞慟哭悉率騎士馳詣行在請先致死帝用嘉歎俾雜禁旅夙夜勤勞在帝闕一字所帝收京闕因定兩河摧鋒陷陳公實居多闕七字位品秩威儀俾同三事雖受嘉命未登大臣不闕一字其德乃相後人僕射繼武勇如罷虎闕二字桓桓殿茲西土司徒特盛為國上公入持相印出錫彤弓闕十六字帝嘉元侯追命祖考既寵尚書遂尊闕二字推功建德賜姓命氏籍于公族同我宗子存歿之榮古今孰比公諱璘字元亮其先琅邪人曾祖諱闕一字媯州刺史大父諱暉遊擊將軍㯋王府左闕一字事典軍贈青州刺史烈考諱令奇昭義軍節度副使試太常卿開府儀同三司琅邪郡公贈闕一字部尚書左僕射公實僕射長子初公與先公俱為薊裨將會薊亂同奔於潞潞帥薛嵩署為軍副嵩卒其地分移隸於魏魏帥田承嗣知公父子有材略各以左右職處之承嗣死子悅代為帥悅與李納輩鄰封通謀不軌引兵寇闕一字東攻礠刑天子命並帥馬燧潞帥李抱真督諸軍合討之戰於洹水悅軍大敗王師進逼魏城時公與先公在重圍中悅賊虐日甚衆心離析先公密語公闕四字十九年閲事多矣不能遠引古自安史以還亂臣賊子甚衆于今有噍類遺種者乎今悅叛亂有狀覆滅無日吾豈能以黃耉之歲陷赤族之誅乎汝部下闕三字騎徑卒若捨吾為質率屬歸降不唯闕二字吾心亦足斷賊臂全家徇國吾死無恨可不務乎公泣曰悅忍人也某苟脫去將不利於大人奈方寸何先公曰不然闕一字師四合吾與汝猶几上肉待俎醢耳且汝不去能全吾乎是父子俱死於逆地汝從吾吾死不朽汝不從吾吾亦死吾目不瞑死一也而逆順禍福相去萬里闕一字何疑焉公俯伏不能對時燧知公才略勇敢使間以禍福諭公與先公之言略同繇是公計遂決乃使家豎潛通其誠燧因遺公犀帶以示要約公於是率所部鋭師降燧由是寇始弱而王師益壯燧既納公署為軍副以聞詔授特進試太子詹事兼御史中丞封義陽郡王實封百戶既而悅引責先公先公讓曰公逆親背主亡在旦夕某教子效順殺身成仁偕之死某愈於公遠矣又何責焉悅大怒躍起先公從容不撓視死如歸獲所之禍遂延於家屬俄公仰天搏膺闕一字號闕一字絶泣血忍死竟終先公之志焉燧闕一字就撫勉復列上其事德宗皇帝嘉而悼之詔公起復加左散騎常侍兼御史大夫賜晉陽第一所祁縣田五十頃追贈先公戶部尚書貞元元年李懷光寇蒲坂詔燧以河東之師討之公為燧腹心之將將五千先濟河與西師合勢居要同收長春宮降徐庭光懷光平加賞封闕一字戶二年西蕃寇邊攻逼鹽夏公闕一字偏師擊虜解圍而還三年從燧入覲擢拜輔國大將軍行左神策軍將軍知軍事復賜靖恭里第一所藍田田十闕一字頃貞元初德宗之幸梁還也懲神策軍兵闕一字將輕緩急非有益乃搜卒謀帥以公充選時謂得人禁暴戒嚴上心倚賴闕一字年丁鄧國太夫人憂起復本職初先公之罹魏禍也太夫人潛匿以免及悅死詔迎於魏加號鄧國夫人賜宴於別殿以示寵異上又思先公之忠烈再贈尚書左僕射公之弟琳授檢校太子賓客琅琊郡公瑤授欣州別駕琅琊縣男皆號開府分領禁職賞與公同忠勞也公居環衛凡十二年上知其忠勤謹重方將大用不幸寢疾以貞元十四年七月二十四日終於靖恭里賜第享年六十有五贈越州都督其年黃鐘月庚申日葬於京兆富平之薄臺從先僕射之兆也夫人長樂馮氏封長樂郡夫人先公而歿至是祔焉有子四人曰濟曰闕一字曰闕一字曰澤徹前為邠寧節度使後為河東節度使太原尹北都留守檢校兵部尚書御史大夫琅琊郡開國侯食邑一千戶襲實封一百戶今上元年再贈公刑部尚書贈夫人長樂郡太夫人從子貴也按國典官至三品墓得立碑又按闕一字葬今諸追贈官品得同正經曰立身揚名以顯父母孝之終也禮云銘者論撰其祖先德善功烈慶賞名聲明著後代所以崇孝也順也今苻氏作率舊章碑於墓不亦宜乎今琅琊侯論撰先德銘於碑其可闕乎矧僕射之忠若彼尚書之順如此舉而書之可以勸天下之為人臣人父者琅琊公之顯揚又如此附而贊之可以勸天下之為人子人孫者將欲篤前烈垂後嗣俾永永有光重為銘云國步將泰必有忠傑家聲將作必有孝節烈烈苻氏世生才哲惟公先公越在叛戎相時度勢禍將及宗斡逆杖順天誘其衷捐軀以義教子以忠遂秉大節密授于公惟公桓桓千夫之雄違情稟令號泣旻穹天啓其初神贊其終克繼先志卒成後功天子嘉之寵命有融乃膺任用乃著勳庸出領王師掃蕩關東入統環衛肅清禁中再加真食大啓土封弄印珥貂焜耀厥躬噫寵非不隆秩非不崇不將不帥人望闕一字充善闕一字慶流生琅琊侯念祖顯父厥德聿修授金戊邠郊移斾并州西疆北門克壯其猷文承詩禮武襲弓裘三葉濟美時無與儔蒸蒸琅琊揚名報恩告第三命賁靈九原澤覃窀穸銘煥璵璠既肥其家又大其門貽燕之謀垂裕後昆裦崇之渥自葉流根禕乎哉神嶽有基靈河有源古人云非此父不生此子非此祖不生此孫誠哉是言誠哉是言
