front:
  text: 全唐文欽定全唐文卷七百十四宗閔字損之宗室鄭王元懿之後貞元二十一年進士穆宗朝為中書舍人文宗大和二年以吏部侍郎同平章事纍轉中書侍郎集賢殿大學士七年罷為山南西道節度使復為中書侍郎知政事封襄武縣侯坐交通劉稹流封州宣宗立徙郴州司馬卒
  hash: sha256:b70959bba23881dbbd6674d565a668970ec8bf85ba5d147f6f25c5162ad92842
