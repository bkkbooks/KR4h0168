  text: 全唐文欽定全唐文卷七百四十五元褒宰相元輿之弟登進士又擢賢良方正終司封員外郎
  hash: sha256:167053fe1104cb8149d4124671bad25e3c497f3fb7280ff79d5ac636b939fd26
  markers:
  - {type: head, offset: 14, content: 舒元褒, id: KR4h0168_NFKB_745-h1, level: 1}
body:
  text: 國朝故事供奉官街中除宰相外無所迴避溫造蔑朝廷典禮凌陛下侍臣恣行胸臆曾無畏忌凡事有小而關分理者不可失也分理一失亂由之生遺補官秩雖卑陛下侍臣也中丞雖高法吏也侍臣見凌是不廣敬法吏壞法何以持繩前時中書舍人李虞仲與造相逢造乃曳去引馬知制誥崔咸與造相逢造又捉其從人當時緣不上聞所以暴犯益甚臣聞元和長慶中中丞行李不過半坊今乃遠至兩坊謂之籠街喝道但以崇高自大不思僭擬之嫌若不糾繩實虧彞典問皇帝曰朕恭守憲祖中興之運穆宗紹寧之業寅畏兢翼亦免荒墜諸侯忠上而奉職卿士循法而恪官四夷內向兆人休息至於屬統垂文程示後代終有致人之意未有理人之術古人云希顏之徒亦顏之流也又曰舜何人也予何人也予竊不讓欲追蹤乎三代俯視乎二漢陶今俗于至道躋兆人于泰和子大夫皆蘊器應薦憤憤悱悱思所以奮者於日久矣當竭其慮開予鬱滯夫禮樂刑政理之具也禮樂非謂威儀升降鏗鏘拊擊也將務乎阜天時節地利和神人齊風俗也刑政非謂科條章令繁文申約也將務乎愧心格恥設防消微也必有其論何方致之四人混處遷於異一作費物歷代已降皆所共患士本於儒而有詭道之行農尚篤固而多損本之心工繕用物而作雕磨之器商通有無而賫難得之貨思矯其獘必有其術漢高之基稱蕭曹孝宣之興稱丙魏朕觀其書燦焉盡在我國家之盛其紀年則曰貞觀開元其輔相則曰房杜姚宋朕觀其書則拔㣥絕類者不能相遠然兩朝之盛四子之能不可誣也將與元化合德謨謀而無際歟為史官詞志不能久於其事詔令作其事業歟口食至多而墾闢者惰供億至眾而財官是空官無闕員而家食者告困德澤仍臻而鰥弱者未贍必有其旨何以辨之無泛無畧無游說無隱情以副虛求朕將親覽對臣久訝今之天道運行地力負載生生滋息皆與堯舜禹湯之時不異及言其理亂安危則邈然數千里而遠臣因靜索其源蓋由時君之所致也在禹以夏王桀以夏亡在湯以殷王紂以殷亡是古今有異耶直人事而已矣臣嘗病之願抱血誠而寫置於天子之前天路甚高無由上達所以卒歲於悒如抱沈痼天意似知臣有移時之術而能懇懇不已幸使臣不為霜露所薄而無犬馬之疾得遭遇陛下嗣位之日首以直言極諫徵夫賢良方正之士而虛心以問之此乃五帝三王之所難行而一朝陛下盡能行之所謂天地交泰之時也臣不敢懼避願就湯鑊之誅願盡吐成敗利害之根願解天下元元倒懸之急也亦不枝蔓藻飾以為言上緣聖問下切人情度陛下必能行之者而後言之伏惟陛下察其忠而諒其直實天下幸甚謹昧死上言制策曰古人云希顏之徒亦顏之流又曰舜何人也予何人也予竊不讓願追踪乎三代俯視乎二漢陶今俗於至道躋兆人於泰和子大夫皆蘊器膺薦憤憤悱悱思所以奮者於日久矣當極其慮開予鬱滯者陛下首問及此有以見聖人思慮之深也臣聞揚雄有希賢之言顏淵有慕聖之語皆謂生雖異代但行其道即其人也今陛下蘊上聖之姿執大寶以御乎人夫寒暄發於咳唾生死繫於喜怒其力與天地爭大其財與泉源不窮臣竊謂以此之力提五岳而塞乎四海也今賜策曰予竊不讓欲追踪乎三代俯視乎二漢此乃陛下謙光之至也微臣敢不拜舞稱賀條列而言乎臣聞三代之理以義化天下其猶天地之無不覆載日月之無不照臨雖負至聖之姿常若不足在求賢以輔張諫以規憂天下之憂樂天下之樂未嘗枉一物而私其功也三代以後亦求其所理之門何者足以立功而親人此道苟失在未嘗有思天下之苦既不知其苦必輕用其人所謂輕用者非謂日殺不辜蓋以天下之力既困而上之用無節上之用無節則有轉死溝壑之患生於無節足以為生人之刀鋸也又有甚於此者則爵祿遍於輿臺威福生於左右刑罰不中法令不行天下昏亂猶不知覺自以為萬代之安此以求理何異緣木而求魚哉今陛下欲追蹤乎三代則莫若用三代之理何者伏望陛下以其德理天下則思求賢以廣其覆載以貞明並日月則思納諫以助其照臨察逆耳之言則知其為端士而進用之聞悅心之語則辨其為邪諂而斥遠之御一膳思天下之饑披一裘思天下之凍覽國史思祖宗創業之艱難覩貢賦思黎氓耕織之勤苦居宮殿思採伐之勤勞視嬪嬙思離曠之怨恨聲色遊宴悟伐性之言馳騁畋獵念垂堂之戒戢六軍無令恃寵抑近習無縱威權無使有求恩之名無使有得幸之號無使內干外政無使中奪外權無垂飾喜之賞無行遷怒之罰無求悅耳之華無好蕩心之巧此乃三代明王理天下之術也陛下誠能慕之則宜法而行之行之不已自然遠超於三代矣况俯視二漢乎此則陶今俗於至道躋兆人於泰和又豈勞聖慮哉制策曰夫禮樂刑政理之具也禮樂非謂威儀升降鏗鏘拊擊也將務乎阜天時節地利和神人齊風俗也刑政非謂科條章令繁文申約也將務乎愧心格恥設防銷微也必有其論何方致之者臣聞禮樂刑政天下之本也三代之理未始不先於禮禮明則君臣父子長幼尊卑識其分而人倫之序正矣人倫之序正則和順孝慈之慶感於上所以阜天時也貴賤之位別於內則奢侈耗蠹之獘息於外此所以節地利也自然上下交泰而天下之心悅天下之心悅因可以達於樂樂達則神人自然和矣神人和則風俗自然齊矣仲尼曰安上理人莫善於禮移風易俗莫善於樂此之謂乎固非謂夫威儀升降鏗鏘拊擊也伏惟陛下舉三代禮樂而行之而不以形聲之為貴則可以阜天時而節地利和神人而齊風俗刑政者國家之大典臣聞貞觀之理刑政甚明夫刑者期於無刑政者期於無政蓋以一人而齊天下能用之者則理不能用之者則亂刑設而不犯畫一之謂也政立而不易必行之理也然後能去奸宄懲暴亂而養育黎人也然其患在於任情好惡遠近雷同雖堯舜不可為理也况今人人自為強禦欲其愧心格恥設防銷微無由得也何以言之今軍伍之人陛下之人也府縣之人亦陛下之人也既皆陛下之人則刑政所宜共守今有惰游無賴之人不修本業輸貨榷酤苟求微利一入北軍張影附勢憑託附籍恣行兇頑執憲與尹京者持陛下刑政以繩其罪主者則云彼越局而挫我也遂夸其威權以固護之持刑政者無由而禁徒有城狐社鼠之歎耳此陛下刑政不行於轂下况其遠者乎其外則守土之臣或多自開戶牖征徭役稅不本制條刑罪重輕率於胸臆此陛下刑政不行於內地况其遠者乎伏惟陛下明於用刑則可與期於無刑矣豈止於愧心格恥乎率力為政則可與期於無政矣豈止於設防銷微乎伏惟陛下徵貞觀刑政而行之則天下之人有恥且格矣制策曰四人混處遷於異物歷代以降皆所共患士本於儒而有詭道之行農尚篤固而多捐本之心工繕用物而作雕磨之器商通有無而賫難得之貨思矯其獘必有其術者臣聞明君在上制四人之業不使為異物所遷今士之為儒非不強學而有詭道之行者其獘自陛下親巧諛而疏骨鯁也農人之業非不篤固而多捐本之心者其獘自陛下嗜珍味而惡菲薄也工人之藝非不專而作雕磨之器者其獘自陛下厭朴素而尚淫巧也商人之利非不多而賫難得之貨者其獘自陛下貴珠玉而賤布帛也伏惟陛下斥巧諛則士無詭道之行矣絕珍味則農無棄本之心矣碎淫巧則工無雕磨之器矣賤珠玉則商無難得之貨矣矯獘之術其在此乎夫矯獘在先原其本然後責其末何者制士人之祿使稍優寬農人之稅使加薄酬工人之傭使當直來商人之貨使其通如此自然各修其業矣復敢有為異物所遷則陛下之政刑存焉制策曰漢高之基稱蕭曹孝宣之興稱丙魏朕觀其書燦焉盡在我國家之盛其紀年則曰貞觀開元其輔相則曰房杜姚宋朕觀其書則拔㣥絕類者不能相遠然兩朝之盛四子之能不可誣也將與元化合德謨謀而無際歟者臣聞元首以輔弼興理自古王者期建非常之業則必有非常之人以佐之漢之高祖資蕭曹孝宣憑丙魏一則以創業一則以中興其道可得而知也漢祖起於布衣以有天下大敵未滅日月持久蕭曹匡輔謀計居多所以覺其功業盛也孝宣起於人閒霍光歿後方親政事然霍光雖乘時之功不通經術非王者之佐政獘尤多丙魏乘獘之餘以竭股肱之任卒致中興所以覺其輔佐之勞也我太宗元宗明聖之資海內從化而房杜姚宋當至理之代皆盡啟沃之力咸有匡輔之道主聖臣賢君臣道合是以貞觀開元與漢之功臣有異而兩朝功德事業光乎史冊陛下以拔㣥絕類之不相遠者臣嚮所謂主聖臣賢道合交泰正史氏無德而稱焉制策曰食口至多而懇闢者惰供億至眾而財官是空官無闕員而家食者告困德澤仍臻而鰥弱者未贍必有其旨何以辨之毋泛毋畧毋游說毋隱情以副虛求朕將親覽陛下終問及此有以見聖心憂勤之至也微臣敢有所隱而不盡言乎陛下以口食至多而墾闢者惰供億至眾而財官是空非上失勤儉之化而下棄其本不務乎夫欲墾闢多而財賦足者莫若勸人之務本務本在百姓樂其業而墾土以穀樹桑以絲此皆取之厚地厚地之出如泉源焉豈有窮竭耶今捨此不務而欲墾闢之不惰不可得也今陛下宮室池臺之盛則人務採伐而輒趨斧斤之利此耕夫十去其一也後宮羅紈鉛紅一作錦綺者數千人日費數千金此耕夫十去其一也尚食之饌窮海陸之珍以充圓方一飯之資亦中人百家之產此耕夫十去其一也廄馬與鷹犬之多皆使厮養之其芻粟梁肉之供一物之命有甚於人此耕夫十去其一也車輿服玩皆錯以兼金鎪以美玉或文犀瑁大貝明珠齒革羽毛窮異極奇採之者或航溟海梯崇山力盡不回繼之以死此耕夫十去其一也有假於浮屠削髮惑眾而建立寺宇刻雕像形度天下之多不下數十萬此耕夫十去其一也姦吏理人苟以應辦為先急徵其租厚剝其賦以媚於左右此耕夫十去其一也上好珍奇則商通無用之貨上好伎巧則工作無用之器器與貨皆出於人力乃委於無用之地此耕夫十去其一也此數者乃困生人之力而竭國用之甚者陛下誠能慕乎茅茨之化繩浮屠惑眾之教抑奸吏賦斂之心閉工商無用之事則百姓皆歸本而墾闢矣何慮乎口食至多哉陛下誠能節嬪嬙之侍斥犬馬之繁減海陸之溢省車輿服玩之珍則賦自然足何慮乎供億之眾哉故語有曰百姓足君孰與不足使伊傅復生為陛下計者不能易此也陛下以官無闕員而家食者告困豈非擇才授任之不明歟遷轉課績之不覈歟今自三事及㣥有司皆有其官官有其祿考成在於歲滿則轉不知陛下何以選而致之哉臣聞詩曰濟濟多士文王以寧言內外各用其人為理而天下安寧也今多士盈朝而使陛下憂勞若此雖無闕員將何用哉其一作甚失文王以寧之謂也陛下何不各於其局而考其課績有其效者則升之無其效者則退之如此則尸素充員者鮮何憂乎家食而告因哉陛下以德澤屢降而鰥弱者未贍豈非方鎮之臣為壅遏其恩者耶竊見今守土之臣與聚斂之臣巧計萬端割剝生人膏血兩稅之外徵率雜科以為非時之進富貴疑陛下恩澤於是有月進時進朝賀之進羨餘之進當進之時表章上言皆云臣自方圓不擾陛下百姓舉此一節則明其欺詐甚矣今長吏節度觀察刺史之家其奢者家僮數百人其儉者不下百人以其祿俸自給尚且不足必欲重斂於人以繼之則明知其所進非祿俸也既非祿俸而云不擾百姓將何得哉所以兩稅之外常有誅求鹽鐵榷酤重籠稅託為進奏般次相運水陸轉輸半入私家今天下之人流離棄業日益困矣而陛下無由知之雖仍降德澤德澤不流則鰥弱從何而贍陛下聞之得不為少軫聖慮少動聖心臣竊料陛下將不忍聞也陛下倘察臣之言特回聖意一為思之勅有司薄天下舊定之租賦禁奸臣非法之誅求減鹽鐵榷酤之繁稅絕天下無端之進奉如此則德澤自降天下之人自獲蘇息富而庶矣豈慮乎鰥弱之不贍哉然清問所及皆當今之切者微臣上言亦已盡矣陛下察而行之在陛下畱心庶政而法其兢兢業業而已何者陛下春秋鼎盛上荷十二聖之重搆自即位以來嘗日旰不視朝大臣憂懼百辟惴慄進諫者詞旨懇切陛下既嘉其忠亦允其請然宰相卿士未有轉時之對則萬幾之重其缺幾時加之千門之深羽衞之隔則堂上之遠豈止於千里哉雖陛下雄傑聰明極思慮而憂天下何由而得雖曰徵賢臣為直諫又何益於理故傳曰其身正不令而行其身不正雖令不從推是而言則天下理亂不由陛下而致其由誰乎臣所謂畱心庶政而法其兢兢業業者蓋由此也况今大獘未去其可忽之耶臣所謂大獘者在法吏之舞文權臣之弄柄朋黨連結貨賄公行以中外重位出入迭居名器輕於糞土公侯徧於頑駑恣行威福苛傷暴殘諫官不敢論御史不敢糾雖陛下有天下之名而此輩乃害天下之實此獘不去生人未安陛下必欲去其獘者拔其根本斥諛佞進忠賢早朝而晏退引宰相公卿詢訪天下之利病至於㣥有司皆使鯁直列侍而親决萬幾之務此乃聖帝明王理天下之術也伏惟陛下畱神獨聽無惑於左右則四海九州幸甚微臣敢愛一身之死而不直言乎謹對輔太和時人正覺出乎道而道以支或得其儒或得其佛儒曰仁佛亦曰仁儒曰義佛亦曰義而佛之云戒義者禁人為非者也且事得其宜故將祭將征必設壇為墠以重宗戒者豈亦禁人為非者耶將事亦壇亦場以傃其限原筮者何來自前教祇園之初位序以立其徒從之流我中原喻者既蹈而孚迷者不知其所界以其眾視而歸達者存而不習其徒亦無不利我僕射廬江何公在藩之達者也功名既有四履來安述職之餘岌然無事此寺住僧會恩法門之津梁也於寺殊構久以莊嚴去太和七年四月十九日因公行寺自有琉璃壇法請公為地公曰然其用安在會恩言釋徒無住而有住相住相之歸戒壇為本金剛以不壞悠久琉璃取至淨為光持戒堅固洗心清明有如此也若夫壇場之原乃與刦石而長存比邱之功非法無以入善非趾無以出俗出俗歸真此其趾也故崇登頓以攝威儀威儀既明定惠斯了居凡非造履達方遊在昔三聖有言後生傳法莫不以為四生路廣人天業殊炎赫清涼所乘異境先迷後得無患乎悔從倀倀而行聖人惻隱慈者用是興悲義者於焉外護外護之仁非大君大臣不能以有施解極之理要道斯存伊釋命微罔能宏綽公曰然定惠之深吾所未及惻隱之際儒釋何殊且或利用生成戒亦導人之理因令除地約界俾築壇其心命曰莊嚴之度締構之工一以予之度立工懸告公乃捐其真俸以成梓陶之具俾會恩錄之一歲而壇上下俱構賁以琉璃艧之丹漆謺午文房張軒達戶如龍之蟠如鳳之騫㸌縮撐廅觀者洞然神寘其隅珠內其頂重級頒平大光輝映剏於東序擬議東方法生於東我願無已寺僧又言前有三門旁有二樓二樓三門可以加飾公曰然其亦琉璃壇之畢會恩請事公遂奏置義壇以資法侶行者不囊一錢居者不輸一毫樵疏絲穀仰公私廪先治一日有瘖僧就筵後法一日而瘖僧遂口寺者以為祥感之應其然豈不然耶輔植業於儒異門釋氏其閒等級尚較故希有歎揚之聲今此抽毫以公有命且序釋氏來告之文非有準繩非多要賾亦葢之而已矣在書有序在物有容事立功成宜論篆刻述者敢廢斯文銘曰崇維祇園在藩之東爰立其壇有隆有豐賁以琉璃覆之穹窿上高下厚中焉有融有融伊何鑑彼威儀實繁茲構童童耆耆在昔初法築之締之及今大輅琢斯礱斯妙取天巧固擬神保論是禨祥永茲壽考無此端本定惠不生無我明公追琢不成郁茲介福肅彼緇英涉級東方永載厥名矩河南人鄉貢進士觀乎範圍之大者莫廓落於乾坤著明之高者無輝映於日月迴斡不已者莫變化於陰陽然而造諸數極未嘗不幾乎息矣曷若兆朕於胚渾之前昭臨於曦舒之表運化俾陰陽不測巍巍蕩蕩無得而稱者其惟我西方聖人歟洎玉象降於率陀金仙誕於剎利萬靈翊衞百福莊嚴遂奄有大千纂承正覺乃誕膺灌頂作大法王茂績鴻勳歷僧祇不朽乃神乃聖隨感應無差不然何以儀形中天俾是則是效列剎東土而作福作威者哉靈居寺者肇自齊天統元年創也蓋珠標榜為古伽藍綿周歷隋或興或廢暨有唐高宗御宇之代上元元年特降天書賜題寺額增我聖教煜然有光至若捨宅布金傾財施樹前志磨滅不可復知故闕如也古老云其居地靈有如地肺環廣澤惟下潦懷山自浮不知有力者負之然耶將為福地自爾耶我等策名實由斯得其石庶也闕一字厚地距崇墉右挾雞岑左帶烏阜蔭牛宿藩麝山壓華沛之上源龍纏紺菀吞漕口以流惡股引清滁壯矣哉難得而具論矣詳其占龜食墨揆景端星徵杼匠子來感福財輻輳而後喻筏隘海王褱材積山乃運神工攄妙思繩以正木斤以成風高殿巖巖列三尊而儼若端門奕奕容雙駕而豁然步廡鸞舒飛樓蜃湧窣迴合以雲矗崒凌兢而星倚朱柱離立若內地龍昇修鯢載鏗疑中天雷落將欲宏盡飾道補梵居闕不只蔭釋侶警泥牛而已入自門右開淨土坊芬華臺敷葉座揖九品聖禮無量尊挂寶鐸吟風引金繩界道念佛念法見水鳥樹林若天若人獻香花仙樂忽如斷百億國土於陶家輪上又何以十萬八千里為遠而入自門左闢僧伽院從頗黎地湧窣堵波焚牛頭旃檀普薰五濁儲福祥休佑大庇四生凡所投誠其應如響覃不思議救護力良可與覆載校優劣乎當大殿後厥搆講堂森浮柱以星懸抗雄梁而虹翥層覆雲勃重檐翼張綽文軒洞開疏綺寮虛豁至誕一佛日設八齋辰瑞表優曇馧傳薝蔔于以考大法鼓吹大法螺禮天神師昇師子座八部倏睒以雲會四眾繽紛而雨集我大法師方凭曲几撝談柄辨騰電策音撲海潮狻猊吼而香象魄消霹靂震而樵種甲拆地神贔屭以捧足天仙嫖姚而雨花一建勝幢不惟動於六種再見舌相寧只覆於大千故知灑醍醐澍甘露無不長茲善根力者也次講堂後式建天廚百味飶芬八珍芍藥萐脯不扇而清暑蔗漿不肅而凄寒善吉持盂免造乎無垢菩薩捧鉢不上於諸天覬食肥膩牛無妨施乳業工巧子有時獻供焉廚西序列賓客省廚東序陳香積庫廚乾維啟倉廩地廚艮背廣臧獲院次淨土坊後式創律堂下壓放生之池坐觀水族上臨簨業之閣時聽風鏞懿夫肅草繫楫護鵝保浮囊無虧持油鉢不墜韞行六萬習儀三千者允昇于此堂焉且源至清流必長地至靈人必傑我寺昔大德法師禺公者童真出家洞明三藏講涅槃法華淨名等經各至數百聲振八表名葢五都實梵宇棟梁天人領袖賢禪師者滄州人也於至德元載隸名此寺德超鴦窟學最鵬耆達一乘心宜紹佛種攝無量眾有過蜂王積衣鉢餘崇常住業置雞籠墅肥地庄山原連延亘數十頃誠功績大者亮福田不貲光禪師者越州人也自永泰元年飛錫戾止氣稟稽山之粹量涵鏡水之清死生一盂寒暑一衲口雖縱辯非道不言身雖任緣非律不動以禪念餘力營建舊帳下西行廊焉泗州開元寺大僧正明遠者譙郡酇人也於元和八年來憇茲寺畧見隳廢良用憮然思效補天之功遂假建瓴之力乃請前縣大夫鄭繼戮力合謀相與經始仍於泗上迎僧伽大師真身幷移廚置庫遷淨人院刱常住倉客省營律堂設功用大備實有可觀上人戒德侵冰神儀耀玉韻含律呂學究天人加之扇道飇均法雨演毗尼藏傳木义燈北暨兩河南被五嶺莫不高山仰止望景趨風連帥稽首以傳香諸侯接足而施祿者矣時同闕一字葺僧常演少良法空志遠闕一字遵惠興如筠道通南約等稟僧正成規受緇俗禮請乃悉心締構期著厥功至九年起檀度門剖方便法大致資貨遂收復常住舊典賃田三千餘頃鑄大粥鑊寫大香鑪矻矻然盡力惟持迄今未已我太和皇帝陛下纂元元登紫極炳煥日月恢拓寰宇銅雀鳴而九有清玉燭調而八紘泰將宏十善之化是闡大仙之教揚州大都督府也史京兆公列宿降靈為唐國楨入踐台庭贊一人之慶出分符竹播二南之風不然何能作炎天霖為旱歲穀也朝散郎守令崔儇代襲珪組聲高聞望清逾照膽闕一字劇佩韋馴雉舞鸞我無忝於先哲蘭風長雨爾何彰乎灌壇知袁伯仁鍾離意不得專美於茲邑也矧乃崇信釋教頓了性宗闕一字清境於六虛凝白雲之一點何獨葢纏之內湧沒自由哉且權見宰官終次補金粟故我釋士繄賴良多主簿錢文尉史公素尉杜珣並瓊林青翠鸞鷟羽儀佐製錦材揮蒨練霜刃贊鳴琴化牽的皪朱絲必當鼓翅九霄噴沫千里豈嬰梅福滯仇香而已乎鎮遏兵馬使趙君誠慶演鑿門勳崇受鉞力宣虎旅煞敵旄頭白虹摽貫日之誠黑槊得彼軍之號故能為江山彈壓呈相府爪牙也上座大沙門道孚風骨卓然神韻遒拔戒輪高據非八法可搖律鏡沈明何㣥妖敢見寧惟提振綱領抑揚人物者歟寺主大苾蒭道通識度格物風道期人處煩指水月為心厲行以冰霜表節都維那僧令宗佛乘表準道品軌儀擕撫緇徒博延寮寀內庫典座僧令翛以歷落為心風雲滿抱南庫典座僧省幽以沈默適性謙沖在懷悉能重德好賢進退有度繼闕一字修葺星劫是期邑客前徐州蘄縣丞趙曾士林館闕一字知官同十將王從一邑人處士呂鑑前杭州富陽闕一字主簿呂康武前試左衞率府兵曹參軍胡復言闕二字嘉王府主簿胡正言齊州錄事參軍胡審言等闕一字王褱意琦當代乏偶德行高敏與日而昇或委質闕二字奉身牽彼或放心雲水滌性疎神匪塵霧可嬰指松筠見節方之人物稟茂高土風校以詞華得承叔儒雅悉捨諸縛著迴向菩提樹福田良緣為檀那上首矩詞淺意陋學不常師將整思含毫若神解虛質孚公不以蹇才曲藝謬辱見知爾猶清風寄韻於修篁白日呈規於淺瀨既不我棄敢無詞乎畧舉一端以為斯說彼日月既有庶徽猷不泯幸請銀鈎揮灑翠埦擬諸亂曰而作偈言其詞曰一氣混茫是稱大易三才爰兆兩儀將闢有物妙萬藏神至賾寂然不動動而常寂與化推移未嘗今昔粵無上士應運來覿德證泥洹道超光宅功充幽爽業攝元白體一如來大千藉藉金言寶偈布在方冊大哉真人煥矣垂迹重輝謺慶蟬聯舄奕代御金輪功懸玉策宏闡象教永昌皇歷於惟地居普賴天澤惟唐建剎因齊舊蹟鬱興臺殿造化開拆下控安流上侵凝碧懿諸龍象繼武籌畫天意昭宣鳥篆光額惟揚大都地望雄極輟我宰輔建旟邦伯化被中和妖氛蕩滌彼美縣尹才哉政績由今况古綽有宏益馮蜂臺之九重望龍剎之百尺想文物以儲思疑世界之來擲庶福門之悠久任揚塵於朝夕寄神工而刊刻永流芳於金石元凑太和中封酅國公臣先祖隋文帝等四陵一所在鳳翔一所在揚州兩所在京兆府準去年四月九日勅二王後介國公先祖陵例每陵每月合給看守丁三人鳳翔府已蒙給丁其京兆府及揚州未蒙準下闕革憲宗朝官監察御史長慶時遷刑部員外郎拜刑部侍郎太和時為左庶子準京兆府申雲陽縣人張莅欠羽林官騎康憲錢米憲徵之莅乘醉拉憲氣息將絕憲男買得年十四將救其父以莅角觝力人不敢撝解遂持木鍤擊莅之首見血後三日致死者準律父為人所毆子往救擊其人折傷減凡鬬三等至死者依常律則買得合當死刑伏以律令者用防兇暴孝行者以開教化今買得救父難是性孝非暴擊張莅是心切非兇以髫丱之歲正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之情以權之慎測淺深之量以別之春秋之義原心定罪周書所訓諸罰有權今買得生被皇風幼符至孝哀矜之情伏在聖慈臣職當讞刑合分善惡謹先具事由陳奏伏冀下中書門下商量當司典膳等五局郎伏以青宮列局護翼元良必用卿相子弟先擇文學端士國朝不忘慎選冀得其人或揚歷清資或致位丞相今以年月浸久漸至訛替緣其俸祿稍厚近年時有流外出身者倖求授任稽諸故事未嘗聞流外得厠此官若不約絕實玷流品當司有司經局校書正字品秩至卑而文學之人競趨求者蓋以必取其人無有塵雜故也今五局郎資序本是清品若使流外不已則此司官屬漸成蕪蔓伏請自今以後吏部不得更注擬流外人其見任官中有流外者許臣具名銜牒吏部至注官日注替伏見諸王府本在宣平坊東南角摧毀多年因循不修至元和十三年七月十三日莊宅使收管其年八月二十五日賣與邠寧節度使高霞㝢伏以在城百官皆有曹局惟王府寮吏獨無公署每聖恩除授無處禮上胥徒散居難於管轄遂使下吏因茲弛慢王官為眾所輕雖蒙列在官班皆為偷安散秩伏以府因王制官列府中府既不存官司虛設伏乞賜官宅一區俾諸府合而共局庶寮會而異處如此則人吏可令衙集案牘可見存亡都城無廢闕之曹道路息是非之論夷行字周道世客潁川第進士累遷工部侍郎開成二年同中書門下平章事罷為吏部尚書出為華州刺史武宗立召為御史大夫復知政事進尚書左僕射罷為太子太保檢校司空河中節度使奉中書門下牒狀準今年正月二十八日宣應館驛近日因循多致敗闕郵遞馬畜每事闕供蕃客往來皆有論奏委中書門下與夷行同商量條流聞奏所置舘驛鞍馬什物幷作人多少及功價資課每年破用取何色錢物添修支遣其驛馬數勘每驛見欠多少速具分析奏來者臣今商量請準勅先牒諸州府勘鞍馬什物作人工價糧課幷每年緣館驛占畱錢數諸色破用及使料粟麥遞馬草料待諸州府報到續具聞奏今具簡前後勅文行用相當者參立新格逐意條流除館驛弊事
