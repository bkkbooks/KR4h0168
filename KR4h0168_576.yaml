front:
  text: 全唐文欽定全唐文卷五百七十六柳宗元八
  hash: sha256:8e6f86ba233463979ce4d836e27e600505c0bc3dac852a4d7431843c20770d16
body:
  text: 宗元惶恐言伏奉六月七日制元和聖文神武法天應道皇帝光受徽號率土臣子歡抃無涯伏惟皇太子殿下麗正居中輔成昌運消伏沴孽贊揚輝光鴻名允升大慶周洽表文武之經緯著天道之運行瑞景照臨示重輪之發耀恩波下濟見少海之增瀾宗元忝守遐方獲聞盛禮踊躍之至倍萬恆情謹附箋賀宗元惶恐死罪死罪某言伏奉月日制書殿下祗膺茂典位副青宮溫文光三善之名繼照協重離之慶萬葉固本㣥方宅心含生之徒莫不欣戴况某夙蒙期獎職在藩方歡抃之誠倍萬恆品補闕執事宗元聞之重遠輕邇賤視貴聽所由古矣竊以宗元幼不知恥少又躁進拜揖長者自於幼年是以簉俊造之末跡厠牒計之下列賈藝求售閴無善價載文筆而都儒林者匪親乃舊率皆攜撫相示談笑見眤喔咿逡巡為達者嗤無乃覩其朴者鄙其成狎其幼者薄其長耶將行不拔異操不砥礪學不該廣文不炳耀實可鄙而薄耶今鴛鷺充朝而獨干執事者特以顧下念舊收接儒素異乎他人耳敢問厥由庶幾告之俾識去就幸甚幸甚今將慷慨激昂奮攘布衣縱談作者之筵曳裾名卿之門抵掌峩辨厚自潤澤進越無恧汙達者之視聽狂狷愚妄固不可為也復欲俯默惕息謺足踏翼拜祈公侯之閽跪邀賢達之車竦魂栗股兢恪危懼榮者倦之彌忿厥心又不可為也若慎守其常確執厥中固其所矣則又色平氣柔言訥性魯無特達之節無推擇之行瑣瑣碌碌一孺子耳孰謂其可進孰謂其可退抑又聞之不鼓踊無以超泥塗不曲促無以由險艱不守常無以處明分不執中無以趨夷軌今則鼓踊乎曲促乎守其常而執厥中乎浩不知其宜矣進退無倚宵不遑寐乃訪於故人而咨度之其人曰補闕權君著名踰紀行為人高言為人信力學掞文朋儕稱雄子亟拜之足以發揚對曰衷燕石而履元圃帶魚目而游漲海祗取誚耳曷豫補乎其人曰跡之勤者情必生焉心之恭者禮必報焉况子之文不甚鄙薄者乎苟或勤以奉之恭以下之則必勗勵爾行輝耀爾能言為建瓴晨發夕被聲馳而響溢風振而草靡可使尺澤之鯢奮鱗而縱海密網之鳥舉羽而翔霄子之一名何足就矣庶為終身之遇乎曷不舉馳聲之資挈成名之基授之權君然後退行守常執中之道斯可也愚不敏以為信然是以有前日之拜又以為色取象恭大賢所飫朝造夕謁大賢所倦性頗疏野竊又不能是以有今茲之問仰惟覽其鄙心而去就之潔誠齊慮不勝至願謹再拜古之知己者不待來求而後施德舉能而已其受德者不待成身而後拜賜感知而已故不叩而響不介而合則其舉必至而其感亦甚斯道遁去遼闊千祀何為乎今之世哉若宗元者智不能經大務斷大事非有恢傑之才學不能探奧義窮章句為腐爛之儒雖或置力於文學勤勤懇懇於歲時然而未能極聖人之規矩恢作者之聞見勞費翰墨徒爾拖逢掖曳大帶游於朋齒且有愧色豈有能乎哉閣下何相待之厚也始者自謂抱無用之文戴不肖之容雖振身泥塵仰睎雲霄何由而能哉遂用收視內顧俯首絶望甘以沒沒也今者果不自意他日瑣瑣之著述幸得流於衽席接在視聽閣下乃謂可以蹈遠大之途及制作之門決然而不疑介然而獨得是何收采之特達而顧念之勤備乎且閣下知其為人何如哉其貌之美陋質之細大心之賢不肖閣下固未知也而一遇文字志在濟拔斯蓋古之知巳者已故曰古之知己者不待來求而後施德者也然則亟來而求者誠下科也宗元向以應博學宏詞之舉會閣下辱臨考第司其升降當此之時意謂運合事并適丁厥時其私心日以自負也無何閣下以鯤鱗之勢不容尺澤悠爾而自放廓然而高邁其不我知者遂排逐而委之委之誠當也使古之知己猶在豈若是之求多乎哉夫仕進之路昔者竊聞於師矣太上有專達之能乘時得君不由乎表著之列而取將相行其政焉其次有文行之美積能纍勞不由乎舉甲乙歷科第登乎表著之列顯其名焉又其次則曰吾未嘗舉甲乙也未嘗歷科第也彼朝廷之位吾何修而可以登之乎必求舉是科也然後得而登之其下不能知其利又不能務其往則曰舉天下而好之吾何為獨不然由是觀之有愛錐刀者以舉是科為悅者也有爭尋常者以登乎朝廷為悅者也有慕權貴之位者以將相為悅者也有樂行乎其政者以理天下為悅者也然則舉甲乙歷科第固為末而已矣得之不加榮喪之不加憂苟成其名於遠大者何補焉然而至於感知之道則細大一矣成敗亦一矣故曰其受德者不待成身而後拜賜然則幸成其身者固末節也蓋不知來求之下者不足以收特達之士而不知成身之末者不足以承賢達之遇審矣伏以閣下德足以儀世才足以輔聖文足以當宗師之位學足以冠儒術之首誠為賢達之表也顧視下輩豈容易而收哉而宗元朴野昧劣進不知退不可以言乎德不能植志於義而必以文字求達不可以言乎才秉翰執簡敗北而歸不可以言乎文登場應對刺繆經旨不可以言乎學固非特達之器也忖省陋質豈容易而承之哉叨冒大遇穢纍高鑒喜懼交爭不克寧居竊感荀罃如實出己之德敢希豫讓國士遇我之報伏候門屏敢俟招納謹奉啓以代投刺之禮伏惟以知己之道終撫薦焉不宣宗元謹啓宗元啓伏以周漢二宣中興之業歌於大雅載於史官然而申甫作輔方召專淮夷之功魏邴謀謨辛趙致罕羌之績文武所注中外莫同伏惟相公天授皇家聖賢克合謀協一德以致太平入有申甫魏邴之勤出兼方召辛趙之事東取淮右北服恆陽略不代出功無與讓故天下文士皆願秉筆牘勤思慮以贊述洪烈一作業闡揚大勳宗元雖敗辱斥逐守在蠻裔猶欲振發枯槁決疏潢汙罄效蚩鄙少佐毫髮謹撰平淮夷雅二篇恐懼不敢進獻私願徹聲聞於下執事庶宥罪戾以明其心出位僭言惶戰交積無任踊躍屏營之至不宣宗元謹啓宗元啓昔周宣中興得其臣召虎師出江漢以平淮夷故其詩曰江漢之滸王命召虎其卒章曰于周受命自召祖命以明虎者召公之孫克承其先也今天子中興而得閣下亦出江漢以平淮夷克承於先西平王其事正類然而未有嗣大雅之說以布天下以施後代豈聖唐之文雅獨後一作愧於周室哉宗元身雖陷敗而其論著往往不為世屈意者殆不可自薄自匿以墜斯時苟有補萬分之一雖死不憾謹撰平准夷雅二篇齊沐上獻誠醜言淫聲不足以當金石庶繼代洪烈稗官里人得采而歌之不勝憤踊之至輕瀆威嚴一作尊戰越交深謹啓宗元啓始閣下為尚書郎薦寵下輩士之顯於門闥者以十數而某尚幼不得與於厮役及閣下遭讒妬在外十餘年又不得效薄伎於前以希一字之褒貶公道之行也閣下乃始為贊書訓辭擅文雅於朝以宗天下而某又以此時去表著之位受放逐之罰薦仍囚錮視日請命進退違背思欲一日伏在一作於門下而不可得常恐抱斯志以沒卒無以知於門下冥冥長懷魂魄幽憤故敢及其能言貢書編文冒昧嚴威以畢其志伏惟覽觀焉幸甚幸甚閣下相天子致太平用之郊報則天神降地祇出用之經邦則百貨殖萬物成用之文教則經術興行用之武事則暴亂翦滅依倚而冒榮者盡去幽隱而懷道者畢出然後中分主憂以臨東諸侯而天下無患盛德大業光明如此而又有周公接下之道斯宗元所以廢錮濱一作擯死而猶欲致其志焉閣下倘以一言而揚舉之則畢命荒裔固不恨矣謹以雜文十首上獻縲囚而干丞相大罪也寧為有聞而死不為無聞而生去就乖野不勝大懼謹啓宗元啓六月二十九日衡州刺史呂溫道過永州辱示相公手札省録狂瞽收撫羈縲沐以含宏之仁忘其進越之罪感深益懼喜極增悲五情交戰不知所措宗元性質庸塞行能無取著書每成於廢疾進德且乏其馨香常願操篲醫門掬溜蘭室良辰不與夙志多違昨者踊躍殘魂奮揚蓄念激以死灰之氣陳其弊帚之詞致之烟霄分絶流眄今則垂露在手清風入懷華衮濫褒於赭衣龍門俯收於坎井藻鏡洞開而秋毫在照文律傍暢而寒谷生輝化幽鬱之志若覿清明換兢危之心如承撫薦非常之幸豈獨此生伏以淮海劇九天之遙瀟湘參百越之俗傾心積念長懸星漢之上流形委骨永淪魑魅之㣥何以報恩唯當結草無任喜懼感戀之至宗元啓宗元往者嘗侍坐於崔比部聞其言曰今之為文莫有居趙司勳右者自是恆欲飾其所論著薦之閣下病其未就將進且退者殆十數焉幸以廢逐伏匿獲伸其業類於嚮者若有可觀然又以罪惡顯大甘死荒野不能出其固陋以求知於閣下則固昧昧徒生於世矣謹獻雜文十首倘還以數字定其是非使得存於世則雖生與蠻夷居魂與魑魅游所不辭也輕瀆威重伏增戰懼一作惶灼謹啓宗元伏惟僕射以仁厚蓄生人以勇義平國難而劍門用兵之士最為天下倡首取其險固為我要衝王師得以由其門而入倣徉布濩遂無留滯是閣下之勳力宜著於萬世而不巳也宗元負罪俟命晷刻觀望道里深遠不得悉聞當時之威聲然而竊以纍受顧念踊躍盛德恐沒身炎瘴卒無以少報於閣下是以晝夜恟恟不克自寧今身雖敗棄庶幾其文猶或傳於世又焉知非因閣下之功烈所以為不朽之一端也敢默默而巳乎謹撰劍門銘一首惶恐獻上誠無以稱宏大之略亦足以發平生之心不勝慚懼戰越之至宗元啓伏念往歲司空由尚書郎出二太原宗元獲於天長專用候謁伏蒙敘以世舊許造門闌自後司空纍膺寵榮位極公輔宗元得罪朝列竄身湘南霄漢益高泥塵永棄瞻仰遼絶陳露無由司空統臨舊荊控制南服道路非遠德化所覃是敢奮起幽淪仰希光耀伏惟憫憐孤賤特賜撫存則縲紲之辱有望蠲除鳴吠之能猶希效用謹獻雜文七首伏惟以一字定其褒貶終身之幸無以加焉輕瀆威嚴伏增戰越宗元啓伏見與當州韋使君書猥賜存問驚怍悼懼交動於中循念竟日若無容措幸甚幸甚宗元素乏智能復闕周慎一自得罪八年於今兢愧弔影追咎無既自以終身沈廢無蹤自明不意相國垂愍特記名姓守穾奧者忽仰晞於白日負泥塗者遂自濯於清源快心暢目不知所喻伏以聖人之道與其進也不保其往故敢藻飾文字洗滌心神致之門下祗候嚴命伏惟收撫獎勵以成其終謹獻雜文三十六首冒昧上黷無任踊躍惶恐之至宗元啓宗元無異能獨好為文章始用此以進終用此以退今者畏罪悔咎伏匿惴栗猶未能去之時時舉首長吟哀歌舒泄幽鬱因取筆以書紉韋而編略成數卷伏念閣下以文章升大僚統方隅而宗元幸緣罪辜得與編人齒於部內不以此時露其所為以希大君子顧視則為陋劣而自棄也敢飾近文及在京師官命所草者凡三卷合四十三篇不敢繁故也儻或以為有可采者當繕録其餘以增几席之汚去就鄙野伏用兢惶謹啓右伏奉處分令撰訾家洲亭記伏以境之殊尤者必待才之絶妙以極其詞今是亭之勝甲於天下而猥顧鄙陋使之為記伏受嚴命不敢固讓退自揣度惕然汗流纍奉游宴竊觀物象涉旬模擬不得萬一竊伏詳忖進退若墜久稽篆刻則有違慢之辜速課空薄又見疏蕪之纍愆期廢事尤所戰栗謹修撰訖上獻退自局蹐不知所裁無任隕越惶恐之至宗元啓伏以尚書以碩德偉才代著勳烈兩河定亂三城建功鼎彞竹帛未足云紀進臨汝上控制東方隱然長城朝野倚賴宗元雖屏棄遐壤而飽聞德聲所恨不獲親執鞭弭以備戎伍夙夜踊躍不克寧居伏以威稜所加狂狡已震莫大之績重復增崇小子久以文字進身嘗好古人事業專當具筆札拂縑緗贊揚大功垂之不朽瞻望霄漢戀慕交深冒黷威嚴伏增戰越宗元啓伏承天恩榮加寵贈伏惟增感抃慶罔極某聞揚名以顯孔聖於是作經大孝所尊曾子以之垂訓雨露敷澤日月垂光盛德果驗於達人積善必徵於餘慶天下人子羡慕無階某特承恩眷倍百恆品恨以守官不獲奔走拜賀無任展轉惶灼之至謺石琴薦一右件琴薦躬往采獲稍以珍奇特表殊形自然古色伏惟閣下稟夔旦之至德蘊牙曠之元蹤人文合宮徵之深國器專瑚璉之重藝深攫醳將成玉燭之調思叶歌謠足助薰風之化願以頑璞上奉徽音增響亮於五絃應鏗鏘於六律沈淪雖久提拂未忘儻垂不徹之恩敢效彌堅之用李師道三代受恩四凶負德聖朝含育務在安人不知覆載之寬宏更縱豺狼之奸蠧王師一發凶首已來萬姓稱歡四方無事李師道纍代負恩不起悛革餘孽怙亂更肆猖狂王師暫勞已致梟戮率土歡忭慶賀難勝太平之功自此而畢某啓某天罰深重餘息苟存沈竄俟罪朝不圖夕伏謁無路不任荒戀之誠伏念宗元初授御史之日尚書與杜司空先賜臨顧光耀里閭下情至今尚增惶惕頃以黨與進退投竄零陵囚繫所迫不得歸奉松檟哀荒窮毒人理所極親故遺忘况於他人朝夕之急饘粥難繼宗祀所重不敢死亡偷視纍息已逾歲月伏以尚書德量宏納義風遠揚收撫之恩始於枯朽敢以餘喘上纍深仁伏惟惻然見哀使得存濟慺慺荒懇叩顙南望竊以動心於無情之地施惠於不報之人古烈尚難况在今日而率然干冒決不自疑者蓋以聞風之日久嚮德之誠至振高義於流俗之外合大度於古人之中獨有望於閣下而已非敢以尋常祈向之禮當大賢匍匐之仁夙夜忖度果於自卜方在困辱不敢多言伏紙惶恐不勝戰越謹啓某啓某愚陋狂簡不知周防失於夷途陷在大罪伏匿嶺下於今七年追念往愆寒心飛魄幸蒙在宥得自循省豈敢徹聞於廊廟之上見志於樽俎之際以求必於萬一者哉相公以含宏光大之德廣博淵泉之量不遺垢汙先賜榮示捧讀流涕以懼以悲屏營舞躍不敢寧處是將收孟明於三敗責曹沫於一舉俾折脅臏腳之倫得自拂飾以期效命於鞭策之下此誠大君子并容廣覽棄瑕録用之道也自顧孱鈍無以克堪祗受大賜豈任負戴精誠之至炯然如日拜伏無路不勝惶惕輕冒威重戰汗交深某啓當州員外司馬李幼清傳示尚書委曲特賜記憶過蒙存問奉讀喜懼浪然涕流慶幸之深出自望外伏惟尚書鶚立朝端風行天下入統邦憲出分主憂控此上游式是南服凡海內奔走之士思欲修容於轅門之外躡履於油幢之前譬之涉蓬瀛登崑閬不可得而進也某負罪淪伏聲銷跡滅固世俗之所棄親友之所遺敢希大賢曲見存念是以展轉歔欷晝詠宵興願為厮役以報恩遇瞻仰霄漢邈然無由網羅未解縱羽翼而何施囊檻方堅雖虎豹其焉往不任踊躍懇戀之至謹奉啓起居輕瀆威嚴倍增戰越某啓伏聞以武都符載為記室天下立志之士雜然相顧繼以歎息知為善者得其歸嚮流言者有所間執直道之所行義風之所揚堂堂焉實在荊山之南矣幸甚幸甚伏以符君之藝術志氣為時聞人才位未會盤桓固久中間因緣陷在危邦與時偃仰不廢其道而為見忌嫉者橫致唇吻房給事以高節特立明之於朝王吏部以清議自任辨之於外然猶小人浮議困在交㦸凡諸侯之欲得符君者域聯壤接而惑於騰沸環視相讓莫敢先舉及受署之日則皆開口垂臂悵望悼悔譬之求珠於海而徑寸先得則衆皆怏然罷去知奇寶之有所歸也嗚呼巧言難明下流多訕自非大君子出世之氣則何望焉瞻望清風若在天外無任感激欣躍之至輕黷陳賀不勝戰越不宣謹啓某啓伏以至公之道施恩而不求報獎善而不為功所以振宣幽光激勵頽俗誠大君子所蓄積也竊見故招討判官試右衛胄曹參軍陸卓生稟清操長於吏理纍仕所至必有休聲再舉府曹績用茂著頃以狂賊李元慶劫去留後擅樹凶徒構災扇禍期在旦夕一夫見刃莫為己用而卓以此時特立不懼終翦強暴以寧師人既而不幸嬰疾物故不獲一日趨事以受其職有功未報有善未録伏承閣下言論之餘每所嗟異優給家屬恩禮特殊行道之人皆所欽伏儻録其事跡奏一贈官使懷憤之魂知感恩於地下秉志之士思受命於門庭足以勸獎三軍豈止光榮一族伏惟不棄狂瞽特賜裁量幸甚幸甚某與卓未嘗相識敢率愚直以期至公輕黷威嚴伏增戰悚謹啓某啓伏見四月六日敕刺史崔簡以前任贓罪決一百長流歡州伏奉去月二十三日牒崔簡家口牒州安存并借官宅什器差人與驅使伏惟中丞以直清去敗政以惻隱撫窮人罪跡暴著則桉之以至公家屬流離則施之以大惠各由其道咸適於中威懷並行仁義齊正繩愆糾繆列郡肅澄清之風匡困資無闔境知噢咻之德凡在巡屬慶懼交深伏見崔簡兒女十人皆柳氏所出簡之所犯首末知之蓋以風毒所加漸成狂易不知畏法坐自抵刑名為贓賄卒無儲蓄得罪之日百口熬然叫號羸頓不知所赴儻非至仁厚德深加憫恤則流散轉死期在須臾某幸被縲囚久沐恩造至於骨肉又荷哀矜循念始終感懼無地謹勒祗承人沈淡奉啓陳謝下情輕黷某啓某嘗讀列子書有言於鄭子陽者則曰列禦寇蓋有道之士也居君之地而窮若不好士使之然乎子陽於是以君命輸粟於列子列子不受固嘗高其志又讀孟子書言諸侯之於士曰使之窮於吾地則賙之賙之亦可受也又怪孟子以希聖之才命代而出不卓然自異以潔白其德取食於諸侯不以為非斷而言之則列子獨任一作往之士唯已一毛之為愛故遁以自免孟子兼愛之士唯利萬物之為謀故當而不辭今宗元處則無列子之道出則無孟子之謀窮則去讓而自求至則捧受而無慚斯固為貪淩苟冒人矣董生曰明明求財利唯恐困乏者庶人之事也是皆詬恥之大者而無所避之何也以為士則黜辱為農則斥遠無伎不可以為工無資不可以為商抱大罪處窮徼以當惡歲而無廩食又不自列於閣下則非所以待君子之意也伏惟覽子陽孟子之說以垂德惠無使惶惶然控於他邦重為董生所笑則縲囚之幸大矣謹啓凡士之當顯寵貴劇則其受賜於人也無德心焉何也彼將曰吾勢能得之是其所出者大而其報也必細居窮厄困辱則感慨捧戴萬萬有加焉是其所出者小而其報也必巨審矣故凡明智之君子務其巨以遺其細則功業光乎當時聲名流乎無窮其所以激之於中者異也若宗元者可謂窮厄困辱者矣世皆背去憔悴曠野獨賴大君子以明智垂仁問訊如平生光耀囚錮若被文繡嗚呼世之知止足者鮮矣既受厚遇則又有不巳之求以黷閣下之嚴威然而亦欲出其感慨捧戴而效其巨者伏惟閣下留意裁擇幸甚幸甚伏以外族積德儒厚以為家風周齊之間兄弟三人咸為帝者師孝仁之譽高於他門伯舅叔仲咸以孝德通於鬼神為文士所紀述相國彭城公嘗號於天下名其孝以求其類則其後咸宜碩大光寵以充神明之心今乃凋喪淪落莫有達者豈與善之道無可取耶獨內弟盧遵其行類諸父靜專溫雅好禮而信飾以文墨達於政事今所以聞於閣下者無怍於心無愧於色焉以宗元棄逐枯槁故不求遠仕務顯名而又難乎其進也竊高閣下之舉賢容衆故願委心焉則施澤於遵過於厚賜小人也遠矣以今日之形勢而不廢其言使遵也有籍名於天官獲祿食以奉養用成其志一舉而有知恩之士二焉可不務其巨者乎伏惟試詳擇焉言而無實罪也其敢逃大譴進退恐懼不知所裁不宣謹啓
