front:
  text: 全唐文欽定全唐文卷六十五穆宗二
  hash: sha256:194aa2f13bbb9ed997710a9ecd08fc55eaa08f2c31cf91aa555e918a88372a3c
body:
  text: 左金吾衞將軍兼御史大夫李道古幸以宗枝早參名級出分專面入踐通班誠宜祗慎周行恪居官次而乃利於苟進忘彼慎身持左道以事君將行險以僥倖因緣藥術薦達妄庸上惑先朝俯招物議跡其事狀合正刑章朕以臨御之初務在寬大特緩投荒之典俾從佐郡之名無謂優容而忽宏貸可守循州司馬山人柳泌輕懷左道上惑先朝罔求牧人貴欲疑衆自知虛誕仍更遁逃僧大通醫方不精藥術皆妄既延禍釁俱是奸邪邦國固有常刑人神所宜共棄宜付京兆府決痛杖一頓處死翰林醫官董宏景程準山人李元戢田佐元並流嶺南朕光膺寶歷正位宸居大行皇帝貴妃尊冠六宮母臨萬國謹上尊號曰皇太后御樓勅下遠近巳知如聞奸人覬望恩赦城外道路劫奪稍多從御樓勅下至來月五日以前京畿應有姦非盜賊等希恩故犯情不可原並依法處斷不在赦宥之限其犯罪人縱屬諸軍諸使亦委府縣依法科斷追遠飾終先王令典況積仁累義事巳顯於身前祥會慶傳福遂流於天下式光盛典爰舉徽章尊尊親親於是乎在皇太后父贈尚書左僕射曖克荷崇構有勞王家孝友本於生知英華發於事任實修一德歷任三朝建中末年屬有大難畢力扈駕忘軀即戎忠貞之節國史明備才高望洽是膺沁水之祥德厚流光乃啟塗山之祚肆予小子獲纉大業未展言申之命敢緣襃紀之恩俾繼維師用光縟禮可贈太傅比緣用兵歲久初息干戈百役所資國用多闕不可更加賦稅重擾疲人參酌權宜事貴通濟自今以後通內外支用錢宜於天下收兩稅鹽利榷酒稅茶及職掌人課料等錢並每貫除舊墊陌外量抽五十文委本道本司本使據數逐季收計其諸道錢使差綱部送並付度支收等待一二年後國用稍充即依舊制其京百司俸料文官亦準別勅每月量抽修文宣王廟不可重有除減武官所給較薄亦不在抽取之限昔者聖王之法以孝理天下也廣愛敬之心推於四海盡奉養之志示於兆人然後自誠之化有情思感朕以眇身祗荷鴻業皇太后就安長樂朝夕承顏慈訓所加慶感兼極伏以今月六日是朕載誕之辰奉迎皇太后於宮中上壽朕既獲申歡慰亦欲公卿大夫同之宜以今月六日平明於光順門集百寮及外命婦進名參賀皇太后朕御光順門內殿與百寮相見永為常式淄青統押海蕃每年皆有朝賀比差部領人數較多寇盜既夷典章須守宜以後差此官正試相兼不得過五人河朔初平人希德澤且務寬大使之獲安其河北榷鹽法宜權停仍令度支與鎮冀魏博等道節度審酌商量如能約計課利錢數分付榷鹽院亦任穩便劉總巳極上台仍移重鎮兄弟子姪各授官榮大將賓寮亦宜超擢百姓復一年宜賜軍士錢百萬貫以內庫錢充仍令宣慰使給事中薛存慶親諭朝旨與節度使丞相張宏靖計會大將判官甄獎未及有父母在者並具名列上郡縣中有殘破甚者量便宜優恤管內年高惸獨廢疾不能自存者差官就問給賜粟帛國家設文學之科本求才實苟容僥倖則異至公訪聞近日浮薄之徒扇為朋黨謂之關節干擾主司每歲策名無不先定永言敗俗深用興懷鄭朗等昨令重試意在精覈藝能不於異書之中固求深僻題目貴令所試成就以觀學藝淺深孤竹管是祭天之樂出於周禮正經閱其呈試之文都似不知本事詞律鄙淺蕪累至多亦令宣示錢徽庶其深自懷愧誠宜盡棄以警將來但以四海無虞人心方泰用宏寬假式示殊恩特掩爾瑕庶明予志孔溫業趙存約竇洵直所試粗通與及第盧公亮等十人並落下錢徽從別勅處分自今巳後禮部舉人宜準開元二十五年勅及第訖所試雜文并策送中書門下詳覆前刺史烏重裔等並位居守土職在牧人加稅縱緣軍須豈得不先聞奏遇赦雖當原宥亦合量有科懲烏重裔令狐楚魏義通等宜各罰三月俸料知州官釋放故魏博節度使起復寧遠將軍檢校工部尚書兼魏州大都督府長史御史大夫賜紫金魚袋田布朕以寡昧臨御萬邦威刑不能禁干紀之徒道化不能馴多僻之俗致使上公罹禍田氏銜冤爰整旅以徂征每終食而浩歎自茲弔伐驟歷寒暄雖良將銳師率皆協力而俟時觀釁未即齊驅嗟我誠臣結其哀憤引遷延之咎以自刻責奮決烈之志以謝君親白刃置於肝心鴻毛論其生死忠臣孝子一舉兩全晉稱卞氏之門漢表尸鄉之節比方於布今古為隣況其臨命須臾處之不撓載形章表並深衷悃閒使發緘悼心疾首從先臣於厚載爾則無愧覩遺像於麟閣予何所堪端拱崇名職垂彞典據斯以報聊攄永懷可贈尚書右僕射丞相府署國家樞機上法三台下臨百辟若等威可紊則堂陛不嚴諫議大夫李景儉乃因酣醉輒肆叨瀆昏呶侮慢靡所不為詢其狂態甚用驚聽宜加譴責以守遐荒予非深剋勉自循省可漳州刺史仍馳驛發遣如聞官驛遞馬死損轉多欲令提舉所由悉又推注中使郵驛稱不見券則隨所索盡供既無憑由豈有定數方將革弊貴在息詞自今巳後中使乘遞如不見券及券外索馬所由輒不得供其常參官出使及諸道幕府軍將等所合乘遞並須依格式如有違越或分外科人夫並宜具名聞奏兵革初寧亦資榷筦閭閻重困則可蠲除如聞淄青亠兊鄆等道往來糶鹽價錢近取七十萬貫軍資給費優贍有餘白鹽鐵使收管以來軍府頓絕其利遂使經行陣者有停糧之怨服隴畝者興加稅之嗟犯鹽禁者困鞭撻之刑理生業者乏蠶醬之具雖縣官受利而郡府益空俾人獲安寧我能節用其鹽鐵使先於淄青亠兊鄆等道管內置小鋪糶鹽巡院納榷起今年五月一日巳後一切並停仍各委本道約校比來節度使自收管充軍府逐急用度及均減管內貧下百姓兩稅錢數至年終各具糶鹽所得錢並均減兩稅奏聞安邑解縣兩池舊置榷鹽使仍各別置院官田布頃因戎務發憤自裁言念忠誠豈忘贍卹宜賜錢一千貫絹一千匹以充葬用遵古官守尹寺所寄非輕奏事之閒先須摭實闕於詳審須示薄懲宜罰一月俸料于方罪犯合處極刑以其父頔頃在襄陽頗能幾諫不陷不義方實有之又念其弟季友嘗聯國姻特宜免死長流端州李賞流潮州郭元覽于啟明王昭以于方既從減論並放杖郭元覽配流封州于啟明配流新州王昭配流雷州江州所奏實為懇誠若更抑為必難務濟所訴逋欠宜令特放汴州逆賊李㝏竊據城池坐邀符節率其兇黨敢拒王師今既梟首於闕下宜令所司準式其男道源道樞道淪道安等叛逆之子固不可原理須正刑宜集衆處斬以左右神策兵各三百人防押即日行刑於京城之西市廣德貞元再有勅旨要官密戚並不許任京兆判司畿令兩赤縣丞簿尉等緣人不遵行更資提舉自今巳後切宜禁斷郊廟之儀本乎恭恪罰輕生慢須議稍加自今巳後有臨祭出齋者宜罰一月俸仍委監察使每具所罰官名銜聞奏如聞江淮諸州旱損頗甚所在米價不免踊貴眷言疲瘵須議優矜宜委淮南浙東宣歙江西福建等道觀察使各於當道有水旱處以常平義倉斛㪷據時價減一半價出糶不得令豪家并糴使其必及貧人自冬以來甚少雨雪農耕方始災旱是虞慮有冤滯感傷和氣宜委御史臺大理寺及府縣長吏自錄囚徒仍速決遣除身犯罪應支證追呼近繫者一切並令放出須辨對者任其責保冀得克消沴氣延致休祥寒食省墓著在令文其塋域在京畿者自今任寒食假內往來不限日數若在外州任準式年限請假朕以眇躬嗣守丕構雖勤求理道不敢荒寧而保慎或乖遘茲厲疾賴上元垂祐宗社降靈洎中外庶臣克輔寡德服餌頤養踰於周星而陽氣熇煩宿恙暴作頃刻之際至於彌留伊死生之理必有其分顧託有所予何恨焉皇太子湛睿哲溫恭孝友明敏自膺儲貳休德日新必能嗣於耿光紹我先業宜令所司備禮於柩前即皇帝位咨爾卿士洎方伯連帥敬輔元子永綏萬邦宜叶乃心用厎於道宜令門下侍郎平章事李逢吉攝冢宰諸道節度觀察防禦等使及諸州刺史守鎮任重戎旅事殷並不須赴哀易月之制宜遵舊典文武官等朝晡哭臨十五舉音山陵制度務從儉約無禁婚姻祭祀飲酒食肉其醫官等念其勤瘁亦可矜憐並不須加罪宜便釋放將相卿士中外臣寮送往事居無違朕意
