front:
  text: 全唐文欽定全唐文卷二百五十二蘇頲三
  hash: sha256:d57424c1831bccb76e388f7746812f91f2cf8f76221c2fcf0759caf1b9e67bc7
body:
  text: 門下銀青光祿大夫太僕卿員外置同正員上柱國嗣鄭王希言才推近屬行稟中和用沈毅以為謀體直方而成器頻升列之位嘗踐執金之秩歷官斯久更事逾深必在親賢用膺心膂宜領右軍之寄仍直大將之任可雲麾將軍守右衛大將軍勳封如故黃門兵戈之容是憑於師律輿馬之飾允屬於徼巡自匪周才孰當茲任衛尉卿兼檢校左金吾衛大將軍上柱國李延昌倜儻為用堅剛立誠學優典墳言綜韜略賈勇聞義則輕於九死好謀盡忠則隱如一敵自膺刺姦之寵雅叶彈違之務正名不拜何以光於執金教戰或忘何以勵其投石宜踐迹於中尉俾疇能於亞夫可右雲麾將軍守左金吾衛大將軍勳封如故仍充朔方後軍大總管黃門有功必賞闕三字勸所以教人立志為邦作程者也雲麾將軍檢校右驍衛將軍兼北庭都護瀚海軍經略使金山道副大總管招慰營田等使上柱國太原縣開國公郭虔瓘宣威將軍守右驍衛翊府中郎將檢校伊州刺史兼伊吾軍使借紫金魚袋上柱國介休縣開國公郭知運等負將帥之才展熊羆之效義烈忠壯以詢其誠智謀勇敢不其策頃者邊庭之際孤城獨守戎羯困乏歲時圍逼矢石交下金湯自堅護甘漢之所歷懷范羌而莫至獨能宣我王命殫其士力不顧左殷仍於右斷厥功至矣朕甚嘉之宜登絶席之任方盛題坐之禮虔瓘可冠軍大將軍右驍衛大將軍知運可雲麾將軍右驍衛將軍餘各如故仍各賜衣一副并金帶主者施行門下周禮命卿六師成務漢圖拜將三傑雄才光祿大夫行光祿卿兼檢校并州大都督府長史上柱國汝南郡開國公周仁軌執心剛強臨事果決衛青奉法必讓其功師丹守正每聞其直彼汾之間近胡之備吏人仰化戎虜憚威羽翼任隆爪牙寄重宜光絶席用應題坐可鎮軍大將軍行左羽林衛大將軍兼檢校并州大都督府長史勳封如故主者施行黃門出師禦寇功成於告捷振旅休兵禮備於行賞攝左羽林軍將軍借紫金魚袋薛訥勳閥良將邦家老臣讀太公之立言受穰苴之為法德業中邃墻仞罕窺智謀宏遠泉源不竭須佇公孫之績頗蠲孟明之罪遂能長驅隴上深入湟中殲厥犬戎殘其蠆毒野無遺孽朝有茂勳宜膺設壇之寵俾光期門之寄可右羽林大將軍上柱國河東郡開國公仍賜物三百段銀五百兩錢二百貫主者施行門下四鎮經略副使前右羽林軍大將軍員外置同正員密雲縣開國男賜紫金魚袋上柱國高仙芝素稱驍悍兼聞智略久在戎場夙推武用才有所適禮則從權宜復官資更為邊扞可起復右羽林軍大將軍員外置同正員門下右金吾衛將軍唐先擇名公之允理識公明左金吾衛將軍呂休琳良將之材智謀深遠雖東西列衛俱賴其人宗族聯官所宜回避俾從易位用叶朝恩先擇可左金吾衛將軍休琳可右金吾衛將軍餘如故黃門遊騎將軍行右武衛翊府中郎將員外置同正員直太常寺安金藏家本孝悌身全忠懇往在周朝困於酷吏共誣良善敢謗太皇不任楚毒並加刑憲金藏乃自刺心肺見其誠節因而悟主實賴斯人則宏演納肝田光吞舌求之既往未足為喻眷言酬德自可超倫彰其貞固之美拜以誰何之任可右驍衛將軍員外置同正員餘如故主者施行黃門瞻彼元闕衛於丹禁命將擇人制軍為旅雲麾將軍檢校右羽林將軍上柱國楊敬述心堅鐵石器蘊圭璋以俊穎之才有溫謙之美附枝中葉則藝極於雕弓咀實含英則詞殫於綵札自五營高選千廬入侍忠而作訓勤以宣威俾寵誰何正其名秩可右羽林軍將軍勳封如故黃門國之武士其盛如林朕之賢臣其貞匪石則可以制軍而作訓也雲麾將軍檢校右羽林將軍賜緋魚袋上柱國申國公許輔虔方外直內智崇禮卑備聞舊章好讀前史忠於事主信以庇人未嘗不抗節思齊立言致遠頃除蛇豕之孽特建殊勳洎肅熊羆之旅蓋稱重器我之所賴爾實僉諧必也正名用監中候可左羽林軍將軍勳封如故黃門雲麾將軍前檢校左監門衛將軍上柱國杜賓客志唯倜儻才稱果決聞鞞而立特壯三軍之氣奮劍而前將雄萬人之敵頃在艱罰甫懷忠勇金革是任春秋所稱俾適權宜用光戎事可起復右威衛將軍勳如故主者施行黃門廟堂之儀不可去兵帷幄之謀在於料敵自非行有餘力坐而決勝則何以威百蠻而破萬里者也兵部尚書兼紫微令監修國史上柱國梁國公姚崇朝廷宿望軍國大才蘊平仲之一心舉夷吾於六翮惟此人傑是稱天賚銀青光祿大夫行黃門侍郎昭文館學士上柱國中山郡開國公李義甫用窮精微體自公直貞規踰於鐵石詞律比於笙簧左曹之美中朝所詠咸能上言寵答備陳胡虜閲武觀對暗合孫吳頃雖衆和以德軍全非戰或徵其侍子久詣闕廷或勞我偏裨尚留關塞行役之苦寢興弗忘師臧謂何豫備斯在佇恢遙護之略更屬遠安之算崇可都檢校諸軍大使義甫為副主者施行門下孟侯之禮雖歸於冢允太伯之風實尚於高節左衛大將軍宋王成器幼而聰敏長則溫仁禮樂同歸質文相半孝以為政每用因親忠而立誠所期尊主故能樂於為善好在服儒占蟻穴以探微登雀臺而成賦自奄有梁宋作藩邦家其儀孔臧其德可大朕之元子當踐副君以隆基有社稷大功神祇僉屬由是朕前懇讓言在必行天下至公誠不可奪爰符立季之典庶叶從人之願況別為九州必資於牧伯貞夫萬國先佇於師傅式副僉諧之求仍光不拜之寵可雍州牧揚州大都督太子太師別加實封二千戶賜物五千段細馬二千匹奴婢十房金銀器皿二百事甲第一區良田三十頃餘如故主者施行門下君臣之道欽若從乂師保之寄人具爾瞻必在耆德共康庶政特進前行尚書右僕射同中書門下三品上柱國宋國公致仕唐休璟自天錫夢維嶽降精心竭忠公器包文武廟堂隆棟委以弼丞帷幕運籌推其決勝爰當宰任固辭揆職私第懸車耆年益壯公門軾馬朔見逾聞求舊所期懷賢是切諭於三善況待正人營於百工孰過元老宜紆几杖俾作鹽梅可行太子少師同中書門下三品散官勳如故黃門贊翼皇儲允歸師保崇敬叔父諒屬親賢虢州刺史上柱國岐王範祕書監兼幽州刺史上柱國薛王業等明允篤誠溫良恭儉忠孝先於令典文儒偉於成業自為我藩翰擁其干旄雅聞召伯之詩尤羡魯公之政雖頒條是務而導禮兼資因入拜於承明佇來儀於博望範可太子少師虢州刺史業可太子少保兼幽州刺史勳封等各如故主者施行門下望園賓客非賢莫可中朝碩茂選衆攸歸銀青光祿大夫國子祭酒上柱國逍遙公韋嗣立溫恭密靜孝悌忠實鑒測毫端詞詮象外昆弟承一經之業登相者代不乏人閨門有萬石之風立言者士是則效疇咨滿於故事潤色敷於令典屬以疾辭用體張良之志資以德舉宜從綺季之遊可太子賓客散官勳封如故主者施行黃門元良之重賓友是擇自匪舊德孰膺斯拜銀青光祿大夫守禮部尚書上柱國滎陽縣開國公鄭惟忠積溫厚之氣暢清純之風學綜幽賾詞含比興履登近要見美徽猷不訐直而徇名期後仁以為利北斗喉舌雖屬於尚書南山調護更憑於耆老宜回建禮之秩將益承華之裕可守太子賓客散官勳封如故黃門攝生遂性義存於尚德去劇從禮切於優賢銀青光祿大夫守戶部尚書上柱國魏郡開國公畢構當代周才幹時良具臺閣推其練衣冠仰其全德而五教之重六官是先精以辨政勞而弱疾方欲憑於導引拯彼清羸暫踐竇嬰之職亟期呂蒙之愈可守太子詹事散官勳如故主者施行黃門正議大夫太府少卿昭文館學士上柱國吳興縣開國男沈佺期才標穎拔思詣精微早升多士之行獨擅詞人之律正議大夫行衛尉少卿上柱國楊崇禮神情凝正器識沉敏久聞忠義之風克樹循良之績儲闈總務卿寺推能佇執紀綱爰司帑藏佺期可太子少詹事餘如故崇禮可行太府少卿散官勳如故主者施行黃門正議大夫行殿中少監員外置同正員裴君士外以凝正中惟雅實地稱垂之寶門降穠華之貴自邁迹朝行升榮御府尤聞密靜益重柔嘉亞彼儲端允符公選可太子少詹事主者施行敕元儲者萬國之貞端士者一時之選自匪英傑孰當調護銀青光祿大夫守兵部尚書同中書門下三品上柱國梁縣開國公姚元之中散大夫檢校吏部尚書同中書門下三品宋璟等並以賢良方正茂才異等著於天下揚於王庭忠而在公孝以為政見義難奪立誠不回發揮文教博綜儒術故能生此王國戴於朕躬屬少陽初建承華洞啓使股肱之良宣諭道德雖典厥二柄實務茲官必俟大臣俾兼中庶元之可兼左庶子璟可兼右庶子餘如故黃門銀青光祿大夫行兵部侍郎上柱國韋抗公直有檢清芳無欲自然禮儀飾以文雅臺閣許其精練縉紳推其望實故可以發揮夏籥光踐春華宜從綺季之遊益重王商之拜可行太子左庶子散官勳如故主者施行門下太子左庶子崔圭和氣由衷通才應物衣冠貴其雅道筆札資於利用宮坊效職聲實攸歸曾是遞遷宜從後命可太子左庶子散官勳如故門下古者官宿其業吏不數變將欲勸其始終因以別其能否若用捨非當遲速不倫是開趨競之門豈曰和均之道宗正少卿崔秀等名迹早著朝廷所推各效一官已經四稔誠器能有用久次當遷宜副僉諧俾膺並命且承平日久從仕者多必憑考績方議進轉但須慎守豈滯其能如或躁求是招其纍速則不達謙而必亨凡今庶僚宜悉朕意可依前件門下朝議郎守駕部員外郎兼御史中丞朔方節度行軍司馬關內道採訪處置使賜紫金魚袋郭虛已雅才明達和氣清深致遠之資文而飾吏徐雅之用剛且近仁纍踐臺閣頻更任使懋功斯久賞善當遷擢以正人宜拜職於中庶增其寵服俾兼榮於獨坐可朝散大夫守左庶子兼御史中丞餘如故黃門正議大夫行太子左贊善大夫于光寓立言踐行悅禮敦詩為文可觀從吏不忝往登仙閣間練馳聲洎在雄藩清公應物宜以大夫之列更增端士之華可行太子中允散官如故主者施行敕李寮賓於諸侯之府者次於公朝之吏籍其參畫則就加甄擢獻其賢能則入選闕寮事其長有勞可書升於東朝因願之請勉奉清秩無曠厥官可依前件敕朝議郎前行洛州録事參軍魏慤措心和暢祗事清密擢選殊尤早從殷劇司州總録已提郡吏之綱望苑求賢宜在正人之列可太子司議郎敕朝議郎前守渭州司馬上柱國武城縣開國男張肩公清衆知虛白已任政先慈惠理尚仁明每執效官之心必聞奏課之首承華佇雋博望甄才用旌賢相之家宜在正人之列可行太子司議郎散官勳如故門下朝散大夫行殿中侍御史上柱國許誠感朝議大夫守澤州別駕上柱國嘉興縣開國子姚昌潤等或持邦憲才幹稱多或二藩條公勤克著青宮列侍元閣修文宜拜職於兩司仍佐軍於三蜀誠感可行太子司議郎昌潤可守著作郎仍充劍南節度判官勳封各如故黃門大中大夫前試剡王府長史上柱國鄭國公楊禎敬以安仁恭而合禮相門華胄夙著清徽王邸元寮復膺高選屬肇開於博望宜審諭於承華可行太子右諭德餘如故主者施行黃門通議大夫行宋王府咨議參軍上柱國王瑀雅清理識尤茂風檢藝能素優名教為樂雍容朱邸已聞諷議之先侍從青宮宜在文儒之列可行太子左贊善散官如故主者施行黃門正議大夫行絳州司馬上柱國蘇徵名公之訓能遺清白才子馳聲特稱敏贍往從遷貶不詘姦邪遂使揚歷官次滯遺年序宜旌絳郡之康式寵青宮之列可太子右贊善大夫散官如故主者施行黃門朝議大夫前守陝王府咨議參軍上柱國吳升悟理明達用心微妙博以才藝精於談吐西園月上亟聞飛蓋之篇東陸春歸宜聽鳴笳之響可守太子左贊善大夫散官勳如故主者施行敕昭成皇后四從叔朝議郎行黃州司馬竇元泰觀津之榮纍稱外戚伏波之訓方裕後昆可勸導宗黨儀刑門族俾登洗馬之秩罔忝躍龍之戒可太子洗馬員外置同正員散官如故仍為長檢校本族子弟事敕朝散郎守忠王友翰林供奉兼侍諸王等書李思詮等官分望府名著周行咸以其長各施於用藩維樂善巳陟於元良僚屬延恩俾遷於列位可依前件黃門朝請大夫殿中侍制史內供奉判尚書司勳員外郎上柱國蕭嵩沉密有才清方不競郎官御史已膺臺閣之求端士正人宜副宮坊之選可行太子舍人散官勳如故主者施行黃門中散大夫行鴻臚寺丞上柱國夏縣開國公姚奕循環禮輿祗若謙柄清白為事文章著名宜升景倩之才更拜當時之秩可行太子舍人散官勳封如故主者施行敕福建等州節度下都知館驛官朝散郎守大理司直賜緋魚袋崔縝爰資藝文以飾吏事名參使局效著郵亭速置多方急宣應命類能舉賢懋賞分官俾膺儲寀之任仍踐憲臣之列可試太子舍人兼監察御史餘如故敕殿中侍御史內供奉崔宥早循學行纍踐班資尤推吏道之能克展官常之效頃持風憲備洽聲猷眷求正人列彼儲寀宜膺朝選式奬公才可守太子舍人敕奉議郎試太子左贊善大夫京兆府推勾官輕車都尉向遊仙奉議郎前行宣州司戶參軍京兆推勾官上護軍紀千鈞等各有藝能兼推吏幹通於文法檢以貞廉公勤不偷課效斯著俾遷階秩之寵仍加章服之榮遊仙可朝散大夫守義王府長史勳如故千鈞可太子通事舍人散官勳如故敕左散騎常侍兼修國史上柱國平陽郡開國公柳沖族茂汾鼎價珍垂璧雅負通才備聞遺訓探六經之奧如叩鴻鐘窮百氏之源若披明鏡挾輿切問侍從增榮擁篲崇儒師資佇德可兼溫王師門下利建子弟旁求師傅委之訓導必舉方直銀青光祿大夫前岐州刺史上柱國歸義縣開國男楊廉外示靜默言將發而寡辭內敷條理德不孤而應物故能遊藝聚學修官辨政臺閣盡清華之選吏人懷撫貸之餘儀刑是稱參議斯在當肄業於鄒衍俾賦詩於韋孟可陝王傅勳封如故主者施行黃門朝散大夫守尚書駕部郎中崔子源地緒清茂風襟亮拔有如繩之直懷匪石之心學不為人文能飾吏憲曹白秋隼曾飛禮闥青縑晨鳬就列眷於藩邸親則舊甥俾踐端寮宜膺寵命可檢校岐王府長史散官如故仍追赴京主者施行黃門朝議大夫守忠州刺史上騎都尉王守廉飭躬清苦居心孝悌往操憲已著厥聲洎頒條寄克修其政俾筵之茂寵參碣館之元寮可申王府長史散官勳如故主者施行敕銀青光祿大夫使持節建州諸軍事行建州刺史巨鹿縣開國伯魏明才業可稱器能適用恪勤彰於事任綏緝著於公方考績有成班資可進宜從使局之請俾踐藩寮之職可行彭王府長史散官勳封如故門下正議大夫行尚書主爵郎中上柱國田幹之聿修厥德孝稱於百行無玷斯言慎比於三復文儒每固其業清白用傳其範拜郎仙署已題京兆之名為相寵藩式贊河間之美可行溫王府司馬散官勳如故主者施行敕惟雍設都實難其理尹京鎮俗不易其才御史大夫上柱國廣平郡開國公宋璟天假直清時歸方正端莊以立姦慝遷於望風果斷而行綱維成於不日衣冠所重人吏攸欽俾承彈糾之餘仍綜浩穰之劇可兼京兆尹餘如故黃門九牧之重列為州伯四方之則求於京尹或匪其才莫膺茲任左散騎常侍上柱國東都留守蕭璿體峻而整氣剛而直慎必兼清文能飾吏慈惠可以應務嚴明可以訓人故當權豪革心貴戚斂手三王迭拜況其甫嗣家聲二鮑相承未若纍光朝奬休命斯允僉言所屬可京兆尹勳如故主者施行黃門乃眷清洛常聞舊尹重臨黃霸欽若古人銀青光祿大夫陝州刺史上柱國武威縣開國子李傑適務宏才徇公清節以言博物貞固幹事當其奉所任罄厥心必欲存於周密曾不顧於險夷可謂國之良吏朝之藎臣宜回陝服之委更允河都之借可河南尹勳封如故依舊充水陸轉運使主者施行黃門洛陽設都海內均土自匪選衆疇能尹京蒲州刺史上柱國平陽郡開國公畢構純懿篤密直方清徑積學所以體要道力文所以會雅正徇公滅私吏不犯法擒姦擲伏人無間言在邦則聞從政何有六遂分職四方作經思齊李膺之舉宜允袁安之拜可河南尹勳封如故主者施行黃門正議大夫行萬年縣令上柱國南安縣開國公秦守一敏而無滯通則有才刻意深尚於政方立言每求於學術委之京劇時許能聲眷彼州端朝推令問俾升遷於墨綬佇明察於赭裾可行京兆少尹散官勳封如故主者施行黃門正議大夫檢校將作少匠上柱國白知慎博觀墳史祗奉程式吏道尤精公心不轉郎官起草增其應宿之華匠者運斤主其成風之妙任能結約省費馳聲爰瞻上洛之都宜亞尹河之寵可行河南少尹散官勳封如故主者施行
