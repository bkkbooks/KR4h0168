body:
  text: 惟大也不能以小測惟高也難可以近知况窮天之至象徒執管而潛窺驟景風激馳光電移迷蒼蒼之正色杳的的而成規桂魄未圓餘輝來而尚溢陽烏當晝遠色照而全虧當其懸象在天明眸在管環視而遠維不極仰觀而長河若斷雲明滅而浮影時聚星曖昧而流光倏滿紫微黃道斯蔽其縱橫北陸南躔曷究其長短觀其悠然遠象浩兮元穹老氏守真不窺而自見裨公億度屢中而無功况乎溥天四極之大依微徑寸之中詎能分其經緯固且昧其變通若乃迢夜澄月高飈掃霧衆形必流㣥象斯布邈上下之遠邇敻東西之晷度儔能算其盈縮孰可研於推步元機莫覩徒騁離朱之明大象都迷安徵平子之賦且夫莫細匪管莫高匪天仰瞻而範圍斯昧垂覆而周流自遷則知德之微難以片言語道之廣難以一理筌苟持此而不舍吾未見極深而造元者矣彼蒼者天成形物先初鴻濛以質判漸輕清而體圓生五材以亭毒運六氣以陶甄故使晦明相繼寒暑遞遷遠眺其原兮亦極之無極近詳其理兮固元之又元諒神功之罕測實靈造之自然徒觀其潛化不言惟德是輔列九野而為號峙八山而為柱其為道也或比之以張弓其入夢也或方之於漱乳憫鄒衍則嚴霜夏降應陳實則繁星夜聚孔階遠而難登樂霧披而已覩雖覆繖之可豈鍊石之能補美夫有功不伐無遠不葢德冠三才名參四大日朝上而疑璧河夜橫而如帶破鏡飛乎其所長劍倚乎其外違之則風雨差錯順之則陰陽交泰况乎觀文察變虧盈尚默則大著美於唐君慮崩見譏於國徒瞻蕩蕩之體孰辯蒼蒼之色在玉衡以齊政任鋼史以司刻名既入於四知光鎮臨於八極顧惟仰歎載之無力思斡運之莫原惟遠近之難識倘聞鳴臯之響願奮垂雲之翼嗟天道之大哉非管窺之可測日觀天文彼黃人之離立是守麗紫霄而規模乍分揖杲杲之光豈勞披霧舉駸駸之足詎假憑雲孕靈自禀於真宰肖貌方瑞於明君觀其異體同心雙形合力如左右之司局以扶持而受職樂天成象豈殊連璧之文就日無私特比鑄金之色所以煥人寰彰土德高尋罔差其晷度迴騖靡於頃刻類聚炎上朋來熱中遙集丹極迴翔碧空援四彗而克資煩手斲重輪而叶贊元功發祥光之照爛將德輝而統同不然者何以挺茲妙有倬彼輕清夾輔躔次周旋運行通理之形容可辨和光之顏色混成當烏采甫臨之初則溫溫而引耀遇雞人未唱之際亦專專以在明髣髴如蘭之契逍遙若木之程及夫曈曨既昇昭晰將晚厥瑞皆見斯人甚遠宵依愕夢伴程昱以少畱畫遇揮戈感魯陽而俱返恭已無怠旁行有鄰化天隅之一氣為日邊之二人久照不疲匪迷陽於上帝四夷云格方取契於援神所以靈貺克開容裔徘徊非其時則抱影長往偶乎聖則差肩並來隨冬曦之煦嫗與夏日之恢台然後竦輕軀恣遐步分明天表雙美雲路願將守黑之心望離宮而景附正月初吉觀大明之東吐間瑞氣而曉出初混色於青山之上猶謂護霜漸凝華於黃道之中分明捧日與抱珥而偶方守人為匹原夫皇帝御紫宸垂至仁恩覃日域澤被雲津居其中得通理之體察其外想維城之親然後蔚亭亭之彩環杲杲之輪左之右之擁榮光於碧漢或先或後敷正色於青春懿乎日者君之德雲者臣之狀彼無私以臨下此竭誠而奉上故得配陽精而為煥符土德而標王以此圖國國乃豐盈以此示人人知揖讓既而呈彼瑞暾曜於天門似佐無為之化如承煦嫗之恩自東徂西異衆星之拱極陳力就列同萬品之尊元其瑞如之何以慶其主其色如之何非聖不覩像伊臯之羽翼同周召之夾輔麗焉成象非徒負舟之龍照也騰文盡若苴茅之土蕭索籠光徘徊效祥抱一輪而匪烏莫黑散九野而何草不黃是日也乾坤交泰霄漢熒煌風以動之謂奉中央之帝人皆仰也如披元吉之裳識我者寡遇我者衆思飄飄而有託目眇眇而遙送飛烟下接乍迴屏翳之姿喜氣上浮疑繞羲和之控信乎聖德所加禎祥不遐天道悅人謀嘉故得無心之雲出山川而變色有耀之瑞應圖牒而增華太陽淳精兮表德於君德感珍瑞兮應天垂文曉望東方升輝輝之麗景晴分上漢覩郁郁之祥雲若乃運協堯年靈符舜日燦玉葉以繁布抱金輪而半出灼爍兮乍似漢祖隱居橫紫氣曈曨兮又若楚王乘舟捧萍實豈錦江之所擬諒秦鏡之非匹既而五彩不散三足增輝英英而浮光並射杲杲而合璧相依信乾坤之道不昧知君臣之德同歸我唐由是越五馳聲超三表聖臣如雲而仰均雨露君並日而用敷德政故表乃禎祥之主遂其雲日之性始漠漠以飛空復昭昭而遠映迹前王之能事曷比夫今日之休慶也徒觀其啟重霄而迥出得中道而遐征不傍樓臺詎隨於聚散不依城闕但耀其真精氤氳兮匪氛霧而能雜泱漭兮知沴氣而不生懿夫日麗天兮出巨海瑞應臻兮見其彩雲浮空兮靄休祥靈輝集兮寶其相故可以卜年永祚奕聖蕃昌大矣哉茲瑞之為慶裨福善而無疆若鯫生者飲化闕庭削迹海嶠覩慶雲而動詠仰聖日以觀妙是知物無不感幽罔不照蠢茲動植之類莫不息陰而發耀赫矣陽精瑞色融爛輪既側而復正景將曛而重煥考祥歷於休明識天心之叶贊信遐荒丕耀而品物貞觀夫其禎烟空耿霄漢始由度而方映忽移躔於已旰長空斂雲爌朗烟熅考殊祥於瑞牒軼衆象於天文燭乎幽同無私於聖代鑒乎下將比耀於明君宜穹蒼之朗霽屏黃道之氛曀踆烏翻翼以迴翔羲和弭節以容裔亭亭兮直午位而逾正杲杲乎爍離宮而增麗休徵屢發於漢皇德感更侔於唐帝雖百官奉職疇人展藝異迴戈之所麾非長繩之能繫是則元貺告祉皇明受釐日之昃兮靡虧於常度日復中兮叶慶於昌期土圭不能測其晷玉漏焉足定其時照委晴空曖祥光之郁郁時當春盡添麗景之遲遲惟我后之至化驗靈符而斯數懸金鏡於天衢提璿衡於掌握不然何以表昌期之會迴倒景之車澄清光而炯若扇炎盛而赫如徙倚遙漢徘徊太虛夸父之奔於焉少息垣平之對難以比諸信可以遵祀典委裘而拜命太史以望而書日麗天兮運行而未已日再中兮表慶於遐邇每同葵藿之誠冀流光而及此國家握乾符定天保禮樂修而叶德星辰行而軌道是以南方之氣共列色於少陽北斗之靈乃垂衣於元造是時玉燭調律攝提司方巽為發生我則青而呈瑞離為正位我則赤而啟祥其數也合三才而列曜其色也表一德而中黃雖感而匪遠亦見不于常所以合天地之貞觀明教化之昭彰應朱鳥之精生而垂翼躔踆烏之道出則加房觀其氤氳映空光明在上乍元氣之肇分若連珠之遠狀是以覩天道因德而祐符我皇乘土而王乃知惟天為大惟聖則之聖觀象以立極天應聖而無私故星合度於三統氣不奸於四時者也若乃鎮之所加歲之所守則合氣而出有精淪五老台坼六符則乘氣而入無豈惟繫隱見於虛實定躔舍之徐疾瞻寶玉而非獨衝斗俾滂沱而徒云離畢所以掩萬代而莫類超百祥而獨出不然者何以表至化之文明見元象之陰步馬於是天子占太史命有司諒修德而無怠在降福而不遲是必隱於兇孽是必耀於孝思嗚呼後代不敬曷其太史退而書曰於時君臣同德蠻夷率職道合上帝信孚下國於是二氣正而叶和三星黃而合色承清問而載言俾洪裔而作則皇天有知明命不疑既何言而守默亦懸象而高垂彼星之見者下符睿哲上麗圓規將旌德之治亂必審時而推移故行藏克協乎道盈縮不失其宜於是稽其義觀其象色煥炳光炯晃挂青漢粲粲其輝連白榆歷歷其狀天以祚聖垂元精而臨下聖以應天憑至誠而感上覩其貌美天文之昭昭原其本知王道之蕩蕩蓋以瑞本斯表祥光是含五緯知讓七紀懷慙與時俱明兮皇化齊美將聖共出兮元德相參豈同夫入蜀而使臣應其二在戶而詩人詠其三徒觀其象高而遠質明而微如曙燈之欲滅若秋螢之不飛夜則出焉麗乾元以發彩晝而隱也讓太陽而藏輝不然則安知國家無為無事垂拱垂衣乎我唐至德可久立功不朽澤及四海化被九有緊彼景星契我元首俾千品萬類仰而知其太平四夷八蠻瞻而慕乎聖后若然則其驗可徵其事可考伊星之叶聖如風之偃草其靈也在乎或出或處其應也彰乎有道無道彼漢祖之聚五星唐堯之感五老未若帝命是錫生靈載造天祿無疆鴻業永保者也原夫莫大匪天莫明匪德天也惟德是輔德也惟天是則是以垂一星而呈萬國其明孔彰其儀不忒至若雲開天碧昭然可覿炳如金粟粲若銀礫煌煌其明爛爛其色九霄靜而載揚光芒千里望而不違咫尺客有觀天文察時變惟景星之所在信有道而則見美盛德之形容懷斯文而願薦客有曉躡稜層高山獨登覽烟嵐之忽斂見海日之初昇赫彩旁照炎光上騰影乍搖而滿目霞碎波不動而長空血凝由是倚危巒立天壇夜色既啟炎精始團赤氛上煥於雲路朱輪乍碾於波瀾照耀一海之中剖開萍實分明百丈之外洗出金盤浩渺無涯曈䏊在望高居崢嶸之頂下視赫曦之狀焚巨浸浮沉奔浪陽烏浴羽而載飛羲和按轡而直上不沉乎泉將麗乎天爍雲濤而有曜類庭燎而無烟赫赫光滿規規質圓纔湧出於溟渤之底已盡見乎巖嶺之巔所以躋高峯翫丹彩明暗既分昇沉斯在望若木之初出疑槎泛於天河想陰火之潛照見焰燒於滄海出水未遠騰輝已殷託高迹於巉崪之際指大明於顧盼之間湧上扶桑謂蟠桃之有蕊照出仙島疑燭龍之映山歘赫滿空淵渟沃日當銀漢而炫晃泛金波以洋溢巨鯨之冥目霍張洪爐之鑄鏡飛出及登乎軌度射破氛霧洗光華而不溼衝塵埃而寧汚倚九天以照臨見百川之奔赴故游者徙倚遐望徘徊久駐因物屬詞媿升高而能賦於穆聖唐建其皇極通三微兮昊穹降祉褆萬福兮陰陽不測答禧祥於一人見彩雲之五色其為狀也乃從龍以分氣其為勢也若摶鵬之垂翼薈蔚非觸石而興縹緲盈畫工之飾蔥翠炯晃蕭索氛氳迴合斐亹散聚分文轉光風則動而愈出衝霽日則燦然皆分古之函關紫氣帝鄉白雲豈比澄鮮流慶作瑞吾君夫德施者帝王之所崇雲行者天地之所溥惟帝德之動天諒卿雲之飛吐光浮碧落奪虹彩於太虛影下清潭照錦色於曲浦將以發揮明時騰邁前古雖建官惟賢列爵惟五降及品彙莫不是覩緬彼瑞牒詢夫物名則有甘露降黃河清狐九尾而來擾草三秀而敷榮若以匹敵莫之與京式昭聖理承應天卿是乃感壽以呈休應君以來附苟非至道則未期遇故漢主之祠后土也寶鼎見兮其色同昭軒轅之誅蚩尤也華葢蒙兮一疑形乃拊推衆聖於往昔亦効祉而斯覩式贊其羭原注左傳羭美也恭命述賦觸石起於膚寸散遠天以迤邐既輪囷而合道澹搖曳以無為綴廣莫以霜淨凝太虛以纓垂出處靡常同至人之無著卷舒罔究類君子之不羈翹玉葉以繚繞耀金柯而陸離其兆無質其形罕一匪潤礎以上昇或從龍而迥出入房呈貺偶作瑞於殷王登封効祥諒無情於漢室影遙連於遠水光俯接於平川幾徘徊以暫散倏迤邐而相連分至必書驗其物而有則荊棘不別表茲性之無偏勢出塞以繽紛色瑩空以氤氳被漫漫之精氣成英英之白雲抱翠石以流彩入清池而寫文或假勢於重嶺或隔閡於孤山挺奇峯於天末亘橫陣於巖間順細雨而低舉隨輕風而往還哂魚鱗之覆地輕鵬翼之垂天誠莫測其所感亦安知其所然五色競彰我則匪黃匪黑五方皆遍我則何後何先至矣哉信潔白之無心實敷華之不實雲之容兮或明或暗雲之體兮乍徐乍疾唐堯沉璧而受釐軒后紀官而修吉異哉遠近相追紆餘葳蕤出蒼梧以漠漠入帝鄉以遲遲媿作淩雲之賦思歌出谷之詩儻賢良以見舉庶微才以應之余嘗志於元言每尋莊老莫不虛心竦神銳精厲志究夫道源孰不因氣而生者其功也大其應也細述之無已遂成賦曰二儀混合兮成天地四氣汗漫兮育萬類離雲騰陵而千峯崔嵬震風飋䫻而百卉蔥翠宵中星虛則大火西流律應黃鍾而凝陰東萃惟茲氣之浩然胡應物之無匱若乃假名為聲託體而成憑乎動息美惡必呈挫銳解紛庶同歸乎老氏虛心弱志或契合乎莊生逆之為怒順之為貞縱之則逸舍之則盈若也勇冠三軍神雄思銳善戰善勝徒激憤於項王嘉謀嘉猷望旗靡於曹劌爾其瞻白虹之貫日眺紫氣之衝牛應精誠之所感顯神異之潛周隨時變易物莫能儔則知氣之為用其道飛浮或聚或散處剛處柔能從達人之性偏攻思婦之愁其興也勃其去也休伊萬古之造化胡六合之因由陰陽以之準則天地以之通流匪斯文之可測終銘簡於千秋明水之設其義斯元水以潔著明由色宣神靈是享祀典攸傳籩豆靜嘉取其濯溉麴糵不用存乎吉蠲審靈變之無方實太陰之相借月當盤而冥召水承月而潛化沖融其色連桂影於晴空泛灩其光映銀河於永夜理包幽奧質本虛無在洞徹而彌朗介清明而不汙冠澄酒之奠禮其式序方行潦之酌亦實有殊懿夫淨透霄光遠浮星彩取之不竭從而不改彰至敬而用協神心兆無形而道符真宰信體微而義博知事簡而功倍當其配饗宗祧告成天地壇壝廣設粢盛大備爰命司烜聿持陰燧月晃朗而遐臨水潗湷而潛至既清既潔表勤昭事之心克誠克明載展奉先之意原夫物以類聚應因感生水惟坎德月實陰精所謂聲同即應氣合乃并行之斯行且比夫流而不滯止之斯止亦似乎滿而不盈徒觀夫皓魄淒清湛然澄澹出於朕兆形乎有感國家烝嘗是奉享獻惟崇明水載挹至誠遂通始分素魄之下俄傳清廟之中應召而生寧假挈瓶之智順時而委豈類汲井之功固將降肸蠁於純嘏表虔恭於聖衷者哉帝王之德無以加於孝乎惟孝之理惟農是先我上皇傳璽之二載聖主飛龍之四年日在陬訾祇事於九宮之位時維戊巳躬耕於千畝之田祥風發於耒耜瑞雪掩於郊厂墨萬姓禺禺若百川之朝海九官濟濟如衆星之麗天帝乃儼然蔭華葢被衮服戴冕旒佩瓊玉朱紘炯以照灼藻繂紛其繁縟敬齊之色既肅肅以雍雍禮樂之容亦皇皇而穆穆於是出甲乙之帳命先農之官設庭燎而晰晰陳量幣而戔戔旌旌夾於翠幕簨簴列於青壇然後華鐘撞焚燎舉馨香發乎聖躬烟熅感乎寰宇常伯撰播植之器宗人掌牲帛之數既金石而間陳亦籩豆而靜旅晨光漸朗湛露初晞告九天之事畢將三辰之禮依帝猶懷神農之務穡想伯禹之疆理一之日於是躬耕二之日於是舉趾秉金耦而禺若駕鐵驪而禮矣將致美於粢盛遂盡力於耘耔望農祥之晨正知土膏之脈起所寶惟穀故大飲以勞農所貴惟人故躬耕以悅使俾夫三時不奪六府咸修遂放牛於藪澤還卻馬於田疇道方齊於雨粟化實遠於焚裘務穡勸分顧勤於稷卨授時度地彌甚於殷周職乃分於九政不逮於諸侯豈惟人和而俗阜亦將力穡而有秋是日命丞相巡行山林道達溝瀆因物土以分宜隨川原而刊木畫為九野教種百穀實萬代之儲祉况九年之所蓄猶以為不躬不親庶人不信降翹車以徵求發紅粟以恤賑綈弋不加於嬪御茅茨永慕於堯舜祭惟司嗇蜡必田畯即異畝同穎豈獨瑞於往年象耕鳥耘是錫羨於今運適有田父起而歌曰畇畇千畝兮理有疆濟濟千耦兮稷既良躬三推兮供神倉分九兮應農祥粢盛普淖兮潔敬斯皇神之聽之兮將登穰穰土牛所置惟民是利將立表以勸農勝陶冶而為器相牽之狀或垂象而在天觀出之期諒成形而在地所以無芻豢之損殊死生之類實大塊之所資豈一撮之所致故乃用為恒典蕆其成事執農政之後先固策人以相示觀夫出康莊之際當立春之期既合土而象矣還服箱而似之誠鞭策而無用信耒耜之是持異彼土龍每因旱而方致同夫芻狗表至仁而無私若非農為國本曷能敬授人時原其事始誠則有以圖白巫以侔形每蔥犗而在視寧同日夕與㣥羊而下來諒在月窮惟御人之所指是以先春斯舉農正是供察之者覺順時而行令觀之者知有事於上農既惟人而是瞻豈與驥而同皁足以符務農之政足以叶勸人之道立之於後訝春事之尚遲御之於前悟農功之在早令出惟行百姓昭明既有象而垂則表得時而親耕立以示農豈憂燧尾之禍莫由而飯奚聞扣角之聲事有開而必先義任重而致遠既遵之而為早方驗之而知晚非同金鎖入寒渚而無蹤有異紺轅行藉田而方墾夫然則土牛之出也可以為農政之本惟皇御歷也播一德之景光統三正之令日端大裘於正位酌中靈於休吉元老伏稱於丹墀大夫建祚於聖術致君壽日比華封而祝堯獻酒福庭與鈞天而合律於時銅龍啟曙文物斯崇六英鏗鏗而迭奏萬國鏘鏘而會同上方端玉珽儼宸衷布發生之明命暢大化於元功欲以宣景福於遐邇同介祉於君公壽獻南山率土願歌於周雅位登北極惟仁亦播乎薰風既而舞蹈於丹禁之前再拜奉陶唐之酒趨雲陛以陳詞向爐烟而稽首升降濟濟將宣納祐之晨俯仰愔愔大啟如天之壽進退有則威儀可觀頌百靈於更始贊萬祀於履端傳喜氣而六事以正布春令而五教在寬故知我道化無疆德風吹萬皇猷大啟青陽始建千秋御歷既同傅氏之詞五采綴觴有異邯鄲之獻慶流華夏德配乾坤傳呼而珍符畢集應時而嘉瑞實繁所以麟鳳來祥於聖澤日月揚光於化元士有觀國之光賡歌大貺當元正之令節仰禮容於仙仗佩聲的皪大矣三公之儀瑞氣絪縕邈乎九天之上若夫銅儀改候金氣迎辰驚飛灰於素管送流火於清旻聽涼風之唳響視秋露之凝津月蒼蒼而上桂風蕭蕭而吹筠步廣庭而延佇仰層漢而馳神惟暮序之靈匹仰良宵而展會息龍杼於仙機駕羽橋於淺瀨耀九微之華彩澄八極之氛靄儼翠鳳以翔鑣舉丹蜺而振斾籠霧縠於雕輦謺雲花於綺葢舟容裔於水濱駕逶迤於烟外若乃仙娥侍轂玉女承騑嬴簫後唱洛鼓前揮褰九霄之雲幄曳五色之霞衣珮搖星而玉振扇掩月而紈飛陵紫宮而沉景轥黃道而騰暉始徘徊而好密契方阻而情違悵此夕之行盡恨前秋之未歸恡宵光之不駐泫晨露之將晞於是虯水移箭魚關驚鑰槎客河低鍼樓月落分一筵於俄頃解雙袂於今昨河漢忽其無梁秋期杳其無度銜別緒而惆悵對離居之寂寞思纏綿於曉雞情顧盼於歸鵲浩長歌於耿介弔孤影其焉託歌曰悲莫悲兮離別長怨莫怨兮私自傷斂橫波而向秋野垂玉筯兮沾羅裳歌響既畢恍然如失獨盈盈兮一水間空望望兮三秋日潤下之性有時可凝暑歸寒集陽閉陰升吹寒風之遠派蹙凍雨而成冰俾巨海以息浪胡涓波之足徵北陸陰涸寒泉井洌天吳外搏靈胥自結含貞抱虛既瑩且澈斷流而稜稜劒威照日而片片霜切馺坳曲陵湫穴蒼山甃石大冶流鐵圓光而蚌珠可掬朝涉而馬蹄可折既否隔於風雲亦閉藏於魚鼈爾乃命海若戒馮夷連燄絕於火井俾梁成於水湄乘險無替旬日不衰若擁輕絮如積素絲秋令雖終尚占庚辛之色嚴風更肅將奉元冥之司其為水也則陷其為冰也則履畜成比玉之壺散作流謙之水柔性是著仙顏是比方稽化而轉疑葢不知其所以夫其瀑布流湍迸射交攢簷溜承綆垂空凍乾微波煙羃大壑雲漫滴貫珠而呈脆排層巖而召寒至於六尺表奇百丈涵奧鼠北方而可規蠶東夏而稟操堅貞應運渡光武而堪奇孝德幽通獻赬鯉以為報始冰之初立冬之日將鑿井望納秩刷室應候司管調律溫泉殊沼夏蟲異術閶闔門靜瑯琊井溢當腹堅而將藏候朝陽而迺出不見因字官韻皇帝守位以仁為車以德將喻夫博載庶物取象夫經行萬國垂衣而退與人謀結旌而克陳帝力因樂推以發軔任不言而憑軾始效駕於情田之內不驅不馳終挂轊於王道之中自南自北夫改奢即儉尚質去華量包覆載迹達幽遐行乎道而四方是則同乎車丸而六合為家是知乘玉輅者又何足比駕金根者失其所誇爾其伐輻於自然之材斲輪用無為之道鑒馭朽以作訓念輶毛而是保前覆後誡諒成敗之足徵殊塗同歸信始終之可考伊至化之所備一作被如風令之偃草道德仁義配弨弓以致賢孝敬溫恭代輪而養老萬邦攸同九有克通樸斲在心詎比質於流水周行任道豈觀象於轉蓬以得賢為輪轅之助以守信為輗軏之功動天而善行無迹持重而利用不窮且工為車兮脆而易破德為車兮勞而成晚哂摧輪於太行憫困驥於吳坂域中咸賴功超乎大輅小戎天下皆肥力竭乎引重致遠澤可鑒而招損美不稱而崇侈爾則速禍以宣驕我則去彼而取此靡自家而刑國俾視遠而若邇豈徒與奚仲造父之徒論功而效伎僕少好讀書長而無替謝絕門客幽關長閉志尋經史見汲黯積薪之言即知君臣有道之契乃廢卷憤色竦袂臨砌豈吾道業謝於古人君德慙於往帝竟空鹽梅之用長虛舟楫之濟於是辭雲林裂荷薜赴以時貢擬先秋計何歲華之不與幾山川之迢遞積薪暗入於心期後來空望其他惠積薪何薪唯楚與桂其採之也翹車載馳畢搜其林壑其得之也良材盡取靡遺其巨細風塵爾勞阡陌相繼辭雲壤而百處指王城而四詣得大有之妙象同萃亨之深智無怠其功有司是主雖不近於丹陛幸得貯其華宇然蓄薪而雖多非有命而不取每至膳夫興造金鼎初汲論食玉而來窺將然桂而先挹勿貴先至在其下兮必棄置於後時勿輕後來居其上兮必取用而先及此自然之神理胡物情之可習已矣哉蒼苔蕪兮白露湛愁來曉夜紅顏減君若助化於聖明伏望留情於汲黯
