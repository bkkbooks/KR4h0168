front:
  text: 全唐文欽定全唐文卷七百五十九鉞開成時人
  hash: sha256:73de9acc3696c224d9551b6102e5e305769fa6d199b66dc6bf1aabe2e48c2438
  markers:
  - {type: head, offset: 14, content: 周鉞, id: KR4h0168_NFKB_759-h1, level: 1}
body:
  text: 彼山之峻兮稟氣而成此山之峻兮積壤所營何人功之彙聚致邱壑之崢嶸始假一坏巳見進吾於往終成九仞還宜景行而行當其率性作勞因高立趾將覆簣而可久念極天而有俟道既長而彌專力雖勤而未巳於是資地勢建土功區區而日不暇給矻矻而樂在其中以不拒物為心因成高大以不讓塵為德遂至穹崇所謂從微而至著有感而必通致峯巒而因人立跡侔造化而與古爭雄故得日就月將天長地久小既資於坎窞大豈遺於培塿非辭形倦將欲必致於雲霄所冀道成亦以兼容之妍不有始有卒乃勤乃勞依依漸長日日增高以力為謀比大不唯於熊耳將勤喻學成功豈謝於牛毛是謂積小以稱奇裒多而為貴既稠疊於委輸亦縱橫於經緯則聚米者固不足云累臺者於斯殊未所以塊然凝質崒爾成姿千峯可數五色無遺以此驗巨靈之神誠為怪也以此想愚公之事亦可凄其別有十載施勞三冬率是常負荷以相勉每勤求而自揣所冀必成無虞中毀倘若因我而出雲庶亦降神而在此大壑天接雙山闕如作鎮而巍峩對峙象門而中外皆虛拆萬仞於長霄共持神秀納八紘之積水開閉靈居合沓龍蟠連延壁立懸崖嶄崒而不動駭水喧豗而自急每使盈虧之月向裏升沈能令蚤暮之潮由茲出入故得周天柱作海門峻軋空碧高城混天奔謺浪而若容車馬拔跳巒而似列藩垣當晴晝而纖霧豁開大吞江漢值陰霾而濃雲交翳暗鎻乾坤外布雄稜內施巖嶠波聲相切以澎湃山狀並分而竦峭呀吳呷越總舟楫之隄防發電轟雷轄魚龍之衝要岌岌崇崇橫西截東風濤莫犯乎永固天地將齊乎不終况乎據是水德鑿非禹功海若抱關於其側陽侯擊柝乎其中彼岱輿因顓頊漂流太行為愚公遷易一則屹要道而徒在一則滔洪波而何適未若是山也專百靈捍禦表㣥聖光宅吐晴虹以為楣森古木以成㦸故能咽喉水府掩映仙都長鯨透而謂呈魚鑰曉日照而疑啟金鋪以嶽而言巡八州而何有以門而視指三海而則無異乎勢壓坤維氣連淮浦作巨浸含宏之閫為百谷委輸之戶所以知開闢之元功豈止亘億齡而窮萬古權開成時人吳隱之擁節南海停驂石門遇貪泉之廣陌若旨酒於汙樽由是徵圖籍所載考耆舊之言云注茲而難窮地理或飲者而能移性原公乃斯言已察其事惟審十目所視表執心而不回一勺之多遂舉杯而就飲重言曰所執在我寧由此泉瀉泠泠而反同潔已恃惴惴而過甚防川恬淡相資漸滂沱於德澤清廉是守何汨沒於情田將正浮俗而去彼覩濫觴而在此臨川而不覺起予命酌而甘從率爾盈科即挹聊抒思以盤桓健筆忽飛寫緣情之綺靡既而威臨俗鎮塵靜邊空闔境而皆知嚮化四方而靡不趨風量比滄溟能控清而引濁心如白水可原始而要終當其境接遐荒郡維幽僻山川而多含瘴霧草木而少蒙膏澤道之云遠人不願適公藏器以俟時方遇君之側席泉云飲而名乃益彰心秉直而誓當不易則如真清特立瑕穢莫侵人飲酒而蕩志我飲泉而洗心胡不誇於一石而不愧於千金於以明好惡定能否不貪為寶而可憐不飲盜泉而非偶懿哉君子之鴻名竹帛永垂於不朽蟾太和三年官浙西觀察畱後刀匕之任庖人是司將修火以烹矣取小鮮而作之洶洶之中似有躍泉之勢炎炎之上猶憐漏網之姿則無復游小沚奮纖鬐既逢鼎鑊之患永絕江湖之思其始也出彼清瀾委茲敝笱落細鱗於方寸之質煦微沬於噞喁之口齊一指而未并事寸刃而纔受驗星星之若無升鼎俎而何有瞻其沈浮若水洶湧如驚不有大觚奚假良庖之妙無容尺素何必呼兒以烹是知將善其事亦叶於道若運動之不息則完全而莫保如或罷其紛紜任其顛倒則偶鹽梅之側宛若銜珠映莫疑蕭之中猶如在藻是知至人以魚小者國可喻焉其化而敦夫德善其烹而委之火傳則味不慝道乃全將成其心齊之化無貴乎獺祭之鮮且夫烹之煩而魚必毀政之撓而人不理魚不以煩為貴人不以撓為美反覆無極必為糜潰之道簡易不修自作滋彰之始是知求全者動不如靜務理者語不如默動之則一鼎渾渾語之則萬人惑惑想潎潎之微質不可而求俾浩浩之澆風無由自息今聖人任一意朝萬國蓋以體元元而得諸靜寰海而宴如豈徒以窮高極厚之內喻之於一魚者哉鉉字台碩博州人第進士會昌三年拜中書侍郎同中書門下平章事罷為陜虢觀察使宣宗朝擢河中節度使進尚書左僕射兼門下侍郎封博陵公出為淮南節度使兼宣歙池觀察使加檢校司空咸通初徙山南東道荊南二鎮封魏國公宰相之統庶僚僕射之臨郎吏豈有導騎已過按轡橫衝權審久在班行合諳典故便知素履且舉舊條送省罰七直闕紃宰相易直子官渭南尉武宗朝入為戶部郎中集賢校理貶秦州司戶參軍物有燦奇文抽藻思含五彩而可寶煥六書以增媚豈不以潤色形容昭宣夢寐漬毫端於一勺潛含水章施墨妙於八行宛成錦字言念伊人光輝發身拳然手受灼若迷真戴帛驚纈文漸出臨池訝蓮影長新效用詞林分宿鳥之丹羽呈功學海間遊魚之彩鱗所以成盡飾之規得和光之道輕肆力於垂露觀流精於起草俾題橋之處轉稱舒虹當進牘之時尢宜奮藻掌握猶重文章可矜糅松煙以霞駮操竹簡而淚凝儻使書紳黼黻之容斯美如令畫像丹青之妙足徵卓爾無雙班然不一摛握彩以冥契刷孤鋒而秀出紛色絲兮宜映練囊暈科斗兮似開緗帙動人文之際懷豹變于良霄呈鳥跡之前想烏凝於瑞日當其色授之初念忘形而獲諸魂交之次驚目亂以相於將發揮於煉石闕書秉翰苑之間媚花陰而蔚矣耕情田之上臨玉德以斑如是能潛映丹誠暗彰吉夢嘉不亂之如削意相宣而載弄混青蠅之點取類華蟲述皓鶴之書思齊彩鳳故可以彰施薤葉點綴桃花舒彩箋以增麗耀丹管以孔嘉彼雕翠羽而示功鏤文犀以窮奢曾不如披藻翰而發光華倬官宋州刺史會昌中有詔大除佛寺凡鎔塑繪刻堂閣殿宇關于佛祠者焚滅銷破一無遺餘遣御史覆視之州縣震畏至于碑幢銘鏤贊述之類亦皆毀拆瘞藏之此州開元寺先有太師魯郡顏公以郡守僚吏州人等為連帥田氏八關齋會鐫記大幢立石袤丈而圍幾再尋程材巨異八觚如砥偉詞逸翰龍躍鸞翔時刺史邑宰以其大不可折遂鏨鑿缺敗以仆之蓋三面僅存委埋於土倬大中己巳歲守郡明年嘗暇日訪求前賢事蹟郡從事涂君因言有魯公石幢索而得之土壹壤之下瘢痍壞失文義乖絕尋繹研究不可復知意其邑居之中必有藏錄其文者果於前刺史唐氏之家得其模石本末完備炳然輝耀溢目倬自幼學慕習魯公書法纔不能窺涉其門宇然惜其高蹤堙沒遂命攻治其傷殘補續其次雖真贗懸越貂狗相屬且復瞻仰魯公遺文昭示於後矣大中五年正月一日敘埴開成初官學士伏以朝官出使自合驛馬不合更乘檐子自此請不限高卑不得輒乘檐子如病即任所在陳牒仍申中書門下及御史臺其檐夫自出錢雇節度使有疾亦許乘檐子不得便乘臥轝宰相三公師保尚書令正省僕射及致仕官疾病者許乘之餘官並不在乘限其檐子任依漢魏故事準載步輿步輿之制不得更務華飾其三品以上官及刺史赴任有疾亦任所在陳牒許暫乘病瘥日停不得驛中停止人夫並須自雇延翰宰相度從子長安南下杜樊鄉酈元長注水經實樊川也延翰外曾祖司徒岐公之別墅在焉上五年冬仲舅自吳興守拜考功郎中知制誥盡吳興俸錢創治其墅出中書直亟召昵密往遊其地一旦談啁酒酣顧延翰曰司馬遷云自古富貴其名磨滅者不可勝紀我適稚走於此得官受俸再治完具俄及老為樊上翁既不自期富貴要有數百首文章異日爾為我序號樊川集如此則顧樊川一禽魚一草木無恨矣庶千百年未隨此磨滅矣明年遷中書舍人始少得恙盡搜文章閱千百紙焚擲纔屬畱者十二三延翰自撮髮讀書學文率承導誘伏念初出仕入朝三直太史筆比四出守其間逾二十年凡有撰制大手短章塗藳醉墨碩夥纖屑雖適僻阻不遠數千里必獲寫示以是在延翰久藏蓄者甲乙籤目比校焚外十多七八得詩賦傳錄論辨碑誌序記書啟表制離為二十編合四百五十首題曰樊川文集嗚呼雖當一時戲感之言孰見魄兆而果騐白耶嘻文章與政通而風俗以文移在三代之道以文與忠敬隨之是為理具與運高下採古作者之論以屈原宋玉賈誼司馬遷相如楊雄劉向班固為世魁傑然騷人之辭怨刺憤懟雖授及君臣教化而不能霑洽時論相如子雲王褱麗詭譎諷多要寡羨漫無歸不見治亂賈馬劉班乘時若君之善否直豁己臆奮然以拯世扶物為任纂緒造端必不空言言之所及則君臣禮樂教化賞罰無不包焉竊觀仲舅之文高騁敻厲旁紹曲摭絜簡渾圓勁出橫貫滌濯滓窳支立欹倚呵磨皸瘃如火照焉爬梳痛痒如水洗焉其抉剔挫偃敢斷果行若誓牧野前無有敵其正視嚴聽前衡後鑾如整冠裳祇謁宗廟其聒蟄爆聾發慄若大呂勁鳴洪鐘橫撞撐裂噎喑戛切韶頀其砭熨嫉惡堤障初終若濡槁於未焚膏癰於未穿栽培教化翻正治亂變醨養瘠堯醲舜薰斯有意趨賈馬劉班之藩墻者耶其文有罪言者原十六衞者戰守二論者與時宰論用兵論江賊二書者上獵秦漢魏晉南北二朝逮貞觀至長慶數千百年兵農刑政措置當否皆能採取前事凡人未嘗經度者若繩裁刀解粉畫線織布在眼見耳聞哉其譎往事則阿房宮賦刺當代則感懷詩有國欲亡則得一賢人決遂不亡者則張保罪傳尚古兵柄本出儒術不專任武力者則注孫子而為其序襃勒賢傑表揭職業則贈莊淑大長公主及故奇章公汝南公墓誌標白歷代取士得才率由公族子弟為多則與高大夫書諫諍之體非訐醜惡與主鬬激則論諫書若一縣宰因行德教不施刑罰能舉古風則謝守黃州表一存一亡適見交分則祭李處州文訓勵官業告束君命擬古典謨以寓誅賞則司帝之誥其餘述喻讚誡興諷愁傷易格異狀機鍵雜發雖綿遠窮幽膿腴魁礨筆酣興健窕眇碎細包詩人之軌憲整揚馬之牙陣聳曹劉之骨氣掇顏謝之物色然未始不撥斸治本緪幅道義鈎深於經史觝禦於理化也故文中子曰言文而不及理王道何從而興乎嘻所謂文章與政通風俗以文移果於是以卜盛時理具踔三代而蔭萬古若躋太華臨溟渤但觀乎積高而杳深不知其磅礡澶漫所為遠大者也近代或序其文非有名與位則文學宗老小子既就其集寤寐思慮反覆不翅逾年苟墜承顧付與之言雖晦顯兩不相解在他人無知其狀者然以高有天幽有神陰有宰物者可自誣抵以甘罰殛故總其條目強自後序至於裁判風雅宰制典刑標翊時濟物之才編志業名位之實則恭俟叔父中書公於前序王褱王茂元帥陳許表為判官右件官言思無諂集作邪學就有道屢為從事嘗佐正人加以富有文辭精於草隸雋而且檢通亦不流臣所部稍遠京都每繁章奏敢茲上請乞以自隨伏請依資賜授憲官充臣節度掌書記禮之所立本乎誠敬廟之所設實在尊嚴既曰薦誠則宜統一昔周之東西有廟亦可徵其所由但緣卜洛之初既須營建又以遷都未決因議兩畱酌其事情匪務於廣祭法明矣伏以東都太廟廢已多時若議增修稍乖前訓何者東都始制寢廟於天后中宗之朝事出一時非貞觀開元之法前後因循不廢者亦踵鎬京之文也記曰祭不欲數數則煩天寶之中兩京悉為寇陷西都廟貌如故東都因此散亡是知九廟之靈不欲歆其煩祀也自建中不葺之後彌歷歲年今若廟貌惟新即須室別有主舊主雖在大半合祧必几筵而存之所謂宜祧不祧也孔子曰當七廟五廟無虛主也謂廟不得無主者也舊主如有畱去新廟便合創添謹按左傳云祔練作主又戴載云虞而立几筵如或過時成之便是以凶于吉創添既不典虛廟又非儀考諸禮文進退無守或曰漢於郡國置宗廟凡百餘所今止東西立廟有何不安者當漢氏承秦焚燒之餘不識典故至於廟制率意而行比及元成二帝之間貢禹韋元成等繼出果有正論竟從毀除足知漢初不本於禮經又安可程法也或曰几筵不得復設廟寢何妨修營候車駕時巡便合於所載之主者究其終始又得以論之昨者降勅叅詳本為欲收舊主主既不立廟何可施假令行幸九州一一皆立廟乎愚以為廟不可修主宜藏瘞或就瘞於埳室或瘞於兩階間此乃萬代常行不易之道也可長文林郎試大理評事夫人辛氏隴西郡人也父諱行儉夫人即府君長女也聘于彭城劉公公不幸早薨夫人禀山嶽之粹靈受人倫之大福博行而多聞發言而合禮素德全備淑慎威儀迨於姻親俯仰咸若挺霜操而馳其聲彙女功而發其譽夫人六十有六以大和九年秋七月廿日而薨夫人有子二人長子平盧節度衙前虞候雲麾將軍試殿中監上柱國克勤次子節度散列將克恭生女一人日引子等哀毀過禮杖而能起乃扶護靈柩當年冬十月七日祔葬于青州益都縣永固鄉廣固之里以先塋不利故別遷宅兆西據于麓倚山邱之崇秀東極于荒南眺青山北臨於郡仍書銘于墓內曰白玉無瑕青松有節德儀咸備行階先列廾塵世而歸天流芳華而不歇蒼茫野色雲悲鴻咽林摵摵兮悲風光娟娟兮夜月緒贈太尉楚子以廕仕歷隋壽汝三州刺史轉河南少尹賜金紫臣先父元和中特承恩顧弟綯官不因人出自宸衷臣伏覩詔書以臣刺汝州日粗立政勞吏民求立碑頌尋乞追罷臣任隨州日郡人乞畱得上下考及轉河南少尹加金紫此名已聞於日下不必更立碑頌乞賜寢停綯字子直太和四年進士宣宗朝襲封彭陽男拜御史中丞轉戶部侍郎徙兵部同中書門下平章事懿宗立由左僕射門下侍郎拜司空檢校司徒充河中節度使徙宣武又徙淮南副大使封涼國公僖宗立為鳳翔節度使徙封趙卒年七十八贈太尉臣男滈爰自孩提便從師訓至於詞藝頗及輩流會昌二年臣任戶部員外郎時已令應舉至大中二年猶未成名臣自湖州刺史蒙先帝擢授考功郎中知制誥轉充翰林學士累叨寵澤遂忝樞衡事體有妨因令罷舉自當廢絕一十九年每遣退藏更令勤勵竊以祿位逾分齒髮巳衰男滈年過長成未沾一第犬馬私愛實切憫傷臣二三年來頻乞罷免每年與男取得文解意望纔離中書郎却令赴舉昨蒙恩制許寵近藩伏緣已逼禮部試期便令就試至於臨時與奪即在省司臣固不敢輒有干撓但以初離機務合具上聞臣近於延英奉辭輒擬面對伏以戀主方切陳誠至難伏冀睿慈察臣丹懇准太常禮院奏中書侍郎兼吏部尚書平章事崔龜從奏准令式合立私廟祔准會昌五年十二月勅百官並不得京城內置廟如欲於京城內置者但准舊於所居處置廟即不失敬親之禮伏以武宗時緣南郊行事見天門街左右有廟宇許令私第內置若令依舊會昌五年勅文盡勒於所居處置廟兼恐十年間私廟漸逼於宮墻齊人必苦於吞併臣具詳本末冀便公私今請夾天門街左右諸坊不得立私廟其餘圍外遠坊任取舊廟及擇空閑地建立廟宇應立廟之初先取禮司詳定兼請准開元禮二品以上祠四廟三品祠三廟三品已上不須兼爵者四廟外有始封祖通祠五廟三品已上不得過九架並厦兩頭其三室廟制合造五間其中三間隔為三室兩頭各厦一間虛之前後亦虛之每室中西壁分之一近南去地四尺開一埳室以石為之可容兩神主廟垣合開南門東門并有門屋餘並准開元禮及元和曲臺禮為定制其享獻之禮除依舊禮使少牢特牲饋食外有設時新及今時熟饌者並聽仍請永為定式右苦心歌篇屏跡林壑佳句流傳於眾口芳聲籍甚於一時守道安貧遠絕名利當文明之聖代宜備搜羅俾典校於瀛州佇光志業臣綯等今日延英已面陳奏狀伏奉聖旨令與一文學官者臣等商量望授宏文館校書郎未審可否謹具奏聞伏聽勅旨發字至之同州馮翊人大和四年進士書判拔萃累遷禮部郎中大和時遷嶺南節度使貶婺州刺史卒懸象告祥垂衣表聖陰慝將作而潛滅陽光當虧而更盛羲和率職徒降物以宵興堯舜臨軒方並明而曉映上方以憂勤御極濬哲承天聲教既昭乎下土災蝕因消於上元景麗高雲已照臨於物外位移正寢空警戒於事先曉次箕中時惟冬仲天子夕惕而慙慮太史先期而誓眾於是霧霽閑原雲歸幽洞圓規杲耀發瑞彩於踆烏愛景沖融動和鳴於彩鳳是月唯朔昇輪自東煥大社之晨氣照清朝之曉風幣奚假於祠祝鼓寧煩於奏工遂使皆仰之人既無虞乎薄蝕惜陰之士咸有望於再中諒天聽之自邇信宸心之遂通仰稽聖謨遐考天則運行雖由於黃道感應自符於元德輝華增煥觀光必達於幽陰氛祲皆消揆影無差於晷刻道敷陽教德叶炎精麟効趾而不鬬葵向影而皆傾觀臺登望之時漸欣光被史冊退書之際益訝文明至乃揚彩宮闈增華廊廟人動佳色物含清照若合璧之無瑕比重輪而有耀黃琬之巧言莫啟由此緘詞叔輒之妄歎無聞從茲載笑道契元化禎回太陽躔次罔虧於順晷貞明以合於重光固齊天而比德垂永永於皇唐聲本無形感物而會生彼寂寞歸乎靜泰含藏於金石之中緘默於肺腸之外喻春雷之不震時至則興比洪鐘之未撞扣之斯大靜勝永合於人心元同遠符於天籟大道沖漠至音希微叩於寂而音遠求於躁而道違三年之鳥不鳴驚人可異五絃之琴載絕知音蓋稀人生而靜物本無機修以誠而上下交應臻其極而禽獸咸歸遐想古風緬窮太始以彼聲音之道媲夫動靜之理方歌擊壤堯人式貴於心和未夢鈞天趙簡尚勞於傾耳鼓能興雨鐘亦候霜冲用可齊於道性善應方契於天常興公之賦欲成巳含金韻夫子之宮未壞猶悶樂章無象無名不知不識守此虛淡終乎妙極豈逐物而感通諒與時而消息損之而益潛運將契於天功聽之不聞元化極符於帝則幽元之旨足以明徵海內於焉而自正天下無得以爭能由是廣可喻於人細可齊於物聲希者其響必大聲煩者其理斯屈常呼萬歲維嶽有時而降神將異三人點爾無心於鼓瑟理歸若訥事契寡詞既不言以足教必於聲而可遺存而不論馳神於六合之外語不如默箝口於三緘之時是各從其類也吾將一以貫之太陽之昇兮鑠景氣而澄氤氳聖人之德兮上蔚結而生慶雲外浮相煥中映成文郁郁昱昱繽繽紛紛粲兮若組繡之縈寶鏡翊兮若申甫之相明君無心而生應德而出不曜青以干呂能叶慶以扶日縹緲蜿蜒遊龍相逐而不如斐亹葳蕤彩蜺舒狀而難匹始流形於孤嶽終垂象於九圍麗碧霄以增媚捧金烏而徐飛感覆燾之仁効靈表瑞憑元黃之氣耀影含暉夫天道無言以物應聖聖功不宰物自効命故有非烟非雲為祥為慶附我元吉彰我元盛豈徒眾彩錯出重輪交映者哉且日者實也象君而貞明雲者運也應時而發生就日而浮若就君之朝聘五色成象告五方之和平騰乎天假其陰隲見於晝資厥炎精懿乎煌煌燭空煜煜呈彩域中之目無不仰觀天下之心若有所待何必蒼梧稱美橫汾是載者乎夫變化倏忽希夷混茫理至則無幽不感德盛則化妖為祥煥厥霄極亘於天光彼丹甑玉燭蓂莢芝房孰若此感化而見五彩其相者焉是知聖與冥通理由感召故我后之盛德不求彰而自耀臣等伏尋舊典栗主升祔之後在禮無改造之文亦無重加尊諡改題神主之例求之曠古敻無其文周加太王王季文王之諡但以德合王周遂加王號未聞改諡易主且文物大備禮法可稱最在兩漢並無其事光武中興都洛陽遣大司馬鄧禹入關奉高祖以下十一帝后神主祔洛陽宗廟蓋神主不合新造故也自魏晉迄於周隋雖代有放恣之君亦有知禮講學之士不聞加諡追尊改主重題書之史策可以覆視今議者惟引東晉重造鄭太后神主事為證伏以鄭太后本瑯琊王妃薨後已祔瑯琊邸廟其後母以子貴將升祔太廟賀循請重造新主改題皇后之號備禮告祔當時用之伏以諸侯廟主與天子廟主長短不同若以王妃八寸之主上配至極禮似不同時諂神貪君之私用此謬禮改造神主比量晉事義絕非宜且宣懿非穆宗之后實武宗之母母以子之貴已祔別廟正為得禮饗薦無虧今若從祀至尊題主稱為太后因子正得其宜今若別造新主題去太字即是穆宗上仙之後臣下追致作殯之禮凟亂正經實驚有識臣當時並列朝行實知謬戾以漢律擅論宗廟者以大不敬論又其時無詔下議遂默塞不敢出言今又欲重用東晉謬禮穢媟聖朝大典猥蒙下問敢不盡言臣謹按國朝前例甚有明文武德元年五月備法駕於長安通義里舊廟奉迎宣簡公懿王景皇帝神主升祔太廟既言於舊廟奉迎足明必奉舊主其加諡追尊之禮自古本無其事自則天太后攝政之後累有之自此之後數用其禮歷檢國史並無改造重題之文若故事有之無不書於簡冊臣等愚見宜但告新諡於廟而止其重題改造之文開元初太常卿韋縚以高宗廟題武后神主云天后聖帝武氏縚奏請削去天后聖帝之號別題云則天順聖皇后武氏詔從之即不知其時削舊題耶重造主耶亦不知用何代典禮禮之疑者決在宸衷以臣所見但以新諡寶冊告陵廟正得其宜改造重題恐乖禮意商字為臣第進士又中拔萃科累官兵部侍郎召拜中書侍郎同中書門下平章事封范陽郡公大中元年罷為武昌節度使以疾解職拜戶部尚書卒常州自開成元年七月二十六日勅以茶務委州縣至年終所收以溢額五千六百六十九貫比類鹽鐵場院正額元數加數倍已上伏請增加正額鈞字子和范陽人徙京兆藍田第進士以拔萃補祕書正字累拜山南東道節度使兼領昭義軍進檢校左僕射宣宗立改吏部尚書封范陽郡公守太子太師大中十年同中書門下平章事尋以檢校司徒為東都畱守懿宗立以太保致仕卒年八十七贈太保諡曰元伏以海嶠擇吏與江淮不同若非諳熟土風即難搜求人瘼且嶺中往之獘是南選今之獘是北資臣轄管二十二州唯韶廣州官僚每年吏部選授道途遐遠瘴癘交侵選人若家事任持身名真實孰不自負無繇肯來更以俸入單微每歲號為比遠若非下司貧弱令使即是遠處無能之流比及到官皆有積債十中無一肯識廉恥臣任四年備知情狀其潮州官吏伏望特循往例不令吏部注擬且委本道求才若攝官廉慎有聞依前許觀察使奏正事堪經久法可施行元度開成中官翰林待詔權知沔王友臣聞秦焚詩書塞人視聽漢興典籍以廣聰明伏以龜鳥之文去聖彌遠點畫訛變遂失本源今陛下運契黃虞道從經籍觀人文以成俗念鳥跡之乖方繇是遂微臣之上請許於國學創立石經仍令小臣覆定字體謬當刊校誓盡所知大歷中司業張參掇眾字之謬著為定體號曰五經文字專典學者實有賴焉臣今參詳頗有條貫傳寫歲久或失舊規今刪補冗漏一以正之又於五經文字本部之中採其疑誤舊未載者撰成新加九經字樣一卷凡七十六部四百二十一文其偏傍上下本部所無者乃纂為雜辨部以統之若體畫全虧者則引文以證解於雅言執禮誠媿大儒而辨體觀文式遵小學其聲韻謹依開元文字避以反言但紐四聲定其音旨今條目已舉刊削有成願竭愚衷以資後學當開成丁巳歲序謹上準太和七年十二月五日勅覆定九經字體者今所詳覆多依司業張參五經文字為準其舊字樣歲月將久點畫參差傳寫相承漸致乖誤今並依字書參詳改正訖諸經之中別有疑闕舊字樣未載者古今體異隸變不同如總據說文即古體驚俗若依近代文字或傳寫乖訛今與校勘官同商較是非取其適中纂錄為新加九經字樣一卷或經典相承與字義不同者具引文以註解今刊削有成請附於五經字樣之末用證紕誤右國子監奏得覆定石經字體官翰林待詔朝議郎權知沔王友上柱國賜緋魚袋唐元度狀准大和漆年拾貳月伍日勅覆定九經字體者今所詳覆多依司業張參五經文字為準其舊字樣歲月將久點畫參差傳寫相承漸致乖誤今並依字書參詳改正訖諸經之中別有疑闕舊字樣未載者古今體異隸變不同如總據說文即古體驚俗若依近代文字或傳寫乖訛今與校勘官同商較是非取其適中纂錄為新加九經字樣壹卷或經典相承與字義不同者具引文以註解今刊削有成請附於五經字樣之末用證紕誤者其字樣謹隨狀進上謹具如前中書門下牒國子監牒奉勅宜依牒至准勅故牒開成二年八月十二日牒古文黃帝史蒼頡所造頡首有四目通於神明觀察眾象而為古文暨嬴氏之代法務徑促隸書是興古文殆絕漢魯恭王壞孔子舊宅得尚書論語孝經皆科斗文字是也又河內女子壞老君屋得古文二篇乃書之秦誓顧命也或絕塵之客高蹈遠遊深巖邃谷丹經秘訣往往遇之今之所傳是其遺文也大篆周宣王太史史籒所造始變古文著大篆十五篇秦焚詩書惟易與此篇得全遇王莽之亂此篇亡失建武中曾獲九篇章帝王育為作解說所不通者十有二三暨晉世此篇都廢今畧傳字體而已八分後漢章帝時上谷王次仲所造以古書字形少波勢乃作八分楷法始有楷法也其後師宜官蔡邕梁鵠善之故蔡邕勸學篇云上谷王次仲初變古形是也小篆秦丞相李斯所造妙於篆法乃刪改史籒大篆而為小篆其銘題鐘鼎及作符璽至今用焉為楷隸之祖乃不易之軌也書曰作謨作則其斯之謂也今相承或謂之玉筋篆飛白漢靈帝飾理鴻都門時陳畱蔡邕所撰聖皇篇待詔門下見役工以堊箒成字心有悅焉歸而為飛白書漢末魏初並以題署宮閣後有張敬禮者隱居好學獨師邕法備極其妙倒薤篆仙人務光辭湯之禪隱於清泠之陂植薤而食清風時至見葉交偃象為此書以寫太上紫經三卷光遂遠遊時有得此者因傳焉散隸晉黃門郎衞巨山所作祖覬父瓘皆蟲篆草隸著名巨山幼得其法又創造散隸體及著四體書勢古今并皆法之懸針後漢章帝建初中秘書郎曹喜所造喜工篆隸著名尤善垂露之法後代行之用此以書題五經篇目鳥書周史官史佚所撰粵在文代用雀集戶降及武朝丹鳥流室今鳥書之法是寫二祥者也用此以書題幡者取其飛騰輕疾耳一說鴻燕有去來之信故象之也垂露漢曹喜所造喜以工篆聞於京師章帝見而善之又作垂露法字如懸針而勢不纖阿那若濃露之垂蔡邕勸學篇云扶風曹喜建初稱善是也夷直字禮卿第進士歷右拾遺累進中書舍人武宗立出為杭州刺史斥驩州司戶參軍宣宗初內徙復歷江華二州刺史終散騎常侍一子官恩在報功貴延賞典若無己子許及周親今張克勤自有息男妄以外甥奏請移於他族知是何人儻涉賣官實為亂法雖援近日勅例難破著定勅文國章既在必行宅相恐難虛授具狀上中書門下并牒中書省克勤所請不允澳字子裴宰相貫之子大和六年進士復擢宏詞科累遷戶部兵部侍郎大中時授河陽節度使懿宗朝累徙邠寧節度使貶祕書監分司東都遷河南尹卒贈戶部尚書諡曰貞朝廷將裨教化廣設科塲當開元天寶之間始專用明經進士及貞元元和之際又益以薦送相高當時務尚切磋不分黨甲絕僥倖請託之路有推賢讓能之風等列標名僅同科第既為盛事固可公行近日以來前規頓改互爭強弱多務奔馳定高卑於下第之初決可否於差肩之日曾非攷覈盡繫經營奧學雄文例舍於貞方寒素增年矯貌盡取於黨比㣥強雖中選者曾不足云而爭名者益熾其事澳叨司畿甸合貢英髦非無藻鑒之心懼有愛憎之謗且李膺以不察孝廉去任胡廣以輕舉茂才免官况在管窺實難裁處况禮部格文本無等第府廷解送不合區分今年合送省進士明經等並以納策試前後為定不在更分等第之限
