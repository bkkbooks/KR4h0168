body:
  text: 晉州長寧關使張承暉於當道録到張濬榜并詔曰張濬充招討制置使令率師討臣兼削臣屬籍官爵者臣誠冤誠憤頓首頓首伏以宰臣張濬欺天蔽日廊廟不容讒臣於君奪臣之位憑燕帥妄奏與汴賊結恩矯託皇威擅宣王命徵集師旅撓亂乾坤誤陛下中興之謀資黔黎重傷之困臣實何罪而陛下伐之此則宰臣持權而欺陛下況臣父子三代受恩四朝破徐方救荊楚收鳳闕碎梟巢致陛下今日冠通天之冠佩白玉之璽臣之屬籍懿皇所賜臣之師律先帝所命臣無逆節濬討何名陛下若厭逐功臣欲用文吏自可遷臣封邑以侯就第奈何加諸其罪孰肯無詞若以臣雲中之伐獲罪於時則拓拔思恭取鄜延朱全忠侵徐鄆陛下何不討之假令李孝德不忠於主伐之為是則朱瑄時溥有何罪耶此乃同坐而異名賞彼而誅此使天下藩服強者扼腕弱者自動流言竊議為臣怨嗟固非中興之術也且陛下阽危之秋則奬臣為韓彭伊霍既安之後罵臣曰戎羯蕃夷海內握兵立事如臣者衆矣寧不懼陛下他時之罵哉臣昨遇燕軍以禮退舍匡威淺昧厚自矜誇乃言臣中矢石覆士卒致內外吠聲一發短謀競陳誤陛下君臣之分況命官選將自有典刑不必幸臣之弱而後取之儻臣延期挺命尚固一方彼實何顏以見陛下此則姦邪朋黨輕弄邦典陛下凝旒端扆何由知之今張濬既已出軍微臣固難束手臣便欲叫閽輕騎面叩玉階訴邪佞於陛下之彤墀納詔命於先皇之宗廟然後束身司敗甘處憲章竊念本朝屯否巨業淪胥攀鼎駕以長違撫彤弓而自咎默默終古悠悠彼蒼生此厲階永為痛毒視橫流而莫救徒誓楫以興言別奉函題過垂奬諭省覽周既駭惕異常淚下霑襟倍鬱申胥之素汗流浹背如聞蔣濟之言僕經事兩朝受恩三代位叨將相籍係宗支賜鈇鉞以專征徵包茅而問罪鏖兵接戰二十餘年竟未能斬新莽之頭顱斷蚩尤之肩髀以至廟朝顛覆豺虎縱橫且受任分憂叨榮冒寵龜玉毀櫝誰之咎歟備閲指陳不勝慚恧然則君臣無常位陵谷有變遷或箠塞長河泥封函谷時移事改理有萬殊即如周末虎爭魏初鼎據孫權父子不顯授於漢恩劉備君臣自微興於涿郡得之不謝於家世失之無損於功名適當逐鹿之秋可靳華蟲之服惟僕纍朝席寵奕世輸忠忝佩訓詞粗存家法善博奕者惟先守道治蹊田者不可奪牛誓於此生靡敢失節仰憑廟勝蚤殄寇讎如其事與願違則共臧洪遊於地下亦無恨矣唯公社稷元勳華嵩降祉鎮九州之上地負一代之宏才合於此時自求多福所承良訊非僕深心天下其謂我何有國非吾節也慺慺孤懇此不盡陳河東節度使檢校太保同中書門下平章事隴西郡王李克用以幽鎮侵擾中山領蕃漢步騎五十萬衆親來救援與易定司空同申祈禱翌日過常山問罪時中和五年二月草一日克用記至三月十七日以幽州請就和斷遂却班師再謁晬容兼申賽謝便取飛狐路却歸河東草一日克用重記帝諱存勗太祖長子唐光啓元年生年十一授檢校司空隰州刺史天祐五年嗣封晉王二十年四月築壇魏州即帝位同光二年加尊號昭文睿武至德光孝皇帝在位四年年四十二諡曰光聖神閔孝皇帝廟號莊宗議獄恤刑比求冤濫頑民下輩輕侮憲章苟非五聽之通明何辨二門之邪正自今後法司如有疑獄豫自據格令以決之此法既行雖親無赦兵亂以來生靈凋耗豈止賦租煩重加之寇盜侵漁又聞市井之中多有凶豪之輩晝則聚徒蒱博夜則結黨穿窬若不示以嚴科何以懲其巨蠧仰法司顯行條令峻設隄防王室搆屯七廟被陵夷之酷昊天不弔萬民罹塗炭之災必有英主奮庸忠臣仗順斬長鯨而清四海廓祅祲以泰三靈豫位忝維城任當分閫念茲顛覆詎可晏安仗桓文節制之規問羿浞凶狂之罪逆溫碭山傭隸巢孽餘凶當僖宗奔播之初我太祖掃平之際束身泥首請命牙門包藏姦詐之心惟示婦人之態我太祖俯憐窮鳥曲為開懷特發表章請帥梁汁才出萑蒲之澤便居茅社之尊殊不感恩遽行猜忍我國家祚隆周漢迹盛伊唐二十聖之鎡基三百年之文物外則五侯九伯內則百辟千官或代襲簪纓或門傳忠孝皆遭陷害永抱沈冤且鎮定兩藩國家巨鎮冀安民而保族咸屈節以稱藩逆溫唯仗陰謀專行不義欲全吞噬先據屬州趙王特發使車來求援助豫情惟蕩寇義切親仁躬率賦輿赴茲盟約賊將王景仁將兵十萬屯據柏鄉遂驅三鎮之師授以七擒之略鸛鵝才列梟獍大奔易如走坂之九勢若燎原之火僵尸仆地流血成川組甲雕戈皆投草莽謀夫猛將盡作俘囚羣凶既快於天誅大憝須懸於鬼録今則選搜兵甲練車徒乘勝長驅翦除元惡凡爾魏博邢洺之衆感恩懷義之人乃祖乃孫為聖唐赤子豈徇虎狼之黨遂忘覆載之恩蓋以封豕長蛇憑陵薦食無方逃難遂被脅從空嘗膽以銜冤竟無門而雪憤既聞告捷想所慰懷今義旅徂征止於招撫昔耿純焚廬而向順蕭何舉族以從軍皆審料興亡能圖富貴殊勳茂業翼子貽孫轉禍見幾決在今日如能詣轅門而效順開城堡以迎降長吏則改補官資百姓則優加賞賜所經詿誤更不推窮三鎮諸軍已申嚴令不得焚燒廬舍剽掠馬牛但仰所在生靈各安耕織豫恭行天伐罪止元凶已外歸明一切不問凡爾士衆咸諒豫懷我國家列爵疏封皆循舊制建藩維而命宗子錫茅社以報功臣惟茲魏邦纘乃舊服自逆溫肇亂天下分離謀害忠良窺覦藩翰遂使公侯之國鞠為蛇虺之場朱友貞蕞陋餘妖人神共棄不量其力謂秦無人尚為貽厥之謀巧設兼并之計改張節制分割山河連甍皆弊於誅求編戶不安於閭井且人為邦本君乃民天既興虐我之謀須起徯豫之嘆遂至桓桓列校擾擾齊氓奮白梃以捐生潔壺漿而望主豫叨居閫政誓復聖唐永念生靈嘗生軫惻覩茲殘弊尤切疚懷昨百姓三軍請豫兼領姦凶在近鎮撫尤難賴爾衆多共宣忠力切以軍府變更之後人情易動難安將務輯寧須嚴法令凡訛言謗議殘物害人結黨連朋抵刑犯禁如當糾告法固難容凡爾蒸人勉其自勵布告中外咸使聞知干紀亂常人神共怒殺君盜國天地何容激忠良仗順之心拯黎庶倒懸之急豫爰從近歲親舉義師每惟戡難之謀所切弔民之志而賊黨不分逆順憑附妖凶唯偷晷漏之生不慮覆亡之禍去秋豫暫歸寧覲留侍并都賊將王瓚輒渡洪河偷營巢穴不敢前來決戰遠出交兵壁閉偷安可知羸懦豫親臨賊壘率士登城賊遂出營門與吾合戰才交鋒刃便委干戈戮甲士二萬餘人奪鐵騎三千餘匹敬千李立之輩已釁鼓於軍前拱宸侍衛之徒盡橫尸於大野所殘無幾不日翦除料彼友貞難逃鈇鉞豈能保完生聚禦捍疆陲豫昨徑出偏師徇地曹濮閔其蒸庶罹此百殃空多轉餉之勞殊失保全之望豫示其禍福各擇安危勿附賊以亡家須決機而保族若能自攜老幼歸我封巡亦議撫綏俾令蘇息如懷鄉戀土苟免待時則須遠避兵鋒慎於去就佇平凶醜冀復鄉園其諸軍兵士州縣長吏等自解圍上黨對陳柏鄉莘縣交兵楊劉接戰亦合諳吾機略可料興衰何必阿附元凶自貽伊戚不如嚮義自卜永圖旦旦之懷元元共悉回鶻可汗仁美代襲驍雄生知義烈乘北方忠順之氣為南面沙漠之君自列聖有國之初便申盟誓及肅宗中興之運繼立勳庸邇來貢奉不違戎馬無警一心嘗保於甥舅萬里或結於姻親今則興服之初獻琛俄至仍聞撫寧七部兼且控制諸蕃終姓之道無偷信言必復嗣緒之文斯在典册宜行俾紹前修且明久要宜封為英義可汗仍令所司擇日備禮册命朕以夙荷丕基乍平偽室非不欲寵綏四海協和萬邦廣正朔以遐同俾人倫之有序其或地居陬裔位極驕奢殊乖事大之規但蘊偷安之計則必徵諸典訓振以皇威爰興伐罪之師冀遏亂常之黨蠢茲蜀主世負唐恩間者父總藩宣任居統制屬朱溫東離汴水致昭皇西幸岐陽而乃不務扶持反懷顧望盜據劍南之土宇全虧閫外之忳誠先皇帝早在并門將興霸業彼既曾馳書幣此亦復展謝儀後又特發使人專持聘禮彼則更不回一介之使答咫尺之書星歲俄移歡盟頓沮朕頃遵崇遺訓嗣統外藩追昔日之來誠繼先皇之舊好又專持信幣皆絶酬還緬惟背恩食言可忍棄同即異今觀孽豎紹據山河委閹官以持權憑阻修而僭號早者曾上秦王緘札張皇蜀地聲塵形侮瀆之言辭謗親賢之勳德昨朕風驅鋭旅電掃凶渠復巳墜之宗祧纘中興之歷數捷音旋報復命仍稽使來而上抗書題情動而先誇險固加以宋光葆輒陳狂計別啓姦謀將欲北顧秦州東窺荊渚人而無禮罪莫大焉昨客省使李嚴奉使銅梁近歸金闕凡於奏對備述端由其宋光嗣相見之時於坐上便有言説先問契丹強弱次數秦王是非度此包藏可見情狀加以疏遠忠直朋比姦邪內則縱恣輕華競貪寵位外則滋彰法令蠧耗生靈既德力以不量在人祇之共憤今命興聖宮使魏王繼岌充西川四面行營都統仍命侍中樞密使郭崇韜充西川東北面行營都招討制置等使荊南節度使高季興充西川東南面行營都招討使鳳翔節度使李曮充都供軍轉運應接等使同州節度使李令德充行營招討副使陜州節度使李紹琛充行營蕃漢馬步軍都排陳斬斫使兼馬步軍都指揮使西京留守張筠充西川管內安撫應接使華州節度使毛璋充行營左廂馬步都虞候邠州節度使董璋充行營右廂馬步都虞候客省使李嚴充西川管內招撫使總領闕下諸軍兼四面諸道馬步兵士取九月十八日進發凡爾中外宜體朕意自古聖帝明王創業垂統九州共貫五運相承未有不始於憂勤終於逸樂故苗人不作不能成舜伐之功葛伯不生無以立湯征之事理亂有常數文質為大綱秦不道而漢室興隋無德而皇朝王連二十葉垂三百年自釁起河南災纏海內朕自提戎律切為國讎每親統夫師徒欲早寧乎寰宇近者諸方侯伯疊貢箋章勸即位以皆堅讓體元而不獲爰新鳳歷尋揭雞竿顯造丕圖倍慚涼德蓋自文班武列抱義懷忠共傾欣戴之心遂應紹開之運以正君臣之位以安宗社之基未偃武以修文倍宵衣而旰食不以萬乘自尊為樂惟以八紘未靜為憂更賴上下一心內外同力誡嚴朕軍旅撫恤朕黎氓務裨贊以為常期清平而可待注屬繄倚不捨斯須刑以秋冬雖關惻隱罪多連纍翻慮滯淹若或十人之中止為一夫抵死豈可以輕附重禁錮逾時言念哀矜又難全廢其諸司囚徒罪無輕重委本司據罪詳斷申奏輕者即時疏理重者過立春至秋分然後行法如是事繫軍機須行嚴令或謀逆惡或蓄姦邪或行劫殺人難於留滯並不在此限誠惠鷲嶺名流雞園上哲精守護鵝之戒宏宣住鴈之談濳括三乘深明四諦忍草長新於性苑意花不染於情田自隱迹靈峯棲心勝地泛慈舟而拯溺持慧炬以引迷五百龍神皆降懿德一萬聖衆盡繼元蹤為法雨之棟梁作空門之標表朕方興景運大闡真風宜旌積行之名以奉無為之教今賜號廣法大師賜紫衣懲惡勸善務振紀綱激濁揚清須明真偽蓋前王之令典為歷代之通規必按舊章以令多士而有志萌僭竊位忝崇高纍世官而皆受唐恩貪爵祿而但從偽命或居台鉉或處權衡或列近職而預機謀或當峻秩而掌刑憲事分逆順理合去留偽宰相鄭等一十一人皆本朝簪組儒苑品流雖博識多聞備明今古而修身慎行頗負祖先昧忠貞而不度安危專利祿而全虧名節合當大辟無恕近親朕以纘嗣丕基初平巨憝方務好生之道在行含垢之恩湯網垂仁既矜全族舜刑投裔兼貸一身爾宜自新我全大體其為顯列不並庶寮餘外應在周行悉仍舊貫凡居中外咸體朕懷朕既殄偽庭顯平國患好生之令含宏雖切於豫懷懲惡之規決斷難違於衆請況趙巖趙鵠等自朕收城數日布惠四方尚匿迹以濳形罔悛心而革面須行赤族以謝衆心其張漢傑昨於中都與王彥章同時俘獲此際未詳行止偶示哀矜今既上將陳詞羣情激怒往日既彰於僭濫此時難漏於網羅宜置國刑以塞羣論除妻兒骨肉外其他疏屬僕使並從釋放敬翔李振首佐朱溫共傾唐祚屠害宗屬殺戮朝臣既寰宇以皆知在人神而共怒敬翔雖聞自盡未豁幽冤宜與李振並族於市疏屬僕使並從原宥朱圭素聞狡蠧唯務讒邪鬬惑人情枉害良善將清內外須切去除況衆狀指陳亦宜誅戮契丹實剌鄂博既棄其母又背其兄朕比重懷來厚加恩渥看同骨肉錫以姓名兼分符竹之榮疊被頒宣之渥而乃輒孤重惠復背明庭罔顧欺違竄歸偽室既同梟獍難貸刑章可并妻子同戮於市其朱氏近親趙鵠正身趙巖家屬仰嚴加擒捕其餘文武職員將校一切不問朕以卿久司樞要常處重難或遲疑未決之機詢諸先見或憂撓不定之事訪自必成至於贊朕丕基登茲大寶衆興異論卿獨堅言天命不可違唐祚必須復請納家族明設誓文及其密取汶陽興師入不測之地濳通河口貢謀占必濟之津人所不知卿唯合意逮中都嘯聚羣黨窺陵朕決議平妖兼收浚水雖云先定更審前籌果盡贊成悉諧沈算斯即何須冒刃始顯殊庸況常山陸梁正虞未復卿能撫衆共定羣心惟朕知卿他人寧表所以賞卿之寵實異等倫沃朕之心非虛渥澤今卿再三謙遜重疊退辭始納常陽請歸上將又稱梁苑不可兼權如此周身貴全名節古人操守未可比方既覽堅辭難阻來表其再讓汴州所宜依允皇太后母儀天下子視羣生當別建宮闈顯標名號冀因稱謂益表尊嚴宜以長壽宮為名卿名高釣渭才大築巖夙符封社於周王早契夢魂於殷主顧君臣之際會實社稷之威靈所以翊贊沖人纘承丕祚頃歲以梁城構逆唐室罹災羣凶競起於萑蒲九廟皆生於禾黍忍恥而徒思嘗膽平居而未見沃心爾能竭乃沈謀資豫大計遂訓齊虎旅平殄梟巢文軌混同梯航盡入延景運於綴旒之後建殊庸於誓帶之前況今才告類於郊壇方卜年於洛宅始欲與卿平章理道講貫化源長遵馭朽之規每聽從繩之諫雖遷廊廟尚委樞機縱領藩垣不離都輦而又別頒金篆求佐瑤圖今則忽睹表章遽辭繁總進退徒聞於知足始終寧稱於注懷是宜勵力扶持勉思翼戴既叶雲從之義更深日益之功將致君而須歷重權方為主而難持謙柄覽卿陳乞俾我焦勞宜體朕懷即斷來表卿忠孝有稱古今無比竭智術而扶持景運蹈謙和而統冠羣英鬱有勳庸刊於册昨以翦平元惡開拓丕基權謀雖出於朕懷叶贊全資於爾力是乃委司鈞軸任總兵符樞機兼掌於金藏盟約備頒於鐵券實諧倚注雅稱褒隆豈期忽覽封章堅辭密務在卿幽明監德內外推仁可保於千載一時何軫於前思後慮況朕綏寧寰海才欲半年告類圓丘未踰一月耆德便歸退靜羣情莫測其緣方賴嘉謀永裨闕政卿宜勉持幹恪永惓繁難更圖遠大之功共保初終之道近年文士輕視格條就試時疏於帖經登第後恥於赴選宜絶躁求之路別開奬勸之門其進士科已及第者計選數年滿日許令就中書陳狀於都堂前各試本業詩賦判文其中文藝灼然可取者便與除官如或事業不甚精者自許準添選泉布之弊雜以鉛錫惟是江湖之外盜鑄尤多市肆之間公行無畏因是綱商挾帶舟楫往來換易好錢藏貯富室實為蠧弊須有條流宜令京城諸道於坊市行使錢內點檢雜惡鉛錫錢並宜禁斷沿江州縣每有舟船到岸嚴加覺察不許將雜鉛錫惡錢往來換易好錢如有私載並行收納朕自削平中夏掃蕩羣凶被介胄以征行歷星霜而扈從凡經百戰盡立殊功永念丹心真同赤子若無旌賞豈表恩榮其都將官員自司空已下者並賜協謀定亂佐國功臣自僕射尚書常侍至大夫中丞宜並賜忠勇拱衛功臣其初帶憲銜宜並賜忠烈功臣已有功臣名者不在此限其節級長行軍將並宜賜扈蹕功臣昨皇太后爰自北京歸於大內旋膺典册正位宮闈載詳邦國舊規合有命婦貢表宜稽邃古以示新恩應內外文武官妻可據品秩高卑各封邑號朕刷蕩妖氛收復京輦三靈胥悅萬國駿奔凡在照臨畢同欣戴或出司土宇入覲朝廷若無列第於神州何表愛君之誠節諸道節度觀察防禦團練刺史等並宜令洛京修宅一區既表皇都之壯麗復佳清洛之浩穰因我后之化家覩羣居之戀闕間者以皇綱中墜國步多艱率兵甲於兩河漲煙塵於千里憂勤二紀勞役萬端矧乃東京國號大名雄稱全魏昔惟廣晉今實興唐自朕南北舉兵高低叶力總六州之疆土供萬乘之征租有飛芻挽粟之勞有浚壘深溝之役賦重而民無嗟怨務繁而士竭忠勤致於掃蕩氛霾平除偽逆九廟復蒸嘗之薦兆人息塗炭之災靜想夤緣深所嘉歎昨者因追曩素載洽歌謠俱懸望幸之誠遂舉省方之典爰臨管界洎至都城對父老之歡呼眷懷斯契睹井田之凋廢臨馭增慚得不特降優恩俾蘇舊地冀表寵綏之道免渝敦激之風應東京隨絲鹽錢每兩俱減放五文逐年俵賣蠶鹽食鹽大鹽甜次冷鹽每斗與減五十文欒鹽與減三十文其小菉豆稅每畝長與減放三升都城內店宅園圃比來無稅頃因偽命遂有配徵後來原將所徵物色添助軍人衣賜將令通濟宜示矜蠲今據緊慢去處於見輸稅絲上每兩作三等酌量納錢貴與充本回圖收市軍人衣賜其絲永與除放所有六街內空間田地並許新歸業人戶逐便蓋舍居止與免差徭如是本主未來一任坊鄰收佃庶令康泰俾表優恩朕以削平僭亂砥定寰區爰宅洛都再踰星歲乃眷興王之地頗聆望幸之辭暫議省巡以慰羣品因茲駐蹕俄已經春優恩既洽於大名車駕宜還於中土俾宣遐邇咸暢升平可定此月十七日發程取河陽舊路歸洛起今後宜準開成三年敕文凡有官者並詣吏曹未仕者皆歸禮部其童子則委本州府依諸色舉人例考試結解送省任稱鄉貢童子長吏不得表薦若無本處解送本司不在考試之限朕聞古先哲王臨御天下上則以無偏無黨為至治次則以足食足兵為遠謀緬維前修誠可師範朕纂承鳳歷嗣守鴻圖三載於茲萬幾是總非不知五兵未弭兆庶多艱蓋賴卿等寅亮居懷康濟為務冀盡賦輿之理洞詢盍徹之規今則濳按方區備聆謠俗或力役罕均其勞逸或賦租莫辨於後先但以督促為名煩苛不已被甲胄者何嘗充給趨朝省者轉困支持州閭之貨殖全疏天地之災祥屢應以至星辰越度旱潦不時農桑失業於邱園道殣相望於郊野生靈及此寢食寧遑豈非朕德政未孚焦勞自掇者耶朕昨親援毫翰軫念瘡痍一則詢爾謀猷一則表豫宵旰未披來奏轉撓於懷敢不翼翼罪躬乾乾軫慮咨爾四嶽弼豫一人何不舉爾賢才輔豫寡昧百辟之內羣后之間莫不有盡忠者被掩其能抱器者難陳其力或草澤有遺逸之士山林多屈滯之人爾所不知吾將安訪卿等位尊調鼎名顯代天既逢不諱之朝何吝繇中之説當宜歷告中外急訪英髦應在任及前資文武官下至草澤之士有濟國治民除姦革弊者並宜各獻封章朕當選擇施行其近宣御札亦可告諭內外體朕意焉
