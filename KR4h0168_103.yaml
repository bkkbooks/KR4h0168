front:
  text: 全唐文欽定全唐文卷一百三帝姓朱耶氏賜姓李諱克用其先隴右金城人唐大中十年生始祖拔野貞觀中從太宗討高麗有功為沙陀都督子孫代襲帝初為雲中牙將纍官司空龍紀元年封隴西郡王乾寧二年進封晉王天祐五年正月薨年五十三同光元年追諡武皇帝廟號太祖
  hash: sha256:0a9a060b646287f92f8fbc5c5e7d844b27dc59301dd481c80a0166a93b9b125e
