front:
  text: 全唐文欽定全唐文卷三十二元宗十三
  hash: sha256:eaea7a0f98eccbd856675b9fb85703507bf6a18ed24ddc761cb132d35183789c
body:
  text: 社為九土之尊稷乃五穀之長春祈秋報祀典是尊而天下郡邑所置社稷等如聞祭事或不備禮苟崇敬有虧豈靈祇所降欲望和氣豐年焉可致也朕永惟典故務在潔誠俾官吏盡心庶蒼生蒙福自今巳後應祭官等庶事宜倍加精潔以副朕意其社壇側近仍禁樵牧至如百姓私社宜與官社同日致祭坐運奇謀誠難與戰河西捷書相繼謂之伐叛可豫圖之所請者依化人成俗率繇於德本移忠教敬實在於孝經朕思暢微言以理天下先為注釋尋亦頒行猶恐至賾難明㣥疑未盡近更探討因而筆削兼為敘述以究源流將發明於大順庶開悟於來學宜付所司頒示中外朕肅承宗祀不敢怠遑誠有未安夙夜祗惕頃時有事於太廟兩京同日告享雖虔卜吉辰俱遵上日而義深如在禮或有乖自今以後兩京宜各別擇吉日告享務農勸穡雖因於天道人和歲稔實賴於神庥頃者春夏之交稍愆時雨收穫之際復屬秋霖慮害農功每祈孚祐遂得百神降福㣥望效靈既不為災仍多善熟幽賛之德普洽於生人昭報之儀式遵於祀典宜令太子詹事嗣許王瓘祭東嶽光祿卿嗣鄭王希言祭中嶽宗正卿濮陽郡王徹祭西嶽少府監李知柔祭南嶽衞尉卿嗣吳王祇祭淮瀆光祿少卿彭果祭河瀆所司擇日錄奏其名山大川有路近處亦合便祭僻遠處委所繇長官備禮致祭務陳蠲潔以達精誠朕恭守丕業臨照百官冀君臣一心中外勵節長安縣令柳升往因推薦寘彼周行而乃稟性回邪恣情聚斂黷於貨賄紊我紀綱是而可容孰不可赦故令鞫按用致嚴刑豈惟懲息姦源抑欲庶寮知戒況聞朝廷卿士多與交遊比之匪人門通賂遺用宏寬典咸為匿瑕且古人以廉恥立名清白貽範苟虧斯節謂忝前修況身荷恩榮家享重祿陳力無紀徇財已彰取愧素餐自投踈網每念於此良用憮然凡在百寮宜為殷鑒仍宣示中外令知朕懷朕欽惟載籍討論墳典以為先王令範莫越於唐虞上古遺書實稱於訓誥雖百篇奧義前代或亡而六體奇文舊規猶在但以古先所制有異於當今傳寫浸訛轉疑於後學永言刊革必在從宜尚書應是古體文字並依今字繕寫施行永念典謨無乖於古訓庶遵易有益於將來其舊本仍藏之書府育物者所貴於從宜養人者必資於遂性況加疾苦豈忘哀矜內外廂三衞彍騎等如聞因當上染患者番滿之後既不勝皆致還鄉又不容在職掌將息進退無據何所依投溝壑是憂宜謀朝夕永言及此深軫於懷自今巳後如有此色宜移就三衞廚給食料將養各委左右金吾將軍存意檢校所須藥物仍與太常計會量事供擬並差醫人救療其諸門及街鋪職掌人等各移就本衞將養所須食料各委將軍以當衞諸色迴殘官物等且量事支給其醫藥宜準內外廂例自餘諸色當番人等有疢疾者並準此處分其死者各委所由隨事埋瘞當日牒報本貫令家人親族運致還鄉高平郡太守上柱國長山縣開國伯韓朝宗頃承榮獎擢在神京輒薦凶人超登赤縣果彰貪穢大獲贓私舉非允當巳有比周之責使之交易更涉嫌疑之地頗招物議實紊朝章宜從貶黜用申懲戒可吳興郡別駕員外置頃敘功勞累增勳級上柱國外許及周親是謂賞延載榮宗族迴充賜物用厚朝恩其準格上柱國外有餘勳迴授周親頃以獻歲親祠百靈豈精至之上昭而禎祥之屢應神言報休徵之慶黃素飛雲漢之閒皆宗社降靈福流寰宇豈予微感獨能致之所請宣示朝廷光於史冊者依朕精修道源為人祈福雖則每多昭應未若此之殊祥豈聖祖揆予之無私靈真貺我之誠感遂得休徵之應出自神言勤請之詞上飛空境永惟虛薄何以當茲然福逮蒼生深為慰也所請者依纉承丕業遵修元訓精誠之至冀在希夷寡昧之德寧期昭應恭惟聖祖屢降真容仙衞接於雲閒飈駕迴於天路又賜以無疆之壽且欣以助成之言嚴奉神休良深祗慶所請者依尊祖奉先必在於崇敬辨儀正禮所貴於緣情伏以大聖祖元元皇帝御氣昇天長生久視體重元而不測與元化以無窮真容屢現寶符仍集恭惟孚祐實表常存比太清宮行事官皆具冕服爰及奏樂未易舊名并告獻之時仍陳筴祝既非事生之禮豈是降仙之儀且真俗殊倫幽明異數理有非便亦在從宜自今後每於太清宮行禮官宜改用朝服兼停祝版其告獻辭及所奏樂章朕當別自修撰仍令所司具儀注奏聞君子之道所以正心志全貞吉也逸人之學所以勵天下激浮躁也朕每崇先訓以道化人思致棲貞之士用先咸在之列是以頻降束帛冀空巖藪虛懷式竚明發不忘卿等來應辟命遠致城闕周文多士既叶於旁求虞舜疇咨亦在於僉議爰命臺省詢於道業或善行無跡名實難窺或大器晚成春秋尚富津涯未測輪桷何施事且隔於行藏道以分於出處其馬曾常廣心賀蘭迪等三人宜待後處分崔從一王允貽韓宣胡祭趙元獎等五人年鬢既高稍宜優異宜各賜綠衣一副物二十段餘并賜十段不奪隱淪之志以成高尚之美並宜坐食訖好去仍依前給公乘還郡王者天其祖學者父其師義有尊崇情歸孝敬況我元宗道要無名象先猶龍莫測昔嘗問禮烹鮮有論歷代攸尊永惟重元衆教之父者也朕纉承聖緒祗服元言乙夜觀書將求於道雖理歸絕學信無取於筌蹄然垂代作程義必存乎文字俾之大順亦合禮經其墳籍中有載元元皇帝南華等真人猶稱舊號者並宜改正其餘編錄經義等書亦宜以道德經列諸經之首其南華經等不須編在子書仍即令集賢院審詳改定應舊號并科目訖具宣付所司仍頒示中外波斯經教出自大秦傳習而來久行中國爰初建寺因以為名將欲示人必修其本其兩京波斯寺宜改為大秦寺天下諸府郡者亦宜準此刑之所設將以閑邪法不在嚴貴於知禁朕自臨萬國向踰三紀思宏至道之化實務好生之德比者應犯極法皆令免死配流所以市無刑人獄無冤繫哀矜勿喜冀洽於生靈大小以情寧忘於鑒寐至於徒罪雖非重刑力役之外不免拘縶載罹寒暑誠可矜量自今以後其犯罪應合徒者並宜配諸軍効力庶感激之士因以成功寬大之恩叶於在宥且本置杖罪是代肉刑將以矜人非惟重法今官吏決罰或有任情因茲致斃深可哀憫其犯杖罪情非巨蠧者量事亦令効力宜令所司作載限仍立條例處分宮苑之內屢薦嘉祥今又縞質霜毛變林虞之獸族殊姿馴性實雲駕之龍媒允謂休徵用為慰也所請者依黜幽陟明所以察風俗求瘼恤隱所以慰黎蒸不有其人孰可將命禮部尚書席豫等亮直清節經通大才多識前言備閑時政或久膺任使嘗參八使之列或夙蘊公忠必副四方之委永懷兆庶用寄澄清豫巡河北道鉷巡京畿關內及河東道隱之巡東畿及河南道見素巡山南東道江南西道黔中嶺南等道麟巡河西隴西磧西等道翹巡劒南及山南西道光譽巡淮南及江南東道其百姓之閒及官吏之輩如事或未該須有釐革者仍委量事處置回日奏聞其嶺南黔中磧西途路遙遠若使臣一一自到慮有稽遲任各精擇判官準舊例分往永言亭育仁慈為本況乎春令義叶發生其天下弋獵採捕宜明舉舊章嚴加禁斷宣布中外令知朕意今土膏既動農事將興丁壯就功不可妨奪其不急之務一切並停祭祀之典犧牲所備將有達於虔誠蓋不資於廣殺況牛之為畜人實有賴既功施播種亦力被車輿自此餘牲尤可矜憫況前聖有作難為盡廢明神克享亦在深仁自今以後每大祭祀應用騂犢宜令所司量減其數仍永為常式皇王之典聿循於百代郊祭之義允屬於三靈聖人既因時以制宜王者亦緣情以革禮朕丕承寶運肅遵明禋曷嘗不克己齋心虔恭夙夜猶慮舊章或闕誠敬未孚有一於此良深祗畏且尊莫大於天地祭莫大於祖宗嚴配昭升豈宜異數今蒸嘗之獻既著於常式南北之郊未展於時享粢盛且略對越何申自今巳後每載四時孟月先擇吉日祭上帝其以皇地祇合祭以次日祭九宮壇皆令宰臣行禮奠祭務從蠲潔稱朕意焉祭神如在傳諸古訓以多為貴著自禮經膟膋之儀蓋昔賢之尚質甘旨之品亦孝子之盡誠既切因心方資變禮其巳後享太廟宜料外每室加常食一牙盤仍令所司務盡豐潔發生振蟄雷為其始畫卦陳象威物效靈氣實本於陰陽功乃施於動植今雨師風伯久列常祠唯此震雷未登㣥望巳後每祀雨師宜以雷神同祭朕承宗廟之福為人神之主事有未暢義在得中庶寅畏之誠上達於郊廟祈禳之典載收於闕遺凡在有司各揚所職倍宜恭肅以叶靈心百工允釐彰乎奉職五日休澣義在優閒方貴無為之風以宏多暇之政朕欽崇至道思致和平今寰㝢克寧朝廷無事將欲叶於淳古豈惟臻於小康當與㣥寮暢茲娛樂頃旬遊宴賞巳放入朝節假常參未敷後命公私叶慶千載一時上下同歡自中及外自今巳後每至旬節休假中書門下及百官並不須入朝外官等其日亦不須衙集應流貶人皆負罪譴其中或捨其昧死全彼餘生將寬常法示有懲戒如聞在路多作逗留郡縣阿容許其停滯是何道理自今巳後其左降官量情狀稍重者馳十驛巳上赴任流移人令押領綱典畫時遞相分付如更因循尚有寬縱所繇當別有處分書曰無總貨寶生生自庸傳曰官之失德寵賂章也則古先哲王不聞好貨垂以明戒無易紀律然法貴變通罰宜平典罪止其惡過從寬宥庶乎有勸冀乎有懲韋堅是司潭漕妄事興易餉遺朝廷計其積贓數目甚廣朕以衣冠之士豈往求之而姦回之人是為抑與韋堅巳別有處分所司一切不問咸令自新冀有廉隅成予德化各思變節無貳過焉宣示中外知朕此意朕頃所撰廣濟方救人疾患頒行巳久計傳習亦多猶慮單貧之家未能繕寫閭閻之內或有不知倘醫療失時因致橫夭性命之際寧忘惻隱宜令郡縣長官就廣濟方中逐要者於大板上件錄當村坊要路牓示仍委採訪使勾當無令脫錯朕憂彼黎元寄之牧宰嘗慮授任非當撫字乖方頃所以設舉親之科廣得賢之路爰初詣闕亦既明試以言及乎從政必欲深考其實懸之賞罰要以始終近日分遣使臣因之巡察善惡之驗事既足明懲勸之端言斯可復其楊懋等七人黜陟使並奏清狀宜與改轉其所舉主六品巳下付所司準此處分五品巳下各賜一上下考李連等八人既奏善狀除巳改官者至選日各減三兩選仍稍優與處分一中上考趙憕等六人俱犯贓私除巳流貶者自餘並速準律科斷其舉主各量犯者罪狀輕重咸從貶黜仍宣示中外咸使知悉琚久經任使歷典藩條恃朝廷之見寬冒憲法而無憚凡所莅職罕著善聲自頃移官益彰喧訟志由貪敗政以賄成所犯贓私動盈千計正名論罪合寘流刑宥過推恩宜從貶任可江華郡司馬員外置孝享宗廟所以達思誠也格於神祇所以崇嚴敬也則祈穀上帝春祀先王永惟因心敢忘如在朕承累聖之丕業應上元之福佑聿修柴瘞虔奉蒸嘗常慮備物未豐馨香莫達頃以詳諸舊典創以新儀清廟陳牲特加於常餼昊天冬祭重增以時享庶乎罄齊敬之勤叶殷薦之義況履茲霜露載感惟深瞻彼郊壇有懷昭事念禮歸通變諒期乎達誠教在率先必貴乎親奠宜以來載正月朕親謁太廟便於南郊合祭仍令中書門下即與禮官詳定儀注擇日奏聞興言拜獻先深祗感凡百有司各供爾職道為理本孝實天經將闡教以化人必深究於微旨朕欽承聖訓覃思元宗頃改道德經載字為哉仍隷屬上句及乎議定衆以為然遂錯綜真詮因成注解又孝經舊䟽雖粗發明幽晦探賾無遺猶未能備今敷暢以廣闕文且妙本逾元微言久絕或怡然獨得或參以諸家庶宏聖哲之規用叶君親之義仍令集賢院具寫送付所司頒示中外今屬陽和布氣蠢物懷生在於含養必期遂性如聞滎陽僕射陂陳留郡蓬池等採捕極多傷害甚廣因循既久深謂不然自今巳後特宜禁斷各委所由長官嚴加捉搦輒有違犯者白身決六十仍罰重役官人具名錄奏當別處分其僕射陂仍改為廣仁陂蓬池改為福源池庶宏大道之仁以廣中孚之化嶺南五府經略採訪使光祿少卿兼南海郡太守攝御史中丞彭果頃者擢以非次鎮彼方隅不能慎守名克副朝寄而乃貪惏匪極求欲無厭官吏恣其侵漁蒼生受其塗炭醜聲轉露穢迹彌彰及令推窮並自招伏計其贓數十萬有餘議以常科法當殊死但尚寬典免致嚴誅宜從杖罰俾徙荒徼即就大理寺門決六十除名長流湊溪郡仍即差使馳驛領送至彼捉搦勿許東西重門夜開以達陽氣㣥司朝晏樂在時和屬此上元當修齋籙其於賞會必備葷羶比來因循稍將非便自今巳後每至正月改取十七十八十九日夜開坊市門仍永為常式左道亂常邦家所禁兇謀逆節天地不容戶部侍郎兼御史中丞楊慎矜潛蓄回邪率由艱險猥承門緒得齒朝行爰自卑微謬加超擢寄之帑藏總彼均輸殊不知外矯清廉內懷貪冒趦趄百變以此徇身首鼠萬端專為罔上觸途苛刻歸怨國家還俗僧史敬忠兇慝逆徒狂愚賤品乃妄陳讖緯別覬異圖密與交通將期委質仍自以亡國之後克復攸歸遂乃手記災祥窺覦時變言肆惡悖心在不臣惡跡既彰款驗咸服戴天履地面目何施梟首夷宗未云塞責但以務宏大體志在寬刑尚免嚴誅容其自斃其楊慎矜宜賜自盡其兄少府少監慎餘弟洛陽令慎名等不合隨從並為同惡亦宜令自盡其史敬忠首建逆謀實為巨蠧宜決重杖一百鮮于賁詐稱敬忠當王附會兇人宜決重杖六十長流其范滔妄說妖言與之昵狎宜決六十長流嶺南臨江郡其王庭耀既為傭作終不論告宜決四十配隷黔中郡楊慎矜外甥前通事舍人辛景湊引致非類成此禍端宜決四十配流嶺南晉康郡其義陽郡司馬嗣虢王巨雖則不涉凶謀終與敬忠相識宜解却官於南賓郡安置其太府少卿張瑄素以妄庸專行險詖比緣慎矜薦引驟歷班榮因此結交潛為黨援況犯贓私情逾難恕宜決六十長流嶺南臨封郡其右威衞執㦸天馬監副監万俟承暉妄蓄圖書與慎矜解說潛相黨附為蠧實深宜決重杖六十其閑廄使殿中監韋衢忝膺重寄不存公道受慎矜囑請為承暉奏官諂黷愈彰比周斯在宜貶與遠官應配流及安置人等所在即差綱驛領送其楊慎矜及兄弟并史敬忠有莊宅等宜并官收其家口男女等並令所司準法即配流嶺南諸郡其張瑄及万俟承暉鮮于賁等男女并一房家口亦準此配流嶺南其內外近親不可尚列班榮及居京轂宜令三司使即括實奏聞且臣之事君有死無二匹夫徇義猶或亡軀豈有位亞六卿任兼三獨父子相續俱承重委兄弟不次皆列通班而更陰圖不軌潛覬異望靜言此心良可歎息除惡務本與衆共之令在惟行蓋非獲巳中外寮庶咸使聞知故邠王男承宣等地惟戚屬器表溫良伯仲輝光溫溫有裕推恩之典既叶於分官賜服之榮宜崇於寵命禎祥者所以合天人鴻名者所以彰德業今封章繼至誠請甚勤敬膺神休允答人望宜依來請朕肅恭明祀祈福上元冀敷佑於黎蒸將昭報於靈應頃蠻夷款附萬里廓清稼穡豐穰㣥方樂業豈惟菲德以致元和實賴神休永綏景貺思崇望秩用展虔誠宜令宗正卿襃信郡王璆等即分往五嶽四瀆及四海致祭所經道次有名山大川亦便致祭務令精意以稱朕懷朕欲使人述日用道遠親譽願行其心永守沖約未允來請宜識此懷朕觀上古人主惟稱帝王一字秦漢以來乃兼皇帝朕以薄德嗣守寶位乾乾惕厲懼不克勝豈自崇飾以招譴咎雖迫公卿之請終負平生之心所請加尊號甚無謂也詩者志之所之也將以道達性情宣揚教義耳朕承五聖之業萬方之寄主鬯叶於神心元良貞於國本美其克踐仁孝恭修友睦深慰於懷不覺形之諷詠今請具寫六章頒示中外兼編諸策以傳不朽亦欲自家刑國以訓人倫宜依來請自春以來頗時雨登封告禪情所未遑所封西嶽宜停吏部取人必限書判且文學政事本自異科求備一人百中無一況古來良宰豈必文人又限循資尤難獎擢自今以後擇縣令但才堪政理方圓取人不得限以書判及循資格注擬諸畿望緊上中每等為一甲委中書門下察問選擇堪任者然後奏授大理評事其朝要子弟中庸未歷望畿縣便授此官既不授文又未經事自今以後有此色及朝要至親並不得注擬五材並用時表上靈八水分流實稱善利京師奧壤秦甸王畿灞滻通於涇渭澇潏匯於澧滈蓄洩雷雨滋育稼穡雖惠澤巳及於蒸民而虔誠猶闕於祀典聿崇精享庶達明神其涇渭灞滻等分水宜令禮儀使左庶子韋述取今月二十九日一時備禮致祭務陳蠲潔稱朕意焉黍稷垂成實滋甘澤既屬久旱懷憂匪寧思拯黎元靡神不禱靈心昭鑒降此休徵覩垂穎之可觀佇大穫之為慶編之青史良有愧焉農為政本食乃人天必禾稼之及期遂京坻之厚積是以愛人存乎重穀勤政在乎厚生俗之所資何急於此如聞遠近每至秋中穀禾熟時即賣充馬藳苟求規利之心殊害生成之性靜言斯弊實資懲革自今以後不得更然其三京及天下諸郡並委所繇長官嚴加捉搦如非成熟不得輒刈犯者量決四十仍牓示要路咸使聞知南北衞百官等如聞昭應縣兩市及近場處廣造店鋪出賃與人干利商賈莫甚於此自今巳後其所賃店鋪每閒月估不得過五百文其清資官準法不可置者容其出賣如有違犯具名錄奏朕承唐運遠襲元元載宏道流遂有靈應彼之女道丹臺真人白日上升五雲在御不圖好道遂有明徵深為喜慰卿舊相之子家上元元能叶心志自茲目視果成朕願雖上清云遠而舊相猶存遼海雖別於千年緱山復期於七日窈冥響像故亦依然今因奏使迴便付少物卿可於觀所宜修齋行道以達朕意也卿能至誠必有通感然道之為政本貴無為宜用乃心化彼黎庶
