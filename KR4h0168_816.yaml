front:
  text: 全唐文欽定全唐文卷八百十六循乾符中官司戶參軍
  hash: sha256:adfbd6dc06b119b7e440da2008b6cac8d73837d81efe913c17186a37ea8a2b7f
  markers:
  - {type: head, offset: 13, content: 袁循, id: KR4h0168_NFKB_816-h1, level: 1}
body:
  text: 咸通末歲今翰林舍人蘭陵公自右史竄黔南秋八月二十七日泝三峽次秭歸時蜀水方漲橫濤蔽目公積悸而寢夢神人赤髮碧眸且云險不足懼公異之再寢又夢公詰其所自則曰我黃魔神居紫極宮之隅將祐助明公出於北境公曰吾斥去荒徼危殆未巳神能惠我何也以朝夕期幸與我俱遠遊我不忘矣亟言之神許諾自是抵於黔又遷於羅每陟險艱神怳如在洎公遷於朝神夢告歸公曰將移廟列塑於宮之傍丁酉歲公從弟兟自澧陽尹亞西蜀路出祠下以囊金致公意謂前制不專請別修敬太守清河公承命感異親營之心匠既陳層軒以新神樂來斯靈儀蹲蹲按靈寶經南方有大魔其中央曰黃天魔王橫天贍力謂能力扶昊蒼周覆萬有天其或者以公有宏濟之業將扶危定傾作鎮天步俾黃魔降鑒為公之兆眹乎噫天為功必藉於大賢神之靈固輔於有德是必有鴻猷盛績萃於公之心未可知也循以學官謫秭歸奉太守命弗敢讓所記乾符丁酉歲仲春九日司戶參軍袁循記鴻儒乾符時人唐宣宗大中五年龍集辛未設科求賢合天下士對策於大廷臚傳以莫公宣卿為第一公字仲節廣南封州人也所產之鄉曰文德所居之里曰長樂厥考諱曰讓仁雖不仕亦有隱德蚤年不祿公母梁氏恐公孤立無倚改適繼父亦莫氏諱及芝乃開建籍也公隨母往并而為昆仲者三長曰莫儔次曰莫㣥公年最少乃其季也繼父亦樂善好施歲歉則出粟以周鄰里嘗遣二兄習讀公幼在側天性迥異聞言即悟甫七歲資識豁然手不釋卷過目輒成誦時人目為神童入郡庠從遊於梁明甫先生梁母尢嚴於內訓試於有司薦於大廷對揚清問首魁天下初典翰林未服官政後以母老具表陳情乞官外補以便就養上可其奏賜官台州別駕歸省迎母未至官所而尋卒故里葬之於文德鄉鑼鼓岡咸通九年封州刺史李邦昌上其事於朝欽奉上勅為唐正奏狀元莫孝肅公祀以廟食表其里居曰文德蠲其賦稅以充烝嘗之需永為常典公自幼以至登第所撰詞賦詩歌皆操筆立成誦而咏之如真金美玉不落形迹如化工生物不事妝點而生氣宛然如在也及今公族子姓言動氣象猶有公之遺風雖鄉曲五尺童子與夫田野愚夫愚婦皆重公名莫不喜談樂道之凡遊於庠序者罔不賢其賢守其宗祀者莫不親其親得非狀元公神化之所感也耶是請也公之嫡孫莫立之郡之庠生也述公行實以告且請予為記以垂悠久余無似叨治公郡恨弗獲覩公而徒慕公也因以為記云時有唐乾符五年歲在甲午秋仲望日濬僖宗時人金陵之屬郡毗陵南無錫縣有佛寺曰慧山寺濬家山也貞元元和中先丞相太尉文肅公心寧色養家寓是縣因肄業於慧山始年十五六至丙戌歲擢第歸寧為朱方強畱之文肅公窺畏常驚切於旦夕之間李庶人以反狀聞嘗召公草不順章檄公語以君臣父子忠孝誠節別白自古道理者約千餘言言既勁勇庶人畏敬又逼以狂卒圍以兵刃促公下筆振叱數四髮眥見怒狀庶人因令閉之於別所命許縱成之是夜張子良裴行立共義公忠赤果相與易圖庶人兵敗公以忠節聞於天下新帥李公元素欲具事表於朝廷公三讓之遂退歸慧山寺僧房猶孜孜勤經史洎十年手寫書籍前後約五百軸寺山之泉獨稱奇能發諸茗顏色滋味公僻居舍飲雖崇貴未嘗輒自優奉惟輦載慧山泉數千里不問其費耗公文學官業功德濬謹纂敘制詔章表堂狀類列其間不敢輒以文飾表至敬也為上下卷今藏史閣我家之盛嘗二為相三為史官高祖中書令諡文憲儀鳳中為中書令如意中為鸞臺左相先公丞相贈太尉諡文肅會昌中為左僕射門下相儀鳳在相監修國史會昌在相監修國史乾符四年濬自祕書省校書郎為丞相滎陽公獨狀奏入直史館會己亥歲春有事白相府乞假東出函谷關數千里夏五月癸卯過家出覩舊刻石詩題別無碑版敘錄懼年祀寢遠不得布聞於人謹以史筆條敘於寺之正殿內時乾符六年夏五月十六日甲辰書筠乾符時人蓋聞佛力無邊教化各異靜而思之同歸一體至如尊勝陀羅尼經者應佛陀波利之願也原夫起自西天流於東土初從梵本後譯唐言是苦海之津梁實人民之舟檝但有迴向無不蒙益爰有清信士陳宗可等並久親善道早悟佛乘知聚沫之無堅視芭蕉之速朽故孜孜金地稽首高僧披露至誠欲結尊勝寶幢之會僧闕二字隨順轉闕三字合結無上勝因闕二字當是妙乘諸公意無先後遂令藏鏹金地買石他山召募良士精心礱礪未渝數旬琢磨當就雕鑴既罷樹立俄成巍巍也勢聳於青霄闕二字也形闕一字於碧落莫不睹之罪闕三字福生七闕三字角之身三塗息泥犂之苦然後願合會老幼普獲休祥在軍者爵祿咸臻經求者資財驟聚復願人人增壽攸歸鶴闕一字之闕五字形闕二字寒林之三秀如斯功德浩汗無涯以百千舌歎不能盡筠之無德謬忝諸生不揆荒虛畧而為讚讚曰彼尊勝者起自西天教中之寶法中之先諷之誦之永離蓋纏三塗未受七闕一字休闕一字結會歸敬獲福無邊鑴闕三字永保貞堅昌明嶺南人乾符五年官翰林學士南越王趙佗氏昔令龍川時建池於嶅湖之東阻山帶河四面平曠登山景望惟此為中厥土沃壤草木漸包墾闢定規制北距嶅十里東距五馬峯五里南距河里許相對即海珠山也鑿井於治之東偏曰越井取春秋時為南越戰國屬楚為百粵秦首置南海即以龍川隸焉則越之封肇於春秋而龍之壤則啟自越王佗也井周圍為二丈許深五丈雖當亢旱萬人汲之不竭其源出嶅山泉極清洌味甘而香自秦距今八百七十餘年其蹟如新稽史記列傳稱漢既平中國而佗能集揚越以保南藩稱職貢則佗之績艮足為多又秦徙中縣之民於南方三郡使與百越雜處而龍有中縣之民四家昌明祖以陝中人來此已幾三十五代矣實與越井相終始故記之如此乾符五年十月之吉邑人翰林學士韋昌明記玭天平節度使仲郢子以明經補祕書正字由書判拔萃累轉左補闕擢刑部員外郎出為嶺南節度副使黃巢陷交廣逃還再遷御史中丞文德元年以吏部侍郎拜御史大夫貶瀘州刺史卒光化初詔復官爵漢長安城本秦離宮也高帝七年長樂宮成自櫟陽徙都之惠帝視其窄狹乃發長安六百里內男女十四萬六千人及諸侯王列侯從隸二萬人城長安仍賜民爵戶一級長安方三十里內地九百七十三頃八街九陌九市周回六十五里十二城門皆有候蕭望之為東門候東有三門一宣平門外郭東都門一清明門外郭東平門一霸城門外郭青門霸城門外一里許有萬壽寺焉萬壽寺本梁太尉吳王蕭岑宅隋開皇四年文帝為沙門曇延立為延興寺東院莒公蕭琮之堂隋亡捨入寺神龍中中宗為永泰公主追福改為永泰寺大中六年請改名僧寺五所化度寺改為崇福寺永泰寺改為萬壽寺溫國寺改為崇聖寺經行寺改為龍興寺奉恩寺改為興福寺而寺各異其額也然萬壽一寺宣帝親幸賜額命官造理殿宇廊廡方丈山門共一百九十七間左右院林二所香地二頃六十餘畝石佛一尊娑羅樹六橛勑度一百二十僧受牒免差入寺焚修祝延聖壽後淨覺住持能守清規迥出於眾懼寺年久莫識其端請余為記俾後人有所據云大凡門第高者一事墜先訓則異他人雖生可以苟爵位死不可見祖先地下門高則自驕族盛則人窺嫉實藝懿行人未必信纖瑕微累十手爭指矣所以修己不得不至為學不得不堅夫士君子生於世己無能而望他人用己無善而望他人愛猶農夫鹵莽種之而怨天澤不潤雖欲弗餒可乎余幼聞先公僕射言立己以孝悌為基恭默為本畏怯為務勤儉為法肥家以忍順保交以簡恭廣記如不及求名如儻來莅官則潔己省事而後可以言家法家法備然後可以言養人直不近禍廉不沽名憂與禍不偕潔與富不並董生有云弔者在門賀者在閭言憂則恐懼恐懼則福至又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至故世族遠長與命位豐約不假問龜蓍星數在處心行事而已昭國里崔山南琯子孫之盛仕族罕比山南曾祖母長孫夫人年高無齒祖母唐夫人事姑孝每旦櫛縰笄拜階下升堂乳姑長孫不粒食者數年一日病言無以報吾婦冀子孫皆得如婦孝然則崔之門安得不昌大乎東都仁和里裴尚書寬子孫眾盛實為名閥天后時宰相魏元同選尚書之先為壻未成婚而魏陷羅織獄家徙嶺表及北還女已踰笄其家議無以為衣食資願下髮為尼有一尼自外至曰女福厚豐必有令匹子孫將遍天下宜北歸家人遂不敢議及荊門則裴齎裝以迎矣今勢利之徒捨信誓如反掌則裴之蕃衍乃天之報施也余舊府高公先君兄弟三人俱居清列非速客不二羹胾夕食齕蔔瓠而已皆保重名於世永寧王相國涯居位竇氏女歸請曰玉工貨金义直七十萬錢王曰七十萬錢豈於女惜但金义直若此乃妖物也禍必隨之女不敢復言後金义為馮球外郎妻首飾涯曰為郎吏妻首飾有七十萬錢其可久乎馮為賈相國餗門人賈有奴頗橫馮愛賈召奴責之奴泣謝未幾馮晨謁賈賈未出有二青衣齎銀罌出曰公恐君寒奉地黃酒三杯馮悅盡舉之俄病渴且咽因暴卒賈為嘆息出涕卒不知其由明年王賈皆遘禍噫王以珍玩為物之妖信知言矣而不知恩權隆赫之妖甚於物耶馮以卑位貪貨不能正其家忠於所事不能保其身不足言矣賈之臧獲害客於墻廡之間而不知欲始終富貴其可得乎舒相國元輿與李繁有隙為御史鞫譙獄窮致繁罪後舒亦及禍今世人盛言宿業報應曾不思視履考祥事歟夫名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛余家本以學識禮法稱於士林比見諸家於吉凶禮制有疑者多取正焉喪亂以來門祚衰落基構之重屬於後生夫行道之人德行文學為根株正直剛毅為柯葉有根無葉或可俟時有葉無根膏雨所不能活也至於孝慈友悌忠信篤行乃食之醯醬可一日無哉夫門第高者可畏不可恃可畏者立身行已一事有墜先訓則罪大於他人雖生可以苟取名位死何以見祖先於地下不可恃者門高則自驕族盛則人之所嫉實藝懿行人未必信纖瑕微累十手爭指矣所以承世冑者修己不得不懇為學不得不堅夫人生世以己無能而望他人用以己無善而望他人愛無狀則曰我不遇時時不急賢亦繇農夫鹵莽種之而怨天澤之不潤雖欲弗餒其可得乎予幼聞先訓講論家法立身以孝悌為基以恭默為本以畏怯為務以勤儉為法以交結為末事以棄義為凶人肥家以忍順保友以簡敬百行備疑身之未周三緘密慮言之或失廣記如不及求名如儻來去恡與驕庶幾減過莅官則潔己省事而後可以言守法守法而後言養人直不近禍廉不沽名廩祿雖微不可易黎甿之膏血榎楚雖用不可恣褊狹之胸襟憂與福不偕潔與冨不並比見家門子孫其先正直當官耿介特立不畏強禦及其衰也唯好犯上更無他能如其先遜順處己和柔保身以遠悔尢及其衰也但有暗劣莫知所宗此際幾微非賢不達夫壞名菑已辱先喪家其失尢大者五宜深志之其一自求安逸靡甘淡泊苟利於己不恤人言其二不知儒術不悅古道懵前經而不恥論當世而解頤身既寡知惡人有學其三勝己者厭之佞己者悅之唯樂戲譚莫思古道聞人之善嫉之聞人之惡揚之浸漬頗僻銷刓德義簪裾徒在厮養何殊其四崇好慢遊躭嗜麴糵以銜盃為高致以勤事為俗流習之易荒覺已難悔其五急於名宦暱近權要一資半級雖或得之眾怒㣥猜鮮有存者茲五不韙甚於痤疽痤疽則砭石可瘳五失則巫醫莫及前賢烱誡方冊具存近代覆車聞見相接夫中人以下修辭力學者則躁進患失思展其用審命知退者則業荒文蕪一不足採唯上智則研其慮博其聞堅其習精其業用之則行舍之則藏苟異於斯豈為君子寔乾符六年官比部郎越相蠡與大夫種左右勾踐竟成霸業乃謀自全之道輕齎閒行浮海適齊自稱鴟夷子或云平吳之後潛遯之五湖故今之赤山即洞庭湖之鄙也五湖之說不同愚謂後人所在慕德而祀焉耳廟在六國後置靡究厥始至皇朝天寶六載有勅封表其山亦嘗為塞胡祠會昌年廢之而廟亦隨歇有武夷山人陳庶慕止學業誘化村坊捐金帛而剏之以其祈禱無不應也史記曰荊人鬼而越人禨其來尚矣庶因進士賈纁請愚為記若其地形峭絕山川向背即備於陳庶之狀云盈孫贈司空侑孫廣明初為成都諸曹參軍僖宗在蜀擢太常博士轉祕書少監終大理卿贈吏部尚書伏以偽熅違背宗社僭竊乘輿欺天之禍既盈盜國之罪斯重果至覆敗以就誅夷九重之妖祲既除萬國之生靈共慶宜陳賀禮以顯皇猷然物議之間有所未允臣按禮經公族有罪獄既具有司聞於公曰某之罪在大辟君曰赦之如是者三有司走出致刑君復使謂之曰雖然固當赦之有司曰不及矣君為之素服不樂三日左傳衞君在晉衞臣元咺立衞君之弟叔武衞君入國叔武為前驅所殺衞君哭之左氏書焉今偽熅皇族也雖犯殊死之罪宜就屠戮其可以朝㣥臣而受賀乎臣以偽熅允係金枝名標玉牒迫脅之際不能守節効死而乃甘心逆謀罪實滔天刑不可赦已為軍前處置宜即黜為庶人絕其屬籍其首級仍委所在以庶人禮收葬大捷之慶當以朱玫首級到日稱賀為得其宜上不軫於宸衷下無傷於物體協禮經之旨袪中外之疑臣謹按三太后憲宗穆宗之后也二帝已祔太廟三后所以立別廟者不可入太廟故也與帝在位皇后別廟不同今有司悞用王彥威曲臺禮禘別廟太后於太廟乖戾之甚臣竊究事體有五不可曲臺禮云別廟皇后禘祫於太廟祔於祖姑之下此乃皇后先崩已造神主夫在帝位如昭成肅明元獻昭德之比昭成肅明之崩也睿宗在位元獻之崩也元宗在位昭德之崩也肅宗在位四后於太廟未有本室故創別廟當為太廟合食之主故禘祫乃奉以入饗其神主但題云某諡皇后明其後太廟有本室即當遷祔帝方在位故皇后暫立別廟耳本是太廟合食之主故禘祫乃升太廟未有位故祔祖姑之下今恭僖貞獻二太后皆穆宗之后恭僖會昌四年造神主合祔穆宗廟室時穆宗廟已祔武宗母宣懿皇后神主故為恭僖別立廟其神主直題云皇太后明其終安別廟不入太廟故也貞獻太后大中元年作神主立別廟其神主亦題為太后並與恭僖義同孝明咸通五年作神主合祔憲宗廟室憲宗廟已祔穆宗之母懿安皇后故孝明亦別立廟是懿宗祖母故題其主為太皇太后與恭僖貞獻亦同帝在位后先作神主之例今以別廟太后神主禘祭升享太廟一不可也曲臺禮別廟皇后禘祫於太廟儀注云內常侍奉別廟皇后神主入置於廟庭赤黃褥位奏云某諡皇后禘祫祔享太廟然後以神主升今即須奏云某諡太皇太后且太廟中皇后神主二十一室今忽以皇太后入列於昭穆二不可也若但云某諡皇后即與所題都異神何依憑此三不可也古今禮要云舊典周立姜嫄別廟四時祭薦及禘祫於七廟皆祭惟不入太祖廟為別配魏文思甄后明帝母廟及寢依姜嫄之廟四時及禘皆與諸廟同此舊禮明文得以為證今以別廟太后禘祫於太廟四不可也所以置別廟太后以孝明不可與懿安並祔憲宗之室今禘享乃處懿安於舅姑之上此五不可也且祫合祭也合猶不入太祖之廟而况於禘乎竊以為並皆禘於別廟為宜且恭僖貞獻二廟比在朱陽坊禘祫赴太廟皆須備法駕典禮甚重儀衞至多咸通之時屢遇大饗耳目相接歲代未遙人皆見聞事可詢訪非敢以臆斷也或曰以三廟故禘祫於別廟或可矣而將來有可疑焉謹按睿宗親盡巳祧今昭成肅明二后同在夾室如或後代憲宗穆宗親盡而祧三太后神主其得不入夾室乎若遇禘祫則如之何對曰此又大悞也三太后廟若親盡合祧但當閟而不享安得處於夾室禘祫則就別廟行之歷代巳來何嘗有別廟神主復入太廟夾室乎禘祫禮之大者無宜錯失臣以德明等四廟功非創業義止追封且於今皇帝年代極遙昭穆甚遠可依晉韋宏屋毀乃巳之例因而廢之太廟制度歷代參詳皆符典經難議損益謹按舊制十一室二十三間十一架垣墉廣袤之度堂室淺深之規階陛等級之差棟宇崇低之則前古所謂奢不能侈儉不能踰者也今以朝廷帑藏方虛費用稍廣須資變禮將務從宜固不可易前聖之規模狹大朝之制度當憑典實別有參詳謹按至德二年以太廟方修新作神主於長安殿安置便行饗告之禮如同宗廟之儀以俟廟成方為遷祔當時議論無所是非今者京城除大內正衙外別無殿宇伏聞先有詔旨且以少府監大廳權充太廟伏緣十一室於五間之中陳設隘狹伏請接續廳之兩頭成一十室薦饗之三太后廟即於監內西南別取屋宇三間且充廟室候太廟修奉畢日別議遷祔臣昨赴齋宮見中尉樞密內臣皆具朝服臣尋前代及國朝典令無內官朝服制度伏以皇帝陛下承天御歷聖祚中興祇見宗祧克陳大禮皆稟高祖太宗之成制必循虞夏商周之舊經軒冕服章式遵彞憲若內官要衣朝服令依所守官本品之服事雖無據粗可行之臣忝禮司合具陳奏支咸通時自號雲居散人李長者諱通元莫詳所自或有詢其本者但言滄洲人開元二十七年三月望日曳策荷笈至於太原孟縣西四十里同穎鄉村名大賢有高山奴者尚德慕士延納無倦長者徑詣其門山奴諦瞻神儀知非常器遂磬折禮接請歸安居每旦唯食棗十顆柏葉餅子如七大者一枚自爾不交外人掩室獨處含毫臨紙曾無虛時如是者三稔一旦捨山奴南去五六里至馬氏古佛堂自構土室寓於其側端居宴默於茲十年後復囊挈經書遵道而去二十里餘次韓氏別業即今冠葢村焉忽逢一虎當途馴伏如有所待長者語之曰吾將著論釋華嚴經可與吾擇一棲止處言畢虎起長者徐而撫之將所挈之囊挂於虎背任其所止於是虎望神福山原直下三十餘里當一土龕前便自蹲駐長者旋收囊裝置於龕內虎乃屢顧妥尾而去其龕瑩潔圓迴廣袤尋丈自然而有非人力成龕之四旁舊無泉澗長者始來之夕風雷暴作拔去一古松高三百餘尺及旦松根之下化為一潭深極數尋迴環五十餘步甘逾瑞露色奪琉璃時人號為長者泉至今澄明未曾增減陽之歲祈之必應長者製論之夕心窮元奧口出白光照耀龕中以代燈燭居山之後忽有二女子容華絕世皆可笄年俱衣大布之衣悉以白巾幪首姓氏居處一無所言常為長者汲水焚香供給紙筆卯辰之際輒具淨饌甘珍畢備置長者前齋罷徹器莫知所止歷於五祀曾不闕時及其著論將終遂爾絕迹謹按華嚴舊傳東晉三藏佛䭾跋陀羅於江都謝司空寺譯經有二青衣童子忽自庭沼而出承事梵僧爇香添瓶不離左右每欲將夕還潛沼中日日皆然率以為常事及譯畢寫淨沈默無迹長者感通事符曩昔長者身長七尺二寸廣眉朗目丹脣紫肌長髯美茂修臂圓直髮彩紺色毛端右旋質狀無倫風姿特異殊妙之相靡不具足首冠樺皮之冠身披麻衣長裾博袖散腰而行亦無韋帶居常跣足不務將迎放曠人天無所拘制忽一日出山訪舊止之里適值野人聚族合樂長者徧語之曰汝等好住吾將欲歸眾乃罷樂驚惶相顧咸皆惻愴必謂長者卻還滄洲揮涕同詞懇請畱止長者曰縱在百年會當歸去於是舉眾卻送長者入山至其龕所復語之曰去住常然耳汝等可各還家及眾旋踵之頃嵐霧四起景物不分行路之人咸共駭異翌日長叟結徒登山禮候但見姿容端儼巳坐化於龕中矣時當三月二十八日報齡九十六有一巨蛇蟠當龕外張目呀口不可向近眾乃歸誠致祝某等今欲收長者全身將營殯葬乞潛威靈願得就事蛇因攝形不現耆舊澘泣轝荷擇地於大山之陰累石為墳蓋取堅淨即神福山逝多蘭若今方山是也初長者隱化之日及成墳之時煙雲凝布巖谷震蕩有二白鶴哀唳當空二鹿相呌連夕其餘飛走悲鳴滿山鄉原之人相率變服追攀孺慕若喪所天每當建齋即墳上雲起七七如是良足異夫長者平昔之時每年常於三月末間設十方賢聖淨會不以女人造食貴使蠲事精誠至於棗核米泔不許輒棄齋畢任用犬彘徧霑如斯之會遵承到今未曾廢絕至大歷九年二月六日有僧廣超於逝多蘭若獲長者所著論二部一是大方廣佛新華嚴經論四十卷一是十二緣生解迷顯智成悲十明論一卷傳寫揚顯徧於并汾廣超門人道光能繼師志肩負二論同遊燕趙昭示淮泗使後代南北學人悉得參閱論文宗承長者皆超光二僧流布之功耳其為論也統貫經義標表法身廓性海於無邊歷劫塵而不動分判眾教極彼源流融鎔上乘會此華藏俾迷徑者獲道滯教者忘機可謂毘盧之指歸華嚴之日月矣若非聖人愍世降生開導昬暝孰能條釋大典指授大心歟長者行止元微固難遐究虛空不可等度况擬求邊際耶比歲僧元覘特抵方山求長者遺跡初禮石墳次尋龕址龕前有松三株一巳闕一字立俱是長者手植長者將化之月一株遂枯至今二株常有靈鶴結巢於頂又於壽陽南界解愁村遇李士源者乃傳論僧之猶子示長者真容圖瞻禮而迴斯為滿願矣向之云云蓋在摭實枝葉華藻無所務焉雲居散人馬支纂錄
