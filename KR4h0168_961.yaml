front:
  text: 全唐文欽定全唐文卷九百六十一闕名二
  hash: sha256:b068e0c0df9ee7969d1cfbf153d9d56f477b7ade576d04350ee93f0934e87581
body:
  text: 我聖人之有國酌古訓建皇極太學備崇儒之禮春宮熟齒冑之則宗伯貳事司成奉職叶三王之教可知順四時之儀不忒域中於是乎宣化天下於是乎觀德既而儲駕戾止虞庠肅清傾章甫之列駐和鸞之聲讓其齒也長幼之節著明其親也父子之道成達其尊也君臣之義行疑三善兮皆得實萬邦兮以貞故曰先知後為上行下效宏當代之楷式奉前王之德教於以識尊卑之倫於以觀莊敬之貌大矣政本至哉化源膺秬鬯之丕烈訪典謨之格言揖讓於詩書之府雍容於禮義之門敬其學而德至親其師而道尊青青子衿其容不改亹亹儲嗣其福斯在則孰能不恭而志佚孰能不學而思殆所謂遵萬民刑四海也鄒魯儒生文在茲乎依稀兮翔集闕里髣髴兮詠歌舞雩七十子兮三千徒實將執經以問豈獨摳衣而趨哉則知大學之義國風之始在明德在貴齒禮師臣延冑子尊賢所以抗法講藝所以惇史有觀者曰玉琢成器人可不學亦因此習禮樂夫如是實國家之大柄而德行之有覺皇帝於驪山之上起仙閣於神皋得淩雲之體勢彰考室之劬勞冠千峯而迥出聳百尺之彌高蓋取惟清惟靜而藉乎以遊以遨干碧霄而宏壯依絕頂而高抗仰之者目眩心驚俯之者興逸神王納煙霞於襃裏看日月於掌上改山為會昌之號建福無疆題閣取朝元之名升天有望徒觀其出地表俯人寰飛重簷於日下謺千栱於雲間金鋪燭耀玉磶苔斑蓮井雕梁之彩錯綺牕網戶之虛閒屹屹然下臨千仞亭亭然遠對黃山若乃初旭澄霽則勢能孤迥早霞初照如赤城在天台之峯積雪未消若銀臺處蓬萊之頂每歲農務隙寒事興聖人之玉輅是動金梯是淩限三休而爰至歷重檻而方憑寒鴈正來下泰山之八水暮煙初起繞漢家之五陵以人心為心則遇物多感以真趣為趣則放情元覽豈不由登此而存所誠處此而無所營方抗隱而遺物覺山空而益清七聖不迷勝軒轅襄野之遊豫萬靈畢集若夏禹塗山之會成昔周日之中天擅美秦代之阿房著名既煩費於徭役復荒淫於性情豈與夫險不恃兮高不傾囂塵絕兮虛白生光一人之息偃歷千載而彌遠者同日而言哉昔終軍志蘊勇謀辯能遊說願陳炎漢之威武遠挫勁越之鋩銳以謂嘉言是發不假短兵之交遠畧無儔思得長纓以繫乃言曰蠢爾越賞僻在遐方隔華夏之正朔闕貢賦之典章遂欲持漢節適蠻荒得執纓以奉使期繫虜而來王既存乎功莫我大奚辭於道阻且長摧倔強於舌端匪申北面之禮曳葳蕤之首飾將服南方之強既而屆彼絕域於焉辨惑以利害為紀綱以禮義為組織明其攻取之計比以衆寡之力越王於是俯而敬聽仰而失色徒慮梟首之有期惟懼束身而莫得乃解其椎髻願與華同獻明珠翠羽之珍曾無虛月化斷髮文身之俗莫不嚮風諒約束以在始故羈縻而有終原夫三寸之舌自騁七擒之術作警俾其氣攝於胸常恐兵在於頸聽絲綸之命已有懼心受縲絏之時敢不引領是知纓之是持功罔期錫王者之服章禮以牽率加越人以文冕義在縶維斯則繼陸賈之前功乃立可俟也來尉佗於丹徼非遠莫致之則知善於激勸乃適我之願詞可縱橫故縻之以纓則雕題黑齒之類孰不從風而行泰嶽東南峯開一室傍接天路低臨曉日隱埋玉兔動霄漢之微明曉報天雞越氛埃之迥出初其暝色蔥蘢懸崖倚空獨出清虛之外遙分莽蒼之中隱霧猶白經天漸紅披草樹以燈亂耀波濤而血融及夫林嶺寒消煙雲色變星河寥落以初沒峯巒邐迤而徐見火動山頂輪移水面穿暗隟以飛鏡歷幽牕而走電至若門宇蕭條霜空泬寥晴開曙景暖入殘宵揚晶彩以赩赩散芒角而飄飄露灑文薄風牽影搖觀夫望極天涯生從地表扶若木之歷歷出窮陰之春杳杳萬壑收暝千巖送曉消古砌之晴雪動寒庭之宿鳥遙空冷滑傷寸晷之難留碧嶂岧嶢望孤光而漸小拔地生疾騰空影斜氣亂山燒光分水花絕壁孤危覺靈海之津狹炎輝咫尺信長安之路賒既而背暘谷以徐來汎圓靈之不礙蒙水氣以珠暗露松陰而璧碎霞色收錦天風斂黛披雲闕之斜視豁天門而俯對依簷乍吐威生齊魯之間過嶺逾明煦及草茅之內由是遠挂寥落高辭絕溟萬象焜煌而畢照六龍夭矯以無寧安得足蹋聳峭手扶青冥陳白晝之苦短請陽烏之暫停式觀圖籍幽山窮野聞卉木之名焉考神農之嘗者根莖可驗洪纎不捨惟瓦松兮闕書何昔人兮智寡原其所托高而又雅抽形先寄於鶴樓聳質更資於鴛瓦旖旎芬葩含風接霞既當春而吐葉亦淩秋而點花異山苗之極秀狀澗松兮抽芽高居壤霤匪雜泥沙向朝陽兮發秀經夕露兮增華常在危簷心必直詎欲牽風影暫斜小大殊品高卑異盼離離兮若星榆之昭灼煜煜兮疑石蒲之葱蒨既乏棟梁之用寧怯鐫雕之變豈比夫桂山上蘭谷中長幽隱兮銷馥為芬芳兮敗叢奚若茲物之獨茂無憂患兮養蒙先王之欲齊政立信平施執中天下之利害攸同則非衡無以達其志非衡無以成其功故後代聖人奉之而不墜懸之而無窮遠必照乎庶物近罔欺於厥躬少多之分著彼我之情通廉者不約貪者不豐昭昭有禮殊之義洋洋有樂和之風乃以見權衡之德器用之雄也觀夫製形有象稱物以律萬萬靡差銖銖罔失雖遇寡而必舉亦裒多而不溢倘有賈豎懷虛背實雖手巧而用售終身平而貞吉節在不欺德咸有一用之則竭力於百戰舍之則甘心於三黜其昭明也有景緯之文其重墜也有沈潛之質是以春秋仲而均之以法日夜分而俾之無妄體正居中懷柔抱壯揣千鈞之重不贏其材稱萬物之多莫窮其量夫然則人亦有是豈惟斯平士為之物官為之衡材之云多雖默必重文之不腆雖語必輕非榮辱莫敢怨得喪莫敢驚梃然誠懸不可欺以輕重確乎不拔孰敢議其屯亨吾當禺禺視聽直心舉措豈能朵頤騰口如羹也衡之誠也義在乎有孚懸之審也法貴其不渝先賢所以宏建作智者所以通規模俾人事之有準在權衡之合符端平可以揣金石輕重可以分錙銖遠取諸天既齊七政不私於物亦象三無質因材而斯宣文綴星而可覽臨用詳備而有誠物情詐偽而何敢比良工之度木同藻鏡之照膽故審其思者為衡可持端其事者於物無欺以之忖刻舟爰定其圭撮以之明度量不失其毫實同途於執政將一體於有司誠可大而可久必念茲而在茲若乃懋遷有無應用鄽里萬物禀原百貨資始苟執其均平孰不我以稱物則合於聖人有常乃比於君子至哉權衡功與利并成天下之務其利斯溥為天下之式其功不輕道在乎至要理歸乎至貞提握之間而萬人取則尋尺之內而九有致平豈不以作者之聖述者之明守而勿失用之必行將度量而並設與規矩而齊名掄材至精多士無壅以權衡擬升降以中正為遵奉當平施而不差仰衡誠之義重藉於天田之歲也洎正月下明詔及仲秋萃賢良凡今才人莫不麇至他他籍籍不可勝言於以躬親示納人之獻可也為之加膳示恤之以飫賜也既自渴賢不足實為觀國之光君舉必書敢賦其事惟天為大則之者我君有嚴有翼乃武乃文據天地之大寶建社稷之元勳道不虛行於從政乎何有試可乃已俾濫吹者區分於是移千官以就日闢高闕以連雲濟濟罄山林之士峩峩列鵷鷺之㣥且木以從繩則正君以從諫則聖廣開替否之規遂下昌言之命采彞倫於翹錯薪能官於是乎癉惡則哲自可以知人得孫宏為舉首趨倚相為史臣儼端居於咫尺恭大問以絲綸睿旨臨天威肅咸怵惕之若厲俱進退之維谷將畢力於謨猷乃竭誠於啟沃帝載惟貞垂範作程有典有則惟一惟精重席表其彰善持衡所以貴平便便有司能奉法而宣令高高在位更責實以循名觀賢謂何務於慎擇或告之誡訓或旌之束帛日旰豈疲於端想躬親不患於胡獲夫如是王者無外誰為方外之臣野無遺賢誰為在野之客獨有扣角勞歌憂心孔多仰天門以難叫咏碩人之在阿則知代實須才生此多士惟賢非后不食惟后非賢不理一技稱最徒仰惠堂之榮三道登科敢望太常之美儻連茹之終及乃願一申於知已也有東吳子博識洽聞欲觀風於上國期屬意於南薰審樂聲以殊志將理化之可分名藉藉以播物意飄飄以淩雲聿來洙泗當周之季禮樂之化已虧文武之音亦墜嗟矇瞽之多逸歎君臣之不自閱鄒魯之儒書獨可稱其樂器爾乃金石迭奏匏革互起主每齊於屈伸客克諧於音旨宏慈愛於寬裕展肅敬於廉恥和風陶陶以感心繁音洋洋以盈耳剛不怒兮稽其度柔不懾兮得其理雖曲度而屢絕尚鏗鏘而未已政教則異褒貶無愆題深思於唐俗稱大風於齊篇察邶詩之不困知鄭祀之不延釋猶憾之南籥愍黍離之東遷是皆清明光鑒修短昭然雖謂千祀曾何聞焉幸遇休明沐茲至化太和覃於夷狄神功格於上下五英六莖之義咸池大章之徒與歷代而共樂非古有而今無且夫樂著太始配天為大實欲庶物之暢茂非獨五音之繁會故省樂之理明乎否泰方且樂於無聲又何假聞乎自鄶禹別九州磬浮泗水為下不昧雖深可視或浮於涘其滑如砥含餘音而未振潄迴流而增美日月其逝水石相攻形潛水府律與天通值君子之深識調聖人之大中備六音以繁會與四氣而元同於以布聖理於以宣王風配以閶闔之位應乎夷則之宮伊美石之潛處隔清波而迭見儻混衆流不逢顧盼詎辭泗水之濱寧受徐方之薦安可配黃鍾而備清縣乎洎大君之御㝢乃乘時而光宅作樂以應天象邦之成績設業設簴擊石拊石德音橫於覆載至理彰乎損益鳥獸以之率舞祖考於焉來格固宗廟之登用豈泥沙之棄擲夫人之度物物無不可制禮作樂實忘已以愛人漾川濟深亦披沙而求我不以為碌碌不以為瑣瑣將使致中和非以娛密坐述堯心之克讓豈鄭聲之興禍當其人之未知確乎安卑無小無大極幽而不隱不擊不考含和而莫移動符於有德靜合於無為不然者何以別清濁於是考存亡於斯降天神登地祇哉夫和之至者樂音之清者磬天地之位辨君臣之分定苟失是邪以害直忠若於佞故君子之所以理躬姦聲不畱於聽未見以字官韻總㣥籟以擇音歷衆材而簡質惟茲竹之珍勁獨懷貞而守一若洗文濃露濯影華池離離嘉實冉冉纎枝含夕氣而拖翠照晨旭以舒猗淩責積霜而莫改因虛心而不虧上橫桂暉下拂松葢抗修莖於雲表脫輕花於霞外千仞未極其高十圍寧伸其大既絕㣥以標傑亦冠叢而稱最連星影而類珠晚虹挂而猶帶蒙密柔柯布濩繁葉白日朝映素輪夜接色淨潭深影沈攢謺洎乎層陰結長飈起清徵奏鳴弦理金罍溢而未傾玉山儼而猶峙詆訶六籍咀嚼三史窮元熙之根柢極天地之終始此乃至人勝集七子碌碌則安足齒故語其用也則五離十折絲剖毫分縈九華於紈扇結雙雉於簟文乍搖紈襃時拂湘裙掩凝鉛之豔逸籠流麝之氤氳若夫取象制儀激商流雅圓徵有素清亮非假信鳳鳴之可習實龍吟而可寫乃曲絕而和微非韻高而調下豈知分光綺殿散影華軒淡雲霞之遠色霑雨露之餘恩嘉庭樹之蠲忿跂桃李之無言庶歲寒而無易常耀節於梁園南國之紀兮江水深中嶻嶭木兮天姥岑試一望兮見簫筦之差參碧雲凝其正色白日出其重陰每含和以自守雖歲寒其莫侵於是乃使夫匠人淩皛淼入幽窅攀重蘿閱豐篠截成枝之龍質擬銜花之鳳鳥作為洞簫其聲窈窕矇瞽之士純精所至尤澹澹兮無營浩紛紛兮縱肆纖指敏手隨抑揚之虛滿曲折等分任吹噓而懿濞爾其為樂也則龢羅稽詣而逸其為苦也則瀏溧冽清而悴或山會山兌以相從復淋漓而遠被有若層山抱空而晴燭巨海涵虛而夕涖是以君子聽之載其平粹及乎弄玉既好簫史亦出登翠檻之巍峩結紅羅之婉蔚楊葉鮮吹荷花浴日對吟空濶之情復感神仙之術若乃漢皇未躍周勃護喪哀笳左引畫翣前張靈逶迤而就挽思徘徊而永傷悽其吻吭誰非斷腸故若翔若止心中定矣若反若墜不遺其類趣從容以向空乍猗那以內閟信大雅之紆直繹茲聲之開塞匪天地兮同和孰能與夫偕極稽聖人之遺文懿珍禽之不一彼善言之靈鳥孕聰明以自逸苞火德之奇姿誕金方之素質匪含章以就殞故遠時而襲吉憐碧山之孤高恃榮松之蔽密傳眾音於清吹凝白華於皎日由是既飲既啄載留載飛觸雲網以摧羽閉雕籠而見歸豈不由蓄素姿以罹患懷海陰而遂違雖失㣥以傷指亦順人而可依登玉架覘朱闈苟安性以知樂每求榮而自微雪膚皎皛擯池鷗之光潔霜毛瑩淨奪軒鶴之清輝且其翔不忘止居必任側莫厭傳弄豈驚撫拭狎君子之光儀遠虞人之網弋感珍念而矜眷託恩馴以棲息而愛其豐姿冰華全體玉色匪鵷彩之爭妙何眾禽之比德呼名自應隔羅幔而飛來教語半成學美人之漸逼故對綺琴而傾聽上金屏而斂翼蒙正平之翰藻應司空之寵識夫元默者動之所求潔素默之攸尚矧聰性以受絏悲惠心之為亮抗幽意於霞表羨高儔於海上彼不材兮見留此能言兮何妄或曰物惡近以招累理貴遠而無凶雖遁形以取美獨抱清而不從豈知夫善生者託人以遠害能壽者輔德以自容是以承君子之恩渥獨蒙幸以遭逢者也書曰擊石拊石百獸率舞是知時貞而物應德博則化光故九有宅心萬方惟允我開元聖文神武皇帝陛下懋建皇極丕承寶命揚五聖之耿光安兆民於反側功成道備作樂崇德上以殷薦祖宗下以導達情性則有天馬絕足來從東道出天庭而屢舞仰皇心而載悅豈止綠錯開圖分九疇於夏后汗溝走血服四夷於漢皇而已哉野人沭浴聖造與觀盛德敢述蹈舞之事而賦之皇帝叶天行乘春候張廣樂而化通鬼神徵舞馬而懷柔奔走爾其聆音却立赴節騰凑顧遲影而傾心效長鳴而引脰徘徊振迅類威鳳之來儀指顧倏忽若騰猨之驚透眄鐘鼓而載止暢簫韶之九奏洎宛跡遲遲汗血生姿順指不動因心所之日照金羈而晴光交映風飄錦覆而淑氣相資顧以退而未即將欲進而復疑絕節交衢而大人相慶赴曲齊列而皇心則怡豈若檀溪水上章臺路前塵埋玉勒汗溼金鞭竟空疲於力用固無取於當年孰若矯足騰摧婉柔姿而近日驚身聳躍嬌逸態於鈞天別有假象天星因時降靈雙瞳夾鏡而異質兩顴夾月而殊形出渥洼兮道已泰歷吳坂兮心匪寧願因百獸之相率舞聖德於天庭渥洼之駿兮逸㣥特秀簡偉之來兮稀代是覯豈憚夫行地無疆是美其承天之祐弭雄心以順軌習率舞而初就因大樂以逞狀隨伶官而入奏樂彼皇道上委折於一人狎節廣埸下歡心於百獸飾金金穸頓紅緌類却畧以鳳態終宛轉而龍姿或進寸而退尺時左之而右之至如鼉鼓歷考龍笛昭宣知執轡之有節乃蹀足而爭先隨曲變而貌無停趣因矜顧而態有遺妍既習之於規矩或奉之以周旋迫而觀焉若桃花動而順吹遠而察之類電影倏而橫天固絕倫之妙有豈衆技之齊焉我皇端拱無事垂意至寧愔愔正聲以九變而合樂逐逐良馬終萬舞而在庭豈比夫漢皇取樂而同轡魯侯空牧而在坰以今古而匹敵何長短之相形皇天眷命兮炎漢斯興運鍾三葉兮文德可稱六龍整儀賤纖英而不服五馭飭駕却良駿而不乘由是遐邇授首蠻夷屈膝梯山航海者望之如雲納賮貢珍者府無虛日別有吉良之種渥洼之出飛黃於軒宮奄驊騮於周室歷無草以入貢涉流沙而効質就御服以馴養願驅馳而警蹕其體也廣膺滿腹其目也擁後決前眸點漆而鏡朗權應規而璧懸禀月精於地法星象於天鬣上朱明溝中血走朝辭辮髮之俗暮憩雕題之藪驌驦慙專美於前騕褭愧垂名於後及夫噴玉勒而沫素鳴金珂而響清指九重以獻壽勒百禮以効誠帝於是宣皇風馳聖道前賢斯鑒古訓斯考嗟轍迹於穆王想旅獒於召保乃宣言曰朕法天以清淨法地以元虛有典有則不疾不徐梢星之旗建於前步彗雲之斾設於後車吉行三十而當息良馬千里而焉如爾以馬為寶我以德為輿輿其授受之交喪曷若乾乾而捨諸獻馬者乃默靦慙顏低徊弔影步遷延以眷眷神寂寞而耿耿於是德日洽祚惟永俾來葉之嗣君仰斯道以自警穆彼作繪聞諸色工增乎華諒以文為質分乎像示非素不終惟繪也成文不亂惟素也允執厥中蓋以昭聖人微論喻君子飾躬豈分黑黃與蒼赤列山龍與華蟲已哉古人以盼倩之姿彰敦樸之俗知女得其禮不專於舜華士有其容或同於冠玉雖言詞為藻繪威儀為朱綠自可果行不回持禮自勗亦猶布采者以質相從為素者以絢相屬借如葉公之繪飛虯也蟠蜿騰驤非素則其勢不揚漢氏之圖明也嬋娟窈窕非素則其容不彰是以間其文彩布厥元黃譬瀑布之界道如溝塍之畫疆然後五色成文班簡而不雜遐方圖物賦鼎而可詳且無文無質其比如櫛何貴專一之琴瑟不離不亂其間如繖自同流中之圭瓚既點綴而無遺亦聯帛丿糸而不斷原夫染人獻色工人始謀巧心方逞濡翰方流似刃地之無礙疑繭緒之方抽入衆色之中自分文質發㣥象之表如別薰蕕且殊受采之性寧有奪朱之憂則知素之體也真繪之色也侈守厥貞白雜乎麗靡理衆惟寡既以一而處多守樸不雕遂出此而入彼將黼黻而奪麗匪組織之所擬別有彬彬向就屑屑行諸志惟厲乃仁則依於期霄漢之振拔假詞賦為蘧廬讀孔聖之言雖云由己承卜商之問終媿起子霓裳綽約兮羽衣蹁躚高舞妙曲兮似於㣥仙長襃若緩而若急雅音或斷而或連想奏禁城之裏如聞玉皇之前迎拍動容縹緲而羅衣曳霧含霜吐曲響亮而德音徹天止有餘態動無遺妍昔開元皇帝以海內清平天下豐足思紫府瑤池之樂制霓裳羽衣之曲夭夭而花貌呈妍冉冉而雲鬟垂綠金石鏗鏘而不雜絲竹要妙而相續觀夫降輦路臨廣場被羽衣披霓裳始逶迤而並進終宛轉以成行舞隨節以襃急歌和氣而韻長退若游龍之乍婉進如驚鴻之欲翔趨合規矩步中圓方想其奏也示安寧尚敦樸明樂之雅正辨樂之清濁雅聲發乎宮商清音發乎徵角似到蓬萊之殿見舞仙童如昇太乙之宮忽聞帝樂爾乃若止若行或疎或傾進退合度俯仰應聲聽之而雅正斯在聞之而奸邪不生天地為之交泰日月為之貞明今我皇紹唐堯之業繼聖祖之德制禮作樂而和兆人端拱垂衣而朝萬國於是陳廣樂宴㣥臣鄭衞之聲是遠神仙之曲是親雅音奏而合律妙樂作而入神變態而波迴風轉顧步而雲飛霞新已矣哉想曲罷而舞歇當皇州而正春
