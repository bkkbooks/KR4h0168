front:
  text: 全唐文欽定全唐文卷七百二十七元輿婺州東陽人元和八年進士大和時累官御史中丞兼刑部侍郎以本官同平章事與李訓謀誅宦官事敗為內兵所擒族誅
  hash: sha256:8adbe0182010b385e94f109f83d82a0843054b33a6dbf63eba54b8592e8a2103
  markers:
  - {type: head, offset: 14, content: 舒元輿, id: KR4h0168_NFKB_727-h1, level: 1}
body:
  text: 古人言花者牡丹未嘗與焉葢遁於深山自幽而芳不為貴者所知花則何遇焉天后之鄉西河也有眾香精舍下有牡丹其花特異天后歎上苑之有闕因命移植焉由此京國牡丹日月寢盛今則自禁闥洎官署外延士庶之家濔漫如四瀆之流不知其止息之地每暮春之月遨遊之士如狂焉亦上國繁華之一事也近代文士為歌詩以詠其形容未有能賦之者余獨賦之以極其美或曰子常以丈夫功業自許今則肆情於一花無乃猶有兒女之心乎余應之曰吾子獨不見張荊州之為人乎斯人信丈夫也然吾觀其文集之首有荔枝賦焉荔枝信美矣然亦不出一果耳與牡丹何異哉但問其所賦之旨何如吾賦牡丹何傷焉或者不能對而退余遂賦以示之圓元瑞精有星而景有雲而卿其光下垂遇物流形草木得之發為紅英英之甚紅鍾乎牡丹拔類邁倫國香欺蘭我研物情次第而觀暮春氣極綠苞如珠清露宵偃韶光曉驅動盪支節如解凝結百脈融暢氣不可遏兀然盛怒如將憤洩淑色披開照曜酷烈美膚膩體萬狀皆絕赤者如日白者如月淡者如赭殷者如血向者如迎背者如訣坼者如語含者如咽俯者如愁仰者如悅褭者如舞側者如跌亞者如醉曲者如折密者如織疎者如缺鮮者如濯慘者如別初朧朧而上下次鮮鮮而重疊錦衾相覆繡帳連接晴籠晝薰宿露宵裛或灼灼騰秀或亭亭露奇或颭然如招或儼然如思或帶風如吟或泣露如悲或垂然如縋或爛然如披或迎日擁砌或照影臨池或山雞已馴或威鳳將飛其態萬萬胡可立辨不窺夭府孰得而見乍疑孫武來此教戰其戰謂何搖搖纎柯玉欄風滿流霞成波歷階重臺萬朵千窠西子南威洛神湘娥或倚或扶朱顏己酡角衒紅釭爭顰翠娥灼灼夭夭逶逶迤迤漢宮三千豔列星河我見其少孰云其多弄彩呈妍壓景駢肩席發銀燭爐昇綘煙洞府真人會於㣥仙晶熒往來金釭列錢凝睇相看曾不晤言未及行雨先驚旱蓮公室侯家列之如麻咳唾萬金買此繁華遑恤終日一言相誇列幄庭中步障開霞曲廡重梁松篁交加如貯深閨似隔窗紗髣髴息媯依稀館娃我來覩之如乘仙槎脈脈不語遲遲日斜九衢遊人駿馬香車有酒如澠萬坐笙歌一醉是競孰知其他我案花品此花第一脫落㣥類獨占春日其大盈尺其香滿室葉如翠羽擁抱比櫛蕊如金屑妝飾淑質玫瑰羞死芍藥自失夭桃歛迹穠李慚出躑躅宵潰木蘭潛逸朱槿灰心紫薇屈膝皆讓其先敢懷憤嫉煥乎美乎后土之產物也使其花之如此而偉乎何前代寂寞而不聞今則昌然而大來曷草木之命亦有時而塞亦有時而開吾欲問汝曷為而生哉汝且不言徒留翫以徘徊七月十八日祀九宮貴神臣次合監前件祭職當檢察禮物伏見祝版九片臣伏讀既竟竊見陛下親署御名及稱臣於九宮之神臣伏以天子之尊除祭天地宗廟之外無合稱臣者王者父天母地兄日姊月而貴神以九宮為目是宜分方而守其位臣數其名號太一天一招搖軒轅咸池青龍太陰天符攝提此九神於天地猶子男也於日月猶侯伯也陛下尊為天子豈可反臣於天子之子男耶臣竊以為過縱陰陽者流言其合祀則陛下當合稱皇帝遣某官致祭于九宮之神不宜稱臣與名臣實愚瞽不知其可伏緣行事在明日雞初鳴時成命已行臣不敢滯伏乞聖慈異日降明詔命禮官詳議冀明萬乘之尊無所虧降悠久誤典因此可正馬周張嘉貞代人作奏起逆旅卒為名臣今臣備於朝自陳文章凡五晦朔不一報竊自謂才不後周嘉貞而無因入又不露所蘊是終無振發時也漢主父偃徐樂嚴安以布衣上書朝奏暮召而臣所上八萬言其文鍛鍊精粹出入今古數千百年披剔剖抉有可以輔教化者未始遺拔犀之角擢象之齒豈主父等可比哉盛時難逢竊自愛惜草茅臣某昧死奏書皇帝陛下聖德修三代之教盡善矣唯貢士一門闕然不修臣竊以為有司過矣臣為童子時學讀書見禮經有鄉舉里選必得其人而貢於上上然後以弓旌朿帛招之臣年十五既通經無何心中有文竅開則又學之徧觀㣥籍見古人有片善可稱必聞於天子有司天子有司亦脩禮待之不苟臣既學文於古聖人言皆信之謂肖質待問上國必見上國禮無幾前年臣年二十三學文成立為州縣察臣臣得備下土貢士之數到闕下月餘待命有司始見貢院懸板樣立朿縳檢約之目勘磨狀書劇責與吏胥等倫臣幸狀書備不被駮放得引到尚書試試之日見八百人盡手攜脂燭水炭洎朝晡餐器或荷於肩或提於席為吏胥縱慢聲大呼其名氏試者突入棘圍重重乃分坐廡下寒餘雪飛單席在地嗚呼唐虞闢門三代貢士未有此慢易者也臣見今之天下貢士既如此有司待之又如此乃益大不信古聖人言及覩今之甲賦律詩皆是偷折經誥侮聖人之言者乃知非聖人之徒也臣伏見國朝開進士一門苟有登升者皆資之為宰相公侯卿大夫則此門固不輕矣凡將為公侯卿相者非賢人君子不可有司坐舉子於寒廡冷地是比僕隸已下非所以見徵賢之意也施棘圍以截遮是疑之以賊姦徒黨非所以示忠直之節也試甲賦律詩是待之以雕蟲微藝非所以觀人文化成之道也有司之不知其為弊若此臣恐賢人君子遠去不肖汚辱為陛下用且指近陳之今四方貢珠玉金銀有司則以篋篚皮幣承之貢賢才俊乂有司以單席冷地承之是彰陛下輕賢才而重金玉也賢才恥之臣亦恥之臣又見每歲禮部格下天下未有不言察訪行實無頗邪然後上貢苟不如格抵罪舉主臣初見之竊獨心賀謂三代之風必作於今日矣及格既下而法不下是以歲有無藝朋黨譁然扇突不可絕此又惡用格為徒亂人耳又於格中程之人數每歲多者固不出三十少或不滿二十此又非天子納士之心也何以言之今日月出沒皆為陛下內地自漸海流沙朔南周環綿億萬千里其間異氣所鍾生英豪俊彥固不少矣若陛下明詔必以禮舉之忽一歲之內有百數元凱楊馬之才德者來之則有司必曰吾格取二十而黜八十是為求賢邪遺賢邪若有司以僕隸待之忽一歲之內負才德來者無十數輩則有司必曰吾拔二十是繆收其半徒足滿人數是為取才邪取合格邪其不可先定人數亦昭昭矣向之數事臣久為陛下疾有司不供職使聖朝取士首科委就地矣臣寒微若此出言不足以定貢士之得失然百慮之中或幾一得之臣竊欲陛下詔有司按三代故事明修格文使天下入貢者皆茂行實不拘人數其不茂行實法與之隨此為澄源源既澄則來者皆向方矣俾有司加嚴禮待之舉六義試之試之時免自擔荷廊廡之下特設茵榻陳爐火脂燭設朝晡飯饌則前日之病庶幾其有瘳矣人人知天子重賢獎士之道勝氣坌漫如此士之立身無不由正以成之者為士身正則公卿正公卿正未有天下不治者天下治而陛下求不垂拱以高揖羲軒不可得也苟不如此則士之求名無不由邪以成者為士名邪未有公卿不邪者公卿邪未有天下而治者天下不治而陛下欲不役聖慮而憂黔首不可得也臣雖至愚以此觀之知貢士之道所繫尤重是以願輸寫血誠以正此門陛下無以臣迹在貢士中疑臣自謂臣雖不敏竊窺太常一第不為難得何以明之若使臣為今日貢士之體事便僻巧佞馳鶩關鍵固非臣之所不能也恥不為也故互以頑才干有司得之固無忝不得則納履而去縱跡巢由以樂陛下熙熙之化何往而無泉石之快哉伏惟陛下留神獨聽天下之幸也於臣何幸死罪死罪昔歲吾行吳江上得亭長所貽劍心知其不莽鹵匣藏愛重未曾褻視今年秋在秦無何發開見慘翳積蝕僅成死鐵意慙身將利器而使其不光明之若此常緘求淬磨之心於胷中數月後因過岐山下得片石如綠水色長不滿尺濶厚半之試以手磨理甚膩文甚密吾意其異石遂攜入城問於切磋工工以為可為砥吾遂取劍發之初數日浮埃薄落未見快意意工者相紿復就問之工曰此石至細故不能速利堅鐵但積漸發之未一月當見真貌歸如其言果覩變化蒼慘剝落若青蛇退鱗光勁一水泳涵星斗持之切金錢三十枚皆無聲而斷愈始得之利數十百倍吾因歎以為金剛首五材及為工人鑄為器復得首出利物以剛質鋩利苟蹔不砥礪尚與鐵無以異况質柔鋩鈍而又不能砥礪當化為糞土耳又安得與死鐵倫齒耶以此益知人之生於代苟不病盲聾瘖啞則五常之性全性全則豺狼鷰雀亦云異矣而或公然忘棄礪名砥行之道反用狂言放情為事蒙蒙外埃積成垢惡日不覺寤以至於戕正性賊天理生前為造化剩物歿復與灰土俱委此豈不為辜負日月之光景耶吾常覩汝輩趨向爾誠全得天性者况夙能承順嚴訓皆解甘心服食古聖人道知其必非彫缺道義自埋於偷薄之倫者然吾自千名在京城兔魄已十九晦矣知爾輩懼旨甘不繼困於薪粟日丐於他人之門吾聞此益悲此身使爾輩承順供養至此亦益憂爾輩為窮窶而斯須忘其節為苟得眩惑而容易徇於人為投刺牽役而造次惰其業日夜憶念心力全耗且欲書此為戒又慮爾輩年未甚長成不深諭解今會鄂騎歸去遂窴石於書函中乃筆用砥之功以寓往意欲爾輩定持剛質晝夜淬礪使塵埃不得間髮而入為吾守固窮之節慎臨財之苟積習肄之業上不貽庭闈憂次不貽手足病下不貽心意媿欲三者不貽秪在爾砥之而已不關他人若砥之不已則嚮之所謂切金涵星之用又甚瑣屑安足以諭之然吾固欲爾輩常置砥於左右造次顛沛必於是思之亦古人韋絃銘座之義也因書為砥石命以勖爾輩兼刻辭於其側曰劍之鍔砥之而光人之名砥之而揚砥乎砥乎為吾之師乎仲兮季兮無墜吾命乎今年子月月望長安重雪終日玉花攪空舞下散地予與友生喜之因自所居南行百許步登崇岡上青龍寺門門高出絕寰埃宜寫目放抱今之日盡得雪境惟長安多高我不與並日既夕為寺僧道深所留遂引入堂中初夜有皓影入室室中人咸謂雪光射來復開門偶立見沍雲駮盡太虛真氣如帳碧玉有月一輪其大如盤色如銀凝照東方輾碧玉上征不見轍迹至乙夜帖懸天心予喜方雪而望舒復至乃與友生出大門恣視直前終南開千謺屏風張其一方東原接去與藍岩驪巒㣥瓊含光北朝天宮宮中有崇闕洪觀如甃珪謺璐出空橫虛此時定身周目謂六合八極作我虛室峩峩帝城白玉之京覺我五藏出濯清光中俗埃落地塗然寒膠瑩然鮮著徹入骨肉眾骸躍舉若生羽翎與神仙人遊雲天汗漫之上冲然而不知其足猶蹋寺地身猶求世名二三子相視亦不知嚮之從何而來今之從何而遁不諱言不譆聲復根還始認得真性非天借靜象安能輔吾浩然之氣若是邪且冬之時凝沍有之矣若求其上月下雪中零清霜如今夕或寡某以其寡不易會而三者俱白故序之耳王者執生殺之柄造天下使百度順而已矣其或不順與順而不得其度者皆屬於御史府府之動靜為朝廷紀綱之職與百司絕類葢百司坐其署但專局而已矣入於朝與啟事於丞相府亦不出乎其位是以朝罷而各復其司以無事於朝堂與中書也若御史臺每朝會其長總領屬官謁於天子道路誰何之聲達於禁扉至含元殿西廡使朱衣從官傳呼促百官就班遲曉文武臣僚列於兩觀之下使監察御史二人立於東西朝堂甎道以監之鷄人報點監者押百官由通乾觀象入宣政門及班於殿廷前則左右巡使二人分押於鐘鼓樓下若兩班就食於廊下則又分殿中侍御史一人為之使以莅之內謁者承旨喚仗入東西閤門峩冠曳組者皆趨而進分監察御史一人立於紫宸屏下以監其出入爐煙起天子負斧扆聽政自螭首龍墀南屬於文武班則侍御史一人盡得專彈舉不如法者由是吾府之屬得入殿內其職益繁其風益峻故大臣由公相而下皆屏氣竊息注萬目於吾曹吾曹坐南臺則綜覈天下之法立內朝則糾繩千官之失百官有滯疑之事皆就我而質故乘輿所在下馬成府釐朝廷之綱目與坐臺之判决者相半是以御史府故事於中書之南常有理所先時惟中丞得專寓於南舍一院若雜事與左右巡使則寓於西省小胥之廡下遇大朝會時吾屬皆來則分憇於雜事巡使之地既寓於小胥則我實客也每亡事而去則主人必坌而入諠譁狼籍其態萬變向之霜稜盡為涕涶矣豈吾君以天下綱紀屬之於我意耶上元二年侍御史劉儒之作直廳記初拜儀云謝宰相訖向南入直省院候端長又入中書儀云到直省院入門揖端公訖各就房嗚呼以御史之貴重而前時作者之記恬然以直省院為記君子未嘗有非之者神羊之神何其翳而不光耶聖唐大和三年己酉歲天子擢尚書吏部郎中河南宇文公為御史中丞詔下之日不仁者相弔御史府新例知雜事一人中丞得以選於廷臣河南公既拜之日上言請尚書司勳郎中瑯琊王君以自輔識者曰河南瑯琊同心異質之人也心苟同雖堅金可斷於御史乎何有他日雜事果以寓直省院為歎迺議於中丞中丞深樂之即時啟於中丞曰此前日之闕也中丞能革之豈直柏署之光乎實羽衛吾府之多也皆佐其意事得聞於上上曰良有是乎俞其請如響應即詔度支出錢百萬以資焉迺以政事堂直阡之南選地以作之中書之南實天下會計之地不容咫尺之隟非雄重清切之司於此豈容足乎我是以得規制為之焉舊中丞院在西與西院相絕遂以其地易大京兆院合三院為一東西四十六步南北四十步由東為首其一為中丞其二為雜事其三為左右巡使若中丞升為大夫改官不改院若三院畢朝集臺院附於雜事殿察附於巡使其名總號為御史臺中書南院院門北闢以取其嚮朝廷也其製自中書南廊架南北為軒入院門分東西廂為拜揖折旋之地內外皆有廡蟠回詰曲矚之盈盈然梁棟甚宏柱石甚偉椽欒楶稅麗而不華門窗戶牖華而不侈名木脩篁新姿如舊若升綠雲若編青簫以至於几案筆硯簾幌茵榻果籩茗器皆新作也從官胥士役夫馬走勾稽案牘飲食休息之地皆得其所若百官之請事㣥吏之來謁入吾門將祗伺於屏者見吾軒堂階闥之嚴固不俟戒而自肅焉為此者何尊天子也吾府為天子耳目宸居堂陛未有耳目聰明堂陛峻整而天子不尊也天子尊未有姦臣賊子而不滅也姦臣賊子盡滅矣可以自朝廷至於海隅蕩蕩然何所不理哉吾之作豈是志小者近者之心耶謹案高宗天皇大帝作大明宮將二百年矣當時有司經度曾不自思將以待我而作我之所以作葢前補二百年之遺事後貽千萬年之不朽縉紳觀者命為御史北臺聞者謂之知言君子曰移中丞雜事今之心於大柄天下豈有遺事哉某備於寮屬得聞君子之論且承公命其記於是乎書仍題中丞雜事洎三院至主簿官封名氏於其後以為一時之盛事大和四年歲次庚戌八月十六日丁巳記先王建太學法以教國冑子欲敺人歸義府也故設官區掌嚴大其事明公侯卿大夫必由是而出元輿既求售藝於闕下謂今之太學猶古之太學將欲觀焉以自為下士小儒未嘗覩天子庠序欲往時先三日齋沐而後行行及門下脫葢下車循墻而趨請於謁者曰吾欲觀禮於太學將每事問之於子可乎謁者許諾遂前導之初過於朱門門闔沉沉問曰此魯聖人之宮也遂拜之次至於西有高門門中有厦屋問之曰此論堂也予愧非鴻學方論不敢入導者曰此無人乃虛堂爾予惑之遂入見庭廣數畝盡墾為圃矣心益惑復問導者曰此老圃所宅子安得欺我耶導者曰此積年無儒論故庭化為廢地久為官於此者圃之非圃所宅也循廊升堂堂中無机榻有苔草沒地予立其上悽慘滿眼大不稱嚮之意復為導者引又至一門問之曰此國子館也入其門其庭其堂如入論堂俄又歷至三館門問之曰廣文也大學也四門也入其門其庭其堂如國子其生徒去聖人之奧如堂館之蕪嗟乎詩書禮樂國之洪源也濬其源天下可以光潤窒其源天下為之顦顇故唐堯知其如此亦先命廷臣典三禮教冑子誕敷文德於天下天下之屋皆可封及夏殷時其孟也則必能濬之其季也則皆自窒之自窒之時則天下之屋皆可誅至周室有文武周公勃焉而作復唐虞之道行五六百年而付仲尼仲尼承之孜孜日夜席不暇暖祖述之憲章之發揮於鄒魯恢張於洙泗上磨躪三光下垂之無窮其徒有入室者升堂者及門者散滿天下雖丁周季而天下姦臣賊子猶解曰周孔之教不敢妄動以此則文之教豈可須臾弛耶至嬴政犯之窒其源源未絕而已自絕於天下矣漢初纔息干戈復濬其源而伏生公孫宏倪寬卜式之徒並出維持戰爭之漢二百年間無所失墜皆周公仲尼之力也國家用干戈取天下其道正於漢氏及闢儒宮立素王祠設學官命生徒崇盛館宇固亦不下漢氏然自寇生幽陵軍旅之事始勝俎豆故太學之道不得不衰凉今皇帝傳大寶七祀生獻吳濞蜀禪於邸廟梟夏逆首殛潞姦帥拔魏世家比用兩階之舞可謂至矣今溟澥無揚波兵器可以蒙之虎皮矣乃大修周公仲尼之道之時也而太學且猶衰凉之若此豈非有司之不供職耶㣥公卿士之不留意耶不然何使巍巍國庠寂寞不聞回也賜也說繹道義之聲雖館宇雲合鞠為荒圃可謂大國設虛以自欺也愚甚不取且懼周公仲尼之道沒墜於泉遂記其所荒之大畧以諭有司高平公以今皇帝三年春出鎮鄂實澤國地連大別雲夢洞庭穆陵控扼勝勢號為東南巨鎮與江陵會府不侔來臨者苟能惠百姓軍旅必咨怨苟能富軍旅百姓不堪命二德既不易備朝廷亦難其材自高平公為政顓以誠信惠和撫下軍旅受其撫勇知方百姓受其撫恥且格繇春到秋政與稼且成至明年公知民心安軍心雄乃次視閭井城隍有陋狹不快人心者皆開張治本鄂城置在島渚間土勢大凹凸凸者頗險凹者瀦浸不可久宅息不可議制度公命削凸堙凹廓恢閭巷修通衢種嘉樹南北繩直拔瀦浸者升高明湖澤瘴癘勿藥有愈郡城舊制陋屋駢聯自十二㦸南直土地隘塞若人胸次不開將佐序宇次第甚牢落州佐掾署亦牢落公正立㦸間指吏徒拆去陋屋南抵城墉下南面北嚮立射侯軍容佐西翼東嚮立牙門料將院東翼西嚮立州佐六掾院長廊聯軒萬門呀呀中央廣除得以講校戎律班布等列霜㦸洞啟公堂耽耽每至朔望日軍吏畢謁威容大脩有以見堂堂儀觀不可觸犯也然後知皇唐諸侯王之為貴耶鄂之軍實三萬先時營宇皆曲陋低下歲有墊溺師徒患之公心亦患之引車出郡壘東門之外良地伏在莽下公自得心識手開畫之創新營凡一十五所合三千間瓦鱗鱗檐盈盈軒門對開欱呀風雷若有神物借助其功觀人駭目目不前見居人廬舍先不如法者皆自我如法肯與瑣瑣胸臆經營細碎不副大君委重柄之意者齊肩乎則知公之為政不專於鄂枝郡亦猶鄂復明年巡封略問遐邇一若門門有公猶疑將校僚吏卒伍元元咸不勝公惠熙熙相賀自謂長庇公德宇下道路合聲王人中貴聞政聲到闕下天子聞至五年冬十二月下詔徵公尹河南河洛人賀聲動河洛江漢人唁聲動江漢天子又聞二地人賀唁聲愈知公仁深不三月復遷公福上黨上黨父老喜躍攜壺漿簟食逾太行迎太行素險巇鄂人聞上黨父老迎我公過太行去若火入腸臟相與自相尤曰我曹皆公庇蔭貽惠父母生我公實活我今公去郡恨無史氏記不書我公德不光照本邦是我曹負公也非公負我曹也胡不率大宣聲音詠思我遺愛使隘衢陋巷幾採教化者聞必寓於風雅立疑則天子史官得詳載史策遺愛遺惠豈謝古人耶是心愈見公德如卿雲景星所出必為國瑞所至必為人福不顓在一方而已某聲名陋小未縻人爵不敢擅斷石懼累公德但直錄鄂人詠思之言將上告天子史官厭塞鄂人望若河南遺愛洛多君子因以為民疑詳矣上黨新政方大未可測酌非陋文裦述也四明山道士葉沈囊出古畫畫有桃源圖圖上有谿谿名武陵之源按仙記分靈洞三十六之一支其水趣流勢與江河同有深而綠淺而白白者激石綠者落鏡溪南北有山山如屏形接連而去峯竪不險翠穠不浮其夾岸有樹木千萬本列立如揖丹色鮮如霞擢舉欲動燦若舒顏山鋪水底草散茵毯有鸞青其衿有鶴丹其頂有鷄玉其羽有狗金其色毛傞傞亭亭間而立者十有八九岸而北有曲深嵓門細露室宇霞檻繚轉雲磴五色雪冰肌顏服身衣裳皆負星月文章岸而南有五人服貌肖虹玉左右有書童玉女角髮而侍立者十二視其意况皆逍遙飛動若雲十許片油焉而生忽焉而往其高處有壇層級沓玉冰壇面俄起燼竈竈口含火上有雲氣具備五色中有溪艇泛上一人雪華鬢眉身著秦時衣服手皷短枻意狀深遠合而視之大略山勢高水容深人貌魁奇鶴情閑暇煙嵐草木如帶香氣熟得詳翫自覺骨戛清玉如身入鏡中不似在人寰間然有高謝之志從中來坐少選道士卷畫而藏之若身形却落塵土中視嚮所張壁上又疑有頑石化出塞斷道路某見畫物不甚寡如此圖未嘗到眼是知工之精而有如是者邪葉君且自珍重無路得請遂染筆錄其名數將所以備異日寫畫之不謬也剡淡上綿四五百里多古藤株枿逼土雖春入土脈他植發活獨古藤氣候不覺絕盡生意予以為本乎地者春到必動此藤亦本於地方春且有死色遂問溪上人有道者言溪中多紙工刀斧斬伐無時擘剝皮肌以給其業噫藤雖植物者溫而榮寒而枯養而生殘而死亦將似有命於天地間今為紙工斬伐不得發生是天地氣力為人中傷致一物疵癘之若此異日過數十百郡洎東雒西雍歷見言書文者皆以剡紙相夸乃寤曩見剡藤之死職正由此此過固不在紙工且今九牧士人自專言能見文章戶牖者其數與麻竹相多聽其語其自重皆不啻掘驪龍珠雖苟有曉寤者其論甚寡不勝眾者亦皆斂手無語勝眾者果自謂天下之文章歸我遂輕傲聖人道使周南召南風骨折入於折揚皇荂中言偃卜子夏文學陷入於淫靡放蕩中比肩握管動盈數千百人數千百人下筆動數千萬言不知其為謬誤日日以縱自然殘籐命易甚桑葉波浪頹沓未見其止如此則綺文妄言輩誰非書剡紙者耶紙工嗜利曉夜斬籐以鬻之雖舉天下為剡溪猶不足以給况一剡溪者耶以此恐後之日不復有籐生於剡矣大抵人間費用苟得著其理則不枉之道在則暴耗之過莫由橫及於物物之資人亦有其時時其斬伐不為夭閼予謂今之錯為文者皆夭閼剡溪籐之流也籐生有涯而錯為文者無涯無涯之損物不直於剡籐而已予所以取剡籐以寄其悲野禽獸可馴養而有裨於人者吾得之於狸狸之性憎鼠而喜愛其體趫其文斑予愛其能息鼠竊近乎正且勇嘗觀虞人有生致者因得請歸致新昌里客舍舍之初未為某居時曾為富家廩墉堵地面甚足鼠竅穴之口光滑日有鼠絡繹然某既居果遭其暴耗常白日為㣥雖敲拍叱嚇略不畏忌或蹔黽侻跧縮須臾復來日數十度其穿巾孔箱之患繼晷而有晝或出遊及歸其什器服物悉已破碎若夜時長留缸續晨與役夫更吻驅呵甚擾神抱有時或缸死睫交黑暗中又遭其緣榻過面泊泊上下則不可奈何或知之借櫝以收拾衣服未頃則櫝又孔矣予心深悶當其意欲掘地誅翦始二三十日間未果頗患之若抱癢疾自獲此狸嘗闔關實竇縱於室中潛伺之見軒首引鼻似得鼠氣則凝蹲不動斯須果有鼠數十輩接尾而出狸忽躍起監瞳迸金文毛磔班張爪呀牙劃洩怒聲鼠黨帖伏不敢竄狸遂搏擊或目抉牙截尾捎首擺瞬視間㣥鼠肝腦塗地迨夜始背缸潛窺室內洒然予以是益寶狸矣常自馴飼之到今僅半年矣狸不復殺鼠鼠不復出穴穴口有土蟲絲封閉欲合嚮之韞櫝服物皆縱橫拋擲無所損壞噫微狸鼠不獨耗吾物亦將咬嚙吾身矣是以知吾得高枕坦臥絕瘡痏之憂皆斯狸之功異乎鼠本統乎陰蟲其用合晝伏夕動常怯怕人者也向之暴耗非有大膽壯力能凌侮於人以其人無禦之之術故得恣橫若此今人之家苟無狸之用則紅墉皓壁固為鼠室宅矣甘醲鮮肥又資鼠口腹矣雖乏人智其奈之何嗚呼覆幬之間首圓足方竊盜聖人之教甚於鼠者有之矣若時不容端人則白日之下故得騁於陰私故桀朝鼠多而關龍逢斬紂朝鼠多而王子比干剖魯國鼠多而仲尼去楚國鼠多而屈原沈以此推之明小人道長而不知用君子以正之猶嚮之鼠竊而不知用狸而止遏縱其暴橫則五行七躍亦必反常於天矣豈直流患於人間耶某因養狸而得其道故備錄始末貯諸篋內異日持諭於在位之端正君子寂寞間有至音注梧桐中越客沈虬子耳長木音常斧樹之良孫斲而琴之予客越見其方風釿取樸成輒叫索清濁應刃濁授授成輪圓濁沛雪落清聲酬答若寒玉透水噴出瓏及察投意之始放心虛無間猶掌握無毛倫他人見樸在刃下而沈氏成琴入眼中不知釿之數到邪琴之形化邪兩肩聳張若對古人雙池呀開若挹澄渟絕刃四顧得色上面旁眎或懵其所以為沈生乃絃素絲七條其上備指一弄五聲叢鳴鳴中有靈峰橫空鳴泉出雲鳳龍騰凌鶴哀烏啼松吟風悲予聆之初聞聲入耳覺毛骨聳擢中見鏡在眼覺精爽沖動終然睹化源寥寥貫到心靈則百骸七竅仙仙而忘覺神立寥廓上洞見天地初氣駕肩太古濶視區外乃知不知音聲者終身為朧朦嘻木纔滿數尺絲不盈十條古聖人欲其中含天音天之如此直乃叩之以觀化本且絲木俱無情物也固不能自鳴是使歷代知其必鳴之稀以至爨入鼎下枯折空山而不聞者非一也今人明明以聲耳耳且惑况槁木無朕而責其必無惑邪予於此見沈氏子之審音也之運釿也俱與神遇懼異日斯琴流於人間為他者亂類則沈氏之道為委土矣故志之秦丞相斯變蒼頡籀文為玉筯篆體尚太古謂古若無人當時議書者皆輸伏之故拔乎能成一家法式歷兩漢三國至隋氏更八姓無有出其右者嗚呼天意謂篆之道不可以終絕故受之以趙郡李氏子陽冰陽冰生皇唐開元天子時不聞外獎躬入篆室獨能隔一千年而與秦斯相見可謂能不孤天意矣當時得議書者亦皆輸伏之且謂之其格峻其力猛其功備光大於秦斯有倍矣此直見上天以字寶瑞吾唐矣不然何綿更姓氏而寂寞無人某道不工篆而識其點畫常有意求秦丞相真跡會秦丞相去久聞其有八字刻在荊玉有洪碑樹嶧山嶺今荊璧為璽飛上天矣固不可得而見也洪碑留在人間往往有好事者躋巔得見某亦常問得去嶧山道路異日將裹足觀之未去間行長安會同里客有得陽冰真跡遺在六幅素上者遂請歸客堂張之見蟲蝕鳥步痕跡若屈鐵石陷入屋壁霜晝照著疑龍蛇駭解鱗甲活動皆欲飛去齊目眎之分明覩文字之根植吾堂中然後知向之議者謂冰愈於斯吾雖未登嶧山觀此可以信其為深於篆者之言也試以手拂拭其煙顏塵容侵暴日久攝芻坼裂玉筯欲折予以褻慢讓其主主曰此易致耳豈當其如是愛邪予曰今世人所以重秦斯之跡非能盡辨別之以其秦古矣斯邈矣向使秦斯與子比肩子能貴之乎曩吾尚欲苦辛登嶧山之巔縮在子掌握中今且猶不為子貴子不過生於唐而得與冰同為唐人吾知冰歿二三十年其蹤跡流於人間固不甚少得為子目數見故易之若此使冰生於秦時予又安得使造次而見遺塵邪是子賤目也世人皆然嗟吁冰既即世是字寶入地矣後人思孜孜求之今且遭不知者忽易想生筆下日有新跡固為門戶見覩之物矣冰雖欲求沽售不獨棄為糞土必遭其詬怒也主聞之其媿色見於顏眉間欲卷而退知其退也必因循而不信彊止留之引筆書其志行下以保明其為字寶也不謬詞曰斯去千年冰生唐時冰復去矣後來者誰後千年有人誰能待之後千年無人篆止於斯嗚呼主人為吾寶之官寺有九而鴻臚其一取其實而往來也臚者傳也傳異方之賓禮儀與其言語也寺也者府署之別號也古者開其府署其官將以禮待異域賓客之地竺乾之教葢西土絕徼者也自漢氏夢有人如金色之降其流來東吾之鴻臚待西賓一支特異於三方厥後斯來委於吾土吾人仰之如神明焉伏之如風草焉至有思覿厥貌若盼然如見者則取其書按其云云之文鎔金琢玉刻木扶土運毫合色而彊擬其形容構厦而貯之猶波之委於瀆瀆之注於溟晝夜何曾知停息之時其如是非官寺之一而能容焉故釋寺之作由官也其非九而能拘也其制度非臺門旅樹而能節也故十族之鄉百家之閭必有浮圖為其粉黛國朝㳂近古而有加焉亦容雜夷而來者有摩尼焉大秦焉祆神焉合天下三夷寺不足當吾釋寺一小邑之數也其所以知西人之教能蹴踏中土而內視諸夷也及其繁也學徒如林金貝如山故文昌宮祠擘局而司之東西都命貴人分衢而使之商其略猶天文隸於河漢而莫之極也非名無以別之乃隨事而出焉有見天地符祥而稱之者有取山川秀絕而號之者語其額而名可知也重嵓之作葢山川秀絕之地統江夏之永興寶應元年秋七月自天有命而升於文昌宮之春官藉考其地有重嵓峽焉故命寺乞此名以大歷十三年遷縣於長慶鄉寺亦與遷貞元八年縣又遷之長樂深口寺亦隨動今之地直縣之坎三百六十步有邑人葉望者心存於金色人不待布金而出其地以奉之輪廣二百畝右肘於熊耳左腋於覆盆連岡伏其背深湖朝其嚮擁抱之勝盡在其土有僧曰謙曰諷手開榛蕪亶而立困章遺其恨於後焉長慶三年春三月上座僧良鑒沙門器有公識為其徒所推乃執柄結搆主廢興為己任寺以利堅沙門與都維那道援志力是俱物無橫議邑俗之倫以貨來資者如官司驅焉至明年春三月星一周而新功成樹宇之為殿者其間五扶土而為像者其形七帳之飾寶者如殿間焉乃鑿門而三張翼而廊殿陰有北方挂金革天神之官東北有禪氏七代祖沙門棲心之室也凡二十四曲突而能庖築堂而會食拓庭而寬植木而陰河山參差金碧相錯捨舟車而極其心相者宜化成焉嗚呼域外之教而入於域中如此而大邪人謂沙門之無才吾不信也良鑒既以力之辛勤而就亦欲其事流之於異時乃買武昌石琢磨為碑自永興錄其狀訴授於余因摭其狀而書之復紀以銘銘曰重嵓重嵓無峽無友釋官斯闡上矗星斗虹霓梁棟日月戶牖金相凝凝煙水奔走雷飇箭雨溟濛不朽磔然之石附地之厚刻其成功垂耀於後常母之道恩勝威威不勝而常子之性偏以驕出由此也偏氣襲正正氣敗績故往往恩過驕過而閨門間有觸命觝教磨去法用者相半古孟氏母警戒若此乃首以兼教軻三變而至於道去千年而陶之母亦以兼教侃侃還至於道慈容嚴嚴離立相望中央寂寥希吾或稀太歲在卯予帆彭蠡見謝靈運詩石壁壁東南行百步許有高墳嵯峨墳前有碑書跡照湖小子蹶起疾眩視之則陶母之字存及落帆上陸修式恪禮以為父母教子大倫不逃義方然父之教主於兼之言恩威不偏勝偏失者或骨髓間有秦吳之謬故州吁石厚變為賊敵非父子邪且母之教偏在慈夫以兼教猶有嚮者之謬以偏教而無嚮者之謬或鮮矣英英哲母煦然化成成之中而能敺其子歸其有極是以陶家肥而晉家亦肥鴻聲芬馥撲染他類肯使專司晨索家之疵到吾聽乎嗚呼賢母之風可以卓往赫來為千萬年光墳版不書豈斯意邪徘徊聳慕龔成斯文詞曰彭蠡之濱峨峨高墳有晉陶君哲太夫人前瞻千年卜孟為隣後千萬年卜誰為隣西江悠悠東湖滔滔彭蠡有竭斯墳更高
