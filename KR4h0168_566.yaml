front:
  text: 全唐文欽定全唐文卷五百六十六韓愈二十
  hash: sha256:dbb4d780af96a54f43d95e30a338e22696c8b2d8d7d2348de1267a330834bce0
body:
  text: 君諱洪字濬川其先姓烏石蘭九代祖猛始從拓跋氏入夏居河南遂去烏與蘭獨姓石氏而官號大司空後七世至行裦官至易州刺史於君為曾祖易州生婺州金華令諱懷一卒葬洛陽北山金華生君之考諱平為太子家令葬金華墓東而尚書水部郎劉復為之銘君生七年喪其母九年而喪其父能力學行去黃州錄事參軍則不仕而退處東都洛上十餘年行益修學益進交游益附聲號聞四海故相國鄭公餘慶畱守東都上言洪可付史筆李建拜御史崔周禎為補闕皆舉以讓宣歙池之使與浙東使交牒署君從事河陽節度烏大夫重允閒以幣先走廬下故為河陽得佐河陽軍吏治民寬考功奏從事考君獨於天下為第一元和六年詔下河南徵拜京兆昭應尉校理集賢御書明年六月甲午疾卒年四十二娶彭城劉氏女故相國晏之兄孫生男二人八歲曰壬四歲曰申女子二人顧言曰葬死所七月甲申葬萬年白鹿原既病謂其游韓愈曰子以吾銘銘曰生之艱成之又艱若有以為而止於斯公諱丹字某姓韋氏六世祖孝寬仕周有功以公開號於鄖鄖公之子孫世為大官惟公之父政卒雒縣丞贈虢州刺史公既孤以甥孫從太師魯公真卿學太師愛之舉明經第選授峽州遠安令以讓其庶兄入紫閣山事從父熊通五經登科歷校書郎咸陽尉佐邠寧軍自監察御史為殿中侍御史徵拜太子舍人益有名遷起居郎吳少誠襲許州拜河陽行軍司馬未行少誠死改駕部員外郎新羅國君死公以司封郎中兼御史中丞紫衣金魚往弔立其嗣故事使外國者常賜州縣官十員使以名上以便其私號私覿官公將行曰吾天子吏使海外國不足於資宜上請安有賣官以受錢耶即具疏所以上以為賢命有司與其費至鄆州會新羅告所當立君死還拜容州刺史容管經畧招討使始城容州周十三里置屯田二十四所化大行詔加太中大夫順宗嗣位拜河南少尹行未至拜鄭滑行軍司馬始至襄陽詔拜諫議大夫既至日言事不阿權臣謇然有直名遂號為才臣劉闢反圍梓州詔以公為東川節度使御史大夫公行至漢中上疏言梓州在圍閒守方盡力不可易將徵還入議蜀事劉闢去梓州因以梓州讓高崇文拜晉慈隰等州觀察防禦使自扶風縣男進封武陽郡開國公食邑二千戶將行上言臣所治三州非要害地不足張職為國家費不如屬之河東便上以為忠一歲拜洪州刺史江南西道觀察使以晉慈隰屬河東公既至則計口受俸錢委其餘於官罷八州無事之食者以聚其財始教人為瓦屋取材於山召陶工教人陶聚材瓦於場度其費以為估不取贏利凡取材瓦於官業定而受其償從令者免其賦之半逃未復者官與為之貧不能者畀之財載食與漿親往勸之為瓦屋萬三千七百為重屋四千七百民無火憂暑濕則乘其高別命置南北市營諸軍歲旱種不入土募人就工厚與之直而給其食業成人不病饑為長衢南北夾兩營東西七里人去渫汚氣益蘇復作南昌縣徙廄於高地因其廢倉大屋馬以不連死明年築隄捍江長十二里疏為斗門以走潦水公去位之明年江水平隄老幼泣而思曰無此隄吾屍其流入海矣灌陂塘五百九十八得田萬二千頃凡為民去害興利若嗜慾居三年於江西八州無遺便其大如是其細可畧也卒有違令當死者公不果於誅杖而遣之去上書告公所為不法若干條朝廷方勇於治且以為公名才能臣治功聞天下不辯則受垢詔罷官畱江西待辯使未至月餘公以疾薨使至辯凡卒所告事若干條皆無絲毫實詔笞卒百流嶺南公能益明春秋五十八薨於元和五年八月六日公好施與家無剩財自校書郎至為觀察使擁吏卒前走七州刺史與賓客處如布衣時自持卑一不易娶清河崔氏故支江令諷之女某官某之孫有子曰寘年十五明經及第嗣其家業後夫人蘭陵蕭氏中書令華之孫殿中侍御史恒之女皆先公終有女一人凡公男若干人女若干人明年七月壬寅從葬萬年縣少陵原將葬其從事東平呂宗禮與其子寘謀曰我公宜得直而不華者銘傳於後固不朽矣寘來請銘銘曰武陽受業始於太師以官讓兄自待不疑勤於紫閣取益以卑可謂有源卒用無疵慊慊為人矯矯為官爰及江西功德具完名聲之下獨處為難辯而益明仇者所歎碑於墓前維昭美故納銘墓中以識公墓畢氏出東平歷漢魏晉宋齊梁陳士大夫不絕入國朝有為司衞少卿貝邢廬許州刺史者曰憬憬之子構累官至吏部尚書卒贈黃門監是為景公景公生抗為廣平太守抗安祿山城陷覆其宗贈戶部尚書尚書生坰家破時坰生始四歲與其弟增以俱小漏名籍得不誅為賞口賊中寶應二年河北平宗人宏以家財贖出之求增不得增長為河北從事兼官至御史中丞坰既至長安宏養於家教讀書明經第宏死坰益壯始自別為畢氏歷尉臨渙安邑王屋年六十一以元和六年二月二日卒於官初罷臨渙徐州節度張建封慕廣平之節死聞君篤行能官請相見署諸從事攝符離令四年及尉王屋徐之從事有為河南尹者聞君當來喜謂人曰河南庫歲入錢以千計者五六十萬須謹廉吏今畢侯來吾濟矣繼數尹諸署於府者無不變而畢侯固如初竟以其職死君睦親善事過客未嘗問有無既卒家無一錢凡棺與墓事皆同官與相識者事之娶清河張氏女生男四人曰鎬鉟銶銳女子三人其長學浮屠法為比邱尼其季二人未嫁以其月二十五日從葬偃師之土婁銘曰上古愛民為官求人苟可以任位加其身其後喜權人自求官退而緩者身後人先故廣平死節而子不荷其澤王屋謹廉而神不福其謙嗚呼天與人苟無傷其穴與墳胡之氏別於陳明允先河東人世勤固戴厥身籍文譜進連倫惟明允加武資力牛虎柔不持吏夏陽有施為去平陽民思悲河東土河陸原宜茲人肖後昆五十七不足年孤兒啼死下官母弟証秩大夫摭君遺哭泣書友韓愈司馬徒作後銘系序初范陽盧行將葬其父母乞銘於職方員外郎韓愈曰吾先世世載族姓書吾冑於拓跋氏之宏農守守後四代吾祖也為沂錄事參軍五世而吾父也為襄陽丞始吾父自曹之南華尉歷萬年縣尉至襄陽丞以材任煩能持廉名去襄陽則署鹽鐵府出入十年常最其列貞元十三年終其家年六十七殯河南河陰吾母燉煌張氏也王父瓘為亠兊之金鄉令先君歿十三年而夫人終年七十三從殯河陰生子男三人居金吾兵曹行則吾其次也大理主簿佐江西軍其幼可久女子嫁浮梁尉崔叔寶將以今年十月自河陰啟葬汝之臨汝之汝原吾曰陰陽星歷近世儒莫學獨行以其力餘學能名一世舍而從事於人以材稱葬其父母乞銘以圖長存是真能子矣可銘也遂以銘宏農諱懷仁沂諱璬襄陽諱某今年實元和六年君諱蕃字陳師其先楚之族大夫亡晉而邑於苗世遂以苗命氏其後有守上黨者惠於民卒遂家壺關曾大父延嗣中書舍人大父含液舉進士第官卒河南法曹父穎揚州錄事參軍君少喪父受業母夫人舉進士第佐江西使有勞三年使卒後辟不肯畱獨護其喪葬河南選補太原參軍假使職獄平貨滋息吏斂手不敢為非年四十有二元和二年六月辛巳暴病卒其妻清河張氏以其年十二月丙寅葬君於洛陽平陰之原男三人執規執矩必復其季生君卒之三月君同生昆弟姊凡三人皆先死四室之孤男女凡二十人皆幼遺資無十金無田無宮以為歸無族親朋友以為依也天將以是安施耶銘曰有行以為本有文以為華恭以事其職而勤以嗣其家位卑而無年吁其奈何昭義節度盧從史有賢佐曰孔君諱戡字君勝從史為不法君陰爭不從則於會肆言以折之從史羞面頸發赤抑首伏氣不敢出一語以對立為君更令改章辭者前後累數十坐則與從史說古今君臣父子道順則受成福逆輒危辱誅死曰公當為彼不得為此從史常聳聽喘汗居五六歲益驕有悖語君爭無改悔色則悉引從事空一府往爭之從史雖羞退益甚君泣語其徒曰吾所為止於是不能以有加矣遂以疾辭去臥東都之城東酒食伎樂之燕不與當是時天下以為賢論士之宜在天子左右者皆曰孔君孔君云會宰相李公鎮揚州首奏起君君猶臥不應從史讀詔曰是故舍我而從人耶即誣奏君前在軍有某事上曰吾知之矣奏三上乃除君衞尉丞分司東都詔始下門下給事中呂元膺封還詔書上使謂呂君曰吾豈不知戡也行用之矣明年元和五年正月將浴臨汝之湯泉壬子至其縣食遂卒年五十七公卿大夫士相弔於朝處士相弔於家君卒之九十六日詔縛從史送闕下數以違命流於日南遂詔贈君尚書司勳員外郎蓋用嘗欲以命君者信其志其年八月甲申從葬河南河陰之廣武原君於為義若嗜欲勇不顧前後於利與祿則畏避退處如怯夫然始舉進士第自金吾衞錄事為大理評事佐昭義軍軍帥死從史自其軍諸將代為帥請君曰從史起此軍行伍中凡在幕府惟公無分寸私公苟畱惟公之所欲為君不得已畱一歲再奏自監察御史至殿中侍御史從史初聽用其言得不敗後不聽信惡益聞君棄去遂敗祖某某官贈某官父某某官贈某官君始娶宏農楊氏女卒又娶其舅宋州刺史京兆韋屺女皆有婦道凡生一男四女皆幼前夫人從葬舅姑兆次卜人曰今茲歲未可以祔從卜人言不祔君母兄戣尚書兵部員外郎母弟戢殿中侍御史以文行稱朝廷將葬以韋夫人之弟前進士楚材之狀授愈曰請為銘銘曰允義孔君茲惟其藏更千萬年無敢壞傷杜氏自戴侯畿始分戴侯之子恕為幽州刺史今居京兆諸杜其後也其季寬孝廉郎中寬後三世曼為河東太守葬其父洹水之陽其後世皆從葬洹水及正倫為太宗宰相猶封襄陽公太宗始詔葬京兆襄陽公無子以兄正藏子志靜後遂嗣襄陽公生僑為懷州長史棄官老沁水上為富家卒葬懷州武陟長史生損為左司郎中卒贈少大理大理生廙為鄭州錄事參軍死思明亂贈吏部郎中公諱兼字某郎中第三子舉進士第司徒北平王燧戰河北掌書記累官至監察御史其後佐徐泗州軍遂至濠州刺史徐泗州軍亂以兵甲三千人防淮道不絕有功加御史中丞賜紫衣金魚入為刑部郎中以能官拜蘇州刺史既辤行上書曰李錡且反必且奏族臣上固愛其才書奏即除吏部郎中遂為給事中出為商州刺史金商防禦使改河南少尹行大尹事半歲拜大尹元和四年十一月二十二日無疾暴薨年六十明年二月甲午從葬懷州夫人常山郡君張氏彭州刺史贈禮部侍郎蔇之女生子男三人柔立為天長主簿詞立為壽州參軍誼立為順宗挽郎女一人將葬公之母兄太學博士冀與公之夫人及子男女謀曰葬宜有銘凡與吾弟游而有文者誰乎遂來請銘銘曰杜氏大家世有顯人承繼綿綿以及公身始為進士乃篤朋友及作大官克施克守纂辭奮筆渙若不思公牒盈前笑語指麾祿以給求食以會同不畜不收庫廏虛空事在於人日遠日忘何以傳之刻此銘章李觀字元賓其先隴西人也始來自江之東年二十四舉進士三年登上第又舉博學宏詞得太子校書又一年年二十九客死於京師既斂之三日友人博陵崔宏禮葬之於國東門之外七里鄉曰慶義原曰嵩原友人韓愈書石以誌之辭曰已虖元賓壽也者吾不知其所慕夭也者吾不知其所惡生而不淑孰謂其壽死而不朽孰謂之夭已虖元賓才高乎當世而行出乎古人已虖元賓竟何為哉竟何為哉君諱翰字叔清博陵安平人曾大父知道仕至大理司直大父元同為刑部侍郎出刺徐相州父倚舉進士天寶之亂隱居而終君既喪厥父攜扶孤老託於大江之南卒喪通儒書作五字句詩敦行孝悌詼諧縱謔卓詭不羈又善飲酒江南人士多從之游貞元八年君生四十七年矣自江南應節度使王栖曜命於鄜州既至表授右衞冑曹參軍實參幕府事直道正言補益宏多既去職遂家於汝州汝州刺史吳郡陸長源引為防禦判官表授試大理評事十二年相國隴西公作藩汴州而吳郡為軍司馬隴西公以為吳郡之從則賢也署為觀察巡官實掌軍田鑿澮溝斬茭茅為陸田千二百頃水田五百頃連歲大穰軍食以饒幕府以其功狀聞使者未復命以十五年正月五日寢疾終於家年五十有六矣隴西公賻贈有加自始有疾吳郡率幕府寮屬日一至其廬問焉其既甚也日再往問焉其終也往哭焉比小斂大斂三哭焉於斂之二十一日其妻與其子以君之喪旋葬於汝州其二月某日遂葬於某縣某鄉某原君內仁九族外盡賓客於其所止其來如歸苟親矣雖不肖收之如賢苟賢矣雖貧賤待之如貴人是故其歿也其弔者與其哭者其聲也必哀盡焉妻鄭氏也有子二人女一人吾聞位不稱德者有後嗚呼君其終有後乎銘曰朝之言嘻嘻夕之言怡怡偕入而出乘馬馳一日不見而死吁其悲貞元十八年十月十一日太學博士施先生士丐卒其寮太原郭伉買石誌其墓昌黎韓愈為之辭曰先生明毛鄭詩通春秋左氏傳善講說朝之賢士大夫從而執經考疑者繼於門太學生習毛鄭詩春秋左氏傳者皆其弟子貴游之子弟時先生之說二經來太學帖帖坐諸生下恐不卒得聞先生死二經生喪其師仕於學者亡其朋故自賢士大夫老師宿儒新進小生聞先生之死哭泣相弔歸衣服貨財先生年六十九在太學者十九年由四門助教為太學助教由助教為博士太學秩滿當去諸生輒拜疏乞畱或畱或遷凡十九年不離太學祖曰旭袁州宜春尉父曰婼豪州定遠丞妻曰太原王氏先先生卒子曰友直明州鄮縣主簿曰友諒太廟齋郎系曰先生之祖氏自施父其後施常事孔子以彰讎為博士延為太尉太尉之孫始為吳人曰然曰續亦載其跡先生之興公車是召纂序前聞於光有曜古聖人言其旨密微箋注紛羅顛倒是非聞先生講論如客得歸卑讓肫肫出言孔揚今其死矣誰嗣為宗縣曰萬年原曰神禾高四尺者先生墓耶愈之宗兄故起居舍人君以道德文學伏一世其友四人其一范陽盧君東美少未出仕皆在江淮閒天下大夫士謂之四夔其義以為道可與古之夔皋者侔故云爾或曰夔嘗為相世謂相夔四人者雖處而未仕天下許以為相故云大歷初御史大夫李栖筠由工部侍郎為浙西觀察使當是時中國新去亂士多避處江淮閒嘗為顯官得名聲以老故自任者以千百數大夫莫之取獨晨衣朝服從騎吏入下里舍請盧君君時始任戴冠通詩書與其㣥日講說周公孔子以相磨礱浸灌婆娑嬉游未有捨所為為人意既起從大夫天下未知君者惟奇大夫之取人也不常必得人其知君者謂君之從人也非其常守必得其從其後為太常博士監察御史河南府司錄考功員外郎年若干而終在官舉其職夫人李姓隴西人君在配君子無違德君歿訓子女得母道甚後君二十年年六十六而終將合葬其子暢命其孫立曰乃祖德烈靡不聞然其詳而信者宜莫若吾先人之友先人之友無在者起居丈有季曰愈能為古文業其家是必能道吾父事業汝其往請銘焉立於是奉其父命奔走來告愈謂立曰子來宜也行不可一二舉且我之生也後不與而祖接不得詳也其大者莫若眾所與觀所與眾寡茲可以審其德矣乃祖未出而處也天下大夫士以為與古之夔皋者侔且可以為相其德不既大矣乎講說周公孔子樂其道不樂從事於俗得所從不擇內外奮而起其進退不既合於義乎銘如是可以示於今與後也歟立拜手曰唯唯君祖子輿濮州濮陽令父同舒州望江令夫人之祖延宗鄆州司馬父進成鄜州洛交令男三人暢申易女三人皆嫁為士人妻墓在河南緱氏縣梁國之原其年月日元和二年二月十日云女挐韓愈退之第四女也慧而早死愈之為少秋官言佛夷鬼其法亂治梁武事之卒有侯景之敗可一埽刮絕去不宜使爛漫天子謂其言不祥斥之潮州漢南海揭陽之地愈既行有司以罪人家不可畱京師迫遣之女挐年十二病在席既驚痛與其父訣又輿致走道撼頓失食飲節死於商南層峯驛即瘞道南山下五年愈為京兆始令子弟與其姆易棺衾歸女挐之骨於河南之河陽韓氏墓葬之女挐死當元和十四年二月二日其發而歸在長慶三年十月之四日其葬在十一月之十一日銘曰汝宗葬於是汝安歸之惟永寧
