front:
  text: 全唐文欽定全唐文卷五十四德宗五
  hash: sha256:224b9c07744db52fea035fb0f85c405beedadf387a39967a3fdcb6697481330f
body:
  text: 朕聞致理之君克勤於德不貴遠物所寶惟賢故堯設茅茨禹卑宮室光武捨去寶劍順帝封還大珠朕以眇身獲守丕業仰止前王之德思齊太素之風未嘗緣情於服玩措意於珠玉庶乎捐金抵璧返朴還淳雍州所奉金坑誠為潤國語人以利非朕素懷方以不貪為寶惟德其物豈尚茲難得之貨生其可欲之心耶其金坑宜委康澤差擇清強官專勾當任貧下百姓採劚不得令酋豪及官吏影占侵擾聞奏當重科貶俾夫俗臻富壽人識廉隅副朕意也內外文武官職田及公廨田準式州縣每年六月三十日勘造白簿申省與諸司文解勘會至十月三十日徵收給付本官近來不守常規多不申報給付之際先付清望要官其間慢卑官即被延引不付自今後準式各令送付本官又準式職田黃籍每三年一造自天寶九載以後更不造籍宜各委州縣每年差專知官巡覆仍造簿依限申交所司不得隱漏及妄破蒿荒如有違犯專知官及本典準法科罪春秋有五色之統蓋王者踰年建號體元居正上以繼業反始下以書事布策示不忍有變於中年也朕以不造銜恤在疚而三事大夫迫至公之命喻大孝之道實奪豫哀為衆所戴恐墜祖宗之遺烈不若先帝之前訓如履薄將陷如乘奔失御濡露之感忽焉歲初罔極之懷瞻天靡及舊物未改常典惟新勉而從之良增感奉其以大歷十五年改為建中元年所司準式庶協履端於始載符皇極之義也亂常干紀罪莫大焉除惡去邪刑其無捨忠州刺史劉晏性本姦回志惟凶慝頃司邦賦歷踐朝倫剝削為功毒痡黎庶按問贓賄不知紀極朕將崇政本必去憸人猶是含垢務全大體俾從降黜尚列藩侯黷亂之辜掩而不問旋乃結聚亡命擅興師徒罔有悛心力行非度播於人聽惡迹彰聞爰命連率究實其罪而搜兵補卒遍於鄉閭執鋭披堅出於郊境拒捍朝旨威脅使臣人之無良一至於此孽由自作法所不容正其典刑以懲姦蠹宜賜自盡仍令庾準差官勾當處置聞奏夫常平者常使榖價如一大豐不為之減大儉不為之加雖遇災荒人無菜色自今巳後忽米價貴時宜量出官米十萬石麥十萬石每日量付兩市行人下價糴貨典掌王言潤色鴻業必資純懿之行以彰課最之績久更其職用得其才朝議郎行尚書司勳員外郎知制誥朱巨川學綜墳史文含風雅貞廉可以勵俗通敏可以成務自司綸翰屢變星霜酌而不竭時謂無對今六官是總百度惟貞才識兼求爾其稱職膺一獎拔是用正名光我禁垣實在斯舉可守中書舍人散官如故王者體至公而立極申明賞以垂法旌德表善發揮忠貞其有推丹誠以奉君臨大節而不奪守志明節殺身定難則褒勸之典所宜優異李希烈背天逆物通結羣盜姦謀藏於汴宋罪迹彰於汝鄭傾陷城邑虐毒蒸黎忠義之徒因懷感激故淮寧軍節度都虞正議大夫試大理卿兼許州別駕占闕兼御史大夫上柱國政和郡王食實封一百戶周曾忿姦邪之亂紀處危逼而思正陰建明義叶誅元凶遂與故許州都督鎮遏兵馬使同淮寧軍節度副使開府儀同三司賜太常卿兼御史中丞上柱國定州郡王食實封五十戶王玢故淮寧軍節度左廂兵馬使兼十將開府儀同三司賜太常卿兼潞州長史占闕兼御史中丞上柱國常林郡王食實封五十戶呂從賁故十將輔國大將軍行右金吾大將軍員外置同正員兼賜太常卿上柱國合浦郡王食實封五十戶康秀琳故節度監押衙宣德郎監察御史裏行賜緋魚袋姚憺故十將銀青光祿大夫賜太子賓客上柱國梁興朝故十將開府儀同三司太常卿河東縣開國伯賈樂卿故輔國大將軍員外置同正員兼賜太常卿侯仙欽等誓心定志潛結忠謀將臨汝海之郊師於襄城之野方議梟其同惡獻首鎬京率彼戎旗南屯蔡邑傳一檄以定許冀克寸日而方就許冀有應殲弭可期事方垂成為魁渠之所糾察緬懷義烈悉嬰屠戮無辜殞命萬夫增憤形質委於原野忠魂越於草莽恍惚幽壤茫茫無依朕所以負扆長嘆坐朝興悼念忠良之不造空名在而身歿休德壯志貫於神明而為元惡矯誣翻欲歸過豈可使義烈之績泯而不彰宜加褒贈以示中外曾可太尉賜食封二百戶通前三百戶玢可司徒賜食封二百戶通前二百五十戶從賁可尚書左僕射賜食封一百戶通前一百五十戶秀琳可贈尚書右僕射賜食封一百戶通前一百五十戶憺可贈兵部尚書賜食封二百戶興朝可贈戶部尚書賜食封一百戶樂卿可贈刑部尚書賜食封二百戶仙欽可贈工部尚書賜食封一百戶仍令右散騎常侍蕭昕往汝州界首以禮致祭并委李勉哥舒曜與州計會訪其家口父子兄弟具其名聞即當類敘別有優獎有子者仍許其同父官爵其子孫三代以來有過犯者得以遞減一等罪論用彰峻節淮寧軍節度押衙中散大夫試殿中監兼唐州別駕占闕上柱國韋清與周曾姚憺始末同志曾等遇害清以智免率其麾下間道歸誠大節可嘉公賞冝茂可銀青光祿大夫守太子賓客兼御史大夫定安郡王食邑三千戶仍賜實封二百戶勳如故朕撫臨億兆於今五年每旰食宵衣勤求政理推誠委下日冀休兵明未燭幽德慚柔遠戎車尚戒大信猶鬱使忠烈之士殞身賊庭靜言興懷一食三歎罪己之責實謂在豫其周曾等所賜實封可載於典策傳其子孫永固山河之誓代代無絶自建中以來如有為國竭誠密圖元惡事或未就翻被誅夷或名氏未彰或休聲未振者既死節於王事宜書勳於竹帛並委諸道招討節度所在博訪明加曉示得其事迹具以奏聞特以褒獎朕方建明義於蠻貊宣大信於四海申必罰以懲其姦慝施厚賞以報其勳庸宣布天下令知朕意朕嗣守大業於今五年承祖宗之成烈受明靈之耿命何嘗不損己求瘼視人如傷思省徭賦以康邦俗納羣生於壽域躋大化於升平而德固虛薄志不昭感叛人未附戎馬方殷在豫之責鑒寐多懼自兩河背叛凶逆相因殺害無辜竊盜城邑搖蕩我邊鄙荐食我黎元勞我師徒費我征賦纍更時歲未克砥寧朕子育萬人務康暴亂棄其細故待以初誠申之以大信示之以好惡將冀迷乃知復困則能通亦欲先德後刑有征無戰不勞師旅以致和平而包藏禍心自相搆釁侮慢朝旨偷恤甲兵去順效逆曾無悛志謂天可罔謂責可逃緩之則為患益深逼之則矯闕窮究挾藏詐匿詭毒萬端陷此忠良申雪無路朕為人父母實所痛心豈可忍此姦回為之覆燾是以大整師旅肅爾天誅載清宇縣以息黎庶事不得巳而至於斯頃以軍興飛挽相次軍供之費餽運之勤屢擾農商或擅其利州縣征賦重及疲人朕心在止戈日冀蠲復先志未就後慮繼之徵責既加名目猶廣百姓私養無以自贍惟是夙夜不遑晏寧豈不知耕織之艱難轉輸之勞苦每一念至載深憂旰儻上元垂祐烈祖降靈憑將帥之謀股肱之力俾我一戎永清四海則頒賦名目悉停兩稅定數亦各減放以便萬姓咸與昭蘇各委節度觀察刺史縣令所在郡邑明加曉諭使知豫意朕鬱於大道遠邇未臻必假人力以清多難宣布中外咸使聞知敕淮寧軍將士等頃自平盧來赴國難涉溟海不測之險滅凶賊作亂之徒其後分鎮淮西防秋隴上奉我王事久著勳勞或耆老見存子弟相繼舉其誠效並是勳臣頃被李希烈脅從無路申雪永言勳舊實可憫傷邇者巳敕諸軍不加征伐冀能相率歸保功名副我念舊之心成其自新之節其陷在淮西將士應有親族在節度觀察使及刺史縣令等切使安存使皆得所如有莊宅店鋪奴婢六畜産業等各任如舊不得輒有侵擾如全家歿在淮西更無親族為主者即官為檢校待當主復即時檢付仍分明布告咸使知之妖妄莫甚於巫蠱罪惡莫逾於姦亂迹涉於此刑其捨諸郜國大長公主澡質天潢不慎其德行違禮法志匿回邪信妖孽之虛言求厭勝之非福憫其將老之年從我議親之典置於別館勿謂無恩其子蕭位不思諫正手疏祝詞其弟蕭佩儒偲及異父兄駙馬都尉裴掖相與知情陷於不義蜀州別駕蕭鼎商州豐陽令韋恪前彭州司馬李萬等謬居清貫輕紊常倫在其門庭多行穢德忝列衣冠之緒豈宜履舄之交宜令京兆府決重杖四十配流賀州裴掖綿州安置蕭佩儒偲等並配房州安置其蕭位等並馳驛發遣王者建設庶官允釐九有量戶口之衆寡定都邑之等差制其職員約以名數俾吏足成務而下克奉公其有弛張必在通濟朕頃緣蕃戎棄信深犯封疆興師備邊資用日費而黎人困弊難更徵求遂權減天下州縣官員姑務集事皆由朕不明不德以至於斯近聞新受官人皆巳隨牒之任扶老攜幼盡室而行俸祿未請歸還無所嗷嗷道路實疚於懷雖蒸庶之間供應有省而衣冠之族流寓無依苟便於時豈憚沿革凡百君子所當悉知其先減官員並宜仍舊仲夏之時萬物敷暢陽德方茂陰事始承昔者聖賢仰觀法象因天地交會之序為父子相見之儀沿習成風古今不易王者制事在於因人酌其情而用中順其俗以為禮咸覿之義既行於父子之間資事之情豈隔於君臣之際申恩卿士自我為初自今以後每年五月一日御宣政殿與文武百寮相見京官九品以上外官因朝參在京者並聽就列宜令所司即量定儀注頒示仍編禮式以著恆規諸軍鎮和糴貯備共三十三萬石本價之外更量與優饒其粟及麻據米數準折虛價直委度支以停減江淮運腳錢充並支綾絹絁綿勿令折估其所糴粟等委本道節度使監軍同勾當別貯非承特敕不得給用惠下恤人先王之政典視年制用有國之恆規故有出公粟以賑困窮弛歲征以寬物力救患之道何莫由茲頃以諸道水災遣使宣慰中心是屬夕惕彌勤省覽條奏載懷憫惻用加救恤以濟吾人應諸道遭水漂蕩家産淹損田苗乏絶戶宜共賜米三十萬石所司各據州府乏絶戶多少速分配每道合給米數聞奏並以度支見貯米充度支即與本道節度觀察使計會各隨便近支付委本使差清幹官請受分送合賑給州縣仍令縣令及本曹官同付人戶務從便無至重擾速分給訖具狀聞奏其州府水損田苗及五六分者今年稅米及諸色官田種子並減放一半損七分以上一切全放其所減放米如是支用數內應令度支及本道以諸色錢物充填並委度支條件聞奏其兩稅錢所司準舊例處分朕撫臨兆庶思致和平理化未臻良增寅畏方鎮守宰職在親人所宜分憂以救艱食必躬必信副朕意焉陌內欠錢法當禁斷慮因捉搦或亦生姦使人易從切於不擾自今巳後有因交關用欠陌錢者宜但令本行頭及居停主人牙人等檢察送官如有容隱兼許賣物領錢人糾告其行頭主人牙人重加科罪府縣所由祗承人等並不須干擾若非因買賣自將錢於街衢行者一切勿問于頎等議狀論禘祫事所請各殊理在討論用求精當宜令尚書省會百寮與國子監儒官切磋舊狀定其可否仍委所司具事件奏聞每年造簿事乃近煩三年一申又為太如外官並須勘造一切慮因此擾人宜今應管京官職田等州府所造文簿二年一送餘依代必生賢爰追祖德恩當被遠用示朝章山南西道節度管內支度營田觀察處置等使銀青光祿大夫檢校吏部尚書兼興元尹御史大夫上柱國扶風郡開國公食邑二千戶權德輿亡祖故右羽林軍録事參軍倕含和體仁克己存道五常佩訓三命滋恭服先儒之大倫知穀也之有後謀孫是慶祚以公台歸葬惟時光乎邱壠佳城再啓縟禮宜申飭彼泉扃寵茲郎位式獎列藩之重且彰漏澤之榮可贈尚書禮部郎中左降官蘇衮貶官本緣并連坐矜其年暮加以疾患宜令所在勒回任歸私第禮部舉人自春以來久愆時雨念其旅食京邑資用屢空其禮部舉人今年宜權停三省來章彌用兢惕再崇大號何以當之前者示懷蓋非沖讓尚勞敦請豈所宜然卿等博學古今列於朝右思宏獻替共致太和豈以虛名重豫不德再三循省增恧於懷想爾深衷勿更陳請朕以為理之本繫乎政刑頃因退朝偶有製述用錫人極庶叶時中聊以自規豈能逮意卿道贊元化志宣大猷爰勒貞珉躬自染翰克盡事君之節益嘉將順之心省閲再三歎賞無巳卿元臣上宰道贊緝熙貞諒闕彞忠闕之才寅亮中樞懷柔遠俗闕寧息闕列於金石禮亦宜之卿將頤闕心遠闕所謝知狀批朕思以中和被於風俗既傳令節載序樂章因會羣寮用申歡宴斐然成韻有愧非工卿等各抒清詞咸推藻麗再三省覽良用嘉焉所獻知省所奏請回檢校官及兼追贈亡祖事宜具悉卿位更將相委重藩方褒贈自是典章豈必更回官秩因心志切報本誠深巳詔追榮良增嘉歎想宜知悉夏熱卿比平安好遣書指不多及敕興理化者務積於人長國家者以義為利故斂之欲薄而使之以時然後億兆歡心遠邇欣戴政平俗阜必本於茲朕服承天命撫臨區夏憂矜在慮宵旰忘勞苟可以助化寧人便時益下事無大小皆盡其心比以中夏甫寧頗勤經費遂收諸道停減將士糧斛用叶權宜言念疲氓重茲供億頃雖疏理轉送猶勞眷彼東南良深矜歎夫崇儉可以足用節事可以豐財所當約己菲躬量宜濟務豈資厚取方給軍須思息遺黎俾蠲徭賦其貞元二年三年以前所收諸道停減放歸營農將士軍資糧斛錢米等緣送納向畢任依前敕收管其貞元四年巳徵到及在路者即依前送其在百姓腹內者並宜令放免其貞元五年巳畢每年合收一百七萬八百八十八貫石宜並放免仍委每道觀察使具當管每州都放錢數聞奏並各下本州曉示百姓令知其悉於戲人惟邦本本固邦寧百姓苟豐君孰不足式敷惠俾革煩擾庶其安逸各務農桑布告遐邇明知朕意維某年月日哀子嗣皇帝臣某伏以聖德之大上與天合人道近昵鮮克究知敢盡其所見泣以敘財成之業伏惟大行皇帝紹休七聖臨照八極以至道御羣有以至化懷遠方登假於上敷聞在下肇加元服頃升儲闈生知之敏動與神契承順元宗也齊栗之容著奉養肅宗也愛敬之禮深履蒸蒸躬翼翼不絶馳道日朝寢門此則首冠百王大舜周文之孝也其於崇儒尚齒尊道貴德窮理盡性之學經天緯地之文包荒含垢之量迪哲允恭之善斯又睿聖不測同符乎三五無得而稱也當祿山叛亂陷覆二京以天人之重授元戎之律師之所及狂寇殲夷復宗社之阽危拯生靈於焚燎則乾維重搆宸極以安及史盜間釁三河屢梗在撫軍之際思明隕命乘踐祚之初朝義授首則梁陳砥定朔易從風其或屈強於大梁背誕於南越莫不朝為梟獍夕為鯨鯢此高光之功神武之略也自是肅勿羣后賓延萬靈汙瀦鬱沒之刑寢焚瘞懸沈之禮備衣冠有淪於脅從者釋而靡問靈祇有闕於禋祀者秩而致享堲讒説求讜言扇以祥風浸以膏澤九譯奉貢四夷來賓丕冒日出罔不率俾猶復嚴恭寅畏顧省闕遺兢兢業業日昃不暇故得元功廣運協氣旁流靈契畢發元符洊至則瑞璧出於泗清瀾變於河其餘見祉鱗羽呈祥草木者不可殫記方議櫜弓偃伯臻於太和告禪於石閭鏤功於金版遽承憑几之命奄遘綴衣之酷號天叩地罔所依歸今龍攢就啓蜃輅將駕採鴻儒碩生之議考公卿百辟之請僉以盛德大業匪號諡莫宣是用虔奉古訓發揚茂實謹遣攝太尉某奉册上尊諡曰睿文孝武皇帝廟曰代宗伏惟明靈降格膺茲典禮誕錫純嘏貽宴後昆嗚呼哀哉嗣皇帝臣某言恩莫重於顧復禮莫貴於徽號上以展愛敬之道下以正春秋之義則祖宗之所稟命臣子之所盡心尊尊親親此焉而在兩漢而下帝王嗣位崇奉尊稱厥有舊章永惟丕烈敢墜前典臣某謹上尊號曰皇太后維年月日甲子皇帝若曰粵惟上天眷佑我唐賚豫元輔戡夷逆亂宣振忠貞光昭永圖奮揚丕烈今敬從典禮彰信於朝咨爾開府儀同三司檢校尚書左僕射同中書門下平章事合川郡王李晟希代特生乘時間出高明稟忠厚之楨闕故得擁是旄幢徇於封略旋師中冀討孽上京一鼓而凶魁電竄皇居乃正清廟重安大效展於邦家大惠孚於黎庶武昭七德文洽九歌俾豫一人潛復丕業抑聞功懋懋賞義在疇庸德懋懋官理在翊善爾既憂勤勠力端明一心申之以武功重之以文德是用稽之舊制册命爾為司徒宜亮采台庭光融相府敘彞倫於九牧凝庶績於百工祗率典章阜成邦教膺茲景命可不慎歟維貞元三年歲次丁卯四月乙卯朔二十四日戊寅皇帝若曰在天成象三辰耀其景在地成形五嶽峻其位古先哲后罔不憲章故則天之明因地之利建官置輔論道經邦配六符於泰階運七政於皇極無其才則禮闕有其德則榮升爰自唐虞率由斯道故久虛上台之坐以俟其人載懷勳賢聿歸元老咨爾奉天定難功臣司徒中書令上柱國西平郡王食實封一千五百戶李晟天授明德為時棟梁膺期挺生佐理戡難作我英宰保大定功渾忠義以居心等夷險以為體魏郊伐叛申肅殺之威漢苑摧凶樹廓清之效宮城遂復廟社攸安三輔釋塗炭之憂萬國允朝宗之願及夫藩鎮岐下黎獻昭蘇踔威稜於接境阜農耕於夷壤欽若朝政櫜戢干戈弼豫一人永清四裔聿懷丕茂之績式崇寬大之請是用命爾為太尉惟其敬之哉且德盛故禮殊功高故賞茂崇極九命華貫三台持華歆養德之規保荀顗清純之道具瞻斯在可不慎歟維年月日甲子皇帝若曰昔有虞之帝天下也契作司徒誕敷邦教五常以遜百姓斯親其在鄭友翊亮於周鄧禹宣猷於漢亦皆以德當國以勳持令天贊我唐允生忠輔出則擁旄定亂重其望以成功入則調鼎登庸資其實而論道再新茲典榮命攸宜咨爾檢校司徒兼侍中北平郡王馬燧岐山粹靈楨我王國明謀炳於蓍蔡雄略極乎韜鈐文武在躬剛柔備體欽崇一德期協阿衡故能受脤專征作我心膂揚旌仗鉞外鎮雄都正師律以寧邊宣國風而撫俗華夷式敘朔塞無虞崇其大勳謙德彌著懿茲茂範實豫衷昔貞觀初戡定羣雄拯寧庶類有若趙國公無忌外運夷凶之效內申翼善之謨陟居中台鬱為時棟今豫亦命爾光贊大猷是用册爾為正司徒宜祗厥位九功丕緒咨爾緝熙五品不昭咨爾寅亮豫違汝弼無或面從式宣勵翼之誠允副寵光之命具瞻斯在可不慎歟維貞元二十一年歲次乙酉正月辛未朔二十三日癸巳皇帝若曰於戲天下之大實惟重器祖宗之業允屬元良咨爾皇太子誦睿哲溫恭寬仁慈惠文武之道稟自生知孝友之誠發於天性自膺上嗣育德春闈恪慎於厥躬祗勤於大訓必能誕敷至化安勸庶邦朕寢疾彌留弗興弗寤是用命爾繼統俾紹前烈宜陟元后永綏兆人其令中書侍郎同中書門下平章事高郢奉册即皇帝位爾惟奉若天道以康四海懋建皇極以熙庶工無忝我高祖太宗之休命
