front:
  text: 全唐文欽定全唐文卷九百四十杜光庭十二
  hash: sha256:8f27be1b8445c8be4f53dfb8f01f390078549d183f49891a65b5849fe43f6acd
body:
  text: 伏聞大道垂光三靈資始人天設位萬化互分稟氣有清濁之殊賦運有吉凶之異昏明既判罪福亦彰於是太上宏慈元尊愍護南極闢延生之府北都陳銓善之科兩曜列星布無私而照燭三官五帝開大宥以君臨蓋欲使共洽無為俱臻清靜品登道果名列真階臣等叨沐神功幸逢昌運聞元儒之妙旨履仁義之康衢坐挹堯樽行歌睿德揣躬省已榮抃實深但慮往劫此生立身舉措動成違戾率忤幽明六情之愛染難祛三業之愆非易積文昌上未紀善名酆部宮中已標罪目又恐行年災咎宿曜加臨或土木興功犯干禁忌或故傷誤殺結聚冤尢遂使暗奪年齡潛消福祿非憑勝會難寫深誠今屬白露凝神清秋屆節是懺罪祈真之日乃延恩致福之期輒率慕同誠歸依至道齎持法信稽首靈壇遍天府以披心望星宮而注想伏冀三元上聖十界眾尊南極威神北臺寮輔念其虔懇降以光靈流福祚於存亡息災凶於永遠使臣等九元七祖咸得生天五族六親竝蒙安泰罪瑕除蕩祿壽延長門宇清寧運求諧遂五行三命永無刑剋之災私室公庭長荷利貞之福不任伏以元象垂光物無不照帝車周運感無不通臣以幽微仰蒙鑒祐頃以大順二年身陷危厄性命是虞輒瀝丹心上祈元造遂發誠願奉錢十萬貫文旋獲安寧克蒙清雪螻蟻之生已保真靈之澤未酬尋以奔迫道途辛勤南北難逢良會莫報宿恩冰炭在懷寢食增懼今則歸心靈化稽首瑤壇虔備香燈精修醮酌自今年四月至今月五度奏錢滿十萬貫兼於玉局化北帝殿塑造北斗真君像薄修功德用申素懇上答元恩伏惟聖慈曲賜昭納使誓圓昔日願滿茲辰宿罪蠲消餘災蕩滌冤讎和解年祿增延公私叶貞吉之期眷屬享乂寧之福存亡咸泰品彙霑恩不任伏聞大道融真天尊演教赤明御運靈寶開圖八會成文凝結太空之表五符流跡昭宣大有之中五帝受之以度人九天得之以定位降於下土護國濟人摧伏兇妖誅滅邪惡凡所興造皆許遵行臣頃以營繕所居土木將畢恐有干犯難備考詳竊按元科請行符命修崇黃籙關奏清都刻五方大帝之文依三洞鎮禳之格下告五土上奏九微伏願眾聖垂慈萬靈孚祐勅命符吏頒示職司降以威靈布其真氣蕩除魔怪安靜龍神八卦九宮五行六甲陰陽刑殺太嵗將軍各鎮方隅永祛災咎其有伏尸故氣金土邪精滯爽游魂幽靈暗魄各乘善力俱遂逍遙克保安寧永臻福祐不任伏聞人之稟生資於二氣陰陽定體魂魄守身稍或愆和即成災否三會之日是三魂攢奏之辰罪福吉凶纖毫無失增壽奪算賞罰甚明所宜積善除非立功補過用祈吉應以保遐齡元聖格言真經明訓敢不遵守以戒身心臣等數年以來於下會之日共申祈醮以罄焚修昨者迫以塵緣運違佳節中心憂惕不敢遑安今則別選良辰旁招善友同營香火特展醮祈靜夜寒更冥心注念真經必降誠願冀通伏惟萬聖迴光千真鑒映錫其禱祝除彼災凶制魄拘魂各遂修生之望迴凶變吉咸開遐永之程臣等或三命衰微九宮厄滯或星文照臨災運縈躔或宿債未平餘殃未息或故傷誤殺積過深瑕俱乞蕩除克賜昭祐合家蒙福九祖生天公私有通泰之祥眷屬荷乂安之澤不任伏以三光麗天照臨萬有眾星垂象統御㣥形南斗文昌實掌生籙為正陽煦物之本乃帝王壽命之司按天元上清等經若五月五日值丙午之辰則啟福延恩濟生利物和寧品類安鎮邦家陽德所資暜享其福今年以火水金土四星聚於實沈之墟又逢日度所經皆為順伏五月合朔太陽當蝕而不蝕洎乎既望太陰當虧而不虧斯乃五日得丙午之辰純陽所應顧惟寡昧欽荷元功慙化理之未周念聲教之未暜敢祈流貺以及微躬所願大道延慈上天錫祐俾九州四海俗泰民康年豐而六氣均調候正而四時和暢弢弓偃革歸馬休牛咸臻保命之祥克廣好生之德冥心丹禁稽首元壇瞻八景以低臨冀九光之遐燭鑒茲醮酌介以禎休辰輝炳靈幽讚之功已著人天交感協和之氣可期混一車書大同寰宇式虔祇荷上副元慈不任臣聞風雨霜雪之不時則星辰示象蘋蘩薀藻之可薦乃天地垂休緬是前修實為通論臣恭臨大寶虔奉丕圖不敢遑寧若臨冰谷而頻移圭律七變槐檀慮兆庶未康恐一物失所或刑政乖謬或恩信未孚干戈猶駐於疆場正朔未同於夷夏水旱不節富庶未臻昏墊札瘥繼聞於㣥縣盜賊欺誑尚恣於鄉閭雖則務嗇勸分貶食省用不邇聲色永絕畋遊瓦器蚌盤敢忘於刻巳雉頭虎魄豈事於娛情猶慮上曹重書厥罪顓蒙有愧首謝無由近則金火二星水土兩曜併聚蜀分皆次實沈日月為薄蝕之期朔望却史臣之筆太陽順伏分野垂休豈此禎祥併歸沖渺益勵退修之志彌彰戒懼之心敢因午日之嘉辰聊答上元之厚貺靈官渺邈紫府深嚴雖昭告之備申慮誠明之莫達齋潔選日懇悃陳詞寂寂元壇儼威儀於乙夜飄飄仙馭降福祐於人寰伏冀八表乂安黎民清泰邦家鞏固社稷永寧六府孔修九功攸敘簪裾奉職書軌同文不任伏以楚蜀連封西南重地江馳萬派嵐積千峯天帝以之會昌龍神以之固護惟茲奧壤獨擅雄名三層燭煙月之光八洞閟靈仙之宅常宏勝利以祐蒸人年無旱潦之傷俗保安貞之吉致泝沿之攸濟獲絲枲之蕃豐銜三觀威靈荷二真慈貺傳諸遠近載彼經圖翹首注心共歌元澤臣名拘輦轂望切林泉每憐素豹元猿常戲芝巖桂岫延頸企踵跡滯神遊輒贄微香遙陳孤懇臣以所居北帝院齋醮所給鐘簴未周雖申降福之儀幾闕飛霜之韻始聞仙山之內法器且多既無考擊之期虛備鏘洋之美道隨誠感鐘固可移願減有餘資其不足輟於翠嶽遷就皇都清聲漸遠於彤雲洪響佇聞於紫禁願俞誠祝永鎮京華謹差正一弟子張諫卿奉詞陳請以聞不任伏以大道融精是分二象元尊布化以播萬靈咸稟運於裁成共輯寧於邦國欽哉㣥望實總休禎伏自應天順人開基創業雖未致昇平之理而幸成庶富之鄉四國爰來百辟咸在人心允若天意昭然而或教失義方情牽慈愛付粢盛之大任委監撫之重權庶人元膺益恣胷襟都忘孝敬用奸邪之扇惑興背叛之兇狂矢石欲及於乘輿金鼓近喧於侍從猶賴上天垂祐靈化降祥不容梟獍之心坐殄豺狼之黨未更昏旭悉已蕩除中外再寧寰海稱抃爰擇良日仰報威靈遠申昭告之誠輒罄潢汚之薦敢期鑒祐永叶安貞不任伏以道化所覃神休暜被上惟邦國下及人倫咸資拯護之功潛假保持之力古今無爽水陸攸寧臣猥以常材叨逢聖運經綸締搆慚無竹帛之勞渥澤超昇累荷乾坤之造遽蒙睿奬顯授兵符登韓信之齋壇授呂侯之金鉞錫茅分閫推轂專征省循徒切於兢營倚注靡容於陳謝選辰練日遄命啟行况楚硤上游錦江下瀨舳艫則千艘亟駕泝沿則萬派爭奔實用真靈總斯陰步馬皇帝宸襟所屬每切敬恭思布化以睦鄰亦申謀而懷遠雄師銳旅首在此行將解纜以乘流爰潔誠而致醮伏惟元元大聖五老高尊命靈將元司助洪休巨福迅浪皆期於利涉驚湍盡變於安流萬里通津百神加祐克昌大業更廣鴻基外屏中朝共臻禎福不任伏以天鑒孔明有感斯應神道正直無祈不通每垂拯護之仁以副禱祈之願祛災流貺猶響應聲竊佩斯言常虔片志每因元命得備焚修式勵深誠實荷明祐但慮塵機未息過咎易盈宦路所拘悔尢難逭因星辰臨照值年運衰危但懼災躔敢思福會自從軍鄰部寓跡外封一駐戎軒兩周天序既闕奏陳之禮必招逋慢之愆本俟凱還併申醮謝今則方當劘壘未議櫜弓久曠香燈不遑寧處是用馳心靈觀遐叩至真備三醮之物儀同一壇之關告伏惟元聖俯鑒丹誠解厄消災延生保命宿瑕蕩滌往咎蠲平克覩成功永臻多福不任伏以二氣資靈五行稟象法元穹而定命體厚地以流形罪福吉凶皆由陰步馬運心履行咸繫主張况荷殊榮久叨重寄循涯省分常切兢慙每因章醮之壇敢忘敬恭之禮冀憑修奉上答君親今屬元君之辰詣本命靈化精誠香火祈叩真仙願鑒丹襟府頒鴻福俾臣罪瑕除滌壽祿增延疆㝢乂安生靈康泰災毒無侵於四境農桑克美於有年得傾葵藿之心永奉昇平之運不任歸命虔誠之至伏以九隴名區三仙化跡上通心宿下鎮錦川雲霞謺綺繡之光松桂竦煙嵐之色五宮高闕狀西靈南極之儀四輔交輝列東華北真之像最標形勝獨占幽奇斜界玉輪旁臨石磵而屬師徒俶擾鉦鼓震驚火彗橫空霜戈照野熊經鳥伸之士抗步不還潄流枕石之人拂衣長往眷茲勝異一變榛蕪崇樓之金碧塵銷廣坐之儀容蘚剝緬惟殘毀深可歎嗟况某本命之辰配於茲化宜申締葺用答真靈乃命三洞道士唐洞卿伐木鳩工揆星選日得風箕直事當甲子良辰虔告至真恭修大醮伏冀鑒其誠懇錫以休祥災沴無侵功庸速就續昔賢之遺搆成曠劫之良規播美洞天勒銘雲谷然願真靈誕祐川境謐寧稼穡滋豐災氛殄息受靈丹於九輔聞至理於重元常傾拱極之心仰副上真之貺不任懇願之至伏以上清仙山葛真靈化為川中之勝境乃天下之福庭呀玉洞以藏雲聳瓊巒而蔽日彩霞朝散神燭夜飛乳滴幽巖泉鳴深竇九井之光靈自顯三真之肸蠁常存拱鶴觀於中方應龍星於上境紅軒紺宇舊制相望蕭殿韋碑古跡鱗次每彰休瑞以及寰瀛臣以本使蜀王元命之辰配屬茲化頃申締葺遽獲周圓飛閣層樓奪晨輝於峭壁風窗雲棟增異境於崇林再敞洞天用安錦府四十州之封域嵗稔京坻五千里之山河俗臻富庶人皆受賜孰不知恩臣曲荷陶鎔實深造化唯虔禱祝少答恩慈輒備醮筵上祈道力伏惟九天孚祐眾聖鑒臨下燭丹誠廣垂洪澤三川鏡廓八國塵清稼穡蕃登災氛蕩滌神傳靈藥克享於遐年功讚聖朝永隆於大寶再安社稷常福寰區臣不任禱福希恩虔誠歸身之至謹詞伏以垂象上元照臨下土帝車運載杓的指揮罪福吉凶咸歸主宰臣等頃因銜命遠涉道途踐歷艱危登臨險阻每持丹懇潛祝元真果蒙鑒祐之恩克獲安寧之貺仰承靈澤志切上酬敢因某日之辰虔備焚修之禮炷香答願拜荷元恩仰冀高真採納微款祛災蕩厄增祿延齡來往坦夷公私貞吉路歧無滯眷屬咸安常親日月之光克奉休明之主不任伏以大道希夷神仙變化示無方之妙用垂不測之元功幽讚帝王潛扶邦國惟今及古史冊煥然所以唐堯姑射之遊軒后具茨之謁周穆之登瑤水漢皇之幸崑山皆披眄煙霞瞻窺冰雪是用享年遐永致理和平克振宏休允彰道祐顧惟涼德啟創丕圖金闕玉京敢怠敬恭之禮九清三境每懷寅奉之誠粵以永平二年壬申七月二十一日丁卯漢州什邡縣獲太上老君賜命讖丈留玉篆於仙居刻銅符於厚地生辰命屬時日姓名敘奕世之蟬聯明卜祚之延久四年八月二十四日戊子利州團鍊使王承賓奏此山靈洞顯見神仙遂命威儀任可言高品楊知淑專申告謝仰答光靈十月一日甲子纔啟醮筵再聞應見雲旌羽斾參差崖壁之中鶴態神儀羅列洞門之內事邁於崑山瑤水美超於姑射具茨祇荷禎祥彌增震惕是用考諸典禮特舉封崇以是月甲申改道長山為元都山陽謨洞為紫霞洞景谷縣為金仙縣封元都山神為玉清公創厥壇場鼎新觀宇自初揆搆逮於畢功累見真儀益彰靈貺謹遣金紫光祿大夫左諫議大夫廣成先生蔡國公杜光庭等一十二人賫信幣香花按元科具典於紫霞仙觀修金籙道場况屬下元允當大節式陳昭謝再顯旌封伏惟洞府眾聖高真仙官寮宰鑒茲丹懇錫以元休使九土乂寧萬方平一天宮地府常垂愷悌之恩卜世享齡克叶延洪之福稽首謹詞伏聞誕質流形咸資大道稟生賦命必繫上元荷乾坤覆載之慈均氣運陶甄之力惟精修勵寅奉真靈伏念臣獲以微塵累叨皇澤入參輔衞出領藩維曾無涓露之功常切滿盈之懼今則歷象之內身宮之中暗曜正臨火星對照慮成厄會無所告祈竊惟太上垂文元皇設教正一著修禳之品河圖有陳醮之科苟罄精勤必蒙昭祐敢因本命之日爰伸九曜醮祈蠲潔丹心歸依元極伏惟眾真大聖俯鑒明誠蕩滌罪瑕解除冤債消平災厄延續年齡增祿祚於南宮落凶衰於北府洗心克已上酬真聖之恩奉國推忠永答君親之德臣不任臣聞天地之德以生為先生成之恩以福為本臣叨承福會獲奉昌期蒙三光照燭之慈荷聖主儀隆之澤便蕃寵遇履歷顯榮每虞於福過災生惟切於持盈約已彌增惕懼豈敢遑安今則躔次之中身宮之位火星對照暗曜正臨仰垂象以冥心何階告謝顧微生而勵志但切憂兢是敢於本命之辰備河圖醮禮虔披丹悃冀降元慈伏乞賜臣災咎消平凶衰殄息壽年增益祿祚豐延得傾嚴奉之誠永答至真之祐伏聞至道元通隨機赴感冥丹心於下土動元鑒於上清響答無私影從靡隔妾夫王宗侃男承肇等去年以統戎伐叛助國勤王俯迫孤城遽淹旬月烽煙警急音問寂寥瞻襃沔以魂馳望山川而目斷憂危徒切祈叩無門遂虔詣道宮乞申章奏嚴陳法席降請天兵肸蠁感通真靈保祐俄開堅壁大破兇狂成掃蕩之功副聖明之奬骨肉團聚師旅凱還克平實自於睿謀護助亦兼於道力輒因良日昭答元休重申章醮之儀式罄謝陳之禮精心備信拜手然香仰真駕於三十六宮祈大儀於八十一好庶祥輝炟爚低臨壇墠之前巨貺滂洋永錫邦家之吉聖圖遐永舉族蕃昌誓勤嚴奉之誠克副靈真之煦不任荷聖謝恩虔切之至伏聞道氣宣行元功鼓鑄三靈資稟乾坤司覆載之權五緯操張寒暑柄推遷之運由是挺生賦命咸繫天關福善禍淫畢由神化是宜恪勵以奉靈休粵自幼沖即逢聖日便蕃異奬寵沐殊恩北省南宮亟榮於踐歷紆朱曳紫巳極於輝華常推報國之誠每切律身之戒尚慮陰陽揆課或值凶衰厄曜運行或為臨照興功動土有忤於龍神履行立身或虧於畏慎未申祈懺倍用兢憂今則立運臨於命辰天符飛於艮地大運在戌仍值魁罡土星方伏於身宮所照對衝於丑位懼成災咎彌用驚危伏聞南府文昌主生銓善非宮斗極舉過懲非吉凶無爽於錙銖報應有同於懸象真教開懺陳之格惟感必通元經垂醮謝之儀有祈皆應輒因吉日虔備醮筵披瀝丹誠冀迴真鑒伏乞賜臣解消災滯蠲釋凶衰厄會平夷過尢除蕩更增祿算允介福祥誓勤忠孝之規上答君親之念永銘素懇祇荷元慈不任謝過祈恩懺災之至謹詞伏以軫翼雄區匡廬真躅位尊五嶽地控九江玉闕金城包括神仙之奧府鑪峯雲葢合藏真聖之高都宛然凝碧之中迥秀洪波之上每申瞻禱必介福祥臣頃嵗以謫宦九重漂蓬一葉途經閟境心禱上真冀迴濟祐之慈必備椒漿之獻精誠既啟肸蠁垂徵尋以路阻戈矛波驚艫艦孤帆有隔假道言歸常貯素誠未酬元祐今則頒宣聖澤棲憩蜀都尋禮道宮追思宿願輒申醮酌恭達明誠竊聞惟感必通道無不在期迴羽仗豈云萬里之遙稍降科車不以三川為遠納茲丹懇顯錫鴻休前願克圖殊恩遐被乞為臣更蠲罪錄永削災躔成匡堯讚禹之功享二首六身之壽得傾忠孝以奉君親誓當備勵虔恭歸依道力不任伏聞三靈肇位萬象稟形體陰陽之至和韞天地之真系於是挺才賦命各有職司主死領生互分關鍵纖微具舉考校無遺臣伏慮前世今生至於累劫愆違易結罪咎旋彰秉持未契於神明履行或虧於恭恪因星文臨照值年命凶衰遂搆災危罔知禳謝今則躬依玉化虔對瑤壇選卜良辰肅陳醮禮伏冀南宮六聖別賜生名北斗七真明祛死籍三官消罪五帝除災酬往願於名山降休祥於聖澤又臣既頒詔命將赴闕廷江山有登泛之憂水陸有舟車之險實資明祐俯契深誠獲達帝鄉克賜元吉敢忘修奉上答真靈臣不任伏聞太極肇分三靈設位巢穴之風既替棟宇之制聿興太古聖人隨時立教葢所以庇寒暑燥濕備風雨晦明其後象類滋繁擬議殊廣錯之以乾坤震兌體之以徵羽宮商推彼陰陽運其刑德乙辛庚癸互列職司子午丑寅旁羅主宰六神四殺之界龍虎交馳五黃九紫之鄉禎祥藂萃法覆載而成用揆星日以程功乃考吉凶實聞顯據所以鵲隨太嵗燕避將軍况在最靈敢忘戒懼臣頃以所居室宇淋陋非宜遂卜良辰再申締搆取諸大壯棄彼僭奢慕剪茅築土之風佩山節藻梲之戒圬墁云畢土木告周竊慮畚鍤所興或違禁忌功用之際或犯神靈乖五姓之宜虧二宅之要或侵傷地脈或穿鑿岡原或汚瀆吉神或鎮壓凶位因成災咎曾未懺陳是用詳按元經勵精丹懇虔修大醮恭請真文啟靈寶赤書依洞元符命辟斥凶惡安復龍神謝過延恩祛災請福伏冀三尊降鑒五帝垂光勅八會威靈命三元將吏保寧宅宇清肅方隅赦巳往之罪尢賜將來之貞吉允膺祐護永遂乂安其有住宅之中土地之主古今遷易五姓雜居因此醮壇兼申奠祝歆茲誠禮各保逍遙往陟福庭勿為疵癘俾臣舉家蒙澤九族同榮常傾忠孝之心以奉君親之德不任伏以一氣分華三光摛耀照臨㣥品司牧萬方遵黃道而有常麗元穹而不紊大則繫乾坤劫歷邦國興亡否泰所宗安危攸屬次則繫人倫善惡年運吉凶祚歷短長咸歸主宰臣以身宮之內土曜所經本宿之中暗虛所歷大小行運皆值衝妨命位之鄉天符所駐災危重謺疾厄嬰纏徒訪三醫未祛久疾恐是積生罪目搆此凶衰往世愆違成茲滯厄或理務之所刑賞不明立身以來過尢結集神明咎責年命屯蒙夙夜憂兢願申祈謝是用考詳躔緯披按科文恭詣靈壇虔修醮禮仰中方而瀝懇瞻列象以馳心拜手炷香披誠悔過伏冀元司眾聖垂大有之慈至道高尊降載生之澤蠲除罪犯解削災期和釋冤讎銷平殃對使百關宣暢六氣均調疾苦痊瘳福祥臻會延生南斗落死北宮克承覆祐之仁敢負真靈之貺
