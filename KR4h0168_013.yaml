front:
  text: 全唐文欽定全唐文卷十三高宗三
  hash: sha256:352772f5d4beb8acb64f91c10ec0de6faf29a29cb28a789d7a8a4cee71927441
body:
  text: 西漢元勳縟禮崇於末嗣東京列將茂賞覃於後昆繼絶興亡同歸一貫皇家受命蒼旻肇膺元籙恢張宇宙蕩一寰區御乾立極之圖諒資天啓撥亂經邦之略實賴人謀締想初基有足言者或委質唐郊首參一旅勤著荊棘勞宣草創或策名代邸先騁六飛誠備艱虞志踰金石咸以攀鱗上漢捧日登山氣叶風雲情均魚水其太原元從西府舊僚今親詳覽具為等級贈司徒并州都督忠孝公士彠贈司空淮安郡王神通贈開府儀同三司并州都督夔國公劉宏基贈并州都督渝國公劉政會贈開府儀同三司并州都督莒國公唐儉贈左衛大將軍特進譙國公竇琮贈荊州都督邳國公長孫順德贈護國大將軍涼州都督竇國公史大奈贈幽州都督濮國公龐卿惲贈左武衛大將軍潭州都督巢國公錢九隴贈華州刺史霍國公柴紹贈潭州都督羅國公張平高贈相州刺史工部尚書河東郡公裴寂贈洪州都督樂安郡公李思行贈洪州都督廬陵郡公秦行師贈代州都督真定郡公許緒贈涼州都督江夏郡公李高遷贈齊州刺史劉義節贈太尉申國公士廉贈司空蔣國公通贈太尉并州都督梁國公元齡贈司空蔡國公如晦贈司徒并州都督鄂國公敬德贈輔國大將軍揚州都督褒國公段志元贈驃騎大將軍益州都督宿國公程知節贈徐州刺史胡國公秦叔寶贈左衛大將軍涼州都督郢國公宇文士及贈左驍衛大將軍荊州都督郯國公張公謹贈荊州都督懷寧縣公杜公綽贈荊州都督東萊郡公公孫武達贈荊州都督遂安郡公李安遠贈代州都督同安郡公鄭仁泰贈荊州都督漢東郡公李孟嘗贈幽州都督歷陽縣公獨孤彥雲故始州刺史襄武郡公劉師立等並立為第一等功臣其家見在朝無五品巳上官者子孫及曾孫擢一人授五品官若先有四品五品官者加授子孫第一人兩階若三品巳上加爵三等其第二等功臣見在朝無五品巳上官者子孫及曾孫擢一人授從六品巳上官若先有五品巳上官加一階六品官者加兩階三品巳上官者加爵一等首出萬物實顯崇高之位曾覽八紘無違嚮明之道合宮聽朔闡皇軒之茂範靈符通神敷帝勛之景化殷人陽館青圭備禮姬氏元堂彤璋合獻雖運殊驪翰時變質文至於立大中建皇極軌物施教其歸一揆暨乎西京創歷駁政逾繁東漢開基舊章猶闕考圖汶上僅存公玉之儀度室圭躔才紀中元之制三方鼎據祚傾於金馬五胡塵起道喪於蒼鵝自此相仍時經板蕩遂使陟配之典久淪於帛丿糸載端扆之化允屬於隆平朕恭膺寶命肅奉瑤圖昧旦求衣仄景忘食賴上元垂祐宗社降靈幽明宅心中外禔福封金岱嶺昭纍聖之鴻勳勒石九都成文考之先志功標偃革時會委裘固可以作化明臺顯庸太室備機之歷既表於嘉名布政之宮式崇於美制是用求中測景取則陰陽考廣袤於裁圭定卑高於置槷傍羅八柱周建四墉架序儀天疏基象地窗闥齊布應路並興導辟水以環階應旋衡而結極重阿復道用循測管之模上圓下方仍準分蓍之數木工不琢土事無文豐約折衷經始勿亟勾芒序入春圃而司儀蓐收戒時下秋園而奉職事符神造鉤繩之用畢陳義叶子來釁落之期非遠將以肅禋清祀展殷薦於皇靈施號法宮暢休聲於太帝百神執贄咸尊孝饗之風萬國來庭共覩太平之政闕文斯備大禮聿修制作之規可依別敕宜頒示天下永垂來葉合宮聽朔闡皇軒之茂範靈府通和敷帝勛之景化殷人陽館青圭備禮姬氏元堂彤璋合獻雖運殊驪翰時變質文至于立天中建皇極軌物施教其歸一揆考圖汶上僅存公玉之儀度室圭躔才紀中元之制屬炎精墜駕璿宮毀籥四海淪於沸鼎九土陷於塗原高祖大武皇帝仗鉞唐郊收鈐雍野納祥符於蒼水受靈命於丕山飛沈泳沫動植遊源太宗文皇帝盟津光誓協降火而登壇豐谷斷蛇應屯雲而鞠旅封金岱嶺昭纍聖之鴻勳勒石九都成文考之先志固可以作化明堂顯庸太室傍羅八柱周建四門木工不琢土事無文豐約折衷經始勿亟闕文斯備大禮聿修其明堂院每面三百六十步當中置堂按周易乾之策二百一十有六坤之策一百四十有四總成三百六十故方三百六十步當中置堂處二儀之中定三才之本構茲一宇臨此萬方自降院每面三門同為一宇徘徊五間按尚書一期有四時故四面各一所開門每時有三月故每一所開三門一期十有二月故周回總十二門所以面別一門應茲四序既一時而統三月故於一舍而置三門又周易三為陽數二為陰數合而為五所以每門舍五間院四隅各置重樓其四墉各依本方色按淮南子地有四維故四樓又按月令水火金木土五方各異色故其墻各依本方之色基八面象八方按周禮黃琮禮地鄭元注琮者八方之玉以象地形故以祀地則知地形八方又按漢書武帝立八觚壇以祀地祭地之壇形象地故今為八方之基以象地形基高一丈二尺徑二百八十尺按漢書陽為六律陰為六呂陽與陰合故高一丈二尺又按周易三為陽數八為陰數三八相乘得二百四十丈按漢書九會之數有四十合為二百八十所以基徑二百八十尺故以交通天地之和錯綜陰陽之數以明陽不獨運資陰和以助成陰不孤行待陽唱而方應陰陽兩順天地咸亨則百寶斯興九疇攸序基每面三階周回十二階每階為二十五級按漢書天有三階故每面三階地有十二辰故周回十二階又按文子從凡至聖有二十五等故每階二十五級所以應符星而設階法台耀以疏陛上擬霄漢之儀下則地辰之數又列茲重級用準聖凡象皇極之高居俯庶類而臨耀基之上為一堂其宇上圓按道德經天得一以清地得一以寧侯王得一以為天下貞又曰道生一一生二二生三三生萬物又按漢書太極元氣函三為一又曰天子以四海為家故置一堂以象元氣并取四海為家之義又按周禮蒼璧禮天鄭元注璧圓以象天故為宇上圓堂每面九間各廣一丈九尺按尚書地有九州故立九間又按周易陰數十故間別一丈九尺所以規模厚地準則陰陽法二氣以通基置九州於一宇堂周回十二門每門高一丈七尺闊一丈三尺按禮記一歲有十二月所以置十二門又按周易陰數十陽數七故高一丈七尺又曰陽數五陰數八故闊一丈三尺所以調茲玉燭應彼金輝叶二氣以循環逐四序而迎節堂周回二十四窗高一丈三尺闊一丈一尺二十三櫺二十四明按史記天有二十四氣故置二十四窗又按書一年十二月並象閏故高一丈三尺又按周易天數一地數十故闊一丈一尺又天數九地數十并四時成二十三故二十三櫺又按周易八純卦之本體合二十四爻故有二十四明列牖疏象風候氣遠周天地之數曲準陰陽之和堂心八柱各長五十五尺按河圖八柱承天故置八柱又按周易大衍之數五十有五故長五十五尺聳茲八柱承彼九間數該大衍之規形符立極之制且柱為陰數天實陽元柱以陰氣上升天以陽和下降固陰陽之交泰乃天地之相承堂心之外置四柱為四輔按漢書天有四輔星故置四柱以象四星內以八柱承天外象四輔明化上交下泰表裏相成叶台耀以分輝契編珠而拱極八柱四輔外第一重二十柱按周易天數五地數十並五行之數合而為二十故置二十柱體二儀而立數叶五位以裁規式符立極之功允應剛柔之道八柱四輔外第二重二十八柱按史記天有二十八宿故有二十八柱所以仰則乾圖上符景宿考編珠而紀度觀列宿以迎時八柱四輔外第三重三十二柱按漢書有八節八政八風八音四八三十二柱調風御節萬物資以化成布政流音九區仰而貽則外面周回三十六柱按漢書一期三十六旬故法之以置三十六柱所以象歲時而致用順寒暑以通微璿璣之度無愆玉歷之期永契八柱之外修短總有三等按周易天地人為三才故置柱長短三等所以擬三才以定位高下相形體萬物以資生長短兼運八柱之外都合一百二十柱按禮記天子置三公九卿二十七大夫八十一元士合為一百二十是以置一百二十柱分職設官翊化資於多士開物成務搆廈藉於㣥材其上檻周回二百四柱按周易坤之策一百四十有四又漢書九會之數有六十故置二百四柱所以採坤策之元妙法甲乙之精微環回契辰象之規結搆準陰陽之數又基以象地故叶策於坤元柱各依方復規模於甲子重楣二百一十六條按周易乾之策二百一十有六故置二百一十六條所以規模易象擬法乾元應大衍之深元叶神策之至數大小節及栱總六千三百四十五按漢書會月之數六千三百四十五故置六千三百四十五枚所以遠採三統之文傍符會月之數契金儀而調節偶璇歷以和時重幹四百八十九枚按漢書章月二百三十五閏月周回二百五十四總成四百八十九故置四百八十九枚所以法履端之奧義象舉正之芳猷規模歷象發明章閏下枊七十二枚按易緯有七十二故置七十二枚所以式模芳節取規貞契至和於昌歷偶神數於休期上枊八十四枚按漢書九會之數有七十八又按莊子六合之外聖人存而不論司馬彪注天地四方為六合總成八十四故置八十四枚所以模範二儀包羅六合準會陰陽之數周通氣之源枅六十枚按漢書推太歲之法有六十故置六十枚所以兼該歷數包括陰陽採甲乙之精微窮辰子之元奧連栱三百六十枚按周易當期之日三百有六十故置三百六十枚所以叶周天之度準當期之日順平分而成歲應晷運以循環小梁六十枚按漢書有六十甲子故置六十枚構此虹梁遐規鳳歷傍竦四宇之製遙符六甲之源㯠二百二十八枚按漢書章中二百二十八故置二百二十八枚所以應長歷之規象中月之度廣綜陰陽之數傍通寒暑之和方衡一十五重按尚書五行生數一十有五故置十五重結棟分間法五行而演祕疏楹疊構叶生數以成規南北大梁二根按周易太極生兩儀故置二大梁軌範乾坤模擬天地象元黃之合德表覆載以生成陽馬三十六道按易緯有三十六節故置三十六道所以顯茲嘉節契此貞辰分六氣以燮陰陽環四象而調風雨椽二千九百九十根按漢書月法二千三百九十二通法五百九十八共成二千九百九十所以偶推步之規合通法之數是知疏椽構宇則大壯之架斯隆積月成年則會歷之規無爽大梠兩重重別三十六條總七十二按淮南子太平之時五日一風一年有七十二風故置七十二條所以通規瑞歷叶數祥風遙符淳俗之源遠則休徵之契飛簷椽九百二十九枚按漢書從子至午其數九百二十九所以採辰象之宏模法周天之至數且午為陰本子實陽源子午分時則生成之道自著陰陽合德則覆載之義茲隆堂簷徑二百八十八尺按周易乾之策二百一十六易緯云年有七十二合為二百八十八故徑二百八十八尺所以仰叶乾策遠承貞順和氣而調序擬圓蓋以照臨堂上棟去基上面九十尺按周易天數九地數十以九乘十數當九十故去基上面九十尺所以上法圓清下儀方載契陰陽之至數叶交泰之貞符又以茲天九乘於地十象陽倡而陰和法乾施而坤成簷去地五十五尺按周易大衍之數五十有五故去地五十五尺所以擬大易之嘉數通惟神之至賾道合萬象理貫三才上以清陽玉葉覆之按淮南子清陽為天合以清陽之色修撰國史義在典實自非操履貞白業量該通讜正有聞方堪此任所以承前繼居史官必就中擇灼然為衆所推者方令著述如聞近日以來但居此職即知修撰非唯編緝踈舛亦恐漏泄史事自今以後宜遣史司於史官內擇堪任修史人録名進內自餘雖居史職不得輒令聞見所修史籍及未行用國史等事東臺二極之基道光於上嗣貞國之本事表於元良故能創北極之風敬東序之業功少海而逾潤孚前曜而增華皇太子宏寢門標美壽街騰懿三善夙茂瑜珮以之含鏘四學早優班翰以之凝映正以年在幼沖未從監撫雖調護方勤助琢磨之器而稼穡靡喻爽德教之途然為教之方義資素習宜令皇太子宏每日於光順門內坐諸司有奏事小者並啓皇太子主者施行諸州縣孔子廟堂及學館有破壞并先來未造者遂使生徒無肄業之所先師闕奠祭之儀久致飄露深非敬本宜令所司速事營造禮樂之道其來尚矣朕誕膺明命克光正歷思隆頌聲以康至道而曲臺闡訓猶乖揖讓之容大樂登歌徒紀鏗鏘之韻良以教虧帛丿糸蕝學闕瞽宗興言盛業寤歎盈抱然則幽誠所著縱九皋而必聞忠信所存在十室而無棄但慮習俎之彥韞迹於閭閻辨鐸之英韜深於林藪夫良玉無脛求之斯來真龍難覩好之而至其四方士庶及邱園棲隱有能明習禮樂詳究音律於行無遺在藝可録者宜令州縣搜揚博訪具以名聞采章服飾本明貴賤升降有殊用崇勸獎如聞在外官人百姓有不依令式遂於袍衫之內著朱紫青緑等色短小襖子或於閭野公然露服貴賤莫辨有蠧彞倫自今巳後衣服上下各依品秩上得通下下不得僭上仍令所司嚴加禁斷勿使更然又春秋二社本以祈農如聞除此之外別立當宗及邑義諸色等社遠集人衆別有聚斂遞相繩糾浪有徵求雖於吉凶之家小有裨助在於百姓非無勞擾自今巳後宜令官司嚴加禁斷制敕施行既為永式比用白紙多有蟲蠧自今以後尚書省頒下諸司諸州及下縣宜並用黃紙其承制敕之司量為卷軸以備披桂廣交黔等州都督府比來所奏擬士人任官揀選未甚得所宜準舊例至應選補時差內外官五品以上清正官充使選補仍令御史同往注擬其有應任五品以上官者奏取處分山東江左人物甚衆雖每充賓薦而未盡英髦或孝悌通神遐邇惟敬或德行光裕邦邑崇仰或學統九流垂帷覩奧或文高六藝下筆成章或備曉八音洞該七曜或射能穿札力可翹關或邱園秀異志存棲隱或將帥子孫素稱勇烈委巡撫大使咸加採訪佇申褒獎亦有婆娑鄉曲負材傲俗為譏議所斥陷於跅弛之流者亦宜推擇各以名聞咸京天府地隘人繁百役所歸五方胥萃雖獲登秋之積猶虧荐歲之資眷言于此思蠲徭賦夫以交風奧壤測景神州職貢所均水陸輻輳今茲豐熟特倍常時事貴從宜實惟權道即以來年正月幸東都關內百姓宜免一年庸調及租并地子稅草其當道諸縣特免二年劒南隴右諸軍每供進一二年且停京文武職事三品以上官每年各舉所知或才蘊廊廟器均瑚璉體王佐之嘉猷資公輔之宏量或奇謀異算決勝千里或投石拔距勇冠三軍或謇諤忠亮志存規弼或繩違糾慝不避權豪或威惠仁明堪居牧守之重或公正廉直足膺令長之任咸宜搜訪具録封進朕當詳覽量加獎擢令雒州明揚仄陋或孝弟純至感於神明或文武兼資才堪將相或學藝該博業標儒首或藻思宏贍思擅文宗或洞曉音律識均牙曠或深明歷數妙同京管者咸令薦舉門下故玉清觀道士王遠知性含幾賾迹徇幽元體茲縣解見稱先覺自締構之初迄光華之旦綢繆恩遇事昭綸綍仙化不追英靈寖遠眷言留舄宜有褒崇可贈太中大夫諡曰升真先生主者施行故符璽郎李延壽藝文該洽材兼良史撰政典一部詞殫直筆雖其人巳亡功有可録宜賜其家絹五十匹仍令詳正所寫兩本付祕書一本賜皇太子朕聞受上天之命者其道在乎愛人處皇王之位者其功先於濟物然則所修在德池籞可以假貧人所寶惟賢珍玩不足奉諸己自朕臨御天下三十餘年永念黎元情深撫育頻頒制命猶未遵行所有差科尚多勞擾關中地狹衣食難周山東遭潦糧儲或少刺史縣令寄以字人長史司馬職惟毗贊若能恤隱求瘼清直無私則囹圄於是空虛鰥寡自然蘇息而在外官司罕能奉法志存苟且不舉綱維欲使訟息刑清家給人足無為而化其路何繇今當勵精求政先身理物救乏賙無自邇及遠凡在寮庶宜識至懷其殿中太僕寺馬並令減送㣥牧諸方貢獻物及供進口味百司支料並宜量事減省雍岐華同四州六等巳下戶宜免兩年地稅河北潦損戶常式蠲放之外特免一年調其有屋宇遭水破壞及糧食乏絶者令州縣勸課助修并加給貸朕思還淳返朴示天下以質素如聞遊手墮業此類極多時稍不豐便致飢饉其異色綾錦並花間裙衣等靡費既廣俱害女工天后我之匹敵常著七破間裙豈不知更有靡麗服飾務遵節儉也其紫服赤衣閭閻公然服用兼商賈富人厚葬越禮卿可嚴加捉搦勿使更然學者立身之本文者經國之資豈可假以虛名必須徵其實效如聞明經射策不讀正經抄撮義條才有數卷進士不尋史傳惟誦舊策共相模擬本無實才所司考試之日曾不練因循舊例以分數為限至於不辨章句未涉文詞者以人數未充皆聽及第其中亦有明經學業該深者惟許通六進士文理華贍者竟無科甲銓綜藝能遂無優劣試官又加顏面或容假手更相囑請莫憚糾繩繇是僥幸路開文儒漸廢興廉舉孝因此失人賢任能無方可致自今巳後考功試人明經試帖取十帖得六巳上者進士試雜文兩首識文律者然後並令試策仍嚴加捉搦必材藝灼然合升高第者並即依令其明法并書算貢舉人亦量準此例即為常式朕聞仁者德之本叶亭育之至途禮者道之末乃帝王之餘事歷選往初詳觀曩躅惻隱以孚其化變通以會其神朕以虛薄祗膺寶位旰食宵衣懼忝於宗社如傷若厲佇濟於黎元每以皇基肇闢範圍覆載遺惠所覃昭格區宇虔荷靈命嘗慮下虧鴻業遍刊㣥嶽不足上報元功巳升聞於日觀思款謁於天臺志在告成諒非為己屬今茲豐稔方有事於嵩邱崇纍聖之丕績祈兆人之嘉佑頃者分使出巡存問風俗河南河北尚有十餘州旱潦加以朔方寇盜時或侵邊關內流離未能復業一物失所猶甚納隍數郡不寧豈宜備禮前欲以來年正月封中嶽者宜停朕以寡昧繆膺丕緒未嘗不孜孜訪道戰戰臨人馭朽懷秋駕之危負重積春冰之懼日慎一日三十四載於今矣何則足寒傷心人勞傷國下安即上逸時弊即君憂所以身處九重而情周萬姓建本之懷遽切抑末之念逾深今雖庶績巳寧淳源未洽履素歸厚者遂寂寥而靡聞徇華趨利者尚馳騖而不息朕以薄德有謝移風永念㣥方在豫多愧況朕之帛丿糸系兆自元元固當遠協先規光宣道化變率土於壽域濟蒼生於福林屬想華胥載勞寤寐所冀內外寮寀各竭乃誠敦惟黎人俱崇質舊染薄俗咸與惟新憑大道而開元共普天而更始更申沛澤廣被紘埏可改永淳二年為宏道元年大赦天下前後責情流人並放還老人年百歲以上者版授下州刺史婦人版授郡君九十巳上者版授上州司馬婦人版授縣君八十巳上者版授縣令并婦人并節級量賜粟帛孝子順孫義夫節婦表其門閭終身勿事鰥寡惸獨篤疾不能自存者量加賑恤仍令天下諸州置道士觀上州三所中州二所下州一所每觀各度七人又比來天后事條深有益於為政言近而意遠事小而功多務令崇用式遵無怠見任內外官五品以上經四考及守五品經三考六品以下計滿三考政有清勤狀無私犯者各加一階謹按道德真經廣訓卷二有改元宏道大赦詔文與此異附注於後君崇於道宅紫微以垂衣臣修於德罄丹心而作礪若使上守於義下尊於禮名教所以乖淳忠信由其漸薄在昔胥庭連陸媧燧伏羲不宰而天下化軒頊堯舜禹湯文武至公猶行深仁尚積及秦居閏位奢泰之漸聿興漢襲霸圖元默之風巳替遐觀魏晉近鑒周隋代益囂浮人踰僭侈窮百王之弊俗極千年之否運以承大亂之後方開大聖之期既逾交喪之辰必興交泰之緒我高祖神堯皇帝受鑣宮之景命蕩轡野之妖氛重懸日月一匡宇宙太宗文皇帝披圖汶水杖鉞參墟降斗極之神兵滌懷襄之巨浸張四維而安赤縣勞百戰而徇蒼生聲教遐覃提封遠亘緬維洪業無得而稱朕以寡昧忝膺丕緒未嘗不孜孜訪道戰戰臨人日慎一日三十四載於今矣況下安則上逸時弊則君憂雖身處九重而情周萬姓建本之懷逾切抑末之念遽深今庶績雖凝而淳源未洽朕之帛丿糸系兆自元元常欲遠叶先規光宣道化變率土於壽域濟蒼生於福林屬想華胥載勞寤寐所冀內外寮寀各竭乃誠敦勸黎萌俱崇質舊染薄俗咸與惟新憑大道而開元共普天而更始宜申霈澤廣被紘埏可大赦天下改永淳二年為宏道元年仍令天下諸州置道士觀上州三所中州二所下州一所每觀度道士七人以彰清淨之風佇洽無為之化主者施行朕聞為君上者以天下之目而視以天下之耳而聽蓋欲廣聞見也且夫天降災異所以警悟人君其變苟實言之者何罪其事必虛聞之者足以自戒舜立謗木良有以也欲箝天下之口其可得乎此不足以加罪特令赦之劉訥言收其餘藝參侍經史自府入官久淹歲月朝遊夕處竟無匡贊闕忠孝之良規進詼諧之鄙説儲宮敗德抑有所由情在好生不忍加戮宜從屏棄以勵將來可除名朕聞皇極者天下之至公神器者域中之大寶自非乾坤幽贊歷數在躬則鳳邸不易而臨龍圖難可輒御所以滎河緑錯彰得一之符溫洛丹書著通三之表緬稽前古其道同歸朕之聖祖神宗降星虹而稟樞電乘時撫運逢渙沸而屬山鳴濡足橫流振蒼生之巳溺援手四嶽救赤縣之將焚重稱九寰止麟鬬而清日月再安八極息龍戰而蕩風波自彼迄今六十六載黎元無烽柝之警區宇恣耕鑿之歡育子長孫擊壤鼓腹遐邇交泰誰之力歟朕以眇身嗣膺鴻緒欽若穹昊肅雍清廟顧諟明命載迪彞倫嘉與賢士大夫勵精為政勗己想蛟冰之懼為善慕雞鳴之勤幸戎夏乂安中外禔福亘月竁以覃正朔匝日城而混車書端拱無虞垂衣有截其天意也豈人事乎每導俗匡時既宏之以禮讓恤刑薄罰復躋之於仁壽聞九農之或爽則虧膳以共其憂見一物之有違則撤樂以同其戚斯亦備諸耳目非假一二言也憂勤之至庶有感於明靈亭育之懷謂無負於黔庶永言薄德遘疾彌留往屬先聖初崩遂以哀毀染疾久嬰風瘵疚與年侵近者以來忽焉大漸翌日之瘳難冀賜年之福罕邀但存亡者人之晦明生死者物之朝夕常情所滯唯聖能通脫屣萬方無足多恨皇太子哲握哀履己敦敏徇齊早著天人之範夙表皇帝之器凡百王公卿佐各竭乃誠敬保元子克隆大業光我七百之基副茲億兆之願既終之後七日便殯天下至大宗社至重執契承祧不可暫曠皇太子可於柩前即皇帝位其服紀輕重宜依漢制以日易月於事為宜園陵制度務從節儉軍國大事有不決者兼取天后進止諸王各加封一百戶公主加五十戶內外文武九品巳上各加一階三品巳下賜爵一級永徽以來入軍年五十者並放出軍天下百姓年五十者皆免課役廢萬全芳桂等官
