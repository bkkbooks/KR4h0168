  text: 全唐文欽定全唐文卷七百十五處厚字德載京兆萬年人本名淳避憲宗諱改今名元和初進士又擢才識兼茂科穆宗朝拜兵部侍郎文宗立以佐命功拜中書侍郎同中書門下平章事封靈昌郡公太和二年卒年五十六贈司空
