body:
  text: 卿文雅大臣方隅重寄表率諸部肅清全吳化洽行春風澄坐嘯眷言善政想歎在懷卿之宗門累著聲績冠內廷者兩代襲侯伯者六朝果能激愛君之誠喻詩人之旨在遠而不忘忠告諷上而常深慮微博我以端躬約予以循禮三復規諫累夕稱嗟置之座隅用比韋弦之益銘諸心腑何啻藥石之功卿既已投誠朕每懷開諫苟有過舉無忘密陳山川既遐眷矚何已必當勉已以副深誠臣聞三皇講道五帝講德三王講仁五霸講義所講不同同歸於理理道之極備於六經雖質文相變忠敬交用損益因時步驟不一然而釋三綱越五常而致雍熙者未之有也自秦火蕩爇孔壁穿蠹曲學異辨專門多惑營道之軌並馳希聖之堂蓋寡蕪文錯起浮義互生簡冊混散篇卷繁積勞神於累代弊形於當年其知愈博其得愈少夫然通方之士達識之儒且猶不為也況南面之尊司道之契豈不貪其精而遺其麤者乎伏惟文武孝德皇帝陛下精義神授博識天資山峻詞峰泉蓄學海膺休運則混六合而不讓思屈己則舞兩階而不疑故當希皇踵帝肩王轢霸可以區區近躅擬於聖德哉臣處厚臣隨採合易詩書左氏春秋孝經等因其本篇掇其精粹論紀先師微旨今亦附於篇末總題曰六經法言合二十卷獻上取諸身必本於五事通諸物兼暢於三才始九族以及於百姓刑室家以儀於天下聖君良主之往行哲人壯士之前言天人相與之際幽明交感之應窮理盡性之辨藥石攻磨之規堯舜禹湯文武理亂之道盡在君臣父子夫婦朋友之義必舉其興可以勸其違可以戒此其所存者也至如爻象錯綜陰陽難名比興箴誨幽隱難釋誥命訓論古今不合威儀數制命諸有司裦貶揚宀隹歸諸史法此其所遺者也商鞅之說秦王歎帝道之難行太宗之納魏徵流王澤而廣被繇是言之道無遠近德無重輕能者挈之如毛羽不能者舉之如嵩岱今逢希代之君當難合之運故不能以百家邪說六國縱橫秦漢刑名魏晉偷薄為盛時道歷代帝王皆務纂集魏稱皇覽梁著進畧鄴中則有修文之作江左則有壽光之書但誇衒於聞見非垂謀於理本臣今所貴實異斯作陸賈奏甚卑之論尚稱善於高皇方朔獻雜糅之說猶見知於武帝伏惟陛下機務之餘燕息之暇時降省覽天下幸甚臣某言臣伏以方岳之任職主分憂苟事涉安危利深社稷詞得專達臣敢備言是用輕冒上聞伏惟少紓僅踰數月朝廷未議所伐臣恐日長姦謀彼將膠固士心必希儌倖啗利滋蔓事則難圖當其神情尚搖足以觀釁臣自聞少陽權主留務眾未甚寧昨知少誠之子誘扇其軍又以誅戮天其或者勦絕姦類大振皇綱陛下得不上順天心乘時廢置而又謀之遲久臣竊為陛下惜之何則夫以少誠怙兵偷安二十餘載恩惠自己人知素懷眾之所懷必厚其子弟其勢以分臣度具聞不與者半所以人心持兩至有動搖以斯觀之或未盡附少陽又以新殺其子必有疑眾之心今若及未寧出其不意擇四方節制之臣可為其帥者使馳而入之移少陽於他鎮以待之彼得所安必效順承而無固眾之志則其黨自離心矣因其所離而制其命何求而不克哉易所謂見幾而作不俟終日然以方布大信不宜隱情若先命中貴奉明詔將告易位以誠諭之從而後行事可以濟臣又度當今節制可以處淮西任者莫若河中節度使王鍔寬厚慎重練識軍情必能悅慰㣥心鎮撫疑黨若將移鍔於淮西而俾與少陽不遠矣朝廷立遷授之權而內足以除姦蠹之本使少陽感恩以效命王鍔推誠以蒞眾是淮西絕繼代之業朝廷存宏貸之德亦將以息河北狐鼠之勢示去逆效順之利自然風靡以成化從此不希於苟得矣斯事體大伏惟陛下行之議者以為少陽兵戎賊臣曾居叛黨若將易處於關輔之地寵任以兵戎之權何異夫朝四暮三而終不離其數是不然也夫根深者難拔源長者難絕彼深結眾根其人久矣我能絕之使安植施於他以變其所庸非至計乎且事不先漸化之道而欲頓歸於大政亦難矣方今征承宗以名聞於天下者豈不恃眾違命邀爵乎若使少陽復而行之則其罪均矣不可獨赦則必分師以討之當淮楚災旱之餘徵賦耗竭之日是使蒼生興流亡之歎甲兵無暫息之時上以傷陛下子育之心下以竭邦賦資用之費得不審慎其舉而保其成算哉伏以國家艱難已來何北戎臣竊據州郡父歿子代兄終弟及皆朝廷稽緩其事不時即謀使生人之心率以沿習為患久矣陛下神畧獨斷超冠百王事當其機宜以時革臣不勝誠懇悃款之至臣聞汲黯在相淮南不敢謀反干木在魏諸侯不敢加兵王霸之理皆以一士而止百億之師以一賢而制千里之難伏以裴度勳高中夏聲播外夷庭凑克融皆憚其用吐蕃回鶻悉服其名今若置之巖廊委其參決西夷北虜未測中華河北山東必稟廟算況幽鎮未靜尤資重臣管仲曰人離而聽之則愚合而聽之則聖理亂之本非有佗術順人則理違人則亂伏承陛下當食歎息恨無蕭曹今有一裴度尚不留驅策此所以馮唐感悟漢文雖有廉頗李牧不能用也夫御宰相當委之信之親之禮之於事不效於國無勞則置之散寮黜之遠郡如此則在位者不敢不勵將進者不敢苟求陛下存終始之分但不永棄則君臣之厚也今進皆負四海責望退亦不失六曹尚書不肖者無因而勸臣與逢吉素無私嫌臣被裴度無辜貶官今之所陳上答聖明下答㣥議披肝感激伏地涕流伏乞鑒臣愛君矜臣體國則天下幸甚伏見赦文節目中新左降官有不該恩澤者在宥之體有所未宏臣竊聞物議皆言逢吉恐李紳量移故有此處置若如此則應是近年流貶官因李紳一人皆不得量移事體至大豈敢不言李紳先朝獎任曾在內廷自經貶官未蒙恩宥古人云人君當記人之功忘人之過管仲拘囚齊桓舉為國相冶長縲紲仲尼選為密親有罪猶宜滌蕩無辜豈可終累況鴻名大號冊禮威儀天地百靈之所鑒臨億兆八紘之所瞻戴恩澤不廣實非所宜臣與逢吉素無讐嫌與李紳且非親黨所論者全大體所陳者在至公伏乞聖恩察臣肝膈倘蒙允許仍望宣付宰臣應近年左降官並編入赦條令準舊制得量移近處臣竊聞朋黨議論以李紳貶屈尚輕臣受恩至深職備顧問事關聖聽不合不言紳先朝獎用擢在翰林無過可書無罪可戮今㣥黨得志讒嫉大興詢於人情皆共歎駭詩云萋兮菲兮成是貝錦彼譖人者亦已太甚又曰讒言罔極交亂四國自古帝王未有遠君子近小人而致太平者也又古人云三年無改於父之道可謂孝矣李紳是前朝任使縱有罪愆陛下猶宜洗釁滌瑕念舊忘過以成無改之美今逢吉門生故吏遍滿朝行侵毀加誣何詞不有所貶如此猶謂太輕蓋曾參有投杼之疑先師有拾塵之戒伏望陛下斷自聖慮不惑姦邪天下幸甚建中之初山東向化只緣宰相朋黨上負朝廷楊炎為元載復讐盧為劉晏報怨兵連禍結天下不平伏乞聖明察臣愚懇張平叔條制不周經慮未盡以為利者反害以為簡者至煩張平叔一條云應簡得公私鹽當日具都數申度支便任府縣差人勾當出糶多少逐日申報糶價之內所得見錢去上都一千里者任市當土布絹者竊以禹貢甸服五百里近者納草遠者納米是量遠近而制輕重也今言千里外市絹則是千里內須送見錢興元洋州並是八百里內駱谷道路險阻非常若送見錢實為不可又一條云州縣所要糶鹽人委所在長吏於當州當縣倉督錄事佐吏以下本所繇中揀選不得差配百姓如有鄉村去州縣路遠處即州縣揀定所繇將鹽就鄉村糶易者臣曾任刺史所繇入鄉村是為政之大弊一吏到門百家納貨今陛下方以清淨簡易休息蒼生宜去其冗員除其蟊賊今山劍州縣境土至濶其令若行煩擾至甚又一條云臣今欲獻鹽法歸於簡易但委州縣則無不濟伏緣所務至重須以廟堂宰臣充關內河東山劍等道鹽鐵使者臣竊以度支使四方稟奉不殊宰相權柄已重不假台司台司者三公論道之地雜以鹺務實非所宜三十年來竇參程皇甫鎛並以錢穀居台鉉非惟國體不可抑亦名利難兼所以參輩不受國誅必有天禍又一條云據每道每州糶鹽不少今所在戶口都不申明實數臣請令長吏有不親公事信任所繇浮詞云當界無入糶鹽交恐不濟臣即請差清疆巡官往所訴州簡責實戶口數團保者臣曾為外州刺史備諳此事自兵興以來垂二十載百姓粗能支濟免至流離者實賴所存浮戶相倚兩稅得充縱遇水旱蟲霜亦得相全相補若搜索悉盡立至流亡宇文融當開元全盛之時搜丁出戶猶以殘人斂怨瘁國害身此策若行則甚於彼臣前月二十四日思政殿面奉德音深䘏疲人且不配戶聖德周悉繇見事情臣等退而抃躍以為昇平坐致若據此節即與配戶無殊平叔所陳未副聖德又一條云諸州府縣簡得鹽便於當處官倉收貯其京城兩縣簡責得鹽於度支兩常平院貯當日各據數勒留依所定估出糶從敕下後諸巡院便計料般鹽分付府縣供糶常令所貯有剩不得令闕如有違闕知院官聞奏貶遠惡處官典所繇節級重科決停解如府縣不存公心課利減耗及所送官鹽價匹段濫弱幷送納不時妄有申訴其京兆亦令司錄及觀察使停見任改散慢官其專判鹽案及刺史請貶與上佐本州專判案官錄事參軍縣令亦請遠貶者臣竊以古人云人愛其裘反而負芻皮既不存毛將安傅皮喻百姓毛喻國家百姓不存國家不立今兩稅編戶是國根本擇忠信之長命慈惠之師推赤子之仁布愷悌之化猶懼不及而有傷痍今為鹽鐵不登便須貶黜雖龔黃召杜之政卓魯蒲密之能無所施於聖代矣又一條云以設法之初沮議者眾聖斷先定則成績可期令出之後輦轂之下尤要隄防恐爾兩軍市人鹽商大賈或行財貨邀截喧訴臨時必有此色奸人伏乞聖慈委兩軍中尉兼京令尹切加把捉如有此色捉獲頭首所在決殺連狀聚眾人各加脊杖二十者臣竊以古人云利不百不變法工不十不易器改更之事自古所難故云謀不欲多決之欲獨臣於平叔無親故無讐嫌所陳者非挾情所議者歸利害惟聖上獨斷推於至公然彊人之所不能事必不立禁人之所必犯法必不行臣嘗為開州刺史當時被鹽監吏人橫攪官政亦欲鹽歸州縣總領其權嘗試研求事有不可蓋以設法施行須順風俗或東州便則西州害或南州易則北州難且據山南一道明之興元巡管不用見錢山谷貧人隨土交易布帛既少食物隨時市鹽者或一斤麻或一兩絲或蠟或漆或魚或雞瑣細叢雜者皆因所便今逼之使出帛則俗且不堪其弊官中貨之以易絹勞而無功伏惟聖明裁擇問皇帝若曰朕觀古之王者受命君人兢兢業業承天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徵極諫而文學稍進匡時濟俗罔不率繇厥後相循有名無實而又設以科條增求茂異捨斥已之至論進無用之虛文指切著明罕稱於代茲朕所以歎息鬱悼思索其真是用發懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間驩然相與子大夫得不勉思朕言而茂明之我國家光宅四海年將二百十聖宏化萬方懷仁三王之禮靡不講六代之樂罔不舉浸澤於下升中於天周漢已還莫斯為盛自禍階漏壤兵宿中原生人困竭耗其大半農戰非古衣食罕儲念茲疲甿未遂富庶督耕殖之業而人無戀本之心峻榷酤之科而下有重斂之困舉何方而可以復其盛用何道而可以濟其艱既往之失何者宜懲將來之虞何者當戒昔主父懲患於晁錯而用推恩夷吾致霸於齊桓而行寓令精求古人之意啟迪來哲之懷眷茲洽聞固所詳究又執契之道垂衣不言委之於下則人用其私專之於上則下無其功漢元優游於儒術盛業竟衰光武責課於公卿峻政非美二途取捨未獲所從余心浩然益所疑惑子大夫熟究其言旨屬之於篇興自朕躬毋悼後害對臣聞古之以道艹泣天下皆酌之人言用凝庶績伏惟陛下統承丕緒光膺駿命志氣中蘊清明下臨恤黎庶而惠慈方洽梟叛戾而威武已熾猶能慮危於未兆思理於已安聿追孝思纘述前烈愍官吏之無用求斥已之至言微臣才用不足以操事體識不足以經遠祇奉聖問伏用兢惶謹昧死上愚對制策曰朕觀古之王者受命君人兢兢業業承天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徵極諫而文學稍進匡時濟俗罔不率繇厥後相循有名無實而又設以科條增求茂異捨斥已之至言推無用之虛文指切著明罕稱於代茲朕所以歎息鬱悼思索其真是用發懇惻之誠諮體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間驩然相與子大夫得不勉思朕言而茂明之臣聞復濟慎懼雖危必樂理安佚肆雖順必憂帝堯之為道也大矣書稱其本曰允恭克讓文王之為德也宏矣詩美其功曰小心翼翼圖天下之安者必稱之於勞慮天下之大者必慎之於微任賢誠固思慮誠深百姓雖未富庶四夷雖未賓服天下明知其治也任賢不固思慮不深百姓雖富庶四夷雖賓服天下明知其亂也今陛下鑒前代已往之失求當今未然之理使虛文不設於下至言必聞乎上端視凝聽所委惟賢則上獲其益矣惠爵施祿所理惟直則下輸其情矣顧言而動思利乎安則何慮乎言之不行顧行而動思利乎安則何慮乎行之有倦誠能兢兢於一日二日業業於無小無大苟能此道雖微必昌雖柔必強鳳凰麒麟不足來甘露醴泉不足致三光四時不足序天之高明也斯不愛其道地之博厚也斯不愛其寶彼之大者猶若是況其細者而難乎制策曰我國家光宅四海年將二百十聖宏化萬邦懷仁三王之禮靡不講六代之樂罔不舉浸澤於下升中於天周漢已還莫斯為盛自禍階漏壤兵宿中原生人困竭耗其大半農戰非古衣食罕儲念茲疲甿遂乖富庶督耕植之業而人無戀本之心峻榷酤之科而下有重斂之困舉何方而可以復其盛用何道而可以濟其難者伏以陛下蘊充明德繼荷大業居十聖之全區宇守百代之成禮樂揚高祖之耿光播太宗之休烈思黷武而弭戢念疲甿之富庶理自順此生危自反此作兵者國之威也威不立則暴不禁君得其術而已舉其要而已凡善用兵者用兵之精次用兵者用兵之形用精者國逸而功倍用形者人勞而威立令行禁止俗富刑清仁足以懷義足以服端居廟堂之上威加四海之外而叛者嘗欲繫其頸而制其命伏其心而笞其背此兵之精也金鼓擊刺追奔逐北攻城掠地斬馘獻俘憂思巖廊之上謀制千里之外而叛者有以畏其威而懲其罰化其心而戢其暴此兵之形也陶然而化其效不形兵貴藏有於無兵之形不可張也騷然而動其政難久人不可終擾兵之精所宜密勝也今陛下既梟叛寇復征違命屈已之至已浹於兆庶恤人之誠已敷於四海乘眾之怒用兵之形則近無轉輸搔擾之勤遠無經費供求之役誠能固守必大畏其力小懷其德矣豈兵宿中原之為虞生人耗竭之為慮臣又聞理國之本富之為先富人之方勸農為大三代以耕藉率天下漢朝以孝悌配力田皆勸之之道夫農寒耕熱耘沾體塗足晝夜之筋力勤焉父兄之手足悴焉而官輸籍督坐非已有夷時郡邑長吏偷容朝夕養聲釣祿非恤人隱此所以耕植之業不勤戀本之心不固有遁於軍旅而邀功賞者有冒於老釋而瀆清濁者有逸於負販而制貧人者有隱於椎剝而干教令者農耕之難也如彼日百其勸常有不務者矣游惰之逸也如此日百其禁常有不息者矣由上之為政知人苦之者勸之必深知人樂之者禁之必至昔賈琮以最於十二州頒之以璽書黃霸以甲於二千石寵之以侯印惟陛下注意於守宰字人之官以田墾闢為最地荒榛人離散為殿即耕植可勸困竭可蘇兵未弭則人不蕃人不蕃則農不勸農不勸則國用虛此榷酤所以興也然鹽麴之稅山澤之利法用得其要不在峻其科理不得其吏猶不明其法明其法得其要則上無峻刻之舉下無重斂之困矣陛下制策曰既往之失何者宜懲將來之虞何者當戒臣聞王者之興皆鑒乎前代聖君賢佐之所以興昏主庸君之所以喪景行其興也用得以常理戒慎其喪也用得以常存詩人美殷鑒於有夏賈山諫漢而借喻亡秦備於圖籍著於編冊非臣繁詞所可曲盡自陛下統極舉滯淹已逋責恤刑獄振乏絕德澤所臨戴之不暇微臣未見其失也明將來之戒其在法令刑賞乎四海之廣億兆之眾非家令戶告之能也發號出令而已矣伏惟陛下聿求善政大振洪猷人之獻替政之損益燦乎其書灼乎其人始則鼓舞蹈詠不足以克其善終則渴日望歲不足以喻其勞教之本莫大乎復言政之先莫大乎重令誠能復言重令上之克當乎天心下之允協乎人情天人交相為感而災害不生禍亂不作非此則日有德音而人不悅日有威罰而人不畏苟不悅矣無與同勸苟不畏矣無與同沮此非法令之可裁也成一時之功者寵乎其功者也思百代之利者榮乎其名者也其名不足以勸者則刑罰存焉其效不得而寵者則襃貶存焉是小人之所趨君子之所務今陛下刑賞已足勸懲襃貶又存文史君子竭忠小人輸力舉如鴻毛拾如地芥何為而不成何求而不效陛下之不為非不能也伏以致誅逆黨罪止渠魁原情究惡不及其母此帝王之刑也戎臣饋軍致命折寇渥恩必厚爵位必加此王霸之賞也然善有彰雖賤賞也惡有釁雖貴罰也賞一人不足以聳天下之善者其賞不足行刑一人不足以禁天下之暴者其刑不足用今宜賞不遺微細惟功之所加罰不為暴亂惟罪之所出此天下之人所以皆知賞之可重而罰之可戒制策曰昔主父懲患於晁錯而用推恩夷吾致霸於齊桓而行寓令精求古人之意啟迪來哲之懷眷茲洽聞固所詳究臣聞漢興鑒亡秦孤立之弊蹤周官眾建之法苴茅列土非復異姓其後吳楚彊大本根不拔晁錯之策未終七國之兵已發主父念前事之敗露期本朝之彊大分封子弟使得推恩諸侯之國星解於上漢廷之威風行於下此所以為謀也齊桓當周季陵夷之運思大彰翊霸之功志圖兼弱力存攻昧思逞其欲是務彊兵習之野大國防其謀習之朝小國謹其備其志不可以速得其功不可以立俟用為隱政而行寓令此其所以霸也制策曰執契之道垂衣不言委之於下則人用其私專之於上則下無其效漢元優游於儒學盛業竟衰光武責課於公卿峻政非美二途取捨未獲所從吾心浩然益所疑惑子大夫熟究其旨屬之於篇興自朕躬無悼後害者臣聞契者君之所司也綜其會歸則庶務隨而振之職者臣之所司也踐其軌跡則百役通其流矣委之於下者委之職業也非委其權專之於上者專其操持也非專其事賞罰好惡之出生殺恩威之柄此非權與操持乎委之於下則上道不行矣提衡舉尺守器執量此非事與職業乎專之於上則下功不成矣不委其操持安所用其私乎不專其職業孰慮無效乎君收其大柄臣職其所守然大柄不得亢於上臣得佐而成之所守不可屬於下君得舉而明之故乾之經曰首出庶物坤之文曰地道無成而代有終乾陽物也坤陰物也陰陽合而泰形焉陰陽離而否形焉君臣之道蓋象乎此漢元優游於儒學而權歸王氏失其所專也光武責吏事於三公而勞神簿書集其所委也一則曠而蕩一則察而陿既非中道不可以範所謂陰陽乾坤之說各存其道而交有所感然成其悠久配乎持載如此而已才者綜物以研務識者辨惑而不泥體者撫往以經遠用者臨事而造至神而明之可以輔陶鈞可以贊化育微臣固陋從師之說循名而實不克承問而學不稱進退殞越懼煩刑書謹對相公閣下伏以燕國張公說登翊聖明底寧泰階推心旁求虛已下納房太尉由布衣振起於門下張曲江自蓬戶發揮於嶺底而繼播休名襲佩相印克懋勳德不忝揄揚後之朝望因以興勸不多二公而推燕國者以雜居㣥倫齊齒下輩崇構棟幹則杪忽方輕琢飾珪璋則蒙昧未曜器用既光持之於耳目之前垂後而無配名節兼大用之於身世之後希古而絕倫夫豈推策考步之為乎藏往知來之兆乎蓋合以尺牘片言申以考跡定貌靈異五行之鍾粹也文章心靈之造形也著誠居業本隱以之顯觀心擇術自粗以之微以是而求則坐決萬方之內立斷百代之下其術既定其道甚明竊見前進士皇甫湜年三十二學窮古訓詞秀人文脫落章句簡斥枝葉游百氏而旁覽折之以歸正囊六義以疾馳諷之以合雅苟堅其持操不恐於囂囂之訕修其踐立不誘於藉藉之譽孟軻黜楊墨之心揚雄尊孔顏之志形乎既立果於將然至於用心合論操毫注簡排百氏之雜說判九流之紛蕩摘其舛駮趨於夷途徵會理軸遣訓詞波無不蹈正超常曲暢精旨置之石渠必有劉向之刊正㣥言列之東觀必有孟堅之勒成漢史施之奏議必有賈誼之兼對諸生天既委明於斯人苟回險其道未得按輪而驅則必混翼於天池飱精於沆瀣秉矰繳者從而道之固無及矣儻得遊門下信其才能相公得徇公之名有摭奇之實後進幸甚舍人驂御賤役也猶能達掃門之事禰衡雕蟲薄技也猶能遇非常之薦今某辱奉恩顧實百於舍人之儔皇甫湜蘊積才志固百於正平之量處厚百舍人之勢不能達百正平之心方切恃私於門館明者觀之其恥非一也懼愚瞽不盡謹繕其書論賦合八首用卜可否輕凟嚴威下情不任戰懼之至魏晉已後復典綜機密政本中書詔命詞訓皆必由焉唐有天下因襲前代爰自武德時有密命則溫大雅魏徵李百藥岑文本之屬視草禁中乾封年則劉懿之周思茂范履冰之倫秉筆便坐自此始號北門學士皆自外召入未列秘署元宗開廣視聽搜延俊賢始命張說陸堅張九齡徐安貞輩待詔翰林厥后錫以學士之稱蓋由德成而上與夫術數工藝禮有所異也逮自至德台輔伊說之命將壇出車之詔霈洽天壤之澤導揚顧命之重議不及中書矣尺牘旁午章奏叢至指蹤中外之畧謀謨帷幄之秘陰陽造化嘉猷密勿萌制乎將然事構乎無形皆功歸元后而德播興運循名跡者莫窺其轍想風彩者孰究其端雖然臧否無得而稱矣貞元中由此而居輔弼者十有二元和中由此而膺大用者十有六近日丞相府不由內庭者斷國論宰法度雖有利器長材未免缺折掉撓建中以來簡拔尤重故必密如孔光博如延州文如卿雲學如向歆器如黃顏直如史魚然後得中第士之游心處已景行於六如者而又飾之以潔球璋之行貫金石之誠雖潛聲匿跡莫能脫漢時始置尚書郎五人平天下奏議分直建禮含香握蘭居錦帳食太官則今之翰林名異而實同也時論以為登玉清翔紫霄豈蓬山瀛州而足喻乎齊桓公納廄人編棧之說以為直木傅直則曲無由至曲木傅曲則直無由至後之君子戴明聖協盛時推廄人之規移於引賢使如貫珠駢璧則瑕瑜不雜矣內給事李常暉內謁者監王士政並掌院事延於十年與直狥公之議聆於朝端中書舍人杜元㯋兵部侍郎沈傅師洎諸學士皆涉歷歲久備乎前文者也李常暉以北閣舊記室別堵殊義非貫通改於前廳僉以為便聖上紹復墜典留神太古處厚因與司勳郎中路隋職參侍讀通籍近署紀述之事前託沈傅師沈公以為稱善之在已不若使其人讓於處厚無以辭時皇帝統臨四海之初元也應身無數天竺降其一禪祖有六聖唐得其三在高祖時有道信叶昌運在太宗時有宏忍示元珠在高宗時有惠能筌月指自此脈散絲分或遁秦或居洛或之吳或在楚秦者曰秀以方便顯普寂其允也洛者曰會得總持之印獨曜瑩珠習徒迷真橘枳變體竟成檀經傳宗優劣詳矣吳者曰融以牛頭聞徑山其裔也楚者曰道一以大乘攝大師其黨也三祖之德之疑也則無一心可攝無一境可遣不攝不遣冥於大順之言也則稱器投物量機應命皆持權以明實用實而照權自時厥後迷方滯跡是非迭興物我不泯正南而邪北有北而空南而不知南之心生自同北矣北之見滅乃亢南矣大師振法之鐸操化之衡非中非徼非妄非覺無居可以留神無入而不自是乘大智而獨逝遊法區而無涯大師東海徐氏衢州須江人也母氏方娠必絕葷而後食合宿既誕必擇乳而後飲幼而出世奇表秀物童而落髮異骨見頂依本郡潛靈寺僧惠績二十受具戒若律若禪無不通貫後謁道一於江西時趨者川奔學者市聚一扣祕賾廓然懸解乃以拯物為心博施為任契心於洪州應緣於上京孝文皇帝既清大難齋心無為建中尉以總武旅名功德以統緇黃大師來之夕也右神策護軍霍公見夢焉翌日訪之於慈恩寺且與寐合遂表聞為內道塲供奉大德順宗皇帝之在儲闈問安之餘棲神道域嘗問尸剎禪師經言大地普眾生見性成佛道答曰佛猶如水中月可見不可取後因問大師曰佛性非見必見水中月何不攫取順宗然之復問何者是佛性答曰不離殿下所問默契元關一言遂合後入內神龍寺法會㣥僧有湛然法師者登座云佛道遐險經刦無量南鄙之人欺紿後學大師曰彼自迷性盲者可咎白日耶順宗顧謂諸王曰彼不諭至道其儔叱下數旬而卒後德宗降誕日於麟德殿大延論議龍梵冥護人天傾聽時有問者曰心有也曠刦而滯凡夫心無也剎那而登妙覺何也大師曰此乃梁武帝云然心有者是滯於有既有矣安可解脫無也何人而登妙覺大師之旨蓋以為㣥生十號等為有已迷者終不復悟等為無已悟者終不復迷時會中有讚道云云無以比大師曰行止偃息畢竟以何為道對曰知者是道大師云經云不可以不識識不可以不知知安得知者乎復曰無分別是道大師曰經云善能分別諸法相於第一義而不動安得無分別者乎復曰四禪八定是道大師曰佛身無為不墮諸眾安在四禪八定者乎問者辭窮眾皆愕眙大師之旨蓋以一切法是一切法非於無性無象而有得有喪一切亦非於有形有紀而無取無捨一切亦非夫然豈可以一方定趣決為道耶故大師以不定之辨遣必定之執袪一定之說趣無方之道自是兩宮崇重道俗宗仰累錫縑繒不可畢紀奔問禪扃日聞祕偈一味之雨雖無二沷眾殊之器皆有所拘以是及門者至多入奧者蓋寡大歷中遊上饒郡西百里所山名鵝湖三峯秀揭摩霄蔭江雞犬四絕植錫宴坐三日有獵者棄弓矢奔告邑落或披苫蓋或窟巖石未逾旬而來者襁屬其格物也如此既而涉夏學者如麻朝粥既罄咸請白大師師曰無憂及旦有負米而施者其前知也如此先是㣥虎暴噬大師遇之於路以杖扣其首曰當息害心自是虎遠遁其仁感也如此貞元初禮部侍郎劉太真出典是郡通津修梁為水所敗以大師為眾嚮伏虔請下山成於不日其應物也如此永貞初順宗不康大師遂歸本郡京師祖道者自皇都及灞上車蓋溢路所至皆嚚傲恥革刑獄用省故郡守藩岳無不請益以為有助於政術元和十三年正月甲子告門人曰我七日為最後供是日清晝澄霽當峯有雲沓起俄而覆於禪室眾鳥鳴號哀聲如人時左右進藥侍者曰此宜在晨旦大師曰汝果知有晨旦乎其夜恬然順化報齡七十有三僧臘五十有四門弟子無數或巡名山百郡今親侍左右者則廣濟翛然獻中普修靈宏昭并徒眾等奉其全身建塔於其地夫無生之應物動而皆寂順緣而無生靜而無窮故其來則入皇宮登寶座而瘖異論其往則闕下國感殊類而羶法存委和也吾何恃存委蛻也吾何恒亡門人宏鑽仰之志存示現之轍僉議琢石傳之無窮銘曰峻頂方顙蓮目秀眉望焉溫溫即焉熙熙示為法器載為德儀我與五蘊不即不離鏗然華鐘擊之不窮無跡無眹如指揮空了性非言捨言何從無患言說如響隨風溺權遠實滯實異權權實合融正智乃圓獨覺利器無漏後根奚思爰度莫究其源清靜久虛包囊無裔無起無滅無縛無解迷者炎宅悟者涼界是中不二乃造實際資是至因登平極報具三十二成八十好御一乘車摧五魔道以色觀我是謂邪倒花房百億一土一佛澄波千川一水一月月體其二波影千別吾師於斯善行無轍
