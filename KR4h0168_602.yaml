front:
  text: 全唐文欽定全唐文卷六百二劉禹錫四
  hash: sha256:922e6c25a4b317337b9695e5e1f2ee8cbd82563a122c4c150243512a61521b04
body:
  text: 臣某言中使某乙奉宣聖旨賜臣春衣一副王人臨第御府降衣抃舞失容捧戴無措臣某中謝伏以律當春暮慶洽時邕萬物被薰風之和九天垂湛露之澤臣受任非次速尤是虞方懷匪服之憂更荷解衣之賜恩加盡飾拖朱紫而為榮受非以庸顧形影而增愧丹誠徒罄元造難酬無任踊躍感恩之至臣某言中使某乙至奉宣聖旨賜臣冬衣一副恩降重霄榮加陋質承旨慶抃省躬慙惶臣受任已來微效莫著每更時律慙曠官常豈謂元造曲成鴻私薦及念茲戒寒之候錫以禦冬之衣抃舞失容顧眄增飾鶴紋是錫遠慙晉代之賢鵜翼不濡實懼曹風之刺無任感戴屏營之至臣某言中使陳日華至奉宣聖旨慰勞臣及將佐官吏僧道耆老百姓等并賜臣墨詔及春衣兩副大將衣四副王人捧詔御府降衣寵光不隔於遐藩慶賜猥霑於裨將臣某中謝臣素乏器能謬膺驅使每慙效薄常懼食浮陛下覃以至仁均其厚施宰元和而布澤順時律以頒衣出自禁中賁於臣下執領禬而抃舞失次被纖柔而顧盻增輝舉體動容既安且吉在身不稱恐招鵜翼之譏居任無功叨受鶴紋之賜下延將校同荷生成臣某言德音爰錫降自煙霄黔黎沐賜共成睿渥臣某中謝伏惟皇帝陛下誕敷文教丕變時雍遐邇克清翔泳咸若臣謬膺寵任每愧素餐荷海嶽之私無毫釐之績式用衣裳在笥之戒惟愧輕暖被身載咏維鵜在梁之詩罔知死節之所誓當訓勵士伍寧輯閭里盡瘁竭心以酬天造臣與大將等無任感戴屏營之至臣某言恭承御封捧授恩錫喜懼交集精魂若飛臣某中謝臣夙荷寵榮累仗旄鉞西戎未殄無式遏之勞東郡已安有息偃之逸高秋空度永夕知慙陛下亭育深慈生成大德三軍挾纊俯聽綸言九月授衣載馳天使臣被服既畢感戴難勝誓當罄節苦心死生立效敢以微軀陋質麗靡自安臣所守有限不獲奔走丹墀犬馬微誠伏增竊戀臣無任云云臣某言中使王國清至伏奉聖旨慰勞臣及將佐官吏僧道耆壽百姓等并賜臣墨詔及冬衣兩副大將衣四副者太明昭回遠燭下土殊錫稠謺延及偏裨慶忭失圖捧戴相賀臣某中謝臣謬承委寄獲守藩條灰琯屢移塵露無補陛下至仁天覆元化風薰頒以兼衣賁茲瑣質降自天府光於轅門緘縢既開覩綵章之盛飾蹈舞而服發溫燠於祁寒愧塵補衮之名更荷解衣之賜恩波下浹將校同霑共戴殊榮咸思竭節生成是荷雨露難酬臣無任懇悃慙荷之至臣某言伏奉今月一日制書以臣當州連年歉旱特放開成元年夏青苗錢并賜斛㪷六萬碩仰長吏逐急濟用不得非時量有抽斂於百姓者恩降九天澤周萬姓優詔纔下㣥情頓安臣某誠歡誠喜頓首頓首伏以災沴流行陰陽常數物力既竭人心匪遑輒敢奏聞本求賑貸皇恩廣被元造曲成既免在田之征仍頒發廩之賜臣謹宣赦文節目彰示兆人鼓舞歡謠自中徂外臣初莅所部便遇儉時今蒙聖慈特有賑恤主恩及物已為壽域之人眾意感天必有豐年之應臣恪居官業不獲拜舞闕庭臣無任感激臣某言臣奉五月二十九日敕牒據度支所奏諸道節度觀察使及州府借便省司錢物斛斗等數內當州欠三萬六千二十三貫石並放免者殊私忽降逋債滌除藩方永安遐邇咸悅臣某誠歡誠喜頓首頓首伏以關輔之間頻年歉旱田租既須矜放公用又不支持承前長吏例有借便以救一時之急皆成積欠之名既未支填常懷憂懼聖恩周洽洞見物情爰命有司使之條奏去其舊弊眾已獲安嚴立新規人知所措臣恪居官次不獲拜舞闕庭臣無任抃躍屏營之至臣某言伏奉去年二月十五日敕蘇州宣賜米一十二萬碩委刺史據戶均給者恩降九天澤流萬姓伏以臣當州去年災沴尤甚水潦雖退流傭尚多臣前月到任奉宣聖旨闔境老幼無不涕零詢訪里閭備知凋瘵方具事實便欲奏論聖慈憂人照燭幽遠特有賑恤救其災荒蒼生荷再造之恩儉歲同有年之慶臣忝為長吏倍萬恆情無任感激抃躍之至臣某言中使竇國安奉宣聖旨賜臣新茶一斤猥降王人光臨私室恭承慶錫跪啟緘封臣某中謝伏以方隅入貢采擷至珍自遠爰來以新為貴捧而觀妙飲以滌煩顧蘭露而慙芳豈蔗漿而齊味既榮凡口倍切丹心臣無任歡躍感恩之至臣某言中使某乙奉宣聖旨賜臣新茶一斤猥沐深恩再霑殊錫承旨慶抃省躬慙惶臣某中謝伏以貢自外方名殊眾品效參藥石芳越椒蘭出自僊俯頒私室義同推食空荷於曲成責在素餐實慙於虛受臣某言中使某至奉某月日敕書手詔賜臣元集要廣利方五卷者將吏森列黎元寂聽絲言溥及感荷德音緗帙頒開皆覩聖作臣某中謝伏惟皇帝陛下元風御宇教以五常赤子愛人念其六疾遂長驅和扁高視農軒刪彼繁蕪摭其簡驗莫非十全之妙不勞三代之醫况慮軫服乘療覃牛馬圓首方足畢荷亭育之恩含齒帶觡盡歸仁壽之域臣奉明詔併工繕錄俾封疆之內日月俱懸雖聾瞽而必知在幽偏而亦達臣所守有限不獲走奔闕下蹈舞彤庭無任踊躍屏營之至臣某言中使某乙至奉宣聖旨賜臣新橘若干顆特降恩光猥頒慶賜珍踰百果榮比兼金臣某中謝伏以丹實初成苞貢爰至芬馨味重方列於御筵雨露恩深忽霑於賤品感同推食事等絕甘豈惟適口為珍實冀捐軀上答臣無任感戴之至臣某言中使某乙至奉宣聖旨賜臣新柑若干顆特降殊私再頒名果自遠稱貴以新為榮臣某中謝伏以果實既成南方有貴瓊茅合貢中禁為珍方外貢來人間未覩黃苞輝穎雕俎增華芬芳初佐於天庖慶賜忽霑於凡口甘踰萍實剖食既同於楚謠寒比蔗漿析醒何慙於漢史恩光斯重尸素彌彰誓當捐軀以申上答臣無任感戴之至臣某言中使劉光弻至奉宣聖旨慰勞臣及將佐官吏僧道耆老百姓等兼賜臣墨詔并衣一副金花銀器三事絲索一軸大將衣四副綵絲五軸寵光薦至慶賜曲霑忭舞失容捧戴無力臣某中謝伏以朱明仲月端午佳辰萬國被薰風之和九天垂湛露之澤臣幸逢休運獲守外藩叨承睿慈猥霑榮賚發詔而煥窺宸翰振衣而頓失炎威色絲表祥載光於佩服珍器充玩盡飾於圓方恩輝既盈喜懼交集下延裨將共荷鴻私無任感戴之至臣某言德音曲被喜溢㣥情厚賜遐頒榮霑陋質臣某中謝伏以蕤賓在律端午御辰慶列丹墀守藩莫及恩隨綵縷捧軸難勝况衣極珍纖凉生溫暑器皆照爛光發戶庭竊慙彼己之詩敢忘滿盈之誡惟當莅戎有勇訓俗知方永懷銘縷之誠冀申赴蹈之節臣與大將無任感戴踊躍之至臣某言今日中使某官至奉宣詔書賜臣及將士臘日口脂香藥紅雪等自天有命蹐地無容虛受寵光翻成憂負臣某中謝臣位居方鎮才實凡庸郡邑臨人未移風於弊俗歲時頒物空竊賜於聖明特降璽書重加靈藥潤之膏液襲以蘭芳期美疢以蠲除冀頹顏而可駐殊私不遺於一物曲澤下及於三軍未報主恩慙於犬馬惟將臣節死於封疆臣某言中使霍子璘至奉宣聖旨存問臣及將佐官吏僧道耆壽百姓等兼賜臣墨詔及貞元十七年新歷一軸臘日面脂口脂紅雪紫雪并金花銀合二金稜合二皇明遠燭殊錫薦臻抃舞失容捧戴無措臣某中謝伏惟皇帝陛下立極御天順時布政禮崇大蜡澤浹遐藩臣叨榮日深竊位時久謬迴宸睠猥降王人天書下臨覩三光之照耀玉歷爰授知四氣之環周雕匳既開珍藥斯見膏凝雪瑩含液騰芳頓光蒲柳之容永去癘疵之患命輕恩重上答何階無任感抃屏營之至臣某言中使某乙至奉宣聖旨賜臣紫雪紅雪面脂口脂各一合澡豆一袋特降王人俯臨私第銜恩慶抃省已慙惶云云臣謬荷寵私素無績效空變星霜之候猥霑慶賜之恩跪捧雕匳榮觀珍藥功能去疾永絕於癘疵澤可飾容頓光於蒲柳生成是荷雨露難酬無任感戴臣某言中使某乙至奉宣聖旨賜臣畫鍾馗一新歷日一軸恩降雲霄光生里巷雖當歲暮如煦陽和臣某中謝伏以將慶新年聿修故事繢其神象表去厲之方頒以歷書敬授時之始微臣何幸天意不遺無任感戴屏營之至臣某言高品某乙至奉宣聖旨賜臣畫鍾馗一新歷日一軸星紀方迴雖逢歲暮恩輝忽降已覺春來臣某中謝伏以圖寫威神驅除㣥厲頒行律歷敬授四時施張有嚴既增門戶之貴動用叶吉常為掌握之珍瞻仰披尋皆知聖澤無任欣戴之至臣某言伏奉制書襃贈臣亡父先臣某官尚書左僕射者時逢霈澤禮極徽章臣某中謝臣家受國恩至臣累葉常懼不克負荷以忝前人豈期多幸遭逢猥居高位陛下應乾御極作解庇人恩浹寰區禮崇宗廟垂仁布德自葉流根紫書忽降於重霄密印榮加於厚夜星霜增感蒸嘗有輝非臣隕越所能上報無任感咽屏營之至臣某言臣得進奏官裴遘狀報今月九日軍器使梁延壽奉宣進止付所司准省牒賜臣門㦸十二竿者恩降雲天榮加門戶承旨慶抃省躬慙惶伏以禮著等威朝有命數是昭懋賞必在疇庸臣謬荷寵光素無績效旌旄之寄巳忝外藩棨㦸爰列更光私第賁於棖闑慶及子孫覩茲盛儀實愧虛受無任欣戴屏營之至臣某言伏奉詔旨以臣所請畿內折糴宜令度支計會定數奏來者天慈廣被人瘼是求臣自理京邑不先威刑唯務便安所期富庶每因賜對常奉德音府縣之間巨細令奏伏以聖明在上風雨應時順成之年穀糴常賤若無輕重之法必利兼并之家輒敢上聞請行折糴天光下燭人隱無遺宣付所司允臣所奏事關理本惠及生靈臣忝尹京倍百欣荷無任歡躍屏營之至臣某言伏奉十一月二十九日詔書其濠泗兩州令臣依前收管臣謬承寵光作鎮淮海位均九伯權總十連內省無堪常恐不逮豈謂恩私曲被封略有加慙無報政之勤重受分憂之寄伏以兵戎方息閭里未安謹當奉宣皇風慰彼黔首且責成於牧宰期不失於澄清伏惟聖明俯賜昭鑒臣無任感戴屏營之至臣某言臣監軍使判官劉寄至伏奉敕書手詔兼奉宣口敕奏事官王穆迴又奉尺書手詔兼宣口敕并慰撫問臣及將士等聖慈稠謺感戴無階臣某中謝臣跡忝總戎力慙致果一昨勵兵秣馬破賊攻城皆承睿略指蹤廟謨制勝豈臣庸妄敢竊勳勞每佳馮異推功見稱良史常惡樂羊求賞翻謝謗書拳拳血誠天實諒只但以孤根獨立眾口易誣銷骨為虞撫心是懼樹楊恐拔非獨一人采葛畏讒信如三月忘寢與食以榮為憂陛下聖聰聽卑宸鑒燭遠天書軫念口詔宣慈特荷知臣之明累矜報主之效許之純直慰以貞堅北闕之恩謬加倚賴東門之倚又切防虞寵兼腹心澤浸骨髓載欣載躍感戴無階豈惟翦逆梟兇獨申微效實冀粉身灰骨上答殊私臣無任臣某言王敬仁至奉口敕存問微臣憫其疎遠之悲慰其違離之思臣某中謝臣自今春分司入洛即屬陛下受命承天企揖讓之盛儀隔肅雍之大禮元英匝歲日夜懷歸白雲在天闕庭難見豈期廷王褱為寶尚憶他山之石貞明溥臨遠及容光之地仁深行葦眷甚遺簪草木之誠何酬造化無任感恩慕戀之至臣某言中使陳日華至奉宣聖旨存問兼賜臣墨詔又以臣所奏羅珦及裴靖政理有方今各賜手詔激賞者恩降重霄澤流下土義敦獎勸榮冠等夷臣某中謝臣昨以羅珦裴靖勵精吏理效用著明人感悅安俗致殷阜恐須甄錄以勸在官輒獻封章具陳成績伏蒙睿覽俯亮愚衷嘉理行之尤光示絲綸之深旨守道者益以固志懷慝者由是悛心激俗化人於茲為大臣謬司廉察職在澄清幸遇旌善之時獲免蔽賢之責無任欣戴之至臣某言中使陳日華至奉宣聖旨慰勞臣及將佐官吏僧道耆壽百姓等兼賜臣墨詔恩降紫泥澤流下土跪奉自天之命遙傾捧日之心臣某中謝伏以皇帝陛下凝旒穆清軫念黎獻巳洽雍熙之化尚存宵旰之勤遠降王人特紆宸翰慰問稠謺曉諭便蕃任重力微不知上答應緣戎旅庶務謹具別狀奏聞伏乞皇明俯賜昭鑒無任感戴屏營之至臣某言中使閻忠信至奉宣聖旨存問兼賜臣手詔拜捧紫泥跪伸金簡承旨見聖神之略感恩知身命之輕臣某中謝臣素乏異能幸逢昌運猥當旄鉞之寄未靖妖氛榮分台鼎之名何階啟沃竊位斯久速尤是虞豈謂元化曲成鴻私薦及特紆睿思親灑僊毫降自九天粲然五色初喜麗天之象遠燭輝光旋驚垂露之蹤曲覃霈澤鸞鶴迴翔而變態煙雲舒卷以呈姿賦彩飛文聳神蕩目恭惟國寶何幸家藏感極涕零莫知上答應緣軍旅庶務謹具別狀奏聞無任欣戴屏營之至臣某言伏奉今月十九日制書授臣太子賓客分司東都者寵命自天戰越無地臣某中謝臣發迹書生以文為業出身入仕四十餘年頃自集賢學士出守吳郡面辤之日親承德音念百姓水潦之餘示微臣政理之法臣祗承聖旨夙夜竭誠閭里獲安流庸盡復猥蒙朝獎錫以金章及遷同州又遇歉旱悉心綏撫幸免流離今荷天慈憫臣耆舊列名賓護之職分局河洛之都老馬霑束帛之恩枯株蒙雨露之澤獲居榮秩以畢餘年顧此微軀實為厚幸伏以臣始為御史逮事德宗今忝宮僚幸逢聖日舉四海之內賢能則多求六朝之臣零落將盡雖迫桑榆之景猶傾葵藿之心無任感恩惕抃之至臣某言臣聞事君之道有犯無隱懇誠所至敢不罄陳伏惟聖明俯賜矜察臣某中謝臣代受國恩忝承門蔭脫巾筮仕敢期榮名陳力效官靡樹聲績始因孤直驟歷清班復荷朝獎作藩外府遠違輦下十有四年恪守淮濆於今一紀犬馬戀主寢興匪遑蒲柳易衰遲暮俄及竊位時久妨賢愧深况歷任以來四十八考祗奉朝謁時讒二週服勤郡府荏苒垂老屏營魏闕之思夢想承明之迹如迫餒寒不忘衣食伏惟睿鑒俯亮愚衷早賜擇人與臣為替交受之際冀無可虞然後脂車奔赴京輦微願斯畢雖死猶生臣頃以戎務方殷猥加宰輔今既事罷實慚此名為有藩鎮同時未敢輕上印綬伏以聖朝赫奕左右惟賢漢愧得人周慚多士臣才略既短齒髮且衰柄用之地甘心自絕所冀退歸舊里沐浴皇風絕鐘鳴漏盡之譏展維桑與梓之敬匪惟名器不假實貴骸骨獲全知止之心神祇可鑒無任悃款怔營之至臣佑言臣自守淮濆已周星紀虔奉朝典麤安遐方素效未聞新恩薦及身曳兩綬寄深一隅蚊蚋負山力誠不足鷹鸇逐鳥志則有餘臣再授兵符夙參軍幕被堅執銳雖未經於戎行受制代謀亦嘗習於事業自忝藩翰屬時清平無施汗馬之勞但詠櫜弓之什今則幸遇殊獎委之專征以身率先是臣素志况聞徐州士眾本無叛心倉卒之間危疑至此臣請自臨疆場親領紀綱裂帛繫書諭其禍福椎牛饗士養以威聲冀宣皇風煦茲蠢類以忠義感脅從之伍以含宏安反側之徒革面悛心期乎不日其揚州留務請令行軍司馬路應權知伏乞聖慈俯賜昭鑒臣佑言臣一辤闕庭已經二載官當重任身受厚恩既懷子牟戀闕之心又負臧文竊位之責思所以歌頌聖德俾補箴規塵露至微不任懇迫臣遠祖詩顯名漢代出牧南陽讜言善策隨事獻納忠醇之至聞於中外遺風可襲有激愚衷臣是以輒竭聞見麤陳梗概雖不盡陛下聖明萬分之一然臣子之心有直必獻伏惟皇帝陛下德合天地道躋文武弛張普博上法陰陽氣均生成人霑亭育凡是氛沴覆以春和銷除容納皆如聖意寬宥肆赦實賴皇明河中誅鋤不勞兵革淮右底定不戮一人慶浹萬邦事出千古近又西戎背約寇犯王師陛下宏貸豺狼矜其兇悍布以恩澤果此知慙功因德成不以兵革故詩云獫狁孔熾書稱蠻夷猾夏臣觀自古帝王不忍小忿貽大患故竭耗中國盡心邊陲至必滅昆明之城平大宛之種豈足發輝皇猷增榮簡冊故賢哲之論薄衞霍之功陛下鏡歷代無益之端修大君文德之教遂得北狄深藏五城晏閉百蠻嚮化四海無虞惟此小蕃尚迷聖教陛下示之大信宏以舊恩雖關防暫驚而烽燧旋罷臣負恩方鎮初懼寇戎正於憂迫之時果聞仁聖之諭攘却兇孼不勞干戈臣靜思遠圖為國久計莫若存信施惠多愧其心歲通玉帛待以客禮昭宣聖德擇奉誼之臣恢拓皇威選謹邊之將積粟塞下坐甲關中以逸待勞以高御下重以金玉之贈結以舅甥之歡小來則慰安大至則嚴備明其斥候不撓不侵則戎狄為可封之人沙場無戰死之骨若天下無事人安歲稔然後訓兵命將破虜摧衡原州營田靈武盡復舊地通使安西國家長算悉在於此計熟事定舉必有功苟未可圖豈宜容易此皆陛下朝夕倦談之事前後立驗之謀臣質性頑疎籌畫庸近受恩非據敢忘獻忠犬馬之心實所罄盡謹遣某官奉表臣某言中使曹進玉至奉宣聖旨存問兼賜臣墨詔以楚州營田廢置事令臣商量奏來者跪捧天書恭承睿旨道存致用義在隨時云云伏以本置營田是求足食今則徒有縻費鮮逢順成刈穫所收無裨於國用種糧每闕常假於供司較其利害宜廢已久比來循守舊制不敢輕有上陳皇明鑒微特革斯弊取其田蓄授彼黎蒸仍俾薄租誠為至當但以田數雖廣地力各殊須量沃瘠用立程度臣已追里正與商量利便謹具別狀奏聞伏惟聖慮俯賜詳擇無任震越屏營之至臣某言伏準元和十二年四月十八日敕諸州刺史如有利害可言者不限時節任自上表聞奏者臣伏見貞觀中詔許㣥臣各上書言利便馬周時一布衣遂因中郎將常何獻策二十餘事太宗深奇之盡行其言擢周為御史至龍朔中璧州刺史鄧宏慶進平素看精四字堪為酒令高宗嘉之亦行其言遷宏慶為朗州刺史則知苟有所見雖布衣之賤遠守之微亦可施用况臣早受國恩德宗朝忝為御史逮今歷事四聖頻領藩條當陛下至明之時是微臣竭節之日伏以守在遐郡不敢廣有所陳準敕上利害及當州公務各具別狀奏聞伏乞聖慈俯賜昭鑒無任感激屏營之至謹差當州軍事衙官守易州安義府別將員外置同正員雲騎尉馮隨謹奉表以聞臣某言伏準今年四月五日德音宜令諸道觀察使刺史各具當處利害附驛以聞者伏惟皇帝陛下睿哲自天纘承列聖善述先志發揚德音率土人臣不勝慶幸臣虔奉詔旨宣示蒸黎伏以華夏不同事宜各異詳求利病謹具奏聞伏乞聖慈俯賜昭鑒臣伏覽國史竊見開元十八年朝集使至京元宗臨軒親問利害時宣州刺史裴耀卿上便宜事論轉運甚詳竟不行下至二十一年耀卿為京兆尹再以前奏論方見允納比及三年漕運七百萬石省脚費三十餘萬貫當耀卿前不見納必有人非之及後數年方展其效臣僻守遠郡敢望言行祗奉詔書或冀萬一伏惟明主擇之無任懇悃屏營之至
