front:
  text: 全唐文欽定全唐文卷二百九十七均益州成都人景龍中為安樂公主所薦起家拜太常博士公主被誅坐貶循州司倉卒
  hash: sha256:cfcf474488841e2e4f6c8b98adbd14ac92044c0ade8856fbae6e2c611032ee2a
  markers:
  - {type: head, offset: 14, content: 閭邱均, id: KR4h0168_NFKB_297-h1, level: 1}
body:
  text: 法定寺浮屠者先德僧琮始起立周一甲子今而圮傾宰君太原王公諱王褱鑒操清能善營福道每聽臨必覩惜乎時墜勉督清衆速於扶持主僧釋處真實膺堪任及派流經久致法加心柱上出與金輪相依纍虧則全新巧便闕岷城此製驚壯多有考量茲模曾不得匹焉處真聰英上士談闕等章句辨才見稱大勳可嗟夫頌之而巳靈哉浮屠岌嶪淩踊十一其級千楹萬栱形比孤峭勢如飛動赤霞晨開金光晝擁清哀縣樂音響百種暫升情周欻高神恐真分中閟燈花長奉臣某等言前以減膳日久憂損聖躬率土回惶輕陳管見而孝情凝邈猶未俯同誠不感天增其履薄臣聞先王垂教以禮制情聖人無心以身從物故能上安七廟下字兆人所以孝理莫非斯道伏惟陛下率由過禮至性光前想終身之憂懷茹荼之酷愆子卯之制淹晦朔之期生靈皆所不堪聖體必將勞悴貽臣子之危懼忘社稷之晏虞緬茲一善方招兩失求諸典故兼且未安詢及普天孰云其可既守高祖之天下為萬國之歡心先當愛身以寧宗社無宜獨善用杜衆情伏願俯順禮經仰回天眷則㣥臣荷賴庶品咸康不任懇切之至臣聞靈氣所生恆起於無形祥跡所憑名屬於聖日雖微物之成象固王者之明徵臣所部官園中有李樹質茂宗生異標恆類交枝兩出共理三連緑葉密而泛烟白花糅而似雪觀於即事知者稱瑞當今星精下流天意元寄嘉圖誰載休徵莫儔昔上林樹生中興劉氏推神議物我則居多臣謬齒勞章慙名首席欣逢偶數竊躍昌期臣某言臣伏奉二月二十二日制書大赦天下恭惟大賚踴躍無地臣聞德至於天真符幽感業齊於聖神物昭光伏惟應天皇帝陛下纂復睿謨祗定天保英茂開聰聖之體文章煥皇王之烈道祿錫允卜食延休順天翊聖皇后垂耀軒轅命兆沙麓明章教訓以致其功陰祗助宣於陽靈坤德承順於乾道是故貺流椒掖慶發瑤筵祥矞五雲絢丹黃而振色褘褕六服合黼藻而融文皇歡載紆滂澤時降洗滌逋穢洽潤資生恩宥生死之夭夭心榮加命婦之爵凡在區宇孰不戴欣臣忝二方嶽化理蔑聞參一物而霑恩齒同列以稱慶無任下情蹈舞之至臣某言臣伏見陛下睿圖興復寶命維新救㝢縣於阽危拯蒼生於塗炭凡在戴髮孰不幸甚蜀鄉財産古稱天府疲弊始西軍之役屢空拯冒賄之夫滿路吁嗟棄親亡散維貨是視愛養誰能陛下所以惠賜藩王鎮撫梁益因之博利期以政成而元暐至止才移弦朔除替旋聞臨筵不暖陛下與而奪之勾萌未達於方春濟舟忽渡於中水天下何謂亡此哀憐今者百姓甚情於官人貪留元暐闕師恩闕斯弊遂革美其風而不見其好移其政而不失其宜且益州者列嶽之雄望元暐者朝廷之忠良明使是推能術尤急理以才名相副義與隨時不乖陛下何惜一賢以遺百姓特望俯回授受留借期年瀝懇上陳馳情無地瞻帝閽而遐叶佇天眷而西流獲遂丹誠戴恩瞑目無任悃屏營之至臣聞天工人代安危所存得其情則風化淳厚失其性則氓庶流離臣等本部益州司馬臣某雅慮忠純貞心剛克通識人理博綜古言州無牧伯居攝端右靜以鎮撫物情功乃隱於視聽事益於國家故不可一二而言也臣又聞寇恂為郡甚得人心將拜汝南百姓庶道漢皇如請竟留一歲敢緣斯義上犯天顏伏乞陛下憫垂涕之慈惠黎民之願即其所守除以為真使生人無惜去之嗟孤貧有永綏之賴則上下咸得中和可期伏表上祈以驚以震益州大都督府草莽臣某等若干人謹冒死言臣聞理有所藉潁川重覩於黃霸惜其不可河南一借於寇恂古之恩跡今亦宜有臣等出身草莽茂育元德井飲田食齒老年衰安全家道傾遂天性皆賴陛下聖情恩利惠及蒼生擇循吏以共康官賢才而俾牧者也臣州佐某官英明興氣忠志居心該舉墳典猶協文史充美價於一省著能聲於邦國緹油至止光輔藩維體要而庶政必凝憂勤而自公知退伏見今月日除節彭州刺史璽函適到熊軾將登吏人傳聞驚嗟相惜臣聞天地之道每從人欲帝王之義必順人心所以黎庶安寧上下禔福今此百姓乞留一年庶得服習其教而易安優柔其道而自得閶闔天遠上祈猶難伏乞聖慈回眷殊渙中留停已出之旨復如初之望使折心重至驚魂還歸時雨一霑同養萬物無任瞻望佇回之至臣某言伏按雲母者千二百玉石之精七十二氣霧之英也體華而光不為水毀不為火煅夫萬物之精者神氣所會未有不化神而能長久者也是以服食者則翱翔自任役使百靈臣肌性虛羸小嬰疾苦務求攝理驗討方書品丹石之名徵草木之氣前聖所録粗知其體即味消邪厲力輔神年類非難得之珍價無兼金之重觸疾則愈莫若茲物伏惟越古金輪聖神皇帝陛下福德所符天祚攸久豈假上藥方固南山然一日萬機或煩聖慮色力營衛必有相資臣從西山野人得其良者其色多白是名雲液臣不揆拙昧輒採古仙要方量事施藝翦棄粗纇收聚輕英開潔清之所遠淹穢之迹浸以茅露洮以東流曠日彌時然後功就果得光潤融爛質理研微試之柔膚隨手化滅皆云所見未始相侔臣意其精殊倘涉靈祕豈以凡妄所敢飧嘗謹詣朝堂敢冒死封進伏希陛下兼愛博物受其區區不以凡人忽棄神寶無任下情僧履空言履空幸沐國恩謬齒和衆雖居鄰壤志尚幽古禮誦之餘每得披玩前件真迹書及圖書古物等積集既久衆推奇異豈下僧蒙鄙之資所得自畜如將服用必是保衛聖躬謹因括圖使臣某輒附進上表以聞塵黷旒扆伏增戰灼之至夫神有所服謂之威名有所宗謂之德威非大者則不能以率服德非厚者則不能以獨宗是故靈鳳闕一字絶於雲氣闕一字從衆鳥猛虎目穴踞於山林震闕一字百獸豈其締飾毛羽以求嘉闕一字之殊磨利爪牙以取雄㣥之勢蓋云材力所素出闕一字象所自全固其然也抑聞赭闕一字明珠多從於西域異物奇玩必致於南州期於服用闕二字充光內府十金是資萬乘為器者何必顧闕一字隍而闕二字黜幽荒而靡録哉君諱仁求安寧郡人也其胄出於太原因遷播而在焉十有餘世氏族之系肇命王子闕二字之美稱高汾晉闕一字品節義氣相纘於家風闕一字代闕三字歷書於史筆故知今古闕二字其闕一字昔有夏之衰廾稷不務至乎不窋用失其官自竄於戎狄之間莫思於先君之業守以敦篤奉以忠信闕一字世闕二字不忝前人擬之其倫庶以匹合闕二字有矚所居必闕一字而太伯逃吳文身之風既習少卿降虜毳幕之化無違夫豈闕八字事有與適安土恆闕一字其宜時闕一字可從闕一字禮必同其欲祖闕二字漏隨別駕幹具英爽風闕一字軒邁鷹揚推於顯化驥足整於長途闕四字隨大都督身日律度材闕一字梓漆劉闕一字望賢於十部陶侃榮重於八州君遇行運之秀德膺鬼神之靈會道與其闕一字而闕一字乃聰闕一字月在懷闕一字寶闕一字目謂海蓋廣土量闕一字淡而闕二字謂山蓋高闕一字容隆闕一字而難仰智則有達明則能通推可而斯行擇善而闕一字動不事於所欲不為於所求闕二字所以久恃貞果所以立闕三字多其信行州里高其義聲大略觀書知風聽樂擊劍盡騰猿之術闕三字斂羽之妙可以往闕一字爾事匡飾有邦故王制輔成以闕一字貢賦至於五千里州十二師外薄四海咸建五長君有運理㣥物之才闕二字保邊裔之略無待纍次直綜闕二字出闕一字使持節河東州諸軍事河東州刺史加上護軍由乎大翼負風淩天地以絶奮巨鱗激水期闕二字而一闕一字若乃訓以生聚之方開其資財之道顓川澤之利闕一字山林之饒內足以養老盡孝外足以事上供稅力役齊平教化清靜通其變使人不倦愛其費使人以時賞及馬牛恩肥土闕一字庶心咸服冀俗闕一字歸闕一字未能大革情性均之雅俗闕二字一變風聲闕二字賢吏矣初闕一字將求寵於大國以和其民人招慰奏置姚府已西草餘州俾睦闕二字德闕一字前漢六代外事四夷開夜郎之道綏哀牢之闕五字聲化率流既處於僻界荒垂不能為中國輕重時復廢廾但云羈縻君以地形平衍生殖豐阜闕一字延企而闕一字思宜郡縣以闕一字事闕一字乎唐運實闕字其勤孰與使者唐闕一字疆略南埊轉粟深於驚恐發卒至於殘傷可同一論哉然貪戾君長負遠放命災我城邑延闕一字平人闕二字州刺史蒙闕一字實治其亂咸亨之歲犬羊大擾梟將失律元凶莫懲君武闕三字義以憤惋闕一字犀闕一字以奮擊驅虎闕一字而先闕三字猖狂之種殲厥逋闕一字之師遐垠是賴到於今而克寧勳在王室藏於盟府則侯子綺吾破虜截級中國蒙其惠帝王闕一字其身闕三字山嚴闕一字所謂闕一字密無形為計闕一字主堅強不變為國闕二字者已嗚呼闕一字曰故矣誰留於變化梁其壞乎已非於疇昔聖賢皆死天道謂闕二字咸亨五年八月十五日寢疾而終春秋卌四長子雲麾將軍行左鷹揚衛翊府中郎將使持節河東州諸軍事河東州刺史上輕車都尉新昌縣開國子公士善寶炳靈滇水闕一字神禺山端儼有望貴不雜音儀朗乎秋月詞令潤乎春雲如蘭之精猶金之利能闕一字能惠不忌不克寸誠立無易於暗昏言出必應於遠邇故能保世滋大昭前之光鳴將驚人飛而食闕一字張博望收虜於屬國魏獻子受闕二字和戎功熙亮采職庀中外雖則符守方鎮恆以宿衛京都至於朝廷班爵之儀彞倫上下之序樂懸禮物之數軍麾國憲之容莫不闕一字懷胸襟流入骨髓乃感念追遠永言孝思汚隆適從無所失道闕二字兼有執而能修張於神明之器附於絞衾之物崇其封塋設闕三字鬱鬱潤澤白虎之候可占洪洪博平雄龍之象終吉故其土性惇質有如上代安錯儀軌弗踐終經聞斯行諸宜我告始則知闕二字合葬自周公而乃來古不高墳傳孔某而其立固率而作者聊使於事業迹而用者遂成於典謨夫身巳沒而名不盡世彌久而功愈劭凡百闕一字哲託乎鐫紀一闕一字至行二美具存愛之斯録之矣敬之斯盡其道焉銘曰先王疆理其義睦小國附庸罔弗祗服聖人在位㣥生蒙福實育闕一字賢為之司牧翼翼夫子守終純闕一字振鱗洪波驤首天路闕二字郡道名攜慕平此凶驕掃茲氛露高烈時暢懋賞惟嘉敦愛種落輔助邦家嘗聞仁善享壽宜遐闕二字不續黃鳥嗟嗟先以遠日安其宅兆墓門將門下陰堂不曉闕二字隴煙哀悽山草行人墮淚空見銘表耀卿字煥之寧州刺史守真子擢童子舉睿宗朝授國子主簿開元二十一年拜黃門侍郎同中書門下平章事充轉運使遷侍中二十四年拜尚書左丞相罷知政事纍封趙城侯天寶元年進尚書左僕射俄改右薨年六十三贈太子太傅諡曰文獻臣某言臣伏見夷州刺史楊濬犯贓處死敕決六十配流者伏以聖恩天覆仁育品類凡死罪之屬不欲尸諸市朝全其性命流竄而已所以政致刑措獄無寃人曠古已來未有斯美臣愚以為全生免死誠為至化有恥且格為訓將來苟有未安不敢緘默臣以為刺史縣令與諸吏稍別人之父母風化所瞻一為本部長官即合終身致敬決杖者五刑之末只施於抶朴徒隸之間官蔭稍高即免鞭撻今決杖贖死誠則已優解體受笞事頗為辱法至於死天下共之刑至於辱或有所恥況本州刺史百姓所崇一朝對其人吏背脊加杖屈辱頓挫人或哀矜忘其免死之恩且有傷心之痛恐非敬官長勸風俗之意又雜犯死法本無杖刑奏報三覆然後行決今非時不覆決杖便發儻獄或未盡又寒熱不耐杖因杖或死即是促期處分不得順時將欲生之却夭其命又恐非聖明寬宥之意臣前後頻在州縣或緣雜犯決人每大暑盛夏之時決杖多死秋冬已後至有全者伏望凡刺史縣令於本部決杖及夏暑生長之時所定杖刑並乞停減即副陛下好生之德於死者皆有再生之恩也臣無任三者禮樂化道也州牧縣宰所守者宣揚禮樂典書經籍所教者返古還朴上奉君親下安鄉族若皆氣和浹洽自然化理清平由此言之不在刑法聖朝制禮作樂雖行之自久而外州遠郡俗習未知徒聞禮樂之名不知禮樂之實竊見鄉飲酒禮頒於天下比來惟有貢舉之日略用其儀閭里之間未通其事臣在州日率當州所管縣二與百姓勸導行禮奏樂歌至白華華黍由庚等章言孝子養親及㣥物遂性之義或有泣者則知人心有感不可盡誣但臣州久絶雅聲不識古樂伏計太常具有樂器大樂久備和聲伏望令天下三五十大州有性識於太常調習雅聲仍請笙竽琴瑟之類各三兩事令比州轉次造習每年各備禮儀準令式行禮稍加勸獎以示風俗又以州縣之學本以勸人祿在其中聞於學也今計天下州縣所置學生不減五六萬人及諸色並國子每年薦舉擢第過百人巳上雖有司明試務在擇才而學校衰微居然可驗州縣補學生之日皆不願為遠郡送鄉貢之時多有不願來集恐成頽弊不可因循伏望詳擇其宜微加勸革奚及契丹尤近邊鄙侵軼是慮式遏成勞臣庶常情欲其防禦所謂長策無出此者陛下獨斷宸襟高奪㣥議以為頓兵塞下轉粟邊軍曠日持久役無寧歲若不因利乘便一舉遂平使遷善者自新為惡者就戮事若不爾無息我人且命大兵臨之凶徒必潰不出此歲當並成擒臣等初奉聖謀高深未測及聞凱捷晷候不差兩蕃遺噍莫不稽顙緣邊戍卒咸巳返耕臥鼓熄烽誠自此始斯皆陛下睿謀先定神算非常觀變早於未萌必取豫於無象臣伏以成功不宰君人所以為量有美不宣臣子所以成罪臣雖蒙瞽安敢無言既豫聞始謀又幸見成事豈可使天功虛往日用不知竹帛相傳復紀何事請具狀宣付史館垂示將來仍許將吏等刊石立頌以紀功德臣耀卿等不勝區區抃躍之至謹奉狀以聞謹奏伏承逸人姜撫獻同度山長生藥祕精英而日久候聖明而乃彰伏惟陛下大聖撫運深仁濟俗和氣時若淳風穆然上帝式臧用分景福逸人斯至乃表長生藥薦長春酒和甘露天杯暫御神策逾增益光明於日月齊長久於天地臣子大慶開闢所無朝野多歡蹈舞相繼況自中外賜藥兼方遠使人寰同升壽域慶流渥澤馳景回光凡在生靈不勝悅慶臣等望進禮食以稱壽觴歡寶祚之無疆樂微生之有遇臣等伏承陛下講讀尚書周易道德莊列畢聖心宏道國訓崇儒元風遠被更自茲始況以事殷四海念切萬方日旰罷朝既披文於內殿風回問俗亦函丈於行宮漢皇乙夜無以過此悟老莊之旨齊物而仁恕以行運堯舜之心稽古則憲章攸備鉤深致遠不疾而速陶鈞庶類品物之歡幸實深宏獎大猷策之輝光載遠臣等叨陪獻納竊奉徽音慶躍之誠倍百常品伏望宣付史官騰芳盛烈尚食所料水陸等味一千餘種每色瓶盛安於藏內皆是非時果及馬牛驢犢麞鹿等肉並諸藥酒三十餘色儀注禮料皆無所憑臣據禮司所科奠祭相次事無不備典制分明天恩每申讓帝之志務令儉約禮外加數竊恐不安又非時之物馬驢犢等並野味魚鴈鵝鴨之屬所用銖兩動皆宰殺盛夏胎養聖情所禁又需造作什物動餘千計求徵市井實謂煩勞千味不供禮無所闕伏望依禮減省以取折衷外族之親禮無厭降外甥既為舅母制服舅母還合報之夫之外甥既為報服則與夫之姨舅以類是同外甥之妻不得無服所增者頗廣所引者漸疏微臣愚蒙猶有未達陛下體至仁之德廣推恩之道將宏引進以示睦親再發德音更令詳議臣等按大唐新禮親舅加至小功與從母同服此蓋當時特命不以輕重遞增蓋不欲參於本宗慎於變禮者也今聖制親姨舅小功更制舅母緦麻堂姨舅袒兔等服取類新禮垂示將來通於物情自我作則㣥儒風議徒有稽留並望準制施行伏見蓋嘉運立功破賊更委兩軍以勇果之才承戰勝之勢吐蕃小醜不足殲夷然臣近日與其同班觀其舉措精徑勇烈誠則有餘言氣矜誇恐難成事莫敖狃於蒲騷之役舉趾稍高春秋書之以為懲戒恐其有驕敵之色臣竊憂之入秋防邊日月稍逼接對人吏須識其宜今將撫邊軍未言發日若臨事始去人吏未識雖決在一時恐將非制勝萬全之道況兵未訓練不知禮法人未懷惠士未同心求其忘性命於一時憚嚴刑於少頃縱威逼而進因而立功恐非師出以律久長之義又萬人性命決在將軍不得已而行之鑿凶門而即路今酣宴朝夕優渥有餘亦恐非愛人憂國之意不可不察若不可回換即望速遣進途仍乞聖恩勗以嚴命江南戶口稍廣倉庫所資唯出租庸更無征防緣水陸遙遠轉運艱辛功力雖勞倉儲不益竊見每州所送租庸調等本州正月二月上道至揚州入斗門即逢水淺已有阻礙須停留一月以上三月四月以後始渡淮入汴多屬汴河乾淺又船運停留至六月七月以後始至河口即逢黃河水漲不得入河又須停一兩月待河水小始得上河入洛即漕洛乾淺船艘隘鬧船載停滯備極艱辛計從江南至東都停滯日多得行日少糧食既皆不足折缺因此而生又江南百姓不習河水皆轉雇河師水手更為損費伏見國家舊法往代成規擇制便宜以垂長久河口元置武牢倉江南船不入黃河即於倉內便貯鞏縣置洛口倉船從黃河不入洛水即於倉內安置爰及河陽倉柏崖倉太原倉永豐倉渭南倉節級取便例皆如此水通則隨近轉運不通則且納在倉不滯遠船不憂缺耗比於曠年長運利便一倍有餘今若且置武牢洛口等倉江南船至河口即却還本州更得其船充運並取所減腳錢更運江淮變造義倉每年剩得一二百萬石即數年之外倉廩轉加其江淮義倉多為下溼不堪久貯若無般運三兩年色變即給貸費散公私無益伏惟陛下仁聖至深憂勤庶務小有饑乏降詔哀矜躬親支計救其危急今既大駕東巡百司扈從諸州及三輔先有所貯且隨見在發重臣分道賑給計可支一二年從東都廣漕運以實關輔待稍充實車駕西還即事無不濟臣以國家帝業本在京師萬國朝宗百代不易之所但為秦中地狹收粟不多儻遇水旱即便匱乏往者貞觀永徽之際祿廩數少每年轉運不過一二十萬石所用便足以此車駕久得安居今升平日久國用漸廣每年陝雒漕運數倍於前支猶不給陛下幸東都以就貯積為國大計不憚劬勞皆為憂人而行豈是故欲來往若能更廣陝運支入京倉廩當有三二年糧即無憂水旱今日天下輸丁約有四百萬人每丁支出錢百文充陝洛運腳五十文充營窖等用貯納司農及河南府陝州以充其費租米則各隨遠近任自出腳送納東都至陝河路艱險既用陸腳無繇廣致若能開通河漕變陸為水則所支有餘動盈萬計且江南租船所在候水始敢進發吳人不便河漕繇是所在停留日月既淹遂生隱盜臣請於河口置一倉納江東租米便令江南船回其從河口即分入河雒官自雇船載運者至三門之東置一倉既屬水險即於河岸傍山車運十數里至三門之西又置一倉每運至倉即般下貯納水通即運水細便止漸至太原倉泝河入渭更無停留所省巨萬臣嘗任濟定冀等三州刺史詢訪故事前漢都關內年月稍久及隋亦在京師緣河皆有舊倉所以國用常贍若依此行用利便實深陛下既東巡百司畢從則太倉三輔可遣重臣分道賑給自東都益廣漕運以實關輔關輔既實則乘輿西還事蔑不濟且國家大本在京師但秦地狹水旱易匱往貞觀永徽時祿廩者少歲運粟二十萬略足今用度寖廣運數倍且不支故數東幸以就厫粟為國大計臣願廣陝運道使京師常有三年食雖水旱不足憂今天下輸丁約四百萬使丁出百錢為陝洛運費又益半為營窖用分納司農河南陝州又令租米悉輸東都從都至陝河益湍水具若廣漕路變陸為水所支尚贏萬計且河南租船候水始進河工不便河漕處處停留易生隱盜請置倉河口以納東租然後官自雇載分入河洛度三門東西各築厫倉自東至者東倉受之三門迫險則旁河鑿山以開車道運十數里西倉受之度宜徐運抵太原倉趨河入渭更無留阻可減費巨萬矣謹按衣服令皇太子具服有遠遊冠三梁加金博山附蟬九首施朱翠黑介幘髮纓翠緌犀簪導絳紗袍紅裳白紗中單皂領褾襈白裙襦白假帶方心曲領絳紗蔽膝白黑舄革帶劍佩綬等謁廟還宮元日冬至朔日入朝釋奠則服之其絳紗袍則是冠衣之內一物之數與裙襦劍佩等無別至於貴賤之差尊卑之異則冠為首飾名制有殊並珠旒及衣裳采章之數多少有別自外不可事事差異亦有上下通服名制是同禮重則具服禮輕則從省今以至敬之情有所未取衣服不可減省謂須更變名望所撰儀注不以絳紗袍為稱但稱為具服則尊卑有差謙光成德聖上本元元之化以身而觀國酌堯舜之道睦親而逮疏羽儀成而正體尊肺腑寧而元首豫生人之始內教權輿文明在運外戚先理膺上仁而踐元舅享多福而執謙光者其惟冀靖公乎公諱希球字國珍扶風平陵人昭成皇后之第二弟也昔漢文恭儉垂統於西京我族有內輔之功政清而刑偃漢章長者揚休於東國我君有少宗一作小君之佐纍洽而重熙貞觀創業也吾姑本周南之化時維太姜開元立極也吾姊合塗山之德時維文母昌化皆在乎明主景運必當乎太平千載相望重光四后豈比夫魏晉中朝之狹隘陰郭微時之屬籍或悠悠於戍申緬邈於褎紀不同年而語矣五代祖諱善平北將軍散騎常侍驃騎大將軍開府儀同三司侍中使持節都督北華州刺史永富公載於周書高祖諱榮定平東將軍驃騎大將軍開府儀同三司洛鄭滎懷汴廣和霸秦寧成唐渭一十三州刺史秦州行軍使左右武衛大將軍陳國懿公著於隋史曾祖諱抗唐梁岐冀定幽易燕檀八州刺史遼東朔州二總管光祿大夫開府儀同三司左武候大將軍納言贈司空陳國容公祖諱誕駙馬都尉殿中國子祭酒并州總管鎮北將軍太常卿刑部尚書右光祿大夫贈工部尚書荊州大都督莘國安公見太宗實録考孝諶太常卿潤州刺史并州大都督贈太保豳國公或道濟舟楫或功垂劍履青史之三朝相次彤弓之四代畢封此又衣冠之上腴人門之絶等者也公降靈辰象育粹淳源稟淵懿之姿體敦龐之度退讓致美不忘於先疇虛元為心得之於先訓起家太子宮門丞朝散大夫尚乘奉御換尚舍奉御開元初纍遷都水使者光祿少卿特階金紫光祿大夫將作少卿封冀國公又加銀青光祿大夫太子左諭德宗正少卿郯王傅又遷太子賓客春秋七十有一以開元二十一年正月十九日遇疾薨於長安布政里之賜第天子輟朝變禮事優恆數乃下制曰申伯元舅禮實重於緣情堯典睦親義兼在於追遠故銀青光祿大夫守太子賓客上柱國冀國公竇希球名高懿戚位重周行在貴不驕每執謙而守約與物無競常隱耀而含華以是全真方期永命徂遷奄及震悼良深生而寵光巳榮觀津之族歿有褎飾仍申渭陽之贈可贈太子太師賻物二百段米粟二百石應緣喪葬量事官供仍令京兆少尹田賓庭充使監護以某年十月二十六日歸祔於咸陽舊原禮也嗚呼善始令終者為侯家之貴安時處順者為達士之師目牛乎邀福之源忘我乎持盈之地非懸解深識焉能及此昔之后族干政外家操權穰侯之負乘王鳳之專擅苟欲憑寵不知退身時主之芒刺生乎上國人之怨讟作乎下千載義士為之寒心公則懲於斯誡於斯雖望重凡百恩稱莫二承孝理之深化當寵光之盛時而乃閉關偃息循牆俯僂無健羡於當路每蕭條於執鈞清宴之閒外言不入退食之暇時人不交其巽讓也如此昔之姻黨不法舅氏過制成都之矜侈曲陽之僭奢既青璅而赤墀亦秦鐘而鄭舞蔀家虧於易道騁欲違於老經天下之人為之騰口公又懲於斯誡於斯雖師資藩邸羽翼龍樓富逾於百乘之家貴極於諸侯之爵而乃居行儉寡欲少思出無弋釣之娛入無羅紈之費絲竹宴衎視若塵埃池臺雕斫未嘗營起其素約也如此昔之倚勢為暴恃地作威武安之驕盈梁氏之凶蠹以毫詉而誣善以睚眦而殺人主意之益用不平謗書之紛然屢起四海之內為之囂囂公又懲於斯誡於斯雖南陵周親北闕元老室家之皇枝帝戚猶子之尚主嬪王而乃謙不可逾卑以自牧忘大壯於榮貴思同人於醜夷公私遊聚大小無忤賓御出入閭閻不知其溫良也如此合是庶美歸於一貫諡之為靖不亦宜乎皇上軫敦敘之恩流平分之施自近推於及遠經邦始於正家不侮於邊夷之客而況於懿戚乎不遺於小國之人而況於純臣乎是故悲臨於渭陽感動於陟屺陪邑於先原建封於貴里所以教天下之為子車通幰門加兵會同不録班宴見不呼名所以教天下之為甥觀乎聖慈曲被皇明深視舅氏榮寵折衷於人言外宗法度儀刑於士禮當是時也以伯舅護儲兩以肆舅儀台司以大宗率譜屬以小宗通賙餼則官政條而家事理矣故五侯之第四姓之宗罕輿誦於遒人無纖羅於廷尉存則壽考歿則哀榮君臣交泰若茲之美開府儀同三司畢國公希㻀公之第三弟也親賢並茂德位齊優公嗣子無祿不及終事畢公執喪哀次義切天倫親率宗姻躬侍輴紼威儀則序禮物其容詔葬紛紜傾城縱觀台臣白首陟崇岡而北臨宰樹青松瞻舊城而西靡有以知冀公之令名不殞盛德歸全畢公之至行惟殷孔懷纏慕乃俾夫具臣惟舊直質無華者書其實録蓋取信於金石不欺於聞見云爾敘其詞曰沔彼媯水福祥伊始坤道元亨后族清理靖公樹德含章濟美溫良淑人疑脫四字退讓維何溫良則那就閒違劇受少辭多金玉三緘羔羊五紽國人無忤宗族以和北闕元舅東闈上客吾邑百乘吾門萬石深保純素退藏虛白儀刑衣冠光我墳籍輔仁徒欺過隙難追朝野增慕哀榮在斯賻以國錢尊為子師興言渭陽何痛如之兆啓酆畢行臨秦鎬樹拱行楸根陳宿草歎息遺事湮沈故老勒銘豐珉敢告神道
