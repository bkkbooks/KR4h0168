front:
  text: 全唐文欽定全唐文卷六百二十一士詹貞元時官司兵參軍
  hash: sha256:cc3a28f6c192d075012e5cde44dd6357e564ae2ee9abe37d84868a2bb0835c11
  markers:
  - {type: head, offset: 14, content: 王士詹, id: KR4h0168_NFKB_621-h1, level: 1}
body:
  text: 彌陀居西國照師宗焉帝堯在位邠公輔焉是知佛寶國寶殊躅而同體也竹林精剎應現施工已立西方教主大師法照自南嶽悟達真要振金錫之清涼根瑞相以徘徊躡雲衢而直進躋靈山入化寺周歷闕三字百二十院所覩異光奇迹具紀於大師實錄海闕二字播故略而不書茲乃淨土教主東流也故治地闕二字寺焉罕隴西人德宗時官嶺南經略使判官權知容州留後事監察御史裏行維貞元二年秋八月天子以郡國二千石之高第者曰隴西李某利澤施於裔土美化被乎遐甿是用遵虞書陟明之義參周官進律之典俾之由檢校右散騎常侍兼御史中丞容州刺史本管經略守捉招討處置等使為御史大夫嶺南節度經略觀察處置等使實授兵符加擁使節某月自合浦如南海於是縣道溪谷鰥寡孤老洎於士吏相與懷思隱然不去乎心森然不離乎目願所以昭明其德光示於後嶺南經略使判官權知容州留後事監察御史裏行同郡李罕始以文學居辟選之首遂參帷席復以謀能當器任之重留總軍府美公之政大備感公之禮有加因其人之請而上之上可其奏夫其郡之四封濱於百粵外則有山寇海孼比境集處之虞內則有勤戍勞師流散轉徙之弊親帥其下以撫吾人慰藉傷夷安集疲耗懼貨貢之闕至助之以家財憫徭事之繁至代之以私屬選武藝歸老疾罷減塞卒四千餘人以趨農時率游惰闢汙萊開置屯田五百餘頃以足軍實舍寇賊之為縲囚者釋而遣之以除其怨而狙獷以順禁人民之相虜賣者執而誅之以去其害而童昏以安常歲有災濫炎而連燒於廬舍公創其制以禦其鬱攸而邑居以葺舊俗多怨睚眦而致毒於飲食公立其防以解其悁忿而鄉黨以和樹枝幹而啟閉畢修列亭燧而厄害斯控差重輕以行徵令無不均之議量遠近以納貢職無不供之貢人用富庶家有儲峙敦之以禮懷之以仁潔已而不汙未嘗有貰貸勤身而不怠未嘗有懈弛明足以照遁情隱慝而不為察威足以制猾人暴史而不為苛古之良能何以加此惟我公有唐宗室枝屬之選監州刺史諱孝詵府君之曾孫宏農郡太君諱璟府君之孫太子太傅贈司徒諱齊物府君之子續洪緒丕績之餘裕宏休純懿之下鍾寬博而柔良稟高明而疎達根於經義飾以藝文故其仕王畿宰京邑累執憲簡且登軺車備重臣賓介之職居大府紀綱之任三亞京尹兼中師之貴復為宮相在常伯之位歷饒州刺史而後至是州恩結於人功加於物必聞理效而興頌聲且夫有美焉有刺焉詩人之義也善善而裦之惡惡而詘之春秋之事也使賢士大夫之業不沒於後太史公之制也以予之嘗修史記而為訓辭緣人之懷心而頌之曰帝念南方迫界蠻夷人新被寇歲或勞師屬之於公俾養牧之匪直勤身亦帥其屬贍我貧匱字我惸獨息人便農墾田積粟修其教化被以威德賊害既除禍災斯息完我廬舍親我骨肉咸保其生且易其俗蚩蚩㣥族孰不蒙福播為頌聲公受百祿彤弓玈矢以長諸侯人之懷德勒石垂休嶠德宗朝官金部員外郎女也有喪行實殊制士之達禮哀以立則惟癸領縣同氣辤家生稱未亡已軫柏舟之詠死歸異姓且無欒棘之悲東西南北之人歎四鄰而莫有鄉黨里閭之室望九族而繄無日月有期主喪孰是匍匐救之里尹其人殊周勃之給喪所資致祭異項梁之倚辦寧惟執紼在禮自有明文或人胡為妄動嶠范陽人貞元四年官永州司馬稽先王之國法閱司徒之教典必由鄉校馴致膠庠用擊童蒙方論俊造資鼓篋以懋德表師嚴而道尊甲也嗜學因方琢玉成器憤悱以攻木舂容而扣鐘然由衷執顏罔敢勦說初布席以函丈終摳衣而負墻問道非飲食之賓鳴謙用掃除之隸而禮云聚突義在攝齊賓主有儀應對無失主人觀禮弟子修容訴人無乖所宜或者如何致詰造貞元中官渭南縣尉近奉文牒令伐官槐若欲造車豈無良木恭惟此樹其來久遠東西列植南北成行輝映秦中光臨關外不唯用資行者抑亦曾蔭學徒拔本塞源雖有一時之利深根固蒂須存百代之規况神堯入關先駐此樹元宗幸蜀見立豐碑山川宛然原野未改且召伯所憇尚自保全先王舊遊寧宜翦伐思人愛樹詩有薄言運斧操斤情所未忍好心德宗朝官檢校太子詹事從幸奉天封奉天定難功臣臣表弟沙門般刺若先進大乘理趣六波羅密梵本經伏奉今年四月十九日敕令王希遷精選有道行僧於西明寺翻譯今經帙已終同詣光順門進上可封洛陽人安州司功元範孫官國子司業莊生有言曰至人用心若鏡有旨哉是言也夫鏡也者以明為體是故有來而必應心也者以靜為照亦可不思而元通拂拭生光掛新臺而月滿罔象求得映赤水而珠融若鍊心而比鏡信清明而在躬爾乃以鏡為心因心載考菱花發而㣥象生靈府開而萬物保斯鏡之精明謂人心得道至人所以卑其性而遺箴弱其志以虛襟聽無聲之樂和天籟之音明白四達照幽燭深希洞視而元鑒在無心而用心苟能忘已作虛舟之泛必保其光得秦鏡之鑒我邦君皇宗之子天人之英體以合道沖融混成其用心也達至人之妙理其朗鑒也同水鏡之澄清開意而圓照吐心而自明妍媸莫能藏其象鬼神莫以遁其情絕毋意與毋我固不將而不迎懸彼高鑒求乎有貞覩處子兮調脂粉爭捧心兮效蹙嚬醜者自醜新者自新形美惡而區別吾何情於知人媿匪桃夭寧容比證對香匳而呈貌慮柔姿而不稱有待良人非徒好勝因茲佇賞必冀象應紅粉蛾眉趨而競謁宛其素質髧彼元髮類芙蓉之映水若姮娥之向月大明無私眾鑒不歇光之所燭照及微物庶有假於恩輝幸留心於翦拂子璋臨渭人官太子舍人昔南正重司天北正黎司地迎日推策舉分定至將以綱紀歷象察明躔次算氣候為晝夜之刻立渾儀驗晦明之異故歲時環迴而有準國家憲章以成事唐虞承用以大興夏商恭行而無墜其後疇人失業挈壺不舉詩刺東方之未明史書南風之乖序測辰屢錯於杓建揆景頗謬於寒暑千官鮮視以權衡萬姓孰寧其安處何不謂漏之既定而人自正漏之既衰而人自疑故有國者不可以不明其事今上都咸陽理天下道歸簡易政被風雅人皆得真事則無假至於掌漏尤足稱也其本則披甲子而求範得黃鍾而下生如因三以窮數隔八以循行課六歷之疎密齊七曜之經營俾攝提之有紀實孟陬之用成其器則方圓列陛高卑中度制陰蟲以吐輸設靈虯以盛注銅史應其方金箭刻其數則於道如符契之合精於微無黍累之誤每至雞人起唱鼉鼓相催九重初曉千門以開國史奏事於平樂㣥官謁帝於金臺不失其度及時而迴自邇及遠識往知來漏之為義實大矣哉歆襄陽人官膳部郎中惟祀與戎禮之大者觀射見德侯其是歟俾邀福於爾靈將示威於我眾所以司馬張皇於五射梓人盛飾於三侯繫而有儀下綱不及於地武祭以盛禮上射更揖於堂楣是則俎豆克陳熊武相間多算少算射人或觥於爾爵強飲強食祝史無愧於我辭冀必懲於不庭是有祈於介福雖非宴禮實曰武經既庶幾於戢兵復何疑乎致祭乘驄之糾斯心奚至於加諸而中鵠之誠彼甲未越其典則禮不瀆也神其吐之鴻漸貝州人官左司郎中止萬物者艮會萬靈者人艮為山以設險人體道以通神是知山之大人之心亦大故可以議其利害也昔太行聳峙王屋作固千巖糾紛萬仞迴互蓄氷霜而居夏凝結聯源流而飛泉積素爰有諄諄愚叟面茲林麓愴彼居之湫隘懲祁寒之慘毒激老氏之志且欲移山當算亥之年寧憂就木乃言日月無私照也山則蔽之春夏無伏陰也山則藏之傾阻我比屋擁隔我通逵我將拔本塞源使無孑遺得則為功之美否則為身之恥終當詒厥孫謀施於翼子於是協室而一乃心力荷擔而三夫傑起畚斲斯備其功聿修於澗於沼爰始爰謀一之日土墾石鑿二之日崩崖隕㟧三之日夷峯彌壑雲林催以葢偃火石迸而星落爾其洞突堙塞陰陽交錯飛禽走獸魄褫氣懾而不復巢居穴託王喬偓佺低徊頻蹙而無所驂鸞駕鶴山神操蛇聞之乃壯其功深其計將懼不已先謁於帝命夸娥二子發神威振猛厲始將怒目決眥終欲飆舉電逝遂乃斡碭莽挾崔嵬下拔乎三泉上衝乎九垓突兀雲動磅礡天迴遽投雍朔而不復來世人始知愚公之遠大未可測已夸娥之神力何其壯哉儻若不收遺男之助荷從智叟之辨則居當困蒙往必遇蹇終為丈夫之淺今者移山之功既已成河冀之地又以平則愚公之道行客有感而歎曰事雖殊致理或相假多岐在於亡羊齊物同於指馬我修詞而忘倦彼移山之不舍吾亦安知夫無成與有成諒歸功於大冶濤濟南鄒縣人高平令游道子為渭南尉敬授區分經邦所重畯農懋力緯俗攸先行夏正於東郊黎元不惑歌豳風於南畝田畯知勤逖覽藏書率由茲典乙逢昌歷甲預堯封玉燭時和無聞於勸勵金刀產匱罕見於籌謀異楚客之逃名耕耘不嗣匪梁嚴之徇節藨蓘何施行有察於農功遽見徵於屋粟質劑爰致投告旅師施捨未忘貽刑司敗采周年之故事頗叶常規求聖日之明科稍乖通典但以薄言未息被罰猶嫌簡孚五辭詳明八辟待窮根柢方寘彞條益濟南鄒縣人蘇州刺史洋子官河陽丞惟聖御極兮惟德動天神超象表兮功軼帝先和氣鬱以交暢休風裕乎上元耀貞明於日月紛輕靄於雲煙九星不改而仰止五緯相次而燦然若乃歲位在木辰見於水熒惑表火正之中太白應金方之紀鎮實土德黃為中美惟我皇之至聖信體元以合理萬國同風三光叶晷巖廊有謐垂衣之化炳焉蠻夷自清戢戈之日久矣帝有孚而昭應天何言而效祉登觀臺以書於宣夜徵瑞典載叶於聖期仰三辰之焜燿表六合之雍熙惟皇王之同德彰福應之允滋可以對越郊廟紛被歌詩瞻彼景瑞侯其褘而昭回於天垂象於下迴列躔次遙通分野或表異於歲登乃呈休於王者觀五行之秀氣與一月而齊明同色已傳於堯歷聚井更弭於漢兵足使皇圖有耀史牒增榮天凝兮瑞彩聖稟兮休符映天津乍疑於流火寫漢浦更類於沈珠煌煌則耀衡碧落歷歷則光含白榆惟列宿之自拱倬前古之所無夜何時兮其未返天之迴兮光已遠隨斜漢而影移落堯城之更晚星兮懸倚葢而垂休伯也知靈臺之已偃聖上事無事為無為精流緯象繇入熊羆猶下弓旌之詔俾收巖穴之奇夫或不敏備謳歌於聖代與帝力之何知遹魏郡貴鄉人墳素通旨古今彞倫惟冲虛以效迹貴特達而知人有藏器在我有從方立身歷九徵而觀則甄一德而求真既而糺合性情交驅馳驟莊列談其險艱堯舜病其授受玉石相蔽悲獻璞之匪工媒介未孚忌投珠而自久考聲度之軌躅察言貌之休咎鑒之則理將斯契昧之則亂何不有彼經緯之區分在昭擇之能否復覽前志清通不易或失子羽之容或失宰我之議自非識周郎之顧曲辨齊竽之濫吹安能取士於飯牛之時拔才於臥龍之器其道或如蘭芷應以塤篪聞撤俎而興嘆指負甑而留規管仲霸齊終慟哭於鮑叔國僑相鄭始登舉於子皮此則秦鏡一覽而皆得何必豫章七年而見知別有事業後時徘徊中路厭東郭之雪隱南山之霧猶恐相士者失之於下流披文者棄之於異趣苟名實之所在願曲直而成喻徒叩寂於不才實有慚於能賦造化之工稽夫有名之域察以無象之中彼去有而舍體乃因無而立空極乾坤之包汗漫何窅眇與沖融且希夷難變而士冖䂞籥罔窮神禹莫知其至離婁安覩其終墜露有聲杳然聞皓鶴之唳太虛無礙豈獨發醯雞之蒙則七曜垂文八紘作紀應類示迹變態無已顥氣浹而流英飛霞散而成綺順晝夜以明晦涵混元而古始及夫長風清驟雨霽或暝魄初滿或朝陽不翳千里若鏡合止水而澄鮮四野無塵分遠山之虧蔽理通一貫施極多族忘取舍而惟靜任細大而皆足溟漲會百川之宗簫管達五音之目墨客臨而責有賦見平原老氏酌以當無道幾牝谷戶牖致有空之用人神終害盈之黷故至人得之於無心公綽寘之於不欲欽若聖君赫赫良牧英英巖穴靜而賢舉囹圄空而法平湛虛明而元鑒在虛受而澄清無談天之逸藻慙叩寂以求聲
