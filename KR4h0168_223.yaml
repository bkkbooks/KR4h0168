front:
  text: 全唐文欽定全唐文卷二百二十三張說三
  hash: sha256:d7a944f8605d173a08d26a0602f7b8d9652614c5124136222f4fbc7170e9ac25
body:
  text: 臣說言伏奉今月七日制書封臣燕國公食封三百戶寵靈猥及中心如惔臣說中謝臣聞至道之時重法守義上無無功之賞下無無德之祿故授受禮全而踰越不起伏惟陛下光撫㝢內大寧天域百度維新萬靈翹注建侯疏壤允荅元功臣亦何人首膺是命自古有傳道而爵說經而封葢以訓蒙成聖資師通學臣之侍講有異前聞何者大明朝昇螢爝無助時雨夕濡浸灌焉施幸得依附光景游泳恩渥豈敢虛承啟發之恩謬荷將就之報且如人臣之義二則為罪愚智之分一心不回譬如犬馬有不背之性草木有不凋之理知何德於天壤而欲蒙造化之偏施哉臣之無功正與此類叨恩過量終懼且慙乞回聖慈以容介節無任惶悚之至謹詣朝堂奉表陳讓以聞臣某言伏承月日勅書除臣右羽林衞大將軍兼檢校司賓卿朝榮對及恩露洪垂罄仰驚抃環揆慙失臣某頓首頓首臣席慶皇枝辱司天衞素官成責久盈人口頃屬山戎自擅王師震加謬當推轂之禮竟空汗馬之績實賴睿謨幽贊靈兵潛討滅犬羊於遼海卷旌麾於燕薊臣得歸功北闕待罪東藩沐泳休貺生死榮幸安敢賣要塞而告勞貪天功以為己又況羽林清禁上則星辰主客命卿下法河海葢文武具美方議望僉歸豈臣弊劣所堪尸忝伏乞特迴睠鑒更擇能賢俾朝興薪槱之歌臣免伐檀之刺非敢飾讓實披誠請無任悚戴之至謹詣朝堂奉表陳讓以聞臣稷言伏奉制書除臣工部尚書寵靈俯逮營魄震飛揣分何階戴恩無力臣某中謝臣才乏濟川功微橫草故以業承薪構澤潤葭莩效雕蟲之薄技蒙金蟪之榮飾徒參進對愧無好詞頃以宂職東垣暫諧清曠今若統司南省將招素飡五翟之正典事斯重六官之長求人未易以臣叨授實為非宜願寢前恩致命他士無任悚懼之至謹詣朝堂奉表陳讓以聞臣所讓人別狀封進臣某言臣本書生幸事先帝歷踐清職遂參機密宗武樹黨忿疾正人猜忌眉睫構結瘡痏臣與一二貞士指天誓心枝梧㣥邪扞城王室曉入宮省暮不望歸艱危備嘗幾不免禍日覬一日以逢開泰臣之宿圖今巳足矣陛下寶位既復元良又定凶讎咸翦百度惟新正宜博採屠釣大變風俗豈臣微才空忝重任外不厭於衆望內實畏於多言臣父年老先嬰風疾五月以來不離枕席臣方寸巳亂短效無施夙夜在公扶持有闕乞免官秩歸侍私庭罄心仰恩期於孝治無任懇迫之至僧普潤言伏奉甲寅制書以普潤加榮沐秩授邑封公聖恩無涯將變枯朽佛法有教誠願住持普潤自剃落壞衣五十餘載心不見是口不言俗因誡證業憑禪悟理幸逢皇祚將啟大運有歸皇太子逼畏凶讎永懷興復憂虞之際始蒙顧問貧道起廣救之悲決必成之策奉符命之旨贊無畏之心今得衆生乂安㣥魔消伏在於法侶所願為多視身本無何功受祿天位有德陛下享之天討有罪太子行之豈貪天之功以為己力賣佛之法而求身利必若冒榮背律返俗違真亦恐乖陛下崇信之誠失如來付屬之義凡所稱述諸佛證明伏惟聖慈亦垂開領乞停恩授以幸法門無任護戒傳道之至願謹詣朝堂奉疏陳情以聞臣說言臣聞迎日授時莫先於歷象先天成務必歸於制作伏惟開元神武皇帝陛下建中立極緯武經文至德難名神功莫測於是定歷成歲立象考天紹唐堯欽若之典遵虞舜在璿之義上皇能事於斯備矣臣書院先奉勅造游儀以測七曜盈縮去年六月造畢進奏又奉恩旨更立渾儀臣等準勅令左衞率府長史梁令瓚檢校創造於是博考傳記舊有張衡陸績王蕃錢樂之等並造斯器雖渾體有象而不能運行事非經久旋亦毀廢臣今按據典故鑄銅為儀圓以象天使得俯察上具列宿赤道周天度數注水激輪令其自運一日一夜天轉一周又別立二周輪絡在天外綴以日月令得運行每天轉一匝日行一度月行十三度十九分度之七凡二十九轉有餘而日月會三百六十五轉而行匝仍置水櫃以為地平令儀半在地上半在地下晦朔弦望不差毫髮又立二木人於地平之上前置鍾鼓以辰刻每一刻則自然擊鼓每一辰則自然撞鍾皆於櫃中各施輪軸鉤鍵交錯關鎖相持轉運雖同而遲速各異周而復始循環不息陰陽不能逃其數分至不能隱其時究天地之斡運極乾坤之變化斯皆上稟聖謨傍獲神助臣等愚思非所能及望錄付史館宣示百僚使知告成之功迥越前古無任勤懇之至謹隨表上進以聞臣說誠惶誠懼臣說言去年行塞至朔州忍辱尼寺見有高祖太宗造金像銀趺刻題尊號彼州士女屢瞻佛光臣懇思聖心如在咫尺伏以皇帝事業遠存荒塞拯溺救焚身勤慮苦歸誠佛寶何神不據信知功遍區域澤周生人心憑神靈躬履危險故皇天眷命奄有邦家後嗣聖人欽承大寶所當思由積德而興帝系本艱難而成王業先聖一心奉佛者葢為百姓求福也陛下為繼文之主實創業之功再廓氛祲重安廟社垂統萬億同符祖宗夫惟興王必籍佐命咸有一德克享天心書曰非天私我有商惟天佑于一德非商求于下民惟民歸于一德功臣同德可不念哉物有小而感深事有微而傳遠臣謹將金像隨表奉進謹言臣說言臣聞勇士冠雞武夫戴鶡推情舉類獲此鬬羊遠生越巂蓄情剛決敵不避強戰不顧死雖為微物志不可挫伏惟陛下選良家於六郡求猛士於四方鳥無遁材獸不藏伎如蒙效奇靈囿角力天塲却鼓怒以作氣前躑躅以奮擊趹若奔雲之交觸碎若轉石之相叩裂骨賭勝濺血爭雄敢毅見而衝冠鷙狠聞而擊節冀將少助明主市駿骨揖怒蛙之意也若使羊能言必將曰苦鬬不解立有死者所賴至仁無殘量力取勸焉臣緣損足未堪履地謹遣男駙馬都尉垍謹詣金明門陳進輕冒宸嚴伏深戰越文林郎陳寡尤年六十四貫滄州右出身四十餘年懷道抱德博涉經史白首幽棲不求聞達堪激勵化俗處諫諍之官幽州節度使參謀劉待授年六十四貫京兆府右懷德退靜立操端確精通術數堪備顧問四品于矛心年三十二貫京兆府右志定神和學精文遠達皇王正道通古今大義堪拾遺左右以前幽州都督兼節度管內諸軍經畧大使攝御史大夫燕國公張說奏稱臣身任邊城心在庭闕報國之志莫若進賢勅旨陳寡尤等三人宜並追取試練考覆臣說言知賢不達謂之竊位聞賢而拒是乃蔽君竊位冒也蔽君姦也有姦與冒何以事君臣前歲入朝特蒙顧問聖情側席懼有遺賢臣以寡尤三人上聞天聽中書宣旨取考覆吏部寫勅宣下文書三載於今一人不至夫輕進者是干祿之人靜退者是養高之士天下廉讓之風未長趨競之俗未懲若令所司引試招其隱逸士寧伏死巖穴焉肎拜侍郎之庭哉徒有薦賢之名竟無進賢之實非朝廷禮賢之道豈陛下求賢之心近因奏謁具承天旨請勅州縣各以禮徵至京之日中書引見然後付與宰臣請言探賾必有可採寘彼周行如當謬薦罪臣所舉謹錄前舉狀本如前開元九年正月日洛州臨武縣主簿陳光乘攝監察御史在河北夔州歸州鎮將勤思齊見在桂州前申州參軍戴師倩遭憂在都勅戴師倩勤思齊或身自有犯或逆人緣坐未可擢用亦不須追以前狀準七月二十二日制內外文武職事五品以上官有奇材異畧堪任將帥者封狀進內陛下垂心萬機親擇將帥欲大頓天綱收羅雲逸今者塞北有屈強之胡漢南屯不羈之馬使邊郡憂患朝廷旰食此天下士君子飢待虜饁渴待虜血決命於匈奴之時也臣所舉前件三人光乘積學而善謀求之古人吳起韓信敵也師倩沈勇而能斷求之古人彭越吳漢類也思齊忠壯而異材求之古人張飛許褚等也皆懷道藏器仰望明時羞自媒衒莫能上達臣聞拔人於死者必捨生而報恩榮人於辱者必盡節而雪恥至如師倩思齊亦嘗生竄死地其為屈辱甚矣如蒙拯將墜之命起巳廢之魂一言所及百年可盡凡情尚知此況感激之人哉陛下發使召之旬月可到試以軍事必立奇功若不如所言請受面欺之罪臣說言臣聞水旱常數堯湯固有聖賢之理恭潔為難自冬踰春積陽成亢陛下以時災繫政人患由君退巫女之雩却應龍之請陛下躬自暴露炎景瞻仰雲漢推心引譴為人受咎誠既發而動天言剋期而降雨今巳霖霪三日澤漏重泉草樹含欣郊原變色加以雲平雨細氣潤風和豈惟優渥王畿必將周遍天下㣥心舒釋聖情開暢無任萬姓懽悅之至謹奉表陳賀以聞臣說等言內侍尹鳳翔至奉宣聖旨內出新撰歷書二十五卷以示臣等竊窺深奧仰觀英華涉海登山罔知攸際臣聞唐堯光宅順昊天而定四時虞舜登庸在璿衡而齊七政伏惟開元聖文神武皇帝陛下至德廣運文明濬哲道冠生知與神合契備往聖之能事紹昔王之闕典發揮易象以應乘乾之時考正歷書更表履端之始上包二帝下括三王徵晷運之盈虛究推步之踈密備稽氣象載躔坎離三辰順軌而更明五緯合度而增煥足使天地貞觀神人允諧唐虞舊章于斯重覩臣等幸陪書府得預朝門抃躍之情實萬恒品謹奉表陳賀以聞臣說言伏以開元大衍歷天旨裁其紀綱日官考其精要履端更始敬授惟新加以辯五行之序推七精之數明徵聖期實光土德臣又見梁天監中陶宏景著玉匱記云盛德木子以肇來運頃者僧一行推璿衡歷得皇家天命成數千年古今祥兆若合符契歷數既在於聖躬卜年又表於長歷莫大之慶獨冠前王臣忝跡儒林預聞昌運無任抃躍之至謹奉表陳賀以聞太史奏太陽不虧聖德上感變災為瑞陽光增暉陰慝不作休徵之美莫盛於斯臣等無任欣抃之至謹進狀陳賀以聞謹進右臣等伏以陛下孝通天地親朝五陵拜橋陵則紫氣見獲白兔甘露降白鴿巢天光清和日色明朗拜定陵則有景雲見甘露降拜獻陵則甘露被樹祥雲抱日拜昭陵則先聖見於神游薦享之際陛下親聞欬息初進服用樂器自然發聲又素像迴面甘露降滋從祀先臣歷聞蹈舞拜乾陵則有靈草生甘露降日抱戴之瑞此皆陛下虔誠上感神靈福降四海同歡萬方抃躍臣等幸陪大禮親覩禎祥無任大慶之至謹奉表陳賀以聞臣說謹言臣說等言臣聞聖人者與天地合其德故珍符休命不可得而辭鴻名盛典不可得而讓陛下功格上天澤流厚載三五之盛莫能比崇登封告成理叶幽贊故符瑞必臻天意也書軌大同人事也菽粟屢登和平也刑罰不用至理也今陛下稽天意以固辭違人事以久讓是和平而不崇昭報至理而闕薦祖宗億兆之情猶知不可況上帝臨照祖宗顧諟其可止乎願納王公卿士列嶽縉紳之衆望迴命有司速定大典臣等不勝懇禱敢昧死再拜上言左丞相臣說右丞相臣璟等言臣聞聖人出則日月記其初王澤深則風俗傳其後故少昊著流虹之感商湯本元鳥之命孟夏有佛生之供仲春修道祖之籙追始尋源其義一也伏惟開元神武皇帝陛下二氣含神九龍浴聖清明總於玉露爽朗冠於金天月惟仲秋日在端五恒星不見之夜祥光照室之期㣥臣相賀曰誕聖之辰也焉可不以為嘉節乎比夫曲水禊亭重陽射圃五日綵線七夕粉筵豈同年而語也臣等不勝大願請以八月五日為千秋節著之甲令布於天下咸令宴樂休假三日㣥臣以是日獻甘露醇酎上萬歲壽酒王公戚里進金鏡綬帶士庶以絲結承露囊更相遺問村社作壽酒宴樂名為賽白帝報田神上明元天光啟大聖下彰皇化垂裕無窮異域占風同見美俗臣說言臣聞求人安者莫過於足食求國富者莫先於疾耕臣再任河北備知川澤竊見漳水可以灌巨野淇水可以溉湯陰若開屯田不減萬頃化萑葦為秔稻變斥鹵為膏腴用力非多為利甚溥諺云歲在申酉乞漿得酒來歲甫邇春事方興願陛下不失天時急趨地利上可以豐國下可以廩邊河漕通流易於轉運此百代之利也當今國儲未贍邊軍未息靜人業農願留聖意亦嘗賜前階之食承後騎之顧竟唯唯而無一言者豈敢隱情於聖主也正以職在仗衞憂於部伍馬上非公議之所囿遊非朝廷之事今昧死上愚見乞與大臣籌謀速下河北支度及溝渠使檢料施功不後農節謹附賀正使隨軍前曹州考城縣尉同希再奉表以聞謹言今之禮記是前漢戴德戴聖所編錄歷代傳習已向千年著為經教不可刊削至魏孫炎始改舊本以類相比有同抄書先儒所非竟不行用貞觀中魏徵因孫炎所修更加整比兼為之注先朝雖厚加賞錫其書亦竟不行今行沖等解徵所注勒成一家然與先儒第乖章句隔絕若欲行用竊恐未可臣某言伏奉某月日恩勅賜臣衣及藥渥流璿極彩溢旌門拜捧戴舞載欣載越臣受律虧方扞城無寄偏師不振逋寇仍滋進慙計日之功退積踰時之咎誠合歸罪司寇以厭深責豈圖天寵猥臨宸慈寬假當從褫服轉承且吉之衣宜肆典刑翻加有喜之藥毀車夷馬復振鑾和窮炭枯莖重敷榮燄跼影邊塞馳心闕一字城微命易投生成難謝無任感戴之至臣說言內侍尹鳳翔宣勅賜臣觀唐昌公主花燭伏以天人下嫁王宰送行苟非榮寵何階瞻望臣免歸餘叟忽承朝請之恩廢駕羸驂復覩肅雝之禮鴻私所被枯瘁生光無任歡荷之至謹奉表陳謝以聞臣說言伏奉二月二十五日制書除臣荊州大都督府長史受命荒服浮舟遄泝以今月十七日到州上訖山列楚望水橫南紀德非羊祜迹謝宋均何以鎮靜流亡攘除猛虣臣說中謝臣宿濫宸眷累塵榮奬福過生災至剛多缺及一辭庭闕巳涉五年不有自白之書竟無因人之請天光獨照雲霧頓披窮鱗更躍鎩翮仍翥揣分瞻恩何階及此媿乏才能不足宣暢皇風敢竭心力少冀上酬元造無任欣抃兢惕之至謹附送丁匠資使所部文林郎守公安縣主簿封希魯奉表陳謝以聞臣說言伏奉四月十有二日制書除臣岳州刺史某月二十七日遞書到相州承恩惶怖狼狽上道以月一日至岳州上訖臣以昔侍金華過蒙榮寵負乘招寇日待譴黜聖慈遲回仍委符守刻肌刻骨誠願上報恩私無術無才將何克宣風化夙夜慚惕胡寧啟處伏以貶官到任理在速聞不敢循常稽緩附使無任荷恩兢懼之至謹遣遞表陳謝以聞臣說言伏奉今月十六日勅令臣在家修史捧恩戴命且喜且慙臣服道儒門策名昌運掌綸四后載筆三朝階緣宿遇踐躡端揆職為劇而心盡史無閑而功廢自貽官謗待罪私門反魯之感特深藏周之望已絕豈意特流天旨重緝書雖才慙左馬而時盛周漢況復編堯舜之年事皆目覩敘羲黃之德言匪傳聞善志將訓於百王寶錄可貽於千古國家之鴻業辦矣朽臣之志願畢矣不勝天恩難任之至謹奉表附內侍尹鳳祥陳謝以聞臣說言伏奉今日恩旨賜先臣碑額悲荷交心拜捧以泣臣某中謝臣亡父先臣騭安貞下位不待昌辰先帝贈之以專城陛下目之以積善光賁重渥感慶三泉舉宗悲喜外姻歡賀昔孔篆吳札之墳秦存里子之壟事輕列國義小陪臣豈若天王禮士鳳書旌墓榮軼曩賢道映來籍在臣在子移孝為忠心効草木何酬雨露無任幽明感戴之至謹奉表陳謝以聞臣說言內給事高力士至伏奉墨制聖慈綢繆言及舊昔拜舞捧讀且驚且喜臣聞漢主眷驂乘之臣魏君憶同遊之客誠以故舊不棄而光陰易往今之聖情實過於昔臣曩蒙侍文北閣陪宴東堂庭闕一遙寒暄二載不意逢春之草承湛露之惠渥容光之隙引遲日之暉華無任荷恩戀主之至謹附高力士奉表陳謝以聞臣說言去年某月日於右銀臺門蒙天恩引對特賜慰問攝理無方以致熱疾緣在假內不敢奏聞聖慈憂軫詔使臨門伏枕在床雖氣體未適趨風拜命覺腠理遂平恩榮豈止於邱山朽質永延於龜鶴無任感戴之至謹奉表陳謝以聞臣某言中使至奉宣聖旨賜臣畫鍾馗一及新歷日一軸者猥降王人俯臨私室榮鍾睿澤寵被恩輝臣某中謝臣伏以星紀迴天陽和應律萬國仰維新之慶九霄垂湛露之恩爰及下臣亦承殊賜屏袪㣥厲繢神像以無邪允授人時頒歷書而敬授臣性惟愚懦才與職乖特蒙聖慈委以信任既負叨榮之責益懷非據之憂積愧心顏難勝惕厲豈謂光迴蓬蓽念等勳賢慶賜之榮賤微常及感深犬馬戴重邱山無任感荷之至臣某言力士至奉宣勅以臣臨岐特令賜宴恭承惠渥念及庸微天地同仁木石知感不勝惶悚戴荷之極臣某中謝臣歷觀自古君臣凡所際會或因緣黨進或延接功成故未竭而知不言而信豈有地孤援寡毀衆謗深察蒙蔽之中致曠蕩之外逢陛下特達之遇當陛下聖明之朝事出非常澤深恩重今者誓將瀝血未足竭誠徒欲殺身豈能報德至如勵精勤政與直守公酬陛下憂人之心行陛下宏道之化安敢失墜以負神明但函關路遙長安日遠不任戀主悽愴之至徐堅等所議燔柴先後議有不同據祭義及貞觀顯慶巳後既先燔若欲正失禮求祭義請從貞觀禮如且因循不改更請從顯慶禮凡祭者本以心為主心至則通於天地達於神明既有先燔後燎自可斷於聖意所至則通於神明燔之先後臣等不敢裁定右補闕臣說言臣聞明主不惡切諫以博覽忠臣不敢隱忠以曲辭伏願陛下特加裁察臣說誠惶誠恐頓首頓首死罪死罪陛下屯萬乘幸離宮暑退涼歸未降還旨愚臣固陋恐非長策請為陛下陳其不可三陽宮去洛城一百六十里有伊水之隔崿岅之峻過夏涉秋水潦方積道壞山險不通轉運河廣無梁咫尺千里扈從兵馬日費資給連雨彌旬即難周濟陛下太倉武庫並在都邑紅粟利器蘊若山邱奈何去宗廟之上都安山谷之僻處是猶倒持劍㦸示人鐏柄臣竊為陛下不取夫禍變之生在人所忽故曰安樂必戒無行所悔此不可止之理一也告成褊小萬方輻輳填城溢郭併插無所排斥居人蓬宿草次風雨暴至不知庇託孤丨旬兮老疾流轉衢巷陛下作人父母將若之何此不可止之理二也造設奇巧誘掖上心鑿山疏觀竭流漲海俯窮地脉仰出雲端易山川之氣奪農桑之土延木石運斧斤山谷連聲春夏不輟勸陛下作此者豈正人邪詩云人亦勞止汔可小康此不可止之理三也御苑東西二十里所出入來去雜人甚多外無牆垣扃禁內有榛藂谿谷猛獸所伏暴慝是憑陛下往往輕行警蹕不肅歷蒙密乘險巇卒然有逸獸狂夫驚犯左右豈不殆哉雖萬全無疑然人主之動不宜容易也易曰思患豫防願陛下為萬姓持重此不可止之理四也今國家北有胡寇覷邊南有夷獠騷徼關西小旱耕稼是憂安東近平輸漕方始臣願陛下及時旋軫深居上京息人以展農修德以來遠罷不急之役省無用之費澄心澹慮惟億萬年蒼蒼㣥生莫不幸甚臣自度芻議十不一從何者沮盤遊之娛閒林沚之翫規遠圖而替近適要後利而棄前驩未沃明主之心巳捩貴臣之意然臣血誠密奏而不愛死者不願負陛下言責之職耳輕觸天威伏地待罪臣聞韓宣適魯見周禮而嘆孔子會齊數倡優之罪列國如此況天朝乎今外蕃請和選使朝謁所當接以禮樂示以兵威雖曰戎夷不可輕易焉知無駒支之辯由余之賢哉且潑寒胡未聞典故踝體跳足盛德何觀揮水投泥失容斯甚法殊魯禮褻比齊優恐非干羽柔遠之義樽俎折衝之道願擇芻言特罷此戲干冒宸極伏深戰懼
