front:
  text: 全唐文欽定全唐文卷三百四十三顏真卿八
  hash: sha256:09d00d76bdee81d2861e9e52d51c4c5591043b97ec687d36d626b9f79ed2fafe
body:
  text: 於戲逆鱗劘上匡救之義深守死不回人臣之致極況乎文包風雅道濟生靈建一言而天下倚平含九德而三光式序超無友而獨立者其惟廣平公乎公諱璟字闕二字邢州南和人其先出於殷王元子七代祖辨魏吏部尚書襲列人子祖欽道北齊黃門侍郎並事迹崇高各見本傳高祖元節定州田曹曾祖宏俊大理丞祖務本皇櫟陽令父元撫衛州司戶贈戶部尚書自田曹至於尚書皆實浮於名而位不充量事見許公蘇頲所撰神道碑公七歲能屬文一遍誦鵩鳥賦丁尚書府君憂水漿絶口者五日八九歲時嘗夢大鳥銜書吐公口中公吞之遂乘而直上倏忽驚寤猶若下在胸間自後藻思日新襟懷益爽年十六七時或讀易曠時不精公遲而覽之自亥及寅精義必究明年進士高第補上黨尉轉王屋主簿相國蘇味道為侍御史出使精擇判官奏公為介公作長松篇以自興梅花賦以激時蘇深賞嘆之曰真王佐才也轉合宮尉長壽三年從調判入高等有司特聞天后親問所欲公以代為唐臣不求榮達詭奏云家本山東願得魏之一吏遂手詔授録事參軍拜舞趨出后異而召還又手詔拜監察御史裏行尋丁齊國太夫人憂服闋築室反耕志圖不起俄而即真遷殿中侍御史同列有博於臺中者將責名品而黜之博者惶恐自匿翌日公獨正辭引過天后悅而釋之遷天官員外郎鳳閣舍人御史中丞乃謂所親曰吾比欲優遊自免不圖要近驟至於斯其敢廢所職乎乃悉心納忠無所回避時張易之昌宗兄弟席寵脅權天下側目公危冠入奏奮不顧身天后失色蒼黃欲起公叩頭流血誓以死爭拾遺李雍奏曰陛下坐則天下安起則天下危內史令敕公出公曰天顏咫尺親奉德音不勞宰臣擅宣王命詞氣慷慨左右震悚遂俱攝詣臺庭立切責二豎股栗氣索不敢仰視自朝至於日昃敕使馳救之公不得已而罷又令詣公謝罪公拒之後有慘恤二豎來弔公辭曰貴近不宜與執法通同假滿朝士慰公二豎又欲序進公舉板迎揖之不得成禮而去神龍之興復也公實佐其謀及當疇庸讓而不受曰清宮問罪事出五王祀夏中興功歸明主非曰逃賞誰敢貪天俄拜朝散大夫吏部侍郎兼諫議大夫遷黃門侍郎嘗遇梁王武三思於朝三思方欲言事公正色謂之曰當今復子明辟王宜以侯就第何得尚干朝政三思慚懼而退請急纍月俄而兼攝尚書左丞中宗將幸西蜀深虞北鄙乃兼檢校并州大都督府長史又改兼貝州刺史與數人同辭三思獨揖公住公顧謂之曰諸人巳出不可獨留遂揖之而去屬年穀不登國租罷入三思食邑公悉蠲之既屢挫其鋒亦處之自若俄而真拜轉杭州又復遷相州尋入為洛州長史唐隆初拜吏部尚書同中書門下三品粵五日兼右庶子尋加銀青光祿大夫元宗之在儲闈鎮國太平長公主潛謀廢立嘗於光範門內坐步簷中諷宰臣以此旨諸相失色莫敢先言公盛氣詰之曰東宮有大功宗廟社稷主也安得異議遂奏婦人干政恐生禍階請不令朝謁俄而男又縱橫公奏之繇是貶楚州刺史主亦竟以凶終無何復拜銀青歷魏兗冀三州兼河北按察使尋遷幽州都督兼御史大夫復為魏州入為國子祭酒東都留守開元二年尋拜御史大夫兼京兆尹貶睦州刺史轉廣州都督充按察經略討擊使又兼御史大夫特許便宜從事前是首領桀驁多據洞不賓公之下車無敢不蔇彼之風俗競趨苟簡茅茨竹簷比屋鱗次火災歲起煨燼無餘公教之度材變以陶瓦千甍齊翼萬堵皆興於今賴焉燕國公張説著為碑頌無何使中官楊思勗召公公拜恩而就馬便行在路竟不交一言思勗以將軍貴幸泣訴於帝帝嗟嘆久之拜刑部尚書四年遷吏部兼黃門監監修國史五年改號侍中明年駕幸東都至三崤馳道險隘行不得前河南尹李朝隱知頓使中丞王怡並坐當降黜公奏曰必若致罪二臣將來必受其弊遂命公舍之曰陛下責之以臣免之是過歸於上恩由於下臣請使且待罪然後俾其復職上嘉而從之元宗嘗命公名諸皇子及公主邑號既而又令各定一美名公奏稱七子均養鳲鳩之德錫以名號不宜有殊若母寵子愛恐非正家之道王化所宜元宗悅而從之八年拜開府儀同三司進爵廣平郡開國公策勳上柱國狂豎權梁山構逆長安有司深探其獄敕公按覆如京兆司録李如璧等百餘家皆以借宅假器悉當連坐公以婚姻假借天下大同至於京城其例尤衆知情即是同反無罪不合論辜凶渠之外一切原免天下欣服焉中書令河東張公傑出將明之材獨運廟堂之上鏡機朗徹見事風生求公規模悉閲堂案每至危言讜議執正守中未嘗不廢卷失聲汗流浹背其為通賢所服也如此十三年駕幸東都以公為西京留守公極言得失無有所隱元宗感悅制曰所奏之言置之座右出入觀省以誡終身因賜綵物二百匹明年又兼吏部十七年拜尚書右丞相雅善戲謔不常矜莊與故戶部尚書王晙為莫逆之友晚而彌篤凡所談諧人輒疏取端五日蒙賜鍾乳命醫歸鍊或以為上藥異味不宜委之公曰推誠求信猶懼不應猜以待人信其可得聞者慚退二十一年抗疏告老至於再三手詔優許遂特給全祿賜絹五百匹還東京公以為大臣歸休不宜關通人事遂杜絶賓客其年駕幸洛陽公迎拜道左元宗親駐龍蹕使榮王琬勞問者數四自後中使往來賞賚不絶方崇乞言之典以極師臣之敬二十五年仲冬月十九日寢疾薨於東都明教里第享年七十五天下失聲元宗震悼追贈太尉諡曰文貞公賻物米粟常數有加喪葬官供仍詔河南少尹崔釋之充監護使夫人齊國夫人博陵崔氏滄州長史藝之女淑慎嚴整高明柔克訓諸子而慈且有威佐丞相而德無違者門內之理一以見咨躡公而歿允終偕老嗚呼公有七子復同州司功先公而卒升尚書郎太僕少卿尚漢東太守渾職方郎中諫議大夫御史中丞東京畿採訪使太子左諭德恕都官郎中延原少尹華判入高等登封尉尉氏令衡右散騎常侍兼御史中丞河南節度行軍司馬或肅或乂或哲或謀克篤前烈以休令聞以戊寅歲五月二十九日虔奉遺約歸葬公於沙河縣太尉鄉丞相原之先塋夫人合而祔焉禮也惟公間氣降神應期傑出生知禮度天縱才明玉立殿天子之拜介然秉大臣之節震電憑怒讜言而不有厥躬鼎鑊沸前臨事而義形於色蠢迪檢押難常情之所易志深直諒易古人之所難外其身而富貴不離行其道而死生勿替非夫含一之德格於皇天不二之心形於造次則何以異是乎允所謂振古之元龜皇王之威寶者矣且夫公之德烈充塞寰宇公之謀猷著明日月大歷五年冬十二月孫儼懼遺盛美不遠求蒙以真卿天祿校文叨太僕之下列憲臺執簡承諭德之深知雖青史傳信實録巳編於方册而豐碑勒銘表墓願備於論撰謹憑吏部員外郎盧僎所上行狀略陳萬一多恨闕遺其辭曰天命元鳥降而生商湯孫之緒微子分疆詞招正則尉翼文皇吏部黃門紛綸耿光忠賢世出信史相望篤生丞相祚我有唐文明純嘏毅烈堅剛恆衛間氣星辰降芒嶷然山立鏗爾金鏘忠孝之盛人倫紀綱垂髫能文夢鳥發祥通夕究易沖齡擅場勝冠結綬歷政洋洋乃尉合宮二軺琅琅賦嗤梅豔篇美松長蘇公嗟稱才必佐王滿歲從調試言高驤登聞黼扆驟列繡裳簉迹天官如圭如璋司言鳳閣綸綍煌煌乃作中丞威稜莫當志除凶狡廷劾二張天后愕眙百寮震惶公獨凜然出身激昂義形言色精貫穹蒼皇室中興嘉謨克彰功成牢讓事軼屠羊二職選曹諫議是匡載清流品屢奏封章乃侍瑣闈時維夕郎悉心糾正庶績咸康三思睢盱席寵干常責之就第慚懼靡亢左曹攝轄大鹵於襄兼刺貝邱朋辭鴈行三思揖語公獨循牆處之不怍轉斾於杭既遷鄴城遂尹洛陽乃作冡宰訏謨廟堂俄兼宮相亟綰銀黃元宗登儲鎮國是遑潛謀廢立謠諑相翔厥男撓政纍奏愆殃聿臨楚邦洊察冀方總督幽薊翻飛國庠亞相烈烈尹京趪趪旋臨建德歘蒞南荒俚帥咸蔇茅㮧是攘張公頌德雋咏甘棠所忠來召拜命即裝略無交言帝用式臧載司刑吏八座抑揚兼監黃樞鈞軸是將匪躬蹇蹇終始洸洸乃拜儀同允釐保障河東閲故汗洽流漿狂豎犯闕凶渠既戕命公覆獄咸脫死亡乃涉右揆讜論泱泱每謔王君豈常矜莊懸車告老庶保康強方崇饋酳孤映縑緗天不憗遺萎哲壞梁一人震悼九有淒涼市既罷賈舂仍絶粻乃贈太尉飾終禮滂返葬沙河羽儀央央闔朝傾祖河尹護喪生榮死哀行路感傷令人孺慕攀泣喤喤高墳崔嵬巨鹿劇旁森梢宰樹繚繞連岡吁嗟廣平宅此不暘孝孫翼翼論撰靡忘豐碑堅碣萬古訾相自古遭聖明而功不立都卿相而名不稱者蓋有之矣其或荷丕搆而繼志不忘在下位而能伸其道克揚前烈以承後昆其唯徐君乎君諱秀唐書宰相世系表作琇東海郯人也其先出於伯益實掌舜虞裔孫偃王躬行仁義遂因國命氏焉厥後樂以文侍金門稚以禮優塵榻仙人寄傲於賢聖偉長首冠於應劉英達相仍有自來矣宋有中書侍郎逵之司空羡之兄祕書監欽之欽之子尚書僕射中書令湛之湛之生黃門侍郎聿之聿之生齊太尉孝嗣孝嗣生梁侍中緄緄生陳五兵尚書君敕君敕生丹陽尹溫自司空巳還四為上公五降帝女尹生隋民部侍郎唐贈祕書監諱恕監生金紫光祿大夫右散騎常侍兼禮部尚書諱筠尚書生庫部郎中萬年令太子詹事諱昕宰相世系表云孝嗣生齊侍中緄緄生陳常侍君敷君敷生隋通事舍人榮榮生尚食直長恕恕生春官尚書枝江公筠筠生昕皆以盛德濟美垂於世家君即詹事第三子也幼而聰悟篤學能屬文事繼親以孝稱十餘歲時父友鳳閣侍郎姚元崇示君五百字詩一覽便誦姚公奇之因謂納言狄公曰徐子珠華玉潔後但不知命何如耳年十五為崇文生應舉考功員外郎沈佺期再試東堂壁畫賦公援翰立成沈公駭異之遂擢高第調補幽都縣尉充相國尚書趙彥昭朔方節度判官以事去職又歷蔡州參軍為御史宋遙關內覆囚判官公鋭精鞫訊多所全活宋公以為言公正色謂之曰僕從祖父司刑卿天授中詳理冤獄振雪者七十餘家今子孫猶困於襄陵豈忍以束溼之事以自便也因頓首請去宋謝而留之無何或訟冤於執事者召公問狀則他判官之為也宋欲別白旌公公曰僕雖不材豈可藉人之過以為巳功乎論者休之戶部侍郎徐知仁請為招慰南蠻判官奏課居最轉瀛州司法參軍侍御史趙頤貞辟宣慰判官歷湖州德清長城潤州丹陽三縣令天寶二載春二月加朝散大夫敕攝新安郡別駕採訪使齊浣梁升卿並奏為判官六載秋七月拜臨淮郡長史加朝請大夫九載夏四月除濟南郡司馬加朝議大夫十二載春三月拜信都郡長史不幸感疾天寶十三載秋七月九日終於郡之官舍春秋七十公先世塋壠宅於京師少陵原詹事府君巡按河南薨於洛汭因葬於緱氏縣西南大寇原公啓手足也顧命其子今侍御史縯曰吾家代儉約不欲華衆歸全之後其以布車一乘虔祔先塋縯泣而奉之及其葬也塋小無便地於次東馬鞍山下得紫龍飲乳岡之原龜筮從也夫人南陽縣君樊氏戶部尚書子蓋之曾孫袁州刺史文器之孫廬江太守季節之女仁孝柔明嫺於禮度左右圖史雅善琴碁中外孤弱躬自收視俾夫遠近咸懷安之春秋六十有八棄堂帳於相州之安陽天寶十五載秋八月十有四日爰遵周公之典而合祔焉禮也廣德二年春二月皇帝有事於南郊追贈君都督梁州諸軍事梁州刺史夫人南陽郡太君蓋以縯竹替白筆於赤墀董材賦於巴漢是用有永錫之寵紆裦崇之命哀榮之盛不其至矣君凡四為綱佐六奉使軒所至之邦必聞異績舉天下之政事莫不資折中焉性嗜清貧室無長物孤煢叢萃皆仰於君既嬰沈痼之疾帛丿糸歷三載縯請就上國之醫庶其逢吉君曰闔門之資者寸祿也今疾劇命也吾不以一身易百口竟不從而歿識者哀之或謂君曰君奉養嫠姊用度萬錢闕一字粻諸姑縑才五兩姑見君闕三字笑而不答退謂縯曰吾見其撫孤不見其怨德教義之士有以見其用心也君恬淡寡欲雅好攝生在新安或指靈叟於洞君齋心四日冞入其阻而後覿之訊其由來陳思王東閣祭酒蔣覬也説魏時事歷歷可聽君稽首而蘄之叟曰從我乎必可度世君以王事靡盬退而辭焉比回顧則為茅草矣初君上計濟南展㣥祖之墓松檟森然徽猷莫紀留居論撰時日以成先德之不忘繄是舉也嗚呼君體聰穎之上姿恬曠之夷度寬明足以濟衆和義足以長人口絶莠言目無還視立身先張仲之志與朋服子路之言內行可以質神明清規可以勵風俗宜克享胡耉荷天之龍光輔乎漢之得人高視乎周之列位而道之將喪命不偶時屈輿驥於身前墮峴碑於歿後吁足歎也春秋貴九世卿族漢史稱七葉珥貂陪臣於下士卑僚絶屬於天潢戚里豈比夫登台者四世尚主者五人焜耀於數朝之間蟬聯於百代之下可同年而語矣縯懿文懋學峻節清標天寶末陷居賊中為偽命連辟辭疾不起謀使家人與本朝通計為部曲所發遂遭禁詰一日之中議刑者數焉俄而官軍大至賊黨奔北由是獲免乾元中奉使巴渝屬段子璋搆逆流輩十人皆被屠害以縯高名欲留同惡期之以死承劒不回時諸道徵求人不堪命縯至之邦必荷仁信如期而畢則闕三字將崇必復之矣寧止當朝之望碑銘功伐敢墜斯文其辭曰益為帝虞偃不異途世表東海其惟徐乎或文或武或哲或儒休美後昆厥德不孤猗那都督克懋遠圖邦國四佐輶軒六徂樹聲長世與道為徒爰覿幽光無寧集枯闕八字仁義都盡彭殤曷殊所嗟人紀莫展嘉謨馬鞍山北龍乳岡隅於焉崇祔先志靡渝豐碑崔嵬宰樹縈紆闕沾濡闕公諱向字仲通以字行漁陽人也其先出於殷太師周武王封於朝鮮子仲食邑於于因而受氏漢有京兆尹裦裦十二世孫康後魏秦州刺史直閣將軍武威郡公忠於本朝為齊神武所害康元孫匡贊隋冠氏長義寧初通議大夫匡贊生士簡士迪並早孤為叔父隆州刺史匡紹所育因家於新政士簡士迪皆魁岸英偉以財雄巴蜀招徠賓客名動當時郡中憚之呼為北虜士簡生令徵公之父也倜儻豪傑多奇畫嘗傾萬金之産周濟天下士大夫與妻兄著作郎廣漢嚴從臮殿中侍御史何千里俱以氣概相高不肯仕官竟以壽終天寶九載贈遂寧郡太守廣德元年又贈太常卿公少好俠以鷹犬射獵自娛輕財尚氣果於然諾年二十餘尚未知書太常切責之縣南有離堆山斗入嘉陵江形勝峻絶公乃慷慨發憤屏棄人事鑿石搆室以居焉勵精為學至以針鈎其臉使不得睡讀書好觀大略頗工文而不好為之開元二十年年近四十舉鄉貢進士高第二十六年調補益州新都尉視事二十日謝病去二十七年長史張宥奏充劒南採訪支使宥方謀拔安戎獨與公計畫幕中之事一以咨公司馬章仇兼瓊惡之及代宥節度乃移郡收公月餘仍釋之俄令攝判使事監越嶲兵馬復奏充採訪支使盡護劒南軍事首尾二載冒暑渡瀘者凡一十八度公秉操堅忮吏人望而畏之改授新繁尉充山南西道採訪支使頃之雲南蠻動瓊請公往以便宜從事公戮其尤害者數人蠻夏懾服山南盜賊舊多光火公察其名居悉傾巢穴人到於今賴焉俄拜左衛兵曹例遷也瓊以兩道採訪節度使務悉以委公無何攝監察御史充劒南山南兩道山澤使遷大理評事充西山督察使天寶五載戶部侍郎兼御史大夫郭公虛已代瓊節制郭以庶務一皆仗公公素懷感激竭誠受委故幕府之事無遺諝焉六載拜監察御史公誅羌豪董哥羅等數十人以靖八州之地郭公將圖弱水西之八國奏公入覲元宗駭異之即日拜尚書屯田員外郎兼侍御史蜀郡司馬劒南行軍司馬既略三河收其八國長驅至故洪州與哥舒翰隴右官軍相遇於橫嶺鳴鼓而還及郭公云亡慟哭之曰公亡矣吾無為為善乎初郭公對揚天休每薦公有文武之材堪方面之寄至是遂拜公為蜀郡大都督府長史兼御史中丞持節充劒南節度副大使公當大任既竭丹誠射討吐蕃摩彌城拔之改洪州為保寧都護府塹弱水為蕃漢之界收戶數十萬闢土千餘里屬恩敕命召祇赴京師至臨皋驛上令中貴人勞問賜甲第一區又錫名馬兼供御饌俄拜司農卿將不遠而復十一載拜京兆尹公威名素重處理剛嚴公初善執事者後為所忌十二載遂貶邵陽郡司馬灌園築室以山泉琴酒自娛賦詩百餘篇俄移漢陽郡太守下車閉閣唯讀元經以自適不幸感疾以十四載閏十有一月十有五日終於官舍春秋六十有二十五載春正月歸葬於新政縣嘉陵江之西岸先塋寶應元年追贈衛尉卿廣德元年又贈太子少保公凡著坤樞十卷文集十卷並為好事者所傳於戲公負不羈之才懷當世之志方及知命始擢一第從宦十年超登四嶽拔身巴江之下自致青雲之上非夫圭璋特達聖賢相遭則何以淩厲沈浮若斯之速既而吉凶糾廠田坴慶弔相隨天眷排於賊臣雄圖屈於促景有足悲矣有子六人仲曰贈左金吾衛郎將昊隨公陷於西洱河力戰而歿季曰前鄉貢明經晃神清才秀先公而卒伯曰璧州刺史昱克篤孝行見稱衣冠公之捐館也萬里迎喪泝湍而皸瘃拔念段子章之稱亂也閣門逃賊安親而晨夕板輿叔曰萬州刺史炅雅有父風頗精吏道肅宗之幸鳳翔也竭誠幕府以佐公家今上之命庶僚也由華原之政驟登省闥作牧萬州政績尤異有詔遷祕書少監尋又改牧巴州幼曰青城尉晏稚曰成都府參軍景皆保家之主亦著令聞公弟晉字叔明敦厚溫敏少以任俠聞事公以悌稱與朋以信著好讀書而不為章句精吏道而尤擅循良再為法官三秉天憲二登郎署一宰洛陽從其兄之討南蠻也兩軍交戰仗忠信而必使其間佐寧國之如回紇也絶域奉辭布皇明而皆得要領肅宗裦異擢拜商州刺史無何超遷京兆尹不十年而兄弟相代論者偉之永泰二年秋八月有詔自太子左庶子復拜為卭州刺史兼御史中丞卭南八州都防禦觀察等使真卿與公同在御史亡兄國子司業允南弟今江陵少尹允臧又與少尹同時臺省既接通家之歡載敦世親之好以為徂謝永久所存者徽猷陵谷雖遷不朽者金石銘功篆美敢墜所聞其詞曰洪範垂休系殷封周鮮于身繇派漁陽兮世掌漢歷子孫舄奕代有丕績臮定襄兮冠氏促齡二孫夙丁隋官不寧肇定疆兮嘉陵渺渺雲臺矯矯降生京兆為龍光兮有武有文剛嚴不㣥克懋鴻勳制惟梁兮既靖巴蜀既清輦轂日聞啓沃播周行兮結友不終孤我深衷如彼飛蟲反豫戕兮邵陽典午漢陽紆組熟云心苦坦行藏兮天不憗遺哲人其萎反葬江湄咺其傷兮此令有裕教忠有素天介景祚熾而昌兮三世京尹二子專城一門載榮餘慶彰兮豐碑巍巍盛業暉暉舉世是希與天長兮使君諱王隹字子王隹渤海人其先出自帝顓頊高陽氏漢有歐陽伯和伯和孫高高孫地餘並列儒林晉有堅石著名文苑賢達繼軌其來邈乎六代祖僧寶始自渤海徙居長沙五代祖頠陳山陽郡公高祖紇陳開府儀同三司左屯衛大將軍交廣等十九州諸軍事廣州刺史襲山陽郡公功業並著於前史曾伯祖詢皇朝銀青光祿大夫給事中率更令崇賢館學士以詞學德行見重前朝筆法孤標垂名不朽曾祖允年十七以名門子入侍見賞於太宗十八加正議大夫魯王傅奉使和突厥不拜虜廷朝廷嘉之回封南海郡公施光二州刺史祖諶洛州鞏縣令父機漢州什邡令以休懿傳世著聞於家邦使君即什邡之第四子志尚恬曠顓精於詩易春秋尤明吏術所居則理開元十八年解褐安西大都護府參軍充陽集本作湯嘉惠節度推勾官外憂去職服闋補北庭大都護府戶曹參軍節度使蓋嘉運奏授金滿令仍充營田判官以破賊功當遷請回授幼弟孤姪者三人教義者稱之二十九年河西節度使奏授晉昌郡戶曹參軍攝晉昌令轉張掖郡張掖令攝司馬知郡事按吏贓罪罪人誣訟於使司百姓苗秀康順忠等三十人皆截耳稱冤節度使王捶駭焉奏與上考轉嶽州長史時屬荒旱人多莩餒君以祿奉職田并率官吏食餓者千餘人凡月餘遂多全活劒南節度使楊國忠奏知三峽轉運改衡陽郡長史賜緋魚袋天寶末羯胡作亂統江湖之兵先至南陽加賜紫金魚袋充魯炅南陽節度副使攝淮南郡長史充當郡防禦使時南陽為賊所圍諸將選懦莫敢先救至德元載君以當郡防禦士至新野芙蓉鄉遇賊合戰斬其將犯圍而入炅壯而德之賊圍解加遊擊將軍左金吾衛中郎將兼南陽郡司馬遷右驍衛將軍兼上洛郡太守充武關防禦使肅宗降璽書云卿以特達之姿抱殊常之略武關防守委卿一人屬賊陷商於復圍南陽君屯兵於淅川以保乂人吏逆賊悉力來攻六十餘日糧盡救絶遂陷賊庭賊將甘言怵君令至城下以紿炅君忠勇感激舍生徇義抗聲謂炅曰鳳翔諸將已收長安王隹不能效死軍前辱大夫所使願大夫保守忠義克終令圖賊以兵刃毆君君志氣彌厲因被執送洛陽今天子收復兩京僅得脫禍其事具向城令王瀟南陽記炅又奏君充節度兵馬使君遂辭疾不行稅駕於鄭之別墅君所居以清白廉慎聞於朝廷祿俸之餘必賙親族之貧者先疇舊業悉㣥從一竹替不私於其身又常持誦金剛淨名經向逾三紀不茹葷血者十年至是無擔石之儲而處順安時不改其度蓋淡如也識者高焉粵以上元二年秋九月十四日寢疾而終春秋六十有五夫人高平徐氏安西都護高平縣公欽識之女婦順母儀克明休德以大歷二年夏六月二十五日終於嶽州客舍享年五十有六其孤嵩臮中子崙少子峯等銜恤允窮竭力襄事以大歷十年冬十月二十四日合祔君臮夫人於滎澤縣廣武原遵理命也崙不遠千里泣而求蒙敢述無愧之詞式揚不朽之烈銘曰猗那使君世挹清芬顓經飾吏休有令聞天子命我參卿西軍驟遷大縣克懋殊勳讓行親睦耳截冤分縻祿食餓馳師解紛孤城再色罷卒益振麾守商於移兵淅濆綢繆宸眷焜耀天文力盡寇多師陷身屯詭詞紿賊解路是㣥脫禍歸朝義高天雲乞骸廷闕稅駕洧溱志敦禪誦茹絶羶葷處順齊終聊樂我云刻諸金石永永不泯
