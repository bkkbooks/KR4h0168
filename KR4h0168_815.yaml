body:
  text: 臣伏奉詔命令臣自省更勿依違者臣仰天訴地血淚交流如劍㦸攢心若湯火在已只如黃巢大寇圍逼天長小城四旬有餘竟至敗走臣散徵諸道兵甲盡出家財賞給而諸道多不發兵財物即為己有縱然遣使徵得勅旨不許過淮其時黃巢殘兇纔及二萬經過數千里軍鎮盡若無人只如潼關已東只有一徑其為險固甚于井陘豈有狂寇奔衝畧無阻礙即百二之地固是虛言神策六軍此時安在陛下倉皇西出內官奔命東來黎庶盡被殺傷衣冠悉遭屠戮今則園陵開毀宗廟荊榛遠近痛傷遐邇嗟怨雖然奸臣未悟陛下猶迷不思宗廟之焚燒不痛園陵之開毀臣之痛也實在於斯此事見之多年不獨知于今日况自萑蒲盜起朝廷徵用至多上至帥臣下及裨將以臣所料悉可坐擒用此為謀安能辦事陛下今用王鐸盡主兵權誠知狂寇必殲梟巢即覆臣讀禮至宣尼射于矍相之圃蓋觀者如堵墻使子路出延射曰潰軍之將亡國之大夫與為人後者不入于射也嚴誡如斯圖功也豈宜容易陛下安忍委敗軍之將陷一儒臣崔安潛到處貪殘只如西川可為驗矣委之副貳詎可平戎况天下兵驕在處僭越豈二儒士能戢強兵萬一乖張將何救助願陛下下念黎庶上為宗祧無使百代有抱恨之臣千古畱刮席之恥臣但慮寇生東土劉氏復興即軹道之災豈獨往日乞陛下稍畱神慮以安宗社今賢才在野憸人滿朝致陛下為亡國之君此等計將安出伏乞戮賣官鬻爵之輩徵鯁直公正之臣委之重難置之左右剋復宮闕莫尚于斯若此時謗誹忠臣沈埋烈士匡復宗社未見有期臣受國恩深不覺語切無任憂懼之至某啟今月日衙前虞候某乙賫到簡牒伏蒙召署節度掌書記者伏以記室司存雄藩重務吳中草檄始召陳琳鄴下裁牋方徵阮瑀咸持彩筆以掌軍書况地控全齊封連巨浸有外夷之琛賮多上貢之賦輿假道既繁飛章亦眾永言斯任宜委高才且某徒效聚螢未嘗吐鳳讀傳而雖云成癖為文而未見愈風忽辱簡書遽蒙辟召捧函增懼撫己知歸遐想膺門已積糜軀之志仰瞻龍節空懷拜賜之誠某啟某聞三吳詞苑不乏家聲兩晉儒林非無祖德洎風流寢薄簪紱漸稀將闡吾宗獨付全德不依華宇更托何門某遠派涓流寒林一葉學由耕石才實鏤冰爰自隨計遐方觀光上國難沽聲價易掇覊愁出谷風高先摧弱羽登門浪急預返窮鱗伏念一擲魚竿四環星琯華髮灑倚門之淚遠書開隔歲之緘而又曾棄關繻空歸未得已隨律柱捨此何之今則漸逼春期將臨試藝彎弧乏勇睇鵠增憂伏以端公三翁德服儒流言為詁訓荑枯有術肉骨多方儻蒙少借餘波微迴誕說當見長房之竹亦可為龍則知莊叟之魚終能化羽輕凟尊聽伏積憂惶延望清塵不勝翹企某啟某本異仙才又非良器叨因射策偶忝決科始脫麻衣纔沾斗粟方期清慎稍竊寵榮無何不善攝生遽沈痼疾懸虵結釁鬬蟻成災針石屢加駑羸無減並相如患渴雖覺有瘳比元晏病風猶稀可療實以彌年伏枕終日閉關嬰幼素多饘餬莫給腸然烈火鬢染繁霜分無榮達之由敢望陶鎔之力家室以幸聯姻戚合候起居伏蒙特軫襟靈深垂顧問咨嗟生業憫惻覉危許以轉銜致諸外府側聆嘉命寂聽好音扶策病躬開張淚目仰希尊旨如釋沈疴拜賜猶賒銜恩欲泣望朱門而尚遠銘丹慊以先深必也果踐玉書不移金諾資糧有羨藥餌無虞然後訪三世之名醫求千金之顯效獲離枕席再服冠纓維此昇沈實繫恩德困而待問希同喘路之牛誓此酬恩願比棲囊之雀謹專奉啟起居陳謝某啟某聞放龜者無心覓印養雀者微意求環蓋由仁發於誠惠加於物因懷感激遂效禎祥若某者泳沼未期傷弦有日仰恩波而尚遠指雲路而猶賒欲望生成猶希憫惻實以才非辯鵲道異猶龍四海投知希逢厚遇二年求試未過先塲撫螢窗而便欲灰心對鸎花而徒傷淚目加以秦吳路阻烟水程遙甘滑多違問安實闕中宵夢到星漢俄沈萬里書迴槐檀遽改而又偶師題柱竊學棄繻明未達而不還亦捨此而何適伏以曾將薄技叨忝殊私倘蒙尚憫枯鱗猶傷塌翼纔霑末薦便是深恩縱不能生報田文亦當死酬宣子傾心企望瀝懇依投圓葢低臨方輿上載苟違斯語請告神明謹啟某啟某聞干時妄動君子不為小智大謀兵家所忌進憂狂狷退恥敗亡詳觀躁靜之機爰契軍戎之事聊因牋簡假喻師徒冀憑殷氏之函用代秦庭之泣某名同膠柱用等鉛刀不思量力而行竊欲爭鋒而進洎焚舟學海決戰名塲衷甲不堅心城匪固兩經先榜但潰楚師再犯終塲亦班齊騎雄鋒缺落銳志銷磨執金鼓以無因送降旗而不暇李陵矢盡項籍兵窮歸漢懷慚還吳失計所以重噓懦氣再奮空拳欲罷不能既蘇復上將欲戒嚴文陣蹂躪議圍贖孟明奔命之辜雪曹沬敗軍之辱而我師甚寡彼敵尚強未暇爭衡空憂失律持疑不進掉鞅難前先懷納款之誠欲有乞師之志伏以侍御身弓落雁心劍剸犀儒囿中軍翰林盟主揮五色筆為諸侯師出奇於文苑之中二南銜璧決勝于粉闈之內七子輿棺儻蒙益以奇兵濟之餘勇旁麾義櫓遠借雲梯使武庫戈矛皆為我旅文山草木盡作王師苟無必勝之功甘受後期之責塵浼清聽伏積憂惶謹啟某啟某聞柳文暢之遇王融初因雅韻劉嗣芳之逢沈約實自片辭或兩句可嘉或一篇堪獎則題於團扇寫在郊居遂使西邸流芳南朝溢美時名愈大紙價愈高今也故事具存清風盡在每因投卷竊賀伊人雖有負於斯文幸遭逢其至鑒若某者學殊半豹藝愧全牛慙無經濟之文空有悲哀之賦投竿魚浦簉跡龍津無一時暫廢討論無一日敢忘索課誠不足揄揚大政感動知音比於雕蟲為文鳥跡成字雖無關至理亦粗有可觀輒敢編錄荒蕪輕塵裁鑒禽中一鶚冀文舉之明知獄底雙龍庶茂先之必識儻或冰壺借潤水鏡分光如其積玉之名示以鑑金之譽一日三復非敢望於休文拂席易衣竊有期於謝混仲尼墻峻元禮門深非因咫尺之書難寫依投之懇絃哀柱促言切詞繁先甘妄進之嗤後受自媒之責干犯明德伏積兢慚謹啟某啟某聞鄭元之謁馬融不知不去趙壹之干羊陟未遇未休或三年常在於門庭或一日再經其墻仞蓋以此時儒學無出於馬公當世文儒莫先於羊子今所以重桴靈鼓復扣洪鐘者實存於此也某問不知三書惟闕五未能窺豹強欲知龍洎投棄綸竿依憑湘帙從田巴於稷下謁楊震於關西三篋之書粗知篇目一枚墜簡微識指歸栖遲雖甚於蘇秦辛苦近同於甯越時或嚴霜屆節脫葉辭枝曲突無烟幽窗有雪飛文月殿欲擬謝莊染翰蘭臺思齊宋玉實以鈍踰龎統魯極曾參三犯龍門屢奔鯨浪元珠難得空迷罔象之津大道多歧頻灑亡羊之泣輒塵藻鑒叨獻菲辭竊自朋游或聞推許潘生摛錦巧借丹青謝氏碎金猥加流品亦復願披仙霧頻扣朱門冀遂望塵不期倒屣今則籓羝類窘幕燕同危正當羸角之時未識安巢之計輒披肝胆來訴融明伏以學士辨敵飛龜才雄白鳳鑒同止水公甚平衡潤青藻於詞林薙榛蕪於義路講理則絲繩讓直發言則山嶽慚輕儻假以風雲賜之慰薦奏揚雄於漢殿始郭隗於燕臺願借吹噓豈無裨助至於斬衣畢命顧印酬恩夜盜狐裘曉開魚鑰凡於死所請以身先干犯清嚴無任隕越謹啟某啟某聞收燼枝於烈焰必假良知出埋刃於重泉當資至鑒苟非精識孰測神功蓋由六律五音固應難審靈鋒寶鍔或未易知某不善守株妄修通刺爰從前歲秋杪去年冬初累貢菲詞上干藻鑑實以仙凡阻越流品懸殊天上程遙人間信斷在塵寰而祝望空有精誠向雲路以存思寧通夢想近者以龍門阻浪鸎谷摧枝鱗鬣傷殘羽翰零落懷鄉莊舄正苦越吟去國鍾儀方悲楚奏誰言否極忽有泰來前日某官委訪窮居曲傳芳訊側聆尊旨跪聽玉音竊聞俯降咨嗟深垂憫惻初疑夢覺終謂風傳方當退鷁之時忽得攀龍之便伏以學士優游仙苑泛泳天潢覆錦高眠八花磚而讓寵含香視草五色筆以慚神况鏤鼎思調前籌待運起骸有術肉骨多方儻蒙列在眾賓致之下舍曉彈長鋏不空效其旅魚夜取珍裘竊欲偕于狗盜下情無任攀望依託感激之至謹啟某啟某聞天列將星國分戎律必命英傑以專統臨故入則掌驍衞而主親兵為王心膂出則驅隼旟而駕熊軾分國土田苟非敵號萬人謀通七德孰副擁旌之選仍當注意之求伏以尚書勇冠山西聲聞隴右九天九地之法夜受於神姝金箱金櫃之書曉傳於靈叟故得拔劍龍吼彎弧雁驚使夷落無喧干戈盡偃邊烽息焰塞柝沈聲為天子之長城斷匈奴之右臂加以文通三變學洞九流郭璞神毫每通於夢想羅含彩羽素貯於心誠時或月滿青樓風清畫閣謝元暉之理郡不廢謳吟杜元凱之禦戎何妨講讀而又政惟師古恩切字人利刃一揮亂繩皆理佇見鳳銜仙詔豹製牙旗長驅十乘之驍雄福致一方之黎庶遐瞻寵渥不越秋冬某稷下儒生天涯客子遠攜書劍來拜旌旗識馬援之鬚眉見太初之禮樂頻叨前席屢聽元談憂一夫不濟其生恥一物不得其所義形顏色照發襟靈因敢覼縷血誠輕塵藻鑒必希恩察少賜知憐某射鵠無功亡羊有恨婁敬之衣裘屢敝張儀之頰舌何為至於草織衡門雪封陋巷蛙鳴竈底魚躍釜中然猶講樹未休書筠不巳潛修此道以俟明時春初將謁朱門卜行上國蓍言利見龜告叶從徑趨沙漠而來直指旌旗之下盡披肝膈布在牋毫事逼丹誠言多直致志同鄰女止希蘇代之餘光身類鮒魚惟冀莊周之一勺干犯清重無任兢惶謹啟某啟某聞弱水渺瀰匪風輪而不濟丹邱懸邈微羽駕而何之苟非元化之功寧造長生之境其有本無靈氣復異仙才徒勤九轉之功未識三清之路侍立於葛洪陂上願附龍鱗徘徊於緱氏山前思隨鶴馭敢傾丹赤盡寄牋毫扣德操之鼓鐘冀聞音響仰劉琨之山海庶覿高深或覬憐憫少加披省某勾吳寒族鄒魯庸儒偶斆殺青因思拾紫捨獨繭文竿之樂預橫經染翰之游一別楚山四凋秦葉進惟角觸退則覊棲望化羽之期烏頭詎白困龍門之險魚尾將頳近者輒以荒蕪上千裁鑒實慚小道不副至公或自朋游竊聆風旨潘江陸海曲借品流繡叚金聲仍如緣飾今則將臨筆陣漸逼掄材既乏先容惟憂點額絃哀柱促風勁葉危輒寫丹誠仰塵清鑒儻蒙特分餘潤微假末光朽枿生荑寒灰發焰纔沾慰薦便是光華酬恩豈止於捐軀効德願同於異類迴眸顧印庶竊比於龜靈四代五公請先兆於雀報某啟某聞河南器賈本為能文渭北推袁曾因善賦或以年將弱冠或以才越眾流繇是援自後生寘諸前席高亶洛陽之價雄專倚馬之名故能為文苑之美譚作儒家之盛觀若某年將逾誼才不及宏論乏過秦詩殊詠史徒修通刺莫偶深知加以故國三千青霄九萬但抱覊離之苦畧無騫翥之期陶元亮之揮毫只思歸去庾子山之染翰空有悲哀近者不自揣量輒懷狂狷累緘巴唱來叩郢門螢近燭龍敢言芒耀鷃親威鳳方恥羽儀近自朋游竊聆風旨每承譚論常借丹青免貽覆甕之譏叨枉擲金之譽此皆情深誘掖意在維持洛下之名華徑容攀附記吳中之氏族常在接聯令申孔李之交許入原嘗之舍且知逢晏子屈則宜伸媒遇蹇修醜而思嫁所以更傾幽抱來訴融襟宋玉雄風必加吹煦謝莊明月終借光輝獲居七士之間便是百生之忝干犯清聽伏積憂惶謹啟某啟某聞哲匠搜材不遺於櫰桷至公選士無間於蒿萊苟求其文行高明豈計其人材仄陋故王裒之臨益部首薦郡人杜密之理太山先推縣吏咸齒公侯之爵秩鬱為文學之宗師若某者早寓樂郊實為編籍數間螢牖猶存於去獸江邊一葉漁舟尚繫於還珠岸下頃者不量名分學翫縑緗足履春闈肩隨貢士爭先路狹角力材微伏膺於孔硯江毫終愧於秦雞遼豕加以中堂千里丹禁九重空吟招隱之詩誰買長門之賦寒同冰子久迷溫燠之途窮類偶人更軫漂流之嘆伏念自隨鄉薦便託門墻每以蕪詞常干藻鑒必謂秉持刀尺流品生徒豈期來暮興歌亂繩思理輒提郡竹俄擲省蘭寧知出刺之邦又是維桑之地伏以郎中含香望重覆錦才高輟自南宮出臨偏郡池魚官犢既濟於公私綸閣闈已形於僉矚某近得弟霄狀報竊知曲敦奬勸俯念孱微深嘉甯越之辛勤仍憫酈生之落魄大垂恩煦下蔭宗親兒童知激勵之風骨肉感饘餬之賜伏以秦吳阻隔江嶺縈迴不獲奔走階庭拜陳感激隨車在御空懷軾下之熊無翼凌虛更羨旟邊之隼某聞陳太守之獎善先自郡人鄭司農之受知始從鄉佐欲使恩隆薄俗化起儒門年代雖遷風流常在某者樵蘇賤品桑梓遺民識昧機先智惟人下陳於器用則魏瓠興譏列在宮商則齊竽致誚徒以幼知經訓長辨義方偶近縑緗遂捐耕釣披經閱史無怠於光陰雪牖螢窗每加於懸刺至於論都敘別歎逝悲秋假烏有以交談擬子虛而發論偶以書筠得句聊因起草成篇木海郭江亦常關慮宋風謝月素所縈心縱不及於前修時見推於同輩爰自束書辭楚懷刺游秦求試春官昇名貢士投暗而終多齟齬秉機而本乏梯媒纔犯龍津旋悲鶂退且桃花浪峻難前短鬣纖鱗蘋葉風高預返疎翎弱羽雖匡衡遊宦未及十年而卞氏傷嗟俄經再刖迴翔輦下求索關中橫戈而未忍先降掉鞅而猶思更戰竊念秦舟巳爇敵在不還蜀柱曾題途窮未返而又戀深陟岵悲重倚門父子棲遲鄉閭共笑蘇秦羈旅骨肉相疑儻蒙特降文符稍存庥庇纔聞顧盼便是恩榮使魯鄰知敬孔某楚市不陵韓信謝郎中端楚公皆曾投謁遂忝眷知近聞有使還家便令附狀訴言名姓實辱獎憐非敢趦趄妄邀聲援某聞皎鏡當懸無疲屢照華鐘在簴不阻頻鏗其有飭貌前來橫筳直進思投朗鑒願聽洪音孔室高深前遠仲由之懇羊門峻阻難傳趙壹之懷所以再託牋毫用為紹介某吳門釣者闕里儒徒捨詹何獨繭之綸學楊子雕蟲之技慕顓孫之干祿效車子之聚螢西過許昌空吟景福東游鄒魯欲擬靈光時或風入楚臺雪飛梁苑偶然成詠忽爾盈篇是用歷韓鄭之門庭學楊衡之刺謁刻舟琢木未擬迂疏鑿枘攻堅難方齟齬以致兩臨文陣俱挫筆鋒東郭先生將逃濫吹步兵校尉欲泣窮途然亦默聽時謠頗聞通論以為蔡中郎之未顧則竹棄柯亭張司空之見知則劍辭圜室以時方濟會物有窮通須因甄藻之時冀別沈淪之所求諸作者不在他人是以某月日輒貢菲詞上干英眄以侍郎學士作時儀鳳為國元龜學海波瀾常融沆瀣情田壟畝曾稔耕耘屬詞則麗藻恒春視草則文星鎮動言能振蟄勢可燃灰儻蒙垂一顧之恩出陸沈之所平生進退決在指縱干犯清嚴無任惶懼企望之至謹啟某聞積塊為龍猶能致雨攻堅作鳥亦善因風此皆出自巧心營於敏手被之鱗甲假以毛羽纔離土木之形便達陰陽之理當其入用猶或濟時况某跡忝人曹名殊物類瞻雲望畢粗識晦明指日看箕常知動息實以曾親筐篋強學進趨人非冠玉之儀賦乏披金之譽澗松遲茂隴葉難芳重趨孟門再困先浪以至萍漂陸海蓬轉九衢犬子生涯惟餘四壁揚雄家產不過十金猶能染翰自強草元無怠克己惟修其直道潛心將候於己知必有英賢寧無濟會自叨將陋唱再黷沖襟螢邇太陽敢言芒耀鮒游滄海方愧眇微豈期俯惻湮沈深垂汲引吐丹青於金石誇姓氏於同心榮耀既多鑴銘倍切今則俯臨文陣方假詞鋒失水多虞傷弦易怯輒披肝肺更訴融明儻蒙少借餘光微均美蔭庶使因風託便不藉於冥鴻假霧成斑無慚於隱豹塵黷清鑒無任攀望延佇憂懼之至謹啟某聞仙翁逞術叱石為羊方士呈能結巾成兔苟神靈之必至亦變化而何難其有欲改前蹤須憑異行徵諸事跡或可比倫如某者稷下庸儒吳中單緒爰從幼稚竊慕搏鵬思積學以干時欲代耕而求祿俄拋釣舸遂履名塲朝無九品之親業有三餘之苦揚子雲之詞賦自愧雕蟲丁敬禮之文章人嗤畫虎邊蓬易斷路槿難芳頻傷肅殺之威未識陽和之力窮棲家遠旅宿衣單望鵠長疏懸鶉屢弊况復吳波瀉綠秦巘堆青懷橘莫從採蘭多阻犬書一去元律方還蝶夢初迴凉宵已艾恨淚泉湧愁腸火煎數奇而只自傷身語苦而何人傾耳竊想曾披仙霧獲拜仁風煦以溫和借其光彩或終以陸沈興念再惻傷懷願假雲雷偶蘇幽蟄豈可使雞鳴函谷只美馮諼龍躍天衢獨傳文舉儻德同而義合寧古有而今無遐想音徽無任懇迫遙瞻紫氣希傳尹喜之書更詣朱門恐涉張湯之刺謹啟某啟某聞隋珠暗投路人興忿荊玉三獻明主懷疑非至珍之有纇有瑕亦明鑒之難逢難遇况某樵歌俗韻牛鐸凡聲雖委巷末途時聞中律而曲卑調下難感知音洎儒術中微時文稍變原玉之風流漸遠淵雲之事業攸歸亦嘗悵望危津潺湲阮路斂毫興感掩卷長嗟今也河薦綠圖山張翠檢開張網罟漁獵英髦周渭商巖皆辭釣築抱關負鼎盡挂簪裾必有賢人出扶聖教歷詢時論實屬高才伏惟學士瑤圃呈祥尼邱降瑞名題仙署足躡瀛洲束皙臺前間披碧簡秦王府裏時閱瑤籤徐觀動息之蹤已積鈞鎔之望某所以攜持陋唱塵玷朱門駭愕未遑軒車忽至俯畱榮誨下獎微才拜啟琅函跪吟華藻笙簧滿耳雕煥盈眸某嘗徧閱縑緗旁徵故實亦聞先達時接後來遠則沈隱侯之獎何伯言纔聞發論近則韓文公之知李長吉始議及門未有曲示恩私顯畱翰墨才微往彥遇倍昔時仰戴恩榮巳增銘篆謹當卷之鼊軸飾以錦牋置在書囊永為家寶某學慚辯豹業愧藏螢且乏智囊况無經笥雖冰盤凍筯素所牽懷而長笛短簫亦嘗關慮豈謂攻堅少益雕朽難能劉子駿之醬甌屢蒙相誚陸士衡之酒甕每沐見嘲內揣龍鍾深甘棄置去年因收敗卒决戰文塲奮藻儒林爭衡筆陣方憂殿騎忽擢丙科姓名遽接於英髦骨肉初違於凍餒懷仁空極欲報無由徒銘効死之心未得殺身之地近見某官說竊知侍郎以沈淪軫念汲引開懷欲廣薦衡遂先始隗訖使變商為角化慘成舒備雅奏於文絃偃和光於暖谷遐沾厚惠咸出深仁今也周渭告祥殷巖叶夢前籌待運鏤鼎思調明主繫心蒼生企踵某幸將微眇願託鈞衡願居擁篲之先獲厠掃門之末庶因灰粉少措毫芒下情無任大順初皇帝命小宗伯河東裴公掌邦貢次二年遙者來隱者出異人俊士始大集都下於㣥進士中得九華山杜荀鶴拔居上第諸生謝恩日列坐既定公揖生謂曰聖上嫌文教之未張思得如高宗朝拾遺陳公作詩出沒二雅馳驟建安削苦澀僻碎畧淫靡淺切破艷冶之堅陣擒雕巧之酋帥皆摧撞折角崩潰解散掃蕩詞塲廓清文祲然後有戴容州劉隨州王江寧率其徒揚鞭按轡相與呵樂來朝於正道矣以生詩有陳體可以潤國風廣王澤因擢生以塞詔意生勉為中興詩宗生謝而退次年寧親江表以僕故山偕隱者出平生所著五七言三百篇見簡詠其雅麗清苦激越之句能使貪吏廉邪臣正父慈子孝兄良弟順人倫綱紀備矣其壯語大言則決起逸發可以左攬工部袂右拍翰林肩吞賈喻八九於胷中曾不蠆介或情發乎中則極思冥搜游泳希夷形兀枯木五聲勞於呼吸萬象悉於抉剔信詩家之雄傑者也美哉裴公之知人為不誣矣於戲旌別淑慝史臣之職也僕幸得為之敘錄視其人齒尚壯才力未盡謳吟之興方酣視其繼作得如周頌魯頌者廣之為唐風集老而益精畱次序一作別為之次序景福元年壬子夏述賓客諱攸緒則天皇后從姪也天授中封安平郡王遷殿中監出為揚州大督府長史聖歷中棄官隱居嵩山避榮寵也想其始來捫危選勝駕迥裁基鈿走伊波控隱士飲牛之渚螺排緱嶠對仙人駕鶴之峯移紫府之全模寫清都之勝概王桃植砌董杏栽壇帳合蘿高床平石古飛流界練貫幽響於風湍曙景張屏掛清光於露壑時或春花發盡秋雨晴初虛籟調風斜窗印月吞露華兮潄煙液而樂天和吟酒賦兮唱琴歌焉知帝力及龍圖去呂龜鼎還劉中宗皇帝方欲訪道崑巖鳴鸞茨岫遙飛鶴版親授蒲軒扣蓬藋之荒扉遠徵枚乘掃臯夔之右席強走嚴陵莫不黃屋翹襟高霞疊夢由是輕鷗出浦明月離雲纔拜宸堦旋登甲觀以公嘗棲洞府不喜塵機雖當掛珮垂紳愈若投羅觸罟及飛章上闕雪涕辭天帳祖席於青門轄仙裝於紫陌乃知飛霜匝野冰厓畱不死之蠶烈日熒溟珠岸有不枯之草故能振清風於戚里飛逸駕於雲逵宜乎與祿產分鑣夷齊結轍比夫吞腥咽腐懷祿偷安者不亦優乎今則八桂森指五芝零落立松崖而盡日不見王孫掃石壁以題詩別招逋客豈無來哲能紹元蹤聊剖短章用旌高烈時睿文英武明德至仁廣孝皇帝御宇十二歲也龍集辛卯律中林鐘十二日丙寅題造化之功東南之勝獨會稽知名前代詞人才子謝公之倫多所吟賞湖山清秀超絕上國㣥峰接連萬水都會昇高而望盡目所窮蒼然黯然兀然澹然先春煦然似晝似翠似水似冰似霜似鏡削玉似劍者霞布似窈窕者霜清似英絕者如是者千狀萬態綿亘數百里間則夫盤龍於泉巢鳳於山蘊玉於石藏珠於淵固必有矣真駭目喪精之所也其土沃其人文雖逼閩蠻而不失禮節雖枕江海而不甚瘴疫斯焉郡邑一何勝哉將天地之樂萃於此耶至於物土所產風氣所被鳥獸草木之奇妖冶嬋娟之出前聖靈蹤往哲盛事此傳記所詳不假重言也斯但粗述其勝耳僕雖乏才自侍從至此晨夕習業之外游覽所得吟咏烟月攄散情志自足一時之興也亦足快哉然時或倚檻南臨回首西望相交朋遠誰與同之每思往年於京洛間見時俗之士浮淺之流多誇邑外人家有水木田園莊舍甚為奇勝可比江山嘗與俱往謂信然今在此乃知前者之悠悠妄誇耳不足聽且夫方壺員嶠桃源洞天自標真聖之居不與囂塵相接非但計幽隱已也至於人寰所有游觀必當顯敞知名若會稽山水深不可測高不可及如是乃能孕靈怪藏珍寶生雲霞而盡勝概耳豈於十畝之地朝夕之間鑿為汙池植為幽藪源流既邇根柢可知深不過藏青蛙密不過棲烏鵲而能出奇為勝哉今之君子多尚奇好事貴達顯揚幽僻仄陋則言之而實不足徵也不然則是人能與造物爭功矣今序其事貽諸朋好知之者幸棄彼冗瑣而同此游也為通理矣輒以數篇鄙拙寄贈誠玷視聽貴盡其樂以資笑言圓葢亭亭配乎上者星辰之與日月方輿蕩蕩列于下者山嶽之與江河合生民而是謂三才資品類而均為萬象至聰曰聖不測者神既分幽顯之殊途乃假神祇而共理所以在陽則有賢有哲斡運時權處闇則為鬼為神主張陰隲其來尚矣可得言乎隋故大將司徒陳公諱杲仁字世威漢太邱長之十七代孫也潁水聚星引蔓於盤根巨蒂長城吞日分榮于玉葉金枝風神高而鶴立松顛器局偉而鰌藏海底鄰家就學邱兒且歎于重生橋柱畱名犬子終期于復出賈誼則年逾丱歲翁歸則才本兼人丹闕上書金門應詔雕弓開而鵠裂鴻筆奮而鸞驚玉片桂枝對天顏而失喜繡衣驄馬下雲路以嘶春時屬陳劍飛空隋旗誓野象泣于開皇歲末龍驕于大業年中水調聲愁柳絮輕籠于夜月迷樓香滿桃花自落于春風鳶書過而急甚飛星鴛枕穩而誰驚醉夢以至天關震動帝輦飃揚胡頭盡縮于漳河鬼目盡生于建業繇是長山盜聚大洞兵興樂伯通則狼戾秣林婁世幹則鴟張婺水公以名光八絕道著一貞眉形高隱于石稜髭尾曾焦于電火元惡授首金鋧鈿之飛來虜騎解圍鐵連錢之入去蛇窮奔穴象怒投林俄成縛虎之功遂降祝鳩之命天門公沈法興初傾款附末恣姦欺烏頭暗寘于酒杯俄歸厚夜青骨雅當于廟食迺啟藂祠祀寢先朝神畱故土像設宏開于武進威靈密護于全吳至若湘鷰㣥飛商羊屢舞雲頭暗澹禾耳生獰南山垂欲爛之憂東海灔倒流之勢蘭羞一奠桂醑三傾滂沱之澍雨繩垂倏忽之沈陰電掃其霽霖之神速也如此又若鸛巢沈響蟻穴停封離火燒雲薰風爨野土禺之精神愁悴泥龍之鱗甲乾枯巫覡陳辭簫笳合奏筵上未容于徹饌空中已見于飜盆其救旱之靈應也又如此變乾坤之舒慘神效已多去封境之妖氛陰功更大皇唐乾符之二載也突陣將王郢等六十九人以唐山告捷浙水旋師未及賞功潛思怙亂劫庫兵而竊發掠民產以紛披移蟻蛭于狼山倚鷁舟于鼇海鉏耰合勢舉烈火以焚燒樓櫓乘風駕驚濤而出入聚黨僅盈于萬眾連頭遽陷于三州聖主臨軒出神謀而制勝將軍推轂杖金鉞以專征尚書河東裴公讀八千卷儒書學五十家兵法名光簪紱風習英雄有金熨斗之殊恩負玉唾壺之妙唱入則襞香牋而揮彩筆批天子詔書出則提龍劍而臂鵰弧主諸侯法令行開玉帳坐鎮金陵瀝精誠而願與冥通指廟貌而遙期幽贊神能長驅鬼陣高輔靈旗於蒼茫惚慌之間降雲物風濤之助遂使吳戈霜閃待舂長狄之喉越箭星流乃裂蚩尢之骨洎渠魁告斃餘黨乞降聊憑元化以成功遂抗飛章而達聽優詔尋加於爵賞鴻恩別剏其祠庭地控金甌城連鐵甕山分京峴水接蓬瀛冠葢雲浮西枕向吳之路松蘿帳合南連招隱之亭邃宇摩空雕墻繚野翠瓦疊而琉璃色透彩椽排而玳瑁斑烘窗深則青鎻疏風樓迥則璇題拂漢時或居人輟掉行客停鞍倚欄當薄雨晴初寓目向丹楓落後霜馳疋練指茂苑于煙中黛染雙螺認海門於天末堂嚴塑像廊立靈宮凜氣貌以如生奮威靈而若殺雷公電母目閃爍以疑瞋鬼將神兵口囁嚅而欲語一顧則精魂吅丂一眙載瞻則毛髮寒生所以祭非嚴而自嚴神不在而如在俄屬災流濮上盜掠江東孤城懷欲陷之憂萬姓負倒垂之懼丞相司徒燕國公軍謀出眾儒術超㣥有岸上虎之雄名有人中龍之美稱才堪料敵檄可痊風落塞外之雙鵰氣吞沙漠挫筵中之五鹿聲烜議圍以詩書禮樂之兼才領征伐牢籠之重寄移從荊渚代撫吳民前茅高舉于中途大敵窮奔于外境仰惟妙算未畢前功將全締構之能更益增修之美先是中開紺殿別坐金人化廟木於祇園變祠宮為淨土僧普愿教傳西國裔紹南宗心花墮葉於空門忍草抽芽於覺路談空說偈則天龍遊阿耨之池燃指為燈則花雨落菩提之木願以斧斤罷弄丹雘停揮拂琬玉以求刊出牋毫而請染雲也運籌無補磨盾何能鐵錢將當以銅錢徒懷素志下駟用齊於上駟未吐良謀屬詞殊異于當仁承命敢陳于固遜三言獲譽何酬椽吏之恩八字畱題更望中郎之筆銘曰乾儀廣大坤德幽元三光四氣五嶽百川陰陽莫測禍福難詮不有神道誰分化權倬彼陳公挺生隋國忠作臣範孝為民則力遏鯨波手扶鼇極生立洪勳歿畱遺德狂童作梗上將陳師陰兵助順戰卒乘時元兇殞命殘孽輸旗恩頒上爵詔立嚴祠紺獸拏雲飛翬礙日帳卷靈座門開廟室凜凜英氣堂堂偉質鬚磔蝟毛頭蹲虎骨歌鐘雜沓簠簋連延酒有餘酹香無斷煙惟神是享惟禱斯虔安民護境以永終天
