front:
  text: 全唐文欽定全唐文卷九百六十八闕名九
  hash: sha256:8243a88292b48731c90b468dd092c3e457c12df8053a977416e405605066c57e
body:
  text: 伏以御史臺臨制百司糾繩不法若事簡則風憲自肅事煩則綱紀轉輕至如婚田兩競息利交關凡所陳論皆合先陳府縣如屬諸軍諸使亦合於本司披論近日多便詣臺論訴煩褻既甚為弊頗深自今已後伏請應有論理公私債負及婚田兩競且令於本司本州府論理不得即詣臺論訢如有先進狀及接宰相下狀送到臺司勘當審知先未經本司論理者亦且請送本司如已經本司論理不平即任經臺司論訴臺司推勘寃屈不虛其本司本州元推官典並請追赴臺推勘量事情輕重科斷本推官若罪輕即罰直書下考稍重即停任貶降以此懲責庶免曠官臣今月三日已於延英面奏令臣將狀來應內外官請職田陸田限三月三十日水田限四月三十日麥田限九月三十日已前上者入後人已後上者入前人伏以令式之中並不該閏月每遇閏月交替者即公牒紛紜有司既無定條莫知所守伏以公田給使須准期程時限未明實恐遺闕今請至前件月遇閏即以十五日為定式十五日已前上者入後人已後上者入前人據今條其元闕職田並限六月三十日春麥限三月三十日宿麥限十二月三十日已前上者入新人已後上者並入舊人今亦請至前件月遇閏即以十五日為定式所冀給受有制永無訴論牛者稼穡之資邦家所重雖加條約多有違犯今後請委州府縣令並錄事參軍嚴加捉搦如有牛主自殺及盜竊殺者即請准乾元元年二月五日勅先決六十然後准法科罪其本界官吏嚴加止絕右伏以川竭既為時否泉生必表政成況近靈祠實彰聖德因風湧出當風化之所資徧地澄清誠地經之載理近者柏樹復榮於李觀蒙泉亦發於神州考其祥經皆合理代臣等商量望付史館書為國華謹具如前揚州都虞候盧行立劉㣥於會昌二年五月十四日于阿顏家喫酒與阿顏母阿焦同坐㣥自擬收阿顏為妻妄稱監軍使處分要阿顏進奉不得嫁人兼擅令人監守其阿焦遂與江都縣尉吳湘密約嫁阿顏與湘劉㣥與押軍牙官李克勳即時遮攔不得乃令江都百姓論湘取受節使李紳追湘下獄計贓處死具獄奏聞朝廷疑其寃差御史崔元藻往揚州按問據湘雖有取受罪不至死李德裕黨附李紳乃貶元藻嶺南取淮南元申文案斷湘處死今據三司使追崔元藻及淮南元推判官魏鉶並關連人款狀淮南都虞候劉㣥元推判官魏鉶典孫貞高利錢倚黃嵩江都縣典沈頒臣宰節度押牙白涉鎮遏使傅義左都虞候盧行立天長縣令張宏思典張洙清陳迴右廂子巡李行璠典臣金宏舉送吳湘妻女至澧州取受錢物人潘宰前揚府錄事參軍李公佐元推官元壽吳珙翁恭太子少保分司李德裕西川節度使李回桂管觀察使鄭亞等伏候勅旨應三院御史新除授月限伏以當司官三十餘員朝廷舊例月限守官年勞考績今監察御史以二十五月為限殿中侍御史十八月侍御史十三月所主公事起自出使推劾諸色監當經歷六察糾繩官司知左右巡使監臨倉庫四推鞫獄兩彈舉事皆無敗闕方得轉遷承前遠地除官或三月五月然始到京所務逗遛積延時月年終考課使繫虛月官事勞苦併在舊人侍御史周歲而遷或到城欲及滿歲監察二年為限或在外有至半年致此依違曾無督責臣請自今已後應當司官除新授者並請以上後繫月仍以上日在後者為新人不更數虛月不惟分月直之勞苦抑亦促遠來之道途又三館奏請御史充職等伏以臺司三院御史職在專臨如繫他曹必有所紊況推鞫公事察視百司無不急急以副期限倘或官留此地志在異銜固非便宜實亦乖當如書府或須奏請南宮可輟郎官兩館忽將闕入北省自有遺補事理至便兼不曠官伏乞聖慈察臣當司公事繫重特勅中書門下自此更不許三館奏取御史充職兼見有者亦乞落職放還改題改造並無所據酌情順理題則為宜况今士族之家通行此例雖尊卑有異而情理則同望就神主改題則為通允應文武常參官本朝及入閤進朝不到并連請假故久闕朝參等臣今月二十一日延英面奏進止以班行務在嚴肅令臣切加提舉者臣伏見元和元年御史中丞武元衡奏止於是吏部兵部禮部三司尚書侍郎郎官等選舉限內久廢朝參雖事在奉公猶奏請釐革近者已久絕提舉稍涉因循應文武常參官多妄請假不妨人事無廢宴遊但務便安有虧誠敬以至上勞聖念俾肅朝行臣忝憲司親承睿旨苟或避事實虞曠官臣請起自今已後文武常參官等除准式假及病灼然為衆所知外有以事故請假者並望許臣舉察錄奏其所陳假牒請准舊例每牒不得過三日每月不得再陳牒如本合朝日無故一不到請准常條書罰再不到臣請倍罰頻三朝不到便請具名銜奏聽進止其進朝入閤近例全合赴班一不到准條已倍書罰頻兩朝不到便請具銜奏聞所冀臣寮稍加惕厲班列得以整齊所在物產自有時價官人買賣合准時宜近日相承皆置供應戶既資影庇多是富豪州縣科差盡歸貧下不均害理為弊頗深自此已後委觀察使嚴加覺察宜並禁斷切慮諸道州府尚有此色請各牒諸州府勘會巨細申臺以憑鞫理准舊例京兆府准勅科決囚徒合差監察御史一人到府門監決御史未至其囚已引至科決處縱有寃屈披訴不及今後請許令御史先到引問如囚不稱寃然後行決其河南府准此諸州府有死囚仍委長官差官監決並先引問屠牛之禁格令至重此立條流必令禁斷臣等商量應天下諸州府如有牛死便於所在經官陳狀勘驗無他故然後始令就市解剝貨賣不得更將歸私家如有屠牛事發不惟本主抵法鄰里保社並須痛加懲責本縣官吏委刺史節級科罰仍委諸道觀察使各逐所管州縣穩便更別立條制須極嚴峻務令止絕其行營處亦准此禁斷據中書侍郎兼吏部尚書平章事崔龜從奏臣官准式合立私廟伏准會昌五年二月一日勅旨百官并不得京城內置廟如欲於京城內置廟者但准古禮於所居處置即不失敬親之禮者伏以武宗時緣南郊行事見天門街左右諸坊有人家私廟遂令禁斷但本不欲令御路左右有廟宇許令私第內置則近北諸坊漸逼宮闕十年之內悉是人家私廟今若人家居第廣寬或鄰里可兼并者必便置廟以展孝思或居處狹鄰近無可開廣者便是終身廢廟享之榮公私情禮皆極不便國朝二百餘年在私家側近者不過三數家今古殊禮頗為褻黷其餘悉在近南遠坊通行已久今若緣南路不欲令置私廟却令居處建立廟宇即須種植松柏及白楊樹近北諸坊竊恐非便以臣愚見天門街左右諸坊不許置廟其餘圍外遠坊本是隙地并舊是廢廟者許令建立則天門街側近既無私廟近北諸坊又免百官占地立廟并官至三品盡得升祔祖禰無乖禮經中外官寮已至三品者皆望有此釐革伏請下太常禮院重定立廟制度及去處庶得祀禮可遵行事無乖當奉今月一日勅宜依所奏下太常禮院詳審制度分析奏聞伏以事亡如存典禮攸重今百官悉在京師若不許於京內置廟則烝嘗之禮難復躬親孝思之心或乖薦奠若悉令於居處置廟又緣近北諸坊便於朝謁百官第宅布列坊中其間雜以居民棟宇悉皆連接令廣開則鄰無隙地廢廟貌則禮闕敬親若依令會昌五年勅文盡勒於所居置廟兼恐十數年間私廟漸逼於宮牆齊民必欲於吞併臣具詳本末冀便公私今請夾天門街左右諸坊不得立私廟其餘圍外遠坊任取舊廟及擇空閑地建立廟宇應立廟之初先取禮司詳定兼請准開元禮二品以上祠四廟三品祠三廟三品以上不須爵者四廟外有始封祖通祠五廟三品以上不得過九架並厦兩頭其三室廟制合造五間其中三間隔為三室兩頭各厦一間虛之前後亦虛之每室中西壁三分之一近南去地四尺開一埳室以石為之可容兩神主廟垣合開南門東門並有門屋餘並准開元禮及曲臺禮為定制其享獻之禮除依古禮用少牢特牲饋食外有設時新及今時熟饌者並聽仍請永為定式應赴兵部武選門官驅使官等今年新格令守選二年得驅使官盧華等狀稱各在省驅使實緣長官辛苦事力不濟所以假此武官若廢舊格貧寒不逮即須漸請停解公事交見廢闕近年諸州府及百司官長所書考第寮屬並不得知昇黜之間莫辨當否自今以後書考後但請勒各牒於本司本州懸於本司本州之門三日其外縣官則當日下縣如有昇黜不當便任敷陳其考第須便改正然後申省如勘覆之後事無乖謬則論告之人亦必懲殿又准考課令凡官人申考狀不得過兩紙刺史縣令至於賦稅畢集判斷不滯戶口無逃散田畝守常額差科均平廨宇修飾館驛如法道路開通如此之類皆是尋常職分不合計課自今以後但云所勾當常行公事並無敗闕即得准職分無失及開田招戶辨獄雪寃及新制置之事則任錄其事繇申上亦須簡要不得繁多又近年以來刺史皆自錄課績申省矜衒者則張皇其事謙退者則緘默不言自今以後其巡內刺史請並委本道觀察使定其考第然後錄申本州不得自錄課績申省又州府申官人覆得寃獄書殊考者其元推官人多不懲殿或云書下考至時又不提舉請自今以後書辨獄官人殊考日便須書元推官下考如元推官自以為屈任經廉使及臺省陳論其官人先有殿犯官長斷云至書考日與下考者如至時不舉其本州判官當書下考其所申到下考省司較其所犯如與令式相符便較定申奏至勅下後並須各牒州府又近日諸州府所申令錄課績至兩考三考以後並須重具從前功課申省以冀褒昇省司或簡勘不精便可僥倖自今以後不得輒更具從前功績申上又近日諸州府所申考解皆不指言善最或漫稱考秩或廣說門資既恥令文實為繁弊自今以後如有此色並請准令降其考第又准考課令在中上以上每進一等加祿一季中中者守本祿中下以上每退一等奪祿一季准令以此懲勸事在必行近年以來與奪幾廢或有申請之處則言無本色可支徒挂簿書竟無給與今案倉庫令支給糧祿皆以當處正倉充無倉之處則申省隨近有處支給又無者聽以稅物及和糴屯收等物充令式昭然不合隳廢自今以後每省司較考畢符牒到州後仰當時便具昇降與奪事繇申請如違令式不舉明者其所繇官請奪俸祿一季其已去任官追奪祿事並請准令式處分又准考課令官人因加戶口及勸田農並緣餘功進考者於後事若不實縱經恩宥其考皆從追改追改之事近皆不行自今以後並請准令式處分其因此得官者仍請追奪又諸道所申考解從前十月二十五日到都省都省開拆郎官押尾後至十一月末方到本司開拆多時情故可見自今以後伏請准南曹及禮部舉選解例直送當司開拆又從前以來應得考之人並給考牒以為憑據近年考使容易給牒不一或一人考牒數處請給或數年之後方始請來自今以後較考勅下其得殊考及上考人省司便據人數一時與修寫考牒請准吏部告身及禮部春官牒每人各出錢收贖其得殊考者出一千文上考者出五百文其錢便充寫考牒紙筆雜用以前件事條等或出於令文或附以近勅酌情揣事不至乖張謹並條例進上伏乞宣付中書門下請更參詳苟裨至公乞賜收采仍請三年一度准舉選格例修定頒下准勅應犯贓人宜平贓定估等奉閏七月三日勅旨刑部奏頗叶中道宜依仍編入令格者臣等令商量伏以京邑元無土絹市中所貨皆是外州縣將到若據律取當處絹價定贓平估即京師當處之絹若取河南一千一百絹價即見在市肆又無此實估將行新勅須立定規今京中市肆所貨諸府絹估各有等差但據罪人所犯贓如是見在絹及金銀雜物等一事已上並請取京時價估定如結贓即在京諸府土絹上價實估結計如罪人所取已費使及不記得當時州土色目即請便取雜州土絹市肆所貨實價中估平結計贓准前取諸州府土絹上估實價定罪伏以京中諸州府絹價逐旬移改貴賤不定前使推獄每度臨時估定贓絹即罪人性命所繫秒忽狡吏因茲得以上下令責兩市絹牙人侯建武等狀京城元不出土絹所貨者諸州土絹果閬州絹最貴每匹九百五十文上至五十尺下至四十五尺其次宋亳州土絹估每匹九百文實估價其河南土絹價亦無一千實估今以果閬州絹尺每與尋常絹不同已次校貴於宋亳州上絹伏請永為定例其外州府比者雖准律文取當處上估絹或有不出土絹縱有出處亦慮結獄之時須有勘估因其貴賤便生異端兼以諸州府絹價除果閡州絹外別無貴於宋亳州上估絹者則外州府不計有土絹及無土絹處並請一例取宋亳州土絹估每匹九百文結計如所取得絹已費使及不記得色目即請取犯處市肆見貨當取中估絹價平之如不出絹處亦請以當處見貨雜州中估價平之庶使推劾有准斷讞無疑官吏既難舞文中外自須畫一准名例律在官犯罪去官事發或事發去官犯公罪流已下各勿論疏云謂在本任犯罪去官事發或事發去官者謂事發未給斷問便即去任職此三事犯公罪流已下勿論又准會昌五年正月三日勅文據律文已去任者公罪流已下勿論公罪之條情有輕重苟涉欺詐豈得勿論向後公罪有情狀難恕並不在勿論之限今伏詳勿論之理者實啟倖門勅律所標科條未具伏見近日已來頻有長吏在官無政被人告論醜迹已達於聖聰苛政又布於人口降制使案劾並已伏愆下法司參詳即云去任縱有重罪盡得勿論此乃徒致推窮何懲奸濫且當官犯罪事迹已彰既令推勘自合停替前同去任實有等差伏請自今已後應在官犯罪事發因而去任不論公罪私罪一切准勅律科刑不在勿論之限其去任事發者公罪流已下即望許引勿論之科其有事涉欺詐情理難恕者請法司詳斷之時審詳事狀如涉此色准會昌元年正月三日勅文並不在勿論之限諸道觀察使職當廉問位在藩隅受人主之寵榮同國家之休戚不可自恃富貴惟貪優游羅聲色以自娛顧凋殘而不問縱逃顯責必受陰誅自今請責其成効專彼事權使得展意盡心恢張皇化敬事以守法度節用以減征徭有利於國者必行不以近名為利有害於人者必去不以循例為辭絕連夜之酣歌務盡忠之讜論常准此道方免曠官其巡屬州縣須知善惡具以上聞隱而不言罪歸廉帥應有論薦須是直書強能立事者上陳不得蔽善懦弱失職者奏免非可徇情如此則遠近相臨上下相制共為致理同歸至公據禮部貢院見置科目內開元禮三禮三傳三史學究道舉明算明法童子等九科近年取人頗濫曾無實藝可採徒添入仕之門須議條流俾精事業臣等已於延英面論伏奉聖旨將文字來者其前件九科臣等商量望起大中十年權停三年滿後至時赴試者令有司據所舉人先進名令中書舍人重覆問過如有本業精通堪備朝廷顧問即作等第進名候勅處分如事業荒蕪不合送名數者考官當議朝責其童子近日諸道所薦送者多年齒已過偽稱童子考其所業又是常流起今已後望令天下州府薦送童子並須實年十一十二以下仍須精熟一經問皆全通兼自能書寫者如違制條本道長吏亦議懲罰准今年六月十二日勅釐革諸道及在京諸司奏官并請章服事者其諸道奏州縣官司錄錄事參軍或見任公事敗闕不理切要替換及前任實有勞効且見有闕員即任各舉所知每道奏請仍不得過兩人其河東潞府邠寧涇原靈武鹽夏振武天德鄜坊滄德易定三川等道觀察防禦等使及嶺南五管每道每年除令錄外許量奏簿尉及中下州判司及縣丞共三人偏州不在奏州縣官限其黔中所奏州縣官及大將管內即任准舊例處分在京諸司及諸道帶職奏官或非時充替考限未滿並却與本資官諸道節度及都團練防禦使下將較奏轉試官及憲御等令諸節度使每年量許五人都團練防禦量許三人為定不得更於其外奏請其御史中丞已下即准勅文條流須有軍功方可授任自今後如顯立戰伐功勞者任具事績申奏如簡勘不虛當別具商量處分以外輒不得更有奏請其幽鎮魏三道望且准承前舊例處分今月十七日延英面奉聖旨令誡約天下州府應有逃亡戶口其賦稅差科不得攤配見在人戶上者伏以諸道州府或兵戈之後災沴之餘戶口逃亡田疇荒廢天不敷佑人多艱危鄉閭屢困於征徭帑藏因茲而耗竭遂使從來經費色額大半空系簿書緩征斂則闕於供須促期限則迫於貧苦言念凋弊勞乃憂勤不降明文孰知聖念其逃亡戶口賦稅及雜差科等須有承佃戶人方可依前應役如將闕稅課額攤於見在人戶則轉成逋債重困黎元或富者有連阡之田貧者無立錐之地欲令均一固在公平若令狡猾之徒得以升降由已望其完葺不亦難乎全由長吏竭誠方使疲甿漸泰臣等商量令諸道州府準此條流應有逃亡戶口稅賦并雜色差科等並不得輒更攤配於見存人戶之上務設法招攜多方撫御乘茲豐稔重獲昭蘇苟致安寧自當遷陟不遵詔令必舉典刑當省元掌四部御書十二庫共七萬餘卷廣明之亂一時散失後來省司購募尚及二萬餘卷及先朝再幸山南尚存一萬八千卷竊知京城制置使孫惟晟收在本軍其御書祕閣見充教坊及諸軍人占住伏以典籍國之大經祕府校讐之地其書籍並望付當省校其殘缺漸令補輯樂人乞移他所皇帝九月三日降誕伏以電曜繞樞軒頊乃降天之日光輝照室明元實命代之辰爰自我朝乃崇令節著為故事抑播前文伏惟皇帝陛下九五飛龍四三應運國稱利見天表殊休當誕聖之時感真人以衛室居在藩之際實羽客以獻符是以克紹丕圖光膺寶祚敢循故典爰定美文臣等商量以降誕日為乾和節易曰乾健也蓋乾以自強不息和則衆彙皆同遠徵易文實諧聖德請依令式休假獻賀伏以陛下光繼寶圖纂承丕緒教道克申於先訓保任實自於慈顏今則正位宸居未崇徽號伏以大行皇帝皇后母臨四海德冠六宮推尊宜正於鴻名敬上式光於睿孝望上尊號曰皇太后臣等謹按故事漢室以北山改郡蓋為文皇國朝以復姓稱子實緣憲祖或易建康之縣或更昭穆之音皆因踐祚之初合舉避行之典按爾雅釋樂篇鼓謂之止敔謂之籈今者陛下肇承丕祚始值遷都凡厥惟新式叶正始竊詳爾雅肇亦訓始臣等商量望改為肇旬朔已前星文變見仰觀垂象時軫聖慈自今月八日夜已後連遇陰雨測候不得至十三日夜一更三點天色暫晴景緯分明妖星不見於碧虛災沴潛消於天漢者皇太后慈惠臨人寬仁馭物早叶俔天之兆克彰誕聖之符今輪奐新宮規模舊典崇訓既徵於信史積善宜顯於昌期太后宮請以積善為名伏以妳婆楊氏等保持夙宵善養勞苦且隆恩澤以報勤劬竊以事體參詳合陳管見臣聞周制宮職夫人只列三人漢氏後宮之號十有四位元帝時置昭儀位視丞相秩比諸侯王至於列妾縱稱夫人亦無裂土割郡之號以乳母郭徵卿胡維著保養宣帝之功後子孫只受厚賞而無封爵之號且帝外祖母封博平君非乳母之例後漢順帝封阿母宋氏為山陽君則致漢陽地震安帝時封乳母王氏為野王君亦致地震京師其時中正上言亦以封爵過當乃貽厥咎非叶高祖山河之約至晉室中興乳母阿蘇有保元帝之功賜號保帝聖君既非爵邑又彰其功爰擇美名在理甚當至高齊陸令萱以乾阿妳授封郡君尋亂制度中宗神龍元年封乳母于氏為平恩郡夫人景龍四年封尚食高氏為蓨國夫人封爵之失始自於此後睿宗下誥封元宗乳母莫氏為夫人竊以中宗朝政歸韋氏睿宗朝駕躡軒轅當時無復紀綱歷載寖為訛弊伏以陛下重興寶運再闡丕圖奉高祖太宗之舊行往代前賢故事克臻至道以顯中興庶彙提綱衆務畢舉今者進封保母為郡夫人再至加恩須至封國夫人竊以婦人無爵從夫之爵以賞功勳則命爵又四方多事方注意公卿以勳勞昭著者室家爵邑自郡夫人今則宣授乳母為郡夫人加恩必及列土朝廷大柄以爵祿為主命爵不定其等差則天下之人無以為貴以為貴功則封比礪山榮室則爵同乳母臣等竊意有室家者實恥之況四海九州之內有功勞安社稷勳賢得不對室家慚於所命之爵其所封乳母楊氏王氏臣等參詳望賜釐革雖居溼推燥畢彰保養之勤但胙土分茅且異疏封之例況昭儀內侍燕寢位列宮嬪夫人則亞列嬙供奉左右竊按儀禮乳母緦以其名母方有緦服今則不可以嬪御之號增榮於阿保揆於禮文有乖事體宜加眷佑當樹鴻私永示規程以服寰宇臣等商量妳婆楊氏望賜號安聖君妳婆王氏望賜號福聖君第二妳婆王氏望賜號康聖君伏自遷都以來武成王廟並未置立今請改為武明王避朱全忠父諱其廟請於街西選地建立其餘修置及配享十哲七十二弟子並請准故事者伏以朝廷累年多事道途艱辛在遠舉人併阻隨計逐年所司放牓人數不常量其少多臨事增減今者干戈稍弭水陸漸通舉人等皆負笈擔簦裂裳裹足來求試藝競切觀光雖人數不廣於近年而貢籍頗甚其屈譽至於俊造亦有其人臣今欲於去年數外更放三數人佇開勸誘之門以贊文明之運已選今月二十一日放牓伏候進止比者格式申送員闕選人多有重謺皆是兩人同到本道致使磨勘之際各有爭論蓋是選人指闕之時妄稱事故銓司無因得知具狀須與注擬如到任替闕參差請准舊條殿選除此外如是格式申送員闕仰且穩便去處請官不得更妄指射諸道假滿拋官不到任不放上停官不赴任員闕及違程不及限等員闕冀其畫一免誤銓司公事者伏以皇城之內咫尺禁闈晨夜巡警固須清肅伏乞准勅條漏鼓聲絕後禁斷人行今據軍人百姓更點動後尚恣夜行特乞聖慈再下六軍止絕
