front:
  text: 全唐文欽定全唐文卷七百九十九皮日休四
  hash: sha256:ee5bc9963fa770ab7e70cb016d0a0619c4624c32afb2a1d79364ca7c0430aa55
body:
  text: 夫趙盾弒君莒僕弒父春秋顯書其過何則楚公子圍弒其君郊敖子駟弒其君僖公齊人弒其君悼公各以疾赴春秋皆書曰卒評曰人之生也上有天地次有君父君父可弒是無天地也乃生人之大惡有識之宏恥亦由漢書云律母妻母之文聖人所不書是也且趙盾反不討賊董狐謂為弒君莒僕以其寶來奔里革謂其弒父斯二者罪名以彰仲尼承彰而書耳斯三逆者弒君以疾赴仲尼非可誣也據赴而書者不忍也故不忍也者恥在其中焉懲在其中焉夫春秋弒君三十六其餘之逆亦據赴而書耳夫趙孟以無辭伐國伯以夷禮來朝春秋皆貶之曰人曰子何至其罪大者為之隱其過小者必以書之曰伐國無辭專君之命也君而可專孰有其國得不貶之乎若罪大者為之隱推亡也其罪小者必以書固存之也夫齊荼野幕之弒事起陽生楚靈乾溪之縊禍因常壽而春秋歸罪於陳乞公子比者不其遠乎曰野幕之弒罪歸陳乞陽生之罪可知矣乾溪之縊罪歸子比常壽之罪可知矣春秋之旨譬酷吏決獄矒鉗之刑尚猶不捨刀鋸之戮何自而逃夫齊桓救衛不書狄滅晉文召王而云狩於河陽曰狄實滅衛因桓救而獲全斯不滅矣文實召王因王來而稱狩斯不召矣苟桓不能救衛文不能匡王必書狄滅衛晉人召天王於河陽矣故春秋之時滅人國者衆救人國者鮮仲尼旌其恤患也背周者衆朝周者鮮仲尼旌其勤王也夫哀八年不書盟恥吳夷及十三年盟不書諸侯恥之故不録也公再與吳盟皆不書桓二年公及戎盟於唐則書吳實華族其道夷也以強要盟不曰夷乎戎實夷族其道華也以道好盟不曰華乎故恥而不書懲也以戎而書勸也夫桓二年書曰宋華督弒其君與夷及其大夫孔父僖十年又書里克弒其君卓及其大夫荀息夫君稱弒也而云及者是君臣無別也弒之者罪臣下也夫孔父以奪室見弒荀息以立言被誅是無辜之怨是以及裦之者何自臣及君也蓋貶華父與里克也俾孔父之死如與夷之死荀息之死如卓子之死及之者貴之也夫姜氏淫奔子般夭酷魯之醜也諱之可也至如公送晉葬為齊所止為邾所敗皆諱之者何也曰周之有葬魯送可也如晉以盟主而臣魯諱之者諱乎以諸侯而事諸侯也諸侯有過則削地有逆則夷宗齊魯一體諱之者諱乎以諸侯而止於諸侯也夫天下有道小國事大國邾小國也而魯諱之者諱乎以大國而敗於小國也夫定六年鄭滅許以許男歸而哀元年又書許男與楚圍蔡曰鄭實滅許而後或復之當復之時其赴不至於魯故不書耳凡國有來赴者雖小必書宋之六鷁退飛是也無來赴雖大亦闕晉之滅耿滅魏是也夫楚實滅陳後復封之狄實滅衛後復全之斯亦許之類是也夫春秋之旨獲君曰止誅臣曰刺殺其大夫執我行人鄭棄其師隕石宋五若斯者即古史之全文也奚在其筆削乎曰仲尼因魯史而修春秋是明不誣於人也又曰知吾者亦以春秋罪我者亦以春秋其是之謂乎若楊子之草元其數則易其文則元是也夫宋襄執滕子而誣之以得罪春秋則承赴而書何至魯之君也弒者五逐者二並闕而不書苟如是懲惡勸善何以為的亂臣賊子何以知懼曰夫仲尼修春秋而依微其旨固有俟爾苟無邱明發決其奧廓通其元亦赴來而責實也非可誣也如自書其魯之弒逐者則魯人攘羊仲尼證之也宋襄公伐鄭楚伐宋而救鄭與楚會泓戰既濟未陳司馬子魚請擊之公不以戰卒敗而退公羊氏以為文王之戰亦不過此日休補其文曰聖人制民患其力不可禁也設法以刑之患刑之不可止也用武以兵之兵之既出也民秉之為格殺執之為攻殘故聖人施金鼓以節之用羽旄以飾之為搜狩以教之自三代以降春秋之時禮樂之征弛掩襲之弊廣窮其力者譬角抵者爭其勝負並驅者競其先後胡為仁讓哉文王聖人之至也雖以德化未聞不兵而獲者然則伐犬夷征密須敗耆國伐崇侯虎襄公始戰齊而納孝公次及於泓則云不禽二毛不以阻隘夫聖人之愛民也班白不提挈又云一夫不獲其所豈能區區於死地決其勝於人命哉較其戰也文王不為也噫公羊氏違邱明之旨為文王之戰亦不過於此罪也士有潔其處介其止於世者行以古聖人止以古聖人不顧今之是非不隨衆之毀譽雖必不合於祿利適乎道而已矣要以今是我之非我非今之是彼知於我者聞毀適足譽不知我者聞譽適足毀昧然不顧其是非毀譽者用之嗚呼士之道得不顧其是非毀譽者用之則天下之治不啻半於淳古矣今之所譽者處以古聖人以今達者聞是則進聞非則退有愛者聞毀而疏之有不合者聞譽而洽之故道不加於世業鮮異於衆則其人貿貿於祿利蚩蚩於朝廷望天下之治不啻於淳古也難矣哉古之取天下也以民心今之取天下也以民命唐虞尚仁天下之民從而帝之不曰取天下以民心者乎漢魏尚權驅赤子於利刃之下爭寸土於百戰之內由士為諸侯由諸侯為天子非兵不能威非戰不能服不曰取天下以民命者乎由是編之為術謂太公六韜也術愈精而殺人愈多法益切而害物益甚嗚呼其亦不仁矣蚩蚩之類不敢惜死者上懼乎刑次貪乎賞民之於君猶子也何異乎父欲殺其子先紿以威後啖以利哉孟子曰我善為陳我善為戰大罪也使後之君於民有是者雖不得士吾以為猶士也周禮載師之職曰宅不毛者有里布田不耕者出屋粟凡民無職事者出夫家之征日休曰征稅者非以率民而奉君亦將以勵民而成其業也今之宅樹花卉猶恐不奇減征賦惟恐不至苟樹桑者必門嗤戶笑有能以不毛而稅者哉如曰必也居不樹桑雖勢家亦出里布則途無祼丐之民矣今之田貧者不足於耕耨轉而輸於富者富者利廣占不利廣耕如曰必也田不耕者雖勢家亦出屋粟則途無餒斃之民矣今之民善者少不肖者多苟無世守之業必鬬雞走狗格簺擊鞠以取餐於游閒太史公曰刺繡文不如倚市門是也如曰必也凡民無職事者出夫家之征則世無游隋之民矣此三者民之最急者也有國有家者可不務乎周公聖人也周典聖人之制也未有依聖制而天下不治者執事者以為何如今之相工言人相者必曰某相類龍某相類鳳某相類牛馬某至公侯某至卿相是其相類禽獸則富貴也噫立形於天地分性於萬物其貴者不過人乎人有真人形而賤貧類禽獸而富貴哉將今之人言其貌類禽獸則喜真人形則怒言其行類禽獸則怒真人心則喜夫以鳳為禽耶鳳則仁義之禽也以騶虞為獸耶則騶虞仁義之獸也今之人也仁義能符是哉是行又不若於禽獸也宜矣或曰相者有乎哉曰上善出於性大惡亦出於性中庸之人善惡在其化者也上善出於性若文王在母不憂夷吾弱不好弄是也大惡亦出於性若商臣之蜂目豺聲必殺其父叔魚之虎目豕心以賄死是也中庸之人善惡在其化者若大舜設化而有苗格仲尼垂諭而子路服是也是從善而化者也若齊桓管仲輔之則霸豎貂輔之則亂是從惡而化者也故舜相於堯而天下平禹相於舜而大災弭咎繇相禹斯謂相見者見人知其賢愚見國知其治亂亦相也或曰賢愚者見行事而知也敢問聖人之相人知其有位哉曰堯之於舜任之以天下知其有位也舜之於四凶投之於四裔知其無位也曰苟若是聖人之能相人也是必賢者得其位不肖者不立朝三苗九黎焉得以侯飛廉惡來焉得以爵曰有是者其君不能相也將其國之是滅豈相人而用哉是則三苗九黎未聞不滅飛廉惡來未聞不誅嗚呼聖人之相人也不差忽微不失纍黍言其善必善言其惡必惡言其勝任必勝任今之人不以是術行其區區求子卿唐舉之術居其窮處其困不思以道達不能以德進言其有位必翻然自負坐白屋有公侯之姿食藜羹有卿相之色蓋不能自相其心者或有士居窮處困望一金之助已有沒齒之難有誕妄之人自稱精子卿唐舉之術取其金則易於反掌矣有能以聖賢之道自相其心哉嗚呼舉世從之吾獨戾也其不勝明矣彭澤縣鄉曰黃花有農戶曰逢氏田甚廣巳牛不能備耕嘗僦他牛以兼其力逢氏之猾惡為一鄉之師焉得他牛則晝役夕歸箠耕於烈景笞耨於晦冥未嘗一息容其殆忽一日猝雷發山逢氏震死日休曰逢氏之猾惡天假雷刑絶其命信矣夫生民之基不過乎稼穡之功皆不為是畜之力哉則天之保牛齊民命也宜矣今逢氏苦其力天則震死如燕趙無賴少年椎之以私享烹之以市貨法不可戢刑不可威則天之保牛皆不降於雷刑哉則逢氏之死吾不知是天地也匯澤之場農夫持弓矢行其稼穡之側有苕頃為農夫息其傍未久苕花紛然不吹而飛若有物娭視之虎也跳踉哮㘚視其狀若有所獲負不勝其喜之態也農夫謂虎見已將遇食而喜者乃挺矢匿形伺其重娭發貫其腋雷然而踣及視之枕死麕而斃矣意者謂獲其麕將食而娭將娭而害日休曰噫古之士獲一名受一位如已不足於名位而已豈有喜於富貴娭於權勢哉然反是者獲一名不勝其驕也受一位不勝其傲也驕傲未足於心而刑禍已滅其屬其不勝任與夫獲死麕者幾希悲夫吾以名位為死麕以刑禍為農夫庶乎免於今世矣莊生免范蠡之子死至矣夫范蠡子復取其金則怒乃言於楚王死之嗚呼夫交者以義合至死不離也以利合者全於利前者鮮矣况利死之後哉則莊生謂畢事而歸金其言信矣至其取金則復言而死之焉有夫歸金之心也哉是莊生與范蠡果曰利合也或曰莊生非利金而渝言是范蠡之子利金而渝言也曰夫赦者楚之常法也范蠡不謂乎赦謂楚之常法以其兄自合不死非莊生之力也故取夫金是愚豎之纎鄙也何足責哉如莊生與范蠡義合則取金之信以易乎人命也哉是果曰利合兼不全於利前者也王莽竊弄漢柄擅斥帝族當其時有名臣名士身被漢祿者闔朝皆然也莫不回忠作佞變直為邪曾不敢一忤莽色以平帝得親乎外氏者也而宇乃以為謀事泄受禍日休旌之曰若宇之道真忠烈之士哉不以其父得天下為利以反道為慮不以已將為天子之子為貴以愆咎為戒嗚呼宇之道大不負天地幽不慚鬼神貞不愧金石明不讓日月於臣子之義備矣而班氏忘讚皮子旌之悲夫古者將在軍君命有所不受若穰苴之斬莊賈孫武之僇宮嬪魏絳之辱楊干是也如建者為軍正丞設御史有奸在建職當以狀聞自有天子之刑名如擅斬者乃一夫之暴賊上吏者也以辱國威國威者軍刑者也夫軍正之職當申明其法於軍師亦不可擅行誅殺也正且不可况又丞哉嗚呼漢不以是僇建以正其罪反以詔命賞之嘻妄矣過直近乎暴物過訐近乎擅命有之不戢在家為賊子在國為亂臣其建之謂矣符朗著符子言項託詆訿夫子之意者以吾道將不勝於黃老嗚呼孔子門唯稱少故仲尼曰顏氏之子其殆庶幾乎又曰賢哉回也歎其道與已促固不足夫蔽之也如託之年與回少遠矣託之智與回又遠矣豈仲尼不稱之於其時耶夫四科之外有七十子七十子外有三千之徒其人也有一善仲尼未嘗不稱之豈於項氏獨掩其賢哉必不然也嗚呼項氏之有無亦如乎莊周稱盜跖漁父也墨子之稱墨尸木娟嬋也豈足然哉豈足然哉聖人知生不足其事事之死死不足其思制之生生象其死窮其思也尸象其生極其敬也夫禮者足以守不以加加則弊足以加不以闕闕則怠足以闕不以廢廢則亂故祀享立尸於廟王則迎有拜有酳有酢所以立象生之敬也今視唐禮皇帝神降而拜象乎妥尸受福於神象乎酢尸嗚呼唐有天下化平三百年其禮典赫然可以蠛漢蠓魏豈不能守周孔禮制哉故曰不以加加則弊禮無匜盥之文漢魏以來加之是也以加不以闕者周官射人祭祀則贊射牲王親射也自漢魏以來惟以毛血為薦是也足以闕不以廢古者屈到嗜芰屈建薦之謂乎非禮梁氏祀以蔬食是也嗚呼讀漢魏及梁書代無其人忍使其禮弊怠廢闕相接至此耶豈天使之然俟吾唐之人補其逸典哉是宗廟祭尸不當廢也已余行邑過此偶無令長遂寄榻縣宇步履後圃荒蕪不治獨有四小柏鬱然於草莽間與菅茅並處良可歎者後之來者當有瘦馬長官定能為四柏主人幸無忽此語也中和三年三月望日日休書皮子之先蓋鄭公之苗裔賢大夫子皮之後在戰國及秦時無譜牒可考自漢至唐其英雄賢俊在位者往往有焉前漢時名容者以善為容官至大夫後漢時名巡者為太醫令三國時無聞焉晉朝名初者為襄陽太守名京者為賢處士宋朝名熙祖者與徐廣論議苻王世名審者為堅侍郎後魏世名豹子者為魏名將子道明襲爵弟喜為使持節侍中都督秦雍梁益諸軍事大將軍仇池鎮將假公如故喜以戰守之功纍加勳爵後轉散騎常侍安南將軍豫州刺史卒於天宗爵喜弟雙仁冠軍將軍仇池鎮將北齊時名景和者以功大官封王名延宗者為黃門侍郎隋朝名子信者為刺史至於吾唐汨汨於民間無能以文取位惟從祖翁諱瑕叔舉進士有名以剛柔不合時受蜀聘為幕府纍官至刺史從翁諱行修明經及第纍官至項城令以盜不發貶州掾卒時日休之世以遠祖襄陽太守子孫因家襄陽之竟陵世世為襄陽人自有唐以來或農竟陵或隱鹿門皆不拘冠冕以至皮子嗚呼聖賢命世世不賤不足以立志地不卑不足以立名是知老子産於厲鄉仲尼生於闕里苟使李乾早胎老子豈降叔梁早嗣仲尼不生賢既家有不足為立大功致大化振大名者其在斯乎韓詩外傳曰韶用干戚非至樂也舜兼二女非達禮也封黃帝之子十九非法義也往田號泣未盡命也日休曰甚哉韓詩之文悖夫大教夫堯舜之世但務以道化天下天下嘻嘻如一家室其化雖至其制未備豈可罪以越禮哉如以韶用干戚非至樂則顓頊之八風高辛之六筮不可作矣如以舜兼二女非達禮也則堯之世其禮未定不當責也又宜矣以封黃帝之子非法義也則丹朱商君無封邑是庶人也傳曰賢者子孫必有土又曰公侯之子孫必復其始夫賢者與公侯其子孫尚不廢况有熊氏道冠於五帝化施於千世哉如以往田號泣未盡命也則舜之孝匪天也其誰知之不號泣則吾恐舜之命不及於堯用嗚呼韓氏之書抑百家崇吾道至矣夫是者吾將闕然古之所謂禮不相襲樂不相㳂者何哉非乎彼聖人也此聖人也不相襲者角其功利之深淺爾不相㳂者明其文武之優劣爾故三王迭作五帝更制夏殷易置文武遞述其禮文昭昭然若兩曜爭明百川之注瀆者矣然猶周公刊之仲尼正之以周公之才美謂後世無其人乎乃有仲尼仲尼之後迄今望其道如顏閔文如游夏者鮮矣况聖人哉是後之制禮作樂宜取周書孔策為標準也漢氏受命禮壞文毀時無聖人苟措其儀立其禮不㳂襲於聖制者妄也夫國之大祭不過乎郊祀宗廟也漢之既命其郊祀止於五畤之祀者禮不曰兆五帝之郊者乎止於昭靈之園者禮不曰天子七廟者乎而叔孫生不為之正郊祀立宗廟去秦時之非制議昭靈之非禮汲汲於朝會之儀俾漢天子為高祖身不得郊見享不及七廟噫生其制物刊厥式非不標準於聖人乎將以漢新去水火方弭兵械難為改作乎將不明壇墠之位禘祫之義者乎若然者湯伐桀周伐紂其制可知也嗚呼不明於古制樂通於時變君子不由也其叔孫生之謂矣安昌侯禹見時變異若上體不安常擇日潔齊露蓍於星宿正衣冠筮得吉卦則獻其占如有不吉禹為感慟日休讀漢史至是未嘗不為之動心因書曰夫宰相之節以巳道輔上天地平則致於君夷狄服則致於君風教行則致於君苟天地有災則歸於已兵戈屢動則歸於已萬物有妖則歸於已時政有弊則歸於已此真大宰輔之職也禹也為漢名相居師傅之尊處輔弻之位見災異屢發上不能匡於君下不能稱其職孜孜稱其於筮為事斯不足以為賢相之業也嗚呼當漢帝之重禹禹之有言如師訓門人未有門人可違師之旨也依違在位竟無所發誠伊周之罪之也大凡國有災異與禬禳占筮之事自有司存占人太祝之官為夫宰相者當提大政之綱振百司之領握天下之樞而已不空以處斯位也以直論之近乎佞以誠論之近乎僞僞宰相其名儒之恥耶嗚呼漢之尊禹崇師道也禹若此者即非崇師道之過矣天不能言陰步馬乎民民不可縱是生聖人聖人之道德與命符是為堯舜性與命乖是為孔顏噫仲尼之化不及於一國而被於天下不治於一時而霈於萬世非刪詩書定禮樂贊周易修春秋者乎故孟子疊踵孔聖而贊其道敻出千世而可繼孟氏者復何人哉文中子王氏諱通字仲淹生於陳隋之間以亂世不仕退於汾晉序述六經敷為中說以行教於門人夫仲尼刪詩書定禮樂贊周易修春秋先生則有禮論二十五篇續詩三百六十篇元經三十一篇易贊七十篇孟子之門人有高第弟子公孫丑萬章焉先生則有薛收李靖魏徵李績杜如晦房元齡孟子之門人鬱鬱於亂世先生之門人赫赫於盛時較其道與孔孟豈徒然哉設先生生於孔聖之世余恐不在游夏之亞也况七十子歟惜乎德與命乖不及虻吾唐受命而歿苟唐得而用之貞觀之治不在於房杜褚魏矣後先生二百五十餘歲生日休嗜先生道業先生文因讀先生後序尚闕於贊述想先生封隧所在因為銘曰大道不明天地淪精俟聖暢教乃出先生百氏黜迹六藝騰英道符真宰用失阿衡先生門人為唐之楨差肩明哲接武名卿未逾一紀致我太平先生之功莫之與京噫諄諄之命必歸於德盛者出不徒然上應運次命代苟非相者數十祀翼出於一時者其運與命彼失此得彼得此失咸在乎諄諄之命焉奚在歸乎德也夫帝摯之德不盛於堯堯而得焉十六族之德不盛於舜舜而得焉至於咎繇德齊於舜禹道超乎稷啓禹薦於天不命而歿則諄諄之命奚歸乎嗚呼天何為哉不付咎繇之命者將欲空授天下哉未必獨死咎繇也設咎繇得天下其暮必薦益益得天下其暮之薦必有其人自咎繇之降空授之主其暴民黷天者可忍言也哉太史公曰禹封咎繇之後於英六五年春日休自淝陵之江左道出英六城下因求遺實厥祀存焉乃絓馬於古木再拜於廟庭退而碑之請樅陽小尹刊於壁銘曰惟天降聖不錫厥命一篇帝謨百王之鏡禹有奚遏薦之不定啓有令德受之而正已矣何傷明德逾盛天必從道道不由天其曰人乎哉大聖應千百年之運仁發於祥義發於瑞上聖帝也次素王也莫不應乎天地亘乎日月動乎鬼神或有守道以介死秉志以窮生確然金石不足為貞淡然冰玉不足為潔非其上古聖人不以動其心况當世富貴之士哉斯其自信乎道則天地不可得而應者也嗚呼夷齊之志當以神農虞夏形於言由是觀之豈有意於文武者哉然跡其歸周不從諫而死彼當求西伯也而得武王不曰得仁乎既得其仁而不取其諫則夷齊之死宜矣太史公以其餓死責乎天道嗚呼若夷齊之行可謂道不由天者乎如不得仁而餓死天可責也苟夷齊以殷亂可去而臣於周則周召之列矣奚有首陽之厄乎若夷齊者自信其道天不可得而應者也天尚不可應况於人乎况於鬼神乎士以知巳委用於人報其用者術苟不王要在強其國尊其君也上可以霸略次可以忠烈無王術而有霸略者可以勝人國無霸略而有忠烈者亦足以勝人國春申君之道復何如哉憂荊不勝以身市奇計不曰忠乎荊太子既去歇孤在秦其俟刑待禍若自屠以當餒虎不曰烈乎然徙都於壽春失鄧塞之固去方城之險捨江漢之利其為謀已下矣猶死以吳為宮室以魯為封疆春申之力哉當斯時也苟任荀卿之儒術廣聖深道用之期月荊可王矣然卒以猜去士以謗免賢於戲儒術之道其奧藏天地其明燭鬼神春申且不悟况李園之陰謀豈易悟哉豈易悟哉歌詩之風蕩來久矣大抵喪於南朝壞於陳叔寶然今之業是者苟不能求古於建安即江左矣苟不能求麗於江左即南朝矣或過為豔傷麗病者即南朝之罪人也吾唐來有是業者言出天地外思出鬼神表讀之則神馳八極測之則心懷四溟磊磊落落直非世間語者有李太白百歲有是業者雕金篆玉牢奇籠怪百煆為字千練成句雖不追躅太白亦後來之佳作也有與李賀同時有劉棗強焉先生姓劉氏名言史不詳其鄉里所有歌詩千首其美麗恢贍自賀外世莫得比王武俊之節制鎮冀也先生造之武俊性雄健頗好詞藝一見先生遂見異敬將署之賓位先生辭免武俊善騎射載先生以二乘逞其藝如野武俊先騎驚雙鴨起於蒲稗間武俊控弦不再發雙鴨聯斃於地武俊歡甚命先生曰某之伎如是先生之詞如是可謂文武之會矣何不出一言以讚邪先生由是馬上草射鴨歌以示武俊議者以為禰正平鸚鵡賦之類也武俊益重先生由是奏請官先生詔授棗強縣令先生辭疾不就世重之曰劉棗強亦如范萊蕪之類焉故相國隴西公夷簡之節度漢南也少與先生游且思相見命列將以襄之髹器千事賂武俊以請先生武俊許之先生由是為漢南相府賓冠隴西公日與之為筆宴其獻酬之歌詩大播於當時隴西公從事或曰以某下走之才誠不足污辱重地劉棗強至重必以公賓劉於幕吏之上何抑之如是公曰愚非惜幕間一足地不容劉也然視其狀有不足稱者諸公視某與劉分豈有間然哉反為之惜其壽爾後不得已問先生所欲為先生曰司功椽甚閒或可承闕相國由是椽之雖居官曹宴見與從事儀埒後從事又曰劉棗強縱不容在賓署承乏於掾曹詘矣奚不疏整其秩相國不得已而表奏焉詔下之日先生不恙而卒相國哀之慟曰果然止椽曹然吾愛客葬之有加等墳去襄陽郭五里曰柳子關後先生數十歲日休始以鄙文稱於襄陽襄陽邑人劉永高士也嘗述先生之道業常詠先生之歌詩且歎曰襄之人只知有孟浩然墓不知有先生墓恐百歲之後埋滅而不聞與荊棘凡骨溷吾子之文吾當刊焉日休曰存既托實録之何愧嗚呼先生之官卑不稱其德宜加私諡然棗強之號世已美矣故不加焉是為劉棗強碑銘曰巳夫先生祿不厚矣彼蒼不誠位既過於趙一兮才又逾於禰衡既當時之有道兮非歿世而無名嗚呼襄陽之西墳高三尺而不樹者其先生之故塋嗚呼天后革大命垂二十年天下晏如不讓貞觀之世是遵何道哉非以敬任公乎不然者來俊臣之酷不能誣諸武之猜不能害房齡之諫不能逆闕進士皮日休游江左至彭澤當河東公觀察之四年贊皇公刺史之二年下闕其詞曰惟唐中否帝室如燬闕一字后持權式人端委書誡牝雞易稱羸豕大樹得蘬崇臺欲墜便藩諸武作我蜴虺泉深兮東宮已矣闕北極綰我神璽媧皇肇命呂君函紀周德方木秦運為水杜闕與化宮闕致治天將啓唐載誕忠良闕為道如勃木強乃寫大辨對彼明揚一言苟悖視死如鄉少海既闊少陽既光五公始昌共交玉堂闕趙氏女山陽之鹽山人其父貿鹽盜出其息不納有司賦官捕得法當死簿已伏就刑有日矣趙氏女求見鹽鐵官泣訴於庭曰某七歲而母亡蒙父私盜官利衣食某身為生厚矣今父罪根露某當隨坐法若不可官能原乎原之不能請隨坐之法官清河崔璩義之因為減死論趙氏大泣曰某之身前則父所育今則官所賜願去髮學釋氏以報官德自以女子之言難信因出利刃於懷力截其耳以盟必然崔益義之竟全其父命趙氏侍父刑疾愈因決歸浮屠氏舍日休曰古之救危拯禍必先示信至夫家全國完則隨而乖其盟如趙氏一乳臭女子耳繼死請父命孝也自刑以盟言信也秉孝植性高蹈於世潔乎瑾瑜不足為其真芬乎茞蘭不足為其秀與夫救危拯禍者遠矣今之士見難不立其節見安不償其信者其趙女之刑人乎噫後之修女史者幸無忘耶何武者壽之驍卒也故為步卒將戍鄰霍嶽嶽生名荈有負其販者多強暴民民不便必訴於將武之至也責其強暴者盡擒而械之俟簿圓將申壽守請殺之強暴之黨懼且死乃誣訴武於壽守且曰不順守命擅生殺於外壽之守嚴悍不可犯苟聞不便於民雖劇寮貴吏皆得辱殺之至是聞武罪如乳虎遇觸怒蝮遭傷其將害也可知乃命功卒將命拲武至府武巳知理可申不奈守嚴悍必當受枉刑乃樂而俟死矣至則守怒而責武以其過武善媚對又肢體魁然乃投石狀枉之事守雅愛是類翻然釋之黜其職一級武曰吾今日不歸地下真守之賜也請得以命報居未久壽之指邑曰樅陽野寇四起其邑將危武請於守曰此真某畢命之秋也守壯之復其故職奉命為二將領偏師自間道入樅陽不意伏盜發於叢翳間兵盡駭逃武獨鬬死日休曰武之受謗不當其刑况其死乎如非武心者縱免死其心不能無憤也况感分用命哉嗚呼古之士事上遇謗當職遭辱苟其君免之必以憤報破家亡國者可勝道哉春秋弒其君三十六其中未必不由是而致者也武一卒也獨有是心嗚呼今之士事上當職苟遇謗遭辱無是心者吾又不知武一卒也
