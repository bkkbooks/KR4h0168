front:
  text: 全唐文欽定全唐文卷四百十一常衮二
  hash: sha256:98561d93f725912ec0e2b87fde6ad6691ee591dc359ea6c8909bf82ffcd1a9df
body:
  text: 門下尚書萬事之本選部五曹之右以掌邦典以掄官材漢魏以來多用宿儒高德蓋重其任也金紫光祿大夫守太子少傅集賢待制上柱國河東郡開國公裴遵慶周慎禮節敬讓素居博學而識前言懿文而敦大體乃者匡弻王室克和庶政訓導儲宮用宏三善日新之美歲晚彌彰自陶融於元和不嬰拂於俗務名臣令望清議攸歸處以銓核用澄流品抑華取實無俾滯才可吏部尚書散官勳封如故主者施行門下獻善宣美職在納言録賢任能必歸冢宰若萬事之本舉得其要一時之才選當其實則致理之體昭然可見矣簡求碩德俾之典綜金紫光祿大夫檢校戶部尚書兼御史大夫東都河南江淮山東等道轉運常平鑄錢鹽鐵等使上柱國彭城郡開國公劉晏時傑國楨高才博學超詣精理淡然素懷禮法之綱紀人倫之模表嘗處台弻以宏訓範載其清靜濟我艱難自勞於外又竭心力苟利於國不憚其煩領錢穀轉輸之重資國家經費之本務其省約加以躬親小大之政必關於慮出入農里止舍鄉亭先訪便安以之均節事積而不亂理而易從故得井賦田租萬億及秭方舟而下以給中都水旱不歉人懷其惠可謂盡瘁事國勤勞王家也思有裦進屢申退讓然以官人之任朝選無踰藉其參領用鎮風俗所揔㣥務一以咨之中外兼濟固有餘力可吏部尚書餘如故主者施行敕程品之重有若百工號令之先尤難六職崔渙學義精洞文詞典麗道高王佐才茂國華實每副名言皆顧行頃調鼎餗庶政惟和及典銓衡㣥才式序中外更茂縉紳所宗雅有大臣之節光其舊德之選冬卿命職汝往欽哉可工部尚書餘如故門下蘇武張騫使胸奴十餘歲不失節而歸漢武不過典屬國騫拜中大夫而已朕每以勞大賞薄而流嘆也頃以昆夷之俗繼好勤誠不忘綏懷喻我文告乃命太中大夫前守太子右庶子兼御史中丞上護軍賜紫金魚袋崔倫宣明威惠撫柔四海言忠事直舉無二信臨大節而不奪匪謀身而苟免終能復命亦既序成使乎四方可謂專達況躬服謨訓暢於詞律在天寶中已踐郎位選部草議至今稱之顧其階歷當處要重之地加之盡瘁服勤所宜超進總典綱紀歸於臺轄以倫才理精密練達朝章俾參柄用佇明政本仍加榮級以勸勞臣可銀青光祿大夫行尚書左丞勳如故門下國朝多以六卿之二出領三輔入必稍遷或復舊職不然則以左右轄處之中外迭居從其班列銀青光祿大夫前華州刺史兼御史大夫充鎮國軍及潼關防禦等使上柱國清河縣開國侯張重光明道若昧大方無隅循禮以節事體信以達順罔有擇行在於厥躬其學既精其德亦厚可以質正大議和恆雅俗服在通列鬱其休聲周歷五曹之副建明萬事之本剖符關輔參化京師亦既政成且聞河潤紀綱臺務圖任舊人職無不綜佇有條理可行尚書左丞散官勳封如故主者施行門下昔禹謂咎繇曰知人其難之魏武又云使吏部用心如毛玠風俗之易差不難矣今之銓綜但抑華崇本鎮以禮讓則庶官㣥才不濫於進中散大夫守尚書禮部侍郎兼集賢殿學士判院事上柱國汾陽縣開國子賜紫金魚袋薛雍含和保真莫見其際雄詞祕學德行之餘信厚可親朝之英達往者潤色鴻業煥發絲言之美又與五經諸儒質正石渠之論擢以公望二於秩宗豈惟人神之和兼舉孝秀之目鑒裁高朗加以直清進退可否歸於精實慎乃服命五年如初擇吏辨言宜當慎選無易前政副豫得人可守尚書吏部侍郎餘如故主者施行門下興化在於官人掄材歸於吏部佐平邦典選重朝倫朝議大夫守尚書左丞集賢殿學士副知院事兼修國史楊綰淡雅貞亮宏其素範學究先儒之旨文高作者之興三揖而進能守謙光一命而僂不忘恭敬頃司綸言兼掌史筆嘗亦秉直夙推無對領春卿佐轄之任有奏議紀綱之績令猷自洽厚德彌彰參我密啓屬於清鑒當勵濯纓之操不遺刈楚之才敬爾在公毋替厥服可尚書吏部侍郎餘如故門下古者參用名儒典領大郡或連書課績之最則次補公卿之缺今甄陶政化黜陟幽明若二千石理行第一中朝右職懸以相待俾長吏知勸至公大行銀青光祿大夫婺州刺史本州團練守捉使上柱國閻伯璵銀青光祿大夫衢州刺史本州團練守捉使樂陵縣開國男田季羔等早以文章侍從潤色綸言朝夕論思處正廷議名高德厚推重周行歷踐藩郡一其政理本經術以制事參理法以訓人儉以約已而下不勞靜以存誠而吏不擾風淳俗泰表率方州懋能入遷美選無易慎平秋典給事黃門副豫求以稱厥服伯璵可行尚書刑部侍郎散官勳如故季羔可行尚書給事中散官封如故主者施行門下書曰惟敬五刑以成三德秋官之任也二卿良選其在茲乎充策回紇可汗使王翊力行近乎仁率性之謂道學以博物文能變風出入中外茂昭聲實靜而居易受不辭難使乎四方不辱君命斯之謂矣今丕蔽未明孚未允命爾作小司寇敬平邦憲在寬可行刑部侍郎敕稱秩元祀春官職焉舉秀興廉國朝兼領非文儒碩茂鑒裁精實重於一時者不在此地中散大夫守太子左庶子上柱國河內縣開國子賜紫金魚袋張謂宏達有檢和平易容豈道廣而難周亦言滿而無擇博涉㣥籍通其源流振起鴻藻正其聲律翰飛北閣煥發司言居部長人不忘惠訓輔相東禁孝友彰明二宗伯之掌禮典諸侯之貢士以爾公望副茲眷求可守尚書禮部侍郎散官勳封賜如故門下夫任賢之急在適於事要當其才難豈限階序況中臺政本司舉舊章六卿二職為今盛選銀青光祿大夫守右散騎常侍上柱國汝南縣開國公蔣渙忠信孝友周而不器得元和之純能以禮節有至靜之妙豈因物遷溢聲華於文藻潤理體於經術中外之秩備更要重不失其正行之有恆自分貂蟬之列喻公卿之旨入告嘉猷直而不訐常執德於沖約亦忘情於進趨勤職已久所宜懋能百工唯時命汝典制可行尚書工部侍郎散官勳封如故主者施行敕朝議郎行尚書吏部員外郎賜緋魚袋韋元曾朝請大夫前行尚書司封員外郎兼侍御史護軍賜緋魚袋元挹等學業優深詞華通贍雅有縉紳之望列於郎署之閒久在劇曹尤推精密自登膳部克舉彌綸選重一時職參六典宜膺並拜之寵式美齊名之論元曾可守尚書吏部郎中散官賜如故元挹可行尚書吏部員外郎散官勳賜如故敕朝議郎前檢校尚書戶部郎中兼侍御史賜緋魚袋李規志學純備居有彞檢才理精達動無滯用嘗執邦憲兼毗使軒處煩行從容濟務參我地官之屬首於時俊之科亦既外除尤彰內行正名舊秩以寵回翔可守尚書戶部郎中散官賜如故敕朝議大夫前守饒州刺史嗣正平縣開國男賜紫金魚袋裴倩達識含精長材致遠秉彞尚晦金璞自明當劇居難干將獨割周歷臺閣綢繆藩鎮休聲異政亦克有終底慎材賦之殷校計軍國之用得專其任爰舉舊章佇爾發揮以之贍濟可尚書度支郎中散官封賜如故敕宣德郎前守尚書司勳郎中賜緋魚袋邵說學致其道文達其變沈靜有用貞純秉彞藹然盛名光我華省長於奏議多所損益佐夏官之劇參戎事之殷膺此俊選佇揚休問可守尚書兵部郎中散官如故敕朝議大夫前守衢州刺史賜紫金魚袋李深忠義之門懋昭前烈文儒之道宏著休問經通以濟於用廉介以約其心早擅吏能備更官序藩條之重理行尤彰亦既休間頗聞淹久宜膺郎署之選式允公才之拜可守尚書兵部郎中散官勳賜如故敕朝議郎守尚書度支郎中賜緋魚袋杜寂端其一誠周通於事久於膳部頗有敏才亦既詳達不忘恭慎掌我方志宜從序遷可守尚書職方郎中散官賜如故門下武部員外郎韋翹貞固幹事達理明權績惟著於在公才必聞於處劇遞遷郎署俾膺榮寵可為駕部郎中敕朝議郎檢校尚書吏部員外郎鄭叔則志經含章仗雅師儉罔有擇行未嘗近名省理辨疑時稱達才盛居東之佐禮處司南之重高選髦士以分劇曹正其舊員允是新命可尚書吏部員外郎散官如故敕宣議郎守尚書駕部員外郎賜緋魚袋崔夷甫朝散大夫行尚書祠部員外郎上柱國韋等清心在公彊力從政縱橫之辨嘗亦專達緣飾以儒素推彊敏參訂奏議頗練朝章宜從滿歲之遷俾輔分曹之次夷甫可尚書金部員外郎散官賜如故可行尚書倉部員外郎散官勳如故敕朝議郎行起居郎集賢殿直學士褚長孺等國之才人拔乎㣥萃精力於學五經之大儒覃思於文三變而合雅繫年秉直及霤盡規侍從之勞著於厥服含香載筆允茲並命可依前件敕朝議郎侍御史內供奉賜緋魚袋陸海儒流貫穿詞韻清麗貞以自檢峻而能通執法允歸於詳當間邪不畏於彊禦雖近遷柱史未終滿歲之勞而高選星郎實在一時之俊俾參奏議期有損益可行尚書主客員外郎散官賜如故敕朝議侍郎御史內供奉充山南西道節度管內支度營田副使賜緋魚袋房宗偃孝謹之風克傳素業賢良之器早負清才頃主方書兼毗戎政淡雅高潔在公著美臺郎之盛妙選當人處以彌綸茲謂稱職可行尚書膳部員外郎散官勳如故敕朝議大夫試太子舍人兼殿中侍御史崔殷學義精深詞華絢麗臺郎高選清論洽於朝倫郡椽左遷善聲彰於時聽頃從獎序未副才名亟膺新命俾光舊列可行尚書刑部員外郎散官如故敕朝散大夫前守祕書丞龍門縣開國男苗發德厚流光相門才子代重一經之業家承萬石之風理詣精微行歸純至麗以文藻振以英華端其誠而有恆敏於事而兼適早登學省用汰儒流喪紀外除素冠未改弟兄有裕清論多之處以彌綸之職當茲俊茂之選可行尚書都官員外郎賜緋魚袋散官封如故敕朝議郎檢校尚書倉部員外郎兼侍御史充稅青苗錢使判官賜緋魚袋莫藏用飾以文行敏於理道自執霜頗振風憲頃馳輶軒尤詳使命倚辦斯切積勞有成宜正列星之次俾承賜筆之寵可行尚書比部員外郎散官如故敕朝散大夫殿中侍御史內供奉賜緋魚袋鄭渾族華才俊風韻朗然禮以約已學以潤政常在清選久於持綱廉平直甚有名望舊制尚書郎缺以殿中執法次補之服我新命用循階歷可守尚書水部員外郎散官如故門下天子綱紀屬於風憲所以彈肅公卿課第牧守姦詐不息法令將廢豈奉憲者道未明歟眷求忠賢舉我事典金紫光祿大夫行同州刺史兼御史中丞充本州團練使守捉使上柱國平陽縣開國子敬括河汾大儒博達今古清心素行高自居粲然文章如振金石職更要重處以公亮不恃祿以私身每依經以制事頃以馮翼近輔化參京師凋殘之餘勞徠所屬自廷尉之列分內史之餘清靜而鎮流庸悉歸閭閻小康理行第一休有聲績副茲厚遇肆豫命爾亞秩台司無以時或多虞法有所貸必訪故實以澄源流直道而行不仁者遠慎乃名位為時行之可行御史大夫散官勳封如故主者施行敕開府儀同三司行梁州刺史兼御史中丞山南西道節度觀察處置支度營田等使上柱國南陽郡開國公張獻恭正以居業直以輔仁行三復而無玷剛百鍊而不缺階歷要重發揮刑政分總戎詰禁之柄處導俗宣風之長講求典禮以訓三軍精辨文法以檢㣥吏贍助孤老懷和遠夷峴南之輕裘緩帶蜀郡之得賢樂職交修文武儔諸古人而貞方侃然清峻自處端本靜性未嘗及私固可以準繩朝廷課第郡國入正二丞之列俾分三獨之事可行御史中丞散官勳封如故敕朝散大夫守尚書考功郎中長春宮使判官賜紫金魚袋崔寬南臺是兩丞之亞以久於其職者參領㣥務近制或選尚書郎纍更執憲著稱一時多以本秩行御史曹事以寬介直方潔秉彞守中學可辨政文皆達理試用有績素知其才近司考課事任猶簡足以兼濟存乎使能佇揚峻風無或廢命可兼侍御史知雜事如故敕殿中侍御史內供奉李琄宗室良才士林雅望懿以文行精於吏術近參清憲益著令名舉茲臺綱屬在公器宜膺俊選佇揚厥職衣以朱紱光茲白可侍御史知雜事仍賜緋魚袋敕朝議郎侍御史內供奉元巽踐行直方秉心純密懿文經務持法奉公積勞既深令聞斯洽宜從職員之正式光風憲之選可侍御史散官如故敕宣議郎殿中侍御史供奉東都留臺蔣將明祇服文儒精詳禮體持素範以行已秉清心而在公執法不違峻風自遠俾遷柱史分領臺綱可守侍御史東都留臺散官如故敕通議大夫侍御史內供奉前諸道營田使判官靈昌郡開國公崔益積德垂裕清才致遠久佐稷農之任仍參邦憲之列事必精當勤而有成宜正臺綱以明朝獎可侍御史散官封如故敕朝散大夫侍御史內供奉充福建節度判官知上都留後賜緋魚袋孫會聞義執禮直以方外守信敦睦斷無他腸紹儒門之學行工詩人之比興服我清憲介於戎車休有令名動皆成務允是公選正其命秩可行侍御史散官賜如故敕監察御史蓋文元直清勵行宏濟知名擢在憲司綽然有裕董其軍賦成績可嘉宜增執之威仍佐登壇之律可殿中侍御史敕朝議郎行監察御史東都留臺王延休雅有文行精於吏術自膺察視克舉風憲績勞當遷獎善惟允俾新執法之寵式光彞序之進可行殿中侍御史依前東都留臺散官如故敕權知絳州絳縣令崔炎慎學潤身工文飭吏錯薪刈楚竹箭有筠蒞事咸許於宓生遺風尚傳於絳老公才可擢朝聽用章宜甄避蝗之美式踐栖烏之列可監察御史敕陝西運使判官朝議郎試祕書省祕書郎攝監察御史賜緋魚袋源咸悌爰資素行早履清途假其執之名佐彼泛舟之役且聞集事亦既書勞滿歲即真俾光使局可行監察御史餘如故敕朝議郎試大理司直兼監察御史知河東節度上都留後梁裦業繼儒門才優吏術潔已以進貞心不渝職佐上軍榮參清憲在公益慎於事尤精宜分察視之員更勵風霜之操可行監察御史散官如故敕守左拾遺楊護服於古訓文以彰之專靜向方恆久其道近參侍從之列不忘忠讜之言俾執清憲佇揚厥職可守監察御史
