seq: 425
front:
  text: 全唐文欽定全唐文卷四百二十五于卲三
  hash: sha256:bfb3cc56f23526bfb8b3e6dd2e781ac9ee651b4619959caab3131bf4f71de3e2
body:
  text: 臣某言伏以今月十九日纍聖儲休之日陛下降誕之辰聲教所加舟車所及固將駿奔大慶鼓舞升平瞻北極而效誠匝南山而獻壽臣輒率鄙思畫松竹圖一面并陳贊頌願躋聖祚伏貢闕庭臣某中謝伏惟皇帝陛下嗣聖居業統天握圖奄宅九圍光承丕構元元敷道須有發明高祖造邦義資纂大故得上天垂慶八葉騰輝誕聖神於正陽統清明於元昊既徵下武將付中興非徒履迹之祥實叶繞樞之異况臣特受榮遇思效微誠撰獻珍奇則圭璋有可玷之理馳奉章疏則文字非陳贄之儀故臣常於禮歎松柏有心之姿詢於詩仰松柏植茂之興則如佳其不朽豈著前聞載徵纎微爰有叢竹節雖謝於穎拔操亦迫於歲寒故臣輒畫長松佐之修竹辨其位則松可君於竹掄其才則卑可奉於尊然松竹木中特最為有壽衆材槎卉而翠蓋方成暮霰飄零而繁枝益茂輒敢賦形像外移色毫端敢借堅貞之姿願增天地之壽况卿雲瑞氣必呈證聖之祥元鶴仙禽每舉沖天之翼臣所以緣義祝壽出幽入微不散氤氳之容同成俯仰之勢徵畫圖之旨誠慙創物求比興之義庶近愛君不勝區區之極其松竹圖并頌敢冒陳獻無任戰灼之至臣某言去年五月十日已差知衙事袁遙獻狀露誠上塵聖聽猶恐帳下之士未盡對揚邊隅之要不復專達今害馬已去時政鼎新期於升平天下屬望臣叨榮冒寵十有二年雖夙興夜寐將補不足智小任大其缺實多臣某誠惶誠恐頓首頓首伏惟寶應元聖文武皇帝陛下纂戎立極俯鑒下人思無不周明必以察故得迷道自返橫波易流搜遺逸以在庭叶夢卜而作相頒命布德奉天順人海隅蒼生孰不遂性臣僻守三蜀局蹐一方想通籍而轉疏望賡歌而莫及頃者正月之役中路詔還雖迫外懷之虞頗貽膚受之訴嘗膽空知其有苦剖心無足以自明未知此生朝拜何日臣本道度支判官檢校虞部員外郎高正平佐臣理戎積有年歲文學政事不忝前修應緣三軍遠支近費無巨無細一與臣同陛下初擇宰臣旁求利害勒赴闕庭以代臣行近日山西將軍頻執蕃邏詢其動靜確有所傳必擬橫行劍門圖陷全蜀其勢甚大必在防虞正平此行臣意堅切伏乞聖鑒俯垂聽納則內獻心腹外執干戈王室有開萬死無恨心馳魏闕不為身謀望斷玉關終期生入無任奉國忘家之至謹奉表陳懇以聞臣某言伏見今月一日制命以劉晏殊死之責連及前禮部侍郎潘炎貶授澧州員外司馬天鑒孔明善惡懸別比諸子壻猶佐上藩凡所見聞莫不欣荷知德刑無頗而行於代也但臣比見潘炎為性貞純致身無過介然特立自為一時之選名不為晏稱官不由晏進自晏處權掌要未嘗以毫髮受遺未嘗以親戚請求頃自晏居外使闕安禮致書疏知闕寒溫通意都不為之開緘凡此之類蓋非一二所以海內修崇名節者莫不歎伏以為古人之中罕有儔對自晏伏誅衆望炎免况二年風疾手足拘攣氣息奄奄藥餌未復奉詔奔波即日登路籃輿臥載生死難圖臣愚識炎日久知炎至行伏恐斃一吉士為代所悲冒責上聞庶幾下達儻蒙聖人回聽恤以守道不回賜其殘生許歸田里免隨道殣俯叶㣥心將勸清貞之士以勵貪浮之俗炎之幸也臣愚不識忌諱干犯湯鑊塵黷宸嚴陷身無地不勝知賢請命之至謹詣東上閣門奉表陳列以聞臣某言臣聞行師命將必先保大服戎共武方議膚公所以協和軍搜戡定時難伏惟寶應元聖文武皇帝陛下誕膺天命以撫方夏洪惟眷圖用征不惠上敬天授下咨人力則殊方異俗罔不率俾蠢茲西戎猶肆逆命勞我薄伐示人有征夷不亂華自宜殄滅盈不可久神亦禍淫天之道也臣近得上都所由報狀伏承受相府元帥之寄領漁陽突騎之衆分邠土鎮守之師內無所疑外無所怨上讓下競禮合義均不為身謀同獎王室此皆陛下明為元首德洽藎臣夷吾必知其小大孔明遂均於魚水不然豈同德度力偶俱無猜以此討戎何戎不滅以此論道何道不平臣蒙國寵靈榮加九族功慙白馬位達緑車每承聖敬日躋輒願殺身是效今日之會實契丹誠無任感時悃欵之至謹遣某官奉表陳情以聞臣某言臣本凡才智略無取因緣際會驟列班榮分閫尹京實為塵忝頃者鳳翔之日蕃漢憑陵臣嘗激勵羌渾竟剿戎虜方將席卷永息邊虞旋奉德音遽令入奏微誠莫展殃舋已鍾痛骨摧心載崩載咽荼毒未幾起復舊官纍表陳乞不蒙允許及犬戎搆禍憑陵京城陛下授臣檢校刑部尚書都知元帥中軍兵馬使雖承恩命未有軍行麾下之人才盈數騎空懷赴難莫克死綏仰天椎心伏增憤激不踰信宿便屬蒼黃未知鑾駕東巡且欲荊襄陪扈纍遭剽掠始達藍田更逢子儀留臣計事招集亡散共收上都比至入城又奏臣住奔波險阻契濶山川進慙將帥之臣退羞羈絏之僕顧唯狼狽寢寐兢惶臣某誠惶誠恐稽首頓首死罪死罪今又亡母在殯欲祔舊塋先遠戒期正當此月干戈之際寇盜為虞小有不安永負生母願終子道以奉亡靈儻封樹有成雖隕越無恨伏望許臣畢事之日得令奔走陝郊碎首行閒甘心罪責無任兢惕屏營之至臣某言臣以固陋纍蒙獎擢猥厠朝列與㣥賢並始自給事驟遷侍郎贊二冬官典司邦教屬師旅之後庶政從權會府舊章多所曠廢惟禮部兵部度支職務尚存頗同往昔餘曹空閒案牘全稀一飯而歸竟日無事此臣所以寢興長想俯仰增慚何則受恩至深報德無所未裨毫髮虛費稻梁伏以人君命官期于述職人臣量力不叨非據寧有食君上之祿為保妻子之謀臣內顧塵忝尤增愧懼頃陛下躬決庶務萬方不言而理遠近承式幸當天下無事未敢上陳其愚今承嗣背德阻兵全魏靈曜失道謀亂大梁犬戎為患獯虜伺隙雖禍盈惡稔終冀梟夷而調兵轉粟在彼疲弊乃㣥下憂國之日微臣赴難之秋况諸道牧守闕人頗衆是敢不揆薄劣特祈任使如或領一郡或統數城綏懷將卒招復逃散近當狂寇俯制奔衝必使人業耕桑盜無充斥昔子建之表懇求自試充國之對無踰老臣豈徒冒寵干榮實欲酬恩立節臣年甫知命筋力猶強策勵駑蹇庶成萬一無任懇悃迫切之至臣某言臣男某官某頃年二十有二因外人招誘性乏天和臣又拙訓遂交游非類妄用錢物臣恐滋蔓纍及家私臣某年任寧州刺史表請磧西效力離鄉別親庶其思過臣遽遭流竄比屬艱難遐荒萬里分為阻絶近節度使差奏軍事會臣待罪輦轂重與相見至京以來臣竊窺察誘其由衷似辨君親近於觀志屢申懇到願留晨昏夫物感人情况茲天屬苟及於此惕然關心臣今齒髮衰暮唯生此子儻其改行家有所傳九原之下可以塞責臣昨詢問磧西職掌殊非要重伏乞聖慈回鑒許為父子如初便留效節東軍與叔冀逐急征討盡其武用或樹功勳王事不殊殘寇又切臣得地近時復知聞縱其不賢猶可備使老臣之幸至微至賤輕黷宸嚴靦冒之求戰越無地臣某言臣固不肖寵由父任纍荷朝獎非臣本才永惟筮仕之初濫觴有地感舊恩愛竊係于心故開府儀同三司兼太常卿李承光頃充河西兵馬使天寶年中録臣帳下自茲效用得列戎班出入五涼艱勤一紀風雨寒暑未嘗廢離俄屬幽燕作逆伊洛陷寇蒲潼不關天地交閉承光臨計自失倉卒西還亦既通表華陽奉箋靈武枕干待命俟期而往曾未信宿先朝賜書敦序兄弟如家人禮當是時也臣親見之開緘流涕是日便發及至行在特加天下兵馬副元帥改名匡國扈蹕彭原別承誥旨因此伏法當瘞朔陲身雖受刑家免孥戮遽蒙昭雪發使宣恩特令安存葬日官給今長男願見充鎮西副將次子諤又知覃懷兵馬女壻周鼎分閫河西咸受緑車之榮並為白馬之將聖朝寵寄洎男及女臣謂匡國雖死猶生近以孀妻告終願從合祔諤等銜恤無由上陳將傳銘誄未正官爵且匡國非禁人收視之責微臣當故吏願言之時輒冒宸聰乞從優贈縱前封尚在詎敢追榮儻後命有加方期復魄則衛青有時將葬而欒布不負一言黃泉有知丹慊斯在無任懇欵求哀之至謹詣某門奉表陳乞以聞臣寧言伏見詔命以中書侍郎元載黷貨無厭姦邪迹露國有明憲已置嚴科臣弟御史中丞寬頃緣長春宮事蒙恩充載判官今罪纍所加寬亦合從譴責念其愚直罹此禍階每荷聖朝獎拔之私纍忝中臺精選之務因逾所效寵貴當時上答之期分知死所臣忝骨月之分休戚是均夙夜震驚反側難措朝典輕重不為微臣伏乞聖恩無以私貸伏增惶懼之至謹遣某官某奉表請罪以聞臣某言去冬臣知衙事官姚悟回伏奉手詔許臣入朝臣自西川軍還理裝撰吉與監軍使孟游仙等以今月五日發成都十二日至綿州羅江縣中使馬承倩至又奉恩旨令臣與游仙等却回臣久辭闕庭從事邊塞思一朝覲如天無階忽遂此行神道所感豈知中路猶阻懇誠揮涕慚對於三軍結戀詎同於他日臣所行意實不謀身一欲辨折讒閒兼欲敷陳國要有不可形之翰墨有不可傳之外人表臣心切唯天而已將士等知臣悃欵共憂家國見臣不行魂氣俱喪臣以迫於所務抱恨南邊固請監軍使行猶期上訴雖一夫阻命而違衆實難游仙今于漢州便發以從諸將之請軍中要務悉以咨之伏乞聖聰俯遂㣥議則冀上輯下睦永無外虞西南艱危再沐清晏豈臣獨夫之幸實充萬人之幸無任懇迫屏營之至謹附監軍使孟游仙奉表陳請以聞臣祇言臣長男岵受國恩榮出典藩翰不能昭宣聖理協和上下爰抵憲章自貽剿絶臣年過歲制識謝平人徒以宗親昧於名教罪因凶悖之子敢望全生之分臣誠惶誠恐頓首頓首臣一自停務因茲杜門瞻闕庭而待命佇荒陬以投頃者未明去就私喪心魂近以獲奉刑名公聞信宿尚回天鑒免肆市朝因其所流許以自決且身首不異豈足謝於方隅而禮律所均尚未論於家屬遂使九泉之下猶荷全歸三族之中欣承在宥微臣朽老無階上答縱填溝壑雖死猶生無任感恩負德之至謹詣朝堂并領男前梓州刺史某等朿身請罪輕黷宸嚴兢惶無地右臣先奉恩旨賜前件人糧馬料初已陳讓不蒙允許臣昨日於延英對見又請前件糧數內停一千人糧聖情未察倍增惶懼臣自興兵以來早參戎律及討慶緒即從先皇皆虔奉睿謀遂清多難豈臣薄劣輒敢貪天而寵遇特深封賞殊厚纒綿渥澤三十餘年食邑纍加俸料甚廣自此之外更有田園朝夕所須幸無闕乏不謂繼明之始恩出非常曲賜裦崇沾此糧料雖雲雨之施在恩私而至極彼凋朽之質顧叨餮而多慙是以形神震駭不知所據懼悚顛沛以促餘年敢犯宸嚴重祈哀亮儻蒙全度伏乞賜停謹奉狀右中使某乙至奉宣進止賜臣前件柑子伏以江潭所出見重於南州包茅入貢遠歸於北闕陛下念其野次賜及微臣顧萍實以虛言非蔗漿之足擬分柑絶少竊荷於恩私食椹懷音敢忘於報效右今日中使某至以臣朝奏闕庭特借前件馬拜受殊深不任驚懼伏以詔傳中貴馬出內間恩光自降於九重翦飾不關於衆口無功無效以懼以慙遂躡權奇方遺欵段瞻天心喜已馳捧日之誠向闕身輕更遇奔星之足仰邱山而轉重知報效以何階右件宅先賜臣亡弟嵩比緣空間臣遂權住某年月日中使某至奉宣進止轉以賜臣并敕所司改給公驗臣素空行藝久遭扞脅陛下特存要領更齒班榮宥以非常之恩加以超等之賜自典環列職在警巡歲月徒深涓塵罕録豈謂叨承後命曲被殊私賜以廕庇之地永為子孫之業生輕施重內省知慙捐軀報德實臣志願右今日中使某至伏奉恩旨令臣移入所賜宅并賜前件者慈旨曲降驚抃難容臣以微生幸逢休運上公政本既荷殊私理第頒田特超恆數且居爽塏又賜歡娛芳膳出於天厨嘉賓傾於朝彥金石諧座珍奇爛庭况棟宇輪囷近加圬塓林塘祕邃潛蓄清凉素以衡茅特驚宏敞周履既增於魂悸眄睞殊覺於心慙臣實何人遘茲多幸飲恩知愧受賜輕生誓將灰粉百身償國家之恩遇拂磨一劍弭凶醜於邊疆區區寸誠仰答萬一不任戴荷之至右臣得男曜狀稱伏奉聖旨緣臣莊栽蒔賜內園果樹又令府縣與竹及同栽花藥等今月十日仍令開府魚朝恩以下到莊檢校者謬承天眷纍沐恩私事有至微亦關聖慮顧唯別業封植未成特降明命賜臣甘木移根上苑擢秀中園發揮池館之勝實荷生成之力侍臣中貴接武員來墟落生光里閭增慶况內園所賜品類已多府縣更供竊憂煩擾在臣諸已先有不敢重此勞人望停府縣所供曲遂微臣至願右中使某至伏蒙賜前件弓箭跪捧殊私抃躍無地伏以彤弓出韔利鏃離弦月滿星流皆承御物摧剛服猛便假天威慙無矯控之能庶盡追擒之狀右臣得所由報破前件賊者伏以作逆者皇穹所誅阻兵者黔首共棄此賊與懷恩作惡俱為不道昨率其蜂蠆犯我郊畿奉天之衆振其前邠州之軍制其後彼進無所入退知難歸尚肆貪狼更為封豕毆侵縣邑剽掠居人光進仗天之威首殲魁孽杜冕賈士之勇再掃殘妖既已誅其鯨鯢佇見傾其巢穴凡在戎旅孰不歡欣臣忝總兵權倍萬恆品右臣某日於華州下邽縣東乾坑店下營伏承中使某昨日於路將賊逆僕固瑒首級過上都者伏以前件賊夷狄雜種素無令望本因行陳得踐榮班當將帥之權效錐刀之用幸憑廟算頗立戰功陛下嘉其成效寵以非次謂能盡節翻搆異端凶惡貫盈人神共棄今引頸受戮傳首而來率土之人不勝大慶子既伏罪父必成擒掃蕩妖氛在於旬日臣忝司戎律倍萬恆情遲回路隅踴躍忘倦無任慶快之至右臣得澤潞節度兼鳳翔秦隴臨洮觀察處置等使李抱玉今月二十日牒稱先鋒將柏秀等十一月於南梁州大雪嶺北破前件賊黨殺戮四千五百人生擒高玉妻及男女二人并獲牛馬八千頭匹器械三千餘事又得李抱玉今月日狀稱於南梁州城固縣界擒高玉訖伏以此賊因依山險嘯聚甲兵蟻鬬郊畿之閒鴟張邑屋之下西與犬戎連接北與逆豎交通更唱迭和窮凶極惡神人所棄覆載不容李抱玉虔奉睿謀冞入其阻始則俘其逆黨終用覆此凶渠巖穴以之風行雪林由其電掃威靈遠暢兆庶同歡在臣微誠倍萬恆品右臣得孫志直狀報具件如前伏以此賊嘯聚日久凶逆實深在於邦畿頗罹辛螫既與犬戎相結又共懷恩合謀若二寇北來必為內應孫志直忝承廟算討伐殘凶既斬級以擒生遂傾巢而落卵蕃渠失援邊烽可息臣忝總戎倍萬恆品右伏以平野未春寒山餘雪陛下俯令畋獵遙借寵靈豐狐難脫於重環狡兔莫遺於三窟觀同將帥藝角偏裨况節號嘉平時兼蠟祭承威稟命恩已貸於戎臣登俎充庖味宜先於君上雖八珍豐衍六禽填盛輒傾誠於金鼎庶慕義於野芹前件品味謹隨狀進右臣伏以今月十九日陛下降誕之辰萬國駿奔二儀交泰玉帛方陳於闕下慶抃實匝於寰中臣謬荷殊恩思登壽域伏以馬則雄姿未織句疑誠謝于權奇織成乃異于采箱宜或存于煥爛懿茲致遠之用宜秉含章之資憑物奠誠感恩祝聖所獻雖慚於萬國均情實邁於等夷臣不勝懇悃之至右臣得邠州節度使牒上件人等背逆歸順云被懷恩招來打鳴沙縣便擬將收長安為不奉可汗處分遂却回邠寧投降並到使訖謹遣監軍使徐欽令領赴闕庭者回鶻遠蕃素效臣節自中原俶擾纍建勳庸陛下約為兄弟式崇惠好我即示以恩信親仁善鄰之道彼亦懷於德澤為不侵叛之臣而逆豎猖狂閒行招誘初遭誑惑雖襟甲而即戎遽感恩私竟束身而請命可汗既不助逆懷恩當即成擒殘孽永清指期非遠右前件官等或久登清貫或厚受國恩天步艱難不隨清蹕僞庭頡頏忍飲盜泉或修撰文書或統制兵馬或動衆以資敵或作姦以蠧人事迹昭彰實不可掩臣等初命禁錮伏候聖恩輿議囂然皆將倳刃此等大逆無道覆載難容臣參諸禮法案軍令訖匿瑕含垢誠君父之恩私嫉惡剛腸亦臣下之職分擅此處置伏增戰越右臣前日面奉進旨前件男領兵馬赴靈州伏以朔方軍幕宿將頗多任以兵權合先勳舊非獨藉其時望亦以厭伏衆心男晞年才成立素不更事雖薄間騎射而未有智謀軍政弛張或非詳練昨緣逆徒在近畿甸多虞令統先軍以當大敵倉皇之際不可固避畢力捐軀幸摧堅陳此天威所及非童子有成欲速赴邊陲實恐未堪專任右廂兵馬使開府孫守亮出身入仕皆在軍行將校畏威士卒懷惠智能料敵勇可摧凶使與渾日進同行必冀免貽聖慮又男晞自幼及長首末隨臣常在私庭未曾遠行深願容其濯浣許以旬月休間他日更有任使敢不奔波道路臣位崇寄重效淺恩深常恐委任失人以速官謗知子者父敢不上陳伏乞天慈俯哀誠請舉政之要先禁乎惠奸因人之欲必從於義取固防間之是以雖顛沛而無懍蠢彼邊邑實由徼路屬門繫闕九字於下幾出戰於行閒瞻彼麥田是登乎秋野惟人之恤且發乎縣門多稼其豐誰資於出穫或人為請雖楚得其所之宰也有詞寧齊至而作害庶有恥于吾化將不耕為爾虞此日方殷人期利寇他年有事誰不幸災異鄭師以取溫周人既怨同單父之規魯子賤猶生為郡伊何徒聞有讓理邑餘裕云胡不知此而厚誣曷旌善績以贊不欺之政因明致詰之非
