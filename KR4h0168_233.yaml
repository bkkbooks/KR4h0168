front:
  text: 全唐文欽定全唐文卷二百三十三張説十三
  hash: sha256:22b54bd75cbb10e37f74b88dd9494067af5c2001f69290558e262bdb99ea380a
body:
  text: 公名震字元振本太原陽曲人也大父任相州湯陰令因居於魏公少倜儻廓落有大志儀觀雄傑身長七尺美鬚髯十六入太學與薛稷趙彥昭同業時有家僕至寄錢四百千以為學糧忽有一人縗服叩門云五世未葬棺柩各在一方今欲齊舉大事苦乏資用聞君家信至頗能相濟否不問姓名以車載去一無所留深為趙薛所誚公怡然曰濟彼大事亦何誚焉十八擢進士第其年判入高等時輩皆以校書正字為榮公獨請外官授梓州通泉尉至縣落拓不拘小節嘗鑄錢掠良人財以濟四方海內同聲合氣有至千萬者則天聞其名驛徵引見語至夜甚奇之問蜀川之迹對而不隱令録舊文乃上古劒歌其詞曰君不見昆吾鐵冶飛炎煙紅光紫氣俱赫然良工煆煉凡幾日鑄得寶劒名龍泉龍泉顏色如霜雪良工咨嗟嘆奇絶琉璃玉匣吐蓮花錯鏤金環生明月正逢天下無風塵幸且用防君子身精光黯黯青蛇色文章片片緑龜鱗非直結交遊俠子亦曾親近英雄人那知中路遭棄捐零落漂淪古獄邊雖則沈埋無所用猶能夜夜氣衝天則天覽而佳之令寫數十本遍賜學士李嶠閻朝隱等遂授右武衛胄曹右控鶴內供奉尋遷奉宸監丞屬吐蕃請和親令報命至境上與贊普相見宣國威命責其翻覆長揖不拜瞋目視之贊普曰漢使多矣無如公之誠信遠近疆界立談悉定因遺金數十斤而還公悉以進上奏言揣彼上下之情人倦其隸役久矣咸願早和大將論欽陵不爭四鎮獨不欲耳但國家每歲不絶其使而欽陵常不稟命自然彼蕃之人怨欽陵日深望國恩日甚設欲廣舉兵徒難矣斯乃反間之微旨也必可使其上下俱懷猜阻矣則天甚然之無何吐蕃君臣果相疑二遂誅欽陵弟贊婆及其兄子莽布支並來降公聲名籍甚授御史加朝散大夫遷主客郎中吐蕃與突厥連和大入西河破數十城圍逼涼州節度出城戰沒蹂禾稼斗米萬錢則天方御洛城門酺宴涼州使至因輟樂拜公為涼州都督兼隴右諸軍大使調秦中五萬人號二十萬以赴河西公至涼州吐蕃素聞威名相謂曰我贊普猶懼吾輩何可敵乎相率而去公收合餘衆繕修城壁施法令屯田一年而復公之功也公以涼州西拒吐蕃北有突厥久示其弱未揚天威因徵隴右兵馬一百二十萬號二百萬集於湟州營幕千里舉烽號令時宗楚客為相素與公不協令人告變則天惶懼計無所出狄仁傑魏元忠韋安石李嶠宋璟姚崇趙彥昭韋嗣立張説二十五人抗表請保如公有異圖並請身死籍沒則天由是稍安兵既大集人又知教分兵十道齊進過青海幾至贊普牙帳贊普屈膝請和獻馬三千匹金三萬斤牛羊不可勝數公大張軍威受其蕃禮而還既伏西戎震威北狄突厥獻馬二千匹所獲涼州人士皆放歸塞上從此方鎮肅清蕃落畏慕令行禁止道不拾遺凡所規模制作率為後法河西隴右十餘處置生祠堂立碑頌德閻立均等為其文尋有詔許入朝公素無第宅寄居友人之舍候鼓入朝忽有人馬前送狀開緘前人巳去狀中惟有物數而無姓名便於樹下獲騾馬二十餘匹帛三千匹公曰豈非太學請葬之士乎因以買宅居止薛稷趙彥昭聞之皆嗟嘆良久景龍年中宗楚客韋處訥等潛結朋黨憎功害能授公驍騎大將軍兼安西大都護四鎮經略使金山道大總管時烏質勒久恃衆倨傲不屈朝廷縱兵遠掠道路不通公以衆寡不敵難以力制因率麾下數十騎徑入部落烏質勒大出兵衛出迎望見公威容端毅風鬣若神不覺屈膝因而下拜公宣國威命抗聲與語自朝至暮雪深尺餘竟不移足質勒頻拜伏語畢歸帳相去二十餘里質勒久立雪中倉卒疾發是夜暴卒其嗣子娑葛集諸將曰漢使殺我君父今須復讎大舉兵衆將追殺公聞質勒死遲明素服來弔道路相逢兵圍數匝娑葛見公忽來未之敢逼但言衛護漢使公至其帳下大哭流涕因撫定其嗣蕃人大喜留數十日助其葬事娑葛獻馬三千匹牛羊十餘萬移居千里西域無事道路肅清諸蕃聞之遣使歸降者十餘國時人語之曰郭元振詭殺烏質勒知娑葛與闕啜有釁奏請移於州制從之會中書令宗楚客受金遂寢其事公具以狀聞楚客恃勢囑請召公將陷之公不從又奏請斬楚客清蕃落時韋庶人竊弄國權中宗竟不之省也初安西南有毒河源遠在蔥嶺西北河岸百步人畜踏之者輒死公威振西域所向無不從者因驗圖經知其源率兵三萬人歷于闐康居大食等十餘國所過之國令供資糧仍署其國王為左右總管率兵前進北至蔥嶺牙帳前十二國王兵百餘萬其河源上有大樹高千餘尺垂陰數頃大軍至日有黃龍繞樹以口吐毒氣而拒官軍三軍悉覩焉公手書操檄文令左拾遺張宣抗聲讀之畢黃龍解樹而下公率諸軍誅之數日方倒聚而焚焉河源且絶數十里內悉為良田在安西十餘年四鎮寧靜韋庶人知政屢徵不至因下偽詔令侍御史呂守素中丞馮家賓相繼巡邊欲將害之未及皆為娑葛等諸蕃劫殺之睿宗即位徵拜太僕卿敕至之日舉家進發安西士庶諸蕃酋長號哭數百里或剺面截耳抗表請留因紿之而後即路其至玉門關也去涼州八百里河西諸州百姓蕃部落聞公之至貧者攜壺漿富者設供帳聯帛丿糸七百里不絶公旌節下玉門關百姓望之宛轉叫呼聲動巖谷自朝至暮傳呼至涼州涼州城中男女在衢路並歌舞出城咸言我父至矣通夜城門不受禁制都督司馬逸客聞之謂公近矣陳兵出迎會候騎至云始入玉門關都督嗟嘆良久且狀聞至京同中書門下三品加銀青光祿大夫遷兵部尚書封館陶縣男依舊知政事尋轉吏部尚書知選舉囑請不行大收草澤睿宗屢下詔褒美後默啜大寇邊拜刑部尚書充朔方道行軍大總管築豐安定遠等城以拒賊路尋加金紫光祿大夫再遷兵部尚書知政事仍舊元帥會太平公主竇懷貞潛結凶黨謀廢皇帝睿宗猶豫不決諸相皆阿諛順旨惟公廷爭不受詔及舉兵誅竇懷貞等宮城大亂睿宗步出肅章門觀變諸相皆竄外省公獨登奉天門樓躬侍睿宗聞東宮兵至將欲投於樓下公親扶聖躬敦勸乃止及上即位宿中書十四日獨知政事因下詔曰大臣立事夷險不易良相升朝安危所繫兵部尚書同中書門下三品上柱國館陶縣開國伯元振偉才生代宏量匡時經綸文武今之王佐出入將相古之人傑夙侍宸扆疇咨廟堂思致堯舜以期管樂朕往在儲闈洎登寶位每觀其仗義感激願制凶邪立誠慷慨密陳宏益爾其至矣朕實嘉之頃者梟獍興謀干戈作釁太上皇帝既命朕除討元振又馳奉宸極始則賚豫為弼終則寧朕問安可謂格於皇天貫於白日元惡既翦庶物惟新昌言是圖朕豈忘舊宜開井邑永誓山河可進封代國公賜實封四百戶物一千段子五品官尋兼御史大夫天下行軍大元帥是歲大徵兵衆閲武驪山兵一百萬號三百萬並奉公節度是日三令之後上將親鼓公慮有大變因略行禮上大怒引坐纛下紫微令張説犯鱗而諫上乃曰元振有保護之功宜捨軍法流新州未至屬開元元年册尊號赦曰元振往立大功保護於朕頃因閲武頗失軍容責情放逐將收後效可饒州司馬未至卒於道時年五十八有集二十二卷文章有逸氣為世所重公少負氣縱橫遣意磊落作尉巴蜀不修名檢及登朝受任屢使遐方霜明烈心玉立貞節言行忠正居取儉約飭體雜於皇王致君期於堯舜公務之暇手不釋卷雖子弟家人未嘗見其喜怒前後上事切諫得失十數道俱焚其藳草不以語人故朝廷莫知也睿宗嘗曰元振正直齊於宋璟政理逾於姚崇其英謀宏亮過之矣舊於宣陽里居二十餘年不至諸院馬廣既每朝回對二親言笑歸室儼如也不問家事與狄仁傑朱敬則魏元忠李嶠韋安石趙彥昭韋嗣立薛稷張説等為忘言之友事父母以孝聞父愛授濟州刺史後以為相奏請解職授銀青光祿大夫濟州刺史致仕公歿後二親猶在自我唐受命宰臣有二親者惟公而巳北伐兮東胡邈遼陽兮孤竹偏師兮覆衆在崇山兮峽谷露芃芃兮蔓草風蓁蓁兮拱木見馬血兮夜燃聞殤魂兮雨哭君王按金鼓而氣憤撫珠鈐而淚滋橫萬里兮抽恨弔㣥山而寫悲懟凶將兮我辱悼勇夫之狄纍彼前鑒兮未遠何後來兮不追對死地兮出陳臨傷門兮用師軍奪帥兮虹食壘車脫輻兮火焚旗有欒黶兮愎矣無范宣兮愧之命窮迮兮短兵錯膚迎刃兮血染鍔旋殘潰兮棄組練山猶號兮谷餘戰殪原野兮奈何違君親兮不見於戲何天命之奄忽俾仁義之理兵為蠻夷之俘馘鬷六校之飛將鎮五營之徑卒吾見出兮不歸噫名存兮身沒維開元十年歲次壬戌四月壬申朔十四日乙酉曾臣侍中源乾曜中書令張嘉貞兵部尚書張説謹以清酌昭告於赤帝自冬涉春至茲夏首宿麥將秀時雨未洽皇帝降服減膳避正廢懸恐害粢盛是憂黎庶仁旨之勤巳極兆人之感未通何辜於天而此不惠曾臣乾曜等同力聖日無敢怠荒薄才粃政多所不及神則不雨或此之由內訟恇惶莫知啓處曾臣等若上無補衮下不利人妨功害能負恩竊位惟神臨照擇其心降禍厥身墜祿隕命三臣當咎足謝天責萬姓何辜俾失農望今因夏享展禮既終上杼聖衷懇祈人命至誠必感佇流嘉液旨酒獻誠神其尚饗維大唐開元五年歲次丁巳四月庚午朔二十日已丑荊州大都督府長史上柱國燕國公張説謹以清酌之奠敢昭告於城隍之神山澤以通氣為靈城隍以積陰為德致和産物助天育人人之仰恩是關祀典説恭承朝命綱紀南邦式崇薦禮以展勤敬庶降福四氓登我百穀猛獸不搏毒蟲不噬精誠或通昭鑒非遠尚饗維大唐開元五年荊州大都督府長史上柱國燕國公張説謹遣議郎行録事參軍皇甫嶧敢昭告於大府城門天有三光地有五行陰陽順序庶物以生霖雨過旬晦昧不晴奈何以陰賊陽以蒙蔽明恐害嘉穀無奉粢盛維爾崇墉本人所營積陰攸處德在助成苟人是利亦神之臧速收雲雨以復天常報爾特豚薦爾馨香謹以清酌脯醢式陳禜事尚饗滔滔大江南國之紀協靈通氣降福禦災是載方册代存祀典歲維秋季苗稼大熟雨霖猥集農夫未收油油粳稻垂生芽蘖上則神威將廢下則人心何仰公私憂窘靡禱不周訴爾明靈撤此雲雨欽儲牲幣俟答神休謹以嘉酌脯醢敬崇禋請年月朔日具官某敢昭告於大江之神王有百谷禮尊四瀆善利維神朝海作賓發源岐山駕福來臻率此荊土明靈是主已成嘉穀垂敗霖雨聽我虔祈福我農畝既暵既穫既場既庾欣欣衆心願答神祜潔牲明酌寅奠江浦荊州府城中西北隅舊有殷仲堪祠某到官廣其堂立羊叔子廟像成而祭之維開元六年歲次戊午正月日荊州大都督長史燕國公范陽張某謹遣功曹參軍吳興沈從訓敢昭告於晉羊殷二荊州之神我聞立人之道曰仁與義仁者孝之先義者忠之主殷公為孝子羊公維忠臣行植晉國德施荊人不孤其美是建為鄰雙風雖舊二廟維新凡百君子高山仰止馨香以時敬恭明祀尚饗長安二年月日皇帝使并州道大行軍副大總管尹元凱等敬薦酒脯時果敢告霍山之神皇帝天覆萬物各遂其性祠於㣥神罔不咸秩獨彼凶虜默啜悖天虐人窺邊猾夏略無寧歲皇帝哀此黎獻勤於征役憫彼夷落毒於昏暴常欲誅其魁首安是藩氓寇虐盈稔神人同棄今自送死并朔近驚山陵命將出師龔行天罰惟神炳靈參野作鎮冀方歆是正直贊揚威武俾胡馬化為沙蟲王師衆於草木獻捷之日昭報神休尚饗維神龍三年月朔日兵部郎中員外曹良史等謹以清酌少牢之奠敬祭故侍郎崔公之靈位以行成名以才起天臨明代是生君子長戟高門層堂峻趾孝友仁愛衣冠標軌清通正直省閣條理束帶立朝惟國之俊抑揚吐納金聲玉振器不滯方神無留韻厚奉外不為假坦率內不違真泛交而容博好施而能均欲人規已恕己及人故者不遺其故親者不失其親歷否泰能全其節故令名不離其身方齊六相助明三辰何孤我德何負茲神摶空落羽中駕摧輪昔時寮列今為弔賓凡二三子夙承惠眷聯務七兵歲陽三變分與時積事由更練謇謇公庭申申私宴慟音徽之永掩懷儀範之不見戢容止於綴足潛眉目於蒙面哀哉奈何涕零如霰緬惟初疾以迄將亡意氣精爽乾乾自強顧瞻賓客勉勉矜莊几不側辨衾無解裳話言靜密憂公不忘猶看駿馬尚聽名倡靡神不禱靡藥不嘗倏然信宿魂歸渺茫歲初置酒春中酹觴何吉凶之共域同歌哭於此堂自古及今人誰不沒豈嘆生死所嗟倉卒修途未半壯志先伐煢子齔年遺允數月在親親與懷舊孰不傷心而痛骨靈奠易收深悲難歇尚饗維萬歲通天元年月朔日神兵道大總管河北道按撫使右金吾衛大將軍河內郡王以少牢之奠致祭故冀州刺史陸君之靈戎羯不道侵軼幽都凶渠電滅餘燎星鋪鳴弓挾柳飲馬長蘆攬集同惡難起無虞梟獍為旅鯨鯢有族裳旗耒兵剡荻弦木泮渙吞噬睢盱觸逐亂舞梯衝潛攻版築鑿齒爭厲熊蹯未熟踰垣自潰守皆哭高扃巳陷連櫨復焚人類剃草城隨壞雲僵尸暴骨藉藉紛紛嗟嗟使君死節無吝政寬成俗兵機不振狡爾猖狂難以德鎮城為仇保身膏虜刃明明上帝仁覆憫下赫赫神兵驅馳在野朝告夕赴如何不及將守非堅為寇是急救兵適來涉血猶濕三軍雷歎百城雨泣天子命我董戎冀方旌旗介胄千里相望既掃氛濁言巡戰場輯穆人吏撫寧孤孀徘徊城府悽愴甘棠禮重王事哀深國殤魂兮有感歆此嘉嘗尚饗維長安二年月朔日敕并州道行軍大總管兼宣勞使左肅政御史大夫同鳳閣鸞臺三品兼知并州事魏元忠遣裴思益以酒脯時果之奠致祭於石嶺戰亡兵士之靈戎羯慢天南牧吠主石嶺橫地北都扃戶與我王卒保界并土如何不弔罹此寇虜列鎮既嚴連巖既削攻則路險守非城惡彼謀匪臧實愆偕作援絶兵減軍孤勢弱地拒兩陘山望雙崞胡塵大起白刃交錯石盡矢窮旗焚胄落嗟爾戰夫烈烈忠勇奮不顧命志無旋踵身沒名揚生輕義重天子命我理兵晉陽思與士衆砥寧遐荒痛茲壯士翦為國殤盍訴天帝降厲鬼方助氣金鼓復怨沙場虜血爾酹虜醢爾嘗封尸死所招魂故鄉尚饗維長安二年月朔日敕并州道行軍大總管兼宣勞使左肅政御史大夫同鳳閣鸞臺三品兼知并州事魏元忠以酒脯時果之奠致祭石嶺死喪百姓之魂北胡自擅賊虐不道氣悍朔風馬肥秋草侵軼郡縣驚逼稚老奔走山林是障是保兵不善守將不遠謀如何減竈無復燒牛俾爾士女熸於寇仇魂飛狄刃血迸氈裘殤悲雨哭氣怨天愁總兵帝鄉言念北阜抗憤戎漠傷心按部泣弔郊童哀問田叟為爾復惡誓滅㣥醜蹴踏蘭山脂膏葦藪誠若克就沒亦不朽慰爾衆靈酹此簞酒尚饗維景龍三年歲次庚戌正月癸丑朔五日丁巳從兄兵部尚書某以清酌少牢之奠致祭於故將軍弟之靈欽若貽宴俾降戩穀神祚玉衣天開金屋帛丿糸系溢寵諸宗橫福覩交泰之二儀承序殷之九族引同本於條幹合分流於昭穆義有感而意深恩無方而情篤況山慕喬頂林晞秀木深仁遠慶俟子能復何從才之有餘而輔德之不足舉朝野而皆痛在密愛而尤酷嗚呼哀哉永懷令弟言念生平蘭華雪艷玉潤珠清禮樂懸解文章挺生三篋暗記十門畫成風流望美月旦傾聲掌北軍之師律首東觀之詞英偉壯夫之獻頌善仁者之論兵眷新豐而臨幸繞湯井而連營乃奉車之暴逝忽復綏而凶行軫天悲於宸掖固聚族於華京惠連詩夢子敬琴情倘昭昭之不泯知親親之素誠嗚呼哀哉尚饗維年月日兄某致祭亡弟尚書之靈天實喪豫不憖遺善家殞玉樹國墜寶臣嗚呼執柔何痛之甚嗟豫與爾夙遭閔凶哀惸相鞠殆及長成爾性實岐穎德表宣慈居盡友悌之心言必忠貞之事帛丿糸帛丿糸我族俟子而大奉祖德之令圖荷朝戚之渥惠白首相對紫綬雙紆爾既秉國鈞既敷朝典出牧千里入宰六官豫聞爾言嘗誡過寵余嘉爾行在貴能卑清淨溫恭每希於上士飲食車馬不越於平人每思與爾歸印東都懸輿故里揚名講德居常待終當謂老夫沒於汝手不圖令弟殞自吾先及爾纏疴屬豫伏枕不見數日長悲九泉嗚呼刊述未成平生巳盡髮膚猶在魂魄焉知聞爾屬纊之辰託豫身後之事薄葬之禮還從爾心字孤之情不待遺意所恨在疾不視於喪不臨沈帛丿糸苦懷廠田坴迫斯甚豫羸老矣傷心幾何人琴兩亡命也命也維年月日外甥虛已謹以清酌少牢之奠敬祭於故汴州司馬四舅之靈釁積周親天禍外氏仁舅捐館靈輴祖庭四海喪其範儀九族失其陰潤感今循昔觸緒增悲恭惟先門逮舅平日淵流莫逆道術同歸穆齊鄭之纍姻深言孫之至友及鞠凶之際創巨失圖贈厚獲葬之恩事優含哺之育顧省全立功歸撫惠竊荷濟於百罹思效過於一等豈其德素積而力莫酬願未伸而禍先集不孤之託緬爾何依猶父之心忽焉罔報冥昧靡覿存亡永違執饋奉酹五性含塞幽靈昭察當歆宿誠維年月日敬祭薛氏太夫人和靜縣主之靈惟夫人軒庭繁祉嬴臺茂淑承訓公宮宜家卿族博士學藝尚書題目法度蘋蘩儀刑松菊夫拜中令昔同鮑婦子升瑣闥今類馮母舉案如賓門為門誡友在貴能降居貧施厚天道初革王風變韶維城落構若木踈條欽聞積善智洽神昭克庇二族命服兩朝肅肅柔和如風是暢娥娥女師如月斯望潘輿獻壽仲祿方養不弔昊天何德之喪嗚呼哀哉洛邑啓殯長安歸陌哭慟高臺旌懸舊宅階濕夜露庭陰曉魄嗟我外姻俱成弔客維開元十七年月日孝子力士敢告於考潘州府君妣南海太君之靈小子不天夙齡閔凶身嬰寇剽家值虜裂幸供灑掃之餘遂蒙侍從之顧扶戴明聖逼畏艱難大固不敢不密小亦不敢不誠事必記心言無漏口日慎一日將二十年玉辨加首金章在佩先靈納祐明神降鑒阿母遠至於京華妹兄自拔於泥滓咸以官漸榮祿姻通士林慈顏復慶於目前同氣展歡於膝下又緣幼育高氏變族移家敬愛盡於二堂溫清周於一紀不圖無狀招禍永見孤棄聖主恩華曲逮存沒邑封舊郡官贈本邦親感恩澤子承父意致命報天誓有同於皎日竭忠資孝志無忝於幽泉敬惟靈懷慰聞昭遂先遠有日卜兆新塋遙啓尊魂合祔良壤哀迫祖載攀戀須臾謹以清酌少牢恭陳遣奠盈樽不舉虛饌莫嘗號天叩地殞絶何仰維神龍三年月朔日故伎人伏十善謹以清酌少牢之奠致祭於元十郎之靈淥流茂樹萍羅是依山崩川竭魚鳥何歸恭惟主君高才達節賞心樂事風流不絶歌艷露華舞回春雪幸持此技承君餘悅綺羅脂粉嬌上春自言終代保情親寧知一旦君恩斷繁絃清管為何人懷主君之異顧願徇命於九泉迫夫人之嚴旨遂投足於他門生有十年之愛沒無一日之恩雖強容飾於新奉心摧絶而不敢言君子廣德仁心必遍疇昔與君琴樽歡宴永懷蕙歎俯憐荼苦錫以時珍申哀故宇廞車既展祖奠斯開悲歌助挽長袖承杯平居好此魂來不來心思往而莫遂足欲返而遲回終天地於此訣毒煩寃而難裁
