front:
  text: 全唐文欽定全唐文卷一百二十九建字光圖許州舞陽人初為列校田令孜養為假子拜諸衛將軍大順中纍加檢校司徒成都尹劒南西川節度副大使知節度事管內觀察處置雲南八國招撫等使景福二年加同平章事乾寧四年攻殺東川節度使顧彥暉遂據有兩川之地光化三年加中書令命以西川節度使兼東川武信軍兩道都指揮制置等使賜爵琅琊王四年改封西平王天復三年加守司徒進爵蜀王七年梁受唐禪遣使宣諭拒不納遂稱帝國號大蜀改元武成光天元年六月殂年七十二僭諡神武聖文孝德明惠皇帝廟號高祖
  hash: sha256:f3818fb8ad9a85a69804bf290eea6106ffaa6b1b4298c8080603d1f48a0fa0e8
