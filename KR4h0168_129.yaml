body:
  text: 帝君之居上應辰象朝貢臻集華夏會同宮闕殿閣之深嚴臺省府寺之宏壯須分名號以美一作正觀瞻況我肇啓丕圖頻有嘉瑞允協上元之貺式光萬世之基至於廚廏之標題倉庫之曹列並宜從革用永維新王者經世馭民以保安於蒸人曷嘗不講求賢碩以輔元子故漢開博望唐重承華左右正人自躋於治其以東宮為崇賢府凡文學道德之士得以延納訪問無或自尊以蔽爾之聰明昔劉先主入蜀武侯勸其閉關養民十年而後舉兵震搖關內朕以猥眇託居人上爰念蒸民久罹干戈之苦而不暇力於農桑之業今國家漸寧民用休息其郡守縣令務在惠綏無侵無擾使我赤子樂於南畝而有豳風七月之詠焉自古王者之興善惡之迹不泯者有史臣傳之丹青載之平章事張格儒術領袖文高於世著述之體自侔班馬可專編纂開國已來實録圓蓋方輿萬彙共資其覆載春生夏長四時不息於推遷所以茂成歲功寧遂物性帝王取象文質遞興遵革故之令猷敷鼎新之至理朕上膺眷命俯徇樂推宗廟告虔孝思既展郊丘備禮嚴配式遵欽承享國之符允叶奉天之道羣祀咸秩有感必通雲龍方覩於在天雷雨須聞於作解且湯開三面延景祚六百餘年漢革五刑繼丕圖二十四世皆以恤辜宥罪勸善興仁特行滌蕩之恩用致治平之化自唐朝運改土德數終初乃召寇以廠田坴兵竟至遷都而滅國賢良塗炭朝市邱墟生人既失其所天大事須歸於有土遂至蠻夷瀝款士庶傾心謂蜀都同章武之時兼漢嗣絶山陽之號共陳天命屬在朕躬一從踐位以來倍軫臨深之懼每念生靈塗炭刑政猶繁因告類於穹旻合流恩於屬縣紀年定歷既正鴻名布澤行春式均和氣可大赦天下改唐天復八年為大蜀武成元年正月十日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正見繫囚徒常赦不原者咸赦除之唯十惡五逆及屠牛鑄錢故意殺人捏窠造印結聚徒黨逃走背軍合和毒藥私鹽茶麴持仗行劫官典犯枉法贓兼踰濫身名冒受官爵囹圄之內官吏用情致令冤濫不問有贓不在赦限左降官不問罪輕重并與量移其有情無狡蠱事不涉邪者委中書門下酌量矜貸便與矜復授官州縣典吏及諸色人配流在遠已經懲斷者並宜釋罪放歸兼有軍人百姓先因公事關連逃避諸州縣鎮不敢放歸還者亦任却歸本貫所在不得勘問擾攪朕自援旗誓衆仗鉞平戎廓定封疆安保生聚克成帝業實用武功每思將帥之勞宜奬初終之效其在城及東川山南武定武信武泰等道并兩路前軍諸鎮都頭節級將士等一昨即位日雖已各有頒賜既經大禮更示殊恩應都知兵馬使已下至節級官健今有優給各有等第處分稼穡雖登黎元未泰每於旦夕常所焦勞將漸致於昭蘇已纍行其矜放但念方屯師旅難闕賦征緣同切於乂安宜共資於贍給自去年八月已後十月已前繼有指揮併蠲逋缺非無惠澤下及蒸人尚慮疲羸未息艱苦畿內諸州及諸州府應徵今年夏稅每貫量放二百文今年正月九日已前應在府及州縣鎮軍人百姓先因侵缺官中錢物或保纍填賠官中收沒屋舍莊田除已有指揮及有人經管收買外餘無人射買者有本主及妻兒見在無處營生者並宜給還却據元額輸納本戶稅賦冬選之人例聞羈旅常思任用以救棲遲兼勸進官僚人數不少朕昨才登寶位更布優恩或擢在班行或委之州縣凡選用略盡搜羅其閒或有謬結前銜妄稱入仕既未辨其真僞又可哀其困窮是用銓衡冀分玉石切在精研選士托實推公自執規繩勿隨請託但曾經赴任委不敗官不犯刑章又無贓汚告身周備考課分明便仰依資注官銓司不得稽滯如有失墜告身無以自明但有失墜時公憑及於本任官處取得文解者並準例參選然則自唐朝兵革之後踰濫尤多附勢力者未必有材抱孤直者或聞無位自今以後委有司博求幹濟慎擇端良諳熟吏途詳明法律先能潔已方可理人就中令録之尤難切在銓衡之精選或有節度刺史上表論薦皆須審諸行事顯著才能保無苛虐之心方允奏陳之命如聞失舉必罪所知諸州府或有賢良方正能直言極諫達於教化明於吏材政術精詳軍謀宏遠韜光待用藏器俟時或智辨過人或詞華出格或隱山林之跡或聞鄉里之稱仰所在州府奏聞當與量材敘用自唐室傾淪梁圖纂奪上國俄成於茂草中原莫有其遺民三百年之文物一空數千里之生靈無主星辰既紊運祚俄遷指王氣之東沈聽頌聲之西起率土之黔黎老幼競獻臣心滿朝之文武忠賢皆陳天意克隆基業合重奬酬應內外文武官等或賜功臣名號或與一子出身兼進勸官資以旌勳業並當續有處分朕頃事唐臣嘗居親衛受藩鎮封崇之貴著冊書鍾鼎之勳至於朝右公卿方面侯伯皆契忘家之誓俱同許國之誠其歿身王事之中遇禍賊庭之內言念及此痛憤良深應自僖宗朝凡在有功文武大臣顯忠孝者並委中書門下追贈仍搜訪骨月量材録用又在閬州起義之日應有隨駕大將效命功臣或遘疾以淪亡或當鋒而夭枉皆是捐軀為主臨難喪身殊功無日而暫忘遺烈千年而不泯並委中書門下抄録次第各與追贈有子孫者特授官榮所冀澤被幽明仁霑存沒又自朕剖符之始分閫已來副豫委用之心匡贊勳庸之士同甘共苦竭節輸誠推公不避於流言臨事唯思於盡瘁則有故武信軍節度使張琳操持徑直才術縱橫成今日之鴻基自斯人之懿績不享朝天之祿遽興失手之悲言念前功常思厚報宜追贈太尉以報幽冤其嗣子更加正官仍賜章綬故山南節度使王宗滌早膺任用纍著勳勤征行不憚於風塵陳敵常先於士卒論其實效可謂勞臣無何以富貴生驕災殃自掇不守初終之節遽萌悖慢之心驗人情而共憤滿盈定國法而難私斷割遂行典憲深用矜傷當景運之初興在故臣之可念宜加洗雪用慰幽冥宗滌並却還在身官爵故茂州刺史張造故蜀州刺史李師泰故卭州刺史李故眉州刺史張勍故漢州刺史王宗裕都知兵馬使劉璋奉禮蓋獲張全真張行立韓在田威等並宜追贈朕自臨蜀國實庇齊民皆資先哲之威靈獲王故都之城邑方憑幽贊以永天休上答元功宜尊舊號先主昭烈皇帝宜委中書門下追崇尊號虔備冊儀忠武侯諸葛亮別加美諡追贈王爵應名山大川靈祠聖跡皆豐凶所繫水旱是司並宜追贈公侯以酬元貺朕爰自統臨八國同心諸藩部落首領已下宜差使臣各賜詔敕分物宣諭其見在鴻臚禮院入朝蕃客等各賜分物續有敕旨處分刺史縣令身皆受職寵在分憂非唯效答於恩榮亦在保全於終始將申報國只計安人其有徭役不均刑法不中鄉縣凋弊稅賦逋懸必當分命使臣大明黜陟若清廉可奬課績有聞或就轉官資或超加任用並舉勸懲之命以彰悔過之名太倉及諸州縣受納斛斗並仰大府寺準舊例校勘逐年給付所司除本分耗剩外不得加一升一合致百姓積纍逋懸如有固違必行朝典其有外州遠縣官吏等輒徵估價並許百姓詣闕論訴不計官職高卑並正刑名處分在京百司禁囚徒推劾案成皆招本罪本官詳斷只據所申儻陷深文便行極法或恐推司人吏抑遏代書既不坐其本情實慮遭其枉法自今後委御史臺常加覺察若有冤濫便具奏聞必當別遣推窮重行懲斷致理之源無先養老化民之本尤在恤孤或矜黃髮之年或念白華之節衰老者宜加矜恤孤惸者亦在撫安應國內有耆老年八十已上賜米二石九十已上賜米三石一百歲已上賜米五石兼帛丿糸絹酒肉有差並仰所在長吏切加安存其有不幸者量與津置殯送仍撫其孤弱義夫節婦孝子順孫並加旌表門閭終身優假國之教化庠序為先民之威儀禮樂為本廢之則道替崇之則化行其國子監正令有司約故事速具修之兼諸州應有舊文宣王廟各仰崇飾以時釋奠應是前朝舊制或有開國新規制敕之所未該教化之所未備或刑法不中或倫序有乖則諫臣不可不言宰執不可不奏且謗木之設本俟諍臣匭函所收先覽冤狀所以凡關利病悉要聞知自今已後或事有便宜理非允當並須旋具論奏共議改更必當留折檻以旌賢無或懼觸鱗而避事應南郊行事亞獻終獻攝事行禮官吏等改轉優賜並候續敕處分應飛龍間廏內作器仗諸雜工巧黃衣三衛四色細仗掌扇黃鍾典鼓等亦各委所司分析姓名申奏當議優賞駙馬都尉普恩之後仍各賜一子八品正員官赦內有未該恩例及合條流事件各仰所司啓請施行開國之初既勤行於德惠改元之後尤企望於樂推惟是革弊從新去華務實有利於民者不得不用有害於政者不得不除公平必致於民安富庶自成於國霸恩雖不吝法且無私赦宥者各仰自新釐革者皆宜共守俾從蕩滌永致清平敢以赦前該恩事相告者以其罪罪之挾藏軍器亡命山澤百日不首復罪如初赦書日行五百里仍付所司牒至準賜敕故牒大蜀皇帝致書於大梁皇帝閣下竊念早歲與皇帝共逢昌運同事前朝俱榮倚注之恩並受安危之寄豈期王室如燬大事莫追橫流泛濫於八方衰釁淩夷於九廟此際與皇帝同分茅土共統邦家扶危者力既不宣握兵者計無所出建忝列同盟之分幸居平蜀之功所宜治兵甲以固封疆聚征賦以修進貢望星使而經年不至指雲鄉而就日無期遠聞皇帝應天順人開基立極拯生靈於塗炭示恩信於豚魚東南之王氣咸歸河洛之殊祥畢至四門盡闢百度惟貞竟無意於興邦止施仁而濟物以此內量分限不在經綸七十州自可指揮八千里半因開拓遂至萬民叶議八國來朝爰徵史冊之文亦有變通之說且東漢亂離之後三國齊興西周微弱之時六雄競起俱非恃強逼禪皆以行道濟時雍容於揖讓之前輕重於英雄之內況西蜀開山立國燒棧為謀稱雄雖處於一隅避亂曾安於二帝鼎峙之規模尚在山呼之氣象猶存永言梁蜀之歡合認弟兄之國今蒙皇帝遠尋舊好專降嘉音俱無閒諜之嫌再敘始終之約疑慮則春冰共泮開通則東海可歸光榮遽被於子孫暢遂咸敷於朝野今則盡焦勞而勵已用勤儉以帥賢常瞻偃草之風以繼用天之道又蒙厚加賜貺別降珍奇十驥聯鑣六龍并駕稱德曾參於萬乘呈才皆過於千金載觀戀主之心益勵懷恩之志寶帶輟異方之貢名香加遠國之琛奇鋒利逾於雪霜雅器價齊於金玉入用多慚於未識捧持方喜於初觀望恩而一日三秋仰德而跬步千里自此榮遵天路繼遣星槎緘章不候於飛鳶裂帛豈勞於繫雁欣榮慰喜併集此時敬以專使盧卿等回略陳所志幸望開覽右件鞍馬及腰帶甲胄槍劒麝臍琥珀玳瑁金稜碗越瓷器并諸色藥物等皆大梁皇帝降使賜貺雕鞍撼玉堅甲爍金十圍希世之珍六轡絶塵之用槍森蛇檊劒耀龍鋒金稜含寶碗之光祕色抱青瓷之響上藥非蜀都所紀名香從外國稱奇遠有珍華並由惠好顧酬謝而增愧仰渥澤以難勝捧閲品名實慚祗受朕比遭亂離以干戈定秦蜀賴卿等忠勤夾輔遂正名號奄有神器兢兢業業懼不負荷幸賴天地之靈廟社之貺方隅砥定民黎樂康二氣協和五穀豐稔然萬幾之大夙夜勤勞遘此篤疾藥石勿救太子雖幼有賢德次不當立卿等固請於外妃后篤愛朕未能違立為儲君勉力匡襄無墜我邦家之休命吾提三尺劒化家為國親決庶獄人無枉濫恭儉畏慎勤勞慈惠無一事縱情無一言傷物故百官吏民愛朕如父母敬朕如天地汝襁褓富貴不知創業之艱難更汝之名上應圖讖勿驕勿矜勿盈勿忌惟敬惟誡惟謙惟和內睦九族外安百姓赤心待羣臣恩信愛士卒刑罰人之命也無徇愛憎奸邪國之賊也無信讒搆絶畋遊之娛察聲色之禍然後能保我社稷君我民臣吾蚤莫誡勗恐汝遺忘當置於几案出入觀省衍字化源先主第十一子初封鄭王為左奉駕軍使先主殂襲位改元乾德六年後唐莊宗伐蜀明年唐師入成都帝出降唐遣使殺之於秦川年二十八天成三年追封順正公蓋聞前王巡狩觀土地之慘舒歷代省方慰黎元之徯望西秦封域遠在邊隅先皇帝畫此山河歷年征討雖歸王化未浹惠風今耕稼既屬有年軍民頗聞望幸用安疆埸聊議省巡炎漢致治始策賢良巨唐思皇爰求茂異講邦國治亂之體陳天人祥祲之原豈角虛文蓋先碩德朕念守器之重識為君之難思得奇才以凝庶績因舉故事以紹前修子大夫抱道逢時投書應詔必有長策以副虛懷何以使三農樂生五兵不試刑獄無枉賦斂無加以何策可以定中原以何道可以卜長世朕當親覽汝無面從衍叩頭言伏以五帝三王竟歸於代謝有家垂國孰免其廢興茍大命之革新願轉禍而為福衍誠惶誠恐叩首伏以衍先人頃以受唐封冊列土坤維自霸一方於茲三紀乃者因夷門之搆逆偶中國以喪君勉副推崇遂開興業衍謬為世子獲紹舊基而以幼沖不得負荷尋遇大唐皇帝中興聖運再造鴻圖輝赫大明照臨下土存修嘉好仰恃恩盟感覆燾於堯天將驅馳於禹貢忽審王師討伐部內震驚靡敢當鋒幸思歸命伏惟殿下位尊上嗣德寶元良騰少海之波瀾動前星之秀彩親乘象輅勞履劒關巳得萬民之歡心坐恕斯人之死罪今則完全府庫守遏邑居率文武以陳誠輿棺櫬而納款伏惟殿下特宏哀鑒保證奏聞亦存諸典刑貯在肺腑庶幾先人之靈猶享血食之祀免支離於眷屬得敬養於庭闈惟聖君之明慈係殿下之元造衍無任危迫殆越戰懼激切之至謹差私署檢校司空行尚書兵部侍郎歐陽彬軍使韓知權等奉箋以聞煉形神冶瑩質良工當眉寫翠對臉敷紅如珠出匣似月停空綺窗繡幌俱涵影中據抱璞記作煉形神冶瑩質良工如珠出匣似月停空當眉寫翠對臉傳紅光含晉殿影照秦宮鐫書玉篆永鏤青銅知祥字保允邢州龍岡人李克用鎮太原以為親衛軍使後唐天成中纍加太尉兼侍中封平原公長興二年擊敗董璋得梓綿龍劒普果閬蓬渠九郡遂并有兩川四年加檢校太尉兼中書令行成都尹劒南東西兩川節度使管內營田觀察處置統押近界諸蠻兼西山八國雲南安撫制置等使封蜀王明年稱帝國號蜀改元明德是年殂年六十一僭諡文武聖德英烈明孝皇帝廟號高祖取威定霸乃公侯權變之方捨爵策勳乃皇王敘酬之典其或兵屯萬旅地廣三川周環列國之山河奄有全蜀之封部儻不從權而徇衆則稽録效以報功今稟命於中朝得專制而行賞但念承世家之餘慶受旌鉞之殊榮自領成都於茲半紀窮奢極侈固斷意而不為講武教民在安邊而有作往歲方勤述職務保永圖不幸諸藩搆成深隟此際主兵將帥爭陳排難之功運策賓僚咸展出奇之略因興武旅分蕩渠魁纍破竹以焚枯連開疆而拓土其次諸司奉職庶吏推誠咸著勳勞豈忘奬答一昨聖上以顯分忠佞遂降冊封礪嶽帶河銘大君之異寵輅車珠冕表列國之殊榮仍示優崇俾行墨制上自藩方之任下及州縣之官凡黜陟幽明許先行而後奏自可保不僭不濫之典賞立功立事之人必無患於不均庶有覬於允當布告遐邇咸使聞知蓋聞皇王御下恩信乖而叛離臣子事君猜忌生而權變固不可刮席而忍恥膠柱而移音開戶牖以啓戎長根芽而稔患以至舉戈問罪誓衆言征旁庇齊民式求多福某國朝懿戚受命莊宗自節制於西川遇鼎移於東洛且以時變則變喪君有君因盡節而傾誠遂梯航而入貢五年之內發運無虛積數五十萬緍粗給朝中之費此則勵勤藎於天子欲表率於諸侯宇內皆知人誰不見至於屢加官秩亦荷寵光不幸閒諜潛興窺覦顯露於閬中而立節就列鎮而益兵搖動我軍民控扼我吭背頻將異議纍具上聞冀粗軫於懷柔希稍安於方面而朝廷不以為德轉深其疑竟乖魚水之歡自絶雲龍之契某與東川相公已聯姻好況密封圻朝聞雞犬之聲暮接笳鼙之響地里雖分於兩鎮人心何異於一家勢比同舟事資共濟今與東川點檢馬步軍十五萬人騎分路往武信利閬路黔夔等州問逐制置之由與興屯集之衆其行師法令別載條章務期晏寧必無侵虐況王氏開國久霸成都東則鐵鎖於瞿唐北則泥封於大散自是子孫失守將相離心合在蜀之蒸人固未忘於霸主某因衆多之感舊奮武旅以開疆佇遣四民各安其業然後花林步月錦水行春繁華何讓於往年爵祿重新於此日凡百士庶宜體端倪昨者兩川以朝廷自生疑二不體忠良信讒賊之閒言致諸侯之離德始則閬州節度使李仁矩兩來奉使頻此覘窺謂於果閬之閒便是控臨之地妄興謀畫濫置節旄及奸計之遂心猶陰邪而未已數聞奏報背請兵師欲結禍階自為戎首所以東川相公慮其稔惡須議摧凶連興豼虎之師共破豺狼之窟自今月二十九日酉時得東川相公來書云二十五日夜三更三點親領兩川大軍四面圍裹攻打閬州城池至其日平明打破斫到李仁矩首級并捉到都指揮使姚洪馬軍指揮使王景步軍指揮使費暉等訖餘城下見機來投指揮使都頭已下便與賞給安存兼本城軍人百姓並不傷動外餘拒敵黨類殺戮無餘此則天贊兵威人叶勇力遂至元凶斬首同惡就擒我師四合以環圍逆壘一攻而瓦解捷書雷迅喜氣山橫想與士民同多慶快見便乘勝前進攻收利州只期反掌之閒更俟克敵之捷今月二十一日據峽路行營討伐招收使狀報黔南節度使去今月二十七日將手下元戎兵士拋本州下水奔竄尋差衙隊指揮使朱偓部領左右飛棹并諸指揮兵士乘戰船十五隻往黔南安慰至今月二日午時回其黔南節度使今見在渠溪團點元隨兵士及旋添水軍却有五百餘人排比小戰船候寧江應接兵士到却欲歸復本州其朱偓當日辰時部領戰船往渠溪襲逐至午時與賊軍相見交戰趁下水約百餘里至酆都壩頭殺獲賊軍一百餘人斬黔南內外都指揮使郭太尉吳近思張瓊等三十餘人奪得衣甲器械不少收獲牌印四副其黔南節度使則攜餘黨乘小船沿流直下忠州者竊以大舉舟師遠征峽路旗鼓才聞其下瀨雲檣尋指於上游連降郡城繼收營監勢且疾於破竹聲有類於蓬今則更閲捷書屢聞勝策況寧江軍以黔南為肘臂之地以渝合為饋運之衢我已斷之彼何望矣節帥廾城而竄遁裨將兼隊而追擒數俘馘以既多收鎧甲而亦衆指期蕩定以固封㝢凡曰軍民攸同快慰蓋聞皇天無親唯德是輔明神不昧稔惡則亡逆賊東川節度使董璋包藏禍心負背盟約暴興士馬急寇封圻迎鋒而尋沒全軍單馬而竄歸本府昭武司徒統領大衆追襲餘妖則有前陵州刺史王暉覩其將亡因圖轉禍梟斬董璋父子雙獻其元克保軍城待余旌斾念其智勇足可嘉稱且謀不自於衆人罪止歸於元惡既除心腹之患永固邦國之基某見親往東川慰諭軍民昶字保元初名仁贊先主第三子起家西川節度行軍司馬先主稱號進檢校太保東川節度使同中書門下平章事先主殂襲位仍以明德紀元五年改元廣政二十八年宋師入成都後主降授開府儀同三司檢校太師兼中書令秦國公越七日薨年四十七贈尚書令追封楚王諡恭孝刺守縣令其務出入阡陌勞來三農望杏敦耕瞻蒲勸穡春鶊始囀便具籠筐蟋蟀載吟即鳴機杼七月一日大蜀皇帝謹致書於大周皇帝閣下竊念自承先訓恭守舊邦匪敢荒寧於茲二紀頃者晉朝覆滅何建來歸不因背水之戰爭遂有仇池之土地洎審晉君歸北中國且空暫興敝邑之師更復成都之境前時秦成階鳳實為下國之邊陲其後漢主徑自并汾來都汴浚聞征車之未息尋神器之有歸伏審貴朝先皇帝應天順人繼統即位奉玉帛而未克承弓劒之空遺但傷嘉運之難諧適歎新歡之且隔以至前載忽勞睿德遠舉全師土疆尋隸於大朝將卒亦拘於貴國幸蒙皇帝惠其首領頒以衣裘偏裨盡補其職員士伍遍加於糧賜則在彼無殊於在此敝都寧比於雄都方懷全活之恩非有放還之望今則指揮使蕭知遠馮從讜等押領將士子弟共計八百九十三人已到當國具審皇帝迥開仁愍深念支離厚給衣裝兼加巾屨給沿程之驛料散逐分之緍錢仍以官僚之迥還安知所報此則皇帝念疆埸則已經幾代舉干戈則不在盛朝特軫優容曲全情好永懷厚義常貯微衷載念前在鳳州支敵虎旅偶於行陳曾有拘擒其排陳使胡立已下尋在諸州安排及令軍幕收管自來各支廩食並給衣裝却緣比者不測宸襟未敢放還鄉國今既先蒙開釋已認沖融歸朝雖愧於後時報德未稽於此日其胡立已下今各給鞍馬衣裝錢帛等專差御衣庫使李彥昭部領送至貴境望垂宣旨收管矧以昶昔在齠齔即離并都亦承皇帝鳳起晉陽龍興汾水合敘鄉關之分以陳玉帛之歡儻蒙惠以嘉音即佇專馳信使謹因胡立行次聊陳感謝詞莫披述伏惟仁明洞鑒垂念不宣早歲曾奉尺書尋達睿聽丹素備陳於翰墨歡盟已保於金蘭洎傳弔罰之嘉音實動輔車之喜色竊念頃自北京即隨先子洎臨西蜀嗣守餘基自量小國之封疆常阻大朝之正朔伏自皇帝位登宸極禮盛郊禋令預梯航願同臨照而以阻遙障險稍易歲時今則遠勞王師恭行天討有征無戰詎可抗威棄甲倒戈尋皆效順具陳降款上達冕旒所希者存濟活於蒼生報劬勞於老母忠惟奉主孝則養親固於生平無所覬望許男銜璧已蒙解釋之儀虞舜垂衣佇保安全之望丹誠備寫雪涕難勝伏惟某官叶贊萬機懷柔八表迥敷恩信並及幽遐願垂前席之言特加敷奏冀遂保家之懇終養晨昏烏反哺以知恩竊將比喻雀銜環而報德以荷生成倚賴感銘陳詞罔盡遐瞻德宇但瀝虔誠今遣親弟仁贄詣闕上表待罪朕念赤子旰食宵衣託之令長撫養惠綏政存三異道在七絲驅雞為理留犢為規寬猛得所風俗可移無令侵削無使瘡痍下民易虐上天難欺賦輿是均軍國是資朕之爵賞固不踰時爾俸爾祿民膏民脂為民父母莫不仁慈勉爾為戒體朕深思晟初名宏熙南漢先主龑第四子封晉王光天二年春弒第二主玢自立改今名乾和十六年八月殂在位十六年年三十九僭諡文武光聖明孝皇帝廟號中宗武穆王奄有全楚富強安靖五十餘年正由三十五舅三十舅兄弟尋戈自相魚肉舉先人基業北面仇讎今聞唐兵已據長沙竊計桂林繼為所取當朝世為與國重以昏姻覩茲傾危忍不赴救已發大軍水陸俱進但令相公舅永擁節旄常居方面鋹初名繼興第三主晟長子封衛王乾和十六年八月襲位改今名大寶十四年宋師至降於軍門封恩赦侯太平興國五年薨在位十四年入宋九年追封南越王大漢皇帝以大寶十年丁卯歲敕有司用烏金鑄造千佛寶塔一所七層并相輪蓮花座高二丈二尺保龍闕有慶祈鳳歷無疆萬方咸闕於清平八表永承於交泰闕善資三有福被四恩以四月乾德節設齊慶讃謹記希廣字德丕楚文昭王希範母弟武穆王殷第三十五子文昭薨時諸弟中名希萼者最長宜襲位長直都指揮使劉彥瑫等稱遺命奉希廣權軍府事漢天福十二年以希廣為天策上將軍武安軍節度使江南諸道都統兼中書令封楚王乾祐二年加太尉三年十一月希萼入寇陷長沙遂自立賜王死臣當道去九月內量發兵士往朗州招安戶民不料偶失威嚴遂中姦便須謀補卒爰議班師朗州自聞當道抽退已來狂謀益甚又探得荊南繼差人下淮南與廣州三處結搆荊南欲取澧朗州廣南攻桂州淮南欲取湖南兼即日淮南支鄂州管內租稅衷私令荊南供給朗州且如山結連可知事勢其朗州已入附於淮甸又納款於荊南興破家亡國之心作剖豆分之勢兼誘草賊燒却近封顧基扃而危若綴旒視黎庶而困於塗地弦衰柱促言發涕流伏乞聖慈念以臣四世勤王三面受敵欲興師旅動礙寇讎望特降絲綸聊差貔虎亦知朝廷北面託落分兵處多故不敢大段撓於兵力只乞差借許蔡鄉軍三五千人馬一千騎內得王師二千來人夾帶南渡只到澧州屯駐以斷淮南與荊南援助之路不勞血刃只仗朝廷則當道出兵不難克復安危繫慮翰墨難窮庶回雷電之光以收蕩平之捷謹差押衙焦文諫馳奏披瀝以聞希萼武穆王庶子希廣既襲位希萼興師爭國陷長沙遂自稱楚王南唐保大九年二月遣使入貢於唐唐以王為天策上將軍武安武平靜江寧遠等軍節度使兼中書令封楚王九月馬步都指揮使徐威等囚王於衡山縣尋立為衡山王十二月入唐唐主以為江南西道觀察使守中書令鎮洪州仍賜爵楚王十年十二月復入唐唐主留之數年薨於金陵諡孝恭昔先王早以勛業基有楚國不幸即世顧命之夕顯令兄弟以天倫紹立庶奉宗廟獲享國祚無何嗣君不延永命奄棄社稷訃告至日臣不勝痛切膚骨血泣頤睫即時奔走哀庭冀處苫用竭臣子之孝不圖天未殄禍孽豎搆隙閒離我戚屬汨亂先序潛阻兵戈將謀勦絶苟不更圖殞在朝夕故臣敢遠遣行價殫布腹心惟君存先王之昔好軫大國之武威許出兵援以附不腆庶俾盜黨免弄凶器
