front:
  text: 全唐文欽定全唐文卷一百八十一王勃五
  hash: sha256:37222838619cae598b81a095d510f93b98ee52e204818edda01549c9a405642b
body:
  text: 林慮主簿清靈士也達於藝明乎道詮柱下之理駁河上之義撮其綱統成其卷軸吾儕服其精博時議稱其典要可謂賢人師古老氏不死矣夫靈芝既秀蘭蕙同薰仙鳳于飛鵷鸞舞翼何則物類之相感也况乎同得此義目擊道存此僕所以望風投款披襟請益展轉於寤寐殷勤於左右詩不云乎中心藏之何日忘之然變動之不居乃聚散之恒理琴樽暫離山川有別惟高明之捧檄屬吾人之解帶王事靡盬良時易失盍陳雅志各敘幽懷人賦一言同疏四韻云爾今之游太學者多矣咸一切欲速百端進取故夫膚受末學者因利乘便經明行修者華存實爽至於振骨鯁之風標服賢聖之言懷遠大之舉蓋有之矣未之見也可以深慕哉且吾家以儒輔仁述作存者八代矣未有不久於其道而求苟出者也故能立經陳訓刪書定禮揚魁梧之風樹清白之業使吾徒子孫有所取也大雅不云無念爾祖易不云幹父之蠱書不云惟孝友于詩不云不如友生四者備矣加之執德宏信道篤心則口誦廢食忘寢渙然有所成望然有所伏然後可以託教義編人倫彰風聲議出處若意不感慨行不卓絕輕進苟動見利忘義雖上一階履半級何足恃哉終見棄於高人但自溺於下流矣吾被服家業霑濡庭訓切磋琢磨戰兢惕厲者二十餘載矣幸以薄伎獲蠲戎役嘗恥道未成而受祿恨不得如古君子四十強而仕也而房族多孤飦粥不繼逼父兄之命覩饑寒之切解巾捧檄扶老攜幼今既至於斯矣不蠶而衣不耕而食吾何德以當哉至於竭小人之心申猶子之道飲食衣服晨昏左右庶幾乎令汝無反顧憂也行矣自愛游必有方離別咫尺未足耿耿嗟乎不有居者誰展色養之心不有行者孰就揚名之業籩豆有踐菽水盡心盍各賦詩敘離道意云爾八十有遇共太公晚宦未遲七歲神童與顏回早死何益僕一代丈夫四海男子衫襟緩帶擬貯鳴琴衣袖濶裁用安書卷貧窮無有種富貴不選人高樹易來風幽松難見日羽翼未備獨居草澤之間翅翮若齊即在雲霄之上鳥眾多而無辨鳳馬㣥雜而不分龍荊山看刖足之夫湘水聞離騷之客人貧材富罔窺卿相之門貌弱骨剛豈入王侯之宅王少府北辭伊闕南登湎山過我貧居飲我清酒一談經史亞比孔先生再讀詞章何如曹子建山岳藏其跡川澤隱其形一旦覩風雲千年想光景孔夫子何須頻刪其詩書焉知來者不如今鄭康成何須浪注其經史豈覺今之不如古王少府乃可畏後生學問人也各為四韻共寫別懷嗟乎不游天下者安知四海之交不涉河梁者豈識別離之恨薜衣松杖琴樽為得意之親臨遠登高煙霞是賞心之事有梁孝王之下客僕是河南之南孟嘗君之上賓子在北山之北幸屬一人作寰中之主翛然四皓為方外之臣俱游萬物之間相遇三江之表許元度之清風朗月時慰相思王逸少之修竹茂林屢陪歡宴加以惠而好我攜手同行或登吳會而聽越吟或下宛委而觀禹穴良談落落金石絲竹之音輝雅致飄飄松柏風雲之氣狀當此時也嘗謂連璧無異鄉之別斷金有好親之契生平於張范之年齊物於惠莊之歲三光迴薄未殫投分之情四序循環詎盡忘言之道豈期我留子往樂去悲來橫咽水而東西緒愁雲於南北况乎泣窮途於白首白首非臨別之秋嗟歧路於他鄉他鄉豈送歸之地蓐收戒序少昊司辰清風起而城闕寒白露下而江山遠徘徊去鶴將別葢而同飛斷續來鴻共離舟而俱泛古人道別動便經年今我言離會當何日山巨源之風猷令望善佐朝廷嵇叔夜之潦倒粗疎甘從草澤行當山中攀桂往往思仁野外紉蘭時時佩德人非桃李豈得無言子是簫韶當思振響勉酌傷離之酒具陳感別之詞各賦一言俱題六韻觀夫天下四方以宇宙為城池人生百年用林泉為窟宅雖朝野殊致出處異途莫不擁冠葢於烟霞披薜蘿於山水况乎山陰舊地王逸少之池亭永興新交許元度之風月琴臺寥落猶停隱遯之賓釀渚荒凉尚有過逢之客仙舟溶裔若海上之槎來羽葢參差似遼東之鶴舉或昂昂騏驥或泛泛飛鳧俱安名利之場各得逍遙之地而上屬無為之道下棲元邈之風永淳二年暮春三月修祓禊於獻之山亭也遲遲風景出沒媚於郊原片片仙雲遠近生於林薄雜花爭發非止桃蹊㣥鳥亂飛有踰鸚谷王孫春草處處爭鮮仲統芳園家家並翠於是攜旨酒列芳筵先祓禊於長洲去申交於促席良談吐玉長江與斜漢爭流清歌遶梁白雲將紅塵並落他鄉易感增悽愴於茲辰羇客何情更歡娛於此日加以今之視昔已非昔日之歡後之視今豈復今時之會人之情也能不悲乎且題姓字以表襟懷使夫會稽竹箭則推我於東南崐阜琳琅亦歸予於西北吾之生也有極時之過也多緒若夫遭主后之聖明屬天地之貞觀得犬畝之相保以農桑為業而託形宇宙者幸矣况乃偃泊山水遨遊風月樽酒於其外文墨於其間則造化之於我得矣太平之縱我多矣茲以上已芳節雲開勝地大江浩曠㣥山紛糾出重城而振策下長浦而方舟林壑清其顧盼風雲蕩其懷抱於時序足厂田坴清律運啟朱明輕荑秀而郊戍青落花盡而亭皋晚丹鸎紫蝶候芳晷而騰姿早鷰歸鴻俟迅風而弄影巖暄蕙密野淑蘭滋弱荷抽紫疎萍泛綠於是儼松舲於石㠗停桂檝於璇潭指林岸而長懷出河州而極睇妍妝袨服香驚北渚之風翠幙元帷彩綴南津之霧若乃尋曲渚歷迴溪榜謳齊引漁歌互起飛沙濺石湍流百勢翠嶮丹崖岡巒萬色亦有銀鉤犯浪掛赬翼於文竿瓊舸乘波耀錦鱗於畫網鍾期在聽元雲白雪之琴阮籍同歸紫桂蒼梧之醴既而遊盤興遠景促時淹野日照晴山烟送晚方披襟朗詠餞斜光於碧岫之前散髮高吟對明月於青溪之下客懷既暢遊思遄征視泉石而如歸佇雲霞而有自昔周川故事初傳曲路之悲江甸名流始命山陰之筆盍遵清轍共抒幽襟俾後之視今亦猶今之視昔一言均賦六韻齊疏誰知後來者難輒以先成為次若夫懷放曠寥廓之心非江山不能宣其氣負鬱怏不平之思非琴酒不能洩其情則林泉為進退之場樽罍是言談之地白衣送酒青陽在節鳧雁亂而江湖春梅柳開而庭院晚楚屈平之瞻望放於何之王仲宣之登臨魂兮往矣俠客時有且傾鸚鵡之杯文人代興聊舉麒麟之筆人采一字四韻成篇下官以窮途萬里動脂轄以長驅王公以傾餞百壺別芳筵而促興是以青陽半序明月中宵離亭擁花草之芳別館積琴歌之思去留歡盡動息悲來惜投分之幾何恨知音之忽間他鄉握手自傷關塞之春異縣分襟意切悽惶之路既而星河漸落烟霧仍開高林靜而霜鳥飛長路曉而征驂動含情不拜空佇聽於南昌揮涕無言請投文於西候因探一字四韻成篇自嵇阮寂寥尹班超忽高筵不嗣中宵誰賞古今惜芳辰者停鶴軫於風衢懷幽契者佇鸞觴於月徑已矣哉林壑遂喪煙霞少對良會不恒神交復幾請沃非常之思但宣絕代之遊託同志於百齡求知已於千載道之存矣無乃然乎人賦一言俱裁四韻夫人生百齡促膝是忘言之契丈夫四海交頤非贈別之資然乃想山川之遽遙送歸將遠惜歲年之不待行樂無時於是輟征驂以少留敞幽亭之多暇山芳襲吹坐疑蘭室之中水樹含香宛似楓江之上加以御溝新溜近入離絃賓館餘花遙催別酒既而滎波東注灞岸南登浮蟻傾而高宴終踆烏落而離言促雖相思有贈終結想於華滋而素賞無暌盍申情於麗藻人為四韻各賦一篇宋五官芝庭襲譽盛文史於三冬桂幄凝歡照綺羅於九夏樽浮綠蟻每披仙霧之文障列青牛更寫行雲之態爾其龍編繡質貝錦分花隱映樓臺比窗簾之在旦參差花葉若桃李之恒春楚媛調絃韓娥對酒虹橋度幔鵲鏡臨妝佩引琅玕詎動懷風之韻鞍迴玳瑁唯奔逐日之姿魚鳥冷而相親泉石紛而在翫宋家斯近難別謝於登垣秦氏未遙自堪留於駐馬驚鴻擅美丹青貴近質之奇吐鳳標華宮徵得緣情之趣遞揚筆妙式暢辭端下官狂走不調東西南北之人也流離歲月羇旅山川輟仙駕於殊鄉遇良朋於異縣面勝地陟危樓放曠懷抱驅馳耳目韓原奧壤昔時開戰鬬之場秦塞雄都今日列山河之郡池臺左右覺風雲之助人林麓周迴觀巖泉之入興則有驚花亂下戲鳥平飛荷葉滋而曉霧繁竹院靜而炎氛息賞歡文酒思挽雲霄人賦一言庶旌六韻云爾夫益者三友則道術可存同心三人則金蘭可裕况乎詩書舊好披樂廣之高天鄉黨新知掃顏回之陋巷尋勝地敘清蕪脫野客之荷衣入幽人之桂座榴花浮酌對文舉而無憂葛蔓調絃撫鍾期而有遇既而南方夏晚北牖晴開中園之弱柳含烟曠野之陰雲蔽日低虹飲水向溪谷而全斜戲鳥淩空狎林亭而半度興酣情逸共敦行役之期搦管含毫獨對當仁之序張二官松駕乘閒桂筵追賞引簪裾之勝侶狎邱壑之神交辯縱於解頤道深於喻指香杯濁醴是河朔之平生雄筆清詞得高陽之意氣林亭曠望季倫調伎之園泉石周游子晉登仙之浦舟浮葉影簟積花文黃鵲度而飈驚丹烏傾而日晚出處之情一致筌蹄之義兩忘沈轄留驤眺乘羊於衞玉揮毫可作明擲地於孫金共題橫吹之篇用記茲辰之樂人採一字四韻成篇天地不仁造化無力授僕以幽憂孤憤之性稟僕以耿介不平之氣頓忘山岳坎坷於唐堯之朝傲想烟霞顦顇於聖明之代情可知矣賴乎神交勝友得山澤之虬龍隱路幽居降雲霄之鸞鳳楊公沈公行之者仁義禮智用之也乾元亨利元經苦而白鳳翔素牒開而紫鱗降金門待詔謁天子於朝廷石室尋真訪下走於邱壑幽人待士非無北壁之書隱士迎賓自有西山之饌席門蓬巷佇高士之來游叢桂幽蘭喜王孫之相對山南花圃澗北松林黃雀至而清風生白鶴飛而蒼雲起停琴綠水仲長統之歡娛置酒青山郭子期之賓客人探一字四韻成篇僕不幸在流俗而嗜烟霞恨林泉不比德而嵇阮不同時處良辰而鬱怏仰高風而杼柚者多矣豈夫司馬卿之車騎上客盈門仲長統之園林㣥英在席坐臥南郭蕭條東野江波浩曠晴山紛積嘉鴛鸞之接翼曜江漢之多才顧斜景而危心瞻火雲而變色思傳勝餞敢振文鋒蓋同席者高人薛曜等耳盍各賦詩放懷敘志俾山川獲申於知已烟霞受制於吾徒也昔者王烈登山林泉動色嵇康入座左右生光豈非仙表足以感神真姿可以錯物况我巨山之稟孤出昇華之麗清峙㣥公之好善下官之惡俗接霓裳於勝席陪鶴轡於中軒俱持拔塵之標各仗專門之氣烟霞用足江海情多言泉共秋水同流詞峯與夏雲爭長雖揚亭載酒方趨好事之游而樂肆含毫請命昇僊之筆同抽藻思共寫離懷昔王子敬瑯琊之名士常懷習氏之園阮嗣宗陳留之俊人直至山陽之坐豈非琴樽遠契必兆眹於佳辰風月高情每留連於勝地是以東山可望林泉生謝客之文南國多才江山助屈平之氣况乎揚子雲之故地巖壑依然宓子賤之芳猷絃歌在屬紅蘭翠菊俯映砂亭黛柏蒼松深環玉砌參差夕樹烟侵橘柚之園的歷秋荷月照芙蓉之水既而星迴漢轉露下風高銀燭摛華瑤觴抒興一時仙馭方深擯俗之懷五際飛文時動緣情之作人分一字四韻成篇若夫爭名於朝廷者則冠葢相趨遯迹於邱園者則林泉見託雖語默非一物我不同而逍遙皆得性之場動息匪自然之地故有季處士者遠辭濠上來遊境中披白雲以開筵俯青溪而命酌昔時西北則我地之琳琅今日東南乃他鄉之竹箭又此夜乘槎之客猶對仙家坐菊之賓尚臨清賞既而依稀舊識歡吳鄭之班荊樂莫新交申孔程之傾葢向時朱夏俄涉素秋金風生而景物清白露下而光陰晚庭前柳葉纔聽蟬鳴野外蘆花行看鷗上數人之內幾度琴樽百年之中少時風月蘭亭有昔時之會竹林無今日之歡丈夫不縱志於生平何屈節於名利人之情矣豈曰不然人賦一言各申其志使夫千載之下四海之中後之視今知我咏懷抱於茲日人間齷齪抱風雲者幾人庶俗紛紜得英奇者何有烟霞召我相望道術之門文酒起子放浪沈潛之地少留逸客塞雁飛鳴北斗橫而天地秋西金用而風露降幽居少事野性多閒登石岸而鋪筵坐沙場而列席琳瑯觸目朗月清風之俊人珠玉在傍鸞鳳虬龍之君子汀洲地遠波濤濺日月之輝人野路殊原隰擁神仙之氣平郊樹直曲浦蓮肥隱士泥清仙人水綠越林亭而極望生死都捐出宇宙以長懷心靈若喪悲夫秋者愁也酌濁酒以蕩幽襟志之所之用清文而銷積恨我之懷矣能無情乎夫以東京勝地南呂高秋三塗鎮而九派分白露下而清風肅或出或處人多朝野之歡以嬉以遊時極登臨之所征衣流寓切下走之蓬襟解榻邀期屬上賓之桂席於是齊道實款琴樽倜儻論心留連促膝但有潘楊之密戚得無管鮑之深知簪組盛而車馬喧庭宇虛而管絃亮近臨銅陌斜控銀墟菊照新花泛輕香於遠次荷凋晚葉翻翠影於長波聽矚方窮獻酬逾洽年忘小大傲天地於平生志混榮枯得林泉之意氣願長繩以繫日幾近光陰思短札以淩雲或陳歌咏人採古韻成者先呈下官人間獨傲海內少徒志不屈於王侯身不絕於塵俗孤吟五嶽長嘯三山昔往東吳已有梁鴻之志今來西蜀非無張載之懷况乎踐名場攜勝友風月無幾琴酒俄乖半面十年一別千里何少府故人攀桂撫金石而論心韓法曹新識班荊臨江湖而執手離亭北望烟霞生故國之悲別館南開風雨積他鄉之思於時蒼雲寡色白日無光沙塵起而桂浦昏鳧雁下而蘆洲晚傍鄰蒼野霜風橘柚之園斜枕碧潭夜月芙蓉之水既而登臨惜別驂駕少留季札何人親逢贈縞子荊不敏思掛傾城惆悵北梁揖琴臺而漸間徘徊東道思錦署以行遙嗟乎人事乖矣江山遠矣請命離前之筆為題別後之資五際飛文想㣥公之不讓一言有贈知下筆之有神若夫龍津宴喜地切登仙鳳閣元虛門稱好事亦有登山臨水長想巨源明月清風每思元度未有能星馳一介留美跡於芳亭雲委八行抒勞思於彩筆遂令啟瑤緘者攀勝集而長懷披瓊翰者仰高筵而不暇王子猷之獨興不覺浮舟嵇叔夜之相知欣然命駕琴樽佳賞始詣臨卭口腹良遊未辭安邑乃知兩鄉投分林泉可攘袂而遊千里同心煙霞可傳檄而定友人河南宇文嶠清虛君子中山郎餘令風流名士或三秋意契闢林院而開襟或一面新交敘風雲而倒屣彭澤陶潛之菊影泛仙樽河陽潘岳之花光懸妙理巖巖思壁家藏虹岫之珍淼淼言河各探驪泉之寶偶同金碧暫照詞場巴漢英靈潛光翰院亹亹焉蕭蕭焉信天下之奇託也於時白藏開序青女御律金風高而林野動玉露下而江山清琴亭酒榭磊落乘烟竹徑松扉參差向月魚鱗積磴還昇蘭桂之峯鴛翼分橋即映芙蓉之水亦有紅蘋綠荇亘渚連翹玉帶瑤華分楹間植池簾夕敞香牽十步之風岫幌宵褰氣襲三危之露縱沖衿於俗表留逸契於人間東山之賞在焉南澗之情不遠夫以中牟馴雉猶嬰觸網之悲單父歌魚罕繼鳴琴之趣俾夫一同詩酒不撓於牽絲千載巖溪無慚於景燭云爾若夫武邱仙鎮吳王殉歿之墟驪嶠崇基秦帝升遐之宅雖珠衣玉匣下賁窮泉而廣岫長林終成勝境亦有霍將軍之大隧迴寫祁連樗里子之孤墳竟開長樂豈如武擔靈嶽開明故地蜀夫人之葬迹任文公之死所岡巒隱隱化為闍崛之峯松柏蒼蒼即入祇園之樹引星垣於沓障下布金沙棲日觀於長崖傍臨石鏡瑤臺玉甃尚控霞宮寶剎香壇猶芬仙闕琱櫳接映臺凝夢渚之雲璧題相暉殿寫長門之月美人虹影下綴虬幡少女風吟遙喧鳳鐸㣥公以玉律豐暇傃林壑而延情錦署多閒想巖泉而結興於是披桂幌歷松扉梵筵霞屬禪扃煙敞雞林俊賞蕭蕭鷲嶺之居鹿苑仙談亹亹龍宮之偈於時金方啟序玉律驚秋朔風四面寒雲千里層軒迴霧齊萬物於三休綺席乘雲窮九垓於一息碧雞靈宇山川極望石兕長江汀洲在目龍鑣翠轄駢闐上路之遊列榭崇闉磊落名都之氣渺渺焉洋洋焉信三蜀之奇觀也昔者升高能賦勝事仍存登嶽長謠清標未遠敢攀盛烈下揆幽襟庶旌西土之遊遠嗣東平之唱云爾歲月易盡光陰難駐春秋冬夏錯四序之凉炎甲乙丙丁紀三朝之歷數十二月之陰氣玉律窮年一萬歲之休禎金觴獻壽鼖鼓雷動烟火星流侲子黃童統鉤陳而驅赤疫諸王等集陳玉帛而朝諸侯京兆天中竦樓臺而徹漢長安路上亂車馬而飛塵王丞相之登臨行將在目戴侍中之重席忽爾明朝槐火滅而寒氣消蘆灰用而春風起魚鱗布葉爛五色而翻光鳳腦吐花燦百枝而引照悲夫年華將晚志事寥落公孫宏之甲第天子未知王仲宣之文章公卿不識對他鄉之風景憶故里之琴歌柏葉為銘未泛新年之酒椒花入頌先開獻歲之詞作者七人同為六韻吾之有生二十載矣雅厭城闕酷嗜江海常學仙經博涉道記知軒冕可以理隔鸞凰可以術待而事親多衣食之虞登朝有聲利之迫清識滯於煩城仙骨摧於俗境嗚呼阮籍意疎嵇康體放有自來矣常恐運促風火身非金石遂令林壑交喪烟霞板蕩此僕所以懷泉塗而惴恐臨山河而歎息者也粵以勝友良暇相與遊於元武西山廟蓋蜀郡三靈峯也山東有道君廟古者相傳以名焉爾其丹壑藂倚元崖糾合俯臨萬仞平視重元乘杳冥之絕境屬芬華之暮節玉房跨霄而懸居瓊臺出雲而高峙亦有野獸㣥狎山鶯互囀崇松埒巨柏爭陰積瀨與幽湍合響眇眇焉逌逌焉王孫何以不歸羽人何以長往其元都紫微之事耶方歛手鐘鼎息肩巖石絕視聽於寰中置形骸於度外不其然乎時預乎斯者濟陰鹿宏允安陽邵令遠耳蓋詩以言志不以韻數裁焉南昌故郡洪都新府星分翼軫地接衡廬襟三江而帶五湖控蠻荊而引甌越物華天寶龍光射牛斗之墟人傑地靈徐孺下陳蕃之榻雄州霧列俊彩星馳臺隍枕夷夏之交賓主盡東南之美都督閻公之雅望棨㦸遙臨宇文新州之懿範襜帷暫駐十旬休暇勝友如雲千里逢迎高朋滿座騰蛟起鳳孟學士之詞宗紫電青霜王將軍之武庫家君作宰路出名區童子何知躬逢勝餞時維九月序屬三秋潦水盡而寒潭清烟光凝而暮山紫儼驂騑於上路訪風景於崇阿臨帝子之長洲得仙人之舊館層臺聳翠上出重霄飛閣流丹下臨無地鶴汀鳧渚窮島嶼之縈迴桂殿蘭宮列岡巒之體勢披繡闥俯雕甍山原曠其盈視川澤紆其駭矚閭閻撲地鐘鳴鼎食之家舸艦彌津青雀黃龍之舳虹消雨霽彩徹雲衢落霞與孤鶩齊飛秋水共長天一色漁舟唱晚響窮彭蠡之濱雁陣驚寒聲斷衡陽之浦遙吟俯暢逸興遄飛爽籟發而清風生纖歌凝而白雲遏睢園綠竹氣淩彭澤之罇鄴水朱華光照臨川之筆四美具二難幷窮睇盼於中天極娛遊於暇日天高地迥覺宇宙之無窮興盡悲來識盈虛之有數望長安於日下指吳會於雲間地勢極而南溟深天柱高而北辰遠關山難越誰悲失路之人萍水相逢盡是他鄉之客懷帝閽而不見奉宣室以何年嗟乎時運不齊命途多舛馮唐易老李廣難封屈賈誼於長沙非無聖主竄梁鴻於海曲豈乏明時所賴君子安貧達人知命老當益壯寧知白首之心窮且益堅不墜青雲之志酌貪泉而覺爽處涸轍而猶懽北海雖賒扶搖可接東隅已逝桑榆非晚孟嘗高潔空懷報國之情阮籍猖狂豈效窮途之哭勃三尺微命一介書生無路請纓等終軍之弱冠有懷投筆慕宗慤之長風捨簪笏於百齡奉晨昏於萬里非謝家之寶樹接孟氏之芳鄰他日趨庭叨陪鯉對今辰捧袂喜托龍門楊意不逢撫淩雲而自惜鍾期既遇奏流水以何慚嗚呼勝地不常盛筵難再蘭亭已矣梓澤邱墟臨別贈言幸承恩於偉餞登高作賦是所望於㣥公敢竭鄙懷恭疏短引一言均賦四韻俱成請灑潘江各傾陸海云爾上元二載高秋八月人多汴北地實淮南海氣近而蒼山陰天光秋而白雲晚川塗所亘郢路極於崤潼風壤所交荊門洎於吳越憑勝地列雄州城池當要害之衝寮寀盡鵷鸞之選昌亭旅食悲下走之窮愁山曲淹留屬㣥公之宴喜披鶴霧陟龍門故人握手新知滿目飲崔公之盛德果遇攀輪慕郝氏之高風還逢解榻接衣簪於坐右駐旌棨於城隅臨風雲而解帶盼江山以揮涕巖楹左峙俯映元潭野徑斜開傍連翠渚青萍布葉亂荷芰而動秋風朱草垂榮雜芝蘭而涵晚液艤仙舟於石岸薦綺席於沙場賓友盛而芳罇滿林塘清而上筵肅琴歌迭起俎豆駢羅烟霞充耳目之翫魚鳥盡江湖之賞情盤樂極日暮途遙思染翰以淩雲願麾戈以留景嗟乎素交為重覺老幼之同歸朱紱儻來豈榮枯之足道且欣風物共悅濠梁齊天地於一指混飛沈於一貫嗟乎此歡難再慇懃北海之筵相見何時惆悵南溟之路請揚文筆共記良遊人賦一言俱成四韻云爾黯然別之銷魂悲哉秋之為氣人之情也傷如之何極野蒼茫白露涼風之八月窮途蕭瑟青山白雲之萬里奏鳴琴則離鵾別鶴驚歧路之悲心來勝地則時雨涼風助他鄉之旅思琴書人物冀北關西去馬歸軒雲間日下楊學士天璞自然地靈無對二十八宿稟太微之一星六十四爻受乾坤之兩卦論其器宇滄海添江漢之波序其文章元圃積烟霞之氣幾神之外猶是卿雲陶鑄之餘尚同嵇阮接光儀於促席直觀明月生天響詞辯於中筵但覺清風滿室悠哉天地含靈有喜慍之容邱也東西悵望積別離之恨煙霞直視蛇龍去而泉石空文酒求朋賢俊散而琴歌斷門生餞別如北海之郡前高士將歸似東都之門外研精麝墨運思龍章希存宿昔之資共啟相思之詠
