front:
  text: 全唐文欽定全唐文卷四百三十八承嗣廣德二年官司天臺夏正官
  hash: sha256:740c6d9132cdf329dccc271ed09bbfb15ad6b615875ed1aa49f0e26c7cd86574
  markers:
  - {type: head, offset: 14, content: 徐承嗣, id: KR4h0168_NFKB_438-h1, level: 1}
body:
  text: 木處仁君恩於養也金全義德體其政也今月四日臣伺候屬輕濛隱映光迹暫明位指東西不盈南北勢凌密近切慮相干陛下展禮齋宮陰騰又蔽星擬土錯不露其瑕及廟宿精誠天容若鏡今太白避歲審之二尺有餘昔熒惑守心之明三退無謬加以禋祀五帝敬告百神是憑法象呈休蒼生致福偃兵歸馬不遠來期孝理行歌起於茲景事殊古典應美前書望付史館兼示中外甫右拾遺子昂孫官御史君子所貴乎德積於中而化行於外大可以篆鍾鼎次可以備謳歌所謂古人遺愛沒而不朽者也宣州秦故郡之地阻以重山緣以大江封方數百里而銅陵鐵冶繁阜乎其中故其俗佻而侈其人勁而悍屬鞬揭鈠者習以為恒易於寇襄攵昔號難治武德中天下既定唯茲後附自是朝廷艱厥官非勳賢崇茂者文明中正者清貞孤拔者法令峻整者無以刻符為邑焉先天之前人物紛綸矣自開元距今惠化浹物清修邁倫故事傳於府中淑問存諸故老得之數公焉有若裴耀卿者蘊公輔之器受分憂之任以為立政在於樹本樹本在於設教設教在於率身乃潔其源舉其端削煩苛布惠易得而庶務修愷悌行而㣥心化赭衣堊面者知禁鄉校黨序者胥勸自是宣人始服教矣開元癸酉歲國家以天下久平四海繁富慮吏之不率人之不康乃詔分十道署廉察以督之此州統江南之西包潭衡十有六州而班公景倩始受命焉公清廉以飾躬苦節以從政以為法者國之柄天下之評則阿阿則公室之權削矣急則刻刻則下民之怨生矣江右荒服政紊俗訛濟之以猛弛張在我乃布甲令舉直繩恤人之疾苦除吏之貪暴踰年坐賄削免者百有餘輩澄清之政於是乎得矣有若竹公承構特高孤貞行懿直方秉法以馭下去邪以為治鰥惸於是乎康豪奸於是乎息矣代班之政不易其舊閱歲而屬城放黜者幾乎前焉初上以遐方罔迪邦禁思文法之臣而二公繼莅於茲政斯清人斯寧俾吾楚之俗不於度者二公是賴豈比夫延年有掃墓之稱郅都垂蒼鷹之號彼皆刻深而我不濫可同年而語哉有若裴公敦復者繼班竹之餘承法理之極變而通之使人不倦推而廣之使人知化振綱而㣥目張舉大而細故削破觚為圓齊變為魯澆俗由是觀於義矣有若涇大夫李偁者行溫而恭政清而不矯激以干譽不嚴厲以臨下反躬而令行存誠而化達天寶初自太平長遷於涇涇與太平壤距而俗二洊為二邑僅盈十稔蓋久於其道而惠和之德漸於人之氣血矣故溢於去思夥於歌謠後卒此州長史以桐鄉之愛歸竁於涇而家因寓焉廣德初㣥盜蜂軼連陷縣邑人士罹難者比肩而李公之閭獨完由㣥盜聚而保之且曰無忘公德也於戲召公之化勿翦其棠柳季之仁不薪其墓豈若凶寇懷惠束手侵掠又難於古之人矣招討使給事中袁公異而上聞詔贈宣州刺史旌善也有若司功掾張邈者清而廉謹而信非自公無以舉非祿稍無以入私謁杜於居官饋贈絕於故吏肅肅然有寒松貞玉之操焉由是累辟使車令奉丹墀青冥之階其在茲也昔在漢世黃霸課最於潁川魯恭化流於中牟皆異時齊芳高映牒曷若一州之政年未三紀而循良者六人歟大歷初兼御史中丞陳公總方鎮臨此州想前哲徵諸輿誦以為旌賢者所以崇德作頌者所以垂勸以數君之美霈乎在人而不播絃歌傳於竹素逶迤頹靡與尋常者共貫則何以激清風教發揮盛業歟以小子學乎春秋世於文翰爰命操用紀餘烈其里氏族望則世家存焉故不書大歷已酉歲三月二十五日記邁字子元范陽人明經第補太子正字累遷尚書右丞貞元九年以本官同中書門下平章事遷中書侍郎以疾乞休除太子賓客十四年卒年六十贈太子太傅臣按禮記大夫士將祭於公既視濯而父母死猶奉祭又按唐禮散齋有大功之喪致齋有周親喪齋中疾病即還家不奉祭事皆無忌日不受誓誡之文雖假寧令忌日給假一日春秋之義不以家事辭王事今亘以假寧常式而違攝祭新命酌其輕重誓誡則祀事之嚴校其禮式忌日乃尋常之制詳求典據事緣薦獻不宜以忌日為辭齡先廣德二年鎮南副都護合浦縣海內珠池自天寶元年以來官吏無政珠逃不見二十年閒闕於進奉今年二月十五日珠還舊浦臣按南越志云國步清合浦珠生此實國家寶瑞其地元敕封禁臣請採進宗儒字秉文鄧州穰人第進士累授翰林學士建中時歷屯田司門司勛員外郎貞元中進考功郎中遷給事中以本官同中書門下平章事罷為太子右庶子遷吏部侍郎元和朝拜吏部尚書穆宗立檢校右僕射守太常卿拜太子少師寶歷初遷太子太保太和六年以司空致仕卒年八十七贈司徒準今月十五日敕比者先朝徵集應制人等已及時限恐皆來自遠方難於久住酌宜審事遂委有司定日就試如聞所集之人多已分散須知審的然後裁定宜令所司商量聞奏者伏以制科所設本在親臨南省試人亦非舊典今覃恩既畢庶政惟新況山陵日近公務繁迫待問之士就試非多臣等商量恐須權罷維元和元年歲次丙戌正月一日丙寅朔十九日甲申大行太上皇崩於興慶宮之咸寧殿旋殯於大內太極殿之西階粵以其年七月壬申朔十一日壬午將遷座於豐陵禮也龍轀將進魚帷已拂庭引廞儀衢陳備物哀子嗣皇帝諱孝思罔極昭感人神痛天儀之永閟攀德音而靡聞盡哀誠於祖奠徹永慕於顥旻欽惟宸範宜光典冊乃詔魯臣纘揚聖績其詞曰太陽麗天朗曜清懸元后統位至化光被洪惟我唐紹興哲王德宣風土法化乾綱為政本仁寶系攸長積習和氣變為禎祥矩範相纘巍巍煌煌十葉丕慶膺茲駿命稟乎聰明生知孝敬秉文成訓惟睿作聖祚歷攸歸天保斯定厥初錫壤啟彼維城及升上嗣萬邦以貞道邁儲訓業茂繼明總於至妙御乎至精天休廣運播茲清問緯武經文金鏗玉振不絕馳道有過茲慎莫見于微曷窺其朕六律諧度四時齊信庠筵齒冑望苑招賢學閫奧海詞峰峻天深工八體尤洞三元秉志樂善銳思討研敬老尊道優游文囿至賾必精微言咸究不習而知莫非天授建中季祀邦都盜起皇輿出狩幸於郊壘逆祲晝霾衝發如燬扈蹕之辰從曰撫軍每躬誓眾能感師人竟掃兇孽於昭大勳惟謀靜難惟孝安親出震御圖如運璿樞慮宏拯物情窮泣辜深仁降感至澤旁敷洋溢汪濊格于天區寬刑恤隱省賦蠲逋斥絕奇貢歸還戎俘出中宮之音妓愍戎塞之勤夫有命焚鴆永光典謨元風大扇庶類忻愉疾瘵皆愈荑蕤發枯理臻至道我得元珠垂裳負扆懷茲寅畏美利天下雲行雨施人自遷善時稱不諱覆育之恩無不茂遂含靈逢幸澡濯聖政泰元降祉媼神薦慶猛獸皆仁翾昆遂性憬夷慕化向風翹聽八表無塵一時之盛方播金石流于舞詠爰降沖志稱于倦勤褰裳釋位思保怡神惟聖禪聖光于君臨傳萬葉之丕構浹四海之歡心付託之際人祗感深棄代昌期興運本枝遇乾坤之交泰見堯舜之同時尊名崇於聖壽至道體於希夷嗣皇帝闕三字德永裔垂則資敬問安乾乾翼翼一人事親化行邦國沖舉何早栖靈物表聖慕極於充窮人悲集於荼蓼嗚呼哀哉葆翿儼陳招搖初轉背紫禁而歸壽陵出青門而臨下苑金鼓聲兮二儀震煙雲慘而百里遠寶馬局步於逶遲縞士揚音於楚挽嗚呼哀哉瞻彼重峰中起靈宮眾山朝衞鬱鬱崇崇積凝巖之崇靄聚浩野之悲風睇長天而怨不極指流水而恨無窮嗚呼哀哉萬方臣子心崩以摧會七月之畢至望九疑而增哀攀龍髯而何及泣鸞輅之空迴嗚呼哀哉崇茲嚴寢邈矣終天獸方護闕鳥亦耘田閉虛儀於宸宇響夜漏於青川嗚呼哀哉五雲之上六龍以飛難攀真駕空覩游衣寥廓一往曷其有歸惟英謩與睿範傳萬代之洪徽嗚呼哀哉從直元和中官殿中侍御史內供奉邈矣帝德至哉聖謨廢置殊時古今合符孑孑之狀可觀將從五達孜孜之道斯表克協三無是以聳彼㣥彥致之康衢願揚美以歸厚思獻忠而效孚故得繼以此信言由是進明揚既達且自殊於表閭謇諤必陳豈可同夫先俊觀其悠揚廣衝旖旎從風諒賢愚以咸覿固朝野而必同式委垂而下俯埃乍直指而上映晴空過之而凜然生敬仰止而卓爾在中苟厥志之有立當其誠以遂通俾其不進不止豈徒自西自東已哉俟爾貞烈自非虛設既異詩人之干旄非同叔孫之帛丿糸蕞匪善奚取惟賢是謁彼謗木焉得而比矣諫鼓胡可而儔之苟匡救之惟徵我無爾詐而旌別之有制爾無我欺則賢既樂只人將率俾不獨翻曉日以搖搖獵輕風而靡靡至仁斯被至化為淳何必改舊然後為新矯前王之令德酌古典之攸遵雖謨訓以克備尚芻蕘之是詢萬國欽風巖廊盡英髦之士百蠻向化版築無屠釣之人故知至德在於求賢救世資乎擇善則設旌之道也為皇王之盛典元和甲午歲有夫人崔氏粵華宗令人德門賢婦以首秋再旬旬外五日終于東都正俗里之私第享年六十九嗚呼母儀厚德婦道宏訓令問如在誰其嗣之夫人諱績號尊德性博陵安平人也東漢魏晉延燿不息迨至本朝宜昌而熾曾大父通許州司馬王父知愻祕書丞贈國子祭酒父倫代宗朝以前御史中丞使吐蕃拜尚書左丞歿諡敬公伯曰譚左司郎中伯曰榮右補闕叔曰殷衡州刺史而皆以禮自持用榮為誡善慶所及夫人益光夫人即敬公之季女也年十有一歸于范陽盧公惟公人倫碩德冠冕良材往踐王畿滯登臺閣器業尤重紀綱洛川貞元已卯先夫人而屈於命夫人晝哭捐軀未忘誓志無違撫育不易慈仁剋已成家樹立餘業過此則修學大悲一切解脫夫人元昆衍德宗朝以御史大夫觀察宣歙池三州歿諡懿公夫人與公孝慈以類告終歲月十稔而同同氣之言於斯可驗矣夫人有男一人女二人女則組紃稟訓婉娩承華結褵從夫榮耀他族男曰從雅頃歲辟召制有成命參佐戎律換萬戶尉終養不虧十年向晦丁艱筮宅竊疚其懷初司錄府君先卜梓柏谷闕因而祔焉至是問從祔于蓍龜不剋問改祔于蓍龜襲吉君子曰傳無不之今則何遠乃歲十月六日奉夫人輤裧啟府君東北九里合防以虞陵谷順也嗣子謂從直忝懿公顧盻又備末姻尚戴恩光早詳勳閥託之琬玉貽厥彤人銘曰夫人之生榮耀勳華鳴環適人慶彼夫家姻族惠懷靡不稱嗟溫玉貞松保厥終始母儀婦道遺範已矣雪涕鮮原反覆孝子廣永泰中官大理寺評事夫氣激於喉中而濁謂之言激於舌端而清謂之嘯言之濁可以通人事達情性嘯之清可以滅鬼神致不死蓋出其言善千里應之出其嘯善萬靈受職斯古之學道者哉故太上老君授南極真人南極真人授廣成子廣成子授風后風后授務光務光授舜演之為琴以授禹自後或廢或續晉太行仙人孫公能以嘯得道而無所授阮嗣宗所得少分其後不復聞矣燧字洵美汝州郟城人大歷中為河陽三城使汴將李靈曜反燧擊破之遷河東節度使又以破田悅功加同中書門下平章事魏州大都督府長史兼魏博貝四州節度觀察招討使興元元年檢校司徒封北平郡王討平李懷光遷光祿大夫兼侍中與吐蕃盟平涼為蕃軍所劫奪兵柄守司徒貞元五年圖形凌烟閣十一年薨年七十贈太尉諡莊武興元元年八月某日河東保寧奉誠軍行營副元帥北平郡王燧檄告晉州要君廷珍隰州毛君朝敭慈州鄭君杭及將士吏等蓋聞率土莫非臣盍念在三之訓明王伐不敬有嚴討貳之刑義士不求生以害仁智者能轉禍而為福其畢棄咎咸與惟新國家幾葉繼明億年凝命天保以上采薇以下內撫外從濮鉛以北祝栗以南德洋風普神旌遞列窫窳咸誅堯治時雍猶有青邱之梗舜仁天幬未誅丹浦之凶李懷光奮渤海之俘授蒲津之節始謂狙詐之足使不虞鷹犬之易颺犇命醴泉粗展勤王之績請朝行闕輒衷犯上之謀猶念前勳屢縻好爵張萌芽於霜雹悖木水之本原升鸞之謀肆行巢父之使弗返奮二軍而殲良將剽三老而翦近畿豕心莫悛鴞音不革已復漢京之日月載揚周旅之雷霆幕府承命齊壇建牙列鎮正正之旗堂堂之陳莫我敢承赫赫厥聲濯濯厥靈有征無戰渾侍中率同陝之士韓僕射統邠寧之師唐節度虎視鄜坊駱將軍熊跱鎮國風雲助氣草木為兵詔參伐以清氛命招旌而繕怒不竢前茅之遏坐成獨柳之誅惟爾三州之士夫夙被累朝之德澤嶠從處仲適受逆汙遵事隗囂豈為賊守鼎魚假息穴兔阽危犯大義者眾必攜作不善者神弗赦歷數古今所記未聞叛逆獲全惟岳阻兵汔膏齊斧朱泚竊號亦梟藳街矧茲狄孥敢干天罰犬馬猶有主覆載不容鱷鯢取以封脅從罔治聖上禹湯罪已文武行仁凡鳴狐假王之妖首鼠觀釁之將莫不匿瑕宥戾磢垢滌汚雖三子猶存蓬艾之閒豈太陽不回葵藿之照尚式王命共惟帝臣勿相依於輔車以俱焚於玉石倘能洗心效順解甲來歸績獻關東疏封帶礪融全河右紀烈旂常若迷復怙終猶豫不斷蹈干顯戮諡為至愚豈惟敷虐多方亦將遺臭千載請擇二者永肩一心耆定爾功復見弓櫜而戈戢式化厥訓庶幾世變以風移檄到如章書不盡意訥字敦止第進士累遷中書舍人出為浙東觀察使貶朗州刺史召為河南尹凡三為華州刺史歷兵部尚書終太子太保門下彭城故壤南據長淮滑臺重鎮西疆巖邑建牙謀帥於是攸難合得全才式光並命義成軍節度使盧宏正識略圓明襟靈倜儻行有枝葉文耀菁華扣洪鐘而自韻宮商挺鋩刃而前無根節檢校左散騎常侍駙馬都尉韋讓機謀通敏誠性端和族茂簪纓望兼賢戚鄙籝金而必專詩禮挺玉質而不雜風塵並稟粹元精宜符景運或發聲文囿攘臂吏途休功流美於劇權理行推高於良翰經武著安人之略事君堅許國之心或早踐通班騰芳懿行職守交修于列寺出納無愧於有司操刀呈剸割之能馭黠有神明之稱徊翔中外迭振徽聲自予心膺茲閫寄總齊邦事節制王師朕以徐方一軍義勇素著帥臣無狀戎府不寧爾其便道持行著安闔境推誠宜先乎必信開懷以勗其後圖使軍城保晏開之安邑居絕夜吠之警然後昭宣號令折衷恩威務壯其猷以清厥憝將俾望風而理豈期朞月有成屬在新規注意彌切於戲訓戎撫俗節用厚生政苟有經人自知禁為邦之道豈易於斯並進秩於六官仍亞榮於三事往踐乃職爾惟戒哉可檢校戶部尚書工部尚書各兼節度使門下上黨古今之重地也束山東之襟要控河內之封壤擇我良帥屬在全才銀青光祿大夫袁王傅薛元賞性含宏厚智識圓方秉忠孝以立身參文武而為用早備器使雅聞公才誠明與人寬大懷物再尹京邑威名甚高寇攘之徒相視束手旋以長轂臨于彭城嚴而不苛通則有守移旆巨野益恢壯猷將材吏師首出藩服洎總牢盆之任頗多贍國之能薦分竹符理行居最常慕子文之道爰從賈誼之徽恬然自居物論歸重是用擢於傅導命以土田解長裾於戚藩樹高牙於戎閫爾宜貞厥師律劭其農功訓齊撫綏無墮前志右職分五兵之重南臺膺副相之榮謺處寵光俟乃成效門下洛水交波鄜城舊畤地當寇壘界接王畿外為襟帶之邦中有賦輿之實屬者黠羌未戢燔燧猶虞置將或乖征師向老思得頗牧付之邊疆擢吾材臣式昭奇策邠州刺史陳君從學啟玉鈴志昭甲令機符天與信愿生知浸染於勳伐之門奮發為英謀之士特稟雄氣魁然壯猷窮黃石之三編笑長沙之五餌久服戎旅益通武經遂升外臺俾守栒邑歌繻袴而苛慝不作提卒乘而障塞不驚而又累陳表章願展材効雖遵條共理仁風見重於朱轓而授脤分麾將星宜明於紫塞既申引扌叐寧繫班資爰思鼓鼙乃錫鈇鉞秉列部察廉之務佐兵車招討之名首戴附蟬之冠位長集烏之府總制師旅振揚軍聲往圖休庸勉答殊寵於戲玉關迢遞定遠收功先零猖狂營平善計建此勳者彼何人哉宜堅盡敵之心以固請纓之志無令直筆有愧前修李尚書夜登越城樓聞歌曰雁門山上雁初飛其聲激切召至曰去籍之妓盛小叢也汝歌何善乎曰小叢是黎園供奉南不嫌女甥也所唱之音乃不嫌之授也今老且廢矣時察院崔侍御自府幕而拜李公連夕餞崔君於鏡湖之光候亭屢命小叢歌餞在座各為賦一絕句贈送之亞相為之首唱崔下句云獨向柏臺為老吏皆曰侍御鳳閣中書即其程也何以老於柏臺眾請改之崔曰某但止於此任寧望九遷乎是年秋崔君鞫獄於譙中而終設位貞觀莫大於乾坤懸象著明孰踰于日月而世閒智識強推廣大之名繫表機深莫究窈冥之類是以法身利見無為之寂風偃化跡分軀不盡之靈雲李疑竺乾清淨之教始自他方菩薩慈悲之法聿行中土猶是元關幽鍵委積龍宮紺髮青眸光暉鴈塔驅八紘于忍域置萬物於仁寰非般若之蘊乎孰能臻于此也東林寺上坊舍利塔者有宋佛䭾跋佗羅禪師之所立也爾其一經地理接化鳥之南圖一緯天文承斗牛之北次崗巒出沒下積風雲洲島縈迴旁羅井邑割東林之淨壤揆西域之神模瀑水周軒鑪峯對霤丹楹翠栱標迴日月之宮寶綴珠櫳影出雲霓之路禪師先持舍利五粒隨身供養於是貯以石函藏之珍塔屬陳隋代謝陵谷貿遷雖入神之作而有扶助而必壞之相終從雕朽爰有沙門上座曇傑等柴桑盛緒蘭菃香名早悟三明深知二諦感禪師無生之業遠酌規模覩禪師莫泯之蹤願言興葺昔景龍之歲御史清河房光庭歎其荒毀盡留征士冖䂞蘇州司馬王弼紹其成績更脫僑裝鶖鷺肇于前鵷鴻嗣其後軒疏若舊藻繢惟新如鳥之甍入烟霄而重翥盤龍之桷得風雨而還飛復增舍利一十有四更以金銀鐵為棺槨同寶聚之爭分似珠囊之交映遊區果者覺地位之超昇覩光華者喜身心之快樂非聖圖之冥感何公緒之速成耶跋佗羅禪師者迦維羅衞國人漢言賢甘露梵王之苗裔少孤為外氏所養從祖鳩摩羅剎聞其聰異乃迎還度之年十七與同學業習眾皆一月賢一日覽焉其師曰賢一夫敵三十人也及受其戒國以禪律宗之禪師自西洎東數見神變允謂知變化之道者其知神之所為乎至長安常與鳩摩羅什剖析幽旨什每屈焉秦主姚興大弛末法禪師退藏於密猶嬰謗議乃拂衣東顧杖錫南騫益修無住之業即事遊方之化因指廬岳而慧遠法師在焉遠公以禪師名稱特高義諦攸出慶殊鄰之會面得營道之同心乃招入香庭中分蘭若規于塔後艹一友草而禪亦居不求安也宋武帝深加禮敬固請還都止道場寺先是沙門於于闐得華嚴前分三萬六千偈未有宣譯至是屈禪師會通華戎錯綜文義故道場寺至今有華嚴堂焉皇帝自躍至飛答中興之命先郊後岳修太平之舉步自開元今龍集攝提格七月丁丑朔二十八日甲辰凡一紀而有二載矣若夫鼓天下之動者存乎文辭傳不朽之跡者存乎事業此寺營建六代于茲求其刊勒兩碑而已遠法師高談色相欲求寂滅之源謝康樂初入妙微不書立言之意訥才非半古命不偶時頃自庫部郎中出為此州刺史剖符淹歲奉計臨歧傑師以琬玉圖文俯詢巴曲下走以蘭荃有興因奏楚辭駐楫抽毫乃為銘曰大道既隱兮世運陵遲法雄利見兮光啟導師曲阜以夜明為初日休屠以天際為末時七覺來晚三明樂推詮其不住之法唱以無緣之慈爰有上人挺生迦衞信美東土我違西裔遇澄什于關中披林遠于江澨密句不可以無說奉宣譯于瑤緘神物不可以終否寶光暉於銑函建神模于岝峉聳層臺于嶃嵒物壯期於必朽色空在于無滅其增舊也見白黑之彌綸其取新也有丹青之秀發惟精惟微兮等般若而無竭伉本魏州元城人徙京兆大歷初登五經秀才科授祕書郎建中四年又登博學三史科三遷尚書膳部員外郎歷給事中順宗立進兵部侍郎拜左散騎常侍元和四年卒年六十六贈禮部尚書應解補學生等國家崇儒本於勸學既居庠序宜在交修其有藝業不勤遊處非類樗蒲六博酗酒喧爭凌慢有司不修法度有一於此並請解退又有文章帖義不及格限頻經五年不堪申送者亦請解退其禮部所補學生到日亦請準格帖試然後給厨後每月一度試經年等第不進者停厨庶以止姦示其激勸又準格九年不及第者即出監訪聞比來多改名却入起今已後如有此類請送法司準式科處季登陽平寇氏人大歷六年進士累辟使府升朝為尚書郎終左諫議大夫大矣哉我唐之盛兮七葉重光襲文明以為德表武烈而稱皇于是行冬令稽舊章當清風之戒節建元律之司方時因展狩禮備肅將信不差于王道豈取樂于禽荒者哉若乃整鉤陳嚴羽衞星旄燭野雲旗拂曀周長楊而為阹屬甘泉以為綴騁六龍而電發顧雙兔而飇逝性毚狡而不恭足輕迅而靡制爰從聖射乃觀神藝鑾鑣卻轉引柘月而隨圓金鏃斜飛謺霜毫而俱斃既絕系而達臆亦洞胷而裂眥岐陽之美不獨稱于周王上林之雄未可論于漢帝觀夫歲聿暮時既冬采吉日詠車攻或備鮮于乾豆或薦芬于祖宗匪合圍而縱獲諒閱武而觀農且箭協陽爻兔唯陰獸柔而不犯信爾類之可全強以多猜信我網之不漏伊省括而一發紛應絃而雙仆所以彰聖武于無窮表靈誅于薄狩至如馳騕褭跨深密追捷蹤騰勁質飄勇氣于蒼昊抗稜威于白日激流電而指顧躡奔星而迅疾疊穿兮彼兔則雙舍拔兮我矢惟一足使百蠻膽喪萬人股慄遐哉邈乎不可談悉彼更嬴之絕藝蒲且之妙術曾何足以擬議焉于是殺氣肅英風扇信合美于三驅實挺奇于一箭然後迴雕輦御金殿或台階或歸鼎膳乃知我皇之盛德眇萬古之罕所聞見者也夏卿字雲客京兆萬年人大歷中賢良方正高等累遷吏部侍郎轉京兆尹太子賓客檢校工部尚書東都畱守辭疾改太子少保卒年六十四贈尚書左僕射諡曰獻自江之南號為水鄉日月掩藹陂湖蕩漾游有魚鼈翔有鳧鴈涉之或風波之懼望之多煙雲之思自朱方達于震澤三百里而遙惟毘陵地高林麓相望邱陵塠阜隱嶙蟬聯雖有崖㟧之形終無峻極之狀封域之內罕名山焉有唐良二千石獨孤公之莅是邦也人安俗阜三稔於茲文為宗師政號清靜有仁智山水之樂有風流遐曠之懷如獨鶴唳天孤雲出岫想見其人也公嘗言謝公東山亦非名岳苟林巒興遠邱壑意深則一拳之多數仞為廣矣由是於近郊傳舍之東得崇邱浚壑之地密林修竹森蔚其閒白雲丹霞照曜其上使登臨者能賞遊覽者忘歸我是以東山定號始於中峯之頂建茅茨焉出雲木之高標視湖山如屏障城市非遠幽聞鳥聲軒車每來靜見水色復有南池西館宛如方丈瀛洲秋發芰荷春生蘋藻晨光烱曜夕月澄虛信可以曠高士之襟懷發詩人之詠歌也自公之往清風寂寥野獸恒遊山禽咸萃不轉之石斯固勿伐之木惟喬而繼守數公實皆朝彥雖下車必理或周月而遷志在葺修時則未暇貞元八年余出守是邦迨今四載政成訟民用小康永懷前賢屢陟茲阜芟薈蘙而松桂出夷坎穴臼而溪谷通不改池臺惟雜風月東山之賞實中興哉於是加置四亭合為五所瞰野望山者位正背林面水者勢高籩斚區陳賓寮有位琴碁閒作簫管時聞從我之遊者咸遇其勝也嘗以水通舟檝陸阻車徒端徑術於通津翦樛蕪於迥野凡五六里抵于亭之南植山松以作門樹官柳以界道蟠旄麾於原上騁騏驥於途中又有塞門隴坂之意也懿乎創物垂名俾傳來者登山臨水每想古人亦何謝石門林泉峴首風景而已矣為文斵石于彼山阿時貞元十一年歲在乙亥九月九日記洪維哲人含道研幾大方不器正得思惟磅礡山立危昂鳳姿耽耽廣厦浩浩澄陂元化及物聖主為時嘉猷式贊密誥是司十餘年閒造膝詭辭顯仁藏用孰得而知天地有公輔相其宜綜綱清轄揭禮高闈貂蟬峩峩親侍玉墀帝思其人則曰汝為乃齊九賦乃張四維清濁是分集於靈龜祈祈名士天下觀頤正直摧剛誠明滅私孰云強禦視若嬰兒量人氣折觸角用羸因智圖難尹正邦畿無念鰥寡克宣明夷尼父有言栽者培之於赫斗樞迭為官師重光疊耀近古攸希分政於東宏訓保方俟元宰聿來膺斯嗚呼不淑棟幹其萎神昧於仁胡可度思寵贈端右恩覃澤垂元宇深邃龍光逶迤德音孔昭視我豐碑
