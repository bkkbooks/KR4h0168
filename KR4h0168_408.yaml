front:
  text: 全唐文欽定全唐文卷四百八綬元宗時擢書判拔萃科
  hash: sha256:2dfbfefba10d04256a273bb7d3dc953b31490f3ac4728b9c1c1d18afaa5cb313
  markers:
  - {type: head, offset: 12, content: 張綬, id: KR4h0168_NFKB_408-h1, level: 1}
body:
  text: 我將我享惟羊惟牛籩豆牲牢非無升降大夫命士亦有等威經禮孔明宗祀無替永言特牲之饋實曰宗人之職筮尸筮日以崇賓主之儀東序東房克明兄弟之位况舉鼎告備雖符將禮執畢先入未或夭夭心儀既南面以當階又尊主而備失其動也中伊糾胡為適明贊者無稽更彰博士同惡周旋既無失墜小言則亦何傷造次曾靡夭夭心違知和豈能為貴懵其禮物博士不利於操刀正以刑書科者乃得其資斧既厚誣於君子亦淺之為丈夫將子甘心無或騰口系元宗時擢書判拔萃科祭者曰薦申其至誠鬼之言歸於以明德欲祠祖禰必擇牲牷苟爾儀之不修則其咎而焉往孟壬三命是服匪懈四時既無忝於孝孫將有事於皇祖宿尸致祝初設位於廟中執豆陳籩終展禮於堂上相彼祀事居然可觀饋以少牢俾申於孝享用其柔日願接於神明周旋自適於等威終始不忘於齋敬執畢而入信鄒人之知禮卒事無規奚贊者之妄告徒質疑於博士合書罪於斯人澮元宗時擢書判拔萃科凡制農田是分地職家給百畝夫當一廛矧伊所由慎乃厥事善相邱陵坂險能均地邑人居使一易之田加之以二再易之地增之以三蓋居塉土者勞則宅沃土者逸將更耕以獲利與不易而方齊故俗阜時康以廣數圻之外家給人足寧嗟十畝之間曠土既無代田是匹欲科之罪其善有詞因元宗時擢書判拔萃科甲手揮五色已臨科斗之書躬寫六經方寘麒麟之閣而論其日課將貽秋典且羲和之晷遲速有殊簡牘之差短長非等理宜課以畏愛之景辨以功庸之效先則窮其狀跡然後寘以刑科何乃厚誣仍令薄訴須緘滕口之訟方入噬膚之獄埏埴成器蓋資虛受之功役使為臣同稟最靈之德他人毀棄緡鏹之直合酬營魄消淪埋瘞之義無隔甲行負甕雖有類於戴盆景畜家童惰有虧於物議方漢陰之抱汲初未忘機等蜀郡之裁書唯資力使既而途遘卒遇瓦解無全命迫力殫舟藏共遠不忘情於毀甑乙合償其錐刀方念舊於敝帷景須施其薪轊已虧讓行之美更彰速朽之尤折其片言勒陪半價辭名丹籍委骨滄流死埋應切生情實爽既違掩骼之典宜從束矢之科守納元宗時擢書判拔萃科索和至孝居家貧寠因心則烏鳥翺翔敝服則懸鶉碎羽立錐無地門挂陳平之席至誠動天庭列孟宗之筍五芝繁茂氣雜仙靈四壁森羅隙流頹日遂得元穹降祉紅粟呈祥不資南畝之勤自有西籬之錫諒貞符所降為純孝之精欲以表斯孰能若此鄉人庸謬妄相詆訐不違劉殷之德須遵呂侯之典禧元宗時擢書判拔萃科農之制地征不過籍德將見優賞莫為稅伊甲也之介福承賢者之餘慶樹勳公家列爵王冊既未封於列土方受賜於加田爰及後昆克奉先業責其征稅徒稱聚斂之臣守以莫從是謂博通之士請依周典無撓戴經術元宗時擢書判拔萃科凉以作法弊尚或貪謀之不臧事將奚適丙桐珪荷寵茅土分榮既稱孤之是崇在養人之為政不有如傷之視遽興厚斂之文且井屋既殊收稅有數人或不足君何取諸苟縱欲之斯行紅粟多積豈堪命之能久黔首何安敢請焚書將以和衆遂命持斧以問剖符縱非入已之科須當擅賦之責休賢元宗時擢書判拔萃科天道非遠人情難測俯察仰觀知來藏往顧惟所習頗曰常途取則四時識乘蛇之度數明諸六歷辨迴蟻之循環習洛閎之平生得陵渠之志事既知休咎同入精微攻乎異端自貽伊慼必若門傳良冶亦觀過而知仁如其職異靈臺乃欽哉而難卹劾為妖妄何太忽諸引以天文未聞其可自求元宗時擢書判拔萃科囟一火所用地邑人居必參相得勸功樂事然後相親不易之田畝百而尚逸再易之地倍三而猶倦漆林之征輕重是舛園鄽之稅等差斯別欲均沃塉必資改更故載芟載柞澤澤其耕不稂不莠芃芃其稼且輕囟一火用犬彊木用蕡在禮經而可遵於憲章乎何有禹貢成賦標乎上中之宜周籍立規備設牛鹿之制况明君為政動植以安田祖有神螟螣不作科之屠罪恐涉流言寧益國以利時豈棄人而愛犬食舊德能保全而不忤田有禽利執言而無咎小狐汔濟未出險中即鹿無虞往而見恡刑云不濫君子盡心有孚匪終渙汗何惕自勤天寶中官秘書監十二年自水部員外郎出為括州刺史無德而稱者則其稱不朽無形而用者則其用不窮若乃質混沌氣鴻濛生天地之始匝天地之中不可知詰其名曰空夫空也者迎之不見其首隨之不見其後聽之不聞搏之不有舒之則遠彌六合攬之則不盈一手體無涯以為大物有來而必受徒意其湛爾無營飄然至輕向遙山而似畫對澄浦而同清大而觀之則漭漫兮類元胎之貌審而察之則眇漠兮凝至道之精故老氏曰有物混成先天地生寂兮寥兮孰能為其損益不皦不昧安可議其幽明利萬物有含容之德包二儀有覆載之名草木資空以長茂日月乘空以運行霜鴈雲鵬非空無以矯其翼喬鸎幽鳥非空無以習其聲夫天之無言不能去蒼蒼之象風之無聲不能閟蕭蕭之響陰陽者氣猶不免於推遷躔次雖高亦未離於測想豈若窅兮冥兮吾則不知其靈浩兮蕩兮吾則不知其廣含大化以虛無起神功而惚恍善計者無所用其籌策善觀者無以勞其俯仰故能象帝之先元之又元以無有入無間引微明於纎隟混餘碧於長天隨時小大應物周旋處覆盆而俱暗引測管而同圓入枝間而帶影通野外以含烟或高深放曠或委曲連綿雖可名而可道終默然而澹然則有閑居至人宴坐開士黜聰明而反聽閉戶庭而隱几既而諦想㣥物深觀至理窮未來寂滅之端探過去混元之始見衆生生而不失大化化而無已知有為盡於無形化萬物歸於一指然後色空皆泯驗先覺於輪王物我俱齊得真筌於莊子已矣哉杳杳茫茫地久天長非色非相不存不亡故知大象無形去文質而成體至恒不變混今古以為常然則無施不適應用無方作器以虛中為貴接賢以虛左為良亦有譚國大夫嗟已空於杼軸倡樓孤妾怨難守於空牀當今四海會同㣥方清晏邦國有不空之歌太史絕三空之諫獨有文章游子書劍沈淪出門以虛舟遇物入室以虛白全真生也數奇每有書空之歎長而樂道猶在屢空之貧惜揚名之未達恨干祿之無津敢作課虛之頌用投虛受之人察天寶時擢書判拔萃科底祿任人惟賢是務居位稱職無私乃可况爰設天官俾司衡鏡審輪轅之目每得山公表清通之心更推裴楷固不失士將無棄才何必咨爾公卿獲我髦彥雖鄉舉里選則有附於曩時而操柄執權諒難廢於今日且如知人匪易絕私尤難前王以之則哲五倫猶是自疑家官必擇夫至公庶流自息其貪競議乎經久曷可因循愚謂上封未協中道宥天寶時擢書判拔萃科八卦六爻是生書籍龜文鳥跡遂成模楷開汲郡之冢升魯國之堂遂獲遺編因多墜簡惟甲婆娑王府掌握銀鉤取類筆耕能成墨妙棄其晷刻差以毫釐計功雖訴其短長類紙難逃其簡牘必也時無所廢理實可憑須旌不匱之勤寧窒有孚之訟陵陽天寶時擢書判拔萃科國有燕禮式明慈惠之德政資和樂爰修歌舞之容所以崇仁厚之誠省威儀之節先王作則顧禮文而可徵君子守官瞻主掌而何闕且宗伯列位舊章不妄司弓設班周經未棄是以舞而習射抑有前聞用斯義而燕飲孰明其趣而乃帥茲國冑亂我王猷靜言越樽何以率職相師之道在眡瞭而何傷失禮之辜伊瞽矇之或忝樂師所罰雅符滅鼻之刑訴者無辭尚勞滕口之說徒有來臯之詔終貽獲戾之憂諲官京兆府員外參軍粵若稽古徵諸陳跡雖年移代謝而損益昭然是以宋玉高唐之辭盛傳於南國曹王洛神之賦永播於東周莫不事載圖畫名標史冊河東之美者有妒水之祠焉其神周代之女介推之妹初文公出國介推從行有割股之恩無寸祿之惠誓將畢命肯顧微軀儀形飄殞於闕一字烟名跡庶幾於不朽後縱深悔前路難追因為滅焰之辰更號清明之節妹以兄涉要主身非令終遂於冬至之後日積一薪烈火焚之為其易俗諺云百日斫柴一日燒此之謂也闔境之內疇敢不恭順之則風雨應期違之則雷雹傷物兄則運心以求合我則處室以全真兄則禁火以示誠我則焚柴以見志惟兄及妹與世殊倫傳曰介之推終不言祿祿亦弗及渾天記曰著寒食者為助陽氣用厭火星所說不同互有得失其來遠矣安可闕如縱因事之宜亦自我作古祭法曰其有廢之莫敢舉也其有舉之莫敢廢也東北至土門之口西南踞磐石之山方圓百里別成一境天寶中以賊臣背化國步猶艱塗炭生靈焚燒甲第伊我遺廟巋然獨存簪裾迭叶於當時庭宇更新於往日性惟孤直虛見授於妒名行本堅貞實堪垂於仚範今幸邊塵不動海水無波蕞爾小戎曷足為患昔虞舜至聖尚有苗人之誅殷湯至明豈無葛伯之伐蓋以君為元首臣作股肱飄颻轅門藩屏王室乃命河東節度副大使兼工部尚書太原尹北京留守薩公諱兼訓警此禁闈公掌握衡鏡心韞韜鈐勢若轉規謀如泉湧運籌帷幄孫吳詎可比其能料敵戎旃衞霍不足方其妙浙江遺愛但羨還珠汾浦來蘇惟欣去獸申命我承天軍使節度副使前永平軍節度右廂兵馬使銀青光祿大夫試鴻臚卿同山南東道節度經略副使上柱國党公諱昇鎮茲巨防公天子忠臣元戎外志惟清而惟謹行不諂而不驕往任滑臺職居總統近歸本道位處專城投醪之義遠聞挾纊之情久著爰自至止星管再周路不拾遺人皆樂業長筵繼日士忘其勞細柳垂陰衆歌其美水碾成而永逸聚米難儔軍井達而常閒伏波不竭君依神以徼福神依君以庇躬事勢相因理亦條貫固宜書其已往播於將來貞石既磨斯文可作爾其泉湧祠下蓄為碧潭飛入大河噴成瀑布漰湱澩灂雜雷霆之聲盪雲沃日類風水之會經沍寒而氣蒸萬象處炎燠而清潤一川灌木扶疏引柔條而接影纎苗靃靡夾高岸而隨風自古及今非軍則縣未嘗不揆月撰日備其享禮春祈秋賽庶乎年登巫覡進而神之聽之官僚拜而或俯或仰既而坎坎伐鼓五音於是克諧峩峩側弁三軍以之相悅公之德也如此神之應也如彼且河北數州山西一道或衣以錦繡或奠以珍羞無晝夜而息焉豈翰墨之能諭咸以商者求之而獲利仕者禱之而累遷蠶者請之而廣收農者祈之而多稔不然則奚能遐邇奔湊奉其如在蓋聞有而不言謂之隱無而言之謂之諛又聞誇目者尚奢愜心者貴當承命述事敢不勉旃謹因退食之餘竊比陳其梗㮣也銘曰凡有異行宗之曰神匪害於物實利於人兄則禁火妹乃積薪共為佳節在乎芳春今古千齡方圓百里德音無斁烝嘗不已祭具珍羞服先錦綺所求必應高山仰止將軍塞下細柳營邊晴開朝鏡霧雜爐烟神理昭昭靈草芊芊紀諸令範光我承天井陘西南太原東北妒祠之水澹為黛色跳彼噴浪如有可則古往今來源流不忒興雲致雨侔造化力禺禺昂昂粵君之德或祈或禱永無休息神之歆之福善寧極光嗣天寶時擢書判拔萃科去聖久遠微言已絕求之淳儒存諸詁訓陳吳恢之青簡恐誤當時許蔡邕之丹書將傳後學况秘緯有府寫書置官傭計長功能歸典藝紙既殊於大小課罔齊於徐疾覽之繁文豈將鳥以觀跡率其大較乃非人之掣肘惟甲斯篆非罪勿籍昇之樂安人天寶時隱居商洛昇之白頃退居商洛入闕披陳山林獨往交親兩絕意有所問別日垂訪昇之五代祖仕梁為太常初任南陽王帳下於鐘山懸岸圯壙之中得古銘不言姓氏小篆文云龜言土蓍言水甸服黃鐘啟靈址瘞在三上庚墮遇七中已六千三百浹辰交二九重三四百圯文雖剝落仍且分明大雨之後纔墮而獲即梁武大同四年數日遇盂蘭大會從駕同泰寺錄示史官姚訾并諸學官詳議數月無能知者筐笥之內遺文尚在足下學乃天生而知計捨運籌而會前賢所不及近古所未聞願採其旨要會其歸趣著之遺簡以成先祖之志深所望焉樂安任昇之白欽悅天寶中官右補闕集賢直學士歷侍御史為李林甫所惡斥於外使至忽辱簡翰用浣襟懷不遺舊情俯見推訪又示以大同古銘前賢未達僕非遠識安敢輕言良增懷愧也屬在途路無所披求據鞍運思頗有所得發壙者未知誰氏之子卜宅者實為絕代之賢藏往知來有若指掌契終論始不差錙銖隗炤之豫識龔使無以過也不說葬者之歲月先知圯時之日辰以圯之日却求物兆事可知矣姚史官亦為當世達識復與諸儒詳之沈吟月餘竟不知其指趣豈止於是哉原卜者之意隱其事微其言當待僕為龔使耳不然何復見顧訪也謹稽諸歷術測以微詞試一探言庶會微旨當梁武帝大同四年歲次戊午言甸服者五百也黃鐘者十一也五百一十一年而圯從大同四年上求五百一十一年得漢光武帝建武四年戊子歲也三上庚三月上旬之庚也其年三月辛巳朔十日得庚寅是三月初葬於鍾山也七中巳乃七月戊午朔十二日得已巳是初圯墮之日是日巳巳可知矣浹辰十二也從建武四年三月至大同四年總六千三百一十二月每月一交故云六千三百浹辰交也二九為十八重三為六末言四百則六為千十八為萬可知從建武四年三月十日庚寅初葬至大同四年七月十二日巳巳初圯計一十八萬六千四百日故云二九重三四百圯也其所言者但說年月日數耳據年則五百一十一會於甸服黃鐘言月則六千三百一十二會於六千三百浹辰交論日則一十八萬六千四百會於二九重三四百圯從三上庚至於七中巳據歷計之無所差也所言年則日月但差一數則不相照會矣原卜者之意當待僕言之吾子之問契使然也從吏巳久藝業荒蕪古人之意復難遠測足下更詢能者時報焉使還不代鄭欽悅白均贈太師燕國公說子官戶部侍郎轉兵部開元二十六年坐累貶饒州刺史尋徵為戶部侍郎九載遷刑部尚書楊國忠用事引為大理卿受祿山偽命罪當大辟肅宗特恩免死長流合浦郡建中初贈太子少傅公諱某字某武威姑臧人也昔恭王之裔別封於管有夷吾者能霸桓公則平周辭上卿之禮適楚賤大夫之職以地命氏授於陰城新野之涼皆為著族貴則重族二后榮則一門四侯道則山紀神仙行則里題忠義建名崇德世有其人公高祖湘東內史鏗梁州之子屬詞比事天下宗之曾祖江州刺史通道館學士顥祖朝請大夫國子博士宏道考某官景明貽範清白纂烈文史累善所徵及公而盛公承禮樂之峻冑稟清明之異姿天生粹靈氣合真素下帷專思重席擅業至人藏用有道德之鄉君子為儒無榮辱之境尚東郭以自逸與南容之不廢調補陳州司倉徵其志也以為非足利時不容終秩遂優游初服述祖移年嘿志元言洞心清律常手操經籍耳練宮商澹有怡神坦無嬰慮是可忘機造化豈徒屑意公卿而已哉故德充以外形才全以內濟委懷從運與道無名尋拜命宜城公主府記室參軍退一隅而無悶進三府而交辟署宰長河曲資而往曰惠人無小吾所從之其至也去惡如救焚急賢如濟渴遇物風偃推心理裕平其志而異物不遷一其誠而萬情咸括清猷美績克存餘詠飛狐之地戎馬生郊俾公為蔚州別駕則惠化所存勇且知方肇建天人懋官靈器入為慶王友轉太子中允又拜國子司業邠王府長史或舉德以進或尚閑而退不失其正達識推高某年月日寢疾東都終於永豐第春秋七十有五惟公率心經於德義檢口絕於臧否秉禮樂而視正直蘊文藻而含清真可不謂才全而蹈道者歟位不兼濟惜也夫人范陽縣君張氏丞相燕公之妺元師妙德嬪風女師梁氏義輕於前志曹門克貽於後範府君之喪紀縗將縞晝哭成疾恐流年之易除慟累月而云逝沒而不朽者非禮節絕倫之謂乎春秋若干以某年月日合葬於龍門南陵原禮也公無子有二女咸以淑行著於通門喪葬克家感戚行路子壻吏部郎中吳興張珦度支員外郎隴西李愷永懷清冰緬託貞石庶乎時遷陵谷猶徵少女之詞道在宗親不昧諸姑之德大人為頌俾小子序焉仲犀元宗朝官比部員外郎出為華州刺史歷江陵長史荊南節度使昊昊皇天照臨下土皇天無私既父且母昭爾有德拯斯民苦彼饒者勣沒於長江幼女號愬激於穹蒼匪類伊蛟爰搆其殃上帝懷之雷霆交作火焚長川風擾巨壑烟雨冥晦雲龍騰搏邦人大恐水物殄瘁魚鱉蛟螭曾無噍類滅以湯瀾僨於江汜所貴者男所賤者女緹縈投身楊香搤虎古有其儔今得其侶純孝所感威靈動天善惡不激參於上元咨爾邑人感焉慎焉予忝令長聞之不書後之君子謂我何如爰樹貞石表其里閭無求天寶時官右補闕五帝殊功不相沿襲三王異制各有等衰故汙罇施太素之前合土漸澆漓之代乙雖非火正將效祝融未及漢陰之望遂作河濱之器俾夫炎上之德有益陶鈞濟物之功更成埏埴則宮室臺榭為利頗多送死事生於何不有跡雖反古事乃榮今無乖佐理之端妙合隨時之義况稱從朔將執禮經雖致薄言何傷厥理鍊京兆人元宗時進士第窮乎化源微之闕彼真理妙之本夫天宮寶幢特異諸相所以樹善除惡開愚解迷蓋帝釋之能崇敵修羅克勝之置也然則秦都綺甸神皋奧區有縣曰涇之陽鄉曰仙之圃圃有店曰六渠史稱延韓數年之命為秦萬世之利即此之謂矣矧此土惟沃壤俗阜英奇別有諄諄耆年兼諸信士為其殘兇尚梗負我國恩常以錢鎛之餘互相勸勉豈不能發大宏願上答休明爰立寶幢永資皇祚仗佛威力殲厥渠魁偉千載之傳芳傳我里之盛事可不美矣曰然於是命工人琢奇石集衆妙飾端儀俯長涇鎮逆旅突鄭渠之發地跨荊山以篲雲霞開於峭路之旁電繳於錦川之上震耀原隰草木增輝列大乘經文現彼寶相備陁羅尼教闕一字是虛無暴慢者聞之肅恭往來者覩而愕眙軒騎讀過歷險無驚樵夫誦行履危不懼猶是水中鱗甲遇影而生天郊外零霧因風而蕩盡則知聖教慈力廣大莫量若非正真孰能幽贊利物而已亦不可以識識不可以智知則善住天子迺能證歟於戲闕二字者多利闕一字者少曷此耆幼殊能達之曰有衆善寺大德沙門齊秀漢皇冑緒當代名僧衆皆揖之邀共集事又高行僧元朗以律傳聖教文接儒流端居招提與秀同舍雖不在位而能一心懿哉二公更著能事三年夏四月鍊頃自薊門纔歸舊國因花宮問道遇元朗上人或賦詩以相闕一字或開經而了義旋則摻袂涉冬又逢請著斯文素非述者銘曰高蟠金頂屹亭亭堅立不動干窈冥妙崇實相載寶經旁懸兔月挂鶉星跨山帶原靜郊坰生天鱗甲自花汀天長地久兮寒光轉青聖君壽福兮萬億千齡舒曲阜人天寶時制科登進士第原夫陰陽遞運日月分馳星紀之輪還或爽律呂之疏密難知迨皇王之有作命壺氏以緝規爰置水於刻漏載以火而守之則晦明之期可準興寢之候無差爾其高卑列級洪殺順理靈虯屹以俯開陰蟲矯以仰止上流注而不竭下吞挹而無已既泓澄而泉澹亦驚激而波起則良工之妙著焉睿哲之心見矣是用斟乾晷測時變視盈闕於金壺觀騰波於銀箭惟箭馳而壺減固流續而波荐筒列之數與運而無乖輝景之移閉戶而可見懿其節正斯代事沿往牒信古往而今來必用之而道叶罷衣裳之顛倒配皇極而調燮不假軒閣之鳳凰何用堯階之蓂莢別有希榮片玉庇影環林驅疾風之早厲知寒漏之已侵恐年華之不與更悄悄而傷心廣天寶時人人散久矣地廣大荒開都護之屯田闢天子之縣內且耕且戰歲取十千以餉農足食足兵武有七德以威敵殊管氏之見奪異周制之不頒且運屬中興人多復業惟桑與梓詩人興敬止之辭安土重遷縣司敦仁人之禮請從地著之業無俾流萍之歎公衡天寶時官戶部員外郎括蒼東南㳂惡麗二溪八十里有石門焉層巘中斷崔嵬雙崪排霄軼宇菡萏元氣自谷口澒洞珍木奇蔓森梢蔽虧欹崖側澗崩駮嶔駭厥有瀑水迥挂青蒼浩然風雷殷颯林壑噫靈造融結神功卓異是宜磅礡萬古偕並三才豈疏鑿道建之力預矣觀其驚噴垂逶匱陁淋漓明滅芬敷空濛靄昧飄颻衍颺綿冪縈紆蕭索淒清淅瀝璀璨因物變化與時推移故春夏為霧雨秋冬為霰雪陰為鬼神陽為蜺虹曙為煙雲夕為河漢屑為粉絮迸為珠璣曳為布練霏為綃縠斯亦為殊翫也而遊者涉獵談者鹵莽至於傳聞曾無髣髴遂使丹青可象不列於一顧之間勝賞非遙見遺於六合之外惜夫余偶踐絕境得窮佳致俯聆仰眺嗟歎徘徊乃命僮攜絙准度自上潭直瀉至天壁三百五十尺自天壁飛灑至下潭四百五十尺凡八百尺庶登覽者不昧於高深遲想者每憑於文字題諸巖側永寤區中云天寶甲午歲夏四月宇文顥莅山陰令是日鄉黃髮與胥徒洎衆趨事於琴堂之下禺以待命公乃從容言曰自大朴既散大道既隱我先王始議於理蓋得人而後有理失理而後及亂理之義其難乎不易方不變俗因弊施宜而已夫身違而心違心違而性違以至於夭官擾而吏擾吏擾而人擾以至於亂故繕性必先繕身心理人必先理官吏教之不明令長之過化之不率吏人之罪於是邑人聞之豪暴貪闕一字者肅焉而悛貧寠寡弱者熙焉而安故一年而成其佳政二年而號為樂土人吏樂安郊坰蓊鬱澄湖之上清風穆然茲所以承其聲懷其惠者相與如歸然後以順固闕一字以信齊一是以趣務舉滯猶驂之靳若冰之釋君子曰山陰之理得其由矣天下之政煩我政其靜天下之理外我理其中身和則心和心和則性和性和則氣和氣和則陰陽和然後感其氤氳志不離德不分官簡則吏簡吏簡則人簡人簡則物簡物簡則天地簡然後知其止足上不干下不黷和與簡政之本歟噫古之化吏人俱及其次更及其下俱不及自太公灌壇仲尼中都言偃武城至宓不齊巫馬期單父六百年間吏人猶及自西門豹史起鄴至魯恭中牟三百餘年吏人更及自魏晉宋齊梁周隋四百餘年吏人俱不及聖唐分職公復及之若磅礡而言普暢皆是則堯之屋不足封舜之刑不足用遷善遠罪何慮何思是理也其體宏哉石刻之以鑑來者竇公衡記棨元宗時官尚書郎余何為者也累忝臺郎思勤墳典用自修勵竊以國朝故事莫盛於開元天寶之際服膺簡策管窺王業參於聽聞或有闕焉承平之盛不可隕墜輒因簿領之暇搜求遺逸傳於必信名曰開天傳信記斗筲微器周鼎齊量不節之咎自巳致乎好事者觀其志寬其愚是其心也何方而有天上人間色空我性對爾空山傑天寶時人昔剖符媯川化洽殊俗授律遼海皇明益暢由是威名簡帝建旟此藩爰自下車率先明祀牲牢器弊网或不蠲若國有兵戎賈君於是告虔而㣥凶失險歲或暘旱賈君於是薦信則車迴甘澍無享不答有開必先非惟岳降生則孰能獨契其道若斯之妙故神以立政則不言而化神以施惠則日用不勤神以肅物則不怒而威神以察微則無幽不燭故我王是崇也而乾坤式宴庶績咸熙我賈父則之也比年用登物不疵癘故人非化不感感非神不深神明之道與賈父之政通矣謹桉王者往也既有歸往之德宜其有安天下之名故吾君崇其秩禮以答嘉休賈公載刊睿冊式旌不朽別駕馮公承相樂氣潛融清輝外朗探道得元元之旨屬詞盡詩人之興雖勢居熏灼不以材地驕人位高出刺能以謙卑自牧揚惠風以拯弊激清流以盪邪廣太邱之道則無所不容受鴻鍾之虛則有來皆應不空之頌斯焉取斯長史張公元瓚允迪厥猷匪懈於位佐上以直率下以寬不為利回不為義疚赫赫千里繄公是毗錄事參軍判司參軍等並材望孤標聲實兼茂官殊而各競於理事異而同歸於公百城作率亦庶僚之勸也安喜縣令等並砥節首公飭躬從政一德均化故四人不擾一心共理故千里謐清豈伊異闕一字衆宰君之助也戊子歲夏五月邦人勒美於碑之陰雖遷改不時而瞻誦有所懿彼來者勿替引之太真元宗時人昔曾待詔金門屬吾君耽道久之事寢歸與寧省竊服古訓見郭林宗傳曰貞不絕俗隱不違親賢哉斯文生人端格然恨甘旨不足每淪翮自咎及耿坐虛館凝神定靈夜分假寐如聞琴聲發越宛在左右寤而驚惋貴知音為難感鍾期善聽因賦是以廣意寂兮琴之德寥兮琴之聲德徹陰陽之奧聲涵淳粹之精體空洞響真清偉上皇之遺功超萬祀之垂名祗聞成連伯牙以傳曲忽覩師文子春而移情俟良知轉化靡忒鍾子期故有空山之谷清澗之湄幽人髣髴絕粒茹芝憑高梧引長颸激楚窈窕流波逶迤陽阿布濩結綠參差高秋風冷遠浦霜滋素月滿繁星稀雅調閑逸流風遠吹鍾期當日傾耳志之怡性愜靈中矩應規躊躇四顧侯其褘而曰聽商則知愁霖春零聞角乃覩韶華秋榮羽發則寒生朱夏徵來則暑移元英陵厲翕忽消息竭盈君子悅懌導心和平斯實庖丁投刃而節應郢人運斤而風生者也夫其高張絕絃韻清調苦惝恍惻惑一龍一虎猛將之逐虜冰雪操蘭蕙薰嶷兮崇山勁若寒雲烈士之諫君跂燕趙望江漢行路難杳無畔淋漓沸渭牢落泮渙遊子之悽斷徽未撫涕橫流悲宿昔心悠悠樵童牧豎登孤邱哀引南音一何楚囚興歌百里又喜子游應事態移體物聲愁或飛而不速或擁而不留愔愔泠泠窮微達幽一偶鍾生之聽妙極而不周於是夔襄愕眙昭曠咄咨音有至而乃發發當及乎此時乃理雲和寫咸池感天地動神祇元鶴鼓舞鳳凰來儀風雷並雲雨隨黃帝之所聽瑩伊代人疇敢以窺鍾子兀然收聽反視沈吟不已感樂之至精得音之微旨信音之難蓋由有此誠在聽之以心安可察之以耳嗟嗟琴韻盡美矣達者覩物而自識眷繩而象直白能受采知成用而可修樂匪在音遂執中而有得諒絲繩之為物類託質以自植幸操張以一伸任縱橫而取則故能貞而守正勁以全真含至和以不屈抱孤直以誰鄰若剛克以自致諒柔立而有因齊達人之履道比君子之修身久而莫渝豈紅紫之見奪勁而不撓非糾纆之為倫當其涗水初滋勢如未理女工爰作視其所以如積微於秒忽遂立質於經紀察其本同成經以自綸喻乎時表直道以如砥挂端標以有準持正色而為美將配德於清壺願齊名於直矢故能從繩作直因物寓詞苟一繩之可法將百行以為師義足仰而象矣理自中而得之直可自侔奚感鮑君之與色非我行徒興墨子之悲將勁挺而自守庶回邪而不欺俾夫取象師心必由斯道考朱絲之外物得素尚於中抱奚水鑑之足徵拒韋弦之是保觀夫正不與奸色儔勸吾人之聿修直不為虛聲枉俾吾人之取象故能名昭樂曲義暢人謨鄙在棼而不理賤為質以就汙願處微而就正終守直以不渝足以詭良材而轉雅操端循質而喻通途苟中正之可進願從繩而已乎眘虛江東人天寶時官夏縣令在心匪懈莅事克勤實曰司存惟其慎敬不率厥訓自貽伊戚瞻言乙者參名甲吏當恭爾職知闕鞏之重無廢所掌在組練之堅焉得曠官孰云從事且孔明輔相猶獨親於簿書彼乙微品何不知其名物請寘於理以懲不能秀范陽人官檀州刺史元聖立極俾人作乂博謀廣通以訪異能理歷明時用司氣候律生何者忝乎在職考銅渾而正氣吹玉管以飛灰變冷含暄當盡互物之妙娶妻生子庶探成器之功何得俶擾厥繇候張失數儻虧官紀必殄孟陬安可敬授人時是亦焉知天道永惟至理多昧彞途且官不易方士資守業唐都祕術莫繼菁華趙達能名空嗟已矣既乖七始之則須正九章之科朝越州人天寶時山陰尉夏分五等周開九命國庸人爵貽厥孫謀青土白茅將傳欒郤之室裘裳鍾鼎必襲金張之家丁既慶積山河用光家國不聞必復之業旋有逋逃之讓榮命不顧同顏闔之鑿坯遁跡方來共丁鴻之蹈海一去鄉縣幾變星霜冀疇庸之有主在是弟而可錄不謂政也無二法不容私終使長襲代封沮元成之宏義幼而時棄允張純之格言元穎天寶時進士倬彼垂象悠哉混元列泰階而有曜應洪化而無言歷歷映天連光於維斗昭昭初月接影於軒轅總而言之三台之號攸著詳而察也六符之驗斯存聖人有以仰觀於變其教彌敦今上握符正位出震居尊宮壼肅穆巖廊政分行其三無庶欽崇乎道德致其五至洵光被乎乾坤此上台所以曜而不昏也若乃山川降精卜夢斯并野無遺彥朝滿㣥英稷契夔龍詢謨乎三署龔黃卓魯鎮撫於百城上下以之和睦品物以之咸亨此中台所以炯然而明矣夫其㣥甿是賴一藝必精農無事而狎野仕有祿而代耕康衢之童久嫻於歌詠擊壤之老無謝於生成此下台所以皎爾而晶矣故能通燭寰瀛交泰天地信景爍兮物有序降休徵兮靈必至曷比夫兩曜合璧作祥瑞之一端五星連珠為太平之一致况其照耀熠熠其精純粹分輝既象於六爻比影復侔於三事盛其德而高其色通乎微而洞其祕大易所謂自天祐之吉無不利者也乃作歌曰君臣穆兮純化清玉衡正兮泰階平嘉歷數兮無極配乾坤兮永貞向天寶時官太子尉諸罰有權政以經邦揆務刑以禁暴去邪先王論於股肱大易明其噬嗑故賢能必佐小大以情立綱紀於天官作規模於秋典其來尚矣難可忽諸才有所通或徵諸管庫法有明象乃著自星辰所以掌故備員擇先文而後學刑法俱赦執有權而適輕蓋晁錯惟勤昔聞其任呂刑高議已盡其能興訟者何秩既下於百石折中者理條不紊於三千必也口無擇言身無擇行誦先王之典誥有夫子之文章自合昇之司徒而曰俊士建功於當代垂裕於後昆未聞鳴鶴聞天而乃嚇鴟從事誠宜改革徒以盈庭息乃訟端寢乎功令如有倫有要不夭夭心不忒定國之慶溢高門蕭何之約在關中雖并刑不上亦片言可折省之可罰甲也有詞法貴從寬難明與罪
