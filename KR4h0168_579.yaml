front:
  text: 全唐文欽定全唐文卷五百七十九柳宗元十一
  hash: sha256:b79b33b4e975e37f8bfde0e37f0f03f84900a9626f0880ec12de3f1bcd0aff15
body:
  text: 儒有蓬戶甕牖而自立者河間淩士燮窮討六籍皆有著述而尤邃春秋為儒官守道端莊植志不回在京師十二年家本吳也欲歸而不可得遂構蓬室以備揖讓之位棟宇簡易僅除風雨蓋大江之南其舊俗也由是不出環堵坐入吳甸包山震澤若在牖外所謂求仁而得斯固然歟與夫南音越吟慕望而不獲者異日道也夫厚人倫懷舊俗固六義之本㣥公是以有發德之什書在屋壁予敘而引之春秋時晉有叔向者垂聲邁烈顯白當世而其兄銅鞮伯華匿德藏光退居保和士大夫其不與叔向遊者罕知伯華矣然仲尼稱叔向曰遺直由義又稱伯華曰多聞內植進退兩尊榮於策書故羊舌氏之美至於今不廢宗元常與韓安平遇於上京追用古道交於今世以是知吾兄矣兄字茂實敦朴而知變宏和而守節溫淳重厚與直道為伍嘗又著書言禮家之事條綜古今大備制量遺名居實澹泊如也他日當為達者稱焉在吾儕乎則韓氏之美亦將焜耀於後矣今將浮游淮湖觀藝諸侯凡知兄者咸出祖於外天水趙佶秉翰序事殷勤宣備詞旨甚當予謂春秋之道或始事或終義大易之制序卦處末然則後序之設不為非經也於是編其餞詩若干篇紀於末簡以貺行李遂抗手而別僕未冠求進士聞婁君名甚熟其所為歌詩傳詠都中通數經及㣥書當時為文章若崔比部于衞尉相與稱其文眾皆曰納言曾孫也而又有是咸推讓為先登後十餘年僕自尚書郎謫來零陵覯婁君猶為白衣居無室宇出無僮御僕深異而訊之乃曰今夫取科者交貴勢倚親戚合則插羽翮生風濤沛焉而有餘吾無有也不則饜飲食馳堅良以歡於朋徒相貿為資相易為名有不諾者以氣排之吾無有也不則多筋力善造請朝夕屈折於恆人之前走高門邀大車矯笑而偽言卑陬而姁媮偷一旦之容以售其技吾無有也自度卒不能堪其勞故舍之而遊逾湖江出豫章至南海復由桂而下也少好道士言餌藥為壽未盡其術故行且求之僕聞而愈疑往時觀得進士者不必若婁君之言又少能類婁君之文學又無納言之大德以為之祖無比部衞尉以為之知而升名者百數十人今婁君非不足也顧不樂而遁耳因為予畱三年他日又曰吾所以求於心者未克今其行也予既異其遁於名而又德其久畱於我也故為之言夫君子之出以行其道也其處以獨善其身也今天下理平主上亟下求士之詔婁君智可以任職用事文可以宣風歌德行於世必有合其道而進薦之者遽而為處士吾以為非時將曰老而就休耶則甚少且銳羸而自養耶則甚碩且武問其所以處咸無名焉若苟焉以圖壽為道又非吾之所謂道也夫形軀之寓於土非吾能私之幸而好求堯舜孔子之志唯恐不得幸而遇行堯舜孔子之道唯恐不慊若是而壽可也求之而得行之而慊雖夭其誰悲今將以呼噓為食咀嚼為神無事為閒不死為生則深山之木石大澤之龜蛇皆老而久其於道何如也僕嘗學於儒持之不得以陷於是以出則窮以處則乖其不宜言道也審矣以吾子見私於僕而又重其去故竊言而書之而密授焉世之學易者率不能窮究師說本承孔氏而妄意乎物表爭伉乎理外務新以為名縱辯以為高離其原振其末故羲文周孔之奧詆冒混亂人罕由而通焉不違古師以入道妙若宏農楊君者其鮮矣御史中丞崔公博而守儒達而好禮故楊君之來也館於燕堂饋之侯食日命合邦之學者論說辯問貫穿上下揮散而咸同幽昏而大明言若誕而不乖於聖理若肆而不失其正不為他奇以立名氏姑務達其旨而已古人謂駕孔子之說者楊君固其徒歟宗元以為太學立儒官傳儒業宜求專而通新而一者以為冑子師昔嘗遊焉而未得其人今天下外多賢連帥方伯朝廷立槐棘之下皆用儒先而楊君之道未列於博士則誰咎歟無乃隱其聲含其美以自窮歟夫以退讓自窮於豐富之世以貽有位者羞是習易之說而廢其道也於將行而問以言敢以變君之志讀詩禮春秋莫能言說其容貌充充然而聲名不聞傳於世豈天下廣大多儒而使然歟將晦其說諱其讀不使世得聞傳其名歟抑處於遠仕於遠不與通都大邑豪傑角其技而至於是歟不然無顯者為之倡以振動其聲歟今之世不能多儒可以葢生者觀生亦非晦其說諱其讀者然則餘二者為之決矣生北遊必至通都大邑通都大邑必有顯者由是其果聞傳於世歟苟聞傳必得位得位而以詩禮春秋之道施於事及於物思不負孔子之筆舌能如是然後可以為儒儒可以說讀為哉交州多南金珠璣瑁象犀其產皆奇怪至於草木亦殊異吾嘗怪陽德之炳耀獨發於紛葩王褱麗而罕鍾乎人今廖生剛健重厚孝悌信讓以質乎中而文乎外為唐詩有大雅之道夫固鍾於陽德者耶是世之所罕也今之世恆人其於紛葩王褱麗則凡知貴之矣其亦有貴廖生者耶果能是則吾不謂之恆人也實亦世之所罕也太史公嘗言世之學孔氏者則黜老子學老子者則黜孔子道不同不相為謀予觀老子亦孔氏之異流也不得以相抗又况楊墨申商刑名縱橫之說其迭相訾毀抵捂而不合者可勝言耶然皆有以佐世太史公沒其後有釋氏固學者之所怪駭舛逆其尤者也今有河南元生者其人閎曠而質直物無以挫其志其為學恢博而貫統數無以躓其道悉取向之所以異者通而同之搜擇融液與道大適咸伸其所長而黜其奇衺要之與孔子同道皆有以會其趣而其器足以守之其氣足以行之不以其道求合於世常有意乎古之守雌者及至是邦以予道窮多憂而嘗好斯文畱三旬有六日陳其大方勤以為諭予始得其為人今又將去予而南歷營道觀九疑下灕水窮南越以臨大海則吾未知其還也黃鵠一去青冥無極安得不馮豐隆愬蜚廉以寄聲於寥廓耶傳所謂學以為己者是果有其人乎吾長京師三十三年遊鄉黨入太學取禮部吏部科校集賢祕書出入去來凡所與言無非學者蓋不啻百數然而莫知所謂學而為己者及見逐於尚書居永州刺柳州所見學者益稀少常以為今之世無是決也居數月長樂賈景伯來與之言邃於經書博取諸史㣥子昔之為文章者畢貫統言未嘗詖行未嘗怪其居室愔然不欲出門其見人侃侃而肅召之仕怏然不喜導之還中國視其意夷夏若均莫取其是非曰姑為道而已爾若然者其實為已乎非己乎使吾取乎今之世賈君果其人乎其足也則居其匱也則行行不苟之居不苟容以是之於今世其果逃於匱乎吾名逐祿貶言見疵於世奈賈君何於其之也即其舟與之酒侑之以歌歌曰充乎巳之居或躓其塗匱乎己之虛或盈其廬孰匱孰充為泰為窮君子烏乎取以寧其躬若君者之於道而已爾世孰知其從容者耶代之游民學文章不能秀發者則假浮屠之形以為高其學浮屠不能愿愨者則又託文章之流以為放以故為文章浮屠率皆縱誕亂雜世亦寬而不誅今有方及師者獨不然處其伍介然不踰節交於物沖然不苟狎遇達士述作手輒繕錄復習而不懈行其法不以自怠至於踐青折萌汎席灌手雖小教戒未嘗肆其心是故異夫假託為者也薛道州劉連州文儒之擇也館焉而備其敬歌焉而致其辭夫豈貸而濫歟予用是得不繫其說以告於他好事者昔之桑門上首好與賢士大夫游晉宋以來有道林道安遠法師休上人其所與遊則謝安石王逸少習鑿齒謝靈運鮑昭之徒皆時之選由是真乘法印與儒典並用而人知嚮方今有釋文暢者道源生知善根宿植深嗜法語忘甘露之味服道江表蓋三十年謂王城雄都宜有大士遂躡虛而西驅錫逾紀而秦人蒙利者益眾雲代之間有靈山焉與竺乾鷲嶺角立相望而往解脫者去來回復如在步武則勤求祕寶作禮大聖非此地莫可故又捨筏西土振塵朔陲將欲與文殊不二之會脫去穢累超詣覺路吾徒不得而畱也天官顧公夏官韓公廷尉鄭公吏部郎中楊公有安石之德逸少之高鑿齒之才皆厚於上人而襲其道風佇立瞻望懼往而不返也吾輩常希靈運明遠之文雅故詩而序之又從而諭之曰今燕魏趙代之間天子分命重臣典司方岳辟用文儒之士以緣飾政令服勤聖人之教尊禮浮屠之事者比比有焉上人之往也將統合儒釋宣滌疑滯然後蔑衣祴之贈委財施之會不顧矣其來也盍亦徵其歌詩以焜耀逈躅偉長德璉之述作豈擅重千祀哉庶欲竊觀風之職而知鄭志耳或問宗元曰悉矣子之得於巽上人也其道果何如哉對曰吾自幼好佛求其道積三十年世之言者罕能通其說於零陵吾獨有得焉且佛之言吾不可得而聞之矣其存於世者獨遺其書不於其書而求之則無以得其言言且不可得况其意乎今是上人窮其書得其言諭其意推而大之逾萬言而不煩總而括之立片辭而不遺與夫世之析章句徵文字言至虛之極則蕩而失守辯㣥有之夥則泥而皆存者其不以遠乎以吾所聞知凡世之善言佛者於吳則惠誠師荊則海雲師楚之南則重巽師師之言存則佛之道不遠矣惠誠師已死今之言佛者加少其由儒而通者鄭中書洎孟常州中書見上人執經而師受且曰於中道吾得以益達常州之言曰從佛法生得佛法分皆以師友命之今連帥中丞公具舟來迎飾館而俟欲其道之行於遠也夫豈徒然哉以中丞公之直清嚴重中書之辯博常州之敏達且猶宗重其道况若吾之昧昧者乎夫眾人之和由大人之倡洞庭之南竟南海其士一作土汪汪也求道者多半天下一唱而大行於遠者是行有之則和焉者將若㣥蟄之有雷不可止也於是書以為巽上人赴中丞叔父召序儒者韓退之與予善嘗病予嗜浮屠言訾予與浮屠游近隴西李生礎自東都來退之又寓書罪予且曰見送元生序不斥浮屠浮屠誠有不可斥者往往與易論語合誠樂之其於性情奭然不與孔子異道退之好儒未能過楊子楊子之書於莊墨申韓皆有取焉浮屠者反不及莊墨申韓之怪僻險賊耶曰以其夷也果不信道而斥焉以夷則將友惡來盜跖而賤季札由余乎非所謂去名求實者矣吾之所取者與易論語合雖聖人復生不可得而斥也退之所罪者其跡也曰矒而緇無夫婦父子不為耕農蠶桑而活乎人若是雖吾亦不樂也退之忿其外而遺其中是知石而不知韞玉也吾之所以嗜浮屠之言以此與其人遊者未必能通其言也且凡為其道者不愛官不爭能樂山水而嗜閒安者為多吾病世之逐逐者唯印組為務以相軋也則舍是其焉從吾之好與浮屠遊以此今浩初閒其性安其情讀其書通易論語唯山水之樂有文而文之又父子咸為其道以養而居泊焉而無求則其賢於為莊墨申韓之言而逐逐然唯印組為務以相軋者其亦遠矣李生礎與浩初又善今之往也以吾言示之因此人寓退之視何如也中山劉禹錫明信人也不知人之實未嘗言言未嘗不讎元暠師居武陵有年數矣與劉遊久且暱持其詩與引而來予視之申申其言勤勤其思其為知而言也信矣予觀世之為釋者或不知其道則去孝以為達遺情以貴虛今元暠衣麤而食菲病心而墨貌以其先人之葬未返其土無族屬以移其哀行求仁者以冀終其心勤而為逸遠而為近斯蓋釋之知道者歟釋之書有大報恩十篇咸言由孝而極其業世之蕩誕慢訑者雖為其道而好違其書於元暠師吾見其不違且與儒合也元暠陶氏子其上為通侯為高士為儒先資其儒故不敢忘孝跡其高故為釋承其侯故能與達者遊其來而從吾也觀其為人益見劉之明且信故又與之言重敘其事佛之跡去乎世久矣其畱而存者佛之言也言之著者為經翼而成之者為論其流而來者百不能一焉然而其道則備矣法之至莫尚乎般若經之大莫極乎湼槃世之上士將欲由是以入者非取乎經論則悖矣而今之言禪者有流盪舛誤迭相師用妄取空語而脫略方便顛倒真實以陷乎已而又陷乎人又有能言體而不及用者不知二者之不可斯須離也離之外矣是世之所大患也吾琛則不然觀經得般若之義讀論悅三觀之理晝夜服習而身行之有來求者則為講說從而化者皆知佛之為大法之為廣菩薩大士之為雄修而行者之為空蕩而無者之為礙夫然則與夫增上慢者異矣異乎是而免斯名者吾無有也將以廣其道而被於遠故好遊自京師而來又南出乎桂林未知其極也吾病世之傲逸者嗜乎彼而不求乎此故為之言柳氏以文雅高於前代近歲頗乏其人百年間無為書命者登禮部科數年乃一人後學小童以文儒自業者又益寡今有文郁師者讀孔氏書為詩歌逾百篇其為有意乎文儒事矣又遯而之釋背笈篋懷筆牘挾海泝江獨行山水間翛翛然模狀物態搜伺隱隟登高遠望悽愴超忽遊其心以求勝語若有程督之者已則被緇艾茹蒿芹志終其身吾誠怪而譏焉對曰力不任奔競志不任煩挐苟以其所好行而求之而已爾終不可變化吾思當世以文儒取名聲為顯官入朝受憎媢訕黜摧伏不得守其土者十恆八九若師者其可訕而黜耶用是不復譏其行返退而自譏於其辤而去也則書以畀之佛之道大而多容凡有志乎物外而恥制於世者則思入焉故有貌而不心名而異行剛狷以離偶紆舒以縱獨其狀類不一而皆童髮毀服以遊於世其孰能知之今所謂元舉者其視瞻容體未必盡思跡佛而持詩句以來求予夫豈恥制於世而有志乎物外者耶夫道獨而跡狎則怨志遠而形羈則泥幽泉山山之幽也閒其志而由其道以遯而樂足以去二患捨是又何為耶既曰為予來故於其去不可以不告也金僊氏之道蓋本於孝敬而後積以眾德歸於空無其敷演教戒於中國者離為異門曰禪曰法曰律以誘掖迷濁世用宗奉其有修整觀行尊嚴法容以儀範於後學者以為持律之宗焉上人窮討祕義發明上乘奉威儀三千雖造次必備嘗以此道宣於江湖之人江湖之人悅其風而受其賜攀慈航望彼岸者蓋千百計天子聞之徵至闕下御大明祕殿以問焉導揚本教頗甚稱旨京師士眾方且翹然仰大雲之澤以植德本而上人不勝顧復之恩退懷省侍之禮懇迫上乞遂無以奪由是杖錫東顧振衣晨征右司員外郎劉公深明世典通達釋教與上人為方外遊始榮其至今惜其去於是合郎署之友詩以貺之退使孺子執簡而序之因繫其辭曰上人專於律行恆久彌固其儀刑後學者歟誨於生靈觸類蒙福其積眾德者歟覲於高堂視遠如邇其本孝敬者歟若然者是將心歸空無捨筏登地固何從而識之乎古之贈禮必以輕先重故鄭商之犒先乘韋魯侯之贈後吳鼎今餞詩之重皆眾吳鼎也故乘韋之比得序而先之且曰由禮而不敢讓焉買小邱一日鋤理二日洗滌遂置酒溪石上嚮之為記所謂牛馬之飲者離坐其背實觴而流之接取以飲乃置監史而令曰當飲者舉籌之十寸者三逆而投之能不洄於洑不止於坁不沈於底者過不飲而洄而止而沈者飲如籌之數既或投之則旋眩滑汨若舞若躍速者遲者去者住者眾皆據石注視歡抃以助其勢突然而逝乃得無事於是或一飲或再飲客有婁生圖南者其投之也一洄一止一沈獨三飲眾乃大笑驩甚予病痞不能食酒至是醉焉遂損益其令以窮日夜而不知歸吾聞昔之飲酒者有揖讓酬酢百拜以為禮者有叫號屢舞如沸如羹以為極者有裸裎袒裼以為達者有資絲竹金石之樂以為和者有以促數糺逖而為密者今則舉異是焉故捨百拜而禮無叫號而極不袒裼而達非金石而和去糺逖而密簡而同肆而恭衎衎而從容於以合山水之樂成君子之心宜也作序飲以貽後之人房生直溫與予二弟遊皆好學予病其確也思所以休息之者得木局隆其中而規焉其下方以直置棊二十有四貴者半賤者半貴曰上賤曰下咸自第一至十二下者二乃敵一用朱墨以別焉房於是取二毫如其第書之既而抵戲者二人則視其賤者而賤之貴者而貴之其使之擊觸也必先賤者不得巳而使貴者則皆慄焉惛焉亦鮮克以中其獲也得朱焉則若有餘得墨焉則若不足予諦睨之以思其始則皆類也房子一書之而輕重若是適近其手而先焉非能擇其善而朱之否而墨之也然而上焉而上下焉而下貴焉而貴賤焉而賤其易彼而敬此遂以遠焉然則若世之所以貴賤人者有異房之貴賤於茲棊者歟無亦近而先之耳其有果能擇其善否者歟其敬而易者亦從而動心矣有敢議其善否者歟其得於貴者有不氣揚而志蕩者歟其得於賤者有不貌慢而心肆者歟其所謂貴者有敢輕而使之擊觸者歟其所謂賤者有敢避其使之擊觸者歟彼朱而墨者相去千萬且不啻有敢以二敵其一者歟予墨者徒也觀其始與末有似棊者故敘
