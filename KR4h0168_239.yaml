front:
  text: 全唐文欽定全唐文卷二百三十九三思士彠孫以后族纍轉右衛將軍武后臨朝進夏官尚書封梁王證聖元年同鳳閣鸞臺三品神龍初進拜司空同中書門下三品固辭隨例降封靜德郡王尋拜左散騎常侍桓彥範等既誅二張薛季昶劉幽求勸并誅三思不從翌日三思因韋后潜入宮中反易國政彥範等皆斥去悉復武后法忌節愍太子謀廢之太子懼發羽林兵圍其第殺之既死中宗為舉哀贈太尉復封梁王諡曰宣睿宗立斫棺暴尸夷其墓
  hash: sha256:a9308efee392468426b11acdfb82445d578062a503d9be160923722dd895c5ee
