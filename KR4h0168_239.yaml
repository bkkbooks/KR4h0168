  - {type: head, offset: 14, content: 武三思, id: KR4h0168_NFKB_239-h1, level: 1}
body:
  text: 臣守節等文武官九品以上四千八百四十一人上言臣聞惟德動天必有非常之應惟神感貺允屬會昌之期天鑒孔明降休徵者所以宣天意神聰無昧效嘉祉者所以贊神功故黃鳥白麟載稱姬漢之日元圭黑玉式昭禹湯之代伏惟天冊金輪聖神皇帝陛下潤色丕業光赫寶祚執大象而御風雲鼓洪爐而運寒燠浹洽四海輝華六幽希代符來超今邁昔浪委波屬故合沓而無窮日臻月見尚殷勤而未巳伏見太史奏稱八月十九日夜有老人星見臣等謹按黃帝占云老人星一名壽星色黃明見則人主壽昌又按孫氏瑞應圖云王者承天則老人星臨其國又春秋分懸象文曜鏡云王者安靜則老人星見當以秋分之懸象著符于上人事發明于下壽昌者知億載之有歸安靜者示萬邦之必附澄霞助月非唯石氏之占散翼垂芒何獨斗樞之說臣等謬參纓笏叨目禎祥慶抃之忱實倍殊品無任踴躍之至臣聞乾坤大象也張三光而列五嶽帝皇大寶也朝萬國而禮百神然則歷考河圖傍稽洛讖乘樞建極闕三十一字地羲農軒頊氏往堯舜禹湯氏作邦畿則千八百國封禪則七十二君唯臨日觀之岫才越天齊之嶺闕三十二字三花玉樹遙分神女之臺五方金芝下秀仙人之窟仰通上帝之境俯枕中樞之甸風烟萬載徵薦鰈而闕三十一字昌之日可以召玉帛可以勒銀繩建顯號而施尊名飛英聲而騰茂實其唯我大周乎祖闕三十字興王之祕籙運鵬海而首出躍龍泉而高視卷舒元氣分寶位於元宮登步大階受珍圖於黃屋均兩曜而闕三十字天冊金輪聖神皇帝陛下徇齊作后聰明為辟心懸萬月從鴈塔而乘時足馭千花自龍宮而應運垂大闕三十一字位祥龜負字懸符啓夏之徵瑞馬呈圖豫送開虞之兆豈獨天浮紫氣知赤帝之將興地映紅闕一字表朱宣之闕三十字之因葉聚祥經誰識去來之果延妙相於丹扆降法身於紫極湛然常樂輪風銷八柱之天寂爾圜明劍雨闕三十字踊懸石鏡於丹霄聖水潛開湛珠泉於碧漢澄漪寫月非關竹箭之流迥岫排雲何止蓮花之闕一字遐循闕三十二字至德掩於百代宏猷超於萬葉謳歌纂籙考符瑞於堯終獄訟膺期送休徵於舜禪八窗四達之制五室九闕三十字宮非待子輿之議懸寶思而不測運靈襟而獨遠雕楹峻峙若鼇柱之臨空反宇中垂似鵬雲之映闕三十二字紺席於雞津開紫壇於龜浦蒼龍曉闢鈎陳迥雙闕之前翠鳳晨張玉輦下三川之上山分虎據指曰闕三十二字之野開玉帷而鈐士命金壇而拜將營分水月烟消彭蠡之濱陳起山虹霧廓洞庭之野三監縱慝七國闕三十一字雲梯驅鴻裝而驂鳳駕未若浪井常沸雲漿鎮涌流珠罕匹練玉難儔偶西聖而為尊配東皇而保祚闕三十一字奏飛龍遠叶高陽之代鬼神無以祕其奧造化所以同其節鯤池象浦才居侯甸之中細柳蟠桃未出王畿闕三十字庭而失所銅掌著於漢日金莖營於魏代空竭神仙之望無階風化之美未有殊方送款爭馳就日之心闕三十一字岧嶢而上秀山光拂迥疑覆鼎之黃雲珠影浮空似臨圭之白日銅舟鐵軔淩幽駕險石弩玉環馳烟驛闕三十一字鹿銀麞年趨於帝囿龍編列壤遙通落鴈之峯象郡疏疆遠控跕鳶之水時驚蛇豕之暴或縱豺狼之虐闕三十字氓俗皇威遠舉取八桂若摧枯廟略冥通殄三珠如拉朽烟塵息而九區靜文軌同而萬方泰至若闕三十一字至鶯啼草秀鴈飛木落丹花翠柳送宇宙之春光玉露金風漲山川之秋氣披繡闥而闕一字天步敞雕軒而闕三十一字庾登而俗阜高天降祚先開雨粟之禎厚地鍾祥更錫歸禾之瑞艾韡知懼草纓無犯鄭竹所以焚科燕闕三十一字集黑玉來而殷業泰龍飛白水赤伏至於劉亭鳳集岐山丹書下於姬戶今皇圖纂于七寶天冊闕一字於闕三十一字頭燕頷既巢於阿閣牛尾狼題方馴於禁竹彳缶亍示山車澤馬湊仙掖而駢闐丹甑黃銀擁神州而駱驛祥蓂闕三十一字曠時殊貺咸不召而自來絶代洪禎固無幽而不出于是三靈聳聽萬方翹首㣥公陳禪草之儀天子闕三十一字者霧集叫龍圍者雨驟宸儀迥映俄流黃道之暉仙渙遙垂忽降丹穹之液粵以天冊萬歲二年元闕三十一字三界有昭蘇之樂皇恩與和氣同泛帝澤共祥雲俱灑車書正朔極遠而窮幽文物聲明振天而動地闕三十字之樓法駕出銅駝之道八神分衛飛蒙茸而走陸梁萬騎齊驅擁浮雲而騰轉電虹霓作其旌旆霜雪為其闕三十字帷宮欱野笙鏞交太一之壇帳殿噴山鐘鼓沸天中之邑聖皇乃端瑞珽降雕輿率百辟而虔肅契闕三十一字祥光下燭金花孕彩依輦道而分暉玉醴浮甘委行廚而蓄潤變溫景於黑陸降仙禽於丹嶠木呈連理之闕三十字射牛之盛禮鏤皇猷於翠䃭騰帝徽於紫嶽烟雲動色標絶跡於千年雷雨流恩洽殊私於萬類闕三十一字箋而頌德抽兔毫而瀝思所冀皇猷永固將九地而齊貞帝祚長隆與三天而共遠其詞曰洪罏開闢大象初甄四溟環地八柱承天江河濆薄日月回旋三徽遞往五運更遷其一文物既敘皇王有作闕三十字奕三皇俱陳玉帛各起壇場鳥魚符瑞茅黍徵祥寧臨太室空陟神房其三玉冊延祚金輪馭極壇躍闕三十字中千花聳塔七寶闕一字宮傍周法界上達虛空長懸佛日永息魔風其五峻極于天鬱盤于地漢蹕徒擁虞巡莫闕三十字疊跡蒼龍希陪闕一字輦願侍雲封蒲輪欲馭芝誥俄從其七鳳歷祥年龜圖考日法駕將備乘輿乃出却闕三十一字璋旌旗焰焰宮徵鏘鏘天浮瑞日地燭神光其九古樹三花仙巖萬歲銀繩是勒金闕三字業闕一字九皇功超下闕臣聞二儀合德中黃承太紫之庭兩曜齊明玉兔儷金烏之象是以九霄高映星躔乘婺女之精十野旁羅媯水叶娥皇之德亦有西陵美族闕二字軒帝之官南土嘉媒入娉夏王之幄其後太任端一即創文基太姒勤勞還開武運故知皇三事業咸資坤載之功帝五風謠必藉陰靈之化無上孝明高皇后宏農仙掌人出自有周蓋唐叔虞之後也原夫赤烏流火丹雀銜書初開夢梓之祥旋茂翦桐之葉自唐郊徙邑晉野裁封即胙土而為家啓禎符而得姓周則志為大將承九伐之餘資秦則款為上卿居七城之重任豈直十人丹轂金莩舄奕于都畿四代白環玉緒蟬聯于海縣子雲博識吐鳳摛詞伯起高材銜鱣襲祉誕聖不墜降靈相屬神基與紫嶽爭高仙派共黃河俱遠所以代隆鍾鼎地積衣冠五公則異代相傳八子則殊年閒出詳諸國史可略而言曾祖諱定後魏都督歷新興太原二郡太守并州刺史晉昌穆侯宏材卓犖峻局深沈丹山有像日之彩緑地見遺風之步褰帷按俗風行馭竹之郊露冕臨人化偃焚林之阜豈直鄧攸罷郡深歎雞鳴劉寵辭官方憂犬吠祖諱紹後魏征西將軍金紫光祿大夫兼通直散騎常侍驃騎大將軍周開府儀同三司封儻城郡公鄜豳燕三州刺史贈使持節大將軍成文扶鄧洮五州諸軍事成州刺史諡曰信聲飛漸陸響逸鳴皋器重南金材橫東箭謀深八陳勇冠三軍既隆投石之勳果踐銜珠之秩加以金龜結紐銅虎分符轉扇揚風停車待雨童兒結要無欺一日之期親友論刑自得二天之詠父鄭恭王諱達周內史中大夫隋開府儀同三司黃門內史吏部刑部二侍郎尚書左右丞趙鄯二州刺史工部吏部二尚書納言營東都大監將作大匠武衛將軍左光祿大夫遂寧恭公贈吏部尚書唐贈尚書左僕射垂拱二年封鄭王食邑一萬戶依舊諡曰恭即司徒雍州牧觀德王之季弟也量包江海氣逸烟霄文即呂氏春秋武則孫吳兵法箕裘代襲鏘鏘萬石之君禮樂基身翼翼千金之子鸞回玉扎鴈落雕弓激水張鱗遙浮渤海摶風理翰直上扶搖纍踐崇階頻升顯秩腰鞬北闕位總貔貅曳履南宮聲高鵷鷺貂冠入侍氣應連珠隼旆分班榮參執玉加以纍仁鍾祉積德延祥四履開封寵及九泉之路千乘闕一字禮恩覃萬古之前棠棣相輝鶺鴒交映劉家兩驥譽滿寰中荀氏八龍名高海內通門向術冠蓋成陰甲第當衢歌鐘就列伏惟無上孝明高皇后資靈月魄育粹星宮承茂祉于瑤筐降仙儀于金屋聲馳丱歲潜流夢日之詳譽表笄年暗積捫天之貺蘭襟散馥蕙問揚翹懿則重于邦家柔儀冠于今昔忠圖孝範援翠竹而淩霜媛德嬪容引青松而冒雪禮枝含秀藻七誡于情田行葉分芳籠九師于性府徽猷內湛韶姿外發懸明鏡于積水之閒振青飈于長松之下貞規漢遠亮節秋高翠縷紅纁從來未理龍梭鳳杼本自多輕素鄙鞶繡之工靜默尚韋編之道明詩習禮豈唯秋菊之銘閲史披圖寧止春椒之頌學標天縱開道德之清關業契生知入文章之妙境曾于方寸具寫千言總遊霧于毫端窮偃波于筆杪芝英雲氣入魏帳而分輝龍爪魚形映張池而散彩嘗題一密記貞心置以緘縢藏之屋壁云當使惡無聞于九族善有布于四方指此立身期之必遂後因修宅匠者得之恭王見而嘆曰此隆家之女矣昔者書堂欲壞惟聞絲竹之音劍匣將開空覩蛟龍之氣未有仁心暗徹睿德冥通橫宇宙而無違滿乾坤而自應若乃行該地義孝極天經親枕席而忘疲晨昏而靡倦及乎風枝不靜露蓼含哀履厚地而無追仰曾穹而莫報思欲託三乘之妙果憑五演之元宗永奉嚴親長棲雅志昔隋季喪亂海內沸騰伏鱉垂天風塵暗起㣥龍戰野旗鼓潜張白騎于是爭驅青犢由之競擾蚩尤則餐沙食石項羽則索鐵申鈎赤眉探盆子之籌黃巾聚天師之米夫三才合契惟神膺大寶之名六位乘時惟聖運洪爐之德唐高祖神堯皇帝材雄鵲起業峻龍飛用丹扆而寧人將朱旗而撥亂天綱既紐竟收龍鳳之圖地角咸清遂翦豺狼之毒無上孝明高皇帝觀時有作應運而生先知赤伏之言預識黃星之兆功深坐樹績茂披榛負伊鼎而陳謀入張帷而建策龍鈐獨運當赤地之三千獸節長驅偶皇天之百六息崑山之巨燎並藉中權定滄海之橫流咸資上略志同魚水契若鹽梅如魏武之得荀攸似漢光之逢鄧禹雖英圖盛烈昭鶴鼎于高門而閫則嬪風闕魚軒于中饋高祖神堯皇帝位膺元首任切股肱利涉大川寄隆舟楫式崇勳舊為結潘楊酬功草昧之時賞效雲雷之日高后以孝誠純至雅操虛沖拒縟禮于移天誓開襟于初地六塵不染孤標水上之花四諦方披獨晤星中之月洎乎鳳凰開繇獨堅匪席之心烏鵲成橋果迫如綸之命于是使桂陽公主為婚主禮娉所須並令官給既而三星叶兆百兩邀歡與松蘿而比茂諧琴瑟而流響風閨少女襲蘭蕙而馳芬月幌仙娥韻珩璜而動步光生綺殿比桃李而增鮮影發春樓視雲霞而掩色八紘欽其雅躅四海挹其鴻徽猶羽翼之宗鸞鳳風雲之隨龍虎者矣廟見斯畢即拜應國夫人從班例也于時帝圖肇建王業初基三戶亡秦覺風塵之始定四門闢舜識雷雨之將調天無鬬日之妖地息崩山之禍主上方勤庶政屬想㣥黎將貽共理之憂式廣求賢之務無上孝明高皇帝以勳兼竹帛義重金蘭備歷文武昭升內外三踐八元之位四臨九伯之途中臺飛署劍之榮南服總班條之任高后以業光圖史道洽塤篪欲啓仁明實資陰助是以量如江海令未發而風移化穆荊衡澤將流而人悅呼鷹臺下尚隔去思抵鵲巖前始歌來晚俄而高祖晏駕瞻脫屣而無留太祖崩號奉遺弓而積慕沈帛丿糸遽軫終無就日之期痼疾遄淹忽切乘星之釁高后哀深杞堞誓切柏舟悲一劍之先沈怨雙桐之半死昔時寶鏡愴對孤鸞舊日瑤琴悲聞獨銜冤負痛撫繐帳而增號弔影傷魂踐孀閨而凝慕方祈淨業敬託良緣憑慧炬于幽途舟羲慈舟于覺海于是心持寶偈手寫金言字落貫花詞分半月龍藏豈及象負難勝將佛日而長懸共慈燈而不滅及龍旌首次蜃紼遵途永惟憑附之誠願託邱榛之側方冀鵷棲梓樹近接埏庭鶴舞松枝傍依隧路特以聖上年居膝下愛切掌中理藉劬勞方資顧復宣和諭善屢積葭灰日就月將頻移柘火至永徽六年聖上母儀萬國正位六宮將開鍊石之基乃遂穨沙之祉大帝以西京命賞平原之秩未宏東漢崇恩新野之封猶褊于是廣流元霈大啓黃扉稽石窖之遺塵裂寶符之氣昴即以其年十一月冊拜代國夫人食湯沐邑一千戶品正第一位在王公母妻之上魚軒水鶩揚輕影于龍池翬服霞明下鮮文於鳳腋榮由德被位匪恩升驟應嘉名徒昭洪澤以顯慶五年十月轉拜榮國夫人尋改封鄼國夫人自家疏槐里門荷椒庭纍沐殊輝頻膺茂典南鄰夜靜奏鐘磬于高臺北里晨通列笙竽于廣榭門有躡珠之客家豐饌玉之廚恆處逸而思勞每將升而必降緑墀青瑣特忿王根火布金池深非梁冀謙撝之美萬國仰而知勤端潔之風九圍欽而取則智周寰宇識洞古今思所以匡國庇人濟時揆物嘉謨讜說屢發于神襟厚利豐功頻彰于帝念奏便削藳人莫能知每以孔光祕言合為臣之道山濤密啓得事君之要可久可大置黔首于生成惟幾惟深頓蒼元于覆載至若緣情體物屬事比辭取之以義方先之以風化清詞海富縟藻雲繁凡所著述皆成典訓其動也方其靜也直其恩也若春雨之流津其威也若秋霜之應節接上以禮逮下以仁君子感其德小人懷其惠天機獨轉靈臺迥燭虛鑒與日月齊明神理共陰陽比奧洋洋乎不可得而稱也既而離宮霧闢遙橫地乳之山別館星開上戴天睂之宿甘泉避暑方陪萬乘之遊景福追涼更扈六龍之駕不謂災纏霧露疢積膏肓丹扆凝慈召名醫而接軫紫霄流渥下珍藥而相望玉釜徒煎竟乏長生之術金丹莫就終無駐壽之期咸亨元年八月二日崩于九成宮之山第春秋九十有二聖上以身齊霄極禮闕晨昏戀隔九重望長筵而下泣心馳五起瞻厚褥而銜悲大帝慮不勝哀祕慈凶問苴筵欲對仍流不次之恩葈服將臨更下非常之澤仍改封衛國夫人以諭聖上之憂懸也后疾將大漸時落高舂雅志無昏神情不撓影隨燈滅自此長辭魂逐香銷終無暫返以為合葬非古禮貴從宜將追罔極之慈願在先塋之側聖上奉遵遺旨無忝徽音割同穴之芳規就循陔之懿躅即以其年庚午閏九月辛丑朔草一日辛酉遷座于雍州咸陽縣之洪瀆原鄭恭王舊塋之左禮也爾其郊原坱圠林薄阡眠秦地關河迥接寶雞之野漢家墳壠平依金狄之川松檟森沈何年烏住風烟蕭索幾代人亡于是凝恨九天廢朝三日空山露泣痛結飛行曠野雲愁悲纏草樹乃下制贈魯國太夫人諡曰忠烈仍令司刑太常伯盧承慶攝同文正卿充監護大使右肅機皇甫公義等為副賜東園祕器每事官供務從優厚仍令西臺侍郎道國公戴至德持節弔祭京官文武九品以上及諸親命婦並赴宅弔哭仍送至渭橋葬事並依王禮給班劍四十人羽葆鼓吹儀仗送至墓所往還官為立碑親紆御札聖上因心轉切錫類方宏希申莫大之懷冀展飾終之請烏墳欲列思增茅土之儀鶴隴將崇願廣山河之誓遂得五雲飛彩墜仙液于松塋十日回光被增輝于蒿里乃下制贈太原郡王餘並如故所司備禮冊命大帝親御橫門開軒悲哭紫宸哀痛黃屋淒涼天地為之寢光烟雲由其輟色聖上以幽明永隔屺岵長辭終無再見之因鎮結千秋之恨奔曦已遠薦霜堇而無年逝水難追饋冰魚而未日又以嚴規早墜遠卜厝于鄉墳慈蔭重傾近陪親于京隴陵塋眇隔長懸兩地之悲關塞遙分每切百身之痛遂命大使備法物自昊陵迎魂歸于順陵焉遊冠遠降墜舄遙遷方移沛邑之魂更啓橋山之域白雲朝起乍伴龍輴明月宵懸時低蜃衛文明元年聖上臨朝其年九月追尊先曰魏王食邑一萬戶實封加滿五千戶改咸陽園寢曰順義陵大名天啓奧壤星分古樹捎雲近對黑龍之水荒墳映月傍鄰丹鳳之城徽號既崇園陵載廣屬以圖書河洛龜負鳳銜窗闥方圓雲攢霧矯合宮重屋既布政而嚴禋玉輦金輿且巡河而拜洛永昌元年追尊先曰忠孝太后既而謳歌允集獄訟知歸天垂革命之符地涌受終之籙元圭錫禹還逢揖讓之年黑玉歸商即啓休明之運九莖仙草依漢殿而抽芳五色祥雲繞軒宮而布彩下從人望上應天心乘寶位于通三建瑤圖于得一黃琮蒼璧祀地郊天復廟重檐宗文祖武鴻名肇創光鳳閫于幽泉茂禮將加飾鸞闈于長夜天授元年追尊曰孝明高皇后陵曰順陵復以祥分貝葉瑞演龍花金容開十地之圖玉相告三空之讖龍軒黯黯俄為兜率之天鳳闕岧岧忽似須彌之座金輪既轉玉鏡方懸式詮無上之文載顯崇親之義長壽二年后位之上又加無上二字尋又下制改順陵曰望鳳臺東京故事西漢遺塵封樹空存追崇未廣豈若宸襟鎮結長懷露序之哀睿念恆纏永結霜旻之慕遙瞻鳳野式建嘉名遠望鶉郊長懸美稱且夫功成翼贊尚畫雲臺績擅勳庸猶題麟閣況乎俔天茂德貫月殊禎垂母則於寰區導嬪風于邦國豈可使炎涼暗積陵谷潜移惟栽舞鶴之松不刻盤龍之石聖上凝懷萬化長想千齡恐地軸之西回懼天關之北轉方圖琬玉式降絲綸永嗟仙鶴之歌用固靈龜之卜微臣攀輝日樹沐潤星潢榮忝緑車職兼青史奉先追遠恆積慕于丹誠相質披文忽承恩于紫誥是用恭抽弱思敬述洪猷屑瓦徒勤生金愧妙揮毫奪魄陳萬一而寧窮伏紙驚魂辭再三而不獲逡巡拜首乃作詞云邈矣上古悠哉厥初天回紫府地轉黃輿陰陽蕩薄日月居諸靈龜負讖寶鳳銜書其一六位既陳三才乃立帝皇鬱起后妃更襲蛟電遙凝虹星下入渭涘疏派塗山是葺其二明明高后奕奕輝光白環代鬱丹轂家昌靈基嶽峻曾派河長捫天集祉裕後開祥其三爰自生育早彰尊貴月出星流青龍翠氣金屋是貯玉衣方萃燕卵非奇雞珠寧異其四芝蘭吐葉桃李開花黃雲白氣夜月朝霞賢明自負仁孝無加曾霄降藥祕篋飛沙其五聰悟天資惠才神與河漢靈匹瀟湘帝女筆動鸞回絃調鶴儛滌想金地闕字心寶聚其六仙容婉婉艷質峩峩星妃恥出月媛羞過椒花入頌柳絮縈歌詞峯秀嶽學海馳波其七魴鯉成詩鳳凰開兆琴瑟既合室家斯紹兩鶴齊飛雙龍並繞德行方肅言容是昭其八九圍母則六合嬪風恩流海內化被區中銀環曉上金佩夜中祥開梓闕位冠椒宮其九習禮明詩披圖閲史漢朝馬鄧周年任姒陰化聿宣坤儀載理貫月騰瑞驚雷送祉其一十高舂忽墜上壽俄騫金丹不熟玉釜徒煎黃泉九地白日三天六宮恨積萬國哀纏其一十一寂寞邱隴淒涼原隰畢地難追終天靡及薤露晨清秋霜降急伏紙銜悲揮毫灑泣怨聖賢之同盡感昏明之遞襲紀盛德于豐碑冀神猷兮永立其一十二傑一名欽又號雲夢子荊州長林縣人月日雲夢子毛傑謹致書于盧公足下傑聞君所貴者道也所好者才也故才高則披襟而論翰墨道狎則言事而致談笑何必雞鳴狗盜始資僥幸之能簞食瓢飲不顧清虛之用自公立名休代博物多能帝曰爾諧擢為近侍所以從容禁省出入瑣闈忠弼在躬優柔薦及傑時在草莽運厄窮愁思折俎而無因嗟掃門而不逮豈知㣥邪遘逆聯聲嗷嗷紫奪我朱遠詣惡土賴公神色自若心行不逾餌芝术以養間坐烟篁而收思傑梁鴻遠旅閔仲未歸留連德音徘徊失路互鄉童子當願接於宣尼蘇門先生竟未言於阮籍公於傑者如彼僕於公者若此百年朝夕何事惜於交遊四海兄弟何必輕於行路賈生不云乎達人大觀物無不可小智自私賤彼貴我況公披衣高尚習靜間局世事都捐尤精道意豈有自私而巳無大觀者哉倘能憐雲奬無知慜張良小子說鴻濛之偈遺黃石之書虛往實歸霑霧露之微潤裒多益寡落邱山之一毫則知足下之眷深焉小人之慶畢矣敏之武后姊韓國夫人子也武后既誅惟良懷運乃以敏之為其父士彠嗣纍拜左侍極蘭臺太史襲爵周國公改姓武氏敏之挾愛佻橫多過失后暴其惡流雷州中道以馬韁自縊死竊以犧皇至頤金人靡兆於龜文軒后韞靈紫氣未敷於鳥迹泪劉莊精感託神想於東流尹喜翹誠覩物色於西邁由是龍宮梵化灑慈潤於大千淡泊凝真沖寂宏於㝢內雖復遠標天構氣淑無為體均具相功深濟度莫不稟宸極以存其法事如端尹府議中彈資遺體以受其靈豈有超俗塗而輕法主潔其已而忽所生忠孝一虧二教何寄今若資忠貞以凝道移孝行而修誡則福足以顯元門忠孝用光臣子假或恭敬被於㣥品據理尚有可通況唯拜伏君親未審於何不可事如祕閣局議中彈請準明詔致拜為允謹議易之左僕射行成族子幼以門廕纍遷尚乘奉御武后臨朝為司衛少卿聖歷二年置控鶴府以易之為監尋加麟臺監封恆國公武后臥疾長生院易之引支黨謀為不軌左臺御史中丞宋璟請按攝當斬后不許神龍元年張柬之崔元暐率羽林兵入迎仙院誅之夫瀛洲渤澥瞻地際而無窮昆邱閬風望天涯而不極豈若陽城石淙山水名區觀其峯闕二字豎巖崿環繞青翠掩日韜霞闢銀榜於叢嶮敞瑤臺於洞合懸崖削壁自然風雨之鄉復㵎回潭即是雷霆之府則知陰陽同功而穿鑿獨此標竒造化僇力而雕鐫居然孤絶平臨襄野童兒牧馬之場斜瞰茨山野老休牛之地可以兮登踐可以兮棲遲㣥公松竹其心芝蘭其性罄忠而事明主投分而接神交雖迹混市朝而心遊江海或班超燕頷榮封萬里之侯或叔夜龍章聲振五鋁之鍛或十居外一居內季成子而佐文侯或筆則筆削則削魯孔某而刊大易或涕唾流沫濕蔡生之嶔頤或颯灑鬚眉舉羊公之折臂或長安鬻䥫而位掌兵機或文昌握蘭而榮分星署亦有銀床貴寵為座上之顏回亦有金穴懿親作關西之孔子是知鳥有鳳而魚有鯤翥垂天之羽毛聳橫波之鱗甲並汾水扈游之暇柏梁侍奉之餘披霧覩天思逢樂廣彈琴命酌願值劉伶大開文酒之娛都會琳琅之客將辭繁雜適莽蒼而邀歡已造虛無陟崢嶸而抒意於是臨月觀俯雲扃丹壑萬重青溪四合騰猿把臂倒掛松枝遊鱗鼓鰓下吹蓮葉文貍赤豹窟穴於嵓亭貝闕龍堂沈淪於水府攀窅蒙之倒景既如登紫陽兮入洞天觀瀾汗之洪濤又似駕黿梁兮浮碧海樵蘇不爨高談衆妙之門蘿薜成衣遠得幽棲之致爰有堯年許仲武來此練魂漢代劉君安遊茲服食目不私視口不私言日誦仙闕一字夜披真訣平身七過含咒闕一字而闕一字符叩齒三通設靈壇而禹步傍祛俗纍郤坐仙嵓相顧而言曰鍾鼎不可以久食囂塵不可以久闕一字蘭薰而摧玉貞則折故仲尼抗浮海之說孟軻養浩然之氣名利所在似刻舟而訪寶劍禮義何施若擊鼓而求亡子富貴者勞筋苦骨風火日夜而煎熬文章者傷神潰心文䖵虻朝昏而嚙豈不見金樓要闕一字永出樊籠玉釜靈膏長排促景三千年之瓊實緩緩充飢五百歲之銅人時時拍背常樅開口對老聃而不言鴻濛掉頭仰雲將而拊髀北遊汗漫與若士而摩肩東戲蓬萊共麻姑而扼腕我輩仰之而杌魄望之而蕩靈曠若發蒙惵然意下於時青要戒序朱明謝時紅飈息而涼蟬吟白日下而殘虹歇秋風稍起撼㣥木於高邱夏日旋移落長繩於暮景天開雲散流離爛漫少室巔兮嵩高半繞澗連岡吐焰生光紅緑阿兮紫翠房面林壑而神清閲烟霞而披癢落札則書成鳥跡映科斗之文章染翰則思縟魚箋射驪龍之光彩聚東山之王褱寶未足為珍擁南㵎之風烟才堪入賞乃戛瑟導意抗音高歌炎暑隔而泉石心寒勸酬舉而鵷鴻耳熱瀑下潀奔兮雲和樂流波之作管絃丹嵓青壁兮地屏風藤葛之為鉤鈕耳目所接天下之為竒也遊踐所經天下之為絶也吸精英而咀根荄既四序之無厭腦翰墨而髓風烟須一言之有作曜中書令元超子尚城陽公主聖歷中附張易之與修三教珠英官正諫大夫夫金石之性堅剛而急烈又性清淨而惡滓穢凡服乳石訖即須以意消息尋檢舊法不可無備忌也但人性或冷或熱或寬或急皆須量性將衛不可輕有犯觸凡乳石一服之後常在腸胃若人氣力衰石氣強即發動若人氣力盛石氣安即強健謹按古法皆令五十以上始服乳石殊謂不然今驗所見年少服者得力速兼無病患何以言者年少筋力滿盛飲食飽飫彌益精明壯健終無發理年歲遲暮氣衰竭食飲失宜此石氣勝人無不發動歷觀得失莫過於此夫人年少縱不喫飲食血氣自強年老力微縱肉精細猶不可健以此言之足明古法疏矣凡人身血脈經行不絶如血脈微有滯處便於其處發瘡或發熱神氣昏悶必欲防之每朝及暮溫一兩盞清酒或可以生薑刮碎和少茱萸飲之令遍體熱薰薰又作熱羹粥啜之使腸胃通利即石氣流行其初服石一二百日尤宜作此將息是古法服石不取夏月只取冬月所以然者石有發動與服時皆背此又殊乖通論今驗服石飲食失時勞役過度立即發動豈待背時今歷見將衛得宜並不發動復見名醫平章服石之人常作熱將息儻發調適乃易耳脫若石氣發動暫須宣泄服少冷藥便得轉瀉若得通暢熱氣併除若常作冷將息脫若石氣發動用冷藥無由得轉此一曲之說今古存之但欲廣聞見爾其將息皆須自量本性冷熱為務取安穩不可拘執古論捨已從人庶通幽君子以此為意也按本草石鍾乳味甘溫無毒主咳逆上氣明目益精安五藏通百節利九竅下乳汁益氣補虛損療腳弱疼冷下焦傷竭強陰久服延年益壽好顏色不老令人有子不鍊食之令人淋一名公乳一名蘆石一名夏石生少室山谷及太山採無時蛇牀子為之使惡牡丹元石牡蒙畏紫石蓑草少室猶連嵩山也今第一出始興而江陵及東境名山石洞亦皆有之唯通中輕薄如鵝翎管碎之如爪甲中無鴈齒光明者為善長挺乃有一二尺者黃色以苦酒洗刷則白仙經用之少俗法所重亦甚貴之謹按鍾乳第一始興其次廣連澧朗柳等州者雖厚而光潤可愛餌之並佳今硤州清溪房州三澗出者亞於始興自餘非其土地不可輕服多發淋渴只可搗篩白練裹之合諸草藥酒浸服之耳陶云鍾乳一二尺者謬說也
