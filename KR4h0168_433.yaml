body:
  text: 造化之初九天相競風之飄風胃然曰虎風虎風乎之飍飍乎而颼颼乎之飂飂乎而扇鴻濛而么飉㕭嘐鼓谷臯谷牢而悲咤風戊風高蹶石拔木蹙浪奔濤其孰能大乎吾之大乎而雲之氣騰然曰翕乎忽乎之滅沒乎者逢浡烟熅之蓊鬱乎者蒙乎昧乎之昏晦乎者靉靆黭黮之雨甚䨴乎者翳海吞山遏日漫天其孰能大乎吾之大乎者雷之聲填然曰諜轟轟乎轢轢忽犖犖乎虩虩石殷輪奔乎轂乎些欻電烻列缺砉霆驚劈歷乎些若獨不聞乎洪濤震鼓猛獸唬怒彼碌碌者莫吾之與巨其孰能大乎吾之大乎些海之濤奔然曰浩乎汗乎之澶漫乎且澎乎湃乎之滂沛乎且何鯤鵬頒鰓臭翼之聲邪乎且翻鼇盪鯨崩壺倒瀛其孰能大乎吾之大乎且火之熛烈然曰烘乎炵乎之煥爛乎焉翕乎煜乎之煽炫乎焉甚冗火矣灼爍烜爀燏火蒦涸澤燋山熾日薰天其孰能大乎吾之大乎焉日之燿照然曰煌煌乎陽陽乎歟晶晶乎熒熒乎歟杲杲曈曈炎炎赫赫光天照地流金礫石其孰能大乎吾之大乎歟地之震殷然曰坤乎崙乎之坱圠磅礡之乎之崔乎嵬乎之㘭墝确石剝之乎之浸海流河而有常奔山走陵而無疆其孰能大乎吾之大乎之天之鳴穴弘然曰乾乎圓乎之慤乎只穹乎崇乎之廓乎只昊恢恢之顛顛旻蒼蒼之元元包水旋風葢地環空其孰能大乎吾之大乎只空之寥宮殳然曰豁乎泬乎之曠宕乎哉虛乎無乎之漭浪乎哉濛洞茫唐青冥蒼茫廓兮而康良包天裹地誕陰育陽其孰能大乎吾之大乎哉既而九天各自競能風之飄曰孰有大乎吾曹之大矣空應之曰吾聞太上之言道名之大可詣而問焉於是雲停其氣風息其飄日罷其耀海弭其濤地復其震火滅其熛天靜其鳴空喪其寥於是乎俾雷之迸入道之境聲者讓響形者讓影不有不無不動不靜九大觀之各慚而還遂相讓為無為之邑相與成無為之域以終乎塵刼之極而已焉欹道之形也虛道之影也無道之聲也初道之響也如昔之為狀乎廓然其虛者空也莫然其無者滅也永然其初者遠也靜然其如者定也字之曰遺遐明默慤博元圓者何也遺以盡其失遐以邈其遙明以照其光默以湛其寂慤以堅其固博以大其廣元以神其妙圓以規其周故曰德者得也得乎不得不得乎得斯之謂乎得其德者何也文宣得之而無我老氏得之而未孩南華得之獨與天地精神往來而不敖睨於萬物噫沖虛得之泠然御風顏回得之同於大通然則大寥得之無終始已矣夫延吾思之不能竟也將何以窮有物之既乎燿夜者燭腹也士冖䂞體者篋軀也戴芥者負垢也苗蜩者根蟬也晴星者昡華也燭腹之蟲循乎墻篋軀之蟲出乎隙負垢之蟲遊乎業根蟬之蟲植乎土篋軀哂乎燭腹曰子之自謂養生之固者也燭乎腹燿乎夜見乎險阻審乎取舍然而世人相有炫明之患怪乎物亡乎身未若吾之晦迹之逍遙也負垢哂乎篋軀曰子之自謂養生之固者也士冖䂞乎體篋乎軀進則外乎首而行恐則內乎元而靜然而出入有首鼠之患怪乎物亡乎身未若吾之葢形之逍遙也根蟬哂於負垢曰子之自謂養生之固者也蓁然芥孽然垢徐然步物之不疑子之動也糞然形物之不疑子之生也然而慮風火有驚恐之患未若吾之瘞體之逍遙也之數蟲者各以能之相哂也於是眩華聞之哂乎根蟬曰子之自謂養生之固者也藏乎口匿乎目虛乎心實乎腹根乎足潤水土於外而不行苗乎脊受風日於外而屢長無羈麗妥昔隹之嫌者矣然而累乎質礙乎有苟遇掘鑿之患怪乎物亡乎身未若吾之瞥然之逍遙也根蟬曰吾稟乎造化之奇妙乎古今之名藏口匿目虛心實腹之數蟲者其於衞生莫吾如也向吾聞子之聲昧子之形狀子之有自何而生眩華曰吾生乎目之眩長乎視之亂其徐也聯若星之貫其疾也紛若華之散取之而不得捨之而不克謂無而有謂有而無其來也儵見乎造化其去也寂歸乎太虛能遊乎不物之域者方覩乎吾之逍遙墟域同乎於圓也方也於方也圓也故曰至圓無圓而能方至方無方而能圓孰能圓乎方者曰太圓孰能方乎圓者曰太方故太方有言曰昔吾方子之圓而子弗知吾之方太圓曰曩吾圓爾之方而爾不知吾之圓若然者何也其有以哉是故規乎虛者虛之不知其圓也矩乎空者空之不知其方也然則遊心乎太寂之鄉令規矩無措其巧者其惟太圓之與太方乎荷水為珠其圓也非規而不可方者離乎著也燼火為輪其常也非環而不可斷者疾乎連也背日噴乎水成虹霓之狀而不可直者齊乎影也汲江釀乎酒應波濤之湧而不可停者均乎氣也片雨滴海合滄溟而不可殊者得其一也寂心歸空同太虛而不可分者會其天也日月有合璧之元死生有循環之端定合璧之元者知薄蝕之交有時達循環之端者知死生之會有期是故月之掩日而光昏月度而日耀日之對月而明奪違對而月朗是故死之換生而魂化死過而生來生之忘死而識空生忘而死見然則月之明由日之照者也死之見由生之知者也非照而月之不明矣非知而死之不見矣且薄蝕之交不能傷日月之體死生之會不能變至人之神體不傷故日月無薄蝕之憂神不變故至人無死生之恐者矣有之非未無也無之非未有也且未無之有而不有未有之無而不無斯有無之至也故今有之忽無非昔無之未有今無之忽有非昔有之未無者異乎時也若夫無彼無有連既往之無有而不殊無此有無合將來之有無而不異者同乎時也異乎時者待以為必然會有不然之者也同乎時者代以為不然會有必然之者也影之問乎光曰吾昧乎體之陰君昭乎質之陽君之初吾之餘君之中吾之窮君之沒吾之滅君之清吾之明何君之好無恒俾吾之令無常與光之答乎影曰子在空而無在實而有在翼而飛在足而走在鉤而曲在弦而直子之近乎燭出子體之外子之遠乎鏡入吾質之內子之自無恒豈吾之獨常歟雖然子之同抑吾之可通吾怪吾之尤者雖吾亦不知之何哉吾遇陽燧之抱倒乎子之面吾遭羅喉之蝕曲乎子之背吾將問諸造化窮理盡性而不知者命也夫影笑之曰君第收光吾將滅影有之與無由君之與吾何背何正妄推造化之命哉默之來也默曰一寂能一之默曰二寂能二之默之一也無寂之一也有默之二也無有寂之二也有無一之一也不離乎二二之二也不離乎一然則知寂之不一明默之不二者斯為之真一矣夫真一者無一無二無寂無默無是四者又無其無斯謂之真無矣夫能游乎真無之域者然後謁乎真一之容者焉夫游乎真無之域謁乎真一之容者乃見乎諸無矣寂於是謂默曰若夫諸無者人莫能名焉吾強為之名者曰太無之寰夫太無之寰者人無能諡焉吾強為之諡者子能聽之乎曰能寂於是乎端容節氣湛然不語久之而兩忘默之悟曰向也吾聞其名矣又見其無也今也吾聞其諡矣未見其無也斯之謂之太無之諡耶寂之覺曰適吾與子為微談而子果聞諸子可謂明微矣自默之還也而寂為之絕談契字佐卿智者濟時以設功強名之曰桔槔何樸斲之太俾役力兮不勞作固兮為我之身臨深兮是我之理若虞機張如鳥斯企山有木因工見汲引之能巽乎水自我成潤物之美不羸瓶而上出何抱甕之勤止執虛趨下雖自屈於勞形持滿因高終見伸於知巳鄭圃之側潘園之旁溝塍綺錯犬畝相望帶嘉蔬兮映芳草背古岸兮面垂楊欲建標以取別能舉直而自強若垂竿兮匪釣象爟火兮無光不忘機以棄俗乃習坎而為常隨用舍而俯仰應淺深而短長重泉之水兮不滯九畹之蘭兮益芳雖欲絕學以棄智其若得存而失亡歌曰大道隱兮世人薄無為守拙空寂寞老圃之道可行何恥見機而作賈乾元三年兵部侍郎臣讀唐史見薛登上疏云古之取士實異於今先觀名行之原考其鄉曲之譽崇禮讓以厲巳取名節以標言以敦樸為先最以雕文為後科故人從禮讓之風士去輕浮之行希進者必修貞確不拔之操行難進易退之規臣因覽前書覩茲舊事望於聖代復用此言則有才者皆務造修無行者不宜推擇遵太祖景帝七世孫天寶十四載由執金吾為彭原郡守肅宗即位拜工部侍郎領宗正卿封鄭伯乾元二年進封公加特進工部尚書坐賄下獄由太子少傅貶袁州刺史寶應二年拜鴻臚又貶永州司馬大歷二年卒中外官職田者苗子準令依租分法並入新人水陸田十一月一日已後上者子並入官草準式當司官分其類遷改人乃有一年之中數處合得者按令云職分陸田限三月三十日已前水田限四月三十日夏田限九月三十日已後上者入前人已前上者入後人即是各以耕種時在職者為主此職既闕本是公田耕耘收刈已皆畢功新人方來何理領受請自今後水陸田並限六月三十日宿麥限十二月三十日春麥限三月三十日已前上者入新已後上者並草並入官若其年已得前任苗子草粟稻麥並不重受亦入官羽字鴻漸一名疾字季疵復州竟陵人不知所生或言有僧得之水濱畜之既長以易自筮得蹇之漸曰鴻漸於陸其羽可用為儀乃以陸為氏名而字之師教以旁行書不肯學亡去為優人天寶中酺吏署為伶師太守李齊物異之授以書遂廬火門山上元初更隱苕溪自稱桑苧翁詔拜太子文學徙太常寺太祝不就職貞元末卒羽嗜茶著茶經三篇鬻茶者至陶羽形為茶神祀之慧山古華山也顧歡吳地記云華山在吳城西北一百里釋寶唱名僧傳云沙門僧顯宋元徽中過江住京師彌陀寺後入吳憩華山精舍華山上有方池池中生千葉蓮花服之羽化老子枕中記所謂吳西神山是也山東峯當周秦閒大產鉛錫至漢興錫方殫故創無錫縣屬會稽後漢有樵客山下得銘云有錫兵天下爭無錫寧天下清有錫沴天下弊無錫乂天下濟自光武至孝順之世錫果竭順帝更為無錫縣屬吳郡故東山為之錫山此則錫山之岑嶔也南朝多以北方山川郡邑之名權創其地又以此山為歷山以擬帝舜所耕者其山有九隴俗謂之九龍山或云鬬龍山九龍者言山隴之形若蒼虬縹螭之合沓然鬬龍者相傳云隋大業末山上有龍鬬六十日因而名之凡聯峰沓嶂之中有柯山華陂古洞陽觀秦始皇塢柯山者吳子仲雍五世孫柯相所治也華陂者齊孝子華寶所築也古洞陽觀下有洞穴潛通包山其觀以梁天監年置隋大業年廢秦始皇塢者村墅之異名昔始皇東巡會稽望氣者以金陵太湖之閒有天子氣故掘而厭之梁大同中有青蓮花育於此山因以古華山精舍為慧山寺在無錫縣西七里宋司徒古長史湛茂之家此山下故南平王鑠有贈答之詩江淹劉孝標周文信並游焉寺前有曲水亭一名憩亭一名歇馬亭以備士庶投息之所其水九曲甃以文石罛甓奫淪潺湲濯潄移日寺中有方池一名千葉蓮花池一名纑塘一名浣沼歲集山姬野婦漂紗滌縷其渺皓之色彼耶溪鏡湖不類也池上有大同殿以梁大同年置因名之從大同殿直上至望湖閣東北九里有上湖一名射貴湖一名芙蓉湖南控長洲東泊江陰北淹晉陵周圍一萬五千三百頃蒼蒼渺渺迫於軒戶閣西有黃公澗昔楚考烈王之時封春申君黃歇於吳之故墟即此也其祠宇享以醪酒樂以鼓舞禪流道伴不勝滓噪遷於山東南林墅之中夫江南山淺土薄不自流水而此山泉源滂注崖谷下溉田十餘頃此山又當太湖之西北隅縈竦四十餘里惟中峯有叢篁灌木餘盡古石嵌崪而已凡烟嵐所集發於蘿薜今石山橫亘濃翠可掬昔周柱史伯陽謂之神山豈虛言哉傷其至靈無當世之名惜其至異為訛俗所棄無當世之名以其棟宇不完也為訛俗所棄必其聞見不遠也且如吳西之虎邱丹徒之鶴林錢塘之天竺以其臺殿樓榭崇崇嶪嶪車輿洊至是有嘉名不然何以與此山為儔列耶若以鶴林望江天竺觀海虎邱平眺郡國以為雄則曷若茲山絕頂下瞰五湖彼大雷小雷洞庭諸山以掌睨可矣向若引修廊開邃宇飛簷眺檻凌烟架日則江淮之地著名之寺斯為最也此山亦猶人之秉至行負淳德無冠裳鐘鼎為邇俗所不侈宜矣夫德行者源也冠裳鐘鼎者流也苟無其源流將安發予敦其源亦伺其流希他日之營立為後世之洪注云徐吏部不授右軍筆法而體裁似右軍顏太保授右軍筆法而點畫不似何也有博識君子曰蓋以徐得右軍皮膚眼鼻也所以似之顏得右軍筋骨心肺也所以不似陸子名羽字鴻漸不知何許人也或云字羽名鴻漸未知孰是有仲宣孟陽之貌陋相如子雲之口吃而為人才辯篤信躁多自用意朋友規諫豁然不惑凡與人宴處意有所適不言而去人或疑之謂生多瞋及與人為信雖氷雪千里虎狼當道而不諐也上元初結廬於苕溪之濱閉關對書不雜非類名僧高士談讌永日常扁舟往來山寺隨身惟紗巾藤鞋短褐犢鼻往往獨行野中誦佛經吟古詩杖擊林木手弄流水夷猶徘徊自曙達暮至日黑興盡號泣而歸故楚人相謂陸子蓋今之接輿也始三歲惸露育乎竟陵大師積公之禪院自幼學屬文積公示以佛書出世之業子答曰終鮮兄弟無復後嗣染衣削髮號為釋氏使儒者聞之得稱為孝乎羽將授孔聖之文可乎公曰善哉子為孝殊不知西方染削之道其名大矣公執釋典不屈子執儒典不屈公因矯憐無愛歷試賤務掃寺地潔僧厠踐泥汙墻負瓦施屋牧牛一百二十蹄竟陵西湖無紙學書以竹畫牛背為字他日問字於學者得張衡南都賦不識其字但於牧所倣青衿小兒危坐展卷口動而已公知之恐漸漬外典去道日曠又束於寺中令其翦榛莽以門人之伯主焉或時心記文字懵然若有所遺灰心木立過日不作主者以為慵惰鞭之因歎歲月往矣恐不知其書嗚咽不自勝主者以為蓄怒又鞭其背折其楚乃釋因倦所役捨主者而去卷衣詣伶黨著謔談三篇以身為伶正弄木人假吏藏珠之戲公追之曰念爾道喪惜哉吾本師有言我弟子十二時中許一時外學令降伏外道也以我門人眾多今從爾所欲可緝學工書天寶中郢人酺於滄浪道邑吏召子為伶正之師時河南尹李公齊物出守見異捉手拊背親授詩集於是漢沔之俗亦異焉後負書於火門山鄒夫子別墅屬禮部郎中崔公國輔出守竟陵郡與之遊處凡三年贈白驢烏幫牛一頭文槐書函一枚白驢幫牛襄陽太守李憕見遺文槐函故盧黃門侍郎所與此物皆巳之所惜也宜野人乘蓄故特以相贈洎至德初秦人過江子亦過江與吳興釋皎然為緇素忘年之交少好屬文多所諷諭見人為善若已有之見人不善若已羞之苦言逆耳無所迴避由是俗人多忌之自祿山亂中原為四悲詩劉展窺江淮作天之未明賦皆見感激當時行哭涕泗著君臣契三卷源解三十卷江表四姓譜八卷南北人物志十卷吳興歷官記三卷湖州刺史記一卷茶經三卷占夢上中下三卷並貯於褐布囊上元辛丑歲子陽秋二十有九懷素疎放不拘細行萬緣皆繆心自得之於是飲酒以養性草書以暢志時酒酣興發遇寺壁里墻衣裳器皿靡不書之貧無紙可書嘗於故里種芭蕉萬餘株以供揮灑書不足乃漆一盤書之又漆一方板書至再三盤板皆闕字一懷素伯祖惠融禪師者也先時學歐陽詢書世莫能辨至是鄉中呼為大錢師小錢吏部韋尚書陟見而賞之曰此沙門札翰當振宇宙大名懷素心悟曰夫學無師授如不由戶而出乃師金闕一字兵曹錢唐鄔彤授其筆法鄔亦劉氏之出與懷素為㣥從中表兄弟至中夕而謂懷素曰草書古勢多矣惟太宗以獻之書如凌冬枯樹寒寂勁硬不置枝葉張旭長史又嘗私謂彤曰孤蓬自振驚沙坐飛余師而為書故得奇怪凡草聖盡於此懷素不復應對但連呌數十聲曰得之矣經歲餘辭之去彤曰萬里之別無以為贈吾有一寶割而相與先時人傳彤有右軍惡溪小王騷勞三帖擬此書課以一本相付及臨路草書䜿牽似古金义脚勉旃至晚歲顏太師真卿以懷素為同學鄔兵曹弟子問之曰夫草書於師授之外須自得之張長史覩孤蓬驚沙之外見公孫大娘劍器舞始得低昂迴翔之狀未知鄔兵曹有之乎懷素對曰似古金义脚為草書䜿牽之極顏公於是倘佯而笑經數月不言其書懷素又辭之去顏公曰師䜿牽學古金义脚何如屋漏痕素抱顏公脚唱賊久之顏公徐問之曰師亦有自得之乎對曰貧道觀夏雲多奇峯輙嘗師之夏雲因風變化乃無常勢又無壁折之路一一自然顏公曰噫草聖之淵妙代不絕人可謂聞所未聞之旨也陸羽曰徐吏部不授右軍筆法而體裁似右軍顏太保授右軍筆法而點畫不似何也有博識君子曰蓋以徐得右軍皮膚眼鼻也所以似之顏得右軍筋骨心肺也所以不似也冰寶應中官京兆府參軍金部員外郎夫釋縛脫艱全真導氣拯黎元於仁壽濟羸劣以獲安者非三聖道則不能致之矣孔安國序尚書曰伏羲神農黃帝之書謂之三墳言大道也班固漢書藝文志曰黃帝內經十八卷素問即其經之九卷也兼靈樞九卷迺其數焉雖復年移代革而授學猶存懼非其人而時有所隱故第七一卷師氏藏之今之奉行惟八卷耳然而其文其意博其理奧其趣深天地之象分陰陽之候列變化之由表死生之兆彰不謀而遐邇自同勿約而幽明斯契稽其言有徵驗之事不忒誠可謂至道之宗養生之始矣假若天機迅發妙識元通蕆謀雖屬乎生知標格亦資乎詁訓未嘗有行不由徑出不由戶者也然刻意研精探微索隱或識契真要則目牛無全故動則有成猶鬼神幽贊而命世奇傑時時閒出焉則周有秦公漢有淳于公魏有張公華公皆得斯妙道者也咸日新其用大濟烝人華葉遞榮聲實相副蓋教之著矣亦天之假也冰弱齡慕道夙好養生幸遇真經式為龜鏡而世本紕繆篇目重謺前後不倫文義懸隔施行不易披會亦難歲月既淹襲以成弊或一篇重出而別立二名或兩論併吞而都為一目或問答未已別樹篇題或脫不書而云世闕重合經而冠鍼服併方宜而為欬篇隔虛實而為逆從合經絡而為論要節皮部為經絡退至道以先鍼諸如此流不可勝數且將升岱嶽非逕奚為欲詣扶桑無舟莫適乃精勤博訪而并有其人歷十二年方臻理要詢謀得失深遂夙心時於先生郭子齋堂受得先師張公祕本文字昭晰義理環周一以參詳㣥疑冰釋恐散於末學絕彼師資因而撰注用傳不朽兼舊藏之卷合八十一篇二十四卷勒成一部冀乎究尾明首尋注會經開發童蒙宣揚至理而已其中簡脫文斷義不相接者搜求經論所有遷移以補其處篇目墜缺指事不明者量其意趣加字以昭其義篇論吞併義不相涉闕漏名目者區分事類別目以冠其首君臣請問禮義乖失者考校尊卑增益以光其意錯碎文前後重謺者詳其指趣削去繁雜以存其要辭理祕密難粗論述者別撰元珠以陳其道凡所加字皆朱書其文使今古必分字不雜糅庶厥昭彰聖旨敷暢元言有如列宿高懸奎張不亂深泉淨瀅鱗介咸分君臣無夭枉之期夷夏有延齡之望俾工徒勿誤學者惟明至道流行徽音累屬千載之後方知大聖之慈惠無窮時大唐寶應元年歲次壬寅序余少精吾道苦志文儒三冬不倦於寒窗九夏豈辭於炎暑後值則天理位忠良多見被害遂乃退志休儒繼日優游棲心至道每思大數憂短景以無依欲究真詮慮流年而不久故乃專心問道執志求賢得遇元珠子乃師事之爾即數年閒未敢詢太元至妙之門以漸窮淵源方言妙旨授余曰百年閒可授一人也不得其志求之者勿妄泄矣余即遇元珠子與我啟萌故自號啟元子也謂啟問於元珠子也今則直書一本計十卷其目曰元珠密語乃元珠子密而口授之言也今余於百年間不逢志求之士亦不敢隱沒聖人之言遂書五本每本一十卷頭尾篇類同義藏於五嶽深洞中先饗山神後乃藏之恐後人志求之者可以遇之如得遇者可以珍重之寶愛之勿妄傳之不得其人不可輕授之爾此元珠子授余之深誡也此十卷書可以見天之令運之化地產之物將來之災害可以預見之素問中隱奧之言可以直而申之可以修養五內資益㣥生有伐強補弱之門有袪邪全正之法故聖人云天生天殺道之理也若能究其元珠之義見天之生可以延生見天之殺可以逃殺陰符經曰觀天之道執天之行盡矣此者使人能順天之五行六氣者可盡天年一百二十歲矣其有夭亡者蓋自五行六氣遞相罰夭也故祖師言六氣之道本天之機其來可見其往可追可以著之玉板藏之金匱傳之非人殃墮九祖爾嶢肅宗時人國家以禮部為孝秀之門考文章於甲乙故天下響應驅馳於才藝不務於德行夫德行者可以化人成俗才藝者可以約法立名致有朝登科甲而夕陷刑辟制法守度使之然也陛下焉得不改而張之至如日誦萬言何關理體文成七步未足化人昔子張學于祿仲尼曰言寡尤行寡悔祿在其中矣又曰行有餘力則以學文今舍其本而循其末況古之作文必諧風雅今之末學不近典謨勞心於草木之閒極筆於烟雲之際以此成俗斯大謬也昔之採詩以觀風俗詠卷耳則忠臣喜誦蓼莪而孝子悲溫良敦厚詩教也豈主於淫文哉夫人之愛名如水之就下上有所好下必甚焉陛下若以德行為先才藝為末必敦德勵行以佇甲科酆舒俊才沒而不齒陳實長者拔而用之則多士雷奔四方風動風動於下聖理於上豈有不變者歟
