front:
  text: 全唐文欽定全唐文卷五百五十四韓愈八
  hash: sha256:fff030ccfd0f4b0a3649f1b27dd131c4f45368ea569a0c18c19ddf1d40f9577a
body:
  text: 乖隔年多不獲數附書慕仰風味未嘗敢忘使至連辱兩書告以恩情迫切不自聊賴重序河南事迹本末文字綢密典實可尋而推究之明萬萬無一可疑者欽想所為益深勤企豈以愈為粗有知識可語以心而告之急哉是比數愈於人而收之何幸之大也愈雖無節槩知感激若使在形勢親狎於要路有言可信之望雖百悔吝不敢默默今既無由緣進言言之恐益纍高明是以負所期待竊竊轉語於人不見成效此愈之罪也然不敢去心期之無已以報見待惟且遲之勿遽捐罷幸甚莊子云知其無可奈何而安之若命者聖也傳曰君子俟命然無所補益進其厭飫者祗增愧耳良務寬大愈再拜九月五日愈頓首微之足下前歲辱書論甄逢父濟識安祿山必反即詐為喑棄去祿山反有名號又逼致之濟死執不起卒不汙祿山父子事又論逢知讀書刻身立行勤已取足不干州縣斥其餘以救人之急足下繇是與之交欲令逢父子名迹存諸史氏足下以抗直喜立事斥不得立朝失所不自悔喜事益堅微之乎子真安而樂之者謹詳足下所論載校之史法若濟者固當得附書今逢又能行身幸於方州大臣以標白其先人事載之天下耳目徹之天子追爵其父第四品赫然驚人逢與其父俱當得書矣濟逢父子自吾人發春秋美君子樂道人之善夫苟能樂道人之善則天下皆去惡為善善人得其所其功實大足下與濟父子俱宜牽聯得書足下勉逢令終始其躬而足下年尚強嗣德有繼將大書特書屢書不一書而已也愈既承命又執筆以俟愈再拜再奉示問皆緣孟家事辭旨惻惻憂慮深遠竊有以見大人君子篤於仁愛終始不倦伏讀感欷不知所喻舊與孟往還數人昨已共致百千以來尋已至東都計供葬事外尚有餘資今裴押衙所送二百七十千足以益業為遺孀永久之賴孟氏兄弟在江東未至先與相識亦甚循善所慮才幹不足任事鄭氏兄弟惟最小者在東都固如所示不可依仗孟之深友太子舍人樊宗師比持服在東都今已外除經營孟家事不啻如已前後人所與及裴押衙所送錢物並委樊舍人主之營致生業必能不失利宜候孟氏兄弟到分付成事庶可靜守無大闕敗伏惟不致遠憂續具一一咨報不宣愈再拜伏聞賓位尚有闕員幸蒙不以常輩知遇恆不自知愚且賤思有論薦竊見朝議郎前太子舍人樊宗師孝友聰明家故饒財身居長嫡悉推與諸弟諸弟皆優贍有餘而宗師妻子常寒露飢餒宗師怡然處之無有難色窮經究史章通句解至於陰陽軍法聲律悉皆研極原本又善為文章詞句刻深獨追古作者為徒不顧世俗輕重通微曉事可與晤語又習於吏職識時知變非如儒生文士止有偏長退勇守專未為宰物者所識年近五十遑遑勉勉思有所試閣下倘引而致之密加識察有少不如所言愈為欺罔大君子便宜得棄絶之罪於門下誠不忍奇寶橫棄道側而閣下篋櫝尚有少闕不滿之處猶足更容輒冒言之退增汗懾謹狀淮右殘孽尚守巢窟環寇之師殆且十萬瞋目語難自以為武人不肯循法度頡頏作氣勢竊爵位自尊大者肩相摩地相屬也不聞有一人援桴鼓誓衆而前者但日令走馬來求賞給助寇為聲勢而已閣下書生也詩書禮樂是習仁義是修法度是束一旦去文就武鼓三軍而進之陳師鞠旅親與為辛苦慷慨感激同食下卒將二州之牧以壯士氣斬所乘馬以祭踶死之士雖古名將何以加茲此由天資忠孝鬱於中而大作於外動皆中於機會以取勝於當世而為戎臣師豈常習於威暴之事而樂其鬬戰之危也哉愈誠怯弱不適於用聽於下風竊自增氣誇於中朝稠人廣衆會集之中所以羞武夫之顏令議者知將國兵而為人之司命者不在彼而在此也臨敵重慎誡輕出入良用自愛以副見慕之徒之心而果為國立大功也幸甚幸甚不宣愈再拜愈愚不能量事勢可否比常念淮右以靡弊困頓三州之地蚊蚋蟻蟲之聚感凶豎喣濡飲食之惠提童子之手坐之堂上奉以為帥出死力以抗逆明詔戰天下之兵乘機逐利四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不被其毒洛汝襄荊許潁淮江為之騷然丞相公卿士大夫勞於圖議握兵之將熊羆貙虎之士畏懦蹙蹜莫肯杖戈為士卒前行者獨閣下奮然率先揚兵界上將二州之守親出入行間與士卒均辛苦生其氣勢見將軍之鋒㯋凜然有向敵之意用儒雅文字章句之業取先天下武夫關其口而奪之氣愚初聞時方食不覺棄匕箸起立豈以為閣下真能引孤軍單進與死寇角逐爭一旦僥幸之利哉就令如是亦不足貴其所以服人心在行事適機宜而風采可畏愛故也是以前狀輒述鄙誠眷惠手翰還答益增欣悚夫一衆人心力耳目使所至如時雨三代用師不出是道閣下果能充其言繼之以無倦得形便之地甲兵足用雖國家故所失地旬歲可坐而得况此小寇安足置齒牙間勉而卒之以俟其至幸甚夫遠徵軍士行者有羈旅離別之思居者有怨曠騷動之憂本軍有饋餉煩費之難地主多姑息形迹之患急之則怨緩之則不用命浮寄孤懸形勢銷弱又與賊不相諳委臨敵恐駭難以有功若召募土人必得豪勇與賊相熟知其氣力所極無望風之驚愛護鄉里勇於自戰徵兵滿萬不如召募數千閣下以為何如儻可上聞行之否計已與裴中丞相見行營事宜不惜時賜示及幸甚不宣愈再拜季冬極寒伏惟僕射尊體動止萬福即日愈蒙免蒙恩改職事不任感懼使至奉十一月十二日示問欣慰殊深贊善十一郎行已附狀伏計尋上達愈雖未獲拜識嘗承僕射眷私猥辱薦聞待之上介事雖不允受賜實多頃者又蒙不以文字鄙薄令撰廟碑見遇殊常荷德尤切安有書問稍遂敢自疏比所與楊書記書蓋緣久闕附狀求因間粗述下情忽奉纍紙示問辭意重謺捧讀再三但增慚悚僕射公忠賢德為內外所宗位望益尊謙巽滋甚謬承知遇欣荷實深伏望照察限以官守拜奉未由無任馳戀謹因使回奉狀不宣謹狀比來不審尊體動止何似乍離闕庭伏計倍增戀慕愈於久故遊從之中伏蒙恩獎知待最深最厚無有比者懦弱昏塞不能奮勵出奇少答所遇拜辭之後竊念旬朔不即獲侍言笑東望殞涕有兒女子之感獨宿直舍無可告語展轉歔欷不能自禁華州雖實百郡之首重於藩維然閣下居之則為失所愚以為苟慮有所及宜密以上聞不宜以疏外自待接過客俗子絶口不挂時事務為崇深以拒止嫉妬之口親近藥物方書動作步趨以致和宣滯為國自愛副鄙陋拳拳之心幸甚幸甚謹奉狀不宣愈再拜所示情眷之至不勝悚荷臺參實奏云容桂觀察使帶中丞尚不臺參京尹郡國之首所管神州赤縣官帶大夫豈得却不如事須臺參聖恩以為然便令宣與李紳不用臺參亦是何典故赤令尚與中丞分道而行何况京尹人見近事習耳目所熟稍殊異即怪之其於道理有何所傷聖君使行即是故事自古豈有定制也停推巡緣府中褊迫是實若別差人即是妄説豈有此事小人言不可信類如此亦在大賢斟酌而斷之流言止於智者正謂此耳客多自修報狀不得伏惟照察愈白侯生足下所示論語問甚善聖人踐形之説孟子詳於其書當終始究之若萬物皆備於我反身而誠是也苟有偽焉則萬物不備矣踐形之道無他誠是也足下謂賢者不能踐形非也賢者非不能踐形能而不備耳形言其備也所謂具體而微是也充實之謂美充實而有光輝之謂大充實則具體未大則微故或去聖一間或得其一體皆踐形而未備者唯反身而誠則能踐形之備者耳愈昔注解其書而不敢過求其意取聖人之旨而合之則足以信後生輩耳此説甚為穩當切更思之愈白十二月某日愈頓首伏承天恩詔河南敦喻拾遺公朝廷之士引頸東望若景星鳳凰之始見也爭先覩之為快方今天子仁聖小大之事皆出宰相樂善言如不得聞自即大位已來於今四年凡所施者無不得宜勤儉之聲寬大之政幽閨婦女草野小人飽聞而厭道之愈不通於古請問先生世非太平之運歟加又有非人力而至者年穀熟衍符貺委至干紀之姦不戰而拘纍強梁之凶銷鑠縮栗迎風而委伏其有一事未就正自視若不成人四海之所環無一夫甲而兵者若此時也拾遺公不疾起與天下之士君子樂成而享之斯無時矣昔者孔子知不可為而為之不已足迹接於諸侯之國今可為之時自藏深山牢關而固距即與仁義者異守矣想拾遺公冠帶就車惠然肯來抒所蓄積以補綴盛德之有闕遺利加於時名垂於將來踴躍悚企傾刻以冀又竊聞朝廷之議必起拾遺公使者往若不許即河南必繼以行拾遺徵君若不至必加高秩如是則辭少就多傷於廉而害於義拾遺公必不為也善人斯進其類皆有望於拾遺公拾遺公儻不為起是使衆善人不與斯人施也由拾遺公而使天子不盡得良臣君子不盡得顯位人庶不盡被惠利其害不為細必望審察而遠思之務使合於孔子之道幸甚愈再拜愈聞士有己未達而達人者大夫意寧實之哉小人誠其人今言則無故過濡恩惠思以極報之謂也伏惟閣下仁義風天下任帝室宏奇名譽之美刑政之威化道之事使四方無聲色之娛金帛之富車服之制以從之則亦稱顯位雍容暇豫而又何求則可以取特達不羈之士奉之以非常之禮俾耀名天下答天子鴻恩側見河東薛公達年二十有六抱驚世之偉材發言挺志敻絶天秀服仁食義融內光外直剛質與世不常想其升朝廷議凜瑩冰玉隱慝潛姦滅心鑠謀然今尚幽塞未光韜縮銛利靜居河洛惟高公之清風驅馬千里文以為贄求拜華軒公則見之矣遇未甚厚懼左右者不明喜蔽能黷聽不令之言故小子忘懼激憤獻此惟公明之夫垂纖餌溟泉冀吞舟之魚則疏施薄禮天下取特達之士亦難大夫其裁之愈聞儒服者不敢用他術干進又惟古執贄之禮竊整頓舊所著文一十五章以為贄而喻所以然之意於此曰豐山上有鐘焉人所不可至霜既降則鏗然鳴蓋氣之感非自鳴也愈年二十有三讀書學文十五年言行不敢戾於古人愚固泯泯不能自計周流四方無所適歸伏惟閣下昭融古之典義含和發英作唐德元棄詭説保任皇極是宜小子刻心悚慕又焉得不感而鳴哉徒以獻策闕下方勤行役且有負薪之疾不得稽首軒階遂拜書家僕待命於鄭之逆旅伏以小子之文可見於十五章之內小子之志可見於此書與之進敢不勉與之退敢不從進退之際實惟閣下裁之愈不肖行能誠無可取行已頗僻與時俗異態抱愚守迷固不識仕進之門乃與㣥士爭名競得失行人之所甚鄙求人之所甚利其為不可雖童昏實知之如執事者不以是為念援之幽窮之中推之高顯之上是知其人之或可而不知其人之莫可也知其人之或可而不知其時之莫可也既以自咎又歎執事者所守異於人人廢耳任目華實不兼故有所進故有所退且執事始考文之明日浮囂之徒已相與稱曰某得矣某得矣問其所從來必言其有自一日之間九變其説凡進士之應此選者三十有二人其所不言者數人而已而愈在焉及執事既上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉其一人者則莫之聞矣實與華違行與時乖果竟退之如是則可見時之所與者時之所不與者之相遠矣然愚之所守竟非偶然故不可變凡在京師八九年矣足不迹公卿之門名不譽於大夫士之口始者謬為今相國所第此時惟念以為得失固有天命不在趨時而偃仰一室嘯歌古人今則復疑矣未知夫天竟如何命竟如何由人乎哉不由人乎哉欲事干謁則患不能小書困於投刺欲學為侫則患言訥詞直卒事不成徒使其躬儳焉而不終日是以勞思長懷中夜起坐度時揣已廢然而返雖欲從之末由也已又常念古之人日已進今之人日已退夫古之人四十而仕其行道為學既已大成而又之死不倦故其事業功德老而益光故詩曰雖無老成人尚有典刑言老成之可尚也又曰樂只君子德音不已謂死而不亡也夫今之人務利而遺道其學其問以之取名致官而已得一名獲一位則棄其業而役役於持權者之門故其事業功德日以忘月以削老而益昏死而遂亡愈今二十有六矣距古人始仕之年尚十四年豈為晚哉行之以不息要之以至死不有得於今必有得於古不有得於身必有得於後用此自遣且以為知己者之報執事以為何如哉其信然否也今所病者在於窮約無僦屋賃僕之資無縕袍糲食之給驅馬出門不知所之斯道未喪天命不欺豈遂殆哉豈遂困哉竊惟執事之於愈也無師友之交無久故之事無顏色言語之情卒然振而發之者必有以見知爾故盡暴其所志不敢以默又懼執事多在省非公事不敢以至是則拜見之不可期獲侍之無時也是以進其説如此庶執事察之也六月九日韓愈白秀才辱問見愛教勉以所宜務敢不拜賜愚以為凡史氏裦貶大法春秋已備之矣後之作者在據事迹實録則善惡自見然此尚非淺陋偷惰者所能就况裦貶耶孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死齊太史氏兄弟幾盡左邱明紀春秋時事以失明司馬遷作史記刑誅班固瘐死陳壽起又廢卒亦無所至王隱謗退死家習鑿齒無一足崔浩范蔚宗赤誅魏收夭絶宋孝王誅死足下所稱吳兢亦不聞身貴而今其後有聞也夫為史者不有人禍則有天刑豈可不畏懼而輕為之哉唐有天下二百年矣聖君賢相相踵其餘文武之士立功名跨越前後者不可勝數豈一人卒卒能紀而傳之邪僕年志已就衰退不可自敦率宰相知其無他才能不足用哀其老窮齟齬無所合不欲令四海內有戚戚者猥言之上苟加一職榮之耳非必督責迫蹙令就功役也賤不敢逆盛指行且謀引去且傳聞不同善惡隨人所見甚者附黨憎愛不同巧造語言鑿空構立善惡事迹於今何所承受取信而可草草作傳記令傳萬世乎若無鬼神豈可不自心慙愧若有鬼神將不福人僕雖騃亦粗知自愛實不敢率爾為也夫聖唐巨迹及賢士大夫事皆磊磊軒天地決不沈沒今館中非無人將必有作者勤而纂之後生可畏安知不在足下亦宜勉之愈再拜愈啓孟夏漸熱惟道體安和愈弊劣無謂坐事貶官到此久聞道德切思見顏緣昨到來未獲參謁倘能暫垂見過實為多幸已帖縣令具人船奉迎日久佇瞻不宣愈白愈啓海上窮處無與話言側承道高思獲披接專輒有此咨屈儻惠能降諭非所敢望也至此一二日却歸高居亦無不可旦夕渴望不宣愈白愈啓惠勻至辱答問珍悚無己所示廣大深迥非造次可諭易大傳曰書不盡言言不盡意然則聖人之意其終不可得而見耶如此而論讀來一百遍不如親見顏色隨問而對之易了此旬來晴明旦夕不甚熱倘能乘間一訪幸甚旦夕馳望愈聞道無疑滯行止繫縛苟非所戀著則山林間寂與城郭無異大顛師論甚宏博而必守山林義不至城郭自激修行獨立空曠無纍之地者非通道也勞於一來安於所適道故如是不宣愈頓首愈啓伏見册命皇帝以閏月三日嗣臨大位以主神人含生之類孰不蒙賴相公翼亮聖明大慶資始伏惟永永與國同休愈下情不勝慶躍限以所守不獲隨例拜賀謹差某奉啓不宣謹啓愈啓伏蒙仁恩猥賜示問感戴戰悚若無所容措然尚有厥誠須盡露於左右者敢避其煩黷懷不滿之意於受恩之地哉愈幸甚三得為屬吏朝夕不離門下出入五年竊自計較受與報不宜在門下諸從事後故事有當言未嘗敢不言有不便於己輒吐私情閣下所宜憐也分司郎官職事惟祠部為煩且重愈獨判二年日與宦者為敵相伺候罪過惡言詈辭狼藉公牒不敢為恥實慮陷禍故前者懷狀乞與諸郎官更判意雖甚專事似率爾言語精神不能自明不蒙察允遽以慙歸僶俯日日遂踰纍旬私圖其宜敢以病告鳲鳩平均歌於國風從事獨賢雅以怨刺伏惟俯加憐察幸甚幸甚愈再拜愈啓愈為相公官屬五年辱知辱愛伏念曾無絲毫事為報答效日夜思慮謀畫以為事大君子當以道不宜苟且求容悅故於事未嘗敢疑惑宜行則行宜止則止受容受察不復進謝自以為如此真得事大君子之道今雖蒙沙汰為縣固猶在相公治下未同去離門牆為故吏為形迹嫌疑改前所為以自疏外於大君子固當不待煩説於左右而後察也人有告人辱罵其妹與妻為其長者得不追而問之乎追而不至為其長者得不怒而杖之乎坐軍營操兵守禦為留守出入前後驅從者此真為軍人矣坐坊市賣餅又稱軍人則誰非軍人也愚以為此必姦人以錢財賂將吏盜相公文牒竊注名姓於軍籍中以陵駕府縣此固相公所欲去奉法吏所當嫉雖捕繫杖之未過也昨聞相公追捕所告受辱罵者愚以為大君子為政當有權變始似小異要歸於正耳軍吏紛紛入見告屈為其長者安得不小致為之之意乎未敢以此仰疑大君子及見諸從事説則與小人所望信者少似乖戾雖然豈敢生疑於萬一必諸從事與諸將吏未能去朋黨心蓋復黤黮不以真情狀白露左右小人受私恩良久安敢閉蓄以為私恨不一二陳道伏惟相公憐察幸甚幸甚愈無適時才用漸不喜為吏得一事為名可自罷去不啻如棄涕唾無一分顧藉心顧失大君子纖芥意如邱山重守官去官惟今日指揮愈惶懼再拜國子監應令新注學官等牒準今年赦文委國子祭酒選擇有經藝堪訓導生徒者以充學官近年吏部所注多循資敘不考藝能至令生徒不自勸勵伏請非專誦經傳博涉墳史及進士五經諸色登科人不以比擬其新受官上日必加研試然後放行上副聖朝崇儒尚學之意具狀牒上吏部仍牒監者謹牒孔子曰道之以政齊之以刑則民免而無恥不如以德禮為先而輔以政刑也夫欲用德禮未有不由學校師弟子者此州學廢日久進士明經百十年間不聞有業成貢於王庭試於有司者人吏目不識鄉飲酒之禮耳未嘗聞鹿鳴之歌忠孝之行不勸亦縣之恥也夫十室之邑必有忠信今此州戶萬有餘豈無庶幾者耶刺史縣令不躬為之師里閭後生無所從學爾趙德秀才沈雅專靜頗通經有文章能知先王之道論説且排異端而宗孔氏可以為師矣請攝海陽縣尉為衙推官專勾當州學以督生徒興愷悌之風刺史出己俸百千以為舉本收其贏餘以給學生廚饌
