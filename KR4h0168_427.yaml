front:
  text: 全唐文欽定全唐文卷四百二十七于卲五
  hash: sha256:f9b3cfaa3f79601a0ca1a41e35ab9ab9478c9d2b7d61ae1f6b24551825428127
body:
  text: 六藝詩人之蘊雅貫三極而正存象外班九流而化行天下夫然則游夏登科於孔門獨擅文學雖風流萬古而不易者文乎哉且日新之謂盛德崇業之謂不朽自大劒之南在漢有文翁實長西蜀開設學校為來者宗師順流千載而餘芳不泯歷魏有高朕晉有張華皆好古博聞能述先事講信修睦傳之無窮是以在帛丿糸有巴渝有挾鼓濮率相勸道人無隱焉洎大歷初尚書左僕射冀國崔公登壇受命邊鄙不聳既國用偃武而家將訓文近取諸身旁求是類高選幕客無非其人彬彬然文質協乎中而英華發乎外矣殿中侍御史滎陽鄭公道同斯應參乎理戎以玉帳之暇而清詞閒作盈我懷袖式歌且謠以為離㣥索居誰與晤語故自相府及冀公達於儲公凡所獻酬纘為三卷仍以屬和為集之目夫屬和者唱予和汝擊發商徵亦取諸伐木相求之義斯蓋鄭君之意也同聲于卲聞而且喜即之寓目煜若春榮遂詢我以宣布咨我以序引取彼敝帚無相患焉伊人之平康由我以專達否則政弛人何賴焉在昔漢宣永懷至理思與二千石之良者共之貞深其元以化天下非道熙陟降理際天地則不可膺是高選尚書左僕射冀國公審才以底用論定而後請將欲更蘇息復整齊且如張公無出其右繄受授則為憯怛彼嘉陽之人所益多矣况學致廣大心自精微議道置法若示諸掌一舉雲翼三十為郎分兵領部義然後取以公之才大時論用少以今之多艱乎謂用大則用之大用小則用之小在我而已抑無懵焉良月選吉輕舟既具長空青冥未有黃落緹騎百從載旌而前戈矛生風左右如武且犀灘古地熊阜外虞通波萬里并容攸攝其無以易者盍思無邪耶嘗寮為心望此行矣大幕邀餞三軍助較樂只君子如何可忘而後利涉信宿人歸父母其顏渥丹下令如春受教賜知常謀始疑不浹年而國賦足軍實倍啟迪恢達為諸侯雄大君當宁之七載也日月會於降婁有詔尚書倉部郎中王公恭寬敏惠出典于蘄蘄之上有革車外賦有牙幢華領思與良二千石共理者朝廷久之亦既俞往允茲僉屬曾未浹辰抗手言邁惜此別易合宴公堂期其出郊于以送遠且觀坐彼一方困于無告誰為禁暴聞公知歸邦非人則不寧政無從則奚措今所往者人安之哉公之下車曾是為念以公之素範不敢言利因公之善價無乃近名唯名之崇唯德是累將善救物繄公冀焉然後導達其和發萌以慮化行無二當借寇恂理平第一更徵黃霸他日之會賓寮有光悠悠斾旌灔灔春物想青林之漲水見黃石之平磯佳興未孤前期猶邈賦詩追餞者翰林之故事吾何閒然食租衣稅王者之常賦自至德改元之後兵連天下軍用仰給四方諸侯各有戎事將發內布外而王命急宣不咨皇華無以專達前十數輩皆課登而旋今尚書戶部郎李公中朝駿選次董斯任以西蜀最大南賝多賈委之斯來于以蕆事是以數年于茲卒多前功冀公憂國忘家一心同德方錫貢以納貺度於常算故泉穀之分必先此矣達于上京然及方鎮遂能入者億計行者接武秦郊不關持此更費冀公之勤其國本也如此李公之達于時用也如彼使乎誰務將膺對敭挾兩驂以戒途歌四牡而復命北驛開餞中軍宴私滿院香風雜花潛送廣庭張樂妙音交作冀公以請召未許送君先鞭我心如馳不敢留止行復題已赤管俯伏青蒲答天子休命當使臣之始賞者爾國有戎事今茲十年外姦內宄略無寧歲是以人之思理不教而然者久矣夫非良二千石則無以光昭帝俞勤恤人隱自邑居蕩析牧守承弊中和頌聲斯道寖息今皇帝之臨御也嘗垂意於理道夫能官人則能安人為官而擇人俾受永賴尚書駕部郎中劉公司門員外郎李公分命之拜中朝駿選劉公之舉也以宣慈惠和李公之得也以溫良恭儉咸推大略仁而愛人文學政事家邦必達矧茲偏隅由我專制苟利於物其可易乎然後理兵期于知禁求瘼在乎不擾澤流愷悌汔可小康豈潁川之姦黨散落濟南之畏如大府而已哉壽星之會凉秋八月言辭北闕將騖南轅惜五馬之不留合六官以追餞乃卜勝撰吉咸集于吏部郎元公之居室地遠朝市家藏水木納終峰於宇下道漆園于方外風迴景泛匪寒匪燠入室而芝蘭襲人趨庭而珠玉交輝琴言自清座右必誡夫然則行者可以慰遠道居者可以依翰林二公於是撫席而言曰西楚風殊東巴路迥高堂雲雨遇荊門而可見皇州冠葢別瀟水以長懷多謝故人醑我以酒寵我之作㣥公何謂以不腆斯文遂冠于篇首總南宮之賦者凡四十有六章次之爵里亦當使君之佳傳云孔宣父說儒者之行有自立焉有近人焉有交友焉研精六藝較明舊史貫天人之際探得失之源非自立歟仗義而居立信為寶難得易失不謀苟合非近人歟終始之要膠固也患難之失身命也益者損者吾其擇焉非交友歟夫然則道之將行周流四海而無匱者庸可既乎頃年隱廬山之霧去秋舉湘江之帆聞有道而來終有得而去所合必義所依必仁凡諸揖奉惜此言別累卜勝餞屢邀醉心雖雲蒸霧毒猶勝炎風而疎桐衰柳亦傍秋色時之所感事有攸會切於覲問而速是行者則尚書季父領鎮南之軍伐淮西之叛方除天地之害載戢干戈之威用重望係人渴日為久與尚書備相知之分憶昨執手于今三年負累遐荒莫由展禮南北不援我勞如何願即寤寐之勤永奉通明之德嘗讀舊史氏見汲長孺之為人與之並生其時則隨從長者不敢避風雨况今之有人而捨勤乎太子僕馬公骨鯁端莊則如此而布和展惠信而好古煥乎其有文章則汲生之所不及明矣方將摶空直上高視寥廓秉尚父黃金戊登范睢青雲顧夫蒼生不為負矣屬㣥盜未息四郊猶虞春闈無事冬日可愛故自南自北從諸侯遊如竹箭之有筠雖霰雪之奚及未可量也予固不敏奉以周旋幾合獻酬之禮且陪文酒之事青溪白雲引我歸思槭槭寒水颼颼冰岸道勝獨往高歌以行夫至人達觀物無不可出則耀金組入則狎蓽蘿蓋與時消息在我舒卷㣥公悵別則如之何大盜既滅東郊遂啟前馳龜蒙左夾遼碣過數千里革戎反華彼阻戎之餘承復禹之慶駿奔走滌怨思兼諸匪人因得請命連踵闕下歸甚忘亡是以厥田厥筐之貢不待錫而至者已紛紐於長府申命職方郎中滎陽鄭公達於伊洛以總其事夫劇不可以專精故資於命介道且求於兼適必託乎至公大理評事天水趙侯當交辟之下膺至公之選罷戎西府受詔東周虛舟出不繫之外景鐘為待叩之用故士君子隨之而不避風雨則文行忠信不其末歟鳳翔尹兼御史大夫高公勤於客禮迫此王命曾是公器與時共之追鋒告行惜別而已行軍司馬侍御史李公玉帳居左金罇敘離㣥公當筵相顧不足白日陶暑青槐好陰牙幢宴如亦既醉止左右歡甚詩人興全爭論逸價特以餉趙故拜命之辱輒冠于首篇皇上御㝢之明年布和發號其在野無遺賢將以啟迪理本蓋古先哲王之前大者分命十使周流天下弓旌一舉㵎陸其空戶部侍郎趙君故得譚子於瀟湘矣譚子受薦不拜趙君當薦不避朝廷官之不疑君子悅是三者之備公也者其至矣哉况恭懿明允文為在禮發言有章臨事不惑可以入備顧問出咨典謨豈止祖述六藝指歸舊史栖遲龍樓之下寂寞鉛槧之閒哉僕孤奉盛明黜佐藩徼不自意而邂逅相遇念一老而得之周旋嘗與語言為我消息日月之會時惟季冬星迴於天歲且更始晻慘蕭索長年所悲豈堪伊人告我以去方將背九嶷之積阻泛蒼梧以連海經界于分廣會合于上都謁崇明馳象魏講舊於知巳從事于吾黨雲霄之外自此而階遷客者何敘之而已予廣德年三掌注起居建中初擢修國史討論之際嘗覽周朝作相奕世載德名列於紫微事傳于青史者今協律劉侯之先歟協律富有文采挺然秀拔懷長策以待時感知巳而為用似續以才而不階門戶求合以道而不憚風塵士君子之行有足多也零桂雖秋凉風未至江山緬邈言出東路帆席悠悠指途南海南海有國之重鎮北方之東西中土之士庶䑸連轂擊合會於其閒者日千百焉况中丞元公載輯斯人言愍其旅金節始按休聲洽聞求賢重官方賀封往老夫病矣負累杜門幾煩相問挹我以禮愧無風水之便且有登臨之別行矣自愛吾無閒焉紀氏之子曰文楚資於事母而敬愛兼則百行可知博於好古而功業著則文采可知丈夫於代能有是而無倦加體道以自牧出入中外身無擇行為不達者未之有也頃屬世故家貧背胡越嶺執爨以養當車就安人皆知之用是不乏所以長者繼轍來者升堂既榮于親又悅其子甚大慶也夫時有通塞事有從宜親安道存適則為可容州經畧之府南據交趾北達蒼梧李郎中受委中朝聯典大郡凡有化理悉為世程紀子嚮風慕義不遠千里釋板輿即輕舸晨餐夕膳不改舊物從一樂土之一樂土誰其閒焉郎中之愛子良鈞業擅家寶官登王畿美秀而文芝蘭可襲吾子一見足以滌塵慮慰客遊與諸子之得子亦何以異也行矣自愛時興元大赦之仲春桂林遷客于卲之別序云與子中外表也親之至也異姓莫先暌隔不面老而方合可謂長歎息矣曷期遠會于零桂之閒哉大火之交南秋可畏其歘如蒸其華轉鮮昏霾而禽鳥欲絕曦赫而薄鑠無措易練不足以禦流汗並燎不足以敵炎氛予遷客也是甘其艱子薄遊也何在斯獘况依藉門戶本儒家之文行總貫陰陽乃王官之武備聰明精密道不苟全真吾人之益者也以世多故始家廬陵悲鄉國之眇邈想邱園之蕪沒羈旅南土復何言哉季子無金未下妻嫂淮陰寓漂終取王侯無以風雨為晦無以名位自薄乘時體命其乃光乎予屬湘東之命子有滏西之役非適之適我勞如何雲天茫茫行矣自愛方伯盧公因牙門之清淨闢前館之爽塏乃命宿設具牢加籩言邀故人以寵行也清河崔子曰真源嘗典校石渠應諸侯之聘踐言勵行積學累藝而建中初天下文明懼乎遺逸黜陟十道君舉先行有詔集於京師將以更秩既而容管經畧處置使隴西李公從而請焉猗歟真源以受命底祿已利也以從人之求國務也身不可先于國祿不可急于求翻然迴車假道于桂盧公執疇昔之好惜今辰之別朝陽初升賓筵始合子夜云艾主賦未晞觵觶交飛而取樂塤箎相協以奏雅盧公意未之盡將命以篇顧謂遷客曰罷論幾何日輟使復何日請子之敘我今夕于子離席而辭曰老者敗者僚者末也憂能傷人思無可者公之所命其得人乎公曰得哉是敢操而進發言有素一以論我公之講舊一以樂李公之得賢風煙不殊南北暫閒顯允崔子勗哉令聞云舍人丈以元昆尹京之明月始為西府連辟將展驥足于廣西之地所以懲彼叛亂與人休息君子謂此舉也得於治理失於屈賢譬諸汙地而集鵷鳳矣然則國家多故亭障猶虞不為利遷可以道進所居則化我何在焉况王褱姿偉望約之以禮兄友弟悌必因子心無終食之閒違仁矧三州之與四海云爾哉勉此于邁怡然告別㣥鶯尚囀四月猶花長江一望翠屏如畫佳興滿目曷唯宦遊監察御史楊公特進兼鴻臚吳公慰相宴接情言不盡諸公陪歡各以義洽卲野人也實忝中表趨風自允渴日增勤俄然仳離如失羽翼郊坰之送惜也何言河隴之塞秋為邊防每歲徵師郡縣強家之子能控弦帶甲勇為人敵而應召焉行軍司馬侍御史藺公戒茲戎昭來閱軍實威用震罰而不及人爰興六月之師集我三邊之事况長源自清但挹朝海大厦已構尚勞持斧位寵杜詩之選職由韓厥之寄參彼玉帳鎮茲金方亦既勤矣由是正風俗恤人隱刑章無頗頒賦唯允上行下效心莫不盡大鴻臚吳公國之良二千石也必先中權之令載勤東道之禮金蘭用譽風味相合樂只君子會于公堂清絃發越洋洋乎盈耳一夕三醉主人曰未也若然者㣥公陪歡其有閒乎秋八月鶗鴂始鳴眾芳皆歇我有歸思整轅而西晴川淅瀝日上旌斾寒野莽蒼風入筋幹况肅殺以時虜騎方下元戎之師且有後命行軍欲久留得乎請言詩以寵餞薦周旋而不墜耳丈人承門戶之資擢衣冠之秀司武湖上休有令聞移家澧陽吾取道勝蓋內緣世故從所擇焉况端公丈二十年閒王事靡盬開物致理洽聞朝廷辟公府而載峩鐵冠鎮方隅而寵授金鉞膺我重寄每懷離別豈不欲往職是總戎六丈念切在原崎嶇過嶺亦既至止自冬徂春二龍齊驤黼黻交映出恭入友論者榮之春二月巾車戒僕言首歸路凡我同志猶惜別如此而况端公是日之心乎觀察判官鄭公初筵叙離方繼以夜願畱侯騎陪盡此歡舉白而眾賓已酣未晞而主人猶請卲上負明聖來佐藩隅終沐廕庥忝招座右睹今夕之樂想分歧之恨豈登山臨水而曰送乎御史大夫李公擁旌旄領鳳翔尹西控數州之地將戡定叛亂糾逖寮吏未及下車而思其人故司馬之才膺此駿選幕中之畫居然有待公頃佐是藩天蹕在雍戎馬鉅計注之有司大東小東無不仰給日承顧問休聲四聞人到于今咸受其賜交辟之下得無光乎况宏畧泉深碩謀雲蓄材氣自逸禮容必循鴻鵠之舉烟霄可仰在此行也公之友兄銜命在館繡衣持斧金玉相鮮不由其門孰見庶美驥足方騁鴒原惜別河橋一分雲岫千里鳳皇潭上刁斗初傳寶雞祠下旌旗不卷以此送遠豈如贈言行前鶯花亂我心曲干旄美得賢也二三子取而賦之洪州之為連率也舊矣自幽薊外姦加之以師旅十年之閒為巨防焉當閩越奧區扼江關重阻既完且富行者如歸逌往之國今大和會故朝廷重於鎮定咨爾宗枝勉移獨坐之權實專方面之寄七州奔走而承命一都風化以在我是以王司議得為副車况加彼數賢為之為理何憂乎杼軸為獘何畏乎寇戎不奔歟然則政由宇下風馳境上上下之交理道彰矣良辰歲首㣥公敘離蒼然霜林墜葉為聚別怨既如此歲窮又如此豈長年之所獨悲抑同人之所增歎卲史官也職在書法以中丞宣力王室以司議碩畫幕中予將書之行矣自念大河故瀆魏之奧境魏大名也今國家以連帥之重特命右僕射田公以鎮撫焉授方面之寄為諸侯之倡職貢不俟於命錫朝奏必資於佐幕是以張侯有獻歲之會一之日天子勞勤于次二之日有司行賞以秩因題柱之舊榮加專席之新寵風生漢闕價重周行光照帝俞僉允時望且端揆有度材之鑒中司懷匪石之心溫溫恭人表以光大多矣恩逾三接詔復兩河向銅臺之地遙覽上京之春盡柏署追餞粉闈惜別才兼二美識者榮之今襄海無虞人神助道遵我王度樹之風聲有來雍雍信足樂也詩可以㣥興而㣥公賦之聖朝以上台清河王鴻勳茂績焯見㣥后俾兼綰中樞將二十年南征北伐投艱排難則倍之矣是則國有恒岳以公配之而有土天有上將以公委之而分閫勤則至矣位亦極矣談者為美其誰閒然故得高枕安邊包茅述職出獎忠義入延秀異不遠數千里而得盧君君亦感激知巳奔波從事雖立資於時實由昔用譽不家而食盡室以行峨鐵冠而利往陪玉帳以叅畫何風雲會合而至是乎初此行也鍾陵有連帥之府落帆江浦上謁告離府公以稟命則同獎王室修好則不閒遐方爰遵上公是厚賓介我以雜佩必先餼牽便蕃初筵禮無違者元冰仲月白鴈南飛大舟橫江信宿千里且務從軍之樂不賦苦寒之行蓋時人義之者多矣僕江西旅人也趨風明庭同等見顧常忝座右之客不賤屏外之員送君此行抑有由也然安得容容摻子之袪乎高侍御文行忠信士林之秀者也御史大夫崔公大勳既集視人如理高選入幕實佐戎機至於是邦隱若敵國攬轡之後郡邑以清若然者艱難之時事鮮不及矣十一月河冰始堅山葉皆盡冒此寒嶮屆於漢陽且欣郊迎然後疆事昨又繼燭盡使君之歡今之初筵合舍人之宴入室而喜親狐白當杯而願解豸冠熒煌蠟花可以醉止請贊露晞之賦用慰臨歧之恨爾今年夏日月會於鶉火公治分汴東之幕經度邦賦於桂之南議絕乎爭蒸人得以相慶秋九月薦加五府之命自嶺之外一以咨之而中丞包公舉賢任能捐萬里勞費之煩委一都專達之計我州我庶雖違德實難予取予求而受賜猶舊觀察使范陽盧公愴雲天之忽閒惜姻好之遐阻置酒高會邈歡累日誰言醉止必待露晞然後維舟陽江宿設候館遊以舟楫欲別不能漲濤湧澐長空不分須外徼以內賦詠蒼梧之白雲所以道與會壯遊心逸聚散之分我勞如何况公風監恢達博聞明辨從事貞固守常直道奉緇衣之前慶乘扶搖之上激作人之表予所望焉昭昭令聞日賀光大矣文者人之華行者人之實不華無以見本匪實無以要終是以致知在格物物格則知至及夫至也何所不集焉尹十五官其集之矣故忠信寶於家貞幹珍於國前年度支剏平糴之法典斯南海今春轉運即均輸之便導彼西江豈止度四方經費之用蓋在佐副相尹丞之秩先是太夫人在堂指途於涔陽原隰煌煌潔爾壽觴由此告歸孰不稱慶况高門傳綸詔之榮相宅主公台之兆光啟前列我有憑焉孟夏吉朔雲陰四合風雨如晦江濤若崩南飈未迴好是行邁老夫沐普恩之宥承近地之遷鶉之首尾可以交歡言且貺別私其則那馮翊嚴氏之子曰謩昭宣世業嗣續未廣能讀古訓雅為新詩有叔度黃中之稱有季野四時之備故清風襲人人得披襟而前蓋所嚮者多矣去年冬鄭司勳奉服嶺之役以掄才官人將子為介以禮一而貳事則於交廣乎何有今年春將復命奏庸公以便道歸定省尋水之下可歌白華龍駒生庭神仙作尉至是邦也而賀者盈門味道探賾遂亦浹辰以王事期迫不敢怠忘是以元方不得將車而旋嚴尊猶切倚門之望有以然也與司勳有西掖之舊文行忠信君子人歟既與子同事又與子同術不曰追飛雲霄既將置之州牧盧公敘別于初筵郎中蕭公置酒于翌日皆飛白縱飲高歌結歡屬天降霖潦九派會同雲帆際天行亦勤矣余羈紲未解處墊溺之地與子言別夫復何聊㣥公推以舊老略其敗北俾冠首篇得不謂之牽歟常山公于卲序服嶺之外列巨防者五而容其一焉自中原多故邑居蕩析始則有長吏苟完之命今年春有詔特命元公都督十二州諸軍事資其庶富而宣乎教化者也夫教之以禮化之以仁俾其歸于王而不隔乎荒則書同文車同軌當南北數千萬里而述職焉不其遼哉博陵崔公光膺副車之選秋八月傳次于壽春安豐縣之東亭前臨芍陂渺漫無際雖淮海之內浸藪則多而勝景之中堪遊蓋少故邀留貺別非此而何卲孤奉明恩負累炎徼邂逅相遇歡戚不同既而前多歧路行有先後日暮猶遠自有窮途之泣木葉微脫更切長年之悲其賦離之什則亞相崔公冠于首矣㣥公其次第之兩河稽誅為日久矣固是迷悖腥聞於天法將汙瀦罪爾無赦是用調發集于東郊瞻上將于五道興王師之十萬千金之費實資經度之中別有鹽府既博之用不勤於人豈與夫漢武事邊窮兵蜀主以小謀大而較其損益哉則天下怙亂不得不除宇內稱兵不得不滅總是任者惟我國楨兼御史中丞包公專其事佐衞倉曹房公分其巡公英姿秀發相門流慶以公忠為已任以學行為身文蹈和以全真修睦以合義長途逸翮則未可涯冬十月桂林務要畨禺利往輕楫既具高帆欲張煌煌元公作鎮南海在公為外舅在國為屏臣潘楊佳姻冰玉相映式瞻之地其誰不懷桂管經略觀察使范陽盧公惜雲雨為別悵江山暫閒置酒高會徵詩寵行南天不寒四氣爭暑黃柑未摘盧橘又花請因眾芳以動佳興將我府公之厚意也
