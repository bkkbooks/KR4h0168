seq: 35
front:
  text: 全唐文欽定全唐文卷三十五元宗十六
  hash: sha256:3ff2d5081298ba40d131d8f97c4688d774b22ef06b2568f6d362da3ff204fc77
body:
  text: 朕聞舞者所以節八音而行八風豈徒誇詡時代眩曜耳目而巳也自立雲韶內府百有餘年都不出於九重今欲陳於萬姓冀與羣公同樂豈獨娛於一身且珠翠綺羅孰非珍玩嘗念百金之費每惜十家之產是以所服之服俱非綺羅所冠之冠亦非珠翠若弋綈之制大帛之衣德雖謝於古人儉不忘於曩哲庶羣公觀此當體朕之不奢朕欲妙擇牧宰以崇風化亦欲重其資望以勵衣冠自今巳後三省侍郎有闕先求曾任刺史者郎官闕先求曾任縣令者勅益州長史張敬忠頃者西南阻化徭役殷繁山川既接於夷戎縣道有勞於轉輸自卿鎮撫百姓咸安革弊遷訛良多慰沃歲陰寒極比平安好今賜卿衣一副至領之蜀州青城先有常道觀其觀所置元在青城山中聞有飛赴寺僧奪以為寺州既在卿節度檢校勿令相侵觀還道家寺依山外舊所使道佛兩所各有區分令使內品官毛懷景道士王仙卿往蜀川等州故此遣書指不多及不息惡木忍渴盜泉行道之人避惡名也朕常覽上黨記稱秦坑趙卒血流丹谷名其水為丹水者省方此路懷古惻然邑號獲嘉地稱修武前王故事將有所憑宜改丹水為懷水改丹水府為懷仁府其鄉里名號亦仰州長官隨事改易封祀告成為萬姓祈福必資清潔以副朕心其行事官及齋郎應致齋者宜令御史行齋切勿容踈怠比來所擬法官多不慎擇或以資授或未適才宜令吏部每年先於選人內精加試灼然明閑法理者留擬其評事以上仍令大理長官相加擇並不得授非其人朕聞以道得人者謂之儒切問近思者謂之學故以陽禮教讓則下不爭以陰禮教親則遠無怨豈非習無不利教所繇生者乎朕以厚儒林闢書殿討論易象研覈道源冀淳樸大行華胥非遠而承平日久趨競歲積謂儒士為宂列視之若遺謂吏職為要津求如不及頃亦開獻書之路觀揚己之人闕下之奏徒盈席上之珍蓋寡豈宏獎之義或有未孚將敦本之人隱而未見天下官人百姓有精於經史道德可尊工於著述文質兼美宜令本司本州長官指陳藝業錄狀奏聞其吏部選人亦令所司銓擇各以名薦朕當明試自觀其能若行業可甄待以不次如妄有襃進必加明罰爰自首春有時雨朕憂勤祀獻精禱靈祇遂蒙九元垂福百神効祉膏澤頻降嘉生繁育睠彼山川能興雲雨報功享德祀典存焉諸州府所管名山大川宜令當處長官設祭務盡誠敬以昭典禮雕文刻鏤傷農事錦繡纂組害女紅粟帛之本或虧饑寒之患斯及朕故編諸格令且列刑章冀以還淳庶皆知禁如聞三公以下爰及百姓等罕聞節儉尚縱驕奢器玩猶擅珍華車服未捐珠翠此非法之不著皆由吏之不舉也宜令所司申明格令禁斷所選皇太子及諸王等妃既是百官子女禮合避人今追就府縣及過本司未為得所其應預妃者宜令所司具名錄奏各令女及近親隨使於命婦朝堂待進止諸州稅及地稅等宜令州郡長吏專勾當依限徵納訖具所納數及徵官名品申省如徵納違限及覆不實所由官並先與替仍準法科徵年支和市合出有處官既酬錢無要率戶如聞州縣不配有家率戶散科費損尤甚設令給假亦慮隱藏宜令所司更申明格勅應欲反配須審料度所有和市各就出處自今歲普熟穀價至賤必恐傷農加錢收糴以實倉廩縱逢水旱不慮阻飢公私之閒或亦為便宜令所在以常平本錢及當處物各於時價上量加三錢百姓有糶易者為收糴事須兩和不得限數配糴訖具所用錢物及所糴物數申所司仍令上佐一人專勾當道體無方元宗有應形標柱史名叶新興宗廟垂休生靈蒙福宜付史館宣示四方諸縣令等撫綏百姓莫先於宰字煦育黎人須自於厥德卿等日在京畿各親吏理務在用心以安疲瘵庶期成政以副朕懷前始安郡太守充當管經略使羅希奭幸此資序叨居牧守地列要荒人多竄殛尤加委任冀絕姦訛翻乃嘯結逋逃羣聚不逞應是流貶公然安置或差攝郡縣割剝黎甿或輟借館宇侵擾人吏不唯輕侮典憲實亦隳壞紀綱擢髮數豈多其罪可貶海東郡海康尉員外置張博濟往託回邪跡惟憑恃嘗自抵犯又坐親姻前後貶官歲月頗久逗遛不赴情狀難容及命按舉仍更潛匿亡命逭刑莫斯為甚並當切害合峻常刑宜於所在各決重杖六十使夫為政之士克守章程負罪之人期於悛革凡厥在位宜各悉心準令王妻為妃文武官及國公妻為夫人母加太字一人有官及爵者聽從高敘但王者名器殊恩或頒異姓妻合從夫受秩甲令更無別條率循舊章須依往例自今巳後郡嗣及異姓王母妻並宜準令為妃諸戶籍三年一造起正月上旬縣司責手實計帳赴州依式勘造鄉別為卷總寫三通其縫皆注某州某縣某年某籍州名用州印縣名用縣印三月三十日納訖並裝潢一通送尚書省州縣各留一通所須紙筆裝潢並皆出當戶戶口內外一錢其戶每以造籍年預定為九等便注籍脚有折生新附者於舊戶後以次編附天下戶等第未平昇降須實比來富商大賈多與官吏往還遞相憑囑求居下等自今以後不得更然如有囑請者所由牧宰錄名封進朕當處分京都委御史外州委本道如有隱蔽不言隨事彈奏政在養人人安其業先王所以用明察之長求忠信之師務斯道也朕勤恤庶政保綏羣元濟育之誠不違於終食聽理之慮每軫於宵興將使載其清淨息其勞費如聞輦轂之下政令猶煩或廣修器物將有供㣥或差歛人戶以充庖費豈副朕薄賦輕徭息人減費之意其雒陽令韋紹縣尉顏思賓輒有科率擬備祗供雖事未行終是專擅宜貶出河南尹孟溫禮雖不覺察狀異知情宜特寬捨自今巳後府縣宜洗心懲革不得更然其或不悛仍有勞擾仰百姓即詣匭使具狀奏聞輒不得稽壅所犯之人當有處分昔在元聖強著元言權輿真宗啟迪來裔遺文誠在精義頗乖撮其旨歸雖蜀嚴而猶病摘其章句自河公而或略其餘浸微固不足數則我元元妙旨豈其將墜朕誠寡薄常感斯文猥承有後之慶恐失無為之理每因清晏輒扣元關隨所意得遂為箋註豈成一家之說但備遺闕之文今茲絕筆是詢於衆公卿臣庶道釋二門有能起予類於卜商鍼疾同於左氏渴於納善朕所虛懷苟副斯言必加厚賞且如諛神自聖幸非此流懸市相矜亦云小道既其不諱咸可宣言勿為來者所嗤以重朕之不德誅有罪討不庭去其毒螫登於仁壽固以俯安庶類仰叶靈心頃以兩蕃背恩爰命龔伐精意虔告順天行誅干旄所指不戰而潰山谷遺類盡為俘馘疾如震霆動若神助豈非昊穹垂福陵廟降靈故得萬旅安全一隅澄晏永惟昭感之著先洽顧懷之福虔奉明靈載深寅畏宜令所司擇日發使告享諸陵廟朕往在藩邸遊歷潞城歲月頗多人情亦厚今因巡省再過此邦初至歡呼皆有繇衷之感將去停立益知戀主之誠言念此心孰不能變雖天下為一政有何殊而王者無私議不謂此特宜優異以納羣心其潞府百姓丁壯等免征行令其分番宿衞定名長從仍委長史韋虛心審問父老百姓等如此處置可否奏聞大射展禮先王創儀雖沿革或殊而遵習無曠往有陳奏遂從廢寢永鑒大典無忘舊章將射侯以觀德豈愛羊而去禮緬維古訓罔不率由自我而闕何以示後其三元射禮即宜依舊遵行以今年九月九日賜於安福樓下貨幣兼通將以利用而布帛為本錢刀是末賤本貴末為弊則深法教之閒宜有變革自今巳後所有莊宅口馬交易並先用絹布綾羅絲綿等其餘市買至一千以上亦令錢物兼用違者科罪道家三元誠有科誡朕嘗精意禱亦久矣而初未蒙福念不在茲今月十四日十五日是下元齋日都內人應有屠宰令河南尹李適之勾當總與贖取其百司諸廚日有肉料亦責數奏來并百姓閒是日並停宰殺漁獵等兼肉料食自今巳後兩都及天下諸州每年正月七月十月元日起十三至十五兼宜禁斷百姓屢空朕孰與足言及於此良所疚懷如聞京畿及關輔有損田百姓等屬頻年不稔久乏糧儲雖今歲薄收未免辛苦宜從蠲省勿用虛弊至於州縣不急之務差科徭役并積年欠負等一切並停其今年租八等以下特宜放免情義所在禮固隨之豈限華夷惟其人耳突厥毗伽可汗頃者雖處絕域嘗以臣子事朕聞其永逝良用悼懷務廣宿恩以制權禮宜令所司擇日舉哀天下百姓正丁課輕徭役所入惟納租庸人以安之國用嘗足比緣戶口殷衆色役繁多每歲分番計勞入任因納資課取便公私兼租脚稅戶權宜輕率約錢定數不得不然如聞州縣官僚不能處置凡如此色邀納見錢或非時徵納賤賣布帛既輕蠶織爭務貨泉農桑之閒頗亦為弊朕每思敦本將以便人期於省約使致通濟自今以後凡是資課稅戶租脚營窖折里等應納官者並不須令出見錢抑遣徵備任以當土所司均融支料嘗令折衷十道使明加察勿使乖宜時和年豐神所福也精意備物祭之義也朕每為蒼生嘗祈稔歲微誠有感丕應乃彰今宗社降靈神祇効祉三時不害百穀用成遂使京坻遍於天下和平之氣既無遠而不通禋祀之典亦有期而必報宜令兵部尚書兼中書令晉國公李林甫工部尚書同中書門下三品邠國公牛仙客即分祭郊廟社稷尚書左丞相裴耀卿祭中嶽禮部尚書杜暹祭東嶽御史大夫李適之祭西嶽太子賓客王邱祭北嶽國子祭酒張說祭南嶽其四瀆四海四鎮及諸名山靈跡等各委所繇州長官祭仍令所司即擇日聞奏務修蠲潔之禮以致精明之德冀申誠懇如朕意焉朕本求牧宰務在理人前所策試恐有遺逸載令中書門下銓擇得卿等高科副朕旁求之意然郡縣者國之本牧宰者政之先朕每屬意此官有殊餘職頃來刺史縣令多不得人致令戶口未能安業斯亦朕之不德所以寤寐勞想辭命旁求搜揚所知親加試擇卿等實為舉首深副朕懷今故與卿相見卿等到任之日百姓閒有不安穩事一一條奏朕別加聽察佇卿政能若一任之內風化有聞當擢以不次有非常賞若不達意苟復因循亦當有非常罰朕此舉可謂求仁得仁何憂郡縣不理卿等且去即與卿處分卿等各能用心副朕所委今茲歲會風政有歸是用激揚以勵清操張瑝等兄弟同殺推問款承律有正條俱合至死近聞士庶頗有諠譁矜其為父復讎或言本罪冤濫但國家設法事在經久蓋以濟人期於止殺各申為子之志誰非徇孝之夫展轉相讎相殺何限咎繇作士法在必行曾參殺人亦不可恕不能加以刑戮肆諸市朝宜付河南府告示決殺朕以為親姨舅既服小功則舅母於舅有三年之服是受我而厚以服制情則舅母之服不得全降於舅也宜服緦麻堂姨舅古今未制服朕思敦睦九族引而親之宜服袒免又鄭元注禮記云同爨緦若比堂姨舅於同爨親則厚矣又喪服傳云外親之服皆緦是亦不隔於堂姨舅也若以所服不得過本而須為外曾祖父母及外伯叔祖父母制服亦何傷乎是皆親親敦本之意卿等更熟詳之朕臨御天下二十四載何嘗不孜孜問政業業興憂以一德一心與萬人請命故宗廟降福乾坤致和使匈奴成父子之鄉犬戎為姻好之國西南邛笮皆曰內臣東北林胡是稱邊扞何奉天之德能遠洽於戎夷而安人之政獨不行於諸夏使黎甿失業戶口凋零忍廾枌榆轉徙他土傭假取給浮窳求生言念於茲良深惻隱豈惟朕德所未及教有未宏歟亦由牧守專城莫能共理令長為邑多或非才俾猾吏侵漁權豪并奪故貧寠日蹙逋逃歲增若不開恩何從遷善天下逃戶所在特聽歸首容至今年十二月三十日內首盡其本貫有產業者一切令還若先無者具戶數聞奏當別有處分其有限外不首潛匿亡歸靡懷亭育之恩仍蓄逋亡之計即當分命專使在處搜求散配諸軍以充兵鎮懲其犯命替彼居人仍各委採訪使及刺史縣令明加曉諭使知朕意以前議西幸屬歲不登關輔之閒且欲無擾今稼漸熟漕運復多而陵寢久違蒸嘗永感農隙順動得非其時前取今年十月幸西京者以其月三日發東都取南路應緣頓所要務從節減所司明為條例勿有煩勞朕以百姓為心固非一人獨理委之牧宰輯寧兆庶若考論政績在戶口存亡不有甄明何憑賞罰自今以後天下諸州戶口或刺史縣令自離任者並宜分明交付州縣仍每至年終各具存亡及增加實數同申並委採訪使重覆報省所司明為課最具條件奏聞隨事襃貶以旌善惡朕每思政本先教後刑而難遷之徒抵罪猶衆幽繫囹圄綿歷歲時今漸向鬱蒸豈忘惻隱仍慮持法者不謹得罪者有冤若無省察何云哀矜天下見禁囚犯十惡死罪及造偽頭首劫殺人先決六十長流嶺南遠惡處自外死罪先決一頓並流嶺南流罪情狀重者決六十輕者決一頓決訖並放徒巳下並放其有隱沒詐情官物及盜仍責保立限徵賦準節文處分其官人犯贓合解免仍勿令重上都城內宜令中書門下京城委留守外州委本州長官即䟽決處分聖人用心方悟真宰婦女勤道自昔罕聞壽王瑁妃楊氏素以端懿作嬪藩國雖居榮貴每在精修屬太后忌辰永懷追福以茲求度雅志難違用敦宏道之風特遂由衷之請宜度為女道士今茲節日穀稼有成頃年以來不及今歲百姓既足朕實多歡故於此時與父老同宴自朝及野福慶同之並宜坐食食訖樂飲兼賜少物宴訖領取朕永懷西土陵寢在焉至自東都誠慰罔極兼茲巡省且無怨思徯予之望多謝哲王飲至之規豈忘前典其供頓州應緣夫役差科並免今年地稅行從飛騎萬騎三衞引駕監門各賜物五百段兵彍掌閑及諸色當番人各賜物三段緣路供頓刺史縣令及專知官各賜一中上考從行有職掌武官賜勳一轉京兆及岐同華三州畿輔之閒百役所出至於征鎮又倍餘州其今年租并依本州納其脚縱巳支入京亦令所司計折酬還兩京城內及京兆府諸縣囚徒反逆緣坐及十惡故殺人造偽頭首死罪特宜免罪長流嶺南遠惡處其餘雜犯死罪隷配効力五年流罪並放罪人犯贓量罪貶降緣近頓所損麥苗宜令州縣即簡括量酬價直畿內侍老九十巳上量賜酒麥丏鰥寡惸獨及征行之家宜令州縣長官親自存問如有疾患量加醫藥使近甸之內咸有賴焉朕思致時和每矜刑典而貪叨之吏抵犯自多猶冀恥格豈在哀矜宣州溧陽令宋廷暉等各効官榮非無祿利不能砥礪乃黷貨贓使者繩違刑曹定罪並當極法合正嚴科然而發生在時布澤茲始永言惻隱能無惠恤乃期改過且用輕刑宜並配流即差綱領送雖止殺之義頗乖於國體而好生之德冀洽於人心教而不誅庶乎不及何必峻罰然後為善凡今在位宜副此懷宗廟所奉尊敬之極因以名署情所未安宜令禮官詳擇所宜奏聞朕君臨萬邦多歷年所於今行事動必見書循以舊章傳諸實錄豈朕之獨理所賴良臣或詢謀以濟其事或規諷以成其道開元以來勳庸德業者咸宜備敘其身巳沒者宜令子孫具錄事跡送史館今邊隅無事寰宇乂安甸內置烽誠則非要其蒲絳等二十二州置兵士等共一萬八千九十八人宜並停勒還本邑古者官宿其業吏不數變實欲觀其始終因以別其能否若用捨非當遲速不備是開趨競之門豈曰和均之道宗正少卿崔秀等名行早著朝廷所推各效一官巳經四載器能有適久次當遷宜副僉諧俾膺茲命且承平日久從任者多必憑考績方為進轉但須慎守豈滯其能如或躁求是招其累速則不達謙而必通凡今庶寮宜悉朕意古之名子必由象類人道之大可無慎乎皇太子鴻及慶王潭以下往所製名或亦未當今以德命悉宜更之太子鴻為瑛慶王潭為琮忠王浚為璵棣王洽為炎鄂王渭為瑤榮王滉為琬光王涺為琚儀王濰為璲潁王澐為璬永王澤為璘壽王清為瑁延王洇為玢盛王沭為琦濟王溢為環信王沔為瑝義王漼為玭陳王渙為珪豐王澄為珙恒王潓為瑱涼王漎為璿汴王滔為璥及惠寧太子惠宣太子之子皆改從玉宗正設官寔司屬籍而陵寢崇敬宗廟惟嚴割隷太常殊乖本系奉先之旨深所未安自今巳後諸廟署並隷宗正寺關輔庸調所稅非少既寡蠶桑皆資菽粟常賤糶貴買損費逾深又江淮苦變造之勞河路增轉輸之弊每計其運脚數倍加錢今歲屬和平庶物穰賤南畝有十千之穫京師同水火之饒均其餘以減遠費順其便使農無傷自今巳後關內諸州庸調資課並宜準時價變粟取米送至京逐要支用其路遠處不可運送者宜所在收貯便充隨近軍糧其河南河北有不通水利宜折租造絹以代關中調課所司仍明為條件稱朕意焉朕比擇長吏兼分命使臣所冀安人佇彼成績未知去歲之後至今秋以來郡縣之閒如何致理招攜復業何為處置頃聞諸道路遠近稍熟百姓貯積多少卿等親人之職庶事合知宜以實言用慰虛佇古之降虜皆置邊郡將遂畜牧之性以示柔懷之德河曲之北先有六州羣胡編列積百年餘往緣康待賓等輒搆凶黨自取誅夷詿誤蕃落損害良善因茲移隷令其失業永言戀本寧不懷歸朕每念及昆蟲猶慮失所況於此輩豈忘安輯如聞巳有逃在關內諸州及先招攜在靈慶州界者宜委侍中牛仙客於鹽夏等州界內選土地良沃之處都置一州量戶多少置縣其有先所隷州未來者一放歸各另據簿籍勘會勿容虛假處置訖聞奏孝弟力田風化之本苟有其實未必求名比來將此同舉人考試詞策便與及第以為常科是開僥倖之門殊乖敦勸之意自今巳後不得更然其有孝弟聞於郡邑力田推於鄰里兩事兼著狀跡殊尤者委所由長官特以名薦朕當別有處分更不須隨考試例申送天下諸州每歲一團貌既以轉年為定復有籍書可憑何至勞煩不從易於人非便事資釐革自今巳後每年小團宜停待至三年定戶日一時團貌仍令所司條件處分朕仰稽古訓思致人和爰發繇衷之旨以行順時之政今孟夏初吉三農在朝禮先決於薄刑義必寬於輕繫既聽其令用軫於懷囹圄之閒少聞於冒犯澄清之使咸盡於忠公猶慮吏有煩苛人或冤滯是爽和平之氣殊乖敬授之心其天下見繫囚徒及事發應推身不禁者放即遣使分往諸道量事疏決及宣布時令除犯贓賄名教十惡死罪自餘徒巳下特宜放免迴日奏聞務在欽恤以稱朕懷古者求士必擇其才考之以文施於有政自非體要何用甄明頃年以來亦嘗親試對策者衆而登科者少蓋繇宿搆之詞不與所問相對所以然也卿等博達古今聿膺推薦朕之所問皆有節目宜指事而對勿措游辭並宜坐食食訖就試古者分命公卿巡謁陵寢率皆乘輅以備其儀雖禮則是常不可廢闕而事有適要亦在變通宜令太僕等司每陵各支輅兩乘并儀仗等送至陵所貯掌既免勞煩無虧肅敬其公卿出城日如常儀至陵所準此蕞爾狂胡尚有餘孽近令討襲應時摧敗豈朕菲德能茂厥功此繇宗廟之靈所以然也宜擇日告廟
