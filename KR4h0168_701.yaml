front:
  text: 全唐文欽定全唐文卷七百一李德裕六
  hash: sha256:a49a93c3459bbf90aacb39666f64a63031f449994f9deefdb2091730cd1695c7
body:
  text: 潤州鶴林寺故禪師元素傳牛頭山第五祖智威心法是徑山大覺之師伏請依釋門例賜諡號大額舊例進士未放榜前禮部侍郎遍到宰相私第先呈及第人名謂之呈榜比聞多有改換頗致流言宰相稍有寄情有司固無畏忌取士之濫莫不繇斯將務責成在於不撓既無取舍豈必預知臣等商量今年便任有司放榜更不得先呈臣等仍向後便為定例如有固違御史糾舉臣聞道之高者莫若廣成元元人之聖者莫若軒黃孔子昔軒黃問廣成子理身之要何以長久廣成子云無視無聽抱神以靜形將自正神將自清無勞子形無搖子精乃可長生慎守其一以處其和故我修身千二百歲矣吾形未嘗衰又云得吾道者上為皇而下為王元元語孔子云去子之驕氣與多欲態色與淫志是皆無益于子之身吾所告子者是已故軒皇發謂天之嘆孔子興猶龍之感前聖之道不其至乎伏惟文武大聖廣孝皇帝陛下稽元祖之訓修軒皇之術凝神間館物色異人將以覿冰雪之姿屈順風之請恭惟聖感必降真仙若使廣成元元混迹而至語陛下之道授陛下之言以臣度思無出於此臣所慮赴召者必怪迂之士苟合之徒使物淖冰以為小術衒耀邪僻蔽欺聰明如文成五利無一可驗臣所以三年之內四奉詔書未嘗以一人塞詔實有所懼臣又聞前代帝王雖好方士未有服其藥者故漢書稱黃金可成以為飲食器則益壽又高宗朝劉道合元宗朝孫甄生皆成黃金二祖俱不敢服蓋以宗廟社稷之重不可輕易此事炳然具載國史以臣微見倘陛下睿慮精求必致真隱惟問保和之術不求藥餌之功縱使必成黃金止可充於玩好則九廟靈鑒必當慰悅寰海兆庶誰不歡心臣思罄愚衷以裨元化輒陳懇款伏積兢惶奉宣旨不欲今及第進士呼有司為座主趨附其門兼題名局席等條疏進來者伏以國家設文學之科求貞正之士所宜行敦風俗義本君親然後升於朝廷必為國器豈可懷賞拔之私惠忘教化之根源自謂門生遂成膠固所以時風寖薄臣節何施樹黨背公靡不由此臣等商量今日已後進士及第任一度參見有司向後不得聚集參謁及於有司宅置宴其曲江大會朝官及題名局席並望勒停緣初獲美名實皆少雋既遇春節難阻良遊三五人自為宴樂並無所禁唯不得聚集同年進士廣為宴會仍委御史臺察訪聞奏謹具如前應百姓厚葬及於道途盛陳祭奠兼設音樂等閭里編氓罕知教義生無孝養可紀沒以厚葬相矜器仗僭差祭奠奢靡仍以音樂榮其送終或結社相資或息利自辦生産儲蓄為之皆空習以為常不敢自廢人戶貧破抑此之由今百姓等喪葬祭奠並請不許以金銀錦繡為飾其陳設樂音者及葬物稍涉僭越者並勒毀除結社之類任充死亡喪服糧食等用使如有人犯者並準法律科罪其官吏已上不能糾察請加懲責仍請委出使郎官御史察訪臺司伏請令文及故實不載者令更條檢校官令文不載令請檢校官一品二品請同五品五品已下並請同九品如有曾任正官依本官品第儀則其準敕試官亦同九品儀如升朝官者請據本官品第升降闕例凡喪皆有品第恐或無知之人妄稱官秩自今以後除升朝官見任官亡歿外餘官去事前五日須除將告語或敕牒於本巡使呈過判押文狀行人方可供應佐命殊功當朝立功名傳遐邇特敕優旨準會典例本品數十分加三分不得別為華飾右具本朝舊本例如前今後令兩巡使祗據官秩品級與判狀其餘一物已上不得增加兼勒驅使官與金吾司并門司同力轄鈐如有大段踰越即請據罪科斷行人兼不得追領喪葬之家別有勘責奉敕如過制度不許尺寸事數其假賃行人徒二年喪葬之家即不問罪仍付所司右臣等伏見公主上表稱妾李者伏以臣妾之義取其賤稱家人之稱即宜區別因循舊章恐未為得臣等商量今日以後公主上表從大長公主以下並望令稱某邑公主第幾女上表仍不令稱妾所冀臣子之道因此正名郡主縣主亦望準此未審可否右伏以今年八月制置待諸道進軍移營逼可汗衙帳即李思忠領衍蕃騎深入覆其巢穴續緣劉沔張仲武確稱冬寒進軍未得請待正初今已及期望詔劉沔張仲武一時進軍以壯思忠兵馬恐不闕令往中受降城令在保太柵屯集稍為穩便望付翰林賜思忠遂奉詔處分其劉沔張仲武詔意謹同封進右緣石佛慶等皆是回鶻種類必與本國有情紇扢斯專使到京後恐語有不便於回鶻者不為翻譯兼潛將言語輒報在京回鶻望賜劉沔忠順詔各擇解譯蕃語人不是與回鶻親族者令乘遞赴京冀得互相參驗免有欺蔽未審可否右緣回鶻既已討除須令殄滅今可汗窮蹙正可梟擒萬一透入黑車子部落必恐延引歲月勞師費財望速詔忠順令進軍於山外黑車子去路邀截恐振武軍馬數少其李思忠下沙陀五百騎易定軍馬一千騎便令何清朝押領同去如至陰山北蕃知回鶻猶在舊處便令從北進軍取背則前後受敵必無所逃未審可否右臣等商量回鶻衰殘取之在速一切須令三月已前事了陛下若欲早見功效須激勸人心自古用兵皆懸賞格以此誓衆人必輕生今因景度等往幽州太原振武望三道各賜敕書如兵馬使已下大將取得可汗便授金吾小將軍及大郡刺史賞錢一萬貫如取得宰相便授兼御史大夫賞錢五千貫若是小將軍長行取得白身授兼御史中丞賞並準此今可汗與宰相只有四人直依此酬賞只用二萬五千貫文比一月供軍所費五分之一如此即得義知勸黠虜無逃伏望出自宸衷早賜明敕處分未審可否右臣等伏見李靖再破頡利可汗方始擒得望付翰林録李靖傳詔示劉沔曉諭云比者未取卻公主與回鶻接戰朝廷力稍不及舍之即易今既取卻公主又與回鶻接戰即須翦除令盡不得遺生後患兼令揀退渾沙陀共三千騎樅樅排比兼曬取三千人十日乾糧及乾蒸餅聞塞上五百錢買得一頭牛亦令約人數曬取牛肉乾脯且如此排比待景度幽州使回令劉沔專差信實軍將至景度數探問事情如仲武便肯出兵討襲即須且讓仲武不得爭功如仲武不闕詞言悠慢未有去思即須及塞草未青虜馬羸弱便令蕃軍掩襲必見成功其李靖傳事謹奏上伏希聖明採納右伏以元和中李師道自亶一方久為桀逆及王師壓境天網四陳劉悟頗識轉禍之機乃有納忠之效朝廷獎其歸命寵遇優渥待以信臣委之雄鎮從諫因父歿自總兵權屬寶歷中政務因循事歸苟且與其符節以紊國章然猶恭守詔條咨諏善道亦修覲禮一至闕庭驟陟台階實非公議爰自近歲頗聚甲兵招致亡命之徒遂成逋逃之藪怵於邪説自謂雄豪及寢疾彌留罔思臣節又令紀綱舊校誘動軍情樹置騃童再圖兵柄陛下以澤潞元宗歷試舊地有上黨古闕風俗和平人心忠義艱難以後多用儒臣又以劉悟功著先朝欲全其宗族特令供奉官薛士幹宣諭示以聖情而將校繼有表章未從明命臣等伏思劉悟以師道之逆親自梟夷誠合示一軍大順之源置子孫於無過之地而乃繼師道覆車之軌襲怙亂之風此而可容孰不可忍固須廣詢廷議以盡㣥情臣等商量望令兩省御史臺并文官四品以上武官三品以上於尚書省集議奏未審可否右彥佐即至翼城計賊中軍人百姓必有歸降來者彥佐務推恩信必盡綏懷臣等深慮賊中潛姦人詐為降附人數漸廣必有異謀臣等商量望付翰林詔示彥佐如有百姓歸降量事優恤各令復業如軍歸降者亦須各有優賞便令將朝廷意旨轉相招誘逐旋疏理處置不得留在翼城如軍人已歸降者不許卻入賊中即望於界上別立一營令屯集委彥佐揀幹事軍將別將三五百人主領仍不與器械並不得令在晉絳界內屯集未審可否右臣伏見後漢秦豐叛光武令朱祐盡力攻之至窮困豐乃將其母子九人降祐光武不舍其罪至洛陽斬之大司馬吳漢劾奏祐違詔受降失將帥之任伏以兵未交鋒便能歸順須存大信猶可曲全今劉稹告諭不悛加兵自備逆命之罪天地不容若至窮蹙歸降並不得受臣等謹録漢朝故事如前望付翰林録示元逵彥佐劉沔茂元宏敬及義逸行周等詔令準此處分未審可否右緣秋氣已至將議進兵幽州須早取可汗鎮魏須速平劉稹各要遣使諭旨兼潛探三鎮軍情今日延英面奉聖旨欲令張賈充使臣等續商量張賈幹濟有才甚諳軍中事體然性稍負氣不安恬恐不如且輟李回充使如以綱臺不可暫闕即兵部侍郎鄭涯久充戎鎮判官性甚精敏雖無詞辨言亦分明官重事間最相宜稱右訪聞劉沔頗練兵機惟臨機決策不免遲疑兵書云用兵只聞拙速不聞巧遲深恐過為慎重漸失事機望賜劉沔詔比緣回鶻未為擾侵且務綏懷今既殺戮邊人驅劫牛馬頻已有詔速令驅除自度便宜臨機應變不得過懷疑慮皆待指揮朝廷既假以使名令為諸將節制邊境之事皆以責成向後或要移營進軍一切自取機便不必皆候進止未審可否右比者只待張賈使回今到已數日須早發遣緣回鶻已入邊界未測多少天德兵力寡少須務懷柔伏以自古禦戎只有二道一是厚加撫慰二是以力驅除此事利害較然前古皆有明效漢宣帝厚撫呼韓代享其利邊境六十年無事漢武力制胸奴海內疲弊生人減半今嗢沒斯若不稍加恩意令盡歡心須至以力驅除必恐永為邊患假使其衆殘破摧伏不難亦須先加以恩不令疑二古人云將欲取之必固與之正謂此也臣等商量縱不與糧食接借其賜物不可太薄若止於只賜特勒宰相實恐發遣未得須是稍令優厚於朝廷若無費損可以保全朝野㣥情皆望如此伏希聖慈特賜察納右緣令王宰自領陳許兵直抵邢州要詔示元逵宏敬諭以河陽太原皆隔山險進軍未得緣卿等已東面進軍賊中懾懼近日頻入晉絳焚燒村舍地邇關輔深要防虞恐昭義知西道進軍稍難偷安旬月今充王宰自領全師直抵磁州以分賊勢望令付翰林約此意撰詔未審可否右訪聞諸道各軍皆自有都頭常相顧望不肯效命請依河朔軍法委彥佐劉沔每三二千人分為一團如有應急使用處便點一團令去一切成敗責成都頭如此則人必齊心將皆懼法臨機赴敵不敢因循如蒙允許望付翰林各賜詔處分未審可否右緣魏博討賊遷延頗招物議昨令陳許兵馬直抵磁州此是制敵深謀攻心上策徐乃文到京之後方知陳許發兵便云宏敬全軍自取磁州則是畏懼陳許須待宏敬出軍表到方得委知若便遣王宰罷行亦是姑息太過只緣河陽山險攻守艱難王宰頓軍虛費饋運望密詔示王宰但令從容排比未要速便道途賊中聞此軍聲必合破膽魏博若全師自出續止陳許不遲如蒙允許望付翰林約此賜詔處分未審可否右緣河陽奏事官高從真到稱十八日陳後遍山遍谷盡是賊軍茂元兵力寡少頗似危急若賊勢更甚便要退守懷州非惟損挫威聲必恐驚動東洛皆由魏博未有陳戰陳彥佐又隔深山所以併力南攻不得不慮自元和以來賊中用衆皆取軍寡弱處即併兵用力一處不敵後即移向他處計王宰排比已有次第倘遣全軍便發救援河陽不止捍蔽洛京足以臨制魏博如恐全軍費損饋運計王宰必見先鋒望今日降中使賜詔令宜發先鋒五千人便赴河陽所冀免落姦計事機至切不可更遲如蒙允許望賜茂元王宰行敏詔處分右訪聞河陽兵力已竭弓矢皆盡地邇東洛實係安危內外人情無不憂恐切望詔王宰發先鋒五千人後須自領全軍繼進仍望今日內發使賜詔處分河陽所貯諸道進助軍器械並望且搬賜茂元猶恐器械數少兼望內賜甲一千副弓三千張并弦箭三萬隻陌刀二千口兼聞河陽軍用罄竭賞給不充自出軍以來並未有恩賜望賜絹三萬匹且以河陽見在物委度支差腳速搬送未審可否右臣等商量昨者緣魏博久未進軍兼涉物議所以請王宰全軍直抵磁州以分賊勢所冀昭義破膽宏敬不敢逗留今既收平息殺傷不少便許宏敬自當一面必見成功然河朔軍情常須以威臨制宏敬一心雖至忠順終慮將校異端況中外人心皆憂河陽寡弱王宰已排比兵又頒恩賜且令全軍赴河陽兼得遙制魏博兩面事勢皆得機宜未審可否右臣等見李回説仲武似疑劉稹未有罪狀及見李回説從諫積惡僭侈便忠憤感激告若罪狀如此朝廷固合誅夷臣等商量因處分邊事望賜仲武書諭以深意要云從諫入覲之初與鄭注交結因緣貨賄濫授鈞衡及歸鎮後又與李訓結託所謀狂險中外具悉自訓注夷滅心不自安頗恃甲兵轉懷悖慢先朝夕雖優寵中實懷疑及從諫疾病之時曾無誠昨遣中使臨問兼借名醫矯託異端竟不相見便樹置劉稹令將校繼獻章表不待朝旨便令繼襲以澤潞一鎮有啓聖舊宮艱難以來多用文吏如抱真首創軍募於國兼有大功身歿之後其子皆赴京闕比謂劉稹愚騃迫於軍情望其管惜家門稍能悛悔頻敢馳突晉絳侵軼河陽近李丕投降及魏博收平恩縣得劉稹榜帖並已進來皆呼官軍為賊逢著即須痛殺悖逆如此天地不容想卿遠聞應當奮激卿宜速諭諸藩部落同滅可汗卿但北邊立功劉稹必當自潰策勛命賞以卿一道為先卿深體此懷兼示將校如蒙允許望付翰林約此意撰詔
