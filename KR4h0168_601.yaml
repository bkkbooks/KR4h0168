front:
  text: 全唐文欽定全唐文卷六百一劉禹錫三
  hash: sha256:972dac5342191b7d0a0904e934313851dd892bd8f8e8092be3c6eac94f375601
body:
  text: 臣某言伏承成德軍節度使太尉兼中書令王武俊今月某日薨沒伏以武俊生逢昌時天授忠節奮揚義勇茂建勳庸秩冠朝端參燮和於台鉉姻連戚里承嘉慶於雲霄榮掩華夷事高今昔方膺作翰之寄遽迫歸泉之期鼎臣云亡梁木斯壞伏惟陛下君臣義重存沒感深臨冊禭以興懷聽鼓鼙而軫念臣恪居官守奉慰無階悲慟之誠有加常品謹遣某官某乙奉表陳慰以聞臣某言伏承義陽公主薨伏惟聖懷傷悼增切伏以公主妍姿令則冠絶天人稟教皇宮已挺柔嘉之德降嬪卿族益彰貞粹之儀方期作範壼闈長榮邸第豈意遘茲短奄謝昌辰慮陛下軫念未捐深慈莫遣有虧常膳罷設宮懸臣子之情不任惕戀况聖凡禮異家國制殊伏願道齊彭殤理達修短割肌膚之愛慰寰海之心率土人臣孰不相慰無任懇款屏營之至臣某言伏奉制書授臣檢校司徒同中書門下平章事充度支及諸道鹽鐵轉運等使者臣久塵高位尸素已多更受新恩滿盈為懼云云伏惟皇帝陛下紹登寶位光纂鴻猷擢用之間華夷聳聽况利權所在宜適變通國計是資須明輕重當至化鼎新之日是微臣遲莫之年將何以上副宸衷下成庶務進退惟谷冰炭在懷輒罄愚誠冀回天監陳力無補庶遵周任之言循涯若驚敢飾范宣之讓慙惶局蹐倍萬常情謹奉表陳讓以聞臣某言伏見淮南節度使王鍔所奏當道將吏僧道耆老等請為臣立去思碑伏奉聖旨允其所奏內惟菲薄聲績無聞祗荷恩私慙懼交至臣某誠惶誠恐頓首頓首臣伏蒙先朝過獎纍典方隅頃鎮江都十有四載數周星紀水旱備經境接淮濆兵戈時起至於邑里粗免流離非臣所能悉稟聖化在唐堯可封之日奚假吏才當漢宣責實之時皆承詔旨王鍔與臣交代輒有上聞况以去思為名慙無可紀之績伏以建碑示後甲令垂文苟非至公翻益貽誚臣伏覽故事宋璟自廣州都督入拜尚書南海之人請為刊石璟自遜讓至於再三雖勒其文竟從降制著在國史舉為美談璟非苟榮人益見德臣才誠不逮心實慕之伏乞聖慈賜寢前命情非飾讓義在徇公無任懇款之至謹奉表陳讓以聞臣某言高品吳千金至奉制加臣銀青光祿大夫同中書門下平章事兼徐泗濠等州節度觀察處置等使餘如故者初受恩榮若登霄漢退思塵忝如履春冰臣誠惶誠恐頓首頓首臣聞以德詔官以勞定賞苟或虛授人無勸心臣自守方隅纍更時歲荷唐虞宣力之寄乏齊魯報政之能愧無可稱以答高位豈意聖慈宏獎天澤薦加以燮贊之崇名被庸虛之陋質懼速官謗有玷大猷伏以宰相之職安危是注其在當否繫於慘舒惟以材升例無平進舉不失德則副蒼生之心苟非其人或致外夷之哂臣雖愚昧嘗覽前言豈敢冒榮遂安竊位輒思事理冀盡芻蕘若以汴河要津漕運所切徐方俶擾師旅未寧謹當上稟睿謀下貞戎律克期而進屈指可平勵衆之先是臣之志既行其事必在正名所加節制安敢飾讓至於銀青貴服金鉉重名勳績無聞豈宜濫及伏乞賜寢前命俯亮愚衷微臣遂知止之宜聖朝無不稱之服名器斯慎退讓有聞遐邇聆風孰不知勸其新授官告謹重封進無任懇禱屏營之至臣某言臣去冬得疾近日加劇西夕之景豈能久留及其未亂披露誠懇臣犬馬之齒六十有七壽雖不長亦不為短位忝公台近十五年皆由際會非以才進常懼官謗以招國刑今被病得死保其始終為幸甚厚豈復咨嗟所恨者遇聖明之君不得佐成太平之化自量氣力忽恐奄然則有微素無階上達伏惟聖慈昭鑒憐而察之伏以三公非曠職之地宰相非臥理之官伏枕之初已有陳乞請罷直食兼辭貴階伏蒙優詔才遂一事頻降中使慰勉再三專令御醫旦夕診視苟安名器不覺經時主恩則深公議不可伏思陛下臨御之始宰臣四人逮今零落忽已一半臣且危惙餘年幾何惟易直外鎮獨得無恙竊惟此理權位難居伏乞賜臣停官許在家養疾就閒辭祿或冀有瘳害盈福謙固是神理儻天眷綢厚念以伏事多年臣之所陳未蒙便遂則國朝勳舊以疾辭位者皆得以致仕使其家居足以頤養既有成例著於舊章伏望天恩特賜哀允臣某言臣所獻章表發於至誠伏奉批答未蒙允許外負公責內迫私情期於必遂敢守難奪臣束髮已來號為強力及其晚節亦未甚衰一朝被病遂至帛丿糸惙臣自思省得其端倪非因飲食不節無有霧露之犯蓋由才微而任重功薄而賞厚竊位既久妨賢則多以積年之過幸致今日之沈疾不能酌損所以生災悟雖已晚情實非矯伏惟陛下念其委使之久察其危苦之詞特降深恩救臣不逮無冒榮之咎得遂性之宜物議不形病心自泰忍死俟命披肝再陳伏乞聖慈俯賜容納無任迫切懇倒之至臣某言得病踰年在假三月再有陳請未蒙允從慮其奄忽銜愧入地伏惟聖慈哀而信之臣聞君之使臣在知其心而聽其言不以容尸祿為惠也臣之事君在無隱情而盡忠節不以受非據為榮也然後上下交感終始可詠臣伏事陛下五年於茲葵藿微誠已蒙識察桑榆莫景所冀哀憐豈令危惙之時更懼滿盈之禍雖有藥石安能調和聖日雖逢生涯漸短體羸無拜舞之望心在有涕戀之悲臣伏覽國史備見前事太宗朝李靖高宗朝劉仁軌皆自宰臣乞骸致政其後知猶可用復起於家進退之間曲盡情禮君臣之際良史美談伏望陛下悉臣至誠念臣羸病許遂頤養以保餘年俟其有瘳或冀萬一無任懇款遑迫之至臣某言伏奉某月日制書授臣容州刺史兼御史中丞充本管經略招討等使臣發開州日已差某官某乙奉表陳謝伏以道途遐阻水陸縈紆臣以今月某日到本任上訖謹宣聖旨慰諭遠人臣某中謝臣本書生素無吏術頃因多幸賁自邱園纍沐聖慈驟居清貫識昧通變動乖事宜慙無善狀以塞公責伏惟睿聖文武皇帝陛下凝旒穆清洞照寰海推共理之義分寄股肱念蒸人之勤溥霑遐邇察臣前任事實恕臣本性朴愚賜以恩輝拔於廢棄遠辭偏郡重委方隅捧印綬以為榮望闕庭而增戀雖到官之始惠未及人而率下之誠務先克己凡施政教皆稟詔條參以土宜遂其物性可行必守有弊必除使蠻夷生梗之風慕臣子盡忠之道力誠不足心實在茲伏乞聖明俯賜昭鑒無任感戴屏營之至臣某言伏奉某月日制書授臣使持節都督夔州諸軍事守夔州刺史跪受天詔神魂震驚伏惟文武孝德皇帝陛下垂衣穆清睿鑑旁達三統交泰百神降祥浹於華夷盡致仁壽臣家本儒素業在藝文貞元年中三忝科第德宗皇帝記其姓名知無黨援擢為御史在臺三載例遷省官權臣奏用分判錢穀竟坐連纍貶在遐方先朝追還方念淹滯又遭讒嫉出牧遠州家禍所鍾沈伏草土禮經有制羸疾僅存甘於畎畝以樂皇化伏遇陛下大明御宇照燭無私念以殘生舉其彞典獲居善部伏感天慈臣即以今月二日到任上訖硤水千里巴山萬重空懷向日之心未有朝天之路無任感恩戀闕之至臣某言伏奉去年三月七日制授臣使持節連州刺史恭承睿旨跪奉詔書皇恩重於邱山聖澤深於雨露抃舞失次神魂再揚臣某誠歡誠懼頓首頓首臣性本愚拙謬學文詞幸遇休明纍登科第出身入仕並不因人德宗臨御之時臣忝御史陛下龍飛之日臣忝郎官恭守章程勤修職業權臣奏用蓋聞虛名實非曲求可以覆視跡卑易枉無路自明亦緣臣有微才所以嫉臣者衆競生口語廣肆加誣伏賴陛下至仁特從寬典舉以緣坐貶佐遐藩屢易星霜頻經恩赦犬馬懷戀寢興匪寧惟讀佛經願延聖算昨蒙詔命追赴上都隨例授官俾居遠郡在臣之分榮幸已多伏荷陛下孝理宏深皇明照燭哀臣老母羸疾閔臣一身零丁特降新恩移臣善郡光榮廣被母子再生凡在人臣皆感聖德凡為人子皆荷聖慈豈惟賤臣獨蒙恩造不覺喜極至於涕零昔殷王俯念於前禽且聞解網漢帝有哀於少女爰命罷刑方之聖朝不足多尚感召和氣慰安㣥生非臣殞越所能上報伏以南方癘疾多在夏中自發郴州便染瘴瘧扶策在道不敢停留即以今月十一日到州上訖謹宣聖旨以示遠人恭述詔條所期安復無任感恩戀闕之至臣某言伏奉制書授臣使持節和州諸軍事守和州刺史臣自理巴賨不聞善政恩私忽降慶抃失容臣某中謝伏惟皇帝陛下丕承寶祚光闡鴻猷有漢武天人之姿稟周成睿哲之德發言合古舉意通神委用得人動植咸悅理平之速從古無倫微臣何幸獲覩昌運臣業在詞學早歲策名德宗尚文擢為御史出入中外事五朝纍承恩光三換符竹在分憂之寄祿秩非輕而素蓄所長效用無日臣聞一物失所前王軫懷今逢聖朝豈患無位臣即以今月二十六日到所任上訖伏以地在江淮俗參吳楚災旱之後綏撫誠難謹當奉宣皇風慰彼黎庶久於其道冀彼知方伏乞聖慈俯賜昭鑒臣遠守藩服不獲拜舞闕庭無任懇悃屏營之至謹差當州軍事衙官章興奉表陳謝以聞臣某言伏奉制書授臣使持節蘇州諸軍事守蘇州刺史始從郎署出領郡長承命若驚省躬增感臣某中謝伏惟皇帝陛下受上元之眷佑揚列聖之耿光大康黎元慎擇牧守德音每發品物咸蘇臣本書生素無黨援謬以薄伎三登文科德宗皇帝擢為御史在臺三載例轉省官永貞之初權臣領務遂奏録用蓋聞虛名惟守職業實無朋附竟坐飛語貶在遐藩憲宗皇帝後知事情去授刺史凡外任二十餘年伏遇陛下應運重光物無廢滯收拾耆舊塵忝班行既幸逢時常思展效在集賢院四換星霜供進新書二千餘卷儒臣之分甘老於典墳優詔忽臨又委之符竹分憂誠重戀闕滋深石室之書空留筆札金閨之籍已去姓名本末可明申雪無路豈意聖慈宏納不隔卑微面辭之日特許升殿天顏咫尺臣禮兢惶不敢盡言空懷誠懇謝恩而出生光於九陌之間授訓而行布政於五湖之外臣即以今月六日到任上訖伏以水災之後物力素空臣謹揚皇風慰彼黎庶臣聞有味之物蠧蟲必生有才之人讒言必至事理如此古今同途了然辨之惟在明聖伏惟陛下察臣此言則天下之人無不幸甚江海遠地孤危小臣雖雨露之恩幽遐必被而犬馬之戀親近為榮臣某言伏奉去年七月十四日詔書授臣使持節汝州諸軍事守汝州刺史兼御史中丞充本道防禦使餘如故者臣久居遠服戀闕常深忽降新恩近鄉為貴承旨慶抃省躬慙惶臣某誠歡誠喜頓首頓首伏惟皇帝陛下垂衣清穆之中旁照寰瀛之內車書所及動植咸安臣昨離班行遠守江徼延英辭日親奉德音知臣所部災荒許臣到任條奏恭承睿旨宣示㣥黎減其征徭頒以賑賜伏蒙聖澤救此天災疲羸再蘇幼艾同感二年連遭水潦百姓幸免流離交割之時戶口增長雖才術不足於事未周而憂勞則深為衆所悉臣本業儒素頻登文科帝命遽回再領軍郡即以今月二十七日到州上訖謹當奉宣聖化慰彼蒼生臨汝水之波朝宗尚阻望秦城之日回照何時臣無任感激屏營之至謹差防禦押衙韋禮簡奉表陳謝臣某言伏奉去年十月二十二日制書授臣使持節同州諸軍事守同州刺史兼御史中丞充本州防禦長春宮等使恩降九重榮忝三輔承旨慶抃省躬慙惶臣某中謝伏惟皇帝陛下丕承列聖光闡鴻猷氛祲掃除乾坤交泰臣幸逢昌運纍沐殊私空荷生成之恩寧酬雨露之澤即以今月二日到州上訖謹宣睿旨安慰蒸黎伏以本州四年以來連遭旱損閭閻凋瘵遠近共知臣頃任蘇州之年亦遭大水之後面辭之日親奉德音至於撫綏皆承聖教二年之後百姓獲安今本部災荒物力困涸忝為長吏敢不竭誠即須條疏續具聞奏臣恪居官次幸接王畿不獲拜舞彤庭陳露丹慊犬馬懷戀寢興匪寧瞻魏闕之容朝天尚阻望長安之路近日為榮臣無任感激屏營之至謹差防禦知衙官試殿中監楊克乂奉表陳謝臣某言臣伏蒙獎拔超踐鈞衡慮玷大猷昧死陳讓再奉嚴旨不令固辭恩厚命輕位高責重中謝臣聞天下安危注意將相處論道具瞻之地當總戎作鎮之權雖叶夢而求無聞秉鉞之寄登壇以拜不兼調鼎之榮授受維艱伊昔猶爾况臣庸瑣何以克堪陛下元造曲成大明私照俾掌戎律復參廟謨寵光之命在臣已極毫髮之效於國何施謹當罄竭微誠奉遵至教仗天威以懾不順敷聖澤以遂㣥生上分旰食之憂下塞素餐之責力誠不足心實念茲伏乞皇明俯賜昭鑒臣恪居官次遐守藩維不獲伏謝彤庭陳露丹慊心存闕下同犬馬之戀恩身在淮濆仰雲天而結思無任懇悃屏營之至臣某言奏事官韋溫回特蒙聖恩重賜朱鄭等官告宸象昭回煥然下燭榮分右職光賁遐藩臣某中謝臣伏以朱鄭朴忠為心沈毅見色當建封禦侮之寄見張愔提孩之年昨者隸職徐州分鎮蘄縣驛騷之際梗亮彌彰險而前實繁其旅詳探本末有足褒稱輒具奏聞恐須獎勸伏蒙睿鑒俯亮微誠優詔先行已階直指之列殊私薦至超升獨坐之崇戶領三千爵踰五等恩生非次感異常倫轅門有光武旅增氣遂使感激之士希勇爵以捐軀猖狂之徒聆聖澤而悛性風行草偃其勢必然臣忝總戎倍百欣荷臣某言中使南宮懷珍至奉宣聖旨存問兼賜臣墨詔天光下濟睿澤曲流銜恩未酬居寵彌懼臣某中謝臣受任斯極微功莫施昨以封略未寧干戈猶動壽春固壘以備盜淮甸興師以扞姦經費所資數盈巨萬餽餉時久供億力殫慮始圖終不敢緘默輒陳管見上黷宸聰伏蒙聖慈特遂誠請遠承如綍之旨特假聚人之財軍須不愆士氣彌振糗糧既備永無半菽之虞襦袴足頒遠起挾纊之感是為悅使咸願先登臣忝總戎倍百欣荷伏以上分國用俯濟軍興候清煙塵謹備償納臣某言伏奉去年十一月二十七日詔書加臣賜紫金魚袋餘如故者恩降重霄榮霑陋質既黷陟明之典恐興彼己之詩寵過若驚喜深生懼臣某中謝臣起自書生業文入仕德宗朝為御史以孤直在臺順宗朝為郎官以緣纍出省憲宗皇帝後知其冤特降敕書追赴京國緣有虛稱恐居清班務進者爭先上封者潛毀巧言易信孤憤難申俄復一麾外轉三郡伏遇陛下膺期御宇大振滯淹哀臣宿舊猥見收拾職兼書殿官忝儀曹微勞未宣薄命多故又離省署重領郡符延英面辭親承教誨銜命即路星言載馳到任之初便逢災疫奉宣聖澤恭守詔條上稟睿謨下求人瘼才術雖短憂勞則深幸免流離漸臻完復皆承聖化所及遂使人心獲安豈由微臣薄劣能致臣素乏親黨家本孤貧年衰無酒色之娛性拙無博奕之藝自領大郡又逢時災晝夜苦心寢食忘味曾經誣毀每事防虞惟託神明更無媒援豈期片善上達宸聰回日月之重光燭江湘之下國絲綸褒異苦節既彰印綬煒煌老容如少望雲天而拜舞豈盡丹誠視環玦以徘徊空嗟白首無任感激屏營之至臣某言中使吐突仕曉至奉宣聖旨慰諭并送臣至本任者深山遠郡忽降王人跪受恩榮仰瞻宸極伏以發自巴峽至於南荒涉水陸湍險之途當炎夏鬱蒸之候山川縈轉晨夜奔馳幸無他疾得至本管九重結戀遙傾捧日之心萬里獲安皆荷自天之祐無任感戴屏營之至臣某言伏奉今月一日制授臣長男師損祕書省著作郎次男式方太常寺主簿又得進奏官裴遘狀報伏承聖恩特降中使送官告到臣宅分付師損者寵渥非常授任不次驚躍無措靦懼失容臣某中謝臣謬分重寄獲守外藩受恩既深無績可紀男師損等器惟凡品教闕義方早沐睿慈已階官次每懷塵忝常誡滿盈豈謂鴻霈曲覃大明私照寬臣尸素之責念臣葵藿之誠下延允息叨踐班級天書出禁中貴臨門榮冠等夷慶流宗族况著作乃撰論之地惟史才是居太常實禮樂之司非儒者勿履顧茲庸謬忽此超升內省慙惶若墜冰谷伏以聖朝立制建官惟賢名實無乖輪轅盡適微臣父子獨為幸人非據踰涯自中徂外虛受邱山之賜實增負乘之憂進退倣徨不知所據無任戰汗屏營之至
