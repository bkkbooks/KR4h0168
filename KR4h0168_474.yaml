  text: 全唐文欽定全唐文卷四百七十四陸贄十五
  hash: sha256:9714efbfce7adff25cb172d27b63b068f9584261c22101bec1dff3ff5b6a4c22
body:
  text: 右臣歷覽前代史書皆謂鎮撫四夷宰相之任不揆暗劣屢敢上言誠以備邊禦戎國家之重事理兵足食備禦之大經兵不理則無可用之師食不足則無可固之地理兵在制置得所足食在斂導有方陛下幸聽愚言先務積穀人無加賦官不費財坐致邊儲數逾百萬諸鎮收糴今已向終分貯軍城用防艱急縱有寇戎之患必無乏絶之憂守此成規以為永制恆收冗費益贍邊農則更經二年可積十萬人三歲之糧矣足食之原粗立理兵之術未精敢試籌量庶備採擇伏以戎狄為患自古有之其於制禦之方得失之理備存史籍可得而言大抵尊即敘者則曰非德無以化要荒曾莫知威不立則德不能馴也樂武威者則曰非兵無以服凶獷曾莫知德不修則兵不可恃也務和親者則曰要結可以睦鄰好曾莫知我結之而彼復解之也美長城者則曰設險可以固邦國而扞寇讎曾莫知力不足而人不堪則險之不能恃城之不能有也尚薄伐者則曰驅遏可以禁侵暴而省征徭曾莫知兵不鋭壘不完則遏之不能勝驅之不能去也議邊之要略盡於斯雖互相譏評然各有偏駁聽一家之説則理例可徵考歷代所行則成敗異效是由執常理以御其不常之勢徇所見而昧於所遇之時夫中夏有盛衰夷狄有強弱事機有利害措置有安危故無必定之規亦無長勝之法夏后以敘戎而聖化茂古公以避狄而王業興周城朔方而玁狁攘秦築臨洮而宗社覆漢武討胸奴而貽悔太宗征突厥而致安文景約和親而不能弭患於當年宣元宏撫納而足以保寧於纍葉蓋以中夏之盛衰異勢夷狄之強弱異時事機之利害異情措置之安危異便知其事而不度其時則敗附其時而不失其稱則成形變不同胡可專一夫以中國強盛夷狄衰微而能屈膝稱臣歸心受制拒之則阻其嚮化滅之則類於殺降安得不存而撫之即而敘之也又如中國強盛夷狄衰微而尚棄信忤盟蔑恩肆毒諭之不變責之不懲安得不取亂推亡息人固境也其有遇中國喪亂之弊當夷狄強盛之時圖之則彼釁未萌禦之則我力不足安得不卑詞降禮約好通和啖之以利以引其歡心結之以親以紓其交禍縱不必信且無大侵雖非御戎之善經蓋時事亦有不得已而然也儻或夷夏之勢強弱適同撫之不寧威之不靖力足以自保勢不足以出攻安得不設險以固軍訓師以待寇來則薄伐以遏其深入去則攘斥而戒於遠追雖非安邊之令圖蓋勢力亦有不得已而然也故夏之即敘周之于攘太宗之翦亂皆乘其時而善用其勢者也古公之避狄文景之和親神堯之降禮皆順其時而不失其稱者也秦皇之長城漢武之窮討皆知其事而不度其時者也向若遇孔熾之勢行即敘之方則見侮而不從矣乘可取之資懷畏避之志則失機而養寇矣有攘却之力用和親之謀則示弱而勞費矣當降屈之時務翦伐之略則召禍而危殆矣故曰知其事而不度其時則敗附其時而不失其稱則成是無必定之規亦無長勝之法得失著效不其然歟至於察安危之大情計成敗之大數百代之不變易者蓋有之矣其要在於失人肆欲則必蹶任人從衆則必全此乃古今所同而物理之所一也國家自祿山構亂肅宗中興撤邊備以靖中邦借外威以寧內難於是吐蕃乘釁吞噬無厭回紇矜功馮陵亦甚中國不遑振旅四十餘年使傷耗遺氓竭力蠶織西輸賄幣北償馬資尚不足塞其煩言滿其驕志復又遠徵士馬列戍壃陲猶不能遏其奔衝止其侵侮小入則驅略黎庶深入則震驚邦畿時有議安邊之策者多務於所難而忽於所易勉於所短而略於所長遂使所易所長者行之而其要不精所難所短者圖之而其功靡就憂患未弭職斯之由夫制敵行師必量事勢勢有難易事有後先力大而敵脆則先其所難是謂奪人之心暫勞而久逸者也力寡而敵堅則先其所易是為固國之本觀釁而後動者也頃屬多故人勞未瘳而欲廣發師徒深踐寇境復其侵地攻其堅城前有勝負未必之虞後有餽糧不繼之患儻或撓敗適所以啓戎心而挫國威以此為安邊之謀可謂不量事勢而務於所難矣天之授者有分事無全功地之産者有物宜無兼利是以五方之俗長短各殊長者不可踰短者不可企勉所短而校其所長必殆用所長而乘其所短必安強者乃逐水草為邑居以射獵供飲茹多馬而尤便馳突輕生而不恥敗亡此戎狄之所長也戎狄之所長乃中國之所短而欲益兵搜乘角力爭驅交鋒原野之間決命尋常之內以此為禦寇之術可謂勉所短而校其所長矣務所難勉所短勞費百倍終於無成雖果成之不挫則廢豈不以越天授而違地産虧時勢以反物宜者哉將欲去危就安息費從省在其慎守所易精用所長而已若乃擇將吏以撫寧衆庶修紀律以訓齊師徒耀德以佐威能邇以柔遠禁侵掠之暴以彰吾信抑攻取之議以安戎心彼求和則善待而勿與結盟彼為寇則嚴備而不務報復此當今之所易也賤力而貴智惡殺而好生輕利而重人忍小以全大安其居而後動俟其時而後行是以修封疆守要害塹蹊隧壘軍營謹禁防明斥候務農以足食練卒以蓄威非萬全不謀非百克寸不鬬寇小至則張聲勢以遏其入寇大至則謀其大三字疑以邀其歸據險以乘之多方以誤之使其勇無所加衆無所用掠則靡獲攻則不能進有腹背受敵之虞退有首尾難救之患所謂乘其弊不戰而屈人之兵此中國之所長也我之所長乃戎狄之所短我之所易乃戎狄之所難以長制短則用力寡而見功多以易敵難則財不匱而事速就捨此不務而反為所乘斯謂倒持戈矛以鐏授寇者也今則皆務之矣然猶封守未固寇戎未懲者其病在於謀無定用衆無適從所任不必才才者不必任所聞不必實實者不必聞所信不必誠誠者不必信所行不必當當者未必行故令措置乖方課責虧度財匱於兵衆力分於將多怨生於不均機失於遙制臣請為陛下粗陳六者之失惟明主慎聽而熟察之臣聞工欲善其事必先利其器武欲勝其敵必先練其兵練兵之中所用復異用之於救急則權以紓難用之於暫敵則緩以應機故事有便宜而不拘常制謀有奇詭而不徇衆情進退死生唯將所命此所謂攻討之兵也用之於屯戍則事資可久勢異從權非物理所愜不寧非人情所欲不固夫人情者利焉則勸習焉則安保親戚則樂生顧家業則忘死故可以理術馭不可以法制驅此所謂鎮守之兵也夫欲備封疆禦戎狄非一朝一夕之事固當選鎮守之兵以置焉古之善選置者必量其性習辨其土宜察其技能知其欲惡用其力而不違其性齊其俗而不易其宜引其善而不責其所不能禁其非而不處其所不欲而又類其部伍安其室家然後能使之樂其居定其志奮其氣勢結其恩情撫之以惠則感而不驕臨之以威則肅而不怨靡督課而人自為用弛禁防而衆自不攜故出則足兵居則足食守則固戰則強其術無他便於人情而已矣今者散徵士卒分戍邊陲更代往來以為守備是則不量性習不辨土宜邀其所不能強其所不欲求廣其數而不考其用將致其力而不察其情斯可以為羽衛之儀而無益於備禦之實也何者窮邊之地千里蕭條寒風裂膚驚沙慘目與豺狼為鄰伍以戰鬬為嬉遊晝則荷戈而耕夜則倚烽而覘日有剽害之慮永無休暇之娛地惡人勤於斯為甚自非生於其域習於其風幼而覩焉長而安焉不見樂土而不遷焉則罕能寧其居而狎其敵也關東之壤百物阜殷從軍之徒尤被優養慣於溫飽狎於歡康比諸邊隅若異天地聞絶塞荒陬之苦則辛酸動容聆強蕃徑虜之名則懾駭奪氣而乃使之去親族捨園廬甘其所辛酸抗其所懾駭將冀為用不亦疏乎矧又有休代之期無統帥之馭資奉若驕子姑息如倩人進不邀之以成功退不處之以嚴憲其來也咸負德色其止也莫有固心屈指計歸張頤待飼僥幸者猶患還期之賒緩恆念戎醜之充斥王師挫傷則將乘其亂離布路東潰情志且爾得之奚為平居則殫耗資儲以奉浮冗之衆臨難則投棄城鎮以搖遠近之心其弊豈唯無益哉固亦將有所撓也復有抵犯刑禁謫徙軍城意欲增戶實邊兼令展效自贖既是無良之類且加懷土之情思亂幸災又甚戍卒適足煩於防衛諒無望於功庸雖前代時或行之固非良算之可遵者也復有擁旄之帥身不臨邊但分偏師俾守疆場大抵軍中壯鋭元戎例選自隨委其疲羸乃配諸鎮節將既居內地精兵祗備紀綱遂令守要禦衝恆在寡弱之卒寇戎每至力勢不支入壘者才足閉關在野者悉遭劫執恣其芟蹂盡其搜驅比及都府聞知虜已克寸獲旋返且安邊之本所切在兵理兵若斯可謂措置乖方矣夫賞以存勸罰以示懲勸以懋有庸懲以威不恪故賞罰之於馭衆也猶繩墨之於曲直權衡之於重輕輗軏之所以行車銜勒之所以服馬也馭衆而不用賞罰則善惡相混而能否莫殊用之而不當功過則姦妄寵榮而忠實擯抑夫如是若聰明可衒律度無章則用與不用其弊一也自頃權移於下柄失於朝將之號令既鮮克行之於軍國之典常又不能施之於將務相遵養苟度歲時欲賞一有功翻慮無功者反側欲罰一有罪復慮同惡者憂虞罪以隱忍而不彰功以嫌疑而不賞姑息之道乃至於斯故使亡身效節者獲誚於等夷率衆先登者取怨於士卒僨軍蹙國者不懷於愧畏緩救失期者自以為智能裦貶既闕而不行稱毀復紛然相亂人雖欲善誰為言之況又公忠者直已而不求於人反罹困厄敗撓者行私而苟媚於衆例獲優崇此義士所以痛心勇夫所以解體也又有遇敵而所守不固陳謀而其效靡成將帥則以資糧不足為詞有司復以供給無闕為解既相執證理合辨明朝廷每為含糊未嘗窮究曲直措理者含聲而靡訴誣善者罔上而不慙馭將若斯可謂課責虧度矣課責虧度措置乖方將不得竭其才卒不得盡其力屯集雖衆戰陳莫前虜每越境橫行若涉無人之地遞相推倚無敢誰何虛張賊勢上聞則曰兵少不敵朝廷莫之省察唯務徵發益師無裨備禦之功重增供億之弊閭井日耗徵求日繁以編戶傾家破産之資兼有司榷鹽稅酒之利總其所入半以事邊制用若斯可謂財匱於兵衆矣今四夷之最強盛為中國甚患者莫大於吐蕃舉國勝兵之徒才當中國十數大郡而已其於內虞外備亦與中國不殊所能寇邊數則蓋寡且又器非犀利甲不堅完識迷韜鈐藝乏趫敏動則中國懼其衆而不敢抗靜則中國憚其強而不敢侵厥理何哉良以中國之節制多門蕃醜之統帥專一故也夫統帥專一則人心不分人心不分則號令不二號令不二則進退可齊進退可齊則疾徐如意疾徐如意則機會靡愆機會靡愆則氣勢自壯斯乃以少為衆以弱為強變化翕闢在於反掌之內是猶臂之使指心之制形若所任得人則何敵之有夫節制多門則人心不一人心不一則號令不行號令不行則進退難必進退難必則疾徐失宜疾徐失宜則機會不及機會不及則氣勢自衰斯乃勇廢為尫衆散為弱逗撓離析兆乎戰陳之前是猶一國三公十羊九牧欲令齊肅其可得乎開元天寶之間控禦西北兩蕃唯朔方河西隴右三節度而已猶慮權分勢散或使兼而領之中興已來未遑外討僑隸四鎮於安定權附隴右於扶風所當西北兩蕃亦朔方涇原隴右河東四節度而已關東戍卒至則屬焉雖委任未盡得人而措置尚存典制自頃逆泚誘涇原之衆懷光汚朔方之軍割裂誅鋤所餘無幾而又分朔方之地建牙擁節者凡三使焉其餘鎮軍數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相稟屬每俟邊書告急方令計會用兵既無軍法下臨唯以客禮相待是乃從容拯溺揖讓救焚冀無阽危固亦難矣夫兵以氣勢為用者也氣聚則盛散則消勢合則威析則弱今之邊備勢弱氣消建軍若斯可謂力分於將多矣理戎之要最在均齊故軍法無貴賤之差軍實無多少之異是將所以同其志而盡其力也如或誘其志意勉其藝能則當閲其材程其勇校其勞逸度其安危明申練核優劣之科以為衣食等級之制使能者企及否者息心雖有薄厚之殊而無觖望之釁蓋所謂日省月試餼廩稱事如權量之無情於物萬人莫不安其分而服其平也今者窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇角其所能則練習度其所處則孤危考其服役則勞察其臨敵則勇然衣糧所給唯止當身例為妻子所分常有凍餒之色而關東戍卒歲月踐更不安危城不習戎備怯於應敵懈於服勞然衣糧所頒厚踰數等繼以茶藥之饋益以蔬醬之資豐約相形縣絶斯甚又有素非禁旅本是邊軍將校詭為媚詞因請遙隸神策不離舊所唯改虛名其於廩賜之饒遂有三倍之益此則儔類所以忿恨忠良所以憂嗟疲人所以流亡經費所以褊匱夫事業未異而給養有殊人情不能甘也況乎矯佞行而廩賜厚績藝劣而衣食優苟未忘懷孰能無慍不為戎首則已可嘉而欲使其協力同心以攘寇難雖有韓白孫吳之將臣知其必不能焉養士若斯可謂怨生於不均矣凡欲選任將帥必先考察行能然後指以所授之方語以所委之事令其自揣可否自陳規模須某色甲兵藉某人參佐要若干士馬用若干資糧某處置營某時成績始終要領悉俾經綸於是觀其計謀校其聲實若謂材無足取言不可行則當退之於初不宜貽慮於其後也若謂志氣足任方略可施則當要之於終不宜掣肘於其間也夫如是則疑者不使使者不疑勞神於選才端拱於委任既委其事既足其求然後可以核其否臧行其賞罰受其賞者不以為濫當其罰者無得而辭付授之柄既專苟且之心自息是以古之遣將帥者君親推轂而命之曰自閫以外將軍裁之又賜鈇鉞示令專斷故軍容不入國國容不入軍將在軍君命有所不受誠謂機宜不可以遠決號令不可以兩從未有委任不專而望其克寸敵成功者也自頃邊軍去就裁斷多出宸衷選置戎臣先求易制多其部以分其力輕其任以弱其心雖有所懲亦有所失遂令分閫責成之義廢死綏任咎之志衰一則聽命二亦聽命爽於軍情亦聽命乖於事宜亦聽命若所置將帥必取於承順無違則如斯可矣若有意乎平凶靖難則不可也夫兩疆相接兩軍相持事機之來間不容息蓄謀而俟猶恐失之臨時始謀固已疏矣況乎千里之遠九重之深陳述之難明聽覽之不一欲其事無遺策雖聖者亦有所不能焉設使謀慮能周其如權變無及戎虜馳突迅如風飇驛書上聞旬月方報守土者以兵寡不敢抗敵分鎮者以無詔不肯出師逗留之間寇已奔逼託於救援未至各且閉壘自全牧馬屯牛鞠為椎剽嗇夫樵婦罄作俘囚雖詔諸鎮發兵唯以虛聲應援互相瞻顧莫敢遮邀賊既縱掠退歸此乃陳功告捷其敗喪則減百而為一其捃獲則張百而成千將帥既幸於總制在朝不憂罪纍陛下又以為大權由已不究事情用師若斯可謂機失於遙制矣理兵而措置乖方馭將而賞罰虧度制用而財匱建軍而力分養士而怨生用師而機失此六者疆場之蟊賊軍旅之膏肓也蟊賊不除而但滋之以糞溉膏肓不療而苟啖之以滑甘適足以養其害速其災欲求稼穡豐登膚革充美固不可得也臣愚謂宜罷諸道將士番替防秋之制率因舊數而三分之其一分委本道節度使募少壯願住邊城者以徙焉其一分則本道但供衣糧委關內河東諸軍州募蕃漢子弟願傅邊軍者以給焉又一分亦令本道但出衣糧加給應募之人以資新徙之業又令度支散於諸道和市耕牛雇召工人就諸軍城繕造器具募人至者每家給耕牛一頭又給田農水火之器皆令充備初到之歲與家口二人糧并賜種子勸之播植待經一稔俾自給家若有餘糧官為收糴各酬倍價務獎營田既息踐更徵發之煩且無幸災苟免之弊寇至則人自為戰時至則家自力農是乃兵不得不強食不得不足與夫倏來忽往其可同等而論哉臣又謂宜擇文武能臣一人為隴右元帥應涇隴鳳翔長武城山南西道等節度管內兵馬悉以屬焉又擇一人為朔方元帥應鄜坊邠寧靈夏等節度管內兵馬悉以屬焉又擇一人為河東元帥河東振武等節度管內兵馬悉以屬焉三帥各選臨邊要會之州以為理所見置節度有非要者隨所便近而并之唯元帥得置統軍餘並停罷其三帥部內太原鳳翔等府及諸郡戶口稍多者慎簡良吏以為尹守外奉師律內課農桑俾為軍糧以壯戎府理兵之宜既得選帥之道既明然後減姦濫虛浮之費以豐財定衣糧等級之制以和衆宏委任之道以宣其用縣賞罰之典以考其成而又慎守中國之所長謹行當今之所易則八利可致六失可除如是而戎狄不畏懷疆場不寧謐者未之有也諸侯軌道庶類服從如是而教令不行天下不理者亦未之有也以陛下之英聖人心之思安四方之小休兩寇之方靜加以頻年豐稔所在積糧此皆天贊國家可以立制垂統之時也時不久居事不常兼已過而追雖悔無及明主當不以言為罪不以人廢言罄陳狂愚惟所省擇謹奏右希顏奉宣進止朝來共卿等商量竇參事卿等所奏雖於大體甚好然此人交結中外意在不測朕試根尋灼然審知情狀所以有此商量又聞竇參在彼處亦共諸處交通不絶社稷事重卿等只合與朕同憂宜即作文書進來此事非小不可更遲者臣面承深旨又奉密宣皆以社稷為言又知根尋已審敢不上同憂憤內絶狐疑豈願遲回更貽念慮但以嘗經重任斯謂大臣進退之間猶宜有禮誅戮之際不可無名劉晏久掌貨財當時亦招怨讟及加罪責事不分明叛者既得以為辭衆人亦為之懷愍用刑曖昧損纍不輕事例未遙所宜重慎竇參頃司鈞軸頗怙恩私貪叨貨財引縱親黨此則朝廷同議天下共傳至於潛懷異圖將起大惡迹既未露人皆莫知臣等親奉威顏議加刑辟但聞凶險之意尚昧結構之由況在衆流何由察悉忽行峻罰必謂冤誣㣥情震驚事亦非細若不付外推鞫則恐難定罪名乞留睿聰更少詳度竇參於臣素分陛下固所明知有何顧懷輒欲營救良以事關國體義絶私嫌所冀典刑不濫於清時君道免虧於聖德特希天鑒俯亮愚誠謹奏右希顏奉宣進止竇參結朕左右兼有陰謀皆有憑據事不曖昧只緣連及處多不可推按卿等更宜商量若謂恐事體不穩即且流貶向絶遠惡處竇申竇榮李則之首末同惡無所不至又並微細不比竇參宜便商量處置其竇參等所有朋黨親密並不可容在側近宜便條疏盡發遣向僻遠無兵馬處先雖已經流貶更移向遠惡處者伏以竇參罪犯誠合誅夷聖德含宏務全事體特寬嚴憲俯貸餘生始終之恩實足感於庶品仁育之惠不獨幸於斯人所議貶官謹具別狀其竇榮竇申李則之等既皆同惡固亦難容然以得罪相因法有首從首當居重從合差輕參既蒙恩矜全申等亦宜減降又於黨與之內亦有淑慝之殊稍示區分足彰勸勵竇榮與參雖是近屬亦甚相親然於欵密之中都無邪僻之事仍聞激憤屢有直言因此漸構猜嫌晚年頗見疏忌若論今者陰事則尚未究端由如據比來所行必應不至凶險恐須差異以表詳明臣等商量竇榮更貶遠官竇申則之並除名配流謹具別狀進擬庶允從輕之典以洽好生之恩夫趨勢附權時俗常態苟無高節出衆何能特立不㣥竇參久秉鈞衡特承寵渥君之所任孰敢不從或遊於門庭或結以中外或偏被接引或驟與薦延如此之徒十恆七八若聽流議皆謂黨私自非甚與交親安可悉從貶纍況竇參罷黜逮欲周星應是私黨近親當時並已連坐人心久定不可復搖今者再責竇參特緣別有結構陛下親自尋究審得事情所與連謀固知定數今若普加譴斥則恐翻類淪胥罪無指名誰不疑懼中外洶洶殊非令猷臣等商量除同謀陰邪事狀分明者其餘一切更無所問將為穩便未審可否
