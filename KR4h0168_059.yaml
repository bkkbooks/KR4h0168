front:
  text: 全唐文欽定全唐文卷五十九憲宗四
  hash: sha256:97b1add8f5aea8ab96b92f9f7c571a91c81f64324d9dec58aa09b30ea6386092
body:
  text: 周禮政官之屬掌導王志以巡天下之邦國六郡統臨二庭帛丿糸邈居必申警動當懾懷頃自東夏有虞近郊多壘沙朔之外翦為寇戎亭障烽櫓之嚴遐張塞下使譯道途之要遠屬湟中今妖氛甫清師旅方息思欲肅關隴之右地制昆夷於盛秋而慮師無見糧卒有虛籍乏守禦之全備積愁歎之餘音臨軒永懷宜俾宣導非夫忠良練達文武兼資信厚足以得人心恪恭足以奉王事則何以膺茲選任布我憂勞至於問戍役之勤詳山澤之要稽軍實之名數計餽餉之盈虛宿弊有未除衆情有未達兵機虜態一以上聞冀在此行所至循拊宜令左金吾衛大將軍兼御史大夫胡證充京西京北巡邊使所經過州鎮與節度防禦使刺史審量利害具事實聞奏門下贊天工而成光濟叶帝力以致升平非中和稟氣不能將燮調之道非誠明在躬何以膺弼亮之位況今積祆巳弭而邊鄙猶虞大化方行而里閭未泰將欲舉百度甄羣材外撫四夷內輯諸夏納之壽域被以仁風代豫之勤其孰克任眷求斯得是用命之河陽三城懷州節度使朝議郎使持節懷州諸軍事守懷州刺史兼御史大夫賜紫金魚袋令狐楚根於粹厚著以端明表山立之莊容洞泉渟之精識文高雄富學茂該通自頃揮翰掖垣持囊禁署嘗延造膝屢竭沃心發言有誠臨事無惑藹是公望居然國楨及剖符近郊兼暢牧人之術仗節分閫尤深馭衆之方可謂器適中外郊宣文武宜展舟楫之用式登鼎鉉之司管於中樞持我大柄於戲輔翼之任人臣極崇未至而衆議有歸既處而其名罕副萬務攸託朕何賴焉爾其敬聽此言深思其道行致君之志始終勿渝以報國為期夙夜益勵無俾厥后有慙知臣可朝議大夫守中書侍郎同中書門下平章事納大忠樹嘉績為臣所以明極節錫殊寵進高秩有國所以待元臣況乎邦教誕敷王言總會百辟攸憲四方式瞻永念於懷久虛其位載揚成命僉曰休哉宣武軍節度副大使知節度事汴宋亳潁等州觀察處置等使開府儀同三司守司徒兼侍中使持節汴州諸軍事汴州刺史上柱國許國公食邑三千戶韓宏降神挺材積厚成器中蘊深宏之量外標嚴重之姿有匡國濟時之心推誠不耀有夷凶禁暴之略仗義益彰自鎮浚郊二十餘載師徒稟訓而咸肅吏士奉法而愈明俗臻和平人用庶富威聲之重隱若山崇屬者淮濆濯征命統羣帥克殄殘孽惟乃有指縱之功及齊境興妖分師進討遂梟元惡惟乃有略地之效既聞旋旆俄請執圭深陳魏闕之誠遠繼韓侯之志朝大有慶湛露方濃又抗表章固辭戎旅三加敦諭所守彌堅于蕃于宣諒切於注意我弼我輔難違其衷懇式遂良願載兼上司論道之崇因之以齊八政中樞之長升之以贊萬務元衮赤舄備於寵光不有其人孰膺斯任於戲出總兵柄入參廟謨家國之慶盈門君臣之道交泰為我柱石古今曷儔服而滋恭以佑乃辟可依前守司徒兼中書令散官勳封如故主者施行古之所謂有功諸侯出征不庭入覲王室既展述職之義必加錫命之恩彤弓所以表其威元衮所以榮其服然後勳烈照焯寵章榮崇臨於一方示彼四國風雅所載不其美歟我思忠臣是有茲命魏博等州節度觀察處置等使光祿大夫檢校司徒同中書門下平章事兼魏州大都督府長史上柱國沂國公食邑三千戶田宏正受天地之正性明君臣之大節才貫文武識探古今熙百志以立身堅一心而奉主積誠自久遇事乃彰曉於羣情率以大順遂提六郡之地首革兩河之風及負海阻兵徵師問罪又能長驅義旅直抵虜城一鼓而凶徒禠魄再戰而元惡傳首永清氛沴功實卓然自秉圭來朝鳴玉入侍察其器度詢以謨猷每聞匡國之術彌見致君之道而懇陳戀闕不願守藩朕以將相之權中外一體苟意有攸往則誠難遽從況彼邦之人皆願其至師徒久便其訓令黎庶咸思其惠和鎮方之安倚賴攸切是用命爾式遄其歸且兼八舍之營俾仍五教之重又實其井賦益以土田褒賞之典勸忠斯在往草泣乃服厥惟懋哉可檢校司徒兼侍中依前魏州大都督府長史充魏博等州節度觀察處置等使仍賜食實封三百戶致君之道爰在輔臣發揮政經端理教化或彞倫未敘公議不明免其所職蓋常典也正議大夫守中書侍郎同中書門下平章事上柱國賜紫金魚袋崔羣根於溫恭發以詞彩踐履臺閣潤色絲綸嘗以敏才列於宥密考能觀行益表謙勤擢處鈞衡用參大政緝熙之績每竭其謀猷翊贊之心亦彰於夙夜朕旰食思理注於話言善而可行無不虛受而顧問之際謂近於至公詳聽之閒或違於事實將何以同砥於道化洽萬方宜罷印於中樞俾報政於外服優以顯秩爾其勉之可使持節都督潭州諸軍事守潭州刺史兼御史大夫充湖南都團練觀察處置等使勳賜如故朕聞為政以德必推誠而任人為君以道必存體以立國況乎位崇元輔職總庶寮衆方具瞻時以輕重得不明進退之禮全終始之恩太中大夫守門下侍郎同中書門下平章事上輕車都尉賜紫金魚袋令狐楚夙擅懿文纍階清貫先朝特加寵命獎擢內廷出擁旌旄入居鼎鉉朕祗膺寶位注意舊臣方屬奉陵之時委以復土之務是宜竭心徇慮使下不欺而頗聞工徒之訴纍彰官吏之罪遽有章表固求退閒宜歸相印之權往授使符之命仍兼勞於司憲俾奉法以惠人勉率乃心思豫洪覆可使持節宣州諸軍事宣州刺史兼御史大夫宣歙池等州都團練觀察處置使勳賜如故門下普寧公主天泉浴德崇蘭發彩纂組之華每工於經目保阿之訓深得於稚年容禮必叶言行無閒從容珩璜之韻婉娩柔嘉之儀而封疏舊邦禮宜改避是擇美邑再申異恩可改封永昌公主主者施行朕以寡昧纂承丕業永思理本所寶惟賢至如嘉禾神芝奇禽異獸蓋王化之虛美也所以光武形於詔令春秋不書祥瑞朕誠薄德思及前人自今巳後所有祥瑞但令準式申報有司不得上聞其奇禽異獸亦宜停進宣示天下知朕意焉理天下者先修其國國命之重寄在方鎮方鎮共理實惟列城列城為政繫乎屬縣然則匹夫之耕匹婦之織積微成著以供國計永念蒸庶厥惟艱哉頃年以江淮租賦爰及榷稅委在藩服使其平均太上皇君臨之初務從省便遂令使府歸在中朝或恐巡院既多職因交替新制未立舊綱巳紊況河汴而東瀕海之右名都奧壤疆里接連如或征賦不均徵輸難濟物輕貨重法弊人勞又聞江淮數道比愆時雨深憂黎庶之不足軍國之闕供政有所不宣事有所未便牧宰有課績官吏有否臧爰遣使臣申我休命宜令度支及諸道鹽鐵轉運副使戶部侍郎兼御史大夫潘孟陽專往宣諭慰安疲氓詢訪便宜蠲除疾苦安人利國稱朕意焉諸道節度使團練經略防禦等將士久執干戈式遏封略勤勞王室深用嘉之據其優勞並與甄録各委本軍本使即具名銜奏聞申光蔡及陳許兩道將卒百姓等比遭旱損多缺糧儲特宜賑給令其有濟申光蔡等州宜賜米十萬石陳許等州賜米五萬石仍令刑部員外郎薛舟充宣慰使專往存問門下朕聞皇祖元元之誡曰兵者凶器也不得巳而用之恭惟聖謨常所祗股故雖文誥有所不至誠信有所未孚姑務安人必能忍恥朕之此志亦可明徵近者德宗皇帝舉柔遠之規授宰衡之傑宏我廟勝遂康巴庸故得南詔入貢西戎寢患成績始著元臣喪亡劉闢乘此變故坐邀符節朕以枉成命者雖乖於理體從權變者所冀於輯寧竟違卿士之謀遂允僥求之志朕之於闢恩亦宏矣曾不知負牛羊之力飽則逾凶畜梟獍之心馴之益悖誑惑士伍圍逼梓州誘陷戎臣塞絶劒路師徒所至燒掠無遺干紀之辜擢髮難數朕為人司牧育彼黎元如闢之罪非朕敢舍是用叶羣率之謀除百姓之害永清妖孽砥定一方伐罪弔人於是乎在其逆賊劉闢在身官爵並宜削除今王師鼓行尋濟天險梓潼城守巳解攻圍壓卵注螢坐看撲滅其西川將士如有乘此聲勢翻然改圖梟斬凶魁以效誠節者必當特加爵秩高位重賞朕無愛焉其餘將吏等但能去逆效順以所領歸降者超三資授官以一身降者亦與改轉長行官健歸順者並與敘録仍加賞給其西川管內刺史等當其阻亂孰克靜戈雖章表未通而衷誠可見今能歸款亦仍舊職如或乘機立效因事建功並特加酬賞務極優厚夫皇王之道弔伐所加義在除殘情非樂戰故脅從罔理必誡於徂征焚溺是哀但興於徯怨禁暴止亂其在茲乎況有跡陷凶徒心非黨惡歸我無路遂至淪胥言念斯流尤深軫惻所以明諭將帥罪止渠魁其餘染汙一切勿問布告遐邇咸懷朕意搆大廈者必總於羣材成大川者必資於百谷故思理之主求賢罔遺所以昭宣令圖廣大前緒觀文緝化其在茲乎朕以寡昧獲奉丕業虛己問政實始於茲考言求益敢不祗若故命左右輔弼洎有位之臣會於中臺必究其論閒密以獻省自朕躬果獲賢能副於饑渴才識兼茂明於體用科人第三次等元稹韋惇第四等獨孤郁白居易曹京伯韋慶復第四次等崔韶羅讓崔護元修薛存慶韋珩第五上等蕭俯李蟠沈傳師柴宿達於吏理可使從政科第五上等陳岵等咸以待問之美觀光而來詢以三道之要復於九變之選得失之監粲然可觀宜膺德茂之異式叶言揚之舉其第三次等人委中書門下優與處分第四等第四次等第五上等中書門下即與處分朕聞去天下之害者受天下之利故陳諸原野非為樂戰法彼震曜本乎愛人五材不聞於去兵七德必先於禁暴皇王之道豈不然歟逆賊劉闢時之妖孽處肖形之內罔識君親同人代之閒別為梟獍因元臣之蓄聚恃庸蜀之江山誘誤生靈扇充桀逆朕荷祖宗之丕業執邦國之大經人之亂常法所不捨乘茲衆憤爰戒徂征興戈矛於關西發介馬於并郡五營禁旅七萃神兵合貔武之雄授鷹揚之帥守無絶險進靡堅營麾城而壁壘皆空接刃而欃槍盡掃瓦解冰冸渙焉無餘微盧彭濮從茲砥定蕩三蜀之流患除一方之大殘豈豫寡德能致於此斯皆宗社降祐啓無疆之休將帥叶謀成永康之福祗若靈眷嘉乃衆心豫懷惕然若蹈冰谷其收復成都諸大將並擒獲劉闢軍將等委崇文與都監軍使俱文珍條流等第聞奏即有甄升其賞物等委崇文等節級分賜務令優厚投降將士亦委崇文文珍條流聞奏西川諸州鎮刺史大將及參伍官吏將健百姓等一應被彼脅從補署職掌一切不問西川百姓久陷凶逆不免傷殘其兩稅錢等委本道觀察使量事矜減其東川州縣及山南西道當凶徒焚劫之後王師攻取之辰發挽饋軍繕完補缺一日之費豈止千金三軍所資盡出百姓永言勞弊朕所軫懷其東川元和三年上供錢糧並放留州留使錢委觀察使量事矜減仍具數奏聞山南西道元和二年上供錢糧放一半官軍陳亡將士等並委崇文監軍審勘具名銜事跡申奏即與褒贈家口等並委本軍優賞五年不停衣糧並委所在州縣速為收葬仍量事致祭陷在賊中官吏百姓等應有節義著明無辜受戮者並委節度使具名迹奏聞當與追贈仍優給其家又分疆設都蓋資共理疏域制壤亦在稍均將懲難以銷萌在立防而不紊故賈生之議以楚益梁宋氏之規割荊易郢酌於前事宜有變通其西川資陵榮昌瀘等六州宜割屬東川於戲制理經邦必垂意於未亂而養災蓄患固難禁於巳然撲彼燎原至於用鉞永言迷復載軫俱焚咨爾多士體豫深志布告天下咸使聞知劉闢生於世族敢蓄梟心驅劫蜀人拒扞王命肆其狂逆詿誤一州俾我黎元肝腦塗地賊將崔綱等同惡相扇至死不回咸宜伏辜以正刑典劉闢男超郎豺狼醜類難議生全務盡之刑同類九人並宜處斬卿量包久大器茂中和事君推一德之誠與物全四時之信登於臺閣則萬事問於胡公守在方隅則四國宗於申伯舉其實行是可專徽頃者殷憂在辰總録攸重金甌作鎮羣情穆然玉鉉是司庶官咸事朕涉理猶淺惟賢是圖遽陳請老之章將輟弼豫之道一一省覽良為憮然用舍之閒慎重斯在謂雅志之難奪豈余衷之可移是用徵尚德之前經酌優賢之故實去煩就免以職業之勤置几乘車優其筋力之體卿宜起今巳後每月之內常三兩度入朝便至中書商量軍國事務亦冀延於內殿沃朕虛心如此則居多暇辰退可以吐納頤志入參大政進可以偃息藩寮靈壽將置於上庠桑梓豈違於下杜卿仍以朕此意宣示百寮庶乎君臣作合之期乾坤交泰之義無愧前列永貽後昆致仕之詞即宜斷表朕惟承纍聖之業追先正之勞濟於艱難代有勳烈既而本根巳遠枝葉稍零詔書屢勤於褒飾有司不忘於遴簡一命宰輔載宏搜揚録其先功果復良嗣蘇繫等咸以茂學懿行勗於前修皆人之領袖族之狐趙類能而舉各命以官或任以糾繩或參於問列庶乎旌太傅之德將擬南城之封紹酇侯之裔不俟東門之感忠義獲寵古今同之王者旌表通乎異代況音徽未遠名迹可尋風流所傳弊俗興起舉其遺直足勸事君故朝議大夫守給事中襲南陽郡公袁高茂功之後清德冠時貞元初職在論駮常執讜議封還詔書居平蹈常則泛然而無忤會節有立皆卓爾而難踰故能望重明端行滿天下未踰大任遽歿中身德之不忘久而彌著朕方宏景化寤寐前良用旌尚德之懷俾申加等之贈哀榮所被勸獎斯存可贈禮部尚書朕聞好生者天地之仁不在乎肅殺止戈者帝王之武不尚乎誅鋤恭惟至言可謂明誡朕祗荷前訓纘承丕圖每思道以自宏豈佳兵而為念雖朔陲阻命有戡亂之征蜀部興妖獻夷凶之捷而所傷皆及於百姓所費寧止於千金靜言思之往往興歎非不得巳豈復用師李錡屬列宗支任居方伯窮赫奕之貴飽綢繆之恩待以親賢報之以逆節授以師旅用之以亂常肖圓首方足之形無五常百行之性頃者纍陳章疏勤請會朝姦態不形僞言甚懇朕頗謂誠志久方允從乃降詔書俾修覲禮示以後命委其深心而梟音驟呼虺毒橫厲初則詐疾後仍縱兵寮屬以獻規受屠使臣以傳命見脅朕務於含垢未忍明言纍降中人令遵前旨無軺車之戒路有沴氣之滔天加以日逞淫刑冤痛者無告日興暴賦杼軸者皆空赤子咸罄於餱糧白刃屢膏於頸血朕為人父母聞甚惻然罪人無狀却有常刑顧惟紀綱豈敢廢墜其討伐之師並巳有處分剋期齊進其李錡在身官爵階勳等並宜削除仍令宗正寺削一房屬籍其兩都及諸州府應有李錡莊宅錢物等並委所繇官簿録聞奏浙西將士素非同惡朕所深知迫於凶威不能自達但王師進討因事立功梟斬渠魁以效誠節必當特加爵秩超異等倫其將吏等以所領歸降者超三資官以一身降者亦超資改轉官健歸順者厚加賞給仍與敘録明諭將士罪止一夫其餘染汙一切不問厚葬傷生明敕設禁但官司慢法久不申明愚下相循遂至違越其違制賃葬車人六人各決四十泉貨之法義在通流若錢有所壅貨當益賤故藏錢者得乘人之急居貨者必損己之資趨利之徒豈知國計斯弊未革人將不堪今欲著錢令以出滯藏加鼓鑄以資流布使商旅知禁農桑獲安義切救時情非欲利若革之無漸恐人或相驚己日之孚在乎消息應天下商賈先蓄見錢者委所在長吏分明曉諭令收市貨物官中不得輒有程限逼迫商人任其貨易以求便利計周歲之後此法遍行朕當別立新規設蓄錢之禁所以先有告示許其方圓意在他時行法不貸朕志久定固無二言又天下有銀之山必有銅礦銅者有資於鼓鑄銀者無益於生人適開玩好之端豈救饑寒之患況欲加鑄理須併功得不權其重輕使務專一其天下自五嶺以北見採銀坑並宜禁斷恐所在坑戶不免失業各委本州府長吏勸課令其採銅助官中鑄作仍委鹽鐵使即作法優賞條流聞奏於戲人之求利厥路固殊斯道炳然言之不惑凡百有位明悉朕懷
