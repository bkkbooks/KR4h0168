front:
  text: 全唐文欽定全唐文卷三百九十九巡開元時擢書判拔萃科
  hash: sha256:088b6e1f5f6ac8ffee76e701df065d172a2df65f880b438e8e8ede3cef5aed8e
  markers:
  - {type: head, offset: 14, content: 韋巡, id: KR4h0168_NFKB_399-h1, level: 1}
body:
  text: 將正人倫必惟嗣續故有側室嫡子乃別尊卑等威以年以德則聞常典神之聽之抑非通法惟甲啟爾宗廟守其茅苴類簡主之承祧嗣則未卜同獻公之有子其誰立焉爰訪恭王之事更徵駘仲之道佩玉而兆既云取吉當璧而拜遂不敢違且繼體本以承家知子莫若其父借令愚知無辨何得長幼仍乖假之神明其義則淺捨我恒禮取誚何多文過飾詞徒為妄作光期一作光明開元時擢書判拔萃科法均賦斂州訴恐年饑無以給貸且使司法例不平不㐲處斷因為農俾人作畝是刈是穫必在有苗不菑不畬何以望歲故剡耒斵耜自春徂秋雨公及私既庭且碩然後論彼薄稅取於豐年仍聞寡婦之歌寧有匹夫之怨若斯土靡藝大田其荒稼穡之功不加於此寢訛之地或在其中而欲徵諸我箱問彼嘉穀非苗取實慙於老農棄本求華違此通論州縣以廣地為務入粟是功用藏於人何必改舊使司以惠言及物準度從人誚彼均收黜於加減罪雖一致法欲重科然不伐有詞且稱從責隨時之義庶叶論刑璀開元時擢書判拔萃科六藝崇射五善遵禮景也張侯職効能於棲鵠賓之遂貫遽呈妙於啼猿曾不知搢策有揖讓之儀飲算行多少之莭下綱不及如堵奚瞻監者有知奠豐是闕人而無禮袒決難留以之觀德從何擇士若不論辜是誣恒憲為輔彭城人國子祭酒瑗子度土居人量地制邑政不求備官惟其能故周設六卿辨方正位禹敷九土俾乂厎績將以緝綏黎獻作乂都鄙是崇錫命之儀爰求則柄之法靖言伊甲生也逢時祿以代耕榮冀登於一命朝以拜錫位何辭於小國必若才惟致理道可濟時則所告必聞何始乎就列昇高自下宜忘於擇地況堯舜在上車書必同莫非王臣咸仰天秩未能敬恭君命曷得遐棄厥司宜褫帶以受服奚薄言而有訴咎自作也刑其渥凶庶片言之可懲慙兩端而斯和承構開元時擢書判拔萃科讓之禮不坐奠豐上賓袒決而退開彼澤宮臨茲相圃可以觀德必也射乎所以揖讓而升審固而動矢流貫的侯服親於主皮樂奏采蘩笙鏞備於和體豈失於獻士而亂於簡能下綱靡及於地前飛羽虛驚於雲際坐奠斯闕袒決而還宣父之妙誰崇仲由之命何寄且君子之爭應免於嚴科小人伐伎須從於薄黜禮律之道斯合宜然迴開元時擢書判拔萃科將建嗣子必先克家豈惟興宗亦稱繼代今茲甲者昭穆蔑如爰擇允而承祧俾傳榮而開國而乃業歸於幼禮且殊於長年命自於神理徒稱於太室必也義均襄子覩常山而得符迹偶平王拜楚廟而當璧事則有據或者何非且今之所為有異於是無聞德舉將由愛立則震求致福慮喪主鬯之尤事乃得能奚堪幹蠱之任甲且違禮罪實難逃理不足稱刑之無捨暢開元朝進士對臣聞非才難遭時難況躬忝觀光之舉不俟媒揚之地儼身天闕用感良辰伏惟陛下建初立元創業垂統夷兇靖難聖敬日躋格上下而無憂內治光四表而誼德昭振故能荷天之休福應尤盛殷薦嚴配升中告成十數年間而功業大備豈非徇齊之德神化所致哉雖少康復夏宣王興周比之當今萬分不及而猶賜臣策曰常恐上塵五聖之耿光下辱萬方之瞻戴日昃觀政夜分思理者可謂無念增德勿休熙載履眾美而不足躬聖明而流謙而臣愚葑菲誤自充賦雖言及之將何以承奉清問對敭天休乎然臣聞立德之謂道體道之謂仁固無宏逸安敢訛濫是以古之善為士者必將微妙元通豈獨重於偏才迂誕而已如此則黃帝之功濟生人素王之道遵先聖離朱喫詬奚得議其淺深夷齊尹惠抑可語其同異何者食薇絕粟終慙淑媛之言醜夏歸殷卒致成湯之業寓言莊叟良未足徵側訊蒙矜誠將異爾無貪至理寧副虛懷若乃喜怒哀樂之四端貌言視聽思之五事雖擴充之在我諒休咎之關天殷臣格言已貫之於皇極鄒子戲論亦頗存於昭應詎茲辨志方用沃心伏惟陛下事天明事地察無文咸秩㣥望畢舉故祈穀汾脽薦寶鼎於宗廟燔柴岱嶺靄飛烟於雲日神歆效其如答靈貺昭而必聞雖飄風乍起曾不終朝大雨時行旁霑數郡亦未聞偃拔包襄之甚也陛下憂勤夕惕若厲信禹湯之罪已實堯舜之用心蓋天災流行國家代有屠龍牲馬亦何以為書稱安人則惠易翼損上益下謂宜開倉廩以賙給選牧宰以寵綏散利薄征息役施捨禳修之道何莫由斯傳曰德勝不祥義厭不惠謂此物也雖歸諸天道亦以人事故周官六職水旱則宗伯是司漢宰三公災眚則丞相是主不然何以昭燮贊之術開勸戒之端哉大體若茲祥徵何有臣聞夫大理之後有易亂之人者安寧無故驕心起也大亂之後有易理之人者創艾避災思樂生也當今海服清晏太平無虞眾宜曲折萬事纖妙文理至詳不可復加矣陛下享已成之功居崇高之位入有後庭聲色之務出有苑囿遊觀之樂志得無滿乎欲得無極乎古語云行百里者半於九十言末路之難也此言雖微可以喻大是以聖人乾乾日惕莫敢或遑雖休勿休盡善盡美伏願陛下慎終如始以成德政使鴻圖盛烈作唐龍光不騫不虧永永無極此適時務之所當先也臣又聞善為政者在能其事能其事而不知所以少其吏者則竭而不足臣竊惟今國家所使分威權御黎庶斡府庫理刑獄者皆天下長吏也而其俸祿各有差等以勸其徒百官以理萬人以察天下幸甚然而都內冗散叨假名器者不可勝數或倡優雜伎之伍弁射夷貊之流紆紫懷金出入周衞漿酒霍肉乘堅策肥者奉一人猶聞不給今官此軰何所取資狐鼠既託於城社粟帛載殫於倉庫非所謂侍御僕從罔非正人爵勿及惡德惟其賢者矣此救弊之所急也臣草莽諸生地卑識淺陛下誘而進之訪以時政將承汝弻安敢面從輕陳末議伏深隕越謹對勵已開元時擢書判拔萃科大道既隱天下為家巢燧已遠於三皇城邑已安於萬姓將以寇盜無擾鄰伍有孚崇墉濬洫用備於王制屋粟里布亦率於周典猗嗟彼甲務成厥功足使孔子門人論於千乘之賦鄭國說者難於九仞之高豈謂立身致誠人未從命不聞忠信之迹翻起比周之言忘筌深謝於得魚致損俄聞於屬狗且辨璧以聽理貴審詳束矢而論道取嚴科損者恐其無過命者寧載有詞待窮三刺之典爰措片言之折武有七德戎械攸先禮有五經喪紀為重少府秦卿命爵海稅孔殷太史吳將疏苗家聲允迪天有成命式裁弦木之規人之云亡來展生芻之弔雖圓鑿方枘恒必由之而同波異瀾區以別矣何者弧矢之利張皇國威俯企之儀撙節人序理宜器因古式自取妙於烏號禮合前聞固無譏於鼠刺昔宋公研慮妙盡踰山齊婦御哀深辭在野何得輕其琱葺命不審於絲言忽彼朋從慟無依於繐帳遂使規殊宛轉未全明月之輝交喪親仁遽異成風之質且天子疏制佇九合以成規友生不幸拊百身而奚贖魚膠象珥已爽今儀白馬素車全殊昔契造虧夾臾豈獻春材哀傃寢門徒悲宿草眷茲有失請依漢相之科推彼無儀深懵鄒人之識或恐規聞異制制因義而隨時禮有異文文緣情而僶俛自須見可而進未必同年擇善而行寧俟終日濟開元時擢書判拔萃科俾侯胙土分茅撫封視彼黔黎均其毛澤今者制田非古厚斂殘人履畝尚徇於魯宣盍徹蔑聞於有若且農之有畔穀不過藉小桀之規是舉大侵之禮謂何此而浚我以生無乃刑人之力既貪膏壤取溢京坻獨阻南薰盡其東畝雖非入已已是盜臣無罔繡衣請從褫帶廷瑤開元時擢書判拔萃科主器承宗雖存乎冢嫡象賢擇德必在乎權宜甲何人哉將定諸嗣年則有序未肆契龜之卜室乎憑靈遂稽當璧之懿由是求周之故伯邑見捨即趙之美無恤是膺既崇定命之制克允尊神之道古則然矣夫何非哉儒卿開元時擢書判拔萃科因固作關設險居國豈伊征算是隔夷夏踰則歸法理惟其常越度人斯初聞有告棄繻抗志無似終軍之遊辭謀遂行且殊蘧瑗之出彼則請給寧異公文足可坐視更籌候雞鳴而容度豈謂意淩霄漢學鳧飛而影移行雖有由越侵無狀寘之於理其誰不然濯開元時擢書判拔萃科納約自牖是修禘祫於穆清廟肅供神人既不專而為名當幹蠱而承孝惟於甲也克構是思擇乎太室期以當阼壓紐斯兆想平王之舊儀佩玉忘哀痛石駘之絕繼神保是格信龜筮之叶和人謀僉同乃七鬯而不喪就諸臣位尚檀弓之所嗤辱以臨喪蓋子游之習禮先乎幼者豈曰遲迴誣善之人何詞以免韋賢後嗣謀之允臧季歷嘉猷誰執為咎或委咸股誠為朶頤自羝羊而觸藩侔鼫鼠而非據小懲是誡宜在執牛忿疾於頑無行射隼子季開元時擢書判拔萃科日車南至星斗北迴徂歲既窮重陰觱發寒生大漠雪下平蕪海曲於是先行山陰由其興往惟備乃無患必藉重裘而彰厥有常須遵法服甲榮微簪組候屬嚴凝節愧高臺寧懷平君之操尊非楚國輕襲靈王之儀罪當抵於嚴霜詞徒稱於積霰向若楚制是用庸敢避於濡身今乃秦陶謬加因難逭於非服既負不衷之刺宜投僭上之科海水有期三秋必壯江濤可望八月須迎孫戩既曰篙工是稱舟子自言習水不慮驚風豈知白馬俄奔空邀伍相青鳧坐覆忽識馮夷應同罔象之神頗異呂梁之子媚容悲厂田坴枕草志切投牋忽以祠瓜何殊薦芰銜心似石寧怕海童泣淚如珠即追泉客初均洛媛持弱態以淩波竟學曹娥抱沈骸而出浪論情足為純孝撫事不愧裦揚未題黃絹之詞先置元縲之罪州司治獄法恐不然縣請立碑理應為當俗請置判縣供釋菜賓社之用使人觀習省以為非所宜言不為聞欲科罪訴云州將鹵簿見著令文且方古軒縣為降已其置之何過雅有大夫樂有君子將以昇幽崇德降物平心當令率土齊觀頌無為而擊壤普天同樂學操縵以施絃涓選既修匡衡之章遂覩鄭聲久絕文侯之臥亦興比屋可封薰琴解慍自應兩日施化三年有成釋菜之儀則聞於肆夏賓社之用蓋取於登歌欲還甿庶之風何假大夫之樂而引今鹵簿空肆危言州乃不應請置有紊彞章省以非所宜言雅符公正事緣共理過亦難科未推皋陶之刑宜典平輿之品日進開元時擢書判拔萃科政在利人法難變古苟非慎舉事則不經伊丙列侯無聞嘉績未明盡地之力獨聞履畝之稅且以小惠誅怨莫見安人之理蘊利生孼先聞入已之嫌重稅既同於魯侯盍徹明棄於周典憲臺糾謬實可準繩分土煩言益為文過敢告司敗宜寘薄刑禹錫開元時擢書判拔萃科周曰胥吏漢稱轓幹既別府中之位仍標軨下之曹所以安其計食從於負版乙忻逢有造幸預可封不學奇童俄為小吏既而心勤左右荏苒驅馳慕郭太之平生有蕭何之志業帶昆吾之寶寧慙挂樹之人棄回祿之烟誰賞移薪之客功曹班同許邵才謝山濤未見優容飜聞致罰情有所急罪不合加韓卿開元時擢書判拔萃科星開并汾嶽鎮恒山聚氣成德蘊靈藏寶吐納烟雲之秀密邇胡狄之鄉國之大儀實在明祀所司有事期用無失潔牲幣而茂典舉祈懸而揭名茲秩秩而備章佇穰穰而助福山既若是川亦有之抑此沈辜之迹實重澤物之祭爰考樂歌與流峙而無別及徵禮號乃科目之斯殊豈得視諸侯之秩薦三公之用苟則有紊孰云不知御史學優竹帛榮高衣繡既觀祠祀之差遂推簡墨之糾諒為昭範斯得罪人法開元時擢書拔判萃科詩咏考槃易稱嘉遯聲流載籍美播邱山誠出處之多途乃蕭蘭之或致至若邱中老圃漢上栖神跡徒挂於幽閑名未通於束帛既而金潭洗菊不暇優游玉甃滋園徒施混沌御史乘驄按俗持斧臨人有悔必彈聞善斯舉然以羸瓶小節抱甕微流賁然來思竊用多愧或告云矯深紊前聞生也不甘如何厚貌韞價開元時擢書判拔萃科覆釜遐源濫觴遙派龍門激浪飛竹箭於千里馬頰驚流擁桃花於三月尺波不住素序或臨霧逐牛迷查隨客至維舟不易航葦稱難洪濤之委無涯下方之傷遄及隄防是制啟塞隨時固之則兩傷毀之則雙美津吏宅生禹跡行偶堯封名厠水官位居河右使迴天之浪遙注百川濺日之波傍流九派水工末品直買公心算垂柳之懸隄借瓠子之成詠雖守挈瓶之智還貽膠柱之責依津吏之請杜水工之疑不俟終日於是乎在先之開元時擢書判拔萃科易陳殷薦書列禋宗於昭孝祀作樂崇德况春冰風泮河濱有獺祭之魚秋葉霜凋山林有豺祭之獸微物尚爾生靈伊何且國有十倫仕登三命尊卑式序威儀孔昭車服以庸祀享寧僭矧惟舉禮無乃用心凡舉特牲者克從其秩祀少牢者實符於班失或歸於訟人禮不黷於君子謂之過矣其在茲乎尚溫開元時擢書判拔萃科使人以時不奪農務前王令典歷代通規頃屬月離畢星天作霖雨緣河諸郡水害方殷王尊之祭徒誠陽侯之怒無息是隳隄堰乃請修營動眾興功雖不違於九月免徭酬直或大優於百姓握蘭則兩停俱廢恐未得於隨時剖竹則二事兼全亦頗同於大過況頻遭墊溺人實阻饑若不冬成必貽春慮理須折衷事遣合宜則丞相無壞陂之尤將軍免負薪之苦立開元時擢書判拔萃科丁本諸生弱齡有志操觚游藝負笈從師服膺孔甲之書留心田蚡之業精窮小學聲洽大成庚有親仁之風乃思延譽之美為游揚於左右得推擇於簪裾不以引重之恩而忘奏舉之義盡言報德在此奉公韓厥之故事非遙郤詵之前蹤可襲行諸則仰推故典止之則未識通方自得盡忠之規何聽無稽之說峴開元時擢書判拔萃科有教無類下學上達春詩秋禮日就月將必復象賢之規以光齒冑之訓喻玉成器符金滿籝渥赭觀其屢舞拾青嘉其載擇况乎服勤多闕仰止徒虛溫故知新未之已矣進德修業此其謂何是朽木之難雕非檟楚之能及造士選士匪曰伊人左鄉右鄉攸稱往誥雖迂夫僰寄斥之遐邈且涉禦魑之罰將有招魂之詞會府以近瀆刑章言投法理監司以遠探經義事合禮文亦既狀申復奚科抑
