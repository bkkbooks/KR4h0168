  - {type: head, offset: 3966, content: 得津吏告下方傷水請毀左右隄水工景固爭, id: KR4h0168_NFKB_399-h59, level: 2}
  - {type: head, offset: 4133, content: 盧先之, id: KR4h0168_NFKB_399-h60, level: 1}
  - {type: head, offset: 4144, content: 對三命判, id: KR4h0168_NFKB_399-h61, level: 2}
  - {type: head, offset: 4144, content: 乙仕登三命舉以特牲祀以少牢人告其僭加於舉禮也, id: KR4h0168_NFKB_399-h62, level: 2}
  - {type: head, offset: 4261, content: 郭尚溫, id: KR4h0168_NFKB_399-h63, level: 1}
  - {type: head, offset: 4272, content: 對無夫修隄堰判, id: KR4h0168_NFKB_399-h64, level: 2}
  - {type: head, offset: 4272, content: 河南諸州申無夫修理隄堰請與之平價仍免外徭省司以為與平價則官無所供免外徭則公事廢闕不之許州訴人實阻饑恐不及冬成至春復桃花水為害, id: KR4h0168_NFKB_399-h65, level: 2}
  - {type: head, offset: 4412, content: 郭立, id: KR4h0168_NFKB_399-h66, level: 1}
  - {type: head, offset: 4422, content: 對學書判, id: KR4h0168_NFKB_399-h67, level: 2}
  - {type: head, offset: 4422, content: 丁學盤盂書庚相為引重後一云遂學或止之舉庚或止之丁云以此報德, id: KR4h0168_NFKB_399-h68, level: 2}
  - {type: head, offset: 4542, content: 于峴, id: KR4h0168_NFKB_399-h69, level: 1}
  - {type: head, offset: 4552, content: 對投諸僰寄判, id: KR4h0168_NFKB_399-h70, level: 2}
  - {type: head, offset: 4552, content: 得國子監稱諸冑子不親師教將僰寄之省讓其侵冒刑章寘之於理監固論不已, id: KR4h0168_NFKB_399-h71, level: 2}
