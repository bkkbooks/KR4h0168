front:
  text: 全唐文欽定全唐文卷二百二十五張說五
  hash: sha256:cc0bbe7e2a2df95c138be46bf30e2973efd044424f6c3ea56333e9265cde1141
body:
  text: 大總管右金吾衞大將軍兼檢校洛州長史河內郡王臣某前軍總管行左衞翊府中郎將上柱國定陽郡開國公臣楊元基行軍長史朝奉大夫守給事中護軍臣唐奉一行軍司馬通議大夫行天官郎中臣鄭果等言臣聞氛祲薄霄戎狄謀夏則武庫兵動中國有弧矢之威文昌將飛邊城用金革之事葢以式遏姦暴大庇黎人震蠻蕩夷明罰耀武者也伏惟天冊金輪聖神皇帝陛下仁覆有截化被無外皇圖未臣之黨帝載不庭之俗罔不衣被聲教浸潤邕熙望雲向風密邇遐裔而契丹凶醜奴隸餘苗非冒頓之榮族異單于之貴種徒以錯居遠郡漸化平時田牧混乎四甿貿遷通於三市戍人解甲邊馬垂轡禽獸飽而忘恩蜂蠆養而恣毒敢孤亭育自絕生成乃狼心干紀鴟張竊發虐我邊吏覆我鎮軍大殘於夷落孤竹淪於荒虛陛下震赫斯之怒授決勝之符天地合謀鬼神助順六狄舉國百蠻整衆運欃槍而埽除從列缺而焚蕩臣飲冰受斧指日揚麾雖謝河閒之學竊慕任城之勇誓將首冒鋒刃躬先士卒上假神兵之威下定鬼方之罪兇醜狂悖素無大志因乘便利扇動姦回去歲嘗師疑一軍之盡化今春輕敵見三帥之不歸蟻聚實繁豺牙益厲結山戎以西寇連島夷而東入臣乃廣開形勢大振聲威移告郡邑金湯固守傳檄諸軍掎角相應清邊道大總管建安郡王攸宜仗鉞薊門作鎮燕國當要害之地挫虎狼之㣥高壘深溝臥舊營而不動山雲鳥陣死地而無疑總管沙叱忠義王伯禮安道買等兵臨易水使接桑河犀渠衝將士之冠雕騎落將軍之箭四面當敵九拒乘城御史大夫婁師德總管高再牟薛思行等扞敵中山折衝外侮訓厲鷹揚之士輯睦震驚之師其餘部散校分離綱別緒兵車星布巡太行而綴碣石介馬雲羅挾衡漳而連海浦山川積雨盡消邊騎之塵草木長風咸有王師之氣清邊士馬稍南驅而擁蹙神兵甲卒漸北逐以威臨但合圍而持重未輕挑而即戰重以藩臣默啜統率氈裘控弦逾於萬騎帶甲彌於千里長驅松漠掩集柳城巢穴是空胎卵皆覆於時賊衆兵馬屯逼幽州聞其塞外之敗懼有舟中之敵勢力外窘心腹內乖建安郡王攸宜蓄銳泉停乘機電發援桴作氣則山岳動搖書箭一飛則酋渠相滅兵纔接刃元兇授首舂喉蔽野京觀起於中州積甲成山組練收於外府雖本根斯拔巳蕩滌於一隅而餘蔓所滋尚聯延於數郡賊帥何阿小等頑凶是極屠儈為資授其署置肆行驅掠幽陵之下不知首惡之巳擒兩河之閒仍謂游魂之可恃士女遭其逼脅軍城被其屠陷以殺戮為事戶積虔劉之悲以劫奪為心家盈剝割之痛鹿城縣令李懷璧衣冠貴冑令長崇班背我朝恩歸城敵寇潛修甲杖輸以利器之資見委兵權當其上將之任蠢茲狂亂暫同燎火言事翦除方申沃雪臣乃盛兵邢趙塞井陘之隘命虎賁之將遏其衝突之鋒長史唐奉一馳使洛魏據阿曹之津縱羽林之雄挫其侵軼之勢臣又遣前軍總管忠武將軍行左衞翊府中郎將上柱國定陽郡開國公楊元基押飛騎營中郎將李鐸子總管雲麾將軍行玉鈐衞翊府中郎將康國公阿史那毗伽子總管冠軍大將軍行左玉鈐衞翊府中郎將宋撥延子總管冠軍大將軍行左金吾衞翊府郎將回鶻果別勅行人雲麾將軍康戡誕子總管定遠將軍左威衞長李當義壯武將軍何義本子總管忠武將軍何利深子總管壯武將軍俱羅罹淮宣威將軍行左玉鈐衞翊府郎將蘇達俟斤度施子總管定王府典軍成善威子總管押飛騎定遠將軍平原府左果毅長上穆仙童子總管劉尚珪子總管渭州府左果毅鹿思讓押飛騎左玉鈐衞隊正長上賈楚珪左鷹揚衞長上花匡鼎押飛騎李言忠押飛騎沮忠揚鎮副張元孜押飛騎康景休押飛騎左監門衞司戈竇九臯別奏右武威衞長上楊仁爽左武威衞長上楊裔原州崇岡鎮副康戌子右監門衞長上傅阿毛左監門衞長史殷承範右衞長上王仁奬右衞執㦸嚴宏炎右金吾衞羅元讓潭州花石戍主蘇元暉前右武威衞長鄭嘉祥左衞司戈鄭彥湊媯州威寧戍主崔思暕押步兵子總管左玉鈐衞長上張中儼別奏首領蘇農婆羅三品子首領宋義本別奏游擊將軍左玉鈐衞宿衞歌咄施注比別奏鄭思疾左衞潞州府果毅員外置同正阿史皎子總管王城府檢校果毅任宏誓別奏檢校虞侯任處寂別奏裴光嗣等徇其東北又遣子總管游擊將軍玉鈐左司階伏羌縣開國男李宏顏子總管邢州司戶參軍飛烏縣開國男常元楷子總管原州廣牧領將軍元寂子總管右武衞員外置同正武元禮子總管前潞州參軍武其別勅行人張景扶州刺史舊鎮副崔敬一右武衞中郎將阿史德奉職右鷹威衞將軍業溫啜剌俟斤右豹韜衞柔遠府長史上果毅吐火羅決斯右金吾衞果毅執失守直右鷹揚郎將員外置同正阿所冄左玉鈐衞長上借緋金元濟東天竺國王子僧伽杖摩右鷹揚衞郎將僕固郡骨支左金吾衞郎將阿康地具右武威衞郎將東河察使左豹韜衞高城府長上果毅阿史德伏麾支右玉鈐衞郎將路驢駒左金吾衞長上阿史德伏麾支右玉鈐衞郎將路欲谷遊擊將軍葛羅枝延遊擊將軍契苾木昆折衝都尉車鼻施俟斤虔州猶口鎮副白善德晉州仁壽府果毅侯義威子總管左武威衞侯神城府果毅杜元隱押後隊長上李德峻天官常選王暠常彥緯押千騎三交戍董元景河州安喬戍主王才龕別奏康元寂押千騎隊楊待封前冀州堂陽縣丞溫待禮別勅行人白君等略其西南或折衝其前或乘躡其後整貔貅之佐奮猛毅之倫長㦸林迴高旗雲橈賊黨晷窮漏急命窄途殫執無全之心投必死之計以今月一日何阿小等帥不悛之旅擁脅從之衆結聚數萬抗拒官軍自寅及午前後九陣元基等並鋒鏑爭先戈鋋遞躍抗足而跐鮮卑之血塗地攘臂而扔烏丸之首積野摧同冰陷裂若山焚窮其子遺無復噍類斬獲逆賊冀州三品大總管何阿小逆賊河北道招慰大使冀州刺史馬行慰逆賊冀州道副大總管楊奉節逆賊冀州長史王宏允逆賊總管劉伏念逆賊十二衞大將軍見任鹿城縣令李懷璧逆賊信都縣令楊志寂總管胡六郎逆賊總管王知先逆賊帥馬明誓逆賊三品總管姬目等魁首巨蠹三百餘人所有戎馬憑陵殘毀之地臣皆宣布制旨撫集其人咸懷聖恩俱得復業㣥凶既定冀方砥平二載逋誅一朝泯滅數州愁毒俄然清弭舞溢河冀歌達塞垣截風浪以息滄溟廓氛埃而清白日郤縠何力敢推㣥帥之勞叔向有言實在明君之德臣憑藉睿略忝當戎政神機密運不待橫草之功天贊冥符恭承破竹之勢伏惟廟勝速奉朝歡抃舞之情倍萬恒品不勝慶快之至謹遣傔人天官常選李佑別奏左衞長上校尉張德俊奉露布以聞其軍資器械別簿條上謹言若夫玉毫流照甘露灑於大千金鏡揚輝薰風被於有截故知示現三界粵稱天下之尊光宅四表式標域中之大是以慧日淪影像化之跡東歸帝猷宏闡大章之步西極有慈恩道場三藏法師諱元奘俗姓陳氏其先潁川人也帝軒提象控華渚而開源大舜賓門基歷山而聳搆三恪照於姬載六竒光於漢祀書奏而承朗月遊道而聚德星縱壑駢鱗培風齊翼世濟之美鬱為景冑法師藉慶誕生含和降德結根深而艹侻茂道源浚而靈長竒開之歲霞軒月舉聚沙之年蘭薰桂馥洎乎成立藝殫墳素九臯載響五府交辟以夫早悟真假夙照慈慧鏡真筌而延佇顧生涯而永息而朱紱紫纓誠有界之徽網寶車丹枕實出世之津途由是擯落塵滓言歸閑曠令兄長寂法師釋門之棟幹者也擅龍象於身世挺鶖鷺於當年朝野挹其風猷中外羨其聲采既而情深友愛道穆天倫法師服勤請益分陰靡棄業光上首擢秀檀林德契中庸騰芬蘭室抗策平道包九部而吞夢鼓枻元津俯四韋而小魯自茲徧遊談肆載移涼燠功既成矣能亦畢矣至於泰初日月燭耀靈臺子雲鞶帨發揮神府於是金文暫啟佇秋駕而雲趨玉柄纔撝披霧市而波屬若會斵輪之旨猶知拜瑟之微以瀉瓶之多聞泛虛舟而獨遠廼於轘轅之地先摧鍱腹之誇井絡之鄉遽表浮杯之異遠邇宗挹為之語曰昔聞荀氏八龍今見陳門雙驥汝潁多竒士誠哉此言法師自幼迄長遊刃元籍名流先達部執交馳趨末忘本摭華捐實遂有南北異學是非紛糾永言於此良用憮然或恐傳譯踳駮未能筌究欲窮香象之文將罄龍宮之目以絕倫之德屬會昌之期杖錫拂衣第如遐境於是背元灞而延望指葱山而矯跡川陸帛丿糸長備嘗艱險陋博望之非遠嗤法顯之為局遊踐之處畢究方言鐫求幽賾妙窮津會於是詞發雌黃飛英天竺文傳貝葉聿歸震旦太宗文皇帝金輪纂御寶位居尊載佇風徽召見青蒲之上廼眷通識前膝黃屋之閒手詔綢繆中使繼路俯摛睿思乃製三藏聖教序凡七百八十言今上昔在春闈裁述聖記凡五百七十九言啟元妙之津書揄揚之旨葢非道映雞林譽光鷲嶽豈能緬降神藻以旌時秀奉詔翻譯梵本凡六百五十七部具覽遐方異俗絕壤殊風土著之宜人備之序正朔所暨聲教所覃著大唐西域記勒成一十二卷編錄典奧綜覈明審立言不朽其在茲焉特進集賢院學士修國史上柱國燕國公臣說言歷者先王以明時授人敬天育物者也辰極恒居斗運不息晦朔相推而變月寒暑往來而成歲日月右進周天之度啟星辰左旋正時之氣合積餘分而置閏配甲子而設蔀鳳鳥為司疇人受職分分而加之者百鈞必過毫毫而減之者千里必差何則古法存而其人異也不有大聖孰能起之伏惟開元神武皇帝陛下欽崇天道慎徽月令受命再新改制創歷十有三祀詔沙門一行上本軒頊夏殷周魯五王一侯之遺式下集太初至於麟德二十三家之衆議比其異同課其疎密或前疑而後定或始會而終乖振古未探之象必發揮於神筭大鈞不測之氣盡覼縷於天聰廼更審日晷之短長度星閒之廣狹繩九道之朓朒糾五精之進退參大衍天地之數綜八卦六爻之序一轍於文王也覈春秋交蝕之辰研九疇五紀之奧同符於孔子也杼軸萬象優遊四載奏章朝竟一公夕落臣說奉詔金門成書冊府先有理歷陳景善筭趙昇首尾參元之言接承轉籌之意因而緝合編次勒成一部名曰開元大衍歷經七章一卷長歷三卷歷議十卷立成法十二卷天竺九執歷一卷古今歷書二十四卷略例奏章一卷凡五十二卷所以貫三才周萬物窮數術先鬼神稱制曰者即聖人顧訪之旨標謹按者是歷家進對之辭非軒后至聖不啟履端之業非容成詣極不就歸餘之經據其圖也七政之天心不遠守其術也千歲之日月可知葢中黃之寶符太紫之神器者也謹以十六年八月端五赤光照室之夜皇雄成紀之辰當一元之出符獻萬壽之新歷伏望藏之書殿錄於紀言掌之太史頒於司歷制曰可萬行起於心心人之主三乘歸於一一法之宗知心無所得是真得見一無不通是元通如來說五蘊皆空人本空也如來說諸法空相法亦空也知法照空見空舍法二者知見復非空耶是故定與慧俱空法中立入此門者為明門行此路者為超路非夫行深般若者其孰能證於此乎祕書少監駙馬都尉滎陽鄭萬鈞深藝之士也學有傳癖書成草聖廼揮灑手翰鐫刻心經樹聖善之寶坊啟未來之華葉佛以無依相而說法本不生我以無得心而傳今則無滅道存文字意齊天壤國老張說聞而嘉焉讚揚佛事題之樂石有生之性萬殊無方之盛一節陽和而動植暢春滿而臯壤悅后皇所以發時令布新慶二南邁周召之風百辟形金石之詠者也碧流日暖南山雪殘首獻歲之浹辰尾暮春之提日帝京形勝借上林而入遊戚里池臺就修竹而開宴泉賙御府味給天廚仙倡侑樂中貴督酒太平佳事前史未書大矣哉一德日新九功惟敘運璿樞而均四氣握金鏡而靜萬方堯舜湯文不違顏於咫尺夔龍伊呂共接武於朝廷不可見而見焉不可聞而聞焉豈深思勝殘去殺累百年之至仁推歷按圖啟千齡之昌運河清難得人代幾何擊壤之歡良有以也此則青門上路朱邸平臺城煙屢起而泊山野風時來而過水春將悵別愛落花之灑途夏如欣會玩峯雲之映沼爾其列筵授几分曹設幕艇送江鳬舩迎海鶴魚龍丸劍曼延揮霍鸞鳳鳴簫鼓作申錫逾於百甕慈心出於三爵炮炙熏林塘醪醴厭邱壑抃急管於無筭醉湛恩以取樂㣥公賦詩俾僕題序長卿消渴覺含毫之轉遲子雲壯夫見雕蟲之都廢敢憚鄙詞之訥澀恐貽盛集之蕪穢云爾尋花柳者上賜㣥臣之宴也大哉春氣同夫聖心無物不榮有情咸達況乃五教敷洽萬邦懷和尉警而莫犯刑法存而不用歷觀近古此遇良難諸公入金門侍瑤殿窈窕雲閣葳蕤華館不亦泰乎然王事靡盬夙夜在公接良會於愷澤散煩襟於清曠不亦優乎爾其嘉賓爰集勝賞斯備召絲竹於伶官借池亭於貴里雕俎在席金羈駐門遠山片雲隔層城而助興繁鶯芳樹遶高臺而共樂旨酒未缺芳塘半陰盍陳既醉之詩以永太平之日谷子者昔與說聯務蓬山出入三載事志相得情深友于尋屬吾人秩遷迫吏畿劇愛而不見春也再華今說復謝書坊補他職窮猨之意不擇儒林喜且把袂舊筵解帶餘日臥玩文墨笑談平生茲歡豈多後面方永沈沈春雨人亦淹留宵旰天子送冬卿之詩也河朔愆歲恒陽俟牧借威六官導俗千里俾乎列城遷仰止之化鄰境蒙波及之澤不然者豈一小郡而勞大賢哉尚書河東侯朝廷之舊宰也操法度於掌握運陶鈞於方寸是將敷皇惠寒谷挾纊而知暄暢君恩疲人飲德而自飽蘇其槁瘁樂我陽和亢宗殿國亦望於此於時春帶餘寒野銜殘雪太官重味御酒百壺供帳臨岐假絲竹以留宴傾城出餞會文章以寵行三台厚常寮之意八座深聯事之矚既而離人遽起班馬爭嘶尋太行之連山想邯鄲之長陌雖仰瞻鴻鴈來往易於前期而相對桑榆遲暮難於遠別送歸之地歡悵如何應制華篇凡若干首騫翔鸞鳳欲掛千金之木糾合蛟龍附藏㣥玉之府置之懷袖以慰遐心云爾夫王者所以威四海攘六夷雖在德與兵亦曰有數焉爾歲纏奮若月交臯且皇帝有天下之十二載也金精東上雄漢國之兵形天道南來告胡庭之運盡帝曰亞爾倅朔方文廟授鉞御閑錫馬太卜禎辰乘輿餞宴臨長樂而推轂頓近郊而誓旅總部曲統五羌署將士校侯王班律事功列而後動於時大雨洗兵長風憤角雷輜轂野而千里霜㦸林森而萬隊左翊碣石右角臨洮鐵騎連光金鼓接氣秉旌旗掃朔漠縱熊羆獵葦澤故將堙龍海夷鷹關郡高闕縣盧山碣陰陵以築觀醢單于以享士東震浴日西盪弱水立不世之奇功報舊年之宿恥巳矣以衆有素飽之怒將有必取之謀如田生耀武炳文運籌入幕平戎之業不再舉矣於是南宮舍郎東觀墨客朋修合俎載酒同筵攄憤作歌臨途贈劍勉哉夫子尚桓桓焉和戎送桓侯之詩長安三年吐蕃乞附中國有聖殊俗向風納虎豹之文修葡萄之貢憬平分六狄之種類包九羌之山谷前代䍐羈歷年多梗至仁深感今也來王鳳閣舍人攝鸞臺侍郎桓言重一國妙結成之選志澄四方俞即敘之征季春令日張旃首路置酒中省歡言少留同列穆乎匪他舊寮嬰其相應夫廣覆如天博容如地德流膏雨懷洽異類順乎太和以樂生遂性者聖主之用心也罷甲兵坦疆埸厚忠信親蠻貊臻夫無事以繼好息人者國家之急務也遇非常之時決希代之策金幣以將命歌鍾以報勳驅戎心於彀中一王化於海外此亦使臣之盛業是一行也有三美焉凡所賦詩以存大雅云爾夫良才出乎休運大任歸乎令德四海既安乃注意於賢相兩都分正實具瞻乎師尹鸞臺侍郎兼左庶子韋公國之楨幹人之表儀矜嚴有叔子之容持重得楊公之望門通禁省當朝稱累代之名管綜諸闈帖職盡一時之美頃以五星東聚八月西巡武王既入於鎬京君陳當往於洛邑中日晷之盈縮均天宇之會同清廟明堂政理之本也太倉武庫兵食之原也機務所總半天下之軍國聽訟實繁連海隅之郡縣恩有密而處遠事有疎而授親腹心遐寄惟賢是屬歲臨單閼月在長嬴同蕭何之居守當陰識之留鎮北闕拜辭西堂宴餞大君垂藻承月露之光榮元良賜服被星海之耀潤執事以同列之好載壺酒而送行鄴公以彌甥之禮掃郊園而留別此地有離洲別嶼竹館荷亭曲沼環合而連注叢山相望而閒起幽隱長寂蕭條遠風通終南之雲氣下昆明之水鳥爾其駐馬青林肆筵碧岸清管四發坐客增悲高臺一望遊人忘返韋公方祗率嘉命保釐成周樹之風聲流我王澤然而臨觴不樂首路遲遲瑣闈夕拜戀未央之宮闕錦服晝遊懷杜陵之桑梓層城日下高葢雲飛天子賦詩巳載寵行之史㣥公盛集須傳出宿之文凡若干首合成一卷陸生何幸暫遊朝宰之班商也斐然輕述國風之序云爾時哉天啟元聖山輸股肱飛鶴銜書幽求鬼谷之路潛龜載籙振奮明庭之下禮靡淑而不優遯無遐而不至三蜀嚴子西南之選也登英江漢冑德沈宜志量夷雅情幾深祕煥乎炳淩雲之才襃然光大風之舉敷陳青茂三道而登科名聞赤墀拜一命而干吏蜀門勝地邑雄左帛丿糸岷山故鄉人榮衣錦既而飲冰從政選日戒途方將越碧巒之衆難阻綠江之多險顧瞻周道載懷京邑綺筵臨路而告別朱葢傾城而出餞衣冠成市翰墨為林增樂府於蜀道嗣文集於金谷是日孟冬十月朔風四起高天清迥孤雲不飛長衢蒼茫寒木無影之子於邁跂予望之豈云路遠交有鳴鶴之義無以位卑士有勤人之道贈言凡什錄為一卷昔之謂良宰者講道議行訓俗式人出自郎官遷登郡守不以才限流品位遷寵賂聖歷之際任賢稽古毛明府執德不回發言無擇雍容文雅罷曲江之曳裾樽酒絃歌即平鄉之製錦甲朝辭洛宴別嘉賓孟夏涉河路踐芳草眷彼燕趙頃罹戎寇金革毒三北之師杼軸醜二東之賦毛公將勝苛居止濁徐清不下堂而為理有入境而先歎朋知坐閒弦望何時益賦金谷之詩遠送邯鄲之陌愛而不見同夫樹萱姑射之嶄巖兮曲有龍於其中迹不違喧朅來朝市之遊心不忘寂復歸林壑之幽帝城為別臨御溝之潺湲青山可望嘉白雲之徘徊亦有詠歌式闕臣聞七聲無主律呂綜其和五綵無章黼黻交其麗是知氣有壹鬱非巧辭莫之通形有萬變非工文莫之寫先王以是經天地究人神闡寂寞鑑幽昧文之辭義大矣哉上官昭容者故中書侍郎儀之孫也明淑挺生才華絕代敏識聰聽探微鏡理開卷海納宛若前聞搖筆雲飛咸同宿搆初沛國夫人之方娠也夢巨人俾之大秤曰以是秤量天下既而昭容生彌月夫人弄之曰秤量天下豈在子乎孩遂啞啞應之曰是生而能言葢為靈也越在襁褓入於掖庭天實啟之故毀家而資國運將興也故成德而受任自則天久視之後中宗景龍之際十數年閒六合清謐內峻圖書之府外闢修文之館搜英獵俊野無遺才右職以精學為先大臣以無文為恥每豫遊宮觀行幸河山白雲起而帝歌翠華飛而臣賦雅頌之盛與三代同風豈惟聖后之好文亦云奧主之協讚者也古者有女史記功書過復有女尚書決事容閤昭宮兩朝專美一日萬機顧問不遺應接如響雖漢稱班媛晉譽左嬪文章之道不殊輔佐之功則異迹祕九天之上身沒重泉之下嘉猷令範代䍐得聞庶姬後學嗚呼何仰然則大君據四海之圖懸百靈之命喜則九圍挾纊怒則千里流血靜則黔黎乂安動則蒼甿罷弊入耳之語諒其難乎貴而勢大者疑賤而禮絕者隔近而言輕者忽遠而意忠者忤惟窈窕柔曼誘掖善心忘味九德之衢傾情六藝之圃故登崑巡海之意寢翦胡刈越之威息璿臺珍服之態消從禽嗜樂之端廢獨使溫柔之教漸於生人風雅之聲流於來葉非夫元黃毓粹貞明助思衆妙扶識㣥靈挾志誕異人之寶授興王之瑞其孰能臻斯懿乎鎮國太平公主道高帝妹才重天人昔嘗共遊東壁同宴北渚倏來忽往物在人亡憫雕琯之殘言悲素扇之空曲上聞天子求椒掖之故事有命史臣敘蘭臺之新集凡若干卷列之如左夫言者志之所之文者物之相雜然則心不可蘊故發揮以形容辭不可陋故錯綜以潤色萬象鼓舞入有名之地五音繁雜出無聲之境非窮神體妙其孰能與於此乎洛州司馬張公名希元中山人也族高辰象氣壯河山神作銅鈎天開金印孝友內植禮樂外滋勵行閨庭鄉人謂之曾子飛名都邑諸儒號曰聖童下帷覃思穿牆嗜古蓬山芸觀之書㣥玉懸金之記魯宮藏篆汲冢遺編無不日覽萬言暗識三篋博學吞九流之要處盈若虛雄辯敵四海之鋒退藏於密漢王問策知帝者之師楚子聞名實諸侯之選故得雄飛白鷹揚丹筆卷襜帷於天郡設鈎距於皇都若乃抗埋輪之章執驚馬之議旌賢有通德之教疾惡存署背之文繼軌前途遇物成興理關刑政咸歸故事之臺義涉箴規盡入名臣之奏加以許與氣類交游豪傑仕遘夷險身更否泰昔嘗攝戎幽易謫居邛巂亭臯漫漫興去國之悲旗鼓洶洶助從軍之樂時復江鸎遷樹隴鴈出雲夢上京之臺沼想故山之風月發言而宮商應搖筆而綺繡飛逸勢標起竒情新拔靈仙變化星漢昭回感激精微混韶武於金奏天然壯麗綷雲霞於玉樓當代名流翕然崇尚自大夫之頌成室太史之賦京都魏則十龍儒雅晉則三陽藻綴朝分南北運迄周隋文人才子重世閒出豈止柟榴體物陳琳得以示人鷦鷯寄辭阮籍稱其王佐故以開國籍鱗次乎史傳之首入文塲羽儀乎天下之半公增繁榮葉桂林之一枝彌廣源流荊江之九派宗門多士斯為盛與且如承家舊德之基賓王歷官之序玉琯銅渾之數黃公元女之符落猿殪兕之巧顧鵲迴鸞之妙詳諸別傳可略言焉某室邇蘭芬族聯棣萼荷千里之嘉奬接四友之良游謹撰令引式題前集七子賦詩期取類於鄭志一家垂範庶齊衡於孔藂來日新文請諸君子起儀鳳之後迄景龍以前凡若干卷列之如目唐會稽孔季翊字季和識真之士也弱冠制舉授校書郎轉國子主簿年三十一卒於左補闕祖紹安中書舍人考楨絳州刺史季和清規素業有奕代之訓依仁遊藝其聖者之後永昌之始接跡書坊有廣漢陳子昂鉅鹿魏知古高陽許望信都杜澄昌樂谷倚廣陵馬懷素東萊王無競河南元希聲臨淄李伯魚譙國桓彥範僉謂季和神清韻遠析理探微衞叔寶之比也嗚呼人斯云亡世閱多故十年之外零落將盡而後來者皆首華金步鳴玉負璽丹地揮毫紫宸何嘗不拜職之日歎在劉王喬臨壇之時恨無謝益壽者矣頃見許州之子風裁可觀潘子之門有尼夏侯之學傳建集作者五卷以示子稱從弟四人皆良器愴相如之遺草幸公業之不亡因敘曩意存之篇首云爾
