  text: 全唐文欽定全唐文卷九百五十二
  hash: sha256:627aebbe77ffef33c6f8178630407e2b9cbeccefba66962c7db4920302a0a862
  markers:
  - {type: head, offset: 14, content: 張純如, id: KR4h0168_NFKB_952-h1, level: 1}
body:
  text: 周道不虧嗣從嫡長魯風一變新用休祥爰稽仲子之文實定伯禽之裔抑為大典猶天之志蔑云議以合權繼月之書可仰惟乙誕茲蘭夢慶及茅封天孤逮事之歡神錫小同之字等康成之後允克紹家聲類桓子之先宗儻為公輔且立嗣不拘遺腹無長則合承家非俗說之輕談固典章之彞範乙當承襲理在不疑蓋取諸益乃九扈之資始仰法於旗亦六齊之攸作國家制事利物順時設教豳詩土鼓不忘舊章飲酒勞農聿修前典屬務畢南畝歲居北陸司穡無事索綯以居野人得所草笠斯糾我皇流澤既一弛而一張農夫力田必強飲而強食俾乎老物是息畯人醉止百禮以洽一國若狂瞻彼大酋掌此公酒既盎緹之有闕云秫稻之未備人而是糾方事畢修職司其憂必作事而謀始欲求無咎豈惟刑之可逃師資之道非惟今日隨時之義亦自從來顧諟觀生積習元象窮大衍之數藏往知來考天官之書鉤深賾祕雖請益不倦而斯道難宏忝曰服膺束修宜其見贈雖云伎術酒脯何所欲供算例無憑師同苟失人情未爽庚實可矜祭禮崇孝祀事孔明既前期筮賓亦將獻諏日於是闢廟門以展禮所敬在供列有司而行事不敢違犯孟壬義重五經職惟三命有豐卷之位不請田以用牲明周公之典據少牢而乃給然尸祝甚儼雷洗具陳剛鬣柔毛則云肥腯簠簋普淖所謂馨香宰人銜命以抽扄仲已遽資於執畢又以舉肉在禮實曰無違贊者則那每事奚其不問患既自掇爭乃增羞博士勿謂於貴和贊者終宜於伏罪祭祀之儀精誠為大陳列之品持玉攸先苟違禮經神將焉饗故博碩肥腯無禮不足為豐潢汙行潦有禮不嫌於薄雖既灌之後吾不欲觀而陳玉之前故為徹奠有年雖不由玉無禮誰愛其羊覽甲訴之詞覺其小失詳監祀所糾頗為合宜夫露者陰陽之精氣天地之靈液也秋冬濁而春夏清晞於朝而生於夕隨時應變不凝不積遇物受彩因象而光滴滴瀝瀝熒熒煌煌爾其為大也澄九天而淨六合爾其為廣也清四極而灑八荒故能消歇氛埃生成草木羃䍥千品霑濡萬族其澤厚矣其潤深矣願聞其始試言厥初兆自元氣生於太虛巨人飲之而不死上古吮之而穴居天無雲兮珠的皪野有草兮玉扶疏寫蟲鳥兮為篆懷蛟龍兮著書河洛建都兮氣均風雨甘泉築館兮名亞儲胥或泛灩池臺或葳蕤竹柏鶬鶊鳴兮色紫鴻雁來兮光白露之為德也天乙所以為王侯露之為文也詩人所以歌召伯既因甘而作頌稱未晞而留客是時鷙鳥初擊鳴蟬向晚悲九節之相催恨三危之路遠或乃幽閨織婦初下鳴機徘徊空院悵望秋暉洞房月入羅帳螢飛看鴻雁之將度怨良人兮不歸灑交頤之玉筯苦寒露之沾衣至如關山氣寒瀚海風急胡侵隴塞兵屯馬邑征人此時思歸下泣不覺漣如沾我衣溼別有洛陽才子人間秀士遠自巖曲來遊學市有恨驚心無人知巳聞墜葉而歎息對浮雲而愁起悽悽兮恍若有亡覩蒹葭之蒼蒼惜白露而為霜宋大夫聞而歎曰歲乎不我與一寒一暑昔時春晚拂楊柳於南津今日秋深落芙蓉於北渚古人未達平生羇旅君何為而絶絃感知音而相許重曰白日黯黯兮秋風多緑川蕭蕭兮空水波聞郢中之有曲試調露而為歌歌曰天降氣兮地凝精皇德茂兮芝蓋平金盤漬兮玉杯清葉有露兮落有聲遼東之鶴中夜驚日南之雞淩晨鳴華山柏兮多珠露松子服之得長生天地設位羲和配職節氣序分保章有典叶四時之明著授生人之出入庚來就學補我觀生朝視禎祥夜瞻恆象願知分野思辨華夏未明蜀使之來尚昧嚴陵之坐師徵其禮同彼算生以觀七宿之功援引六觚之事尚乖著業徒爾受財雖勤望於束修終難同於伎術生之不伏頗同無犯無隱師之固求有異惟貞惟一各宜知理奚至費詞射以選德期於禦武引或不中病在即戎瞻彼夏卿置茲列校行乎歷試采五善於禮容俾其載張徵七札之武力然以進不失鵠取必穿楊授受皆據於格文是視靡求於戰勝戴鶡興論雖繩闕事之非司馬與能難加有司之罰臣某言伏見詔書以臣族兄瑗守度支尚書三元告慶萬國朝宗榮命與璧月相輝厚澤與金雲並潤顧其疏薄寧不震驚臣某中謝臣聞坳堂之水必膠於置杯曲木為資無階於刻桷何則適用之風斯替其效靡成失材之道既彰厥功寧著相彼庶物尚或其然矧伊名器理難冒居微臣自料浮淺業藝何甄德匪潤身學慙為已文辭小道曾無沉鬱之才刀筆淺能非有精明之舉特以夙因多幸簉奉承華猶見録其疲駘且弗遺其菅蒯高榮好爵謺委屢縻入掌便繁傍參侍從自然積步竟慙一割竊妨賢路深希退託降階之念空誓丹愚昭著之恩更彰綸紱差肩六尚方駕八元內省輶輕義無祇冒伏惟陛下明兼七曜照及九幽寧在微臣近虧則哲特願褰茲旒纊察是芻蕘回此如綸矜茲匪石則失善之應永息得人之美載揚物議允諧朝經式序設法安人守官之能政革弊易俗經邦之茂典必從宜而有素豈循常以見稱甲恤隱在懷薀利為任思豐壤以務本患杼柚之將空畝稅惟輕地利斯盡庶無捐瘠俾家給而藏嫌於聚斂何縣廪是積况詩剌重賦傳美寬征魯公不足聞諸有若之對齊國以富實資管仲之言曾謂舉善奚其數過但恐永圖難繼涼德不堪苟闕斯人容無效此主上大明臨下有赫國章式序天秩孔昭亞歲崇時見之儀㣥吏修會同之禮倬玉階之仗左右薰風頒金彞之酒東西湛露庭實千品間皮馬以分行朝會九賓錯華蟲而雜燕羽觴無算元澤初流兕觥其觩皇歡以接賜上樽之旨酒帝命空霑承大聖之鴻恩天廚不給眷言此咎罪莫重焉所司罷供實違常典既罹深罰邦有常刑易稱上棟下宇禮載度堂考室眷言崇飾誠有等威動而或踰過則誰任丁沐我皇化策名清時既登大夫之職方用少牢之禮爰修其廟載飾其椽斫之則通礱之未可事且非據法實難容尋考父之銘雖同三命徵穀梁之傳則僭諸侯憲局所科罪斯得中山川咸秩嘉其以靈雪霜不時於是乎禜庪縣斯設典禮孔明乙職惟奉公思不出位百里行善且在子男之列十倫展祭爰僭諸侯之封孰謂鄹人不如林放固宜按法曾是簡彞必也驕陽害時司嗇憚暑詩歌太甚義救如焚信靡神而不宗在精祈而則可用寧旱暵難責規為雖欲正名如其恤隱不乏吾事須旌墨綬之賢空惜爾為無允彤襜之舉昔夫子有石硯焉邈觀器用宛無雕鐫古石猶在今人尚傳從歎鳳兮何世至獲麟兮幾年世歷近王近霸年止幾徂幾遷任往回於几席垂翰墨於韋編時亦遠矣物仍在焉非聖人之休祐安得茲而不涓洎乎俗遠聖賢教遺齊魯列廟以居先師攸主上熒熒以光徹旁羃羃以色固介爾堅貞確乎規矩昔諸侯立政周道無聞嗟禮樂之仍缺歎詩書而未分聖人乃啓以褒貶垂以典墳必藉茲器用成斯文蓋石固而人往亦事存乎硯云至乃方質圓形銅模龜首雕飾為用陶甄可久橫彩煙而不絶添緑水而常有豈如石焉斯為不朽昔偶宣父厥容伊何旁積垂露中含偃波時代遷移去游夏而彌遠日月逾邁變炎涼之已多別有逢掖書生獻策東京仰希先哲攻文後成叨秉筆以當問愧含毫而頌聲天道廓兮日月為久聖人作兮衣冠為首彼將照臨萬有此將肅穆㣥后是以明王代寶君子學干總朝廷之要惟進賢之冠寸之七且比夫七德梁之三又取夫三端至美乎威儀棣棣經營乎束帛戔戔知人不易行之維難將欲招隱逸責聲實脅讒佞為忠貞革貪侈為廉質則以正御下雖居高匪危以虛制有縱持滿何溢動法道靜得一自代兮經為此名無止兮驗彼天秩徒以賢能有意於賢不言而信不用於權俾荷寵祿者賢賢而易色榮上林者安安而能遷久要不忘雖敝必加於首嫌疑不涉李下豈整其偏則鶡之果也武重蟬之潔也政先諒當用而為用信元之而又元若因物揆理易人推遷非德不依智也非禮勿動慎也唯賢必舉義也任用無為順也包四善而世濟其美別九儀而尊固其信夫預明試者稽乎人言為大夫者資乎能賦則流問以體物敢不立言以存務將欲存義闕一字終則用之不窮將闕一字述功之懋則物無能措詩云服之無斁吾以斯文之為度昔者聖人之理天下也辨方位垂衣裳制茲手板整乎維綱莫不明有德著才良法天地體陰陽欲其表行見能則外文而內質取其前讓後敬則上圓而下方笏之時義遠矣大矣蕭何列其深規郭璞辨其微旨請原為用之本特申建造之始採文竹拔象齒爰謀爰相載考載擬華睆功一作切錯英明卓峙煥飛霞綴流晷殊相逸發竒文秀起五嶽備焉四瀆呈止上及君帝下及庶士或魚鬚而表其章或玉珽以申其美故能朱紫不奪尊卑咸理懿夫植性端平文理中正間瓊辨而雪白對華纓而冰淨出入必書俯仰惟敬其在宗廟即搢而請享其在朝廷即端而受命豈不用舍隨時物莫之令雖冠冕之貴黼黻之飾徒有備於朝儀孰與茲而同德歷衆珍以探美惟明珠之獨妍自然虛靜不假雕鐫光熠熠以照物勢規規而抱圓西山之下隨珠星而隱見東海之上逐明月而虧全故能色奪琉璃光射金玉鮫人泣吳江之際游女弄漢皋之曲在蜀郡而浮青居石家而字緑無脛而至有感必通去映魏車之乘來還合浦之中垂輕簾而璀璨綴珠網之玲瓏然明鑑不渝奇如何賞觀之則符彩溢目捧之則分明盈掌使野客取於驪龍仙帝歸之象罔豈直水懷川媚夜光晨朗而已哉偉夫宛轉周流通冥洞幽物有求於我我於物無求是則文魚謝恩將我酬於漢室靈蛇報德將我答於隋侯則知珠之為用久矣為用深矣一丸則鶴贈於噲參九曲乃蟻穿於夫子所貴藏於寶匣不可避於金市有褐被之士懷而不厭敢向君以暗投請不驚於按劍者也杲杲太陽升自扶桑既移晷而高下亦候時而短長其沒也天地為之黯色其出也遠近為之生光及夫春景初動寒威始歇煦百川以冰開暖千林而花發行乎赤道應其朱明煎緑潭而水沸爛青雲而火生於斯之時誠可畏也既而暑退涼進煙歸霧返懸淨影以悠揚度斜暉而晼晚送秋景之己末屬冬陰之方盛融晴雪而曭朗曝晨霜而溫映於斯之時誠可愛也故能明以成象高以臨空有形必鑑無幽不通在七政雖擅其長照萬物不競其功抱三足之靈烏掛五彩之輕虹魯陽揮戈而三舍漢皇握鏡而再中曜凝霜而輕白帶飛霞而淡紅皎兮潔每守團圓不虧缺曈兮曨暮落西山朝海東誰復知其動靜安能察其始終徒美其委質上浮流光下濟不擇好惡不遺巨細葵藿向之傾心旗常畫以增麗匪杖策之能及豈長繩之可繫至若螢火聚然魚燭並爇明月高映繁星遠列爭散彩以炫晃競騰輝以昭晰見白日之一臨總光沉而影滅則知赫然作色無物不憚溫然為容有情皆玩終而復始既明且煥自非造化之至精焉能作㣥生之壯觀瀛州天尊院立於唐孝明皇帝時方尊老子為元元皇帝故道士之徒樹宮以奉焉至於二百年高堂非故遺構尚存畫壁一堵固獲無損其父老並云天寶間吳胄曹過此一夕所成圖寫既畢騎驢徑去院中人追留再三終不可得觀其意思遐邈筆迹有神誠希代之妙也瞻諦無已為之贊云海天蒼蒼海波浪浪島嶼碎破乾坤開張指我片壁坐收八荒遠樹亞日疑回扶桑樓臺飛空雲烟俱揚胄曹落筆快如吹霜不待劒舞縱橫佚常絶藝誰授胸含神明揮斥僧繇笑叱長庚唯千載而獨出以光有唐惟公曾祖諱皇行都督府録事參軍祖雯謺州刺史考忠滑州靈昌縣令公能繼大賢克昌厥後解褐薛王府參軍歷河南新安縣尉轉濟源縣主簿遷光祿寺主簿官雖未遠名乃益隆由是宰汝州梁縣懷州河內三縣今鏤章是式朱紱斯皇加朝散大夫猶舊任也甲子歲二月有詔大擇邑長俾康人庶公歷試甸服遹多頌聲自山陽復為新安令明號令正獄刑閲疆理均井賦一之歲不茹不吐二之歲作懟乃止三之歲不競不絿四之歲人異周漢化同蒲密此邦也郭抱連麓門開故關當洛陽西偏之境接長安東狩之區日候萬乘歲供百役公化洽於下使推循良名聞在天人願襁負翰飛臺閣其則不遠筠等仰念遺惠永懷令紀文成不刊可勒永久頌曰天命良宰操刀必割三科設教四人棄末庶政其凝在邦必達愷悌君子德音來括人有子弟卵而翼之人有土田播而植之用人惟已去惡無疑永懷惠化頌德豐碑造化巍巍表迹西夏蓄巨靈之贔屭擇雄峯以照寫迥抗㣥嶽旁臨九野誰謂河廣我則視之於掌中誰謂山高我則數之於指下駭乎哉當其清濁未判兆朕未彰孰謂真宰廓此殊常奠峻崿之葱翠分靈掌之元黃直指無虧受金莖之徑質如山不動合仁義於聖王爾其雲散天澄烟消雨霽旭日暉映陰崖虧蔽狀若拍紅霞之霏微捧青霄之搖曳察其迹也雖見於東峯混其嶽焉是配於秋帝及乎蓐收謝元冥格日彩寒霜氣白上捫星漢左控虞虢南聳㣥嶺北臨廣陌將招泛槎之仙如指迷途之客至其嵐翠朝鬱輕雲夕過桂影依稀而流照松風髣佛而扇和時也靄靄溶溶疑掩冰紈之被蒼蒼羃羃如揮舞袖之羅功洽於人則擘太華援長河俾安流而不極遹徂東而自北千古獲其永賴兆庶階於壽域同彼補天之功陋其拔山之力然而山匪我開功匪我裁班形今古任質徘徊人之睹也因似而生意靈之契也曷究其從來風物已淒我來自西駭高掌之隱嶙思元化之端倪願稅駕以攀覽庶登路而見攜
