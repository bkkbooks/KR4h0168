front:
  text: 全唐文欽定全唐文卷七百九十四樵字可之韓昌黎門人大中中進士
  hash: sha256:6fe88acd8be5e04f6d01fb10037df870378a291dc3bef111f3220b95b61e7609
  markers:
  - {type: head, offset: 14, content: 孫樵(一), id: KR4h0168_NFKB_794-h1, level: 1}
body:
  text: 孫樵齒貢士名旅見大明宮前庭仰貽俯駭陰意靈怪暮歸魂動中宵而爿夢爿夢彼大明宮神前有云且曰太宗皇帝繚瀛啓居廓穹起廬圜然而劃隆然而赫孰窬孰隟永求帝宅帝詔吾司其宮與日月終翼聖護艱十有六君蕩妖斬氛孰知吾勤吾當廬陵鍚武廟祏撤主吾則協二毗輔左右提護義甲憤徒起帝仆周吾則械二黠雛俾即其誅胡猘飽腯踣肌齚骨驚血濺闕仰吠白日二聖各轍大麓北挈吾則激髯孽悖節俾濟逆殺翼兩傑憤烈俾即斫滅薊梟妖狂突集五堂縱啄怒吞大駕驚奔吾則勵陰刀翦其翼俾不得逃明殛三革蝕黑孰匪吾力吾見若正聲在懸諍舌在軒輟黈延諫刳襟沃善賞必正名怒必正刑當獄撤腥當稼吞螟吾則入瀆革濁入囿肉角旬澤暮溥斗穀視土吾見若姦聲在堂諛舌在旁窒聰怫諷正斥邪寵嘉賞失節怒罰失殺奪農而徭厚征而雕吾則反耀而彗反澤而沴蕩坤而拆裂乾而石然吾留帝宮中二百年昔亦日月今亦日月往孰為設今孰為缺籍民其雕有野而蒿籍甲其虛有壘而墟西垣何縮匹馬不牧北垣何蹙孤壘城粒言未及闋樵迎斬其舌且曰余聞宰獲其哲得是赫烈老魅迹結爾會何伐宰獲其慝得是昏蝕魅怪橫惑爾曾何力今者日白風清忠簡盈庭闔南俟霈闔北俟霽矧帝城闐闐何賴窮邊帑廩加封何賴疲農禁甲飽獰尚何用天下兵神曾何知孰愧往時神不能對退而笑曰孫樵誰欺乎欺古乎欺今乎吁武皇郊天明年作望仙臺於城之南農事方殷而興土工且有糜於縣官也樵東過驪山得露臺遺基遂作賦以諷之驪橫秦原東走盤連其土如積其高逾尺隱於修岡屹若環堂徘徊山下問於牧者對曰惟昔漢文為天下君守以恭默民無怨慝天下大同帝駕而東經營相視茲山之址乃因其崇以興土功茲臺之基軫於帝思既命其吏校之經費乃下詔曰朕以涼德君於萬國唯日兢兢如蹈春冰高祖惠宗肇啓我邦墉作此宮室庶幾無逸逮夫朕躬孰敢加隆矧糜府財以經此臺周為靈臺成乎子來文王以升以考休徵此臺以平周德惟馨章華雖高楚民亦勞靈王宣驕諸侯不朝民既攜二王遂以死豈朕不懲斯役實興鳩材集工以害三農斯豈文王靈臺之不日哉宣詔有司亟令罷之此遺基之所以存者乎卒歌而去之且曰彼通天兮鞅埃之巍巍此靈臺兮蔽秋草之離離已而已而世無比兮吾孰知其是非辛酉之直年兮引敗軍而言旋濟潼梓之重江出大劒之復關駭天險之重阻兮峙連岡而外坤譎石詭崖汨汨其城屬兮屹紆鬱于雲昏嵌嵒嵒而查牙兮上攢羅布而戛天中呀拆以隙斜兮途詰屈而隘穿以去以來奔蹄疾足兮鼠出入乎穴間蹇余馬之不息屆峽山之逼側劃崇巒而急來水涵空而混碧途迫高而緣深不尺直而又曲跬危步之促促栗若跣而蹈朝天雙峙以虧蔽中慘栗而陰翳倏下馳而上回若出地而天開龍堂呀呀而上啓怪若虎踞而欲噬泉觱沸而中冽靈窸窣乎像設眄山川而懷古得籌筆於途説指前峰之孤秀傳臥龍之餘烈嘗杖師而北去抗霸國而此決曾尺疆之不闢徒齎志而灰滅越百牢而南指憩石門之委邃六陰崖而戶開屹巍巍以皚皚外攢怪石之參差兮勢嶪嶻而山排狀若鬱雲之始騰又似乎潮波之卻頽䆗窱以窙豁敞曭朗而洞達摧嵓泉之瀯瀯鏘環珮於閨闥躡危石而後通忽泱漭而無窮包溪懷壑而為深兮繚巒岡而四崇蘿薜羃歷於嵓穴兮雲木森其青蔥鬱桂椒與木蘭兮芬淑郁而駭風不可以久留兮車軋軋而又東陟雞幘之險墟下七折之峻阪褒斜紆其隘束兮左窮溪兮右重巘綿飛棧而屬危梁兮續畏途而呀斷下臨千仞之驚流兮波澒洞而雷抃當元冬之隆烈觸密雲之飛噴舞回飈而揚九垠天地紛其漫漫路縈積以迷沒馬蕭蕭而不進心悸悸而程不敢逸兮徒憭栗而興歎出大散之奧區若脫足於囚拘涉汧渭之沄沄歷岐雍之通途田原鬱以澶漫兮彌千里而為都背槐里而趨咸陽兮索嬴劉之舊墟承明冀闕緬以夷漫兮得隱嶙之頽隅獨五陵之尚完兀高平而草蕪抵長都之岌岌排閶闔而西入何天衢之廣闢仰白日之赫赫彀弱弓而滿鉛鏃兮即澤宮而睨的夫何疏貢之缺條兮忽有司之吾斥曾不得而上達兮居悒悒而不適闕庭藹其多士兮皆云亟夫賢索不自分其能否兮瞰朱門之投迹蔑一人之我先若捧水而投石念初心之來斯豈窮愁而徒疑忽徊徊以惶惶蹇東西而獨悲因默默以心計兮思展轉而自非胡不知進之與道謀兮徒盛氣而憤時不知求己以為慮兮而患人之不知九衢廣其茫茫兮混埃而紅飛漂世波而上下兮旁窮走而相追不亦勞乎於是謝唯唯之面朋而焚逐逐之躁機餒不飽謀凍不燠謀兮環畝墻而闔扉邀仁義與之為友乎追五經而為師徜徉文章之林圃兮與百氏而驅馳不穀吾不恥穀亦吾不辭彼主張為公者豈終吾遺哉黑帝歷窮帝命青帝嗣其公皇帝備牲牢鼓鐘迎饗于郊東賤臣樵寓疏太常上奏曰天有四時陛下實行之是天乘陛下政令明昏而為燠寒也青帝何功而饗乎寬空春之日陛下廩以時出帛以時恤則蘖芽弩拔勾萌畢達矣夏之日陛下農事無所奪山麓無所伐則草木壯茁國無夭札矣秋之日陛下獄無曲決畋無圍殺則霜露不失節萬物固結矣冬之日陛下地氣不掘泄室屋不徹發則豐隆不敢擊越百蟄塞穴矣聖人之時日南無驕陽啓蟄無繁霜斗北無伏陰火西無滯霖淫昏之世反膏而波反冰而花雹傷螟嚙旱赤雨血是陛下政令出乎修明則寒暑運行政令出乎淫昏則災祥屢臻其可忽乎臣又聞陛下與人為春得革慘作和起枿生華喜滿其家沃穆歡咳如暖景時開樹色煙光覺蔥蘢芳蒼陛下與人為秋得愁刮人魄風日冷白栗栗蕭索覺庭槐枯落陛下與人為夏得變絺成襦噓燼作爐駒驅轍結雜還噎楔門如三伏熱陛下與人為冬得舉眥不見日凍薄人骨間間戚戚燈青火白無蹄轍迹顧陛下左右皆春天下病悴者衆也陛下肘腋皆熱中國病凍者衆也豈陛下用心有頗焉陛下苟能平其心雖澤不周惠不均天下無恨言不然天將視陛下心而燠寒也賤臣樵上言臣以為殘蠹於民者㣥矒最大且十口之家男力而耕女力而織雖乘樂歲其衣食僅自給也楝宇僅自完也若㣥矒者所飽必稻粱所衣必錦縠居則邃宇出則肥馬是則中戶不十不足以活一矒武皇帝元年籍天下㣥矒者凡十七萬夫以十家給一矒是編戶一百七十萬困於㣥矒矣武皇帝一旦髮天下㣥矒悉歸平民是時一百七十萬家之心咸知生地陛下自即位以來詔營廢寺以復㣥矒自元年正月洎今年五月斤斧之聲不絶天下而工未以訖聞陛下即復之不休臣恐數年之間天下十七萬矒如故矣臣以為武皇帝即不能除㣥矒陛下尚宜勉思而去之以蘇疲氓况將興於已廢乎請以開元之事言之開元之間大駕還自東封從以千官之衆六軍之事三日留於陳留民猶有餘力今陛下即能東封道次給一食則民力殫矣何開元之民力有餘而陛下之民力不足耶開元之間率戶出兵籍而為伍春夏縱之家以力耕稼秋冬聚之將以戒武事如此則兵未始廢於農農未嘗奪於兵故開元之民力有餘也今天下常兵不下百萬皆衣食於平民歲度其費率中戶五僅能活一兵如此則編戶不五百萬不足以給之故陛下之民力不足也今陛下以力不足之民而欲重困於㣥矒將何以踵開元太平事耶貞觀以還開元戶口最為殷繁不能逾九百萬即今有問於戶部其能如開元乎借如陛下以五百萬給天下之兵今又欲以一百七十萬給於㣥矒是六百七十萬無羡賦矣即今戶口不下於開元其餘止二百萬而國家萬故畢出其間陛下孰與其足也則是鹽鐵不可除而榷管加算矣天下之民得不重困乎日者陛下嘗欲營國東門諫議大夫入爭於前一言未及終陛下非徒輟其工而又賜帛以優之今所復寺宇豈特國門之急乎叢徒嘯工豈特國民之役乎寧諫議大夫不以言而陛下不以聽耶陛下即不能復廢之臣願陛下已復之矒止而勿復加已營之寺止而勿復修庶幾天下之民尚可活也今天下最不可去者兵也臣尚為陛下日夜思去兵之術究開元太平事冀異日為陛下言之况去無用之矒耶臣樵昧死以言樵嘗為日蝕書以為國家設諫官期換君心之非不以一咈其言而怠於諫即繼以死非其職耶執事居其官亦嘗有意於此乎開元之間豈特諫官而後言耶苟立天子廷者皆得開口奮舌爭於上前故自貞觀以還開元之政最為修明及林甫舞智以固權張詐以聾上於是束㣥僚之口縛諫官之舌且以法中敢言者由是林甫之惡熾而勿復聞祿山之逆祕而勿復知天寶之政由此而荒矣今者下無林甫遏諫之權上有開元虛已之勞如此則敘立朝廷者皆得道上是非不顧時忌矧執事官曰諫議哉執事卒不能言避其官而逃其祿可也他官秩優而位崇者豈少耶今年三月上嘗欲營治國門執事尚諫罷之今詔營廢寺以復㣥矒三年之間斧斤之聲不絶度其經費豈特國門之廣乎稽其所務豈特國門之急乎何執事在國門則知諫在復廢寺則緘默勇其細而怯其大豈諫議大夫職耶樵以為大蠹生民者不過㣥矒武皇帝發憤除之冀活疲氓今天下之民喘未及息國家復欲興既除之矒以重困之將何以致民之蕃富乎樵不知時態竊所憤勇故作奏書一通以明㣥矒大蠹之由生民重困之源無路上聞輒以寓獻執事倘以樵書不為狂試入為上言其略文章如面史才最難到司馬子長之地千載獨聞得揚子雲唐朝以文索士二百年間作者數十輩獨高韓吏部吏部修順宗實録尚不能當孟堅其能與子長子雲相上下乎足下乃小史尚宜世嗣史法矧足下才力雄獨意語橫闊嘗序義復岡及樂武事其説要害在樵宜一二百言者足下能數十字輒盡情狀及意窮事際反若有千百言在筆下足下齒髮未及壯其所得如此則不知子長子雲當足下年齒時文章果何如也然足下所傳史法與樵所聞者異耶古史有直事俚言者有文飾者乃特紀前人一時語以為實録非謂俚言奇健能為史筆精魄故其立言序事及出沒得失皆字字典要何嘗以俚言汨其間哉今世俚言文章謂得史法因牽韓吏部曰如此如此樵不知韓吏部以此欺後學耶韓吏部亦未知史法耶又史家紀職官山川地理禮樂衣服亦宜直書一時制度使後人知某時如此某時如彼不當以禿屑淺俗別取前代名品以就簡絶又史家條序人物宜存警訓不當徒以官大寵濃講文張字故大惡大善雖賤必紀尸位浪職雖貴必黜至如司馬遷序周繆班孟堅傳蔡義尚可用耶為史官者明不顧刑辟幽不愧神怪若梗避於其間其書可燒也古者國君不得視史今朝廷以宰相監修大丈夫當一時寵遇皆欲齊政房杜躋俗太平孰能受惡於不隱乎古者七十子不與筆削今朝廷以史館叢文士儒家擅一時胸臆皆欲各任憎愛手出白黑孰能專門立言乎樵未知唐史誠何如也樵雖承史法於師又嘗熟司馬遷揚子雲書然才韻枯梗文過乎質嘗序廬江何易于首末千言貴文則喪質近質則太禿刮垢磨痕卒不能到史獨謂足下才力天出最與史近故以樵所受於師者致足下大梁居東諸侯兵最為雄軍候乘權肆豪奴視州縣官州縣官即栗縮自下美言立聞觀察使往往得上下考即欲認官為治必為軍候所傾折大者至奪觀察使小者至為軍人所繫辱州縣官格手失職不敢與抗由是軍候得侵繩平民鞠訊受辭往往獄至數百不以時省以故平民益畏軍候至不知有觀察使矧州縣官耶國家設州縣官以治平民豈以屬之軍乎今京兆二十四縣半為東西軍所奪然亦不過籍占編氓翼蔽墾田其辭獄曲直尚歸京兆今汴軍所侵州縣者反愈東西軍士大夫叢居未嘗不病東西軍侵州縣事及自提兵符則不知有以規畫之矧天子之貴耶執事三從事盧公其所以佐盧公使炳炳不磨於世者襄陽南渡之民皆能道之今居汴有日而曾無所聞豈屑屑未暇耶執事宜亟以前之所陳辨之盧公稍稍奪左右軍候權且使繫獄者不得治于軍門凡當隸州縣者悉索歸之使軍自軍州縣自州縣無相奪也今執事官曰判官察州縣事正執事職幸無忽主數足下曩者樵耳足下聲憤足下售於時何晚及目足下五通五十篇則足下困於上亦宜矣物之精華天地所祕惜故蒙金以沙錮玉以璞珊瑚之叢必藏重溟夜光之珠必頷驪龍抉而不知已積而不知止不窮則禍天地讐也文章亦然所取者廉其得必多所取者深其身必窮六經作孔子削迹不粒矣孟子述子思坎軻齊魯矣馬遷以史記禍班固以西漢禍揚雄以法言太元窮元結以浯溪碣窮陳拾遺以感遇窮王勃以宣尼廟碑窮玉川子以月蝕詩窮杜甫李白王江寧皆相望於窮者也天地其無意乎今足下立言必奇托意必深抉精剔華期到聖人以此賈於時釣榮邀富猶欲疾其驅而方其輪若曰爵祿不動於心窮達與時上下成一家書自期不朽則非樵之所敢知也嗚呼孤進患心不苦及其苦知者何人古人抱玉而泣樵捧足下文能不濡睫懼足下自得也淺且疑其道不固因歸五通不得無言太原君足下雷賦逾六千言推之大易參之元象其旨甚微其辭甚奇如觀駭濤于重溟徒知褫魄眙目莫得畔岸誠謂足下怪於文方舉降旗將大誇朋從間且疑子雲復生無何足下繼以翼旨及雜題十七篇則與雷賦相濶數百里足下未到其壼則非樵所敢與知既入其域設不如意亦宜上下銖兩不當如此懸隔不知足下以此見嘗耶抑以背時戾衆且欲餔粕啜醨以苟其合耶何自待則淺而徇人反深鸞鳳之音必傾聽雷霆之聲必駭心龍章虎皮是何等物日月五星是何等象儲思必深樆詞必高道人之所不道到人之所不到趨怪走奇中病歸正以之明道則顯而微以之揚名則久而傳前輩作者正如是譬玉川子月蝕詩楊司城華山賦韓吏部進學解馮常侍清河壁記莫不拔地倚天句句欲活讀之如赤手捕長蛇不施控騎生馬急不得暇莫可捉搦又似遠人入太興城茫然自失詎比十家縣足未及東郭目已極西郭耶樵嘗得為文真訣於來無擇來無擇得之於皇甫持正皇甫持正得之於韓吏部退之然樵未始與人言及文章且懼得罪於時今足下有意於此而自疑尚多其可無言乎樵再拜嘗與足下評古今文章似好惡不相闊者然不有所竟顧樵何所得哉古今所謂文者辭必高然後為奇意必深然後為工煥然如日月之經天也炳然如虎豹之異犬羊也是故以之明道則顯而微以之揚名則久而傳今天下以文進取者歲叢試於有司不下八百輩人人矜執自大所得故其習於易者則斥艱澀之辭攻於難者則鄙平淡之言至有破句讀以為工摘俚句以為奇秦漢已降古人所稱工而奇者莫如揚馬然吾觀其書乃與今之作者異耳豈二子所工不及今之人乎此樵所以惑也當元和長慶之間達官以文馳名者接武於朝皆開設戶牖主張後進以磨定文章故天下之文薰然歸正洎李御史甘以樂進後士飄然南遷由是達官皆闔關齚舌不敢上下後進宜其為文者得以盛任其意無所取質此誠可悲也足下才力雄健意語鏗耀至於發論尚往往為時俗所拘豈所謂以黃金注者昏邪顧頑朴無所知曉然嘗得為文之道于來公無擇來公無擇得之皇甫公持正皇甫持正得之韓先生退之其於聞者如前所述豈樵所能臆説乎樵家本關東代襲簪纓藏書五千卷常以探討幼而工文得之真訣提筆入貢士列于時以文學見稱大中九年叨登上第從軍邠國忝歷華資久居蘭省廣明元年狂寇犯闕駕避岐隴詔赴行在遷職方郎中朝廷以省方蜀國文物攸興品藻朝倫旌其才行詔曰行在三絶右散騎常侍李潼有曾閔之行職方郎中孫樵有揚馬之文前進士司空圖有巢由之風可載青史以彰有唐中興之盛樵遂檢所著文及碑碣書檄傳記銘志得二百餘篇叢其可觀者三十五篇編成十卷藏諸篋笥以貽子孫是歲中和四年也朝散大夫尚書職方郎中上柱國賜緋魚袋孫樵道齊之東偏泛巨海不知其幾千里其島夷之大者曰新羅由蜀而南逾昆明涉不毛馳七八千里其㣥蠻之雄者曰南詔是皆鳥獸之民鴂舌言語難辨皮服獷悍難化其素風也唐宅有天下二國之民率以儒教為先彬彬然與諸夏肖矣其新羅大姓至有觀藝上國科舉射策與國子偕鳴者載籍之傳蔑然前聞夫其生窮海之中託瘴野之外徒知便弓馬校戰獵而已烏識所謂文儒者哉今抉獸心而知禮節褫左袵而同衣服非皇風遠洽耶嘗聞化之所被雖草木頑石飛走異彙咸知懷德于是乎有殊能詭形之效祉者二國之為其瑞與夫瑞之出不孤將必有類者則度索之隅不懷之倫其向風仰流歸吾化哉世之言唐瑞者徒曰肉角格六穗稼天酒泫庭苑巢神禽樵則曰二國文學也夫物不得以時而發其發必熾風行溪谷飀飀習習即不得遂作必飄忽源泉混混然隄防陂畜波抉壅缺亦不可遏其於人也亦然潁川陳君學積乎勤藝高乎專喪家途歉志用不通鬱然而居者有年矣纍為連帥賓禮貢之天子齎咨喑嗚輒以窮盡今年稍始克偕計吏黽勉上道久憤湮鬱一旦決發若風波之得宣泄吁可當耶名光耀乎天庭聲飛馳乎海浦其在此行矣然君子學道以循祿端已以售道不肯枉尺以蘄尋直况突梯滑稽以苟得與君其勉之樵弱弓蓬矢難以妄彀徒善君之引滿強徑指期命中於行不能無述入扶風東臯門十舉步折而南平行二十里下念濟坂下折而西十里渡渭又十里至郿郿多美田不為中貴人所并則籍東西軍居民百一繫縣自郿南平行二十五里至臨溪驛驛抱谷口夾道居民皆籍東西軍出臨溪驛百步南登黃蜂嶺平行不能百步又登潗潗嶺盤折而上甚峻而下潗潗嶺嶺稍乎二嶺之間凡行十里自臨溪有支路直絶澗並山復絶澗蛇行磧上十里合於大路下黃蜂嶺復有支路並澗出潗潗嶺下行亂石中五六里與澗西支路合由大路十里橋無定河河東南來觸西山下隳號怒北去河中多白石磊磊如斛又十里至松嶺驛逆旅三戶馬始食茅自松嶺平行又三里逾二橋登八里阪甚峻下阪行十里平如九衢又高低行五里至連雲驛自連雲驛西平行二十里上五里嶺路極盤折凡行六七里及嶺上泥深滅踝路旁樹往往如挂塵纓纚纚而長從風紛然訊於薪者曰此泥榆也豈此嶺常泥而樹有此名乎凡泥行十里稍稍下去又平行十里則山谷四拓原隰平曠水淺草細可耕稼有居民似樊川間景氣又五里至平川驛自平川西並澗高下行十里復度嶺上下嶺凡五里復平不能一里復高低有閣路行七八里扼路為關北為臨洮關為河池自黃蜂嶺洎河池關中間百餘里皆故汾陽王私田嘗用息馬多至萬蹄今為飛龍租入地耳入關行十里皆閣路並澗閣絶有大橋蜿蜿如虹絶澗西南去橋盡路如九衢夾道植樹步步一株凡行六七里至白雲驛自白雲驛西並澗皆閣道行十里巖上有石刻橫為一行曰鄭淮造凡三字不知何等人也又一十三里至芝田驛皆閣道卒高下多碎石自芝田至仙岑雖閣路皆平行往往澗旁谷中有桑柘民多叢居雞犬相聞水益清山益奇氣候甚和自仙岑南行十三里路左有崖壁然而高出其下殷其有聲如風怒薄冰里人謂之鳴崖豈石常鳴耶抑俟人而鳴耶又行十五里至二十四孔閣閣上巖甚奇有石刻其刻云褒中興閣主簿王禺漢中郡道閣縣椽馬甫漢中郡北部都郵回通都匠中郎將王胡典知二縣匠衛績教蒲池石佐張梓等百二十人匠張羌教褒中石佐泉疆等百四十人閣道教習常民學川石等三人凡七十字其側則曰太康元年正月二十九日按其刻乃晉武平吳時蓋晉由此路耳又行十五里至青松驛自仙岑而南路旁人煙相望澗旁地益平曠往往墾田至一二百畝桑柘愈多至青松即平田五六百畝谷中號為夷地居民尢多自青松西行一二里夾路多松竹稍稍深入不復有平田行五六里上小雪嶺極峻折嶺東多泥土疏而黑嶺西尢峻十里百折上下嶺凡十八里四望多叢竹又高低行十里至山輝驛居民甚少行旅無庇自山輝西高低行二十里上長松嶺極峻羊腸而上十里及嶺上復羊腸而下十五里及嶺下又高下行十里至回雪驛自回雪驛南行三里上平樂坂極峻盤折上下凡十五里至福溪又高下行十里至黃崖崖南極峻折上下黃崖六七里至盤雲驛西行復並澗行二十里即背絶小嶺上下凡五六里稍平又行十里至雙溪驛自雙溪南平行四里至天苞嶺羊腸而上凡十五里極峻折往往閣路至嶺上南望興元煙靄中也下嶺尢峻絶凡三十里至文川驛自文川南行三十五里至靈泉驛自靈泉平行十五里至長柳店夾道居民又行十五里至興元西平行三十里至褒城縣與斜谷舊路合矣孫樵曰古人尚謀新仍曰何必改作利不十法不變豈謀新亦未易耶滎陽公為漢中以褒斜舊路修阻上疏開文川道以易之觀其上勞及將下勞及卒其勤至矣其始立心誠無異於古人將濟民於艱難也然朝廷有竊竊之議道路有唧唧之歎豈滎陽公始望耶况謀肇乎賈昭事倡乎李俅役卒督工者不增品秩於天子則加班列于滎陽公滎陽公無毫利以自與而怨咎獨歸豈古所謂為民上者難耶涪繚於郪迫城如蟠淫潦漲秋狂瀾陸高突隄嚙涯包城蕩墟歲殺州民以為官憂滎陽公始至則思所以洗民患頗聞前觀察使欲鑿江東壖地別為新江使東北注流五里復匯而東即隄墟舊江使水道與地相遠以薄江怒遂命武吏發卒三千迹其前謀役興三月功不可就有謁於滎陽公曰公開新江將扶民憂然江勢不可決訛言不可絶公將何以終之滎陽公曰吾欲厚其直以勸其卒可乎對曰飢卒賴厚直民惜其田以覬得不可滎陽公曰吾欲戮其將以動其卒可乎對曰代之將者必苦吾卒卒苦叛不可滎陽公曰奈何對曰夫民可與樂終難與圖始故自興役以來彼其民曰夏王鞭促萬靈以導百川今果能改夏王迹耶非徒無功抑有後災㣥疑牽綿民心蕩搖前時觀察使欲鑿新江中輟議而罷豈病此耶公即能先堤民言新江可度日而決也滎陽公曰諾明日滎陽公視政加猛決獄加斷又明日杖殺左右有所二事鞭官吏有所阻政者遂下令曰開新江非我家事將脫郪民於魚腹耳民敢橫議者死民以滎陽公嘗為京兆既憚其猛及是民心大栗㣥舌如斬未幾而新江告成滎陽公歡出臨視班賞罷卒已而歎曰民言不堤新江其不決耶新江長步一千五百闊十分其長之二深十分其闊之一盤堤既隆舊江遂墟凡得田五百畝其年七月水果大至雖踰防稽陸不能病民其績宜何如哉滎陽公既以上聞有司劾其不先白詔奪俸錢一月之半樵嘗為褒城驛記恨所在長吏不肯出毫力以利民及觀滎陽公以開新江受譴豈立事者亦未易耶是歲開成五年也梓潼南鄙越五百里其中有山崛起中天即山之趾得徑蜿蜒舉武三十北出其巔氣象鮮妍孕成陰煙矻石巉巉別為東巖槎牙重復爭先角逐若絶若裂若缺若穴突者虎怒企者猿踞橫者木仆挺者碑植又有似乎飛簷連軒櫟櫨交攢攲撑兀柱懸棟危礎殊狀詭類愕不得視下有畝平砥若戶庭攄乳側脈膏停泓石俯對絶壑杪臨蘭薄仙臺標異叢石負起屹與山別猿鳥迹絶腹竇而空路由其中齗齶相望攀緣下上闖然而出曜見白日始時永嘉飛真蓋羅元蹤斯存石刻傳聞丹成而仙駕鶴騰天一去遼廓千載寂寞澄泉傳靈別壑鏡明風間景清寂寥無聲嘉木美竹岡巒交植風來怒黑雷動崖谷嵓獸山禽捷翔呀驚曉吟暝啼聽之悽悽回環下矚萬類在目因山帶川青縈碧聯莽蒼際雲杳杳不分月上於天日薄於泉魄朗輪昏出入目前其或宿霧朝雲糊空縛山漠漠漫漫莫知其端陽曜始浴徹天昏紅輪高而赤洪流散射濃透薄釋錦裂綺拆千狀萬態倏然收霽樵起來而遊泊車而休登降信宿聞見習熟始曰山乎曾未始有得乎無處夸世釣名者污此巖扃乎且欲聞于潁陽之徒乎咫尺天威首出時傑英眄橫溢神鋒秀發秋空健骨霜夜皎月劍淬愈利玉燒不熱錦浦宸遊傳巖爿夢説馭物惟誠在公抗節再安宗祏蕩掃氛孽黃道回日翠華歸闕粃粳魏丙肩袂稷契仰止丹青永保徽烈大中六年詔出文貞公笏歸其孫丞相謨孫樵請銘其笏曰靈豸薦角比干獻骨合以憤烈在公為笏怒虎可唾笏不可挫太華可裂笏不可折柱天不仄指日不蝕標儀條臆起梗開直噫諫舌切切上磨帝缺不逆不怫笏則公笏緊拱在列諍舌不發膠榮顧餗下偷上愎非公之節孰為公笏潼戶呀東翼廉敞南有元甲數十札焉委於前楹止塵飄風綴斷革刓樵過而誚之且曰此國之閫也是小欲遏寇偷大欲扼諸侯今者關禁弛而不譏守甲存而不完將欲抑天下心而割天子憂哉關吏笑而進曰借如潼之甲可以燭日潼之旗可以絳天戰鞞晝驚警柝夜鳴吾曹將擺堅荷煆投死地之不暇又安得與客合繻而東合繻而西哉今上君臨萬國號令所加風清日明理為大和如此則關之禁何為而申嚴關之甲何為而繕堅元宗四十二年關中之兵其屯如雲孽胡西來叱而闢之守甲其不完耶古之善守天下者展禮以防之闡樂以和之明刑以齊之修政以固之則其守在四海之外何以關為而况完其甲乎是天下愈安而其禁愈弛天下愈平而其甲愈敝耳樵將去之且銘其甲云潼關之甲完吾孰與安潼關之甲敝吾孰與濟甲乎甲乎理與爾謀亂與爾謀無俾工爾修
