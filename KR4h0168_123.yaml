front:
  text: 全唐文欽定全唐文卷一百二十三周太祖二
  hash: sha256:e19d991495e8eadc89fb47a4a325df489e7a1c27b02d082762a545b3bd2c2d2a
body:
  text: 漢高祖為義帝發喪魏明帝正禪陵尊號一時達禮千古所稱況朕久事前朝常參大政雖遷虞事夏見奪於羣情而四海九州咸知予夙志宜令所司擇日為故主舉喪仍備山陵葬禮含幽育明哲后法之而致理掩骼埋胔賢主著之為令猷今寶祚惟新璿璣在御踵姬周之至德體虞舜之深仁屬三靈改卜之秋當五兵銷偃之際或墳塋無主幽穸毀發於敓襄攵或戰陣亡身遺骸暴露於原野旅魂無託言念堪歎應天下州縣管界內有墳墓被開發者無人為主本界官吏量與掩閉勿令漏露或戰場郊野有暴骸露骨亦仰收拾埋瘞以聞農桑之務衣食所資一夫不耕有艱食之慮一婦不織有無褐之虞今氣正陽春當生發宜勤用天之業將觀望歲之心應諸道州府長吏宜勸課耕桑以豐儲積編民樂業仍倍撫綏朕猥以寡薄肇創基圖思康濟於兆民推恩信於天下庶幾致理漸至平寧楊溫等比事藩維止為小校妄生猜懼輒閉城門朕亦累賜勅書開懷示信諭以安危之道俾全忠孝之名亦繼有文字進呈止望朝廷恕舍朕念端倪未審之際事勢使然彼既無心豈忍加罪是以授之郡牧許以自新而不體優恩尚敢拒命執迷罔悟但作遷延今巳差兵士往彼攻取期於旦夕必易盪平汝等皆居封境之中各懷仁義之節況屬陽和之候方當農養之時暫駐兵甲固無騷擾宜思齊力安家闕朕早事劉氏共立漢朝當高祖寢疾既危朕與揚州史宏肇於御牀之前同受顧託嗣君既立叛亂繼興朕討平河中克寧關內敢言勞苦貴保宗祧自鎮鄴都復當戎寄忘食廢寢夜思晝行固護邊疆訓齊師旅憂時憂國盡節盡忠不期羣小連謀蔽惑幼主忽於內殿併害大臣朕方在外藩亦遭讒搆密降宣命潛遣行誅諸將知此無辜乞除君側之惡遂與將士同赴闕廷凶豎計窮迫害幼主朕遂奏太后請立劉贇比候到京方議冊立便值河北告急契丹內侵遂領大軍徑赴救援自澶州起程北去輜重相次先行旗隊纔移軍情忽變喊聲動地事勢莫知攅集戈矛請朕為主逃脫無地扶擁入京內外臣僚藩岳侯伯表章繼至推戴益堅勉副羣情尋登大位照臨之內罔不傾心不謂北京留守劉崇顯有包藏輒萌僭竊散飛文字誑惑人民騷動一方酷虐萬姓差點丁壯率掠貨財殺戮無辜誅剝難狀況劉崇自居藩鎮唯務貪求刻削軍都增添稅賦千里之內民不聊生今則又作猖狂更加暴虐謂人情可以詐取謂天命可以僭求顛越如斯不亡何待朕方輯寧區宇拯救黔黎見舉大軍往平微孽爰念河東管界皆是朕之生靈被此凶殘深懷軫惻即候收復城壘當議減放稅租內外軍民並與洗滌更在沿邊藩鎮明宣朕懷接界戶人勿令侵擾其邊界城池巳令修戢要辨奸細切須隄防安撫生民以副朕意朕祗膺景命奄有中區每思順物之情從衆之欲將使照臨之下咸遂寬舒仕宦之流自安進退往者時有拘忌人或滯留所在前資並遣赴闕輦轂之下多寄食僦舍之人歲月之閒動懷土念家之志宜循大體用革前規應諸道州府有前資朝官居住如未赴京不得發遣其行軍副使巳下幕職州縣等官得替求官自有月限年月未滿一聽外居如非時詔徵不在此限但闕員有數入官者多苟無定規必生躁競凡爾進取知朕意焉自前朝廷除官銓司選授當其用闕皆稟舊規近聞所得官人或佗事阻留或染疾淹駐始赴任者既過月限後之官者遂失期程以至相沿漸成非次是致新官參謝欲上舊官考秩未終待滿替移動逾時日凋殘一處新舊二官在迎送以為勞必公私之失緒今後應諸道州府錄事參軍判司縣令主簿等宜令本州府以到任月日旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其見任州縣官限勅到仰便具先到任月日一齊分析申奏及報吏部其有諸色事故及丁憂并請假十旬滿日亦仰旋具申奏兼報吏部其新受官準令式給程限外如不到本任參上致本處無憑申奏到任月日便仰吏部同違程不上收闕使用其諸見闕亦不得差官攝權輒便隱留如違勅條罪在本判官錄事參軍孔目官巳下沿淮州鎮朝廷比與淮南素非仇怨互分疆土各有人民商旅往來比無阻滯兵師屯戍自守關防其自近朝稍聞多事煙塵時動生聚無聊爰當開創之初每求安靜之道沿淮千里所宜禁暴戢兵比屋小民漸冀息肩樂土庶期歲月馴致和平凡我疆埸之臣當體宵旰之念應沿淮州縣軍鎮今後自守疆土鈐轄兵士鄉軍不得縱一人一騎擅入淮南地分稍或違令不宜輕恕商旅行李經過輒不得妄致邀難如聞滯留必行勘罪更仰指揮沿邊巡檢止絕賊盜務在道途清肅人戶謐寧詔到速散行管界凡津要口鋪可丁寧曉告職當參佐位列賓僚苟無職馭之人頗異築臺之禮雖事因改易而理未酌中宜降明文庶永為制副留守節度副使行軍兩京少尹留守判官兩使判官並許差定當直人力不得過十五人節度推官防禦團練軍事判官不得過十人諸府少尹書記支使防禦團練副使不得過七人並取本廳舊當直人力數少不及新定數目只仰依舊人數差定仍令逐處係帳收管此外如敢不遵條制多有占差額外影占人戶其本官當行朝典前朝於諸州府差散從親事官等前朝創置蓋出權宜苟便一時本非舊貫近者徧詢羣議兼採封章具言前件抽差於理不甚允當一則礙州縣之色役一則妨春夏之耕耘貧乏者困於供須豪富者幸於影庇既為煩擾須至改更況當東作之時宜罷不急之務其諸州所在差散從親事官並宜放散自逐田農自去年四月巳前州縣元管係人數一切如舊其遞鋪如巳前招到者且仰仍舊今後更不得招召其諸處場院並不得影庇兩稅人戶所有河北諸州及澤潞晉絳慈隰解等州於先差散從親事官內選到弓箭手只且留在本州管係其餘放散牧守之任委遇非輕分憂之務既同制祿之數宜等自前者富庶之郡請給則優或邊遠之州俸料素薄以至遷除之際擬議亦難既論資序之高卑又患祿秩之升降所宜分多益寡均利同恩冀無黨偏以勸勳效今重定則例諸州防禦使料錢二百貫祿粟百石食鹽五石馬十匹草粟元隨三十人衣糧團練使料錢一百五十貫祿粟七十石食鹽五石馬十匹草粟元隨三十人衣糧刺史料錢一百貫祿粟五十石食鹽五石馬五匹草粟元隨二十人衣糧仍取今年五月一日後到任者依新定例支其巳前在任者所請如故朕臨御以來憂勤無怠慮庶政之尚闕恐蒸民之未安寢食不遑夙宵若厲早歲雍岐連叛兵革薦興迨至討平可知傷弊誠念負罪之黨尋以誅夷亡命之徒近皆滌蕩則被釋放者皆為赤子經釐革者悉是平人雖性命之永全在生涯之何著興言軫憫未嘗去懷其京兆鳳翔府先因攻討之時及收復之後應有諸色犯罪人第宅莊園店舍水磑曾經籍沒及本主未歸者巳宣下本道却給付罪人骨肉為主仍仰逐處嚴切指揮勿令所繇衷私闌恡邀求資金庶令存濟用副朕懷朝廷設爵命官求賢取士或以資敘進或以科級升至有白首窮經方階一第半生守選始遂一官是以國無幸民士無濫進近年州郡奏薦多無出身前官或因權勢書題或是衷私請託既難阻意便授真恩遂使躁求徼倖之徒爭遊捷徑辛苦孤寒之士盡泣窮途將期激濁揚清所宜循名責實凡百有位當體朕懷今後州府不得奏薦無前官及無出身人如有奇才異行越衆超羣亦許具名以聞便可隨表赴闕當令有司考試朕亦自更披詳斷其否臧俾之升黜庶使人不謬舉野無遺才冀廣德人以資從政朕肇啟丕基躬臨庶政深慕泣辜之道以宏恕物之心今則方屬炎蒸正當長養黃沙繫縶宜矜非罪之人丹筆重輕切戒舞文之吏凡有獄訟不得淹延務令囚絕拘留刑無枉濫冀叶雍熙之化用符欽恤之情應京都諸道州府見禁人等宜令逐處長吏限勅到應有獄囚當面錄問事小者便須遣決案未成者即嚴切指揮疾速勘決據罪詳斷疏放勿令停滯及致冤抑庶召和氣俾悅羣心貞固等羣書覩奥直筆紀言成一代之明文繼百王之盛典豈特洪纖靡漏抑亦襃貶有彰將播無窮永傳不朽歎重襃美頃刻不忘頊名升通籍官列憲司凡繫所為尤宜知禁不能為子諍父而乃離局侵官宜謫掾於方州俾省愆於終日秋夏徵賦素有常規苟或催督及時官吏奉法自然辦及不至愆期前後所行條流頗甚苛細殊虧大體且類空言宜有改更以示懲勸起今後夏秋徵賦省限滿後十分係欠三分者縣令主簿罰一百直勒停錄事參軍本曹官罰七十直殿兩選孔目官罰七十直降職次本孔目勾押官典決停本判官罰七十直若係欠三分巳上奏取進止係欠三分巳下者等第科斷殿罰其州縣徵科節級所由委本州重行決責其本判官錄事參軍本曹官孔目勾押官典取一州都徵上比較縣令主簿即本縣都徵上比較分數州縣官吏等各處員僚司分寄任所徵賦稅乃是職司苟或慢公何以食祿將勸能吏仍立賞科應諸州縣令錄佐官在任徵科依省限了絕者至參選日若是四選巳上者減一選若不及四選者則與轉官其巳前所行賞罰條流一切不行朕以沿邊百姓適因災沴遂至流亡拋棄鄉園扶攜老幼未有安泊之地深懷愍念之心宜切撫綏庶令存濟其邊界流移人戶差使臣與所在官吏撫恤安泊其滄景德管內甚有河淤退灘之土蒿萊無主之田頗是膏腴少人耕種可令新來百姓量力佃蒔只不得虛占土田有妨別戶居止如是願在別管界內居住者亦聽取便所在關津口岸不得阻滯如邊界有親識可依亦聽從便仍人給斗粟委三司支給候安泊定取便耕種放差稅選部公事比置三銓所有員闕選人分在三處每至注擬之際資敘難得相當況又今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行所冀掄選得中銓綜有序其吏部尚書銓見闕宜差禮部尚書王易權判致理安邦必先刑政分爭辨訟各有職司內則臺省官僚外則州縣曹局共承寄任同體憂勤苟衆務之有條則蒸民之無怨向來百姓訴訟不得越次訴論近日繼有便詣朝廷不經州縣宜再止絕免致踰違今後百姓凡有訴論及言災沴先訴於縣縣如不治即訴於州州治不平訴於觀察使或斷遣不當即可詣臺省如或越次訴論所司不得承接如有抵犯準律科懲其訴事文狀或自手寫或是雇人並於狀後書其名姓並住止處所如無人寫狀許過白紙事條並須為巳如或容訴是挾阿私鞫得其情必議嚴斷若所經處所斷遣不平致詣朝廷長史推司當行謫罰兗州節度使慕容彥超不知恩信輒恣凶狂北則勾喚劉崇南則結連淮寇劫掠鄰縣邀截路行差補元隨主持鎮務一向殘害生聚百般誅斂貨財贍養姦凶圖謀悖亂割剝之苦所不忍聞朕每為含容欲全終始近據東西諸處申奏慕容彥超徧於管內抽點鄉軍人戶不伏追差逐處殺劫鎮將又懼挾讐屠害悉是逃竄山林言念衆多盡能忠孝嗟我赤子遇此亂臣方當寒凍之時可想艱辛之狀須行弔伐以救孤危今差侍衞步軍都指揮使曹英等統領大軍往彼問罪巳指揮告報諸軍入兗州界並不得下路村舍斫伐桑棗驅虜牛驢毀拆舍屋發掘墳墓如有犯者便行軍令候至城下委曹英散行指揮安撫人戶兼勒諸縣令依舊勾當公事仍差使臣於兗州四面邊界招喚百姓令著營養如有惡黨接便為非者即就彼處斷其人戶不得更於堡塞團集仍勒縣鎮官員節級明具朝廷指揮告報勸課農桑無失春計兼自前有兗州管內人戶被慕容彥超迫虜誑惑誘引見在州城內者及有元在兗州充職人等必是逐人各有骨肉房親在城今官中一切不問宜令州縣倍加安撫勿縱節級所繇衷私恐嚇若有全家並在兗州城內者或有莊田店宅及諸般物產如元有人勾當勒一切仍舊若無人主張即委鄰人較看守勿信任人妄有占據及毀拆斫伐候收復城池分付本主一夫作亂萬姓何辜興言疚懷傷歎無巳故茲告諭各令聞知勅諸道府州吏六府允修無先重穀九扈分職厥惟勤農今則東作聿興西成係望我有羣后政在養民苟不懈於行春諒倍登於多稼卿分憂事任道俗廉平樹以風聲靡如草偃必汙萊之地並作百廛游惰之民咸勤四體用洽帶牛之化更彰棲畝之謠眷倚之懷寤興斯切詔到卿可散下管內勸課鄉縣百姓依時耕種栽接桑棗勿縱游惰務在精勤一昨慕容彥超結連草寇毒寇蒸民側近縣鎮鄉村無名脅從屠害人神憤怒須議討除朝廷巳發大軍往彼攻取汝等屯戍邊境勞苦經時言念忠勤不忘寤寐所有汝等家口並在兗州城內屬此背違想皆憂念在朕誠意暫不弭忘巳降宣命指揮曹英候收復城池日畫時選得力負寨部領兵士率先入城占據本營安撫逐人骨肉家口不得輒有驚恐古之王者啟邦經野分職設官疇建殊庸懋昭大德我有重臣世膺王爵雖任一方之帥未超極品之榮漢法非劉不王唐制元帥為重茲惟大任寧授非人用錫名藩永扶昌運恣爾檢校太師守尚書令上柱國吳越國王錢宏俶乾坤閒氣海嶽孕靈為民物之綱維實朝廷之藩屏承家保國奕世羨堂構之賢治亂持危四方推英豪之主梯航時登乎丹陛兵革靡及乎蒼生才足以尊主而庇民德足以移風而易俗肆歸建極不替忱誠有齊桓尊周之心而忠義式逾乎齊有晉悼駕楚之略而功名不忝乎晉建之都督則百辟允諧使之元戎則三軍用命表海受一方之寄真王啟萬戶之封匪爾令名曷兼衆職爾其不墜善始永圖令終承我履言毋忝厥位可特授天下兵馬都元帥餘如故朕以寡昧獲主黎元將以召天地之和每思去刑政之弊寅恭於此宵旰為勞今以節及長嬴時臨暑熱耕農之戶蠶麥將忙宜於獄訟之閒特示憂勤之旨應有刑獄切慮淹滯詔至所有重輕繫囚疾速勘鞫斷遣無令冤抑慮有淹延若輕罪畫時決遣其婚田爭訟務內勿治若事要定奪即須疾速區分若斷遣不平許人糾告官典必議徵斷閻宏魯崔周度死義之臣禮加二等所以滲漏澤而賁黃泉也爾等貞節昭彰正容肅厲以從順為已任以立義作身謀履此禍機併罹冤橫宜伸贈典以慰貞魂宏魯贈驍衞大將軍周度贈祕書少監諸州縣吏民緇黃繼來詣闕舉留刺史縣令牧宰之任委寄非輕繫蒸庶之慘舒布朝廷之條法若廉勤奉職撫字及民自有政聲達於朝聽何勞民庶遠致舉留既妨農養之時又耗路途之費所宜釐革免致勞煩今刺史縣令顯有政能觀察使審詳事狀朝廷當議奬昇百姓僧道更不舉請一切止絕昨迴批答巳丁寧宣諭卿所掌至重代難其人苟濟事權何勞勤見朕於便殿待卿可暫入來與卿款敘承前所立鹽麴條法每犯至少盡處極刑近年以來抵罪甚重兼以邑居人戶隨稅請鹽既不許將入城隍又不容向外破賣立法之弊一至於斯爰自新朝尚沿舊制昨因鄭州按獄備見百姓銜冤既詳斷之踰違亦條令之疑誤覩茲深刻須議改更庶令輕重得中兼復上下知禁國計之重立法為先貴在必行何須過當凡鹽麴犯一斤巳下至一兩杖臋十七配役一年五斤巳下一斤巳上杖脊二十役三年五斤巳上杖死之煎鹻鹽犯一斤巳下杖脊二十役三年一斤巳上杖死之若捉獲鹻土及水煎成鹽了秤之定罪顆鹽末鹽各有界分如界分相侵同犯鹽罪論鄉村所請蠶鹽只自充用不得將入城邑村坊博易貨賣如違同犯鹽論所請蠶鹽處道路津鎮須騐公憑凡賣鹽麴並須官場官務若衷私興販同犯鹽麴例論官場官務有羨餘鹽麴並盡底納官如輒將貨賣同犯鹽麴論凡鹽戶酒戶衷私與場官院官買賣同犯例論凡鹽麴同情共犯若是卑幼骨肉奴婢同犯只罪家長主者不知情只罪造意者其餘減等凡城郭人戶係屋稅鹽並於城內請給若外縣鎮郭下人戶亦許將所請鹽歸家供食即本部官據人戶合請數都計於俵場請數點檢入城不得因便帶入其郭下戶或城外有莊田合並戶稅者亦本處官預前分說勿令逐處都請凡鹽麴鹽鹻隨處地分節級專切捉搦如透漏必重科斷其告犯鹽麴人死罪者賞錢五十千文不死罪賞三十千文以本處係省錢充故斟酌輕重立此科條宜令三司施行其中有合指揮件目隨事處分以聞兗州自逆臣盜據多有殺傷永惟葬朽之仁式示掩骸之義宜令樂院使黃知筠往兗州收暴露骸骨於高地為壙埋葬祭奠以聞朝廷命官分治州縣至於招安戶口增益稅租明立賞科以勸勤吏近朝釐革雖有勅文俱未適中難仍舊貫晉代則傷於容易啟僥倖之門漢朝則過於艱難妨進趨之路既非允當須議改更宜令應州縣官所招添到戶口課績自今日巳前罷任者並準天福八年三月十一日勅施行其漢乾祐三年七月二十五日勅不行起今後應罷縣令主簿招添到戶口其一千戶巳下縣每增添滿二百戶者減一選三千戶巳下縣每三百戶減一選五千戶巳下縣每四百戶減一選萬戶巳下縣每五百戶減一選並所有增添戶及租稅並須分明於歷子解由內錄都數若是減及三選巳上更有增添及戶數者縣令與改服色巳賜緋者與轉官其主簿與加階轉官累朝巳來用兵不息至於繕治甲冑未免配役生靈取乃民資助成軍器就中皮革尤峻科刑稍犯嚴條皆抵極典鄉縣以之生事奸猾得以侵漁宜立新規用革前弊應天下所納牛皮令將逐年所納數三分內減放二分其一分於人戶苗畝上配定每秋夏苗共十頃納連角牛皮一張其黃牛納乾筋四兩水牛半斤犢皮不在納限其皮人戶自詣本州送納所司不得邀難所有牛馬騾皮筋角今後官中更不禁斷並許私家供使買賣只不得將出化外敵境仍仰關津界首子細覺察捕捉所犯人必加深罪其州縣先置巡牛皮節級及朝廷先降條法一切停廢其合分擘納黃牛水牛皮筋處其閒有未盡事件委所司取便處分庶免編民犯禁且使人戶資家既便公私用除苛弊
