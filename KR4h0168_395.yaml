front:
  text: 全唐文欽定全唐文卷三百九十五位襄陽人右拾遺甫之從子至德中與甫同在嚴武幕中後貶新州還為夔府司馬歷司勳員外郎
  hash: sha256:f911c11b1477c0ab25d5e87429f23d6909fc246f5536d72d2d412a7c0406591f
  markers:
  - {type: head, offset: 14, content: 杜位, id: KR4h0168_NFKB_395-h1, level: 1}
body:
  text: 開國承家已膺明命成人宜室當率舊章所謂伊人展斯嘉禮三揖三讓爰修著代之儀墨車漆車將執親迎之道眷言謁者曾莫是思儀式之間自合寵其茅土降殺之數復何昧於等威縱以五品為辭終冀片言斯折嵩肅宗時人司馬子長善敘事古稱良史然班固嫌其疏略是非頗謬於聖人言論數篇以為所蔽嵩述而不作竊思好古今質正傳旁採遺文始自吳起漢興平元年終於陳末禎明三年而吳黃龍已前雖引漢歷二十餘年其實吳之首事及晉平吳太康之後三十餘載復涉西晉之年洎琅琊東遷太興即位元年始為東晉首年東晉一十一帝一百二年而禪於宋宋八帝六十年而禪于齊齊七帝二十四年而禪于梁梁五帝五十六年而入于陳陳五帝三十三年止隋開皇元年陳建首號梁之末年梁稱元年齊之季年齊初即位宋之餘年則四家終始共用三年而吳四帝五十九年南朝六代四十帝三百三十一年通西晉革吳之年并吳首事之年總四百年間著東夏之事勒成二十卷名曰建康實録具六朝君臣行事事有詳簡文有機要不必備舉若土地山川城池宮苑當時制置或互興毀各明處所用存古跡其有異事別聞辭不相屬則皆注記以益見知使周覽而不煩約而無失者也太真宣州人天寶末舉進士大歷中為淮南節度陳少游掌書記徵拜起居郎纍歷臺閣自中書舍人轉工刑禮三部侍郎貞元五年掌貢士多取大臣貴近子弟坐貶信州刺史卒臣某言今月二十日中使輔懷恩送告身至伏見恩制特加臣銀青光祿大夫揚州大都督府長史充淮南節度使仍封潁川縣開國子食邑五百戶者臣以駑駘賤質葵藿愚誠謬荷深恩頻膺重寄日月私照雨露曲霑負戴不任兢惶失措臣某中謝臣自遠辭天闕恭守海隅伏思陛下臨御之勤竊罄愚衷蹇拙之分所恨智慮不及績用無成豈望陛下知懇款之不渝將纖毫而見擢特超階序俾易旌旄錫以開國之封授以臨戎之節由江南之遠鎮踐淮表之名藩且地在要衝職名分閫副茲統理豈易其人臣亦何功忽當此任仰膺休命難叨覆載之榮伏省微躬實積負乘之懼臣即以今月二十五日發赴揚州其浙東使事已差觀察使殿中侍御史盧翰權知留後無任感戴戰越之至太真啓前者曲蒙處分令獻所學舊文伏念早年僻居江介泛窺經典莫究宗源天寶中嘗遇故揚州功曹蘭陵蕭君語及文學許相師授而家貧世亂不克終之其後從役外府所用寡細雖抱夙心無因警發雖欲奔前賢之牆宇揖作者之風度涉隅角而輒滯望端倪而自失嘗有一言逸至理一章適遺恨竊懷恥愧不覺淹留以深稽命之愆寧負厚顏之愧謹上近所記録三十餘章反復內省慙惶汗流伏惟相公秉人文以作相敷天縱之盛美發六籍以立言極三才之奧義協贊一德化成㣥有懸衡而制其輕重操繩而審其曲直小人既無學術又無材用形神低悴年鬢頽老又念頃日曾霑引問擊蒙而恆失所對庸劣而竟無上補今復以此昧塵明鑒相公假為之納其瑕穢小人不亦自重其嫌斥乎向使彊仕之間獲趨門館荷深仁於哲匠被君子之善誘雖其頑魯或有庶幾之道焉今過五十已加其四學之已困力又不足遇伯樂而反惡于長鳴視姬姜而自退其陋質抑小人之命也不敢多言謹啓顧著作來以足下郡齊燕集相示是何情致暢茂遒逸如此宋齊間沈謝何劉始精於理意緣情體物備詩人之旨後之傳者甚失其源惟足下制其橫流師摯之始關睢之亂於足下之文見之矣宣平里環堵之宅嘉木垂陰疏篁孕清友生顧君寓之所也前相國宜城伯夏官卿博陵公陳蓬州藏用上人賢顧君而訪之鄙夫與焉披襟嘯風境邈神王孰闕炎暑焉知市朝吾君則超然如在天壇華頂之上意喬松可得而友也乃賦六言詩以紀會既明日屬文之士翕然而和之八音鏗其盈耳環堵爛而溢目舉國傳覽以為盛觀太真獲因首唱不敢遺繼之美先師微言既絶者千有餘載至夫子而後洵美無度得夫天和頃東倭之人踰海來賓舉其國俗願師於夫子非敢私請表聞於天子夫子辭以疾而不之從也退然貧居述作萬卷去其浮辭存乎正言昔左氏失於煩穀梁失於短公羊失於俗而夫子為其折衷王公交辟拒而不應從官三年始參謀於洛京家兄與先鳴者六七人奉壺開筵執弟子之禮於路左太真以文求進以無聞見舉而不吝為夫子羞春雲輕陰草色新碧皎皎匹馬出於青門吾徒喟然瞻望不及賦詩仰餞者自相里造賈雍以下凡十二人皆及門之選也茂天爵者薄人秩韜真機者疵世道是有草萊纓組塵埃聲利位始階而身退名始存而跡遠者見之於府君矣府君杜氏諱元徽字金剛京兆人也宗啓周封業光魯史層源演派謺萼舒英以地則因人斯大以世則令郡望族至若驟諫興王飛謀戰國垂康漢之績著平吳之功咸寵冠往賢鬱華前載斯粗舉而未能也曾祖良杞府君銀青光祿大夫國子祭酒贈左僕射祖士倫府君太中大夫左衛大將軍考元隱府君游擊將軍商州洵水府折衝上柱國或導揚儒風或宣肄武烈芳傳學省勳在戎府俾昌而裕育我令人府君貞亮居體中和成性孝慈根於素風明敏彰於羈貫唯道素是味唯還丹是慕浮碧落而雲高立秋江而鶴遠既而宗族喻良弓之業親朋示博帶之義事感於中勉而筮仕解巾署陪戎校左金吾翊府尋授左監門衛長史朝錯才識始從掌固揚雄詞賦仍聞執㦸滯修鱗於汙瀆棲逸翮於榆枌摩重霄躍洪瀾將有日矣然而雅好翰墨尢工弧矢援毫露垂舍拔星落循倒薤以偕極掩穿楊而稱妙造次於是專精無怠況匪驚愚以飾智匪隳身以徇物則儒墨兩忘也匪江湖而間匪仁義而修則朝野一致也是用齊榮賤混淹速歲星逾所名秩乃徙人不堪其望我則莫之屑其練性存神遠希彭羡猶初志也府君之從父昆弟有懸王官宿債者簡書烟交司空星至悉責薄産殆將不給且家人嗷嗷泉壤貽懼府君憂攢於貌事甚在已遂鬻所居之業而代償焉卜遷於西郊之別墅又有至自西州者宦遊既久田屋斯變陶園兼松菊已荒江宅與桑田懼盡府君復推別墅以居之其仁愛之厚多此類也屬虜起幽都兵交中原二京弛禁六龍偏幸府君心壯血憤志圖家國乃激勸親族糾率子弟弦木礪金有車一乘督責遣之曰吾聞救時者無險易赴難者無遠邇況文武繼代食君之祿者乎吾夙有林棲之契又齒髮將暮不有處者誰保家屬汝曹行乎吾欲兼濟遂提老襁幼集於終南時勳武爭搏齊人大擾戰血殷野殤魂嘯林丁壯濟師婦姑行餉府君深居事外適與靜合耳絶鼙角目無鋒刃天下鼎沸雲臥恬然伊昔漢臣擇日而不去秦客緣源以忘返屯往泰還我無凝滯由是放蕩形役徜佯家林州閭歸仁疆理息訟儒書仙籙開卷自得鶴侶鴻儔風期相許實清冥上人也以乾元二年夏四月十八日遘疾終於長安居德里私第春秋六十有四夫人渤海郡太夫人高氏婉娩懿茂柔貞惠和含真樂道合府君之志以貞元四年秋九月庚午合葬於咸陽之洪瀆原禮也長子前河北招討都統領兵馬使銀青光祿大夫檢校太子詹事兼御史中丞上柱國建安郡王食實封一百五十戶季玭宣茂績於邦家施湛恩於祖考忠誠好謀沈毅能斷當禁衛之心膂總兵符於掌握皇威揚於外臣節固於中勳庸大來爵位斯集朝廷以府君垂裕道至貽謀慶深下詔裦寵用光幽穸贈房州刺史次子冠軍大將軍兼試太常少卿季璘探賾兵謀妙通劒術致身環列亦著殊名惟伯與仲孝心罔極莫不切追遠之情循聿修之旨爰託圖篆式昭令德其詞曰休祉錫美元淳育靈是曰哲人惟道之英風質簡遠音詞淑清優游下秩想像高冥謀能圖國射足觀德藥竈霜元書池水墨義自情感仁非教植鬻業推居宗親翼翼當夷亂華高蹈雲崖子弟從師策勳王家艱難既平吐納元和玉貌雖全促齡如何詵詵令嗣忠武濟世位崇銀章權總羽衛是降裦贈載光幽竁撰詞揚休昭示來裔紓字仲舒禮部侍郎希言子天寶末拜祕書省校書郎大歷初為左補闕纍遷司封員外郎知制誥改中書舍人尋自虢州刺史徵拜禮部侍郎德宗居奉天擇為同州刺史尋棄州詣行在拜兵部侍郎反正兼知選事移禮部卒年六十二贈禮部尚書準開元十九年敕置齊太公廟以張良配享太常卿及少卿丞充三獻官又按開元禮祝文云皇帝遣某官敢昭告於齊太公漢留侯至上元元年敕追贈太公為武成王享祭之典一同文宣王有司因差太尉充獻官兼御署祝版伏以太公即周之太師張良即漢之少傅聖朝列於祀典已極裦崇今屈禮於至尊施敬於臣佐理或過當神何敢歆伏以文宣垂教百代宗師五常三綱非其訓不明有國有家非其制不立故孟軻稱生人已來一人而已由是正素王之位加先聖之名樂用官縣獻差太尉尊師崇道雅合政經且太公述作止於六韜勳業形於一代豈宜擬諸盛德均其殊禮其祝文請不進署其敢昭告於請改為致祭於其獻官請準舊式差大常卿已下充極以象為文三辰章焉地以植為文百卉昌焉辟以誥為文萬宇揚焉故三才之文人文為至三代之文周文為備秦漢承式簡而未宏魏晉繼軌則而方麗在河朔也其流靡清至江介也其細已甚以逮於亡隋焉國朝鏟邇代之弊振中古之業掌文命官發華歸本出入二百載上下十數公燦燦然與漢魏同風矣而曠士之制博而通豪士之制英而辨道流之制精而密君子之制直而溫吳郡朱君其君子歟諱巨川字德源嘉興人也此邦之人不學則農苟違二業必自他邑故王父舉茂才先子舉孝廉皆在上第君以文承祖以經傳代行中規身中度陽休於氣和積於中而藻之以文章也年二十明經擢第嘗著四皓碑磅礡君臣之際表章出處之跡正或蒙難顯黜於晦柔能麗明語賢於默道宏藏衎義與定傾識者已知其有易諒佐檢之風矣其後北戎病燕華夷爭土率先心計絿競力刑潛不隱鱗飛不藏羽而君深居里巷鮮越戶庭靡躬靡親不以潔羞膳不蠶不績不以獻溫凊行之有餘重志於學考經義之箋訓撰策書之贊敘每立新評必度常均將欲含堅超長針肓起疾矣又著睢陽守城論一篇以為義者忠之徒廉者節之本苟忘義以自重是臨節而可移固以探二公之心垂萬古之訓使違難者銷聲以結舌苟生者寄愧而終身斯深於春秋而不義者遠矣御史大夫李季卿實舉賢能授左衛率府兵曹參軍戶部尚書劉晏精求文吏改睦州録事參軍濠州獨孤及懸託文契舉授鍾離縣令兼大理評事沔鄂聯帥獨孤問俗欣慕士程表為從事授監察殿中等御史數公皆人之望也士趨於門猶恐不及君辟其府未嘗有容至於幹固守成平端吏職所至蒙其福利所奉由其重輕人皆誦之君以為恥本州牧御史大夫李涵推善里仁拜章特徵薦左補闕內供奉行以直聞文以正舉皆君之素也況官以諫為名乎傅納從容休問昭晰由是擢起居舍人知制誥換司勳員外郎掌誥如初拜中書舍人錫以章綬凡載書之傳信者贊書之加命者詔策之封崇者愍策之裦厚者其詞必溫其道必直洪而不放纖而不繁實根作者之心無愧前人之色前後時宰僉稱任職其小成也猶嘗秉考秀之刀尺掌條流之衡度而焦明顛於層旻飛黃頓於局路此人情所以為慟天問之所宜賦也以建中四年三月九日遘疾終於上都勝業里私第春秋五十有九以其年七月七日歸窆於本縣西上蔡原舊塋禮也詔以侍御從之贈華州刺史俾所在州縣續食以過喪詔恩之崇終始加等朱氏之先出自顓頊吳回後也建國曰邾有儀父勤王之義去邑為朱有平原佐漢之績博以忠輔顯雲以義烈聞從吳為世家在晉為冠族以至於曾祖伯道皇朝襄州司馬祖貞筠皇朝筠州豐利縣令父循贈洗馬君即洗馬府君之元子嗚呼嘉禾之偏宰樹焉依崇邱即高大寢重潤元精之發回復其中故君生受英華之氣歿歸隱厚之邃宜其騰振洪徽延垂慶嗣也子宿纂祖之武得君之文甫逮弱齡擢登秀士與其弟端靖定等遐護歸輤進拜先友哀託斯銘往旌不朽銘曰猗朱君秉國文星回漢鼎歊汾丹素絢雅鄭分音扣玉氣飄雲才日新行日聞騁夷道夭中身霈洪私贈朱輪勾吳邑靈海濱降精英積氤氳地貞吉宅還真門修夜非我春聳孤石垂後人璬貝州人開元朝官幽州都督法曹參軍此浮屠者唐中興七年歲次辛亥夏闕一字月八日宣義郎守幽州都督府法曹參軍上輕車都尉貝州王璬上為聖唐皇帝下為法界蒼生次逮七葉先亡俯闕一字見存眷屬之所建也究夫溺川思拯必闕二字楫之功火宅懷離載俟牛車之力矧乎迦維聖濟非視聽所闕三字賢劫乃慈悲之理璬以頑蔽闕一字事闕一字隅左右闕二字聿加非各誓意輸歸妙造竦闕九字彼岸矣豈非丈夫潛施雄闕六字靈焉闕一字戾是故乃闕一字捨衣命構闕四字石闕二字巖祇闕一字寶樹基闕一字界則獨苑增闕七字黃陂萬頃却臨雲嶠翠崿千重信闕四字乃升龍之別業者也庶夫瀛桑百變闕四字在我此功與天亡極銘曰丨火哉傑聖闕一字德有闕二字我嬰枉惠豫殷仁得免時瘵實賴慈闕五字運此名斤爵離崛起鳳跱天辰諸劫有闕五字務元宗時人縣官凝命化天下以人文有司慎舉闡大猷以儒行雖司徒既有詞客當國豈無髦士掌故帶經傳業射策微庸歐陽生之代業自昔斯授孔安國之家書居常時習刺六經以達士就百石以代耕曩者植杖而耘未嘗釋卷今茲栫棘而訊豈廢傳儒由是策名廷尉公門惟其自訟備員文學卒史實以次敦以命求之自貽不得嫉詞多而有訟誣功令而不公寧假爰書宜從告詰廷暉元宗朝擢書判拔萃科尊俎牲牢歲時享獻祭神如在明德惟馨感以此誠膺茲介福先王令典列代通規且有生最靈惟人為貴怨嗟尚傷於和氣淫酷豈叶於明神今叩鄫生之血以充勾龍之祠且送終尚不致殉祭社焉可用人往諫前非撫事不遠原情據罪在法難容告以為妖或亦未可永言其虐須置於刑學以從政位將録賢必考微言以登稍食詢諸漢制或漸通班按彼周官須當下秩若業同朝錯才比匡衡多聞闕疑果行育德三墳五典顧倚相而無慙七略九流仰劉歆而可繼固宜虛位允應旁求實乖與善之情而啓多訟之訴含光易退則醜歸於訟者推誠應物復過在於有司儻其誦過萬言加以通識千古與能從事可不務乎伯璵開元時官華州鄭縣尉天寶中遷吏部郎中出為袁州刺史歷撫州徵拜戶部侍郎未至卒原夫六官分職理化之紀綱八座設位國成之周行屬天下有道㣥才向方今茲觀德足用舊章天子開司會之府求俊選之良昭其能則平施其祿思其濫則大為之防既作鏡於前典乃懸衡於高堂信入仕之覆簣為登科之履霜名實斯別謀猷以昌分雁行於廣廈引魚貫於長廊明試以言率由厥道彼興邦之所急庶用賢而為寶上之化下也猶風下之應上也如草惟德助理惟才輔政啓甲乙之科修文學之令卦列在陰之象詩著食場之詠固藏器以俟時亦進思而體命徒觀其來頌來歌以引以翼因考覆而升降隨臧否以黜陟叩兩端而不疑守大中以立極將採梢雲之幹必表凌霜之色人未易知道亦難測儻棄瑕而録用希萬國以不息古者先擇藝之科盡得賢之意以諸侯益祿之選用男子懸弧之事禮容斯作皆專正鵠之能藝實不同故有射宮之試於是英髦畢集弓矢皆持望其審固定以妍媸驗體正心平之方取其類者設周旋進退之度用以觀之苟三侯之不失在五善而奚疑當其立德有容凝神多暇弦開而滿月初生箭發而飛星共借推高於衆人之上所謂簡能定準於百中之先斯為善射始則干時上國貢藝澤宮念登科之有望冀捨矢而成功蘊破的之心每期於度內致穿楊之用終在於彀中是故節以采蘩之詩尊於在公之道謂得失之可驗故否臧而盡考為仁在我助祭之事固宜有慶於君益地之期可保今也時在推公人皆獻藝思呈妍於揖讓之表願騁志於操張之際動而有節君子之爭不為發必循聲長者之容是繼必以蘊才思妙用古為難則當追軒后弦木之功於是取驗法仲由執弓之道庶或可觀然後以射為規以仁為則冀大道必公於取希有司不愆其職夫如是則天下蘊藝之徒莫不望君門而效德虞書詩言志律和聲察乎歌以形言聲以導律時其聞見聊因紙以賦曰驗謳歌於樂府戒伶人以迭唱隨轉意合難為形狀始趨曲以熙熙終沿風以揚揚繚繞容與逶迤超暢函五聲之參差極六律之清壯原夫蹈性以純密乎率心於悠曠或曲或止如墜如抗盡或可續應而不匱來無攸往去有遺意荊王感而增悲楚妃歎而掩淚察乎靡靡似游絲以為緒聽乎纍纍若貫珠之為墜括繁言以入節同大道而無器浮而不蕩聚而不盈比擊鼓以作氣尋鳴笛以遣聲亘簫笳之異響亂楚漢之疑兵斷絶齊愛支離帶情或引商刻角或潰渭通涇思彈劒於逆旅念採菱於江汀發河激之慷慨奏滄浪之濁清賦扣角以悽切歎食薇之廉貞於是載賡載揚穨思覆句引韻下散沿源上溯若寒雲凝於沙漠秋風起於燕路情激烈以懷霜氣絪縕而掩露率意縱誕耽聲指顧眷五噫之匪陋遵九章之淪悟委頓飇厲抑揚帛丿糸妙啓子均洛北之曲泉客理淮南之調或間以彈絃或雜以長嘯陟降配德登之於郊祀一唱三歎用之於宗廟至哉但擬其形容淵乎莫見其光耀蹈迹載德流言居要九辨勤於水土二南分於周召寶鼎見於汾陰天馬來於荒徼徒觀其浩浩嫋嫋渢渢泱泱堯帝繼以虞帝禹跡盡於殷王省周詩於魯策欽漢風於沛鄉嗟人命之何幸逢天道之昭彰諒股肱之匪懈載元首之輝光制頌創雅漂齊流商瞽統樂教士符人康展來蘇於日域諧擊壤於皇唐附威儀之濟濟和金石之鏘鏘白雲互進緑水激揚聊以永日歌而無荒西南之美有華山之礦石焉砥貢之珍有荊山之象齒焉於是工人創器軌物備敘豐腹上圓頽根下矩憑陵衡隧掬算師旅發號啓行兵綦迭舉赴縱奔電影亂飄風左掎右角為梟為雄易心而行俟釁而動奮以武怒賈其餘勇作威以襲敵厭陳以承權建瓴桓桓謂戎馬之旋路長斜矯矯猶翰音之登天恥交綏而退旅尚彼廢而我全侔射隼以藏器眷得魚以忘筌惴惴將頽識成敗之亹亹纍纍不絶歎瓜瓞之帛丿糸帛丿糸始收功而隔澗終制敵以緣邊原夫粲若星離偃如雲岸映垂奩而黻合拂轉巾於霧散示之以弱效羸師以設疑謀之其臧象觀兵以靜亂克乃因於通理敗不由乎強幹或應為而不為或當斷而不斷鄙夫遘戰而未非智者見機而已歎連連搏漠必成其鴈行歷歷登壟何異乎魚貫愧逃政以周流慙不競於奔竄諒棲遲以保險仍卼臲而長歎良工飾法以修身小人恥射以作玩鑒炯誡於博奕吾是以針之藻翰函谷天險宏農邦鎮南據二虢北荒三晉洞開一軌壁立千仞徑薦雙合梯苔孤峻世濁先封道康後順遠秦塞近崤陵幽泉脈脈斷峯稜稜增陴霧杳聚堠煙凝高卑異級坻崿相承靡屆靡究不騫不崩實隄防之樞轄為造化之緘縢齊之以權衡危不可得約之以符璽信而有徵昏主既廢聖人以興慎終於始欲罷不能觀夫憧憧往來驂駐成霧據於石東西十里臨其深前後咫步建瓴百二之國扼喉三七之路幅員既長城小而固恃元化之陰步馬望彞倫之攸序於是敕用傳禁棄繻商君本魏之公子柱史乃周之臣符知結草之可守故習坎以無虞原夫阻河稱深因山為衛背宇宙之衝連阡陌之勢萬方納款百工獻藝四旁磔攘諸侯之政典一丸成功陪臣之邪說直指天符變稊荑之末橫分地維弛旗旒之贅聿修綱紀以遏醜戾或懸門而不發殊勇夫之重閉懷德維寧將鎮其細既皇漢之辟國實扃鐍於新安固之胡易舍之則難復襟帶於故道徒赬壤而未乾善孟子之禁暴惡臧孫之謬官存古訓以是式庶斯文之不刊壯三輔之雄極非魏國其伊那總魏國之繁隘非斯橋而豈他條山左臨高障東連於渤海晉關右抱浮梁西截於長河却頓鐵牛駭浮川之魍魎旁飛畫鷁驚入浪之黿鼉竹笮其維不虞於奔濤擘赫金鎖斯纜何懼於層冰皚峩川有梁兮閴閒於揭涉王在鎬兮有格於來訛蓋取諸益其不謂何故馬卿之猋缺爾斯題請觀即事尾生之溘焉守死夫奚足多豈比夫虹能象之不可以來往鵲能填兮不可以經過若斯之利用吾賓薦之士亦可歌頌諸侯之盛績樂王化之雍和爾其薄煙霏霏初日杲杲遠之而望勢侔神造既似乎瀑布之界天台又似乎蓬萊之橫海島虛其內則用當於無疏其間則屈而且抱憑險作固夾咽喉之重關用否而通連秦晉之長道東西水滸義非待於秦求襟帶山河固可兼於魏寶爾其憧憧往還曳曳空間華柱上征殊馬援之標界石臺中聳若鼇力之負山偉哉武侯時賞茲國況天樞要作限通塞旁達無垠下臨不測舟形崎嶬似火龍之飲川梁勢編帛丿糸疑海鵬之點翼其拯物也有來斯適其濟時也遐方不亟非夫蓄巨川之運回斡地之力則何能掄梓材以當路臨要津而作式守此道也夫有何極然而物有成規國有虛費信彼才之可取奚此橋之獨貴使夫期不日以獻珠連城而出魏坤之美兮焉可以測鹽之池漭沆兮劃開於郇瑕之側廓平陸而無際浸長天之一色前對條山照峯巒之嶻嶨却鄰安邑對城樓之嶷岌其出形鹽也狀雄虎之蹲於長野攫拏兮布濩其吐精光也如白日之升暘谷照爛兮熻赩既似乎鏡湖之不遠又似乎渤澥之在即是以我良牧宣風千里褰帷憑軾覩茲池兮荷上天之報覩茲鹽兮恤下人之食意者以為季布鎮乎股肱黃霸蘊其輔翊不爾何魚鹽川澤之用饒土潤鹹鹺之利飭天人之繄列則有典有孚百姓之攸迷而不知不識粲矣郊甸丕哉庾億且觀其皎皛池濱皚峩嶙峋髣佛圭璧依稀碝珉入澤遐窺喜晴天之速曙隔林斜望訝瓊樹之驚春餌之者若茹膏之客捧之者疑獻玉之人況生殊播植動必合時為諸侯之賞愛入嘉賓之賦詩嗟乎其皎皎兮于川之湄其郁郁兮于川之坻有美玉之價沈之而不汙有君子之德涅之而不緇利入桓公之論名留謝氏之詩充郡國之珍産實亭育之攸資永言沈鬱必由光拂可取於人況鑒於物懿夫天不祕寶地不藏靈可以和梅羹之調鼎致君於堯舜可以偶腒鱐之入薦效祉於勳名爾河汾之寶信同天造豈若分溝塍之綺錯則萬頃花明匝井田之周環則千里雪皓由斯言旃有美自天幸無委於泥淖將以報於陶甄毀廟遷主告終稱嗣父昭子穆將順從時之典易檐改塗恐墜思先之戚儀雖仍舊禮則謀新初致孝以觀德終因心而崇敬歲聿云暮祭則有倫守宗祏之威儀率由殷奠考新宮之成式虔奉外除所謂斯人未明古道訟彼家老自貽不臧有周上柱國蜀國公河南尉遲迥字居羅代人也與魏同祖乃胙嶽濱因部立家遂雄荒服父俟兜尚太祖姊昌樂大公主贈太傅長樂郡公秉操中和率心純嘏無命早世公七歲而孤天授禮樂神資文武合乾元昴宿之祉得雲中金陵之氣稟昌樂胎教之德聞長樂庭訓之旨觀時俯仰與道周旋大統初仕魏散騎侍郎歷大丞相帳內都督尚魏金明公主封西都縣侯亳社未遷天人主饋虞賓載祀茅土增封四年進爵為公轉車騎將軍領侍中尚書僕射珮倚兼璽劒橫重紱元戎載警端揆允釐十六年拜大將軍時侯景詐梁蕭紀叛蜀委公以上國之甲靖偏方之盜假公以垂天之翼虞鷇中之翰公於是承廟算出鋭師張我軍三覆之勢踵敵人七擒之跡宵加庸蜀城守皆降詔公兼益梁等十八州諸軍事益州刺史公孝思不匱色養有違長公主春秋既高西南夷威懷允洽自家刑國重荷溫凊之詔飲至書勞仍頒袞冕之錫旌其伐也改寧蜀郡公中領軍綱弟因兄寵安固公順子策父勳豈獨長安置郊勞之禮成都刊德政之頌周之興也換小宗伯督隴右十二州后稷仕虞且尊君命伊尹去夏未虧臣節陶唐之美無易至公進公蜀國公邑萬戶總秦渭文康十四州軍事纍遷大司馬冊太師加上柱國師傅之地非賢不居軍國之重唯才是寄俄拜大右弻又拜大前疑將付安危授相州總管宣皇晏駕周鼎方移晉京上流非無陶侃魏廷舊史尚有王陵是年京師將徵公公以隋公當權辭不受代乃自稱大總管承制署官司諸呂擅朝幾亡劉氏新都納女竟覆漢宗公子魏安公沁東之敗也公緑巾尚整猶背城請戰黃龍既潰則登樓自裁公志匪圖全誓將死難不憚征繕以勸事君恆畢心而禦侮因見危以授命鳴呼壽在黃髮位為元輔生不敢齒沒有疑年史之闕文從古也公凡仕二代易九朝內設官師歷職三十四外建侯伯撫封五十六五增邑徙封忠不辱隋節能奉上唯幼孫獲宥而門子從辜唐武德中朝制改葬飾終追舊國禮缺於曩日表墓思人天澤流于異世開元丁丑歲上選建衆哲輯寧庶邦相州刺史張公嘉祐先相國河東恭肅公之介弟作時膏雨為廟瑚璉立朝則兼掌巡徼佐郡則預參師律至於建節是邦也教以肅政以清起忠貞之廟制享獻之祀初公之下車問俗而郡稱多祟公曰匹夫匹婦強死者猶能為厲況蜀國公言足昭行可則大象之際獨為純臣毀家紓國既書於直史薀藻潢汙未孚於前代二千石既荷重祿闕修殷薦其取戾也宜哉我是用發私藏之俸則崇宮壯構轉他山之石則豐碑頌成陵谷不遷永昭洪烈若山魯郡人先天中歷官尚書郎開元中出為潤州刺史世祿暫榮浮生難保惟是登真脫屣可以後天為期昔范丞相泛舟五湖是知其主不堪同樂也張留侯去師赤松是畏其生不可久存也二子之志與臣不同臣運屬休明纍叨榮爵早悟升沈之理深知止足之規棲心元關偶得丹訣黃金可作信淮南之昔言白石可延察真經之妙用既得之矣餘復何求是用揮手紅塵騰神碧海扶桑在望蓬島非遙遐瞻帝閽不勝犬馬戀軒之至諒開元二年賢良方正科擢第問朕聞理國莫尚乎任賢命官必資乎選衆堯舜以聲不以度考核良難殷周取德兼取言徵求匪易朕所以載懷經術之彥夕遺其寢虛佇藝能之士朝忘其飢子大夫光我弓旌應斯揚擇為政作法豈無前範安人濟時亦有令躅宜敘立身之志各言從官之才至如七輔八元施何綱紀十臣四老正何得失並陳事迹兼詳名氏夫朝會古禮登享舊章九儀式辨其賜六贄各明所執雍畤起自何年亳社立於何代天士地士此何所封諸布諸嚴彼何所主又穆邦家而濟生死三聖之教何長利動植而益黎元五材之用何要工商兩業在俗何先文武二柄適時何急凡此數科不獲雙美必去者方於去食可存者同夫存信朕將親覽爾等明言對臣聞時雨作解靡物不滋春雷發聲㣥蟄漸覺間者明詔咨九牧闢四門光燭巖藪恩覃側陋葵藿仰惠以納景山川有開而出雲使草茅微臣幽賤朽質辱旌賁陳芻蕘瞻璚臺之穆然預煙闕而伏對此臣之鴻造也敢不瀝誠哉臣聞堯之光宅也以親九族以命百官舜之登庸也以察萬人以齊七政大禹拜皋陶伯益惟其昌言武王問黃帝顓頊存乎至道此四君者文思濬哲恭儉高明仁以創制慎乎體國思借力以任重簡遠以安人故選賢以居位先事而後爵則考績以庸取人必才賦納獻可聲度言狀庶存茲矣伏惟陛下豐功厚利資始萬物以統天執契含元富有八方而纂聖家道以正庶績咸凝師師滿雲火之庭濟濟盛龍光之列尚紆神眷更睟天儀思仁壽之登域緬前王以作鏡雖軒轅之徇齊藏用重華之好問察言未足以扶轂大明驂乘元聖臣聞之遊大海者難為水窺聖門者難為言陛下侔造化而作法尊道德以垂範敬宗廟以示孝愛臣子以興仁懷蠻夷以廣德抑禎祥以崇理禮經大備四海共職而朝宗樂物至和百獸來庭而率舞至於為政安人之躅則微臣何足以知之其餘備父母之體以立身欽聖人之化以從官之問則願竭其愚臣惟忠孝可以從官奉陛下之法以自理守陛下之職以自安以之居處則莊以之戰陳則勇是陛下軼堯舜之上愚臣忝比屋之封臣雖不才則亦有志矣昔者風后力牧仲容庭堅相與謀謨於有熊之朝弻違於納麓之運講信而修睦肆直而惠和垂衣裳作舟楫分州土敘星辰其紀綱也如此其後閎散周召園黃綺季鎬京得之為心膂漢儲得之為羽翼終能牧野清明惠皇不廢其救失也如彼夫國有五服朝聘申其貢禮有五經享祠肅其首職方品其遠邇宗伯辨其瑞玉乃開封壝是設方明錫之以鞶纓袞裳執之以圭璧羔鴈秦之立雍畤也將以禘其自出周之居亳社也亦以戒於不臧臣又聞先王之制禮法也以勞定國汰哉漢武曾是黷神採少君以端信庶樂通之貞固帳甲乙樹旄頭望嶧山祈石室天士地士不治於昏淫諸布諸嚴何裨於風雨乎聖策以三教立言歷代彌勤成軌制以化時較醇醨而景俗此聖君合懸解之旨而小臣慚默識之明然臣亦嘗聞之矣夫禮者始諸飲食盛於冠婚分而為陰陽轉而為太一失之者死得之者生二氏包虛無而含寂滅長性靈而已宜去於斯傳曰仁義禮智以信為主貌言視聽以心為正則士德優矣若乃神農之肇皇業揉木為耒弦木為弧皇帝之開帝功致天下之人聚天下之貨器以成務稼惟人天利以通財阜國周用苟能全人天可違乎故臣願抑商而進工也大哉武之為功赫矣師之所處象震耀而舉垂雲雷以揚宣威而山河蕩容訓誓而煙塵動色可以定禍亂可以翦暴強頃者牝雞之晨陛下潛龍或躍提白蛇之劒揭翠鳳之旗入於北軍兵皆袒左氛祲殄滅日月光華此神武之壯觀謹對清開元五年進士觀夫太古之初乾坤定列有坎方一德之大成江河四瀆之別注仙海以環流度星橋而靡竭立體清靜舒光朗徹觀五行以獨舉潤萬物而齊悅豈惟以善下之故長應流行抑亦能遇坎則止以竭為平居荒野而不動合寒虛而自清晝則烟雲亂出夜則星象羅生若乃湖稱青草澤若雲夢淺深濴渟表裏寒洞當朱陽之夏晚遇白露之秋仲紫關之鴻雁飛來緑浦之蓮舟風送既能止而利物所以歸之者衆亦有鳳凰之沼明月之潭每澄流於庭院常不注於東南蒙寮寀之玩洽渾琴酌而相參以游以賞如液如涵若英賢之取則類貞咸之是湛屆夫玉宇初晴風飇載寢籠碧天而似鏡展紅霞而若錦納衆影而不遺比㣥情而特甚用使至人觀之而心察智者樂之而情審達士愛而欲臨高節聞而願飲復乃養龜鶴藏魚龍怪石積明珠重虛以受物謙而克從有一人兮充賦每咨歎於澗松飾清顏而自肅希止水而今逢則知無美惡以畢鑒豈徒取乎矯容鎮開元五年進士天寶時官倉部員外郎惟皇立極建都河洛會府疏庭珍木咸若偉梧桐之嘉遇竟因人以勝託傾鳳翼於朝陽偶鵷行於祕閣貴有常尊靜為躁君花繁翼子幹直謀孫履素至潔體柔常存揭日月以曜穎含雨露以流根豈與夫龍門半死嶧陽孤植齊萬籟而混吹合千巖以共色徑質冰摧而杍人莫識高標風折為樵人所得求知音於爨燃論分理於繩墨且問之以死生又焉議夫通塞故至人以全身遠害君子以自強不息失其理山林不足以攝生順其道朝市何妨乎育德梧桐生矣自遠而至輕去無何之鄉不居有過之地謂繁華兮國人服媚吾獨後春而翠謂搖落兮物情共棄吾亦先秋以悴不改節以邀利不立名而自異必居常以待終將百慮而一致大年椿幹捎雲豫章箘簵貞徑桂椒信芳百果甲坼於金谷千林花發於河陽實繁者皆折材用者先亡我異於是于何不臧布清陰於仙署棲白雲於帝鄉旁連梓俯接琳琅蔚金蟬之氣色耀錦帳之輝光我封我樹無臭無香後天年於社櫟用當代於甘棠得喪齊致語默兩忘吾不知夫支離之德何獨攘而自出蘧瑗之智何獨卷而自藏復有翦刻為圭琢磨成器龍章鳳軫金符玉瑞平君子之心戒王者之戲晉侯得之諸侯麕至子野得之元鶴來暨雖信美於疇日未若茲辰之佩仁履義我求懿德於是乎在疏相比遠相待以其彙征成而不宰譬諸草木生植有時除惡務本樹善務滋引之斯至摧之斯離角弓兮有什杕杜兮陳詩敢告在位如何不思念茲在茲順事恕施苟求夏陰與秋實無拔楊以樹茨昔炎漢之開國宅咸陽而設規闢都邑之壯麗紛制作而多儀象蓬島以疏嶽擬天河而鑿池館倚南山㨖雲霞而上出城侔北斗仰星漢而曾披何爽鳩之代謝驗驪騵之運虧是以作之者不處居之者不為祚我神唐丹青焜煌峻址雲矗層譙錦章羃赬壤以謺形凝皓粉以飛光門結黃金之石檐施白璧之璫堞盤紆於曲檻池徑復於圓塘城勢逶迤若臺岑之隱映樓形宛轉似崑崙之相望接千門之宮闕通八達之康莊既而鸞駕西巡嚴扃啓晨羽衛咸集聲明克陳登睥睨以清夜聽畢逋而候春儼雄㦸以耀武振鵷行而拱辰夕沈煙雲之色曉流車馬之塵引祥暉之爛漫吐佳氣而輪囷於是歲發青道池隍煦早堞霧縈林岸風柔草暖懸竇以彌藹飾崇隅之增好映春水之澄澄納朝陽之杲杲惟壯勢之崢嶸達洪規而鎮京望浮雲之黑水對翔鳳之丹楹配宗子之永固等皇家之不傾俯賓庭而贊義終自惡其輕生甫開元二十三年進士粵若帝業盛惟皇家宅秦都雍枕梁通巴開別館以對赫飾離官而再華敘溫恭之深愛沐棠棣之榮花當其代邸初構華池方鑿鴻雁新來潛龍未躍磐石利建維城固作授車東華之門飛蓋西園之樂升降五位周環四託維梓維匠爰謀爰度建綵樓規層閣欒櫨跂翼以攢鬬枝牚杈丫而相搏凌兢雲垂嶪岌星錯風恬氣隱雨霽煙廓中坐平望數香街之往來馮檻下觀盡天京之郊郭厲丹鳳陵白鶴浮網玲瓏流光灼爍陰移翠仗影碧潭之清泠日上金題照錦林之花萼帝曰惟休順豫而遊躋攀初極眺覽還周登萬樂或歌或舞列千品乃公乃侯莫不傾赤縣竭神州士女都集衣冠盡留悉觀聖旨共仰皇猷掩宮扉則聞簫聲之下漢卷珠箔則覩天人之在樓至若乃趨是求立喻政有光於聽覽事無妨於農賦邈以迥出花容玉質綺樹紛映類仙臺之下空天光照臨若秦樓之上日列衆窗以啓扉疏重門而夾室紅塵晝斂則數之疑千緑雲暮屯則望之如一理孝光大敦敬則友撫安戎狄調六合以為家敦睦友于冠百王而為首化猷方行土無不并演湯禹之仁惠灑唐虞之頌聲士庶從而言曰觀其壯則知至尊之攸處察其功則知萬人之是與欽其號則知昆弟之相穆見其儀則知君臣之有序此聖情方在於元邈豈小人之賦能舉舉開元二十三年進士粵若稽古大哉皇家叶聰明於六聖敦孝友於四遐睦親親以相及樂韡韡以同華漢后龍宮建邸園之水樹梁王鴈沼通禁夜之烟花仍峻隅以立制葺重樓之可嘉嘉其謂何感物而作取諸棠棣目以花萼既揆日而爰謀亦占星而是度奢必去泰儉而匪薄素璧照耀以霜皓丹桂翕赩而霞錯謺欒櫨之夭矯繞軒楹之周流雖麗萼之不足實規模而寡仇秦王祈年之觀漢武井幹之樓在縱驕而彼得豈興奇而我儔若乃百寮望幸一人流煦君御下而觀風臣登高而獻賦信布澤而昭德豈徒樂而是務術徑且千廠墨閈如一察遠近而皆盡指纖微而匪失前卷珠簾後却疏牖分渭北之川光別終南之峯首千門回霽百陌微明翠幄凝烟暖青軒以靄映紅荷浸水嬌緑浦以縈盈咨謀景暇遊務晨并爰居爰處載犮載語萬人是察九族惟敘猶側聽於輿言或敢揚於君舉蓋開元二十三年進士開元中歲天子築宮於長安東郛有以眷夫代邸之義舊者中宮起樓臨瞰於外乃以花萼相輝為名蓋所以敦友悌之義也銀榜天題金扉御闕俯盡一國旁分萬里崇崇乎實帝城之壯觀也是時海內賓薦之士咸遊仙署馳神纍日以待問於有司有司盛稱茲樓並命賦之小子庸蔽敢同頌美辭曰惟唐六代盛德被於幽遐彌元都暨丹穴掩扶海與流沙莫不推福祚之攸永極威靈之所加敦本既同夫羲軒之日睦親又比乎棠棣之花裂土苴茅以表慶錫圭分瑞以聯華信可以受無窮之祉而保乂我皇家者哉乃命有司濬池隍繕城郭將崇大壯之義載考方中之作繚垣牆周乎舊宮設井幹而為新閣既準既繩以揆以度望馳道而通禁林走建章而抵長樂攢畫栱以交映列綺窗以相薄金鋪搖吹以玲瓏珠綴含煙而錯落飾以粉繪塗之丹雘飛梁回繞於虹光藻井倒垂乎蓮萼信神明之保護亦列仙之憑託於是乘輿乃登夫翠輦而建華旒鈎陳警道兮環衛周命期門使按蹕將有事乎娛遊六龍驤首以啓路八駿騰光而夾輈且肅肅以穆穆幸夫花萼之樓然後層軒四敞聖情周顧遙窺函谷之雲近識昆池之樹緑野初霽分渭北之川原青門洞開覽山東之貢賦亦以崇友悌之德勸農桑之務豈止唯臨鄠杜之郊空指邯鄲之路而已哉且壯麗難匹光華匪一馮禁掖以孤明隱垂楊而半出赫昈昈以宏敞肅隱隱而靜謐非匠氏之奇工梓人之妙術孰能至於是哉歲如何其歲之首花萼樓兮對仙酒願比華封兮祝我聖君千萬壽歲如何其歲始正花萼樓兮開御營願同吉甫兮頌我聖君億載聲蓋聖人去有欲反無名深宮皓素高居穆清觀㣥材之樂業朝諸侯而嚮明即知華夷欣慶冠帶混并均五氣之善叶三光之精嗟乎時難再得歲不我與跡已混於沈滯心未齊於出處此小子之所以瞻梁棟以自非仰雲霄而失序系開元時第進士調校書郎歷涇縣尉遷尚書員外郎五等疏封三壤咸則其於疆里各有區分甲忝居列侯且未之國威儀有翼雖委質於清朝日月其除終望歲於嘉穀爰在艽野是用占田將植油油之苗冀獲芃芃之稼未侵侯甸之服且近蠻夷之郊於典章而莫違取縣道而何害所由未詳漢制恐奪齊人將欲入官無寧非法逢開元時人稽夫王者御極上法璿衡分五方以辨位察四時以作程節既云徂躬履端而御極氣之將始必出郊以親迎然後人心不惑君德用明是時火官威寢金精氣浮有司來奏詰旦迎秋皇帝乃齊心以待曉御袞龍以垂旒俄而金闕戒辰司魚鑰以撒鍊玉漏將曉直雞人以獻籌乘輿乃駕赫奕皇州天仗倏以雲合風旗閃而星流馳六飛以啓道騰八駿以夾輈祝三辰與七宿儼公卿與諸侯在位則其帝少皞配坐則其神蓐收我皇乃順時候育黔黎佩白綬執白圭盛德在金就金方以蕆事西成有望出國門以面西豈比夫簫鼓徒樂於汾水玉帛空朝於會稽誡晨既睪酒縮靈茅笙鏞謁廟梁稻充庖日轉天旋既將歸於北極雲行雨霈匪空自於西郊是月也天地始肅秋冬將布勞我農夫張我王度疑獄在斷命司寇而按囚徒遠方來賓發天兵而開武庫然後人畏威而自正俗知禁而刑措休祥畢至則河湧靈圖慶賜遂行乃山呼聖祚於赫哉國容既備時令將徂樂萬姓以雍熙總百川而奔注余亦願於賓王效武賁而作賦談開元時判入高第調赤縣尉除侍御史遷司勳員外郎歷左司郎中天地設位聖人成能任良列官以同而異故周分六職懸教理之文禮辨九儀正邦國之典惟甲位荒王爵寵受公車賜則當五命之差等威陳七就之數既圖龍鵠之象亦分金玉之飾大赤以朝關諸異姓之伍太白爰即崇乎四位之封彼已之詞誠組總之未備有司之令意彞倫之是疑國容此欺爾瞻何在子有車馬不馳不驅禮尚威儀不軌不物置以典憲允乎清明當是負霜之凶非為遇雨之吉
