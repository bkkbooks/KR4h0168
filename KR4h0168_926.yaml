front:
  text: 全唐文欽定全唐文卷九百二十六吳筠二
  hash: sha256:aa59881a237181f905a3eebe5050a310c32fbd35ba3cf5feab155741a9b8b9bc
body:
  text: 余常思大道之要元妙之機莫不歸於虛無者矣虛無者莫不歸於自然矣自然者則不知然而然矣是以自然生虛無虛無生大道大道生氤氳氤氳生天地天地生萬物萬物剖氤氳一愛而生矣故天得一自然清地得一自然寧長而久也人得一愛何不與天地齊壽而致喪亡何也為嗜欲之機所速也故元和經云人絶十二多少抱宗元一可得長生又王京山經云常念餐元精鍊液固形質胎息靜百關寥寥究三便泥丸洞明景遂成金華仙此可與天地齊壽日月齊明矣其門大開無人解入豈不哀哉余雖不才輒敢為論見此碌碌之徒區區之輩在道門者不知有守道服愛養形守神金丹之術或國之重臣匡扶社稷在於儒典祿位彌高不知有攝養之術易形之道反精之規却補之妙多見使形體枯稿不終其壽實可傷哉余今輒論先賢之故事列以五章不才足比之為文詞不足詢之為議略述大體是非之道今守道者取虛無自然正真之一服愛者知兩半之前胎息之妙綿綿若存爾淘去三尸日滿上升元中之至合丹藥者鍊鉛取金化石為水黃芽河車神室殼矣制伏水銀而為金丹刀圭入口天地齊年悟則明矣迷為詞繁惟後學者審而消息萬不失一庶品同修感而不應得之者閉兌尋之者靜思何慮節符不契大道萌生者哉洪範嚮用五福其一曰壽延命至於期頤皇天猶以為景福之最况神仙度世永無窮乎然則長生大法無等倫以儔擬當代之人忽而不尚者何哉嘗試論之中智已下逮乎民氓與飛走肖翹同其自生自死昧識所求不及聞道則相與大笑之中智已上為名教所檢區區於三綱五常不暇聞道而若存若亡能挺然竦身不使恆情汨沒專以修煉為切務者千萬中或一人而已又行之者密得之者隱故舉俗罕聞其行悲夫昔桑矯問於涓子曰自古有死復云有仙何如涓子曰兩有耳夫言兩有則理無不存理無不存則神仙可學也嵇公言神仙以特受異氣稟之自然非積學之所能致此未必盡其端矣有不因修學而自致者稟受異氣也有必待學而後成者功業充也有學而不得者初勤而中惰誠不終也此三者各有其旨不可以一貫推之人生天地中殊於衆類明矣感則應激則通所以耿恭援刀平陸泉湧李廣發矢伏石飲羽精誠在於斯須土石應猶影響况丹懇久著真君不為潛運乎潛運則不死之階立致矣孰為真君則太上也為神明宗極獨在於窈冥之先高居紫微之上陰騭兆庶詩稱上帝臨汝書曰天鑒孔明福善禍淫不差毫末而迷誤之子焉測其源日用不知背本向末故遠於仙道者有七焉近於仙道亦有七焉當世之士不能窺妙門洞幽賾雷同以泯滅為真實生成為假幻但所取者性所遺者形甘之死地乃謂常理殊不知乾坤為易之韞乾坤毀則無以見易形氣為性之府形氣敗則性無所存性無所存則於我何有此遠於仙道一也其次謂仙必有限竟歸淪墮之弊彼自昏於智察則信其誣罔詎知塊然之有起自寥然之無積虛而生神神用而孕氣氣凝而漸著纍著而成形形立神居乃為人矣故任其流遁則死返其宗源則仙所以招真以鍊形形清則合於氣含道以鍊氣氣清則合於神體與道冥謂之得道道固無極而仙豈有窮乎舉世大迷終於不悟遠於仙道二也其次強以存亡為一體謬以道識為悟真云形體以敗散為期營魄以更生為用乃厭見有之質謀將來之身安知入造化之洪爐任陰陽之鼓鑄遊魂遷革別守他器神歸異族識昧先形猶鳥化為魚魚化為鳥各從所適兩不相通形變尚莫之知何况死而再造誠可哀者而人不哀遠於仙道三也其次以軒冕為得意功名為不朽悅色耽聲豐衣厚味自謂封殖為長策貽後昆為遠圖焉知盛必衰高必危得必喪盈必虧守此用為深固置清虛於度外肯以恬智交養中和率性通真為意乎此遠於仙道四也其次強盛之時為情愛所役班白之後有希生之志雖修學始萌而傷殘未補靡蠲積習之性空務皮膚之好竊慕道之名乖契真之實不除死籍未載元籙嵗月荏苒大期奄至及將殂謝而怨咎神明遠於仙道五也其次聞大丹可以羽化服食可以延年遂汲汲於爐火孜孜於草木財屢空於八石藥難效於三關不知金液待訣於靈人芝英必滋於道氣莫究其本務之於末竟無所就謂古人欺我遠於仙道六也其次身栖道流心溺塵境動違科禁靜無修持外邀清譽之名內蓄姦回之計而人乃可欺神不可罔遠於仙道七也其次性耽元虛情忘嗜好不求榮顯每樂清間體氣至仁含宏至靜栖真物表超迹巖巒想道結襟以無為為事近於仙道一也其次希高敦古刻志尚行知榮華為浮寄忽之而不顧知聲色能伐性捐之而不取翦陰賊樹陰德懲忿窒欲齊毀譽處林嶺修清真近於仙道二也其次身居祿位之場心遊道德之府以忠貞而奉上以仁義而臨下宏施博愛內瑩清徹外混囂塵惡殺好生近於仙道三也其次瀟灑蓽門樂貧甘賤抱經濟之器泛然若虛洞古今之學曠然若無爵之不從祿之不受確乎以方外為尚恬乎以攝生為務此近於仙道四也其次稟穎明之姿懷秀拔之節奮忘機之旅當鋭巧之師所攻無敵一戰而勝然後靜以安身和以保神精以致真近於仙道五也其次追悔已往洗心自新雖失之於壯齒冀收之於晚節以功補過過落而功全以正易邪邪亡而正在轗軻不能移其操喧譁不能淪其慮惟精惟微積以成著其近於仙道六也其次至孝至貞至義至廉按真誥之言不待學修而自得比干剖心而不死惠風溺水以復生伯夷叔齊曾參孝已人見其沒道使之存如此之流咸入仙格謂之隱景潛化死而不亡此例自然近於仙道七也取此七近放彼七遠謂之拔陷區出溺途碎禍車登福輿始可與涉神仙之律矣於是識元命之所在知正氣之所由虛凝淡漠怡其性吐納屈伸和其體高虛保定之良藥匡輔之使表裏兼濟形神俱超雖未得升騰吾必知揮翼丹霄之上矣夫道無形無為有情有性故曰人能思道道亦思人道不負人人無負道淵哉言乎世情謂道體元虛則貴無而賤有人資器質則取有而遺無庸詎知有自無而生無因有而明有無混同然後為至故空寂元寥大道無象之象也兩儀三辰大道有象之象也若但以虛極為妙不應以吐納元氣流陰陽生天地運日月也故有以無為用無以有為資是以覆載長存仙聖不滅故謂生者天地之大德也所以見宇宙之廣萬物之殷為吾存也若煙散灰滅何異於天傾地淪彼自昭昭非我所有故曰死者天人荼毒之尢也孰能褒大德黜荼毒拂衣絶塵獨與道鄰道豈遠乎哉行斯至矣夫至虛韞寂待感而靈猶金石含響待擊而鳴故豁方寸以契虛虛則靜憑至靜以精感感則通通則宇宙泰定天光發明形性相資未始有極且人之稟形模範天地五臟六腑百關四肢皆神明所居各有所主守存之則有廢之則無有則生無則死故去其死取其生若乃諷太常之金書研洞真之玉章集帝一於絳宮列三光於紫房吸二曜之華景登七元之靈綱道備功全則不必琅玕大還而高舉矣此皆自凡而為仙自仙而入真宜與道合謂之神人神人能存能亡能晦能光出化機之表入大漠之鄉無心而元鑒無翼而翱翔嬉明霞之館宴羽景之堂歡齊浩劫而福無疆壽同太虛而不可量此道布在金安可輕宣其奧密乎受學之士宜啓玉檢以探其祕焉又儒墨所崇忠孝慈仁仙家所尚則慶及王侯福薦祖考祚流子孫其三者孰與為大嗚呼古初不可得而詳之羲軒以來廣成赤松令威安期之徒何代不有遠則載於竹帛近則接於見聞古今得之者皎皎如彼神仙可學炳炳如此凡百君子胡不勉哉金丹大藥文字縱載互有隱顯看文不如口訣口訣不如眼見眼見不如手傳然修身未合其真且須宗元一愛其藥也金土配乾坤龍虎生骨髓魂魄為夫婦龜蛇二女子午神本四位三愛還守二法象得成龍姹女因留止為得鉛中金兼得石中水節序奉行日月合軌賢者待行道北方水金是赫然還丹成元黃煥爛熻赩焜煌煒煜日月五星不足比其光澤也生陰長陽變化無倫翱翔碧落縱曠元漠飄飄大素歸虛反真體造化之所成以刀圭入口共天地齊壽可與雞犬同飛室宅拔上謂之靈聖真人感應也夫人未有其兆則天地清寧剖道之一愛承父母餘孕因虛而生立有身也有一附之有神居之有愛存之此三者遞相成可齊天地之壽共日月而齊明何者為修身慎行助育元愛胎息藏府存神想思含虛守無宗皇之一西升經曰知一萬事畢則神形也抱朴子曰人不知養生焉能有為生人不曾夜行焉知有夜行故知養神修身者壽老棄神愛欲者中夭也莫逆理而為事敗長久之佳珍陰陽之道以有此身身含形神全一心動則形神蕩欲不可縱縱之必亡神不可辱辱之必傷傷者無返期朽者無生理但能止嗜欲戒荒淫則百骸理則萬化安若人遺行不可為之年或恐力不可致何者若鑄頑冰以為寶鏡駕石舟以泛波瀾非鬼神能助之非天地能運之况人受道愛則剖得神分得一有此形骸而不能守養之但擬取餘長之財設齋鑄佛行道吟詠祈禱鬼神以固形骸還同止沸加薪緝紗為縷豈有得之者乎形之與神常思養之自以色聲香味以快其情以惑其志以亂其心此三者敗身逆道亡形沈骨喪身之所由生者也夫元愛之術上古已來文墨不載須得至人歃血立盟方傳口訣只如上清禁訣玉函隱書百家諸子誥傳詞文乃至老君祕旨內外黃庭灼然不顯不露五千真文略述只言元牝門謂天地根似顯枝葉本蒂深密每尋諸家愛術及見服愛之人不逾十年五年身已亡矣余生好道術志在元和每見道流皆問無事千説萬別互有多般或食從子至午或飲五牙之津或吐故納新仰眼伸足或餐日月或閉所通又加絶粒以此尋之死而最疾何者為攻內受外故速死也抱朴子曰兩半同升合成一大如彈丸黃如橘就中佳味甜如蜜爾牢持之謹勿失子若得之萬事畢是以愛之為功如人之量器如水之運流堤壤則水下流矣閉通則愛不居矣但莫止出入自然之息胎鍊精神固其太和含其大道若明胎息則曉元愛胎息興元愛同也道德經曰可以却走馬以糞如嬰兒之未孩故龜甲經曰我命在我不在天不在天者謂知元愛也人與天地各分一愛天地長存人多夭逝何也謂役愛也愛者神也人者神之車也神之室也神之主人也主人安靜神則居之躁動神則去之神去則身死者矣夫道者無為之理體元妙之本宗自然之母虛無之祖高乎蓋天深乎包地與天地為元與萬物為本將欲比並無物能等意欲測量無處而思於混成之中為先不見其前毫釐之內為末不見其後一人存之不聞有餘天地存之不聞不足曠曠蕩蕩渺渺漭漭人能守之天地如掌故岐伯曰上古之人知道者法則陰陽和於術數飲食有節起居有度為而不為事而無事即可柔制剛陰制陽濁制清弱制強如不退骨髓方守大道大道者多損而少益多失而少得益之得之至真之士也益者益形得者窈冥得此窈冥感通神明説苑曰山之高雲雨起水之深魚鱉歸人守道福自至人之所生者神所託者形方寸之中實曰靈府靜則神生而形和躁則神勞而形斃深根寧極可以修其性情哉然動神者心亂心者目失真離本莫甚於茲故假心目而發論庶幾於遣滯清神而已且曰心希無為而目亂之乃讓目曰豫欲忘情而隱逸率性而希夷偃乎太和之宇行乎四達之逵出乎生死之域入乎神明之極乘混沌以遐逝與汗漫而無際何為吾方止若且視吾方清若且營覽萬象以汨豫之正悅美色以淪豫之精底我邈邈於無見熙熙於流眄搖蕩於春臺悲涼於秋甸凝燕壤以情竦望吳門而髮變瞻楚國以永懷俯齊郊而泣戀繄庶念之為感皆寸眸之所眩雖身耽美飾口欲厚味耳歡好音鼻悅芳氣動豫之甚皆爾之謂故為我之尢職爾之由非爾之懟而誰之仇乎目乃忿然而應之曰子不聞一人御域九有承式理由上正亂非下忒故堯俗可封桀衆可殛彼殊方而異類猶咸順乎帝則統形之主心為靈府逆則豫捨順則豫取嘉祥以之招悔吝以之聚故君人者制理於未亂存道者克念於未散安有四海分崩而後伐叛五情播越而能貞觀者乎曷不息爾之機全爾之微而乃辨之以物我照之以是非欣其榮戚其辱暢於有餘悲於不足風舉雲逝星奔電倏紛綸鼓舞以激所欲既汨其真而混其神乖天心而悖天均焉得不溺於造物之景迷於自然之律哉故俾豫于役應爾之適既嬰斯垢反以我為咎嗟乎嗟乎何弊之有心乃愀然久焉復謂目曰顧豫與爾誰明其旨何隱見之隔而元同若此既庶物之為患今將擇其所履相與超塵煩之疆陟清寂之鄉餐皓氣吸晨光咀瑤華漱瓊漿斯將期靈化於羽翼出雲霞而翺翔上升三清下絶八荒託松喬以結友偕天地以為常何毀譽之能及何取捨之足忘諒豫圖以若茲其告爾以否臧目曰近之矣猶未為至若然者所謂欲靜而躁隨辭埃而滓襲暗乎反本之用方邈然而獨立夫希夷之體也卷之無內舒之無外寥廓無涯杳冥無對獨捐茲而取彼故得小而遺大忘息陰以滅影亦何逃於利害伊虛室之生白方道德之所載絶人謀於未兆乃天理之自會故元元挫鋭以觀妙文宣廢心而用形軒帝得之於罔象廣成契之於杳冥顏回坐忘以大通莊生相天而能精歷衆聖以稽德非智謀之是營蓋水息瀾而映徹塵不止而鑒明未違世以高舉亦方寸之所寧故能泊然而常處感通而斯出不光而曜不祕而密冥始終而誰異與萬物其為一因而靡得是以罔失誠踵武於坦塗可常保於元吉若棄中而務表乃微往而不窒其故何哉水積而龍蟠林豐而獸居神棲於空洞道集於元虛苟不刳其所有焉能契其所無非夫忘形靜寂瑕滓鏡滌元關自朗幽鍵已闢曷可度於無纍焉不然安得駕八景升九霄覩金闕之煌煌步紫庭之寥寥同浩劫之罔極以萬椿為一朝豫心於是釋然於衆慮凝淡於前豫澄之而徐清用之而不遽致謝於目曰幸我以善道宏我以至言覺我以大夢啓我以重元升我以真階納我以妙門縱我於廣漠之野遊我於無窮之源既匪㣥而匪獨亦奚靜而奚喧協至樂之恆適抱真精而永存遣之而無遣深之而又深通乎造化之祖達乎乾坤之心使我空欲視於目盲之外塞將見於元黃之林覩有而如見空寂聞韶而若聽谷音與自然而作侶將無欲以為朋免驅馳於帝主保後天之所能窒欲於未兆解紛於未擾忘天壤之為大忽秋毫之為小處寂寞而聞和潛混溟而見曉應物於循環含光而閉關飄風震海迅雷破山滔天焚澤而我自間彼行止與語默曾何庸思於其間哉夫人生成分一愛而為身稟一國之象有愛存之有神居之然後安焉身者道之器也知之修煉謂之聖人奈何人得神而不能守之人得愛而不能採之人得精而不能反之已自投逝何得怨天地而不祐按黃帝書云人因積愛以生身留胎止精可長存天年之壽昭昭著矣抱朴子曰自古人移遺却妻今世人移遺却身何也謂不解反精採愛故遺也且一陰一陽天地之道男不可無婦女不可無夫男女陰陽皆合大道不節則失理亡形沈骸且據老君祕旨內外黃庭上清禁訣玉函隱書黃帝赤文沖和子真訣灼然有陰陽之道昭矣祕旨曰吾不敢為主復為客慎勿臨高自投擲促存內想閉諸隙正臥垂囊兼偃脊四合五合道自融吸精吐愛微將通裊裊靈柯不復空時時玉壘補前功補之之道將如何元牝之門通且和泝流百脈填血腦夫妻俱仙此其道欲求長生壽無極陰戶開時別消息又按太陽子谷陰女曰我行青龍與白虎彼行朱雀及騰蛇東九西七南三北五中居一反精採愛而補我身虛入實出甄我藏府即可壽無涯矣陰符經曰經冬之草覆之不死露之見傷火生於木禍發必剋精生於身精竭而死人之愛與精神易濁而難清易暗而難明知之修鍊實得長生豈不見鯨魚失水被螻蟻之所食人不守神被蟲蛆之所潰得道者魚常遊於澤則不涸人若常固於愛則不死矣人皆好長生而不知有益精易形人皆畏其死而不知有守神固愛能依此者子無喪父之憂弟無哭兄之患則不可握無形之風捕無見之物天年之壽自然而留矣曰道至無而生天地者也天動也而北辰不移含虛不虧焉地靜也而東流不輟興雲不竭焉故靜者天地之心也動者天地之氣也心靜氣動所以覆載而不極歟通乎道者心寧以同於道氣運以存其形不為物之所誘是之謂至靜者也本無神也虛極而神自生本無氣也神運而氣自化氣本無質凝委以成形形本無情動用以虧性故生我者道也滅我者情也情亡則性全性全則形全形全則氣全氣全則神全神全則道全道全則神王神王則氣靈氣靈則神超神超則性徹性徹則反覆通流與道為一可使有為無實為虛與造物者為儔矣道不欲有心有心則真氣不集不欲苦志若志則客邪來舍在於平和恬淡澄靜精微虛明含元有感必應應而勿取真偽斯分矣故我心不傾則物無不正動念有屬則無物不邪邪正之來在我而已惟鍊凡至於仙煉仙至於真煉真合於妙合妙同乎神神與道合即道為我身所以升玉京遊金闕能有能無不終不歿矣宗元子曰吾嘗謂神仙有可學之理焉夫有不學而自至者稟異氣也必學而後成者功業充也學而不得者初勤終怠也故遠於仙者近於仙者各有七焉形氣為性之府形氣毀則性無所存性無所存則我何有此遠於仙者一也或謂仙必有限歸於淪墜此遠於仙者二也或謂形體以敗散為期營魄以更生為用安知入造化之洪爐任陰陽之鼓鑄此遠於仙者三也或謂軒冕為得意功名為不朽悅色耽聲豐衣厚味此遠於仙者四也強盛之時為情愛所役及斑白之後習學始萌而傷殘未補竊慕道之名乖契真之實此遠於仙者五也汲汲於爐火孜孜於草木此遠於仙者六也動違科禁靜無修習此遠於仙者七也若夫耽元虛寡嗜欲體含至靜以無為為事此近於仙者一也翦陰賊植陰德懲忿損欲齊毀譽修清真此近於仙者二也身居祿位心遊道德仁慈恭和宏施博愛此近於仙者三也爵之不從祿之不愛恬然以攝生為務此近於仙者四也靜以安身和以養神精以致真此近於仙者五也失於壯齒收之晚節以功補過以正易邪惟精惟微積以成著此近於仙者六也忠孝清廉不待學而自得謂之隱景潛化死而不亡此近於仙者七也取七近放七遠是為援陷區出溺塗者也道德者天地之祖天地者萬物之父帝王者三才之主然則道德天地帝王一也而有今古澆淳之異堯桀治亂之殊者何也夫道德無興衰人倫有否泰古今無變易性情有推遷故運將泰也則至陽真精降而為主賢良輔而姦邪伏矣時將否也則太陰純精升而為君姦邪弼而賢良隱矣天地之道陰陽之數故有治亂之殊也所以古淳而今澆者亦猶人幼愚而長慧也嬰兒未孩則上古之含純粹也漸有所辨則中古之尚仁義也成童可學則下古之崇禮智也壯齒多欲則季世之競浮偽也變化之理時俗之宜故有澆淳之異也核其所以原其所由子以習學而性移人以隨時而朴散雖然父不可不教於子君不可不理於人教子在乎義方治人在乎道德義方失則師友不可訓道德喪則禮樂不能理雖加以刑罰益以鞭楚難制於姦臣賊子矣是以示童蒙以無誑則保於忠信化時俗以純素則安於天和故非執道德以撫人者未聞其至理者也道者何也虛無之系造化之根神明之本天地之源其大無外其微無內浩曠無端杳冥無對至幽靡察而大明垂光至靜無心而品物有方混漠無形寂寥無聲萬象以之生五音以之成生者有極成者必虧生生成成今古不移此之謂道也德者何也天地所稟陰陽所資經以五行緯以四時牧之以君訓之以師幽明動植咸暢其宜澤流無窮㣥生不知藉其功惠加無極百姓不知賴其力此之謂德也然則通而生之之謂道道固無名焉畜而成之之謂德德固無稱焉嘗試論之天地人物靈仙鬼神非道無以生非德無以成生者不知其始成者不見其終探奧索隱莫窺其宗入有之末出無之先莫究其眹謂之自然自然者道德之常天地之綱也或問曰物自道生道無棄物何獨得道者靈長失道者滅亡乎愚應之曰夫龍之與魚同育於水明之與暗俱生於道龍則興雲施雨出有入無魚則在藻而樂失泉而枯龍則得水之妙而能化於水魚不得水之妙而不能化於水也上士則棲神鍊氣逸於霄漢之上下士則伐壽損性淪乎幽壤之下上士得道之妙而能化於道下士不得道之妙而不能化於道也故魚不知水之生乎已而棄之非水之棄魚也人不知道之生乎已而棄之非道之棄人也或曰龍魚異質明暗殊稟安能使魚化於水凡化於道也愚答曰魚龍潛淵深匿幽穴不貪餌及其大也即奮鱗激鬣超呂梁而為龍矣人能遊空洞息淡泊絶嗜欲及其至也即合微契虛蹈真境而為仙矣所恨藏身不密保神不固水之與道豈負魚之與人哉或問曰古之學仙者至多而得道者至少何也愚應之曰常人千而知道者一知道者千而志道者一志道者千而專精者一專精者千而勤久者一是學者衆而成者也寡也若知道者能立志立志者能絶俗絶俗者能專精專精者能勤久未有學而不得者也曰然則理世者絶望於神仙乎曰不然若特稟真氣大庇㣥生者則無妨於理世又何損焉若中人好道志慕輕舉必藉間曠故太昊襲氣母軒轅升雲軿顓頊處元宮文命遊紫府斯皆撫俗而得道者也若乃元元寄柱史南華從漆園王喬涖葉縣方朔登金門此亦佐時而得道者也又仙欲隱密道貴無名或昭其蹤或祕其迹不可以一途而察不可以一理而推案真誥及抱朴子元始上仙記咸云自古至忠至孝至貞至廉有大功及物者皆有所得不同常流堯舜伊呂昔諸聖賢皆上擢仙職斯所謂死而不亡者壽闕白華自以隨世畏死而希仙沒為靈官其骨不朽巧充之後靈肉附骸返魂還形倏忽輕舉若爾者則片善不失而况專以神仙為務者乎或問曰人情之所至愛者皆道家之所至忌何也愚應之曰福與壽人之所好禍與妖人之所惡不知至愛者招禍致妖無欲者介福永壽而過求自害何速之甚乎且燕趙豔色性之冤也鄭衛淫聲神之喧也珍饌旨酒心之昏也縉紳紱冕體之煩也此四者捨之則靜取之則擾忘之則壽耽之則夭故為道家之至忌也先生姓陸諱修靜吳興東遷人也代為著姓舊史詳之先生道與真氣天挺靈骨幼含雅性長絶塵滓雖博通墳籍旁究象緯以為鍊形契道與天地長久者非經術占候之所能致故存而不論乃研精玉書稽仙聖奧旨知羽化在我道不吾欺遂勤而行之不捨寤寐聞異人所在不遠千里而造之果遇其真爰受祕訣乃雲棲荊岫却粒修行雖身隱彌靜而名逃益彰江漢之人虛往實歸者莫知紀極元嘉末因市藥京邑文皇帝聞之使大臣宣旨固請先生確乎不拔遽有太初之難或推獨見之明遂拂衣南遊遐討絶境志悅廬嶽乃卜其陽衆峯干霄飛流注壑窈窕幽藹宜其為至人之所止焉先生方絃琴以樂元和覃思以運正氣佇功充而道叶聊駕景以高舉屬世宗明帝欲播元風於無垠導蒼生以敦朴非至德之士則莫能獎而成之素欽先生之風乃備徵求之禮至於再至於三先生秉操逾堅因辭以疾天子側席意厚理無推謝遂恭承詔命降迹城闕亦既見止帝心則愈於是順風問道抗對窮理千古疑滯一朝冰釋乃築先生之館於外俾朝野有宗師焉時司徒袁公北面請益先生指邪以明正循派以示源由是翕然一變頽俗矣明年天子不豫詔先生為塗炭之齋是夜靈壇之間卿雲紛郁翌日疾瘳蓋精神所致初先生登車之日有熊虎猿鳥之屬悲鳴擁路出山而止其忘情感物有如此者先是洞元之部真偽混淆先生刊而正之涇渭乃判故齋戒儀範為將來典式焉初桂陽王橫逆暴骨蔽野先生悉具棺櫬收而葬之立德施仁皆此類也雖迹寓塵躅而心遊象外為迫恩命有違宿志逮元徽五年春正月謂門人曰吾將還舊山可飾裝整駕弟子僉怪詔命未許而有斯言至三月二日乃偃然解化膚色暉爍目瞳朗映但聞清香惟不息而已化後三日廬山諸徒咸見先生霓旌紛然還止舊宇斯須不知所在相與驚而異之顧命盛以布囊投所在崖谷門人不忍遂奉還廬山春秋七十有二所謂鍊形幽壤騰景太微者也凡著述論議百有餘篇並行於代有詔以先生之居為寂觀諡曰寂先生果有道也天寶末筠與友人荀太象避地茲境敬先生之洞府慕先生之高風感世祀之綿遠慨銘志之湮滅乃與道士吳太清宋沖虛詢謀僉同建此貞石其詞曰猗先生本天真蘊至妙懷深仁知名疏悟體親忽榮祿辭囂塵餐霞景甘隱淪道彌高聲益振不得已登蒲輪揚元風還紫宸功允著德惟新忽解形為帝賓仙道密難昭陳紀遺烈庶不湮大唐上元二年歲次辛丑九月十三日中嶽道士翰林供奉吳筠撰
