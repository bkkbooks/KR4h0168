front:
  text: 全唐文欽定全唐文卷一百三十四孝通武德中官通直郎太史丞
  hash: sha256:35b66ec9cf6e9d9efac36af79c375baed782b9d4997f367e1a0356e577cfcf2e
  markers:
  - {type: head, offset: 14, content: 王孝通, id: KR4h0168_NFKB_134-h1, level: 1}
body:
  text: 臣孝通言臣聞九疇載敘紀法著於彞倫六藝成功數術參於造化夫為君上者司牧黔首布神道而設教采能事而經綸盡性窮源莫重於算昔周公制禮有九數之名竊尋九數即九章是也其理幽而微其形祕而約重勺聊用測海寸木可以量天非宇宙之至精其孰能與於此者漢代張蒼刪補殘缺校其條目頗與古術不同魏朝劉徽篤好斯言博綜纖隱更為之注徽思極毫芒觸類增長乃造重差之法列於終篇雖未即為司南然亦一時獨步自茲厥後不繼前蹤賀循徐嶽之徒王彪甄鸞之輩會通之數無聞焉耳但舊經殘駮尚有缺漏自劉巳下更不足言其祖暅之綴術時人稱之精妙曾不覺方邑進行之術全錯不通芻亭方亭之問於理未盡臣今更作新術於此附伸臣長自閭閻少小學算鐫磨愚鈍迄將皓首鑽尋祕奧曲盡無遺代乏知音終成寡和伏蒙聖朝收拾用臣為太史丞比年巳來奉敕校勘傅仁均歷凡駮正術錯三十餘道即付太史施行伏尋九章商功篇有平地役功受袤之術至於上寬下狹前高後卑正經之內闕而不論致使今代之人不達深理就平正之間同欹邪之用斯乃圓孔方枘如何可安臣晝思夜想臨書浩歎恐一旦瞑目將來莫覩遂於平地之餘續狹斜之法凡二十術名曰緝古請訪能算之人考論得失如有排其一字臣欲謝以千金輕用陳聞伏深戰悚謹言案堯典云日短星昴以正仲冬孔氏云七宿畢見舉中者言耳是知中星無定故互舉一分兩至之星以為成驗也昴西方處中之宿虛為北方居中之星一分各舉中者即餘六星可知若乃仲春舉鳥仲夏舉火此一至一分又舉七星之體則餘二方可見今仁均專守昴中而為定朔執文害意不亦謬乎又案月令仲冬昏在東壁明知昴中則非常準若言陶唐之代定是昴中後代漸差遂至東壁然則堯前七千餘載冬至之日即便合翼中逾遠彌卻尤成不隱且今驗東壁昏中日體在斗十有三度若昏於翼中日應在井十有三度夫井極北去人最近而斗極南去人最遠在井則大熱在斗乃大寒然堯前冬至即應翻熱及於夏至便應反寒四時倒錯寒暑易位以理推尋必不然矣又鄭康成博達之士也對弟子孫皓云日永星火只是大火之次二十度有其中者非謂心之火星也實正中也又平朔定朔舊有二家平望定望由來兩術然三大三小是定朔定望之法一大一小是平朔平望之義且日月之行有遲有疾每月一相及謂之合會故晦朔無定由人消息若定大小合朔者合會雖定而蔀元紀首三端並失若上合履端之始下得歸餘於終合會時有進退履端又皆允協則甲辰元歷為通術矣子良吳人武德時官右衛率府長史為隱太子學士貞觀六年卒臣聞孝愛資於事父忠敬盡於事君淑慎爾儀不愆於位聿修厥德無忝所生苟虧格言必貽明罰竊見某甲出自庸微素無才術幸以運逢義始早預周行佐命之勞巳酬爵土攀附之寵復典樞機擢自芻蕘功歸聖德昔晉榮八座蔡謨始漸斯官漢貴五曹鄭均才沾此秩況某方圓無取叨據非宜而覆餗之譏於焉巳及欹器之戒如何遂盈不能翼翼在公兢兢從政及復入朝散誕無鞠躬之容陪軒慢懈乏虔恭之禮有一於此身名何置臣雖凡品職當糾察既覩相鼠之儀敢忘逐雀之志若斯風不黜方紊大猷宜正刑書以彰朝典請以某見事付大理治罪謹言大唐相國録事參軍正議大夫壽光縣開國公王季卿頓首頓首致書隋季將軍王仁壽足下夫機者動之微吉凶之先見也君子見幾而作不俟終日故能轉禍為福改敗成功斯乃非常之人能立非常之事信乎此説實有由焉比以隋政失馭主上昏狂或東討勾麗填尸滿海或西征且末暴骨成山法令滋章賦役殷重金玉窮於玩服民力盡於池臺飢饉於是荐臻盜賊為之蜂起四海鼎沸天下嗷然生民塗炭萬無一在此固將軍之所知也豈待繁述哉固知長惡不悛禍盈必滅否終則泰理數皎然當今相王啓聖應天順民龍飛受圖神武作宰撥亂反正大拯黎元四海於是來蘇九服所以款附如圭如璋之士踵武雲屯如熊如羆之臣排肩霧合伊呂之儔也韓彭之徒歟莫不咸騁藝能同申智勇共為表裏造我國家元首明哉股肱良哉濟濟巍巍無能名也將軍外氏宋國公昔在隋朝功深佐命聲侔衛霍道亞蕭曹本以無辜枉被誅戮悲戚行路痛結於天而況渭陽之情切於恆品相王志存追遠愍彼冤魂乃贈光祿大夫揚州總管宋國公可謂封比干之墓式商容之閭以古謂今足為連類其子懷廓今任光祿大夫相府禮曹參軍次子渠師相府賓曹參軍為王爪牙早樹勳績巳雪冤恥彌暢昊天將軍甥也聞之豈不欣感但季卿之與將軍忝是宗友義同昆弟結髮投分彈冠比肩俱侍龍樓預陪鶴籥屬時君道喪天下崩淪衆叛親離莫有固志欲效嵇紹之忠殞身無益空軫袁安之歎流涕何言時事巳闌智愚同見今承將軍擁兵雲夢建斾荊門水淹既多疫癘愈甚人無半菽師老則離何不以順天時早圖富貴爰率所部歸我霸朝享榮祿於子孫書功名於竹帛趨履南宮之上徐輪北闕之下鳴鐘列鼎珮玉摐金豈不懋歟豈不盛歟時者難值而易失機者在速而不遲成敗須臾實由反掌但季卿仰與疇昔交情不疏輒託雲禽遠披尺素心瞻目擊請不遲疑願保垂堂自求多福季夏炎盛體力何如願恆勝納遠總戎旅不乃勞神季卿疾弊承乏使蜀尋望入朝冀即來儀咨覯在近無任傾仰謹奉尺書投筆澘然此不多具王季卿呈蓋聞宣尼入夢十翼之理克彰伯陽出關二篇之義爰著或鉤深繫象或探賾希夷名言之所不宣陰陽之所不測猶能彌綸天地包括鬼神道無洽於大千言未超於域內況乎法身圓寂妙出有無至理凝元迹泯真俗體絶三相纍盡七生無心即心非色為色無心即心故能心斯心矣非色為色故能色斯色矣藤蛇於是併空形名所以俱寂筌蹄之外豈可言乎若夫西伯拘羑遂顯精微子長蠶室卒成先志故易曰古之作易者其有憂乎論之興焉良有以矣法師俗姓陳氏漢太邱長仲弓之後也遠祖宦遊播遷江左近因江寓又處襄州隋世入關從師請業玉移荊岫皎潔之性彌彰桂徙幽林芬芳之風更遠法師應真人之祥稟黃裳之吉內該三藏外綜九流既善緣情尤工體物篇章婉麗理致遒華郁郁間縟錦之文飄飄竦淩雲之氣班賈金玉未可同年潘陸江海寧堪方駕至如莊生墨生之學黃子老子之書三清三洞之文九府九仙之籙登真隱決之祕靈寶度命之儀吞若胸中説猶指掌加以舊習中觀少蘊法華既有聞持比專著述運思之外汲引無疲辨中觀則龍樹可期談自然則老莊非遠於是四方雜沓如歸長者之園七貴紛綸若赴華陰之市固以學侔安遠才邁肇生實開士之棟梁法城之牆塹者也乃有道士李仲卿劉進喜等並作庸文謗毀正法在俗人士或生邪信法師愍其盲瞽恐入泥犂爰發大悲遂致斯論可謂鼓茲法海振彼詞峯碧雞之鋭競馳黃馬之駿爭騖莫不葉墜柯摧雲銷霧捲狀鴻爐之焚纖羽猶炎景之鑠輕冰負勝之儔於斯可見暫歸慈定巳破魔軍聊奮慧刀即降愚賊佛日於是重暉法雲由其廣被然法師所作詩賦啓頌碑誄章表大乘教法及破邪論等三十餘卷在世久傳然此論凡八卷十二篇二百餘紙窮釋老之教源極品藻之名理修述多年仍未流布昔秦孝公聽説帝而寐聞談霸而興陽春和寡深可悲歎但法師所述內外兼該恐好事後生致有未喻弟子穎川陳子良近伸頂禮從而問津爛然溢目若明月之入懷寂乎應機譬寶珠之矚物既悟四衢之幻便息百城之遊於是啓所未聞聊為注解庶將來同好幸詳其致焉蕭平仲字某蘭陵人也梁文皇帝之元孫鄱陽王之曾孫也鄱陽嗣王之孫定襄侯之第五子也派清瀾於天潢分喬枝於若木君降生昴宿挺質圭璋孝友溫恭仁慈亮直其形曲而雅其神俊而明耽思㣥書研精衆藝盡人間之能事極天下之奇才江淮貴遊獨稱領袖故可以坐覿羔鴈俯拾朱紫至如南山為志不能北面事人詩書自娛恥與絳灌等列洎有陳失馭西遷於隋而兄弟十人白眉斯在唐棣之詠事等薑肱君子義之高其行也屬皇期有道咸序搢紳乃拜吏部員外郎東宮學士冀州司法參軍禮部員外郎新城郡東曹掾從班列也君蒞政能官咸熙庶績所在遺愛置言成範至如纓紱之士草萊之客莫不聆嘉聲而雲萃餐德音而風趨李膺曩號楷模王商昔稱賢智方之蔑如也適應入踐常伯超補台司如何靈祇殲我明哲春秋五十有五大業九年二月十五日卒於新城郡之官舍於戲哀哉余與夫子頗有親連少敦莫逆既同羇旅彌篤綢繆非無陸機之書尚有鍾儀之操誰謂吉士奄逐隙駒嗟乎盛年何晚促之如此也於戲哀哉昔之絶絃軫歎當笛傷心余雖謝古人寧不悽慟是知身歿名存實由著述況復故人景行何能泯之敢以聞見乃作誄曰於戲哀哉粵若高祖大造惟梁德侔五帝道冠百王赤眉作梗黃屋云亡有媯之後應運遐昌君之顯考恥為委質在行既高居賓坦逸篤生夫子如披雲日儀形信典聲名本實神機電舉雅調風生還同照乘有類連城學逾班固才冠劉楨金湯失險天厭有陳幸逢隋德預沐堯民青蓋西度紫氣東淪依依去楚悽悽入秦梁亳之郊忽傾風樹結廬狎鳥穿池憑霧兄弟十人義聲咸布爰降綸紱特預銓衡龍樓振藻司寇馳名俄居郎署升朝擅美含香趨奏事禮承祀抑抑威儀彬彬文史涪水既臨郪城是面視民如傷事心惟戰周震善政潘嶽能官企彼前哲顧巳非難余之室人君之從妹加以篤頗蒙提誨銘之在心沒齒唯佩契濶關隴連翩冀代余任主簿眉山之川亟會琴臺兼遇名賢花朝月夜置酒題篇近之新城暫申纍日謂君積善永保元吉不言別後忽嬰斯疾如何清輝奄辭蘭室於戲哀哉承諱驚惶聞喪慟泣前悲未盡後哀仍集白馬不追素車安及悲人世兮太促歎死生兮異路元壤冥兮難窮黃泉寂兮易暮客位空而聚塵書臺掩而生蠧嗟古人兮神交念往哲兮虛通淚有竭兮心尚惑聲有止而哀無窮宿草衰兮凝秋露白楊慘兮生悲風痛遊魂兮安在徒釃酒兮招空於戲哀哉昔聞子路雄烈赴難如歸先軫忠貞雖死無悔故能貽芳塵於後世徇節義於遐年況乎勇嗣前修功深曩代者豈可使身名頓滅典籍無聞悲夫余弟少府則其人也弟名子幹字元楨梁右將軍信義太守之孫陳晉安王府咨議吳平侯之第三子也惟元楨稟質純和天挺聰俊生知孝悌早擅雄才屬金陵亂離王室板蕩人倫東喪禮樂西歸洎於一門同遷灞岸是則開皇九年之四月也家君有鍾儀之操懷敬仲之心遂屏迹杜門茹憂成疾忽悲風樹痛深陟岵其時余年十九爾始八歲伶仃辛苦實迫飢寒青門乏種瓜之田白社無容身之地一釜之米巳索一瓢之飲屢空日夕相悲分填溝壑賴余以少遵庭訓夙稟家風曾覽五經頗窺三史追孔融之令範慕張楷之高蹤長安主人儀同郝朔要余入室仍寄廡下遂慕西河搢紳公子負笈雲萃藉此束修方濟糊口幸以爾幼不好弄長實庶幾因茲入學以勤以苦諒非性分何能成立隋齊王禮賢待士沛獻非儔召入平臺悅其篆隸仍題銀榜取埒仲將足稱妙絶見美當世隴西李巨仁才華任俠與余宿素欽其俊乂因妻以女非厥人品孰能致之及爾委質周行策名吏部公卿籍甚士類趨風俄而詔授并州平城縣正是乃深間簿領妙達治方蘊冰蘗而不渝顧松筠而無改屬隋運將謝盜賊公行太上皇於時留守并州龍潛汾水所管州縣咸聽指麾專總兵機式遏寇虐元楨素便弓劒立性雄昭屢翦凶渠頻蒙榮賞凡有草竊咸資決勝以大業十二年八月有賊帥郭六郎將兵三千人來侵縣境元楨受命率徒數百獨飛輕騎手斬十人賊見威雄莫不披靡忽遭流矢斃於陳中春秋三十有一於戲哀哉嗟爾輕生奮不顧命在天胡忍殲我哲人方冀龜文以諧豹變如何馬革遂裹師元於戲哀哉爾從官東西死生契濶與余一別巳逾二紀往聞非命實用痛心愧鶺鴒之在原悲唐棣之先落惜哉同氣冥漠何之於戲哀哉余以貞觀六年二月十日夜於相如縣夢見爾靈仍於夢中共馳哀慟乃涕流於枕悲不自勝嗟乎門祚不昌鍾此衰薄既乏子姪終鮮兄弟顧影煢獨實切肝腸是以結草酬恩魏顆之功無爽出魂屢請蔣濟之子非虛雖生死之或殊諒鬼神之有識不任感愴追誄友于式紀遺塵庶同潘嶽敢詢前典而為誄云猗歟我祖承舜之緒爰從媯汭下居潁汝鳳飛於齊輝映於許宛彼長陵離江而舉攀手桂林篤生翹楚淮海喪亂關河播遷忽傾庭蔭痛結旻天惟我兄弟泣血連翩余雖弱冠爾尚童年立錐無地窺竈無煙余稟家風世敦經史式崇儒教俄而成市衣食是資殷憂備履爾因修學遂能克巳孝敬有裕才華難擬言行無擇自此揚名偏工篆隸獨擅嘉聲爰參選部乃任平城金科是執玉律逾明尤便弓劒本慕忠貞皇上龍潛居汾之汭兵權攸總諸侯是制郭六胸渠稱兵齊衛元楨受律奮威投袂躍馬星奔抽戈電逝斬將搴旗罕當鋒鋭忽中飛鏑在陳而斃於戲哀哉人亡勇敵衆疾英奇況逢亂世功無所施在位非重居名極卑不登廟食虛死何為凡百君子各慎爾儀獨埋元壤誰其賞知空令親友遙哭路歧無復蒲唯餘墨池露團宿草風響松枝山花開落隴月盈虧一朝非命千秋永離於戲哀哉余於縣府春宵獨寐忽覿爾靈夢中相值執手嗚咽共傷憔悴語未及終倏如電駟實感我心寤乃驚悸恍焉如失伏枕流涕曾聞賁父魯侯命志亦承揚贊宋策云記矧伊義勇取埒無愧非余所述誰當在意興言遠感發增情思援翰寫心式旌遺事嗟爾義夫英聲不墜於戲哀哉維大唐貞觀元年歲次丁亥五月壬子朔十六日丁卯相如縣令陳子良謹遣主簿譙悅齎桂醑蘭殽之奠敬祭故文園令司馬公之靈惟君夙敏雅調雍容含章挺生慕藺斯在題橋去蜀仗策入關終倦梁園之遊還悅臨卭之客楊意為之延譽王孫以之開筵彈琴而感文君誦賦而驚漢主金門待制深嗟武騎之輕長門賜金方驗雕龍之重及乎茂陵謝病遊岱無歸空留封禪之書遂感宸衷之悼是知聲名籍甚絶後光前厥迹猶存餘芳無泯豫忝宰茲邑似覿遺塵撫事懷賢實勞寤寐夫遊九原者慕隨會而增悲望魏都者佇侯嬴而顧步抑維往彥差擬其倫緬彼風猷載深長想至於蘋蘩可薦黍稷非馨庶降明靈幸垂嘉祐神其如在希能饗之之松博陵曲阿人隋起居舍人入唐為河中刺史辱書知不降顧歎恨何巳僕幸恃故情庶回高躅豈意康成道重不許太守稱官老萊家居羞與諸侯為友延佇不獲如何如何奇迹獨全幸甚幸甚敬想結廬人境植杖山阿林壑地之所豐煙霞性之所適蔭丹桂藉白茅濁酒一杯清琴數弄誠足樂也此真高士何謂狂生僕憑藉國恩濫尸貴部官守有限就學無因延頸下風我勞何極前因行縣實欲祗尋誠恐燉煌孝廉守琴書而不出酒泉太守列鐘鼓而空還所以遲回遂攬轡也僕雖不敏頗識前言道既知尊榮何足恃豈不能正平公之坐敬養亥唐屈文侯之膝恭師子夏雖齊桓德薄五行無疑眭夸故人一來何損蒙借家禮今見披尋微而精而備誠經傳之典略閨庭之要訓也其喪禮新義頗有所疑謹用條問具如別帖想荒宴之餘為詮釋也遲更知聞杜之松白德紹越州山陰人事竇建德為中書侍郎嘗草檄指斥太宗既克建德執德紹登汜水樓捽殞之夏王敬問唐秦王彼朝發迹太原奄有關內鄭氏光啓伊洛崇建宗社豫則創基燕趙包舉山東鄭國何辜興師致討深懷固存不憚濡足方今千乘雷動萬騎雲屯投石拔距蒙輪擊劒統三燕之義勇驅六齊之雄傑制勍敵如拾遺殄高墉若摧朽鄭都鞠旅誓衆雪讎我師躍馬礪戈克蕩氛祲彼則外無救援內絶軍糧將聽楚歌之聲方見崤陵之哭若能反鄭國之侵地守秦川之舊邦更修前好不乖來請公謹字宏慎魏州繁水人初為王世充洧州長史武德元年以州城歸唐授鄒州別駕纍授左武將軍貞觀中封鄒國公轉襄州都督卒官年三十九贈左驍衛大將軍諡曰襄追封郯國公圖形凌煙閣永徽中又贈荊州都督頡利縱欲肆凶誅害善良昵近小人此主昏於上可取一也別部同羅僕骨回紇延陀之屬皆自立君長圖為反噬此衆叛於下可取二也突利被疑以輕騎免拓設出討衆敗無餘欲谷喪師無託足之地此兵挫將敗可取三也北方霜早藳糧乏絶可取四也頡利疏突厥親諸胡胡性翻覆大軍臨之內必生變可取五也華人在北者甚衆比聞屯聚保據山險王師之出當有應者可取六也雲起京兆萬年人隋大業中官大理司直高祖入關謁見長樂宮授司農卿封陽城縣公官至益州行臺兵部尚書與竇軌有隙被殺國家承喪亂之後百姓流離未蒙安養頻年不熟關內阻飢京邑初平物情未附鼠竊狗盜猶為國憂盩厔司竹餘氛未殄藍田谷口㣥盜實多朝夕伺間極為國害雖京城之內每夜賊發北有師都連結胡寇斯乃國家腹心之疾也捨此不圖而窺兵函洛若師出之後內盜乘虛一旦有變禍將不小臣謂王世充遠隔千里山川懸絶無能為害待有餘力方可討之今內難未弭且宜宏於度外如臣愚見請暫戢兵務穡勸農安人和衆關中小盜自然寧息秦川將卒賈勇有餘三年之後一舉便定今雖欲速臣恐未可彥藻事李密為右長史後從密歸唐公逸氣縱橫鷹揚河朔引蘭山之驍騎驅易水之壯士跨躡燕齊牢籠趙魏好通戎夷聲振華夏昔隗囂之居嚨上非不險也項籍之據彭城非不強也然而援無所恃躬違歷數遂使楚徒歔欷於垓下秦泥不封於函谷故託身得地竇融保西河之功協契非人劉表喪漢南之業魏公英雄電逝類晨風之拂北林率土星奔甚涓流之赴東海今隋主拘囚於世充身制於朱粲白旗之首巳懸烏江之船未艤去月二十日總管兵馬會同黎陽莫不投蓋蒙輪賈勇求敵遠懷歸義分討不庭公能觀火鹿臺枉道垂報或以冀方猶梗願協力齊盟南臨則黃河可清北指則幽雲自捲公之遠度宏規高勳茂績必將俯盼伊呂吞併韓彭自餘碌碌復何足數烽爟尚警干戈未戢想軍旅之事各有司存指蹤之勞無疲於明鏡也內懷悃形於翰墨情之所寄言不能適儉字士廉以字顯渤海草修人隋大業中為治禮郎以事謫朱鳶主簿交址太守邱和署為司法書佐後從和來降官雍州治中太宗踐位纍官吏部尚書加特進同中書門下三品封申國公拜右僕射攝太子少師加開府儀同三司圖形淩煙閣貞觀二十一年卒年七十一贈司徒并州都督諡文獻高宗朝加贈太尉王者以四海為家以萬姓為子公行天下情無獨親元昌苞藏凶惡圖謀逆亂觀其指趣察其心府罪深燕旦釁甚楚英天地之所不容人臣之所切齒五刑不足申其罰九死無以當其愆而陛下情屈至公恩加梟獍欲開疏網漏此鯨鯢臣等有司期不奉制伏願敦帥憲典誅此凶慝順㣥臣之願敓鷹鸇之心則吳楚七君不幽歎於往漢管蔡二叔不沈恨於有周大矣哉文籍之盛也範圍天地幽贊神明用之邦國則百官以乂用之鄉人則萬姓以察非松喬而對振古墐戶牖而覿遐方故先王以之建極聖人以之設教師範百代彌綸四海是以刊之金石與天壤而相弊書之竹素與日月而俱懸者莫尚於此爰自卦起龍圖文成鳥策墳典開其緒邱索導其流虞夏之書猶旭日之始旦殷商之誥若覆簣之為山及曲阜佐周攝政踐祚而又闕里自衛將聖多能損益禮樂極乎天而蟠乎地祖述堯舜繫星辰而振河海郁郁焉鼓王風於九合誾誾焉闢儒門於百代既而雅道雖廢學者未衰挾册如林遂偶縱橫之運懷經成市俄屬坑焚之災下土怨咨上天回眷咸洛基命懸賞而崇儒術曹馬御紀疏爵而啓膠庠人拾青紫家握鉛素求古文於孔壁專門者重闡收竹書於汲冢異説者無遺逮乎有隋失御㣥凶競逐辟雍蔓於荊棘延閣殫於煨燼孟堅九流與川瀆而俱竭宏度四部隨嶽牧而分崩淹中許下博古洽聞之生盡殄散矣蘭臺藏室金玉匱之文咸殘逸矣皇帝仰膺靈命俯叶萌心知周乾坤之表道濟宇宙之外操參伐而清天步橫崑海而紐地維櫜弓矢於靈臺執贄者萬國張禮樂於太室受職者百神蒼旻降祥黔黎禔福置成均之職劉董與馬鄭風馳開崇文之館揚班與潘江霧集搢紳先生聚蠧於內輶軒使者採遺篆於外刊正分其朱紫繕寫埒於邱山外史所未録既盈太常之藏中經所不載盛積祕室之府比夫軒皇宛委穆滿羽陵炎漢之廣內有晉之祕閣何異乎牛宮之水爭浮天於谷王蟻垤之林競拂日於若木也帝聽朝之暇屬意斯文精義窮神微言探賾紆樓船於學海獲十城之珍駐羽蓋於翰林搴三珠之寶以為觀書貴要則十家並馳觀要貴博則七略殊致自非總質文而分其流混古今而共其轍則萬物雖衆可以同類千里雖遙可以同聲然則魏之皇覽登巨川之濫觴梁之遍略標崇山之增構歲月滋多論次逾廣類苑耕録齊玉而並馳要略御覽揚金鑣而繼路雖草創之指義在兼包而編録之內猶多遺闕並未能絶雲而負蒼天杜罻羅之用激水而縱溟海息鈎餌之心帝乃親縈聖情曲留元覽垂權衡以正其失定準繩以矯其違頓天網於蓬萊綱目自舉馳雲車於策府轍迹可尋述作之義坦然筆削之規大備特進尚書右僕射申國公士廉特進鄭國公魏徵中書令駙馬都尉德安郡公楊師道兼中書侍郎江陵縣子岑文本中散大夫守尚書禮部侍郎顏相時中散大夫守國子司業朱子奢給事中許敬宗朝散大夫守國子博士劉伯莊朝散大夫行太常博士呂才祕書丞房元齡朝散大夫行太學博士馬嘉運朝散大夫行起居舍人褚遂良朝議郎守晉王友姚思聰一作廉太子舍人司馬宅相祕書郎宋正跱籠緗素則一字必包舉殘缺則片言靡棄繁而有檢而不失同茲萬頃塍埒自分譬彼百川派流無壅討論歷載琢磨云畢勒成一家名文思博要一百二十帙一千二百卷并目録一十二卷義出六經事兼百氏究帝王之則極聖賢之訓天地之道備矣人神之際在焉昭昭若日月代明於下土離離若星辰錯行於躔次斯固墳素之苑囿文章之江海也是為國者尚其道德為家者尚其變通緯文者尚其溥博諒足以仰觀千古同羲文之爻彖俯觀百王軼姬孔之禮樂豈止刻石漢京懸金秦市比邱明之作傳侔子長之著書而巳哉
