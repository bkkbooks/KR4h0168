body:
  text: 道德清虛元默先帝先為聖則聽之不聞搏之不得至德本無為人中多自惑在洗心而息慮亦知白而守黑百姓日用而不知上士勤行而必克既鼓鑄於乾坤品物信充牣於東西南北三皇高拱兮任以自然五帝垂衣兮修之不忒以心體之者為四海之主以身輓之者為萬夫之特有皓齒青娥者為伐命之斧蘊奇謀廣智者為盜國之賊曾未若軒后順風兮清靜自化曾未若皋陶邁種兮溫恭允塞故可以越圓清方濁兮不始不終何止乎居九流五常兮理家理國豈不聞乎天地非道德也無以清寧豈不聞乎道德於天地也有踰繩墨語不云乎仲尼有言朝聞道夕死可矣所以垂萬古歷百王不敢離之於頃刻懷古今云古今感事傷心驚得喪歎浮沈風驅寒暑川注光陰始衒朱顏麗俄悲白髮侵嗟四豪之不返痛七貴以難尋夸父興懷於落照田文起怨於鳴琴雁足淒凉兮傳恨緒鳳臺寂寞兮有遺音朔漠幽囚兮天長地久瀟湘隔別兮水濶煙深誰能絕聖韜賢餐芝餌术誰能含光遯世鍊石燒金君不見屈大夫紉蘭而發諫君不見賈太傅忌鵩而愁吟君不見四皓避秦峩峩戀商嶺君不見二疏辭漢飄飄歸故林胡為乎冒進貪名踐危途與傾轍胡為乎怙權恃寵顧華飾與雕簪吾所以思抗跡忘機用虛無為師範吾所以思去奢滅慾保道德為規箴不能勞神效蘇子張生兮於時而縱辯不能勞神效楊朱墨翟兮揮涕以沾襟臣某言伏以濜口化者即二十四化之第十八也節應配於小滿列宿應於畢星陳安世白日昇天臺蹤尚在褒女仙乘車得道轍跡猶存每嵗春秋准勅祈醮頃自用軍之後幷已摧殘古殿空壇僅餘基地仙儀像貌盡翳榛蕪往來絕瞻敬之門士庶無依歸之所豈期福地一旦蕭條臣輒備興修願資聖壽伏惟陛下軒帝靈源緱山仙緒繼天御極用道臨民萬方榮廣覆之慈三教被維新之澤芝田柰苑咸荷精嚴古廟儒宮亦蒙繕飾况是長生之教敢申崇葺之儀旋以翦薙蒿萊興營宇室像設免嗟於暴露簪冠克遂於焚修邈彼靈蹤還為勝概香燈有託齋醮無虧兼召道士楊元敬獨孤知元和某等三人就觀居住訖但以荒凉既久門額全無敢祈雨露之恩特飾神仙之境其化伏乞聖慈依濜口舊名仍賜給聖壽額許臣自製造懸挂庶使琅書銀牓長懸日月之輝漢水仙山永祝聖明之壽臣某無任之至臣某言伏奉聖旨與右街威儀何沖徽等二十一人於新殿內修金籙道場七晝夜今月十四日開至二十日散供奉官楊紹業依時設拜言功表贊訖者伏以天贊聖功鼎新大內瑤軒玉砌超三島之鰲宮青瑣丹扉逾九清之鳳闕叶皇居之壯麗覩帝宅之深嚴萬國仰瞻千靈森衞纔畢瓊宮之製先開金籙之壇鋪舒而一一精新祇敬而重重蠲潔龍香上達依稀而萬聖俱臨蟾月低光仿彿而千真入會延洪睿算遐永皇圖近臣拜手以投詞宰輔齋心而瞻祝殊禎允集巨貺無涯隆大寶於千春總八紘於一統臣叨膺科教獲備焚修豐玉饍於天廚躡雲庭於仙境兢榮已極頒錫薦臨伏蒙宣賜襯錢銀器疋段等澤深溟海恩重嵩衡顧慚鷦燕之微何報聖明之獎臣無任之至臣某言伏蒙恩勅除授光祿大夫尚書戶部侍郎上柱國蔡國公廣成先生者睿慈春煦宸翰雲敷叨榮而但覺逾涯荷渥而罔知所措臣某中謝臣聞聖明居上是必授任才能俊乂在官乃貴陳力就列皆以道包經濟言達變通上有致君之能下盡為臣之節處既得地用務適時苟虧利物之期必致取容之誚如臣幽懦榮奉休明循顧庸襟敢臻殊寵伏惟陛下披圖創歷握紀繼天明逾兩曜之懸德合二儀之暜蕩滌氛垢蘇泰寰區功宣而萬有同心化被而八紘繞指夢通巖壑肱股符命說之求景仰煙波輔弼契非熊之兆元勳貞佐捧日扶天人傑時英誕星降嶽青宮翼贊日月重光朱邸忠貞盤維增永臣某江湖賤質簪褐微才為儒既昧於成麟學道甘期於畫虎矧復辭吳嵗久奉聖年深杳無山水之思每感風雲之會歸棲照育三十餘秋施重嵩衡遇深溟渤變枯荄為茂草起敗骨為豐肌徒曰奇功難偕聖獎是以臣俯盈丹懇積感皇慈曉動神魂夜驚形影效報未申於絲髮憂惶空溢於肺肝况復啟運之初垂裳之始錫峒山之美號加北省之華資無以身諭國之譚上裨天聽乏造膝沃心之議仰副宸衷揣身世而榮顯居多於爵位而貪饕已極豈可重塵清級更履殊榮紹碧落之嘉稱集元關而璅質且如漢推倩晉有稚川未聞聯居清重之司再踐非常之秩揣量戰越進退兢榮仰對宸嚴無階陳讓唯虔砥礪久答鴻恩臣不任臣某言伏蒙聖慈以臣每有起居稱賀皆與道眾僧人齊班特降宣旨令臣自今以後獨入引對不隨眾列者禮加異等事越常倫褒稱發自於聖心榮盛獨光於道域隆恩顯示負戴難勝臣某誠榮誠懼頓首頓首伏惟陛下誕睿承天執符御極包乾坤而覆載懸日月以照臨披金鏡之光華無幽不察調玉燭而亭育有物皆春由是露灑天根澤流地表肅武功而定氛祲桀黠悛心修文德而服要荒奸兇革面毳幕穹廬之俗冰居穴處之鄉重趼來庭占風入貢理定而樂作功成而禮行舉三代之頹綱興百王之墜典有沿有革無黨無偏至若㣥后朝元垂衣當宁儼三傑十臣之佐冠非熊審像之賢文物羽儀輝今映古其或雲衫羽服仰丹階而効嵩呼白足方袍列彤庭而申華祝此時微臣常依旅進得面雲階每驚巖壑之微獲在煙霄之上今則逈隆睿獎頓革前儀念臣雖迹預簪冠而身叨爵秩清級纔移於北省華資又接於南曹特令敷奏之時不雜緇黃之侶俾其獨引顯示優恩昔者魏重謙之梁尊貞白漢稱曼倩秦有子平禮容靡覩於新規朝揖皆循於常度今自降九天之明命垂萬世之宏規退省幽孱但切淩兢之感顧慙纖弱何勝雨露之恩惟勵丹誠永酬鴻澤臣某無任之至臣某言伏蒙聖慈特降宣旨賜臣不隨二教獨引對敭以臣謝恩表宣付史館者迥自宸衷光申異禮仍編信史永戴優恩祇荷難任寵榮增極臣某中謝伏惟陛下大明御歷至聖宣功廓覆載以覃恩竝曦舒而流照賢良入輔庭多命世之臣夷夏歸仁府積殊方之貢有俗皆臻於富壽無為欲蹈於華胥由是蓬島芝宮咸加炳煥祇林柰苑畢集精嚴四靈挺質以呈休六氣調時而表貺元儒鼎盛緇褐同歡臣猥以常倫榮逢景運道籍兩塵於美號官榮再履於崇班別顯殊恩賜其獨對緇黃班裏受宣而徑入雲天鵷鷺庭中顧影而疑生羽翼今則寵編國史昭示寰區迥隆非次之遷永載不刊之典荒愚有素難勝雨露之恩蕭芥至微何報乾坤之德惟虔修勵上答聖明臣不任臣某伏覩鴻臚卿趙溫珪奏今月二十三日皇帝駕幸得賢樓看閱將士皇太子自城南閱馬帳頭迴入城至酉時城上有黃雲兩片狀如華葢逡巡變為紫色者臣謹按堯之誕生常有黃雲垂覆舜之御宇常有黃雲凝空又漢宣帝幸甘泉宮紫雲入殿宋世祖踐祚紫雲見於端門黃帝有瑞雲以雲紀官今者德動天休瑞呈雲物華夷共仰海嶽同歡臣某中賀伏惟陛下體道握符惟天縱聖仁周動植惠暜寰瀛柔遠俗以文明懾兇奴以武畧蓋以中原未泰品物未寧將申戡靜之機用拯生靈之弊授律則南摧醜蜑鑿門則北掃煙埃鐵軸牙檣水輝龍驤之旅霜戈雪㦸陸陳隼擊之師振動山川奔驅雷電佇聞恢拓以廓乾坤爰命皇太子訓整六軍申明三令蒙輪挾輈之士壯氣淩空拔山扛鼎之夫雄心貫日皆堅金石咸勵忠貞允合天心果昭靈貺輪囷對起蕭索齊凝成金柯玉葉之奇高浮帝座變紫葢如葩之狀低接皇城初呈蔭鼎之姿漸結臨關之色有以見圓穹贊祐皇德升聞越唐堯虞舜之徵超宋祖漢宣之感自此率賓八極同軌萬方增聖壽於億千固宏基於隆永臣躬深睿奬謺覩殊祥敢謠詠以抒情誠効謳歌而頌聖德詩一首陳進伏覩嚴道縣多功團崇善里百姓李彥韜於楠樹上獲白鵲進獻者五行表瑞見金運之隆昌百辟同瞻賀玉京之貽貺臣某中賀臣聞王者正名立訓體乎天意勝殘去殺慰此人心則有異木珍禽來儀朝闕霜毫動色紺趾標奇斂羽呈姿應見徒誇於漢魏傳聲送喜翱翔顯奉於皇明伏惟陛下瑞冠百王功超三古協序而風調禹律燭昏而鏡滿軒臺亭毒萬方再樹乾坤之本照臨下土重懸日月之光鄙炎漢之息肩邁唐堯之鼓腹人歌嵗稔物賴時康况乃萬旅貔貅千營鎧甲擒兇翦弊撫弱字孤雷掀鉦鼓之行雲黯旌旗之舉發令而雄豪踴躍申恩而疲瘵昭蘇五星運度以垂休八海承風而寢浪遂至山河効祉禽羽呈祥遠離海上之巢來對雲中之闕觀其玉籠乍啟雪姿不驚望聖苑以迴翔對天慈而鼓舞往來瑤陛棲泊珠簾認素羽以難分聽新聲而已熟不是成橋之侶殊非繞樹之㣥既彰團雪之容實煥來金之盛佇見干戈載止奸邪屏除蕩疆場之煙烽永歸北極靜寰區之榛梗自我西方信超魏德之雄更掩漢成之代臣獲逢昌運累覩殊祥輒陳歌頌之詞上免聖明之鑒臣謹課頌聖德紀瑞詩一首陳進干凟冕旒無任之至臣某伏覩天貞軍留後崔善進射洪縣百姓王友田上嘉禾合穗圖者聖德遐通祥符謺至文武瞻覩中外歡呼臣某謹按瑞圖云嘉禾者美瑞也稔嵗精王者德至於土則二苗同秀昔者唐叔得禾異畝同穎成王問周公曰二禾一穗意天下和同乎王命唐叔作嘉禾篇由是九土會同八紘歸化旅獒西貢越雉南來三十世之宏基七百年之大業輝前映古逾夏掩商今在聖明復彰斯瑞伏惟陛下紹軒皇之聖緒承周帝之洪源應歷數以配天總華夏而類帝惟恭惟儉絕嗜音酣酒之娛乃聖乃神有明目達聰之美宏武德而先懲不軌電掃奸妖播文風而旋撫戎羌雲奔琛賮憂勤黎獻軫憫耕農嵗致豐穰田無炎潦德通於地見共秀於二苗應達乎天果異畝而同穎契聖祖興周之瑞表吾君拓土之徵昔則合天地為一同今則包萬方為一統况屬王師薄伐誓眾弔民雄稜已懾於彼方禎異先呈於近境佇觀收剋永蕩氛霾開九天日月之光顯符周卜合四海生靈之望同比唐禾臣竊仰瑞圖賡歌聖德願預採詩之錄思陪唐叔之篇謹課頌聖德嘉禾合穗詩一首進上臣某伏覩宣旨駕幸北路軍前者臣聞展義巡功禮經垂典誅兇伐叛有國通儀蓋欲迴廣照於一方輯五瑞於㣥后翦其暴亂慰彼蒸黎况蠢爾邠岐久迷大順匪朝伊夕即覩殄平不足以親駕戎車遠臨狡穴依依眾懇僉用驚疑伏惟陛下逾舜文明超周神武稟秋霜之令敷春育之恩委以至公推其大信覆載之內風偃化行而隴渭之鄉岍岐之俗甘寒谷之氣自棄陽和息惡木之陰顯孤臨照恃蟻封而稱固巢燕幙以偷安今則上將專征雄師薄伐遠憑聖算必剗根荄竊惟漢曲褒川方當寒沍霜雪嶮棧豈易躋登况射鮒穿蠅詎用千鈞之弩孤城荒堞寧煩萬乘之威伏乞聖慈俯徇㣥心特寢成命佇觀剋捷永統華夷干冒宸嚴無任戰越兢懼迫切屏營之至謹詣閣門奉表陳請以聞臣某伏覩宣旨駕幸北路軍前皇太子宰臣百官等上表陳請未賜俞允者省訪風俗雖經典之舊儀慰撫師徒乃君父之慈照但以道途險阻水陸嚴凝遐邇㣥心實切憂灼伏惟皇帝陛下體堯慈惠逾舜欽明欲令寰海之人共沐雍熙之化憬茲汧隴密邇封隅久負歡盟深辜恩信識變通者已束身効順迷向背者猶掩耳偷安致一境之生靈銜積年之怨抑徇吠堯而有日思慕舜以無由所以授姜鉞以整師築韓壇而誓眾風馳號令雨驟雄豪上將等威震雷霆心堅鐵石指期剋日必就削平豈勞親駕翠輿躬麾白羽六龍八馬驅馳嶮棧之中萬騎千官迢遞層峯之外方零霜雪漸逼沍寒伏乞聖慈俯聆億兆之情特駐省方之命上為宗社下慰華夷佇對捷書更開土宇臣叨深睿奬倍慊明誠塵免宸嚴不任待責望恩迫切禱祈之至臣某伏覩恩勅宣賜左街興聖觀宏一大師張潛令修葺住持者寵自宸衷榮臻道域簪裳增忭芝术騰輝臣某中謝伏惟陛下道鈞軒后聖竝放勳凝懷於姑射之峯寄夢於華胥之境睠言大教理契生津棲神泯合於無為屬念潛期於有德化合清靜善利家邦觀宇蕭條像設塵翳爰敷綸渥載俾葺崇伏以前建觀地接玉清昔為道學尋改貞元之宇復標紫極之宮至德年中易名興聖前臨廣陌東距錦江宛是靈墟實惟勝所况門庭具設像貌儼存誠歷代之仙蹤乃皇都之福地今則重加繕飾盡撤葷腥拂塵埃於湫隘之中還瞻玉相蕩瓴甓於蒿榛之內別築瑤壇灑雨露而騫樹增榮薦沈麝而睟容伊穆張潛等精專剞劂恪勵住持夕磬晨鐘祝遐長於聖壽朝香暮燭期隆永於皇圖臣某獲列教門躬榮睿澤不任之至臣某伏蒙聖旨宣賜衙殿前點鐘一口於日院內充齋醮扣擊者恩垂霄漢榮及簪裳抃蹈無階輝華增極伏惟陛下二儀覆燾三景照臨澤浸無涯惠敷有截故得八溟息浪長鯨將殄於昌時五緯循常巨彗欲銷於永夕削平夷夏倒戢干戈而復俯軫皇情留慈元教致感應於洞府符應見於靈仙固當齊聖壽於日月星辰隆寶祚於乾坤海嶽今者念臣院宇之內簨簴未全每於齋醮之辰尚闕舂容之響既乏通真之器莫諧集聖之儀輟瑤階泛日之音來從天上頒豐嶺含霜之韻降在人間事超錫樂之榮恩重點鐘之賜永當柱焚芝术禱祝真靈冀啟禎休仰酬聖奬所宣賜鐘臣敬以焚香祇受訖不任臣某言伏奉恩勅宣賜舊玉局洞門石像老君歸龍興觀御容院閣下西間奉安供養其葢石舍一區移拆就觀起立幷賜錢設齋道眾將幡花引歸觀表讚等者皇澤霶臨元門增耀康莊改觀道俗同歡臣某中謝伏惟陛下法道披元垂衣運化暢清靜無為之理敷希夷不宰之功已洽大寧將臻一統以元元像貌密邇宸居雖香燈無曠於常儀而供養合歸於法宇爰申明命豐備齋羞焚蘭术以飄香森幢幡而成列鐃金鳴玉纔離象闕之庭雲邁風行遽入龍興之閣㣥心瞻仰萬象歡隨雷喧讚悅之音霧集聖明之福臣與道眾等獲棲大教謺荷隆恩永勵修持上酬睿奬不任之至臣某伏覩北面軍前隴州節度使桑以手下兵士及城池歸降收復隴州者睿算遐宣元勳效節纔申薄伐已復雄城臣某中賀伏惟陛下聖邁黃軒威超周武運神機於掌內動有成功料勍敵於彀中舉無遺策自岐郊負義關外隳盟深辜敦好之儀遽絕睦鄰之分擁豺狼之一旅恃疆土於三州巢折葦以偷生坐積薪而稱固小不事大春秋所誅所以義士盱衡謀臣扼腕皆期殄掃遂舉戈矛六軍奮躍以爭先八校喑嗚而致勇蹴土佇摧於吳岳飲馬將竭於渭流桑以智合變通心明向背倒戈銜璧効命投誠獻千里之山河不施寸刃復一方之戶口無損秋毫便迴亳社之鋒自收商受之眾想回中之路絕退且無歸顧灞上之讎深竄將奚適料其元醜即見梟擒廣通於八水三山永統於九州四海俱頒舜歷盡入禹封臣獲奉昌期冀觀大捷無任之至臣某伏以皇圖昭永上帝開祥北極瑤樞煥虹光而誕睿中天玉斗飛紫電以凝華萬國歡瞻㣥心增抃伏惟陛下二儀炳靈九清集瑞至化塞乎天地清明肅於鬼神肇三十世之宏基方隆周業興四百年之景運佇越漢圖浸德澤於元儒鼓薰風於夷夏今屬壽春大節祝聖昌辰琛賮雲馳梯航波委咸修芹禮以繼山呼臣與當院道士等虔拂華壇精依祕格諷琅書寶軸披霧韞霜羅克嚴蠲潔之誠永廣乾坤之福鑒聖真人昔師道祖躬受靈篇傳真記於先天緘瓊文於福地豫明皇業洞達元樞嵩公之識神堯貞白之知梁武以之校美詎可同年是敢藻繢縑繒式資瞻仰庶因焚炷克嗣禎休干冒宸嚴臣無任祝聖虔切屏營之至其畫像功德數等謹詣閤門奉進以聞伏聽勅旨臣某伏覩恩勅夔州道士黃萬祐賜紫衣仍師號羅江縣道士鄧百經賜紫衣者大聖御天神功及物庭有賢良之佐野無遺逸之人率土朝宗允當聖日臣某中謝伏以黃萬祐等林泉得志麋鹿為㣥深處巖蘿罔窺名利或丹華救物有迴生駐景之能朱篆誅邪有蕩魅除兇之效皆彰道用潛贊明時遽捧鶴書來朝鳳闕萬祐既趨於錦水百經至自於羅江共仰堯天俱榮舜澤歷觀前史莫得比倫伏惟陛下道邁唐堯功高軒后想汾水凝神之日尚遠九重比峒山請益之辰猶勞載駕今則蒲車允至桂檝云來徑捨煙蘿躬朝旒扆顯封嘉號俱錫服章美輝編光揚簪褐不任之至臣某言伏奉宣旨令臣就內樞密院與宏道大師黃萬祐相見者天慈軫念俯及孱微荷載難勝兢榮增極臣某中謝伏惟陛下化宏有道理尚至仁憂勞暜及於萬方軫念無遺於一物故得眠雲逸士遙馳向闕之心傲世高人盡識朝天之禮宏道大師夙探至術深隱嵌巖名姓可聞儀形莫覩今者爰隨徵詔直詣闕廷捨草帶荷裳寵紫衣師號事光史筆榮耀道門伏蒙聖慈宣命微臣與之相見獲奉睿明之奬得瞻雲鶴之容步武壺夭躋身蓬島祇膺異渥榮耀萬生顧惟鷦鷃之微何報乾坤之德臣某不任右臣伏奉聖旨為皇太子生辰特宣賜莊宅庫錢陸拾貫文省除於北帝院差選道眾二十一人於七月八日開置黃籙道場七晝夜至十五日散齋者伏以紫氣充庭青宮誕睿動歡聲於六合凝喜氣於九重凡在寰區皆虔祝賀伏惟陛下恩周中外念軫臣僚以皇太子素切修行常思儉約懼無名之破費使眾力之煩勞一應諸司欲有齋修竝令止約頒賜內庫錢物特開仙觀壇場祈玉京金闕之真廣宸殿離方之福美高典冊事邁古先臣某獲奉絲綸將申焚祝覩維新之寵澤垂正大之宏規不任抃蹈之至謹錄狀陳賀謹奏
