front:
  text: 全唐文欽定全唐文卷九百二十九光庭字賓至縉雲人一曰長安人咸通中應九經舉不第入天台山學道從僖宗幸興元留蜀事先主為金紫光祿大夫諫議大夫封蔡國公賜號廣成先生遷戶部侍郎後主立授道籙於苑中以為傳真天師崇真館大學士後解官隱青城山號東瀛子年八十五卒
  hash: sha256:47e21bc3ad39ec470d2af56b5466635872d3f36611d8524afb043f5befe22767
