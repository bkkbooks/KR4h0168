front:
  text: 全唐文欽定全唐文卷一百六十九延師高宗朝左衛大將軍
  hash: sha256:f123a5eaae5c9aa1f2b873e733bfdc04b1f7013a2dbc0d5ef09fdde5285f2c9b
  markers:
  - {type: head, offset: 14, content: 張延師, id: KR4h0168_NFKB_169-h1, level: 1}
body:
  text: 竊以老氏元奧發揮衆妙之門釋教凝寂瀟灑出塵之境自夫金容東度真氣西遊挹道希風帛丿糸區浹域聖朝撫運茲道彌隆仁祠法宇麗充都邑寶幢金剎彩絢路衢凡此憑奉庶為資益兼存其教竊謂可通謹議仁傑字懷英並州太原人舉明經授汴州判佐天授二年纍遷至地官侍郎判尚書同鳳閣鸞臺平章事為來俊臣誣搆下獄免死貶彭澤令神功元年擢鸞臺侍郎復同鳳閣鸞臺平章事加銀青光祿大夫武后欲以武三思為太子仁傑切諫請立廬陵王后感悟卒復唐嗣尋拜納言兼右肅政臺御史大夫聖歷三年卒贈文昌右相諡曰文惠中宗反正追贈司空睿宗朝追封梁國公臣欲聞奏似為逆人論理知而不言恐乖陛下存恤之意奏成復毀意不能定此輩非其本心願矜其詿誤臣聞先王疆理天下皆是封域之內制井田出兵賦其有逆命者因而誅焉罪其君弔其人存其社稷不奪其財非欲土地之廣非貪玉帛之貨人有四支者所以扞頭目也君有四方者所以衛中國也然而蝮蛇在手既以斷節全身狠戾一隅亦宜棄之存國漢元帝罷珠崖之郡宣帝棄車師之田非惡多而好少也知難即止是為愛人今以海中分為兩運風波飄蕩沒溺至多準兵計糧猶苦不足且得其地不足以耕織得其人不足以賦稅臣請罷薛訥廢安東鎮三韓君長高氏為其主誠願陛下存亡繼絶之義復其故地此之美名高於堯舜遠矣臣聞天生四夷皆在先王封域之外故東距滄海西隔流沙北橫大漠南阻五嶺此天所以限夷狄而隔中外也自典籍所紀聲教所及三代不能至者國家盡兼之矣此則今日之四境已逾於夏殷者也詩人矜薄伐於太原美化行乎江漢是則前代之遠裔而國家之域中至前漢時胸奴無歲不犯邊殺略吏人後漢則西羌侵軼漢中東寇三輔入河東上黨幾至洛陽由此言之則陛下今日之土宇過於漢朝遠矣若其用武荒外邀功絶域竭府庫之實以爭磽確不毛之地得其人不足以增賦獲其土不足以耕織苟求冠帶遠夷之稱不務固本安人之術此秦皇漢武之所行非二帝三王之事業也若使越荒外以為限窮絶域以騁欲非但不愛人力亦所以失天下之心也昔始皇窮兵極武以求廣地男子不得耕於野女子不得蠶於室長城之下死者如亂麻於是天下潰叛漢武追高皇之宿憤藉四帝之儲實於是定朝鮮討西域平南越擊胸奴府庫空虛盜賊蜂起百姓嫁妻賣子流離於道路者萬計末年覺悟息兵罷役封丞相為富民侯故能為天所佑也昔人有言曰與覆車同軌者未嘗安此言雖小可以喻大近者國家頻歲出師所費滋廣西戍四鎮東戍安東調發日加百姓虛弊開守西域事等石田費用不支有損無益轉輸靡絶杼軸殆空越磧踰海分兵防守行役既久怨曠益多昔詩人云王事靡盬不能藝稷黍豈不懷歸畏此罪罟念彼共人涕零如雨此則前代怨思之詞也上不是恤則政不行而邪氣作邪氣作則蟲螟生而水旱起若此雖禱祀百神不能調陰陽矣方今關東饑饉蜀漢逃亡江淮已南徵求不息人不復業則相率為盜本根一搖憂患不淺其所以然者皆為遠戍方外以竭中國爭蠻貊不毛之地乖子育蒼生之道也昔漢元納賈捐之謀而罷朱崖郡宣帝用魏相之策而棄車師之田豈不欲慕尚虛名蓋憚勞人力也近貞觀年中剋平九姓冊李思摩為可汗使統諸部者蓋以夷狄叛則伐之降則撫之得推亡固存之義無遠戍勞人之役此則近日之令典實綏邊之故事竊見阿史那斛瑟羅陰山貴種代雄沙漠若委之四鎮使統諸蕃封為可汗遣禦寇患則國家有繼絶之美荒外無轉輸之勞如臣所見請捐四鎮以肥中國罷安東以實遼西省軍費於遠方並甲兵於塞上則恆代之鎮重而邊州之備實矣况撫綏夷狄蓋防其越逸苟無侵侮之患則已矣何必窮其窟穴與螻蟻計較長短哉且王者外寧必有內憂蓋為不勤修政故也伏惟陛下棄之度外無以絶域未平為念但當敕邊兵謹守備蓄鋭以待敵待其自至然後擊之此李牧所以制胸奴也當今所要者莫若令邊城警守備遠斥堠聚軍實蓄威武以逸待勞則戰士力倍以主禦客則我得其便堅壁清野則寇無所得自然賊深入必有顛躓之慮淺入必無虜獲之益如此數年可使二虜不擊而服矣臣聞朝廷議者以為契丹作梗始明人之逆順或因迫脅或有願從或受僞官或為招慰或兼外賊或是土人跡雖不同心則無別誠以山東雄猛由來重氣一顧之勢至死不回近緣軍機調發傷重家道悉破或至逃亡拆屋賣田人不為售內顧生計四壁皆空重以官典侵漁因事而起取其髓腦曾無愧心修築城池繕造兵甲州縣役使十倍軍機官司不矜期之必取枷杖之下痛切肌膚事迫情危不修禮義愁苦之地不樂其生有利則歸且圖賒死乃君子之愧辱小人之常行人猶水也壅之則為泉疏之則為川通塞隨流豈有常性借以唐朝為喻殷監不遙河北河南時有恭陵之役主司逼迫切不准程瓦石亂投一時逃散豈不以力窮則怨不畏刑書之至愚皆如此類幸蒙唐朝見捨今為大周淳人向無矜恕之恩安有自新之路昔董卓之亂神器播遷及卓被誅部曲無赦事窮變起毒害生人京室邱墟化為禾黍此由恩不普浹失在機先臣一讀此書未嘗不掩卷歎息今以負罪之人必不在家露宿草行潛竄山澤赦之則出不赦則狂山東㣥盜緣茲聚結臣以邊塵暫起不足為憂中土不安以此為事臣聞持大國者不可以小理事廣澤者不可以細分人主恢宏不拘常法罪之則衆情恐懼恕之則反側自安伏願曲赦河北諸州一無所問自然人神通暢率土歡心諸軍凱旋得無侵擾臣聞為政之本必先人事陛下矜㣥生迷謬溺喪無歸欲令像教兼行覩相生善非為塔廟必欲崇奢豈令僧尼皆須檀施得筏尚捨而况其餘今之伽藍制過宮闕窮奢極壯畫繢盡工寶珠殫於綴飾王褱材竭於輪奐工不使鬼必在役人物不天來終須地出不損百姓將何以求生之有時用之無度編戶所奉恆苦不充痛切肌膚不辭箠楚遊僧一說矯陳禍福翦髮解衣仍慙其少亦有離間骨肉事均路人身自納妻謂無彼我皆託佛法詿誤生人里陌動有經坊闤闠亦立精舍化誘所急切於官徵法事所須嚴於制敕膏腴美業倍取其多水磑莊園數亦非少逃丁避罪併集法門無名之僧凡有幾萬都下檢括已得數千且一夫不耕猶受其弊浮食者衆又劫人財臣每思維實所悲痛往在江表像法盛興梁武文捨施無限及其三淮浪沸五嶺烟騰列剎盈衢無救危亡之禍緇衣蔽路豈有勤王之師比年以來風塵屢擾水旱不節征役稍繁家業先空瘡痍未復時興工役力所未堪伏惟聖朝功德無量何必要營大像而以勞費為名雖斂僧錢百未支一尊容既廣不可露居覆以百層尚憂未遍自餘廊廡不得全無又云不損國財不傷百姓以此事主何謂盡忠臣今思維兼採衆議咸以為如來說法以慈悲為主下濟㣥品應是本心豈欲勞人以存虛飾當今有事邊境未寧宜寬征鎮之徭省不急之費設令雇作皆以利趨既失田時自然棄本今不樹稼來歲必饑役在其中何以取給况無官助義無得成若費官財又盡人力一隅有難將何救之犯顏直諫自古以為難臣以為遇桀紂則難遇堯舜則易夫法不至死而陛下特殺之是法不信於人也人何所措其手足且張釋之有言設有盜長陵一壞土陛下何以處之今以一柏殺二將軍後代謂陛下為何如主矣臣不敢奉詔者恐陷陛下於不道且羞見釋之於地下矣彭澤九縣百姓齊營水田臣方到縣已是秋月百姓囂囂㣥然若歉詢其所自皆云春夏以來並無霖雨救死不蘇營佃失時今已不可改種見在黃老草萊度日旦暮之間全無米粒竊見彭澤地狹山峻無田百姓所營之田一戶不過十畝五畝準例常年縱得全熟納官之外半載無糧今總不收將何活路自春徂夏多莩亡者檢有籍歷大半除名里里鄉鄉班班戶絶如此深弊官吏不敢自裁謹以奏聞伏候敕旨垂拱四年安撫大使狄仁傑檄告西楚霸王項君將校等曰鴻名不可以謬假神器不可以力爭應天者膺樂推之名背時者非見幾之主自祖龍御宇橫噬諸侯任趙高以當軸棄蒙恬而齒劒沙邱作禍於前望夷覆滅於後七廟墮圯萬姓屠原鳥思靜於飛塵魚豈安於沸水赫矣皇漢受命元穹膺赤帝之貞符當四靈之欽運俯張地紐彰鳳紀之祥仰緝天綱鬱龍興之兆而君潛遊澤國嘯聚水鄉矜扛鼎之雄逞拔山之力莫測天符所會不知歷數有歸遂奮關中之翼竟垂垓下之翅蓋實由於人事焉有屬於天亡雖驅百萬之兵終棄八千之子以為殷監豈不惜哉固當匿魄東峯收魂北極豈合虛承廟食廣費牲牢仁傑受命方隅循革攸寄今遣焚燎祠宇削平臺室使蕙幃銷盡羽帳隨烟君宜速遷勿為人患檄到如律令幽司於神明隸於令盍相警懼曰其何政之疵而戾法典違天休將奚施而塞此咎惟神赫靈疸惡擊獸麗罪不然令拜章引咎即解印綬去綝字方慶雍州咸陽人以字顯起家越王府參軍武后臨朝拜廣州都督轉洛州長史遷鸞臺侍郎同鳳閣鸞臺平章事轉鳳閣侍郎神功元年封石泉縣子以老疾乞從閒逸授麟臺監修國史聖歷二年授左庶子進封公長安二年卒贈兗州都督諡曰貞中宗即位追贈吏部尚書臣謹按禮經但有忌日而無忌月晉穆帝納后用九月九日是康帝忌月於時持疑不定下太常禮官荀訥議稱禮祗有忌日無忌月若有忌月即有忌時忌歲益無理據當時從訥所議軍樂是軍容與常不等臣謂振作於事無嫌准令式齊縗大功未葬並不得朝會仍終喪不得參燕樂比來朝官不依禮法身有哀慘陪廁朝賀手舞足蹈公違憲章名教既虧實玷皇化請申明程式更令禁止謹按史籍所載人臣與人主言及上表未有稱皇太子名者當為太子皇儲其名尊重不敢指斥所以不言西晉僕射山濤啓事稱皇太子而不言名濤中朝名士必詳典籍故不稱名應有憑準朝官尚猶如此宮臣諱則不疑今東宮殿及門名皆有觸犯臨事論啓回避甚難孝敬皇帝為太子時改宏教門為崇教門沛王為皇太子時改崇賢館為崇文館皆避名諱以尊禮典此則成例足為規模伏請改換謹按禮記月令孟冬之月天子命將帥講武習射御角力此乃三時務農一時講武以習射御角校材力蓋王者常事安不忘危之道也孟春之月不可稱兵兵者甲胄干戈之總名兵金也金性剋木春盛德在木而舉金以害盛德逆生氣孟春行冬令則水潦為敗雪霜大摯首種不入蔡雍月令章句云太陰新休少陽尚微而行冬令以導水氣故水潦至而敗生物也雪霜大摯摧傷物也太陰干時雨雪而霜故大傷首種首種謂宿麥以秋種故謂之首種入收也春為沍寒所傷故至夏麥不成長也今孟春講武是行冬令以陰政犯陽氣害發生之德臣恐水潦敗物霜雪損稼夏麥不登無所收入也伏望天恩不違時令至冬教習以順天道謹按明堂天子布政之宮也蓋所以順天氣統萬物動法於兩儀德被於四海者也夏曰世室殷曰重屋姬曰明堂此三代之名也明堂天子太廟所以宗祀其祖以配上帝東曰青陽南曰明堂西曰總章北曰元堂中曰太室雖曰五名而以明堂為主漢代達學通儒咸以明堂太廟為一漢左中郎將蔡雍立議亦以為然取其宗祀則謂之清廟取其正室則謂之太室取其向陽則謂之明堂取其建學則謂之太學取其圜水則謂之辟雍異名而同事古之制也天子以孟春正月上辛日於南郊總受十二月之政還藏於祖廟月取一政班於明堂諸侯以孟春之月朝於天子受十二月之政藏於祖廟月取一政而行之蓋所以和陰陽順天道也如此則禍亂不作災害不生矣故仲尼美而稱之曰明王之以孝理天下也人君以其禮告廟則謂之告朔聽視此月之政則謂之視朔亦曰聽朔雖有三名其實一也今禮官議稱按經史正文無天子每月告朔之事者臣議按春秋文公六年閏十月不告朔穀梁傳云閏附月餘日天子不以告朔左氏傳曰閏月不告朔非禮也閏以正時時以作事事以厚生生人之道於是乎在矣不告閏朔棄時政也臣據此文則天子閏月亦告朔矣寧有他月而廢其禮者乎博考經籍其文甚著何以明之周禮太史職云頒告朔於邦國閏月告王居門終月又禮記玉藻云閏月則闔門左扉立於其中並是天子閏月而行告朔之事也禮官又稱玉藻天子聽朔於南門之外周禮天官太宰正月之吉布政於邦國都鄙干寶注云周正建子之月告朔日也此即玉藻之聽朔矣今每歲首元日通天宮受朝讀時令布政事京官九品以上諸州朝集使等咸列於庭此聽朔之禮畢而合於周禮玉藻之文矣禮論及三禮義宗江都集禮貞觀禮顯慶禮及祠令並無王者告朔之事者臣謹案玉藻云元冕而朝日於東門之外聽朔於南門之外鄭元注云朝日春分之時也東門皆謂國門也明堂皆在國之陽每月就其時之堂而聽朔焉卒事反宿於路寢凡聽朔必以特牲告其時帝及其神配以文王武王臣謂今歲元日通天宮受朝讀時令及布政自是古禮孟春上辛受十二月之政藏於祖廟之禮耳而月取一政頒於明堂其義昭然猶未行也即如禮官所言遂闕其事臣又按禮記月令天子每月居青陽明堂總章元堂即是每月告朔之事先儒舊說天子行事一年十八度入明堂大饗不問卜一入也每月告朔十二入也四時迎氣四入也巡狩之年一入也今禮官立議惟歲首一入耳與先儒既異在臣不敢同鄭元云凡聽朔告其帝臣愚以為告朔之日則五方上帝之一帝也春則靈威仰夏則赤熛怒秋則白招矩冬則叶光紀季月則含樞紐也並以始祖而配之焉人帝及神列在祀典亦於其月而饗祭之魯自文公始不視朔子貢見其禮廢欲去其羊孔子以羊存猶可識其禮羊亡其禮遂廢故云爾愛其羊我愛其禮也漢承秦滅學庶事草創明堂辟雍其制遂闕漢武帝封禪始建明堂於太山既不立於京師所以無告朔之事至漢平帝元始中王莽輔政庶幾復古乃建明堂辟雍焉帝祫祭於明堂諸侯王列侯宗室子弟九百餘人助祭畢皆益戶賜爵及金帛增秩補吏各有差漢末喪亂尚傳其禮爰至後漢祀典仍存明帝永平二年郊祀五帝於明堂以光武配祭牲各一犢奏樂如南郊董卓西移記載湮滅告朔之禮於此而墜暨於晉末戎馬生郊禮樂衣冠掃地總盡元帝過江是稱狼狽禮樂制度南遷蓋寡彞典殘缺無復舊章軍國所資臨事議定既闕明堂寧論告朔宋朝何承天纂集其文以為禮論雖加編次事則闕如梁代崔靈恩撰三禮義宗但捃托前儒因循故事而已隋大業中煬帝命學士撰江都集禮只抄撮禮論更無異文貞觀顯慶禮及祠令不言告朔者蓋為歷代不傳所以其文遂闕各有由緒不足依據今禮官引為明證在臣誠實有疑陛下肇建明堂聿遵古典告朔之禮猶闕舊章欽若稽古應須補葺若每月聽政於明堂事亦煩數孟月視朔恐不可廢謹議女子年幼而早孤其母貧窶不能守志攜以適人為後夫之鞠養及長出嫁不復同居今母後夫亡欲制繼父服不知可否人間此例甚衆至於服紀有何等差前代通儒若為議論蓋聞主聖於上臣忠於下非聖無以納忠非忠無以感聖逖觀前載罔弗由茲太子太師鄭國文貞魏公運屬昌期時逢睿后乃神乃武亟虛襟以待諫將之明之遂竭誠而薦讜事有必犯知無不為故能契叶雲龍義均魚水成百代之模楷固一時之準的茂躅宏規已備於青史片言餘論或漏於緗圖雖貞質自然無假於飾而高山仰止有欲增峻於是採聽人謠參詳國典撰成諫録凡為五卷亦猶平仲春秋不遺其實録宣尼家語兼敘其對問各為題目列之如左唐尚書吏部郎中琅琊王綝撰璹字令璋贈太常卿思廉孫永徽中明經擢第纍補太子宮門郎調露中纍遷至中書舍人封吳興縣男武后臨朝歷夏官天官侍郎遷文昌左丞同鳳閣鸞臺平章事坐事轉司賓少卿證聖初加秋官尚書復知政事以冬官尚書留守西京長安中聽致仕進爵為伯官名復舊為工部尚書神龍元年卒贈越州都督諡曰成獅子猛獸唯止食肉遠從碎葉以至神都肉既難得極為勞費陛下以百姓為心慮一物有失鷹犬不蓄漁獵總停運不殺以闡大慈垂好生以敷至德凡在翾飛蠢動莫不感荷仁恩豈容自菲薄於身而厚資給於獸求之至理必不然乎班贈太常卿思廉孫舉明經纍除定汴滄虢豳等五州刺史加銀青光祿大夫轉秦州刺史神龍元年纍封宣城郡公三遷太子詹事以諫節愍太子擢拜右散騎常侍遷祕書監先天二年拜戶部尚書加金紫光祿大夫開元二年卒年七十四臣聞賈誼曰選天下之端士孝悌博聞有道術者使與太子居處出入故太子見正事聞正言行正道左右前後皆正人也夫習與正人居之不能無正習與不正人居之不能無不正太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼓瞽史誦針大夫進謀故習與智長化與心成夫教得而左右正則太子正矣太子正而天下定矣臣又聞之木從繩則正后從諫則聖善言古者所以驗於今伏惟殿下睿德洪深天姿聰敏近代成敗前古安危莫不懸鑒在心動合典禮臣以庸朽濫居輔弼虛備耳目叨預股肱輒薦塵露庶裨山海伏以內置作坊工巧得入宮闈之內禁衛之所或言語內出或事狀外通小人無知不識輕重因為詐僞有玷徽猷臣望並付所司以停宮內造作如或要須役造猶望宮外安置庶得工匠不於宮禁出入臣聞漢文帝身衣弋綈足履革舄齊高帝欄檻用銅者皆易以鐵經侯帶玉具劒環佩以過魏太子不視經侯曰魏國亦有寶乎太子曰主信臣忠魏之寶也經侯委劒佩而去太子使追還之謂曰珠玉珍玩寒不可衣飢不可食無遺我賊經侯杜門不出臣觀聖賢經籍務以簡素為貴皇王政化皆以菲薄為德伏惟殿下留心恭儉靡尚浮奢臣愚猶望損之又損之居簡以行簡減省造作節量用度臣聞銀榜銅樓宮闈嚴祕門閣來往皆有簿歷殿下時有所須唯門司宣令或恐姦僞之輩因此妄為增減脫有文狀舛錯事理便即差違且近日呂升之便乃代署宣敕伏賴陛下睿敏當即覺其姦僞自餘臣下庸淺豈能深辨真虛望墨令及覆事行下並用內印印畫署之後冀得免有詐假乃是長久規模臣又聞之忠臣事君有犯而無隱明主馭下納諫以進德故書云有言逆於志必求諸道有言順於心必求諸非道伏惟殿下仁明昭著聖敬日躋探幽洞微窮神索隱事之善惡毫釐靡差理有危疑錙銖無爽臣以庸謬叨侍春闈職居獻替豈敢緘默臣聞聖人不專其德賢智必有所師故曰與善人言如入芝蘭之室久自芬芳與不善人言如火銷膏不覺而盡今司經見無學士供奉未有侍讀伏望時因視膳奏請置人所冀講席談筵務盡忠規之道披文摘句方資審諭之勤臣又聞臣之事主必盡乃誠君之進賢務求忠讜伏惟殿下養德儲闈以端靜為務恭膺守器以學業為先經所以立行修身史所以諳識成敗雅誥既習忠孝乃成傳記方通安危斯辨知父子君臣之道識古今鑒戒之規經史為先斯乃急務至於工巧造作寮史直司實為末事無足勞慮臣以庸淺獻替是司臣而不言負譴聖日言而獲罪是所甘心伏願留意經書簡略細事一蒙採納萬殞無辭尤降儲明俯矜狂瞽欽望雍州萬年人纍官越州都督司賓卿長壽二年拜內史封芮國公坐阿附李昭德貶趙州刺史入為司府卿遷秋官尚書中宗還東宮拜太子宮尹進文昌右相同鳳閣鸞臺三品罷為太子賓客中宗復位擢尚書左僕射平章軍國重事進開府儀同三司檢校安國相王府長史卒年八十贈司空並州大都督諡曰元臣聞孝子居喪朝一溢米暮一溢米食之無算或粥或飯不能食粥者飯羹以菜可也又曰五十不致毀又曰喪有疾食肉飲酒加以薑桂又曰若不勝喪乃比於不慈不孝孝經曰毀不滅性此聖人之教也竊以兩溢之米欲滿大升或為飯粥隨性所嗜羹以助食年至五十不合致毀素有疾又加酒肉食味不美調以薑桂此乃聖人制禮原父母之情不欲令孝子病毀不勝哀痛也自古聖人制禮如此殷勤大行則天遺制如此懇至今陛下三日視事聽覽萬機㣥臣性命仰陛下存活三聖基業待陛下興隆伏惟聖年已登五十陛下緣在房州先患腳氣今在哀苦舊患更發又自今月二日已來唯令進倉米薄粥臣下驚恐不勝惶懼但倉米陳臭天下共知食即動氣奈何陛下以五十之年抱積久之患奉纍聖之緒承遺制之託上事宗廟社稷下養赤子蒼生故食動病之倉米不遵遺令之教訓陛下縱自輕性命其奈七廟何其奈萬姓何臣等痛切之至謹述先聖制禮大行遺制伏乞少進美膳加以薑桂即望聖體稍和舊患漸損
