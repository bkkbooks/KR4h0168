front:
  text: 全唐文欽定全唐文卷八百三十六錢珝六
  hash: sha256:814d8ad111e71edfa058e0113658be688e170d82352564f1ee4803566feff079
body:
  text: 臣某言伏奉今月十三日制命授臣某階某官仍加食邑一千戶今日獲於延英親承聖造瀝懇陳讓未賜允從臣某誠感誠憂頓首頓首臣聞衽席之上讓而坐下人猶犯齒朝廷之位讓而就賤人猶犯貴人情之間讓猶如此況其不讓無犯則難而復台輔至崇鈞軸至重頃年陛下擢臣秉政莫獲固辭已乖戾於當時敢因循於今日伏惟尊號皇帝陛下於君臣之際今古所希有善必知有過必掩使之夾輔恐不光昭故重器崇名焜耀而常思假寵進言論道周旋而盡鑒推誠上感天心臣非木偶今之讓爵蓋懼生災猶慮天下之人將有所犯敢於翰墨略布肺肝且陛下示以殊恩增其貴秩當庶事苟同未稱在衆心必以為非旒扆寓臨宗祏權設有兵革未能載戢有法制未盡公行凡此憂虞不遑寤寐以茲受命可謂稱乎聖澤才流謗言未至縱朝行為臣箝結顧寰海必自沸騰則上有私於輔佐之間而臣闕啓災咎之本繇是終始揣度進退驚疑以此拜章實期得請陛下加臣以渥澤不若使臣合物情寵臣以光華不若遣臣免災咎儻人言不息天咎必來焉得自隱自欺不披露懇悃伏惟洞開睿鑒俯徇愚衷且遣粗安更容陳力廣至明之德罷已降之書昭示四方用新聖政臣某無任感激惶懼屏營之至臣某言伏奉今月某日批詔具承聖旨臣昨者固辭寵休有異常等然始以謙讓為説終以災咎自陳未能便動天心上回睿渥復傾肝血進拜封章直舉其言冀蒙昭允臣某誠迫誠懼伏惟陛下寬明有制聰哲成文揚憲祖宣祖之風冀元和大中之運故欲治而尚亂欲泰而未安潛測聖懷常縈百慮臣為宰輔得不周知且自去秋以來國步未復臣每思人事每揣人情內激肺腸有如湯火陛下當食不美當寐不甘欲以攻苦食淡之心抱公滅私之道致陛下之理釋陛下之憂然而再秉機權未能致此者蓋臣去己之事尚有因循防患之謀率多容易若臣去己必決防患必專天下之憂庶幾稍解而祿位輕授之弊近歲愈深上自侯王下至卒伍受爵賞者所承不重荷恩澤者所感不深蓋緣族類之間踰謬者衆不重則無以勸其戮力不深則何以激其盡心因之且不稟朝廷不畏法度不稟必亂不畏必危本末之間實出於此今臣貴為四輔重有萬機階秩就加朝廷常典又何必齷齪謙讓而違君命也但欲審度去就明辨否臧以臣去已決烈之心拒天下越等干求之患使爵賞不濫與恩澤不妄加則承之者必重感之者必深如此自凜朝廷自畏法度有患可弭有難可平此事非所難為祗在陛下明察儻或信其誠請遂寢新恩則君臣之志氣大同理道之根源必正若陛下不顧其説在臣亦欲何為但抱憂惶難居夾輔有渝斯語是謂明欺君道始終聖情深淺祗期遂志不敢匿情再黷冕旒若臨泉谷臣某無任迫切惶恐俟命允許之至臣某言臣昨者再獻封章實披肝膽而詔書批諭德澤滋深有志未從有言未納雖屬沍寒之候不勝流汗之憂臣某誠悸誠惕臣聞帝王以國事之重倚於輔相者既觀舉直之誠必責理平之效故責之必信信之必終然則歷覽古今此乃明君遇賢臣之事今陛下明德非臣獨知臣之非賢人共知耳而待罪之位非次久居陛下知臣之心處臣之地每升便殿常認聖慈謂臣輸寫甚忠舉措多直每參大政皆聽淺謀有間之言無從而入至如一昨忽搆㣥邪奏密而左右不知禍巨而本根已固雖傾陷盡闕一作關於大事而譖傷先在於微臣陛下知臣素無他腸知彼但肆讒口聰明一寤擊斷不疑否則臣永抱幽寃已當誅殛棄逐姦臣之日忽降渥恩蓋欲使中外之人明知遇臣益厚以茲銜謝詎並尋常則臣自此事君自此執政每圖報效且合何如所以固讓重恩深申血懇昨者所陳章表始末以去己為言蓋欲以人情所難為臣願為之於今日陛下所賜之異寵臣願卻之於此時將使萬邦盡驚致理因茲約束冀漸和平若臣冒寵不辭何術可制天下至大至切不得不然今陛下未察愚衷頻加聖澤與向來知臣之旨昨者保臣之心顯有不同臣將何託前所謂齷齪謙讓臣實不為伏望陛下以所奏之書靜賜睿覽察其陳讓之懇匪以沽激為名利於國家不避震怒倘陛下將期復國別欲任賢奪臣迫切之心以示棄絶之旨則當避賢而退不敢更煩聖聰竊期此言得遂堅請臣某無任拜首瞻天瀝血隕涕懇激倣徨之至臣某言今月十八日延英敷奏親獲固讓官榮徒荷皇私未從丹悃今日又開芝檢復閲綸言莫聽鋪陳尚令只受臣某誠懼誠迫臣聞高下相遠者天地也而天地之氣必通所以四時周旋萬物生育尊卑相懸者君臣也而君臣之道必合所以統理諸華肅齊庶政天地不通則萬物夭君臣不合則庶政乖今臣讓爵推誠極言防患拜章纍日答詔三臨聖鑒未回愚衷無感恥君道之難合懼庶政之特乖內負沉憂若罹昭憲是以泣邀神助往覺魂飛伏念此心匪緣他事推誠為國防患為君恭惟睿慈寧忍不察且朝廷之勢不強於藩方輔相之權見侵於將帥隳毀我法制殘虐我生靈臣常結憤於胸中陛下亦興難於南面固欲乘機革弊因事抑強二者之能不假奇術但所行必正所作無私只於賞罰之間必與物情相順陛下申命宰臣奉之聾瞶皆披頑嚚可化而將帥見侵之患日息則朝廷不強之勢日興罔害政理之大經罔纍聖明之全德將使國平時泰不慮不憂陛下若棄此不從是怠於中興之志矣臣之痛惜如割肌膚心腹腎腸傾寫罄竭臣血可嘔臣軀可糜已決之心則不可奪臣某叩頭屈膝無任涕流泣血精爽隕越之至臣某言臣今月某日延英面獲陳讓後復拜封章詔諭又臨懇激未遂臣某誠兢誠栗頓首頓首臣聞琴瑟有不調者尚或改而張之辨士之言良史必記朝廷命官之典故大於琴瑟之絃公輔求理之謀亦重於辨士之説況所命者宰相崇高之秩所謀者邦國臨制之機而臣等堅辭必防他患陛下固奪將啓後艱他患若生後艱何救且臣伏思陸贄以忠信事德宗皇帝建中初方為侍從之臣事繫安危言皆激切有不納者必能力爭當彼寇難之時德宗欲加尊號訪於陸贄遂獻忠言以為大憝猶存中區多梗是天意去就之際人情向背之秋若使重益美名必纍中興之業德宗英寤遂納忠言當時轉禍之期實若走丸之速然則以近臣直道奪聖主鴻名有犯之言莫甚於此今臣讓官辭爵與彼輕重不同而於危難之中陳匡救之力愛君為國心則無殊昔者德宗再閲披陳具明損益今臣四上直疏陛下未察愚誠是何恩澤之深全惑是非之理感泣慙懼知臣者天然陛下處多難之時欲繼德宗之美彼則深思利害聽一學士之苦言今則可見否臧阻三宰臣之固請臣是以極疑此事是皇天誡陛下之心皇天無親惟德是輔今若尚令批諭抑與寵私則臣恥陛下不如德宗臣亦自恥不如陸贄臣自知其恥天下得不其然積恥成憂積憂生疾心神錯亂舉錯顛危只於旬時必當覆餗便須永棄不見中興以是而思生不如死臣言至此臣意可憐唯在聖明速賜聽允臣某無任俯伏嗚咽以身俟命之至臣某言同心同德是為亂臣五獻封章繼陳懇悃復升便殿纍貢切言天高而曾不少聞日近而未嘗俯照臣某誠憂誠迫頓首頓首臣聞詩云受爵不讓至於已斯亡仲尼刪詩此言不去則古之為君者非憎其臣而欲以爵亡之也蓋勸忠勞昭典册無以加於爵位也古之為臣者非惡其爵而欲讓之也蓋定是非畏盈滿無以加於謙讓也得受爵之宜無不存也失讓爵之宜無不亡也古人所謂亡者彼亦不過其身既而有益於君亡亦可也苟或亡身敗國無益於君致亂階於一時流惡名於千載今臣之不讓是長亂階且陛下觀天下之事理乎觀宰臣之心忠乎若天下已理宰臣不忠陛下迫以爵位致其危亡臣則瞑目而歸何害於國若天下未理宰臣則忠陛下不聽苦言須加重爵臣則碎首而退何利於國臣之不畏其亡但當未理之時不可更長亂階也所謂未理則非聖德有所不能蓋天下承弊日深諸侯不順其理故臣欲以今日之讓制天下承弊之風而正其不順也不革承弊不正不順而望萬人再安四方無事者是抱薪救火其可撲滅乎言出臣口事痛臣心假使嚴旨復臨臣則終讓而已奚自拜疏卻類叩閽臣某無任流涕哽切進退屏營之至臣某言伏奉今月某日恩制特授某官者三公之選八命而居前古以來無人則闕仍開大國兼進崇階言渥恩則深若紫泉顧名器則重侔泰嶽揣分非次恐悸難安臣某誠惶誠恐頓首頓首臣忝列公台忽踰半紀事乖允當識昧便宜何施作相之材但纍知臣之道頃因出狩自合乞骸未臨復國之期敢有逃天之意而君能得一日且再中空知陪扈之勞獲覩清夷之慶伏自去歲至於今春每懷失職之憂繼瀝避賢之懇愚衷無感睿鑒莫回徒齷齪以受譏但因循而竊位何言霈澤又降重霄實慙夢賚之人安稱坐論之地捫心自省沾背不遑雖陛下修道側身發言罪已可卜運興之兆將承天賜之休然則劍戟未銷江關或阻猶煩聖慮且乏嘉謀敢於此時輒荷極寵上祈元造俯信赤心行之則明主有私罷之則微臣無咎推諸至理是以固辭蓋欲保全實非飾詐冀蒙矜鑒特賜允從冒黷冕旒臣無任兢感戰越之至臣某言伏奉今月某日恩制加臣食邑一千戶實封一百戶臣某伏惟尊號皇帝陛下文武應天憂勤厚國旁求翊贊慎擇能賢如臣之才焉可執政徒以其濫承台蔭擢處鼎司屢改流年多隳彞憲莫獲乞骸之便空懷沾背之羞頃屬陛下尚駐乘輿且臨關輔都人久散廟貌未嚴顧居守之重難注宸衷而任使聖言親降霈澤遽行拜官仍忝於緇衣備位不離於黃閣寵靈則固兢栗載深蓋以乍違天顏初達帝里雖南山渭水變王氣以潛新而荒草壞垣動秋風而尚慘連甍何有編戶猶稀臣當此時莫知所措實賴祖宗垂祐睿哲申謀兼委近藩旁分庶事免微臣之獲戾濟重務以有成遂致五輅鳴鑾六師被甲陳吉行之盛禮正法座於良辰誕告四方復興景運御日月而無違素志嚮邱園而已動歸心遽謂聖慈忽加元造尚責佐王之效重增開國之封仍容素餐兼賜奠食只承異數徒冒優恩已虞招損之譏敢竊好謙之美況佳兵未息公聚多虛詎宜特命輔臣更加井賦事非允當言必喧傳伏惟曲鑒愚誠更回厚渥冀絶謗論且顯聰明臣某無任荷聖感恩瀝懇待命激切屏營之至臣某言今月某日伏奉批詔以臣陳讓寵光未賜允許揣分而省躬知懼感恩而鏤骨徒深臣某誠憂誠激頓首頓首伏念臣之事君也輸忠竭力以從政君之使臣也增爵進秩以報勞勞既未申寵至必讓凡於庶事皆在適時當其時不得不行非其時不得不止今臣承命可謂非時且思加獻鴻名是為常典而去歲之首㣥臣數四拜章願增神武之名用稱欽明之德而陛下永惟大體堅奪衆心蓋以反正之初艱難未濟仰惟睿旨非獨謙光欲廣嘉猷深知不可陛下之志既定臣子安敢復言亦以非時罷茲盛典今臣之愚懇竊合聖謨去春方在京師尚隳此事比者猶當巡幸固不可為內度宸衷必開宏鑒遂敢再披肝膽實期便輟渥恩請候鑾輅歸還干戈弭息卻施綸綍俾合憲章今日皇私則難濫受可行可止事理甚明伏冀睿慈便收霈澤再冒旒扆臣某無任兢悸迫切之至臣某言臣昨以寵光踰濫循省兢憂兼懼用典非時有纍日新之德再傾肝血實冀允從而天鑒未開愚誠愈迫臣某誠惶誠激頓首頓首伏以陛下濬哲自天憂勤為國感屯蒙之未泰先昧爽以有臨臣每奉清光備承睿旨無言不盡無理不思決去邪懲惡之謀若反掌轉圜之速況察忠仗信據理任材誣譖者徒欲橫侵傾危者皆令立定茲所謂疏通知遠淵靜有謀闢四門明四目者也臣不知昔之令主何以加於陛下之道乎然睿哲憂勤昭彰如此今宰臣以非時之命有所堅辭蓋欲朝廷行事得宜天下物情共洽則臣可以制天下非宜之請廣朝廷致理之端用贊中興以新庶政詎獨務為飾讓而進犯宸嚴且睿哲則何嚮不通憂勤則何思不至既通既至必察必知臣之所陳實欲利國神明所聽毫髮敢欺況有常情亦難自匿臣雖乏出㣥之智才踰強仕之年幸偶文明方圖富貴苟或拜恩可稱荷祿不慙則何必固小節以鳴謙干大君而違命跪承批詔退揣事機讓之則所益必多受之則所損非細仍念王搏崔允以懇激拜章并臣披露之辭略盡否臧之説雖煩聖覽當察㣥心得不遂有改張遽收渥澤斯為從善實可經邦且凡受寵休有所退避或名聲不稱或遭遇非才小則恥識者談笑之端大則憂賢人譏責之罪今臣於談笑譏責亦不敢以君恩避之實欲制天下之非宜廣朝廷之致理用光興復永濟艱難仰望聖慈臣某無任寤寐齋禱激切之至臣某言伏奉今月某日批詔以臣堅讓寵章未賜允許者憂誠若焚駭汗如雨發於肝膈鑒在神祇臣某誠恐誠迫頓首頓首臣聞以欲從人則可以人從欲鮮濟此蓋左邱明之信史臧文仲之至言陛下多閲正經以資明德固於深旨靡不盡知然而陛下優遇台臣恢張天覆賜爵而唯恐不重流澤而唯恐不深茂典畢申睿慈未足此蓋陛下以無私之欲勸有位之臣使其更竭謀猷以濟難否是陛下之欲也臣匪不知臣所以斯須不寧數固而讓者蓋緣陛下在省方之地有國未歸微臣忝執政之權遇昧未泰謂為輔弼實抱憂慙刻苦厲精進賢讓寵所期天下之士且不加罪於臣既安其心庶竭其力此臣之欲也陛下之欲不過勉勞臣等三人納善罷之小無所損微臣之欲使昭示天下之人聽而俞之大有所利利在邦國皎然可知陛下若以欲從臣理無不可若以臣從欲鮮濟不疑雖又新奉聖慈未容陳讓在臣丹赤誓不稟遵其於利害之言辨折將盡實以多為緣飾亦不敢再黷英明進思之心死請而已臣某無任懇激兢越之至臣某言臣事君未盡舉職無聞瀝血懇而黈纊不聽降皇使而紫泥適至臣某誠惶誠懼頓首頓首臣聞啓乃心沃朕心哲王所以倚輔相而成理道也然則觀便宜陳訏謨務匡救而申諫諍不可必奪可者必行竭力盡忠是為啓沃苟無啓沃何用弼諧伏以陛下自周歲以來出居未復南嚮而坐聖慮日深思頃來及霤之言還天下投荒之土潛心有感逆耳多容今大駕方欲還京宰臣非時進秩上虧聖政旁啓貪謀宇內幸門因茲大啓竊念久隳法制何堪更自破除倘陛下固行寵光乃是姑息之旨信任則疏四海得以酌量萬事更當姦弊且臣罔受爵祿唯惜政經盡理極辭未蒙聖鑒則是陛下棄啓沃而任獨見絶諫諍而惡正言自此朝廷卻成壅蔽凡關得失凡有是非徒欲抗論必無允納則不知天下之事自此如何近歲宰執加恩不過再陳謙讓至於今日莫並前時朝省夕思可畏可懼蓋三年之內六馬再奔若使理道昭彰姦凶凜畏何由致此安得不憂聖聽雖煩朝綱必振良圖甚大至化期明若以干犯未休震怒不捨即臣直視鼎鑊如對軒裳蓋有氣經邦有心事主死而無悔言實可悲唯恐但留名聲不足弭其憂患更無多語只欲長號臣某無任披膽隳肝請罪之至臣某言某五奉批詔尚未允臣所讓官階爵邑者伏以將相大臣凡被恩命有所辭讓不過再三安則稟而受之不安者亦許其讓今臣已倍再三之數情固有所不安聖鑒未開憂心如醉臣某誠恐誠迫頓首頓首臣聞杜恕魏之名臣也常以立心行事若非明達君子見諒本心不然則刳心示人與臣何異臣雖不侔常歎其言知信人難古昔如是然杜恕於族類之內尚興此言今臣幸以遭逢重為宰執雖論才較智莫稱陶鈞而秉直輸忠敢欺辰象拜章之請擇利經邦況奉天顏盡披血懇誓然疑作言莫信死請莫從則臣刳心於丹扆之前陛下亦當未察兢憂慙歎無地可逃今辭理已殫懇激愈甚蓋臣於不安之事終無受寵之期苟或譴怒下臨臣則伏罪而去干犯宸嚴臣某無任隕涕流汗惶越之至臣某言臣聞君人之私在始終而必遂人臣之分於進退以自圖嘗觀古今莫不如此臣謬從先訓本涉儒流傳之者猶有琴書教之者令歸忠孝臣之不佞頗墜所承唯於忠孝之心實畏神明之責策名遊宦止望周行偶聖立身俄塵大任材同常士寵過素期雖欲遠慕前修旁探令典窺其事業勵此顓蒙副明主之憂勤避衆人之指笑而所務者生靈富壽每痛雕殘所制者兵革弭寧尚聞侵伐赧然備位何以事君不唯久合避賢固亦尋宜獲罪偷安四輔忽已六年假名器而則崇執機權而益拙循省是懼斯須不遑然臣於六年之中未忍為一朝之計者蓋以陛下信其愚直如見肺肝咨以弼諧終無疑間事不幸者必蒙曲恕心不欺者則荷明知忝異禽魚感深骨髓強陳蹇力用答聖慈今則曠敗漸多智謀將竭不能引退定至顛危況陛下光復京師已逾周歲臣之去就亦謂得宜竊見嶺南節度使薛王知柔近有封章懇求替罷是以臣今日敢於便殿直冒宸嚴乞免鈞衡得分節制赤誠盡寫天眷莫回既集兢憂彌增激切伏念臣之心力則未甚衰嘗學政經因參戎事尚可遠臨海服具舉化條每推糾率之勤兼濟邦家之用謹廉無犯攻苦不私微臣所能庶幾有效實非飾詐輒罔睿明隳膽獻書期於聽允登壇受命皆是寵光遂之則臣必有為奪之則臣將不逮上惟君命乃獲始終且使臣又全進退自昭聖德未爽舊章仰望鴻恩臣某無任迫切悸恐之至臣某言去冬以持衡力竭待罪年深曾披肺肝乞免機務兼遇嶺南節度使知柔上書求代臣遂仰告聖慈願守遠藩別立微效陛下未容休罷尚委弼諧旋命貴臣密宣睿旨臣之去就詎合固違焉敢復拜封章是以苟安廊廟又移歲序何補國家臣頃者瀝懇之時陛下亦降許臣之旨欲俟他日知柔再有陳情則於此時允臣所請邇來備位不敢更言上荷皇私且策駑蹇今知柔又貢章表辭甚激切宗枝將帥事體可從亦繫機宜便合制置速擇交代免失一方倘陛下念知柔陳乞之私察臣披露之懇使之仗鉞委以藩條必能撫諭島夷董集征賦旁資國用粗慰聖心躬親則可以便人廉謹則不令生事擇利而斷全在宸衷當邦家匱乏之時敢違輸貢兵革交侵之際幸保土疆臣與知柔各獲其所伏惟尊號皇帝陛下恭默守位明哲臨人每務永圖以揚丕烈克全君體尤重大臣苟非輔相之間誰能盡窺聖德臣之遭遇獨異等倫臨事出言未嘗不信輸忠抱直無所不知七年以來萬機實重仍逢多難唯任至愚若非聖明尋合顛敗由茲感激更竭筋骸近者自量力實不逮今所陳乞未曰退休荷寵出藩臨戎報國誓秉始終之節兼推糾率之心直寫赤誠冀開元鑒今日延英殿已具奏聞未蒙聽允輒陳箋翰更冒宸嚴臣某無任祈恩待命迫切兢悸之至皇帝赴齋宮內臣皆服朝服臣檢國朝故事及近代禮令並無內官朝服助祭之文伏惟皇帝陛下承天御歷聖祚中興祇見宗祧克陳大禮皆稟高祖太宗之成制必循虞夏商周之舊經軒冕服章式遵彞憲禮院先準大禮使牒稱得內侍省牒要知內臣朝服品秩禮院已準禮令報訖今參詳近朝事例若內官及諸衛將軍必須製冠服即各依所兼正官隨資品依令式服本官之服事存傳聽且可俯從然亦不分明著在禮令乞聖慈允臣所奏臣今日已時進狀論內官冠服制度未奉聖旨伏以陛下虔事郊禋式遵彞範凡關典禮必守憲章今陛下行先王之大禮而內臣遂服先王之法服來日朝獻大聖祖臣贊道皇帝行事若侍臣服章有違制度是為非禮上瀆祖宗臣期不奉敕臣謬當聖代叨備禮官獲正朝儀死且不朽脂膏泥滓是所甘心乙丑歲冬十一月余以尚書郎得掌誥命庚申歲夏六月以舍人獲譴佐撫州馳暑道病秋八月自襄陽浮而下舟行無事因解束書視所為辭藳翦翦冗碎可存者得五百四十篇丞相表奏百篇區別編聯為二十卷夫體正而有倫辭約而居要始終明白茲所以為誥也國朝聲名辭臣率能由是而作堂闥祕邃不與漢魏爭高下而荒學小子以一日視其冗隙間其可見堂奧而得規摹哉以是代天子言誠不知而作也古者黜幽不過考三載之績余冒居六年見考無績用思黜不亦宜乎所編聯不敢以集稱理諸舟中遂曰舟中録是年九月錢珝自序於沔陽之南曉字明遠京兆杜陵人昭宗時拜左拾遺召為翰林學士知制誥梁祖代唐拜中書舍人開平三年轉工部侍郎充承旨四年拜中書侍郎平章事仍判戶部友圭之亂死於兵贈右僕射闕九五山川闕三字之闕五字風水闕聖闕一字神武雪五老闕一字星闕二字負鼎之闕懿闕五字耿賈政邁黃韓闕一字若匡國軍節度陳許汝闕二字州闕食菜闕五字氏雖系出長樂闕一字家遷闕一字當世緒紛綸闕三字飛闕一字相闕而平闕二字正色以威嚴先郎闕一字應於闕三字媛闕三字猛獸闕十五字石羽林闕江漢氣貫斗牛騰凌追千里之蹤嘯傲負四方之志闕十三字翁知功名闕吐闕四字有孫喜者聚徒數千人闕二字莫遏將闕十字大驚怖無可奈何公乃白闕于南闕四字軍吏迎謁公在側擊之闕十五字之盡闕三字兵闕五字臣闕咸秦闕四字崢嶸繚闕三字臨闕十二字難前孝子迎闕一字而闕一字進闕郡以闕十七字列闕二字者闕間間歲收租闕十一字倍兵強食闕二十二字才誓闕鼓旗之令南山霧闕二字觀豹闕一字之文西陸闕一字清始見鷹揚之闕洛邑古稱四戰之地今闕五字粵自艱難久罹瘡痏闕二字無闕十字寇憸闕一字去闕者雖大必去便于闕一字者雖闕二字作嘗闕五字政闕一字要闕十五字不闕四字其律闕觀焉先是闕一字猾闕一字張闕三字虐闕十字二萬衆闕叛郡邑常虞其蹂躪闕七字密連闕十七字大兵誡其疆闕盡伏其神明闕四字其情偽闕二十字量罔欺于圭闕二字薪芻闕韓浩屯闕一字之闕一字矧闕一字腴盡在梗概闕四字未闕三字匪遠闕十四字王乃闕二字而闕而闕一字許闕三字獨闕一字若遐僻之地闕一字乃闕三字課民闕十七字之闕夜以闕一字馳闕一字館闕三字宿闕十八字縣界內曾闕母疾病割股奉養闕三字痛願闕十九字載揚孝治之闕之問俗觀風阜財述職焉可得稱闕十七字蘭智闕操絳侯之闕一字處不闕從闕介遂鎮華陽闕粳稻莫闕一字桑闕之容闕一字武下闕上闕二字許名區易祊粵闕一字景闕二字何闕三十二字襟帶闕一字郊輔車闕之來時不有更張何期俾乂闕二字賢闕七字公闕三字節度闕十九字本尋源提綱振領害於闕食者民之命也不可不以勤其闕一字穡兵者闕三字器也闕二字以闕一字肅其號令闕十九字刑闕二字吾闕一字之矣爾第闕懦者歡悅闕二字穎悟剛斷闕三字者又闕三字素闕二字命闕四字冬聚舊闕二十三字來而復闕艱闕五字之威龔遂去闕二字之患闕二字罔倦蕩析咸歸闕二字民寬闕十二字夜闕十二字恤惟刑闕麻麥之宜治彼闕六字推闕二字隄之闕二字慙功自闕十一字仰稽前闕二字瞰遺蹤闕二字祇闕二字之謀味闕果應於牧人滯穗闕六字寡婦闕一字年內闕三字四千三百闕十七字奏闕一字連闕六字地而闕咸知闕一字物之方向者公闕三字軍衙闕四字再闕五字規模廳闕三字門闕十二字雄廣厦翬闕六字色路闕類忽有烏鵲㣥萃啄食無闕九字東闕三字孤勤瘁南闕五字吞螟闕十二字卻闕七字縣百闕年闕一字縣麥秀兩歧闕六字覩闕三字長社縣闕二字一莖四穗闕五字不闕十二字之闕一字蹈闕二字仁闕二字不足含闕鉤距運籌史闕七字平仗鉞稜威謝闕四字方闕十六字藝軍闕一字講學馬上注書揮闕二字立覩飛闕飯帳下之犀渠闕二字皆感吮癰樓中之闕一字首蛾眉闕四字閨闕四