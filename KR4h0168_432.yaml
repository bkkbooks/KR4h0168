front:
  text: 全唐文欽定全唐文卷四百三十二延賞中書令嘉貞子本名寶符元宗取賞延於世之義改焉特授左司禦率府兵曹參軍肅宗在鳳翔拜監察御史纍擢太原少尹兼行軍司馬北都副留守代宗朝拜御史大夫歷淮南荊南劍南西川節度觀察使尋加吏部尚書貞元元年徵拜中書侍郎同中書門下平章事三年薨年六十一贈太保諡曰成肅
  hash: sha256:fad3757fae0c6f2db36b5ef4a10aaa21c69910a04100af749dce42df3faedff3
  markers:
  - {type: head, offset: 14, content: 張延賞, id: KR4h0168_NFKB_432-h1, level: 1}
body:
  text: 崇高莫大於君親嚴莫大於父君有覆燾父有訓育逮於夷貊生知禽獸性感不俟教解也而肖形之內戾氣間存觸瑟生災夢牛成患何代不有可勝言哉賊昢焚門亦由是也族滅門覆為愚者鑒誡所以書其所由來其餘則詞存於左右壁矣興元元年記鎬字從周博州人天寶末拜左拾遺歷侍御史肅宗即位擢諫議大夫遷中書侍郎同中書門下平章事尋兼河南節度使都統淮南諸軍事封南陽郡公罷為荊州大都督府長史代宗初更封平原郡公授江南西道都團練觀察等使廣德二年卒思明凶豎因逆竊位兵強則衆附勢奪則人離包藏不測禽獸無異可以計取難以義招伏望不以威權假之又滑州防禦使許叔冀性狡多謀臨難必變望追入宿衛臣聞天子修福當在安養蒼生靖一風化未聞區區僧教以致太平伏願陛下以無為為心不以小乘撓聖慮也故常王傅吳兢先朝史臣歷踐中外大行忠信彰於朝野伏以訓誡明旨諡法攸遵臣早歲服膺備知名實相副特乞聖恩裦其嘉諡鎰字季權一字公度蘇州人以蔭授左衛兵曹參軍纍遷殿中侍御史乾元時遷屯田員外郎大歷中出歷濠州壽州刺史建中初拜中書侍郎平章事從德宗幸奉天李楚琳作亂鎰為所殺贈太子太傅伏見趙縱為奴所告下獄人皆震懼未測聖情貞觀二年太宗謂侍臣曰比有奴告其主謀逆此極斃法特須禁斷假令有謀反者必不獨成自有他人論之豈藉其奴告也自今以後奴告主者皆不受盡令斬決由是賤不得干貴下不得陵上教化之本既正悖亂之漸不生為國之經百代難改欲全其事體實在防微頃者長安令李濟得罪因奴萬年令霍晏得罪因婢愚賤之輩悖慢成風主反畏之動遭誣告充溢府縣莫能斷決建中元年五月二十八日詔曰準鬬競律諸奴婢告主非謀叛已上者同自首法並準律處分自此奴婢復順獄訴稍息今趙縱非叛逆奴實姦凶奴在禁中縱獨下獄考之於法或恐未正將帥之功莫大於子儀人臣之位莫大於尚父歿身未幾墳土僅乾兩壻先已當辜趙縱今又下獄設令縱實抵法所告非奴才經數月連罪三壻録勳念舊猶或可容况在章程本宜宥免陛下方誅㣥賊大用武臣雖見寵於當時恐息望於他日太宗之令典尚在陛下之明詔始行一朝偕違不與衆守於教化恐失於刑法恐煩所益悉無所傷至廣臣非私趙縱非惡此奴叨居股肱職在匡弻斯是大體敢不極言伏乞聖慈納臣愚懇唐有天下恢奄禹迹舟車所至莫不率俾以纍聖重光卜年惟永恢王者之丕業被四海以聲教與吐蕃贊普代為婚姻因結鄰好安危同體甥舅之國將二百年其間或因小忿廾惠為讎封疆騷然靡有寧歲皇帝踐祚愍茲黎無乃釋俘囚悉歸蕃落二國展禮同茲協和行人往復纍布成命是必詐謀不起兵革不用矣彼猶以兩國之要求之永久古有結盟今請用之國家務息邊人外其故地廾利蹈義堅盟從約今國家所守界涇州西至彈箏峽西口隴州西至清水縣鳳州西至同父縣暨劍南西山大渡河東為漢界蕃國守鎮在蘭渭原會西使臨洮又東至成州抵劍南西界磨在些諸蠻大渡水西南為蕃界其兵馬鎮守之處州縣見有居人彼此兩邊見屬漢諸蠻以今所分見住處依前為定其黃河以北從故新泉軍直北至大磧南至賀蘭山駱駝嶺為界中間悉為間田盟文所有不載者蕃有兵馬處蕃守漢有兵馬處漢守不得侵越其先未有兵馬處不得雜置并築城堡耕種今二國將相受辭而會齋戒將事告天地山川之神照臨無得愆墜其盟文藏於郊廟副在有司二國之誠其永保之至肅宗時人聖人誅亂必先示法令崇禮義漢始入關約法三章殺人者死不易之法也按將軍去榮以朔方偏裨提數千士不能整行列挾怨殺縣令有犯上之逆或曰去榮善守陝新下非去榮不可守臣謂不然李光弻守太原程千里守上黨許叔冀守靈昌魯炅守南陽賈賁守雍邱張巡守睢陽初無去榮未聞賊能下也以一能而免死彼弧矢絶倫劍術無前者恃能犯上何以止之若赦去榮誅將來是法不一而招罪人也惜一去榮殺十去榮之材其傷蓋多彼逆亂之人有逆於此而順於彼乎亂富平而治於陝乎悖縣令能不悖於君乎律令者太宗之律令陛下不可以一士小材廢祖宗大法叔清至德中官侍御史江淮東西淮南道宣諭使承前諸使下詔納錢物多給空名告身雖假以官賞其忠義猶未盡才能今皆量文武才藝兼情願穩便據條格擬同申奏聞便寫告身諸道士女道士僧尼如納錢請準敕回授餘人并情願還俗授官勳邑號等亦聽如無人回授及不願還俗者準法不合畜奴婢田宅資財既助國納錢不可更拘常格其所有資財能率十分納三分助國餘七分並任終身自蔭身歿之後亦任回與近親又準敕納錢百千文與明經出身如曾受業粗通帖策修身慎行鄉曲所知者量減二十千文如先經舉送到省落第灼然有憑帖策不甚寥落者減五十千文若粗識文字者準元敕處分未曾讀學不識文字者加三十千應授職事官并勳階號及贈官等有合蔭子孫者如戶內兼蔭丁中三人以上免課役者加一百千文每加一丁中纍加三十千文其商賈準令所在收稅如能據所有資財十分納四助軍者便與終身優復如於敕條外有悉以家産助國嘉其竭誠待以非次如先出身及官資並量資歷好惡各據本條格例節級優加擬授如七十以上情願授致仕官者每色內量十分減二分錢穎乾元元年知司天臺事五官正奉敕創置其官職配五方上稽五緯臣請冠上加一星珠衣從本方正色每至元日冬至朔望朝會及諸大禮即服以朝見仍望永為恆式源彭城人永泰元年為侍御史纍擢夏州節度使自太和七年十一月一日于銀川置監城收管㣥牧今計孳生馬七千餘匹今饒州南界有空間地周回二百餘里四面懸絶賊路不通只置三五十人守其要害即牧放無虞是臣當管界內並非百姓佃食請割隸監司久遠之計寬夏州節度使源弟官侍御史臣某言臣生逢昌運謬列班行官為御史職在舉事齒髮始壯名籍已至在臣至微誠為多幸所以愛惜朝廷宗廟之意與元老大臣不殊臣昨遇郊禋得陪盛禮見執事者説陛下饗獻太廟至穆宗皇帝第九室跪起嗚咽感動神人臣不覺涕淚知陛下孝德可以化天下矣又至圜丘覩陛下升降嚴恭之禮不覺手足舞蹈知陛下誠敬可以達神明矣如嚮者數事非根於生知稟於天授固非一朝一夕之所能致推是而論則三皇之德必可侔五帝之業不足跂洎車駕即路臣實先馳至丹鳳門南禮物備具忽聞傳説云適有白身數十人於金雞竿下奪囚崔發亂打致死有司救止力不能禁兵仗紛紜僅以格戰瓦礫交下傍中朝臣不勝驚痛蓋惜其無知毀損聖德也如此崔發為縣令有事當之罪抵朝廷之法有不赦之科斷自宸衷置諸刑典則可矣豈得下人肆意騁憾一時紊亂綱紀敗失國體豈可使縱恣漸隳也儻陛下欲杜將來之萌絶偏黨之説俾罪人斯得正是刑名則太平之業日益崇矣臣又以為今日搆扇人數至多若盡加誅恐非中典苟捨而不問實蠧大猷以臣愚見莫如敕左右軍使尋求首謀者一二十輩下明詔以示海內知人臣無專殺之文乘間之謀不敢萌貯庶無私之德與日月盡明又伏聆今日赦書求理至切令諫臣論事遣憲吏執法乘輿服御志在抑損又以見陛下遵禹湯之旨同堯舜之求臣為耳目若有所聞而不上啓是臣負陛下之深也焉敢不言不勝慺慺懇切之至懷恩鐵勒部人世襲都督天寶中加左領軍大將軍從郭子儀李光弼廣平王破賊前後皆立殊功加開府儀同三司鴻臚卿封豐國公乾元二年進封大寧郡王加工部尚書代宗即位加同中書門下平章事授河北副元帥尚書左僕射兼中書令靈州大都督府長史單于鎮北大都護朔方節度使加太子少師充朔方都知兵馬使同節度副大使廣德改元册勳拜太保仍賜鐵券名藏太廟畫像淩煙閣辛雲京與懷恩有隙奏其反狀懷恩令子瑒率衆攻雲京進圍榆次朝廷以郭子儀代懷恩子儀至河中懷恩率麾下數百騎渡河北走靈武嘯聚亡命上念其勳舊遙授太師兼中書令大寧王永泰元年懷恩糾合諸番南犯京師至鳴沙縣病甚還死靈武部曲焚其尸以葬廣德元年八月二十三日開府儀同三司尚書左僕射兼中書令朔方節度副大使河北副元帥上柱國大寧郡王臣懷恩刺肝瀝血謹頓首頓首上書寶應聖文神武皇帝陛下臣家本蕃夷代居邊塞爰自祖父早沐國恩臣年未弱冠即蒙上皇驅策出入生死竭力疆埸叨承先帝報功時年已授特進洎乎祿山作亂大振王師臣纍任偏裨決死靖難上以安社稷下以拯生靈仗皇天之威神滅狂胡之醜類無何思明繼逆又據東周宸極不安海內騰沸臣謬承大行皇帝委任授以兵權誓雪國讎以匡時難闔門忠烈咸願殺身野戰攻城皆先士卒兄弟死於陳敵子姪沒於軍前九族之親十不存一縱有在者瘡痍遍身况陛下潛龍之時親統師旅臣忝事麾下陛下悉臣愚誠大行皇帝未捐宮館之時臣頻立微效纍霑官賞遂被輔國等讒害幾至破家便奪兵權逾年宿衛臣雖內省無疚終懼讒佞傾危以日繼時命懸秋葉至將歸骨泉壤永謝明時幸遇陛下龍躍天衢繼纘鴻業知臣負謗察臣丹心遂開獨見之明杜絶衆多之口特拔臣於汧隴再任臣於朔方誠謂遊魂返骸枯骨再肉使臣得竭駑蹇之力效錐刀之功上答陛下再造之恩下展微臣犬馬之志去年秋末回紇仗義而來士庶不知悉皆驚駭陛下以臣與其姻婭令至太原祇迎一切事宜許臣逐便處置遂與可汗計議分道用兵剋復洛陽平蕩幽薊惟有神策兵馬頓軍獨住陳留可汗時在洛陽即被朝恩猜阻要為流議已失蕃情臣自平賊却回天恩又令餞送臣遂罄竭家産為國周旋發遣外蕃貴圖上道行至山北被奉先雲京共生異見妄作加諸閉城不出祇迎仍令潛行竊盜蕃夷怨怒早欲相讎臣遂彌縫方得出界及其祖餞事了回至太原臣忝迹鼎司又承重寄奉先雲京曾無禮數閉關不出相看臣遂過汾州休息士馬凡經數日不遣一介知聞自以行事乖疏恐臣先有論奏遂乃構其謗讟妄起異端扇動軍城以為設備又臣從潞府過日見抱玉祇迎回紇庶事用心懇稱家資罄於公用又與臣馬兼銀器四事臣於回紇處得絹便與抱玉二千匹以充答贈今被抱玉共相組織將此往來之貺便為結托之私貴在厚誣務相傾奪陛下不垂明察採聽流言欲令忠直之臣枉陷讒邪之黨臣實不欺天地不負神明夙夜三思臣罪有六往年同羅背叛河曲騷然經略數軍兵圍不解臣不顧老母走投靈州先帝嘉臣忠誠遂遣徵兵討叛使得河曲清泰賊徒奔亡是臣不忠於國其罪一也臣男玢嘗被同羅虜將蓋亦制不由已旋即棄逆歸順却來投臣臣斬之以令士衆且臣不愛骨肉之重而徇忠義之誠是臣不忠於國其罪二也臣有二女俱聘遠蕃為國和親合從討難致使賊徒殄滅寰宇清平是臣不忠於國其罪三也臣及男瑒不顧危亡身先行陳父子效命志寧邦家是臣不忠於國其罪四也陛下委臣副元帥之權令臣指麾河北其新附節度使皆握強兵臣之撫綏悉安反側州縣既定賦稅以時是臣不忠於國其罪五也臣叶和回紇戡定凶徒天下削平蕃夷歸國使其永為鄰好義著急難萬姓安寧干戈止息二聖山陵事畢陛下忠孝兩全是臣不忠於國其罪六也臣既負六罪誠合萬誅延頸轅門以待斧鑕過此以往更無他違陛下若以此誅臣何異伍子胥存吳卒浮尸於江上大夫種霸越終賜劍於稽山唯當吞恨九泉銜寃千古復何訴哉復何訴哉且葵藿尚解仰陽犬馬猶能戀主臣忝恩至重委任非輕夙夜思奉天顏豈暫心離魏闕誠恐以忠獲罪龜鏡不遙頃者來瑱受誅朝廷不示其罪天下忠義從此生疑况來瑱功業素高人多所忌不審聖衷獨斷復為姦臣弄權臣欲入朝恐罹斯禍諸道節度使皆懼非臣獨敢如此近聞追詔數人並皆不至實畏中官讒口又懼陛下損傷豈唯是臣不忠只為回邪在側且臣前後所奏駱奉先詞情非不托實陛下竟無處置寵用彌深皆由同類相從致蒙蔽聖聰人皆懼死誰復敢言臣義切君臣志憂社稷若無極諫有負聖朝敢肆愚忠以干鼎鑊况今西有犬戎背亂東有吳越不庭均房㣥盜縱橫鄜坊稽胡草擾陛下不思外禦而乃內忌忠良何以混一車書而使梯航納賮天下至大豈可暫輕伏承四方敷奏之人引對之時陛下皆云與驃騎商量曾不委宰臣可否或有稽留數月不放歸還遠近之心轉加疑阻且臣朔方將士功效最高為先帝中興主人是陛下蒙塵故吏曾不別加優獎却信嫉妬謗詞子儀先已被猜臣今又遭毀黷弓藏鳥盡兔死犬烹臣昔謂非今方知實且臣息軍汾上關鍵大開牧馬放羊曾無守備分兵數郡貴免般糧勸課農桑務安黎庶有何狀迹而涉異端陛下必信矯詞何殊指鹿為馬陛下儻斥逐邪佞親附忠良蠲削狐疑敷陳政化使君臣無二天下歸心則窺邊之戎不足為患梗命之寇將復何憂偃武修文其則不遠陛下若不納愚懇且貴因循臣實不敢保家陛下豈能安國忠言利行良藥愈病伏惟陛下圖之臣今戎事已安糧儲且繼深願一至闕下披露心肝再覩聖顏萬死無恨臣欲公然進發慮恐將士留連臣今便託巡晉絳等州於彼遷延且住謹遣押衙開府儀同三司試太常卿張休臧先進書兼口奏事伏惟陛下覽臣此書知臣誠懇特垂聖斷勿議近臣待臣如初浮謗不入臣當死節王命誓酬國恩仍請遣一介專使至絳州問臣臣即便與同行冀獲蹈舞軒陛鄙臣愚慮不顧死亡輕觸天威戰汗無地懷瓘海陵人開元中官鄂州司馬翰林院供奉昔庖犧氏畫卦以立象軒轅氏造字以設教至於堯舜之世則煥乎有文章其後盛於商周備夫秦漢固夫所由遠矣文章之為用必假乎書書之為徵期合乎道故能發揮文者莫近乎書若乃思賢哲於千載覽陳迹於縑謀猷在覿作事粲然言察深衷使百代無隱斯可尚也及夫身處一方含情萬里摽拔志氣黼藻精靈披封覩迹欣如會面又可樂也爾其初之微也蓋因象以瞳朧眇不如其變化範圍無體應會無方考沖漠以立形齊萬殊而一貫合冥吸至精資運動於風神頤浩然於潤色爾其終之彰也流芳液於筆端忽飛騰而光赫或體殊而勢接若雙樹之交葉或區分而氣運似兩井之通泉麻蓬相扶津澤潛應離而不絶曳獨繭之絲卓爾孤標竦危峰之石龍騰鳳翥若飛若驚雷烻耀火蒦離披爛熳翕如雲布曳若星流朱焰緑煙乍合乍散飄風驟雨雷怒霆激吁可駭也信足以張皇當世軌範後人矣至若磔髦竦骨裨短截長有似夫忠臣抗直補過匡主之節也矩折規轉却密就疏有似夫孝子承順慎終思遠之心也耀質含章或柔或剛有似夫哲人行藏知進知退之行也固其發迹多端觸變成態或分鋒各讓或合勢交侵亦猶五常之與五行雖相剋而相生亦相反而相成豈物類之能象實微妙而難名詩云鼓鐘欽欽鼓瑟鼓琴笙磬同音是之謂也使夫觀者玩迹探情循由察變運思無已不知其然王褱寶盈矚坐啓東山之府明珠曜掌頓傾南海之資雖彼迹已緘而遺情未盡心存目想欲罷不能非夫妙之至者何以及此且其學者察彼規模采其元妙技由心付暗以目成或筆下始思困於鈍滯或不思而製敗於脫略心不能授之於手手不能受之於心雖自已而可求終杳茫而無獲又可怪矣及乎意與靈通筆與冥運神將化合變出無方雖龍伯挈鰲之勇不能量其力雄圖應籙之帝不能抑其高幽思入於毫間逸氣彌於宇內鬼出神入追虛捕微則非言象筌蹄所能存亡也夫幼童而守一藝白首而後能言固不可恃才曜識以為率爾可知也且知之不易得之有難千有餘年數人而已昔之評者或以今不逮古質殊醜妍推察疵瑕妄增羽翼自我相物求諸合已悉為鑒不圓通也亦由倉黃者唱首冥昧者繼聲風議混然罕詳孰是及兼論文字始祖各執異端臆説蜂飛竟無稽古蓋眩如也懷瓘質被愚蒙識非通敏承先人之遺訓或紀録萬一輒欲芟夷浮議揚宀隹古今拔狐疑之根解紛拿之結考窮乖謬敢無隱於昔賢探索幽微庶不欺於元匠爰自黃帝史籀蒼頡迄於皇朝黃門侍郎盧藏用凡三千二百餘年書有十體源流學有三品優劣今敘其源流之異著十贊一論較其優劣之差為神妙能三品人為一傳亦有隨事附著通為一評究其臧否分成上中下三卷名曰書斷其目録如此庶儒流君子知小學亦務焉論曰文字者總而為言若分而為義則文者祖父字者子孫察其物形得其文理故謂之曰文母子相生孳乳寖多因名之為字題於竹帛則目之曰書文也者其道煥焉日月星辰天之文也五嶽四瀆地之文也城闕朝儀人之文也字之與書理亦歸一因文為用相須而成名言諸無宰制㣥有何幽不貫何遠不經可謂事而應博範圍宇宙分別陰陽川原高下之可居土壤沃瘠之可植是以八荒籍焉綱紀人倫顯明正體君父尊嚴而愛敬盡禮長幼班別而上下有序是以大道行焉闡墳典之大猷成國家之盛業者莫近乎書其後能者加之以元妙故有翰墨之道生焉世之賢達莫能珍貴時有吏部蘇侍郎晉兵部王員外翰俱朝端英秀詞場雄伯王謂僕曰文章雖久遊心翰墨近甚留意若此妙事古來少有知者今擬討論之欲造書賦兼與公作書斷後序王僧虔雖有賦王儉製其序殊不足動人如陸平原文賦實為名作若不造極境無由伏後世人心不知書之深意與文若為差別雖未窮其精微粗欲知其梗槩公試為薄言之僕答曰深識書者唯觀神彩不見字形若精意元覽則物無遺照何有不通王曰幸為言之僕曰文則數言乃成其意書則一字已見其心可謂得易之道欲知其妙初觀莫測久視彌珍雖書已緘藏而心追目極情猶眷眷者足為妙矣然須考其發意所由從心者為上從眼者為下先其草創立體後其因循著名雖功用多而有聲終天性少而無象同乎糟粕其味可知不由靈臺必乏神氣其形悴者其心不長狀貌顯而易明風神隱而難辨有若賢才君子立行立言言則可知行不可見自非冥心元照閉目深視則識不盡矣可以心契非可言宣別經旬月後見乃有愧色云書道亦太元微翰與蘇侍郎初並輕忽之以為賦不足言者今始知也極難下語不比於文賦書道尤廣雖沉思多日言不盡竟竟不能成僕謂曰員外用心尚疏在萬事皆有細微之理而況乎書凡展臂曰尋倍尋曰常人間無不盡解若智者出乎尋常之外入乎幽隱之間追虛捕微探奇掇妙人縱思之則盡不能解用心精粗之異有過於是心若不有異照口必不能異言況有異能之事乎請以此理推之後見蘇云近與王員外相見知不作賦也詩云引喻少語不能盡會通之識更共觀張所商宀隹先賢書處看見所品藻優劣二人平章遂能觸類比興意且無限言之無涯古昔已來未之見也若其為賦應不足難蘇且説因謂僕曰看公於書道無所不通自運筆固合窮於精妙何謂鍾王頃爾遼濶公且自評書至何境界與誰等倫僕答曰天地無全功萬物無全用妙理何可備該常歎書不盡言僕雖知之於言古人得之於書且知者博於聞見或可能知得者非假以天資必不能得是以知之與得猶書之比言俱有雲塵之懸所令自評敢違雅意夫鍾王真行一古一今各有自然天骨有千里之迹邈不可追今之自然可以比於虞褚而已其草諸賢未盡之得唯張有道創意物象近於自然又精熟絶倫是其長也其書勢不斷絶上下鉤連雖然如鐵並集若不能區別二家尊幼混雜百年檢探何知是其短也夫人識在賢名用在斷割不分涇渭餘何足云僕今所制不師古法探文墨之妙有索萬物之元精以筋骨立形以神情潤色雖迹在塵壤而志出雲霄靈變無常務於飛動或若擒虎豹有強梁拿攫之形若執蛟螭見蚴蟉盤旋之勢探彼意象入此規模忽若電飛忽疑星墜氣勢生乎流便精魄出乎鋒芒如觀之欲其駭目驚心肅然如可畏也數百年內方擬獨步其間自評若斯僕未審如何也蘇笑曰令公自評何乃自飭文雖矜耀理亦兼通達人不已私盛德亦微損其後僕賦成往呈之遇禇恩光萬希莊包融並會衆讀賦訖多有賞激蘇謂三子曰晉及員外俱造書賦歷旬不成今此觀之固非思慮所際也萬謂僕曰文與書被公與陸機已把斷也世應無敢為賦者蘇曰此事必然也包曰知音看文章所貴言得失其何為競悅耳而諛面此賦雖能豈得盡善無今而乏古論書道則妍華有餘考賦體則風雅不足才可共梁已下來並轡未得將宋已上齊驅此議如何褚曰誠如所評賦非不能然於張當分之中乃小小者耳其書斷三卷實為妙絶猶蓬山滄海吐納風雲禽獸魚龍于何不有見者莫不心醉後學得漁獵其中實不朽之盛事夫翰墨之妙多以身後騰聲二王之書當世見貴獻之嘗與文帝十許紙題最後云下官此書甚合作願聊存之此書為桓元所寶元愛重二王不能釋手乃撰縑素及紙書正行之尤美者各為一帙嘗置左右及南奔雖甚狼狽猶以自隨將敗並投於江晉代裝書真草渾雜背紙皺起蔚宗裝持微為小勝宋孝武又使徐爰持獲十紙為一卷明帝料閲舊閟并遣使三吳鳩集散逸詔虞和巢尚之徐希秀孫奉伯等更加編次咸以二文為度二王縑素書珊瑚軸二帙二十四卷紙書金軸二帙二十四卷又紙書玳瑁軸五帙五十卷并金題玉燮織成帶又扇書二卷又紙書飛白章草二帙十五卷並旃檀軸又紙書戲字一帙十二卷並書之冠冕也自此以下別有三品書凡五十二帙五百二十卷並旃檀軸其新購獲者為六帙一百二十卷既經喪亂各所遺失齊高帝朝書府古迹唯有十二帙以示王僧虔仍更就求散逸僧虔以帙中所無者得張芝索靖衛伯儒吳大皇帝景帝歸命侯王導王洽王珉張翼桓元等十卷其與帙中所同者王恬王珣王凝之王徽之王允之並奏入祕閣梁武帝尤好圖書搜訪天下大有所獲以舊裝堅強字有損壞天監中敕朱徐僧權唐懷允姚懷珍沈熾文等拆而裝之更加題檢二王書大凡七十八帙七百六十七卷並珊瑚軸織成帙金題玉燮侯景篡逆緘在書府平侯景後王僧辨搜括並送江陵承聖末魏師襲荊州城陷元帝將降其夜乃集古今圖書十四萬卷并大小二王迹遣後閣舍人高善寶焚之吳越寶劍並將作斫柱乃嘆曰蕭世誠遂至於此文武之道今夜窮乎歷代祕寶並為煨燼矣周將于謹普六茹忠等並托拾遺逸凡四十卷將歸長安大業末煬帝幸江都祕府圖書多將行從中道船沒大半淪棄其間得存所餘無幾弒逆之後並歸宇文化及至遼城為竇建德所破並皆亡失留東都者後入王充充平始歸天府貞觀十三年敕購求右軍書並貴價酬值四方妙迹靡不畢至敕起居郎褚遂良校書郎王知敬等於元武門西長波門外料內出右軍書共相參校令典儀王行真裝之梁朝舊裝紙見在者但裁翦而已右軍書大凡二千二百九十紙裝為十三帙一百二十八卷真書五十紙一帙八卷隨木長短為度行書二百四十紙四帙四十卷四尺為度草書二千紙八帙八十卷以一丈二尺為度並金鏤雜寶裝軸織成帙其書每縫皆用小印印之其文曰貞觀大令書不之購也天府之內僅有存焉古之名書歷代帝王莫不珍寶齊宋以前大有散失及梁武帝鳩集所獲尚不可勝數並珊瑚軸織成帙金題玉燮二王書大凡一萬五千紙元帝狂悖焚燒將盡文皇帝盡價購求天下畢至大王真書唯得五十紙行書二百四十紙草書二十紙並以金寶裝飾今天府所有真書不滿十紙行書數十紙草書數百紙共有二百一十八卷小王四十卷張芝一卷張昶一卷並檀軸錦標而已既所不尚散在人間或有進獻多推於翰林雜書中玉石混居薰蕕同器然書迹不易得寶之如玉棄之如土豈徒書也人亦如之用行舍藏言行之間不可玷缺亦猶蘭桂雖在幽隱不以無人而不芳也往在翰林中見古鐘二枚高二尺圍尺餘上有古人三百許字紀夏禹功績字皆紫磨金鈿光彩射人似大篆而神彩驚人非其時不敢聞奏棄於泥土中與瓦礫同也然濫吹之事其來久矣且如張翼及僧惠式效右軍時人不能辨近有釋智永臨寫草帖幾欲亂真至如宋朝多學大令其康昕王僧虔薄紹之羊欣等欲混其臭味是以二王書中多有偽迹好事所蓄尤宜精審倘所寶同乎燕石翻為有識所嗤也乾元三年五月日録夫人工書須從師授必先識勢乃可加功功勢既明則務闕二字遲止分矣無繫拘跔拘跔既亡求諸變態之旨在於奮研之理資於異狀異狀之變無溺荒僻荒僻去矣務於神彩神彩之至幾於元微則宕逸無方矣設乃一向規矩隨其工拙以追肥瘦之體疏密齊平之狀過乃戒之於速留乃畏之於遲進退生疑否臧不決運用迷於筆前震動惑於手下若此欲速造元微未之有也今論點畫偏傍用筆向背皆宗鍾元常王逸少兼遞代傳變各有所由備其軌範並列條貫昔仲尼修書始自堯舜堯舜王天下煥乎其有文章文章發揮書道尚矣夏殷之世能者挺生秦漢之間諸體間出元猷冥運妙用天資追虛捕微鬼神不容其潛匿感通應變言象不測其存亡奇寶盈乎東山明珠溢乎南海其道有貴而稱聖其迹有祕而莫傳理不可盡之於詞妙不可窮之於筆非夫通元達微何可至於此乎乃不朽之盛事故敘而論之夫草樹各務生氣不自埋沒況禽獸乎況人倫乎猛獸鷙鳥神彩各異書道法此其古文篆籀時罕行用者皆闕而不議議者真正藳草之間或麟鳳羽毛龜龍介甲亦無所不録其有名迹俱顯者一十九人列之於後有好事公子頻紆雅顧問及自古名書頗為定其差等曰可謂知書矣夫丹素異好愛惡罕同若鑒不圓通則各守封執是以世議紛揉何不制其品格豁彼疑心哉且曰公子貴斯道也感之乃為其估貴賤既辨優劣了然固取世人易解遂以王羲之為標準如大王草書字值一百五十字乃敵一行行書三行行書敵一行真正偏帖則爾至今如樂毅黃庭畫贊纍表告誓等但得成篇則為國寶不可計以字數或千或萬惟鑒別之精也他皆倣此近日有鍾尚書紹京亦為好事不惜大費破産求書計用數百萬貫錢唯市得右軍行書五紙不能致真書一字崔張之迹固乃寂然唯天府之內僅有存焉如小王書所貴合作者若藳行之間有興合者則逸氣蓋世千古獨立家尊才可為其弟子爾子敬年十五六時嘗白逸少云古之章草未能宏逸頓異真體今窮偽略之理極草縱之致不若藳行之間於往法固殊大人宜改體逸少笑而不答及其業成之後神用獨超天姿特秀流傳易志在驚奇峻嶮高深起自此子然時有敗纍不顧疵瑕故減於右軍行書之價可謂子為神俊父得靈和父子真行固為百代之楷法然文質相沿立其三古貴賤殊品置其五等三古者篆籀為上古鍾張為中古羲為下古上古但有其真中古乃曠世奇迹可貴可重有購求者宜懸之千金或時不尚書薰蕕同器假如委之衢路猶可字償千金其杜度崔瑗可與伯英價等然志乃尤古力亦漸大唯妍媚不逮於張芝衛瓘可與張為兄弟索靖則雄逸過之且以右軍真書妙極又人間切須是以價齊中古古遠稀世非無降差崔張玉也逸少金也大賈則貴其玉小商則重其金膚淺之人多任真耳但知以王書為最真草一概略無差殊豈悟右軍之書自有五等蓋一味之嗜五味不同殊音之發契物斯失方類相襲且或如彼况書之臧否情之愛惡無偏乎若毫釐較量誰驗準的推其大率可以言詮觀昔賢之評書或有不當王僧虔云亡從祖中書令筆力過子敬者君子周而不比乃有黨乎梁武帝云鍾繇書法十有二卷世之書者多師二王元帝逸迹曾不睥睨競巧趨精細殆同神機逸少至於學鍾藝巧及其獨運意疏字緩譬猶楚音夏習不能無楚子敬之不逮真亦劣章草然觀其行草之會則神勇蓋世兄之於父猶擬抗行比之鍾張雖勍敵仍有擒孟之勢夫天下之能事悉難就也假如效蕭子雲書雖則童孺但至效數日見者無不云學蕭書欲窺鍾公其墻數仞罕得其門者小王則若驚風拔樹大力移山其欲效之立見僵仆可知而不可得也然小王嘗與謝安書意必珍録乃題後答之亦以為恨或云安問子敬君書何如家君答云固當不同安云外論殊不爾又云人那得知此乃短謝公也羊欣云張字形不及古自然不如小王虞和云古質而今妍數之常愛妍而薄質人之情鍾張方之二王可謂古矣豈得無妍質之殊父子之間又為今古子敬窮其妍妙固其宜也並以小王居勝達人通論不其然乎羊欣云右軍古今莫二虞和云獻之始學父書正體乃不相似至於筆絶章草殊相擬類筆迹流澤婉轉妍媚乃欲過之王僧虔云獻之骨勢不及父媚越過之蕭子良云崔張以來歸美於逸少僕不見前古人之迹計亦無過之孫過庭云元常專工於隸書伯英猶精於草體彼之二美而羲獻兼之並有得也夫椎輪為大輅之始以椎輪之朴不如大輅之華蓋以拙勝工豈以文勝質若謂文勝質諸子不逮周孔復何疑哉或以法可傳則輪扁不能授之於子是知一致而百慮異軌而同奔鍾張雖草創稱能二王乃差池稱妙若以居先則勝鍾張亦有所師固不可文質先後而求之蓋一以貫之求其合天下之達道也雖則齊聖躋神妙各有最若真書古雅道合神明則元常第一若真行妍美粉黛無施則逸少第一若章草古逸極致高深則伯度第一若章則徑骨天縱草則變化無方則伯英第一其問備精諸體唯獨右軍次至大令然子敬可謂武盡美矣未盡善也逸少可謂韶盡美矣又盡善也然此五賢各能盡心而躋於聖或有侮毀亦猶日月之蝕無損於明白雲在天瞻望悠邈固同為終古獨絶百世之模楷高步於人倫之表棲遲於墨妙之門不可以規矩其形律呂其度鵬搏龍躍絶迹霄漢所謂得元珠於赤水矣其或繼書者雖百世可知然史籀李斯即字書纍葉之祖其所製作並神妙至極蓋無等夷八分書則伯喈制勝出世獨立誰敢比肩至如崔及小張韋衛皇索等雖則同品不居其最並不備載較量然各峻彼雲峯增其海派使後世資瞻仰而露潤焉趙一有貶草之論仍笑重張芝書為祕寶者嗟夫道不同不相為謀夫藝之在己如木之加實草之增葉繪以衆色為章食以五味而美亦猶八卦成列八音克諧聾瞽之人不知其謂若知其故耳想心識自該通審其不知則聾瞽者耳庾尚書以臧否相推而列九品升阮研與衛瓘索靖韋誕皇象鍾會同居第三等此若棠杜之樹植橘柚之林又抑薄紹之與齊高帝等三十人同為第七等亦猶屈鹽梅之量處掾屬之伍李夫人以程邈居第一品且書傳所載程創為隸法其於工拙蔑爾無聞遺迹又無何以知其品第又云梁氏石書雅敬於韋蔡以梁比蔡豈不懸絶又張昶伯英之弟妙於草隸八分混兄之書故謂之亞聖衛恆兼精體勢時人云得伯英之骨並居第四仍與漢王同流又黜桓元謝安蕭子雲釋智永陸柬之等與王知敬同居第五等若此數子豈與埒能嗜好不同又加之以言况可盡之於剛柔消息貴乎適宜形象無常不可典要固難評也蕭子雲言欲作二王論草隸法言不盡意遂不能成又云頃得書意轉深點畫之間所言不得盡其妙者事事皆然誠哉是言也藝成而下德成而上然書之為用施於竹帛千載不朽亦猶愈沒沒而無聞哉萬事無情勝寄在我苟視迹而合趣或循幹而得人雖身沈而名飛冀托之以神契每見片善何慶如之懷瓘恨不果遊目天府備觀名迹徒勤勞乎其所未聞祈求乎其所未見今録所聞見粗如前列學慙於博識不逮能繕奇纘異多所未盡且如抱絶俗之才孤秀之質不容于世或復何恨故孔子曰博學深謀而不遇者衆矣何獨某哉然識貴行藏行忌明潔至人晦迹其可盡知開元甲子歲廣陵臥疾始焉草創其觸類生變萬物為象庶乎周易之體也其一字褒貶微言勸戒竊乎春秋之意也其不虛美不隱惡近平馬遷之書也冀其衆美以成一家之言雖知不知為上然獨善之與兼濟取捨其為孰多童蒙有救思盈半矣且二王既沒書或在茲語曰能言之者未必能行能行之者未必能言何必備能而後為評歲洎丁卯荐筆削焉夫卦象所以陰隲其理文字所以宣載其能卦則渾天地之窈冥祕鬼神之變化文能以發揮其道幽贊其功是知卦象者文字之祖萬物之根衆學分鑣馳騖不息或安其所習毀所不見終以自蔽也固須原心反本無漫學焉今欲稽其濫觴不可遵諸子之非棄聖人之是先賢説文字所起與八卦同作又云八卦非伏羲自重夫易者太古之書夫子之文章可得而聞也彌綸乎天地錯綜乎四時究極人神盛德大業也子曰學以聚之問以辨之蓋欲討論根源悉其枝派自仲尼沒而微言絶諸儒之説是或不經左邱明恥之愧無獨斷之明以釋天下之惑孔安國云宓羲造書契代結繩非也厥初生人君道尚矣應而不求為而不恃執大象也逮乎伏羲氏作始定人道辨乎臣子伏而化之結繩而治孔子曰三皇伯世叶神無文洛乙糾命頡字胥合又班固云庖犧繼天而王為百王先並是也易曰庖犧氏之王天下也作結繩而為網罟以畋以漁蓋取諸離離者麗也日月麗乎天百穀草木麗乎地重明以麗乎正乃化成天下離也者明也萬物皆相見南方之卦也聖人南面而聽天下向明而理蓋取諸此也庖犧神農氏沒軒轅氏作始造圖書禮樂度數甲子律歷自開闢之事皆先聖傳流於口黃帝已後紀録言之無幾故春秋國語唯發明五帝太史公敘黃帝顓頊以下事孔子撰書始自堯舜尚年月闕然詩人所述起乎虞氏其可知也巢燧之時淳一無教故言上古昔者俱是伏羲神農之時言後世聖人者即黃帝堯舜之際易曰上古結繩以理後世聖人易之以書契此猶太陽一照衆星沒矣史記及漢書皆云文王重八卦為六十四卦又帝王世紀及孫盛等以為神農夏禹重之並非也夫八卦雖理象已備尚隱神功引而伸之始通變吉凶成其妙用觸類而長天下之能事畢矣故易曰聖人立象以盡意設卦以盡情八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣伏羲自重之驗也又曰昔者聖人之作易也觀變於陰陽而立卦發揮於剛柔而生爻是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦六位而成章又伏羲自重之驗也若以後世聖人易之以書契謂伏羲即昔者聖人之作易也謂誰矣則知伏羲自重八卦不造書契煥乎可明不至疑惑也又曰河出圖洛出書聖人則之孔安國云河圖八卦是洛之九疇馬融王肅姚信等並云得河圖而作易禮含文嘉曰伏羲則龜書乃作八卦並乘流而逝不討其源滋誤後生深可歎息去聖久矣百家衆言自古非一正史之書不經宣尼筆削則未可全是况儒者臆説耶悠悠萬載是非互起一犬吠形百犬吠聲一人措虛百人傳實按龍圖出河龜書出洛今或云法龍圖而作卦或云則龜書而畫之假欲遵之何者為是案左傳庖犧氏有龍瑞以龍紀官非得八卦八卦若先列於河圖又文王等重之則伏羲何功於易也又夫子不言因圖而畫卦自黃帝堯舜及周公攝政時皆得圖書河以通乾出天包雒以流川吐地符是知有聖人膺運則河洛出圖書何必八卦九疇九疇九者天始錫禹而黃帝已獲洛書易曰蓍龜神物聖人則之然伏羲豈則蓍龜而作易言聖人者通謂後世易經三古不獨指伏羲也夫蓍龜者或悔吝有憂虞之象或得失有吉凶之徵或否泰有陰陽之辭或剛柔有變通之理若河圖洛書者或天地彑倫之法或帝王興亡之數或山川品物之制或治化合神之符故聖人則之而已孔子曰河不出圖洛不出書吾已矣夫是也故知文字之作確乎權輿十體相沿互明創革萬事皆始自微漸至於昭著春秋則寒暑之濫觴爻畫則文字之兆眹其十體內或先有萌牙今取其昭彰者為始祖夫道之將興自然元應前聖後聖合矩同規雖千萬年至理斯會天或垂範或授聖哲必然而出不在考其甲之與乙耶按道家相傳則有天皇地皇人皇之書各數百言其文猶在像如符印而不傳其音指審爾則八卦未為雲孫矣况古文乎且戎狄異音各貌會於文字其指不殊禽獸之情悉應若是觀其趣向不遠於人其有知方來辨音節非智能而及復何所學哉則知凡庶之流有如草木鳥獸之類或蘊文章又霹靂之下乃時有字或賜貺之瑞往往銘題以古書考之皆可識也夫豈學之於人乎又詳釋典或沙劫已前或他方怪俗云為事况與即意無殊是知天之妙道施於萬類一也但所感有淺深耳豈必在乎羲軒周孔捋釋老之教乎况論篆籀將草隸之後先乎縷而分之則如彼總而言之其若此乎臣聞形見曰象書者法象也心不能妙探於物墨不能曲盡於心慮以圖之勢以生之氣以和之神以肅之合而裁成隨變所適法本無體貴乎會通觀彼遺蹤悉其微旨雖寂寥千載若面奉徽音其趣之幽深情之比興可以默識不可言宣亦猶冥密鬼神有矣不可見而以知啓其元關會其至理即與大道不殊夫經是聖文尚傳而不祕書是妙迹乃祕而不傳存歿光榮難以過此誠不朽之盛事大篆者史籀造也廣乎古文法於烏迹若鸞鳳奮翼虬龍掉尾或花草口咢相承或柯葉敷暢徑直如矢宛曲若弓銛利精微同乎神化史籒是其祖李斯蔡雍為其嗣小篆者李斯造也或鏤纎屈盤或懸針狀貌鱗羽參差而互進圭璧錯落以爭明其勢飛騰其形端嚴李斯是祖曹喜蔡雍為嗣八分者王次仲造也點畫發動體骨雄異作威投戟騰氣揚波貴逸尚奇探靈索妙可謂蔡雍為祖張昶皇象為子鍾繇索靖為孫隸書者程邈造也字皆真正曰真書大率真書如立行書如行草書如走其於學趣蓋有殊焉夫學草行分不一二天下老幼悉習真書而罕能至其最難也鍾繇法於大篆措思神妙得其古風亦有不足傷於疏瘦王羲之比鍾繇鋒芒峻勢多所不及於增損則骨肉相稱潤色則婉態妍華是乃過也王獻之遠減於父鋒芒往往直筆而已鋒芒者若犀象之有牙角婉態者若蛟龍之恣盤遊夫物負陰而抱陽書亦外柔而內剛緩則乍纎急則若滅修短相異巖谷相傾險不至崩跌不至失此其大略也可謂元常為兄逸少為弟子敬為息行書者劉德升造也不真不草是曰行書晨雞踉蹡而將飛暮鴉聯翩而欲下貴其家承躡不絶氣候通流逸少則動合規儀調諧金石天姿神縱無以寄辭子敬不能純一或行草雜糅便者則為神會之間其鋒不可當也宏逸遒健過於家尊可謂子敬為孟逸少為仲元常為季草書者張芝造也草乃文字之末而伯英創意庶乎文字之先其功鄰乎篆籒探於萬象取其元精至於形似最為近也字勢生動宛若天然實得造化之姿神變無極然草法貴在簡易而此公傷於太簡也逸少雖損益合宜其於風骨精熟去之尚遠伯英是其祖逸少是其父子敬是其子若乃無所不通獨質天巧耀今抗古百代流行則逸少居最所以然者古質今文世賤質而貴文文則易俗合於情深識者必考之古乃先其質而後其文質者如經文者如緯若鍾張為枝幹二王為華葉美則美矣如彼桃李戛兮鏗兮合乎宮徵磊落崑山之石嵯峨碧海之波奔則激電飛空頓則懸流注壑雖貫珠之一一亦行雁之聯聯求之於希微見之於無物或儼兮其容或敦兮若朴或煥兮若冰之將釋然後為得矣故學真者不可不兼鍾學草者不可不兼張此皆書之骨也如不參二字之法欲求於妙不亦難乎若有能越諸家之法度草隸之規模獨照靈襟超然物表學乎造化創開規矩不然不可不兼於鍾張也蓋無獨斷之明則可詢於衆議捨短從長固鮮有敗書亦探諸家之美况不遵其祖先乎臣數對龍顏承聖旨修書擬教皇子小學亦在幼年又承諸王學書不習古本今不遇古理在不疑如學文章只讀今人篇什不涉經籍豈成偉器又如不知東都惟須指示洛陽之道日行遠近隨其筋力若令蹇者引去自然不越其前亦猶局驥子於櫪中閉鴛雛於籠下而望其遼遠實謂難乎若使其出籠去櫪刷徑翮整蘭筋垂長風躡修路可以摩霄逐日豈惟千里萬里哉如人面不同性分各異書道雖一各有所便順其情則業成達其衷則功棄豈得成大名者哉夫得射法者箭則中物而深入為勢有餘矣不得法者箭乃掉而近物且不中入固不深為勢已盡矣然執筆亦有法若執筆淺而堅掣打徑利掣三寸而一寸著紙勢有餘矣若執筆深而束牽三寸而一寸著紙勢已盡矣其故何也筆在指端則掌虛運動適意騰躍頓挫生氣在焉筆居半則掌實如樞不轉制豈自由轉能旋回乃成稜角筆既死矣寧望字之生動獻之年甫五歲羲之奇其把筆乃潛自後掣之不脫幼得其法此蓋生而知之是故學必有成則無體欲探其奧先識其門有知其門不知其奧未有不得其法而得其能夫好事之人廣求名書以教其子察其所入便遣習之亦如商人以停百貨色目既衆必有善於人者所貴多本本立道生貧者咨嗟必不能遂伏惟陛下有萬國之富而同庶人之貧天府妙書寶惜何用若恐損污真迹拓本亦可師模寸有所長自古大有佳手各稟異氣亦可參詳伏願每季之間一兩度悉召諸王遍示古迹商榷諸家工拙必大間悟心靈習其所便從此豹變冰寒於水昔有誠信况復天人神縱者哉豈可許鍾張二王獨高於往日也且一食之美惟飽其日儻一觀而悟則潤於終身夫主人示書謂之設寶縱一聽鈞天之樂覩明月之珠竟何益於人也若順其性得其法則何攻不克何業不成侍書之人惟宜指陳妙理亦如侍講敷演聖旨當今大化滂流四表無事士無棄置官盡材能臣及弟懷王褱叨同供奉臣謹進懷王褱書大小篆及八分臣書真行草合成六體自書契之作三千餘年子孫支分優劣懸隔今考其神妙捨彼繁蕪當道要書用此六體當道要字行此千文比而覩之見其始末探賢哲之深旨知變化之所由臣敢罄庸愚謹獻書論我唐四聖高祖神堯皇帝太宗文武聖皇帝高宗天皇大聖皇帝鴻猷大業列乎册書多才能事俯同人境翰墨之妙資以神功開草隸之規模變張王之今古盡善盡美無得而稱今天子神武聰明制同造化筆精墨妙思極天人或頌德銘勳函耀金石或恩崇惠縟載錫侯王赫矣光華懸諸日月然猶進而不已惟奧惟元非區區小臣所敢揚述臣聞率土作貢任其所有率身事主罄其所能心存口忠無所避就况今蕩然不諱忠臣義士咸肆其辨可謂開大通之道陛下亦以臣知於書也論於書道是臣之職知而不説用臣何為臣之所言不敢不盡假如欲學文章必先覽經籍子史其上才者深酌古人之意不録其言故陸士衡云或襲故而彌新美其語新而意古其中才者採連文兩字配言以成章將為故實有所典據其下才者模榻舊文回頭易尾或有相呈新製見模榻之文為之愧赧其無才而好上者但寫之而已書道亦然臣雖不工書頗知其道聖人不凝滯於物萬法無定殊途同歸神智無方而妙有用得其法而不著至於無法可謂得矣何必鍾王張索而是規模道本自然誰其限約亦猶大海知者隨性分而挹之先哲有云言相攻失以崇於德故上下無所不通若面是腹非護左忌右則匿惡之名尋聲而至夫馬筋多肉少為上肉多筋少為下書亦如之今之書人或得肉多筋少之法薰蕕同器十年不分寧知不有藏其知能混其體法雷同賞遇或使之然至如馬之㣥行驥子不出其外列施銜策方知逸足含識之物皆欲骨肉相稱神貌洽然若筋骨不任其脂肉者在馬為駑馬合在人為肉疾在書為墨豬推其病狀未即已也非醫緩不能為之惟題署及八分則肥密可也自此之外皆宜蕭散恣其運動然能之至難鑒之不易精察之者必若庖丁解牛目無全形折枝分理其有一點一畫意態縱橫偃亞中間綽有餘裕結字峻秀類於生動幽若深遠煥若神明以不測為量者書之妙也是曰無病勤而行之益佳其有方闊齊平支體肥腯布置逼仄有所不容稜角且形况復無像神貌昏懵氣候蔑然以濃墨為華者書之困也是曰病甚稍須毒藥以攻之古文篆籒書之祖也都無角節將古合道理亦可明蓋欲方而有規圓不失矩亦猶人之指腕促則如指之拳賒則如腕之屈理須裹之以皮肉若露筋骨是乃病也豈曰壯哉書亦須用圓轉順其天理若輒成稜角是乃病也豈曰力哉夫良工理材斤斧無迹才子敘事潛刃其間書能入流含於和氣宛與理會曲若天成刻角耀鋒無利除害萬事拙者易能者難童蒙書有稜角豈謂能也共人相知若始疏而終密者則大同始密而終疏者則大異故小人甘以壞君子淡以成耀俗之書甘而易入乍觀肥滿則悅心開目亦猶鄭聲之在聽也又若臣之事主獻小利敘小能則非大材於理無用諂諛者必有順情之説忠讜者必有逆耳之言雖知其忠而不親者以忤其意也雖知其諂而不忍疏者以會於情也惟明王聖主則能覆思審察勉循古言親近忠良增益明聖是以遠大無以淺近取稜角者也之弊薄也脂肉者書之滓穢也婆斯疾弊須訪良醫自非滌蕩心胸除其煩憒古人妙迹用思沈鬱自非冥搜不可而見固大巧若拙明道若昧泛覽則混於愚智研味則駭於心神百靈儼其如前萬像森其在矚雷電興滅光陰糾紛考無説而究情察無形而得相隨變恍惚窮深杳冥金山玉林殷於其內何奇不有何怪不儲無物之象藏之於密靜而求之或存躁而索之或失雖明目諦察而不見長策審逼而不知豈徒倒薤懸針偃波垂露而已哉是知之也蓋粗以言詮而假於説若精以心了則無寄詞心之通微貫之而已其得之者心手相應如輪扁之斫輪固言説所不能是以鍾張二王亦無言説雞鶴常鳥知夜知晨則衆禽莫之能及非蘊他智所稟性也臣之愚性或有近於雞鶴乎昔文武皇帝好書有詔特賞虞世南時又有歐陽詢褚遂良陸柬之等或逸氣遒拔或雅度溫良柔和則綽約呈姿剛節則鑑繩執操揚聲騰氣四子而已雖人已潛靈而書方曜迹考能録異頓越數朝是知君臣之間榮辱相及也帝者務尊賢貴道亦有邀虛譽以自飾聲實相半足稱賢君知道味者樂在其中矣如不知者妨於觀賞百未減一但不能割其少分耳厭飫生前之樂辜負身後之名使達人君子議之豈不惑哉且堯舜之至德不被於今時聞者欣而戴之桀紂之君毒不流於今日聞者怒而怨之名固不可不存德固不可不立當今聖化洋溢四海晏然俗且還淳書未返朴今之書者背古名迹豈有同乎視昔觀今足為龜鏡可以目擊夫物藝藝各歸其根復本之謂也書復於本上則法於自然次則歸乎篆籒又其次者師於鍾王夫學鍾王尚不繼虞褚况冗冗者哉自草隸之作書斷詳矣從宋齊已後陵夷至於梁陳執綱者失之於上據耳者惑之於下肥鈍之弊於斯為甚貞觀之際崛然又興亦至於今則脂肉稜角兼有相沿千載書之季葉亦謂澆漓之極物極則返陰極則陽必俟聖人以通其變窮則變變則通通則久事或可應庸夫儕賢哲之功道或可行明主納芻蕘之議皆謂得於時也陛下宏至聖德講論六藝邁蹤上古化行堯舜之風書盛漢魏之日臣願天下之事悉欲盡美盡善寧以書道獨能謝於前代乎然大道不足崇若忽之則工拙之一也若存之亦當年妙有固富有之謂大業日新之謂盛德伏願下明敕以召之必草澤蒙庶涓涓之流成河海菱艾之蕕為蘭杜豈非盛事豈不美矣往者屈也來者伸也不爾非今之體悉不敢來或有過之人亦不敢進夫風者聲也風以動之聲以化之固天下之風一人之化若不誨示已謂得其元珠瓦釜鐘鳴布鼓雷吼至若曲情顧旨必無過患臣深知之不忍為也志士含忠抱義百鍊不銷人皆有死無所追悔貞觀之時文臣無限蹇蹇者魏徵文皇重之良史書之後代美之夫簡兵則觸目而是擇將則萬不得一固與衆同者俗物與衆異者奇才書亦如然為將之明必不披圖講法明在臨敵制勝為書之妙必不憑文按本妙在應變無方皆能遇事從宜決之於度內者也且軍之興亡由將之明暗人之成敗惟師之賢愚智不居心則不知道不知道則無以訓人師之與將人之耳目耳目不明其可知也是以君子慎其所從白沙在泥與之同黑狂者東走逐者非一京邑翼翼四方取則俗風且行舉國相斆迷遊忘返深浪何歸仁覆子育豈不顧念伏願天醫降藥醒晤昏沈導彼迷津歸其正道弊風一變古法恆流神而化之默而通之反掌而盛行之別是疑冀夫天府之內有聖朝妙書宛然得千百數載已前氣象比肩鍾王列美竹帛微臣所願足矣陛下之能事畢矣古人有云窮則獨善其身達則兼濟天下雖陳愚見寧望可闕一字非臣所知事出聖斷人皆欲順已不欲從人者情也惟明者能以理割之且聲利之大端貴師所共有其生也風猷可嘉當代亶美其功也徽烈可紀身後垂名亦人情之何遠語曰以心聞不容針臣謂此言之良者理國其道一也有一善身之榮有一惡身之恥恐後代議今之書雖不足纍於明時終非有益昔伊尹以再飪干主意不專乎食臣以小學諷君道豈止乎書臣伏巖藪久無榮望干預求進亦非公卿薦聞陛下天聽低回勞羅草澤選材於棄木擢臣於翰林是策勵駑駘敢不竭力兢惶疑命恐塵天聽之明鴻飛冥冥無患飲啄譬如為樹置之於野則繁柯茂葉蓋其所蔭取之於材則梁棟輪轅適時為用臣違親事主移孝於忠忠不竭誠孝可知矣侍奉日近輒有評論隱而不言臣之罪也言而不隱干犯天威冀增涓塵無可顧念不能隨衆碌碌辜負國恩人皆取容寧履危懼行於正道忘生區區之心願垂聖察不勝愚直之至故獻評書藥石論云邈邈倉公軒轅之始創制文字代彼繩理粲若星辰鬱為綱紀千齡萬類如掌斯視生人盛德莫斯之美神章靈篇自茲而起古文元允太史神書千類萬象或龍或魚何詞不録何物不儲懌思通理從心所如如彼江海大波洪濤如彼音樂千戚羽旄體象卓然殊今異古落落珠玉飄飄纓組倉頡之嗣小篆之祖以名稱書遺迹石鼓李君創法神慮精微鐵為肢體虬作驂騑江海渺漫山嶽巍巍長風萬里鸞鳳于飛仙客遺範靈姿秀出奮研揚波金相玉質龍騰虎踞兮勢非一交戟橫戈兮氣雄逸楷之為妙兮備華實隸合文質程君是先乃備風雅如聆管絃長毫秋徑素體霜妍摧鋒劒折落點星懸乍發紅焰旋凝紫煙金芝瓊草萬世方傳史遊製草始務急就婉若回鸞攖如舞袖遲回縑簡勢欲飛透敷華垂實尺牘尤奇并功惜日學者為宜非草非真發揮柔翰星劒光芒雲虹照爛鸞鶴嬋娟風行雨散劉子濫觴鍾胡彌漫妙哉飛白祖自八分有美君子潤色斯文絲縈箭激電繞雪氛淺如流霧濃若屯雲舉衆仙之奕奕舞㣥鶴之紛紛誰其覃思於戲蔡君草法簡略省繁録微譯言宣事如矢應機霆不暇發電不及飛徵士已沒道愈光輝明神在享其靈有歇斯藝漫流終古無絶
