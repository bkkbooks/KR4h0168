front:
  text: 全唐文欽定全唐文卷二十帝諱隆基睿宗第三子垂拱元年生三年封楚王長壽二年降封臨淄郡王韋后矯詔稱制帝定策討亂拜殿中監唐隆元年進封平王睿宗即位立為皇太子監國延和元年七月即位纍加尊號開元天地大寶聖神文武孝德證道皇帝至德元載七月禪位册為上皇天帝在位四十五年年七十八諡曰至道大聖大明孝皇帝廟號元宗
  hash: sha256:e1f68888852a0bdd2594fa64c1fc84d97c2228eec60bf7fe657baab79b815662
  markers:
  - {type: head, offset: 11, content: 元宗皇帝, id: KR4h0168_NFKB_020-h1, level: 1}
body:
  text: 仰重華於齊政步文命之彞倫何天道之云遠亦明徵之在人迄中夏而自春遘陽而為亢雲重結而復解雨才滴而還障山祠植圭而不答田畯倚耒而怊悵京兆來奏音官撰曲將土龍而矯首請神巫而頓足彼有憑而可舉豫何抑而未許恐歲凶之及人寧天譴於我身爾乃潔齋壇墠五精是祠暴立炎赫三日為期上帝臨我衷誠不欺重泉蒸潤觸石吐滋平雲黯而鋪幕密雨森其散絲無雷無電不震不眩匪疾匪徐乍合乍踈泛草泊樹垂珠點露過闕入樓含煙雜霧或噴薄而攢集或淋漓而灌注亂積水之圓文拂微風之斜度寰海浹而康樂畎畝欣而相顧絲管合兮夜將曉芙蓉開兮日未暮原夫雨之為德也無小大之異情無高卑之不平無華朽之偏潤無臭薰之隔榮喜夫雨之今應也起一言而不舍經纍辰而廣瀉納清陰之浮涼同皓氣之飄灑感作霖於殷命諷其滂於周雅家尚知乎禮節國有望於豐霸小陽臺之神人卻大宛之走馬觀雲行而雨施吾何事乎天下朕之兄弟唯有五人比為方伯歲一朝見雖載崇藩屏而有睽談笑是以輟牧人而各守京職每聽政之後延入宮掖申友于之志詠棠棣之詩雍雍如怡怡如展天倫之愛也秋九月辛酉有鶺鴒千數棲集於麟德殿之庭樹竟旬焉飛鳴行搖得在原之趣昆季相樂縱目而觀者久之逼之不懼翔集自若朕以為常鳥無所志懷左清道率府長史魏光乘才雄白鳳辨壯碧雞以其宏達博識召至軒楹預觀其事以獻其頌夫頌者所以揄揚德業褒讃成功顧循虛昧誠有負矣美其彬蔚俯同頌云伊我軒宮奇樹青蔥藹周廬兮冒霜停雪以茂以悅恣卷舒兮連枝同榮吐緑含英曜春初兮蓐收御節寒露微結氣清虛兮桂宮蘭殿唯所息宴棲雍渠兮行搖飛鳴急難有情情有餘兮顧惟德涼夙夜兢惶慙化踈兮上之所教下之所效實在豫兮天倫之性魯衛分政親賢居兮爰遊爰處爰笑爰語巡庭除兮觀此翔禽以悅我心良史書兮比嘗聞公正直信亦不虛寡人近日頗尋典籍至於政化偏所留心女樂之徒亦擬禁斷公之所言雅符本志夫談講之務貴於名理所以解疑辨惑鑿瞽開聾使聽者聞所未聞視者見所未見爰自近代此道漸微問禮言詩惟以篇章為主浮詞廣説多以嘲謔為能遂使講座作俳優之場學堂成調弄之室嗇夫利口可以驤首先鳴太元俊才自當俯首垂翅捨茲確實競彼浮華取悅無知見嗤有識假令曹張重出馬鄭再生終亦藏鋒匿鋭閉關却掃者矣寡人今既親行齒胄躬詣講筵思聞啓沃之談庶叶溫文之德其侍講等有問難釋疑不得別搆虛言用相淩忽如有違者所司量事糾彈門下繼明嗣德王者所以承天尊祖奉先聖人所以崇孝敬上之禮著乎重華月朔之祠襲乎文命猗歟作頌發流濬哲之祥清廟升歌思表配天之業歷選前載可得而言我國家首出開元繼文膺統七代觀德至道洽於生人三后在天垂裕光於後嗣太上皇帝道超寰表功軼帝先名言不測於乾行仁智不知於日用纍讓神器非以黃屋為尊俯膺大寶蓋為蒼生屈志黎人於變淳化斯登載懷脫屣疇咨菲薄竭讓德之志天眷莫回陳拜首之誠中襟逾邈遂以寡昧祗踐宸居循顧紹庭載深寅畏爰撰初吉躬展肅雍虔肆獻之儀申大號之典神保之饗斯洽介福之道攸宣億兆同歡人祇同慶恭承聖訓申茲霈澤可大赦天下卿所進獵渭濱十韻三復研精良增嘆美夫詩者志之所以寫其心懷實可諷諭君主是故揚雄陳羽獵馬卿賦上林爰自風雅率由茲道豫頃向溫泉觀省風俗時因暇景掩渭而畋方開一面之羅式展三驅之禮躬親校獵聊以從禽豈意卿有針規輔豫不逮自非款誠夙著其孰能繼於此耶今賜卿物五十段用申勸獎卿以宰臣往知大選官人之委情寄尤切遂能端本革弊忘私徇公正色而行厝心不撓鏡巳徹則妍媸必鑒衡巳舉則輕重罔違朕遠聞之益用嘉歎今賜衣裳一副以示所懷先王務本君子知教化人成俗理國齊家必由於學矣朕往在儲宮旁求儒雅則張説褚無量等為朕侍讀詩不云乎如切如磋如琢如磨斯之謂也咸能發揮啓迪執經尊道以微言匡菲德者朕甚休之自虔奉聖訓祗膺大寶冀天下學士靡然向風實獲我心登於近侍復欲勉聽虛佇論思獻納孔子曰德之不修學之不講是吾憂也豈食而不知其旨耕而不知其耨將何以因於義求於善補朕之闕誨人罔倦哉宜令銀青光祿大夫守中書令上柱國燕國公張説銀青光祿大夫右常侍崇文館學士兼國子祭酒上柱國舒國公褚無量等公務之暇於中書與兩省侍臣講讀其有昌言至誠可體要經遠者仍令銀青光祿大夫行黃門侍郎昭文館學士上柱國中山郡開國公李乂銀青光祿大夫行中書侍郎兼知制誥上柱國成安縣開國男蘇頲與左右起居隨事編録三兩闕進朕將親覽庶施乎海內始自京師鳳沼擅鴻都之遊中書有稷下之事應須紙筆鋪設等令中書檢校供擬門下王佐之重師兵之任旁求棟幹膺此具瞻同州刺史姚元之宏略冠時偉才生代識精鑒遠正詞強學有忠臣之操得賢相之風纍踐臺衡匡益斯在頃居藩郡循良是屬載懷一德分命六官訏謨允歸文武兼濟式憑帷幄之算宜副韜鈐之委可兵部尚書同中書門下三品門下疏爵列土是稱王制大功盛德必建侯封銀青光祿大夫大理卿張暐守道恭懿飭躬明哲誠亮邦國實繁於華愛同君親忠出於孝比者潛申翊戴屢挫凶慝故以議存謀始防在慮先披荊之效不渝採葛之讒遂起粵自荒裔升於王朝追朱佑之前言深啓於天命指蕭何之舊事獨高於人傑思宏賞典用載盟書惟鄧樂郡陪京奧壤宜賜茅社永旌采地可封鄧國公賜實封三百戶餘如故主者施行門下殷命百工傅膺審象漢推三傑良屬運籌不有斯人孰賚豫弼尚書左丞張説居正合道體直理精朕昔在承華首延博望談經之際欽若讜言撝翰之間潤色鴻業屢陳匡益見嫉姦回頃雖抗迹踈遠而載懷飢渴今㣥凶巳服大猷伊始永言亮采光朕側席之期俾咨啓沃成朕濟川之望宜登鼎鉉式綜絲綸可中書令朕承纍聖之洪休荷重光之積慶昔因多難時屬遘屯寶位深墜地之憂神器有綴旒之懼事殷家國義感神祇吟嘯風雲龔行雷電致君親於堯舜濟黔首於休和遂以孟秋允升儲二旋承內禪繼體宸居拜手之請空勤讓立之誠莫展恭臨億兆二載於茲上稟聖謨下凝庶績八荒同軌瀛海無波不謂姦慝潛謀蕭牆竊發逆賊竇懷貞等並以庸妄擢在朝廷毫髮之效未申邱山之釁仍積共成梟獍將肆姦回太上皇聖斷宏通英謀獨運命朕率岐王範薛王業等躬事誅鋤齊斧一麾凶渠盡殪太陽朗耀澄氛靄於天衢高風順時厲肅殺於秋序神靈叶贊夷夏相歡四族之慝既清七百之祚方永爰承後命載闡休期總軍國之大猷施雲雨之鴻澤承乾之道既光被於無垠作解之恩思式覃於品物當與億兆同此維新可大赦天下大辟罪巳下咸赦除之邠王守禮加實封三百戶宋王成器申王成義各加實封一千戶岐王範薛王業各加實封七百戶文武官三品巳上賜爵一級四品巳下各加一階內外官人被諸道按察使及御史所通惡狀咸宜洗滌選日依資敘用大臣立事夷險不易良相升朝安危所繫兵部尚書同中書門下三品郭元振偉材生代宏量鎮時經綸文章今之王佐出入將相古之人傑夙侍帷扆疇咨廟堂思志堯舜以期管樂朕往在儲闈洎登寶位每觀其人聞義感激願判忠邪立誠慷慨密陳宏益爾其至矣朕實嘉之頃者梟獍興謀干戈作釁太上皇命朕除討元振又馳奉宸極始則賚豫為弼終則寧朕問安可謂格於皇天貫於白日元惡既翦物共為新昌言是圖朕豈忘舊宜開井邑永誓河山元振可封為代國公食實封四百戶賜物一千段以前中書侍郎王琚為戶部尚書封趙國公食實封三百戶殿中監薑皎為工部尚書封楚國公食實封五百戶太僕少卿王守一為太常卿封晉國公食實封五百戶殿中少監李令問為殿中監封宋國公食實封五百戶昔者明王之御天下也內有公卿允釐庶績外有方伯司牧㣥黎猶懼至道未孚淳風或替故有巡狩之典黜幽陟明行人之官省方察俗用能遐邇咸乂情偽無遺於變時雍率其道也朕祗膺嗣德恭守帝圖上稟過庭之謨下憑衆庶之力竭精思理兩載於茲冀逮小康漸躋至化而區宇遐曠風教未同負扆長懷責深在巳近者姦回搆釁竊起蕭牆宗社降靈應時殲殄今又恭承聖訓總統大猷率彼百官齊茲七政恐倉廩不實禮節未興吏靡息於貪殘人或滯於幽枉永言於此明發疚懷今卜征未習時邁仍遠宜分命輶軒慰撫黎庶畢構等並操履公清識見明允茂績彰於歷試嘉譽滿於周行宜膺行李載光原隰所至之處申諭朕心並令屏絶浮華敦崇仁厚務修孝弟勤事農桑耆老鰥惸征人家口不自存者咸加恤問德舉言揚惟賢是急若有良才異行藏器下僚哲人奇士隱淪屠釣審知才行灼然者各以名聞凡百牧宰洎乎吏人咸悉朕心各敬乃事勤則不匱仁遠乎哉勉矣勗之以副朕意侍中兼太子左庶子梁國公魏知古中書侍郎同中書門下三品陸象先頃屬艱虞殲殄凶醜咸能倉卒之際志不顧身訏謨之初邪莫干正有罪斯服抑惟王典無言不酬以勸臣節俾加茅土式寵鹽梅知古賜食實封二百戶物二百段象先封亠兊國公食實封二百戶賜物五百段凡有刑人國家常法掩骼埋胔王者用心自今巳後輒有屠割刑人骨肉者依法科殘害之罪無量執經傳禮敷暢微言俾豫遊夫子之門知先王之道者侍講之功也説又定策監撫謀始危言防萌屯難慮終竭節以身許國其誠動天夫爵有德封有功眷彼茂勤宜宏賞典以桓榮之稽古況蕭何之指蹤是用欽若朝經差其井賦説可封燕國公食實封二百戶無量可左散騎常侍兼國子祭酒封舒國公食實封二百戶咸雒京師建都惟舊乃眷時邁卜征斯在朕承天纂歷恭己臨人鼎俎雖甘念疲氓之不足宮室信美惕浮戶之未安事內攢於千慮心外周於萬物則知帝業初起崤函乃金湯之地天下大定河雒為會同之府周公測景實曰土中總六氣之所交均萬方之來貢引魚鹽於淮海通粳紵於吳越瞻彼雒汭長無阻飢自中宗入關於今八載省方之典久而莫修遂使水漕陸挽方春不息勞人奪農卒歲何望關東嗟怨朕實聞焉思欲寧人而休轉運館穀而就敖庾加以暑雨作害災沸秦川歲星有福祥歸豫野朕情深救弊身豈懷安博考靈心審聽輿語上奉天以為孝下利人以為忠順時而動從衆之願宜以今年十一月行幸東都凡厥有司各恭乃事至於行從兵馬供頓貯積務在撙節勿使煩勞考使選人咸令都集東都宮殿須理量加補葺不得煩人朕本為人而行非擬勞人自奉所過州縣無費黎元亦不得輒有差科旁求進獻宣布遐邇知朕意焉門下突厥可汗夫人呂氏孫氏等毳幕來賓錦車將命單于侍子榮巳列於漢庭閼氏貴人寵宜加於蠻邸呂氏可封瀚海夫人孫氏可封納款夫人主者施行門下古有知道於通精辨於物可以調陰陽節風雨者委之三事以康萬人鼎鉉之謂也司空兼揚州大都督上柱國宋王成器益州大都督兼右衛大將軍申王成義單于大都護兼右金吾衛大將軍邠王守禮等並明德茂親崇儒樂善為國翰屏當朝羽儀豈其朱茀之詩美則緇衣之詠寧止愛均花萼禮錫苴茅而巳哉必能論道經邦佐朕為政俾允升台之望宜膺補衮之闕成器可太尉兼揚州大都督成義可司徒兼并州大都督守禮可司空勳如故主者施行門下忠而獲戾時所嘆息賞以念勤邦之懿典金紫光祿大夫守尚書左僕射知軍國重事監修國史上柱國徐國公劉幽求長才偉度博聞強學周百慮以匡社稷竭一心而在廟廊故能見大義臨大節智可以不俟終日誠可以格於皇天曩者恭參誅呂款深從代宏宣王化保乂朕躬政方議於調鉉謗遂興於盈篋良相非罪空弔長沙古人有言寧恩曲突自翦元惡旋居左揆利更稱於狐偃勳莫逮於蕭何兼而有之義固無賜宜加土宇永傳帶礪可加賜食實封二百戶餘如故主者施行宋王成器溫良恭儉明允篤誠朕之元昆人之師表間者鼎席虛位臺陛俟能堅守辭讓願移成命宜聯華於補職更參議於論道可開府儀同三司門下鼓旗中軍是推元帥熊羆後徑亦屬武臣金紫光祿大夫行左散騎常侍上柱國濟南郡開國公解琬學窮經史才蘊韜略握兵之要克壯其猷右領軍衛大將軍兼檢校單于大都護鎮守大使上柱國長平郡開國公張知運久鎮邊庭備詳虜態奪劒之勇隱如敵國並師旅是習獯戎所憚陰陽勝負成誦在心山川向背若指之掌寒膠巳折秋草具肥宜屯細柳之營俾作皋蘭之氣琬可充朔方道後軍大總管知運可充朔方道後軍副大總管並準例發遣主者施行將帥之任軍國斯重禦侮干城良才是急頃武臣多闕戎政莫修聆鼓鼙以載懷筮熊羆而未遇古今一也何代無人南仲方叔之儔亦在用之而巳宜令京文武官及朝集使五品以上方舉堪充將帥者一人明揚幽側無限年位務求實用以副豫懷往者中宗違代國步微艱天祚我唐大命集於睿宗大聖貞皇帝朕以寡昧嗣守丕業虔奉遺訓不敢怠遑至天地休徵神人靈貺皆先帝聖德之餘慶朕何力之有焉至若登太行留上黨頌功業建都畿休兵太原為農脽上並國之典禮朕奉行之何足稱者而㣥臣固請紀頌衆心難違卿藻思菁華揚過其實自視虛缺為愧尤多事君之節危而不變為臣則忠二乃無赦特進趙國公李嶠往緣宗韋弒逆朕恭行戡定揖讓之際天命有歸嶠有窺覦不知順逆狀陳詭計朕親覽焉以其早負辭學纍居台輔忍而不言特掩其惡今忠邪既辨具物惟新賞罰儻乖下人安勸雖經赦令猶宜放斥矜其老疾俾遂餘生宜聽隨子虔州刺史暢赴任門下宰輔之任謨猷是屬不有大才孰康景化黃門侍郎盧懷慎貞良敦朴孝悌仁厚度量深於江海堅清邁於冰雪事皆體大詎觀非聖之書心必在公雅契維賢之典故能危言正色直道匪躬比之微管而求得説宜寵瑣闈參乎鼎座可同紫微黃門平章事入而弼政雖佇忠賢出則分憂更資循理中書侍郎同中書門下平章事三品亠兊國公陸象先體含清雅識備貞慤早修學行實允謨明三蜀稱殷一都之會重寄為邦朝難其選朕光宅四海康惠兆人乃眷所先必自於遠故端寮載舉重臣攸屬可益州大都督府長史劒南按察使道士葉法善德包貞素學究元微預覩舋萌亟申忠款宜加寵命以答懋功仍遂乃懷俾從真服可授金紫光祿大夫鴻臚卿越國公兼景龍觀主崔元暐張柬之等往以神龍之初保乂王室姦臣所忌謫居炎海流落變衰感激忠義元暐嗣子吏部郎中璩清才遠韻謹守專直柬之嫡孫毖祖考繼歿遺孤可傷彼勳業之下淪佇名賢之必復是得景倩而悲仲宣者也高皇封樂毅之後武帝求蕭何之裔斯不遠哉昭於德音緬懷前烈宜加後命璩毖並可朝散大夫朕聞天為大者孰先於育物物最靈者莫甚於愛人故樹之后王以康兆庶緬鑒前烈深為遠圖懼德之不修化之未偃寅畏夙夜如臨泉壑然則疇咨命於四嶽黜陟在乎三載既以百姓為心明非一人獨理今之牧守古稱侯伯賢者任之則循良之迹著不賢者任之則怨苦之聲作每冀精於所擇委之俞往豈時或頽靡苟且尚多何吏之殊尤寂寞不嗣靜言政要朕用憮然間歲水旱周於郡國倉廩不蓄閭閻薦飢加以黜陟頗多冗官增弊至於處置皆憑次舉當於京官內宏才通識堪致理興化者量授都督刺史等官在外藩頻有升進狀者量授京官使出入嘗均永為常式課最超等必議升選循默守常必加黜免昭昭賞罰可不慎歟昔子産相鄭以致和平曹參相齊貴於清靜清靜則不擾不擾則和平和平則不爭不爭則知恥愛費而與休息除煩而從易自當農者歸隴畝蠶者勤績紡既富而教乃克有成道德齊禮不遠斯復庶幾在位知朕此心黃門古者獫狁孔熾胸奴浸驕則設以三策雖屬備胡之典方於五材未聞去兵之義不有行者誰能捍之正議大夫行鴻臚少卿上柱國朔方軍副大總管王晙倜儻多智堅剛竭節每讀前史思齊古人辭家而志滅獯戎報國而躬先將校頃虞南牧城彼朔方蕭關洞開沙漠無事既獲全軍之利則維保塞之勞嘉其善謀必有成績昔北逐虜者任專而決外西護羌者功遂而條上用明分閫之重式副齊壇之期朝實僉諧爾其俞往可持節充朔方道行軍大總管仍兼安北大都護豐安定遠三城等軍及側近州軍宜依舊例並受晙節制其安北都護府移於中受降城安置兵須足食理藉加屯今正農時務及耕種并緣邊兵募亦委量事通融苟非切便即闕停減總處置訖奏聞即馳驛準例發遣主者施行朕聞賞有功報有德者政之急也若功不賞德不報則人何謂哉雲麾將軍檢校右驍衛將軍兼北庭都護瀚海軍經略使金山道副大總管招慰營田等使上柱國太原縣開國子郭虔瓘宣威將軍守右驍衛翊府中郎將檢校伊州刺史兼伊吾軍使借紫金魚袋上柱國郭知運等早負名節見稱義勇頃者柳中金滿偏師禦敵蕭條窮漠之外奔迫孤城之下強寇益侵援兵不至既守而戰背秋涉冬櫪馬長嘶戍人遠望謀以十勝成其九拒遂能摧日逐之遺種斬大驕之愛息豈耿恭班超獨高前史將廉頗李牧與朕同時眷言茂勳是所嘉歎信可以疇其井邑昭示遐邇俾勞臣勸而懦夫立焉虔瓘可進封太原郡開國公知運可封介休縣開國公
