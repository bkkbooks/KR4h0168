front:
  text: 全唐文欽定全唐文卷三百五十二交元宗時人
  hash: sha256:813589c1c7e3d60588949fc99b682cd0be237138c2ce3267627319bf550f5c72
  markers:
  - {type: head, offset: 14, content: 胡交, id: KR4h0168_NFKB_352-h1, level: 1}
body:
  text: 禹因山川分畫九州大河之南厥土為豫考極相方實處天下之中風雨所會陰陽所和而沖氣鍾焉其川河洛圖書之淵珍符是興其鎮嵩高孕秀生賢神靈是宅其浸㵎伊水之利環流灌溉壤沃物豐其地廣衍平夷洞達萬方輻湊朝覲貢賦道里均焉奠位宅中茲實帝王之居也高祖太宗肇造區夏據秦百二之勢襲漢累世之基定都長安以隆上京惟是洛宅雖不獲奉萬乘之駕建諸夏之本而文皇帝顧瞻歷覽眷此舊邦肇新東都作對咸秦乃以貞觀六年名洛陽宮凡體國之制仰模太紫擬象河漢者雖因隋之舊逮夫一新號名昭揭於兩觀之上則觚稜金爵璧門鳳闕熀燿改觀益隆唐家興王之氣矣太宗以神武英偉之姿一加眄睞榮名斯被在物咸飾使巍巍茲宮復取重於當世豈不韙哉開元之隆鑾輿時巡詔命儒臣宋璟馬惟白等博彙㣥書於乾元殿又即明福門外置集賢書院置學士員校讐其閒而藏書之富殆與長安大明宮集賢書院等不其盛歟臣幸預翰墨紀事迹本末載於文字臣之職也竊惟周家興於岐邠武王宅都於鎬至成王乃命周召相基定卜於茲新邑宣王中興大會諸侯纂承文武師徒狩獵詩人詠歌則洛陽於周為四方朝貢之地也尚矣太宗乃克大倣古以不廢周王迓衡之迹用宏茲賁光於中土克紹上帝匹休成周嗚呼盛哉若夫城隅廣陿之度宮庭考室之制皆不足書書是宮有先王之制者以詔後世云景明開元時官侍御史幽變生物惟微有象演伏羲之卦式載鬼一車修魯人之冊文時生二豎永言其事豈獨前聞而甲道在自專情非博應仲舒往記則謂知言干寶舊書斯為妄作爰非有象持成論衡徒折理以致詞終忤冥而速戾恍惚而見始慮阮瞻之疾彷彿有言仍多杜畿之請惟乙不弔奄及茲凶以蔡邕之形初聞有似負莊叟之患溘然無疑昆既求往於隙駒季實悲鳴於原鳥雖死同無地情切於懷而生乃有涯欲將誰咎薄言謀殺理謂無憑季明開元時官吏部員外郎聖立謨訓禮明沿襲文物大備沮勸攸先是以茂閥高勳載在王府封侯廟食克濟家聲允歸通德之門未絕謀孫之道既而鬼闞其室祖以負杖延災人告其狂太以輿屍獲譴卒哭而祔反葬而虞捨禮何觀撫事斯謬且執喪以寧戚為本謁廟以如在致誠昭穆相承自可次其神主宗祧有序焉得失乎禮文狂怪之言責則甚矣既灌之後不欲觀之環開元中進士官侍御史夫何荊山之崔嵬而美玉之在哉匿精輝於朗璞浮烟潤於崇隈連壤石以熠熠雜冰霰之皚皚未登光於瑞府畏委質於瑤臺嗟野人之屢獻而楚王之猶猜此昭昭焉曾不識寶之為寶彼默默者焉知乎才與不才於戲亂玉者珉奪朱者紫以斯為賤亦孔之恥含白虹而靡察偶烏鵲而爰抵徒嬉戲以起予非特達而知已向使早遇鄭客先逢罕氏則必待價而沽命工而理剖以為寶有珪璋之秉焉握而為珍胡瓦礫之投矣然後式我王度比於君子其故何哉用之而已類傅版築以滅跡呂垂緡而退趾忽殷帝以賚予復周王之至爾由匹夫以登良弻自孤叟而參多士豈非貴本於賤泰更於否觀彼玉之屈伸實伊人之行止則玉累形者璞人厄才者命投沙有去國之賢懷寶為問津之聖苟或秉屯受蹇雖異物而同病然而人韜素德我獨文行用晦可以為明以蒙可為養正將有待於潛隱夫何取於奔競始用仰衣冠之駿德美銓藻之鴻柄清鑒雲披虛懷冰映大拾遺寶高懸明鏡典我權衡於斯為盛別有被褐蘊真而立伊投人之或誤乃按劍而遄及昔同六鷁過宋都而退飛今隨乘鴈赴陸海而遙集振羽翰而有待搏扶搖而高戢慙巧媚以為容恥空言而取級是宜不迨敢當元圃之中玷則可磨希復白圭之什儻或傾五都以置珍獻萬乘而為執則玉乎玉乎無復向時之泣惟國之左當河之南分逶迤之舊洛漲浩漾之新潭觀其沙石中映魚龍內涵泛危槎而獨隱紛眾水以相參原夫引派潛迴疏源洞出淙石門以雷注透金塘而箭疾暝浮天漢之雲晝洗嵎夷之日雖習坎之為常乃流謙而不溢若夫正月登晦韶風報春花明上已柳暗長津出金埒之遊騎下瓊樓之美人愛清流之亹亹走香駕以轔轔樂此幽勝褉乎陽濱竭主第之羅幕盡侯家之錦茵窺浴鳥之呼伴見飛魚之觸綸既靈長於上國恒見美於斯辰若夫黛色沖融清光皛了綠苔一點疑濯髮於江波青楊四周若連帷於漢沼湛珠綵於星夜流鏡華於月曉苟形影之可觀乃妍媸而必表歲蒼茫兮寒氣升潭皎潔兮生堅冰比玉卮而逾淨對瓊華而更凝猶不若鏡室之為朗銓臺之可稱庶狂愚之可鑒知要而相承倬彼昭回鑿天而開含秋耿耿積曙皚皚水清淺而不落光逶迤而屢迴非碧海之分上即黃河之轉來萬里直繩九霄橫帶奕奕高影湯湯連瀨透垂簾於戶前飛瀑布於雲外黯如平江不動矗似長雲欲銷映東吳而寫練挂南斗而成橋氣象晶明波瀾澒洞泛濫星點紆餘月弄界黃道而宵迎落青山而曉送雖滔天而作限乃沃日而為節識示盈而必謙恒昏凝而晝滅亦猶靈烏之謝顧兔之缺適足明其舒卷夫何累乎昭晰於是張平子仰而歎曰此何靈輝若有若微杳杳迴薄茫茫是非鵲填銀而何去人取石而何依乘槎之子兮上不上弄杼之女兮歸不歸坐迴皇而曉失空白露兮霑衣國征九賦農辨三壤用先疇之犬畝則有磽肥輸當年之井稅寧均沃塉是以農扈率職夫家受田較其菑畬底以藨蓘故我疆我理爰滋翼翼之苗如梁如茨卒獲芃芃之稼藝或若此稅其可知今者倬彼萊田是稱荒隴畝方兼以三百始受一夫獲寧取於十千空勤四體雖則休於間歲易在他年徒寒耕而熱耘終費廣而收薄永言州縣是曰司存土則異宜畝何均稅必以年須賑乏事欲隨時加減於上下之閒徵納於權宜之際則謀始立化斯焉可作慢官沮法訟者奚為且使以勸農為名人以足食為本民苟可利賦亦何傷責以不應或將得罪處其非法良恐未然須從刑政之科難枉使司之例㝢開元時人不平不伏處斷皇家剗華歸素抑末敦本式稽堯典授時之政克修載歌豳頌祈年之禮尤洽是以野無曠土國絕遊人紅粟相因華黍興詠猶復二星分出四牡載馳察俗觀風勸分務穡至如分地之利易田之宜擇乎令典酌於故實若秋苗有穫則可據地而徵儻春萊不芟焉得計畝令納苟貽碩鼠之謗須寘鳴鳩之典若上田不易自有常規妄為加減誠為非法並從鳳舉之按宜正隼旟之罪寂開元初官司勳員外郎郎中我田既臧農夫是慶畝碩則播歲成厥功如茨如梁或祈於稷稼不稂不莠載嘉於曾田彼之荒萊僻在窮野芟夷未絕耒耜何施便加稅畝之徵豈厚生人之道且漳河富鄴涇水利秦人既有藏國亦云幸當今百姓為心六府修教命勸分之使崇務本之農漢苑空閒已許蕭何之請魯田厚斂見讓哀公之昏人若屢空君孰與足州縣以政刑不用輿訟是招使司以公職務平天心必稱雖假詞於給貸終失得於當官請寘明刑以鑒多士禔開元時人劃為九州咸則三壤或溝洫創制或阡陌從宜肇允萊田無聞稅畝今欲務耕興利盡地勸農驅役冗食之人示以不毛之罰則可規堰瀦一作肥瘠而辨等視舄鹵以分疆必遵桀貊之中是行什一之稅惟此州縣俱為藎臣不率古猷獨師襟抱而上下加減謂叶裒多之義據畝均收欲見無偏之迹曾不知定其可墾則奚適非宜捨彼所餘則仁將何遠欲救茲弊圖以拯人異李悝之上熟同冉求之急賦將恐事非適變狙怒惑于朝三日用不知馬力盡於劍百輶軒高責何所逃威外臺薄訴終思憲罰衡相州人臣某言臣將使之辰特奉天旨念及遺逸委臣明敭兼恤屢空令臣賙給臣謹依制命宣布遐邇承風藉響隱淪皆出考其精庀所得如右伏惟陛下恢徵士之典飾蒲車之儀昭示海內令知盛朝有寵賢之盛臣之報國志願畢矣孰知多士盈朝四門已集微臣所奏不動聖衷誠願陛下留意才難願求邦本山海惟積不厭高深芻蕘有裨伏希裁擇臣無任懇迫之至臣聞天地設險聖人則之士生懸弧其來尚矣故黃帝涿鹿之戰重華三苗之役湯伐有扈文王克崇至於不得已而用之其實一也伏惟開元神武皇帝陛下乘五聖之資踞六合之大德光天下威振百蠻四方無金革之事蓋亦久矣蠢茲凶寇東胡餘孼日者關內未通隔在荒外自相殺戮君臣無序不能獨立交臂屈膝求我國家以安之聖朝矜其輸誠且以護塞故列于朝貢編於鴻臚故再冊名王累降重主魁渠豪首靡不霑渥自開復營州二十年內部落不聳安農互商金帛山積我國家之於惠貸亦深矣而野性易動狼心不革中復背誕寇我柳城我是以有平盧之戰當為兵少城孤不暇追北盡其巢穴殘凶游魂假氣絕徼自以為黃河涇渭可以保天險懸塞沙漠可以逃靈誅陸梁窮荒迷肆不復我王師遠畧是以有黑山之討其突厥分兵助為聲援官軍既會萬弩齊發逆順不敵賢王失陣契丹東龍鍾走林奔穴甌脫不守髦頭匿光可突干挾馬浮河僅獲殘喘謂其困而知悟面縛請降而西連匈奴東搆渤海收合餘燼窺我阿降奚我是以有盧龍之師當是時也四蕃雲屯十萬雨集動兵鼓噪聲聞百里山川晝昏土木皆震勢欲朝驅降戶夕通河朔我行軍七千乘天假威靈黜之硤石斬單于之愛子熸契丹之積卒眾虜奔逃扶傷不暇於是從散約解雲卷霧消投戈棄甲莫敢迴視我降戶完然堅利而西蕃輜畜十遺半矣夫突厥乘天驕兩蕃藉其銳悍所向得志其來久矣昔漢高祖以三十萬眾猛將如雲謀臣若雨平城之下七日不食竟以計免頃萬歲通天中亦憤其不恭雷霆發怒驅熊羆之卒策貔武之將以數十萬相繼而出沒之峽中隻輪不返卒使趙定陷沒河北塗炭數十年閒瘡痏不復所以敢輕犯官軍之眾者以往事之驕我國家偏師不滿七千當十萬之寇綿險提寡揚桴而出勢同解竹兵不留行於戲前事也如彼今事也如此哉蓋順人心因神怒察地利用天時威靈之所覆而逆順不敵也然自黃龍舉烽無歲不戰驚駭我城柵虔劉我亭戌勞軼我師徒糜耗我廣輸實已四稔於茲矣若乘勝不殄無以一戎所以戰士憤惋餘怒未洩將斬踏頓以染鍔血頭曼以釁鼓彷徨北兵望烟塵而不肯返斾者久之臣以為突厥銳而逃渤海懾懼勢未敢出契丹大戰之後人馬俱羸其心不振又恃以荒遠必無我虞而諸軍蓄銳久思奮發新聞破賊無不增氣若驅而襲之可不血刃而取也臣又與侍御史王審禮節度副使烏知義及將士等僉議咸以為然議猶未決適會勅令臣討逐已準勅書當日宣布三軍之士莫不踴躍於是拔距蒙輪之伍響應投蓋超乘之卒景集節度副使右羽林軍大將軍烏知義即令都護裴旻理兵述職大閱於松林管內勇士萬人騋駒千里拔三丈者得七十匹輕幟迅走之乘鷹揚貔武之士左贏糧右持械者日越七百里朝發薊門夕宿碣石者得八千人勵以威神節以金鼓既而饒樂歸義王李詩衙官可支刺史伊覓日昏燭祿并里水扶餘者違未盧東胡雜種君長之郡左射人右射馬翼迅霆轉沙振角者二萬五千餘騎鐵甲霜野朱旗火天遂陵赤山下塞谷絕泱漭橫大漠以四月二十三日夜銜枚渡黃河質明頓兵松漠漠庭疾雷暴驚天落地動㣥兇狂顧周章自失於是三軍橫亘風偃電掃烏知義都統主中權裴旻領三千騎與宣慰計會發兵馬使內給事薊思賢副使內寺伯李安達右領軍衞翊府郎將李良玉軍前討擊副使大將軍鑰高等為先鋒中郎內供奉李先壽領馬步五千與宣慰內供奉奚官局令王尚客內供奉中郎李延光長上折衝內直臣右驍衞左郎將王抱一經畧軍副使左衞率府右郎將李永定咸寧府軍李車蒙領馬步五千與宣慰使內謁者監劉元向供奉長上折衝康太和供奉長上折衝白延宗長上果毅高處謀永寧府果毅閻鼎臣副將布折等為右翼中郎將裴倩領馬步五千與攝副使內供奉左驍衞府郎將抱忠英樂府折衝李瓚等為殿奚王李詩與內供奉長上折衝歸州刺史韓仙松衙官段志忠等統其部屬知虜掠北郡長上折衝兼儒州都督烏承恩與供奉將軍恩盧延賓平盧軍攝副使遂城縣折衝桓善珍經畧軍副使政和府果毅楊元亨軍前討擊副使果毅路順清夷軍子將英樂府右果毅樊懷璧等四面雲合煙塵俱起兩翼掩進前後夾攻數百里閒沸聲若雷波駭雲亂窮寇奪氣僵仆相藉弓不暇張戈不敢振雖蒙茸奔穴町疃走險轥轣所暨盡為鯨鯢其餘孱幼匿車惕喘穹帳烈火既焚與煙俱銷者不可勝數或遺奔迸脫扼據峻嶺聚徒嘯侶擬欲鳴吠而左縈右拂咸在彀中傷鳥惡弦舉弓皆落於是韜兵弛甲俯伏請命俘虜蔽於原野羊牛填於坑谷遺械如草流膏成川然後戮渠魁斬封豕責元歸罪祐眾啟降二十五日收獲南驅二十七日次於烏鶻都山前後大小三十一陣旗鼓所向莫不奔潰野絕遺寇萬里肅清然後頓軍休士大閱俘實約生級羊馬駞驢器械都獲三十餘萬口匹頭數其餘瀑潦奔注浮澗涉河揭厲未畢而中流汨沒不入見數者十餘二三所斬丁將豪健暴骸相藉者亦三萬餘級所焚車帳農具器械儲糧老小灰熸燼滅者不知涯極於是椎牛買酒散賞高會宣慰使內謁者監普心寂與判官掖庭局監潘進忠別勅行人李如意等銜命至便申慰諭三軍蹈舞呼聲動天將吏等令驅蠻夷而襲虜庭因寇糧以贍軍用亦降奚所勤懇也伏惟勅俘虜許戰士奚等內附賞餌因而用之且不踰時禮也羊十六萬口牛四萬頭馬四萬匹車五十乘并生級除留堪進九千人已上餘四萬眾悉降奚既以蠻夷出攻亦以蠻夷入賞俘獲數廣行程不多自振旅而旋日役數十以今月四日兵馬並平安到平盧蕃漢健兒惟六人損一人死臣聞善戰不陣良將難之臣等不才承命出師遠征勁虜二十三部落並不鈍鋒士馬完歸軍容益整非陛下神威所覆則臣等碎首必然今幸覩洪勳不勝慶快之至謹遣戰將攝副使行軍虞候總管檀州密雲府果毅都尉賜紫金魚袋車仙惲奉露布以聞其所獲首級器械別錄申上朝議大夫守左散騎侍郎河西節度經畧使營田九姓長行轉運等副使判武威郡事赤水軍使攝御史中丞賜紫金魚袋上柱國臣某破蕃賊露布事尚書兵部臣聞背施怒鄰惡貫以滿者天誅之行慶布澤德政以順者人從之況乎夷背其鄰有貫盈之罪王將服叛舉德政之役彼曲我直何可敵哉蠢茲吐蕃僻在西裔山川禽獸以處之造物者以限之於外區也我國家貞觀之際戎有微服來朝太宗因而異之啗以金帛終其身不敢近漢邊矣中宗之享國許修舊好姑務息人乃割愛主以降之至今朝廷無西顧之患洎我開元天寶聖文神武皇帝陛下嗣宅丕業文化遐被非不以德和之矣然彼戎以承數代之患晏安七十年之閒而得掠諸夷之種落猶纎草之滋蔓因怙其眾轉以作讎悉國興師犯我河隴天罰有罪大敗其眾既而戎首旋悔願得比為舅甥我皇帝以天地為心山澤含垢重使信以綏撫蓋不忍以蠻夷而疲其中國人也噫卵而翼之犬長吠主反伐勃律之屬國匿我四亂之亡人誘我石堡之城踐我蕃禾之麥多行背德是惡貫矣我皇帝怒之密發中詔使乘不虞以襲之臣以統五原之帥擁中軍之師奉聖畧憑天威以今月初六日戒嚴引高牙而出十二月會於大斗之南擇精騎五千皆蓬頭突鬢劍服之士乃遣都知兵馬使左羽林軍大將軍安波主帥之先鋒使右羽林大將軍李守義副之十將中馬軍副使折衝李廣琛等部之臣自以馬步三千於大斗建康三水張掖等五大賊路為應接別委行軍司馬大理司直攝殿中侍御史盧幼臨領步兵五百過合黎川為聲援又使大將軍渾大寧將軍契苾嘉賓各領步兵於三水賊境為掎角波主等將辭臣戒之曰爾豈不聞乎天子之怒伏尸者百萬將軍之權得專誅戮爾須自大斗南山來入取建康西路而歸當我所戰鋒可斷飛鳥若不剋於敵逗留却行汝則有大刑雖剋於敵故道而還汝亦有大刑緣隴以西賊必知懼縱為多備亦可鼓行此本出於聖謀縱舉覺亦必無慮諸將乃果於勇決進不顧身十二日至新城南吐蕃已燒盡野草列火如晝諸將曰賊果知備矣因躡其烽燧高揭旌旗氣雄雷霆聲疾風雨十五日至清海北界遇吐蕃兩軍遊奕二千餘騎波主乃使先鋒使大將軍李守義領鐵騎一千穿賊之中取首而陣又使先鋒副使郎將安貞領鐵騎二百摩賊之壘斬馘而旋又使中馬軍副使李廣琛領勃律馬騎一千攻其旁又使節度總管李朱師等領兵八百騎亢其下使右馬軍副使張仁賢以遊兵一千敵其南北東西左右橫集而兵氣初銳馬逸不止弓矢三注而連發長劍四按而無前初淫廢而苟在終蹂踐而皆盡誰為其後徒言魂魄歸天不報國恩飜聞肝腦塗地則向之為寇今已殲焉自朝至於日中凡斬二千餘級十六日進至魚海軍千里烟塵百道旗鼓波主已先遣前軍副使折衝傅光越設伏於便道及交矢石又使節度總管唐朝英等寇而偽奔戎爭追之遇伏皆死因得戮巨鯨於魚海墜封豕於鹿泉平積骸成京觀斬魚海軍大使劍具一人生擒魚海軍副使金字告身論悉諾匝生擒棄軍大使節度悉諾穀生擒遊奕副使諾匝生擒副使金字告身拱齎生擒魚海軍副使銀字告身統牙胡其餘偏裨難以盡載斬首三千級生俘千餘人牛馬羊駝八萬餘頭數獲未畢虜救潛來在山滿山在谷滿谷顧盼之際合圍數重諸將皆曰兵法所謂致之死地今則是也亦焉能陷於虜庭辱明主之深料乎於是謀夫一心戰士倍力擇強弩長㦸為外拒寘輜重生級於其內雖喜獲多急何能保其俘囚有因動而將變且驅而斬之其虜畜有力極而難致則擁而焚之候暮夜之時望歸路而突之其初也銜枚屏氣鬼神無聲既出而奮臂大呼天地搖動諸部將馳逐而元黃疑且戰且行一千餘里馬無齕草之所人無抔飲之地共食冰雪傳飡糗糧猶能夜盜虜之營使自攻殺朝拔虜之幟爭為致師凡七八日間約三百餘陣至合河之北斬得二丈之綏而莽布支更益其重兵追截我歸路安波主懼其危迫請救其後軍臣遂遣副使劉之儒等領後軍二千騎迎之會中使駱元表至臣行軍使善子雄監之同往救兵既至旌旗相望其氣益振又戰數合虜既不利夜遂逃遁臣聞軍得歸便牒安波主虜之去也必謂我不能復追之必出其不意可使安思順反戈卻入必盡擒之遂束精騎二千與之又使副使娑羅度抱一二丈城副使李可朱副之臣別差大斗軍副使烏懷愿討擊副使哥舒翰等領精騎一千應之分前麾隨閒道蔽山乘夜晨壓賊營或馬淖其妖夢之時或刃遊於假寐之際死生同泯不知其云前有朱衣旃裘保而相距首已飛於異處身猶僵而兀立不可勝紀其有漏網得逸擐甲復來恥於生降窮以死決不免戈矛以撞㧙而擁坑谷以頹填而就拉拘十不存一所以擒金銀告身副使三人斬首千餘俘囚二百餘人獲牛馬羊駝共三千餘頭匹器械新物一萬餘事謂我再剋而虜再敗矣皆會漢境一如往哲之朝善戰以來人所不覩臣試迹前事行之惟艱且李陵之兵盡矢窮緤為之虜秦人之勞師襲遠再敗其師未有如今之深入能勝歸者此乃陛下神斷之謀也聖威之被也不然豈季冬之月天地嚴凝齎孤軍十月之糧入絕域重阻之地橫跳千里連鼓數軍討而復擒歸而復襲一日三捷震天聲而凱旋臣獨輯甲兵日討軍實終當拔邏些城青地斬贊普之首以懸北闕則臣之願畢矣不勝慶忭之至謹遣某官奉露布以聞
