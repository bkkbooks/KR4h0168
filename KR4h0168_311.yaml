front:
  text: 全唐文欽定全唐文卷三百十一孫逖四
  hash: sha256:3860f15084f2222f1b8244c45f5a9fafd9ff21d93462c58b87575f5650fff4f9
body:
  text: 維開元二十五年歲次丁丑七月辛巳朔十日辛卯皇帝若曰於戲樹之外屏義在於展親修其內則禮先於擇配咨爾故右驍衞郎將獨孤禮第十二女軒冕之族通姻自久賢明之行淑問攸歸早習組紃之功備詳圖史之學實資女士以儷藩維今遣使工部尚書同中書門下三品牛仙客副使行黃門侍郎陳希烈持節冊爾為潁王妃爾其克慎威儀無忘孝教欽承國命永茂嬪風可不慎歟維開元二十五年歲次丁丑八月癸卯朔十五日丁巳皇帝若曰於戲易著于歸詩稱下嫁所以正風化厚人倫也咨爾信成公主淑慎由衷聰明形外訓以師氏頗詳環佩之儀修其婦功更習紘綖之藝日徵先近年及有行宜錫徽章俾膺茂典今遣使金紫光祿大夫兵部尚書兼中書令集賢院學士修國史上柱國晉國公李林甫副使中大夫守中書侍郎集賢院學士徐安貞持節冊爾為信成公主爾其光昭閫德宏長國風無怠厥心永綏介福可不慎與維開元二十五年歲次丁丑八月癸卯朔二十九日辛未皇帝若曰於戲好合之禮以正人倫肅雍之德用成婦道咨爾昌樂公主生知法度性與柔和亟聞彤史之言頗識采蘋之事素以為絢既閑於內則梅有其實式遵於下嫁宜膺冊書之命以備車服之庸今遣使銀青光祿大夫工部尚書牛仙客副使黃門侍郎陳希烈持節冊爾為昌樂公主爾其欽崇四教承順六姻式是大邦受茲明命可不慎歟維開元二十五年歲次丁丑九月壬申朔十一日壬午皇帝若曰於戲古之聖人垂訓作則必正內外之位以明婚姻之禮咨爾高都公主生於公宮自稟幽閒之性教以師氏更彰徽柔之則能循法度克慎言容魯館于歸沁園將啟宜膺冊命俾協典章今遣使工部尚書牛仙客副使黃門侍郎陳希烈持節冊爾為高都公主爾其自下於心增修厥德式瞻清懿永固恩榮可不慎歟維開元二十六年歲次戊寅八月丁酉朔二十二日戊午皇帝若曰於戲人倫式敘以正國風女子有行將成婦道咨爾永寧公主自幼及長終溫且惠引圖史為鏡鑑用柔和為粉澤許嫁而笄既遵於彞典備物之冊宜承於寵命今遣使金紫光祿大夫兵部尚書兼中書令李林甫副使上柱國徐安貞持節冊爾為永寧公主爾其謙恭自下淑慎為先無忝公宮之教永貽邦媛之則可不慎歟臣某言臣伏見自冬已來雨潤微少雖春候尚遠未足為災而聖慮憂勤恐妨農事靈星允答瑞雪其滂自昏達明已覩於盈尺無遠不及何止於千里既溥既霈足表西成之徵不疾不徐正符東作之候豈伊利澤更是殊祥臣等微生叨荷榮渥幸覩休慶空知抃舞無任欣躍之至謹奉表陳賀以聞臣等今日見高力士伏承陛下以春雨蹔皇慈軫念特紆鳳輦俯詣龍池祝之以聖言詰之以神理靈星允答膏澤遂盈速若影響合如符契則知聰明之德與乾道而潛通變化之功隨聖情而廣運殊祥昭著丕應難名在於微臣倍深慶悅伏望宣付國史以揚天休無任抃躍之至謹奉表陳賀以聞臣某言臣等伏見近者微旱聖情勤勞躬徇物情修禱祀於神明焦思憂人罷歡宴於良節精誠懇至上應元通果叶休徵遂成膏雨植物皆潤已霑霂之恩陰雲尚多終致滂沱之澤三農有慶萬國同歡臣等職在燮和効無涓滴久勞聖慮責且重於邱山幸遇甘霖恩實濃於卉木無任欣慶之至謹奉表陳賀以聞臣等伏見平原郡奏去月七日鑄尊容鑪上有紫雲如葢高三尺餘鑄畢方散烟焰中又依稀有一老人鬚睂皓白俯臨鑄上並繞鑪行道時聞空中傳億萬聲及鑄畢啟模相好圓滿面有自然之金色者聖心通感至道炳靈洪鑪未開殊祥累見葢呈祥瑞相表異金光烈火之中式瞻仙老無聲之地忽聽神言在前古而未聞不崇朝而薦至稠疊之慶名言所難況肇自京師至於郡國真容所鑄靈應必臻神妙無方用彰於聖壽生靈何幸永覩於昌期臣等忝居近侍倍加欣慶無任抃躍之至謹奉表陳賀以聞臣等伏見開元觀先請今月十八日鑄聖容昨夜先期普天降雨遲明展事萬里無雲及寫之際又有卿雲休氣氤氳扶日道俗咸覩移時不散伏以聖惟不測有感而必通天則無言觸類而成應陛下欽崇至道子育蒼生爰寫尊容將洪介福故得天地合氣神靈布和甘澤而達曙已晴彩雲而抱日呈瑞鎔範之際殊祥畢集實表聖明之感更彰仁壽之期臣等忝在掖垣不勝大慶無任悅豫之至臣某言臣等今日仗退後伏見會昌山上有五色雲見紅翠稠疊光彩相鮮爛若藻繪積如山岳近依湯井俯俛宸居移時不散從臣咸覩伏以雲物變態真仙所憑法駕纔上祥光已見豈惟天地合氣以表於和平固以神靈告休用彰於聖壽無任抃躍之至謹奉表稱賀以聞臣某言適內謁者監牛仙童至奉宣進止先為蒼生祈雨今日告賽不坐明日齊修不坐者涼秋已來時雨未降陛下憂勤兆庶躬自祈禱甘澤溥洽又陳昭報親紆鳳輦俯詣龍堂御膳撤鮮齊宮致潔亦既累日方申大祭禮畢之後更祝龍潭纔發德音已臻丕應仙童云其時即有青紫雲自潭而起爛熳呈祥烟熅布和勢騰晴空光映秋水即知飛龍之德變化無方聖人之感深微莫測惟茲靈貺實謂殊常臣等特賀恩榮倍增欣慶伏望宣示朝列兼付史官用垂明徵永昭盛德無任慶忭之至謹奉表陳賀以聞臣某言臣等伏見道士孫太沖奏事奉進止令中使嶭履信監臣於中嶽嵩陽觀合煉其竈中著水置炭於竈側對三却迴已經數月泥拭既密緘封並全即與縣官等對開門其炭並盡灰又別聚不動人力其藥已成初乃五色發瑞終則太陽暉於罏際又河南裴敦復所奏並奉敕令右補闕李成式往騐並同者臣聞神變無方式昭於幽贊聖心有感必騐於元通陛下至德奉天精誠契道動無不應事若合符故得煉藥之所瑞雲先見丹罏不金液自成太陽降精宜假於人工飛廉扇炭諒關於神力殊祥特異曠古未聞靈跡既彰用資於聖壽㣥生何幸永覩於昌期況在微臣實倍常品無任抃躍之至謹奉表陳賀以聞臣等伏見太原尹常濟奉今月四日紫極宮玉石聖容樣至北京其時有慶雲垂天自辰至巳輪囷紛郁萬姓咸觀者伏以靈物呈瑞神仙效靈豈伊天地之和更是壽昌之慶況太原舊國王業所興聖容纔及於近郊卿靄已彰於合契氤氳五色變汾水之白雲隱映三清類函關之紫氣上元感通品物同歡況在微臣倍深慶悅無任抃躍之至臣等伏見劉麟奏南郡李樹淩冬結實並圖及李實者惟此珍樹名應皇族元元所指用興長發之祥明靈是憑故表非常之瑞已經夏實更發冬榮霜雪而翠葉不彫斯須而朱實皆就仁及草木既叶太平之期道貴生成仍呈久視之應恭惟聖感詎可名言所以彰寶祚之靈長表天枝之碩茂遠踰海嶠來薦闕庭豈三秀之足稱何兩歧之敢喻殊祥薦至品物同歡況在臣等豈勝抃躍無任欣慶之至謹奉表陳賀以聞臣等伏見道士黃河清等奏興慶宮合鍊院內產芝草五色分輝六莖闕二字神丹入鍊而轉精禎祥應期以如答覩茲嘉瑞望宣付史官者伏以靈芝所致和氣之精著美仙經標名瑞典陛下深仁契道至德通神鍊液飛丹既啟長年之館敷華有葉遽呈三秀之祥五色有類於卿雲六莖且符於帝樂豈惟動植昭感以表於休徵固亦真仙叶應用彰於聖壽臣等忝侍軒陛倍深慶悅無任抃躍之至謹奉表陳賀以聞臣等伏見王倕奏武威郡番禾縣嘉瑞鄉天寶山周回五六里石化為麥丏在近村閭及諸郡部落自今載正月以來取食甘美益人又按圖經貞觀九年鳳凰集於此故名嘉瑞鄉其天寶山在此鄉界伏以神道設教變化無方聖人為心感通必應陛下仁霑動植澤及生靈故得地不藏寶石變為麥丏既資人食又濟邊廩成熟自因於道氣艱難不待於農功豈來麰之足方何雨粟之能喻況山符聖號用彰於萬壽鄉表瑞石允迪於前烈殊祥叶應景福攸臻臣等忝侍軒墀倍深慶悅無任抃躍之至謹奉表陳賀以聞臣等今月二十五日於易州所奏事陛下顧謂臣曰朝夕之間諸軍當有捷書至臣等愚淺莫測天心不逾數日張守珪果奏副將安祿山於檀州界破奚賊擒生斬級並獲馬牛計至數千定期不差於晷刻指事有同於符契聖惟廣運神以知來微妙之言自成於繫象元通之術不假於蓍龜精義難名前古未有臣等何幸親覩明徵驚喜之誠抃躍交集伏望宣示朝列兼付史官式昭德音永用垂範無任喜慶之至謹奉表陳賀以聞臣等比見吐蕃舉國徵兵向二十萬掘壕置柵攻逼定戎城頃因奏事陛下謂臣等曰吐蕃雖眾當即破兦計日之間捷書必至昨見皇甫惟明奏破定戎城下吐蕃賊二十萬眾並斬獲大將論莽布支頭隨狀奉進又初與賊相遇西風甚急及交鋒之後便至風迴既掃妖氛兼有慶雲見者臣聞天之討罪俟盈貫而方誅聖無不通匪常情之所及伏以西戎凶醜久負恩信敢踰絕漠來犯邊城舉國興師二十餘萬經時固守八十餘日蟻聚蛇伏狼顧鴟張據便地之井泉逼懸車之塹壘雖逆順曲直本無敵於王師而眾寡安危難預卜於人事自朝及野能不憂虞陛下神算無方睿謀先覺料此狂寇必合敗兦決祕策於禁中落奇兵於天上應期撲滅萬里廓清天聲所振已讋於四海虜將之首又懸於北闕事均符契理絕名言況合戰之時則返風破敵決勝之後則卿雲藹空大塊資其殺氣輪囷表其休色實惟聖感詎測神功凡在庶寮不勝忭躍況於臣等倍萬恆品無任慶快之至謹奉表陳賀以聞臣等伏見王忠嗣奏九姓拔悉密等斬突厥可汗首送至朔方軍者伏以北虜孔熾其來自久憑險恃遠干紀亂常雖聖德撫和約為父子之國而野心凶獷不改豺狼之性既盈稔貫自速天誅頃歲已來頻貽喪敗酋豪向化雖已歸降默啜迷恩尚為潛竄苟合餘燼偷安絕漠陛下聖慮先覺神謀獨斷使其種類自至攜離咸革面於塞垣遂傳首於軍壘以狄攻狄寧勞六月之師有征無戰豈待三年之克永罷邊柝遂清虜庭斬蚩尤而莫儔戮防風而何有豈惟率土無外用表於昌期固亦先天不違更彰於睿算凡曰士庶不勝慶悅況在臣等倍百恆情無任抃躍之至謹奉表陳賀以聞臣等伏以突厥患邊其來自久頃雖朝廷示信約為父子之國然而戎狄無親常畜豺狼之志陛下聖謀廣運睿略元通至道昭感神明叶贊不勞一卒不頓一兵使其種落自相攜貳今葉護敗兦殞身漠北妻子縲繫為俘闕下巢傾席卷瓦解雲散萬里無事二庭遂空曠古不賓盡為臣僕普天所覆皆入封疆諒由負德背恩自速天兦之禍固亦休兵偃甲用彰海宴之期實有無方之神寧惟不戰之勝求諸載籍所未嘗聞臣等幸遇昌期欣逢大慶忝居近密實倍恆情無任抃躍之至謹奉表陳賀以聞仍望宣付史官兼示中外臣等先在城中因奏事陛下謂臣等曰朕料至重陽已來諸軍必頻剋捷臣等欽承聖旨詎測神功近者隴右果奏斬獲莽布支並生擒蘇毗王及鑾駕將迴劍南節度使章仇兼瓊又奏西山將士分為五道破吐蕃城堡鎮柵等四十餘所四鎮節度馬靈察又奏破吐蕃不可勝數並聞護密識匿等數國共為邊捍者數旬之間三方告捷應如影響合若符契禁暴如武盡決於宸衷知來似神更超於繫表斬級獲醜陷陣毀城分南方之五將舉無遺策道西城之諸蕃仍為外蔽百戰百勝以夷攻夷高居九重懸料萬里所以彰睿略之天贊知犬戎之日蹙臣等忝陪巡幸預奉德音踴躍之誠實倍恆品無任欣慶之至謹奉表陳賀以聞臣等伏見趙郡奏鑄等身元始天尊其日天氣晴和祥雲散彩又開模未畢先出白光尊容漸見毫光圓滿其花冠耀白色如玉遍身衣帔自然雲霞睂上有兩點白光流轉照耀又鑄等身釋迦牟尼佛螺髻兼遍身自然玉色唯頂至面為紫金色聖情敦道天心護法爰降宸儀將崇寶相鑄寫之際禎祥屢臻初發止於上京遂呈祥於外郡金姿玉色不假琢磨霞帔霓裳非因藻繪見祥光於睂宇生瑞氣於雲端曲示明徵宛如合契元貺稠疊用彰萬億之期蒼生何幸盡登仁壽之域臣等忝奉軒墀倍深欣慶無任抃躍之至謹奉表陳賀以聞仍望宣示朝廷編諸簡冊臣等伏見開元寺所鑄釋迦牟尼佛身現金色頂含白光發濃紫於聖容散純黃於佛體未加瑩飾已成相好殊祥異應昔所未聞伏以聖人為心元妙莫測至誠所感靈變無方陛下子育㣥生宏修正教寫真容於法界傳寶相於恆沙洎崇建以來禎祥畢集自有神通之助豈資人妙之功超絕瑞於千古表昌期於萬邦凡曰士庶不勝慶幸況於臣等倍切常情無任抃悅之至謹奉表陳賀以聞臣等昨因奏事親承德音宮中有一婦人性頗好道然未全通悟數日以前忽夢元元皇帝慇懃教誡道法尚未盡解遵承無何又依前夢見大被呵責遂以水噀其兩目因而喪明比夢覺後都無所見然始責躬罪已精祈至真又夢元元皇帝教之曰汝可見吾孫自當立愈其婦人曰不知孫是何人曰汝皇帝是也汝至酉時可見當施其法使汝知驗至時宮中數人共扶見朕朕為潔誠作道法使救療其目須臾自開平復如舊聖祖靈感昭然合符與卿等同慶者伏以混成莫測元元闡其教眾妙難名陛下光其業二聖表德千古叶符將告天休遂憑宮女乘恍惚而為夢在希微而有聲不因其言孰報貽孫之慶不開其目何彰救物之慈法事既陳靈徵果驗能使病者復歸其明當聖躬本命之時合烈祖元通之契事且符於久視理仍叶於常存殊尤之祥載籍未有臣忝跡樞近親奉德音慶悅之情實倍恆品無任抃躍之至謹奉表陳賀以聞臣等伏見太常寺太祝王璵奏陛下自臨御以來未嘗不四更已後夙興盥潄為蒼生祈福每遣公卿方士巡察川岳祝文虔誠御札親署曾無一字自為聖躬伏請自今以後聖心徇物俯垂矜允下情獲展品物同歡伏以虞后濬明但聞恭已周王旰食亦謂憂人未有精意妙門勤祈道寶勞聖躬於夙夜移景福於蒼生遂以為常久而無倦肇自開關未嘗覩聞雖覆燾之恩豈求報於芻狗而生成之類願效祝於封人天聽不違民心載悅況在臣等特荷殊私莫測神功空慙帝力無任忻慶之至謹奉表陳謝以聞臣今日伏奉恩旨垂賜上上考並辭捧讀兢惶戰汙交集臣謬以庸薄久塵樞近承奉明命述宣聖謨罪戾猶多涓埃何補豈晤天心善誘宸眷殊常垂翦拂於德音踰涯越分降恩私於考績超等邁倫雖承含垢之慈終多覆餗之懼無任慙悚之至高力士至奉宣恩制各賜臣等竹扇及聖贊賚以器用俯矜於煩暑博以文章更垂於光拂殊私備及自昔未聞臣等輕生謬膺大任雖罄心勵節徒有慕於修篁而淺識薄材何足當於睿藻外榮天錫內愧御題善誘之恩則深負乘之責彌懼何以對越休命奉揚元風捧對兢惶罔知攸措不勝感戴之至謹奉表陳謝以聞臣等今日頻承賜賚累降珍鮮飽德空深荷恩無力伏以甘果之實今則非時寧惟自遠而來固亦以少為貴當供御膳以備天廚何幸小人之腹忽辱非常之賜未施塵露空忝稻梁悚戴慙惶罔知攸措謹奉表陳謝以聞臣某言內使趙侃奉宣恩旨賜臣等明日於永穆公主池亭遊宴者謬承天澤頻賜春遊小人之腹每辱於珍膳下里之聽屢聞於仙樂殊私薦及榮施難酬雖朝野多歡實樂太平之運而涓埃莫效彌慙非據之恩無任悚灼之至謹奉表陳謝以聞臣等伏見太常卿韋縚奏稱京兆尹韓朝宗面承進止云若更不雨即停千秋節者臣等伏以千秋令節萬壽良辰上以答皇天啟聖之休下以展蒼生務農之望禮白帝賽田神著在典式久通誠感陛下以經旬不雨憂人軫念有阻㣥情將停盛節勤恤之旨被物以深而祈報之歡於義難間況近城郊甸雖以愆陽自餘郡縣頻霑霈澤今自東京起居使魏方進至臣等親問方進云自陝以東數日一雨秋稼滋茂特異常年此則萬庾可期三農無害近郊之內雖未霑霈率土之濱已知豐衍太平令典豈可闕如又數年以來此禮頻廢臣子之地獻壽無因朝野之情多歡莫展特希天鑒俯暢人心臣父嘉之幸遇明時早勤學業出身入仕四十餘年歷官五政經考二十未能亨通纔及令長臣夙荷嚴訓累登清秩頻遷省闥又拜掖垣地近班榮臣則過量途遙日暮父乃後時在公府有偷榮之責於私庭無報德之效反慚烏鳥徒厠鴛鴻伏望降臣一外官特乞微恩稍霑臣父問朕聞理國莫尚乎任賢命官必資乎選眾堯舜以聲而以度考覈良難殷周取德兼取言徵求匪易朕所以載懷經術之彥夕遺其寢虛佇藝能之士朝忘其飢子大夫光我弓旌應斯揚擇為政作法豈無前範安人濟時亦有令躅宜敘立身之志各言從官之才至如七輔八元施何綱紀十臣四老正何得失並陳事迹兼詳名氏夫朝會古禮登享舊章九儀式辨其賜六贄各明所執雍畤起自何年亳社立於何代天士地士此何所封諸布諸嚴彼何所主又穆邦家而濟生死三聖之教何長利動植而益黎元五材之用何要工商兩業在俗何先文武二柄適時何急凡此數科不獲雙美必去者方於去食可存者同夫存信朕將親覽爾等明言對伏惟陛下文明有赫元聖廣運勸激極乎宇宙察微窮乎物象至如選眾任能之術禮經享物之要三聖五材之短長文武工商之用捨斯並獨斷聖慮懸衡睿謀百辟端委而雍若庶績不言而潛運矣猶以為立政圖大試言務重弗躬弗親庶人不信降清問於穹昊儼神威於咫尺斯亦堯咨舜吁同德比義臣愚敢不拜手稽首對敭天子之休命制策曰子大夫光我弓旌應斯揚擇為政作法豈無前範安人濟時亦有令躅宜敘立身之志各言從官之才者臣聞邦有道貧且賤焉恥也今神化陰步馬要道光被設序塾以教於鄉立膠庠以訓於國制為祿秩以勸其從則含生稟靈者孰不刻意於仁義飭躬於聞達所謂堯舜之代比屋可封也臣以一介能行無取思勉進以追㣥顧觀光而知愧嘗亦自強不息有聞而行馳顏閔之極摯伏周孔之軌躅學古庶乎叶道慎行期乎潤身非有志於干祿苟求仁於寡過立身之志允或在茲從官之才則愚豈敢何則仲尼有言曰如有所譽其有所試必也臨事難乎預謀昔孔明之自比管樂時人未許仲由因之以師旅夫子哂之祗奉睿問懼深隕越其敢靦冒輕議天工陛下若不棄菅蒯無遺蘊藻考片言而察所以効一官而視所由安敢廋哉取則不遠知人則哲陛下允迪於聖君揚已自媒微臣敢辭於醜行制策曰七輔八元施何綱紀十臣四老正何得失並陳事迹兼詳名氏者書曰惟后非賢不乂惟賢非后不食故君明臣忠予違汝弻時聞間出代有其人昔者黃帝之首出庶物也時則有若七輔股肱舟楫虞舜之賓于四門也時則有若八元忠肅恭懿周文之心德同濟始用十臣漢儲之羽翼已成初聞四老陳其事迹斯亦庶乎詳其名氏固可量也七輔則風牧共貫八元乃伯仲同歸語十臣之倫則太顛閎夭稽四老之類則綺季園公昔郯子之敘古臣勞於傾葢魯公之問儒行疲於更僕況實繁有眾急景不留聊舉凡以見意豈遽數而周物制策曰夫朝會古禮祭享舊章九儀式辨其賜六贄各明所執雍畤起自何年亳社立於何代天士地士此何所封諸布諸嚴彼何所主者傳曰朝有定制會有表儀書曰享多儀儀不及物曰不享斯葢曲為之防事為之制經禮三百儀禮三千載在祀典藏之史籍九儀謂一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯六贄謂孤執皮幣卿執羔大夫執鴈士執雉庶人執鶩工商執雞雍畤起於秦年亳社立於周代天士地士者漢武之寵方士將軍始受其封諸布諸嚴者班史之記小祠先儒不詳所出制策曰穆邦家而濟生死三聖之教何長利動植而益黎元五材之用何要工商兩業在俗何先文武二柄適時何急者夫人生而靜天之性也感物而動情之欲也天稟其性而不能節聖人能為之節而不能絕故務恬樸貴清淨同術於湯之益謙合志於堯之克讓此道教所長也若乃不殺伐證因果包太空以為言化㣥有而歸寂此釋教所長也皆能懲窒嗜慾靜鎮紛糅王侯得之以貞天下至於辨貴賤立君臣示之以好惡因之以誅賞使禮樂刑政燦然可觀則為善不同其味相反係風捕影蕩而無適故知孔氏之立教乃為邦之所急也傳曰天生五材廢一不可斷之於陰陽效之於氣物示休咎以垂誡因興衰以運行若可廢則乾坤之道其或息矣然土爰稼穡居中履正應我皇之休運弻大化以阜成利動植而益黎元先金火而踰水木必不得已斯其一隅又國有六職實載工商時之二柄莫先文武同唯阿之相去何是非之足徵然舜命共工之職周有考工之記車服器械斯焉取斯豈與夫乘時射利滯財居逐者若茲之瑣瑣焉文德者政之所專也武威者文之所助也然則士農之末作巧賢於鬻貨昇平之歲經國先於定功臣學昧稽古思迷政途謀適不用空愧繞朝之策道之將行猶委仲尼之命謹對所習有業著在前典不讀非聖聞諸昔賢甲知敬學之為先遂發憤而忘食既而下帷之時不學明訓張燈之際乃習陰符徒成仲舒之淫不如元凱之癖或稱違法誠則伊咎欲將議獄其或有詞至於太公傳符蘇秦佩六國之印黃石受記張良珥七葉之貂苟如斯失無寘於辟三年之喪寧戚則易百行之最惟孝為先乙縗絰既除欒棘餘毀既而綠琴在御朱絃高張搏拊成聲愉樂斯在雖子張臨喪和之而和先王制禮不敢不至與其樂也何其速哉
