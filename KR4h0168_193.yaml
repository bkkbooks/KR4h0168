front:
  text: 全唐文欽定全唐文卷一百九十三楊炯四
  hash: sha256:96fe9828a7ac6a33003e209cfea99a710e28beca2f9299de3d9487b8cd80290a
body:
  text: 諸侯計功其銘曰仲山甫式於百辟大夫稱伐其銘曰正考甫恭於三命所以揚其先祖所以示其子孫上古之初刊於禮樂之言中年以降述於宗廟之碑文質既殊條流遂廣山河永配金石長存或旌原氏之阡或表滕公之墓觀百林之字者孝廉之舊業於是乎不愆不忘讀黃鳥之詞者文範之餘風於是乎可久可大公諱珽字叔珉河南洛陽人也宇文歸之遠派宇文翰之餘秩龍火晝夜於鍾山鵬雲南北於溟海自中州圯坼上國崩離魏氏忘其寶圖齊人弄其神器則天有成命周雖舊邦文王以業重三分昭事上帝武王以功成八百陰步馬下人車書混一於域中子弟星羅於海內方乎劉澤乃天漢之懿親匹以曹洪即當塗之近屬及其隋室遷鼎唐運握符固亦壇社仍存山河不替曾祖顯和後魏冠軍將軍朱衣直閣東夏州刺史車騎將軍散騎常侍長廣郡公周贈使持節開府儀同三司延丹綏三州諸軍事延州刺史周書有傳對揚天命保乂王家霍去病初封冠軍周亞夫始為車騎剖符之重任在於六條建國之榮禮高於五等祖神舉使持節驃騎將軍開府儀同三司京兆尹柱國大將軍並潞肆石四州十二鎮諸軍並州總管東平郡公贈少保周書有傳材優輔弻業贊雲雷晉則羊祜儀同楚則若敖柱國王章之拜京兆天子聞其直言郭伋之蒞並州諸童符其恩信考誼隋文皇帝挽郎皇朝益州青城瀛州清苑二縣令鈎深致遠直道正詞不汲汲於富貴每乾乾於日夕廣都蔣公炎非無社稷之能太邱陳仲弓自有閨門之德公慶成弧矢氣襲芝蘭劒則赤山之精照牽牛於北列鼎則黃雲之寶入天駟於東方資大孝而立身蘊中和以成德詞參變化稽百代之闕文學富圖書閲三冬之舊史司徒袁粲許之以栝柏豫章處士禰衡目之以椅桐梓漆初任國子生擢第授道王府參軍兼鄭州參軍事橫經太學射策王庭高陽才子宣慈惠和之譽武公新邑濟河洛潁之間兼攝務殷參卿位重王徽之任達國士升車劉簡之博聞中郎寓直秩滿授遂州司戶參軍事天開井絡地泄江源財雄翕習於外區棟宇相望於近甸尹興為政知陸續於衆人黃讜臨官識包咸於數子尋遷絳州翼城今大梁星野少澤封圻城故絳以深其宮都新田以流其惡實惟繁劇載著循良魯國有司無擅徵之事南陽郡吏罷休沐之娛州府狀聞鄉亭頌德亦由禮讓之化帛丿糸竹於是乎作歌風俗之夷浚儀於是乎刊石稍遷符璽郎尋奉敕檢校鴻臚本官如故環濟要略掌天子之符璽劉熙釋名表京師之心腹是分麾節式贊王侯國信不差郊迎有序遷尚書職方員外郎夏書禹貢辨其川澤周禮職方明其物土清晨伏奏幾承題柱之恩間夜潔齋惟有張燈之宿詔除朝散大夫晉州司馬尋遷長史平陽舊縣姑射靈山玉印仍存瑤城未改習鑿齒之逢宣武三命而踐侍中管公明之謁冀州四見而登別駕詔遷同州長史河西輻輳渭北膏腴秦地之下邦漢京之左輔使君何以為政端右宜其得人江統知賢直言則陳留阮宣子唐林薦善通理則汝南黃叔度王祥糾合屈公輔之宏才荀羡逸㣥壯沖天之徑翮享年六十有五以永淳元年六月二十一日終於華州之別業嗚呼哀哉公元亨利貞文行忠信禮樂之君子儒林之丈人當在顏冉中求自是風塵外物友于之義伯淮與季江同寢朋從之道鮑叔與管仲推財優遊大學之中藉甚平臺之下輜車就列化洽於二州油軾當官政成於半刺道尊德貴而大位不躋有志無時而天年不永即以其年十月遷窆於鄭縣安樂鄉之西源嗣子某官等詩禮預聞箕裘早學生則盡其養劉殷積粟於七年歿則致其哀唐頌絶漿於九日占白鶴相青烏鄭伯所封有咸林之采地晉侯所賂有河外之城邑其川渭水而玉璜其鎮華山而金石習習旟旐紛紛野田范巨卿則素車來哭韓元良則緦麻設位大夫受梁鴻之命終陪列士之墳妻子從田豫之言竟托神人之墓嗚呼哀哉銘曰國自東部家承北平遂荒中縣奄有神京時逢日薄運改天正二王之後三代之英其一惟宗惟祖有典有則大魏將軍隆周柱國於穆顯考其儀不忒禮樂宣風閨門表德其二五才鍾秀百福與賢蜀都曾子漢代顏淵公之廣學其積如山公之大辨其流如川其三親則郕霍地居周鄭人物會同歌謠鼎盛設官分職天子有命束髮登朝參卿軍政其四江漢之流河汾之都禮優懸榻任重前樞六璽為貴皇天降符九州為廣益地開圖其五平陽守土下部風俗秦晉閭閻山河車丸躅緹油之化海沂之曲始聽雞晨行復驥足其六龜長筮短吉往凶來賓朋永訣徒御相哀華館無象元堂不開青龍水曲白馬車回其七漠漠古墓槭槭寒桐郭門之路平林之東天光少日地氣多風凡生物而必死唯君令始而善終其八王氏之先代為佐命秦之霸也則王離滅楚國而三將連衡漢之興也則王陵誅項籍而五侯同拜南陽克定應圖讖而作司空西晉聿興合歌謠而濟天下昔者伊尹伊陟但保乂於商朝太公桓公唯夾輔於周室蕭何之後居食祿而無聞鄧禹之孫在當塗而不嗣未有夏殷三統金木五遷册命重光軒裳代襲則我琅琊之郡有冠蓋之里乎建昌之縣有公侯之子乎公諱義童字元稚其先琅琊臨沂人也永嘉之末徙於江外皇運之始遷於五陵今為雍州萬年人也祖僧興齊會稽令梁安郡守南安縣開國侯祿位千石圭符五等營室回於羽儀山河入於盟誓父方駼梁正閣主簿伏波將軍梁安郡守隋上儀同三司以惠和之性有文武之才伏波將軍從征等於馬援儀同三司開府均於鄧步馬家餘積慶郡不乏賢代臨本州則元賓之父喜形於色繼為本守則張翕之子迎者如雲自齊國遜位於梁庭及隋人內禪於皇室夏禹之鼎寶命集於周朝御龍之家世祿歸於范氏公台階茂緒昴宿精靈五百歲之賢才一千年之王佐忠規武節學府詞林元方閨門敬其有德少遊鄉里稱其善人實惟清廟之器是曰皇家之寶韻諧金石奏虞庭之八音德合圭璋列塗山之萬國黃河一曲之水莫測其源赤城千丈之巖未階其峻㣥童忽聚綴帛而引幡旗父老相呼授履而傳兵法隋授左勳衛率非其好也河東離析海內風塵天子溺於膠船諸侯問於金鼎能扶天下之危者必據天下之安能除天下之憂者必享天下之樂我高祖神堯皇帝就之如日望之如雲發三河之雷電平四海之歷象武王之仗黃鉞一月臨於孟津高帝之執朱旗五星聚於東井公瞻烏於屋射隼於墉陳平則間行而去楚酈生則長揖而歸漢奉符繫組觀軹道之降王偃武修文見山陽之散馬初拜車騎將軍稍遷右屯衛將軍録有功也考於周典崇德報功稽於春秋策勳命爵車騎萬隊備涼土之羌戎衛軍千兵掌京師之屯禁於時天下初定邊方未輯二十八舍尚有吳越之妖氛一十三州猶積東南之殺氣武德四年詔公為江南道招慰使鼓琴而送受命而行乘使者之輶車掌行人之旌節陸賈至於南海先責尉他隋河入於九江即徵黥布詔除泉州都督封建昌縣男食邑三百戶斗牛星象舜禹精靈境接東甌地鄰南越言其寶利則瑁珠璣敘其風俗則丹雞白犬公門容駟馬位列三刀防薏苡之譏嫌絶簡書之流謗豈直廣州清節酌貪泉於石門合浦神君返明珠於漲海貞觀三年詔遷散騎常侍行果州刺史授期天帝肇迹人皇南充國之舊都西宕渠之古邑岡巒紛糾天彭雙闢而作門珠貝浮沈巴水三回而成字公入參師友出居方伯金蟬左貂朱旗曲蓋才臨蜀郡即聞來暮之歌初踐益州已聽中和之樂七年詔遷銀青光祿大夫行恆州刺史西街畢昴北嶽恆山天開太乙之宮地列並州之鎮境分靈壽魏將樂羊之所封邑對行唐趙王惠文之所築公政成期月風行萬里鄧晨一郡漢帝稱為主人李廣數年胸奴號為飛將行嘗計日郭伋不負於童兒郡異中平王觀無私於任子既導德而齊禮亦勝殘而去殺三禾在殿將拜鄭宏兩鴈隨車坐悲虞國享年若干以十五年冬十一月二十五日薨於洛陽之清化里公家傳將相世有忠貞屬離亂之宏多值風雷之草昧河宗兩日負鼎而謁成湯渭水七年垂釣而逢西伯將軍再命刺史三遷种皓欒巴牧人之良翰龎參虞詡將帥之宏規立事於當年揚名於後代兄國卬穀州刺史弟國稀仁州刺史荊枝擢秀棣萼生輝何止平輿之二龍是為賈家之三虎唐虞之際四嶽分居趙魏之間八男為郡公雖勳參締構位總班條金友玉昆良田廣宅而能吐食下士倒屣迎賓無笑客之美人有拜賓之童隸策名委贄善始令終生當封侯克成丈夫之志死而可作無忘事君之道越十六年二月二日葬於伊闕縣之萬安山詔贈雜物百段給議仗往還禮也亭連長樂城枕高都守闕塞者汝寬適伊川者辛有北瞻洛汭尚想元凱之墳東望邢山依然國僑之墓夫人陽翟縣君河南禇氏即太常卿陽翟康侯亮之女中書令河南郡公遂良之妹也宋公子之流派禇先生之苗裔宏夫人之禮傳淑女之詩有文在手歸於魯國有鳳和鳴適於陳氏邑之石窖縣以封邱夫尊於朝妻貴於室仙人暫別初悲寡鶴之聲寶劒才分終合雙龍之氣以某年月日薨於某所越某年月日祔於建昌公之舊兆長子師本太穆神皇后挽郎襲建昌公歷韓王府祭酒岐州司士參軍定州安喜縣令譽聞州里學富邱山以卿子而為郎以象賢而開國朝遊楚澤暮宿燕宮東臨石柱雍為積高之地右會長星唐是中山之邑出遊鄰國不以陪臣見輕上謁邦君不以屬官相待洛陽朝覲適見雙鳧東都墓田行悲駟馬以年月日終於某所越某年月日即陪葬於先兆次子師表左千牛備身遷尚輦直長歷許州臨潁博州堂邑滄州樂陵帛丿糸州萬安果州西充五縣令能傳祖業克嗣家聲有言偃之文章兼仲由之政事晨陪紫極繞鈎陳之六星旦奉黃麾屯玉車之千乘至若繁昌土宇魏文帝之墠壇堂邑提封漢陳嬰之侯國河分九道渤海東臨江派五津崑崙北指莫不愛人以禮為政以德鍾離意之禁暴不用尺刀公孫述之有神能持五縣次子師元巂州都督府嘉徵縣丞次子師楚夔州都督府雲安縣令芝蘭有秀羔鴈成行滇北數十尹莫大卭都之縣邑東七百里唯有巫山之峽言其縣職夔龍入於闕門敘其邑人鸞鳥翔於學舍咸能生盡其孝喪盡其哀積粟萬鍾思負米而何得榱題三尺泣吾親而不見卜其宅兆麟鳳匝其岡巒陳其簠簋春秋變其霜露思傳舊德式建豐碑戴安道作頌於鄭元蔡伯喈披文於郭泰魏武皇讀而稱妙非所望焉夏侯湛見而陋之固其宜也銘曰厥初兮后稷導生人兮知稼穡降及兮文王精翼日兮衣青光平東遷兮郟鄏晉上賓兮帝鄉秦三將兮繼代漢五侯兮克昌比狼山兮峻極等淮水兮靈長惟祖考兮鼎盛佩金璋兮謺映彼山川兮降靈生玉樹兮青青成張良兮昴宿乘傅説兮箕星出忠兮入孝武緯兮文經陳嘉謨兮制千里摛藻思兮掞天庭有隋兮喪亂土崩兮瓦散皇運兮權輿人神兮攸贊值笙鏞兮變響屬天地兮貞觀河兩日兮事殷井五星兮歸漢帶長劒兮暐煜擁幡旌兮照爛周命兮惟新雲雷兮尚屯控東南兮荒景負江海兮未賓陳禮樂兮命使動輶車兮轔轔用蛇符兮澤國頒虎節兮山人專一方兮革面重九譯兮稱臣天垂兮星紀地連兮交趾山草樹兮潛移蜃樓臺兮鬱起遷合浦兮太守為廣州兮刺史歸漲海兮明珠飲石門兮貪水侃沖天兮八翼代出身兮萬里全蜀兮奧區枕卭笮兮倚巴渝有靈臺兮古迹有充國兮舊都豐貂兮左珥介士兮前驅濬三刀兮持節昌兩日兮剖符降鳴鳩兮大夏騁神馬兮長衢畢昴兮分野蘭堂兮四下漢皇帝兮國都耿將軍兮壇社若恆山兮詔鄧猶朔方兮命賈李北平兮漢飛郭並州兮竹馬瞻泰階兮坐躡惜天年兮不假伊大姓兮潁川有美人兮嬋媛桂生兮因地女嫁兮因天見乘龍兮奕奕覩飛鳳兮翩翩知蘧瑗兮有禮笑虞邱兮未賢始銜悲兮晝哭終共盡兮千年卜龜謀兮習吉陳旨酒兮嘉栗車徒儼兮在門旌斾紛兮竟術循洛橋兮南渡從國門兮右出樹蕭蕭兮有風雲慘慘兮無日指邱陵兮一閉與天地兮相畢悲孝子兮純深孰憂思兮可任訴高天兮泣血蹐厚地兮崩心樹碑兮神道無愧兮詞林歷陽之都兮水沒圓嶠之海兮山沈俾外孫兮幼婦生白玉兮黃金惟漢高祖應天順人祭蚩尤於沛庭斬大蛇於豐澤則豐沛之豪傑乘於雲矣惟漢光武龍飛鳳翔舉新市之八千破王尋之百萬則南陽之佐命動於天矣我高祖神堯皇帝以唐侯而建國從晉陽以起兵協和萬邦光宅天下則太原之衣冠有大勳矣公諱湛字懷元太原晉陽人也十一代祖卓晉給事中母常山公主河東有湯沐邑因家焉葬於長壽縣故鄉有太原之號皇業伊始公以中涓從事賜田鄠杜間今為雍州人也昔武王定於下人太子賓於上帝基豐鎬而開國籍神仙以命氏霸則司徒所讓位天子所不臣昶則孝弟於閨門務學於師友豈直橫江斬將南登建業之臺玉食金溝北徙邙山之宅自茲厥後數百年間國移三統周人共推其代祿家徙五陵漢朝不易其冠冕曾祖邁後魏中書侍郎彭城王府司馬周春官大夫都督晉陽侯祖亮本州主簿司水上士隋贈信州刺史太名革於東魏天命集於西周宗伯所以辨其儀林衡所以平其守父綽秦孝王府掾仁壽宮監離石郡通守晉陽侯皇朝石州刺史逆賊劉武周攻陷郡城因而遇害贈代州總管諡曰烈侯禮也天造草昧王業艱難周師才至於太原胡兵遂入於離石負戶而汲不能定西戎之禍析骸而爨不能解南楚之圍仁者殺身以成名君子有死而無二公承聖賢之末代屬喪亂之宏多天子乘輿方靖秣陵之氣諸侯斧鉞莫救驪山之烽國有命而何言邦無道而斯隱大業之季本州察孝廉非其好也高祖乃操斗極拜圖書再駕臨於孟津五星合於東井公解衣而濟策杖而行酈食其之長者逢漢祖而長揖袁曜卿之茂才見曹公而不拜從平霍邑授紫金光祿大夫入長安加左光祿大夫歷丞相相國二府典籤參軍事高祖受禪擢為通事舍人通直散騎侍郎封金水縣侯食邑七百戶稍遷虞部郎中丁烈侯艱去職尋起為隴西別駕商鄜二州刺史上柱國荊州大都督府司馬冀州刺史定其封邑誓以河山蕭相立功於萬代留侯決策於千里願持一郡洛陽之任耿純兼攝八州江都之拜陶侃龍朔三年遷使持節東督瀘榮溱珍四州諸軍事瀘州刺史江陽縣地瀘水提封參伐下而為益州岐山上而為井絡尺兵再戢黃昌兩日之歌槃水斯來景伯三年之化功成露冕歲及懸車歎疏廣之知足慕祁奚之請老乾封二年上書乞骸骨詔公祿賜同京官仍朝朔望天子歷吉日協靈辰郊上元祀清廟詔公行太尉事國之大事攝在有司蒼璧黃琮六玉以昭天地路鼓陰竹九變而祠祖考名遂身退居常待終山川則㣥望並走星象則中台夜坼春秋九十有三以咸亨三年七月十七日薨於京師永崇里諡曰敏喪事官給賜物三百段米粟三百石葬日車服往還有司監護公幼鍾偏罰毀瘠過人八歲讀詩至無母何恃廢書慟哭嘔血數升逮事繼親孝聞州黨恩深母子比王元之事親夢感夫妻等衡卿之至孝年才一紀有若成人吏部薛公見而稱歎潁川之司馬德操早知劉廙譙國之夏侯泰初深歎樂毅兵次霍邑力戰有功高祖嘉之賜良馬一匹進圍京城為伏弩所中高祖臨視賜物三百段流血及屨未絶鼓音左輪朱殷豈敢言病武德之始奉使嶺南馮盎等稽首稱臣獻琛奉贄舍人薛卓遇害北庭詔公責問單于謝罪賜黃金五十斤雜綵二百段南踰漲海北渡陰山大中大夫去尉他之黃屋高車使者作胸奴之鐵券離石之難也枕干而寢見星而行號泣不絶聲者千里水漿不入口者數日同武陵之任襲入搆諸羌異河內之張武空持遺劒吳遠由其得銘王裒以之攀柏冀州境內舊多淫祀褰帷按部申明法禁詔書遷秩百姓攀車立廟生祠樹碑頌德亦猶欒巴典郡山鬼潛移張禹牧州江濤不起公出身六十載遺愛二十州遂罷方嶽之官仍居上台之位始於撥亂伊尹之輔成湯終於太平軒轅之得風后然後拂衣高蹈躬覽載籍著遺誡十八章盛行於代法文王周易之變象尼父孝經之篇窮性命之理盡天人之際莊周著論生也若浮史佚立言歿而不朽越文明元年二月十七日陪葬於獻陵禮也長子朝散大夫行扶風令遐觀等生芻一束泣血三年不踰聖人之禮能行大夫之孝京兆載開其新阡昆吾用昭其舊德百年宮室宛在章臺之東五校軍營依然茂陵之下其銘曰昔在湯武阿衡尚父下及高光蕭何鄧禹皇天眷命赫矣高祖惟嶽降神克生元輔攻城野戰張飛關羽奇策密謀荀彧賈詡始陪營衛仍參幕府旌節龍沙軒旗象浦出臨方嶽入調風雨其生也榮池臺鐘鼓其死也哀陳兵復土孝乎惟孝無父何怙刊石勒銘永傳終古惟黃帝大電之精以太清而張樂惟高辛招搖之象以人事而紀官於是乎生我司徒敬敷五教翼贊虞帝而咸熙庶績惟殷湯受天明命以統九有之師惟微子崇德象賢以為萬邦之式於是乎生我丞相約法三章光輔漢室而威加四海自齊宣皇帝商周之日號西伯以稱臣太祖高皇帝堯舜之朝避南河而革故司空臨川獻王懿親明德論道經邦中庶子平樂侯開國承家丹書白馬於是乎生我齊貞公惟魏之寶惟周之翰開上帝而格天地燮陰陽而平水土詳求典載歷選台衡或大澤而康帝圖或高邱而濟王業諸侯五百伊尹出於庖廚甲士三千太公起於屠釣未有上從軒后下及全齊聖主明君三居域中之大帝師王佐纍極人臣之重古所謂歿而不朽者抑斯之謂歟公諱彪字明俊蘭陵人也即宣帝之元孫高帝之曾孫臨川王之孫平樂侯之子稟神河嶽藉慶王侯攀兩曜之末光乘五行之秀氣溫厚廉讓當時以為達人宣慈惠和天下謂之才子屬三方鼎立九土星分祿去公朝失諸侯之盟會政由梁國建天子之旌旗士女同歎於商墟鬼神共謀於曹社公杜門屏迹心不自安與門生故吏數百人歸於後魏宣武皇帝以客禮待之詔除給事中假龍驤將軍正光五年兼彭城府長史假節則將軍比於王濬優禮則長史兼於杜襲龍驤可畏晉后任之於渡江騏驥不乘魏氏託之於留府六年除通直郎散騎常侍中書侍郎永安三年帝北巡遷撫軍將軍銀青光祿大夫散騎常侍散騎通直起於天興之元中書侍郎始自黃初之代宣威撫軍之號僕射光祿之名奇才總於文武重任歸於將相徐方叛逆以公為行軍長史兼統別部仍加鼓節彭城宋邑海嶽徐州嶧陽孤桐羽畎夏翟昔稱都會今實邊陲魯伯禽始得專征周穆王遂行天討公手執旗鼓坐謀帷幄以陶侃部分之明當阮孚戎旅之重有如荀羡獨負逸㣥之才不學江逌空有連雞之喻徐州平遷黃門侍郎揚州大中正黃扉藹藹青瑣沈沈有若張公之萬戶千門博觀圖籍太湖為浸會稽為山有若荀勗之十郡一州詮藻人物纍遷大司農秦稱內史漢曰司農管夷吾陳不涸之名耿壽昌立常平之議時播百穀后稷讓於虞書阜成兆民列卿拜於周典普泰元年遷車騎將軍加右光祿大夫永熙二年出為潁川太守地稱汝潁俗尚申韓有鄭伯之別都有周公之朝邑教之德化無囚歷於八年任於賢能亠包方潤踰於九里於時齊武王居中作相實有遷鼎之謀周太祖在外持兵深懷事君之道昭公失位由季氏之執權襄王出居成晉文之霸業三年秋八月武帝幸長安以義兵從順大統元年授開府儀同三司封靈璧縣開國子邑三百戶金堤石印清濟濁河爰賜土田以為藩屏漢之宰相始開封邑周之列侯實兼卿士二年拜車騎大將軍九年遷五兵尚書十年遷中書監領驃騎大將軍加開府儀同三司進爵為公增邑一千戶天子有詔不入軍門胸奴未滅不營私第蔡謨兼五兵之署鄧步馬比三台之儀掌中書之綸翰加上公之冕服十六年遷侍中驃騎大將軍以下並如故昔惟常伯今則侍中切問近對拾遺補闕冕旒無象先問顧和玉佩不存即徵王粲廢帝後二年公不賀出為使持節華州刺史侍中並如故桃林國邑大荔城隍三秦六輔之奧區五嶽四瀆之襟帶倪寬之為內史唯事溉田薛宣之守馮翊但知拱默尋加特進餘如故官品第一朝廷所敬辟吏如五府之間班列在三公之後唐虞之繼文德也稷契謨明於兩朝魏晉之順大名也裴王建功於二代周武成三年進封青州齊郡公邑二千戶賜號東嶽先生詔曰堯有四嶽朕惟公一人賜雜綵二千段甲第一區雍州良田百頃其優禮如此堯命羲仲星鳥嵎夷之官周賜薑牙穆陵無棣之境三王不襲同盟固於泰山百代相因舊國傳於負海惟保定四年公薨於長安私第天子罷朝㣥臣赴弔喪用官給嗚呼哀哉五年贈少保使持節揚光桂三州諸軍事揚州刺史諡曰貞公禮也公少丁外艱州黨稱其孝齊武皇帝見而歎曰可謂吾家曾閔外祖太尉公王儉謂其子侍中騫曰成汝宅相者在此孫乎公之北歸也後魏宣武帝敕曰昔微子去殷項伯歸漢卿又得之於今公涕泣橫流跪而對曰臣家國不造鼎祚淪亡進不能匡正退不能死節今復托身有道何敢比德古人帝益重之及周太祖作相西朝王侯之下皆望塵而拜公與之抗禮太祖尤相敬待屢有咨詢嘗曰國家之子房也公體淳和之至性負廊廟之大才孝通神明忠定社稷馬伏波來遊二帝晏平仲能事百君在魏則賈詡荀攸在周則太顛閎夭惟司徒克慎厥始惟丞相克和厥中惟公載德克成厥終三后同其政道子孫訓其成式輝光助於日月積德廣於宇宙以某年月日葬於少陵原國遷三代年移十紀杜當陽之碑石沈漢水而無聞仲山甫之鼎銘入胸奴而不出曾孫皇朝右金吾將軍同州刺史得照宏才大節玉振金聲入當天子之右軍出臨帝京之左輔承積善之餘慶襲大宗之不遷願述家風思傳祖德是用勒銘刻石相質披文載於景鐘大夫稱伐之義書於太常諸侯計功之道追題瓦屑鄭康成北海之門重刻碑陰張平子南陽之墓其詞曰黃帝攝政勤勞耳目居於軒轅戰於涿鹿咸陽黜夏登壇受福表正萬邦纘禹舊服其一逮乎微子周之國賓降及蕭叔宋之懿親高祖丞相王迹是因宣皇御史社稷之臣其二太陰所立皇齊誕聖既創元基仍集大命謀孫翼子重熙纍盛天祿永終南風不競其三惟公載誕克嗣家聲千丈多節三年一鳴待時而動以族而行才歸晉國璧入秦庭其四符堅拜首降天之使陶豫策名勤王之事任隆起草榮高近侍赫赫禁門雍容貂珥其五日暮青瑣夕郎之職法駕畢陳黃門次直帝王之盛誠在農殖如京如坻我黍我稷其六吳王舊國採山鑄錢公為中正佩以韋絃夏禹遺迹今來潁川公為太守示以蒲鞭其七齊稱東帝周稱西伯諸侯謀王天子下席公之忠義如彼松柏其八發自新邑歸於陸海魏德雖衰天命未改功成晉鄭為而不宰寵茂山河於是乎在其九亞夫真將去病元勳持兵對揖絶漠行軍尚書武庫抑有前聞侍中重席曾何足云其十當塗遜位有周經野二國唐虞兩朝裴賈出守馮翊人無訟者受封於齊實匡天下其十一晨占赤烏夜辨黃熊曾參易簀期於令終子囊城郢沒有遺忠明君輟祭㣥臣會同其十二黃屋左纛輕車介士朝發桐鄉暮歸蒿里積善餘慶由來尚矣公侯子孫必復其始其十三
