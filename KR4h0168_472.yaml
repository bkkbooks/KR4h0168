  text: 全唐文欽定全唐文卷四百七十二陸贄十三
  hash: sha256:7a830f16177d9cbafa441a1da366c24f8ea92c299727a33d35696725c8e42e93
body:
  text: 昨日欽漵奉宣聖旨示臣馬燧渾瑊等奏平懷光收河東狀一作河中事狀兼令臣商量須作何處置令欽漵奏來者凶梗殲蕩關畿廓清實聖謀廣運之功亦宗社無疆之祚應須處置大略已附欽漵口陳展轉傳言恐未盡意謹復薦其固陋願陛下少留察焉臣聞禍或生福福亦生禍喪者得之理得者喪之端故晉勝鄢陵范燮祈死吳克徑越夫差啓殃是知福不可以久徼幸得不可以常覬覦居福而慮禍則其福可保見得而忘喪則其喪必臻臣竊懼諂諛希旨之徒險躁生事之輩幸凶醜覆亡之會揣英主削平之心必將競效甘言誘開利欲謂王師所向莫敵謂餘孽指顧可平請回蒲坂之戈復起淮沂之役斯議一啓必有亂階故微臣姑以生禍為憂而未敢以獲福為賀也何則建中之難其事可徵始以蓄憾而隘於含容或以亟勝而輕於戰伐故文喜之討涇上之瘡痛未平崇義之征漢南之芟夷繼甚阻命之帥非不誅也伐叛之師非不克也介馬之斷非不堅也赫斯之怒非不逞也然以人不見恤惟戮是聞有辜無辜不敢自保是以抱釁反側者懼鈇鉞之次加畏禍危疑者慮猜譖之旋及遂乃螽結以拒討狼顧以背恩彌兩河而亘淮夷蕩三輔而盜京邑鑾輅為之再駕行宮至于合圍于時海內大搖物情幾去天命莫保于寸晷王威不出於一城邦國之杌隉艱屯綿綿聯聯若苞桑綴旒幸而不殊者屢矣勢之危窘實足寒心非有曩時熊羆翕習之師雷霆奮發之勢武庫劒㦸之利帑藏財賦之殷其所以施令率人取威定亂比於建中之始豈不至微至殺哉然而陛下懷悔過之深誠降非常之大號知黷武窮兵之長亂知急征重斂之勦財知殘人肆欲之取危知違衆率心之稔慝知蒸庶困極之興怨知上下鬱堙之失情德音渙然與之更始所在宣揚之際聞者莫不涕流雖或凶獷匪人亦必為之歔欷誠之動物乃至于斯懷梟鴟以好音消祲沴為和氣由是姦回易慮黎獻歸心假王叛援之夫削僞號以請罪觀釁首鼠之將一純誠以效勤流亡凍餒者希保於室家屯戍戰爭者冀全其性命德澤將竭而重霈君臣已絶而更交天下之情翕然一變曩討之而愈叛今釋之而畢來曩以百萬之師而力殫今以咫尺之詔而化洽是則聖王之敷理道服暴人任德而不任兵明矣㣥帥之悖臣禮拒天誅圖活而不圖亡又明矣尚恐陛下以臣言之略而未喻也請復循其本而申備之往以河朔青齊同惡相扇擁戎據土易代不庭陛下恥王化之未同忿姦慝之靡格於是發六軍神策河陽河東澤潞朔方之騎士以徂征于北命永平汴宋幽隴江淮閩嶺之將卒以奮伐于南罄國家廩帑以贍軍悉公私廏牧以張武算斂周於萬類征徭被於八荒勞已甚矣威亦盛矣既而曠日綿歲老師費財兩河之寇患有加無瘳而邦本已始覆矣洎涇卒倡亂泚戎構災豺狼整居於禁闈䝟㺄擇肉於馳道河朔問罪之衆布路而歸宋郊仗順之師守壘不暇于斯之亂海內沸騰儻有問鼎之雄圖滔天之巨猾幸災乘間何所不為既而悅納之儔咸自斂縮內無非望之議外無軼境之侵及聞天澤滌瑕制書復爵曾不蒂芥望風款降爭馳表章唯恐居後跡其素志於此可知是皆假兵救死之流戀土偷安之輩懷生畏死蠢動之大情慮危求安品物之常性有天下而子百姓者以天下之欲為欲以百姓之心為心固當遂其所懷去其所畏給其所求使家家自寧人人自遂家苟寧矣國亦固焉人苟遂矣君亦泰焉是則好生以及物者乃自生之方施安以及物者乃自安之術擠彼於死地而求此之久生也從古及今未之有焉措彼於危地而求此之久安也從古及今亦未之有焉是以昔之聖王知生者人之所樂而已亦樂之故與人同其生則上下之樂兼得矣聖王知安者人之所利而已亦利之故與人共其安則公私之利兩全矣其有反易常理昏迷不恭則當外察其倔強之由內省於撫馭之失修近以來遠檢身而率人故書曰惟干戈省厥躬又曰舞干羽于兩階七旬有苗格孔子曰遠人不服則修文德以來之既來之則安之此其證也如或昧於懷柔務在攻取不懲教化之未至不疵誠感之未孚惟峻威是臨惟忿心是肆視人如禽獸而曝之原野輕人如草芥而勦之銛鋒叛者不賓則命致討討者不克則將議刑是使負釁者懼必死之誅奉辭者慮無功之責編氓以困於杼柚而思變士卒以憚於死喪而念歸萬情相攻亂豈有定一夫不率闔境罹殃一境不寧普天致擾兵連禍結變起百端故孔子曰遠人不服而不能來也邦分崩離析而不能守也而謀動于戈於邦內吾恐季孫之憂不在顓臾而在蕭牆之內矣此蓋必然之常理至當之格言足以為明鑑元龜貫百王而不易者也事乃反覆得無懼乎夫理有必然則殊途歸於同轍言有至當則異代應如合符頃以東北孽徒職貢廢闕陛下忿其違命大舉甲兵至令逆泚誘姦乘釁而動所備之寇猶遠介於河山不虞之戎已竊發于都輦蕭牆之戒不其信歟前典垂訓既如彼近事明驗又如此所以德音敘哀痛之情悔征伐之事引衆慝以咎已布明信以示人既往之失畢懲莫大之辜咸宥約之以省賦誓之以息兵由是億兆汙人四三叛帥感陛下自新之旨悅陛下盛德之言革面易辭具修臣禮其於深言密議固亦未盡坦然必當聚黨而謀傾耳而聽觀陛下所行之事考陛下所誓之言若言與事符則遷善之心漸固儻事與言背則慮禍之態復興自京邑砥寧乘輿旋返屬懷光繼亂天討又行息兵之言我則未復山東㣥帥所以未敢生辭者蓋為河中之地密近王城迫於朝夕之虞不得不翦除之爾今若改轅移斾復指淮西則淮西元凶必將誑脅其同惡之徒間說於新附之帥謂之曰奉天息兵之旨乃因窘急而言朝廷稍安必復誅伐是以朱泚滅而懷光戮懷光戮而希烈征希烈儻平禍將次及則彼之蓄素疑而懷宿負者能不為之動心哉心既動則盈其喪身覆族之憂憂既盈則慮以唇亡齒寒之病夫病同者雖胡越而相愍憂同者不邀結而自親河朔青齊固當響應建中之禍勢必重興以國家再造之初當㣥孽息肩之後迭來鳴吠或肆奔衝討之則我力未遑縱之乃寇患斯甚臣愚竊以為禍非細未審陛下何方以待之若有其方侮之可也如其未有願陛下勿輕易焉凡將圖終必在慎始禍機一發難可復追臣請粗陳當今維馭之所宜唯聖主省擇萬一夫君之大柄在惠與威二者兼行廢一不可惠而罔威則不畏威而罔惠則不懷苟知夫惠之可懷而廢其取威之具則所敷之惠適足以示弱也其何懷之有焉苟知夫威之可畏而遺其施惠之德則所作之威適足以召敵也其何畏之有焉故善為國者宣惠以養威蓄威以尊惠威而能養則不挫惠而見尊則有恩是以惠與威交相畜也威與惠互相行也人主之欲柔遠人而服強暴不明斯術之要莫之得焉今皇運中興天禍將悔以逆泚之偷居上國以懷光之竊保中畿歲未再周相次梟殄實衆慝驚心之日㣥生改觀之時威則已行惠猶未洽誠宜上副天眷下收物情布恤人之惠以濟威乘滅賊之威以行惠宥河中染汚之黨悉無所問赦淮右僭逆之罪咸與維新蠲貸疲氓休罷戰士符往歲息兵之令以彰信丕大君含垢之德以布仁俾萬姓皆曰大哉王言又曰一哉王心如是則威不用而畏如神明惠不費而懷如父母凡在危疑懼討者必將曰淮右僭逆之罪且赦矣吾屬何患焉凡在脅從同惡者必將曰河中染汚之黨且宥矣吾屬何疚焉凡在倦苦思安者必將曰吾君有戰勝之師抑而不騁信乎其罷征矣凡在凋殘望理者必將曰吾君有嫉亂之憤忍而不攄信乎其恤隱矣天下之心若此而禍亂不息理道不行者無之臣所未敢保其必從唯希烈一人而已揆其私心非不願從也想其潛慮非不追悔也但以猖狂失計已竊大名雖荷陛下全宥之恩然不能不自靦於天地之間耳縱未順命斯為獨夫內則無辭以起兵外則無類以求助其計不過厚撫部曲偷容歲時心雖陸梁勢必不敢陛下但敕諸鎮各守封疆彼既氣奪算窮是乃狴牢之虜不有人禍則當鬼誅朝廷務崇德以待之臣固知其必不逃於所揣矣古所謂不戰而屈人之兵者斯之謂歟今若不顧機宜復興戎役瀆威而蔑惠捨易而即難是棄明信而務忿心假敵辭而資寇援窮者不暇恤勞者不得居國之安危或未可保此乃成敗理亂之所繫願陛下難之慎之區區上干憂恤在此儻蒙過納狂瞽不疑所行謹當草具招諭之辭詳陳備禦之畫伏俟宣許方敢以聞謹奏今月十七日顧少連延英對回奉宣密旨卿先奏令臺省長官各舉屬吏近聞外議云諸司所舉皆有情故兼受賄賂不得實才此法甚非穩便已後除改卿宜並自揀擇不可信任諸司者臣以暗劣謬當大任果速官謗上貽聖憂過蒙恩私曲降慈誨感戴循省寢興不寧緣是密旨特宣不敢對衆陳謝祇稟成命所宜必行恭惟聖規又合無隱苟有未達安敢勿言雖知塵煩固不可已夫理道之急在於得人而知人之難聖哲所病聽其言則未保其行求其行則或遺其才校勞考則巧僞繁興而貞方之人罕進徇聲華則趨競彌長而沉退之士莫升自非素與交親備詳本末探其志行閲其器能然後守道藏用者可得而知沽名飾貌者不容其僞故孔子云視其所以觀其所由察其所安人焉廋哉夫欲觀視而察之固非一朝一夕之所能也是以前代有鄉里舉選之法長吏辟署之制所以明歷試廣旁求敦行能息馳騖也昔周以伯冏為大僕命之曰慎簡乃僚罔以巧言令色便僻側媚其惟吉士是則古之王朝但命其大官而大官得自簡僚屬之明驗也漢朝務求多士其選不唯公府辟召而已又有父任兄任皆得為郎選入之初雜居三署臺省有闕即用補之是則古之郎官皆以任舉充選此其明驗也魏晉已後暨于國初採擇庶官多由選部唯高位重職乃由宰相考庶官之有成效者請而命焉故晉代山濤為吏部尚書中外品員多所啓授宋朝以蔡廓為吏部尚書廓先使人謂宰相徐羡之曰若得行吏部之職則拜不然則否羡之答云黃散已下悉委蔡廓猶憤恚以為失職遂不之官是則黃門散騎侍郎皆由吏部選授不必朝廷列位盡合簡在台司此其明驗也國朝之制庶官五品已上制敕命之六品已下則並旨授制敕所命者蓋宰相商議奏可而除拜之也旨授者蓋吏部銓材署職然後上言詔旨但畫聞以從之而不可否者也開元中吏部注擬選人奏置循資格限自起居遺補及御史等官猶並列於選曹銓綜之例著在格令至今不刊未聞常參之官悉委宰臣選擇此又近事之明驗也其後舊典失序幸臣專朝捨僉議而重已權廢公舉而行私惠是使周行庶品苟不出時宰之意者則莫致焉任重之道益微進善之途漸隘近者每須任使常苦乏人臨事選求動淹旬朔姑務應用難盡當才豈不以薦舉凌遲人物衰少居常則求精太過有急則備位不充欲令庶績咸熙固亦難矣臣實駑鈍一無所堪猥蒙任使待罪宰相惟懷竊位之懼且乏知人之明自揣庸虛終難上報唯廣求才之路使賢者各以彙征啓至公之門令職司皆得自達臣當謹守法度考課百官奉揚聰明信賞必罰庶乎人無滯用朝不乏才以此為酬恩之資以此為致理之具爰初受命即以上陳求賢審官粗立綱制凡是百司之長兼副二等官及兩省供奉之職并因察舉勞效須加獎任者並宰臣敘擬以聞其餘臺省屬僚請委長官選擇指陳才實以狀上聞一經薦揚終身保任各於除書之內具標舉授之由示衆以公明章得失得賢則進考增秩失實則奪俸贖金亟得則裦升亟失則黜免非止搜揚下位亦可閲試大官前志所謂達觀其所舉即此義也自蒙允許即以宣行南宮舉人才至十數或非臺省舊吏則是使府佐僚纍經薦延多歷事任議其資望既不愧於班行考其行能又未聞於闕敗而議者遽以騰口上煩聖聰道之難行亦可知矣陛下勤求理道務徇物情因為舉薦非宜復委宰臣揀擇其為崇任輔弼博採輿詞可謂聖德之盛者然於委任責成之道聽言考實之方間邪存誠猶恐有闕所謂委任責成者將立其事先擇其人既得其人慎謀其始既謀其始詳慮其終終始之間事必前定有疑則勿果於用既用則不復有疑待終其謀乃考其事事愆於素者革其弊而黜其人事協於初者賞其人而成其美使受賞者無所與讓見黜者莫得為辭夫如是則苟無其才孰敢當任苟當其任必得竭才此古之聖王委任責成無為而理之道也所謂聽言考實虛受廣納宏接下之規明目達聰廣濟人之道欲知事之得失不可不聽之於言欲辨言之真虛不可不考之於實言事之得者勿即謂是必原其所得之由言事之失者勿即謂非必窮其所失之理稱人之善者必詳徵行善之跡論人之惡者必明辨為惡之端凡聽其言皆考其實既得其實又察以情既盡其情復稽於衆衆議情實必參相得然後信其說獎其誠如或矯誣亦置明罰夫如是則言者不壅聽之不勞無浮妄亂教之談無陰邪傷善之說無輕信見欺之失無潛陷不辨之冤此古之聖王聽言考實不出戶而知天下之方也陛下既納臣言而用之旋聞橫議而止之於臣謀不責成於橫議不考實此乃謀失者得以辭其罪議曲者得以肆其誣率是以行觸類而長固無必定之計亦無必實之言計不定則理道難成言不實則小人得志國家所病恆必由之昔齊桓公將啓霸圖問管仲以害霸之事管仲對曰得賢不能任害霸也任賢不能固害霸也固始而不能終害霸也與賢人謀事而與小人議之害霸也所謂小人者不必悉懷險詖故覆邦家蓋以其意性憸邪趣尚狹促以沮議為出衆以自異為不㣥趨近利而昧遠圖效小信而傷大道故論語曰言必信行必果硜硜然小人哉夫以能信於言能果於行唯以硜硜淺近不克宏通宣尼猶謂其小人管仲尚憂其害霸況又有言行難保而恣其非心者乎此皆任不責成言不考實之弊也聖旨以謂外議云諸司所舉皆有情故兼受賄賂不得實才者臣請陛下當使所言之人詳陳所犯之狀某人受賄某舉有情陛下然後以事質於臣臣復以事質於舉主若便首伏則據罪抵刑如或有詞則付法閲責謬舉者必行其罰誣善者亦反其辜自然憲典克明邪慝不作懲一沮百理之善經何必貸其姦贓不加辨詰私其公議不出主名使無辜見疑有罪獲縱枉直同貫人何賴焉聖旨又以官長舉人法非穩便令臣並自揀擇不可信任諸司者伏以宰輔常制不過數人人之所知固有限極必不能遍諳多士備閲㣥才若令悉命㣥官理須展轉詢訪是則變公舉為私薦易明揚以暗投儻如議者之言所舉多有情故舉於君上且未絶私薦於宰臣安肯無詐失人之弊必又甚焉所以承前命官罕有不涉私謗雖則秉鈞不一或自行情亦由私訪所親轉為所賣其弊非遠聖鑒明知今又將徇浮言專任宰臣除吏宰臣不遍諳識踵前須訪於人若訪於親朋則是悔其覆車不易前轍之失也若訪於朝列則是求其私薦必不如公舉之愈也二者利害惟陛下更詳擇焉恐不如委任長官慎簡僚屬所簡既少所求亦精得賢有鑒識之名失實當暗謬之責人之常性莫不愛身況於臺省長官皆是久當朝選孰肯徇私妄舉以傷名取責者乎所謂臺省長官即僕射尚書左右丞侍郎及侍御史大夫中丞是也陛下比擇輔相多亦不出其中今之宰相則往日臺省長官也今之臺省長官乃將來之宰臣也但是職名暫異固非行業頓殊豈有為長官之時則不能舉一二屬吏居宰臣之位則可擇千百具僚物議悠悠其惑斯甚聖人制事必度物宜無求備於一人無責人於不逮尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長擇佐僚所任愈崇故所擇愈少所試漸下故所舉漸輕進不失倫選不失類以類則詳知實行有倫則杜絶徼求將務得人無易於此是故選自卑遠始升於朝者各委長吏任舉之則下無遺賢矣置于周行既任以事者於是宰臣序進之則朝無曠職矣才德兼茂歷試不渝者然後人主倚任之則海內無遺士矣夫求才貴廣考課貴精求廣在於各舉所知長吏之薦擇是也考精在於按名責實宰臣之序進是也求不廣則下位罕進下位罕進則用常乏人用常乏人則懼曠庶職懼曠庶職則苟取備員是以考課之法不暇精也考不精則能否無別能否無別則砥礪漸衰砥礪漸衰則職業不舉職業不舉則品格浸微是以賢能之功不克彰也皆失於不廣求人之道而務選士之精不思考課之行而望得人之美是以望得彌失務精益粗塞源浚流未見其可臣欲詳徵舊說伏恐聽覽為煩粗舉一端以明其理往者則天太后踐祚臨朝欲收人心尤務拔擢宏委任之意開汲引之門進用不疑求訪無倦非但人得薦士亦得自舉其才所薦必行所舉輒試其於選士之道豈不傷於容易哉然而課責既嚴進退皆速不肖者旋黜才能者驟升是以當代謂知人之名纍朝賴多士之用此乃近於求才貴廣考課貴精之效也陛下誕膺寶歷思致理平雖好賢之心有踰前哲而得人之盛未逮往時蓋由鑒賞獨任於聖聰搜擇頗難於公舉但速登延之路罕施練核之方遂使先進者漸益凋訛後來者不相接續施一令則謗沮互起用一人則瘡痏立成此乃失於選才太精制法不一之患也則天舉用之法傷易而得人陛下慎簡之規太精而失士是知雖易於舉用而不易於苟容則所易者適足廣得人之資不為害也不精於法制而務精於選才則所精者適足梗進賢之途不為利也人之才行自昔罕全苟有所長必有所短若録長補短則天下無不用之人責短捨長則天下無不棄之士加以情有憎愛趣有異同假使聖如伊周賢如楊墨求諸物議孰免譏嫌昔子貢問于孔子曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之蓋以小人君子意必相反其在小人之惡君子亦如君子之惡小人將察其情在審其聽聽君子則小人道廢聽小人則君子道消今陛下慎選宰臣必以為重於庶品精擇長吏必以為愈於末流及至宰臣獻規長吏薦士陛下則但納橫議不稽始謀是乃任以重者輕其言待以輕者重其事且又不辨所毀之虛實不校所議之短長人之多言何所不至是將使人無所措其手足豈獨選任之道失其端而已乎臣之切言固非為已所惜者致理之道所感者見遇之恩輒因陳謝布露以聞惟陛下幸察謹奏
