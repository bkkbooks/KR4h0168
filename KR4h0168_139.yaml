  text: 全唐文欽定全唐文卷一百三十九徵字元成巨鹿曲城人少以策干李密不用後隨密來降授祕書丞隱太子引為洗馬太子敗太宗引為詹事主簿及踐祚遷祕書監參預朝政進侍中封鄭國公拜太子太師薨年六十四贈司空相州都督諡曰文貞
