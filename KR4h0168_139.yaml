body:
  text: 元壇內有柏樹焉封植營護幾乎二紀枝幹扶疏不過數尺籠於衆草之中覆乎叢棘之下雖磊落節目不改本性然而翳薈蒙蘢莫能自申達也惜其不生高峯臨絶壑籠日月帶雲霞而與夫擁腫之徒雜糅茲地此豈所謂方以類聚物以㣥分者哉有感於懷喟然而賦其詞曰覽大鈞之播化察草木之殊類雨露清而並榮霜雪霑而俱悴唯丸丸之庭柏稟自然而醇粹涉青陽不增其華歷元英不減其翠原斯木之攸挺植新甫之高岑干霄漢以上秀絶無地而下臨籠日月以散彩俯雲霞而結陰邁千祀而逾茂秉四時而一心靈根再徙茲庭爰植高節未彰貞心誰識既雜沓乎衆草又蕪沒乎叢棘匪王孫之見知志耿介其何極若乃春風起於蘋末美景麗乎中園水含苔於曲浦草鋪露於平原成蹊花亂幽谷鶯喧徒耿然而自撫謝桃李而無言至於日窮於紀歲云暮止飄蓬亂驚愁雲疊起冰凝無際雪飛千里顧衆類之颯然鬱亭亭而孤峙貴不移於本性方有儷乎君子聊染翰以寄懷庶無虧於善始臣等昔受命太上委質東宮出入龍樓垂將一紀前宮結釁宗社得罪人神臣等不能死亡甘從夷戮負其罪戾置録周行徒竭生涯將何上報陛下德光四海道冠前王陟岡有感追懷常棣明社稷之大義申骨肉之深恩卜葬二王遠期有日臣等永惟疇昔忝曰舊臣喪君有君雖展事君之禮宿草將列未申送往之哀瞻望九原義深凡百望於葬日送至墓所臣徵言臣聞書美文王不敢盤於遊田傳述虞針稱夷羿以為誡昔漢文臨霸坂欲馳下袁盎攬轡曰聖主不乘危不僥幸今陛下騁六飛馳不測之山如有馬驚車敗陛下縱欲自輕其奈高廟何孝武好格猛獸相如諫曰力稱烏獲捷言慶忌人誠有之獸亦宜然卒然遇逸材之獸駭不存之地雖有烏獲之猛逄蒙之伎不可得用而枯木朽株盡為難矣雖萬全而無患然本非天子所宜近孝元郊泰畤因留射獵薛廣德奏稱竊見關東困極人民流離今日撞亡秦之鐘歌鄭衛之樂士卒暴露從官勞倦顧如宗廟社稷何憑河暴虎未之比也臣竊思此數帝之心豈同木石獨不好馳騁之樂而割情屈巳從臣下之言者志存為國不為身也臣伏聞車駕近出親格猛獸晨往夜還以萬乘之尊暗行荒野踐深林涉豐草甚非萬全之計願陛下割私情之娛罷格獸之樂上為宗廟社稷下慰㣥僚兆庶則天下幸甚天下之事有善有惡任善人則國安用惡人則國亂公卿之內情有愛憎憎者惟見其惡愛者惟見其善愛憎之間所宜詳審若愛而知其惡憎而知其善去邪勿疑任賢勿二可以興矣臣觀自古受圖膺運繼體守文控御英傑南面臨下皆欲配厚德於天地齊高明於日月本支百代傳祚無窮然而克終者鮮敗亡相繼其故何哉所以求之失其道也殷鑒不遠可得而言昔在有隋統一寰宇甲兵強盛三十餘年風行萬里威動殊俗一旦舉而棄之盡為他人所有彼煬帝豈惡天下之治安不欲社稷之長久故行桀紂以就滅亡哉蓋恃其富強不虞後患驅天下以從欲罄萬物以自奉採域中之子女求遠方之奇異宮宇是飾臺榭是崇徭役無時干戈不戢外示威重內多隘忌讒邪者必遂其福忠正者莫保其生上下相蒙君臣道隔人不堪命率土分析遂以四海之尊殞於匹夫之手子孫殄滅為天下之笑深可痛矣聖哲乘機拯其危溺八柱傾而復正四維絶而更張遠肅邇安不踰於期月勝殘去殺無待於百年今宮觀臺榭盡居之矣珍奇異物盡收之矣姬薑淑媛盡侍於側矣四海九州盡為臣妾矣若能鑒彼之所以亡念我之所以得日慎一日雖休勿休焚鹿臺之寶衣毀阿房之廣殿懼危亡於峻宇思安處於卑宮則神化潛通無為而理德之上也若成功不毀即仍其舊除其不急損之又損雜茅茨於桂棟參玉砌於土階悅以使人不竭其力常念居之者逸作之者勞億兆悅以子來㣥生仰而遂性德之次也若惟聖罔念不慎厥終忘締構之艱難謂天命之可恃忽采椽之恭儉追雕牆之侈靡因其基以崇之增其舊而飾之觸類而長不思止足人不見德而勞役是聞斯為下矣譬如負薪救火揚湯止沸以暴易亂與亂同道莫可則也後嗣何觀夫事無可觀則人怨神怒人怨神怒則災害必生災害既生則禍亂必作禍亂既作而能以身名令終者鮮矣順天革命之後將隆七百之祚貽厥孫謨傳之萬世難得易失可不念哉臣聞求木之長者必固其根本欲流之遠者必浚其泉源思國之安者必積其德義源不深而望流之遠根不固而求木之長德不厚而望國之治雖在下愚知其不可而況於明哲乎人君當神器之重居域中之大將崇極天之峻永保無疆之休不念居安思危戒奢以儉德不處其厚情不勝其欲斯亦伐根以求木茂塞源而欲流長者也凡百元首承天景命莫不殷憂而道著功成而德衰有善始者實繁能克終者蓋寡豈其取之易而守之難乎昔取之而有餘今守之而不足何也夫在殷憂必竭誠以待下既得志則縱情以傲物竭誠則吳越為一體傲物則骨肉為行路雖董之以嚴刑震之以威怒終苟免而不懷仁貌恭而不心服怨不在大可畏惟人載舟覆舟所宜深慎奔車朽索其可忽乎君人者誠能見可欲則思知足以自戒將有作則思知止以安人念高危則思謙沖以自牧懼滿溢則思江海下百川樂盤遊則思三驅以為度憂懈怠則思慎始而敬終慮壅蔽則思虛心以納下想讒邪則思正身以黜惡恩所加則思無因喜以謬賞罰所及則思無因怒而濫刑總此十思宏茲九德能而任之擇善而從之則智者盡其謀勇者竭其力仁者播其惠信者效其忠文武爭馳君臣無事可以盡豫遊之樂可以養松喬之壽鳴琴垂拱不言而化何必勞神苦思代下司職役聰明之耳目虧無為之大道哉臣聞書曰明德慎罰惟刑之恤哉禮云為上易事為下易知則刑不煩上多疑則百姓惑下難知則君長勞夫上易事下易知君長不勞百姓不惑故君有一德臣無二心上播忠厚之誠下竭股肱之力然後太平之基不墜康哉之詠斯隆當今道被華夷功高宇宙無思不服無遠不臻然言尚於文志在於明察刑賞之用有所未盡矣夫刑賞之本在乎揚善而懲惡帝王之所以與天下為畫一不以親疏貴賤而輕重者也今之刑賞未必盡然或屈伸在乎好惡輕重由乎喜怒遇喜則矜其情於法中逢怒則求其罪於事外所好則鑽皮出其毛羽所惡則洗垢求其瘢痕瘢痕可求則刑斯濫矣羽毛可出則賞斯謬矣刑濫則小人道長賞謬則君子道消小人之惡不懲君子之善不勸而望治安刑措非所聞也且夫暇豫清談皆敦尚於孔老威怒所至則取法於申韓直道而行非無三黜危人自安蓋亦多矣故道德之旨未宏刻薄之風尚扇夫上風既扇則下生百端人競趨時憲章不一稽之王度實虧君道昔州犂上下其手楚國之法遂差張湯輕重其心漢朝之刑以弊以人臣之頗僻猶莫能申其欺罔況人君之高下將何以措其手足以睿聖之聰明無幽微而不燭豈神有所不達智有所不通哉安其所安不以恤刑為念樂其所樂遂忘先笑之變禍福相倚吉凶同域唯人所召安可不思頃者責罰稍多威怒微厲或以供帳不贍或以營作差遣或以物不稱心或以人不從欲皆非致理之所急實乃驕奢之攸漸是知貴不與驕期而驕自致富不與奢期而奢自來非徒語也且我之所代實在有隋隋氏亂亡之源聖明之所臨照以隋氏之府藏譬今日之資儲以隋氏之甲兵況當今之士馬以隋氏之戶口校今時之百姓度長比大曾何等級然隋氏以富強而喪敗動之也我以貧寡而安寧靜之也靜之則安動之則亂人皆知之非隱而難見也非微而難察也然鮮蹈平易之途多遵覆車之轍何哉在於安不思危治不念亂存不慮亡之所致也昔隋氏之未亂自謂必無亂隋氏之未亡自謂必不亡所以甲兵屢動徭役不息至於將加戮辱竟未悟其滅亡之所由也可不哀哉夫鑒形之美惡必就於止水鑒國之安危必取於亡國故詩曰殷鑒不遠在夏后之世又曰伐柯伐柯其則不遠臣願當今之動靜必思隋氏以為殷鑒則存亡治亂可得而知若能思其所以危則安矣思其所以亂則治矣思其所以亡則存矣知存亡之所在節嗜欲以從人省畋遊之娛息靡麗之作罷不急之務慎偏聽之怒近忠厚遠便佞杜悅耳之邪説甘苦口之忠言去易進之人賤難得之貨採堯舜之誹謗追禹湯之罪巳惜十家之産順百姓之心近取諸身恕以待物思勞謙以受益不自滿以招損有動則庶類以和出言則千里斯應超上德於前載樹風聲於後昆聖哲之宏規帝王之盛業能事斯畢在乎慎守而巳夫守之則易取之實難既能得其所以難豈不能保其所以易其或保之不固則驕奢佚動之也慎終如始可不勉歟易曰君子安不忘危存不忘亡治不忘亂是以身安而國家可保誠哉斯言不可以不深察也伏惟陛下欲善之志不減於昔時聞過必改少虧於曩日若能以當今之無事行疇昔之恭儉則盡善盡美固無得而稱焉臣聞為國之基必資於德禮君之所保惟在於誠信誠信立則下無二心德禮行則遠人斯格然則德禮誠信國之大綱在於父子君臣不可斯須而廢也故孔子曰君使臣以禮臣事君以忠又曰自古皆有死人無信不立文子曰同言而信信在言前同令而行誠在令外然則言而不行言不信也令而不從令無誠也不信之言無誠之令為上則敗德為下則危身雖在顛沛之中君子之所不為也自王道休明十有餘載威加海外萬國來庭倉廩日積土地日廣然而道德未益厚仁義未益博者何哉由乎待下之情未盡於誠信雖有善始之勤未覩克終之美故也其所由來者漸非一朝一夕之故昔貞觀之始聞善若驚既五六年間猶悅以從諫自茲厥後漸惡直言雖或勉強時有所容非復曩時之豁如也謇諤之士稍避龍鱗便佞之徒肆其巧辨謂同心者為朋黨謂告訐者為至公謂強直者為擅權謂忠讜者為誹謗謂之為朋黨雖忠信而可疑謂之為至公雖矯偽而無咎強直者畏擅權之議忠讜者慮誹謗之尤至於竊金生疑投杼致惑正人不得盡其言大臣莫能與之爭熒惑視聽鬱閼大猷妨化損德其在茲乎故孔子之惡利口之覆邦家蓋為此也且君子小人貌同心異君子掩人之惡揚人之善臨難不苟免殺身以成仁小人不恥不仁不畏不義惟利之所在危人以自安夫苟在危人則何所不至今將求致治必委之於君子事有得失或訪之於小人其待君子也則敬而疏遇小人也必輕而狎狎則言無不盡疏則情不上通是則毀譽在於小人刑罰加於君子實興喪所在亦安危所繫安可以不慎哉此乃孫卿所謂使智者謀之與愚者論之使修潔之士行之與汙鄙之人疑之欲其成功可得乎哉夫中智之人豈無小慧然才非經國慮不及遠雖竭力盡誠猶未免於傾敗況內懷姦利承順顏旨其為禍患不亦深乎故孔子曰君子或有不仁者焉未見小人而仁者然則君子不能無小惡惡不積無妨於正道小人或時有小善善不積不足以立忠今謂之善人矣復慮其時有不信何異夫立直木而疑其影之曲乎雖竭精神勞思慮其不可得亦巳明矣夫君能盡禮臣能竭忠必有在乎內外無私上下相信上不信則無以使下下不信則無以事上信之為道大矣哉故自天祐之吉無不利昔齊桓公問於管仲曰吾欲酒腐於爵肉腐於俎得無害於霸乎管仲曰此固非其善者然亦無害於霸也公曰如何而害霸乎曰不能知人害霸也知而不能用害霸也用而不能任害霸也任而不能信害霸也既信而又使小人參之害霸也晉中行穆伯攻鼓經年而不能下魏倫曰鼓之嗇夫倫之知請無疲士大夫而鼓可得穆伯不應左右曰不折一戟不傷一卒而鼓可得君奚為不取穆伯曰倫之為人也佞而不仁若使倫下之吾不可以不賞若賞之是賞佞人也佞人得志是使晉國之士捨仁而為佞雖得鼓將何用之夫穆伯列國大夫管仲霸者之佐猶能慎於信任遠避佞人也如此況乎為四海之大君應千齡之上聖而可使巍巍之盛德復將有所間然乎若欲令君子小人是非不雜必懷之以德待之以信勵之以義節之以禮然後善善而惡惡審罰而明賞則小人絶其邪佞君子自強不息無為而化何遠之有善善而不能進惡惡而不能去罰不及於有罪賞不加於有功則危亡之期或未可保永錫祚允將何望哉宰相有姦謀隱慝則人人皆得上論至於制置職業固是人主之柄非小臣所得干議古者朝廷之士尚各守官業思不出位況韋宏質賤人豈得以非所宜言上黷明主此是輕宰相矣後漢太學諸生頗干時政其時謂之處士橫議望陛下知其邪計從朋黨而來每事明察遏絶將來之漸則朝廷安靜邪黨自銷矣臣聞君為元首臣作股肱齊契同心合而成體巳成不備為未成人然則首雖尊高必資手足以成體君雖明哲必資股肱以致治禮云人以君為心君以臣為體心莊則體舒心肅則容敬書云元首明哉股肱良哉萬事康哉元首叢脞哉股肱惰哉萬事墮哉然則委棄股肱獨任胸臆具體成理非所聞也夫君臣相遇自古為難以石投水千載一合以水投石無時不有其能開至公之道申天下之用內盡心膂外竭股肱和若鹽梅固同金石者非惟高位厚秩在於禮之而巳昔周文遊於鳳凰之墟襪系解顧左右莫可使結者乃自結之豈周文之朝盡為俊乂聖明之代獨無君子哉但知與不知禮與不禮耳是以伊尹有莘之媵臣韓信項氏之亡命殷湯致禮定王業於南巢漢祖登壇成帝統於垓下若夏桀不棄於伊尹項王垂恩於韓信豈肯敗巳成之國為滅亡之虜乎又微子骨肉也受茅土於宋箕子良臣也陳洪範於周仲尼稱其仁莫有非之者禮記稱魯穆公問於子思曰為舊君反服古歟子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將墜諸泉無為戎首不亦善乎又何反服之禮之有齊景公問於晏子曰忠臣之事君如之何晏子對曰有難不死出亡不送公曰裂地以封之疏爵而待之有難不死出亡不送何也晏子曰言而見用終身無難臣何死焉諫而見從終身不亡臣何送焉若言而不見用有難而死是妄死也諫而不見從出亡而送是詐忠也春秋左氏傳曰崔杼弒齊莊公晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也故君為社稷死則死之為社稷亡則亡之若為巳死而為巳亡非其親昵誰敢任之門啓而入枕尸股而哭之興三踊而出孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如土芥臣視君如寇讎雖臣之事君無有二志至於去就之節尚緣恩施厚薄然則為人上者安可以無禮於下哉竊觀在朝㣥臣當樞機之寄者或地鄰齊晉或業預經綸並立事立功皆一時之選處之衡軸為任重矣任之雖重信之未篤信之不篤則人或自疑人或自疑則心懷苟且心懷苟且則節義不立節義不立則名教不興名教不興而可與固太平之基保七百之祚未之有也又國家重惜功臣不念舊惡方之前聖一無所間然但寬於大事急於小罪臨時責怒未免愛憎之心不可以為政君嚴其禁臣或犯之況上啓其源下必有甚川壅而潰其傷必多欲使凡百黎元何所措其手足此則君開一源下生百端百端之變無不動亂者禮曰愛而知其惡憎而知其善若憎而不知其善則為善者必懼愛而不知其惡則為惡者實繁詩曰君子如怒亂庶遄沮然則古人之震怒將以懲惡當今之威罰所以長姦此非堯舜之心非湯禹之事書云撫我則后虐我則讎孫卿子曰君舟也人水也水所以載舟亦所以覆舟孔子曰魚失水而死水失魚則猶為水也故堯戰戰栗栗日慎一日安可不深思之乎安可不熟慮之乎夫委大臣以大體責小臣以小事為國之常也為理之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重將以致理其可得乎又政貴有恆不求屢易今或責小臣以大體或責大臣以小事小臣乘非其據大臣孰得其所守大臣或以小過獲罪小臣或以大體受罰職非其位罰非其罪欲其無私求其盡力不亦難乎小臣不可委以大事大臣不可責以小罪任以大官求其細過刀筆之吏順旨承風舞文弄法曲成其罪自陳也則以為心不伏辜不言也則以為所犯皆實進退惟谷莫能自明則苟免其禍大臣苟免則譎詐萌生譎詐萌生則矯偽成俗矯偽成俗則不可以臻至理矣又委任大臣欲其盡力每官有所避忌不言則為不盡力若舉得其人何嫌於故舊若舉非其任何貴於疏遠待之不盡誠信何以責其忠恕哉臣雖或有失之君亦未為得也夫上之不信於下必以為下無可信若必下無可信則上亦有可疑矣禮云上人疑則百姓惑下難知則君長勞上下相疑則不可以言至理矣當今㣥臣之內遠在一方流言三至而不投杼者臣竊思度未見其人夫以四海之廣士庶之衆豈無一二可信之人哉蓋信之則無不可疑之則無可信者豈獨臣之過乎夫以一介愚夫結為交友以身相許死且不渝況君臣契合實同魚水若君為堯舜則臣為稷契豈有遇小事則變志見小利則易心哉此雖下之立忠未能明著亦由上懷不信待之過薄之所致也此豈君使臣以禮臣事君以忠乎以陛下之聖明以當今之功業誠能博求時俊上下同心則三皇可追而四五帝可俯而六矣夏殷周漢夫何足數焉臣聞知臣莫若君知子莫若父父不能知其子則無以睦一家君不能知其臣則無以齊萬國萬國咸寧一人有慶必藉忠良作弼俊乂在官則庶績其凝無為而化矣故堯舜文武見稱前載咸以知人則哲多士盈朝元凱翼巍巍之功周召光煥乎之美然則四嶽九官五臣十亂豈惟生之於曩代而獨無於當今者哉在乎求與不求好與不好耳何以言之夫美玉明珠孔翠犀象大宛之馬西旅之獒或無足也或無情也生於八荒之表途遙萬里之外重譯入貢道路不絶者何哉蓋由乎中國之所好也況從仕者懷君之榮食君之祿率之以義將何往而不至哉臣以為與之為忠則可使同乎龍逢比干矣與之為孝則可使同乎曾參子騫矣與之為信則可使同乎尾生展禽矣與之為廉則可使同乎伯夷叔齊矣然而今之㣥臣罕能貞白卓異者蓋求之不切勵之未精故也若勗之以公忠期之以遠大各有職分得行其道貴則觀其所舉富則觀其所養居則觀其所好習則觀其所言窮則觀其所不受賤則觀其所不為因其材以取之審其能以任之用其所長掩其所短進之以六正戒之以六邪則不嚴而自勵不勸而自勉矣故説苑曰人臣之行有六正六邪行六正則榮犯六邪則辱何謂六正一曰萌芽未動形兆未見昭然獨見存亡之機得失之要預禁乎未然之前使主超然立乎榮顯之處如此者聖臣也二曰虛心盡意日進善道勉主以禮義諭主以長策將順其美匡救其惡如此者良臣也三曰夙興夜寐進賢不懈數稱往古之行事以勵主意如此者忠臣也四曰明察成敗早防而救之塞其間絶其源轉禍以為福使君終以無憂如此者智臣也五曰守文奉法任官職事不受贈遺辭祿讓賜飲食節儉如此者貞臣也六曰國家昏亂所為不諛敢犯主之嚴顏面言主之過失如此者直臣也是謂六正何謂六邪一曰安官貪祿不務公事與代浮沉左右觀望如此者具臣也二曰主所言皆曰善主所為皆曰可隱而求主之所好而進之以快主之耳目偷合苟容與主為樂不顧後害如此者諛臣也三曰內實險詖外貌小謹巧言令色妬賢嫉能所欲進則明其美隱其惡所欲退則明其過匿其美使主賞罰不當號令不行如此者姦臣也四曰智足以飾非辨足以行説內離骨肉之親外搆亂於朝廷如此者讒臣也五曰專權擅勢以輕為重私門成黨以富其家擅矯主命以自顯貴如此者賊臣也六曰諂主以邪佞陷主於不義朋黨比周以蔽主明使黑白無別是非無間使主惡布於境內聞於四鄰如此者亡國之臣也是謂六邪賢臣處六正之道不行六邪之術故上安而下理生則見樂死則見思此人臣之術也記曰權衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以姦詐然則臣之情偽知之不難矣又設禮以待之執法以御之為善者蒙賞為惡者受罰安敢不企及乎安敢不盡力乎國家思欲進忠良退不肖十有餘載矣徒聞其語不見其人何哉蓋言之是也行之非也言之是則出乎公道行之非則涉乎邪徑是非相亂好惡相攻所愛雖有罪不及於刑所惡雖無辜不免於罰此所謂愛之欲其生惡之欲其死者也或以小惡棄大善或以小過忘大功此所謂君之賞不可以無功求君之罰不可以有功免者也賞不以勸善罰不以懲惡而望邪正不惑其可得乎若賞不遺疏遠罰不阿親貴以公平為規矩以仁義為準繩考事以正其名循名以求其實則邪正莫隱善惡自分然後取其實不尚其華處其厚不居其薄則不言而化期月而可知矣若徒愛美錦而不為人擇官有至公之言無至公之實愛而不知其惡憎而不知其善徇私情以近邪佞背公道而遠忠良則夙夜不怠勞神苦思將求至理不可得也
