front:
  text: 全唐文欽定全唐文卷一百六帝諱亶初名嗣源代北人世事太祖遂從姓李氏唐咸通八年生同光元年授蕃漢馬步總管加太尉四年四月即位改今名長興元年上尊號聖明神武文德恭孝皇帝四年再加尊號聖明神武廣道法天文德恭孝皇帝在位八年年六十七諡曰聖德和武欽孝皇帝廟號明宗
  hash: sha256:3e4afbd72b2dbe247bb3c20ea94e318e2d132210c7f18f65ba72848a81607c3f
  markers:
  - {type: head, offset: 12, content: 後唐明宗, id: KR4h0168_NFKB_106-h1, level: 1}
body:
  text: 寡人允副羣情方監國事外安黎庶內睦宗親庶諧敦敘之規永保隆平之運昨京師變起禍難薦臻至於戚屬之閒不測驚奔之所慮因藏竄濫被傷夷言念於茲自然流涕宜令下河南府及諸道應諸王眷屬等昨因變起出奔所至即時津送赴闕如不幸物故者即量事收瘞以聞今年夏苗委人戶自供通頃畝五家為保本州具帳送省州縣不得差人括如人戶隱欺許人陳告其田倍徵其百姓合散蠶鹽每年抵二月內一度俵散依夏稅限納錢夏秋苗畝稅子除元徵石斗及地頭錢餘外不得紐配欲運陰陽賢者諒資於籌畫將烹鼎飪哲王取喻於鹽梅是知心恬淡則燮理無差意平正則調和靡慝王者以二儀為法百度是貞將施理國之規必慎代天之任其有鎮時望重濟物才高或早推房杜之風或暗合孫吳之略咸膺妙選適副旁求光祿大夫太子賓客上柱國滎陽郡開國侯食邑一千戶鄭禮樂成家鈞台接武珪璧耀無瑕之彩咸韶奏希代之音雅度不羣貞規拔俗為縉紳之楷範作文學之宗師歷踐華資嘗居重任舒卷罔渝於古道坦夷不易於沖襟允謂正人實符休運正議大夫守工部尚書上柱國樂安縣開國男食邑三百戶賜紫金魚袋任圜儒元繼代簪組傳芳蘊穰苴文武之才抱季子縱橫之略早參戎幕既備展於良謀洎尹京復廣敷於善政掩李牧防虞之術繼蕭何饋運之勞安北邊而顯賴殊功伐西蜀而固資婉畫及康延孝忽從劒閣欲襲錦川統戎至及於三千破賊將踰於萬數姦凶盡戮卭蜀再寧靜十道之妖氛息三川之生聚遠提銳旅來赴上京適當纂紹之初尤驗忠貞之節而鬱於人望協彼僉諧宜膺並命之榮允謂當仁之選或升書殿或掌國租冀伸致主之嘉猷別展富民之茂績於戲位尊百辟職總萬機公忠則庶政惟和便辟則彞倫攸斁慎宜九德勉阜羣生可中書侍郎兼刑部尚書平章事集賢殿大學士圜可金紫光祿大夫中書侍郎兼工部尚書平章事判三司故西道行營都招討制置等使守侍中監修國史兼樞密使郭崇韜宜許歸葬其世業田宅並還與骨肉故萬州司戶朱友謙可復護國軍節度使守太師兼尚書令河中尹西平王所有田宅財產並還與骨肉革則縱田客以殺人說則侵隣家而奪井選元亨之上第改王參之本名或主掌三司委元隨之務局或陶鎔百里受長吏之桑田咸屈塞於平人互阿私於愛子任官匪當黷貨無厭謀人之國若斯致主之方安在既迷理亂又昧卷舒而府司案牘爰來諫署奏章曡至備彰醜迹深汙明庭是宜約以三章投之四裔其河南府文案及蕭希甫論䟽並宜宣示百僚豆盧革韋說等身為輔相手握權衡或端坐稱臣或半笑奏事於君無禮舉世寧容革則暫委利權便私俸祿文武百辟皆從五月起支父子二人偏自初正給遣說則自居重位全紊大綱敘蔭貪榮亂兒孫於昭穆賣官潤屋換令錄之身名醜行曡彰羣情共怒雖居牧守未塞非尤革可責授費州司戶參軍說可夷州司戶參軍皆員外置同正員並所在馳驛發遣契丹盧龍軍節度使檢校太尉盧文進遼西飛將薊北雄才頃以被讒因而避禍雖附茹毛之俗長懷向國之誠將軍寧屈於虜庭校尉終還於漢壘洎於纂紹果卜旋歸繼飛鴈足之書累殄龍庭之虜前冒白刃中推赤心擁塞垣之車帳八千復唐土之民軍十萬氣吞沙漠義貫神明爰降寵章以旌壯節可特進依前檢校太尉同中書門下平章事使持節滑州諸軍事守滑州刺史充義成軍節度滑濮管內觀察處置等使仍封范陽郡開國侯食邑一千三百戶兼賜推忠翊聖保義功臣王者祗敬宗祧統臨寰宇必順體元之典特新制義之文朕以眇躬獲承丕構襲三百年之休運繼二十聖之耿光馭朽納隍夕惕之心罔怠法天師古日躋之道惟勤今則載戢干戈混同書軌荷元穹之睠佑契兆庶之樂推簡玉泥金非敢期於薄德耕田鑿井誠有慕於前王將陳享謁之儀即備郊丘之禮宜更稱謂永耀編今改名為亶凡在中外宜體朕懷昔舜命皐夔百揆時敘湯命仲虺萬國咸寧道既合於君臣事實光於今古朕克相上帝敷佑下民惟順考於典墳俾旁求於彥傑升之廊廟付以鈞衡期共理於寰區冀永康於黎庶厥有明哲咸謂碩儒早隆佐命之功久負濟時之器必使膺茲大任弼我丕基既詢謀以僉同固朕志而先定爰行並命是降寵靈端明殿學士朝議大夫守尚書兵部侍郎上柱國賜紫金魚袋馮道四瀆凝休五行鍾秀積善克承於家訓揚名端守於素風孔門曾顏寧同懿行漢庭嚴樂詎比宏才溫恭為君子之儒慤厚有大臣之體故自從龍契會倚馬摛詞首賛先朝紹隆丕業為善不伐有能不矜守廉貧則罔恥縕袍持慎審則靡言溫樹自予纂嗣賴爾弼違爰精選於禁林乃特遷於祕殿愈陳規誡屢罄論思都正直以莫倫諒真純而罕匹銀青光祿大夫守太常卿判吏部尚書銓事上柱國崔協星辰降彩軒冕聯榮禮樂稟於生知詩書博於時習輝華繼世可鄙荀陳清貴傳家固超王謝自登高第踐歷周行居省闈則職業備修升憲府則朝綱克振近者委司選部命典秩宗轄彼銓衡則羣才適序調其律呂則雅音克諧既揚正始之風可驗中和之德並以功庸夙著問望彌高宜允副於具瞻俾顯當於爰立是命寵升黃閣光弼紫宸或居書殿之榮俱列戶封之貴仍加峻級以示新恩道既叶於咨詢心乃符於啟沃於戲知人則哲予竊慕於前王事君盡忠爾巳聞於當代更宜夙夜慎保初終使社稷以無憂期子孫之有賴往踐厥位汝惟戒哉道可正議大夫中書侍郎平章事充集賢殿學士協可中書侍郎平章事朕聞襲弓裘之美惟孝承家秉旄鉞之權惟忠報國其有顯居世祿傑出時材疾風端勁草之心積雪驗貞松之節恐毀我室非䦧於墻宜遵紹續之文俾授統臨之寄爰於剛日特舉彞章威武軍節度觀察留後起復雲麾將軍檢校太傅使持節舒州諸軍事守舒州刺史兼御史大夫柱國瑯琊縣開國伯食邑七百戶王延鈞拱北華星圖南巨翼垂金精於元象刷玉宇於雄風而自皁蓋分憂清源共理五馬之聲光首出八龍之價譽相高既綰圭符俄從金革在原無惠咸推晉后之賢當璧有徵大叶楚人之望而又上欽天眷旁沮物情守祖考之貽謀却蕃宣之承制心傾皎日義惡浮雲建溪之誓帶如河閩嶺之礪山齊嶽父風宛在臣節彌堅是命高建牙璋洞開玉帳錫以油幢瑞節廣其淥水紅蓮寵冠阿衡貴同緹騎尊以師而表敬實其戶而增封併示貞榮仍加懿號於戲象賢務德克揚嗣子之名進律推恩當顯使臣之禮勉膺殊渥永保令圖可依前授起復雲麾將軍右金吾衞大將軍外置同正員檢校太師守中書令福州大都督府長史充武威軍節度福建管內觀察處置兼三司發運節度封瑯琊王朕恭膺大寶虔荷丕基選衆與能克保君臨之道寶賢念舊庶符帝賚之資繇是推以腹心授之衡柄冀扶持於寡昧申啟沃於始終其有樂在晏安勇於沖退宜暫均於勞逸思顯示於優隆光祿大夫門下侍郎兼工部尚書平章事監修國史上柱國樂安郡開國侯食邑一千戶任圜天授宏材波澄偉度早負公侯之器深懷將相之資智擅圓方謀惟通變先皇帝中興景運再造鴻圖夙參佐命之功迥著安時之業克平卭蜀大掃妖氛鬱有殊庸雅為良弼朕惟薄德尋所注懷爰自六卿擢居四輔秉國鈞之重任掌邦計之劇權內罄沃心外彰陳力方期委任遽閱封章曲徇汝懷固違朕旨既披陳而莫抑在進退之有常宜更鳳沼之尊俾踐龍樓之秩勉從頤養勿替謀猷可落平章事守太子少保朕聞老氏談經無如知止素王窮易當在庶幾賢哲所以保身進退於焉合道其有位居元輔功敘彞倫節宣微爽於沖和休致屢堅於章表酌其陳力莫若從人俾迴席於三台就懸車於百揆特進行門下侍郎兼刑部尚書同中書門下平章事充太微宮使宏文館大學士上柱國滎陽郡開國公食邑一千五百戶鄭皇朝軒冕清廟笙鏞崇令望於縉紳節雅音於律度而自再持鈞軸益顯公忠尋更近市之居兼杜掃門之跡克己復禮為官擇人爰屬巡幸浚郊務名賢而好善經營雒邑煩上相以卜年方賴嘉猷忽嬰美疹豆耳何妨於寂聽灰心頓悟於浮榮高慕赤松勇辭黃閣朕以方調殷鼎尚睠晉罇欲盡慇懃具觀堅切可久之規斯在再三之請莫違所以特許抽簪免勞借箸進崇階於開府假優秩於不朝仍益井田俾厚風俗於戲祁奚請老不無內舉之規張禹言情亦有私恩之事唯卿奉身而退其德不回予實嘉焉美兼善也勉從頤養永保初終可開府儀同三司尚書左僕射致仕仍加食邑五百戶夫忠而能力蓋臣子之嘉猷賞不踰時乃君親之大義其有一心奉國萬里勤王宣至化於遐陬振威聲於異俗宜升寵秩式示優恩竭忠建策興復功臣東南面行營副招討使寧江軍節度觀察等使光祿大夫檢校司徒使持節都督夔州諸軍事守夔州刺史西方鄴壯節挺生英材閒出居家克孝事主能忠總銳旅以遄征飛捷書而薦至一日千里復峽內之土疆七縱七擒盪荊門之妖祲近令偏將徑取敵城運籌之智神輸破竹之威電速漸平兔穴當覆梟巢方堅倚仗之誠宜降襃崇之命俾兼為保益重殿邦既虎踞於上流佇鯨吞於下瀨於戲功名既立節義彌高鼎鐘方示於鐫銘綸綍寧煩於訓誡唯期帶礪永協雲龍可檢校太保使持節都督夔州諸軍事守夔州刺史寧江軍節度觀察等使王者君臨八表子育萬民務匿瑕含垢之仁引禁暴戢兵之德每存寬恕貴就和平其有受國深恩承家舊履乖失臣節包藏禍心萌悖亂以欺天資貪殘而害物苟無征討曷示紀綱義武軍節度觀察等使檢校太尉兼中書令守定州刺史太原郡王王都猥以凡材託於盛族梟獍之凶早縱豺狼之性不移位極人臣跡無忠孝自朕纉承大業懷輯羣方山河之寄愈堅帶礪之盟益甚凡於事體每務優崇骨肉淪落者並致歸還嗣息薦論者遍加任使一門受寵九族同榮近以家艱曡頒國命行弔遠繄於卿士奪情尋復於公侯繼下絲綸薦及垣翰在予之分於爾何虧而屬者所為頻彰逆狀徵發不從於朝命賦租罔係於省司擅致軍都遍抽編戶專修城壘濳造甲兵說誘佐命藩臣留滯歸朝刺史賴皆忠順尋各奏聞曾令近侍馳書責使深思改過載惟撫御敢怠含宏近乃長惡靡悛亂常尤甚遣姦人招軍前節級出妖言惑管內生靈兼挂牒文巳為邊患闔境之蒸黎愁沮遠遣告陳鄰藩之主帥封章共期戡定其王都宜削奪在身官爵仍令馬步兵士於州側近權置行州招誘在州軍人百姓及安撫鄉川人戶於戲不祥之器寧願舉於干戈無罪之民豈忍墜於塗炭將行弔伐倍軫情懷勉施拯救之功勿致傷夷之弊雖軍威須振在王道無虧凡百戎臣當體朕意宣布遐邇咸使聞知朕自承天命恭襲帝圖務令黔黎永安非止皇居獨樂當艱虞之際與良將共靜邊塵及開泰之時於諸侯並崇官爵既酬勳而示寵賴撫俗以經心託在無私期於共理有功者切於慶賞有過者非所願聞陶以偶違勅條無柰何而從謫宦廷隱以全虧公道不獲巳而就極刑乃朝典之須行實朕心之不樂備軫泣辜之念更嚴加禁之規況在藩方皆明理本節度使等時號山河之主縣令亦人呼父母之君並切為時皆勤布化不獨榮於身世兼乃慶及子孫當虔夕惕之懷同廣日新之政各處有功之地永為無過之人宜體朕懷共資王道朕聞魏絳和戎始克諧於金石祭遵征虜終併息於煙塵此乃先務柔懷後申禁暴明國家之耀德表藩翰之圖功既立丕勳宜加懋賞興邦守正翊賛功臣盧龍軍節度管內觀察處置押奚契丹兩蕃經略盧龍軍等大使特進檢校太尉同中書門下平章事幽州大都督府長史上柱國天水縣開國侯食邑一千戶趙德鈞崆峒稟氣渤澥融精傳將略於黃公受兵符於元女而自羈縻戎馬控制盧龍洞曉蕃情飽諳邊事獲其五利嘗姑息於鮮卑運以六韜果生擒於惕隱可謂坐籌帷幄能執干戈終殄寇於中山永摧凶於外域犬羊南牧賴掃蕩於尋時貔虎北征遂凱旋於此日加以民軍胥悅畏愛並行薊門之人物如初燕谷之粢盛畢備得不疇其庶績襃以徽章就加進律之文式叶陟明之典是命寵頒鳳綍榮列貂冠正爵位於三公加井田於千戶貴申殊渥仍賜真封於戲事君之節巳彰燕山紀頌教子之方大著踐土臨戎有國有家惟忠惟孝享茲具美永保令猷可依前檢校太尉兼侍中幽州大都督府長史充盧龍軍節度觀察等使進封開國公加食邑五百戶食實封一百戶朕嘗披國史備閱軍功裴度之破淮西無遺廟算石雄之攻山北益展皇威莫不仰遺烈於祖宗委全才於將相而自中山逆命外域朋姦奪戎旅以鷹揚屠賊兵而魚爛夕聞告捷朝賞殊勳竭忠建策興復功臣北面行營招討歸德軍節度宋亳單潁等州觀察處置亳州太清宮等使權知定州軍州事特進檢校太傅同中書門下平章事使持節宋州諸軍事宋州刺史上柱國瑯琊郡開國侯食邑一千戶王晏球長劒倚天洪河帶地居萬夫之長擅三傑之名黃石兵書運子房之籌略清淮公族興仲爽之源流自統雄師往收逆壘摧曲陽之堅陣厭宀元攵水之驚波爰築室以反耕攻圍雉堞果析骸而易子傾覆鳥巢招降之士庶數千撲滅之凶狂非一王都授首禿餒生擒火焚而惡蔓皆除電掃而妖氛併息諒茲丕績宜降優恩迺眷汶陽實惟巨鎮據犬牙之內地當馬頰之要津是命疇以勳庸福其黎庶進國公之品秩崇藩后之等威俾濬鳳池仍加蟬冕帷幄共推於重席井田兼別於真封於戲解甲休兵實歸於上將安民和衆議仗於賢臣永保令猷無替朕命可依前檢校太傅兼侍中使持節鄆州諸軍事守鄆州刺史充天平軍節度齊棣等州觀察處置使仍進封開國公加食邑一千五百戶食實封一百戶行營副招討橫海軍節度觀察等使守滄州刺史李從敏可光祿大夫檢校太保使持節定州諸軍事守定州刺史充義武軍節度觀察北平軍等使進封開國伯加食邑一千二百戶北面行營兵馬都監鄭州防禦使張虔釗可光祿大夫檢校司徒使持節滄州諸軍事守滄州刺史充橫海軍節度觀察等使仍封清河縣開國子食邑五百戶朕自嗣守丕基勤修庶政於茲四稔罔怠萬機上實賴乎祖宗下必資於卿士卑躬克儉景行前王側席求賢追蹤往哲日懼一日雖休勿休幸致風雨不干戈載戢九穗之禾應瑞足表豐年兩階之舞咸賓無虧曠代敢萌矜伐漸喜隆平然而圓丘之禮未陳清廟之詩未著夙宵增懼寤寐興懷何以助天之高而報地之厚也且天覆予為子民戴予為君苟帝道未臻則人倫焉正必須燔柴瘞玉嚴六宗虞典之禋非敢刻石泥金竊萬歲嵩高之美凡在遐邇當體至懷朕取來年二月十一日有事於南郊朕恭荷丕圖獲申大禮蓋股肱之叶力環衞之輸忠將士等扈從乘輿警巡晝夜咸彰勞瘁深所嘉稱各示頒宣以明酬奬宜令三司依等第勘會指實人數指揮支給其諸道州府如本處有絹帛準價折支無見在錢物即就便支遣兼差使臣各往逐處宣賜仍下六軍諸衞準此告諭獲遇拜郊遠來行事既施微效宜被優恩欠一選者宜令待闕欠兩選者減一選欠三選四選者減兩選欠五選六選者減三選欠七選八選者減四選欠九選巳上者減五選三司勒停官顯有過愆遂當停替不逢大禮終是棄人仍令所司以罷官理選赴常調如是今年合格者許令待闕注擬仍委吏部南曹依元勘事節合減選數給付牒知衡之平不欺於物水之止洞鑑於形厥有操心秤而無撓重輕掛人鏡而自分妍醜所以旁求多士果得正人符夢卜而惟吉之從舉賢良而不仁者遠命為予弼僉曰汝諧朝議大夫守太常卿上柱國隴西縣開國男食邑三百戶賜紫金魚袋李愚勁草淩風孤松抱雪向歷艱難之運再逢開泰之期先皇擢在禁林輟隨征斾鋒鋩翰墨經劒閣而無競刊銘糞土珠金入刀州而未嘗關夢罔矜諭蜀素蘊致堯洎朕纉紹丕圖服勤內署慎密而不言溫樹論思而守奉甘泉及掌文闈大開公道樹杏壇而重興四教歷蘭省而再陟二卿當祀周郊密承殷誥泥金而將期獻頌擊石而尋致來儀既歷試諸艱且爰立作相是命亞鳳池之貴位領虎殿之羣儒仍進崇階兼加好爵於戲久虛右席俾運前籌期偃戢於干戈致混同於書軌以毗乃辟正事惟醇則霖雨鹽梅於是乎在可正議大夫守中書侍郎平章事集賢殿大學士朕聞燮理陰陽霖雨之功是託調和鼎鼐鹽梅之味攸憑蓋貞淳則克契二儀正直則允諧庶品必在懸衡秉志定鏡操心苟無爽於毫釐則濳符於造化將付代天之柄宜歸不世之才今得良臣庶臻治道端明殿學士中大夫尚書兵部侍郎上柱國賜紫金魚袋趙鳳丹山瑞彩赤堇靈鋒清明猶水鏡冰壺質厚若渾金璞王動惟稽古靜可鎮時夢傳五色之毫文章煥爛力就三冬之志學藝縱橫頃在禁林嘗傳職業始中原之大定屬萬國以來朝制命聯帛丿糸詔書曡委共歎立成之敏略無停綴之時洎朕承基復資演誥俄遷居於祕殿嘗密賛於鴻圖實賴謀猷每嘉經濟爰司貢部俾選儒徒果無遺逸之名足見搜羅之道昨朕將還雒邑特委浚郊一時權藉於殿邦期月尋聞於報政恩威並設賞罰皆明夷門無夜柝之喧梁苑遂春臺之樂克膺重寄允謂周才宜顯處於巖廊貴大施於陶冶黃扉峻秩粉署崇資兼煩筆削之功更代編之職勳階並進爵邑惟新足為爰立之榮在體勤求之意唯思啟沃端俟弼諧於戲應夢卜之祥當股肱之任關羣生之休戚繫萬宇之安危社稷是平寰瀛繄賴勉勤夙夜無怠初終勿令伊說皐夔咸擅美於前也可正議大夫門下侍郎兼工部尚書同平章事監修國史上柱國仍封天水縣開國男食邑三百戶朕自恭臨萬國惠撫兆民遵上古清淨之規削近代繁苛之政兩稅之外別無徵歛之名八年之閒繼有豐穰之瑞覩流亡之漸復謂富庶之可期爰自今秋偶愆時雨郡縣累陳於災沴關粱亦奏於逃移良由朕刑政或差感通不至責躬罪已靡忘於懷特議優矜庶令安集據河中同華耀陝青齊淄絳萊等州各申災旱損田處巳令本道判官檢行不取額定頃畝如保內人戶逃移不得均攤抵納本戶租稅其稅子如闕本色許納諸雜斛斗薥黍充每斗折粟八升今許納本色稗子特與免稅前件遭旱州府據檢到見苗仍恐輸官不迨今祗徵一半稅物仍許於便近州府送納其餘一半放至來年其逃移戶田產仰村隣看守不得殘毀必在方岳羣后州縣庶官各體憂勤共相勉勵明詳獄訟恭守詔條上答天災必思於戒懼下除民瘼必務於撫綏當共卹於疲羸勿自安於逸樂故晉國夫人夏氏素推仁德久睦宗親嘗施內助之方不見中興之盛予當御極子並為王有鵲巢之高無翬衣之貴貞魂永逝懿範常存攷本朝之文沿追冊之制將慰懷於九族冀叶慶於四星宜追冊為皇后兼定懿號
