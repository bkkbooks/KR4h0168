front:
  text: 全唐文欽定全唐文卷八百八十徐鉉三
  hash: sha256:839fd22bf5bb787a58b11d41e3b7e1d98a4eafda05765b1f75cfc3046956d2c8
body:
  text: 敕王者用士其要惟公苟得其才近親何避某官李景述承茂勳之後秉素士之風頗有美名聞於戚里郡丞之任為久臺郎之位為宜俾疏慶恩改授清級無忘師友之訓以奉朝廷之儀敕王者之正百官也黜其有過其肆大眚也許以自新則邦典行而朝恩浹矣某官趙丕謹行以處衆克勤以在公臺省踐更誠心不替故先皇獎用寄以準繩而靡達官常自罹常憲朕纘承鴻業廣布慶恩以其久列班行偶因迷謬特申渥澤俾授正卿勉勵乃心佇揚令望敕諸侯之佐命於朝廷而治績有勞奏課稱最者則當升閨籍補為省郎蓋勸能取士之旨也某從事大鎮於茲纍年本以誠明濟之通敏論不阿諂政無頗邪一方允釐爾實有力今豫寵爾以立朝之位命爾以司藩之官爾其敬哉無忝我陟明之典敕袁特朕以關輔之大控制要津出保傅之重鎮之以屏王室擇賓從之賢佐之以齊政經而特尹縣神州理甚簡便運籌盛府言必端詳叶於簡求宜授斯任夫潤之民固與洪無異而爾之操當與初不渝則官業允釐而朝獎無替矣敬服斯訓往勵乃司可敕喬匡舜朕以師傅之重敬而不違式遂便安俾臨關輔而軍旅之事不可無佐奏記之任不可非才聞匡舜以高文受知以直道從事歷歲斯久宏益居多故因其賓席之資加以紫綬之貴改轅東適從吾上公無替初心以忝朝命敕秉記言之筆以侍左右受司聰之寄以典出納並居二職其可非才某官查文徽儒雅表文忠厚成質早踐華貫時為名臣以南宮清望之資當憲府雄極之任提綱有序而衆目以理正身自處而周行以清物論與之豫用嘉尚居中理極不亦可乎噫為朕腹心注人耳目執節一懈悔咎隨之爾其慎之無忝吾命可敕長人之吏親職為勞觀風之佐坐籌為異均其所任是曰優恩某官顧彥回以清節士風嘗恭王府以耆年篤行出字齊民課績尤異自當優寵驅馳州縣非為所宜俾陟賓階奉我元老優遊盛府足以光華朕以將復淳風務先理道思得良二千石以安吾民倘副簡求迭受大郡斯蓋布政懋官之旨也某官周宏祚勳臣之子雅有父風自服佩恩華踐更事任訓齊武力能得士心綏懷邊戎克壯兵略俗阜秩滿序勞當遷朕觀其才可謂良矣青陽名郡控制中流前所任者咸屬重望今以授爾爾其欽哉進爵升階式示兼寵苟勤節弗易池人來蘇考績策勳吾有彞典敕虔之為鎮俗雜地廣化不可一時生寇攘萑苻既平閭井思乂可以佐吾良帥而寧吾齊民者亡聞某官鮑濤久倅列郡克舉官常從政以和理劇無滯况虔吉鄰郡聲績素彰便道之官率舊為用副茲慎選誰曰不然爾其敬承無忝明訓敕王者推念舊之心申優賢之旨官序出處從其所安諒不可滯於一方也某官閻居常執心沖粹為學精博修賢人之業多長者之言粵豫纂承實重舊德俾掌駮議直於瑣闈而無妄之疾未痊貞退之請彌切重違誠願抑此朝恩俾佐藩方式便頤養金印紫綬邦土憲司併申寵光以示優渥陟明之典當俟有瘳可敕某官韓熙載朕以因心之感同軌有期嚴恭禋祀仍從此始求所以節豐儉而振廢闕者屬於禮官慎選其人必在時彥以熙載學問精贍辭氣亮直本以通識濟之奇文惟名與實咸副是命故輟自東觀列於曲臺使代稱禮樂之盛吾實有望於爾勉之哉敕為政之要在乎安民長人之吏在乎慎選故吾用古道擇尚書郎而命之某官張緯學問該通辭藝精絶自東朝載筆石室抽文朝論藹然以為名士矧又洞識理體周知物情是為通才何適不可王畿大邑既庶而富藉爾敏惠為吾教之仍假臺郎以申朝獎苟聞報政豈吝加恩可敕多士之世副臺郎之選者前代謂之賢乃知三署之屬例無輕授某官高越早踐朝序嘗為史臣當官有聲聚學不倦頃屬上將出臨大藩輟參入幕之資備觀理劇之用府罷赴闕時名益高司川之秩俾從真授無忘職業以荷朝恩敕南藩之寄宣城為最師徑而衆地近而雄故朝命列授以二軍事所以重其威令也某官趙仁澤名將之子頗有父風在軍積年武略精練出宰大邑歸預禁營副豫簡求俾隸宣部往綏乃績無替前勞敕某官高弼王者之用師也必先以文告之命訓誓之辭故戎車之往記室為重而朕前委愛弟實司邦政今命汝弼使典軍書任才責功其意斯在矧弼嘗參西掖尋履南省所歷之任藉藉有聲今能奮雄辭而塞慎選陟明之典豫豈忘哉敕左領軍衛將軍甲仗宮城營造等使孔昌祚朕以長淮北偏隔閡戎夏惟彼泗口實當要衝凡為守臣罔不慎選而昌祚以貞幹事以勤懋德周廬巡徼之政宮禁繁劇之司董齊典理靡有違者歷歲且久秉心不渝朕觀其才可為邊將授以符竹付之臨淮爾其揚我武威修乃郡政登於考功之籍以塞任能之恩可敕某官方訥朕以分陜之任非親賢不可故迭用子弟以居守復以佩觽之齒唯訓導是務故慎選名德以從行而朕在東朝先皇命爾訥列我賓席恭慎文雅挹其風度將順規諷揖其忠誠尋又奉豫愛子益固是道今所授任非訥而誰客曹正郎留臺幕職往示兼寵爾其敬哉乃心不渝懋典寧忘敕某官田霖朕命愛子表正東夏管記之任樽俎之間唯才與行乃可是選而朕在儲二則嘗知霖文藝直心綽有餘裕纍參載筆之任近登祕籍之司列於王宮頗叶時望故授以留臺之職副茲託乘之求爾往敬哉無忝豫命敕王者之行慶也獎能振滯赦過責功如斯而已矣某前為縣佐以公事罷免而聞其立身修已有足多者故從其滌瑕之命升諸祕籍之司往服乃官勿重而悔敕某官王崇昭西南大藩庶政繁會獄訟之理欽恤是先重輕一隳手足無措必得朝士以典掌之而聞崇昭可當斯任往蒞乃職無忘益恭敕某蔭藉從仕以儒術資身蓬閣曳裾早揚聲問侯藩載筆亦懋勤勞向事圭符實司經紀州縣之職非其所長既失儀刑遂從罷秩今慶賞斯浹一眚咸矜復爾名籍俾參寺吾不記過爾其自修敕朕以不德恭承丕基思聞獻替之言以自開悟故於侍從之列尤用簡求矧乃職奉詔命地參公輔歷代精選可虛授乎某以風度爽邁克嗣遺允以文章宏雅纍踐清途先皇器之任遇尤重故其冠翰苑掌天官長憲臺肅千里靖恭於位績用有成舒人既康執壁來覲宜加疏等之命擢為鳳閣侍郎敬之哉夫出為諸侯非不貴也入首三品非無位也持重足以鎮物納忠足以報我匡正不逮豫有望焉敕某以外諸侯吏入為尚書郎者非推恩酬勞何以臻此聞爾宰百里佐廉車皆有政能宜當選任往祗乃事無忝豫恩敕某夫御史之列皆一時之清選而貴仕所由漸也聞爾執心有常從事以直持刑甚平允當官有勤勞故升諸朝廷俾之察視爾其懋乃才用修我紀綱無傾側糾訐以為能依阿顧避以自守勿貽爾悔以忝豫恩敕侍從無職總同清要若乃參書殿之列備切問之重使如綸之命式光人文無詢之言不入吾耳所寄若是其選可知某惟望與才皆副是任况東畿亞府有理劇之用南宮禮典多伏奏之勤俾膺簡求必叶虛佇夫前言往行爾所祗服正辭讜論豫之嘉聞無從非彞以忝多訓敕恥過作非言不顧行為臣如此在法難容某頃自歸朝頗推有勇俾之為將所以圖功及封疆多難之時車徒四出之際遂能激揚壯節措之師旅付以圭符而畏懦屢聞遁逃不暇震驚城守詿誤軍謀當此之時已宜行法豫以義深罪已功在止戈既屈身以弭兵乃含垢而務德復移郡寄仍綰使權苟奏課之有聞亦在人而何棄未終考績爰掇訟辭猶且纍上素章屢言搆陷洎遣制使明徵其辭乃自滁陽罷郡已來筠州移郡之後侵漁公帑積數且多干犯詔條為罪不一證據明具詞理並窮殊不省非更為文過謂競厮養為恥以對獄官為羞欲蓋彌彰侮我何甚其武勇也既如彼其誠心也又如此倘猶宏恕何以律人尚以君臣之間務全終始特從薄貶庶克自新勉荷寬恩無重而悔維保大元年八月丁未朔某日皇帝若曰稽古夷庚祗叶皇極建侯樹屏保乂王家用能乘運會昌歷世重光先哲所以啓後列辟所以時憲者也我思立愛宜有加焉咨爾二十弟某中和萃靈寬裕成德戲必俎豆之禮學無城闕之遊聰明仁智仰遵前訓孝友姻睦率由生知昭此玉音應於麟趾朕以不德凜乎丕承文武之功期無獨享契龜胙土抑為舊章今使某官某持節册爾為保寧王食邑二千戶敬之哉昔我文考對越上帝敷佑下民克儉於家無縱於逸再造之業與世無窮豫以爾有邦膺受繁祉今爾尚迪遺烈保終令圖無從非彞無狎非正耉老是聽訓典是師綏寧乃封以永元吉維年日月皇帝若曰稽古皇極訓民事神詔大號以崇正直之威垂大名以紀昭明之德牲幣有數典禮不愆政是以和神降之福莫不由斯者已若乃以死勤事沒而不朽流光儲祉蔣帝有焉惟帝冥符靈氣孕育元造嘉猷雄略昭映前人在昔潛耀大川躍鱗下邑著艱難之節所以事君彰變化之神所以顯俗惟德是輔感而遂通建福會昌以戡時難豐功厚德以享帝郊史臣執簡於無窮工祝正辭於不絶顧惟寡昧祗嗣龎鴻敢忘人謀以叶靈貺瞻言神嶽作鎮皇州興運維新符丕顯而位極於炎昊名謝於康惠墜典未舉豫用慊焉濮陽諸姬實纂服之舊邦克寸亂除害乃庇人之盛業合為縟禮申告祠庭今使使某官持節奉册追諡曰莊武帝嗚呼丹青懿烈光光如彼簡册廟貌昭昭如此永為民正無乏神主之望焉維年月日國主若曰稽古大猷啓迪來裔籓翰之寄重事也不以親屬為嫌寶玉之分盛典也不以死生易節昔在有魏蒼舒早世降及我唐子雲無祿咸用追啓王社飾於泉扄垂為憲章肆豫遵舉咨爾某稟信厚之德持謙下之資在傅不勤為善最樂蒸蒸敬孝之性恂恂友悌之風及苴茅北藩授仕殿省別六尚之名物參九伐之政令行以正直持之公平諸御知方㣥校競勸職修事舉朕甚多之爵止極於公封位未登於六事流光不待時望慊焉申豫有慟之懷加爾飾終之禮冬卿峻秩楚澤全封丕舉茂章永光餘烈今命使某持節册贈工部尚書封安王嗚呼延吳之懷豫用多愧間平之德人其識諸簡册無虧丹青不泯昭昭後魄亦克知之維年月日國主若曰名器之重典册之崇不以親疏為嫌至公之舉也不以生死易節歸厚之道也先哲彞訓我儀行之咨爾某挺岐嶷之咨稟山河之秀亦既就傅時惟老成迪祖宗之猷不愆不忘奉詩禮之學惟幾惟勤公室所推藩屏攸寄秀而不實雕此妙齡天性所鍾永悼何已真王異數護塞雄藩舉為寵章飾彼幽壤今使使云云嗚呼分以寶玉苴以白茅弗及圖功猶足表德尚爾不昧知豫此心維年月日國主若曰忠臣之事君也歿且不朽王者之念功也久而弗忘故賢哲應期風烈所及千載之下若旦暮焉矧先朝舊臣藩方賢帥雄名大節震耀區中粵豫纂承敢忘褒寵咨爾故某命世英傑奕葉勳庸便藩寵遇茂著聲實間者輟自離衛鎮於壽春導德申威罔不率俾國步中梗邊烽載驚介然孤城橫制險地威略所奮以戰則靡亢恩信所加以守則彌固社稷是衛豈惟封疆嗚呼壯圖中奪而英氣動於二國奇表長謝而中規流於百代肆我文考爰極寵章崇為帝師建以王社大名備物無不及焉咨豫小子敬想先正聞鼙之感斯極飾壤之禮未行是用越於彞章再光贈典山陰大國會稽遺墟申畫四封永旌懿烈今遣使某官持節改封越王嗚呼忘身徇國其至如彼慎終追遠其厚如此永錫繁祉子孫保之維年月日國在若曰古稱王者之貴必有先也豈不以在原之助義切於邦家陟岡之恩情均於存歿自非贈飾之寵寧申敦敘之懷稽迪前經式揚盛典咨爾某受天正氣為國宗英器量川停機神秀出縱橫之智發為事業儒雅之度播為文辭自錫壤侯藩調兵蘭錡行令惟一撫下惟仁周廬不驚宸極甘寢天覆形於鍾愛時望極於維城景命不融儀表長謝壯圖大略嗟時運之難并遺文餘烈綿歲序而常存粵豫小子祗荷丕緒奉慈訓於長樂頒分器於懿親友于之恩追懷何已是用修嚴縟禮申告九原以王有文雅之稱故改封於陳社以王有重厚之器故建號於上公光昭令猷永垂不朽今命使某云云噫花草口咢之遊宛成今昔寶玉之數遂隔平生尚想明靈鑒茲永悼維年月日國主若曰立身揚名君子所以顯父母也慎終追遠王者所以厚風俗也政之大者其可忘乎咨爾清源軍節度使劉某父贈鄜州都督彥雄行當於躬量韜於世修誠明而應物積善慶以流光實啓高門誕生賢嗣建節風雲之會致身藩翰之權清寧一方表率㣥后歲勤職貢恭守朝經位崇帝師勳在王府向非稟訓有自應期而生則功勳所昭何以及此雖褒贈之典已賁於九原而督護之名未比於大府俾加縟禮薦洽朝章今遣使云云持節册贈爾為潞州大都督嗚呼節鉞之貴命屈於生前典册之崇禮符於不朽既足以光爾之有後亦所以表豫之推恩昭昭有靈知我斯意維保大三年太歲乙巳七月乙未朔某日皇帝若曰昔在徂后法象天明旁求淑女式敷陰教並建內職以麗外朝故其先德之舉顯魂之命比爰庶尹無不及焉蓋敬終貽後之旨也咨爾故汝南郡君周氏恭儉執中明智資性頃諧法相入奉先朝紘綖之勤夙著於彤史湯沐之寵竟飾於泉扄粵豫纂承祗稟茲訓家道既正國風以理仰蹈成式永懷舊人是用釐舉闕遺追崇名數昆吾舊宅太嶽全邦申畫四封以光懿德今使某官持册封許國太妃嗚呼令問不忘盛典無替昭昭復魄聞豫此言
