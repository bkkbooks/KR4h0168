front:
  text: 全唐文欽定全唐文卷七百六十六謨字申之司空魏徵五世孫擢進士第文宗讀貞觀政要思徵賢詔訪其後楊汝士薦之纍遷宏文館直學士武宗朝貶信州長史宣宗即位拜御史中丞進同中書門下平章事大中十年領劒南西川節度使召拜吏部尚書檢校尚書右僕射太子少保卒年六十六贈司徒
  hash: sha256:db5aeaac7c5b5a2fff6e84a8d967102e14d0283717d1af17b408f5f85ff583ad
