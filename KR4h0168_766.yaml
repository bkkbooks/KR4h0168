body:
  text: 臣以自古置此以為聖王鑒戒陛下但為善事勿冀臣不書如陛下所行錯誤臣不書之天下之人皆得書之臣以陛下為太宗文皇帝乞陛下許臣比職褚遂良諸道州府百姓詣臺訴事多差御史推劾臣恐煩勞州縣先請差度支戶部鹽鐵院官帶憲銜者推劾又各得三司使申稱院官人數不多例專掌院務課績不辦今諸道觀察使幕中判官少不下五六人請於其中帶憲銜者委令推劾如纍推有勞能雪冤滯御史臺闕官便令奏用臣聞治國家者先資於德義德義不修則國家必壞故王者以德服人以義使人服使之術要在修身修身之道在於孜孜夫一失百虧之誡存乎久要之源故前王遺言曰勿以小惡而為之勿以小善而不為斯則懼於漸也臣又聞君如日焉顯晦之微人皆瞻仰照臨之大何以掩藏是以前哲設敢諫之鼓立誹謗之木貴日新其德日聞其過也陛下自即位以來誕敷文德不悅聲色出後宮之怨婦匹在外之鰥夫洎今十年絶其採納大雅既作淫風不行則上超三皇次出五帝凡百相賀前王比隆斯實天下之幸甚也臣竊觀近自一兩月巳來天眷稍回留神妓樂至於教坊百人二百人選試未巳莊宅司收市亹亹有聞昨又宣取李孝本次女一人遽將入內宗姓不異寵幸何名如此之事皆不益慎修有虧一簣臣竊惟陛下九重之內不得聞之凡此之流大生物論實將乖道理之本徒起塵穢之言夫欲人不知不若不為諺曰止寒莫若重裘止謗莫若自修者也伏惟陛下照鑒不惑稍抑將來絶其漸門使無怨欲崇千載之盛德去一旦之玩好教坊停息宗女遣還則大正人倫之風深宏王者之體昔漢光武坐側設列女屏風時宋宏正色諫曰未有好德如好色者光武因為徹之謂宏曰聞義有改可乎宏曰陛下進德臣不勝其喜前史以為美言今陛下奈何不思宋宏之諫而若居光武之下乎臣切不願也職當規諫敢盡血誠伏地叩頭昧死陳達臣聞王者渙汗之恩凡罪寬宥唯故殺人者死乃王者不易之典也其董昌齡比者録以微效任之方隅不能祗慎寵光恣其狂暴無辜專殺事迹顯彰妻孥銜冤萬里來訴伏蒙陛下睿聖慈憫念其狂橫特令鞫劾尋得罪源尚以微績曲全性命中外言議竊為未當今授之牧守以理疲人則殺人者遭拔擢冤苦者何申訴此則法理所紊交謂不可臣忝諫列不敢不言況陛下慎恤刑獄朔望循省慮有冤濫以及生人儻事理稍乖則傷聖化今茲寵授物議囂然伏乞陛下速回成命以警列士則天下幸甚臣見諸司雜報韋長送狀西院分析監軍下凌毀縣令事伏以州縣侵屈只合上聞中外關連須存舊制韋長任膺廉使體合精詳公事都不奏聞私情擅為偷越況事無巨細不可將迎縣令官業有乖便宜理罪監軍職司侵越即合聞天或以慮煩聖聽何不但申門下今則首紊常典理合糾繩伏望陛下宣示宰臣速加懲誡臣伏聞傳説官中捕捉造妖徒黨在外人情洶洶深所不安恐涉詿誤之嫌或爰愛憎而起況事出軍鎮未經臺府咸懷斯懼遞不保生滋蔓儻深為患不小今切在早去枝葉不遺蔓延嗚呼如事繫軍人即委軍中推勘如名該百姓宜從府縣鞫尋冀各盡情免稱冤死臣伏以當聖代不宜有陷平人如罪狀昭然始可從法其間輕重須有等差臣竊知陛下近對法官必將訪獄臣伏想此際官吏豈能直言如能直言即皆戴胄之守職也且獄不在有司推劾法官亦焉得細知伏以陛下愛育生靈不欲一物失所此則事關刑戮不可輕易處置臣深慮旦夕詔下忽有冤人既當發生之時切要審令詳覆成陛下好生之德契前哲恤刑之心伏請重敕法司再令疏理豈惟全其大體冀不紊於刑章蔚字茂休隴西人開成末進士咸通朝纍官禮部侍郎轉尚書右丞拜京兆尹太常卿尋以本官同平章事出為山南東道節度使入為吏部尚書加檢校右僕射宣武軍節度使乾符四年復為吏部尚書檢校司空六年拜河東節度使卒臣聞孔子聖者歟言則引周任之言苻融賢者也諫必憑王猛之諫誠以事求師古詞貴達情臣伏覩陛下自纘帝圖克崇佛事止當修外未甚得中臣略採本朝名臣啓奏之言以證奉佛初終之要臣聞天后時曾營大像功踰百萬狄仁傑上疏云夫寶鉸殫於綴飾王褱材竭於輪奐功不使鬼必在役人物不天來皆從地出非損百姓將何以求物生有時用之無度臣每思維實所悲痛至如往在江表像法盛興梁武文施捨無限及至三淮沸浪五嶺騰煙列剎盈衢無救危亡之禍緇衣蔽路豈有勤王之師況近年以來風塵屢擾水旱不節征役稍繁必若多費官錢又苦人力一隅有難將何救之此切當之言一也中宗時公主外戚皆奏度僧尼姚崇奏曰佛不在外求之於心佛圖澄最賢無益於後趙羅什多藝不救於姚秦何充苻堅皆遭敗滅齊襄梁武未免災殃但志發慈悲心行利益使蒼生安樂即是佛身此切當之言二也睿宗為金仙玉真二公主作大觀辛替否諫曰自夏巳來淫雨不解穀荒於壠麥爛於場入秋巳來亢旱為災苗而不實霜損蟲暴草菜枯黃下人咨嗟未知賑貸今陛下愛二女而造兩觀燒瓦運木載土填沙道路流言皆云計用錢百萬餘貫伏惟陛下聖人也遠無所不知陛下明君也細無所不見既知且見知倉有幾年之儲庫有幾年之帛知百姓之間可存活乎三邊之士可轉輸乎當今發一卒以扞邊陲遣一兵以衛社稷多無衣食皆帶飢寒賞賜之間迥無所出軍旅驟敗莫不由斯而乃以百萬貫錢造不急之觀以賈六合之怨以違萬人之心此切當之言三也替否又諫造寺曰夫釋教以清淨為基以慈悲為主故常體道以濟物不利已而害人每去已以全真不營身以害教今三時之月築山穿池損命也殫府虛帑損人也廣殿長廊營身也損命則不慈悲損人則不濟物營身則不清淨豈大聖至神之心乎佛書曰一切有為法如夢幻泡影如露亦如電臣以為減雕琢之費以賑貧人是有如來之德息穿掘之苦以全昆蟲是有如來之仁罷營葺之直以給邊陲是有湯武之功回不急之祿以購清廉是有唐虞之理陛下緩其所急急其所緩親未來而疏見在失真實而冀虛無重俗人之所為輕天子之功業臣實痛之此切當之言四也臣觀仁傑天后高宗朝上公也元崇先天開元中賢哲也替否中宗睿宗時直臣也臣每覽斯文則未嘗不廢卷長歎而感慕之伏以陛下深重緇流妙崇佛事其為樂善實邁前蹤但細詳時代之安危眇鑒昔賢之敷奏則思過半矣道遠乎哉臣過忝渥恩言虧匡諫但舉從繩之義少裨負扆之明營繕之間稍宜停減逢字陶臣河東人會昌中進士纍遷侍御史尚書郎大中末出為巴州刺史徙蓬州入為太常少卿遷祕書監卒有物混成先天地生言乎地兮不濁謂乎天兮不清物我俱亡莫究希夷之際元黃未判因標混沌之名有南海之帝曰倏北海之帝曰忽胥遇於茲一言相發伊人以視聽食息滋養觀爾則耳目口鼻俱闕將欲擲爾聽以置音聲抉爾明以分日月疏爾準而通氣翕爾啄而容齕厥議既臧厥臂用攘揕顙舂脰真隨手傷一之二之日視之茫茫三之四之日聽之鏘鏘六日而穹鼻齁息七日而巨口箕張於戲姦偽茲始回邪作矣中明役神外物攻己一彼一此無終無巳痛乎道德喪而仁義生亦由形兆分而混沌死嗜欲悲哀聲牽響來蘧然寐覺劃然形開日月星辰強配陰陽之數輪轅榱桷爭標曲直之材徒觀夫執仁斤橫義斫剖圭角析清濁投伊礪乃之器入彼敦弓之朴勢騰淩聲瀺灂靜者地而動者天融為河而結為嶽則知朴能成器器成朴分木能生火火盛木焚蓋所謂聰明著而勝負交戰知勇昭而是非糾紛夫如是又安得二氣凝而不流萬有來而不拂吾欲寂唱和於聲響縵文章於黼黻然後棄爾見而阻爾聞復歸於無物象帝之先種白榆於自然布歷歷之真質遍高高之遠天攀折何因杳在寰區之外陰陽不測永無雕落之年徒觀夫夾帝座以分行直天街而互對婆娑乎黃道之側蔭映乎端門之內匪據險以稱關詎臨戎而設塞星槎去日曾莫問其短長鶴駕來時又不言乎年代易古移今煙濃霧深當空耀本向日舒陰攢柯於貝闕之前圓光靄靄倒影於瑤池之上寒彩沈沈輪囷既出於中台偃蹇亦臨乎上將分土明得地之勢編珠表連理之狀或全或缺陋蟾桂於月中莫往莫來鄙蟠桃於海上美素莢之規規狀列錢之離離苒蒻雲竦玲瓏露垂崇朝而皓氣常積永夜而元風自吹發端既異於乾行成象或殊於隰有曲直之號徒爾斤斧之虞則否始或叢邱墟依培塿與槎枿混枯朽歎頽齡之日既不殊桑充燧火之時焉能異柳夫於是又安得越漢排霄含芳振條壅靈根而萬古長爛披素葉而千霜不雕所謂向晦而明終天而覿衰榮不繫乎寒暑運動罔差乎經歷榆之壽兮誠大椿之莫敵某啓伏蒙仁恩猥垂下顧兼賜新詩三十首向風長跪齊思探元如畏途咀冰若旱苗蒙澤瑩心冷骨潤葉滋莖曠無津涯杳失顧視秋日懸而氛昏息雅音作而聾瞶醒輒欲再頤幽元重開戶牖旁窺陟級漸冀升堂徒循夫子之牆未夢江生之筆今則緘之瑞錦貯以盤囊不獨榮耀於子孫實亦發揚於流輩生死幸甚伏計即離征鎮當赴闕廷鼓萬有而爐冶重開序㣥倫而權衡再設使鄭衛不作咸韶更張吹歔而寒谷春生霑灑而枯荄萌動天下幸甚某此時或希匠化獲序宗彞願承舟楫之功得出風波之路嗟歎不足繼之詠歌謹録長句七言詩一首獻上塵黷尊嚴惶恐無狀賢弟過岐山賦謁讓帝陵二篇自三兩復莫究津涯煥乎與日月齊明洶乎與江海爭大苞若天地速如鬼神迎之不見其前隨之莫覩其後波瀾之外懲勸在焉崛立當今峭若嵩華是以謂之文矣歎之不足繼之詠歌霜霧興懷未即拜賜謹先奉狀代申誠款不宣謹狀伏承相公忽承明詔遠赴闕廷天子傾心廟堂虛席沙堤尚在復瞻丞相之車蓮幕重開再理將軍之第伏想華軒擁路賀客盈門喜集鴒原風隨鴈序昨者幸從祗拜獲貢姓名言及曩時期於遠路鉛黃入鏡顧陋質而多宜金石宣聲覺巴歈之和寡因敢專馳狀啓遠謝恩知伏慮方倦將迎未暇披覽實虞奬拔失在毫釐其啓狀本謹別録上伏望聯行之際一賜發揮俾風波之路不迷見常稱譽數四心期旦夕必擬提攜伏見吾兄當數集會時望深賜重言也某頓首自今日春榜到縣當日差人持狀到京方乘車騎尋巳東去恨結之至空積下情不審自歸淮南尊體何似伏計不乖將息遠想淮山秀潤水木幽奇扇枕之餘謳吟自適甚盛甚盛某龍鍾山縣忽忽過時素秋軫懷華髮棲鬢昔日淩雲之志自覺泥蟠今茲失路之人誰為鄉導但飲冰勵節食嶭木苦心用省刑名以安疲瘵除此之外非愚所知故人恩憐曾不憫念秋風巳戒關路須西雄文與誰儔比一日千里今也其時居安敗名古人所慎某頓首某啓某聞梓居林掄才必藉其良匠驊騮伏皂發迹用章於圉人將假激揚必先紹介如某者關中士族海內窮人幼遭憫凶壯知傳導南窮海裔北濟河源勤苦一經恓惶三紀家門板蕩亡惠子之五車風樹哀廠田坴痛虞邱之三失加於元昆抱瘵孀妹無家同氣六人半歸泉壤嗟乎郭氏之昆多疹顏生之室屢空縱白首粗霑一名或終身不知五味哀凶荐及沈痛可知往往晝臥及昏夜坐達曉長安甲第羅列九衢朱門大開欲往誰訴因大中四年冬蒙相公念以苦心拔授官職期於旦暮必使奮飛旋遇羌寇犯邊相公北討風雲一失流落十年尉萬年而郎祕書宰四畿而糾東洛凡所蒞守皆立涓塵但以時尚佻浮不熟根本以親庶務者為俗吏以能矯枉者為令人聲名看門簿高低流品出人家子弟豎置童騃儕排老成遂使清貫華資蔑聞於擬議塗趨坌走久困於風塵自相公再秉鈞衡重開罏冶私門相慶如春發榮山妻斂袂而前曰爾以詞賦掇高科以詩篇達天聽以政事取章綬以孤直沈下僚今相國司徒公鼓鑄元和疇庸品物風俗日益厚泰階日益平是懷才抱器之人雲飛雨化之秋也何尚悒悒於蓬茅者乎於是整某之冠急某之帶驅策僕御促某出門仍授某洛下所著百篇再拜祝而送之曰飛龍在天雲雨闐闐賢相秉鈞倫方序圓時哉時哉君其勉焉某離鞍拜賜超乘而出茫茫然而又不知其所自平生坎壈難自梯媒進退囁嚅終莫上達亦猶魘者夢逐聲愈哀而言愈不宣足愈勤而身愈不進孤影無援危燈在旁幽憂旅魂逼迫中夜獨能振臂呼而寤之者唯相公乎伏惟明誠燭兩曜大信鈞四時綱維設而天地開陰陽順而風雨若一物失所如推諸隍某所以滌慮嚮風齋心卜日細將肝膽具以披陳伏惟念以迷邦釋之網罟幸甚每自握朝鏡潛窺壯猷恭守門風不敢墜地或乘秋摶擊或載筆芟夷或獻替而定否臧或從容而顧問儔諸流輩亦不後人誠知自炫自媒士之醜行但以日暮途遠倒行逆施若俟陟級循涯必慮填委溝壑而又搜尋志尚爰及成人役思慮者三十年著詩賦者千餘首雖不足誇張流輩亦可以傳示子孫豈料尚與廕弟小兒蹩中途而爭先後抑又聞哀音入耳達者動容伏惟示以長途指之中道俾入懷之鳥重明戛漢之心曳尾之龜再有巢蓮之望不獨銜環報寶矯印酬愈必能當場效克寸敵之功灼骨獻非熊之兆伏以國政初畢機務尚繁敢罄腹心先致門闥僭越之狀無所逃刑伏惟俯賜省覽百生幸甚百生幸甚不宣謹啓某啓某聞臃腫之材動乖於繩墨琤瑽之韻自合於宮商雖觀聽以由人實否臧而在已所以困驥見稱於伯樂焦桐取譽於伯喈咸發迹一時垂芳千祀某自開成建號則執藝求知迹忝及門名叨中選或緣情序美移時而奬導再三或體物達誠一席而稱揚數四遂使聲華振耀喧動輩流桂折高枝名登上第但以依仁歲久軒墀之桃李成陰趨岸年深門巷之椅桐暗老徒蒙蔭覆莫自根牙良辰幾何元鬢倏改伏惟相公推名意切録舊情深朝宣一言夕濟千里俾平生志業不負於辛勤向者恩知果成其遠大生死幸甚生死幸甚頗將偃頓屢瀆階墀日暮途遙誠堪憫念學士文章拔俗嵩華讓其孤標學海無邊乾坤以之涯涘優遊仙署偃息禁闈筆灑王猷硯涵天澤成霖而雨露非遠吐氣而虹霓坐舒流品人倫衣冠仰其衡鏡扶持大廈社稷思其棟梁不有伊人孰為邦彥某頃因章句獲達門牆雖大匠翦拂之間多慚臃腫而貧女鉛黃之飾豈讓娉婷故得桂枝先攀楊葉高中始謂陵躍出泥滓指顧生風雲嗟乎九仞將成而一簣莫前三年欲飛而長風不借顧影增歎誰將寤言嘗聞通義相公爐冶新開陶甄是切儻閣下猶傷墜屨終許掃門信執鞭之亦為奚指蹤而不可方今選限猶遠官秩未期伏希度以短長擇其任用上可以考校書府下可以羽檄戎藩庶竭駑駘稍裨萬一聊將肝膽輒自梯媒躁進之辜不敢逃責伏以玉燭開年金儀應歷軒律風暖羲輪馭遲草木以之萌芽禽魚以之翔泳伏以相公化宏動植道洽雍熙吹歔必至於幽深暄潤不遺於枯枿如某兀如枯木性若寒灰沐和風而莫振柯條應陽管而才知動息伏惟相公模於心匠待以天成鼓鑄賢愚區分貴賤動用陰陽之炭開張天地之爐量其小者則為盎為盂舉其重者則成鐘成鼎苟圓方式序幽陋不遺及茲發生俾遂春氣生死幸甚相公河嶽鍾靈芝蘭蘊德頃因直道常中佞人阻絶九重播遷萬里無非中正發言而天地鑒知不負神明冒險而靈祇附助所以恬和自得寢膳長安雖經夷貊之長途不爍江山之沴氣皇天眷祐於焉有徵伏惟相公道濟中興仁歸厚德即當重開爐冶再設權衡俾器用各適圓方錙銖不失輕重天下幸甚逢此時或因陶鑄得敘宗彞佇從長養之時復覩升平之代自相公歸官虢略尋欲附狀起居伏以縣令卑微不敢輕肆塵黷昨者從孫辥誠過此今候方便咨達姓名瑣瑣形骸或希記憶謹啓某聞川梁壅而舟楫施禾黍登而霖雨霽天地常數古今共然伏惟相公理達卷舒用明進退調陰陽以成歲受功於天執謙讓以歸仁宏道於已所謂進退惟正卷舒適時某每念庸虛常蒙匠化當幽滯之求振拔則且願持權在卑懇之望廕庥復稍思稅駕從古難者於今見之雖范蠡登舟子房避世方之高躅何足比肩慺慺懇誠伏望深鑒尚書筆綜文經機參武緯虛已應物推誠濟時澄明而識內融操剸而鋒不露在文宗時以詞藻參近密峭若孤峯在武宗時以韜略鎮藩維殷然巨障謂往無不利動皆適時今者急詔徵還開襟待見必當付以舟楫委之陶甄康濟兆人鎔範庶物天下幸甚此時或希匠化獲圓方盜天地之太和沐唐虞之至化生死幸甚尚書文從心匠武自天機西南貞右界之師東北振中山之旅莫不皆爭死節願答深仁乃者訓撫二州折衝四境飲成德盧龍之帥盡醉禮容啖天雄橫海之師被充文教故得人知俎豆俗廢干戈嚴城夜開外戶不閉遂使常山蛇陳翻成干戚之文易水劒歌遽變鹿鳴之奏雖去病不師吳起世祖常合伏波方之變通曾何比數佇見翺翔溫樹刷蕩天池代著中興風還太古此時或將歌詠獲贊雍熙心醉堯樽神迷舜樂百生幸甚某啓某聞枝枯幹悴助莖葉者煙蘿棟橈梁欹能扶持者匠石是以茂盛自豐於莖葉孤危全賴於扶持若不為枝梧則立見傾弛某因緣恩顧輒吐肺肝伏惟念以風波必垂拯濟某死幸甚某家望陵遲眇然孤藐飄流勤苦垂三十年分分自登粒粒自啄取第不因於故舊蒙知皆自於雋賢每用飲水清心閉門守道南宮試藝三篇徒獻於九重東觀讐書七稔才登於一邑同時流輩盡列班行獨此後時有慚先達得不沈吟俯首局促哀鳴某自守一官倏爾兩考惟將勤儉用免悔尢刻意撫綏才成條貫曹無冤案獄罕繫囚孤弱者貸之以恩豪強者繩之以法置公廨草三千束粟三百石小有供須了無率配洎徵三稅不鞭一胥公署無喧雀羅可設縣南峽口㣥盜所居白晝劫人赤丸殺吏某自到縣百計方圓峽南北各置一鋪仍選有身手健兩處共置十人給與園場兼之杵臼往來應援旦夕提防自此以還盜賊彌息其餘恢張廨宇搜抉姦欺澄清鎮軍檢轄僚吏乃至招攜戶口役使人夫利物之由不可遽數昨者秋收自京回具舍人面喚詢諸所圖上戴恩知莫能比喻某比者依投仁宇首尾三年苟非同聲未嘗接武輒將勤苦勉自進修豈暇再言素應詳熟尚想樽前即席月下談詩偏於才雋之場曲借吹歔之便其奈驚湍暗激利觜潛傷清要班資寂寥擬議自料於家必孝於國必忠於事必勤於身必正刑於兄弟至於家邦亦何必貴擬齊桓富侔盜跖復念誓志不識古人盟府策勳用為已事至於亭障山川之險易儲蓄經費之有無戈鋋利便之短長戎狄土風之好尚莫不心摹意揣慮計神籌言從智符事與機會陳思王之自試不獨古人班定遠之束書焉知來者既蒙憂軫得以咨謀伏惟念以迷方指其捷路生死幸甚今所期者國庠博士赤縣子男儻蒙歷試諸艱便作秦隴刺史不妨緣階取貴因效建功事列尊彞名光史册生死幸甚所謂射已之鵠無信旁人苟能自審行藏不致甚費恩力伏望憫其孤立曲賜重言俾枯荑再生於青楊枯骨重肥於白日誓當觸槐全盾結草抗回生為厮養之臣死作掃除之鬼生死幸甚如或責以狂妄校以尊卑躁僭之辜生死惟命伏惟俯垂仁恕幸甚不謹啓滋字後象閩人會昌三年進士官金部郎中為學之人會友以文念斯文之樞要無極將一戰而是非可分索隱窮微既不於夫子解經挫鋭爰取譬於將軍由是推匪石之心召如林之士六籍之奧斯究萬夫之雄莫擬且曰戰也者所以分勝敗之端文也者所以明盛衰之理必將抑浮偽考深旨措詞苟得於朝聞遊刃寧甘於夕死是用徵師於伐善之所命將於角勝之場鶚視而鵝鸛斯列豹變而貔貅莫當利口縱橫已有摧堅之意雄姿踴躍那無露穎之囊得失未分切磋斯見張弛既出於心術向背寧虞於色戰忠為甲而信為胄豈憚重圍筆有陳而詞有鋒誠能萬變既區以別矣乃則而象之拂湘帙作鼓鼙之響卷絳紗為旌斾之姿波駭九流苟再揚而盡委心攢百箭終一貫而無遺乃考擊蒙諒無前敵決勝既返於三隅請命俄分於四壁是以及門之子互騁其成功無勇之徒空悲於敗績巳而探討無餘詞林晏如九合之剛腸斯弭千里之祕思潛舒深淺既分盡洗兵於學海姦回云革皆棄甲於德車蓋以振此芳塵仰於先覺苟能立分於閫閾曷愧坐籌於帷幄今則仗其信志其學幸從戰之有聞願無慚於挫角考庶物於朱垠得陽冰於碧海託巨浸以潛結泛驚波而長在堅乎自得峩峩之素色寧虧渙若無虞皎皎之清光詎改始其孕太陰之精因積水而成徑颼飀之遠吹澄滉漾之餘清別浦宵凝狐聽之聲乍絶回汀曉合蟲疑之質俄生由是外肅重溟中分萬景滄淵掩巨蚌之魄碧落奪寒蟾之影幽疑玉樹露皓氣之皚皚淨若銀河亘秋光之耿耿既叶數九寧將屢遷乍瑩洪濤之末時明緑岸之前不解東風諒難資於履薄非藏北陸復何患於攻堅炎炎之畏景雖臨冽冽之寒威益壯皓輝想冰始之日洞徹得夏頒之狀鮮飇乍觸無慚於雲母屏中纖翳不生曷愧於琉璃地上淨拂霜影輕籠月華稟質苟因於涸沍分形詎委於泥沙既異在陰彩射鮫人之室非同向晦光寒漁父之家至若浪息瑤川煙收遠嶠焱晶灼野以增熾皓色澄空而引耀清含上善曾無泮渙之期素激中流豈憚赫曦之照所謂出自靈長居然異常苟惟貞而自守雖盛暑其何傷亦由抱素者絶陷己之患履道者為終身之防幸消釋之無日庶永託於朝光何伊人兮異常爰委質以來王想具體之初既因於乃雕乃斫及抱材而至孰知其為棟為梁原夫始自攻堅終資假手雖克已於小巧之下乃成人於大朴之後來同辟地舉趾而根柢則無動必從繩結舌而語言何有心遊刃兮在茲鼻運斤兮罔遺兀若得木公之狀塊然非土偶之資曲直不差既無蠧於今日短長合度寧自伐於當時莫不脫枯稿以前來投膠漆而自進低回而氣岸方肅佇立而衣裾屢振穠華不改對桃李而自逞芳顏朽質莫侵指蒲柳而詎驚衰鬢既手舞而足蹈必左旋而右抽藏機關以中動假丹粉而外周生本林間苟有參乎之美立當君所何慚柴也之儔是則貫彼五行超諸百戲誤穿節以瞪目疑聳幹於奮臂如令居杞梓之上則樹德非難若使赴湯火之前則焚軀孔易進退合宜依然在斯既無喪無得亦不識不知迹異草萊其言也無莠情同木訥其行也有枝可謂暗合生成潛因習熟雖則挫身於斤斧曷合守身於林麓宜乎削爾肩刳爾腹既有亂於真宰寧取笑於周穆偉茲雪之霏霏應元冥而不失其期賦象於虹藏之日成形於冰凍之時委地則微庶表三冬之候翻空雖小那無六出之姿當其寒氣初升陰風始變既浙瀝於遙野却飄颻於廣甸邊城一望龍山之淨色猶晞上苑再瞻鳳闕之清光未遍眇若毫端輕飛可觀細細而千巖送冷飄飄而萬戶迎寒霏微墀廡之間瑤臺月曉髣佛草茅之上玉樹花攢回拂陰軒高翻曉律縈枝分盈尺之象帶月誤如圭之質微交月影天邊之孤鴈應迷稍助山明松際之浮煙巳失細糝長空纖緣綺櫳淨若蘆花之覆水輕同柳絮之因風是則謝氏林亭盡在回眸之內梁王池館無非跬步之中於以明潔白之姿於以表陰凝之漸雖見晛而無滯詎因污而成染初疑畫閣妝奩之香粉微微又若瓊筵玉箸之凝酥點點既而纖細繽紛呈祥是因掩日而難分薄霧開簾而不辨輕塵影入空帷預想映書之子光侵遠水潛思訪戴之人可謂不遠而來自無而有始縈盈於階砌終散漫於林藪安得不燎薰爐命芳酒作小雪之賦繼大夫之後
