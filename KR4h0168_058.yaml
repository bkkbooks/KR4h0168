front:
  text: 全唐文欽定全唐文卷五十八憲宗三
  hash: sha256:85e73c2368caa6094a254649269c473034716a8cb67beabf3baa54ce738e7f1f
body:
  text: 上帝垂象輝孤矢之芒先王取威陳鈇鉞之柄蓋所以昭宣七德保乂兆人故窮陰有助於歲功而大刑無廢於國典朕承纍聖之休祉奉昊穹之眷命道思格物心豈佳兵期致俗於和同庶納人於軌度緬窺鍾鼎無忘衛國之勞永惟帶礪每存延代之賞故太尉武俊頃因多難首建大勳懸捧日之明誠遏滔天之逆豎武烈有過於雷震壯容具紀於丹青餘風凜然雖死不朽是宜子孫襲寵邦國同休而王承宗墜乃箕裘隳其門戶不思祖宗之德忍與梟獍同謀不顧天地之恩敢以豺狼為性飽則逾悖撫之不馴凶狂屢見於表章戕賊竊加於宰輔四方同駭千古所無朕以思人愛樹投鼠忌器優柔而未斷隱忍而不征屈其憲法唯絶朝貢俾之思過將謂革心而乃先動干戈屢犯城邑焚燒剽掠流毒於人罪惡既不可容誅討蓋非獲巳況四面征鎮憤激咸同中朝卿士奏議相繼雖覆以大道欲更含宏而迫於羣情須正刑典宜令河東幽州盧龍義武橫海魏博昭義等節度兵馬計會進討其承宗在身官爵並從削奪言念乃祖嘗著功庸蠢茲狡童自取廢絶其所襲實封宜回賜武俊子右金吾衛將軍士平俾之纂承無乏祭祀若承宗翻然改悟束身入朝必議加恩不唯貸法如沈迷自若討伐遂行則罪止一身其餘驅脅之徒一切不問大軍既臨計即戡殄其成德將士等或染汚俗或迫凶威雖效忠誠無階自達但能去逆效順因事立功隨其高下厚其寵錫如有梟斬渠魁及執送京兆以效誠節者王承宗在身官爵土地等便以回授仍與實封五百戶莊宅各一區錢二萬貫如有能率所管兵馬及以城鎮來降者並超三資與官仍與實封二百戶錢一萬貫其以州降者便與刺史仍賜實封三百戶如本是刺史更超三資與官賜實封三百戶以縣降者超兩資與官賜實封一百戶其以一營一柵降者節級褒升務從優厚其諸軍行營將士有先登陷陳屠城下邑者亦準此處分其接近賊界諸道應副行營將士如有能梟斬承宗者亦準前例處分其接近賊界州縣自軍興以來供饋繁併嗟我疲瘵良增憫然應元和十年兩稅斛斗錢物在百姓腹內并十一年夏稅並宜放免其有城鎮將士百姓守節拒賊身死王事者各委長吏優給其家仍具事迹聞奏當加褒贈其有潛謀誅斬承宗被其屠戮者優加追贈并賜錢帛仍與一子官六州百姓莫匪吾人墜於塗炭深用嗟惻兵之所至不得妄加殺戮及焚燒廬舍掠奪資産并有拘執以為俘馘事平之後給復三年其六州管內百姓能相率來歸者所在安存各加優獎方當春務切農桑邊界之人慮妨耕織應緣軍務所須並不得干擾百姓如要車牛夫役工匠之類宜和雇優給價錢賊平之後應立功將士並與超資改轉節級賜級續有處分於戲朕正位凝命竭誠嚮方勞謙在心慈儉為寶而化未陶於頑傲澤未浸於隱微薦興甲兵布在原野中宵愧歎當寧憂兢庶將除姦非曰尚武宣示中外宜體至懷門下朕觀古先哲王興化致理未嘗不選建良弼熙寧庶工俾之敷陳大猷左右乃辟者也朝議郎守中書舍人權知禮部貢舉輕車都尉賜緋魚袋李逢吉疏通而守於經制質厚而輔以文章貞恆自居和易待物體賢人之志業茂端士之風規歷履班行發揮事任厥心匪懈所至有聲自彌綸粉闈駮正瑣闥且司言於右掖嘗納訓於東儲誠明一貫聞望旁洽俾司貢士彌著嘉聞方今外興不得巳之師內有不獲安之俗恆忘食於將旰務求衣於未明冀清原野之誅用止干戈之役登爾匡輔代豫憂勤爾宜宣至化於吾人告嘉猷於厥后銷弭氛祲導迎和平事有不舉其中正或未孚於下爾惟啓沃無乃面從可朝議大夫守門下侍郎平章事賜紫金魚袋疆理宇內必先於京師惠綏四方亦始於中國蓋以千里之壤百役是資俾其不足吾孰與足頃自春及夏時澤未降恐失順成之道或生歉儉之災是以仰瞻昭回俯察田畝喜獲朝隮之潤方寬夕惕之憂思遂康寧盡蠲逋負其京畿百姓所有積欠元和九年十年兩稅及青苗並折糴折納斛斗及稅草等除在官典所由腹內者並宜放免朕恭己臨人勵精思理二三執政繇吾股肱念始終之罔虧於進退而尤重苟或將明失中輔導不專依違於懷尚慎斯舉君臣之義豈不宏乎中大夫守中書侍郎同中書門下平章事上騎都尉賜紫金魚袋韋貫之早著淑聲纍更顯貫潤以文藻懿其風猷爰膺選衆之求式佇弼豫之美而自當鈞軸屢變星霜虛襟以聽未聞至論非啓沃之道有所不行何燮諧之功蔑爾無效欲抑浮華之路在捐朋友之私人亦具瞻事將奚副用解樞機之務俾居衡鏡之職克允斯任宜和厥心可守尚書吏部侍郎散官勳賜如故門下上宰參職所以法三台之耀中樞議政在乎遂萬邦之宜朕獲承鴻休思建皇極冀沃心而納誨恆注意以求賢通議大夫尚書工部侍郎知制誥翰林學士上柱國清源縣開國男食邑三百戶賜紫金魚袋王涯動直靜專踐方居易挺歲寒之徑質抱夙夜之端誠言唯守中慮每經遠屬者禁垣揮翰五字日宣選部持衡九流風動荐居肘腋之地歷試股肱之才進嘗伏於青蒲出不泄其溫樹牟融得大臣之節毛玠有古人之風詢廟算於生知論兵鈐而暗合方今戎車尚駕郊壘猶多必俟清明以消氛沴是用付以機密陟於崇高爾惟發號令以端其四方陳便宜以寬於百姓行臺閣之故事宏朝廷之大體秉德以立徇公不回俾豫一人垂拱而理敬聽朕命懋哉懋哉可守中書侍郎平章事頃因按事兼舉憲章閲實繩違有乖詳審既薄其責仍掾大藩載令研究其端頗見異同之狀況誡途祗命淹駐近郊苟於造次之間靡懷敬慎之義既茲速戾豈謂周防更移遠藩俾自懲省門下成萬方之化通天下之志緝熙帝載昭暢元猷在於股肱之臣共凝理本旁求時彥以敘彞倫朝散大夫守尚書戶部侍郎上護軍賜紫金魚袋崔羣粹密由道端莊保和本清明之上才體博厚之重德學貫通儒之業詞含大雅之風居敬有恆循性能斷自承我密命職參內庭高文煥發於綸言敏識詳達於國典伏奏無撓直躬不回勤勞八年始終一致春闈取士必後其浮華地官理財能制其輕重儉以約己忠惟事君才適而用深望積而實著風猷巳洽於人聽倚屬方注於朕心乃膺審象之誠以副具瞻之望況姦凶叛逆尚駕戎車未明求衣思戢干櫓爾宜酌古今之要舉刑政之中艱厥位以代天工陳具謨以明皇極敬茲重命往踐台階可守中書侍郎同中書門下平章事散官勳賜如故朕為人君期致豐寧夙夜永思未嘗怠息而庶政猶闕恆雨為災至今遠近或有墊溺浸敗廬舍漂浸田苗言念疲黎重罹斯弊覽茲奏報嗟悼良深將俾獲安豈忘賑救其諸道應遭水州府河南澤潞河東幽州江陵府等管內及鄭滑滄景易定陳許晉隰蘇襄復台越唐隨鄧等州人戶宜令本州厚加優恤仍各以當處義倉斛斗據所損多少量事賑給訖具數奏聞蜀門南次梁部東分地束江山境帛丿糸賨濮非志懷端重不可委以察廉非識度宏深不可付以節制聿求公望爰自輔臣朝議大夫守門下侍郎同中書門下平章事輕車都尉賜紫金魚袋李逢吉文以發華行惟居厚忠懇每形於造膝直方斯見於匪躬自處台席載移星琯溫然德器休有素風觀其動本於仁足以敷王澤考其守歸於正足以奉師貞乃眷梓潼茲惟奧壤用去將明之任俾效藩宣之功豫欲頒正典於一隅故兼以夏卿之位豫欲布憲章於列郡故假以副相之權爾其儉節以訓俗澄清以檢吏因土風之剛悍使勇且知方就物産之殷充俾既富而教苟能積實期有遐聞於戲朕於大臣進退示全其恩禮爾之報國始終宜竭其肺肝身雖遠出於山川心豈或忘於夙夜服茲休命俞往欽哉可檢校兵部尚書使持節梓州諸軍事兼梓州刺史御史大夫充劒南東川節度副大使知節度事管內支管營田觀察處置靜戎軍等使散官勳如故門下伐叛除凶必俟乎奇略進封超位允答於殊庸況四紀逋誅三州竊據積妖遺育縱亂挺災纍年徂征一舉生致論功既當於異等議賞豈待於踰時唐隨鄧等州節度觀察處置等使通議大夫檢校左散騎常侍使持節鄧州諸軍事兼鄧州刺史御史大夫賜紫金魚袋李訴宗臣之允王國克生毅勇蓄深溫良煦外禮樂戰攻之器默識其源詩書義理之府洞窺其室雖早升朝序而未展將材頃以懸弧滔天宿兵既久方城壓境易帥頗頻永懷韜略之家必有弓裘之嗣將執金鼓載持干旄果副眷求克揚威令緝傷夷之後振怯為雄制密邇之間保危成固推忠厚以感物本信惠而和人一其鬬心勵厥死力乘虛徑襲負雪兼行風驅如合於百神雷發若出於九地堅城立潰狡豎坐擒遺氓安堵以知歸餘黨釋甲而請命古之良將其孰過焉巳申獻捷之儀當舉策勳之典爰授名部俾恢重藩自洛而遙惟襄為大綿亘楚服橫臨漢津總八郡以澄清秉三軍之節制式因加地往繼沈碑特遷左揆之尊崇茲天秩仍假南臺之長峻彼霜威表以勳階賜之茅社戶豐真食門貴延恩洽此寵榮叢於茂烈於戲天鑒非遠不庭者必誅王爵無私有功者是享揚名濟美惟孝著於家聲鍾鼎山河惟忠光於國籍凡曰臣子得無企歟可銀青光祿大夫檢校尚書左僕射使持節襄州諸軍事兼襄州刺史御史大夫充山南東道節度管內支度營田襄鄧唐隨復郢均房等州觀察處置等使仍賜上柱國封涼國公食邑三千戶并賜食實封五百戶與一子五品正員官主者施行門下授鈇鉞之寄當兵車之會力鋤凶險志殄寇讎星霜固難奪之誠始終見師貞之節嘉猷益茂力集休勳宜崇寵光肆於時夏考諸前志斯為大經忠武軍節度使李光顏崆洞秀氣為時生才謙和不流厚能斷本忠信以經武閲詩書以理戎首職北垣聲雄大鹵受命既平於朔野懸軍亦翦其巴庸巳積功勞銘在鐘釜朕以淮濆負固歷紀稽誅自授兵符獨運明略分營先得其地險吞敵屢挫於賊鋒嘗下名城拔其趙幟制勝之術動合鬼神百戰表於忘軀一心注於報國歲月滋久堅誠不回當凶妖就執之初是潰黨乞降之際單騎以入其柵壘免胄而弔其傷殘納之不疑乃見全德今攙槍巳滅申蔡無虞寢興以思用息戎馬則報功顯秩位宜重於三公馭貴殊勳賦亦開於千乘陟論道之優禮獎述職之崇名爾其敬之無替舊服可檢校司空使持節許州諸軍事兼許州刺史御史大夫依前充忠武軍節度管內支度營田陳許等州觀察處置等使仍賜上柱國封武威郡開國公食邑二千戶散官勳如故主者施行夫為君者求舊以申其用施恕以遂其情為臣者陳力以效其能奉身以明其志故在上則始終之道備居下則進退之義全茲惟休哉用厚恩禮銀青光祿大夫守門下侍郎同中書門下平章事上柱國江夏縣開國侯食邑一千戶李鄘居潔履方端明審固有沈毅莊重之質有堅剛迅敏之心徑節夙表於屯夷利器久彰於中外朕所以迹其衆善詢及庶工登之台階授以政柄將欲藉其碩望宏厥壯猷而固辭之誠再疏頗切然猶未允其請所冀或副豫懷逮此旬時勞於夙夜益願頤養堅稱衰遲宜罷樞軸之殷俾居喉舌之重就間高秩式示優崇可守戶部尚書門下致理之道王者由其盡心弼成之功輔臣所以宣力皇極是建蒼生乃安敷求實難倚任斯重將付大政必惟僉諧正議大夫守御史大夫上柱國成紀縣開國侯食邑一千戶賜紫金魚袋李夷才稱通明性本嚴重守以正直傅之文華羽儀朝端冠耀宗籍早司邦憲爰總地征糾逖無聞於避強經費克均其定制中立不撓孤標出倫聳善激貪法行令肅自鎮漢上洎臨蜀川儉德載彰清規一貫山嶽比厚雷風有恆勵貞峻以理心竭忠勞而奉上人望汲黯印歸趙堯俾之持綱萬目皆舉固可以綜參庶務允釐百工燮和陰陽宣發號令是用申命陟於台階於戲説積爾躬夢協朕志虛己將求其宏濟鯁言罔懼於怫違道必舉中位無苟曠膺此寵擢敬哉戒哉可守門下侍郎同中書門下平章事柱石之臣台庭之老積其具瞻之德載有弼諧之功授以土田流邦家之愷悌增其冕服表國器之形容此朕與將佐大寮示中外之一體也況兵戎重事東南實繁輟於廟堂以示其大正議大夫守門下侍郎同中書門下平章事上柱國成紀縣開國侯食邑一千戶賜紫金魚袋李夷簡監以蒞政事而守道素風彰於操履浩氣峻於風雷自朕纘承丕圖搜拔下位得文華於宗室升器幹於朝廷而所重者準繩所憂者財賦資倜儻以振起委強通而演成江漢之仁風載揚岷峨之美化斯盛既執大憲俄登公台輔豫一人凝是庶績忠讜有遭逢之勇姦邪無侵敗之機謂之股肱實為無愧言念淮海斯為奧壤走商賈之化財引舟車之漕挽凡所經理事非一隅控制之難於今尤切是用錫命俾為藩宣式加師長之名不改平章之務萬邦表率丞相闕之可銀青光祿大夫檢校尚書右僕射同中書門下平章事兼揚州大都督府長史充淮南節度副大使知節度使事管內營田觀察處置押新羅渤海兩番等使股肱之任與國同體苟或取容於位啓沃無聞將何以寅亮天工宏宣景化朕嗣膺丕業爰任鈞衡知善必升見否而退茲所以推至公於天下也銀青光祿大夫守中書侍郎同中書門下平章事上柱國清源縣開國男王涯素以藝文早登華貫參我宥密再處內庭位踐公台拔於非次誠宜匪躬峻節納誨盡忠而乃因循自持謙默無補期於進道屢復星霜空勞虛懷未副明獎雖夙夜之勤久著而具瞻之望何從君臣之間義存終始宜解職於樞務俾二曹於夏官尚謂優崇勉敬斯任可行尚書兵部侍郎六符成象所以平太階九賦克均所以阜羣物爰資宰執宏贊謨猷達其富庶之源以致雍熙之化用輔台德其允具瞻朝請大夫守尚書戶部侍郎兼御史大夫判度支上護軍賜紫金魚袋皇甫鎛行惟孤貞性本堅直秉仁履義守正持方才適變通辭去枝葉蘊沖用於靈府表公器於士林夙懷經濟之謀早在賢良之選纍踐華貫服於大僚端肅有常發揮事任自總邦計二領地官屬以徵戎車討平淮冠發軵調食制外自中法無過差動有成績山甫彰勤恪之效志在奉公夷吾識輕重之權誠宜佐國是用命爾俾升台司望以拔心勞乎注意尚興師旅方殄妖氛翼亮是參經費仍屬爾其悉乃心力副豫求物有未遂其宜望有未洽於道罔或安位必思匪躬酌下土之盛虛闕中樞之政令光昭厥辟時乃之休可守尚書戶部侍郎同中書門下平章事依前判度支門下昔漢宣帝宏祖宗之業正刑德之本求輔相以致中興朕祗荷丕圖思揚聖緒每懷舟楫以涉大川俾人不迷用砥於道今獲良弼式允僉諧朝散大夫守衛尉卿御史大夫充諸道鹽鐵轉運等使賜紫金魚袋程厚德外嚴沈機內朗抱精微以致遠本誠明以格物盡瘁事國誠正在公常探化原雅尚學術揚歷斯久公望藹然自位列大僚總諸劇務達榷酤之利適財賦之方贍出納於邦家申績效於官業頃以淮夷未殄師旅在郊有漕挽之勞兼供億之費言念多事恐傷吾人而法能變通道益明著言無伐善動必由衷蘊夷難致君之心見懷道佐時之略況屬饋軍之事尚倚良能載閲前功宜當大用乃服休命俾參中樞爰表秩於冬官仍兼綜於舊職膺茲重任用表全材爾宜左右朕躬朝夕啓沃干戈未戢尤佇廟謀敬聽斯言副我明獎可守尚書工部侍郎同中書門下平章事依前充諸道鹽鐵轉運使朕臨御萬邦推布誠信西戎納款積有歲時中或虧違亦嘗包貸我有殊德寧不是思重譯貢珍道途相繼申恩示禮曾無闕焉昨者蕃使奏章又至京輦將君長之命陳和好之誠臨軒召見館餼加厚復以信幣諭之書亦既言旋才及郊甸遽聞蟻聚來犯封陲河曲之間頗為暴擾背惠棄約斯謂無誠公議物情咸請誅絶朕深為德化之未被豈慮夷俗之不賓其國失信其使何罪釋其維縶以遂性示之宏覆以忘懷豫衷苟孚庶使知感其蕃使論矩立藏等并後般來使並宜放歸本國仍委鳳翔節度使以此意曉諭門下王者驅大順以道至和不能無狡寇天將廓沴氣以息暴亂則必有忠臣非處迷何以明其徑節非嘉獎何以表其尤功況討罰之初詔命斯著高懸寵爵獲則當之淄青都知兵馬使金紫光祿大夫試殿中監察御史上柱國劉悟忠孝之後義勇為心久淪迹而未申每蓄謀以思奮屬姦凶負阻將帥徂征宣威巳震於河山肆逆猶固其巢窟遂能潛通密款先事指期決策於萬衆之中挺身於重城之內感深而信誓若一氣直而神明為徒梟彼渠魁殲厥醜類乃飛章以馳獻繄大慶之遐聞臨軒載懷是舉斯命眷彼雄鎮惟茲滑臺有二郡察俗之殷其人徑而剛有三軍制節之重其士毅以肅俾膺分閫式委觀風超升題劒之名所以崇其望兼假弄印之任所以峻其威疏封廣載其土田真食爰優其戶賦仍加厚賜用示深恩高門大啓於通衢別墅榮分於沃野凡是賞典稱乎國章於戲在昔天寶季年羯胡首難惟悟之祖職居平虜能戮賊臣竟通朝命賜名以旌其忠授鉞以仗其材今悟又能除妖可謂濟美勉持忠孝以保家邦可檢校工部尚書使持節滑州諸軍事充義成軍節度使勳封如故忠利於國者效積而事彰器周於物者志遠而任重況入調鼎鼐出鎮藩垣荷中外之寵榮膺文武之重寄將允僉望命茲輔臣金紫光祿大夫門下侍郎同中書門下平章事兼宏文館大學士上柱國晉國公食邑三千戶裴度量惟宏深道在匡濟大玉蘊連城之價長材負搆廈之姿言必公忠義本誠罄自居鈞軸叶贊機謀匪躬以務其將明憂國不忘於造次當夷凶淮蔡仗節於師旅之間及殄寇青齊運籌於帷幄之內勤勞靡替宏益居多績用是嘉撝沖逾懇東夏雄屏實惟晉陽控大鹵之山川司北門之管籥橫制獯虜遠清疆陲是以輟獻納於沃心撫方隅於注意倚屬攸切勳庸可宣舟楫常賴其弼豫鈇鉞載觀其蒞衆勵山甫之恪德成方叔之壯猷式副具瞻勉揚休問務既兼於左揆秩仍踐於中台爾其戒哉以服嘉命可檢校尚書左僕射兼門下侍郎同中書門下平章事太原尹北都留守充河東節度觀察處置等使門下選衆舉材俾參大政俟善績丕著嘉謨有成然後進序台階協宣德務乃制輕重謂之盈虛以經用靡虧而戎功克集黃扉之位式示疇勞朝請大夫守尚書戶部侍郎兼御史大夫判度支上護軍賜紫金魚袋皇甫鎛器識端方性尚孤直文發身而詞去枝葉學為己而政資本根每脫落於浮榮能優遊於劇任志圖經遠心惟徇公自二中台專總大計升之相府兼贊鴻猷屬問罪二方徵師十萬千金難減於日費百役併萃於司存而供億罔差中外咸若泉貨無虞於竭涸干戈遂致於清寧允茲忠勤副我倚任是宜踐居左輔均賦中邦漸於雍熙期乃成績可守門下侍郎平章事依前判度支門下古者丞相府不接吏蓋以任重體大地親禮崇苟非征討之時豈仗貨財之事爰俾出納歸諸有司用嚴台庭以輔吾道中大夫守門下侍郎同中書門下平章事判度支上柱國賜紫金魚袋皇甫鎛精明絶倫乾健不息蘊是器業發為英華頃以守位聚人必資大計因其能事委以重權致用之機所以經天下之務重輕之法所以管天下之財自淮右不虔東平犯順兵車在野饋食連年而乃庖無折刃御有濡轡既授明命升之股肱軒裳所瞻崖岸益峻請謁自絶其風凜然況瞻給之餘謀慮必至平二方之險阻慮載戢之干戈庸非坐籌佐朕而致今則百揆攸敘萬邦保和宜全相府之重勿領計司之劇撫夷夏調陰陽用安元元時乃之職可守門下侍郎依前同中書門下平章事
