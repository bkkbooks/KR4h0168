body:
  text: 夫金剛經者無相為宗無住為體妙有為用自從達摩西來為傳此經之意令人悟理見性祇為世人不見自性是以立見性之法世人若了見真如本體即不假立法此經讀誦者無數稱讚者無邊造疏及注解者凡八百餘家所説道理各隨所見見雖不同法即無二宿植上根者一聞便了若無宿慧讀誦雖多不悟佛意是以解釋聖義斷除學者疑心若於此經得旨無疑不假解説從上如來所説善法為除凡夫不善之心經是聖人之語教人聞之從凡悟聖永息迷心此一卷經衆人性中本有不見見者但讀誦文字若悟本心始知此經不在文字若能明了自性方信一切諸佛從此經出今恐世人身外覓佛向外求經不發內心不持內經故造此訣令諸學者持內心經了然自見清淨佛心過於數量不可思議後之學者讀經有疑見此解義疑心釋然更不用訣所冀學者同見礦中金性以智慧火鎔鍊礦去金存我釋迦本師説金剛經在舍衛國因須菩提起問佛大悲為説須菩提聞法得悟請佛與法安名令後人依而受持故經云佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持如來所説金剛般若波羅蜜與法為名其意謂何以金剛世界之寶其性猛利能壞諸物金雖至堅羚羊角能壞金剛喻佛性羚羊角喻煩惱金雖堅剛羚羊角能碎佛性雖堅煩惱能亂煩惱雖堅般若智能破羚羊角雖堅賓鐵能壞悟此理者了然見性涅槃經云見佛性者不名衆生不見佛性是名衆生如來所説金剛喻者祇為世人性無堅固口雖誦經光明不生外誦內行光明齊等內無堅固定慧即亡口誦心行定慧均等是名究竟金在山中山不知是寶寶亦不知是山何以故為無性故人則有性取其寶用得遇金師鏨鑿山破取礦烹鍊遂成精金隨意使用得免貧苦四大身中佛性亦爾身喻世界人我喻山煩惱喻礦佛性喻金智慧喻工匠精進猛勇喻鏨鑿身世界中有人我山人我山中有煩惱礦煩惱礦中有佛性寶佛性寶中有智慧工匠用智慧工匠鑿破人我山見煩惱礦以覺悟火烹鍊見自金剛佛性了然明淨是故以金剛為喻因為之名也空解不行有名無體解義修行名體俱備不修即凡夫修即同聖旨故名金剛也何名般若是梵語唐言智慧智者不起愚心慧者有其方便慧是智體智是慧用體若有慧用智不愚體若無慧用愚無智祇為愚癡未悟故修智慧以除之也何名波羅蜜唐言到彼岸到彼岸者離生滅義祇緣世人性無堅固於一切法上有生滅相流浪諸趣未到真如之地並是此岸要具大智慧於一切法圓滿離生滅相即是到彼岸亦云心迷則此岸心悟則彼岸心邪則此岸心正則彼岸口説心行即是法身有波羅蜜口説心不行即無波羅蜜也何名為經經者徑也是成佛之道路凡人欲臻斯路當內修般若行以至究竟如或但能誦説心不依行自心則無經實見實行自心則有經故此經如來號為金剛般若波羅蜜經義淨字文明俗姓張氏范陽人年十五出家咸亨二年至番禺附海舶經二十五年遊三十餘國以武后證聖元年齎梵本經還河洛敕住佛授寺先天二年卒年七十九觀夫自古神州之地輕生循法之賓顯法師則創闢荒途奘法師乃中開正路其間或西域紫塞而孤征或南渡滄溟以單逝莫不咸思聖迹罄五體而歸禮俱懷旋踵報四恩以流望然而勝途多難寶處彌長苗秀盈十而蓋多結實罕一而全少實由茫茫象磧長川吐赫日之光浩浩鯨波巨壑起滔天之浪獨步鐵門之外亘萬嶺而投身孤漂銅柱之前跨千江而遺命跋南國有千江口或忘飧幾日輟飲數晨可謂思慮銷精神憂勞排正色致使去者數盈半百留者僅有幾人設令得到西國者以大唐無寺飄寄悽然為客遑遑停託無所遂使流離萍轉罕居一處身既不安道寧隆矣嗚呼實可嘉其美誠冀傳芳於來葉粗據聞見撰題行狀云爾其中次第多以去時年代近遠存亡而比先後粵以長安四年嵗次甲辰四月七日此寺綱維寺主義獎大上座智寶都維那大舉法濟禪師及衆徒等議以少林山寺重結戒壇欲令受戒懺儀共遵其處遂乃遠之都下屈諸大德殷勤致禮延就山門是時我老苾芻義淨及護律師瑳禪師恂律師暉律師恪律師威律師等既至寺所解舊結新僉議此邊名為小界標相永定冀無疑惑於是護鵝珍之嘉士無召自來存草結之英賢不期而會數逾一百行道三旬共繫頸珠俱修趺足誠五濁之希有慕四依之住持虛往實歸紹隆無替庶乎桑田屬改長存立石之基沙界時遷無爽布金之地恐田成碧海嶺變青川迷此結誠乃為銘曰羯磨法在聖教不淪式得金口是敬是遵目覩西域杖錫東巡覩盛事而隨喜聊刊刻乎斯文原夫三千肇建爰彰興立之端百億已成尚無人物之序既空洞於世界則日月未流實閴寂於慘舒則陰陽莫辨暨乎淨天下降身光自隨因餐地肥遂生貪著林藤香稻轉次食之身光漸滅日月方現夫婦農作之事興君臣父子之道立然而上觀青象則妙高色而浮光下察黃輿乃風蕩水而成結而云二儀分判人在其中感清濁氣自然而有陰陽陶鑄譬之以洪爐品物財成方之於埏埴者蓋寡聽曲談之謂也於是嶽峙星分含靈蔓延遂使道殊九十六種諦分二十五門僧佉乃從一闕而萬物始生糵世則因六條而五道方起或露體拔髮將為出要或灰身椎髻執作升天或生乃自然或死當識滅或云幽幽冥冥莫識其精眇眇忽忽罔知所出或云人常得人道或云死便為鬼靈或談不知蝶為我己不知我為蝶形既㣥迷於蜾羸復聚惑於螟蛉比混沌於雞子方晦昧於孩嬰斯皆未了由愛欲生藉業而有輪回苦海往復迷津者乎然則親指平途躬宣妙理説十二緣起獲三六獨法號天人師稱一切智引四生於火宅拔三有於昏城出煩惱流登涅槃岸者粵我大師釋迦世尊矣創成覺龍河九有興出城之望後移光鹿苑六道盛歸依之心初轉法輪則五人受化次談戒躅則千生伏首於是闡梵響於王舍獲果者無窮酬恩惠於父城發心者莫算始自了教會初願以標誠終乎妙賢契後期於結念住持八紀宏濟九居教無幽而不陳機無微而不納若泛為俗侶但略言其五禁局提法衆遂廣彰乎七篇以為宅有者大非戒興則非滅存生者小過律顯則過亡且如恚損輕枝現生龍戶慈濟微命交升帝居善惡之報固其明矣於是經論兼施定慧俱設攝生之綱唯斯三藏乎既而親對大師教唯一説隨機拯物理亡他議及乎糵舍初辭魔王或歡喜之志熙連後唱無滅顯亡疑之理可謂化緣斯盡能事畢功遂乃迹滅兩河人天掩望影淪雙樹龍鬼摧心致使娑羅林側淚下成泥哭者身邊血如華樹大師唱寂世界空虛次有宏法應人結集有五七之異持律大將部分為十八之殊隨所見聞三藏各別著下裙則裾有偏正披上服則葉存狹廣同宿乃異室繩圍兩俱無過受食以手執畫地二並亡愆各有師承事無和雜諸部流派生起不同西國相承大綱維四其間離分出沒部別名字事非一致如餘所論此不繁述故五天之地及南海諸洲皆云四種尼迦耶然其所欽處有多少摩揭陀則四部通習有部最盛羅茶信度則少兼三部乃至正量尢多北方皆全有部時逢大衆南面則咸遵上座餘部少存東裔諸國雜行四部師子洲並皆上座而大衆斥焉然南海諸洲有十餘國純唯根本有部正量時欽近日已來少兼餘二斯乃咸遵佛法多是小乘唯末羅遊少有大乘耳諸國周圍或可百里或數百里或可百驛大海雖難計里商舶慣者準知良為掘倫初知交廣遂使總喚崑崙國焉唯此崑崙頭捲體黑自餘諸國與神州不殊赤腳敢曼總是其式廣如南海録中具述歡州正南步行可餘半月若乘船才五六潮即到上景南至占波即是臨邑此國多是正量少兼有部西南一月至跋南國舊云扶南先是裸國人多事天後乃佛法盛流惡王今並除滅迥無僧衆外道雜居斯即贍部南隅非海洲也然東夏大綱多行法護關中諸處僧祇舊兼江南嶺表有部先盛而云十誦四分者多是處其經夾以為題目詳觀四部之差律儀殊異重輕懸隔開制迢然出家之侶各依部執無宜取他經事替己重條用自開文見嫌餘制若爾則部別之義不著許遮之里莫分豈得以其一身遍行於四裂裳金杖之喻乃表證滅不殊行法之徒須依自部其四部之中大乘小乘區分不定北天南海之郡純是小乘神州赤縣之鄉意在大教自餘諸處大小雜行考其致也則律檢不殊齊致五篇通修四諦若禮菩薩讀大乘經名之為大不行斯事號之為小所云大乘無過二種一則中觀二乃瑜伽中觀則俗有真空體虛如幻瑜伽則外無內有事皆唯識斯並咸遵聖教孰是孰非同契涅槃何真何偽意在斷煩惑濟衆生豈欲廣致紛紜重增沈結依行則俱升彼岸棄背則並溺生津西國雙行理無乖競既無慧目誰鑒是非任久習而修之幸無勞於自割且神州持律諸郡互牽而講説撰録之家遂乃章鈔繁雜五篇七聚易處更難方便犯持顯而還隱遂使覆一簣而情息聽一席而心退上流之伍蒼髭乃成中下之徒白首寧就律本自然落漠讀疏遂至終身師弟相承用為成則論章段則科而更科述結罪則句而還句考其功也實致為山之勞核其益焉時有海珠之潤又凡是製作之家意在令人易解豈得故為密語而更作解嘲譬乎水溢平川決入深井有懷飲息濟命無由準檢律文則不如此論斷輕重但用數行説罪方便無煩半日此則西方南海法徒之大歸矣至如神州之地禮教盛行敬事君親尊讓耆長廉素謙順義而後取孝子忠臣謹身節用皇上則恩育兆庶納隍軫慮於明發㣥臣則莫不拱手履薄呈志於通宵或時大啓三乘廣開百座布制底於八澤有識者咸悉歸心散伽藍於九宇迷途者並皆回向皇皇焉農歌畎畝之中濟濟焉商詠舟車之上遂使雞貴象尊之國頓顙丹墀金鄰玉嶺之鄉投誠碧砌為無為事無事斯固無以加也其出家法侶講説軌儀徒衆儼然欽承極旨自有屏居幽谷脫屣樊籠潄巖流以遐想坐林薄而棲志六時行道能報淨信之恩兩期入定合受人天之重此則善符經律何有過焉然由傳受訛謬軌則參差積習生常有乖綱致者謹依聖教及現行要法總有四十章分為四卷名南海寄歸內法傳又大唐西域高僧傳二卷并雜經論等十卷并録附歸願諸大德興宏法心無懷彼我我善可量度順佛教行勿以輕人便非重法重曰然今古所傳經論理致善通禪門定瀲之微此難懸囑且復粗陳行法符律相以先呈備舉條章考師宗於實録縱使命淪夕景希成一贊之功焰絶朝光庶有百燈之續閲此則不勞尺步可踐五天於短階未徙寸陰實鏡千齡之迷躅幸願檢尋三藏鼓法海而揚四波皎鏡五篇泛慧舟而提六欲雖復親承匠旨備檢元宗然非濬發於巧心終恐受嗤於慧目云爾法藏字賢首俗姓諸葛氏蘇州吳縣人一云姓康氏康居人自少出家如意元年武后制於東都大福先寺檢校無盡藏長安四年又制於化度寺檢校無盡藏後延為薦福寺大德開元二年卒年七十八夫真心寥廓絶言象於筌弟沖漠希夷忘境智於能所非生非滅四相之所不遷無去無來三際莫之能易但以無住為性隨派分岐逐迷悟而升沉任因緣而起滅雖復繁興鼓躍未始動於心源靜謐虛凝未嘗乖於業果故使不變性而緣起染淨恆殊不捨緣而即真凡聖致一其猶波無異溼之動故即水以辨於波水無異動之溼故即波以明於水是以動靜交徹真俗雙融生死涅槃夷齊同貫但以如來在世根熟易調一稟尊言無不懸契大師沒後異藝紛綸或趣邪途或奔小徑遂使宅中寶藏匿濟乏於孤窮衣內明珠弗解貧於傭作加以大乘深旨沈貝葉而不尋㣥有盲徒馳異路而莫返爰有大士厥號馬鳴慨此頽綱悼斯淪溺將欲啓深經之妙旨再曜昏衢斥邪見之顛眸令歸正趣使還源者可即反本非遙造廣論於當時遐益㣥品既文多義邈非淺識所窺悲末葉之迷淪又造斯論可謂義豐文約解行俱兼中下之流因茲悟入者矣夫滿教難思窺一塵而頓現圓宗叵測覩纖毫以齊彰然用就體分非無差別之勢事依理顯自有一際之形其猶病起藥興妄生智立病妄則藥妄舉空拳以止啼心通則法通引虛空而示遍既覺既悟何滯何通百非息其攀緣四句絶其增減故得藥病雙泯靜亂俱融消能所以入元宗泯性相而歸法界竊見元綱浩瀚妙旨希微覽之者詎究其源尋之者罕窮其際是以真空滯於心首恆為緣應之場實際居於目前翻為名相之境今者統收元奧囊括大宗出經卷於塵中轉法輪於毛處明者德隆於即日昧者絶望於多生會旨者山嶽易移乖宗者錙銖難入輒以旋披往誥覩舊章備三藏之元文憑五乘之妙旨繁詞必削缺義復全雖則創集無疑况乃先規有據窮茲性海會彼行林別舉六門通為一觀參而不雜一際皎然冀返迷方情同曉日佩道君子俯而詳焉今略明此觀總分六門先列名後廣辨夫以主教圓通盡虛空於塵剎帝珠方廣攬法界於毫端無礙鎔融盧舍那之妙境有崖斯泯普賢眼之元鑒浩瀚微言實叵尋其旨趣宏深法海尢罕測於宗源今略舉大綱開茲十義撮其機要稱曰指歸庶探元之士粗識其致焉夫以真源素範沖漠隔於筌弟妙覺元猷奧賾超於言象雖真俗雙泯二諦恆存空有兩亡一味常顯良以真空未嘗不有即有以辨於空幻有未始不空即空以明於有有空有故不有空有空故不空不空之空空而非斷不有之有有而不常四執既亡百非斯遣般若元旨斯之謂歟若歷事備陳言過二十萬頌若撮其樞要理盡一十四行是知詮真之教乍廣略而隨緣超言之宗性圓通而俱現般若心經者實謂曜昏衢之高炬濟苦海之迅航拯物導迷莫斯為最然則般若以神鑒為體波羅蜜多以到彼岸為功心顯要妙所歸經乃貫穿言教從法就喻詮旨為目故言般若波羅蜜多心經慧苑京兆人華嚴藏法師上首弟子原夫第一勝義是離言之法性等流真教誠有海之方舟故以名句字聲作別相之本質色香味觸為住持之自體嗟乎超絶言慮之旨洽悟見聞之境莫不以法王宏造權道之力歟大方廣佛華嚴經者實可謂該通法界之典盡窮佛境之説也若乃文言舛誤正義難彰真見不生尋源失路故涉近以徑遠從淺而暨深去來今尊何莫由斯道且夫音義之為用也鑒清濁之明鏡釋言話之旨歸匡謬漏之楷模闢疑管之鈐鍵者也至如低徊誤為遲回倣徨乃成稽返俾倪代乎僻堄軾環遂作女牆嬌書矯形正斜翻覆幹存幹體樹木參差若斯之徒紊亂聲義不知踳駮何以指南苑不涯菲薄少玩茲經索隱從師十有九載雖義旨悠邈難以隨迎而音訓梵言聊為注述庶使披文了義弗俟籌咨紐字知音無勞負帙且螻蟻之量司已穴而疏冥豈霆雷之資開蟄戶於遐邇英達君子希無誚焉道氤俗姓長孫氏長安高陵人父容殿中侍御史氤少擢進士第後遇梵僧心願出家事京師招福寺慎言律師為師元宗幸洛敕與良秀法修隨駕開元二十八年卒某末品輕生虛均雨露得陪緇伍許自精修雖常袒右肩無施舉袂之役而執錫舒步得蠲負載之勞屬以時暢元功德楊真化不謂勤劬慕學造次養生今月十六日苦腸忽加湯藥無救泉門自掩安沐堯風夜臺一歸寧逢舜日有定瘞於蒼隴無再謁於丹墀一行俗姓張氏巨鹿人本名遂武后時佐命剡國公公謹支孫幼依暜寂禪師出家後往天台山國清寺受算法造大衍歷元宗召入集賢院尋詔住興唐寺開元十五年卒於京師華嚴寺諡大慧禪師按舜典云在璿樞玉衡以齊七政説者以為取其轉運者為樞持正者為衡皆以玉為之用齊七政之變知其盈縮進退得失政之所在即古太史渾天儀也自周室衰微疇人喪職其制度遺像莫有傳者漢興丞相張蒼首創律歷之學至武帝詔司馬遷等更造漢歷乃定東西立晷儀下漏刻以追二十八宿相距星度與古不同故唐都分天部洛下閎運算轉歷今赤道歷星度則其遺法也後漢永元中左中郎將賈逵奏言臣前前上傅安等用黃道度日月弦望多近史官一以赤道度之不與天合至差一日以上願請太史官日月星簿及星度課與待詔星官考校度門寺大衆僧撤曇振達摩一行等白令公檀越世相遄邁時節如馳自先師因待不居遂逾十載塔樹將列禪庭坐蕪永懷正服終天何及惟師降命總依授斯全德暜門紀述有出常規每恨杜氏多涉於説通閭君屢傷於假氣內惟祕惟覺才難由是法壽幾遷名身莫擇自往嵗僉議令以斯意仰憑而鳳池務總未果成願近承銜朝寄出鎮嶽陽乘間論道此會難失所以思義禪師重往咨覲幸蒙法生之義莫逆於心爰就斯文流之後死然夫發揮浮道宛若現觀幽贊佛持動符先軌不圖述作之盛而至於斯乎自非深起明門亦無以臻於此耳仰以今月月半潔以清齊凡我法流嘉茲日陳之影塔宣布至言人懷感歎有兼常節是亦存沒之大事畢矣人天之榮觀備矣儻靈峯可作本地常存必當流鑒遠緣怡然動色詎祇傳聲梵世以慶法輪之裔哉僧徹等久席圓聞寧窮智葉載懷遺偈益戀初因言荷末光彌慙引曜空思厚德不知何以報之唯應極力勉心以存所務儻一至之功可必十方之助不行當回此庶恩以現祈花應耳敬白智升開元中崇福寺沙門夫目録之興也蓋所以別真偽明是非記人代之古今標卷部之多少托拾遺漏刪夷胼贅欲使正教綸理金言有緒提綱舉要歷然可觀也但以法門幽邃化網恢宏前後翻傳年移代謝屢經散滅卷軸參差復有異人時增偽妄致令混雜難究蹤由是以先德儒賢製斯條録今其存者殆六七家然猶未極根源尚多疏闕升以庸淺久事披尋參練異同指陳臧否成茲部帙庶免乖違幸諸哲人俯共詳覽釋具開元中大忍寺沙門唐開元十有八年定之深澤大忍寺尼修巨靈分守以威不若惟窔與隩復樓之闕拱於闕十四字參差竦闕一字以闕二字垣巖廊於亦制立張皇前殿以為一寺之表此寺也始聞於晉魏代歷於周隋有舍利之感無憂之迹靈龕闕一字闕然恆所嗟怏今斯一舉可謂盡美夫其橚矗闕二字嵯峨山峙偃闕一字日月棲闕一字風煙闕二字微坐修簷遏視數百若指諸掌縱因遐觀則左碧海而右青山依違諸梵之宮俄不知川原井邑之所在請循其闕一字正象之紀也始以經論成闕一字終以功福宅心故建茲樓用周所願蓋式資闕一字之不可以志也則所以誓闕一字言護建寺綱列釋合志存誠於是閭閻豪首無非悅服大捨者卅有三戮力者五十轉勸者百有八千餘室同欲同貫竭款效勤終始一心有死無二凡社保婚聘之禮牲幣之費則歸之所謂從暗入明信異郡殊方從善如流元黃式競者不可勝紀八材是購闕二字如雲茂績有孚職乃歸木石之攻也已陰判於巖壤之間收之果與度量合椎輪既闕一字不勸而奔推轂排轅其指可掬者萬數先是深數丈及茲可揭力未其神功也歟天恩越自恆典百足真務所以凝也闕一字就業闕一字匪翔價善且不孤恭惟大師以解脫之身宅無漏之界猶不我遐棄紫金其容從悲願也然則鴻濤沸於真乎海且晏然化惡云滅乃今靈儀在殿雖不闕一字於往來而神足潛遊心每陪於履踐則氛然作為紺宇祇陀氏高尚其事不利黃金以今而觀有足係也超忽時事杳然刊諸峨峨茲樓矯矯首出萬構爭竦橫雲造日峻墄仰壂靈闕三字擢擢金容魂態可悉超超自功可久其利匪一海嶽灰揚此焉終吉刺史段公崇簡動中權言合道德惟淳懿政不苛煩故百姓安闕一字別駕符公子圭長史迹佐理之德實難其人司功李公真縣令劉公遂昌好寬厚之德行和乃心茲樓故獲終吉丞齊公賢主簿樊公璆尉張公懷尉張公仲良前尉乘公璡以道聯下闕仁素開元時嵩嶽間居寺沙門圭禪師弟子大師諱元圭李氏河南伊闕人也上元二載孝敬崩度隸寺焉宿殖德本無師自悟及少林尊者開示大乘咨稟至道晚年居龐塢阿蘭若遠近縞素受道者不復勝記至開元四年嵗次景辰秋八月甲辰朔十日癸丑終於龐塢春秋七十有三十三日景辰權厝於寺北岡之東至十一年嵗次癸亥秋七月乃營塔於浮圖東嶺之左大師味淨之所而庭柏存焉癸巳晦奉遷於塔從僧儀也弟子比邱僧仁素等刊此貞石以旌不朽嗣安元宗時人右臣會覺等言臣聞皇天以平分四時聖人以亭育萬物僧等何幸頓沐殊私但以王者封畿乃稱鄠杜之邑諸侯近甸是惟酆鎬之濱頃者靈符發兆聖號輝煥百神慶答萬國維新不謂惠澤旁流降仙毫之瑞札宸慈下被賜天寶之嘉名暜潤緇黃齊霑寺觀而魚龍起伏來從日月之宮朿帛戔戔更賁金繩之界雙林戴色紺苑增榮臣等不勝抃躍之至
