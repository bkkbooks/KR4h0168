front:
  text: 全唐文欽定全唐文卷九百十四慧能俗姓盧氏其先范陽人以父行瑫官南海遂為新州人咸亨中至樂昌就智遠禪師出家復至蘄春就宏忍禪師受具後至南海就印宗法師剃染住法性寺上元中移具寶林寺詔赴京邑謝病不起神龍三年敕住韶州能居寺改額法泉是為南宗六祖先天二年卒憲宗時追諡大鑑禪師
  hash: sha256:5f0385c46fe62015a1adecf8d24569d8a9dc8a754336f990fd252177891a035d
  markers:
