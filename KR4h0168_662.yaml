front:
  text: 全唐文欽定全唐文卷六百六十二白居易七
  hash: sha256:965eba7f8df3a442dd819e51d65fce1314c7b6f5769730142e18544da8f28fe5
body:
  text: 勅去年冬命侍中宏正建大將軍旗鼓移鎮於成德軍而晃以下四十有一人實從魏來或驅或殿披堅執銳可謂有勞宜以宮坊之寮憲府之職隨其名秩序而寵之可依前件勅故事君使臣其道不一或先勞而後受賞或先加寵而後責功蓋宜便有後先時事有緩急故耳朝議大夫守鴻臚卿兼御史大夫判度支上柱國賜紫金魚袋張平叔國之材臣也計能析秋毫吏畏如夏日司會逾月綱條甚張况師旅未息調食方急倚成取濟非爾而誰故自大鴻臚換居人部造膝而授不時而遷其要無他是欲急吾事而望倚爾功也公卿以降㣥有司盈庭然問曰與吾坐而決事丞相以下不過四五而主計之臣在焉非智能則事不可成非諒直則吾難近噫職局之外得不思稱官望而厭我心乎可守尚書戶部侍郎判度支散官勳賜如故勅劍南西川節度判官朝散大夫檢校尚書戶部郎中兼侍御史上柱國賜紫金魚袋李虞仲劍南西川觀察判官朝議郎檢校刑部員外郎兼侍御史雲騎尉賜緋魚袋崔戎等去年春朕憂西南事授丞相文昌鉞鎮撫之次選郎吏有才實如虞仲輩者往贊理之故其制云苟佐吾丞相以善政聞寧久遺汝於諸侯乎今蜀政成矣蜀人乂矣是汝輩職修事舉而奉吾詔書甚謹也前言在耳安可弭忘並命為郎主吾信賞虞仲可行尚書兵部員外郎戎可尚書戶部員外郎散官勳如故勅戶部侍郎周之地官小司徒也掌天下田戶之圖生齒之籍賦役貨幣之政令以待國用而質歲成元和以還日益寵重善其職者多登大任中茲選者莫匪正人誰其稱之我有邦彥朝議郎一作大夫守御史中丞上柱國賜紫金魚袋牛僧孺自舉賢良踐歷臺閣秉潤色筆提糾繆綱而書命無繁詞決事無留獄受寵有憂色納忠多苦言朕心知之何用不可夫以人曹之重如彼僧孺之賢如此俾居是職不亦宜乎可守尚書戶部侍郎散官勳賜如故勅朝議大夫守尚書刑部侍郎驍騎尉庾承宣昔我太宗文皇帝嘗謂尚書丞百職綱維事一失中則天下有受其弊者因命戴冑魏徵及杜正倫劉洎輩繼領是職分居左右官修事理人到於今稱之故吾前命崔戎一作從持左綱今命承宣操右轄眾口籍籍頗為得人况承宣端諒勤敏周知典故必能為我紐有條之綱柅妄動之輪坐曹得出入郎官立朝得奏彈御史決會政要扶樹理本無俾戴魏劉杜專美於貞觀中可守尚書右丞散官勳如故勅中散大夫行尚書工部員外郎上柱國吳縣開國男食邑三百戶張聿內外庶官同歸共理牧守之任最親吾人蓋弛張舉措由其心賞罰威福懸其手若一日失其職一郡非其人而名未達於朝聽之間為害已甚矣選授之際得不慎夫以爾聿前領建溪有理行次臨沔郡著能名用爾所長副吾所急宜輟郎署往頒詔條來暮之聲佇入吾耳可使持節衢州刺史散官勳如故勅朝散大夫右補闕內供奉飛騎尉辛邱度等朕詔丞相求方畧忠讜之士置於左右而播等以石暨仍叔應詔言其為人厚實謇直嘗以文行謀畫從容於幕府之間臨事敢言當官能守可使束帶同升諸朝又言邱度介潔靜專不交勢利宜加推獎以勸其徒况久次者轉遷後來者登進皆適所用平章可之可依前件勅薛之縱等去年冬授愬鉞俾自徐鎮潞而愬與其麾下同德食不求飽席不暇煖節鎮殿定一如所委此誠愬之忠畧然所賴之縱等焦心戮力同濟厥功而頒賞已踰時秩宜加等我有爵祿分而命之知吾不遺細大之功可依前件勅禮云臣下竭力盡忠以立功於國者必報之以爵祿此言上之不虛取於下也而司空度等咸以忠力作股肱心膂之臣大節大勞書在甲令然則功如是忠如是高爵重秩予何愛焉故於統御之初先行信賞詔主爵者合為奏書或加寵進封或延恩任子次勤第品咸按舊章行乎敬之無忝予一人之嘉命可依前件勅餘慶亡母某氏等夫德不旌則勸善之典缺矣親不顯則揚名之道廢矣凡今公卿大夫至於元士濟濟然抱忠履信立我朝者皆聖善之教燕翼之方所致也自家刑國有所從來不大封崇是忘報施朕去年仲月統御之初發號推恩先降是命豈直光前慰後而已哉亦欲使天下為母者聞庶幾乎善統其家慈訓其子厚人倫而美教化也可不務乎勅某官李寘近者西夷犯塞詔諸將出師司計臣俊言寘有應辨才可司饋餉故自京府掾假臺郎憲職以命之屬寇遁師旋未展其用况在公族推有器幹今授銅印俾宰咸陽夫庶官之任為急西郊咫尺佇爾能聲可京兆府咸陽縣令勅程㣥嘗從事於鎮冀之間病免所職垂老之歲棄為窮人倀倀無歸有足傷者夫一夫不獲若納諸隍此聖王用心推已及物今宜與㣥祿食使飽煖其身亦猶晉君不能忘情於絳老也往佐中部爾其念哉可坊州司馬勅海州刺史王元輔漢制二千石有政績者就中加命秩不即改移蓋欲使吏久於官而人安於化也今元輔為郡頗有理名廉使上聞奏課居最宜加中憲旌而寵焉庶使與君共理者聞而知勸可兼御史中丞勅朝散大夫守尚書金部郎中上柱國楊潛溫厚靜專有端士之操朝議大夫前使持節吉州諸軍事吉州刺史上柱國李繁精強博敏有才子之稱將仕郎前使持節光州諸軍事守光州刺史雲騎尉史備變通健決有良吏之用而能本於文學輔以政事為郎見其行為郡聞其聲夫洋束梁之險遂居蜀之腴濠控淮之要三者皆名郡而委之三吏得不思勤儉教導勞來安輯膏雨吾土襦袴吾人者乎潛可使持節洋州諸軍事守洋州刺史散官勳如故繁可使持節都督遂州諸軍事守遂州刺史備可使持節濠州諸軍事守濠州刺史充團練渦口西城等使散官勳如故勅朝議郎守太常博士上柱國張洪前瀛漠等州都團練判官朝議郎侍御史內供奉上柱國賜緋魚袋相里友畧等元翼以大節大忠綽聞朝野授鉞開府殿我漢南而又求賢乞能以自參貳則其賓寀宜有以稱之故求吾俊造之英勳列之冑達朝議而練戎事者與焉今以洪之知國禮奉家聲以友畧之富藝文飽軍旅兩中是選合而命之優秩寵章無所愛惜時無古今代有忠賢苟置吾元翼於羊杜間別有陟明之典在洪可檢校尚書職方員外郎兼侍御史充山南東道節度判官仍賜緋魚袋散官勳如故友畧可檢校尚書屯田員外郎兼侍御史充山南東道觀察判官散官勳如故勅朝議郎前使持節成州諸軍事守成州刺史充本州守捉使賜紫金魚袋姚成節嘗為天平軍裨將當劉悟之立忠勳也謀成事集爾有助焉雖授一城未足酬獎况聞信厚勤恪宜於爪牙肘腋間居之昔漢文帝以宋昌忠勞擢拜將軍掌宿衞今吾用汝猶前志也環拱之職得不勉歟可毅果校尉守右神策將軍知軍事餘如故勅起居郎高鉞亡母滎陽郡太君鄭氏等予有侍臣咸士之秀者或左右以書吾言動前後以補吾闕遺森然在庭各舉其職爰思乃教知所從來豈非善禀於親行成於內徙隣斷織訓使然耶不追封邑之榮曷顯統家之慶可依前件勅京兆尹兼御史大夫柳公綽長吏數易為害甚多邇來都畿未免斯弊或苛急而人重困或懦弱而姦不息得其中者其公綽乎細大必躬親剛柔不吐茹甚稱厥職惜而不遷然智者常憂忠者常勞亦非吾以平施御臣下之道也尚書六職天官首之辨論官材澄汰流品比諸內史選妙秩清詢眾用能無易公綽爾宜飭躬承命以裴王崔毛為心苟副吾言用稱乃職而今而後亦何往而不適哉可尚書吏部侍郎勅昔齊桓公心體懈墮則隰朋侍漢成帝親重儒術則劉向從今之常侍是其選矣稱其任者惟正人乎大中大夫守尚書吏部侍郎上柱國賜紫金魚袋孔戣言行謹直風操端莊肅然禮容清廟之器始自筮仕迄於天官虛舟為心利刃在手全才具美時論多之可使珥貂立吾左右從容侍從以備顧問隰朋劉向豈遠乎哉可右散騎常侍勅尚書司門郎中王公亮茂於學精於文文學之外有析毫刜鐘之用自佐戎律領郡符持憲為郎皆稱厥職吾前命劉遵古張平叔為商州刺史繼有善政人用乂安今爾代之守而勿失况商土瘠商人貧可以靜理而阜安不宜改絃而易轍以爾精敏當自得中可商州刺史勅職之要莫先乎駮正文之選莫難於司言將使朝綱有條朕命惟允在二者得人而已中大夫使持節蘇州諸軍事守蘇州刺史上騎都尉韋覬精微專直通乎事典可使平奏議而坐右一作左曹朝散大夫守尚書禮部郎中上柱國庾敬休溫裕端明飾以辭藻可使書誥命而專右席而輪轅鑿枘各適所宜夫惟刺史守列城郎官應列宿選任倚注非不榮重然吾左右前後方求正人如覬敬休不宜疎遠亦猶有聲之玉無纇之珠不置佩服之中掌握之上皆非其所也宜自敬謹無忝吾言覬可行給事中散官勳如故敬休可尚書兵部郎中知制誥散官勳如故勅故特進行太子少保上柱國涼國公食邑三千戶食實封五百戶李愬在建中歲泚賊叛逆惟太師晟實仗大順剪而誅之在元和朝蔡寇充斥惟爾愬實奮奇策虜而戮之父子之功書於甲令俱為第一焯煇當時矧爾一登將壇六換鈇鉞坐論巖廊之道臥理保傅之事方深倚望奄忽淪謝是用當食累嘆視朝三輟豈不以爪牙之威於外股肱之痛軫於中者乎而弔奠之命賵賻之數雖加常等未表殊恩宜以太尉之秩贈上公之袞斂俾爾被哀榮服忠孝從先太師於九原也不其盛歟嗚呼美終必復禮無不荅昔爾之勤勞如彼今吾之寵飾如此君臣報施可謂兩臻其極焉爾靈有知欽我追命可贈太尉仍令所司備禮冊命賜絹二千匹布七百端米粟一千石委度支送勅朕聞古之臣子有忍死効節為忠者有不傷髮膚全歸為孝者有不顧性命引決為忠者但問所操所蹈何如耳豈繫去就生死之間耶噫今有重義如泰山輕生如鴻毛死而不朽者安得不襃揚寵飾使天下聞之所以勸孝心激忠腸然後薄者敦懦者立幸生者恥格也故魏博等州節度觀察處置等使起復寧遠將軍守右金吾大將軍員外置同正員檢校工部尚書兼魏州大都督府長史御史大夫賜紫金魚袋田布其父太尉甚賢此子鎮陽之亂宏正歿焉而布枕戈嘗膽誓報寃恥故吾以大將軍之旗鼓鈇鉞先臣之土壤士卒盡用委付親加勉諭人鬼之憤期一洩而甘心焉既而激發魏師出疆臨敵事有不得已者布亦末如之何卒至於剖心自明遺疏自列謝君於天上報父於地下可謂田氏有孝子國家有烈臣則吾之知臣宏正之知子明矣聳動人聽衋傷我懷故廢臨朝所以示哀也加禮命所以示榮也哀榮恩禮至則至矣嗚呼曾未足以顯爾之節不厭吾之心乎可贈尚書右僕射賜布帛三百段米粟二千石委度支逐便支遣勅河南尹韋貫之善馭者齊六轡善理者正六官六官成則百事舉故吾選賢任舊以次第補之而六卿之材吾已得五闕一不可待汝而成貫之以正行明誠為先朝輔始以直進終以直退道有消長德無緇磷及帥湘潭尹河洛而廉平清一之政繼聞於京師名吾心善入我耳宜置朝右以鎮厚時風况今之尚書漢之公卿也言動可否屬人耳目焉固不專率四屬程百工備位於冬官而已可工部尚書餘如故勅太子詹事劉元鼎等夫選可任而任之則用無不適擇可勞而勞之則事無不成蓋君使臣臣事君之大端也屬西夷乞盟求可以涖之者歷選多士吾得三人今以元鼎之博通師老之誠諒武之恭敏合而為用不亦可乎爾宜臨之以莊示之以信形儀辭氣皆有可觀必能率服彼戎不獨益敬吾使法卿憲秩寵之以遣可依前件勅大理卿許季同國朝以來有劉得一作德威張文瓘唐臨為大理卿有魏徵虞世南顏師古為祕書監設官之重得賢之盛人到於今稱之今季同以明慎欽恤理刑獄以文學博雅掌圖籍由廷尉而掌祕府論者榮之宜自重其官自遠其道又思與劉張唐魏虞顏為比不亦自多乎可祕書監勅殿中侍御史張元夫官有秩清而選妙者其儀曹員外郎之謂乎凡殿內御史雖文才秀出功課高等者滿歲而授猶曰美遷有如元夫連膺二遷歷彼踐此僉以為宜况怒飛青冥翔集禁陛由茲去者十八九焉汝知之乎思有以稱可尚書禮部員外郎勅權知兵部郎中楊嗣復朕聞前代制誥中書令侍郎舍人通掌之國朝以來或以他官兼領惟其人是用不限於資秩職署焉予以為然多繇是選前所命者時稱得人研實覈名次第及汝汝嗣復根於義訓播為令器文煥發而才秀出不當汨沒於郎吏間况貞元中汝父為中書舍人甚稱厥職今使汝繼書吾命成一家言堂烜國華在於此舉爾宜兢兢祗勵無隕其名可庫部郎中知制誥勅商州刺史張平叔為人廉直為政惠前後歷掾邑宰郡守而去思來暮之謠繼聞於人聽焉及副鹽鐵官刺商雒郡會課報政亦甲於他官自貞元以來用三科取士奉詳明政術可以理人之詔而得其名有其實者幾何人哉平叔居其一也能効若是何用不臧故事內史未補間亞尹得行大京兆事試可而即真者往往有之故其選任日益難重爾宜稱所舉慎厥職無墮大以勤小無急弱以緩強夕念朝行遵吾約束可京兆少尹知府事勅漢令軍中士有不幸死者得以棺斂傳送若是而已猶四方歸心焉矧吾襃贈以榮之惻隱以將之顯其忠撫其後亦所以激生者節豈獨慰逝者魂乎左神策軍赴行營正將試太常卿康日華領王師死王事軍書置奏朕甚悼焉可贈坊州刺史勅登仕郎守國子博士張籍文教興則儒行顯王澤流則歌詩作若上以張教流澤為意則服儒業詩者宜稍進之頃籍自校祕文而訓國冑今又覈名揣稱以水曹郎處焉前年以來凡歷文雅之選三矣然人皆以爾為宜豈非篤於學敏於行而貞退之道勝邪與之寵名可以獎夫不汲汲於時者可尚書水部員外郎散官如故勅漢朝郎官出宰百里故今京邑令多命尚書郎補焉朝議郎行尚書水部員外郎何士乂慎檢和易介然有常守而勿失可使從政然能佩弦以自導帶星以自勤則緩急勞逸之間必使適宜而會理矣以爾思退故吾進之可守河南縣令散官如故勅丞相植典職樞務亦既逾歲而能明我目達我聰左右我躬以底於道况屬郊祀攝贊大儀寵錫之間植宜加等而念其猶子乞用推恩既叶舊章允膺新命其姪某可某官勅中書舍人王起等朕臨御之始慶賞遂行卿士大夫遞加勳秩自武騎尉以上十有二轉自起以下十有四人咸賜以勳舉書於籍可依前件勅古者君使臣以禮臣事君以忠季代以還鮮由茲道先皇帝常創於是故在位十五載凡解相印者殆二十人多寵為大僚或付以兵柄矧予小子宜有加焉而輔弼之臣嘗經一日造吾膝沃吾心則思與之始終厚申恩禮不惟勸感來者且不敢失墜先志也尚書右僕射蕭俛忠肅孝敬佐吾為理以勤事國以疾退身本末初終不失其道既免樞務倚為右揆一作俾居端揆朕欲加恩超等復吾前言而俛繼上讓章至於三四敦諭煩切陳乞彌堅是用正命為選部尚書而冠六卿統百職尚可以表吾寵重亦所以成爾謙光爾宜欽厥始慎厥終毋忝我襃揚之命可吏部尚書勅溫堯卿等今之俊乂先辟於征鎮次升於朝廷故幕府之選下臺閣一等異日入為大夫公卿者十八九焉荊門景域南北大府而堯卿等或已參軍要或方受兵書各命以官分試其事名秩章綬分而寵之夫千里之行始於足下苟自強不息亦何遠而不届哉可依前件勅古之善為國者勞不忘而賞不濫有賞一人而為僭者有千百人而不為費者其要在當否而已不繫於眾寡也朕自統御已來忽忽有念念天下材力之將勇敢之士進有征討之苦退有守捍之勤藏之中心何嘗暫忘而亟因大慶思洽普恩某等若干人咸進勳級並可上柱國賜緋紫制勅萬年令李彤侍御史王源中等舜以五長綏四國若今之節制也周以十聯率諸侯若今之廉察也國家合為一柄付有功諸侯故其陪臣選任益重或輟朝籍授書者往往而有况承元有大忠於國受重任於外使其承上涖下敬始善終實在庶寮叶力以濟今以彤宰京邑有理劇之用如水在器撓之不濁以源中立憲府有糾正之能如刃發硎割之無滯一可以倅戎事一可以佐軺車二職交修在此一舉臺郎憲吏金印銀章加乎爾身無忝我命可依前件勅古人有云樹欲靜而風不止子欲養而親不待向無顯揚襃贈之事則何以旌先臣德慰後嗣心乎故朕每施大恩行大慶而哀榮之命未嘗闕焉銀青光祿大夫行尚書吏部侍郎上護軍河東縣開國子柳公綽父溫等咸有令子集於中朝資父事君移忠自孝本於嚴訓酬以寵名賜命追榮各高其等嗚呼存者不匱往者有知斯可以載揚蘭陔之光輟風樹之嘆耳可依前件
