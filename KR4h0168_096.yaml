front:
  text: 全唐文欽定全唐文卷九十六高宗武皇后二
  hash: sha256:590cba4ce56ffc669c74431ec28f1fe54c080c9c12be5e47ee7c7b7c07eafe87
body:
  text: 黃軒御歷朝萬方於合宮丹陵握符咨四岳於衢室有虞輯瑞總章之號既存大禹錫珪重屋之名攸建殷人受命置陽館以辨方周室凝圖立明堂以經野用能範圍三極幽賛五神展尊祖之懷申宗記之典爰從漢魏迨及周隋經始之制雖興修廣之規未備朕以庸昧虔膺厚託受寄於綴衣之夕荷顧於仍几之前伏以高宗往年巳屬意於陽館故宗輔之縣預紀明堂之名改元之期先著總章之號朕於乾封之際巳奉表上塵雖宸心未遑營構今以鼎郊勝壤圭邑奧區處天地之中順陰陽之序舟車是湊貢賦攸均爰藉子來之功式遵奉先之旨夫明堂者天子宗祀之堂朝諸侯之位也開乾坤之奧策法氣象之運行故能使災害不生禍亂不作眷言盛烈豈不美歟比者鴻儒禮官所執各異咸以為明堂者置之三里之外七里之內在國陽明之地今既俯邇宮掖恐黷靈祇誠乃布政之居未為宗祀之所朕以為丙己之地去宮室遙遠每月所居因時饗祭常備文物動有煩勞在於朕懷殊非所謂今故裁基紫掖闢宇彤闈經始肇興成之匪日但敬事天地神明之德乃彰尊祀祖宗嚴恭之志方展若使惟云布政負扆臨人則茅宇土階取適而巳豈必勞百姓之力制九筵而御哉誠以獲執蘋蘩虔奉宗廟故也時既沿革莫或相遵自我作古用適於事今以上堂為嚴配之所下堂為布政之居光敷禮訓式展誠敬來年正月一日可於明堂宗祀三聖以配上帝宜令禮官博士學士內外明禮者詳定儀禮務從典要速以奏聞朕君臨紫極撫育蒼生普該有識之流為啟無疆之福神宮之後式建尊容頃緣內作工徒宿火誤燒麻主遂涉明堂朕昧旦憂勤不遑寢食慮虧至道未副天心內省厥躬伏增寅畏槐省棘署衆僚庶尹宜竭廼誠各揚其職內作工匠可即放還刺史縣令風化之首宜矜恤鰥寡敦勸農桑均平賦役省察姦盜里閈妖訛尤當禁止遠近冤訟令早決斷見禁囚徒速為處分老病之色征鎮之家亦令州縣加意撫存諸作非要切者量事宜停所司供進之物並宜節減其長才廣度沈跡下僚據德依仁韜聲幽閉懷輔佐之器乏知己之容宜令京官職事五品以下及刺史上佐縣令量各準狀薦舉仍遣內外文武百官九品以上各上封事極言正議無有所隱頃屬默啜攻城咸憂陷沒丈夫固守猶不能堅婦人懷忠不憚流矢由茲感激危城重安如不襃升何以獎勸古元應妻可封為徇忠縣君王元感質性溫敏博聞強記手不釋卷老而彌篤掎前達之失究先聖之旨是謂儒宗不可多得可授太子司議郎兼崇賢館學士鸞臺朕聞文武之道憑經緯而開國春秋之功藉生殺而成歲雖復車書混一中黃之雄氣諒存溫煦方滋太白之高星必應事既不昧理乃固然朕自臨御天下憂勞兆庶宵衣佇旦望調東戶之風旰食忘眠希緝南薰之化故得中外禔福遐邇乂安控蟠桃於滋穴之墟通細柳於炎洲之域楚鋒越刃俱鑠大農之冶俠客雄兒皆服鴻都之肆今若循其至理任彼無為則取夬之道有餘止戈之義不足況金方起暴玉河未靖偷安榆鬼之鄉竊險麻奴之地然而北幽嚮化巳事和親之禮而西璟負恩不習用師之備隨時之義寧可自然當土宇曠修人物繁富三門九地之祕豈謝前規白猿蒼兕之奇何慙曩烈或英謀冠代雄略過人總韓白以先驅掩孫吳而得雋或力能拔距勇絕蒙輪冒白刃其如歸搶蒼璧而不顧或迹隱鄽肆身託村閭行雖犯於流俗器乃堪於拯難或捷如迅電走若追風彎弧則七札洞開奔陳則重圍自潰並有思於制命俱未遇於時須可令文武內外官五品及七品巳上清官及外官刺史都督等於當管部內即令具舉且十室之邑忠信尚存三人同行我師猶在會須搜訪不得稱無薦若不虛自從襃異之典舉非其士豈漏貶責之科所司明為條例布告遠近知朕意焉鸞臺上之臨下道莫貴於求賢臣之事君功豈踰於進善所以允凝庶績式靜羣方成大厦之淩雲濟巨川之沃日故周稱多士著美風謠漢號得人垂芳竹素歷觀前代罔不由茲朕雖宵分輟寢日旰忘食勉思政術不憚劬勞而九域之至廣豈一人之獨化必佇材能共成羽翼雖復羣龍在位振鷺充庭仍恐屠釣或違薖軸尚隱未殫巖穴之美或委邱園之秀所以屢迥旌帛頻遣搜揚推薦之道相尋而虛佇之懷未愜永言於此寤寐以之宜令文武官五品以上各舉所知其有抱梁棟之才可以丹青神化蘊韜鈐之略可以振耀天威資道德之方可以獎訓風俗踐孝友之行可以勸率生靈抱儒素之業可以師範國冑蓄文藻之思可以方駕詞人守貞亮之節可以直言無隱履清白之操可以守職不渝凡此八科實該三道取人以器求才務適所司仍具為限程副朕意焉主者施行天無二稱帝是通名承前諸儒互生同異乃以五方之帝亦謂天假有經傳互文終是名實未當稱號不別尊卑相混自今郊祀之禮唯昊天上帝稱天自餘五帝皆稱帝老君化胡典誥攸著豈容僧輩妄請削除故知偏辭難以憑據當依對定僉議惟允儻若史籍無據俗官何忍虛承明知化胡是真作佛非謬道能方便設教佛本因道而生老釋既自元同道佛亦合齊重自今後僧入觀不禮拜天尊道士入寺不瞻仰佛像各勒還俗仍科違勅之罪品藻人物銓綜士流委之選曹責成斯在且人無求備用非一途理宜才地並昇輪轅兼採或收其履歷或取其學行糊名考判合格注官既乖委任之方頗異銓衡之術朕勵精思化仄席求賢必使草澤無遺方圓曲盡改弦易調革故鼎新載想緝熙之崇式佇清通之效其常選人自今巳後宜委所司依常例銓注其糊名入試及令學士考判宜停鸞臺崇德刑列辟之彞範并官省事有國之良圖聖人執契以乘時道苞乾大善政改絃而馭俗義叶鼎新朕虔荷先基恭臨下土運一心之淺慮憂四海之羣生馭朽載兢踐冰惟惕幸賴九元垂祐七廟宣靈天地以清風雨咸若菽粟登稔疆徼無虞茂祉日繁殊祥歲集答昊穹之睠命順億兆之誠祈蒼璧靈壇展嚴禋於上帝黃金祕牒追顯號於前王大典聿申鴻符允暢斯實祖宗之遐慶函夏之多福豈朕虛薄能臻此乎但萬歲初元肇開昌歷九章恒憲甫釋嚴科遠近無縲絏之冤老幼有歌謠之樂人皆遷善政在維新丹筆刑官巳絕埋梧之聽黃沙獄戶將為鞠草之場而法禁之曹寮寀斯衆司刑一局便有八丞既罕囚徒靜無推案豈煩多士虛習夏書宜減二員俾從他職文昌國府建禮天闈庶政是歸具寮攸仰諒青縑之美地非赭服之攸居雖復時有申讞頗須聽斷兩造之文必具五詞之理易窮詎假狴犴方甄枉直仙臺置獄甚為非宜今欲總撤踈羅寧可別施囹圄其秋官獄即宜除毀朕既深居祕宇不能遍覽帛丿糸區唯仗時賢共康天下州牧縣宰寄重親人僚守勾曹任惟綱紀百姓或有愆犯必須盡理推尋審知罪狀分明方可禁身科斷不得才聞小過遽縶圜扉高下其心同叔魚之鬻獄輕重其手爽定國之平刑黠吏崇奸恣其乾沒要囚多滯積以炎涼有一於此當加重譴幸悉心而慎罰同底績於勝殘佇宏勿辟之規用闡無為之化將使三千之罪永絕於當年豈惟數百之刑僅寬於昔代布告天下識朕意焉勅宜令三思與納言李嶠正諫大夫朱敬則司農少卿徐彥伯鳳閣舍人魏知古崔融司封郎中徐堅左史劉知幾直史館吳兢修唐史採四方之志成一家之言長懸楷則以貽勸誡解琬孝性淳厚言詞哀切固辭強奪之榮乞就終憂之典足以激揚風俗敦獎名教宜遂雅懷仍其祈請仍俟服闋後赴上維宏道元年歲次癸未十二月甲寅朔四日丁巳大行天皇崩於洛陽宮之貞觀殿殯於乾元殿之西階粵以文明元年五月壬午朔十五日景申發自瀍洛旋於鎬京以其年八月庚辰朔十一日庚寅將遷座於乾陵禮也曉霧收碧晨霞泛丹庭分羽衞肂啟龍攅哀子嗣皇帝輪攀訴容車崩號扆殿悲蜃輅之空嚴感鳳樽之虛薦擗摽糜潰充窮殞裂剡思攀而還迷羸喘興而復絕俯惟煢懇荼毒交侵瞻白雲而茹泣望蒼野而摧心愴遊冠之日遠哀墜劒之年深淚有變於湘竹恨方纏於穀林念茲孤幼哽咽荒襟腸與肝而共斷憂與痛而相尋顧慕丹楹迴環紫掖撫眇嗣而傷今想宸顏而慟昔寄柔情於素撫天聲於金石其詞曰月瑤誕慶雲邱降祥仙源漢遠聖緒天長繞樞飛電麗室騰光鳥庭開象龍德含章六藝生知四聰神授晦迹登序韜光齒冑綴玉詞條緝瓊文囿發揮綠錯牢籠紫宙鑑符敦敏量本䟽通賓門表譽納麓彰功始潛朱邸或躍青宮夏余欽德周誦傾風粵自銅闈虔膺寶命惠霑動植信洎翔泳淳化有敷至仁無競教溢璇㝢道光金鏡五龍開運六羽昇年西雲應呂南風散絃晷符羲日蔭廣堯天賁園旌士焚林藎賢濬明上格財成下濟問寢承親在原申悌戒盈茅宇蠲奢土砌衢室禋宗雲門饗帝以聖承聖資明嗣明禮崇殷夏樂盛咸英時和俗泰天平地成永同文軌長垂頌聲德動乾符威清地紀澄氛襚穴掃沴濛汜推轂六師坐知千里亭毒寰縣瑩鏡圖史霜㦸林聳月旗雲亘曡鼓蕭關鳴笳松嶝追涼水殿避暑山楹霞翻浪井樹響層城務通三神凝得一元池肆賞青邱佇逸訪道順風養真乘日拜牧襄野尊師石室寶獻河宗賮歸王會浮毳交影飛輪繫軑雲封薦款日觀申虔告成七廟歸功九天無事無為爰遊爰豫域延想汾川滌慮儀鳳巢阿飛麟在馭火林歸朔燭鄉移曙所冀元壽齊年紫皇祲興旅館災纏未央遽脫屣於宸極奄乘雲於帝鄉亘天維而落構匝日㝢而沈光殉百身而靡贖積萬古而徒傷魂銷志殞裂骨抽腸受玉几之遺顧託寶業於窮荒嗣君孝切諒闇居喪集大務於殘喘積衆憂於未亡所以割深哀而克勵力迷衿而自強嗚呼哀哉浹埏遏密帛丿糸區縞素恨鈞天之不歸瞻鼎湖以凝慕嗚呼哀哉攀聖滋遠戀德滋深訴昊穹而雨泗擗厚載而崩心泣人靈而灑悲霰晦宇宙而起愁陰嗚呼哀哉緹琯移序失明應律蛩竁方營龜謀獻吉背九洛而移馭傃八川而從蹕列璧羽之逶迤動鍾挽之蕭瑟顧園邑之蒼翠望巖之紆鬱喬陽之舄不追茂陵之書方出嗚呼哀哉跡圖懸圃神降長流去重陽之奕奕襲大夜之悠悠同霸塋之薄窆契紀廛而莫修思門山於夕月悲隴樹於新秋嗚呼哀哉想軒駕之攀龍思嵞山之戀鳳矧承眷於先房誓牽毀而哀送豈謂務切至綦事違深倥仍徇公而抑己遂奪情以從衆悲千罔極之悲痛萬終天之痛嗚呼哀哉恭惟聖烈實鏤微衷敬因彤管載撰元功業彌遙而道彌著時益遠而聲益隆播二儀而不極橫四海而焉窮嗚呼哀哉鸞臺朕聞上皇建極體元氣以育羣生大聖承天法開陽而陶庶類與時舒卷叶三正而推移隨道汚隆應五鈐以通變故能牢籠宇宙埏埴人靈符景運而財成契休期以光宅昔有隋標季率土淪胥豺狼肆吞噬之災億兆被虔劉之酷高祖神堯皇帝披圖汾水仗鉞參墟廓氛祲而安四維掃欃槍而清六合太宗文武聖皇帝負日月而膺運鼓雷霆以震威蕩海夷山功浹八荒之外救災拯溺仁霑萬域之表樂和禮洽天平地成茂績光於遂初鴻名冠於開闢高宗天皇大帝雲房誕睿虹渚降靈受綠錯之禎符應朱綈之景命飛車乘毳臣軒頊之不臣沒羽浮金服禹湯之未服所以開邊服遠更闡㝢於先基富貴寧人重增輝於前烈撫璇當宁調五氣於明堂考瑞升中朝百神於日觀茫茫衆俗寧知覆燾之恩蠢蠢庶氓孰辨陶甄之力固巳千年啟旦三聖重光歷選前書無聞往載豈謂道隆金鏡運迫鼎湖方延翠渚之祥遽託白雲之駕以社稷之大任屬荒眇之微躬欽奉遺言載深悲懼遂以茲菲德開導嗣王式綜萬幾載宣風化所賴王公卿士各竭乃誠若濟巨川實資舟檝然自恭臨朝序巳積炎涼教靡致於易風道尚慚於變俗良以哀迷在疚荼棘纏心陵廟未安匪遑專慮今者鳳京遙踐龍馭上升既因大禮之終宜更中區之始朕居臨赤縣求瘼之志每盈子育蒼生恤隱之懷鎮切惟欲勵精為政克巳化人使宗社固北辰之安區㝢致南風之泰以斯酬眷命用此報先恩冀上不負於尊靈下微申於至懇夫五行遞用列代相承欲崇其德先遵所尚故夏以金運乘驪而尚元周以火行貴騂而尚赤將隆母德必欲子扶近者地不藏珍山無祕寶皇家土德勝氣彌彰宜從白賁之象以輔黃中之運自今以後旗幟皆從金色仍飾之以紫畫以雜文其應合改者所司詳依典故供奉帷幙咸用紫色自錄府衞所旗並改以皁八品巳下舊服青者並改以碧其在京諸司文武職事五品巳上清官并六品七品清官並每日入朝之時常服袴褶諸州縣長官在公衙亦準此自餘官朔望朝參皆依舊其色皆依本品又鎮星之在太微巳歷年載著土精之美應表坤祚之元符宜同感帝以時薦享又東都改為神都宮名太初宮但列署分司各因時而立號建官置職咸適事以標名而今曹僚之中稱謂多爽宜改尚書省為文昌臺左僕射為文昌左相右僕射為文昌右相吏部尚書為天官尚書戶部尚書為地官尚書禮部尚書為春官尚書兵部尚書為夏官尚書刑部尚書為秋官尚書工部尚書為冬官尚書門下省改為鸞臺中書省改為鳳閣侍中改為納言中書令改為內史太常寺改為司禮寺鴻臚寺改為司賓寺宗正寺改為司屬寺光祿寺改為司膳寺太府寺改為司府寺太僕寺改為司僕寺衞尉寺改為司衞寺大理寺改為司刑寺農寺依舊左右衞亦依舊左右驍衞為左右武衞左右武衞為左右鷹揚衞左右威衞為左右豹韜衞左右領軍衞為左右玉鈐衞左右金吾衞依舊其餘曹司及官僚名未改者所司速制名奏聞又司隷之官監郡之職所以巡省風俗刺舉愆違今人物殷煩區宇遐曠而所在州縣未能澄肅可制右肅政御史臺一司其職員一準御史臺專知諸州按察其舊御史臺改左肅政御史臺專知在京有司及監諸軍旅并出使其諸州縣事參軍宜依舊令在京五品巳上清官每日章善顯福等門各一人待詔朕當親訪政道詳求得失又元元者皇室之源韞道德而無為冠靈仙而不測業光衆妙仁覃庶品豈使寶允見御宸居先母竟無尊位可上尊號曰先天太后宜於老君廟所敬立尊像以申誠薦又洛州界內所有帝王之陵及自古清直之臣忠廉之佐並令州縣就其塋域一申致享又自武德以來元勳佐命或以忠鯁事主或以道德匡君非身在有犯緣子孫絕封者前詔雖巳處分或恐仍有闕遺宜降霈澤重申前命又往日先朝聖武蕩定遐方日月照臨咸為郡縣皆荷生成之惠無復遠近之殊朕矜撫之懷豈隔中外每念其後嗣愍愴良深繼絕興亡實為本志各宜求其後允立之以承享獻其諸都護漢官及鎮兵等並悉放還其營奉山陵使及鹵簿使等並依別勅處分又兩京之所徭賦實繁亦令所司作優量法使勞逸得所靈駕所涉千里斯遞在路黎甿莫不哀奉念其勞弊情增感惻其緣供頓及山陵者並免今年課稅又比來諸道軍行敘勳多濫或端居不出以貨買勳真偽相蒙深為巨蠹自今以後所司宜明具條例務令禁斷責成斯在可不勉歟如更有違必越法科處分又比命放出宮女巳降詔書然以在內多時咸悉願住但念其各有親屬豈可久致分離宜準前恩即令放出又隆平日久戶口滋多物務既煩欺隱斯衆其上州三萬戶巳上大縣萬戶巳上各宜析出別置州縣惟雍洛二州不在此限又濟時之道求賢是務其官人及百姓等或器標瑚璉材堪棟幹或在職清慎或抱德幽棲或武藝馳聲或文藻流譽宜令京官九品巳上諸州長官各舉一人咸以名薦務取得賢之實無貽濫吹之譏又前者有詔具述內外官寮備陳行事以申勸沮但恐百官在職尚有虧違今欲重降深恩更垂寬宥棄瑕錄用罔責於前非滌罪論功必期於後善若又不悛己過重掛踈羅當使置以嚴刑倍加其罰思與士庶共此維新可大赦天下改文明元年為光宅元年自九月五日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正見繫囚徒皆赦除之流人未達前所者放還其犯十惡官人枉法受財監臨主守自盜所監臨劫賊殺人故殺人謀殺人反逆緣坐并軍將臨戎挫威喪律鎮遏失所虧損師徒及常赦所不免者並不在赦內亡官失爵量加收敘諸年八十巳上各賜粟二石綿帛二段九十巳上賜粟三石綿帛三段百歲巳上賜粟五石綿帛五段並依舊例版授孝子順孫義夫節婦咸表門閭鰥寡惸獨篤疾之徒不能自存者並加賑恤亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之布告天下咸使聞知其詔書內事有未盡者仍令所司作條例處分朕聞元皇纂歷則天地以裁規大聖握圖法陰陽以施化故能牢籠品類陶鑄生靈敷景運於休期闡宏基於光宅昔有隋失馭率土分裂赤縣為禾黍之場蒼生遇塗炭之酷我高祖神堯皇帝龍興汾晉鳳起寰區除梟獍而安八荒翦鯨鯢而清四海太宗文武聖皇帝膺昊穹之歷數鼓雷電之雄威服遠冠巢燧之前開邊越羲農之際鴻名邁於三五茂績隆於往初高宗天皇大帝稟雷澤之禎符降天縱之神器湛恩所被匝乾坤覆載之鄉至化所覃盡舟車所通之境撫璇丹極輯瑞蒼巖天平地成淳風啟千年之運樂和禮備寶祚隆三聖之基逖聽王猷熙開帝載朕以虛薄虔奉睿圖夙懷兢業不遑暇食幸穹昊貽佑宗社延祥河薦合天之符洛出永昌之籙時和歲稔遠肅邇安斯皆先德所延屢彰嘉貺自恭臨億兆巳積炎涼尚想希風未臻於至道顧循菲德媿切於深衷思宏顧託之恩再闡混元之始夫以元穹列象三辰所以麗天厚載含章五行於焉紀地易曰三五以變錯綜其數通其變遂成天下之文極其數遂定天下之象火水相變其卦為革彖曰天地革而四時成言五德更相生變革萬象故帝者改政施教明受之於天不定之於人者也仲尼曰其或繼周者雖百代可知蓋以文質相因法度相改故矣是以伏羲高陽有周皆以建子之月為正神農少昊陶唐有殷皆以建丑之月為正軒轅高辛夏后漢氏皆以建寅之月為正後雖百代可知者以此雖遭遇不同步驟殊致未有不表明軌物以章靈命之符者也我國家創業嘗有意改正朔矣所未改者蓋有由焉高祖草創百度因循隋氏太宗緯地經天日不暇給高宗嗣歷將宏丕訓改作之事屢發聖謨言猶在耳永懷無及自五帝纉統三王馭宇或父子相承同體異德或金木迭改應天順人故納麓登庸粵受終於文祖干戈革命必理歷於明時然則開元配永肇自陽來之旦統歷履端基於朔易之首孳萌發內氣律由中品物任而昭蘇生類蕩而敷革是知夏之人統不逮殷之地正殷之地正有殊周之天統元命所苞實在茲矣周公稽古制禮於成王之日漢高握德改元於武皇之代則知文物大備未遑於上業損益之道諒屬於中平朕所以式遵禮經奉成先志今推三統之次國家得天統當以建子月為正考之羣藝厥義昭矣宜以永昌元年十有一月為載初元年正月十有二月改臘月來年正月改為一月自載初元年正月一日子時巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正見繫囚徒皆赦除之其叛逆緣坐及子孫殺祖父母父母部曲容姦奴婢殺主不在赦限其與敬業虺沖并諸虺友往還其魁首巳伏誅其支黨事未發者特從原免不得更相告言內外見任文武九品巳上職事官並賜爵一級天下百歲巳上老人版授下州刺史米粟五石帛十段九十巳上版授上州司馬米粟四石帛七段八十巳上版授縣令逋懸調并丁夫雜匠衞士及有番第等違番及逃走應陪番及徵課調者並特宜免放其欠負官物及盜詐三庫物並不在赦限鰥寡孤獨篤疾等不能存立者量加賑恤孝子順孫義夫節婦旌表門閭終身勿事天下百姓年二十一身為戶頭者各賜爵一級女子百戶賜以牛酒明堂役工人未被恩者付所司即類例定等級奏聞十五日內使了緣供明堂致死人其有未霑勳賜者亦宜準例酬給今年麥不熟處及遭霜澇之處並量放庸課州縣好加檢校勿使饑饉及新平軍差科百姓稍有辛苦宜亦量加優恤蠲其徭役所司類例處分供象州軍百姓艱辛處未得復者宜給復一年洛州輦轂徭役繁多代朔并忻等州行軍及諸州供明堂木及銅處所司各類例節級給復皇親諸陪位未出身者量材處分巳出身者賜勳一轉富商大賈衣服過制喪葬奢侈損廢生業州縣相知捉搦兩京兼委金吾檢校天下百姓皆須嫁娶以時勿使外有曠夫內有寡女戰亡人格外贈勳兩轉迴授朞親其子孤惸者州縣給糧安養征鎮人家口州縣存恤勸課殷有之家助其營種勿使外人侵欺仍令所司刊正禮樂刪定律令格式不便於時者內外官五品巳上各舉所知九經文字集學士詳正革其訛舛亡官失爵量加敘錄長流人別勅流人移貫人降授官人及後緣逆人用當及造罪過特處分者雖未至前所並不在赦限西府功臣及晉府子孫屈滯者量加收敘所司奏聞亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之率土之內賜酺三日赦書日行五百里朕又聞之人必有名者所以吐情自紀尊事天人是故以甲以乙成湯為子孫之制有類有象申繻明德義之由朕今懷柔百神對揚上帝三靈眷祐萬國來庭宜膺正名之典式敷行政之方朕宜以曌為名自卦演龍圖文開鳥跡萬人以察百工以乂所以宏敷政道宣明禮樂指事會意改易異塗轉注象形屈伸殊制周宣博雅史籀興古篆之文尼父溫良邱明述春秋之傳自諸侯力爭姬室寖微離為二周分成七國律法異令田疇異畝言語異聲衣冠異制秦兼天下剗滅古文隷卒屢興兵車歲動官獄繁騖爰創隷書自著秦文肇興八體刻符兼於大篆摹印逮於殳書兩漢因之九千餘字張敞杜鄴講學於前揚雄甄豐校理於後魏晉以降代乏名儒穿鑿多門形聲轉繆結造新字附會其情古今訛舛稍益繁布畫規無端平之體魚鳥增奔放之容轉相倣效日滋日甚遂使後生學徒罔知所據先王載籍從此湮沈言念澆漓情深憫悼思返上皇之化佇移季葉之風但習俗多時良難頓改特創制一十二字率先百辟上有依於古體下有改於新文庶保可久之基方表還淳之意昔在包犧開木德之運軒轅應土行之序循環終始布在方策莫不績著帝猷功宣皇道方列三微之統乃膺五行之歷雖則盛比共工強踰嬴政齊桓晉文之業大彭豕韋之美纔為霸者豈登帝籙自炎精蕩覆王風哀思漢氏蒙塵中原離析當塗逆取但肆兵威典午專權無聞德化故三國鼎峙五胡幅裂或道乖嗣德或業匪孫謀良由取之不以樂推失之在乎虐用者也及齊梁竊據僻在江淮周魏勃興奄宅咸洛雖變夷從夏號令惟行於境內而智小謀大聲教不通於天下隋之御極陳氏猶存開皇之中纔聞混一嗣主失道俄至分崩七八年閒生人泯絕秦項之酷猶未之半開闢巳來蓋未之有我國家祖宗積德文武重光仁風被於四表英猷冠於三代易不云乎天地之道恒久而不易者也仲尼曰善人為邦百年可以勝殘去殺則知聖王久於其道而天下化成矣自魏至隋年將四百稱皇僭帝數十餘家莫不廢王道而立私權先詐力而後仁義勳未踰於列國德不慚於霸圖雖復時合諸侯一匡區域晉武踐祚茂烈多慚於水官隋帝乘時雄圖不逮於秦氏惟彼二君閏位況區區者豈宜當三統之數者乎朕逖聽皇綱幽求帝典定王霸之真偽洗生人之耳目庶叶三推之美光宣五帝之次況當布政景化維新太初開歷上元伊始宜以發揮大寶申明歷數恢皇家正土之符繼炎劉真火之序摛之罔極垂之無窮以周漢之後為二王仍封舜禹成湯之裔為三恪所司求其苗裔即加封建其周隋宜同列國其嗣使主祭焉布告遐邇咸知朕意主者施行
