body:
  text: 寡人出自軍戎本無德望因緣際會叨竊寵靈高祖皇帝甫在經綸待之心腹洎登大位尋付重權當顧命之時受忍死之寄與諸勳舊輔立嗣君旋屬三叛連衡四郊多壘謬膺朝旨委以專征兼守重藩俾當勍敵敢不橫身勠力竭節盡心冀肅靜於疆場用保安於宗社不謂奸邪搆亂將相連誅偶脫鋒鋩克平患難志安劉氏願報漢恩推擇長君以紹丕構遂奏太后請立徐州相公奉迎巳在於道途行李未及於都輦尋以北面事急寇騎深侵遂領師徒徑往掩襲行次近鎮巳渡洪河十二月二十日將登澶州軍情忽變旌旗倒指喊叫連天引袂牽襟迫請為主環繞而逃避無所紛紜而逼脅愈堅頃刻之閒安危莫保事不獲巳須至徇從於是馬步諸軍擁至京闕今奉太后誥旨以時運艱危機務難曠俾令監國遜避無由僶俛遵承夙夜憂愧禮云利祿先死者而後生者則民不悖先亡者而後存者則民可以託聖人垂訓與我同心因嗟既歿之賢俾舉追崇之典晉故中書令趙瑩行高言善性達心平鼎號函牛斯為重器劒稱斬馬可謂靈鋒遺清白於子孫行忠信於蠻貊斷魂外境歸骨中華於是衋傷載深軫悼俾贈三師之秩以伸一去之悲可贈太傅義之深無先於作配禮之重莫大於追崇朕當宁載思撫存懷舊河洲令德猶傳荇菜之詩媯汭大名不及珩璜之貴俾盛副筓之禮以申求劒之情故夫人柴氏代籍貽芳湘靈集慶體柔儀而陳闕翟芬若椒蘭持貞操以選中璫譽光圖史懿範尚留於閨閫昌言有助於箴規深惟望氣之艱彌歎藏舟之速將開寶祚俄謝璧臺宜正號於軒宮俾耀潛於坤象可追命為皇后仍令所司定諡備禮冊命敦敘九族糺綏六親生者錫其寵臨歿者優其追贈哲王茂典歷代芳規故南陽郡韓氏婉淑居貞賢明垂範奉嬪率禮興家道於仁孝之基諸母推恩撫朕躬於幼沖之歲朝露溘先而奚速慶雲華蔭以彌高宜洽明恩追崇大國式是載揚之美寧攄欲報之情庶俾後昆永覃清懿噫嘻貞魄享此儀章可追封楚國太夫人頃以野雞蕃族蟊賊邊陲俾爾率領兵師於彼進討殺牛族熟戶素不陸梁而無故侵騷致其鬬敵彼戎既然殺戮去者寧不夷傷俾將士罹殃職爾之罪授之散秩猶為寬恩爾當再三深自咎責可行左司禦率府副率朕昔在側微罔親斆學但明軍旅之事安知王化之基而天命眷求神器自至涉道斯淺何德以堪爰念得之惟艱未若守之不易況承敝之後致理尤難蒼生未得息肩賢者尚多鉗口必欲使下情上達上情下通聞所未聞見所未見莫若開其言路詢於廷臣冀時政之得失必論君道之否臧必告自然昏蒙漸滌聽覽有資致於日新其在封事如聞累朝舊制咸令轉對上書百辟相循五日為準然或權臣惜短時主多猜不敢深切為言恐以傷觸獲戾至有搜羅鄙事蔓延虛辭徒牽率以為勞於裨補而何取朕猥惟涼德肇啟丕圖矻矻覽於萬機未能廣其庶績兢兢念於百姓何以致之小康寅畏以居思慮為疾實賴黎獻誨以讜言一則究邦國之規模一則觀卿士之才器且採縉紳之議不亦愈於芻蕘之詞詢賢哲之謀不亦愈於工瞽之諫應在朝文武百寮凡有所見益國利民之事並可實封而奏請閤門進納即不可尚習餘風更循舊轍無益於理者勿說不濟於時者勿書縱使指朕之非攻朕之短自當改過不吝豈但從諫如流如或武班中有出自戰功不親儒墨苟有殊見安得惜言固可假手直書豈在屬文麗藻至於藩侯郡牧當切務於安時蠹於政者必知利於民者必曉但關宏益悉可敷聞朕今諭此至懷固非掠其虛美志在得畫一之道成可久之規濟濟英翹無辭貢直事有短者不責理有長者必行但存輔翼之心勿以逆鱗為懼咸在中外宜副朕心朕以眇末之身託王公之上深懼弗類撫躬靡遑豈可化未及人而過自奉養道未方古而不知節量與其耗費以勞人曷若儉約而克巳昨者所頒赦令巳述至懷宮闈服御之所須悉從減損珍巧纖奇之厥貢並使寢停尚有未該再宜條舉應天下州縣舊貢滋味食饌之物所宜除減其兩浙進細酒海味薑瓜湖南枕子茶乳糖白沙糖橄欖子鎮州高公米水棃易定栗子河東白杜棃米粉菉豆粉玉屑籸子麥丏永興玉田紅花秔米新大麥麥丏興平蘇小栗子華州麝香羚羊角熊膽獺肝朱柿熊白河中樹紅棗五味子輕餳同州石餅晉絳葡萄黃消棃陜府鳳棲棃襄州紫薑新筍橘子安州折粳米糟味青州水棃河陽諸雜菓子許州御李子鄭州新筍鵞棃懷州寒食杏仁申州蘘荷亳州萆薢沿淮州郡淮白魚如聞此等之物雖皆出於土產亦有取於民家未免勞煩率多糜費至時奔迫以來獻逐歲收斂以為常所奉止於朕躬所損被於甿庶加之力役負荷馳驅道途積於有司之中甚為無用之物此而不止孰曰知微其常貢上件物色今後並不許進奉諸州府更有舊例所進食味其未該者宜奏取進止此外猶有數處時新之物不敢全罷蓋或奉於太后薦於祖宗苟至悉除恐隳常敬告於中外宜副朕心朕昨迫於軍情遂臨帝位巳曾示諭想備聞知汝等初得耗音爭無疑懼一則顧身擐甲閉關須至如是今覽汝等報姚武文字備悉心誠況汝等始則為使主竭忠終則向朝廷順命秉持甚善節義可嘉佇俟旌襃何煩憂懼近者巳有勅旨汝等並授郡符只候新節度使入州即便施行恩命朕當示信於天下汝宜諭旨於城中凡在軍民各宜安堵其諸元從職員並宜安撫昨以鞏廷美楊溫等妄抱憂疑輒敢違拒累令招諭未體誠懷須至加兵以安民衆切慮破城之後玉石難分卿可告諭諸軍勿令殺人放火但誅惡黨宜捨脅從眷惟許國之心當體好生之意凶狂烏合來犯軍城醜類蜂屯罔識天命汝誓平國蠧固彼人心率驍銳以前衝履鋒鋩而直進機籌神助部伍風生偽將活擒殘妖碎首心堅鐵石城固金湯蛇豕既殲梯衝並爇孽䜿偷生而遁迹雄師賈勇以追奔言念忠貞敻無倫比嘉賞愧歎再三不忘故蘇逢吉劉銖頃在漢朝與朕同事朕自平禍亂不念仇讎尋示優宏與全家屬尚以幼稚無託衣食是艱將行矜卹之恩俾獲生存之路報怨以德非我負人賜逢吉骨肉洛京莊宅各一賜劉銖骨肉陜州莊宅各一安審琦奏湖南船綱行監押節級官健四百九人在襄州朕以武陵長沙尋戈結釁既道塗而梗澀致官健以淹留卿義在卹鄰志惟體國俾歸途而無滯副軫念以在茲已降宣命下襄州取逐人便穩如願歸本道者即差人管押至荊南候到卿可差人部送至湖南卿摧敵有方執俘甚衆據茲惡黨固有常刑但念彼之賊軍悉是朕之赤子遭罹凶暴迫脅征行以至就擒良亦可憫察其情狀爭忍加誅配於邊遐亦所不欲其賊軍並以釋罪各與衫袴巾履遣供奉官張諲管押至河東界首放歸本家諒卿明敏當體朕懷逆首楊溫及親近徒黨並處斬其餘無名目人及本城軍都將校職掌吏民等雖被脅從本非同惡並釋放兼知自前楊溫招喚草賊同力守把朕以村墅小民偶被扇誘念其庸賤特與舍容其招入城草賊並放歸農仍倍加安撫湘陰公夫人並骨肉在彼仰差人安撫守護勿令驚恐淮南雖是殊邦未通中國近聞歉食深所軫懷天災流行分野代有苟或閉糴是豈愛人彼之生靈與此何異宜申惻隱用濟餱糧宜令沿淮州縣渡口鎮鋪不得止淮南人糴易卿作鎮王畿留心政道雖米鹽細務不懈於躬親而會斂無名盡思於蠲放能惠窮困深協眷懷巳降宣命指揮使並放為散戶朕以君臣之道則外有朝廷之儀骨肉之親則內有少長之敬且朕與卿當夙昔之共事實敦敘於周親安可此時使渝曩分卿執恭為行瀝懇上章雖謙謙之道可嘉而親親之義難替家人之禮朕當必行朕生長軍戎勤勞南北雖用心於鈐匱且無暇於詩書世務時艱粗經閱歷前言往行未甚討尋卿有佐命立國之勳居代天調鼎之任恒慮眇德未及古人於是采掇箴規弻諧寡昧披文閱理懌意怡神究為君治國之源審修巳御人之要帝王之道盡在於茲辭翰俱高珠寶何貴再三省覽深用愧嘉其所進圖巳令於行坐處張懸所冀出入看讀用為鑒戒朕與卿久敘兄弟比無嫌隙自前歲奔逃之後尋時慰納如初察憂疑則推以赤心邀信誓則指之白日留男不歸大職欲巳只在舊藩動必依從斷無疑阻何故執心不定率意而行聚草寇於城中修戰具於衙內發言不遜舉事無常差遣元隨主持鎮務恣令殘害任便誅求率配之名三四十件搶拾事力贍養奸凶一境生靈不勝其苦南則結連淮寇北則勾喚劉崇早者差都押牙鄭麟口奏敷陳乞移藩閫朕推心嘉納回詔允俞昨上表請赴闕廷朕亦一從卿意復成欺侮翻有指名兼更偽詐鄆州書題點染齊王勳德且非奇計何必如斯近者東面諸侯相繼奏報稱卿差點管內人戶團併義營欲議發軍攻取鄰道衆情不服闔境波逃其百姓皆併力同心殺却元隨鎮將例各將家迴避散投外界潛藏或則保聚山林就便構置寨枬懼卿挾讐屠害不保朝昏懸望官軍救護為主朕為人父母能不痛心弔伐之行蓋不獲巳今差侍衞步軍都指揮使曹英等部領馬步大軍問卿情狀卿若能改心知過束身歸朝當許全生待之如舊朕或違信是謂自欺卿若拒張便令攻取今更飛此詔始末指陳冀卿靜慮深思庶幾轉禍為福言盡於此卿其圖之赦書節文明有釐革切慮邊城遠郡未得審詳宜更申明免至差誤其盜賊若是強盜並準自來格條斷遣其犯竊盜者計贓絹滿三匹巳上者並集衆決殺其絹以本處上估價為定不滿三匹者等第決斷應有夫婦人被強姦者男子決殺婦人不坐其犯和姦者並準律科斷罪不至死其餘姦私罪犯準格律處分應諸色罪人除謀反大逆外其餘並不得誅殺骨肉籍沒家產卿方秉國鈞實藉維持之效復兼邦計最為繁劇之司稍失區分便成壅滯雖近有傷損未復痊平宜彊扶持且就臨涖無妨臥理仍放朝參勉卿忍苦之誠副我仰成之意古者立封樹之制定喪葬之期著在典經是為名教洎乎世俗衰薄風化陵遲親歿而多闕送終身後而便為無主或羈束於仕宦或拘忌於陰陽旅櫬不歸遺骸何託但以先王垂訓孝子因心非以厚葬為賢只以稱家為禮掃地而祭尚可以告虔負土成墳所貴乎盡力宜頒條令用警因循庶使九原絕抱恨之魂千古無不歸之骨應內外職官及選人等今後有父母祖父母亡歿未經遷葬其主家之長不得輒求仕進所由司亦不得申舉解送如是卑幼在下者不在此限其合赴舉選者或是葬事禮畢或是卑幼在下勒於所納家狀內具言不得罔冒宜令御史臺及逐處長吏本司長官所由司覺察申舉其中有兵戈阻滯或是朝廷特恩除拜起復追徵及內外管軍職員皆以金革從事並不拘此例眇覿前王德之盛者或弦弧剡矢去天下之暴或手胼足胝服四載之勤德普施於民而民不知其力蓋為而不有建之若偷巍巍聖功曾無稱號苟異於是孰不近名朕歷數在躬艱難承統莫識三皇之道徒知萬乘之尊至於翼翼小心孜孜庶政推誠待物損巳益人上帝佑予於茲三祀日慎一日無德可稱夫五禮交修四時不忒振頹綱於會府致函夏之小康斯乃公輔庶臣舉職之明效也七德訓戎四鄙不聳執干戈而衞社撫封域以安民此又勳臣將校為時而宣力也至若蟲螟消殄風雨不愆歲被豐登民躋富壽茲乃乾坤育物宗社貽庥敢貪天功以為巳力而公卿叶議中外同詞詣闕拜章贈予美號雖為臣之義將順則然諒愛君之心殊不在此朕顧寡薄非所宜當即斷來章無至固執所請宜不允卿卓立功勳明彰臣節復馬氏所亡之地安楚人仍舊之邦一境土疆方資節制大朝藩屏殊切倚毗凡於錫賜之恩皆奬削平之效惟卿敏達知朕睠懷今賜卿舊屬湖南在京及諸處莊宅樓店邸務舍屋等宜令三京及諸道州府委長吏指揮管內人戶勉勤耕稼廣闢田疇勿使蒿萊有廢膏腴之地務添桑棗用資種養之方仍令常切撫綏不得輒加科役所貴野無曠土廬有環桑致穀帛以豐盈遂蒸黎之蘇息青白池務素有定規祗自近年頗乖循守比來青鹽一石抽稅錢八百文足陌鹽一斗白鹽一石抽稅錢五百文鹽五升其後青鹽一石抽錢一千鹽一斗訪聞改法巳來不便商販蕃人漢戶求利艱難宜與優饒庶令存濟今後每青鹽一石依舊抽稅錢八百文以八十五為陌鹽一斗白鹽一石抽稅五百鹽五升此外更不得別有邀求蕃人入界本州務及諸巡鎮倍加安撫不得侵欺如蕃人將羊馬貨價須平和交易不得縱任牙人通同脫略故為抑淩訪聞邊上鎮鋪於蕃漢戶人市易糶餘衷私抽稅今後一切止絕如違必加深罪各令知悉朕以敷政之勤惟刑是重既未能化人於無罪則不可為上而失刑況時當長嬴事貴清適念囹圄之閉固復桎梏之拘縻處於炎蒸何異焚灼在州及所屬刑獄見繫罪人卿可躬親錄問省略區分於入務不行者令俟務開繫有理須伸者速期疏決俾皆平允無至滯淹又以獄吏逞任情之姦囚人被非法之苦宜令加察勿縱侵欺當令淨掃獄房洗刷枷匣知其饑渴供與水漿有病者聽骨肉看承無主者遣醫工救療勿令非理致斃以至和氣有傷卿忠幹分憂仁明涖事必能奉詔體我用心睠委於茲興寐無巳餘從勅命處分朕以史懿自鎮邊蕃克勤王事眷言勳舊深副倚毗爰自近年多嬰疾苦邇來頻有發動乞赴闕尋醫既覽奏陳須議俞允巳差客省使楊廷章往彼知軍州事即令史懿發來京師朕念涇州久夾疑瘡痍之地軍人百姓撫愛皆同今巳指揮楊廷章到日凡事倍加撫安不得輒有科率俾令衆庶皆遂蘇舒卿向以母親高年久嬰疾恙解職歸止徇意承顏始於疾辭今聞疾愈臻此康寧之福由其感應之誠苟徵命以猶稽則才能而虛滯復乃職位式佇論思載覽表章尚形眷戀諭以前詔俾之侍行子道既以光揚君恩亦須承順速宜祗赴無或再三
