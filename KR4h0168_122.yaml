front:
  text: 全唐文欽定全唐文卷一百二十二帝姓郭氏諱威字文仲邢州堯山人唐天祐元年生歷事後唐晉漢漢乾祐三年授鄴都留守兼樞密使監國廣順元年正月受漢太后冊即皇帝位顯德元年加尊號聖明文武仁德皇帝在位四年年五十一諡曰聖神恭肅文武孝皇帝廟號太祖
  hash: sha256:89577e3f66fcaa744b2cd7175044e3219372fc8e652261bafa72132a5f07950f
  markers:
