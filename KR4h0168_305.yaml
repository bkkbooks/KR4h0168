front:
  text: 全唐文欽定全唐文卷三百五安貞初名楚璧信安龍邱人應制舉一歲三擢甲科開元中為中書舍人集賢院學士纍遷中書侍郎封東海縣子天寶初卒
  hash: sha256:3a7def10f6bd265a06e7a25eb636f812c693f7e990f6c126c77ce86f2f32a5f7
  markers:
  - {type: head, offset: 12, content: 徐安貞, id: KR4h0168_NFKB_305-h1, level: 1}
body:
  text: 惟大君之執象襲先帝之重元體至精而御物用明德而動天自乘春兮當暑洎三時而不雨何陰陽而併隔瞻雲漢以延佇而雍州之積高乃神明之舊府君告有司無作淫祠圖應龍兮何召望愚婦兮何期禦伏之六沴唯蕩蕩之上帝信天道之悠哉固人事之所制爾其圜壇方墠環以禁林拂瑤席兮列神座藉白茅兮推聖心却華蓋而特立當赫曦之正臨幽應如響明徵在今油然作雲鬱山川之氣淒兮為雨變天地之陰乘空離合烟霏霧雜散影微微清神不稀無雷電之相迫但蕭條而自飛回颯灑於天聽襲清涼於御衣如泰嶽之朝下似陽臺之暮歸林籞增飾城池共色八水青田千門紫極洗原隰於龍鱗拂甍標於鳳翼伊萬物之同潤況油油之黍稷匝寰海而為期指咸霖而一息吾君乃升玉堂闢金殿既滌炎暑是開清宴聽金石之克諧知神人之合忭濟濟三事稽首而言效靈夔之鼓舞聯振鷺而飛翻欣復夏王之膳無邀漢后之恩微臣束紳國史秉筆階戺仰宸儀之法度聞天韻之宮徵大舜之慶雲已發武帝之秋風莫比欽豐歲之餘裕賾先天之至理陋星斗之占冠靈臺之紀猶誡奢靡之事信明明天子鸞臺鳳池清切鸞渚便蕃出納兩闈允資一德中散大夫守天官侍郎韋嗣立當朝人傑奕代相門道周性全才高識遠誠以待物寬而容衆往司綸翰五字見推洎處提衡九流式序懷宗廟之掌有社禝之能宜竭忠賢翊宣政化可守鳳閣侍郎同鳳閣鸞臺平章事散官如故主者施行敕風雲之感必生王佐廊廟之任爰在柱臣中大夫守京兆尹護軍借紫金魚袋裴耀卿含元精之休體度宏遠正議大夫前檢校中書侍郎集賢院學士仍副知院事上柱國賜紫金魚袋曲江縣開國男張九齡挺生人之秀器識通明並風望素高人倫是仰可以叶彼寅亮當茲啓沃幹時待士既資鼎實之和為國急賢寧惟金革之事耀卿可黃門侍郎同中書門下平章事宏文館學士散官勳如故張九齡可起復中書侍郎同中書門下平章事兼修國史餘如故主者施行門下朝散大夫使持節鄭州諸軍事守鄭州刺史上柱國席豫等早升清近備經推擇或政成大郡或績佇中朝可以秉於樞轄正之僕御副於內府亞以尹京各恭乃職允茲休命可依前件敕朝議郎行監察御史王翼五從弟朝請郎行監察御史級等咸以貞固爰司察視驟聞舉直亦既懲姦歲月增深升遷有序並可殿中侍御史大君有位北辰列象庶官分職南正司天和玉燭而調四時制銅儀而稽六合是則官修其業物有其方彼何人斯而言歷數假使道高王朔學富唐都徒取衒於人間故無聞於代掌多識前載方期為已役成稱賤寧是潤身眷彼司存行聞糾慝語其察變應援石氏之經會以吉凶合引班生之志誡其偏習宜肅正刑欽若古訓奉遵遺典禮崇繼體政重承邦苟冢嫡之或遺諒昭穆之無取眷言於甲誠乎擇嗣殊無忌之不才讓德於韓宣異延陵之守節歸義於諸樊既而龜其知乎類石祁之合兆神所命也同楚平之當璧且德均則卜罕見前非年均擇賢曾無昔譴先乎幼者誠合通規人或非之孰云其可嚴虛草澤賢才蒲輪辟命玉臺對命既則登科仙署縻爵誠宜利用抑同選調詎曰非常坐見淪塞行招往訴然則晦其跡也事等鑿坯行其道焉何論負鼎諒出處之有異豈名實之相乖義在優賢理無貶第興言舉主誠則知人賞先茅之地非無故實奪閒田之祿未之前聞循彼功曹以為直筆師姓褚氏名覽兄無量舒公也為開元侍講歸觀鄉國太夫人年迫期頤法師昆季晨昏之地說法而已銘曰法遠乎哉興或共住得自先覺亦曰句文不在茲教有真傳宏是像法能詣實趣伊人謂何聞道則多如海廣大如山峩峩心猿既伏隙駟云過惟徒是頌焉知其他聞之經國濟理長物生人者則必委成郡邑而擇其良吏然守文則溺於牽俗更法則弊於專任寬恕則失於容奸強毅則陷於傷善建用皇極難乎其人若夫剛不為虐簡而能斷布政優優化人成俗者見於田易州焉公名琬字正勤其先敬仲適齊因陳為族周齊聲近遂氏於田五代其昌罷秦人之西帝七雄方鬬朝泗上之諸侯自國滅淄上族遷關右武安以戚屬為丞相司農以建議封陽城吾能言之公其後也不殄厥問幽而復光曾祖君紓隋甘州刺史祖越西州長史父思成州同谷尉名雖必聞官不求達纍濟純嘏克生忠良公應天景星含道元氣和五味以正性備百行以資身況言談者仁之文孝悌者德之本取與者事之會恬淡者道之符弱冠遊太學尋師授韓詩曲禮以為小雅傷於怨刺大戴失於奢侈功業宜先於濟理章句非急於適時因讀孫吳兵法衛霍別傳遂仗劒從軍以功授合黎府別將歷果毅轉折衝纍拜郎將中郎將尋除安北都護稍遷威衛將軍每拜命必銜一官兼一使非其幹理疇克保釐由是所向皆通衆善咸集戶部尚書王晙國之楨幹人之具瞻太子太師蕭嵩惟嶽出雲生甫翊聖王之總管朔方也帳下之畫一以詢公蕭之節度河闕一字也閫外之事不裁於已公貌無矜色口無伐辭出則推美於人入則盡慮於事議者以為王能信善蕭能任賢居二者之間非周才孰可尋以將軍兼靈州刺史朔方軍節度副使押渾部落仍檢校豐安定遠及十將兵馬使會遭家艱奔喪州里扶杖未起粥嗌不入古之純孝何以尚茲明年林胡寇邊天子震怒起公除易州刺史鎮北邊也公聞命驚殞以死讓請情既難奪恩為中停草四年禮終復除易州刺史兼高陽軍使此邦之人舊稱勇悍凜然尚荊卿之風慕燕丹之義其俗易使也其人可用也而地接邊鄙郡參軍鎮嗟哉杼軸空矣征役勤矣用非所養力盡猶求摧節義之明心就逋逃之下請公深悲其故大返其源阜其財求致其忠愛居者既逸去者知歸星歲未周襁負咸至豈非寬明以恕恩結其心者歟時出桑野奄觀銍刈責其惰者則為之怛戚如遇其敗子焉勉其勤者則喜形顏色若遇其良子焉故人感而懷之莫敢暇逸霑體塗足唯農是務所以家粟流衍而餘糧棲畝管子曰倉廩實知禮節則公之德政信然也歲或大旱憂心如熏如惔如焚如焚其身曾是勤人達於鬼神及有事山川宜乎冢土祝始告而雲合俎未徹而雨降氣有并隔災變為蝗自西徂東風至雨集其高也蔽日其下也被地遂能辨其疆界犬牙不入非神鑒其德有所底之其孰能與於此夫市者利之所聚人之所爭強或肆奪不忌於上吏取於人謂為官市交易不得其所朝夕為之皆虛公撫御多方非止撲罰家僮門客莫出城寺通商服賈日以填湊更為一都之會也公之下車將大變其俗其有酣歌劍舞者彈弦跕屐者懾其雄而息其競疏其穢而復於禮以為不積其德無以服人也不正其身無以出令也故視無旋聽無聳其動也可效其靜也可法四鄰以是嘉其致而歸其高百姓以是服其德而樂其行故自郡邑至乎鄉鄙莫不競者讓暴者仁毅者溫懦者立其惟不言而化已過半矣於是詢耆舊察人俗入而靜謀出而周視高者抑之弛者張之人之所惡者去之人之所欲者濟之老有歸幼有長至於疾苦莫不躬親為之一年而下無艱急而亦無殄病矣比及三年則有成也盡知方也洎農隙巡撫煦愈溫顏易水變其寒風燕谷增其暖氣由是刑罰不用而君亦闕一字之使無訟乎見於今日矣故化行乎近郡而譽達乎京師公夙昭武烈而善於文史將以漢主憂邊故投其筆硯晉侯擇帥更悅其詩書不然何有執繁弱之弓杖雍狐之㦸而能緣飾吏事擲發如神窮物之理盡人之性若此之至也草七年公次會計朝於京師草八年春二月制攝御史中丞遷安西都護詔書至郡郡之人吏若有所亡或號門衢或悲里室曰自我公至吾黨其蘇今我公往吾黨其痡詣闕陳情則長安地遠邀道攀戀而西域路絶既借寇不可則令名宜存詞曰卓爾有立時惟田侯清標遠映高月垂秋其武也剛其文則柔孰是師旅能牧於州靡不夙夜思皇厥中綢繆庶政亦以訓戎天子曰俞爰嘉爾功俾守易土而和其風北燕之南全趙之北歲有軍事人用不足從而搖之是謂苛慝惟君蒞止高明柔克柔克伊何撫如嬰孩蝗不入境旱不為災既庶能富逋亡歸來非德之致其誰有哉水積則流德積則揚化自下國聲馳遐方允矣君子如圭如璋刻石頌之令問不忘維開元二十九年歲次辛己十一月戊申朔二十四日辛未寧王薨於西京之邸第旋殯於寢門之西階翌日有制冊王為讓皇帝蓋景龍歲先帝即位王嫡長將立為皇太子讓大功於我皇洎薨落讓存有追崇之義粵若天寶元年夏五月乙巳朔十七日辛酉將遷座於惠陵禮也龜策先遠龍輴此時嗚呼哀哉皇帝遣金紫光祿大夫守尚書左僕射攝太尉上柱國許平縣開國侯耀卿奉宵載奠祖筵以申天倫之憾也乃命詞臣序之典冊其詞曰昔真人之述作表高節於讓王太伯聞乎有周皇昆昭於聖唐古往今來身退業昌歿而不朽揚乎耿光元祖錫慶重熙纍盛茲冢嗣之謙德逮遺靈而受命童儒之辰初王壽春開國方大進封於蔡以委親賢是兼中外奄有於宋復遷於寧正疇庸於地理配明德於天星或建符節言歸闕庭既睦天愛承歡帝樂東扈溫泉西侍平樂風雅屬和論思辨博晨超北上謁紫殿於蓬萊夕息南歸對瓊樓於花草口咢莫匪恩遇周爰咨度坐而論道實惟三公登太尉兼儀同拜司徒命司空儀刑作孚宣和國風稽以前事緬懷逝者五王同日曜大君之一龍萬國來朝無梁王之駟馬讓則有之崇名可追踰周盟之禮會七月之期太史造時遣奠於茲自藩王之邸第建天子之旌旗度春明而春盡下長樂而長辭經灞川與渭川慘容衛兮遲遲當苑門之宮觀攀宇宙而無追仰音顏以纏慕更吾君兮望思嗚呼哀哉瀛區有變天注終飛懷蒼梧而日遠望白雲而不歸沈沈隴樹漠漠泉闈竭闕一字音而載筆藹千祀而騰徽嗚呼哀哉高寢林間陰堂晝閒代謝今昔神之往還列昭穆兮斯在奉忠孝於橋山嗚呼哀哉維開元二十五年歲次丁丑十二月庚子朔七日丙午惠妃武氏薨於興慶宮之前院移殯春宮麗正殿之西階粵翌日乃命有司持節冊諡曰貞順皇后以旌德飾終也洎明年春二月己亥朔二十二日庚申將遷座於敬陵禮也啓攢塗於春禁候重門於初旭轉靈衛於金根緬哀懷於上國亦既有命銘於貞王其詞曰風之始者闕二字備內職選才淑政兼翊戴化錫丕祉繁華鍾美我天后之從孫周桓王之季子於渭之涘重開戚里鵷鸞飛翔珮玉鏘鏘自婕妤而三命乃率先於鴈行出言有章彤管有光孝慈之心諒自天啓鞠育孫幼恩流愷悌七子既均六宮有禮貴主三分於外館賢王兩闢於朱邸彼陰教兮惟微承日月之光輝輔聖人之至德故動用而無違驪谷湯泉天行暮律屬車之內陪遊之日孰謂蕩邪茲焉遇疾闕焚香山以邀元吉却屆重城彌留永畢思勿藥之有喜痛還年之無術嗚呼哀哉覽舊館兮洞開踐芳塵兮徘徊指甘泉之畫像謂德容之在哉自昔層城之宮椒風之殿獲遇明主是矜邦媛有平生之渥恩無淪沒之餘眷況貞順之寵錫伊往古而莫見卜兆考常三龜既良園陵蒼蒼在國之陽傍芙蓉而左轉怨桃李之春芳風卷旌斾繁笳委咽中使護道懿親辭訣山藏玉衣地留金穴惟清灞之永矣流國風而不竭嗚呼哀哉履溫元宗朝官尚書員外郎兼充節度判官攝御史為勸農判官草土臣履溫言臣行忤神明禍歸先父日月未幾苴麻未變伏奉恩敕授臣駕部員外郎充朔方軍判官詔書臨門匍匐廬次捧跪驚駭號纏痛疾氣殘毀容臣今殞越伏以滅性非教逃天莫由敢祈孝理少察哀訴臣門緒單賤本無兄弟惟臣一人鞠育鍾愛幼在隴畝輟臣讀書家貧本無僕役柴水為資臣在師氏父常有勞束修資費母亦勤績訓誨之漸明時忝官唯資以榮過此無報豈謂祿飬才及殃釁已深所侍老母風氣仍積每臣崩摧撫對增病臣稍用割哀就禮間哭承顏臣若暫離母亦難保且祠祀無主几筵何依臣之憂酷特為尤甚逮及秋季始至小祥苫廬尚新墳土猶溼聖情何忍令其輟情顧惟形骸實污冠冕臣又近染風疾似因哀瘵語事便忘居常輒驚以此從戎必不堪命伏乞憫臣艱疾察臣孤獨卒臣喪服矜臣母老則生人之本盡於哀敬國家淳風載激流俗無任荒懇開國承家建官分職品彙斯布卑高已陳故禮設六官必在所掌司分九命且均其職眷彼淩人頗忝班位惟茲命士實厠周行雖和平在時終無天昏之理而炎涼失節或生疾疫之事備預之道寧失國經頒賜之儀豈乖常禮且深溪寂寂方委積於大冬虛室寥寥遂收藏於小吏春風已解不聞修飾之功秋露未圓方事刷清之業當其時而不作已表非勤應合給而缺供尢彰失守不應之罰從此自貽慢令之科宜以為始高望元宗時官易州遂成縣書助教夫至道潛運不言而化成大象孕靈不宰之功速斯則神元妙賾雖日用而莫知況耳目不該豈視聽之能識由是給園多士並赴緇林方丈比邱咸歸奈苑有想非想住法非常樂之宗色空即空生滅豈菩提之果於是清信士易州新安府折衝都尉李文安遊心正覺妙達苦空知勞生之有涯設津梁於彼岸乃於范陽縣西雲居寺為亡妻河東郡君草辛氏敬造石浮屠一所旁求琬璧形岫為之獻琛遠召良工班輸以之呈巧盤螭隱伏與雲峰而相交靈鳳將翔共陽烏而接翼飛空七級狀多寶之移來騰虛四回疑衆仙之涌出兼以山含萬象地蘊靈奇蓮沼澄光似猴池之浴日松枝引籟若祗樹之吟風衆妙難名約敷厥美冀同拂石万劫茲山銘曰麗哉宏璧出以崑山磨礱不日神儀婉然停停淨域峩峩給園光浮十界色照三天衆妙功德莫惟斯重鏤鳳傍矯雕龍上聳買地有果福田無種利益潛通存歿偕奉希逸開元中為散騎常侍河西節度使遷河南尹寒暑遞遷四時有凝陰之節宗廟致敬五禮標陳薦之儀徵萬古而莫遷雖百王而不易洎乎歲伏元陸日短星昴天寒地閉風凄雨霖積水成冰與銀牀而等潔沍陰鑿井映玉甃以生光既有峩峩之姿須備沖沖之禮苟虧六尺之樣遂闕三冬之備祭供有罷職司其憂向若尺樣頓乖納時不應緘默自緣蓋藏不謹今日方事推詢玉毀櫝中是誰之過掌人自合當罪採戶未可論辜翌字季良河南偃師人開元中為左拾遺集賢院直學士夫孝者百行之本故詩美張仲傳稱穎叔所以軌物而前乎人用者也悠悠千古誰其似之實我府君能錫類矣公諱思謨太原平陽人其先出自有周虢叔之允史諜詳之矣爾其隗以奇策立丹以志業聞泰以人倫稱象以文學著隤祉積慶代不隕德曾王父忭周朝平東將軍上黨郡守大父則隋銀青光祿大夫尚書度支郎中淮陵郡守隴右巡農使邊鄙不聳實資介胄之雄儲偫已均方知會計之力專城無警奉使有光矣嚴考敬同皇幽素舉高第養親不仕易曰幽人貞吉又曰素履無咎幽素之義其大矣哉幽素府君有子其季曰我公俱仁孝絶倫感通天地太夫人嘗有疾闕一字羊宍時禁屠宰犯者加刑日號泣於昊天而不知其所出忽有慈烏銜宍置之階上故得以馨潔其膳猶疑其儻然他時憶菴蘿果屬觱發之辰有類求芙蓉於木末不可得也兄弟仰天而歎庭樹為之犯雪霜華而實矣公取以充養且獻之北闕於時天后造周驚歎者久矣命史臣裦贊特加旌表無幾何憶新笋復如向時之菀結又無告焉後園叢篁忽苞而出所居從善里其竹樹存焉異乎哉書傳所闕者今見之矣公始以孝子徵解褐拜定州安平縣丞下車未幾而東胡作孽虔劉我士卒撓亂我邊陲恆代之間亭候無守河決非覆簣能制原燎豈負甕可加而公之小邑亦受屠矣身被囚虜命懸鋒鏑出於萬死之中興其一切之計大殺寇盜載完郛郭雖田單之復齊城曹沫之歸魯地薨以過也招慰使奏加公朱紱撝讓不受屬內憂服闋轉江陽縣丞又應廉讓舉擢武功尉秩滿遷常熟令凡佐三邑而宰一縣所居必化所在必理專務於德夫何不臧公闕一字二昆長曰思誨易州司馬次曰思訓大理司直不永介福俱已先世遺孤凡十有三人或在髫齔或居襁褓公撫之育之出入腹之子漸乎義方女嬪於他族人不知其諸父蓋孝悌之至也稟命不融春秋五十九開元九年正月二日寢疾終於官舍以其年十一月甲辰朔十七日庚申祔葬洛陽東門平川禮也初公取於彭城劉氏無子而卒再娶河南元氏有二女亦先朝露矣琴瑟不可以終徹享祀不可以無繼又婚清河張氏故江州刺史嘉言之孫奉禮郎慎思之女作配君子休有烈光彼蒼如何殲我良人有子曰上曰寀伶俜幼冲未知飾終追遠之禮易州府君冢嫡宇採他山之石昭銘景行其詞曰循陔者子兮行通神明家邦必達兮休矣清聲天難忱斯兮胡不永齡哀哀㣥稚兮泣盡孤塋夫勞息之理達人一之然時當大明職近皇位父子併肩而事主君臣同體而多歡而萬石之慶一朝無怙可不悲矣府君諱福字延福渤海人也啓土受氏明諸典冊曾祖權祖祖父護并砎如石焉厥有全操安時處順憂患不能入懲忿窒欲軒冕莫之榮且彖貴隨時雅明尊祖我府君始議從政有光前烈傳曰九變復貫知言之選此之謂矣府君幼而晦明長而藏用體敬仲之慎兼伯楚之忠解褐拜文林郎守奚官丞秩滿遷本局令稍轉宮闈令兼謁者監竊以聖人之教父因子貴府君之寵嗣曰力士我大君之信臣也頃國步多艱而守謀立順以功拜右監門大將軍兼食本邑盡力王室志存匡輔元勳爛然天眷攸屬府君以大將軍之故特拜朝議大夫守內侍員外置尋遷中大夫正除本官出入四代凡更六職行不違仁言必合禮由是無黜擯無怨尢恭而能和簡而且肅德著乎宮掖名成乎寮友而稟命不融識者欷歔以開元十一年十二月二十五日終於來庭里之私第春秋六十有三大斂之日天王遣中使臨弔賵絹三百匹明年太歲在甲子正月壬戌朔草一日壬午遷窆於京兆府白鹿原之西隅禮也緣喪事儀衛并皆官給可見哀榮始終禮洎泉壤初府君旁通物情往往造極以為生者神之主死者神之歸歸乎本真曷足懷也乃謀龜筮相川原經兆域畚封自為安神之所而松檟蒼然矣君子謂高公於是乎知命府君自公之餘存乎上善每持專一之行深入不二之門範聖容寫真偈雖衣食所窘此心不易斯又回嚮之能事也將軍茹荼長號哀述舊德竊慙不敏敢讓其詞銘曰佳城一閉兮三千年棘人欒欒兮闕一字窮泉出郭門而一望兮見隴樹之生烟君寧見賓御之惻默皆撫墳而涕漣
