front:
  text: 全唐文欽定全唐文卷三十八元宗十九
  hash: sha256:4f1575e87c29b6fac880397371e60687ebdaa06f06663f200c4c7802442c3502
body:
  text: 鑿門命將授鉞專征仗以方面之威執夫賞罰之柄邦家重任固實在茲潁王永王豐王等朕之諸子早承訓誨琢磨詩書之教佩服仁義之方樂善無厭好學不倦頃之委任咸緝方隅今者皇帝即位親統師旅兵權大略宜有統承庶若振綱惟精惟一潁王以下節度使並停其諸道先有節度等副使並令知事仍並取皇帝處分李峴未到江陵永王且莫離使待交付兵馬了永王豐王赴皇帝行在臣子之節君親是奉或志懷干紀當義在滅私蓋前王所以持法割恩垂涕行戮言念及此歎息彌深頃以凶孽亂常關畿暫阻朕乘輿南幸遵古公避狄之仁皇帝受命北征興少康復夏之績猶以藩翰所寄非親莫可永王璘謂能堪事令鎮江陵庶其克保維城有裨王室而乃棄分符之任專用鉞之威擅越淮海公行暴亂違君父之命既自貽殃走蠻貊之邦欲何逃罪據其凶悖理合誅夷尚以骨肉之閒有所未忍皇帝誠深孝友表請哀矜雖解綬全體禮可行於曩制而削土勿王義亦著於前史昔廣川有罪因廢為人常山免誅爰將徙地是用矜其萬死屈此九刑宜寬伏鑕之命俾黜析珪之典可悉除爵土降為庶人仍於房陵郡安置所由郡縣勿許東西朕存訓誘勗之忠孝不虞孱懦遂至昏迷申此典章彌增媿嘆正大廈者柱石之力昌帝業者輔相之臣生則保其榮名歿乃稱其盛德飾終未允於人望加贈實存乎國章故中書令張九齡維嶽降神濟川作相開元之際寅亮成功讜言定於社稷先覺合於蓍龜永懷賢弼可謂大臣竹帛猶存樵蘇必禁荊州之贈相府未崇爰從八命之秩更進三台之位可贈司徒仍遣令使就韶州致祭者至和育物大孝安親古之哲王必由斯道朕往在春宮嘗事先后問安靡闕視膳無違及同氣天倫聯華棣萼居嘗共被食必分甘今皇帝奉而行之未嘗失墮每有銜命而來戒途將發必肅恭拜跪涕泗漣洏左右侍臣罔不感動閒者抱戴赤雀白狼之瑞接武薦臻此皆皇帝聖敬之符孝友之感也故能誕敷德教橫於四海信可以光宅寰宇永綏黎元者哉其天下有至孝友弟行著鄉閭堪旌表者郡縣長官採聽聞奏庶孝子順孫沐於元化也聖人垂範是推顧復之恩王者建極抑有追尊之禮蓋母以子貴德以諡尊故妃宏農楊氏特稟坤靈久釐陰教往以續塗山之慶降華渚之祥誕發異圖載光帝業而冊命猶闕幽靈尚閟夏王繼統方軫陽城之恩漢后襃榮庶協昭靈之稱宜於彼追冊為元獻太后昊穹垂佑宗社發祥爾往在髫年素彰岐嶷洎乎問寢日增孝敬吾久勤庶務常奉至真特好清虛尋將付託爾以華戎銳士掃定神州功乃格天德惟邁古是用受茲國寶加以大號典章斯集喜慰盈懷實謂道應前王何以志在讓禮克光丕業以副至公即斷來表汝孝以奉親明以御宇上從君父之命下順黎元之欲既宏茂寔爰副崇名千古攸高百王是式載循章奏喜慰可知予志每集虛心嘗遺炤方契真宗之旨豈云稱號之榮汝就養無違歸尊有裕載獻從龜之吉復當乙巳之辰巳備典章當依來請三朝問禮五讓丕圖用殷后之師載戡牧野同周王之步來入鎬京美暎縑緗功侔造化命之守器加以鴻名掃厄運而有融當樂推而難拒予棲神道要養志真元邦家乂寧自多愉悅天地肇啟皇王聿興故三王垂御圖之迹典墳著牧人之要爰立邦家其來尚矣予承百王之遐運繼五聖之丕業亭育區宇寵綏蠻夷罔不率從多歷年祀頃者姦臣煽禍中原搆釁汝睿略懸於兩曜鴻勳格於九天終古莫儔上天是賴故加之大聖建以崇名用膺多福何所與讓予夙達元妙遠寄真宰凝神澹泊足可自怡至於宗廟陵原常展慶矣郊禋豫動固陳儀焉方期仙於上境巳遺榮於中域汝欲歸尊於父實在因心爰及朝臣亦同懇願且無為於沖漠又何取於徽名宜悉此懷用全至道耳矣道高者必傳其迹德著者必享其名汝廓淨妖氛載安社稷萬靈式敘豈非大乎兩儀交泰豈非聖乎吾所以親受寶符自題徽號寧惟對於列辟諒巳聞於率土渙汗之出理不可收絲言之行事必有在將固撝謙之道是違億兆之情天地神祇未以為當宜膺景命即斷來章孝感之極通於神明傳於前史迹罕彰灼今日之事不其效歟吾比年服藥物比為金竈煮煉石英自經寇戎失其器用前日晚際思欲修營一昨早朝遽聞進奉有同符契若合神明此乃汝之因心測吾之本意豈惟此度前後非一則知惟睿作聖惟德動天再闢寰宇重會父子付託之際古今未聞色養之勤書冊不載寤寐嘉歎深慰於懷宜頒示天下宣付史館王者域中之尊孝者天下之本兼而成務厚莫重焉而應物以和奉親以愛由衷而舉有感必通若不動於神明豈能比於符契且匹夫之績尚銘於鼎鼐況天子之孝不列於縑緗故欲昭宣示於中外垂芳於來葉光我國典也惟天鑒下享年有期惟人奉天獲沒為善予嗣承丕業敬守宗祧中暱憸人幾淪大寶賴皇帝撥亂反正戡難濟時幸以暮年復茲安養常懼有悔以羞先靈今病既彌留殆將不寤其國務之事非予所圖哀制之閒茲審遺訓者皇帝不務疑厥疾未瘳禮貴適時或無封疑執宜令天下吏人令到出臨三日皆釋服無禁婚娶祠祀飲酒音樂其殿中當臨者曉夕各十五舉音禮畢而罷皇帝宜三日而聽政十三日小祥二十五日大祥二十七日而釋服以日易月固有前聞人子之念皆所未忍而艱難之際萬國事殷其葬送之儀尤須儉省特宜裁改無守常規嗚呼萬方勿乖予志皇帝臣某敢以元牡昭告於皇皇上帝上皇厭理萬幾凝情太古釋茲重責文粹作負與道優遊宇宙不可以無君宗社不可以無主恭惟歷數猥當虛薄懼忝帝位固辭不免遂膺大禮以馭下人敬擇元日告類上帝惟神敷祐四海永綏天極維天寶八載歲次己丑閏六月癸亥朔四日景寅曾孫嗣皇帝臣隆基奉冊大聖高祖元元皇帝臣聞有萬物者必本乎大道稱謂所極乃強名焉通三才者必存乎大寶敬教所厎唯崇號焉伏惟象帝啟元猶龍表聖應代降跡立言垂範沖用之功覆幬於天地救濟之德亭毒於生靈安裕邦家克保丕業顧以眇躬纉承丕緒永惟孚佑以致太和頃者玉芝再產上記陰隲是用恭膺景命肅事鴻名既刻元辰薦彰佳貺則有卿雲散彩瑞日重輪欽承降鑒載深兢惕謹上加尊號曰聖祖大道元元皇帝伏惟昭膺盛典永貽休烈維天寶八載歲次己丑閏六月癸亥朔四日景寅孝曾孫嗣皇帝臣隆基敢昭告於高祖神堯皇帝伏惟乾坤合德歷數在躬俯順人心肇興王業濟生靈於塗炭宏至理於馨香四海樂推百蠻稽服故得圖應緯協開國造邦顧以眇德纉承丕績永惟孚祐以致太和頃者玉芝再產上記陰隲欽承景命肅事鴻名既刻元辰薦彰嘉應則有卿雲散彩瑞日重輪恭惟降鑒載深兢惕謹上加尊諡曰高祖神堯大聖皇帝伏惟俯鑒虔誠昭升盛烈祗奉典冊伏增感慰維天寶八載歲次己丑閏六月癸亥朔四日景寅孝曾孫嗣皇帝臣隆基敢昭告於太宗文武皇帝伏惟英哲自天應期撥亂翼戴元聖大拯橫流九服載安百蠻俾乂功冠開闢德被生靈故干戈之動叶於湯武文章之盛懸於日月克昌大業永建皇圖顧以眇身祗膺寶命恭惟孚佑以至和平頃者玉芝再產上記陰隲是用欽承丕祉肅事鴻名既刻元辰薦彰嘉應則有卿雲散彩瑞日重輪永惟降鑒載深兢惕謹上加尊諡曰太宗文武大聖皇帝伏惟俯睠虔誠昭升盛烈祗奉典冊伏增感慰維天寶八載歲次己丑閏六月癸亥朔四日景寅孝孫嗣皇帝臣隆基敢昭告於高宗天皇大帝伏惟繼文纉聖嗣武居尊保合太和緝熙庶績萬邦作乂百度惟貞興弔伐之師展對崇之禮無有遠邇罔不率從仁風汪洋德澤滂沛能事超於邃古休聲貫於列辟顧以眇德纉承丕緒永惟孚佑以致太平頃者玉芝再產上記陰隲欽承景命肅事鴻名既刻元辰薦彰嘉應則有慶雲散彩瑞日重輪恭惟降鑒載深兢惕謹上加尊諡曰高宗天皇大聖皇帝伏惟鑒睠虔誠昭升盛烈祗奉典冊伏增感慰維天寶八載歲次己丑閏六月癸亥朔四日景寅孝姪嗣皇帝臣隆基敢昭告於中宗孝和皇帝伏惟睿聖日躋文思天縱重昌大業光啟中興允昭嗣夏之功克荷纉堯之緒武以靖亂文以經邦流愷悌之風布寬和之政故三靈叶賛百姓與能庶績成康彞倫有穆顧以眇德纉承丕緒永惟孚佑以致太和頃者玉芝再產上記陰隲欽承景命肅事鴻名既刻元辰薦彰嘉應則有慶雲散彩瑞日重輪恭惟降鑒載深兢惕謹上加尊諡曰中宗孝和大聖皇帝伏惟俯鑒虔誠昭升盛烈祗奉典冊伏深感慰維天寶八載歲在己丑閏六月癸亥朔四日景寅孝子嗣皇帝臣隆基敢昭告於睿宗大聖貞皇帝伏惟睿哲齊聖文思光澤炳茲龍德潛躍應期靖難安人克昌休運臻於至道惟懷永圖顧以眇身嗣膺寶命恭惟孚佑以致太和頃者玉芝再產上記陰隲是用欽承景貺肅事鴻名既刻元辰薦彰嘉應則有慶雲散彩瑞日重輪恭惟降鑒載深兢惕謹上加尊諡曰睿宗元真大聖皇帝伏惟俯睠虔誠昭應盛烈祗奉典冊伏增感慰維至德三載歲次己亥正月甲戌朔五日戊寅太上皇若曰古之握乾符建皇極社稷不可無主帝王惟有攸歸則堯禪舜舜禪禹畏天命也啟嗣禹武嗣文從人望也革命易姓舉至公於國纂戎繼統用不私於親斯美大矣朕承五聖之丕業宅萬國而為君膺時撫運載將四紀夢帝與齡實受多福曷嘗不虔恭至道亭育羣生早厭黃屋之勤每懷紫霄之馭惟父知子我有元良惟君安人久思付託皇帝天縱睿哲日躋孝敬率性之至通於神明財成之道冠於宇宙朕往以蕭牆之難克保宗社故先帝俾予以主鬯頃者中原之禍期輯邦家我於是命爾以仗鉞當經綸雲雷之際櫛沐風雨之時思契宿心累有成命而義不奉詔謙不踰尊至於再三明茲懇讓洎即戎致討觀兵朔漠驅馭豪傑用服乃功於明辟天亦集大命於爾躬推之至公終陟元后夫名以制義器以昭德今羣公卿士咸旅於庭明聽朕言敷厥成訓於戲奄有四海克康兆人光天之業也經綸天地戡定禍亂文武之功也雄圖英算大聖也保國安親孝感也今加徽號於皇帝曰光天文武大聖孝感皇帝授傳國璽受命寳符各一上副於天中契於神下叶於人三者朕無愧焉永保累聖之鴻緒對揚一人之休命朕將訪道峒山追蹤汾水超然金闕之上終以玉京之遊不其至哉良願畢矣宜令所司擇日即行冊禮維開元二年歲次甲寅八月景辰朔日皇帝若曰於戲咨爾襄王象月降靈自天生派弱不好弄長而勤書衣冠待明有清河之畏慎狗馬不玩得淮南之恭儉往以中宗晏駕嗣位登皇制於凶逆是膺虛器懼深禍亂闕為掃除推位太皇誠請懇到克遂雅懷宜其受茲多福享彼遐齡而腠理俄纏膏肓不救感念親懿用隱悼於厥心夫避德與能傳聖永祚承萬方之大福在三讓之高節周之泰伯王則有焉豈可禮均藩臣名齊列國等昌邑之厭毒同營陽之淪棄者哉是用超於舊典享以榮號遠推仁慈之心特傷短折之壽可諡為殤皇帝仍遣某乙持節授冊宜膺寵靈式慰泉壤嗚呼哀哉維開元二十九年歲次辛巳十一月戊申朔二十五日壬申皇帝若曰於戲古者崇德考行猶諡大名飾終追遠亦應徽冊況乃元昆之戚天倫之重豈循常典者哉咨爾故太尉寧王憲純粹稟靈沖和成象孝友之性發乎天然仁義之道彰乎日用加以好學不倦樂善有聞休問掩於閒平清猷光於魯衞實謂儀型邦家保乂藩維景命不融奄從薨逝興言震動哀疚纏懷惟王地居元子合膺主鬯昔朕上稟先訓克清羣凶遂固守撝謙懇讓儲副然則深仁厚德茂行已表於生前寶位尊名盛禮寧忘於沒後是用諡王為讓皇帝今遣使尚書左丞相裴耀卿副使太常卿韋縚等持節禮冊因心之感備物飾情瞻典策而哀深想棣華而望絕所冀幽穸嘉茲寵榮維開元三年歲次乙卯正月甲申朔四日丁亥皇帝若曰於戲書不云乎一人元良萬邦以貞易不云乎黃離元吉得中道也將以守監從撫主器承祧執經陳東序之容端冕見南郊之禮本支百代宜哉福祿咨爾郢王嗣謙忠肅恭懿元亨利貞遵在鎬之惠慈稟生譙之祥應學能知道孝乃因心書及春卿懸推早秀言窮叔譽遠愧生知當試象之年備成人之敏九元賛命百姓與能正位少陽欽惟大典是用命爾為皇太子其在靖恭爾位聿修厥德詩書禮樂敦說為本父子君臣威儀罔忒寢門問豎必視寒暄望苑招賢用資端直使三靈合契四海係心延我累聖之業積爾重輝之慶必敬必戒無怠無荒欽哉可不慎歟維開元十二年十一月甲申皇帝若曰於戲夫縟禮所以飾情崇名所以表德義存追遠愛洽因親惟故司徒申王撝璿極稟靈邦家維翰體孝友以成性用淳和而合道沛獻受易率以鳴謙河閒聚書時其好學加以出為方伯宏宣六條入登司徒大敷五教而天則不憗奄薨於行留邸無期同輦遂遠興哀痛震動於厥心夫先王演親親之恩春秋著加等之義上嗣之位飾終在期宜率茂典以永徽猷魂而有靈式昭哀贈維開元十四年四月二十二日皇帝若曰嗚呼帝室之幹曷降年不永天倫之戚而因心有加飾以徽章孔懷之義也咨爾太子太傅上柱國岐王範孝友至性聰達多才樂善為詞言行俱敏好學流譽經傳悉通德既訓於東宮化且行於南國而輔仁或爽倚福無稽奄忽遷殂震悼何及夫禮以情為體欲增追遠之數行以名而尊是圖襃德之軌故擇茲茂典崇以上嗣言念逝者用申友于今遣工部尚書攝太尉盧從愿持節冊王為惠文太子魂而有靈昭是哀贈維開元二十六年歲次戊寅七月戊寅朔二日己卯皇帝若曰於戲受天命者皇王之業大為國本者儲副之位崇所以上承宗祧下固黎獻咨爾開府儀同三司單于大都護河東河北道行軍元帥朔方軍節度大使兼關內支度營田鹽池押諸蕃部落等使上柱國忠王璵幼而夙成長有宏量佩服仁義周旋禮樂忠孝極於君親友愛聞於兄弟正以率下謙以持盈識洞於微智周於物通刑政之大體備文武之殊能果於積德樂於為善凡此數美常試皆能豈矜知子之明諒曰至公之義況復仰稽天道俯察人心立長則順天所助也議才則賢人之望焉是用命爾為皇太子往欽哉爾其敬膺典冊無忘戒慎思創業之艱難知守器之為重作貞萬國允協重明以揚烈祖之耿光永貽後嗣之成式可不慎歟維開元二十一年歲次癸酉四月丁酉朔十五日辛亥皇帝若曰於戲大邦為好蕃服維寧豈獨元夫亦資良偶咨爾十姓可汗開府儀同三司濛池都護阿史那白斤妻涼國夫人李氏柔懿成性幽閑表儀能修關雎之德克奉蘋蘩之禮自祗率輔佐肅恭言容載茂彤箴允諧內則是以崇寵蕃扞懷柔遠人將適遐荒更榮封邑是用冊爾為交河公主爾其叶化蕃邦竭誠婦道膺茲寵命可不慎歟維開元二十五年歲次丁丑九月十一日皇帝若曰於戲修五禮者必本於天秩合二姓者將厚於人倫咨爾建平公主秉質尚柔因心克順默識閫帷之教明徵圖史之言黼藻四德笙簧六行河洲在詠將叶於好逑湯沐䟽封式昭於備禮今遣使兵部尚書李林甫副使中書侍郎徐安貞持節禮冊爾其受茲光寵慎乃威儀永保無疆之休且為將來之範可不慎歟維開元二十六年歲次戊寅閏八月丁卯朔十六日壬午皇帝若曰於戲古之帝女下嫁諸侯以正婚姻之懿綱昭肅雍之令德咨爾臨晉公主蹈和成性體順為心頗協生知之敏更承師氏之訓柔明益著淑慎攸彰兼四教而不違勤六行而無斁近日云吉嘉禮有期宜穆彞章載光冊命今遣使侍中豳國公牛仙客副使黃門侍郎陳希烈持節禮冊爾其克遵法度用廣徽猷發明閫德垂範於後可不慎歟維開元二十八年歲次庚辰二月戊子朔八日乙未皇帝若曰闕德崇婦道也河洲之訓厚人倫也咨爾真陽公主柔順因心幽閑表質雅著閨闈之則能瞻圖史之誠徽章載茂淑範無違禮將及於有行寵宜循於賦邑今遣使兵部尚書兼侍中牛仙客副使黃門侍郎陳希烈持節禮冊爾其敬慎威儀無致失墜用膺寵命克保宜家可不慎歟維開元二十九年歲次辛巳閏四月辛巳朔十八日戊戌皇帝若曰於戲先王作則女子有行必開湯沐之封以成肅雍之美咨爾興信公主自幼及長含和尚柔鑒圖史而思齊勤組紃而無斁能遵法度克茂幽閑教於公宮既昭雅訓歸於外館宜穆彞章今遣使吏部尚書兼中書侍郎徐安貞持節禮冊爾其益自修飾不忘誠慎俾昭淑問貽永無窮可不慎歟維天寶五載歲次景戌七月辛亥朔二十二日壬申皇帝若曰於戲三綱以正王化是先二姓之合人倫式敘下嫁之禮厥惟舊章咨爾樂成公主毓質柔明稟性閑婉幼彰惠問長有令儀教以公宮頗閱於圖史導以安則克勤於纂組瓊笄既襲紺綬斯榮方諧卜鳳之期式叶從人之典今遣特進行尚書右僕射兼左相吏部尚書晉國公李林甫持節冊命往欽哉爾其祗率外禮虔恭中饋順而不違謙而不滿日新其德以正家人可不慎歟維天寶五載歲次景戌八月辛巳朔十三日癸巳皇帝若曰於戲家人以正易著乎辭女子有行詩載其義王化之本婦道攸先咨爾壽光公主敏質柔閑資性純粹芳衿內穆淑問外宣能遵阿保之訓頗聞詩書之旨煒茲彤史既稟教於中闈襲以瓊笄斯待年於外館龜謀允叶鸞節方舒率是舊章式茲典禮今遣使光祿大夫行門下侍郎同中書門下平章事陳希烈副使中大夫給事中王壽持節禮冊往欽哉爾其祗勤敬德斧藻令儀履順居中以永終譽可不慎歟維天寶五載歲次景辰十二月戊申朔九日景辰皇帝若曰於戲婚姻之序人倫為大家道以正王化乃貞咨爾平昌公主性質閑婉襟靈敏悟柔順外徹和惠內融公宮道訓備聞勤儉之則女史箴規克慎言容之範頗闚圖象既習紘綖方修中饋之儀式從下嫁之禮罽車遵路氶庋在庭歸爾好仇申茲寵典今遣使特進行尚書左僕射右相吏部尚書晉國公李林甫副使朝散大夫守中書舍人李暐持節禮冊往欽哉爾其虔修令德祗服厥訓循於法度宜爾室家可不慎歟維天寶九載歲次庚寅四月己未朔二十六日甲申皇帝若曰於戲本於王化正乃人倫始於國風彰於婦道咨爾廣寧公主柔儀明婉淑性和惠端閑外肅敏悟內昭稟訓公宮法度彰於懿範受教師氏言容順於閫德頗聞圖史能習組紃方遵下嫁之儀式備親迎之禮三星迨吉百兩于歸申以徽章宏茲寵命今遣使特進行左相兼兵部尚書崇元館大學士集賢院宏文館大學士上柱國潁川郡開國公陳希烈副使正議大夫給事中權知刑部侍郎上柱國渭源縣開國男李麟持節禮冊往欽哉爾其祗膺典禮勤修內則宜爾室家叶於雍肅可不慎歟維開元二十九年歲次辛巳十一月戊申朔二十五日壬申皇帝若曰於戲尊名備禮所以悲友于也恩親襲號所以申悼往也讓皇帝故妃元氏門承華烈代襲清猷柔範夙著徽音允穆自伉儷天人能修壼訓克茂詩箴之教載修圖史之文豈謂福善無徵遽先殂逝天倫有感追悼兼懷福貴從尊事資飾贈有行梁苑早膺藩幼疑之榮將祔壽原允叶椒房之位是用冊妃為恭皇后今遣使尚書左丞相裴耀卿副使韋縚持節禮冊章服式陳典韋攸備永惟神格嘉是哀榮維開元二十三年歲次乙亥十二月壬子朔二十四日乙亥皇帝若曰於戲樹屏崇化必正閫闈紀德協規允資懿哲爾河南府士曹參軍楊元璬長女公輔之門清白流慶誕鍾粹美含章秀出固能徽範夙成柔明自遠修明內湛淑問外昭是以選極名家儷茲藩國式光典冊俾叶龜謀今遣使戶部尚書同中書門下李林甫副使黃門侍郎陳希烈持節冊爾為壽王妃爾其敬宣婦道無忘姆訓率由孝敬永固家邦可不慎歟維開元二十三年歲次乙亥十二月壬子朔二十七日戊寅皇帝若曰於戲作配藩維以正風訓莫不明慎聘納聿求儀範咨爾前相州鄴縣令鄭博古第二女素聞淑哲自稟幽閑習玩不華圖史成則宜其發祥茂族高選當代俾因邦媛之求式敘閫闈之化今遣使侍中裴耀卿副使吏部侍郎席豫持節冊爾為榮王妃爾其勉茲孝敬誡彼滿盈祗率大猷永膺寵數可不慎歟維開元二十六年歲次戊寅正月庚午朔十八日丁亥皇帝若曰於戲燕翼之樹實屬於維城婚姻之禮必求於宜室咨爾右羽林軍長侯莫陳超第五女天資清懿性與賢明衣冠之緒克稟於閫德環珮之容備詳於閨訓是賴尚柔之質以宏樂善之心宜配藩維用膺典冊今遣使金紫光祿大夫兵部尚書兼中書令集賢院學士修國史上柱國晉國公李林甫副使中大夫中書侍郎集賢院學士上柱國徐安貞持節冊爾為永王妃爾其虔恭所職淑慎其儀惟德是修以承休命可不慎歟維開元二十九年歲次辛巳三月壬午朔十八日己亥皇帝若曰於戲古人大猷諒在婚禮必資令淑以儷藩維咨爾京兆府新豐縣令薛巘長女地承華族門傳雅範本幽閑之性為禮教所成循圖覽史蹈和履順固可歸於邸第穆彼嬪風是用命爾為榮王妃今遣兵部尚書兼侍中牛仙客副使黃門侍郎陳希烈持節禮冊爾其敬佩前規克勤內則式瞻清懿垂美無窮可不慎歟維開元二十九年歲次辛巳五月庚戌朔十四日癸亥皇帝若曰於戲乃媵藩王既開邸第必求士女以昭閫則咨爾故絳州司士參軍崔承寵長女家承茂族代襲清和自幼及長素有柔和之性監圖循史夙懋幽閑之德徽猷益著淑問可嘉是以膺茲寵章主彼中饋是用命爾為濟王妃今遣使兵部尚書兼侍中牛仙客副使黃門侍郎陳希烈持節禮冊爾其敬佩箴訓克慎威儀輔我維城永崇盤石可不慎歟維天寶二年歲次癸未七月戊戌朔二十一日戊午皇帝若曰於戲建邦為屏必勉於閫教嘉耦曰妃是賴於嬪則咨爾前殿中省尚書輦局直長盧季融第三女淑德賢明令儀柔順含和自整備詳環珮之容稟訓有方更出衣冠之族實資女範作配藩維是用命爾為信王妃今遣使尚書右僕射兼右相晉國公李林甫副使銀青光祿大夫行中書侍郎徐安貞持節禮冊爾其肅穆閨闈虔恭禮度克終婦道以正國風可不慎歟維天寶四載歲次乙酉三月己未朔十九日丁丑皇帝若曰於戲咨爾京兆府新豐縣尉韋釜第八女慶承華族禮冠女師欽若保訓踐修德範遵圖鑒史操尚幽閑內則嬪儀道彰柔順陰教之美國風攸屬允資邦媛作配藩闈是用命爾為陳王妃今遣使尚書左僕射兼右相使部尚書修國史晉國公李林甫副使中書舍人兼判刑部侍郎孫逖持節禮冊其率循懿行懋昭令德祗膺典冊可不慎歟維天寶四載歲次乙酉七月丁卯朔二十六日壬辰皇帝若曰於戲古之建封式崇垣翰永言配德必擇幽閑咨爾左衞勳二府右郎將韋昭訓第三女育慶高門稟柔中閫動修法度居玩琴瑟夙聞師氏之學素習公宮之禮聿求貞懿作儷藩維爰資輔佐之德以成樂善之美是用命爾為壽王妃今遣使光祿大夫行左相兼兵部尚書宏文館學士李適之副使金紫光祿大夫行門下侍郎集賢院學士兼崇文館大學士陳希烈持節禮冊爾其欽承寵數率由令則敬恭婦道可不慎歟維天寶五載歲次景戌四月癸未朔十六日戊戌皇帝若曰於戲朱邸傳封爰求嘉耦瓊笄作合必擇華宗咨爾太子宮門郎崔珣長女冑自軒冕訓承圖記柔閑內正淑問外宣既連榮於姻戚且襲吉於龜筮是用命爾為廣平郡王妃今遣使光祿大夫行門下侍郎陳希烈持節禮冊爾其虔奉儀則祗膺典禮克昌祚允永固宗祧可不慎歟維天寶九載歲次庚寅四月己未朔十七日乙亥皇帝若曰於戲內則之禮用穆人倫中饋之義以正家道咨爾左衞率府親府左郎將羅國公張安仁第二女門承軒冕族著清華蕙德柔明蘭儀婉茂早習組紃之藝克聞圖史之規懿範聿修四德斯備虔恭蘋藻之訓式彰珩璜之容作儷英藩允資令淑今遣開府儀同三司行尚書左僕射兼右相吏部尚書崇文館大學士監修國史上柱國晉國公李林甫副使中大夫行中書舍人權知禮部侍郎事上柱國成紀縣開國男李暐持節冊爾為涼王妃爾其祗膺典禮永綏寵命可不慎歟維天寶十載歲次辛卯三月甲申朔十七日庚子皇帝若曰於戲四瀛宅日百谷稱王望祀之禮雖申崇名之典猶缺惟東海浴日浮天納來宏往善利萬物以宗以都朕嗣守睿圖式存精享神心允穆每叶休徵今五運惟新百靈咸秩思崇封建以展虔誠是用封神為廣德王其光膺典冊保乂寰宇永清坤載敷佑邦家可不美歟此文下有惟南海蕩滌炎州包括溟漲涵育庶類以成厥德惟西海汜濫䟽名清晏表德成茲潤澤奠彼金方惟北海限蠻阻夷實資坎德含奇蘊粹實曰天池似非一篇今從唐大詔令附註篇末
