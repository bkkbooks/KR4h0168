front:
  text: 全唐文欽定全唐文卷二百三十一張說十一
  hash: sha256:8223232af6de99d127395e57994532e31f0d5f67e587fef689b4eaf3d6dfd67f
body:
  text: 譔夫總四大者成乎身矣立萬始者主乎心矣身是虛哉即身見空始同妙用心非實也觀心若幻乃等真如名數入焉妙本乖言說出焉真宗隱故如來有意傳要道力持至德萬劫而遙付法印一念而頓受佛身誰其宏之實大通禪師其人也禪師尊稱大通諱神秀本姓李陳留尉氏人也心洞九漏懸解先覺身長八尺秀眉大耳應王伯之象合聖賢之度少為諸生游問江表老莊元旨書易大義三乘經論四分律儀說通訓詁音參吳晉爛乎如襲孔翠玲然如振金玉既而獨鑒潛發多聞旁施逮知天命之年自拔人閒之世企聞蘄州有忍禪師禪門之法允也自菩提達磨天竺東來以法傳惠可惠可傳僧璨僧璨傳道信道信傳宏忍繼明重跡相承五光乃不遠遐阻翻飛謁詣虛受與沃心懸會高悟與真乘同徹盡捐妄識湛見本心住寂滅境行無是處有師而成即燃燈佛所無依而說是空王法門服勤六年不捨晝夜大師歎曰東山之法盡在秀矣命之洗足引之並坐於是涕辭而去退藏於密儀鳳中始隷玉泉名在僧錄寺東七里地坦山雄目之曰此正楞伽孤峯度門蘭若蔭松藉草吾將老焉雲從龍風從虎大道出賢人覩岐陽之地就者成都華陰之山學來如市未云多也後進得以拂三有超四禪昇堂七十味道三千不是過也爾其開法大略則慧念以息想極力以攝心其入也品均凡聖其到也行無前後趣定之前萬緣盡閉發慧之後一切皆如持奉楞伽近為心要過此以往未之或知久視年中禪師春秋高矣詔請而來趺坐覲君肩輿上殿屈萬乘而稽首洒九重而宴居傳聖道者不北面有盛德者無臣禮遂推為兩京法主三帝國師仰佛日之再中慶優曇之一現混處都邑婉其祕旨每帝王分座后臨席鵷鷺四匝龍象三繞時熾炭待礦故對默而心降時診飢投味故告約而義領一雨溥霑於衆緣萬籟各吹於本分非夫安住無畏應變無方者孰能焉爾乎聖敬日崇朝恩代積當陽和會之所置寺曰度門尉氏先人之宅置寺曰報恩軾閭名鄉表德非擬局厭諠輦長懷虛壑累乞還山既聽中駐久矣衰憊無他患苦魄散神全形遺力謝神龍二年二月二十八日夜中顧命趺坐泊如化滅禪師武德八年乙酉受具於天宮至是年丙午復終於此寺葢僧臘八十矣生於隋末百有餘歲未嘗自言故人莫審其數也三界火心四部冰背榱崩梁壞雷動雨泣凡諸寶身生是金口故其喪也如執親焉詔使弔哀侯王歸賵三月二日冊諡大通展飾終之義禮也時厥五日假安闕塞緩及葬之期懷也宸駕臨訣至午橋王公悲送至伊水羽儀陳設至山龕仲秋既望還詔乃下帝諾先許冥遂宿心太常卿鼓吹導引城門郎護監喪葬是日天子出龍門泫金襯登高停蹕目盡迴輿自伊及江扶道哀候幡花百輦香雲千里維十月哉生魄明即舊居後岡安神起塔國錢嚴飾賜逾百萬巨鐘是先帝所鑄㣥經是後皇所錫金牓御題華幡內造塔寺尊重遠稱標絕初禪師形解東洛相見南荊白霧積晦於禪山素蓮寄生於坐樹則雙林變色泗水逆流至人違代同符異感百日卒哭也在龍華寺設大會八千人度二七人二祥練縞也咸就西明道塲數如前會萬迴菩薩乞施後宮寶衣盈箱珍價敵國親舉寵費侑供巡香其廣福博因存沒如此日月逾邁榮落相推於戲法子永戀宗極痛慈舟之遽失恨涌塔之遲開石城之歎也不孤廬山之碑焉可作竊比夫子貢之論夫子也生於天地不知天地之高厚飲於江海不知江海之廣深強名無迹以慰其心銘曰額珠內隱匪指莫效心鏡外塵匪磨莫照海藏安靜風識牽樂不入度門孰探元要倬哉禪伯獨立天下功收密詣解去名假詣無所得解亦都捨月影空如現於悟者無量善衆為父為師露清熱惱光射昏疑冀將住世萬壽無期柰何過隟一朝去之嗟我門人憂心斷續進憶瞻仰退思付囑盡不離定空非滅覺念茲在茲敢告無學舊史云軒轅帝宮次星具黃龍之體郊媒神祀次成元鳥之命非聖也莫能法天非天也莫能感聖則有相乎坤而母乎震齊乎古而合乎天跡雖祕絕猶可測而言焉麗趙氏天水人也麗者以華美為貴者以配合為尊易云日月麗天傳稱星辰合度麗加號自我為初原夫八駿勤周肇有封姓三軍霸晉乃蕃卿族設寶符而開國曳珠履而成家果驗成宣之後不乏文忠之慶堯門昭殿何代無人暨乎紫氣上通瑤臺獨立楚宮選美納良袂於神雲漢掖求才進團扇於明月故坐而論教則比位三司動而具瞻則儀刑六列者矣先將軍以恩澤授職太夫人以有禮封鄭流車躍馬豈無甲觀之親湫宅閑門不有椒房之勢探風揆化憂國如家故聖人有以尚其德也躬親繭館義形熊檻退席以愛禮樛木以廣恩望古難臻之地必為常踐之域故聖人有以嘉其志也懸象告沴經時寢疾在蒙被之辰荅還輦之問生可捐於浮假心獨係於元真神往土清願承恩而入道形歸下上期去禮而薄葬慈顏同氣奚敢為言皇上閔而許之咨嗟不巳開元十四年春秋三十有四七月十四日薨於春華殿殯於龍興觀之精屋示以出家從道例也命河南尹監護河南令副焉喪葬務約成遺語也二十六日窆於故都之後邙山之陽孺慕承華淒涼薄室列薤歌於東路迴容衞於北山壽堂一閉兮凡聖等人代同悲兮修短閒月帔雲衣襚以神仙之服上方陶簋旋於造化之初此皆聖主之曲成賢之本志何必雲陽山下別起通靈之臺未央宮中虛立致神之帳若夫易名之典考行是存帝諡曰和禮之貴也氣之和者生萬物聲之和者孕八音魂而有知感聖恩乎有詔史臣恭銘內職事出彤管辭無華飾寫樂池之永傷寄瑤山之罔極銘曰帝佐后實掌陰教八月選才千金聘貌禮獻絲繭詩修澣濯婦政可尊嬪風胥效皎皎漢女為皇降靈娥娥邦媛順道之經結以印綬華光後庭帶之弓䪅朗潤前星追述潛運夙承嘉奬謙苦中京崎嶇上黨金鏡開目明珠耀掌心方樂於時泰魂奄悲於化往紫雲衣兮霓裳送美人兮北邙白壤宮兮青松苑去君恩兮日遠秋風急兮霜天草木黃兮野田滅香容於空槨留畫像於甘泉春秋以麗和之二字獨襃美於千年天降時雨山川出雲乃生靈媛祚我聖君精微其道煥炳其文三光錯行昭容綱紀百揆繁會昭容條理外圖邦政內諗天子憂在進賢思求多士忠孝心感天焉報之吉凶有數邱焉禱之如彼九日羿焉暴之如彼三良秦焉悼之漢宮選才班氏其特楚史書霸樊姝之力彧穆齊公敘其明德嗟爾彤管是鑒是則斤斤蘇公體正含道稟靈淳粹為唐元老忠以衞主孝以立身文以經國惠以安人司牧九郡九郡爰靜平章百工百工爰整千載典憲三朝綱領上纂先人五代相國下垂餘慶七子令德帝謂庭碩伊公是似接侍玉墀序拜金戺聯華謺潤佐我天子於戲彼蒼國幹云亡地頹五嶽天拆三光備禮詔葬㣥官會喪掌史司德刊銘路傍英英白雲瑞彼君輅佻佻公子嘉我王度魏后遺德作華天朝靈氣應變直心逍遙麟閣書仙鳳池墨妙太常國禮少宰邦教公之處之有倫有要玉折其貞金斷其清沒而不朽仁乎令名賢哉陰侯孝友仁信符彩外發清真內鎮史門文宗國子儒允克家踵武金聲玉振結髮筮仕利用勸心雉馴風化鹿賦文章函丈禮樂雷門紀綱微言教冑直道匡王年惟大耋克茂精爽疾不彌留怡然長往世比過隙生猶絕響契均范張會阻天壤通家自昔永懷厥初昏姻之故言就我居富同鼎食窮共園蔬動心規戒言成著書奪我良友天其喪余南望龍門東都九原萬籟酸骨千霜斷魂琴瑟都盡塤箎半存葬收子壻碑傳外孫人生到此天道何言嗟我處士煥炳其文精微天象與道為隣頹乎萬化于三十春在昔薄葬時服幅巾厥孤克孝永懷遷神君其心之無違返真乃建豐碣追揚茂塵王門公路豈微朱輪天才海學于何窶貧心焉有主孰知我艱烈烈皇考求仁得仁哀哀王母斯恩斯勤李虔報養王襃感親退居更命喪禮終身忠為令德孝實至純一門二善千載不泯君諱弋字嵩之范陽方城人也其先張仲以孝友佐周子孫醜周仕晉相韓至留侯報韓仇秦興劉滅項為漢世家九代及于漢亂居燕四葉為晉司空混一天下司空生禕避胡過江六世至太常而復寓於河東之族人君即太常卿隆之曾孫徵君子犯之孫河東從事俊之子性倜儻尚氣節能引弓六鈞命中百步車服出入擬於封君州里頗患之君廼勵操強學不出門者十餘年探道覩奧鬱為淵藪周武帝聞之徵為通道館學士既入隋而面其國高尚厥志終於山廬嘗言夷齊清者非達伯鸞曠者非中優哉游哉吾不與也夫人某氏少而嫠居長而喪子流離世故窮盡艱危提擕女姓託身禪宇實有高行之烈隱居之風未遑歸葬有志不就遺恨終天降及曾孫追申情禮景龍三年歲次已酉十月十六日克葬曾王父曾王母於河東之普救原成先志也銘曰皇矣烈祖才雄氣武不值漢高空思萬戶一旦折節十年學古高步華光飛纓書府昔有周處斬蛟契虎易暴以儒異代同矩周命既沒鼎遷于隋仕於二姓君子不為昭昭盛德百代之規府君諱恪其先晉人晉有張老韓有開地漢有留侯侯八代孫皓為司空司空子宇為北平太守遭漢亂離家於范陽至元孫華復為晉司空遇難子孫南渡其處者或寓於蒲坂周齊閒有歸者因從焉君晉司空十一代孫也曾祖徵君諱子犯祖河東郡從事諱俊父通道館學士諱弋德音遺範詳諸家牒君孤紹單門傍無兄弟苗而不秀未仕而卒道未融於邦國位未揚於王庭故老之口浸遠好事之書又闕是後生不得預聞焉哀哉嗣子晉州洪洞丞騭襁褓縗麻育於舅氏夫人隴西董氏常州長史雄之女也早年守義唯鞠一子嚴而有檢勤而善訓成先人之丕烈貽後嗣之積善微太夫人德則張氏幾將墜焉開耀元年十二月二十七日終於鄜城縣世婦馮氏之別業春秋七十有二先君之違世也太夫人在堂大門在殯日月逾邁有志未從是諸孫疾焉若履淵谷以景龍三年歲次已酉冬十月二十六日克葬王父王母於蒲坂東司空之村成先志也銘曰帛丿糸帛丿糸王父續我靈基幼而植德人莫知之烈烈王母克明克類教我鬻子光我族嗣中條之北大河之東邱陵桑梓鬱鬱崇崇千年啟室百歲來同永惟先志欽成厥終公諱威德字某曰葛氏本梁國寧陵人也因遷徙今居京兆涇陽縣父寶未仕早世公室無陶白之資朝無金張之援不承過庭之訓不漸鼓篋之術而能奮飛喬木獨拔深濟富忠孝而由已善射馭而聞天早以武藝妙選供奉每扈游別館侍蹕禁林何嘗不左發五豝傍連雙兔歲久拜元城府左果毅都尉尋加上柱國入陪內仗思馬斯才出典外軍握兵之要所謂白珪特達青雲自致者也其用未展其生有涯神功二年某月日終於東都私第殯於北邙山之原夫人太原郡太夫人郭氏從夫有禮以子而貴開元八年十一月薨於京兆之修真里有子福順克家用孝開國惟忠泣風樹之不追痛榮祿之不逮哀戚之情上感飾終之澤下流窀穸有期祖奠將設有詔贈右驍衞郎將開元九年二月七日合葬於長安縣龍首鄉禮也鬱鬱宰樹蒼蒼墓田恐佳城之見日祕銘石於重泉詞曰都尉武達夫人禮封令德高行譽偶名雙自古迄今仁賢同盡惟傳忠孝餘慶不泯君諱承休字某吳郡吳人也留侯興漢播美西京長沙徙吳蔽蔓東土曾祖沖在陳為文帝師入隋為漢王學士祖後允授經太宗尊之以祭酒既封新野又贈以宗伯考少師位不充量止於朱陽宰班固稱世名忠孝魏武謂積善之家昌門一系暉我諸族君受天戩穀傳家業藝希言敦行去華崇實非法不由非禮不動精於理物敏於政事初以南郊齋郎補亠兊州兵曹丁太夫人憂廬墓三年加人一等再任始州司倉應八科舉改鄭州錄事參軍又舉賢良方正遷楊州司錄參軍移蘇州常熟令歷政皆有能名加朝散大夫入為司農丞實掌錢穀姦僦息望使覆囚嶺南是司獄訟聽折惟允廼授濟源令風行畿甸河潤洛師加朝議大夫上柱國拜隆州司馬轉恒州長史而有孚權而中道嬰風恙去職就醫還京春秋六十有二終於頒政里夫人成紀郡君天水秦氏廬陵郡公行師之孫嗣公遊福之女敬事君子誡訓諸孤當代之孟母也年六十二終於許州開元九年十月某日合葬於武功之禮讓原禮也夫道大難合仕屯而不進德高有後身沒而福流君同生八人半服銀艾祚允五子率為珪璋比迹於燉煌六龍南鄭千室德門濟美信有徵乎懼陵谷或遷乃勒銘沈石銘曰思文留侯時惟皇祖長沙南守分幹東土家有道書門傳相府嵬峩重世通經二主誕靈上哲克廣斯文造次仁義優游典墳孝乎事親忠乎事君猗冄叔父亦足有云開元十三年十一月六日故岐州刺史平原男陸公卒於京師十四年冬十一月葬於鄴西之先塋公諱伯玉字某河南人識真之士也夫譽其克家光乎觀國篤慈惠以宰邑宏雅量以執憲擅華妙於禮闈敷文敏於禁掖推直方以獨坐率易以專城所居而美風振所莅而德聲溢非德充於內而美形乎外者焉若是夫孝盡愛敬之衷悌包友順之節仁協返身之恕義適成物之和四者禮之善物歟吾友嘗從事於斯矣然而舉禮之綱持心之柄靜則樂先王之道動則濟賢人之業位不盈量年無登壽之才也之命也復焉可得而言哉銘曰陸侯泉妙體曠心古龍章炳文麟角藏武士冖䂞籥沖用詩書義府移孝則忠安親合主乃建侯社乃牧王畿有嚴有翼有長有威汲直謝病秦和不醫乞言未老啟手全歸石鼓東臨銅臺西望別業宛在舊塋增創弱子攀車孀妻送葬風景飄忽山川惆悵令德可傳浮生匪重神去一息形遺萬種露往草陳霜來樹拱闕二字仁兮闕義長蕪沒於邱隴公諱虔字某其先東平人也堯之太嶽始封呂侯周之太師實表齊國河西則霸王繼代關東則丞相聯華近徙河閒是稱右族大父贇隋幽州都督府長史考師滄州青池令並振羽儀馳聲郡邑公孝悌天至福祿混成千里聞騏驥之才五都重琅玕之價壯士行去樹勳於塞垣君子居之何陋於蕃郡以上柱國為元州司戶參軍積善襲於家風餘慶流於身後享年若干而卒夫人河清縣太君傅氏四德爰備六行聿修始則賓於冀妻終則訓成孟母春秋若干而終開元十四年某月合葬於州城西南里之平原禮也我有令子職司馬於小山我有淑孫偶乘龍於大樹榮哀之事於茲畢矣銘曰堂堂呂公休有令德穆穆傅母順成內則兩譽齊振雙儀不忒景行山東風流河北有生必謝誰能獨存神寧故里合葬平原劒暗泉室松寒墓門勒銘沈礎萬古何言公諱君衡字正平廣管高州人也昔畢萬苗裔邑於馮城因以為氏其適越者則袁宏過江錄所載長樂馮祖思之後也遠居僻地代為右族帶甲千人擬四豪之公子田洞百里齊萬戶之封君祖盎持節總管高州都督耿國公薨贈左驍衞大將軍荊州大都督恩命分府為三州授君之三子子智戣高州刺史子智玳恩州刺史猶子子猷潘州刺史公荊州之孫恩州之子量包山海氣逸風雲陰德以濟物力行以游道散岸從心乘化而沒斯寔一方超邁全真之士也夫人南海郡太夫人麥氏誕嫕勳門作嬪傑室初執冀妻之禮終抗梁寡之行即大將軍宿國猛公鐵杖之曾孫女也夫人有三子一女同歸上京長子元璡左衞中候次子元珪左領軍衞郎將少子力士右監門衞大將軍以將軍少養於高氏故舉家從其姓焉夫德厚者福長先否者終泰天之報應豈虛也哉大將軍所以雲漢奮飛忠孝至感迎聖善於炎海展三牲之色養拔友于於荒徼會四烏之嚶鳴縉紳美談簪紱傾慕是知敬仲羇旅將育於齊孟軻儒藝成名此母信瑰才之特達亦餘慶之助成乎夫人享年八十有七開元十七年五月十二日薨於西京來庭里粵八月二十二日安厝於長樂原之新域閔將軍之純至嘉先士之晦名恩詔追贈潘州刺史招魂而合葬焉葢殊常之禮若夫慈以遺後孝以揚親忠能合聖惠足昭仁嗟乎馮氏之子具此四德鏤石垂文為不朽矣銘曰潘州違世滅迹沈彩詔贈本邦光爍南海其孤永慕昊天不逮夫人處順奄背榮允悲離兩鄉魂合雙櫬孝心可贈百年匪恡天日蒼蒼邱隴茫茫地名長樂人樂無長郭門之外愁生白楊公諱元方字希仲蘇州吳縣人也帝典惟二虞盡美於南風強國有七齊莫大於東海元侯制食因而為宗丞相冊勳開吳佐命盛德之後瑤琨代襲故丹青弈世三君之望並高金玉聯華五常之目齊重公即陳給事黃門侍郎琛之曾孫唐荊州當陽縣丞山仁之孫司儀郎柬之之姪豫章尉元之之子體元黃之純粹峻清白之隆名鵬翼載軒騏鳴自遠始以司成明經業優擢第補三水扶風渭南三縣尉授裏行監察殿中三御史遷鳳閣舍人兼太子中舍又判鳳閣又守秋官行鸞臺三守侍郎同鳳閣鸞臺平章事坐公事降為綏州刺史居無何檢校春官又試天官二侍郎兼司尉卿復除鸞臺侍郎同鳳閣鸞臺平章事轉右庶子轉文昌左丞前後掌選及知考各二歲九流銓總代天理物公執其衡鏡而野無遺賢三載考績惟王舊典公秩其幽明而庶官咸事斯並憲章臺閣籍甚人倫至於經濟大道彌綸庶務嘉猷削於隱德宏益晦於推美蓋不得而聞也古人有言進退在命忠信在人一出持州再入莅政汲長孺之方直時守外臺胡伯始之詳明亟司中禁抑有由焉嗚呼人之淑斯宜享難老昊天降戾曾不憖遺大足元年二月七日寢疾而終春秋六十有三歷事兩宮三十餘載奉上惟敬臨下惟誠密勿兩終靜而調理心尚坦率不違名教之地迹列軒裳不雜風塵之伍施與忘倦鄉黨穆焉夷險若一朋友義焉所謂終溫且惠行同歸於大雅克已復禮身不離於令名及東首歸全西階徹奠無食粟之馬無衣帛之妾知與不知莫不嘉歎粵三月十四日假葬於國門之南費村永刊昭烈垂之幽礎夫人劉氏其先彭城人也隋毗陵郡通守子將之曾孫唐滁州刺史德祖之孫汾州刺史延嗣之女也昔武子處秦厥初令氏元王國楚是為昌族盛德之門龍驥接彩世祿之冑龜武聯華夫人璇室載蘭蕙林曾秀喈喈黃鳥艷艷清明聞詩聞禮竊比諸生茂行淵心實稱士女及鳳飛啟繇夫婦盡琴瑟之和鷄鳴咸纚舅姑移喬梓之敬友愛洽乎姒孀任恤周乎姻戚豈惟禮備澄幕工深機杼固以能循法度宜其室家矣年若干以大足元年七月某日寢疾而卒粵二十九日某辰假葬於某里夫國喪賢嬪家亡淑媛母氏垂白頻奪所懷稚子始孩翦焉無倚嗚呼天道輔仁人道與順眷茲大德不遐三壽何哉報應之理豈神食其言修短之期將事歸於命外姻畢萃累歎不定夫人即吾姨也今薄譔素履永刊幽石圖史之外有美存焉其銘曰崔實齊冑劉亦漢宗崇其顯媾望偶族雙閫闈是穆饋奠斯恭貞歌浮漢孝室洞江珪璋其節桃李其容宜享偕老胡寧鞠凶朝槿飛陌春蘿墜松夫傷子慕去此何從百歲之後魂兮合封先生諱守貞天水冀人蓋好學博古者也本乎官族稱為尹氏昔有尹佚司周太史暨乃吉甫勤於宣王格言大勳布在詩傳遠祖緯魏僕射曾祖欣隋開府大父珍唐棣州蒲臺令父文唐通州三岡令先生積德餘慶天錫純嘏愿而克恭情與禮合七歲誦爾雅能通書契訓詁之義識草木鳥獸之名十五誦三禮能明君臣父子之道定郊廟吉凶之制二十誦春秋尚書能精五行九疇之數斷襃貶會盟之節二十五誦詩及易能辨政教雅頌之始極變化生生之至又能誦古史百家之書善文章草隷之則恥夫流俗背實嚮聲飾華褰末故每外和內厲元元本本學者如斯不舍晝夜垂拱四年以明經高第遂授大成自延載之後條限賓薦長安之初大開貢舉考功是歲千五百餘人召先生課覈淑慝時稱無滯矣天子聞其進通經術乃下制曰成均大成尹守貞業隆時習功宣日就既有勵於分陰俾參榮於杖席可四門助教詵詵青襟有所仰矣長安二年六月十日晝寢忽夢麟臺兩局爭召修文覺而歎曰十二日稷吾當往矣因命親族序訣至日安枕俟期俄然而卒春秋四十可謂古之達化知命者也嗚呼天與之德而不永其年天與之才而不大其位何乎粵七月十七日葬於高陽原先君之舊塋銘曰尹氏之子其殆庶幾為仁由已三月不違謙成德柄學也身基辟雍洋洋可以療饑環林之下可以棲遲我實道貴人言位微修文地下前哲同歸子之知命將歿先期朝衣東首精魂高飛人之云亡胡不悽而高陽之原有陫其側郭門直視松柏一色邱隴纍纍阡陌誰識浮焉休焉為我心惻峨峨尹氏太古之始發源堯師中葉周卿爰暨初考咸有頌聲猗歟府君代烈增盛孝行之本謙德之柄耽樂道真含光無競三典郡土五行以正再司府丞百工興詠茫茫大造物生遂性虛無宰之孰能力爭位不充德優游天命身沒道存同符孔聖是有才子克成餘慶存為神鑑歿為國殤惟呂惟子同歸義方徐氏子者名巖字某司封員外郎堅之第四子也驥子睨雲鳳毛洗日孝友因心聰敏若神置在膝前巳會星辰之氣戲於牀下能記賓主之詞及總角成童精意好學問一知十升堂覩奧下筆成章而倫要發言為論而卓詭識者咸謂增世構之崇蘊益源流之洪潤雖甘茂之孫十二飛辯班彪之子九歲能文不尚之也天乎何辜顏項無命年十有三歲大足元年九月遭疾而沒嗚呼哀哉琱月始生不見其盈瓊枝方秀不見其茂悲哉銘曰生日何淺死路何深珠碎朓月花殘稚林哀哀父母孰處其心
