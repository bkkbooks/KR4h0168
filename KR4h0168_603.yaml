front:
  text: 全唐文欽定全唐文卷六百三劉禹錫五
  hash: sha256:f8fbcef5f6603fa6aba56da51eb2d73141e0b67aa8dc795b1780153c91f8cac5
body:
  text: 十一月七日使持節都督夔州諸軍事夔州刺史劉某謹奏記相公閤下凡今能言者皆謂天下少士而不知養材之道鬱堙而不揚非天不生材也亦猶不耕者不歎廩庾之無餘非地不產百穀也伏以貞觀中增築學舍千二百區生徒三千餘人時外夷上疏請遣子弟入附於三雝者五國雖菁菁者莪育材之道不足比也今之膠庠不聞弦歌而室廬圯廢生徒衰少非學官不欲振學也病無貲財以給其用鯫生今有一見使大學立富幸遇相公在位可以索言之禮云凡學官春釋奠於其先師斯禮止於辟廱頖宮非及天下也今四海郡縣咸以春秋上丁有事孔子廟其禮不應於古且非孔子意也炎漢初定㣥臣皆起屠販為公卿故孝惠高后之間置原廟於郡國逮孝元時韋元成以碩儒為丞相遂建議罷之夫以子孫尚不敢違禮以饗其祖况後學師先聖之道而首違之乎祭義曰祭不欲數語云祭神如神在與其煩於舊饗孰若行其教道今夫子之教日頹靡而以非禮之祀媚之斯儒者所宜憤悱也竊觀歷代無有是事皇家武德二年詔於國學立周公孔子廟四時致祭貞觀十一年又詔修宣尼廟於亠兊州至二十年許敬宗等奏乃遣天下諸州縣置三獻官其他如方社敬宗非通儒不能稽典禮開元中元宗饗學與儒臣議繇是發德音其罷郡縣釋奠牲牢唯酒脯以薦後數年定令時王孫林甫為宰相不涉學委御史中丞王敬從校刊之敬從非文儒遂以明衣牲牢編在學令是首失於敬宗而終失於林甫習以為常罕有敢非之者謹桉本州四縣一歲釋奠物之直緍錢十六萬有奇舉天下之郡縣當千七百不啻羈縻者不在數中凡歲中所出於經費過四千萬適資三獻官飾衣裳飴妻子而已於尚學之道無有補焉前日詔書許列郡守臣得以上言便事今謹條奏某乞下禮官博士詳議典制罷天下縣邑牲牢衣幣如有生徒春秋依開元敕旨用酒醴腶脩腒月肅榛栗示敬其事而州府許如故儀然後籍其資半附益所隸州使增學校其半率歸國庠猶不下萬計築學室具器用豐篹食增掌固以備使令凡儒官各加稍食其紙筆鉛黃視所出州率令折入學徒既備明經日課繕書若干紙進士命讎校亦如之則貞觀之風粲然不殊其它郡國皆立程督投紱懷璽棫樸菁莪良可詠矣伏惟相公發迹咸自諸生其尊素王之道儀刑四方宜在今日是以小生敢沿故事以奏記於左右姑舉其大較至於證據纖悉條奏具之章下之日乞留神省察不勝大願惶恐拜手稽首衣一副四事云云右伏以水德方清真龍下降天長地久瞻北極以常尊獻壽稱觴配南山而永固臣地叨宗屬職忝尹京慶賀之誠倍萬常品前件衣服謹詣銀臺門奉進輕瀆旒扆伏用兢惶衣一副四事黃折造衫一領白吳綾汗衫一領白花羅半臂一領白花羅袴一腰右伏以正陽令月誕聖嘉辰運協千年慶流萬國凡在臣子合有獻陳敢傾就日之心願奉如山之壽輕瀆宸扆無任兢惶右伏以收穫之餘田獵有獲異於芻豢著在方書既堪充庖輒敢上獻前件野豬謹隨狀進謹奏集賢殿御書院開元東封圖一面右臣謹桉開元十三年元宗皇帝以天下太平登封東嶽聲名文物振耀古今伏惟陛下丕承耿光再闡鴻業祖宗盛事紹復有期臣所以寫成此圖輒敢上獻至於繪畫躬自指撝徵史氏之文纂禮容之要山川氣象悉擬真形羽衞威儀咸稽故實所冀睿情一覽遐想元蹤臣叨榮過深抱疾已久望陛下告成之日心必前知嗟老臣將謝之年身恐不見疲羸之際感激倍深前件圖差某官乙謹詣光順門奉進謹奏具官臣某右臣今日至長樂驛高品某奉宣聖旨賜臣酒食者伏以恩降王人榮分御膳未展儀於雙闕先受賜於八珍品越脤膰味兼醪醴頓驚凡口倍益歡心無任欣躍具官臣某右高品某乙奉宣聖旨賜臣食者出自大官飫於私第光榮曲被猥承推食之恩駑蹇未施益重素餐之責舉其匕筯若負邱山無任戰荷踊躍之至淮南節度觀察處置等使敕賜貞元廣利方五卷右臣得新羅賀正使忭如言狀稱請前件方狀一部將歸本國者伏以纂集神效出自聖衷藥必易求疾無隱狀搜方技之祕要拯生靈之夭瘥坐此華胥咸躋仁壽遂令絕域逖聽風聲美茲豐功爰有誠請以其久稱藩附素混車書航海獻琛既已通於華禮釋疴蠲癘豈獨隔於外區正當四海為家冀覩十全之效臣即欲寫付未敢自專謹錄奏聞具官臣某右臣今日發至長樂驛中使某奉宣聖旨賜臣食者伏以味兼海陸品溢圓方降自御廚光臨傳舍臣初辤魏闕倍懷犬馬之誠猥受珍羞更切稻粱之感無任欣躍御史臺宣歙池等州都團練判官監察御史裏行崔㣥右臣蒙恩授監察御史伏準建中元年正月五日制常參官上後三日舉一人自代者伏以前件官在諸生中號為國器縶維外府人咸惜之臣既深知敢舉自代尚書屯田某官等守開州刺史柳公綽右臣蒙恩授尚書屯田員外郎伏準建中元年正月五日制常參官上後三日舉一人自代者伏以前件官以賢良方正再敭王庭在流輩間號為端士昨除遠郡人皆惜之臣初蒙授官得以論薦多士之內非無其人竊惟用材宜自遠始謹具如前謹錄奏聞伏聽敕旨東都尚書省前左補闕姜倫右臣蒙恩授尚書主客郎中分司東都伏準建中元年正月五日敕常參官上後三日舉一人自代者臣伏詳詔旨欲達聰旁求發揚幽遠故人人得言所知不當循其階次也臣伏以前件官有儒學士行蒙以諫官徵會其年老被疾不堪上道有司桉視如狀不復逼迫至今家居而篤志無倦臣謹舉為郎吏分司別都冀優賢振滯兩得其道蘇州狀上中書門下諸道鹽鐵轉運江淮留後朝議郎守太僕少卿兼御史中丞上柱國賜紫金魚袋韋應物右臣蒙恩授蘇州刺史伏準建中元年正月五日制刺史上後舉一人自代者前件官歷掌劇務皆有美名執心不回臨事能斷今領職雖重本官尚輕伏以當州口賦首出諸郡况經災沴切在撫綏尚省無能輒敢公舉司榷筦之利誠藉時才流豈弟之風實惟邦本非敢臆說以塞詔書今具奏聞朝議大夫使持節蘇州諸軍事守蘇州刺史上柱國劉某右某今月六日到州上訖某山東一書生潦倒疎濶在少壯日猶不逮人况今衰遲智力愈短相公哀憐不遇擢授名邦實荷宏獎慚非器使伏以當州繇大之後物力蕭然肌寒殞仆相枕於野誓當悉心條理續具奏論才術素空憂勞方始懼無聞問忝負恩知不任瞻望懇迫之至右某素乏吏才謬居劇郡以無庸之器當難治之時恭守詔條勤求人瘼伏以聖德柔遠皇明燭幽凡有上陳皆可其奏遂令管見得及疲黎自承雨露之恩非有循良之政猥蒙朝獎特降命書顧縫掖之腐儒被華章之貴服有黷陟明之典誠招彼己之譏限以守官不獲拜謝瞻望榮感心魂載馳朝議大夫使持節汝州諸軍事守汝州刺史兼御史中丞充本州防禦使上柱國賜紫金魚袋劉某右某自領吳郡仍歲天災上稟詔條下求人瘼地包藪澤俗尚剽輕悉心撫綏用法擒擿事繁才短常積憂虞忽蒙天恩稍移近郡家本滎上籍占洛陽病辤江干老見鄉樹榮感之至實倍常情印綬所拘不獲拜謝瞻望德宇精誠坐馳無任感戀之至正議大夫使持節杭州諸軍事守杭州刺史上柱國賜紫金魚袋裴宏泰右臣蒙恩授汝州刺史兼御史中丞充本州防禦使伏準建中元年正月五日敕諸州刺史上後舉一人自代者伏以前件官前為九卿出領兩鎮頃因微累遂有左遷今授遠州物情未塞臣前任鄰接具知公才舊屈未伸輒舉自代汝州防禦使當使進奉籠母鷹六聯右伏以前件鷹等學習應期馴養斯至列於常貢有異眾禽受紲之時志巳存於雲外下韝之際思用展於軍前既懷百中之能願獻三驅之禮謹差防禦押衙景再休隨狀奏進以聞同州防禦使前諫議大夫蕭俶右臣蒙恩授同州刺史兼御史中丞充本州防禦長春宮等使伏準貞元二年正月二十四日敕上後三日舉一人自代者伏以前件官生於貴族伏膺儒門搢紳之間號為端士昨蒙朝獎冠於諫垣時方被病不果上道長告已滿塊然家居今聞疾瘳可以錄用臣與俶久同班列知其材能為官擇人敢舉自代同州狀上中書門下今月十六日德音右被刑部牒宣示德音伏以聖澤滋深新恩廣被言念正刑之外或有詿誤之徒爰降殊私特宏在宥瑕累咸滌危疑獲安此皆廟算弼諧致君及物事光前史功格上元某限以守官不獲隨例拜賀無任忭躍之至同州狀上中書門下改元赦書右伏奉今月一日制書改大和十年為開成元年大赦天下者伏以律首三元禮崇四始順陽和發生之德敷大號渙汗之恩宥過恤刑弛征已責盡去人瘼通知物情德音朝發於九天和氣夕周於四海此皆相公弼諧之道燮贊之功進熟於密勿之間發揚成滂沛之澤某恪守官業印綬所拘不獲隨例拜賀處士嚴毖右左庶子損之之孫國子司業士元之子舊名保嗣亦有官班頃者李賓客渤常與之游辟為桂州支使其後寄家汝海專靜自居某常典汝州與語甚熟歷代史及國朝故事悉能該通操心甚危觀跡相副未逢知己已過壯年汨沒風塵有足悲者伏見赦文節目委州郡長吏搜訪隱淪夫舉無它唯善所在每覽珠英卷後列學士姓名有常州人符鳳白衣在選取其藝業不棄遠人某忝被儒官得以薦士亦非出位冀不廢言儻宏文集賢史氏之館采其實學有勸諸生伏以桂州辟之於前某薦之於後豈必有土長吏然後事行伏惟試味斯言降意詳擇謹狀處士王龜古者選公族大夫必以惇惠者教之文敏者道之果敢者諗之鎮靜者循之孜孜於此者蓋膏粱之性難正而懼公侯之允不能嗣其耿光可以深惜然則成宣之後而老為大夫非恥乎此智武子誡文子既冠而見之詞也是知古之取士不專寒族必參用世冑以廣得人之路今見處士王龜即居守之第三子也天性貞靜操心甚危不由門資誓志自立樂處士之號不汨綺襦之間自到洛都便居山寺耽玩墳籍放情煙霞曾邀與語如鋸木屑信有稟受居然出㣥以比在京師甚足知者諫院有狀名流亟言某流滯周南靜閱時輩身雖不用心甚愛才况遇相公持衡敢有所啟誠懸之下輕重難欺伏惟深賜詳擇知卿族之內有遺逸焉謹狀正議大夫檢校禮部尚書兼太子賓客分司東都劉某狀月日故吏守朗州司馬員外置同正員劉某謹齋沐致誠命僕夫持書敢獻於司徒相公閤下昔稱韓非善著書而說難孤憤尤為激切故司馬子長深悲之為著於篇顯白其事夫以非之書可謂善言人情使逢時遇合之士觀之固無以異於它書矣而獨深悲之者豈非遭罹世故益感其言之至邪小人受性顓蒙涉道未至末學見淺少年氣麤常謂盡誠可以絕嫌猜徇公可以弭讒愬謂慎獨防微為近隘謂艱貞用晦為廢忠芻狗已陳刻舟徒識罟獲隨足悵然無知事去凝想時時自笑然後知韓非之善說司馬子長之深悲跡符理會千古相見雖欲勿悲可乎大凡恆人之所以靈於庶類以其能㣥以勝物也烈士之所以異於恆人以其仗節以死誼也然則交相喪者世與道難合并者機與時是以有死誼之心而卒不獲其所者世人悲之獲其所矣而一旦如不得終焉者君子悲之世人之悲悲其不遇無成而虧故其感也近君子之悲悲其不幸既得而喪故其感也深其悲則同其所以為悲則異若小人者其不幸歟間者昧於藩身推致危地始以飛謗生釁終成公議抵刑旬朔之間再投裔土外黷相公知人之鑑內貽慈親非疾之憂常恐恩義兩乖家國同負寒心銷志以生為慚雖欲瀝血以自明籲天以自訴適足來眾多之誚豈復有特達見知者耶遂用詛盟於心不獲自白以內咎為弭謗之具以吞聲為窒隙之媒庶乎日月至焉而是非乃辨會友人江陵法曹掾韓愈以不幸相悲且曰相國扶風公之遇子也厚非獨余知之天下之人皆知之矣余聞初子之橫為口語所中獨相國深明之及不得已而退則為之流涕以訣又不得已而譴則為之擇地以居求之於今難與侔矣抑余又聞曩子之介於司徒府奉誠敬於山園上公亟稱於人以為不懈於位今則有修儀以贊其詔相者有備物以贊其容衞者七月禮畢一朝慶行誥言敭之授以顯秩子獨足趾一跌而前勞併捐祝網之辰動絓疎目可封之代乃為窮人斯常情之所悲矧知子之厚者夫踣者思起必謼而求拯疾者思愈必呻而求醫子宜謼於有力而呻於有術如何以箝口自絕為智以甘心受誣為賢嗛然自咎求知於默彼李斯逐焉而為上卿鄒陽囚焉而為上客二子者豈默以求知者邪若可訴而不言則陷於畏可言而不辯則鄰於怨畏與怨君子之所不處子其處之哉韓生之言未及竟而小人不知感從中來始赧然以愧又缺然以慄終悄然以悲悲斯歎歎斯憤憤必有泄故見乎詞敢聞左右投所閔也嗟夫人之至信者心目也天性者父子也不惑者聖賢也然而於竊鈇而知心目之可亂於掇蜂而知父子之可間於拾煤而知聖賢之可疑况乎道謝孔顏恩異天性是非之際愛惡相攻爭先利途虞相軋則釁起希合貴意雖無嫌而謗生魯酒致邯鄲之圍飛鳶生博者之禍伯仁之殺由偶對伯奢之冤以器聲動罹險中皆出意表雖欲周防亦難曲施加以吠聲者多辨實者寡飛語一發臚言四馳萌牙始奮枝葉俄茂方謂語怪終成禍梯嗚呼人必求知不能自達何投分效節有積塵之難何譖行愛弛有決防之易何將進之日必自見其可而後親何將退之時乃人言其否而遂棄良由邪人必微邪謀必陰陰則難明微則易信罔極大甚古今同途是以前修鑒其若此姑以推心取信不以循迹生嫌由是求忠臣於孝子求良婦於罵已食子盡節也推其忍可以疑心放麛違命也推其仁可以屬國若謂其孝於親未必能忠專於夫未必能貞忍於子未必能忍於其它仁於獸未必能仁於其類則是天下之人盡不可信而盡可誣固不然也凡人之行巳必恆於所安苟非狂易不能甚異小人自居門下僅踰十年未嘗信宿而不侍坐率性所履固無遁逃言行之間足見真態伏惟推心以明其迹追往以鑒於今苟謂其嘗掩人以自售矣嘗近名以冒進矣嘗欺謾於言說矣嘗沓貪於求售矣嘗狎比其瑣細矣嘗媒孼其僚友矣嘗矯激以買直矣嘗詀讘以取容矣嘗漏言於咨諏矣嘗敗務以簿書矣有一於此雖人謂其賢我得而刑也豈止於棄乎苟或反是雖人謂其盜我得而任也庸可而棄乎由是而言小人之善否不在眾人所以受譴已還行及半歲當食而歎聞弦尚驚不以眾人之善為是非唯以相公之意為衡準自違間左右亟蒙簡書慰誨勤勤窮顇增感伏想仁念必思有以拯之况禮道貴終人情尚舊嘗盡其力必加以仁於犬馬之微有帷葢之報顧異於是豈無庶幾儻浮言可以事久而明眾嗤可以時久而息宏我大信以袪㣥疑使㷀㷀微志無已矣之歎覬乎異日得夷平民然後裹足西向謝恩有所復以塵纓黧貌稱故吏於相門此言朝遂可以夕死何則復於變者其義重拯於危者其感深暌而後合示終不可暌也否而後泰示終不及否也獲寶於已喪得途於既迷與夫平居不為艱故所激者其味異矣伏以大君繼明元宰柄用鴻鈞播平分之氣懸象廓無私之照渙汗大號與人惟新昭回汪濊旁下郡國投荒為民者咸釋拲梏遂還里閭繫於稍食猶在羈絆伏讀赦令許移近郊今武陵距京師贏二千者無幾小人祖先壤樹在京索間瘠田可耕陋室未毀濡露增感臨風永懷伏希閔其至誠而少加推恕命東曹補吏置籍於滎陽伍中得奉安輿而西拜先人松檟誓當齎志沒齒盡力於井臼之間斯遂心之願也如或官謗未塞私欲未從雖為裔民乃有善地則北距澧浦資宿舂而可行無道途之勤蠲僕賃之費重以鎮南用和輔理扇仁風於上游霽嚴施惠得以自遂斯便家之願也伏惟降意詳察擇可行者處之乞恩於指顧之間為惠有生成之重雖百穀之仰膏雨豈喻其急焉嗟哉小生仕逢聖日豈曰不辰知有相居豈曰不遇而乘運鍾否俾躬罹災同生無手足之助終歲有病貧之厄孰不求達而獨招嫌孰不求安而獨乖次賦命如此雖悔可追湘沅之濱寒暑一候陽雁纔到華言罕聞猿哀鳥思啁啾響異莫夜之後併來愁腸懷鄉倦越吟之苦舉目多似人之喜俯視遺體仰安高堂悲愁惴慄常集方寸盡意之具固不在言身遠與寡捨茲何託是以因言以見意恃舊以求哀敢希末光下燭幽蟄孤志多感重恩難忘顧瞻門館慚戀交會伏紙流涕不知所云禹錫惶悚再拜禹錫在兒童時已蒙見器終荷薦寵始見知名眾之指目忝閣下門客懼無以報稱故厚自淬琢靡遺分陰乃今道未施於人所蓄者志見志之具匪文謂何是用顓顓懇懇於其間思有所寓非篤好其章句沈溺於浮華時態眾尚病未能也故拙於用譽直繩朗鑒樂所趨也故銳於求益今謹錄近所論撰凡十數篇蘄端較是非敢關於左右猶夫礦朴納於容範嘗聞昔宋廣平之沈下僚也蘇公味道時為繡衣直指使者廣平投以梅花賦蘇盛稱之自是方列於聞人之目是知英賢卓犖可外文字然猶用片言借說於先達之口席其勢而後驤首當時矧碌碌者疇能自異今閣下之名之位過於蘇公之曩日而鄙生所賦或鉅於梅花則沈泥干霄懸在指顧間其詞汰而喻僣誠黷禮也繄游藩之久覬尚舊而霽嚴禹錫惶悚再拜
