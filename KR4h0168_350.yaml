front:
  text: 全唐文欽定全唐文卷三百五十李白四亠兊州任城縣令廳壁記風姓之後國為任城蓋秦之古縣也在禹貢則南徐之分當周成乃東魯之邦自伯禽至於傾公三十四代遭楚蕩滅因屬楚焉炎漢之後更為郡縣隋開皇三年廢高平郡移任城於舊居邑雖屢遷井則不改魯境七百里郡有十一縣英華云十三縣任城當其要衝東盤琅琊西控巨野北走厥國南馳互鄉青帝太昊之遺墟白衣尚書之舊里也土俗古遠風流清高賢良閒生掩映天下地博厚川疏明漢則名王分茅魏則天人列土所以代變豪侈家傳文章君子以才雄自高小人則鄙朴難治況其城池爽塏邑屋豐潤香閣倚日淩丹霄而欲飛石橋橫波驚彩虹而不去其雄麗坱圠有如此焉故萬商往來四海帛丿糸歷實泉貨之橐籥為英髦之咽喉故資大賢以主東道製我美錦不易其人今鄉二十六戶一萬三千三百七十一英華云一十七帝擇明德以賀季真宰之公溫恭克修儼碩有立季野備四時之氣士元非百里之才撥煩彌閒剖劇無滯鏑百發克破於楊葉刀一鼓必合於桑林寬猛相濟韋弦適中一之歲肅而教之二之歲惠而安之三之歲富而樂之然後青襟向訓黃髮禮履耒耜就役農無遊手之夫杼軸和鳴機罕嚬蛾之女物不知化陶然自春權豪鋤縱暴之心黠吏返淳和之性行者讓於道路任者併於輕重扶老攜幼尊尊親親千載百年再復魯道非神明博遠孰能契於此乎白探奇東蒙竊聽輿論輒記於壁垂之將來俾後賢之操刀知賀公之絶迹者也
  hash: sha256:42d3173a2fb262808b09f1f5885bdc94566b0166ab56e36f2f1d35c540ba6699
body:
  text: 嬴氏穢德金精摧傷秦鹿克獲漢風飛揚赤龍登天白日升光陰虹賊虐諸呂擾攘朱虛來歸會酌高堂雄劒奮擊太后震惶爰鋤産祿大運乃昌功冠帝室於今不亡嶧陽孤桐石聳天骨根老冰泉葉苦霜月斫為緑綺徽聲粲發秋風入松萬古奇絶至人之心如鏡中影揮斥萬變動不離靜彼質我斤揮風是騁了物無二皆為匠郢吾族賢老名喧寫真貌圖粉繪生為垢塵從白得衰與天為鄰儼然不語長存此身齊表巨海吳嗟大風崔為令族出自太公克生奇才骨秀神聰炳若秋月騫然雲鴻爰圖伊人奪妙真宰卓立欲語謂行而在清晨一觀爽氣十倍張之座隅仰止光彩天垂元精嶽降粹靈應期命世大賢乃生吐奇獻策敷聞王庭帝用休之揚光泰清濫觴百里涵量八溟縉雲飛聲當塗政成雅頌一變江山再榮舉邑抃舞式圖丹青睂秀華蓋目朗明星鶴矯閬風麟騰玉京若揭日月昭然運行窮神闡化永世作程大名之家昭彰日月生此髦士風霜秀骨圖真象賢傳容寫髮束帶嶽立如朝天闕巖巖兮謂四方之削成淡淡兮申五湖之澄明武庫肅穆辭峰崢嶸大辨若訥大音希聲默然不語終為國楨太華高嶽三峰倚天洪波經海百代生賢為夔為龍廓土濟川趙城開國玉樹淩烟筆鼓元化形分自然明珠獨轉秋月孤懸作宰作程摧剛挫堅德合窈冥聲播蘭荃鴻漸麟閣英圖可傳水中之月了不可取虛空其心寥廓無主錦幪鳥爪獨行絶侶刀齊尺量扇迷陳語丹青聖容去住無所我聞金方之西日沒之所去中華十萬億剎有極樂世界焉彼國之佛身長六十萬億恆沙由旬睂間白毫向右宛轉如五須彌山目光清白若四大海水端坐說法湛然常存沼明金沙岸列珍樹欄楯彌覆羅網周張硨磲琉璃為樓殿之飾頗黎碼瑙耀階砌之榮皆諸佛所證無虛言者金銀泥畫西方淨土變柑蓋馮翊郡秦夫人奉為亡夫湖川刺史韋公之所建也夫人蘊冰玉之清敷聖善之訓以伉儷大義希拯拔於幽塗父子恩深用薰修於景福誓捨珍物購求名工圖金創端繪銀設像八法功德波動青蓮之池七寶香花光映黃金之地清風所拂如生五音百千妙樂咸疑動作若已發願及未發願若已當生及未當生精念七日必生其國功德罔極酌而難名讚曰向西日沒處遙瞻大悲顏目淨碧海水身光紫金山勤念必往生是故稱極樂珠網珍寶樹天花散香閣圖畫了在眼願托彼道場以此功德海冥祐為舟梁八十一劫罪如風掃輕霜庶觀無量壽長放玉毫光佽飛斬長蛟遺圖畫中見登舟既虎嘯激水方龍戰驚波動連山拔劒曳雷電鱗摧白刃下血染滄江變感此壯古人千秋若對面羽林列衛壁壘南垣四十五星光輝至尊范公拜將遙承主恩位寵虎臣封傳雁門瞻天蹈舞踊躍精魂逐逐鶚視昂昂鴻騫心豪祖逖氣爽劉琨名震大國威揚列藩麟閣之階粉圖華軒胡兵百萬橫行縱吞爪牙帝室功業長存突兀枯樹傍無寸枝上有蒼鷹獨立若愁胡之攢睂凝金天之殺氣凜粉壁之雄姿觜銛劒㦸爪握刀錐㣥賓失席以眙未悟丹青之所為吾嘗恐出戶牖以飛去何意終年而在斯張公之堂華壁照雪師猛在圖雄姿奮發森竦睂目颯灑毛骨鋸牙銜霜鈎爪抱月掣蹲胡以震怒謂大厦之嶢屼永觀厥容神駭不歇高堂閒軒兮雖聽訟而不擾圖蓬山之奇禽想瀛海之縹眇紫頂烟赩丹眸星皎昂昂眝眙霍若驚矯形留座隅勢出天表謂長唳於風霄終寂立於露曉凝玩益古俯察逾妍舞疑傾市聽似聞絃儻感至精以神變或可弄影而浮烟神妙不死惜生此身託體明淑而稱厥親粉為造化筆寫天真貌古松雪心空世塵文伯之母可以為鄰大雄掩照日月崩落惟佛智慧大而光生死雪賴假普慈力能救無邊苦獨出曠劫導開橫流則地藏菩薩為當仁矣弟子扶風竇滔少以英氣爽邁結交王侯清風豪俠極樂生疾乃得惠劒於真宰湛本心於虛空願圖聖容以祈景福庶冥力憑助而厥苦有瘳爰命小才式讚其事讚曰本心若虛空清淨無一物焚蕩淫怒癡圖寂了見佛五綵圖聖像悟真非妄傳掃雪萬病盡爽然清涼天讚此功德海永為曠代宣海英嶽靈誕彼開士了身皆空觀月在水如薪傳火朗徹生死如雲開天廓然萬里寂滅為樂江海而閒逆旅形內虛舟世閒邈彼崑閬誰云可攀噫天以震雷鼓㣥動佛以鳴鐘警大夢而能發揮沈潛開覺茫蠢則鐘之取象其義博哉夫揚音大千所以清真心警俗慮協響廣樂所以達元氣彰天聲銘勳皇宮所以旌豐功昭茂德莫不配美金鼎增輝寶坊仍事作制豈徒然也粵有唐宣城郡當塗縣化城寺大鐘者量函千鈞聲盈萬壑蓋邑宰李公之所創也公名有則系元元之英蕤茂列聖之天枝生於公族貴而秀出少蘊才略壯而有成西逾流沙立功絶域帝疇乎厥庸始學古從政歷宰潔白聲聞於天天書裦榮輝之簡牘稽首三復子孫其傳天寶之初鳴琴此邦不言而治日計之無近功歲計之有大利物不知化潛臻小康神明其道越不可尚方入於禪關覩天宮崢嶸聞鐘聲瑣屑乃謂諸龍象曰曷不建大法鼓樹之層臺使㣥聾六時有所歸仰不亦美乎於是發一言以先覺舉百里而咸應秋毫不挫人多子來銅崇朝而山積工不日而雲集今乃採鳬氏撰鳴鐘火天地之爐扇陰陽之炭回祿奮怒飛廉震驚金精轉涾以融熠銅液星熒而㸌火蒦光噴日道氣歊天維紅雲點於太清紫烟矗於遙海烜赫宇宙功侔鬼神瑩而察之吁可駭也爾其龍質炳發虎形躨跜縻金索以上絙懸寶樓而迭擊傍振萬壑高聞九天聲動山以隱隱響奔雷而闐闐救湯鑊於幽途息劒輪於苦海景福月人丁蠁被於人天非李公好謀而成宏濟㣥物又孰能與於此乎丞尉等並衣冠之龜龍人物之標準大雅君子同僚盡心聞善賈勇贊成厥美寺主升朝閒心古容英骨秀氣灑落毫素謙柔笑言海受水而皆納鏡無形而不燭直道妙用乃如是然常虛懷忘情潔已利物是人行空寂不動見如來有若上座靈隱都維冉則舒名僧日暉蘊虛常因調護賢哉六開士普聞八萬法深入禪惠精修律儀將博我以文章求我以述作功德大海酌而難名遂與六曹豪吏姑熟賢老乃緇乃黃鳬趨梵庭請揚宰君之鴻美白昔忝侍從備於辭臣恭承德音敢闕清風之頌其辭曰雄雄鴻鐘砰隱天雷鼓霆擊警大千含號烜赫聲無邊摧懾魑魅招靈仙傍極六道下九泉劒輪輟苦期息肩湯鑊猛火停熾然愷悌賢宰人父母興功利物信可久傳芳金鐘永不朽梁山博望關扃楚濱夾據洪流實為吳津兩坐錯落如鯨張鱗惟海有若惟川有神牛渚怪物目圍車輪光射島嶼氣淩星辰卷沙揚濤溺馬殺人國泰呈瑞時訛返珍開則九江納錫閉則五嶽飛塵天險之地無德匪親太虛既張惟天之長所以白帝真人當高秋八月五日降西方之金精採天長為名將傳之無窮紀聖誕之節也我高祖創業太宗成之三后繼統王猷如一大盜閒起開元中興力倍造化功包天地不然何能遏犧農之頽波返淳朴於太古雖軒后至道由聞蚩尢之師今網漏吞舟而胡夷起於轂下先天文武孝感皇帝越在明兩總戎扶風正帝車於北斗拯橫流於鯨口回日轡於西山拂蒙塵於帝顏呼吸而收兩京烜爀而安六合歷列辟而罕匹顧將來而無儔太陽重輪合耀並出宇宙翕變草木增榮一麾而靜妖氛成功不處五讓而傳劒璽德冠樂推於戲昔堯及舜禹皆無聖子審歷數去已終大寶假人飾讓以成千載之美未若以文明鴻業授之元良與天同休相統億祀則我唐至公而無私越三聖而殊軌騰萬人之喜氣爛八極之祥雲上皇思汾陽而高蹈解負重於吾君能事斯畢與人更始乃展祀郊廟望秩山川方掩骼於河洛弔人於幽燕但誅元凶不問小罪噫大塊之氣歌炎漢之風雲滂洋雨汪濊澡渥澤除瑕纇削平國步改號乾元至矣哉其雄圖景命有如此者我邦伯韋公大彭之洪允扶陽之貴族雄略邁古高文變風運當時賢才堪三事歷職剖劇能聲旁流衣繡而白筆橫冠分符而彤䄡入境曩者永王以天人授鉞東巡無名利劒承喉以脅從壯心堅守而不動房陵之俗安於泰山休奕列郡去若始至帝召岐下深嘉直誠移鎮夏口救時艱也慎厥職康乃人減兵歸農除害息暴大水滅郭洪霖注川人見憂於魚鱉岸不辨於牛馬公乃抗辭正色言於城隍曰若一日雨不歇吾當伐喬木焚清祠精心感動其應如響無何中使銜命遍祈名山廣徵牲牢驟欲致祭公又盱衡而稱曰今皇上明聖懷於百靈此淫昏之鬼不載祀典若煩國禮是荒巫風其秉心達誠皆此類也物不知化如登春臺有若江夏縣令嶭公揖四豪之風當百里之寄幹蠱有立含章可貞遵之典禮恤疲於和樂政其成也臻於小康中京重覩於漢儀列郡還聞於舜樂選鄂之勝帳於東門乃登豳歌擊土鼓祀蓐收迎田祖招搖回而大火乃落閶闔啓而涼風始歸笙竽和籥之音象星辰而迭奏吳楚巴渝之曲各土風而備陳禮容有穆簪笏列序羅衣蛾睂立乎玳筵之上班劒虎士森乎翠幕之前千變百戲分曹賈勇藺子跳劒迭躍流星之輝都盧尋橦倒掛浮雲之影百川繞郡落天鏡於江城四山入牖照山空之海色獻觴醉於晚景舞袖紛於廣庭鶴髮之叟雁序而進曰恭聞天子無戲言恐轉公以大用老父不畏死願留公以上聞悅坐棠而餐風庶刻石以置美白觀樂入楚聞韶在齊採諸行謠遂作頌曰爽朗太白雄光下射崢嶸金天華嶽旁連降精騰氣赫矣昭然誕聖五日垂休萬年孽胡挺災大人有作雷電發揚欃槍乃落九服交泰五雲縈薄掃雪屯蒙洗清寥廓軒后訪道來登峨睂上皇西去異代同時六龍轉駕兩曜回規重遭唐主更覩漢儀肅肅韋公大邦之翰秀骨嶽立英謀電斷宣風樹聲遠威逆亂不長不極樂奏爭觀丸劒揮霍魚龍屈盤東回舞袖西笑長安頌聲載路豐碑是刊仲尼大聖人也宰中都而四方取則子賤大賢也宰單父人到於今而思之乃知德之休明不在位之高下其或繼之者得非韓君乎君名仲卿南陽人也昔延陵知晉國之政必分於韓獻子雖不能遏屠岸之誅存孤嗣趙太史公稱天下陰德也其賢才羅生列侯十世不亦宜哉七代祖茂後魏尚書令安定王五代祖鈞金部尚書曾祖晙銀青光祿大夫雅州刺史祖泰曹州司馬考睿素朝散大夫桂州都督府長史分茅納言剖符佐郡奕葉明德休有烈光君乃長史之元子也妣有吳錢氏女及長史即世夫人早孀宏聖善之規成名四子文伯孟軻二母之儔歟少卿當塗縣丞感慨重諾死節於義雲卿文章冠世拜監察御史朝廷呼為子房紳卿尉高郵才名振耀幼負美譽君自潞州銅鞮尉調補武昌令未下車人懼之既下車人悅之惠如春風三月大化姦吏束手豪宗側目時有爨玉者三江之巨橫白額且去清琴高張兼操刀永興二邑同化時鑿齒磨牙而兩京城守易子而炊骨吳楚轉輸蒼生熬然而此邦宴如襁負雲集居未二載戶口三倍其初銅鐵曾青不擇地而出大冶鼓鑄如天降神既烹且爍數盈萬億公私其賴之官絶請託之求吏無絲毫之犯本道採訪大使皇甫公侁聞而賢之擢佐輶軒多所宏益尚書右丞崔公禹稱之於朝相國崔公渙特奏授鄱陽令兼攝數縣所為投刀而皆虛為政則理成去若始至人多懷恩新宰王公名庭璘巖然太華浼然洪河含章可貞幹蠱有立接武比德弦歌連聲服美前政聞諸耆老與邑中賢者胡思泰一十五人及諸寮吏式歌且舞願揚韓公之遺美白採謠刻石而作頌曰峨峨楚山浩浩漢水黃金之車大吳天子武昌鼎據實為帝里時囏世訛薄俗如燬韓君作宰撫茲遺人滂注王澤猶鴻得春和風潛暢惠化如神刻石萬古永思清塵王者立國君人聚散六合咸土以百里雷其威聲革其俗而風之漁其人而函之其猶衆鮮洋洋樂化在水波而動之則憂赬尾之刺作焉徐而清之則安頒首之頌興焉苟非大賢孰可育物而能光昭絃歌卓立振古則有虞城宰李公焉公名錫字元勳隴西成紀人也高祖楷隋上大將軍帛丿糸益原三州刺史封汝陽公曾祖騰雲皇朝廣茂二州都督廣武伯祖立節起家韓王府記室參軍襲廣武伯父浦郢海淄唐陳五州刺史魯郡都督廣平太守襲廣武伯皆納忠王庭名鏤鐘鼎侯伯繼迹故可略而言焉公即廣武伯之元子也年十九拜北海壽光尉心不挂細務口不言人非㣥吏罕測望風敬憚秩滿轉右武衛倉曹參軍次任趙郡昭慶縣令奉詔修建初啓運二陵總徒五郡支用三萬貫舉築雷野不鞭一人功成餘八千貫其幹能之聲大振乎齊趙矣時名卿巡按陵有黃赤氣上衝太微散為慶雲數十處蓋精誠動天地也如此因粉圖奏名編入國史天寶四載拜虞城令而天章寵榮俾金玉王度炯若七耀昭回堂隅於戲敬之哉宸威臨顧作訓以理其俗魯而木舒而徐急則狼戾緩則鳥散公酌以鈞道和之琴心於是安四人敷五教處必礪食行惟單車觀其約而吏儉仰其敬而俗讓激直士之素節揚廉夫之清波三月政成鄰境取則因行春見枯骸於路隅惻然疚懷出俸而葬由是百里掩骼四封歸仁有居喪行號城市者習以成俗公勗之親鄰厄以凶事而鰥寡惸獨衆所賴焉可謂變其頽風永錫爾類先時邑中有聚黨橫猾者實惟二耿之族幾百家焉公訓為純人易其里曰大忠正之里北境黎邱之古鬼焉或醉父以刃其子自公到職蔑聞為災官宅舊井水清而味苦公下車嘗之莞爾而笑曰既苦且清足以符吾志也遂汲用不改變為甘泉蠡邱館東有三柳焉公往來憩之飲水則去行路勿翦比於甘棠鄉人因樹而書頌四十有六篇惟公志氣塞乎天地德音發乎聲容縞乎若寒崖之霜湛乎若清川之月彈惡雪善速若箭飛尢能筆工新文口吐雅論天下美士多從之遊非汝陽三公二伯之積德則何以生此邑之賢老劉楚王褱等乃相謂曰我李公以神明之化大賴於虞人虞人陶然詠歌其德官則敬去則思山川鬼神猶懷之況於人乎乃咨㣥寮興去思之頌縣丞王彥暹員外丞魏陟主簿李詵縣尉李向趙濟盧榮等同德比義好謀而成相與採其王褱蹤茂行俾刻石篆美庶清風令名奮乎百世之上其詞曰激揚之水兮白石有鑿李公之來兮雪虞人之惡厥德孔昭折獄既清五教大行殷雲雷之聲既父其父又子其子春之以風化成草靡乃影我岡乃雨我田陽無驕愆四載有年人戴公之賢猶百里之天棄余往矣茫如墜川哀喪惠博掩骼仁深苦井變甘凶人易心三柳勿翦永思清音嗚呼紫陽竟夭其志以默化不昭然白日而升九天乎或將潛賓皇王非世所測闕十一字挺列仙明拔之英姿明堂平白長耳廣顙揮手振骨百關有聲殊毛秀采居然逸異闕十字而且達河龜鶴早世而蟪蛄延秋元命乎遭命乎余長息三日懵於變化之理先生姓胡氏闕六字族也代業黃老門清儒素皆龍脫世綱鴻冥高雲但貴天爵何徵閥閲始八歲經仙城山闕十一字有清都紫微之遐想九歲出家十二休糧二十遊衡山雲尋洞府水涉溟壑神王闕八字召為威儀及天下採經使因遇諸真人授赤丹陽精石景水母故常吸飛根吞日魂密而修之闕六字所居苦竹院置餐霞之樓手植雙桂棲遲其下聞金陵之墟道始盛於三茅波乎四許華陽闕七字陶隱居傳升元子升元子傳體元體元傳貞一先生貞一先生傳天師李含光李含光合契乎紫陽闕五字於神農之里南抵朱陵北越白水稟訓門下者三千餘人鄰境牧守移風問道忽遇先生之宴坐闕五字隱機雁行而前為時見重多此類也天寶初威儀元丹邱道門龍鳳厚禮致屈傳籙於嵩山東京大唐闕二字宮三請固辭偃臥未幾而詔書下責不得已而行入宮一革軌儀大變都邑然海鳥愁臧文之享猿狙裂周公之衣志往迹留稱疾辭帝克寸期離闕臨別自祭其文曰神將猒余余非猒世乃顧命姪道士胡齊物具平肩輿歸骨舊土王公卿士送及龍門入葉縣次王喬之祠目若有覩泊然而化天香引道尸輕空衣及本郡太守裴公以幡華郊迎舉郭雷動南闕三字開顏如生觀者日萬㣥議駭俗至其年十月二十三日葬於郭東之新松山春秋六十有二先生含宏光大不修小節書不盡妙鬱有崩雲之勢文非夙工時動雕龍之作存也宇宙而無光歿也浪化而蟬蛻豈闕八字乎有鄉僧貞倩雅仗才氣請余為銘余與紫陽神交飽餐素論十得其九弟子元丹邱王闕等咸傃鸞鳳之儀羽想珠玉之雲氣灑掃松月載揚仙風篆石頌德與茲山不朽其詞曰賢哉仙士六十而化光光紫陽善與時而為龍蛇固亦以生死為晝夜有力者挈之而趨劫運頽落終歸於無惟元神不滅湛然清都延陵既歿仲尼嗚呼青青松柏離離山隅篆石頌德名揚八區皇唐葉有六聖再造八極鏡照萬方幽明咸熙天秩有禮自太古及今君君臣臣烈士貞女采其史傳名節尢彰可激清頽俗者皆掃地而祠之蘭蒸椒漿歲祀罔缺而茲邑貞義女光靈翳然埋冥古遠琬玉不刻豈前修博達者為邦之意乎貞義女者溧陽黃山里史氏之女也以家溧陽史闕書之歲三十弗移其志清英潔白事母純孝手柔荑而不龜身激漂以自業當楚平王時王虐忠助讒苛虐厥政芟於尚斬於奢血流於朝赤族伍氏怨毒於人何其深哉子胥始東奔勾吳月涉星遁或七日不火傷弓於飛逼迫於昭關匍匐於瀨渚舍車而徒告窮此女目色以臆授之壺漿全人自沈形與口滅卓絶千古聲淩浮雲激節必報之讐雪誠無疑之地難乎哉借如曹娥潛波理貫於孝道聶姊殞肆概動於天倫魯姑棄子以却三軍之衆漂毋進飯沒受千金之恩方之於此彼或易爾卒使伍君開張闔閭傾蕩鄢郢吳師鞭尸於楚國申胥泣血於秦庭我亡爾存亦各壯志張英風於古今雪大憤於天地微此女之力雖員為忠孝之士焉能咆哮烜爀施於後世耶望其溺所愴然低佪而不能去每風號吳天月苦荊水響像如在精魂可悲惜其投金有泉而刻石無主哀哉邑宰滎陽鄭公名晏家康成之學世子産之才琴清心閒百里大化有若主簿扶風竇嘉賓縣尉廣平宋陟丹陽李濟南郡陳然清河張昭皆有卿才霸略同事相協緬紀英淑勒銘道周雖陵頽海竭文或不死其辭曰粲粲貞女孤生寒門上無所天下報母恩春風三十花落無言乃如之人激漂清源碧流素手縈彼潺湲求思不可秉節而存伍胥東奔乞食於此女分壺漿滅口而死聲動列國義形壯士入郢鞭尸還吳雪恥投金瀨沚報德稱美明明千秋如月在水謹以三牲之奠敬祭於長源公之靈惟神包括乾坤平準天地劃三峽以中斷疏九道以爭奔綱紀南維朝宗東海牲玉有禮祀典無虧今萬乘蒙塵五陵墋黷蒼生悉為白骨赤血流於紫宮宇宙倒懸欃槍未滅含識結憤思翦元凶而況參列雄藩各當重寄遵奉王命大舉天兵照海色於旌旗肅軍威於原野而洪濤渤潏狂飇振驚惟神使陽侯卷波羲和奉命樓船先濟士馬無虞掃妖孽於幽燕斬鯨鯢於河洛惟神祐我降休於民敬陳精誠庶垂歆饗年月日某謹以齊蔬之奠敢昭告於和尚之靈伏惟和尚降靈自天依化遊世角立獨出嶷然生知鳳凰開九苞之翼豫章橫萬頃之陂始傳燈而納照因落髮以從師邁龍象以蹴踏為天人之羽儀紹釋風於西域回佛日於東維若大塊之噫氣鼓和風而一吹熱惱清灑道芽榮滋走吳楚以宗仰將掃地而歸之嗚呼來無所從去復何適水還火歸蕭散本宅寶舟輟棹禪月掩魄痛一往而無踪愴雙林之變白某早乘訓誨偏倚恩慈忝餐風於法侶旋落蔭於禪枝號無輟響泣有餘悲手撰茗藥精誠嚴思冀神道之昭格庶明靈而饗之
