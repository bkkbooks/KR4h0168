front:
  text: 全唐文欽定全唐文卷三百八十六獨孤及三
  hash: sha256:a459379938c011236264c5a75316c8af0b5228d698be9bd3f474a55de1c9937a
body:
  text: 謹按禮經王者禘其祖之所自出以其祖配之凡受命始封之君皆為太祖繼太祖而下六廟則以親盡迭毀而太祖之廟雖百代不遷此五帝三王所以尊祖敬宗也故受命於神宗禹也而夏后祖顓頊而郊鯀纘禹黜夏湯也而殷人郊冥而祖契革命作周武王也而周人郊稷而祖文王則明自古必以首封之君配昊天上帝惟漢氏崛起豐沛豐公太公皆無位無功德不可以為祖宗故漢以高皇帝為太祖其先世微故也非足為後代法伏惟太祖景皇帝以柱國之任翼周弻魏肇成王業建封於唐高祖因之以為有天下之號天所命也亦猶契之封商后稷之封邰禘郊宗祖之位宜在百代不遷之典郊祀太祖宗祀高祖猶周之祖文王而宗武王也今若以高祖創業當躋其祀是棄三代之令典遵漢氏之末制黜景皇帝之大業同於豐公太公之不祀反古違道失孰甚焉夫追尊景皇帝廟號太祖高祖太宗所以崇尊尊之禮也時更七聖載經二百名臣碩儒備經討論未嘗有獻同異於宗廟今將議其全典變更先聖制度曷知其可若配天之位既易則太祖之號宜廢祀之不修廟亦當毀尊祖報本之道其墜於地乎漢制擅議宗廟以大不敬論今武德貞觀之憲章未改國家方將敬祀事以和神人禘郊之間恐非所宜言臣謹稽禮之舊文參諸夏殷周漢故事配饗天帝之制請仍舊典謹議太師稟天純懿為唐股肱兩朝當國庶績惟允論道賦政送往事居協恭秉彞動罔違德惠和以懋其事明哲以保其身昔嘗懸衡九流剖竹四郡刀尺之下無滯用襦袴之間無貧人洛陽居守東夏輯睦天寶之季二京為戎皇輿西狩億兆左袵太師踐危機不易心處橫潰不忘國奮身拔跡於豺狼之口道不汙而節不奪忠之大者至德乾元年中天下多故皇綱未張肅宗循漢宣故事用刑名繩下而太師以曹參為師持清靜守職勵翼王度將順事典人亦寧一厥猷茂焉能知人能官人慎選乃僚言刈其楚至有拔㣥萃而取公器不五六年比肩衮職者光映策府當代榮之漢史稱胡廣與故吏陳蕃并為三司太師有焉夫九德咸事寬為之首百工惟時哲則能惠宜其享天眉壽為國元老古者生以行觀其志歿以諡易其名諡之美惡視行之大小後代或三字以表德貞惠文子是也或二字以彰善酇文終侯留文成侯是也蓋其跡大名盛則禮優諡崇太師德冠搢紳位侔周召將加誄諡之制宜以酇留為准謹按大戴禮體和居中曰懿文賢有成曰獻稽千載之令典合二名以配德請諡曰懿獻謹議盧奕剛毅而忠直方而清勵精吏事所居可紀天寶十四載洛陽陷沒於時東京人士狼狽鹿駭猛虎磨牙而爭其肉居位者皆欲保性命而完妻子或先策高足爭脫羿彀或不恥苟活甘飲盜泉奕獨正身守位蹈義不去以死全節誓不辱身勢窘力屈以朝服就執猶慷慨感憤數賊梟獍之罪觀者股栗奕不變其色西向而辭君然後受害雖古烈士方之者鮮矣或曰洛陽之存亡操兵者實任其咎非執法吏所能抗師敗將奔去之可也委身寇仇以死誰懟及以為不然勇者禦而忠者守必社稷是衛則生死以之危而去之是智免也於忠何有蓋荀息殺身於晉不食其言也仲由結纓於衛不避其難也元冥勤其官而水死守位而忘軀也伯姬待保姆而火死先禮而後身也彼四人者死之日皆於事無補夫豈愛死而賈禍也以為死輕於義故蹈義而捐生古人書之使事君者勸然則祿山之亂大於里克孔悝廉察之任切於元冥之官分命所係不啻保姆逆黨兵威烈於水火於斯時也能與執干戈者同其戮力挽之不來推之不去豈不以師可虧義不可苟身可殺節不可奪故全其操持於白刃之下孰與夫懷安偷生者同其風哉謹按諡法圖國忘身曰貞秉德尊業曰烈奕執憲戎馬之間志藩王室可謂圖國矣國危不能救而繼之以死可謂忘身矣歷官十一任言必正事必果而清節不撓去之若始至可謂秉德矣先時黃門以直道佐時奕嗣之以忠純可謂尊業矣請諡曰貞烈謹議郭知運驍勇有謀善用兵起行間為唐上將當時唐興百餘載矣天下充富太倉有二十年之蓄元宗循漢武故事方鋭意拓土知運適與時會遂乘天威奮其材力敢與虜角故能破默啜可汗以靖其北庭敗吐蕃誅康待賓隴坻以西烽火為息慰薦麾下吏士任必以才往往超倫績用茂著王君奐比以果勇代處分閫之寄牛仙客出將入相以清幹信謹稱斯又獎拔之明也當時議者謂知運與郭虔瓘王晙薛訥并為中興名將至今隴上將士思之或有起祠宇於故城遺壘尸而祝之者上元中肅宗加太公望以武成王之號知運列於配食之位則是勳伐事業宜有以美稱易其名者謹按諡法服叛懷遠曰威易曰厥孚威如繫辭曰弧矢之利以威天下虞書曰董之用威傳曰非威非懷何以示德則威者聖人所以佐仁義以濟天下者也施於名號可以表將帥之德請諡知運曰威謹議禮時為大順次之將葬易名時也有故闕禮追遠請諡順也假如諸侯五月而葬魯惠公之薨也有宋師至隱公元年十月而改葬不以踰時廢禮又公叔戌請諡適當葬前謹按禮經曾不言已葬則不可追諡况帝王殊途不相沿襲新禮則死必有諡不云日月有時今請易名者五家無非葬後苗太師一年矣呂諲四年矣盧奕五年矣顏杲卿八年矣并荷裦寵無異同之論獨知運以其子不幸遂以過時見抑苟必以己葬未葬為節則夫八年與五四年者其緩一也而與奪殊制無乃不可乎議云己孤暴貴不為父作諡此謂其父無位而其子則居大官不當以已之貴加榮於父也禮不云乎父為士子為大夫葬以士禮若知運者處方面之寄位列九卿茂勳崇名與衛霍侔飾終之禮宜加於他將一等豈待因依嗣子然後作諡今之專征者雖逢風雲化為侯王其祖父爵位與知運齒者鮮矣奈何懼名器等於草芥以是殺禮竊為近誣乾元以來纍有詔追贈百官祖父內外文武具寮之先悉蒙恩錫或音徽久沫或墓木己拱受大名貴位於九原者以萬數未嘗以歿代遠近為限夫贈諡一也贈者一時之寵諡者不刊之令今以歲久而廢易名是王澤浹於天下而獨隔於一人也當開元二年吐蕃以舉國之師入五原塞擊柝之聲聞於咸雍知運與郭虔瓘討平之以張王室當時微知運則汧隴之西左衽是懼今朝廷方命將帥以征不服討不廷宜裦寵之以勸握兵者安可以葬久而廢大典况夫諡法者蓋考其言行事業之邪正必以字裦貶之使生者聞美諡而慕覩惡諡而懼不待賞罰而賢不肖皆勸是一字之諡賢於三千之刑本非為歿者之子孫以為哀榮寵贈之具假令知運無子且未嘗立功苟位至上將則諡不可廢豈以其子之存亡為請諡之可否竊稽載籍徵諸舊章易名之禮請如前議謹議呂諲任職從政聰敏肅給能以才智潤飾吏道至德中與三司同鞫大獄獨引律文附會經義而平反之當時卒用中典諲參其論在臺司齪齪雖無匪躬之能然平章法度守而勿失其為荊州一年有成號令明具賦斂均一物有制而事有倫大抵以威信為主戮陳希昂按申太芝之奸而三楚之人悅服厥功茂焉自至德以來荷推轂受脤之寄處方面者數十輩而將不驕卒不墮政修人和如諲者蓋鮮矣豈不以人散久矣而兵未戢挹濁流者難俟清整棼絲者難為功諲當此時能以慈惠易其疾苦且訓其三軍如臂使指闔境無拔葵噉棗之盜而楚人到於今猶歌咏之此其才略必有過人者雖欲勿裦之其可乎按諡法威德克就曰肅禁暴威也愛人德也考禮議名而擬諸形容請諡曰肅謹議呂諲任宰相日淺當時會肅宗躬親萬幾庶政㣥臣畏威奉職而已雖有謨謀於巖廊之上莫由有知之者及其荊門之政為仁由已其略見於事其惠被於物其風謠存乎人故得而稱之議名之際敢不闕其所疑而録其尤著者有司之職也其閲實詔獄在未執政之前已議之詳矣敢辱再告至若推進名賢使當大任既同溫室之樹且行狀所不載孔子曰君子於其所不知蓋闕如也故不書今奉符令必用二字且以忠配肅謹按舊儀凡歿者之故吏得以行狀請諡於尚書省而考行定諡則有司存朝廷辨可否宜任衆議今駮議撰諡異同之說并故吏專之伏恐亂庖人尸祝之分違公器不私之戒且非唐虞師錫僉曰之道昔周道衰孔子作春秋以繩當代而亂臣賊子懼諡法亦春秋之微旨也在懲惡勸善不在哀榮在議美惡不在字多文王伐崇周公殺三監誅淮夷晉重耳一戰而伯諸侯武功盛矣而皆諡曰文以冀缺之恪德臨事寧俞之忠於其國隨會之納諫不忘其師謀身不失其友其文德豈不優乎而并諡曰武固知書法者必稱其大而略其細故言武不言文言文不言武三代以下朴散禮壞乃有二字之諡二字諡非古也其源生於衰周施及戰國之君漢興蕭何張良霍去病霍光俱以文武大略佐漢致太平其事業不一謂一名不足以紀其善於是乎有文終文成景桓宣成之諡雖瀆禮甚矣然猶裦不失人唐興參用周漢之制謂魏徵以王道佐時近文極言直諫愛君而忘身近貞二德并優廢一莫可故曰文貞公謂蕭瑀端直鯁亮近貞性多猜二近褊言褊則失其謇正稱貞則遺其吝狹非一言所能名故曰貞褊公其餘舉凡推類大抵準此皆有為為之也若跡無殊途事歸一貫則直以一字目之故杜如晦諡成封德彞諡明王圭諡懿陳叔達諡忠溫彥博諡恭岑文本諡憲韋巨源諡昭唐休璟諡忠魏知古諡忠崔日用諡昭其流不可悉數此并當時赫赫以功名居宰相位者諡不過一字不聞其子孫佐吏有以字少稱屈者由此言之二字不必為裦一字不必為貶若裦貶果在字數則是堯舜禹湯文武成康不如周威烈王慎靚王也齊桓晉文不如趙武威魏安釐秦莊襄楚考烈也杜如晦王圭以下或成或懿或憲不如蕭瑀之貞褊也歷考古訓及貞觀以來制度似皆不然今奉所議云國家故事宰相必以二字為諡未知出何品式謹請具示當以為按據若忠者臣事君之常道苟靖恭於位誰則非忠非有炳然之異則不必以為諡至如議獄緩死任賢舉善德之美者然肅者威德克就之名也亦足以表之矣且月令有之曰時及孟秋天地始肅詩言之矣曰曷不肅雍又曰肅肅王命仲山甫將之肅嚴也敬也忠之屬也天地不肅則歲不成宗廟不肅則禮不立軍旅不肅則人不服肅之時義大矣哉若夫以諲之從政也威能以間邪德可以濟衆故以肅易其名而忠在其中矣亦猶夫隨會寧俞之不稱文豈必因而重之然後乃為美也魏晉以來以賈詡之籌算賈逵之忠壯張既之政能程昱之智勇顧雍之密重王渾之器量劉惔之鑒裁庾翼之志略彼八君子者方之東平宜無慚德死之日并諡曰肅當代不以為貶何嘗徵一字二字為之升降乎謹上稽前典下據甲令參之禮經而究其行事請依前諡曰肅謹議上德無為其次為而不擾及為邦歲期而人疲如初終日以貢賦不入獲譴於上官遂以州比不調之琴思解弦更張之義算口徵賦以代他征意欲因有為以成無為為未著而人已告怨跡其所以然無德故也夫導政齊刑民猶免而無恥况權道以反經為用去德逾遠使無速謗末由也已所喜幸苟有過吾子知之貽書見讓以直諒相益商也起豫孟孫愛我吾子兼之矣愧辱嘉貺顧無以當之三復白圭欲罷而不能然來書所陳富人出萬今易以千貧人出百今亦數倍富倍優貧倍苦竊詳雅旨事或未然昨者據保簿數百姓并浮寄戶共有三萬三千比來應差科者唯有三千五百其餘二萬九千五百戶蠶而衣耕而食不持一錢以助王賦詩不云乎或燕燕居息或盡瘁事國在於是矣每歲三十一萬貫之稅悉鍾於三千五百人之家謂之高戶者歲出千貫其次九百八百其次七百六百貫以是為差九等最下兼本丁租庸猶輸四五十貫以此人焉得不日困事焉得不日蹙其中尤不勝其任者焉得不襁負而逃若以已困之人已竭之力杼軸不已恐州將不存苟以是為念安敢不夙興夕惕思有以拯之方今為口賦誠非彞典意欲以五萬一千人之力分三千五百家之稅愚謂之可復使多者用此以為裒少者用此以為益損有餘補不足之道實存乎其中富人貧人悉令均減倍優倍苦何從而生竊料動搖不安以遁逃相扇者不過以規避之戶與寄客耳此輩浮食偷安久漏差科惡同均賦稅之名祗思苟免若編戶地著者雖驅之使逃亦固不從今已擇吏分官以辨其等差量分入賦其數懸榜以示之信若信之不明分之或過等差之不均官吏之不仁困而後去誰曰不可乃未及知斂之薄厚辨之濟否望風聆聲遽告勞而逃斯豈為政者之過乎顧禮義之不愆孰能恤叛者之言耶天下無不食王土之臣寧有不輸王賦之民此輩飲國之澤食地之利將薄斂以助逋賦則曰挈妻子而去之是與鳥獸蠻貊無以異矣其來既不可以奉征稅其去亦何足以病州縣違之一邦亦猶是也等不為用又焉能資鄰然計斯人之徒亦未必悉然固或有不去者焉庶幾其所濟猶大但不防之於微拙誠有之奉教三省敢不知罪子産鑄刑書作邱賦以救鄭國而獲譏於叔向及才不如子産口算不如邱賦吾子之言過於叔向之直中心藏之何日忘之簿領拘限莫由詣展未見君子馳誠無極不宣舒州刺史獨孤及頓首
