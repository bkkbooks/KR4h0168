front:
  text: 全唐文欽定全唐文卷九十五賢妃名惠湖州長城人八歲自曉屬文太宗召為才人再遷充容帝崩哀慕成疾永徽元年卒年二十四贈賢妃
  hash: sha256:71edff65af24257aec56b686340a726685bcc5834e5c166d5b4a9ead623630e2
  markers:
  - {type: head, offset: 12, content: 太宗徐賢妃, id: KR4h0168_NFKB_095-h1, level: 1}
body:
  text: 惟聖皇之御㝢鑒敗德於前規裁廣知以從狹抑高心而就卑懼逸情之有泰欣靜慮於無為於時季春移序初光入暑露溽池臺煙霏林籞睿情悒以無歡懷仁智而延佇思寓賞以登臨非騁麗於茅宇殊華嶽之削成異羅浮之移所爾其表玩宸衷故作離宮含仁自下帶嶮非崇分上林之卉木點重巒之翠紅葉新抽而不樹花散植而無叢雜當窗之帶柳交約砌之圭桐纖塵集兮朝嶺峻宵露晞兮夕㵎空影促圓峯三寸日聲低謺嶂一尋風風輕兮拂蘭蕙日斜兮蔭階砌蝶留粉於巖端蜂尋香於嶺際草臨波而側影石瑩流而倒勢雖蓬瀛之蘊奇故未留於神睇彼崑閬之稱美詎有述於天製豈若數簣之形託於掖庭俯依綺檻仰映朱楹恥巖崖之鄙薄荷眺矚之恩榮期保終於一國奉天眷於千齡自貞觀以來二十有二載風雨調順年登歲稔人無水旱之弊國無饑饉之災昔漢武守文之常主猶登刻玉之符齊桓小國之庸君尚圖泥金之事陛下推功損己讓德不居億兆傾心猶闕告成之禮云亭佇謁未展升中之儀此之功德足以咀嚼百王網羅千代者矣然古人有言雖休勿休良有以也守初保末聖哲罕兼是知業大者易驕願陛下難之善始者難終願陛下易之竊見頃年以來力役兼總東有遼海之軍西有崑邱之役士馬疲於甲胄舟車倦於轉輸且召募役戍去留懷死生之痛因風阻浪往來有漂溺之危一夫力耕卒無數十之獲一船致損則傾數百之糧是猶運有盡之農工填無窮之巨浪圖未獲之他衆喪巳成之我軍雖除凶伐暴有國常規然黷武玩兵先哲所戒昔秦王并吞六國反速危亡之兆晉武奄有三方翻成覆敗之業豈非矜功恃大棄德而傾邦圖利忘害肆情而縱欲遂使悠悠六合雖廣不救其亡嗷嗷黎庶因弊以成其禍是知地廣非常安之術人勞乃易亂之源願陛下布澤流仁矜弊恤乏減行役之煩增湛露之惠妾又聞為政之本貴在無為竊見土木之功不可兼遂北闕初建南營翠微曾未踰時玉華創制雖復因山藉水非無架築之勞損之又損頗有工力之費終以茅茨示約猶興木石之疲假使和雇取人不無煩擾之弊是以卑宮菲食聖王之所安金屋瑤臺驕主之為麗故有道之君以逸逸人無道之君以樂樂身願陛下使之以時則力無竭矣用而息之則人斯悅矣夫珍玩伎巧乃喪國之斧斤珠玉錦繡實迷心之鴆毒竊見服玩纖靡如變化於自然職貢珍奇若神仙之所製雖馳華於季俗實敗素於淳風是知漆器非延叛之方桀造之而人叛玉杯豈招亡之術紂用之而國亡方驗侈麗之源不可不遏作法於儉猶恐其奢作法於奢何以制後伏惟陛下明鑒未形智周無際窮奧祕於麟閣盡探賾於儒林千王治亂之蹤百代安危之跡興衰禍福之數得失成敗之機固亦包吞心府之中循環目圍之內乃宸衷之久察無假一二言焉唯恐知之非難行之不易志驕於業泰體逸於時安伏惟抑意裁心慎終如始削輕過以滋重德擇後是以替前非則鴻名與日月無窮盛德與乾坤永大后名曌并州文水人工部尚書荊州都督封應國公士彠之女高宗立為昭儀進號宸妃永徽六年立為皇后上元元年進號天后中宗即位尊為皇太后臨朝稱制尋自稱皇帝改國號曰周在位二十二年中宗反正諡曰大聖則天皇后天寶八載定諡則天順聖皇后聞卿在彼庶事存心善政表於能官仁明彰於鎮撫如此稱職深慰朕懷朕以卿歷職著稱故授此官既美化遠聞實副朝寄今賜卿雜綵六十段并瑞錦等物以彰善政也朕先蒙金口之記又承寶偈之文歷教表於當今本願標於曩劫大雲闡奧明王國之禎符方等發揚顯自在之丕業馭一境而敦化宏五戒以訓人爰開革命之階方啓惟新之運宜叶隨時之義以申自我之規雖實際如如理忘於先後翹心懇懇畏展於勤誠自今巳後釋教宜在道法之上緇服處黃冠之前庶得道有識以皈依極羣生於回向布告遐爾知朕意焉鸞臺朕聞先王疆理天下也莫不料其土宇相其地宜分五服以應財成宅三川而適通變辨方樹辟協和之道以隆置郡罷侯經始之圖載遠而區分或異制度罕同連率法於在鎬牧守儀於起沛官稀則政毀地狹則人勞義在隨時期於致乂我大周席蘿闡化夢梓登期通三授元扈之濱得一升翠溈之汭維嵩設險聳危峯於少室在河稱防導洪波於太史卜茲洛食是曰奧區物産孔殷形勝斯在朕仰膺眷命俯叶樂推即瀍㵎之基恢鼎革之運珍符寶貺賁發郊藪佳氣榮光昭煥川澤建明堂而陟配立清廟以嚴禋方闡隆周之業以光卜年之兆況成王定鼎此則餘基永言朝貢實歸中壤是霜露之所均當水陸之交會庶齊勞逸無隔遐邇作制王畿雖憲章於故實緬維帝邑未折衷於新規宜宏自我之典式廣來蘇之澤但京兆之地舊號秦中乃眷編氓最為繁殖一州獨理事多擁滯宜令雍州管內析置五州其閒於雍州以西安置潼關即宜廢省然以千里之內舊制通畿征賦所出事資廣遠又王侯設險以固其國若無襟帶何以為守雍州并所析州同州太州並通入畿內洛州南面東面北面仍各置關庶食采之地自分湯沐之邑廾繻之客更從軒蓋之遊其雍州舊管及同太等州土狹人稠營種辛苦有情願向神都編貫者宜聽仍給復三年百姓無田業者任其所欲即各差清強官押領并許將家口自隨便於水次量給船乘作般次進發至都分付洛州受領支配安置訖申司録奏聞朕聞人惟邦本本固邦寧將以不肅而成既庶而富欲令率土黔黎咸得遂性勞來安堵人不失業其有諸州人或先緣饑歲流宕忘歸或父兄去官因循寄住為籍貫屬恐陷刑名荏苒多時未經首出衛士雜色人等并限百日內首盡任於神都及畿內懷鄭汴許汝等州附貫給復一年復滿便依本番上下其官人百姓有情願於洛懷等七州附貫者亦聽應須交割及發遣受領並委本貫共新附州分明計會不得因茲隱漏戶口虛蠲賦役并新析五州三面及雍州以西置關處所司具為條例務從省便奏聞鸞臺朕聞上圖列宿垂七紀而環紫微下料物土制八紘而尊赤縣是以帝猷方盛開甸服於平陽王業肇基創神郊於景亳雖政或沿革道有汙隆強幹弱枝率由茲典用能體國經野阜俗安人法天險之崇高顯宸居之壯觀朕膺此符命大庇黎元俯順謳歌君臨區夏紹隆周之睿業因丕洛之鴻基相彼土中實惟新邑五方入貢兼水陸之駿奔六氣運行均霜露而調序山川形勝祥祉荐臻遠寤乾心近收氓欲式建宗社大啓神都知王者之無外明在德之可久闕一字自夏殷分土列爵爰及秦漢置守罷侯所以東姬握圖王畿存千里之制西京御歷帝里據三輔之饒否泰既殊損益且異務歸於適物義尚於隨時朕以鼎業惟初寶祚伊始斟酌今古申畫封疆征賦科徭實資寬簡沃塉勞逸宜有平分緬懷習武之規載隆辨方之術可以洛東鄭州汴州南汝州許州西陝州虢州北懷州澤州潞州東北衛州西北蒲州為王畿內鄭州汴州許州可置八府汝州可置二府衛州可置五府別兵皆一千五百人所司詳依格式明為條例庶使固本之道轥轢於前修足兵之義牢籠於振古主者施行喪葬禮儀蓋惟恆式如致乖越深蠹公私乃有富族豪家競相踰濫窮奢極侈不遵典法至於送終之具著在條令明器之徒皆有色數遂敢妄施隊伍假設幡旓兼復創造園宅雕翦花樹或桐木馬功用尤多或吉輿凶闕綵飾殊貴諸如此類不可勝言貴賤既無等差資産為其損耗既失芻靈之義殊乖朴素之儀此之違先巳禁斷州牧縣宰不能存心御史金吾曾無糾察積習成俗頗紊彞章即宜各令所司重更申明處分自今巳後勿使更然來俊臣閭巷小人奸險有素以其頗申糾摘將謂微效款誠遂拔自泥塗齒於簪紱歲月滋久涓埃莫施專搆凶邪每相朋扇隱逆賊之妹尤深嬖寵逼良家之女以為妾媵作威作福無禮無義剝奪甚萑蒲之盜贓賄踰邱山之積諸王等盤石宗枝必期毀敗南北衙文武將相咸將傾危冀得竊弄機權方擬潛為悖逆無君之心巳著不臣之迹顯然天下側目含靈切齒擢其髮不足以數罪粉其骨不足以塞愆棄市之刑嚴酷未極汙宮之辟輿議所歸宜加赤族之誅以雪蒼生之憤頃所司造歷以蠟月為閏稽考史籍便紊舊章遂令去歲之中晦仍見月但恐寒暑未節有爽天經用深欽若之懷式陳敬授之典重更尋討果差一日履端舉正屬在於茲宜改歷惟新革非於既往可以十月為閏十月一日甲子朔旦冬至量才授職自有條流常秩清班非無差等比來諸色伎術因營得官及其升遷改從餘任遂使器用紕繆職務乖違不合禮經事須改轍自今本色出身解天文者進轉官不得過太史令音樂者不得過太樂鼓吹署令醫術者不得過尚藥奉御陰陽卜筮者不得過司膳寺諸署令有從勳官品子流外國官參佐視品等出身者自今以後不得任京清要等官若纍限應至三品不須進階每一階酬勳兩轉佛道二教同歸於善無為究竟皆是一宗比有淺識之徒競生物我或因懟怒各出醜言僧既排斥老君道士乃誹謗佛法更相訾毀務在加諸人而無良一至於此且出家之人須崇業行非聖犯義豈是法門自今僧及道士敢毀謗佛道者先決杖即令還俗鸞臺山河作固肇自往圖關梁是修抑惟前典朕情存太朴志在無外成皋姬陝勿用咽喉函谷秦封解其襟帶欲使鴈行靡拾鶉居不擾而氓俗澆弊浮惰者多非所以禁絶末游作限中外事資權變理貴從宜便可率由舊章安置應須修補及官典兵防一事巳上所司速準例處分其神都四面應須置關之處宜令檢校文昌虞部郎中王元圭即往檢行詳擇要害務在省功斟酌古今必令折衷還日具圖樣奏聞故趙州刺史高睿狂賊既至死節不降長史唐波若不能固城相率歸賊高睿巳加褒贈波若等身死破家賞罰既行須敦懲勸宜頒示天下咸使知聞比為久屬太平多歷年載人皆廢戰並悉學文今者用整兵威故令教習卿以春行冬令則水潦為敗舉金傷木則便害發生循覽所陳深合典禮若違此請乃月令虛行佇啓直言用依來表鸞臺訏謀房帷秉鈞之任為重典綜絲綸揮翰之才是屬銀青光祿大夫守納言上柱國汝陽縣開國男狄仁傑地華簪組材標棟幹城府凝深宮牆峻邈有八龍之藝術兼三冬之文史雅達政方早膺朝寄出移節傳播良守之風入踐臺閣得名臣之體豈惟懷道佐明見期於管樂故以竭誠匡主思致於堯舜九重肅侍則深陳可否百辟在庭則顯言得失雖從容顧問禮被於皇闈而斟酌輕重事隆於紫誥宜遷掌閫之秩式懋專車之寵可守內史散官勳封如故主者施行釋氏垂教本離死生示滅之儀固非正法如聞天中寺僧徒今年七月十五日下舍利骨素服哭泣不達妙理輕徇常情恐學者有疑曾不謗毀宜令所管州縣即加禁斷隋尚書令楊素昔在本朝早荷殊遇稟凶邪之德有諂佞之才惑亂君上離閒骨肉搖動冢嫡寧惟掘蠱之禍誘扇後主卒成請蹯之釁隋室喪亡蓋惟多僻究其萌兆職此之由生為不忠之人死為不義之鬼身雖幸免子竟族誅斯則姦逆之謀是為庭訓險薄之行遂成門風刑戮雖加支允仍在何得肩隨近侍齒列朝行朕接統百王恭臨四海上嘉賢佐下惡賊臣常欲從容於萬機之餘褒貶於千載之外況年代未遠耳目所存者乎其楊素及兄弟子孫巳下並不得令任京官及侍衛吉凶禮儀國家所重司禮博士未甚詳明成均司業韋叔夏太子率更令祝欽明等博涉禮經多所該練委以參掌冀得精詳自今司禮所修儀注並令叔夏等刊定訖然後奏進鸞臺獻替儲闈管綜王職聿求多士必在正人夏官尚書同鳳閣鸞臺三品上柱國酒泉縣開國公唐休璟業履清醇恭肅忠亮言必從行學以知道居八座之重握四嶽之要出將入相允文允武謀猷是屬宏益以深頃以暮年固辭退位就閒去劇優賢尚齒巨源請老仍參翼贊之榮叔子養德還預朝國之議宜輟五曹之務俾同三令之班可金紫光祿大夫行太子左庶子依舊同鳳閣鸞臺三品勳封如故主者施行鸞臺神畿緝化咨牧所難天府屯兵命將為重惟賢是擇非親勿居太子左千牛衛率安北都護相王旦黃道承暉紫庭趨訓儀表王褱傑識量虛明資忠孝以立身仗經書而致德勇高衛霍詞優楊史必能外振威聲內清戎政宜膺夾輔之寄兼司羽翼之重可并州牧餘如故鸞臺京輔才難神畿化首四方取則萬邦承流自非明德懿親何以宣風翊政并州牧太子左千牛衛率相王旦紫庭趨訓青社疏封雅度沖深王褱資秀傑忠孝天假禮樂日宣闕朔掌望隆前率北野蒞戎聲高臥護懷共理之幹有兼辦之能宜紆朝綍用清都輦可雍州牧鸞臺鳳池清切鸞渚便蕃諷納兩闈允資一德中散大夫天官侍郎韋嗣立當朝人望奕代相門道周性全才高識遠誠以待物寬而容衆往自綸翰五字見推洎處提衡九流式序懷宗廟之掌有社稷之能宜竭忠賢翊宣政化可守鳳閣侍郎同鳳閣鸞臺平章事散官如故主者施行忠為令德孝乃天經義著君親道存愛敬其或兼者可不美歟銀青光祿大夫行鳳閣侍郎兼檢校相王府長史同鳳閣鸞臺三品姚元之自掖垣趨侍廊廟謀猷竭節盡誠讜言正議始終無替宏益以多近以母氏衰老情兼喜懼在休沐之期闕晨昏之禮乞解所職以就閒養外奏內請志到詞勤宜遂懇情用敦孝道眷彼藩邸高選經佐俾從梁范之游以致潘園之樂可行相王府長史一事巳上并同三品鸞臺朕聞璧月珠星實為麗天之像蒼波翠嶽爰標紀地之形是知正位辨方體元建極不憑羣彥孰贊皇猷事總萬機心覃億兆恆靡遑於寢食誠罔憚於憂勤佇賢良則終宵失寢詢政道則竟日停餐豈直未明求衣昃晷忘食而巳比者屢垂旌帛頻訪邱園雖志切於旁求然未逢於俊乂待舟航而涉水思羽翼而淩虛今者更啓搜揚庶得不遺草澤其有文可以經邦國武可以定邊疆蘊梁棟之宏才堪將相之重任無隔士庶具以名聞若舉得其人必當擢以不次如妄相推薦亦置科繩所冀多士襲於隆周得人踰於盛漢布告遐邇知朕意焉鸞臺昔子弟咸建姬祚以隆支體畢侯漢國斯永某王男某等普谷分彩天池演派金相比映玉樹聯芳垂髫欽愛敬之風總角聞詩禮之訓三雍肇建萬品維新褒德敘勞式遵行慶之典疏藩樹屏允叶推恩之令可封襄陽縣開國男闕鸞臺睦親之道推恩之義家國所同古今無異雲麾將軍行太子左鶴禁率嗣陳王延暉地承枝葉戚在葭莩幼聞詩禮躬踐名教賞勸未酬井邑猶虛宜申優典用光近族延暉兄弟可別令實封一百五十戶鸞臺皇太子長女新都郡主資靈玉裕比價瑤臺發艷天庭仰儷星辰之象承徽儲禁內稟河洲之德惠心明婉柔範端莊始踰待年之期甫及有行之歲通事舍人楊泚門擅槐鼎地連姻戚箕裘克隆才質兼茂可以膺合姓之典奉御輪之躅摽梅興詠方邀六禮之歡在楚言歸宜逮三星之夕郡主可出適楊泚鸞臺皇太子第八女樂安郡主承規銀榜育彩銅樓寶婺連暉瓊娥比艷貞明發於閫訓窈窕濟於國風固巳儀範不柔間有裕蘋蘩入薦既成四教之德桃李方春宜用三周之禮可出適符節郎宏農楊承烈男守文鸞臺皇太子第二女新都郡主相王長女壽昌縣主第二女安興縣主等並育靈天漢稟訓皇闈惠性早成淑德克茂粉澤四教針縷七篇笄年在時令月有典宜穆三從之禮式光百兩之迓新都郡主可出適左衛翊盧咸壽昌縣主可出適太子右奉御楊尚一安興縣主可出適梁王府參軍薛琳所司準式鸞臺皇太子第二女義安郡主重月降輝發春揚彩四德淳茂六行恭修歲在結纓時方納幣均州司倉裴巽門胄清顯風範昭明既諧委鴈之祥宜縟盤螭之禮郡主可出適巽仍以今月十四日成禮所司準式鸞臺相王長女壽昌縣主每五女仙源縣主並稟靈天漢漸訓王門質耀桃李性芬蘭蕙帝孫將降甫及笄年國人所承允歸時望清廟齊郎崔珍太子左奉御薛伯陽並地襲衣冠躬履名教風猷美茂才藝紛綸飛鳳之占既合其吉乘龍之背宜膺雙舉壽昌縣主可出適珍仙源縣主可出適伯陽仍令所司準式鸞臺多難興王殷憂啓聖蕭牆之禍自古有之朕以虛寡宿承先顧社稷宗廟寄在朕躬親理萬幾年逾二紀幸得九元垂祐四海乂安何嘗不日昃忘食夜分輟寢戰戰而臨寶位乾乾而握聖圖憂百姓之不寧懼一物之失所但以久親庶政勤倦成勞頃日以來微加風疢逆豎張易之昌宗兄弟比緣薄解調鍊久在園苑驅馳錫以殊恩加以顯秩不謂豺狼之性潛起梟獍之心積日包藏一朝發露皇太子顯元良守器純孝奉親知此釁萌奔衛宸極與北軍諸將戮力同心勦撲凶渠咸就梟斬斯乃天地之大德幽明所贊叶者乎豈惟朕躬之幸抑亦兆庶之福朕方資藥餌冀保痊和幾務既繁有妨攝理監臨之寄屬在元良宜令皇太子顯監國百官總巳以聽朕當養閒高枕庶獲延齡可大赦天下
