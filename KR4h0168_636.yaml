front:
  text: 全唐文欽定全唐文卷六百三十六李翺三
  hash: sha256:94b236956aaf7a92dc02193662f185ff7171945eb286a1935c8efc234e03f281
body:
  text: 某月日布衣李翺寄賀書謹再拜大夫閣下竊聞閣下白宰相使汴州人執鄧惟恭歸於京師奏天子處其輕重生死罪伏覩詔書捨惟恭死罪俾永為黔首於汴州翺九月時上宰相書言政刑中有詞曰親戚懷二殺之可也况懷二且非親戚哉當是時惟恭在其位故不直書而微其詞然則惟恭之罪聞知於四方其孔甚已嗚呼亂本既除矣自茲日厥後汴宋潁亳人其無事矣豈汴宋潁亳人而已實天下皆受其利昔閣下為建州刺史人足食與衣且知廉恥禮義治平為天下第一其為信州猶建州也其為汝州猶信州也汴人苦其政失其心十五年矣久則不易變矣亦惟閣下孜孜不怠致汴州猶汝州也天下莫不幸甚而翺則喜樂乎萬世之民所以然者夫陋巷短褐躬學古知道之人其所以異於朝廷藩翰大臣王公卿士者口未嘗饜乎肥甘爾體未嘗煥乎綺紈爾目未嘗悅乎采色爾耳未嘗樂乎聲音爾居處未嘗宿乎華屋爾出遊未嘗乘乎乘黃爾祿利未嘗入於家爾名字未嘗得進於天王爾其如此而已至若憂天下之艱難幸天下之和平樂天下之人民得與其身臻乎仁壽思九夷八蠻解辮髮椎髻同車書文軌則雖朝廷藩翰大臣王公卿士亦未必皆甚乎陋巷短褐躬學古知道之人者也若必皆甚焉則天下之理得日變化可以如響之應乎聲也故天地山川草木鱗羽之瑞有一可以為升平之符者時政有一可以教民者藩屏之臣有一可以長人行化者則未嘗不私自喜樂也萬類含育有一傷和平之氣者夷狄蠻戎之俗有一咈乎道者時政有一不毗於下民者則未嘗不私自憂懼也而况其遠者大者乎天下之一善故不足以喜樂然多其善則太平之基可庶幾乎天下之一不善故不足以憂懼然纍其不善則顛覆之形殆將至也太平之基顛覆之形乃從政者之所喜樂憂懼爾其為布衣守道之人不同任如耳之不司采色文章也而與知之者士之躬學古知道者固與夫天下百姓同憂樂而不敢獨私其心也翺雖不肖未嘗瞬息動心而不景行乎此也是以憂樂乎萬世之民也亦惟少加意焉翺再拜某道無可重每為閣下所引納又不隔卑賤時訪其第故竊意閣下或以翺為有所知也情苟有未安不宜以默故詳之以辭河南府版榜縣於食堂北梁每年寫黃紙號曰黃卷其一條曰司録入院諸官於堂上序立司録揖然後坐河南大府入聖唐來二百年前人制條相傳嵗久苟無甚弊則輕改之不如守故事之為當也八九年來司録使判司立東廊下司録於西廊下得揖然後就食而板條黃卷則如故文焉大凡庸人居上者以有權令陵下處下者以姑息取容勢使然也前年翺為戶曹恐不知故事舉手觸罰因取黃卷詳之乃相見之儀與故事都異至東知廚黃卷為狀白於前尹判榜食堂時被林司録入讒盛詞相毀前尹拒之甚久而竟從其請翺以為本不作作則勿休且執故事爭而不得於本道無傷也遂入辨焉白前尹曰中丞何輕改黃卷二百年之舊禮而重違一司録之徇情自用乎前尹曰此事在黃卷否翺對曰所過狀若不引黃卷故事是罔中丞也其何敢前尹因取黃卷簡條省之使人以黃卷示司録曰黃卷是故事豈得責人執守當司録所過狀注判云黃卷有條即為故事依榜當時論者善前尹之能復故事焉自後翺為司録所毀無所不言前尹相告曰公以守官直道糾曹所傷乃至激橫過朝官於某處揖公見公公事獨立且又知毀之所來故塞耳不聽翺慮前尹遷改來者不知為誰終獲戾故後數十日以軟腳乞將去官不五六日亦幸有勑除替人因以罷免前日閣下偶說及此云近者緣陸司録之故却使復兩廊相見之儀此義蓋惑閣下聽者必曰京兆府之儀如此閣下從事京兆府習其故而信之焉爾夫事有同而宜異者京兆府司録上堂自東門北入故東西廊相見得所宜也河南司録上堂於側門東入直抵食堂西門故舊禮於堂上位立得所宜矣若却折向南是司録之欲自崇而卑衆官非所宜也此事同而宜異者耳假令司録上堂由南門北入河南府二百年舊禮自可守行亦不當引京兆府之儀而改之也况又自側門東入者耶河南尹大官也居之嵗久不為滯且如故門下鄭相公之德而居之六年閣下之為河南尹亦近何知未歸朝廷間亦有賢者未得其所或來為曹掾者耶安可棄舊禮使之立於東廊下夏則為暑日之所熾曝冬則為風雪之所飄灑無乃使論者以閣下為待一司録過厚而不為將來賢者之謀耶且此事某前年辨之因而獲勝閣下前日亦自言某不知有側門故也且閣下曹掾非為不多乃無一人執舊禮以堅辨焉此亦可歎也夫聖人然後能免小過竊恐閣下於此事思慮或有所未至而官屬等唯唯走退莫能進言則誰與閣下為水火酸鹹少相承者以大府而苟以自尊者寡見細人之所行耳盧司録性甚公方未必樂此閣下召問之可也伏望不輕改二百年之舊禮重惜一時之所未達意盡詞直無以越職出位言為罪幸甚某再拜知爾京兆府取解不得如其所懷念勿在意凡人之窮達所遇亦各有時爾何獨至於賢丈夫而反無其時哉此非吾徒之所憂也其所憂者何畏吾之道未能到於古之人爾其心既自以為到且無謬則吾何往而不得所樂何必與夫時俗之人同得失憂喜而動於心乎借如用汝之所知分為十焉用其九學聖人之道而知其心使有餘以與時世進退俯仰如可求也則不啻富且貴也如非吾力也雖盡用其十祇益勞其心爾安能有所得乎汝勿信人號文章為一藝夫所謂一藝者乃時世所好之文或有盛名於近代者是也其能到古人者則仁義之辭也惡得以一藝而名之哉仲尼孟子歿千餘年矣吾不及見其人吾能知其聖且賢者以吾讀其辭而得之者也後來者不可期安知其讀吾辭也而不知吾心之所存乎亦未可誣也夫性於仁義者未見其無文也有文而能到者吾未見其不力於仁義也由仁義而後文者性也由文而後仁義者習也猶誠明之必相依爾貴與富在乎外者也吾不能知其有無也非吾求而能至者也吾何愛而屑屑於其間哉仁義與文章生乎內者也吾知其有也吾能求而充之者也吾何懼而不為哉汝雖性過於人然而未能浩浩於其心吾故書其所懷以張汝且以樂言吾道云爾翺思逃後禍所冀存身惟能休罷最愜私志從此永已矣更無健羡之懷况乞得餘年退修至道上可以追赤松子房之風豈止於比二疏尚平子而已但舉世好爵祿權柄具寫此心以告人人無有少信之者皆為不誠之言也王拾遺是桂州舊僚頗知此志若與往來伏望問之可知其旨但以常情見待豈知失時還有偏尚之士哉又近日來兩施子粗得其說未及就正當此時使獲長往亦足以不愧宗門不負朋友嘗慕張公以不能取容當世故終身不仕况向前仕宦亦以多矣幸免刑戮方爾退修與致令名年已六十有一比之諸叔父兄弟為得年矣且不知餘年幾何意願乞取殘年以修所知之道如或有成是萬世一遇縱使無成且能早知止足高靜與三老死於林藪之下比終日矻矻耽樂富貴而大功德不及於海內而卒於位者所失得伏計舍人必以辨之矣以舍人比他見知故盡其意焉若非至誠亦何苦而強發斯言乎前日見命作開元寺鐘銘云欲藉僕之詞庶幾不朽而傳於後世誠足下相知之心無不到也雖然翺學聖人之心焉則不敢讓乎知聖人之道者也當見命時意亦思之熟矣吾之銘是鐘也吾將明聖人之道焉則於釋氏無益也吾將順釋氏之教而述焉則惑乎天下甚矣何貴乎吾之先覺也吾之詞必傳於後後有聖人如仲尼者之讀吾詞也則將大責於吾矣吾畏聖人也夫銘古多有焉湯之盤銘其詞云云衛孔悝之鼎其詞云云秦始皇之嶧山碑其詞云云皆可以紀功伐垂誡勸銘於盤則曰盤銘於鼎則曰鼎銘於山則曰山銘盤之詞可遷於鼎鼎之詞可遷於山山之詞可遷於碑唯時之所紀耳及蔡雍黃鉞銘以紀功於黃鉞之上爾或盤或鼎或嶧山或黃鉞其立意與言皆同非如高唐上林長楊之作賦云爾近代之文士則不然為銘為碑大抵詠其形容有異於古人之所為其作鐘銘則必詠其形容與其聲音與其財用之多少鎔鑄之勤勞爾非所謂勒功德誡勸於器也推此類而承觀之某不知君子之文也亦甚矣然所為文亦皆有盛名於時天下之人咸謂之善焉吾不知吾所獨知其能賢於他人之皆不知乎天下人咸以不知者云善則吾之獨知又何能云善乎雖然吾當亦順吾心以順聖人爾阿俗從時則不忍為也故當時甚未敢承教為其所懷也如前所云足下欲吾之必銘是鐘也當順吾心與吾道則足下之銘必傳於後代矣如欲從俗之所云則天下屬詞之士願為之者甚衆矣何藉於李翺之詞哉幸思之也日中時過淮而南書以通意且為別馮生自負其氣而中立上無援下無交名聲未大耀於京師生信無罪是乃時之人見之者或不能知之知之者則不敢言是以再舉進士皆不如其心謂生無戚戚蓋以他人為解豫聯以雜文罷黜不知者亦紛紛交笑之其自負益明退學書感憤而為文遂遭知音成其名當黜辱時吾不言其拙也豈無命耶及既得時吾又不自言其智也豈有命耶故謂生無戚戚生家貧甚不能居告我遊成都成都有岷峨山合氣於江源往往出奇怪之士古有司馬相如揚雄嚴君平其人死至茲千年不聞生遊成都試為我謝岷峨何其久無人耶其風侈麗奢豪羈人易留生其思速出於劍門之艱難勿我憂也人之所重者義與生也成義者莫如行存生者在於養所以為養者資於用用足而生不養者多矣用不足而能養其生者天下無之養生之物禁忌之術散在雜方雖有力者欲行之而患不能備知杜陵韋行規博學多藝能通易傳論語老聃莊周之書皆極師法窮覽百家之方撮而集之成兩軸各附於本月閲之者簡而詳以授於余且曰齊人要術傳行寡驗行規集此書經試驗者然後托取實可以有益於養生者若執事序而名之則所謂無翼而能飛者必傳於天下矣余因號之為月録豫嘗聞有周穆王八駿之說乃今獲覽厥圖雄凌趫騰彪虎文螭之流與今馬高絶懸異矣其名盜驪蜚黃騕裊白羲之屬也視矯首則若排雲視舉足則若乘風有待馭之狀有矜㣥之姿若日月之所不足至若天地之所不足周軒軒然嶷嶷然言其真也實星降之精思其發也猶神扶其魄軾者如仙御者如夢將變化何別哉聖唐帝功王褱特奇偉前古無可比倫及臣下盛事超絶而殊常輝昔而照今貽謀記敘家世徽範奉上虔密不自顯發人莫知之至有誤為傳說者洎正人碩賢守道不撓立言行已真貫白日得以愛慕遵楷其奸雄之跡覩而益明自勵廣記則隨所聞見雜載其事不以次第然皆是警惕在心或可諷歎且神仙鬼怪未得諦言非有所用俾好生不殺為仁之一途無害於教化故貽謀自廣不俟繁書以見其意時開成五年七月在檀溪李翺撰故溫縣令楊垂為京兆府參軍時奉叔父司徒命撰集喪儀其一篇云七七齊以其日送卒者衣服於佛寺以申追福翺以楊氏喪儀其他皆有所出多可行者獨此一事傷禮故論而去之將存其餘云佛法之染流於中國也六百餘年矣始於漢浸淫於魏晉宋之間而瀾漫於梁蕭氏遵奉之以及於茲蓋後漢氏無辨而排之者遂使夷狄之術行於中華故吉凶之禮謬亂其不盡為戎禮也無幾矣且楊氏之述喪儀豈不以禮法遷壞衣冠士大夫與庶人委巷無別為是而欲糾之以禮者耶是宜合於禮者存諸愆於禮者辨而去之安得專已心而言也苟懼時俗之怒已耶則楊氏之儀據於古而拂於俗者多矣置而勿言則猶可也既論之而書以為儀捨聖人之道則禍流於將來也無窮矣佛法之所言者列禦寇莊周所言詳矣其餘則皆戎狄之道也使佛生於中國則其為作也必異於是况驅中國之人舉行其術也君臣父子夫婦兄弟朋友存有所養死有所歸生物有道費之有節自伏羲至於仲尼雖百代聖人不能革也故可使天下舉而行之無弊者此聖人之道所謂君臣父子夫婦兄弟朋友而養之以道德仁義之謂也患力不足而已向使天下之人力足盡修身毒國之術六七十嵗之後雖享百年者亦盡矣天行乎上地載乎下其所以生育於其間者畜獸禽鳥魚鱉蛇龍之類而止爾况必不可使舉而行之者耶夫不可使天下舉而行之者則非聖人之道也故其徒也不蠶而衣裳具弗耨而飲食充安居不作役物以養已者至於幾千百萬人推是而凍餒者幾何人可知矣於是築樓殿宮閣以事之飾土木銅鐵以形之矒良人男女以居之雖璇室象廊傾宮鹿臺章華阿房弗加也是豈不出乎百姓之財力歟昔者禹之治水害也三過其門而不入手胼足胝鑿九河疏濟洛導漢汝決淮江而入於海人之弗為蛟龍食也禹實使然德為聖人功攘大禍立為天子而傳曰菲飲食惡衣服卑宮室土階高三尺其異於彼也如是此昭昭然其大者也詳而言之其可窮乎故惑之者溺於其教而排之者不知其心雖辨而當不能使其徒無譁而勸來者故使其術若彼之熾也有位者信吾說而誘之其君子可以理服其小人可以令禁其俗之化也弗難矣然則不知其心無害為君子而溺於其教者以夷狄之風而變乎諸夏禍之大者也其不為戎乎幸矣昔者司士賁告於子游曰請襲於牀子游曰諾縣子聞之曰汰哉叔氏專以禮許人人之襲於牀失禮之細者也猶不可况舉身毒國之術亂聖人之禮而欲以傳於後乎中才之人拘於書而惑於衆傳言違衆不祥書曰三人占則從二人之言翺以為言出於口則可守而為常則中人之惑者多矣何者君子從乎道也不從乎衆也道之公余將是之豈知天下黨然而非之道之私余將非之豈知天下謷然而是之將是之豈圖是之之利乎將非之豈圖非之之害乎故大道可存是非可常也小人則不然將是之先攫其利已將非之先怖其害巳然則遠害者心是而非之眩利者心非而是之故大道喪是非汨人倫壞邪說勝庸可使衆言必聽衆違必從之耶且夫天下蚩蚩知道者幾何人哉使天下皆賢人則從衆可也使天下賢人二小人三其可以從乎况貪人以利從則富者之言勝柔人以生從則威者之言勝中人以名從則狷者之言勝而君子之處衆則諄諄然如愚怡怡然如卑當言而默者三遊同而器異則默待近而責遠則默事及而時未則默小人俱不然所以君子慎言而小人飾言君子俟時而小人徇時也然則君子默於衆小人默於獨皆事勢牽之豈心願耶學而從之者得以擇之矣嗚呼治世少而亂世多賢一伸而邪百勝在上者言貴和而不貴正在下者言貴從而不貴得設使一室之中一人唱而十人和一人訥則雖欲言之㣥而訧之矣是則和者人之喜默者人之怒吾寧從道而罹怒乎寧違道而從衆乎斯所謂辨難易而權是非矣或曰衆可違而不可從可知乎曰未也君子怯於名而勇於實吾非衆之首衆非吾之從君子完其力而已則奚以違理不吾之問辭非人必從君子耳其聲而已則奚以違所謂君子者進退周旋㣥獨語默不失其正而不罹其害者蓋在此而已矣
