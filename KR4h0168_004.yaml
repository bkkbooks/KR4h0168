front:
  text: 全唐文欽定全唐文卷四帝諱世民高祖神堯皇帝次子方四歲有書生謁高祖見帝曰龍鳳之姿天日之表其年幾冠必能濟世安民語畢而去不知所往因以為神故採其語名之首創大業平定天下初封趙公進爵秦王武德九年立為太子八月受內禪明年改元貞觀在位二十三年年五十三諡曰文皇帝廟號太宗追尊文武大聖大廣孝皇帝集四十卷
  hash: sha256:2d6587c0a046f3832db0a5ca7cbf86f923a18d9d9e0cf1bbaa5fdc66ae83ac92
  markers:
  - {type: head, offset: 10, content: 太宗皇帝, id: KR4h0168_NFKB_004-h1, level: 1}
body:
  text: 惟萬幾之暇景屏千慮於巖廊元英移其暮節白日黯其斜光鬱金階兮起霧碧玉宇兮流霜延復道於阿閣啓重門於建章爾乃崇基回構危簷閒出暑結冬臺寒濃夏室望雕軒之拱漢觀鏤檻之擎日柱引桂而圓虛芬舒蓮而倒實霞觀近兮紅逼煙樓遙兮翠密念作者兮為勞愧居之而有逸於是慨然自思情懷不怡雖移新之建址實從故而裁基鑒前王之御世亦因機而化之換卑宮於穴處改巢樹於茅茨何燥濕之殊致乃澆淳之換時有前前之纍改無後後之相師則若阿房初製窮八荒之巧藝甘泉始成極三秦之壯麗工靡日而不勞役無時而暫憩加以長城亘地絶脈遐荒疊鄣峙漢層簷映廊反是中華之弊翻資北狄之強烽才煙而巳備河欲凍而先防玉帛殫於帑藏黎庶殞於風霜噴胡塵於渭水騰朔馬於漁陽罄有限之賦斂給無厭之豺狼既陵轢於千古乃虔思於百王屬虛躬之纂武登皇圖而御宇宏三策於廟堂變千機於狂虜頓王綱於沙漠製雲羅於海浦移種落殄凶渠卷毳帳掃穹廬門無關於地軸戶不納於天樞肆黎元於耕鑿一文軌於車書循今蹤兮覽前跡俯層城兮臨太液鑑高深之外固蕩心神而內益有土木之二勞非干戈之兩役雖復重基數仞異細柳之初營疊岸盈丈開上林而玩兵彼露臺之一儉乃延德於蒼生此崇基之漸泰方起謗於黎氓利懷小而忘大害棄重而思輕是猶蜀侯之貪金喪其國於岷峨智伯之縱辨迷自灌於洪波鑒損益而為寡殊禍福而成多故庸愚之尚志豈賢達之殊智至若膏雨雲飛八紘廣被信觸類而流澤非有求於報施故謂施而不自矜者亦成功之大義受而不知感者乃悖德之深纍澄遣心意坐怡情抱一德是珍萬物非寶不避辱於真惡豈求榮於僞好既同德而同心共流芳於王道余將問罪東夷言過洛邑聊因暇景散慮郊畿流盼城闕之閒覩弱齡遊觀之所風雲如故卉木維新少壯不留忽焉白首追思曩日緬成異世感時懷舊撫轡忘歸握管敘情賦之云爾惟端扆之餘隙屬凝陰於暮年時觀兵於九伐聊息駕於三川登臨原隰悵望郊壥覽綺紈之遊踐觀疇昔而依然地不改其城闕時無異其風煙想飛蓋於河曲思解佩於芝田挾彈銅駝之右連鑣金谷之前薪指倏其代謝舟壑俄而貿遷屬隋季之分崩遇中原之喪亂濯龍變為汙池平樂化為京觀天地兮厭黷人神兮憤惋遂收袂而電舉乃奮衣而雲翔據三秦兮鳳跱出九谷兮龍驤揮寶劒之虹彩回雕戈於日光掃欃槍兮定六合廓氛沴兮靜八荒昔總戎於藩屏今拱己於巖廊營餘故柳壘有殘牆懷壯齡之慷慨撫虛躬而自傷觀世俗之飄忽鑒存亡於宇宙林何春而不花花非故年之秀水何日而不波波非昔年之溜豈獨人之易新故在物而難舊歲月運兮寒復暑日月流兮夜還晝信造化之常經孰聖賢之可救於是停輿郊郭極眺山川信茲都之壯麗乃卜宅於姬年興亡兮代襲隆替兮相沿惟在德而為故實棄道而難全仰煙霞兮思子晉俯浩汗兮想張騫歎高蹤之靡覿嘉令譽之空傳聊憑軾而靜慮懷古人而悵焉況復氣結隆冬歲窮餘律對落景之蒼茫聽寒風之蕭瑟雲散葉而無蒂雪凝花而不實霧嶺斷兮疑連煙林踈兮似密節物同於前載歡憂殊於曩日扣沈思而多端寄翰墨而何述何四序之交運轉三陽之暮時風辭暄而入暑樹替錦而成帷想蓬瀛兮靡覿望崑閬兮難期抗微山於綺砌橫促嶺於丹墀啓一圍而建址崇數尺以成岯既無秀峙之勢本乏雲霞之資承墜宇之殘露挂低空之斷絲爾乃參差絶巘葳紆短徑風暫下而將飄煙才高而不暝寸中孤嶂連還斷尺裏重巒欹復正岫帶柳兮合雙眉石澄流兮分兩鏡爾其移芳植秀擢幹抽莖松新翠薄桂小丹輕細影雜兮俱亂弱勢交兮共縈才有力以勝蝶本無心而引鶯半葉舒而巖暗一花散而峰明何纖微之同景亦卑細以相成於是換浮歡於沈思賞輕塵於勝地俯蟻垤而有餘仰終南而多愧非為固於九折庶無虧於一簣聊夕玩而朝臨足攄懷而蕩志許敬宗家有小池作賦賜之若夫素秋開律碧沼凝光引涇渭之餘潤縈咫尺之方塘竹分叢而合響草異色而同芳徘徊躑躅淹留自足疊風紋兮連復連折回流兮曲復曲映垂蘭而轉翠翻輕苔而動緑牽狹鏡兮數尋泛芥舟而巳沈涌菱花於岸腹擘蓮影於波心減微涓而頓淺足一滴而還深於時景落地濱霧黯踈筠舒卷澄霞彩高低碎月輪露宿鳥之全翮隱游魚之半鱗岸隨年而或故流與日而終新雖有慙於溟渤亦足瑩乎心神有一威鳳憩翮朝陽晨遊紫霧夕飲元霜資長風以舉翰戾天衢而遠翔西翥則煙氛閟色東飛則日月騰光化垂鵬於北裔訓㣥鳥於南荒弭亂世而方降膺明時而自彰俯翼雲路歸功本樹仰喬枝而見猜俯修條而抱蠧同林之侶俱嫉共幹之儔並忤無桓山之義情有炎州之凶度若巢葦而居安獨懷危而履懼鴟梟嘯乎側葉燕雀喧乎下枝慙巳陋之至鄙害他賢之獨奇或聚咮而交擊乍分羅而見羈戢凌雲之逸羽韜偉世之清儀遂乃蓄情宵影結志晨暉霜殘綺翼露點紅衣嗟憂患之易結歎矰繳之難違期畢命於一死本無情於再飛幸賴君子以依以恃引此風雲濯斯塵滓披蒙翳於葉下發光華於枝裏仙翰屈而還舒靈音摧而復起盼八極以遐翥臨九天而高峙庶廣德於衆禽非崇利於一己是以徘徊感德顧慕懷賢憑明哲而禍散託英才而福延答惠之情彌結報功之志方宣非知難而行易思令後以終前俾賢德之流慶畢萬葉而芳傳厥初造化人倫既興乃建君長司牧黎蒸肇自爻畫爰代結繩軒昊既謝唐虞以升後隋德衰順時革命三季之末干戈是爭赫矣神武經期作聖下括九圍上齊七政業統文武勳邁高光何險不濟何患不攘士女綏悅篚厥元黃斯物之至昭於我王我王覆育資生懷造配堯登唐方周在鎬翕受敷施明徵定保允迪厥德惟清帝道帝道欽明天下和平三時不害百穀以成我庾斯積如坻如京既富而教訟息刑清明明天子令聞不巳百姓為心萬邦在己家賴寬政朝稱多士齊一華戎混同書軌東池溟渤西苑隅邱八蠻職貢六狄懷柔至德潛洽元化旁流日慎一日雖休勿休先天不違靈物效質丹羽儀韶翠黃承轡甘露零草祥風應律嘉禾醴泉比焉自出符瑞見兮煥圖書壇場設兮望鑾輿至人忘己體沖虛凝神姑射厭宸居厭宸居叶冥契龍駕升兮邈遐逝垂元範兮光來裔與元象兮長昭晰飛英聲兮越三代永錫祚兮萬億載鑿開徑路名魁大醫羽翼三聖調和四時降龍伏虎拯衰救危巍巍堂堂百代之師覽讀所陳實悟心膽今日成我卿之力也明珠兼乘豈比來言當以誡心書何能盡今賜卿黃金四十錠以酬雅意依禮二名義不偏諱尼父達聖非無前指近世以來曲為節制兩字兼避廢闕巳多率意而行有違經語今宜依據禮典務從約仰效先哲垂法將來其官號人名及公私文籍有世及民兩字不連讀者並不須避昔楚國尊賢崇道光於申穆梁邦接士楷德重於鄒枚咸以著範前修垂芳後烈顧惟菲薄多謝古人高山仰止能無景慕是以芳蘭始被深思冠蓋之遊丹桂初叢庶延髦俊之士既而場苗蓋寡空留皎皎之姿喬木從遷終愧嚶嚶之友所冀通規正訓輔其闕如故側席無倦於齊庭開筵有待於燕館屬以大行臺司勳郎中杜如晦記室考功郎中房元齡于志寧軍咨祭酒蘇世長天策府記室薛收文學褚亮姚思廉太學博士陸德明孔穎達主簿李道元天策倉曹李守素王府記室參軍虞世南參軍事蔡允恭薛元敬顏相時宋州總管府戶曹許敬宗太學助教蓋文達咨議典籤蘇勗等或背淮而至千里或適趙以欣三見咸能垂裾邸第委質藩維引禮度而成典則暢文詞而詠風雅優游幕府是用嘉焉宜令并以本官兼文館學士二王之後禮數宜崇寢廟不修廩餼多闕非所以追崇先代式敬國賓可令所司量置國官營立廟宇突利可汗阿史那什鉢苾志懷英果識機能斷情深獨悟實惟先覺往在北蕃位地兼重早知慕化特布款誠及漠北降災龍荒兆亂潛圖決策棄難歸朝披露膽肝備陳丹赤轉禍為福厥義可嘉宜有褒隆用彰寵渥錫茲茅土職參戎禁可右衛大將軍封北平郡王食邑千戶高秩厚禮允屬茂勳貴德崇讓用光彞典尚書右僕射代國公靖器識恢宏風度沖邈早申期遇夙投忠款宣力運始效績邊隅南定荊揚北清沙塞皇威遠暢功業有成及參聞政本職重端副綢繆翌贊勤勞宴績知無不為歲寒彌厲既懷沖挹以疾固辭表疏懇至情理難奪煩以吏職有乖養賢宜加優寵申其雅志可特進勳如故并賜帛一千段尚乘馬兩匹祿賜國官府佐及親事帳內防閣等並依舊給患若小瘳每三兩日至門下中書平章事患若未除任在第攝養朕以不造惸惸在疚日月如流星靈浸遠霜露所感觸目殞絶宗廟之制有國大典皇運之始且事因循今山陵有日遷祔非遠宜允舊章永世作則可令所司與禮官等詳議奏聞門下膏腴之地允屬茂親藩屏之重寄深盤石鄶王元裕譙王元名並器懷韶令業尚明敏望兼梁趙譽冠酆郇並建之議可歸按部之職斯重加茲寵命仰惟國章元裕可使持節鄧州諸軍事鄧州刺史改封鄧王元名可持節壽州刺史改封舒王食邑並如故司會政本執法任隆歷選攸難惟賢是屬特進尚書申州刺史上柱國申國公高士廉器宇沖邈機神峻遠材稱棟幹望重搢紳地惟姻婭乃誠著於疇昔業預經綸嘉庸彰於夷險出總方嶽入贊機衡獻替之情譽光八舍銓總之美聲洽九流啓沃是寄鹽梅斯在宜二端右允副式瞻可尚書左僕射特進刺史勳官封如故祕書望華史官任重選衆而舉歷代攸難守祕書監顏師古體業淹和器用詳敏學資流略詞兼典麗職司圖書亟經歲序朱紫既辨著述有成宜正名器允茲望實可祕書監明兩之里實固宗祧輔導之職莫先師保是以呂望召奭騰芳於有周叔孫元成繼美於隆漢司徒趙國公無忌器範宏邈風鑒秀遠材稱棟幹地兼姻戚佐命之功勒乎鐘鼎論道之譽穆乎台槐股肱是屬邦國攸賴教諭少陽僉望斯在司空梁國公元齡體業忠肅識具宏通誠著霸圖功宣鼎業奉上之節所懷必盡益國之事知無不為必能厲茲六行審喻三善特進宋國公瑀操行清約識局貞正夙受先遇早升朝右立身之操必在於直道體國之心無忘於忠義輔翼儲二望實攸歸無忌可太子太師元齡可太子太傅瑀可太子太保門下維翰之寄允屬茂親藩屏之重必資令望鄧州刺史鄧王元裕襟神韶令理識清確壽州刺史舒王元名體業夷雅志尚淹和並夙膺朝寵早蒞藩任政令著於謠俗嘉譽洽於搢紳宜加榮命允茲朝典元裕可梁州刺史元名可許州刺史封並如故門下體國經邦資懿親而作屏設官分職俟方嶽以宣風用能式固本枝克隆盤石前安州都督吳王恪等並識量明允體業貞固禮高彞器望重維城學藝之譽日新忠孝之風早茂分命有典僉議攸歸可依前件門下牧伯之重莫先畿甸周衛之職任切巡警詳求今古必俟賢戚揚州大都督魏王泰器業凝遠文藻夙成好學見稱樂善不倦入作卿士抑有前規重司文武允膺僉政可雍州牧惟天為大七政所以授時惟辟奉天三才於是育物故能彌綸宇宙經緯乾坤大庇生靈闡揚洪烈我大唐誕膺嘉運載協昌期丕受龍圖肇開鳳紀太上皇徇齊作聖睿哲欽明奄有八荒光宅四表牢籠軒昊跨躡殷周金鏡俯臨玉燭遐被然而至德弗宰成功不居高謝萬邦委茲重器郊禋曠典士民翹屬欽惟宗社義存享獻朕以寡昧實膺統緒辭不獲免式纂洪業靈命既臻用升寶位君臨兆庶繼軌百王若涉大川罔知攸濟方資令哲共康治道今紹祚伊始奉答天休思敷惠澤被於黎獻可大赦天下自武德九年八月九日昧爽以前罪無重輕巳發覺未發覺繫囚見徒悉從原免武德元年以來流配者亦并放還凡厥庶僚進爵一級其五品巳上先無爵邑者封開國男六品巳下各加一級關內及蒲芮虞秦陝鼎六州免二年租調自餘率土普給復一年八十巳上各賜米二石綿帛五段百歲巳上各賜米四石綿帛十段仍加版授以旌尚齒鰥寡孤獨不能自存者量事優恤其有至孝純著達於鄉黨徵詣闕庭厚加褒擢節義之夫貞順之婦州府列上旌表門閭高年碩學直言正諫所在長官隨狀薦舉亡命山澤挾藏軍器百日不首復罪如初敢以赦前事告言者以其罪罪之褒崇賢戚有國彞典厚秩清階式隆朝望左武衛大將軍上柱國淮安王神通宗室之長德品優宏締構之初早樹勳績右武衛大將軍上柱國燕郡王藝夙著嘉庸志懷強毅久司戎禁見稱貞確宜加榮寵式允具瞻並可開府儀同三司爰始正家刑於四海王者內職取象天官上備列宿之序下供掃除之役肇自古昔具有節文末代奢淫搜求無度朕嗣膺寶歷撫育黔黎克己厲精庶幾至理顧省宮掖其數實多恐茲幽閉久離親族一時減省各從罷散歸其戚屬任從婚娶城彼朔方周朝盛典繕治河上漢室宏規所以作固京畿設險邊塞式遏寇虐隔礙華戎自隋氏季年中夏喪亂黔黎凋盡州城空虛空厥因之侵犯疆埸乘閒幸釁深入長驅寇暴滋盛莫能禦制皇運以來東西征伐兵車屢出未遑北討遂令胡馬再入至於涇渭蹂踐禾稼駭懼居民喪失既多虧廢生業朕分命師旅挫其鋒鋭頻獲名王每夷渠帥然而凶狡不息驅侵未巳御以長算利在修邊其北道諸州所置城寨粗巳周遍未能備悉今約以和通雖云疲寇然蕃情難測更事修葺僉曰宜之朕以版築之功方資力役畚鍤之用興發且多念彼劬勞用深怵惕加以普給優復詔書始下旋即科召有若食言百姓將疑謂豫不信但民為邦本本固邦寧醜虜馮陵實為民患其城寨鎮戍須有修補審量遠近計度功力所在軍民且共營辦所司具為條式務使成功宣示閭里明知此意褒賢昭德昔王令典旌善念功有國彞訓吏部尚書上黨縣公長孫無忌中書令臨淄縣侯房元齡右武大將軍尉遲敬德兵部尚書建平縣男杜如晦左衛將軍全椒縣子侯君集等或夙參謀謨綢繆幃幄竭心傾懇備申忠益或早從任使契闊戎麾誠著艱難績宣內外義冠終始志堅金石誓以山河實允朝議無忌封齊國公元齡封邢國公敬德封吳國公如晦封萊國公君集封潞國公邑各三千戶立人之道曰仁與義為國之基德歸於厚自有隋馭宇政刻刑煩上懷猜阻之心下無和暢之志遂使朋友遊好慶弔不通鄉土聯官請問斯絶至有里門相接致胡越之乖患難在身忘救恤之義風頽俗弊一至於此化民以德豈斯之謂朕纂歷膺期思宏至道因兆民之所賴求萬國之歡心凡厥庶寮咸使輯睦君臣之際期於無隱永言前失特宜敦勵自今內外官人須相存問勿致疑阻有遇疚疾遞加詢問為營醫療知其增損不幸物故及遭憂恤隨事慰省以申情好務從篤實各存周厚朝廷無拘忌之節交遊有久要之歡遵道而行率履不越斯則上下交泰品物咸亨惠政所加達於四表布告天下咸知朕意尚書奏議以為少陽作二元良治本虔奉宗祏式固邦家中山王承乾地居嫡長丰姿峻嶷仁孝純深業履昭茂早聞睿哲幼觀詩禮允茲守器養德春宮朕欽承景業嗣膺寶位憲則前王思隆正緒宜依衆請以答僉望可立承乾為皇太子宣尼以大聖之德天縱多能王道藉以裁成人倫資其教義故孟軻稱生人以來一人而已自漢氏馭歷魏室分區爰及晉朝暨於隋代咸相崇尚用存禋祀朕欽若前王憲章故實親師宗聖是所庶幾存亡繼絶抑惟通典可立孔子後為褒聖侯以隋故紹聖侯孔嗣哲嫡子德綸為嗣主者施行朕遐觀方冊歷選前王大道既隱至公斯革莫不思樹風聲用隆鼎命太皇膺籙受圖功成治定鄙聖人之餘事顧天下而窅然永言俗纍高居物表爰以大寶俯授微躬自肅奉神器亟移灰律屬三正在旦萬國來庭長世之術既宏惟新之命方始體元居正今則其時可改武德十年為貞觀元年昔周公治定制禮垂裕後昆命媒氏之職以會男女每以仲春之月順時行令蕃育之禮既宏邦家之化攸在及政教淩遲諸侯力爭官失其守人變其風致使謠俗有失時之譏鰥寡無自存之術漢魏作教事非師古道隨世隱義逐時乖重以隋德淪胥數鍾迍剝五都俱覆萬方咸蕩暨參墟奮旅救彼艱危區縣削平總斯圖籍顧瞻禹跡提封尚存乃眷周餘掃地咸盡痛心疾首寤寐無忘蓋惟上元之大德曰生蒸民以最靈為貴一經喪亂多餌豺狼朕肅奉天命為之父母平定甫爾劬勞未堪厚生樂業尚多踈簡永言亭育用切於懷若不申之以婚姻明之以顧復便恐中饋之禮斯廢絶嗣之釁方深有懷怨曠之情或致淫奔之辱憲章典故實所庶幾宜令有司所在勸勉其庶人之男女無室家者並仰州縣官人以禮聘娶皆任其同類相求不得抑取男年二十女年十五已上及妻喪達制之後孀居服紀已除並須申以媒媾令其好合若貧窶之徒將迎匱乏者仰於其親近及鄉里富有之家裒多益寡使得資送以濟其鰥夫年六十寡婦年五十已上及婦人雖尚少而有男女及守志貞潔者並任其情願無勞抑以嫁娶刺史縣令以下官人若能使婚姻及時鰥寡數少量準戶口增多以進考第如其勸導乖方失於配偶准戶減少以附殿失朕恭膺寶命撫臨率土永鑒前王憲章典故雖文質遞變沿革不同而發號施令殊塗一揆皆所以成當世之典謨開生民之耳目納之軌度令行禁止自律令頒下積有歲時內外㣥官多不尋究所行之事動乖文旨此乃臣有所隱民不見德與夫不令而誅何以異也斯豈守道履正徇公奉法者乎自今以後官人行事與律乖違者仰所司糾劾具以名聞望隆朝右任重國鈞尚想風猷義惟賢戚吏部尚書齊國公長孫無忌識量宏遠神情警發道照搢紳才資文武樽俎之策電斷風馳干戈所指雲銷霧散幾深之慮彌著忠義之節以彰斯固立德佐時降靈輔闕宜以翼贊授之端揆可尚書右僕射周氏設官分掌邦事漢家創制允定章程故使百工咸理五材異用雖沿革有時而此途莫爽但欽明之后役自子來昏亂之朝期盡民力或祁寒隆暑未獲小康或俾夜作明繼之以燭淫費不已凋喪為期朕祗奉明命撫臨億兆愛育之心發於寤寐每咨謀卿士詢訪芻蕘何嘗不以節儉為懷憂矜在念自非田疇耘穫軍國資須未嘗別使一人輒求一物每有丁匠之所常申戒作之司令其寬大功程務從閒逸少府僚屬莫不聞知而營造矛鎧催督非理竭人之力以求己功朝夕左右尚乖期約遠方勞役何以克堪雖四海之內無煩經始然繕治器械修葺城隍及隄防浸決橋梁壞毀事不獲巳必藉人功須慰彼民心緩其日用宜頒告天下知朕意焉蟲霜為害風雨不時政道未康咎徵斯在朕祗奉明命撫育黔黎憂閔之至實切懷抱輕徭薄賦務本勸農必望民殷物阜家給人足而陰陽不和氣候乖舛永言罪已撫心多愧河北燕趙之際山西并潞所管及蒲虞之郊豳延以北或春逢亢旱秋遇霜淫或蟊賊成災嚴凝早降有致饑饉慚惕無忘特宜矜恤救其疾苦可令中書侍郎溫彥博尚書右丞魏徵治書侍御史孫伏伽檢校中書舍人辛諝等分往諸州馳驛檢行其苗稼不熟之處使知損耗多少戶口乏糧之家存問若為支計必當細勘速以奏聞待使人還京量行賑濟齊故尚書僕射崔季舒給事黃門侍郎郭遵尚書右丞封孝炎昔仕鄴中名位通顯志存忠讜抗疏極言無救社稷之亡遂見龍逢之酷其季舒子剛遵子雲孝炎子君遵並以門遭時譴淫刑濫及宜崇褒獎特異常倫可免內侍量才別敘昔東漢功臣莫任機密西京戚里或存退讓故能長守富貴不懼危殆尚書右僕射齊國公無忌神識清舉風彩凝映賢戚之望朝野所推比軒禁不虞釁生慮表倉卒之閒厥功以茂自居樞要聲實俄遠然以椒掖之親處權衡之地深知止足有戒滿盈收袵之言情詞懇切宜遂其心以厲貪競可解尚書右僕射仍進散位開府儀同三司宥過肆眚列聖所以垂風一面三驅至人所以被物故知畫冠化俗義在無刑擊磬求情志存踈網然去聖滋遠淳風漸薄上陵下替獄訟繁興罪名日積於書深文亟陳於嘉石自非帝堯臨政臯陶作師觀色聽聲哀矜靡失雖復三章兩造能無冤濫自新改過其道何由朕以虛薄恭膺大寶虔對三靈君臨九服昧旦求衣夜分忘寢履薄乘奔未足為喻兢兢業業懼弗負荷是以詳詢卿宰下及芻蕘務求切直救其不逮推赤心於萬物罄誠言於多士惟以蒼生在念豈矜黃屋之尊嗟四海之未寧慮一物之失所飭躬厲己無忘晷刻率斯道也庶感幽明思與㣥辟俱興至治而世教未康元風尚鬱去歲霖雨既損秋場今茲旱蝗又傷宿麥萬姓嗷然懸罄已甚此皆朕之不德兆庶何辜將由視聽弗明刑罰失度遂使陰陽舛謬時序乖違矜物罪己載懷憂惕若使年穀豐稔天下乂寧移災朕身以存萬國是所願也甘心無吝此言之信有同皎日故披露胸臆義在無隱八方率土想見朕心今東作方興而膏澤不降仰彼雲漢翹心何已宜布寬大之恩以順雷雨之德可大赦天下隋運將盡㣥凶鼎沸干戈不息饑饉相仍流血成川暴骸滿野朕往因軍旅周覽川原每所臨視用傷心慮自祗膺寶命義切哀矜雖道謝姬文而情深掩骼諸有骸骨暴露者宜令所在官司收斂埋瘞稱朕意焉天地定位君臣之義以彰卑高既陳人倫之道斯著是用篤厚風俗化成天下雖復時經治亂主或昏明疾風徑草芳芬無絶剖心焚體赴蹈如歸夫豈不愛七尺之軀重百年之命諒由君臣義重名教所先故能明大節於當時立清風於身後至如趙高之殞二世董卓之鴆宏農人神所疾異代同憤況凡庸小豎有懷凶悖遐觀典策罔不誅夷辰州刺史長蛇縣男裴虔通昔在隋代委質藩僚煬帝以舊邸之情特相愛幸遂乃忘蔑君親潛圖弒逆密伺閒隙招結㣥醜長㦸流矢一朝竊發天下之惡孰云可忍宜其夷宗焚首以彰大戮但年代異時纍逢赦令可特免極刑投之四裔用明逆順之理以獎君臣之義可除名削爵遷配歡州尚齒重舊先王以之垂範還章解組朝臣於是克終釋菜合樂之儀東膠西序之制養老之義遺文可覩朕恭膺大寶憲章故實乞言尊事彌切深衷然情存今古世踵澆季而策名就列或乖大體至若筋力將盡桑榆且迫徒竭夙興之勤未悟夜行之罪其有心驚知足行堪激厲謝事公門收骸閭里能以禮讓固可嘉焉內外文武㣥臣年高致仕抗表去職者參朝之日宜在見任本品之上昔自帝王受天明命其有二儀感德百靈效祉莫不君臣動色歌頌相趨朕恭膺大寶情深夕惕每見表奏符瑞慚恧增懷且安危在乎人事吉凶係於政術若時主肆虐嘉貺未能成其美如治道休明咎徵不能致其惡以此而言未為可請自今已後麟鳳龜龍大瑞之類依舊表奏自外諸瑞應奏者惟顯在物色目及出見處更不得苟陳虛飾徒事浮詞門下刑期無刑皇王之令典以戰止戰列聖之通規是以湯武干戈濟時靜亂豈期不愛黔首肆行誅戮禁暴戢兵蓋不獲已朕自隋末創義志存拯溺北征東伐所向平殄然黃鉞之下金鏃之端凡所傷殪難用勝紀雖復逆命亂常自貽絶殞惻隱之心追以愴憫生靈之重能不哀矜悄然疚懷無忘興寢竊以如來聖教深尚慈仁禁戒之科殺害為重永言此理彌增悔懼今宜為自征討以來手所誅翦前後之數將近一千皆為建齊行道竭誠禮懺朕之所服衣物並充檀捨冀三途之難因斯解脫萬劫之苦藉此宏濟滅怨障之心趣菩提之道
