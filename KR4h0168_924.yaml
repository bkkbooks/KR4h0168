front:
  text: 全唐文欽定全唐文卷九百二十四承禎字子微河內溫人為道士事潘師正傳其符籙及辟穀導引服餌之術止天台山武后聞其名召至都降手敕贊美之景雲二年睿宗復召之固辭還山開元九年十五年元宗兩召之敕於王屋山建陽臺觀以居卒年八十九贈銀青光祿大夫諡貞一先生
  hash: sha256:c0a5579b8d0336cfb8296058cfd5521ab641e5ae8e95912c403da521788e46c4
  markers:
  - {type: head, offset: 14, content: 司馬承禎, id: KR4h0168_NFKB_924-h1, level: 1}
body:
  text: 今五嶽神祠山林之神非正真之神也五嶽皆有洞府有上清真人降任其職山川風雨陰陽氣序是所理焉冠冕章服佐從神仙皆有名數請別立齊祠一所夫人之所貴者生也生之所貴者道也人之有道如魚之有水涸轍之魚猶希升水弱喪之俗無心造道惡生死之苦愛生死之業重道德之名輕道德之行喜色味為得志鄙恬素為窮辱竭難得之貨市來生之福縱易染之情喪今身之道自云智巧如夢如迷生來死去循環萬劫審惟倒置何甚如之故妙真經云人常失道非道失人人常去生非生去道故養生者慎勿失道為道者慎勿失生使道與生相守生與道相保二者不相離然後乃長久言長久者得道之質也經云生者天之大德也地之大樂也人之大福也道人致之非命祿也又西升經云我命在我不屬於天由此言之修短在己得非天與失非人奪捫心苦晚時不少留所恨朝菌之年巳過知命歸道之要猶未精通為惜寸陰速如景燭勉尋經旨事簡理直直事易行與心病相應者約著安心坐忘之法略成七條修道階次兼其樞翼以編敘之夫信者道之根敬者德之蒂根深則道可長蒂固則德可茂然則璧耀連城之彩卞和致刖言開保國之效伍子從誅斯乃形器著而心緒迷理事萌而情思忽况至道超於色味真性隔於可欲而能聞希微以懸信聽罔象而不惑者哉如人有聞坐忘之法信是修道之要敬仰尊重決定無疑者加之勤行得道必矣故莊周云隳肢體黜聰明離形去智同於大通是謂坐忘夫坐忘者何所不忘哉內不覺其一身外不知乎宇宙與道冥一萬慮皆遺故莊子云同於大通此則言淺而意深惑者聞而不信懷寶求寶其如之何故經云信不足有不信謂信道之心不足者乃有不信之禍及之何道之可望乎斷緣者謂斷有為俗事之緣也棄事則形不勞無為則心自安恬簡日就塵纍日薄跡彌遠俗心彌近道至神至聖孰不由此乎故經云塞其兌閉其門終身不勤或顯德露能來人保己或遺問慶弔以事往還或假修隱逸情希升進或酒食邀致以望後恩斯乃巧蘊機心以干時利既非順道深妨正業凡此之類皆應絶之故經云開其兌濟其事終身不救我但不唱彼自不和彼雖有唱我不和之舊緣漸斷新緣莫結醴交勢合自致日疏無事安間方可修道故莊子云不將不迎為無交俗之情故也又云無為名尸無為謀府無為事任無為知主若事有不可廢者不得已而行之勿遂生愛繫心為業夫心者一身之主百神之師靜則生慧動則成昏欣迷幻境之中唯言實是甘宴有為之內誰悟虛非心識顛癡良由所託之地且卜鄰而居猶從改操擇交而友尚能致益况身離生死之境心居至道之中安不捨彼乎能不得此乎所以學道之初要須安坐收心離境住無所有不著一物自入虛無心乃合道故經云至道故之中寂所有神用無方心體亦然源其心體以道為本但為心神被染蒙蔽漸深流浪日久遂與道隔今若能淨除心垢開釋神本名曰修道無復流浪與道冥合安在道中名曰歸根守根不離名曰靜定靜定日久病消命復復而又續自得知常知則無所不明常則永無變滅出離生死實由於此是故法道安心貴無所著故經云夫物藝藝各歸其根歸根曰靜靜曰復命復命曰常知常曰明若執心住空還是有所非謂無所凡住有所則自令人心勞氣發既不合理又反成疾但心不著物又得不動此是真定正基用此為定心氣調和久益輕爽以此為驗則邪正可知若心起皆滅不簡是非永斷知覺入於盲定若任心所起一無收制則與凡人元來不別若唯斷善惡心無指歸肆意浮游待自定者徒自誤耳若遍行諸事言心無染者於言甚美於行甚非真學之流特宜戒此今則息亂而不滅照守靜而不著空行之有常自得真見如有時事或法有要疑者且任思量今事得濟所疑復悟此亦生慧正根事訖則止實莫多思多思則以知害恬為子傷本雖騁一時之俊終虧萬代之業若煩邪亂想隨覺則除若聞毀譽之名善惡等事皆即撥去莫將心受若心受之即心滿心滿則道無所居所有聞見如不聞見則是非美惡不入於心心不受外名曰虛心心不逐外名曰安心心安而虛則道自來止故經云人能虛心無為非欲於道道自歸之內心既無所著外行亦無所為非靜非穢故毀譽無從生非智非愚故利害無由至實則順中為常權可與時消息苟免諸纍是其智也若非時非事役思強為者自云不著終非真覺何邪心法如眼也纖毫入眼眼則不安小事關心心必動亂既有動病難入定門是故修道之要急在除病病若不除終不得定又如良田荊棘未誅雖下種子嘉苗不成愛見思慮是心荊棘若不除翦定慧不生或身居富貴或學備經史言則慈儉行乃貪殘辨足以飾非勢足以威物得則名己過必尢人此病最深雖學無益所以然者為自然是故然此心由來依境未慣獨立乍無所託難以自安縱得暫安還復散亂隨起隨制務令不動久久調熟自得安間無問晝夜行止坐臥及應事之時常須作意安之若心得定但須安養莫有惱觸少得定分則堪自樂漸漸馴狎唯覺清遠平生所重己嫌弊漏況因定生慧深達真假乎牛馬家畜也放縱不收猶自生鯁不受駕御鷹鸇野鳥也被人繫絆終日在手自然調熟況心之放逸縱任不收唯益粗疏何能觀妙故經云雖有拱璧以先駟馬不如坐進此道夫法之妙者其在能行不在能言行之則此言為當不行則此言為妄又時人所學貴難賤易若深論法惟廣說虛無思慮所不達行用所無階者則歎不可思議而下風盡禮如其信言不美指事陳情聞則心解言則可行者此實不可思議而人不信故經云吾言甚易知甚易行天下莫能知莫能行夫唯不知是以不吾知也或有言火不熱燈不照暗稱為妙義夫火以熱為用燈以照為功今則盛言火不熱未嘗一時廢火空言燈不照暗必須終夜然燈言行相違理實無取此只破相之言而人反以為深元之妙雖則惠子之宏辨莊生以為不堪膚受之流誰能科簡至學之士庶不留心或曰夫為大道者在物而心不染處動而神不亂無事而不為無時而不寂今猶避事而取靜離動而之定勞於控制乃有動靜二心滯於住守是成取捨兩病不覺其所執仍自謂道之階要何其謬耶述曰總物而稱大道物之謂道在物而不染處事而不亂真為大矣實為妙矣然則吾子之鑒有所未明何則徒見貝錦之輝煥未曉始抽於素絲才聞鳴鶴之沖天詎識先資於鷇食蔽日之幹起於毫末神凝之聖積習而成今徒學語其聖德而不知聖之所以德可謂見卵而求時夜見彈而求梟炙何其造次哉故經云元德深矣遠矣與物反矣然後乃至大順夫人之生也必營於事物事物稱萬不獨委於一人巢林一枝鳥見遺於叢葦飲河滿腹獸不吝於洪波外求諸物內明諸己知生之有分不務分之所無識事之有常不任非常之事事非常則傷於智力務過分則弊於形神身且不安何情及道是以修道之人要須斷簡事物知其間要較量輕重識其去取非要非重皆應絶之猶人食有酒肉衣有羅綺身有名位財有金玉此竝情欲之餘好非益生之良藥衆皆徇之自致亡敗靜而思之何迷之甚故莊子云達生之情者不務生之所無以為生之所無生之所無以為者分之外物也蔬食弊衣足延性命豈待酒食羅綺然後為生哉是故於生無要用者竝須去之於生雖用有餘者亦須捨之財有害氣積則傷人雖少猶纍而況多乎今以隨侯之珠彈千仞之雀人猶笑之況棄道德忽性命而從非要以自促伐者乎夫以名位比於道德則名位假而賤道德真而貴能知貴賤應須去取不以名害身不以位易道故莊子云行名失已非士也西升經云抱元守一至度神仙子未能守但坐榮官若不簡擇觸事皆為則身勞智昏修道事闕若處事安間在物無纍者自屬證成之人若實未成而言無纍者誠自誑耳夫觀者智士之先鑒能人之善察究儻來之禍福詳動靜之吉凶得見機前因之造適深祈衛定功務全生自始之末行無遺纍理不違此故謂之真觀然則一餐一寢居為損益之源一言一行堪成禍福之本雖則巧持其末不如拙戒其本觀本知末又非躁競之情是故收心簡事日損有為體靜心間方能觀見真理故經云常無欲以觀其妙然於修道之身必資衣食事有不可廢物有不可棄者當須虛襟而受之明目而當之勿以為妨心生煩躁若見事為事而煩燥者心病已動何名安心夫人事衣食者我之船舫我欲渡海事資船舫渡海若訖理自不留何因未渡先欲廢船衣食虛幻實不足營為欲出離塵幻故求衣食雖有營求之事莫生得失之心則有事無事心常安泰與物同求而不同貪與物同得而不同積不貪故無憂不積故無失跡每同人心常異俗此實行之宗要可力為之前雖斷簡病有難除者且依法觀之若色病重者當觀染色都由想耳想若不生終無色事若知色想外空色心內妄妄心空想誰為色主經云色者全是想耳想悉是空何有色耶又思祅妍美色甚於狐魅狐魅惑人令人厭患身雖致死不入惡道為厭患故永離邪淫祅豔惑人令人愛著乃至身死留戀彌深為邪念故死墮地獄永失人道福路長乖故經云今世發心為夫妻死後不得俱生人道所以者何為邪念故又觀色若定是美何故魚見深入鳥見高飛仙人以為穢濁賢士喻之刀斧一生之命七日不食便至於死百年無色翻免夭傷故知色者非身心之切要適為性命之讎賊何乃繫戀自取銷毀若見他人為惡心生嫌惡者猶如見人自殺己身引項承取他刃以自害命他自為惡不遣代當何故引取他惡以為己病又見為惡者若可嫌見為善者亦須惡夫何故同障道故若苦貧者則審觀之誰與我貧天地平等覆載無私我今貧苦非天地也父母生子欲令富貴我今貧賤非由父母人及鬼神自救無暇何能有力將貧與我進退尋察無所從來乃知我業也乃知天命也業由我造命由天賦業命之有猶影響之逐形聲既不可逃又不可怨唯有智者因而善之樂天知命不覺貧之可苦故莊子云業入而不可舍為自業故貧病來入不可舍止經云天地不能改其操陰陽不能回其業由此言之故知真命非假物也有何怨焉又如勇士逢賊無所畏懼揮當劒當前㣥寇皆潰功勳一立榮祿終身今有貧病惱害我者則寇賊也我有正心則勇士也用智觀察則揮劒也惱纍消除則戰勝也湛然常樂則榮祿也凡有苦事來迫我心不作此觀而生憂惱者如人逢賊不立功勳棄甲背軍以受逃亡之罪去樂就苦何可愍焉若病者當觀此病由有我身我若無身患無所託故經云及吾無身吾有何患次觀於心亦無真宰內外求覓無能受者所有計念從妄心生若枯體灰心則萬病俱泯若惡死者應念我身是神之舍身今老病氣力衰微如屋朽壞不堪居止自須捨離別處求安身死神逝亦復如是若戀生惡死拒違變化則神識錯亂自失正業以此託生受氣之際不感清秀多逢濁辱蓋下愚貪鄙實此之由是故當生不悅順死無惡者一為生死理齊二為後身成業若貪愛萬境一愛一病一肢有疾猶令舉體不安而向一心萬疾身欲長生豈可得乎凡有愛惡皆是妄生積妄不除何以見道是故心捨諸欲住無所有除情正信然後返觀舊所癡愛自生厭薄若以合境之心觀境終身不覺有惡如將離境之心觀境方能了見是非譬如醒人能知醉者為惡如其自醉不覺他非故經云吾本棄俗厭離人間又云耳目聲色為豫留愆鼻口所喜香味是怨老君厭世棄俗猶見香味為怨嗜欲之流焉知鮑肆為臭哉夫定者盡俗之極地致道之初基習靜之成功持安之畢事形如槁木心若死灰無感無求寂泊之至無心於定而無所不定故曰泰定莊子云宇泰定者發乎天光宇則心也天光則慧也心為道之器宇虛靜至極則道居而慧生慧出本性非適今有故曰天光但以貪愛濁亂遂至昏迷澡雪柔挺復歸純靜本真神識稍稍自明非謂今時別生他慧慧既生己寶而懷之弗為多知以傷於定非生慧之難慧而不用為難自古忘形者衆忘名者寡慧而不用是忘名者也天下希及之是故為難貴不能驕富不能奢為無俗過故得長生富貴定而不動慧而不用德而不恃為無道過故得深證常道故莊子云知道易勿言難知而不言所以之天知而言之所以之人古之人天而下人慧能知道非得道也人知得慧之利未知得道之益因慧以明至理縱辨以感物情與心徇事觸類而長自云處動而心常寂焉知寂者寂以待物乎此行此言俱非泰定智雖出衆彌不近道本期逐鹿獲兔而歸所得蓋微良曲局小故莊子云古之修道者以恬養智智生而無以知為也謂之以智養恬智與恬交相養而和理出其性恬智則定慧也和理則道德也有智不用以安其恬養而久之自成道德然論此定因為而得成或因觀利而見害懼禍而息心或因損捨滌除積習心熟同歸於定咸若自然疾雷破山而不驚白刃交前而無懼視名利如過隙知生死若潰癰故知用志不分乃凝神也心之虛妙不可思也夫心之為物即體非有隨用非無不馳而速不召而至怒則元石飲羽怨則朱夏殞霜縱惡則九幽匪遙積善則三清何遠忽來忽往動寂不能名時可時否蓍龜不能測其為調御豈鹿馬比其難乎太上老君運常善以救人升靈臺而演妙略二乘之因果廣萬有之自然漸之以日損頓之以不學喻則張弓鑿戶法則挫鋭解紛修之有途習以成性黜聰隳體嗒焉坐忘不動於寂幾微入照履殊方者了義無日由斯道者觀妙可期力少功多要矣妙矣夫道者神異之物靈而有性虛而無象隨迎莫測影響莫求不知所以不然而然之通生無匱謂之道至聖得之於古妙法傳之於今循名究理全然有實上士純信克己勤行空心谷神唯道來集道有至力染易形神形隨道通與神為一形神合一謂之神人神性虛融體無變滅形與之同故無生死隱則形同於神顯則神同於形所以蹈水火而無害對日月而無影存亡在己出入無間身為滓質猶至虛妙況其靈智益深益遠乎故靈寶經云身神共一則為真身又西升經云形神合同故能長久然虛心之道力有深淺深則兼被於形淺則唯及其心被形者則神人也及心者但得慧覺而已身不免謝何則慧是心用用多則體勞初得小慧悅而多辨神氣散泄無靈潤身生致早終道故難備經云尸解此之謂也是故大人含光藏暉以期全備凝神寶氣學道無心神與道合謂之得道故經云同於道者道亦得之又云古之所以貴此道者何不日求以得有罪以免耶山有玉草木因之不雕人懷道形體得之永固資薰日久變質同神練神入微與道冥一散一身為萬法混萬法為一身智照無邊形超有際總色空以為用合造化以為功真應無方信惟道德故西升經云與天同心而無知與道同身而無體然後大道盛矣而言盛者謂證得其極又云神不出身與道同久且身與道同則無時而不存心與道同則無法而不通耳則道耳無聲而不聞眼則道眼無色而不見六根洞達良由於此至論元教為利深廣循文究理嘗試言之夫上清隱祕精修在感假神丹以鍊質智識為之洞忘道德開宗勤信惟一蘊虛心以滌纍形骸得之絶影方便善巧俱會道源心體相資理踰車室從外因內異軌同歸該通奧賾議默無違二者之妙故非孔釋之所能鄰其餘不知蓋是常耳天尊示見三略慈憫四生開衆妙之門救無極之苦是以垂文元教曲奏妙音俾未聞者聞令未悟者悟此經者蓋太上元元老君之所作也其旨也即妙性之本萬法之宗焉文雖略理實淵深一毛吞四海之波巨黍納無鞅之衆神明莫測智識難詮不可以聲求不可以色見遠而無外近而無親追之不見其前伺之不來其後無上之上不可階而升也元之又元不可得而聞也混先天而不古歷浩劫以長存尊而無名貴而無位逡巡萬變倏忽無邊照耀則日月有虧覆載則乾坤不暜隨機化導對境忘心抉疑網以入元宗引輪回而歸覺路散余一氣育彼㣥生失我則逝水以俄傾保我則後天而不老毀之者持巨帚以掃崑崙究之者類鴻鵠之飲滄海所以元言莫暢聖道難彰縱有修行徒多讀誦朝聞夕死未見其人不揆斐然輒為頌云夫四規之法獨資於神術千年之奇唯求於烏影含光寫貌雖覩其儀尚象通靈罕存其制而鑒之為妙也貞質內凝湛然惟寂清暉外瑩覽焉遂通應而不藏至人之心愈顯照而徵影精變之形斯復所謂有貞明之道也有神靈之正也捧玩之寶莫先茲器既可以自見亦可以鑒物此鑒所以外圓內方取象天地也中列爻卦備著陰陽也太陽之精離為日也太陰之精坎為月也星緯五行通七曜也雷電在卯震為雷也天淵在酉兌為澤也雲分八卦節運四時也此表天之文矣其方周流為水以瀉四溟內置連山以旌五嶽山澤通氣品物存焉此立地之文也詞銘四句理應三才類而長之可以意得此寄言以明人之文也故曰含象鑒蓋總其義焉勒書於匣詳觀制器之象矣夫道本虛無因恍惚而有物氣元沖始乘運化而分形精象元著列宮闕於清景幽質潛凝開洞府於名山元皇先乎象帝獨化卓然真宰湛爾冥寂感而通焉故得瓊簡紫文方傳代學琅函丹訣下濟浮生誠志攸勤則神仙應而可接修鍊克著則龍鶴升而有期至於天洞區畛高卑乃異真靈班級上下不同又日月星斗各有諸帝竝懸景位式辨奔翔所以披纂經文據立圖象方知兆眹庶覿希夷則臨目內思馳心有詣端形外謁望景無差乃名曰天地宮府圖其天元重謺氣象參差山洞崇幽風煙迅遠以茲縑素難具丹青各書之於文撰圖經二卷真經所載者此之略備仙官不言者蓋闕而未詳神仙之道以長生為本長生之要以養氣為先夫氣受之於天地和之於陰陽陰陽神虛謂之心心主晝夜寤寐謂之魂魄如此人之身大率不遠乎神仙之道天隱子吾不知其何許人著書八篇包括祕妙殆非人間所能力學觀夫修鍊形氣養和心虛歸根契於伯陽遺照齊於莊叟長生久視無出是書承禎服習道風惜乎世人夭促真壽思欲傳之同志使簡易而行信哉自伯陽而來唯天隱子而已矣夫陽之精者著名於景陰之氣者發揮於震故以景震為名式闕備氣之義是知貞質相契氣象攸通運用之機威靈有應撝神代形之義已覩於真規收鬼摧邪之理未聞於奇制此所以劒面合陰陽刻象法天地乾以魁罡為杪坤以雷電為鋒而天罡所加何物不伏雷電所怒何物不摧佩之於身則有內外之衛施之於物則隨人鬼之用矣大哉道元萬靈資孕其自然也忽恍不測其生成也氤氳可知若夫稟習經法精思通感調運丹液形神鍊化歸同一致舉異三清自古所得罕能盡善兼而聚之鑒而辨之靜而居之勤而行之者實惟貞白先生歟蓋特稟靈氣胎息見龍升之夢卓秀神儀骨録表鶴仙之狀心若明鏡洞鑒無遺器猶洪鐘虛受必應是以天經真傳備集於昭臺奧義微言咸訣於靈府纂類篇簡悉成部帙廣金書之鳳篆益琅函之龍章闡幽前祕擊蒙後學若諸真之下教為百代之明師焉覩先生寫貌之象則道存目擊覽先生著述之義則情見乎辭縱逾千載亦可得之一朝矣至於思神密感之妙鍊形化度之術非我不知理難詳據敬以修身德業受書道備按夫科格固超真階命分殊途顯然異軌應從解景不事登晨冥升上清弗可得而測識已然隱几云化虛室仍存代劒未飛陰邱尚閉道尊德貴終古不渝披文相質乃今無覩朝代纍革年世轉睽永懷仙烈久增誠慨子微將遊衡嶽暫憩茅山與諸法義聚謀刻石邵陵撰製美具當年今以書勒言全往行因運拙筆聊述真猷紀於碑陰式昭年世時大唐開元十二年甲子九月十三日己巳書夫得道成真有隱有顯躋神化質多術多途大茅君辭親入嶽仙業備而歸來坐致旍輿白日輕舉高邱子解形避世丹藥就而不返行馭龍鶴遁景潛升見靈妙者以獎諸道學之勤混冬卒者以息其生離之望或命分有照冥之異事不可違或性樂有語默之殊理從自適古仙出處兼此顯晦時人記傳罕能詳測故迹有再三述有前後會通機變方知至妙焉桐柏真人王君即周靈王之太子子晉也按史記云太子聖而早卒據列仙傳曰隱而登仙兩說不同蓋有由矣司馬公述乎國史劉子政驗以道書國史載其前卒之蹤道書著其後仙之事真仙相反尚見異於同時彼我相違况與懸於數紀且其特稟靈氣已積習於前生假孕人胎暫應身於此世幼而通聖是習性之久也誕而有髭是身貌之昔也鍊神入微謫仙促限知賓帝之一舉期師曠於三載說賓帝乃沖形之旨豈肯沈魂誡師曠慎不壽之言明知弗夭良以早斃人間遽還仙境輕此儲位重彼真仙遊洛川以佇懷暢笙歌之逸韻感浮邱而降接傳出世之奇方故能蛻形示終隱山學道振羽之日謝時沖天其初卒後仙亦不足疑怪也是以京陵之墓經古啓而劒飛緱氏之祠迄今立而神在化升之致事理昭然承禎早處嵩嶽慕山林之抗迹每謁堂廟欽影響之餘靈對風景而虛心懷七日之如昨瞻雲天而悠思仰三清之又元復以玉晨策命當侍弼之榮秩金庭宰職赴桐柏之名山五嶽是司㣥神所奉八洞交會諸仙遊集周紫陽受素奏之符夏明晨稟黃水之法密契者傳祕訣於同道歸誠者告幽遁之殊庭靈墟信奇丹水濟成神之域福地旌異黃雲靄不死之鄉林宇巖房存諸栖憩石梁峯闕紀其登遊所以負笈幽尋為室靜處希夷尚閟視聽罕通乃觀仙傳追伊洛之發迹復披真誥慕華陽之降形輕運丹青敬載圖象敢為讚述庶表誠心方以焚香啓玩窺天洞於素牒聽氣內思奉光儀於絳府自以在世迄於升真凡有一十一圖纂成一卷禀神幼聖繼明英聰咨諫壅水切爭飾宮如何不納更事修崇預言禍敗果致卑窮第一學聚該洞辨物談述叔譽斯窮師曠匪詰隱妙神性謬測聲質賓帝有期瞑臣詎悉第二位寓儲宮字著仙閣志淩雲漢迹厭城郭學鳳調篁思真佇洛浮邱降授解形是託第三共浮邱公東南行向嵩高山事讚曰劒杖有術符藥多方代形未化蛻質默詳尋師道長辭親愛忘隱山自逸瘞墓徒傷第四棲山隱跡學道鍊形年淹數紀業契㣥靈告期七日將邁三清桓良返報周國待迎第五傾人國內駐鶴山巔遙謝舉手永絶歸年留情數日沖景三天孤軒暢遠衆被悲旋第六形聲入妙道備登真奉朝金闕稟策玉晨德業爰敘職位攸遵二儀齊奉萬劫凝神第七班錫所稟羽儀咸備雲景浮軒龍鶴騁轡旍節導從雲仙會萃自天乘階瞻山赴位第八山有玉洞宮曰金庭九天通象三晨伏精侍帝斯任弼王所貞領司五嶽統御百靈第九周君訪道丹符見授夏氏求仙黃水之究鍊形奇術非師不就幽感爰通冥期可候第十真仙匪遙感通惟密應彼幽志降茲靈質誡訓著言詠歌兼述見景非久沖真返一第十一天地含象日月貞明寫規萬物洞鑒百靈龜自卜鏡自照吉可募光不曜青蓋作鏡大吉昌巧工刊之成文章左龍右虎辟不祥朱鳥元武順於旁子孫富貴居中央桐琴字清素臨海桐柏山靈墟之木也其先自開闢之初稟角星之精含少陽之氣昭生厚土挺出崇嶽得水石之靈育清高之性擢幹端秀抽枝扶疏盤根幽阜藏標散木經億萬嵗人莫之識唯鳳從之遊以棲蔭焉神茂靈嗣子孫彌遠承先胄之喬者聚於魯郡嶧山之陽分株徙植略遍諸嶽既因地受氣亦殊體異材雲和空桑冬夏異奏繞梁焦尾世代奇聲昔伏羲氏之王天下也以諧八音皆相假合思一器而備於律呂者編斫衆木得於梧桐製為雅器體名曰琴琴者禁也以禁邪僻之情而存雅正之志修身理性返其天真夫琴之制度上隆象天下平法地中虛合無外響闕暉暉有十三其十二法六律六呂其一處中者元氣之統則一陰一陽之謂也而律管有長短故暉間有賒促當暉則鳴差則否亦猶氣至灰飛時移景正神理不測其在茲乎上為人頸人肩取其發聲之位也中為鳳翅取其來儀之音也末為龍齗取其幽吟之感也其餘形製各因用立名施以五絃繩繅有差品以五音調韻成弄於是奏之通神明之德合天地之和黃帝作清角於西山用會鬼神虞舜以南風之詩而天下理此皇王以琴道致和平也故曰琴者樂之統君臣之恩矣師曠為晉平公奏清徵元鶴二八降於廊門再奏之引頸而鳴舒翼而舞瓠巴鼓琴則飛鳥集舞潛魚出躍師文各叩一絃乃變節候改四時總諸絃則景風翔慶雲浮甘露降醴泉涌此明間音律者以琴聲感通也黃老君彈雲和流素之琴真人拊雲和之琴內經號琴心文涓子著琴心論此靈仙以琴理和神也孔子窮於陳蔡之間七日不火食而絃歌不輟原憲居環堵之室蓬戶甕牖褐塞匡坐而絃歌此君子以琴德而安命也許由高尚讓王彈琴箕山榮啓期鹿裘帶索攜琴而歌此隱士以琴德而興逸也伯牙鼓琴鍾子期聽之峩峩洋洋山水之意此琴聲導人之志也有撫琴見螳蜋捕蟬蔡雍聞之知有殺音此琴聲顯人之情也是知琴之為器也德在其中矣琴之為聲也感在其中矣無成與虧雅量貞固有操而作響應通變至於五性有殊習之而愈勵則箕子以全忠子夏以明孝六情有偏聽之而更切則景公之酣樂漢祖之傷心與夫冥寂之士怡間之居者希音通於反聽太和沖於浩然則孫登之神遊宇外稷公之道長邱中猗歟夫子之所玩也宏矣深矣豫以癸卯嵗居靈墟至丙午載有桐生於階前逮壬子祀得七嵗而材成端偉枝葉秀茂松竹為林堅貞益其雅性飈澗為友清泠叶其虛心意欲留之棲鳳而鳳鳥未集不若採以為琴而琴德可久候瓊霜之既降俟圭葉之凋去定陰陽之向背揆長短之尺寸爾乃取其元幹不暇待其孫枝以甲寅年手操斤斧自勤斫削重其清虛外運力思然琴之體既有人肩而無其首尚象之義將為未備斯所以圓其首曲其翅方其肩短其足自餘改制頗殊舊式七月丙戌朔七日壬辰造畢於是施軫珥調宮商叩其音韻果然清遠故知彼㣥山之常材此台嶽之秀氣用白賁之全質施緑綺之華彩遁世無悶有託心之所寂慮怡神得導和之致與其遊靈溪登華峯坐皓月淩清飈先奏幽蘭白雪中彈蓬萊操白雪引此二弄自造者其木聲也則琅琅鏘鏘若球琳之竝振焉諸絃合附則采采粲粲若雲雪之輕飛焉衆音諧也則喈喈噰噰若鸞鳳之清歌焉因時異態變化不窮觸類通神幽興無已非絲桐之奇致何感會之若是取聲之入神者清角清徵體之全真者素也故云見素字以厥義式表其德敬而友之期乎益矣夫木之為用也多矣樂之為聲也衆矣未若以桐制琴之為也何者咸池率舞資八音之協簫韶來儀備九成之奏而桐樹自延於丹鳳琴聲乃降諸元鶴為感通之所致斯在樂之特優豈不以其象法天地其音諧律呂導人神之和感情性之正者哉自古賢人君子莫不操之以無悶玩之而無斁左琴右書蓋有以也清素者以山名桐柏而桐樹生焉地號靈墟而靈氣出焉故有將遽長佳材則成雅器調高方外弄送邱中同心之言得意於幽蘭矣嵗寒之操全貞於風松矣相與為冥寂之友者淡交於琴乎
