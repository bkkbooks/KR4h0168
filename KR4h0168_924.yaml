  - {type: head, offset: 6687, content: 上清侍帝晨桐柏真人真圖讚(幷序), id: KR4h0168_NFKB_924-h17, level: 2}
  - {type: head, offset: 7356, content: 圖畫周朝宮闕作穀洛二水相合而鬬稍毀宮城處人夫負土欲壅此川作太子具冠服立於靈王前諫事讚曰, id: KR4h0168_NFKB_924-h18, level: 2}
  - {type: head, offset: 7390, content: 圖畫東殿宇作太子坐處與叔譽師曠問答事其師曠乃舉躅其足讚曰, id: KR4h0168_NFKB_924-h19, level: 2}
  - {type: head, offset: 7424, content: 圖畫太子吹笙遊於伊洛間道士浮邱公降接之事讚曰, id: KR4h0168_NFKB_924-h20, level: 2}
  - {type: head, offset: 7458, content: 圖畫宮殿作太子臥卒形㣥臣嚬泣事及太子, id: KR4h0168_NFKB_924-h21, level: 2}
  - {type: head, offset: 7506, content: 圖畫嵩高山作修學巖林居處巖中有經書丹竈浮邱公坐在其中巖前作壇王君坐在壇上燒香精思事又王君出於山次見桓良共語事讚曰, id: KR4h0168_NFKB_924-h22, level: 2}
  - {type: head, offset: 7540, content: 圖畫王君乘鶴駐在緱氏山頭舉手謝時人幷作周國帝王儀仗及時人眾等望不得到及王君控鶴昇天事讚曰, id: KR4h0168_NFKB_924-h23, level: 2}
  - {type: head, offset: 7574, content: 圖畫天上上清宮闕作道君形像仙真侍衞作二童側立共捧案案上有玉策并作一真人側立宣付王君讚曰, id: KR4h0168_NFKB_924-h24, level: 2}
  - {type: head, offset: 7608, content: 圖畫王君乘雲車羽葢僊靈侍從旌節導引龍鶴飛翔從天而降欲赴桐柏山洞宮事讚曰, id: KR4h0168_NFKB_924-h25, level: 2}
  - {type: head, offset: 7642, content: 圖畫桐柏山作金庭洞宮王君坐在宮中眾僊侍衞并五嶽君各領佐命等百神來拜謁讚曰, id: KR4h0168_NFKB_924-h26, level: 2}
  - {type: head, offset: 7676, content: 圖畫真人周季山作道士服於桐柏山見真人王君王君以左手執素奏丹符欲付周君周君長跪而受之作夏馥著古人衣遇見王君王君把一卷書欲付馥馥長跪舉兩手受之其周夏二人皆作山人裝束各作一笈解在其人邊石上皆跪於王君王君作真人衣服并有三五箇僊人侍在左右讚曰, id: KR4h0168_NFKB_924-h27, level: 2}
  - {type: head, offset: 7710, content: '圖畫茅山楊君學道壇宇處王真人降見着芙蓉冠絳衣白珠綴衣縫帶劒楊君把紙筆附前而書其衣作真仙之製其劒肖[:#AS-FBED:●]皮依經中樣式讚曰', id: KR4h0168_NFKB_924-h28, level: 2}
