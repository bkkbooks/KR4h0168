front:
  text: 全唐文欽定全唐文卷二百九十六懷素字惟白潤州丹徒人舉進士又應制舉登文學優贍科開元初為戶部侍郎加銀青光祿大夫纍封常山縣公三遷祕書監兼昭文館學士卒年六十贈潤州刺史諡曰文
  hash: sha256:aabd54858fe00b45ccfa1ee37c89ac3984bcc159623637a251b6543eabd8afad
  markers:
  - {type: head, offset: 14, content: 馬懷素, id: KR4h0168_NFKB_296-h1, level: 1}
body:
  text: 南齊巳前墳籍舊編王儉七志已後著述其數盈多隋志所書亦未詳悉或古書近出前志闕而未編或近人相傳浮詞鄙而猶記若無編録難辨淄澠望括檢近書篇目并前志所遺者續王儉七志藏之祕府令問元宗時人紫禁彤庭兮二月春戲蝶流鶯兮百處新借問此來遊幸所是日芳菲最惹人乘桂苑之春晚值芳林之雨霽徵聲都尉之門召舞平陽之第的瓅綵仗逶迤羅袂兩兩相看步搖簪一一共鬬承雲髻鳴鑾漸出轉佩相從仙宮萬戶層城九重綵扇似月從騎如龍奏清笳於楊柳下天蓋於芙蓉灞川宛轉秦郊騎錯北極儀鳳之樓南鄰隱豹之崿入紅園而移步輦俯緑池而卷行幕鳴管則嬌鳥不飛拂簟則輕花自落留連帳殿彌望帷宮水搖搖而岸花紫烟微微而野樹紅鳴文鷁於波面奏嬌鶯於掌中千鍾獻堯之酒五絃歌舜之風日落前溪雲垂後殿陌上氣合花間露泫徐飛睿藻再融神眄㣥公既奏柏梁文萬乘方回瑤池宴惟漢武皇聖謨洋溢英徽振於帛丿糸古洪德協於元吉騰休聲馳茂實掩八紘以稱大御六龍而首出雖端拱之無為常鍊奇以永日於是乎訊殊方之士考靈仙之術張皇臺殿恢拓宮室飛廉之觀既成長年之宮巳畢乃金莖之仙掌承沆瀣之精華歘聳擢以橫漢屹岧亭而出霞珠盤上開疑天半之懸日丹莖直指若峯蓮之秀花崛然雙立巍乎造天紛爌爌以照野赫奕奕而燭川晴朝有日兮金鏡相射清夜無雲兮銀露自圓屑瓊蕊以充餌吸玉英以延年想王喬之再覩乘羽服以蹁躚思王母之一至拖霓裳以嬋娟鍊液之法斯在心金之術攸傳觀其逈出囂塵孤高巃嵸錯金盤於龍鳳曳浮光於螮蝀長風激而自清震雷驚而不動亦可以納虛淡之間曠遺代俗之煩總然而仙在物表君居人上物表者不可以苟求居上者不可以自放虛信神君之語徒蓄長生之望求師入海終貽欒大之誅書帛飯牛卒受文成之誑竟迷情於虛誕亦何補於崩喪則知履道者守國以正直失德者納人於邪妄向使武皇不謬於茲道亦可以冠百王以為尚也衆山邐迤曾何足仰未若太華崒為之長削成三峯壁立千丈伊昔太虛結而為山伊昔巨靈拓而為掌擘開元象崛起厚壤當少陰而德合秋成據丁酉而氣函金爽深沉其色菡萏其狀雲霞不映而其勢彌雄塵露將裨而其高靡讓掌形仙跖石容天壯雖造次於自然若鐫磨於意匠晦夕霧而㣥峰乍隱煦朝陽而衆壑相向由是考圖籍高為四嶽之先盼靈奇勢出九天之上若乃雲搖羽蓋鶴掛飛泉危峯並吐巨掌高懸異蓬萊之鼇泛海若崑崙之柱承天清露將零小為盤而仰漢陽烏假道疑覆日之孤蓮不但子先之霓裳時見羊公之石榻仍全況乎運啓皇家應河源而誕聖豈比詩歌周德美嵩甫之生賢者哉既而嵐氣霽媚烟光晚濃林巒一色巖崿千重想清虛而可覩歎攀陟兮無從歌曰苔徑滑兮石無蹤道不可得仙不可逢儻賜一丸生羽翼願輕舉於三峯太極經始純坤傾東勢以嶽鎮氣以川融於是靈闢襄華象開洪濛橫大野以中豁夾洪河而北崇爾其沓嶂無際連波方永噴激萬里回合千嶺總崤函之氣象壓秦晉之封境山同河潤上騰雲雨之祥水與時清下倒巖巒之影若乃騁遠望馮層城秋爽元氣朝升大明偉連天之浩汗壯發地之崢嶸翠岫屏擁澄瀾砥平疑白虹飲壑而半隱似寒雲抱塞而初橫及夫俯臨迫察詭麗雄悍峻勢危而不騫靈源注而常滿積陰騰氣與嵐色而相鮮爍日生霞連榮光而不斷觀其蓄含精秀孕育風霆應會昌運發揚炳靈茂賢傑于間出翊邦家而永寧況乎山積鴻休川流景福明徵祥瑞幽贊化育此其所以配乾坤此其所以稱嶽瀆豈徒玩夫縈帶委注箕開翼張巍巍峩峩滔滔湯湯於天之峻極赴海之靈長而巳士有圭竇強學金門獻賦困陶侃之無津恥孫宏之不遇覽襟帶而增氣追聖賢而遐慕想劉公之歎微禹其魚感吳子之言在德為固義由景行仰高山而自慙志切朝宗與大海而同注倘餘潤之波及期變化於雲路正北曰并有唐作京密近戎狄張皇甲兵尹也總居守之任將也當節制之名故卒乘輯睦而王都肅清於是斷武誼按亭燧電轉前旌風飄橫吹楊葉箭的蓮花劍騎下代郡而出雁門抵平城而入胡地挾纊稱暖投醪必醉則知撫之者誠難用之者不易是時陰閉㣥山寒雕衆木川平塞逈冰飲霜宿慷慨乎大荒倘佯乎遊目區脫潛遁屠耆懾逐訴古城之謂何傳魏家之所築伊昔晉京板蕩海縣沸騰不有所命將何以興王師赫怒爰整其旅霧集雲屯龍驤鳳舉棄萬里之沙漠傍五原之風土肇為此都實惟太祖夫其規典章辨封疆池桑乾之水苑秦城之牆百堵齊矗九衢相望歌臺舞榭月殿雲堂開儒士於璧沼貯美人於玉房翕習沸渭熒熒煌煌取威定霸於是乎在施令作法罔或不臧武破六州之內文宅三川之陽何其壯也既而年代倏忽市朝遷徙干戈鼙鼓之雄綺羅絲竹之美孰不烟散雨絶沙埋灰委樹名歡而詎存鳥稱樂而俱死危堞既覆高墉復夷寥落殘徑依稀舊墀榛棘蔓而未合苔蘚紛乎相滋伏熊鬬贙騰麕聚麋常鳴悍鷩乍嘯愁鴟不可勝紀但令人悲胡風起兮馬嘶急漢月生兮雁飛入可憐久戍人懷歸空佇立有客志遠才雄秉義由衷負詩書禮樂之用蘊蕭曹魏邴之風虜庭高枕河源鑿空霜犯鬢而先白塵染顏而少紅三為都護五掌元戎益封而廣國事利而業崇獨見淩雲而作賦誰言坐樹而論功者哉公府洞溪㣥木羅生歷衆芳而選妙得雙榴之美名擢質森聳垂陰淒清掃危階之數級蔭閒庭之四平夾砌駢羅則東西表賓主之位與時消息則寒暑任榮枯之情故其異影同庇芬芳對出夏景焯而開花秋氣結而成實剖之則珠彩輝掌捧之則金光照日其生也雖雜居幽徑之蘭其用也亦閒若雕盤之栗若乃當公務之總偶訟庭之要爰趨爰揖或長或少皆指而稱曰彼石榴之所生何託根之至妙俯環廓之回合拂危簷之窈窱類甘棠之勿翦人縱去而猶思若李樹之無言蹊自成而不召是以固其根幹美其華耀乍開軒而翠彩重合甫褰帷而紅榮四照也或曰物惡近以招纍事貴遠而克全空遁幽以獨美抱甘香而自捐豈比夫善生者託仁以遠害能壽者輔道以延年是以蒙君子之惠渥故終保夫自然卓哉有唐之開元也拉五帝而軼三王灑雲雨之雱澤炯日月之重光惠及豚魚則鳥獸咸若化被草木則行葦不傷爾其尚節儉反貞淳照之如日育之如春猶以為震出而亨則隨方而東狩豫順以動則因時而西巡非以肆志放欲蓋乃觀風勞人於是乎天子乃命㣥僚考吉日升玉輦馳清蹕霍濩沸湧鏗訇洋溢龍輿馳地杳空山而自鳴紅旗照天轉洛橋而半出若乃宸襟遠覽睿賞遐宣則野泛佳氣樹生彩烟過澠池而懷古入傅巖而想賢覽唐墟之遺跡嘉舜風之慨然白雲初飛澡秋思於汾水黃河一變濯聖慮於秦川是以問年德恤惸獨望秩山浸肆覲㣥牧屬車所止罔不清肅乃有邑老田父進而歌曰歲既稔而時清我后來兮應天行東都士庶扶輪送西土諸侯掃地迎君之德兮德無有路旁勞賚皆牛酒乘輿一至長安城千秋萬歲南山壽門闥洞開國都以赫禁鑰崇設王府則有茲率厥典欽乃攸司重城建扃安上題榜當天衢以南豁臨帝庭而北峙上以發皇明之壯觀下乃備他盜之非常瞻彼主司或殊善閉闔而不鑰已彰慢藏開而不鍵誰測深意但人同於失雖有類於茅茹法貴從寬尚未方於莧陸若謂一時有誤須稽錯失之由必當外戶不扃寧纍升中之化請捨小過無傷大猷幸未深於滅耳庶無勞於噬臍將執御乎必使能者伎苟有素失乃非愆僕氏御戎豈其敗績六藝之末尚勤夫子之言十乘之先遂執王良之轡既而師貞以律騎勇爭鋒外強中乾忽陸離而莫制大軍小將却遷延而欲奔非馬其人異叔牂之沒怨有矢在肉知賁父之非罪圉人以告誠合誄之正也不欺將子無怒秉國之權非賢奚可因人所利君子不奪甲為政者異於是乎以為畜水不流竭之何害豈知舊防是要罷之或損且川浸藪澤殖物於是乎生蒲魚稻粱為利於是乎博濟人理國職此之由潰塘涸源過孰斯盛蓋藏或寡純固則盈割鮮厭粱空思於舊貫飯豆煮芋奚取於訛言愚謂載以既陂政可遵於夏訓廢而興謗事無取於漢臣此則有過能改彼當內訟自直無往不復傳者何傷聊以抒憂未為惑衆甲自不典人無匪彞輒欲笞之末由也已溫璩元宗時人維開元六年歲次戊午夏五月甲午朔三日景申哀皇后裴氏梓宮啓自先殯將遷祔於恭陵之山塋禮也皇上御寰區而翼翼纂洪緒而親親感上仙於周嗣痛未從於虞嬪攀鶴駕於終古贈鷖輅而增新時無遠而惟吉物有容而必陳纂芳佇思徵幽寄神載揚清懿之烈爰屬有司之臣其詞曰月麗雲升靈叶爽馮鄉茂族晉邑丕承土厚河廣祥發慶膺公侯必復紱冕攸興艮精兌象宜家化國昌胄延和榮門誕德淑問不已柔風允塞素里揚英清閨仰則一人元良萬邦大本天作之合興能烈壺家本楙於漢封地先歸於晉衮主饋旌善賀酒騰歡承暉養德奉景訪安搖金羽之熲熲結環珮之珊珊賁日月之光色妙靈象而無端含章握文敬微慎獨崇法服於翬組接懿筐於蠶簇覲皇英而上親祗宵燭而下睦庶無違於信順期有憑於福靈忽虧光於輪月奄落彩於前星爽仁壽於偕老遘夭禍而斯丁瞻神宇之惟漠感靈衣之靡形驚回風於虛殿宿衆鳥於空庭顧長御以揮涕甘自殉於山扃制歷時而遽終情徇節而恆苦草驕春而繞砌蟲吟秋而入戶限百刻之不延調六脉其誰顧嗚呼哀哉殂謝緬其永久氣節漫以流換感窀穸之冥漠軫皇情以淒歎稽舊章之典禮崇新命之綸渙濟天地而德合綜神靈而道貫嗚呼哀哉日吉兮辰良玉佩兮金章命騏校以進駕翊龍輈而上驤伐靈鞉於河鼓建參旗於太常號宮女之嗷嗷遣使臣之皇皇騰魚軒兮背北渚亂鳳管兮越南岡當赫曦之畏日如徙靡之秋光望層城而不返遵厚夜而何長嗚呼哀哉神理惟昧萬物同宅人生有終駟馬過隙訊虞妃於前古聞賓帝於在昔感伊洛於山川懷靈仙之顯迹彼宵形兮天壤云誰固兮金石惟彤管之芳輝與青史而無斁嗚呼哀哉寅獻元宗時冠氏尉終臨淮太守拔茅稱吉大易至言刈楚飛音詩人起詠進士以鋪翰振藻見舉於鄉閭文麗筆精允光於省闥據才雖稱片王無狀須依一名出敬梓之鄉但論進士入握蘭之署旋求茂才名異奏名事便迂僻訴非訴禮義甚乖踈瞻乎不巳之詞何哉無狀之繆請依鄉舉謂充公途五帝殊功不相襲樂三王異俗豈同常禮是以因事立制則制施而下從量時署官乃官修而人理苟有其闕誰執其夭夭心且祭天饗神太常攸主鬱人酒正光祿是司率彼舊章博士諸供而有裕顧瞻新職匠人久廢而何憑夫以誠敬無文精靈不測若昭之以明德聽之以和聲則澗溪沼沚之毛可羞宗廟潢汙行潦之水堪薦鬼神且虧季蘭之誠何必鬱金之草況國家光膺駿命克享天心合昭穆以潔精下神祗而誠感酌至元之酒七廟孔修奏無聲之樂六宗攸序所以鬱鬯之禮見遺而不行金草之司有文而且闕省司含香推妙起草稱工酌一人之心是言沿廢引三推之令遽比兼供藉田既不供犧牲造酒何煩供鬱鬯禮雖見著令式空存請從祠部之言無聽太常之執覃揚州兵曹參軍開元朝入為麗正院校書遷萊州別駕坐誣告刺史流遠方臣聞古者明王之制也史書過瞽誦詩公卿諫士傳言庶人謗於道商旅議於市然後君得聞其過失而後改之見義而從之所以永有天下者也陛下不以臣不肖忝在學士敢不竭忠盡節有隱避乎詩曰靡不有初鮮克有終老氏曰慎終如始則無敗事曩者韋氏稱制萬邦憂惶實賴陛下神武克復社稷其初也賤珍寶禁奢華罷土功敦朴素革衆弊代天工垂拱無為凝心虛靜追踪堯舜比德羲軒天下禺禺傾耳注目喜遇非常之主復在於今日矣康哉之歌復聞於黎庶矣奈何易未幾而又興建中都乎畜於間廏數倍乎溺於聲色無極乎耽於遊畋不節乎營為繕造衆多乎都邑課稅煩劇乎不省亡國之風因循覆車之軌天下失望四海驚嗟朝野心知而懼罪鉗口以斯統御天下豈所謂可久可大之業耶且自歷代之君皆欲建萬代之業使子孫長有天下者也豈使子孫傾覆天下者哉子孫若覺所行必將敗亡則必恐懼不敢為之矣以國之主自謂必不亡也然後至於敗亡也存國之君恐懼必將亡也然後至於不亡也易曰知進退存亡得喪而不失其正者其惟聖人乎又曰其亡其亡繫於包桑此言懼亡獲堅固也管仲曰古之隳國家失社稷者非故且為之也有樂焉不知其陷於惡也陸凱曰有道之君以樂樂人無道之君以樂樂身樂人者其樂彌長樂身者不久而惟陛下居安慮危在得圖失防患於無形之始慎禍於纖微之初念管仲之至言棄少樂而存社稷覽陸凱之篤論思樂人而彌長也禮記曰孟夏之月無有壞隳無起土功無發大衆無伐大樹昔魯夏城中邱春秋書之垂為後戒今建國都乃長久之大業也犯天下之大禁襲春秋之所諱詩曰畏天之怒不敢戲豫孝經曰理國者不敢侮於魚衆寡而况於士人乎今不恤庶人之擾而建都國不畏上天之怒而長戲豫棄安就危棄存就亡棄易就難棄約就奢而欲永有天下恐不可得也但恐頃年巳來水旱不節天下虛竭兆庶困窮戶口逃散流離艱苦鞏洛暴水所喪尤多江淮赤地饑餒者衆加以東北有不賓之寇西涼有喪失之軍干戈歲增疆埸騷動近又胡羯逆命徵發不寧料事度宜豈應更建中都乎至若兩都雖舊制矣然而分守官衆多矣費耗用度尚以為損豈況更建中都乎夫河東者國之股肱郡也徑鋭強兵盡出於是其地隘狹今又置都十萬之戶將安投乎夫惟所造城闕爰及苑囿毀拆閭閻令其別創損壞冢墓令其改卜殷富者破其産業貧窶者莫知所從外迫威詔內懷湯火怨嗟之聲驚惶之擾盈於途路逮於鬼神老小孤惸茫然無計憂悲苦惱不可勝說此甚不可也且陋東都而幸西都自西都而造中都取樂一君之欲以遺萬人之患務在都國之多不恤危亡之變悅在遊幸之麗不顧兆庶之困非所以建深根固蒂不拔之長策矣昔漢帝感鍾離意之言息事德陽之殿魏主採續咸之諫止造鄴都之宮臣職非其位言發微細然聖主不以人廢言不以微擯人矣臣愚誠願陛下發德音垂明詔深恤黎庶罷事中都則福履無疆天下幸甚謹言冬曦定州鼓城人第進士開元時官考功員外郎直學士遷中書舍人內供奉終國子祭酒江上之仙鶴兮鳳翥而龍躍氣摩青天兮遙橫碧落集洞庭兮乍駐倏回翔兮寥廓江上之鳴雁兮違陰以就陽中霄翻翰兮上帶青霜雖主人兮感會蹇淹留兮瀟湘湘水兮深深荊山兮岑岑荊有玉兮玉為音湘有芷兮芷為心我所思兮愔愔不得見兮霑襟搦芳札兮援寶瑟申短章兮吐長吟草萋萋兮自緑目征帆兮春水曲永一望兮空躑躅望眇眇兮思帛丿糸帛丿糸憶都門兮夏雲邊邈千里兮無由緣送涼風兮脫葉復窮陰兮冒天緬一日其如歲矧四運之相遷離別也騷愁焉惡乎然惡乎不然砥柱山之六峰者皆生河之中流蓋夏后之所開鑿其最北有兩柱相對距崖而立即所謂三門也次於其南有孤峰揭起峰頂平闊夏禹之廟在焉西有孤石數丈圓如削成復次其南有三峰東曰金門中曰三堆西曰天柱湍水從黃老祠前東流湍激蹙於蝦石折流而南潄於三門包於廟山乃分為四流淙於三峰之下抵於曲限會流東注加以兩崖夾水壁立千仞盤紆激射天下罕比時以內兄牛氏壯而遊焉相顧賦之以紀奇跡大河瀰漫上應天漢濬靈波於積石之西瀑懸流於崑崙之半茫茫禹功茲焉會同鑿連巖而瀉㶑羅崛島以攢空闊兮若橫兩闕於江上岌兮若拔三山於海中崇山嶔崟呀水淙射左右飛濤起伏相擊截奔湍兮躋石臺目霍濩兮心徘徊三峰砥其却立架崇門以洞開連嶂紆河以壁峭疊巘喬空而半頽洪流蹙折以坌涌潄湍崟窟而相磓苞巒祕隒砯其鼓作回澩澎瀑灕以山摧奔濤迅澓紛其蕩駭蓬渤滑淈霍以雲回盤渦窙寥以谷旋奔石砰磕以成雷拗怒未泄橫流逆折合如地轉散若天裂搖騰䂬嶼刷蕩土冊穴硉巖腰而沫沸淙隘口而湍咽然後澡雲霽靄收濤卷瀨汨沄沄以無聲漫浩浩以東會總四流而混合注三穴而滂沛泛洪漣於大磧之東薄餘怒於天地之外當其時也山獸驚躍水禽亂飛魚獺沈潭以不動獑猱拱樹以相依竄鮫人於洞壑帖舟子於漣漪莫不愁白鷺之初下歎黃牛之暝歸若乃降望金門忀徉石觜窮巖萬仞一曲千里松歷歷而生涯草鬖鬖而覆水雲蓬茸兮歷地生風颼飀兮百籟驚猿惜暮而悲叫鳥辭春而不鳴阽嵲屼兮杪崢嶸飛客心兮動客情憐石菌之冬茂賞瑤芝之夜明惟夏君兮永蟄拜靈廟兮何及榱梁古兮山鳥棲階壁蕪兮野鼯入感微禹之歎深亢幽歌以佇立歌曰申負石兮空自奇客乘查兮何遠為君不見虛舟之泛泛浩乘流而不羈臣聞夫今之律者乃有千餘條近有隋之奸臣侮弄其法故著律曰犯罪而律無正條者應出罪則舉重以明輕應入罪則舉輕以明重立夫一辭而廢其數百條自是迄今竟無刊革遂使生死罔由乎法律輕重必因乎愛憎被罰者不知其然舉事者不知其犯臣恐賈誼見之慟哭必矣夫立法者貴乎下人盡知則下不敢犯而遠機穽文義深則吏乘便而朋附盛律令格式謂宜刊定科條直書其事其以準加減比附量情及舉輕以明重不應為之類皆勿用使愚夫愚婦相率而遠罪犯者雖貴必坐律明則人信法一則主尊和璧國子祭酒冬曦弟擢進士天平四序有寒暑之殊地列九州著華夷之別風土既其不等節候於是莫同廣漢夷陬境連巴俗岷隅沓轉雲峰與霞岫爭輝江溜橫分錦派共沙湍遞映候乖中壤茂三秋氣離炎州草長二月至若時鍾季夏節一重陽金方始萌火德不競非無典司之主必告伏匿之辰當復取捨因循何得輒為改革國家明堂布政象法已行豈使均雨之鄉翻聞易日之義雖殊風俗之典恐非得時之宜勒依恆式謂符通理居貞國子祭酒冬曦弟擢進士第官吳郡太守兼江南採訪處置使輶軒涖郡十有一月矣猥以薄材謬承重寄欻自淮服半刺超為江南方伯郡領二十地亘五千里皇皇者華幾慚輝道兢兢其志常戒飲冰周爰咨詢申命行事損以懲忿窒欲益以改過遷善豺狼擁路埋輪以逐之騏驥伏櫪攬轡以騁之宣王化而盡覺風行安氓心而不知日用寬猛相濟威恩兼洽長吏肅警疆土乂寧日月其除冰霜再履始也務不暇給今也處有餘閒別祈神仙獲歲豐稔乘公堂之宴縱靈廟之游城不復隍樹無禁伐闉陬荒以毀梁木小而摧乃喟然嘆曰神必依人人茲望福依無所據福安來哉昔越踐滅吳楚威滅越考烈王繼立春申君登相封江東之巨縣城吳墟為大都專主威權救國災患與趙魏為四公子招賓旅有三千人擠聘使之玳簪誇上客之珠履王久無嗣君方患之璅兮李園托其女弟既歆然而有娠遂祕之以獻王王乃殂落子為君主一尢妄之人靡信無妄之禍遄興舍人其亡死士常偵棘門之下蒿里相催天乎天乎胡寧忍此令尹多居郢國假君恆守吳宮鳥焚其巢何笑號之先後蛟沒其舳繄父子之沉埋夷盡其家賊園之故一朝冀將滅口千古猶為痛心今邦牧所居使臣所理故宮之內故事備聞於是大葺堂庭廣修偶像春申君正陽而坐朱英配享其側假君西廂視事上客東室齊班李園死士庚方授戮僕夫間駿辰位呈形大雪久寃之魂更申如在之敬家屬穆穆展哀榮也儀衛肅肅振威名也巨木擁腫而皆古小栽青葱而悉新總之一門是謂神府宜正名於黃相削訛議於城隍昔韓整守吳創吳伯之廟太史適楚壯楚相之宮余顧兼之言可則也神有新宇享之落之人有貞石追之琢之我躬披文紀之告之君宜密應祐之福之初余之拜命也表授廣陵糾曹張禺兵曹蘇相為判官安喜尉李岡為支使同郡舊知精明深識異途新合歷落王褱材三人冀有我師四牡慎行爾職欽刷往賢之恥歎垂後昆之裕長史宋尚主臣餘慶佑嶽良能司士楊彥琮每憂司存實稱佳吏預乎作廟翼翼觀乎降神欣欣咸亦相因斯焉附出唐天寶單閼歲除日中散大夫守吳郡太守兼江南道採訪處置使柱國天水趙居貞記頤貞國子祭酒冬曦弟擢進士第官安西都護王爵高懸惟才是與君子陳力必厠周行雖士庶區分固有限於流品而忠信之道是無隔於胥徒乙也鯫生職司小吏業非地望有殊代祿之家才同懷寶頗異名人之子念荊璧之未斷惜連劫之莫知吾道不行斯命也已執鞭之士抑亦為之遂僶俯於下寮俄鞠躬而從役持劍曠久執炬斯勤竟無自明之效莫騁鉛刀之割掃丞相之門忠貞未表備功曹之卒日月其除無徐君之知已追延陵之挂劍爾位其曠誠逃王者之規嚴罰將加恐有蔽賢之責司徒尚猶不拜主吏更欲何尤不伏之辭恐為妄作清白二渠其來自遠善利萬物聞諸古昔故疏溝若雨荷鍤如雲利彼秦坰興功鄭白雖墾鑿南畝人歌日出之功而翹望西成不假月離之潤所以每加修葺式建隄防各有司存標諸令式高陵令以遷鶯入仕翔鸞布德宣風百里早副天心管轄二渠正當交口欲加門堰諒有前規即此經營非無往例但以金堤柳色未變新枝玉琯葭灰尚飄春雪節未逾於二月事不越於三章府局論辜竊以未可欲加罪也其如詞乎
