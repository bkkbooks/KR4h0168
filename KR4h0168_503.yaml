front:
  text: 全唐文欽定全唐文卷五百三權德輿二十一
  hash: sha256:ff72c891794d4b3d558d9b6ed66883ef433c50e54dfb2416b79915fbf02812eb
body:
  text: 府君諱有方字某天水略陽人也曾祖崇本皇朝散大夫滑州匡城縣令祖若訥皇右補闕起居郎桂歙梓三州刺史考倣皇杭州紫溪縣令代以儒門四科為家法故發於文則菁華施於政則惠和公承是休德飾躬踐行得詩之無邪易之通理凡五授命皆以推擇曰左清道率府兵曹參軍太子通事舍人陳州司法參軍亳州司士參軍以大理評事兼徐州蘄縣令滿歲南遊遘疾於途以貞元十六年夏五月歿於楚州之旅館春秋若干夫人河間劉氏樂城公仁軌之元孫也明智才淑有子曰長儒弱冠舉進士甲科文行清修苴枲其容水漿不入以某年某月日得吉卜於某地其引也蓋殯也以輿師繁興未遑歸窆於東周之大姑刻圓石書其略云公夷通直信睦姻任恤位卑而志宏居約而家肥有為有守不疚不跲其初命再命宮衛贊謁雖未居真秩而四方之嘉招狎至其後掾二邦奉六條受祿不誣實聞其政或攝領通邑或分乘軺車皆有裕人之仁急病之義及理於蘄也能遂物之宜不奪人之時嘉惠善利洽於千室猶即墨桐鄉之理無不及也又嘗饋師於回中從事於夷門皆有功利稱於其府其去蘄也西方節將議委以謀猷介僎之重且謂弓旌之未稱也將以柱後惠文之冠招公章既上而公大病斯可歎己猶子族子自期及緦侍疾承訃奔波塗潦又以見公夙訓慈仁之所逮也噫嘻自匡城至公四代而三為縣大夫皆用循政聞且以兩漢邴曼容陳仲弓為準故不至豐祿加以梓州之懿文盛德排抑於時道未光大終於郡節或者蕃祉必復其在後裔乎此宗門所以有望於公之孤之昌大也既而緘公理命命以論撰小子愀然涕洟而為之銘曰恭惟叔父信厚清厲有車翹翹將事匪懈掾吏二部文而無害施化一同蘄人以乂易象視履謂耆而艾奄然不淑力命相盩楚挽虞殯風煙晦昧屬詞貞珉寧此厚載君諱傪字公佐吳郡人曾祖某某官考某某官君早孤與兄隱居於越有佳山水率子弟耕汲於其中日修桑門之法擯落人事貞元初兄既歿始為宗姻士友所強慨然有應知己之心繇試左環衛歷大理評事攝監察御史裏行佐黔中又以殿中侍御史內供奉佐浙東凡四居憲職介二方伯皆有直聲休利邦人宜之十二年所從既罷繼之者再至率以重禮禮君終不能屈非所樂而不苟合故也朝廷宗公賢大夫多悅其風十六年徵拜祠部員外郎居二年執事者上言其才請為劇曹會東方守臣表二千石之缺天子方加恩元元循責吏理面命執事曰誠如是姑使為郡須其報政縻以好爵遂拜歙州刺史在途發瘍夏四月二十日卒於洛師享年五十五夫人河東柳氏殿中侍御史並之息女才淑有賢行長子某年在羈貫嗣子某未離褓抱夫人既得卜吉且以孤藐之詞請表墓於父友故鄙夫泣書於寢門之外而不讓云君峻而通直而和㣥而不黨至若流俗之齷齪細人之姑息屑屑汲汲之態不萌於胸中器度夷遠英華發外居常無怵迫臨事有風節同心定交造次以文評議鑒裁精明不惑從善親仁發於肺肝文章宏朗有作者風格學不為人與古為徒嚮使登其年充其量束帶公朝其骨鯁魁壘之士歟常與故虔州刺史隴西李公受故右補闕安定梁寬中今禮部郎中京兆韋德符右補闕廣平劉茂宏祕書郎趙郡李叔翰方外士右諭德博陵崔公穎暨豫友善嚱夫相視莫逆行二十年洪範之攸好德儒行之遠相致今則已矣可勝慟也耶時貞元十八年歲直鶉首秋七月甲子鏤堅石而銘曰皎皎陸生中和粹清直如朱絃潔如白珩或默或語不將不迎如何斯人暗忽冥冥蚩蚩下輩戩穀或丁煜煜芳蘭嚴霜飄零命不可問死不可作嗚呼陸生君諱伯康字士豐隴西成紀人自涼武昭王元孫文穆公沖為元魏僕射司空與兄穆侯恭侯惠侯莊公中秉樞揆外顓方伯文穆公二子長曰廷實次曰休纂論道追命皆至司徒蟬聯茂盛冠於百族君即叔氏司徒之後也曾祖仲進皇宣州司馬祖僑皇河南府澠池縣令父愔皇朝議大夫宗正丞贈濮州刺史三葉用晦仕不過郡佐縣令大夫典司宗籍而天爵崇茂士林嚮仰君以才實克家清方入官始為知已者所薦授閬州司倉掾轉下邽福昌奉先三縣尉皆有能名建中三年調補御史臺主簿成奏未下以太夫人寢疾歸侍藥膳明年丁內艱衣裳外除迫嚴君之命復調為長安尉時王師清宮鑾輅初復武人干吏理轂下為多事邑之細大必決於君每歲考績為府中最貞元五年再集荼蓼終喪猶毀不交人事屏居池陽以耕植自業九年春西鄙不靖詔城五原以備邊鄜坊節將選重賢佐以厚禮辟君實董塞門之役不愆於素抑有勞焉拜監察御史轉殿中丞賜以章紱尋遷侍御史加檢校工部員外郎凡十四年徙官為鄜上介伐謀而鄜之師以律折獄而鄜之人不寃十八年從守臣來朝行次中部所從復於左轂護其輤裧以至京師庀具會事稱情中禮十九年秋七月拜郴州刺史精力惠養蠲除煩苦導利省嗇而人不擾廉平信厚而吏知方今相國左丞鄭君頃移佐茲郡知君也熟洎入總綱轄盛推理行再管宰政方圖陟明斯言未復奄忽雕落時永貞元年十月某日甲子春秋六十三悲夫君天資器幹機用強敏夷易疏通不移名聲學尚周給而緣情甚麗業履端修而睦姻尢甚時人多知君吏理過於文行唯故相太傅盧恭公今相國左丞鄭君洎鄙人實知之而棲遲下國迫厄委化斯可歎已夫人范陽盧氏宣城縣令炅之女華緒令儀執笲佐餕先於君歿二十年矣嗣子盧氏縣尉操次子前明經掖支子某等皆以孝謹而承訓義君令弟長安主簿少安請急喪事奔波勤遠自荊抵洛泣奉轜車以元和元年某甲子葬於某縣某原之舊封君子曰於長安之兄之喪有以見同氣之痛德輿以中外伯仲周知所履刻石紀事朴而不誣銘曰郴之政兮理平君之行兮廉清矧有深知兮秉國之成亟言於朝兮將陟其明窘然符守兮奄忽冥冥胸臆約結兮未攄平生道途自遠兮廣柳芻靈風雨所交兮卜洛佳城元龜是貞厚載是寧吁嗟乎內兄公諱述字元明博陵安平人自東漢長岑長濟北相代亶雕龍之美濟北五代至晉大司農宏司農八代至北齊右僕射昂僕射三代至公曾祖皇朝散大夫冀州武邑縣令諱紹大父同州白水縣尉諱頊烈考晉州汾西縣令贈定州刺史諱升之代有文行懿德為北州冠族公夷雅溫粹安舒廉靜於座右銘得含元之妙於政論得理道之奧以之修身以之蒞官蓋家法積厚而公能踐之之故也始自宮衛試守未弱冠而為藍田尉已有嘉聞尋轉婺州浦陽令揚州兵曹參軍皆以吏理著稱故辟書交委命書隨之歷監察御史殿中侍御史再為侍御史實佐壽潭洪三邦車賦之重拊循輯睦繄上介是賴府遷於荊薦言於朝拜著作郎虞部員外郎論著奏議率循憲矩不毀方以求合不由徑以取捷貞元十二年出為房州刺史承長帥剛嚴之理當輿師饋餉之殷暴征繼起煩言狎至而能推情厪身以裕勞人惻隱所被四封嘉靖十七年秋九月辛酉感疾捐館舍春秋五十七夫人京兆韋氏承公宮之訓為女士之表凡合姓二紀柔而正勸以義之道備焉其孤文伯武伯等學通禮籍姿性純至斬焉相視泣奉裳帷以冬十一月甲子祔葬於東都某原禮也初公仲兄左庶子安平公有重名於時安平所與遊者公皆從而遊焉故常與賢士大夫推古今世道博約論辨攄之於詞凡數千言因曰勝質之文吾所甚懼彼奔馳塞路者既不可遏又惡用斐然之為也耶遂輒削去其用晦如此行義醇備慈仁任恤安平既即世伯兄繼歿猶子之解巾結褵先於已子故不舉火之日男未仕女未行其於疾則十起衣無常主雖伯魚稚春不能加焉㣥從族姻均祿直以賙其乏不結黨友不趨聲利常欲修性息迹考一邱之樂而未克齒與位皆負其實奄然不淑為知者所歎建中初德輿遇公於九江之西其後辱安平戴侯之知於公獲南容之眷刻石志美不敢曼辭而實録焉銘曰齊稱大風漢有文宗雋賢葳蕤似續昭融坦坦房陵勞謙孝恭優遊祿仕惟道之從素履不華黃裳在中乃儀列星乃飾伏熊居易處厚有初有終魂氣杳冥諸孤哀恫圓蓍大蔡先遠攸同刻茲貞珉永賁邱封君諱歀字嘉言北海人曾祖貞休皇比部郎中河南少尹祖詡太子洗馬考試河南府士曹參軍代有懿行遠承華構君清方敏厚幼有立志與伯氏文編講藝修詞知名於士友間其文華浹洽而長於比興其義行潔修而篤於友悌貞元初舉進士甲科解巾補官衛紀綱掾右輔守臣撫封辟士表為支使轉左領軍倉曹明年復調為左金吾胄曹因喟然曰吾三命不越於環列其道蹇歟滿歲宴居吟詠情性而已會故人彭城劉景通受天子推轂之重鎮於洛郡辟書既至命書繼下以廷尉評事理軍訟未幾請急省兄於盛山又東南至於雲安間關巴峽嬰冒霧露俄而景通入覲為冬官司空方欲盛薦君於獻納侍從之列景通既歿左右曹中執法多所引重而枕疾不起悲夫時二十年秋八月壬子其年四十有九昔崔駰管輅官不過長岑令少府丞而當時之翕然扇巧言進取滿志者可勝道哉夭閼紛綸從古所歎初娶馮翊嚴氏興元長帥相國太保公之女不幸早亡繼娶天水權氏華州司士參軍集之女豫之從祖妹也有明識淑行為六姻儀法結褵周月遭罹柏舟之痛遺允方娠可哀也哉豫與文編周旋於文章道義二十年矣故辱君之歡亦舊淮湖暌阻京轂會合合姓怛化在旬歲之中寢門屑涕情何有極冬十月庚寅其孤輝既得吉卜窆於萬年縣義善原且虞邱夷谷變不可以不識遂為銘曰一氣沄沄浮休滑湣英華未伸奄忽歸根于嗟乎嘉言于嗟乎九原刻此清芬君諱雍字某趙郡鄗人曾祖萬安皇鄒平郡丞祖頊贈鄭州刺史父日知皇銀青光祿大夫黃門侍郎侍中戶工刑三部尚書君承蔭庥覆露而資性和厚有詞藻工篆隸起家太子通事舍人轉太常寺主簿年甫成童卓然有立志歷都水監丞長安丞轂下難理號為稱職丁太夫人韋氏憂免喪猶毀不交人事尋詔除太原府録事參軍己抱沈瘵以開元十有九年夏五月歿於長安升道里享年三十五噫嘻以侍中公之寬明正直忠孝於君親書在國籍為景雲賢相宜其子孫昌阜有韋平之慶而義方積善所及不過於丞吏都吏未強仕而夭斯命矣夫人范陽盧氏殿中侍御史敷之女司勳郎中遊之妹華宗淑行先歿者二歲有子元之仕至晉州洪洞縣令愷悌之化行於鄉黨命屈其才亦不至大官洪洞之子曰鄧州新野令彬萬年尉彤陳州太康主簿彩太公廟丞文彡前明經彧等以吏以文循守家法君初嘗謂洪洞曰吾家代壤樹在周鄭之郊延陵嬴博豈限故土苟吾啓手足必促擇不食之地而歸全焉故君歿之歲秋八月權窆於萬年縣龍首原厥後七十有七歲彬彤等居內憂忍哀襄事因竭誠信循祖禰之志啓君之竁遷祔於京兆府奉先縣漫泉鄉保章里從考卜也與洪洞君庚甲分穴昭穆列次聿修之義情理無違而彤又狀其祖德請刻墓石抑豫之重表甥也嘉其忠孝而銘之其辭曰伊昔侍中實相睿宗以孝以忠穆然清風乃生良士博約仁義坦坦居易鬱湮下位家有孝孫卜茲鮮原刻勒清芬藏於墓門洪範敘三德五福之道而德存乎人福繫乎運時未光大則卷而懷之姑以清行厚德遺諸子姓而已公諱隼字子鷙天水略陽人十二代祖安邱敬公諱翼為前秦司徒代有勳德以至四代祖平涼公諱文誕歷開府儀同三司涪常二州刺史曾祖滑州匡城縣令諱崇本王父益州成都縣令諱無侍烈考許州臨潁縣令諱伋初平涼之先三葉開國匡城以降世名文行公纘承茂緒祗服家法有大易之鳴謙中庸之慎獨慥慥其守孳孳其勤中立而不易方夷道而不由徑故克家無玷干祿有聲天寶末州里舉經明屬幽陵叛渙計偕中止解巾試守河西尉真拜鄢陵丞時東郊不開違難逃祿艱貞潔白終出盜泉朝廷嘉之除楚州寶應丞是歲太夫人棄孝養刺血寫大乘微言毀瘠過禮既除喪為親戚所勉調補宋州宋城縣丞孟尚書某方持郡節深相推重每歲考課居郡中最大歷中授福昌丞貞元初改華州司士嘗辟彭城劉公蕭國班公之府皆分事任實助經費所至之邦必聞其政所奉之主必加以禮而又學古不怠歌詩必類緣情而不流體要而無害故祕書包公謂公內外循理心正氣和君子以為知言其道未伸天奪之算嗚呼貞元九年四月辛亥終於富平從事之館享年六十一夫人陳郡殷氏皇曹州司法麗正殿學士踐猷之孫清河尉寅之女故給事中杭州刺史亮其兄也今侍御史郴州刺史永其弟也生德義之門襲猗那之慶自執笲主饋逮四十年孝慈柔明六姻是仰學備針誦言成禮法公之祿甚薄而家甚肥中外無間言諸孤猶已子閨門之內和樂薰如也既茹未亡之痛護奉輤車東旋洛都八月癸丑遘疾癘終於新安之別墅享年若干有男子五人長曰少成仕至桐廬尉次曰少清以經術甲科次曰某曰某皆以文學裕蠱稟公之義方女子五人長適安福尉劉公範次適常州司倉齊暢其次未及笄皆稟夫人之明訓少成等曾未半歲再集荼蓼思養於下如不欲生銜恤忍哀竭其誠信以十月某日得吉卜於新安方山南龍澗原禮也小子齓歲而孤夙承善誘且懼徽音行實之不傳於後與陵谷之有遷也謹用論撰哀而不文銘曰惟叔父秉直清溫而文誠而明六試吏揚令名再從事有淑聲猗夫人懿純德倬婦行為內則樂申申恭翼翼女有家男述職天不傭降鞠凶道未行禍已鍾刻金石識邱封德不泯哀無窮君諱惟明字某南蘭陵人曾祖浚皇丹州刺史祖文遠皇睦州別駕考重暉皇金州別駕自丹州已降雖位不過守佐而皆以行義似續君即別駕府君之元子也天寶中舉秀才數上行過乎謙竟不得居甲乙科時苟未至雖巧力無所措其用否不可久後纍為知己所薦自明州參軍事至揚州兵曹掾凡四更官皆有理效多以名聞薦拜或參從事之列向非刃有餘而用無滯疇能及此晚歲病風家於丹陽葆真樂和樽酒自適輕財重義推誠於朋友之間不飾邊幅以曠達自任初君與令弟故司封郎中惟則同以儒服遊京師賢士大夫締交慕義者如響郎中以通才歷職而君亦纍為名公所薦年位未至相次凋落嗚呼以建中二年四月某日所疾沈痼終於丹陽私第享年若干以某月日權窆於某所從宜也夫人扶風竇氏婦道柔明子渢浣汝等年未志學藐然無怙芻挽時行哀以求銘銘曰南齊之後福祉洊臻厥生兵曹洵美且仁如何中路翳魄荊榛刻石窮泉永志聲塵君諱遴字某博陵安平人也六代祖北齊右僕射昂以文學正直周歷諸曹禮樂刑政所損益者十七八生隋水部司門二郎中洽有風儀器尚以世其家司門生皇掖縣令曇首掖縣生武邑令紹武邑生白水尉頊頊生汾西令贈定州刺史升之自掖縣四世含德不耀君即定州府君之長子故相國右庶子安平公其介弟也恬淡願慤不遷於時仁於鄉黨友於兄弟大歷中御史大夫贊皇李公之宣風於吳也聞其賢起家表薦為常州武進縣尉迹徇知已心不近名俯視官曹非其好也建中初嗣曹王分閫案部於九江之西又以名聞轉洪州建昌縣丞君喟然曰莊生於陵子吾之師也惡用是哉終不屑就先是築室於毗陵疏清流蔭碧蘚樹藝偃仰有終焉之志貞元十年正月日寢疾終於其家享年六十三夫人范陽盧氏華宗淑行動循禮法其孤景伯等年未及冠皆專經趣善藐然銜恤護奉輤車以明年十月某日歸祔於河南東原之舊塋先遠故緩也季弟著作郎述貞諒遜悌稱於士林抱終鮮之痛主歸全之禮以德輿詳其素履俾為墓銘銘曰公綽之道淡無欲兮結身用晦言可復兮視履考祥宜戩穀兮乃如之人胡不淑兮周原舊封森拱木兮於以寧神識陵谷兮君諱峴字某范陽人自魏已降官婚人物為天下清甲大略書於國史詳言在乎家牒今所書三葉自曾王父衛州司馬府君諱宏壽初貞晦不仕公車徵拜生冀州信都主簿府君諱友裕友裕生揚州高郵縣令府君諱相君即高郵之第若干子奉前人之業講先師之訓以之克家以之從政直方謙厚卑不可踰筮仕三次不離州縣之職曰亳州蒙城縣主簿楚州寶應縣尉潤州丹陽縣丞寬敬草泣事不希名譽故每當廉問薦延之日使臣陟明之舉皆遷延晦避時議多之清行懿名竟用不振以大歷九年七月日寢疾終於官舍享年五十五其嫠隴西李氏柔順有婦行嗣子某等決於蓍蔡彳亍恤襄事以關河不靖未克歸祔遂以某月日權厝於縣之北原焉從宜也豫僑居丹陽嘗與君遊故粗書事實以備刻石銘曰生死沄沄如環斯循吁嗟盧君於此歸根
