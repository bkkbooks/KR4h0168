front:
  text: 全唐文欽定全唐文卷二百二十七張說七
  hash: sha256:9d4c21040c8ef19650102c22b188ea90295bdeb12005638bf4424e96ce461124
body:
  text: 敘曰經天地揭日月文之義也掌邦籍出王命位之崇也本乎言行君子之樞機成乎易賢人之德業則徐公其人也昔公奮明哲之姿當高宗之盛天保大定俊乂用彰而光耀天臺雲飛綸閣文敏以暢機務稽古以析嫌疑禮樂政刑擇三代之令典典謨訓誥有唐虞之遺風較然於庶績者可得而聞也其嘉猷讜言沃心造膝滋液內潤精微外密混成於元象者不可得而聞也公諱齊聃字將道姓徐氏東海郯人也遠祖偃王基仁義於上代嚴考孝德濟宏美於近世公始以宏文生通五經大義發跡曹王府參軍右千牛兵曹潞王府文學崇文館學士兼侍皇太子講又芳林門修書於時中朝碩老下國英雋皆忘年請交不遠來謁望其路者若晨風之赴北林得其門者如衆山之仰東岱公不樂趨競雅尚退謐深以椒房之家聲名太甚求為外職出宰桃林未下車勅改沛王掾終歲選擬司績員外司議郎並不就乞補雲陽令到官累日詔除司城員外郎乃遷西臺舍人其為政也如始云爾初公幼而殊異八歲工文太宗聞其聰明召試詞賦錫以佩刀金鞘稱曰神童及中年高宗嘉其道優悉命皇子受業訏謨帝采許以國鈞故公備更潞沛豫諸王侍讀上之在周邸也公嘗來誨詩焉夫然集虎觀之書承龍樓之問二宗之代矯首辭林四王之門從容經席非有海山之藝溫良之德儀形以孚柔嘉維則其孰能發揮聖智啟迪天人者乎咸亨元年出為蘄州司馬二年坐事徙於欽州夫君子大守道而小守位污隆隨時屈伸以義去令尹而不慍失司寇而遂行蕙蘭敗不為不芳日月蝕不為不明姑務忠信何陋蠻越優游欽江歲餘而沒春秋四十有三惜乎不登宰衡以平天下天夭是瘃命也歟既而慶隆嗣子返公孫之柩德施後王拜先師之爵上元三年某月歸葬於少陵原中興神龍元年贈泗州刺史襃賢追遠念道尊師聖人之禮也議者以公考果州府君高學才華香名省闥武帝賢姊也大帝婕妤妹也公既高步掖垣子又踐修舊職同生標藻於鸞殿重世含章於鳳池自班姬父兄文雄漢室左思女弟詞蔚晉宮悠哉二族徐氏三矣才難不其然乎凡是好文之君賞音之士公之逝也豈不慨然閱青而存淩雲之氣操朱絃而想流水之屬哉厥子曰堅景龍中加金章紫綬行禮部侍郎得以命卿之祿奉蠲潔之祀無念烈考樹之家風廼刊石立頌將以識往行攄無窮使本支百代不忘先人之不隕其名也其詞曰王言惟令中禁是司帝嘉文父曰汝宜之終溫且惠習禮明詩長裾傳道大筆修辭鴻業潤色元黻緝熙昊天大戾君子明夷蒼梧啟手涅而不緇中興受命逝者無追靈符泗水崇贈先師髣像精魄丕承聖期教近子貴榮躋父慈學嗣三葉才俱一時春秋孝享霜露深思後之視昔斯文在茲有齊黃門侍郎范陽盧公諱思道字子行涿州人也其先姜姓世胙東海別為盧氏家於北燕自漢世中郎將植至侍中陽烏徵君之子禀天靈傑承家令軌清明虛受磊落標竒言不詭隨行不苟合游必英俊門無塵雜至於求已勵學探道覩奧思若泉湧文若春華精微入虛無變化合飛動斯固非學徒竭才仰鑽之所逮也事齊歷散騎侍郎以文翰直中書中廢復進至給事黃門侍郎待詔文林館武平末天子總兵禦寇太子監國於晉陽公留綜宮朝兼典樞密及皇輿敗績於外而百寮蕩析於內公節義獨存侍從趣鄴告至行賞授儀同三司入周除御正上士定省歸郡郡人祖英伯作難公脅在其旅幽都既平玉石將燎賴元帥宇文公舉以舊有令聞引謁因命草露板立就駭其麗異其敏釋於齊斧之下揖於㣥士之上除掌教上士隋高祖為丞相也遷武陽太守以母老乞解職優詔許之後復徵為散騎侍郎奏內史郎事隋開皇六年春秋五十有二終於長安反葬故里凡更臣三代易官十七再降一免二去職八平除擢遷者四而已公處屯安貞賦詩穨飲視得失蔑如也臨難無懾在黜無慍危不去主仕不違親休明有賓禮之盛顛覆無淪胥之禍其大雅者歟夫禮儀損益公能言之故與熊安生詳定齊禮三墳五典公能讀之故與薛道衡侍學儲后公國華人望光照鄰邦故所居之朝應對賓客修詞抗議允執其中故青瑣黃縑異代咸掌大名之下豈誣也哉昔仲尼之後世載文學魯有游夏楚有屈宋漢興有賈馬王揚後漢有班張崔蔡魏有曹王徐陳應劉晉有潘陸張左孫郭宋齊有顏謝江鮑梁陳有任王何劉沈謝徐庾而北齊有溫邢盧薛皆應世翰林之秀者也吟咏性情紀述事業潤色王道發揮聖門天下之人謂之文伯於戲國有校家有塾祿位以勸風雅猶存然千數百年㣥心相尚竟稱者若斯之鮮矣才難不其然乎然則飛黃虛騁百轡遺路鷦䳟天運萬翼無階文士擅名當時垂聲後代亦云乎才力之絕衆故爾開皇以來百三十餘載天贊唐德生此多士公之元孫曰藏用濟美文館重祿黃門永惟衣冠子孫邑里多改先人封樹歲久將平廼假詞菲才刊石表隧庶乎涉齊地者不薪柳惠之隴過邢山者無惑子產之墓至矣乎盧氏之子其用心也遠矣銘曰彧彧黃門實天生德才葢一世榮聞四國文王既沒文在人宏公為宗匠當朝與能龍躍春霽鳳鳴朝昇或頌或變或雅或承理以神合聲以妙徵高視睢渙與君代興人之云亡十有一紀斯文未喪施於孫子新作豐碑德音不巳君諱亶字道一中山無極人也昔胡公紹舜奄有大邦楚子縣陳逃威樂土當烈王之王也有陳通奔周王以為忠將美其族言舜居陶甄之職命為甄氏錫姓因生如堅之讀形聲轉注以真為音處則稱劉明歸晉者以異變而為郭葢承虢者有馮通之裔邯仕漢為太保大司馬承陽侯邯十六代而生鸞仕齊為太山太守司隸校尉無極縣伯撰笑道論行於代鸞生隋汾州刺史族族生隋沁州刺史紹紹生隋新市令協協生單于大都護府錄事參軍贈宋州刺史封惟祖惟曾在商在夏世濟其美永觀厥成君即宋州府君之第四子也博綜經史脫畧流俗情之所遺對咫尺於千里氣之所重輕百金於一諾曰興曰比階應劉之閫奧或草或真藏鍾張之筋骨譽滿鄉曲聲聞闕庭天后臨朝再加辟命皆辭以親老不赴逮疾革易簀骨立廬墓復有制徵焉刺史獨孤莊率府僚敦喻起於墳左乃授左金吾中生盡其養豈違親許人沒盡其哀方委身徇國或用或舍有以見大君之仁時止時行有以觀大孝之節君臣之際其遠矣哉尋除左千牛長史檢校武始軍長史攝右臺侍御史兼靈武道行軍長史攝右屯衞郎將副臨洮軍使轉右驍衞右郎將為臨洮大使拜蘭州刺史兼榆林臨洮等軍大使除夏州都督兼鹽州防禦使徵授幽州都督衣之以紫攝御史中丞為河北軍州節度大使君政成周月惠則在人患是緩風表以去職未幾復除夏州都督屬山戎矯虔俶擾王畧兵落天上思回行以出竒虜墮計中守便宜而未進時以為逗遛貶撫州刺史朝廷明此舉也未到官遷廣州都督兼嶺南按察五府經畧討擊使春秋五十有七開元五年七月二十八日終於官舍以某年月日歸葬於恒陽之王公山南原不忘本也君三承辟命再攝憲曹八典戎旅五司藩翰事之去就所歸必執其中職之高卑為政各當其選觀夫果於事喻於義下學而上達強立而知類畏克厥愛道無常師有商也之文有求也之藝習禮必本飾之以菁華積行必崇茂之以枝葉以此探賾則投刃皆虛矣以此効官則操刀必割矣是故㣥士之所鞅掌而君之所綽約常情之所戚戚而君之所蕩蕩由是言之搶榆之與海運鳴琴之與星入從可知也惜其志懷慷慨雅多大畧援桴作氣有七縱之能孤劍無前當萬人之敵竟不得橫絕漠騁雄算刮狼望之祲鏡乎太清卷瀚海之波靜而可掃駸駸之足受羈騏驥之途堂堂之貌不畫麒麟之閣彼哉彼哉有遺恨矣其孤某等望兮不至求兮不得永懷揚名庶慰罔極銘曰有鰥在下陶復河濱元女作合相攸於陳楚為不道祚以永淪周寵忠節氏以初因丕惟承陽致君論道施及無極建家載考彼汾彼沁伊時之寶宰兮牧兮亦孔之好積慶潛演俊乂挺生標格磊落氣志清明八司戎事厥謀有成五刺方伯厥政有聲山有杞梓工思其度國有孫吳君思其畧棄德珠浦遺氛沙漠惜哉不當今也可作恒岳臨北滹沱注東仁不忘本孝亦令終壽堂盤薄牧子充窮勒美松隧穆如清風公諱威德字某曰葛氏京兆涇陽人也其先嬴姓咎繇之後夏有葛伯氏族興焉寧陵之傍尚傳侯國綏山之下獨有仙祠嬰則威伏五城龔則績稱二縣鴻臚秀於吳會散騎崇於晉景在其子孫是宜繁羨公生而開朗長而英拔非因馬鄭之學動合禮經不待孫吳之書暗同兵法有拳勇尚氣概顧眄稜華風神都爽五馭善於東野六射勁於西霜少以嫖姚之才入光供奉之選御橋驂駕犯清蹕而不驚輦道啼烏應鳴弓而自落便蕃左右星歲重深賜上柱國拜元城府左果毅天下大定李廣之用無施雲中薦賢馮唐之言巳老春秋六十五神功二年某月終於洛師藳殯邙阜夫人太原郡王氏夫人郭氏實生大將軍福順一見聖主再紐乾綱重位冠乎北軍茂功藏乎南史故象服臨祭魚軒以朝天子深嘉歎馮勤之母㣥公列拜賀虞潭之親享年七十五薨於京兆之三真里公愛敬奉親軌則可移於後代義方訓子福祿來及於先人葬有日矣乃下制曰禮著飾終情惟悼往詢諸前烈抑有舊章前左羽林軍大將軍葛福順亡父某守其謙素宏此藝能未展才術奄從凋殞而嗣子克家式昭勳業既念功以追遠亦自葉而流根宜申奬贈俾慰泉壤可贈遊擊將軍守右驍衞翊府郎將開元九年二月九日葬我郎將君前夫人王氏後夫人郭氏祔焉禮也章芾以襚輅旗在列廟食備其牲牢法葬陳其簫鼓孝慈之道著矣哀榮之禮畢矣尋彼平生之事忽如絕光繫乎碑版之文永存遺烈銘曰硜硜都尉角立傑豎神銳玉劍氣雄金鼓六藝爰設射馭為武百行雖名忠信為主時不兼命位不充才善流慶荅身謝榮來太原棣棣實惟嘉偶羽林桓桓克大其後潁川郡太夫人者諱某字某雷州大首領陳元之女羅州大首領楊歷之妻驃騎大將軍兼左驍騎大將軍虢國公思勗之母也陳氏家富兵甲代奠嶠外夫人誕靈豪右淑問幽閑六行天至不因師氏之學四德生知無待公宮之教原夫陳本媯水楊承赤泉九真為郡良史出乎中國五馬浮江僑人占乎南海兩州接畛二門齊望卜妻鳴鳳擇對乘龍楊公有聘玉之祥應嫗獲探金之慶虢公弱冠昇仕鞠躬禁闥正性本乎胎教剛腸形乎義色神龍三年六月五日北軍作難西華失守騎入宮壼兵纏御樓公孤劍淩鋒㣥兇奪氣倉卒之際安危是屬既立殊常之勳遂蒙超次之命授銀青光祿大夫上柱國宏農郡公行內常侍其後改拜將軍太夫人是加爵邑高堂九仞重祿萬鍾朝廷美其揚名州黨尊其遠聽夫人富而好儉貴而能勤身却錦繡手親紡績公每昏定晨省夫人必誡之忠孝勸學文武嘗謂汝口稱思勗當心念其義父母名之欲汝三思而勗勵也故虢公便習干戈漁獵書史致命伐罪擒叛獠於百越寫誠誓衆破狂蠻於五溪鬬子弟如使手足請風雷若應期契聖朝荅高秩於驃騎酬大封於虢畧豈非以辭第之懇忠成斷織之明訓臣節立矣君恩厚矣子孝成矣母慈著矣備此四者善孰加焉抑神道祐心而人倫興行詩曰母氏聖善又曰宜爾子孫斯實潁川太君之有也享年若干開元九年四月八日薨於長安之翊善里先公早世邱墳故域古無合葬禮有從宜夫以體歸下地萬里豈殊乎黃壤魂何不之雙棺幸同於元室以其年十一月十六日招魂祔葬於萬年縣龍首鄉神鹿里申孝子不忍隔親之情也恩勅賜錢十萬絹布皆百段日磾忠厚漢武知其母教馮勤寵貴世祖稱其母德克軫天情頗為連類虢公生盡其禮沒盡其哀嗟閱水之日逝懼藏山之夜徙追鏤碑板遠貽圖傳蒸蒸至意有足感人悾悾信言固無媿色銘曰陳公舜後楊侯周裔去國何人南遷幾世酃淥嶂表珠崖海際兩族相京財雄兵銳猗歟邦媛儷茲國士友若琴瑟花如桃李心契法度容和慍喜資敬從夫移忠訓子嘉此令子南溟北歸於天鶴唳拔湔鴻飛朱宮退敵銅柱來威國安家寵魚軒翟衣子封虢國五公前宇母邑潁川三君舊土感激榮慶踟躇今古高堂夜空弔客朝聚龍首山前前臨灞川招魂五嶺合葬三泉山山邱墓樹樹風烟孝碑不滅慈墳永傳四序平分清秋之氣勁五方異俗崆峒之人武故隴上多豪山西出將其有雲龍感召星象特生金鼓登壇隱如敵國麾幢指塞自比長城得之於太原公矣公諱知運字逢時其先太原著姓今則晉昌人也本乎文王之弟是為虢叔虢或云郭因而氏焉自燕昭尊隗以築宮漢祖封亭以列國其侯於陽曲宅彼太原舊矣亭之元孫友從太原徙隴西昭帝分隴西置西平郭氏又為郡之右族友之昆孫武威太守憲憲之猶子散騎常侍芝俱有名跡見於魏晉則晉昌諸宗散騎之後也爾乃一門連譽時人號曰三儒四海齊名天下謂之八顧光祿派分於馮翊廷尉世茂於潁川孝則天錫釜金忠則帝章冕服仁則猛獸不害信則童兒不欺豈直介休見有道之碑洛陽聞立德之傳而已曾祖欽州大黃府統軍上柱國祖才朝議郎州常樂縣令上柱國父師朝散大夫上柱國贈伊州刺史磧鹵之地戎馬生郊業戰鬬而宏勳仕州縣而為達啟莫京之繇福不在於其身積無聲之善慶必流於後嗣公太白之精雷泉之靈膺家之禎為國而生身長七尺力能扛鼎猿臂虎口虯鬢鶚瞵射穿七札劍敵萬人子卿路逢遙識將軍之相唐舉一見足辨封侯之骨解褐以善戰授昭武校尉秦州三度府左果毅以敗敵北庭加游擊將軍沙州龍勒府折衝兼右金吾郎將瀚海軍副使尋改朝散大夫伊州長史伊吾副使以軍累破虜即授其州刺史進當軍經畧使朝廷以未愜前除且有後命遷本衞中郎將仍舊為州軍使默啜之寇北庭也公奔命解圍軍聲大振加雲麾將軍右武衞將軍封介休縣開國公食邑二千戶開元二年吐蕃入隴右掠坰牧公兵以竒勝寇不復蹤積甲山齊而有餘收馬谷量而未盡歸功廟算朝議多之拜右羽林將軍持節隴右諸州節度大使兼鄯州都督河源軍使鎮西陲信國之藩屏坐北落亦王之爪牙故入奉期門而出分閫寄於是料敵無備閒其師老潛軍一舉大俘九曲鎖甲文劍僰馬犛牛既獻戎捷遂頒朝賜乃兼鴻臚卿攝御史中丞改封太原郡開國公加前食邑三千戶執憲總軍典屬乘障增爵益邑遇厚恩深俄而六州㣥胡相率大叛命公統隴右之騎濟河曲之師鋒鏑爭先玉石俱碎拜左武衞大將軍授一子官賜金銀器百事雜綵千段班師臨洮遘茲虐疾嗟乎匈奴未滅宿志不申生也有涯死而猶視開元九年十月二十二日薨於軍舍春秋五十有五蕃夷邊鎮血面椎心悲慘風雲號動山谷豈非良將視人如子人亦視猶父乎皇帝閔焉詔贈涼州都督米粟五百石錦帛五百段命都水使者張景佚備物護葬遵朝典也惟公氣猛而性和量寬而精銳沈謀可以掩蓍蔡雄斷可以奪鬼神故常糟粕韜鈐蒭狗風角然其樹恩結信立威用武烜赫如風濤盪震如雷雨戰必克攻必取每有奏謁上特稱歎孝文之得魏尚虜不足憂太祖之見郭嘉知成吾事前後錫錦衣寶帶文馬素女爛其盈門長鳴在廏感知己之主陳必死之力皇情西顧則九羌釁鼓詔書北伐則六夷焚旗上成聖君之元鑒下効武臣之素節其竟也如此夫為人子立廟致敬祖考來格不亦孝乎為人臣恢疆禦侮以勞定國不亦忠乎若然者歸義方於先人揚令名於後代可也嗣子英傑起復定遠將軍左領軍衞翊府中郎將假紫服金章河西節度副大使英竒朝散大夫前尚輦奉御英協游擊將軍前京兆勵行府右果毅都尉英彥朝議郎前左衞冑曹參軍等咸善居喪而過哀或從王事而奪禮則知辛賢父子繼位將軍祭彤兄弟並參師律去本不戀達也而新是謀權也嘉此武功創其宅兆以十年七月葬我公太原夫人燉煌索氏祔焉禮也皇上念功以惜逝厚終以遇存有詔詞人為其碑志介士送葬即封征虜之墳單于入朝當祭度遼之墓銘曰洸洸將軍雄畧冠㣥平西征北震戎懾獯亭障臥鼓屯田饋軍仗此白刃致彼青雲郭侯宴喜既多受祉元牡黻衣清廟蠲祀鼎食金奏炮鼈膾鯉既來不庭有嚴天子流沙博望羽林飛騎河曲回兵臨洮舊防手握金節魂沈玉帳千里送喪三軍悽愴詔葬禮崇恩碑義豐生為神將死為鬼雄身世一滅榮華萬空祁連之墓長旌武功公諱叔瑜字思瑾曰魏氏鉅鹿曲陽人也考太師鄭文貞公致君皇極配神清廟故祖德冑系敘於太宗之先碑矣公生育慶緒天然炳胎教之姿少長德門日用成躬率之化性盤於孝友習狃於禮樂俛仰中則從容蹈道加以專精好古旁通多藝聖人之所志聞一而反三君子之所能舉十而知九與同生璘琬知名當代始以門資補左千牛轉洛州司兵司議郎職方郎中太子洗馬出為懷州長史歷慶慈儀豫四州刺史春華韡於兩宮時雨零於四郡觀風之使所在聲聞變雅之老到今遺詠其年春秋五十有一終於豫州葬於舊域夫人太原王氏祔焉禮也議者以公不避強禦有昭子之政事不為皎厲有康子之隱德虛已尚賢有文侯之樂善重諾分急有信陵之高義人鮮有一況兼四乎公賦入封君妹歸帝子車馬無戚里之盛衣服有儒者之節儉而得禮富而無驕此葢奉先之素履也公善於草隷妙絕時人以筆意傳次子華及甥河東薛稷世稱前有虞褚後有薛魏此又貽訓之餘美也嗟夫公學埒向歆操齊固燮若天假三壽朝登六事則鄭之桓武可尋漢之韋平一揆而年近知命位止方州落鵬翼於半霄負天之力莫展頓龍媒於局路追風之勢斯畢九原不作誰將與歸二子獻華追完先德俾余作頌以慰罔極銘曰昂昂豫州毓粹含道欽若古訓思文烈考於穆烈考維國之師公承丕搆思皇纘之發軫臺閣風流榮問建麾千里澤霶四郡位未充德命不遂才彼蒼孤善謂之何哉子孫必復邱封永久穆如清風振芳厥後珠玉無遠而登輦輅之飾寶也松栝無幽而入殿堂之構才也物貴其用人亦如之撥川王論弓仁者源出於疋未城吐蕃贊普之王族也曾祖贊祖尊父陵代相蕃國號為東贊戎言謂宰曰論因而氏焉公有由余之深識日磾之先見陋偏荒之韋毳慕上國之衣冠聖歷二年以所統吐渾七千帳歸於我是歲吐蕃大下公勒兵境上縱諜招之其吐渾以論家世恩又曰仁人東矣從之者七千人朝嘉大勳授左玉鈐衞將軍封酒泉郡開國公食邑二千戶周語曰犬戎樹敦守終純固今其俗獷而輕死其法折而不撓故前代無降人中土無僮僕自公拔身向化首變華風澤潞之閒始見戎州矣若夫河南胡苑坰牧所利每歲冰合虜騎是虞中軍必謀於元老亞將固選於時傑神龍三年以為朔方軍前鋒游奕使景龍二年換右驍騎將軍開元五年兼歸德州都督使皆如故八年遷本衞大將軍改朔方節度副大使公之理兵也堅三革利五刃偶拳勇齊足力信賞罰分甘苦六轡如手千夫一心接獯獫猶蚊蚋臥沙塞如袵席薦居露食垂二十年雨畢而成師冰泮而休卒寒風入於肌骨夜霜出於鬚鬢人不堪其勤公不改其節韓公之建三城也公洗兵諾真之水刷馬草心之山以為外斥而版徒安堵鄭卿之和默啜也公授館李陵之臺致饔光祿之塞以為內而賓至如歸九姓之亂單于也公四月度磧過白檉林收火拔部帳納多真種落彌川滿野懷惠忘亡漠南諸軍韙其計也降戶之叛河曲也公千騎奮擊萬虜奔走戡翦畧定師旅方旋而延陁跌復相嘯聚上軍敗於青剛嶺元師沒於赤柳㵎公越自新堡奔命寇場贏糧之徒不滿五百兇醜四合衆寡萬倍公殺牛為壘噉寇為餉決命再宿衝潰重圍連兵躡踵千里轉戰合薛訥於河外反知運於寇手朔方諸軍壯其戰矣斫摩之奔也邀於黑山口覆其精銳布思之背也追至紅桃帳掩其輜重乳泊之會刜蘭池之狂胡木盤之役縲方渠之逋寇凡前後大戰數十小戰數百算無遺策兵有全勝是以六狄逃遁三垂乂寧聲暴露於天下業光華於代載信皇威之所加亦武臣之力也故錦衣寶玉允荅戎功甲第良田丕承錫命語其智効未甚優寵黃頭黑齒比價齊名積戰多瘡累勞生疹恩命尚藥馳往診之晉豎巳深秦醫無及十一年四月五日薨於位享年六十制贈為撥川王稱故國志其本也太常議諡曰忠由舊典昭其行也長子盧襲官封繼事業次子舊久特拜郎將十二年四月詔葬於京城之南懷遠人也太常鼓吹介士龍旆虎帳貔裘封犛殉馬吉凶之儀舉夷夏之物備長安令總徒以護事鴻臚卿序賓以觀禮哀榮之道極矣君臣之義厚矣有命國史立碑表墓吾嘗同僚敢昧遺烈銘曰黃河接天青海殊壤舉世安俗拔俗誰放倬哉論侯利有攸往奮飛橫絕摶空直上以衆款塞因敵立勳吐蕃萬戶吟嘯成㣥精感天地氣合風雲既封酒泉乃位將軍朔方陰塞直彼獯虜帝命先鋒闞如虓虎山北加竈漢南擊鼓十數年閒耀國威武我有師旅將軍鞠之我有邊甿將軍育之柳㵎亡師一劍復之蘭池叛胡三戰覆之武節方壯朝露不待王爵送終宿恩未改時來世去人物如在銘勳諡忠以告四海孝足動天義堪變地河中見三州之姓炳彼精誠南亭聞再逢之母彰茲竒事不有隱德曠代誰鄰內侍高延福者將軍力士之慈父也粵自西雲干呂東明銜璧以亡王之族處巷伯之官而將軍本系馮亭代家南越未知父母來奉宮闈老而無子曰悲幼而失親曰苦調之悲者笙磬異器而同音貌之苦者秦胡別狀而共色從此斷金合要投漆相受承順無違日嚴生乎本性仁慈匪飾天屬由乎自我父子之名既定姓氏之目因移大將軍之家去鄭而取衞平原侯之室變郭而從甄亦猶是也既而內侍以鴻漸登朝苒蒻朱紱將軍以龍樓得主艷耀金章其訓子也溫室之樹無言車中之馬數對其事親也三牲有養志之樂百行無匪疾之憂至矣哉高氏之子也以思親之願而展親以欲報之誠而報德神明翕而哀懇荒裔竦而慕義乃有旁求聖善提挈炎洲二紀積離萬里遙至音容莫識涕對茫然驗七星於子心認雙環於母臂而後深傷頓感若墜谷而登天蘊怨都除類愈矇而覩日於是盡歡二媼兼敬三人均養之恩咸不寐於十起反哺之志齊色難於一堂㣥公賀虞潭之親天子歎馮勤之母此復然矣內侍事主四朝歷官七政專良恭肅著美綸言沖謙儉讓得名朝列年六十有四開元十四年終於來庭里明年五月葬於長樂原繼子力士喪孺慕而加等葬罄誠而備物義方之經鬱為稱首孝德之傳今見其人永惟先恩追綴餘烈若夫慈羇旅之稚童仁也約詩禮之尊教義也貴不居而要避權禮也生推心而死有託信也仁為德本義為行先禮為身宅信為意田故仁之報也壽義之報也樂禮之報也安信之報也順履順居安乘樂享壽此四者生人之偉事自求之深致者矣於戲頷賜冠馳寵勢偃蹇俗上煜爚君旁者豈不思景行高山慎視前轍如或少選亡禮顛沛違仁瞻言四報咫尺千里揚芳樹淑其不務乎予固春秋之徒也懲不濫而勸不僭義重天綱孝崇人紀樂諄諄之成訓善哀哀之克子不著倚相之書將受邱明之恥九原上千月深覽碑版傷知音有以見古史之心也銘曰高堂樂未散重壤哀巳擗寶帳吹靈衣金樽照塵席苦長夜之易泯怨寸景之難惜刻義聲與孝心萬古千齡傳此石君諱某字某扶風人也其先伯益贊禹中衍御殷在周曰嬴在晉曰趙上卿以人歸政疑將軍以馬服為姓緝熙乎平通重合焜燿乎伏波中水我高祖汾州刺史諱歸歡我大父鷹揚郎將諱士幹嚴考獲嘉令諱果濟美惟舊冥德於君君幼而王褱竒長有規操樂道稽古昇堂覩奧伯父匡武撫之曰亢宗保家吾有望爾悉以先人家牒圖傳付之入太學舉明經補巴西尉內憂去職君四歲而孤重集於蓼因心孺慕名教同傷歸次葭萌江溢毀道攀轜號慟濤為之却蜑人哀之葺棧而濟釋服調襄陽尉主進魚家絕鱻食州將魯王俾盤二白魚時其亡也遺之夫人以辭君還拜受使復王曰非惟是夫又亦賢婦吾嘗其一得其二善焉長史盧幼孫悅是奬也舉君清幹有聞授清城尉未往且有後命為河西營田判官物土穡人藳穀洋羨皇揆其懋考績登焉程務挺之軍靈夏也咨君運籌乘遞入幕獲虜數百欲剿罄之君諫曰王者之師將德是以討叛惟武攜遠在寬搏牛之䖟不可破虱未擒伏念何逞纍囚乃止師歸策勳上柱國改溫縣尉永淳阻飢廣提中外絕甘分少約己周人既喪好逑室無嬖御夫人張氏詹事丞師寂之女也敬事皇姑能佐君子娠有胎教宗如樂諧前誌之美多所闕載絳郡夫人王氏則天聖后姑之女子而夫人之母也嘗曰婦則女訓吾女有焉享年不永元髮殂落先時君之伯姊歸宗夫人推居廨寢事之而躬處下室及亡設几筵於正寢惟明靈以女公之故憑巫通夢屢寢為辭舉家懇啟久而後定噫生則盡禮死而知讓殆其神不昧乎溫秩滿轉洛陽尉當周之興也版都社澤郊廟粹紛嶽僎明堂京轂回回日不暇給又勅君專總徒匠凡三百有餘旬蘊勞成疾聃憂損壽永昌元年孟夏辛卯卒官春秋五十有七帝用悼之贈朝散大夫旌淑紀庸禮也龜玉在山泉為國寶以其靈與瑞君子居下位而上達以其名與義夫是之寵有由也哉葭萌之戚昭其孝也陽侯息浪異類胥感襄陽之饋識其潔也德形於家聲聞於外塞垣之讜植其仁也衆俘賴全將不為暴重屋之役厎其勤也沒而益榮朝不棄力有一於此猶為令德況備舉乎豈惟其身將施其後厥子搆據擇皆國之良也為有後之闕其在是乎徵搆職太子僕景龍初宰長安也永惟考襲朱芾已佩葱珩母氏早逝而榮不及乃讓賜階乞封先妣天子憐之制贈夫人清河縣太君人謂長安能報恩矣詩云欲報之德昊天罔極此之謂也馬氏之墓世在扶風清河之喪也卜宅於洛陽北邙南麓後君捐館因窆其所夫人穴於兆之甲大夫竁於域之庚今龍集戊申將返葬故國君執友禮部侍郎嚴善思諗之曰夫子之逝一終八辰精氣其存親壤石矣吾嘗相二土從新其愈乎且不戀本達不合葬古神尚休無或變有夢先君者與其言叶於是祗率嘉話既妥成規堙雙墳溝四塹傍建祠宇前勒豐碑茫茫天地永懷長畢誰居後之人匪惟是四時烝薦之事所以觀百代祖宗之烈其詞曰昂昂大夫有邈其致洽聞膚敏賙窮錫類行實迴川清能改位佐邑惟五安人則四多稼穰邊昌言扈帥比義后稷勤官沒地歔欷天朝毳衣以襚我有令德追啟清河宜家族揉主祭神和親戚光貴劍葢金歌相從先後樂此山河
