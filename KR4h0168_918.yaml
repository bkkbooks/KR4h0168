front:
  text: 全唐文欽定全唐文卷九百十八清晝二
  hash: sha256:f1bd81eaddbe52a11ed35435892da8ae8024c81f52f1eac4fec1a2d3a1d8bd5e
body:
  text: 水之性不動而鑒得非夫實相之體耶雖積為洪溟而未嘗變亦真我自在之妙致也如來大師獨秉至教㣥聖拱手俾置冥到識破堅冰之惑豈逾一念之中哉靈隱大師雖外精律儀而第一義諦素所長也故小子志之大師生緣錢塘范氏諱守真字堅道齊信安太守瑝之八葉禮既冠衆君子器之夙有邱園之期不顧元纁之錫遂詣蘇州支硎寺圓大師受具足戒是夜眼中光現長一丈餘久而方沒蓋得戒之禎也後至荊府依真公三年苦行尋禮天下二百餘郡聖教所至無不至焉無畏三藏受菩薩戒香暜寂大師傳楞伽心印講起信宗論三千餘遍南山律鈔四十遍平等一兩小大雙機在我圓音未嘗異也乃發殊願誦持華嚴遂於中宵夢神人施珠一顆及覺惘然如珠在握是嵗入五臺山轉華嚴經三百遍追宿心也又轉大藏經三遍廣正見也至開元二十六年有制舉高行道俗請正名隸大林寺後移籍天竺住靈隱峯時大歷二年也至五年三月寓於龍興淨土院謂左右曰夫至人乘如而來亦乘如而去亦其必然也而愚夫欲以長繩繫彼白日安可得乎吾非至人豈逃其盡以此月二十九日告終於茲地春秋七十一僧臘四十五其間臨壇既多度人無數今不復紀也顯明弟子蘇州辨秀湖州惠暜道莊越州清江清源杭州擇鄰神偃常州道進如彼鸑鷟之彩共集旃檀之枝江淮名僧難出其右晝之身戒亦忝門人幸參四子之科獨許一時之學斯文在我何敢讓焉詞曰房星在天降為應真好爵縻我視如埃塵既投其簪亦壤其服戒日才佩禪秀乃沐四十餘夏振振盛名大江東南為法長城宣尼既沒微言乃絶我師云亡真乘亦輟靈隱峯上春日秋天風生松柏如師在焉持教門人楚英吳傑儒方荀孟道比文列宿習未盡妄涕猶雪宿己忘真如水如月古之君子名書彞器大師不書將墜於地紀功者銘傳心者燈藏諸名山不騫不崩昔在穆天子我如來大聖沒於西土蓋示身也其聲教紛綸湮沒而復紀者九十六種外道持衡於五天是僭佛號俾戒月生魄寶星為彗涅槃河水汨泥揚波而天下騰口襲心敻然而喪精矣我本師爰敕大士中興南州激童蒙竅檮杌摧異道破邪黨彼日月是出爝火不息其為光也不亦難乎其有躡清氣允種性雲龍相召與蒼生為春則我大師矣大師諱瑀字真瑛俗姓沈氏吳興德清人也其先世國於沈因以為氏按春秋沈子之後也五代祖敏梁東陽太守不言而理不猛而威揚之以和風灑之以甘雨殷氏既喪公其嗣焉高祖某勇而仁直而信少好理體機若缸轉六嵗讀孝經至參不敏略而不讀師問之故曰此大人稱之而小子曷稱之十七州舉孝廉陳侍中徐陵特相器重名位不達終於邱園曾祖某學藏於晦辨守於訥大業之際州辟不起祖某考三教之源精一貫之旨結廬於金鵝山下怡然獨得父某湖山是傑言行孔臧里有不爽而訓之鄰有不給而錫之燠兮春風凜兮寒松心可以育物德可以垂裕以五世樹善而瑀公生而聰慧不以師受年未總角辭親出家患身之資忘若遺蹟爽口之味飲如我仇以如意年大赦度人壞衣削髮煤口世事怡懌至道弱冠遊東京大福先寺厥受大戒懇懇勤勤不遑假寐三日之夕戒相出焉見有神人假然在目倏來忽往或同或異得非至誠乎於是燭如來燈佩菩薩印證聖中歸於大雲道場堅執律柄僧綱釐舉不亦宜哉公素履純厖無咎無譽使天下之士有外道焉有闡提焉心如飄風言若泉湧撓我聖教擠我妙門公示以從容誘以方便莫不稽首挫色而聞命焉常禮一萬五千佛名兼慈悲懺日夜一匝或二日或三日一匝苦節貞勵飲冰茹霜夜有聖僧九人降於禮懺之所相與行道彈指而去或夜無燈燭心口是念圓光照室如坐月中如此則往往有之公常喟然曰自明帝夢金人孫權獲舍利茫茫中土是有正法而德清偏邑罕有塔寺使蒼生蒙昧罔知所之悲夫至人無名陶鑄而名之耳安可糠粃有為金璧無相二見齊楚瞽性者流豈知履如之功萬法無外此大菩薩自在之盛行吾將為爾行焉於是繕以香臺作以茝殿卿雲蓄泄於戶外麗月昭回於簷下是知觀象大壯法誤雲室豈不宜哉前後寫經二藏凡一萬六千卷不以皮為紙不以血為墨是身臰穢靡潔書寫非難捨哉晚節工於禪門頓入懸解言越性靈之外心冥文字之表天寶初臨安足法師死經三宿將入地獄冥見瑀公引至王所謂王曰此師解講涅槃經大王宥之王曰唯聞嚴能講不聞此師名何也如此再三王不能屈因赦之嗟乎至人之作用不動此身而流形於彼非無緣慈力何哉曾見鄉人施曷音桃牛者天然不孕因而出乳及瑀公寢疾日有饋之非夫人含動植德感明神亦何能致此希有之事也他日蹙然改容據梧而歎昔孔子蚤作悲歌於門者此聖人所以同我生亦同我死莊生曰適去夫子順也吾亦何懼哉以十一年秋禪坐滅度嗚呼婉婉蓮步應隨白雲寥寥香林空見孤月余不知其至人幽機妙用髣佛化為天星乎飛為列霓乎不然將有異名於他國乎某月某日飭以靈龕崇以寶塔擊以法鼓吹以法螺門人號慟於是葬斂十二年春將欲啓靈龕遷寶塔炎炎金火以求舍利豈知容色不壞凜然如生識者以為涅槃本義絶動植之知窮寂照之惠存不壞之身滅大化之體此四者而公得之昔少林孕鬚蘄春育髮何獨嘉也寺主元山崔等皆秉大明惠開道區中吠琉璃天移夕為晝彼什公四子亦季孟之間歟大理評事攝監察御史姚淡主客郎中姚沛稟龜溪之靈鵝山之英門多才傑世著匡佐而瑀公善焉刺史楊惠才識深敏器宇調暢虞談之流也令吳測微清慎有度奸回無欺賀循之流也皆入境問俗飲風眷德徘徊歔欷有恨來暮嗟乎法本無名是歸寂樂門人垂淚願刻豐碑豫誠不敏哀以見託銘曰法本無生示生兮法本無名強名兮大師振振沖邈兮蒼生茫茫啓覺兮堅持律藏是非兮深入禪門杳微兮鵝峯岑崟莫涉兮龜渚淡蕩莫測兮五千佛懺是禮兮十二經文是啓兮聖僧異人降語兮曷音桃牛非孕垂乳兮同衆生病同差兮同衆生沒罔壞兮門徒病矣號絶兮姻族澘然嗚呼兮烏臺華省思人兮邦君邑宰敬神兮無言可象湛寂兮身謝名飛刻石兮律者聖道游入之津為心見所瑕多溺近果不然則極地之階乎武邱律師諱齊翰字等至通教之士也吳興沈氏之子高祖陳國子祭酒曾祖某隋魏州司馬祖考二世不仕律師綺嵗從大人至山寺覩高靜無塵之躅惻然有宿命之知因請出家大人從之至天寶八年八月五日奉制度配名永定九年十月依分壇受具足戒後移名開元大歷中移名武邱皆兩州道俗所請也律師道性淵默水則淡然蹟不近名身不關事長在一室寂如無人豈比夫駢行鼓簧之士哉晝始疑斯人未造精極因問業報之理如何師對曰夫鼓毗嵐之風有物皆壞而靈空不動蓋無相也心且無相業何纍焉但懼陷於偏空妄撥無耳繇是始知律師心之所至精相部義窟洞法華經王蘇湖戒壇每當諸首大歷十年某月入流水念佛道場是夜西方念中頓現蓋精誠之所致也至某年春秋六十八僧夏四十七遇疾之日謂弟子曰有鶴從空飛下回翔我前爾曹見乎必謝之期小聖猶病安能免哉即以某年某月終於本院受業門人如隱壇場門人宣兌誠肅禪心律儀己有時譽晝則律師之鄉僧也戒有一日之長許為法兄昔愧隨肩今傷分影有清規之可採則文石而言焉銘曰漫漫去聲情海多生沒兮超超我師一念越兮舊寺龜溪為僧傑兮新居武邱匠時哲兮適來示生亦示滅兮山上人間有遺轍兮故雲茫茫餘水泱泱留廢房兮黃糵心苦青松節寒對空壇兮升堂門人結社居士依扉履兮或刻貞石或書勝幡思師存兮西周之叔世本師淪蹟於拘尸那城千有餘年教行東漢元綱遐屬殆如綴旒而先經異時至機終義故我唐聖歷中大方廣梵文四譯斯備雷霆始懼於魔耳天地再造於人心曈曈無邊佛日正出其時私道之士有燉煌公得他心稱是文殊後身洎四葉傳於吾師本孫氏之子長沙桓王十有三世孫母也初感夢吞明珠遂黜鮮惡葷誕彌厥月生有異表中嵗若成寥兮真姿不棲於俗願移榮於道忘錫羡於家至十五辭親從師依年受具行學一集鬱為教宗終卷伊呂立功之致陋黃綺肆志之適遺形理性與山木為㣥故地思貞大師屬我以華嚴經菩薩戒起信論心以靜鋭智與經冥徹照淵元萬法一念宵景盈空而不見晨曦溢目而何有有而不可有者吾其見真師之心哉受經彌時乃疑未契其夕夢乘大艑直截滄溟橫山當前峻與天極不覺孤帆鳶戾懷襄止濟峯竦竦而忽焉雲溶溶而在下既寤形若委衣流汗輕醒自此句義不思而得一部全文常現心境事事無礙之旨如貫花焉天寶六年於蘇州常樂寺畫盧舍那像寂念初明十身竝現日月何咎惟吾師自知大歷三年講於常州龍興寺才登法座忽有異光如曳紅縷漸大縈於香室久修行者會中光覩前後講大經十遍制義記十二卷誠感之事此類固多今略而不載受業比邱大初付以香爐談柄知其意有歸深於吾道者則有尋陽正覺會稽神秀亦猶儒氏之有游夏荀孟雔賢議德其造形之異乎至大歷十三年十一月七日沙門惠覺夢巨塔橫仆陷地二級無何而吾師示疾顧門人曰死生者衆人之桎梏至人之作用昔尼父逍遙曳杖發泰山之歌蓋欲顯本知終示動歸靜吾非不敏幸異夫流遁不返者乎言已奄然與物而化春秋六十一惠命三十二以其年某月日甲乙建塔於某處終終之義也噫素旌晨出異昔經行衆籟啾啾以風號細雨茫茫而天泣世流有逝法流何逝而常清世土自騫法山何騫而常存吾知夫一貫而何言時䢴城肅公得離性之文代豫為銘刻石松門辭曰銘闕至人於生鍇一也物有之我亦有之若日月可蝕虛空可汙乎在至人為宅心之勝地誠瞽夫不返之瀑流哉於戲我法自五天揚於漢廷八俊四賢橫世傑出後之學者聆休風企高躅何吾師之穆其芬馥歟吾師諱某字某先劉氏之子漢楚王交三十一代孫烈祖某永嘉南遷為丞相掾四代祖遠隋東陽守顯其遺榮之蹟略載本枝全拔俗之高不書後葉蓋亦垂訓之意乎吾師幼孤伯父哀字如禮名因教立孝自天生而宿植緣深心田欲稔因請伯父哀而捨之事靈隱某禪師因問師入道之次師語曰夫爝火明乎太虛以爝火之心當太虛之境境非心外心非境中兩不相存兩不相廢今我所證是爾所知曷有萬法之深淺優劣乎語畢如涼風入懷醒然清悟天寶四年受戒於東海大師鑒真傳講於會稽大師曇一至德中舉高行隸名開元乾元中有詔天下二十五寺各定大德七人長講戒律吾師其選也頃年淨土一門不愆於念嘗謂人曰昔聞西方之行是有相大乘此乃蓬心不直達之說何者夫出言即性發意皆如而一色一香無非中道况我正念乎於時六十七天年三十六僧夏一十六壇場孤制律樞正持僧綱自胥湖南北皆宗仰焉以建中元年六月十五日寢疾而逝其時有庭樹一本枝葉扶疏及吾師將亡之朝花正拆而遽萎條始繁而方折亦恆河水上旃檀樹枝榮枯之意也其年七月五日遷靈龕於武邱西寺松門之右嗚呼青山不歸白林長謝秋原之上萬境皆悲雨冥冥而晝陰水浼浼而東逝門人道亮道該清會亮以毗尼繼其行會以才學儔其賢該以詞華蹤其美三子之外居廊廡者充江漢焉故觀察使韋公元甫觀察李公栖筠今虢州刺史李公紓今御史中丞李公道昌林下之蹟可追山陰之遊尚想懷人撫事相顧泫然晝實濩才曷足揄揚盛美以吾釋門之事安敢讓焉詞曰本師示終兮元綱絶香山崩兮香海竭大地動兮旃檀折人天冥兮千光滅我師出嗣兮遺教張如何斯人兮天不臧星既雨兮地亦霜生涯昧兮四流長捧遺言兮循往跡庭無人兮月寂寂百年遐壽兮日長夕萬春上服兮塵已襞門人慟兮世人悲瞻影塔兮山之垂宿昔經行兮舊路岐雲眇眇兮雨霏霏方城芥盡兮長乘移樂石香名兮不騫不虧我先大師曰佛嘉言孔碩大造人天張無生極宗懸衡於㣥教之表自第一義諦皆我之蘧廬也况儒墨名法道家之流哉教之斯行資乎哲匠今大師即其人也大師諱道遵字宗達吳興張氏之子崇勳茂德世為吳中右族大師夙負殊操潔士稱之榮耀不足關其心聲塵未曾觸其性其年二十詣天竺威大師初受具戒事報恩興大師首宗毗尼依佛教也常愀然而嘆曰孔老之學不明三世昭昭之業何異夫適郢而求冥山哉先大師則不然觀萬像無根我獨以無生一心覆疑山之峻知四流妄有我獨以不動二字停倒海之波室是遠而悟者天隔昔在漢明永平之際大教洋溢霈然而東與生靈滌心觀天地更始正士自摩騰以降持法有如關中者秉律有如南山者海內髦士亟歸乎我如凱風微揚嘉禾先發北齊惠文大師傳龍樹智論一性之教即我釋迦如來九世祖師文殊所乘也惠文傳南嶽南嶽傳天台始授一心三觀之旨以十身佛剎微塵數修多羅如懸帝網丕出正念無遺即中蓋如來一斯教之扃鐍也天下宏經士窺我宗者不得其門而入天台去世教傳章安章安傳縉雲縉雲傳東陽東陽傳左溪自龍樹已還至天台四祖事具諫議大夫杜正倫傳教記今大師則親承左溪一受心宗方造其極物有凋折而苦節不衰時有晦明而至行不變法華三昧淵乎我衷嘗從容謂門人曰堯舜之民不必獨義教之至也教若不至民何咎焉吾恐大教未周㣥機未發陷諸子於邪見之網吾徒得無過乎乃欲廣寫法華經置道場闢經院以燭繼景揚大雄慈聲蓋平生之願與一之日發其心二之日規其趾作不逾序厥功成焉居山之福地於戲㣥峯合沓以就我當大藏而孤峙疑天作以待用此持經之境也及以清晝山空杉吹不動真念凝乎寂寞經聲在乎窅冥此持經之心也大歷元祀州將韋公元甫兵部尚書劉公晏侍御史王公圓開州刺史陸公向殿中侍御史陸公迅天理評事張公象境誘真心共獲殊勝乃相與飛表奏聞詔書特下署名曰法華道場焯哉盛乎經王之惠日升於天乎自江以東惣一十七所皆因大師之首置也舉精行大德二十七人常持法華報主恩也大師以無緣慈眼極觀四生多溺空見乃鑄盧舍那及毗盧遮那像明智身不有法體非無將顯古佛證經之由乃起多寶妙塔開淨土當生之葉遂作彌陀色身法華一經駭聲聞得記方等四部喜廣教盡收無垢淨光蓋是如來極開方便跡雖有作功乃無為接人天機使知有殊常之福又寫天台一教溢乎道場真詮昭昭與清景不極大師有言佛法壽命其惟常住乎常住不存我法安寄於是置莊二所世田為義俟嘉穀以登身田是修期聖禾不絶非夫大師平等之施孰能於事理雙全哉物役我慈日用不足門人有懈廢者接彼退機講法華元義天台正觀四分鈔文臨壇度人授心揚律願盈乎石室之籌天寶年於靈巖道場行法華三昧忽觀大明上燭天界我身正念儼在光中異日問天台然公公曰知慧光明從心流出非精志之所致耶又於本寺入法華道場忽覩此身在空中坐先證者知是大師滌垢之相不然則萬法有無礙之用哉其年春秋七十一僧臘四十六以興元元年七月二十九日告終於支山本寺嗚呼象法梁壞苦流增波無數人天從今何怙初當寺蓋公輪公一夜同夢大殿忽崩得非法匠將亡之應乎示疾之日驕陽久嘉苗若燎辭世之夕風號雨暴天地慘黷亦我法陵遲之變也傳教門人靈輪法盛道欣可入如來之室豈唯宣父之室哉俾厥鴻猷張而未弛奉教門人猶子靈源等高志警拔德鄰先賢精細行以檢儀敷大乘以基性豫雖後學夙聆德聲曷云不騫貽諸樂石銘曰泓澄吳江靜幾於道清氣蓄焉誕我僧寶洸洸大師與道為藩義天無孛慈釭不昏巋然支山繄公所履建塔闢院夷荒而趾乃基靈峯靈峯崇崇乃啓祕藏祕藏彤彤天色在下日輪當中真經無言至象非象冥理徹性不昧不朗三觀一心如懸帝網雪山嵳峩有時而裂香樹偃蹇有時而折世相若斯師何示滅示滅何之天泣人悲高邱漠漠細雨霏霏攜履西去相逢是誰見海未乾疑山尚阻囂囂魔民爰得其所吾師寂寥空留法語入室數子皆宏我經安公如月遠公如星恭恭秩秩釋氏儀形塔影亭亭長在寒樹天上花落人間日暮猶飄苦雲與我為喻道賢上游其德如陽和亭毒萬物生而不子成而不繇或曰異於是蓋繇無生空惠冥乎其間哉暨洪唐盛明之朝我法尢重五教四分飈揚景張南山律宗居天下第一後弟子如大師鮮矣大師望出徐氏諱神皓字宏度八代祖摛齊竟陵王西邸學士子陵梁尚書左僕射其文與庾子山齊名逮陳氏革命因佐吳邑遂家姑蘇高祖碩學通三禮中年即世曾祖曇隋王府咨議參軍祖德恭潯陽郡詞曹考君定深於釋典不屑名宦大師天情耿潔風韻朗邁幼負脫俗之姿嘗有言曰沙門者高潔其道秉空王平等之性一念不昧坐登佛階吾自知此身履龍淵取明月曷有三圭之貴重侯之高而能動我心哉乃依杭州龍泉道場一和尚出家敗髮損容越出流輩鏗然法器如琢玉焉天寶六年天降板詔請釋真行一州許度三人獨居薦首吾以是知大師初皈佛教滌心地也今奉國恩正世名也因隸僧籍於包山福願道場初進具於興大師次通鈔於曇一大師五夏未登學精三藏天台宗旨難為等夷淵元絶思之科如良庖之導大窽也十講律鈔五升壇場傾江而東願禮其足後生學者仰其聰明惠性如追麒麟之步大師嘗引錫西望想包山舊居包山即洞庭仙都之一峯湖澄氣清日出水上謺嶂合沓生乎影中得非天遺此中與師成道耶乃命舟而還使野童誅茅山童掃石顧左右曰昔者如來崇飾塔廟乃是啓發㣥信開人天淨境豈為已哉此少隳廢久之非先師本意乃闢僧院創食堂衆有怠慢者醜其行而理之舍有傾者惡其邪而正之墾田置莊開畎泄澮功既成矣業亦博矣百千人俱皆受其賜曩日洞山水滸業湖之氓畾咽川繒繳亘渚大師以如來不殺之戒黜彼鮮食回小人之腹為君子之慮乾元祀有詔天下二十七寺各奏大德七人長講律戒因請住開元寺欲果願具且懼書遂僶俯從命奉戒弟子開州刺史陸公向前給事中嚴公涗服道弟子禮部侍郎劉公太真前大理評事張公象欽風弟子前廉使亞相李公栖筠天誘厥衷俾揚我法精識通敏言為世程謝太傅之流也其時常熟地偏僧多闕行李亞相欲以德撫乃請大師統而正之一化而革心再化而知道三化而闔邑從風大師末年工於圓宗縱心皆是以文字而用不以文字為病是念佛寫經備行教法置西方社廣淨土因專誦法華經九千餘匝遊四大寺登五老峯遍欲觀古僧得道之所此亦至人之餘事應物如動自視闕然貞元六年十月春秋七十五僧臘四十三其月在開元遇疾忽言曰吾愛夫得道者心如澄溟知如晨曦不染如浮雲自在如遊鴻吾雖非斯人亦未肯以有生為纍其月十一日顧門人維諒我去世後汝若置塔可歸洞庭故山言畢而逝是夜琉璃色天星霣如雨往往有西方之應覩而不書奉遺命也門人維諒有文有道獨步當時執師之喪不以證而廢教也列座門人道超靈俊道濬道稜維誠皆積解以詣空門邁德以藩象教吾聞古之僧高者述誄與碑自晉朝始也二三子思吾師盛德將欲鎔黃金勒貞石垂裕後昆使昭昭之教長燭於人天銘曰於穆大師立言可經身佩戒光高月亭亭怖魔以袪襲智以醒如何斯人忽號冥冥天樹春折雲花夜零空留一燈寂寂青熒伊昔行道坦坦素履跡雖可攀行不可擬乃知我師應世無已優游人天自在生死門人維諒躡彼高塵嶷嶷靈塔紀功於人於山之峯於湖之濱風凄遠鐸月慘重輪瞻禮雲上如逢化身人生性靜而遷乎可欲可欲萌乎憂喜者病之源一作原也故至人觀其靜見萬物之真觀其動見萬物之遇客有強君隱士之儔也理照淈俗寄於和扁之伎而時人無能知者豫嘗問君以醫之術君對曰夫妙有統於心而通於物理其靜為性其照為覺覺也者日月之謂乎性也者太虛之謂乎故理世為儒可以敷五典理性為釋可以越四荒一作流理病為醫可以空六腑使定命可逭業疾可亡而世教罕能逮之故醫王未悉辨也豫曰至哉斯言命小子志之
