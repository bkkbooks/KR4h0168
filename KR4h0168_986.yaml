front:
  text: 全唐文欽定全唐文卷九百八十六闕名二十七
  hash: sha256:e3d6a3702d8f7c2cc2ad07f9e39c061682b3a42a958a88f544b53cec0799f3df
body:
  text: 山東野客移書於劉吏部足下公總角之年奇童入仕有方朔之專對無枚皋之敏才佳句推長竿妙入神善謔稱名字不正過此以往非僕所聞徒以命偶良時身居顯職方云好經術重文章賣此虛名負其美稱今年聖上虛天官之署委平衡之權所期公有獨見之明清平為首豈意公有專恣之行高下在心且數年以來皆無大集一昨所試四方畢臻公但以搜索為功糾訐為務或有小過必陷深文既毀其髮膚又貶其官敘使孝子虧全歸之望良臣絶沒齒之怨豈以省闥從容之司甚於府縣暴虐之政所立嚴法樹威脅人云奉德音罔畏上下使聖主失含宏之道損寬仁之德豈忠臣之節耶主上居高拱穆清之中足下每以煩碎之事奏請無度塵黷頗多呈三接以示人期一言以悟主朝臣氣懾選士膽驚內以承寵承榮外以作威作福豈良臣之體耶且兩京常調五千餘人書判之流亦有碩學之輩莫不風趨洛邑霧委咸京其常衮之徒令天下受屈且衮以小道矯俗以大言誇時宏辭曾下登科平判又不入等徒以竊居翰苑謬踐掖垣雖十年掌於王言豈一句在於人口以散鋪不對為古以率意不經為奇作者見之痛心後來聞之撫掌奈何輕蔽天下之才以自稱為已高以少取為公道故郤至自伐稱兵處父尚云終喪其族以茲偏見求典禮闈深駭物情實乖時望故詩曰濟濟多士文王以寧夫聖人用心異代同體衮云親奉密旨令少取入等豈聖人容衆之意耶為近臣而厚誣干處士之橫議甚不可也况杜亞薄知經籍素懵文辭李翰雖以辭藻擢第不以書判擅名不慎舉人自貽伊咎又常衮謂所謂曰昨者考判以經語對經以史對史皆未點對考為下等先翰有常無名判云衛侯之政由寧氏魯侯之令出季孫又常無欲云在凌室而須開闕夷盤而不可豈以經對史耶又嚴迪云下樊姬之車曳鄭崇之履豈以史對經耶數十年之間布衆多之口縱世人可罔而先賢安可誣也今信四豎子取彼五幽人且吉中孚判以大明御宇為頭以敢告車軒為尾初類是頌翻乃成針其間又金盤對於玉府非惟問頭不識抑亦義理全乖據此口嘲堪入覼縷張載華以江皋對瀍洛朱邵南以養老對乞言理自未通對仍未識並考入等可哀也哉王申則童子何知裴通則因人見録苟容和謁豈謂公平夫有西施之容方可論於美醜無太阿之利安可議其斷割使五千之人囂然騰口四海之內孰肯甘心况宏辭大國光華吏曹物色公明立標榜令盡赴上都東京者棄而不收常衮大辱於國豈以往年敗績自喪秣陵之師今日復讎欲雪會稽之恥雖擢須賈之髮衮不足以贖罪負廉頗之荊公不足以謝過况所置科目標在格文盡無宏辭固違明敕欺天必有大咎陵人必有不祥足下以此持衡實負明公以此求相實負蒼生况公為主司自合參議信衮等升降由已取捨在心使士子含寃不得申結舌不得語罔上若是欺下如斯豈以天聽蓋高帝閽難叫亦由宰臣守道任公等弄權嗚呼使朱雲在朝汲黯當位則敗不旋踵安能保家宰輔侍郎非公等所望也少林寺今得牒稱上件地往因寺莊翻城歸國有大殊勳據格合得良田一百頃去武德八年二月蒙敕賜寺前件地為常住僧田供養僧衆計勳仍少六十頃至九年為都維那故惠義不間敕意妄注賜地為口分田僧等比來知此非理每欲咨改今既有敕普令改正請依籍次附為賜田者又問僧彥等既云翻城有勳准格合得賜田當時因何不早陳論翻城之時頭首是誰復誰委知得款稱但少林及柏谷莊去武德四年四月翻城歸國其時即蒙賞物千段准格合得者未被酬賚之間至五年以寺居僞地總被廢省僧徒還俗各從徭役於後以有翻城之功不伏減省上表申訴至七年七月蒙別敕少林寺聽依舊置立至八年二月又蒙別敕少林寺賜地肆拾頃水碾磑一具前寺廢之日國司取以置莊寺今既立地等並宜還寺其教敕案今並在府縣少林若無功勳即是雷同廢限以有勳績別敕更聽存立其地既張頃數恩敕還僧尋省事原豈非賜田不早改正只是僧等不間憲法今謹量審始復申論其翻城僧曇宗志操惠瑒等餘僧合寺為從僧等不願官爵惟求出家行道報國若論少林功績與武牢不殊武牢勛賞合地一百頃自餘合賞物及闕地數不敢重論其地肆拾頃特敕還寺既蒙此賚請為賜田乞附籍從正又准格以論未蒙僉賞但以出家之人不求榮利少亦為足其翻城之人是誰知委者僞轘州司馬趙孝宰僞羅川縣令劉翁重及李昌運王少逸等並具委者依問僧彥孝宰等所在款稱其人屬遊仙鄉任饒州弋陽縣令無身劉翁重往在偃師縣李昌運王少逸等二人屬當縣現在者依狀牒偃師勘問翁重得報稱依追劉翁重勘問得報稱少林寺去武德四年四月內衆僧等翻轘州歸國是實當翻城之時重見在城所悉者又追問李昌運等問得款與翁重牒狀扶同者又問僧彥等既稱少林僧等為歸國有功勳未知寺僧得何官款稱僧等去武德四年四月二十七日翻城歸國其月卅日即蒙敕書慰勞敕書今並見在又至武德八年二月奉敕還僧地肆拾頃敕書今並見在當時即授僧等官職但僧等止願出家行道禮拜仰報國恩不取官位其寺僧曇宗蒙授大將軍趙孝宰蒙授上開府李昌運蒙授儀同身並見在者並追在手敕教及還僧地符等勘驗有實者少林僧等先在世充僞地寺經廢省為其有功翻柏谷塢功績可嘉道俗俱蒙官賞特敕依舊置立其寺寺既蒙立還地不計俗數足明賚田非惑今以狀牒帳次准敕從實改正不得因茲浪有出沒故牒牒縣符稱得前同州郃陽令王顏狀鄉名太原者本因遠祖乇乇生卓乇漢末為冀州刺史卓在晉為司空河東太守薨時屬劉聰石勒亂太原晉陽不遂歸葬乇冢今在猗氏縣西次郭門外卓冢在臨晉縣東南解故城二里子孫因居河東公私譜牒遂著河東郡望子孫始居之地名太原鄉又按天后朝拾遺陳子昂集有中州司馬濟翁墓志云葬於長壽原至今鄉有太原號也又按唐衣冠譜第是開元初敕柳冲修撰載廣州都督元圭幽州都督壽陽公方平更稱太原王氏頃屬羯胡逆亂百姓逃去永泰元年縣司遂廢省前件鄉併人戶入解城鄉顏等今屬孝理之時宗望將墜逢時不舉後嗣何知望請復立太原鄉名且廢解城之號如解城故城臨闕二字假鄉標若太原名之不存則宗無所據伏請詳覽如蒙矜允仍望各牒諸縣宗人知者臨晉縣百姓王顏等狀請改解城鄉復名太原鄉舊號理崇族望事協敦本執案咨取處分牒下所由者中丞判下縣具勘上者得縣申稱得里正程憲狀太原鄉去永泰元年為人戶破散符下合入解城有實伏請申上者具狀録申者臨晉縣太原鄉去永泰之年併入解城鄉今王顏狀請却復太原鄉執咨取處分訖下縣准狀仍認散牒宗人知者中丞判亢宗務本曰敬曰仁克叶禮經是為通識准處分者准符各牒知者故牒准式令旌表門閭孝子潤州句容邑人張常洧居父喪廬墓所生芝草一十二莖二莖墳上生並高二寸二分蓋濶一寸二分紫蓋莖八莖墳側生並高二尺一分蓋濶二寸五分紫蓋莖四莖並去墳六步二莖廬屋內生並高二尺三分蓋濶二寸六分紫蓋莖右禮部奏得史館牒稱得浙西觀察使牒得句容縣申得耆宿樊泌等狀前件人云建中四年七月丁父憂其年十月便被髮徒跣廬於墓側哀毀過禮號慟將絶去八月中有前件芝草生今禮制已終猶居廬次終身之感起自因心泌所告有前件至孝感致靈物可以敦勸風俗不敢緘默者伏以潤州孝子張常洧漸於聖化著純孝之誠通於神明致嘉瑞之應所宜旌表以示寵光庶令州里風俗益勸謹具本道觀察使及史館申牒事由如前敕旨宜付所司奉敕句曲靈山洞宮所在恭惟列聖嘗亦欽崇宜禁樵蘇以申嚴敬其茅山界內並不得令百姓弋獵採伐及焚燒山林仍委州縣切加禁止牒至準敕故牒牒奉敕鄒魯故鄉俎豆遺教文武之道未墜於地溫裕雖持戎律宛有家風屬兵車之方殷飾孔門以宏教牆新數仞廟設兩楹盡出私財不煩公用綽有餘裕益見器能已賜嘉獎餘宜依仍付所司牒至准敕故牒金闕降祥紫㤅接度關之狀瑤壇祕瑞赤光騰發地之祥粵有元符留於古篆當午夜而龍蛇搖動六字分輝後一年而狼武蕩平八紘無事克昭靈貺獲啓中興考帝祖之微言顯神功於景運得不標於道觀銘在蜀川流傳千百萬年紀我一十八葉樂朋龜職司內翰首冠近臣妙回擲地之金鏤入他山之石鋪陳盡善蔡雍當患於先知述作無遺子建何勞於獨步宜刊盛事以證斯文書云不有博奕者乎猶賢乎已斯聖人疾飽食而怠惰之深也又曰吾不試故藝試用也夫藝者不獨總多能第以其無用於代而窮愁時有所述耳八年夏南行極嶺嶠暇日瀧舟傳其所聞而載之故曰傳載雖小說或有可觀覽之而喁而笑焉灌畦暇語者何老圃騰頰之云也嘗憶早年血氣未定鋪方紙運寸管自許不落人後亟起以干一旦之名良甚苦辛力盡志殫僅能如願終以枯腸不貯機穽不能隨世低昂中年以來漸識悔吝顧胸中有所謂刮磨者蟠不吐則更自懲艾伏不敢發乃知昔者所謂辛苦以求者大可怪笑非但無益抑為有妨嗚呼大丈夫亦安往而失其貧賤者哉於是決意勇退脫謝纓辨故邱之旁有地彌甽蛇行趨隰土氣沃衍甘井在前不病於汲除治以蒔蔬咸曰宜哉夫籍暄於春陽射利者不爭資潤於泉脈乾沒者不忌而又繼日以從事其為力可以不匱卒歲而計入其為收亦足糊口每風日好時皋壤悅暢負杖曳屨暫出郊墅比鄰之人偶相與立曹相與談忽覺吻頤咄咤故態橫發或童顛之叟或粗有知識之少年時時相顧捧腹一笑意雖不倫棄亦可惜因取而疏之以其緣隙日乃有得也故以暇語題辭上闕利儀鳳元年從西國以至此土到五臺山次遂五體投地向山頂禮曰如來滅後衆聖闕靈惟有大士文殊師利於此山中汲引闕一字涉流沙故來敬謁伏乞大慈大悲普覆令見尊儀言已悲泣雨淚向山頂禮禮已舉頭忽見一老人從山中出來遂作婆羅門語闕跡沙漠地衆生多造惡業出家之輩亦多犯戒律惟有佛頂尊勝陀羅尼經能滅除惡業未知法師頗將此經來不僧闕空來何益縱見文殊亦何必識師可却向西國取此經來流傳漢土即是遍奉衆聖廣利㣥生拯濟幽明報諸佛恩也師取闕聞此語不勝喜躍遂裁悲淚至心頂禮舉頭之頃忽不見老人其僧驚愕倍更虔心繫念傾誠回還西國取佛闕法典乃敕司賓典客令杜行闕一字等共譯此經施僧絹叁拾闕一字其經本禁在內不出其僧悲泣奏曰貧道遺軀委命遠取經來闕益而遂留翻得之經還僧梵本其僧得梵本將向西明寺訪得善梵語漢僧順貞奏共翻譯帝隨其請僧遂對諸闕於代小小語有不同者幸勿怪焉至垂拱三年定覺寺寺主僧志靜因停在神都魏國東寺親見日昭三藏法師問其逗遛闕梵旨一無差失仍更取舊翻本勘校所有脫錯悉皆改定其咒注云最後別翻者是也其咒句稍異於杜令所翻者其新咒闕注師問其逗遛亦如前說其翻經僧順貞見在住西明寺此經救拔幽顯最不可思議恐學者不知故具録委曲以傳未悟守真闕一字者繩繩用之闕三字味禪悅者湯湯酌之而難闕一字皎潔冰淨光映槃之山闕一字泠玉華源流功德之水上以灑甘露下以泛慈航拔乎生老病死拯乎胎卵濕化則是我沙門雄猛大師法王闕二字金輪帝孫淨飯王子者也闕一字其超三界騰九天置大地於爪甲納須彌於毛孔引衆生於彼岸飭駕三車照㣥聾於他方了開千眼於是闡無上道啓不二門闕一字大雲而㣥山共滋雨鮮法雨而闕一字花皆潤般若根茂闕五字螻蟻菩提闕六字於草木闕六字之袤其闕八字京須開闕八字衆敷寶闕八字信鼓龍女闕八字八音雲王雨花馥芳闕一字香闕一字數里河嶽為之震動闕二字於焉悚怛將謂闕一字會同共宣說佛頂尊勝陀羅尼咒者也俾其病者愈凶者吉愚者惠虛者實乾闕一字婆之少遇已焚解脫之香闕一字陀羅之乍聞更入慈悲之闕一字暨乎昆蟲啓蟄蟊螣將飛一聆雅音生乎天垂矧乎嚴闕一字香華稽首歸信祈無量壽國登不死福闕一字夫何難哉日者信厚居闕一字安定皇甫公王諱賓少年闕一字長劍壯歲追酒徒聲如震雷材可扛鼎言談多逐日之氣叱咤有干星之力又有太原闕一字長者闕二字池水登耆闍山意闕一字太清志在禪閫共成闕四字之原善哉吾未之逮也闕三字戰諸侯鳥飛白屋闕四字黔黎非罪而見戮良可闕三字礱智慧劍剜煩惱緣闕三字燈照無明室斷疑網而闕二字洞解魔縛而覺路將開闕三字而蓮花淨心持正法而金石闕一字體莫不內分忠孝之闕一字外闕三字之闕一字增闕七字崩劫火闕一字龍鳳字金玉文闕二字五采文氤氳須達長闕四字東西闕二字皆頂謁百福千闕二字祐闕一字想滄波竭闕二字海自闕六字相闕五字手拯㣥生闕七字誠空餘闕三字長造立修行道地經者天竺沙門厥名衆護乃出中國聖興之域幼學大業洪要之典通盡法藏十二部經二達之智靡不貫博鈎元致妙能體深奧以大慈悲宏益衆生助明震光照悟盲冥致尊甘露蕩蕩之訓權現真人其實菩薩也愍念後賢庶幾道者儻有劣力不能自前故總衆義之大較建易進之徑路分別五陰成敗所起變趣機微生死之苦以勸迷勵惑故作斯經雖文約而義豐探喻遠近防制奸心但以三昧禪教為務解空歸無衆想為定真可謂離患之至寂無為之道哉夫三業之興以禪智為宗雖精粗異分而階籍有方是故發軫分逵途無亂轍革俗成務功不待積靜復所由則幽詣告微淵博難究然理不云昧庶旨統可尋試略而言禪非智無以窮其寂智非禪無以深其照然則禪智之要照寂之謂其相濟也照不離寂寂不離照感則俱遊應必同趣功元於在用交養於萬法其妙物也運㣥動以至一而不有廓大象於未形而不無無思無為而無不為是故洗心靜亂者以之研慮悟徹入微者以之窮神也若乃將入其門機在攝會理元數廣道隱於文則是阿難曲承旨詔遇非其人必藏之靈府何者心無常規其變多方數無定象待感而應是故化行天竺緘之有匠幽關莫闢罕窺其庭從此而觀理有行藏道不虛授良有以矣如來槃未久阿難傳其共行弟子末由地末由地傳含那婆斯此三應真咸乘至願冥契於昔功在言外經所不辨必暗軌元匠孱焉無差其後有優婆崛弱而超悟智絶世表才高應寡觸理從簡八萬法藏所存惟要五部之分始自於此因斯而推固知形運以系廢興自兆神用則幽步無跡妙動難尋涉粗生異可不慎乎可不察乎自茲以來感於事變懷其舊典者五部之學並有其人咸懼大法將頽理深其慨遂各述讚闡禪經以隆盛業其為教也無數方便以求寂然寂乎惟寂其揆一耳而尋條求根者衆統本運末者寡或將暨而不至或守方而未變是故經稱滿願之德高普事之風原夫聖旨非徒令其長亦所以救其短若然五部殊業存乎其人人不經世道或隆替廢興有時則互相升降小大之目其可定乎又達部善變出處無際晦名寄跡無聞無示若斯人者復不可以名部分既非名部之所分亦不出於其外別有宗明矣每慨大教東流禪教尤寡三業無統斯道殆廢頃鳩摩耆婆宣馬鳴所述乃有此業雖其道未融蓋是為山於一簣欣時來之有遇感奇趣於若人捨夫制勝之論而順不言之辨遂誓被僧那至寂為已任懷德未忘故遺訓在茲其為要也圖大成於未象開微言而崇體悟惑色之悖德杜六門以寢患達忿競之傷性齊彼我以宅心於是異族同氣幻形告疏入深緣起見生死際爾乃闢九關於龍津超三忍以登位垢習凝於無生形纍畢於神化故曰無所從生靡所不生於諸所生而無所生今之所譯自達摩多羅與佛大仙其人西域之俊禪訓之宗搜集經要勸發大乘宏教不同故有詳略之異達摩多羅闔衆篇於同道開一色為恆沙其為觀也明起不以生滅不以盡雖往復無際而未始出於如故曰色不離如如不離色色不離如則如是如不離色則色是佛大仙以為澄源引流固宜有漸是以始自二道開甘露門釋四義以返迷啓歸途以領會分別陰界導以止觀暢散緣起使優劣自辨然後令原始反終妙尋其極其極非盡亦非所盡乃曰無盡入於如來無盡法門非夫道冠三乘智通十地孰能動元根於法身歸宗一於無相靜無遺照動不離寂者哉曇鉢偈者衆經之要義曇之言法鉢者句也而法句經別有數部有九百偈或七百偈及五百偈偈者經語猶詩頌也是物見事而作非一時言各有本末布在諸經佛一切智厥性大仁愍傷天下出興於世開規道義所以解人凡十二部經總括其要別為數部四部阿鋡佛法世後阿難所傳卷無大小皆稱聞如是處佛所在究暢其說是後五部沙門各自鈔衆經中四句六句之偈比次其義條別為品於十二部經靡不斟酌無所適名故曰法句夫諸經為法言法句者猶法言也近世葛氏傳七百偈偈義致深譯人出之頗使其渾惟佛難值其法難聞又諸佛興皆在天竺天竺言語與漢異音云其書為天書語為天語名物不同傳實不易惟昔藍調安侯世高都尉佛調釋梵為晉實得其體斯已難繼後之傳者雖不能審猶尚貴其實粗得大趣始者維祇難出自天竺以黃武疑三年來適武昌僕從受此五百偈本請其同道竺將炎為譯將炎雖善天竺語未備曉漢其所傳言或得梵語或以義出音近質直僕初嫌其為詞不雅維祇難曰佛言依其義不用飾取其法不以嚴其傳經者令易曉勿失厥義是則為善座中或曰老氏稱美言不信信言不美仲尼亦云書不盡言言不盡意明聖人意深邃無極今傳梵義實宜徑達是以自偈受譯人口因順本旨不加文飾譯所不解即闕不傳故有脫失多不出者然此雖詞朴而旨深文約而義博事均衆經章有本故句有義說其在天竺始進業者不學法句謂之越序此乃始進者之鴻漸深入者之奧藏也可以啓蒙辨惑誘人自立學之功微而所包者廣實可謂妙要也哉昔傳此時有所不出會將炎來更從咨問受此偈等復得十三品并校往古有所增定第其品目合為一部三十九篇大凡偈七百五十二章都凡一萬四千五百八十字庶有補益其廣聞焉昔我祖師元始天尊大慈悲憫廣濟㣥生歷劫度人先天立教隨方應物不拘於三境九泉布化流形豈限於人間象外自龍漢淳古之世教之以大乘逮延康朴散之時授之以中法大乘則無為無事任物自然中法則有怠有勤因機善誘洎開皇以後赤明乃還俗變澆漓人隳真素忘緣棄本溺性迷情背妙有之元功失自然之奧旨由是方諸闕下多虛青簡之名酆都臺中益盛黑書之目淪謝者崇朝接轂升騰者千載比肩大軫聖慈遽茲開度所以三元品誡四極明科三洞四輔之經隱地藏天之籙女青元都之律八瓊九鼎之文金真八極之書鳳㤅龍章之篆柔金水玉之法開明震靈之符五老策精之文八海登真之篆大劫洪真之札靈寶召龍之篇正一救世之章洞神開山之印上清八景之訣元真曲素之辭太平左右之圖洞元智慧之品乘蹻躡虛之術攀魁據斗之罡或檢制身心或蠲消罪垢或吞芒餌景或鍊氣胎元或封山召雲或坐忘遺照開萬塗而汲引垂衆法以提攜欲令抱識懷生皆登道岸豈止簪星佩月獨詣仙庭乃出三五章儀河圖醮法拜表上章之訣罡風驛騎之司凡居世間有所謄奏即日月主者里域真官乘彼驛龍聞於天闕雖上天敻遠下土卑凡感而遂通靡踰瞬息矣斯則大道救物巨細無遺請福祈真齊法為大齊有二十七等備在三洞經中則三洞各九品齊也內黃籙齊者遐福㣥有廣救三塗報應之期影隨響答古今所驗實繁其人然以精專為先龍綵為上香煙虔潔抑又次之苟有一闕亦齊之瑕玷也修奉之士得不慎哉且黃籙之法拯度既多君臣通修人天普福隨其所為理趣多門又經云三洞布化遍滿人間行道修齊因宜立教人間天上久矣流行若帝王國主人民土地一切衆生有諸災厄應當消却召諸道士以及女官或多或寡廣立瑤壇懸諸幡蓋散花燒香然燈照夜行道禮懺晝夜六時勤勤不息克獲靈應福德普臻經曰黃籙者開度億曾萬祖先亡後化處在三塗沈淪萬劫超凌地獄離苦升天救拔幽魂最為第一此經隨世所求即可修設或三日或七日一時九時奏簡馳誠上天無不御達靈寶者是大道之根宗元始之妙化虛無挺秀劫化自然隲配陰陽區分造化保安帝祚鎮護天民握運璇璣恢宏妙旨總五帝大魔之法召萬天合元之司濟度存亡統隸三界按梵㤅而為符篆敷奧義而作隱章祕在蘂珠之宮禁於華堂神府諸天至重萬劫一傳遵奉明科俯仰有格非宿生之大慶豈造次以能聞得遇進修實為際會可以召靈㤅於三關靄寶華於九戶功滿德就位列仙翁起死回骸歸真返本人天欽仰變用無方招真召靈洞該三道所謂巍巍大梵萬法度人之上品者也謹序元始祖劫為天地之根宗靈寶開圖總陰陽之樞紐推日月變通之理統星罡躔度之機妙集璇綱提攜子午還五行之造化追三㤅之魒魁進退乾坤飛旋離坎擒龍伏虎控鳳乘鸞朝餐紫府之英暮食青華之液煉形流火灌質東池六龍飛蹈於層霄九㤅攢烹於玉鼎道之生闕一字我無定為棄物流形則氣神交而真自徹釋情養浩則精血通而氣自凝真火高奔飛扶邱之皎日水金拘制旺玉闕之蟾蜍八鸞同鳴讚空歌之雅韻九鳳齊唱揚十絶之元音俯仰靈阿十方之天真自集朝參太上萬靈之羽衛飛軒黍米高懸變通莫測包含虛昧則無鞅數衆咸歸濁競奔趨則萬㤅千真盡散集㤅為寶聚神為靈乾健純陽坤柔陰質自然之㤅無形無名上極九清以㤅假名為號下徹九地以形別號為名是知杳杳冥冥恍恍惚惚寂然不動感而遂通二㤅回旋隨天地應時而動三田通妙感陰陽轉氣而為靡在他施何勞自逸存神叩齒警初真入道之門鍊氣書符明學士守規之式欲餌吞於九轉當造物於四時回運周天交媾水火烹金鑄鼎鍊石補元盜日月之英華結神真之鉛汞先明子午次辨水金進退抽添知時適候溫調養育烹鍊無差勿殺害以欲貪勿嫉妬以淫盜遠憎去媢異骨成親濟度天人闡教凡世通元究微悉章洞慧束魔郤惱斷六根障塞之源捨妄從真滅五苦輪回之戶拘魂制魄養㤅藏神身有光明形無影響開明三景離合自然高宴鬱羅萬劫蕭臺聳冠飛升金闕玉山絶境逍遙飛駕瓊輪十㤅飛天自現控乘緑輦諸天五老傾光疾除罪簿之因落滅惡根之道妙乎茲法故品諸經提悟迷荒救攜未悟吾昔遇清微丈人授以二氣吐納次遇於元皇玉帝賜以金丹訣言明天地權輿之數了陰陽生殺之機衆卉百花盡守根而固蒂奇禽異獸咸抱一以含元故知顛倒五行翻覆四象盜元一飛元之㤅守真精妙體之英建寶鼎於崆峒飛金晶於靈洞媾內外之水火合上下之刀圭元㤅周流感元黃而元珠光耀包藏宇宙含金丹而資用無窮是知天地之獨尊變化之無形無質乾坤之妙道生死之無始無終道勿遠求不出戶牖親之者鮮遠之者多棄本妄真甘樂忘於泉壤入邪於正徒度夏以經冬靜以生強安而思極七情鼓扇陽絶陰化而性命危六欲觸耽精散形離而神氣泯五臟搖蕩九竅開關靡知性命之端奇偶相配何明造化豈辨元機吾豈大慈願提仙子將茲神氣集號元章故名靈寶之筌蹄以應真經之內法付於妙行出世度人化現十方名號非一編諸經典遍滿恆沙句句為元頭頭是道悟茲妙理則出生入死而與道俱存了此真機則離合自然而去來無礙遇之者夙生仙骨行之者纍世慶緣誤謫人天慮差覺路指明圓定證悟法門行道祕藏了真可度謹序夫形之所恃者氣也氣之所依者形也氣全即形全氣竭即形斃是以攝生之士莫不鍊形養氣以保其生未有有形而無氣者即氣之與形相須而成豈不皎然余慕至道備尋祕訣自行氣守真向三十餘載所聞所見殊未愜心大歷中遇羅浮山王公自北嶽而返倚策高昂依然相顧余奇其人延之與語果然方外有道之君子也哀余懇至見授吐納須一二理身之要道其恩罔極非言詞所能盡每云道之要法不在經書悉傳口訣其二景五牙六戊諸服氣法皆為外氣剛徑非從中之事所能宜服也至如內氣已正是曰胎息身中自有非假外求不得明師之口訣徒為勞苦終無所成今所撰録皆承師之旨要以申明之諒非愚蒙所自裁王公嘗謂余曰老君云我命在我不在天地又曰吾與天地分一氣而自理焉天地焉能死吾哉斯實真言要訣也修奉之士宜三復之恭承誘訓敢不佩服有偶時得此訣者須慎勿輕傳示無或泄露以致其殃耳無能子豫忘形友也少博學寡欲長於窮理盡性以至於命黃巢亂避地流轉不常所處凍餒淡如也光啓三年天子在褎四方猶兵無能子寓於左輔景氏民舍自晦也民舍之陋雜處其間循循如也晝好臥不寐臥則筆札一二紙興則懷之而不余示自仲春壬申至季春己亥盈數十紙卷而囊之似有所著者豫竊得之多記所傳所見或嘗與昆弟朋友問答之言其旨歸於明自然之理極性命之端自然無作性命無欲是以略禮教而外世務焉知之者不待喻而信不知者能無罪乎余因析為品目凡三十四篇編上中下三卷自與知之者共之爾豫蓋具審無能子行止中藏故不述其姓名游宦焉
