front:
  text: 全唐文欽定全唐文卷六百五十八白居易三
  hash: sha256:ee21bff475942b63fc8b99056e59ec7c785daa709fbc1988f149894df0c63b9c
body:
  text: 敕某官某頃以齊寇發狂王師致討武寧裨將五十八人雖有元戎指蹤制勝實由衆校同心許國合力成功宜以憲秩儲寮寺卿府監舉申賞典用益勳庸可依前件敕故某官男等淮寇之起爾陷其中能守父訓不失臣節竟遇蠆並為鯨鯢葵將死而心傾劍雖埋而氣在毒延禦侮禍及維私將賁幽魂宜追寵命俾贈青宮之秩用伸赤族之寃可依前件敕羽林所設上法星文軍衛之中號為雄重稱茲選任不易其人左驍衛將軍王士則勳戚之家義方之子發身學劍餘力知書早踐班榮纍參環列職近而身彌檢慎任久而心益恭勤卑以自居勞而不伐况一備禁衛四為偏將滯於久次宜有超升俾領上軍仍遷右廣統良家之騎士訓期門之材官寵任不輕無墮於事可右羽林軍大將軍敕某官李季立蕃國通聘使臣告行上請屬寮同役王命以爾嘗為令長頗有幹能加之恪恭可備選擇假威憲職兼命邑丞足示優榮勉勤任使可依前件敕博野鎮都虞候殿中監李懷金等戮力戎行叶謀王事既展捍城之效彌章奉國之心不加寵榮何勸忠勇敬授爵命勉思令圖可依前件敕前代州刺史代北軍使王日吾聞任有才則事集獎有勞則功勸以日嘗為代守軍睦人安旌效所能可居要地是用超登階級遷領郡符勵精一意其聽吾言夫主憂則臣勞時危則節見今寇戎暴起封域未寧是忠臣奮奇謀烈士展殊效之日也朝立功而夕受賞汝其念之哉可德州刺史敕前大理丞薛元賞甸服之制也署以尹正承以令長上下有統而理化行焉以元賞前為廷尉丞察獄平刑頗聞敬慎寺卿奏課邑宰缺員故移欽恤之心使布惠和之化上承而長下字吾人無或越思而乖統理可華原縣令敕安陸古鄖國也介荊漢之間承軍旅之後宜得謹良長吏以養理之也前相州刺史王承林比刺安陽勤修其職録勞獎善故申命焉况爾生勳伐之家早階寵祿宜自修立以光大其門爾當思勤儉以檢身務廉平以臨下率吏用禮勸人歸農勿傎勿佻一遵吾之約束可安州刺史敕東朝保傅歷代尊榮漢擇名儒任先疏廣晉求耆德選在山濤實資六傅之賢用宏三善之道檢校司徒兼太子少保嚴綬文雅成器恭謙致用出領重鎮以帥諸侯入為具寮以長卿士歷踐中外備嘗艱虞殆三十年勤亦至矣况理心以體道知命而安時是謂教誨之人可領調護之任由保遷傅爾其敬之可太子少傅敕義成軍節度判官檢校兵部員外源寂早膺慰薦纍展才能謀畫有終恭勤無怠守臣推善列狀升聞可使束帶立朝廷曳裾遊藩邸俾從賓佐入補王官敕鄭滑觀察推官試太子通事舍人鄭枋名列士林職參軍府修身無闕從事有勞既展效於即戎宜試能而補吏俾之劇邑庶有可觀可依前件敕權知巴州刺史喬辨前假竹符俾臨巴郡一意為理三年有成州人借留廉使置奏既因會課宜及陟明九仞之功無虧一簣無狃真授而怠初心可巴州刺史敕夫有名於時有勞於國盡忠以事上遺愛而及下則必生享寵祿歿加褒崇所以旌善人而勸來者故浙東觀察使越州都督兼御史中丞薛戎挺英於冠族擢秀於士林凡踐官榮皆著聲績及授符節委之察廉自江而東政成人乂老而將智病且知終方覲闕庭忽捐館舍是用廢朝軫念加賻申恩俾增九原之光追備八貂之列可依前件敕趙州臨城縣令辛辨文既有英材又知臣節遁逃寇難奔走道途言念忠勞宜加恩獎俾換銅墨移宰長山可依前件敕鹽鐵官漕運職小大遠邇羅布於四方自丞相播兼領以來而撮大綱核㣥吏職以能進秩由課遷法無僣差人有懲勸今蒙台克恭操等咸當自舉分命以官勉副知巳無忝成命可依前件敕沂州刺史御史大夫王智興李願李訴之鎮武寧也汝為裨將勵節忘身濟成大功汝實有力獎其成效擢授郡符海沂之間又著聲績宜加新命以寵舊勞仍提鋭師往副戎律夫將之撫衆如子弟則衆之視將如父兄苟推赤心而無疑必蹈白刃而不悔勉親士卒佇翦寇戎可依前件敕前左武衛將軍田㣥忠謹立身韜鈐嗣業自參戎衛尤見恭勤而燕薊之間澶為要郡公侯之後㣥有令名俾分符竹之榮佇濟弓裘之美宜奪情禮起而用之敕大孝存乎始終殊恩被於幽顯追榮之命安可廢耶戶部尚書楊於陵亡祖母崔氏等風範有初光塵未昧發揮婦道標表母儀施及孝孫陟於高位夫蘊德者垂裕於後揚名者光昭其先俾彰積慶於中故許推恩而上各從寵贈用顯貽謀可依前件敕朝議大夫守衛州刺史兼御史中丞邵同寵在專城職當守土不承制命擅赴闕庭違越詔條叛離官次將懲慢易宜舉憲章可連州司馬仍馳驛發遣敕朝議郎守原王府長史上柱國賜緋魚袋鄭公逵衆推士行時許吏才自列班榮尤彰恭恪夙夜匪懈春秋巳高宜罷曳裾之勤往贊坐棠之理是為優秩用答令名可守陜州大都督府右司馬散官勳賜如故敕朝議郎前行內侍省內謁者監上柱國賜紫金魚袋劉泰倫古者有中涓謁者皆侍奉親近之臣也今之寵秩亦由舊焉况泰倫有行藝可以飾身才幹可以掌務監臨內署朝請中闈謹密端和甚宜厥職久於其事無之實難宜加進秩之恩仍舉奪情之典勉承獎任勿替初終可起復朝議大夫行內侍省內謁者監敕前徐泗濠等州觀察支使朝議郎殿中侍御史內供奉上騎都尉賜緋魚袋王師閔朕以師律授智興智興以軍書辟師閔才既為知巳用官不俟滿歲遷所以使能而責理也然則贊廉察安戎旅既命之後吾有望於爾焉勉副所從佇展來效可檢校尚書水部員外郎兼殿中侍御史充徐泗濠等州觀察判官勳賜如故敕三品子薛從惟汝父平守吾藩鎮能以忠力殄寇安人酬庸既以啓封延賞亦宜及嗣勉承義訓無忝寵章可朝散郎行右清道率府倉曹參軍敕古者賞不逾時所以勸勳庸也爵有加等所以激忠勇也而某官高從政等以義武之師統晉陽之甲前蹈白刃中推赤心大摧賊徒連告戎捷超榮速賞爾實當之故視軍功遞遷憲秩破竹之勢其思有終可依前件敕春秋崇褒善之義國家厚追榮之寵其身歿而名不殞時去而恩未及者大司馬得稽勳籍舉而行之故某官某等凡十二人按狀徵書宜加寵命飾終之典其可廢乎可依前件敕義武軍節度都押衙兼侍御史段斌衙前虞候檢校太子賓客宗惟明等寇虞未平將校方用宜以爵賞勸其忠勞而斌奔命獻俘惟明奉章告捷各勤乃事咸造於庭並加寵榮以示優獎斌可試太僕卿依前兼侍御史惟明可檢校大理卿餘各如故敕故某官楊冠俗貽厥孫謀垂裕後世揚其祖美不忘先也以冠俗之棲遲下位道屈於時以於陵之光大其門慶鍾於後生不逮事歿有追榮宜加義率之心用舉飾終之典可贈吏部郎中敕故某官某國老之子藩臣之兄嘗列棘以承家竟懸車而捐館生加爵寵歿及褒榮茲惟舊章用慰幽穸敕古者有策名命婦賜號夫人蓋積善於閨門而受封於國邑也澤潞節度使劉悟妻馮氏傳芳茂族作合良臣成此忠貞之功因於輔佐之力禮從夫貴慶叶家肥俾開大郡之封以正小君之命可封長樂郡夫人敕某官某等早稱武藝久隸軍麾稟命元戎服勤王事或千里移鎮從為紀綱或十乘啓行倚為肘腋綿歷年月積成勤勞不加寵榮何勸忠效並命憲職宜敬承之並可兼侍御史餘如故敕乃者魏亠兊二帥以田夷吾曹璠善屬文貢置闕下有司奏報明試以詩五言百篇終日而畢藻思甚敏文理多通賢侯薦延宜有升獎因其所貢郡縣各命以官而倚馬爰來衣錦歸去以文得祿亦足為榮可依前件敕某官崔蕃等咸因文行自致班序或佐衛蘭錡或典校蓬山各從所知將展其用夫司牧坰野備禦都畿所以班馬政而遏寇虞也茲皆重務爾勉贊之可依前件敕封爵之設在乎賞勸有以褒德有以序勤聳善興功實由茲道而某官李訴等或望崇台鼎或委重旌旄爰及藩條共分憂寄有勞於事無怠於心宜疏爵以啓封許推恩而及嗣祗受厥命永孚於休可依前件敕故某官杜羔生於仁族發為公器敦厚孝友本乎天性文學政事出於餘力自立朝右藹然素風司諫平刑駁議廉問凡所踐歷不懈於位以年致政以疾就第出處進退皆叶時中遽此淪謝惻惻興念夫生有榮祿歿有寵贈所以極君道厚時風亦聖人有始卒之義也宜追端揆以申褒飾猶有精爽知吾不忘可贈尚書右僕射敕某官劉悚夙負氣概早習騎射才推燕趙之士學究孫吳之書加以忠厚可當任用况有令弟為吾信臣節著艱貞情鍾友愛夫寵寄於外莫重於藩垣委任於中莫親於禁衛加此一職寵示二人豈不為榮季出叔處可左驍衛將軍敕某官劉令璆勳伐之家弓裘之嗣嘗修戎職亦領郡符逮此遲暮知有止足夫壯而奮發以忠事國老而知退以道安身人所難能理宜嘉尚俾超崇秩以寵高年可工部尚書致仕敕幽州節度判官盧衆等幽薊重鎮盧龍舊軍是吾北門委在上將實資寮佐以濟謀猷爾等或參務戎旃或專司奏記俱因事任各展才能而御史府官廷尉寺吏用申褒獎以勸忠勤勉奉元戎佇成嘉績敕盧龍軍押衙兵馬使什將隨軍某等夫爵賞行於上則忠勞勸於下有國之典其可廢乎吾思薊首將及吏合聚衆力鎮寧一方綿以歲年積成勤效令以朝右貴秩言坊清班舉為寵章用申酬獎敕盧龍軍節度要籍梁璲等咸以幹能早膺任使各參軍要同濟戎功言念恭勤宜加優獎郡掾邑佐分而命之仍兼舊職勉申來效可依前件敕渤海王子舉國內屬遣子來朝祗命奉章禮無違者夫入修職貢出錫爵秩茲惟舊典舉而行之敕石士儉東川帥涯上言士儉久習武藝兼通吏事可使為郡責成其功吾聞江油巴夷雜處勿以遐陋而忘緝綏奉法愛人無負知巳可龍州刺史敕韓萇局分六尚職奉七輦茲惟優秩列在通班以爾立身頗恭守事甚謹宜有所獎可升於朝可尚輦奉御敕孟存嘗參劇務亦牧疲人咸有能名得於主帥三蜀征鎮屯於成都雖有忠賢委為尹正至於贊修庶務通統諸曹承而二之實資亞理勉勤厥職無纍所知可成都府少尹敕中書舍人杜元穎等有位於朝有勞於事不加慶賜何勸恪勤宜各策名列於勳籍可依前件敕某官某等夫勳者所以馭貴敘勞亢身庇族非因大慶不降殊恩爾皆委質從軍服勤事國宜按勳籍分而賜之可依前件敕楊志和等咸分要職列在內司慎靜檢身恭勤守事宜以章綬命為大夫佩服寵光爾無失墜可依前件敕內常侍趙宏亮等列名禁籍祗命宮闈多歷歲時積成勞效宜加勳賞以洽恩榮可依前件敕烏行初重允之子早稟義方詩禮弓裘式聞不墜賞延之典本勸忠勳環衛之官兼資慎擇非唯久任亦以才升可佐衛曹參軍敕古者夫為大夫則妻為命婦况在小君之位未加大國之封豈惟有廢徽章抑亦無勸忠力也某官某妻某氏以鳲鳩之德作合邦君輔成勳猷馴致爵位雖從夫貴未授國封今以南陽本邦善地錫為湯沐加號夫人茲乃殊榮足光閨閫可封鄧國夫人敕朕嘗思鎮冀之間弔伐之際有仗順死義不吾聞者因命宏正列狀以聞而某官王怡等頃陷艱虞思伸忠效或名節將立併命於幽憂或義烈臨奮失身於戮辱履危如虎尾視死如鴻毛若無褒揚何勸天下既降飾終之命仍加身後之禮追崇延寵有越常倫冀使死節之魂忠憤之骨知我憐憫歿無恨焉怡可贈左僕射序可贈給事中敕王師之討蔡平鄆也自明為武寧裨將隸於元戎凡所指蹤必先致命三軍之士於今稱之有勞未圖無祿早代生不及賞歿而加恩庶使猛將義夫聞而相勸曰死猶不忘况生者乎可贈濠州刺史敕前度支河北榷鹽使朝議郎檢校尚書刑部郎中使持節貝州諸軍事兼權知貝州刺史侍御史充本州防禦使上柱國賜紫金魚袋裴宏泰九土之貢百品之貨辨其名物謹其出納常在外府統以上卿宜求幹敏之才以為之二而宏泰頃分榷務兼撫郡民當軍興之時法行政立則受藏之府事繁物殷量其器能可以專委勉膺是任無替前勞可守太府少卿知左藏庫出納散官勳賜如故敕通議大夫使持節儀州諸軍事儀州刺史兼御史中丞上柱國李昌元弓裘令子疆場勞臣能讀父書甚識戎事每在戰陳未嘗無功及委藩條亦聞有政而知臣者君也賞勞者爵也亞相之秩威重寵崇加乎爾身以勸能者可兼御史大夫敕正議大夫前檢校右散騎常侍使持節洺州諸軍事兼洺州刺史御史大夫充本州團練使上柱國賜紫金魚袋田潁自別屯將壘專領郡城而能勤恤師人與之勞逸故臨戎則士樂為用撫下而衆知嚮方忠勳既彰能政亦著牧守之選吾所重之譙酇之間人亦勞止授爾印綬往勞來之宜推前心佇立後效可檢校右一作左散騎常侍使持節亳州諸軍事兼亳州刺史御史大夫本州團練使鎮遏使散官勳賜如故敕某夫人某氏等始播婦儀終垂母道教其令子為我良臣皆茂著才名榮居爵位永言聖善宜及顯揚俾追啓邑之封式表統家之訓可依前件
