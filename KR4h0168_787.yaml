front:
  text: 全唐文欽定全唐文卷七百八十七成式字柯古宰相文昌子以蔭為挍書郎累遷尚書郎出為吉州刺史終太常少卿
  hash: sha256:19b4645d50150f9e55415a1cd841b04eb299356bda30de9b71df7effcd51ed4c
  markers:
  - {type: head, offset: 14, content: 段成式, id: KR4h0168_NFKB_787-h1, level: 1}
body:
  text: 竊以孝經援神契夫子搢之以拜北極尚書中候周公授之以出元圖其後仲將稍精右軍益妙張芝遺法庾氏新規其毫則景都愈於中山麝柔劣於羊勁或得懸蒸之要或傳痛頡之方起自蒙恬葢臻其妙不惟元首黃琯之製含丹纒素之華軟健備於一牀雕鎪工於二管而已跗則大白麥穗臨賀石班格為仙掌之形架作蓮花之狀限書一萬字應貴鹿毛書紙四十枚詎兼人髮前寄筆出自新銓散卓尢精能用青毫之長似學鐵頭之短況虎僕久絕桐燭難成鷹固無慙兔或增懼足使王朗遽閣君苗欲焚戶牖門墻足備其闕也桐鄉往還見遺葫蘆筆管輒分一枚寄上下走困於守拙不能大用濩落之實有同於惠施平原之種本慚於屈轂然雨思茶器愁想酒杯嫌苦菜而不吟持長柄而為贈未曾安筆却省歲書八月斷來固是佳者方知綠沈赤管過於淺俗求大白麥穗獲臨賀石班葢可為副也飛卿窮素緗之業擅雄伯之名沿泝九流訂銓百氏筆洒瀝而轉潤紙襞績而不供或助操彈且非玩好便望審安承墨細度覆毫勿令仲宣等閒中詠也成式狀近集仙舊吏獻墨二挺謹分一挺送上雖名殊九子狀異二螺如虎掌者非佳似兔支者差勝不思吳興道士勿遇因取上章越王神女得之遂能注易但所恨雞山松節絕已多時上谷槲頭求之未獲也成式述作中躓草隸非工惟茲白事足以驅策詎可供成塚之硯奪如椽之筆乎昨獻小墨殆不任用藉棖之力殊未堅剛和麰之餘固非精好既非懷化所得豈是筑陽可求況某從來政能慚伯祖之市果自少學業愧稚川之代薪飛卿掣肘功深焠掌闕倦齊奮五筆捷發百函愁中復解元嘲病裡猶屠墨守闕十字承訊忻懌兼襟莫測詖辭難知古訓行當祇謁條訪闕疑昨更拾闕四字之餘自謂無遺策矣但愧井蛙尚猶自恃醯雞未知大全忽奉毫白復新耳目重耳闕徹闕三字生慙張奐致闕研味難盡詎同王遠術士題字入木班孟仙人噴墨竟紙雖趙壹非草闕十五字肝膽將破翰荅已疲有力負之更遲承問赫日初昇白汗四匝愁議墨陽之地嬾窺兼愛之書次復八行盈襞交互訪伏牛之夜骨豈望登真迷艮獸之沈脂虛成委任更得四供晉寢五入漢陵隱侯辭著於麝膠葛元術成於魚吐寧止千松政染三丸可和僧虔獨擅之才周禺自謂無愧而已支策長望梯几熟觀方困九攻徒榮十部齊師其遁詎知脫扃藍染未青元嘲轉白責羝羊以求乳耨石田而望苗殆將闕膓豈止憎貌猶記烟磨青石黛漬闕書施根易思號介難曉蘇秦同志傭力有而可題王隱南遊著書無而誰給今則石流琅硯光滴彩毫腹笥未減初不停綴疲兵怯戰惟願降飛卿慱窮奧典敏給芳詞吐水千瓶有才一石成式寸紙寒暑素所不閑一卷篇題從來葢寡竊以墨事故有巾箱先無可謂附騏驥而雖疲遵繩墨而不跌者忽記鄴西古井更欲探尋虢略鏤盤誰當倣效況又劇間可答但愧於子安一見之賜敢同於到惲乎陣崩鶴唳歌怯雞鳴復將晨壓我軍望之如墨也豈勝闕居懾處之至韞牘遍尋緘筠窮索思安世篋內搜伯喈帳中更覩沈家令之謝箋思生松黛楊師道之佳句才發煗華抑又時方得賢地不愛寶定知灾祥不兩誰識穹昊所無還介方酬鬱儀未睨羽驛沓集筆路載馳豈知石室之書能迷中散麻襦之語獨辨光和底滯之時徵引多誤殫筆搦紙慚怯倍增問義不休攬筆即作何啻懸鼓得槌也小生方更陪鰓尚自舉尾更搜屋犬得復刀圭因記風人辭中將書烏皁長歌行裡謂出松烟供椒掖量用百丸給蘭臺率以六石棠梨所染滋潤多方黎勒共和周遮無法傅元稱為正色豈虛言歟飛卿筆陣堂堂舌端亠兊亠兊一盟城下甘作附庸夫度朔司刑可以知其情狀葆登掌祀將以著於感通有生盡幻遊魂為變乃聖人定璇璣之式立巫祝之官考乎十煇之祥正乎九黎之亂當有道之日鬼不傷人在觀德之時神無乏主若列生言竈下之駒掇莊生言戶內之雷霆楚莊爭隨兕而禍移齊桓覩委蛇而病愈徵祥變化無日無之在乎不傷人不乏主而已成式因覽歷代怪書偶疏所記題曰諾臯記街談鄙俚輿言風波不足以辨九鼎之象廣七車之對然遊息之暇足為觀覽一作鼓吹云耳在世間攘巨寇必思衽金浴鐵強矯雄毅者雖空門亦忿怒鏖撲為法大防也據內典下天處蘇迷盧之半為忉利尉候北方毘沙門統藥义眾所治水精宮城護世其住處曰紛陀利曰質多羅曰七林曰摩偷曰如意等下壓象跡當歡喜之地上接蜂歌雜莊嚴之境常憍尸迦將破怨敵聖者奪勇健臂出甲冑林獨揭勝幢不頓一㦸輕足迦婁而垂翅捘修羅而束手猶怒折蓮柄狂搜藕絲葢多聞位居初地離十二失故經云毗沙門得方便救護之門昔縳喝伽藍北虜感夢而懺悔近于闐聚落西羌覩相而來降其威神營衞肹蠁靈應事無虛譯世不絕書相傳北方天王與瞻部有緣謂西域瞿薩國本天王棲神之處也廬陵龍興寺西北隅先有設色遺像武宗五年毀廢至大中初重建寺其處為僧乾立所居乾每讇囈不安旬日方晤遽徙他室昉誓造化方變請押衙熊略為導首輅遂與執白籌者郭宣熊師佐等縱臾閭伍為說第一施結增上緣獲零憏貨貝共二十萬輅厚自損徹周歲功就乃多聞儀形嚴毅如生睂結雲聚目稜電擊猛焰彗肩蚑蜂搶軒金塗錯落而燐亂形彩陸離而芒角得工巧明矣其或夔魖蠱亻刺瓜見是不翅擊三屍磔五冢也及素天女主藏神凡四四事堂內三壁寫載部落雷公拗怒忖留惡覷吁可畏也吉之人香火徼福林篿乞靈福既據我靈詎乏主噫予曾閱正法念經說摩䤈陀山六齋日四天於此會計閻浮提善業豈容不歸敬與輅為學性端介敏辯王公多伏之復晤禪那宗要得總持契訣常持北方真言大中三年病且死忽夢天王操㦸卓地有泉迸射摶之及面因驚覺汗洽而愈十二年洪州狂賊盜兵殺吏尋定州差輅上府至新塗夢天王支塑張目曰世途若此爾欲何往即宿留數日賊毛鶴果膾肝飲頭尢恣殘酷其踐較著如是十三年秋予閑居漢上輅為交趾使入京請予紀釋氏事以上事請予明張北方故實焉大凡非境之望及吏無著績冒配於社皆曰淫祠然肸蠁感通無方不測神有所臚鬼有所歸苟不乏主亦不為厲或降而觀禍格而饗德能為雲雷誅殛姦兇俾苖之碩俾貨之阜緤魃籍虎磔蝮與蠱可以尸祝者何必著諸祀典乎縉雲郡之東南十五里抵古祠曰好道詢於舊云置自後周莫詳年月好溪本曰惡溪時有陳氏子失名嘗任永嘉長史秩滿北歸卒於溪陰意乎骨青獨勇目紫方視負垂冠之一敵恥結綬於千石齎志就木竟不呼醫豈泰山伍伯敦道而行昊天藏吏請告而返何魂不歛於秋柏氣不散於焄蒿若伯有見怪據傳巫語是時陸擅蛇虎水制蛟螭道茀路絕一境相恐吏民始為建廟木人長史徒儼衣冠桐郎諸侯未加印綬州內昉定畏塗坦夷安流漣漪遂名溪曰好溪路曰好道里人因以署廟焉計其歲月踰六甲子矣廟據水之陽有堂一區連甍四注庭幅甚圖像偶像觀怪多駭繒罩旋風楮錢流蘇馬竊銜而欲蹀犬搖鋂而欲嗾神狀憑怒幘而褒衣讋伏寇厲政在阿堵其匡床古媛荅皿南帝女郎也萱支紡績狎十巫之語言甘羅伯求遵五路以巡邏闔境畢事咸若戶到致敬不瀆徼福有徵豈同度朔地衰蔣山靈歇予大中九年到郡越月方謁至十年夏旱懸祭沈祀毒泉亹石初無一應始齊沐詣神以誠附篿一擲而吉其日遠峰殷雷犯電焮雲半夜連震大雨如瀑自一更至二更中如散絲遲明稍止溝塍湧汎斥鹵沈淖信宿又作梓潼之祠納著王門之廟輸石㬱事豈虛傳歟以後涉旬不雨田無蔭者復懼再命大將鄭達一杯直祝來日雨一時陰一夕田苗斗長其長隱隱稻巨葆禾長稠菽多旋麻疎節農夫大慶乃撰日而祭焉標二牲首杳列方丈參乎捨稌捐黍徹犬以魚乾松陽之鮝映石亭之魚日工蟹螯制虫額備海錯之珍三菁七葅殫陸毛之品酹泥九醞瀝溜十漿伐鼓交符笙竽狂會巫忽嚏云神大喜因效神軒渠焉手又為迎神曲著辭七章俾優巫踏之予學儒外遊心釋老每遠神訂鬼初無所信常希命不付於管輅性不勞於郭璞至於夷堅異說陰陽怪書一覽輒棄自臨此郡郡人尚鬼病不呼醫或拜饁墦間火焚褚鏹故病患率以釣為名有天釣樹釣簷釣所治曰吹曰方其病多巳予曉之不迴抑知元規忘解牛太真因燬犀悉能為禍前史所著以好道州人所嚮不得不為百姓降志枉尺非矯舉以媚神也因肆筆直書用酬神之不予欺大中歲在景子季秋中丁日建武宗癸亥三年夏予與張君希復善繼同官祕書鄭君符夢復連職仙署會暇日遊大興善寺因問兩京新記及遊目記多所遺略乃約一旬尋兩街寺以街東興善為首二記所不具則別錄之遊及慈恩初知官將併寺僧衆草草乃泛問一二上人及記塔下畫跡遊於此遂絕後三年予職于京洛及刺安成至大中七年歸京在外六甲予所留書籍揃壞居半於故簡中覩與二亡友遊寺瀝血淚交當時造適樂事邈不可追復方刊整纔足續穿蠧然十亡五六矣次成兩卷傳諸釋予予大中八年作留窮辭詞人謂予辭反之勝也至十三年客漢上復作送窮祝是年正之晦童稚戲為送窮船判筒而槽比籜而閭細枲纏幅楮飾木偶家督被酒請禳窮將酹地歌舞予謂窮曰予送非嚵崇歷慼循陰索隙膋葷瀹餅直脰涎瀝者非寒哭蔟燐敗衣網身惡覷牆間冷嘯淒辛者非嚇覡嗾巫欺癡嬈衰燼藪瀦泉擾押狐狸者噫有才歉升窄朘腸噦喀幾童其筆燥心汗滴以是而歿者去些有開卷數幅窒心妨目襲經攻史方寸日慼以是而歿者去些有議古酌今左淩右侵麓垤酒涔短淺不禁以是而歿者去些古之非人也張口沫舌指數於衆人人得而防之今之非人也有張其所違嚬慽而憂之人不得而防也豈雕刻機杼有淫巧乎言非有乎釋氏徒毗尼者雖不轍乎意地而形骸之外是釭是輻火宅煽爀羊鹿効駕亦各也視中夏聖人刑自墨數三千或由性戾將墨而之贖金也將贖而之盡衣慚懼也以至蹙芻視祫未嘗犯者信生於手鄉可約束至顏氏子也西方聖人設戒二百五十俾隄限身口徑出生死今言法者彀喉舌鏑鎧其人我性鏝戾垢不常澡雪近非延奘或不能孕業人天也言禪者失之理圯漸磴一念五位不及能者吾見其為泥人若射箭也至乎畛生死之流闑身口之岐其在毗尼乎國初有宣聲乎毘尼寂寂然將二百年有照公嗣焉大德號寂照字法廣族龎氏京兆興平人父詮灌鍾府折衝鎮於咸陽馬跑泉精祠母竇氏嘗夢禮掌塔既而有娠不嗜葷腴及產吮而不啼慜而始誰竇氏日滋善種福塍穎碩請介處不饁其夫許之塊然若居士之室太常之齊也雖蚖口於牀將蠚不觸遂同謁總持寺積禪師始具五戒大德隸執箑年昉七歲宇泰定者仡如顛白積公異之父即留為童俾勤汲煬不難辭別初讀法華經五行俱下次授維摩經俱舍論未終熱際腹三百幅衆號神童遂毀髮焉如匠之度木中若蠧蝎心入震火叩之其聲虛嘶為桴則速腐不能久持大廈故鼓地之桐大士之種也澗梓之腹大士之聲也荊氏之林大士之用也而猊弦號種一鼓殷然大歷十四年西明寺遇方等壇試得度隸於慈悲寺初肄四分勤不交睫即開講於海覺寺著名兩街後弋志於湼槃經起信論功汰六塵理混四生壞隄瀵激宗流于性或有墨守慢堞利喙三尺一被偈荅暗革埏範固毘耶比邱不足以解疑悔也貞元六年詔啟無優王寺舍利因遊鳳翔檀律學者從而響臻大德䂓䂓不怠處衆如表影惟直矣或珥多羅葉者鉢蒲萄蔓者不病面而鑑壁者染瓜而半月形者志慚由右門而出也十年春將夏于清涼山清涼山曼殊大士是司鱗長遊之不誠必有疾雷烈風大德胝趼膜拜終日不息見若白構而梁木散而缸虡乳剽於霓末㦸網栂於曦表其光大而綆直細而螢滴詭狀雲互瞥影電烻千變萬化不可窮極居山雪首者驚曰自有此山未有此相由大德行潔誠著也因屨及蔚州入到此山險如楞伽勢如喬陟楩檜駢植衢柯四布夏籟所及百儶苔色其下楬車夜千錦攣芊芊相傳云普賢地也大德望麓一禮五雲觸石越一年之太白復賓於虢止發會福慶寺往來於渭濱郿塢間十餘年後教授隴州稠林槎枿魔界日蹙時昭義劉公邕在普潤息女出家請大德具戒焉元和初舋鐘創鉅戚難跂及至三年於咸陽魏店立尊勝幢祈禠法界也其年功德使請住安國寺尋移聖容院俾二望僧主之錫二時服各隸七人大德一數也自長慶中寶歷末太和初皆駕幸安國寺大德導於前蹕儀容偈答不隔旒纊因詔入內夏於神龍寺太和二年來延唐寺數乎菩提怬乎禪冉洎七年冬季上弦而疾下弦而病將化之夕異香滿風體可折支其月闍維於寺北原僧年七十六僧夏五十七置幢於積祖師塔院門人神晏啟初紀日於幢其詞蔚然矣門人律大德智文其行唯肖門人契元駕說者也大德設臬元構心跡規矩若日出於湯谷至於昆吾是謂正中其徒化之賓賓然不差淨觸噫大德之去佛日虞泉矣門人興善寺實相上人惡俗決丸顝處塵外嗣師之志以成式腹笥三藏請詞其德銘曰汗汗元流導於港溝覺路垣夷羭麕其輈燧明厚夜業白東晷由之不懈二乘其軹惟宣斯述惟寂斯紹傴盭樛枉影直其表性苦擢筠貌寒聳冰珠數絕貫衣持壞塍志完海囊為正法朋隄防意地林猨不騰薝蔔惟嗅多羅不斷鳴癡翼慧無明破卵燼其業茀弦厥乘緩駛絕中流平漚抉潬一雨濯枝嵐飇鼓翰偈古雲碧庭秋桂丹㣥木繩方衆景圭端資糧趼跣長途僅半翛然而往慧曦晼晚卯樹螬實柰萎霜苑甚垢斯濘衆縛斯蠒覺源昉醮大宅災燀迪豪詎昏品蓮詎凋行著高石劫窮不消韋斌雖生於貴門而性頗厚質然其地望素高冠冕特盛雖門風稍奢而斌立朝偘偘容止尊嚴有大臣之體每會朝未嘗與同列笑語舊制㣥臣立殿庭既而遇雨雪亦不移步於廊下忽一旦密雪驟降自三事以下莫不振其簪裾或更其立位獨斌意色益恭俄雪甚至膝朝既罷斌於雪中拔身而去見之者咸嘆重焉斌兄陟早以文學識度著名於時善屬文攻草隸書出入清顯踐歷崇貴自以門地才華坐取卿相而接物簡傲未嘗與人款曲衣服車馬猶尚奢侈侍兒閹豎左右常數十人或隱凡搘頤竟日懶為一言其子饌羞猶為精潔仍以烏羽擇米每食畢視廚中所委棄不啻萬錢之直若宴於公卿雖水陸具陳曾不下筋每令侍婢主尺牌往來復章奏常自札受意而巳詞旨重輕正合陟意而書體遒利皆有楷法陟唯署名嘗自謂所書陟字如五朵雲當時人多倣傚謂之郇公五雲體嘗以五彩紙為緘題其侈縱自奉皆此類也然家法整肅其子允課習經史日加誨督夜分猶使人視之若允習讀不輟旦夕問安顏色必悅若稍怠惰即遽使人止之令立於堂下或彌旬不與語陟雖家僮數千人應門賓客必遣允為之寒暑未嘗輟也頗為當時稱之然陟竟以簡倨恃才為持權者所忌
