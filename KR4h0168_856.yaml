front:
  text: 全唐文欽定全唐文卷八百五十六德潛漢乾祐三年官右補闕
  hash: sha256:8cc899747b5a3baad664db6a648beafb6629ed490fb78d9e0b500f72d766070d
  markers:
  - {type: head, offset: 14, content: 蘇德潛, id: KR4h0168_NFKB_856-h1, level: 1}
body:
  text: 臣聞道以至真為本自然為宗若不離嗜欲之源則安奏虛無之理況兩京道宮是國家崇福之地竊見道場所設齋醮無非蠲潔淨筵蓋表其精虔也訪聞道士皆有妻孥攜在道宮居止不獨傷於教法其實汙於清虛望特行禁止希顏漢乾祐三年官左補闕竊以久不簡田且仍舊額無妨耕稼雖知有勸於農民復恐不均於衆望三五年中時一通括兼以州縣遭水旱處比有訴論差使封量不宜便有出剩請今後差官能敷元額已不虧官凡出剩求功請不收附所以知朝廷愛民之意照物之仁守瓊漢乾祐時人官太子率更令沙門著紫比非佛門貴務奢華以邀名利諸處奏薦蓋出顏情以臣愚見不敢便望止絶每歲誕節前據所奏薦便令其身隨薦章詣闕令功德使召兩院僧官考試所業長短以行恩澤庶絶濫舉之門綸漢乾祐時人官司法參軍龍泉院者人天集福之所也耆舊相傳其來寖遠刊刻無寄因究權輿一説云是院之東十數里孤峯之上有黃砂古祠時有一僧莫詳所自於彼祠內諷讀金剛般若經一日有白兔馴擾而來銜所傳經文蹶然而前去因從而追之至於是院之東數十步先有泉時謂之龍泉於彼祠內而僧異之而感悟焉因結茆晏坐誓於其地始建剎焉同靈鷲而通幽類給孤而建號東鄰郭社之末前據金谷之垠既名額以來標稱郭谷而斯久至有唐乾寧初西蜀惠裁精舍稟律沙門諱順慜振錫東遊浮杯遠逝偶及是院遂欲棲心披荊榛而通過路啜薇蕨以事晨飧日往月來以近及遠歸依者如蟻慕唱和者若蟬聯雖云興廢有時亦繫方圓任器添棟宇於仍舊求柱石於他山紺殿故而復新雲房卑而更起曲盡其妙以廣其居漸加少而為多變其質而增麗凡增修新舊屋宇並正殿等共七十餘間其院東龍泉後面結菴之所三紀已前微認故迹今則湮沒矣且泉之所有時無能知者失其狀也噴湧而出喻虎眼射人鯨口詬沫通注遽盈於溝洫奔突若駭於風雷夏寒凝冰冬溫若沸比鏡澄徹同醴甘香不獨飲酌所須可以塵垢旋滌矣慜公運心匠磨智鋒俾令堰作方塘漲為澄沼且嘉魚成窟拋玉宛轉以隨人穢觸沉波吐珠淋漓而覆水有斯靈異甚警凡愚自邇及遐惟畏與敬而且植弱柳則扶疏而春媚蒔修篁則蓊蔚以冬青長小松為喬松接山果為家果功既崇矣景既備矣一日慜公諭諸門人曰是院也厥初住持所重幽僻止期課誦以盡年齡敢望崇修有若斯壯麗者矣吾聞空寂者正真之本名言者誘化之宗如來亦假於莊嚴氓俗漸歸於方便得不申請院額增飾教門者焉郡牧隴西公果俞革故之謀俾建即新之號因飛箋奏歲降敕文額記龍泉禪院矣時唐乾寧元年十月二十五日也澤郡之西封有屬邑命之曰沁水縣沁縣之東壤有屬鄉目之曰沁水鄉是鄉也山夾長川不竭朝宗之浪路盤重阻疑遊遁世之方其土多寒其民甚朴虧周孔之文化有唐虞之古風枲紵維修蠶桑蓋寡是川之左有山之形臥虎標奇偃月挺質俗以盤屈之勢指為車輞之山相踵傳之其來遠矣至後唐天祐十九年沙門詮公俗姓楊氏遁迹韜光處晦藏密靈草之本根不耀真空之妙理自明杖錫挈瓶尋幽採異因歷是山之下遂萌止足之心有近信檀越酒稹酒寶酒暉李安共減已有買郭武之山原勤請住持將崇梵剎與三縣巡檢使清河張公觀瞻林麓同玩茲山由是穿密林步纎草考以地志順彼物宜諒塵外之寶方葺雲棲之梵剎揭怪石而平溝壑除朽壞以基垣墻荊榛翦剃以四開鳥獸降伏而漸擾微鑿地脈遽湧寒泉旋撥雲根用通幽徑卒成蘭若以肅住持就以山名權為院號自是謂之車輞院矣詮公道惟敦實性絶浮華了知解脫之門勇進菩提之路不求事相寧愧鄙稱一入林巒八經寒燠至長興元年二月二十五日順化建塔於院之右門人義常靡辜法乳克荷師宗化導有方崇修益盛至後漢乾祐三年春攝當縣長內黃扈公一日從容而謂院主義常某慊是精藍闕以美號欲維新而改作免仍舊以多慚舉狀申州希重建額時太守彭城公特允勤請俾光教門以其年三月七日備僧俗禮儀螺具鼓吹迎請碑額懸挂大會聖凡之侶並本邑寮屬士庶以其日吉辰齋慶訖院主以余祖構是務翰墨為功爰託紀題以傳悠久矣瓊漢隱帝時兵部員外郎恭以高祖皇帝驅除戎虜救解倒懸德被生民功高邃古請依西漢祖宗故事於三京陜府許宋等州舊邸立別廟塑像以時禋祀以表遺愛易周廣順元年以尚書左丞為禮部尚書尚書省名曰中臺素稱會府列曹令式廢墜多年兩轄紀綱隳紊積歲或因貢一時之淺見破千載之通規遂俾廨宇類乎衡門官位等乎虛器若以權從改易應變弛張又未見國富時康家給民足禮記曰以舊防為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患伏惟陛下守文繼統宰輔戮力致君立太平之基創無窮之業其尚書省二十四司公事望準令式積漸施行所有唐末艱難巳來權立名目請皆停罷即守官有視事之方為吏無虛名之役咸休晉天福三年禮部郎中周廣順元年以給事中為左散騎常侍臣見前朝閩浙入貢物色下船之後官差腳乘搬送到京臣悉諳知害民尤甚比來貢奉自是勤王差擾貧民貢之何益以臣管見凡此數處貢物並令自出腳乘不困貧民於理無爽師範周廣順元年官西頭供奉弟師朗先為亳州蒙城鎮將因懷驚疑遁過淮外臣與東頭供奉官師睿二人時在定州監押兵士及在雍州攻城各拘職任隱帝敕書安撫臣冒死上訴緣祖父墳墓莊田點入官至今屬營田戶部歲時骨肉祭拜無所臣叨為人子孝道難忘遂於生前便虧祀饗下闕嗥字克明晉相昫之弟後唐明宗朝纍遷水部員外郎史館修撰長興末趙鳳鎮邢臺表為節度判官清泰初入為起居郎纍擢太府卿漢祖入立授宗正卿周初改衛尉卿廣順二年奉使高麗卒於鄆州年六十一藩侯郡牧仗鉞分符繫千里之慘舒行一方之威福自古選任須擢賢明近代統臨為酬勳績將邦域之生聚展將領之人情識分者附正營私黷貨者嚴刑廣取諸頭剝削多贍爪牙自黃巢已來偽梁之後公署例皆隳壞編戶悉是雕殘或不近邊陲不屯師旅無城郭郡邑非控扼藩垣試任廉能且權常理逐年屬州錢物每季申省區分支解有餘罄竭供進府庫漸足黎庶稍蘇縱有過愆亦施懲責言雖鄙近望賜施行行周字尚質幽州人後唐莊宗滅梁以功領端州刺史同光末出守絳州天成中遷潁州團練使長興初改振武軍節度使歷鎮彰武昭義晉祖時加同平章事為西京留守鎮天雄徙鎮歸德出帝時加兼侍中漢祖入立加守太傅兼中書令代李守貞為天平節度使改鄴都留守加守太尉封臨清王乾祐中加守太師進封鄴王周祖入立改封齊王廣順二年卒贈尚書令追封秦王諡武懿陛下每降詔書過踰常制耳聞宣讀心不遑安詔書呼名人臣常分乞不踰聖制者延乂字子英泰州人世明術數仕蜀由廕為翰林待詔後唐天成中以舊職兼衛尉少卿清泰天福中為司天監入漢守舊職周廣順初加檢校司徒二年授太府卿判司天監事卒年五十八贈光祿卿臣聞三代之制禮無降減之名五服之容喪有寧戚之義此蓋聖人隨時設教稱情立文沿革不同吉凶相變或服繇恩制或喪以禮加太宗文皇帝引彼至仁推其大義因覽同爨有緦之義遂制嫂叔小功之服列聖尊行已為故事傳於令式加於大功今馬縞奏論以為錯謬況縞昔事本朝概至梁室曾為博士纍歷歲年今始奏陳未為允當謹按儀禮凡制五服或以名加或以尊制或推恩而有服或引義而當喪故嫂叔大功良有以也其如叔以嫂之子為猶子為猶子之妻叔服大功今嫂是猶子之母安可卻服小功若以名加嫂豈疏於猶子之婦若以尊制嫂豈卑於猶子之妻論恩則有生同骨肉之情引義則有死同宅兆之理若以推而遠之為是即令式兼無小功既有稱情制宜之文何止大功九月請依令式永作彞倫仁瑑晉天福三年大理正周廣順二年以左庶子為大理卿臣常歷外任見州府刑殺罪人雖有骨肉尋時不容收瘞皆令給喪葬行人載於城外殘害尸髮多至邀求實越彞章頗傷仁化準獄官令諸大辟罪並官給酒食聽親故辭訣宣告犯狀日末後乃刑注云決之經宿所司即為埋瘞若有親故亦任收葬又條諸囚死無親戚者官給棺於官地埋瘞置磚銘於壙內立牌於冢上書姓名請依令指揮大理寺所斷即依律文凡斷罪合取最後敕為定詳編敕云官典鞫獄枉濫或經臺授軌勘問不虛元推官典並當誅罰又嘗有欣州法椽郭業故入張仁安一人死罪合當誅罰處分今在德故入八人罪法寺不援後敕準據律文今以郭業比附在德合處極典緯真定獲鹿人唐末舉進士不第後唐天成中為石邑令晉天福中入為監察御史改起居郎史館修撰開運初纍遷中書舍人漢乾祐二年授左諫議大夫尋充史館修撰判館事周祖即位出為平盧軍行軍司馬廣順二年卒伏覩國史館唐高祖至代宗巳有紀傳德宗至文宗亦存實録武宗至濟陰廢帝凡六代唯有武宗實録一卷餘皆缺落臣今採訪遺文及耆舊傳説編成五十五卷目為唐年補遺録以備將來史官修述臣聞裴子野之修宋略爰在梁時姚思廉之纂陳書乃於唐世咸因喪墜是有研尋皇帝陛下與日齊明固天縱聖華山歸馬宗文之道已行虎殿延儒質疑之論斯啓一昨聿宣綸誥精擇史官以李氏又終想唐年遺事雖追名上號其制相沿而創法定儀於文或異恐謠俗之訛變致信實以湮沉將輯亡書以修墜典臣久居職分深恥闕遺今録淺聞別陳短序伏冀特回睿鑒俯念愚衷藝閣蓬山誠莫裨於良直蹄涔掬土願少效於高深請下有司用資取證臣久塵西掖近綴東臺既居封駮之官兼處編修之職凡關聞見合補聰明苟避事不言是上孤至聖臣聞無偏無黨王道蕩蕩無黨無偏王道平平前書所載言之者誡千古大君恐有毫髮之私也臣覩陛下降赦後普行恩敕武臣之內咸協舊規文吏之中未符通論臣竊見改轉朝官自太子少保尚書丞郎內例超秩次仍峻戶封惟兩省侍從卿監之官及員外郎贊洗等依資升進者不過數人餘並止於一階或自右入左上下都不畫一臣伏思階勳爵邑至為重事當以德以勞次第而進雖遇慶澤不可妄加況官者代天理物國家公器雖有親昵無得輕授故曰官不必備惟其人若才稱其官當時當有顯議能不副職官便無宜濫升以公器而為普恩以普恩而有差等一厚一薄何疏何親臣不敢封還制書以阻成命乞陛下顯詢故事爰下有司不次超拜者必徵殊美以第進秩者須守常規望明庭再與僉諧願陛下曲留省察兼有前朝并為執政見排左授官秩者及在官無纍或丁憂已滿未蒙敘遷各許進狀以自申明或顯見於章疏幸特頒於制命或期效用不致沉埋則免使得路者自伐自矜結恩私室失意者愈嗟愈歎流怨公朝光陛下聖明之規表陛下均平之德將恢至理以致太和叨居禮職式考儒經德雖以百行相成諡乃取一善為定公經邦緯俗積行纍功宜立總名用彰殊號按諡法事君盡節曰忠體和居中曰懿左傳曰公家之事知無不為忠也春秋正義曰保已精粹立行純厚懿也公抑揚事任周旋盛明嘗險阻艱難秉溫良恭儉或宣風千里有負襁之民或布政百城致隨軒之雨道光㣥后功著歷朝凡士大夫歎開幕之芙蕖久謝無賢不肖感成蹊之桃李空存煥彼緹緗豐諸碑版令被實録非讓古人事君既有忠規為臣足以御衆復彰懿行從政備焉前代所高斯諡為當請諡曰忠懿元懿周廣順二年官北海令臣為北海令時夏秋苖上每畝麻農具等錢省司元定錢十六及劉銖到任每畝上加四十五每頃配柴五圍炭三稱省條之外嚴刑立使限徵臣竊聞諸道亦有如劉銖配處望令禁止臣在任時奉劉銖文字放絲三萬兩配織絹五千匹管內七縣大抵如是及徵收在賦稅之前督責抑凌借役戶民多造店宅碾磑典庫請朝廷指揮許人論告差軍人百姓五工已上出放物至匹斤以坐贓論自然止絶斯弊臣在任時見劉銖擅棄國章便行決配凡罪人或刺面填都或決配沙門島大凡配流加役是朝廷格律今後更請以不道論臣見諸處商稅有越常規乃至草木蟲魚無不取稅更有歲定稅率即令兒姪傔從主張便行枷棒作事非法有紊國章今後請三司差人主持止絶斯弊臣伏見晉朝曾配百姓食鹽錢每頃配鹽二十斤納錢五十五數足然後許百姓私買煎造自後鹽鐵使指以贍軍為名禁斷鹽法苖畝所配不放納錢稅物重徵生靈不易今逢理代宜有改更使人口淡食者多其主糶職員又入沙石硝鹵大半今後如國家立法糶鹽乞放卻苖上率配稍撫蒸民以安國本臣見麥曲法一條最未中理多與州縣民歲定課利至於酤酢賣糟為弊尤甚臣請州府榷酒戶鄉村不禁許令私造依明宗朝所行稅戶每畝納麥曲錢三則酒酢之流民得便用公霸周廣順三年官隴州防禦使元管三縣五鎮自秦州阻隔廢定戎新關兩鎮唯汧源皆稱直屬本府及官吏批書歷子考較課最賊盜寇攘戶民減損又責州司職分何以檢校昨汧陽令李玉上府主簿林草口咢下鄉州司不曾指揮本縣亦無申報每有提舉皆稱本府追呼無以指縱何能致理其間戶口多有逃亡預虞大比之時恐速小臣之罪伏覩近敕凡有訴訟尚委逐處區分不得驀越豈可本屬縣鎮每事直詣鳳翔望降新規以滌舊弊裔孫字慶先棣州商河人少舉進士為後唐潞王河中觀察支使清泰初纍拜中書侍郎同中書門下平章事晉祖入立罷歸田里周祖即位就加檢校禮部尚書太子賓客分司洛陽廣順三年卒贈太子少傅左補闕劉濤等奏太常丞史在德所上章疏中書門下駮奏未奉宣諭乞將施行分明黜陟朕嘗覽貞觀故事見太宗之理以貞觀升平之運太宗明聖之君野無遺才朝無闕政盡善盡美無得而名而陜縣丞皇甫德參輒上封章恣行訕謗人臣無禮罪不容誅賴文貞彌縫恕德參之狂瞽徵奏太宗曰陛下思聞得失只可恣其所陳若所言不中亦何損於國家朕每思之誠要言也遂得下情上達德盛業隆太宗之道彌光文貞之節斯著朕惟寡昧獲奉宗祧業業兢兢懼不克荷思欲率循古道採拔時材懷忠抱直之人虛心渴見便佞詭隨之説杜耳惡聞史在德近所貢陳誠無避忌中書以文字紕繆比類僭差改易人名觸犯廟諱請歸憲法以示戒懲蓋以中書既委參詳合盡事理朕纘承前緒誘勸將來多言數窮惟聖祖之所戒千慮一得冀愚者之可從因覽文貞之言遂寬在德之罪爰令停寢不遣宣行劉濤等官列諫垣宜陳讜議請定短長之理以行黜陟之文昔魏徵則請賞德參今濤等請黜在德事同言異何相遠哉將議允俞恐虧開納方今朝廷粗理俊乂畢臻留一在德不足為多去一在德不足為少苟可懲勸朕何愛焉但緣情在傾輸理難黜責濤等敷奏朕亦優容宜體含洪勉思竭盡凡百在位悉聽朕言損范陽人梁開平初進士貞明中纍官至右司員外郎後唐天成初由兵部郎中擢史館修撰轉諫議大夫清泰初為御史中丞晉天福中遷右散騎常侍轉祕書監授戶部尚書致仕周廣順三年卒年八十餘贈太子少傅臣等先編聯制敕外有比非故實不便於時條件準天成元年七月及四年十一月敕應中外官除授不許品秩一例宣賜告身請依舊制合賜外各令自出綾紙又天成元年八月敕除授旨授令録皆令內殿辭謝臣等以令録卑微不可內廷展謝請依舊制正衙辭謝又天成三年五月長興二年七月敕許節度使帶使相歲薦五人餘薦三人防禦團練使二人臣惟州縣員缺甚少若容薦舉則每年銓選何以注擬請特行釐革又長興二年八月敕州縣簿尉判司差充軍判官仍同一任自爾以來頗傷物論以為不當請行止絶依舊令衙前選任天成二年二月敕每年進士合有聞喜宴春關宴牒用綾紙並官給臣等以舉人既成名第宴席所費屬私況國用未充枉有勞費請依舊制不賜臣覩陛下勤儉為本宵旰是專日新之德繼聲時病之憂漸息事才達聽言乃必行若有隱於聖明必貽咎於陰責器小而誠難測海日下而但合傾心今欲曉諭中外臣寮戴星登車端門待漏寅初開鑰日出排班中興殿庶事未通乞光降宣不坐冀視朝之制合古事君之禮得中匪懈之誠咸專未明之求外顯臣聞食其時則百骸皆理失其言而駟馬難追利便可行疏闊莫返况開闔之制出入須常且貴賤而不分恃強壯而爭進此後逐日早辰軍人百姓馬㣥放牧令兩掖門出廣列尊卑帝居皇宅法象大微取則皆自於上元隳度無違於古道標正影端之語萬世不踰從權就便之規一時難守臣見九衢巷陌已是漸微兆庶街坊未止侵占陛下仁恕在念約絶難行且乞五鳳樓南定鼎門北禁止搭棚籬圈籠樹舍簷取土填街引渠穢路請指揮金吾軍巡止絶橋號天津名實帝道人臣履歷尚合兢趨牛車往來公然縱恣請止絶天津橋中道兩頭下關駕出即開兩傍之路士庶往來其車牛並浮橋路來往朝廷所重名器為先敘禮樂道尊卑明貴賤伏見禁門之內人馬出入極多臣請凡官員除將被袋馬外其餘騎從並令於光政門外下馬遷鄆州人初為本州牙將漢乾祐初為左屯衛將軍改左監門衛大將軍加檢校司空漢末權知隰州周祖即位正授隰州刺史罷奉朝請卒河東賊軍侵我今月十一日遣步軍都指揮使孫繼業等領兵三百至州北長壽寺掩殺獲賊寨將程筠軍使冒千王仁原供奉官李演並駝馬等所獲賊將較並斬之不數日賊引軍攻城四面齊進臣與判官李昉都指揮使趙太糧料使王光裔官員職掌百姓守把拒鬬焚賊攻具死者五百餘傷者千餘信宿遁去
