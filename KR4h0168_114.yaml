body:
  text: 朕遠提義旅尋克皇都六部相次以奉迎兆庶畫時而安堵旋茲底定巳遂廓清應文武百官等早列通班各懷忠節掩節雖淪於汚俗推誠必於維新但當共罄嘉謨副予虛佇虞秦可鑒在於用捨之間堯舜為心方務含宏之德勉堅臣節深體朕懷其兩班臣寮應事偽庭者並宜釋罪制天有寶圖應運者文明之主國調金鉉入司者經緯之臣將冀大同須資良弻況謂建邦之始難虛納揆之官其有霸府舊寮前籌上密歷歲寒而斯久宏益嘗多經艱險而不渝忠貞彌篤式旌懿德宜舉徽章乃擇吉辰爰行並命翰林學士承旨知河東軍府事正議大夫尚書戶部侍郎知制誥賜紫金魚袋趙瑩儒中端士席上正人襟靈而萬里坦夷行葉而四時繁茂洎陞簪履旦夕之賛畫過人每侍籌帷遐邇之折衝在我翰林學士權知樞密使事正議大夫尚書禮部侍郎知制誥賜紫金魚袋桑維翰文場翹楚學海波瀾撓澄不變於二風躁靜同歸於一德誠抱兼人之器諒懷經國之才十年伸揮翰之勞數鎮有從征之役而皆功參佐命績顯坐籌蕭曹遠接於英猷房杜近齊於芳烈成予丕業職爾元勳既協良辰難稽懋賞自董戎而居廊廟繇內翰而秉鈞衡乃用器能佇觀燮賛於戲優賢異典有國新恩勉伸裨救之謀共致升平之治事繁罔避言直勿辭永修魚水之歡以保雲龍之契瑩可金紫光祿大夫門下侍郎平章事維翰可集賢殿大學士依前權知樞密使事舜任五臣坐致穆清之化漢尊三傑克成王霸之基皆所以君臣義通上下情洽得以寅亮大化導揚休聲百工允𨤲垂衣裳而御宇萬方率服鑄劒㦸以為農式繇輔弻之功兆此隆平之運朕謬膺開創初統寰瀛照臨將被於淳風宰制實憑於良輔其有功宣締構業紹經綸兩朝輸翊戴之勳萬彙仰陶鈞之力是宜重膺夢卜再踐廟堂俾光新造之邦共闡無為之化經邦致理翊戴功臣特進守司空上柱國始平郡公食邑二千五百戶食實封三百戶馮道禮天蒼璧鎮國元龜夏璜為稀世之珍軒鏡是辟邪之寶方諸才業良平有可差其肩較彼忠貞姚宋不得並其轡可謂人臣之刀尺造化之丹青自明宗皇帝克紹基扃仰膺圖讖於草昧皇靈之際有攀鱗附翼之功密賛皇猷靜司帝誥出納奉命周旋八年持葛秤以定錙銖浮殷舟而拯沈溺四時成歲陰陽畢順於燮調九德不愆朝野咸推於表式繄予薄德獲被寵靈將惕勵以為懷恐負荷之弗克宜憑勳德共濟艱難是用重啟巖廊俾持埏埴水土之崇資不改宏文之大柄仍兼於戲造膝陳謀爾無辭於裨救開懷納諫朕不怠於聽從致社稷於昌期納生靈於壽域共臻至理勿墜前功唯於大臣不俟多訓可守司空兼門下侍郎平章事宏文館大學士思勳早承家廕久列內廷奉王命而不辭顧賊衆而無懼宣揚朝旨勸諭兵師遂被凶徒橫加殺害而聞厥父抱疾其家甚貧不有旌酬何彰忠烈可贈左武衞大將軍仍以思勳舊請俸祿終王元正一世思勳男有長成者量才敘錄兼令所司厚給賻贈噫以子之俸終父之年足表渥恩以慰存歿布告中外咸使聞知雷雨作解表天道之推恩瑾瑜匿瑕顯國君之含垢顧惟師古敢怠宏仁關河既靜於昏霾綸綍宜覃於慶澤昨者張從賓輒萌逆節遠結叛臣釁起三城悲纏兩地占據我都邑虔劉我士民丸泥欲閉於虎牢袄霧幾迷於鳳闕賴乾坤垂祐將相協謀渠魁送死於網羅凶黨咸膏於原野捷音繼振惡蔓皆除宜施曠蕩之恩以撫驚騷之地仍頒霈澤徧及縲囚貴感召於淳和速盪平於氛祲天福二年八月二十五日昧爽巳前天下見禁囚徒除十惡五逆光火劫舍持仗殺人合造毒藥官典犯贓欠負官錢外其餘不問輕重巳發覺未發覺巳結正未結正並宜釋放應自張從賓作亂巳來有曾被張從賓及張延播脅從染汚及符彥饒下隨身軍將等兼安州王暉徒黨除巳誅戮外並從釋放一切不問尚恐無知之人暗有恐動物色委洛京留守河陽節度使明加察訪犯者重斷或無辜被害或徇節忘生既抱沈冤宜申贈典應自張從賓作亂巳來諸色官寮內有沒於王事者並與追贈有子孫量才敘錄或是諸軍小節級長行巳下沒於王事者具給本家三年糧賜有男成長者委侍司衞典諸軍內酌量安排富父春喉須誅元惡文王葬骨式表至仁自張從賓作亂巳來所在殺傷者並委逐處差人收拾骸骨葬瘞張繼祚在喪紀之中承逆豎之意顯從叛亂難貸刑章乃睠先臣實有遺德遽茲乏祀深所軫懷其一房家業準法雖巳籍沒所有先臣并祖父母墳莊祠堂並可交付親的骨肉主張應有犯事人親的骨肉除巳誅戮外並放一切不問所有祖先墳塋亦仰準此交付負國者天地不容為逆者人神共怒永惟肸蠁實有感通昨出師之時將帥虔禱頗聞陰祐成此戰功唐衞國公宜封靈顯王其餘鄭州并汜水管內神祠宜令長吏差官點檢如有隳損處便委量事修葺貴伸嚴飾以答陰功五嶽承天四瀆紀地自正當陽之位未伸望秩之儀宜令差官徧往告祭兼下逐州府量事修崇所有近廟山林仍宜禁斷採樵降黜之科既然不濫洗滌之道足使自新應自創業巳來降黜者並可放還兵興巳來邊疆多事或因虜掠或偶滯留歲序遷移家鄉迢遞魚腸雁足嘗懸骨肉之恩月夕霜天必起桑榆之思宜令收贖俾遂歸還自梁朝後唐巳來前後奉使及北京沿邊管界虜掠往向北人口宜令官給錢物差使齎持往彼一一收贖放歸本家興兵動衆蓋殄元凶伐罪弔民須安兆庶應內府管界內今年夏稅近指揮只徵五分今以方駐兵師無不勞役並宜蠲放於戲顧惟薄德屬此多艱敢忘御朽之規思廣納汚之道爰敷渙汗貴洽蒸黎更在中外輔臣文武列辟同扶寡昧以致隆平告報寰區宜體朕意朝散大夫衞尉寺丞陳保極夙蘊才名早登科第洎居班列深顯器能近者假限既違朝章是舉自聞左降深悟前非宜推宥罪之恩俾奉自新之命勉伸傾竭繼俟陟遷可復行尚書倉部員外郎賜紫金魚袋頃朕始登大寶未靖中原六飛纔及於京師千里未通於懷抱楚王求舊方在遺簪曾子傳疑忽成投杼尋聞悛悔遽戮姦回干戈俄至於經時雷雨因思於作解果馳賓介疊貢表章向丹闕以傾心瀝素誠而效順而況保全黎庶完整甲兵納款斯來其功非細得不特頒鐵契重建牙璋封本郡之土茅移樂郊之旌鉞至於將吏咸降絲綸於戲上穹之運四時不愆者信大道之崇三寶所重者慈活萬戶之傷夷息六師之勞瘁遂予仁憫旌爾變通永貽子孫長守富貴敬佩光寵可不美歟可復推誠奉義佐運致理功臣天雄軍節度管內觀察處置等使開府儀同三司守太傅兼中書令廣晉尹上柱國臨清王食邑一萬戶食實封一千戶改授鄆州刺史天平軍節度鄆齊闕等州觀察處置等使賜鐵券改封高平郡王仍令擇日備禮冊命以天雄軍節度副使檢校刑部尚書李式檢校尚書右僕射充亳州團練使以貝州刺史孫漢威為檢校太保隴州防禦使以天雄軍三城都巡檢使薛霸為檢校司空衞州刺史以天雄軍馬步軍都指揮使王建為檢校司空虢州刺史以天雄軍內外馬軍都指揮使藥元福為檢校司空深州刺史以天雄軍內外步軍都指揮使安元霸為檢校司空隨州刺史以天雄軍都監前河陽行軍司馬李彥珣為檢校司空坊州刺史于闐國王李聖天境控西陲心馳北闕頃屬前朝多事久阻來庭今當寶歷開基乃勤述職請備屬籍宜降冊封將宏來遠之恩俾樂無為之化宜冊封為大寶于闐國王仍令所司擇日備禮冊命以供奉官張光鄴充使王者居域中之大以天下為家兩曜照臨必覃聲教二儀覆載咸有寵綏矧夫地鎮南臺心傾北闕遙識興隆之運顯輸翊戴之誠得不並舉徽章式旌亮節爰當吉日遂降明恩威武軍節度福建管內觀察處置等使光祿大夫檢校太保兼御史大夫上柱國瑯琊縣開國伯食邑七百戶王繼恭淮水源長緱山系遠代襲弓裘之業家承帶礪之勳劒有龜文乃是干星之器玉稱龍輔允為照廡之珍當年巳得於佩刀繼世連持於瑞節紅蓮綠水幕中多倚馬之賓貝冑犀渠帳下悉曳牛之將號令而秋霜肅物撫綏而時雨隨車嶽鎮一方風行萬里而況誠專會禹道著尊周挂帆檣而遠涉滄波貢章表而備陳丹懇菁茅畢至無虧任土之儀玉帛咸來悉是充庭之寶爾能若此朕實嘉焉是用益以井田榮之黻冕階昇峻級爵極真王冀旌奉上之心仍錫推忠之號於戲航深梯險爾無怠於恭虔崇德報功朕敢稽於渥澤勉承休命永保令圖可特進檢校太傅福州大都督府長史威武軍節度福建管內觀察處置兼三司發運等使封臨海郡王加食邑二千戶食實封三百戶賜推忠奉節功臣迴鶻可汗仁美雄臨朔野虔奉中朝一方之烽燧蔑聞萬里之梯航繼至自當開創益效傾輸備覩尊奬之心爰降冊封之命宜封為奉化可汗擇日備禮冊命遣衞尉卿邢德昭持節使之朕自勉副羣心恭臨大寶承歷代荒屯之後屬前朝喪亂之餘每務綏和漸期富庶尋以東遷梁苑北定鄴都國力既虛軍資甚廣所司以供億為念督責是專嘗思凋獘之民倍軫焦勞之意今我事漸農時欲興將導達於休和用頒宣於渥澤宜蠲宿負以惠黎元應天福元年終巳前公私債欠一切除放王者法二象以覆載齊七麗以照臨既符有道之文是布無私之化其有誠懸象闕路越鯨津首傾拱極之心久勵事君之節得不示四時之信同萬國之風用顯英賢俾行典禮大義軍使特進檢校太保使持節元菟州都督上柱國高麗王王建天資閒傑神授機謀宇量矜嚴靈襟洞達志堅金石操凜雪霜每切朝宗嘗勤事大守三韓之重地仁義兼修定百濟之彊鄰恩威並振暨朕握圖御宇膺籙開基遣猶子以朝天備彰忠節改名臣而稱賀益認深誠而又敘立國之繇述連姻之舊慕予正朔顯爾籌謀是用時舉徽章聿覃豐澤階升一品位統三師加以戶封兼其真食勉膺寵命以保令猷可開府儀同三司檢校太師依前使持節元菟州都督充大義軍使食邑一萬戶食實封一千戶高麗國王唐莊宗陵名與國諱同宜改為伊陵應京畿及諸州縣舊有唐朝諸帝陵并真源等縣並不為次赤卻以畿甸緊望為定其逐處縣令不得以陵臺結銜考滿日依出選門官例指揮隔任後準格例施行其宋州亳州節度使刺史落太清宮使副名額有晉開國新命臨人宜宏不二之規以廣無私之化應在朝中外臣寮及節度團練防禦使刺史留守司及州府縣官等宜并與加恩擢材委任不問常例宗正卿石光賛奏滎陽道左有萬石君石奮之廟德行懿美宜示封崇用光遠祖之徽猷益茂我朝之盛典贈奮太傅東都奏留守判官監左藏庫李遐當張從賓作亂之際遣李彥珣強取錢帛李遐稱不奉詔旨安敢從命尋遇害朕以李遐讀古人書持君子行攻苦食淡承家不墜於素風激濁揚清歷宦咸推於貞操一昨叛臣猖獗凶黨憑陵而能守正不回臨難無懼忘身徇節雖死猶生若無優異渥恩何以光揚忠烈仍聞母老子幼鄉遠家貧宜超贈於華資兼賞延於嫡嗣是覃漏澤慰彼沈冤可贈右諫議大夫其母田氏封京兆郡太君所有子孫服闕日量才敘錄朝廷雖巳特支救接錢帛粟麥其本官賻贈物色宜依常例指揮仍長給遐在生官俸祿終母一世噫朕以薄德屬茲多難致害忠良實多軫惻以子之俸終母之年用表衋傷俾慰存歿布告中外當體朕懷張允位居近侍志奉遠圖屬將來之助致小康覩巳往之頻行大赦若惠姦稍甚則蠧政亦多推恩務洽於華夷作解冀調於疎數所貢論宜付史館刑獄之難古今所重但關人命實動天心或有冤魂則傷和氣應諸道州府凡有囚徒據推勘到案欵一一盡理子細律令合格勅其閒或有疑者準令又讞大理寺亦宜申尚書省省寺明有指歸州府然後決遣朕自臨寰宇每念生民務切撫綏期於富庶屬干戈之未戢慮徭役之或煩以彼中山偶經夏旱因茲疾苦遽至流移達我聽聞深懷憫惻應定州所奏軍前夫役逃戶夏稅並放王易手演王言心資帝業當開創之運以遠大而論天不能蹙變四時地不能躁成萬物況當革夏盡巳從周化未可以驟行事只宜於漸治不疾而速其在茲乎所貢論宜付史館為國之規在於敏政建都之法務要利民歷考前經朗然通論顧惟涼德獲啟丕基當數代戰伐之餘是兆庶傷殘之後車徒既廣帑廩咸虛經年之輓粟飛芻繼日而勞民動衆常煩漕運不給供須今汴州水陸要衝山河形勝乃萬庾千箱之地是四通八達之郊爰自按巡益觀宜便俾升都邑以利兵民汴州宜升為東京置開封府仍升開封府浚儀兩縣為赤縣餘升為畿縣應舊制開封府時所管屬縣並可仍舊割屬收管亦升為畿縣其洛京改為西京其雍京改為晉昌軍王權昨差北朝國信使堅不肯收接勅牒兼有狀推托事故不遵朝命者王權久在班行衆推夙舊固曉為臣之節宜遵事主之規豈得纔命乘軺遽聞托故莫有奉公之道益彰慢事之心若以道路迢遠則鸞閣之台臣亦往若以筋骸衰減即鳳山之冊禮纔迴既黷憲綱宜從殿黜宜停見任仍勒歸私家國家所資泉貨為重銷蠧則甚添鑄無聞宜令三京諸道州府無問公私應有銅者並許鑄錢仍以天福元寶為文左環讀之每一錢重二銖四參十錢重一兩仍禁將鉛鐵雜鑄諸道應有久廢銅冶許百姓取便開鍊永遠為主官中不取課利除鑄錢外不得接便別鑄銅器過格選人等早列官途合依選限或值戈鋋之隔越或緣貧病以淹延既礙舊條永為廢物適當開創宜憫湮沈可赴吏部南曹準格召保是正身者與降資注官朕自臨區夏每念蒸黎嘗夜思而晝行冀時康而俗阜其如干戈乍息瘡痏猶多由是疚懷不能安席復又車徒甚衆廩藏方虛雖賦租未暇於矜蠲而煩擾當行於禁止俾除暴斂式洽羣心應郡守藩侯不得擅加賦役及縣邑別立監徵所納田租委人戶自量自㮣國珍職居諫諍志在恢宏當其鼎社開基乃欲象魏懸法請詳前代之編別創新朝之楷模以示將來甚為允當其詳議官宜差太子少師梁文矩左散騎常侍張允大理卿張澄國子祭酒唐汭大理少卿高鴻漸國子司業田敏禮部郎中呂咸休司勳員外郎劉濤刑部員外郎李知損監察御史郭延升等一十人皇圖革故庶政惟新宜設規程以諧公共其中書印祗委上位宰臣一人知當朕仰承天命肇啟帝圖黃屋非尊蒼生在念旰食宵衣而修庶政推恩示信以御萬方要荒未綏責躬勤止誕慕文德不愆夙心乃睠甌閩素惟藩翰王昶昨修傾向來效貢輸朕亦釋以前非待之厚禮越羣方之常例崇列國之真封爰及繼恭並昇方伯不謂恃其險阻肆彼僭差矯誣上天狎侮君子左散騎常侍盧損等泛舟陽海持節遐陬王昶自大自尊不迎不見寢停詔命脅辱使臣遣鄭弼再詣闕庭使林恩別陳狀訴隳君臣之事體希書札以往來悖禮慢言長無畏忌朕顧惟寡昧虔荷景靈所慮德之不修豈患人之未服然以失道愆義引惡紊常人祇之心憤怒俱至是用懲其跋扈何須振以威刑鄭元弼等處此亂邦罹茲虐政諒非獲巳良可哀矜宜令所司切加安撫所齎文字及諸貢物不任通進并諸州綱運等勒林恩鄭元弼管押速歸德莫盛於繼絕禮莫大於敬先莊宗立興復之功明宗垂光大之業逮乎閔帝實纂本枝然則丕緒洪源皆尊唐氏繼周者須崇后稷嗣漢者必奉高皇將啟嚴祠當從茂典宜立高祖太宗及莊宗明宗閔帝五廟正冬二節朝會舊儀廢於離亂之時興自和平之伐將期備物全繫用心須議擇人同為定制其正冬朝會禮節樂章二舞行列等事宜差太常卿崔梲御史中丞寶貞固刑部侍郎呂琦禮部侍郎張允與太常寺官一一詳定禮從新意道在舊章庶知治世之和漸見移風之善
