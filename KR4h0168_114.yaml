front:
  text: 全唐文欽定全唐文卷一百十四帝姓石氏諱敬瑭太原人唐景福元年生事後唐莊宗明宗累官侍中太原尹北京留守兼大同振武彰國威塞等軍蕃漢馬步軍總管清泰三年五月封趙國公是年叛後唐十一月受契丹主冊即皇帝位在位七年年五十一諡曰聖文章武明德孝皇帝廟號高祖
  hash: sha256:40ac5b6aa51576c09bb1fbad3b83742161bd69fc050f8ed073e7a343d2285fde
