front:
  text: 全唐文欽定全唐文卷七百八十二李商隱十二
  hash: sha256:745f82ffd8216e1d61885f8fbec82302587272aa2dcd7a022ffbf1d4abdebcc9
body:
  text: 維太和四年月日某官等敬祭於故相國贈太尉太原王公之靈嗚呼天以和氣鍾於貴人含光不曜煦物如春發自貢士驟為庭臣鴻雁聯行共凌青雲既操利權兼秉國鈞食祿甚厚奉身如貧井絡之隅益部為大斗牛之下揚州繁會受社臨戎油幢曲葢印綬重疊恩華霶霈簿領如山處之若閒榷筦之權往而復還炎炎暐暐出入二紀未曾傷物屢有薦士急難友弟謹厚訓子顏間熙熙不形慍喜處己無咎得君如此若木方高香飊欻起三台之氣變見在時五福之來盛衰有期晚下黃閣車騎威遲夕歸華堂言笑嘻怡詰朝丨愁然有恙求醫未撤琴瑟俄懸素旗宸衷震悼朝右悽悲詔下褒崇恩殊等夷靈轜既駕真宅將歸笳簫咽而復揚風日慘而無輝元亮等或蚤挹清塵或晚承泛愛昔修禮於門梱今厂田坴悲乎祖載幽顯雖異音徽未昧神之格思歆此誠酹尚饗伏惟靈圓蓋垂慶方輿薦祉彩炯金沙芳流瑤水振馥掩蕙懷穠耀李前朝則稟謝成篇東漢則儀班問史後宮承露別殿相風屏高雪透簾虛霧蒙武帝之黃金屋裏阿母之碧綺疏中方星婺對比月娥同魯館未築堯親尚宴吹管邀雲投壺笑電憑淑倚柔含芳吐蒨樓欲起而鳳來橋將橫而鵲遍唐推姜姓周重崔門王子敬以筆劄取何平叔以姿貌論女媿前師嬪慙後則比神仙而作配豈工容而校德揚歷中外便蕃寵榮旁規不替內助無傾劍分沈躍桐半死生機殘緯斷瑟怨絃驚唐邑荒臺沁園古木往往遺翰依依灺燭皋平風緊川斜日速雖有祭以呈文終無城而騐哭怨能感物憂可傷人膏肓語夜痟首藏春五聲誰騐九折非神空畱遺範竟掩光塵嗚呼哀哉某自辱嘉姻亟移年序試種玉而有感實坦床之無譽因依高義俛仰清規假華闕一字之繩墨保私門之鼎彞恩重事著德流慶垂既歡琴瑟亦賦螽斯今則窀穸有期聲容漸隔表署古道啟揚曲陌九醞斯在八珍如昔縱有寫於千辭終難期於再覿嗚呼哀哉敢緣愛女冀望遺靈固將不昧儻或來聽有美吾門實繫公族絳霄結蔭皇極流輝自嚴君以交辟延榮仲父以立朝衍慶叔父雖禮疎五服而義協一家馬援於兒姪之間一情無異王華在兄弟之列數從猶親吉人寡辭君子無爭屬者以獻賦不遇投筆從戎鏡水稽山聊屈觀書之望甬東淛右始開傳劍之名經途幾千去國數載爰因職貢來奉闕庭傳車方馳朝露溘至禍生朽索釁起揚鞭始驚香而不禁俄折臂而無望嗚呼存亡恒理修夭常期所悲者方次中塗所痛者非因美疢稅鞅告痛肩輿數晨既鍼艾之莫徵果含禭而斯及况乎合室遠在海涯一女方覊二子未丱人生甚痛天道奚言今以家國載遙干戈未息尚稽歸祔乃議從權定鼎城東永通門外南瞻嵩嶺北望邙山式崇寓殯之封且作藏神之室必也慶延異日時屬通年先溫序之思歸俟臧孫之有後二十一姪女早蒙慈撫久歎違離今又從夫山東食貧洛水將療無及驚悲有加敢因祭酹之馨聊冀精靈之降嗚呼叔父永鑒卑誠新婦舋咎所招重罹天謫始釋縗而就吉俄解帨以聞凶衰禍所延或深諸婦冤號之地良異他人爰在高堂嘗依諸舅聿來我族實號儒門雖傳業於詩書冀同光於軒冕羽書銅印東泛西浮及世難旋臻家徒壁立望萍蓬而結欷指溝壑以貽憂竟蒙念切諸生言憂幼女卜云其吉天也來儀蓮幕高華蘭階秀異尊卑共感里巷同歡豈謂百兩纔歸雙旌遽改雖在途稱婦已蒙羔雁之榮而辭家適人未具箴鞶之敬詎言不日奄背深慈永痛長號五情分裂嗚呼哀哉遠國千里夜泉九重側聞龜筮之言將備塗芻之禮今以干戈未息途路多虞清貧昭囏食之憂遐阻難舉家而往不獲躬隨絳旐親詣松扃撫行引以傷摧抱眇孤而惋毒酒醪粗列蔬果空陳身叩盃盤血沾匙筯榮同子婦雖稱美於他宗念繫孫甥亦兼情於血屬敢希神理賜監哀衷奉違慈顏將涉半載追攀莫及號毒無任恭惟尊靈好是懿德其修身克己之規矩誓心奉國之忠誠武畧文經官方政術既外言不入於中壼故殊勳無預於斯文今瀝血寫誠叩心寄酷祇欲以閨庭見聞之事申泉扃永遠之哀三奠未終五情先潰嗚呼不祐天實為之昔我門外首啟侯服傳鼎銘於百代稱玉潤於十家新婦之先實繼儒德羔鴈克光於宋子丹青遠比於瀛州秦府學士之後三紀以前六姻推最俄已吉凶相反中外貽悲蕞爾覊孤邈無依怙孱形弱質言歸自出之私五嶺三江遠食分憂之祿結愛異諸生之列延慈於眾妹之中雖手足乖離鄉關綿邈而蘇氏魂靈有寄門構無虧言念慈仁實動肌骨新婦檮昧成性誨誘難移大家以恤孤嚴室而悔過面授刀尺躬傳織紝常憂許嫁之時未盡宜家之美俄乃守龜有兆贄鴈來儀克以眇軀榮陪諸婦愛忘於醜姻不失新良人既託於外兄邱嫂復榮於猶女朞緦百口咸蒙衣食之仁昆弟三人並受簪纓之賜况茲屢歲時遘沉疴煎餌延憂禱祠積費田巫密召秦緩旁求迴幽魂於再三割廉俸之千萬重以某郎祇蒙嚴訓投迹名塲載深惟疾之憂常有于飛之命辭離葢數就奉多違或榮寵屢加每乖於獻賀或起居有恙葢闕於煎調日月其除螽斯寡裕使二男繼夭重貽門戶之憂雖一女出家未有莊嚴之力方將湔腸洗胃易慮兢魂冀收慶於將來用承光於厥後豈謂舋深無禱祜薄難修方於百戰之中忽降兩楹之夢追摧酷裂五內崩傷嗚呼士誰不榮者風義人誰不貴者勳庸八綰州符兩司廉印三遷省座四陟齋壇玉帛賢豪畧盈於管第袴襦疲病橫勵於藩維雖清閒之事業無虧而大國之依憑未極殷輪莫返撫節歸全上軫九重旁凄五服銀章拾級遽為告弔之恩水土分官飜作追榮之美天乎不憓神也何依今則龜筮有從日月叶吉指祁連而啟引復京兆以開阡絳旐前指桐棺後出嚴姑永慟以觸地令嗣長號而怨天變霜景於春朝灑夜泉於晝景况奉御諸子服紀纔終三川伯郎喪制未畢哭泣遂延於數院縗麻畧滿於一門何昔時榮樂之多而今日奪傷之併短長有數冥寞難分新婦誠合徒步呌哀臨穴申禮屬稚姑季叔或有止畱家老輿臣尚多依庇既無冡婦難曠門庭嗚呼哀哉憤莫切於冤痛永違尊蔭者痛之極不登遐壽者冤之深痛極冤深碎心殞首百身非贖九死何追蔬果盈前酒漿在列繐帷儼撤哀挽成行昔為供養之資今作幽明之訣冤號圯裂觸目崩摧伏希明靈一賜臨降吾配汝先世二十餘年七女五男撫之如一往在南海令子云亡藐爾兩孤未勝多難提挈而至踰涇涉河十年之間母子俱盡念汝差長慰吾最深女德婦容光映姻表秭歸為牧官閒俸優實獲我心因選良對笄旒纚纚環珮鏘鏘螽斯鳳皇兩有深慶汝夫文章播於朋友身否命屯久而不第郎寧合浦萬里乖離汝寄京師食貧終歲頃吾南返又往朝那汝實從夫適來岐下道途雖邇面集猶妨金馬碧雞長懸魂夢及登農揆去赴天朝汝罷蒲津聿來胥會朝堂夜閣曲榻溫爐稚子雛孫滿吾懷抱汝時不佑忽爾孀殘撫視冤傷載慟心骨旋移許下念汝支離卜室築居言遷潁上潞童作孽使節啟行崎嶇關山暴露戎旅汝失所怙吾猶未亡念汝弟昆莫任堂構牽哀挽痛媮此殘生日往月來旋更歲序吾衰汝少吾病汝強誰謂一朝汝先吾逝五男未冠二女未笄哀憤之深難全禮道章兒盧七取以依吾汝夫先邱遠在江渚㣥從之內官名且稀劉四頃年固難返葬始議權厝遂得嘉占白馬呈祥眠牛薦吉里名三趙地邇九城風水無虞巒岡信美葬於所始古為達生將命來雲自我為祖今汝之柩斯焉是歸嗚呼言自淮陽已臨洛宅素棺丹旐託宿城隅盤具杯醪儼然已備吾將臨汝用雪沈冤介婦諸孫憂吾衰齒俯令推測云有相妨俗忌巫言吾非甚信牽衣擁路固不可違女使僕奴寄辭而往肝腸兼潰血淚無行嗚呼曩昔容華生平淑婉漠然不見永矣何歸將籍掛諸天遙歸真路將福興淨域須赴上生將為釁累所招遂淪幽界將是療治不至枉喪韶年千感裝懷萬疑疊慮觸途氣結舉目心摧天實為之復將何訴嗚呼汝弟言護靈轜自始及今必誠必信棺衾華好封隧幽深永從汝夫以安元路冤摧債結殆不勝書嗚呼有靈領吾此意戊午歲丁未朔乙亥晦弟子玉谿李商隱叩頭哭奠故相國贈司空彭陽公嗚呼昔夢飛塵從公車輪今夢山阿送公哀歌古有從死今無柰何天平之年大刀長㦸將軍樽旁一人衣白十年忽然蜩宣甲化人譽公憐人譖公罵公高如天愚卑如地脫蟺如蛇如氣之易愚調京下公病梁山絕崖飛梁山行一千草奏天子鑴辭墓門臨絕丁寧託爾而存公此去耶禁不時歸鳳棲原上新舊袞衣公先人亦贈司空有泉者路有夜者臺昔之去者宜其在哉聖有夫子廉有伯夷浮魂沈魄公其與之故山巍巍玉谿在中送公而歸一世蒿蓬嗚呼哀哉惟靈族光釣渭慶顯歌齊竹分東箭玉奪南珪委蛇霄路睥睨雲梯淺牙洞鼠短刃分犀古聖堂奧前賢町畦湔腸效藥刮膜畱篦彈琴而放臣見釋買賦而妒后還閨既步京國亦薦鄉里與田蘇游有太叔美鄴都才運洛陽年齒何晏神仙張良女子禮闈之擅譽也如彼冊府之傳名兮若此囊成內殿之帷書貴皇都之紙中臺南省諫署戎藩才難價重政舉人存蓮池易曉蘭圃多暄涵波獨躍弄影孤翻王粲樓中常經暇日揚雄宅裏幾弔遺魂參差覯閔萋菲成冤漢庭毀誼楚國讒原建禮門內明光殿外直金既肆於猜疑魏被竟從於沙汰蒙犯霜露支離埃厲山遙鬱於朝嵐溠水傍奔其素瀨猶懷毒草過農井以低窺尚憶神珠向隨臺而獨酹渚宮貳尹相府中郎將申蠖屈欲復鴛行朱轓意氣皁葢輝光訓說則馬季長之居南郡風流則殷仲文之守東陽劉寵一錢鄧攸五鼓遂解郡符來登書府儒林文囿瑤山瓊圃鉛槧朝閱芸籤夜數瓜當鄭灼之心錐在蘇秦之股是從佐理於彼東周雷喧洛派電掣嵩邱玉泉嘉月金谷清秋陳思王之羅韈有道之仙舟不無賦詠聊以優游漢入嶢關晉分陰地藉賢太府之政有古諸侯之貴載揚筆陣復清劍氣長卿消渴士安風痺逝川幾歎於不迴朝露俄聞於溘至嗚呼昔也風塵投分平生少年雕龍競巧倚馬爭妍開襟隨岸促膝伊川月中乃共誇科桂池裏亦相矜幕蓮劉樗屢擲畢甕多眠中以世務紛綸物情推斥撫事傷年減歡加戚路泣楊朱絲悲墨翟縱風至而音來竟月同而地隔逮予廉部及子頒條華樽旨酒綺席嘉肴各懸章綬俱失簞瓢誰論金而契在終照玉而顏凋子牟之思魏闕望之之憶漢朝誠知舌在不覺魂消書斷三湘哀聞五嶺天涯地末高秋落景重疊憂端縱橫淚綆漏虯夜促隙駒朝騁怨藻繢之無睢惜陽春之亂郢言念令季託余屬城鴒原雁序昔日懽情蠻圻瘴嶠今日哭聲愍支體遽亡於手足况弟兄不如其友生嗚呼厚夜依臺窮泉訪路已已金骨嗟嗟玉樹莫和哀挽空陳薄具銜萬里之遐誠託千辭之寄喻異時松楸枯朽羊虎傾頹草宿苔厚門平闕摧尚期越禮用寫餘哀靈今不昧儻或來哉年月日謹以云云之奠祭於宗尹郎中之靈昔莊南華之言物故則曰若巨室之偃歸人陶貞白之語元機則曰雖頑仙不如才鬼邈矣高論皭然深旨有感斯文屬在之子黃河九曲泰華三峯潼亭之右陰晉之東泱漭隹氣肹蠁孤風生民之秀惟子之宗既懼四知亦畏三惑昔佐赤符實毗皇極坦蕩王道昭宣帝則丹青不朽琬玉是刻狀日昇東侔辰在北子之伯仲不忝前人粉飾賢路抑揚薦紳雲間日下國華席珍排龍掩陸突鶴摧荀卓爾風標朗然流品妍若春輝烈如冬凜燕石知媿齊竽自審咸指路以光銷盡登門而聲寢難售者價重難知者聲清披沙揀金由是不媿鳥散花落於今有情劉儒十行孫宏三道直路猶弦蠧政如埽筆海驚波詞園鞠草文塲不寫於中心冊苑空畱於秘寶晉千里國漢第一功建幢油碧啟幕蓮紅賓高主擇韻合人同固不能加減陳掾亦可以喜怒桓公衣繡含香省蘭臺柏赤管朝操青縑夜襞佐計相則生聚有經贊地官而孤終協籍于惟荔浦言念金昆毀冠裂帶雪泣星奔宅裏之荊枝半謝嶺頭之梅艹口咢空繁陟岡望兄詞客之情何極歸縣見姊騷人之恨猶存乃擢戎曹遂荒京令將換清切以扶明聖不知者壽難言者命未謁季良之醫已革曾參之病嗚呼平生世路繾綣交期孫金盧米百賦千詩桂林崑嶠一片一枝終以浮沈因兼險夷對皋壤之搖落成老大之傷悲尚冀他年或陶良夜酒筵琴席燈闈月榭俱開怨別之襟並息分岐之駕短景未果良辰不借竟鬱結於深衷倏淹淪於大化况南康解榻早降清光會稽繼組昨辱餘芳情分逾極銜哀更長三十年之間難追往事五千里之外正恨殊鄉地濶山深川寒樹古杳杳元夜荒荒宿莽生金認石埋玉恨土寄奠緘辭呼風泣雨噫嘻噫嘻宗尹之魂來否維會昌元年歲次辛酉四月辛丑朔二十日庚申隴西公滎陽鄭某隴西李某安定張某昌黎韓某樊南李某謹以清酌之奠敬祭於故朔方書記張五審禮之靈嗚呼古有不重千金殊輕尺璧或號百夫之防或作萬人之敵雖爭雄角秀殊途異跡念閱水於千齡若衝飇之一息吁嗟審禮寧或免之瞭眸巨鼻方口疎髭始自渚宮來遊帝里論激懸河文酬散綺體物稱最登高擅美良時不來躁進為恥門巷蓬高荒涼如此藩溷筆硯寂寥而已梁多文士漢有賢王猶市駿骨肯驚夜光長裾既曳健筆誰當職高蓮幕官帶芸香青袍如草白簡如霜東閣朝暖西園夜凉震豈殺公諶惟故吏渭濱迴流馬之運峴首奉辭曹之諱松筠不改琴罇有寄三徑方營一畝乏地文多為富無事當貴亦解客嘲還答賓戲迴翔逸軌傲睨重霄將期晚節更峻清標懸蛇結釁鬬蟻成妖迴生乏祖洲之草續斷無弱水之膠陳尸重來而何望楚魂一散而難招嗚呼神道甚微天理難究桂蠧蘭敗龜年鶴壽在長短而且然於妍醜而何有某等早承餘眷晚獲聯姻或感極外家延自出之念或恩深猶子多引進之仁或敬屬丈人之行或情兼內妹之親有美吾姨靈慶攸屬尊公則師長庶僚夫人則儀刑六族門高再世之侯家享萬鍾之祿經過款狎出入遊陪映人玉潤覆水蓮開春歸別墅月滿高臺稽山傾倒謝雪徘徊惜景而持繩欲繫邀歡而秉燭相催中歎乖離今多至止仲叔辭辟而方返梅福罷官而未幾一則歸從回鴈之峯一則至自跕鳶之水方將為笛裁竹緣箏斬梓驅羿射鴻招任釣鯉豁契濶於屯夷極平生之宴喜良覿雖屢深懷未從三靈莫效一夢俄終露先寒而隕葉漏未盡而聞鐘今則列樹開封揲蓍得吉絳旐前引桐棺後出隱轔原野凄涼雲日將歸宿莽之庭欲閉青松之室殷勤舊偶冀望諸孤未歸下國且寓皇都江遠惟哭天高但呼必有餘慶非無後圖嗚呼哀哉壺有芳醪俎多肥羜呌噪不聞精靈何處鬱憤徒極含辭莫敘冀有鑒於酸嘶庶無乖於酣飫維某年月日子壻李商隱謹遣家僮賫疎薄之奠昭祭於故河陽節度使贈司徒之靈惟昔積德卜年源長慶延岐山之走馬胥宇嵩邱之控鶴尋仙重疊規矩蕃昌億千邂逅中代支離數賢豆藿失君隨庾謝而南度桃葉興詠廾江徐而北旋已失晉陽之菜地因開濮水之松阡時非得已吾寧固然王殷別祁縣之居未傷於教王濬占宏農之籍果振其先既而斷韋更緝脫簡重編二掾則齊翔謝鳳兩令則庭落楊鱣繄彼家聲重嬰世故值冀寇之北至屬魯馬之南渡肇允成公悲丁國步悼犬馬之戀主愴梟狼之據路投筆三歎彎弧一怒斃斷後之王雙縛難寬之呂布鈇鉞賜殺圭符錫祚實誕上公載揚垂裕兩欒蓄響百丈端標重侯有寄任子來朝書通軒禹文合韺韶熊館中涓方奏揚雄之羽獵露臺法從已賦王褒之洞簫乃即秘邱乃登延閣愈高赤之疴癢變服鄭之糟粕麟臺秩滿龍樓籍通輟春閨之贊謁佐夏口以觀風魏太子之寓書歡娛不足桓司馬之英氣喜怒皆同復因所託往保於東齊師拒召洛邸興戎雖得兔穴未摧隼墉保不教之兵纔餘百數羲和難駐之晷寧復再中上陽將鳴於夜柝東人半逐於飄蓬公請於帥願當其鋒搢白簡以腰劒攘青袍而手弓咄嗟則前隊鼓勇喑嗚而後騎爭雄纔餘數刻盡翦㣥兇山濤論兵此中不淺魏舒善射知之何晚尚踠迹於天朝更從公於蒲坂旋衣朱紱入謁皇闈乃乘騘馬來臨秭歸峽朿遐路灘含駭機桂檝之不用安得布帆之無恙者稀公誘以利公申以威明拯人之賞示伊水之非却張禹之江濤非因行縣戢溫公之水怪寧候照磯遷去鄖城仍臨蔡壤釋杼軸之悲解秋荼之網救旱平怨停霜辨枉褚義興之部內枯樹重榮傅安城之郡中淫祠罷饗容山至止郎寧去思跕鳶息厲毒虺停吹臨海之密岩不禁合浦之珠蚌休移既相溫文旋遷徼衞複道親警嚴更密隸統臨緹騎東都之上將今官意氣朱旗南岳之諸劉昔誓番禺是宅漲海攸瀦瘡痏金寶糞土犀渠跨馬將軍有雙標之柱酌泉太守無去骨之魚已乏斷牙之筆兼無汗簡之書江革船輕空險西陵之渡邢公宅湫曾無正寢可居安定求才朝那闕帥衢室晏罷雲臺夜議虞雪嶺之驚烽忽玉關之滯使李廣名重王商貌異征轂方推行臺遽至塞水分溜邊城早寒鳬鍾響遠鼉鼓聲乾九國遺戎咸憂其族滅三州戎卒休歌於路難排闥無及持符載泣荷紫泥之降數馳墨車而來急省揆名在農官望集鄙卿曹之四至小承明之三入鄗畢之地軒轅之臺葛綳將掩柏陵始開會稽之象猶未去鼎湖之龍不歸來代邸迎騑將極事居之禮喬山護駕猶深送往之哀許下舊都淮陽勁卒帳督千乘人殷萬室獯鬻潛動偏裨遠出指授籌謀丁寧紀律秋膠方折塞月未虧寇屯日逐師分谷蠡薛公之揣敵情不過三策充國之為兵學遠及四夷千牛不燧六吂月馬凡巳馳沁園歸主細柳屯師赤狄違恩晉城告變假三齊之餘醜犯神州之近甸懷邑營匝河橋斾轉城東陽而萊子懼事在晏桓壁武牢而鄭伯憂功存孟獻示羸策密誘敵謀深子陽之降奴失計袁熙之別將先擒元子能官季男善賦咸移俎豆之業共集干戈之務金僕陷堅以深入勁弩飛空而亂注誓與族以忘生報時君之善遇陳球家室終避難以無聞去病子孫亦成功而有素大勳垂立定命難言長城遽壞秦岳俄騫星墜營中先時盡見兒啼地下此兆難原遂稽誅於賊壘遽貽慟於天閽綏服無禮袞劒加恩誠蘊蓄之非盡在始終而可論嗚呼哀哉惟公之膺秀璆筠禀和鍾呂青海萬里丹霄一舉季布金諾延陵劒許既辨冠於燕齊亦信開於梁楚揚親業就繼代名高永言氣類莫匪英髦謝萬有安石之兄見推時俊王宏以曇首為弟遠映人曹故得行有二矛居懸重綬赤羽若日金印如斗賜衣干襲罷加寒暑之初宸翰萬重誓在河山之後重以夷門下士楚館求才御車表敬比卞除猜同羊偘之接賓共其醒醉異蔡凝之待士畧彼蒿萊而又理達團空道通無著水月觀定春臺寄樂赤髭疏主擲麈尾以無言綠髮仙翁攝霓裘而自却嗚呼哀哉其世榮也如彼其全材也若此忽東輝之云宴雖西山而莫起語光陰之代謝石火風燈追平昔之音容驚波逝水今則青烏薦卜白馬臨塋并移黃石始啟滕城元甲等嫖姚之禮荒阡改京兆之名魏冡竹書幾年復出燕邱華表終古含情某早辱徽音夙當採異晉霸可託齊大寧畏持匡衡乙科之選雜梁竦徒勞之地雖餉田以甚恭念販舂而增媿京西昔日輦下當時中堂評賦後榭言詩品流曲借富貴虛期誠非國寶之傾險終無衞玠之風姿公在東藩愚當再調賁帛資費銜書見召水檻幾醉風亭一笑日木蔑中昃月移朒朓改頓水之辭違成洛陽之赴弔嗚呼哀哉漢陵搖落秦苑冰霜將觀祖載遂迫瘥瘍謝長上聲度之虛羸升車未可沈休文之瘦瘠執轡猶妨林薄終焉關河永矣抱痛酸骨銜悲沒齒潘楊之好琴瑟之美庶有奉於明哲既無虧於仁旨僧虔筆拙葛洪紙空裁詞有盡抆血無窮希降光於寓奠聊照恨於微衷嗚呼哀哉人之生也變而往耶人之逝也變而來耶冥寞之間杳惚之內虛變而有氣氣變而有形形變而有生今將還生於形歸形於氣漠然其不識浩然其無端則雖有憂喜悲歡而亦勿能措於其間矣苟或以變而之有變而之無若朝昏之相交若春夏之相易則四時見代尚動於情豈百生莫追遂可無恨倘或去此亦孰貴於最靈哉嗚呼公之世冑勳華職官揚歷並已托於寄奠備在前文今所以重具酒牢載形翰墨葢意有所未盡痛有所難忘以公之平生恩知曩昔顧盼屬纊之夕不得聞啟手之言祖庭之時不得在執紼之列終哀且痛其可道耶嗚呼七十之年人誰不及三公之位人誰不登何數月之間不及從心之歲聞天有慟方登論道之司時泰命屯才長運否為善何益彼蒼難知昔澤怪既明告敖釋桓公之病陰德未報夏侯知丙吉不亡何昔有其傳今無其證豈人言之不當將天道之或欺雖北海懸定薨期長沙前覺灾至偃如巨室去若歸人處順不憂得正之喜在公之德斯盛在物之痛何言矧乎再軫慮居屢垂理命簡子將戰之誓惟止桐棺晏嬰送死之文寧思石槨素車樸馬疎巾弊帷成一代之清規揚百年之休問所謂有始有卒高明令終嗚呼往在涇川始受殊遇綢繆之迹豈無他人樽空花朝燈盡夜室忘名器於貴賤去形迹於尊卑語皇王致理之文考聖哲行藏之旨每有論次必蒙褒稱及移秩農卿分憂舊許覊牽少暇陪奉多違跡疏意通期賒道密紵衣縞帶雅貺或比於僑吳荊釵布裙高義每符於梁孟今則已矣安可贖乎嗚呼哀哉千里歸塗東門故第數尺素帛一爐香煙耿賓從之云歸儼盤筵而不御小君多恙諸孤善喪登堂輒啼下馬先哭含懷舊極撫事新傷植玉求歸已輕於舊日泣珠報惠寧盡於茲辰况邢氏吾姨蕭門仲妹愛深猶女恩切仁兄撫嫠緯以增摧闔孀閨而永慟草荄土梗旁助酸辛高鳥深魚遙添怨咽嗚呼精神何往形氣安歸苟才能有所未伸勳庸有所未極則其強氣宜有異聞玉骨化於鍾山楸柏實於裘氏驚愚駭俗佇有聞焉嗚呼姜氏懷安之規既聞之矣畢萬名數之慶可稱也哉篋有遺經匣藏傳劍積茲餘慶必有揚名愚方遁跡邱園游心墳素前耕後餉并食易衣不忮不求道誠有在自媒自衒病或未能雖呂範以久貧幸冶長之無罪昔公愛女今愚病妻內動肺肝外揮血淚得仲尼三尺之喙論意無窮盡文通五色之毫書情莫既嗚呼哀哉公其鑒之某爰在童蒙最承教誘違訣雖久音旨長存近者以檀山舊塋忽罹風水壽堂圮壞冡樹凋傾雖崩則不修聞諸前哲但墜而罔治那俟他人况隱德貽芳鴻儒著美豈可令趙岐之表墊彼元扃郭泰之碑淪於夜壑載惟瑊頊藐爾孤冲誠呌號之不停顧營辦之無素某等輒考諸蓍筮別卜邱封使羲叟以令日吉時奉移神寢奢無僭縟儉免虧疎是期永閟尊靈長安幽穸眠牛有慶自及於諸孤白馬垂祥豈均於猶子追懷莫及感切徒深更思平昔之時兼預生徒之列陸公賜杖念榮益以何成殷氏著文媿獻酬而早屈引進之恩方極禍凶之感俄鍾誰言一紀之餘又奉再遷之兆哀深永往情極初聞矧宗緒衰微簪纓殆歇五服之內一身有官將使澤底名家翻同單系山東舊族不及寒門靜思肯構之文敢怠成書之託瑊等既幽明無累年志漸成則當授以詩書諭其婚宦使烝嘗有奉名教無虧靈其鑒此微忱助夫至願敢以求於必大庶免歎於忽諸迫以哀憂兼之瘵恙曾非遐遠不獲躬親瀝血裁詞叩心寫懇長風破浪敢忘昔日之規南巷齊名永絕今生之望冀因薄奠少降明輝延慕酸傷不能堪處苦痛至深永痛至深猗歟我家世奉元德讓弟受封勤王賜國名芳彞鼎勳盈史冊季孟國高秦晉欒郤恭惟柔範載稟淵塞既作女師乃為嬪則潁水波清梁園月明言旋百兩且拜雙旌託侯令弟配國名卿入從述職出輔專征螽斯不妒鳳凰和鳴此時同慶東郡分榮使者責梁公子專魏帝念元昆人思仲氏杖節赴敵斬芻盡瘁無以家為或從王事禮優內子詩美夫人冕紘瑱紞山蕨澗蘋子元罕見冀缺如賓綠衣有感翟茀仍新遽歎夜川遄聞晝哭原阡舊署孟鄰斯卜閒居獻壽作賦之官弓裘望襲菽水承歡福善餘慶好謙舊祉復自良人集於之子爰從上蔡去臨易水空報登壇未聞曳履鼂父先歸莫之能比趙母上言蓋不得已寒暄結患燥濕為疵徒虛百祿靡效三毉嗚呼壽夭所賦彭殤不移誰能了悟孰不憂悲何茲達識乃克先知同易簀以就正如買棺而指期苟有所累安能及斯道遠轘轅程遙河洛建旐臨塗移舟就壑日慘林嶺風凄灌薄積藹茫茫行烟漠漠某等誠深通舊情協先親始自童子至於成人年將二紀恩冠六姻念升堂之如昨慟幽夜之無晨歌停行路舂輟比鄰雖寓辭之有所終含酸而莫伸壺清媿酎俎薄羞芹惟餘彤管有美清塵嗚呼尚饗嗚呼以君之文學以君之政術幼以自立老而不倦亦可以為君子人矣君子人歟而不即清途不階貴仕此其命也夫何慊焉始者仲姊有行獲託貴族半產以資於外姓闔門寄託於仁人將以衰微倚為藩援不圖薄佑天奪初心仲姊凋殂諸甥不育以親以懿翻為路人再號再呼莫訴蒼昊尚以君子存伉儷之重敦行李之私二十年以來雖事暌而意通跡遙而誠密神當賜鑒愚豈敢忘逮愚不天再丁凶釁泣血偷息餘生幾何君方赤紱銀章淛東從務道途悠邈時序徂遷訝弔緘之不來忽訃書之俱至感舊懷分情如之何埋玉焚芝固未可喻嗚呼今來古往人誰不亡於君之亡其酷斯甚藐然一女纔已數齡乞後旁宗又未能立賢弟扶服東路遇疾洛師徘徊十旬淹不得進浮泛水陸厥途四千建旐云歸曠然無主尼姑居宗老之地騶奴總家相之權獲及故阡信為餘慶其所以為附身附棺之具又豈礙平生之曠達邪日月次遷卜筮斯協幽明之異始於今辰愚方厂田坴哀憂瘵恙縻寢不及一攀冡樹一慟荒阡謝澹成之交申永訣之禮矧余仲姊君其與歸撫心骨以皆驚抆血淚而無算嗚呼已哉其何言耶襚衣非華奠物殊薄靈其鑒此慰我哀心嗚呼尚饗嗚呼追訣慈念一十八年罪積行違上下無禱天怒猥集不誅其身再丁憫凶藐無怙恃號潰荼裂心摧骨崩獲見諸甥來奉遷合舊物半同於泥滓新阡方列於松楸斷手折足厥痛非擬終天沒地此誠莫伸冤痛蒼天孤苦蒼天始某兄弟初遭家難內無強近外乏因依祇奉慈顏被蒙訓勉及除常制方志人曹以頑陋之姿辱師友之義獲因文筆實忝科名三干有司兩被公選再命芸閣叨跡時賢仲季二人亦志儒墨於顯揚而雖未在進修而不隳永惟幽靈盍亦垂鑒今者苴麻假息糞土偷存不即殞傷葢亦有以伏以奉承大族載屬衰門三弟未婚一妹處室息允猶闕家徒索然將恐烝嘗有曠闕之憂邱隴絕芟除之主延駐晷刻不敢自私又以祖曾之前未一完兆骨肉之內猶有旅魂將自來茲克用通便以顯之義雖不敢望無忝之訓庶幾或存靈其聞之必將加憫然有以沒齒懷恨粉身難忘者以靈之懿茂而不登遐壽不生賢人使別女致哀猶子為後哀哀天地云胡不仁默默神祇其何可訴今嵩奐二子既為我甥誓當撫之以慰幽抱男勸其學使得祿仕女求其耦必擇賢良縱乖宅相之徵庶泯忽諸之歎壽堂宿啟潛舟既移那期永訣之悲復見重開之兆以祥忌云近哀憂載迷不獲臨壙達誠撫柩致奠東望景亳椎心仆身具禭擇蔬灑以淚血日慘風遠叫號無聲伏惟明靈一賜臨鑒孤苦蒼天不孝蒼天嗚呼哀哉靈有行於元和之年返葬於會昌之歲光陰迭代三十餘秋得不以既笄闕廟見之儀故卜吉舉歸宗之禮不幸不佑天實為之椎心泣血孰知所訴恭惟先德實紹元風良時不來百里為政愛女二九思託賢豪誰為行媒來薦之子雖琴瑟而著詠終天壤以興悲謂之何哉繼以沈恙禱祠無冀奄忽凋違時先君子以交辟員來南轅已轄接舊陰於桃李寄蹔殯之松楸此際兄弟尚皆乳抱空驚啼於不見未識會於沈冤淛水東西半紀漂泊某年方就傅家難旋臻躬奉板輿以引丹旐四海無可歸之地九族無可倚之親既祔故邱便同逋駭生人窮困聞見所無及衣裳外除旨甘是急乃占數東甸傭書販舂日就月將漸立門構清白之訓幸無辱焉既登太常之第復忝天官之選免跡縣正刊書秘邱榮養之志纔通啟動之期有漸而天神降罰艱棘再丁弱弟幼妹未笄未冠允緒猶闕家徒屢空載惟家長之寄偷存晷刻之命號天叫地五內崩摧然亦以靈寓殯獲嘉向經三紀歸祔之禮闕然未修是冀苟全得終前限屬劉孽叛換逼近懷城懼罹焚發之災永抱幽明之累遂以前月初吉攝縗告靈號步東郊訪諸耆舊孤魂何託旅櫬奚依垂興欲墮之悲幾有將平之恨斷手解體何痛如之灑血荒墟飛走同感伏惟朝夕二奠不敢久離遂遣羲叟一人主張啟奉抱頭拊背戒以信誠附身附棺庶無遺闕檀山滎水實惟我家靈其永歸無或栖寓嗚呼哀哉靈沈帛丿糸之際殂背之時某初解扶牀猶能記面長成之後豈忘遷移頃者以先妣年高兼之多恙每欲諮畫即動悲感涕泣既繁寢膳稍減雖云通禮亦所難言荏苒於斯非敢怠忽今則南望顯考東望嚴君伯姊在前猶女在後克當寓邸歸養幽都雖歿者之宅兆永安而存者之追攀莫及又以十二房舊域風水為災胡子彭兒藐焉孤小雖古無修墓著在典經而忘禮約情亦許通變今則已於左坎別卜鮮原重具棺衾再立封樹通年難遇同月異辰兼小姪寄兒亦來自濟邑騃魂稚魄依托尊靈遠想先域之旁纍纍相望重溝疊陌萬古千秋臨穴既乖飲痛何極唯安陽祖妣未祔仍世遺憂昨本卜孟春便謀啟合會雍店東下逼近行營烽火朝然鼓鼙夜動雖徒步舉櫬古有其人用之於今或為簡率潞寇朝弭則此禮夕行首夏已來亦有通吉儻天鑒孤藐神聽至誠獲以全茲免負遺託即五服之內更無流寓之魂一門之中悉共歸全之地今交親饋遺朝暮饘餬收合盈餘節省費耗所望克終遠事豈敢溫飽微生苟言斯不誠亦神明誅責老舊僕使纔餘兩人靈之組繡餘工翰墨遺跡並收藏篋笥用寄哀傷嗚呼哀哉蕣夭當年骨還舊土箕帚尋移於繼室兄弟空哭於歸魂終天銜冤心骨分裂胞胎氣類寧有舊新叫號不聞精靈何去寓詞寄奠血滴緘封靈其歸來省此哀殞傷痛蒼天孤苦蒼天伏惟尚饗正月二十五日伯伯以果子弄物招送寄寄體魂歸大塋之旁哀哉爾生四年方復本族既復數月奄然歸無於鞠育而未深結悲傷而何極來也何故去也何緣念當稚戲之辰孰測死生之位時吾赴調京下移家關中事故紛綸光陰遷貿寄瘞爾骨五年於茲白草枯荄荒塗古陌朝飢誰飽夜渴誰憐爾之栖栖吾有罪矣今吾仲姊返葬有期遂遷爾靈來復先域平原卜穴刊石書銘明知過禮之文何忍深情所屬自爾沒後姪輩數人竹馬玉環繡襜文褓堂前堦下日裏風中弄藥爭花紛吾左右獨爾精誠不知何之况吾別娶已來嗣緒未立猶子之誼倍切他人念往撫存五情空熱嗚呼滎水之上檀山之側汝乃曾乃祖松檟森行伯姑仲姑冡墳相接汝來往於此勿怖勿驚華綵衣裳甘香飲食汝來受此無少無多汝伯祭汝汝父哭汝哀哀寄寄汝知之耶
