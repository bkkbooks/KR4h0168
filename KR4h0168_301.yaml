body:
  text: 帝初馳六飛之不測奄四海而作君曜明威嶷崇勳固盡善而盡美又焉得而稱云時屯既康聖躬之豫樂以和操色以怡慮豈曰帝則實惟君舉庸克推腹心增耳目燕趙鄭衛楚越巴漢之邦士農工商皂隸輿臺之族不鄙褊陋不隔賤卑工技者密聞淑邈者遽知上心由是震蕩中使載以交馳周若雲布迅如飇發以日繫時以時繫月德雋相次為樂不歇闐紫微環帝座蕖華灼爍柳容婀娜輕羅隨風長縠舒霧肌膚紅潤柔姿靡質妖豔夭逸絶衆挺出嬛然容冶霍若明媚曼睩騰光以橫波修蛾濯色以總翠齒編貝鬢含雲顏綽約以冰雪氣芬郁而蘭薰腰佩激而成響首飾曜而騰文或纖麗婉以似羸或穠盛態而多肌有沈靜見節有語笑呈姿思若老成體類嬰兒真天子所御者非庶人當有之洎懷春暮睇情晷列筵於林方舟於水自任縱誕相與攀倚鳥間關而共嬌花散亂而增美吹碧葉吐紅蕊左右相視遊嬉未已見頽景之迫濛泛攜密親召近臣陳金罍與瑤席朗月垂光而射人列星奪采長河滅津然後絲竹發越金石鏗鈜守則異器動則和鳴妙舞謂何尚以輕善歌取何矜以清齊列捷獵按次屏營間直往以曳緒欻轉入而旋縈低視候節紆體遺聲遏行雲結遺風衆工相錯迭美不同夕以闌樂亦闋醉以蕩情樂以忘節帝曰今日為娛前代固無當以共悅可得而説衆皆蹁蹮離席遷延咸齊首互舉酒歌千春稱萬壽因進曰妾家賤族陋目褊心陛下衣綺縠與羅紈飾珠翠與碧金燕私陳乎笙鼓和樂象乎瑟琴何恩渥以增極而悅愈之備深顧薄軀之無穀空負惠以難任有美一人激憤含顰凜若秋霜肅然寒筠乃徐進而前止遂抗詞而外陳曰衆妾面諛不可侍君之側指摘背意委曲順色故毀妍而成鄙自崇謬而破直妾異爾情敢對以臆若彼之來違所親離厥夫別兄弟棄舅姑戚族愧羞鄰里嗟吁氣哽咽以填塞涕流離以霑濡心絶瑤臺之表目斷層城之隅人知君命乃天不可讎尚懼盜有移國水或覆舟伊自古之亡主莫不耽此嫚遊借為元龜鑒在宗周衆以為喜妾以為憂於時天顏回移聖心感通竟夜罷寢須明導衷俾革進伎樂者為薦士之官徵豔色者為聘賢之使闕下駿奔王庭麇至野無遺材山無逸人賁然偕道與物恆春若此之淑美豈同夫玉顏絳脣巧笑工顰惑有國之君臣者哉天輔聖德配極而崇帝者祖兮神行慈旨布澤而洽人之父兮叶命高嶽喻壽其齊招靈祜兮飛文孤標灑翰又類使物覩兮騰雄激烈交天聲芬偃上古兮發潤飄清揔此光氣覆下土兮探異閲妙意力猶懸空作矩兮徵往到今辭聽相授無與伍兮臣聞鴟梟不鳴未為瑞鳥猛武雖服豈齊仁獸是由醜性毒行久務常積故也今夫突厥者正與此類安忍殘賊莫顧君親陛下持武義臨之修文德來之既懾威靈又沐聲教以力以勢不得不庭故稽顙稱臣奔命遣使陛下乃能收其傾效雜以從官赴封禪之禮參玉帛之會此德業自盛固不可名焉因復詔許侍宸遊召入禁仗仰英姿之四照送神藝之百發恩意俱極誠無得踰焉乃更賜以馳逐使操弓矢競飛鏃於前同獲獸之樂是屑略太過未敢取也雖聖胸豁達與物無猜而愚心徘徊與時加栗儻此等各懷犬吠交肆盜憎荊卿詭動何羅竊至暫逼嚴蹕稍冒清塵縱即殪元兕墟幽土單于為醢穹廬為汙何塞過責特願陛下勿復親近使知分限待不失常歸於得所此謂回兩曜之鑒袪九宇之憂孰不幸甚彤開元時官右拾遺臣彤言陛下明發不寐展敬山陵朝拜之期必候清曉此誠孝思罔極求諸幽明之宏義也將士發軫路猶曛黑紅塵四合白刃交馳往來不相知左右不相識假令有敗車逸馬朽木枯株則變在不虞患生所忽不可輕也愚臣淺識實以逼迫伏願慮及細微以安宗社拜陵之日必候朝光則凡百歡心普天幸甚臣聞國之興衰在人不在天政之理亂在變不在習故殷辛失道雖得歲而亡齊桓反經雖改法而霸此則神而明之存乎其人之明效也是以五帝不相襲禮三王不相沿樂者豈祖孫父子苟欲殊其業耶誠代異乎宜而時有所適不得已而然耳故能功格天地道濟生人三五而來未聞有弊而不遷以之長治者也國家承亡隋之季開纍聖之業至於憲章彞典立教垂訓可謂詳矣然猶倉廩未實流庸未還俗困兼并人嗟杼軸者所謂能適道矣而未能權積習之見不回而隨時之宜未得故也臣聞漢之五葉孝武為政一廏馬三十萬匹後宮數千人外討戎夷內興宮室殫費之甚實百當今然而古費多而貨有餘今用少而財不足者何也豈非古取山澤而今取貧人哉取山澤則公利厚而人歸於農取貧人則公利薄而人去其業此所以古今不一贏儉相懸故先王之作法也山海有官虞衡有職輕重有術禁發有時一則專農二則饒國濟人盛事也臣實謂當今宜之夫煮海為鹽採山鑄金伐木為室者豐餘之輩也寒而無衣飢而無食庸賃自資者窮苦之流也若能收山海厚利奪豐餘之人蠲調斂重徭免窮苦之子所謂損有餘而益不足帝王之道可不謂然乎臣願陛下詔鹽鐵木等官收興利貨貿遷於人則不及數年府有餘儲矣然後下寬大之令蠲窮獨之徭可以惠㣥生可以柔荒服討百蠻不憂千金之費懷萬國自有三錫之饒雖戎狄猾夏堯湯水旱無足虞也如此則成康刑措而頌聲作臣愚易之臣聞可與守成而難與慮始者常情是也陛下若允臣愚計便付有司則恐由習常就之無日伏請付中書門下令妙擇才幹委以使車則愚臣所獻儻裨萬一奉天適變惟在陛下行之臣某言今月一日中使魏光勝至伏奉手詔當管每驛更加添鞍馬不得停留往來使命者伏以所到郵傳以備急宣由臣術無方致令馬畜有闕忽奉恩詔憂惶失圖臣某中謝臣伏以當府重務無過驛馬臣到官之日惟此是圖雖牧市百端死損相繼蓋緣府界濶遠山谷重深自春多雨馬蹄又軟驅馳石路斃踣實多比於陝虢已西及汝鄭等處道路稍異日夜倍憂又西自永寧東自汜水南到臨汝北達河陽正驛都管一十六所常加填備動以久闕此皆臣無政術上軫聖心蹐地局天不足所處臣今分遣官吏稍加價錢兼令外求冀免有闕臣某中謝又盧會昌到日臣謹依詔旨差人領送上都無任懇迫惶懼之至巨揚州人開元七年中文詞雅麗科官監察御史問朕聞至道雖微不言而化皇天陰步馬相叶其彞信寒暑而生成施雲雨而沐潤垂範作訓樹君育人時有澆淳教垂繁略成湯既聖禹道云亡桑扈谷風屢動詩人之刺塞門反坫時遺宣父之嫌我國家拯彼頽綱開茲盛業朕以不德襲號乘時而皇極之道未敷謨明之軌尚闕思宏厥理其義安從至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可夫禮以飾情情踈則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要又四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋余疑對臣聞太宗文皇之御天下也廣直言之路開納善之門近臣盡規庶人畢議可謂至矣今皇天眷命陛下紹復先業齊心法宮之中冤旒正殿之上詳延秀異詢及芻蕘若乃敷皇極以作則宏禮樂以垂訓彞倫攸序㣥德畢舉斯太宗之盛事也豈前王訪九疇之要貞三極之本能望清光哉天文昭回萬物盡覩臣謬以黃綬之末預聞赤墀之議將何以塞厚問揚天休臣聞諸仲尼曰大道之行與三代之英某未之逮也而有志焉自上皇不歸大道悠久聖人順天地之性究變化之元雖損益以文質或沿襲以忠敬至於飾禮容以昭賁崇樂舞以立象樹君牧人茂時育物其致一也夫務本於道則浮競可以鎮靜習俗於變即純一或以偽遷故輕樂見誚於國風昧禮貽訓於聖典蓋有由焉唐興百有餘載高祖以武功定鼎紐天綱於八紘太宗以睿聖握符纂天光於三象蕩亡隋之頽靡宏聖唐之易盛德大業與三代同風伏惟陛下誕受天休光膺景命粵若昭德殷薦之禮感和通神之教敬事睿聖之徵順時布德之典將以登格皇穹鴻業也啓迪王命大猷也風雨時若休徵也人俗康寧至教也五輝叶訓八方順軌堯舜之盛無以加焉成康之道復何足數而猶曰皇道未敷謨明尚闕發天章於聖藻採至言於輿誦陛下之謙讓也愚臣何足以知之制策曰至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者臣聞王政之端本於性也至化之極歸於理也能盡其性而合乎理則休徵至不盡其性而悖乎理則咎徵至故聖人法天以立性畏天以作則見天道之在五行人事應之彰彰類矣自非統性命之理求天人之端孰能從言以作乂因事以求哲暘順而會其極蒙恆而返其道適於數故雖以五事明宗其極則可以一理貫臣又聞聖心鏡物必採於至妙大道虛象垂契於理先然即繼聖業者其道同遵王度者其化一陛下體周武之盛德訪唐堯之遺事龜圖靈文天光垂象伏願沐時雨於動植散祥風於函泳則大中之道何以尚茲制策曰夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯義四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出臣聞禮樂其所由來尚矣先王所以美教化厚人倫以致太平也必將考其理求其端故揖讓之教末而安上存乎至舞詠之功淺而移風歸乎至易夫辨升降彰采服此禮之所以飾情也登金石翔景瑞此樂之所以通感也故感發於內樂由衷以致和情見乎表禮自外以為異雖清濁之資考性則殊而教化之端在理斯一況今懿綱被遐裔至道冠生靈和理日躋同乎大順非禮樂之化其孰能至此乎夫崇德垂範此同異之用也教齊化密此人俗之融也至如武德之盛武之業也文德之盛順之至也神道設教制四時於炎歷德徽可崇增五行於橫序尊三德於清廟表二容於盛禮聖問昭閟與天道以元亨狂言鄙賤仰天文而知愧謹對先王教人貴賤有等帝藉為重躬青耜於靈壇終畝惟勤法朱紘於御典候鳥星之仲月闢龍鱗於上腴祥應豳詩祈歲功於土穀疑生魯禮罪越命於金章甲即非辜擊之可也且援枹而進聲坎坎於田郊嘉粟佇登福穰穰於歲報司察此舉未曰合宜甲之不伏固當其理興宗元宗時人臣某言臣聞懷祿者恥於冒進事親者貴在及時苟貪非分之榮何報所生之德臣興宗中謝伏奉某月日敕許臣入京覲省者臣母譙郡太夫人曹氏今八十有四一遭風疾倍加羸惙臣之戰灼罔知攸從然曹氏有臣更無他子臣才齠齔父已背亡守志偏棲鍾情善訓恩深徙宅慈過折葼孤危相保臣得成立蕃夷賤末久荷國恩磨鈍策疲已歷三紀腰金拖紫四升八命每慙祿厚慮臣身災況老親在堂迫於衰疾而更晨昏有闕尸素無厭碩鼠貽刺林烏不若尚參朝列心豈遑安特乞停官許從歸侍則藜藿之養子道獲申桑榆之暉母心是慰當今大聖御極㣥賢共理豈資微臣而在冗職雙鳬隻鴈寧覺少多九牛一毛未為增損倘明神見祐母體漸平在臣犬馬敢不驅策伏望採詩人之錫類鑒令伯之陳情曲降鴻私俯矜微懇垂恩遂志死將萬足不勝懇款之至臣某言臣前表自陳上訴母親乞停所職以就私養聖恩未許懇願莫從母子二人肝腦塗地臣某中謝臣初孩則孤未冠而仕不識父兄之教但承慈母之育向母無臣則烏鳥誰哺向臣忘母則禽獸不若更無性命以至成長今臣老母八十五載矣加之疾疹日甚一日有增無減湯藥杜口粥食不入頃乃祈恩請命忍死待臣臣不承聖恩不復見母母不蒙聖造亦不重見臣自從去年漸能開釋若臣又辭母母更別臣臣母必即倚門氣絶上馬心斷母必失臣臣亦失母忠孝雙缺公私並喪假臣強顏苟冒榮寵猶望孝理抑就名教以蕃夷之賤品忝冠冕之清流身帶三印爵封五等入踐命卿出為副將正是臣報國立功榮宗輝戚之時愛惜毛羽保持名位寧可進寸其容退尺豈願損華轂以傅板輿樂間居而忘厚秩士君子猶貪其富貴臣種類豈知其矯飾母不能割慈忍愛子不可背義違親二者之心賢愚共悉方寸既亂焉可以理軍否臧皆凶焉足以謀敵無自招於遄死則未戰以取亡何以為萬人之命赴國家之急陛下於愚臣過聽謂邊將得人則有隴右專知教練兵馬使右驍衛將軍藺廷輝材略冠軍智勇無對今節度王忠嗣知其名已令攝使替臣如流輩諸將皆是可惜臣匹夫之勇而不見萬人之敵何抑烏鳥之衆而不用熊羆之師陛下必以臣幸無大過不令失職即望全其官守罷以軍麾減其俸祿以延老母略許其宿衛兼遂微臣之定省朝則覲君退還侍母公私兩遂忠孝並存母子如初生死萬足遠近夷落咸知聲教無任懇切危急之至臣某言臣聞事君愛親出忠入孝孝苟不足忠能獨全自古及今未之有也臣夙遭凶憫早喪父兄母祗育臣臣惟侍母更相為命逮至於今臣願報國安親兩遂忠孝況臣少從邊役侍養多違母常憶臣積憂成疾往者一辭天闕六變星霜徒叨守郡之榮終切倚門之望加以老母年將遄邁景晏桑榆衰疾交侵藥餌無主頃乃祈哀上請忍死待臣臣幸獲歸寧老母稍安寢息再造之施空荷於乾坤廣大之恩無階於答效臣又聞子急告父臣急告君今母若無臣臣定失母所以隳裂肝膽塵犯威嚴乞停臣尸素之祿假老母殘餘之命誠為至願非敢飾情自聖鑒未回懇誠猶阻而臣又不幸愚子供奉官右威衛郎將守義近臣今惸然形影相弔生人之極無甚於臣老母既見孫亡預愁臣去舊患未損泣盡繼血伏惟聖主孝理天下特降綸言戶有老親令蠲賦役鄉有孝子必表門閭洎乎荒外百蠻咸被教化臣雖戎狄賤品忝沐薰風烏鳥之心實愧乳哺若使貪榮徇祿背義忘親固天地所不容人倫所同棄更何面目敢列聖朝特望上垂天光俯照愚懇矜臣養親之日短效命之日長允其停官許令侍疾四夷慕義陛下之德化無窮豈惟微臣獨荷恩私無任迫切屏營之至休烈開元中官洛陽尉士生於代各安其業或削觚成學或握槧求工道既多門藝非一揆甲言自巷黨爰居道周雖殊蘭蕙之遊且託桑榆之蔭傭書自給道有類於班超因侮見罪迹方均於越汗之責既不見稱折箠之尤理宜從譴暉以魏知古薦為左補闕開元中自邢州司戶參軍召入校正㣥籍餕餘不祭昭彼前聞事且違經慙於達者甲忝居官序式陪精意悅分胙以言旋鄙過屠而自足瞻白華之養孝則盡誠昧非肉之言理難逃責遠儔知禮雖惡於鄒人近取恤刑宜寬於漢典朝宗太子賓客思復子天寶初為京兆尹出為高平太守貶吳興別駕卒臣聞之傳曰辛有適伊川見被髮於野者曰不及百年此其為戎乎其禮先亡矣後秦晉遷陸渾之戎於伊川以其中國之人習戎狄之事一言以實百代可知竊惟王公貴人國之藩翰凡所舉措須合彞典今之乞寒濫觴胡俗臣參聽物議咸言非古作事不法無乃為戒伏願陛下三思籌其所以又道路籍籍咸云皇太子微行觀此戲且元良國本蒼生繄賴輕此馳驟能無暫蹶況胸奴在邸實繁有徒刺客密發何限夷夏卒然奔呼掩襲無備邂逅驚擾則憂在不測白龍魚服取困豫且深可畏也惟陛下愛人活國憂勤庶政今所施為豈徒然矣豈不以元象變見疫癘相仍厭甲兵之災助太陰之氣臣識愚瞽以為無益臣聞皇天無親惟德是輔未聞兆亂以來多福太戊修政而桑穀自萎景公善言而熒惑退舍彰善罰惡天之道也伏願去邪勿疑昭德以待豈區區末法而能定其休咎哉延之開元十年官職方員外郎筠州刺史蘭亭者晉右將軍會稽內史琅琊王羲之逸少所書之詩序也右軍蟬聯美胄蕭散名賢雅好山水尤善草隸以晉穆帝永和九年三月三日宦遊山陰與太原孫統承公孫綽興公廣漢王彬之道生陳郡謝安安石高平郤曇重熙太原王蘊叔仁釋支遁道林及其子凝之徽之操之等四十有二人修祓禊之禮揮毫製序興樂而書用蠶璽紙鼠鬚筆遒美徑健絶代特出凡二十八行三百二十四字字有重者皆搆別體其中之字最多乃有二十許字變轉悉異遂無同者是時殆有神助及醒後他日更書數十本終無及者右軍亦自愛重此書留付子孫傳至七代孫智永即右軍第五子徽之之後安西成王咨議彥祖之孫盧陵王胄曹昱之子陳郡謝少卿之外甥也與兄孝賓俱捨家入道俗號永禪師禪師克嗣良裘精勤此藝常居永欣寺閣上臨書所退筆頭置之於大竹簏簏受一石餘而五簏皆滿凡三十年於閣上臨真草千文八百餘本浙江東諸寺各施一本今有存者猶直錢數萬孝賓改名惠欣兄弟初落髮時住會稽嘉祥寺寺即右軍之舊宅也後以每年拜墓便近因移此寺自右軍之墳及右軍叔薈以下塋域並置山陰縣西南三十一里蘭渚山下梁武帝以欣永二人皆能崇釋教故號所居之寺為永欣焉事見會稽志其臨書之閣至今尚在禪師年近百歲乃終其遺書並付與弟子辨才辨才姓袁氏梁司空昂之元孫博學工文琴奕書畫皆臻其妙每臨禪師之書逼真亂本辨才常於寢房伏梁上鑿為暗檻以貯蘭亭寶惜貴重甚於禪師在日至貞觀中太宗以聽政之暇鋭志玩書臨右軍真草書帖購募備盡唯未得蘭亭尋知此書知在辨才處乃降敕追師入內道場供養恩賚優洽數日後因言次乃問及蘭亭方便善誘無所不至辨才確稱往日侍奉先師實嘗獲見自禪師喪後洊經喪亂墜失不知所在既而不獲遂放歸越中後更推究不離辨才處又敕追辨才入內重問蘭亭如此者三度竟靳固不出上謂侍臣曰右軍之書朕所偏寶就中逸少之迹莫如蘭亭求見此書勞於寤寐此僧暮年又無所用若為得一智略之士設謀計取之尚書右僕射房元齡奏曰監察御史蕭翼者梁元帝之曾孫今貫魏州莘縣負才藝多權謀可充此使必當見獲太宗遂召見翼翼曰若作公使義無得理臣請私行詣彼須得二王雜帖數通太宗依給翼遂改冠微服至洛陽一作潭隨商人船下至越州又衣黃衫極寬長潦倒得山東書生之體日暮入寺巡廊以觀壁畫過辨才院止於門前辨才遙見翼乃問曰何處檀越翼因便前禮拜云弟子是北人來此鬻蠶種歷寺縱觀幸遇禪師寒溫既畢語議便合因延入房內即共圍棋撫琴投壺握槊談説文史意甚相得乃曰白頭如新傾蓋若舊今後無形迹也便留夜宿設缸面藥酒茶果等江東云缸面猶河北稱甕頭謂初熟酒也酣樂之後請賓賦詩辨才探得來字韻其詩曰初醞一缸開新知萬里來披雲同落寞步月共徘徊夜久孤琴思風長旅鴈哀非君有祕術誰照不然灰蕭翼探得招字韻詩曰邂逅款良宵殷勤荷勝招彌天俄若舊初地豈成遙酒蟻傾還泛心猿躁自調誰憐失㣥翼長苦空飄一作良若業風飄妍媸略同彼此諷詠恨相知之晚通宵盡歡明日乃去辨才曰檀越間即更來翼乃載酒赴之興後作詩如是者數次於是詩酒為務僧俗混然遂經旬朔翼示師梁元帝自畫職貢圖師嗟賞不已因談論翰墨翼曰弟子先世皆傳二王楷書法弟子自幼來耽玩今亦有數帖自隨辨才欣然曰明日可攜來看翼依期而往出其書示辨才辨才熟詳之曰是則是矣然未佳善也貧僧有一真迹頗亦殊常翼曰何帖辨才曰蘭亭翼佯笑曰數經亂離真迹豈在必是響榻偽作耳辨才曰禪師在日保惜臨亡之際親付於吾付授有緒那得參差可明日來看及翼到師自於屋梁上檻內出之翼見訖故駁瑕指纇曰果是響榻書也紛競不定自示翼之後更不復安於伏檻並蕭翼二王諸帖並借留置於几案之間辨才時年八十餘每日於窗下臨學數遍其篤好也如此自是翼往還既數童弟等無復猜疑後辨才赴靈汜橋南嚴遷家齋翼遂私來房前謂弟子曰翼遺一物在此童子即為開門翼遂於案上取得蘭亭及御府二王書帖赴永安驛告驛長淩訴曰我是御史奉敕來此今有墨敕可報汝都督知都督齊善行聞之馳來拜謁蕭翼因宣示敕旨具告所由善行走使人召辨才辨才仍在嚴遷家未回寺遽見追呼不知所以又遣散直云侍御史須見及才來見御史乃是房中蕭生也蕭翼報云奉敕遣來取蘭亭蘭亭今得矣故喚師來作別辨才聞語哽絶良久始蘇翼便馳驛而發至都奏御太宗大悅以元齡舉得其人賞錦綵千段擢拜翼為員外郎加入五品賜銀瓶一金縷瓶一碼瑙碗一並實以珠內廏良馬兩匹兼寶裝鞍轡莊宅各一區太宗初怒老僧之祕吝以其年耄不忍加刑數月後仍賜物三千段穀三千石敕越州支給辨才不敢將入已用回造三層寶塔塔甚精麗至今猶存老僧因悸病不能強飯惟啜粥歲餘乃卒帝命供奉榻書人趙模韓道政馮承素諸葛貞等四人各拓數本以賜皇太子諸王近臣貞觀二十三年聖躬不豫幸玉華宮含風殿臨崩謂高宗曰吾欲從汝求一物汝誠孝也豈能違吾心耶汝意何如高宗哽咽流涕引耳聽命太宗曰所欲得蘭亭可與我將去及弓劍不遺同軌畢至隨仙駕入元宮矣今趙模等所拓在者一本尚直錢數萬也人間本亦稀少絶代之珍寶難可再見吾嘗為左千牛將軍時隨牒適越泛巨海登會稽探禹穴訪奇書名僧處士猶倍諸郡固知虞預之著會稽典録人物不絶信而有徵其辨才弟子元素俗姓楊氏華陰人也漢太尉之後六代祖佺期為桓元所害子孫避難流竄江東後遂編貫山陰即吾之外氏近屬今殿中侍御史瑒之族長安三年素師已年九十三視聽不衰猶居永欣寺永禪師故房親向吾説聊以退食之暇略疏始末庶將來君子知吾心之所存付之永明溫起等兄弟其有好事同志者亦無隱焉於時歲在甲寅季春之月上巳之日感前修而撰此記主上每暇隙留神藝術迹逾筆聖偏重蘭亭僕開元十年四月二十七日任筠州刺史蒙恩許拜掃至都尋訪所得委曲緣病不獲詣闕遣男昭成皇太后挽郎吏部常選騎都尉永寫本進其日奉日曜門司宣敕內出絹三十匹賜永於是負恩荷澤手舞足蹈捧戴周旋光駭閭里僕局天聞命伏枕懷欣殊恩忽臨沈疴頓減輒題卷末以示後代朝議郎行職方員外郎上柱國何延之記
