  text: 全唐文欽定全唐文卷三百一向字子回涇州人開元十年召入翰林兼集賢院校理纍遷中書舍人改工部侍郎卒贈華陰太守
  hash: sha256:252f00a7db8bebbcfd6067fc0f9fccd248077f725b2f73dc73e2ae893779297f
