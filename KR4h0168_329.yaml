front:
  text: 全唐文欽定全唐文卷三百二十九義晊開元四年官陝州司戶參軍
  hash: sha256:9264e2a1f01d8db6b191ee2f11b8c76dd876c8d6fec360d0cc95a23c7990bc2e
  markers:
  - {type: head, offset: 14, content: 田義晊, id: KR4h0168_NFKB_329-h1, level: 1}
body:
  text: 虔稽祀典類造之禮攸陳緬睇齋筵俎奠之儀當潔景麗名宗伯展事鹽人白黑孔修錯形飴而在列元纁判備考鹺苦而斯乖雖德之惟馨亦或罔吐而物有奠具謂何獲大事闕供小懲非逭大矣哉聖人之道洋洋乎發育萬物峻極于天優優大哉粵若元不代乎蒼故時不階其用業方騖乎霸則政莫繇於理人之難說也道之難明也英華久彫附枝將墜會聾而鼓不陳則行殷夫子負道遑遑無所鉤用者曷足病已夫子孔氏其先黑帝子本殷人遷於魯弋尼邱山取邱諱字焉以誕彌也握文履度連珠含則衡相月角河口斗唇首法紫宮貌奫黃帝年十有五而志於學貧無束脩謁伯陽訪道德之原考廟朝之則金人未毀覽緘口之銘宥坐斯存識誨盈之器易曰君子學以聚之問以辨之斯之謂也三十而立其道彌尊葢有不壙山不直地摳衣而至者三千餘人矣求也退而是進由也兼人而抑伯魚問學喻觀葦於汚池端木求知恐妨生而送死易曰君子以教思無窮斯之謂也若乃觀易兩卦喟然不怡論詩六章惕焉知懼隨黃口而羅者得勉以慎從兦蓍簪而哭者哀旌其念舊欲給則豫偃也之行得之獨居思仁縚之行也由此易曰君子以朋友講習斯之謂也四十而不惑必聞其政故其參委吏會計平掌乘田牧畜息中都制法則諸侯畢師攝相登庸則敵國咸懼七日而誅兩觀一言而毀三都遂返龜陰之田克殄倡優之樂易曰君子以明罰勅法斯之謂也若乃麛裘韡帶化未洽而謗流章甫衮衣政既行而頌作弱陪臣而強公室登泰山而小天下雖復齊人來遺仍察政以少留及夫魯不致膰遂拂衣而高逝易曰君子以思患而豫防之斯之謂也五十而知天命遂能原物之情嗚呼道之得行也命也曷吾道之不行道之將廢也命也固斯文之未喪乃自衞返魯刪詩定書制禮作樂述易修史故其溫柔敦厚以極操指之情也疏通知遠以闕一字馳驟之迹也恭儉莊敬備周旋揖讓之容也廣博易良明綴兆疾舒之節也屬辭比事裦貶天人之功也潔靜精微範圍乾坤之化也用能極乎天而蟠乎地窮乎性命而通乎鬼神易曰君子以反身修德斯之謂也六十而耳順遂知來物詳夫天殃所及先陳魯廟之災土怪攸興宜識季卿之問辯防風之巨節吳使嗟稱稽肅慎之遺砮陳人悅服顏回不貳吾亦食而無疑商瞿必昌爾詎勞乎更娶齊禽大舞聞備水之謠趙犢其誅起迴輿之操月離于畢既應之猶響萍觸於舟其食之如蜜石函金簡豈謂赤雀之符縹筆單衣方陳紫麟之典易曰君子為能通天下之志斯之謂也至於懷胥附之友感萎蘭以滂沲闕一字禦侮之交聞震雷而惻怛重五教而垂範含萬物而化光人到於今訓其成式故能酌焉而不竭注焉而不滿苟非聰明睿哲達天德者其孰能與於此易曰君子以多識前言往行以畜其德斯之謂也七十而從心所欲不踰矩故虛以受物貴而下人惜其腐餘享以仁人之饋嘉其美味喜當甂中之食請長生之訣引咎於闕一字童聞官志之名訪學於郯子易曰君子以虛受人斯之謂也若乃言而不用莫顧廩邱之封命則未通詎免匡人之厄諱窮久矣而不免者命也求通久矣而不得者時也易曰君子以理歷明時又曰不可榮以祿斯之謂也雖復春居籠兮夏居密秋不風兮冬不煬閱逝川兮若斯歌頹山兮何及越哀公六年夏四月己丑尼父卒凡享年七十有三嗚呼哀哉門人追在三之義盡喪之禮封為馬鬣葬於泗濱公西掌其凶事子貢廬於墓側若乃平鄉聖跡金石乃聞北里神塋草萊自闢噫夫夫子歿而微言絕七十子終而大義乖周日陵遲漢未暇給是使籩豆簠簋將涸源而不流玉戚朱干若顛木之微枿迨乎恭王壞宅得其藏書於是乎夫子之道粲然永錫罔墜者矣於戲棐迪有位示人昭範典墳之迹厥濟生人由後之君子或配其宗名或崇以寵秩故孟堅頌漢述孔相之休邱明志魯傳素王之業又孰知夫是非哉劉氏以哀成恤允曹王以宗聖開家自時厥後享祀罔絕陝州孔子廟堂者後魏恆農太守劉斌之所建也劉君在郡有政理故其柏樹數株尚青青焉我皇唐御歷一百餘年神武開元茲惟四載創則而聿修王度厲精而恢復帝業修文闕職咸秩廢典敷德以柔遠宣慈以和親故其神功滂洋蒙茸陸梁魚頡而鳥亢鳥靈化翕赩旁魄四塞刑清而訟息矣銀青光祿大夫使持節陝州諸軍陝州刺史上柱國金城郡開國公姜師度惟兌之精乃台之耀門傳義窟家有孝聲文章包六氣之和仁言總五行之秀才優武庫當朝服元凱之名時號智囊百代識文強之價一臺歸妙始含香而握蘭獨坐生風更避車而住楫法河歷拜充牣國泉咨岳累遷滿羸人望由左帛丿糸而轉扇惑蜀吏之追攀指分陝以褰帷見虞童之迎拜昔河內取給司徒受委於東京關中是資相國轉饋於西漢非夫寄深邦本功濟人天疇能比庸允光僉屬且夫陝者陰晉之鄙寧秦之郊泛舟而來控引淮海漕粟攸務糇粮軍國又聞闕一字者近鹽之邑鹺人廢常賓祭之用仍歲靡給自公戾止允庶務用能美利紛積㣥綱備舉上資京師旁達鄰國矧封略之內而有不富教者乎爰初下車顧謂儒林郎守博士寗修本曰夫化人成俗者其必由學乎若函丈之義不崇則子衿之詠攸作彼楹宇之彫毀當修葺之修本乃詢事考言庀徒涓日而梅梁初搆丹雘塈茨藻賁壇亭周列槐杏雙童夾侍宛然叔仲之容十哲旁羅莞爾言游之對中散大夫守司馬黃履順通議大夫行長史盧季珣闕一字大夫行司馬趙慶逸並鸞鶴羽儀珪璧符彩比影迭耀闕二字別乘朝議郎行錄事參軍李瑱司功參軍楊淑司倉參軍楊寧司兵參軍李和仲司闕一字參軍扈德思司士參軍甄茂成參軍事李直蕭誼楊絳崔某等並因陪祭上丁肅稽洪烈乃颺言曰周則甘棠蔽芾召伯之所存也魏則茂柏森沈劉君之所藝也今則崇廟設象姜公之所訓也而三賢異日萬古同風使躅空存芳名永缺式瞻真範猥及庸愚游夏難言惕焉兢懼徒以服勤訓迹二紀於茲願備所聞敢為頌曰昔在黑帝感搖光兮白蜺貫月誕幽房兮惟我皇祖元禽翔兮授命天人降生商兮猗歟父嘉五族昌兮君子萬年必有光兮固天將聖不代彰兮為漢制法闡文章兮帝道喪矣霸道項強兮乾坤不交小人長兮其誰宗予遂遑遑兮鳳鳥不至麟亦傷兮述明六藝為紀綱兮身歿道存名益亨彰兮永垂代式謂素王兮泗濱既葬水泱泱兮何壹男子上吾牀兮我壁有七張伯藏兮萬代禮樂惟薦香兮昔邵分陝坐甘棠兮惟劉典郡建廟堂兮歲不我與日毀荒兮載修載葺我公姜兮威儀象設則平鄉兮髹彤藻繪既煒煌兮乃刊貞石頌芬芳兮今來古往永無疆兮子春開元時官陳州長史夫清明著象廣大成形聖人則之作紀資始列於五嶽視以三公率由典常靡不祡燎維厥恆岫實為首稱故知碣石太行萬里延袤闕聳河滸盤薄海隅畢昴降其精淶易疏其浸設險以分中外通氣以出雲雷非陰陽不測之神其孰能與於此也爾其峯崿星聯草樹烟鬱雲仙表其窟宅珍怪產其高深感通應見必契誠德藏者知將兦之兆制勝者效率然之奇龍蛇羽毛安可詳悉幽贊設教神道有憑登臨極目如指諸掌其陰則常嵠廣武林胡樓煩其陽則燕趙殷衞面河泝雒自冀州既載惟彼陶唐隄封庶品波委霧合財力豪贍貨殖繁滋遺風祠宇巋然無易敬神綏福不孤德鄰歆類誕靈可勝紀哉定人禦侮陳迹昭然易知簡能可大可久且收藏曰義生長曰仁仁義所攝祈禱如市有年登稔穰穰滿家和平是恃不生災害我唐列聖重光再造區宇邦本胥悅俊人用彰天工所代無非淑哲惟良共此技賢責成彼美循吏其猶踵武自升中檢玉再展岱宗方嶽省巡躬行未給今之故事牧守是遵敬遠之規載在王府使持節刺史段公字崇簡學古入官政貴清淨人荷其惠吏懾其威博考前聞肅祗明祀每躬行奠享愷弟不忘神之所勞必在君子夫象設靈宇睟容凝湛未施敬而自敬不有威而自威而簷廡階闥尚多湫隘未增閒敞折衷有虧長松靡柏逕隧猶褊公乃審面勢規曲直延觀宇劃垣墉高閈閎通巷術周覽彌望列樹豐碑容衞森羅藻繪彪駮納日月於扃牖駐雲霧於軒楹光色焜煌爛如貝錦不費財力而忽贍不徵力役而自成求諸志誠不亦冥助先是冀方遐邇溥獲元吉初求厚報其徒實繁如山如流委輸所積物無遺乏人不勦勞易於從事百姓無擾商農工賈孚信不遺休徵允集是依是賴自東胡逆命多歷歲年推兦固存天心獨昭乃命大使輔國大將軍左羽林衞大將軍幽府長史兼御史大夫經略軍支度營田節度副大使兼知河北道採訪使南陽郡開國公張守珪分閫董戎假節專制抗棱運策凶渠喪元屈人不戰種落夷謐初有南陽人田登封於此祈福神君降形而謂之曰吾方助順取彼殘孼殄殲元惡懸諸藳街果如其期止暴寧亂兵不血刃野不曝骸迺聖迺神幽贊斯在雖霍山之祐無恤新城之見申生以此寄言曾何等級由是厖睂耉老皤皤然被黃髮者相率而言曰某等上從祖德下及孫謀百有餘年沐浴皇化鼓腹擊壤賡歌太平今屬牧守仁明正身率下我有枳棘岑公不伐而自除昔無襦袴廉叔聿來而稱足別駕符子規長史高元奉司馬李敻等咸輔導忠益克表緹紬詢謀公道實毘方嶽況乎廣運不測幽明協和謀無遺下人不勞止刊石紀事不亦宜乎子春才愧色絲學非博物課虛杼軸敢讓當仁詞曰巍巍巨鎮幽都是託上接蒼昊傍分寥廓並吞冀野枕倚沙漠華夷險界隔閡斯作其一凡所敬遠心惟鬼神式昭祀典大庇烝人苛慝無作政教日新不孤其德必有其鄰其二水火金木配神作主允茲嶽靈實司朔土東生南長西成北聚廥庫開藏爰及坻庾其三五載四覲今古有殊豐約異軌禮物分區明德無替潔粢不渝神理昭晰感應冥符其四昇中告禪名山有五禮亦從宜何必循古率先岱宗望秩周普精一無差允膺福祜其五隨時珍薦必俟王言或降卿士或命司存執禮必備恭惟駿奔式禋明德荷畣乾坤其六我皇立極阜俗寧亂賢才是以凶族咸竄蕞爾林胡假息離叛殲魁撫脅人神協贊其七疇咨牧守實獲我公既敷惠渥亦扇仁風有葺斯廟陋彼昔功隘狹增廣宏廓傍通其八庭廡遂敞官衞彌飾繪事後素昭彰歙赩工無遺巧人不勞力垣墉徑遂內方外直其九門閈高聳豐碑列樹相質匪工受辛寧喻小子何讓敢忘景慕紀功書實恢我王度其十覃懷舊壤野王遺跡元凱造舟於後忿生食邑於前自晉啟山陽鄭錫河沃精靈有作人物代興相彼君林實為茂族感如存之念恭自出之心憑河履冰自貽陷溺終墜而死當奈若何類無忌之永休比元陽之相負況鴒原稱咏本在急難凡今之人莫如兄弟嫂溺禮通於援手季歿義切於投牋孝弟之心聰明正直靈鑒在斯信宿之間克備喪禮誠有應於今日事無隔於古人告以為妖未符通識誣人之罪法有恆規請據愆尢以定刑典龜年與其弟彭年鶴年同著名於開元時命以義夫光昭令德俾立家室其其一作禮或有差同爨則緦已發檀弓之問義居成瑞雅均唐叔之謠王甲冥豫在躬物故無服虞乙至誠必察感而遂通從母薄言因遘憫而興謗鄰人所告何至攻乎異端德音莫違及爾偕老制義居業光輝日新繐帳空懸悲深苦月芝庭獨秀榮曜生春宿草之墳未展生芻之禮擢蘭之砌已交蓂葉之陰縣令能業其官懲忿窒慾州司以明庶政敢復未聞罰既甚於蹊田瑞頗陳於州里欲拘司敗法也何逃或禮出異文緣情僶俛瑞符等級易有隨時未尋物故之由難語不應之坐竚詳靈草之異方書掩瑞之愆彭年開元中歷官兵部侍郎天寶中以罪流嶺南起為濟陰太守累遷吏部侍郎元宗幸蜀賊陷西京脅授偽官憂憤卒贈禮部尚書臣聞明王之理人也設法立制不私喜怒與天下共之忠臣之事主也竭誠盡節不顧榮辱欲天下利之故得上下同心法令明一寬而有制從容以和此葢刑措太平之道也今陛下作人父母勤憂庶政從諫不咈居安慮危臣所以敢進逆耳之言忘忤旨之罪伏願陛下少垂照察幸甚臣聞書曰罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽於人心竊見紫微主書趙誨為取蕃人末河利刀子趁文書特敕處盡趙誨受贜罪不枉法又異監臨貪以敗官事雖挂網議而定罪國有常條若必責之以極典假有罪重倣此者陛下復何以加之於法乎臣又聞政之所興事資賞罰賞罰必信人心乃安輕重或虧手足無措陛下若以借趙誨之命勵貪吏之心以臣之愚又將未益夫法存畫一不啟二門者葢示人以信也先教後罰寧僭無濫者不陷人以罪也若有犯必死則非薄刑之意同罪異罰又非畫一之道何必殺之示信臣非愛人命也惜陛下之法也昔者渭橋驚馬空見罰金高廟盜環惟聞棄市漢幾刑措職此之由釋之之言可以為喻伏惟陛下少留意焉抑臣聞之死者不可復生雖欲改過自新其道無由及也殺氣方深嚴刑在近一物失所聖心不安臣忝諍臣不敢不奏又典律所制輕重各殊笞杖是輕徒死是重爰自近日此道便乖凡所決囚例多非命此乃徒刑有必生之理杖刑為致死之條既紊國經有傷和氣又凡曰造偽例是死囚伏準條格先決一百既要之以斬罪何更加以杖刑臣雖至愚猶知不可凡百達識孰謂其宜又周禮論刑刺之典一曰訊㣥臣二曰訊㣥吏三曰訊萬人陛下若以臣所言事非可用則願陛下訊以㣥吏詢諸宰臣擇善而行國之利也夫古之人臣干救危犯者非一人也然遇主榮達者萬無一也其遭咎罹禍者不可勝數以此觀之豈臣之利也誠為主也伏惟陛下深察之臣識謝中庸才非上達猥以承乏叨居諫官既無涓埃之効實多尸素之責謹獻愚直輕觸威嚴儻益萬分甘之九死臣某言臣伏見詔書內外官取受一匹以上科本罪外放歸田里五匹以上仍於犯處便附貫者臣聞國之大禮必存其故不易其宜循其教不易其俗故禮曰刑者侀也一成而不可變此則百代常行之道也周禮曰刑新國用輕典刑平國用中典刑亂國用重典此又三等用刑之意也然設三槐九棘之吏入鈞金束矢之條葢又慎之至也故詳刑則死者不恨而生者不怨怨恨不生則災害不作災害不作則太平之理也以堯舜之聖猶曰惟刑恤哉以成康之賢故稱明德慎罰為政之道可不慎歟自周室寖微穆王荒耄作五刑之屬立三千之條度時而用所謂刑亂者也春秋之時王道寖壞征伐交起教化不行子產鑄書見疵於叔向荀寅設法獲毀於仲尼偷薄之政自是滋矣秦至始皇專任刑罰赭衣塞路姦邪並生囹圄成市天下愁苦劉項一呼土崩瓦解降自魏晉至於陳隋歷代興兦莫不因此故孔子曰禮樂不興則刑罰不中刑罰不中則人無所措手足誠哉是言也當今天下有道庶政惟和四方無虞萬邦從政正可勝殘去殺道德齊禮大革前非淳風一變今乃下明敕峻刑書深非元元之望也夫刑罰者御人以威法令者示人以信若成而數變則人之心不安嚴而必行則獄訟滋起先王所言議事以制不為刑辟者懼人之有爭心也伏惟陛下取鑒前典率由舊章國用常刑俯收嚴典則政經有序德洽人心萬姓咸曰大哉王心茲用不犯於有司矣且臣聞寬者仁也政者正也上正其道下必從之陛下居無為之時行不嚴之化則如風偃草日用而不知豈待威之以深刑而欲革之以貪性苟縱免而無恥亦何益於政哉臣又聞之至刑無所用至政無所理故楊泉物理論曰姦與天地俱生自然之氣也人主以政御人政寬則姦易禁政急則姦難絕今法雖大設犯者逾多臣愚以為持政之急老子曰法令滋章盜賊多有此葢急刑非止姦之意伏願陛下深思之臣識見近淺才非匡濟謬參列侍忝齒諍臣敢不竭誠以速官謗儻裨政化雖死猶生液開元十二年官亳州臨渙縣尉原夫真性即空從色聲而有相道源無體因法教以沿流所以人天捨千萬之資神鬼建由旬之塔金衣紺髮盡留多寶之臺銀疊青蓮並入真珠之藏湛然釋氏一千餘年輔國大將軍虢國公楊等皆天子貴臣忠義盡節布衣脫粟將軍有丞相之風牛車鹿裘驃騎減中人之產爰抽淨俸申莊嚴之事也華簷覆像盡垂交露之珠王砌連龕更飾雄黃之寶風箏逸韻飛妙響於天宮花雨依微灑香塵於世界猶恐蓬萊海變石折不周仍鐫長者之經必勒輪王之偈書工紀事迺為銘曰昭昭大覺巍巍聖功身融剎海願洽虛空門下眾趣以窒惕闡元門以包蒙物成緣而必應理無幽而不通有美至人股肱良臣受聖寄任聞難經綸英謀貫古韜略通神一蒙金鉞屢建華勛善代不伐功成不居功歸天子善託真如乃貢靈相用答冥符佛心雖空佛福常在願普此因同臻性海璇天寶元年官朝散大夫守倉部郎中至矣哉皇法於天天法於道居大寶者必尊祖以配天孩庶類者咸宅生以母道故四維張國遠宗元教三后在天代紹明德然後彌綸區宇昭格神祇其能繼休美之聖烈首千古之洪化者卓哉煌煌歸我唐室矣皇上受圖享國葢三十戴功侔天地孝誠祖考其高明也布星辰以有倫其博厚也振河海而不洩至於揖㣥后敘彞倫陶鑄堯舜湫隘軒頊者乃皇上之餘事也嘗端居宣室緬懷至道惟德動天夢啟靈應忽恍有物希夷元通實元祖之明命錫無疆之寶歷乃潛誌元象遵誥旁求西亘太白東連鄠杜號周史之經臺枕秦山之幽谷肇居尹喜集法侶為道門後遇皇唐易樓觀為宗聖藥井尚渫僊軾仍存卜勝宗元此為俶落飛泉噴石重林閡景苔蘚地偏以恆深烟雲晝晴而不散睟容挺出赫然有光煥白虹於玉座紉紫氣於仙境洎遘睿覽宛符夢寐譆葢聖人有以見天下之賾而擬諸形容聖人有以見天下之動而觀其會通者可舉之一隅矣其始迓也焚芝朮辟葷羶寂歷無聲擎跽有則初靡荔席次登靈壇徐肩綵杠少息華館清籟颼飀於草樹天雪氛氳於崖谷及路轉莽蒼風順崆峒雲鶴翊以導輿㣥僊扈而成列逮地邇天菀闉輳國門蜺旌鳳簫風馳海合絳節羽葢波屬霧委萬姓翹首於西城百辟候儀於北闕禺禺如也皇上乃捧昇露寢奉先思孝集僊府以陳齋圖混成而告遠不崇朝而通八景未浹旬以遍六合故㣥臣率舞慶靈稱觴獻壽森旗伐鼓何其盛哉於戲元元之道旁礡萬物妙為化先豨韋氏得之而挈天地伏羲氏得之以襲氣母至若王母西崑比之如朝菌麻姑東海涵之如夏蟲沖虛馭風葢錙銖於糠粃王喬控鶴方車閵轢於蓬蒿信無上歟信元氣歟且天啟皇唐儲祉罔極其功神者其應大其源靈者其流長昔王室將傾我則電擊以存國介邱望幸我則雲行以告成汾脽毖祀我則順子以尊后陵寢肅雝我則述經以明孝可謂重椅坤軸復紐乾綱漫衍葳蕤皆皇極之大造也其修缺禮補樂章存樸以嗇人陳兵以訓武奔四夷以歸化主百神而授職者可勝言哉古有仁片言而受福樹一善以獲應況網羅眾制包括鴻徽以神化之貞明協靈命之幽贊克畣修祉不亦宜乎玉真長公主以天孫毓德帝妹聯貴師心此地杳捐代情奏黃籙以比絜瞻白雲而志遠觀主李元崱監齊顏無待上座傅承說為學日益為道日損逍遙山林之下仿徨塵垢之外因聚而議曰今自道以祐主自主以祐人下覃六經上契三極風后力牧協宣朝政關睢麟趾宏被國風禎祥荐臻祅沴不作足以規萬葉示將來赫赫巍巍以表靈貺而迺謝奚斯頌魯之義闕穆滿銘弇之遊是上蔽天休下虧臣禮緣事斷誼蒙竊恧焉於是盩厔宰李嗣琳同荷湛恩以備能事博詢墨客以贊皇道時戶部郎中沛國劉同昇才清起草譽美郎官之列文慕上林能揚天子之事共遵大雅以掞其辭奉為頌同昇開元中官侍御史天寶元年授朝散大夫戶部郎中終南之山多喜境關令尹真宅茲嶺陰陰松柏造華頂草結花樓龍護井靈僊之窟肅而靜其一惟皇夜夢真人來神光赫赫金銀臺瑤容綽約冰雪開霓裳羽駕紛徘徊前聖後聖相承哉其二帝心虔求齋玉京王公百辟咸致誠雲旗綵仗森出迎日月晏溫顥氣晶真容來兮受天慶其三真容來兮聖人壽千春無涯百福有真容來兮寶歷昌遠郊却馬雄四方紫殿敷座煙雲香拜手稽首天地長元元之祉萬斯唐其四國政通班書崇明祀朝則齒爵載分於羔雁祭必毛牲取類於豺獺惟彼五品薦於四時籩豆聿修履濡霜而或惕寢門是祭因掃地而致誠克恭行葦之酌或備采蘋之奠雖夫子立言且云寧儉而聖人行禮必貴從宜恭已習常情稱偪下因心達孝事則由衷屬避馬申威出漢臺而有問索牛是劾撫周禮而猶疑饌取於豐祭從於薄過如不及吾恐失之必存著甲之令請恕先庚之罰喪事攸列凶禮克明佐器者存乎有司致用者期於無恡綴几初設已陳含玉之儀夷盤不供何施造冰之禮且議事以制觀過知仁必若夏日斯炎臭兦達於墻屋亦或當秋露結刑宜麗於簡書如或冬淒已冰寒氣方總則史魚之殯雖且在堂咎繇之謨終期緩獄理則可也彼其詰哉
