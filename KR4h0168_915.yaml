front:
  text: 全唐文欽定全唐文卷九百十五處玉璿開元時沙門
  hash: sha256:ae2d979a52f655151a17afe72a82a27e99059ad3fc676e9ddc7f309096e582e0
  markers:
  - {type: head, offset: 13, content: 處玉璿, id: KR4h0168_NFKB_915-h1, level: 1}
body:
  text: 夫王而作則者大雄見而遄歸者大寶聲被周漢義逸齊梁學比犉毛富如崑玉道飾其行俗賞其音或內祕靈知或外見常迹起伏不拘於闕一字代出沒所謂於須臾孰有以兼之公得其門也惟大德俗姓盧諱敬節范陽人也祖尚書遠葉棲志邱園父樂司徒季英閒居遁世愍於穉子逷以㣥流放令出家不從文秩上可以益后下可以利人不累莊嚴足陪淨藏令投虔和上受業年甫十嵗日誦千言維摩妙高飛峯口海法華素月吐照情田奏梵音以雲楊感神明而雷激厭俗之垢王澤遐沾落髮之貞天魔為慴至二十九入道具臘寺舉都維那二十載清拔僧務造長廊四十間不日克就光嚴帝宇粹表祗園結棟淩霞飛檐振景士拜左顧靡怯風搖人謁右旋非憂雨散亦嘗柔外以定定力振振順中以如如心奕奕笑法橋而虹斷切義舫之神移莫不悼哉何嗟及矣以開元十七年七月十五日終於私房春秋七十有五窆於神和原律也門人處玉璿延阼等念松迴茂仰蕙遙芬悵頹景之不畱恨驚風之早落師魂遠何至資影痛何孤恐岸成川起塔崇禮式為銘曰迹滿三界神放六通教令遞囑德位常融轉延象世運及都公木選寒柏山寶舒虹行高獎下言貴居忠俗承遠聲色道洽化無窮水搖魚徙動人斷院悲空日影何旋北山陰遽已東荒郊悲慘慘烟氣亂葱葱式作營於妙塔用表列於仁雄柩窆歸於泉壤性遙拔於樊籠挫一代之濁命流千古之清風元朗字慧明俗姓傅氏東陽烏傷人大士六世孫浦江江夏太守拯公之後九嵗出家如意元年勅度清泰寺天寶十三年卒年八十二自到靈溪泰然心意高低峯頂振錫常遊石室巖龕拂手宴坐青松碧沼明月自生風埽白雲縱目千里名華香果蜂鳥銜將猿嘯長吟遠近皆聽鋤頭當枕細草為氊世上崢嶸競爭人我心地未達方乃如斯倘有寸陰願垂相訪靖彰天寶中靈昌郡龍興寺沙門觀夫聖應無方等曜靈之流萬象覺海元曠若溟渤之含百川凝然居眾妙之先煥矣處有空之際於是慈光西燭慧液東飛廣開權實之門爰啟布金之義粵茲寶界創自後魏正光二載即孝明帝之賢妹也乃居寵若驚克修雅志確乎出俗入道為尼以誠信有徵勅為置明煉之寺兼度士庶女等百有人矣頃遇周武不敏正教淩夷至隋氏開皇重加修復又度尼廿一人以崇景福暨有唐貞觀三載議將尼寺居山慮恐匪人侵擾勅令移額於偃師縣下置此因廢焉至神龍二載七月廿五日有嵩岳寺都維那僧道瑩奏聞此故寺依山帶水形勝幽棲不假多工便堪居住伏惟故永泰公主器韞沖和承規帝闕庶增瓊萼冀保瑤枝何圖厭代辭榮遷神遂遠二聖痛金娥之殞兆人興玉碎之悲凡厥有情孰不傷悼至論潛祐必賴薰修伏望天恩為永泰公主於前件故伽藍置寺一所請以永泰為名特望度僧二七人庶使福資冥路竊惟聖不孤運會緣必興建寺立僧實由於此自茲以降暨乎至今亦有別勅配居或牒兩京名德翼翼清眾五十餘人咸以軌範端融心澄海月鵝珠育物禮誦無虧常懷報國之恩庶願福增皇祚千佛二古塔者昔明煉之所起亭亭四照嶷嶷搖空龕室玲瓏重光迴映其間大窣堵坡者隋仁壽二載之所置文帝應命感異稀奇忽得舍利一缾雪毫燦爛火焚益固擊之逾明乃詔天下梵場令起塔供養為蒼生之祈福也規制妙絕神工未方永鎮檀林以昭盛烈東有兩支提者昔寺主道瑩上座崇敬遺教門人之所造也二長老僧惎國寶振古超今息化歸心法俗追悼故起斯塔前門樓浴室食堂經藏者即大德曇陟律之所構也律師宿智圓明知微察物少編僧錄風骨天然精持大乘元通數部不住無相兼崇有為沙門思悟者心燈獨知跡無住處諸佛遺旨必能竭其筋力諸魔動念必不愛其死生乃跋涉山川樸斲梓食堂之力頗有助云九級浮圖者比邱真一敬為故兄寺主真藏之所建也禪師積德累仁果曾慈惠玉昆金友俱離塵籠弟子沙門志堅及陳畱郡封禪寺都維那僧希宴等敬為和上樹茲景業寺主絢彩凝華心鏡虛朗再成寶殿重立尊儀但有闕遺盡加營葺幷鑄大銅鐘一口重四千斤函二十石裝飾嚴麗備物維新金容將滿月齊暉玉相與日輪爭曜簷宇四繞迴廊復周蹬道淩虛縣階數帀風鈴夜警聲聲流解脫之音曉梵朝吟一一讚苦空之偈嘉木繁植祥花接異以恒春高柳垂幡喬松結葢而雲際前寺主道演前上座智光前都維那僧元順皆體道歸一異本同源逍遙林泉躧履雲壑復有沙門法意敬一等至樂大乘沈心不二一日必葺當賈勇而行諸六時精勤縱力極而不廢其寺也嵩巖右脇龍津左傍前眺案崗萬公居後地形澄垽幽磎對靈鎮之臺山勢巍峩峯頂與層巒俱峻昔跋陁三藏縣記此方人安眾和福利彌廣時上座明信寺主道峻都維那敬一等暜操履霜潔動成紀綱德義相資同知寺任但恐三輪一轉海際塵驚若不刊勒貞璆何以表之靈跡靖彰內慚深定外謝多聞敢違宿心昧揚休烈其詞曰佛性微遍含識隱顯自在兮無量力開祕藏燿無疆寶剎嚴凝兮仙路長韻慈鐘震縣極警眾沈昏兮清閫域光勝宅啟津梁淨彼地獄兮與天堂昔明煉今永泰跋陁遠記兮斯為大刻珍石炳微言曠代昭宣兮萬祀傳德宣天寶中龍興寺沙門觀夫二儀之大也不能免天傾地裂之災三光之明也不能免日薄星迴之變非夫圓明鍾覺利見大雄飛觀真峯高視鐵圍之外澄襟性海獨瑩珠泉之底者其孰能置四生於不動之國濟八苦於無明之河祕密成伊演龍藏於三千世界童蒙求我運牛車於五百由旬所以太子迴心捨宮殿臣妾商人合掌奉珍珠琉璃給孤獨園一家之造精舍瑯琊別產兩宅之入伽藍大矣哉其誰繼之我司徒陳公之謂也公諱杲仁字世威其先豫州潁川人也十七代祖寔為太邱長六世祖陳武帝經天緯地之功與乾坤而合道濟俗安人之德共日月而齊明家於長城故復為晉陵人也祖暠字元皎陳羽林郎將萬戶千門警夜巡晝旌旗曳日朝馳楊柳之街鐘鼓沸天夕衞鴛鴦之殿別勅授洪州建昌縣令戴星按俗靡草臨人澤被春滋愛融冬日花藏野雉戀錦化而長馴煙渚庭鸞懷磬聲而率舞父諱季明字元煥陳江州司馬兼嶺南道採訪使尋拜給事中朱紱題輿按三江而寫鑒皇華按節踰五嶺而騰驤出揚使德之清入掌王言之重公器局宏偉風神灑肅年八嵗能文章隨父任在都宅與吏部侍郎陰鏗接住鏗家置學就博士授孝經尚書以夜繼晝口不輟誦鏗曰吾之東家某復生矣年十三讀史至司馬相如題橋之言歎曰大丈夫富貴由天窮達在命使吾有壽亦當自致青雲年十八州將舉秀才送上臺對策於玉階舉朝稱之曰使孫宏之文李廣之武與子同時則並驅連衡矣帝曰朕與兒俱太邱之後家風不墜復見於茲特授監察御史尋遷江南道巡察大使臺中繡服馳驄馬而時來陌上朱輪按豺狼而不去大業五年三月長白山大洞內有狂寇數萬公奉詔平之授秉義尉尋授朝請大夫九年正月奉詔平江寧樂伯通叛徒十萬授銀青光祿大夫十三年奉詔平東陽婁世幹賊徒二十萬隋主嘉之召公面見拜大司徒賜麗姝二十人細馬五匹粟千斛綵五百段對敭休命輔佐王官金印紫章照彤庭而赫奕綵羅紅粟填帑藏以崔嵬屬隋季分崩天下喪亂洎我大唐之有天下也日月懸而天地再造歷數在而車書一統聖人御宇萬國來朝奉詔詢江東晉陵耆老隋故司徒陳杲仁身有八絕可得聞乎耆老逡巡而稱曰言八絕者一忠二孝三文四武五信六義七謀八辨梁大同中義興縣與晉陵競太湖田數年不決太守命公斷之咸悅服焉建始中長白山叛徒引及朝貴公奉詔推鞫繩黠顯然而知鑑逾明鏡直若朱弦梁末斷太湖之田是非明白陳初劾長山之賊真偽糺分兩造平反聲馳省閣片言折中譽出鄉閭公之忠也公事後親親病須肉時屬禁屠肉不可致公乃割股以充羹刺血寫法華經為先妣修福孝深骨立情慎色難豈惟孝悌之有餘亦迺津梁之莫大公之孝也初公選在都會吏部侍郎陰鏗出使西蜀中書令江總北巡徐泗傾都餞於新亭時公奉詔作大使西巡序及北征賦恩思逸懷蛟才高倚馬入江寫月光含夷水之珠詞花飛葉綵麗蜀城之錦公之文也而邊寇不寧戎馬屢駕百川潛討三畧陰謀巨力取而拔山功歸第一神鑹來而破的中必疊雙兇徒與惡葉同飄逆黨共春冰一泮公之武也豁達大度浤澄春陂勝必推人失乃向已官祿給其粟帛盡散親朋皇恩加其僕馬併均昆弟公之義也既忠且信十室彰夫子之名密契深期千里命巨卿之駕確乎不拔惕若有孚公之信也攻城畧地祕策權宜進楚食而離范增奪胡鞍而輸李廣公之謀也折角無先共朱雲而竝操懸河不竭與郭象而連詞公之辨也帝曰俞雖曲逆辯六奇之計陳王懷八斗之才論功揆德莫之加也芳名馳於萬古壯志立於三吳陳書雖著其高名唐史未編其實錄勅史官宜書直筆大業中天門公沈法興起義兵於湖州聞公名遠來投公是知龍門之前涸鮒搖腮而競集鵲巢之側維鳩拂羽而爭來法興欲割據常州詐結父子之義時逆人李子通屯集數萬鎮在江北懼公之威不敢輒渡法興潛謀詐稱疾亟公往問疾乃覺中毒走馬而歸公素與高僧凜禪師著屋塵外之交法師尋與受菩薩戒付囑張軫二夫人所居之華第竝道南兵仗院竝施為僧伽藍名杜業寺是郡東南三十五里公之別業紅沼夏溢芰荷發而惠風香綠田秋肥霜露降而嘉禾熟竝捨入景星寺言訖而終雖幽魂冥冥梁木斯壞而生氣凜凜高風尚存功可勒石食堪配廟故夫子文鍾嶺南疑骨喪而名畱太伯吳門文身無而道在况公神異越於昔賢左遮江關東壓海口使天無流疫路不拾遺江上伏鬼神若稱官勢郡中散牛馬以付羅衡四民銜覆護之恩百姓荷扶持之力其寺明政人三年六月之所置也初名杜業後改為宏業因廟諱復改為福業嗚呼公以武德二年嵗次庚辰五月十八日而斃享年七十二厥後薨辰精舍坊闉答公之恩飯僧供佛皓月有昃香燈無虧亦由晉感子推之辭楚懷屈原之德懋哉垂裕貽厥後昆公之長子坦廣府士曹次子頵洪州司法難兄難弟如珪如璋弄雙珠之明匡二天之化頵之子璉不餌葷血早悟苦空得菩薩心有神仙壽年九十一卒於家璉之子光允雅繼清風棲心金地德必有鄰同聲相應與孝門岑庭結交二人同心鑄文殊菩薩像用鐵千觔又勸同志之士鑄暜賢菩薩像體均前種相好圓明寫妙德之奇姿移寶威之真跡太守劉公同昇兼江東道採訪使四岳分憂九州共理玉壺冰寫讓心骨之清紅樹花開怯文章之秀長史歐陽公司馬孫公竝望重題輿才高展驥親紆化鶴共佐懸魚縣令何公共掞天下之才共臨江縣未摶風於九霄且震雷於百里福業寺綱維徒眾等竝貞諒不拔維持有聲莫不道俗相率誠命於予式歌文武之功共紀招提之業於戲年更事遠懼馨香之闕遺詢諸碩才備茲景行勉抽鄙思乃為銘曰昭哉烈士兮昂昂擅波蜜兮自強捨一家兮良田甲第成三寶兮佛土僧坊生則侯兮傑出歿而配廟兮名揚聖后兮聰明光宅何奸寇兮殘剝遐方明神八絕兮宏祜飛將一埽兮銷亡悲盛績兮江南蕪沒樹豐碑兮海內昭彰法海字文允俗姓張氏丹陽人一云曲江人出家鶴林寺為六祖弟子天寶中預揚州法慎律師講席大師名惠能父盧氏諱行瑫母李氏誕師於唐貞觀十二年戊戌二月八日子時時亮光騰空異香滿室黎明有二異僧造謁謂師之父曰夜來生兒專為安名可上惠下能也父曰何名惠能僧曰惠者以法惠施眾生能者能作佛事言畢而出不知所之師不飲乳夜遇神人灌以甘露既長年二十有四聞經悟道往黃梅求印可五祖器之付衣法令嗣祖位時龍翔元年辛酉嵗也南歸隱遯一十六年至儀鳳元年丙子正月八日會印宗法師宗悟契師旨是月十五日暜會四眾為師薙髮二月八日集諸名德授具足戒西京智光律師為授戒師蘇州慧靜律師為羯磨荊州通應律師為教授中天耆多羅律師為說戒西國蜜多三藏為證戒其戒壇乃宋朝求那跋陀羅三藏刱建立碑曰後當有肉身菩薩於此收戒又梁天監元年智藥三藏自西竺國航海而來將彼土菩提樹一株植此壇畔亦預誌曰後一百七十年有肉身菩薩於此樹下開濱上乘度無量眾真傳佛心印之法主也師至是祝髮受戒及與四眾開示單傳之法旨一如昔讖以天監元年壬午嵗考至唐儀鳳元年丙子是得一百七十有五年次年春師辭眾歸寶林印宗與緇白送者千餘人直至曹溪時荊州通應律師與學者數百人依師而往至曹溪寶林覩堂宇湫隘不足容眾欲廣之遂謁里人陳亞仙曰老僧欲就檀越求坐具地得不仙曰和尚坐具幾許濶祖出坐具示之亞仙唯然祖以坐具一展盡罩曹溪四境四天王現身坐鎮四方今寺境有天王嶺因茲而名仙曰知和尚法力廣大但吾高祖墳墓竝在此地他日造墓幸望存畱餘願盡捨永為寶坊然此地乃生龍白象來脈只可平天不可平地寺後營建一依其言師游墳內山水勝處輒憇近遂成蘭若一十三所今曰花果院隸藉寺門茲寶林道場亦先是西國智藥三藏自南海經曹溪口掬水而飲香美異之謂其徒曰此水與西天之水無別溪源上必有勝地堪為蘭若隨流至源上四顧山水回環峯巒奇秀嘆曰宛如西天寶林山也乃謂曹溪村居民曰可於此山建一梵剎一百七十年後當有無上法寶於此濱化得道者如林宜號寶林時韶州牧侯敬中以其言具表聞奏上可其請賜寶林為額遂成梵官落成於梁天監三年寺殿前有潭一所龍常出沒其間觸撓林木一日現形甚巨波浪洶湧雲霧陰翳徒罪皆懼師叱之曰爾只能現大身不能現小身若為神龍當能變化以小現大以大現小也其龍忽沒俄頃復現小身躍出潭面師展鉢試之曰爾且不敢入老僧鉢盂裏龍乃游揚至前師以鉢舀之龍不能動師持鉢堂上與龍說法龍遂蛻骨而去其骨長可七寸首尾角足皆具畱傳寺門師後以土石堙其潭今殿前左側有鐵塔處是也龍骨至已卯寺罹兵火因失未知所之
