front:
  text: 全唐文欽定全唐文卷五百八十二柳宗元十四
  hash: sha256:1b712594e4ff9362add6d360fb5db9477a87075f9a6a9a98570be5675eb4bea5
body:
  text: 管子以禮義廉恥為四維吾疑非管子之言也彼所謂廉者曰不蔽惡也世人之命廉者曰不苟得也所謂恥者曰不從枉也世人之命恥者曰羞為非也然則二者果義歟非歟吾見其有二維未見其所以為四也夫不蔽惡者豈不以蔽惡為不義而去之乎夫不苟得者豈不以苟得為不義而不為乎雖不從雖不從一無不字枉與羞為非皆然然則廉與恥義之小節也不得與義抗而為維聖人之所以立天下曰仁義仁主恩義主斷恩者親之斷者宜之而理道畢矣蹈之斯為道得之斯為德履之斯為禮誠之斯為信皆由其所之而異名今管氏所以為維者殆非聖人之所立乎又曰一維絕則傾二維絕則危三維絕則覆四維絕則滅若義之絕則廉與恥其果存乎廉與恥存則義果絕乎人既蔽惡矣苟得矣從枉矣為非而無羞矣則義果存乎使管子庸人也則為此言管子而少知理道則四維者非管子之言也天地果無初乎吾不得而知之也生人果有初乎吾不得而知之也然則孰為近曰有初為近孰明之由封建而明之也彼封建者更古聖王堯舜禹湯文武而莫能去之蓋非不欲去之也勢不可也勢之來一本來字下有則字其生人之初乎不初無以有封建封建非聖人意也彼其初與萬物皆生草木榛榛鹿豕狉狉人不能搏噬而且無毛羽莫克自奉自衞荀卿有言必將假物以為用者也夫假物者必爭爭而不已必就其能斷曲直者而聽命焉其智而明者所伏必眾告之以直而不改必痛之而後畏由是君長刑政生焉故近者聚而為㣥㣥之分其爭必大大而後有兵有德乂有大者眾㣥之長又就而聽命焉以安其屬於是有諸侯之列則其爭又有大者焉德又大者諸侯之列又就而聽命焉以安其封於是有方伯連帥之類則其爭又有大者焉德又大者方伯連帥之類又就而聽命焉以安其人然後天下會於一是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子自天子至於里胥其德在人者死必求其嗣而奉之故封建非聖人意也勢也夫堯舜禹湯之事遠矣及有周而甚詳周有天下裂土田而瓜分之設五等邦㣥后布濩星羅四周於天下輪運而輻集合為朝覲會同離為守臣扞城然而降於夷王害禮傷尊下堂而迎覲者歷於宣王挾中興復古之德雄南征北伐之威卒不能定魯侯之嗣陵夷迄於幽厲王室東徙而自列為諸侯厥後問鼎之輕重者有之射王中肩者有之伐凡伯誅萇宏者有之天下乖盭無君君之心予以為周之喪久矣徒建空名於公侯之上耳得非諸侯之盛強末大不掉之咎歟遂判為十二合為七國威分於陪臣之邦國殄於後封之秦則周之敗端其在乎此矣秦有天下裂都會而為之郡邑廢侯衞而為之守宰據天下之雄圖都六合之上游攝制四海運於掌握之內此其所以為得也不數載而天下大壞其有由矣亟役萬人暴其威刑竭其貨賄負鋤梃讁戍之徒圜視而合從大呼而成㣥時則有叛人而無叛吏人怨於下而吏畏於上天下相合殺守劫令而並起咎在人怨非郡邑之制失也漢有天下矯秦之枉徇周之制剖海內而立宗子封功臣數年之間奔命扶傷而不暇困平城病流矢陵遲不救者三代後乃謀臣獻畫而離削自守矣然而封建之始郡國居半時則有叛國而無叛郡秦制之得亦以明矣繼漢而帝者雖百代可知也唐興制州邑立守宰此其所以為宜也然猶桀猾時起虐害方域者失不在於州而在於兵時則有叛將而無叛州州縣之設固不可革也或者曰封建者必私其土子其人適其俗修其理施化易也守宰者苟其心思遷其秩而已何能理乎予又非之周之事跡斷可見矣列侯驕盈黷貨事戎大凡亂國多理國寡侯伯不得變其政天子不得變其君私土於人者百不有一失在於制不在於政周事然也秦之事跡亦斷可見矣有理人之制而不委郡邑是矣有理人之臣而不使守宰是矣郡邑不得正其制守宰不得行其理酷刑苦役而萬人側目失在於政不在於制秦事然也漢興天子之政行於郡不行於國制其守宰不制其侯王侯王雖亂不可變也國人雖病不可除也及夫大逆不道然後掩捕而遷之勒兵而夷之耳大逆未彰姦利浚財怙勢作威大刻於民者無如之何及夫郡邑可謂理且安矣何以言之且漢知孟舒於田叔得魏尚於馮唐聞黃霸之明審覩汲黯之簡靖拜之可也復其位可也臥而委之以輯一方可也有罪得以黜有能得以獎朝拜而不道夕斥之矣夕受而不法朝斥之矣設使漢室盡城邑而侯王之縱令其亂人戚之而已孟舒魏尚之術莫得而施黃霸汲黯之化莫得而行明譴而導之拜受而退已違矣下令而削之締交合從之謀周於同列則相顧裂眦勃然而起幸而不起則削其半削其半民猶瘁矣曷若舉而移之以全其人乎漢事然也今國家盡制郡邑連置守宰其不可變也固矣善制兵謹擇守則理平矣或者又曰夏商周漢封建而延秦郡邑而促尤非所謂知理者也魏之承漢也封爵猶建晉之承魏也因循不革而二姓陵替不聞延祚今矯而變之垂二百祀大業彌固何繫於諸侯哉或者又以為殷周聖王也而不革其制固不當復議也是大不然夫殷周之不革者是不得已也蓋以諸侯歸殷者三千焉資以黜夏湯不得而廢歸周者八百焉資以勝殷武王不得而易徇之以為安仍之以為俗湯武之所不得已也夫不得已非公之大者也私其力於己也私其衞於子孫也秦之所以革之者其為制公之大者也其情私也私其一己之威也私其盡臣畜於我也然而公天下之端自秦始夫天下之道理安斯得人者也使賢者居上不肖者居下而後可以理安今夫封建者繼世而理繼世而理者上果賢乎下果不肖乎則生人之理亂未可知也將欲利其社稷以一其人之視聽則又有世大夫世食祿邑以盡其封略聖賢生於其時亦一本無亦字無以立於天下封建者為之也豈聖人之制使至於是乎吾固曰非聖人之意也勢也柳子曰仁義忠信先儒名以為天爵未之盡也夫天之貴斯人也則付剛健純粹於其躬倬為至靈大者聖神其次賢能所謂貴也剛健之氣鍾於人也為志得之者運行而可大悠久而不息拳拳於得善孜孜於嗜學則志者其一端耳純粹之氣注於人也為明得之者爽達而先覺鑒照而無隱盹盹於獨見淵淵於默識則明者又其一端耳明離為天之用恒久為天之道舉斯二者人倫之要盡是焉故善言天爵者不必在道德忠信明與志而已矣道德之於人猶陰陽之於天也仁義忠信猶春秋冬夏也舉明離之用運恒久之道所以成四時而行陰陽也宣無隱之明著不息之志所以備四美而富道德也故人有好學不倦而迷其道撓其志者明之不至耳有照物無遺而蕩其性脫其守者志之不至耳明以鑒之志以取之役用其道德之本舒布其五常之質充之而彌六合播之而奮百代聖賢之事也然則聖賢之異愚也職此而巳使仲尼之志之明可得而奪則庸夫矣授之於庸夫則仲尼矣若乃明之遠邇志之恒久庸非天爵之有級哉故聖人曰敏以求之明之謂也為之不厭志之謂也道德與五常存乎人者也克明而有恒受於天者也嗚呼後之學者盡力於斯一本無斯字所及焉或曰子所謂天付之者若開府庫焉量而與之耶曰否其各合乎氣者也莊周言天曰自然吾取之或問曰守道不如守官何如對曰是非聖人之言傳之者誤也官也者道之器也離之非也未有守官而失道守道而失官之事者是固非聖人之言乃傳之者誤也夫皮冠者是虞人之物也物者道之準也守其物由其準而後其道存焉苟舍之是失道也凡聖人之所以為經紀為名物無非道者命之曰官官是以行吾道云爾是故立之君臣官府衣裳輿馬章綬之數會朝表著周旋行列之等是道之所存也則又示之典命書制符璽奏復之文參伍殷輔陪臺之役是道之所由也則又勸之以爵祿慶賞之美懲之以黜遠鞭撲梏拲斬殺之慘是道之所行也故自天子至於庶民咸守其經分而無有失道者和之至也失其物去其準道從而喪矣易其小者而大者亦從而喪矣古者居其位思死其官可易而失之哉禮記曰道合則服從不可則去孟子曰有官守者不得其職則去然則失其道而居其官者古之人不與也是故在上不為抗在下不為損矢人者不為不仁函人者不為仁率其職司其局交相致以全其工也易位而處各安其分而道達於天下也也一作矣且夫官所以行道也而曰守道不如守官蓋亦喪其本矣未有守官而失道守道而失官之事者也是非聖人之言傳之者誤也果矣呂氏春秋十二紀漢儒論以為月令措諸禮以為大法焉其言有十二月七十有二候迎日步氣以追寒暑之序類其物宜而逆為之備聖人之作也然而聖人之道不窮異以為神不引天以為高利於人備於事如斯而已矣觀月令之說苟以合五事配五行而施其政令離聖人之道不亦遠乎凡政令之作有俟時而行之者有不俟時而行之者是故孟春修封疆端徑術相土宜無聚大眾仲春利堤防達溝瀆止田獵備蠶器季春合牛馬百工無悖於時孟夏無起土功無發大眾勸農勉人仲夏班馬政聚百藥季夏行水殺草糞田疇美土疆土功兵事不作孟秋納材葦仲秋勸人種麥季秋休百工人皆入室具衣裘舉五穀之要合秩芻養犧牲趨人收斂務蓄菜伐薪為炭孟冬築城郭穿竇窖修囷倉謹葢藏勞農以休息之收水澤之賦仲冬伐木取竹箭季冬講武習射御出五穀種計耦耕具田器合諸侯制百縣輕重之法貢賦之數斯固俟時而行之所謂敬授人時者也其餘郊廟百祀亦古之遺典不可以廢誠使古之為政者非春無以布德和令行慶施惠養幼少省囹圄賜貧窮禮賢者非夏無以贊傑俊遂賢良舉長大行爵出祿斷薄刑決小罪節嗜慾靜百官非秋無以選士勵兵任有功誅暴慢明好惡修法制養衰老申嚴百刑斬殺必當非冬無以賞死事恤孤寡舉阿黨易關市來商旅審門閭正貴戚近習罷官之無事者去器之無用者則其闕政亦以繁矣斯固不俟時而行之者也變天之道絕地之理亂人之紀舍孟春則可以有事乎作淫巧以蕩上心舍季春則可以為之者乎夫如是內不可以納於君心外不可以施於人事勿書之可也又曰反時令則有飄風暴雨霜雪水潦大旱沈陰氛霧寒煖之氣大疫風欬鼻丸嚏瘧寒疥癘之疾螟蝗五穀瓜瓠果實不成蓬蒿藜莠並興之異女災胎夭傷水火之訛寇戎來入相掠兵革並起道路不通邊境不寧土地分裂四鄙入保流亡遷徙之變若是者特瞽史之語非出於聖人者也然則夏后周公之典逸矣或者曰月令之所作以為君人者法也蓋非為聰明睿智者為之將慮後代有昏昧傲誕而肆於人上忽先王之典舉而廢之近而取之若陳隋之季是也故取仁義禮智信之事附於時令俾時至而有以發之也不為之將因循放蕩而皆無其意焉爾於是又為之言五行之反戾相盪相摩妖災之說以震動於厥心古之所以防昏亂之術也今子發而揚之使前人之奧祕布露顯明則後之人而又何憚耶曰聖人之為教立中道以示於後曰仁曰義曰禮曰智曰信謂之五常言可以常行一本行字下有之字者也防昏亂之術為之勤勤然書於方冊興亡治亂之致永守是而不去也未聞其威之以怪而使之時而為善所以滋其怠傲而忘理也語怪而威之所以熾其昏邪淫惑而為禱禳厭勝鬼怪之事以大亂於人也且吾子以為畏冊書之多孰與畏人之言使諤諤者言仁義利害焯乎列於其前而猶不悟奚暇顧月令哉是故聖人為大經以存其直道將以遺後世之君臣必言其中正而去其奇衺其有嚚然而不顧者雖聖人復生無如之何又何冊書之有若陳隋之季暴戾淫放則無不為矣求之二史豈復有行月令之事者乎然而其臣有勁悍者爭而與之言先王之道猶十百而一遂焉然則月令之無益於陳隋亦固矣立大中去大惑捨是而曰聖人之道吾未之信也用吾子之說罪我者雖窮萬世吾無憾焉爾余既為斷刑論或者以釋刑復於余其辭云云余不得已而為之一言焉夫聖人之為賞罰者非他所以懲勸者也賞務速而後有勸罰務速而後有懲必曰賞以春夏而刑以秋冬而謂之至理者偽也使秋冬為善者必俟春夏而後賞則為善者必怠春夏為不善者必俟秋冬而後罰則為不善者必懈為善者怠為不善者懈是敺天下之人而入於罪也敺天下之人入於罪又緩而慢之以滋其懈怠此刑之所以不措也必使為善者不越月踰時而得其賞則人勇而有勸焉為不善者不越月踰時而得其罰則人懼而有懲焉為善者日以有勸為不善者日以有懲是敺天下之人而從善遠罪也敺天下之人而從善遠罪是刑之所以措而化之所以成也或者務言天而不言人是惑於道者也胡不謀之人心以熟吾道吾道之盡而人化矣是知蒼蒼者焉能與吾事而暇知之哉果以為天時之可得順太和之可得致則全吾道而得之矣全吾道而不得者非所謂天也非所謂太和也是亦必無而已矣又何必枉吾之道曲順其時以諂是物哉吾固知順時之得天不如順人順道之得天也何也使犯死者自春而窮其辭欲死不可得貫三木加連鎖而致之獄吏大暑者數月痒不得搔痺不得搖痛不得摩飢不得時而食渴不得時而飲目不得瞑支不得舒怨號之聲聞於里人如是而太和之不傷天時之不逆是亦必無而已矣彼其所宜得者死而已也又若是焉何哉或者乃以為雪霜者天之經也雷霆者天之權也非常之罪不時可以殺人之權也當刑者必順時而殺人之經也是又不然夫雷霆雪霜者特一氣耳非有心於物者也聖人有心於物者也春夏之有雷霆也或發而震破巨石裂大木木石豈為非常之罪也哉秋冬之有霜雪也舉草木而殘之草木豈有非常之罪也哉彼豈有懲於物也哉彼無所懲則效之者惑也果以為仁必知經智必知權是又未盡於經權之道也何也經也者常也權也者達經者也皆仁智之事也離之滋惑矣經非權則泥權非經則悖是二者強名也曰當斯盡之矣當也者大中之道也離而為名者大中之器用也知經而不知權不知經者也知權而不知經不知權者也偏知而謂之智不智者也偏守而謂之仁不仁者也知經者不以異物害吾道知權者不以常人怫吾慮合之於一而不疑者信於一本無於字道而已矣且古之所以言天者蓋以愚蚩蚩者耳非為聰明睿智者設也或者之未達不思之甚也春秋之說曰凡師有鐘鼓曰伐無曰侵周禮大司馬九伐之法曰賊賢害人則伐之負固不服則侵之然則所謂伐之者聲其惡於天下也聲其惡於天下必有以厭於天下之心夫然後得行焉古之守臣有朘人之財危人之生而又害賢人者內必棄於其人外必棄於諸侯從而後加伐焉動必克矣然猶校德而後舉量力而後會備三有餘以用其人一曰義有餘二曰人力有餘三曰貨食有餘是三者大備則又立其禮正其名修其辭其害物也小則誥誓徵令不過其鄰雖大不出所暴非有逆天地橫四海者不以動天下之師故師不踰時而功成焉斯為人之舉也故公之公之而鐘鼓作焉夫所謂侵之者獨以其負固不服而壅王命也內以保其人外不犯於諸侯其過惡不足暴於天下致文告修文德而又不變然後以師問焉是為制命之舉非為人之舉也故私之私之故鐘鼓不作斯聖人之所志也周道既壞兵車之軌交於天下而罕知侵伐之端焉是故以無道而正無道者有之以無道而正有道者有之不增德而以遂威者又有之故世日亂一變而至於戰國而生人耗矣是以有其力無其財君子不以動眾有其力有其財無其義君子不以帥師合是三者而明其公私之說而後可可下一本有行字焉嗚呼後之用師者有能觀其侵伐之端則善矣春秋左氏言衞州吁之事因載六逆之說曰賤妨貴少陵長遠間親新間舊小加大淫破義六者亂之本也余謂少陵長小加大淫破義是三者固誠為亂矣然其所謂賤妨貴遠間親新間舊者雖為理之本可也何必曰亂夫所謂賤妨貴者蓋斥言擇嗣之道子以母貴者也若貴而愚賤而聖且賢以是而妨之其為理本大矣而可捨之以從斯言乎此其不可固也夫所謂遠間親新間舊者蓋言任用者之道也使親而舊者愚遠而新者聖且賢以是而間之其為理本亦大矣又可捨之以從斯言乎必從斯言而亂天下謂之師古訓可乎此又不可者也嗚呼是三者擇君置臣之事天下理亂之大本也為書者執斯言著一定之論以遺後代上智之人固不惑於是矣自中人而降守是為大據而以致敗亂者固不乏焉晉厲死而悼公入乃理宋襄嗣而子魚退乃亂貴不足尚也秦用張祿而黜穰侯乃安魏相成璜而疎吳起乃危親不足與也符氏進王猛而殺樊世乃興胡亥任趙高而族李斯乃亡舊不足倚也顧所信何如爾然則斯言殆可以廢矣噫古之言理者罕能盡其說建一言立一辭則臲卼而不安謂之是可也謂之非亦可也混然而已教於後世莫知其所以去就明者慨然將定其是非則拘儒瞽生相與㣥而咻之以為狂為怪而欲世之多有知者可乎夫中人可以及化者天下為不少矣然而罕有知聖人之道則固為書者之罪也
