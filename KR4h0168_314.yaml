front:
  text: 全唐文欽定全唐文卷三百十四華字遐叔趙州贊皇人開元二十三年進士天寶中累轉侍御史禮吏二部員外郎祿山陷京師偽署為鳳閣舍人賊平貶杭州司戶參軍上元中以左補闕司封員外郎召不拜李峴領選江南表置幕府擢檢校吏部員外郎大歷初卒
  hash: sha256:0bc13c5802af25b94a28afb4b981d407694799466817345a9bb14d59ac34656c
