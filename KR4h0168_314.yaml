body:
  text: 宮殿之賦論者以靈光為宗然諸侯之遺事葢務恢張飛動而已自茲已降代有詞傑播於聲頌則無聞焉夫先王建都營室必相地形詢卜筮考以農隙工以子來虞人獻山林之幹太史占日月之吉雖班張左思角立前代未能備也而曩之文士賦長笛洞簫懷握之細則廣言山川之阻採伐之勤至於都邑宮室宏模廓度則略而不云其體病矣至若陰陽慘舒之變宜於壯麗棟宇繩墨之間鄰於政教豈前修不逮將俟聖德而啟臣心輒極思慮作含元殿賦陋百王之制度出㣥子之胷臆非敢厚自夸耀以希名譽欲使後之觀者知聖代有頌德之臣焉其辭曰維皇高祖穆端命於元穹萬有千載鍾景祚於鴻裔逮北宮之尊嚴上取法於天帝乃圖正殿之逌居規崇山而定制信神明幽贊而人謀襲契不然何前王曠此之雄麗也先是大司空帥其屬執度而相之曰美哉川原騖乎其大亘坤靈兮配乾剛坤順乾而為龍舒廣衍兮走㣥山紛卻面而朝宗陵正陽之奕奕鬱佳氣之葱葱葢昊天之作而皇祗授元聖獲以造新宮也乃審於龜筮龜筮叶從太卜以告神人咸同皇曰欽哉是將宜於朕躬因以鴻稱含元建名易乾坤之說曰含宏光大又曰元亨利貞括萬象以為尊特巍巍乎上京則命徵般石之匠下荊揚之材操斧執斤者萬人涉磧礫而登崔嵬擇一幹於千木規大壯於喬枚聲坎坎於青雲若神踣而顛摧勢動連崖拉風碎雷倒勁梢於窮谷斬巨柢於昭回時也山祗效靈波神作氣為桴為栰羽疊鱗萃朝泛江漢夕出河渭雲奔山橫交積於作宮之地於是農事既收靈臺勿亟子來而就役者周邦畿而薄四海咸忘勞而獻力乃張為廣度考正極星邦伯是經國工研精剗盤岡以為址太階積而三重因博厚而順高明築陵天之四墉四墉既列太階如截下土相嶔愕視沈沈其始也星鎚電交於萬堵霜鋸冰解於千尋擁材為山攢杵如林乃占日月之吉以成帝室虹梁勁於中極榱桷戢以礱密析姑繇以為楹隳喬山以為礩飛重檐以切霞炯素壁以留日神標峻樀鬼疊層楣高卑迭拒尋尺相持木從繩而後正棟操宇而不危階瑩冰級瓦敷鱗差蕩晶景而升降歘睒暘以交輝聳大厦之奇傑勢將頓而復飛爰詔有司練日推時徵考室於周頌會公卿以落之丕赫哉如俯如跂若合若離竦森修邃以窅徼怳嶪騀而巖巍謂衝飇激海兮漩奫淪以無底奔雷觸山兮掉巘崿而傾㩻石鮫拖首於堂廡狀出雲而撐鬐崇高之制靈邱上盤鄰斗極之光耀邇天漢之波瀾察鑿枘之吞吐吸山叢而水攢建升龍之大斾邈不至於階端崢嶸孱顏下視南山照燭無間七耀迴環咸欠欱赫以突兀攇閌宏以蕭摋捧帝座於三辰銜天街之九達進而仰之騫龍首而張鳳翼退而瞻之岌樹顛而崒雲末嶷兮峩峩巨鼇戴仙山而出滄波劃兮煌煌燭龍折穹穴而臨北方排層城而廓帝居豁閶闔而面蒼蒼左翔鸞而右棲鳳翹兩闕而為翼環阿閣以周墀象龍行之曲直夾雙壺之鴻洞啟重閨之呀赩趨堂塗而未半望宸居而累息惟上聖之欽明爰聽政而布德去雕幾與金玉絀漢京之文飾熾丹雘於崚嶒抗重霄而競色若乃紫微晨曀彤墀夜明雲薄萬栱風交四榮冬止其陽則釋裘而燠夏休其陰則捐絺以清旂獵風而振響葉墜露而成聲懸櫨駢湊竦柱奔列複檻綴高牕景爇黭日翳而罘連曤天開而中絕形持神而欲離足僂步而將跌貯昭訓之崇崇暽光範之揭揭其南則丹鳳啟塗遐矚荊吳十扇開閉陰陽睢盱容鼎九扃方駕五車示王者之無外不樹屏於清都望仙闢於巽維建福敞於坤隅偃朱旗而櫜元甲屯仡仡之驍夫其後則深闈祕殿曼宇疎楹瑞木交陰元墀砥平鮮風歷廡淩霰飄英蔭藹武闉增華穆清玉燭內融則嘉盛豐備太陽臨照而天下文明古有六寢御茲一人今也三朝繇古是因布大命於宣政澹元心於紫宸羲和弭節於通乾望舒停景於觀象密勿旒扆臣人是仰左黃閣而右紫微命伊皋以為長其下則鶡冠魚服良家茂族厲禁非宜金吾領之其前則置兩石以恤刑張三侯以興武告善之旌登聞之鼓節晷漏於鍾律架危樓之筍簴以辨內外之差以正東西之序天光流於紫庭倒景入於朱戶騰祥雲之郁靄映旭日之葱蘢清渠導於元氣玉樹生於景風夷坦數里徘徊無窮羅千乘與萬騎曾不得半乎其中厥初經營天下既乂文物未周孤其壯麗葢重於施勞非不懷也乃眷睿孫睿孫開元萬物晏清而太和掩書契之所論既克廣於崇構聲明備而益尊葢聖皇之孝也揮綽變化兮動搖乾坤其東於是宏文教而開館對日華之清閾葢左學之遺制協前王之講德其西於是延載筆之良史俯月華之峻扉集賢人於別殿朝命婦於中闈王風闡而成化陰教備而不虧加以咏周詩而展親睦魯衛而敦敘因合族之來宴置更衣之豐宇至於殿內諸曹則左右有局通軒並廡物有恆司供無廢舉又有銀璫珥貂寺人巷伯奉宣出納之令更踐宮中之役熊羆之旅董以龍武矛㦸森森材官羽林聲破邱山氣讋飛沈爪抉千鈞跟騰百尋克壯皇威協比其心其外則校人掌馬天駟在閑以備順遊放牧其間望我鑾和陟彼高山猶慮憲章或遺國容未備乃立掌匭之司館通事之吏職在達下情於上天儆王言於有位堧通大極隥指龍池重門內注複道潛移幽峻肅以相屬光彤融以熺熺元象著明帝座維三皇居設位俯察仰參翼室正中遊宮次南北起含元其容眈眈總而言之如山之壽則曰蓬萊如日之昇則曰大明自茲而北燕遊所經達於苑囿不可殫名周廬更呵匝以環衞南端百仞上極霄際卻視甚冘崟經塗廣深繚以層城黕為重陰至若時雨膏田九農恞暢雲歸山穴儵以昭曠白日麗於宮隅混晶光而益壯於是風師斂威纖壒不升穎絕搖芒葉無翻稜自中徂外鏡洗川澄弦直閭閻井畫溝塍靡迤秦山陂陀漢陵知稼穡之艱難見皇王之廢興及乎元冥戒寒海神飛雪瑤城粉野琪樹森列玉宇璇階雲門露闕天華爽霽朗日朝徹赤旗降庭朱柱艷月仰白帝而金精開據河宮而銀燭發其或蠻夷不至帝用興戎降元帥於天上發神謀於禁中皇靈震燿殄厥渠凶矯矯武臣此焉獻功操俘虜而陳器械恢莫大之威容爾乃時殷仲冬日正南至上公奉斝㣥后在位一人壽昌萬國承賜式燕以樂欣欣且醉乃撞宮懸砅碣天地及乎獻歲元辰東風發春懸法象魏與人惟新儼文物於王庭兼九伐而宿陳威儀之嚴嶽嶽振振若太一披絪縕而俯百神既而咸造勿褻會朝清明璿柄指寅寢闈發扃皇帝御衮龍之法服佩蒼璧之純精執鎮圭導朱紘降輦登階微聞玉聲於是典禮之官贊王就位南面穆然至若甸侯采衞要荒閩貊輸其方賮罔不來格統以千官六卿二伯司儀敘進象胥重譯肅肅委皮乾乾奠璧設以庭燎天烘地赫雷鼓殷殷朱干玉戚神簴如生熊羆敵危昂歇向歊爛歕射金根玉輅太常少伯火列門旂霜交陛㦸乃進元元以觀禮從億兆之增增金吾南首麾之以肱遞攀援而聳仰齊屨企而冠騰太史來告卿雲勃興灑豐澤於生人答上元之休徵申命司寇緩刑冡卿降德秩山川而問耆老周雨露而均邦國華戎竭歡喜氣闐塞揭金雞於太清炫晨光於正色慶忭之聲不踰辰而靁四域當斯時也驅周驟漢於廓煥爛王臨於朝天地貞觀靈宮巖巖上下交贊葢所以法乾道而遵帝度豈惟安體而明威者哉夫瑤臺之美不可以刑萬國土階之陋不可以儀天下奢不遜而儉固允執中於大位洪範曰皇建其有極富哉上聖之宏議也詩歌楚室頌美泮宮諸侯之事也雲夢甘泉宴恢景福僻王之志也論諸侯曷若戴天子嘉僻王曷若尊聖人烈烈盛唐祖武宗文五帝赧德六王慙勳而政本乎慈用過乎儉夫蒼生所奉者惟君所愛者惟親寧有君親宅體於卑室而臣子得安其身乎故有熊明庭帝姚總期從人欲也天垂定星易有大壯君人法焉聖朝猶斥其華而憑其質今是殿也者惟鐵石丹素無加飾焉身居元眇心與萬姓同畎畝之勞以是臨眾何眾不賓以是享神何神不若其天德歟雖欲宮崑崙而館不周城八極而隍四海猶未足儲鴻醇而俯丕耀豈咸鎬一京之所在崇四瀆之前式敕懷鉛之小臣俾讎書於禁中正百代之遺文由是循環天造耳目日新敢頌成功告於神宗無媿斯干之什式昭聖德之容頌曰帝作含元含元言言崒若日觀呀為天門太階三層遠法崑崙鎮茲秦野揭以周原烈文祖宗永錫孝孫孝孫有慶於以施令奄甸萬姓受天休命歌之頌之管磬宜之穆穆皇君壽考無期既成斯文客有勸之上者對曰前王之尤祥絕瑞乃聖朝之細事今休徵已厭於聰明頌聲亦飫於天意私歌竊抃乃臣子之常志又焉足以薦聞哉客曰不然今至尊明發不寐有懷先皇周文之孝也允恭克讓光溢海外堯帝之謙也自即位已來上下之休嘉臣人之詠歌歌於睿躬則固辭頌於宗廟則無斁今吾子之文明昭乎累聖之耿光美於大君之孝德可進而退宜言而默使雅頌之音卷而不舒猶坦蕩其胷臆無乃過歟為人之下者有可達乎君親雖濱於死亦冒行之況宗廟啟其心哉臣華嘗聞遷善之規願附升歌之末武康尉薄自牧嘗謂余曰僕有賢女適江陰尉鄒待徵徵亦良士僕志之矣鄒子孤立時無古人誰復知之余嘗記其言及江左之亂待徵解印竄匿其妻為盜所驅將辱之妻密以待徵官告託付村媼尋待徵付焉而后就死嗚呼自喪亂以來士女以貞烈殆斃者眾余不盡知之若薄氏者與其父遊聞其聲義動於江南又焉得不賦之命曰哀節婦賦云爾昔歲㣥盜並起橫行海浙江陰萬戶化為凝血無蘭不焚無玉不折峩峩薄媛淵然明節自牧之子待徵之妻玉德蘭姿女之英兮鄒也避禍伏於榛莽婉如之嬪執為囚虜匍匐泥沙極望無覩出授官之告託垂白之姥姥感夫人爰達鄒君兵解求尸宛在江濆哀風起為連波病氣結為孤雲鳬鴈為之哀鳴日月為之蒙昏端表移景而恆直勁芳貫霜而獨存知子莫若父誠哉長者言曙無雲兮川無波泛余舟於空碧彼廬山浮重湖之上兮峩極天之峻壁凝黛色之深明噫林嶺之岑寂何神造之杳冥躍騰泉於山脊孤流皎皎於蒼梁翠淙千仞兮懸帛玉繩縋於寥天銀河垂於廣澤春風雷兮簁霜雪穿重雲而下射白龍倒飲於平湖若天地之初闢委滔滔兮東迤詎知夫維今之在昔倚高帆而一望豁余心兮灑滌近古有鴈門上德兮昭洗塵昏柴桑開士兮舍印推尊靈境殊象詮微究原人已古兮山在泉無心兮道存將默貫於精極欲置之而不言華容石門山有木蘭樹鄉人不識伐以為薪餘一本方操柯未下縣令李韶行春見之息馬其陰喟然嘆曰功列桐君之書名載騷人之詞生於遐深委於薪燎天地之產珍物將焉用之爰戒虞衡禁其翦伐按本草木蘭似桂而香去風熱明耳目在木部上篇乃採斫以歸理疾多驗由是遠近從而採之榦剖枝分殆枯槁矣士之生世出處語默難乎哉韶余之從子也嘗為余言感而為賦云泝長江以遐覽愛楚山之寂寥山有嘉樹兮名木蘭鬱森森以苕苕當聖政之文明降元和於九霄更祲沴之為虐貫霜雪而不凋白波潤其根柢元雪暢其枝條沐春雨之濯濯鳴秋風以蕭蕭素膚紫肌綠葉緗蔕疎密聳附高卑蔭蔽華如霜雪實若星麗節勁松竹香濃蘭桂厭雜植於人間聊獨立於天際徒翳薈兮為鄰挺堅芳兮此身嘉名列於道書墜露飲乎騷人至若靈山霧歇藹藹林樾當楚澤之晨霞映洞庭之夜月發聰明於視聽洗煩濁於心骨韻眾壑之空峒澹微雲之滅沒露草白兮山淒淒鶴既唳兮猿復啼窅深林以冥冥覆百仞之元谿彼逸人兮有所思戀芳陰兮步遲遲悵幽獨兮人莫知懷馨香兮將為誰惋樵父之無惠混眾木而皆盡指㣥類而揮斤遇仁人之不忍方甘心而剿絕俄固柢於傾殞憐春華而搴芳顧落日而迴軫達者有言巧勞智憂養命蠲疾人胡不求肢殘體剝澤盡枯留顦顇空山離披素秋鳥避弋而高翔魚畏網而深遊不材則終其天年能鳴則免於俎羞奚此木之不終獨隱見而罹憂自昔淪芳於朝市墜實於林邱徒鬱咽而無聲可勝言而計籌者哉吾聞曰人助者信神聽者直則臧倉譖言宣尼失職出處語默與時消息則子雲投閣方回受殛故知天地無心死生同域紜紜品物物有其極至人者委性循於自然寧任夫智之與力也雖賢愚各全其好惡草木不夭其生植已而已而繄蔽不可得臣華言伏以漢明帝時徼外蠻夷槃木白狼獻詩歌德屬事史官況臣自曾祖至臣備國家職員臣又逮事元宗肅宗今以餘年獲事陛下官歷御史補闕尚書郎命薄多病不獲奔赴闕庭恐先朝露同於泥塵若無歌詩頌德曾蠻夷不若也敢述列聖為無疆頌式昭皇家大慶無窮謹昧死稽首以聞昊昊旻天監於下甸興有德行維隋之杪時黷陰凝陽潛未登人思炤矣雷行龍興盪濯雰慝文明乎萬國垂仁烝人載親天監保我子孫巍巍皇皇後之皇丕承之高祖受天命誕興太宗承天之命帝煬昏逾黎人毒痛甚爇於鑪甚溺於塗以號以呼呼天無辜高祖謂太宗爾必有天下爾其訏謨太宗稽首恭受天命臣請滌除張我師撫征四國翦薙㣥慝鼓一方三方振驚默炤其靈隨顧而平我負我乳我安我成以奉君父以臨天下任忠孝文武建禮章樂舞我雖明德諫則納汝時維帝降祐之自古明后莫如我德我勛唐無疆天子之無疆本太宗成命肇為阯為堂實勤實勩付俾厥裔丕承后帝帝思不忘神棐靜康不曜而光不求而昌自中方外達於夷羌瞻我大邦助祭於廟執貢朝於王油油時雲雨厥百穀漻漻景風扇彼嘉穀飴口飽腹以厭以足俾壽而福都阜成天人屏蠆之毒釁而為蝮謀虐天之族天祐聖祚八柱將覆帝告五臣保翼朕躬赫赫彤彤日昇雲中五臣受命鉞爾頑凶故曰再造我天下生人鼓舞既成矣又奉父母后戚之禍再興有危競競廟祧震怒陰命聖子翼登聖父奮其神旅宵仗金斧金斧一斷殄殲逆亂大聖照臨元元宅心歸祚於有功有德於戲盛德丕鑠元宗之明克孝克仁允武允文宣祖宗之光垂於子孫盛禮畢舉大樂畢陳百蠻來賓元元阜殷戎或不賓遣師徂征罔不頓顙踣於雷霆在漢方昌用刑慘酷中都繫考六萬餘人使者按錄誅千萬人然後興王光武赫赫誅沛賓客以千以百孝明稱賢楚獄連年坐死逮捕以萬以千猶曰漢祚宜長越我宗祖不忍用刑至於元宗哀彼鈇鑕降為鞭抶誕告郡國大為屋室毉彼百疾追懷登遐止害禽畜旁為陂池養鱗介族既濡既渥昆蟲草木享國五十年㝢縣晏然逆臣犯天天念蒸人若曰寧我負恥不忍人戰死乃告元子理兵朔鄙西幸蜀都命元子受圖天下既定父堯子舜歸於國都無不忻愉無不涕濡傳聖自頤升靈太微嗚呼上聖之道之純不可度思穆穆孝慈有如肅宗之誠達於神祗爰訓六師震發北陲陵陵雷馳西戎南蠻北狄東夷咸舉其旂佐皇之威帝心天和無筮無卜㽬然邱岳破裂冰谷逆隸傾覆朝社大復屆於海之外服以盥以濯以舞以躍帝在東宮孝如文王蒸蒸其心天地知其孝既收鎬洛祀於陵廟奉迎上聖天日普照有凶有孽將噬將齧我旂方設則已顛蹶如燂於雪尊嚴而仁仁覆而嚴大臣小臣莫不潔廉躬勤百度百度如其素大邦之興維天相之曷興曷相則有德繼王昔殷王盤庚武丁紹登殷明矧我帝唐丕承天命疊引其慶生我皇聖幼冲聖敬實左右肅宗開國御戎㣥帥稟教舉則成功自西自東如霆如風蕩滌頑凶罔不率從既登天位於變時邕人咸曰上如太宗延億兆斯年延億兆斯年天博地崇罔不爾容元宗元孫象元宗列文肅宗元子承肅宗孝理維上帝降靈為賢弻我大邦鈞明說望協期陳謨仗鉞出師丕赫厥勛大君以距嶺緣湖八州之域天下震擾此邦全寧內輔宗師外飫軍旅咽頤荊越鍾以眷右乃命平原賓護東宮而尊大之師長邦憲肅清華夷朱旂暢轂平原戾止秋霜伊何視我直方春雨伊何宏我愷悌公張氏諱鎬字從周河內儒家時賢薦讓詔書徵起三年之間位登將相吉甫方叔平原兼之間歲臨海狂頑覆浙左陷上饒皖寇徒殘害長吏潛逼鍾陵宜春盜帥家兵遍山吏不敢問人愁苦之公默麾偏師勿駭吾人無聲無色㣥凶梟夷下遂其順上遂其仁咸曰不有平原遑恤吾身平原之政以類而舉是邦胡寃公薨於鎮八州文武吏人老幼途哭家祭不能舉首夫山傾川竭未為成災大臣盛德捨榮即哀災之大者刻頌之義發乎心播乎聲施事為教感哀為德公故吏侍御史博陵崔賁文明殿中侍御史昌黎韓洄幼深監察御史趙郡李惟岳謨道大理寺丞王士華子秀尚書刑部員外郎前袁州刺史張澹惟清袁州別駕吳郡陸調牧臣及耆壽袁維清彭正運施希廷李開雲百姓彭伋潘玉等一十二人咨余為頌撫石而泣故其詞也哀皇矣明王求公於野官在諫省將鋤悖凶謂公有勛庸授公肅宗納為輔翼專征獯戎或蹇或通易簡昭融帝命平原八州隄封深湖大江宣布睿德淳此下國蕩除妖賊安其父子爰及家室時萬時億山川出雲生此元臣獻歲發春三靈化醇今則逝矣南方愁辛嗚呼平原如其仁如其仁大蜡之祭辭曰土反其宅水歸其壑先王因流下而導之故曰九川滌源因迤匯而瀦之故曰九澤既陂以疏天地之氣以利元元之用崇伯汨五行而殛羽山臺駘障大澤而封汾川洪範首之春秋載之地有廣狹事無今古大江具區惟潤州其藪曰練湖幅員四十里菰蒲菱芡之多龜魚鱉蜃之生厭飫江淮膏潤數州其傍大族強家泄流為田專利上腴畝收倍鍾富劇淫衍自丹陽延陵金壇環地三百里數合五萬室旱則懸耜水則具舟人罹其害九十餘祀凡經上司紛紛與奪八十一斷嗚呼曲能掩直強者以得之老幼怨痛沈聲無告永泰元年王師大翦西戎西戎既駾矣生人舒息詔公卿選賢良先除二千石以江南經用所資首任能者是歲十一月二十三日拜常州刺史京兆韋公損為潤州聲如飇馳先詔而至吏人畏伏男女相賀即日上無貪刻下無冤憤公素知截湖開壤災甚螟蝥臨事風生指期以復㣥謗雷動山鎮恬然中明獨裁文之以禮乃白本道觀察使兼御史中丞韋公元甫中丞撫手愜心如公之謀且曰興利除害得其人而後行非常之政敢歸叔父公乃申戒縣吏卒徒闢之人不俟召呼抃從役畚鍤葢野浚阜成溪增理故塘繚而合之廣湖為八十里象月之規儔金之固水復其所如鯨噀射洶洶隱地雷聞泉中先程三日若海之彌望灝灝如吞吐日月沈沈如韞蓄風雨所潤者遠原隰皆春耕者飽憂者泰於是疏為斗門既殺其溢又支其澤沃塉均品河渠通流商悅奠價人勇輸賦遐邇受利豈惟此州每歲萌陰乘陽二氣相薄大雨時行㣥潦奔流水得所入盈而無傷龍見方雩稼蒙其渥時前相國彭城公劉尚書晏統東方諸侯平其貢稅聞而悅之白三事以聞詔書裦異焉彭城公宣命至江南捧詔授公公率元僚掾吏令丞以下至於耆艾西向拜手忻戴皇明人心上感天降嘉澤如有神祗昭協厥志公正直而和專靜而斷嫉惡宥過惠人察姦純鈞精堅百鍊不耗伐冰之貴降從士禮詩云靖恭爾位好是正直宜其享多福也吏人入賀公拱而謝之曰尚書劉公觀察韋公奉行王澤也鄙何力之有焉丹陽令杜孟寅秉公之清白延陵令李令從如公之愛人金壇令胡稟公之成規及丹陽耆壽周孝王褱百姓湯源等拜手而請曰兌為澤兌悅也水歸於澤而澤悅於人百年侵塞而公啟之臣哉隣哉克諧帝休永代是式三縣無災若不碣而刻之則命不揚於厥後後之人無以倚負也華嘗學古見訪為頌曰望沄沄兮視冥冥鳥閒魚樂葭菼生膏腴利倍起訟爭斯人怨抑痛無聲韋公正直動神靈百年淤淀為漻清饑者飫兮病者寧詔書光寵恩濡榮劃然眊矒復皎明追琢刻頌颺芳馨
