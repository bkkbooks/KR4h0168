front:
  text: 全唐文欽定全唐文卷五百三十顧况三
  hash: sha256:7184aa9aa0f3dc8921f6a0a5fa0e6f465f698f71af9c24ee42b89da3ee25c7e3
body:
  text: 王太上也謂之三清淵神靈也謂之三洞洞之法金璫玉佩之書玉馬之券回車畢道天誥也負石填河師誓也得之者上騰九天失之者下釁十祖故曰萬劫祕而五千文行蕭武好佛法道士挑攪釋藏徒聊順帝旨強説為大教佛經故論者短之多稱道家唯有老子兩卷井蛙不知尾閭也大哉玉皇上極金闕青童紫微扶桑之君仲侯左靈東華之君人雖位在上清而猶臣妾玉皇太上已下如陪臣焉凡三十六天三十六洞地道下通華陽林屋傍通龍邱九巖其土神秀厥生道奧徐先生名含真中書侍郎安貞之族子也傳八景之真文握九光之靈符隸乎此觀初棟宇壇墠惟彼瓦礫鬱為草莽先生之功林堂象設始吐光彩蕭寥同映養屯茹氣蹈火吞刀之士不可呼而來夫道可不遇文復何昌銘曰天地未生聖人未作陰陽坱圠日月磅礡道隱乎先氣流形博乃播㣥法靈神沃若奔景無天回元豁落其一帝作玉府以般靈居四輔之目三清之書不得其人曠劫祕諸臣拜稽顙以度寶魄之明浩輿其二况往嘗盜開靈書罰露天誥免冠自懲慮不塞咎戾矢其文以自贖蓋欲鋪神明非為道士所發自貞元辛未歲九月哉生明余窮愁幽憤思以自適吟咏道篇以攄煩襟時長安尉杜陵史鎬在焉為余搦管揮灑後漢神仙之士王次仲者善為此書余今日見史侯如漢世矣闔閭之葬海浦也水銀為溟渤黃金為鳬雁精氣為白虎是名虎邱東晉王珣王珉捨山造寺生公忍死待西國經來之所也山中塔廟叔父有功叔諱七覺字惟舊容相端靜神龍初八歲剃度萬言一覽學際天人嘗以唵口部禪林萬法之母法從數起乃讀外書小餘大餘以為證據維摩所謂通達善道法華所謂通達大智况受經於叔父根鈍智短曾不得乎少分至德三年示終本山付囑門人淡交曰此山法事莫不圓對而經藏猶闕淡交僧珤俗姓何廬江次宗其胄奉佛不敢廢師之命自至德貞元龍在戊寅紹建方畢瞿曇教迹不捨有表不住無表般若用中壇攝其六頂攝其四譬如無根安得有華故覺華長者得定光如來授記鹿仙長者得釋迦如來授記寶手菩薩得空王如來授記皆因造藏而得作佛從虛空藏流出一切藏一切藏流出四大藏四大藏一億大藏四億小藏圍繞湧出狀如蓮花灌於四藏流出十二藏從十二藏分為三藏一聲聞藏二菩薩藏三真如性海藏海水可量虛空不可量虛空可量菩薩摩訶薩成就衆生變化隨感不可量菩薩摩訶薩修行地位有分劑故故可量諸佛真如性海無分劑故故不可量灌於三藏流出八萬四千藏修多羅藏摩訶藏為上首於是有法藏寶藏甚深微密藏妙花光雲等藏藏無盡在色究竟天衆生福薄不得瞻覩謨呼羅摩海醯首羅大自在神天樹雲音日輪速疾執金剛神淨光光香雲最上光嚴身衆神清淨華髻栴檀樹光足行神雷音幢相雨花妙眼道場神淨花普照無等光焰主空神永斷迷惑普遊淨空主方神示現宮殿樂勝莊嚴主晝神普得淨光諸根嘗喜平等護音寂靜海音主夜神其摩竭提國有金剛藏中有摩尼珤王變現自在雨無盡珤嚴好花是諸菩薩演説如來廣大境界慈目珤髻發生喜樂可愛樂正念天王十方海中一切珤王吐雲彌覆流出教綱其佛號法水覺空如來嚴持器仗夜乂王力壞高山夜乂王毗樓博乂焰口海光龍王等甚可怖畏鳩槃荼王美目端嚴鳩槃荼王日光天子月光天子星宿王天子威德光明天子各各恆沙恆沙眷屬相與掌護其南海楞伽山下娑竭羅龍宮其光明藏大地劫盡諸方等諸經納於龍宮其贍部洲大藏六萬卷中藏六千卷小藏四千卷大悉地有空有不空廣略平等譬如萬法出一塵中千論百疏又如一塵流出如帝釋宮殿因陀羅網一珠映八千億珠法界義中法身法性百佛世界細一毛端析一毛端成微塵數世界一一世界法身演無量百千萬億諸佛法藏是身為陀羅尼藏湧法海藏衆法珤藏舍乘敷藏花頂衆藏密耶護藏言頓顯也此皆奢摩他毗鉢舍那定惠之力觀見如來等藏藏依識攝有舍藏理發於心而形於藏內外俱朗不其然乎斯文淳一非敢戲論光佛相好贊佛功德從佛知見中來頌曰雪山紺宮等虛空耶叔父付囑淡交續耶妙華光雲香普熏耶娑竭所指摩醯護耶喝剌呼嚧歸命護耶五蘊十二入十八界此上三科能包萬法因緣生為有無自性為空空有融一即中道義雖石船渡海蚊背負山不為希有事僧法珣與和合衆法藏等造乾元寺者晉高士戴逵子禺之宅也乾元初節度使鄭昊之奏立觀察李涵李道昌皆有力大臣求無上道以心無所願無邊受者實得施者實與雖空不敗有為有滅無為無滅無為有為之體有為無為之用無生無滅無相無名無相法無言語説法以無言語説故有相大乘有觀法門無相大乘無觀法門於法有所得有相大乘義於法無所得無相大乘義所得無所得俱真一乘之義事也為妙因果譬如種子依地而生又如大地能荷㣥有虛空之體大於天地天地有盡虛空無盡如來之體大於虛空光明虛覺圓寂萬億故於無住本建乎諸法不動真際恆沙煩惱莫不斷除魚吞鈎虎落穽蛾拂火此衆生自取其毒道本平坦樹本清涼佛在摩竭提國城等正覺諸弟子棲乎茂林藉彼祥草厥後因時設教猶著弊衣行次乞食及往忉利省摩耶夫人優填王鑄金刻木始用膠漆泥布佛有像自此始也與佛在時功德無異於是給孤長者造祗園精舍末由底迦造龍宮精舍竺乾法蘭造洛陽白馬寺佛圖澄造鄴中九百七十三寺釋道安造襄陽一十五寺遠法師造廬山東林西林寺度法師造攝山棲霞寺杯渡法師造南陵隱靜寺傅大士造東陽雙林寺思大師造衡陽南嶽寺智者大師造天台國清玉泉寺三十五寺略也涅槃無前無後般若無新無舊法珣上人重舊德不輕新學門人清瑛請况於經藏中抄佛心説永示無極文曰倬哉迷盧宏亘大千百億日月藕絲貫穿蚊背負之飛登梵天塵勞為海般若為船截生死流是曰希有大哉乾元實則不朽和衆雲臻珣為稱首佛告善來寶坊崇哉法雨灑埃慈雲徘徊地輪依水水輪依火火輪依風風輪依虛空虛空無所依佛體也變佛體為金色界地輪是也金色界中有香水海水輪是也香水海中有光明藏火輪是也復有寶林香花瀰漫周遍佛土風輪是也上至香積下至金色一光明藏依報正報之因歟有智為情界無智為器界佛土為性界法身報身應變之身一也天親以應化非真佛亦非説法者其華嚴則不然諸佛同身流入毗盧遮那智藏之海人有血脈地有湀闢滄島之脅有白沙之墟焉天塹在南蜀岡在北敦彼廣斥勾攘五材擂刺元精猛虎蹲路騰蛇跛水氣母毒形火爐胚物之意惣持相土曰牛欄河灘畔堪造漫吒羅非人乃秩天寶末長安僧絢避虜東土畫為像宮以配梵帝皇猷允塞景福爰集善來若干商主若干與其眷屬爭欲奮迅爰雲構版插定中丕赫微絢之功人其捨諸於戲古稅甚薄人猶告困夫絢不柄刑賞不驅其人蓋以天子孝理昭明並受其佑霜露怵惕蓼莪罔極申以上報謏儒經之闕聞此名教君子肝腦而塗地者也不然其孰能與於此乎所作既成推山斡坎金翅吞龍之勢徹乎上王磅礡乎夜摩胸開掌坦棊布箭直廓乎其崇之哉洎夫楫師陶師車匿乾陟方等百一嚴身之具華儉適中滿而不缺三草二木俱霑一雨昔北山之翁天帝命操蛇之神以遂其志是知慈善根力軍吒胸索口唵火皆瞥電春雷張曜威恆保寧剎土見易底迦一時生晦魔軍法將不可以較乎勝負吹螺擊鼓歌唄讚歎旋和之衆莫不圓通信乎罒炎刀膩停酸修羅竄迹菩薩鏡生死海為大涅槃大法現前了無塵曀凡有作有證名有相大乘無作無證名無相大乘體相既融一真味也涉入無閡因中説果果中説因此文殊道引之智羖羊有角能破金剛不破如如之相我於觀照權實皆如如從心上變起離心無物離物無心心因物因迷盧不動有若靈辨禪師者大照大師之上照足如優曇花綱首良制利見如薝蔔花絢上人者根器清淨如拘物頭花芬多利花聿來求我分別三諦不有歐和之志悉地之德焉難乎決擇然則嗢陀喃散施有情之義磁石攝鐵不攝鴻毛相應故作針則沈作鉢則浮隨緣故獸齕堅骨魚食碎砂砂骨遊鋪託胎佛也明佛性故與夫有不染塵空不斷相非空有故若有去來若無去來無去來故若有方所若無方所故佛與衆生數無增減無增減故補特迦羅由來則佛前佛後同名同號乃至不同一一微塵之數微塵數佛各坐蓮臺展臂指塵皆當此説且修多羅藏八萬在婆竭羅龍王宮中以龍樹之聰利受持不盡海惠盡焉曾不得失夫少分或以其言河漢詎知我生一一生陰陽也不測之外更有神速之如此乎是以聖人神道設教大哉神乎若在其上若在其下㣥玉藏書之府比夫現量春秋敘二百餘年方彼曠劫百千萬億那因他其數略也法從數起從一剎那至一洛剎從一洛剎至一俱祇從一俱祇至一僧祇從一僧祇至一高出從一高出至不可轉無邊無礙無央無極重重成住壞空空不相凌滅其相去也不亦遼乎假使生肇融睿伊皋稷契共佐唐虞我知不相若也老聃曰竺乾國有古先生西過流沙尋師之旨孔子對商太宰曰三五非聖西方之人蕩蕩焉無而稱又曰聖人吾不得而見之矣日月無燭無不燭聖人無見無不見般若無知而無不知周紀有之昭王二十四年甲寅天地震動江河泛溢王問太史蘇由此何祥也對曰聖人生於西方穆王三十三年壬申天地震動江河泛溢王問太史扈多此何祥也對曰聖人滅於西方示有生滅實無生滅向使無生之法格乎戰國戰國得之秦不坑儒趙不坑卒小國事大國大國不征小國含哺鼓腹無為之法化也雖有大夢然後大覺塵勞性空空有常寂分改遷易無非法身而大雄法寶五迦葉不得當乎付囑必也當乎不論前後此瞿曇所以贊佛法也文曰佛日之曙兮照乎東方大雄説法兮海印發光獨立三界兮橫吞八荒江沙漫漫兮寺壓其陽撼谷斡波兮氣盤中央粵考春秋敘事之實趙郡東祖源流甚長衛州刺史嘉祚曾孫榮州刺史璿孫贈尚書郎銛子諱端字公表官由臺省興元少尹少府監出泉饒二州刺史參佐不書略也貞元八年秋七月終於郡署年六十一明年八月庚申窆於鳳山之東原嗚呼神明無質君子能通其意以為教本仲尼闡教微言七十子揚大義去聖雖遠其七十子之季孟乎至於饒禮將驅俗經以道俗饒之人始有講睦之聲上員不弔殲我渠哲昔桐鄉嗇夫猶葬桐鄉桐鄉之人皆祠之今饒之葬如此嗚呼列章載云精神天之久骸骨地之久此言骸骨滅其精神不滅者何從心上變起而生展促常讀衆聖之書上於釋典如川及海之無翻流蘧廬久處奮迅泥滓宜諸精爽黜陟幽明亦由是也夫人贊皇郡清河崔氏從其子拭盡力哀敬記石陵谷永質天壤銘曰蘭桂有叢以薰其風邯鄲舊氏厥祖惟東吁嗟府君其命不融精神本天不在乎地舊國飛魂新塋掩隧逝不可止哀何不既曾祖符皇朝潭陽郡太守祖大智皇朝河南府士曹參軍贈吏部郎中父休皇朝銀青光祿大夫太子少保贈司空諡文忠公京兆府萬年縣洪固鄉胄貴里韓滉年六十五公繼代生賢左右王室鄭武之賢韋平之美開元中解褐授右威衛騎曹參軍丁文忠憂服闋授京兆府同官縣主簿又丁內憂孝貫神明服除授太子通事舍人肅宗在靈武授監察御史兼北海郡司馬充北海節度判官道阻未行除通州刺史尋充山南西道採訪使判官時宰醜正除彭王府咨議詔除殿中侍御史纍遷祠部考功吏部三員外郎判南曹尋遷吏部郎中給事中兵部選事有盜殺富平令倚為禁兵特詔釋之密疏聞狀遂伏其罪遷尚書左丞知吏部選事有擁馬陳詞造階抗議曾不再煩主吏重閲簿書片言遣之莫不心服拜戶部侍郎判度支管諸道青苗稅戶屬國計空耗上難其人服勤九年出利百倍左藏之錢至七百萬貫大倉之粟至數百萬斛其邊儲或五六萬或十餘萬有附大臣間於先帝者引劉向羊頭山黍云權量久差公曰山之南北地之肥瘠禾黍不同會內藏有隋朝銅斗果不差異安邑解二縣鹽池比歲水漲甚於往年有漫生紅鹽之瑞詔諫議大夫檢覆并致祭祠宇號寶應靈慶池宣付史館拜太常卿出為晉州刺史拜蘇州刺史充浙江東西都團練觀察處置使尋加銀青光祿大夫改檢校禮部尚書兼御史大夫潤州刺史鎮海軍節度使依前充浙江東西觀察使令行風動無敢犯者自信安洪光東陽捍狼山僧惟曉等結連數郡熒惑愚氓破其巢窟伏戎自殪山越一清管郡十五戶百萬里尹亭長書佐小史令丞牧守通數萬人自公區處不朽之作乘輿播越畿甸路斷公日遣一使間道齎帛表詣行在諸道未知行在營將士無不引還唯公所遣兵鎮河南衝要堅守不退兵馬使董晏將三千人鎮徐州部將沈清等頗違軍禁公遣一介齎牒轅門笞晏二十沈清等六十八人悉按軍令徐方既定轉檢校吏部尚書加金紫光祿大夫封昌黎公改封南陽天子幸梁川巴山道命判官何士幹領健步七百負絞練十萬匹上獻天子六軍從官扈蹕千里時屬維夏未頒春衣表至行在衆情大悅公又命從事裴樞李倫徵巡內兵甲麾下將士合三萬人請翊衛鑾輿收復京邑上深嘉歎特加檢校尚書右僕射李希烈衆軍東下志吞淮濟公即日遣兵馬使王栖曜李長榮柏良器以徑卒萬人泝流千里倍程救援才及雎陽賊已陷襄邑攻寧陵栖曜等突圍乘城矢中元惡凶徒懾遁不敢東顧淮南初喪節度使大將王紹帶甲數千夜犯城府或出權計者云江南兵至紹兵遂散殺戮甚多士卒驕矜爭邀厚賞率居人商旅五十萬緡符牒已行人情恟恟公即日遣都虞候李栖華謂兵馬使張瑗等曰收復上都六軍未賞節度薨歿豈名為功賦斂擅興何人造意諸將引過橫調立停及大駕還都進封郡公時希烈盡鋭攻陳州公命諸將與宣武軍合勢破賊數萬人關中初復公以為國無年儲何禦荒儉陳圍已解汴路即通抗表請獻軍糧二十萬斛從本道直至渭橋公命判官元友直草創運務部勒趨程時河中阻兵堅城未拔關河蝗旱軍食不足船至垣曲王師大振拜檢校尚書左僕射同中書門下平章事加本道度支營田充江淮轉運等使連歲蝗災仰在轉運公自晨及暮立於江皋發四十七萬斛舳艫所至近遠慰安貞元元年十一月十一日制曰江淮轉運使某官某勵精勤職夙夜在公厥有成績可進封國公初封鄭改封晉前後河南用兵解寧陵睢陽之圍全彭城要害之地朝廷議勳特賜一子六品正員官又其軍鎮營宇舟船鞍馬甲仗旗鼓羽革丹漆牛羊六畜難乎校算應緣兩稅唯有一榜人爭及限吏不到門今江南縑帛勝於譙宋二年冬十一月朝覲上深禮重委以大計加度支諸道鹽鐵轉運等使待空巖穴方歸田里主恩彌深初願遂違顧謂其族為當瀝肝膽身塗草莽上答乾坤時屬西北用兵倉庫空竭公和糴五十萬斛無敢奪期米價遂賤防秋士馬儲糗更無闕自公當漕運初年四十七萬二年七十萬末年一百萬尚結贊普使六蕃抗言逆順之理夷虜感動肝膽楚越張權者不敢惕息盜位者退而思過貞元三年二月二十五日薨於昌化里私第春秋六十有五皇帝震悼輟朝三日制曰故某官某應運而生弻諧於我道符兩曜德冠八元以武綏邊以文經國方期難老式作宗臣孰謂不融盡瘁而沒雖鄭亡子産衛失柳莊憯悼之懷豈過於此過時謂三字疑撫牀增慟當扆興嗟厚申往襚之恩載榮優贈之禮可贈太傅前後賻贈布一千匹米粟五百石錢四百萬喪事供官公踐歷四朝歲逾五紀炎不執扇晝不伏枕疾無杖屨居必矜莊自同官主簿制一裘褐直為宰相古人無食粟之馬衣帛之妾更爽之居不足多矣以沙門一行得聖人之道特寫形影仰如宗師癖在春秋精於繫象賦春秋七章著通例六卷并章奏詞略十餘萬言豁如恆星敦故舊重然諾好古博雅能書善畫夫議大勳者則不書小善舉大德者則略其細事故不殫論矣公有子弟聞斯行諸不敢墜失况以賓客從事日久泣慕清塵謹狀貞元三年閏五月十八日故金紫光祿大夫檢校尚書左僕射同中書門下平章事晉國公韓公故吏將仕郎前大理寺司直顧况謹上尚書考功伏以柱石元臣勳績光茂孝則先意承志忠則知無不為武能禁暴文以經國翊贊聖明懋建和平沃心造膝乎上長策宏規振乎外奄從流運恩軫睿慈今月日若馳松楸將樹易名之典請舉舊章謹上嗚呼天禍甌邦尚書告薨哀哀甌民罷巿輟舂何時復覩盛德形容伏惟尊靈惠和溫恭識洞元龜文掩雕龍天生大賢叶贊時雍至人厭世寥廓為友精神不留天地長久谷神不死是曰長生伏料尚書上賓天庭悲號者何在物之情惟公據道夙負重名爰自成才歷拜通榮五十餘年侍奉承明隨難西蜀拔身定傾有唐中興纍踐銓衡朝廷擬公三老五更上憂方隅出典百城淺學自私掩善揚鄙峩峩尚書近仁不已昔在春宮先我大國鬱興多士周易有云黃中通理其斯謂乎自我江潭於今多秩處順保終洗然自逸上官命况糶鹽蛟室奄居黃泉不見白日顧惟陋賤時承周密感德懷仁何時終畢神儀超忽靈駕徘徊敢申薄禮以表深哀伏惟尚饗古之哲人銅鞮介山柳下臧文先生企之密邇四鄰逢時不昌與世邅迍先生淵然金碧無塵通識殊倫精義造神退居江潭節貫松筠皎皎先生蘭言玉聲詞林搖落天地空春宜與太一上為帝賓若商傅説例列星辰天將以公經濟生人生人不幸天喪斯文斯文既喪嗚呼郢匠先生逝矣何人知况知况何人升堂誘進造次無為樞機必慎迹暢高節心融密印詞不能豁其胸襟故舂容於絶韻而京口歸魂毗陵旅櫬可勝悲哉心喪何自身役炎洲先生大歸赴哭無由古之達者以生為浮先生徂征與化同遊四節不留物無長在寂寂賓階人遷事改陶潛自祭管輅知終本師瞿曇了達虛空初命少子昏冠先禮兆發深衷聖朝悼歎儻遂追崇忝友季茂休戚略同北望丹徒山險萬重文非尺牘鬱塞盈胸想公形容昭况肅恭尚饗維大歷八年正月朔同鄉顧况於永嘉發使具簞蔬野酌敬祭陸三十二兄端公之靈嗚呼接席之歡俄成奠酒殊鄉少別杳忽於今牽拘南役遠哭如淚兄秉德居厚植靈超茂天和發外虛白自內特挺孤操與物去害惟昔二京㣥盜縱橫出入十年天下交兵越盜寇吳殺人燒城國危如此公乃請行我之行焉無往不平擁陳陵陽回戈歙右江南山洞略盡遺醜巨敵先摧㣥降獨受兄之令弟况之良友感激風雲留連詩酒昔魏有人子方段干兄之所在人心獲安賢者讓平惟患是急兄之忠勇人莫能及燕將泣書齊師復邑迹為功著名因義立為帝念功君門遂通臺閣生風乃憶江東高臨山中有書滿屋與人共讀有粟如雲與人共分破富為貧好事日聞靄靄牛潭峩峩囊嶺開流架迥倒寫煙景今日淒涼林空夜永人或有言吉凶無門我命由我以兄之才何適不可寧知一旦忽鍾茲禍鴻翔千仞自茲而墮嗚呼哀哉伏惟尚饗
