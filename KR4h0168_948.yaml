body:
  text: 和尚賈氏洛陽人也曾祖憲朝請大夫河南府陽翟縣令祖闕一字朝散大夫衛尉寺主簿父元禕綿州昌明縣令皆德音孔昭庶績斯在世濟厥美不殞其英慶溢鍾於上人上人即昌明府君之第二女也天生聰明道貸神氣夙聞真覺早悟迷津童年出家克精象法洎乎處道降伏其心入清淨智破昏暗德經行苦行莫之與京謂真如之其凝豈波旬之見惑住持戒律曾不倦闕一字荒寧潔己修身每屢空而無積享年卌有闕五字十一月十二日大漸於真空寺也無纍日之疚疾有一朝之溘然晤言不昏視寂滅之闕一字亂其容不改則慎行而彌肅倏忽大夜宛闕一字云亡緇徒飲恨者繼踵門人芒然者如搗偕痛疾之何依空啼咷而永日上人之昆弟闕一字或澄清闕二字或從政郡邑服勤王事咸闕臨喪粵以闕二字十一月草五日安厝於萬年縣禦宿鄉禮也於戲闕四字彼仁何負積善多慶彼善何為冥冥泉戶何闕三字寂寂蒿里誰德為鄰溥忝從母之義慟瞻仰之闕五字毫強為銘曰闕四字必闕二字法雄慶流於德必先我大通於何上闕四字終降年不永飲恨攸同悲涼已矣天問難窮六卿分職百揆時敘開之以府寺間之以胥徒所以理天下之人將以成天下之務雖動珂振珮嘗聞獻納之臣而負版持囊亦資趨走之吏番官之輩實惟卑冗九流未齒一命何階心有規於斗儲意仍希於稍食恭尋甲令緬覿彞章事列科條誰敢逾越帝德廣運皇綱載紐鳥獸咸若閭閻且千麛卵無不時之求比屋有可封之美丁以庸妄謬居東戶之朝孟以謏聞獲染南風之化自合依仁游藝頌明王之盛德鼓腹擊壤歌太平之樂事何得盤游無度肆情於麑鹿之間穿穴匪恆流穢於街衢之內已則志惟惻隱處食野之長驅坊則情深嫉惡在公庭而載理徵諸故事已有託付之高考之今法孟有干違之釁請科毆巳之犯仍坐穿墻之愆庶不慚於丹筆亦無愧於青史水能利物輪乃曲成升降滿農夫之用低徊隨匠氏之程始崩騰以電散俄宛轉以風生雖破浪於川湄善行無迹既斡流於波面終夜有聲觀夫斫木而為憑河而引箭馳可得而滴瀝輻湊必循乎規準何先何後互興而自契心期不疾不徐迭用而寧因手敏信勞機於出沒惟與日而推移殊轆轤以致功就其深矣鄙桔橰之煩力使自趨之轉轂諒由乎順動盈科每悅於柔隨遠望蹄涔詎有朱殷之色挹茲鱗起終無塗附之期作霖或自於斯干流溼更彰乎就燥回環潤乎嘉轂洊至踰於行潦鈎深致遠沿洄而可使在山積少之多灌輸而各由其道爾其揚清激濁吐故納新輾桃花之活活搖杏葉之鱗鱗一勺每勞於濡軌三材必賴於工人浴海上之朝光升如日御泛江中之夜影重似月輪常虛受以載沈表能圓於獨運低徊而涯岸非阻委曲而農桑是訓惠可周於地利空霑負郭之田材足任於天津多寄臨川之郡池陂無漉畎澮既瀦用能務實勢欲凌虛磬折而下隨毖彼持盈而上善依於當浸稻之時寧非沃壤映生蒲之處相類安車異矣哉俯此溝塍潤於原隰成形必仰乎膏雨屈己且安於卑溼苟量遠大之功庶無慙於甕汲天空原清劍氣方呈始象奪朱之色未知埋獄之情氛昏乍歇淮海初平貫斗牛於九霄正當吳分藏轆轤於午夜遠在豐城歷彼歲時間於躔次雄芒既表乎潛感靈物且悲乎遐棄增華台室方期獨見之明流彩天階乍惑衆人之意思上徹而既久欲旁求而未遂謂繞樞之電郁郁彌彰想干呂之雲亭亭自異殊祥可驗直質不渝委照自歸乎有晉藏鋒若避於亡吳對西揭之星望何勞於尹喜臨北走之塞相寧藉於風胡觀其出以標奇凝而成象既蜿蜒而久鬱亦曈曨而再朗陋日中之青暈每駐寥空掩天際之非煙潛通惚恍光而不耀昏以為期漠漠而淪精詎滅昭昭而默識猶而疑東方未明始訝乎氣之聚也地不愛寶益見乎天將假之仰觀列位之中俯叶偃兵之後利刃猶鬱清時幸偶宣精溢目乍殷銀漢之流侔色衛身未配金章之綬其象也甚殊其明也則逾憤陸沈於江表結一彩於天衢凌夾月之霞徘徊碧落透靄空之露隱映白榆永夕猶存其光未匿齊效珍之金景鄙如虹之玉色不因槎客之犯如遇雷公之識儻觀此以見求冀龍泉兮可得厭浥敗草霏微夜螢若受天之明命能在地以成形始爛然於朽壤俄蠢爾於荒庭形質甚微異囊中之點點本根既朽想河畔之青青彼若昧而未彰此如茨而久積始前衰而委化終後顯而可覿寂然不動應大暑於茲時默爾而成揚溫風於永夕徒觀夫從微至著出死入生幾變青袍之色漸加丹鳥之名匪我愆期故分形於夜朗自他有耀因易貌而宵行故得脫陳根騰宿莽質化幽藹氣非腥腐無聲無臭同朽葦之成蛩有顯有微殊積穀之為蠱小明必俟其時變待暗稍觀其類聚並桃蟲而映彼中林齊藿蠋而光於舊圃始則退藏終能發揚詎蒙蘢於階砌初熠耀於池塘豈比膏腴之地多依糞土之牆每留滯於三時不愆於候既生成於六月必見其光徒有異於升沈信莫分於彼我得賦象而自出故非時而不可晶熒乍起訝林際之無煙的皪漸生疑池中之有火隕霜殺兮自晦零雨被兮增萎考書文之小大咸若載月令而遠近相隨始經黃落之餘三年不化既及朱明之節一日可為農夫之務既停剃氏之芟已久飛光兮倏爾而至向晦兮於何不有斯所以成武子之能勤冀聚之於書牖採彼艾兮及此佳辰標至靈以衛物因善救以成人當戶而居惡莠言兮結舌負墻而立甘菜色以安身異發能以求舊方止惡以知新原夫生亦有涯寂然沒齒盈腰雖賤於楚客奮臂若威乎厲鬼苟三年之疾雖云來者可追而五日為期豈復怨乎不以蓬頭亦取其容直蒿目似存乎深視行止於百姓之病雖云具體而微育材於萬物之靈必見盡瘁以俟直躬不墜邪氣可禳每表先生之候善為君子之防類宗則之初來一朝而獲順夏正之聚蓄久要不忘終躡虛而挂戶爰托實以升堂想在野之時豈謂生無根柢及得門之後如其自有肝腸列名號於冰臺載典常於玉燭免繩持而遏惡因草創而成俗以枝葉為膚革之胞藉麻絲為筋骨之屬待時而用益彰惟爾之能不怒而威詎可比豫於毒起自蒿萊之下處乎軒屏之前奉百藥而首出展四肢而脈連異萱草之忘憂孰云言樹等匏瓜之不食焉肯徒懸藹爾端容森然屏氣逾芻狗而善御並木奴而為貴雖雷奔電激寧聞乎危者使傾而暑往寒來亦見乎後生可畏故得攬蘭莫比懸葦未奇委質而桐君是録焚軀而介子相隨宜爾室家略備詩人之採不祈土地雅同儒者之為及夫氣散於中貌萎於外干時匪謂其徼福焦思亦齊乎遠害斯人也而有斯疾見靈溝之靈艾風之起兮不觸而行條之應兮有動無聲察微祥於生植表靜理於承平輕搖而曉露初滴暗裊而春鳩轉鳴入楊園而若舞拂花徑而如迎寂兮寞兮自南自北其去莫止其來可測方縈仙樹萬年之影稍垂爰報聖時五日之期不忒長養資於皇化沈潛契乎元德似有心於松柏之內上下依依類無言於桃李之間往來默默嫩葉隨轉柔荑共舒揚絲光於空際惹絮影於春餘聽莫得聞訝繁柯之蔑爾視之不見驚謺萼之攢如倏自邇而通遐俄起彼而集此順八方之候若有若無調四序之宜時止則止由是輕才偃草細不揚波異秋吟之摧木同春扇而微和均習習之容寧比夫空穴而至絶蕭蕭之響誰謂其高臺則多散漫千林翺翔九野修通匪亂於疾徐溥暢必齊其高下含其元也亦類於人焉靜以化之乃符於王者片塵靡驚於厚地㣥籟皆息於晴天對翩翩之歇鳥任嘒嘒之鳴蟬感之深殊桂鳴於秦樹害乎物鄙禾偃於周田我國家化將時茂德與風傳佇見傾梧之後棲儀鳳於君前衆潤將行一陽初勝剛柔合德遠近潛應動能依節自契周書之言流未入淇豈若衛詩之興時也冰填井甃日冷池塘暫無聲於短景終有騖於靈長於於是微消涸沍稍變潛藏既聞乎下能順上豈關乎陰不承陽深且異於潢汙孰云咸竭用堪和於酒醴誰見必香居壅鬱而將聽聲潺湲而尚未雖幽深之可測終遠大之為貴未知所適願添滄海之流必得其宜無俟黃鐘之氣瀲灩如彼清冷注茲其道也誠於遠矣其深也可以述而望朱夏而龍文生定四時而不惑當元冬而麋角解後五日以為期暗漾懷珠之媚潛抽潄玉之姿鄙借勢而為瀾每遇秋風之冽冽待流聲而解凍必由春日之遲遲全其性以守柔相其時而勿越思玉溜之才吐若岷江之初發出陽崖之下潛潤澗毛湧陰溪之中輕搖石髮決諸可見其淡淡冽彼詎同夫汩沒異雷驚之蟄猶若陸沈當治疑理之時不虞乾沒當今化源畢啓時令皆同覩陽光之下達昭帝澤之潛通浮帶地之功暫留坎窞運知天之德終異童蒙倘或導於外發其中冀有裨於江漢得流善於無窮蠢彼微蟲勇而不懼當往來之轍跡阻東西之馳騖聞轞轞而虎蹲佇轔轔而狼顧見危致命方確爾而靡遷唯敵是求乃毅然而增怒且肖形卓犖植性強梁豈奔衝之足畏非會達而不當逸性喬桀雄姿激昂拋輕軀致之死地壯前趾若有巨防觀臥轍之時似當黃霸想埋輪之處何憚張綱其或輸粟千箱迓姬百兩方擊轂之自遠已張拳而相向死且如歸路何能讓苟不折節於焉用壯睅其目曾不見機揮以肱豈為知量其理何如其生忽諸禍甚觸株之兔危同戲鼎之魚行無逗撓立必籧篨在聖人之經誠宜避地非長者之轍詎肯回車且麟傷豈仁龍醢非智思控摶而莫及諭壓溺而何啻不若履薄兢兢臨深惴惴任肖翹之可適曷彊禦之不避微茫膚血豈足殷其左輪展轉路塵寧止斷其右臂居當假息動必阽危捨鳴蟬而莫捕蔑黃雀而不知儻所據非據亦何斯違斯謂豺狼之不若念虺蜴而何為且含氣之類求生之厚豈必賢哉曷云能不獨不降志自貽伊咎誠轥轢之所加諒虀粉而何有奚必矜夫躍躍冒彼彭彭願陳力之方盛意當途之足驚曲循天理深居物情徒糾紛而莫紀固密勿而難明儻不載馳載驅廣人之用當念無輗無軏遂爾之生春秋之時晉主夏盟威服天下及大夫專政賄賂公行內外離析是故示威平邱而齊叛辭請召陵而蔡叛盟於沙鹹而鄭叛次於五氏而衛叛涖於鄭會於夾谷歃血於黃而魯叛諸侯既叛於外大夫復叛於內故奔於晉陽而趙鞅叛入於朝歌而荀寅與士吉射叛以晉國之大天下莫強焉而卒之敗壞而不能守者臧哀伯曰國家之敗由官邪也官之失德寵賂章也晉卿始禍緣衛貢也樂祁見執獻楊楯也蔡侯從吳荀寅貨也昭公弗納范鞅賂也而晉室不復能主盟矣夫為國以義不以利而處晉朝者賄賂公行如此晉安得而不敗乎典午之時政以賄成亦由是也杜預在外鎮數餉遺洛中貴要或問其故曰吾但恐為害不求益也夫杜預最為忠賢且復當武帝時朝廷清明紀綱未甚紊亂而預所以為保身之計者尚只在於饋遺權貴則是賄賂之風固已濫觴於此時矣延及後世茲風益熾荀郗都督青亠兊見朝政日亂懼禍及已多所交結每得珍物即遺都下親貴亠兊去洛五百里恐不鮮矣募得千里牛旦發暮還觀荀郗之所以為身謀者亦無以異於杜預也夫厚苞苴以賂權門在二子固不得為有守然所以使人如此則當時在朝廷者亦不得為無罪也是故讀王沈之釋時論有曰融融皆趨鷙之士其在爐冶之門者推挾炭之子苟非斯人不如其已讀魯褒之錢神論有曰京邑衣冠疲勞講肄厭聞清談對之假寐見我家兄莫不驚視何必讀書然後富貴觀二人憤時之所作者如此則知當朝士大夫貪墨成風幾於不可救藥也晉室安得不凌遲毀譽亂於善惡之實情慝奔於貨欲之途干寶謂晉之敗壞也如此其知言乎言如流兮惟舌是出咎將至兮徒駟之疾既力竭而罔逮則厲階而非一孰云不進諒金鑠以難追尚謂莫捫苟星奔而愈失由是知所大者吾將誡之雖欲加於鞭策誠有謬於毫釐不且息焉想喋喋而自遠非敢後也因駸駸而罔追爾其逝矣將興班如忽越彼懸蹄之莫馳伊利口之斯發猶在耳而旋失須臾若過隙而終煩滅沒詹詹如掉俄出有而入無薄薄陟遐想勞筋而苦節豈獨囂然未殄倏爾既徂徵其如駕之捷防其不密之樞如沸如騰訝已成於枝葉靡瞻靡顧信空騁於道途原夫貴以寡尤取之不辱慮一出而匪賤故再驅而是勗苟如簧之靡定是見瘁躬若捕影之無由寧勞蹀足是知聽之則咎鼓之或非靡不忘於可復固必在於知機雖齊景之則多爰思滅迹儻張儀之尚在詎可塞違至哉立彼教言先乎根本宏影響之靡誡懼衆多之招損崩騰未泄侔逐日而自勤反覆雖柔見如電之將遠是知孔甘者辱若訥者榮期自虞於速禍故必遣於遄征君子所以存勸誡立度程雖奔走而致遠吾知夫莫疾於聲伊山為蜀是曰蠻俗惟天俾秦厥生神人拔長蛇而贔屭闢廣岫之嶙峋在昔褒斜未通羌僰異域彼為夷國物産難究封疆罕測秦將欲廣其南冠其北張儀於是度其勢量其力假牛之計斯設饋女之功是克蜀王乃命力士闢高山貪功叨餮忘情險艱捫峯巒於日側抉虺蜮於雲間將以砥嶄崒等躋攀振衣而力抗千嶂攘臂而威陵八蠻俄而白日蕩搖元天忽霍鬼哭神怨風號霧廓怒髮森植雄心震躍灑珠汗以雹散瞪星眸而電落將欲斷煙靄排嵒崿訝巨靈之所拓蹂重林回絶壑疑夏后之所鑿吁可畏哉砰轟若雷虎視五嶽鯨吞九垓徒見其豁若谷嵽若堆橫隱嶙直崔嵬大應心踣高隨手摧江標峻棧之形呀然地裂闕鬬高峯之色騞若天開已而後患方啓前心莫遂喧闐兮乍進秦卒邐迤而全收蜀地道路無阻關梁有備旋聞五丁死而蠻黨移一徑通而秦人至雖共工之勇將觸也非雄項籍之力將拔也寧同曾未若擘秀嶺駭蒼穹今古攸賴華夷是通羽毛讋死以填谷草樹驚摧而墮空遂使鞭石之帝移山之公壯志難奪莫不慕其英風皇威克宣強敵無全始建牙而耀武終不殺而摧堅授師律以徂征鑿門而出指戎夷而向化掉鞅而旋靜難以仁勝殘以德綏懷未及方資弔伐之謀氛祲潛消詎假貔貅之力命將必先於制勝數謀寧勞於逐北三令著而狼野自清七德彰而梟心已息是知訓戎有律料敵無遺乘地形而動衆順天討以行師播武烈為先登之旅尊英風為遏亂之資利百勝者不其殆矣尚九變者於斯遠而於是指途而邊鄙革心按甲而凶渠授首向威懷而將順將血刃而何有行當盡敵制在於成規武以止戈匪勞於善誘念安人之可待懷鬬志而終不當其蘊龍韜以啓路馳豹騎以清塵鄙身膏於草野笑血染於車輪所以示專命柔遠人揚分閫之威無逾六月來有苗之類不俟七旬一舉干戈載櫜弓矢惟義是徇帷仁是以有以見解紛之謀有以見知難之旨且夫治兵在於克敵定亂在於圖安苟率人以知化寧黷武以自殘所以不矜其庸功不事乎權變文教被於含育武德彰於㝢縣由是而言善用師者不在乎善戰昔漢武帝喪李夫人歎妍婉兮不返悲繐帳兮空陳於是詔祕籙之方士致平生之幻身來其跡於虛無初驚有象察其儀之婉麗已訝如真時也齊心月殿屬目蘭室髣佛煙光飄颻蕙質修蛾再覩不俟返魂之香逝水潛回詎假長生之術原夫恍惚之際從容視諸想車塵於霧眇疑珮響於風餘峨峨兮稍辨雲鬢冉冉兮漸識綃裾洛水之靈非匹巫山之夢不如所謂神仙之事變化之異過隙之光已無傾國之容再媚悲睿旨於凝聽悼皇情於睇恍兮有望知感召之多方倏爾員來訝生死之殊致當其椒風向夕蕙露盈庭謂已從於雲雨終不間於幽冥寂寞瑤階永謝虛無之跡淒涼月幌猶分似是之形若往還留心迷目眩誠君恩之再造異術足徵豈風燭之重然真形可見固可以辨其妄輟其求去清懷之惑志釋元思之殷憂擾擾紛紛意真靈之如在薰歇燼滅竟芳塵之不留其來也形之如寄其往也生之若浮於是望斷驚鴻悲深解珮向窈窕而乍失顧容華而不昧由是而言可以知生之不再控引河源鑿山為門闢兩崖而龍蟠虎踞飛一帶而電激雷奔所以拯流離於品物佐含育於乾坤邈矣而高蹤斯在巍然而詭狀斯存昔夏王披簡援圖盡力溝洫萬方附會以恭命百工子來而奉職畚鍤具而勢蹙風雲巖岫分而狀成閫閾波濤有路無非汲引之功鱗介攸居咸被生成之德異夫屹爾崖巘張為閈閎懸流赴勢以中注巨石乘危而下傾拉叢林而山靈叶贊回大壑而水怪奔驚故凝滯者得以流其惡昏墊者得以厚其生當其相地所宜兆人攸利山崢嶸而洞啓水噴薄而俄至湯湯浩浩俱成畎澮之流原隰陂池皆為生植之地道邁前古芳流後塵豈不以開濟之功莫大通流之用如神龍躍新渚魚迷舊津四載之勞終成於舜日九年之患空愧於堯人始也設以規模不資鈐閉雲橫結駟之狀浪走高車之勢廣濫觴之運水無不通裨造化之遺人無不濟茂績崇崇與流無窮豁岧嶢而分遠碧來浩渺而寫晴虹不愧錫圭之命寧慚拓土之功是以羲軒等美唐虞齊盛故當輝爍於帝圖不然何以應千年之聖漢武帝以惑亂生聽衛太子以危疑出奔始誤讒諛之巧長違覆育之恩高臺有揭悔過無門峨峨九層已斷興哀之目眇眇千里不歸幽憤之魂嗟乎望以窮高思以及遠為父之慈靡及恨而莫追為子之道既乖慙而勿反當其版築初設土工聿修旁窺日轉下視雲浮所以取其遠無不鑒近無不周導宸衷於曠望表元思之殷憂豈比夫柏梁為耳目之玩通天窮汗漫之遊流眄無涯增懷永久意來思之可待念追悔而終不事殊子伋空引決以自傷跡異申生諒為孝而何有悲夫見危致命有去無歸誠一朝之忿斯極豈三年之恩可違於是跨層高之杳杳屬遠思之依依俯洊雷之音常思出震仰列星之象猶戀重輝豈知登臺有悼往之心陟岵無懷歸之歎曉光東上含萬恨而意深暮色西沈向四隅而望斷徒勞乎積財厚地纍土長空想迢遙於元圃悲寂寞於青宮鑑失聰明將後悔而何及臺高雲漢自貽咎於無窮原夫義絶君親禍由臣僕致兩傷於疑忌在一言之所黷是臺也可以申鑒於後王豈徒處高明而縱目翹翹嘉卉獨成國香在深林以挺秀向無人而見芳幽之可居達萌芽於陰壑時不可失吐芬香於春陽所以榮翹十步名傳九畹自下井高結根聳幹布葉逾密重陰未晚開緗蕊而乍合擢丹㯋而何遠好遵正直生匪臨於斜徑不向嶮巇質寧被於長坂獨茂幽壑厭若錯薪幾沾雨露猶苦風塵采掇兮有日芳菲兮度春得臨刈楚之地曷異修詞之人燕夢中榮何名而不遂蜀琴曲裏奏何聲而不新况衆英聚集傳香氣而相襲佳色葱蘢帶煙翠而攢叢固已歎夫貞潔期見賞於始終幽處斯久照臨忽通喜會無私之日深繄有力之風幽莫過於芳蘭誠匪同諸草莽充佩而靈均不棄入握而仙都必取詎比夫山上蘼蕪泥中蘅杜將虛名以共播竟無善而足數焉知夫光善才於左思能成賦於師古而已哉知我者謂我如碩儒不知我者謂我如生芻此幽人之未已亦何代而云無幸逢昭代得遇良哲雖偕薰蕕固有分別勿以卉賤不顧幽芬勿以地寒不軫孤絶倘折英而入用庶有光於優劣者也石虛中字居默南越高要人也性好山水隱遁不仕因採訪使遇之於端溪謂曰子有朴質沈厚之德兼有奇相體貌紫光噓呵潤徹頗負材器但未遇哲匠琢磨耳禮不云乎玉不琢不成器人不學不知道子其謂矣今明天子御四海六合之內無不用之材無不成之器我今奉命巡察天下風俗採訪海內遺逸安敢輒忘厥職見賢不薦者歟子無戀溪泉自取沈棄耳虛中曰僕生此南土遠在峽隅自不知材堪器用既辱採顧敢不唯命是從採訪使遂命博士金漸之規矩磨礲不日不月果然業就虛中器度方圓皆有邊岸性朴謹默中心坦然若汪汪萬頃之量也採訪使以聞於有司考試之與燕人易元光研核合道遂為雲水之交有司薦於上上授之文史登臺省處右職上利其器用嘉其謹默詔命常侍御案之右以備濡染因纍勛績封為即墨侯虛中自歷位常與宣城毛元鋭燕人易元光華陰楮知白常侍左右皆同出處時人號為相須之友史臣曰衛有大夫石碏其先顓帝之苗裔也出靖伯之後曰甫甫生石仲仲之後曰碏春秋時仕衛世為大夫焉即墨侯石氏與衛大夫即不同也蓋出五行之精八音之靈嶽結而生稟質而名懷寶為玉吐氣為雲發硎利刃與天地常存者也毛元鋭字文鋒宣城人闕於東墅而生昴宿一名旄頭遂姓毛氏世居兔闕少昊時因少暴農之稼為鷞鳩氏所擒誅之以為乾豆其族有竄於江南者居於宣城溧陽山中宗族豪盛元鋭之世二代祖聿因秦始皇時遣大將軍蒙恬南征吳楚疑其有三窟之計恃狡而不從使前鋒圍而盡執其族擇其首領酋健者縻縛之獻於麾下大將軍問聿之能曰善編録簡冊自有文字已來注記略無遺漏大將軍奇之用命為掾掌管記及凱旋聞於上為築城而居其族遂以文翰著名其子士載漢時佐太史公修史有徑直之稱天子因覽前代史嘉其述美惡不隱文簡而事備拜左右史以積勞纍功封管城侯子孫世修厥職能業其官纍代襲爵不絶皆與名賢碩德如張伯英衛伯玉索幼安鍾元常韋仲將王逸少王子猷並為執友歷宋齊已來朝廷益以為重鋭之曾大父如椽與王珣為神契之交大父如聿與江文通紀少瑜有綵毫鏤管之惠皆文章之會友也鋭為人㯋悟俊利其方也如鑿其圓也如規其得用也稱旨則默默而作隨心應手有如風雨之聲者有如鸞鶴回翔之勢龍蛇奔走之狀者能為文多記不倦濡染光祖德也起家校書郎直館遷中書令襲爵管城侯聖朝庶政修闕易元光同被詔常侍御案闕須之友天子以六合晏然志在墳典因詔元鋭專職修撰鋭久蒙委用心力以殫至於疲憊書札粗疏懼不稱旨遂懇上疏告老上覽之嘉歎曰所謂達士知止足矣優詔可之曰壯則驅馳老則休息載書方冊有德可觀卿仰止前哲宜加厚禮可工部尚書致仕就國光優賢之道也仍以其嗣職焉史臣曰管城毛氏之先蓋昴宿之精取筆頭之名以為氏以與姬姓毛伯鄭之後毛氏不同族也其子孫則盛於毛伯之後其器用則遍及日月所燭之地也天子至於士庶無不重之者也朝廷及天下公府曹署隨其大小皆處右職功德顯著宗族蕃昌云各備爾曹以供其職罄輸冰操同洽風規公府崢嶸具寮瞻矚事光文物掌設防非猶衆派之源流若提綱而集目尚恐禽棲入噪絡青瑣於傍喧蛛網交絲架朱窗而上掩豈意故為翻瀉用慢章程德不繕心罪亦旋踵違周氏之戒器水覆繩愆覽劉氏之朝衣羹傾宥過法開有誤理亦從宜
