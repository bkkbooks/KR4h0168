front:
  text: 全唐文欽定全唐文卷五百四十三令狐楚五
  hash: sha256:20da6be7042b45be383893634283f19b31f44df62720d699ed05b4fb758a8f19
body:
  text: 某官至辱垂下問令公舉一人可管記之任者愚以為軍中之書記節度之喉舌指事立言而上達思中天心發號出令以下行期悅人意諒非容易而可專據竊見前進士高陽齊孝若字考叔年二十四學必專授文皆雅正詞賦甚精章表殊健疎眉目美風姿外若坦蕩中甚畏慎執事儻引在幕下列於賓佐使其馳一檄飛一書必能應馬上之急求言腹中之所欲夫掇芳刈楚不棄幽遠况孝若相門子弟射策甲科家居君侯之化下且數年矣不勞重幣而獲至寶甚善甚善雄都大府多士如林最所知者實斯人也請為閤下記其若此惟用與捨高明裁之臣某牋伏見七月二十八日皇帝宣詔軍國政事並權委皇太子殿下勾當者伏以皇帝陛下躬勤黼扆志奉山陵恭慕積中殷憂發外瞻九廟之重須有纘承以萬幾為煩期在宴息伏惟皇太子殿下日躋睿哲天縱欽明繼丕業而堯歷重昌嗣鴻名而文功累盛事有光於往古慶實被於殊方率土臣心無任欣戴臣限以鎮守遠在方隅不獲陪慶宮庭抃舞稱賀瞻戀踴躍之至謹奉牋以聞元和十三載二月八日予為中書舍人翰林學士夜直禁中奏進旨檢事因開前庫東閣於架上閱古今撰集凡數百家偶於王勃集中卷末獲此鑑圖并序愛玩久之翌日遂自摹寫貯於箱篋寶歷二年乃命隨軍潘元敏繪於縑素傳諸好事者太原令狐楚記先生姓周氏名隱遙字息元宗其道者相號為太元先生汝南人也抱天和冲澹之氣含至精潔朗之質玉冷泉潤松高鶴閑韜精守道冥得真契谷神既存而長守元關無鍵而不開貞元初遊蘇州吳縣之包山林屋洞秋八月始於洞西得神景觀訊其居者曰距此數里世傳毛公塢毛公道成羅浮居山三百餘歲有弟子七十二人聚石為壇遺趾猶存爾能勤求吾請以導既行而蘿篠迷密不知所往先生冥目久之逢一物焉雙眸盡碧毛色紫而本白高數尺餘隨而行之視乃鹿也須臾乃跪止若有所告先生默記之而還至十九年冬刜木鬋茅奠厥攸居得異石一方上有蟲篆驗之即毛公鎮地符也既而鑿戶牖以為竇有鶴銜弄冠裳戲舞於庭砌後得一井香白滑甘溢為白泉其旁得古池焉深廣袤丈陽驗陰伏湛如也初先生嘗息於洞之南門中神化恍惚往往失其所在遇好風日亦來人閒將至必先之以雲鶴其弟子灑埽香室俄而至矣嗟乎先生之體同乎無體矣不以晝夜更動息不以寒暑易纖厚不食而甚力走及奔馬全乎氣者也雖飲而無漏止如靈龜外乎形者也鹿以導步神柔異物也符以存視道契先躅也井泉去厲昭乎仁也池水不枯齊其慮也仙雲靈鶴之驗去來彷彿之狀其必神行而智知乎予叔服膺先生之門二紀於茲錄先生本起見命為記凝神遐想直而不遺元和十三年八月華州刺史兼御史中丞令狐楚記大和五年春三月亠兊海節度副使李員外虞致本府書幣修好於我卒事返命且以故太守蘇源明集中小洞庭讌籍及序二首見寄請余立一貞石識其故處云余為之考尋圖牒詢訪耉老自五六日至於旬時茫然曾不得回源亭渦泊依稀彷彿者從天寶十二載而下及茲八十年源明有盛名於朝遺愛在鄆嘗與五太守會集讌遊之所形於文字冏若金玉若良二千石好事君子接武而來縱不恢張增飾之必當思人愛樹存為此州故事悲夫恩澤之外四紀有餘自蕩平而還三政相繼不銛鋒摩刃以戰鬬為務則長臂利爪而攫拾是謀視嘉山水好風月如越人之髢瞽者之鑑非惟無用又從而仇之余以為不可使中行子之文無傳於此地乃於溪亭作金石刻引而記之亦李志也秋七月二十七日天平軍節度等使檢校尚書右僕射鄆州刺史兼御史大夫彭城縣公令狐楚記仙人琴高生於周而遊於冀嘗入碭水沈而不濡時乘赤鯉周旋自若河東冀州之城也前此嘗命有司廟於沁水之東有冽寒泉在堂之下廣圜累步澄湛盈尺嘻靈蹤汗漫雖羽化於何鄉而真理希夷或鱗潛於此地不然則何以旱暵而不耗霖霪而不盈居人乞靈以赴愬遊子翫奇而濯弄澹乎不知其幾百年也貞元十五祀郡守之子弟敢以葷血饌於傍腥羶既漫清泚遂涸似有扃閉孰知根源迨茲七稔無復一勺永貞之元年觀察使尚書右僕射馮翊嚴公以清靜闕一字其心以中和樂其職申命前清源令范陽盧憚假符於州逾月而吏知恥逾時而人知敬一年而生物盡康眾績其凝由是抗懷仙風注意靈泉且曰㓨山而飛者傳於故志聞綺而赴者載在前言吾其禱焉儻可復也秋九月一日率其屬有攝長史程義光攝司馬周利用軍從事王僔州主簿趙鄂王青溪楊果雲連道冲并軍吏㣥從數十人致齋陳信肸蠁如答初以神視厭浥而未融徐以氣聽湔準而始達奠未徹而可以鑑晷不移而可以汲其明日潏然有響澂然無波舊痕皆平故味不爽州閭喜駭瞻觀奔走乞以其狀獻於府朝而盧君善無近名嫌不語怪將使感通神速之事寂寥無聲越十月楚聞風異之伐石為記嗚呼聖人之所以觀象設教神而化之者無他其要在於禍淫福謙懲惡勸善苟或淫昧將焉訓齋吾知盧君之洗心飡和勤力抱素前領遼山也未及周歲獲白鹿以歸聿來沁源齋沐於赤松觀有四白鶴自天翔集是故精意專感急於置郵靈釣而元關洞開神驅而幽鍵迎解有以知神明之與仁助信蓋章乎州民於是潔其涯隒新其廟貌入於門者不俟約束自然齋莊如承水仙若覩龍鯉上可以列瑞典下可以編幽經目為靈泉蓋傳信也時永貞元年孟冬月十有八日記道太原而北列郡數十雁門為大在周秦時與山戎林胡犬牙其疆國家以文德柔惠而驅去之北跡距塞口猶千里而遠若內地控於通都秩二千石者非休勳懿德則名王旄士乙亥歲今尚書隴西李公廉刺并部選第郡政之尤異者得昌化守南康郡王河南元韶首表其名遽聞於天璽書勞勉移理於代惟南康以壯事老謀逮事先侍中平王則尚書朗寧王勤於君惠於人而敬恭於神由是神降之福人懷其德是歲夏五月赤車彤幨至自石州初一日會計於官次察掾吏之勤惰次二日存問於里閭求人民之利病既三日徧祭於山川神祗蓋無停陰鑾不輟聲於郡東凡四十里白楊有祀實代之主也嘑水旁注雁門山前峙石盤礡相抵為堆為阜蘙薈柯條如虬如龍廣僅百畝厥高又倍信可以回薄日月而避逃風雨豈朔漠之氣凝結於此乎坤元之精決泄於此乎不然其何以巍巍蒼蒼將欲戛若木稍扶桑卑大椿於漆園小蟠桃於東方與夫古墓多悲蕪城早落者不同品矣按諸經記且曰昔元魏高祖孝文帝由一成而宅九有起雲中而馭天下損益三代憲章百王厥初經營由此途出繫馬其下歇鞍於枝威靈所憑別白而在既偃頓以附土又跳騰而架空如有高掌蹠為鳥勢形洎今朝中書令燕公說摹詠其事張公白楊篇之卒章云欲識前王塔鞍處正北苗抽一小枝戶部侍郎吉公中孚申而明之建中初吉公以萬年尉為黜陟判官至此為之歌序具載其事焉故迹彌顯高名益大為屏為圖播於海嵎代人神之是以祠也而舊規相襲未甚宏麗簷牖東嚮椽欒內奰有祅蠱之氣無尊嚴之威式車馬者以避禍非以致敬奠蘋蘩者惟邀福不惟饗德猶此祀也不亦委孝文於代乎南康其孫也大懼夫祖德之墜於地因愀然而言曰於古有召公奭以區區陜服為周二伯行野聽訟憩於甘棠後思其人猶愛其樹其在詩曰勿翦勿伐召伯所茇矧我烈祖有開國之武麗天之文撫正萬方照臨四海而又儲祉降德於後子孫俾不佞起家而王專城為守愧不能顯揚先美使若黃帝幸君之使使理此土敢黷於祭祀是褻於功烈而速其罪戾也一年因農之隙而易其地二年乘歲之豐而改其製不三四年得請於上而新廟成南面衮服所以稱尊也兩楹阼階所以定位也築墉於外所以禦侮也設屏於前所以修容也耽耽沈沈顯敞靚深不風而清無雲而陰前王戾止之儀於是乎在裔孫聿追之孝於是乎舉不惟禁淫祀廢非禮抑亦開明德摛耿光欲使異日觀者不俟請書問俗而知樹之所由植廟之所由崇諗於有知僉曰非頌聲不可初南康之典化顧嘗客焉迨今剖符則又備位於隴西公之府相得最舊見繩為文故敢徵成之功與作之義篆刻貞石立於前楹庶擬衞悝彞鼎之銘敢同魯僖閟宮之什銘曰蔚彼白楊叢生雁門蒙暑翳寒晴天色昏巨抵交柯龍翔虎眠從古強名莫知其原惟昔魏帝於枝息鞍懸垂低昂厥迹猶存大畏其力小懷其恩爰有靈祠號為神明二扉不扃四簋不陳樵蘇所往雉兔為鄰於鑠良牧時維孝孫下車之初致敬而言蔽芾甘棠猶思其人帛丿糸帛丿糸葛藟下庇於根乃正名居式崇藩垣山立當宁翼張重軒有赫斯皇既嚴且尊允矣君子孰如其仁大椿之年細柳之軍吾與元也人誰閒然欲載其功莫先於文編詞琢石終古不遷闕一字安定郡王諱光進字耀卿節制靈武之三年歲在乙未季夏六月寢疾於理所監軍使者驛馬以聞皇帝遣中貴人賫尺一書與御府醫藥馳往臨視旬有八日奄棄厥命享年五十七矣制詔丞相御史罷朝會加賵賻然後以左揆之密印畫綬告於第焉其年嗣子季元河東衙前兵馬使檢校太子賓客兼監察御史次曰燧元陳許節度押衙檢校太子賓客兼監察御史次曰毅元次曰綬元宣義郎行太原府太原縣尉次曰宗元次曰吉元血泣柴立護裳帷南歸太原越十一年二月已酉葬我尚書左僕射安定王於太原府東四十里孝敬原禮也公之先本阿跌氏出於南單于左廂十二姓代有才傑繼為酋師嘗統數千廬落號別部大人貞觀初大父賀之率其屬來歸太宗制受雞田州都督仍充靈武豐州定塞兵馬使大父襲之無祿早世先父良臣開府儀同三司雞田州刺史充朔方先鋒左助兵馬使夫以三葉之忠厚一門之信謹宜錫祚允降生畯賢公形清而視明神全而氣和猿臂虬鬚山立玉色贈工部尚書李奉國公之伯姊器公於稠人教之騎射付以韜畧由是發迹雲中策名太原始以勇敢從北平王燧戰於蒲次以愿恭事朗寧王自艮鉄於并或典領先偏或訓齊部伍公家之事無細大戎府之務無重輕緣手風生過目冰泮禮部尚書隴西公說待以心膂奏兼殿中侍御史工部尚書滎陽公儋仗為爪牙表兼御史中丞大司空嚴公綬擇戲下之才奏兼御史大夫司徒范公希朝求軍中之舊遷為檢校左散騎常侍古人云一心可以事百君於公見之自時而後氣概昭宣風聲流聞人望歸厚天心委重由代州刺史石嶺鎮北兵馬使代北軍使超遷工部尚書單于大都護振武節度支度營田觀察押蕃落等使朝家思所以優寵尊異於公者無所愛焉八年秋遷為秋官改拜靈州進階至銀青封闕一字於安定賜姓李氏列宗籍追命先君儀同為工部尚書先夫人史氏為代國太夫人君臣交感家國儲慶焜耀充塞有如是耶十三年春介弟忠武軍節度等使銀青光祿大夫檢校司空同中書門下平章事武威郡開國公光顏既平淮夷秉圭來朝疏公官伐德善涕洟見請以表邱壟又會故吏御史任夷則條二府政事上於考功故得鋪陳馨香追琢琬玉云惟公闕一字毅直清潔矩莊明不為物遷能以貞勝忠信之教自形於心術孝悌之行每合於天經昔國太夫人嘗有霜露之疾公與今司徒左右就養不脫冠帶者累月其到鴈門也先惠訓而後武斷清靜之政成愷悌之化流魚眾孤遂安奸盜訖息貞元中孝文之心在宥天下無何李鄭二帥相繼物故大司空嚴公亦用寬和統三軍轅門武人驕蹇自便及公之都紀綱也言詞約而必信號令明而必行堂皇之上聽無譁大旆之前立無跛范司徒之東討常山也軍旅之事闕一字以咨之或壍水以絕其歸居或斷橋以防其走進繄君有命皆我之為開網竟從於朝旨改轅無失於戎律其在振武也懲邊候之不修黠虜挻災我人離落於是選騎戒期揚威稜於沙磧寇皆吅丂一眙深潛而遠遁矣病公田之不闢豪家射利我庚空竭於是置吏立程懸信賞於表綴農皆鼓舞寒耕而熱耘矣罕羌之豪曰懷榮曰黑闕一字戕賊攘兊攵橫於二垂前後握兵者率不能禁公乃飛語以速其卸開恩而怠其意密聲殄力如取懷中而殺之風清河湟威動朔漠遷之至於靈武亦猶是也而加之以勤儉因之以廉平夫家之徭有恒經井地之征有定制生物滋殖齊人樂康利澤四布淑聲一口時縣官加兵蔡人且三年矣楚方奏薄技於內庭雅知將欲徵闕一字於朔方濟師於許闕一字謂肺肝之可見俾手足以相衞公亦義形於色情發於中或攘臂而言或投袂而起豈天緩狡童之戮於終歲也翌日而公疾浹旬而公病不月而公薨悲夫信之結於人也深惠之被於物也久聞喪而哭於野者雷動會葬而登於壟者星奔豈止剺面㓨心輟舂罷市而已嗚呼黑山雖順赤嶺猶虞而耀卿宰木已高壽宮永閉懷忠憤者得不太息而掩涕乎蔡邕撰有道之碑自知無愧范文觀武子之墓可以與歸銘曰天有風霆是為威刑國之斧鉞用以征伐明明我后耀武敷文蟜蟜我王砥節邀勳昔在偏裨其道則直洎司綱紀其儀不忒一麾出守十乘啟行藩籬單于襦袴朔方心與世同政由已出塞上師壯軍中廩實既宣大忠宜奏膚公西戡畎夷北伐山戎慶方來兮任方崇身己滅兮名已空罕山之南汾水東白楊黑柏多悲風維元和十五年歲次庚子正月甲戌朔二十七日庚子移殯於大內太極殿之西階粵五月十五日庚申遷座於景陵禮也玉衡南指金波西落皓雪集其麻衣素雲褰其綃幕柳宮龍動竹池魚躍兆庶雨泣於浩穰萬靈風號於寥廓哀子嗣皇帝仰攀雕輦殷奠瓊筵哀無容以觸地痛不返而終天仙仗徐進宸儀永隔降睿旨於鸞臺揚聖功於鳳冊其詞曰配天維唐伊祁同光應道為帝元元之系聖人有作孝子善繼顯赫十朝總齊四裔執其大象司彼左契武烈誕敷文明下濟出潛離隱或躍未融親則盤石封殊翦桐承祧黃屋主鬯青宮禮樂盡在謳歌薦至軒皇勌勤傳付神器太母侍養親臨寶位怡聲下色先意承志家令敢言天子屏貴明明出震業業承乾其仁如山其智如泉理析堅白學探幽元揮毫霧動掞藻霞鮮所持者儉所寶者賢刑靡不省賞無不延冕旒迎日珪璧祈年涕謁宗廟臣朝昊天天縱神聖日躋孝敬鴻名再加寶歷一定窮人屢賑名士交聘獸愛觸邪草憐指佞梯航修貢鱗羽遂性河色呈符山聲告慶編書辯謗創殿思政甘節必稱苦言終聽稜威之遠德政之盛霜雪憲章風雷號令夏臺齒劒上黨納穽趙際宅心鄴中聽命誰能去兵王者有征玉壘霧廓金陵鏡清狐鳴上蔡蟻聚東平伏鑕就戮迴戈受烹始以止殺歸於好生恢恢不失蕩蕩難名信及隱微道存溥博走馬斯郤昆蟲咸若調其玉燭徇以木鐸混同車書遠頒正朔範金合土大興太學清蹕鳴鑾將登高嶽四維既張五刃已藏蠻夷戎羌敢不來王天下清淨朝廷樂康會冠劒以高宴戲魚龍於廣場有嚴有翼無怠無荒俗皆臻於壽域人自為於羲皇日出入兮安窮極雲飛揚兮無處所瑞方瞻乎鳳來災忽聞於鸛語謂百年之可卜嗟九齡之不與當凝旒而下臨奄脫屣以輕舉萬姓哀其考喪千官懷其后撫封人猶祝於南山帝子已號於北渚嗚呼哀哉披靈衣兮如在委仙佩兮若休建環海以靜寐謝鼎湖而遠遊桂華朗兮高殿寂梧葉暗兮深宮愁驚同軌之遽至咽長川而不流嗚呼哀哉威儀肅設文物前列酌玉斚以宵奠駕金根而曉發出朱雀之正門背青鸞之迥闕逶迤原野蒼茫日月去復去兮降堯階悲莫悲矣臨禹穴嗚呼哀哉地開蒼谷天作豐山江海自流於泉下城郭取象乎人閒高封馬鬣永祕龍顏鱗有逆兮曾觸髥欲升兮高攀朝百靈以肅肅遺八駿以閑閑陵植柏兮未拱閣生苔兮已斑嚴日宮而深閉藹雲幄以空還興眾感於萬井結宸悲於九關嗚呼哀哉神行無方乾健不息物皆被於聖澤人自迷於帝力巍乎高代之行至矣動天之德後元壤以長存冠蒼穹而罔極嗚呼哀哉嗚呼齠齔之年獲見大夫目以成器異於㣥倫自降而遷垂三十春服義懷德遠而逾親靈州不協坐謫三楚遐服徂征高館晤語謂天之道正直是與捧手欲辭以心相許㣥后抗疏訟公無辜羽林森森天授兵符適值南還㯋耀神都風天雪夜買酒相呼帝命并土喜公為副令尹是毗賢王是輔嗟我小子此焉㛰娶贄幣既求酒牢亦具河外西城振胡鎖戎詔遷大夫開府其中平生相知招我以弓竟逼方寸不能從公自此違奉無由詣謁絡繹篇章綢繆書札不聞嬰疾不得留訣倉卒一辭寂寞長別嗚呼哀哉惟先將軍有庸有勳及公嗣興武不害文義分如霜志氣干雲頭蓬面垢報國事君土田未封旄鉞未受天實福善神明為咎埋沒黃沙摧殘白首雖以瞑目豈能鉗口孤旐翩翩反葬秦川經過故府悵望新阡魂兮何之音容悄然攀轅薦奠苦淚潺湲年月日某官某致祭於故十三姪女行軍夫人之靈嗚呼婦德尚柔以宜其家人之不幸生也有涯側聞夫人明懿穠華輝奪夜光鮮侔晨葩行軍之妻尚書之女動而中禮欲不踰矩婉彼宋子歸於鄭武主吏之昌副軍大鹵雲霄茲始琴瑟方調孰云大年曾莫崇朝煜煜蕣華不思風飄瀼瀼薤露先旦而消嗚呼哀哉昔也北來繡帷虧蔽今茲南去丹旐容曳逝矣冥漠宛然慈惠嫡女墜心良人迸涕嗚呼哀哉本支百世如水一源况是鰥夫彌憐小孫千齡共盡萬化如存申奠致詞悲何可言尚饗
