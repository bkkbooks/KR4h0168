front:
  text: 全唐文欽定全唐文卷六百劉禹錫二
  hash: sha256:dcc5269a843f1c971ab7181e6083f92ee8e67eac6c1a387a35d8b505666f7519
body:
  text: 維某年月日皇帝若曰於戲易云明兩作離大人以繼明照於四方蓋所以育其明德繼於正體邦本由是固萬方由是寧粵祖宗之闡帝業亦莫不由此而繼於明德肆豫一人緒承大寶纂奉丕構懼有失墜以貽先帝之羞永懷主器以繼明用副豫不德咨爾元子王某襲列聖之姿體健行之質吹銅稟異辨日耀奇早習德成克敬師保事業可大和順積中天縱溫文生知孝悌洎分茅土望出東平符彩昭彰禮樂文錯固可正位重震為天下之儲君人神叶從德任相稱仰稽令典光載盛儀是用冊命爾為皇太子往欽哉夫富貴莫大於家天下忠孝莫大於敬君親俟爾一人貞於萬國必咨正事必近正人必杜逸遊必樂善道求諫如不及惡佞如探湯懋爾厥修惟懷克和以二於朕躬無忝祖宗之烈可不慎歟維某年月日皇帝若曰啓茲東國境於青州略嵎夷導濰淄鹽絺貢庭檿絲入篚粵在少昊為爽鳩之域沃若殷商乃薄姑之邱周實太公之國積海岱之饒習戎革之盛因俗簡禮其政易成咨爾第二子某直諒多聞溫裕有立樂於為善力其未能行本貞廉言依忠孝固可錫茲青社俾藩於東是用命使某官某乙持節冊命爾為齊王往欽哉宜聽朕命夫敬人可以理國後已可以得人謂己不明任賢良以為明謂己不德資師傅以為德國安則備爾忠孝人散則忝爾君親慎乃厥修無替休命惟某年月日皇帝若曰衡嶽峙靈雲夢潤德錫十朋以備神物包三脊以供王祭浮江潛漢實曰渚宮俗輕而佻上難其化咨爾第三子某正性自得懿行克修曠淡居心寬裕推己移此成器綏於荊蠻錫爾赤社以屏南土是用命使某官某乙持節冊命爾為楚王往欽哉宜聽朕命於戲布政在寬革俗先信分吾之憂以惠黎庶勵爾之志以報君親為子為臣克忠克孝臻於二德在理一邦祗敬勿休無忝我命惟某年月日皇帝若曰朕讀詩至豳風見古公亶父之跡然後知王業之難仰惟我高祖太宗之櫛沐風雨以啓天下是用兢惕若墜泉谷豳之舊地積德之餘俗厚而忠人悅其上王於茲土克懋賢戚咨爾第四子某質重性和神清氣茂威儀儼若恬淡寡言介然風規坐鎮流俗固可將吾勤儉宣化豳郊錫爾白社藩於西土是用命使某官某乙持節冊命爾為邠王往欽哉宜聽朕命於戲播種者后稷公劉之業善繼者古公亶父之志積德行義國人戴之詩有七月之章非惟王業艱難亦俗阜化成之風也爾其日夜思之訓以溫柔之教無奪農時使獨戴周德以忝我一人之命維某年月日皇帝若曰涉河之東千里而廣右浸衛水左據常山蒲版唐堯所封之邱歷山虞舜隱耕之地晉陽我高祖誓衆之野本晉國也而謂之唐其人憂深思遠有帝堯之遺風焉故我國家因之以啓王業將我朝政保茲舊邦克建戚藩以任賢德咨爾第五男某和裕秉質端貞理身撝謙似不能好善如不足行歸於厚口無擇言本孝克家資忠體國固可嚴奉啓聖之域綏懷積德之邦錫爾黑社以藩於北是用命使某官某乙持節冊命爾為晉王往欽哉宜聽朕命於戲踐唐堯之地理虞舜之人開高祖之域爾其兢兢砥慎以臨其人思流愷悌之風祗敬興王之地無一舉足以忘我祖宗艱難之業往利厥土以孚於休惟某年月日皇帝若曰桃李發詠雲日連輝禮秩克柔肅雍載美築館大國建號名邦乃躅通規用光懿範咨爾長女金枝寵愛玉質輝奇蘊異體和含章挺秀柔順懿德幽間可貞已及初笄言從下嫁主之以同姓叔父配之以貴族聞人式遵舊儀錫是土宇是用命使某官某持節冊命爾為某公主於戲何彼穠矣詩之國風蓋美王姬能成婦道爾其克念以敬所從無忝我之休命不其猗歟臣某言伏見制書以二月十八日冊立太皇太后徽章克備慶賜遠行榮冠古今澤周寰海伏惟皇帝陛下纘承列聖歡奉兩宮太皇太后含飴保和重光謺慶漢儀盛於長信周祚興於大任方之聖朝彼有慚德臣遠守巴峽不獲稱賀闕庭無任抃躍屏營之至臣某言伏見制書以二月二十五日冊立皇太后盛禮畢陳德音遠被一人有慶萬國同歡中賀伏惟皇太后稟靈作合誕聖表祥徽號極域中之尊至仁為天下之母陛下君臨有國子道無違長樂宮中永獻南山之壽濯龍門上再揚東漢之風率土臣子不勝歡抃臣遠守荒服不獲稱慶闕庭無任踊躍屏營之至臣某言伏見詔書正月二十六日皇帝陛下嗣登寶位萬國同歡日月繼明乾坤交泰中賀伏惟皇帝陛下欽承顧命惟懷永圖以大孝奉宗祧以至仁蘇品物洞照寰海統和神人聖祚延長從今無極㣥生鼓舞自此大寧臣限守遐藩恪居官次不獲奔馳拜舞稱賀闕庭無任抃躍屏營之至臣某言臣伏聞陛下式遵典章正位宸極臣聞大明繼照雖昧者必昭其視震雷發聲雖聵者必達其聽是以聖人鼓萬物而耳目咸革感人心而天下太平致理興邦率由茲道中賀伏惟陛下紹纍聖之鴻緒冠前王之盛烈祥符薦委景福攸臻纂武繼文重光纍洽自宣猷上嗣育德儲闈仁孝表於域中慈儉章於天下由是餒者思食瘠者思豐曶爽咸耀於光明枯朽更延於惠澤禺禺億兆咸沐惟新鼓舞而四表歡心運行而二儀貞觀臣夙承朝獎謬列藩條歡抃之誠倍萬恆品臣某言臣聞帝堯之禪虞舜也業歸乎異代漢祖之尊太上也禮徇乎虛名有棄屣而傳七廟之重斯則堯圖非遠漢道未全卓哉冠鴻名而超古始者孰若今之盛也陛下孝至通三上極於君父德均吹萬下被於生靈大聖所以宣昭庶品由其利見聖作物覩天清地平故雖冰霰傷和之姿人情慢蔽之物宿陰茲解惡氣未除無不仰南至而自銷隨東風而盡變坐見可封之俗更覃無外之恩率土之氓俱霑覆育稟靈之內無不謳吟遐邇歡康昭聾發瞽臣謬忝朝列久總藩條云云臣某言伏見制書以十二月二十日冊皇太子盛禮斯畢德音遐宣萬國以貞庶類咸說中賀伏惟文武孝德皇帝陛下體元立極垂訓御時既闡王猷思安國本前星位定拱宸極以昭彰蒼震氣宣與天地而長久禮光匕鬯澤被華夷宗祏有無疆之休生靈懷莫大之慶臣恪居官次遐守巴南不獲稱慶闕庭無任踊躍屏營之至臣某言伏奉制書以今月十日冊皇太子德音遐布盛禮畢陳國本永安人心同慶伏惟皇帝陛下以繼天之聖有知子之明義兼君親禮重宗祏龍樓肇建展嘉禮於三朝鳳歷延長固本枝於萬葉臣守在遐郡不獲稱慶闕庭無任踊躍屏營之至臣某言伏見制書以今月日冊魯王禮畢皇家有慶實祚無疆既榮本枝克固磐石伏惟皇帝陛下德符列聖道冠前王孝敬承兩宮之歡虔恭奉九廟之祀先崇大禮慶浹天人次念建封事兼家國伏以魯王夙承睿訓特稟天姿爰擇吉辰光膺寵冊既示之以君親之道又錫之以禮義之邦寰海聞風室家相慶臣自嬰疾疹已歷旬時不獲展禮明庭拜舞稱賀臣某言臣得本道觀察使報伏承聖躬痊愈已於紫宸殿視朝者一人有慶萬國同歡伏惟皇帝陛下外親萬務內奉三宮常懷宵旰之勤遂失寢興之適上元降祜列聖表靈百神奔走以來扶四海精誠而致感勿藥有喜如山永安宗廟保無疆之休寰瀛申莫大之慶臣恪居官次遐守江干不獲稱賀闕庭無任踊躍屏營之至臣某言伏見今月七日制書大赦天下者帝遊出震聖澤如春神人以和天地交泰伏惟皇帝陛下丕承鴻業光闡睿圖吉日展嚴配之儀告天陳太平之盛九廟成禮百神降祥鑾輅旋衡風雲改色殊私廣被再宏莫大之恩寶歷惟新更啓無疆之祚兩宮承慶四海永寧率土臣子上千萬壽臣恪居官次不獲稱賀闕庭無任屏營之至謹差當州軍事衙官試慈州吉昌府別將徐倫奉表陳賀以聞臣某言伏奉今月一日制書改大和十年為開成元年大赦天下者雷雨作解人神悅隨澤及八荒網開三面臣某誠歡誠喜頓首頓首伏惟皇帝陛下上承乾綱下立人極用含宏光大之德副華夏會同之心獻歲改元惟新景祚先明首罪次及㣥妖述睿情以曉萬方施鴻霈以蘇庶物恤刑宥過已責弛征郡縣之舊弊悉除賦稅之新規咸備停藩方節獻之禮以惠疲人回榷管餘羡之財以資京邑命使展澄清之志察言求讜直之材弓旌賁於邱園粟帛頒於耆艾爰以初吉御於明庭德音一發於九天和氣驟周於四海開物成務實表於建元應天順人永延於億載臣幸居近輔先受殊恩不獲稱慶闕庭陪榮班次衆星列位常拱北辰之尊新歲拜章遙獻南山之壽無任抃躍屏營之至臣某言伏見今月十六日德音布告遐邇天道下濟人情大安中賀伏惟皇帝陛下凝旒思理垂衣擇材以日月無私之光照寰區有截之內貴使下情盡達寧虞厚貌潛謀一昨李訓鄭注等敢有逆心兼連凶黨陛下睿謀神斷左右協同頃刻之間掃除已定重臣畢力禁旅竭忠氛祲廓清華夷咸悅言念正刑之外或有詿誤之徒再發德音廣宣聖澤當星紀回天之日迎陽和煦物之光懷危疑者如山之安欲告訐者望風知懼非同謀者一切不問未結正者三宥從寬含生之倫普天同感臣恪居官次不獲稱賀闕庭無任忭躍屏營之至謹差防禦知衙官朝議郎權知容州都督府司馬孫惕奉表臣某言伏奉今月一日制書大赦天下者盛德廣運浹於華夷天光下臨照被幽蟄臣某誠歡誠躍頓首頓首伏惟睿聖文武皇帝陛下神扶寶祚天贊鴻猷意有所之事無不克寸當淮甸凱旋之後是域中慶幸之時順陽和以發生施霈澤於寰海網開三面危疑者許以自新耳達四聰瑕纍者期於録用求碩畫於庶位慮遺材於放臣旌忠烈之家賞勳庸之允仁及枯骨無隔於寇戎榮加顯親普霑於存歿恤刑己責實廩蠲徭頒錫彰有客之詩崇儒叶宗豫之望嶽瀆咸秩耆艾飲和大僚承任子之恩武旅荷賜金之寵斯皆禹湯文武之遺美高祖太宗之耿光集於聖朝然後大備德音所至和氣隨之歡謠上徹於九天福祚永延於億載能使遠夷屈膝豈惟小醜革心率土人臣不勝大慶臣久辭闕下恪守海隅犬馬之誠倍百恆品無任抃躍屏營之至臣某言伏見今月三日制書大赦天下者大明初升萬物咸觀渙汗一發神人以和伏惟皇帝陛下天資睿聖神啓昌期端拱受萬國之朝承顏奉兩宮之慶初嗣大位克揚孝心三光協明和氣來應臣伏讀赦令首於奉園陵盡誠敬親九族蘇兆人次及定章程止進獻已逋責滌夙瑕內照於九重則歸嬪嬙放鷹犬外明於四目則求隱士開直聲柔遠以仁則還其係虜賞延以禮則澤及後昆菲食遵夏禹之規弋綈法漢文之儉墜典咸舉舊章再明升平之期正在今日發號之始疾於春風殊私所及霈若時雨臣幸逢昌運歷事五朝出守遐藩僅垂二紀欣承靁雨作解之澤不勝犬馬戀主之誠瞻望帝鄉無任屏營懇悃之至臣某言伏見詔書以唐州節度使李訴生擒逆賊吳元濟獻俘文武百僚於興安門列班稱賀者天威遠被元惡就誅一方既平萬國咸慶中賀伏惟睿聖文武皇帝陛下德超邃古道合上元臨御以來天人協贊削平吳蜀掃蕩塞垣車書大同夷狄來貢蕞爾元濟敢懷野心輒聚犬羊苟偷時月陛下聖謨獨運睿感潛通天助神兵人生勇氣既擒凶逆爰正刑書伏三紀之逋誅成九衢之壯觀宗社昭告華夷式瞻行弔伐而在禮無違烜威聲而何城不克寸楚氛改色淮水安流漢上疲人盡霑雨露汝南遺老重睹升平凡在具臣孰不欣抃臣久辭朝列忝守遐藩不獲稱慶闕庭陳露丹悃仰瞻宸極倍萬㣥情無任踊躍慶快之至臣某言伏見詔書以今月某日奉遷獻祖懿祖神主祔於德明興聖皇帝廟盛禮云畢宗祧永安誠感誠悅頓首頓首伏以太祖景皇帝膺期撫運啓封於唐為百代不遷之宗開三靈眷命之兆頃以本朝初建清廟備儀二祖冠西室之先景皇闕東向之位諸儒獻議歷載未行陛下濬發睿謨旁延正論爰詔多士會於中臺酌三禮之前文參百王之故事講貫斯定詢謀僉同備物展儀考祥視履配貴神於遠祖正尊位於始封廟貌有嚴禘嘗允穆示人以孝得禮之中既觀秩秩之容必降穰穰之福臣職居內史屬忝本枝躬導盛儀獲申誠敬無任感悅屏營之至臣某言伏奉聖旨以時雨愆候有妨耕農應諸有靈跡處並令祈請者德音才發膏雨驟飛滂霈已周動植咸說云云伏以久愆時澤上軫聖慈爰命禱祈俾申誠敬神應如響天且不違未興雲漢之詩已致桑林之雨臣謬司京邑虔撫黎蒸覩豐年之可期同比屋而稱慶無任欣抃之至臣某言伏以去冬以來久無雨雪臣每於殿內親奉德音以宿麥未滋為虞以兆人生疾為念聖情所屬神理潛通獻歲發春佳雪肇降當夷夏會同之日觀天人合應之徵迎喜氣於三元浹歡心於萬國癘疵永息豐年可期臣以疾疢未平步趨有阻伏蒙恩貸已具奏聞謹於光宅寺中管當本務不獲隨例稱慶明庭既覩嘉祥益彰聖德無任欣躍屏營之至臣某言伏奉詔旨充某郡主禮命使謝恩之日親承德音以春初已來雨雪猶少慮妨農事有軫睿慈今當下嫁之辰克致上元之感雲生河漢及佳期而降祥雪滿寰區應豐年而呈瑞臣官當撫字職在肅雍慶抃之誠實倍常品臣某言今月某日中使吳文政奉宣聖旨緣今年雨多恐傷苗稼諸有靈跡處並宜祈禱者臣謹檢尋祀典方議遍祠惟德動天倏已澄霽伏以至教惠農兆人務本今歲宿麥茂於常年爰自季春遂逢多雨蓋陰陽常數有以推遷而隴畝之間未聞傷敗陛下勞謙思切覆育恩深或慮成災先期軫念昭薦未陳於方社睿誠已格於上元文明煥開陰曀潛掃有年之慶實兆於茲辰先天不違敻超於前代臣謬司京邑虔撫蒸黎欣抃之誠倍百㣥品無任踊躍屏營之至臣某言今月十七日中使某奉宣聖旨以霖雨未晴諸有靈跡處並令祈禱者臣當時於興聖寺竹林神親自祈祝兼差官城外分路遍祠伏以神祇效靈景物澄霽兆庶覩動天之德大田俟多稼之期臣謬荷恩輝忝司京邑抃說之至實倍常情臣某言中使宋惟澄至奉宣聖旨存問兼賜臣墨詔及昭示洗雪吳少誠等事天地宏覆燾之恩雷雨施渙汗之澤瑕纍咸滌危疑獲安中謝臣伏以少誠擅興兵戈事生詿誤自王師致討天威下臨曾無悖辭亟聞引咎初懷疑懼雖擁衆以偷生旋感聖神屢拜章而請命陛下仁深解網慮軫納隍念餽餉飛挽之勤閔戰爭暴露之苦舉茲宥過之典副彼效順之誠一方承再造之恩九有覩惟新之化敷鴻霈而覃及蠢類鼓仁風而臻於太和罷柝銷鋒自茲而始臣謬膺重寄虔守遐藩不獲稱慶瑤墀陳露丹懇仰瞻宸極倍百常情無任慶抃屏營之至臣某言中使李國真至奉宣聖旨存問兼賜臣墨詔鴻澤浹下大明燭幽曉諭便藩慰安稠謺中謝臣伏覩天書恭承睿旨宏愛人屈己之道酌因時適變之宜擇賢王作鎮徐方俾張愔便主留務上則成邦家磐石之固下則副士衆拜章之請戚藩之寄斯重舊勳之祀獲全丕變猖狂之徒咸躋仁壽之域既宏在宥坐見止戈率土人臣孰不欣說臣素乏方略謬荷寵光猥塵將相之名無施分寸之績遭逢若此報效蔑聞官謗已興渥刑宜及陛下恩深覆載道務含宏恤公私餽餉之勤念吏士鋒鏑之苦特紆神算昭發德音危疑獲安制置惟固好生宥過誠陛下開網之仁尸位無功重微臣素餐之責周章局蹐胡顏自安但以遐守藩條恪居官次不獲仰謝雲陛陳露血誠未遂周任知止之言敢逃臧文竊位之咎無任戰越之至臣某言伏見四月二十七日德音以王承宗效順著明復其官爵所獻二郡別置藩垣聖德動天鴻恩及物瑕纍咸滌蒸黎永安伏惟睿聖文武皇帝陛下自承寶位克振皇綱既以四海為家每念一夫不獲昨因大慶爰降殊私廣宥過之科開自新之路綸言一發神聖潛通遂令迷誤之徒頓釋憂危之慮命允子以入侍獻名都以效誠臣心既明天網為解因析四郡別為一方惟懷永圖盡去前弊大河以北化為禮樂之鄉率土之濱重見升平之日臣恪居官次遐守嶺隅不獲稱慶闕庭無任踊躍屏營之至臣某言伏見制旨魏博節度使所奏逆賊李師道并男二人並梟斬訖以二月十六日御宣政殿受賀者聖德元運兵威神速旬月之內鯨鯢就誅泰嶽既寧登封有日伏惟睿聖文武皇帝陛下有征必克舉意無違天地協神算之期靁霆助成師之氣蠢爾孽豎敢生野心蕭斧一臨妖氛自滅皆由聖慈廣被睿略潛通獻俘者盡許生還得地者復令安堵感我仁化激其深衷凡是脅從盡思效節五紀巢穴一朝蕩夷遂使齊魯之鄉復歸仁壽之域捷書既至傳首繼來備文物於明庭告殊勳於清廟百郡陳賀萬方會同從此止戈所以為武西周士庶方觀飲至之容東嶽烟雲已望告成之禮臣恪居遠服嘗忝班行慶快之誠倍萬㣥品無任踊躍屏營之至臣某言伏奉前月二十五日詔書示逆賊鄭注已梟首訖妖氛殄滅華夏乂安伏以逆賊鄭注本出細微潛懷梟獍之心兼結凶狂之黨人倫共棄神理不容陛下睿略感通天人合應重臣協力禁旅齊心指顧之間猖狂自潰乾坤交泰日月增明凡在人臣不勝慶快臣恪居官次不獲稱賀闕庭無任欣歡抃躍之至臣某言上天降禍大行皇帝奄棄萬國奉諱號劈糜潰五情伏惟皇帝陛下孝思至性攀號罔極臣恭守所部不獲陪位西宮伏增感慕之至謹奉表陳慰以聞臣某言臣得進奏官楊惕狀報淄王薨輟朝三日伏惟皇帝陛下德邁前王情深近屬憫枝葉之謝諒切宸衷割肌膚之愛何堪聖念萬方知化九族歸仁凡受國恩伏深悽惻臣限以藩守不獲奉慰闕庭無任屏營之至
