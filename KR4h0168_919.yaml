front:
  text: 全唐文欽定全唐文卷九百十九暜門子俗姓何氏岳陽人登進士第後為沙門住南岳寺貞元八年卒門人曇環集遺文二百篇行於世
  hash: sha256:1bd0db83518da514020f3426c4bd781c415db83de40c41078cbda6cdeca6d084
  markers:
  - {type: head, offset: 13, content: 暜門子, id: KR4h0168_NFKB_919-h1, level: 1}
body:
  text: 四教成列開合之旨蘊乎其中十子既往幽贊之功在人方絕惟三轉遂周一乘載道經文顯而約元記博而深後進難窺蒙求尚壅不遠而復存乎其時我哲匠湛然公當之矣公孩提秀發志學名成淵解得於自心博贍振於先達無適不可以虛受人洎毘壇以至於國清其從如雲矣間者島夷作難海山不寧徇法之序多仄身巖宇或謂身危法喪莫如奉法全身僶俛遂行暴露原野是樂法者請益悅隨且法實無邊身則有待宏敷未暇籤訪有憑因籤以釋思逸功倍美哉洋洋乎登門者肯綮未嘗望涯者恥躬不逮乘是以訓文其可廢耶先德既詳雖大科不舉諸生未達在小疑必疏凡十卷不忘於本以天台命家善繼其宗以釋籤順學信所謂觀象得意俾昏作明永代不朽者也暜早嵗在塵後時從道徒欲擊其大節獨不愧於心乎宗虛無者名教之道廢遺文字者述作之義乖古先梵王乘時利見聖賢道契德音莫違尚闕一字言詮寄諸結集况時淹像季學鮮知幾領會之賓十無一二至有窮年默坐闕一字節於昏闕一字白首論心遲回於半滿人之多闕一字其若是乎闕一字階捫象各陳乳色或謂即心是佛悟入之闕一字色不異空本末誰迹將冥闕一字待章句闕三字呼大教陵夷若是蓋由未辯文字之性闕二字喻總持之功深惟昔智者大師降生示世闕一字敷元德大拯橫流咨覆簣於大思振絕維於龍猛命家作古以中觀為宗師立極建言以上乘為歸趣爰什灌頂頂公引而伸之欽若闕一字持廣有記述教門戶牖自此重明繼之以法華威威公宿植不愆於素復次天宮威威公敬承如水傳器授之於左谿元朗朗公卓絕天機獨斷相沿說釋遑恤吾文載剔於毘壇湛然然公間生總角穎悟左谿深相器異誓以傳燈嘗言止觀二門乃統萬行圓頓之說一以貫之噫纉承四世年將二百魚魯斯訛不無同異方將繹思津道元流遂廣斥邪疑旁薄今古質而不野博而不繁著輔行記凡十卷備前聖廣畧之旨允今人勝劣之機豈維錯綜所聞將以隱括所治所治即行三多之妙運遽階所聞唯解一真之元覽沕口夫行有歧路則始終天隔解無方隅亦淺深隨類建言輔行以舉其全故自遠方來詢疑請益擊蒙發覆孜孜日夕庶幾幽贊欽若傳宏道之將行不孤運矣咨予末學輕說上乘其猶燭火增輝二曜靈祐俗姓趙氏福州長溪人從本郡法恒禪師出家入天台遇寒山子造國清寺遇拾得元和末至長沙住大溈山同慶寺大中七年卒年八十三詔諡大圓禪師夫業繫受身未免形累稟父母之遺體假眾緣而共成雖乃四大扶持常相違背無常老病不與人期朝存夕亡剎冉異世譬如春霜曉露倏忽即無岸樹井藤豈能長久念念迅速一剎冉間轉息即是來生何乃晏然空過父母不供甘旨六親固以棄離不能安國治邦家業頓捐繼嗣緬離鄉黨剃髮稟師內勤剋念之功外宏不諍之德迥脫塵世冀期出離何乃纔登戒品便言我是比邱檀越所須喫用常住不解忖思來處謂言法爾合供喫了聚頭喧喧但說人間雜語然則一期趁樂不知樂是苦因曩劫徇塵未嘗返省時光淹沒嵗月蹉跎受用殷繁施利濃厚動經年載不擬棄離積聚滋多保持幼質導師有勅戒勗比邱進道嚴身三常不足人多於此躭味不休日往月來颯然白首後學未聞旨趣應須博問先知將謂出家貴求衣食佛先制律啟創發蒙軌則威儀靜如冰雪止持作犯束斂初心微細條章革諸猥弊毘尼法席曾未叨陪了義上乘豈能甄別可惜一生空過後悔難追教理未嘗措懷元道無因契悟及至年高臘長空腹高心不肯親附良友惟知倨傲未諳法律戢斂全無或大語高聲出言無度不敬上中下座婆羅門聚會無殊椀鉢作聲食畢先起去就乖角僧體全無起坐忪諸動他心念不存些些軌則小小威儀將何束斂後昆新學無因倣傚纔相覺察便言我是山僧未聞佛教行持一向情存粗糙如斯之見蓋為初心慵惰饕餮因循荏苒人間遂成疎野不覺躘踵老朽觸事面墻後學咨詢無言接引縱有談說不涉典章或被輕言便責後生無禮瞋目忿起言語駭人一朝臥疾在牀眾苦縈纏逼迫晚夕思忖心裏恛惶前路茫茫未知何往從茲始知悔過臨渴掘井奚為自恨早不預修年晚多諸過咎臨行揮霍怕怖慞惶縠穿雀飛識心隨業如人負債強者先牽心緒多端重處偏墜無常殺鬼念念不停命不可延時不可待人天三有應未免之如是受身非論劫數感傷嘆訝哀哉切心豈可緘言遞相警策所恨同生像季去聖時遙佛法生疎人多懈怠畧伸管見以曉後來若不蠲矜誠難輪逭夫出家者發足超方心形異俗紹隆聖種震懾魔軍用報四答拔濟三有若不如此濫厠僧論言行荒疎虛霑信施昔年行處寸步不移恍惚一生將何憑恃况乃堂堂僧相容貌可觀皆是宿植善根感斯異報便擬端然拱手不負寸陰事業不勤功果無因克就豈可一生空過抑亦來業無裨辭親決志披緇意欲等超何所曉夕思忖豈可遷延過時心期佛法棟梁用作後來龜鏡常以如此未能少分相應出言須涉於典章談說乃傍於稽古形儀挺特意氣高閑遠行要假良朋數數清於耳目住止必須擇伴時時聞於未聞故云生我者父母成我者朋友親附善者如霧露中行雖不溼衣時時有潤狎習惡者長惡知見曉夕造惡即目交報歿後沈淪一失人身萬劫不復忠言逆耳豈不銘心者哉便能澡心育德晦迹韜名蘊素精神喧囂止絕若欲參禪學道頓超方便之門心契元津研幾精妙決擇深奧啟悟真源博問先知親近善友此宗難得其妙切須仔細用心可中頓悟正因便是出塵階漸此則破三界二十五有內外諸法盡知不實從心變起悉是假名不用將心湊泊但情不附物物豈礙人任他法性周流莫斷莫續聞聲見色蓋是尋常者邊那邊應用不闕如斯行止實不枉披法服亦乃酬報四恩拔濟三有生生若能不退佛階決定可期往來三界之賓出沒為他作則此之一學最妙最元但辦肯心必不相賺若有中流之士未能頓超且於教法畱心溫尋貝葉精搜義理傳唱敷揚接引後來報佛恩德時光亦不虛棄必須以此扶持住止威儀便是僧中法器豈不見倚松之葛上聳千尋附託勝因方能廣益懇修齋戒莫謾虧踰世世生生殊妙因果不可等閑過日兀兀度時可惜光陰不求升進徒消十方信施亦乃辜負四恩積累轉深心塵易壅觸途成滯人所輕欺古云彼既丈夫我亦爾不應自輕而退屈若不如此徒在緇門荏苒一生殊無所益伏望興決烈之志開特達之懷舉措看他上流莫擅隨於庸鄙今生便須決斷想料不由別人息意忘緣不與諸塵作對心空鏡寂只為久滯不通熟覽斯文時時警策強作主宰莫狥人情業果所牽誠難逃避聲和嚮順形直影端因果歷然豈無憂懼故經云假使百千劫所作業不亡因緣會遇時果報還自受故知三界刑罰縈絆殺人努力勤修莫空過日深知過患方乃相勸行持願百劫千生處處同為法侶乃為銘曰幻身夢宅空中物色前際無窮後際寧剋出此沒彼升沈疲極未免三輪何時休息貪戀世間陰緣成質從生至老一無所得根本無明因茲被惑光陰可惜剎那不測今生空過來生窒塞從迷至迷皆因六賊六道往還三界匍匐早訪明師親近高德決擇身心去其荊棘世自浮虛眾緣豈逼研窮法理以悟為則心境俱捐莫記莫憶六根怡然行住寂默一心不生萬法俱息福琳元和中沙門釋皎然名晝姓謝氏長城人康樂侯十世孫也幼負異才性與道合初脫羈絆漸加削染登戒於靈隱戒壇守直律師邊聽毗尼道特所畱心於篇什中吟咏情性所謂造其微矣文章儁麗當時號為釋門偉器哉後博訪名山法席罕不登聽者然其兼攻竝進子史經書各臻其極凡所遊歷京師則公相敦重諸郡則邦伯所欽莫非始以詩句牽勸令入佛智行化之意本在乎茲及中年謁諸禪祖了心地法門與武邱山元浩會稽靈澈為道交故時諺曰霅之晝能清秀貞元初居於東溪草堂欲屏息詩道非禪者之意而自悔之曰借使有宣尼之博識胥臣之多聞終朝目前矜道侈義適足以擾我真性豈若孤松片雲禪座相對無言而道合至靜而性同哉吾將入杼峯與松雲為偶所著詩式及諸文筆併寢而不紀因顧筆硯曰我疲爾役爾困我愚數十年間了無所得况汝是外物何累於人哉住既無心去亦無我將放汝各歸本性使物自物不關於予豈不樂乎遂命弟子黜焉至五年五月會前御史中丞李洪自河北負譴再移為湖守初相見未交一言怳若神合素知公精於佛理因請益焉先問宗源次及心印公笑而後答他日言及詩式具陳以宿昔之志公曰不然因命門人檢出草本一覽而歎曰早年會見沈約品藻慧休翰林庾信詩箴三子所論殊不及此奈何學小乘見以宿志為辭耶遂舉邑中詞人吳季德梁常侍均之後其文有家風予器而重之晝以陸鴻漸為莫逆之交相國于公頔顏魯公真卿命裨贊韻海二十餘卷好為五雜俎篇用意奇險實不忝江南謝之遠裔矣晝清淨其志高邁其心浮名薄利所不能啖唯事林巒與道者游故終身無惰色又興冥齋蓋循燋面然故事施鬼神食也晝舊居州興國寺起意自捐衣囊施之嘗有軍吏沈釗本德清人也夕從州出乘馬到駱駝橋月色皎如見數人盛飾衣冠釗怪問之如何到此曰項王祠東興國寺然公修冥齋在此伺耳釗翌日往覆果是鬼物矣又長城赳胥錢沛行役泊舟呂山南見數十百人行幷提食器負束帛怡然語笑而過問其故云赴然師齋來時顏魯公為刺郡早事交遊而加崇重焉以貞元年終山寺有集十卷于頔序集貞元八年正月勅寫其文集入於祕閣天下榮之觀其文也亹亹而不厭合律乎清壯亦一代偉才焉晝生常與韋應物盧幼平吳季德李艹口咢皇甫曾梁肅崔子向薛逢呂渭楊逵或簪組或布衣與之交結必高吟樂道道其同者則然始定交哉故著儒釋交遊傳及內典類聚共四十卷號呶子十卷時貴流布元和四年太守范傳正會稽釋靈澈同過舊院就影堂傷悼彌久遺題曰道安已返無何鄉慧遠來過舊草堂余亦當時及門者共吟佳句一焚香其遺德後賢所慕者相繼有焉至賢元和中沙門楊岐大師法號甄叔幼而聰敏倜儻不㣥心月貞明具大人相觀死生輪上見三聚㣥迷猶焦螟處在蚊睫勝妙欲藥似嚼蠟無味遂投簪削頂具佛壇式求正覺了義扣大寂禪門一造元機萬慮都寂乃曰㣥靈本源假名為佛體竭形消而不滅金流樸散而常存性海無風金波自湧心靈絕兆萬象齊昭體斯理者不行而遍歷沙界不用而功葢元化如何背覺反合塵勞於蔭界中妄自囚縶形同水月浪跡人天見岐山㣥峯四合乃曰坤元作鎮造我法城纔發一言千巖響答松開月殿星布雲廊青嵐色中化出金堺一所宴坐四十餘年滿室金光晝夜常照宜城化緣已畢機感難畱元和庚子歲正月十三日忽棄塵區選歸大定門弟子如父母逝痛勝於心泣悲震海哀聲動山如月隱天衢㣥星失曜大集眾木積為香樓用建茶毗獲舍利七百粒於東峯下建窣堵坡巖掟錦障列其前澗撲銀河落其後永光法嗣用鎮山門上足僧有任運者飽飲法乳誓報深恩涉萬重山經三千里來投於我請述斯文將副其心式旌不朽銘曰吾師內外皆明澈如淨琉璃含寶月常將定水灑㣥靈大注禪河未曾竭獨步楊岐山闕一字頂建出花宮勝仙闕樓臺扛勢闕一字虛空魔界輪幢盡摧折閻浮月隱須彌角一念收光歸寂滅長畱舍利鎮山河光透支提照巖穴猶如簷蔔花飛去枝上餘香常不歇無限門人臭此香還向枝頭香更發師用太和中沙門聖人立法制器以利濟於時其義遠矣釋氏教有以鐘號法鼓鏗以致信信以警時時以集事其用勤矣故凡緇侶住處必懸以簨簴立以臺閣蓋取斯也南陵邑境有靜勝之地曰爐峯道場者在老山之艮方是處本京地杜處士之業也故處士諱有正樂天養素而隱於邱園以此地氣爽而泉甘木秀而草蕃雖在人境勝勢特異將建淨宇以棲真徒彰其言而未果其事無幾何屬壽迫大運以永貞元年而終嗚呼修短之分其可歎也洎元和年中賢夫人徐氏命其子著藹蕃芃等追成先考之志乃剏院宇請尼惟採尼義靜等居之裝嚴住持士女皈向增修堂室供給壽用興福建善未之有極也杜氏季子芃既習善履敬久而彌殷以白法斯宏鴻鐘乃發願而營之詢謀同緣有遂厥志於太和二年十二月二十八日集正信命良工施洪爐鼓士冖䂞籥革金而成焉其形其聲咸所妙好觀聽者謂杜君之威冥祐也且夫中人之務學於道者或勤而不息或惰而不勵惟鐘能節之使知時合宜得進退之度警告昏曙發幽暢遠聆其響者肅然起慈敬之念况拯危拔苦之感彰乎前傳哉芃既情敬於中事契於理功成願畢刊石以記之告於沙門師用請贊其盛事師用既察其所以迺揚斯人之善而銘云釋門信鼓是曰洪鐘能齊進退實警昏蒙叩則應人鏗鍠舂容沙門斂念舊感冥通檀那杜君宿習正因迹在儒仕情超世塵爰求良工乃鍊精䥫成茲寶器狀貌殊絕茲聲隱隱振水搖雲思息炎熾魚停劍輪景福無際殊切不朽勒銘於斯昭示其後道振太和中沙門郡城東南三十餘里丹流灣曲山罨翠屏雲霞生雙髻之峯碧霞吐香爐之石谷深景邃地近山幽藏陰南連禮浮北接硤石之名本非寺號徑通人行時共稱焉初有曇始禪師大齊起義之首奏藏陰寺講涅槃經感野雉來聽藏神遺絹獮猴奉果山神獻飧時之異人乎其難識矣周朝有惠遠法師即晉城霍秀人也制涅槃疏擲筆昇空精義入神以驗其旨名振古今號擲筆臺已現存焉近唐代宗之運神墨禪師唐之貴葉學究典墳善閑莊老捨榮慕道晦迹忘名藏陰宴坐林藪行節孤迅人難可儔真元之時有智通法師近朝供奉聰惠天假其靈善談涅槃真闕制六波羅蜜疏流於世也今有惠愔禪師業善儒門博通子史高道不事棄筆從緇究禪理而真心自閑習心觀而定惠雙運居無定所雲林是家遠尋靈跡來屆此山時有智岑善講天台教門深遠妙源精義尢博誓為佛使行化人間來亦於此知山靈秀景勝處幽名僧繼踵其時懷公至此欲過嵩嶽志求法華道場之處土地時運宿緣所追乃感邦伯邀畱及有清信長老結邑請住去太和二年上方剏造僧院兼置暜賢道場為山寺荒廢嵗久杜絕人來道者難居蓋為差稅時太守王公以善理人慈愛育物敬崇三寶荷護伽藍自至山門殷勤畱請兼捨祿粟及勸官僚資助幷咸降差科時有清信之士以議助濟差科時有廿八入闕經闕年間人即論散出邑今有六七人同為竭力崇供山寺科闕幷造閣一所兼素畫彌勒兼諸方信施者幷邑外持念經人具歷此石法華之應事亦具載矣邑人司徒暎等宿植深厚菩提種成法雨潤根善闕開發又能晦跡藏名隱遁州城縓肆和光混俗樂道安貧共結良緣同修福利心貞志固刻石記文感集陳情命余題述匡白太和中沙門文其規諫者乃有國之龜鏡也其於哲后真事未嘗不討論之聽納之將欲俾雄圖令嗣延百千世之奕葉何止於萬嵗哉苟無鑒裁不偶其時則秦之坑焚衞之翦伐何所存焉皇唐白傅之有文動鈎私乃惟曰此必補之蓋不銷吾之力也及旋斾於府即命翰墨者繕之不期月操染畢函而藏之於辨覺大師堂之座左誡其掌執者嚴以鏁鑰開閉準白侯文集無令出寺勿借外人又圖白侯真於其壁使人敬憚之不敢苟違也仍傳教令下屬幽愚令紀山微猷用刊琬玉匡集七十卷一置東都聖善一置蘇州南禪一置廬山東林其間表牋制誥文賦歌詩讚頌碑銘議論箴誄無不以諷諫為旨黜陟為事使讒諛奸詭所不能隱匿矣而流於搢紳莫不滋味之以為藥石也洎唐之季世兵火四起向來之美殆為煨燼餘則固知東林者其已墜焉有吳之天下也武以定亂文以延英繇是業儒者兟兟然源流淵淩慶稔宗親德化令公大王處青宮日雖以宴遊參侍宸扆而友愛棣華之美靡間於君臣其或歡洽之餘經綸之際何嘗不以筆硯簡編致其左右至若良宵靜晝輟膳蠲寢或以風月為儔侶騷雅為仇讎雖姬旦之多才多藝不足以同年語也常於白集是所畱情俄膺天命秉旄鉞出撫江城江之民足蹈手舞忻忻然乃曰天從人善願降父母之君於是藩信矣哉王為理清淨視事之暇閑採圖經蹶然而悟且曰白傅嘗謫為是邦典午及訪之遺跡又洗然憶東林等有其集焉又詢諸老僧咸曰執事者不勤翦無遺矣王咨嗟良久顧謂諸輩何疎慢之若是亡斯寶耶然於勝事頗闕一字白也冥蒙釋子述作非能仰認奬錄之深詎可輒為陳讓含毫襞紙愧懼煎恪股慄流汗不能已矣時太和六年嵗次甲午八月己巳朔十二日庚辰管內僧正講論大德賜紫沙門匡白記敢獻頌曰緬彼樂天真古賢才器天付辭華世傳集有七帙芳逾百年言其婉麗理且淵元向罹騷擾幾至沈遷非逢至鑒亦類投泉聖主求理英王出藩恩榮在上典籍居前省覽餘時箴規是思且吟且諷乃歌乃詩曾不釋手應亦忘疲念彼東林而嘗有之尸掌不專逸漏堪悲爰命傳寫用補闕儀祕之龕藏勒彼神姿品流所好翫閱於茲玉魚金鑰彰嚴誡遺無令外借永作良規龍天所衞嘉猷肯移俱期不朽幷吾大師東乂太和中山陰沙門唐君諱闕其先闕平闕詩曾祖闕祖珍名宦不敘欲畧故也府君氣宇英明風神雄大闕門之緒且時從闕傑闕展伏波早世夭命闕賢良所嗟太和三年三月二十六日私第而故享齡六十以其年四月二十四日卜闕於山陰承務鄉九里村馬闕之地宅兆之禮也夫人李氏元和十二年四月二日先夫而終內則令範可傳女史今合祔墳塋蓋琴瑟榮枯嗣子師素弓裘克繼泣血茹闕哀號事喪岵瞻屺瞻闕雷在闕風悲拱木月闕佳城恐山谷遷變勒銘萬古詞曰府君之生林闕祿位文武猗歟令名天命何欺遽違人世喪親怙恃窀穸俄闕哀孤孝子荼毒肝腸奉柩扶護合葬龍岡松柏新栽風光萬古佳城異代刻名泉戶戴仁而處抱義而行者即瑯琊王府君公諱仕倫字文迥其先晉右軍十闕代孫也曾祖璆皇祖思皇考良忠貞不仕公春秋五十有七以太和九年六月二十二日終於暨陽之私第嗣子宗志次子劉老稚年荼毒泣血絕漿以當年八月二十九日葬於故朱夫人之同塋所也山連藥王之岡地闕建興之壟且離城郭不逾一里知人烟十步有餘焉恐山川遷變乃刊石為銘賢哉哲人抑抑秩秩無嗜輕挑好求之質云何積善而遘斯疾悲占青松哀辭白日萬古千秋於焉終吉叡川直心寺沙門太和中充內供奉於戲行律比邱尼願闕一字三階教大禪祖茶毗林畔先大師茶毗所哀慟樹是明幢比邱叡川為其銘師姓耿氏諱揔靜年五十四夏三十四太和五年正月二十六日長安縣㣥賢里直心寺闕一字滅灰舍利閟是下闕二字分律舊疏大上研而達底拔臨壇法三階法甚若習法華等大乘經大小乘戒至是蚤夜無已願證以其師嘗來學先天寺余先大師臨壇四分大師下悉熟行道闕二字乞詞是豈宜闕四字茫茫歸人前有何向明度總持闕二字之仗覺者先後師光唯徒先歸本根福唯後敷不爾塔萬甎懿爾幢一石資糧爾師聖地之力而佛昭格澄觀字大休俗姓夏侯氏越州山陰人年十一依寶林寺霈禪師出家元和中住太原府大崇福寺後住清涼山大華嚴寺開成三年卒諡清涼國師至道本乎一心心法本乎無住無住心體靈知不昧性相寂然包含德用該攝內外能深能廣非有非空不生不滅無終無始求之而不得棄之而不離迷現量則惑苦紛然悟真性則空明廓徹雖即心即佛惟證者方知然有證有知則慧日沈沒於有地若無照無悟則昏雲掩蔽於空明若一念不生則前後際斷照體獨立物我皆如直造心源無智無得不取不捨無對無修然迷悟更依真妄相待若求真棄妄猶棄影勞形若體妄即真猶處陰影滅若無心妄照則萬慮都捐若任運寂知則眾行爰起放曠任其去住靜鑒覺其源流語默不失元微動靜未離法界言止則雙忘知寂論觀則雙照寂知語證則不可示人說理則非證不了是以悟寂無寂真知無知以知寂不二之一心契空有雙融之中道無主無著莫攝莫收是非兩忘能所雙絕斯絕亦寂則般若現前般若非心外新生智性乃本來具足然本寂不能自現實由般若之功般若之與智性翻覆相成本智之與始修實無兩體雙亡證入則妙覺圓明始末該融則因果交徹心心作佛無一心而非佛心處處成道無一塵而非佛國故真妄物我舉一全收心佛眾生渾然齊致是知迷則人隨於法法法萬差而人不同悟則法隨於人人人一智而融萬境言窮慮絕何果何因體本寂寥孰同孰異惟忘懷虛朗消息沖融其猶透水月華虛而可見無心鑒象照而常空矣至聖垂誥鏡一心之元極大士宏闡燭微言之幽致雖忘懷於詮旨之域而浩瀚於文義之海蓋欲寄象繫之迹窮無盡之趣矣斯經文理不可得而稱也晉譯幽祕賢首頗得其門唐翻靈篇後哲未窺其奧澄觀不揆膚受輒闡元微偶溢九州遐飛四海講者盈百咸叩余曰大教趣深疏文致遠親承旨訓髣髴近宗垂範千古慮惑高悟希垂重剖得覩光輝順斯雅懷再此條治名為隨疏演義昔人云人在則易人亡則難今為此釋冀遐方終古皆若面會然繁則倦於章句簡則昧其源流顧此才難有慙折衷意夫後學其辭不枝矣往復無際動靜一源含眾妙而有餘超言思而迥出者其唯法界歟剖列元微昭廓心境窮理盡性徹果該因汪洋沖融廣大悉備者其唯大方廣佛華嚴經焉故我世尊十身初滿正覺始成乘願行以彌綸混虛空為體性富有萬德蕩無纖塵湛智海之澄波虛含萬象曒性空之滿月頓落百川不起樹王羅七處於法界無違後際暢九會於初成盡宏廓之幽宗被難思之海會圓音落落該十剎而頓周主伴重重極十方而齊唱雖空空絕跡而義天之星象燦然湛湛亡言而教海之波瀾浩瀚若乃千門潛注與眾典為洪源萬德交歸攝㣥經為眷屬其為旨也冥真體於萬化之域顯德相於重元之門用繁興以恒如智周鑒而常靜真妄交徹即凡心而見佛心事理雙修依本智而求佛智理隨事變則一多緣起之無邊事得理融則千差涉入而無礙故得十身歷然而相作六位不亂而更收廣大即入於無間塵毛包納而無外炳然齊現猶彼芥瓶具足同時方之海滴一多無礙等虛空之千燈隱顯俱成似秋空之片月重重交映若帝網之垂珠念念圓融類夕夢之經世法門重謺若雲起長空萬行芬披比華開錦上若夫高不可仰則積行菩薩曝鰓鱗於龍門深不可闚則上德聲聞杜視聽於嘉會見聞為種八難超十地之階解行在躬一生圓曠劫之果師子奮迅眾海頓證於林中象王迴旋六千道成於言下啟明東廟智滿不異於初心寄位南求因圓不逾於毛孔剖微塵之經卷則念念果成盡眾生之願門則塵塵行滿真可謂常恒之妙說通方之洪規稱性之極談一乘之要軌也尋斯元旨却覽餘經其猶杲日麗天奪眾景之耀須彌橫海落㣥峯之高是以菩薩搜祕於龍宮大賢闡揚於東夏顧惟正法之代尚匿清輝幸哉像季之時偶斯元化况逢聖主得在靈山竭思幽宗豈無慶躍題稱大方廣佛華嚴經者即無盡修多羅之總名世主妙嚴品第一者即眾篇義類之別目大以曠兼無際方以正法自持廣則稱體而周佛謂覺斯元妙華喻功德萬行嚴為飾法成人經乃注無竭之涌泉貫元凝之妙義攝無邊之海會作終古之常規佛及諸王竝稱世主法門依正俱曰妙嚴分義類以彰品名冠㣥篇而稱第一斯經有三十九品此品建初故云大方廣佛華嚴經世主妙嚴品第一余覃思大經薄修此觀羅其旨趣已在疏文恐墮業於深經少讚演茲元要精誠之旨時一發揚數子懇求叩余一闡咸言注想訪友尋源或學或傳徧求眾釋積嵗疑滯今方煥焉夕惕勤勤願釋深旨顧以西垂之嵗風燭難期恐妙觀之淪胥使枝辭之亂轍乃順誠請畧祈幽微名法界元鏡冀將來道友見古賢之深衷矣玲幽開成中清河沙門緬夫造化厥初以渾元為首乾坤纔著二儀始分爰有三皇降其間五帝居其次然乃驪連栗陸尊盧赫胥神農伏羲禹湯堯舜周秦之後迄至隋唐開闢以來君王宰輔不可繁載備如傳記者也唯有西域之教生於周昭王甲寅之嵗來自漢明帝永平之年摩騰天竺法蘭剏於此矣然則釋道儒門如鼎之三足若拯溺救難易危成安莫過乎釋氏之教矣有志信上黨樊公先代楚有將軍燕有烈士公則是其緒裔也曾祖及祖尊諱不書竝高尚不仕隱於里閭則榮宦貴祿勿干懷也考諱元信曾任武寧軍討擊副使雄名振古英畧貫時動日羽以猿驚彎月弓而雁落郡府捐其闕一字軌轅門仰其規儀藝絕奇能莫可儔也嗣子樊忠義家本上黨來居魯邦巨產洪基里閈推最公量為河海氣納乾坤幼而謙長而恭文武忠孝備於厥躬無虞邱三闕三字有榮期三樂不苟名宦遁跡邱藪時人望之不及也有子長曰德亮仲曰德安季曰德平竝事父能竭力事君能盡忠與朋友交言而有信公家務之暇暫爾靜思乃喟然長歎曰余覽維摩經見是身如芭蕉中無有堅又金剛經云一切有為法如夢幻泡影吾今年侵蒲柳齒髮漸衰若不預造梯航將何越於苦海遂乃捨縑帛割餘資轉法華經一部七卷四十九遍已終持金剛一軸之經一萬之數云畢更以絹捨束素粟麥一車入修當村佛殿工償又兩施絹六疋臺山設三百僧齋大聖文殊遙加密護更施絲二百一十八兩將充贖香四州供養僧伽三綱飛洑迴報若不標記胡表素誠爰訪他山之異石遂立豐碑召素緎之良工得班輸之奇士更造功德一鋪數有十軀家闕一字部一十五人虔誠侍側且尊客相好竝悉圓嚴菩薩神龍無不殊麗經文有聯環之字隨心識而鐫成佛前有宛卷之花從子下而鑿出建造在於私第成就遂至伽藍萬代子孫永充供養此寺之勢也東接太公之遺跡西鄰古戴之州闕一字南眺豐城北倚厥國且昔時堂殿尊像儼如今剏瓊碑屹立於此所有功德先奉我國家伏願帝歷長明金輪永御大吏常侍休佐堯階州縣采寮鎮居祿位樊公先靈尊眷諦國受生現在一門保全慶吉仍恐日月驟改桑田幾變將刊貞石以紀闕一字工銘曰天地將分兮盤古生焉濁氣為地兮清氣為天三皇降德兮五帝其間周秦相禪兮唐祚聯帛丿糸釋道儒教兮齊致如鼎三足兮無偏時主不易兮鄭重樊公志信兮闕一字虔轉金經兮數部捨資財兮無邊立不朽兮貞石石斑爾兮彫鐫建尊像兮儼若合家稽首兮佛前獲福壽兮此世他世立碑記兮千年萬年元應京兆莊嚴寺沙門上座俗姓太原王氏累世京兆涇陽人也童子事師年過受戒報終七十有六而僧夏五十焉業精妙法於大歷八年試業得度隸名住興國寺也上座行操寒松戒德霜白道洽㣥物而悲敬齊行持念無虧經聲不輟優曇花之句偈曉夕相仍分陁利之開敷香風不絕向萬餘徧稟學定於總持東院繼七業之蹤爇心燈於巨夜之中明終不絕而忽於今年覺是身虛憊氣力漸微絕粒罷飧唯茶與乳右脅而臥四旬如生命入室門人上座子良都維郍智誠等曰吾今色身應將謝矣努力勤策法乳相親金泉磑及梨園鋪吾之衣鉢將入常住以為永業言已帖然累足而去也門人子良等號呼慟天空闕一字血灑澗流汨咽庭樹摧枝川原無色悲風慘然巍峩鴈塔崛起於西原颼飀松吹金龜之田即於其年三月七日於興國下庄淨室飛香神顏不易狀若平生黯爾終矣門人子良等採以荊珉徵搜哲匠鏤於金石刻之以銘欲使後賢而知今矣詞曰戒行嚴潔松篁比貞秉志堅直如崑如荊衣珠內瑩獨耀心靈精持妙法德冠㣥英四旬絕粒而亡內逼諸漏蠲除聖賢不測
