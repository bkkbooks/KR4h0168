front:
  text: 全唐文欽定全唐文卷六百八十七皇甫湜三
  hash: sha256:42234bc1fd96fbd3a5215fb822aa26fbec6e84e01acbd5fd4e13b9197fe79ccf
body:
  text: 狠石蒼蒼驪山之傍鑱朴礲瘢嶷然四方昔秦皇帝謀之不臧七十萬人茲焉惶惶發石此山言礎於墳若有憑依屹住中逵刑蹴迫人力無施故老相傳以狠名之自昔太古不封不樹有葛於溝有薪於野後聖有作緣情不忍為之棺槨其在唐虞則維木噫嘻暴秦虐用其人墳而象山下錮三泉窮珍總奇力瘁財殫驅逐而前如刈草菅天毒其衷神憤其凶謫戌一呼九州風從白挺荊棘指麾崤潼險阻不闔干戈倒鋒尸露於劫燧燔於童蓬顆無依不十年中禹葬會稽不改其行聖德洋洋厥饗久長至於漢劉釋之而言中如可欲猶隙南山矧私其身以盡其人刻詞狠石炯戒千春土與水火風雜為千品萬殊大凡太虛之中形而有者皆主於土揮而動者皆主於風液而通者皆主於水躍而養者皆主於火天地之與稊米醯雞之與應龍雖殊大小必質四者具四者之性然後為一物抑四者能為質不能為知者也動焉四不動焉四四者能質不能知有虛而靈者合焉以為物知凡四者之合而有也而合乎是為知若角若鱗若飛若走舉為其屬不合於是為無知若草若木若金若石舉為其屬最靈者人人之中為心心之知為神人之生也質乎土風水火而心乎知其於死也氣旋於虛而反於土風水火之性各旋其所質固化而無矣若心之知則未知其處焉而人見其質之化也謂知亦從而亡豈不愚甚矣哉彼繇心所以知者虛而靈其不可為無也較然矣其質也遊冥而化遷者也夫心猶水也水清則撓而濁者不存存則不清心猶鏡也鏡明則塵埃不止止則不明聖與愚受於初一也聖人瑩其心而窒其誘是以能照天下之理故其心清而定愚者負其心而薄於外是以閉天下之理故其心塵而結清而定者離其質也玲瓏乎太虛之中動而合則為文王仲尼順而安則必始終天地塵而結者離其質也狂攘兮太虛之中轉而合於有則為禽為獸其於人也為愚為凡於草木者無所不為矣雖欲少安得乎推是而言則彭祖為夭而顏子為壽盜跖為殺而比干為終天下之是非繫於人不懸於迹一於分不定於所為孰謂人君子小人是也孰為分君子小人之別是也彼誠君子矣為之無不是彼誠小人矣動而之非故君子指人之過為嫉惡譽人之善為樂賢言已之光美擬於堯禹參於天地為昌言順則為周公變則為伊尹其心定矣其歸一矣雖萬殊百化一於君子而已所謂左之右之君子宜之右之左之君子有之小人者不然其過人為毀訾其譽人為比周言已之光美為矜夸變則為賊順則為偽其心定矣其歸一矣雖萬殊百化一於小人而已所謂天下之惡皆歸焉余故曰天下是非繫於人不懸於迹一於分不定於所為橫天地絶古今人之所由者二而已湜次揚州其地面大江而負山往時城郭牽於形勢以是一州南其東向府縣室閭塗井凡居處舉即其向狃於常不知向非也州有浮屠某初為表景以端之地以縣之於一祠猶約南北甚正而居之中人為偏焉豫常途往東者凝視自淮而南咸以不正白之於衆不知甚正也祠之人斷事者將墮其志反其面焉余知其始為止之曰反白以為黑倒上以為下謂此疑也夫不唯倒之而又毀之罔之甚矣周之道衰嘉瑞不至凡有於山澤者皆鴟梟麋鹿也彼麟獨生之故不祥必遭仲尼然後知其麟也昔周之季也王者不作凡在天下者皆曲私幽嶮也彼少正卯生之故反為聞人必遭仲尼然後知少正卯之罪也向微仲尼則麟怪而少正卯聞人乎今無異詞矣今是州與祠其顛倒有似焉則知直者寡而枉者多奪寡宜矣以枉者定之直者枉之亦宜矣必有遇而後公是焉噫無其遇者亦衆矣余不知也不果逍遙遊曰適百里者宿舂糧適千里者必聚糧此言務遠則積彌厚成安君曰千里饋糧士有飢色樵蘇後爨師不宿飽此言持不實則危一則寓論一則武經相發明其義符也故強於內者外必勝殖不固者發不堅功不什倍不可以果志力不兼兩不可以角敵號猿貫蝨徹札飲羽必非一歲之決拾仰馬出魚理心順氣必非容易之搏拊淺闢庸種無嘉苗頽絇疏織無良帛夫欲利其獲不若優其為獲之方若欲顯其能不若營其為顯之道求諸人不若求諸已馳其華不若馳其實彼則趦趄於卿士之門我則婆娑於聖賢之域彼則巾車於名利之肆我則冠屨於文史之囿道寢而後進業成而後索以其勞於彼曷若勤於此以其背於路曷若齎於家求售者聲門而衒賈致賤者深匱而俟價求聘者自容於靚粧取賄者嫌扁於密影鮪可薦也不慮綸罟之不逢橘可貢也不慮包匭之不入務出人之名安得不厲出人之器戰橫行之陳安得不振橫行之略書不千軸不可以語化文不百代不可以語變體無常軌言無常宗物無常用景無常取在談其理核其微賦物而窮其致歌詠者極性情之本載述者遵良直之旨觴類而長不失其要此大略也夫比文之流其來尚矣自六經子史至於近代之作無不詳備當朝之作則燕公悉以評之自燕公已降試為子論之燕公之文如楩木柟枝締構大厦上棟下宇孕育氣象可以燮陰陽而閲寒暑坐天子而朝㣥后許公之文如應鐘鼙鼓笙簧錞磬崇牙樹羽考以宮縣可以奉明神享宗廟李北海之文如赤羽白甲延亘平野如雲如風有貙有虎闐然鼓之吁可畏也賈常侍之文如高冠華竹替曳裾鳴王立於廊廟非法不言可以望為羽儀資以道義李員外之文則如金輿玉輦雕龍彩鳳外雖丹青可掬內亦體骨不飢獨孤尚書之文如危峰絶壁穿倚霄漢長松怪石傾倒溪壑然而略無和暢雅德者避之楊崖州之文如長橋新構鐵騎夜渡雄震威厲動心駭耳然而鼓作多容君子所慎權文公之文如朱門大第而氣勢宏敞廊廡廩廄戶牖悉周然而不能有新規勝概令人竦觀韓吏部之文如長江秋注千里一道衝飇激浪瀚流不滯然而施諸灌溉或爽於用李襄陽之文如燕市夜鴻華亭曉鶴嘹唳亦足驚聽然而才力偕鮮悠然高遠故友沈諫議之文則如隼擊鷹揚滅沒空碧崇蘭繁榮曜英揚蕤雖迅舉秀擢而能沛艾絶景其他握珠璣奮組繡者不可一二而紀矣若數公者或傳符於帝宰或受命於神工或鳳翥詞林或虎踞文苑或抗轡荀孟或攘袂班揚皆一時之豪彥筆硯之麟鳳今皆遊泳其波瀾偃息其林藪銓其一揖之舊也而驟以諭業之言動子之志誠未當也遂絶意隨計解退修循力行待取之儒規達先難後獲之通理將為勇退真勇進也斯可尚矣子既信余之不欺余亦貴子之不忽因源流遵業而列諭焉恨不樂兮何鄉江之上兮山之陽日遲遲兮正春草茸茸兮既長見美人兮未可以求蹇愁豫兮此時出郊坰兮遙望緣千里兮滿芳菲山縈鬱以四周溪潺湲兮數支花思林兮苔媚石水光搖席兮煙染衣鳥嚶嚶兮聲急曷孤遊兮不歸顧馳逐而紛煩非余心之所希欲淹留以愈衍非余心之所期直目兮思薰傷心兮感茲折桃李兮有贈意不遂兮天之涯愛韶妍之悅懌懼日夕之差池春心曷來之遲而去速使余汲汲以傷悲昨以南昌迄於建昌悠悠三千厥路何長值子之喜逢時之祥高桅引帆月抱虹張縱飛挾箭疾激無妨僕夫謳愈懷戴難忘今由建康抵於我家終朝之程百里之賒翻然怒號格在灘沙洶洶湍波蛟螭磨牙胡力甚易為竟思哀若曰昨非相恩今非相戾余本無心於君自爾而不可尋則不當廟食於天子名書於太史既依巫祝乃命姓氏拔木周郊亂軍睢水胡有知無知之一彼一此能動天地其唯精誠日回魯戈霜擊燕庭自我淹留凡幾晦明咫尺燕越心如懸旌曾不余感孰稱爾靈爾之好正直今我與爾同好爾之道聰明我又與爾同道自宜響應丕俟昭報州城南偏寺曰香城基於乾夫姓翟名宣棄地為園開池引泉日以昌大登聞於天再敕寺人豐護㣥鮮長史承緝締構綿連殿堂峙起裴高實然洪收路分平起之年奏移古額始為寺焉厥後悠久僧志不專風消雨淋蛟漏雀穿丹白侵剝階甍頓遷朽樹枿隄涸鮒愁鳶迄於元和翔歷三傳刺史維崔嗣績於前於是遠公奉命始旃歲年荒歉功加不延鄭牧來茲修架是先經之營之門房洞褰列庫豐廚危危掀掀鄭君既移誰續其編炅師作主亘公來禪大飾圖像益崇榱椽百祀來勝江山助妍宜序於銘以刻於堅既序既刻光流億年師諱承威姓劉氏河南洛陽人也幼而靜定病天下無古今無賢愚大馳於勢利沒死而無悔掀然逸發不懼過正之譏遂以弱年奮其獨知從照師問佛法次從光師受僧律竟依同學廣師證師講習其傳天寶八載始以敕度居東都敬愛寺十三載詔置護國寺於河陰御題雖挂一簣未覆蒼然古原架構無時於是千僧百賈相聚謀曰將成大功實資衆力若非盛名豐福孰能議而建之乃相與設金翠雲纓花香之飾迎請吾師以至德丁酉歲適來爰止師以為造作土木為尤滋久就危山無人之境闢蒿萊不田之地比之妨閭害穀不猶愈乎鏟其榛崖才容足處周鄭士庶翕然依之多方誘掖隨機道達折夸者之鋒散執者之迷曉愚者之黑清貪者之滯勢聲益張走集滋遐靡然而財贍雅然而院列軒房互映圖像增設目前千里足下萬井方肆而大之使後不能加大歷五年正月五日無疾而歿其三月塔成以瘞厥後恩加院額僧經寺事千甍波起萬金堆聚孰不感嘆蘖栽成於合抱九流源於濫觴推功歸美我則無愧門弟子如嶽等以歲時益深流輩向盡懼成蕪滅後人不知乃磨好石託我銘曰士不拘教矯俗惡兮人驚獨出掀攣縛兮能適其靜既嶢高兮非藥非人結架牢兮厥後因之大而肆兮門人泣咨紀成事兮韓氏出晉穆侯晉滅武穆之韓而邑穆侯孫萬於韓遂以為氏後世稱王漢之興故韓襄王孫信有功復封韓王條葉遂著後居南陽又隸延州之武陽拓跋後魏之帝其臣有韓茂者以武功顯為尚書令實為安定桓王次子均襲爵官至金部尚書亦能以功名終尚書曾孫睿素為唐桂州長史善化行於江嶺之間於先生為王父生贈尚書左僕射諱仲卿僕射生先生先生諱愈字退之乳抱而孤熊熊然角嫂鄭氏異而恩鞠之七歲屬文意語天出長悅古學業孔子孟子而侈其文秀人偉生多從之遊俗遂化服炳炳烈烈為唐之章貞元十四年用進士從軍宰相董晉平汴州之亂又佐除州青淄通漕江淮入官於四門先生實師之擢為御史十九年關中旱飢人死相枕藉吏刻取息先生列言天下根本民急如是請寬民徭而免田租之弊專政者惡之行為連州陽山令陽山民至今多以先生氏洎字呼其子孫纍除國子博士不麗邪寵懼而中請分司東都避之除尚書都官郎中分司判祠部中官號功德使司京城觀寺尚書斂手就職先生按六典盡索之以歸誅其無良時其出入禁譁衆以正浮屠授河南令魏鄆幽鎮各為留邸貯潛卒以士冖柘罪士官無敢問者先生將摘其禁以壯朝廷斷民署吏候旦發留守尹以聞皆大恐令遽相禁有使還為言憲宗悅曰韓愈助我者是後鄆邸果謀反東都將屠留守以應淮蔡華州刺史奏華陰令柳澗贓詔貶澗官先生守尚書職方郎中奏疏言華近在國城門外刺史奏縣令罪不參驗坐郡御史考實奏事如州宰相不為堅白本意先生竟責出省復比部郎中修史主柄者不喜不卒展用再遷中書舍人廷議蔡叛可誅與衆意違改右庶子十二年七月詔御史中丞司彰義君討元濟出關趨汴説都統宏宏悅用命遂至郾城勢審其賊虛實請節度使裴度曰某領精兵千人取元濟度不聽察居數日李訴自文城果行無人擒賊以獻遂平蔡方三軍之士為先生恨復謂度曰今藉聲勢王承宗可以辭取不煩兵矣得柏耆先生受詞使耆執筆書之持以入鎮承宗恐懼割德棣以降遣子入侍還拜刑部侍郎憲宗盛儀衛迎佛骨士女縱觀傾城先生大懼遂移典校上章極諫貶潮州刺史大官謫為州縣薄不治務先生臨之若以資遷洞究海俗海夷陶然遂生鮮魚稻蟹不暴民物掠賣之口計庸免之未相直輒與錢贖及還著之赦令轉刺袁州治袁州如潮徵拜國子祭酒其屬一奏用儒生日集講説生徒官之以藝學淺深為顧侍品豪曹遊益不留既除兵部侍郎方鎮反太原兵以輕利誘回紇召先生禍福譬引虎齧臃血直今所患非兵不足遽疏陳得失王廷湊屠衣冠圍牛元翼人情望之若大蚖虺先生奉詔入賊淵然無事行者既至召衆賊帥前抗聲數責致天子命詞辨而鋭悉其機情賊衆懼伏賊帥曰惟公指公乃約之出元翼歸士大夫之喪功可意而復穆公大喜且欲相之遷吏部侍郎會京兆尹以不治聞遂以遷拜敕曰朕屈韓愈公為尹宜令無參御史不得為故常兼御史大夫用優之禁軍老姦宿惡不攝盡縛送獄京理恪然御史中丞有寵旦夕且相先生不詣固為矣械囚送府令取尹狀決之先生脫囚械縱去御史悉奏宰相乘之兩改其官復為吏部侍郎銓不鎖入吏選父七十母六十身七十悉與三利取才財勢路絶病滿三月免四年十二月丙子薨靖安里第年五十七嗣天子不御朝贈禮部尚書寶歷元年三月癸酉葬河南某縣先叔父雲卿當肅宗代宗朝獨為文章官兄會亦顯名官至起居舍人會妻之亡先生以期衰服服焉用報之朝有大獄大疑文武會同莫先發言先生援經引決考合傳記侃侃正色伏其所詞執女政而出又曰其賢善耳必心躍色揚鉤而遊之內外惸弱悉撫之一親以仁使男有官女有從而不啻於已生交於人已而我負終不計死則庀其家均食剖資與人故雖微弱待之如賢戚人詬笑之愈篤未嘗一食不對客閨人或晝見其面退相指語以為異事實嗜才技毫細無所略然而天下之進士而後者望風戁畏以為瑞人神士朗出天外不可梯接非有奇卓望門不敢造未嘗宿貸有餘財每曰吾明日解衣質食今存者已多矣遺命喪葬無不如禮俗習夷狄盡寫浮圖日以七數之及拘陰陽所謂吉凶一無汚我夫人高平郡君孤前進士昶謹以承命湜既以銘先生墓矣又悉敘其系葉德詔於碑以圖永久而揭以詞韓因朔封自武之穆厥全趙孤天下陰福子孫宜昌宣惠遂王秦絶韓祀蟣蝨有子繼王陽翟繼王安定三王其爵韓氏何盛桂胄系雅三祖官下祕書發祥追錫僕射徑孰道荒物喪其明誰懇其治先生之生先生之武襲蹈聖矩基於其身克後其所居歸邱軻危解禍羅具兮素兮有靦何多靡引而忘天吝其施垂升乃頽㣥心孔哀厥聲赫赫滿華遍貊年千世百新在竹帛我銘在碑展我哀思長慶四年八月昌黎韓先生既以疾免吏部侍郎書諭湜曰死能令我躬所以不隨世磨滅者惟子以為囑其年十二月丙子遂薨明年正月其孤昶使奉功緒之録繼訃以至三月癸酉葬河南河陽乃哭而敘銘其墓其詳將揭之於神道碑云先生諱愈字退之後魏安桓王茂六代孫祖朝散大夫桂州長史諱睿素父祕書郎贈尚書左僕射諱仲卿先生七歲好學言出成文及冠恣為書以傳聖人之道人始未信既發不掩聲震業光衆方驚爆而萃排之乘危將顛不懈益張卒大信於天下先生之作無圓無方至是歸工抉經之心執聖之權尚友作者跋邪抵異以扶孔氏存皇之極知與罪非我計茹古涵今無有端涯渾渾灝灝不可窺校及其酣放豪曲快字凌紙怪發鯨鏗春麗驚耀天下然而栗密窈眇章妥句適精能之至入神出天嗚呼極矣後人無以加之矣姬氏以來一人而已矣始先生以進士三十有一仕歷官其為御史尚書郎中書舍人前後三貶皆以疏陳治事廷議不隨為罪常惋佛老氏法潰聖人之隄乃唱而築之及為刑部侍郎遂章言憲宗迎佛骨非是任為身震怒天顏先生處之安然就貶八千里海上嗚呼古所謂非苟知之亦允蹈之者耶吳元濟反吏兵久屯無功國涸將疑衆懼洶洶先生以右庶子兼御史中丞行軍司馬宰相軍出潼關請先乘遽至汴感説都統師乘遂和卒擒元濟王庭湊反圍牛元翼於深救兵十萬望不敢前詔擇庭臣往諭衆栗縮先生勇行元稹言於上曰韓愈可惜穆宗悔馳詔無徑入先生曰止君之仁死臣之義遂至賊營麾其衆責之賊恇汗伏地乃出元翼春秋美臧孫辰告糴於齊以為急病校其難易孰為宜褒嗚呼先生真古所謂大臣者耶還拜京兆尹斂禁軍帖旱糴鬳大齒幸臣之鋩再為吏部侍郎薨年五十七贈禮部尚書先生與人洞朗軒闢不施戟級族姻友舊不自立者必待我然後衣食嫁娶喪葬平居雖寢食未嘗去書怠以為枕餐以飴口講評孜孜以磨諸生恐不完美遊以詼笑嘯歌使皆醉義忘歸嗚呼可謂樂易君子巨人長者矣夫人高平郡君范陽盧氏孤前進士昶壻左拾遺李漢集賢校理樊宗懿次女許嫁陳氏三女未笄銘曰惟天有道在我先生萬頸胥延坐廟以行令望絶邪痌此四方惟聖有文乖微歲千先生起之焯役於前彍義滂仁耿照充天有如先生而合亘年按我章書經紀大環吟不時施昌極後昆噫嘻永歸奈知之悲汝南周子桑治書通春秋非仁義不動止年二十三貞元十九年如京師將舉五經秋及陜見無舉詔東還冬及宋而病閏月丁亥而死時天寒大雪火不星前纊不銖身寒之聲與將死之聲犂然其具書存乎側其所行存乎側友人安定皇甫湜適至見之而哀之為文悲之渾沌無端誰開闢之善惡未形誰分白之善其福之惡其禍之謂善之福夷死何飢謂惡之禍跖死何肥何闔閭之死金玉其墓何黔婁之死手足不覆孰主張其事而顛倒其數天且高地且遼鬼神之形幽敢問何故巫咸招曰來吾語汝天有正理地有坦途精者常不足粗者常有餘有餘常豐不足常枯子乃惑之一何愚人事著矣指物以復子何聖者千年而愚者如麻鳳凰不下而鴟梟滿家何草不芝盡野而莎何蟲不龍盡水而蝦非精者理少而粗者理多蘭萎何先葹死何難玉何為而脆石何故而頑衣冠何蹇戎狄何蕃何麟而怪何鶴而軒彼人事皆然推於物亦然是為自然巫咸畢歌歌已而去之曰父耶母耶天兮人兮己焉哉謂之何哉嗚呼柳州秀氣孤稟弱冠遊學聲華藉甚肆意文章秋濤瑞錦吹回蟲濫王風凜凜連收甲科驟閲班品青襟搢紳屬目斂衽公卿之祿若在倉廩至駿難馭太白易滲華鐘始撞一頓聲寢梧山恨望桂水愁飲鬱鬱㣥議悠悠積稔竟淹荒瘴遂絶羇枕嗚呼柳州命實在天賢不必貴壽不必賢雖聖與神無如命何自古以然相視咨嗟歸葬秦原即路江臯聲容蔑然相嘆增勞惟有令名日遠日高式薦誠辭以佐羞醪尚饗
