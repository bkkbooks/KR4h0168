front:
  text: 全唐文欽定全唐文卷五百九十六歐陽詹二
  hash: sha256:cfb59463cf8e5a1ec7259e1e862f51996c368fb7ef9eabc2d131163284afd08c
body:
  text: 居方足下胡嬭物故仁孝多感悲慟如何遠助悽惻秋凉體與神康僕素寡悰暢遐亦可悉華下來人承今冬以前明經赴調罷舉進士何顛且不沛逝而能復歟居方哉夫非有必行則諫必有拒忤情懷歡古人所難雖僕於居方亦不易之今流既從川華既歸根輒分間布白致以箋素居方忖覽知及蘧瑗四十九年之已往陶潛今是昨非之悟焉漁者所務唯魚不必在梁在笱弋者所務唯禽不必在矰在繳國家設尊官厚祿為人民也為社稷也在求其人非與人求在得其人非與人得唯道德膺厥求唯賢能膺厥得賢能事事而後見道德誠誠而後信苟須事事苟須誠誠則必委以務命以職從而核之四海之大億兆之衆不可逢而委命之是用啓稍異之間姑致其我樂而自耀者讀往載究前言則曰明經屬以辭賦以事則曰進士中夫程度者取政事最輕小者命以始又令公侯子孫卿大夫子弟能力役供給者曰千牛進馬三衛齊郎限以年月終亦試之其有成則陟陟不已乃尊乃厚其有敗則黜黜不已乃戮乃亡取之於諸科暫殊用之於諸科則一良未即以進士賢而明經不賢也但以選才如選材焉以規則失之於方以矩則失之於圓欲方圓畢至然後擇其利用者寶之中方則善於圓中圓則善於方木材也者在堅貞可久人才也者在德行有恆不可久不有恆雖售之於今必不售之於後蚩蚩之人貴此賤彼是不深達國家選士之意見近而迷遠者居方寧斯人之徒歟况目覩進士出身十年二十年而終於一命者有之明經諸色入仕須臾而踐卿相者有之忠與孝相生君與父相隨於家美即於國良為閨門重則為朝廷尚此古今聖賢絶慮萬不失一之得也僕忝居方交遊自貞元之初於今十有三祀熟得居方之為人甘旨可求則已在尊長之前矣衣食可讓則已在兄弟之邊矣急難當行則必在交遊之先禮義當往則無在時賢之後晨昏無方之性愛悌友于之情長長之敬下下之眷與朋友之信接物之道居方無不盡則於家於閨門至矣於國於朝廷詎少哉嘗清宵月下寒序火邊或醉或醒接以餘論君子欲其暗然而彰惡自衒自媒沽名者二年間見居方求試於詞場僕恨恨如失才如居方地如居方方於所得詎止乎然諸科中升乎一科矣宜存一梁一笱一矰一繳之義事事誠誠之旨中規中矩之求委恆久循黜陟俟乎暗然之來也况近聞宗懿之中景行居方彌篤焉上以居方達慈於下下待居方申愛乎上居貧孀孤達宦棺櫬悉居方竭力已可行咨乎可及饑飽不異魂體皆歸年才弱冠行跡如此豈徒生哉借如居方束帛到門而有未起居方以藝自謁雖從家命亦以非矣悲哉更逐齊人之後耶僕竊以為知人曩得居方以為居方也洎昨視所行則非居方今聆嘉聞又知居方矣如其知如其知竟履元和以叶愚念得之以道為姜為傅不得以道為回為憲時之令人豈不善歟面敘不周此亦何云公範足下長史及大人以薄官豫自能記憶只見馳載長幼勤勤南北豫雖童稚意甚不居洎有安固丞潮陽掾豫時已冠似或議事以為地分遐陋進取必無遠大若肄業承家則安固潮陽亦幾於不墜矣便懷耕食鑿飲之心焉事親敬長之道睦友與人之義恂恂自勉不意竊鄉曲之譽所疑不忘質所見不忘述時時有得多幸忝儕類之歸加以薄窺墳籍適有章句濮陽仲宣河東千齡滎陽從易濟北有融琅琊次臣皆博雅明達君子公範亦其人焉每論性行量識度評學業酌文詞不以虛薄往往掛於牙齒豫年二十有一公範與㣥公則可豫以進士之目而有令豫觀國之心豫以㣥公所貺之名繹先賢正名之旨進士者豈不言其可以仕進而能裨助政化始自下而升上終自上而利下者也近代亦曰舉人實古今舉賢進能之科也則有若風后力牧膺黃帝之舉舜禹稷契膺唐堯之舉縉雲高陽膺虞舜之舉伊尹姜牙膺湯武之舉管仲冀缺膺桓文之舉五羖三傑膺嬴劉之舉皆齊聖廣淵明允篤誠立功立事出於人表之流也降自晉宋齊梁則有若陸機鮑昭謝眺江淹亦以登庸雖道德器用不及曩辰而詞學詩流為一時之秀當㣥公之論豈容易之度力不任又先與靈源道士虹巖逸人有潘湖合鍊奉養之契乞從宿志勤勤懇懇獲與靈源虹巖同居者三年公範與㣥公雖不苦以前事相迫而流言時至建中初因當道廉察故相國常公本州將故中書舍人薛公南澗之談西湖之禮丹青目下程準前期公範與㣥公激厲轉加豫亦稍信云云之勸時兄弟親屬方以衆情聞於大人大人與㣥公遂有龍首之會特詢可否至於再三㣥公不悔前言以為可固可必人之於豫皆欲其升高致遠至其秋大人則有遣從計吏之命當發之日大人及慈親親祭行於東郊公範與㣥公亦共餕神餘於野席離觴既輟大人誡勖數言言可切骨銘心征車云動慈親嗚咽數聲聲堪斷腸褫魄公範與㣥公備見備聞也慰上下之望在乎早成名早歸寧豫必不惜伎能而有所絶墜以深上下之念汲汲搖搖如旌如翹受遣之明年達於長安賃廡六秋禮闈四上頻竭激昂之力纍為簸揚之棄反躬忖已徘徊又疑豈常薛公輕於布素而有佞歟為㣥公溫良與朋友有不忠歟楊朱對歧墨翟觀素徑挺之志半作歸心况以近夢慈親以亂絲繞豫之身萬重大人囓豫臂見血蓋神祇以大人誠切遠警於豫焉絲繞者豈非思念纏帛丿糸之象也囓臂者豈非囓指令歸之義也萬重見血者豈非示其甚也公範與豫遊處最深者且莆陽讀書接席五年其於為人公範知之莆陽去家四百餘里晨昏之思忽至珍異之味忽得亦不以始昨違離便奔馳而去性自天至實非勉為今一辭庭闈而踰半紀以本心每每馳戀若此魂夢昭昭感發如彼日夜之心公範可量竊欲審核良駑托分進退阻故人無新知恍不可問因考使回更有決斯科也先以才藝取次以德行伸大以事君細以臨人如豫所習可以當之於取乎如豫事親可以移之於君乎如豫理身可以施之於人乎其可也則待命待知庶榮親之道抑溫凊之心如其不可則任材任器息干時之機謝風塵之苦書至與裁裁已遄復家在國在佇為去就豫於為子之道所恨不知也知必無不竭若於為臣之道所恨不知也知必無不為人生於世區區者所務豈不立名乎有名於國亦名也有名於家亦名也豫何攘臂於其間醜於家而美於國哉豫無此心亦公範知之東風扇和山青水清野芳且榮林鳥時鳴樽有酒匣有琴公範休暢某再拜前鄉貢進士歐陽詹於洛陽旅舍再拜授僕人書獻尚書閣下某同衆君子伏在尚書下風久矣孟冬已寒伏惟尚書尊體動止萬福人生於世令天下之人識與未識有一善則願知之有一困則願知之尚書以為其人何如哉愚以百年二百年無一而已矣尚書豈知身則其人乎既知其人某斯所以願也凡今之人進路於長者或以殫詞褒頌為先者亦或求人書狀為先者伏計尚書飽見之英明特達必不之愛小子固直亦竊醜之况尚書茂德雄才則騰於寰宇矣豈假區區片言隻字彰明於身乎以尚書山容海納則自斷於胸襟矣豈在悠悠八行尺牘進退於人乎知不然矣某才拙魯訥不敢游詞某閩越人向京師七千里矣去秋遠應直言極諫詔不逮試便往西秦今冬將從博學宏詞科赴集期昨至東洛舊負人錢五萬卒然以逢某則合還人又艱迫唯一驢一馬悉以償之賃廡之下如喪手足兀然不能出門者再旬於茲矣亦以窘逼遍祈於人人無非常所與唯匹帛斗粟供朝夕則才可過其外則莫就無車無儲寄人之廬士之窮莫窮乎此今日有來相看者曰子之困至於是何不以情聞於徐方南陽公乎明日有來相看者曰子之困至於是何不以情聞於徐方南陽公乎某晝忖夜量既在尚書矣又人人異口同詞區區之心與議并俾忘干犯以困投於尚書尚書之力上將驅雲雷清宇宙副萬乘之賴答億兆之望豈獨遺某所願知之困乎尚書下將燮陰陽調風雨合百神之意允飛走之望豈獨遺某所願知之困乎救火之家水雖在遠不以遠而往者知其必能濟患也某之困曾未拜伏尚書所居洛陽西鄰陜虢北俯河陽南接陳許東有汴滑捨東南西北之近越千里控於尚書者亦知尚書必救所困焉神遊五侯之門遍心擇王公之量匝方決意投於尚書尚書留意焉布露微辭亦非容易考試事畢特冀拜伏雖有蓄積庶及面陳將仕郎守國子監四門助教歐陽某謹齊沐緘書再拜遣隸子弟獻於相公中衢之車下庶及乎閣下當今主上聖明宰輔賢明可行已行可止已止其或未行未止非不知也非不念也未可行而未可止也某愚蒙欲陳所見則在知之之後念之之內矣不敢復言今斯有言自言而已人有百行修萬事精內扣潛鳴外聽無聲非不願用而人不用非不願旌而人不旌雖和平之代至老至死者相公以為有之乎某將十有十百有百千有千也何以若知自近之耳某嘗讀論語得孔子曰古之學者為己今之學者為人傷時之學者不由所學矜所學也某雖不敏傷竊如之况稟羔羊鴻雁之性未資訓導而敬順和合乎教者十或四五潔身畏人直拙自守始亦以孝弟忠信約禮從義人生合爾博聞游藝行義修詞人生固然殊不以有為而為也幸屬昭代以此官人敬趨條目遂希詮擇五試於禮部方售鄉貢進士四試於吏部始授四門助教夫人百行庶幾萬事留心不仕則已仕則冀就高衢遠途展其素蓄垂名於後代播美於當時匪徒利斗粟希片帛救寒暑給朝夕也所以利斗粟希片帛者不能無之其將百行庶幾萬事留心之流有所分別也某非斯人之徒歟其慕彼人之徒歟企夫高衢遠途也噫四門助教限以四考格以五選十年方易一官也自茲循資歷級然得太學助教其考選年數又如四門若如之則二十年矣自茲循資歷級然得國子助教其考選年數又如太學若如之則三十年矣三十年間未離助教之官人壽百歲七十者希某今四十年有加矣更三十年於此是一生不覩高衢遠途矣况先三十年孰知存亡哉其或素蓄當在重泉之下矣忖己方人所以知百行修萬事精內扣潛鳴外聽無聲非不願用而人不用非不願旌而人不旌雖和平之代至老至死者十有十百有百千有千也嗚呼今之高懸爵祿廣設名位實待乎德行與乎能事也德行也者孝悌也忠信也不可於公堂斯須而得試也須漸乎父母昆弟之言洽乎州閭鄉曲之譽某遠人也父母昆弟居萬里之外州閭鄉曲在三江之南孝悌之言無由漸朝廷之耳忠信之譽莫得洽闕下之聞也能事也者秉持也應奉也不可虛處無任而得呈也須形乎政令裁製之庸著乎伎藝使才之致某宀兒官也政令裁製一月兩衙之謂伎藝使才二奠陪行而已秉持之庸不可形考課之目應奉之致是亦絶著選能之見也縱有顏閔之德游夏之學宰我之政事夫子之文章其於是也但父母昆弟自相知州閭鄉曲自相許於海隅嶺徼其奈拳拳之身何夫大田斯獲而有遺秉滯穗也萬秉稀一萬穗稀一某豈遂當其一乎且天地也命之翅必與之羽翮副其巨細使得飛也命之足必與之蹄跖稱其長短使得行也若命之翅而不與之羽翮與之而巨細不相副飛則墜若命之足而不與之蹄跖與之而長短不相稱行則顛命適遺之墜與適遺之顛則如無命無與也其庸愚不知造物之旨者視之則不之怪其明賢深探理源者其謂天地何且邦國也勸人以德行用錫之爵祿必契其分量使得行道也聳人以能事用錫之名位必權其輕重使得榮身也若勸以德行而不錫之爵祿錫之而分量不相契道則屈若聳以能事而不錫之名位錫之而輕重不相權身則辱勸適遺之屈聳適遺之辱則如無勸無聳也其庸愚不知政化之旨者視之則不之怪其明賢深探理源者其謂邦國何某代居閩越自閩至於吳則絶同鄉之人矣自吳至於楚則絶同方之人矣過宋由鄭踰周到秦朝無一命之親路無回眸之舊猶孤根寄不食之田也人人耘耨所不及家家溉灌所不沾其濯乃條枚成乃華實者上天至仁之膏澤厚地無私之陽春乎相公為上天霖雨佐厚地發生也何以處某焉夫舉善不遺於微陋使能必盡其材器真宰相之任也自唐及虞有其人自夏及商有其人自周及秦有其人自漢而降無代無有洎國朝歷歷可數也相公能以某為手下濫觴乎似善斯升真善以至似能斯拔真能以來古人行此天下歸仁也相公行之哉行之哉今則猶古算度途遠蒼皇造次某惶恐再拜某啓某業文者相公昔領大司成則飲相公訓人成俗之教中為大司樂則煦相公合莫移風之德及籌廟略則浹相公調元厚生之化竟未能歌謠芬馥紀敘茂實下居暗室有愧明神昨以赴調東周又聆相公此方鎮安之美陪輿人誦作東風詩二首既詠諸途輒塵左右干犯明白不任戰懼貢士有宴我牧席公新禮也貞元癸酉歲邑有秀士八人公將首薦於闕下古者相覿相祖有享有宴享以昭恭儉宴以示慈惠二典為用鮮或克兼諸侯升俊造於天子遣之日唯行鄉飲酒之禮則享禮也胾肉元酒莫飲莫食公念肉不使食則仁不下浹酒不使飲則歡不上交方欲激邦俗於流醨致王人乎德行而賢者仁未伊浹才者歡未我交其若蚩蚩何秋七月與八人者鄉飲之禮既修乃加之以宴肴移已膳醴出家醞求絲桐匏竹以將之選華軒勝境以光之後一日遂有東湖亭之會公削桑梓之禮執賓主之儀揖讓升堂雍容就筵樂遍作而情性不流爵無算而儀形有肅鏘鏘焉濟濟焉於是老幼來窺盡室盈岐非其親懿則其閭里皆內訟而誓遷善焉於戲行其教不必耳提而口授移其風不必門扇而戶吹公斯宴則風移教行其間矣真盡心竭誠奉主化民之宰也煙景未暮酒德俱飽有逡巡避位而言曰夫詩者有以美盛德之形容君侯因片善附小能回一邑之心成一邑之行而昭吾人恭儉於嘉享示吾人慈惠於清宴回人心成人行周孔之才也昭恭儉示慈惠管晏之賢也不有歌詠其如六義何是日人有甘棠頖宮之什客有天水姜閲河東裴參和潁川陳詡邑人濟陽蔡沼佐贊盛事亦獻雅章小子公之氓幸鼓微聲先八人者鳴捧豆伺徹時在公之側覩衆君子之作遂從卜商之後書其旨為首序孔子見老聃曰魚吾知其能游鳥吾知其能翔游可網翔可弋至於龍則吾不知聃其龍乎今豫遇河東柳由庾亦孔子之聃矣眉長五寸耳近上頂寡言少笑皎若冰雪意或時發皆元漠杳冥之事從君子纍忝之遊松櫟殊姿鴉鸞異情翌日豫去之京師柳曰月陰日陽鱗潛羽翔海鵬君於焉期化冥鴻君從此而游南充近有上升者留言於長老豈為吾設耶吾焉往夫其德行文學可以敦教化正雅頌豫勸裨堯而補舜柳頷而不對貞元十三年七月十六日帛丿糸州紫極宮黃籙齊場別族叔行元既射策與主司不合春二月將歸淮南所寓㣥公設祖方獻未酬叔悄然有不暢之色㣥公亦愕爾而阻歡小子侍觴奉而前曰歸好事春美時酒樂物叔於三者加同人將之而有未悅豈禮闈失意之為乎昆吾産金荊山産玉自民役巧鎔琢蓋多惟干將和璞有大聞非百鍊則其良可用歟非三獻而其寶可真歟苟良苟真不即成不即售適以精其研稔其實如叔也亦何稽於一邂逅哉若昔之人作必行動必中則是蘇秦無履穿之歎寧戚無石爛之歌孫宏無十上之勤商鞅無再干之勞也知泰而不知否知易而不知難是夫人也非所以待乎叔也叔如之何叔欣然見卞氏再來之路平歸心納春景安酒意四座以叶千鐘有娛既醉升車秋為到期國以人為本縣令親人之親者苟有命授無非慎擇今年執政又加精選自吏曹銓擬仕而退下者十之五六濟南林公以始任之調發硎之刃請宰一邑天官劇巴東也而使為之平衡無疑鈞軸不轉非輕重質器目以昭如則安可於其難而易若此解褐結綬當時之盛既受牒恭命而濟南公與豫鄉而且故幼而知公行先鄉曲譽是通閭井之意術以明經升實操教化之本今有社稷有民人則弓矢入養叔之手徽絃在師曠之膝何微之不中何妙之不盡去矣無使朱邑魯恭專美是官其餘則巫峽峨峨岷江湯湯水天下清山天下秀游盤貴境為池為墉退公多暇為我回睇建上人自茲而西更為故人也巫咸山有道釋子建上人元和之淳氣以類合休神遂性曩與少司成陽公得於林棲公從下風之請斯縻大君之爵同方相致殊途且來雖羈鸞冥鴻一飛一籠遐心遠意終共超曠遊佛廟賞靈臺壺冰片玉光潔再裕來為去始散實聚終上人故人有在西土曰大夢未覺還宜一歡陶瓶芒履此焉而往東路著首悠然高雲西之人幾日而覿松柏之下無凡草鸑鷟之侶無凡禽西之人豈陽公之儔歟覯遇之辰瓊玖之列詩可頌德覩於斯其撰之竹帛儻傳俾後之人知貞元是歲賢人之會二也明經自漢而還取士之嘉也經也者聖人講善之録志立身正家齊國理在乎其中為人父者莫不欲其子之明為人君者莫不欲其臣之明明斯行斯近則平乎性命遠則成乎政令邇來加取比興屬詞之流更曰進士則近於古之立言也為時稍稱其僥幸浮薄之輩希以無為有雖中乾外槁多捨明趨進俾去華取實君子惡以真混假縱含章抱器半捨進為明新及第李孝廉則含章抱器捨進為明者皙皙肌骨松寒玉清以志學升太學以學就升宗伯背文手占滯義口占二戴不往皇鄭復來投短書出長卷精專炳煥儔倫裒然聖朝貞元癸丑歲明經登者不上百人孝廉冠其首非獨學勝亦以文聞則有我芳華加之典實不惡夫僥幸浮薄角力於比興屬詞並矢分弓未知鹿死誰手不為也拾青紫之有路獻榮名以趨庭長途春光我美多彼噫盡藝而適猶有前聞家食非明時相待之意孝廉其志之始入仕一有縣尉或中或上或緊銓衡評才若地稱而命之至於緊無得幸而處而緊中之美者尤難其人今年孝廉郎高陽許君授常熟尉者實緊中之美君十三舉明經十六登第後三舉進士皆屈於命去冬以前明經從常調蔭資貴中之乙判居等外之甲既才且地擢以是官夏四月隨牒之官玉貌青春芬芳有蒨望棠陰而委質鬱蘭陔以辭親征車轔轔所往在目異時九仞由茲一簣在邦猶家不出於忠信許君常以為己任夫何恤哉士之生懷四方之志軫念於離別非所以為士也行乎相國馮翊王作鎮南梁為名賢藪澤四方浮川走陸結轍連艫岷山之坡碾成谷漢水之磧汨成淵耀華呈實涌溢門館量器而待未始失賢故天下真賢雖遠皆往以賢躡跡者清河張子乎張百行為實五言為華有實可呈有華可耀度虛襟之必答抗高步以斯謁玉露初降金風景清褒斜峰峰千萬相見奮客情如歸意指危棧猶平道馮翊之門唯才與德人之所與馮翊無不與是行也非張獨知其可衆君子共知之既知之若詠若歌各言其知琅琊王式字公範豫邑之英而忘形之友生也少同所好服膺周孔之教長齊所得願裨堯舜之化時命不與人無已知雨散雲乖四方五祀既乏孔融鄭莊之公薦乃效張儀蘇季之自鬻百川會海相得上國丹誠未昭於鏡鑑黃金已銷於桂玉豫懷待兔之固猶伺北闕寢書之報公範見變豹之理將遊東諸侯之國魚川鳥陸俾為異路曩日之別復起於今嗟乎夫人不得自然之至道冥冥飄於物外則天之至愚人昏人昏貿貿乎泥滓各得其方無枉性矯神之艱也企矚仁義盤旋禮樂下不植地上不麗天孤雲隨風斷蓬逐篲是不能岧昭灼揚光其間坼華資而公範猶蒙賈薄藝而豫莫售禽棲朽木蠖屈窮轍可悲也夫况赫赫皇都實吾人逞志之所大丈夫斂塵襟而瞻紱冕策蹇驢以窺軒蓋食米菽而覘粱肉吟寒苦以聆鐘鼓傷哉公範得無愧耶加之離情恨恨何述萬乘之都千箱之年有故人而適遠無巵酒以敘別男兒巵酒之不致亦何論他日之浮沈哉平生之懷未易言也離者會之資會實離之本今離既由昨會後會得不由今離乎離會相生蓋不足歎公範勉之東諸侯聞有梁孝燕昭矣昔人論別有賦論恨有賦狀仳離陳感憤其未見豫於蔡侯是日之情蓋古人之遺情也人之慚莫先乎同有求而一不得人之慕莫甚乎偕遠遊而一先歸蔡侯沼字虛中豫之邑人又懿親也虛中以學豫謬以文共受遣乎長吏皆求試於宗伯虛中登太常第歸寧故園豫有曝鰓之困猶留京師同求在豫則不得偕遊虛中則先歸堂俱有親身亦祈達自負違顏落羽之恥對人飛鳴就養之慶懷方寸為丈夫稟太和曰人子不包羞不痛心行道之人也虛中胸中有心者以豫此辰之意如何哉悢悢悽悽渾渾迷迷飲甘觴以若荼視春光其如秋周秦九軌之道吳楚千里之水騁逸騎揚輕舟激爾清風歡拜非遠人則姻昵家惟里閭到日榮賀盡室當在念沽名之不異想出門之是同父也母也兄也弟也雖喜人之善則有而傷子之不肖豈無重增豫鬱結之端矣明鏡前平衡下姿媚無取銖兩不登才歟命歟不自知也烹乳為醍醐鍛金為干將豫期烹鍛以變化虛中其行乎勿謂業就不增修勿謂名成有所忽及此方遠大虛中志之
