front:
  text: 全唐文欽定全唐文卷五百十六嶸德宗朝太子左庶子
  hash: sha256:4802b82bba7285f4efac82bb8f2c364c7eb8772bf855f8b59097f831d807f2cb
  markers:
  - {type: head, offset: 13, content: 李嶸, id: KR4h0168_NFKB_516-h1, level: 1}
body:
  text: 王制天子七廟三昭三穆與太祖而七周制也七者太祖及文王武王之祧與親廟四也太祖后稷也殷則六廟契及湯與二昭二穆也夏則五廟無太祖禹與二昭二穆而已晉朝博士孫欽議云王者受命太祖及諸侯始封之君其以前神主據以上數過五代即毀其廟禘祫不復及也禘祫所及者謂受命太祖之後迭毀上升藏於二祧者也雖百代禘祫及之伏以獻懿二祖則太祖以前親盡之主也據三代以降之制則禘祫不及矣代祖神主則太祖以下毀廟之主也則公羊傳所謂己毀廟之主陳於太祖者是也謹按漢元帝下詔議罷郡國廟及親盡之祖丞相韋元成議太上孝惠廟皆親盡宜毀太上廟主宜瘞北園孝惠神主遷於太祖廟奏可太上則太祖以前之主瘞北園禘祫不及故也則今獻懿二祖之比也孝惠遷於太祖廟明太祖以下子孫則禘祫所及則今代祖元皇帝神主之比也自魏晉及宋齊陳隋相承始受命之君皆立六廟虛太祖之位自太祖之後至七代君則太祖當東向位乃成七廟太祖以前之主魏明帝則遷處士主置於園邑歲時使令丞奉薦代數猶近故也至東晉明帝崩以征西等三祖遷入西除名之曰祧以準遠廟至康帝崩穆帝立於是京兆遷入西除同謂之祧如前之禮幷禘祫所不及國朝始饗四廟宣光幷太祖代祖神主祔於廟至貞觀九年將祔高祖於太廟朱子奢請準禮立七廟其三昭三穆各置神主太祖依晉宋以來故事虛其位待遞遷方處之東嚮位於是始祔宏農府君及高祖為六室虛太祖之位而行禘祫至二十三年太宗祔廟宏農府君乃藏於西夾室文明元年高宗祔廟始遷宣皇帝於西夾室開元十年元宗特立九廟於是追尊宣皇帝為獻祖復列於正室光皇帝為懿祖以備九室禘祫猶虛太祖之位祝文於三祖不稱臣明全廟數而已至德二載剋復後新作九廟神主遂不造宏農府君神主明禘祫不及故也至寶應二年祔元宗肅宗於廟遷獻懿二祖於西夾室始以太祖當東向位以獻懿二祖為是太祖以前親盡神主準禮禘祫不及凡十八年至建中二年十月將祫饗禮儀使顏真卿狀奏合出獻懿二祖神主行事其布位次第及東面尊位請準東晉蔡謨等議為定遂以獻祖當東嚮以懿祖於昭位南嚮以太祖於穆位北嚮以次左昭右穆陳列行事且蔡謨當時雖有其議事竟不行而我唐廟祧豈可為準臣嶸伏以嘗禘郊社尊無二上瘞毀遷藏禮有義斷獻懿以為親盡之主太祖以當東嚮之尊一朝改移實非典故請宜效先朝故事獻懿二祖藏於西夾室以類祭法所謂遠廟為祧去祧為壇去壇為墠壇墠有禱則祭無禱則止太祖既昭配天地位當東向之尊庶上守貞觀之定制中奉開元之成規下遵寶應之嚴式符合經義不失舊章權貞元時官鴻臚卿案祭法曰周人祖文王而宗武王故毛詩清廟章云清廟祀文王也不言太王王季也又案雍禘章疏云太王王季已上皆云祔於后稷之虛廟蓋以太祖東向之位至尊也太王王季之尊私禮也后稷之廟天下為公不敢以私奪公也又案鄭元注祭法曰古者先王遷廟之主以昭穆合藏於始祖今獻祖懿祖之主愚臣竊以為宜祔於興聖廟不當祭於太廟也如此太宗東向之位得其尊獻祖懿祖之位得其所也當河東人戶部尚書璀子第進士貞元初為太常博士終果州刺史子為母齊衰三年蓋通喪也太子為皇后服古無文晉元皇后崩亦疑太子服杜預議古天子三年喪既葬除服魏亦以既葬為節皇太子與國為體若不變除則東宮臣僕亦以衰麻出入殿省太子遂以卒哭除服貞觀十年六月文德皇后崩十一月而葬太子喪服之節國史不書至明年正月以晉王為幷州都督既命官當已除矣今皇太子宜如魏晉制既葬而虞虞而卒哭卒哭而除心喪三年禮有公門脫齊衰開元禮皇后父母服十三月從朝旨則十三日而除皇太子外祖父母服五月從朝旨則五日而除恐喪服入侍傷至尊之意非特以金革奪也太子公除以墨慘奉朝歸宮衰麻酌變為制可也諸果州刺史當弟五土為社二時宗祀諒殷薦而無差將報功而有序在國彞典主司常儀方今百工惟時六樂非濫故當明祀之禮從防暗室之欺宮懸備庭克奏降神之變豐幣在席以表至誠之款必仍舊貫當憑故實豈吹竽而混音何握蘭而妄舉內省不疚其詞未孚謬指商均之曲頗動周郎之顧瞻乎歷生跡編太史按黃鍾之妙算玉管非工察緹幕之微灰銅儀罕究今者三元奧術尚懵履端之明六律幽源未達歸餘之數失之黍忽糾以孚誠櫝龜之見毀豈書馬而致誤不堪敬授將亂甲乙頗異太初之差宜正羲和之罪彧西平王李晟壻德宗朝官劒州刺史檢校戶部郎中假京兆少尹入為刑部侍郎閹茂歲我御史大夫李公晟奉詔總禁戎三萬北定河朔冬十月師次趙郡郡南石橋者天下之雄勝乃揆厥蹟度厥功皆合於自然包我造化僕散客也狀而銘曰洨水伊何諸川互湊秋霖夏潦奔突延袤杼材蕆制樸斲紛糅斡地泉開盤根玉甃虹舒電拖虎步雲構截險橫包乘流迥透坱圠匠造琳琅簇簉敞作洞門呀為石竇窮琛莫算盈紀方就力將崖爭勢與空鬬吞齊跨趙警夜防晝月挂虛蟾星羅伏獸謂之鈐鍵撮我宇宙謂之關梁扼我戎寇郡國襟帶河山領袖經途者安逸軌者覆東南一尉西北一候萬里書傳三邊檄奏郵亭控引事物殷富夕發薊壖朝趨禁霤質含冰碧文輝藻繡花影全芳苔痕半舊天啟大壯神功罕究勒銘巨橋敢告豪右班固稱宏羊擢於賈䜿方以版築飯牛且謂漢之得人於茲為盛又與仲舒石建汲黯日磾等二十餘人並論而談殆不然矣夫君人者務於得賢故不隔卑鄙將慮賢者之處賤不謂賤者之必賢古者乃欲以伊尹負鼎取類於庖人太公坐釣求備於漁叟不亦遠哉且上之所欲人必有成之者故曹伯好田則公孫彊出陳侯好色則儀行父至殷辛淫酗則惡來革進周厲貪虐則榮夷公起漢武殘剝四海則桑宏羊擢其所由來者久矣書曰遜於汝志必求諸非道抑為此也季孫用田賦孔子書而過之以其踰周公之制也而况攘臂抵掌力為天下聚斂之人乎義也者君子所死生而小人之所不及利也者小人之所赴蹈而君子之所不忍為漢武必欲行先王之道守高祖之法則焉用宏羊欲奪萬姓之利閉生人之資則天下巿籍小人皆能之矣亦何獨宏羊乎善為盜者藝愈精而罪愈重盜愈利而主愈害宏羊善心計斡鹽鐵析秋毫令吏坐販不顧王者之體府庫盈而王澤竭一身幸而四海窮於宏羊之計則得矣漢亦何負於宏羊哉卜式潔已自守不及時政知宏羊罪欲烹以致雨孟堅躬修國史垂法來代奈何以錐刀異類齒得人之論一言不智其若是乎夫萬物混成天地恒其數一真妙用龍象演其教教也者因言以見性數也者任氣而為名我釋迦闢兩儀應三世步蓮臺而清風自扇攀桂樹而白月闕二字故能闕二字根牙闕一字宏頓漸高懸佛日遠照昬衢了緣扣寂合大空而泯相從有入無破㣥迷以登覺眇矣邈矣旨哉實哉有若此寺大聖真身寶塔者闕一字摩伽王之系孫阿育王之首建也噫如來滅後報應斯在究乎其容則三十二相形焉闕一字乎其變則八萬四千所明焉或曰華夏之中有五印扶風得其一也雖靈奇可覩而載紀莫標日者漢闕三字齊梁鼎闕一字遭時毀歇晦迹邱墟菅蓑不闕三字無闕二字祥異氣往往閒出故風俗謂之聖塚焉空傳西域之草獨享中人之薦厥有太白二三沙門攝心住持得堅清淨其始遠也望而闕一字之其少近也闕一字而信之周流一方磅礡闕一字里闕三字色闕二字瑞光通宵更雄達曙不散者久之矣咸請奉以身命碎於微塵精誠克孚指掌斯獲驗其銘曰育王所造因以名焉大魏二年岐州牧小冢宰拓拔育以為闕三字古名同於今闕一字削舊規剏新意廣以臺殿高其閈閎度僧以資之刻石以紀之隋開皇中改為誠實道場仁壽末右內史李敏復修之賡其銘矣煬皇帝嗣位省天下伽藍烈火潛燒禪闕三字廢其闕一字逐闕二字以州闕一字寶闕一字而配焉我聖唐太宗文武皇帝鳳鳴中天龍躍北朔弔薛舉以問罪次湋川而犒師欽承靈蹤宿布虔懇一戎遂定載路闕二字武德八年改為法門寺闕一字京城八十四大德闕二字沙彌闕二字十闕一字舊大德以輔之贊有功也僧徒濟濟盈百其眾梵宇䡾䡾數千其多貞觀五年二月十五日岳伯張德亮目覿神光咸闕一字及物闕一字上章奏精感動天有闕一字以望雲宮寢殿闕一字施焉古所謂三十年一開則歲穀稔而兵戈息自育至顯慶五年蓋三十霜矣八部瞻仰再祈開發即以其年二月八闕九字奉迎護舍利觀其氤氳玉潤皎潔冰淨靈不可掩堅不可磨寸餘法身等虛空而無盡一分功德比恒沙而莫量示不思議之致也二聖親造九重寶函親以兜闕十字絹闕二字五百疋闕三字復益令增修有禪師惠恭意方等遵睿旨購宏材徵㝢縣之工寫蓬壺之妙咨闕一字匠而蕆製獻全摹以運斤不日不月載營載葺且舒散闕一字谷隈闕六字襟帶八川闕一字長山之闕二字武隱闕二字面太白之㣥峯陽烏矯其翅由是危檻對植曲房分起欒櫨謺拱枕坤軸以盤鬱梁棟攢羅拓乾岡而抱鬬適將闕一字會闕六字宗師闕四字佛之記闕一字域中之戀闕一字最上之因豈闕二字乃王褱琦蓄乃豐麗穹崇岳立拔一柱以戴天蜿蜒霞舒揭萬楹而捧日則天聖后長安四年敕大周闕六字鸞臺闕六字公暐同往開之闕二字作闕一字七日行道跼蹐荷擔於東都明堂而陳其供焉萬乘焚香千官拜慶雲五色而張蓋近結城樓日重光以建輪遠浮郊樹闕二十四字岐陽施絹三千匹景龍四年二月十一日中宗孝和皇帝旌為聖朝無憂王寺題舍利塔為大聖真身寶塔度僧四十九闕十六字一闕二字鎮闕五字夫變化闕二字之謂聖陰陽不測之謂神况每欲開臨皆呈異相或風烟歕欱蕩覆河山或雷雨震驚杌動天地倏往而香花戾止闕七字我肅宗文明大聖大宣孝皇帝纘承丕緒恢復盛業德包有截化總無垠以澤及四海為勳華以功闕十四字上元初五月十闕一字日敕僧法澄中使宋合禮府尹崔光遠啟發迎赴內道場聖躬臨筵晝夜苦行從正性之路入甚闕一字之門以其年七月一日展如初闕四字本闕四字詔闕三字像一鋪闕一字事金銀之具闕一字百闕三字爪髮玉及瑟瑟數珠一索金欄袈裟一副沈檀等香三百兩以賻之道俗瞻戀攀緣號訴哀聲振乎林薄痛闕一字達乎海裔故得闕一字源嗚咽闕七字光闕三字我漢室人闕四字之頃寺之門樓及鐘經等閣及東西行廊星霜殆改罔克厥構有元炎上人者禪林之秀也壞衣味道却粒知真起大慈悲聿宏製之實多喜捨闕四字有輪奐闕五字有塈茨而未盡闕二字沙門法筠者法將之雄也上座唐興寺主法昭臮都維那澄演等蓮華之粹也同力致用誓相為謀闕二字埴以營之又結括以成之層簷闕七字以雲闕四字崇崇焉極樂之所也嗟夫八音希聲大覺無形或芬芬馨馨或杳杳冥冥如髣髴兮有靈有靈有道有道則壽考凡人莫闕二字萬物於自然故達士樂全真而闕九字相交闕一字王李公闕一字忠闕一字心居其泊志處其約或謇謇諤諤或汪汪綽綽若昂藏之野鶴野鶴得性得性則常靜凡人莫不繫百寶於闕二字故闕一字公秉廉讓以成政闕八字剋已復禮人焉而勸闕二字懲惡人焉而懼任闕二字善人焉而悅務農省稅人焉而康君子曰不肅而威不嚴而教龍門講德載揚元禮之風馬首行春更墮里嵩之雨良足奇也闕二字備闕三字衞闕二字縱闕一字畧月闕三字孤懸隴闕二字稜劒鋒長倚天外而己在少尹時則有若檢校刑部員外郎兼侍御史張公增少尹檢校司勳員外郎兼侍御史邱公鴻漸並闕九字幕闕三字有若侍御史內供奉梁公傑侍御史內供奉姜公邑高監察御史裏行嚴公霔祕書省校書郎掌書記韓公計皆人倫之傑也或閒氣逸發或含章挺生騰闕三字駕鳳爭飛闕三字則闕三字暎本闕一字兵馬使開府儀同三司侍中監李奉忠文武呈材風雲合變英威獨斷問望孤高監軍使左監門衞大將軍焦奉超武畧濟時忠闕九字寵冠兩朝闕五字量宏深清標卓絕聿膺宰命尤著吏能共參元戎之佐喜聞微妙之偈以為命者身之質身者命之資法本皆如性應無著筏喻闕十字樹闕二字福相與授俾子頌闕一字詞曰我佛在兮世獨尊我佛化兮道長存流正法兮不二門赫惠日兮破重昬摩伽國兮闕十字仰大闕一字兮遍闕三字金闕一字兮闕三字度眾僧兮施百衲闕六字臘心清淨兮眼不雜伏騰猿兮救怖鴿混邱墟兮將如何絕榛棘兮與菅蓑觀變現兮信轉多闕九字白兮來經過呼洞穴兮見釋伽邦伯奏兮發睿旨屢開迎兮歸帝里捨珍玩兮具法喜駢星宮兮勢崫起會天人兮浴定水偉嘉祥兮爭效祉闕三字兮闕一字克明我尹忠兮闕一字克清踐福地兮闕二字生對真容兮忘闕一字情琢巨石兮讚休禎歷曠剏兮揚善聲沛興元元年為汴宋節度使劉元佐判官相州司戶參軍巨唐興元末下詔徵天下兵將大有事於淮西遲速等衰於是焉在我魏博節度使工部尚書御史大夫駙馬都尉田公選百金之士馬步五千悉甲而遣委銀青光祿大夫試殿中監兼御史中丞苻公總之洎貞元元年春一月畢會於大梁久之未進以其年冬十有一月都統檢校司空同中書門下平章事懷德郡王汴宋節度劉公申令諸軍曰元凶李希烈渴日為惡罔克若天流毒淮右以逆亂干神器以暴殄錯天命罪浮於瀦宮禍延於覆宗上以德柔之以仁綏之如豺如狼無革迺心蓋不得已而至於用兵猶尚盤桓伺其閒亹然後肅將天威勗爾有眾爾所不勗其於爾躬有罪公由是夙夜祗懼恭行明命長轂雷野高旗篲雲先次於許之扶溝壓境而守示之以雄㦸勁弩堅之以深溝高壘俾窮號蹙乏追悔靡及負芒刺於背生戰慄於股常聳外虞不遑內事二年夏四月因蹙生變霜刃竊發身分蔡下首懸藁街浹辰之閒天下如鏡同文共規華夷一貫雖虞格有苗軒庭涿鹿王者之師有征無戰不是過也五月有詔會大梁洪班爵賞勞以還師餚酒淮海金帛山邱既醉而凱歌者動以萬計享畢改乘轅北之信宿而濟洪河屯大坯洗兵刷馬示以無事卷旗虹藏臥鼓雷伏公喟然歎曰昔馬援南征建標於桐柱竇憲北伐勒石於燕然安敢厠於昔賢倍多輕於茂實顧謂沛曰此皇上之威德八座之丕績無述可乎沛從軍三年備覩戎事敢不如命刊石立銘如彼梟獍蠢爾包藏謂順無益謂逆無傷據山裂壤竊號猖狂地所不載天其必亡皇赫斯怒詔下萬方徵兵諸侯出師勤王殫我中司翼爾鷹揚朝渡孟津夕次大梁深溝淮右高壘潁陽有征無戰神誅鬼殛向化者人覆宗者賊宇宙混一車書同則振旅闐闐全軍而還昔我往矣焚舟濟河今我來思策勳銘山山形磅礡河流洶涌垂聲無窮山河不動
