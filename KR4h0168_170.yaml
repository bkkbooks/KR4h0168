front:
  text: 全唐文欽定全唐文卷一百七十敬則字少連亳州永城人咸亨中授洹水尉長安三年累遷正諫大夫兼修國史尋同鳳閣鸞臺平章事以老疾請罷知政事改祭酒轉冬官侍郎神龍元年出為鄭州刺史尋以老致事冉祖雍誣奏與王同皎善貶涪州刺史改廬州景龍三年卒年七十五睿宗立贈祕書監諡曰元
  hash: sha256:71af3ceac7e40e889a668e24226e2ab63bc679b46677bb74044f7e45513136eb
  markers:
  - {type: head, offset: 13, content: 朱敬則(一), id: KR4h0168_NFKB_170-h1, level: 1}
body:
  text: 國之要者在乎記事之官是以五帝元風資其筆削三王盛事藉以垂名此才之難其難甚矣何以知其然昔平王東遷歷年數百齊桓之九合天下晉文之一戰諸侯秦穆遠霸西戎楚莊利盡南海禮樂人物閴爾無聞今之所存獨載魯史向者魯無君子記傳則遺雄霸遠圖必墜於地可不惜哉只如齊周小國之主尚能留意於史冊齊神武嘗謂著作郎魏收曰卿勿見陳元康楊遵彥等在吾目前趨走謂吾以為勤勞我後代聲名在於卿手最是要事勿謂我不知及文宣即位又嘗勅收曰好直筆勿謂懼我終不作魏太武誅史官又周文帝之為相也納柳虬之說特命書法不隱其志在懲勸如此伏以陛下聖德鴻業誠可垂範將來儻不遇良史之才則大典無由而就也且董狐南史豈知生於往代而獨無於此時在乎求與不求好與不好爾今若訪得其善者伏願勗之以公忠期之以遠大更超加美職使得行其道則天下幸甚臣聞李斯之相秦也行申商之法重刑名之家杜私門彊公室棄無用之費捐不急之官惜日愛功疾耕急戰人繁國富遂屠諸侯此救弊之術也故曰刻薄可行於進趨變詐可陳於攻戰兵猶火也弗戢將自焚既而鋒鏑已銷石城又毀諒可易之以寬大潤之以淳和八風之樂以柔之三代之禮以導之秦則不然淫虐滋甚往而不返卒至土崩此不知變之禍也陸賈叔孫通之事漢王也當滎陽成臯之間糧饋已窮智勇俱困不敢開一說効一奇惟進豪猾之材薦貪暴之客及區宇適平干戈甫戢金鼓之聲未息傷痍之痛尚聞二子顧盼雍容綽有餘裕乃陳詩書說禮樂開王道謀帝圖高皇帝忿然曰吾以馬上得之安事詩書對曰陛下馬上得之可馬上治之乎高皇默然是時陸賈著新語叔孫通定禮儀始知天子之尊方覺帝王之貴此知變之善也向使高皇排二子而不收置詩書而不顧重攻戰之吏尊首級之材複道爭功張良已知其變拔劒擊柱吾屬不得無謀即晷漏難踰何十二帝乎兦秦是續何二百年乎故曰仁義者聖人之蘧廬禮經者先王之陳迹然則祝辭向畢芻狗須投淳化已流糟粕可棄仁義尚捨况輕於此者乎自文明草昧天地屯蒙三叔流言四凶搆難不設鉤距無以應天順人不峻刑名不能摧姦禁暴故置神匭以開告端曲直之影必呈包藏之心盡露神道助順無罪不除人心保寧無妖不戮以茲妙算窮造化之幽深用此神謀盡天人之秘術故能計不下席聽不出闈蒼生晏然紫宸易主偉哉無得而稱也豈比造攻鳴條大戰牧野血變草木頭折不周可同年而語乎然而急趨無善迹促柱少和聲拯溺不規行療饑非鼎食即向時之妙策乃當今之芻狗也伏願鑒秦漢之得失考時事之合宜審糟粕之可遺覺蘧廬之須毀見幾而作豈勞於終日乎陛下必不可偃蹇太平徘徊中路伏願改法制立章程下恬愉之詞流曠蕩之澤去萋斐之牙角頓姦險之鋒鋩杜告密之源絕羅織之跡使天下黎民坦然大悅豈不樂哉皇漢失圖網漏讒慝賊臣承間搖蕩宸居宗廟焚燒天子播越於是九州幅裂四海橫流釋位勤王天下雲集初平元年後將軍袁術冀州牧韓馥豫州刺史孔伷兗州刺史劉岱河內太守王匡渤海太守袁紹陳留太守張邈東都太守喬瑁山陽太守袁遺濟北相鮑信長沙太守孫堅等同時俱起以討董卓為名然包藏禍心以暴易亂竊命矯制結黨樹朋觀釁待時莫敢先犯唯魏太祖有汴水之戰孫討虜有陽人之師矣觀曹公明銳權略神變不窮兵折而意不衰在危而聽不惑臨事決機舉無遺悔近古以來未之有也故梁國橋元南陽何禺皆云天下將亂非命世之才不能濟也能安之者其在君乎雖復名微衆寡地小力窮官渡受圍濮陽戰屈然天下精明之士拓落之材趨若百川之崇巨海遊塵之集高嶽故有荀彧郭嘉邢禺程昱賈詡朱雲等或斂風長感或一見盡懷然後覽英雄之心騁熊羆之勇挾天子以崇大順扶幼主而顯至公旌賁忠良芟夷叛逆神道輔德百姓與能武功赫然霸業成矣若乃獲魏种而有之高祖之封雍齒也降張繡而不怨光武之全朱鮪也感臧霸之言以成其氣重關羽之義抑而不追王霸之術也然後法令嚴峻賞罰必行惟材是求惟力是視縱夷齊滿路顏閔並居未暇存也救弊即可仁則未知且以術臨人力無餘地用智濟物迹若容身欲使蕩蕩元波涯而不竭飂飂薰風周徧草木元雲蔭而方雨黃葉衰而木落不可得也荀文若首豫經綸提挈草昧清神昭乎物表妙識出乎機先造我魏邦繄其是賴一言不合五毒將施無詞寄文空器見志可不劇哉加以孔文舉與道翺翔盡忠漢室崔季珪天骨高爽志在扶傾豈大盜之所安也嗚乎欲盜之子見錦而不見人弭謗之君尤人而不尤已豈知㣥鷗不下衆雀遙驚者乎故陰謀未洩天下已知毒志潛行忠良前懼何夔所以帶藥楊彪由是不出雲長受恩而不謝元德失箸而思奔席上無懷疑之人閫外少自信之士良可恥也固知曹公不能用天下之材成天下之務也昔周武之澤及昆蟲不能感食薇之士漢高之功濟草木未能屈歌芝之賢猶且遂其孤貞容其怨讟况功未半古德異樂推遭神器之流離問寶鼎之輕重欲使庶人不議寧可得乎翻乃疾走惡迹掩耳畏聲讐匹夫念平素殺桓邵斃婁珪道路以目天下鉗口豈不惜哉楊德祖才雖清秀志非遠圖託事行誅死非其罪司馬懿雄材大度勇而有謀審其狼顧知而不翦若言天意也則吾未知若言人事也其智安在故知忌小怨而忘遠圖料目前而忽身後豈所謂旁求哲人俾輔後嗣者哉或問曰天厭漢德海內分崩三雄鼎立俱受眷命乃至控御豪傑削平區宇英圖遠算何者為先君子曰孫仲謀藉父兄之資負江海之固未敢爭盟上國競鹿中原自守未餘何足言也蜀先主抱英濟之器無角逐之材遠竄荊蠻畏曹公之神武奄有庸蜀乘劉璋之政衰國小人夷風頹俗陋山川險止異崤函之奧區江漢通流殊河洛之朝巿豈得抗衡中夏齊足當途乎前賢易地之談全是不關胷臆且夫度德而處量力而行劉備豈薄先王之舊居輕齊魯之故俗若泰伯之適吳越孔子之入九夷哉蓋不得已也是知才雄者地廣國大者兵強地既由才才寧可易也王業不同其來尚矣若乃待辛癸之禪湯武不得稱仁要西伯之資高光無由濟世或寧亂以得志或興禍以取威遭遇雖殊天命一也宣帝聰豪明允博學洽聞敏而好謀寬而能斷其未得志也服勤王事夙夜在公知無不為芻牧必履取信嚴主所謂能臣也及勳德日隆雄材漸著權略不世合變如神受命崇華竭股肱於明帝忍死嘉福遂無君於沖人所謂姦臣也及內難既平外寇斯殄威力翕赫指麾風飛遂乃臨神器以徘徊戮公族以顧望雖大業初構人望斯存若格以名神請罪不暇歸諸天命則前代有辭美哉未盡善也且成湯之在夏世行仁以動諸侯文王之處殷朝好讓以懷鄰國高祖以豁達容物光武以長者得人未有專仗陰謀每行詭計寄何晏以鞠獄示李勝以謬言請戰以見威指水以表信乞襦不與懼有陳恒之譏封墓釋囚不嫌武王之事媿情負理掩耳避聲狼顧以噬魏人狐媚以取天下亦前史所醜也蓋聖人不能為時亦不能失時歷觀帝王之祚未有不因人墜塗炭而得志或天下嗷嗷新主之資也是知秦有閻趙之隙漢罹莽卓之災晉由曹氏之專宋實桓元之篡始得奮其智力救此倒懸陳浞羿之辜問滔天之罪况劉裕天錫神勇雄略命世不待借思漢之謳未暇假從周之會同盟二十七願從一百人雷動朱方風發竹里龍驤虎步獨決神襟長劒一呼義聲四合蕩兦楚已成之業復遺晉久絕之基祀夏配天不失舊物雖古人用兵不足加也至乃網羅俊異待物知人動必應時役無再舉西盡庸蜀北劃大河自漢末三分東晉拓境未能至也或問前史云克敵得雋奇迹多於魏武此確論乎君子曰得雋雖多前非大敵若乃黃帝斬蚩尤高祖制項籍光武抗尋邑曹公挫本初此是奇迹也至若慕容超政不在躬奴僕下品姚泓宗枝猜貳借手於人盧循祅寇之餘譙縱新造之國因釁取亂何足可稱至乃潛算樽俎之間明見千里之外揣機料日不爽錙銖亦古之志士何以加焉但禮樂文明日不暇給垂風邁德盛所未能人望不逮於建安天命乃光於魏武又問曰棄德非道捨舊無親有宋功臣多不及嗣豈理須然乎請聞其要君子曰且夫奸雄者非淳德之稱謀勇者乃果決之辭故昔之同盟擬覆前敵故無材不露無心不披譬若同舟遇風寧有隱哉及高鳥盡狡兔死其材能我之儔也我非積行累能彼之知也思己之所行恐彼之已叛是以雄猜內發釁兆易萌韓彭以之葅醢劉葛由之覆兦然則高談堯舜之道不忍論桀紂之行思燕齊之血食見漢宋之不仁故尉繚畏秦王之屈節范蠡識勾踐之忍人綺季不出於商山嫌漢王之侮慢嚴光潛形於草澤知劉秀之未宏有旨哉又問曰宋祖入關老相駕馬赫連畏逼姚氏淫昏中原士庶恥為臣妾王師衆整頗有禮焉所以扣馬攀車請住關右宮室陵寢是大漢之遺蹤關山重復乃有周之長世人與不取違衆獨歸昔項籍見哂於韓生宋高又失於父老其旨可得聞乎君子曰論項即非在劉為是以項王之材天下可以力制人心可以勢奪因宮室之嚴守山河之固此九州之上腴何彭城之足算劉裕家本江南全軍遠克未能制命夏魏施號秦涼雖曰關中實是邊地鞭長不及馬腹風末不闕二十六字王賈德曰貪歸受禪所留不過愛子待歸一舉而可取卒如其策智士哉昔張讓段珪濁亂天下漢召董卓將顯其誅竟有小平之奔曹氏因之乃創霸業鄭儼徐紇點辱皇猷魏收爾朱榮欲洗濯宮掖遂至河陰之禍齊人藉此用承明命故曰亂者理之源機者命之兆不可失也神武崖岸高竦器宇深沈望之儼然風塵自遠聽之逾厲雷霆或聞至乃足踐列星聲振原地赤色映團焦之外青闕一字立旅宿之門漢高由之自負徒屬以之增畏此所謂歷數在躬推之不可去也於時魏德已衰㣥胡得志孝莊殞於虜手節閔繫於凶徒義士痛心壯夫瀝血結黨求同盟之會仗劒想勤王之師者往往而聚焉所以因天下之心覽英雄之議以普泰元年六月建旗於信都以討爾朱兆為名當時趙魏之豪有高虔邕高敖曹封隆之李元誠盧文偉崔祖螭等盡其死力蓋代之傑有尉景段榮彭樂竇泰匹婁昭薛孤延等共其奔走然後數亂常之罪顯安忍之辜發義帝之喪三軍縞素承傕汜之逼萬里同心莫不精勇感人神雄略出天地檄詞未草聲已馳於賊庭王誅欲加命乃懸於鬼籙但犬羊四合觜距千㣥大戰韓陵然始得志既而龍驤虎步高下在心開幕府以臨外藩分腹心而統京邑雖生我者父母立我者高王既懷震逼之威易為芒刺之說周鄭交惡衍殖構氛趙鞅畏讒遂起晉陽之甲襄王失據乃有居氾之悲雖表數相仍公怒未怠紫宸不可久曠丹穴難以更燻遂應飛來之謠乃議遷都之便關西河北翦為寇讐天平永熙便成敵國於是疆埸大駭鉦鼓相聞邙山之師杖馬捶而自免沙苑之役跨馬士冖䂞駞以遁歸勝負相參波瀾不定豐功厚利各有可觀者焉昔魏祖西征中道不豫晉景南伐迴兵乃殂此並業未半而意窮功垂成而景促是以留連末命委曲臨終不可盡也尋高祖其辭魏帝之表可謂其言也哀顧太子之言可謂其事也盡方諸前代各一時也若乃推誠與人懷舊不捨擇子如之蝨看尉景之肱喻高昂於肝膽委侯景於半體此明達也牽馬麥田不飲社酒此嚴斷也放李穆之歸使其富貴感虎兕之對以勸事君此宏量也故能廢立雖多不失臣節兵鋒屢折人望猶存即與夫嬖賈充忌荀彧不同時也神武云日為我蝕今死亦掩觀其和勑勒之歌哀來何極覽太子之色仍有別憂此豈悲促齡而怨昊蒼哉但強寇在鄰奸臣不附以此為恨也文襄克纂丕基堪負大業追成曩志不忝遠圖故能委任紹宗外平侯景借假貞節內察權豪沙汰衆流釐正㣥務紀綱具舉朝野肅然况乃嘉思政之忠遙接其手寤陸生之直更賞其能此亦可稱也且夫為人上者當不忝威儀慎惜名器先王以之革弊達人因此垂風是故立其章程明其限節水火可蹈禮教難逾今天蔭甫傾洪基靡構國有大難未可三年不言高宴後園豈得一朝盤舞此不慎爾儀也若乃命天子為癡人比尊名於狗腳恨崔㥄之語不念元勳忿孫騰之儀寧思佐命此不惜名器也加以任情蕩思率意以之紅綺如花妖顏若王決池而弄淫女下獄而罪貞姬叛高慎於洛陽幾傾其父蒸鄭於內寢乃繫乎親詩曰人而無儀胡不遄死此之謂也嗟乎楚莊絕纓不顯婦人之節鄭人獻捷尚禮南冠之賢所以盡俘囚之材得醉者之力今者陷孝騫之罪賞王儀之心拒蘭欽之慈專諸之劒非不幸也文宣承父兄之資據已成之業屈奇不測內剛外柔屬變起不圖禍機竊發臨事而懼警而後行故使逆黨無遺凶徒必盡自得政二世樹恩百寮司馬公之養汝只在今日陳桓子之好施惟取一時由是腹心不散勳貴自隨大會晉陽共敘哀酷神彩英颺風調清閒既而人固難知始推天授故曰今日左僕射不減大將軍由是感光祿之言不俟終日聽倉丞之諫理故無歸然遠邇之心赫虎之變爪牙夙將帷幄舊臣足使鄰國寢謀殊邦側席况屬梁運道銷江淮家無闕周室厭關函谷封泥故得北柔沙漠之陲東懷遼海之際政尚明直時實豐盈膏澤始流菁英已竭中山迫於漢獻高洋劣於魏文但禮樂未施冠履不假高論王道此實多慚或問曰夏桀無道殷辛虐政舉烽而求一笑擊鼓而飲三千雖曰荒淫未窮鄙穢猶稱有夏多罪天命殛之皇天震怒命我文考今者顯祖狂昏中酒而作莫不手自支解躬行刺斫大集媱嫗為笑目前廣命宗親聚麀座上鄴城無自保之客當軒有供御之囚或臋行以駡衆寮或擘尸以示㣥下加以土木不息金鳳臨雲徵斂日增長城千里仍得快樂世以保乂豈天地不仁降災萬姓民之多僻適與相逢岐路無歸我心如醉此即甘酒嗜音之談蓋成虛論三風十愆之說併是高談君子曰源深者流長德盛者祚遠黶之汰雖著書之德在人齊神武伐暴勝殘有大功於天地其嗣雖復失道仍未殛於神明故書曰天惟五年須暇湯之子孫是也問曰神武之初基實多佐命文宣應籙共匡霸圖其間文武高材略不世出風流名士拔萃逸㣥屬主暴政荒時艱路止未有裂裳遠竄行從近關聞者尚足動心遇者曾不驚慮此復何哉君子曰達人之道布在方冊顯晦之迹理同可尋若乃色斯舉矣翔而後集者則仲尼去衞夷齊讓國清風長流高節遠列固絕倫矣其次則南山之叟東門之賢范蠡泛江湖尉繚去城市此又見幾而作也亦有貞不絕俗隱不違親冥默園林卷舒人事八月羊酒聘之而不來四時束帛徵之而不屈亦可與語上矣過此以往何足言哉良為道喪已久廉恥不追崩騰闇主之朝淪沒驕君之世何足怪乎悲夫嚴尚既歿誰與為言俗物滿塗彼衆我寡俾將來之不昧知其意焉
