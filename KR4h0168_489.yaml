front:
  text: 全唐文欽定全唐文卷四百八十九權德輿七
  hash: sha256:2a38b404277bc563731ea0cdd28f7e253ebf93c422fbfb39ecf9c62061104e2c
body:
  text: 某月日試祕書省校書郎權德輿上書閣下德輿材術無聞重以拙訥雖星軺往復皆獲趨拜竟未得粗承餘論少盡下情伏蒙以通世之舊將獻狀受祿感戴循環不知所措或有所見敢布愚衷何者今皇帝馭天下之初將欲拔才俊延幽滯綜核名實覽觀風俗故分詔近臣省問四方將天之命其旨不細則閣下舉一士用一賢必當窮驗聲實精究終始一旦以愚當薦士之目誠衆多所未喻也凡以故舊之私不能忘情與夫推賢類能其事則異今者澄清省察以得人為功直道公議天下屬目此時而失則所失多矣德輿伏膺儒行三十未立拊躬責已知不如人俟他時進修與諸生齒方冀當大君子眷念之至申鄙夫報效之分今若以資用所迫苟進一官則傭書販舂亦足自給必不敢以區區之身上纍名器敢拒黔敖之食徐受山濤之恩下情所守在此而已是以竟未獲拜謝者以必所不敢當也伏惟宴閒之餘俯察愚朴文章鄙略不足以煩省覽用此陳露慚畏伏深不宣德輿再拜十二月九日試右金吾衛兵曹參軍權德輿謹遣蒼頭獻書于給事杜公閣下德輿顓蒙小生行藝無取世業儒術不能自奮徒以晨羞之暇取適文誼師蘧生欲寡其過之言慕太邱平心率物之道弱年多病志無所就衡茅之中俯仰自愧去年得以物役道于貴州舟次仁境心口相賀一躡賓階鄙吝都盡何者嚮風之心久積於中不知所以然而然也及夫承至論聞格言懸榻之禮禮有加等深明出處之分根極道義之本初勗之以勉職又勗之以通經駑薄賤姿誠不自意拜賜之時感入心腑及就安環堵靜守緒言常慮行之不至忝辱明鑒近又承寓書於包中丞丈過有稱賞永懷慚戴何可言喻嚱夫先師有互鄉之見與其進也至東漢郭泰陳蕃之徒亦以獎鑒士林為已任降及近古此道寖微今江南多士所湊埒於上國力行修詞人人自勵月旦之評或無至公衆情所望實在閣下伏恐清闕二字鑒於此一失物論云云以之去就下情所虞在此而已如小生者但欲稽考古訓端正心源以區區直方展微贄於他日不宣德輿再拜頃因從容縱言遂及曩歲與外舅相國有往復書猥見徵求出於眷愛休沐發篋追懷愴然因思弱植長自湖海閉關開卷孤特寡徒或有所得則三復喟嘆所務峭峻益為迂野蓋不自量力而欲希蹤古人故書中多有此意今則聊復自哂亦當時志之所在而不能自已也建中初年及弱冠方以環衛掾曹為今司空漕挽從事抵鍾陵經信部時外舅自都曹郎出為郡佐話言歡甚淹留纍夕約為伯仲申以久要鄙人以年位不倫慮非宜適且合志營道豈待約結而後固邪外舅曰僕為監察御史時司空楊公已為祭酒太常又年長十九歲而許僕以兄事何足下今日見拒之深耶時房州罷浦陽長在座因指之曰請亦敦此義其間嘉言道論函丈更僕雖農山濠上無以過也逮歸江南俄致天書慕荀陳之義結潘楊之好緘詞勤勤雅有古風無言不酬感槩相許爾後數年方展嘉禮旋屬外舅以本官參台司操簡修賀輒申直諒亦既病被纍章乞身平生所蘊頗同不試嚱夫人之才有能有不能當夫司諫無隱詞皆體國後以區區建安之守逢京師變故密疏行宮陳匡復之略移書強藩檄誠順之義其他議論風彩凜然有大丈夫之節斯不可及已與夫剌促顧慮沉浮自愛者豈同日耶明年所疾不起前此友壻夭落故有二祭文以寄悲懷七年秋猥辱朝命以博士徵至京師十數年間纍有外姑與建昌房州之喪表墓申奠直書而已因緣故舊臨紙泫然今亦附於書末庶見其閨門士行之有類也兩書之外又有其時書數紙屬在卷中因復連寫倏忽二紀無非風燭士感見知如何可言頃年祇役江西在路有寄內詩一首音詞蕪陋顧非士衡彥先之比頃常馬上偶誦今亦具之往復書并墓銘奠文等共十餘篇以兄與外舅有江湖遊處之舊又鄙人承眷特深雄詞載筆博物閎覽賢士大夫之淑聲家法固周知之感念陳跡輸於醬瓿非敢以文為事也不宣德輿再拜正月二十五日德輿器用瑣薄無他才術徒以木訥之姿玩習聖賢之訓嘗以為大朴久散世道交喪師友之義缺醨薄之風起蚩蚩萬情無所思向銜憤結懷惄然終日前年得以行役獲覯德容始蒙泛愛竟接清議初論當世之理要次陳情性之大端終語道德之原極澡雪百慮泊然葆真一聞至論神開意警不覺虛白澄曠浹洽四支則易直子諒又其細也當此之時誠欲備門弟子之數日展嚴師之敬雖此志不遂實念逾涯忘年之歡契比伯仲昨者奉問洞見仁衷且有退身邱樊之說嚱夫中人之性或不以利回而多以名敗或時能蹈義而鮮能克仁此誠細者可力大端則循情而動矣至於黜聰晦明恬於退讓息浩然之氣哀樂不入不然則乘時致位以天下為已任化醨為醇澤流無垠彞倫式敘生生茂遂此誠大君子之出處也近古以來作者實鮮豈世運有在或時無其人間睹皇極綜論之一篇得之盡矣然則或進或退小屈小伸豈足為執事者道也又示問之中情旨備至不棄弱植伸以嘉姻荀陳之義非所敢當況司徒令子為後來名輩精識洞鑒誠已得之鄙人何堪復當此命門閭之下珉玉不侔將何以祗承厚意當叔寶逸少之目恐纍清德無任下情已具咨聞敬承嘉命尋冀拜謝感慶伏深某再拜省四日書問兼示新文閎博峻異有立言致遠之旨焉其於惠愛纖悉厚重甚善甚善以吾子才志與年三者皆當以家聲自振若建瓴決水大冶良工必有不期至而至者況以日日新又日新之盛哉夫豫章珠璣鏌鎁毛嬙終不慮隱之櫝之襓之帷之之為患而為擁腫礫石鉛鈍宿瘤之排蔽但發有疾徐耳來問云一人驚之亦已多矣豈與族凡校耶此誠得之又云先達病不能公或公而不能甚力今夫滔滔者或辨之不至而苟善待之及揚聲延譽則鉗口結舌大凡舉世之病也如鄙夫者直力不足耳亦懼招徠奔走為津為岐至有竊所愛者則寡矣又豈能廢是也從古未達者之望達者何嘗不如是耶先師七十子所擬豈敢當也三復戁然無言喻懷其他慕重續俟會話德輿頓首使至蒙惠寄制集序發函煥然盈耳溢目宏麗博厚坦夷章明如黃鐘大玉慶霄天籟奇采正聲鏗鏘照耀真可謂作者之表方駕古人欣歡駭悚咏歎無懌甚盛甚盛但根本不稱獎飾非宜以此為雄文至鑒之纍如何如何書命者古先哲王之所以發德音而賦百職也在易曰后以施命告四方書曰誕告萬方詩曰訏謨定命遠猶辰告故君陳君牙畢命冏命之作皆直而文簡而誠含章而不流漢廷亦云文章爾雅訓辭深厚其重如是而鄙人忝焉使盛聖之文明不登於典謨訓誥罪在菲薄其敢逃責於多士耶昔顏氏之子有不善未嘗不知知之未嘗復行愚雖竊知之之道而職命所拘不能不俟終日而勇退日踐復行之過至於九年暴於四方為所觀笑此所以慚愧於古人也亦思人生世間當志於遠者大者豈數數然刓精耗神攘竊文字而猶力不足意不逮雖三益直諒之道久廢獨不愧於心乎昨休沐之餘愚子呈閲且以有大朝中外之授受士友遷除之歲時遂不計妍媸相從以類初不敢以制集自命但全其文而已因其猥多分列卷第又靦然以序引奉煩者誠以承眷之深而心仰雄伯使夜光冠於魚目永為子孫祕藏非敢效太沖三都而求元晏發之之道也及覽鴻麗之作無非溢言追思內訟已無所及使鄙人涉敝帚自見之患陷作者於玉巵無當之嫌一不敏而相交喪何可言也伏以門中忠節敘述周詳因小生之無似揚先德於不朽伏讀感咽何階仰酬結於肺腑沒齒無極又德音宥密皆出自中禁而西掖所掌止於命官今序中所言霈王澤燭幽滯振刑典申肅殺揄揚宏大務極其言則虛美之中又為虛美所冀盡去過談方敢受賜耳故吏部李員外三丈寓書於柳祕書求為後集序此賢達所不能忘懷也但侈言失實如楚越之相遼異時見譏於通人則復為纍亦輒為閣下良規非止於自謀也左曹許公範二紀以來過於賞愛鄙人每以逐臭況之今又遇閣下此作素多昧理忽復自疑幸無泥於眷私而滅裂公是是所望也載之再拜來問見愛殷殷甚厚疏以先師對仲弓先有司之說又曰由於有司以風天下誠哉大君子之言理道也今之取士在於禮部吏部吏部按資格以擬官奏郎官以考判失權衡輕重之本無乃甚乎至於禮部求才猶似為仁由已然亦沿於時風豈能自振嘗讀劉秩祭酒上疏云太學設官職在造士士不知方時無賢才臣之罪也每讀至此心嘗慕之當時置於國庠似在散地而方以乏賢內訟慨然上奏此君子之心也君子之言也況以蒙劣辱當儀曹為時求人豈敢容易然再歲計偕多有親故故進士初榜有之帖落有之策落有之及第亦有之不以私害公不以名廢實不敢自愛不訪於人兩漢設科本於射策故公孫宏董仲舒之倫痛言理道近者祖習綺靡過於雕蟲俗謂之甲賦律詩儷偶對屬況十數年間至大官右職教化所繫其若是乎是以半年以來參考對策不訪名物不徵隱奧求通理而已求辨惑而已習常而力不足者則不能回復於此故或得其人庶他時有通識懿文可以持重不遷者而不盡在於齷齪科第也明經問義有幸中所記者則書不停綴令釋通其義則墻面木偶然遂列上第末如之何頃者參伍其問令書釋意義則於疏注之內苟刪撮旨要有數句而通者昧其理而未盡有數紙而黜者雖未盡善庶稍得之至於來問明六經之義合先王之道而不在於注疏者雖今吏部學究一經之科每歲一人猶慮其不能至也且明經者仕進之多數也注疏者猶可以質驗也不者儻有司率情下上其手既失其末又不得其本則蕩然矣無乃然乎古人云強勉行道則德日起而大有功中庸有困而行之勉強而行之鄙雖不勉敢忘勉之之道邪大凡常情為近習所勝沒沒於聞見汲汲於進取苟避患安時俾躬處休以至老死自為得計豈復有揣摹古今風俗整齊教化根本原始要終長轡遠馭如閣下吐論之若是者耶此鄙人所以喟然三復而不知其止也來問又言三代兩漢至近古所尚不同豈古化敻遠之不可復耶復因緣漸靡而操執者不之思耶鄙人頑固謹俟餘論因自發舒慚怍無量德輿再拜伏惟大方全德自中發外蘊為志氣播為事業然則阜庶生物操持化權結於衆心為日固久且大賢之出處天下之否泰也故詔下之日人人相慶又早歲獲覩皇極綜論元德志孤雲賦凄風詩伏讀纍日備見精慮之所至言理亂者多推世運於必然殊不知弛張變化存乎其人而已自古哲賢之徒或尚志不展鬱堙當世長歎痛哭於是乎作伏惟以常所感慨申於盛明使三辰光潤萬方軌道實在指顧豈逃彀中且以西漢公輔言之蕭曹以清靜熙帝載良平以謨明贊王業至宣帝時則魏相通故事邴吉知大體斯皆章章可言者也洎夫張蒼之律歷孫宏之文章韋賢之好學平當之有恥然亦號為賢相抑又次焉至若匡張孔馬服儒衣冠被阿諛之譏不勝其任最下則陶青劉舍莊翟趙周之徒皆齷齪備位故身名偕泯夫此數子者豈不粗知君臣之道古今之變哉病於無所發明保持祿位而已有時無功可不謂大哀乎又古人有立德立功立言之訓顧惟多幸獲覽炳然之文又備陳餘論有以見大君子遣辭發慮宏裕溥博者矣惟德與功實在今日灑天下耳目復萬物於全性在丈人踐而行之守而終之而已不宣某再拜文章者其士之蘊耶微斯文則士之道不彰不明又況宗公大君子網紀百度琢磨九德以至於經大猷斷大事不由此塗出者猶瞽之無相歟蓋修之有本末得之有厚薄耳至若推於心術暢於事業行顧言言中倫者太保有焉太保姓姚氏諱南仲吳興人博究古今安舒方重外清和而內剛明有直質而無流心學于詩之愷悌易之貞厲且曰史魚仲山甫吾之師也故以之修身以之懿文其遜志肄業通達強立則博約以明義類郊居宴息勇退肥遁則吟咏以達情性詳延特起對有明法拾遺補闕在帝左右義激於中書陳於前肝膈悃愊以盡規為已任切於時病者皆精為上言之疏兩河安危夷門要害盍建元侯以屏東夏疾吏道雜而多端條陳選部官人之法轂下饑旱舉成湯六事凡如此書數十上請改卜貞懿皇后陵地一篇尤深切著明武皇嚮納被以命服因詔侍臣極言得失宰司上賀百執事聳視以為雖神爵黃龍炎漢紀年之瑞不若是也周旋臺閣損益文憲由左馮翊理陝州教化清平分閫東郡間邪秉直志氣所伸勇若諸賁天下之人稱焉竟以貞勝而登端右是皆以立誠居業言而履之之效也故其含章匪躬諷議居多其他則歌詩有逸韻敘事為實録皆据根柢而無枝葉愔愔然君子碩儒之言其在是乎昔公之理海鹽而介浙右也德輿方僑於吳辱忘年之歡暨叨二六職而公入踐師長馨香茂實耳目聞知公嗣子太僕主簿衮孝謹而文永懷罔極捧公述作二百篇列為十編以論次見授故粗舉公之所履與為文之旨而敘之云爾昔有虞以濬哲文明理天下故有諧八音陳九德賡歌康哉之臣周宣王修文武之業以開中興故有歌蒸人賦韓奕清風大雅之什春秋之際諸侯列卿大夫感物造端能賦可以圖事稱詩可以諭志然則元侯宗工作為文章本於王化繫於風俗亦其志氣之所發也司徒諱建封南陽人簡廉疏達信厚誠直秉心可大以禮義為干櫓非道不處視圭組猶稊稗以褐衣寬博游于京師當時賢公名卿盛服先生之倫皆迎門締交就義若渴贊師律於盟津大鹵二府由察視主柱下方書朝廷以州部要害選難符守歷巴陵陟壽春婪婪反虜壤地相接衆寡懸絶物情不交斬其使者以徇傳首於行在所屏翰淮海我為金湯選耎觀望者皆革心服義而東夏安矣加地進祿察廉三郡授鉞貞師蒞于徐方就加六職端右之任追命三公論道之秩其始終艱貞光大也如是昔左邱明載單襄公之言曰忠文之實也智文之輿也仁文之愛也義文之制也則司徒嚮時之大忠明智戴仁抱義皆推本乎斯文然後足言足志踐履章灼故其辨古人心源定是非於㣥疑之下則韓君別録痛詆時病以發舒憤悶則投元杜諸宰相書其餘贊勳閥表邱隴銘器敘事放言詣理皆與作者方駕而歌詩特優有仲宣之氣質越石之清拔如雲濤溟漲浩漾無際而天琛夜光往往在焉其入覲也獻朝天行一篇因喜氣以攄肝膈覽其詞者見公之心焉其還鎮也德宗皇帝紓天文以送別湛思異論輝動中朝至於內廷錫宴君唱臣和皆酌六義之英而為一時之盛夫文之病也或牽拘而不能騁或奔放而不自還公則財成心匠揮斥細故英華感槩卓爾其宏大析理研幾泊然其精微全才逸氣與勳力相宣盡在是矣公之理也徐人宜之故尚書克家纂業用嗣厥服猶鮑氏之居司隸鄭人之賦緇衣大君推恩善善春秋之義也永懷先志乃集遺文以德輿嘗承司徒之歡表烈編次凡二百三十篇承詔作序是用拜君命之辱而不敢讓云周家忠厚文章備乎二代先師有郁郁之歎故周任史克仍叔吉甫之倫生焉漢氏剗煩苛宏利澤訓辭深厚議論宏大故賈誼揚雄司馬遷相如之才出焉唐興幾二百歲紹聞周漢之逸軌以人文華國猶雲漢之為章于上江漢之為紀于下九功成焉百度貞焉王澤浹洽故斯文煥發秉筆之士皆欲泝末流而挹清源土犮埃壒而棲皓氣至若詞合雅言中倫疏通而不流博富而有節潔靜夷易得其英華者其宏農楊君歟君諱凝字懋功孝弟純懿中和特立早歲違難於江湖間與伯氏嗣仁叔氏恭履修天爵振儒行東吳賢士大夫號為三楊易象之懿文孔門之言詩皆生知之舉進士甲科賢公交辟典校祕書四遷至冠柱後惠文徵拜左史歷司封員外左司郎中不附離權右陰為所中以其外相師律非君莫可他日計事如京師復命于梁會其帥既歿軍司馬代之詔未下兵火氣焰殺人以逞明神佑善獨脫死地中貴人持尺一詔書徵還燕居四年不交人事磅礡三古推明六義措跡愈退而屬詞愈精時恭履捐館一紀君與嗣仁倍手足之愛壬午歲嗣仁以中執法廉湘中七郡風俗君起家為兵部郎中伯仲昌大輝華中外方將乘迅飈摩赤霄極文采之用為太平嘉瑞協書命於謨訓薦聲詩於郊廟命屈其才末如之何君嘗以為尚氣者或不能精密言理者或不能彪炳鏤蒸彞景鐘與緣情比興者或不能相為用仲宣體弱公幹未遒才難而力不足從古所病故懋功於六經百氏之中如良金巧冶鍛鍊在手而又弛扃防隳約束恬然而據上遊坦然而蹈中行其敘事推理況今據古多而不煩簡而不遺彌綸條鬯無入而不自得所著文一百四十餘篇歌詩倍之皆天球大圭奇采逸響不待數珩璜珮玦之目然後知其妙噫自天寶已還操文柄而爵位不稱者德輿先大夫之執曰趙郡李公遐叔河南獨孤公至之狎主時盟為詞林龜龍止於尚書郎二千石屬者亡友安定梁肅寬中平夷朗暢傑邁間起博陵崔鵬元翰博厚周密精醇不雜二君者雖嘗司密命裁贊書而終不越於諫曹計部今懋功亦以中兵下大夫奄忽不淑豈造物者不與其全歟復舛錯歟此吾徒故人所以索然出涕而有百身之痛也嗣仁類其文為二十篇緘詞甚哀猥見授簡以德輿早辱厚善忘其不能其代德家法與踐履始中終之說嗣仁刻石紀墓既詳言矣徒采其述作大旨直書以綴于篇易賁之彖曰觀乎人文以化成天下故闕里之四教門人之四科未有遺文者荀況孟軻修道著書本於仁義經術之枝派也逮夫騷人怨思之作游士從衡之論剌譏捭闔文憲陵夷至漢廷賈誼劉向班固揚雄司馬遷相如之倫鬱然復興有古風烈然則文之用也橫三才之中經紀事物章明統類不可已也殷之三說命周之命君陳君牙楚射父之訓詞鄭東里之潤色天子諸侯告命之文也張老之輪奐史克之駉駜吉甫之清風伯喈之無愧賢士大夫頌述之文也至若夫子紀延陵墓叔向寓子産書董仲舒射策書天人相與之際阮元瑜書記翩翩之任觸類滋多非文不彰後之人力不足者詞或侈靡理或底伏文之難能也如是博陵崔君元翰東漢濟北相長岑令之後也曾祖某濟州剌史祖某鳳閣舍人考某以經明歷衛州汲縣尉虢州湖城縣主簿親歿遂不復仕探古先微言著尚書演範周易忘象及三國春秋幽觀之書門人諸儒易其名曰貞文孝文君紹文宗雕龍之慶究貞文法義之學潔廉清方敦直莊明博見強志不取合於俗默而好深湛之思舒而為彬蔚之文師遵六籍磅礡二漢不為物遷不為波流初閉關隱約於河朔之間年殆知天命甫與計偕至京師洎博學宏詞直言極諫凡三登甲科名動天下初自典校祕書連辟汧公北平王二司徒府管奏記之職歷太常寺協律郎大理評事錫以命服登朝廷為太常寺博士禮部員外郎貞元七年春轉職方員外郎知制誥八年冬罷為比部郎中十一年夏感疾不起其壽四百甲子其文若干篇閎茂博厚菁華縝密足以希前古而聳後學記循吏政事則房柏卿碣孫信州頌敘守臣勳烈則黎陽城碑劉幽求神道碑表宗工賢人兆域則李太師梁郎中志文撰門中德善則貞文孝文志碣二銘攄志氣以申感慨則與李都統及三從事書纂桑門心法則大覺禪師碑推人情以陳聖德則請復尊號表鋪陳理道則有制策藻潤王度則有詔誥嚮所敘詩書說命駉頌而下君皆索其粹精故能度越倫類有聲名於代其他詩賦贊論銘誄序記等合為三十卷如黃鐘玉磬宏璧琬玉奏於懸間列在西序其彰彰者雖漢庭諸公不能加也無溢言曼辭以為夸大無諂笑柔色以資孟晉徑直而不能屈已清剛而不能容物孤特寡徒晚達中廢斯亦命之所賦也德輿蚤歲與君遊於江湖間又接武侍從登文石之陛常所論著備探簡編君之孤某既除喪泣捧遺文見咨序引故如其篇第直書以冠之云爾道之於物無不由也無不貫也而況本於元覽發為至言言而蘊道猶三辰之麗天百卉之麗地平夷章大恬淡溫粹飄飄然軼八紘而泝三古與造物者為徒其不至者遣言則華涉理則泥雖辨麗可嘉采真之士不與也宗元先生吳君其知言者歟先生諱筠字貞節華陰人生十五年篤志於道與同術者隱於南陽倚帝山閎覽古先遐蹈物表芝耕雲臥聲利不入天寶初元纁鶴版徵至京師用希夷啓沃吻合元聖請度為道士宅於嵩邱乃就馮尊師齊整受正一之法初梁貞白陶君以此道授升元王君王君授體元潘君潘君授馮君自陶君至于先生凡五代矣皆以陰功救物為王者師十三年召入大同殿尋又詔居翰林明皇在宥天下順風所嚮乃獻元綱三篇優詔嘉納志在遐舉纍章乞還以禽魚自況藪澤為樂得請未幾盜泉汙於三川羽衣虛舟泛然東下棲匡廬登會稽浮浙河息天柱隱機埋照順吾靈龜有時放言以暢天理且以園公歌詠於紫芝宏景怡悅於白雲故屬詞之中尤工比興觀其自古王化詩與大雅吟步虛詞遊仙雜感之作或遐想理古以哀世道或磅礡萬象用冥環樞稽性命之紀達人事之變大率以嗇神挫鋭為本至於奇采逸響琅琅然若戛雲璈而凌倒景崑閬松喬森然在目近古遊方外而言六義者先生實主盟焉至若總論谷神之妙則有元綱篇哀蓬心蒿目之遠於道也則有神仙可學論疏瀹澡雪使無落吾事則有洗心賦巖棲賦修胸中之誠而休乎天均則有心目論契形神頌其他操章寓書贊美序別非道不言言而可行泊然以微妙卓爾而昭曠合為四百五十篇博大真人之言盡在是矣大歷十三歲歲直鶉首止于宣城道觀焚香返真於虛室之中門弟子有邵冀元者率籲其徒寧神于天柱西麓從其命也冀元偏得先生之道如槁木止水刳心遺形太原王顏嘗悅先生之風自先生化去二十五年顏為御史丞類其遺文為三十編拜章上獻藏在祕府厥後冀元得其本以授豫請序引其徑庭庶傳永久別有逍遙卓詭之論不列于此編至若挺神奇祛物怪告鍊蛻之地合肸蠁之符皆備刻於金石者之說今徒采獲斯文以序崖略且俾後學知道者必知言云
