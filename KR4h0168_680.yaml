front:
  text: 全唐文欽定全唐文卷六百八十白居易二十五
  hash: sha256:57ec3ea4e834ff64de0c285a27cd0aff66ac77e1820778a9fa7c4f6e4c092459
body:
  text: 公諱季康字某太原人秦武安君起之裔胄北齊五兵尚書建之五代孫也曾祖諱士通皇朝利州都督祖諱志善尚衣奉御父諱鏻揚州録事參軍公即録事府君次子歷華州下邽尉懷州河內丞徐州彭城令江州潯陽令宿州虹縣令宣州溧水令歿於官舍明年某月某日歸葬於華州下邽縣某鄉某原享年若干嗚呼公為人溫恭信厚為官貞白嚴重友於兄弟慈於子姪鄉黨推其行交游讓其才自尉下邽至宰溧水皆以潔廉通濟見知郡守流譽於朋寮才不偶時道屈於位而徒勞於州縣竟不致於青雲命矣夫哀哉公前夫人河東薛氏先公若干年而歿生二子一女女號鑒虛未筓出家長子某杭州於潛尉次子某睦州遂安尉後夫人高陽敬氏父諱某某官生一子二女女皆早夭子曰敏中進士出身前試大理評事歷河東鄭滑邠寧三府掌記夫人在室以孝敬奉親為淑女既嫁以柔和從夫為順婦及主家以慈正訓子為賢母故敏中遵其教飭其身升名甲科歷聘公府以文行稱於衆以祿養榮於親雖自有兼才然亦由夫人訓導之所致也夫人以太和七年正月某日寢疾終於下邽別墅享年若干明年某月某日啓溧水府君薛夫人宅兆而合祔焉禮也時諸子盡歿獨敏中號泣襄事託從祖兄居易志於墓石銘曰繄我叔父溧水府君治本於家事施政於縣民繄我叔母高陽夫人德修於室家慶積於閨門訓著趨庭善彰卜鄰故其嗣子休有令聞德宗聖文神武皇帝元韋氏諱某字某京兆人也曾祖某某官祖某某官父某某官即某官府君第某女也母曰永穆公主元和四年四月某日薨於某所以某年四月某日詔葬於萬年縣上好里洪平原上悼焉哀榮之禮有以加焉嗚呼惟韋氏代德宦業族系婚戚有國史家牒存焉今奉詔但書地及時與妃之所以曰賢之義而已貞元中沙鹿上仙長秋虛位凡六十九御之政多聽於先以采蘩之誠奉於上故能致霜露之感薦於九廟次以樛木之德逮於下故能分雲雨之澤洽於六宮其餘坐論婦道行贊內理服用必中度故組紃有常訓言動必中節故環珮有常聲七十二年禮無違者冊命曰賢不亦宜哉永貞中號奉宮車誓留園寢麻衣告朔蓬首致哀執匪懈之心視奠於靈座修無上之道薦福於崇陵殆茲歿身不衰其志故葬之日掌文之臣白居易得以無愧之詞志於墓而銘曰京兆阡兮洪平原兮歲巳丑兮日丁酉兮惟土田兮與時日龜兮蓍兮偕言吉峨峨新墳兮葬者誰德宗皇帝韋賢有唐元和元年九月十六日故中散大夫尚書比部郎中舒王府長史河南元府君諱寬夫人滎陽縣太君鄭氏年六十寢疾歿於萬年縣靖安里私第越明年二月十五日權祔於咸陽縣奉賢鄉洪瀆原從先姑之塋也夫人曾祖諱遠思官至鄭州刺史贈太常卿王父諱目蓋一作日益朝散大夫易州司馬父諱濟睦州刺史夫人睦州次女也其出范陽盧氏外祖諱平子京兆府涇陽縣令夫人有四子二女長曰沂蔡州汝陽尉次曰秬京兆府萬年縣尉次曰積同州韓城尉次曰稹河南縣尉長女適吳郡陸翰翰為監察御史次為比邱尼名真一二女不幸皆先夫人歿府君之為比部也夫人始封滎陽縣君從夫貴也稹之為拾遺也夫人進封滎陽縣太君從子貴也天下有五甲姓滎陽鄭氏居其一鄭氏勳德官爵有國史在鄭之源派婚姻有家牒在比部府君世祿官政文行有故京兆尹鄭雲逵之志在今所敘者但書夫人之事而已初夫人為女時事父母以孝聞友兄姊睦弟妹以悌聞發自生知不由師訓其淑性有如此者夫人為婦時元氏世食貧然以豐潔家祀傳為貽燕之訓夫人每及時祭則終夜不寢煎和滌濯必躬親之雖隆暑沍寒之時而服勤親饋面無怠色其誠敬有如此者元氏鄭氏皆大族好合而姻表滋多凡中外吉凶之禮有疑議者皆質於夫人夫人從而酌之靡不中禮其明達有如此者夫人為母時府君既歿積與稹方髫齓家貧無師以授業夫人親執詩書誨而不倦四五年間二子皆以通經入仕稹既第判入等授祕書省校書郎屬今天子始踐阼策三科以拔天下賢俊中第者凡十八人稹冠其首焉由校書郎拜左拾遺不數月讜言直聲動於朝廷以是出為河南尉長女既適陸氏陸氏有舅姑多姻族於是以順奉上以惠逮下二紀而歿婦道不衰內外六姻仰為儀範非夫人恂恂孜孜善誘所至則曷能使子達於邦女宜其家哉其教誨有如此者既而諸子雖迭仕祿秩甚薄每至月給食時給衣皆始自孤弱者次及疏賤者由是衣無常主厨無異膳親者悅疏者來故傭保乳母之類有凍餒垂白不忍去元氏之門者而况臧獲輩乎其仁愛有如此者自夫人母其家殆二十五年專用訓誡除去鞭撲常以正顏色訓諸女婦諸女婦其心戰兢如履於氷常以正辭氣誡諸子孫諸子孫其心愧恥若撻於市由是納下於少過致家於太和婢僕終歲不聞忿爭童孺成人不識檟楚閨門之內熙熙然如太古時人也其慈訓有如此者噫昔漆室緹縈之徒烈女也及為婦則無聞伯宗梁鴻之妻哲婦也及為母則無聞文伯孟氏之親賢母也為女為婦時亦無聞今夫人女美如此婦德又如此母儀又如此三者具美可謂冠古今矣嗚呼惟夫人之道移於他則何用而不臧乎若引而申之可以維一國焉則關睢鵲巢之化斯不遠矣若推而廣之可以肥天下焉則姜嫄文母之風斯不遠矣豈止於訓四子以聖善化一家於仁厚者哉居易不佞辱與夫人幼子稹為執友故聆夫人美最熟稹泣血號慕哀動他人託為撰述書於墓石斯古孝子顯父母之志也嗚呼斯文之作豈直若是而已哉亦欲百代之下聞夫人之風過夫人之墓者使悍妻和嚚母慈不遜之女順云爾銘曰元和歲丁亥春咸陽道渭水濱云誰之墓鄭夫人夫人太原白氏其出昌黎韓氏其適潁川陳氏享年七十唐和州都督諱士通之曾孫尚衣奉御諱志善之元孫都官郎中諱溫之孫延安令諱鍠之第某女韓城令諱欽之外孫故鄜城尉諱潤之夫人故潁川縣君之母故大理少卿襄州別駕諱季庚之姑前京兆府戶曹參軍翰林學士白居易前祕書省校書郎行簡之外祖母也惟夫人在家以和順奉父母故延安府君視之如子既筓以柔正從人故鄜城府君敬之如賓自延安終夫人哀毀過禮為孝女洎鄜城歿夫人撫訓幼女為節婦及居易行簡生夫人鞠養成人為慈祖母逮乎潔蒸嘗敬賓客睦娣姒工刀尺善琴書皆出於餘力焉貞元十六年夏四月一日疾歿於徐州古豐縣官舍其年冬十一月權窆於符離縣之南偏至元和八年春二月二十五日改卜宅兆於華州下邽縣義津鄉北原即潁川縣君新塋之西坎從存歿之志居易等號慕慈德敬撰銘志泣血秉筆言不成文銘曰恭惟夫人女孝而純婦節而溫母慈而勤嗚呼謹揚三德銘於墓門恭惟夫人實生我親實撫我身欲養不待仰號蒼旻嗚呼豈寸魚之心能報東海之恩夫人贊皇縣君李氏趙郡高邑人也六代祖素立安南都護五代祖休烈趙州刺史高祖諱至遠天官侍郎曾祖畬國子司業祖諱承工部尚書湖南觀察使考諱藩門下侍郎同平章事贈戶部尚書夫人諱娥相國長女也適河東裴君克諒今為海州刺史一子曰鐬左衛騎曹參軍一女適隴西李遂遂為壽州録事參軍由此而上得於國史家牒云夫人為相門女邦君妻不以華貴驕人能用恭儉克巳撫下若子敬夫如賓衣食之餘傍給五服親族之飢寒者又有餘散霑先代僕使之老病者又有餘分施佛寺僧徒之不足者浣衣菲食服勤禮法禮法之外諷釋典持真言棲心空門等觀生死故治家之日欣然自適捐館之夕怡然如歸寶歷三年三月一日疾終於海州官第其歲十一月十四日歸祔於某所先塋年五十有四夫人之從裴君也歷官九任凡三十一年族睦家肥輔佐之力也由此而上得於裴君狀云夫源遠者流長根深者枝茂噫李氏之世德世祿有所從來矧相國端方廉雅孝友忠肅自從事彭城登庸宰府不以夷險而遷其道宜乎居極位享名賢也夫人敬恭勤儉柔順慈惠自女於室婦於家不以初終而怠其行宜乎啓封邑光德門也裴君修文達政潔巳愛人自佐邑從軍連牧二郡不以寒暑而易其心宜乎荷百祿號良二千石也嗚呼非此父不生此女非是夫不稱是妻斯所謂類以相從合而具美者也論撰表志其可闕乎銘曰高邑之祥降於李氏相門之慶鍾於女子女子有行歸我裴君君亦良士宜賢夫人夫人雖歿風躅具存勒銘泉戶作範閨門白氏芊姓楚公族也楚熊居太子建奔鄭建之子勝居於吳楚間號白公因氏焉楚殺白公其子奔秦代為名將乙丙已降是也裔孫白起有大功於秦封武安君後非其罪賜死杜郵秦人憐之立祠廟於咸陽至今存焉及始皇思武安之功封其子仲於太原子孫因家焉故今為太原人自武安以下凡二十七代至府君高祖諱建北齊五兵尚書贈司空曾祖諱士通皇朝利州都督祖諱志善朝散大夫尚衣奉御父諱溫朝請大夫檢校都官郎中公諱鍠字確鍾都官郎中第六子幼好學善屬文尤工五言詩有集十卷年十七明經及第解褐授鹿邑縣尉洛陽縣主簿酸棗縣令理酸棗有善政本道節度使令狐章知而重之秩滿奏授殿中侍御史內供奉賜緋魚袋充滑臺節度參謀軍府之要多咨度焉居歲餘公嘗規章之失章不聽公因留一書遺章不辭而去明年選授河南府鞏縣令在任三考自鹿邑至鞏縣皆以清直靜理聞於一時公為人沉厚和易寡言多可至於涉是非關邪正者辨而守之則確乎其不可拔也大歷八年五月三日遇疾歿於長安春秋六十八以其年權厝於邽縣下邑里夫人河東薛氏夫人之父諱俶河南縣尉大歷十二年六月十九日歿於新鄭縣私第享年七十以其年權窆厝於新鄭縣臨洧里公有子五人長子諱季庚襄州別駕事具後狀次諱季般徐州沛縣令次諱季軫許州許昌縣令次諱季寧河南府參軍次諱季平鄉貢進士元和六年十月八日孫居易等始發護靈襯遷葬於下邽縣北義津鄉北原而合祔焉謹狀公諱季庚字某鞏縣府君之長子天寶末明經出身解褐授蕭山縣尉歷左武衛兵曹參軍宋州司戶參軍建中元年授彭城縣令時徐州為東平所管屬本道節度使反反之狀先以勝兵屯甬口絶汴河運路然後謀東窺江淮朝廷憂虞計未有出公與本州刺史李洧潛謀以徐州及甬口城歸國反拒東平遣驍將信都崇敬石隱金等率徑卒二萬攻徐州徐州無兵公收合吏民得千餘人與李洧堅守城池親當矢石晝夜攻拒凡四十二日而諸道救兵方至既而賊徒潰運路通首挫逆謀不敢東顧繇是徐州一郡七邑及甬口等三城到於今訖不隸東平者實李洧與公之力也德宗嘉之命公自朝散郎超授朝散大夫自彭城令擢拜本州別駕賜緋魚袋仍充徐泗觀察判官故其制云今州將忠謀翻然效順叶其誠美共贊良圖我懸爵賞俟茲而授宜加佐郡之命仍寵殊階之序貞元初朝廷念公前功加檢校大理少卿依前徐州別駕當道團練判官仍知州事故其制云嘗宰彭城挈而歸國舊勳若此親寵蔑如或不廷厚於忠臣將何勸於義士宜從亞列再二徐方秩滿又除檢校大理少卿兼衢州別駕秩滿本道觀察使皇甫政以公政績聞薦又除檢校大理少卿兼襄州別駕貞元十年五月二十八日終於襄陽官舍享年六十六其年權窆於襄陽縣東津鄉南原至元和六年十月八日嗣子居易等遷護於下邽縣義津鄉北原從鞏縣府君宅兆而合祔焉夫人潁川陳氏陳朝宜都之後祖諱璋利州刺史考諱潤坊州鄜城縣令妣太原白氏夫人無兄姊弟妹八歲丁鄜城府君之憂居喪致哀主祭盡敬其情禮有過成人者中外姻族咸稱異之十五歲事舅姑服勤婦道夙夜九年逮於奉蒸嘗睦娣姒待賓客撫家人又三十三年禮無違者故中外凡為冡婦者皆景慕而儀型焉又別駕府君即世諸子尚幼未就師學夫人親執詩書晝夜教導恂恂善誘未嘗以一篦一杖加之十餘年間諸子皆以文學仕進官至清近實夫人慈訓所致也夫人為女孝如是為婦順如是為母慈如是舉三者而百行可知矣建中初以府君彭城之功封潁川縣君元和六年四月三日歿於長安宣平里第享年五十七其年十月八日從先府君祔於皇姑焉有子四人長曰幼文前饒州浮梁縣主簿次曰居易前京兆府戶曹參軍翰林學士次曰行簡前祕書省校書郎幼子金剛奴無祿早世初高祖贈司空有功於北齊詔賜莊宅各一區在同州同城縣至今存焉故自司空而下都官郎中而上皆葬於韓城縣今以卜歸不便遂改卜靳縣府君及襄州別駕府君兩塋於下邽縣義津鄉北原其兩塋同兆域而異封樹蓋從時宜且叶吉也謹狀醉吟先生者忘其姓字鄉里官爵忽忽不知吾為誰也宦遊三十載將老退居洛下所居有池五六畝竹數千竿喬木數十株臺榭舟橋具體而微先生安焉家雖貧不至寒餒年雖老未及昏耄性嗜酒耽琴詩凡酒徒琴侶詩客多與之遊遊之外棲心釋氏通學小中大乘法與嵩山僧如滿為空門友平泉客韋楚為山水友彭城劉夢得為詩友安定皇甫朗之為酒友每一相見欣然忘歸洛城內外六七十里間凡觀寺邱墅有泉石花竹者靡不遊人家有美酒鳴琴者靡不過有圖書歌舞者靡不觀自居守洛川洎布衣家以宴遊召者亦時時往每良辰美景或雪朝月夕好事者相遇必為之先拂酒罍次開詩篋詩酒既酣乃自援琴操宮聲弄秋思一遍若興發命家僮調法部絲竹合奏霓裳羽衣一曲若歡甚又命小妓歌楊柳枝新詞十數章放情自娛酩酊而後已往往乘興履及鄰杖於鄉騎遊都邑肩舁適野舁中置一琴一枕陶謝詩數卷舁竿左右懸雙酒壺尋水望山率情便去抱琴引酌興盡而返如此者凡十年其間賦詩約千餘首歲釀酒約數百斛而十年前後賦釀者不與焉妻孥弟姪慮其過也或譏之不應至於再三乃曰凡人之性鮮得中必有所偏好吾非中者也設不幸吾好利而貨殖焉以至於多藏潤屋賈禍危身奈吾何設不幸吾好博奕一擲數萬傾財破産以致於妻子凍餒奈吾何設不幸吾好藥損衣削食鍊鉛燒汞以至於無所成有所誤奈吾何今吾幸不好彼而自適於杯觴諷詠之間放則放矣庸何傷乎不猶愈於好彼三者乎此劉伯倫所以聞婦言而不聽王無功所以遊醉鄉而不還也遂率子弟入酒房環釀甕箕踞仰面長吁太息曰吾生天地間才與行不逮於古人遠矣而富於黔婁壽於顏淵飽於伯夷樂於榮啓期健於衛叔寶幸甚幸甚餘何求哉若捨我所好何以送老因自吟詠懷詩云抱琴榮啓樂縱酒劉伶達放眼看青山任頭生白髮不知天地內更得幾年活從此到終身盡為閒日月吟罷自哂揭甕撥醅又飲數杯兀然而醉既而醉復醒醒復吟吟復飲飲復醉醉吟相仍若循環然繇是得以夢身世雲富貴幕席天地瞬息百年陶陶然昏昏然不知老之將至古所謂得全於酒者故自號為醉吟先生於時開成二年先生之齒六十有七鬚盡白髮半禿齒雙缺而觴詠之興猶未衰顧謂妻子云今之前吾適矣今之後吾不自知其興何如維元和二年歲次丁亥十二月甲寅朔二十六日己卯嗣皇帝臣稽首大聖祖高上大道金闕元天元皇大帝伏以今年司天臺奏正月三日祀上帝於南郊佳氣充塞四方溫潤祥風微起廬州申連理樹一株彰義軍節度使進白烏一鄭滑觀察使奏瑞麥五科司天臺奏六月五日夜鎮星見河陽節度使進白雀一荊南節度使申連理樹一本山南西道觀察使申嘉瓜一枚司天臺奏六月十三日夜老人星見河南府申芝草兩莖司天臺奏冬至日佳氣充塞瑞雪祈寒者臣嗣承丕圖肅恭寅畏祖宗垂慶佳瑞薦臻虔奉禎祥伏深祇惕今時惟元律節及季冬仰薦明誠敬率恆典謹遣攝太尉司徒平章事杜佑薦獻以聞謹詞維長慶二年歲次癸卯八月癸未朔越十七日巳亥朝議大夫使持節杭州諸軍事守杭州刺史上柱國白居易謹遣朝議郎行餘杭縣令常師儒以清酌之奠敬祭於仇王神嘗聞神者所以司土地守山川驅禽獸福生人也餘杭縣自去年冬逮今秋虎暴者非一神其知之乎人死者非一神其念之乎居易與師儒猥居牧宰慙無政化不能使渡江出境是用虔告於神惟神廟居血食非人不立則人神之主也獸神之屬也今縱其屬殘其主於神何利焉於人何辜焉若一酹之後神其有知即能揮靈申威服猛禁暴是人之福幸亦神之昭昭若人告不聞獸害不去是無神也人何望焉嗚呼正直聰明盍鑒於此尚饗維長慶二年歲次癸卯七月癸丑朔十六日戊辰朝議大夫使持節杭州諸軍事守杭州刺史上柱國白居易以酒乳香果昭告於皋亭廟神去秋愆陽今夏少雨實憂災沴重困杭人居易忝奉詔條愧無政術既逢愆序不敢寧居一昨禱伍相神祈城隍祠靈雖有應雨未霑足是用擇日一作撰詞祗事改請於神恭惟明神禀靈於陰祗資善於釋氏聰明正直潔一作肅靖慈仁無幽不通有感必應今請齊心虔告神其鑒之若四封之間五日之內雨澤霈足稼穡滋稔敢不增修像設重薦馨香歌舞鼓鐘備物以報如此則不獨人之福亦惟神之光若寂寥自居肸嚮無應長吏虔誠而不答下民盼望而不知坐觀田農使至枯悴如此則不獨人之困亦惟神之羞惟神裁之敬以俟命尚饗維長慶二年歲次癸卯八月癸未朔二日甲申朝議大夫使持節杭州諸軍事守杭州刺史上柱國白居易率寮吏薦香火拜告於北方黑龍惟龍其色元其位坎其神壬癸與水通靈昨者歷禱四方寂然無應今故虔誠潔意改一作致命於黑龍龍無水欲何依一作顧何宅神無靈將恐竭一作歇澤能救物我實有望於龍物不自神龍豈無求於我若三日之內一雨雱雨水它是龍之靈亦人之幸禮無不報神其聽之急急如律令維長慶四年歲次甲辰五月已酉朔四日壬子朝議大夫使持節杭州諸軍事守杭州刺史上柱國白居易謹以清酌少牢之奠敢昭告於浙江神滔滔大江南國之紀安波則為利洚流則為害故我上帝命神司之今屬潮濤失常奔激西北水無知也如有憑焉浸郊廠墨壞敗廬舍人墜墊溺籲天無辜居易祗奉璽書興利除害守土守水職與神同是用備物致誠躬自虔禱庶俾水反歸壑谷遷為陵土不騫崩人無蕩析敢以醴幣羊豕沉奠於江惟神裁之無忝祀典尚饗維太和六年歲次壬子十月庚申朔二十四日癸未中大夫守河南尹上柱國晉陽縣開國男食邑三百戶賜紫金魚袋白居易謹以清酌庶羞之奠敬祭於故相國吏部尚書贈司空崔公敦詩惟公德望事業識度操履為時而生作國之紀巖廊匡輔藩部政治父母黎元股肱天子斯皆談在人口播於人耳今所敘者眷知而已於戲自古及今實重知音故詩美伐木易稱斷金始愚於公同入翰林因官識面因事知心獻納合章對揚聯襟以忠相勉以義相針朝案同食夜牀並衾綢繆五年情與時深及公登庸纍分閫鎮愚亦去國出領符印徐宣遠部忠杭遐郡雁去寄書潮來傳信無由會合祇望音問未卜後期但敦前分太和之初連徵歸朝公長夏司愚二秋曹玉德彌溫松心不凋南宮多暇屢接遊遨竹司雪夜杏園花朝杜曲春晚潘亭月高前對青山後携濁醪微之夢得慕巢師皋或徵雅言酣詠陶陶或命俗樂絲管嘈嘈藉草蔭松枕麴餔糟曾未周歲索然分鑣公又授金戊南撫荊蠻報政入覲復總天官愚因謝病東歸澗瀍方從四皓旋守三川時蒙問訊日奉周旋豈無要約良有因緣洛城東隅履道西偏修篁回合流水潺湲與公居第門巷相連與公齒髮甲子同年兩心相期三徑之間優游手而終老焉嗚呼易失者時難忱者天既奪我志又殲我賢邱園未歸館舍先捐百身莫贖一夢不還鬱鬱佳城茫茫九原淒淒簫鼓慘慘風煙祖奠遲遲泣涕漣漣平生親友羅拜柩前賢人已矣天地蒼然嗚呼哀哉敦詩尚饗維太和元年歲次丁未二月丙午朔七日壬子中大夫守太子賓客分司東都上柱國賜紫金魚袋白居易謹以清酌庶羞之奠敬祭於故祕書監贈禮部尚書崔公惟公之世祿家行文章政事播於時論此不復云今但敘舊好寫衷誠而已嗚呼居易兄弟與公伯仲前後科第同登者四五屬為僚友三十餘年又膳部房與公同聲塵之遊定膠漆之分兩家不幸十年以來哀釁所鍾零落殆盡我老君病唯餘二人天不憗遺公又即世不登大位不享永年夙志莫伸幽憤何極居易方屬疾恙不遂執紼遣姪阿龜往展情禮此如不祭永痛奈何嗚呼重易平生知我寢門一慟可得而聞乎嗚呼重易平生嗜酒奠筵一酌可得而歆乎嗚呼哀哉伏惟尚饗
