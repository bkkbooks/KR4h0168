front:
  text: 全唐文欽定全唐文卷一百十五晉高祖二
  hash: sha256:2ad33e89384e2e36314a03a4f80f5cb2243b847e4f62ff2ac3ba228eeb721255
body:
  text: 朕自御萬方於今五稔每推誠而待物貴舍巳以從人乃有不體朕懷柔恣行凶慝顯干紀律須舉憲章福州王昶恃彼偏方亂其彞典於使臣而倨傲向朝闕以邀求深虧臣子之儀固掇神祇之怒尚全大體特示寬恩所有貢輸悉令迴復舞羽而聿思修德轉規而猶冀省諐而王建立三上奏章楊光遠繼陳表䟽朝行之內邦計之司同有敷敭謂非允當且王昶以無用之物取利中華萌不軌之心僭稱大號盜乘輿之式度竊冠冕之威儀眩誘良家招收奇貨此而可恕孰不能容或貢讜言請從籍錄鄭元弻等相次上狀不愿迴歸亦可憫傷各令存卹其福州貢物私商宜準律處分官爵之班即分高下見謝之位豈有異同宜格通規以為定制今後宰臣使相朝見辭謝並於崇元門內與諸官重行異位一時列拜假開橫行即從舊例又入閣之儀序班為重宣喚則齊趨正殿放仗則各出朝門何起居之禮即同而進退之規有異其翰林學士及前任郡守等今後入閣退朝宜依百官班制邊藩都護三載一更古之制也嗣守世及則勞役不均朕俾全節代卿將授卿以重領何猶豫熒惑而有異圖近覽復州上言云東陵洄口官波三戍皆稱江下鳩集水軍大發樓櫓與卿應援又賈貞蔡進等咸以蠟書章表來投闕庭故旋命六將徵兵三萬如能轉圜從順朕亦待爾如初予之食言何以享國若其迷塗不返即聾從昧則夷宗覆族良可哀也故銀青光祿大夫檢校左散騎常侍兼御史大夫賈仁詔頃自內廷出為外職李金全愚冥而猜忌胡漢筠邪佞而貪殘竟罹塗地之殃誠堪嘆息爰示漏泉之澤用表褒崇必有貞魂欽茲茂典可贈右衞將軍故安州馬步軍副都指揮使桑干威和指揮使王萬金成彥溫等皆精武畧咸著軍功或列偏裨或嘗屯戍當姦臣之叛國或執節不從全烈士之徇名或銜冤而死實興永嘆宜示追崇或列部符或升環衞賁諸幽壤彰彼明誠干可贈峽州刺史萬金可贈左監門衞將軍彥溫可贈左千牛衞將軍朕自臨區夏每念生靈惡殺為心寶慈是務凡於獄訟常切哀矜況時漸興文民皆知禁宜伸輕典用緩峻刑今後竊盜贓滿五匹處死三匹以上決杖配流以盜論者依律文處分全晉奥區興王重鎮唐叔之英靈未泯臺駘之古廟猶存朕頃在并門長承陰助永言正直宜用封崇唐叔虞宜封興安王臺駘宜封昌寧公嶽鎮司方海瀆紀地載諸祀典咸福蒸民將保豐穰宜申虔敬俾加崇飾以奉神明其嶽鎮海瀆廟宇等宜令各修葺仍禁樵蘇朕自御寰區每思黎庶貴除聚歛以活疲羸訪聞遐僻邊境之州或無公廨利用之物每因節序亦備於貢輸輟官吏之俸錢率鄉國之人戶雖云奉上其奈害公今後冬至寒食端午天和節及諸色謝賀無屬州錢處俱不得進奉臣子之心務申勤敬國家之體自有規繩凡侯伯之來朝或君臣之相見豈煩貢奉方啟宴筵事既非宜理當改置臣下置宴今後宜停六典云中書舍人掌侍奉進奏參議表章凡詔旨制勅璽書策命皆案故事起草進畫既下則署而行之其禁有四一曰漏洩二曰稽緩三曰違失四曰忘誤所以重王命也古昔巳來典實斯在爰從近代別創新名今運屬興王事從師古俾仍舊貫以耀前規其翰林學士院公事宜並歸中書舍人王者行考績之文重為政之本若存功課自有旌酬或仗鉞守方著安民之術或剖符刺部彰恤物之仁凡著政聲悉聞朝聽邇者數州百姓舉留本部長官遂涉道途徑趨京闕皆陳善治並述公清或指使而方來或感激而自至勞煩行役妨廢耕耘言念苦辛倍深軫憫今後岳牧善政委倅貳官條件奏陳必當旌別勤勞審詳課最如不愆於名實固無恡於渥恩政刑所切獄訟惟先推窮須察於事情斷遣必遵於條法用宏欽恤以致和平應三京鄴都及諸道州府縣見禁諸色人等宜令逐處長吏常切提撕疾速決遣每務公當勿使滯淹唐室中圮賢臣挺生澟然英風迥冠千古不有典冊曷旌忠良唐梁國公狄仁傑稟五行正氣聳九諫直操鼎祚危而復安黔庶否而獲泰惠流河北名振寰中惟爾事君無愧臣節用光遺像式示明恩論道經邦著周官之貴位貞魂毅魄煥魏土之靈祠昭是寵嘉永光緹素可追贈太師仍令所司擇日備禮冊命朕自臨天下每念民閒御一衣思蠶績之勞對一食想耕耘之苦而況職官俸祿師旅資糧凡所贍供悉因黔庶得不救其疾苦憫彼災傷徵宿欠慮流離者不歸均殘租恐貧饑者漸困今春膏雨繼降農作方興宜示渥恩俾蘇疲瘵天福二年至四年夏秋租稅一切除放近年以來大河頻決漂盪人戶妨廢農桑言念蒸黎因茲凋敝凡居牧守皆委山河既巳在封巡所宜專切起今後宜令沿河廣晉開封府尹逐處觀察防禦使刺史等並兼河隄使名額任便差選職員分擘勾當有隄堰薄怯水勢衝注處豫先計度不得臨時失於防護張彥澤刳剔賓從誅剝生聚冤聲穢跡流聞四方章表繼來指陳甚切尚以曾施微功特示寬恩深懷曲法之慙貴循議勞之典其張彥澤宜削一階仍降爵一級其張式宜贈官張式父鐸弟守貞男希範並與除官仍於涇州賜錢十萬差人津置張式靈柩並骨肉歸鄉所有先收納卻張式家財物蓄並令卻還其涇州新歸業戶量與蠲減稅賦爾身為大臣家有老母忿不思難棄君與親吾因契丹而興基業爾因吾而致富貴吾不敢忘爾可忘耶且前代和親只為安邊今吾以天下臣之爾欲以一鎮抗之大小不等無自辱焉外官內官陳力實關於共理或出或處藉才難執於常規近覩朝臣偶除外任三年替罷之後再來擬官之時不計新職之勤勞唯循舊官之資歷比藉幹濟翻成滯淹宜別立於規繩貴各期於激勵宜今後應朝臣中有藉材特除外任者秩滿無遺闕將來擬官之時在外一任同在朝一任升進其就便自求外職及不是特達選任者不在此限周以杞宋封夏殷之後為二王後兼封舜之後為三恪唐以周隋之後封公又封魏之後為三恪夫應天開國恭已臨人宜覃繼絕之恩以廣延洪之道宜於唐朝宗屬中取一人封公世襲兼隋之酅公為二王後以周後介國公備三恪其主祀及赴大朝會委所司具典禮申奏其唐朝宗屬中舊在朝及諸道為官者各據資歷考限滿日循品秩序遷巳有出身任令參選勅聞訪諸道州府等昨以朝廷近有指揮搜羅官健震驚戶口騷動鄉原致彼編甿不思樂業結聚徒伴藏避山林其間亦有接便為非率意行劫事不獲已想非故心今既國步晏寧春事興作宜行告諭各便歸還但務耕農況無徭役切慮有無知之輩懼罪不歸須示條流冀令安靜限勅到後與量地里遠近與限各令復業巳前為非一切不問如限內不來者其物業許鄰近人請射承佃或有不聽招攜尚行偷劫者一聽居停及鄰人密來陳告便許占射賊人物業充賞如賊無物業即與逐處指揮每告一人即與賞錢二十貫文如至十人巳上更賜銀鞍轡馬一匹此外並依所告得人數支與賞錢仍據所願穩便處與補職安排委逐處長吏遍下管內令於山谷道口津渡如法粉壁曉諭仍不任差人四向專切招攜如是不能悛改尚務結集者委逐處差兵掩殺應諸道前任行軍副使等例從替罷久住京師每念滯淹嘗懷惻憫極欲疾速發遣穩便安排但以擬除一人須俟一闕授命者纔去得替者便來到闕既專望渥恩在任又須終月限循環不巳積滯轉多而況在京所費亦倍必想在外一年事力纔充在京數月支持比闕員多稱委困當別行於條貫期各守於規程起今前件官員等如得替後且就家私穩便安居限一年後方得赴闕朝廷當據職資便與比擬或非時有闕與就便安排自然公私得濟出處合宜有員闕以安排無歲時之停滯事關悠久情在優矜各委遵承勿得踰越其先得替在京者宜令中書據見有員闕處量才安排仍降勅諸道各令知委州縣之官俾其戢理錢穀之職委以秉持須選廉勤豈容薦託一時苟從於私徇久遠必紊於公方頃在唐朝曾有勅命貴杜僥倖之漸明懸誡約之條時異理同再宜申舉自今後中外臣寮或因差使出入並不得薦囑人於藩鎮希求事任如有犯者並準唐朝長興二年勅條處分仍付所司古之用兵必先立法等第既分於將領高卑自有於規繩或聞近年多踰此制至於行閒士卒罔遵都內指揮既侮國章且乖師律適當開創要整紀綱宜示條流免干法制應在京及諸道馬步諸軍將領節級長行等今後仰並依階次第凡事制禦區分如是長行或有違犯即副將便可據罪處理如是副將十將違犯即便勒本指揮使據罪科處指揮使違犯不出軍時即委都指揮使具錄事繇騰奏當行勘斷如是行營在外即便委行營統領依軍法施行其餘諸道軍都見在本處者或有違犯便委本處節級防禦團練使刺史據罪科處事要整齊法宜遵守分明告諭咸使聞知于鵬官居諫諍志在輔裨所閱貢陳咸關政化備詳端盡良切歎嘉宜陟階資以申酬奬其于鵬加朝散大夫朕以爰膺寶歷方啟金行既風教之誕敷諒寰區之漸泰而繇股肱元輔藩郡重臣咸著大功同為至治雖列地顯爵盡布新恩而追遠奉先猶虧舊典宜示襃功之寵俾袪風樹之悲自在朝文武百寮至見任刺史先代未封贈者據品秩與封贈巳封贈三代者與加封贈朕以削平禍亂開創基扃漸成銷偃之期永協興隆之運亦繇左右元輔中外勳臣弼予一人宅是四海茂績雖彰於王室覃恩未及於私門德盛母儀貴而因子禮優婦道榮必從夫宜加渙汗之恩顯示封崇之典其未敘封者據品秩與敘封巳敘封國號者與進封闢彼汙萊期於富庶方當開創正切施行往日雖曾指揮漸恐廢墮當再申於勸誘期共樂於豐穰宜令逐處長吏遍下管內應是荒田有主者一任本主開耕無主者一任百姓請射佃蒔三年內並不在收稅之限王者省方設教靡憚於勤勞養士撫民必從於宜便顧惟涼德肇啟丕圖常務去乎煩苛冀漸臻於富庶而念京城俶擾之後舟船焚之餘饋餉有虧支費殊闕將別謀於飛輓慮轉困於生靈以此疚心未嘗安席今以夷門重地梁苑雄藩水陸交通舟車必集爰資經度須議按巡寧免暫勞所期克濟宜取今月二十七日巡幸汴州諸道州府節度防禦團練使刺史不計遠近並不得輒離州城來赴朝覲文武兩班委宰臣酌量逐司量差官員隨所應奉公事外餘並留守司所在行宮一聽仍舊不得修葺經過量事通得車馬外方當農時不得勞役人戶修治沿路食頓並委所司破省錢物預前排備所在州縣並不得輒有科歛布告中外咸使聞知凡百臣寮宜體朕旨李遐改官鄭觀去世更差遣轉慮稽延宜令大理寺其合改正國號廟諱等文字如是不動格條不礙理義便可集本寺官員檢尋改正如或顯繫重輕須要商議別具奏聞其御史臺刑部所有法書合改正文字者亦宜準此王權素推華族方處重官覩四海之貢輸虛陳巧麗察五兵之器用枉飾珍奇不惟耗彼生靈實且傷於淳素爰陳章䟽將召和平宜允敷敭明示誡約自今後臣寮貢奉不得務其淫巧衣甲器械不得飾以金銀或委遵行勿得踰越仍付所司九五之尊億兆所賴法天敷化師古宣風宜循歷代之規以補前王之闕今據翰林志言立后不言立妃言儲君不言親王公主兼三師位在三公之上亦不在其閒起今後立妃及拜免三公宰相及命將封親王公主宜令並降制命餘從令式處分應諸道前資州縣令官等明庭選士歷代通規各係職司共將掄擬顯有去留之式明分真濫之源今者州縣前資官員悉於中書陳狀來事卻慮虛陳銓管永無常調之人並在鼎司難遏躁求之習去歲以國朝創業州縣闕官思廣渥恩是從優異今則彞倫攸敘庶政咸修宜舉規程俾無侵越其今日巳前在中書陳狀諸色人等見點簡引驗如不欠少出身歷任文書及無踰濫者旋具奏擬宜令今日後諸道前資州縣官等若是資考巳出選門及一任除官未入選門並一考前丁憂及活得冤獄者準元勅年限滿日許經中書陳狀當與勘事理施行此外須令並依前後勅格程限赴吏部參選或有公材出衆政績異常者臨時超擢不在此限自家刑國歷代明規祖德宗功前王至訓在君臣之尊則異在臣下之孝皆同凡有公田並立私廟自經多難不舉舊章今以應運開基體元布化不思奉巳專務安人高低推念祖之誠內外保貽孫之慶其內外官等準勅合與三代巳下封贈者並以見居官品數比擬冀使人臣之列不輕王父之尊永載編普示孝理
