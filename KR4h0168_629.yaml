front:
  text: 全唐文欽定全唐文卷六百二十九呂溫五
  hash: sha256:e93fadacf4851b778fdee283d5389f45d31777f2afebd0614ee49796ba56b98c
body:
  text: 我二后受成命撫興運軋坤軸撼乾樞鼓元氣而雷域中騰百川而雨天下雲收雨霽如再開闢蕩蕩焉與太極同功貞觀十七年太宗以功成理定秉為而不有之道讓德於祖考推勞於㣥臣念匡濟於艱難感風雲於疇昔思所以攄之無窮乃詔有司擬其形容圖畫於凌煙閣者二十有四人蓋象乎二十四氣之佐天昭勳德也昔者舜以九官致理周以十亂反正高皇以三傑祚漢光武以二十八將中興若夫錯綜勳賢牢籠今古雄四代而高視者其唯聖唐乎至若唐莒公劉渝公之倫探元符建帝圖首戴神堯舉晉陽而活天下此則大禹之拯溺也魏鄭公以致君為已任諫若不及謇謇左右秉心宣猷此則咎繇之颺言也虞永興糾合㣥儒旁求百代明備王禮克諧帝樂使我大國煥乎其有文章此則夷夔之制作也長孫趙公舉大義除二兇安宗廟定社稷以振我丕赫無疆之休此則周公之匡救也英衞受天勇智雄武佐聖鼓行海內麾定四方此則太公之鷹揚也房杜元機朗識並運帷幄神發響效謨成天功此則蕭何之指蹤子房之決勝也尉遲秦程剛毅木訥氣鎮三軍力崩大敵匹馬孤劍為王前驅此則吳漢之樸忠賈復之雄勇也其餘皆榱棟殊材黼黻異制儔諸古烈罔有慚德皇王之業於斯為盛其始也文為經武為緯智斯作忠斯述其末也大不偪小不遏退者全來者達控而縱之使自用之推而引之使自盡之不設籠檻以觀寥廓之致不頓韁鎖以極權奇之變執一德而眾力展懸大信而㣥情竭高祖取之以義太宗用之以道高宗終之以仁傳聖萬代享其功利此非盛歟昔陸機袁宏為晉人而歌功於漢魏作者猶或稱之况乎遊聖代觀國光目睨凌煙而頌聲不作某不揣賤劣有亹然之志輒盡所蓄各為讚一章上以見王業之艱難中以明聖賢之相須次以朗前哲之光韻末以聳後人之盛節侯君集張亮負勳跋扈自陷大逆敢沒其名用彰天罰使伐勞懷貳者懼春秋之義異姓為後故以河間元王為讚首云太極構天本由一氣大人創業資我族類堂堂河間仁勇是經遹駿有聲為唐宗英暴隋天亡㣥盜猖狂我伐用彰時維哲王武有烈光為爪翼肺腸經綸八方自南徂東晏海澄江平蕭銑輔公祏使父兄帝天下化家為邦用竭爾力寵臻其極言不伐色不德以遜以默柔嘉維則佐高祖建大勣如周旦奭與太宗守大成如漢間平宜君宜王盤石無疆梁公先覺龍臥待君長彗流光掃天布新義師雷興公躍其鱗杖策千里來謁帝閽婉婉梁公實懿實聰實光實融羽義翼忠若鸞若鴻大風動地儒服從容靜運胸中弛張折衝左右太宗夷屯廓蒙定高祖功功告武成翊開太平我雖忘勞時靡有爭網羅遺賢推轂㣥英玉不韜輝蘭無沈馨飛鴻出溟振鷺在庭濟濟多士太宗以寧太宗寧矣公無事矣闕衮有補惟仲山甫經營四方方叔召虎大邦鈞軸至則委汝閒居台輔撝默自處亦莫敢予侮高朗令終嗚呼梁公穆穆萊公奇資粹靈蘊元和氣為大國楨乘時恢能唐室大開故人相攜少與房梁公同有匡濟之志也直上泰階更為陰陽迭作日月佐明四海贊育萬物王度是欽如玉如金德音愔愔萬有千古永稱房杜如周申甫堂堂魏公崇節大志喬幹直聳摩天自致遭風雲時得霸王器一言委質有死無二撫我則后各盡其志嘗事李密隱太子沈浮變通吾道不窮龍戰既息皇建其極俾補衮職其繩則直諤諤嶷嶷危言正色保太宗德弼違替否日月不蝕黜漢霸雜行周王道人或有言秉德不撓與封德彞廷論禮興樂崇德洽道豐保合太和昭明有融起四年中復三代風言出化成神哉厥功伊躬佐商有恥於湯公以其志匡飭聖唐為唐宗臣致唐無疆致唐無疆永式萬邦趙國之先發祥朔土乃祖乃父受天之祜有女而聖文德皇后為天下母有子而賢為唐室輔聖賢同氣千載一覩丕顯趙公允文允武克忠克仁實有大勳高祖受命太宗歸尊翼翼乾乾恪居於藩㣥孼亂嗣爭窺神器鴻業將墜公揭大義一匡天地人到於今家受其賜帝將傳聖爰有顧命汝忠汝誠莫與汝京為我聖子守唐太平公相高宗有太宗遺風刑措財豐八荒來同和氣大融妖星襲月禍起中宮公將正之以王帝躬武氏謀位公以力爭力屈㣥邪誠阻天聰黜非其尤令問無窮歲寒陰凝冰雪皚皚有鳥擇木先陽春來猗歟莒公王佐之材間運未開登潛龍臺代萬姓請命與天為媒扶龍而興振起雲雷權輿帝圖經始唐基始覆一簣勃焉巍巍易失者時難知惟幾知幾其神莒公元勳河出崐崘來潤中夏連山合沓橫擁其派巨靈勃然手擘太華決流東注功平造化粵我聖唐將舉晉陽帝命是將往拯溺於四方亦既載旆亦既秉鉞強兇當路拒不得發渝公慷慨感義激節用奇制變大事立決雷奮霆越天衢八達則莫我敢遏如巨靈破山河勢始豁赫矣渝公與神齊烈跡如仙掌炯炯不滅有隋之末㣥盜熾爇帝怒震發五星從太白煥照參野將有聖人兵定天下金精下射猛毅感激李公矯矯從此奮跡躍於中原王者則獲壯士不死初公不利於我帝戮之壯其言而免壯士公自稱唐威載赫帝曰汝傑致天之罰手付金鉞俾往式遏不庭則殺如飆發發如火烈烈摧枯爍雪應鼓如截遠若荊巫險若江湖強若匈奴莫不率從莫不震恭車書混同氛祲蕩空衞侯之功功則維何威明惠和策勇駕智長驅仁義仁義曠蕩帝王之將萬古曷瞻鐵山巉巉橫流莫極大亂無象英公傑出應運為將為楚楚霸為漢漢王天時人事隨我所向長蛇縱蠚王世充東據河洛婪婪封豕來濟同惡號吼連聲如雷如霆萬里震驚時維英公亮我太宗斬豕以鉞取蛇於穴㣥穢殄滅乃定九鼎乃開明堂奄有大邦金甲同光告成於王太宗獻捷於高祖與勣俱擐金甲為上下將皇業用昌帝命英公北伐獫狁雷鼓殷殷旄頭幾殞掃雪黑山布唐陽春五原草綠不見南牧島夷未庭天子親征其鋒維英莫拒莫抗是震是蕩破東海浪天下既和解鞍投戈衮服委蛇華髮皤皤終始三朝無玷可磨夔公崢嶸金虎之精應時而生與運俱行總帝元戎震唐天聲瞪目張膽前無金城別建龍節中分虎旅啟行萬里乘氣一鼓劍揮雷霆旆卷風雨先馳咸陽鎮定天府天府既定唐集大命入揚王庭出權兵柄薄伐獫狁朔風不競徂征島夷東海如鏡義始忠卒元勳之盛泰山未明雲鬱幽崖日觀赫開舒為丹霞昔我太原賢傑潛屯帝出於震爛其盈門邳公炳焉實耀其間功參造物謀協先天執殳前驅捧轂南轅以勞以舊佐命之元英英永興華德素行以文富國以道佐命天下既定為唐儒宗東觀石渠始生古風秉精繹思假道書圃驅馳百代出入三古問羲皇心聽堯舜語歸來帝側獻可替否帝告永興與鴻碩之倫闡六籍三墳建樂章禮文先師是宗於廓辟雍辟雍沈沈天子所臨或弦或歌講古述今其從八千纓弁森森獩貊羌髳咸詠德音羽林孤兒亦垂青衿洋洋聲教無遠不暨日月所臨皆成文字鬱開古始掃蕩澆季實我㣥儒成太宗之志英英永興宜曰文懿公諡洸洸鄂公百鍊龍泉沈鬱未宣氣衝斗間佩非其人初事宋金剛躍入大川神武獲焉提之上天天地之內指麾無前熊威虎力隱若敵國剛毅木訥安劉必勃武德之屯手拔禍根掃除氛昏捧出日月耀於天門功成名遂高謝戎事烈烈猛志化為和氣深地高堂頤性保常屑瓊飲露靜奏清商商為臣勵事君鄂公之德之勳貞觀後公不交人事常鍊氣服食奏清商樂以自娛隋氏不君忠賢莫用桐生朝陽有集惟鳳捨彼頹廈鬱為新棟路車元衮開國有宋武德之暮㣥孼內蠧巍巍宋公聳節高步不吐不茹不來不去屹屼中立為天一柱從容而言社稷遂安持誠秉忠光輔二君激濁揚清欲人如身道至廣莫我敢㣥境至大不容纖塵雪山倚空冰壑照人耿介絕倫為唐貞臣有倬郯公仡仡而貞洸洸而仁實太宗信臣太宗守藩內難未夷圖之則安捨之則危帝臨安危幾以懼以疑以蓍為先知是筮是咨郯公嶷然排闥折蓍抗憤正詞用人事定天意身為元龜不知不識順帝之則以定社稷郯公之力公之云亡帝念其勤若痛在身天懷發中哭不避辰君臣之間敻古未聞五運相推土火革期隋化為唐忠臣不知猶驅義徒奮拒王師指心誓天摩頸待時人歸有德四海皆叛春日滿川孤冰未泮亡家徇國方寸不亂力屈勢窮排空落翰東南慟哭聲盡魂斷杖忠就擒萬國瞻漢帝曰爾通古之烈士孝於其親誰不欲子俾侯於蔣授以師紀感恩不死宣力如彼佐唐扶隋名教之美維嶽降神佐唐生申忠貞自天孝友如春德為邦基仁厚人倫肅肅雍雍真王者臣慶因歸妹光延天配文德皇后公之同出也婚媾之中雲龍潛會建功南海廓我無外涼武撥亂弼文開泰遏彼庸蜀薦鍾澆季文翁之化若掃於地申公攸徂有教無類父子兄弟望風相愧勃興儒雅大復禮義西南頌聲到今不墜名登元勳理冠㣥吏全材大器於爍厥懿溫溫殷公初若懦夫銅印試吏襃衣為儒大風驅雲忽與之俱遭逢真宰參造化謨天地既闢厥功有赫從王龔行佐帝光宅遠展驥足高揮鳳翮以永終譽垂於竹帛洛汭之役龍戰未決我師與王世充陣於九曲秦公應變臨陣電拔銳氣盡來我盈彼竭成敗反掌存亡奄忽虎來風壯鼇轉山沒遂作心膂爰從討伐崩圍陷陣火迸冰裂翕如鶚聳縱若鯨突功成國定萬古壯骨盧公倬然動軼幾先轉禍為福與秦胡公降於九曲攀龍上天繽翻鵬翼積風乃聳桓桓將軍大敵則勇雷崩山谷貔虎頓伏飆倒溟波鯨鯢蹉跎見危而進當死不讓干城三朝身老氣壯襃公虎臣先運而臻謁帝太原許唐以身擁劍駕氣騰風躍雲積忠累仁光有厥勳建旄北伐細柳宵屯風謐霜凝嚴扃達晨天子之使駐車軍門安眾秉威此真將軍洸洸桓桓克壯有聞㣥動相食血流中原譙公夷陵豺虎為鄰列境連城火炎烟昏皎其一邦如玉不焚三光忽開萬象皆新誰有天下平生故人公與高祖有舊引忠歸誠豹變蠖伸金石之契移為君臣奕奕煌煌為龍為光元戎啟行大旆央央式遏大江奄征南方恩斯勤斯兩不可忘梁公以武氏篡盜國命如綴翊安宗社非我而誰是用蒙大恥履大險聳節振美以持世心閑高祖天下於方寸之地盜力雖盛莫之敢闚唐復為唐繄公是賴後代昧者頗歸功於五臣殊不知五臣之功公所授也客有以李北海所傳示予者述盧陵王廢立之際見公如生貽諸將來可以不惑敢攄憤而讚之詞曰於休梁公社稷之臣濡跡應變與唐屈伸妖虹橫天鳴牝專晨獨立大道指南生人闔闢有期命先我時乃建國本代天張機取日虞淵洗光咸池潛授五龍夾之以飛臨終指麾皇業再基運起身後功成不知穆若清風嶷然宏規凡為臣者可不度思天厭鼎峙蜀滅魏改錫晉羊公以同四海儒衣登壇嶽鎮荊蠻十萬之眾從公而閑逍遙峴陽傲視勍敵用仁為間出入無跡吳國雖守吳心已降吞於胸中不見大江勤物忘已樂天知命留功遺人國愈身病江漢舊域德膏潛蒸化行兵中兵息化興策雖平吳道不相晉永嘉南遷豈曰泯泯藥師如來像者予妻蘭陵蕭氏之所繡也貞元二十年予奉德宗皇帝之命西使吐蕃辤高堂而出萬死介單車而馳不測國故遽至戎情猜閉坎險一遇星霜再周夫人盥饋之餘膏鉛不御日亂蓬首坐銷蕣華異域無期良時自晚始怨冬釭之久而紅芳巳闌方苦夏景之長而碧樹將落書委塵篋跡淪苔階漸昧音容孰知存沒黷龜不告因夢難徵觸慮成端沿情多緒黃昏望絕見偶語而生疑清旭意新聞疾行而誤喜循環何極刻舟靡尋浩隔理求窅非計得如聞西方有金界極樂藥師大雄散琉璃之寶光照河沙之國土能度㣥品出諸幽厄一念必應萬感皆通是用濬發慧根妙求真相斷鳴機躬織之素染懿筐手績之絲盡瘁莊嚴彰施綵繡纏苦心於香縷注精意於鍼鋒指下而露洗青蓮思盡而雲開白日然後練時潔室華設珍供夕炬傳照晨爐續煙齊獻至誠泣敷懇願遂得慈舟密濟覺路潛引當道場發念之日是荒裔來歸之辰幽贊冥符一何昭焯乃知織迴文之錦無補離憂登望歸之臺空為廢日與夫心諧妙理手結勝因進則有濟度之功退不離清淨為本從長擇善豈同日而言哉予感其志效爰用贊敘雖在妻子亦無愧詞藏諸閨門永以傳信讚曰地萬理兮天一極往無由兮來不得解脫願兮慈悲力五色繡兮黃金飾澄氛昏兮圓相開湛水月兮蓮花臺慈眼睠兮獷心迴死別離兮生歸來海為田兮劫為灰身念念兮無窮哉中書令始興文獻公有唐之鯁亮臣也開元二十年後元宗春秋高矣以太平自致頗易天下綜覈稍怠推納寖廣君子小人摩肩於朝直聲遂寢邪氣始勝中興之業衰焉公於是以生人為身社稷自任抗危言而無所避秉大節而不可奪小必諫大必諍攀帝檻歷天階犯雷霆之威不霽不止日月之蝕為公却明虎而冠者不敢猛視㣥賢倚賴天下仰息凜乎千載之望矣不虞天將啟幽薊之禍俾姦臣負乘以速致戎詐成讒勝聖不能保褫我公衮寘於侯服身雖遠而諫愈切道既塞而誠彌堅憂而不怨終老南國於戲功業見乎變而其變有二在否則通在泰則窮開元初天子新出艱難久憤荒政樂與㣥下勵精致理於是乎有否極之變姚宋坐而乘之舉為時要動中上急天光照身宇宙在手勢若舟檝相得當洪流而鼓迅風崇朝萬里不足怪也開元末天子倦於勤而安其安高視穆清霈然大滿於是乎有泰極之變荊州起而扶之舉為時害動咈上欲日與讒黨抗衡於交㦸之中勢若微陽戰陰衝密雲而吐丹氣歘耀而滅又何難乎所痛者逢一時事一聖踐其跡執其柄而有可有不可有成有不成况乎差池草茅沈落光耀者復何言哉復何言哉曹溪沙門靈澈雖脫離世務而猶好正直得其圖像因以示予覩而感之乃作讚曰唐有棟臣往矣其邈世傳遺像以覺後學德容恢異天骨峻擢波澄東溟日照太嶽具瞻崇崇起敬起忠貌與神會凜然生風氣蘊逆鱗色形匪躬當時曲直如在胸中鯤鱗初脫激海以化羊角中頹摩天而下無喜無慍亦如此畫嗚呼為臣儆爾夙夜
