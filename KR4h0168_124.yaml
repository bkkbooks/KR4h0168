front:
  text: 全唐文欽定全唐文卷一百二十四周太祖三
  hash: sha256:c32cb4a68727cbf4c2442bb572e2abd1eb024601abc40f1d5aa9164c16b1ce2f
body:
  text: 敕青州在城及諸縣鎮鄉村人戶等朕臨御巳來安民是切務除疾苦俾遂蘇舒據知州閣門使張凝近奏陳八事於人不便積久相承宜降指揮並從改正其一屬州營田後槽兩務所管課利斛斗錢物人戶牛具屯官等宜並割屬州縣官舊額稅課其務及職員並廢其課額內有紅花紫草菜靛麻等據時估納錢折絲絹亦不得其係官桑土牛具什物並賜見佃人為永業其城郭內宅舍房店奏取進止其秋夏納稅匹段不成端匹者許人戶合端匹不得以零尺納錢其匹並須本色不得邀納價錢改換色目如省司品配不在此限其二省司元納夏秋稅匹段每匹納十錢每貫七錢絲綿細線每十兩納耗半兩糧食每石納耗一斗八錢蒿草每十束耗一束錢五分鞋每兩一錢此外別無配率今後青州所管州縣並依省司則例供輸如違罪無輕恕其三劉銖在任時於苗畝上每畝徵車腳錢每頃配柴炭今後並止絶其四州司每年配和買稈草及苫營草今後並止絶如有關三司指揮其五所徵食鹽錢每貫別納腳錢今後止絶其六別徵進奏院糧課錢及遞鋪錢鞋分配縣鎮今後並止絶要即於州司公用錢內支遣其七州司配徵啖馬藥及汛配藥又縣鎮科配石炭紅花紫草今後並止絶不得配率又州司於夏苗上配納麥麥丏今後據州合用多少量於近縣配納不得遍據諸縣其八舊例州縣供納夏秋租稅皆畢須追人吏到州勘會此後止絶稅無缺少不得追集縣吏巳前事件巳降宣命處分其屬郡淄登萊等州如有前項舊弊亦依青州例施行麟州刺史楊仲訓及軍州將吏職員等據夏州節度使李彞殷奏得汝等狀稱劉崇拒命聖朝堅其逆壘今被部族侵迫乞垂救解兼巳稱大朝正朔并門逆命邊郡無歸值妖孽之脅從致朝貢之阻絶今則蕃部兵民助我討違汝等哀告蕃鄰欲謀歸向備覩變通之意特用宏納之仁宜示撫安用奬忠順巳指揮州府及諸蕃部不令進攻汝等便宜明宣朝旨告諭軍民應是通河東道路口岸畫時遣人守禦不得通人來往凡有公事一一奏取朝廷指揮其官員將校職掌一切依舊仍分析名銜申奏當議等第加恩兼之酬賞朕以時當化育氣屬炎蒸乃思縲絏之人是軫哀矜之念慮其非所案鞫淹延或枉濫窮屈而未得伸宣或飢渴疾病而無所控告以罪當刑者唯彼自召法不可移非理受苦者為上不明安得無慮欽恤之道夙宵靡寧應諸道州府見繫罪人宜令官吏疾速推鞫據經遣斷不得淹滯仍令獄吏灑掃牢獄常令虛歇滌洗枷械無令蚤虱供給水漿無令飢渴如有疾患令其家人看承囚人無主官差醫工診候勿致病亡循典法之成規順長嬴之時令俾無淹滯以致和平賦稅婚田比來州縣之職盜賊煙火元係巡鎮之司各有區分不相踰越或侵職分是紊規繩切慮所在職員尚循舊弊須行條貫以正紀綱京兆鳳翔府同華邠鄜耀等州所管州縣軍鎮頃因唐末藩鎮殊風久歷歲時未能釐革政途不一何以教民其婚田爭訟賦稅丁徭合是令佐之職其擒奸捕盜庇護部民合是軍鎮警察之職今後各守職分專切提撕如所職疏遺各行按責其州府不得差監徵軍將下縣庶期靜辦無使煩勞辰象元遠罕克精研術數幽深驟難窮究則有閭閻之內小祝之流粗學陰陽務求衣食妄談休咎以誑民氓比設律條止茲誕妄久疏法網是啓妖訛自今後元象品物天文圖書讖記七曜歷太一雷公式法等私家不合有及衷私傳習見有者並須焚毀司天臺翰林院本司職員不得以前件所禁文書出外借人傳寫其諸時日五行占筮之書不得禁限其年歷日須候本司算造奏定方得雕印所司不得衷私示外如違準律科斷遍下諸道州府各令告示國家開仕進之路設儒學之科較業掄才登賢舉俊其或藝能素淺履行無聞來造科場要求僥幸及當試落便起怨嗟謗議沸騰是非蜂起至有僞造制敕之語扇惑儕流巧為誣毀之言隱藏名姓以茲取事得非薄徒宜立憲章以示澄汰其禮部貢院條奏宜依仍於引試之時精詳考校逐場去留無藝者雖應年深不得饒僭場數若有藝者雖當黜落並許訴陳祗不得於街市省門故為喧競及投無名文字訕毀主司如有故違必行嚴斷本司鎖宿後御史臺開封府所差守當人專切覺察其有不自苦辛祗憑勢援潛求薦託俯拾科名致使孤寒滯於進取起今後主司不得受薦託書題如有書題密具姓名聞奏其舉人不得就試今後舉人須取本鄉貫文解若鄉貫阻隔祗許兩京給解天下縣邑素有等差歷年月以既深或增損之不一其中有戶口雖衆地望則卑地望雖高而戶口至少每至調集不便銓衡及有久歷官途却授隘狹之縣才升仕進便臨繁庶之民宜立成規庶叶公共應天下縣除赤縣畿縣次赤次畿外其餘三千戶巳上為望縣二千戶巳上為緊縣一千戶巳上為上縣五百戶巳上為中縣不滿五百戶為中下縣選人資敘合入下縣者今許入中下縣宜令所司據今年天下縣戶口數定望緊上中下次第聞奏趙鳳驟承委寄合稟憲章臨民不力於撫綏率性但聞於凶暴沿淮巡寇當年之殘忍難名近郡頒條在任之貪虐尤甚奪部民之妻女率州戶之資財招納賊徒騷擾生聚爾不奉法國有常刑其趙鳳宜削奪在身官爵賜自盡自古受命之君興邦建統莫不上符天意下順人心是以夏德既衰爰啓有商之祚炎風不競肇開皇魏之基朕早事前朝久居重位受遺輔政敢忘伊霍之忠仗鉞臨戎復委韓彭之任匪躬盡瘁焦思勞心討叛渙於河潼張聲援於岐雍竟平大憝粗立微勞才旋斾於關西尋統兵於河北訓齊師旅固護邊陲只將身許國家不以賊遺君父外憂少息內患俄生羣小連謀大臣遇害棟梁既壞社稷將傾朕方在藩維亦遭才搆逃一生於萬死徑赴闕庭梟四罪於九衢幸安區宇將延漢祚擇立劉宗徵命巳行軍情忽變朕以衆庶所迫逃避無繇扶擁至京尊戴為主重以中外勸進方嶽推崇黽勉雖順於羣心臨御實慙於涼德改元建號祗率於舊章革故鼎新宜覃於霈澤朕本姬室之遠裔虢叔之後昆積慶纍功格天光表盛德既延於百世大命復集於眇躬今建國宜以大周為號改乾祐四年為廣順元年自正月五日昧爽巳前應天下見禁人等罪無輕重巳發覺未發覺巳結正未結正常赦所不原者咸赦除之故漢樞密使楊邠侍衛都指揮使史宏肇三司使王章等以勞定國盡節致君千載逢時一旦同命悲感行路憤結重泉雖尋雪於沈冤宜更申於渥澤並可加等追贈備禮歸葬喪事官給仍訪子孫敘用其餘同遭枉害者亦與追贈馬步諸軍將士等勠力協誠輸忠效義先則戡平內難後乃推戴朕躬言念勳勞所宜旌賞其員僚將士等各與等第超加恩命仍賜功臣名號巳有功臣名號者別與改賜應左降官量加敘録亡官失爵之人宜與齒用配流徒役人並許放還巳歿者任從歸葬所有杜仲威李守貞王景崇趙思綰賓幕元隨親戚及諸色人先因懼罪至今逃匿者並可放還任自取便昨者犯罪人蘇逢吉劉銖閻晉卿李業後贊聶文進郭允明及同時犯罪人等家族骨肉先巳釋罪疏放其逐人所有親戚及門客元隨職掌在諸處者切慮尚抱憂疑今並釋放所在不得更有恐動內有手下先管莊田錢穀人等巳下三司點磨勘了日一任逐便諸處有犯罪逃亡之人及山林草寇等咸許自新一切不問各還鄉里自務營生仍仰所在切加安恤所繇節級不得衷私妄有恐動如赦到後一月不歸本業者復罪如初內外文武臣僚致仕官諸軍將校隨使職員及前任藩侯郡守文武朝列前內諸司使副使前禁軍指揮使前資行軍副使等各與等第加恩應見任文武臣僚內諸司使諸道行軍副使藩方馬步軍都指揮使如父母在未有恩澤者即與恩澤如亡歿未曾追封贈者亦與封贈巳封贈者更與封贈晉漢以來兵革屢動賦役煩併黎庶瘡痍鰥寡孤惸不能自濟為人父母曾不閔傷應天下州縣所缺乾祐元年二年巳前夏秋殘稅及派徵物色并三年夏稅諸色殘缺並與除放所有澶州巳來大軍經過之時沿路人戶恐有蹂踐兩邊共二十里并乾祐三年殘缺秋稅並放應河北沿邊州縣自去年九月後來曾經契丹蹂踐處其人戶應缺乾祐三年終巳前積年殘缺諸色稅物並與除放仍委逐處長吏倍加存撫至於防守邊塞優恤疲羸利害之事各宜條奏自前或有拒扞契丹顯立功勞及將吏之中有歿於王事者具名以聞當議酬奬應係三司主持錢穀敗闕場院官取乾祐元年終巳前徵納外纍經較科灼然無抵當者委三司分析聞奏別候指揮秋夏徵科舊有規制如聞諸道州府別立近限催驅或緣逼䠞過深轉致供輸不易至使蠶欲老而求絲債禾未熟而取穀錢但無逋懸何須急暴應天下百姓納稅租並取省限內納畢不任促限徵督如是軍期急速即不拘此例訪聞諸處人戶逃移在外者自前省司雖纍行招攜多未歸復兼知逃戶稅賦攤配居人公私之閒未甚允當念其疾苦常軫於懷宜令所司商量別行條貫庶使逃移者即歸鄉土見居者漸遂舒蘇免困生靈以副勤恤藩侯郡守寄任非輕立政之先養民為本每及徵賦尤要徇公其逐處倉場庫務宜令節度使刺史專切鈐轄掌納官吏一依省條指揮不得別納斗餘稱耗舊來所進羡餘物色今後一切停罷朕早在藩鎮嘗戒奢華今御寰區尤思節儉況國家多事帑藏甚虛將緩憂勞所宜省約應乘輿服御之物不得過為華飾宮闈器用並從朴素太官常膳一切減損諸道所有進奉皆助軍國支費其珍巧纖華及奇禽異獸鷹犬之類不得輒有貢獻諸無用之物不急之務並宜停罷帝王之道德化為先崇飾虛名朕所不取苟致治之未洽雖多瑞以奚為今後諸道所有祥瑞不得輒有奏獻古者用刑本期止辟今茲作法義切禁非蓋承弊之時非猛則姦凶難制及知勸之後在寬則典憲得宜相時而行庶臻中道今後應犯盜贓及和姦者並依晉天福元年巳前條制施行應諸犯罪人等除反逆罪外其餘罪並不得籍沒家産誅及骨肉一依格令處分天下諸侯皆有親校自可慎擇委任必當克效參裨朝廷選差理或未當宜矯前失庶協通規其先於在京諸司差軍將充諸州郡元從都押牙孔目官內知客等並可停廢仍勒却還舊處職役設官分職具列司存離局侵權誠為撓紊今後諸司公事並須各歸局分不得越次施行朝廷之務顯有舊章職官具存安可廢墜如聞自前諸司公事多有壅滯今後並可速疾舉行國之大事在祀為先苟爽吉蠲深為瀆慢如聞自前祠祭牢饌頗虧肅敬今後委監察御史嚴加覺察必須豐潔庶達精誠稍或不恭國有常典近代帝王所在陵寢合禁樵採俾奉神靈唐莊宗晉高祖各置守陵十戶以近陵人戶充漢高祖皇帝陵署職員及守陵宮人時月薦饗並守陵人戶等一切如故仍以晉漢之裔為二王後委中書門下處分自古聖帝明王莫不好賢納諫是以立誹謗之木采芻蕘之言時之利病罔不知政之得失無不察達聰明目其在茲乎應內外文武臣寮有見識灼然益於治道者許非時上章聞達山林草澤之閒懷才抱器之士切在搜訪免致遺賢孝子順孫義夫節婦所宜旌表以勵時風於戲致理保邦非德教無以安萬國發號施令非誠信無以示四方其或言出行違朝行暮改是為秕政何以子民更賴棟梁羽翼之臣左右前後之士共扶寡昧同致雍熙思置器以永安覩覆車之可戒納隍馭朽豫豈忘諸釐革有所未盡者有司具啓請以聞在昔哲王承天育物莫不內修庶政外撫諸侯推誠以待人人皆自信虛巳以馭下下無弗從是以車書大同革兵不試動植遂和平之性蒸黎絶愁嘆之聲朕以眇躬猥承大統側微自效嘗從軍旅之中億兆所推獲託王公之上涉道斯淺於德未章致其毒螫之凶為我生靈之患逆賊慕容彥超輿臺賤類闒茸微人歷郡牧而至藩侯扇貪風而彰惡迹洎豫臨馭無閒綏懷而乃顛越不恭姦邪是恣北則結連戎虜南則臣事淮夷每與劉崇潛通人使剖割萬姓傷殘乃杼軸其空盜橫一州嚴酷如爐炭之上招呼亡命剽劫鄰封繕甲治兵深溝高壘既顯悖違之狀須興討伐之師朕昨暫御戎車來巡軍寨覩貔貅之賈勇憤蛇豕以為妖咸請先登不容假息士怒未泄逆壘俄平盜泉巳涸其源流惡草盡除其滋蔓班師振旅六軍方樂於凱旋蕩穢滌瑕一境宜覃於霈澤可赦兗州管內取五月二十七日見禁罪人及未發覺者大辟以下並赦除元凶流毒同黨濟姦國有常刑皆合顯戮特示好生之道猥寬連坐之誅應曾與慕容彥超同惡之人逃避潛藏者並與釋放仰於所在自出陳首百日不首者獲罪如初應巳伏誅逆黨人等於諸處有骨肉者先巳指揮放罪招安尚慮本身抵法之後却有驚疑宜令所在州縣明行告諭並釋放不問兗州城內幕職及州縣官吏軍府將校令並放罪其衙前州使兩院職役人本城軍都並敕仍舊自慕容彥超違背巳來鄉州山寨豪強人等接便為非却掠虜殺今因收復並與洗滌一切不問外諸軍將士等勇於為主奮不顧身所有沒於王事者各等第給布絹仍以本人半分衣糧與本家一年有親子者官中並與收録安排自軍使都頭以上皆與贈官職賊據一城民殘四境或撤毀其牆屋或蹂躪其田疇概於徵取供軍點集應役並宜矜恤俾漸蘇舒應兗州城內所有徵取今年屋稅及蠶食鹽鐵諸雜稅物並與除放城外官軍下寨處四面去州城五里內所毀今年夏稅苗子蠶食鹽鐵並諸雜沿徵錢物並與除放五里外十里內除放今年夏苗子三分中減放一分并兗州城內百姓被慕容彥超閉門巳來無辜殺害者宜令本州存恤其家其被殺官員宜令本州官具録奏聞當行恩澤所有被毀拆却舍屋極多及收城之時延火燒爇官中給賜材木重令蓋造攻取城池須資力役既臨矢石或致喪亡致人歿身在朕深念諸州差別人夫內有遭矢石身死者宜令逐州縣分析姓名聞奏官中各給絹三匹以省庫物充仍放下三年諸雜差遣勒本縣給與文帖其部領人夫州縣官等到城下施功者據勞役日月等第加減選萊蕪監所抽點到諸縣義軍巳各指揮放散今後更不得管係名額其權充都將節級者亦不得此後於鄉村內更有稱呼於戲夏為長嬴勞軍民以從役聖職教化用干戈而翦凶惟豫不明增愧於是尚賴穹旻之祐漸期寰海之安告爾魯人咸體茲意王者以禮御人倫以樂和天地以兵柔萬國以刑齊兆民四者何先殊途同治或因或革各適所宜故五帝殊時不相襲禮三王異世不相沿樂兵有務戰不戰之異刑有輕次重次之差歷朝張弛繁不具引自唐祖混一函夏太宗嗣成聖功言其禮則三正有常言其樂則七宗有秩兵息而臣道咸順刑措而民心不渝五帝三王不足尚也越自天寶之後國經混然禮樂湮墜而衆不知兵刑煩擾而下不畏朱梁晉漢皆用因仍洎我朝開創以來力務興振然薰歇燼滅歷年滋多焦思勞神觀效未著豫欲父慈子孝兄友弟恭君仁臣忠夫義婦聽聲明文物無其缺祝嘏辭說必有序萬儀咸秩百神受職家肥國肥知禮之尊也當用何理副茲虛懷豫欲六律六呂七政九變金石絲竹之器羽旄干戚之容歌其政舞其德與夫文音武坐比崇昔時天和地平知樂之崇也子當深辨其理為時陳之豫欲混同天下親征未服手振金鼓跋履山川如商高宗之伐鬼方若魏武帝之登柳塞則六師所至供億無窮衆興民勞自古皆慎若但任偏將屯於邊鄙縱兵時入茹食居人交尸塞路暴骨盈野終歲如是得無憫然何以令佳兵不具彼魁革面王塗無所圯隔方貢自來駿奔更思爾謀以逮明略豫欲斧鉞不用刀鋸不興桎梏朽蠧無所設施無城舂鬼薪之役無三居五宅之流畫衣冠而不犯虛囹圄而不入措刑之理何以致諸子大夫博義洽聞窮微覩奧提筆既干於奇遇撞鐘必應於嘉音抱屈將伸直言勿隱昨為兵士擁至河上言京中誅史宏肇等盡非聖意請陛下密詔內班擒縛李業等送至澶州詔諭兵士臣即却歸鄴中一則雪將相之深冤一則安陛下之家國臣發迹寒賤遭遇聖朝既富且貴實過平生之望唯思報國敢有他圖今奉詔命忽令郭崇等殺臣即時俟死而諸軍不肯行刑逼臣赴闕令臣請罪上前仍言致有此事必是陛下左右譖臣耳今鸗脫至此天假其便得伸臣心三五日當及闕朝陛下若以臣有欺天之罪臣豈敢惜死若實有譖臣者乞陛下縛送軍前以快三軍之意則臣雖死無恨今託鸗脫附奏以聞昨者左右熒惑輿駕蒼皇歸闕師徒未免驚動帝王出令其位難虛軍國事多早宜冊立嗣君以係人望伏請太后行教令指揮臣事先帝過承君父之恩及奉嗣君願竭腹心之效豈期禍難事與願違方擇當璧之賢又爽大橫之兆永言膝下何慰慈顏望太后以宗子待微臣臣敢不奉宗廟如本朝事太后為慈母悃之至祈戀增深昨以鞏廷美楊溫等不認朝旨妄蓄疑心纍令招攜明示誠信雖有章奏尚未開門既無果決之心必是疑君之計今以指揮王彥超排比大軍攻討汝等若能誅斬元惡應接官軍上城者若是將校員寮只與超拜官資兼授刺史百姓即給厚賞穩便安排但收此絹書以為憑信朕在澶州之時軍情推戴之際先差來直省李光美備見必想具言而況遐邇所聞在後盡當知悉湘陰公比在宋州駐泊見令般取赴京但勿憂疑必令得所唯公在彼固請安心若能同力扶持別無顧慮即當便封王爵永鎮北門鐵丹書必無愛惜其諸情素並令來人口宣汝澶淵倅職之時值漢室釁生之際潛齎密旨將陷朕躬神明不祐於包藏機事尋當於發露汝稟勳賢之指使效奔走之勤勞徑自河壖報於鄴下忠孝之規迥著旌酬之道未宏每慊朕懷仍宣公論宜膺列郡用賞前功今授汝博州刺史昨以慕容彥超違負國朝閉據城壘尚稽顯戮未快羣情方屬炎蒸正勞師旅朕恭臨萬國深居九重處宮闕之清虛雖然遂性念將士之勤苦寧免疚心暫自省巡往申慰撫況非遠路不至甚勞凡我臣寮當體茲意朕取五月五日進發離京赴兗州城下慰勞行營將士沿路側近節度防禦團練使刺史不得離本州府來赴朝覲其隨駕一行供頓並取係省錢物準備差使臣勾當仍預告報一路州縣並不得別有排比其隨從臣寮內外諸司官中巳有供給州縣亦不得別有破費祗供其要載動用什物車乘亦巳指揮備辦如闕少之時候見宣命即行供應只不得預前排比如衷私有人小小取索並不得應付或軍都及諸色人於路途店肆買所須什物先還價錢兩京留守百官只於遞中附表起居時熱不用差官至行在所沿路指揮事件車駕回日亦依此施行王者應運開基子民育物罔不承天事地尊祖敬宗燔柴於泰壇用昭乾德瘞玉於方澤以答坤靈朕受命上元宅心下土時巳歷於三載漸至小康禮未展於二儀深虧大典夙宵愧畏不敢遑寧宜叶蓍龜式陳籩豆庶展吉蠲之禮用傾昭事之誠朕以來年正月一日於東京有事於南郊宜令所司各備儀注務從省約無致勞煩凡有供需并用官物府縣不得因便差配諸道州府不得以進奉南郊為名輒有率斂庶俾嚴靜以奉郊禋中外臣寮當體豫意
