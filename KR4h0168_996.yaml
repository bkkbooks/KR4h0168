front:
  text: 全唐文欽定全唐文卷九百九十六闕名三十七
  hash: sha256:b64b8dabc491285f8e4ee6cb677c332aededb055c91d42363b947fe6d1c300d2
body:
  text: 君諱仁泰字國寧祖翽父清清之次子也君不仕性玩琴書情兼義友以元和二年二月疾終春秋五十有四窆於硤石市東一里新塋禮也娶彭城劉氏生子四銘曰元宮冥冥兮曉不開魂魄蕭蕭兮啼方哀愁雲靄靄兮雨添淚松栢颼颼兮風鳴籟府君諱進字進族茂雁門派別條分今籍於京兆府鄠縣八步鄉解村人也祖諱齊父樂道不仕府君即樂道之第二子也修短不意去元和四年三月四日疾終於河南府河陽縣太平鄉樹樓村之私第春秋六十有五即以元和五年十一月十一日權厝於私第北二里之原禮也孀妻李氏偕老願違哀號痛切嗣子忠信次子少遷次子少恭次子少璘次子少儀次阿小長新婦曹氏等號天叩地柴毀過禮殆不勝喪窀穸云具禮物咸備恐墳隴有變故刻頌立名以作永年之記茫茫蒿里寂寂松扉痛君子之長逝歿寒泉而不歸廿三娘馬氏名姹扶風人也故侍中太原尹子曾王父故太子諭德兼兵部郎中子之王父故鄂州州從事子之先父也子生於珥貂之家育在紈綺之室笄年廿歲灼如蕣英期偶適耀闕我後嗣何華而不實祉福不臨以元和八年七月三日洪水忽來浸溢夏汭合郭為患顧比闕遂假官航以虞闕闕昔因周文王之後分郡於南陽祖諱憲格高調逸學富才雄退臥雲林高道不事父諱麟文詞間世儒素成家器宇深沉風神朗悟一心孤高寒峰暎月為量不測發言有徵心常懷分義尤濟貧遠邇之人咸懷其德何修短之有命以元和十一年五月十八日啟手足而告終春秋卌有六夫人房氏雍容令儀肅穆懿範畢舅姑之大禮享年卌有二同年八月十六日續夫而歿兄昌忝同支氣痛苦蓮心嗣子元啟攀號擗踴仰告皇天罄家有無備終大禮以元和十一年十二月廿九日合祔大塋而安墳壠山谷變改託於銘記其德詞曰窮燈暗暗泉室冥冥孤墳對月荒野熒熒千秋萬歲永隔恩情唐故平盧軍節度押衙兼左廂兵馬使銀青光祿大夫雲麾將軍檢校國子祭酒兼御史中丞上柱國食邑二千五百戶劉公夫人隴西郡人也父諱行儉夫人即府君長女也聘於彭城劉公公不幸早薨夫人稟山嶽之粹靈受人倫之大福博行而多聞發言而合禮素德全備淑慎威儀迨於姻親俯仰咸若挺霜操而馳其聲彙女功而發其譽夫人六十有六以太和九年秋七月廿日而薨夫人有子二人長子平盧節度衙前虞候雲麾將軍試殿中監上柱國克勤次子節度散闕一字將克恭生女一人日引子等哀毀過禮杖而不起乃扶護靈柩當年冬十月七日祔葬於青州益都縣永固鄉廣固之里以先塋不利故別遷宅兆西據于闕一字倚山印之崇秀東極于荒南眺青山北臨于郡仍書銘于墓內銘曰白玉無瑕青松有節德儀咸備行偕先列廾闕一字世而歸天流芳華而不歇蒼茫野色雲悲鴻咽林闕二字兮悲風光娟娟兮夜月府君諱倫字環周長樂人也曾祖思祖炎父璋俱養性邱園高尚不仕府君即璋第二子幼而簡約長而宏雅恬然自處不趨世利禮則凝重器宇沈深雖榮之與辱不能動其色忘言得意忻忻如也輕財重義博識多能理性內融徽猷外發男公造立身恭謹色養兢兢二女令淑有聞各娉他室嗚呼斯人不保遐壽少乖攝衞伏枕彌旬藥術無徵奄隨風燭以太和十年八月一日終於私第享年七十府君殄也陰雲暗慘鳥雀悲鳴至理元微天何可問男女迷謬叩地號天閭巷傷聞為之慜然夫人陳氏蓬首灰心沈哀骨立徒想瓊田之草無復返魂之香以其年十月十五日葬於江夏長樂鄉射亭里之原禮也北背黃鶴之嶺南瞻八缺之峯恐年代侵疎川原變易剋石記事永將不易辭曰日月至明尚有盈缺邱山至壯尚有崩裂感彼馮君隨波生滅時惟孟冬析析悲風凝陰蔽野苦霧霾空敬勒斯志千載無窮大唐故駙馬都尉天水姜慶初女適故殿中侍御史劉元質享年七十三於開成三年十月一日終於鄂州私第以其年十二月二十一日權厝黃鶴山南原禮也懼陵谷之多變故為斯銘用紀悠久之祀君諱恒父諱超其先扶風郡人也昔馬融注解累代欽崇風後允因官徙居甘陵郡乃祖乃父遂為永濟縣人焉公以禮為度以德為車衣著篇章飲食經籍謝家鮑氏羞當章句之流恥也文學之列金石為節松竹表貞亂代逃名庸君隱跡懷寶不仕韞道迷邦於是道德互門仁者為里嗚呼天不憖遺神莫見祐元和七年七月廿一日寢疾終於沙邱方私第也享年卌十時也日月無光雲天慘色閭巷遏密行路傷嗟權殯縣西一里先夫人松蘿靡託葛藟無依結誓指於柏舟空淚流於斑竹以開成六年正月十三日與二夫人遷葬於故塋禮也仲子闕二字盡闕一字以竭家資因為遷祔恐闕改易刻闕一字為紀平生志貞松筠表節堅勁金石潔白冰雪闕一字遍乾坤光連子孫輝赫三代榮慶一門道闕二字宇名彰四海天何奄禍於幽魂骨肉永閉於長夜何時再覩明昏夫人姓張其先清河人也皇父諱鄰夫人生有妍姿長修言行包君前取義陽朱夫人而生四子不幸朱夫人中年下世及終喪親迎娉夫人為繼室敬愛均乎長幼周旋廣備親疎撫育前男恩過已子嗚呼夫人行年六十有六以會昌三年十月九日奄終錢唐縣方興鄉之私第包君以再傷齊體追悼何心盡禮居喪卜時將葬前男女哀慕無容以其年癸亥十二月十一日丙申葬於履泰鄉之高原禮也恐陵谷以變更託斯文之可銘曰噫夫人兮倏忽流年闕三字兮冥寞荒原慘慘靈谷悠悠夜泉未闕三字歸於此焉曾闕一字祖從家狀官告墜失不敘府君諱澄其先望在天水貫居秦州後子孫分散各處一方今權居孟州即為河陽縣人也公為人端耿量雅恬和與人結交千金不易一言道合駟馬不追遠近欽風花城共美奈何積善無慶天降其禍去開成四年告終於私第春秋六十有七夫人朱氏即世廣陵郡人也笄年秦晉匹配歸於尹氏之門婦道禮儀不虧晨夕之孝接事舅姑能善能柔和睦六親鄉閭傳禮奈何大運將至臥疾連綿千方無效萬藥無徵啟託聖賢其疾不愈闕一字會昌四年十月十九日終於私室春秋六十有三男女七人長子元慶新婦王氏次子元禮新婦戴氏次子元簡新婦賈氏次子元雅新婦王氏小子元殷未婚長女十四娘夫張氏十五娘歸開氏嗣子等非法不行非禮不動闕二字焉有丈夫之志兒女等叫天泣血五內分崩稱家有無將闕一字葬事卜得會昌四年十一月十八日葬於孟州河陽縣安樂鄉闕二字村禮也恐年代闕一字遠陵谷有遷刊石為文乃申銘曰嗟乎尹君生為哲人言無過失花城共聞千金交結恩義長存招賢納士禮法芳新嗟乎尹君沒為異人嗣子擇兆安葬神魂千秋萬載闕二字子孫君諱文遂字道從祖諱喦先父諱通君即通之長子也幼讀儒書長而習禮弱冠之歲咸譽所知內孝親姻外穆僚友不能苦濫於琴酒乃綰職於監司三五年間榮譽可獎何期未申公表奄卒壯年嗚呼霜劍摧鋒鳴琴絕軫春秋卅有五大中二年三月十五日終於天長之私館也以其年十月二十九日祔於先祖妣王夫人列域以為窀穸禮也娶宏農楊氏恭孝內諧舉案從禮一子三歲名曰小君令弟二人曰文遇文造悼鴒原而遽絕誰濟急難桐荊榦摧雁行何續敢忘兄友銘誌弟恭固請長詞用彰後紀者焉銘曰嗚呼周君世命奚促三十五歲禍來衝福手劍摧鋒身紳廾王欲濟舟傾風前失燭一旦歸冥百齡何續千歲之中再生王國夫人吳大皇帝十九代孫德之女也令淑有聞名傳四德笄年歸於陸氏君名瑛有子三二男一女長男宏詵次曰宏諮並未有所娶女則初笄之歲未有所歸夫人以大中四年遇疾百藥無徵千靈靡究即是歲仲夏月三日而終春秋五十有七男女號踊泣血摧咽親戚悲噫日月逾邁龜筮叶從於其年季秋月末旬八日而安厝富陽縣西廿里上黃山墓然而禮墓則南登極峭北達長衢東西即富春孫氏之山矣慮年月將寖故列塼記其誌銘曰穆穆夫人名傳四德染疾不愈歿歸泉路蒼茫山谷冥冥九泉恐年月寖誌銘列塼夫人太原盛族遠祖因官遷居於大名今為魏郡人也三代祖並轅門上將名冠古今勳業俱高不可具載父君佐使宅親事兵馬使押衙以弓裘飾身文武不墜守忠事上信義居懷可謂丈夫矣夫人即押衙之長女也以初笄而歸於劉公在家而令淑有聞出嫁而四德克備吁上天難問闕一字短不容不幸以大中六年五月十二日終於府元城縣慕化坊之私宅也享年廿五矣嗚呼父母腸斷良人痛心生死路殊龜筮叶吉以其年閏七月九日遷柩於府西南五里貴鄉縣王趙村祔先塋禮也慮邱壟之更變故刊貞石為銘其詞曰婉娩柔儀言容和茂婦德可觀進退可度上天不均掩同薤露大魏西南良玉瘞土萬古千秋永扃幽戶有唐大中六年龍集壬申十二月十三日豫章郡萬夫人終於揚州江都來鳳之里年卅九爰自笄年歸於閻氏之室育三男一女長子公慶次曰公閔幼曰公間卜其宅兆即以當月廿四日窆於揚子縣界江濱鄉白社村其地東西十丈南北十五丈刻字於墓庶乎後迷萬古千秋永為後記夫人彭城郡人也父峯皆詞林學趨官迹立笄年禮聘適於陸門盥帨雞鳴嚴勤婦節大期俄屆嗚呼於大中九年七月闕日寢疾終於華亭邑內之私室也芳年四十有七以其年十一月一日葬於縣東三里買宋氏地之新塋禮也有子三人長度次夫師闕師雖以幼童哀訴過禮恐代異時移故刊貞石銘曰夫人劉氏簪纓之女節婦義夫早聞令譽隟光西邁逝水東流佳城一閉萬古千秋闕二字大夫行太子左庶子分司東都上柱國范陽盧府君墓誌銘闕六字范陽闕一字郡人也其先齊太公之闕十一字至闕六字十四代闕六字後四世至闕一字為闕七字自闕十四字氏闕四字皇朝尚書刑部員外郎諱莊道闕十八字甲闕一字山闕四字公之伯仲頡頏闕三十一字祖諱炅宣州宣城縣令轉太子左庶子闕二字大夫闕五字事闕十五字尚書先夫人闕二字徐氏追闕九字王父諱闕三十八字進士闕十一字太子正字秩滿攝度支巡官是歲京師大旱闕十一字東闕十字郎秦公充考試官以闕二十六字其人先是他邑有殺人亡命者闕九字因拘累闕三字自闕七字有日矣府尹以公清白闕一字事命往闕二字公悉闕三字公求證驗深闕三字果闕八字即于公之陰德無過也由是遷闕四字大闕二字公闕二字制闕七字改監察御史裏行府闕一字知鹽鐵揚州院事轉殿中侍御史闕二字京兆府功曹掾典貢籍於神州第名為轉春官闕一字時為得人故相國崔公諱鄲以闕四字辟為觀察判官闕二字侍御史內供奉闕四字累闕二字府惕勵當官從容闕一字贊闕十一字朝闕十一字憲府風望尤闕二字按大獄摘發奸闕九字判刺史闕五字者闕四字深刻訊公闕一字奏之公曰闕一字閒周理之戈闕八字道延光之闕十一字及害功也闕七字屈闕三字多闕三字刑闕五字萬年縣令闕七字之地闕二字得中闕四字抑豪闕六字授京兆少尹武宗闕十字公闕三字道闕三字使公為副焉闕三字陵下闕四字從闕四字而闕十三字司業分教東闕六字任太常闕三字務凡闕六字七十有三其轉原闕一字用公闕三字不為闕十三字家闕七字位意以闕四字殆七八年豈闕三字嗚呼以大中九年七月十五日歸全於闕四字里之私第其明年歲在丙子四月十三日闕七字氏縣之闕十一字先府君之闕二字也夫人清河郡君崔氏闕九字度已闕九字之士闕二字人闕三字河南福昌縣丞闕三十二字訓當必光其門公闕四字公闕二字之闕二字過於闕三字之闕十一字俾闕三字退不得闕十字郁郁盧氏闕六字重闕五字門傳祖訓家闕四字生闕三字濟其闕一字芳闕三字承闕七字薦能拔義闕八字蔚矣闕五字仕闕二字人闕一字奄忽闕二字夙昔闕一字徽闕八字及葬山闕七字雲愁九泉之上兮樹老松楸千載可存兮闕四字公諱叔卿其先衞人也夫人清河傅氏其先清河人也公幼而有禮長而謙和修身慎行與物無爭何圖天授之仁而不與之壽何不幸與以寶歷二年三月十四日因寢疾終於家享年卌有五其年遂遷窆於淄川縣萬年之西北三里孝水之西原從吉兆也夫人令淑容範宋子河鯉六禮貞吉享年六十有八以大中元年六月一日遘疾彌留遂終焉權殯於堂以大中十年十一月二十五日遂遷祔於塋兆有子一人早亡有女三人長適屈氏次適張氏而承其家焉幼適王氏皆撫擗號訴哀毀過情遂召良工刻石染翰乃為銘曰寬宏德禮謙和淑人改過不恡慎行修身其一夫人賢懷孝敬邕睦和柔四鄰欽承九族其二盛德風猷名芳不朽貞石誌之天長地久其三公諱謙字自修其先吳郡人季歷丞相肅公之後也漢魏以降蔚為茂族史譜詳載此得畧而述焉大王父諱希揚登州軍民事衙推官王父諱彭堯州司戶參軍先府君諱行大宣州寧國縣丞先太夫人吳郡陸氏公即先府君冢子也公體質魁梧風神朗秀溫其珪璧凜若松筠粵在紈綺性質端敏卷書進退逾於老成早歲舉明經三禮二科洞達微言貫穿精義獨行不合時流所排晚節以談笑曳裾歷諸侯上客魏帥何公一見若平生交表公高才請宰劇郡由是褐衣拜貝州宗城縣令公以戎虜之地民俗驕愎非鳴琴可齊闕一字展驥乃乖理張翰之扁舟企陶公之高躅淛有勝地雲間故鄉豹隱鴻冥韜光晦迹其有巖廊彥士闕一字島逸人每披霧見天開雲覩雉莫不高山仰止如不及焉噫人皆知麟鳳之為瑞而不知善人為瑞也不使公執正當路於時元龜不泯於將來盛德必鍾於後嗣造物者大誤彼蒼生之不幸乎嗚呼夢感兩楹闕一字生二䜿以咸通十三年歲次壬辰六月二十有八日丁卯啟手足於蘇州華亭縣北平鄉崧子里之私第享年六十有七先是公於第之南隅列植松楸有公叔闕一字之想焉明年歲在癸巳十一月二十四日乙卯灼龜析蓍始遂先闕一字窆於茲原禮也大人宏農楊氏貞順婉約閨門楷儀闕一字爽撫孤罔不適禮男六人長曰寰杭州鹽官縣尉次曰臺常州晉陵縣尉次曰占旁州館驛巡官試左武衞兵曹參軍次曰實鄉貢明經次曰滔次曰潛皆在嬰幼惟實與滔公之允咸能接物孝悌治身動惟直方靜必溫克奉詩禮之明訓在邦家而有闕一字是使聯榮清途列於霄漢有後於魯斯其比歟女二人長適吳郡張聿之明經出身解褐蘇州華亭縣尉次許嫁吳興姚安之登童子學究二科再命為東宮舍人率皆禮樂名儒簪纓盛族公之中外姻表輝暎當代不可一二而言也嗣子寰欲闕二字之不絕感陵谷之咸遷洒血號泣請銘幽石恭為銘曰愷悌君子兮如珪如璋鳳鳥不至兮麟出罹殃彼蒼不仁兮曷為其常甘泉倏竭兮風焰摧光孤惸洒泣兮行路淒傷青鳥告闕一字兮寧神其岡府君諱佐本南陽人也君平生志操性本謙恭豈謂穹蒼降孽忽遘私疾俄終厥壽權厝故里早分今古夫人郭氏年及總笄闕二字禮適來氏則母儀貞闕三字無虧享年春秋七十有二終於亠兊州來君有子名闕一字慶男女等灰心毀容泣血匍匐乃墨兆元龜露蓍靈筮自闕二字扶護故府君及夫人來就合祔以咸通十四年歲在癸巳闕一字月廿九日於亠兊州瑕邱縣普樂鄉臨泗城陰村郡城東北六里平原禮葬叔慶痛見孤墳寂寂松吹蕭蕭又恐陵谷遷移遠日有變乃命工刻石為銘銘曰穹蒼蒼天日月高懸闕一字照六合不照下泉擗踴哭泣下闕夫人即故玉冊官內供奉賜緋魚袋強瓊之妻公先歿已十五年葬在醴泉本鄉也夫人年七十七有子四人女二人乾符元年十二月廿二日忽染膏荒之疾終㣥賢里第三子一女先令幼男女共二塋葬禮以三年二月廿四日卜於祁村界側公諱君信字匡時其先本周成伯之後父惠通皇平盧軍先鋒副馬軍兵馬使檢校太子賓客兼御史大夫祖王褱皇不仕公立性端良剛柔得中內藏元奧外示謙和早為軍府爪牙之職後以年德將邁退居里中有識是者知公懷大信大義為至英至仁皆暗慕相知公亦默而見諾故德門多長者之車親闕皆禮樂之士何乃日月有數疾瘵屢鍾以乾符五年八月八日終於私第享年六十有七公娶武陵嚴氏生一男行實婚武陵段氏一女適隴西牛從實實為節度要籍支計斛斗司公以孫建立為之後婚清河張氏建弟小福公喜絳等年悉幼稚心力未任姪行賓為右廂都虞候判官皆行賓及子壻行實感激嚴訓竭力祗承佐夫人同辦遷厝以當年十一月廿九日葬於青州益都縣望沂鄉之原也旐幡前去孤雲為之悽慘轜車後來流水豈任嗚咽慮江河他去巖谷遷移聊錄行藏以銘貞石銘曰天際高標藏諸道德素月懸徽白雲為則卓雅有稱規章無忒惟信惟義心期本志自悅自娛誰達茲事青松白楊兮乃荊棘之固殊千秋萬歲兮因積善之能置
