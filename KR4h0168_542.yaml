front:
  text: 全唐文欽定全唐文卷五百四十二令狐楚四
  hash: sha256:6c9e9cd20948487ebbb82d0aad54141752840d95bc2c560535ee305070a7f19e
body:
  text: 臣聞於宣政殿册皇太子訖伏以建崇儲位光啓春闈萬方以貞九服同慶伏惟皇帝陛下誕敷聖訓光啓天慈咸元貞於國經鍾福慶於邦本皇太子溫恭表德仁孝因心方育質於龍樓肇增輝於望苑臣戎守有限不及蹈舞稱賀右中使臣希倩至伏奉詔書吳少誠比令招討都不悛心今以韓全義充蔡州行營招討處置等使臣當軍兵馬令取全義指揮上官説充招討副使令臣使人詣行營所撫慰將士仍令激勵臣伏見逆賊吳少誠殘喘微生驟飛賤品敢違帝命來即靈誅陛下天覆為心雲行其德念日月所照九州攸同哀陷穽之中一夫不獲懸申詔旨開賜生全而長惡未悛執迷不復凶逾殛鯀聲極吠堯今既慎選武臣盡驅猛士威聲先路實勵於震霆翦滅剋期必同於沃雪欣歡奮激倍百恆情當道應行營將士等悉懷感怒畜力候奮指蹤示處既以得人致命捐軀必應無敵臣即準詔差人專往慰諭仍切加激勵冀申微效用答深恩不任悃款之至右中使臣希倩至伏奉詔書得全義總率諸軍已入賊界四月二十七日大破賊徒并擒斬生級如有身死王事者已委全義並給棺櫬送歸本道令臣五年莫停衣糧者吳少誠畎澮下流不朝於海根荄弱質自絶於天狴牢之中鳴吠未已今霜鋒雲集月羽風馳既壓賊軍才聞儳鼓將摩寇壘已見靡旗實廟堂知先勝之形校隊陳爭登之力誅鋤有次蔑殺無難凡在方隅不勝欣抃臣伏以雖忠不烈戰士所羞視死如歸武夫之志伏惟陛下宏天覆幬為日照臨載激怒肝爰收膚骨漢世徒頒其槥櫝義闕送終周詩縱裹其餱糧賞延非嗣以今觀古奮一當千臣獲守邊陲叨居將帥無任感激之至右臣得當道行營兵馬使李黯狀報諸軍兵馬四月十七日從臨潁縣三道齊進二十七日過殷水縣張村下營問探知桑林中有賊遂與接戰大破賊軍擒生斬級不知其數者臣伏以天道無親助其效順人生有欲患在不安今逆賊吳少誠深入禍門自沈罝罟執迷不復謂暴無傷去至安而即甚危棄大順而為巨逆避日月之照干雷霆之誅尚假息於寸陰敢偷生於數刻今者將從天落兵若山行濟殷水而不濡隔偃城而欲斷長蛇之首尾如截應接自難狡兔之窟穴已焚死亡無所方當破竹猶繫苞桑剩鋭氣以長驅抗威稜而直指困雖猶鬬亂不能軍既摧衆惡之鋒必喪元凶之膽以愚籌度不日掃清臣忝守戎旃無任抃躍憤激之至右臣得當道行營兵馬使李黯狀報今月十三日於故信州城下破賊三千人斬首七百餘級者臣伏以舉趾或高則無所措退藏多密罔或不亡逆賊吳少誠用已之愚劫人為惡唯日不足謂天可逃自韓全義稟受廟謀總齊力士橫行於境深入其郛兵才交鋒寇已亂轍以羸師之骸罣罒某月穢草而腥林疲馬之命委離裝壕而咽塹實由奪其信幟拔彼懸門遂使戰野者不知所歸守陴者無從而出凶徒風散叛卒星分亦足以快帝怒於高天宣皇威於下土况臣任當旄鉞誓掃氛祲慶抃之情實萬恆品所守有限不獲稱賀闕庭無任屏營之至右臣伏準貞元六年十一月八日敕旨自今以後諸州刺史縣令以肆考如理術尤異實效可稱考滿日委觀察使録事迹以聞特加獎擢者前件官守文惟謹持法甚精清廉有餘貞固無比臣伏見嶺南風俗惰懶苟避征徭易成逋竄張遜憂人若已理郡如家勸課農桑置立保社移風為敦厚之境徵賦無慘急之名周旋六年其道一致臣猥司廉察忝守方隅以所見聞懇須甄録右前件業傳忠厚雅尚文儒貞白居心公勤守職纍曾試用皆著清廉頃崔漢衡在晉州日奏授殿中侍御史充都防禦判官直道不回正詞無隱賓僚之內裨益甚多知是公才豈為參佐屢詳疑獄心盡哀矜嘗判劇曹事無留滯臣是以録其勞效奏請改官伏蒙聖恩特授前件官今赴闕下奉詔旨不敢乞留臣伏以孟修自有幹能誠堪任使所知微分輒敢薦聞干冒宸嚴伏增戰越右件官蘊蓄公才精勤吏道文章史傳無不該通大歷末則與臣及徐泗節度使張建封同事故馬燧作判官建中三年曾以公事直言不合其意遂被奏授交城縣令及有政績褎然疲羸悉安征賦皆辦臣以其四居畿令兩任法官有學有才堪為賓佐委令推斷無不詳平與之籌畫多所裨益相諳相識二十餘年滯屈最深實希榮獎伏望天恩特賜改官充臣觀察支使右臣伏以元日開歲東風發春人神大和天地交泰伏惟皇帝陛下鴻猷更始寶祚惟新協三朝之會同受萬國之歸慶臣某職當分閫屬忝維城未聳翼於丹霄空馳心於皇極前件馬并鞍轡等馳驅有度雕鏤初成願將行地之功以奉如山之壽干煩宸嚴伏增戰汗右臣伏以五始混成歲為元吉四時分理春實發生伏以陛下嗣帝鴻名受天成命百神降福願等於山河萬國歸仁思陳其玉帛臣限從戎役闕奉朝行又及新年皆承覆露每瞻初日如奉聖明前件鞍馬等稍似馴良並非淫巧冀充庭實用達邊情干冒陳獻伏增戰越右臣伏以五者天之成數夏者天之仁時伏以陛下用仁時而長養㣥生舉成數而陶甄品物是以百蠻委瑞萬國歸誠同瞻日月之光共奉乾坤之壽臣方從邊役未在周行謬宣力於清朝竊馳心於令節前件馬等柔馴既久雕飾初成敢因五日之良以續千年之慶千冒陳獻伏用兢惶右伏以月旅蕤賓節惟端午天人效祉朝野交歡伏惟陛下宸極尊嚴大明光耀擁純陽之元吉保眉壽之康寧風俗既和人倫以厚前件鞍馬器物等雕鐫始就服習初成輒因五日之良以續千秋之慶干冒宸扆伏增戰越右伏以月維仲夏時屬純陽當五日之良辰慶千年之聖壽華夷修貢走玉帛於寰中朝野飛歡均金石於天上臣方從戎役夙奉皇慈願竭微誠慙無遠物前件鞍馬等久令馴致稱以柔良干冒宸嚴伏增戰越右伏以月維正陽日次南午千官拜稱觴之慶萬國陳執圭之禮將以嗣續聖壽延洪昌期蓋朝廷之舊儀乃臣子之常事前件銀器等或便於用正當其時慙經萬里之遙願獻九天之上塵黷宸鑒無任戰懼右臣伏以建子實三微之宗黃鐘為六律之本冬氣方至壁星正中伏惟皇帝陛下統馭天正發生陽數壽等南山之固萬姓具瞻恩均東海之波百川皆赴臣某限一作猥從外役叨奉殊私秉戎律以輸誠望宸居而積戀前件鞍馬等非追風照地之駿麗無切玉穿札之堅強用愧含香名慙承露輒備祝堯之禮願申朝禹之心干冒宸嚴無任戰越右伏以四海無外三冬正中伏以陛下大明燭幽鴻化御極居元堂而布政登觀臺以視朔受萬國之慶擁百神之休臣守在邊陲職司戎旅朝天之路由限於山川向日之心增勤於草木前件物等皆生其地並考於工願奉如山之壽敢修任土之貢干冒陳獻伏增戰越右伏以迎日良辰書雲令節始生一陽之數首出三統之正華裔交歡天人同慶臣某名班將帥守在封疆阻羅拜於彤墀空注誠於紫闕前件鞍馬器械等雖無犀利稍似馴良恭陳遠路之心願備廣庭之實干冒宸扆伏增戰越謹遣某官隨狀奉進右件銀物等非有可觀甚無所直以其方圓不礙斟挹酒漿潔白自持宜承咳唾敢因長日願獻上天干冒宸嚴無任戰越右伏以千年元命之符四月正陽之氣出震吉日繼乾良辰黃河再清冠中古之表德恆星不見掩西方之誕聖前件器物或堅白無玷或馨香有聞敢同率土之心以續如天之壽干冒宸扆伏增戰越右臣伏以繞樞之電曾委瑞於軒皇照室之光昔呈祥於漢后伏惟皇帝陛下貴從天下明在日中當四月之正陽值千秋之聖運人神叶慶朝野同歡臣任重戎旃路遙北闕歡呼萬歲如聞山嶽之聲傾竭一心庶均葵藿之志前件馬等誠非珍異頗似柔馴干冒宸嚴伏增戰越右伏以月維首夏氣叶正陽一人慶誕之辰萬國樂康之日臣某屬連枝葉守在邊陲覩河水之既清知冬松之益茂前件馬并鞍轡等安其馴教考以精誠敢緣九族之恩願續萬年之壽干冒宸扆無任戰越右臣伏以大電繞樞之辰普天咸慶神光照室之夜匝地同歡臣限守邊陲未朝雲闕尚想河清之色如聞里社之聲前件馬鞍等久似柔馴皆經考教任土作貢慙述職於微臣如日之升願并明於聖主干冒陳獻伏增戰越右臣伏以里社既鳴斗樞爰電誕生元聖允叶純陽實萬國同歡之時而千齡兆慶之日臣某限從邊役違奉天慈飲河每挹於清瀾向闕遙瞻於紫氣前件鞍馬等駿非金骨麗乏錦韉慙無照地之光願獻呼嵩之壽干冒陳獻伏增戰越右臣伏以居至道之尊其唯元命助無疆之祚亦在勝因是以千年為慶誕之期百福有莊嚴之義伏惟皇帝陛下以文武道為天人師降生於純陽之月纘承於大寶之位效祉而四夷奔走流歡而萬國謳歌臣某職在監司土無珍異恨無以拜上元之慶酬厚載之仁敢伏普通轉修經戒仰申誠懇以就有為之功上為聖神庶資無量之壽其馬久令教習頗似柔馴願承內廄之恩以備屬車之駕干冒塵瀆不任戰汗之至右奉敕令臣撰者臣今撰了謹連如後竊以揚先帝無疆之德薦陛下罔極之恩宜擇能者永垂不朽聖意以臣備位相府策名文場忘其庸虛賜以撰述頃自哀迷重謺心緒摧落雖磨鉛雕朽已竭其精誠捧日窺天難窮其高遠干冒封進無任悲躍屏營之至右伏以首夏清和含桃香熟每聞採擷須有提攜以其鮮紅宜此潔白前件銀籠並煎茶具慶等羡餘舊物銷鍊新成願承薦寢之羞敢效梯山之獻其通犀瑁上藥等買並依價採皆及時誠非珍奇恐要聚蓄勤奉丹款不敢不進右伏以半夏欲生正陽初王將勝時熱在新其衣前件白蕉先時織成依價巿得光雖讓雪疏不礙風願充當暑之服爰申任土之貢干冒宸聰無任戰汗右臣得征馬使穆材狀謹具毛色如前者臣伏以行地之用莫神於馬擅華名者則衆效奇質者甚稀伏惟陛下廣大際天高明配日殊祥競發休祉荐臻前件馬稟天駟之精體坤元之德毛拳惟細鬣赤而高尾掉肉而蜿蟺額帶星而倜儻臣謹差虞候辛峻專往覆視俱如前列峻云雙瞳有耀四蹄如削宛然天産定是龍媒允協建午之辰光昭太乙之貺臣見今就太原府養調旬月稍任行步即專陳獻謹差某官聞奏右臣得嵐州刺史趙挺六月二十九日狀稱嵐州合河縣太平鄉大慶村收獲前件白兔差行官李希林送到者臣謹按瑞應圖曰白兔壽千年滿五百則色白又曰王者恩加耆老則白兔見臣伏以白惟正色兔實仁獸來皆有為出必以時伏惟陛下聖壽無疆神功不宰是故太陰精魄降以為瑞皓質玉立素毛霜垂清明不讓於殷狼皎潔可齊於周鹿况村為大慶鄉號太平無為而成不索而獲協元符之一氣彰皇德於千齡雖標中瑞之科實應太廟之曲一作典臣忝守藩一作方鎮覩茲休祥無任抃躍歡慶之至右貞元十二年六月嵐州刺史於州界太平鄉獲白兔一隻臣已并圖進獻斃於中路惜其誕生靈質不達明庭誠意所求禎祥荐至今又得狀宜芳縣孝義鄉百姓王貞收得前件白兔送到者臣謹按瑞應圖云王者仁及鳥獸則白兔見臣伏以兔之為獸毚狡者多獸之有毛龎雜者衆臣觀前件兔皓然養素恬爾守柔處㣥萃以自殊抱貞明而不污皎如謺雪燦若凝霜克生孝義之鄉實表中和之化伏惟皇帝陛下恩覃動物澤及毛㣥方宏三面之仁果應千齡之瑞若非上天慈惠下土清平則安得四年之中再見其地信可以摛皇上之懿德薦臣子之明誠昭彰可徵肹蠁如答臣覩茲潔朗宛在封疆踴躍欣歡實倍恆品謹遣某官某并圖隨狀奉進右臣所管採捕得前件鷹兩翅齊肩雙翎對雙雖非神俊稍似瑰奇以臣微誠輒敢陳獻風霜之後儻或得用於三驅鳥雀之中曾冀成名於一擲干冒宸扆無任戰越右臣得司録參軍李旦等狀稱前件府名三都望同兩府吏曹近日稍易舊規格限之中增加選數特乞奏聞者謹檢開元十一年正月二十八日敕置北都府縣資望並準京兆府河南府中間吏曹暫有降下前使王縉薛兼訓馬燧李説并有舉奏尋蒙復舊今準三月十五日敕停減諸州府雙曹司録判司及甲曹參軍特蒙敕旨京兆河南太原三府不在減限伏以太原府龍興盛業天啓雄藩有義旗起建之堂為仙駕留遊之地官標留守驛署都亭典章甚明制度咸在數年來吏部選格不同京兆河南兩府官資稍下選數則深掾吏諸臣懇有披訴儻徇從權之義恐乖仍舊之規伏乞聖慈特敕吏部準元敕與京兆河南一例處分右淮泗寇猶或未除天下人臣皆思奮擊臣伏以射渠魁之目徑弩為先舂大憝之心長鎗是切比雖兼習多不專精臣今選定前件官健取八月四日於城東起教不敢不奏右臣伏以逆賊吳少誠孤負聖明作為姦亂尚延晷刻之命未即雷霆之誅天下人臣皆同憤激况臣任當旄鉞誓掃煙塵割肌肉以資軍亦無所苦執干戈而衛國惟恐不堪况將士等忠義居心堅剛挺質勇於戰陳樂此征行臣謹差前件兵馬如前其資裝器械一事已上並無所闕續具發日聞奏仗其忠順兵氣自雄諭以功名衆心皆勵矧茲窮寇非足勞師伏望天恩不至憂軫右臣伏以不教視成為國之蠧政有備無患前王之格言今吳少誠叛渙汝南憑陵淮右雖烏鳶嘯聚見彈已驚而枳棘萌生須鋤其本昨臣所陳章奏願往討平及奉詔書但令排比在軍中之百事誠有舊規以麾下之萬人要知新令謹取今月二十五日於東城準敕教習至二十九日大設後各勒歸本鎮不敢不奏右中使臣希倩至伏奉詔書兼宣恩旨慰問臣今差前件兵馬者臣伏以吳少誠內懷姦詐上負聖明因幸鄰喪遂虧臣節提攜逆黨逼迫孤城凡在忠良不勝憤切况臣謬居方鎮便合討平伏蒙陛下委曲照臨丁寧誨諭感槩而毛髮盡徑憤啓而肺腸皆激諸軍會合計日翦除當道兵馬差定訖已具列狀奏聞右臣得太原府牒前件人為母阿張患病割股奉母其母所得疾漸損者臣伏以登於大孝在禮為難忍其甚痛於人不易王士昊長於市井利在錐刀誓以誠明之心療其羸老之疾割肉於股饋羹於堂信可以感通神明風變人俗某猥司廉察獲守方隅以此至性恐須旌表右臣得太原府牒前件人為母久患割股奉母所疾漸損者臣差當縣主簿劉戡檢驗得狀具如前申者臣伏以縱螫及膚口猶難忍援刀刺骨心豈易安前件人出於犬畝之中長在草茅之下天生仁孝日用元和忘甚痛於已軀期有瘳於親疾人倫共感名教所宗斯實陛下仁奄周王孝逾虞帝陶蒸動物之性啓迪仁人之心况臣守在方隅職司廉察據其至行恐合裦稱右臣劉氏堂外生即故硤州刺史伯華嫡孫左補闕某第三女是臣亡叔庶子絳州刺史勛外孫父身早亡臣妹多病遺孤寡婦無所依投及臣總戎來相依止臣見其長成須有從歸其薑鉥久在太原曾任主簿誠非匹敵誤與婚姻豈料如獸之心同人之面縱橫凶悖舉止顛狂旬月之間豪橫備極惡言醜語所不忍聞有忝祖宗難施面目臣以為夫婦之道無義則離因遣作書遂令告絶矜其愚下擬許生全而將校等二十三人播進於庭確論其事具如前列請以上聞雖忍孤兒可欺其如衆怒難息特希竄謫以雪寃疑干冒宸扆伏增戰越之至右臣適蒙恩獎獲守方隅力小任大常憂敗纍伏以行軍司馬相副之職知府少尹共理之官未得其人久空此位每平均征賦繕理邊陲實藉通材以分重寄伏惟陛下察臣心之懇款知軍務之殷繁選於中外為此副二陛下所用即臣所知苟獲同心庶無闕事謹遣某官奉狀奏請諸道新授方鎮節度使等具弩抹帶器仗就尚書省兵部參辭伏以軍國異容古今定制若不繇舊斯為改常未聞省閣之門忽入弓刀之器鄭注外蒙恩寵內蓄凶狂首創姦謀將興亂兆遂致王璠郭行餘之輩敢驅將吏直詣闕庭震驚乘輿騷動京國血濺朝路尸僵禁街史册未書人神共憤既往不咎其源尚開前件事宜伏乞聖恩速令停罷如須參謝即具公服
