front:
  text: 全唐文欽定全唐文卷三百九十八昌開元時擢書判拔萃科
  hash: sha256:18c8450431bf596f503231f225958e29a07edd088a8ca78892905d6e7cdf8024
  markers:
  - {type: head, offset: 14, content: 盧昌, id: KR4h0168_NFKB_398-h1, level: 1}
body:
  text: 人最物靈道由學立詩書禮樂列聖巨儒之教行孝慈忠良父子君臣之義備是以國學宏建東序西序鄉校大起左塾右塾聞詩以言執禮而動遵夫子之善誘仰先師之至德里胥末役鄉人是賴公門鞠躬未彰於嘉躅黌塾促膝便乖於令典苟茲無禮胡異有皮鄰長逐之允謂宜矣縣曹專斷竊未得諸惟甲惟乙夙庇唐封如琢如磨服勤師訓自凝情於竹素將比色於朱藍既而逝水方驚梁木其壞微言已絕先師從召於鶴書素業無憑弟子空思於鱣序閑階寂歷泣對履綦舊宅凄清愁聞絲竹爰制縗絰以報師資雖乖心喪之儀未失禮經之意何者宣尼既沒子貢為廬鄭生云亡叔然制服往哲不貽伊誚縣司何遽見繩請寬二公之夭夭心無濫五刑之法承先開元時擢書判拔萃科備豫不虞古來善策隨事興理今亦宜然於廓長河邈界中國來萬里之外歷數州之間榮光載浮竹箭長下千里作曲呈瑞馬以出圖三日成霖或迷牛而為害永言諸郡夾河之壖堯水屢逢媧灰未止俾太守沈馬空竭精誠將軍負薪猶勞太息則必土功展事金隄爰起匪用齊人之力孰免為魚之歎恭聞漢事以蠲六月之徭大哉聖朝實平百姓之價公家之事知無不為苟利於人胡為不可省司所見未窒盈庭之辭州訴宜從可塞如川之口上士涇陽人太常博士聳之父上士曾讀實錄貞觀九年西域進獅子祕書監虞世南獻賦前史美之竊謂虞公博物洽聞誠則可重王褱瑋倜儻或非所長欲精體物乃賦其事窮汗漫之大荒當崑崙之南軸鑠精剛之猛氣產靈猊之獸族指千里於崇朝逾鐵山而往復非取俊於熊豹豈方姿於甝虪故其方頤蹙額隅目高眶攫地蹲踞騰空抑揚簇拳毛以被頸縷柔毳以為裳逢之者碎犀象聞而頓伏值之者破鵰鶚不敢飛翔哮呼奮迅睒瞲騰振掌擭攢鈹口銜霜刃怒雙睛以電射揭一吼而雷震似烏獲之摧鋒疑項王之入陣及夫朝晡未食鼓髯奮力後勁雙瞚前張濶臆蹉殊榛以傲睨跳絕梁而翕赩倏橫噬而風馳乃掉尾而雷息口裂奔貙足捎狂兕猛虎摧於掌握豪者碎於牙齒既飽飫而心和乃宛頸而帖耳彷徨於金河之外生長乎葱山之裏嘉此獸之奇傑邈蹻勁而殊材隨馬牛而內向順謳歌而朅來逾烏城之積阻獻龍闕之崔嵬資譯人之納貢弭雄心以效能何虞者之維縶驚牙爪之可怖頓金鎖而長縻閉鐵牢而永固悲此生之窘束懷舊國而愁慕雖食肉於當年思盡力而無路羨文豹之掎鹿美韓盧之逐兔伊薄技之見收而偉材之不顧聞夫天以煦育為施草木皆春帝以惠訓為施猛戾皆仁夏后氏擾驪龍而伏皁軒轅氏役熊羆以佐人此奇獸之為用豈無用而來馴何不校之於搏擊投之於絕倫而使之鬱鬱於窮檻區區於後塵者乎寒關月壯羽書南向虜馬秋肥胡兵犯障爟烽夜驚候馬相望雲橫朔塞之前雪滿天山之上於是天子按劍將軍事邊雷驅甲卒直指幽燕風蓬蓬而出海波漫漫而騰天當雁門而北上薄龍沙而左旋既而漢虜齊兵三軍合陣虹旗篲掃鼓聲雷振奕奕熊羆森森鋒刃或左提而右拂乍一留而一進則有俠少驫眓雄駒捷疾耳若插筩顱疑削出跼金鑣以弄影控鐵銜而齧膝始走參走覃以舞風忽濩畧而追日蒙具裝擇組練雜然一往鼓仆旗旋足不得搖目不得眄超騰絕壑走及奔箭疑隔漢之流星似披雲而出電左賢為之膽懾骨都為之頷戰飛奔肅肅恣意馳逐宛若遊龍行如驚鹿左右披靡東西往復溝蹙汗以朱殷毛拂霜而蝟縮蕭條萬里顧盼翹陸橫塞上以長嘶餘聲振於山谷况乃項籍英雄驅馳冠戎旗翻落日劍倚長虹惜良騅之不逝歌美人於帳中摧拔山之氣泄指烏江而路窮遂使畢會戰塲挑身鋒鏑人控馬以騰踊馬隨人而奮擊轉足生風籋塵無迹跳山超澗冒刃衝敵突圍則漢將奔波怒目則追軍辟易遭楚王之不利當壯年之虛擲也別有渥水龍媒朱旄逸才雙瞳日耀五色花開逢漢王之棄置跼吳坂以徘徊思效技於金埒願追仙於玉臺懷玉臺兮傷遠道朝朝暮暮銜枯草千金買骨君儻知百萬交錢猶未老垂兩耳兮伏鹽車倚雙輈兮慙蹇驢絆權奇而不用空倜儻其焉如祀祭以神官司執事昔者由也曾陪季氏之庭孰謂鄹人每入魯侯之廟甲既策名朝列監享嚴禋剛鬣柔毛不作庖人之饌白茅醴酒遽聞歸胙之榮食美思親無乖孝養餕餘有祭暫越禮經柴也之愚雖聞小過參也之魯何妨大倫以禮許人則吾豈敢棄瑕錄用將子有聞論情雖欲薄言與進未宜深責翬開元時擢書判拔萃科易曰天垂象聖人則之故備以人事法乎天時定損益之道察盈虛之期嗟歲運兮倏忽眷年容之逶遲景苒苒而難駐晷銖銖而在茲蓋以重金壺之器建銅史之司致用久而不易循環因而可推爾其漏之所作漏之所託至精至微惟寂惟寞水滴瀝而潛響箭差池而靡錯俯通軒禁上應寥廓亘千門兮連萬戶左彤階兮右丹閣亂微唱於晨雞雜幽聲於夜鶴清清泠泠日殷鳥星送春漏於重扃赫赫曈曈時方祝融傳夏漏於深宮的的帛丿糸帛丿糸明河爛然耿秋漏於涼天暗暗陰陰濃氛鬱沈轉冬漏於寒林觀夫修短之意見乎造化之心信晷刻之道廣知挈壺之用深故能度量萬物均分四序既不忒於盈縮亦無差於寒暑順之則千載可通逆之則寸陰是阻應乎日月合乎律呂蓋漏亡則時昧漏存則政舉實邦國之是務諒樞衡之所與悲夫天轉氣流人生悠悠景有虧而有滿時或沈而或浮恥功名之未立懼容華之先秋所以懷寶獻玉彈冠振裘歌聖明而不已亦休暇於林邱諠寰易擾野性難馴鴻鸞不處於俗中珠玉自生於塵外丁至情無欲含章寡詞琴書未入於山林刀筆久勞於郡縣清風忽至白雲意多拂衣不留挂幘長往陶潛之美志斯在疏廣之芳猷未歇幽谷歸來高山可仰州司牽於常法責以詭時欲處伯魚之刑實恐冶長非罪黃中開元時擢書判拔萃科守令不行王者域人是制廬井丁之受地用給公私以耕以耘窮筋力於歲月是藨是蓘慘容鬢於風霜猶旨蓄以禦冬慮艱食而為饉漢陰抱甕殆欲忘懷於陵灌園庶乎自適雖屋粟興稅園廛有征而田畯急民已闕三時之務誠邦家有賦焉取五菜之供恐非民之未宜將責吏之為當還同履畝郡令誰可封行請效埋輪廉使即當隼擊烜開元時擢書判拔萃科決河之虞備聞前載隄防之設厥務匪輕故得其宜則俗除墊如失其道則人受沈淪由是禹得元圭漢陳白璧古來所慎寧其怠諸且將毀右隄則左隄不理下方之弊為患將深漢代成規自宜遵奉不達舊載昧於物宜輕此毀除未聞其可水工之議謂得通方利器開元時擢書判拔萃科大道潛運㣥動無心明王德孚庶物適遂由是山栖谷隱常有居巢之人鬻蔬灌園時聞抱甕之叟屬旒冕側席載勤於夢卜繡衣持斧博訪於邱園皇華以知無不為誠樸畧之可尚或人以多聞博識明混沌之非真跡初兆於行藏事有同於倚伏舉者縱非折衷猶或獻芹科者貴叶平反無疑寘棘愚之寡見告記為宜惟孝開元時擢書判拔萃科先王設教各有等威君子盛儀必修德禮苟昧斯道時謂不欽解式妄人不若厥訓徒守尊卑之位終乖敬讓之節不從所視實曰夭夭心儀或人杖之事亦奚爽州曹丕蔽因噬腊之遇毒省司失入覺從者之詞游罪自已招云誰之咎請當從禮之罰勿聽無稽之訴希明開元時人自號青羅山布衣太乙天帝之神也下司九宮中建皇極欽若則彞倫攸敘怠棄三正錯亂五常黃帝以惠迪吉而為五帝之聖大禹戒從逆凶而衍九疇之文炎漢高祖受命張良祕金刀之錄吳主爭權劉惇演炎旌之祥神用於不言之載睿化於無為之間閉戶而休咎自徵拂鑑而毫髮皆極非至精妙物執契於混沌之始者又何足以知之爰發上元迄是帝載幾千年而一聖數百年而一賢得隩隅有登龍之喜窺閉鍵若重關之隔沿波獨往泛滄海而不歸討本窮源峙孟門之嶄絕至於計神審物天目司姦一三置將之數四六對絕之氣掩迫孤單開社七精羅睺交較以八節占水旱九州言吉凶五將定主客亦猶兵戈勝負邱明受經而作傳見非公穀子夏師聖而序詩復殊毛魯學而時習之攻乎異端笑他人未工忘乎已拙以蠡測海以管窺天心見之外愚衷未盡或指陳實錄或誕錫嘉名正二局有陰陽之殊糺六壬附時計之謬淮南分野縱博我以多聞黃道日躔竟有疑而則闕源流則廣枝葉扶疎狐裘同士蒍之風玉石抵崑山之鵲雖億則屢中時自賢於仲尼而謀之不臧且推過於季氏風國之事多惟慚德伏惟開元皇帝陛下明極稽疑睿聖作範察璇璣以齊七政制禮樂以穆百揆明太乙之威神封泰山之能事高視萬古名言謂何神嘉承日月之照荷覆幬之廣參詔賜於金馬觀祕籍於蘭臺嗟此式經有乖微旨乃上稽天象中迹算術下統人事旁觀歲時考帝先於神女之符歷載紀於蒼頡之筆甲乙之終數宮元之往復奇偶之二算勝負之八門與人惎法式之夭夭心陣圖水火之失禮樂不興之論周字狂簡之文或義通而即流或理僻而便削皆考經義以一貫之穆若蕙畹聲如玉振夫詩對惠連輙得嘉句筆因樂廣便至能文萬殊皆極而同歸獨見忘言而既驗校之以元紀又精之以日時代謀於述作之前總括於天人之際會披覽得意之妙動契合如神之在亦曠代之能事也經凡十卷名曰太乙金鏡式經若筆削後於孔明用賢則子房升堂風后入室宋琨樂產李淳風屬可座廊廡之下如以爾言過矣將俟來哲岊開元時擢書判拔萃科鄉大夫之興賢能大司徒之論俊造既升司馬又告諸王天府拜而已登內史職為其貳周云進士漢曰秀才在今日之區分非曩時之名數文藝小善進士之能訪對不休秀才之目美彼良士賢乎我師以窮鄉之莫知徒舉其小庶會府之達識即致其大亦猶鯨魚之鼓溟海歎蹄涔之暴鱗驊騮之局中庭望雲朔而驤首考功自可表其秀傑拔以殊倫縱常式之文不歲登其尤異急賢之地宜日新於進才聞言不聽斯為蔽矣試可乃已何至是乎公使湮沈坐令求訴令兼給廩犧籍田今或不供犧亦廢用酒無鬱鬯於事何闕寺猶固執雍穆清廟苾芬孝祀為酒為醴以烝以嘗執鬯玉之黃流香鬱金之美草觀灌禺若居歆孔明鬱人是供鬯人聯事司樽彞之築鬻贊宗伯之祼將自周道崩離禮籍咸滅漢儀草創祀典多禋有徐生之為容非如叔氏雖匡衡之復古未及周監其後浸微不資沿革奉常執典同制氏之鏗鏘光祿莅祠無大酋之湛饎莫行其義徒紀斯文皇聖時乘官人則惠禮司皆好古之英博士有表微之職將盡善而論德固大道之中行豈可以沿廢為言積習而惑未辨方志不監匠人何荊州之包茅獨供王祭有盧家之蘭草不入國香惟昔肆師位同祠部無為大祭之佐不若君子之言又以籍田明乎甲令去禮經之逾遠類俗吏之所為且甸師之給神倉潔粢以供鬼享虢文諫千畝之籍崔實刺數畝之耕亦曰文存不當禮廢使唐禮不備於周禮犧牲苟供於廩犧既慢乎粢盛仍拒我鬱鬯宜投棘署俾解星郎景開元時人大德檀越門徒情深道義惠燈傳照朗晤心靈示誨之恩碎軀難報今矚讚佛之次述二師之至誠輒申毫末之辭式頌彌天之德庶望將來君子知三寶之住持敬題行記書之如左法師義糸弘字宏濟東魏鄴城人也俗姓張氏年七歲依闕一字馬寺闕五字息茲弟子天縱英靈聰惠明哲文明初歲落髮染衣住谼谷寺勤於藝業內外俱贍解行雙美妙善悉曇奉勅徵闕五字二京翻譯於是參詳聖旨闕一字闡梵言譯金光明經薩婆多律掌珍詮等三百餘卷並詮辭證義筆授綴文又補充闕一字僧統司修窣堵波檢校尋被抽入薦福寺滿世大德百坐講說頻登勝席殿庭論議擢以令名法師學海宏深辭林迥茂闡揚闕二字名播二京其時僧衆咸號法師東魏大乘糸弘矣又補京慈悲寺都維那復於內道場佛光殿轉經行道面奉闕六字菩提迎接經像至乾陁羅國迎得三藏鄔帝弟婆將真容畫像廿鋪舍利千餘粒三藏梵本二部至京聞奏聖闕一字嚴駕闕二字法師馳驛王城方窮異域往來四載途經一萬八千供奉二朝十有三記前後勅賜法衣道具隨得轉施不以自資闕二字之懷無以加也覲省重奏請歸闕一字道俗欽風屈為谼谷寺主其時州將賀蘭溫六條儒雅八正居懷輟闕一字寺闕三字補充大雲寺法師教授於是宣揚妙旨成庶品之津梁演暢微言啟含生之耳目衆又舉法師以為上坐綱紀寺衆闕六字准勅再滌釋門甄明戒律重補充清滌上座法師精勤攝念策勵持經維摩法華日誦一遍戒定惠解詎測淺闕五字式題斯記法師乾壽字崇詮義糸弘同郡人也俗姓李氏年廿歲依化樂寺崇闕一字法師為傳法弟子學法華經惟識俱舍因明等論皆理極精微妙窮法相證聖之歲剃落披緇住谼谷寺奉別勅補充當寺教授法師於是廣演談元深攻理趣威儀肅物雅操超㣥又補都維那綱紀衆事利益常住軌範僧闕一字修復伽藍咸皆壯麗故得寶坊金地月殿重明嚴飾山門光揚佛日緇徒濟濟士庶鏘鏘三寶鬱興四衆攸仰者其惟法師住持之德也又以崎嶇山路剪拓修夷枯涸川原疏泉汲引哀矜物類濟乏賙無悲敬雙修廣行闕一字捨此皆法師大悲之行也又乃天資妙闕一字巧惠殊倫智用合宜動中規矩內懷至孝無忝所親生事愛敬死事哀慼是謂孝道畢矣恭穆仁慈謹敬謙闕一字是謂禮儀備矣未有已任孝別起津梁者哉故經云孝名為戒亦名制止法師志崇清淨之福以報鞠育之恩神用研精敬闕二字室於是依山構宇備設堂儀鑿石疏闕一字宏開洞室池引八功之水爐焚六銖之香七物咸珍衆事周贍長時供養通浴聖凡法師四攝利生三悲鬻闕一字融心二諦觀照五停積德難量解行彌廣畧陳綱紀題斯紀焉原夫至道寥廓等寂寞以無言真智如如湛然闕二字之外應權變化運神用於無邊至於無生之生示現非相之相灑甘露於塵界普洽四生轉法輪於大千哀矜六趣闕一字大悲闕二字孰能預於斯焉我大師造化神功此地多形勝之所金門梵響振萬古之音聲谼谷伽藍樹芳因於億劫鄰茲福階之闕二字靈瑞之幽巖仰瞻鷲嶽之峯俯接祇園之地非直溪谷幽邃抑亦聖跡昭然康哉大哉故無得而稱矣爰有遺法弟子義糸弘乾壽等宿乘妙業俱崇勝因稟質天資人靈特秀懼暴流之叵度建愛渚之津梁闕一字乃運用奇功依巖起塔雕龕鏤室窮匠闕一字之神綺餝莊嚴竭工輸之妙望之如日自有昭昭之暉仰之如天非復蒼蒼之色大千世界悉現於寶葢之中應化三尊處闕一字思議之一室梵宮晃耀此乃非殊相好圓明光同月愛恐桑田變海陵谷俄遷用紀微功刊茲貞石其詞曰邈矣大聖耀質金軀三身化現四智如如不生不滅非實非虛有無所有無無所無其一真容毫相光流月愛常遊十方恒在三昧示入生滅無罣無礙脫屣囂塵超然物外其二粵我三尊惠力難量慈雲廣被普洽無疆應權利物導引隨方㣥生舟檝苦海津梁其三仙巖聖跡式建支提斜連麓岫俯瞰幽溪天長地久日月昭迴金門動響石室方開其四思光開元時擢書判拔萃科卜氏習聞秋駕工隨水曲屬出車檻檻有六月之師將執訊連連成九天之勝而深谿難拔小駟易驚殊攝叔之致師有懸賁之敗績是無勇也於此死之監軍糾慝未窮通憲必若馬為流矢所驚人殊執轡之罪則死非其道誄得其功率象前聞寧宜寘理季成開元時擢書判拔萃科度土居民使有寧宇省徭薄賦期於利物政之善者傳不云乎惟丁計畝受田奉時供上周公之典斯在穀梁之志可徵且同居八家並種五菜取其葱韭既云救乏賙無樹以楸桑誠得養生送死人苟利矣吾無間然此夫伊何多求是務不遵有若之盍徹徒事冉求之聚斂况廬舍自損田園將蕪勤私自可以非人率禮無聞於稅畝迷而不復過也必文以虧郡守之明宜允使司之舉超然開元時擢書判拔萃科擇土制邑度地居民是分公私爰制內外食九食五制稱上下之農近郊遠郊師有異同之賦彼丁何者實曰田夫四體初勤五菜云樹既綠葵而白薤亦秋韭而冬菁但類潘仁用供朝夕之費同夫楊惲取給公上之求公田為居履畝非古考龔遂之政計口而畦讀穀梁之書損廬以種稼則不善吏固應科既匪大猷爰彰薄訴籍而不稅雖固執而奚為久而無成於從政乎何有廉使所按誰曰不然伾開元時擢書判拔萃科守令不行度土有衆務農理國人力是借公田為居既八家而共資亦五菜而云取惟丁率常由已不遷見異守質抱甕將類漢陰之夫閑居鬻蔬未減河陽之令相維彼吏而乃弗經既忘過籍之非將為履畝之稅是同大桀宜刺小東且私田於人餘力豈讓吏之不恤稼乃無成失官之譴已彰稅人之理徒執季孫苟賦周典聞仲尼之言宣公不仁魯史有穀梁之議吏而多僻守可論刑不能莅官何逃使按不疑開元時擢書判拔萃科惟恍惟惚甄巨匠於無名一陰一陽鼓鴻鈞而不息是知天道元遠子所不言甲以志尚縱橫心懷貞正振談端於海嶽抗高議於雲天取類阮瞻疑書生之自屈有符宗岱遇使者之方求乙以才貌畧同稱其似是殊仲偕之昆弟於此相推異張衡之後身斯焉見取生乎公府無聞鶴板之徵冥寞幽途忽見鵲衣之召弟以鴒原義切雁序情深惜棣萼之無春恨泉扃之不曙告稱謀殺未達幽明語事雖云代命至理終當溘盡捨而不鞠實謂為宜冕開元時擢書判拔萃科夏闢山川周疆井邑四人得業萬國作孚欲令應陽和以蕆事候秋霜而畢力故除彼公田人耕百畝用資國賦家茂九農是知居塉即勞處沃便逸必耕奧壤以易萊田祈南畝之有年望西成而必獲誰謂田其蕪矣似陶令之歸來稅輙均收疑魯卿之厚斂使司以愛人活國人富則國殷州縣以反裘負薪裘敗則毛落既未閑於大體徒輕擬於小東縱訴將備年饑終合請裁天旨使科非法未失清通遷喬開元時擢書判拔萃科連帥職當邊徼任切爪牙不留意於軍容迺忘情於奴戲雖費禕不輟未可因循而陶侃既捐何勞健羨一枰之上空聞懷陣之心百戰之前不見臨戎之節御史乘驄按罪執簡彈違白以㣥兇實由連帥此而可捨法安用哉寘以逗撓雅符彞憲慶期開元時擢書判拔萃科自上棟下宇疆里井田度土居人量地制邑故墉垣是葺版築聿修華元巡功見謳於城者子囊臨逝貢策於荊王甲何人斯職茲仞邑乙不從命同之鑿坯趣舍路殊便為隙末雖叔孫受縶每効勤勞而子騫發言何必改作遽營為堞未崇射隼之規不憚嚴科輙嗾夫獒之噬棄人用犬何其不臧既紊風猷請書霜簡有鄰開元時擢書判拔萃科甲幸彼曲成官同直指不被澤宮之誡與監清廟之儀執燭薦腥禮循朝饋崇牙樹羽樂遽徹懸方致美於吉蠲即同班於福肉榮仍在已祿逮其親詠蘭陔之詩晨昏少力申綵服之養烏鳥多歡用廣中因茲外胙為子之道始則著於先嘗食父之餘終必歸於致祭且聖人之禮祭示有先夫婦各差父子異數盡於是矣何所疑焉仲宜開元時擢書判拔萃科罪云是二月一日以前殷俗富人實惟稼穡分疆列土必假溝渠白公入秦卒興涇水之利史起居魏大引河流之溢信衣食之是資知珠玉之非貴理宜順時役築作制隄防惟彼高陵地稱三輔瞻言沃壤良由二渠完謹苟虧畜洩乖用必貽罪戾何以逃刑且如雨畢除道既候於天時水涸成梁再編於月令斗門不設交口未修功雖闕於千金時靡過於二月遽即科殿恐爽廉平請從矜釋謂合通典璿開元時擢書判拔萃科登庸取士六藝稱先設策除兇五兵是要卜氏為御招愆於馬驚監軍正刑志存乎鸇逐昔懸賁理御嘗聞流矢之災卜國佐驂遂彰白肉之患有功必賞有犯必科未明敗績之由須覈馬驚之故請重尋詰然定是非庶使幽冥申冤功過昭著即寘於理深涉乖疎
