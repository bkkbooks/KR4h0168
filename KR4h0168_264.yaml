seq: 264
front:
  text: 全唐文欽定全唐文卷二百六十四李雍四
  hash: sha256:b8ee23e290194abda11a4e4158717492eb464e5536f3a3f3c98c10bc13b562d3
body:
  text: 天也地也攝生之謂元造日也月也容光之謂神功然亭育之仁可斡終滅照明之力未焯昏霾故熱惱積薪劫燒難鑠驚波巨海沃焦自淵獨有導師空王禪那宴寂一念首安住之域加行證無為之階密教內修莊嚴外度雙引相應並照兩忘然後生無生淨名不去照無照了義能覺爇菩提之炬則枳滌除楫般若之航則橫流既濟湛四禪於中道超三有以上征精舍攸躋度門斯盛其此之謂矣粵有寺之艮背山之前臨有確師禪房者武德八年邦守蕭公諱顗護法之所建也周目環郭澄心際海亦既一味實無衆生夫憑其高宅其勝曾近俗諦或乘法流且水出於冰凡作於聖雖曰醜地猶是道場矧乃妙有孤標實相靈變入我室觀我形者哉施及貞觀歲有等觀禪師繼前心承後問分之則別位二事合之則同列大空坐於斯竟於斯於戲四益風驅百為火滅棟宇崩落象設傾低先天中有惠藏禪師聞之斯行居而不住妙齡強植徑節老成被甲律儀下帷經藏方丈之室時歷十年簞瓢之餐日常一食信為法本悟實如宗簡珠圓明經蓮清淨剃髮結落亡境受除生起了於心緣覺被於物是以興補舊塔建置尊容彌陀當其陽菩薩侍其側四大海水慧眼啓明五須彌山毫相崇絶有若稽義托實沿名討因都極樂之大郊壽無量之景命備如昔者稱讚觀厥音聲克濟斯艱乃復於遠則有階地超越自在神通發宏願心得大勢用皆所以濡火宅軔劒輪投地者結業坐開入影者苦趣以息粵若殫財竭力刻桷雕題積四三年模造化意寶殿蔚以雲構金山煥其日臨豈徒然哉夫壯麗者將以重威神儀形者將以攝歸止或離性解脫或見作隨緣藥草寓其根莖雲雷感其方類即說非說若通不通惟三獸之渡河庶一子之來學禪師以為默則絶教言則牽文苟心事於化人豈迹留於捨法會議斫石僉允圖功雍來守是邦偶聞茲事依僧依佛何日忘之在家出家惟其常矣頃者下檄湖海申明捕殺鱗羽咸若災疫以寧救蟻雖尚於沙彌涸魚每憂於釋種祁寒則怨童子何知率三省於短懷寄一塵於寶地別駕宏農楊公守堅字越石本枝鼎貴胄允嶽靈直道守公智印觀法司馬琅琊王公元勗字固禮高闈襲吉皇士令名資位升聞妙意融朗盛矣美矣左之右之時有新羅通禪師五力上乘一門深入利行攝俗德水浮天讚而演成恭而有述其詞曰覆燾之獎始生終滅昭回之明內昏外徹陰入不斷心起難折靈海欲深洪爐火熱倬彼大師超然正覺亡境息想示法流渥絶生死岸破煩惱殼度門光啓住地元邈傳燈三葉分座一義象設儀形莊嚴地位有為不染無相能離苟曰法乘莫非種智古者豐石抗之高山紀事標柱銘勳列班廣茲妙有運彼元關則百伊昔粵吾無閒古者將有聖賢必應山嶽尼邱啓於夫子鷲嶺保於釋迦衡阜之託恩天台之棲顗豈徒然也故知土不厚則巨材不生地不靈則異人不降陰騭潛運元符肇開宿根果於福庭大事萌於淨土其來尚矣東林寺者晉太元九年慧遠法師之所建也世居鴈門樓煩俗姓賈氏童妙神悟壯立精博初涉華學不讀非聖之書中留范經尤邃是田之說嘗就恆嶽覯止道安火遇於薪玉成於器雖根種諸佛而果得一時師子吼言載聞順喻維摩詰答更了空門安住四依修捨二法和尚歎曰吾道行者惟此人焉屬朱序尋戈緇徒逃海道由茲嶺冥契宿誠謂其徒曰是處崇勝有足砥居居地若無流池曷云法宇大誰神廟特異蓮峯結跏一心開示五力以杖刺地應時涌泉既荷殊祥因立精舍堅臥禁戒宏演妙乘浮囊毒流木鐸正教首唱南部轉覺後人以智慧刀斷煩惱鎖由是真僧益廣妙供日崇隘其本圖宏其別業乃進自香谷集板安棲即曇現之門生鄰慧永之阿若相與撰平圃踰層岩在山之陽居水之右經其始而未究其末有其所而未虞其勞當是時也桓元司人柄斡國鈞以福莊嚴因憍檀施書日力之費盡土木之功繚垣雲連廈屋天聳如來之室宛化出於林間帝釋之幢忽飛來於空外至若奧宇冬燠高臺夏清玉水文階而碧池瑤林藻庭而朱實琉璃之地月照灼而徘徊旃檀之龕吹芬芳而馝馞相事畢集微妙絶時羅什致其澡瓶巧窮雙口姚泓奉其雕像工極五年殷堪摳衣而每談盧循避席而纍贊道宏三界何止八部宅心聲聞十方足使諸天回首觀其育王贖罪文殊降形蹈海不沈驗於陶侃迫火不爇夢於僧珍願苟存誠祈必通感既多雨以出日乍積陽以作霖則有形圖西來舍利東化或塔涌於地或光屬於天謝客欣味而成文劉斐詆訶而覃思所以山亞五嶽江比四溟地憑法而自高物因詞而益重洎梁有崇禪師者傳燈習明安心樂行指拳猶昔薪盡如生次有果暀二法師僧寶所欽克和止觀法物為大用繼住持上座曇傑寺主道廉都維那道貞等皆沐浴福河棲止淨業諸結巳盡白黑雙遣衆生可度名色兩忘纂盛名於舊人啓新意於今作重建雅頌遠託鄙夫代斫有慚豈云傷手握筆餘勇曷議齊賢但相如好仁慕藺名而激節伯喈聞義讀曹碑而敘能儻青包於藍冰寒於水非曰能也固請學焉其詞曰靈山兆發真僧感通刺泉有力呵神致功法儀外演禪心內融性除遍執門開大空其一瞻禮雲集砥居峯薄越嶺圖勝降平規博信臣檀施護供興作大起重階廣言阿閣其二嚴幢湧出寶塔飛來尊容月滿法宇天開化城改築道樹移栽松清梵樂石敞花臺其三金容海游法影山薦毒龍業消魚子心變萬里西傳一時東現華戎異聞穹厚驚眄其四遠實法主謝惟文伯光頌纍彰德名增勒助起江山聲流金石一言可追千載相激其五了性了義或古或今止持紹律定慧通心覩物情致懷緣道深敢憑淨業永紀禪林其六上尊王之分護大千也甘露以灑之慈雲以覆之香風以熏之惠日以暖之忽恍乎無相之體通洞乎有形之類演正法降毒龍在清涼之山苑經行之地其山也左溟渤右孟津恆嶽揭其前陰山屋其後五峯對聳四望崇崇蓄陰陽之神秀含造化之奇特每至丹霄出日俯拍雲霞清漢無波下看星月可以侔鷲嶺可以闢蓮宮在炎漢時卜中箭領用肇造我清涼寺在北齊時以八州租稅食我緇徒焉歷代帝王莫不崇飾洎我唐開元天寶聖文神武應道皇帝丕宏妙教大闡元宗渥澤浸而恆河流景福蒸而鐵山固仍復舊號祗以修先是長安年中敕國師德感供以幡花文殊應見於代具大神變發大光明儼兮似或存兮無處所凡厥稽首咸懷欣懌傍顧此身盡在光影其畢棄咎乃罔不休示立諸相而無所立廣度㣥生而無所度非大聖至神覆護其孰能如此者歟夫其清涼之為狀也壯矣麗矣高矣博矣靡可得而詳矣赫奕奕而燭地崒巍巍而翊天寒暑隔閡於簷楣雷風擊薄於軒牖星樓月殿憑林跨谷香窟花堂枕峯臥嶺尊顏有睟像設無聲觀之者發惠而興敬居之者應如而合道天花覆地積雪交輝梵響乘虛遠山相答珍木靈草仰施而紛榮神鐘異香降祥而聞聽凄風烈烈誰辨冬春奔溜潺潺不知晨暮經所謂吉祥之宅豈虛也哉開元二十有八載帝之元女曰永穆公主銀漢炳靈瓊娥耀質發我上願歸乎大雄爰捨金錢聿崇妙力奉為皇帝恭造淨土諸像欽鑄銅鐘一駢之以七寶合之以三金影搖安樂之界聲震閻浮之國是以滌除煩惱足以開鑒聾盲二沙門清白懷忠置陳於禪林之院樹法幢以供之聲梵樂以安之惟時孟秋月望慶雲出山西北圓光五百餘丈有萬菩薩同見其間前後感應不可遽數意者其福我聖君乎天寶七載貴妃兄銀青光祿大夫宏農縣開國男上柱國鴻臚卿楊舍舌奉為聖主寫一切經五千四十八卷般若四教天台疏論二千卷俾鎮寺焉海墨樹筆竹紙花書密藏妙論千章萬品置之以寶案盛之以玉箱上裭祐於君親下澤潤於黔庶善夫上座曇財寺主神慶都維那智詵入妙覺海登大空山大德忠翰智空曇開如岸玉寶先覺蓮花不染高僧清超淨法雲光庭觀谷蔭禪枝巖棲戒葉並鸞鳳比德龍象叶心豈即舊而增修亦惟新而超構備致靈應昭彰邑郡以為智德斯遺靡籌稱謂句偈不忘式圖刊勒敢承前矩強述斯文銘曰天作五山兮實曰五臺山上出泉兮有龍為災大聖煦嫗兮戢毒徘徊西南其剎赫赫枚枚翠微之上兮崒崛崔嵬金容月滿兮寶座蓮開祈我聖皇兮其至矣哉以感以通兮為祉為福前際後際兮無去無來公諱慧明字德昭南陽郡人也其先系自軒后彌於周文聃季食沈子高封葉因為氏矣逮問政偶孔好龍得真代有聞也昔者惟帝興運乃聖炳靈風雲相從卜夢通感間氣駿發良弼大來有開必先憑物為象固自然矣則我使君降仙府乘道流追蹤隱淪叶契幽叟結廬澗沚考槃巖椒同人利貞遁代勿用雅好酒德尤邃老經話言解頤精義絶倒誘進不倦虛納盡歡好事集門長者闐里每至升月帷戶和風林薄植杖嘯谷席皮琴山泰然樂生淡乎忘老方且惟性壽遡神仙徇赤松之游蹤黃老之術外身先物歸根致柔緣以大均持以大定色理不蕩寵辱不驚繩繩焉熙熙焉孔德之容罔可測巳故師長旌禮邦族與化智者謂智仁者謂仁雖褐塞桑樞紵衣韋帶必避塗加敬懷風惕息焉是用克聞於家大育厥允則我越公襲上德延慶靈生而知之學而習之有專門之資得丕丞之業才齓羾道既冠同元訊遠嶽之福庭覯幽尋之方士陳咒雷駭吐刃電光沈海莫濡蹈冶匪爇呵萬鬼搦百神啓陰官之符變冥司之籙追究往事坐知來茲膏盲無所遁其形霧露不能滋其疾奇跡多緒嘉聲日聞是以大君孔休辟命薦至入自臥內問以咎徵造膝必誠偶事皆中時更四紀代且五朝順風以請天師斂袵以近皇極緇素莫能出右公卿是惟虛左國家有事天地將旅海嶽公嘗致禮加璧能事潔羞傳駟載途郡邑迎謁者歲四三焉自頃賊臣嗇禍小人吹蠱敢為戎首興此厲階天步未亨人事將殆公乃極陳幽贊大啓聖猷枚卜撰辰並走㣥望作為邦翰先後主憂殄勦元凶翊扶皇統是嘉厥異式揚爾忠爵賞茂於身寵贈光乎考匪此父也曷訓其子匪此子也曷揚其親松楸巳行碑板未立永念終古追存孝思驟請闕廷第如江介遠訪才子枉逮鄙夫趙括論兵多闕舊學班固述史實賴家書顧惟成章伏愧貞石其詞曰真隱夷軌默仙解形倬哉獨立企古遐征殆庶元德升覩丹經服鄉不光和無營築卜岑渚上藥侍琴徐嘯風谷緩步月林白雲怡意清泉洗心曷勝不往曷奇不臨迹因神遠情隨地深舉代方籍皇家未軾肇有懿子載揚令德左慈致物越人辨色司察鬼謀役使神力寵被五君聲聞八極日嘗薄蝕國有多難凶慝扇揚忠烈憤惋亦既先覺克圖幽贊皇哉神武赫然天斷薄言即戎於以戡亂帝念酬庸典開列土豈曜厥身實贈於父朱藩乃錫紫綬是與存致沒榮忠伸孝舉烈烈松柏緒風興悲表墓有闕紀德無詞哀哀嚴蔭欒欒孝思孰傳終古是建豐碑贈慧明銀青光祿大夫歙州刺史子道士法善授鴻臚卿封越國公開元五年太歲丁巳鶉尾七月夷則七日甲辰建觀厥君子大司莫盛於禮樂時事大竇莫極於寵榮非夫周於財厚於行外無鬼怨內無人非將何以享而福之兼而有之寅亮邦家武衛帝室者也府君諱仁忠字揖太原祁人也其先系於有周氏於子晉文武不墜子孫其昌掌兵霸秦為相寧漢纍葉交映兩朝相輝梁之狐鳴司徒匡復於將亂周之龍躍開府扶翼於巳興曾祖景孝府君隋屯田侍郎祖詮府君皇朝明威將軍歙縣開國男汾州刺史考文濟府君侍郎御史吏部員外朝散大夫東臺舍人並典學懿文夷道全德高舉時秀丕承國工府君至和有純上德膺茂軌度恬簡品鑒朗拔篤誠博達英邁奇偉詩書異等容貌出徒飄然清風藹然皓氣安步名教詠歌典墳虛心以遊不思而得至於緝熙遠略繩準嘉言寶匣干將玉臺明鏡未云比也解褐濮州司法參軍要囚有倫亂獄不作泣下丹筆情深赭衣俄轉湖州司兵參軍郵亭利權豪富僦市脂膏不踐玉帛何階頃開元皇帝之潛春闈也以府君后之季父時之正人吳札識音周瑜能聽遷太常主簿尋以地近姻戚望出衣冠仍加朝散大夫試本寺丞屬國家有事上元張皇大禮沿革舊典節制新儀超上柱國而即真焉及皇上御極元妃升后遷太子僕六馬肅若具僚仰止朱袚皇皇鳴珮闕二字載遷鴻臚少卿四極梯航萬酋匍匐且和戎狄未繫單于轉太常少卿九樂備陳三禮大舉觀諸侯之會知天子之尊除左千牛衛將軍晝巡蓋常夜拜是功上謂府君曰昔太上皇嘗居此職特相委任是屬親賢府君兢懼滿盈誠懇辭避鴻私屢抑嘉願莫從霧露不宣腠理成疹詔使旁午御醫崩奔嗚呼杲日或虧良歲多謝命莫能續天將謂何春秋六十有一以開元十年三月癸酉朔捐館宇於京兆興寧里之私第皇帝震悼椒宮感惻制贈安州都督賜物二百段米粟二百石喪葬官供加元纁束帛敕萬年縣令韋令監護即以其年八月壬寅朔安厝左翊太原舊塋禮也長子右衛長史嶷次子尚衣奉御嵩司農主簿崑京兆府參軍崇岧山刀崿崟等並昭獎光訓憲矩令猷文翰發於國華禮則隱於人紀追惟廣孝永言孔亟椎心陵谷泣血松楸是用合謀有成作為不朽直書盛德曲訪小才錫類每深注情彌極文章莫及覽對何言其詞曰千年流慶百代象賢山邱藏澤海水成田文武震耀冠蓋蟬聯業揚史竹名雄鼎鉉其一施及時英駿發后族體大志宏氣和德俶秀舉清流高標雅俗地位雙升才名兩復其二太常禮樂儲宮調護屬國風偃司戎山固先帝昔官聖恩今喻匪親曷保惟貞是附其三三旌未涉六疾爰臻擁福何崇轉禍無神喪葬公備哀榮禮陳寵加黃壤贈及朱輪其四松柏舊塋元纁今飾詔使頻繁椒宮慘惻河山動容風雲變色茲焉永懷古之遺直其五光有允子克荷良弓臣孝家節文章代工椎心匍匐泣血無窮託碑板以題述庶哀敬而永終其六雍聞才不必用慶有必鍾盡滯或牽於時首正終會於古故志氣也不謀於食而謀於道生祿也不在其身即在其子始終備致後起追褒謀翼孔彰前循邁種互體相發他日同時哀榮大來幽明通感長河一曲所以端其濬源高山四成所以極其層阜粵未可測巳府君諱行果字某太原晉陽人也其先柢於嚳稷幹於季文枝於翦離條於吉駿代關絶史朝弗曠官自古及今令名不去六代祖睿後魏尚書令封中山王贈太宰諡曰宣五代祖襲吏部尚書嗣中山王諡曰惠高祖欣散騎常侍北肆州刺史諡曰穆曾祖子景徐州別駕北豫州司馬祖元季府君屬隋政分崩賢人伏匿誓言避地執心葆光迫以族弟本州遠慮物義辟大中正開府儀同三司考有方府君皇朝岷州刺史皆寵義從禮尊仁依信增業以行道兼濟以守官府君閒氣茂靈上德純粹風度簡曠神情秀拔衣冠禮樂超等出徒博達聰明舉衆敵國無成足乎多藝不器非其一名讀聖人之書閲上將之略每及忠公大節孝友至情大息戶庭垂涕枕席憮然有開物致君之意立德顯親之心皇士目之通才許之好仁從田蘇之遊求已慕藺生之義至於手畫耳聽口誦目數覆碑背局答難賦詩公每屑焉人所服者弱冠以方聞授潤州司兵參軍事自頃上官養求同寀侵欲或專咨儉嗇或懷其安荒一覯禮容載敷先訓不俟憲矩若對神明信所謂正刺邪德形物至於此也未幾宅岷州府君憂七日絶漿三年廬墓泣變青柏祥臻素烏野老明徵邦牧表異府君泣面而視瀝肝而言曰所不死者恐貽慈母痛悼豈願居單外買聲名叩頭止之外除宋州司戶參軍日者甫無水虎土有凶年奸吏舞文詭隨畢賦誅求公聚作為賙給者習為常焉府君位其農郊什其居室正之以法糾之以詞勿言寬征足革舊染議者以為平宰社肉武習宮人一荒知秋百為有典矣總章歲駒麗負海欺天國家泛舟討罰銜急宣之明命濟懸軍之見糧董其轉輸舉於幹職是役也繄公遷長安尉無何丁太夫人艱禮異於經毀甚於昔且二尊孝等偏罰事殊往顧慈親今極真性臨穴號叫仰天殞絶嗚呼孝歟春秋三十有七夫經德而夭代人所悲執喪而滅錫類所痛有一於此則可以束名教感人倫況兼而極乎夫人中山甄氏父雍州豐崇府左別將黃陂縣開國男食邑三百戶行府君之息女嬪有令言母有彞則從夫德貴訓子業崇力遷於山祔同於穴粵以景龍三年歲次巳酉十一月庚寅朔十三日壬寅合葬於洛陽清風鄉之原禮也長子晙慷慨英達激揚忠孝誦習文忠昭宣幹略元宰經國上將視師申通明之偉才竭寅亮之誠節其志如石其心如丹五間三連少籍多得空始一作細疑無所逞其計合散無所用其鋒李牧十年武侯七縱盡兵聲於河外揚主威於海濱三士列其多備九原備其光寵開元十一年九月八日制曰存樹其名沒而不朽緬懷褒飾宏是典章兵部尚書同中書門下三品上柱國行果粹靈誕和敏德成器高節夙著盛名有歸雅志未伸促齡永謝象賢之美不展於亨衢而積善之徵克崇於後嗣歲紀方邈徽猷自遠宜申寵贈可使持節隴州諸軍事隴州刺史勳如故次子日敬故汾州永壽宰神和體正經明行修有角無齒惟天之道與才不壽匪身之辜兄也孔懷緬然增感願述先德克贊豐碑高燥有以壯孝心樵蘇有以敬賢墓其詞曰德不孤慶有續迹時晦賢必復名實才尊匪祿博技藝窮簡竹耳暫聞心以蓄手未止目猶逐碑可背奕能覆坐嘯委行道勗孝深至滅太蹙奬教義揚雅俗位嘗卑齡雖促推仁信致戩穀鍾令子發華族振武威廣文囿經廟堂掃邊服昭皇考贈丹轂臣義著子道足哀且榮幽既燭考罔巳性相屬碑乃建神所福雍聞古之常銓今之大寶或籍地因勢或經德自身或禮樂國工或詞學時秀或貴盛終吉或等祀老成或廣孝聞家或納忠刑國有一於是則百斯慶書於牘大其聞矧乃總集高曾備致昆弟悉數以周稱同原而合流息女擇於賢夫允子訓於良冶首止光寵出入震耀若此表裏者矣府君姓劉氏諱知柔字某彭城人也其先府君母弟銀青光祿大夫左常侍崇文館學士修國史子元按史諜推之楚孝王囂之後粵若伯豫談經景瑜志學令言穎邁王喬名理回仁之撫接內使之節義是以嗣前人食舊德鼓簧史傳柱石邦家其來遠矣高祖魏驃騎大將軍北州刺史禕府君諡曰懿曾祖齊散騎常侍文林館學士岷府君祖朝散大夫陳留縣長元邃府君考宋州司馬贈徐州刺史藏器府君莫不都長忠方簡質貞亮業行優絶政理殊尤府君稚節一成立年博達典學為海懿文為林鎮重為山幽靜為谷清淡事約言遣理深謙常後身儉不逼下至若儀形碩偉風神散逸立若尸祭坐若肅賓認金不爭闕馬引罪公庭絶於私議虛室造於元門遠遺之觀物則名顏子之問一知十無以過也嘗以為權略多舋皎察不祥和令乃私靜勝而言立莫神怨行莫人誅固能陳無兵火無爇變奪物性延集福根然後至精啓純全德居厚崇化務俗樹德垂聲可也識者以為張華茂才荀彧遠略雖曰王佐則無天年今府君二者兼之一言得矣觀藝知巧覩葉知秋吉祿大來壽考休佑吾無間然矣逮計考甲科薄遊異迹宅憂殆滅有命從師辭爵廬墳受錫表闕黨錮光復佐職艱貞歷荊府司馬史氏詳矣自皇運啓聖清途授德典國胄司人曹拜司業兼侍讀漸也府君雅仗忠公固拒權寵恥或趨貴哲不易方出荊府長史復戶部徙同宋二州揚益二府一淮南廉察再山東巡撫加銀青光祿大夫進爵彭城侯大府有四公居其三要轄有三公提其兩冢卿有九公自屬國二年尚書有六公以司空十載分爵有五公當侯伯之榮居守有一公兼宗祏之寄巡使有十公兼東土之俗疑輔有三公首儲宮之傅至於仁以養之義以行之慎憲以恤人闢土以祈穀制曰黃霸之奉法循理錫以高車郭賀之惠化仁明加其冕服至於發貯賑施書板賦財巳擊單于且平水土制曰出膺賢守則郡國循良入侯名臣則衣冠準的俾遷榮於北斗宜作範於南宮夫如是有足以論道經邦助天開化增河海之渥澤近日月之景光府君止足發衷辭滿得地終讓八座還忌三旌聖上録德序功養老懷舊就成頤攝留連閒曠制曰乃建儲二聿求賓客允茲懋官惟爾崇德府君固乞骸骨退守田園恩命如第尚給全祿嗚呼日有昃歲有除澤藏山風振海矧伊人也矧伊人也春秋七十有五以開元十一年六月十五日遇疾薨於東都康俗里之私第皇情震悼追褒薦及制曰簪纓舊德楨幹通才清以立身儉而率下出入三署綢繆兩宮曾不憗遺奄然喪逝言念遺老惻悼於懷宜寵贈章式旌泉壤可贈太子少保物二百段米粟各二百石葬日官供幔幕手力等太常考行諡曰文以某年月日葬於河南府緱氏縣景文山原禮也府君昔在平日深戒厚葬祖載服用子壻黃門侍郎宗子皓所營奉祠子某官某等追惟先志臨穴長號謹以焚之殆無遺者尚曰史冊者揚乎名碑版者紀於迹今願抒哀敬却樵蘇發頌聲彰末嗣雍曰唯唯敢不十一千百焉其詞曰漢起沛楚封徐代則九慶實餘惟英秀粵卓犖惣文史張禮樂諫而尊道而勝集百祿延周稱貴自取榮可榮弟紫綬壻黃門始孝思後忠烈歷中外備名節歲彌長聲更揚隱屬國老文昌懷遠圖忌太盛謝人爵委天命月有虧日有昃皇恩動物情惻猗孝子奉惟訓服用薄哀榮順布史簡繼碑石名教開幽名激
