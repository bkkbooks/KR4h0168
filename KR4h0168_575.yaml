front:
  text: 全唐文欽定全唐文卷五百七十五柳宗元七
  hash: sha256:1f8640bb38804d514dcf507682e8f76769778b1a144084f69bcbfb85c18df8d6
body:
  text: 足下幼時未有以異於眾童僕未始知足下及至潭州乃見足下氣益和業益專端重而少言私心乃喜知舜之陶器不苦窳為信然而舜之德可以及土泥而不化其子何哉是又不可信也則足下本有異質而開發之不早耳然開發之要在陶煦然後不失其道則足下亦教諭之至固其進如此也自今者再見足下文益奇藝益工而氣質不更於潭州時乃信知其良也中之正不惑於外君子之道也然則顯然翹然秉其正以抗於世世必為敵讎何也善人少不善人多故愛足下者少而害足下者多吾固欲其方其中圓其外今為足下作說車可詳觀之車之說其有益乎行於世也足下所持韓生毛穎傳來僕甚奇其書恐世人非之今作數百言知前聖不必罪俳也及賀州所未有者文又三篇此言皆不欲出於世者足下默觀之藏焉無或傳焉吾望之至也今日有北人來示將籍田敕是舉數十年之墜典必有大恩澤丈人之冤聞於朝今是舉也必復大任醜正者莫敢肆其吻矣甚賀甚賀僕罪大不得與於恩澤然其喜不減於足下者何也喜聖朝舉數十年墜典太平之路果辟則吾之昧昧之罪亦將有時而明也方築愚溪東南為室耕野田圃堂下以詠至理吾有足樂也足下過今年當侍從北下僕得歸溪上設肴酒以俟趨拜足下發南州當先示僕得與獵夫漁老上下水陸擇味以給膳羞雖不得久亦一時之大願也過是無可道福來辭行急不可畱言不盡所發不具某頓首張操來致足下四月十八日書始復去年十一月書言說車之說及親戚相知之道是二者吾於足下固具焉不疑又何逾歲時而乃克也徒親戚不過欲其勤讀書決科求仕不為大過如斯已矣告之而不更則憂憂則思復之復之而又不更則悲悲則憐之何也戚也安有以堯舜孔子所傳者而往責焉者哉徒相知則思責以堯舜孔子所傳者就其道施於物斯已矣告之而不更則疑疑則思復之復之而又不更則去之何也外也安有以憂悲且憐之之志而強役焉者哉吾於足下固具是二道雖百復之亦將不巳况一二敢怠於言乎僕之言車也以內可以守外可以行其道今子之說曰柔外剛中子何取於車之疏耶果為車柔外剛中則未必不為弊車果為人柔外剛中則未必不為恆人夫剛柔無常位皆宜存乎中有召焉者在外則出應之應之咸宜謂之時中然後得名為君子必曰外恆柔則遭夾谷武子之臺及為蹇蹇匪躬以革君心之非莊以莅乎人君子其不克歟中恆剛則當下氣怡色濟濟切切哀矜淑問之事君子其卒病歟吾以為剛柔同體應變若化然後能志乎道也今子之意近是也其號非也內可以守外可以行其道吾以為至矣而子不欲焉是吾所以惕惕然憂且疑也今將申告子以古聖人之道書之言堯曰允恭克讓言舜曰溫恭允塞禹聞善言則拜湯乃改過不恡高宗曰啟乃心沃朕心惟此文王小心翼翼日昃不暇食坐以待旦武王引天下誅紂而代之位其意宜肆而曰予小子不敢荒寧周公踐天子之位握髮吐哺孔子曰言忠信行篤敬其弟子言曰夫子溫良恭儉讓以得之今吾子曰自度不可能也然則自堯舜以下與子果異類耶樂放弛而愁檢局雖聖人與子同聖人能求諸中以厲乎巳久則安樂之矣子則肆之其所以異乎聖者在是決也若果以聖與我異類則自堯舜以下皆宜縱目卬鼻四手八足鱗毛羽鬣飛走變化然後乃可苟不為是則亦人耳而子舉將外之耶若然者聖自聖賢自賢眾人自眾人咸任其意又何以作言語立道理千百年天下傳道之是皆無益於世獨遺好事者藻繢文字以矜世取譽聖人不足重也故曰中人以上可以語上唯上智與下愚不移吾以子近上智今其言曰自度不可能也則子果不能為中人以上耶吾之憂且疑者以此凡儒者之所取大莫尚孔子孔子七十而縱心彼其縱之也度不踰矩而後縱之今子年有幾自度果能不踰矩乎而遽樂於縱也傅說曰惟狂克念作聖今夫狙猴之處山叫呼跳梁其輕躁狼戾異甚然得而縶之未半日則定坐求食唯人之為制其或優人得之加鞭箠狎而擾焉跪起趨走咸能為人所為者未有一焉狂奔掣頓踣弊自絕故吾信夫狂之為聖也今子有賢人之資反不肯為狂之克念者而曰我不能捨子其孰能乎是孟子之所謂不為也非不能也凡吾之致書為說車皆聖道也今子曰我不能為車之說但當則法聖道而內無愧乃可長久嗚呼吾車之說果不為聖道耶吾以內可以守外可以行其道告子今子曰我不能翦翦拘拘以同世取榮吾豈教子為翦翦拘拘者哉子何考吾說車之不詳也吾之所云者其道自堯舜禹湯高宗文武周公孔子皆由之而子不謂聖道抑以吾為與世同波工為翦翦拘拘者以是教已固迷吾文而懸定吾意甚不然也聖人不以人廢言吾雖少時與世同波然未嘗翦翦拘拘也又子自言處眾中偪側擾攘欲棄去不敢猶勉強與之居苟能是何以不克為車之說耶忍污雜囂譁尚可恭其體貌遜其言辭何故不可吾之說吾未嘗為佞且偽其旨在恭寬退讓以售聖人之道及乎人如斯而已矣堯舜之讓禹湯高宗之戒文王之小心武王之不敢荒寧周公之吐握孔子之六十九未嘗縱心彼七八聖人者所為若是豈恆愧於心乎慢其貌肆其志茫洋而後言偃蹇而後行道人是非不顧齒類人皆心非之曰是禮不足者甚且見罵如是而心反不愧耶聖人之禮讓其且為偽乎為佞乎今子又以行險為車之罪夫車之為道豈樂行於險耶度不得已而至乎險期勿敗而已耳夫君子亦然不求險而利也故曰危邦不入亂邦不居國無道其默足以容不幸而及於危亂期勿禍而已耳且子以及物行道為是耶非耶伊尹以生人為已任管仲釁浴以伯濟天下孔子仁之凡君子為道捨是宜無以為大者也今子書數千言皆未及此則學古道為古辭尨然而措於世其卒果何為乎是之不為而甘羅終軍以為慕棄大而錄小賤本而貴末夸世而釣奇苟求之於後世以聖人之道為不若二子僕以為過矣彼甘羅者左右反覆得利棄信使秦背燕之親己而反與趙合以致危於燕天下是以益知秦無禮不信視函谷關若虎豹之窟羅之徒實使然也子而慕之非夸世歟彼終軍者誕譎險薄不能以道匡漢主好戰之志視天下之勞若觀蟻之移穴翫而不戚人之死於胡越者赫然千里不能諫而又縱臾之已則決起奮怒掉強越挾淫夫以媒老婦欲蠱奪人之國智不能斷而俱死焉是無異盧狗之遇嗾呀呀而走不顧險阻唯嗾者之從何無已之心也子而慕之非釣奇歟二小子之道吾不欲吾子言之孔子曰是聞也非達也使二小子及孔子氏曾不得與琴張牧皮狂者之列是固不宜以為的也且吾子之要於世者處耶出耶主上以聖明進有道興大化枯槁伏匿縲錮之士皆思踊躍洗沐期輔堯舜萬一有所不及丈人方用德藝達於邦家為大官以立於天下吾子雖欲為處何可得也則固出而已矣將出於世而仕未二十而任其心吾為子不取也馮婦好搏虎卒為善士周處狂橫一旦改節皆老而自克今子素善士年又甚少血氣未定而忽欲為阮咸嵇康之所為守而不化不肯入堯舜之道此甚未可也吾意足下所以云云者惡佞之尤而不悅於恭耳觀過而知仁彌見吾子之方其中也其乏者獨外之圓耳屈子曰懲於羹者而吹虀吾子其類是歟佞之惡而恭反得罪聖人所貴乎中者能時其時也苟不適其道則肆與佞同山雖高水雖下其為險而害也要之不異足下當取吾說車申而復之非為佞而利於險也明矣吾子惡乎佞而恭且不欲今吾又以圓告子則圓之為號固子之所宜甚惡方於恭也又將千百焉然吾所謂圓者不如世之突梯苟冒以務利乎己者也固若輪焉非特於可進也銳而不滯亦將於可退也安而不挫欲如循環之無窮不欲如轉丸之走下也乾健而運離麗而行夫豈不以圓克乎而惡之也吾年十七求進士四年乃得舉二十四求博學宏詞科二年乃得仕其間與常人為㣥輩數十百人當時志氣類足下時遭訕罵詬辱不為之面則為之背積八九年日思摧其形鋤其氣雖甚自挫折然已得號為狂疎人矣及為藍田尉畱府庭旦暮走謁於大官堂下與卒伍無別居曹則俗吏滿前更說買賣商算贏縮又二年為此度不能去益學和其光同其塵雖自以為得然已得號為輕薄人矣及為御史郎官自以登朝廷利害益大愈恐懼思欲不失色於人雖戒礪加切然卒不免為連累廢逐猶以前時遭狂疎輕薄之號既聞於人為恭讓未洽故罪至而無所明之到永州七年矣蚤夜惶惶追思咎過往來甚熟講堯舜孔子之道亦熟益知出於世者之難自任也今足下未為僕嚮所陳者宜乎欲任己之志此與僕少時何異然循吾嚮所陳者而由之然後知難耳今吾先盡陳者不欲足下如吾更訕辱被稱號已不信於世而後知慕中道費力而多害故勤勤焉云爾而不巳也子其詳之熟之無徒為煩言往復幸甚又所言書意有不可者令僕專專為掩匿覆葢之慎勿與不知者道此又非也凡吾與子往復皆為言道道固公物非可私而有假令子之言非是則子當自求暴揚之使人皆得刺列卒采其可者以正乎已然後道可顯達也今乃專欲覆葢掩匿是固自任其志而不求益者之為也士傳言庶人謗於道子產之鄉校不毀獨何如哉君子之過如日月之蝕又何葢乎是事吾不能奉子之教矣幸悉之足下所為書言文章極正其辭奧雅後來之馳於是道者吾子且以為蒲捎駃騠何可當也其說韓愈處甚好其他但用莊子國語文字太多反累正氣果能遺是則大善矣憂閔廢錮悼籍田之罷意思懇懇誠愛我厚者吾自度罪大敢以是為欣且戚耶但當把鋤荷鍤決溪泉為圃以給茹其隟則浚溝池藝樹木行歌坐釣望青天白雲以此為適亦足老死無戚戚者時時讀書不忘聖人之道已不能用有我信者則以告之朝廷更宰相來政事益修丈人日夕還北闕吾待子郭南亭上期口言不久矣至是當盡吾說今因道人行麤道大旨如此宗元白九月某白沈侯足下無恙蒼頭至得所來問志氣盈牘博我以風賦比興之旨僕之樸騃專魯而當惠施鍾期之位深自恧也又覽所著文宏博中正富我以琳琅珪璧之寶甚厚僕之狹陋蚩鄙而膺東阿昭明之任又自懼也烏可取識者歡笑以為知己羞進越高視僕所不敢然特枉將命猥承厚貺豈得固拒雅志默默而已哉謹以所示布露於聞人羅列乎坐隅使識者動目聞者傾耳幾於萬一用以為報也嗟乎僕常病興寄之作堙鬱於世辭有枝葉蕩而成風益用慨然間歲興化里蕭氏之廬覩足下詠懷五篇僕乃拊掌愜心吟翫為娛告之能者誠亦響應今乃有五十篇之贈其數相什其功相百覽者歎息謂予知文此又足下之賜也幸甚幸甚勉懋厥志以取榮盛時若夫古今相變之道質文相生之本高下豐約之所自長短大小之所出子之言云又何訊焉來使告遽不獲申盡輒奉草具以備還答不悉宗元白得楊八書知足下遇火災家無餘儲僕始聞而駭中而疑終乃大喜蓋將弔而更以賀也道遠言略猶未能究知其狀果若蕩焉泯焉而悉無有乃吾所以尤賀者也足下勤奉養樂朝夕惟恬安無事是望也今乃有焚煬赫烈之虞以震駭左右而脂膏滫瀡之具或以不給吾是以始而駭也凡人之言皆曰盈虛倚伏去來之不可常或將大有為也乃始厄困震悸於是有水火之孼有㣥小之慍勞苦變動而後能光明古之人皆然斯道遼濶誕漫雖聖人不能以是必信是故中而疑也以足下讀古人書為文章善小學其為多能若是而進不能出㣥士之上以取顯貴者蓋無他焉京城人多言足下家有積貨士之好廉名者皆畏忌不敢道足下之善獨自得之心蓄之銜忍而不出諸口以公道之難明而世之多嫌也一出口則蚩蚩者以為得重賂僕自貞元十五年見足下之文章蓄之者蓋六七年未嘗言是僕私一身而負公道久矣非特負足下也及為御史尚書郎自以幸為天子近臣得奮其舌思以發明足下之鬱塞然時稱道於行列猶有顧視而竊笑者僕良恨修己之不亮素譽之不立而為世嫌之所加常與孟幾道言而痛之乃今幸為天火之所滌盪凡眾之疑慮舉為灰埃黔其廬赭其垣以示其無有而足下之才能乃可顯白而不污其實出矣是祝融回祿之相吾子也則僕與幾道十年之相知不若茲火一夕之為足下譽也宥而彰之使夫蓄於心者咸得開其喙發策決科者授子而不慄雖欲如嚮之蓄縮受侮其可得乎於茲吾有望於爾是以終乃大喜也古者列國有災同位皆相弔許不弔災君子惡之今吾之所陳若是有以異乎古故將弔而更以賀也顏曾之養其為樂也大矣又何闕焉足下前要僕文章古書極不忘候得數十幅乃併往耳吳二十一武陵來言足下為醉賦及對問大善可寄一本僕近亦好作文與在京城時頗異思與足下輩言之桎梏甚固未可得也因人南來致書訪死生不悉宗元白二十一日宗元白辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者雖嘗好言論為文章甚不自是也不意吾子自京師來蠻夷間乃幸見取僕自卜固無取假令有取亦不敢為人師為眾人師且不敢况敢為吾子師乎孟子稱人之患在好為人師由魏晉氏以下人益不事師今之世不聞有師有輒譁笑之以為狂人獨韓愈奮不顧流俗犯笑侮收召後學作師說因抗顏而為師世果㣥怪聚駡指目牽引而增與為言辭愈以是得狂名居長安炊不暇熟又挈挈而東如是者數矣屈子賦曰邑犬㣥吠吠所怪也僕往聞庸蜀之南恆雨少日日出則犬吠予以為過言前六七年僕來南二年冬幸大雪踰嶺被南越中數州數州之犬皆蒼黃吠噬狂走者累日至無雪乃已然後始信前所聞者今韓愈既自以為蜀之日而吾子又欲使吾為越之雪不以病乎非獨見病亦以病吾子然雪與日豈有過哉顧吠者犬耳度今天下不吠者幾人而誰敢衒怪於㣥目以召鬧取怒乎僕自謫過以來益少志慮居南中九年增脚氣病漸不喜鬧豈可使呶呶者早暮咈吾耳騷吾心則固僵仆煩憒逾不可過矣平居望外遭齒舌不少獨欠為人師耳抑又聞之古者重冠禮將以責成人之道是聖人所尤用心者也數百年來人不復行近有孫昌允者獨發憤行之既成禮明日造朝至外廷薦笏言於卿士曰某子冠畢應之者咸憮然京兆尹鄭叔則怫然曳笏卻立曰何預我耶廷中皆大笑天下不以非鄭尹而怪孫子何哉獨為所不為也今之命師者大類此吾子行厚而辭深凡所作皆恢恢然有古人形貌雖僕敢為師亦何所增加也假而以僕年先吾子聞道著書之日不後誠欲往來言所聞則僕固願悉陳中所得者吾子苟自擇之取某事去某事則可矣若定是非以教吾子僕才不足而又畏前所陳者其為不敢也決矣吾子前所欲見吾文既悉以陳之非以耀明於子聊欲以觀子氣色誠好惡何如也今書來言者皆大過吾子誠非佞譽誣諛之徒直見愛甚故然耳始吾幼且少為文章以辭為工及長乃知文者以明道是故不苟為炳炳烺烺務采色夸聲音而以為能也凡我所陳皆自謂近道而不知道之果近乎遠乎吾子好道而可吾文或者其於道不遠矣故吾每為文章未嘗敢以輕心掉之懼其剽而不留也未嘗敢以怠心易之懼其弛而不嚴也未嘗敢以昏氣出之懼其昧沒而雜也未嘗敢以矜氣作之懼其偃蹇而驕也抑之欲其奧揚之欲其明疎之欲其通廉之欲其節激而發之欲其清固而存之欲其重此吾所以羽翼夫道也本之書以求其質本之詩以求其恆本之禮以求其宜本之春秋以求其斷本之易以求其動此吾所以取道之原也參之穀梁氏以厲其氣參之孟荀以暢其支參之莊老以肆其端參之國語以博其趣參之離騷以致其幽參之太史以著其潔此吾所以旁推交通而以為之文也凡若此者果是耶非耶有取乎抑其無取乎吾子幸觀焉擇焉有餘以告焉苟亟來以廣是道子不有得焉則我得矣又何以師云爾哉取其實而去其名無招越蜀吠怪而為外廷所笑則幸矣宗元復白二十八日宗元白前時所枉文章諷讀累日辱致來簡受賜無量然竊觀足下所以殷勤其文旨者豈非深寡和之憤積無徒之歎懷不能已赴訴於僕乎如僕尚何為者哉且士之求售於有司或以文進或以行達者稱之不患無成足下之文左馮翊崔公先唱之矣秉筆之徒由是增敬足下之行汝南周穎客又先唱之矣逢掖之列亦以加慕夫如是致隆隆之譽不久矣又何戚焉古之道上延乎下下信乎上上下洽通而薦能之功行焉故天子得宜為天子者薦之於天諸侯得宜為諸侯者薦之於王大夫得宜為大夫者薦之於君士得宜為士者薦於有司薦於天堯舜是也薦於王周公之徒是也薦於君鮑叔牙子罕子皮是也薦於有司而專其美者則僕未之聞也是誠難矣古猶難之而况今乎獨不得與足下偕生中古之間進相援也退相拯也已乃出乎今世雖王林國韓長孺復生不能為足下抗手而進以取僇笑矧僕之齷齪者哉若將致僕於奔走先後之地而役使之則勉充雅素不敢告憊嗚呼始僕之志學也甚自尊大頗慕古之大有為者汨沒至今自視缺然知其不盈素望久矣上之不能交誠明達德行延孔子之光燭於後來次之未能勵材能興功力致大康於民垂不滅之聲退乃倀倀於下列呫呫於末位偃仰驕矜道人短長不亦冒先聖之誅乎固吾不得已耳樹勢使然也穀梁子曰心志既通而名譽不聞友之過也蓋舉知揚善聖人不非况足下有文行唱之者有其人矣繼其聲者吾敢闕焉其餘去就之說則足下觀時而已不悉宗元白二十五日某白馮翊嚴生足下得生書言為師之說怪僕所作師友箴與答韋中立書欲變僕不為師之志而屈己為弟子凡僕所為二文其卒果不異僕之所避者名也所憂者其實也實不可一日忘僕聊歌以為箴行且求中以益己慄慄不敢暇又不敢自謂有可師於人者耳若乃名者方為薄世笑罵僕脆怯尤不足當也內不足為外不足當眾口雖懇懇見迫其若吾子何實之要二文中皆是也吾子其詳讀之僕見解不出此吾子所云仲尼之說豈易耶仲尼可學不可為也學之至斯則仲尼矣未至而欲行仲尼之事若宋襄公好霸而敗國卒中矢而死仲尼豈易言耶馬融鄭元者二子獨章句師耳今世固不少章句師僕幸非其人吾子欲之其有樂而望吾子者矣言道講古窮文辭以為師則固吾屬事僕才能勇敢不如韓退之故又不為人師人之所見有同異吾子無以韓責我若曰僕拒千百人又非也僕之所拒拒為師弟子名而不敢當其禮者也若言道講古窮文辭有來問我者吾豈嘗瞋目閉口耶敬叔吾所信愛今不得見其人又不敢廢其言吾子文甚暢遠恢恢乎其闢大路將疾馳也攻其車肥其馬長其筴調其六轡中道之行大都捨是又奚師歟亟謀於知道者而考諸古師不乏矣幸而亟來終日與吾子言不敢倦不敢愛不敢肆苟去其名全其實以其餘易其不足亦可交以為師矣如此無世俗累而有益乎己古今未有好道而避是者宗元白秀才足下僕避師名久矣往在京都後學之士到僕門日或數十人僕不敢虛其來意有長必出之有不至必惎之雖若是當時無師弟子之說其所不樂為者非以師為非弟子為罪也有兩事故不能自視以為不足為一也世久無師弟子決為之且見非且見罪懼而不為二也其大說具答韋中立書今以往可觀之秀才貌甚堅辭甚強僕自始覿固奇秀才及見兩文愈益奇雖在京都日數十人到門者誰出秀才右耶前已必秀才可為成人僕之心固虛矣又何鯤鵬互鄉於尺牘哉秋風益高暑氣益衰可偶居卒談秀才時見咨僕有諸內者不敢愛惜大都文以行為本在先誠其中其外者當先讀六經次論語孟軻書皆經言左氏國語莊周屈原之辭稍采取之穀梁子太史公甚峻潔可以出入餘書俟文成異日討也其歸在不出孔子此其古人賢士所懍懍者求孔子之道不於異書秀才志於道慎勿怪勿雜勿務速顯道苟成則勃然爾久則蔚然爾源而流者歲旱不涸蓄穀者不病凶年蓄珠玉者不虞殍死矣然則成而久者其術可見雖孔子在為秀才計未必過此不具宗元白足下所封示退之書云欲推避僕以文墨事且以勵足下若退之之才過僕數等尚不宜推避於僕非其實可知固相假借為之詞耳退之所敬者司馬遷揚雄遷於退之固相上下若雄者如太元法言及四愁賦退之獨未作耳使作之加恢奇至他文過揚雄遠甚雄之遣言措意頗短局滯止不若退之猖狂恣睢肆意有所作若然者使雄來尚不宜推避而况僕耶彼好獎人善以為不屈己善不可獎故慊慊云爾也足下幸勿信之且足下志氣高好讀南北史書通國朝事穿穴古今後來無能和而僕稚駿卒無所為但趦趄文墨筆硯淺事今退之不以吾子勵僕而反以僕勵吾子愈非所宜然卒篇欲足下自挫抑合當世事以固當雖僕亦知無出此吾子年甚少知己者如麻不患不顯患道不立耳此僕以自勵亦以佐退之勵足下不宣宗元頓首再拜三日宗元白自得秀才書知欲僕為序然吾為文非苟然易也於秀才則吾不敢愛吾在京師時好以文寵後輩由吾文知名者亦為不少焉自遭斥逐禁錮益為輕薄小兒譁囂㣥朋增飾無狀當途人率謂僕垢污重厚舉將去而遠之今不自料而序秀才秀才無乃未得嚮時之益而受後事之累吾是以懼潔然盛服而與負塗者處而又何賴焉然觀秀才勤懇意甚久遠不為頃刻私利欲以就文雅則吾曷敢以讓當為秀才言之然而無顯出於今之世視不為流俗所扇動者乃以示之既無以累秀才亦不以增僕之詬罵也計無宜於此若果能是則吾之荒言出矣宗元白十二日宗元白始者負戴經籍退跡野廬塊守蒙陋坐自擁塞不意足下曲見記憶遠辱書訊貺以高文開其知思而又超僕以宗師之位貸僕以邱山之號流汗伏地不知逃匿幸過厚也前時獲足下灌鍾城銘竊用唱導於聞人僕常赧然羞其僭踰今覽足下尺牘殷勤備厚似欲僕贊譽者此固所願也詳視所貺曠然以喜是何旨趣之博大詞采之蔚然乎鼓行於秀造之列此其戈矛矣舉以見投為賜甚大俯用忖度不自謂宜顧視何德而克堪哉且又教以耘其蕪穢甚非所宜僕不敢聞也其他唯命宗元白崔生足下辱書及文章辭意良高所嚮慕不凡近誠有意乎聖人之言然聖人之言期以明道學者務求諸道而遺其辭辭之傳於世者必由於書道假辭而明辭假書而傳要之之道而已耳道之及及乎物而已耳斯取道之內者也今世因貴辭而矜書粉澤以為工遒密以為能不亦外乎吾子之所言道匪辭而書其所望於僕亦匪辭而書是不亦去及物之道愈以遠乎僕嘗學聖人之道身雖窮志求之不已庶幾可以語於古恨與吾子不同州部閉口無所發明觀吾子文章自秀士可通聖人之說今吾子求於道也外而望於予也愈外是其可惜歟吾且不言是負吾子數千里不棄朽廢者之意故復云爾也凡人好辭工書者皆病癖也吾不幸蚤得二病學道以來日思砭鍼攻熨卒不能去纏結心腑牢甚願斯須忘之而不克竊嘗自毒今吾子乃始欽欽思易吾病不亦惑乎斯固有潛塊積瘕中子之內藏恬而不悟可憐哉其卒與我何異均之二病書字益下而子之意又益下則子之病又益篤甚矣子癖於伎也吾嘗見病心腹人有思啗土炭嗜酸醎者不得則大戚其親愛之者不忍其戚因探而與之觀吾子之意亦已戚矣吾雖未得親愛吾子然亦重來意之勤有不忍矣誠欲分吾土炭酸醎吾不敢愛但遠言其證不可也俟面乃悉陳吾狀未相見且試求良醫為方已之苟能已大善則及物之道專而易通若積結既定醫無所能已幸期相見時吾決分子其啗嗜者不具宗元白某白向得秀才書及文章類前時所辱遠甚多賀多賀秀才志為文章又在族父處蚤夜孜孜何畏不日日新又日新也雖間不奉對苟文益日新則若亟見矣夫觀文章宜若懸衡然增之銖兩則俯反是則仰無可私者秀才誠欲令吾俯乎則莫若增重其文今觀秀才所增益者不啻銖兩吾固伏膺而俯矣愈重則吾俯滋甚秀才其懋焉苟增而不已則吾首懼至地耳又何間疎之患乎還答不悉宗元白二十五日宗元白兩月來三辱生書書皆逾千言意若相望僕以不對答引譽者然僕誠過也而生與吾文又十卷噫亦多矣文多而書頻吾不對答而引譽宜可自反而來徵不肯相見亟拜亟問其得終無辭乎凡生十卷之文吾已略觀之矣吾性駿滯多所未甚諭安敢懸斷是且非耶書抵吾必曰周孔周孔安可當也儗人必於其倫生以直躬見抵宜無所諛道而不幸乃曰周孔吾吾豈得無駭怪且疑生悖亂浮誕無所取幅尺以故愈不對答來柳州見一刺史即周孔之今而去吾道連而謁於潮之二邦又得二周孔去之京師京師顯人為文詞立聲名以千數又宜得周孔千百何吾生胷中擾擾焉多周孔哉吾雖少為文不能自雕斵引筆行墨快意累累意盡便止亦何所師法立言狀物未嘗求過人亦不能明辨生之才致但見生用助字不當律令唯以此奉答所謂乎歟耶哉夫者疑辭也矣耳焉也者決辭也今生則一之宜考前聞人所使用與吾言類且異慎思之則一益也庚桑子言藿蠋鵠卵者吾取焉道連而謁於潮其卒可化乎然世之求知音者一遇其人或為十數文即務往京師急日月犯風雨走謁門戶以冀苟得今生年非甚少而自荊來柳自柳將道連而謁於潮途遠而深矣則其志果有異乎又狀貌嶷然類丈夫視端形直心無歧徑其質氣誠可也獨要謹充之爾謹充之則非吾獨能生勿怨亟之二邦以取法時思吾言非固拒生者孟子曰予不屑之教誨也者是亦教誨而已矣宗元白月日使持節柳州諸軍事守柳州刺史柳宗元謹再拜獻書於相公閤下宗元聞有行三塗之艱一有難字而墜千仞之下者仰望於道號以求出過之者日千百人皆去而不顧就令哀而顧之者不過攀木俯首深矉太息良久而去耳卒無可奈何然其人猶望而不止也俄而有若烏獲者持長綆千尋徐而過焉其力足為也其器足施也號之而不顧顧而曰不能力則其人知必死於大壑矣何也是時不可遇而幸遇焉而又不逮乎己然後知命之窮勢之極其卒呼憤自斃不復望於上矣宗元曩者齒少心銳徑行高步不知道之艱以陷乎大阨窮躓殞墜廢為孤囚日號而望者十四年矣其不顧而去與顧而深矉者俱不乏焉然猶仰首伸吭張目而視曰庶幾乎其有異俗之心非常之力當路而垂仁者耶今閤下以仁義正直入居相位宗元實竊拊心自慶以為獲其所望故敢致其詞以聲其哀若又捨而不顧則知沈埋踣斃無復振矣伏惟動心焉宗元得罪之由致謗之自以閤下之明其知之久矣繁言蔓詞秪益為黷伏惟念墜者之至窮錫烏獲之餘力舒千尋之綆垂千仞之艱致其不可遇之遇以卒成其幸庶號而望者得畢其誠無使呼憤自斃沒有餘恨則士之死於門下者宜無先焉生之通塞決在此舉無任戰汗隕越之至不宣宗元惶恐再拜
