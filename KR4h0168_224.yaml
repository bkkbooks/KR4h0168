front:
  text: 全唐文欽定全唐文卷二百二十四張説四
  hash: sha256:a81c2270f030709d1dd882d2c1566c368a8bae55ed3b4d8e412e3f780027b345
body:
  text: 臣頓首死罪皇帝陛下先帝以臣踐履忠孝使臣啓發聖明故得侍讀春宮夙承天眷景雲中歲兼掌樞衡內當沸騰之口外禦傾奪之勢陛下監撫既安自天所祐臣協贊之意明神啓之開元之始首典鈞軸智小任大福過災生出守三州違離六載曲直非已升降由人惟君知臣事不待説今改秩邊鎮委重戎麾竊以兩蕃近和能無同異九姓遠附未聞撫納欲恃賊殺無侵擾之慮保寧兩蕃受徵發之盟臣愚料之恐未然矣何者賊殺新立必逞兵威賊兵所加必收九姓九姓若去兩蕃搖矣九姓雖屬并州節度然共幽州密邇脫有風塵何事不至臣熟聞幽州兵馬寡弱卒欲排比未可即戎城中倉糧全無貯積設若來迫臣實憂之伏乞聖慈深以垂意博詢舊將豫為籌畫若早圖之必無後悔且孤臣總衆易起猜疑寬大失濟事之宜嚴整招怨黷之謗遠辭天聽臨路倣徨如有論告臣身奏劾軍事者乞追臣面問對定真虛則日月無可蔽之期幽遠有自通之望伏願留書在內時加矜察右被牒奉敕責通大總管功狀者自契丹背恩營州失守前軍喪律榆關不開幽平鳥棲於重塹戎羯虎食於四野燕南諸城十僅存一河朔之地人挾兩端由是豺狼入於牢穽蜂蠆出於懷袖王受服不宿孤劒先驅寇讎日深甲兵未繼於時鳩合步騎不滿三千彼衆我寡兵怯虜熾且保關守塞力猶不禦况土人弄兵轉相攻拔外召夷狄內據險隘冀州既陷勢將不巳當決水之衝承烈火之焰逆風撲燎摧岸塞河韓白見之知其難矣王權以料敵靜而鎮下宣國恩以撫寧曉愚俗以逆順督將吏以忠義示士伍以嚴肅深籌祕於六奇潛檄通於千里滄瀛貝博響援增氣幽易恆定聲威有立而又分兵井陘杜其西望引軍河漕阻此上流張虛旗於趙城設奇兵於襄國亦猶吳人潛軍於巢縣而見舟豫章漢將捷徑於武關而聲出崤澠蓋廣援以安衆多方以誤敵故能舉無遺策兵不踰時滌昴宿於妖氛拔冀方於塗炭俾皇靈溥暢黔首昭蘇朝廷釋東顧之憂漳滏息南侵之患然後歸剽掠返流亡業窮乏賑痍傷僵暴皆掩死喪復怨賞不失勞亦無濫受罰不漏罪亦無冤人則王有大勳於是役也而又誠以奉上義以利人至忠之狀有三為善之迹有五所謂忠者一曰思致命也初戎寇方殷王乘驛赴救衆才數騎捍敵㣥醜山東父老如恃山河既而王躬擐甲胄吐誠師旅誓在盡敵以報前讎故得感激來戰決命爭勝二曰能果斷也凶黨狂狡飛轉妖書吠堯謗舜間誘愚惑事斯蔓結搖我人心王陰察州閭掩求魁蠧獲應賊書人耿羅漢等一十三人焚書伏罪衆而後定故得破謀殺諜悖計無施三曰誠感神也王地維近屬躬當大任所過山川鬼神之地罔不精意懇禱以請云天子聖明皇天輔德實降靈助以濟神兵幽感明祇多獲孚祐故得行師之處勝風送旗合戰之時興雲翊陳金鼓所向冰消草靡所謂善者一曰均下也飲食勞逸與將士必同二曰潔己也遍賞有功王秋毫無受三曰詢善也國之彞典成誦在心閲實定名必咨㣥議四曰嫉惡也每戮一人親數其罪必深加咎責使愧恥於地五曰不伐也賊平之日將吏賀功王稱美天威推勞士衆兢兢然若不己有也惟聖人神武制命豫授兵符惟大總管忠善龔行克成廟算今者顯號年紀騰輝國籍方謂垂範雲臺勒功彞器而杕杜遣宴甫率於舊章茅土增封殊末於宗正此壯夫義士所以竊議而長歎者也雖樹下不言用歸功於明主然策勳有典何勸善於戎臣敢憑下問是用大陳其所正復州縣招撫歸降補署官僚存集流迸擒殺凶醜收獲軍實與吏士共功者具如別狀右伏奉恩旨今日屬下元賜臣等侍從升降聖闕禮謁大聖尊容行香之際日西南有彩雲見者伏以大道無形至誠斯應上元降福感而遂通步輦涉於齋宮虔修香火彩雲生於曉日遽發祥光是知聖德與天心合符萬靈與㣥仙叶贊臣叨倍侍從如升汗漫之遊承恩禮謁更覩氤氳之瑞榮幸之極千載一時無任欣慶之至右臣等伏以涼州遙稟神算大振天威吐蕃小醜應時摧敗元惡渠魁乘勢俘戮隻輪匹馬坐見無遺雖虞舜之格有苗黃軒之征涿鹿未有廓清氛祲如今日之盛者臣等無任慶快之至右內侍尹鳳翔宣口敕得所進鬬羊表及鄭國夫人碑今賜卿綵羅二十匹絹一千匹者伏以鬬羊薄技恩感戰士之心雕蟲陋詞愧稱賢母之德效輕賞重戴厚慚深臣子之情豈望天報右臣伏見聖札金字八分寫道經兩卷以為惠文太子三七追福天毫發彩宸翰騰輝色麗風雲光逾日月伏惟陛下孝弟之至通於神明俯念天倫用資幽贊當茲炎暑服此勤勞事絶古今感深名教臣忝司右職載考前王未有親親之至楷隸之美如此之備也足以作則貽範垂之無窮伏望宣付史館以光典策無任誠懇慚惶之至右內侍尹鳳翔宣示御書大通禪師碑額六字畫起平雲點蹲芒玉戈矛攢倚鸞鶴交飛神功發於至想睿思成於元德實謂天龍捧持虛空稱贊逝者如在薦福知歸臣棲志禪門撰碑靈塔幸遇聖情崇道御書假貸刻星辰於嘉石爛日月於封邱感極悲生恩深無答臣無任望外殊澤之至右內使陳忠盛宣旨賜臣痢藥臣攝生無方自遺疾疢聖慈矜憫垂恩救護氣衰力憊忽吞永命之符腸滑胃虛更餌返魂之草蒙天營佑指日痊平雖萬粉灰何酬造化謹附忠盛奉狀陳謝以聞乾封舊儀禪社首享地祇以先后配饗文德皇后配地祇天后為亞獻越國太為終獻以宮闈接神有乖舊典上元不祐遂有天授易姓之事宗社中圮公族誅滅皆由此也景龍之季有事圜丘韋庶人為亞獻皆以婦人升壇執籩豆泄瀆穹蒼享禮不潔未及踰年國有大難亞獻終獻終受其咎平座齋郎及女人執祭者多亦夭卒今主上尊天敬神必須革正斯禮請以睿宗大聖真皇帝配皇地祇侑神作三獻禮上初獻邠王守禮亞獻宋王成器終獻晉元帝建武二年定郊禮於建業之南去城七里一壇之上尊卑雜位千有五百神去聖日遠損益不同臣等按祠令五星巳下內官五十三座中官一百六十座外官一百四座衆星三百六十座臣共所由勘史傳及星經內外所主職有尊卑舊圖座位升降頗錯今奉墨敕授尊卑升降又新加降等座總三百一十九座并衆星三百六十九座凡六百八十八座具圖如左吉凶異儀降殺殊節以日易月自久行之其在凶時不可言祭祀既祭之後不可存凶事若祭而廢樂吉不除凶是五禮交亂而吉凶駁雜夫王者奉神祇承宗廟二至郊祀四時蒸嘗鼓鐘所以格上下之神舞詠所以象祖先之德於其有祭不可闕也今山陵已畢清廟既祔於禮則吉祭於時則踰年宜遵漢禮以復常度請舉永徽故事以行先朝之典謹議禮記漢朝所編遂為歷代不刊之典今去聖久遠恐難改易今之五禮儀注貞觀顯慶兩度修前後頗有不同其中或未折衷望與學士等更討論古今刪改行用問朕聞立極開基之主經文緯武之君莫不法象殊流污隆異制至於安人導俗咸即運以垂芳緝化宣風各因時而播美是以道孚繩木爰膺九翼之年圖祕龜龍用啓六爻之代窮桑御歷狎威鳳以踐司軒邱列位因景雲而命職徵汾陽之迹則十政方凝俯河濱之化則四門攸闢祥披玉斗理九土以興功祚徙金精調五聲而作教周崇六禮仁義之道為先漢設三章皇霸之圖斯雜皆所以牢籠八際檃括三靈齊四大以居尊協五神而稱正且隨時之義既不相沿師古之言又聞前誥朕欽承先聖對越上元當寧興懷鎮切推溝之慮凝旒結想方深馭朽之情思所以式展宏猷勉康庶績而撫茲薄德昧此永圖爾等積學多聞含章獨秀未顯疇庸之德宜申待叩之音適時之務何先經國之圖何最帝皇之道奚是王霸之理奚非佇聽良謨朕將親覽對臣聞舜命昌言漢徵極諫嘗覽千古賢哉二君今陛下發德音下明制選空巖穴訪匝輿臺大哉邈乎過之遠矣臣以草莽之賤謬當車乘之招誠不足以庶幾王庭充塞大問伏讀聖旨乃知天情之所存焉臣聞昔者鳥迹代繩龍文演卦水土遷王時更萬祀金木互興人非一姓暨乎三皇五帝氏往夏商周漢氏作或導人以禮樂或驅俗以政刑或革弊以忠敬或沿風以文武非師古之誥有殊蓋隨時之義異也伏惟聖母神皇陛下誕受鴻基光膺駿命粵若立極格天之業論道布政之典任賢克暴之功出洛飛雲之瑞此並藏緯玉册勒休金版鬱美前古揚光後葉者矣至若創業垂統之則宏猷永圖之義重光三聖再清六合可不謂然乎猶或惕慮推溝勞謙馭朽謝文明於薄德想疇庸於清問此陛下之至讓也愚臣何足以知之策曰適時之務何先經國之圖何最臣聞古者因人以立法乘時以設教以義制事以禮制心夫人者理得則氣和業安則心固崇讓則不競知恥則遠刑若強人之所不能雖令不勸禁人之所必犯雖罰且違故曰政不欲煩煩則數改數改無定人懷苟免之心網不欲密密則深文深文多傷下有非辜之懼竊見今之俗吏或匪正人以刻為明以苛為察以剝下為利以附上為誠綜核之司考課專於刀筆撫字之宰職務具為簿書陛下日昃維勤守宰風化多闕臣以為將行美政必先擇人失政謂之虐人失人謂之傷政捨人為政雖勤何為伏願陛下進經術之士退掊克之吏崇易之化流愷悌之風畫一成歌此適時之務也慎賢而用此經國之圖也苟能英才不棄大化方隆而猶曰朝謝垂衣野非擊壤則文武之道尚何言哉堯舜之君徒虛語耳策曰帝皇之道奚是王霸之理奚非者布在方策臣聞之矣皇人御歷上淳而下信帝者膺期君明而臣哲周用王道教化一而人從漢雜霸道刑政嚴而俗偽故親譽優於畏侮文景劣於成康臣謹對問朕聞禮崇三典方宏慎罰之規書著五刑不以深文為義朕母臨赤縣子育黔黎夏日貽憂懼青牛之結氣秋荼軫念慮丹筆之成冤然以人尚挂於湯羅情倍深於禹泣頃者荊郊起祲淮服挻妖朕惟罪彼元凶餘黨並從寬宥今敬真之輩猶蘊狼心不荷再生之恩重搆三藩之逆還嬰巨釁便犯嚴科豈止殺之方乖於折衷將小慈之澤爽彼大猷子大夫等學富三冬才高十室刑政之要實所明間傾此虛襟佇聞良説對臣聞刑以助教德以間邪先王慎於好生大易誡於緩死今陛下母臨黔首子育蒼生孚佑下人克配上帝然有東南小祲荊蠻遠郊雖聖德泣辜尚用防風之戮天心罪己仍勞淮甸之征其有詿誤閭閻脅從井邑陛下愍孤孀於海淮恤困窮於江漢捨從寬宥此陛下之恩也而蕞爾餘孽蠢茲頑凶思弄兵於潢池之下將搆難於戎狄之域罪盈稔貫禍得萌芽此又陛下之明也今陛下乃賜臣策曰豈止殺之方乖於折衷將小慈之澤爽彼大猷臣實見折衷大猷之規不知小乖微爽之義也策曰政刑之要實所明間臣聞政猶水火刑譬陰陽頃者三監亂常有司既糾之以猛於今四罪咸服陛下宜濟之以寬明肆赦之渥恩安萬人之反側布深仁於羅鳥收至察於泉魚豈不大哉天下幸甚且夫人者氓也暗而不可罔庶者衆也愚而不可欺是故刑在必澄不在必慘政在必信不在必苛故明王之理天下也刑一則人畏而不干政則俗齊而不偽於是禍亂不作災害不生君安於上臣悅於下百姓日用而不知其然四海風動惟帝之則道暢鍾石聲流舞詠其行已也非他所理人者以此刑政之要庶幾一隅臣謹對問朕聞仰觀乾象房心為布政之宮俯察坤元河洛建受圖之所是以上稽珠緯佇風雨之和下表圭廛均遠近之節定都考室斯焉是崇顧以庸虛忝膺大寶乾乾夕惕每軫納隍之懷懍懍宵興恆勞馭朽之念而昊穹眷命靈貺屢彰雲構既隆天城斯畢是用內省多愧上答逾勤將欲殷薦有常嚴配不墜光啓惟新之躅申明祀典之方順四時以布和風考五物而行正氣盛禮之要猶慮未宏爾等並積學基身含章表質或遠從賓貢聲滿於州閭或遐應搜揚譽光於朝選採皇王於奧旨援周漢之前蹤蘊彼胸襟咸應備曉未知何代之政參詳適中何禮之規施用為切務存必之道式崇可久之基試陳嘉謀爾其揚榷思擢太常之第副朕求賢之懷對伏惟陛下則天法地畏命重人據河洛之規模總風雨之交會軒后魚圖之水建邦設都周公龜墨之地考堂作室靈祇降福嘉祥薦祉制同神造力以子來將以殷薦上帝至法也嚴配先王至孝也加以八風攸序四時克諧無得而稱能事畢矣猶復執勞謙之不巳懼盛禮之未宏訪末學之臣詢稽古之政斯事體大臣何足言然而敢不欽承以竭涓滴耶策曰何代之政參詳適中何禮之規施用為切臣謹錯綜三五明徵典謨竊以緯武經文布方策而非遠英風顯號流頌聲而可襲未有反義悖德而致升平之政棄禮違經以克永終之祿莫不發號施令法乾坤之動靜執契懸衡順金木之刑德是故青陽元室遵孟仲而觀風白輅朱旗因離兌而布政養老用上庠之禮教胄取大學之義環水著辟雍之名向陽表明堂之位蓋所以享㣥瑞朝諸侯頒正朔調景緯成易之基崇久大之業也皇王奧旨庶此詳探周漢前蹤固難專用臣才智駑劣草莽鯫生至如軍國務廣政刑理急但至敬無文信言不美陛下欲聽其説必觀於事將達其謀先求諸道危言抵禁破膽寒心伏惟聖主稍留天聽臣謹對晚尋莊周書以天地為國道德為身老室之戶牖孔門之棖闑足可反覆孝慈胎育仁義而晉朝賢士乃祖尚浮虛弛廢禮樂其所遺失將詣真宗不愈遠也老稱歸根曰靜復命知常復命近於無有知常其有知見耶斯故反照爾孔云窮神知化德之盛者神不可窮而窮之是神合於我化不可知而知之是化為我用惟此二義繄莊生亦未始盡言焉非滎陽之深於道者孰為輕導茲意也説拙於守身往年遷流嶺外亡親愁懼痼疾增加比蒙生還曾未數歲家口在洛身徒入京及丁凶苦不獲侍側比於他人情實不等在禮君親同貫事君無負事親有負不能殺身以自咎責乞過祥禫報國非遲三度表請不蒙矜遂當是文墨不盡苦心投之執事乞為一言聞達不敢守禮抗請直是私情乞恩若以此情可矜猶冀聖人萬一哀憫若將譴越甘心待罪謹狀説拜白薊北餘沍關西早春物所宜年來共感惟先生進經玉殿退食金門黼藻元猷榮問清暢甚善説往陪君子視學瑤山中貽官謗謫居湘浦賴聖主識其面目憐其宿心捨衆口之無稽容庇身之有地自授軍鎮躬當夷狄出入以馳突為㣥坐臥以戈劍為友翰墨都廢典籍生塵時憑夢魂一見宮闕每憶朝侶邈若雲天愧乏武才供國粗使豈望立明主之側陳先王之道哉説與先生事願乖矣曩喜同席今嗟異鄉遐路三千曷其言會強卞安步為國師臣時流德音以惠疆場張説再拜范陽張説謹上鳳閣舍人公足下竊聞高義遠矣願託下風久之自非氣以同求音為賞奉降此巳往復何云云昔有飛英子處於深林俘轉溝壑適遇靈風子出於大塊將獵雲霄飛英子思欲遊焉揚袂大呼請俱載矣靈風子不知其人也怒氣視叱而還之飛英子曰吁子非至公也夫至公也者以義而求之以仁而與之況乃假有餘之資濟無階之望施不費之惠振將墜之魂子不濫吹我無苟進此種德也夫何拒焉靈風子曰請受教遂相與翻飛而行摶扶而上經乎綺閣集乎瑤臺簸芳萬里騰景千仞既而靈風子卒無德色飛英子亦無私心今明公據清風之資令賢者獲飛英之託此至公也得無嫌揚袂之謁懷怒氣之疑乎且夫論美聲者不於清屏之室議絶足者不於王良之門今束蘊知歸彈冠且衆若公固讓而不然之彼亦將倚輈於遠方闕於天下矣輕重十倍去留一言惟君處之張説再拜説白尊豫州府君德業高遠名言路絶豈説常詞所堪碑紀比重奉來旨力為牽綴亦不敢假稱虛善附麗其迹雖意野文朴陋不足媚於衆眼然敢實録除楦釀亦無愧於達旨今手寫裝本來使齎縑馬何爾踈外通財不謝故無辭却甚熱願履恆休張説白骨肉世踈居止地濶宗族名迹不能備知讀厭次府君狀巳具歷官未書性習夫五常之性出於五行稟氣所鍾必有偏厚則仁義禮智信為品不同六藝九流習科各異若以稷離之事贊於巢由孫吳之術銘於遊夏必將神人於悒未以為允今之撰録蓋欲推美實行崇識素心先德怡神於知我後生想望於見意説為他人稱述尚不敢苟況於族尊行哉往來信多直疏早報冬末寒沍野有戎歌山無夏草步步日遠能無鄉國之心乎荒州新立向者未有下車殊俗意緒如何説患恆服湯虛多健少因別奉去説呈正月癸卯孤子范陽張説頓首頓首陳君之靈頃伏苫蓋遠辱慰疏執對號慟次於展泄來使未還傳君遇禍盡哀寢外傷心痛骨明府兄育德南邦飛聲中夏急人之急憂人之憂勇於履危果於從政入使天闕有專對之美按俗交州見澄清之節故得振衣衡管割錦閩鄉越嶂舊風人狃輕剽捩之以淳俗格之以華章矯枉過中斯害也已齒由剛折膏為明銷嗚呼陳君婞直而殞皇天輔德問之何故疇昔炎海契濶周旋義則友朋恩結兄弟方期歲暮韡韡相榮元髮未華何圖零落山濤猶在嵇紹不孤逝者有知當昭是意今返防關力報前書幽明雖異交友無改悲言下筆涕泗從之并往千錢俾陳奠酹歔欷萬里哀哉奈何頓首再拜臣某等啓臣聞安國家定社稷者武功也經天地緯禮俗者文教也社稷定矣固寧輯於人和禮俗興焉在刊正於儒範順考古道率由舊章故周文王之為世子也崇禮不倦魏文帝之在春宮也好古無怠博覽史籍激揚令聞取高前代垂名不朽伏惟皇太子殿下英睿天縱聖敬日躋神算密發雄威立斷廓清氛祲用寧家國兆人由是歸德六合所以推功主鬯青宮固本也分務紫極觀政也副㣥生之望作纍聖之儲殿下之於天下可謂不輕矣監國理人可謂至重矣莫不拭目而視清耳而聽冀聞異政以裨聖道臣愚伏願崇太學明師重道尊儒以養天下之士今禮經殘缺學校淩遲歷代經史率多紕繆實殿下闡揚之日刊定之秋伏願博採文士旌求碩學表正九經刊考三史則聖賢遺範粲然可觀況殿下至性神聰留情國體幸以問安之暇應務之餘引進文儒詳觀古典商略前載討論得失降溫顏聞讜議則政途理體日以增益繼業承祧永垂德美臣等行業素輕藝能寡薄顧慙多士叨侍宮闈日夜祗懼無以匡輔區區微誠願效塵露輕進芻鄙望垂採擇臨啓如失伏用兢惶謹啓
