front:
  text: 全唐文欽定全唐文卷九百六元奘本名禕俗姓陳氏洛陽緱氏人出家東都淨土寺後住長安莊嚴寺貞觀三年往西域十九年齎經像還京師敕住大慈恩寺麟德元年卒年六十五
  hash: sha256:164cec4554cd3529f11583fb4647462f58561f80f24f6b9b9da60458d7d922b5
  markers:
  - {type: head, offset: 12, content: 元奘, id: KR4h0168_NFKB_906-h1, level: 1}
body:
  text: 沙門元奘言奘聞馬融該贍鄭元就扶風之師伏生明敏朝錯躬濟南之學是知儒林近術古人猶且遠求況諸佛利物之元蹤三藏解廠田坴之妙說敢憚途遙而無尋慕者也元奘往以佛興西域遺教東傳然則勝典雖來而圓宗尚闕常思訪學無顧身命遂以貞觀三年四月冒越憲章私往天竺踐流沙之浩浩陟雪嶺之巍巍鐵門巉嶮之塗熱海波濤之路始自長安神邑終於王舍新城中間所經五萬餘里雖風俗千別艱危萬重而憑恃天威所至無鯁仍蒙厚禮身不苦辛心願獲從遂得觀耆闍崛山禮菩提之樹見不見迹聞未聞經窮宇宙之靈奇盡陰陽之化育宣皇風之德澤發殊俗之欽思歷覽周遊一十七載今已從鉢羅耶伽國經迦畢試境越葱嶺渡波謎羅川歸還達於于闐為所將大象溺死經本衆多未得鞍乘以是少停不獲奔馳早謁軒陛無任延仰之至謹遣高昌俗馬元智隨商侶奉表先聞沙門元奘言竊尋蟠木幽陵雲官紀軒皇之壤流沙滄海夏載著伊堯之域西母白環薦垂衣之主東夷楛矢奉刑措之君固以飛英曩代式徽前典伏惟陛下握紀乘時提衡範物刳舟弦木威天下而濟㣥生鼇足蘆灰堙方輿而補圓蓋耀武經於七德闡文教於十倫澤漏泉源化霑蕭葦芝房發秀浪井開花樂囿馴班巢阿響律浮紫膏於貝闕霏白雲於玉檢遂苑弱水而池濛泛圃炎火而照積洛梯赤坂而承朔泛滄津而委贐史曠前良事絶故府豈知漢開張掖近接金城秦戍桂林才通珠浦而已元奘幸屬天地貞觀華夷靜謐冥心梵境敢符好事命均朝露力譬秋螽徒以憑假皇靈飄身進影展轉膜拜之鄉流離重譯之外條支巨鷇方驗前聞罽賓孤鸞還稽曩實時移嵗積人願天從遂得下雪岫而泛提河窺崔林而觀鷲嶺祗園之路髣像猶存王城之基坡陀尚在尋求歷覽時序推遷言還帝京淹逾一紀所聞所履百有二十八國竊以章亥之所步籍空陳廣袤夸父之所陵厲無述土風班超侯而未還張騫望而非博今所記述有異前聞雖未極大千之疆頗窮蔥外之境皆存實録匪敢雕華謹具編裁稱為大唐西域記凡一十二卷繕寫如別望班之右筆飾以左言掩博物於晉臣廣九邱於皇代但元奘資識渝短遺漏實多兼拙於筆語恐無足觀覽沙門元奘言竊聞八正之旨實出苦海之津梁一乘之宗誠入涅槃之梯隥但以物機未熟致蘊蔥山之西經胥庭而莫聞歷周秦而靡至暨乎摩騰入洛方被山川僧會遊吳始霑荊楚從是以來遂得人修解脫之因家樹菩提之業固知傳法之益其利博哉次復嚴顯求經澄什繼譯雖則元氣日扇而並處僞傳唯元奘輕生獨逢明聖所將經論咸得奏聞蒙陛下崇重聖言賜使翻譯比與義學諸僧等專精夙夜無墮寸陰雖握管淹時未遂終訖已絶筆者見得五部五十八卷名曰大菩薩藏經二十卷佛地經一卷六門陀羅尼經一卷顯揚聖教論二十卷大乘阿毗達磨雜集論一十六卷勒成八袠繕寫如別謹詣闕奉進元奘又竊見宏福寺尊像初成陛下親降鑾輿開青蓮之目今經論初譯為聖代新文敢緣前義亦望曲垂神翰題製一序讚揚宗極冀沖言奧旨與日月齊明玉字銀鈎將乾坤等固使百代之下誦詠不窮千載之外瞻仰無絶沙門元奘言元奘聞菩提路遠趣之者必假資糧生死河深渡之者須憑船筏資糧者三學三智之妙行非宿舂之類也船筏者八忍八觀之淨業非方舟之徒也是以諸佛具而升彼岸凡夫闕而沈生死由是茫茫三界俱漂七漏之河浩浩四生咸溺十廠田坴之浪莫不波轉烟迥心迷意醉窮劫石而靡怠盡芥城而彌固曾不知駕三車而出火宅秉八正而適寶坊實可悲哉豈直秋之為氣良增歎矣寧惟孔父之情所以未嘗不臨食輟飧當寐而驚者也元奘每惟此身衆緣假合念念無常雖岸樹井藤不足以儔危脆乾城水沫無以譬其不堅所以朝夕是期無望長久而嵗月如流六十之年颯然已至念茲遄速則生涯可知加復少固求法尋訪師友自邦他國無處不經塗路遠遙身力疲竭頃年以來更增衰弱顧陰視景能復幾何既資糧未充前塗漸促無日不以此傷嗟筆墨陳之不能盡也然輕生多幸屬逢明聖蒙先朝不次之澤荷陛下非分之恩沐浴隆慈嵗月久矣至於增名益價發譽騰聲無翼而飛坐淩霄漢受四事之供超倫輩之華求之古人所未有也元奘何德何功以至於此皆是天波廣潤日月曲臨遂使燕石為珍駑駘取貴撫躬內省唯深慙恧且害盈惡滿乃前哲之雅旨少欲知足亦諸佛之誠言元奘自揆藝業空虛名行無取天慈聖澤無宜久冒望乞骸骨畢命山林禮誦經行以答提獎又蒙陛下以輪王之尊布法王之化西域所得經本並令翻譯元奘猥承人乏濫當斯任既奉天旨夙夜靡寧今已翻出六百餘卷皆三藏四含之宗要大小二乘之樞軸凡聖行位之林藪八萬法門之海澤西域稱詠以為鎮國方之典所須文義無彼不得譬猶擇木鄧林隨求大小收珍海浦任取方圓學者之宗斯為髣佛元奘用此奉報國恩誠不能盡雖然亦冀萬分之一也但斷伏煩惱必定慧相資如車二輪闕一不可至如研味經論慧學也依林宴坐定學也元奘少來頗得專精教義唯於四禪九定未暇安心今願託慮禪門澄心定水制情猿之逸躁縶意馬之奔馳若不斂迹山中不可成就竊承此州嵩高少室嶺嶂重疊峯澗多奇含孕風雲包蘊仁智果藥豐茂蘿薜清虛海內之名山域中之神嶽其間復有少林伽藍閒居寺等皆跨枕巖壑縈帶林泉佛事尊嚴房宇間邃即後魏三藏菩提留支譯經之處也實可歸依以修禪觀又兩疏朝士尚解歸組辭榮巢許俗人猶知棲箕蘊素况元奘出家為法翻滯圜中清風激人念之增愧者也伏惟陛下明踰七曜照極九幽伏乞亮此愚誠特垂聽許使得絶囂塵於衆俗卷影迹於人間陪麋鹿之㣥隨鳧鶴之侶棲身片石之上庇影一樹之陰守察心猿觀法實相令四魔九結之賊無所穿窬五忍十行之心相從引發作菩提之由漸為彼岸之良因外不纍於皇風內有增於行業以此送終天之恩也儻蒙矜許則廬山慧遠雅操庶追剡岫道林清徽望續仍冀禪觀之餘時間翻譯無任樂願之至謹詣闕奉表以聞輕觸宸威追深戰越沙門元奘言伏奉恩旨許令積翠宮翻經仰佩優渥誠深喜戴伏念違離旋增憫然元奘功微勳府道謝德科而久紊榮章鎮荷曾覆循涯知懼臨谷匪危伏惟皇帝皇后聖哲含宏仁慈亭育故使萬類取足一物獲安而近隔蘭除聽錫鑾而悲結甫瞻茨嶺想多豫而欣然伏願玉宇延和仙桃薦壽邁甘泉之清暑等瑤池之住遊所冀溫樹迎秋凉飇造夏候歸軒於砥陌儼幽錫於帷林稱慶萬春甘從九遊不勝感戀之極謹附表奉辭以聞荒越在顏水火交應竊聞冕旒康俗咸競前修述作窮神必歸睿后皇帝造物元猷遠暢掩王城於侯甸光貝葉於羽陵傍啓譯寮降緝鴻序騰照千古流輝萬葉陛下纂承丕業光敷遠韻神用日新賞鑒無怠元奘濫沐天造肅承明詔每撫庸躬恆深悚息去月日奉敕所翻經論在此無者宜先翻舊有者在後翻但發智毗婆沙論有二百卷此土先唯有半但有百餘卷而文多舛雜今更整頓翻之去秋已來已翻得七十餘卷尚有百三十卷未翻此論於學者甚要望聽翻了餘經論有詳略不同及尢舛誤者亦望隨翻以副聖述沙門元奘言奘以貞觀三年往遊西域求如來之祕藏尋釋迦之遺旨總獲六百五十七部並以載於白馬以貞觀十九年方還京邑尋蒙敕旨令於宏福道場披尋翻譯今已翻出菩薩藏等經伏願垂恩以為經序唯希敕旨方布中夏并撰西域傳一部一十四卷謹令舍人李敬一以將恭進無任悚息之至謹奉表以聞謹言沙門元奘言伏奉墨敕猥垂獎諭祗奉綸言精守震越元奘業行空踈謬參緇侶幸屬九瀛有截四表無虞憑皇靈以遠征恃國威而訪道窮遐冒險雖厲愚誠纂異懷荒實資朝化所獲經論奉敕翻譯見成卷軸未有詮序伏惟陛下睿思雲敷天華景爛理包繫象調逸咸英跨千古以飛聲掩百王而騰實竊以神力無方非神思不足詮其理聖教元遠非聖藻何以序其源故乃冒犯威嚴敢希題目宸眷沖邈不垂矜許撫躬纍息相顧失圖元奘聞日月麗天既分暉於戶牖江河紀地亦流潤於巖崖雲和廣樂不祕響於聾昧金璧奇珍豈韜彩於愚瞽敢緣斯理重以干祈伏乞雷雨曲垂天文俯照配兩儀而同久與二曜而俱懸然則鷲嶺微言假神筆而宏遠雞園奧典託英詞而宣暢豈止區區梵衆獨荷恩榮亦使蠢蠢迷生方超塵纍而已謹奉表奏以聞謹言沙門元奘言竊聞六爻探賾局於生滅之場百物正名未涉真如之境猶且遠徵羲冊覩奧不測其神遐想軒圖歷選並歸其美伏惟皇帝陛下玉毫降質金輪御天廓先王之九州掩百千之日月廣列代之區域納恆沙之法界遂使給園精舍並入提封貝葉靈文咸歸冊府元奘往因振錫聊謁崛山經途萬里怙天威如咫步匪乘千葉詣雙林如食頃搜揚三藏盡龍宮之所儲研究一乘窮鷲嶺之遺旨並已載於白馬還獻紫宸尋蒙下詔賜使翻譯元奘識乖龍樹謬忝傳燈之榮才異馬鳴深愧瀉瓶之敏所譯經論紕舛尢多遂荷天恩留神搆序文超象繫之表若聚日之放千光理括衆妙之門同法雲之濡百草一音演說億劫罕逢忽以微生親承梵響踊躍歡喜如聞受記無任欣荷之極謹奉表詣闕陳謝以聞謹言沙門元奘言被鴻臚寺符伏奉敕旨親紆聖筆為大慈恩寺所製碑文已成睿澤傍臨宸詞曲照元門益峻梵侶增榮局厚地而懷慙負層穹而寡力元奘聞造化之功既播物而成教聖人之道亦因辭以見情然則畫卦垂文空談於形器設爻分象未踰於寰域羲皇之德尚見稱於前古姬后之風亦獨高於後代豈若開物成務闡八政以摛章詮道立言證三明而導俗理窮天地之表情該日月之外較其優劣斯為盛矣伏惟皇帝陛下金輪在運玉歷乘時化溢四洲仁覃九有道包將聖功茂乃神縱多能於生知資率由於天至始悲奩鏡即創招提俄樹勝幢更敷文律若乃天華穎發睿藻波騰吞筆海而孕龍宮掩詞林而包鶴樹內該八藏外核六經奧而能典宏而且密固使給園遺迹託寶思而彌高奈苑餘芳假瓊章而不昧豈直抑揚夢境昭晰迷塗諒以鎔範四天牢籠三界者矣元奘言行無取猥預緇徒亟叨恩顧每謂多幸重忝曲成之造欣逢像法之盛且慙且躍實用交懷無任竦戴之誠謹詣朝堂奉表陳謝沙門元奘等言竊以應物垂象神用溥該隨時設教聖功畢盡是知日月雙朗始極經天之運草木俱秀方窮麗地之德伏惟皇帝陛下智周萬物仁霑三界既隆景化復闡元風鄙姬穆之好道空賞瑤池之詠蔑漢明之崇法徒開白馬之詞遂乃俯降天文遠揚幽旨用雕豐琬長垂茂則同六英之發音若五緯之摛曜敷至懷而感俗宏大誓以匡時豈獨幽贊真如顯揚元賾者也雖玉藻斯暢翠版將刊而銀鈎未書丹字猶韞然則夔樂已簨匪里曲之堪預龍鄉既晝何爝火之能明非夫牙曠撫律羲和總馭焉得揚法鼓之大音裨慧日之沖彩敢緣斯義冒用干祈伏乞成茲具美勒以神筆庶淩雲之妙邁迹前王垂露之奇騰芬後聖金聲玉振即悟㣥迷鳳翥龍蟠將開衆瞽豈止克隆像教懷生霑莫大之恩實亦聿贊明時宗社享無疆之福元奘禀識愚淺謬齒緇林本慙窺涉多虧律行猥辱紫宸詞過褒美雖驚惕之甚措顏無地而慊懇之勤翹誠有日重敢塵黷更懷冰火昨一日蒙賚天藻喜戴不勝未允神翰翹丹尚擁竊以攀榮奇樹必含笑而芬芳跪寶玉岑亦舒渥而貽彩伏惟陛下提衡執粹垂拱太寧睿思綺毫俯凝多藝鴻範先於洛浦草聖茂於臨池元奘肅荷前恩奉若華於金鏡冒希後澤佇桂影於銀鈎豈直含璧相循聯輝是仰亦恐非天翰無以懸日月之文唯嚴則可以攄希微之軌馳魂泥首非所敢望不勝積慊昧死陳情表奏沙門元奘言元奘不夭夙鍾荼蓼兼復時逢隋亂殯掩倉卒日月不居已經四十餘載墳壟頽毀殆將湮滅追惟平昔情不自寧謹與老姊一人收捧遺柩去彼狹陋改葬西原用答昊天微申罔極昨日蒙敕放元奘出三兩日檢校但元奘更無兄弟唯老姊一人卜遠有期用此月二十一日安厝今觀葬事尚寥落未辦所賜三兩日恐不周匝望乞天恩聽元奘葬事了還又婆羅門上客今相隨逐過為率略恐將嗤笑不任廠田坴迫憂懾之至謹奉表以聞伏乞天覆雲回曲憐孤請沙門元奘言伏奉敕旨許降宸筆自勒御製大慈恩寺碑文璽誥爰臻綸慈猥集祇荷慙惕罔知攸措元奘聞強弩在彀鼯鼠不足動其機鴻鐘匿音纖莛無以發其響不謂日臨月照遂回景於空門雨潤雲蒸乃昭感於元寺是所願也豈所圖焉伏惟陛下履翼乘樞握褒纘運追軒邁頊孕夏吞殷演衆妙以陶時總多能而景俗九域之內既沐仁風四天之表亦霑元化然則津梁之法非至聖無足闡其源幽贊之工非至人何以敷其迹雖追遠所極自動天情而冥祐可祈即回宸眷英詞曲被已超希代之珍祕迹行開將踰絶價之寶凡在㣥品靡弗欣戴然彼梵徒倍增慶躍夢鈞天之廣樂匹此非奇得輪王之髻珠疇茲豈貴庶當刊以貞石用樹福庭蠢彼迷生方開耳目盛乎法炬傳諸未來使夫瞻寶字而跂銀鈎發菩提於此日諷通文而探幽賾悟般若於斯地劫灰窮芥昭昭之美恆存遷海環桑藹藹之風無朽元奘出自凡品夙慙行業既蒙落飾思闡元猷往涉迦維本憑皇化逮茲翻譯復承朝獎而貞觀之際濫沐洪慈永徽已來更叨殊遇二主神筆猥賜褒揚兩朝聖藻亟垂榮飾顧循愚劣實懷兢懼輸報之誠不忘昏曉但以恩深巨壑豈滴水之能酬施厚松邱匪纖塵之可謝惟當憑諸慧力運以無方資景祚於園寢助隆基於七百不任竦戴之至謹附內給事臣王君德奉表陳謝以聞輕犯威嚴伏深戰栗沙門元奘等言今月十四日伏奉敕旨送御書大慈恩寺碑并設九部樂供養堯日分照先增慧炬之暉舜海通波更足法流之廣豐碣巖峙天文景燭狀彩露之映靈山凝縟宿之臨仙嶠凡在緇素電激雲奔瞻奉驚躍得未曾有竊以八卦垂文六爻發繫觀烏製法泣麟敷典聖人能事畢見於茲將以軌物垂範隨時立訓陶鑄生靈抑揚風烈然則秦皇刻石獨映美於封禪魏后刊碑徒紀功於大饗猶稱題目高視百王豈若親紆睿藻俯開仙翰金奏發韻銀鈎絢迹探龍宮而架三元軼鳳篆而窮八體揚春波而騁思滴秋露以標奇宏一乘之妙理讚六度之幽賾化總三千之域聲騰百億之外奈苑微言假天詞而更顯竹林開士託神筆而彌尊固使梵志歸心截疑網而祇訓波旬革慮偃邪山而徇道豈止塵門之士始悟迷方滯夢之賓行超苦際像教東漸年垂六百宏闡之盛未若於茲至如漢明通感尚資謀於傅毅吳主歸宗猶考疑於闞澤自斯已降無足稱者隨緣化物獨推昭運為善必應克峻昌基若金輪之王神功不測同寶冠之帝休祚方永元奘等謬忝朝恩幸登元肆屬慈雲重布法鼓再揚三明之化既隆八正之門長闢而顧非貞懇虛蒙獎導仰層旻而荷澤俯浚谷以懷慙無任悚戴之誠謹詣闕陳謝以聞沙門元奘言元奘聞白鳩彰瑞表殷帝之興赤雀呈符示周王之盛是知穹昊降祥以明人事其來久矣元奘今申後酉前於顯慶殿帳帷內見有一雀背羽俱丹腹足咸赤從南飛來入帳止於御座徘徊踴躍貌甚從容見是異禽乃謂之曰皇后在孕未遂分誕元奘深憂懼願乞平安若如所祈為陳喜相雀乃回旋蹀足示平安之儀了然解人意元奘深心歡喜舉手喚之又徐徐相向乃至逼之不懼撫之不驚左右之人咸悉共見元奘因為受三歸報其雅意未及執捉且從其徘徊遂復飛去伏惟皇帝皇后德通神明恩加兆庶禮和樂洽仁深義遠故使羽族呈祥神禽效質顯子孫之盛彰八百之隆既為曩代之休符亦是當今之靈貺元奘輕生有幸肇屬嘉祥喜祚之深不敢緘默略疏梗概謹以奏聞若其羽翼之威儀陽精之淳偉歷代之稽古出見之方表所不知也謹言沙門元奘言竊聞至道攸敷啓天人於載弄深期所感誕元聖於克岐伏惟皇帝皇后情鏡三空化孚九有故能闢垂旒於二諦却走馬於一乘蘭殿初歆爰發俱胝之願珽柯在孕便給踰城之徵俾夫十號降靈宏茲攝受百神翼善肅此宮闈所以災厲克清安和載誕七花儼以承步九龍低而濯質元門佇迹道樹靈陰雖昔之履帝呈祥捫天表異寧足以方斯感貺匹此英猷率土詠歌喜皇階之納祐緇林勇鋭欣紺馬之來遊伏願無替前恩特令法服靡局常戀回構良因且帝子之崇出處斯在法王之任高尚彌隆加以功德無邊津梁載遠儻聖澤無舛宏誓不移竊謂殫四海之資不足比斯檀行傾十地之業無以譬此福基當願皇帝皇后百福凝華齊輝北極萬春表壽等固南山罄娛樂於延齡踐薩云於遐劫儲君允茂綏紹帝猷寵番惟宜翊亮王室襁褓英允休祉日繁標志節於本枝嗣芳塵於草座元奘濫偶丕運局影禁門貴匪德升寵緣恩積幸屬國慶惟始淨業開基踊躍之懷塵粉無恨不勝喜賀之至謹奉表以聞輕觸威嚴伏增戰越沙門元奘言元奘聞易嘉日新之義詩美無疆子孫所以周祚過期漢歷遐緒者應斯道也又聞龍門洄激資源長而流遠桂樹叢生藉根深而芳藹伏惟皇運纍聖相承重規謺矩積植仁義浸潤黎元其來久也由是二后光膺大寶為子孫基可謂根深源長矣逮陛下受圖功業逾盛還淳反素邁三五之蹤製禮作樂逸殷周之軌不持黃屋為貴以濟兆庶為心未明求衣日昃忘食一人端拱萬里廓清雖成康之隆未至於此是故卿雲紛郁江海無波日域遵風龍鄉沐化蕩蕩乎巍巍乎難得而備言矣既而道格穹蒼明神降福今月嘉辰皇子載誕天枝廣茂瓊萼增敷率土懷生莫不慶賴在於元奘特迫恆情豈直喜聖后之平安實亦欣如來之有嗣伏願不違前敕即聽出家移人王之允為法王之子豫披著法服制立法名授以三皈列於僧數紹隆像化闡播元風再秀禪林重暉覺苑追淨眼之茂跡踐月蓋之高蹤斷二種廠田坴成無等覺色身微妙譬彼山王焰網莊嚴過於日月然後蔭慈雲於大千之境揚惠炬於百億之洲振法鼓而挫天魔麾勝幡而摧外道接沈流於倒海撲燎火於邪山竭煩惱之深河碎無明之巨殼為天人師作調御士惟願先廟先靈籍孫祉而升彼岸皇帝皇后因子福而享萬春永握靈圖常臨九域子能如此方名大孝始曰榮親所以釋迦棄國而務菩提蓋為此也豈得以東平璅璅之善陳思庸庸之才並日而論優劣同年而議深淺矣謹即嚴衣捧鉢以望善來之賓拂座清塗用寧踰城之駕不勝慶慰喁喁之至謹奉表以聞輕觸宸威追深戰越沙門元奘言昨奉恩旨令元奘為佛光王剃髮并敕度七人所剃髮則王之煩惱落也所以度之僧則王之侍衛具也是用震動波旬之殿踴躍淨君之懷宏願既宣景福彌盛豈謂庸賤之手得效伎於天膚凡庶之人蒙入道於嘉會上下欣抃悲喜交集竊尋覆護之重在褓所先解脫之因落飾為始伏惟皇帝皇后闕一字凝象外福洽區中所以光啓妙門聿修德本所願皇階納祐玉扆延和臨百億於㣥下畢千萬嵗闕佛光高子乳哺惟宜善神衛質諸佛摩頂增華睿哲之姿允穆紹隆之寄新度之僧荷澤既深亦當翹勤道業專精戒行允嗣僧倫佇承取草不勝感荷之至謹奉表以聞沙門元奘言竊聞摶風迅羽纍日而沖空寫月明璣逾旬而就滿是知稟靈物表亮彩天中者固已後發其昧惟新厥美者矣惟佛光王資上善以締祥闡中和而育德自微垣降誕天祠動瞻睿氣清襟寢興納祐玉顏秀表日夕增華自非皇帝皇后慧日在躬法流濯想寄紹隆於盤石啓落飾於天人其孰能福此褓衣安茲乳哺無災無害克岐克嶷者今魄照初環滿月之姿盛矣蓂枝再長如蓮之目倩兮所以紫殿慰懷黔首胥悅七衆歸怙四門佇鑒豈唯日索後言鶴驂待馭而已元奘幸承恩寵許垂蔭庇師弟之望非所庶幾同梵之情實切懷抱輒敢進金字般若心經一卷并函報恩經變一部袈裟法服一具香爐寶字香案澡瓶經架數珠錫杖澡豆榼各一以充道具以表私歡所冀簉載弄於半璋代辟邪於蓬矢俾善神見而踴躍宏誓因以堅固輕用干奉實深悚惕伏願皇帝皇后尊邁拱辰明兼合耀結歡心於兆庶享延齡於萬春少海澄輝掩丕釗而取雋寵藩振美蹸間平以載馳所願佛光王千佛摩頂百福凝軀德音日茂善規丕相不勝感荷奉表以聞沙門元奘言元奘聞蘭榮紫苑過之者必觀桂茂青溪逢之者斯悅草木猶爾况人倫乎况聖允乎伏惟皇帝皇后挹神睿之姿懷天地之德撫寧區夏子育㣥生兼復大建伽藍廣興福聚益寶圖常恆不變之業助鼎命金剛堅固之因既妙善薰修故使皇太子機神日茂潞王懿傑逾明佛光王岐嶷增朗可謂超周越商與黃帝比崇子子孫孫萬年之慶者也元奘猥以庸微時得參見王等私心踴悅誠歡誠喜今是佛光王誕晬之日禮有獻賀輒率愚懷謹上法衣一具伏願皇子萬神擁衛百福扶持寤寢安和乳哺調適紹隆三寶摧伏四魔行菩薩行繼如來事不勝瓊萼天枝英華美茂歡喜之至謹附表并衣以聞輕觸宸嚴追深戰越沙門元奘伏奉敕賜衲袈裟一領剃刀一口殊命薦臻寵靈龍赫恭對惶悸如履春冰元奘幸遭雍穆之化早豫息心之侶三業無紀四含靡答謬回天眷濫叨雲澤忍辱之服彩合流霞智慧之刀銛逾切玉謹當衣以降煩惱之魔佩以斷塵勞之網起餘譏於彼已懼空踈於冒榮慚恧屏營趨承俯僂鞠心局蹐精爽飛越不任竦荷之至謹奉表謝聞塵黷聖鑒伏深戰栗沙門元奘言元奘拙自營衛冷疹增動幾至帛丿糸篤殆辭昭運天恩矜愍降以良醫針藥才加即蒙瘳愈駐頽齡於欲盡反營魄於將消重覩昌時復遵明導豈止膏肓永絶腠理恆調而已顧循庸菲履荷殊澤施厚命輕罔知輸報唯憑慧力庶酬冥祉元奘猶自虛惙未堪詣闕陳謝無任竦戴之至謹遣弟子大乘光先奉表以聞沙門元奘言使人呂宏哲等至宣敕慰問元奘所患并許出外將息慈旨忽臨元骸用起若對旒冕如置水泉元奘攝慎乖方疾瘵仍集自違離鑾躅倍覺嬰纏心痛背悶骨酸肉楚食眠頓絶氣息漸微恐有不圖點穢宮宇思欲出外自屏溝壑仍恐驚動聖聽不敢即事奏聞遂依門籍出至寺所病既困勞轉篤心亦分隔明時乃有尚藥司醫張德志為針療因漸瘳降得存首領還顧專輒之罪自期粉墨之誅伏惟日月之明久諒愚拙江海之澤特肆含容豈可移幸於至微屈法於常典望申公道以穆憲司枉獄為輕伏鈇是俟而殘魂朽質仍被恩光撫臆言懷用銘肌骨自惟偃頓非復尋常縱微下俚之憂亦盡生涯之冀但恨隆恩未答末命先虧仰惟帝勤親勞薄狩期於閲武情在訓戎既昭仁於放麟又策勳於獻鳳遐邇慶集上下歡并風伯清塵山祇護野敬惟動止故極休貞申炯誡於十旬浹辰而返鄙宣遊於八駿密邇而旋玉乘可佇冰懷以慰撫事回惶終期殞越不勝荷懼之至謹奉表待罪以聞荒惴失圖伏聽敕旨沙門元奘言元奘業纍所嬰致招疾苦呼吸之頃幾隔明時忽蒙皇帝皇后降慈悲之念垂性命之憂天使頻循有逾十慰神藥俯救若遇一丸飲沐聖慈已祛沈痛承荷醫療遂得痊除豈期已逝之魂見招於上帝將夭之壽重稟於洪爐退省庸微何以當此撫膺愧越言不足宣荷殊澤而詎勝粉微軀而靡謝方冀勗茲禮誦罄此身心以答不次之恩少塞無窮之責無任感戴之極謹附表謝聞喜懼兼并罔知攸措塵黷聽覽伏增惶悚沙門元奘言伏見敕旨僧尼等有過停依俗法之條還依舊格非分之澤忽委緇徒不訾之恩復霑元肆晞陽沐道實用光華局地循躬唯增震惕竊以法王既沒像化空傳宗絶之規寄諸明后伏惟皇帝陛下寶圖御極金輪乘正眷茲釋教載懷宣闕以為落飾元門外異流俗雖情牽五濁律行多虧而體被三衣福田斯在削玉條之密網布以寬仁信金口之直詞允茲迥向斯固天祇載悅應之以休徵豈止梵侶懷恩加之以貞確若有背茲寬貸自貽伊咎則違大師之嚴旨虧聖主之深慈凡在明靈自宜譴謫豈待平反之律方科姦惡之罪元奘庸昧猥厠法流每忝鴻恩恐懷慙惕重祗殊獎彌復兢惶但以近嬰疾疹不獲隨例詣闕無任竦戴之誠謹遣弟子大乘光先奉表陳謝以聞沙門元奘言伏奉恩敕除僧等依俗法推勘條章喜戴之誠莫知准譬竊尋正法隆替隨君上所抑揚彞倫薄厚儷元風以興缺自聖運在璿明皇執粹甄崇道藝區別元儒開不二之鍵廣唯一之轍寫龍宮於蓬閣接鷲壤於神皋俾夫鐘梵之聲洋溢區宇福善之業濯沐黎氓實法門之嘉會率土之幸甚頃為僧徒不整誨馭乖方致使內虧佛教外犯王法一人獲罪舉衆蒙塵遂觸天威令依俗法所期清肅志在懲誡僧等震懼夙夜慙惶而聖鑒天臨仁澤昭被篤深期於元妙掩纖垢於含宏爰降殊恩釋茲嚴罰非其人之足惜顧斯法之可尊遂令入網之魚復遊江漢觸籠之鳥還揚杳冥法水混而更清福田鹵而復沃僧等各深荷戴人知自勉庶當勵情去惡以副天心專精禮念用答鴻造伏願皇帝皇后以紹隆之功永凝百福乘慈悲之業端拱萬春震域締祥維城具美不勝舞躍感荷之至謹重附表陳謝以聞輕黷冕旒伏增惶恐沙門元奘言竊聞鶉首錫秦上帝兆金城之據龜圖薦夏中畿啓玉泉之窺是知靈貺所基皇猷顯屬昌誦由其卜遠高光所以闡期允迪厥猷率遵斯在伏惟皇帝皇后揆物裁務懸衡撫俗即土中之重隩遞虞巡而駐蹕因舊制之王褱偉儀鎬京而建郛仍以卑宮載懷改作勞於曩役馭奔在念軫居逸於晨興自非折中華夷均一徭輸豈能留連聖眷渙汗綸言是以令下之初山川鬱其改觀拓制爰始烟雲霏而色動飛甍日麗馳道風清神祇肸蠻彞倫郁穆若賦武昌之魚樂遷王里爭企云亭之鶴願奉屬車既小晉鄭之依更褊劉張之策前王齷齪豐洛遞開我后牢籠伊咸並建麟宗克茂鼎祚惟遠自可東宴平樂西臨建章佇吹笙而駐壽秉在藻而流詠蕩蕩至公巍巍罕述元奘散材莫效貽懼增深但三川之郊猥霑故里千載之幸鬱為新邑蓽門雖翳芻命猶存喜編轂下匪慙關外况光宅之慶遐邇所同歡聖上允安庸微所特荷不勝喜抃之極謹奉表陳謝以聞
