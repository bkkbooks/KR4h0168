front:
  text: 全唐文欽定全唐文卷七百八十八顧行元和六年進士官監察御史金部員外郎
  hash: sha256:85283754d348b00090a2839503396b7a7f84e8ff227c3466e417049d65c321b3
  markers:
  - {type: head, offset: 14, content: 李顧行, id: KR4h0168_NFKB_788-h1, level: 1}
body:
  text: 蓋六度為萬行之本施檀其一焉然以不住相而為者其用大不希福而捨者其道宏故我廉察使御史大夫贊皇公是以有法財之施焉亦猶真諦無像因像以教立至人無功由功而用顯志公和尚者實觀音大士之分形者歟然迹見於近代梁書具載其事夫妙覺本寂法身圓對應㣥品而必呈觀衆生而常度故利見則洪鐘待扣感畢乃慈航息運初志公之未遷滅也梁武帝命工人審像而刻之相好無遺儼然若對建窣堵波於金陵之開善寺聖功冥化歷代瞻敬人欽其神者二百餘祀公乃具綵舟設幡蓋而迎至則置於聽事西偏方丈之淨室每旦散名花靈香時復膳百味鼓八音以展誠敬以申供養公曰觀其寂然不動契定惠於真宗杜口無言若息心於了義夫色相如影則遺像與全身不殊文字性空則言語與寂默奚異吾知之矣吾得之矣亦既觀相爰歸本寺幢幡贊唄如始至焉公乃減清俸解上服命修珠帳飾花座因陀之網如懸上帝之寶咸在其餘則置膏腴之田以供香火之用所以崇像設顯靈蹤宏有為之教俾蒙昏之類永有所依歸僧徒等欲昭示於後以圖不朽請刻石以紀事小子承命而述焉長慶四年三月十一日記籌宣宗時官博士救天下者皆曰仁得天下者皆曰利則可乎曰不可也不得巳而有天下則曰仁得已而有者則曰利也善畏其利善決其仁皆聖也湯文王是也原意曰聖人視生民以天下襁褓在焚溺無不挈者然則挈而授其家乎將遂挈而有之乎彼家無人而有之不得已而仁矣有人而有之則得已而利矣夏無人也湯有以仁殷有人矣文王畏其利前賢明湯意故曰無伯夷後聖明文王意故曰周之德可謂至德也已矣垂日月所以為天也光盛而形物於地備禮樂所以成人也言成而著訓於簡非是而光者燭龍爟火亦光矣非是而言者狂童詖子亦言矣故定曰天文曰人文自文而之於地之於簡者章也然而文在帝則簡在史是以堯文思章於典舜文明亦章於典文王性堯舜之文也文治於西伯章於詩易仲尼性堯舜文王之文而弗帝弗伯也盛章於禮樂經記回性仲尼之文也文不及章偃商學仲尼文而之於人也故學章武城民而經章魏國君伋性其祖者也參以學而章於中庸軻性伋者也勤其道而章於七篇由偃至軻無有禮樂者乎是必由人文而章者也未見不由而章者也人視影於地者仰而見爝火而不見日月必曰非天文之章也視辭章於簡者久而見狂濫而不見禮樂則不曰非人文之章也浸有不自文而章易曰觀乎人文以化成天下使章不自人文也天下孰觀而孰化蠙字懿川宣宗朝歷官倉部考功員外咸通元年遷諫議大夫臣竊見前件寺在縣南五十里離墨山是齊時建立山上有九斗壇頗謂靈異每準赦令祭名山大川即差官致奠凡有水旱祈禱無不響應寺內有洞府三所號為乾洞者石室通明處可坐五百餘人稍暗處執炬以入不知深淺其中石有鳥獸之形及鹽堆米堆怪異之狀極多洞門直下便臨大水洞潺湲宛轉湍瀨實繁於山腹內漫流入小水洞小水洞亦是一石室室內水泉無底大旱不竭洞門對齋堂廚庫似非人境洞內常有雲氣升騰云是龍神所居之處臣太和中在此習業親見白龍於洞中騰出以為雷雨寺前良田極多皆是此水灌溉時旱水小百姓將水車於洞中取水車聲才發雨即旋降會昌中毀廢寺宇之後為一河陰院官鍾離簡之所買宣宗卻許修崇佛寺簡之便於寺內所居堂前造一逆修墳以絶百姓收贖建立之路其塋才成忽見一大赤蛇長數丈據於墳前簡之驚悸成疾遂卒於此子息亦固吝寺前良田竟葬簡之於其間萬古靈迹今成塋域鄉村痛憤不敢申論往來驚嗟無不嘆息况簡之男姪家業見居揚州海陵縣松檟亦元在彼處祇以固護廢寺田産一二兒姪在此今伏遇陛下至明至聖凡是墜典已皆舉明今以古迹靈境恐遊玩喧譁居人褻瀆肸蠁無依神祇失所尚令官中收贖復置寺宇豈有此靈異古迹兼是名山大川之藪今為墓田理似不可臣懷此冤憤近三十年儻不遇陛下睿思通幽聖慮徹古特降敕命盡許卻收即難特有論請齊朝梵宇永為邱墟神仙窟宅終被蕪穢臣今請自出俸錢依元買價收贖訪名僧主持教化同力卻造成善權寺其連寺田産收贖之後並卻捨入寺家永充供養伏乞聖慈敕下常州差官檢勘勒簡之男姪等移旅櫬歸海陵其寺地及林木莊田等並重出公驗交付臣勾當軍將待揀定僧徒後施入常住其收贖價錢亦請便交付簡之男姪等其寺仍請準近敕格度僧住持靈泉勝境因陛下重遂灑掃洞府仙官因陛下再獲依據佛剎重興於舊地鐘磬復聞於故山臣既沐元澤獲畢素願臣無任踊躍忭荷屏營之至謹録奏聞伏聽敕旨伸字大直祕書監乂子第進士歷佐使府大中二年入為右補闕史館修撰轉駕部郎中知制誥白敏中領邠寧節度使表伸自副加右庶子入知戶部侍郎九年為翰林學士進承旨十年改兵部侍郎判戶部以本官同中書門下平章事解戶部加中書侍郎懿宗立兼刑部尚書監修國史咸通二年出為河中節度使徙宣武俄以太子少保分司東都七年為華州刺史再遷太子太傅致仕卒贈太尉門下周家受命諸子疏封漢氏造邦二等垂制式崇藩屏思固本根逮於國朝必稽典憲太宗創久長之業乃建親賢列聖遵繼守之文廣分土宇朕獲承丕構敢廢彞章非惟永保於皇基蓋亦無私於天下第六男潤生而聰敏性則溫恭孝敬夙彰誠明日至能服詩書之教居然禮義之姿雖在幼年動由義訓周旋知為善之樂謙和無自伐之心足可以膺犬牙之封厚麟趾之慶授以茅社錫其桐圭俾為戚藩以輔王室爾宜繼二南之美躅習三雍之舊儀敬服斯言用光禮命可封鄂王令所司備禮册命門下展親外館則必待年廣愛中闈宜光啓邑第七女祥開銀漢秀發金枝孝敬生知柔間早稟克奉姆師之訓每遵詩禮之文法度自持穠華益茂爰申彞典載錫嘉名俾承湯沐之封式示邦家之慶可封盛唐公主備禮册命門下維揚右都東南奧壤包淮海之形勝當吳越之要衝闤闠星繁舟車露委若非人倫碩望台鼎舊臣則何以鎮撫巨藩允膺僉屬金紫光祿大夫守吏部尚書李器量宏深襟靈沖粹道光朝彥德契人師文章窮三變之風學術洞九流之奧莊敬形外溫和積中松筠自高圭玉不耀負經國之策蘊致君之謨輔弼兩帝始終一心忠直貫於金石節操勵於冰霜邦家克寧毗倚是屬揚歷斯久聲猷益光洎受鉞孟津宣風列郡而能訓齊師旅潤澤蒸黎姦豪懼秋霜之威孤弱懷冬日之愛載膺參選望洽冡卿銓管無差操鑒惟允惟爾早踐驪龍之位再分邵武之雄儒臣之榮可謂全美式崇端揆之重仍兼亞相之權勉思令圖副我嘉寵門下地控淮沂俗推豐沛將軍處右既膺分閫之權元戎啓行必仗貞師之節爰舉成命屬於信臣平盧軍節度使檢校左散騎常侍鄭涓峻直無徒堅明有立渾金發彩夷玉不雕屬文能搴其菁英聚學必窮其根本誠同匪石利可刜鐘早踐華資備揚稱述憲府常聞於避馬外台亦致其擁轅遂列粉闈旋升瑣闥彌高素望深竭忠規洎尹正神州益彰才用不施鈎距之術自銷桴鼓之鳴論洽縉紳名喧輦轂爰授征鉞出臨全齊先路馳聲下車報政黃霸布理人之績寇恂推馭衆之材閲乃器能式光委寄今以彭門重鎮禹貢名區兵車素號於精堅舟楫適當其津要求我良翰惟爾僉諧是宜節費通商均勞齊佚剛柔無忘於迭用威惠必在於兼行約已豐財正身率下俾夫三軍畏愛一境澄清懋昭厥庸祗服休寵加榮曳履以壯登壇勉副知人佇酬明獎門下作朝廷之巨屏實利建侯委兵旅之大權必先謀帥况地雄北海境接東萊任貢鹽絺俗尚經傳所付至重擢才惟難守太府卿孫範文學傳家清貞勵已以詞律振迹用吏理揚名周旋臺閣之間浹洽休嘉之稱連分符竹出撫蒸黎所至皆號為循良秉心不爽於誠信洎徵還朝籍服在大僚物情與能公論彌暢俾列象河之位仍司長府之殷出納有程帑藏無耗念此勤效爰議酬勞乃眷全齊名高中域州實分於伯禹化則起於太公具五方之人成一都之會其所撫制必俟通明夫務穡勸分之謂勤秣馬訓兵之謂備保大定功之謂德救患睦鄰之謂仁率彼三軍行茲四美藩垣東夏羽衛中邦勤修武經靜致俗阜先副朝獎用答豫知既超鄭默之官又進周昌之秩皆謂殊寵佇聞休聲可檢校左散騎常侍青州節度使門下盟津雄屏大鹵名都上控三川旁聯七邑風俗近陪於卜洛山河舊壯於列京苟非謀叶理戎惠能及物則何以並膺閫寄服我朝章河東節度兼諸道行營招討黨項使王宰業貫韜鈐家傳帶礪備五才為戰器講七德為武經氣本沉雄望高宿將河陽節度檢校禮部尚書李拭學深堂奧慶襲軒裳以言行為樞機以禮義為干櫓才推通變時號正人咸早分武符頗識兵要頃總師旅共平壺關既宏偃伯之功並著勤王之節嘗酬顯效久殿參墟歷涉清途動聞直道爰自太府出戌浙河載申攬轡之能果稱宣風之美用稽懿績乃踐齋壇朕以雜虜犯邊天兵在野盡護諸將屬於長材而宰以微恙所嬰全師難進虜成逋寇始務更張宜擁斾於中軍復建旄於善地久以晉陽作鎮戎索所鄰撫其四封必資碩望而拭臨人著術整衆有方克樹休聲允膺茂選俾改轅於東夏盛推轂於北門爾其肅彼戎行條其吏職內安凋弊遠贍征徭勉副虛懷佇振紀律不移鄭武之位再居陳寵之班懋乃有終式承丕命門下統制方隅昭宣威略苟非績效之茂孰當委寄之權故開幕任青登壇拜信建置斯重古今為常幽州節度留後檢校左散騎常侍張允伸性稟誠明才推倜儻端已每存於忠孝嗜學早習乎天人侃然器能冠於戎籍自維城遙領留務在躬惟專報國之心以洽奉公之道節度既換儉恪彌勤况遼陽甲兵之雄幽都控馭之遠假機謀以董雜俗資刑賞以靖朔鄰由是錫鈇鉞之正名授喉舌之顯秩升以亞相示之殊榮於戲施令在嚴失之者則虐為仁由惠過之者則非所宜政不逮苛法不隳制講武備以禦寇舉化條而育人服吾寵光佇爾休問可檢校工部尚書幽州節度使門下秦築城以備虜未若選將為長城漢設策以禦戎吾知得人為上策况朔野之北全涼以東兵臨五城地遠千里非籌勞無以分爵土非用武何以示恩威副吾勤求允屬雄傑檢校金部尚書金吾衛大將軍田牟才度間生智能兼聳家承弓冶業擅韜鈐而又揭厲儒流詳嫻吏術不戰而烽煙自息言兵而勝負已知洎早服官榮常參羽衛流五原之懿績播三鎮之威聲風猷藹然令望斯著如爾兄弟之孝友化於閨門祖父之忠貞書於竹帛是用擢在環列為豫警巡覿其形容益見誠意朕以黨羌未滅邊障是憂藉汝通明與我安撫所宜勵清廉於虜俗宣惠澤於戎人恢紀律貴乎齊刑理蠻夷惡其生事藩垣北地控帶長河仍加毛玠之榮不改趙堯之秩可檢校吏部尚書靈州節度使門下蒲津重鎮式居關輔之榮梁苑故都上應房心之野若非德繼周舅才超漢臣誰當重難允彼僉議銀青光祿大夫檢校兵部尚書兼左金吾衛大將軍鄭光風宇沖曠襟懷坦夷常推陰識之心早慕竇嬰之美浙江道觀察使檢校工部尚書鄭朗氣韻黃鍾文含大雅退食著羔羊之節進身無茅茹之連或業擅宏圖名高懿績鎮青方而謳謠未息總緹騎而績效已宣或誠由事彰行與言契踐三署而風猷暗襲廉四方而惠愛相輝而皆並立本朝藹然時傑品乃才用副吾深憂錫瑞分圭以示恩寵嗚呼國家自天寶之後中原宿兵元和以來信義方洽近者或任非所付官不敬常蒞事者以依阿為雅尚之名將軍者以姑息為苟安之計爾宜改轍而理貞師以嚴吏姦必除法弊當革是以再題陳寵之劒不易趙堯之印授彼戎律榮登將壇勉揚休聲罔忝厥命鄯大中二年官檢校禮部員外郎范陽盧鄯幼女姚婆年八歲生而㯋悟髫而秀妙才能言而知孝道才能行而服規繩才能誦而諷女儀才能持而秉針組動有理致婉而聽順衣服飲食生知禮讓先意承志不學而能常期長成必有操行芳譽流於親戚之間何圖玉樹先秋蕣花早落敏而不壽痛何言耶以大中六年十月三日夭於襄州官舍以明年七月十三日葬於鄭州滎澤縣廣武原祔叔祖贈給事中府君之松檟冀冥寞之內魂而知歸以其封樹不廣懼年代未遠而邱隴夷平聊刊片石以敘其年月與事實冀千載之後不至湮沉耳大中七年七月十三日前檢校禮部員外郎盧鄯記儉大中二年為幽州節度使掌書記天垂四序所以表成歲之功地別九州所以分代天之治寒燠之運行叶度河嶽之感應有期是故體五常而承五福贊九德而著九功盛業克著於旗常佳名攸傳於竹帛素行蘊蓄於至德積慶必貽於後昆傳曰名德若不當代其後必有達人富哉言乎有唐贈工部尚書張公孕靈有道之邦懷抱縱橫之略宏圖推於一德奇表出於萬人操筆運六體之工彎弧倍六鈞之力輕財扶義急病攘夷然諾信於友朋賙給行於州里不以一隅自束不以一節自恃情懷久約常從結駟之遊座列嘉賓遍受脫驂之惠視公家之祿於我如浮雲顧金玉之藏比之於纎芥居如列土譽若置郵語默順時浮沉樂道僶俯從事逍遙不羈嘗仕本州歷居右職貞元初敕授銀青光祿大夫太子中允四年薨於昌平縣之官舍春秋七十有五旋窆於文安縣之西北安樂鄉原夫人扶風郡太夫人魯氏左廂兵馬使太子詹事福之女行符針頌禮具蘋蘩後公二十二年而沒至是祔焉禮也公諱仁憲字仁憲其先清河人五世相韓文成見稱於漢代三臺輔晉壯武克大於當時昭彰四表厭飫八極祖諱烈為瀛州刺史封清河伯遂家於燕王父諱佐明宣威將軍行幽州遊徼府右果毅都尉烈考諱元皎宣節校尉幽州潤德府折衝都尉奕世載德克廣前修輝華閥閲之門錯綜崆洞之秀元子諱神寂無祿早世嗣子諱光朝冠軍大將軍行左威衛大將軍檢校國子祭酒遷兵部尚書訓稟義方才推命世學該典禮識洞機符倜儻不㣥洞達無撓出則摧敵鋒居則管韜鈐珠履嘗館於三千鐵衣時駐於十萬勳銘彞器譽冠縉紳銀黃坐致琴築自娛膺福履以樂天坦襟懷以卒歲積慶垂範高朗令終誕生元臣為國巨鎮兵部嗣子仲武今幽州盧龍節度副大使知節度使兩蕃經略盧龍軍兼充招撫回鶻等使銀青光祿大夫檢校司空同中書門下平章事兼幽州大都督府長史蘭陵郡王食邑三千戶星辰降祚而秉政清熙帝圖立言而金玉王度嚴干戈以衛社稷推彖象以究天文側席求賢勞心致理歷階清級夙奉鴻私洎受鉞專征登庸任相和羹鼎鼐圖治六卿之先為國幹楨論道三臺之列破獯鬻之衆帳盈七千拓鮮卑之疆地開千里七狄稽顙百蠻投誠張國四維承天八柱實生靈之藻鏡為明主之腹心由是賞受二帥職承閫外之專澤被一宗闕受專城之寄伯氏諱仲斌薊州刺史靜塞軍營田團練等使兼侍御史季諱仲至今涿州刺史永泰軍營田團練等使檢校工部尚書光祿大夫姒續家寶蟬聯國楨黃霸為列郡之雄關羽乃萬人之敵相國有子曰直方國子祭酒兼御史中丞薊州有子長曰得輔國子祭酒兼侍御史次曰得平兼監察御史審州司馬敬鉉幽都主簿敬殷幽州參軍洎長房有子曰沛早亡琇兼監察御史有孫曰惠連兼殿中侍御史皆圭璋特達冠蓋相望丹青克紹於形容蘭菊聯芳於英蒂所謂勳業卓冠儒史名家穆然清風高視㣥品相國以逮事逾遠聿修漸遙松楸既行貞珉未勒景行安仰思心罔寧是用伐石他山建碑立隧以儉居其家常窺舊史竊熟華宗授簡勒銘期於直筆盛德難名扣元關而常思墮淚謏聞強繹黃絹而徒愧受辛終惟恐惶敢載銘曰自泮元黃即垂載籍華宗上德奇謀異迹問道赤松受兵黃石道著昭晰慶流輝赫當塗代漢典午承曹地分東西位列卑高為郎著節作宰操刀國儲俊乂代有英髦降及元魏清河運偶為郡臨燕卜居戴斗公卿窟宅德義泉藪史不絶書士無虛口惟唐八葉誕生尚書文章軌範禮義權輿揮金滿路載德盈車清風穆若善賈沽諸泳遊道德蘊蓄儒史力荷千鈞名馳萬里不享睂壽不登貴仕道邁前修慶流後嗣克生令子實曰時英魁梧器宇性格恢宏爵位隆重度量襟靈業惟匡國學表過庭厥有孝孫作唐丞相肅穆鳳池崢嶸玉帳持衡任重仗節心壯龜鶴齊年山河比量藉藉㣥從愔愔德音或臺或閣如玉如金日星照地桃李垂陰雪霽崑闕花繁鄧林晉勒景鐘衛刊彞鼎金石既刻丹青重炳諫卿金陵人大中時鄉貢進士聞圖經寶書之蓬萊山其迹近古昔相語秦始皇帝使乎仙闕輩徐福也使泛滄海訪神仙之術於蓬萊山此闕四字遊止之樂竈蹤殘丹井泉在觀名焉自隋君統宇之二年廢去之考乃遺址肅皇在上汝南袁仲宣守臨闕四字聞能祈福闕上闕二字興起焉神龍之初縣肇名創城詔屬於台及乎廣德之二年爰移於明台守仲宣得闕四字已七十年闕屋伐闕荊榛叢荒山屬層疊翠寒冷其徒無名人不能宣舉闕十一字霖闕五字老闕幾還闕歟闕遭壓闕今上登御之元年縣令宏農楊宏正帝命而官也精苦史事操心義闕五字白玉投闕者也喟然而嗟之闕四字沒於高蒿牛羊牧之狐兔馳之許乎葺全不最細其事任刀未堪足闕五字今世吾且不能率不能不闕爾子來乃日計之日計之不足以月而年必為之成功一唱也而人罔不感而闕六字人闕二字思嘗望之闕二字不闕三字其爽者也縣令然之告刺史隴西李公敬方既知不私也久矣賞舉闕五字人私以闕太守登進士闕三字試為美豈知乎大惠生民苦心建業而異之我守明歲餘年矣闕恩更於陳闕五字事無隋焉彭城劉操郡督郵也職禦謹闕二字繩無闕三字悉力而前闕行其道者也念此蓬萊非宏農君不能闕五字隴西公莫從也乃召工之能匠庸作闕甃高闕四字是壇剗蕪謺砌築室架棟上搆崇崇屹倚橫巘虛巒闕五字起自下而高龍翔鳳舉勢壓奔嶺海日闕照赫赫融融亦孔之闕縣闕二字肆民之病請禱而巳大字書貞元闕五字之御序而初止方之闕數十闕二字俸無悔以答爾家無餘儲縣令仁乎民乎知乎既了事他山鑿石是闕五字負荷之力闕入地壯勢如走為秉筆者書之文章銘曰周祚將衰老聃隱也其道明明溥天之下其一教言何有可得聞乎維道與德古今共孚其二誰言隱去厥德不死闕四字上善若水其三道不可道邈哉微言衆妙之門元之又元其四廢與定矣敗斯必成在昔隋朝當道毀平其五興言何自自肅皇帝天半瀑泉高秋鶴唳其六七十許年猶孤殿闕愁大風起吹落滄海其七爰力爰謀有宏農人功而不費煥然而新其八海月微明仙衣蟲羽蟲羽高壇步虛聲入松雨其九建此大猷實楊之功報言其徒自高清風其十節大中時進士嘗為河東節度使盧鈞巡官後官戶部郎中業儒之人喜排釋氏其論必曰禹湯文武周公孔子之代皆無有釋釋氏之興衰亂之所奉也宜一掃絶剗革之使不得滋釋氏源於漢流於晉瀰漫於宋魏齊梁陳隋唐孝和聖真之間論者之言粗矣抑能知其然未知其所以然者也吾請言之昔有一夫膚腯而色凝氣烈而神清未嘗謁醫未嘗禱鬼恬然保順罔有札瘥之患固善也即一夫不幸而有寒暑風溼之疴背癃而足躄耳瞶而目瞑於是攻尉之術用焉禳禬之事紛焉是二夫豈特相反耶蓋病與不病勢異耳嗟乎三代之前世康矣三代之季世病矣三代之前禹湯文武德義蕃之周公孔子典教持之道風雖衰漸漬猶存詐不勝信惡知避善於是有擊壤之歌由庚之詩人人而樂也三代之季道風大衰力詐以覆信扇澆而散朴善以柔退惡以強用廢井田則豪窶相乘矣務封略則攻戰亟用矣務實帑則聚斂之臣升矣務勝下則掊克寸之吏貴矣上所以御其下者欺之下所以奉其上者苟之上下相仇激為怨俗於是有汨羅之客有負石之夫人人愁怨也夫釋氏之教以清淨恬虛為禪定以柔謙退讓為忍辱故怨爭可得而息也以菲薄勤苦為修行以窮達壽夭為因果故賤陋可得而安也故其喻云必煩惱乃見佛性則其本衰代之風激之也夫衰代之風舉無可樂者也不有釋氏以救之尚安所寄其心乎論者不責衰代之俗而尢釋氏之盛則是抱疾之夫而責其醫禱攻療者也徒知釋因衰代而生不知衰代須釋氏之救也何以言之耶夫俗既病矣人既愁矣不有釋氏使安其分勇者將奮而思鬬知者將靜而思謀則阡陌之人皆紛紛而㣥起矣今釋氏一歸之分而不責於人故賢智俊朗之士皆息心焉其不能達此者愚人也惟上所役焉故離衰亂之俗可得而安賴此也若之何而翦去之哉論者不思釋氏扶世助化之大益而疾其雕鎪綵繪之小費吾故曰能知其然不知其所以然者也會昌季年武宗大翦釋氏巾其徒且數萬之民隸具其居容貌於土木者沈諸水言詞於紙素者烈諸火分命御史乘驛走天下察敢隱匿者罪之由是天下名祠珍宇毀撤如掃天子建號之初雪釋氏之不可廢也詔徐復之而自湖以南遠人畏法不能酌朝廷之體前時焚撤書像殆無遺者故雖明命復許制立莫能得其書道林寺湘川之勝遊也有釋疏言警辨有謀獨曰太原府國家舊都多釋祠我聞其帥司空范陽公天下仁人我第往求購釋氏遺文以惠湘川之人宜其聽我而助成之矣即杖而北遊既上謁軍門范陽公果諾之因四求散逸不成蘊帙者至釋祠不見焚而副剩者又命講丐以補繕闕漏者月未幾凡得釋經五千四十八卷以大中九年秋八月輦自河東而歸於湘焉噫釋氏之助世既言之矣嚮非我君洞鑒理源其何能復立之耶既立之且亡其書非有疏言識遠而誠堅孰克宏之耶吾喜疏言奉君之令演釋之宗不憚寒暑之勤德及遠人為敘其事會官恆州刺史郡之雉東方萬楹橫空屹然麗譙之欲造乎天倪者某名曰再建龍興之佛寺焉厥初寺號太空天授二年為大雲我唐開元中詔號龍興會昌五年廢為間地巾像示滅鐘聲絶耳樓臺為薪吁呼表成毀之數者其實在言然而不知言者徒行咨坐歎以為吾釋門之大教將灰燼於今日矣殊不知流濁者攪而清籺多者而精繇是未經歲我皇馭九土懷八荒以為我之提大化也無欲其一事之不得其所於我也而况釋之教毗我之為理者深可取焉宏大法則生死皆無是鎖我之七情也推小乘則禍福皆有是割人之衆惡也惡之興我刑止於殺惡之釋我刑惟其生繇是澄上流禁浮俗曾何以異我之理焉繇是我負衣元郊而復詔天下使率土郡府各復其寺寺之數郡府有差釋之數男女一致其於天彭為郡得復寺之二焉二之數龍興居一一寺度僧三十精選潔行能臻不二之門者居其右焉開須達之園者抑其次矣謹住持善完緝使材無遺用衆有所歸肩一心紹前搆不瞬目使其寺如從涌出者其慎選得人力焉其始也披蒿萊割榛莽重疊敗棟草創危梁嚴贊頌晝夜以聳其信心示因果教化以開其衆意既而遠近咸萃耆艾畢臻浹月疊旬資糧山峙嘯良工度貞木繚以周牆七百餘尺亘以修廊間百十四然後中堂雲構三門洞開儼八臂之瑞容赩丈六之金質崢嶸曤落哉飾邃宇而鳳欲狂飛抱危梁而蟉將拗力吁呼䆗窱王褱麗固不可一二言之也况乎列開講宇周繪四牖東序設以聖神部伍合沓西廂施治無畏常晬慈容然後倣以天途寫其地府笙鏞鐃鈸嘗聞真界之音鼎鑊砧鎚盡載酆都之苦是使即之者勇善望之者悛惡誠象設之多岐亦針規之別戶者也况創浮圖建寶剎請金口之妙典萬軸玉崇銘佛頂之真言講幢珠綴是知摩騰建寺豈滯有為如來葺門寧妨無著以是因復寺而破性相者以為空寂兩忘方歸真諦性相俱在未入妙塗如是則理乖圓對法閡影從俾迷方者盡不得出於三途溺川者何緣拯於五衍茫茫八表盡從心猿浩浩㣥生誰調意馬因知空寂與性相同途性相與空寂易軌非性相無以臻空寂非空寂無以見性相是知性相為空寂之筌蹄空寂因性相而超度如是則寺不得不復道不得不宏捨之不可猶四教之在躬為之則無何三乘之別載大矣哉釋教之復興者其於誨誘弼化不可得而名也而况彭門地控山河俗多獷悍邪正相軋是非堅明雖五刑具設誠足以攝其威而百法俱陳固可以斂其惡豫剖符是郡星欲二周守成之下螟蟲蟲望境而他飛行化之初商旅乘風而沓至以是公多暇日因諾衆長老與鄉之鮐耋之請而書復寺之歲月以廣其一二焉銘曰吾皇混一三教兮復建仁祠復之多少兮其數甚宜不屈土木兮不奪耕機吮筆糾窮兮日用不知上或以之為定制兮不熾不衰寺之一復兮衆知其非防咸通中鄉貢進士攝鄆曹濮等州館驛巡官皇帝御宇之十年歲在巳丑夫子三十九代孫魯國公節鎮汶陽之三載秋霜共凜冬日均和里閭無桴鼓之聲耆艾有袴襦之詠道已清矣政已成矣於是瞻故鄉以徘徊想廟貌而怊悵乃謂僚佐曰伊豫聖祖實號儒宗英靈始謝於衰周德教方隆於大漢爰因舊宅是構靈祠粵自國朝屢加崇飾文榱繡桷雖留藻繪之功日往月來頗有傾摧之勢故老動淒涼之思諸生興嗟歎之音今忝鎮東平幸邇鄉里雖無由展敬而敢忘修營既而飛章上陳請以私俸葺飾由是命工庀事飾舊加新浹旬之間其功乃就門連歸德先分數仞之形殿接靈光重見獨存之狀晬容穆若更表溫恭列侍儼然如將請益丹楹對聳還疑夢奠之時素壁高標宛是藏書之後槐影疏而市晚杏枝暗而壇孤不假大夫幽蘭自滿無煩太守刺草全除稷門之舊業俄興闕里之清風再起既可以傳芳萬古亦可以作範一時且開闢以來霸王之道言其德也莫踰於湯武語其功也無尚於桓文墳土未乾而邱隴已平子孫縱存而蒸嘗悉絶夫子無尺寸之地微一旅之衆修仁義者取為規矩肆強梁者莫不欽崇生有厄於棲遲歿居尊於南面而樵蘇莫採廟貌長存道德相承簪裾不絶則夫子之道既可章於積善魯公之德實無愧於聿修防目覩靈蹤躬尋盛績仰聖姿而如在歎休烈而難名承命紀功讓不獲已刻諸貞石深愧菲才謹記
