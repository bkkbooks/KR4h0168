front:
  text: 全唐文欽定全唐文卷二百三十七安恆冀州武邑人神龍初為習藝館內教節愍太子之難或讒安恆豫謀下獄死睿宗立詔贈諫議大夫
  hash: sha256:dcba410a51bcc601d7fdb414f6c71cbde19a62467698b881e0f2107a4c281385
  markers:
  - {type: head, offset: 14, content: 蘇安恒, id: KR4h0168_NFKB_237-h1, level: 1}
body:
  text: 臣聞歷數在躬握璿璣者哲后天命攸屬臨寶極者聖人或揖讓而升或干戈以定二途一也古今共之伏惟皇帝陛下德合天地澤流河海庶物和平靈光充塞臣謂胥庭之化無以過也陛下欽先聖之顧託受嗣子之推讓豈不以極斯大節成此鴻勳應天順人于今二十餘年矣臣馳情緗素竊見女媧之代風俗朴人淳易理垂衣拱手不足可言洎漢朝以惠帝幼沖呂后監撫享國八歲日不暇給雖傳策亦烏足道哉豈如陛下之在位五星同色四海無波陛下造明堂即祖文宗武之業也封中嶽則萬代一時之事也受寶圖即河圖洛書之瑞也功既大矣業既成矣即當捐其犬馬減其服御觀四大其如遺視萬乘其若脫陛下豈不聞虞舜褰裳周公復辟良以大禹至聖成王既長推位遜國其道備焉故舜之於禹事祗族親旦與成王不離叔父且族親何如子之愛叔父何如母之恩今太子孝敬是崇春秋既壯若使統臨宸極何異陛下之身陛下年德既尊寶位將倦機務殷重浩蕩勞心何不釋位東宮自怡聖體陛下縱日慎一日雖休勿休其若大寶何其若人事何陛下輟金輪聖神等號即是厭倦萬機之象此謂天意也太子以姦臣枉搆久巳自新相王推位青宮退居朱邸天下聞之莫不謳吟聖代此謂人事也故知天意人事鍾我聖朝大臣重祿不言近臣畏罪不諫使吾君有堯舜之位不行堯舜之道故書曰后德惟臣此之謂也臣又聞自古明王之以孝理天下者不見二姓而俱王也當今梁定河內建昌諸王等承陛下之蔭覆並得封王臣恐千秋萬歲之後於事非便臣請黜為公侯任以間薄曹務臣又聞陛下有二十餘孫今無尺土之侯此非長久計也臣請四面都督及要衝州郡分土而王之縱今年尚幼小未聞養人之術臣請擇立師傅成其孝敬之道將以夾輔周室藩屏皇家使纍葉重光饗祀不輟斯為美矣豈不大哉臣今又聞胡賊侵邊覘中國陛下居總章申廟算赫然發怒分閫出師挽粟飛芻十室而九撓簳鑠刃以時繫年即士卒不遑府庫空竭此其謂也陛下若能告倦萬幾推位太子分州列郡以王子孫自然四夷聞之繫頸面縛百姓聞之鼓腹擊壤史臣曰掩媧燧而邁胥庭後代聞之曰四三皇而六五帝豈虛也哉豈虛也哉臣山中一草萊耳無擊鐘鼎食之榮有碩學鴻儒之業臣來日跪而辭父父謂臣曰丈夫處代君子生年必當獻一謀畫一策厥塗不就草木何殊今上有堯舜之德下有稷皋之位古人有言欲安其家必先安其國欲安其親必先安其君當今天下雖安亦有未然之計故書曰若昔大猷制理於未亂保邦於未危此其謂也臣母又謂臣曰朝暮倚閭而望汝若能上干人主進書獻説揚名後代以榮父母是吾之子也臣感父母之言明發不寐今故杖策千里徒步三川雖牽拙而無同敢獻芹而竊抃陛下若採微臣一言之善成家國萬代之基臣之懇誠幸甚謹言臣聞忠臣不順時而取寵烈士不惜死而偷生故君道不明者忠臣之過歟臣道不軌者烈士之過歟伏惟皇帝陛下功格四表道大百王昔者先皇晏駕留其顧託將以萬務殷廣令陛下兼知政事雖唐堯虞舜居其位而共工伯鯀在其朝間陛下骨肉之恩阻陛下母子之愛愚臣謂聖情以運祚將衰極斯大節天下之人謂陛下微弱李氏貪天之功何以年在耄倦而不能復子明辟使忠言莫進姦邪乘時夷狄紛擾屠害黎庶陛下雖納隍軫念亦何以救此生靈臣聞天下者神堯文皇之天下也昔有隋失馭小人道長㣥雄駭鹿四海瞻烏皇唐親事戎旃鳳翔參野削平宇縣龍飛踐極歃血為盟指河為誓非李氏不王非功臣不封陛下雖居正統實因唐氏舊基故詩曰惟鵲有巢惟鳩居之此言雖小可以喻大陛下自坤生德乘乾作主豈不以上符天意下順人心東宮昔在諒陰相王又非長子陛下恐宗祀中絶所以應其謳歌當今太子追回年德俱盛陛下貪其寶位而忘母子深恩臣聞京邑翼翼四方取則陛下蔽太子之元良枉太子之神器何以教天下母慈子孝焉何以使天下移風易俗焉惟陛下思之將何聖顏以見唐家宗廟將何誥命以謁大帝墳陵陛下何故日夜積憂不知鐘鳴漏盡臣愚以為天意人事還歸李家陛下雖安天位殊不知物極則反器滿則傾故語曰當斷不斷反受其亂此之謂也陛下不如高揖樞務自怡聖躬命史臣以書之令樂府以歌之斯亦太平之盛事也臣聞見過不諫非忠臣也畏死不言非勇士也臣何惜一朝之命而不安萬乘之國哉故曰苟利國家雖死可矣願陛下暫輟萬務詳臣愚見陛下若以臣為忠則從諫如流擇是而用若以臣為不忠則斬取臣頭以令天下臣伏聞昔者明王有含天下之量有濟天下之心必能達天下之善除天下之惡若為君上而不行此四者則當神冤鬼怒陰錯陽亂欲使國家榮泰其可得乎伏惟皇帝陛下懸像設教順時致理非不欲褒進良直屏黜姦佞蓋為逆耳者寡順情者多陛下往日革命之初際即能勤於庶政親總萬幾博採謀猷旁求俊彥故四海之內以陛下為納諫之主陛下期年以來怠於政事讒邪結黨水火成災百姓不親五品不遜故四海之內以陛下為受佞之主當今邪正莫辨獄訟蒙冤豈陛下昔是而今非蓋居安忘危之失也臣竊見御史大夫檢校太子左庶子同鳳閣鸞臺平章事魏元忠廉直有聞位居宰輔履中正之基者用元忠為龜鑑踐邪佞之路者疾元忠如仇讎伏見麟臺監張易之兄弟在身無德於國無功不逾數年遂極隆貴自當飲冰懷懼酌水思清夙夜兢兢以答恩造不謂溪壑其志豺狼其心欲指鹿而獻蒲先害忠而損善斯將亂代之法汚我明君之朝自元忠下獄以來臣見長安城內街談巷議皆以陛下委任姦佞斥逐賢良以元忠必無不順之言以易之必有交亂之意相逢偶語人心不安雖有忠臣烈士空撫髀於私室而鉗口不敢言者皆懼易之等威權恐無辜而受戮亦徒虛死耳今三秋屆節蕃中則馳馬盛肥九牧作貢天下則斂賦繁重以臣言之此巳不勝其弊況又聞陛下縱逸讒慝禁錮善良倘刑罰失中則遐邇生變臣恐四夷因之即窺覘得失以為邊郡之患百姓因之即聚結義兵以除君側之惡復恐逐鹿之黨叩關而至亂階之徒從中相應爭鋒於朱雀門內問鼎於大明殿前陛下將何事以謝之復何方以御之臣今為陛下計安百姓之心者莫若收雷電之威解元忠之網復其爵位君臣如初則天下幸甚陛下好生惡殺縱不能斬佞臣頭以塞人望臣請奪其榮寵翦其羽翼無使權柄在手驕橫日滋專國倍於穰侯回天過於左悺則社稷危矣惟陛下圖之臣雖微賤天性愚直未曾謁王侯將相亦不識元忠易之之面豈此可親而彼可踈但恐讒邪長而忠臣絶伏惟陛下暫回天鑒察臣此心即微臣朝得志行夕死無恨知微字辨機太僕少卿立政子永徽元年以門蔭補宏文生三年擢進士第釋褐授太子內坊丞遷祕書郎纍官太子左庶子太僕少卿封東海郡侯除亠兊州都督景雲二年進封公檢校鴻臚少卿太極二年卒粵以天子制爵祿諸侯掌邦畿五十里之國者闕十一字十有一蓋所以設方伯置令長強理宇宙宰制㣥庶者矣故汝南國之心腹河東郡之股肱非賢勿居惟材是寄大則曳青縞而紆銀印小則綰墨綬而佩銅章是以闕一字宰闕一字城皇漢則以南臺御史俾居闕一字邑大晉則以東宮闕一字人故能齊其政而不失其宜修其教而不易其俗者其惟明堂縣令東海于公乎公諱大猷字徽本東海郯人後闕三字遂寓家雍州今高闕二字也闕二字帝闕一字之命官開國侯伯之保姓受氏祚闕一字則周公之允邘韓則武王之穆金章建國里中大丞相之門玉帳闕一字家閫外列將軍之戟曾祖宣道隨內史舍人左衛率成安縣開國子皇朝贈使持節都督涼肅甘沙五州諸軍事涼州刺史諡曰獻徐邈以東州儒素劉超則西省人倫表闕二字而警彤闈執虎符而飛闕三字德降表墳之贈優賢崇告第之儀祖志寧禮部尚書侍中尚書左僕射太子太傅太師上柱國燕國公贈使持節都督幽易媯檀平燕六州諸軍事幽州刺史諡曰定皂裾瓊佩北斗喉舌之司絳服金蟬西掖股肱之寄劒履上殿方崇重傅之恩羽葆蓋車式備尊師之禮鳳扆推其獻納龍樓闕一字其闕二字父立政尚書吏部郎中國子司業太子率更令渠虢二州刺史太僕少卿上護軍仙臺侍女禮閣郎官攝齋槐肆之前曳組桂山之下郗超以蕃伯之望職總闕一字河馬防以闕一字公之材榮參象海公丹山鳳下滄溟鯤化明珠則徑寸為寶白璧則盈尺稱珍小年識五方之書大成通九經之義嬉戲則以詩書禮樂造次則以孝友謙沖顯慶三年解褐左千牛備身材推令德士選良家青璅晨嚴赤墀近侍緣坐左遷梓州參軍事譴即謫居咎非投俾郗嘉賓之卓犖高雋見闕一字公軍袁彥道之俶儻不羈言歸柏府轉桂州都督府功曹參軍境接鳶溪載洽升龍之譽地鄰鯨海幾淪棲鳳之材文明元年選授蘇州司兵參軍東里藩維恐老荊州從事南中方鎮謂屈蠻府參軍屬攀號弓劒遏密金石錫印章而録舊膺璽誥而念勞垂拱三年敕除并州大都督府士曹參軍唐叔翦桐之境遲爾材闕三字分竹之郊光我藩翰枌榆之地誠為沮洳之川豐沛之郊何必芒碭之澤帝鄉推其善價公府義其良圖惡少遷佩犢之風流俗漸驅雞之化永昌元年授洛州闕二字參軍向雄佐鎮西之府毛玠處平南之軍太守范滂主諾之聲猷自遠功曹岑晊坐嘯之風裁獨高制授朝散大夫餘如故尋加朝請大夫行闕一字州闕一字官縣令榮曜朱紱材光紫誥蔣公炎豈千石之器而委割雞龎士元非百里之材方思展驥制除德州司馬又遷汾州長史一冠介幘二職彤襜歷從事之班居闕二字之闕一字形色安於席地神意見乎屏闕一字不撓於危無負於物聖歷元年除使持節隨州諸軍事隨州刺史田叔以壯勇而刺三河王尊以忠貞而驅九折分行闕二字朱明以刺強宗獨坐州鎮元英而按豪族聖歷二年制除雍州明堂縣令黃圖帝國黑水神皋地即京都人多傑暴信陽侯之門客尚在必誅寧平主之家僮猶闕三字威信表西門之化惠愛奉東里之風抑挫右姓誅闕二字猾災蝗宛轉由去督郵義鳥歸飛為馴童子推誠而理則人不忍欺宿訟無冤則吏維仰德加以笙簧六籍篋笥五經三寸弱毫回鸞拂羽四闕一字油素縞鳳和鳴眷眷吏人預軫去思之戀依依故老每哥來晚之謠悲夫安仁七旬不遇箱中之術桓侯五日闕一字聞壁上之行以聖歷三年七月十日終於萬年縣常樂里之私第春秋五十七黃髮攀輈心傷折石之痛元髫戀匹瞼盈埋玉之悲公劒號純鈎珍稱闕一字炎儀表闕二字風神壯勇黃金必棄每見揮鋤赤仄無留恆持挂樹總角之歲隱幔駭而不驚佩觿之年闕一字衣去而無慍一日千里四代五公忠孝足以光時能賢足以軌物夫人滎陽鄭氏父闕一字矩雍州富平縣令魏趙郡李氏外闕二字都公闕二字公闕一字服尚書闕一字衣蕙問都闕一字蘭儀婉淑女訓芬乎奉草帚母師光乎主饋即以其年歲次庚子十一月乙亥朔十二日景戌合葬於雍州三原縣萬壽鄉闕一字坳之先塋禮也兄銀青光祿大夫行太子左庶子使持節都督亠兊州諸軍事亠兊州刺史辨機鯉庭禮樂鵷序梓搖山入輔擢彼正人外臺出闕一字慰茲㣥庶鶺鴒懷斷闕一字摧金玉之心鴻鴈悲鳴若灑瓊王褱之闕一字嗟乎八龍長逝三虎永懷庶振家聲思光祖德南陽陌上爰標構石之墳京兆阡傍俾建生金之碣其詞曰浩浩洪源闕三字代闕二字朱輪翻飛紫蓋錫爵分茅命官食采邘韓之穆里閭其大其一傅相繼業公侯踵武氣雄家邦榮曜區宇人之領袖物之規矩闕四字量闕二字公輔其闕一二字明俊德丕承寵光風儀礌落天骨昂藏家闕一字之盛門戶之綱襲茲圭組侍彼巖廓其三銅陵之東珠崖之北姑蘇臺下晏溫鼎側囂然令望偉哉高闕一字端委佐茲刑清訟息其闕一四字以師友賢哉主吏聯翩化鶴徘徊展驥球琳之寶瑚璉之器白日既披青雲自致其五漢東舊國隨有大名關西列郡秦稱上京闕一字有良翰宰闕三字教漸闕二字威加闕一字城其六秩秩德音凜凜風格山靈固闕一字河神是迫手答箋書心明糾擲蟲螟感化犬牙移陌其七僉言惠愛帝曰允諧劇闕一字冖小闕一字繁俗闕一字懷祥鸞翽翽鳴鳳喈喈闕四字玉樹闕一字埋其入衣冠道謝衮職誰補闕三字䫻風悲蒼茫霧苦寂寂兮荒隧幽幽兮后土石槨掩兮千年金聲振兮萬古其九知古深州陸澤人舉進士長安中歷遷鳳閣舍人衛尉少卿神龍初擢拜吏部侍郎授晉州刺史睿宗景雲二年遷右散騎常侍同中書門下平章事先天二年纍封梁國公知吏部尚書開元二年改紫微令除工部尚書罷知政事三年卒年六十九贈幽州都督諡曰忠省表具知朕初聞三輔之間今歲善熟朕緣陵寢誠欲西幸然積纍虛年乍得小稔即又聚食心所重難儻夏麥不登未免匱乏百姓不足君孰與安所以再三痛懷欲去不忍至於宮苑所樂氣候非宜苟得人安終不以此為念卿可宣前旨更俟後期所請遍示朝列及宣付史官亦豈煩也任卿等自商量臣聞穀梁傳曰古之君人者必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢書曰不作無益害有益又曰罔咈百姓以從已之欲禮曰季夏之月樹木方盛無有斬伐不可興土功以妨農又曰季夏行冬令則風寒不時語曰修已以安百姓此皆興化立理之教為政養人之本也今陛下為公主造觀將樹功德以祈福佑但兩觀之地皆百姓之宅卒然迫逼令其轉徙扶老攜幼投竄無所發剔椽瓦呼嗟道路乖人事違天時起無用之作崇不急之務㣥心震搖衆口藉藉陛下為人父母欲何以安之且國有册君舉必記動則左史書之言則右史書之是以非禮勿言非禮勿動夫如是則君之所舉可不慎歟微臣備位諫諍兼秉史筆書而不法後嗣何觀臣愚必以為不可伏願俯順人欲仰稽天意降德音下明策速罷功役收之桑榆其失不遠臣聞人以君為天君以人為本人安則政理本固則邦寧自陛下戡翦凶逆君臨寶位蒼生喁喁以謂朝有新政今風教頽替日甚一日府藏空虛人力凋敝營作不息官員日增諸司試補員外檢校等官僅至二千餘人太府之布帛以殫太倉之米粟不支又金仙玉真等觀造作咸非急務臣先請奏停竟亦未止今歲前水後旱五穀不熟若至來春必甚飢饉陛下為人父母欲何方以賑恤療飢拯溺須及其時又突厥於中國為患其來自久其人本無禮義焉有誠信今雖遣使來請結婚恐豺狼之心首鼠何定弱則順伏強則驕逆屬草衰月滿弓徑馬肥乘中國飢虛在和親際會窺犯亭鄣國家何以防之臣所論者事甚急切伏願特垂詳察承屯聚兵馬初不知者頗亦為疑但以彼國君臣素敦信義況立盟誓又結婚姻悠悠之談復何足信若見利忘義破親負約神道不遠何以逃殃自見來書果符意揣兩國和好百姓安寧永絶邊釁豈非好事所論分界先有盟書今奉敕令左散騎常侍解琬往河源與公平章解琬國之重臣素有德行言無二諾衆所共推昔嘗充使西安備諳彼之境土今遣將命實惟命焉欽明字文思京兆始平人舉明經永淳天授間又中英才傑出業奧六經等科拜著作郎長安初纍遷太子率更令兼崇文館學士進太子少保中宗立擢拜國子祭酒同中書門下三品加銀青光祿大夫歷刑禮二部尚書兼修國史纍封魯國公景龍三年中宗將祀南郊欽明希旨言皇后當助祭於是韋后為亞獻景雲初侍御史倪若水劾論其事左授饒州刺史徙洪州都督入為崇文館學士謹按周禮天神曰祀地祇曰祭宗廟曰享大宗伯職曰祀大神祭大祇享大鬼理其大禮若王有故不預則攝位凡大祭祀王后不預則攝而薦徹豆籩又追師職掌王后之首服以待祭祀又內司服職掌王后之六服凡祭祀供后之衣服又九嬪職大祭祀后祼獻則贊瑤爵亦如之據此諸文即皇后合助皇帝祀天神祭地祇明矣故鄭元注內司服云闕狄皇后助王祭㣥小祀之服然則小祀尚助王祭中大推理可知闕狄之上猶有兩服第一褘衣第二搖狄第三闕狄此三狄皆助祭之服闕狄即助祭小祀即知搖狄助祭中祀褘衣助祭大祀鄭舉一隅故不委説惟祭宗廟周禮王有兩服先王衮冕先公鷩冕鄭元因此以后助祭宗廟亦分兩服云褘衣助祭先王搖狄助祭先公不言助祭天地社稷自宜三隅而反且周禮正文凡祭王后不預既不專言宗廟即知兼祀天地故云凡也又春秋外傳云禘郊之事天子親射其牲王后親舂其粢故代婦職但云詔王后之禮事不主言宗廟也若專主宗廟者則內宗外宗職皆言掌宗廟之祭祀此皆禮文分明不合疑惑舊説以天子父天母地兄日姊月所以祀天於南郊祭地於北郊朝日於東門之外以昭事神訓人事君必躬親以禮之有故然後使攝此其義也又禮記祭統曰夫祭也者必夫婦親之所以備內外之官也官備則具備又哀公問於孔子曰冕而親迎不巳重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂巳重焉又漢書郊祀志云天地合祭先祖配天先妣配地天地合精夫婦判合祭天南郊則以地配一體之義也據此諸文即知皇后合助祭望請別修助祭儀注同進博士三人自分兩議張齊賢以景帝始封為唐宗太祖不合更祖昭王劉承慶以王制三昭三穆不合重崇宣帝臣等商議依張齊賢以景皇帝為太祖依劉承慶尊崇六室周頌載芟篇敘曰春藉田而祈社稷也禮記天子為藉千畝諸侯為藉百畝即此緣有藉田自為立社王社侯社因此有名卿大夫以下無藉田所以成㣥置社藉田壇祭止是王社往者直云藉田近日改名先農之祭不知王社根本魏世妄設三牢㣥説紛紛乍毀乍立晉氏徒云省費不知仍在藉田千畝共迷其日固久不詳經典致此喧譁今者創立社稷理宜正名典故請改儀注及式將先農以為帝社使人聽不惑古義具存移前代之末學表當今之準繩豈不美歟藉田之祭本是王社承前若祠先農共是勾龍后稷烈山之子亦謂之農周棄繼之皆祀為稷共工之子后土主名湯既勝夏欲遷不可社稷主祭惟此二神祭法所載祀典皆存自黃帝以下羲農二皇不列常祀豈有社稷之祭上取炎皇正經典籍曾無此語膚淺諸儒妄為曲説借如蠟主先嗇鄭元云若神農徒見易之揉木即云若神農耳如其遠推邃古磨蜄在神農前將為先嗇有何不可此鄭之謬妄不尋祭法根源後儒守株即以為定始立社稷祈報惟祭共工烈山神農未報大功何不遠取祈報即明三皇以上朴略洪荒帝王之道無取為教魏秦靜者又何知社稷先農妄分為二且六宗之義先儒猶且紛然六神之言秦靜憑何分析習俗迷謬殊不可依豈有一藉田中置四壇墠先農王社同貫異名固是一種后稷勾龍更無二道同途分祭四牢徒費豈是爾愛其羊又言漢祀禹神此義更殊未得若將禹平水土其功大于勾龍成湯革夏社時何不替勾龍之祀周棄既將易祀夏禹豈可獨遺漢德不逮殷湯祀禹無乃為諂後王更無遵用明其一時謬僻禮官今欲效僻張禹無乃迂乎前以王社沒于先農欲依祀典正號今乃更加兩祀亦恐乖謬增多退傳禮官更加詳度具依經訓勿據俗儒虛已神龍時官左拾遺臣聞孔子曰唯名與器不可以假人其非李氏而王自古盟書所棄今陛下創制謀始垂範將來為皇王之令圖子孫之明鏡匡復未幾后族有私臣雖庸愚尚知不可史官執必是直書今萬姓禹然聞一善令莫不途歌里頌延頸向風欣然慕化日恐不及陛下奈何行私惠使樵夫議之而先朝贈太原王殷鑒不遠同雲生於膚寸尋木起於蘖栽誠可惜也如渙汗巳行憚改成命臣望請皇后抗表固辭使天下知宏讓之風彤管著沖謙之德是則巍巍聖鑒無得而稱
