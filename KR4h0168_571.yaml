front:
  text: 全唐文欽定全唐文卷五百七十一柳宗元三
  hash: sha256:e2119ffbbdf0edfe5f3c8e6c6fda5567bae4fbf052646c5207a12075e29641bd
body:
  text: 臣某言臣昨日面奉進止以近日少雨今月內無雨即須祈禱今日便降甘雨者天且不違神必有據密雲與綸言繼發時雨將天澤并流臣某誠歡誠慶頓首頓首伏惟皇帝陛下憂切蒸黎慮深稼穡思彼未兆防於無形滲漉每出於湛恩變化亦隨於廣運宸衷暫惕已矯御天之龍聖謨既宣遂洽漏泉之澤霮䨴周布霏微四施黍稷盡成公私皆及野夫鼓舞知帝力之元通官吏歡呼見天心之默喻臣某牧人京邑動仰皇靈渥澤徒加涓滴無助無任感悅屏營之至臣某言臣伏見今月二十四日時雨溥降伏以聖心積念天意遽回移造化之元功革陰陽之常數臣某誠慶誠忭頓首頓首皇帝陛下仁育蒼生恩同赤子目頃天雨未降時稼或愆貶食齊戒至誠幽達又慮宿麥無備播種失時出於宸衷特令賑貸睿謨潛運甘雨遂周布濩垂陰隨聖澤而俱遠滂沱積潤與恩波而共深臣某才術無聞謬司邦甸生成必資於帝力進退何補於天工沐浴太和慚荷無極無任慶躍屏營之至臣某言今月十三日面奉進止緣自春來少雨宜即差官精誠祈禱者十四日臣便差官分赴靈迹其日雲陰四合至十五日甘雨遂降伏惟皇帝陛下言為神化動合天心未成旱暵之虞已積憂勤之慮衆靈受職薈蔚且躋於南山百穀仰榮滂霈遂霑於東作睿謨朝降膏澤夕周知天人之巳交識陰陽之不測然則周王徒勤於方社殷帝虛美於桑林豈若無災而蚤圖未禱而先應化超前聖道貫重元遍野同歡傾都相慶臣之欣躍倍萬恆情臣某言臣於三月二十九日奉進止於諸靈迹處祈雨至三十日甘雨遂降者臣聞惟聖有作先天不違發令而祥風已興致誠而元液旋被臣某誠歡誠賀頓首頓首伏惟皇帝陛下側身防患道邁周王盡力勤人功超夏后聖謨廣運驅百靈以從風神化旁行滋五稼而流澤油雲四合膏雨溥周農壤遂一於肥磽滲漉盡霑於遐邇蒸黎詠德知必自於聖心草木欣榮如有感於皇化有年之慶實在於斯臣以無能謬領京邑上勞宸慮運此歲功無任喜懼屏營之至臣某言臣得上都院官金部員外郎韓述狀報以時雨未降親自於龍堂祈禱有靈禽㣥翔自成行列如隨威鳳以翼龍舟其日降雨者伏以時或愆陽歲之常候式當聖日無害豐年陛下敦本務農憂人閔雨宸慮所至天心自通故得瑞鳥迎舟掩商羊之舞仙雲覆水協從龍之徵初泛灑於上宮遂滂霈於率土自中徂外皆荷生成雨公及私靡不碩茂殷后徒勤於自翦周公空愧於舞雩臣以庸虛謬司垣翰有年之慶惟聖之功臣某不任云云臣某言伏奉月日德音以淄青蕩平褒功宥罪布告遐邇者臣聞肅殺之後每致陽和雷霆既施必聞膏澤伏惟陛下體乾剛以運行叶坤元之翕闢百靈受職六合從風阻兵怙亂者必就梟擒懷忠抱義者無不甄録激其效順特加旄節之榮寵以元功遂兼鼎鉉之任戎行窮賞賚之重死事極褒恤之優劫脅之役盡除聚斂之名皆去傷痍受煦老疾加恩豐財已復其征徭賜種更盈於穜稑嚴山川之祀神必有依申義烈之家物無不感周王推忠厚之化漢帝慚愷悌之風太平之德斯為至盛然則虞巡可復告成將慶於岱宗漢典方行講禮再榮於闕里臣謬膺重寄獲覩太和忭蹈之誠倍萬恆品謹已施行郡邑宣示軍戎莫不動地歡呼若醉千鍾之酒騰天鼓舞如聞九奏之音無任慶賀踊躍之至臣某言即日被觀察使牒李師道以月日克就梟戮者帝德廣運唐命惟新霾曀廓清天地貞觀率土臣庶慶忭無涯伏惟睿文聖武皇帝陛下威使百神德消六沴天降寶運時歸太平自克夏擒吳翦蜀平蔡殊類稽顙㣥疑革心惟此凶妖尚聞悖慢庭議既得廟謨必臧旌旗燭耀於洪河金鼓震驚於靈嶽鄆城自潰寧同莒魯之爭齊地悉平無俟耿陳之戰五兵永戢七德無虧含生比堯舜之仁率土陋成康之俗介邱霧息已望翠華之來沂水風生更起舞雩之詠千歲之統實在於斯臣守在蠻荒獲承大慶忭蹈之至倍萬恆情臣某言伏見某月日制分淄青諸州為三道節度都團練觀察等使者蛇豕之穴忽為樂郊氛沴之餘盡成和氣伏惟皇帝陛下天付昌期神開寶歷復升平之土宇拔妖孽之根源自西自東不違於指顧我疆我理咸得其區分山川備臨制之形道途適征徭之便俾侯既定賜履以寧異青亠兊之封爰從古制解曹衛之地實契雅謀車甲永藏馬牛勿用俗被雍熙之化代知仁壽之期農事載盛於耨芟儒風重興於俎豆足使季札觀魯更陳南籥之儀山甫徂齊復正東方之賦臣總戎遠地不獲陪賀闕庭闕臣某伏見今月日制除布衣竇㣥左拾遺者臣聞直道之行四方嚮德逸人是舉天下歸心臣伏以竇㣥肥遁居貞包蒙養正學術精果操行堅明讚詠道真以求其志臣頃守藩服特所委知及歸朝廷輒有聞薦庶逃竊位之責以塞曠官之尤豈謂天聽曲從瞽言無廢况諫諍之職政化是參擢於布衣久無其比周行慶忭林藪震驚晦迹寧慮於遺賢懷才盡思於展效臣以性本庸疏動無裨益惟思進拔以報恩榮區區懇誠實貫金石言而不廢微臣敢竊於薦雄德必有鄰聖代式光於尊隗自㣥受命冀復面陳迫以疾病接於休假注心蓄念寤寐兢惶無任喜躍屏營之至臣某言伏奉今月二十八日制除臣尚書左丞寵命俯臨慚顏自失泛大鯨之海但覺魂搖戴巨鼇之山未如恩重臣聞尚書百揆翊亮萬機故天上尊北斗中樞陛下有南宮左轄晉升孔坦諒直當時漢拜楊喬間練故事庶得百僚有憚於會府諸侯取法於京師臣實謏才謬登清貫握蘭起草昔紊朝經剖竹頒條近貽人瘼備歷中外無聞聲彩版圖載緝貢賦未均於九州銅印更操威儀不檢於三署次郎補缺豈易其人聖主求才宜難此受竊謂旁求俊乂側訪王褱奇必使德合準繩言成綱紀興化致理時無間言况安上必在於薦賢危身莫踰於曠職儻蒙垂收紫渙俯矜丹誠愚臣保陳力之言聖鑒有責成之地無任靦冒惶悚之極謹詣朝堂奉表陳讓以聞臣所讓人別狀封進臣某言臣聞知賢必進忠臣之大方擇善而居明主之要道况臣特受恩遇超絶古今報國之誠寤寐深切是敢竭愚臣之微分助陛下之至明恢張羽儀宏輔治化臣某誠惶誠恐頓首頓首竊見新授某官李諒清明直方柔惠端信強以有禮敏而甚文求之後來略無其比臣自任度支副使以諒為巡官未及薦聞至某月日荊南奏官敕下赴本道諒實國器合在朝行臣之所知尤惜其去伏望天恩授以諫官使備獻納冀他日公卿之任斯焉取斯則聖朝無乏士之名微臣緩蔽賢之罰無任誠懇屏營之至臣某言臣母劉氏今月十三日忽患瘖風發動狀候非常今雖似退猶甚虛惙驚惶憂苦不知所圖臣惟一身更無兄弟侍疾嘗藥難闕須臾伏乞聖恩停臣所職今臣見在家扶侍其官吏等並已發遣訖臣以庸微特承顧遇拔自卑品委以劇司夙夜兢惶惟思答效至誠至懇天眷所知豈慮未效涓塵遽迫方寸以開塞重輕之務加焦勞憂灼之懷雖欲徇公無由枉志况忠孝同道臣子之心許國誠切於死生報恩忍忘於顧復進退窮蹙昧死上陳候母劉氏疾疢小瘳冀微臣駑蹇再效無任惶懼懇倒嗚咽之至臣某云云即日奉事官米蘭回伏奉手詔云云者臣聞膚革既平雖疥癬而必去豺狼已斃在狐鼠而宜除臣某中謝伏惟元和聖文神武法天應道皇帝陛下受命上元底寧下土凶渠盡殄威武載揚蠢爾腥羶尚聞凌暴靈旗斜指銅獸俯臨三軍知必勝之方萬姓喜永清之路微臣忝司戎律親列顏行躡伏波之舊規乘下瀨之故事盡瘁事國期畢命於戈矛不宿於家思奮身於原野即以今日某時出師就道便披榛蹶石摩壘陷堅蕩清海隅永息邊徼竊以才非充國敢自贊於無踰志慕孟公庶追蹤於不伐謬承重委寤寐兢惶無任感恩隕越之至伏以某官器宇端方風姿詳雅謙虛內敏籌略共推前佐湖南悉心匡佐後歷郡掾深負政聲惠愛在人姦邪屏息勤勞已著幹蠱無倫今黃賊尚據荒陬犬窠未覆儻以某代某之任必能掃蕩氛祲廓清海濱竊惟斯人雅堪厥職臣歷刺三州連總二府外任逾紀入覲無階就日望雲魂飛心注伏惟睿聖文武皇帝陛下覆載無私遐邇同致復升平之故事繼前聖之高蹤中外踐更出入迭用臣以虛薄叨受恩榮徒竭夙夜之心未申朝夕之敬天威咫尺誠寤寐而無違雲漢昭回固瞻仰而何及是以前在朗寧封章纍上及移臨桂星紀屢周微衷尚隔於戴盆積望徒懸於窺管葵藿之誠彌切犬馬之戀逾深人欲天從於茲未驗下情上達終冀不誣敢瀆宸嚴罄陳丹懇伏乞賜臣除替許至闕庭廁蹈舞於㣥僚備班行於散地足趨中禁目覩大明俾成九族之榮以盡百生之幸非敢竊國賓五獻之禮希康侯三接之恩一覿龍顏萬死為足無任懇迫激切之至肅恭休命晨夜趨程祗荷寵私不遑寢食以月日到所部上訖云云臣聞古之制爵祿者爵以居有德祿以養有功臣本書生宦不期達值某皇帝文明撫運大闡元猷搜采衆才幸忝甄録歷踐中外星霜屢移曾無涓塵上答鴻造忘其薄陋委以雄藩顧無綏馭之能謬忝澄清之寄將何以敷宣皇澤普諭天慈惟當察慝以為防視俗而為教蠲除細故務安黎獻庶幾清靜無擾以慰遠人臣不勝忝冒荷恩之至捧對絲綸慚悸無地拜命兢悚不知所裁臣凡賤瑣才智略無取幸賴先臣緒業纍忝國恩天澤曲流遂司節制寄深分閫任重專征顧無將領之才謬處衆人之上豈謂宸私軫念仁育為心霈澤無涯德音屢降士衆感悅咸思竭忠遂得潛師暗入賊境不意凶渠就戮此皆聖謨豈敢叨天以為己力仰荷殊造重於邱山臣以月日上訖謹當敷宣皇化普諭聖慈綏撫三軍乂安百姓冀以塵露上答鴻私鴻私曲臨獨越夷等祗荷明命寤寐不遑臣才非器能謬膺仕進雖竭盡駑劣力效忠勤冀寡愆尤敢望宦達某宗皇帝不以臣儒術淺薄超授禮官尋遷正郎遂忝符郡某皇帝不遺臣小善擢處諫曹叨承厚恩備職藩翰顧惟瑣劣多慚負恩伏遇陛下德紹唐虞無私庶政臣尸素歲久譴謫宜加豈冀褒升更遷重鎮再忝澄清之寄仍同獻替之榮將何以上答天慈下安氓庶臣當務修農稼率勵遠人鋤其姦慝以副勤恤無任云云臣某言伏奉某月日制除臣同州刺史兼本州防禦營田長春宮使某月日到州上任訖臣初奉綸言震忭無極及臨所部驚懼逾深投軀莫報於乾坤陳力無裨於造化臣某誠惶誠恐頓首頓首臣出自諸生不習為吏有恇懦之質無區處之能託迹儒門乏仲弓南面之德委身郎署闕馮唐論將之對常懼叨冒清列蕪穢聖朝豈意天聽忽臨鴻恩薦及八命作牧一麾出守拔自下位寄之雄藩非臣庸瑣所宜膺據况馮翊密邇王都古稱三輔爰自近代命秩逾崇有兵食之虞有宮室之制皆公卿將相出入由之仰徵甲令俯窺圖記局蹐無地以兢以惶恩重命輕不知所效庶當刻精運力夙夜祗勤上奉雍熙旁流愷悌以日繫月儻或有成庶幾之心懍懍增惕徒望雲而就日喜近帝鄉將擊壤以成風共歌堯代天威咫尺敢布丹誠無任悃懇屏營之至星言即駕便道之藩祗荷寵榮不敢寧息臣某爰自弱齡即忝推擇階緣試吏纍忝清資先聖以臣粗知兵要俾統師徒交蠻俶擾黃賊不馴奉詔俾臣撲滅氛祲士衆賈勇思酬渥恩冀因此時得立微效豈謂時多疫癘不副憂勤知臣特深復洗瑕責夙夜感戴捐軀有期徒增憤勇力未從願微臣不幸釁故重重泣血摧肝載崩載咽陛下龍興御極寰海永清道暢八埏威加九域鴻和普洽靡不周泰伏蒙纍垂休命遂越等夷循省何人過膺抽擢况臣比臨此鎮備更夷險故材舊壤宛在目前雖則殊鄉還同衣錦量巨鼇之力未足負恩猶蚊蚋之微焉能報德將何以宣揚聖造撫慰疲羸惟當遵守詔條貶棄奸慝平勻徭賦示以義方持清靜以臨人守無私以奉國重修前志再礪戈矛展駑駘之效申鷹犬之用庶荒陬夷獠盡沐皇風率土生靈備聞斯慶微臣之志也限以云云臣某言伏奉月日制書除臣永州刺史以月日到州上訖受命若驚臨職彌懼臣以無能纍更事任神州赤縣實所備嘗過量逾涯每深兢惕不謂聖恩推擇濫駕朱輪祿秩徒增詎施乳哺之惠服命虛受寧興襦袴之謠况此州地極三湘俗參百越左衽居椎髻之半可墾乃石田之餘曠牧守於再秋彌驕獷俗代徵賦於三郡重困疲人分災本出於一時積弊遂逾於十稔撫安未易知法出而姦生子育誠難懼力勞而功寡夙夜憂切不敢遑寧庶當宣布天慈奉揚神化以日繫月儻或有成少裨愷悌之風用答生成之造無任感恩隕越之至早以文律參於士林德宗選於衆流擢列御史陛下嗣登寶位微臣官在禮司百僚稱賀皆臣草奏臣以不慎交友旋及禍訩聖恩宏貸謫在善地纍更大赦獲奉詔追違離十年一見宮闕親受朝命牧人遠方漸輕不宥之辜特奉分憂之寄銘心鏤骨無報上天謹當宣布詔條盡竭駑蹇皇風不異於遐邇聖澤無間於華夷庶答鴻私以塞餘罪云云臣某言伏奉詔書授臣柳州刺史以今月二日至部上訖中謝臣前歲以久停官秩去年蒙聖恩除替便欲裂裳裹足趨赴京師以舊疾所嬰彌年未愈逮及今夏始就歸途襄陽節度使于頔與臣蚤歲同官見臣當暑在道懇留在館尋假職名意欲厚臣非臣所願伏惟陛下光被之德道已洽於區中憂濟之勤心每遍於天下常以萬邦共理必藉於循良一物不遺尚延於愚藐假臣寵渥重領方州駑駘復效於奔馳枯朽更同於華秀臣聞潢汙易竭抑有朝宗之願犬馬無識猶知戀主之誠揣分則然惟天知鑒况臣昔因左官一紀於外子牟馳心於魏闕汲黯積思於漢庭豈非夫人獨無斯戀去就者榮辱之主朝廷者仕進之源臣子之宜忠貞所志臣雖心同犬馬而分比潢汙幸躡康衢意非往蹇臣之此誠口不能喻意欲悉達文非盡言此臣所以自咎自恨復乖志願猶冀苦心勵節上奉詔條惠寡恤貧下除人瘼恭宣皇化少答鴻私不勝歡欣之至前件官器宇深沈天才間出爰從撫字逮於察廉所職恪勤庶務皆勸日者安南夷獠反叛害其連帥毒痡黎人某皇帝以某威惠茂著自某州刺史俾之撫臨夙夜經行盡除兵器賊徒識恩黨種歸義炎荒之俗靡不底寧後改鎮容州勳效彌顯澄清庶類邁德前修深負能名合遷重鎮臣自惟凡懦不逮前人伏乞天恩回授某非惟旌德是亦飾能庶微臣免尸祿之憂某獲無私之舉某績茂戎軒才優管記操刀必割豈謝剸犀落筆不休寧慚倚馬况蚤登科選夙洽時談匪惟詞藝雙美抑亦器能多適比於流輩頗為滯淹輒敢薦陳伏希獎録鴻霈曲臨惶駭交集捧對綸綍不知所圖臣中謝臣聞蕭曹佐漢六合為家奭望匡周萬方同軌臣幸以芻賤纍忝殊榮天德薦臨遂加台政不能翊宣明聖增日月之光俾凶渠勦絶人用康寧實由臣不稱職使此艱患伐檀興議負乘招譏常懷覆餗之虞敢望專征之寄獻俘未遠展效有期希此微功上答殊造無任云云臣某言中使某乙至奉宣聖旨賜臣長樂驛設者恩榮特殊宴飲斯及顧茲厚禮猥集微躬臣某誠歡誠慶頓首頓首臣以多幸屬此昌時任重方隅職忝文武甘受素餐之刺知無肉食之謀以憂以惶寤寐無措豈謂鴻恩繼至豐膳爰來陸海兼陳飴醴皆設庶當奉揚聖澤覃布遠人流愷悌於皇風均乳哺於赤子少陳微效上答殊私無任感恩欣躍之至臣某言中使某至奉宣聖旨賜臣櫻桃若干者天眷特深時珍薦降寵驚里巷恩溢圓方臣某誠喜誠懼頓首頓首伏以含桃之羞時令攸貴况今采因御苑分自天廚使發九霄集繁星而積耀味調六氣承湛露而不晞盈眥而外被恩光適口而中含渥澤顧慚素食彌切自公豈圖君子所先遂厭小人之腹無任感恩欣喜之至祗荷寵私啓處無地臣中謝臣久忝朝行歷職無效荏苒星紀偷榮歲時不能少益聖猷以副深寄致使賊遺君父艱難未息合處嚴憲以正國章伏以陛下恢天覆之恩廣地載之厚不循彞典俾同冕紱重劇邱山捧戴以入閨門空知夕惕裁縫而為衣服固可晝行內省疲駑將何答效綸言曲臨寵服薦至跪捧殊錫慶躍交并臣中謝臣謬典方州效微涓滴叨承大貺榮重邱山非才忝恩俯伏慚荷朱明啓節御府賜衣沐聖澤而溟海方深被仙衣而鶴龜齊壽馳心向闕局影望天慚分五嶺之憂莫副九重之詔臣無任云云伏以睿智之周物而靡不通不可以不稱夫聖也妙算之無方而莫能測不可以不稱夫神也行仁義修典法歌詩頌考文章不可以不稱夫文也攘卻戎夷戡翦暴逆邊兵以整禁衛以嚴不可以不稱夫武也而合於唐堯乃聖乃神乃武乃文之德博施不息而萬物以生推功不宰而萬化以成合於書之奉若天道之義臣等謹稽之乾符叶於古典侔德澤之廣配功業之崇昧冒萬死伏請上尊號曰聖神文武奉道皇帝又伏見陛下以今年四月以來方當雩祭之修而有旱備之請才愆期而未害於物深軫念而將恤其人氣潛通而交感以和澤旋流而雱霈斯遠由是風雨時而霜雹不降稼穡茂而蝗螟不生農功以成年穀大熟休祥數見福應屢臻仁木連理而垂陰嘉禾同穎而挺秀壽星舒景炎之盛芝草布葩英之重白麞凝彩而雪輝蒼烏取象於天色將遍於郡國相繼於歲時右具如表臣某言伏奉某月日敕逆賊李懷光輿臺末人奚虜遺醜備聞凶險之行頗有殘暴之名陛下略其細微假以符節盡委朔方之地猶分禁衛之兵不感殊私乃懷異望間者饋貢不入王師問罪尋令舉軍赴敵而乃終歲無功洎駕幸近郊敕還舊鎮將掃猾夏之盜因解奉天之圍豈伊人謀蓋是天意陛下但嘉其排難不省其由列為上公命作元帥及躡寇滑汭頓軍咸陽闕臣某言中使竇某至奉宣旨賜臣新茶一斤者天眷忽臨時珍俯及捧戴驚忭以喜以惶中謝臣以無能謬司邦憲大明首出得親仰於雲霄渥澤遂行忽先霑於草木况茲靈味成自遐方照臨而甲坼惟新煦嫗而芬芳可襲調六氣而成美扶萬壽以效珍豈臣賤微膺此殊錫銜恩敢同於嘗酒滌慮方切於飲冰撫事循涯隕越無地臣不任感戴欣忭之至臣某言月日得進奏官狀報逆賊李師道以某月日克就梟戮率土臣子慶忭無涯中謝臣聞負恩干紀者鬼得而誅犯順窮凶者天奪其魄不自妖孽曷彰聖功伏惟陛下先天不違與神合契掩周宣中興之業陋漢光再造之勳靈旗四臨氛沴皆散凡在臣庶盡覩升平伏以師道席父祖以作威苞海嶽而專祿恃東秦十二之險誘臨淄三七之兵竊據一方歲踰五紀朝宗之地曠若外區封祀之山隔成異域纍聖垂德曾未悛心餘孽滔天果聞折首遂使云亭有主知玉牒之將封遼海無虞見石砮之巳至此皆陛下神籌獨得廟略無遺授任推盡力之誠縱捨有感心之化金石可貫龜筮必從克成不戰之功遂洽無為之理臣謬司戎旅遠守方隅愧無橫草之功坐見覆盂之泰忭蹈歡慶倍萬恆情臣某言臣負罪竄伏違尚書箋奏十有四年聖恩寬宥命守遐壤懷印曳紱有社有人云云伏惟睿聖文武皇帝陛下天造神斷克清大憝金鼓一動萬方畢臣太平之功中興之德推校千古無所與讓臣伏自忖度有方剛之力不得備戎行致死命况今已無事思報國恩獨唯文章伏見周宣王時稱中興其道彰大於後罕及然徵於詩大小雅其選徒出狩則車攻吉日命官分土則嵩高韓奕蒸人南征北伐則六月采艹巳平淮夷則江漢常武鏗鍧炳耀蕩人耳目故宣王之形容與其輔佐由今望之若神人然此無他以雅故也臣伏見陛下自即位已來平夏州夷劍南取江東定河北今又發自天衷克翦淮右而又大雅不作臣誠不佞然不勝憤踊伏以朝多文臣不敢盡專數事謹撰平淮夷雅二篇雖不及尹吉甫召穆公等庶施諸後代有以佐唐之光明謹昧死再拜以獻臣宗元言臣幸以罪居永州受食府廩竊活性命得視息無治事時恐懼小間又盜取古書文句聊以自娛伏惟漢魏以來代有鐃歌鼓吹詞唯唐獨無有臣為郎時以太常聯禮部嘗聞鼓吹署有戎樂詞獨不列今又考漢曲十二篇魏曲十四篇晉曲十六篇漢歌詞不明紀功德魏晉歌功德具今臣竊取晉魏義用漢篇數為唐鐃歌鼓吹曲十二篇紀高祖太宗功能之神奇因以知取天下之勤勞命將用師之艱難每有戎事治兵振旅幸歌臣詞以為容且得大戒宜敬而不害臣淪棄即死言與不言其罪等耳猶冀能言有益國事不敢效怨懟默已謹冒死上臣某伏奉某月日恩制大赦天下一人有慶百度惟新戴天履土罔不欣忭中謝某聞天地成功施雨露而育物帝王繼統升日月以垂曜㣥品資始萬方文明伏惟陛下嗣守鴻業光膺駿命淳化均於四序大德合於二儀保寧社稷光宅區宇宏孝慈以御下崇恭儉以垂休恩覃溪洞事貫千古况乃順時布政乘春導和敷作解之澤宣在宥之典九族既睦四門廣闢而又洗滌幽蟄雷雨之施也歸還流竄羅網之釋也移敘貶黜覆載之仁也蠲除逋債政理之源也褒寵勳賢激勸之方也廢金寶之貢有以彰儉德搜遺逸之士有以表至公元勳宿將賞延子孫庶尹卿士榮周存歿廣直言之路啓進善之門德超虞夏道掩軒頊必將平一殊俗發揮大猷億萬斯年永荷天緒臣謬當任用守職藩維不獲奔赴闕庭親覩盛禮感悅歡忭倍萬恆情
