front:
  text: 全唐文欽定全唐文卷五百六十五韓愈十九
  hash: sha256:bec15df22dfce48ce3d2fb3ca7b7926b22c2bb0eaa86b31c4e368ffb368c9970
body:
  text: 君諱郁字古風河南人常州刺史贈禮部侍郎憲公諱及之第二子憲公躬孝踐行篤實而辨於文勸飭指誨以進後生名聲垂延紹德惟克君生之年憲公沒世與其兄朗畜於伯父氏始微有知則好學問咨稟教飭不煩提諭月開日益卓然早成年二十四登進士第時故相太常權公掌出詔文望臨一時登君於門歸以其子選授奉禮郎楊於陵為華州署君鎮國軍判官奏授協律郎朋遊益附華問彌大元和元年對詔策拜右拾遺二年兼職史館四年遷右補闕詔中貴人承璀將兵誅王承宗河北君奏疏諫召見問狀有言動聽其後上將有所相不可於衆君與起居舍人李約交章指摘事以不行五年遷起居郎為翰林學士愈被親信有所補助權公既相君以嫌自列改尚書考功員外郎復史館職七年以考功知制誥入謝因賜五品服八年遷駕部郎中職如初權公去相復入翰林九年以疾罷尋遷祕書少監即間於郊十年正月病遂殆甲午輿歸卒於其家贈絳州刺史年四十男子二人長曰某早死次曰天官始十歲有至性聞呼父官與聞弔客至輒號泣以絶女子一人夫人天水權氏贈太子太保貞孝公皋之承孫故相今太常德輿之女允慶配良是似是宜四月己酉其兄右拾遺朗以喪東葬河南壽安之甘泉鄉家塋憲公墓側將以五月壬申窆謂愈曰子知吾弟久敢屬以銘銘曰於古風襮順而裏方不耀其章其剛不傷戴美世令而年再不贏惟後之成尚書虞部員外郎安定張君諱季友字孝權年五十四病卒東都明年兄子塗與其弟庾掞等護柩歸葬長安縣馬額原夫人北海唐氏之封前事塗進韓氏門伏哭庭下曰叔父且死幾於不能言矣張目而言曰吾不可無告韓君別藏而不得韓君記猶不葬也塗為書致吾意已而自署其末與封敢告以請愈既與為禮發書云云其末有復語千萬永訣八字名日月與封皆孝權迹孝權與余同年進士其上世有皓者當宇文時為車騎大將軍鄜城太守卒葬河北諡曰忠公至孝權間五世矣孝權大父諱孝先太子通事舍人父諱庭光贈綏州刺史綏州之卒孝權蓋尚小母曰太原縣君卒既葬孝權守墓樹松柏三年而後歸選為河南府文學去官徐州使拜章請為判官授協律郎孝權始不痛絶詔下大悔即詐稱疾不言三年元和初徐使死孝權疾即日已試判入高等授鄠縣尉明年故相趙宗儒鎮荊南以孝權為判官拜監察御史經二年拜真御史明年分司東臺轉殿中桉皇甫氏子母病不侍走京師求試職宰相怒曰吾故皇甫氏御史助所善相戲法侮我皇甫媼何疾銜未決皇甫母病果死得解遷留司虞部員外郎孝權為人孝謹與人語恐傷之而時嶷嶷有立與孝權遊者極衆而獨以其死纍余可尚也已是為銘銘亡公諱昌裔字光後本彭城人曾大父諱承慶朔州刺史大父巨敖好讀老子莊周書為太原晉陽令再世官北方樂其土俗遂著籍太原之陽曲曰自吾為此邑人可也何必彭城父訟贈右散騎常侍公少好學問始為兒時重遲不戲恆若有所思念計畫及壯自試以開吐蕃説干邊將不售入三蜀從道士遊久之蜀人苦楊琳寇掠公單船往説琳感欷雖不即降約其徒不得為虐琳降公常隨琳不去琳死脫身亡沈浮河朔之間建中中曲環招起之為環檄李納指摘切刻納悔恐動心恆魏皆疑惑氣懈環封奏其本德宗稱焉環之會下濮州戰白塔救寧陵襄邑擊李希烈陳州城下公常在軍間環領陳許軍公因為陳許從事以前後功纍遷檢校兵部郎中御史中丞營田副使吳少誠乘環喪引兵叩城留後上官説咨公以城守所以能擒誅叛將為抗拒令敵人不得其便圍解拜陳州刺史韓全義敗引軍走陳州求入保公自城上揖謝全義曰公受命詣蔡何為來陳公無恐賊必不敢至我城下明日領騎步十餘抵全義營全義驚喜迎拜歎息殊不敢以不見舍望公改授陳許軍司馬上官説死拜金紫光祿大夫檢校工部尚書代説為節度使命界上吏不得犯蔡州人曰俱天子人奚為相傷少誠吏有來犯者捕得縛送曰妄稱彼人公宜自治之少誠慚其軍亦禁界上暴者兩界耕桑交迹吏不何問封彭城郡開國公就拜尚書右僕射元和七年得疾視政不時八年五月涌水出他界過其地防穿不補沒邑屋流殺居人拜疏請去職即罪詔還京師即其日與使者俱西大熱旦暮馳不息疾大發左右手轡止之公不肯曰吾恐不得生謝天子上益遣使者勞問敕無亟行至則不得朝矣天子以為恭即其家拜檢校左僕射右龍武軍統軍知軍事十一月某甲子薨年六十二上為之一日不視朝贈潞州大都督命郎弔其家明年某月某甲子葬河南某縣某鄉某原公不好音聲不大為居宅於諸帥中獨然夫人邠國夫人武功蘇氏子四人嗣子光祿主簿縱學於樊宗師士大夫多稱之長子元一朴直忠厚便弓馬為淮南軍衙門將次子景陽景長皆舉進士葬得日相與選使者哭拜階上使來乞銘銘曰提將之符尸我一方配古侯公維德不爽我銘不亡後人之慶君諱某字某中書舍人御史中丞諱某之子贈太子洗馬諱某之孫家世習儒學詞章昆弟三人俱傳父祖業從進士舉君獨不與俗為事樂弛置自便父中丞薨既三年與其弟中行別曰若既克自敬勤及先人存趾美進士續聞成宗惟服任遂功為孝子在不怠我恨己不及假令今得不足自貰我聞南方多水銀丹砂雜他奇藥爊為黃金可餌以不死今於若丐我我即去遂踰嶺厄南出藥貴不可得以干容帥帥且曰若能從事於我可一日具許之得藥試如方不效曰方良是我治之未至耳留三年藥終不能為黃金而佐帥政成以功再遷監察御史帥遷於桂從之帥坐事免君攝其治歷三時夷人稱便新帥將奏功君捨去南海馬大夫使謂君曰幸尚可成兩濟其利君雖益厭然不能無萬一冀至南海未幾竟死年五十三子曰某元和十年十二月某日歸葬河南某縣某鄉某村附先塋於時中行為尚書兵部郎號名人而與余善請銘銘曰嗟惟君篤所信要無有弊精神以棄餘賈於人脫外纍自貴珍訊來世述墓文君諱署字某河間人大父利貞有名元宗世為御史中丞舉彈無所避由是出為陳留守領河南道采訪處置使數歲卒官皇考諱郇以儒學進官至侍御史君方質有氣形貌魁碩長於文詞以進士舉博學宏詞為校書郎自京兆武功尉拜監察御史為幸臣所讒與同輩韓愈李方叔三人俱為縣令南方三年逢恩俱徙掾江陵半歲雍管奏君為判官改殿中侍御史不行拜京兆府司録諸曹白事不敢平面視共食公堂抑首促促就哺啜揖起趨去無敢闌語縣令丞尉畏如嚴京兆事以辦治京兆改鳳翔尹以節鎮京西請與君俱改禮部員外郎為觀察使判官帥他遷君不樂久去京師謝歸用前能拜三原令歲餘遷尚書刑部員外郎守法爭諫棘棘不阿改虔州刺史民俗相朋黨不訴殺牛牛以大耗又多捕生鳥爵魚鱉可食與不可食相買賣時節脫放期為福祥君視事一皆禁督立絶使通經吏與諸生之旁大郡學鄉飲酒喪婚禮張施講説民吏觀聽從化大喜度支符州折民戶租歲徵帛丿糸六千屯比郡承命惶怖立期日惟恐不及事被罪君獨疏言治迫嶺下民不識蠶桑月餘免符下民相扶攜守州門叫歡為賀改澧州刺史民稅出雜産物與錢尚書有經數觀察使牒州徵民錢倍經君曰刺史可為法不可貪官害民留噤不肯從竟以代罷觀察使使劇吏案簿書十日不得毫毛罪改河南令而河南尹適君平生所不好者君年且老當日日拜走仰望階下不得已就官數月大不適即以病辭免公卿欲其一至京師君以再不得意於守令恨曰義不可更辱又奚為於京師間竟閉門死年六十君娶河東柳氏女二子升奴胡師將以某年某月某日葬某所其兄將作少監昔請銘於右庶子韓愈愈前與君為御史被讒俱為縣令南方者也最為知君銘曰誰之不如而不公卿奚養之違以不久生惟其頏頏以世厥聲公諱惟字某司空平章事贈太傅之子太傅初姓張氏肅宗時舉恆趙深冀易定六州戰卒五萬人馬五千匹以歸聽命天子嘉之賜姓曰李更其名曰寶臣立其軍號之曰成德由是姓李氏太傅薨公兄弟讓嗣公竟棄其家自歸京師及兄死家覆有司設防守德宗如奉天守卒出公即馳歸與母韓國夫人鄭氏拜訣屬家徒隨走所幸道與賊遇七鬬乃至有功遷太子諭德加御史中丞從幸梁州天黑失道識焦中人聲得見德宗於盩厔西上曰卿有母可隨我耶曰臣以死從衛及幸還録功封武安郡王號元從功臣圖其形御閣而以神威將軍居北軍衛久乃加御史大夫丁韓國憂去官纍遷神威大將軍加工刑二曹尚書天威統軍又改戶部尚書金吾大將軍有長上萬國俊者以軍勢奪興平人地吏憚莫敢治及公為金吾興平人曰久聞李將軍為人公平庶能直吾屈即齎縣牒來見公發視立杖國俊廢之以地還興平人聞者莫不稱歎於是天子以公材果可任用治人將兵無所不宜元和六年即以公為鳳翔隴州節度使戶部尚書兼鳳翔尹隴州地與吐蕃接舊常朝夕相伺更入攻抄人吏不得息公以為國家於夷狄當用長算邊將當承上旨謹條教蓄財穀完吏農力以俟不宜規小利起事盜恩禁不得妄入其地益市耕牛鑄鎛釤巨斸以給農之不能自具者丁壯興勵歲增田數十萬畝連八歲五種俱熟公私有餘販者負入裦斜船循渭而下首尾相繼不絶十三年公與忠武軍節度使司空光顏邠寧節度使尚書釗俱來朝上為之燕三殿張百戲公卿侍臣咸與既事敕還公因進曰臣幸得宿衛四十餘年今年老斥外任不勝慕戀願得死輦下天子加慰遣焉還鎮告疾其夏五月戊子薨年五十五訃至上悼愴罷朝遣郎中臨弔贈尚書左僕射以其年十一月景申葬萬年鳳棲原夫人博陵郡崔氏河陽尉鎬之孫大理評事可觀之女賢有法度公有四子長曰元孫三原尉次曰元質彭之濛陽尉曰元立興平尉曰元本河南參軍皆願敏好善元立元本皆崔氏出葬得日嗣子元立與其昆弟四人請銘於韓氏曰先人常有託於夫子也愈曰太傅功在史氏紀僕射以孤童囚羈京師卒能以忠為節自顯取爵位立名績使天下拭目觀父母與榮焉既忠又孝法宜銘銘曰太傅之顯自其躬興僕射童羈孰與之朋遭國之難以節自發致其勤艱以復考烈孝由忠立爵名隨之銘此元石維昧之詒公諱復字茂紹河東人曾大父元大理正大父曠御史中丞京畿采訪使父虬以有氣略敢諫諍為諫議大夫引正大疑有寵代宗朝屢辭官不肯拜卒贈工部尚書公舉賢良拜同官尉僕射南陽公開府徐州召公主書記三遷至侍御史入朝歷殿中侍御史纍遷至刑部郎中疾病改河南少尹輿至官若干日卒實元和三年四月二十三日享年五十夫人博陵崔氏少府監頲之女男三人璟質皆既冠其季始六歲曰充郎卜葬得公卒之四月壬寅遂以其日葬東都芒山之陰杜翟村公幼有文年十四上時雨詩代宗以為能將召入為翰林學士尚書公請免曰願使卒學丁後母喪上使臨弔又詔尚書公曰父忠而子果孝吾加賜以厲天下終喪必且以為翰林其在徐州府能勤而有勞在朝以恭儉守其職居喪必有聞待諸弟友以善教館嫠妹畜孤甥能別而有恩歷十一官而無宅於都無田於野無遺資以為葬斯其可銘也已銘曰裴為顯姓入唐尤盛支分族離各為大家惟公之系德隆位細曰子曰孫厥聲世繼晉陽之色愈愈翼翼無外無私幼壯若一何壽之不遐而祿之不多謂必有後其又信然耶君諱公達字大順薛姓曾祖曰希莊撫州刺史贈大理卿祖曰元暉果州流溪縣丞贈左散騎常侍父曰播尚書禮部侍郎侍郎命君後兄據據為尚書水部郎中贈給事中君少氣高為文有氣力務出於奇以不同俗為主始舉進士不與先輩揖作胡馬及圜丘詩京師人未見其書皆口相傳以熟及擢第補家令主簿佐鳳翔軍軍帥武人君為作書奏讀不識句傳一幕以為笑不為變後九月九日大會射設標的高出百數十尺令曰中酬錦與金若干一軍盡射莫能中君執弓腰二矢指一矢以興揖其帥曰請以為公歡遂適射所一座皆起隨之射三發連三中的壞不可復射中輒一軍大呼以笑連三大呼笑帥益不喜即自免去後佐河陽軍任事去害興利功為多拜協律郎益棄奇與人為同今天子修太學官有公卿言詔拜國子助教分教東都生元和四年年三十七二月十四日疾暴卒君再娶初娶琅邪王氏後娶京兆韋氏凡産四男五女男生輒即死自給事至君後再絶皆有名遺言曰以公儀之子已已後我其年閏三月草一日弟試太子通事舍人公儀京兆府司録公幹以君之喪歸以五月十五日葬於京兆府萬年縣少陵原合祔王夫人塋銘曰宦不遂歸譏於時身不得年又將尤誰世再絶而紹祭以不隳夫人諱叢字茂之姓韋氏其上七世祖父封龍門公龍門之後世率相繼為顯官夫人曾祖父諱伯陽自萬年令為太原少尹副留守北都卒贈祕書監其大王父迢以都官郎為嶺南軍司馬卒贈同州刺史王考夏卿以太子少保卒贈左僕射僕射娶裴氏皋女皋為給事中皋父宰相耀卿夫人於僕射為季女愛之選壻得今御史河南元稹稹時始以選校書祕書省中其後遂以能直言策第一拜左拾遺果直言失官又起為御史舉職無所顧夫人固前受教於賢父母得其良夫又及教於先姑氏率所事所言皆從儀法年二十七以元和四年七月九日卒卒三月得其年之十月十三日葬咸陽從先舅姑兆銘曰詩歌碩人爰敘宗親女子之事有以榮身夫人之先纍公纍卿有赫外祖相我唐明歸逢其良夫夫婦婦獨不與年而卒以夭實生五子一女之存銘於好辭以永於聞元和五年十月日范陽盧殷以故登封縣尉卒登封年六十五君能為詩自少至老詩可録傳者在紙凡千餘篇無書不讀然止用以資為詩與諫議大夫孟協律孟郊監察御史馮宿好期相推挽卒以病不能為官在登封盡寫所為詩抵故宰相東都留守鄭公餘慶留守數以帛米周其家書薦宰相宰相不能用竟飢寒死登封將死自為書告留守與河南尹乞葬已又為詩與常所來往河南令韓愈曰為我具棺留守尹為具凡葬事韓愈與買棺又為作銘十一月某日葬嵩下鄭夫人墓中君始娶滎陽鄭氏後娶隴西李氏生男輒死卒無子女一人學浮屠法不嫁為比邱尼云房故為官族稱世有人自太尉琯以德行為相相元宗肅宗名聲益彰徹大行世號其門為太尉家宗族子弟皆法象其賢公曾祖諱元靜尚書膳部郎中歷資涇隰四州刺史太尉之叔父也祖諱肱為虢州司馬父諱巒都水使者皆名能守家法公諱武字某以明經歷官至興元少尹謹飭畏慎年七十三以其官終幼壯為良子弟老為賢父兄歷十二官處事無纖毫過差嘗以殿中侍御史副丹陽軍使其後為盩厔令施州刺史丹陽盩厔施州吏民至今思之娶滎陽鄭氏女生男六人其長曰次卿次卿有大才不能俯仰順時年四十餘尚守京兆興平尉然其友皆曰房氏有子也次曰次公次膺次回次衡次元始學而未仕女三人皆嫁為士人妻初公之在施州夫人卒焉殯於江陵元和五年次卿與其㣥弟奉公之喪自興元至堂殯於伊水之南六年正月次公奉夫人之喪自江陵至遂以其月十四日合葬河南緱氏之高龍原公母弟式自給事中為河南尹孝友慈良盡費其財以奉公葬未葬之一月詔以河南為御史中丞領宣州觀察使將行召河南令韓愈泣謂曰吾兄之葬於是而吾為尹於是吾以為得盡其道於吾兄也今壓於上命不得視吾兄之棺入此土也豈非天耶子與吾兒次卿遊我重知子凡吾兄之終事將子是託焉愈既不獲辭既助其凡役事退又為銘云有位有年有弟有子從先人葬是謂受祉元和七年二月一日河南少尹李公卒年五十八斂之三月某甲子葬河南伊闕鳴皋山下前事之月其子道敏哭再拜授使者公行狀以幣走京師乞銘於博士韓愈曰少尹將以某月日葬宜有銘其不肖嗣道敏杖而執事不敢違次不得跣以請愈曰公行應銘法子又禮葬敢不諾而銘諸公諱素字某生七歲喪其父貧不能家母夫人提以歸教育於其外氏以明經選主虢之宏農簿又尉陝之芮城李丞相泌觀察陝虢以材署運使從事以課遷尉京兆鄠考滿以書判出其倫選主萬年簿而母夫人固在食其祿母夫人卒三年改尉長安遷監察御史奏貶九卿一人改詹事丞遷殿中侍御史由度支員外郎選令萬年公主奪驛田京兆尹符縣割之公不與改度支郎中使侍郎介恃不禮其屬大夫士擅喜怒賞罰公獨入讓不受劉闢平上以蜀賞高崇文尚書省以崇文幕府爭鹽井因革便不便命公使崇文崇文命幕府惟公命從即其日事已疏奏侍郎外稱其能竟坐前敢抗已衢州飢擇刺史侍郎曰莫如郎李某遂刺衢州至一月遷蘇州李錡前反權將之戍諸州者刺史至斂手無敢與敵公至十二日錡反公將左右與賊戰州門不勝賊呼入公端立責以義皆斂兵立不逼錡命械致公軍將斬以徇及境錡適敗縛公脫械還走州賊急卒不暇走死民抱扶迎盡出天子使貴人持紫衣金魚以賜居三年州稱治拜河南少尹行大尹事呂氏子炅棄其妻著道士衣冠謝母曰當學仙王屋山去數月復出間詣公公立之府門外使吏卒脫道士冠給冠帶送付其母黜屬令二人以贓減民賦錢歲五千萬請緩民輸期一月詔天下輸皆緩一月公一斷治不收聲事常出名上曾祖宏泰州刺史祖乾秀伊闕令父燮宣州長史贈絳州刺史母夫人燉煌張氏其舅參有大名公之配曰彭城劉氏夫人夫人先卒其葬以夫人祔夫人曾祖曰子元祖曰餗皆有大名公之子男四人長曰道敏舉進士其次曰道樞其次曰道本道易皆好學而文女一人嫁蘇之海鹽尉韋潛自州而下皆葬鳴皋山下銘曰高其山而坎其中以為公之宮奈何乎公
