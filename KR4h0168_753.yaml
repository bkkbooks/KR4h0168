front:
  text: 全唐文欽定全唐文卷七百五十三杜牧六
  hash: sha256:90aadc9a4f28dcf83d7e84383f374fed0ac63da15ff2241b07c588185b5f6414
body:
  text: 某啟人有愛某者言於某曰吏部員外郎例不為郡子不可求假使已求慎勿堅懇至於再三答曰某雖不學按六典令式及諸故事多無此例國史復無賢相名卿懸之以為格言此乃急於趨進之徒自為其說若以例言貞元初故相國盧公邁由吏部員外郎出為滁州近者澶王傅李凝為鹽鐵使江淮畱後豈曰無例人曰盧事太遠李為擢用此不足徵某曰不知今者視之古事在書取為今證遠自三代兩漢近至隋氏國初尚可援引况前十五年名相故事反不足為例乎况盧公邁止以骨肉寒餓來守滁陽非如某以親弟廢痼寒餓仍之是盧公有一某有二與盧公所切復為不同仲尼曰雍也可使南面今刺史古之南面諸侯行天子教化刑罰者江淮鹽鐵畱後求利小臣校量重輕與刺史相懸求利小臣乃可吏部員外郎為之十萬戶州天下根本之地曰吏部員外郎不可為其刺史即是本末重輕顛倒乖戾莫過於此某弟顗世冑子孫二十一舉進士及第嘗為上裴相公書遒壯溫潤詞理傑逸賈生司馬遷能為之非班固劉向輩亹亹之詞流於後輩人皆藏之朱崖李太尉迫以世舊取為浙西團練使巡官李太尉貴驕多過凡有毫髮顗必疏而言之後謫袁州於倉黃中言於親曹官居實曰如杜巡官愛我之言若門下人盡能出之吾無今日李太尉在袁州顗客居淮南牛公欲辟為吏顗謝曰荀爽為李膺御以此顯名今受命為幕府下執事御李膺矣然李公困謫遠地未願仕宦牛公嘆美之聰明俊傑非尋常人也某自省事以來未聞有後進名士喪明廢棄窮居海上如顗比者今有一兄仰以為命復不得一郡以飽其衣食盡其醫藥非今日海內無也言於所傳聞亦未有也自古言喜莫若虢國太子以其死而復生言懇莫若申包胥求救於秦七日七夜哭聲不絕某今懇如包胥但未哭爾若蒙恩憫特遂血懇其喜也不下虢太子詞語煩碎頻干尊重足及軒闥神驚汗流不勝憂恐懇悃之至謹啟某啟某幼孤貧安仁舊第置於開元末某有屋三十間而已去元和末酬償息錢為他人有因此移去八年中凡十徙其居奴婢寒餓衰老者死少壯者當面逃去不能呵制止有一豎戀戀憫嘆挈百卷書隨而養之奔走困苦無所容歸死於延福私廟支拄欹壞而處之長兄以一驢遊丐於親舊某與弟顗食野蒿藿寒無夜燭默念所記者凡三周歲遭遇知已各及第得官文宗皇帝改號初年某為御史分察東都顗為鎮海軍幕府吏至二年間顗病眼暗無所覩故殿中侍御史韋楚老曰同州有眼醫石公集劒南少尹姜沔喪明親見石生針之不一刻而愈其神醫也某迎石生至洛告滿百日與石生俱東下見病弟於揚州禪智寺石曰是狀也腦積毒熱脂融流下葢塞瞳子名曰內障法以針旁入白睛穴上斜撥去之如蠟塞管蠟去管明然今未可也後一周歲脂當老硬如白玉色始可攻之某世攻此疾自祖及父某所愈者不下二百人此不足憂其年秋末某載病弟與石生自揚州南渡入宣州幕至三年冬某除補闕石生自曰明年春眼可針矣視瞳子中脂色玉白果符初言堂兄慥守潯陽泝流不遠刺史之力也復可以飽石生所欲令其盡心此即家也京中無一畝田豈可同歸遂如潯陽四月二日某於潯陽北渡赴官與弟顗决手哭曰我家世德汝復無罪斯疾也豈遂痼乎然有石生慎無自撓其年四月石生施針九月再施針俱不效五年冬某為膳部員外郎乞假往潯陽取顗西歸顗固曰歸不可議俟兄慥所之而隨之會昌元年四月兄慥自江守蘄某與顗同舟至蘄某其年七月郤歸京師明年七月出守黃州在京時詣今虢州庾使君問庾眼狀庾云同州有二眼醫石公集是一也復有周師達者即石之姑子所得當同周老石少其術深妙似石不及某嘗病內障愈于周手豈少老間工拙有異某至黃州以重幣卑辭致周至蘄周見弟眼曰嗟乎眼有赤脈凡內障脂凝有赤脈綴之者針撥不能去赤脈赤脈不除針不可施除赤脈必有良藥某未知之是石生業淺不達此理妄再施針周不針而去時西川相國兄始鎮揚州弟兄謀曰揚州大郡為天下通衢世稱異人術士多遊其間今去值有勢力可為久安之計冀其所遇其年秋顗遂東下因家揚州與顗一相見別八年矣坐一室中不復有再生意住三十日而西臨歧與决曰此行也必祈大郡東來謀汝醫藥衣食庶幾如志近聞九疑山南有隱士綦母宏者人言異人能愈異疾忠州酆都縣有仙都觀後漢時仙人陰長生於此白日昇天今聞道士龔法義年逾八十精嚴其法人之所謂有前世負累今世還以痼疾者奏章於上帝能為解之刺史之力二人或可致是以去歲閏十一月十四日輒獻長啟乞守錢塘蓋以私懇有素非敢率然言念病弟喪明坐廢十五年矣但能識某聲音不復知某髮巳半白顏貌衰改是某今生可以見顗而顗不能復見某矣此天也無可奈何某能見顗而不得去此豈天乎而懸在相公若小人微懇終不能上動相公相公恩憫終不下及小人是日月不照兄弟終無相見期况去歲淮南小旱衣食益困目無所覩復困於衣食即海內言窮苦人無如顗者今敢以情事再書懇迫上干尊重伏料仁者必為憫惻然某早衰多病今春耳聾積四十日四月復落一牙耳聾牙落兼年如七八十人將謝之候也今未五十而有七八十人將謝之候蓋人生受氣堅強脆弱品第各異也堅強者七八十而衰脆弱者四五十而衰其不同也如草木中蒲柳松柏同也某今年四十八矣自今年來非惟耳聾牙落兼以意氣錯寞在㣥眾懽笑之中常如登高四望但見莽蒼大野荒墟廢壠悵望寂默不能自解此無他也氣衰而志散真老人態也自省人事以來見親舊交遊年未五十尚壯健而死者眾矣况某早衰敢望六七十而後死乎願未死前一見病弟異人術士求其所未求以甘其心厚其衣食之地某若先死使病弟無所不足然死而有知不恨死早湖州三歲可遂此心伏惟仁憫念病弟望某東來之心察某欲見病弟之志一加哀憐特遂血懇披剔肝膽重此告訴當盛暑時敢以私事及政事堂啟干丞相治其罪可也伏紙流涕俯候嚴命不勝憂惶激切之至謹啟某啟某去歲閏十一月十四日輒書微懇列在長啟干黷尊重乞守錢塘以便家事自嘆精誠不能上動相公不遂私便伏以病弟孀妹因緣事故寓居淮南京中無業今者不復西歸遂為淮南客矣病孤之家假使旁有強近救接庇借歲供衣月給食日問其所欠闕尚猶戚戚多感無樂生意况乎為客於大藩喧囂雜沓之中無俸祿乏氣勢食不繼月用不給日閉門於荒僻之地取容於里胥遊徼之輩部曲臧獲可以氣凌鼠侵又不能制止所可仰以為命者在三千里外一郎吏爾復有衣食生生之所須悉多欠闕欲其安活而無嘆吒悲恨不可得也去歲伏蒙恩念出於私曲語今青州鄭常侍云更與一官必任東去某承受仁旨不敢重以錢塘更塵視聽今自勳曹擢為廢置在某更受一官已榮遇矣在相公必任東去之言鏘然在耳近者累得來書告以覊旅困乏聞於他人可為酸鼻况於某心豈易排遣今年七月湖州月滿敢輒重書血誠再干尊重伏希憐憫特賜比擬某伏念骨肉悉皆早衰多病常不敢以壽考自期今更得錢二百萬資弟妹衣食之地假使身死死亦無恨湖州三考可遂此心湖州名郡也私誠難遂也不遇知己豈得如志瀝血披肝伏紙迸淚伏希殊造或賜濟活下情無任懇悃惶懼之至謹啟某啟某於京中惟安仁舊第三十間支屋而已長兄慥罷三原縣令閒居京城弟顗一舉進士及第有文章時名不幸得痼疾坐廢十三年矣今與李氏孀妹寓居淮南並仰某微官以為糇命某前任刺史七年給弟妹衣食有餘兼及長兄亦救不足是某一身作刺史一家骨肉四處安活自去年八月特蒙奬擢授以名曹郎官史氏重職七年棄逐再復官榮歸還故里重見親戚言於鄙微已滿素志自去年十二月至京以舊第無屋與長兄異居今秋已來弟妹頻以寒餒來告某一院家累亦四十口狗為朱馬縕作由袍其于妻兒固宜窮餓是作刺史則一家骨肉四處皆泰為京官則一家骨肉四處皆困謀於知友曰杭州大郡今月滿可求欲干告吾相以活家命以為如何皆曰子七年三郡今始歸復相國知子必欲以次第叙用子今復求刺史得不生相國疑怪乎某答曰是何言與某唯恃吾相之知始敢干求今天下以江淮為國命杭州戶十萬稅錢五十萬刺史之重可以殺生而有厚祿朝廷多用名曹正郎有名望而老於為政者而為之某官為外郎是官位未至也前三任刺史無異政聞於吾相是為政無所取也今若得遂所求非唯超顯兼活家私某若不恃吾相之知而求之是狂躁妄庸人也墜井者求出執熱者願濯古人以此二者譬喻所切也某今所切是墜於絕壑而衣掛於樹杪覆在鼎中下有熱火而水將沸與古所喻則復過之輒敢具疏血誠上干尊重冀垂恩憐或賜援拯慺慺丹懇不勝惶懼懇悃之至謹啟某啟庫部家兄昨者特蒙奬拔郤忝班行實以聽聞稍難不敢更求榮進今在郢州汨口草市絕俸已是累年孤外甥及姪女堪嫁者三人仰食待衣者不啻百口脫粟蒿藿才及一飡伏蒙仁恩頻賜顧問必許援拯授以涔陽活於闔門無不感涕伏以相公上佐聖主蔚為元勳恩隨風翔德與氣游唯一物之微四海之大鎔造所及罔不得宜伏念庫部家兄承一顧之恩二紀不替伏恐機務繁重不時記憶心迫情切輒敢重干尊嚴戰汗憂惶伏地待罪謹啟太和五年十月中半夜時舍外有疾呼傳緘書者某曰必有異亟取火來及發之果集賢學士沈公子明書一通曰吾亡友李賀元和中義愛甚厚日夕相與起居飲食賀且死嘗授我生平所著歌詩雜為四編凡若干首數年來東西南北良為已失去今夕醉解不復得寐即閱理篋帙忽得賀詩前所授我者思理往事凡與賀話言嬉遊一處所一物候一日夕一觴一飯顯顯焉無有忘棄者不覺出涕賀復無家室子弟得以給養䘏問常恨想其人詠其言止矣子厚於我與我為賀集序盡道其所由來亦少解我意某其夕不果以書道其不可明日就公謝且曰世謂賀才絕出於前讓居數日某深惟公曰公於詩為深妙奇博且復盡知賀之得失短長今實敘賀不讓必不能當公意如何復就謝極道所不敢敘賀公曰子固若是是當慢我某因不敢復辭勉為賀序終甚慙賀唐皇諸孫字長吉元和中韓吏部亦頗道其歌詩雲烟綿聯不足為其態也水之迢迢不足為其情也春之盎盎不足為其和也秋之明潔不足為其格也風檣陣馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莽邱壠不足為其恨怨悲愁也鯨呿鼇擲牛鬼蛇神不足為其虛荒誕幻也蓋騷之苗裔理雖不及辭或過之騷有感怨刺懟言及君臣理亂時有以激發人意乃賀所為無得有是賀復能探尋前事所以深嘆恨古今未嘗經道者如金銅仙人辭漢歌補梁庾肩吾宮體謠求取情狀離絕遠去筆墨畦逕間亦殊不能知之賀生二十七年死矣世皆曰使賀且未死少加以理奴僕命騷可也賀死後凡十五年京兆杜某為其序兵者刑也刑者政事也為夫子之徒實仲由冉有之事也今者據案聽訟械繫罪人笞死於市者吏之所為也驅兵數萬撅其城郭係累其妻子斬其罪人亦吏之所為也木索兵刃無異意也笞之與斬無異刑也小而易制用力少者木索笞也大而難制用力多者兵刃斬也俱期於除去惡民安活善人為國家者使教化通流無敢輒有不由我而自恣者其取吏也無他術也無異道也俱止於仁義忠信智勇嚴明也苟得其道一二者可以使之為小吏盡得其道者可以使之為大吏故用力少者其吏易得也功易見也用力多者其吏難得也功難就也止此而巳無他術也無異道也自三代巳降皆由斯也子貢頌夫子之德曰文武之道未墜於地在人賢者識其大者遠者不賢者識其小者近者季孫問冉有曰子於戰學之乎性達之也對曰學之季孫曰事孔子惡乎學冉有曰即學之於孔子夫孔子者大聖兼該文武並用適聞其戰法猶未之詳也復不知自何代何人分為二道曰文曰武離而俱行因使搢紳之士不敢言兵或恥言之苟有言者世以為麄暴異人人不比數嗚呼亡失根本斯最為甚周公相成王制禮作樂尊大儒術有淮夷叛則出征之夫子相魯公會于夾谷曰有文事者必有武備叱辱齊侯伏不敢動是二大聖人豈不知兵乎周有齊太公秦有王翦兩漢有韓信趙充國耿弇虞詡叚熲魏有司馬懿吳有周瑜蜀有諸葛武侯晉有羊祜杜公元凱梁有韋叡元魏有崔浩周有韋孝寬隋有楊素國朝有李靖李勣裴行儉郭元振如此人者當此一時其所出計畫皆考古校今奇秘長遠策先定於內功後成於外彼壯健輕死善擊刺者供其呼召指使耳豈可知其由來哉某幼讀禮至於四郊多壘卿大夫之辱也謂其書真不虛說年十六時見盜起圜二三千里係戮將相族誅刺史及其官屬屍塞城郭山東崩壞殷殷焉聲振朝廷當其時使將兵行誅者則必壯健善擊刺者卿大夫行列進退一如常時笑歌嬉遊輒不為辱非當辱不辱以為山東亂事非我輩所宜當知某自此謂幼所讀禮真妄人之言不足取信不足為教及年二十始讀尚書毛詩左傳國語十三代史書見其樹立其國滅亡其國未始不由兵也主兵者聖賢才能多聞博識之士則必樹立其國也壯健擊刺不學之徒則必敗亡其國也然後信知為國家者兵最為大非賢卿大夫不可堪任其事苟有敗滅真卿大夫之辱信不虛也因求自古以兵著書列於後世可以教於後生者凡十數家且百萬言其孫武所著十三篇自武死後凡千歲將兵者有成者有敗者勘其事跡皆與武所著書一一相抵當猶印圈模刻一不差跌武之所論大約用仁義使機權也武所著書凡數十萬言曹魏武帝削其繁剩筆其精切凡十三篇成為一編曹自為序因注解之曰吾讀兵書戰策多矣孫武深矣然其所為注解十不釋一此者蓋非曹不能盡注解也予尋魏志見曹自作兵書十餘萬言諸將征伐皆以新書從事從令者克捷違教者負敗意曹自於新書中馳驟其說自成一家事業不欲隨孫武後盡解其書不然者曹豈不能耶今新書已亡不可復知予因取孫武書備為其注曹之所注亦盡存之分為上中下三卷後之人有讀武書予解者因而學之猶盤中走丸丸之走盤橫斜圓直計於臨時不可盡知其必可知者是知丸不能出於盤也議於廊廟之上兵形已成然後付之於將漢祖言指蹤者人也獲兔者犬也此其是也彼為相者曰兵非吾事吾不當知君子曰叨居其位可也處士之名何哉潛山隱市皆處士也在山也且非頑如木石也在市也亦非愚如市人也蓋有大知不得大用故羞恥不出寧反與市人木石為伍也國有大知之人不能大用是國病也故處士之名自負也謗國也非大君子其孰能當之薛君之處士蓋自負也果能窺測堯舜孔子之道使指制有方弛張不窮則上之命一日來子之廬子之身一日立上之朝使我輩居則來問學仕則來問政千辯萬索滔滔而得若如此則善苟未至是而遽名曰處士雖吾子自負其不為矯歟某敢用此贈行治心治身治友三者治矣有求名而名不隨者未之聞也治心莫若和平治身莫若兢謹治友莫若誠信友治矣非身治而不能得之身治矣非心治而不能致之三者治矣推而廣之可以治天下惡其求成進士名者而不得也况有干人皆以聖人為師眠而食一無其他唯議論是司三人有私十人公私半百人無有不公者况千人哉古之聖賢業大事鉅道行則不肖懼道不行則不肖喜故有不公今進士者業微事細如成其名不肖未所喜懼寧不公耶故取之甚易耳盧生客居於饒年十七八即主一家骨肉之饑寒常與一僕東泛滄海北至單于府丐得百錢尺帛囊而聚之使其僕負以歸饒之士皆憐之能辭明敏而知所去就年未三十嘗三舉進士以業丐資家近中輟之去歲九月余自池改睦凡同舟三千里復為余畱睦七十日今之去余知其成名而不丐矣佛著經曰生人既死陰府收其精神校平生行事罪福之坐罪者刑獄皆怪險非人世所為凡人平生一失舉止皆落其間其尤怪者獄廣大千百萬億里積火燒之一日凡千萬生死窮億萬世無有間斷名為無間夾殿宏廊悉圖其狀人未熟見者莫不毛立神駭佛經曰我國有阿闍世王殺父王篡其位法當入所謂獄無間者昔能求事佛後生為天人况其他罪事佛固無恙梁武帝明智勇武創為梁國者捨身為僧奴至國滅餓死不聞悟况下輩固惑之為工商者雜良以苦偽內而華外納以大秤斛以小出之欺奪邨閭戇民銖積粒聚以至于富刑法錢穀小胥出入人性命顛倒埋沒使簿書條令不可究知得財買大第豪奴如公侯家大吏有權力能開庫取公錢緣意恣為人不敢言是此數者心自知其罪皆捐己奉佛以求救日月積久曰我罪如是富貴如所求是佛能滅吾罪復能以福與吾也有罪罪滅無福福至生人唯罪福耳雖田婦稚子知所趨避今權歸於佛買福賣罪如持左契交手相付至有窮民啼一稚子無以與哺得百錢必召一僧飯之冀佛之助一日獲福若如此雖舉寰海內盡為寺與僧不足怪也屋壁繡紋可矣為金枝扶疎擎千萬佛僧為具味飯之可矣飯訖持錢與之不大不壯不高不多不珍不奇王褱怪為憂無有人力可及而不為者晉霸主也一銅鞮宮至衰弱諸侯不肯來盟今天下能如幾晉凡幾千銅鞮人得不困哉文宗皇帝嘗語宰相曰古者三人共食一農人今加兵佛一農人乃為五人所共食其間吾民尤困於佛帝念其本牢根大不能果去之武宗皇帝始即位獨奮怒曰窮吾天下佛也始去其山臺野邑四萬所冠其徒幾至十萬人後至會昌五年始命西京畱佛寺四僧唯十人東京二寺天下所謂節度觀察同華汝三十四治所得畱一寺僧准西京數其他剌史州不得有寺出四御史縷行天下以督之御史乘驛未出關天下寺至於屋基耕而刓之凡除寺四千六百僧尼筓冠二十六萬五百其奴婢十五萬良人枝附為使令者倍筓冠之數良田數千萬頃奴婢口率與百畝編入農籍其餘賤取民直歸於有司寺材州縣得以恣新其公署傳舍今天子接位詔曰佛尚不殺而仁且來中國久亦可助以為治天下州率與二寺用齒衰男女為其徒各止三十人兩京數倍其四五焉著為定令以徇其習且使後世不得復加也趙郡李子烈播立朝名人也自尚書比部郎中出為錢塘錢塘於江南繁大雅亞吳郡子烈少遊其地委曲知其俗蠹人者剔削根節斷其脉絡不數月人隨化之三牋干丞相云濤壞人居不一銲錮敗侵不休詔與錢二千萬築長堤以為數十年計人益安善子烈曰吳越古今多文士來吾郡遊登樓倚軒莫不飄然而增思吾郡之江山甲於天下信然也佛熾害中國六百歲生見聖人一揮而幾夷之今不取其寺材立亭勝地以彰聖人之功使文士歌詩之後必有指吾而罵者乃作南亭在城東南隅宏大煥顯工施手目髮勻肉均牙滑而無遺巧矣江平入天越峯如髻越樹如髮孤帆白鳥點盡上凝在半夜酒餘倚老松坐怪石殷殷潮聲起於月外東閩兩越宦遊善地也天下名士多往之予知百數十年後登南亭者念仁聖天子之神功美子烈之旨跡覩南亭千萬狀吟不辭已四時千萬狀吟不能去作為歌詩次之於後不知幾千百人矣蕭丞相為刺史時樹樓於大廳西北隅上藏九經書下為刺史便廳事大歷十年乙卯建會昌四年甲子摧木悉朽壞無一可取者刺史李方元具材刺史杜牧命工南北霤相距五十六尺東西四十五尺十六柱三百七十六椽上下凡十二間上有其三焉皆仍舊制以會昌五年五月畢自初至再凡七十一年丞相諱復實相德宗皇帝焉京兆杜某記縣之所重其舉秀貢賢也今之自外諸侯之儒者曠不能升一人况尉乎次乃戶稅而已史記河渠書曰自徵引洛水至商顏下鑿井深者四十餘丈即此地也徵者俗訛為澄耳其地西北山環之縣境籠其趾沙石相礡歲雨如注他皆淫灔不測徵之土適潤苗則大穫天或旬而不雨民則蒿然四望失矣是以年多薄稔復絕絲麻蔬果之饒固無豪族富室大抵民戶高下相差埒然歲入官賦未嘗期表鞭一人因徵其來由耆老咸曰西四十里即畿郊也至如禁司東西軍禽坊龍廏彩工梓匠善聲巧手之徒第番上下戶互來進取挾公為首緣以一括十民之晨炊夜舂歲時不敢嘗悉以仰奉父伏子走尚不能當其意往往擊辱而去長吏固不敢援復况其養秩安祿者耶加以御女官多盤宂其間遞相占附比急熱如手足自丞相御史咸不能與之角逐縣令固無有為也非豪吏真工聯紐相姻戚者率解去是以縣賦益逋徵民幸脫此苦者蓋以西有通澗巨壑义牙交吞小山峭徑馳鞍馬張機罝者不便於此是以絕跡不到兼之土田枯鹵樹植不茂無秀潤氣象咸惡之而不家焉民所以安活輸賦者殆由此儻使徵亦中其苦則墟矣尚安敢比之於他邑乎嗟乎國家設法禁百官持而行之有尺寸害民者率有尺寸之刑今此咸墮地不起反使民以山之澗壑自為防限可不悲哉使民恃險而不恃法則劃土者宜乎牆山壍河而自守矣燕趙之盜復何可多怪乎書其西壁俟得言者覽焉淮南軍西蔽蔡壁壽春有團練使北蔽齊壁山陽有團練使節度使為軍三萬五千人居中統制二處一千里三十八城護天下餉道為諸道府軍事最重然倚海壍江淮深津橫岡備守堅險自艱難已來未嘗受兵故命節度使皆以道德儒學來罷宰相去登宰相命監軍使皆以賢良勤勞內外有功來自禁軍中尉樞密使去為禁軍中尉樞密使自貞元元和已來大抵多如此今上即位六年命內侍宋公出監淮南諸開府將軍皆以內侍賢良有材不宜使居外上以為內侍自元和已來誅齊誅蔡再伐趙前年誅滄旁擊趙魏且徵師且撫師且誥且諭勤勞危險終日馬上往監青州新附臥未嘗安復監滑州邊魏窮狹多事今監淮南是且使之休息亦不久之故內侍至焉監軍四年如始至日簡約寬泰明白清淨恕惜軍吏禮愛賓客舉止作動無非典故暇日唯召儒生講書道士治藥而巳內侍舊部將校多禁兵子弟京師少俠出入閭里間俛首唯唯受吏約束故上至相國奇章公下至于百姓無不道說內侍稱為賢人此不虛也宜其侍衞六朝聲光富貴某謬為相國奇章公幕府掌書記奉內侍命為廳壁記某再謝不才不足記序內侍曰掌書記為監軍使廳壁記宜也某慙惶而書時太和八年十月二十一日記百刻短長取於口不取於數天下多是也某太和三年佐沈吏部江西府暇日公與賓吏環城見銅壺銀箭律如古法曰建中時嗣曹王臯命處士王易簡為之公曰湖南府亦曹王命處士所為也後二年公移鎮宣城王處士尚存因命工就京師授其術創置於城府某為童時王處士年七十常來某家精大演數與雜機巧識地有泉鑿必湧起韓文公多與之遊太和四年某自宣城使于京師處士年餘九十精神不衰某拜於牀下言及刻漏因圖授之會昌五年歲次乙丑夏四月始造于城南門樓京兆杜某記建中初年李希烈自蔡陷汴驅兵東下將收江淮寧陵守將劉昌以兵二千拒之希烈眾且十倍攻之三月韓晉公以三千強弩涉水夜入寧陵弩矢至希烈帳前希烈曰復益吳弩寧陵不可取也解圍歸汴後數月希烈驍將翟輝以銳兵大敗於淮陽城下希烈且蹙棄汴歸蔡後司徒劉公元佐見昌問曰爾以孤城用一當十凡百日間何以能守昌泣曰以負心能守之耳昌令陴者曰內顧者斬昌孤甥張俊守西北隅未嘗內顧捽下斬之軍士有死志故能堅守因伏地流涕司徒劉公亦泣撫昌背曰國家必以富貴爾無憂也天寶末淮陽太守薛愿睢陽太守許遠真源縣令張巡等兵守二城其於窮蹙事相差埒睢陽陷賊淮陽能守故巡遠名懸而愿事不傳昌之守寧陵近比之於睢陽故良臣之名不如忠臣孫武曰善用兵者無赫赫之功斯是也大中二年十一月十八日將仕郎守尚書司勳員外郎史館修撰杜某題
