front:
  text: 全唐文欽定全唐文卷二百三十二張說十二
  hash: sha256:07e374566a251e914d2d78236d87958181a9c64e3422a20d27e7e907faef0118
body:
  text: 府君諱騭字成騭姓張氏其先晉人也晉分家世相韓韓滅留侯為漢謀主至宇為范陽太守因居其郡及華博物亞聖為晉司空府君司空十二代孫也曾祖諱俊河東從事大父諱弋字嵩之通道館學士考諱恪未仕即世先君四代早孤單門煢立宗祀之不絕如綫府君襁褓衰麻鞠育舅氏而炳太和之純嘏爍遠慶之洪允庇身禮樂發言忠信小無不戒大無不慎終日乾乾遠於悔恡靈根顛而還植祖德墜而復振加以好學不倦問一反二道機元鍵罔不幽探外王父大理丞某重世為士府君傳其憲章博施精理年十九明法擢第解褐饒陽尉丁王母憂去職夫人少而守義老而無子因心創巨事不忍言喪紀之數加人一等服闋調長子尉換介休主簿洪洞丞太夫人在堂官求近便故累徙而不進也內清淨以化人外平反以悅親不樂歸美而善隱德故下車無赫赫之聲所去有遺愛之戀有旨差覆囚山南輶軒所歷全濟甚衆府君以律有違經背禮著妨難十九篇書奏帝下有司而刪定之官黨同妒異竟寢其議道之將廢也歟命也臧倉其如命何調露元年秋奉使晉陽遇疾輦歸藥禱無降冬十二月大漸九日乙卯棄背於縣廨春秋五十有二光珪說不天總角在疚明年春奉輤藳殯於河東賴夫人撫養孤藐躬加訓授男習文雅女工組繡姻不失親官復其舊景龍元年秋封長樂縣太君夫人故藍田丞威之女也享年七十有二是歲十一月戊申傾背於東都康俗里第於戲哀哉靡瞻靡依何怙何恃二年七月已酉克葬我先公夫人合祔焉從周制也初議葬小子夢度景於萬安山南孤堆東峯之下時淮南宏公相地曰是山為華蓋岡為蟠龍龍者大人之德孤者王侯之稱卜夢協兆何善如之乃定墳塋剏宅茲所小子銜恤誌之幽礎係曰欽若古訓時惟皇考翕和三光希聖二老清有世業儉為身寶彌綸典憲思緝王道佐彼四邑人用不擾生我曷後棄我曷早閔予髫髮遭家不造鳲鳩在桑其子在棘母氏聖善示我顯則命服天朝封邑舊國榮未卒歲哀巳匝域泣血思親昊天罔極孤之華葢土龍蟠連岡四遶帶林巒朝日吐耀遠峯攅微風夕發過蕙蘭石室固護泉火寒衆靈幽謁奉神歡壽宮深靜永閑安臨淄李伯魚妻者范陽張氏女諱德性孝悌柔婉能日誦數千言習禮明詩達音妙繢德言容工葢出人也伯魚天下善為文擢校書郎出為青州司功而卒夫人寡居無子以歸宗焉長安二年四十有八傾逝於康俗里殯於永通門外景龍三年家疚居貧季弟說鬻詞取給冬十月安厝伯姊於萬安山陽蒼梧不從古之制也北望先隴西接妹邱明靈其嘉永安此室銜哀敘誌嗚呼孔懷銘曰送我伯姊萬安之墳精靈何處為雨為雲彼臨淄兮千里望倏忽兮夫君夫人太祖景皇帝之元孫西平郡王普定之女也賦靈陰德資性柔嘉事舅姑盡其敬與娣姒致其睦茂行充乎內則懿聲溢於外姻雖幼育王家長自傅保而能謙光庶類降心細物手成朝祭之服躬操酒食之品凡婦人之所能事而夫人莫不備焉府君朱紱之歲也於是乎始受封邑象服盈門魚軒在路姬氏王者之後夫人帝室之親夫貴婦榮於斯為盛及帷堂而哭有敬姜之禮擇鄰而處有孟母之教入閭俟信有諸婦之期出言成章有衆女之誡受命不淑以某年月日卒於同州之私第以神龍元年十一月二十日合葬於萬年縣白鹿之舊塋有子愻殿中侍御史檢身承家揚名為孝思我母氏感秦伯之詩祔於府君取周公之禮髣髴心跡志之幽石其銘曰茫茫萬姓朝宗於李婺星分極咸池派水后稷裔孫神貽女士動遵法度居觀圖史輔佐哲夫訓成賢子宜崇徽號以享介祉高堂奄空霜露方始儉用禮節葬非奢美鏡下穸臺衣緘泉笥壠煙不散松風長起摘果人迷侵林獸死永言惟孝事親終矣夫人諱某字某滎陽開封鄭氏之女也有唐銀青光祿大夫行少詹事博陵侯崔氏之妻中大夫中書舍人湜之母也高祖述祖北齊吏部尚書太子太保滎陽平公曾祖武叔北齊洛州刺史中牟公祖道援隋宋城令父世基故吉陽令故左僕射安吉公杜淹太夫人之外王父也夫人家世德門母氏鼎冑衣冠禮樂耳目所徵號之諸生實為女士先夫人以崔出泰岳之允鄭祖周王之穆長源修麓比濬聯崇故夫人年十有七歸於我氏盡敬愛以安舅姑致友穆以諧娣姒性寬恕尚素雅文而不奢約而不陋故邑號光啟象服是宜博陵侯更事兩朝多歷官序居必大理去有遺愛雖毳衣善聽得非鷄鳴之弼乎舍人及三弟長安尉泌藍田尉液左千牛滌咸有當代之名立無過之地滋液德教琢磨禮範雖趨庭善稟得非門為門之誨乎夫樂得好逑關雎義也鞠成衆子鳲鳩仁也采蘋采藻修禮度也如山如河有德容也婦禮既成內則用貞母儀乃行家道以寧於是春秋高矣雅好真諦厭斁禪味減徹珍華被服慈衣捐斥文繡總斯㣥懿式是六姻故以嗣徽先姑垂裕來史詩所謂邦之媛也夫人有焉皇天難忱不享偕老年六十四神龍元年十一月九日遘疾終於洛陽之遵化里其明年二月某日葬於富平縣之某原君侯傷神諸子銜恤置銘幽竁用存終古其詞曰東惟詹府西望綸闈吾夫鶚瞵吾子鵷飛青綬赤茀魚軒翟衣喬梓搆基堂堂榮暉如何不淑奄永泉扉漠漠元夜溶溶白日百歲之後同乎此室夫人諱某字某故代州東治府右勇毅都尉幽州高士李感之女也本姓張居於清河郡大父元悊官至安東大都護長史與太宗有故賜姓李氏仕歷澶州司馬始家薊城是則帝寵舊臣乃命王族官平朔野因為郡人偉哉孝友清白之仁基金鈎石印之靈慶必將光大別族繁衍淑女彩黛紛敷焜燿華美若斯之盛也夫人幼而韶異長而婉穆金聲玉澤蕣榮蘭茂傳賢莊姜詩美仲氏無以尚也初汝陽公夫人元氏生一男四女而卒繼室以夫人封諸燕郡王元生立及長孫楊氏二女秉螽斯宜爾之德著鳲鳩均養之仁色無偏和心無殊厚閨庭之內邕邕如也雖邑中五服之家門下三千之客莫能察其異焉永寧里先人之舊廬也有通渠轉池巨石嶔嵰噴險淙灂洄潭沈沈殊聲異狀而為形勝遊衍之處者十四五前夫人之孫蘇氏之婦弱歲嬉而墮焉舉家環流憚莫能救夫人投身赴水或沈或浮久之提挈僅免其行已也實多此類府君更郎將中郎將各一將軍大將軍凡四前後領左右羽林二軍禁營青海鴨綠二道總管天子元老白首兵欄腹心爪牙朝無與二外受琱戈文馬之賞內委金璣寶貝之飾將軍既頒於部曲夫人亦散於宗姻可謂貴而好禮富而能惠者巳及君子晨歌夫人晝哭喪有過戚制無越禮其後法吏苛禮令子遠遷窮荒一訣倚閭三歲炎山瘴海曷云其來施珍玩以奉佛徹滋味以奉道精意入冥明神與直中興昌歷無廢舊勳先公茂乎飾終愛子榮乎起滯天步方泰家屯適夷宜享南山之壽奄頓西泉之駕神龍元年十二月二十二日寢疾終於洛陽之德懋里春秋若干國墜邦媛宗傾母儀孤允孝孫哀哀欒棘有詔旨曰獨孤某妻亡還京日宜給靈輿并遞悼舊襃德矜孤恤喪朝之大經者粵以明年十一月二十日卜葬於雍州之某原不從先塋古之道也夫計功伐勒彞鼎非婦人之事撰德行存國史亦孝子之志乃為銘曰猗嗟昌兮月出之光如葉莫莫如華皇皇宜啟燕郡作合汝陽尊之象服錦衣褧裳以慈行訓曰仁之綱以命易難曰義之方婦有柔德亦惟其常女之士行于何不臧彼天蒼蒼胡降百殃捨我媚子捐其高堂邱壠芒芒風生白楊象物皆盡德音不忘詩美莊姜傳稱孟母庶幾帛丿糸邈千載時有猗嗟邦媛柔明亶厚龜玉毀櫝膏蘭夭壽遠矣皇祖肇自伯宗靈基在晉華冑陵江尹茲西楚宅是南邦高葢結轍圓冠比蹤魏館虛待周京長發父對雄風母膺姊月珠浦瀆潤玉林清越昆弟三人羽儀雙闕家芬淑女國茂賢具瞻四德旁通八徽步幛馳辨連環定機調絃魚躍弄杼鴛飛媧后創業軒宮多事高行登聞大家入侍幽賛日月財成天地溫室不傳平城盡祕大君命我變禮斷恩衞妻空誓息媯無言均養七子劬勞二門始賦樛木終歌采蘩多難啟聖㣥凶搆孽朋家作仇脅權相滅臨禍不懼忘生蹈節彼何人斯碎此貞烈氛消日朗既安且平皇心震悼禮備哀榮啟國加等復土陳兵外姻來唁中使臨塋恭惟夫人宿精智刃昭昭開士授之心印古無合葬遺言別墳欒欒孝子敢廢前聞服不珍繡盤無膩薰室暗泉火松殘隴雲神合大化誰為小君女郎名炎姓張氏洪洞丞府君之少女也聰慧孝友卄繇條鬒晢能讀史書善奏絲桐舉族珍之未成人而夭命也聖歷中隨仲昆之任殞折於慶州歸殯於藍田別業景龍年屬家艱季兄說徽黃門侍郎哀請不拜詔許終服家貧傭文以取資冬十月獲葬女弟於萬安山陽差池姊塋顧瞻尊闕不忘孝弟慰爾幽魂含酸屬銘投筆氣索詞曰陟彼京兮痛同生兮柰何朝露在蕣榮兮共天地之大德焉早落而無成兮唐故中書令逍遙公韋氏諱嗣立字延構京兆杜陵人也受渾元之正性挺生人之秀傑門為孝悌之府世處台衡之地蓋士林之高標宗臣之首出者也生於秦之清水長於鄭之成臯聰明先覺博古兼覽究蓬山之百氏綜闕里之六藝文而不華實而不滯原夫志在於易行在於禮守士冖䂞籥之沖虛播朱絃之愷悌事有則而言有度神無方而用無體其與人也溫良善誘仁恕多容俾夫頑蔽開析愎鷙擾從君子進道小人革慮聞者願來見者忘去若膏澤之浸陽和之感萬物不知其化矣及夫覆簣登朝濫觴宰邑聖朝知其周慎忠肅易循良是以綢繆兩禁重謺千里迄踐宰衡終厥有成凡化二邑理七郡三入中書再統兵部選兵吏各兩冬典樞密共五載光弼四主歷政三十有餘其閒累有謗及官因左退日月蝕而更明隨和幽而不昧爾其為邦設教遵德閑邪身勤心苦誠感物化禮讓興於私室刑罰廢於公家衡鏡高懸文武矯首才無我失善若已有風流名教作法垂後訏謨皇極功格天地茫茫蠢蠢既生既遂四夷來王五靈皆至然而外榮中素迹邇心遐杳然朱戶之若喪邈矣赤松之可接西宴驪山之谷東息龍池之野擇逍遙而建號裂土宇而開社即明主封立帝之謀表高臣之志也公考侍中為國元輔公兄承慶當代齊名咸以令德繼和金鼎扶陽二相陳氏三君復追美矣侍中前夫人崔氏生黃門而即世後夫人王氏生公而偏愛公克諧以孝因心則友啟均養之德成無閒之言天下之人比之祥覽惟公德行言語文學政事四者實總而兼之事親養志而能爭居喪過哀而顧禮此又善中之善者也善人天之經也國之寶也道將興廢木鐸之用有時命或推移蒼生之望恒在春秋六十遘疾陳郡還醫洛師開元七年九月二日薨於歸德里有詔贈兵部尚書諡曰孝禮也明年某月葬於某地有子孚恒濟夬儡然在疚靡所寘哀以某忝縉雲之舊寮沐清風之餘論入難名之閫域窺妙德之形容見託銘誌庶傳精爽至於歷官次序平居事業當見郡府遺愛之碑國史名臣之傳故不存焉銘曰峨峨仁公抱孝含忠文獻則足高明有融翻飛王佐穆我清風道濟明時心樂幽地薛衣華袞坦然一致逍遙啟封帶礪傳祀生涯共盡振古其常人秉三德天歸百祥臧孫有後公業不亡維開元十年正月已未左庶子武陵公河南元公薨於東京留守之內館公諱懷景字某魏武陵王雄之曾孫右衞大將軍冑之孫贈麟州刺史仁惠之季子昔天啟水行君臨寰海雄圖長發本枝碩茂濟美象賢餘慶不隕公受茲介祉誕膺淑靈幼有純至之節長立公直之操學綜㣥藝詞擅精微夫其結言以信導物以德清儉足以軌俗真厲足以矯邪故美暢於中名揚於外弱冠以國子進士高第補相王府典籤藩邸擇賢妙盡時選尋以內憂去職重補相王府參軍及明兩昇儲作貞萬國以宮臣除太子通事舍人天授中以親累除名向逾一紀後除直羅溫縣二令雖大位未享通材必久初自太府主簿累入副卿河南掾曹克昇亞尹握蘭右轄綱紀南宮秉茲憲肅彼專席再侍儲華卒踐宮相公執心好直履法斷恩觸雷霆而除惡不避也枉絲髮而干譽不為也升降兩宮出入三代克慎其始終厥有成君子以為難允哉其難矣及啟手歸全遺言薄葬家無長物士伏其清年過懸輿人傷其夭嗚呼哀哉制贈都督幽州諸軍事幽州刺史賻悼之節優於恒數明年二月歸葬於咸陽之舊塋夫人韋氏祔焉禮也夫人即逍遙公敬遠之元孫左常侍希仲之叔姊淑行無徵華年早世其孤彥仲等克遵遺訓靡及寘哀說情睦外姻懷深國士既闕西階之奠遠投東武之詞銘曰卓彼英運慶靈既長貽訓夫子體微知章在藝斯博於欲則少徒文其中莫飾其表惟靜惟默不激不矯時經三代官成兩宮化若風偃德如澤融邦稱其直朝表其忠禮祔周兆墳瞻漢宮哀哀純孝長訴旻穹開元十有七年二月癸未中宗節愍太子楊氏薨於京師太平里第之內寢越五日景申詔葬於新豐之細柳原黃陵不從古之道也嗚呼哀哉氏之先代居河華赤泉啟國清白傳家東都之公冑西晉之后族高祖士達隋開府納言天授中以孝明高后之父追封鄭王贈太尉曾祖緘隋符璽郎抗節王充朝廷旌載贈靈州刺史祖全節左內率贈魏州刺史考知慶千牛豹韜二將軍若夫軒冕王官同許史之繁漢婚姻帝室比姜姞之宜周是故二華降靈五河飛譽拜玉冊於文廟儷金璽於青宮入參視膳之儀出友元真之樂禮陪繭館祭服始於北郊詩賛鵲巢王化終於南國豈知言違鬬水神往邙山七日之望不歸千秋之言何及於是視身知苦幽探白馬之偈覺心等空坐證青蓮之葉久以喬木無怙柏舟早誓棣華先落聖善相依門為門正家稱未亡而全禮高堂終養不勝哀而遂絕此又禮外之禮孝中之孝者也初上在東宮時有女娣選為良媛生忠王卜者曰不宜養爰自襁褓命舉字及開元正位良媛為嬪而卒之視忠王也隱儭之教誨之竭從母之仁慈陪猶子之珍愛忠王之託也敬愛焉聽順焉生盡因心之樂沒過如母之慼且夫慈懋鞠育孝思顧復仁叶恩親愛備恭睦成天下之百行致生人之五福斯蓋皇極之端國風之首者矣湖陽王當小宗之祭元之喪故喪挾兩孤而祭殷二國何必鼓吹山上遙傳慈母之名石闕廟中獨立少姨之像史官承詔勒銘沈碧詞曰太華北足長河東肘總粹陰靈德儲后鳴美玉佩炯光金鈕貴嬪長姨寵王從母永訣上賓死孝哀親顧懷孺子忍別天人昔貞萬國今撫百神泉燈我夜宮樹他春陵麥秀兮漸漸隴月生兮纎纎元灞去兮無還日青門絕兮不可瞻石獸澀兮綠苔粘宿草殘兮白露沾園寢閉兮脂粉膩不知何人兮開鏡奩公諱仁惠字某河南洛陽人也昔帝軒命子爰宅幽都天神降祚遂荒北嶽其後日月運行雲雷經始壇場鄴洛據天地之圖帶礪山河建王侯之國公即魏昭成皇帝之十代孫中書令濮陽王順之曾孫也大父雄魏濮陽王後改封武陵王昆吾伯嗣越在濮陽之墟瑯琊王子別封武陵之郡宇文朝降為武陵公太府卿秦州總管微子去國不替舊章薛侯來朝於焉降等父冑隋濠豫二州刺史右衞大將軍襲封武陵公翼亮隋室宏濟王基有佐命之元勳承異朝之延賞文武藉甚貽燕深長公受金行之正性承冠代之隆烈幼見岐嶷夙聞聲器靈臺雲秀繩墨之宰無施雅韻天成金石之師何力屬隋綱弛紊神棄不歆卿族衣冠日失其序獨寐寤宿永懷盤㵎之人藏器待時未射高墉之隼唐祖龍飛天宇鶴版巖林授公右千牛錄事黌閈之恩舊也高皇邑子既與盧綰同衣光武學徒則有嚴陵共宿久之以公事免為巂州法曹又歷循州河源滑州靈昌二縣令克已為政蠻貊化忠信之言直道與人仕巳無喜慍之色永徽在歷碩真搆難㣥兇既翦江界蕭條帝念疲甿疇茲俾乂乃授公睦州雉山縣令乘馹而往下車作則江逋海盜革面來威然後網鳩人峻策羈吏閑田盡闢鰥寡委犬彘之餘絕㵎無游豪猾屏蠶漁之氣我有禮樂達於山川鬼神物應休禎孚於鳥獸草木朝廷異之拜朝散大夫行隆州閬中令未至改授雍州渭南令觀人設教異邑同風遷隆州司馬尋加朝散大夫守涼州都督府長史分乘兩蕃人康頌作化澄巴濮無侵橘柚之園教溢河湟不飲蒲萄之酒離歌就歲夢臨辰命躓修途榮慙厚德總章二年終於官舍春秋七十有三夫人安定梁氏文伯之妻君子以為知禮孟軻之母良史稱其能賢齊德茂於昭塗合祔期於幽隧有子懷貞斧藻詩禮佩踐義方承家有馥芝蘭如也歷官右司員外郎太子舍人而罹事徙居復歸舊土履霜露於三紀無改素冠之行違桑梓於十載還守青門之田勤孝在乎追遠豐感思乎備物武陵公之塋域今順陵柏城之內也山園有禁奉瞻靡及粵以聖歷二年歲次月朔別卜宅於咸陽縣肺浮原合葬焉公孝友純深風標峻起門無雜客家有嚴君而佐郡為邦宏風邁德執法不撓去邪勿疑仲由之政事叔向之遺直豈稱論之典有闕範則之容將墜仰惟代姻恭承哀託郭有道之故事無媿蔡邕趙文子之將游永懷隨會寓詞楹石式題賢壟其銘曰大哉乾元我族資始有國伊魏曰天之子皇羲姓風帝姬氏水創業垂統鬱乎舊史崇德象賢允也重軌貞涵玉性潤結璇源武公之子平王之孫川流長直光氣熊渾孝深柏顙義重荊璠白珪比節黃金敵言行實剛游無諂黷學妙神教書能鬼哭避彼屯運盤桓空谷四海有王一旦明目佩此芳草遷於喬木亦既從政淑問克宣秉心如水臨事如弦歷宰四邑高芬屬天元僚兩郡汪化流泉江河秦蜀嘉聲在焉三光西沒百川東度天道運迴人隨代故倏忽三紀悲涼千露帝葬橋山傍壖祖墓天斷舊域地開新路路即咸陽阡惟京兆坤氣雲矗長岡龍抱竁揜銅人塋留石鳥塵歇徑滅山飛