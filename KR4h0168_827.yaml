body:
  text: 十二月二十四日劍南西川節度觀察安撫使守兵部尚書成都尹牛叢致書於雲南詔國坦綽麾下專人遽到示翰忽臨承統押師徒來及近界竊以詔國自為背叛積有歲年乃祖出於六詔之微非是西夷之長禹會塗山之日不得預萬國之名舜巡方嶽之時不闕見五年之幸我大唐德宗皇帝仁沾動植信及豚魚子育兆民君臨四海憫其傾誠向化率屬來王遂總諸蠻令歸君長仍名詔國永順唐儀賜孔子之詩書頒周公之禮樂數年之後藹有華風變腥羶蠻貊之邦為馨香禮樂之域豈期後嗣罔效忠誠纍肆猖狂頻為妖孽自四五年來侵凌我疆土圍逼我城隍蓋以姑務含容不虞搪突遂令凶醜肆害生靈況乃毗橋喪師沱江敗績於何今日不改前非妄設姦欺詐言朝覲輒舉螳螂之臂大興豺豕之心仍構狂詞乃云假道所要於蜀王殿安下五日即便前去者且先代帝王之宮也豈外邦蠻貊以居之是必天怒鬼誅殞身喪國以爾欲其褻瀆示彼誡懲況天設華夷國分大小小當事大夷不亂華豈有興動蠻師甲兵侵臨天子藩屏必是坦綽數盡之歲殄滅之秋不然何以不恤其民妄動於衆一旦天子赫怒諸侯會兵長驅渡瀘之師深入鑄柱之境必不更七擒七縱即須翦蔓除根當此之時後悔無及坦綽今既離彼巢穴犯我封圻當道已排比戰場點齪戈甲雄師十萬驍騎五千即遂鼓行併令擒戮所差王保誠四十人送書並已囚縶候於軍前用以釁鼓今發遣酇嚨段首遷二人持報書望詳覽不具某白謹案成都文類咸通十四年兵部尚書牛公叢除劍南西川節度使十二月坦綽至雅州差使送書上川主云此時止欲專詣京都懇求朝見論理枉遭讒間隔絶梯航冀與尚書繼好息民朝來暮往今古假道貴府請於蜀王殿安下三五日即前進公覽書驚駭乃復書云云詔王之祖六詔最小夷也天子録其勤合六詔為一俾附庸成都名之以國許子弟入太學使習華風今乃自絶王命且蛇雀犬馬猶能報德王乃不如蟲鳥乎比成都以武備未修故令爾突我疆場然毗橋沱江之敗積胔附城不四年復來今吾有十萬衆捨其半未用以千人為軍十軍為部驍將主之凡部有強弩二百鎛斧輔之徑弓二百越銀刀輔之長戈二百掇刀輔之短矛二百連鎚輔之又軍四面面有鐵騎五百悉收芻薪米粟牛馬犬豕清野待爾吾又能以旁騎略爾樵采我日出以一部與爾戰部別二番日中而代日昃一部至以夜屯月明則戰黑則休夜半而代凡吾兵五日一殺敵爾必晝夜戰不十日懵且死矣州縣繕甲厲兵犄角相從皆蠻之深讐雖女子能齽齘薄賊況強夫烈士哉爾祖嘗奴事西番為爾仇家今顧臣之何恩讐之戾耶蜀王故殿先世之寶宮非邊夷所宜舍神怒人憤坦綽且死謹案此文從新唐書採出上篇報坦綽書從成都文類採出二篇事同文異今並載存證棨字文威官中書舍人自大中皇帝好儒術特重科第故其愛壻鄭詹事再掌春闈上往往微服長安中逢舉子則狎而與之語時以所聞質於內庭學士及都尉皆聳然莫知所自故進士自此尤盛曠古無儔然率多膏梁子弟平進歲不及三數人由是僕馬豪華宴遊崇侈以同年俊少者為兩街探花使鼓扇輕浮仍歲滋盛自歲初等第於甲乙春闈開送天官氏設春闈宴然後離居矣近來延至仲夏京中飲妓籍屬教坊凡朝士宴聚須假諸曹署行牒然後能致於他處惟新進士設筵顧吏故便可行牒追其所贈之資則倍於賞數諸妓皆居平康里舉子新及第進士三司幕府但未通朝籍未直館殿者咸可就詣如不吝所費則下車水陸備矣其中諸伎多能談吐頗有知書言話者自公卿以降皆以表德呼之其分別品流衡尺人物應對非次良不可及信可輟叔孫之朝致楊秉之惑比常聞蜀妓薛濤之才辨必謂人過言及覩北里二三子之徒則薛濤遠有慙德矣豫頻隨計吏久寓京華時亦偷遊其中固非興致每思物極則反疑不能久常欲紀述其事以為他時談藪顧非暇豫亦竊俟其叨忝耳不謂泥蟠未伸俄逢喪亂鑾輿巡省崤函鯨鯢逋竄山林前志掃地盡矣靜思陳事追念無因而久罹驚危心力減耗向來聞見不復盡記聊以編次為太平遺事云時中和甲辰無為子序扆初名允迪字祥文宰相贄族孫光啓二年進士纍進翰林學士中書舍人尚書左丞封嘉興縣男徙戶部侍郎同中書門下平章事進中書侍郎歷工兵戶三部尚書封吳郡公為崔允所譖貶沂王傅分司東都授吏部尚書再貶為濮州司戶參軍被害白馬驛年五十九門下我國家奄宅中區光啓祖業析圭胙土唯親與賢故本根茂而枝葉榮王室尊而藩屏壯肆豫末叨獲纂承賴至道之元慈鍾列聖之餘慶顧茲允嗣實謂蕃昌爰稽典謨用建邦土第三男祤星辰育粹嶽瀆降靈早彰岐嶷之姿克稟徇齊之度第五男褉龜龍應瑞雕鶚凌空溫恭自得於天和㯋悟實由於神賦第六男禋璆琳挺秀鸑鷟呈祥爰當好弄之年雅號夙成之器第七男禕珠璣耀彩箘簵含貞風神潛茂於端莊質性巳彰於惠敏而皆生知孝敬志樂文儒問安靡曠於晨昏稟訓每由於詩禮智有刻舟之妙辨多對日之奇是宜分以白茅錫其朱邸叶犬牙於漢制光麟趾於周詩厭次名邦境連於齊魯南康奧壤上接於荊吳琅琊敦儒素之風遂寧實阜殷之俗咸稱重地各服徽章於戲器以琢成道由學顯勉稟君親之教敬承友傅之規勿追平樂之歡無好任城之勇懋建厥德永孚於休祤可封棣王禊可封虔王禋可封沂王禕可封遂王仍令所司擇日備禮册命主者施行門下朕聞天垂星緯王者象之以設官地裂山河歷代定之以建國所以咽喉中夏藩屏皇家非威望不足以鎮寧非仁惠不足以撫養其有勳勞夙著宜申胙土之恩韜略素精屢委殿邦之任二者兼備斯為得人國有彞章我復何愛前昭義軍節度使潞慈邢洺等州觀察處置等使特進檢校司空兼潞州大都督府長史御史大夫上柱國沛縣開國子食邑五百戶朱崇節雄略縱橫忠誠貫直夙著總戎之術常韜靖亂之謀臨危不屈於壯心多難益全其大節去病辭第誓彰鍾鼎之勳王翦請田非為子孫之計日者平陽求瘼馮翊頒條隰川竟保於孤城汝海將繩其弊俗其後孟津分閫上黨臨戎智謀潛契於著龜義烈彌堅於金石擁衆而出陳兵以行指揮而神氣激揚叱吒而寇讐惕息今則鄉閭顧慕士卒謳歌廡金咸佇於竇嬰竹馬思迎於郭伋是用再兼五教重委雙旌既資董衆之能仍舉疇庸之典於戲功名易守自伐者必顛富貴可圖懷驕者難保失道則禍生旋踵守義則福貽後昆勉爾令圖服我明訓可依前檢校司徒充河陽節度使散官如故門下夫山結川融皆豫之宇縣蠶衣租食悉我之黎元慘舒雖繫於陰陽覆燾豈殊於遠邇自頃中原搔擾遐裔阻難或王澤不流或國章靡及念茲黔首系我皇風聿求養理之仁兼藉鎮寧之略訪於執事果得能臣武安軍節度湖南觀察處置使特進檢校右僕射食邑三百戶周嶽黃石傳符豐城得劍倜儻挺義夫之節縱橫抱名將之才擐甲執兵閫外以雄豪見許絶甘分少江東以信義相推嚴武備而不喜戰爭頒吏術而每先恩惠遂致塵清四鄙農勸三時鄉閭阜安卒乘雄富是用疇其懿績仗以英謀輟乳哺於賦鴟之鄉壯藩垣於獲象之郡爾其克膺重寄更茂嘉猷必令嶺嶠蠻陬欽我之風化無使黃金翠羽纍爾之清廉然後馬援威聲孟嘗介潔苟能礪操諒可齊名仍推百越之封俾進三槐之秩恩不虛受爾其欽哉可檢校司空充嶺南西道節度使餘並如故門下漲海奧區番禺巨屏雄藩夷之寶貨冠吳越之繁華苟非令人難著清節列聖眷念必求賢良故宋璟播美於前李勉垂芳於後朕初君臨宇縣方以武定藩維獨命卿往鎮茲土而崇龜果以清淨為理謳歌日聞固追詠於夷齊豈慙名於宋李代其任者不亦難乎爰求勳舊之間別得英奇之士左軍都指揮使前靜江軍節度使開府儀同三司檢校司徒平章事潁川食邑三千戶實封一百戶陳珮雄姿嶽聳俊氣鷹揚家傳忠孝之風代襲韜鈐之術愛士卒而更逾吳起敬君子而不讓張飛位以功高名由義振先皇帝薦臻艱運再幸侯封挺身於版蕩之中竭力於阽危之際或警巡於西蜀或侍從於南梁殄岐陽兵火之災爾功居最戡京國宗祧之難爾效復多皎潔忠誠貫黃河而不濁堅貞壯節冒烈火而寧焚雖衛鼎銘勳韓壇受律未遑列土豈答豐功是命殿彼大都授其峻秩乃示優崇之旨再兼台衮之榮於戲吳隱之昔號清廉英聲未泯馬伏波嘗推功業厥迹猶存苟能視粳粃於翠羽明珠張紀律於遐陬異俗吳馬之政今古寧殊無使璟勉崇龜獨誇於前哲也勉服丕訓無替令猷可檢校太保同平章事充嶺南道節度使餘並如故門下召奭舊邦燕昭故國其地廣而要其俗徑而雄儻非英偉之才孰控臨戎之任詢於執政爰有良臣具官李籌刜鍾利器搆厦宏材負頗牧之威名蘊關張之節概夙明軍志妙揣敵情訓戎兼務於詩書養士必加於觴豆日者咸推友悌實倅元戎屢參必勝之謀常贊在和之義洎專庶務益洽㣥情貔貅仰愛日之恩疆場賴仁風之固是用寵其龍節榮彼鴒原俾登韓信之壇仍進王祥之秩爾其稟我王度振乃家聲推信義以睦鄰封謹法令以威藩落武有備而不用士使樂而不驕四者聿修七德斯在服我明訓厥惟欽哉可檢校太保幽州大都督府長史盧龍軍節度使餘並如故門下荊渚懷仁陶侃昔嘗再理潁川思義黃霸於是重臨苟徇人情何傷國體而況干戈久試宵旰為憂將蘇塗炭之災俾復旌旄之任詢於執政僉曰嘉謀具官周嶽早洞武經兼通政術嘗鎮湘中之地克揚閫外之威執紀律以不踰播謳謠而甚遠拊封彌謹述職惟勤垂竹帛之功名委旌幢之貴寵而遽因疑間遂致遷移適五嶺之遐荒奪重湘之奧壤乃使軍戎憤悱黎庶怨咨煙塵不絶於纍年瘡痍偏傷於一境旋聞軍吏之衆耆老之徒咸詣護戎借留賢帥遭權臣之擁遏致明命之稽延今我朝政惟新庶事思理雪爾肺腸之憤申豫雨露之恩俾殿舊邦用諧衆志爾其速蘇雕瘵無念仇讐戢矛戟之連營勸農桑於列郡布豫惠澤服我徽章茂繼前勳永膺重寄可依前檢校司徒武安軍節度使餘並如故門下隴陰重地涇上雄藩勵控弦帶甲之徒資護塞和戎之略爰自動知邊事夙練兵機加以制彼西陲屏於中夏博採輿人之論果聞良帥之才爰降命書式諧衆欲具官張鐇雷霆徑氣雕鶚奇姿秉孝愛以承家挺忠直而事主玉鈐金匱弟兄咸繼於孫吳雪嶺蕭關蕃虜遠懷於頗牧矧示令委殿於是邦著勳烈於兩朝耀威名於一紀訓兵積粟述職安邊城隍元固於金湯士卒必均於觴豆功垂竹帛政洽謳謠並馳賢將之名仰自元昆之訓豈謂降年不永閲水生悲將繼前修是資同氣設齋壇而錫命馳瑞節以頒恩式光十乘之雄不改三槐之秩爾其奉豫紀律固乃封疆推誠信以睦鄰竭忠勞而報國自可委安祿位益茂功名於戲爾鐇服我明訓可檢校司徒彰義軍節度使餘並如故門下王者裂土疆以任材臣下推腹心以報主能任其材則國理能報其主則功高其有鎮撫巨藩訓齊義旅克展忠貞之效每遵紀律之條斷自豫懷將頒殊渥具官趙凝倜儻雄材縱橫奧略奮垂天之羽翰聳發地之巖巒頃纂舊封克承先訓嚴武備而不矜戰伐緩軍令而不虐惸嫠鄉閭阜殷卒乘輯睦顧峴首漢陽之地實四會五達之莊扼咸鎬之咽喉導荊吳之貢賦途路無梗舟弟航若流不有威聲孰能通好朕以姦凶構患都邑縱兵爰避艱虞出居巖險而能徑馳專使來達臣誠乃陳底貢之儀備驗輸忠之節況爾先父實余藎臣前勳尚煥於鼎鍾令嗣克傳於弓冶永言念舊尤在賞新俾升掌武之班益重拊封之寄仍遷峻級式示隆恩爾其保祿位以榮家竭忠勞而許國勉欽明訓無忝厥官可開府儀同三司檢校太尉平章事充忠義軍節度使餘並如故門下朔野雄藩地臨於強虜海濱巨屏境接於諸蠻苟非威略不足以鎮寧非和惠不足以綏撫其有久專留務具著能名雅稱分閫之才宜賜登壇之命具官石善友夙知邊事素練戎韜驊騮騁風無遠不適具官滕存免早習兵機常推忠款豪曹出匣其鋭難當而能誓建功名克遵紀律洎膺試用咸務恪恭封疆遠憚其威聲溪洞每懷其信義固可以靜茲絶塞阜彼遐陬使風煙罷警於北陲琛賮遠臻於中土方資重委宜洽優恩俾真旄鉞之權用壯藩宣之寄或榮遷端揆或寵陟秋官勉竭厥誠二則有辟善友可檢校右僕射充鎮武節度使兼安北都護存免可檢校刑部尚書嶺南道節度使餘如故門下入居巖朝施明略以匡時出陟齋壇運沈機而鎮俗苟非材推命代望重當朝則何以宣我武威易其風俗朕志先定僉謀允成持危匡聖致理功臣金紫光祿大夫守禮部尚書兼中書侍郎同中書門下平章事兼集賢殿大學士判戶部事上柱國清河郡開國侯食邑一千戶崔允文星垂耀神嶽標奇襲禮樂之清風冠簪纓之貴胄佩觽之際潛韜經濟之才筮仕以來尋積公輔之望洎更華胄益振全圖居論思而獻替盡忠提綱紀而回邪斂迹旋自繁劇俾司燮調苟利於君無所不至洎寵蒲坂再秉洪鈞時謀明合於蓍龜雅操不踰於風雨作礪之業為時而生乃眷重湖實維奧壤薦臻多難屢易元戎哀彼征人闕我皇天間爾嘗隨重幣往曳長裾迄今鄉閭尚播詩詠是用拯彼塗炭宣豫惠和假其問喘之仁慰彼來蘇之望仍持相印式寵名臣暫追羊杜之政能未浼皋夔之事業往踐厥位爾惟欽哉可檢校禮部尚書同中書門下平章事功臣散官勳如故充義安軍節度湖南管內觀察處置觀察等使使持節潭州諸軍事守潭州剌史承造乾符二年官絳州剌史往之事不知者多以故老之傳而實之舛生於訛以至大謬至若正氣為邪氣所逼本非正氣也蓋疑生於莫析以逮於言思耳愚咸通甲午歲孟春月十有七日奉天子詔來牧茲郡之人以武豹門為祛邪禦魅之所作也其門北向左畫白虎執以蒼頭之手右畫大豕拒以雄武之威門之東壁有刻石焉乃故大光祿李公暨前牧是邦為文以解之義與夫郡人之説不二也又曰圖於寢室恍恍焉疑有所壓愈不知其所由來者矣適有多才能之士胡姓承裕名為愚釋之曰是州也其宅東西廣正北傾後無乾地南北嶮巇林木森聳水自北來山勢岡阜即是八難地而武豹門正當九苦風時俗以武豹為辟邪按韓王元嘉始創之旨乃以五行所克寸勝其災而滅之禍武屬木以木臨亥位故以豕承之寅主東方故畫東垣豹主西方故志西壁禦禍之風制空之位一其義也今愚所築池北望月臺池南釣絲臺亘及此門中架虹梁正與韓之設色三獸暗合其理也愚故命筆書之庶將釋惑表異為後君子信與不信耳時乾符二年四月六日絳州剌史韋承造記知元懿僖時人天下湘山祖師聖化主人無量壽佛入寂幾十霜矣奉遺命以肉身垂化及今浮圖成奉佛出龕入焉聖貌如生毫光時現真世希有事也佛降神天壽之鄉垂像五華之地珠投周室鉢出徑山法諱全真別號宗慧先年雲遊至縣選勝湘山結茅為院名曰淨土十力神圓六通智足慈育萬有道濟百靈不擾人天耕畬自給處世説法利益無邊來者如歸視道若咫太和之末沙汰僧尼會昌五年焚毀剎院佛以覺照先事深藏風移益高挺然獨立衣冠殊制名號不倫衣曰無量壽衣冠曰真空法冠髭髮不剃老少不常不念經不禮佛乃自號真空法身周主人又嘗謂修行猶落色空見我所以超凡透色空過真空乃入無量量絶無無量那得非無量主人大中初佛教重興兼苦旱久邑人乃入覆釜迎佛還山雨暘時若物和歲豐民安其生俗蒸以變蓋居然一極樂國也製教十二部部十二卷命曰遺教經又其徒彙録湘山百問行世咸通八年二月初八日辰時忽召衆謂無色天請吾設法既而偈畢趺坐而逝遂卜於山之中峯笋布臺下建院迎龕上供踰二七夜放白毫相光十一道光中現十有一佛如是者彌月乾符甲午夏劉相公瞻從歡州召還過湘源以佛與同郡詣院供香見紫雲回翔其上蠲縑一笥助修浮圖於是淨土院三會長遍募諸方就供所地庀材鳩工經營兩載乃峻厥役官僚信士大集齋供以慶之時則乾符三年歲次景申二月己酉朔十二日庚申也知元濫蒙衆請據事直言刊石塔門永播終古
