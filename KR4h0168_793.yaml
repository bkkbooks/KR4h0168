body:
  text: 皇帝改元之六年諸道鹽鐵轉運兼鎮海軍節度等使開府儀同三司檢校司徒中書門下平章事燕國公高駢奏臣前理成都築大城請紀其事上命翰林學士承旨臣王徽授其功狀臣徽承詔再拜上言夫外戶不閉雖前聖之格言設險以居乃有國之雄制用是則光昭振古勢讋遠夷不有高墉曷稱巨屏我之奧區粵惟井絡繁阜昌熾標出宇內先是蜀城既卑且隘象龜行之屈縮據武擔之形勝里閈錯雜邑屋闐委慢藏誨盜城而弗羅矧乎西束江山南控烏滸疆理澒洞舊貫因循日居月諸殆逾千祀漢魏以還英豪迭處至若公孫述之桀黠諸葛亮之經營曾不指顧留心乘機制禦斯蓋天藏盛烈神貯嘉謨俾集元功式耀雄武自二紀以降邊郡戒嚴有虧懷柔或阻琛賮雖負山川之險且乏金湯之固上顧相臣曰朕以不德化罔被於四夷惟是西南載罹俶擾深軫豫衷將若之何丞相進曰陛下以睿哲照臨臣輔理不能敷聖澤以懷異俗俾流毒於益人臣之罪也然黃帝有版泉之役放勛興丹浦之師周逐獫狁漢備胸奴是知猾亂自古皆有其所以滌厲梗致時雍乃在進任忠賢馳驅英雋耳臣伏見今天平軍節度使駢即威武公崇文之孫也威武在元和中劉闢以蜀叛憲祖殷憂擇其所以代之者由是允膺聖獎能以部兵復梓州統大軍平玉壘大節大忠煥乎典册駢能不墜其業益大其門既席勳烈之資克善匡扶之志材超衛霍氣蓋關張忠孝兩全河山繼誓聿修厥德自成名家馳譽石麟綽有美稱其守天水邊塵不驚戎律既申將略克舉俄而交趾淪陷有命遄征既復土疆遂錫鈇鉞則馬援銅柱楊僕樓船步驟之間莫得倫比固以威張惠浹後徑中權五年於茲海波不動朝廷方期拔用不可久留爰命徵還彌增寵澤時屬龎勛始潰鄆方未寧駢則再登帥壇復開將幕士絶朝飢犬無夜驚威加鄰部化敷蜀城相印以之疇庸和門為之增氣恭以憲宗録崇文定蜀之勳也既如彼陛下念駢復交理鄆之勤也又如此俾榮舊履重建高牙必致師貞可期俗阜上曰俞爾惟代天其行之於是詔駢復以丞相擁節去汶陽趨錦里至則詢問疾苦樹置紀綱巡按封域周覽郛郭且曰夫療疾者必在藥乎心腑然後可以堅四支植木者必嘗澤乎本根然後可以茂柯葉今城之於蜀其由心乎其由本乎則知不理於近曷能致遠不固其內安能保外未有不謀而能成不壯而能威不勞而能逸者也於是擇地量材拓開新址分命支郡以令屬邑乘時就役靡不適中吏不敢欺人不敢怠岷峨之下欣欣子來昔梁伯亟城人疲弗處子囊築郢見誚於時曷若駢能度其宜樂用其士圖難於易去危即安環以大城用冠諸夏其功固以相萬矣惟蜀之地厥土黑黎而又墝埆版築靡就前人之不為非不為也蓋不能也惟駢果得衆心克成大績鳩工揆日不於素十旬之中屹若山峙南北東西凡二十五里擁門却敵之制復八里其高下蓋二丈有六尺其廣又如是其上袤丈焉陴四尺斯所謂大為之防俾人有泰山之安矣而甃碧塗塈既麗且堅則制磁飾頳又奚以異其上建樓櫓廊廡凡五千六百八間梠櫛比闉闍鱗次綺疏挂斗鴛瓦淩霄若飛若翔如偃如仰栖息烏兔炫熀虹霓龍然而縈霞然而橫望之者莫不神駭而氣聳目眙而魂驚其始也咸謂冥助似非人力其外則繚以長堤凡二十六里或引江以為塹或鑿地以成濠則方城為城漢水為池又何以加焉是知摩壘者不復矜其能擊柝者足以抗其敵所謂能禦大災能捍大患者也其舊城周而復始蓋八里高厚之制大小之規較其洪纎可得而辨矣况乎扼束都會襟帶地形險易之狀斯呈強弱之方可見自秦惠王疏翦山林以通中夏及李冰為守始鑿二江以導舟楫決渠以張地利斬蛟以絶水害沃野千里號為陸海由冰之功也漢文翁置學校勸人受業行爼豆獻酬之禮於是儒雅之風作洎威武伐叛擒大憝而新其人玉石不得俱焚焉西蜀至今稱之駢之來鎮肇興武備俶有禦衝之事夫然後不為外羌之所窺矣惟蜀之人自冰與翁自威武暨駢乃獲佑於天者四天之於蜀厚矣長雲斷岸莫得而隳古往今來何嘗能覿傳不云乎人保於城城保於德觀駢之政可謂保城與人矣向非挺生俊傑來弻聖神則孰能建絶代之遺功創一時之偉績者乎况夫高不可踰堅不可觸俯瞰天表方駕馬足銷吞祲沴亘壓咽喉訖使豺狼耳之而色沮目之而膽褫是謂不爭而勝不戰而服者也新城成詔加大司徒封燕國公旌殊休也重以萑苻充斥荊楚傷夷遂加威望茲用底寧弓矢專征銅鹽劇任安危攸繫一以委之往哉荊渚荊渚既清又徙金陵金陵以平救鄢郢之剽殘拯江湖之焚溺期月之內罔不樂康若乃考其才稽其用所至難息所施利興智無不周技無不達韜鈐捭闔固自生知詩禮幾微雅當師道雖羽書疊至應用如神加以詞鋒莫前筆力遒徑屢獻平戎之策每陳憂國之誠抑又城府坦平器宇沖邃祿利不盈於私室夙宵無怠於公家假熲在邊未嘗蓐寢八羊侃待士靡顧囊裝崖岸不可得而臻波瀾不可得而際矣所謂社稷柱石川嶽英靈者也則知駢如何臣城如何功嗚呼天贊其謀地襲其固非吾君不能用其才非臣誠不能就其事故曰為可為於可為之時則勳乃見城由駢而成駢由君而聲城既牢矣人既休矣宜乎讚盛德之形容敘勳賢之丕烈恭以操觚載事作者為難臣非其人何以稱此將欲刊諸貞石置彼坤維垂於無窮期乎不朽屬詞愈拙染翰增慚銘曰惟蜀之疆擁抱岷梁斗絶諸夏裂為一方啓達上國肇自秦強壯者五丁導彼青冥鑿巖而梯飛棧以行動猶鳥逝舉若猿輕漢人既遷言語乃通眇邈千祀遂參華風界彼卭滇靡設鍵關在古侵殘為蜀之艱唐被聖德間仍凶慝猖狂逾紀吞噬無已芟獮楚驅氓不寧居皇帝踐祚驚嗟震怒爰擇藎臣推轂以付時惟燕公撫俗訓戎碩畫宏規神輔其衷經始新城心術濳形乃告編人版築云興相彼井廠墨觀於封部謂茲郡邑量其戶賦劃界指期莫敢踰度蜀人未安待城以歡蜀士方危待城而威阡陌繩直門閭棊布外聳風雲內扄貔武卉木蔥蒨麗譙輝映戎馬夜寧戈鋋晝靜蜀山嶅嶅蜀江滔滔寇不敢窺人不知勞險而不煩峻而不譁去來出入嬉嬉一家燕公之德其誰與鄰燕公之功式利於人德入人深功流不極勒名天隅為臣表則中和四年記昨者狂寇將逃延災方甚而端門鳳峙鎮福地而獨存王氣龍盤鬱祥煙而不散足表宗祧降祉臨御非遙今雖初議修崇未全壯麗式示卑宮之儉更凝馭道之尊且肅宗才見捷書便離岐下德宗雖當盛暑不駐漢中故事具存昌期難緩願回鑾輅早復京師臣謬以散材叨膺重寄閉閣深念拜章屢陳審時事之安危繫廟謀之得失臣雖隨宜制置竭力撫綏如或鑾駕未回必恐人心復散縱成微效終負殊私勢有必然理宜過慮以茲淹駐轉失機宜實希永挂宸聰亟還清蹕臣聞量才授任本切於安人奉上推忠莫先於體國臣早逢昌運備歷華資止仗竭誠幸無躁迹六年內值雖叨待從之榮一日台司未展匡扶之志敢忘急病用副憂勤况重鎮兵符元戎相印特膺寵寄出自宸衷豈合憚勞更陳衷款但以鄭昌圖主留纍月將結深根孟方立專據三州轉成積舋招其外則潞人胥怨撫其內則邢將益疑禍方熾於既焚計奈何於已失須觀勝負乃決安危欲遵命而勇行則寢興百慮思奉身而先退則事體兩全伏乞聖慈博求廷議擇其可付理在從長免微臣負懷寵之譏使上黨破必爭之勢觸藩知難庶無愧於前言報國圖功豈無伸於此日恭伯大中時人大中戊辰歲帝命侍臣梁公承乂護軍戎於壽陽郡其至之日乃言曰茲地之廣控淮肥之川壓荊楚之要兵多而稼稀俗薄而人囂非通於吏理者曷能保和之今常待渾公政成而理平俗泰而人安消災沴為和氣變凶荒於壽域上下胥悅人其泰寧公之致政也如是我之撫戎思有其力乃曰士卒之有貧者若吾之不足於身也有不安其居者若吾之無其室家也顧力無以恤將何以字之不欲勞於下而成已之私害於人而就已之欲雖有經度何成厥功忖度日深乃得其畫曰廢寺之材年久而腐用無所堪我將析而為薪以貨之於是得錢六十萬置樓邸於旗亭之衝歲收其利以助用托拾其餘貨以創軍營二所度木於山價必賤鳩傭於外賞必厚就使以悅人忘其勞量其有無節費就省減私儲而足食添月俸而酬工率已儉身乃著成績士卒之富者樂其業貧者安其居歌謠喧愈令美充塞公曰軍旅之士既安且寧吾之署曹宜革其舊乃恢其垣墉高其閈閎崇廊四注以回合層構中開而崷崒易隘陋為輝煥化卑庳為宏敞浹旬之間創制斯成揭焉中闢豁若天造完葺既備周視其間曰水程無送迎之所何以遲嘉賓而申揖讓之禮是乃擇勝概之地立遊觀之亭斬伐而奇勢出芟夷而佳景見南軒翼舒飛陛雲聳導流泉於砌下植嘉木於庭中遙峯謺嶂屏列在目郡邑之人日遊其下輪迹荐至不絶於路是知茲地自然而生其為景象也因公而成以為廢興在人而不在時在於營構出我心匠以其介直聞於時創制也勤而功不宣威以役人不徇已以使下郡邑不擾而厥功成其大將官僚纍而請曰公之撫戎也三年而人無犯於今朝闕有期再欲陳乞保留周歲以副㣥心常侍公乃拜章上聞允叶誠請俄而天書下降褒贊其功詔曰委以腹心是資信實有勞可獎即懋新恩宜加內府局令歡聲溢衢遠近咸慶遂使覩事者增榮聞風者益勸公之才識敏達恪勤公忠猶居外藩未展寵略付之戎旅可以夷靜邊塵委以中樞可以肅整天禁而今而後必見大用之有期矣恭伯幸以筆札佐於常侍公之門日熟政能觀其成績顧惟不敏敢不承命而書大中五年正月二十四日記琮大中時官中書舍人鍾陵問俗澄清之化靡聞南海撫封貪黷之聲何甚而又交通詭遇溝壑無厭迹固異於淡臺道殊乖於吳隱鐸字昭範宰相播從子會昌初擢進士第纍遷右補闕歷中書舍人禮部侍郎咸通十二年由禮部尚書進同中書門下平章事乾符六年以行營都統督諸將討㣥盜兵潰貶太子賓客分司東都召拜太子太師從幸入蜀拜司徒門下侍郎平章事中和二年以義成軍節度使復統行營兵討㣥盜為田令孜所構罷為義成軍節度使四年徙義昌過魏為樂彥禎子從訓所劫遂遇害敕朝散大夫尚書水部郎中穆栖梧等渙汗鴻恩必乘其雷雨頒宣爵賞用振其簪纓以爾等列我聖朝纍霑霈澤各有勞效許其敘録行慶策勳於是乎在可依前件處約大中朝官司勛員外郎知制誥李㣥玉放懷邱壑吟詠性情孤雲無心浮磬有韻吐妍詞於麗則動清律於風騷冥鴻不歸羽翰自逸霧豹遠迹文彩益奇信不試而逾精能久處而獨樂念其求志可以言詩用示縶維命之刊校可守宏文館校書郎為大中時進士璧為至寶握以藏輝與似月之色異俾如虹之氣微斂外之容豈曰置豫於暗元中之理尚乎知我者希故其性比內融迹同反照拱形若將乎尺素點影似因乎墨妙見心之後任欲蓋而彌彰窺指之間縱有光而不耀退雖於密德亦不孤方期發色於斯矣豈務掩瑕而已乎初疑捧匣將投尚韞如漆或若橫肱未抵已怪得烏懿夫藏點點而獨青映纎纎而有象或微疑其手澤竟空勞於目想同錫元之後不暫去身驗守黑而居則先指掌不然何以久而不磷敝而惟新雖未能如雪亦足以賤珉既剖乎石幸依乎人似守中而隱影若居外以藩身攬之為盈手之玩出也為連城之珍圓而琢之而能全璞溫而執之何以不濯雖默默而沉濳每熒熒乎把握始同乎懷而被褐恐久而袖化為緇雖存已之雕鏤實賴君以保持言揚者或是色取者猶疑苟能執而無失豈得棄之如遺深濳越石之拳明則誠矣固望荊山之目默而識之斯蓋見美一時同珍百代諒閟兮懷寶多斯兮若昧幽矣握中之璧實清流而可愛仲春上日率公卿大夫朝日於東郊祇祀畢太史進曰夫日統七紀周旋天地國家災祥之至也惟唐文明日德不愆今陛下又親設弟禮天下煥爛上曰朕不足以配日然國經在乎上爾即司之於日有見可使朕聞之乎太史曰臣聞天高無程日為大明天為至陽日為陽精則日於天為子象也在人為主在天為日其高明一也日之初將出兮東方霍爌烘煌地外泄光陰雲含明閃閃熒熒火炬縱橫漸高如懸或若挽上於天而傍倚諸山海水血色龍魚騰翻上浮焦煙創業之象也日之中聚焰成珠攢劒成輪青天而白白雲而赤赩赩奕奕曾不得定目太虛為之晃惑萬物依乎地無不自識太平之象也春之日蔥蘢通曨霍爍晴空赫為大笑滿天地喜江風晴起錦文出水采錯斕斑花樹之間新蕊粉融萬燈無煙一拂雕梁嬌霞溢乎殿堂繢壁連光溫焰生旁仁恩之象也夏之日烘彤坌勃六合焚炙風不能為氣天地變色不勝其猛乍搖紫影所照之穴化為火井草木如燒而未乾焦泉池如炊若將涌沸炎威逼人疑欲附地或透入室壁濳蒸簟席威怒之象也其於小則草芥遊蟲戶網隙塵各示其容其為大則東而引千萬里不見其近出西而引千萬里不見其遠及將暮也爍乎而低淡乎而頽忽乎變容赤蓋下空埃塵濛籠渾渾黃黃漸無精光黯黮殷顏不留山巔即墜乎窮泉丹霞染雲焰焰半天暝陰夕靄薈蔚霮䨴餘光無采暫明乎千里之外烏鵲尚鳴新月巳生長夜自清今昔頓成良可悲乎夫日之不永也甚矣人之言卯比及看巳可食人之言午比及看巳欲昃是故聖人寸陰而惜願陛下朝視之思創業之難暮視之感淪革之易春夏視之調喜怒之節中視之將偃乎太平之地又何求焉臣又聞之聖人為君日祥屢臻五色日昱日昱天地同文昏弱之代吞蝕不暇列宿不沒晝而為夜可不務乎故天有日不能自靈日有光不能自明待聖人而明之也有和氏兮曠代之珍有藺生兮非常之人全重寶以藩趙在輕生以抗秦既獲我心信卓哉於千古不辱君命能使乎於四鄰相如於是詠東山之詩考西郊之役巾車脂轄匪朝伊夕徘徊悵望沉吟感激誓殺身而報主欲張膽而吞敵蹈虎尾而若間遇鯨口而無惕期一言以復命得連城而致璧苟大信之或虧豈微躬之是惜授使遄征不遑底寧望紫氣之函谷出黃沙之井陘既臻天府之地遂造雲龍之庭秦君方臨丹陛按青萍耀國華振朝經建翠鳳之旗則天收光景伐靈鼉之鼓若地出雷霆然後命謁者先告令使者後進將恃威以逞暴欲愛寶而損信曷英勇而知機弗詭詞以恭順溫如之質既美嶷然之姿乃振且勍敵之見欺將殺身而不吝西鄰之言是責南山之節斯峻何大國之無良為匹夫之取俊不然者何以遭賈傅之過秦為相如之慕藺連城棄諸良玉歸歟且告秦言巳矣復為趙寶焉如潔誠求之何晚被褐懷之巳遠生芻之質空存白虹之氣不返汾大中十三年進士屢擢兵部侍郎以討黃巢功轉信州軍押衙都團練討擊使檢校國子祭酒兼御史大夫尚書右僕射鎮守饒信二州文德二年進闕一字南節度使汾自大中巳卯登科以來官至兵部員外郎咸通三年遷本部侍郎出闕河南招討使乾符二年黃巢起兵應王仙芝四年巢寇河南汾屢戰斬其前鋒諸將賊遂敗衄五年會元裕斬王仙芝於黃梅巢方攻亳州汾帥衆直抵城下賊遂引退會尚讓帥仙芝餘衆歸巢號衝天大將軍引兵南寇福建汾勦追之巢又自嶺南趨襄陽汾出師間行巡荊門會父劉巨容曹全晸亦合軍待焉俱以兵伏林中賊至伏發大破其衆斬俘一十七萬巢與尚讓收餘衆渡江轉掠饒信池宣歙杭等十五州廣明元年十一月巢陷京師車駕幸蜀中和元年三月汾轉京城四面行營招討使巢遣其將尚讓王播帥衆五萬寇鳳翔汾與都統鄭畋唐宏英等勒兵待之大破其衆於龍尾陂斬首二萬級伏尸數百里中和二年八月汾轉信州軍押衙團練討擊使銀青光祿大夫檢校國子祭酒兼御史大夫上柱國尚書右僕射時饒信經巢兵火餘民不聊生汾一意撫恤親加勞問簡徭役寬賦稅民賴以全活者甚衆四年六月巢圍陳州汾會李克用至遂去趨汴克用追及中牟大破之讓率衆降汾與李師悅率尚讓追勦餘衆至虎狼谷巢甥林吉斬巢兄弟妻子首獻以降由是巢禍既滅汾再戰再克十無一失蒙詔鎮守饒信二州連年不得回朝汾遂寓居廣信路弋陽縣歸仁鄉四十六都新陂里夙夕感激視干戈則思鬬居村落則思耕光啓二年佃得荒間山田一段約計八百餘畝名曰南山坐落饒州路樂平縣歸桂豐樂二鄉居崇山峻嶺之間人境寥絶東至弋陽高界培分水為界西至豐樂風門嶺洪鶴山嘴為界南至歸桂鄉東源坑合水為界北至豐樂鄉紅鶴山盤嶺分水為界四至分明源頭塢尾上嶵下坳與外並無一毫之間其田地成者少荒者多召人勤力其中儘一夫可受屢次召佃耕種俱各辭以不能汾起微陋致身榮顯忝有九妻曰鄭氏贈信國夫人曰鮑氏曰宋氏曰王氏曰馬氏亦贈夫人曰張氏曰郭氏曰李氏曰武氏俱有淑行生子十有四人曰興曰升曰從曰明曰宗曰瑞曰廣曰匡曰勝曰吞曰英曰寧曰彬曰平此豈非荷祖德哉又且連年奉詔征討百戰百克未能一歸故土於祖宗之德並無寸報久違春秋二祭文德元年汾謹將前山田地施捨創立禪寺一所名曰南山寺召到屬郡鄱陽北隅妙果寺禪僧至明至公等五人入寺住持勤於開耕守奉祖宗春秋二祭及禮三寶慈尊兼得利生益死景福元年佛殿觀音堂坐禪亭并東西廊房俱克完焉已經奏達朝廷念汾忠孝詔曰汾戰陳能勇思祖能敬其山寺稅糧俱沐優免故寺曰南山七詔寺菴曰大赦菴二年汾又進疑南節度使銀青光祿大夫檢校尚書右散騎常侍右千牛衛上將軍兼御史大夫上柱國右僕射汾念纍荷朝廷詔赦蒙恩不淺於是將本身居官政事緣由施山創寺事實録作二本一以垂之家譜以警後人勿墜吾志一以給付僧人收管山田凡諸僧人在寺住持務要各守本分不許貪花好酒妄將田地移丘換段及盜賣等情其山巳有四大界至諸人不許侵占第僧衆務要常守清淨奉禮三寶其常用食物銅鐵器皿俱各完全不可遺漏如有此等僧衆即便賠還所建三寶殿觀音堂坐禪亭及東西廊房四時俱檢看漏爛即行修禮不可怠慢亦且吾家子弟不許常行到寺需索酒食遇春秋二祭止許二三人到寺拜謁祖先即返不許動騷常住自茲之後僧衆不從吾言者即便斥退吾之後人不從吾言者定準不孝論故書是説以為砧基之本云殷大中時鄉貢進士官同官令釋垂範忍辱為戒空寂為體求而非真智而可識不遠不疏志之奚有了了雪山我佛當其諭道白馬金字闡於巨唐粵以有京兆人者堯之苗裔生雩國南門外村里簪組繼迭闕二字飭躬馨香內外逮三千餘祀俄扇雩西方之盛降茲吾師師始齠齔闕一字邁人表未登十歲緩集同年生陟一基而以敷足嶷然旋吐大乘之法闕三字瞻善男子善女人無間大小奔而趨而虔心諦聽一演而伸衆闐闐而闕一字舞之忘親愛而自聳復次立機運巧指事成績洞然些有祥瑞連縈龍闕二字力矻矻其異不一實可繁詞弱冠師之兄有軍旅之患欲赴跪而啓父兮母兮厥而賡去允斯所命被甲鎧汪汪執戈慷慨逼至魚麗勝而多捷卓爾哉出㣥隱而靡究慈惠霑濡一帥之卒渠百結師補綴焉渠有咎酷笞刑師受笞焉負薪爨火汲水燃之渠盥濯師之躬焉渠役烽火遊外師之當焉昔魏禪師師主也異日倍吾之日臨流未濟杖之功登嶺有去虎之妙哉員來婦人有一子求之闕一字斜睞擲於急流中而復見乃是宿根深債歷縣側因睹畋獵化闕一字公闕一字龍盛與屠沽豪士交會因勵承勵而息心歸依師之門人動意尋五臺靈境欲覺疑菩薩給五銖道糧乃失師事今有秦人王元順承家穆穆文武潤身在世有濟拔之惠效主懷歲寒之心殷師之裔孫也巳履儒迹心達彼岸每耽儒典之暇劇趣真心師之聖實非翰墨之所能飭寬大中時官陽翟令穎水濱有地可以覽山川之秀者九山祠在焉西北缺餘豫升之見穎水直北劈地而來砉如隙光端如匣劒視若中面使人毛磔又見太室與大隗等列領㣥峯而來崒屹不得進蹭蹬郤倚三十六嶠若立指焉而近北左手煙雲草樹濃淡覆露各盡其態平視之令人意遠超超然若萬里之鶴也豫曰可樹亭哉遂召匠氏授以程度匠氏曰諾退而有言曰假吾令不德主未聞惠人未蒙仁止其幾而遽以庥覽為懷乎豫聞之甚羞而以為不聞也夫陽翟自穎陽達許昌皆漢郡穎川屬是乃吾土也豫不肖假長於此雖獲戾於人而不避者吾將識其來乎及成會邑中彥髦以落之中宴客有舉爵而稱曰吾斯山河之秀可與峴首爭請名之穎亭遂名之若使解攜手值良辰嘉賓二三殽酒緩進既揖既抗對之益酣因書石以介其壁俾覽者懲之當敏樹政無敏樹亭以釣匠氏之意也㣥玉字文山澧州人以裴休荐徵拜校書郎草澤臣㣥玉言臣宗緒凋淪邱山賤品幽沉江湖分托漁樵伏遇皇帝陛下運屬升平率土歡泰沐雨露亭育之化在薰風長養之間願同率舞之誠遠逐越裳之貢頃以鼓腹勳華之代怡情林阜之隈涵咏皇風殆忘仕進以至年踰不惑疴恙暴侵但慮寒飢江湖之濱與枯魚涸蚌為伍瞑目黃壤虛謝文明是以徒步負琴遠至輦下謹捧所業歌行古體今體七言今體五言四通等合三百首謹詣光順門昧死上進伏以卿雲在天草木五色廣野之氣燭為祥煙熙熙含生盡躋壽域向日亭午物無斜陰而方今風后提衡庶尹咸乂言語侍從之列皆嚴徐班馬之倫凡在墨客詩人歌咏聲名文物不暇何議諷刺興於筆端臣所貢前件歌詩以居住沅湘宗師屈宋楓江蘭浦蕩思搖情蕪纇之餘過於喬野天津不到徒窺星漢之高滄海攸歸豈阻潢汙之陋然則爨桐不爆俄成曲突之煙埋劒無光永作幽泉之鐵巴濮下調塵觸天聰螻蟻之微伏待刑戮謹拜表陳獻以聞無任焚灼隕越屏營之至臣㣥玉誠惶誠恐頓首死罪謹言
