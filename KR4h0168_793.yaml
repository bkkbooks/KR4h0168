  text: 全唐文欽定全唐文卷七百九十三徽字昭文京兆杜陵人大中十一年登第乾封初纍拜中書舍人賜金紫遷戶部侍郎學士承旨改兵部轉尚書左丞廣明元年以戶部侍郎同平章事黃巢入潼關汙賊偽命乘間奔河中授兵部尚書京城四面宣慰使以收復京師功加左僕射光啓中領昭義節度使充大明宮留守京畿安撫制置修奉使進檢校司空御史大夫權京兆尹纍為太子少師貶集州刺史沙陀逼京師召拜吏部尚書封琅琊郡侯襄王熅僭號迫作誓牒徽托手疾不署熅平授御史大夫復拜太子少師昭宗立授吏部尚書進右僕射大順元年卒贈司空諡曰貞
