front:
  text: 全唐文欽定全唐文卷二百七十九翰官朝議郎行右拾遺
  hash: sha256:1a272915fd7c66ffb007fb11917a00ca898d182452c2348608db58523ec24b14
  markers:
  - {type: head, offset: 14, content: 靳翰, id: KR4h0168_NFKB_279-h1, level: 1}
body:
  text: 君諱元感字達禮吳郡吳人也昔者舜嗣堯歷協帝初以闢門田育姜姓賓王終而有國其後俾侯於陸開錫氏之源作相於吳纂承家之祕元德之緒莫京於代曾祖慶梁官至婁令入陳三辟通直散騎侍郎皆不就祖士季陳桂陽王府左常侍隋越王府記室皇朝太學博士宏文館學士父謀道皇朝周王府文學詳正學士並茂稱奕代餘慶資身擢慧葉而增芳飛靈波而益濬去官辭辟語默稱賢函席曳裾文儒繼美君生而敏慧長而溫良識清朗而惟深體矜重而不野宗族愛而加敬鄉黨狎而愈恭始以資宿衞解褐韓王府參軍事以丁憂去職服闋值國討狄軍出定襄戎幕擇材君為從事文武吉甫斯人之謂歟尋為婺州龍邱丞贊貳有能風俗時變遷睦州建德和州歷陽二縣令育人去殺訓物齊禮子游絃歌武城歎其焉用仲康鳥獸中牟稱其胥及尋加朝散大夫除黃州司馬到官未幾以神龍三年七月二十日遘疾而卒春秋七十有五天不與善神無福謙不其悲哉粵景雲二年三月初一日葬於崑山禮也初文學府君以善班固漢書勅授舒王侍讀君少傳其學老而無倦此易所謂幹父之蠱詩所謂聿修厥德者也嗣子南金等哀號罔極孝思率至卜兆是營封樹特永憂陵谷之變託詞頌休銘曰簫韶儀鳳觀國賓王我祚光兮東有齊土南入吳鄉我族昌兮自君嗣業履素含章我譽臧兮內遊藩邸外掃戎場我才揚兮為丞與令化洽三方我人康兮天子命我我朱孔陽佐乎黃兮美志未極盛圖云亡訴穹蒼兮碩德休問地久天長永無疆兮萬鈞尚睿宗第四女永昌公主拜駙馬都尉祕書少監上闕三字天闕一字我闕一字唐闕二字聖為闕一字天下闕二字睿宗有闕十字我闕四字二后闕一字地中闕三字誕闕二字一為王二為主公主諱華字花婉世祖神堯皇帝之元孫睿宗大聖真皇帝之第四女今上之仲妹也母曰肅明皇后劉氏肇開湯沐冊號永昌後廼相攸降歸於鄭時年一十有七闕一字猶闕三字既嫁闕一字象歸妹闕一字作嬪之養築以外館錫之美邑食封一千四百戶置邑官焉開元初加崇代國長公主植性而智因心則靈道亮於懷色溫於貌美髮可鑑素闕三字惠聲闕二字仁澤潛揚言有餘味情無近屬服慈友敦孝敬昔在諒闇殆將毀滅聰明銳澈韻清慮遠耳目所經無不諷誦謐恬睟融融如也每樗蒲簸闕一字碁闕一字於盡得妙微至於箜篌笛琴搊琵琶七弦阮咸箏隔簾闕一字之隨手便合有若天與寔同生知冰碧在躬學無不通聰捷若神聲皆絕倫騁蕙心以闕一字巧闕一字變闕一字而添闕一字內範一部尤皆精鍊晝恒不寐留情翰墨書薦福寺經柱三百餘言拂石雲散垂鈎露凝兔轉仙毫初從夜月麝霏烟墨盡落天花初則天太后御明堂宴聖上年六歲為楚王舞長命闕三字年十二為皇孫作安公子岐王年五歲為衞王弄蘭陵王兼為行主詞曰衞王入場咒願神聖神皇萬歲孫子成行公主年四歲與壽昌公主對舞西涼殿上㣥臣咸呼萬歲蒙自奉朱顏卅餘載洎乎暑月衣服如賓讌婉之情不以天闕一字見棄闕二字何幸恩遇彌深男二女四教之以德長子左贊善大夫聰聰為吾耳次子右贊善大夫明明為吾目明使海內見聰使天下聞於國忠於家孝合則雙美闕一字為闕二字傳云以德命為義也聰為駙馬都尉恨未親迎長女闕一字范陽盧氏有肅邕之譽二女琇博陵崔氏資明豔之容三女璜范陽盧氏多慈孝之美四女闕一字太原王氏闕一字純粹之行勗之曰玉以比德四合天則洵翳瑤彩式昭供事懋乃衷潔作吾女儀逮乎晚年歸心聖域六齋蔬食二時靜念闕一字誦金剛經兩部闕一字華嚴八闕一字卷寶積一百廾大般若六百法華藥師大集等經領晤了然色空不著撤聲樂投珠罽十有餘年矣又於僧義福跪受禪觀又於金剛三藏受陁羅尼灌頂是相非相以心照心逍遙真宗寂歷虛景去年忽謂蒙曰昨夜夢念珠闕一字斷急手自拾一個不得是不祥他日又夢入法堂見一空座有人指之此四公主座恐明年闕二字乃後數月偵其儀刑稍稍顦顇以開元廿二年六月廿闕一字日熱然不食安寢不起神氣晏如有同入定聖上愛切同生倍闕二字念內闕三字中人饋藥朝觀夕察有加無瘳蒙泣而諭之久作兜率天業正念莫散勿顧男女荅蒙自解在也未去莫不闕一字又向尼梵海云生則有死不如不闕三字失闕一字奴每讀經徹卷闕一字發願願生第四天闕一字和先許奴不闕一字罪翌日勅使來問口自附奏在上千萬珍重深憶在上為人時孝順闕一字業精神錯亂言語不得合掌奉辭至其日闕一字衆忽云有勅使闕一字索香水頮浴於正寢而寐齋時炯然開目告別諸王公主及諸親等相府闕一字大內闕一字及一切總放不情願者於諸莊安置先是司農小兒亦准此家生者不在此限品官給使放歸上臺封分一半施寺觀家餘平分與女請陪葬橋陵不得厚葬莫著金銀銅器執蒙手曰恩愛斷也有不是處莫怪更枉辛苦屋裏人去去年少在莫更請出家蒙送奉一杯水別飲畢長逝詞采清明宛若真訣以其月廿九日薨於河南修業里第享年卌八初公主禮導善寺尼慈和者因說彌勒宮事云阿婆未成更十年不知計至薨日今正十年嗚呼報應之兆有期闕一字眼之言何驗下生輪王之室還上天宮嬉遊正遍之門是登圓闕一字皇帝輟朝三日使尚宮弔祭賜衣五十副所緣喪葬官供闕一字作闕四字監護永穆公主及駙馬王繇同安王洵送往并為寫一切經以其年十二月三日陪葬橋陵孝也天常與善茲言妄作曷殞濃華遽凋繁萼闕二字宵傾嚴霜夏落闕一字縈紆其如慕悲展轉其奚闕一字嗚呼月辭天闕兮星沒皇宮翟服褧衣不可逢花飄粉田兮葉萎沁水油軒畫闕一字長巳矣嗟乎蒙闕二字膺闕一字門流涕容儀既闕一字錦茵期憑夏屋闕一字封闕二字儼設楚挽齊引驪駒啟行丹旐赩空素衣皓野撫靈軒而增慘仰空山而泣血夫敘德必近闕一字親議賢闕一字崇乎直既親且直蒙何愧諸敢述流芳悲題翠玉其詞曰於爍有唐系乎天光承天者帝嗣帝稱皇猗冄昭闕一字作皇之對厥生貴主為天之妹天妹伊何窈窕如玉浹洽恩被綢繆禮縟道賁娥英德光宵燭其行成軌其言可服烝烝孝敬抑抑威儀九族敦敘百禮罔虧學非從傅書乃臨池歸真捨逸了靜絕為曰仁者壽天何不諒指座先徵遺珠見相殷勤自勉諈諉無忘闕一字匪憗留罔然遠颺帝心悼惻傾家殞喪大匠監供闕一字王送葬蒙也何罪忍奪天人借如可贖願百其身穠李萎曉卄華祕春金剛罷焰玉座生塵馬鬣成封龍輀即路畫翣扶轂丹旌指墓闕一字薤挽於霜飇闕一字笳簫於隴霧霜飇隴霧相披紛薤挽笳簫咽不聞珠襦玉匣盡元夜軒后陵邊皇女墳虛受元宗朝官諫議大夫充宣勞使伏見市井用錢不勝濫惡有加鐵錫即非公鑄虧損正道惑亂平民銅錫亂雜偽錢豐多正刑漸失於科條明罰未加于守長帝京三市人雜五方淫巧競馳侈偽成俗至於商賈積滯富豪藏鏹兼并之人歲增儲蓄貧素之士日有空虛公錢未益於時須禁法不當於世要其惡錢臣望官為博取納鑄錢州京城並以好錢為用乾曜相州臨漳人舉進士景雲中累遷諫議大夫出為梁州都督開元四年拜黃門侍郎同紫微黃門平章事八年加銀青光祿大夫遷侍中十七年遷太子少傅封安陽郡公十九年卒贈幽州大都督夫聖王之教天下也必制禮以正人情人情正則孝於家忠於國此道不替所以理也故君子三年不為禮禮必壞三年不為樂樂必崩是以古之擇士先觀射禮以明和容之義非取一時之樂夫射者別正邪觀德行中祭祀辟寇戎古先哲王莫不遞襲臣竊見數年以來射禮便廢或緣所司惜費遂令大射有虧臣愚以為所費者財所全者禮故孔子云爾愛其羊我愛其禮今乾坤再闢日月貞明臣望大射之儀春秋不廢聖人之教今古常行則天下幸甚臣竊見勢要之家併求京職俊乂之士多任外官王道均平不合如此臣三男俱是京任望出二人與外官以叶均平之道惟顏亞聖惟閔比德讓宰善辭安親順色闕一字靜無閒中正是則非經即禮至孝之極好禮貝州宋城人舉明經累擢侍御史開元中轉邠王府長史遷豫州刺史累徙溫州別駕卒臣嘗聞禮記曰父母之讎不共戴天公羊傳曰子不復父讎不子也昔齊襄公復九世之讎丁蘭報木母之恩春秋美其義漢史稱其孝陛下既不以齊襄為法丁蘭為戒豈得欲以武氏為國母當何以見天下之人乎不亦取笑於天下乎非止虧損禮經實恐汚辱名教又惠妃再從叔三思從父延秀等並干亂朝綱遞窺神器豺狼同穴梟獍同林至如惡木垂陰志士不息盜泉飛液正夫莫飲良有旨哉且匹夫匹婦欲結夫妻者尚相揀擇況陛下是累聖之貴天子之尊乎伏願陛下詳察古今鑒戒成敗慎擇華族之女必在禮義之家稱神祇之心允億兆之望為國大計其在於茲且惠妃本是左右執巾櫛者也不當參立之數春秋書宋人夏父之會無以妾為夫人齊桓公誓命於葵邱亦曰無以妾為妻此則夫子恐開窺競之端深明嫡庶之別又漢成帝欲立趙氏為皇后劉輔極言漢桓帝欲立薄氏於中宮李雲切諫又見人閒盛言尚書左丞相張說自被停知政事之後每諂附惠妃誘蕩上心欲取立后之功更圖入相之計伏願杜之於將漸不可悔之於已成且太子本非惠妃所生惠妃復自有子若惠妃一登宸極則儲位實恐不安皇太子既守器承祧為萬國之主本何可輕易輒有搖動古人所以見其漸者良以是也昔高祖以戚夫人之故將易太子之位時有商山四皓雖不食漢庭之祿尚能輔翼太子況臣愚昧職參憲府慷慨關心感激懷憤陛下留神省察客有問於主人曰地官徐員外何如也荅曰守道君子也客曰徐公明識誠難為儔也何不稍圓通以協隨時之義而取富貴乎何為固守方正乖相時之道幾致死亡者數矣此豈大雅君子全身之義哉荅曰夫隨時相宜而取富貴凡情所曉徐公豈不達之若徐公者仁人也夫仁者濟物也此道大矣非常人所知故孔子曰有殺身以成仁無求生以害仁徐公之不愛死亡固守誠節用此道也豈以貴賤生死而易其操履哉問曰仁則信矣忠則如何荅曰豈有仁者不忠乎當今帝德文明憂勞庶政思致刑措以隆中興徐公獻可替否盡忠盡節誠欲戴明主於堯舜之上置蒼生於大道之中事跡顯然有識同悉子何疑而問哉客曰鄙人固鄙不閑大體忠則信矣孝則如何荅曰豈有忠臣而非孝子也孝經曰君子之事親孝故忠可移於君立身行道揚名於後代以顯父母今徐公之名聞於四海有志之士莫不增氣豈直揚名亦永錫爾類矣禮曰大孝揚名徐公之謂也問曰徐公之道既高矣何為暫處霜臺即奏天官得失榜諸門以示天下規規然是釣名耳其故何哉主人胡盧而笑久而應之曰子徒見培塿未覩泰山乎夫天官者奔競既久濫進宏多選司權輕且未能止此弊之甚也徐公既處霜臺以澄清為已任切於救弊急於為善此徐公之情也以為釣名可謂不知言矣客有慚色問曰此人當今可誰與比荅曰宇宙至廣人物至多匿跡韜光者固有之矣僕寧敢厚誣天下之士乎若所聞見一人而已當於古人中求之問曰何如張釋之荅曰釋之為廷尉天下無冤人此畧同耳然而釋之所以者甚易徐公所行者甚難難易之閒優劣可知矣問曰張公徐公皆是國士至於斷獄俱守正途事跡既同有何難易荅曰張公逢漢文之時天下無事至如盜高廟玉環及渭橋驚馬守法而已豈不易哉徐公逢革命之秋屬維新之命唐朝遺老或有包藏禍心遂使陶公之璧有所疑矣至如周興來俊臣者更是堯舜之四凶也掩義隱賊毀信廢忠崇飾惡言以誣盛德遂使忠臣側目恐死亡無日矣徐公守死善道深相明白幾陷囹圄數挂網羅此吾子所聞豈不難矣易曰知進退存亡而不失其正者徐公得之矣客曰若使此人為司刑卿方得展其才用荅曰吾子徒見徐公用法平允即謂可置司刑僕觀其人固奇士也方寸之地何所不容者其用之何事不可豈直司刑而已哉客曰今日聞吾子議知徐公之令德未可盡言乎固知君子之道非小人所測也嵩左僕射宋國公瑀曾孫景雲初擢殿中侍御史開元十五年為兵部尚書河西節度使封蘭陵縣子以破吐蕃功加同中書門下三品十七年兼中書令加金紫光祿大夫進封徐國公二十四年拜太子太師天寶八載薨年八十餘贈開府儀同三司伏見所司奏今年祥瑞祥風起日抱戴嘉禾秀芝草生甘露降醴泉湧木連理瓜同蒂竹再生李成實馴鳩元鶴慈烏鶺鴒寶鼎魚銘錢刀甎字等二十有一事臣聞惟德感神惟祥祚聖有欲之而莫致或不召而自彰葢所謂天之輔仁福之先見者也伏惟開元神武皇帝陛下徇齊敦敏欽明光宅三靈以泰百度惟貞故感應日聞珍符歲積葢祥風者昭乎號令抱戴者表以納忠嘉禾主於同文芝草明於敬老甘露灑神靈之液醴泉發德澤之滋草木秀其地靈羽毛呈其天瑞其餘山川異氣器用殊姿舉而必然不可勝紀斯並元天幽贊黃靈合德非大聖不能降其祥非太平不能當其應請宣付史官傳於後代臣聞封巒之運王者告成當休明而闕典乃臣子之深過伏惟開元神武皇帝陛下受命繼天應期光宅垂慶雲而覆露暢和氣以生成物荷深仁時惟天道文明之化洽矣穆清之風被矣淳源既泳福應咸臻盈於天壤昭於方策葢非愚下所能頌美且天之在上日監在茲嘉大聖之神功降元符以表德恭伸昭報祗事升中古昔大猷孰先茲道臣等覩休徵以上請陛下崇謙讓以固辭事恐勞人抑其勤願德音所逮自古未聞昔虞巡四嶽周在一歲書稱其美不以為煩寧彼華嵩皆列近甸復茲豐稔又倍他年歲熟則餘糧地近則易給況費務葢寡咸有司存儲峙無多豈煩黎庶吏當首路以望屬車陛下往封泰山不祕玉牒嚴禋上帝本為蒼生今其如何而闕斯禮伏願發揮盛事差擇元辰先撿玉於嵩山次泥金於華嶽天休既荅人望見從上下交歡生靈幸甚臣等昧死敢此竭誠理在至公祈於俯遂無任悃款之至謹詣朝堂陳情以聞臣嵩言昨日大將軍高力士奉口宣俯令存問以臣私廟逼近曲江人物喧雜非安神之所許臣移轉更就幽閑又憐臣田園知無手力擬令將作與臣營造伏蒙殊渥感對交深臣叨沐朝榮獲崇私廟禮尊祖考粗奉烝嘗而地接勝游城連禁御伏以神道靜謐久議移遷豈謂理會事宜天從人願聖情下逮元獎曲成遂使澤及幽明慶沾存歿邱山易負恩惠難勝今日巳令下手移拆訖所令官作豈敢當之臣為衰老自拙將攝十數日來加風氣發動猶尚虛惙未堪拜伏不獲詣闕奉謝漼絳州聞喜人初以養不仕後應大禮舉累官兵部侍郎開元中擢吏部尚書改太子賓客二十四年卒年七十餘贈禮部尚書諡曰懿臣聞道協乾坤聖人之元德功存禮樂王者之能事故旁徵前載博考鴻名躬歷數之期遇天人之應莫不發號施令升中合符澤浸黎元以茂聲實者矣伏維開元神武皇帝陛下握符提象出震乘圖英威邁於百王至德加於四海梯航接武畢盡戎夷之獻耕鑿終歡不知堯舜之力惡除氛沴增日月之光輝慶襲休榮雜烟雲之氣色靈物紹至休祥沓委江茅將鄗黍均芳雙觡與一莖齊烈固可以稽典訓設壇場悉符瑞之美荅神祇之貺謙而不發雖在於聖心理則難辭孰違於天意臣幸遭昌運謬齒周行咸申就日之誠願覩封巒之慶無任勤懇之至謹於朝堂奉表陳情以聞臣某言臣謹案禮記春夏月令曰無聚大衆無起大役不可興土功恐妨農事若號令乖度役使不時則人加疾疫之危國有水旱之變此五行之必應也今自春及夏時雨期下人憂心莫知所出陛下雖降哀矜之詔兩都仍有寺觀之作時旱之應實此之由近日已來雨雖不多僅得下種若不勸以農桑恐棄本者多故書云雖有鎡基不如逢時言在乎時不可失也且春令告期東作方始正是丁壯就功之日而土木方興臣恐所妨尤多所益尤少耕夫蠶妾饑寒之源故春秋莊公三十一年冬不雨五行傳以為是歲三築臺僖公二十一年夏大旱五行傳以為時作南門勞人興役陛下每以萬方為念睿旨殷勤安國濟人防微慮遠伏願陛下下明制發德音順天時副人望兩京公私營造及諸和市木石等並請且停則蒼生幸甚若農業失時戶口流散縱寺觀營構豈救黎元饑寒之弊哉孔門好學文章粲然言詩屬傳師聖齊賢德不踰法人何怨天見疑夫子離㣥久焉原夫星垂梵界聖緣開萬化之先日照王宮神跡蘊三靈之始包至虛以見世象教久傳於曠劫籠㣥有以示凡法身初應於中古見神通之力廣拔苦因開智惠之門深明樂界鶴林變色觀其戀慕之心鴈塔開扉通其瞻仰之路少林寺者後魏孝文之所立也東京近甸太室西偏正氣居六合之中清都控九州之會緱山北峙亘宛洛之天門潁水南流連荊河之雲澤信帝畿之靈境陽刧之福地沙門跋陀者天竺人也空心元粹惠性淹遠傳不二法門有甚深道業緬自西域來遊國都孝文屈黃屋之尊申緇林之敬太和中詔有司於此寺處之淨供法衣取給公府法師廼於寺西臺造舍利塔塔後造翻經堂香水成塗金繩為約苦心精力俾夜作晝多寶金身之地不日就工如來金口之說連雲可庇西緣長㵎夾松柏之蕭森北拒深崖覆筠篁之冥密烟花濃靄暝下天香泉籟清音曉傳空樂跋陁息心茲地樂靜安居感而遂通境來斯證寤寐之際若有神人致石磬一長四尺規制自然聲律咸具得之河曲空聞漢使之談浮於泗濱徒入夏王之貢管絃風夜合清響於中天鐘梵霜晨諧妙音於上劫時有三藏法師勒冄翻譯經論遊集剎土稠禪師探求正法住持塔廟虬箭不居光塵易遠虹梁所指象設猶存周武帝建德中納元嵩之說斷佛老之教率土伽藍咸從廢毀明皇帝繼明正位追崇景福大象中初復佛像及天尊像廼於兩京各立一寺因孝思所置以陟岵為名其洛中陟岵即此寺也隋高祖受禪正朔既改徽號已殊惟此寺名特令仍舊開皇中有詔二教初興四方普洽山林學徒皈依者衆其柏谷屯地一百頃宜賜少林寺大業之末九服分崩㣥盜攻剽無限真俗此寺為山賊所劫僧徒拒之賊遂縱火焚塔院院中衆宇倏焉同滅瞻言靈塔巍然獨存天龍保持山祇福護神力所及昔未曾有寺西北五十里有柏谷墅㣥峯合沓深谷逶迤複磴緣雲俯窺龍界高頂拂日傍臨鳥道居晉成塢在齊為郡王充僭號署曰轅州乘其地險以立烽戍擁兵洛邑將圖梵宮皇唐應五運之休期受千齡之景命掃長蛇薦食之患拯生人塗炭之災太宗文皇帝龍躍太原軍次廣武大開幕府躬踐戎行僧志操惠瑒曇宗等審靈睠之所往辨謳歌之有屬率衆以拒偽師抗表以明大順執充姪仁則以歸本朝太宗嘉其義烈頻降璽書宣慰既奉優教兼承寵錫賜地卌頃水碾一具即柏谷莊是也迨海㝢既平憲章云始偽主寺觀盡令廢除僧善護洞曉二門遠該三行詣闕進表特蒙置立武德中寺有白雀見貞觀中明禪師造重塔之辰白雀復示見璿圖肇啟初欲呈祥寶殿纔興遽聞相賀高宗天皇大帝光紹鴻業欽明至理嘗因豫遊每延聖教咸亨中乘輿戾止御飛白書題金字波若碑留旛像及施物永淳中御札又飛白書一飛字題寺壁雲開顧鶴電轉游龍神草競秀於椒塗雲泉迥飛於錦石雕甍增耀若綴春葩金疊分輝似懸秋露天皇升遐則天大聖皇后為先聖造功德垂拱中有冬竹抽筍塔院後復有籐生證聖中中使送錢於籐生處修理陛階寺上方普光堂功德隨日修造自爾飛鳥莫敢翔集此寺跋陁疏置業造神微皇家尊崇事光幽祕珍符薦臻於動植靈應亟發於庭除累聖屬心每頒渥澤王言宸翰既疊映於雞峯寶象珠幡亦交馳於龍壑皇上睿圖廣運神用多能藉明臺之化清繹天池之墨妙以此寺有先聖締搆之跡御書碑額七字十一年冬爰降恩旨付一行師賜少林寺鐫勒梵天宮殿縣日月之光華佛地園林動烟雲之氣色漢元魏武徒衒奇於篆素鍾繇蔡邕虛致美於緗日者明勅令天下寺觀田莊一切括責皇上以此寺地及碾先聖光賜多歷年所襟帶名山廷袤靈跡㣥仙是宅邁羅閱之金峯上德居之掩育王之石室特還寺衆不入官收曾是國土崇絕天人歸仰固以名冠諸境禮殊恒剎矣高僧跋陁明三藏心禪諸門弟子惠光道房稠禪師等精勤梵行克傳勝業惠光弟子僧達曇隱法上法師等十大德亦號十英復有達摩禪師深入惠門津梁是寄弟子惠可禪師等元悟法寶嘗託茲山周大象中寺初復選沙門中德業灼然者置菩薩僧一百廿人惠遠法師洪遵律師即其數也皇唐貞觀之後有明遵慈雲元素智勤律師虛求一義洞真諦之源復有大師諱法如為定門之首傳燈妙理弟子惠超妙思奇拔遠契元蹤文翰煥然宗途易曉景龍中勅中岳少林寺置大德十人數內有缺寺中抽補人不外假座無虛授澄什聯華林遠接武星霜殆周於二紀蘭菊每芳於十步上座寺主都維冄等牢籠法藏遊息禪林德鎣神珠戒成甘露海內靈岳莫如嵩山山中道場茲為勝殿二室迴合八谷潺湲地匝貝花門連石柱妙樓香閣俯映喬林金剎寶鈴下搖清漢法界之幽贊如彼皇家之福應如此天長地久不傳忉利之宮劫盡塵微孰記鐵圍之會精求貞石博訪良工將因墨客之詞或頌金仙之德聿宣了義遠喻真空其詞曰恒沙國土微塵品類妄見飛奔正心蘊櫃昏途莫曉淨根將墜樂於葢纏若安夢寐烝哉大聖降跡閻浮潛迴寶軸廣運慈舟實無滅度示有降柔紺宮西闢白馬東流迷因慢生悟為信起玉剎斯建寶山載峙花臺竹林清泉妙水靜惟真相湛然攸止巖巖嵩嶺河洛巨鎮下屬九溪上干千仞天磴重阻仙都清竣式創招提是資誘進婉彼上德載誕耆闍傳業西土演教中華孝文申敬恩賜仍加經營宴室迥出雲霞中岳北阯嵩山西麓斜界玉池洞開柏谷紆餘崗澗連延水木鬱起旃檀云誰卜築吾師苦行清修道場勵精像宇專力經堂金界繩直椒塗水香散花有地棲禪得方解空應真默識開士乘盃遊集振錫戾止翻譯幽偈發揮妙理仙磬感靈神雀降祉運交土木代歷周隋劫火遞起魔風競吹法身咸翳淨國同隳或聞興復詎振奔離神堯應期撥亂反正皇矣覺力大宏福慶式遏醜徒聿扶神聖屢降恩旨兼敷錫命高宗時豫先后卜征亟迴雕輦屢倚虹旌巖題玉札地振金聲珍符薦至在物斯呈我皇龍興有典咸秩懿茲上界式諸神筆雲搖大圍鑾迴少室草垂仙露林昇佛日護持八正每候能仁跋陁降德稠公有鄰厥後真侶更傳了因辨才高行無替清塵倬焉梵衆代有明哲今我諸公蘊彼禪悅芳越蘅杜淨踰冰雪遠締津梁無非苦節潁上靈岳山閒寶殿秀出梵天孤標神縣芥城可竭桑田有變貞石永刊靈花常遍
