body:
  text: 漢文帝時未央宮永明殿畫古者五物兩漢故事文帝三年於永明殿畫屈軼草進善旌誹謗木敢諫鼓獬豸凡有五色物也成帝陽朔中嘗坐㣥臣於下指之曰豫慕堯舜理故目是以自况大司馬陽平侯王鳳拜舞而賀曰陛下法古為治上稽唐虞仁遠乎哉行之斯至旌鼓之屬在陛下建之而已矣至於神草靈獸臣知不日當産於明庭以彰上天之允答也微臣不勝鳬藻之忭御史大夫張忠出次而言曰斯無用之物也臣請即日圬之且是畫肇於太宗之時凡八聖矣開眼而覩之者背面而違之未聞有裨於治也臣敢為陛下條舉臣嘗聞文帝時雒陽人賈誼為博士能誦詩屬書嘗為上陳古先帝王之道漢朝正朔之法上以公卿之任無以易誼俄絳灌馮敬之伍害其賢而毀之遂疏而不信傅卑濕之國後雖徵還卒不得大用喪志而死至今負才藏器之徒猶以為憤此則善雖進而不能用也帝又降詔除誹謗之令許人言事逮中宗朝大臣楊惲蓋寬饒以譏刺辭語皆坐大辟先帝在東宮言其法太深刻中宗竟不悔此則木雖旁午人不敢書上也初元帝時宏恭石顯專權亂政前將軍望之嫉其姦邪諷上除之不從望之反罹其迫以自殺此又邪不可觸之驗也前日安昌侯禹居陛下師傅之尊不能率已以儉而乃決涇引渭廣開田疇便身娛耳多置侈樂平陵朱雲上書請斬其首陛下怒不可忍遽將誅之雲倉卒無據乃至喪膽失魂臣意列聖用此乃類是乎臣之狂瞽欲陛下言而必行丹雘之設不足以留連聖念也且大司馬親勳之望朝野所倚不能因事而諫反以為賀佞孰甚焉臣謹以指之若斧鑕將及是陛下誤屈軼也臣不敢就僇豫以尚書洪範篇書於縑素施於屋壁有客覩之而言曰此其所謂君人之大法武王所以繼三為明蓋能盡心於是也苟將諸吾君列乎鳳扆之右足以興三代之理豫乃條其事為章以奏之臣聞下言上貢各以其職儒家之流請以儒言夫彞倫九疇不可廢敘之斁之自微而彰持之一得陰陽咸賴行之一失細大被咎夫始之以五行蓋明五行所主之宜也繼之以五事為事在諸身順之則乎道故貌恭作肅言從作乂視明作哲聽聰作謀思睿作聖夫行不敬則貌不恭正不理則言不從明不察則視不皎心喪識則聽不達性不通則思不睿次之以八政教之勤以足食也教之求以積貨也教之以敬鬼神以成化也設司空主土居人也司徒教衆禮義也司寇考淫盜而原過濫也賓師以往來而防姦賊也又次之以五紀所以占日月星辰歷數之變度君理內則五紀和叶一歲之功成焉又次之以皇極所以用五福錫庶人亦天子作民父母為天下王也又次之以三德謂人君之德有三也能以正正人之曲能以剛強立已之事能用和氣以理於物皆隨義而伸道也次之以稽疑謂先占謀於龜策與人事叶吉而後歸之於正也又次之以庶徵謂風雨暘燠寒也風以動雨以潤暘以乾燠以長寒以成君尚敬則雨潤尚理則暘舒至明則燠暢能慮則寒順去察則風調疑習狂妄行過差專逸豫縱剽急肆昏暗則咸反次以五福六極謂君善茂育則人蒙壽富康寧好德終命之福死免凶疾憂貧惡弱之極也九者具於天蟠於地格於人軒昊之代君為心兆民為百骸堯舜之代君為目兆民為物三代之時君為醫兆民為疾五伯之治君為工兆民為材二漢之時君為隄兆民為水夫心治則百骸從視明則衆物露醫善診則疾不彌漸工善度則木無棄材故委心乃無為軒昊之治自治也任目必有待堯舜之治求治也醫不全則生死危三代之治存乎仁工不審則曲直乖五伯之治資於智逮斯已降民為水矣政為隄矣隄之不完水漂邑矣寖乎曹馬乃成壞衰焉嚱民不可使為水水而隄之困矣然則軒昊誠堯舜明三代仁五伯智二漢法禁人之叛也禁之以致君為敵兆民有寇讐焉有真元先生者深粹虛寂沖凝簡素故其動也則局四海而隘九垓其靜也則棲一枝而敻環堵履真守朴與物無競雖質居巖穴之間神王煙塵之表以首月元日乃蔭雲蓋濯飛流涉西岑面東陸操白簡染朱翰俯而屏息仰而起曰天蕩蕩乎蒼蒼乎固無得而稱也余有疑焉請杜其惑夫虧盈益謙天之道也禍淫福善天之察也春榮秋落天之時也晝明夜晦天之運也擊電鼓雷天之怒也蒸雲施雨天之澤也因斯以言則庶類萬物非天無以成受形育氣非天無以立大哉博哉乾之化也故書云唯天為大唯堯則之詩云謂天蓋高不敢不局易云先天而天弗違後天而奉天時是禎祥之來不誣也至於報施何乃爽與或惡均而異罰或善同而殊效唐虞慎讓祚不及子湯武逆代福垂纍世應物無親者其若是哉諂諛叨餮非貴則富廉潔貞素不賤必貧譎詐反道者曜蟬鳴佩直言順常者倳刃伏鑕悲夫何蓬蓽草萊之人遇時而為卿相膏腴縉紳之士失勢而作輿臺豈窮達之有數乎何否泰之無定也至於積德致敗僥險成功立信受尤行仁招咎者豈勝數哉或一餐莫給或萬錢頓廢或綺紈斯弊或短褐不完或黃髮未終或襁褓先斃其於平施不亦謬乎夫德合天地道濟生民而有削伐之纍貞貫古今廉稱百代而有餒絶之憂其於與善不亦過乎然負異才蘊奇調洞識幽顯智周動植而不免繩樞瓮牖糲食布衣何所纍若此之斥也夫鶚隼以摯擊為恆理不可食之以粒豺虎以搏噬為常性不可啖之以草非其故爾固性分然然則既授之以距角而責之以觸蹶既任之以爪牙而罰之以獲殺者不亦近於諂乎苟正其味則一改兩全矣化惡不知變形教善若易嗜也鴆毒害吻而裂腹虺蝮觸手而解腕然則欲其勿害也曷若勿生乎如力不能易則不可稱聖能而不改則不得謂仁匪聖匪仁將何以為萬物主也扛鼎投石者不得云不舉鴻毛竭河飲澤者不得云不盡坳水是知大既任小何以辭乎必為治其若是將恐亂之未息於是少選之間肅然若有自天而降者襜霞衣控風轡飛鳳駕拖霓旌如影如響若虛若滅乃謂余曰帝有命焉子其清耳曰一氣既分萬象云備隨感斯化生而無記故大者自大不可移之於小短者自短不可易之以長多者不覺有餘少者不知不足減之斯傷各守其貞任之自是豈較工拙於其間哉是以百足一跖其行一也六眸一目其視一也火鼠夏遊而不知其熱水草冬茂而莫辨厥寒各安所安不可易位必非其位則西施與嫫母同姿苟當所甘則竹實將腐鼠齊味各稟其性余何預焉若美則留之醜則去之其於簡也不亦勞乎若善則與之惡則奪之其於慮也不亦繁乎故任之則理息放之則無纍余以無告故能成萬物余以無心故能安㣥有是知善惡共域吉凶同貫唯爾所召誰其制之今子誚余以不治何乃爽也故不治而謂之至治夫生不余謝死則余尤榮不余善辱則余讐多不余獲少則余求不與余共樂而責余同憂乎乃愍而訓之曰若物皆然則為惡招禍修善致福徒虛言耳又復余曰何言之容易也論者多元命有定數運有常期非補養所能延非備習所能益此皆非通識不可與言道也是以不昵不義因此而行無賴無取自斯而作以之為家則家敗以之為國而國亡故桀紂志之於前而莽卓踵之於後所以覆宗絶嗣事至而不寤者良此之由也悲夫請以近小喻之遠大夫廣厦崇基人之居也褒衣博帶士之服也故栱蹉柱跌則廢而正之所以無壞傾之處領決襟汚則綴而浣之所以無穿垢之憂故能恆保其貞固常守其完潔也若傾而不視穢而不澤則坐見頽陷立視緇衊矣故修福禳災為惡敗德若聲之召響影之隨形各有主司自然冥會惡積者報速善小者應遲猶夫秋生則夏殞春敷則冬落根深則難拔器滿則易盈故不可以遠近證有無不可以賒促定虛實疑耳信目中庸尚所不免以短度長下愚固其致蔽是知朝菌不可言椿鶴蜉蝣不足語春秋况以七尺之形百年之命欲辨生於沙界語死於塵劫其可得乎然言者皆以應報與自然異此蓋思之未精至也夫所召者莫非由己所感者皆是自致萬物各有本性故因而用之耳猶藝苗蒔果初雖耕灌在功至於結實成味則非人力所為也又靈芝駐年神丹養性竟能御風撫羽陵煙蹈霞此乃功用自然者也萬象運為莫非此類終日施用不悟其理動成鋒楯不亦昧乎至於自然之性余亦不知其所以莫知所以然而然也於是言終形滅莫知所之余乃惕然恍然忘視聽若遺形骸者久之乃神魂定憂盡纍息蕩然與萬物同心不知榮辱之有異也立身之道忠孝為先訓俗之規喪紀攸重所以王祥王覽閔損曾參曉於九族傳諸萬古顧乙芳搖美箭業嗣良弓挹至孝之清猷得隨時之大義母之所好志必無違嘉旨精誠乃臻異物長江泛濫取汲何功孝情至切於求魚喪制奚遵於舐犢欲遵寧戚恐阻承顏所以僶俯於懷幽哀密念憶將雛之曲不忍聽琴對驅蚊之宵更勤扇枕眷彼純至足以揚名逝者如斯男何不弔三殤之服誠合切於哀情五禮之文貴取順於顏色既循姜詩之孝難科漢尉之刑禹貢三壤周官九賦此為古制實曰有經且四方無虞法宜仍舊三邊有備政可隨時瞻彼咸京是為上國擁山川之固護百二稱雄開井邑之菑畬什一編稅將期倉庾流衍斯箱發詠於詩人軍國豐盈盍徹見遵於有若功臣何者曾不是思忘雨露之鴻恩有違上命矜爪牙以怙寵無入國徵同彼宋人不修職貢類茲楚子闕薦苞茅罰可置於刑書訟何聽於詭說求才審官以恤人瘼施貢頒賦宜遵國章苟玷爾舊規亦荒我王度瞻彼邑宰實曰能賢物土之宜使廬井之有伍隨時改作在稅征而無差方今弓矢未櫜疆場仍駭眷言州縣尚勞其供億念茲倉庾已竭於餼牽固可當官而行慮善以動均有無於鄉黨足可安人稽衆寡於夫家是資贍國議事以制且叶於時宜執法奉公何乖於古典觀察所見理或未然請從百里之謀佇聽千箱之詠皇唐之御天下也故巍巍乎蕩蕩乎其稱也鑿乾張宇布惠露於天花拓地開寰敷慈雲於靈壽想茲仙界生生塵劫之前親比神方世世希夷之外欲升妙覺先登圓滿之臺冀去昏迷速臨具足之鏡法輪欲轉銷五蘊於三天惠燭方施照六塵於十地不生不滅舉仙掌而承空非晦非明橫法眼而度世轟轟往日瞬息而逝水千年隱隱當今倏忽而經霜百歲既勞傳火終役流烏馳白馬而西上驅騄驥以南遊曠成不二之心豈敗往來之業方便言而法敦寂滅變化說而道尚虛無至於升超銀臺當歸解脫之中蹈踐金門不離苦空之下無為之業種植而生滅不同有限之緣修飾而果因各異而乃東瞰滄波濯塵勞於扶桑之岸西矚雪嶺蕩疾疹於日浴之津南對堯峯鬱鬱而紫氣千秋北峙龍山隱隱而青霞萬道漏寶塔而終謝莊嚴暫塗丹而即隳微妙將九轉而匪益紅顏修未來而常滋正果憧憧錯轂往往稻麻空懷可作之心慙無絶哉之念粵有功德主僧守一范陽之貴胄也遠紹勝果深悟法音就五障而化導郡人戒三朋而開通庶善修法海而津梁有涯置俗流而洗心必備梯航已往舟楫未至可以雕金紀德將萬劫而無窮刊玉彰能並恆沙而莫竭記可陳之不朽永以傳之無忘其詞曰巍巍勝果廓落無邊導以業障開通有緣修善善滿建福福圓既廣心利必貴身田並其秋菊比及春蘭為已往之帆梗作未來之舟船天子朝諸侯於明堂惟古之制始以講信修睦終以布憲施惠含至德之休光旌中國之巨麗下之象地也以列五位之神上之法天也以配五方之帝稟太一之威靈順陰陽之開閉左個右個分以寒暑之宜以筵以几度以堂室之際觀乎萬國來朝威儀濟濟聖人負斧扆而南向以布政百僚端冕辨而北面以陳禮是知人以君為心君以人為體宴會之節以明於尊卑慶賜之儀以旌於孝弟原夫宅中而起繼天而作遙視嵩少俯枕伊洛巍巍煌煌厥高不可乎彌度拏龍㰇以蚴蟉亘虹梁而各落綷以綺藻施以丹雘四闥以四氣而開八窗以八風斯廓祥風布影對寶檻以交輝皎日懸光曜金牀而璀錯於是陳三獻之禮臻九成之樂申儀於辟雍崇業於太學甄古今之至理議沿襲之踳駮既而順斗極運天關皇恩普矣貴賤以頒東門之外以朝乎九國南門之下將享於八蠻正德是宏惠風斯布禁淫慝節制度重三台之任乃申命於中階寵五霸之功遂授鉞於東戶夫明堂者明帝之德體天為狀必資闡化以準程豈獨宏規而取壯出庶物而咸仰包宇宙而為量惟先聖之是則信百代之可尚行馬申儀事章恆典翰音致享理煥經書為法藉於隄防設禮光於昭穆暨將入爨有異鳳琴之鳴乙制不更遂舉鸚杯之禮但關梁禁遏本防內外之姦黍稷粢盛彌益室家之道私取既無陳請已犯嚴科薄禮即欲告言恐傷孟浪主司擒獲誠曰奉公乙弗所違理宜窮詰且法不違貴必行之命攸申禮不下庶輕重之端宜審竊尋名姓莫辨高卑請更參詳然後科結庶使西曹議獄罷雙璧之堅疑北寺平刑絶百金之奸利仰察天文俯觀地理參律呂而權度審衡平而潛擬則閏餘之數乖歷攝提之運無紀空跡馬遷之能竟絶邵平之美時運紛其鼎革禮術於焉中圯樵夫恥王道之不談天子愍挈壺之闕史乃分建斯官疇咨此職將啓閉合敘以繩平俾夙夜在公而端直於是金徒抱箭銅史司刻尊靈虯吐納之規揆抽繭高卑之力信是模範可為法則體象陰陽代為作式故雞人合唱洪殺無差鶴蓋成陰員流不息夫其開闔之勢財成之規準度毫釐之末錙銖圭撮之儀則離婁失其精思班匠亡其所為將運功於不測當稱物以平施乃若鑑持日夜書備明晦爰受授而是司考事事而必載雲物順其端序寒暑成而不昧雖未代於天工亦無預於權概能收視返聽周流六虛策勤補拙寅亮三餘校擊刁之有則均聚木之不疏察銅衡兮氣混混純積水兮來徐徐臨泉非誡危之懼巢幕寧誠安之居是使名勳合道彰國器於周書則知漏之為器其大矣哉聖人資之以端拱日月順之以行藏賢者不能減其分度智者不能損其纖芒存之則雙美廢之則兩傷是用齊天長兮地久均國祚兮無疆翩翩者鴻刷羽疏風賓燕薊之北旅江湖之中何斯禽之寡識亦陰陽之載通若乃編名漢川棲身禁籞易象嘉其漸陸詩人美乎遵渚晉文以賓客見規齊桓以君臣相許既隨軒於良吏亦銜丹於仙女其德性也肅肅習習繽繽紛紛泛濫緑水翺翔白雲飛則有貫集則為㣥跡不以沙泥自混貌不以元黃自分敏清真之不雜同朴略之無文於是寒月改躔朱星移度苔濃春水草滋甘露園木含榮溪水解沍乃連太陰於北漠違少陽於南路唼藻而至豈鷹鸇之見猜銜蘆以飛何罻羅之足懼至於長距蒙賞利嘴見升豹以尾而自貴鶉疑以尾而自矜巢睫之蟲終幽微而莫覩垂天之羽竟寥廓而難徵孰與夫鴻也窮遠適縱遐觀凌天衢拂青漢橫逸翮奮羽儀空違沮澤竟屬汙池有四海之心而人莫識有八方之氣而人莫知年歲蹉跎兮行不返毛羽翕習兮飛未遠願借勢兮自強庶高翔兮不晚易之為書也八卦分體萬象潛通漸之為義也進以得位動而有融故聖人假物筌理爰託喻於茲鴻鴻之為物也跡狎洲渚去軼雲空始於干而漸陸竟自卑而陟崇飛則有序和而不同有類夫君子進德修業積微成功陟遐以自邇謀始而利終者哉原夫交頸頡頏乘波淡淡逍遙自得罻羅莫掩匪干時以強進每卑棲而自檢雖欲致雲霄之高故必階磐陸之漸洎乎理翰海表驤首煙路既應日而春來亦隨陽而類序行藏不昧於節遊止不愆於素匪親鳬鷖之㣥豈思稻粱之顧誠羽儀之可重奚燕雀之能慕豈比夫鸚鵡衒其羽翮徒矜才以取譽然無罪而見獲鄉國迢遙箱籠窘迫慕侶心斷沖天望隔不階漸以苟進非忤物而致厄豈同年而語哉三川朝市六合樞機冠蓋如雲擁金錢之馬埒軒車若水赴鐵鎖之虹橋遐邇所資往來為要不謂波湍溜激柱朽梁摧捉鳥鵲填河空餘處所驅黿鼉駕海尚有規模自合修營豈宜停廢楊忠佐光銅墨境控圭㕓仙舸橫流異林宗之共泛漁船逗浦非仲御之來遊縱徇私情恐乖公理雖當冬月况屬間時造橋用功冀暫勞而永逸渡船費力但有損而無成官橋自可官修何關縣長私船輒為私雇便纍宰君郡人褒揚將何稱首廉察附請即可甘心以狀告知庶無喧訴君子無屈道無屈也苟行君子之道身至困而道不屈苟失其道困亦宜之象害舜桀伐湯紂囚文王管蔡謗周公桓魋傷孔子臧倉毀孟軻小人見之曰為善多屈也不善而伸君子則發揮也道在我不怍或忙攘失道昧邪以為正乃觸途因以隨之亦宜矣申生自絶仲由就醢泄冶誅於陳屈原沈於湘是也為德行伸於德行為言語伸於言語為政事伸於政事為文學伸於文學自此以來未有行之而道未伸者也立於世未嘗不出於人也不伸不高乃似是而非名之曰妖和之不正言德行之妖辨之不正言文學之妖身為妖而不知困將至而乃怨是由大惑也至於六藝百工苟得其道亦伸也嗚呼人以貴尊極為道不屈余以道尊名遠為道伸文王伸於王道周公伸於輔相孔子孟軻伸於儒學都至疑賤道愚人謂之屈而不為也聖賢苟利於人隱其身亦不恥而乃為也稷播殖禹治水伊尹負鼎太公屠釣是也自舜至於邱軻道皆同也當行道之心非求富貴也道苟行矣曷謂之屈哉君子無屈昭昭矣宏慶作君子無屈論有為文學伸於文學之說或詰宏慶曰子非君子歟何道屈也久矣是夫迷其問詰然未數所以酬也及審已行之行而解之余誠非君子也讀孝經則思君子之行讀春秋則思君子之志讀易則思君子之性命讀詩則思君子之諷興讀書則思君子之載言讀禮則思君子之防亂讀樂章則思君子之理心至於非法道未嘗敢言行也夫是鄉里稱余朋友佳余於不道覽疑伸也矣曷來謂為屈哉如以行之未備志之未固性命之未達諷興之未深載言之未當防亂之未至闕十字虛舉之濫彰此乃朋友情也非吾之咎語曰四十五十而無聞焉斯亦不足畏也矣余年去三十尚二年矣則去四十五十尚十年二十年矣足得開其心術實其文譽也余又何畏哉若以進取之道屈則孔子至聖終於下位顏生至賢竟歿於陋巷顏孔以來則歷觀書史聖賢尚屈於進取况聖已降乎余於進取之道不敢言屈也已矣况余得其反未六七年望其進三四年到於七十尚有四十餘年今天下一家主聖臣忠又不可比披靡之周齷齪之燕而余生之時非為不遭也求進為久也前不遠也豈終於寒餒困苦於千萬人之下哉瞻言署曹克崇廳事既分官而揆務冀虛室而清神華茵載敷綺屏儼立頗有尊卑之禮須知進退之儀彼何人斯輕其主守迹既殊於審慎事終致於愆尤足待數知有慙對馬墨因誤點更謝成蠅坐彰怠慢之心須示鞭笞之罪且刑貴閲實政蠧深文汙雖有憑物終未驗儻非情故式可矜容請稽源流庶符明慎五善與能三侯是列俾射夫有獻庶君子必爭甲藝窮決拾心惟審固成規月滿則先張之弧如破風馳能發彼有的對梓人之成器受司馬之滿觴祭則有經辭豈失舊既不寧是抗非貽福謂何且使臣農夫息宴以禮而主皮棲鵠降殺異宜如或獸侯斯張是則豸冠虛觸尚迷歧路更佇指縱狀比也比與釋氏有藥草諭品詩家則六義之一焉義取覩物臨事君子早辨不當有似是而非採詩之官可得而補缺矣無以小言黜無以細言棄相尚佳句題於層閣古者稱會必賦其能闕乎星郎主文賓賦所以中雋也
