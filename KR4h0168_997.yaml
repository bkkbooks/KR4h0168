front:
  text: 全唐文欽定全唐文卷九百九十七闕名三十八
  hash: sha256:138130f4bbc9acd4c801a66f15d7ec7c6fb1d9448d3706acc6650045050ff614
body:
  text: 闕一字夫昏默未形爰依大道龍龜啟象始敘吉凶漸著君親乃陳孝悌生以溫凊色養歿以封樹烝嘗人子送終其來遠矣梁氏門風祖允此不備書蓋以星朔既淹子孫繁嗣因官得第而居此焉曾祖諱希幹不仕素為文業曾苦詩書厭官辭榮隱居畢世皇祖諱甫平亦不仕慎守公方克寸勤儉素外符忠正內切孝慈在邦而於人有和居室而與物無競年鄰耳順而終壽焉皇考諱重立字顯英性惟貞謹言慎樞機溫鑒而良彥取裁博達而英髦受旨羽儀朝市紀綱人倫可謂名似玉而長溫行如松而不朽年逾知命石火忽臨以天祐七年正月十二日闕一字於永樂坊之私第而告終矣夫人武功蘇氏郡中之良族也筓總之闕一字禮赴移天耳順之秋風燭長別痛闕一字履冰傷彼斷絃府君有嗣子三人孟曰思景高陽軍押衙充孔目官仲曰思恩季曰思度押衙昆仲幼懷聰敏長有博聞蘊季子之詞華抱安仁之才器笙簧密職丹藻列班孝盡旨甘讓敦手足押衙與弟昊天罔極何日忘之荼蓼厂田坴心鋒針刻骨晨昏難及喪薦竭修押衙昆仲以乾坤吉就龜筮叶和以天祐十年癸酉歲孟冬月己巳朔二十三日辛卯於易州東北隅一里半易縣玉山鄉梁村之右本塋之禮葬也其勢乃前臨易郭後倚燕山左近昭王之祠右接荊卿之廟東西遐迥形勝可觀良恐海變飛塵山成朽燼垂之記祀傳以後昆者歟銘曰乾剛坤柔有勞有休人倫終始難逃去留嗣子而昊天不報甘養而叩地無由府君兮金玉君子逝水兮萬古千秋府君諱環潁川人也祖興父道清並不求宦達君即清公之第二子也幼著才識長閑規矩克言理行闕有三以當年八月十八日窆於闕二十八里齊景鄉推山南二里祖墳闕三字塋禮也君娶吳郡顧氏有子三人長曰遂闕一字次曰師損三曰公甫並至謙至讓忠乎孝乎泣血主喪絕漿逾闕二字恐月日久邁陵谷遷移刊石為誌永傳不朽銘曰山作田兮田作海萬古存兮誰不改青松新隴曉無年千載惟留銘記在府君唐故侍御史某之次孫性好古不撓於時夫人顧生三子趨庭頗聞詩禮長子頌遠為運漕之使北自維揚旋於海昌謂其弟曰宗墓衆廣塋壠比櫛其間安厝豈汝等願耶遂卜他地得海昌里之一墟焉南去古墟三十步禮也銘曰海昌之里馬牧之墟孤墳巋如歸生之餘送終伊何家有孝子卜兆伊何青烏是指千歲蒿里百年遄已法師諱法願俗姓蕭氏蘭陵蘭陵人梁武帝之六葉孫唐故司空宋國公之第三女也原夫微子去殷昭茂勳於抱樂文終起沛兆峻伐於收圖瓊構鬱而臨雲珠源淼而浴日延禎錫祚開鳳歷於朱方疊慶聯規纂龍符於紫葢逮鼎遷南服冑徙東周英靈冠上國之先軒冕宅中州之半法師乘因敻劫植本遐生孕月仙姿稟清規於帝渚儀星寶態降淑範於台門襁褓之辰先標婉質髫齓之歲遽挺柔情聰悟發於生知孝友基乎天縱中外姻族莫不異焉加以骨象無儔韶妍獨立鉛華不御彩絢春桃玉顏含澤光韜朝蕣年將十載頗自矜莊整飾持容端懷檢操每留神於鞶帨特紆情於紝組瓊環金翠之珍茵簟衾幬之飾必殫華妙取翫閨闈麗而不奢盈而不溢既而疏襟學府繹慮詞條一覽而隅隩咸該再覿而英華畢搴豪飛八體究軒史之奇文法兼二妙符衞姬之逸迹㣥藝式甄女儀逾邵宋公特深撫異將求嘉匹載佇孫龍以光宋鯉而嚴庭垂訓早沐慈波鼎室承規幼明真諦飄花見雪初陪太傅之觀摘葉為香遽警息慈之念爰發宏誓思證菩提懼塵情於六禮乃翹誠於十誦承間薦謁請離俗緣宋公論道槐端丹青神化虔襟柰苑棟梁正法重違雅志許以出家甫及笄年爰披法服乃於濟度伽藍別營禪次庭標雁塔遠蔑娥臺藏寫龍宮遙嗤魯館於是沿空寂念襲慧薰心悅彼異衣俄捐綺縠甘茲蔬膳遽斥膻腥戒行與松柏齊貞慧解共冰泉等澈超焉拔類恬然晏坐若乃弟兄辦供親屬設齋九乳流音六銖含馥瓶錫咸萃冠葢畢臻唯是瞻仰屏帷遙申禮謁自非至戚罕有覿其形儀者焉加以討尋經論探窮閫域覈妬路之微言括毗尼之邃旨至於法華般若攝論維摩晨夕披誦兼之講說持戒弟子近數十人莫不仰味真乘競趍丹枕傍窺淨室爭詣元扉肅肅焉濟濟焉七衆之仰曇彌何以尚也重以深明九次閱想禪枝洞曉三空澄襟定水厭此厂田坴葢忽現身疾大漸之晨謂諸親屬曰是身無我取譬水萍是身有累同夫風葉生死循環實均晝夜然則淨名申誡本乎速朽能仁垂則期於早化金棺乃示滅之機玉匣豈栖神之宅誠宜捐軀摯鳥委形噬獸斂衿正念奄然無言粵以龍朔三年八月廿六日捨壽於濟度寺之別院春秋六十三姉弟永懷沉痛不忍依承遺約乃以其年十月十七日營窆於少陵原之側儉以從事律也法師夙盥禪池資慶源而毓彩初依道樹託華宗而降靈蘊地義於閑和苞天情於婉嫕覩一善則怡然自悅聞一惡則惄爾疚懷激仁義於談端明色空於慮表故能辭台閫託禪門捨七珍祛八膳精苦之行標映緇徒戒律之儀錙銖法侶佇津梁於苦海奄滅度於仁祠棣萼分華悲素秋之改色荊株析榦望青枝而增感所懼塵飛海帶將迷渭涘之塋石盡仙衣不辨檀溪之隧重宣此義乃為頌曰闕一字有殊稱法無異源爭驅意馬俱制心猿志擾情紊神凝理存展如淑範獨趣元門琁彩闕一字分瑤姿月舉含芳槐路疏貞桂序雲吐荊臺霞霏洛渚學兼班媛詞彬蔡女奠禽匪志闕二字昭仁捐華台室沐道元津法關開揵心衢屏塵九流遣累八定栖真忍藥分滋戒香含烈傳燈不倦寫瓶無竭奄愴神遷空悲眼滅式鐫柔範終天靡絕和上俗姓師諱思道絳州夏縣平原人也天縱其志七歲出家人推其聰十八剃髮事人不事為人不為同鵲巢於頂之年護浮囊無缺之日次就有德轉相師師禪行法門戒律經論耳目聞見紀之心胷緇錫來求簪裾欽仰聽習者鶴林若市頂謁者鹿苑如雲去至德二載春秋八十有一僧夏六十一時催二鼠妖厂田坴十夢其年十二月示身有疾隨為眾生其月二日禪河流竭坐般湼槃驚慟知聞悲覃飛走孫威神寺主僧承嗣五內摧裂擗踴攀號聲竭潛哀淚盡續血至乾元元年十二月二日遷於條山之側冑子塠頭禮也詢問其地取人不爭砥柱東橫汾河西澍青臺鎮北鹽池臨南崒爾塠頭卜擇安葬雖則天長地久而恐代異時移陵谷改遷斯文不謬其詞曰緇門積舋寶樹崩摧法消蓮坐魂滋夜臺條山陰麓巋然塠頭碧巖引吹清澗繞流和上登兮舊賞功匠興兮今修建崇塔兮數仞瘞金骨兮千秋香山禪師諱義琬字思靖俗姓董氏河南陽翟人紹嵩岳會善大安禪師智印法歲廿七世齡五十九開元十九年七月十九日長天色慘塞樹凝霜頂白方面赤方右肱枕席左臂垂膝言次寂默奄魂而歸舉體香軟容華轉鮮感瑞嘉祥具載碑錄師未泥洹先則元記吾滅度卅年內有大功臣置寺度遺法居士為僧卅五年後焚身留吾菓園待其時也果廿八年有文武朝綱闕一字國老忠義司徒尚書左僕射朔方大使相國郭公上額於居士拜首受僧奏塔梵宮牓乾元寺法孫明演授禪文託葬祖黃金述德於中書令汾陽郡王郭公徹天請號焚葬借威儀所由檢校大歷三年二月汾陽表曰義琬禪行素高為智海舟航是釋門龍象心超覺路遠近歸依身歿道存實資褎異伏望允其所請光彼法流其月十八日敕義琬宜賜諡號大演禪師餘依擇吉辰八月十九日荼毗入塔今卌載無記不從大禪翁也行慈悲海得玉髻珠施惠若春研芳吐翠破邪寶劍見網皆除業為學山萬法包納練行凝寂方能動天塔磨青霄砌下雲起星龕月戶面河背山清淨神靈庶幾銘曰行破㣥邪業為學海戒月青空心珠自在塔面長伊鈴搖岳風動天威力無住無空和上諱常俊俗姓張氏清河人也皇祖莊皇考李即李之第二子也卅歲出家年齡七十僧夏卌奄自會昌元年五月十五日示疾歿即以其月廿六日遷柩於常州無錫縣太平鄉闕村東一里官河西八十步張宗祖墓中卜其宅兆庚首而安厝之禮也有門人文則元通伯昌俗兄秀姪令容等悲痛哀摧涕淚交結恐陵谷遷改桑田變移塋域無徵乃刊磚而為誌銘曰禪宗內蘊法印心闕二字棄浮生歸乎寂滅禪師俗姓周道諱靈琛初以弱冠出家即味大品經論後遇禪師信行更學當闕一字佛法其性也慈而剛其行也和而潔但世間福盡大闇時來年七十有五歲在闕二字三月六日於慈潤寺所結跏端儼泯然遷化禪師亡日自足冷先頂曘後歇經云有此相者克寸闕一字生勝處又康存遺囑依經闕一字林血肉施生求無上道闕一字合成皂白祇教闕二字含悲傷失送茲山所肌骨闕二字闍維鏤塔冀海竭山灰芳音永嗣乃為銘曰逖聽元風高惟遠量闕一字學莫捨一乘獨暢始震法雷闕一字淪道藏示諸滅體闕一字茲奇相器敗身中曘餘頂闕一字結跏不改神域云喪闕一字曰既虧㣥迷失望非生淨土禪指何向塔頌一首闕高帶淥水鏤塔寫神儀闕四字形名留萬古闕四字劫盡乃應虧闕六字夫人程氏塔銘闕六字果東郡東阿人魏汝闕五字昌裔也若乃道風門慶闕五字史牒詳之矣夫人貞規闕五字融少崇龍女之因長勵闕四字說生應化雖順軌於六塵闕四字竟騰身於百寶以顯慶四闕三字四日終於京第春秋五十有闕三字明元年十月五日遷葬於終闕二字祔徵士靈塔安厝遵先志也其闕二字噫將恐二天地一山川敬勒徽闕二字昭不朽其詞曰闕一字阿女訓西鄂婦德貝葉因成蓮花闕一字陟巖巖兮神挂杳杳兮靈闕將畢闕一字而恒存與終峯而罔極大師諱藏俗姓伐赤濟陰郡人也十九出家六歲持誦金剛般若楞伽思益等經寫瓶貫綖諷味精純來至嵩岳遇安大師親承諮問十有餘年大師化後遂往韶郡詣能和上諮元問道言下流涕遂至荊南尋覩大師親承五載能遂印可付法傳燈指而北歸至大雄山玉像蘭若一從栖寓三十餘周名聞四流衆所知識復至嵩南會善西塔安禪師院覩茲靈跡實可奇耳遂於茲住闕乎聖典乃造寫藏經五千餘卷師乃如如生象空空烈跡可粲信忍宗旨密傳七祖流通起自中岳師亦心苞萬有慧照五明為法侶津梁作禪門龜鏡於是化流河洛屢積歲辰不憚劬勞成崇聖教春秋七十有二夏三十八臘無疾示疾憩息禪堂端坐往生歸乎寂滅即以其歲天寶五載歲次丙闕十月廿六日午時奄將神謝門人慧雲智祥法俗弟子等莫不攀慕教緣香花雨淚哀戀摧慟良可悲哉敬重師恩勒銘建塔舉高四丈給砌一層念多寶之全身想釋迦之半座標心孝道以偈而宣猗歟高僧嵩巖劫增心星聚照智月清昇坐功深遠靈迹時徵厥惟上德成茲法興其一五法三性八萬四千帝京河洛流化通宣不憚劬勞三五載間造寫三藏頓悟四禪其二三摩鉢底定力孤堅悲通法界慈洽人天法身圓淨無言可詮門人至孝建塔靈山其三禪師諱堅行俗姓魚氏京兆府櫟陽人也惟師貞儀苦節精懃厥志捐別修而遵普道欽四行而造真門豈圖晨霜易晞夕露難久寢疾牀枕藥餌無徵嗚呼哀哉以開元十二年十月廿一日遷化於本院春秋七十有六夏卌矣臨命遺囑令門人等造空施身至開元廿一年親弟大雲僧志叶弟子四禪賢首法空淨意等收骨起塔以申仰答罔極之志閏三月十日禪師諱真空俗姓申氏馮翊郡都朝邑人也植性明悟天姿卓越六度闕二字稟自齠年闕一字戒深仁行諸早歲既而闕二字宿善童子出家訪道闕二字與波闕一字而無異練心闕師即南泉門人也俗姓郝氏本曹州郝鄉人也諱從諗鎮府有塔記云師得七百甲子歟值武王微沐避地岨崍木食草衣僧儀不易師初隨本師行脚到南泉本師先入事了師方乃入事南泉在方丈內臥次見師來參便問近離什麼處師云瑞像院南泉云還見瑞像麼師云瑞像即不見即見臥如來南泉乃起問你是有主沙彌無主沙彌師對云有主沙彌泉云那箇是你主師云孟春猶寒伏惟和尚尊體起居萬福泉乃喚維那云此沙彌別處安排師受戒後聞受業師在曹州西住護國院乃歸院省覲到後本師令郝氏云君家之子遊方已迴其家親屬忻懌不已祇候來日咸往觀焉師聞之乃云俗塵愛網無有了期已辭出家不願再見乃於是夜結束前邁其後自攜瓶錫遍歷諸方常自謂曰七歲童兒勝我者我即問伊百歲老翁不及我者我即教佗年至八十方住趙州城東觀音院去石橋十里已來住持枯槁志効古人僧堂無前後架旋營齋食繩牀一脚折以燒斷薪用繩繫之每有別制新者師不許也住持四十來年未嘗賫一封書告其檀越因有南方僧來舉問雪峯古澗寒泉時如何雪峰云瞪目不見底學云飲者如何峯云不從口入師聞之曰不從口入從鼻孔裏入其僧却問師古澗寒泉時如何師云苦學云飲者如何師云死雪峯聞師此語讚云古佛古佛雪峯因此後不答話矣厥後因河北燕王領兵收鎮府既到界上有觀氣象者奏曰趙州有聖人所居戰必不勝燕趙二王因展筵會俱息交鋒乃問趙之金地上士何人或曰有講華嚴經大師節行孤邈若歲大旱咸命往臺山祈禱大師未迴甘澤如瀉乃曰恐未盡善或云此去一日二十里有趙州觀音院有禪師年臘高邈道眼明白僉曰此可應兆乎二王稅駕觀焉既屆院內師乃端坐不起燕王遂問曰人王尊耶法王尊耶師云若在人王人王中尊若在法王法王中尊燕王唯然矣師良久中間問阿那箇是鎮府大王趙王應喏弟子師云老僧濫在山河不及趨面須臾左右請師為大王說法師云大王左右多爭交老僧說法乃約令左右退師身畔特有沙彌文遠高聲云啟大王不是者箇左右大王乃問是甚麼左右對曰大王尊諱多和尚所以不敢說法燕王乃云請禪師去諱說法師云故知大王曩劫眷屬俱是寃家我佛世尊一稱名號罪滅福生大王先祖才有人觸著名字便生嗔怒師慈悲非倦說法多時二王稽首讚嘆珍敬無盡來日將迴燕王下先鋒使聞師不起凌晨入院責師慠兀君侯師聞之乃出迎接先鋒乃問曰昨口見二王來不起今日見某甲來因何起接師云待都衙得似大王老僧亦不起接先鋒聆師此語再三拜而去尋後趙王發使取師供養既屆城門闔城威儀迎之入內師才下寶輦王乃設拜請師上殿正位而坐師良久以手斫額云堦下立者是何官長左右云是諸院尊宿并大師大德師云他各是一方化主若在堦下老僧亦起王乃命上殿是日齋筵將罷僧官排定從上至下一人一問一人問佛法師既望見乃問作什麼云問佛法師云這裏已坐却老僧那裏問什麼法二尊不並化王乃令止其時國后與王俱在左右侍立國后云請禪師為大王摩頂受記師以手摩大王頂云願大王與老僧齊年是時迎師權在近院駐泊獲時選地建造禪宮師聞之令人謂王曰若動著一莖草老僧却歸趙州其時竇行軍願捨果園一所直一萬五千貫號為真際禪院亦云竇家園也師入院後海衆雲臻是時趙王禮奉燕王從幽州奏到命服鎮府具威儀迎接師堅讓不受左右舁箱至師面前云大王為禪師佛法故堅請師著此衣師云老僧為佛法故所以不著此衣左右云且看大王面師云又干俗官什麼事乃躬自取衣挂身上禮賀再三師惟知應喏而已師住趙州二年將謝世時謂弟子曰吾去世之後焚燒了不用淨淘舍利宗師弟子不同浮俗且身是幻舍利何生斯不可也令小師送拂子一枝與趙王傳語云此是老僧一生用不盡底師於戊子歲十一月十日端坐而終於時竇家園道俗車馬數萬餘人哀聲振動原野趙王於時盡送終之禮感歎之泣無異金棺匿彩於俱尸矣莫不高營雁塔特豎豐碑諡號曰真際禪師光祖之塔後唐保大十一年孟夏月旬有三日有學者咨問東都東院惠通禪師趙州先人行化厥由作禮而退乃授筆錄之具實矣
