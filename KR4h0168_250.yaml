front:
  text: 全唐文欽定全唐文卷二百五十頲字廷碩宰相王褱子舉進士拜中書舍人知制誥景雲中襲爵許國公開元四年遷紫微侍郎同紫微黃門平章事八年罷為禮部尚書檢校益州大都督府長史開元十五年卒年五十八贈尚書右丞諡曰文憲
  hash: sha256:88a2150a0b88c1344fb2c0b403fb2eea45a149a1496690ecf84b8107a13fcef5
