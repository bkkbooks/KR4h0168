body:
  text: 蜀太守庭際有紫華草秋中始繁英露洗冬早尚直本霜封蕪雜大同於衆卉盛衰小異於㣥物余訝而未識吏或告余曰此長虞所賦蜀長樂花也故心暗賞焉因口授書吏遂墨而成作恨不見古人所為得髣佛其旨爾夫長者以短長之形度其長則至美夫樂者以哀樂之類同其樂則至喜長也樂也吾安得而間之嘉纖植之並用偉令名兮在茲徒見其豐族苯䔿高標璀璨莖丹外而縞中葉縹分以紅貫綴緑穎之重疊索紫蕤之爛漫迫而象之君子其常或微或章聳危冠兮纓若綬默退靜其何望遠以意之佳人欲翔炫炫煌煌重羅綺兮撲搖翠蹇來思而未嘗匪以幽兮自直匪以直兮自藏匪以晚兮自耀匪以耀兮自強文濁露之均灑庇清舒之泛光本無嫌於散地甘有寓於殊方然則太液初滿上林新霽䒠茸灼爍萬品千計搖瑞色而函芝雜奇葩而轉蕙孰與夫玉堂金閣之偏賞白日青春之特麗歲不與兮時向闌風蕭蕭兮夜漫漫賓遠鴻於沙塞叫離鶴於江干君曾不見三月華矣盡林間之稿木千霜隕矣亦庭下之枯蘭懿此常度陵於早寒假春期而不彩雖秋令而不殘衝雨霰之飛薄任雲山之險難芳弗珍於靃靡節常慕於檀欒吾則知樹背之奚託惟傾心之可安如後凋之是貴罔獨立其誰觀文學掾起而為亂曰白露瀼瀼何草不黃紫華灼灼生君之堂彼不伐兮秋自翳時或珍兮君是惠彤庭赫兮朱草駢交屈軼兮友賓連伊榛莽而荒些君曷為兮賦旃封祀之山五在中國泰嶽首之昊穹之命再集巨唐皇帝受之臨位十四年考虞氏歲巡之義頌周王時邁之什十月辛酉步自有洛十一月戊戌帳殿齋於嶽趾淵默以清繹思而照將紀功布度順斗承天精享也己丑宏觀軼區宇盛儀振開闢高臨建鳳萬隊張皇以燭山上御飛龍百神翕習以扶道國台二藩后四髦士密侍信臣高位扈封臺列升陛不下五十以聖言沖邈瑤牒寶書誓之旨曰朕獲守丕業恐不克駿命惟上帝儲休錫蒼生無疆之慶朕之慶也古則祕之何哉屬寒馳迅飈露清終夕若掃若鋤晏然而巳庚寅天官次籙王制協時嚴高祖以配之嗣高宗以陟之冕裘立圭璧序潔罍俎調鐘呂倨勾於簨簴戛擊乎柷敔寶駢瑞兮物焜煌空薄霄兮音容與則纖塵不動和氣充塞日在於觀天為之門揚日大光謂小天下昭以抱戴見之卿靄郁郁紛紛喜氣絪縕當芝檢引紫薰大紫洞而三辰接鬱蒼搖而萬歲聞自下達上徯吾君君之來兮望如雲端兮晬聖之門至尊辛卯有事於社首以泰折如泰壇於穆我睿宗侑而作主奠獻嗚咽天子之孝也僉以金匱歸勛於祖禰石䃭藏美於乾坤戒咸秩則司存癸巳載大旗合大樂三陔崌以帷抗四亞鏘而輅止朝㣥牧揆千官砥邦賦數庭實華蟲辨等車馬來覲周人隨人二王之賓戎狄蠻貊萬里重譯必拱于著執贄奉璋雍雍昂昂靡敢怠遑乃建雞竿伐鼉鼓帝命出皇恩溥揚巽風作解雨施舍之蕩滌之宥法罪除頗纇澒湧洋溢周流黮䨴不崇朝而遍者與此山俱疇翳而不手叐胡微而不鋪也亦既稱壽申命宗伯咨爾頌焉效古之刻石臣頲稽首再拜而言曰臣聞昔在帝堯臣惟咎繇聰明之謂聖邁種之謂德天若曰依於巨唐易姓者李王於中華崇功者唐聖之澤德之浸也我唐祚之興昌符誕膺兩儀動六葉承皇帝宣高祖四宗之景烈肇開元神武之明號廣矣大矣莫有不寧罔有不俾咸一德之輔不二心之臣㣥后抗詞曰臣聞先王因天事天因地事地因名山升中於天陛下得天之經得地之義得人之行行也者孝莫大焉兼三才以為政孝也者仁莫大焉含萬物以為性今三才貞萬物亨六典平九功成官不滔獄不放至於刑清良有以也因斯而談清明在躬志氣如神之睿者君也四國于藩四方于宣之美者臣也有物有則我君臣保乂之原所由于前設其教于後爾往歲邦危中否天討內難陛下提三尺之劍羾閶闔絶勾陳趨北軍正北辰然後翼翼乾乾尊尊親親立我蒸人聖考所以付天下之公器蹈汾陽之清塵唐雖舊邦其命維新古者振兵釋旅祠土祈穀先事也我是以幸太原祭汾脽耀金甲肅邊鄙虜馬讋而不敢南向解嚴京師獲寶鼎獻宗廟戍人歸而盡務東作報福京坻於是乎爰佐五畤郊天以奉時爰崇九室祫祖而敬思昭格遲遲神人允釐無何籍三脊盛六穗不召斯至擁休之類如山則委曷月而祕豈非享物降嘉司火也立渾同度在璿也陛下姑謂之薄臣所未諭且管氏詫齊帝王凡八十九湮淪鬱沒孰若致美我高宗勒岱甲子正六十肸蠁葳蕤故能應期我神武惟繼代奉業增高保鴻缺乎中何也即先后以權暫阻於運二宗紹復未遑厥功神暗之契不在諸子而當聖躬固不可辭者審矣帝曰俞畏德之不稱而左輔右弼雜縉紳鴻碩之倫抱蕝懷書蒸雲吐霧方集賢內殿講議前席以論之傳不云乎君子勤禮敬之至也易不云乎先王作樂豫以動也慎矣哉禮樂之為用故執禮者具刪弊則質宜之自我變樂者理去商何害謙以為臣二者洽而三讓之制曰可始嚴鹵簿騰七萃啓禁關回九重以聽乎鸞聲之雍雍匪疾匪徐物有其容動植讚華夷觀駢闐總樽羡漫半散出成皋踰滎波憑滑臺眺洪河遂並昆吾之墟徜徉乎大舜之澤瀕四瀆二濟入於兗經九一三齊喬于岱推二旬有六而頓行在莫不皤皤華皓如藿傾陽或牽以餼或捧之觴傴僂乎康莊一以伸神武之今日一以感乾封之舊章乃餼歸之觴舉之慈且惠而與之歡沸渭頡頏矧國鄒魯家洙泗乘汶野而圖記可知指泮林而頌聲不墜以周公之故將孔子之後翹然希王者之屬車聖人之清蹕則久及信宿之意巖巖所瞻宗神曰天齊王加一等於三事戶二十供王祀環十里禁人樵報也大禋旅之數重褎成之祿撫遺氓賜之復帝曰吁夫艱難繫王業休咎牽人事況天監之殊祥也殊典也不自滿而虔鞏於位朕寶臣曰乾曜洎説有初有終時乃風欽哉汝作朕左右丞相翳汝忠益以嘉猷補袞之闕罔或怠遂宏天封煥天章篆介邱而旋德陽大饗乎㣥方程後代美其律聲其實墳作四而籍言七也臣頲不敏繼伯夷之直清微太史之留滯聆金奏同百獸之舞振木鐸採萬人之詩敢陳詩以頌曰天子聖兮天孫崇登以封兮報以功受命再惟皇代天之賚人所載士馬山嶪戈矛山沓禎符山雜靈響山答天與人合我鋪衍兮長粹清太元册兮太乙精休光光我之慶成舜四朝而禹萬國莫之我京門下咸有其德委廊廟之元宰知無不為歸掖垣之成務銀青光祿大夫檢校中書令上柱國燕國公張説含和育粹特表人師懸解精通見期王佐立言布文武之用定策勵忠公之典才冠代而不有功至大而若虛自頃宏益時政發揮王道萬事必理一心從乂以觀其獨伯起慎於四知常得其貞叔敖謹於三省故能深而不竭久而彌芳宣大號於紫宸潤昌圖於清禁我憑柱石爾作鹽梅正名之謂㣥議斯集可守中書令散官勳封如故主者施行門下尚書佐理四方取則端揆成務百工是師非允具瞻孰康庶績封州流人劉幽求風雲元感川嶽粹靈學綜九流文窮三變義以臨事精能貫日忠以成謀用若投水茂勳立艱難之際嘉話盈啓沃之初存讜直以不回舊唐書作顧為姦邪之所忌釁萌頗露譖端潛發元宰見逐讒人孔多既殄㣥凶方宣大化期問政於經始載登賢於夢卜可依舊金紫光祿大夫守尚書左僕射知軍國大事監修國史上柱國徐公仍依舊還實封七百戶并賜錦衣一襲主者施行門下弼諧庶政亮采有邦不遇人傑孰膺王佐金紫光祿大夫守尚書左僕射知軍國大事兼修國史上柱國徐國公劉幽求偉量天假守才代出子産之道四既取諸身咎繇之德九以成其用伊昔遘屯感義謀始洎于開泰防萌釁初景化俟其丹青讒詞變於白黑頃居炎瘴受釐之對莫聞重踐台衡從政之言益啓眷茲密勿方聽訏謨宜兼委於掖垣仍具瞻於禮闥可同中書門下三品餘如故主者施行門下后族之榮況有資敬台儀之重允膺是求特進王仁皎盛門華緒當代賢戚不言而自有陽秋從信而罔愆風雨軒星作範巳寵於金穴魯館增輝更芳於玉樹三事斯擬百工式瞻俾延椒臺之祥宜助槐庭之理可開府儀同三司主者施行黃門建官制爵立化之本樹善崇功惟能是任招慰十姓兼四鎮經略大使定遠道行軍大總管北庭大都護瀚海軍使節度巴西諸蕃國左驍衛大將軍攝鴻臚卿上柱國興昔可汗阿史那承獻淩鐵關之遠塞威揚萬里雄金山之舊族誠竭纍朝每讀古人之書且多奇士之節豈止秺侯忠孝呼韓允緒而巳哉頃服獯戎綏其種落茂勳則遠巳寵於登壇厚秩未加俾榮於開府亞台之典㣥議允集可特進餘並如故主者施行黃門天之紫微地在清禁宰臣為重庶政攸先不有殊才曷云兼寄金紫光祿大夫兵部尚書同紫微黃門三品監修國史上柱國梁國公姚崇河山粹氣禮樂清英德量在寬公心益厚詞必體要行之自遠學以窮微志於可大允茲忠讜光我謀謨聞善若驚欲仁斯至衣冠以為蓍蔡廊廟資其柱石朕之欽者管樂人之傑者蕭張遂能以身許國開物成務邦是用乂朝惟得賢北辰環拱西垣近密俾因題劒之榮式演如絲之命可兼紫微令餘如故主者施行門下王度以貞實寄於良輔天秩有禮允歸於盛德光祿大夫尚書左僕射兼右相吏部尚書集賢院學士修國史上柱國晉國公李林甫應期致用命代生才禮樂形於物範文章表於王佐自登袞職一紀於茲啓沃之謨酌泉源而不竭忠公之節貫霜雪而罔改彞倫攸敘庶績其凝實賴豫弼用熙帝載猶且謙沖夕惕兢慎日嚴問溫樹而不言履薄冰而逾勵久而益著德則茂焉近者禮屬交神恩當進秩雖允恭克讓徒有固辭而惟器與名本無虛授宜昭寵數以鎮崇班可特進行尚書左僕射兼吏部尚書主者施行門下才為於時以宣可大之業精貫於日以定非常之勛古稱王佐今乃人傑大中大夫守兵部侍郎兼知雍州長史修文館學士騎都尉安平縣開國子崔日用果行育德修辭立誠孝則揚親忠於事主堂堂乎貌暢君子之風諤諤其言蘊大臣之節故能書讀萬卷文窮四始高步登朝平心待物日者醜孽未殄嘉謀潛斷臨危不顧見義而作是用砥寧實所繄賴師兵戢矣京兆晏如宜緝台階之政式拜掖垣之寵可銀青光祿大夫行黃門侍郎參知機務學士勳封如故主者施行黃門東西禁掖出納王言精選賢良用存駮正正議大夫行尚書禮部侍郎上柱國兼判尚書左丞張廷圭文儒秀士謇諤忠貞汪洋有大雅之風明敏得至公之操言唯及霤曩歲嘗聞學則臨池當時莫比自歷遷臺省受理綱轄聲塵益茂聞實攸稱俾登青闥之榮式踐丹墀之列可黃門侍郎勳如故主者施行門下慶傳於家者代濟其美才許於國者時無與讓由是密勿為用訏謨所歸銀青光祿大夫行黃門侍郎修文館學士河東縣開國男參知機務薛稷河汾之英廊廟之寶相門前社則名優作誥詞場舊業則譽動飛文公貞性成仁和道勝坦然之量㣥物不干其靜穆如之風九流不測其度頃罹多難克仗嘉謀翼戴朕躬保寧王室厥功茂矣朝廷賴焉俾回踐於綸闈以增輝於鼎席可行中書侍郎餘如故主者施行門下散騎之列豐貂入侍選於耆艾用均師友金紫光祿大夫致仕上柱國解琬文合騷雅學殫經籍百城分按南憲是繩萬里出師西戎即序頃以剖符從政解印歸休章既拜而遂行禮及傳而則往雖風規莫擬而志力猶茂乞言伊屬寧忘賜杖之榮替否旁求宜副安車之命可行左散騎常侍散官勳如故主者施行黃門獻納之任虛求是屬列於侍臣莫匪耆舊銀青光祿大夫前散騎常侍上柱國禇無量佩服純行周旋雅道夙侍金華之講屢膺石渠之命故能禮自柔嘉動多忠益頃在艱罰近終喪禮覃思研精華皓不倦直辭讜議清明可觀俾重春卿之儒遷居德璉之任可右散騎常侍勳如故主者施行黃門侍臣之任朝廷所重賞善唯速兼才是先銀青光祿大夫并州大都督府長史上柱國王晙志力堅剛風情慷慨傳為書癖成誦在心言應筆精目懸於手受一方之委惣三軍之令士卒感恩以爭效獯戎滅迹而皆遠功其茂矣朕實休之用憑龍豹之韜更踐貂蟬之位可左散騎常侍兼檢校并州大都督府長史勳如故主者施行門下尚書兵部郎中上柱國于經野雅量端實間機密靜有恆其操無擇斯言理必中於繩墨才見推於札翰中臺奏草巳承更直之榮左曹顧問宜接雙遊之美可朝請大夫守給事中勳如故黃門朝議大夫尚書兵部郎中上柱國李懷讓直方自守貞獨不㣥理可析於毫芒文可成於藻繪雖手揮繁綜而心寄間遠絲綸所屬嘗推起草之能駮正是司更接遊蘭之寵可守給事中散官勳如故敕朝議郎守尚書司門郎中柳渙學思優博禮容莊敬蘊公直之志有廉正之風早以聲華亟從推擇丹墀列侍必選英髦青闥命官宜參顧問可守給事中散官勳如故門下中散大夫行尚書禮部郎中修文館直學士河東縣開國男薛稷奕代雄詞身濟其美光時雅量士慕其風故能懸帳絶倫升堂覩奧掖垣密勿字列黃縑仙闥從容文飛赤管針闕之任惟賢是擇俾登才子式寵諫臣可諫議大夫餘如故主者施行黃門朝議大夫前行尚書水部郎中兼修國史上柱國長垣縣開國男吳兢雅思周密素風清曠著書微婉東觀是稱起草間達南宮所重宜列諫臣之位復膺良史之才可守諫議大夫兼修國史散官勳如故主者施行黃門朝議大夫守給事中鄭勉措心精核尤明理體朝議大夫尚書庫部郎中戴令言屬詞方雅深達政端咸蘊公忠備聞學行紫闈星拱必佇賢臣青闥雲連實旌奇士闕三字專文事闕四字中散官各如故主者施行黃門正議大夫行尚書屯田郎中上柱國魏縣開國子崔琳素履純懿清心直諒文辭為從政之端忠孝是立身之本分符作牧共賴仁明賜筆題工咸推練習掖垣近密禁省旁求宜遷振鷺之行用集棲雞之地可行紫微舍人散官勳封如故主者施行敕通直郎紫微舍人內供奉王邱思會風雅文成典謨介獨為操直方闕四字近其華望自宏闕二字青瑣事密黃縑頡頏歲年籍甚聲聽俾宏詞禁之美宜正掖垣之秩可守紫微舍人散官如故敕朝議郎守給事中內供奉齊浣運心孤邁懷器獨立屬詞每窮其雅實臨事益表其甄明故能早負聲猷備經推擇左曹駮議常接於雙遊右掖司言佇光於五字可守紫微舍人散官如故敕朝議郎左補闕內供奉判尚書主爵員外郎韓休理識清暢襟靈夷雅探學精微屬詞婉麗甲科對策嘗副求賢左史記言用觀書法可行起居郎散官如故敕朝議郎前行戶部員外郎賀知章業優詞學時重才行稟精微以高妙體仁恕以明達必能書法不隱立言可觀宜回職於版圖佇擅聲於鉛筆可行起居郎散官如故敕通直郎著作佐郎洪子輿雅淡不㣥清貞自遠學探微旨詞造幽典立心有恆常慕直臣之節書法無隱可稱良史之才俾列軒墀益光鉛槧可守起居舍人散官如故敕朝請郎前試通事舍人崔銑識遠心明懷才蘊藝缺碑盡記亡篋不遺實朝序之英髦為士林之俊拔趨侍西掖洽聞東觀期書法以無隱俾舉能而有聲可守起居舍人散官如故敕奉議郎行揚州大都督府兵曹參軍事許景先詞含風雅有公直之量宣議郎前國子監四門直講馬利徵學總典墳稟亨嘉之德士推令聞人假清規致之掖垣用廣賢路景先可行右補闕利徵可岐州扶風縣丞員外置同正員仍直紫微省散官各如故敕宣德郎行岐州雍縣尉梁升卿等或敷暢學旨或該通詞藝爰廣獻書之路用開納諫之門不獨美於雕龍頗思齊於市駿咸宜採擇以申甄獎可依前件門下朝散大夫行太子典膳監韋元圭占對間詳風規韶茂燕庖分職巳命膏粱之緒鸞墀敷奏佇揚賓客之言可行通事舍人散官如故主者施行門下朝散郎前守通事舍人員外置同正員韋振良玉蘊價明珠耀彩宜擢才於金穴俾趨侍於瑤墀可朝散大夫行通事舍人散官如故主者施行門下天臺管轄爰正紀綱人望僉宜方膺授受銀青光祿大夫行尚書戶部侍郎上柱國彭城縣開國男劉知柔時行推美舊德歸高明暢襟情間華風表蹈典墳之芳潤總詞賦之笙簧慮常密於在公迹自勤於為政萬人登數巳聞書版之精六官揆才更俟彈珠之妙可行尚書右丞散官勳如故主者施行黃門二轄之重百官取則苟非其人何以成務正議大夫行尚書戶部侍郎上柱國安陽縣開國男兼御史中丞源乾曜清深密靜有彌綸之識正議大夫行紫微舍人上柱國倪若水剛正明斷有精核之才並果行育德以文飾吏事間達舊章發揮大體南臺執動中規模西掖揮毫舉成倫要必能主其禁令肅此綱維宜膺郤詵之寵更叶楊喬之拜乾曜可尚書左丞勳封如故若水可尚書右丞散官勳如故主者施行黃門名遂身退則聞告老優賢尚齒不忘求舊鎮國大將軍行右衛大將軍上柱國韓國公致仕仍給全祿及品子課朔望朝參張仁願有將相之才樹忠公之績入稱三傑帷幄所以運籌出總六師塞垣由其臥鼓懸利器而御物自中於桑林推素心以得士更成於李徑故能居室而應在邦必聞洎養疾歸休辭榮及禮用旌渭濱之兆空想潁陽之問乞言緊賴寵德攸宜佇增題劒之榮更遂揮金之樂可光祿大夫行兵部尚書餘如故主者施行黃門司徒之官實掌邦教常伯之位先求國華銀青光祿大夫河南尹上柱國魏郡開國公畢構達識鴻才調高學贍器無不綜含清明以見微言有可觀負忠讜以居直百郡仰其成績三臺推其故事頃者任殷河尹聲滿洛師姦豪懼秋霜之威孤老懷冬日之愛故可辨於五物書以萬人誰其釐之俾爾作則可守戶部尚書散官勳封如故主者施行黃門王命司寇汝作士師允迪政刑旁求望實銀青光祿大夫行紫微侍郎兼檢校刑部尚書兼知制誥昭文館學士上柱國中山郡開國公李乂恆碣之寶衣冠之華業總四科才抱九德為邦理要洞入精微當代詞雄居成準的忠義得在公之體清修稟行己之用紫泥掌誥雖密王言黃沙定罪是懸人命眷茲欽恤尤賴孚俾回迹於西垣宜正名於北斗可刑部尚書學士散官勳封如故主者施行黃門司空之職以平水土常伯之任尤重臺閣鴻臚卿上柱國彭城郡開國公劉知柔碩德耆秀行高才遠文詞有綺繢之工望實有圭璋之譽出膺賢守則郡國循良入位名臣則衣冠準的可謂朝之明哲代之純懿俾遷榮於北斗宜作範於南宮可銀青光祿大夫守工部尚書勳如故主者施行
