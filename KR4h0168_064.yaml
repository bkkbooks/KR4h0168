front:
  text: 全唐文欽定全唐文卷六十四帝諱恆憲宗第三子貞元十一年生初名宥封建安郡王元和元年八月進封遂王七年十月立為皇太子改今名十五年正月即位長慶元年七月上尊號曰文武孝德皇帝在位四年年三十諡曰睿聖文惠孝皇帝廟號穆宗
  hash: sha256:99b165ac689d33b6db7edd09cf2d968fd23192e7a140c92d56f9fcaf0e3dc82f
  markers:
  - {type: head, offset: 12, content: 穆宗皇帝, id: KR4h0168_NFKB_064-h1, level: 1}
body:
  text: 朕顧眇身初膺大寶思有以上諧天意下悅人心將澄理化之源必分邪正之路言念輔弼方俟忠賢其或挾姦容身斂怨歸國罪巳暴於天下法宜行於事初不速去之曷明豫志中大夫守門下侍郎同中書門下平章事上柱國賜紫金魚袋皇甫鎛器本凡近性惟險狹行靡所顧文無可觀雖早踐朝倫而素乖分望自掌邦計屬當軍興以剝下為徇公既鼓衆怒以矯節為孤立用塞人言洎塵台司益蠹時政不知經國之大體不慮安邊之遠圖三軍多凍餒之憂百姓深凋瘵之弊事皆罔蔽言悉虛誣遠近咸知朝野同怨而又廣稱方士上惑先朝潛通姦人罪在難赦合加竄殛以正刑章俾黜遐荒尚存寬典凡百在位宜悉朕懷廊廟之任萬邦所瞻調一氣之和序五材之用出納王命發揮帝猷求賢能宏我理本朝議郎守御史中丞飛騎尉襲徐國公賜緋衣魚袋蕭俯識通化源道契休運有戴君峻節之志秉見義匪躬之誠代襲公台族高軒冕學冠古今之要詞深雅誥之宗嘗事先朝職居宥密奏議無撓忠勞益彰洎執憲南臺肅清朝序休望彌洽直聲日聞朕方臨萬邦思致於理若涉大水浩無津涯將務以安人欲息兵而論道審象以授其代豫勤爾其端志絶私去末崇本敘禮樂於邦國正風教於人倫舉其鈞衡明示天下無俾一德專美於殷爾其敬之奉我成命可朝散大夫守中書侍郎平章事仍賜紫金魚袋夫士之出處則辨其邪正人之踐修宜勵其終始苟不容於公論誠難逭於國章況其擢自宗枝常探儒術洊歷臺閣亦分郡符而動或違仁行不繇義附權幸以虧節通奸黨之陰謀衆情皆疑羣議難息據因緣之狀當置嚴科順長養之時特從寬典免於省過無或徇非可建州刺史夫宰相者上調元化以亮天工下熙庶績以輔君德未有心不直而能協於道迹不正而能致其君必求斯人乃命以位朝議郎守御史中丞武騎尉賜紫金魚袋崔植氣志凝遠風標粹清率性而行潔己以進周歷臺閣藹然聲猷頃者姦臣未除利權方擅情惟刻下其事將行而植獨能橫抗申以駮議朕每嘉重不忘於懷自膺寶圖俾掌邦憲又能悉心秉執造膝敷陳歸於無私多所宏益爰擢作相冀能弼豫於戲惟爾先太傅當德宗始初清明首居相位克固直道至於今稱之爾其嗣乃家法無廢朕命可朝散大夫守中書侍郎平章事門下天生蒸民樹之司牧非輔弼不能宣其教化非忠賢無以廣其謀猷其履道居貞開物成務才既彰於人望績方著於國均是宜表式周行歷踐樞禁朝議大夫守中書侍郎平章事蕭俯器懷沈正風度夷遠識蘊通人之量文為君子之儒守道易知臨事難奪內庭推謹密之效司憲宏端肅之規所以仗其公忠寄之啓沃嘉乃匡益副豫簡求思序德以任賢冀資忠而致理俾光帷幄再踐台階無替前勞往服休命於戲秉一心者時惟良弼宰萬物者是資化源后德惟臣豫既虛心而納誨國家在相爾宜勵節以致誠無愧知人式佇明效可門下侍郎平章事寰宇巳清而兵不可失干戈載戢而功不可忘爰升經武之材用輔同文之理具瞻此允注意尤深蓋以獎舊勞而申賞典也李光顏稟忠厚仁信之資服禮樂詩書之訓沈勇而決剛嚴不殘挺長劒之鋒稜蓄殷雷之氣象以忘身徇節為任以約己率衆為心屬先帝撫運勤人墾菑除害能展七擒之略以成四克之功方夏甫寧凱旋未幾驅仍歲陷堅之士為盛秋乘障之師果逐奔戎載完危壁西絶夷落威名赫然念茲勳庸當極寄任是以徵自堡塞接於明庭亟聞宏遠之規復挹沖深之度固可以內參鈞軸外總麾旗憲彼萬邦叶豫一德可不勉歟可檢校司空同中書門下平章事依前邠州節度等使朕聞帝王丕宅四海子育羣生如天無不覆如日無不燭其發號施令也如風其行慶布惠也如雨故能上符天道下感人心朕自嗣守寶圖將欲恢宏王略常懼化有所未至恩有所不周乃眷冀方初喪戎帥念乎三軍之士洎於四州之人或懷忠積誠而思用莫展或災荒兵役而望恤何階今則昌運一開誠節咸著王承元首陳章疏願赴闕廷思保父兄之名克固君臣之義巳加殊獎別委重藩又念成德軍將士等叶心嚮義丹款載申方欲效其器能各宜列於爵秩大將史重歸牛元翼等巳並超授榮寵今復都加厚賜普示深恩兼以四州貧下百姓當敷賑贍之惠俾識含育之仁宜令諫議大夫鄭覃往鎮州宣慰親諭朕意仍共賜賞錢一百萬貫以內庫及戶部見在匹段支送充賞給將士兼貸四州貧下差科州縣之中或有殘破頗甚者委田宏正量便宜優恤務令存濟朕又以王澤所洽天網方恢宥過釋冤與人休泰其管內繫禁囚徒罪無輕重並宜赦免其大將等雖巳頒賜官爵或慮有遺并判官等宜委宏正具名銜聞奏如或父母在者別具上聞當加優恤當道從前巳來官吏將校等或忠義可嘉而刑戮濫及如有此色亦條録奏聞當加追贈如子孫見在者厚加優恤仍具聞奏四州之內有高年惸獨或承平遺老咸覩皇風或孤獨廢疾不能自存者差官就問量給粟帛四州之內有奉職清勤惠及百姓者具事跡聞奏當量加進改如有隱居山谷退在邱園行義素高名節可尚或才兼文武卓然可獎者具名薦聞朕以武俊之勳勞光於彞鼎士真之恭恪繼被節旄承宗感恩亦克立效永言十代之宥俾賜一門之榮承宗兄弟並巳授官爵如或未盡霑及亦當具名聞奏其承宗葬事亦差官勾當禮物之閒務令周厚嗚呼録其遺忠延乎後嗣旌其衆善被於一方國有羡財不吝於恤隱朝有好爵無愛於賞功庶使八表大同五兵永戢宣示中外宜體朕懷師長庶工總詳六職重任久曠益難其人自非體參股肱位列鈞鼎引義以知退致禮而加恩則授受之閒何以允茲任也朝議大夫守門下侍郎同平章事襲徐國公賜紫金魚袋蕭俯門承華亠兊位列清貫用能周物志在佐時勤內署之論思肅南臺之綱紀朕初承天序擢處台階推一心獻納之誠贊四方經營之績及此踰歲纍陳懇詞微恙所侵堅請難奪朕憂勤庶政親委大臣務厚始終以全進退既謝弼諧之任宜加端揆之崇爾宜戒之服我優秩可守尚書右僕射勳賜如故王者昭宣令德臨視百官必有台臣總其方略況是先朝正姦邪之罪型海內之心既承大勳付朕鴻業思欲述事繼志偃武修文揚其耿光屬在髦傑朝散大夫守尚書戶部侍郎知制誥翰林學士上柱國建安縣開國男食邑三百戶賜紫金魚袋杜元穎識稟人秀才為國華器縝密以含章言清明而體要廉方不雜峻直無徒洞朗鑒而心運陽秋鼓雄詞而氣斡河嶽爰以精粹列於內廷通賈生理亂之言達管氏刑政之本未至高位蔚為名臣閒者妖孽相挻紛亂南北朝夕機命迅如風霆而翰動若飛神無滯用思戢必盡其心力避榮常執其謙光況虔奉綴衣導揚訓命雅仗忠貞之志實有安定之功本於忘身愛我以德感激無隱切劘盡規既納誨於三篇亦陳戒於六事朕嘗委以大政詢其遠猷研幾必精應變常理布舊章於河朔推大信於昆夷無所不諧實由密贊令器焜耀淑聲流聞升於台階允是瞻望於戲昔爾先正為唐宰衡惟爾傳臧孫有後之慶秉召公是似之德宜纂舊服協於至公乃思貽厥之謀率攸行之道扼制羣動衡平衆流俾人不迷時乃之績可守尚書戶部侍郎平章事散官勳並如故門下朕獲承天序欽若前訓用建藩輔以明親賢斯古先哲王之令典也弟憬等孝友寬厚溫文肅敬行有枝葉道無緇磷踐君子之中庸究賢人之義理情惟樂善志不近名慕閒平之令德希曾閔之至行宜分建茅土衛我邦家叶於展親永固磐石是用舉其成命錫以徽章第八弟憬可封鄜王第九弟悅可封瓊王第十弟恂可封沔王第十一弟懌可封婺王第十二弟愔可封茂王第十三弟怡可封光王第十四弟協可封淄王第十五弟憺可封衡王第十六弟㤝可封澶王長男湛可封景王第二男涵可封江王第五男可封潁王宜令有司擇日備禮冊命主者施行愛人本於省賦雖必在輕國用出於地財又安可闕今淮蔡並山東率三十餘州約數千里頒賜可踰於巨萬給復有至於連年應河南河北等州給復限滿處置宜委所在長吏審詳墾田并桑見定數均輸稅賦兼濟公私每定稅訖具所增加賦申奏其諸道定戶宜委觀察使刺史必加審實務使均平京兆府亦宜準此百司職田在京畿諸縣者訪聞本地多被所繇侵隱抑令貧戶佃食蒿荒百姓流亡半在於此宜委京兆府勘會均配務使公平懷大忠者必成其茂勳建茂勳者必極其高秩朕虔守鴻業靜思化源固欲表忠節以勵為臣舉勳籍以勸立志況乎位崇上相遇重先朝首陳宏圖躬率羣帥克定妖孽坐清寰瀛得不再申褒崇昭示倚注河東節度觀察處置等使金紫光祿大夫檢校尚書左僕射兼門下侍郎同中書門下平章事大原尹北都留守上柱國晉國公食邑三千戶裴度材膺啓運道協功偕一心盡忠百志歸正雖量包宏曠靡所不容而節抱孤貞凜然難奪所以特承恩顧專委謀猷堅持其誠獨立不懼在昔有晉厥功平吳惟茂先決策於中惟元凱整旅於外兼能並用度實有之許國忘身勤亦至矣自居重任出入六年及鎮太原聲績一貫朕永懷丕烈乃眷舊臣將副深衷式加新命惟正三公之位在平九土之司論道再光總戎益重毗我王室永孚於休可守司空依前兼門下侍郎平章事古人有言嘗引一代之人以理一代之務雖雋賢茂彥不乏於時然亦在敷納以言精核其實若決川瀆以導其氣考金石以求其音使抱忠義者必盡其誠知古今者必先其慮朕纂承鴻業以撫兆人嘗欲效三代之禮修烈祖之法猶念和氣之未洽休祥之未臻百姓之未安五兵之未戢故詳延修潔之士庶得聞乎未聞將以達天地之心究俗化之變研安危之慮探理亂之言子大夫覃思於六經馳騖於百氏得不講求至論以沃朕心方直者舉朕之闕政術者體時之要慕元遠者卑其論贍文詞者抑其華言經者折衷於聖人以明教化論將者先之以仁誼無效縱橫於戲子大夫當朕之時必思自達且古之翼戴其君者尚委輅納說荷擔吐奇由壺關之言自南昌而諷刺況文陛之下負扆親臨若藏器不耀結囊而去顧朕深志復何望焉當體豫衷無懼後害宜坐食訖就試朕自郊上元御端門發大號與天下更始思得賢雋標明四科令羣公卿士暨守土之臣詳延下位周於草澤成列待問副豫虛求昧爽臨軒俾究其論正辭良術精義宏謀繹之旬時深見忠益言刈其楚列而第之賢良方正能直言極諫第三等人龎嚴第三次等人呂術第四等人韋曙姚中立李足廠田坴第四次等人崔嘏崔龜從任畹第五上等人韋正貫崔知白陳元錫博通墳典達於教化第四第人李思元詳明政術可以理人第四次等人崔郢軍謀宏遠堪任將帥第三等人吳思第五等人李商卿咸以懿學茂識揚於明廷況當短晷之辰頗著論思之美粲然高論深沃朕心永言藏器之規豈忘縶駒之義寵之命秩允答嘉猷其第三等人第三次等人委中書門下優與處分其第四等人第四次等人第五上等人中書門下即與處分昔仲尼之門以四科品第諸生所得十哲今吾徵四海九州之士可登名者十有五人搜羅拔非不勤至以今況古可謂才難是用詔爵以嘉獎其忠超擢以光明其道俾巖石之下人思自奮朝董之盛遠以為鄰延登諫垣式佇忠益讎書結綬皆曰顯途循其秩次亦示科等服我休命勗哉遠猷可依前件絳俯皆本朝先後之名相也而吏司為劇俯固以疾辭兵務差閒絳處之餘裕各令總理庶謂得宜宰相者朕之腹心和合天下在乎鎮靖藩服附親遠方將宏遂物之宜必有更張之道正議大夫守中書侍郎同中書門下平章事武騎尉賜紫金魚袋崔植往在先朝頗推廉直馴行惟謹保萬石之風清德不渝紹四公之業遂升左掖實著能名駮正之美稱於朝列朕以孝公太傅代載忠貞擢於相門授以台席顧惟寡昧奉若丕圖每念為君之難敢忘從諫之義推誠聽納虛己咨詢庶洽羣心以迎和氣叔敖是期於秉羽汲黯謂致於寢謀宵分以興日旰忘食昔藩國多事平津讓侯陰陽未和石慶辭位惟爾謙遜豈嘗求安稱疾拜章勤亦至矣雖愒日之年未及而寢冰之意尚堅遂輟樞機用成美志崇以大秩長於秋官君臣之閒朕無所愧可刑部尚書散官勳賜如故朕聞御大器者登俊賢以為輔弼敷大化者擢公忠以施政教故能成天下之務達天下之情俾三光宣明百度貞正我之倚注方得其人天實賚豫允副僉望中散大夫守尚書工部侍郎元稹圭璋茂器鸞鳳貞姿文涵六義之微學探百氏之奧剛而有斷忠不近名徑氣嘗勵於風霜敏識頗知於今古自恪居朝序休問再揚不自飾以取容不苟安而回慮處直忘屈在屯若夷卓然懷陶鑄之心豁爾見江湖之量閒者司文禁署主朕樞機每因事以立言纍披誠而獻計心惟體國義乃忘身深陳濟物之才雅見經邦之志朕思宏理本用洽生靈式資康濟之材以暢和平之化於戲爾率於正則不正者知慎爾進於善則不善者必悛惟直道可以事君惟至公可以格物具茲數德毗豫一人永孚於休以砥於道可守尚書工部侍郎同中書門下平章事散官勳封賜如故涉大川者操巨艦不畏於洪波搆廣厦者揭宏材乃安於棟宇朕祗奉神器尊臨萬邦思弼諧輔相之臣致易簡雍熙之業爰擇舊德委之樞衡冀宏嘉猷以闡元化淮南節度副大使知節度事管內營田觀察等使光祿大夫守司空同中書門下平章事兼揚州大都督府長史上柱國晉國公食邑三千戶裴度氣稟宏廓材優康濟達識高議堅明不渝儀型可以光巖廊度量可以方海嶽操握政柄張弛化權彞倫典謨合若符契昔我先聖以武略深計中樞密勿委之廟堂四海咸理朕仄席虛己勞懷宵旰禮命元老聞斯格言衷懷洞然雲霧皆豁是用輟撫淮南舉之台袞換其戎律列自黃扉秩崇上公望積師長寄爾以周召待爾以蕭曹任爾以埏埴授爾以鈞衡於戲袵席樽俎之內堂室牖戶之閒無俟規臨可以觀察違爾宴息期爾折衝庶乎陰陽協和品物昭泰惟言是納爾舉必從使益稷皋陶爾無慚德垂衣南面我獲任賢無易斯言式遵明命可守司空兼門下侍郎同平章事散官勳封如故朕端己推誠資於輔相求人與衆諒在訏謨所以徇公卿之言從庶士之望輟任淮海俾居台階舉先朝勳舊之臣當四海具瞻之位推心委柄期在賢能誠效靡孚余將安望光祿大夫守司空兼門下侍郎同中書門下平章事上柱國晉國公食邑三千戶裴度器本端誠道惟謇諤挺松筠之操蘊圭玉之姿望積巖廊功書竹帛策勳報爵寵極人臣朕恭守睿圖推心輔弼聿求雋彥思致雍熙擢升論道之司再授樞衡之任虛心有日佇乃嘉猷而鼎飪未調弛張異制誠宜有犯無隱忠讜必陳使余誠懷不惑聞聽何苟容於造次致有閒於笙簧棘木既窮匪辭焉驗昔漢以陰陽不和冊免丞相今訏謨或爽宜罷台司酬勳績以尚功録忠勞而念舊俾居右揆非謂左遷用崇師長之榮勿以優閒自薄可守尚書右僕射散官勳封如故門下朕聞天地洪爐鼓之者橐籥帝王大業成之者股肱故堯舜垂衣禹湯恭己宏道任德惟豫輔臣則八表清寧萬邦咸乂故伊尹之舉皋陶之升庶績其凝不仁自遠正議大夫守兵部尚書輕車都尉賜紫金魚袋李逢吉大方比量中正持心貞玉無瑕精金匪礪峻節而高山是仰推誠而止水可觀剛柔所持吐茹無易往以青宮齒學導我典墳儀刑式孚蘭茝馨茂洎升台席翊奉先朝訏謨密聞獻替潛達外順明德中探至言溫恭聿修終始一貫朕嗣守丕業思得賢良將俟和羹期於舊老易之襄漢居以南宮每詢嘉言啓沃惟允今授之相印委以樞衡代天之工爾在專任於戲發號施令選賢任能申於百辟之上行於四海之內朝無黨比人絶澆浮白黑粲然淄澠不溷使巖廊重位揚我清風宏宣大猷以暢王度可守門下侍郎同中書門下平章事散官勳如故主者施行宰相者位列巖廊權參造化內操政柄上代天工朕嗣守丕圖思興至理每於擢用冀獲雋良為善有聞必資獎寵罹於謗用罷台階通議大夫守尚書工部侍郎同中書門下平章事上柱國賜紫金魚袋元稹遊藝資身明經筮仕纍應科選益振芳華茂識宏才登名朝董之列佳辭麗句馳聲鮑謝之閒頃在憲臺嘗推舉職比及遷黜亦以直聞是用擢以周行典斯誥命洎參密近旋委台衡宜竭謀猷盡於毗贊而乃不思宏益之道遂嬰詿誤之嫌察以中情雖非為己行茲左道豈曰效忠體涉異端理宜偕黜朕以君臣之分貴獲始終任使之時亦聞獻懇每思加膝寧忍墜泉猶宏在宥之心俾列專城之寄左郡之大三輔推雄控壓關河連屬宮苑勉於政績副我恩私可使持節同州諸軍事守同州刺史充本州防禦長春宮等使散官勳賜如故禮著死綏傳稱握節捐生守位取重人倫為義甚明其風或替言念於此慨然興懷而朝之公卿有上言者稱天寶之季盜起幽陵振蕩生靈噬吞河洛贈司徒忠烈公憕處難居首正色受屠兩河聞風再固危壁首立殊節到今稱之其子源有曾閔之行可貫於神明有巢由之風可希於太古山林以寄其跡爵祿不入於心泊然無營五十餘載夫褎忠可以勸臣節旌孝可以激人倫尚義可以鎮澆浮敬老可以厚風俗舉茲四者大警於時是用擢自衡門立於丹陛處以諫職冀聞讜言仍加印紱式示光寵可守左諫議大夫賜緋魚袋仍敕河南尹差官就所居敦諭遣發帝王之理天下也外有方嶽所以宣教化內立宰輔所以秉樞衡授任之重莫踰人臣之位斯極至於出分垣翰入作股肱非聞望尊高功庸顯赫則何以允膺僉屬光贊謀猷前忠晉絳隰等州節度觀察處置使開府儀同三司守司徒兼中書令河中尹上柱國許國公食邑三千戶韓宏德器寬宏識度邁遠才資英特學茂韜鈐持蕭何畫一之心有杜晦立斷之利頃以關河右地藩屏近郊爰輟台臣仗茲戎節以清靜廉平之理牧我黎元通明正之方撫我師旅奸盜自息欺詐不生晨無飲羊夜無驚犬五郡富庶巳飽仁惠之風三軍訓齊既習嚴明之令寧資借寇是用徵黃今選日來朝乘軒即路宜先極拜光我元臣上宰闕三公崇秩俾復乃位惟其敬之可守司徒兼中書令散官勳封如故朕聞王者敬承宗祧欽若天命必建元子用寧邦家所以光協繼明嚴當主鬯朕纘承聖緒寅奉丕圖永惟國本之安爰在皇儲之重而青宮久曠望苑未開何以表武元良昭宣鴻業稽於往冊用舉彞章長男景王湛孝愛恭和忠敬誠肅慈惠特稟寬仁夙彰言通典謨動協儀矩睦友宗屬遵承傅道克修令問日茂嘉猷宜踐儲闈以承庥命朕以君尊父嚴每推乾道聞詩學禮用首人倫嘉翼翼於誠心覩蒸蒸於孝敬克稱知子無讓前修俾奉粢盛式昭元嗣宜冊為皇太子仍令有司擇日備禮冊命主者施行舟楫所以濟大川棟梁所以成大厦舟具而湍波不竦材具而廊廟用崇朕若涉之心浩然增畏垂衣端拱期在股肱是用擢彼英髦付以衡石朝議郎守尚書戶部侍郎上柱國賜紫金魚袋牛僧孺方直秉心誠敬由己玉潔持操松貞表姿文著經邦業推匡代中立不倚孤標介然日者選自南宮掌綸西掖升諸憲府授以人曹典謨訓誥之詞紀綱準繩之度施之必當僉曰汝能朕將寄以台階委之鼎鉉貞我庶績澄諸化源爾宜克念前修聿懷明哲體乾坤易之法廣日月無私之照使風化日厚澆浮自泯好惡不競彞倫永清於戲豫視以能乃升於位我心慎擇惟賢自求昔公孫宏以射策馳聲名光相府爾以掞天高稱亦踐臺司勉同素闕之風克副皋陶之舉仍加命秩用表新恩可朝散大夫尚書戶部侍郎同平章事勳封如故義倉之制其來日久近歲所在盜用沒入致使小有水旱生人坐委溝壑永言其弊職此之由宜令諸州録事參軍專主勾當苟為長吏迫制即許驛表上聞考滿之日戶部差官交割如無缺負與減一選如缺少者量加一選缺數過多戶部奏聞節級科處前進士費冠卿常預計偕以文中第祿不及於榮養恨每積於永懷遂乃屏身邱園絶跡仕進守其至性十有五年峻節無虧清飈自遠夫旌孝行舉逸人所以厚風俗而敦名教也宜承高獎以警薄夫擢參近侍之榮載佇移忠之效可右拾遺
