front:
  text: 全唐文欽定全唐文卷三百四十一顏真卿六
  hash: sha256:b0bfdbc685f404e1cb9e8550efbe2c662a9ffffaaf3e02def284c34399361e5e
body:
  text: 君諱勤禮字敬琅琅臨沂人高祖諱見遠齊御史中丞梁武帝受禪不食數日一慟而絶事見梁齊周書曾祖諱協梁湘東王記室參軍文學有傳祖諱之推北齊給事黃門侍郎隋東宮學士齊書有傳始自南入北今為京兆長安人父諱思魯博學善屬文尤工詁訓仕隋司經局校書東宮學士長寧王侍讀與沛國劉臻辨論經義臻屢屈焉學書黃門傳集序君自作後加踰岷將軍太宗為秦王精選僚屬拜記室參軍加儀同娶御正中大夫殷英童女英童集呼顏郎是也更唱者二十餘首溫大雅傳云初君在隋與大雅俱仕東宮弟愍楚與彥博同直內史省愍楚弟遊秦與彥將俱典祕閣二家兄弟各為一時人物之選少時學業顏氏為優其後職位溫氏為盛事具國史君幼而朗悟識量宏遠工於篆籀尤精詁訓祕閣司經史籍多所刊定義寧元年十一月從太宗平京城授朝散大夫勳解褐祕書省校書郎武德中授右領左右府鎧曹參軍九年十一月授輕車都尉兼直祕書省貞觀三年六月兼行雍州參軍事六年七月授佐郎七年六月授詹事主簿轉太子直監加崇賢館學士官廢出補蔣王文學宏文館學士永徽元年三月制曰君學藝優敏宜加獎擢乃拜陳王屬學士如故遷曹王友無何拜祕書省著作郎君與兄祕書監師古禮部侍郎相時齊名祕監與君同時為崇賢宏文館學士禮部為天策府學士弟太子通事舍人育德又奉令於司經局校定經史太宗嘗圖畫崇賢諸文學士命祕監為讚以君祕監兄弟不宜相裦述乃命中書舍人蕭鈞特讚君曰依仁服義懷文守一履道自居下帷終日德彰素里行成蘭室鶴鑰馳譽龍樓委質當代榮之六年以後夫人兄中書令柳奭親纍貶夔州都督府長史顯慶六年加上護軍君安時處順恬無慍色不幸遇疾傾逝於府之官舍既而歸窆於京城東南萬年縣寧安鄉之鳳栖原先夫人陳郡殷氏臮柳夫人同合祔焉禮也七子昭甫晉王曹王侍讀贈華州刺史事具真卿所撰神道碑敬仲吏部郎中事具劉子元神道碑殆庶無恤辟非少連務滋皆有學行以柳令外甥不得仕進孫元孫舉進士考功員外劉奇特標榜之名動海內從調以書判入高等者三纍遷太子舍人屬元宗監國專掌令畫滁沂濠三州刺史贈祕書監惟貞頻以書判入高等歷畿赤尉丞太子文學嶭王友贈國子祭酒太子少保德業具陸據神道碑會宗襄州參軍考楚州司馬澄左衛翊衛潤倜儻涪城尉曾孫春卿工詞翰有風義明經拔萃犀浦蜀二縣尉故相國蘇頲舉茂才又為張敬忠劒南節度判官偃師丞杲卿忠烈有清識吏幹纍遷太常丞攝常山太守殺逆賊安祿山將李欽湊開土門擒其心手何千年高邈遷衛尉卿兼御史中丞城守陷賊東京遇害楚毒慘下詈言不絶贈太子太保諡曰忠節曜卿工詩書草隸十六以詞學直崇文館淄川司馬旭卿善草允山令茂曾訥言敏行頗工篆籀犍為司馬闕疑仁孝善詩春秋杭州參軍允南工詩人皆諷誦之善草隸書判頻入等第歷左補闕殿中侍御史三為郎官國子司業金鄉男喬卿仁厚有吏材富平尉真長耿介舉明經幼輿敦雅蘊藉通班漢書左清道率府兵曹真卿舉進士校書郎舉文詞秀逸醴泉尉黜陟使王鉷以清白名聞七為憲官九為省官洊為節度採訪觀察使魯郡公允臧敦實有吏能舉縣令宰延昌四為御史充太尉郭子儀判官江陵少尹荊南行軍司馬長卿晉卿邠充國質多無祿早世名卿人胃倜伋倫並為武官元孫紘通義尉沒於蠻泉明孝義有吏道又開土門佐其謀彭州司馬威明卭州司馬季明子幹沛翊泉明男誕及君外曾孫沈盈盧逖並為逆賊所害俱蒙贈五品京官濬好屬文翹華正嶽頁並早夭穎好五言校書郎頲仁孝方正明經大理司直充張萬頃嶺南營田判官顗鳳翔參軍頍通悟頗善隸書太子洗馬鄭王府司馬並不幸短命通明好屬文項城尉翽溫江丞覿帛丿糸州參軍靚鹽亭尉皓仁和有政理蓬州長史慈明仁順幹蠱都水使者穎介直河南府法曹頔奉禮郎頎江陵參軍頡當陽主簿頌河中參軍項衛尉主簿願左千牛頤頮並京兆參軍頩須䪻並童稚未仕自黃門御正至君父叔兄弟衆子姪揚庭益期昭甫強學十三人四世為學士侍讀事見柳芳續卓絶殷寅著姓略少監少保以德行詞翰為天下所推春卿杲卿曜卿允南而下臮君之㣥從光庭千里康成希莊日損隱朝匡朝升庠恭敏鄰幾元淑敏溫之舒說順勝怡渾允濟挺式宣韶等多以名德著述學業文翰交映儒林故當代謂之學家非夫君之積德纍仁貽謀有則何以流光末裔錫美盛時小子真卿聿修是忝嬰孩集慕不及過庭之訓晚暮論撰莫追長老之口故君之德美多恨闕遺銘曰銘闕君諱元孫字聿修京兆長安人高祖諱之推北齊給事黃門侍郎待詔文林館曾祖諱思魯隋太子校書東宮學士皇朝秦王記室祖諱勤禮著作郎崇賢宏文兩館學士父諱昭甫高宗侍讀曹王屬贈華州刺史俱以德業才名相望史冊君即華州之元子少孤養於舅殷仲容家身長六尺二寸聰鋭絶倫工詞賦章奏有史才明吏事年十歲時叔父吏部郎中敬仲任益府法曹長史李孝逸聞君少俊請與相見座中試安石榴賦君默綴少頃郎中而從之君授翰立就不加點竄孝逸大驚尤善草隸仲容以能書為天下所宗人造請者箋盈几輒令代遣得者欣然莫之能辨舉進士素未習尚書六日而兼注必究省試九河銘高松賦故事舉人就試朝官畢集考功郎劉奇乃先標榜君曰銘賦二首既麗且新時務五條詞高理贍惜其帖經通六所以不原本闕屈從常第徒深悚怍由是名動天下解褐鼓城主簿歷登封尉與弟贈太子少保諱惟貞府君調選屢以高等同登甲科相代為長安尉翰林偉之前是老吏好以婚田之不決者試新上官君悉垛階上研墨汁數原本闕操割凡百餘道不終夕而畢縣令隴西李綰才學士也覩原本闕駭命小吏分手寫之而通不給朝廷聳歎遷洛陽丞著作佐郎太子舍人時元宗監國獨掌令誥當時以為綸言之最嘗有命召或以次進原本闕今日非也聞公喚長舍人來遂御小殿賜食因出諸家書跡數十卷曰聞公能書可為寡人定其真僞君分別以進上元宗大悅因賜藤箋筆墨衣服等物嘗和遊苑詩御札八分批答云孔門入室魯國稱賢翰墨之妙莫之與先君一覽無遺兼該故實韋安石以宰相兼庶子特相禮重宮務一以咨君事頗填委從駕至原本闕以司直用事命坊官同遊石瓮寺駐焉諸君有忌前者曰顏舍人必不行已而君辭以遽曰果爾何為妄請君默然元宗登極同列皆遷中書舍人君讓范陽盧俌俄為琚等所擠出為潤州長史遷滁州刺史按察使王志愔以清白名聞拜沂州志愔娶於顏餘慶以男求婚君拒之遂誣奏請降階奪祿其初君與執事者因闕一字官有忤至是憾焉遂黜歸田里君屏私第傲然無悶者十年與陳郡殷踐猷上谷寇泚武功蘇晉吳郡陸象先友善相見未嘗不畢景起為濠州刺史纍加朝議大夫上柱國中書令張嘉貞深相器重方引知制誥原本闕右職屬罷相不行代到風疾停家開元二十年秋七月才生明薨於絳州翼城縣丞之官舍隨子春卿任也明年葬於東京鷂店東北高村原夫人新城縣君元氏故兆異穴而堋權也文集三十卷著干祿字書一卷並行於世續祖父涉令光庭注後漢書常山之陷也沒焉廣德二年春三月二十有二日制曰故濠州刺史上柱國顏元孫懿道淳茂宏材特達傳經成業聚學為文清白著於家風問望光於銓選久膺揚歷爰寄藩條政有其方績宣其用未登大任遽迫流年九原不作郡邑存其遺愛二子象賢艱難立其名節忠能徇國孝在榮親贈以儒官揚其盛烈可贈祕書監真卿表謝今上批答云卿之先伯當代詞宗道蘊國經行推人表上宏祖德下獎門閥鄭國不亡臧氏有後雖雲雨之澤自葉流根然訓誨之方因父見子永惟盛烈式寵代官不朽者名斯為極矣嗚呼君有五子皆有才名春卿聰鋭無比早擅詞賦尤工表檄倜儻有吏能急人之急明經拔萃歷蜀縣尉長史蘇頲舉茂才異等未試充張敬忠節度判官轉翼城丞與弟杲卿曜卿從父弟允南調選同日於銓庭為侍郎席建侯所賞授偃師縣丞杲卿忠烈方正精敏有識纍至魏州録事參軍清白名聞充安祿山營田及度支判官太常丞攝常山太守祿山反誅其土門使及原本闕拜衛尉卿兼御史中丞城陷詬詈為賊所屠害乾元中贈太子太保諡曰忠節曜卿介直以信稱勤學好屬文工草隸書十五以文學直崇文館每選集必為主司所賞擢歷城丞淄川司馬旭卿美姿儀善草書允山令茂曾仁恕和厚口無擇言頗屬文詞留心詁訓嘉陵司馬孫紘少好雜書疏財重義方義尉鮮于仲通節度劒南引為判官同征閣羅鳳沒於蠻泉明穎悟孝義果鋭嫺於吏道安平尉父敬保將開土門使與長史袁履謙往來謀議授左金吾兵曹尋為賊所執舉家見陷泉明到河北乞求贖先姑女而後巳子行路哀之東京收復泣血求父尸獲焉時人以為孝感所致拜郫令有能名為崔光遠所擠終彭州司馬威明太僕丞卭州司馬季明惇敏有容止與君外孫盧逖同為賊所害贈左贊善濬勤學好屬文早卒子幹剛鋭強力公劉府果毅弟沛同遇賊害贈都水使者沛尚食奉御翹入道詡與泉明子誕同質於祿山皆被鋸殺贈贊善誕義王咨議翽道義令覿漢州參軍靚鹽亭尉珝覯未仕曾孫證右內倉曹訊兵曹詔彭王參軍皆承謀翼不敢失墜惟君德盛才茂行周業廣文可以經國道可以致君而坎壈盛明不登弻亮其時歟其命歟真卿越自嬰孩特蒙獎異且兼師父之訓豈獨猶子之恩濡筆告哀不申萬一銘曰琅琅世父明德是矩孝以仁親忠期輔主周旋禮法精究訓詁行楙圭璋文彪龍虎高標天府震耀區㝢前載原本闕千官歘覩王畿就列赤縣斯傴杕華交輝灑翰如雨洛陽毗二著作布武載筆龍樓闕一字光龜組元宗褎異闕一字發儔伍不入掖垣翻飛江滸淮沂其乂典憲斯侮望閈爰歸優游不吐名公虛左濠上爰撫方俟同升遽愆多祜一麾屢黜百贖奚補翼子多方教忠則膴吁嗟太保為國干櫓取義舍生悲今邁古皇恩自葉超贈祕府存歿哀榮幽明赫昈真卿追痛銜恤靡怙牽綴銘功恨非覼縷君諱允南字去惑京兆長安人也高宗侍讀贈華州刺史昭甫府君之孫嶭王友贈太子少保惟貞府君之第二子也少以詞藻擅名兼工草隸書尤善五言詩深為伯父濠州刺史元孫府君之所賞愛開元十五年以挽郎選糊名考判入高第授鶉觚尉後與從父兄春卿杲卿曜卿調集皆為吏部侍郎席建侯所賞重時論榮之尋授右武衛兵曹二十六年丁內憂以毀聞服闋轉右領軍録事參軍與從祖姑子劉同升齊名長又相善嘗寓書與之中書舍人孫逖見而驚歎曰古人之作尋為同升江南經略判官遷大理評事從調吏部侍郎達奚珣以書判超等薦為朝廷左補闕元宗嘗撰華嶽碑並書天寶九載令御史大夫王鉷打百本以賜朝臣家獲二本者四族而君以兩省官弟真卿以殿中侍御史居其一焉每正至朝賀宰相以下登殿者不過三十人而君與真卿王鉷法服於含元殿蹈舞而衣接焉朝覲宴集必同行列故君賦詩云誰言百人會兄弟皆霑陪與諫議大夫鄭審郎中祁賢之每應制及朝廷唱和必警絶佳對人人稱說之俄遷殿中侍御史以忤楊國忠貶襄陽丞移河東司戶京兆士曹十五年長安陷輿駕幸蜀朝官多出駱谷至興道房琯李煜高適等數十人盡在中丞田良邱為哥舒翰行軍司馬既敗猶自振矜因誦表云翰北行師未當挫衄蓋緣運數潛迫人神同棄職之人故匪翰之由衆皆默然君獨抗聲叱之曰公何得尚為賊說徵祥乎峘等因欲毆擊魏仲犀與之同罪遜詞引去不敢枝梧一座皆壯之恩詔召拜尚書屯田員外郎加朝散大夫遷司膳郎中真卿至自河北元宗給君驛至鳳翔令相見從肅宗入西京遷司封真卿以尚書兼大夫弟允臧又為殿中兄弟三人同時臺省當代無比時人欽羡焉尋封金鄉縣開國男纍加正議大夫上柱國遷國子司業寶應元年冬十一月真卿自利州蒙召至上都君遇疾巳革闕而泣曰吾忍得見汝因哽咽不自勝其十日傾逝於私第享年六十九嗚呼明日庚申葬於萬年縣鳳棲原先塋之北祔也二子穎頻皆好為五言詩真卿使奏事彭原上文章蒙擢校書郎早卒穎簡直潔巳以左衛兵曹選為侍郎崔器所賞纍授河南府士曹噫君幼而聰明長而美秀仁恕形於造次清識冠於當時善與人交篤於僚友故父執侍郎寇公泚相國陸公象先尚書陸公景融重君才名相見未嘗不移日也相國房琯尚書韋陟張倚皆篤忘年之河南陸據彭城劉餗劉秩隴西李揆河東裴士淹特敦莫逆之歡河東敬括隴西李華李涵范陽盧允畢盡常僚之好非夫親仁誠物泛愛虛巳則何以廣而能周久而益敬者矣家常有折脛鶴初真卿小年時戲書其背君切責曰此雖不能奮飛竟不惜其毛羽奚不仁之甚歟其惻隱者如此真卿終身志之於戲以君之才之美之德之義方當翼亮盛時儀型宗國道之祝喪頓我遠圖悲乎痛哉真卿孩而不天太夫人蘭陵郡太夫人殷氏親自鞠育實賴慈訓粗茲有成至若發慮學文之親立身復禮之道非仁兄之規誨曷暨所蒙且有師訓之資豈惟孔懷之戚布哀金石未究萬分銘曰莊嶽熊渾清沂駿奔英靈孕育生我仲昆維我仲昆邦家之藩孝仁是履愷悌是惇清識冰徹韶儀玉溫詞華藻絢翰墨雲繁通究理體精詳政源爰初發迹屢振瑤琨尉邑何陋評廷不冤袞衣補闕繡服榮敦神州列掾會府掌屯司膳王封回薄飛騫乃佐教胄載光儒門未登鼐鼎奄謝鴻鴛伊昔不造實賴能存下光花萼上潔晨飧微君教導曷惠拯援今既絶矣哀摧忍言何以置懷勒銘弗諼垂諸來裔翼子謀孫君諱幼輿字令軌京兆長安人高宗侍讀贈華州刺史昭甫府君之孫嶭王友贈太子少保惟貞府君之第六子也美容止有器度故小名粲焉孝悌仁和精詳禮法博涉史記漢書盡究其義理起家后土齊郎調補汝南郡新息縣主簿恪謹官次備聞修潔紀綱吏人罔弗畏慕太守趙國公王琚器君才名待以殊禮縣之庶務悉以見咨家素清貧從母之孀嫠者宗族之惸單者皆仰給焉君悉心奉養情禮彌篤哥舒之攻石堡城請君隨軍拜左衛率府兵曹參軍恩敕賜緋魚袋不幸以天寶九載秋七月旬有三日遇疾而終春秋四十八即以其月窆於萬年縣鳳棲原先塋西北祔也夫人陳郡殷氏太夫人蘭陵郡太夫人充曹州司法麗正殿學士踐猷之元女高士永寧尉寅之女弟高士壽安尉亮之家姑也我伯舅聰明純粹博學稽古相國陸象先祕書監賀知章臮我世父濠州刺史元孫府君友善皆呼為五總龜千年而五總問無不知也太夫人以君四世殷之自出原本闕失其新命君娶之既而遂焉成先志也夫人含風孤映當世以廣德三年冬十月二十一日棄牀帳於江陵仲子鳳翔參軍顗臮季子頓不幸早夭大歷四年夏四月壬戌季弟真卿命君孟子前武功丞頂叔子左千牛願度遠日而合祔焉嗚呼君以全德之姿丁休明之運宜其振翼層漢濯鱗清流而位不準才德淪於天吁足慟也謂之何哉銘曰兵曹樂只於穆不巳華州之孫少保之子溫溫體度嶷嶷容止非禮勿言唯德是揆人倫領袖宗廟簠簋佩服典常顓精文史汾睢歲事新息入仕忠益上官總持綱紀奉養從母必窮珍旨綏族糾宗㣥居咸喜哥舒授律石堡俟倚命我翊戎寵章斯被鯤溟未運鴻漸伊始不與之年云如何里安放安仰嗣徽昭美合葬既遵從周有斐于嗟窘束不獲躬視寫恨立銘告哀千祀君諱允臧字季寧京兆長安人曹王晉王侍讀贈華州刺史昭甫府君之孫嶭王友贈太子少保惟貞府君之第八子也孝悌惇敏有才幹局力所居以吏道稱解褐太康尉太守張倚採訪使韋陟皆器其清嚴與之均禮天寶十載制舉縣令對策及第授延昌令君悉心致理遠者懷而邇者安採訪判官賈至王倫言於使清白名聞會安祿山反遂止潼關陷太守李揖計未有所出君勸投靈武至寧朔屬同羅招六蕃府絶不得通肅宗聞君誠至德初追赴彭原行在所拜監察御史賜緋魚袋遂承任使推劾不避強禦中官邢延恩等皆得罪焉尋充朔方兵健衣資使郭公子儀請為判官清渠之衄也賊兵四合矢下如雨君挺劒躍馬奔之得出至武功知縣御史及吏人無敢住足君徐坐示暇於大逵然後少有至者因令具頓以候今上上大驚喜引之同食河東人郭俊邢韶翻城歸順郭公俾君先入郡以安恤之郭公既至軍郡之事一以咨君隨方決遣無不欣愜有郡人嘗為賊將崔乾祐判官郭公欲加刑君領證左右以入救遂貰之二年秋八月遷殿中侍御史真卿表謝肅宗批答曰卿昆季連擢才聲並振俱守寒松之操允執後雕之心久冒艱危大知難奪委以憲臺之長克申白之威厥弟之遷亦為官擇宜相勸勉各樹能名當代榮之京城收與崔禕銜命宣撫都人大悅出為櫟陽令録事有奸犯者君立榜殺之豪強震恐一縣屏息遷侍御史以當為郎以兄在南省君遂撝揖牢讓轉大理正用法精詳或以賄財執事而妄訴者卿丞莫能止君獨召訊詰責立服衆皆為君危之寶應中復拜侍御史兼太子中允廣德三年冬十月拜江陵少尹又兼侍御史荊南行軍司馬君清正卓立特為軍州所敬既而代到屢詔徵入未得行大歷三年冬十一月五日乙亥奄忽感暴疾終於私第春秋五十九其兄真卿聞喪哀摧甚去手足乃命姪男前武功丞頂諗於其妻奉明縣君韋氏其孤前京兆參軍頩臮䪻禺等以明年夏四月壬戌歸祔君於上都萬年縣鳳棲原先塋之北禮也嗚呼君姿質王褱博襟靈沈粹心根德義躬服孝仁理以居家果於從政與人深一定之分臨事多獨見之明屢佐戎旃必聞忠益六登憲府皆推直諒信可謂朝之正人儒之君子未申殿邦之用遽齎入冥之恨知與不知孰不嗟悼真卿釁深祜薄門祚衰陵同生之人零落皆盡唯形與影相視不足豈圖不造永訣於斯長號立銘泣盡繼血其辭曰嗟嗟豫季特稟純粹曰孝與仁因心則至友由悌睦禮用和貴蛇蛇美言嶽嶽高義行絶枝葉心無頗詖經德秉彞拔萃出類環衛入侍牽絲作尉泛愛與人檢莊蒞事一作象雷六為天吏豪右宣威憲臺增氣㣥公虛左天子思媚守挹讓郎得仁奚愧司刑棘寺理法昭賁儲闈載升亞尹斯位七德繄理萬人攸蔇黃髮未登青雲方致云如不淑奄忽云諱國失重寶家摧脛臂以此思哀我生奚寄反葬何所先塋之次濱水東流終峯北摯勒名金石威烈無墜公諱杲卿字昕京兆長安人也北齊黃門侍郎諱之推之來孫隋太子校書東宮學士皇朝秦王府記室參軍諱思魯之元孫著作郎崇賢宏文館學士贈虢州刺史諱勤禮之曾孫高宗晉邸侍讀曹王屬贈華州刺史諱昭甫之孫濠州刺史贈祕書監諱元孫之第二子也公方正精敏有清識周旋有則進止閒詳起家江州司法轉遂州嘗為刺史所責公守正不為之屈時人稱之遷鄭州司兵開元與兄春卿弟曜卿從父弟允南俱從調吏部皆以書判超等同日於銓庭為侍郎席建侯所賞翰林拭目焉擢授魏郡録事參軍當官正色舉劾無所回避採訪使張守圭以清白聞遷范陽郡戶曹安祿山雅聞其名奏為營田判官光祿太常二寺丞又請為度支判官兼攝常山郡太守天寶十四載冬十一月祿山反范陽至稿城公與長史袁履謙同謁乃矯授公紫履謙緋因令崇州刺史李欽湊以兵七千人守土門公罷歸途中指章服諷履謙曰與公受他此色如何履謙亦感激之士遂與公定謀翻之恐事泄潛使男安平尉泉明往來計議又使西通王承業北結賈循循敗族滅屬祿山使其心手高邈往范陽公使姪壻稿城尉崔安石密伺其歸以圖之冬十二月二十日以私號召欽湊未至會祿山害東京留守李憕中丞盧奕判官蔣清傳首脅並海諸郡前二日真卿以平原太守斬其使令外甥盧逖以購祿山敕送於饒陽常山後二日逖至公悲喜不自勝猶未敢宣示其夕欽湊至公俾參軍李峻馮虔靈壽尉李栖默臮土人翟進玉縋於城南門密令驛長蔡行儀醉以酒而斬之履謙入告公與相持而泣喜其事之集也遂使峻栖默開土門又斬其副使潘惟慎是夜高邈回宿蒲城公命馮虔翟進玉崔安石馳捕邈繫其肘而縛之虔領赴郡俄頃醴泉驛候騎報何千年發趙郡安石以進玉馳襲而擒之如高邈遂紿以榮王琬哥舒翰官軍二十萬入土門告於列郡遂使郭仲雍詐為先鋒以中官領御騎六十徇以南諸郡於是趙郡殺賊刺史馬道貞巨鹿殺劉柸廣平殺郭子昂曲州殺清河太守崔審交皆以其首至先是真卿守平原而饒陽前聞景城樂安博平清河七郡皆相與拒賊至是博陵上谷文安信都巨鹿廣平魏趙鄴與常山十郡皆卻為國家守乃使張通幽以兄通儒相賊乞隨泉明以自雪至太原與尹王承業同惡竊為已功留泉明等不遣承業從弟隨中官入奏皆蒙超獎拜公衛尉卿兼御史中丞追赴京以履謙為太守深為司馬泉明為左金吾兵曹制書未至春正月賊使平盧兵馬使史思明寇諸郡思明既來攻六日城平糧井皆竭遂為賊所陷男季明外甥盧逖皆遇害遂以公履謙至東京祿山讓公曰我擢汝為太守何負於汝而乃反乎公曰吾代受國恩官職皆天子所與汝叨受恩寵乃敢悖逆吾寧負汝豈負本朝乎臊羯胡狗何不速殺我乃繫公於天津橋南柱令割肉以自噉公詬詈不巳遂鉤以斷舌問更敢爾否公猶盛氣含胡以應之還被支解而終觀者痛心焉楊國忠受通幽詭說賈深又不證明竟不蒙恤問乾元元年夏五月二十八日肅宗乃追贈太子太保子姪為賊所害者八人孫誕姪詡先質於賊皆被鋸殺至是贈季明詡左右贊善誕義王咨議姪子幹都水使者沛尚食奉御頗洗馬逖鄭王友從父甥博野尉沈盈大理正封夫人崔氏清河郡太夫人授泉明郫縣令男威明太僕丞姪男翽漢州司馬孫證左內倉曹訊兵曹諡公忠節從父弟國子司業允南洎真卿表謝蒙批答曰自逆胡猖狂入我河縣所在官吏多受迫脅卿兄以人臣大節獨制橫流或俘其謀主或斬其元惡當以援兵懸絶身陷賊庭傍若無人歷數其罪手足寄於鋒刃忠義形於顏色古所未有朕甚嘉之盛烈既冠於當時寵名宜及於泉壤初公被懸首於右金吾街樹有張湊者哀其髮收謁元宗俄見夢云禦捍處多兵馬少元宗哭而設祭焉後湊以髮至夫人疑之憑牀而哭忽聞聲如鞭牀者發箱跳而前夫人方駭信之明年春正月葬於京城鳳棲原先塋西北禮也昔七代祖中丞府君慟絶於梁武五代伯祖御正府君抗璽於隋文而公精貫白日義形宗社今又繼之為不隕矣嗚呼公與真卿偕陷賊境懸隔千里稟義莫由天難忱斯小子不死而公死痛矣哉銘曰太保烈烈抗茲忠節殉國義形見危身殺元宗杖信售詐凶羯寵極災挺稱兵向闕河朔鼎沸潼關晝閉天下寒心王旒若贅蛇豕十萬萃如霜雪公以眇身毅然奮發逆黨株送土門披抉人知效忠國用不臬厄恩寵三座榮加九列王命未臨孤城巳滅身縣鋒刃口詈不絶先聖感忠保儲贈揭刻諸金石思表墓綴遠莫致之留斯江澨日月有既徽猷無缺夫騏驥千里之足踣於庭唐之內鴻鵠四海之志儕於墜滲之羽此倜儻奇偉之士所為歎息者也取之於人在於郭君矣君諱揆字良宰太原人也郭本虢叔之後春秋臮漢細侯得政事之美有道冠人倫之目素絲作詠青溪招隱信為多士宜稱盛族五代祖昶隋驃騎大將軍開府儀同三司高祖澄皇朝朔方道大總管涇鄜坊慶丹延夏七州刺史贈荊州都督諡曰忠曾祖某朝散大夫太子洗馬祖義朝議大夫贈鄭州刺史父虛巳銀青光祿大夫守工部尚書兼御史大夫蜀郡大都督府長史持節充劒南節度支度營田副大使本道并山南西道採訪處置使上柱國贈太子太師諡曰獻君生而聰明不為戲弄之事長而清峻罔雜綺紈之流辨對則江夏之童志意則山東之妙大夫府君以其于氏之出故幼名封奴嘉有應務之器故長字良宰蓋取待封宰割之義也觀其言必顧行動必由禮讀書不取其糟粕為仁罕忘於造次亦足以保其嘉名楚之正則漢之臺卿乃其比也年十七崇文生明經及第侍郎韋陟揚言於朝稱其稽古之力許其青冥之價後調集侍郎李彭年嗟君所判足冠後生擢才子於公庭賀大夫於私第美聲洋溢時莫與京授大常寺太祝加敬蒞事陳信正辭每巡陵及郊必有歌詠潘河陽藉田之賦顏光祿明祀之作復見前賢之致矣無何改授河南府參軍天寶五載大夫總渡瀘之師繄君奉循陔之養南中污下遂得氣疾先大夫憐其寖劇命訪秦醫太夫人懼其不起繼自蜀至何神不禱靡藥不嘗依親自強望父增歎以天寶八載二月十八日終於安興之私第時年二十四皇帝聞而悼之贈祕書丞嗚呼斯人不起子丕未識亦可為長慟者矣君子曰夫孝弟之至潔矩之道文章之絶周旋之儀可謂成人矣方將培雄風罩白石憐乎得二幾乎第一是以其疾即御醫坐門其亡即天使歸賵陳師境上推以雨露之私修文地下贈以蓬萊之職弔客多其文行操誄盡於作者以五月二十一日葬於首陽鄉大塋之側君志也先大夫懿其天姿親疏行狀敘其參元之美歎其老成之風方崇南峴之碑以慰西門之感伏滔受遇為人父也若斯祈奚至公其知子也如此斯文未建頽山遂及太夫人東海于氏淩虛墜翼開緘悼心望汝絶歸來之期抱孫有無時之哭遂成刊刻之意以寄零落之哀銘曰粲粲門子菲菲國香家傳玉樹人詠金相風流小褚才貌潘郎一經自達六義名揚聞於密啓置此周行為子道備從親路長既銘絶壁亦奉垂堂霧露成病膏盲遂亡天向京兆墳歸洛陽江堙初流水毀寒霜茫茫蔓草蕭蕭白楊苦月墳上豐碑道傍披文相質誰不沾裳
