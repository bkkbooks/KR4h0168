front:
  text: 全唐文欽定全唐文卷三百六十一大悅太原人
  hash: sha256:6318c3bb033788de2f57db6834feaa954dfe59cea952d1566123947969f9911d
  markers:
  - {type: head, offset: 14, content: 王大悅, id: KR4h0168_NFKB_361-h1, level: 1}
body:
  text: 敘曰法所務善示儀生念物莫堅石留形則多伊童丱之增沙彼豐家之巖寶不孟不季非泰非約建茲浮圖於門右者鄭氏字元泰今范陽人也崇中宜利用廣蓋所以兼仰正法惠浹多生俾臧與嘉不潰惟永乃竭産充賈罄工剬奇璞散良效形都信美素璵鮮色皓瓊級之峩峩黃金明輝爛寶層之擢擢東旭銜珠而更淨南風動鈴而不喧神儀護門而雄雄威如聖象端室以穆穆允若庶幾乎上帝萬壽先人百福夫蠢之類凡生之儔莫不覃茲利有如是木易燼滅土亦塵散惟石之永瞻其有恆繄法之堅念茲無替銘曰高塔峩峩示延遐矚多生攘攘動善㣥觸茲設茲剎無礙無疆其福豐衍其資廣長彼石惟堅我性亦定永永不滅視以知正蒙開元五年進士揉為耒剡為耜取其象也遠矣農為本食為天惟其利也大焉聖人利器致豐躬親莫重於稼穡軌物勵俗敦勸克厚乎率先於以奉神祇昭報之誠達於以祈社稷孝享之德宣則躬耕之義也從古以然皇帝勤惟國本欽若人天所務惟農順動而取諸豫所寶惟穀時行而應乎乾洎正月之吉日將有事乎昊天列千官於近甸屯萬騎於遐阡當是時也其祭不戒而宿設其工職競以先後大禮備兮和樂陳嗇夫馳兮庶人走帝乃服蔥犗乘御耦我疆我理禮正於三推必躬必親義存乎千畝四輔冢宰六卿近臣大夫師長之族都鄙華裔之人聖有作兮萬物咸覩人胥效兮天下歸淳且圖匱者於其豐防儉者於其逸有備所以無患克勤是用終吉三推之禮廢則倉廩以之虛肆眚之恩廢則簡書以之佚欽哉欽哉能事斯畢矣然則農功可大農扈允臧以農為本兮國有常令以農率下兮人知向方亦既奉宗廟亦既備蒸嘗一人垂訓兮萬國昌罔有迷於日用于胥頌美兮聲洋洋泉在寧陽城南二里古老傳稱娥女美容色善歌舞度曲此地化為泉生於巖石間垂灑如淚故云耳水之裔巖之偏孌彼娥女瀏為沈泉伊昔巧笑淑靈穠華艷色赬唇發而寥亮素袖盤而掩抑故能傾北方掩南國超俗絶世神窮化極於是淒兮雨濕黯兮雲沈銷玉貌與紈質冶瓊姿及蕙心舞成水態歌入流音臉眇眇以波盡睂娟娟而月深觀其岸草翠積崖苔綺映列山光以泛灔懸樹色而涵靜引耀冰玉貞明石鏡能含上善之心不改至柔之性若乃蠲祀典戒良辰蘋藻前奠笙竽下陳莫不淋漓玉集滴瀝珠新聲嗚咽而成韻淚闌干而向人及夫嚴風歲晚熾景炎節水壯河沈流枯海絶則必溫溜冬汛寒光夏冽異黃泉之下冥殊流水之東閲噫化將云盡奚假物而獨靈道或既存苟得仁而何懟靡度可持安知榮悴望神光兮水潛鑒化迹兮山閟搴杜若以誰與弄潺湲而增思仰彼元化稽乎典墳驗休徵於列辟知至理之有君遠方圖物不寶旅獒之貢靈契潛感豈惟鳴鳳之聞降百祥之昭晰和四氣之氤氳粵有奇獸言彰聖德賁然來思載白其色才麌麌以呈貺不呦呦於野食謝仙家之騰騎歸御苑而棲息於是上囿幽間禁林清祕炯如玉立皎若霜萃場町疃於池沙影光芒於山翠皇心愈兮德所感衆目駭兮榮其至畫輻為飾能隨太守之車緣繢稱珍可薦王侯之位且夫徑角昭勇縞色呈鮮應皇家之盛德當聖運之承天足使殷帝之狼恥擅銜鉤之瑞吳門之馬慙當曳練之妍其來也則天祚明德神推有仁故以奇質表瑞非為育珍其擾也則一人有道四海無拂故知以惠性含和寧將玩物宜其禎祥遠暢聖範光充保康功於勿伐彌大命於無窮賦曰元化凝兮神功就瑞獸格兮充君囿質皓耀以霜潔角淋漓而玉秀恥射兔於東遊笑獲麟於西狩惟皇靈之介福固永命而何究惟帝王之應運孰無賢而能作雖道洽於唐虞尚翹翹於林壑彼嘉魚之發興實思賢而共樂蓋風俗之盛衰以廢興為善惡惟魚在淵兮其迹惟深賢在野兮其道惟默植忠信以自保俟休明而觀國屬王度之清夷復何求而不得然後為衡為量是效是則成天下之亹亹定衆人之惑惑國家化造往古政在求賢釣嘉魚在丙穴得奇士於滋川故開闢之功作之於我太平之人匪降自天余是以知玉帛之禮至矣嘉魚之詩大焉若乃日旰而食思彼賢者念茲在茲誰與天下心不忘於寢處足流詠於風雅斯蓋嘉魚之義故可得而述也重元官通事舍人劉向云列子者鄭人也與鄭穆公同時蓋有道者也其學本於黃帝老子號曰道家道家者秉要執本清虛無為及其理身接物務崇不競合於六經而穆王湯問二篇迂誕恢詭非君子之言也至於力命篇一推分命楊子篇唯貴放逸二義乖背不似一家之書然各有所明亦頗有可觀者且多寓言與莊周相類故太史公司馬遷不為列傳張湛序云其書大略明㣥有以至虛為宗萬品以終滅為驗神慧以凝寂常全想念以著物自喪生覺與化夢等情巨細不限一域窮達無假智力理身貴於肆任順性則所之皆適水火可蹈忘懷則無幽不照此其旨也然所明往往與佛經相參大歸同於老莊重元以為黃老論道久矣代無曉之者咸以情智辨其真宗則所諭雖多同歸於不了所詮雖衆但詳其糟粕莫不以大道元遠遙指於太虛之中道體精微妙絶於言詮之表遂使真宗幽翳空傳於文字至理虛無但存其言説曾不知道之自我假言以為詮得意忘言離言以求證徒以是非生滅之思慮因情動用之俗心矜彼道華求名喪實我開元聖文神武皇帝知道為生本至德非言廣招四方傍詢萬宇冀有達於元理將欲濟於含生小臣無知偶慕斯道再承聖旨重考微言謹尋列子之書輒詮注其宗要竊懷知此非欲指南儻默契於希夷猶元珠於象罔是所願也非敢望焉論曰夫生者何耶神與形會也死者何耶神與形離也形有生死神無死生故老子曰谷神不死死而不亡者壽也然此之死生但約形而説耳若於神用都無死生神本虛元契真者為性形本質礙受染者為情至人忘情歸性則近道凡迷矜性殉情則喪真是故隳支黜聰道者之恆性貪生惡死在物之常情不矜愛以損生不祈名而棄寶故莊子曰為善無近名為惡無近刑緣督以為經可以養生可以盡年也代人以不求於名則縱心為惡此又失之遠矣何則人笑亦笑人號亦號人之所畏不可不畏復安得為不善耶是知神為生主形報神功神有濟物之功形有尊崇之報神有害物之用報有賤陋之形故神運無窮形有修短報盡則為死功著則別生亦由清白者遷榮貪殘者降黜約位而説也形不變則位殊約神而辨也神不易而形改至人了知其道故有而寶真真神無形心智為用用有染淨凡聖所以分在染溺者則為凡居清淨者則為道道無形質但離其情豈求之於冥漠之中辨之於恍惚之外耳故老子曰吾道甚易知甚易行而不能知不能行其故何也代人但約形以為生不知神者為生主約氣以為死不知神者為氣根繫形則有情迷神則失道封有惑本溺喪忘歸聖人嗟其滯執之如此也乃歎夫知道者不易逢矣故曰千里一賢猶如比肩萬代有知不殊朝暮者惜之深矣豈不然耶儻因此論以用心去情智以歸本損之又損為於無為然後觀列子之書斯亦思過之半矣筌自號達觀子官荊南節度副使仙州刺史少室山達觀子李筌好神仙之道常歷名山博采方術至嵩山虎口巖石壁中得陰符本絹素書朱漆軸以絳繒緘之封云魏真君二年七月七日上清道士寇謙之藏諸名山用傳同好其本糜爛應手灰滅筌略抄記雖誦在口竟不能曉其義理因入秦至驪山下逢一老母髽髻當頂餘髮倒垂弊衣扶杖路傍見遺火燒樹自語曰火生於木禍發必剋筌驚而問之曰此是黃帝陰符上文母何得而言母曰吾受此符三元六周甲子矣謹按太一遁甲經云一元六十歲行一甲子三元行一百八十歲三甲子為一周六周積算一千八十歲年少從何而知筌稽首再拜具告得處母笑曰年少顴頰貫於生門命輪齊於月角血腦未減心影不偏性賢而好法神勇而樂知是吾弟子也然五十六年當有大厄因出丹書符冠杖端刺筌口令跪而吞之曰天地相保乃坐樹下説陰符元義言竟誡筌曰黃帝陰符三百言百言演道百言演法百言演術參演其三混而為一聖賢智愚各量其分得而學之矣上有神仙抱一之道中有富國安人之法下有強兵戰勝之術聖人學之得其道賢人學之得其法智人學之得其術小人學之受其殃識分不同也皆內出於天機外合於人事若巨海之朝百谷止水之含萬象其機張包宇宙括九夷不足以為大其機彌隱微塵納芥子不足以為小觀其精微黃庭八景不足以為學察其至要經傳子史不足以為文任其巧智孫吳韓白不足以為奇是以動植之性成敗之數死生之理無非機者一名黃帝天機之書九竅四肢不具慳貪愚癡風癇狂誑者並不得聞如傳同好必清齋三日不擇卑幼但有本者為師不得以富貴為重貧賤為輕違者奪二十紀河圖洛書云黃帝曰聖人生天帝賜算三萬六千七百二十紀主一歲若有過司命輒奪算算盡奪紀紀盡則身死有功德司命輒與算算得與紀紀得則身不死長生矣每年七月七日寫一卷藏諸名山巖石間得算一千二百本命日誦七遍令人多智慧益心機去邪魅銷災害出三尸下九蟲所以聖人藏之金匱不妄傳也母語畢日已晡矣曰吾有麥飯相與為食因袖中出一瓠令筌取水筌往谷中盛水其瓠忽重可百餘斤力不能制便沈於泉隨覓不得久而却來已失母所在惟留麥飯一升筌悲泣號訴至夕不復見筌乃食麥飯而歸漸覺不飢至今能數日不食亦能一日數食氣力自倍筌所注陰符並依驪山母所説非筌自能後來同好敬爾天機無妄傳也昂高平人與李華同舉進士魯大夫登大庫觀上元端北辰以正象望南極之穹天辨列宿之高映見丈人之獨懸色熒煌以奪目形皎潔而臨邊候德至而浮彩副時和而應足廠墨爾其元鳥司分蒼龍御歷節春秋而隱見當丙丁而的皪且遺光以表慶亦應祉而純錫故經曰其國泰其星明天垂象物與禎循晷度而靡替順璇衡而則呈其座也一符帝者之一位其義也壽契蒸哉之壽名元武宵中偵西陸以凝質白藏氣杪直南郊以散精夫有開必先無福不應若政事中律則嘉祥叶證五緯分影而交朗九月騰華而吐孕此乃王澤宏天瑞作恆星轉耀而同煥布景搖輝以相薄初升穹昊月午而孤燭猶然末映疏林夜久而圓珠未落景貺繁集靈機衆夥臣望氣以敷奏君向陽而拱坐雖戩穀而自天實休徵之在我騂芒下射滅草莽之飛螢紫焰旁融掩榆關之流火老人彰矣成此乾文老人出矣贊此明君書玉牒以垂範紀緗圖而播芬自古為天官者莫不察時變紀殊尤唐昧擅譽於南楚史佚專美於西周宋則子韋遐鑒鄭乃裨竈深求殷馗縱眺識曹公之肇迹李郃凝目知漢使之將遊余非曩昔之㣥彥愧懵學於前修徒循甘石之遺旨願獻祜而歸休天生蒸民而樹之君夫為國者當建宗社廣敷聲教尊其威靈儼其容貌其惠也遠浹其仁也普淖言靜而可以底綏言動而無所屈撓令四海惟精惟一俾萬人是則是效安有臨伐木而棄其斧將涉水而投其棹童子猶知其不可况天下之龍豹初虎視八荒鯨吞六國攻必取戰必克所往而梟其渠帥所敵而斷其銜勒起翦之功逞蘇張之詐塞招星紀之南伐天街之北賞尉繚以為忠讜誅文信以為殘賊將大寶而康寧謂神仙之可得一何壯哉及其浮江沉璧登山紀石徵茅濛為却粒之符遣徐市為求真之客殫人力為馳道鑄兵刃為金狄方欲肆其暴露方欲窮其轍迹鬱興閭左之徭大起阿房之役亦所以坑其儒士亦所以燎其經籍聞祖龍而非寤逢巨魚而必射不知望夷之兆未覩沙邱之厄又何謬歟天降圖籙言勦其辜惡貫以盈禍胎必膴載鮑之氣俄徹夢神之應聿徂意靡察於太子尚勞師以備胡人且愍於蒙將我獨憐此扶蘇廢至尊之丕烈任姦邪之逆謀將欲稱始帝而歷萬代卒宗滅而身屠王祿盡矣誰定其危天之所壞人不能支既同信於望夷安肯從於李斯生且替其遺命死徒華其葬為嗚呼驪山之隧其庸幾年上周五里下錮三泉罄珠璣之布濩盡金石之雕鐫匠人勞而不償反生埋於鬼埏狐兔穴而塵積牧豎焚而火連嗟拔山之壯氣成拱木之寒煙享祀輟矣疇相恤焉百二之襟帶莫守數仞之邱墳巍然何德之衰絶伯翳之餘業何力之競為劉炎之著鞭枝葉將落本必先顛苕折巢覆胡能卵全是知不有廢也後王安得而處旃水濱父老以漁弋為事常持釣緡荷矰繳旦浮瀍澗晚泝伊洛亂平漵之磷磷步清流之鑿鑿匪畋魚以為務將釣國而為託異戕忽而害生時自斃而方搏亦猶守兔者目注於盧犬挾彈者志在於黃雀斬長鯨而四海宴如得巨魚而千里饜若夫一舉而擒兩固功全而利博同不狩而獲多齊不耕而自穫訝彼老蚌含胎孕明鷸是翔禽翼迅體輕或依岸而開合或遵渚而飛鳴既相遇於茲地亦相殘於此生鷸以利嘴為銛鍔蚌以外骨為堅城鷸以蚌為腐肉可取蚌以鷸為微禽可營鷸曰今日不雨必剖蚌之腹蚌曰明日不出必喪鷸之精並相持而坎難俱莫知其困并彼漁父聞而造曰危哉二蟲吾見爾命之將絶吾知爾力之已窮胡不潛泳於深水胡不乘高於大風何故枯駭於波際何故落翮於沙中乃攜以俱歸釋此雙疾利其美用取其形質鷸有羽兮彩映華冠蚌有珠兮光照巨室雖假物類以為用誠亦辨説之良術莊生寓語於前古是用廣之於今日匠人度有山之梓相文木之理既因性而是度又從繩而可擬故輪桷適任棟梁資始陰陽之體叶時櫽括之形中軌飾其象乃圖之以鳥獸諧其音必均之以宮徵苟可擇於棫朴亦可殫夫梓徒觀其破擁腫斫瑰材攢節迸集斜文洞開蜀柿落而雨足交灑郢斤運而風聲飇來伐之丁丁奐蹙貍之班首斫之士冖柘士冖柘碎空穴之青苔巧無匪制庸無所施因心則達觸物能為初會方以成矩乍投圓而得規削斫同功準量成類方資剞劂之力乃作馨香之器厥若選德以序辨官以位誠當正直而無頗亦何患乎綱紀之紊墜小既以此大無不如文公立號以化洽康叔省功以慎儲仁義有常剛柔貴識其虛實寬猛相濟勤苦務知其疾徐教在洽人毖於出令亦猶代大匠斫罕或不傷其性俾夫來者式遵前聖且修短得喪亦奚其為政森彼灌木工則度之有倫有要念茲在茲展矣君子如何勿思思不越乃心逸於人也明其采章於木也須其丹漆瞻濟濟之榛楛懿彬彬之文質雖非班扁之奇妙敢獻斫輪之良術垂象者元上昭乎天廏天駟體元者聖下列乎廋人校人驥稱其德亦已遠矣願言馬之志曾有意乎粵若乾道為良坤元利牝駒從渥水駿發中廬屈産貴其能鳴雁門多其美脊豈止宗生冀北族施汧西而已哉自相士運其天機孫陽明其骨性秦贊涖其前後許衛詳其毛色悲伐在其股膺寒管議其唇齒麻朝訿其頰胲女厲辨其目眸昔軒轅得之過寒門穆滿得之遊崑崙周王得之平東鄰漢帝得之定西秦我高祖得之四至我開元得之五輅備敢問毛蟲三百六十其誰力多於是乎夏殷以還經傳莫紀周制廏馬始頒厥官凡十二間馬三千四百五十六始皇吞并宇內六萬騎之國馬盡歸秦漢武大修甲兵崇飭戰馬至四十萬匹是多乎哉自魏及隋天下騷動疲勞死轉數不足徵我有唐之新造國也於赤岸澤僅得牝牡三千匹命太僕張萬歲傍隴右馴字之四十年間孳息成七十萬六千匹屬張氏替職圉師敗官馬之教駣日失其序逮開元初唯得二十四萬匹至十九年復成四十四萬匹今之盈縮亦不甚過上耕藉之明年命我邠公典斯馬政公齊其飲食視其良駑廥芻庌涼綱惡去害天子以公有伯翳宜生之德爰錫土田日磾善養之功真堪宰相即召公入掌三事外司百揆調飪鼎實緝熙帝繇夷吾果理於高徯咎單諶暢於伊尹帝曰若豫邠之後亮采惠疇僉曰元祐帝曰俞咨祐汝作小司空兼干攴牧圉李公言成允令才實允宗恪居本朝能率大戛載習載步禾崔之秣之疏穢鎮浮受劑聽訟匪燒匪剔斯馬斯才荷天之寵未可涯也判官尚乘奉御長孫勗壽安尉賀蘭弼華陰主簿常冀並心懸規鏡家韞賜書投刃靡全應機立斷侶昌門之驂乘行翼聖仙偕子况之能官坐登卿相有原迓浦非大而何雅所謂愷悌君子干祿愷悌信矣先是國家以岐山近甸邠土晚寒寧州壤甘涇水流惡澤茂豐草地平鮮原當古公走馬之郊接非子犬邱之野度其四境分署八坊其五在岐其餘在三郡保樂第一蘇忠主之甘露第二劉義尸之南普潤第三田敬董之北普潤第四邵業監之岐陽第五李行守之太平第六馬慶尹之宜祿第七曾睿領之安定第八李仙正之八人者或折衝禦侮或果毅昭戎射御不違始終惟一又命朝散大夫都苑總監韋績總以統之韋公敢行利物克壯遠猷悉心效官盡瘁事國口占諸吏躬親百為攻特執駒禁原䖵驅維蟲撫和趣馬慰薦扈人陳損益以示其方明賞罰以防其慢立封準以課其程均衆寡以節其宜告之以畏威申之以誘掖曰善而筐蜃辭而纓纕除而茲翦而蓋皆當循爾職制無使我馬元黃抱公絶私匪怒伊教君子曰韋公之雙下如此欲辭福祿得乎人從話言馬賴調豢將蕃其類必謹其初故春祭房星尊祖也夏祭先牧尚養也秋祭馬社敬乘也冬祭馬步存神也然後時其出入偵其肥羸一其種性殊其皂櫪旌別淑慝無相奪倫試言夫名且曰獻狀其名則汗血山子桃驂緑耳金喙騰黃騶吾吉光蒲梢啓服野麋娥鹿白蟻雞斯蜚鴻母兒遺風騕裊茲白鐵離項王之騅符主之騧桓氏之驄晉侯之駮魏公絶影唐國驌驦劉之的顱呂之赤兔其狀則八尺之戎七尺之騋六尺之驕三尺之果下文臂花肩陰脣白顛握踠作足昆蹄素懸縞形如練紫目如電有駹有騱有句羽有驠步馬騇異㣥驪騵亦分散如摛錦聚若屯雲若乃審其容貌觀其尾鬣司其正骨鑑其回毛膺為宜乘肘為減陽幹為茀方背為闋廣水火又明城郭又張逸躍翹陸走參走覃局顧升甗齕草降阿飲沱騤而翔馺而走如龍如彪或寢或吪驫至特立仰鳴俯噴威儀變態不可談詳田事既昭軍容大備有馬如此何憂乎戎由是判官長上果毅都尉成公雅貞尹承順兼諸寮吏及四郡齊人八坊長戶因雜然相與謀曰天子亭育我邠公覆露我李公司牧我韋公噢咻我君臣同德其利博哉若不毛舉數事指敕大較雖隸圉之後將不食吾餘且保樂者隋石門馬坊也其舊制褊狹多歷年所棟折榱摧聵牆填塹甘露先置在九成苑外土良薦豕美不逮苑中今茲數公得請於帝有詔令新保樂徙甘露所云創葺許用正錢今則量抽掌間供飼國馬數內商榷納其資課回給工人計一歲省庫錢七百貫有奇以約財裨國其利一也甲令曰諸坊馬每年四月十一日停料野放今則以三月中候陽崖墳盈春草先長便停藳穀俾逐川原計一歲減菽粟四千石箕秆三萬圍徯來年之用以隨時豫蓄其利二也八坊營田一千二百三十餘頃析置十屯密邇農家悅來租墾王在京邑則稅其生芻天旋洛師乃藏厥嘉實歲中收貯二萬五千石薪蒸倍之以安氓盡地其利三也又緣馬所須羈絆翦刷釜鑊畚帚注藥灌劀之物義疀滌除之器比年皆旁勞州縣長度公錢誅求無時不給其用寖以承弊人多懼憂今則權差夫丁率自采造成二萬六千五百三十石升枚具歲中省百姓供費三千貫以柅煩激惰其利四也內廏馬每年有瘠者病者老者疲者擇其不任者以頒諸坊則必餧之艾之行之節之俟其跳梁俟其充腯而後入之以內癯起廢其利五也是五者有仁人焉有王政焉何獨師古始為成憲則知從邠公之教可以阜從李公之法可以經從三判官之幹蠱可以事事無留從韋公之訓詞可以孜孜不怠古者有勞於國則紀之有功於人亦紀之里克賦在坰之頌燕公篆監牧之作吾從二史臣之後安敢墜於斯文其詞曰天王乘玉兮德至山陵澤馬於峊兮屢惟休徵君命臣力兮庶績其凝八坊載就兮畢來斯升岐山之下兮田疇好涇水之將兮多媺草繚垣墉兮積芻藳天馬來兮從東道㣥紫燕兮駢緑蛇骨象奇兮歸帝家毛御風兮蹄踐雪舉籋雲兮低噴沙既伯既禱兮無災害有駜有容兮真沛艾縞身朱鬣兮又白顛耳臼兒影長鳴兮聲造天今安匹兮龍為友吾君馭兮壽千年頌開元朝官荊州司馬先意夙傳餘慶生亦逢時章綬斯榮位崇多士箕裘不替代掌百工韋丞相之高風鬱然繼軌顧侍郎之嘉植貽厥有憑既而事因地勢言從天爵雖於公府之間尚有私庭之禮父子不宜同席古典有諸居官直欲易廳今則何稟索和中和産德純孝為人親之所安類曾參之至性生無所養同子路之嗟貧定省切南陔之心殷憂有北門之興精誠所至動於鬼神吉夢有徵啓茲靈貺遂使鍾盈積粟自能貯於西籬庾得如坻無假事於南畝動天地而降福集人靈之休慶美劉殷之孝行再覩於茲伊索氏之鄉人一何狂簡天之所賜不合納官告者誕詞固宜反坐
