front:
  text: 全唐文欽定全唐文卷六百三十一呂溫七
  hash: sha256:8153dc5a197ecbb22b7e9d0d1329b90945fb4934a39e3cc95f659129f9ebe2a9
body:
  text: 有唐貞晦先生廣陵郡棠邑鄉陳君曰融無字享年七十有二遊不出鄉考終厥命嗚呼至哉良玉雖白不受采醴泉自甘非有和真色縝密丹青無自入也靈味天成麥曲糵無所資也故先生長而不學大朴不通乎輪轅至音不諧乎宮商曲直渾成巧匠莫能材也清濁一致伶倫莫能器也故先生老而不仕地虛而踐則有迹器疏而扣則成聲我踐惟實迹不可得而見也我扣惟密聲不可得而聞也故先生沒而不稱若夫為養克孝居喪致毀事亡如存朋友孜孜兄弟怡怡於鄉恂恂與物熙熙天性人道其盡於茲何必讀書然後為學知命是達怡神為榮樂天忘憂自寵不驚貴我以道此非爵乎富我以德此非祿乎何必入官然後為仕我有信順自天祐之我有正直神之聽之謂天蓋高亦既知矣謂神蓋幽亦既聞矣何必俗聲然後為名大哉先生行不學之道據不仕之貴負不稱之名達人觀焉斯亦極矣子貞元初寓居是邑言歸京國道出其鄉始見一鄉之人父義子孝長惠幼敬見乎詞氣發乎顏色不聞忿爭之聲不見傲慢之容雍雍穆穆甚足異也因揣之而歎曰芳蘭所生其草皆香美玉所積其山有光此鄉之人豈必盡仁其必有賢者生於是矣遂停車纍日周訪故老果曰吾里嘗有陳融孝慈仁信不學不仕鄉人見之皆自欲遷善遠罪亦不知其所以然今也則亡清風猶在豫於是慨然痛先生以純德至行沉落光耀官闕軾廬之禮士無表墓之文知而不書我執其咎乃披典校德諡曰貞晦先生窮徵其實建石於路用告將來之有識者云爾府君諱沅字君夢河東人祖崇嗣高尚邱園不應徵辟考從之皇朝左贊善大夫府君性重厚寡言志於文學而炫耀尢好神景化之事雖迫親故時或從人而焚香鍊氣常淡如也與從子某少同遊處有疏阮之契洎某出守湘中府君以山水之樂遠來依憩不幸遇暴疾元和五年七月二十二日終於衡州官舍於戲知命之年未娶無嗣家童護奠旅櫬單歸追懷平昔何可勝痛以其年十月某日權厝江陵城北某原以須通嵗歸祔松檟姑具時日記於此石云公主諱某字某睿宗大聖真皇帝之曾孫元宗明皇帝之孫肅宗宣皇帝之第二女也皇唐駿啓成明再造生人定四海以為家統三靈而傳慶介圭作瑞外強磐石之宗湯沐疏封內廣關睢之化蘭芬玉振垂二百年公主女宿降神坤元育粹荷文武之餘烈資任姒之積德稟靈胎教麗浦之生夜光鍾美天姿綵雲之捧朝日生知信順長習詩禮士女之行有聞必踐保姆之訓不肅而成乾元二年年若干許笄從周築館於魯輜軿將其百兩環珮出乎九重以降於駙馬都尉滎陽鄭君曰某官至特進左散騎常侍博學能文善交好施門多長者之轍室有聖人之書朝野欽嘆名聲籍甚公主輔佐君子周旋禮經盡志以奉舅姑降心以諧姻族夙興夜寐能服浣濯之衣殷祭大賓必躬蕰藻之事恆自砥礪未嘗以簫歌廢日動循法度曾不以嚬笑為容事叶母儀言成內則考諸圖史罕見其倫洎乎曳杖晨歌帷堂晝哭誓柏舟之志盡袪繁華洗清蓮之心坐歸空寂一男曰某茂學懿文夙成時秀選尚順宗次女普安長公主拜駙馬都尉祕書少監其擇鄰之義篤歟一女字某淑質妙工婉為邦媛適將作少監武功蘇某其結縭之戒明歟於戲以順成之德柔立之操茂正家道宣美國風歷奉五朝殆將六紀賜金之外無恃寵以私求食租之餘不與人以爭利淑慎吾止聿觀厥終信戚里之高標天人之秀出者也宜其崇享五福遠逾三壽輔時陰教為國女師竟昧與善忽焉遘疾御醫馳診陰陽之祋已深中使相望藥禱之誠無及以元和二年九月十二日薨於長興里之私第享年若干少監駙馬痛殷創巨杖起成喪以三年某日月哀奉裳帷合祔於某縣某原先常侍之舊塋禮也以某學於原缺舊見託斯銘姑閲之盛疑其文曰奕奕紀國發祥聖源祖武宗文父乾母坤肅宗愛女元宗貴孫俔天之妹大歷加恩問我諸姑實惟貞元迄於我皇聖敬彌敦紀國之德如玉其溫紀國之慶如何渾渾哲夫令望身歿道存有子克家鳴玉晨昏冡婦之貴普安在門人生極休胡可勝言禮為藩兮儉為寶神所勞兮宜壽考儼高堂兮去何早風白楊兮露秋草出青門兮墓田道鏤德音於沉礎傳風樹於遺老夫人諱字滎陽人鄭於姬姓最親為天下著族自秦漢至於皇朝萎蕤軒冕耿曜圖史如洪河東導江漢其源流不待問而可知矣高祖守元朝散大夫襲丹徒公曾祖嘉會朝散大夫雅州司馬大父日敬正議大夫金衢二州刺史嚴考欽英朝議郎杭州別駕皆以天爵屈於人事滋慶羡美實生夫人夫人始生辨物而智能言而信既笄而知禮有行而制義性與天成質無表飾沖靈虛寂和氣交暢不嚴厲而婦道自著不整峻而母儀有儼實柔德之黃中壼闈之盡善者中舍府君出自我睿宗讓皇帝之孫漢中王之豫乃於鐘鼎寶玉之間傑立雅尚文學政事龜龍搢紳而夫人躬蘋藻服浣濯去華斫雕激清守素輔佐將順實有力焉晝哭之後訓成諸子長曰景儉負王佐之才探聖人之奧磅礡秀氣拔乎其倫次曰景儒景信景仁皆文敏潔修保家良主有以見夫人明裕善教繼成義方宜其及公侯必復之時享春秋以貴之慶聞天子歎息見公卿升堂而時命不偕與善茫昧景儉有捧檄之役夫人從養於越州以貞元十九年終於官舍降生五十有四景儉等以某年十一月一日號奉裳帷祔於京兆富平縣萬壽原之舊塋從周禮也以某辱久要之契俾稽懿實敬為銘曰周受成命鄭為戚藩以國命氏鬱聞德門緇衣垂芳滎波發源為為梓為蘭為蓀梓惟何卿材克紹蘭蓀惟何女德之妙抑抑夫人自他有耀玉度旁達泉心內照和順積中高明有融輔佐君子與道始終族姻成化慈儉為宗讓帝之後門生素風宜及子貴以榮教義如何高堂奄忽違棄萬嵗原上松楸永祕惟命罕言德音無愧粵元和三年嵗在八月某朔某日河中晉絳等州節度使檢校司空平章事邠國公夫人趙郡李氏薨於公宮之正寢享年若干有子五人長曰載河南府功曹參軍次曰翁歸前太常寺奉禮郎次曰寶符前河南府參軍次曰義符宏文館明經有女二人長適監察御史武功蘇德輿次適故相國崖州員外司馬京兆韋公執誼命載等以其年十月某日奉輤車裳帷備春秋葬君夫人之禮卜定於某縣之某原俾門下士刑部郎中兼侍御史東平呂某著之於志李著姓也其因生啓允之始若暘谷出日岷山導江光流派別百代可見趙之東祖尢貴州鄉纓組蟬聯布在家牒太宗革昏隋室育德秦邸裒衣侍學十有八士夫人之高祖天策府倉曹參軍曰守素在焉與申公士廉刊定氏族該明條貫天下宗之大王父稷山令諱延祖王父趙城丞諱仲將考菀邱令諱映皆以懿文通經雅度清節卒負天爵淪於下寮泌之洋洋亦流愷悌夫人即菀邱府君之第五女也積善餘慶未歸後嗣自他有耀女德挺生常山炳其陰靈大陸資乎秀氣在娠而卜光有貴繇垂髮之嵗蔚其德容蘊沉明之識含柔立之操生知敬愛性合圖史顧復長之如滋芳蘭之易茂姆師教之如琢美玉之易成也年甫二十歸我邠公爰自緣衣至於陶翟率履一貫星紀四周盡瘁德義之門輔建公侯之業祭服非手出不薦賓饋非躬具不陳非門內之事不詢非女工之物不視言契詩教動歸禮防不失信於兒童無惰容於暗室撫寧孤賤膏雨之霑濡叶比宗姻陽春之感暢式是家道刑于國風蓋母儀之高標內則之全致者巳宜其風信順之祐邁期頤之年抱孫高堂視子華髮而未躋中壽未極殊休輟琴瑟於春堂委繁華於朝露莫訴之酷可勝言哉夫人始封贊皇縣君進封真定郡君又為真定夫人從夫之貴也夫人始家蒲城司空委禽之日實參汾陽王軍事數十年外來為小君魚軒晝遊里閈如舊稀代之榮也嗚呼榮與閲水俱逝貴與朽壤同堙唯柔芳與懿問貫終古而不泯銘曰仁為源義為藩啓華胄立清門代濟美兮娟清明嬺柔啓月之出桃之華天鍾是兮容在禮言顧詩工務本德從宜佐君子兮富而約貴而降宜象服封大邦邈未始兮榮何晚落何先鬱遐慶摧中年懵神理兮遷於堂祖於庭篆幽礎閟泉扃永垂範兮唐故銀青光祿大夫守工部尚書致仕上柱國中山郡開國公食邑二千戶贈陝州大都督博陵崔公曾祖諱承福皇朝太中大夫廣越二府都督祖諱先意皇朝朝議大夫鄧州刺史父諱巘皇朝朝議大夫鄭州長史贈左散騎常侍狀斧藻天理立為人極敬終端本彼所以將就誠明褒歿勸存此所以砥礪名教然而以道行巳晦而彌光大君子之行也以法考行直而無黨賢有司之職也且曰獻狀則惟所知公諱淙清臧而和博厚而敏岐嶷而夙茂羈丱而老成情約性充靜專動直出入孝悌周旋忠信始以經明上第調佐夏陽次以詞麗甲科超尉王屋事迫於官而舉言迫於事而揚欲藏智而蒙滯來求不近名而聲華見逼故相左僕射張公時尹洛京首得才實洎鎮荊蜀致於幕庭再兼理官專領記室捷筆良畫三邦有聞旋遘內艱毀瘠僅立善居得禮族黨稱之免喪之嵗天子南狩大尉西平王大會兵車將圖匡復公首膺辟命濬發義心琴未成聲屨及於路感激而將星芒怒謀謨而兵祲廓清翠華既還優典斯及拜殿中侍御史時有寵臣為京兆者政以暴聞吏有寃弊公表陳枉直伏閣待旦言忠主悟事寢風生以繩違稱職轉侍御史以求瘼慎選為華原令大兵之後旱嵗為虐公勞徠不倦弛張以宜復流庸於潤屋闢曠土為多稼俄改歙州刺史地雜甌駱號為難理下車而簡其約束期月而明其信誓然後破散溪聚剪鋤山豪既去害㣥之姦遂寧挺險之俗徵拜長安縣令威聲先路不肅而理鋩刃餘地所投皆虛擢同州刺史圖歉於豐量賑為糴號里倉者三百所而凶年備矣戒以暴骸諭之速朽成薄葬者九百家而奢俗懲矣㣥人有豪奪鄉惸陰持吏失朋搆訟獄纍政患之公斷以尋斧破其囊士冖柘人樂其殺而法制行焉郡城自禦寇之餘復隍殆盡朝貢所經夷夏何仰公悅使襁負大興版築下不知役而扃固立焉其餘則去思有碑詳在篆述可覆視也朝議陟明遷於陝服封介晉楚寄分函洛而戎備不修兵庫虛閉公乃鳩工以利器閲實以練卒金革中度義勇知方既而有淮西之役晨命暮具凜然而可觀矣河出城下造舟為梁經費僝工敗決相繼公乃沉石而雙固中沚省艦而三分巨流水與意會勢若天成既而有奔濤之沴智勝功顯終然而無害矣其餘則三降璽書就加爵秩是明徵也移疾入覲二職冬官歸載不過圖書留府盈乎粟帛豐公約私於是乎在既至陳乞以尚書致仕室不交要路之賓口不言當代之事就陰委順談者多之公自解巾至於撤樂思不踰矩動無越思以忠貞為仕模以勤儉為家訓身居侯邸清節如初男降王姬素風愈勵羈孤聚室人各忘其亡布褐分庭士不知其貴體溫柔而事至能斷性坦易而物莫能窺當官不務於名聲所去必遺其功利氓謠尚在時論可徵巳踰書葬之期謹舉易名之典謹狀元和三年四月日故銀青光祿大夫守工部尚書致仕贈陝州大都督博陵崔公從外甥朝議郎行尚書司封員外郎上騎都尉賜緋魚袋呂溫謹上尚書考功夫立身之道始於君親中於其人終於其身若府君者居喪有聞臨難有功善其始也勤於官業惠於鰥寡敬其中也家事以理年至而退謹其終也率是三懿光於前訓以咨諡法無愧至公謹狀唐貞元十一年嵗次乙亥十一月一日東平呂溫敢盥沐齋潔敬謁於舜帝之神恭惟至仁無方大孝不匱德馨升聞允釐百揆以聖授聖猶言歷試擇人之君良不可易聖功無全相待而宣雷驅四凶靈起八元太冶陶土璿璣轉天垂衣巖廟萬物浩然是稱至理是曰帝者混成雍熙永錫大嘏乃眷南顧蒼梧之野歸堯鴻名付禹天下茫茫推遷邈萬斯年三代之後誰為聖賢政如頽波俗若壞山韶樂猶在薰風不還於戲道有通變事有同異官帝家王隨時之義揖讓而禪固非力致所以識者存而不議若輔相之宜財成之規煥乎文章百代可知九官惟舊七政有彞宏道在人太平無時如何後王曾莫是思甚易甚簡舍而弗為歷山巋然河水東注唐虞日遠楊墨誰拒瞻彼歷山薄言往訴庶幾精誠必我依據假我以靈俾飛曾雲行神之道以致吾君不然歸來鳥獸為㣥敢竭微志託於明神唐貞元十五年十一月六日河東男子呂溫敬酹於苻秦丞相王公景略之墓曰昔馬氏暴興世不及三拔根河洛遺枿東南鋸牙霆聲爭逐婪婪天下為血晉猶清談帝命景略被茲文武秉心無親用則為主惟秦悼世求我草莽振衣投畚乃作雷雨雨莫不潤雷莫不震吸涼吞燕嚼魏含晉海蕩風掃天臨嶽鎮功存生人是曰大順武功成矣文理定矣晏開太平垂及三紀子也無壽秦其不祀日沉天昏水竭龍死時更運改道歷消長屹彼壯骨沉為朽壤烈氣猶在英風可想雲開華山若見精爽樂毅佐燕功負其名漢猶求後寵號華成曷如夫子翊運而行廓定八州澤流㣥生歷代王者逮我聖明盛德未聞荒墳欲平我行於東稅駕釃酒才何敢望數亦未偶終期自致窺子戶牖靈魂若存死為冥友維年月日某官某等謹以清酌庶羞之奠敬祭於中書侍郎平章事太子賓客贈戶部尚書齊公之靈古人所難有道有時唯公挺生克叶昌期雲引喬幹雷起幽姿禮義誠衡文章元龜學覩儒奧政為吏師金鏘遐音玉立清儀始踐南宮洎在左掖麾幢符竹禮樂圖籍萎蕤焜耀出入揚歷晦而逾明虛乃受益爰登大任光贊庶績棟材斯全鼎味以適道始交泰志惟匪躬方盡嘉猷以奉時雍疾罷私室寵賓儲宮日冀勿藥再諧至公如何忽焉降命不融竟孤宸眷誰問蒼穹佑早辱見知深契風義耽獲同樞近備得純懿珣瑜三河交代郢側兩掖聯事氣以正合情由道至視孤有懷慟寢無愧龜兆叶吉素車東轅喉舌追命股肱殊恩魂留魏闕形返周原凡我寮舊舉觴以言神聽不昧知余所敦尚饗維年月日某官某以清酌之奠敬祭於故襄陽節度使右僕射贈司空南陽樊公之靈惟公直方忠厚沉敏肅給通如川流守若山立精氣方運垂天難戢建中旁求策名帝聰昌言右掖高步南宮爰膺使選將命序戎信在言前知行誠中消息其用車書以同寇逼漢南乃佐戎律偏師靖難全功受鉞兵荒之後政克畫一直繩威姦柔轡惠物一臨荊門再撫峴陽積德逾紀暗然彌彰天不憗遺人之云亡朝野震悼豈惟一方清永之後獲同王事相府之舉謬廁公議重以中外綢繆親懿旋觀全才備歸精義交以義合情由道至循躬雖虛望古無愧嘗言有德必錫永年元聖是毗大猷于宣擊壤鼓腹吾將老焉今則巳矣誰其問夭日月將葬哀榮式備禮有執紼官無離次闢寢流慟哀何可既遙申薄奠歆此精意嗚呼哀哉維貞元元年嵗次乙酉十月景申朔十日乙巳將仕郎守尚書戶部員外郎賜緋魚袋呂某潔樽置誠敬祭於故給事中吳郡陸公之靈嗚呼噫嚱道之難行古人所悲有時無人有人無時時可人可則命奪之公初負道年志俱壯已任致君指掌太平德宗旁求始賓明庭拔乎其倫聿駿有聲實欲以至公大當之心沃明主之心簡能易知之道大明主之道難得易失怡然退保或僶俯從事或棲遲去掃二十年間為郎而老嘗言吾雖已矣道不可已永懷其人見而後死某以弱齡獲謁於公曠代之見一言而同且曰子非入吾之域入堯舜之域子非觀吾之奧覩宣尼之奧良時未來吾老子少異日河圖出鳳鳥至天子咸臨泰階清問理本其能以生人為重社稷次之之義發吾君聰明躋盛唐於雍熙者子若不死吾有望焉某也不佞謬納大賢其何以充塞所知克當斯言姑用紳而書牘而藏傳於子孫為門戶光既而各淪風波秦吾索居某非出處迫屑無餘公高翔海郡與道虛徐猶念垂訓研覃若初作君臣得失之圖成春秋不刊之書今年太皇繼天元聖在震徵公夕拜侍講古訓皇王祕寶造膝而進以石投水至誠無朕討論未竟公則既病重光升矣公病不起河海晏而航楫自隳禮樂作而龜玉先毀與其時而奪其壽吾未知夫所以嗚呼惜哉某奉使無狀閉留昆夷再換炎涼言歸未期公方沉瘵忘已之危念我否隔發言漣洏悉所著書付子稚兒曰道之將興而父其歸懼不果待寓心於斯似有明神感公所敦窮荒生還僅及公存綿頓在牀深堂晝昏舉燭開目握手無言自此及終曾未浹辰凡曰識者孰堪酸辛况豫之情豈云他人涕盡一哀痛纏百身禮不忘本卜歸江濱躬執薄酹心摧氣堙儻見期之言可徵平生之志獲申呂氏陸氏戚休惟均魂而有知歆之聽之嗚呼哀哉尚饗維貞元十年嵗次甲申月日門生侍御史王播監察御史劉禹錫陳諷柳宗元左拾遺呂溫李逢吉右拾遺盧元輔劍南西川觀察支使李正叔萬年縣主簿談元茂集賢殿校書郎王啓祕書省校書郎李建京兆府文學李逢渭南縣尉席夔鄠縣尉張隸初奉禮郎獨孤郁協律郎蕭節奉禮郎時元佐滎陽主薄李宗衡前鄉貢進士鄭素等謹以清酌之奠祭於座主故兵部尚書東都留守顧公之靈峩峩靈山時雨將泄耽耽大廈崇構巳設嵗旱方極川流遽閼宏棟待施梁木斯折玉碎清瑩芝焚酷烈貞方獨留千古不滅嗚呼哀哉伏惟公神氣輔質天降英靈剛健中正內外和明岐嶷之初不教而成敦敏之後確然巳貞靄靄孤雲逸我高情昭昭白日懸我明誠志勵意深心融氣清靖若翔隼藹若芳英於戲立人成身忠孝一美自古全者一人而巳明君得臣賢父知子公獨兼備敢陳終始厥初知禮柔順義方年未逾丱道行於鄉盈庭之戲衆稚且狂觽管在身我獨矜莊沐浴風雨盥潄雪霜未薦甘旨未敢衣裳斯惟至性厥有大孝乃揚儒風乃奉文教服勤之功煥飾之效金石成聲縟麗開照越國山秀吳門水深句曲宵朗湘沅夕陰怡神導和滌思凝心棄我奇寶鏗然至音天寶季年羯胡內侵翰苑詞人播遷江潯金陵會稽文士成林嗤衒爭馳聲美共尋損益褒貶一言千金洙泗之風弊而浸淫我乃閉關響絶光沉藏輝必發含章以俟蛟龍得雲平陸騁鷙人或妙用我蘊成器人矜謏聞我愚大智聿來膠庠厚此淳懿鄉選或競我則無愧芳桂盈手青霄坐致春從王畿冬踐郎吏危險立則艱難見志諫草焚灰絲綸深祕命官儲賢有國大備至公苟在淳化不墜朝選精重睿思虔志繫於安危宏此教義我雖受命求人報天工惟選藝器必搜賢松菊有烈薰蕕在前妍媸自分衡鏡高懸潛符希夷化若神仙道貫品類心冥陶埏歸吾至精復命上元物不可棄道由爾全毛翔鸞鳳殼蛻龜蟬萬象俱適三清晏然伊昔仲尼其徒三千命不可求文實在焉微言僅存正氣莫宣用苟登席希徒執鞭曷如清時文柄克專髦彥必舉典謨備甄中侍六載內朝十年三司秋賦五掌春銓翼翼京師教化之先肅恭誠敬昭彰可傳在昔成周左伊右乃命保釐撫我三川資仁感義與道周旋煥乎成功嶷若崇巔乃飾兵車兵利革堅乃修農畝闢隴開阡榛穢荒蕪化為良田汙潦溝瀆流為清泉忠至誠達思焦身捐醴甘必竭膏明乃然嗚呼哀哉馹騎霄馳皇慈中激后復真質皋還魂魄新命簫鼓舊原松柏陵谷可移德音不易嗚呼哀哉播等援自諸生升為王賓念必期於霄漢手親擢其泥塵播嘗再忝於科第始一命於朝倫感自衷於誠接歡自巳而情均或負知於一紀或登用於數旬恨俱長而各異哀靡極而寧伸凡在京兆一十九人四忝御史三為諫臣孔門有光遊夏修身遠奠雖設用茲慰神馨香可薦醪醴方陳歔欷相從列拜斯文伏惟尚饗維元和五年嵗次庚寅十月戊辰朔十七日甲申刺史呂某遣故衙前虞候何防以豚酒蔬果致祭蘇升陳演李寬泰陳甫魯餘之靈爾等五人感余誠信力輸公稅爭赴先期溪山阻深潦水暴至不忍欺我忘其險艱州令未明津渡不謹致此淪逝咎由使君興言涕流痛念何及聊伸薄酹兼致微贈代納殘稅皆余俸錢魂而有知諒此深意尚饗維元和五年嵗次庚寅五月庚子朔七日景午刺史呂某遣衙前虞候蔣沼以酒脯之奠告鄧助費念之靈使君受命牧汝不能庇護使賊孟鸞等敢作不道酷加殺害是用疚心疾首萬計討擒廉使仁明不貸凶惡窮泉冤痛今日方申慙念無及澘然泣下故令於汝歿處陳賊之尸魂而有知歆此告酹嗚呼哀哉維元和五年嵗次庚寅九月戊戍朔三日庚子堂姪男朝議郎使持節衡州諸軍事守衡州刺史上騎都尉賜緋魚袋某鄉貢進士讓致祭十七房叔侯官府君之靈私門薄佑終鮮諸父堂從之內唯叔一人少小相依筆硯同學永言素契情實兼常早表誠言見托身事官孤力薄卒用無成慙負幽明興言痛咽叔無允嗣後效何伸河中大塋禮合葬祔十五房尚寓淮甸時力未并且於江陵謹議權厝終期通嵗異壤同歸皎日在天誓無二事嗚呼哀哉五湖三湘前嵗共入孤舟單旐今日何之慟決江津倍增摧慕式具祖奠伏惟尚饗
