front:
  text: 全唐文欽定全唐文卷八百四十夢奇後唐明宗授幽州節度判官遷右諫議大夫御史中丞
  hash: sha256:c8988a4cf7de586aafe67a929ad2bec174874137f7a4c28292cf3b6bf18652e7
  markers:
  - {type: head, offset: 13, content: 呂夢奇, id: KR4h0168_NFKB_840-h1, level: 1}
body:
  text: 原夫古先哲王必有良輔時清則論至道以經邦和陰陽而均造化柱石王室使不顛不危世亂則運沉機而靖巖廊廓煙塵而掃蕪穢藩屏皇家俾可遠可大故有書汗簡勒金石皆紀其功德及於社稷生靈者也公諱存進字光嗣本姓孫氏樂安人也武子之後歷世守職邊土因以家焉曾祖巖振武節度都押衙銀青光祿大夫檢校右散騎常侍兼御史大夫祖某金紫光祿大夫守勝州刺史檢校刑部尚書兼御史大夫柱國父佺振武節度都押衙左校練使銀青光祿大夫檢校左散騎常侍兼御史大夫上柱國公業紹箕裘力便弓馬入蛟橋而振譽探虎穴以知名氣直如絃心堅比鐵獻祖文皇龍潛朔野豹隱雲中常以鏖虜為心平戎是務以公早精劍術素熟兵機肘腋之間爪牙為任時或手持雙戟腰屬兩鞬營開而紫塞風清戰罷而金鎗日耀太祖武皇帝嗣承丕構致力中原屬以天步多艱王室如燬枕戈求敵奮劍遄征平大寇而復九重戮叛臣而清三輔以公生知武略早立戰功委以轄鈐頗著勞績尋補節度押衙左廂衙隊威雄第一闕副兵馬使奏受銀青光祿大夫檢校太子賓客兼監察御史上柱國大順元年遷殿中侍御史景福二年五月太祖武皇帝以公性稟淳和言無矯飾勇能排難忠不病國錫以姓名同之骨肉榮連戚屬光生將門永依磐石之安終賴維城之固尋補充右廂義兒第一院軍使除授銀青光祿大夫檢校國子祭酒兼御史大夫乾寧二年十月除授檢校左散騎常侍光化二年二月授右廂行營馬步都虞候三年正月兼授鴈門以北都知兵馬使永安軍使兼守禦都指揮使五月權知汾州軍州事兼守禦都指揮使四年四月轉充右廂衙隊都知兵馬使公以屢立戰勳繼承先澤勤王在念報主為心夙夜在公風雨如晦至天復元年四月除授金紫光祿大夫檢校刑部尚書兼御史大夫上柱國二年三月除授檢校兵部尚書十月加授檢校尚書左僕射三年八月轉左廂衙隊都知兵馬使兼左廂行營馬步都虞候天祐三年三月奉命權知石州軍州事時以慈隰未歸西南為患委之守郡志在安邊公乃和以養兵仁而撫俗輕其徭役勸以耕農惸嫠者由是遂生逋竄者以之復業遠來近悅老安少懷五穀有年一方無事百姓以為召父復出杜母再生洎今昭文睿武光孝皇帝初承顧命之年以公舊臣元老委以腹心送往事居慎終如始尋以家讐未雪國患已深四方每切於經營中土尚稽於平定知公材堪出將相可封侯必當多難之秋能立盡忠之節五年正月制授檢校司空使持節石州諸軍事守石州刺史七年十月轉充右廂步軍都指揮使八年十二月轉授權行營蕃漢馬步都虞候尋以偽梁大舉凶鋒僭據深冀鎮定告倒懸之急並汾興仗順之師主上以公久戰多謀雄名制敵俾之扈從同救阽危十萬凶徒一陳席卷九年正月奉命再知汾州軍州事四月制加光祿大夫檢校司徒十二月授西南面行營招討都指揮使十一年三月收下慈州秋毫不犯百姓復業三農以時尋制授慈州剌史民歌其化如離石焉十二月奉命權知沁州軍州事五月正授諸道行營蕃漢馬步使時以魏人久厭偽庭咸思真主烽煙相屬星使交馳迎我鑾輿以救塗炭洎主上駐驆在鄴以編部未肅都人乍安每懷親征常令預備將委權略罕得其人以公夙著廉勤素有威望九月補天雄軍都部署巡檢使行營蕃漢馬步使仍舊公稟命益恭守法益謹嚴以理下儉以約身犯者必誅惡者自息強豪貴勢聞之凜然偽將劉鄩在莘縣日與主上對壘經年時公在都城每設嚴備有日私謂人曰此賊固險不戰必有多謀俾於南門多排弓弩以待之其夜果有劉鄩賊黨忽攻都城之南門弓弩齊發死傷者甚衆遂令單騎潛報主上於東寨於是王師盡出及旦兩軍相遇於中途五萬凶徒剿戮將盡惟劉鄩遁而獲免夫破大陳主上之神功也守都城公之長算也十四年正月轉左廂步軍都指揮使二月奉命權蕃漢馬步副總管聖上初收楊留鎮以為將取中原先通古渡防邊固圉非公不辦尋留公在鎮守禦公以岸濶舟遲城孤兵少強敵在近奔衝是虞乃浚彼壕隍增其樓櫓功役未罷果有大寇攻城內備既堅㣥盜尋退十五年冬隨駕至胡柳陂大破汴寇回十六年三月制授單于安北都護御史大夫充振武節度麟勝朔等州觀察處置營田押蕃漢等使時駕在德勝寨上以大寇未平黃河是阻貔貅往復舟楫為勞一出義師數日方濟公乃埋大木於兩岸貫輕舟於中河建作浮橋以過鋭旅力排巨浪勢截橫流扼彼咽喉壯我襟帶遂使六軍萬馬朝出暮還動若疾雷履如平地十七年二月主上賞公之功就加特進檢校太保仍賜御衣鞍馬金銀器物綾羅錦綵等三月授天雄軍馬步都指揮使行營蕃漢馬步使仍舊十九年正月主上以契丹犯境鑾駕親征以公計出萬全謀深九拒留公河外以禦姦凶果偽將段凝領兵攻打德勝寨公乃夜警晨嚴出鬬內備三軍戮力萬人一心洎主上凱還寇孽夜遁二月以公之功加特進檢校太傅隴西郡開國男食邑三百戶當年鎮州有不令之臣張文禮弒其主而據其位潛通梁苑密搆契丹背我聖恩恣彼凶德主上以北門猶梗中國未寧憤為患於腹心志先平其巢穴王師繼發廟算頻施殺戮雖多攻取未下以公聞風料敵嗅土知兵尋付睿謀俾就攻討四月授北面行營都招討使公奉辭伐罪固敵是求乃仗金戊而行鑿門而出戈矛雪瑩甲騎雲飛發殷地之威聲徑踰漳水作連天之殺氣直壓濬川增其嚴營對彼孤壘料於旬日必下危城無何伏雞搏貍乳犬噬虎我師未列彼陳先成公乃獨領親軍迎鋒力戰王師已捷惟公乘勝深入為流矢所中身終於陳享年六十八於戲功已垂成命不相待陳安既往長留壯士之名卞壼不回永盡忠臣之節扶傾柱折濟險舟沉天子聞之輟朝百姓聞之罷市夫生受國恩歿於王事大丈夫之終也同光二年冬十月贈太尉以十一月八日葬於太原縣闕夏鄉鄭村東原禮也夫人彭城劉氏聞詩立德約禮成規夫人渤海金氏素稟全儀生知懿範柔順同符乎坤德賢和共出於家風有子七人長曰漢韶河東節度押衙都牢城使兼右廂五院指揮使金紫光祿大夫檢校兵部尚書兼御史大夫上柱國久讀兵書頗精師律謙恭接下廉謹立身戰勝而口不言功任重而心益為懼仁孝既聞於鄉里忠勤復表於旗常蘊茲全才以固都邑次曰漢威河東節度押衙安國軍馬步軍副指揮使兼都牢城使銀青光祿大夫檢校工部尚書兼御史大夫上柱國玉堂演術金匱傳符亟揚破敵之功深得將兵之妙次曰漢殷前振武節度押衙沿河五鎮都知兵馬使銀青光祿大夫檢校左散騎常侍兼御史大夫素蘊直誠早抱雄節飾身以文武之道交人以忠信之心次曰漢郇河東節度隨使兵馬使銀青光祿大夫檢校左散騎常侍兼御史大夫孝敬因心忠直成性交遊不雜言行相符次曰漢筠前振武節度單于安北都護府司馬器度縱橫識略孤遠耽書味道處約持謙樂勝廊廟先人後已次曰祿兒語多㯋悟似有神通適當懷橘之年自立成人之智次曰歡兒神彩疏通骨氣清秀對日之年未逮摩天之勢已高可謂荀氏八龍賈生三虎併生於德門者也夢奇舊忝故總管令公幕下十五餘年常在征行與公同處營寨辱公之知眷見公之行事諸子弟不以虛薄請染柔毫敢竭荒蕪實敘銘勒庶比夫燕然立碣峴首豐碑復旌上將之勳再墮行人之淚銘曰五嶽降靈四瀆騰精雄才英傑為時而生舟以濟險柱以扶傾手撥禍亂力致升平其一婉畫頻施嘉謀屢協德懋九歌寵深三接續派天潢連芳玉葉出則奉辭入必獻德其二量深謀遠才高器孤張皇義勇倜儻雄圖臂上繁弱腰間轆轤聲馳絶塞勢懾㣥胡其三經以斯文緯以我武柔亦不茹剛亦不吐名高若廬力大如虎鐵石一心魚水三主其四離石作牧西南之戍威以風行惠以雲布直者必舉枉者必措俗戴二天人歌五袴其五化行四郡恩被百姓吏守公平獄無寃橫冰壺之瑩水鏡之淨善人為邦室家相慶其六得魏為大守之為難經巡務重制斷事繁威而不猛嚴而不殘姦邪氣懾豪右心寒其七楊留初下渡口是防百樓備險九拒謀長城高如金壕浚如湯摧敵制寇拓土開疆其八天子恩深將軍戰苦仗節擁麾分茅列土作鎮單于以扼窮虜晝錦而行不獨前古其九九曲連天隔彼寇黨白浪渀騰洪流滉漾造舟為梁誰謂河廣謀而後行利有攸往其十趙有不庭干國之紀作孽一方構禍千里煙塵未滅嬰敵之矢力戰酬恩歿而後已其十一桓桓上將弼我元后馮坐大樹周居細柳忠不負名勇不期壽天長地久勳庸不朽其十二儀字羽光萬元人偓之兄唐末以翰林學士為御史中丞梁祖即位貶棣州司馬門下夢傅巖而得真相殷道中興獵渭濱而載獻臣周朝致理是知顯諸仁而藏諸用君子但守其沉機懷其寶而迷其邦大器曷虛其顯位朕自逢多難渴佇英賢暗禱鬼神明祈日月果得哲輔契於勤求朝散大夫守國子毛詩博士上柱國賜紫金魚袋朱朴學業優深識用精敏久徊翔而不振彌貞吉以自多朕知其才遂召與語理亂立分於言下聞所未聞兵農皆在於彀中得所未得不覺前席為之改容須委化權用昌衰運是乃振於庠序陟彼鈞衡自我拔奇寧拘品秩於戲時風甚薄國步方艱兵戈未息於近郊經制日隳於故事官闕焚蕩邑里凋虛外則未殄元凶內則未凝庶績整我綱紀成我雍熙百度㣥倫俟爾康濟勉思敬戒以服寵光可朝議大夫同中書門下平章事門下朕聞軒轅得力牧而為五帝先夏禹任臯陶而為三王祖雖不言而化自契於元功而端拱仰成實資於哲輔况有嘗持大柄久竭訏謨振寅亮於巖廊立惠迪之軌躅俾乃舊貫再委平衡斷自朕懷用符僉屬扶危匡國致理功臣新授武勝軍節度浙江東道管內觀察處置兼宣撫等使金紫光祿大夫檢校尚書右僕射同中書門下平章事使持節越州諸軍事越州刺史上柱國闕三字開國公食邑二千戶王搏道潔秋霜文含春彩動不踰矩立必正方行中孚絶類之貞保大有匪彭之節訥於言而敏於行深恥名浮竭其力而致其身唯將道勝頃歲朕察其才智可委鈞衡拔自二卿升之四輔果能推誠憂國罄慮匡時啓沃心之嘉猷進苦口之良藥洎汧岐叛渙京國戒嚴罔懼觸鱗屢陳逆耳且搏以明君待我故每敢極言我以忠臣任搏亦常加奬納深知盡瘁永用置懷自鑾輅省方艱危扈蹕澄心無撓臨事應機為時而生信非虛言昨以初清鏡水新蕩稽山慎擇周才以康疲俗是用輟於台鼎俾踐師壇念卿前後奏陳有犯無隱吾雖不敏深諒至忠靜復卿言皆合朕志讜正之事久而彌芳雖浙右之瘡痍誠思惠養顧岐陽之祅逆尤藉機籌且歸班瑞之符卻秉代天之筆爾其內凝庶績外殄元凶勉精醫國之謀報我知臣之德天官重位光祿崇階兼以命之用旌寵數服茲休命可不慎歟可光祿大夫守吏部尚書同中書門下平章事功臣勳封並如故門下記曰諸侯有功德於人者加地進律書云德懋懋官功懋懋賞其有功宣於宗社德被於生靈立扶危定顛之勳展安祖建儲之力忠誠貫天地貞節伏鬼神須行不次之恩用報非常之績俾諧僉議爰舉寵章具官某維嶽降神自天生德巨材山立雅量海深行健不以武而以文明處順不以邪而以忠正其動也直其靜也專孫武理兵令惟畫一文翁訓俗教必在三臨大事則侃侃丈夫在平居則謙謙君子生知無對默識絶倫自鎮關防已周星律化驍雄之士盡説詩書流愷悌之風大行鄉里去秋迎鑾郊次駐蹕州城語時事之艱危言淚俱下奉行朝之供億勤竭無渝而又請謁元龜載營復廟才當旬浹更事嚴禋椒壁虹梁備聞壯麗禮容備物靡不精周既而首貢封章議建儲二復六十年之墜典振三百載之洪規邦本以貞丕基永固實自良畫成此懿圖去不令之人以清朝列懲左道之輩用肅㣥倫謀無不臧動有成憲肇我中興之業因其活國之誠永念殊庸實無與二是乃錫功臣之號封異姓之尊用答元勳勉膺異渥噫嘻當屯窒之時雖范無咎者鮮乘泰亨之際在上不驕者難全卿始終罔怠操執贊輔以德永孚於休門下五嶽承天共振橫霄之力四溟紀地咸施潤下之功所以國之獻臣時之哲輔亦如華嵩衡霍登九命而冠三公海瀆江河輯六瑞而踰五等居牧伯之位秉桓信之圭苟非茂績昭宣殊勳薦洽豈可膺茲並命用叶僉諧我有三臣實全七德爰舉疇庸之典式符進善之經具官王鎔夙紹弓箕丕承堂構襲重侯之積慶允武允文奉先王之成規克勤克儉剛簡而無傲虐栗直而務溫寬言必有章動不踰矩具官羅宏信將星瑞彩卿月祥光常竭力於公門每推心於王室保大有九三之盛任重而不危守中孚六四之貞致遠而不泥既為良帥復號吏師具官劉仁恭氣薄雲天義形霜雪祕元符於腹笥機術無儔運黃略於意筌弛張有度以恬養智用壯處謙三軍敬之若神明百姓仰之如膏雨居然侯度屹若國楨而皆道邁殷賢名齊漢傑洞達總戎之要翦起扶輪精通育物之源龔黃拜手犬牙而理人心以寧屏蔽一隅繚長城於瀚海藩垣中夏布橫一作二落於天田疇咨協恭奮庸熙載或奠茲冀土成阜安於大名或宅彼幽都共綏懷於有北駢闐勳緒照灼簡書敷進律之殊恩奬殿邦之美化真相正三台之位掌武居一品之尊增實封以錫圭田升虛邑而光寶節酬功報德惟恐不多勉竭乃誠各膺休命門下朕聞賞有功則勞者勸考其績則政事彰能否既分黜陟斯在其有勳已銘於簡册化復被於謳謠表率公侯澄清土宇靜夢澤於千里盡闢汙萊曜軫宿於九霄光生芒角行爵繼祿顯忠遂良式副僉諧爰登寵寄具官成汭氣合冬日志烈秋霜蘊雄特之標中能抑畏抱介潔之操外富通明自節制衡巫統臨荊楚承匪人之貪虐屬生聚之流離比衛文之革車兼無三百同魏相之版戶略不盈千曾未踰時俄成樂國井閭富庶人物殷繁璣組之賦聿修苞茅之貢常入砮丹靡闕箘簵咸臻睦鄰而四境風行蕩寇而三峽浪息況蔓聯湖嶺輻輳梯航既水陸之靡難致賦輸之罔滯積茲功緒實謂忠勞苟無舉善之文是廢疇庸之典今則移紫微之尊秩疏異姓之殊封位冠三台爵踰五等用奬分憂之績乃申進律之恩勉力在公傾心報國服我休命無忘恪恭門下建牧立監施亭育之深仁顯忠遂良表激揚之茂典其有聲馳軍伍績著郡符威令夙振於戎行美化雱流於封部允契求材之念宜當分閫之榮遂舉寵章俾膺重寄具官某學洞元符智苞黃石抱刻銘燕然之志蘊刊石勃弄之心氣薄雲天義凌霜雪以和為貴用壯處謙御下而寬猛有經料敵而錙銖罔失朕以鄒魯重鎮兵革連年慎擇可人用蘇疲俗得於僉論叶我敷求昔魏延以勇略逸㣥自偏裨而登上將呂蒙以材智拔萃捨行陳而總戎麾況乎早踐方州屢登崇秩績效已彰於靡盬奬酬宜示於優恩仍加水土之尊式寵旌旄之寄爾其靜訓驍勇之士惠鮮惸獨之人布我憂勤康其凋瘵膺茲超擢無忘恪恭門下夫息亂以靜濟道者權當底定千戈之時乃更易節旄之任寧辭改作式貴叶宜不移將相之榮別奉藩宣之寄用光勳傑爰舉寵章具官某氣薄雲天志堅金石蘊翦起之雄勇負寇賈之智謀誠明可以伏鬼神義烈可以貫風雨纍代以勳勞報國徇節忘生一門以忠孝承家推心濟物功銘鐘鼎誓著山河每逢多難之秋必奮安危之用昨以邠岐動衆畿甸匪寧授以統臨錫之鈇鉞舉旄效命投袂連行備聞靡盬之誠克抱盡敵之意朕念兵革繁興十有八載蒸黎板蕩邑里洞虛為人父母之心深慙涼德拯國艱危之運唯有責躬爰議罷兵用安率土又念昨者邠人不令潛持兩端有誤軍機遂成退守復臨彼土自不懷安雖欲撫寧諒難輯睦是乃換雙旌之雄重割兩郡之膏腴成一家千里之封列三鎮十連之責勉思勤竭膺我寵靈門下夫有大功德於天下者必垂慶私門賞延於公室者必傳家令子賞延者國俾嗣者侯著之格言是為彞則祇應丕訓虔奉成規徵比事經式登功緒必盈僉論方舉寵章某官繼美勳門生知戎略識度早聞其善將風稜尋號於老成朔漠之氣嚴天資毅勇崆洞之人武神授端莊以忠孝為身經守謙直為家法諸父每舉宿將知歸徐晃沉詳幼而特立既克紹於門風爰委用於舊土未行真命且假劇權士心咸感於惠和封部果臻於寧肅既符試可須議與能方當殄寇之時將用正名之典我之異渥實為訏謨以爾成慶代有殊烈祿山滔天之日文已載於司勳朱泚盜國之時績復書於盟府洎黃巢犯闕先臣進士兄弟宗族攜率征討首謀大計果成元功麟閣丹青鴻鐘紀勒垂之不朽永以無窮今則近輔元渠久未誅翦朕之鬱慎格於皇天爾其思曾高戡禍之勳纘父叔定傾之烈盡驅鋭旅速殄祅巢克副家聲以康國步服我休命所宜若何勉樹功名勿孤注倚
