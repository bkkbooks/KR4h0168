front:
  text: 全唐文欽定全唐文卷四百八十四權德輿二
  hash: sha256:cba0c11c7fb0efe0fed64e5033940fe06e3cfb605cc1264f53ffa62ac1a2fba0
body:
  text: 右今日中使某乙奉宣進止得劍南西川節度使某乙奏得册南詔副使寵頎狀云異牟尋以十月二十七日受册禮畢迎候祗應皆竭深誠又册命之時天宇晴朗者伏以聖澤所覃殊方即敘奉使臣之禮遠稟綏懷當錫命之時盡其誠敬變西南陰晦之候感天地休嘉之祥此皆睿渥遐宣上元降祉永寧萬宇守在四夷臣等忝備台司不勝大慶謹奉狀陳賀以聞臣某等言伏見劍南西川節度使具官某所奏兵馬使宋晃前月十八日與雲南軍合勢攻破吐蕃劍山保定城當日斬城使者伏以聲教所被遐邇大同蠢茲西戎尚有遺類或犯亭鄣且稽靈誅陛下睿算無窮天威遠震以夷裔感恩之衆佐藩隅制勝之臣取以多方纍獻戎捷事皆前定必稟聖謨斬將搴旗出於料外堅城便地盡落彀中通荒服會朝之途絶餘孽窺覦之隙奉威懷之命以律而臧兼夷夏之師在和而克此皆陛下神武潛運妖氛永清由是成擒自當盡敵臣等謬當樞近愧乏廟謀幸覩成功不勝大慶無任欣抃之至謹奉表陳賀以聞右今日中使某乙至奉宣恩命示臣等前件破賊露布者伏以王澤所覃裔夷率化蠢茲小醜敢負深恩時懷向背之心或作方隅之梗守臣宣力師律戒嚴隨其嘯聚必就擒翦厄害之地分設三軍首級之數動逾萬計此皆睿謀陰隲武旅成功臣等忝備台司纍覩戎捷無任慶幸之至謹奉狀陳賀以聞臣某等言中使某乙奉宣進止汴州以今月三日擒送李乃軍州並已寧帖者伏以聖德含宏在宥天下而匪人醜類自抵刑章李乃本以庸微謬從軍校潛懷狂戾輒擾師徒乘其疾病坐邀職秩怙亂以逞志專戮以作威人思納忠義不從惡俄就械繫一方晏然雖梟獍之心暫求假息而鷹鸇之逐曾不崇朝衆情交欣以待朝旨陛下命將相之重撫綏是邦明書罪人且示輕典成命方下浚郊以清聖謨炳然若合符契足使義士勵節貪夫革心稟化畏威無有遠近臣等謬居台鉉每奉德音愧乏嘉猷以承睿略無任歡欣慶幸之至謹奉表陳賀以聞臣某等言臣等今日面奉德音靈武大破吐蕃擒生斬將者伏以睿謀武經陰隲上略兵符所授攻戰多方蠢茲犬羊尚勞爟燧㣥帥稟命中權戒嚴掎角相因初設險於三覆竒正合發俄獻功於七擒數酋渠之首級積戎械於亭候勝氣餘勇鼓行無前即敘可期有征斯在臣等謬居樞掖莫效涓埃每承以律之貞空荷止戈之運無任慶快踴躍之至謹奉表申賀以聞臣某等言伏奉宣示蔡州行營招討使韓全義所奏云四月二十七日於逆賊吳少誠界破賊騾子及馬步軍三千餘人賊弟吳陽棄衆奔遁者伏惟陛下神聖廣運丕冒萬方而顛越匪彞目蹈鋒刃德音纍降曉告不悛禁暴安人酌於軍志命師授律發於宸心整旅有嚴拊循決勝據便地以三覆分鋭師而九攻材官突騎奮勵精勇啓行所及莫敢枝梧奔北之徒自相蹈藉威謀克壯殺獲斯多更俟便宜續圖攻取蒙輪超乘靡不賈餘長轂鈎援期於盡殪此皆睿算前定純臣協心佇清淮濆以慶天下臣等謬居樞近喜倍恆情無任欣抃踴躍之至謹奉表陳賀以聞右今日中使某乙奉宣恩旨示臣等韋某奏表大破吐蕃生擒斬級者戎醜負恩乘秋竊發敢擾邊鄙自干誅夷伏以睿略無方守臣授律龔行決勝之策分遣賈勇之神面縛首級風驅電掃屠堡柵而平其險厄焚倉廥而盡其糗糧南路靈關既無遺類西郊朔塞可以成擒神武指蹤四方宣力竒功吉語相繼上聞耀天威而盡殪昭文德以即敘止戈之慶計日可期臣等備位台司倍百歡賀無任慶忭悅懌之至謹奉狀陳賀以聞臣某等言臣等今日面奉進止元誼李文通等蒙恩宥過以今月七日將領將士出洺州城者伏惟皇帝陛下聖神之化懷保元元仁洽好生感深格物誼等列於守將本以忠勞師旅之間失於慮始蒼黃之際自謂匪人士吏危疑謀猷回遹陛下以震耀所及殺傷則多曲成以誘其衷持久以通其變愀然軫念不忍致誅待以初心許之遷善指期開壁率衆來朝實賴亭毒之恩再全臣子之節宥茲一眚昭示萬方睿慈所宏動植知幸臣等虛薄備位台司愧無調鼎之能獲覩止戈之慶無任欣抃踴躍之至謹奉表陳賀以聞臣某等言伏奉今日制奉先等五縣夏麥除得水利外損者并放長安等一十八縣更審巡覆聞奏即有進止仍委有司計會賑給者伏惟陛下愛人之心與天合德憂勤亭育務盡其宜頃者春澤愆期夏麥非稔若保赤子軫於皇情降損寢食虔恭齋禱一時不雨已深求瘼之恩一穀未登則下責躬之詔蠲其南畝之稅賑以太倉之儲德音霈然動植相賀慘怛之愛纖悉無遺申戒官司宣明聖澤歡聲發於轂下嘉氣周於域中凡在生靈孰不鼓舞臣等謬居近列首奉鴻私既乖燮理之能倍切負乘之愳無任捧戴慶抃之至謹奉表陳賀以聞臣某等言臣聞王者祗若天心勤恤人隱必有交感之速以叶順成之祥頃自春及夏時雨尚少稼事所切皇情載勤分命官師虔修祠禱而又齋誠減膳感達上元以蒸人望歲之心為陛下納隍之慮兼軫幽繫議寬狴牢意才發於穆清月已離於星畢霈然周洽曾不崇朝靡失長嬴之期方興多稼之咏茂遂生植統和陰陽歡康之誠音浹遐邇臣等忝居近列獲奉昌時無任欣抃踴躍之至謹奉表陳賀以聞臣某等誠惶誠恐頓首頓首謹言臣某等言臣聞王者布令以時應天以實惟茲瑞雪用兆豐年伏惟陛下齋誠念人振廩恤隱同雲斯兆宿麥可期以五穀播植之精驗於農志當一陽發生之候助此休徵感通不違朝野相賀臣等謬居近侍獲奉昌期無任欣抃踴躍之至謹奉表陳賀以聞臣某等誠歡誠喜頓首頓首謹言臣某等言臣聞天道下濟聖心上感以是欣合發為休徵惟茲雨澤之祥必稽時令之順伏惟皇帝陛下憂勞庶政勤憫蒸人鑒寐之間不忘於念慮賑恤之使相繼於道塗膚寸興雲盈尺呈瑞以來牟之積潤為嗣歲之順成如京如坻百嘉可望既霑既足率土同歡臣等忝列侍臣倍百欣賀無任慶抃踴躍之至謹奉表陳賀以聞臣某等誠歡誠喜頓首頓首謹言臣某等言臣聞王者以誠愛人以德動天則交感不違庶徵時序頃自春澤候上軫皇情協用五紀憂勤六事暨純陽之節雩禱是修齋心勞慮恤隱宥過雲觸石而興潤月離畢以呈祥南畝就功西成可望含餔鼓腹幼艾相歡見聖人之化育符上帝之陰隲臣等忝列台司喜萬恆品無任慶抃踴躍之至謹奉表陳賀以聞臣某等言百穀所仰甘雨是資三務成功望歲斯切雖閏候頗晚農耕未遲而時澤稍愆皇情所軫齋禱上應陰陽以和遽興有淹之淒方茂如茨之稼況霂未已公私必均叶聖道之休徵副元功之育物臣等職叨樞近喜萬恆情無任欣賀踴躍之至謹奉表陳賀以聞臣某等誠惶誠恐頓首頓首謹言臣某等言臣聞聖人之德與天地合則庶徵時若生類昭蘇伏惟陛下慈愛元元統御萬物憂在稼穡切於登成慮甘澤之愆期憫蒸人之望歲誠之所感天且不違有淹而興覩一夕之霑洽大田相慶知百穀之阜蕃農夫克敏秀者皆實薹笠就緒倉箱可期遠邇幼艾欣歡鼓舞臣等謬當近侍喜萬恆情無任欣抃踴躍之至謹奉表陳賀以聞臣某等誠惶誠恐頓首頓首謹言臣某等言今日中使某乙至奉宣進止示臣等元和殿甘露降於梧桐丁香樹者謹按孝經援神契曰王者德至天則甘露降孫氏瑞應圖曰王者和氣茂則降於草木伏惟陛下聖德感通殊祥允集當長嬴之月下順人心降穆清之中上昭天意太和陰隲靈液潛滋屑玉綴珠團枝泫葉質同雪白味若飴甘灑珍木以相鮮激繁香而合發雖軒邱頌瑞漢史紀年徒習前聞豈如目覩此皆協氣旁達天休合符凡在懷生不勝大慶臣等謬居樞要倍萬歡誠無任欣抃踴躍之至謹奉表陳賀以聞臣某等言今日中使某乙至奉宣進止示臣等許州觀察使上官涗所奏許州長社縣嘉禾鄉合穗村連理棠樹一株者謹按孝經援神契曰王者德及草木則木連理伏惟陛下聖澤元功浹洽生類故天休滋至地産交感亭育變化發為百祥珍木敷榮異根合幹表茲植物以瑞康時況嘉禾名地已同唐叔之獻甘棠挺秀寧比召南之什芬芳連理遐邇叶心叢滋慶祉昭煥圖籍臣等謬參鼎飪喜萬恆情無任欣抃踴躍之至謹奉表陳賀以聞臣某等言伏見王武俊所奏恆州鼓城縣生嘉禾一本合穗又盧徵奏華州鄭縣太平鄉三交里獲嘉禾一穗者謹按孫氏瑞應圖曰嘉禾者五穀之長王者德茂則生伏惟陛下德叶元功仁育生類同㯋擢秀殊祥並時昔周道既昌唐叔以獻表天下和平之兆為陰陽欣合之符今五穀登成百嘉儲祉發於厚載集是休徵況嶽鎮之方表章繼至感通昭晰莫甚於斯臣等忝列台司喜倍恆品無任欣抃踴躍之至謹奉表陳賀以聞臣某等誠歡誠喜頓首頓首謹言臣某等言今日內侍朱希顏奉宣進止示臣鄭滑觀察使姚南仲所奏今月一日至六日白馬縣界三十里黃河清者伏以道自積石出於崑崙乃建靈源之封特視上公之禮克符昌運必降殊祥伏惟陛下聖澤感通休徵謺委惟此濁質化為清瀾國典所書是稱大瑞詩曰俟河之清人壽幾何歎其不可得而見也今則白馬之津三十里所澄徹如練淪漪成文一邦幼艾共觀嘉應萬宇經界式彰永寧昔秦號水德徒推厭勝漢紀河平苟安決溢神功幽贊獨表清時足以薦諸宗廟書之史策臣等忝登樞近獲奉休明無任欣抃踴躍之至謹奉表陳賀以聞臣某等誠歡誠抃頓首頓首謹言臣某等言今日中使某乙至奉宣進止示臣等醴泉縣鎮遏使康志寧於建陵柏城外得一白鹿者謹按孝經援神契曰王者德至禽獸則白鹿見又孫氏瑞應圖曰王者惠及下民則至伏惟皇帝陛下聖德廣運與天合符尊祖敬宗愛人育物含靈效祉叶贊休明惟此仁獸式彰孝理皎然玉質俯近軒臺獨麌麌以不㣥亦呦呦而遂性漢得之於槐里齊獲之於敏邱呈祥瑞聖豈比今日臣等謬列台司無補時化每承靈貺徒竭歡心無任欣抃踴躍之至伏請宣付史館謹奉表陳賀以聞臣某等言今日中使楊明義奉宣進止示臣河陽三城節度使李元淳所奏今月六日於河陽縣城南社壇獲白兔者謹按孫氏瑞應圖曰王者加恩耆老則白兔見又前史所稱多自純孝所感伏惟皇帝陛下誠合天地孝通神明元符嘉祉遠近相屬維此瑞獸是稱月精來應昌期皓然雪彩當盟津之壘俯勾龍之壇邦畿士吏駭視歡賀且自前歲已來中外所列凡在羽毛之族多呈皓潔之祥今八陵園寢修復斯畢萬國臣寮手足相慶盛儀既展靈貺斯臻幽贊素姿若合符契臣等謬居台鼎倍萬恆情無任慶抃之至伏請宣付史館謹奉表陳賀以聞臣某等言今日伏奉宣示昭義軍節度使李元淳所進於邢州獲白雀白山鵲各一者謹按孫氏瑞應圖曰王者奉已儉約尊事耆老則白雀見又晉中興書曰天下安寧則見伏惟陛下純儉成化乾坤合符敬彼黃髮感茲霜毳俗既登於壽域事多驗於祥經用應昌時固無虛月昔神雀效祉乾鵲知來或用以紀年或聞諸往載豈比山禽叶質靈貺特殊皎潔異姿追飛交映休嘉所集遐邇同歡臣等忝列台司倍百欣賀無任喜慶踴躍之至謹奉表陳賀以聞臣某等言伏承陛下以去月九日幸興慶池龍堂為人祈雨忽有一白鸕鷀見於池上衆鸕鷀羅列前後如引御舟明日之夕甘雨遂降者伏惟陛下子惠元元躬勤庶政念茲時澤虔於禱祈以陛下如傷之誠上感元貺在列祖發祥之地下降靈禽潔白異姿翻飛成列若應天意以承宸衷簇陰雲於一夕灑沛澤於千里捷均影響慶浹公私昔周致白翟徒稱遐邇漢歌赤鴈亦薦郊廟豈比今日感於至誠瑞牒所無蒸人何幸伏望宣付史册昭示將來臣等備位鼎司倍百歡賀無任欣慶抃躍之至謹奉表陳賀以聞臣某等言今日中使某至奉宣進止示臣等神龍寺殿前渠中瑞蓮花圖其花一莖兩房者伏惟陛下仁聖感通宏被生植宥萬方之暇必順天心於九重之中別開佛剎絪縕降祉菡草舀敷榮瑞茲灼灼之花迥出田田之葉吉祥殿外芳馥殊常功德池中光華交映扶疏發越並秀相鮮元功嘉應超冠圖牒彼芝稱三秀麥有兩歧雖驗休祥豈階妙法觀雙房之挺茂荷一雨之均霑陰隲生成發揮嚴淨臣等忝居樞近倍萬歡心無任欣抃悅懌之至謹奉表陳賀以聞臣某等言臣聞宗廟之享以致吉蠲山園之制以極嚴敬國朝祀典參用漢法寢宮便殿虔奉衣冠日往月來久未修復伏惟皇帝陛下繼明恭已大孝因心丕承祖宗對越天地薦馨香於九廟崇經構於八陵庶工子來百堵皆作人神協吉龜筮告猶用成奕奕之新實自蒸蒸之孝行宮盡復神御以安掌禮之官虔於受命奉陵之縣但覩成功慮財用而靡賦於人量事期而不愆于素罔極之感交於神明奚斯閟宮徒頌諸侯之事叔孫原廟蓋匪先王之法孝彰禮備豈比於今列聖在天萬方受祉春秋匪懈超冠百王臣等謬忝台司獲承詔旨無任誠賀之至右今日伏見中使朱希顏云建康郡王雙誕皇曾孫者伏以聖慈馭物有亭育之仁故上天陰隲降蕃衍之祉協本支百世之義見曾孫雙誕之祥克禋克祀每勞於前古無災無害方盛於今日熊羆並夢棠棣連芳遠同華封之祝更鄙商瞿之歎斯實莫大之慶用表無疆之休所以永固皇家增輝磐石臣等忝居近列倍萬歡心無任抃躍之至謹奉狀陳賀以聞右中書門下奏中使楊明義奉宣韋臯所奏南詔奉聖樂章嘉其遠誠昨已閲試卿宜知悉者伏聞樂以導志感而成聲故有翕純皎繹之音韎任禁昧之奏以節百事以平八風伏惟陛下覆露法天和澤柔遠順氣旁達殊方洽歡願為保障以稟聲朔納邸獻樂贊揚時休制氏新其曲度舌人協其辭禮雖渝舞可玩夷歌成章兩漢所書未若今日伏望宣付有司編諸史册右三教源流久無錯綜或使後學泥於通途陛下遂萬物之宜御六氣之辨徵緇黃之侶振元古之風精義入神微言盡性然後稽合同異討論指歸以元元之慈儉宏於在宥以釋氏之定惠納諸誠明用濟斯人共陶鴻化足以光策書於東觀資聖壽於南山臣等備位台庭仰承至論無任慶抃欣躍之至謹奉狀陳賀以聞臣某言伏見今月二十二日制書以于頔為太子賓客凡在過咎得以昭洗凡在臣僚不勝慶躍臣某中謝伏惟陛下推誠恤隱宥罪申恩澤深雨露明並日月于頔幸備公相又忝國姻而交私匪人行賕求進惡子凶悍虐殺無辜降為王傅使絶朝謁家居思過用愧其心在於聖恩已是私宥今則以其嘗居重任特降殊私進於賓護復得通籍載念循省洗其尤違懷生無不遂之人負罪有自新之路含養之澤與天同符山東諸侯未朝請者必欣戴恩仁浹洽肌骨此誠王者感人心之深者也臣嘗備樞近每承音旨衆情不至於睿慮已周古哲難行在聖姿則易寬明恤隱遐邇歡心仰戴天慈沐浴休運無任抃躍喜賀之至謹奉表陳賀以聞臣某誠歡誠賀頓首頓首謹言臣某言中使陳忠玠至伏奉前月十七日手詔賜臣端午衣一副銀碗二隻銀鈔羅二百索一軸并大將衣服等慶賜遠降天顏如臨恩光綢繆器服輝麗成周士吏居守輿師喜氣歡聲以感以忭臣某誠欣誠荷頓首頓首伏以斗杓建午之初日永星火之際陰陽肇接天地氣交陛下法象乾坤順行時令賀獻本臣子之志寵賚延君上之恩孱微無庸局蹐斯甚佩長命之縷俾壽而臧捧在笥之衣既安且吉然後大敷渥澤盡感鴻私顧已難酬此生何幸無任荷戴踴躍之至謹附中使陳忠玠奉表陳謝以聞臣誠歡誠抃頓首頓首謹言臣某言九月二十日中使孟國瑤至伏奉某月十七日敕書手詔慰諭臣及將佐僧道百姓等并賜臣冬衣兩副大將冬衣共四副者詔旨曲臨慶賜旁集凡在裨校一其歡愈臣某誠歡誠喜頓首頓首臣自違奉闕庭保釐河洛異戎師式遏之任非封部砥貢之勤坐叨名器所謂尸素月日云邁寒暑迭來再及授衣之辰每蒙挾纊之澤被服輕暖章施賤陋彼已不稱於臣則多雖竭捐軀之誠豈逃濡翼之剌撫躬愧畏上答何階無任慙懼感戴之至謹奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言臣某言伏奉今月十七日手詔以諸道每年合送口脂及尺既非厚賜未足伸恩以方鎮勞煩道路為敝一例停罷貴適便宜以示臣者恩自九天澤同萬宇伏讀詔旨仰荷皇明臣某中謝臣聞務其大者捨其細存其廣者遺其狹故先師有寧儉之教禮經有必簡之文陛下誠切愛人志於求瘼口臘香澤豈均雨露之濡尺寸度數曷比乾坤之大以道途勞費傳置將迎鑒在事先慮周物表去煩就省約已便人合簡易於二儀燭休明於四裔臣謬居分正獲奉德音忭荷之誠倍萬恆品無任感戴悅懌之至謹奉表陳謝以聞臣某誠歡誠喜頓首頓首謹言臣某言伏奉今月三日敕東都留守額闕宜令度支每年支錢三千貫文充雜給用者伏以居守將士仰給有司省嗇之中經費猶闕臣頃以地鄰淮右事切隄防請益師徒以崇威重至於資用未敢陳聞豈謂天澤旁流鴻私曲被救乏恤隱已極大君之慈曠官費財益重微臣之責況違離軒陛周歷炎涼無補盛時有叨重寄恩光積厚答效何階無任感戴悚懼之至謹奉表陳謝以聞臣某誠惶誠荷頓首頓首謹言右今日中使景忠信至伏奉恩旨賜臣前件馬并鞍轡告身衣服等寵賚所及惶荷難勝臣自受命已來神爽飛越晦明之際寢食靡遑恩私特加榮錫備至命書煥輝渥澤殊常出衣服於御府輟華騮於天廣既負乘之懼不稱之災慶錫有溢目之榮獎任有提耳之誡以臣愚陋負荷難勝雖欲殺身豈酬鴻造無任感恩惶愳荷戴之至謹奉狀陳謝以聞謹奏
