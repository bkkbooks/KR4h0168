front:
  text: 全唐文欽定全唐文卷一百八十九叔夏宰相安石兄舉明經調露時纍除太常博士長安中纍擢春官侍郎轉太常少卿進銀青光祿大夫拜國子祭酒封沛郡公卒年七十餘贈兗州都督修文館學士諡曰文
  hash: sha256:38eb4abb8db203643e1fe30bcf1c6037db1045436d5f7f9fcf17ba5fc427b165
