body:
  text: 謹按祭法云王者立太社然王社所祭之處書傳無文漢書郊祀志漢興已有官社未立官稷遂於官社後立官稷以夏禹配食官社以后稷配食官稷瓚云案高紀立漢社稷所謂太社也時又有官社配以夏禹所謂王社也見漢祠令而未立官稷至此始立之光武中興不立官稷相承至今魏以官稷為帝社故摯虞議曰魏氏故事立大社帝社是也晉初或廢或置皆不言當時所置之處或云兩社同處王社在大社之西崔氏皇甫氏並云王社在藉田引詩藉田而祈社稷為證今謹按衛宏漢舊儀春始東耕於藉田官祀先農則神農也又五經要義云立壇於田所以祠先農壇之制度如社魏秦靜議云風伯雨師靈星先農與社稷為國之六神晉泰始四年上耕於東郊以太牢祀先農又周隋舊儀及皇朝新禮先農皆祭帝神農配以后稷是則王社先農其來自遠各在祀典不可合而為一今欲崇立帝社實違禮經望於藉田之中別立帝社帝稷配以禹棄則先農帝社兩祠咸秩協載芟之義符祭法之文謹按經典無先農之文禮記祭法云王自為立社曰王社先儒以為社在藉田詩之載芟篇序云春藉田而祈社稷是也永徽年中猶名藉田垂拱已後刪定改為先農先農與社本是一神頻有改張以惑人聽其先農壇請改為帝社壇以應禮經王社之義其祭先農既改為帝社壇仍準令用孟春吉亥祠后土以勾龍氏配春秋傳曰君以軍行祓社釁鼓祝奉以從書曰不用命戮於社社之主蓋用石為之奉為將行也是鄭元以社主用石崔靈恩三禮義宗曰社之神用石以土地所主最為實故用石也又呂氏春秋云殷人之禮其社用石後魏書云天平四年四月太社石主遷於社宮是社主用石古有明說周禮田主各用所宜之木者彼謂人間之社非太社也社主制度長短在禮無文且天子親征又載社主謂之社事則社之神主可載而行今詳議以為主既可載明非過重按郊特牲云社祭土而主陰氣韓詩外傳云天子大社方五丈諸侯半之蓋以五是土數故壇方五丈其社主請准五數長五尺准陰之二數方二尺剡其上以象物生方其下以象地體埋其半以根在土中而本末均也則神道設教法象有憑其尺請用古尺韓詩外傳云天子太社廣五尺各分置四方色訖上冒以黃土說者云冒以黃土者象王者覆被四方據此則合用黃土遍覆壇上今檢舊壇之上亦備方色謹按禮明堂大享唯祀五方五帝故月令季秋令云是月也大享帝則曲禮所云大享不問卜鄭元注云謂遍祭五帝於明堂莫適卜是也又按祭法云祖文王而宗武王鄭元注云祭五帝五神於明堂曰祖宗故孝經云宗祀文王於明堂以配上帝據此諸文明堂正禮唯祀五帝配以宗祖及五帝五官神等自外餘神並不合預伏惟陛下追遠情深崇禋志切故於明堂享祀加昊天上帝皇地祇重之以先后配享此乃補前王之闕典宏嚴配之虔誠往以神都郊壇未建乃於明堂之下廣祭衆神蓋義出權時非不刊之禮也謹按禮經其內官中官五嶽四瀆諸神並合從祀於二至明堂總奠事乃不經然則宗祀配天之親雜與小神同薦於嚴敬之道理有不安望請每歲元日惟祀天地大神配以帝后其五嶽以下請依禮於冬夏二至從方丘圓丘庶不煩黷懷隱進士登仕郎蓋聞香山聳構如來開說法之堂雪嶺疏基菩薩起安居之寺槧龍宮於月路架迥舒丹浮雁塔於雲闕一字橫空疊翠是闕一字重臺纍榭必控圓泉梵宇祇園多連山嶽依而悟道就以知真至如四月王宮六年法樹尊三乘之軌躅闡八政之闕二字得其門者則豁爾天開迷其路者則窅然雲合雖復銀函東度玉字南翻象負之所不勝龍藏之所未盡莫不絶闕一字門闕四字義高闕三字揚烟戾止蔭菩提之巨澤盡芬子於方城遊無礙之遐疆承天衣於磐石欲明常住覺體生光將說真空闕二字微闕四字養之國闕一字入祇洹之城遂得夙悟苦空堅持戒行去妻子如脫屣委家馬若遺塵竝託真乘咸歸正覺側聞造像沙門獲闕三字緬鏡成龕羅漢取雄黃之樹敢緣斯義竊景前修各捨寶財俱為淨業靖信士張師曠騎都尉王善義卻行等敬造闕六字置臬撰日開基擢修幹於松巒採規模於梓匠梅梁結影望璇極以通光芰井披英泛銀河而蕩色虬檐霧闢鳳幌闕五字臨似度金娥之影霞窗曉徹疑窺玉女之容講座衆於燈王聽筵多於方丈開寶氶山之奧典闡金字之微言顯證一闕四字慧闕二字各解俱會真如清信士閻文褎王孩王慈騎都尉司馬感張智靜司馬明遠等敬造一佛二菩薩洪鐘一闕一字多心經闕一字部闕一字刻浮檀如雕水玉毫光夕泛愛月凝輝紺彩晨明慈雲結闕一字洪鐘曉韻風傳浮磬之濱法鼓齊驚聲揚孤桐之嶺停酸闕一字劫拯泓大闕一字聞之者揮慈劒而斷惑繩聽之者搖智鉤以離魔網洞崩雲之祕體字相輝極垂露之華蹤烟文交映抑闕四字慮託六念以矜懷望樹階梯歸依勝業上為闕一字天皇天后皇太子藉此莊嚴闕一字斯法本神明翊衛幽顯扶持括地開源張闕二字極定陶闕一字於寶思苞宇宙於神襟恆遊波若之船永蔭菩提之日况乃圓泉隱映密爾猴池喬木森疏依然龍樹波含日闕二字蕩菱光闕二字天衣仍低蓋影前臨酆邑星弩開五色之疆去背砂邱天孫標九河之鎮迥接獲麟之野俯枕觀魚之臺孔宣闕三字存魯闕一字之望斯在周遊闕二字藻月思於烟花登陟闕二字暢風襟於露葉雲如鵬翼忽已垂天樹異若華翻能拂日足使廬山闕二字精舍均芳闕二字籠闕一字仙都比麗庶憑靈鑒共建豐碑行方與縣令通闕一字郎宋元鳳銜命西秦佩銅闕三字職出宰闕三字墨綬而司官寬猛相闕一字韋弦竝闕一字導之以廉恥敦之以孝慈禮讓風行仁恩雨沛闕一字巨鱗於魚甸局逸翰闕三字敷化一闕三字舞鸞之化調風百里風均闕一字蝗之風潔類冰壺處脂膏而不潤明齊水鏡照隱伏而猶神靜言㕣圓狴騰闕三字丞鄭元闕六字尉闕二字操並冠蓋八川羽儀四海含輝荊岫出則連城孕彩隨闕一字生而照乘五墨究其枝派九易竭其泉源水溢方闕十字團扇泛娥影而動仙歌六藝兼須三端乂備咸闕二字情慧闕一字降意禪門屢陟雲樓頻依日殿如來半影闕四字室之未修舍闕一字全身之函恨珠臺之未就俱抽正俸竝起檀心以儀鳳四年歲次己卯四月庚戌朔八日丁巳畢功闕五字移河內之灰長嬴戒辰氣改淮南之燧交河合浦元兔朱鳶竝入法流同聞甘露縱使蕭邱永扇毒火不然閶闔長開業闕三字託斯妙力遐棲兜率之宮馭彼勝因遠庀淨居之域曬通賢之綺構偶福地之韶規雖敏恧終鼮未擇菁於義窟思非楊鳳闕絢藻於詞林闕三字物緘丹誠連闕一字議因機染素竊會闕一字林輒扣庸音聊闕一字腐翰式旌盛事乃緝銘云其詞曰星光早落劫燼初開闕三字度白馬西來祇洹有廟波若成臺方逢飛錫乃遇乘杯其一妙覺是生真如首出德侔造化功苞權實橫流法雨高浮慧日闕三字魂優填喪律其二神工構極淨域開場日華蓮井霞照梅梁雕楹玉飾鏤檻金裝應龍若動威鳳疑翔其三天孫去背星弩前通闕二字鳧嶧枕輢龜蒙桐山清露磬水吟風高平草緑大野花紅其四衲衣梵志蓮花長者望月知虛聞鐘識假竝甘蟬蛻咸能喜捨永留天供長充鹿野其五梁岑勒峻燕嶠銘勳矧伊綺構闕紀餘芬才非擲地念恧臨雲聲騰永劫義屬斯文其六璿字休璟以字行京兆始平人少以明經擢第永徽中解褐吳王府典籤調授營州戶曹參軍調露中將兵破突厥奚契丹於獨護山遷朔州長史聖歷中破吐蕃於洪源谷擢右武威金吾二衛大將軍遷夏官尚書同鳳閣鸞臺三品中宗復位召拜輔國大將軍同中書門下三品封酒泉郡公加特進拜右僕射遷中書令充京師留守又以官僚之舊封宋國公景龍二年為太子少師景雲元年充朔方道行軍大總管致仕延和元年卒年八十六贈荊州大都督諡曰忠臣聞天運其工用人代之而理禮行其化為政資之以和所謂佐弻萬機主贊百揆共康庶績宏闡大猷得其理則陰陽以調失其和則災沴斯作故舉才而授帝惟其難論道於邦官不必備苟非其任自古缺之臣樗櫟散材桑榆暮齒識非經遠器不濟時徒以宿忝周行歷登朝廡再睹興運纍辱寵章執典禁戎不雪四郊之恥忝尸端右更居八座之榮任重材輕恩深效淺空曠職事僶俯歲時莫能師長具寮損益大政况疲弊已至年髮浸衰心欲自彊力終不及無德而祿必為小人之患非材妄居果致大臣之咎頃自中夏及乎首秋郡國水災屢為人害瀕陽奧壤流溺邑居淇上名區漂壞閭井又雒水泛溢決潰隄防驚惶居人輒動皇念將政教之吏罔副天心實燮理之才未知王度夫水陰氣也臣實主之臣忝職右樞致此陰沴是不能調理其氣而乃曠居其官雖運屬堯年則無治水之用位侔殷相且闕濟川之功猶負明刑坐逃皇譴皇恩不棄其若天何昔漢官故事丞相以天災免職况竊在聖朝臣豈敢靦顏居位乞解所職待罪私庭冀移陰咎之徵復免夜行之眚豐州控河遏賊實為襟帶自秦漢以來列為郡縣田疇良美尤宜耕牧隋季喪亂不能堅守乃遷徙百姓就寧慶二州致使戎羯交侵乃以靈夏為邊界貞觀之末始募人以實之西北一隅方得寧謐今若廢棄則河傍之地復為賊有靈夏等州人不安業非國家之利也展杜陵人官少府監主簿國家纂宏天統紹啓王跡獵英華於百代潄芳潤於六籍於是闡睿歷於疇人鏡元象之冰釋察運行之盈縮見分度之損益五星同舍狀自叶於連珠兩曜集晨候不於合璧是知陰陽卷舒日月居諸時會而乍離乍合順行而匪疾匪徐徵於顓頊之法考以軒轅之書百靈以之肅若四海由其晏如推上元之歲時和氣茂惟南至之辰日月來就望烏兔之交集瞻斗牛而既覯璧惟圓制象其圓正之形玉以貞稱表此貞明之候可以襲承天意可以敬授人時觀臺之瑞斯驗馮相之言不欺方見仲尼無得而踰矣乃知游夏何足以當之臨楚山豈和氏而能識入秦野非相如之見持且夫日者尊而有常月者謙而不雜每有德而昭感必效靈而允答分則列照於三無聚則和光於六合徒觀夫炳煥可嘉毫釐靡差珥作如虹之氣波為旁達之華映彼仙娥有似夫佩而比德吐茲王字更疑乎瑜不掩瑕然則天垂象兮至明歷為功兮可久重之斯實理本輕之則為亂首是以堯之分命典誥高其能然魯也失官春秋貶其誠不吾君之所懲勸將永代而遵守顧惟愚懵竊覩嘉應鉤深索隱雖無瞽史之才頌德歌功敢借詩人之興無二高宗朝太常博士歷太子文學續晨鳧之足鑿混沌之竅百年之疑一朝頓盡永遵覺路長悟迷源煩惱之薪餐槃之飯請事斯語以卒餘年直心相州臨漳人高宗時為周王府長史擢太常伯流死嶺南釋旨希微理暢有形之表元宗罔像義軼無名之外括三才而體要包萬類而窮神真氣麗關佇猶龍之西舉法雲彩野馴巨象之東歸玉洞仙經冲元羽化金容懿範演聖龍宮至道難名神功不揣爰自周漢咸著丹青典午當塗因循不替是知趨元門者千古崇釋典者百王剪髮緇裳忽輕肥之美變冠黃服蔑簪紱之榮莫不志越寰中心遊方外去揖讓之節就戒律之儀弛禮樂之規遊虛白之室是以如來祕說絶敬君親帛丿糸古洎今無朽茲教教如可廢法亦可刊教捨法存法將安措且甲士不拜豈伍卒之自尊天顏咫尺非一介之云貴並以銜威稟命所以禮棄謙恭况乎延思煙霞解塵俗於羈網警情法界釋怨會於樊籠而使降出俗之容展入家之禮考古恐乖通理論今懼爽彝章議逮芻微敢申管見瞻對疏謬悚懼交懷謹議論曰元教廢興理鍾斯運而盛衰之寄抑亦人謀皇上御辨乘時允膺付託所以降非常之詔勵釋侶於明時者也春秋傳曰君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否余聞其語矣今見其人焉觀秀上肆力釋君昌言帝闕詞志款款勤則勤矣而宣公之啓狀詳切該博吾無間然方今以大法為己任思正其傾危能負重道遠者此其人也歟仲尼云顛而不扶危而不持則將焉用彼相矣若此真可謂至覺元首良哉股肱中臺周府等議雖文質有乖而咸得事要然樞紐經典疇咨故實理例鋒穎詞韻膏腴則司戎之稱鴻筆麗藻矣若標以顯議約以正詞其文辨潔其事明核則左驍衛舉其綱領矣將來達鑒斯焉取斯遊開耀時人若夫汞者五行之秀氣二儀之純精津液流形體分三品之別剛柔為用功標百鍊之奇故能匿鋭燕圖白霓翹而貫日潛芒豐匣紫靄發而衝星在物之靈莫斯為最雖表名於兌域實取效於離方是以上古聖人歷嘗諸味甘而無毒可以養神遂變柔成剛從粗入妙或作規而寫圓璧或為矩而象方諸鑒同明月之輝藏於習坎之地金水相合自表生成之數元臺吸引用召太陽之精因其自然而生故即體之名為汞麥合姿於酉德為酒熱而且宣棗成氣於震宮為藥溫而又潤以斯相和合而服之再餌晨晡一無所忌可以堅實骨髓羸體變而成剛可以悅澤肌膚衰容返而為少至於男女之道房室之間姬媵數百取御之儀俄頃亦具辟鬼除邪蠲疴去疾風勞虛悸之輩攣躄疽癩之徒餌一劑而便瘳匝三周而並愈復本質於平素如舊姿而有佳倚震柱而不驚當離牖而寧懼若能依八節順四時採百物之初生合衆藥而為長或乾或濕為散為丸適寒暑以調和隨道引而消息一服之後萬事都捐心若死灰形同槁木滓穢日去清虛日來通幽洞冥驅神役鬼純漿不覺其濁絶糧不覺其飢腸漸化而為筋髓漸化而為骨體生羽翼身若虛空駕鶴乘龍將煙霞而回騖長生久視與穹壤而相侔斯則天仙之上品也若也不救物表取足人間初服之日閉情無逸一二三年微用節宣八九十歲方始任使耳目惟有聰察神彩彌加精明顏與日而俱新智將年而共遠力則拔山扛鼎倒曳九牛誦則一日萬言五行俱下蠲塗靡乏任意所為偃仰六合之中高視數百年外雖未能觀東海以成桑田詣西母而摘桃實抑亦優游自在其地仙之亞歟語曰上藥養命中藥養性下藥去病總三者以為言惟此可以備矣豈與夫種石齊偶功效相侔膚體才未充虛發徹已通中外可得同年而語哉但代人迷於攝養自致危脆苟徇目前不圖久遠以為壽有定極非關藥餌所資自然者飲鴆羽寧得斯須吞烏喙行為邱死既能促之使短豈不能延之使長信彼而不信此斯為惑也不亦愚乎且食鐵之獸得其粗獷猶能猛健有異毛族况人為之取其精粹取其輕清而無殊特之姿不獲延長之壽未之有也余以汞丹之妙功用無比故申述舊方更為新題庶有識君子知此評之不虛也其有餘小功能並合和節度隨時附出並論之於後思古高宗朝太常博士敬宗位以才升歷居清級然棄長子於荒徼嫁少女於夷落聞詩學禮事絶於家庭納采問名惟聞於黷貨白圭斯玷有纍清塵易名之典須憑實行案諡法名與實爽曰繆請諡為繆
