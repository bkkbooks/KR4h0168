front:
  text: 全唐文欽定全唐文卷六百二十八呂溫四
  hash: sha256:ad1f8be048353e784945dc5231a42db86c37854e8d2a037530b2d95d342a0819
body:
  text: 先師曰益者三友吾能得之豈惟直諒多聞而已可以旁魄天人談堯舜之道則有吾族兄皋可以根本性情語顏夷之行則有太原王師簡可以發揚古訓論三代之文則有河東薛大信此三君子或道以樂我或行以約我或文以博我遭時則有光遁世則無悶其為益也不亦大乎大信與予最舊始以孝弟餘力皆學於廣陵之靈巖寺雲卷其身討論數歲常見大信述作必根乎六經取禮之簡樂之易詩之比興書之典刑春秋之襃貶大易之變化錯落混合崢嶸特立不離聖域而逸軌絕塵不易雅制而王褱姿萬變有若雲起日觀盡成丹霞峰折靈掌無非峻勢皆天光朗映秀氣孤拔豈藻飾而削成者哉聖上方欲觀人之文潤色鴻業秉筆者如三光得天每賀大信有其時矣無何予被鄉曲之譽賦於闕下以文乖時體行失俗譽再為有司所黜此時大信亦與計偕知機全高匣刃不試昔趙殺鳴犢仲尼臨河而逝予之見黜子亦逡巡事雖不同其所感一也歲八月以岵屺之感告予于歸予思古人有處有贈乃語之曰吾聞賢者志其大者文為道之飾道為文之本專其飾則道喪反其本則文存且使不存又何傷矣彼邦是堯舜之遺俗唐叔之所理必有忠信如君者焉問安之暇可與之處琢磨仁義浸潤道德考皇王治亂之迹求聖哲行藏之旨達可以濟乎天下窮可以攄其光明無為矻矻筆硯間也行矣大信苟非同志勿矢予言始吾挹至源之貌若隴底積雪聳寒木於雲谿次吾覽至源之文若驪龍相追弄明月於泉窟末吾聽至源之論若泰山欲雨倒雲氣於滄溟如其貌可以振肅周行如其文可以光潤石渠如其論可以感動宣室而淪蕩江海垂二十年則不知天所以生之之意貞元甲乙歲以親故勸勉來遊京師時然後言無辯以動眾樂然後笑無歡以接物義然後取無食以寧居慨然悔之決策長往因登紫閣峰而指曰西南青冥色連岷峨吾行何歸山盡則住翌日告別於友人太原王元運顧謂予曰高雲出岫無時雨之會與風悠揚轉遠而散若至源者其猶雲耶盍亦贈之序予和汝輿地之有圖古也自成周大司徒掌天下土地之圖以周知廣輪之數而職方氏之圖復加詳焉迨漢滅秦蕭何先收其圖書始具知天下阨塞戶口多少之差然則尚矣武帝元狩六年將立三子為王御史大夫奏輿地圖請所立國名乃開齊燕廣陵之封輿地圖之名至是始見史遷之所載可考也光武皇帝之徇河北鄧禹杖策而從之說以大策有天下不足定之語其後帝登城樓披輿地圖指示禹曰天下郡國如是今乃得其一子前言天下不足定何也禹復申其說蓋光武志在天下當神州赤縣未入經略之際其君臣更相激厲如此故能兼制六合司空之所掌無寸地尺天不歸於封域桉圖分封並建諸子以為藩屏嗚呼盛哉用敢紬繹其意而為之序曰自古合天下於一者必以撥亂之志為主志之所向可以排山嶽倒江海開金石一念之烈無能禦之者光武之在河北崎嶇於封豕長蛇之間瞑目裂眥更相長雄積甲成山積血成川積氣成雲積聲成雷九流渾淆三綱反易雖十家之市無寧居者則光武何所恃哉亦恃其撥亂之志而已光武之志以皇天全付所覆於我有漢今乃瓜分幅裂淪於盜賊此子孫之責也責之所在雖有登天之難不敢辤雖有暴虎之危不敢避雖有蹈風火之厄不敢回奮然直前以償吾祖宗之所付必使吾祖宗之舊物咸復其初然後吾責始塞焉此志一立故雖處一郡之地如視天下之廣慷慨憤悱氣干雲霄撥亂之志蓋肇於此矣方其志之未立則一郡至小而㣥盜之地奚翅十倍吾眾至少而㣥賊之兵奚翅十倍恢復之功猶捕風繫影若不可期者及既有其志則規模先定幾謀先立兆之於前而必之於後若青若齊若隴若蜀若楚若越皆吾志中之一物也若盆子若王昌若囂若述若步若豐皆吾志中之臣僕也彼方繕寨置柵而不知吾已破之於掌上彼方峩冠被衮而不知吾巳縛之於胸中是以論光武克復郡縣之蹟則有難易焉有先後焉若夫光武恢復之志則一披輿圖而萬里之幅員皆入於靈府豈嘗得一邑而始思得一州得一州而始思得一部大矣光武之志也斯其所以祀漢配天不失舊物歟厥後建武二十二年匈奴右賢鞬日逐王比遣使奉匈奴地圖二十四年北款五原塞願為藩蔽迺立之為南單于俾預藩臣之列是知光武有一天下之志非特輿地圖之所紀皆為臣妾而匈奴地圖之所紀亦為臣妾焉則志也者其撥亂濟世之樞極歟故述之以告來者廣陵李該博達之士也學無不通尤好地理患其書多門歷世浸廣文詞浩蕩學者疲老由是以獨見之明法先聖之制黜諸子之傳記述仲尼之職方會源流考同異務該暢從體要倬然勒成一家之說猶懼其奧未足以昭啟後生乃裂素為方儀據書而圖畫隨方面以區別擬形容而訓解命之曰地志圖觀其粉散百川黛凝㣥山元氣剖判成乎筆端任土之毛有生之類大鈞變化不出其意然後列以城郭羅乎陬落內自五侯九伯外洎要荒蠻貊禹跡之所窮漢驛之所通五色相宣萬邦錯峙毫釐之差而下正乎封略方寸之界而上當乎分野乾象坤勢炳焉可觀與夫聚米擬其端倪畫地陳乎梗㮣固不可同年而語其詳略也每虛室燕居薄帷晴褰普天之下盡在屋壁戶納四海窗籠八極名山大川隨顧奔走殊方絕域舉意而到高視華裔坐橫古今觀帝王之疆理見宇宙之寥廓出遐入幽曾不崇朝與夫役形神於歲月窮轍跡於區外又不可並軌而論勞逸也且夫刪百代之弊綜㣥言之首繁而不亂疎而不漏才識以潤之丹青以炳之使嗜學之徒未披文而見義不由戶而觀奧斯訓導之明也窮地而述舉世而載事極鴻纖理通皦昧混一家之文軌張大國之襟帶覈人物之虛實總山川之要會表皇威之有截明王道之無外斯乃功用之大也見蒼梧塗山則思舜禹恤民之艱覩窮邊大漠則悟秦漢勞師之弊覽齊墟晉壤則見桓文勤王之霸觀洞庭荊門則知苗蜀恃險之敗王者於是明乎得失諸侯於是鑒於興替斯又懲勸之遠也然則本之所以廣學流申之足以贊鴻業垂之可以示後世豈徒由近觀遠以智自樂為室中之一物哉而時無知音道不虛行舉地成圖聞天無路此志士儒林所以為之歎息也某久從君遊辱命序述庶明作者之意俾好事君子知其所以然某頃累忝官尚書省御史臺徧觀諸曹多書令式格律於其屋壁苟非以宦遊為情而奉其職者皆得日夕省覽臥起出入目存心悟纍纍然如貫珠如循環吏無以欺臨事不惑決繁滯舉枉直而協於大中中人以上固可馴致吾不知其誰首之何前賢處心恤事之周也若州縣者卑而近於人遠而切於得失動有懸人命關風俗而惰者委成於一吏望空而署勤者檢閱而山積神憤氣沮卒無所歸致政之弊不亦宜乎此州法吏何洛庭良吏也與之撮其要講其義書於廳事之左某不深於法猶慮未盡後來君子其究成之此長人者之所急三月三日上巳禊飲之日也諸子議以茶酌而代焉迺撥花砌憩庭陰清風逐人日色留興臥指青靄坐攀香枝閒鸎近席而未飛紅蘂拂衣而不散迺命酌香沫浮素杯殷凝琥珀之色不令人醉微覺清思雖五雲仙漿無復加也座右才子南陽鄒子高陽許侯與二三子頃為塵外之賞而曷不言詩矣河東柳茂直與予有潘楊之睦且道義相得也予兄弟志守拙默不交當世晨昏之外靖專一室顧我者唯茂直而已以為切磋蓋常事討論有宴息導志氣徒然起憤議世事予欲無言其或晴天曠景浩蕩多思永夜高月耿耿不寐或風露初曉怳若有得或烟雨如晦緬懷所思則何以節宣慘舒暢達情性其有易於詩乎乃因翰墨之餘琴酒之暇屬物命篇聯珠迭唱審韻諧律同聲相應研情比象造境皆會亦猶眾壑合注浸為大川㣥山出雲混成一氣朗宣五色微闡六義雖小道必有可觀其在茲矣茂直命予序述存以編簡俾後之觀者知吾黨所立之濫觴東海搖兼濟年十三從淮南大軍有奇童之稱歲既冠歷泗上劇職振能吏之聲而尚氣節重言諾臨財廉見義勇蘊崇具美發以雅琴琅琅然若佩玉之有衝牙也貞元丁丑歲觀藝京師沖宇罕窺正聲寡聽道不苟合浩然東歸水流無心遇用則止宏農守御史中丞王公得子最深且東諸侯之望也儻羽翼吾道鏗鏘爾音飛而鳴之一日千里則何公門不可曳長裾乎大丈夫風波未始有極生死且不足問况能離憂乎白露降秋雲起仰見太華壯心勃興若不激徵變商是孤慷慨吾季恭也詩有逸氣盍韻鍾律播於絲桐海昏集者有唐文行之臣故度支郎中專判度支事贈尚書左僕射正平郡公裴氏諱某字某考地毓德會友輔仁氣志如神英華發外之所由作也初公違河洛之難以其族行攀大別浮彭蠡望洞庭徘徊乎湓流眄仰乎海昏有歐山之奇修江之清陽溪之邃湯泉之靈竹洞花塢仙壇僧舍雞犬鐘梵相聞於青嵐白雲中數百里不絕時也俗以遠而未擾地以偏而獲寧開元之遺老盡在猶歌詠乎太平公悠然樂之遂與我外王父故屯田郎中集賢殿學士河東柳公諱某外叔祖故相國宜城伯諱渾洎故太常卿蘭陵蕭公定故祕書少監范陽盧公虛舟故左庶子隴西李公勛為塵外之交極心期之賞唯故給事中汝南袁公高故將作監河南元公亘以後進預焉江左搢紳諸生望之如神仙邈不可及每賦一泉題一石毫墨未乾傳詠巳徧其為物情所注慕如此無何朝廷命公盈虛東南漕引吳楚中原百萬之眾仰食於公人不堪煩我若無事往往佩聯印擁大葢枉道而過舊山林壑之間琴詩不廢心計頤指而軍國飫贍其大雅之全才者歟於戲太尉侍中勤勞王家惠於生人至公再世又以盛德屈於年運慶如壅川其決必大由是焜燿之烈重集於我郇公郇公始以大孝聞中以大用顯次以大忠升藩屏三朝出入二揆述先職而掌邦賦修祖德而踐台衡理荊之政篆在樂石定蜀之武藏在冊府漢南之化方洽於人謠加以優游藝文惇悅經術身被華衮門全素風不畏強禦不侮孤賤久要皆當代長者推轂必一時俊傑海內士大夫如鱗羽之歸龍鳳君子曰憲公忠獻公之勳德節公之雅道為不亡矣郇公以霜露之感泣編遺文思所以垂諸不朽以為節公消息出處之道始於海昏遂於正集外別次當時唱和游覽餞勞之作凡九十六篇勒為海昏集上下卷不遠三千里授簡於小生俾酌歸趣而為序引某嘗備中臺之屬實辱至公之遇聞命巳哀敬不敢文為姑陳古義用贊風訓昔者三代陳詩以觀民風詐信淫義躁靜剛柔於是乎取之喜怒哀樂吉凶存亡於是乎觀之兆於此必應於彼成乎終必見乎始詩不可以為偽魏公子為南皮之游以浮華相高故其詩傲蕩驕志勝而專勤而不安晉名士為金谷之燕以邪侈相扇故其詩濫溺淫志冶而緩往而不返正平公為海昏之會以禮義相誨故其詩恬淡退志莊直立志退以獨全其道立以兼濟於時立而不矜退而不怨適而不放樂而不荒親而不比數而不黷如切如磋婉而有直體曰比曰興近而有深致仁者見之遁世而無憂知者見之愛身而有待曖乎若冬陽之煦油乎若春澤之浸其誘人也易其感人也深卒不知其所以然也夫如是則觀南皮之詩應劉焉得不夭魏祚焉得不短觀金谷之詩潘石焉得不誅晉室焉得不亂觀海昏之詩裴氏焉得不興我唐焉得不理詩之時義大矣哉天人家國之際其至矣哉為節公郇公之子孫者其無忘哉壁記非古也若冠綬命秩之差則有格令在山川風物之辨則有圖牒在所以為之記者豈不欲述理道列賢不肖以訓於後庶中人以上得化其心焉代之作者率異於是或誇學名數或務工為文居其官而自記者則媚巳不居其官而代人記者則媚人春秋之旨蓋委地矣賢二千石河南元結字次山自作道州刺史廳事記既彰善而不黨亦指惡而不誣直舉胸臆用為鑒戒昭昭吏師長在屋壁後之貪虐放肆以生人為戲者獨不愧於心乎予自幼時讀古循吏傳慕其為人以為士大夫立名於代無以高此前年冬由尚書刑部郎中出為此州雖履劇自課而未能逮其意也往刺史有許子良者輒移元次山記於北牖下而以其文代之後亦有時號君子之清者莅此熟視焉而莫之改豈是非之際如是其難乎予也魯安知其他則命圬而書之俾復其舊且為後記以廣次山之志云湘中七郡羅壓上游右振䍧蠻左馳甌越控交廣之戶牖扼吳蜀之咽喉翼張四隅襟束萬里半天下之安危繫焉聖唐理雖偃革制不去備消息變化必惟其時由是部分荊衡復古南鎮輕其兵徒而重其統帥易其將校而難其參佐所以顯仁藏用明道晦權成師於禮樂之中講武於文章之內雍容易簡四十餘年名跡風流冠於當代始則裴諫議虬以逸材奇略傲視而靜荒寇次則趙相公璟以高標雅望鬱起而為國楨其餘馮郎中嶷之碩重房容州孺復之英達鄭評事冽張著作季文之美秀洎張和州惟儉盧侍御澥佐我先大夫宣慈明允實有成績是皆焯於朝論清在人謠者矣元和三年冬天子命御史中丞隴西李公以永嘉之清政京兆之懿則廷賜大旆俾綏衡湘威如秋霜無私凋惠如冬陽無私煦用人如止水無私鑒始下車表前副使殿中侍御史扶風竇君常字中行以本官復職於是監察御史河南穆君寂河內司馬君紓范陽盧君璠太常寺協律郎河東薛君存慶前咸陽縣尉吳郡顧君師閔前太子正字隴西李君礎前太常寺奉禮郎京兆杜君周士前延陵縣尉同郡杜君寶㣥材響附各以類至文雅器用歲餘大備錯金碧於晴壑綷孔翠於春林遐邇翕然稱為盛府中行感會知巳竭其誠能黃鐘音韻調於嶰谷之竹太阿鋒鋩拭以華山之土其吟鸞鳳斷犀兕不足怪也竇氏伯季同時七人一居方伯二列華省四在諸侯之館名教之樂搢紳慕焉以溫近守支郡且知故實得請連帥俾書公堂愧於不文安敢堅讓元和五年七月五日東平呂溫記天厭漢德俾絕其紐㣥生墜塗四海飛水武侯命世實念皇極魏姦吳輕未獲我心胥宇南陽堅臥不起三顧雖晚㣥雄初定必也彗掃是資鼎立變化消息謀成掌中戰龍元黃再得雲雨於是右揭如天之府左提用武之國因山分力與水合勢蟠亘萬里張為龍形首吞咸鎬尾束河洛翼出中夏飛躍天衢然後魚驅句吳東入晏海大勳未集天奪其魄至誠無忘炳在日月烈氣不散長為風雷英雄痛心六百年矣於戲以武侯之才知已託國土雖狹國以勤儉富民雖寡兵以節制強魏武既沒晉宣非敵而戎馬薦駕不復中原或曰奇謀非長則斬將覆軍無虛舉矣或曰餽糧不繼則築室反耕有成算矣嘗試念之頗賾其原夫民無恆歸德以為歸撫則思虐則忘其思也不可使忘其忘也不可使思當漢道方休哀平無政王莽乃欲憑戚寵造符命脇之以威動之以神使人忘漢終不可得也及高光舊德與世衰遠桓靈流毒在人骨髓武侯乃欲開興圖振絕緒論之以本臨之以忠使人思漢卒亦不可得也向使武侯奉先主之命告天下曰我之舉也匪私劉宗唯活元元曹氏利汝乎吾事之曹氏害汝乎吾除之俾虐魏偪從之民聳誠感動然後經武觀釁長驅義聲咸洛不足定矣奈何當至公之運而強人以私此猶力爭彼未心服勤而靡獲不亦宜乎乃知務開濟之業者未能審時定勢大順人心而克觀厥成吾不信也惜其才有餘而見未至述於遺廟以俟通識唐貞元十四年七月十五日東平呂溫記應龍乘風雲作雷雨退必蟠蟄以全其力君子役智能統機劇退必宴息以全其性力全則神化無窮性全則精用不竭深山大澤其所以蟠蟄乎高齋清地其所以宴息乎虢州三堂者君子宴息之境也開元初天子思二南之風並選宗英共持理柄虢大而近匪親不居時惟五王出入相授承平易理逸政多暇考卜惟勝作為三堂三者明臣子在三之節堂者勵宗室克構之義豈徒造適實亦垂訓居德樂善何其盛哉然當時漢同家人魯用王禮棟宇制度非諸侯居後刺史馬君錫因其頹陊始革基構豐而不侈約而不陋以琴尊詩書之幽素易綺紈鐘鼓之繁喧惟林池烟景不讓他日觀其廣踰百畝深入重扃迴塘屈盤沓島交映溟渤轉於環堵蓬壺起於中庭浩然天成孰曰智及春之日眾木花折岸鋪島織沈浮照耀其水五色於是乎襲馨擷奇方舟逶迤樂魚時翻飄蘂雪飛泝沿迴環隱映差池咫尺迷路不知所歸此則武陵仙源未足以極幽絕也夏之日石寒水清松密竹深大柳起風甘棠垂陰於是乎濯纓漣漪解帶升堂畏景火雲隔林無光虛甍沈沈皓壁如霜羽扇不搖南軒清涼此則楚襄蘭臺未足以滌炎鬱也秋之日金飆掃林蓊鬱洞開太華爽氣出關而來於是乎弦琴端居景物廓如月委皓素水涵空虛鳥驚寒沙露滴高梧境隨夜深疑與世殊此則庾公西樓未足以澹神慮也冬之日同雲千里大雪盈尺四眺無路三堂虛白於是乎置酒褰帷憑軒倚楹瑤階如銀玉樹羅生日暮天霽雲開月明冰泉潺潺終夜有聲此則子猷山陰未足以暢吟嘯也於戲不離軒冕而踐夷曠之域不出戶庭而獲江海之心趣近懸解跡同大隱序閱四時之勝節宣六氣之和貴而居之可曰厚矣若知其身既安而思所以安人其性既適而思所以適物不以自樂而忽鰥寡之苦不以自逸而忘稼穡之勤能推是心以惠境內則良二千石也方今人亦勞止上思乂息州郡之選重如廷臣由是南陽張公輟揮翰之任受剖符之寄遊刃而理此焉坐嘯靜政令若水木閒人民如魚鳥馴致其道闇然日彰小子以通家之好獲拜牀下且齒諸子侍坐於三堂見知惟文不敢無述捧筆避席請書堂陰俾後之人知此堂非止燕遊亦可以觀清靜為政之道易曰觀乎人文以化成天下能諷其言蓋有之矣未有明其義者也嘗試論之夫一二相生大鈞造物百化交錯六氣節宣或陰闔而陽開或天經而地紀有聖作則實為人文若乃夫以剛克妻以柔立父慈而教子孝而箴此室家之文也君以仁使臣臣以義事君予違汝弼獻可替否此朝廷之文也三公論道六卿分職九流異趣百揆同歸此官司之文也寬則人慢糾之以猛猛則人殘施之以寬寬以濟猛猛以濟寬此刑政之文也樂勝則流遏之以禮禮勝則離和之以樂與時消息因俗變通此教化之文也文者蓋言錯綜庶績藻繪人情如成文焉以致其理然則人文化成之義其在茲乎而近代諂諛之臣特以時君不能則象乾坤祖述堯舜作化成天下之文乃以旂常冕服章句翰墨為人文也遂使君人者浩然忘本沛然自得盛威儀以求至理坐吟詠而待升平流蕩因循敗而未悟不其痛歟必以旂常冕服為人文則秦漢魏晉聲明文物禮縟五帝儀繁三王可曰煥乎其有文章矣何衰亂之多也必以章句翰墨為人文則陳後主隋煬帝雍容綺靡洋溢編簡可曰文思安安矣何滅亡之速也覈之以名義研之以情實既如彼較之以今古質之以成敗又如此傳不云乎經緯天地曰文禮不云乎文王以文治則文之時義大矣哉焉可以名數末流雕蟲小伎廁雜其間乎昔宓子賤為單父也人不忍欺之國僑為鄭也人不能欺之西門豹為鄴也人不敢欺之此皆為政不同同歸於理作幹事之稱首貽牧人之經範汪洋古今輝焯圖史窮理而語固有優劣擇善而行豈無先後請試論之子賤仕衰亂之魯而邑偪強齊仗義為城池倚仁為干櫓當鯨吞之大敵鳩狼顧之遺黎渙離形檢妙用心術惠訓不倦乃無得而稱視民如傷而不有其愛感而動之陰陽運於無言誠而明之日月懸於方寸是則不求不欺於人而人不忍欺矣子產攝晉楚之間而靖恭爾位役智利物飭躬勵俗守之以信行之以禮告之以慈惠臨之以明察如鏡洞照如衡誠懸是則求人不欺而人亦不能欺矣西門豹當戰國之際而克修茂績身為紀律言有典章剛包其柔威克厥愛權之以法制董之以刑罰火烈人望霜清物心是則責人不欺而人固不敢欺矣夫不忍欺者至誠潛感是曰上德堯舜之吏也不能欺者明智旁達是曰有政三王之吏也不敢欺者嚴威允濟是曰能刑五霸之吏也誠不足至於智智不足至於威大小之間朗然可見然而事在折衷理資漸致德宜全舉道貴兼通必也修誠而棄智誠未至而致理或虧任智而廢威智未周而暴亂將起不若兼而行之迭收其效一之日二之日刑明威立使人畏而不敢欺三之日四之日智達政成使人敬而不能欺五之日六之日志孚誠格使人感而不忍欺以寬濟猛同二氣之和平自邇陟遐比三才之具美苟非全德大器其孰能至於此乎若不暇會其源流統其宗極而姑定優劣直論先後則堯舜之吏與王霸不同年而語矣
