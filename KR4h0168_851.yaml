front:
  text: 全唐文欽定全唐文卷八百五十一權字秀山太原人唐末進士歷官右補闕入梁累遷御史中丞後唐莊宗朝授戶兵吏三侍郎尚書左丞禮部尚書清泰中改戶部尚書晉祖入立轉兵部尚書天福中以太子少傅致仕六年卒年七十八贈左僕射
  hash: sha256:8efde1bafd2464898db64aa0a3d7ab467057008d41f79ec9850d59650c9f2c31
