body:
  text: 每年正仗天下貢物陳於殿庭屬戶部司引進竊以近年以來未甚齊整本二百餘州貢物今止六十餘州伏以任土勤王本朝故事冀申尊奬所謂駿奔伏乞遍下諸州請依貢式陳進正仗之日所貴整齊臣聞戒奢從儉惟經國之遠圖務實去華乃前王之令範伏惟皇帝陛下開基創業應天順人顯宗樸素之風克協聖明之訓臣伏見諸侯奉貢九土勤王羅紈則纎麗奇工器皿則雕鏤異狀文之錦繡雜以珠璣雖外表珍華而事近淫巧臣伏請特降勅旨頒下列藩自今奉貢其鮮麗匹段等酌其物料所值折進生白重絹可將一匹之鮮麗變數疋之縑繒又進奉銀器及鞍轡等竝不在雕鑴金玉其餘衣甲器械竝不在飾以銀裝布以金彩如有鉤玦瑕處可將銅鐵代之足以換彼鮮明益其堅利雖所減者輕同積羽而所集者重可如山匪惟淳厚國風抑亦豐資天府象晉天福六年官尚書刑部員外郎據刑法統類節文云盜賊未見本贓推勘因而致死者有故者以故殺論無故者減一等又云今後或有故者以故殺論無故者或景跡顯然支證不謬堅恃姦惡不招本情以此致死請減故殺罪三等其或妄被攀引終是平人以此致死請減故殺罪一等臣按上文云有故殺者以故殺論此即是矣其無者亦坐減罪即恐未當假如官司或有刑獄未見本情不可全不詰問據言有故者則是曾行拷捶及違令式或麤枷大棒強相抑壓以此致死者並屬有故無故者則是推勘之司不曾拷掠又不違法律亦不堅有抑壓此則並屬無故不可坐刑假若有犯事人舊患疾病推勘之際卒暴身亡不可亦坐推司減等之罪又據斷獄律云若依法使杖依數栲決而邂逅致死者勿論邂逅謂不期致死而死且彼言栲決尚許勿論此云無故卻令坐罪事實相背理有未通請今後推勘之時致死者若實無故請依邂逅勿論之義質字子徵河南人仕唐為芮城令天祐三年李克用承制授檢校兵部郎中莊宗之立有翊贊功累擢戶部尚書知制誥充翰林學士承旨同光元年從平梁遷兵部尚書賜論思匡佐功臣天成元年授特進檢校司空同州節度使明年改賜耀忠匡定保節功臣就加檢校司徒三年入拜兵部尚書四年進封開國公長興二年授檢校太保河陽節度使入為右僕射應順初遷檢校太傅正拜河南尹改太子少師清泰末復為右僕射晉祖入立以疾分司洛陽少帝嗣位拜太子太保天福七年卒年七十六贈太子太師諡文忠臣等以親盡從祧垂於舊典疑事無質素有明文頃莊宗皇帝再造寰區復隆宗廟追三宗於先遠復四室於本朝式遇祧遷旋成沿革及莊宗升祔以祖從祧蓋非嗣立之君所以先遷其室光武滅新之後始有追尊之儀只此在於南陽元不歸於太廟引事且疎於故實此時須稟於新規將來升祔先廟次合祧遷獻祖既叶隨時之義又符變禮之文琦字輝山幽州安次人天祐中後唐莊宗鎮太原以為代州軍事判官入為殿中侍御史明宗朝累遷禮部郎中史館修撰清泰三年以端明殿學士遷御史中丞進禮部侍郎晉祖入立授祕書監遷刑戶兵三部侍郎爵開國子天福八年卒臣竊見四時選人三銓待闕停滯己及於數百棲遲列困於累年南曹繫日申選常有三十二十格式每月送闕不過五員七員竊慮闕員漸稀人數轉多拋耕稼於鄉里忍窮餓於街坊名利之途人所難格朝夕之困事亦可矜若不改張恐未通濟欲請勒定月日南曹注納文解只據見在判成待闕選人取殘闕及逐月新闕量人材優劣據員闕好弱許超折注擬如此即歲暮至新春己來相次發遣應盡其將來選人即依舊至來年十月下解南曹應期判成銓司准格注擬至次年選畢有正格勅用正規程文矩字德儀鄆州人梁福王友璋領鄆州辟為從事入後唐授天平軍節度掌書記天成中累擢兵部尚書晉祖即位改吏部尚書以太子太保致仕天福八年卒年五十九贈太子太傅臣近聞有勅命夏秋苖稅取天成二年額為常定雖聖主時行憂軫而黎民未甚聞知伏請再降明勅令粉壁曉告上年平蜀以來軍人將到西川人口甚多骨肉阻隔恐傷和氣請許收認臣看詳左拾遺任瑤所進封事切見唐莊宗朝宰臣豆盧革韋說洎歷數朝累行宥典俱遂昭雪頗是分明然則令河令豆盧昇南頓令韋濤因父配流遂停官爵況曾居郎署久在朝行或已被茜袍或己紆紫綬前後十遷歲歷八奉赦書至於常赦不原亦得乘時被寵況豆盧昇等唐少帝之時刑部己得雪牒便可卻復舊官旋屬偽廷卻除宰子既塵墨綬須服荷衣敢望明朝特加殊澤竊以任瑤所進封章請復豆盧昇等官序服色望中書商議臣伏奉勅牒令參詳文武百官所進封事內宗正卿石光贊上章云伏見滎陽縣道左萬石君廟本前漢大中大夫石奮之廟德行惠績備列前書乞降封崇俾光宗祖者切以萬石君播盛德於漢朝立嚴祠於鄭圃爰開聖緒永叶昌期石光贊所上公言備章職分深為允當望賜施行前汴州陽武縣主簿左墀進策十七條可行者有四其一請於黃河夾岸防秋水暴漲差上戶充隄長一年一替委本縣令十日一巡如怯弱處不早處治旋令修補致臨時渝決有害秋苖既失王租俱為墮事隄長刺史縣令勒停奉勅旨定四廟諡號廟號陵號者伏以四代祖朔州使君府君自天所祐應時而生肇啟靈源始基鴻業謹案諡法寬容平和曰安臨事屢斷撫俗多方有闕達之能無屈撓之事豈不謂之寬容平和乎又靖者柔德教衆之義也又義者行義不失者也請備神主追尊諡曰孝安皇帝廟號靖祖陵號義陵三代祖右省常侍府君動靜有常夙夜匪懈憂人若已視民如傷謹案諡法一德不懈曰簡富且不驕貴而好禮有典有則無怠無荒豈不謂一德不懈乎又肅者剛德克就之義惠者寬裕不苛者也請備神主追尊諡曰孝簡皇帝廟號肅祖陵號惠陵皇祖振武僕射府君淳德不雜素風自高得安邊靜塞之機有阜俗濟民之術謹案諡法執事有制曰平積善積德允武允文動不為身行惟濟物豈不謂執事有制乎又翼者思慮深遠之義又康者安樂撫民者也請備神主追尊諡曰孝平皇帝廟號翼祖陵號康陵皇考洺州太傅府君天資睿德神贊沈機臨戎則有敵必摧撫恤則無民不悅謹案諡法主善行德曰元盡善盡美乃神乃聖功煥龍圖慶流鳳扆豈不謂主善行德乎又憲者博聞多能之義昭者明德有功者也請備神主追尊謐曰孝元皇帝廟號憲祖陵號昭陵垣晉天福初官太常少卿奉勅定四廟皇后追尊諡議者伏惟四代祖妣秦氏積行芝蘭含貞閨壼徽猷令聞厥彰內則之賢懿靜柔明綽有禮閑之節諒非餘慶何啟昌期謹案諡法宣慈惠和曰元請追尊諡曰孝安元皇后伏惟三代祖妣安定太君安氏門稱盛族代謂良家修德行而義冠稽天蘊柔明而風昭齊體若非淑惠寧協休徵謹案諡法曰貴賢尚義曰恭請追尊諡曰孝簡恭皇后惟皇祖妣高平縣太君米氏令惠生知賢才天禀四德早聞於親戚一齊仍著於閨庭淑問嘗彰貞柔自固謹案諡法嚮惠德義曰獻請追尊諡曰孝平獻皇后皇妣南陽郡太夫人何氏族惟華貴德乃寬沖禮諧義聽之文詩協和鳴之詠履大跡而鍾慶祔神龍而克祥固有靈符來宏景祚謹案諡法溫柔聖善曰懿請追尊諡曰孝元懿皇后受益字謙光唐宰相餘慶曾孫累歷臺閣自尚書郎遷右諫議大夫晉天福間以病告歸尋起拜京兆少尹八年以贓事賜死臣自貢封事已及九日未聞施行實深激憤且臣家在晉昌備知踪跡彥澤在涇州殺式之後至故雍復害軍將楊洪一如式之屠割此乃是陛下去歲送張式令彥澤屠戮致今春楊洪又遭此苦中外觀者痛入骨髓陛下聞之情詎不傷伏自陛下臨御以來萬方咸歌仁聖一何乖爽大玷皇猷又彥澤在涇州日擅將甲兵討伐蕃部尋皆陷沒靡有孑遺乃行酷虐之令括為充墳舊數奪取婦女率掠金帛從順者包羞免禍違阻者飲恨被誅近遠聞王周交代條件上聞凡有濫訛應在其內今陛下畧無所問臣實不平沮王周守法奉公黨彥澤殺人害物臣竊慮此後諸侯効作好事者少繼為惡事者多蓋陛下喜怒不分賞罰有濫既無黜陟之法是退賢良之心今外議沸騰皆言陛下廣受彥澤進獻許行非法之事況在郡括馬將及萬蹄到闕獻誠止滿百疋臣痛恨此賊者致陛下招此惡名故也是敢繼犯宸嚴再具論列必乞速行法令免致天下咨嗟臣又觀陛下前月十八日特降勅命過五日一度內殿起居許臣僚具所見事實封文奏其間勅語曰恐一物失所以百姓為心可為憂民疾痛者矣今臣所論奏彥澤蓋為涇州一方陛下詔墨未乾自違其旨如水投石不動聖心臣竊慮奸邪潛謀罔惑致其明聖有此二三柰何陛下不與執政之臣商量而聽庸愚之輩掩蔽伏以宰臣馮道以下皆忠貞直性輔弼當仁久居調鼎之權上贊垂裳之理而況晨趨玉陛日面龍顏每於造膝之時必竭沃心之奏伏乞宣示前後所貢二狀令對御座子細詳讀若臣所論彥澤如事謬妄不愜聖旨即乞便降朝典令天下知彥澤無罪諫臣妄有陳論兼明陛下無朝令夕改之謗臣職忝諫諍理合抗論不避嚴誅希迴英斷梲字子文深州安平人梁貞明三年舉進士甲科後唐明宗朝累遷都官郎中翰林學士晉祖時以戶部侍郎為學士承旨遷太常卿改太子賓客分司西京卒年六十八臣伏見開元五年勅每年貢舉人見訖宜令引就國子監謁先聖先師學官為之開講質疑所司設食其監內得舉人亦准此例其日清資官五品以上并朝集使並往觀禮永為常式自經多故其禮寖停請舉舊典臣謬蒙眷渥叨掌文衡實憂庸懦之材不副搜羅之旨敢不揣摩頑鈍絕杜阿私上則顯陛下求賢次則使平人得路但以今年就舉比常歲倍多科目之中兇豪甚衆每駮牓出後則時有宣張不自省循但言屈塞互相朋扇各出言詞或云主司不公或云試官受賂實慮上達聖聰微臣無以自明晝省夜思臨深履薄今臣欲請令舉人落第之後或不甘心任自投狀披陳卻請所試與疏義對證兼令其日一甲同共較量若獨委試官恐未息詞理倘是實負抑屈則所司固難逭憲章如其妄有陳論則舉人乞痛加懲斷冀此際免虛遭謗議亦將來可遠久施行倘蒙聖造允俞伏乞降勅處分案禮云天子以德為車以樂為御大樂與天地同和大禮與天地同節又曰安上治民莫善於禮移風易俗莫善於樂故樂書議舞云夫樂在耳曰聲在目曰容聲應乎耳可以聽知容藏於心難以貌覩故聖人假干戚羽旄以表其容發揚蹈厲以見其意聲容和合大樂備矣又案義鏡問鼓吹十二案合於何所答云周禮鼓人掌六鼓四金漢朝乃有黃門鼓吹崔豹古今注云因張騫使西域得摩訶兜勒一曲李延年增之分為二十八曲梁置鼓吹清商令二人唐又有棡鼓金鉦大鼓長鳴歌簫笳笛合為鼓吹十二案大享會則設於懸外此乃是設二舞及鼓吹十二案之由也今議一從令式排列教習文舞郎六十四人分為八佾每佾八人左手執籥禮云葦籥伊耆氏之樂也周禮有籥師掌教國子爾雅曰籥如笛三孔而短大者七孔謂之簅歷代以來文舞所用凡用籥六十有四右手執翟周禮所謂羽舞也書云舞干羽於兩階翟山雉也以雉羽分析連攢而為之二人執纛前引數於舞人之外舞人冠進賢冠服黃紗中單皁領褾白練襠白布大口袴革帶烏皮履白皮襪武舞郎六十四人分為八佾左手執干干楯今之旁牌所以翳身也其色赤中畫獸形故謂之朱干周禮所謂兵舞取武象用楯六十有四右手執戚斧也上飾以玉故謂之玉戚二人執旌前引旌似旗而小絳色畫升龍二人執鼗鼓二人執鐸周禮有四金之奏其三曰金鐸以通鼓形如大鈴仰而振之金錞二每錞二人舉之一人奏之周禮四金之奏一曰金錞以和鼓銅鑄為之其色黑其形圓若權上大下小高三尺六寸有六分圍二尺四寸上有伏虎之狀旁有耳獸形銜鐶二人執鐃以次之周禮四金之奏二曰金鐃以止鼓如鈴無舌搖柄以鳴之二人掌相在左禮云治亂以相制如小鼓用皮為表實之以糠撫之以節樂二人掌雅在右禮云訊疾以雅以木為之狀如漆筩而弇口大二尺圍長五尺六寸以羖皮鞔之旁有二紐䯱畫賓醉而出以器築地明行不失節武舞人服弁平巾幘金支緋絲大袖緋絲布裲襠甲金飾白練襠錦騰蛇起梁帶豹文大口布袴烏皮靴工人二十數於舞人之外武弁朱褠革帶烏皮履白練襠白皮襪殿庭仍加鼓吹十二案義鏡云帝設氈案以氈為牀也今請置大牀十二牀容九人振作歌樂其牀為熊羆貙豹騰倚之狀以承之象百獸率舞之意分置於建鼓之外各三案每案羽葆鼓一大鼓一金錞一歌二人簫二人笳二人十二案樂工百有八人舞郎一百三十有二人取年十五已上弱冠己下容止端正者其歌曲名號樂章詞句中書條奏差官修撰臣歷觀往代下及近朝既立磐維必擇師友或取其德行彰著或取其學術精通待以優崇俾之規益斯亦前王之急務也伏見陛下頒宣典冊封立親賢盛禮既成普天咸慶諒鴻基之永固豈麟趾以能歌伏願陛下特詔有司遵行舊制慎求端士博訪碩儒命以王官使同遊豫雖聰明天縱固不俟於切磋而孝敬日躋亦良由於輔導臣謬塵近侍無補盛時輒以蒭蕘上塵旒扆昔漢宣帝纘紹皇圖勤恤民隱慎擇循良之吏分居牧守之權其有政合廉平惠敷疲瘵小則降璽書而勞問大則錫侯爵以甄酬欲教化之久行故遷移之不遽伏惟陛下粃糠大漢回復皇唐整百王隳紊之綱削四紀傷夷之弊永言致治實在審官刺史縣令有能撫綏不必循拘考限明加奬激就進階資如有課最漸高始終不易量其器業擢在朝廷自然有位之人咸思職分無為而治坐致時雍臣聞高祖神堯皇帝初定天下起居舍人令狐德棻上言以近代己來多無正史恐十數年後事跡蔑聞因命儒學大臣分撰南北諸史且言異代猶恐棄遺況在本朝豈以湮滅臣嘗聞宣宗纘承大業思致時雍旰食宵衣憂勤庶務十餘年之內可謂治平於時史官雖有注記尋屬多故輦輅省方未暇刊修皆至淪墜統臨之盛寂寞無聞伏思年代未遙耳目相接豈無野史散在人間伏乞特命購求十獲五六亦可備編修冀成一代之信書永祚千年之盛觀梲嘗泛覽史編徵得大朝故事昔者肇自天寶延及建中二紀厂田坴兵四郊多壘始之以巨猾乘間繼之以餘孽挻災猛虎召風長鯨鼓浪翠華避狄去巡濯錦之江博望承祧遠駐鳴沙之地二京失守四海倒懸苟非命世之偉人孰拯橫流之大患時則有若尚父汾陽王誠貫天地謀叶鬼神奮臂一呼投袂而起摧兇黨而稍清趙代總全師而徑覲靈源國步有依皇威乃震自是東征西伐左披右攘以戡定為心期以扶持為已任不然則安得田承嗣畏威而屈膝魚朝恩聞義以息心哲后禮之以不名黠虜懷之而號父者歟若其盛德崇庸嘉謀妙算既備存於正史固莫罄於斯文先是洛邑之南有佛寺曰廣化究其經始實我公之奏置焉厥後遂以貞珉刻成遺狀寘之廊廡多歷歲時雖越國良金固無銷鑠而殷巖肖像稍闕瞻虔今皇帝嗣位之三載也日新睿德風布皇猷庶績其凝九功維敘百蠻款附豈辭重譯而來五稼順成何啻三年之積雖元首之盡善盡美亦股肱之同德同心惟太師侍中魯國公手握機衡身為柱石紀氏有藩屏之慶召公兼方伯之權杜元凱之立事立言別先懿戚羊叔子之登山臨水不負勝遊覩是儀形仰其勳德遂首合良輔同率俸金選隱地於山阿取王褱材於澗底別營邃宇以代迴廊操繩墨者曲盡規模運斤斧者巧呈剞劂高惟䡾䡾深乃耽耽分雁墖之煇煌助龍門之秀麗厥構云就遷以處焉望之者凜凜如生遇之者肅肅加敬不獨旌顯前烈亦將激勸後來非賢而孰肯慕賢惟善而乃能嘉善豈比夫過隆中之故宅但想風猷經厭次之荒祠空畱讚頌而已哉既訖事公命梲抽毫以志之梲詞非玉海跡忝琳宮矧於不朽之文尤寡當仁之譽辭之莫獲退而直書清泰三年八月九日記皡字司東河東人光化三年進士歷拾遺補闕梁初遷翰林學士中書舍人後唐莊宗時擢禮部侍郎改太子賓客以老拜兵部尚書致仕晉祖時起為工部尚書復以老拜右僕射致仕卒年八十五贈太子太保方伯郡守之任與大朝分理疆土共養黎民委寄非輕古今所重親人之職莫過於是伏請啟今後諸州刺史經三考方可替移使能理者盡展所能弊政者自彰其濫優劣既判黜陟可行則州縣免迎新送故之勞朝廷得惠養除煩之理太平之道無易於斯希崇字德峯幽州薊縣人後唐莊宗朝累遷蕃漢都提舉使天成初契丹命為平州節度使後逃歸授汝州防禦使遷靈州兩使畱後改邠州節度使晉祖入立除靈武卒年五十二父在己離母死不至止稱假子孤二十年撫養之恩儻曰親兒犯三千條悖逆之罪頗為傷害名教安敢理認田園其生涯並付親子所訟人與朋姦者委法官以律定刑光度晉天福中鄉貢進士詩云太山巖巖惟魯所瞻標㣥嶽之首隱衆靈之府靈者神也神生於無神之神陰陽不測而為神日月照輝而為明無神之神者至道也道德經云杳杳冥冥於中有精恍恍忽忽於中有物此之謂也天福六年三月十七日新澶州岳社頭郭肇專智以金門貢藝玉署呈才風雲闕二字於二龍奮躍素高於雙驥副社頭郭肇闕一字情涵珠海鑒澈冰潭貯茂異以盈懷抱才實而鏁志因乘暇豫同慕勝遊陟彼闕一字原共睹橋舸飲酒酣暢而相與言胡不聞賈誼云生闕一字也若浮生死之也若休莊周云生之也道行死之也物化人闕一字短分定豈不在乎神明哉遂乃拱志修崇歸心祀享結集岳社化被邑人不期月間總四十戶至天福元年三月十日社衆西自新州東之太闕一字遠備牢醴克置羞薦無愧叨僭惟竭至誠但有遺曠庶幾增建竊見宮宇炳煥峯巒迴合空六字尊神象列侍者星繁唯柰河闕一字元非靈廟是以歷覽林藪履蹈河壖東望則天之壇西臨鬼仙之洞謺嶂重巖倚其後飛雲流水枕其前得此一方實為殊勝是以擘畫砂礫闕四字任便裁基隨宜剏跡召公輸於魯甸招匠石於郢郊雀戈岨崍之花松斷新甫之文柏奇材異石窮神役思以蘊崇碧瓦銅塼盡心畢力以駢集闕二字秉斫爭工不異於雷震剫木飛繩競巧可同於電捷天福三年五月十日建就堂一所三間四下椓週迴行牆二十四堵門樓一所悉以粉飾藻繪秀麗精華取金碧於十洲運丹青於三島香寮綺井返植蓮荷畫棟琱梁高橫螮蝀翠櫩朱網亭亭而日麗九天複道重階落落而露凝五色天福五年三月九日迎入將軍夫人真形兩座厮兒妮子兩人夜乂一對郭肇等命以闕一字者告厥成功釃酒焚香虔誠啟仰忻然應變但覺顏迴風遶壇實謂神降此則天意人事聖道合符體乎元元不可窮紀光度學輸鍾會才謝邱遲堅讓不從輒敢承請是以凝元扣寂闕一字簡闕一字毫力課短懷用旌刊飾銘曰瞻彼柰河泉流清清噫彼逝人魂飛冥冥善惡斯作禍福隨情應業受兮靡跡厥靈將軍英靈祠堂䆗窱一氣散化萬神應兆事有克彰物無不照輔贊天孫闕一字室嵒峭空三字優遊高士放曠清人豫搆陰德思振芳塵物景代謝事蹟相仍成此廟貌永司其津
