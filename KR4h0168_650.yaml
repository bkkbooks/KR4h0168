front:
  text: 全唐文欽定全唐文卷六百五十元稹四
  hash: sha256:fc773928a58ca65f93cfb6a829f556711cd4077b4eddf04dc85d11e3086d9a66
body:
  text: 昔我元宗明皇帝得姚元崇宋璟使之鋪陳大法以和人神而又益之以張說蘇頲嘉貞九齡之徒皆能始終彌縫不失紀律四十年間海內滋殖風俗謹樸君臣平寧人無爭端而卿大夫羞以贓罪鞫人於聖代矣况伺察乎由是網漏吞舟視盜不謹寇羯乘釁勃為妖氛天下持兵垂七十載朕因眇末獲承祖宗分不得見四方無姑息之臣而九有復升平之境矣上帝念我賚予忠賢盡獻提封恢纘舊服使遼陽八州之衆重覩開元之儀者則予侍中總之力也名藩厚位予何愛焉劉總巳極上台仍移重鎮兄弟子姪各授官榮大將賓寮亦皆超擢管內州縣官吏肅存古者二百餘人悉是劉總選任材能久令假攝並與正授用獎勤勞尚念幽將士夙著勳庸易帥之初諒宜優錫共賜錢一百萬貫以內庫及戶部見在匹段支送充賞給幽州盧龍并瀛漠等州將士又念八州之內九賦用殷慶澤旁流所宜霑貸其管內八州百姓並宜給復一年仍令給事中薛存慶徃彼宣慰親諭朕懷州縣之中或有殘破偏甚者委宏靖量事便宜優䘏務令存立劉總素以清靜理人固當開釋尚恐自罹禁網亦念哀矜管內見禁囚徒罪無輕重並宜赦免大將及判官等雖巳頒官爵而或慮闕遺宜委宏靖具名銜聞奏如有父母在者別具上聞當加優䘏朕以劉總父子並立戰功永言將吏之中慮有沒於王事當道從前巳來官吏將士等或忠義可嘉身巳淪沒者委宏靖條錄聞奏當加追贈平時舊老始見胡塵復覩朝儀得無悽抃遐想撫其兒稚自此免於兵鋒言念及茲用加優給管內有高年惸獨或疾瘵不能自存者委宏靖差官就問量給粟帛管內州縣官吏有奉職清強惠及百姓者委宏靖具事跡奏聞當與量加進改燕趙之間古多奇士隗臺如在代豈乏賢如有隱於山谷退在邱園行義素高名節可尚或才兼文武卓然可獎者亦委宏靖具名薦聞於戲古人云安不忘危魏徵對太宗以守成之不易茲朕小子抑又何知而鎮冀克和幽燕復古慄慄夙夜不遑安寧實惟祖宗之休尚賴股肱之力咨爾輔弼至於方嶽爾當勉於姚宋之功予亦無忘於天寶之戒宣示中外宜體朕懷朕聞昔者卿大夫相與讓於朝士庶人相與讓於列周成王刑措不用漢文帝恥言人過真理古也朕甚慕焉中代以還爭端斯起掩抑其言則專蔽誘掖其說則欺誣自非責實循名不能彰善癉惡故孝宣必有告訐及下光武不以詭辭遽行語稱訕上之非律有匿名之禁皆所以防三至之毀重兩造之明是以爵人於朝則皆勸刑人於市則皆懼罪有歸而賞當事也末俗偷巧內荏外剛卿大夫無進思盡忠之誠多退有後言之謗士庶人無切磋琢磨之益多銷鑠浸潤之讒進則諛言諂笑以相求退則㣥居雜處以相議畱中不出之請蓋發其陰私公論不容之詞實生於朋黨擢一官則曰恩皆自我黜一職則曰事出他門比周之跡巳彰尚矜介特由徑之蹤盡露自謂貞方居省寺者不能以勤恪莅官而曰務從簡易提紀綱者不能以準繩檢下而曰密奏風聞獻章疏者更相是非備顧問者互有憎愛苟非秦鏡照膽堯羊觸邪時君聽之安可不惑參斷一謬俗化益訛禍發齒牙言生枝葉率是道也朕甚憫焉我國家貞觀開元同符三代風俗歸厚禮讓偕行兵興巳來人散久矣始欲導之以德不欲驅之以刑然而信有未孚理有未至曾無恥格益用雕刓小則綜覈之權見侵於下輩大則機樞之重旁撓於薄徒尚念因而化之亦既去其尤者而宰臣等懼其寖染未克澄清備列祖宗之書願垂戒勵之詔遂申誥教頗用殷勤各當自省厥躬與我同底於道凡百多士宜體朕懷我高祖太宗化隋為唐奄宅區夏包舉四海全付子孫其何事哉彼昏盈而我勞劬也明皇承之能大其業六戎八蠻莫不貢奉由是庶尹弛政庶吏弛刑視人不勤視盜不謹燕寇勃起洞無藩籬六十有七年兵革大試其何事哉據安逸而易萌漸也逮我聖父勤身披攘斬斷誅除天下畧定曾是幽冀賜予懷來荷賴景靈丕訓不墜環嵗之內二方平寧粵予何功時帝之力而卿大夫猥以大號加予眇身讓於四三益甚其請皇太后始聞其事歡然慰心慈旨丕臨臣誠上迫祗受典禮懍乎予懷尚念昔者七十二君莫不升中慶成自以為堯舜莫巳若也然而不為堯舜之行者來代無傳焉朕嘗推是為心不欲名浮於實今卿大夫謂我文武孝德矣其將何道以匡予予其兢兢業業日慎一日慕陶堯虞舜之行以自勉思文武憲章之道以自勤予苟不思無忘納誨於戲溢美之名既不克讓潤物之澤夫何愛焉可大赦天下自長慶元年七月十八日昧爽巳前罪無輕重咸赦除之惟故殺人并官典犯贓不在此限應左降官及流人未經量移者宜與量移近處有左降官流人本因犯贓得罪者宜依今年正月三日制處分京畿諸縣及庶支鹽鐵戶部負欠各疏理放免有差應經戰陣之處所在州縣收瘞遺骸仍量事與槥櫝兼以禮致祭李師道吳元濟自絕於天並從誅戮念其祖父嘗事先朝墳墓所在並不得令人擅有毀廢愛人本於省賦雖在必輕國用出於地財又安可闕令淮蔡并山東率三十餘州約數千里頒賜或踰於鉅萬給復有至於連年應河北等州給復限滿處置宜委所在長吏審詳墾田并親見定數均輸稅賦兼濟公私每定稅訖所增加賦申奏其諸道定戶宜委觀察使刺史必加實審務使均平京兆府亦宜准此其百司職田在京畿諸縣者訪聞本地多被所由侵隱抑令貧戶佃食蒿荒百姓流亡半在於此宜委京兆府勘會均配務使公平其京兆百姓屬諸軍諸使者宜令各具挾名勑下京兆府一戶之內除巳屬軍使餘父兄子弟據令式年幾合入色役者並令京兆府明立籍簿普同百姓一例差遣頻年巳有制勑處分委京兆府舉明舊章條件奏聞刑獄所繫理道最切如聞比來多有稽滯一拘囹圄動變炎涼自今巳後宜令御史臺切加訪察每季差御史巡囚事涉情故或斷結不當有失政刑具事由奏聞其天下州縣並委御史臺并出使郎官御史兼諸道巡院切加察訪近邊所置和糴皆給實價如聞頃來積弊頗甚美利盡歸於主掌善價不及於村閭或虛招以奉於強家或廣僦用資於游客若不嚴約弊何可除宜委度支精擇京西京兆應供糧軍并和糴院官及營田水陸運使切加訪察仍作條疏檢轄速具奏聞應停諸道年終勾并不許刺史上使并錄事參軍不得擅離本州委御史臺切加糾舉內外文武見任并致仕官賜官爵有差神策六軍金吾威遠皇城將士普恩之外各賜勳三轉大長公主公主嗣王郡主縣主神策六軍金吾威遠皇城等諸軍將士統軍以下兼將士等長行立仗及守本軍本營者各賜物有差鴻臚禮賓院應在城內蕃客等並節級賜物陰山貴女來迓天孫會王明庭克勸盛典念吾妹之將遠於禮賓而宜加其回紇公主別有賜物攝侍中讀寶戶部侍郎平章事杜元穎中書侍郎平章事崔植各加一階撰冊文官與一子正員奉冊奉寶綬書玉冊書寶官各加兩階進寶綬進冊中進中嚴外辨禮儀贊導押冊押寶綬舁寶冊官各加一級其餘應職掌行事官并寫制書官太常修撰儀注禮官并內定行事中使三品巳上賜爵一級四品巳下加二階仍並賜勳兩轉鑴造玉冊并填墳金字造寶寶官等各賜五十段尊師重傅有國常經李逢吉韋綬薛倣丁公著等普恩之外各加一階如巳至三品四品者賜爵一級天下百姓九十巳上委所在長吏量加存恤孝子順孫義夫節婦先以旌表者亦量加優恤五嶽四瀆名山大川并自古聖帝明王忠臣烈士各令所在以禮致祭臣某言臣昨二十五日宰臣伏宣聖旨以陸贄敗官罪狀不可書於詔命陛下慈仁愛人恩宥愚直仍令後有所見得以上聞臣忝職諫司不勝大幸臣等前所上表言陸贄等得罪之由起於讒構此皆延齡每自倡言以弄威寵及奉宣示姦詐乃明陸贊久在禁垣復典樞要今之譴責固出聖衷竊以李克勵志䘏人勤身奉職惠愛之化洽於細微頃以公事之間與延齡相敵未貶之月延齡亦以語人讒搆之端㣥情是惑臣聞大臣之體出於讒辭安可持密勿之言為忿怒之柄朝廷側目遠邇搖心百官素不能親附延齡者屏氣私門不知自保陛下聖德下照物無所遺豈獨厚於一夫而乃薄於天下伏惟發誠謹中官備問閭里有言延齡無罪李克有過臣實微眇敢逃天誅李克覆族亡家於臣何害事關大本不敢自私延齡姦計萬殊方司邦賦必能公用財賄陰結匪人則他時之過彰聞路絕伏以貞觀遺訓日經宸心去其邪謀以慰天下幸甚幸甚臣不勝懇迫之至臣某言間者陛下親授臣以直言之詔又命臣以言責之官奉職以來未嘗忘死誓將忠懇上答鎔造竊以裴延齡虧損聖德瀆亂典章逞其心欲以蝥毒黎元恣其苛刻以動搖邊鄙弄陛下爵位以公授私人盜陛下威權以誘脅忠善賢愚注耳朝野同辭臣固不敢飾其繁文再擾聰明所以晝夜感憤不能自寧者以陛下執刑賞之柄不僭在人延齡狡詐公行曾不為念伏見去年十二月五日敕度支討管李配流播州張勛配流崖州仍各決六十斯則延齡自快怒心曲遂其狀陛下聽之以誠謂為當舉峻其所罰用直㣥司罪名及加寃聲大振陛下深鑒其事詔命中畱曾不旬朝馳聞海內使遠方之人疑陛下明有所壅令無必行姦以陷君孰任其咎儻二人獨決延齡之手死不得言化理之失豈不重乎陛下常以登聞之鼓置之於庭必欲人情纎微不滯於外比來或事繫度支銜寃上訴皆不即驗問盡付延齡縲囚衣冠攘奪孤賤身不足償其怒家無以應其求怨痛內緘誰與為理矰繳盈路動而見拘咫尺天門不敢上訴延齡之威益熾疲人之苦日深陛下以延齡為賢言者皆妄不若明白其罪昭示萬方使延齡無辜辨之何害儻兇惡滋蔓鬱於人心決之不時所傷豈細臣實寒心銷肉用是為憂伏惟俯鑒衆情召臣問狀有一非據罪在面欺臣不勝迫切之至臣聞理亂之始各有萌象二者無門在君上啟之而巳所謂萌象豈有他哉容直言廣視聽躬勤庶務委信大臣使左右近習者不敢蔽疎遠之臣庶此理之象也此而不理萬無一焉大臣不親直言不進抵忌諱者殺犯左右者刑與一二近習者決事於深宮之中㣥臣莫得參籌畫此亂之萌也此而不亂亦萬無一焉是以古者人君即位之始萌象未見之時必有狂直敢言之士抵忌諱獻危言在上者苟或宥而容之激而進之則天下之君子望風而悅曰彼之狂而猶容於上上之人其欲來天下之士乎吾之道可以行矣其小人竦利而喜曰彼之直可以得幸於上吾將直言以徼利可也由是天下之賢不肖各以所忠貢言於上上下之志霈然而通得失之情幽遠必達合天下之智理萬物之心人人樂得其所戴其上如赤子之親慈母也雖欲誘之為亂其可得乎臣故曰容直言廣視聽而不理者萬無一焉及夫進計者入而不出直言者戮而不容則天下之君子自謀於心曰與其言且不用而身為戮吾寧危行言遜以保其終乎其小人擇利而喜曰君之所惡者拂心逆耳之言也吾將苟順是非以事之可也由是進見者草而不內言事者寢而不聞若此則十步之事不得見也朝廷之情不得聞也而况於天下之大四方之遠乎故曰聾瞽之君非無耳目也蓋左右前後者屏蔽之不使視聽爾此而不亂其可得哉昔太宗文皇帝初即位時天下之人莫有諫者唯孫伏伽嘗以小事特諫於上文皇帝大悅厚賜田宅以勉之自是言事者惟懼乎言不直諫不極不能激文皇帝之盛意曾不以觸龍鱗犯忌諱為不可矣於是房杜王魏之徒議可否於前天下四方之人言得失於外不四三年而天下大理豈文皇獨運聰明於上哉蓋亦㣥下各盡其言以宣揚發暢於天下也且夫樂全安而惡戮辱古今之情一也豈獨貞觀之人輕犯忌諱而不惡戮辱哉蓋文皇激而進之之功也喜順從而怒謇犯亦古今之情一也豈獨文皇甘逆耳而怒從心哉蓋以順從之利輕而危亡之禍大無窮之業重而奉己之事微思為子孫垂不朽建永安之計也為後嗣者其可順一朝之意而輕用文皇之天下乎累聖傳序於今垂二百年矣莫不率由斯道致俗和平况陛下以上聖之資紹復前統即位之日天下惟新罪叔文之徒而凶邪之黨散懸惠琳之首而悖亂之氣消發承光之詐而假威之孽除反焦陂一作陵之田而蒸庶之情感其餘滌瑕緩死薄賦䘏人賜帛耆年旌閭孝悌修廢學建義倉莫不曲被殊私覃於有截斯皆陛下上法堯舜近法太宗致理之萌形見者數十豈臣庸劣一二而能明然而臣竊復孜孜咄咄有所未決者獨以陛下即位巳來既周嵗矣百辟卿士至於天下四方之人曾未有獻一計進一言受陛下伏伽之賞者左右前後拾遺補闕亦未有奏一封執一諫受陛下激而進之之勸者設諫鼓置匭函曾未聞雪一寃決一事明陛下無幽不察之意者若臣等備位諫列名為供奉官曠日彌年不得召見每就位屏氣鞠躬不敢仰視又安暇議得失獻可否哉供奉官尚爾又况於疎遠之臣庶雖有特達不㣥之智思欲自効其路何階遂使凡今之人以諫鼓匭函為虛器謂拾遺補闕為冗員臣竊思之以陛下之睿博宏深勵精求理豈或入而不出言而不用哉蓋㣥下因循不能有所發明之罪也且臣思之今之備召見承顧問者獨一二執政而巳每一對敭不及俄頃之間議天下之事臣竊料之恭承聖問仰謝寵光之不暇又安暇陳理亂議教化哉其餘瑣瑣有司或時一召見言薄書之出入計錢榖之登降不暇又安足置牙齒間臣竊惟陛下以景命惟新之初何如貞觀致理之後當貞觀致理之後以房杜王魏匡輔之智而猶上封進計者薦至獻可替否者日聞今陛下當致理之初在四方多虞之日然而言事進計者終嵗無一人豈非㣥下因循竊位之罪乎若臣稹者稟性駑鈍昧然無識然以當陛下臨御之始首陛下策賢之科擢授諫司恩邁常品若復默默與在位者處則臣莫大之罪亦邁於常品矣輒敢冒昧殊死件奏十事於後一曰教太子以崇邦本二曰封宗王以固磐石三曰出宮人以消水旱四曰嫁諸女以遂人倫五曰無時召宰相以講庶政六曰序次對百辟以廣聰明七曰復正衙奏事以示躬親八曰許方幅糾彈以懾姦佞九曰禁非時貢獻以絕誅求十曰省出入畋遊以防銜蹶凡此十者設使言之而是是而見用非臣之福也天下之福也苟或言之而非非而見罪乃臣之分也亦臣之願也無任懇悃奮激効節愛時之至謹詣東上闔門奏表并事件以聞臣稹誠惶誠恐頓首頓首死罪死罪謹言臣稹言伏奉今月三日制書授臣使持節同州諸軍事守同州刺史兼本州防禦使臣罪重責輕憂惶失據慮為臺府迫逐不敢徘徊闕廷便自朝堂匍匐進發謹以今月九日到州上訖臣某辜負聖朝辱累恩獎便合自求死所豈宜尚忝官榮誠恐誠慙死罪死罪臣八嵗喪父家貧無業母兄乞丐以供資養衣不布體食不充腸幼學之年不蒙師訓因感鄰里兒稚有父兄為開學校涕咽發憤願知詩書慈母哀臣親為教授年十有五得明經出身自是苦心為文夙夜強學年二十四登吏部乙科授校書郎年二十八蒙制舉首選授左拾遺始自為學至於升朝無朋友為臣吹噓無親黨為臣援庇莫非苦巳實不因人獨立成性遂無交結任拾遺日屢陳時政蒙先皇帝召問延英旋為宰相所憎貶臣河南縣尉及為監察御史又不敢規避專心糾繩復為宰相怒臣不庇親黨因以他事貶臣江陵判司廢棄十年分死溝瀆元和十四年憲宗皇帝開釋有罪始授臣膳部員外郎與臣同省署者多是臣初登朝時舉人任卿相者半是臣同諫院時拾遺補闕愚臣既不能低心曲就輩流亦以望風怒臣不料陛下天聽過卑知臣薄藝朱書授臣制誥延英召臣賜緋宰相惡臣不出其門由是百計侵毀陛下察臣無罪寵獎逾深召臣面授舍人遣充承旨學士金章紫服光飾陋軀生人之榮臣亦至矣然臣益遭誹謗日夜憂危唯陛下聖鑒照臨彌加保任竟排㣥議擢備台司臣忝有肺肝豈並尋常宰相况當行營退散之後牛元翼未出之間每聞陛下軫念之言微臣恨不身先士卒所問於方計策遣王友明等救解深州蓋欲上副聖情豈是別懷他意不料姦人疑臣殺害裴度妄有告論塵黷聖聰愧羞天地臣本待辨明一了便擬殺身謝責豈料聖慈尚在薄貶同州雖違咫尺之顏不遠郊畿之境伏料必是宸衷獨斷乞臣此官若遣他人商量乍可與臣遠處藩鎮豈肯遣臣俯近闕庭臣所恨今月三日尚蒙召對延英此時不解泣血仰辭天顏便至今日竄逐臣自離京國目斷魂銷每至五更朝謁之時臣實制淚不已臣若餘生未死他時萬一歸還不敢更望得見天顏但得再聞京城鐘鼓之音臣雖黃土覆面無恨九原臣某無任自恨自慙攀戀聖慈之至然臣一日未死亦合有所陳論或聞党項小有動搖臣今謹具手疏陳奏伏望恕臣死罪特畱聖覽臣此表并臣手疏並請畱中不出謹遣差知衙官試殿中監馬宏直奉表謝罪以聞臣某言伏見逆賊李㝏已就誅夷韓充入汴州訖一方既定率土無虞凡在臣僚實增欣抃臣某中賀伏以汴州抱吳楚之津梁據咽喉之要地將驕卒悍易動難安急攻則越逸是憂緩取則遷延易變自非陛下盡排㣥議獨斷宸衷外委將臣內敷睿算風行號令天助機謀則何以斬此鯨鯢破茲梟獍臣摧凶志切受國恩深仰荷威靈倍萬常品限以符守不獲稱慶闕庭無任踴躍屏營之至臣某言今日得上都進奏官報稱昨日陛下御紫宸殿受㣥臣朝賀伏審聖躬萬福親見百寮率土皆歡溥天同慶臣某臣聞兩曜有晦明所以成其不巳四瀆有盈縮所以成其不竭不有燎火無以辨玉質不有霜霰無以見松心是以軒轅神倦然後夢華胥之游秦穆疾寐然後享鈞天之樂堯以癯瘠而為聖禹以胼胝而稱功斯皆因疾成妍以勞逢福非臣臆度敢進瞽言昨者聖體不安纔經旬日穆卜言吉勿藥有瘳此所以表北極之長尊配南山而永固者也况日臨黃道萬物皆榮帝御紫宸千官畢賀臣以守符外郡不獲稱慶明庭空懷鼓舞之心有阻賡歌之末無任跳躍歡欣瞻望徘徊之至謹差知衙官劉宗奉表陳賀以聞臣某言伏奉今月二十九日制授臣御史中丞寵秩踰涯心魂戰越臣某中謝臣生值聖時蔭分天屬雖牽絲入仕或因瑣碎之文而執簡當朝實由睦族而致頃以材駑氣直屢棄遐荒陛下擢自遠藩任兼臺閣夙夜循省効報無階豈謂天眷曲臨過蒙獎拔坐令專席位忝中司因當陳乞於天安敢叨榮於已如或綸言既降丹慊莫從則當破柱求姦碎首請事死而後已義不苟然增日月之末光答天地之殊造無任懇款屏營之至臣某言中使某乙至伏奉今月十九日勑以臣兼充申光蔡等州招討使并賜臣手詔兩道天光下濟聖澤逾深捧詔慙惶心魂戰越臣某中謝伏以陛下威加四海德被萬方下蜀無束馬之勞平吳但斬鯨而已百蠻述職九有懷仁凡在生成孰不柔茂而蕞爾元濟天將勦除寘蟊賊於其心假螻蟻以為聚父死不葬王命未臨擅脅師徒偷侵縣道此誠仁人孝子決憤激忠之日也陛下尚先含垢未忍加誅曲示綏懷俾臣招撫臣誠雖懇到性本孱愚任重憂深驚惶失據然以苗心可化舜舞方興仰荷威靈冀其柔服臣即日與鄰道計會奉宣詔旨誘諭頑凶威愛並施使之來格如或尚驅梟獍不襲椒蘭臣則誓死剪除俾無遺孽其歸投百姓等臣並准詔別加優䘏置在安全仰副聖情不令驚擾臣先奉恩詔令臣發赴唐州不獲奔走伏謝闕庭無任恐懼之至臣聞拯遺甿於溝瀆非聖不能掃餘沴以雪霜非天不可日者神棄申蔡蓄為汙瀦五十年間三后貽顧眇爾元濟繼為凶妖謂君命可逃以父死為利陛下凝茲睿算取彼凶殘不越殷宗之期遂勦淮夷之命威動區宇道光祖宗凡在生成孰不歡忭臣忝官藩翰不獲率舞闕庭瞻望徘徊無任踴躍屏營之至臣某言伏奉今日制授臣某官恩加望外寵過憂深魂魄驚翔手足失墜臣某中謝臣猥以凡才謬居重任當陛下惟新之始辱陛下爰立之恩有累樞衡無裨衮職外致匈奴之哂內失蒼生之心推換炎凉因循聖澤妨塞賢路塵忝台階自顧疲驂方求息駕豈謂陛下特迂宸鑒曲用朽材再提腹背之毛重委股肱之地大孤人望猶簡帝心雖君父恩深莫知其惡而駑駘力竭何以自安豈敢退而生全實願求其死所伏望再移天眷重選時英特回加膝之恩別受沃心之相全陛下始終之道成微臣生死之榮無任懇迫慙惶之至恩波下濟澤被窮泉天眷旁臨日聞幽穸臣某中謝臣祖臣父或勳或賢義著族婣名書國籍逮臣不肖有累前人妄繼元成之官實媿仲弓之德自陛下遣臣待罪宰相不能有以匡逮聖明齷齪知慙屏營失據常恐孔悝銘鼎折足可期於啟閭門構堂無所豈謂偶逢昌運幸沐殊私赦臣致寇之辜念臣積善之本追崇祖禰錫命官封子道有光升卿之言果驗孫謀表慶令伯之報方申海嶽恩深涓埃効淺彷徨自顧跼蹐何安無任感德忘軀之至臣聞令之必行於下者信也令苟不信患莫大焉今陛下初臨㝢內務切黎元至於牧守字人之官所宜詳擇苟未得人不當虛授苟或任使不可屢遷臣竊見近除寧州刺史論傪虔州刺史高宏本通州刺史豆盧靖曾不涉旬並已追制又以杜兼為蘇州刺史行未半途復改郎署臣不知誰請於陛下而授之誰請於陛下而追之追之是則授之非授之是則追之非以非為是者罰必加然後人不敢輕其舉以是為非者罪必及然後下不敢用其私此先王所以不令而人從不言而人信豈異事哉率是道也今陛下如綸之令朝降反汙之詔夕施紛紛紜紜無所歸咎臣竊恐陛下之令未能取信於朝廷而况於取信天下乎臣伏願陛下徵舉者之詞察追者之請若舉者之詞直則請而追之者不得無過若追之者理勝則舉而授之者不得無辜賞罰是非所宜明當况陛下肇臨黎庶教化惟新誥令之間四方所仰小有得失天下必聞臣實庸愚謬居諫列職當言責不敢偷安苟有所裨萬死無恨無任愚迫懇款之至臣聞先王之制祿也居其位而不行其職者誅是以上無虛授下不隱情臣竊觀今之備位素餐不得其職者莫過於臣輩臣聞太宗文皇帝時王珪魏徵為諫官文皇雖宴游寢食之間王魏實在其所用至於文皇發一言則王魏善之而後出舉一事則王魏慮之而後行以文皇之明合王魏之智是以舉無遺事言有典常文皇猶以為視聽之未廣也因命三品以上入議軍國大政必遣諫官一人隨入以參驗之當是之時司股肱耳目之任者有君臣之義焉有父子之恩焉有朋友之歡焉是以否無不替可無不行不四三年而天下大理蠻夷君長帶刀入侍者不可勝計豈干戈征伐之所致乎蓋擁蔽之患銷而幽遠之情達也若此然後可以稱天子之諍臣矣近之司諫諍者則不然大不得備召見次不得參時政排行就列纍纍而巳且臣聞之諫官之職曰左右前後拾遺補闕大則廷議小則上封近年已來正衙不奏事庶官罷廷對若此則不見遺闕補拾何階不得敷陳廷議安設其所謂舉諫職者唯獨誥令有不便除授有不當則奏一封執一見而已以臣思之君臣之際論列是非諷諭於未形籌畫於至密尚不能回至尊之盛意備讒慝之巧言而况於既行之誥令已命之除授然後奏一封執一見思欲收絲綸之詔迴日月之光信無裨於萬一矣至使凡今之人以上封進計為妄動拾遺補闕為冗員以此稱供奉官與王珪魏徵為等列臣雖至愚能不自媿且陛下若以為臣等無所裨補不足參侍從固不當假以名器立之於朝苟以為務廣聰明稍關理道又不當屏棄疎賤之使至於此伏願陛下許臣於延英候對召臣一見賜以溫顏使臣得盡愚懇之誠備陳諫官之職苟或言有可採得裨陛下萬分之一是臣千載之一時也如或言不詣理塵黷聖聰則臣自寘刑書以謝謬官之罪亦臣之所以甘心也無任懇款發憤効職忘軀之至謹詣東上閤門奉表以聞臣伏見賊闢有不庭之罪陛下尚覆露以待之此誠陛下罪已泣辜之仁也微臣何足以識之哉然臣聞之天之所以為天者以其能化物也物之性不一故天之道有和煦震曜之異焉始其生也動之以幽伏被之以春陽扇之以仁風潤之以膏雨則百果草木之柔者順者油然而生矣及夫勾曲角觡堅本頑心凝者滯者幽者蟄者扇之以和煦而不出潤之以膏雨而不滋則必迅之以雷震曜之以威赫然後頑滯之心改幽蟄之氣宣豈天之道仁於彼而厲於此乎化與不化之異也是以蚩尤之亂作黃帝鑄五兵以殺絕之共工之行惡虞舜揭五刑以放死之豈不欲夢華胥舞干羽而躋之於仁壽哉蓋不可化也及夫舞干而適至因壘而來歸此又物之可化者也豈黃帝虞舜文王之德有優劣哉蓋蚩尤共工苗人崇人罪有深淺也今陛下法天之德與物為春凡在生成孰不柔茂而蕞爾微醜天將棄之寘蟊賊於其心假螻蟻以為聚忠臣孝子思得食其肉而快其心久矣陛下猶聳之以名爵導之以訓誥崇之以寵章而不至假之以旄鉞而益驕戕賊我忠貞損汚我仁義人人不勝其憤有司不忍其威是以違陛下匿瑕含垢之仁順皇天震曜殺戮之用此誠天下人人快憤激忠之日也陛下猶思因壘以降之舞干以化之善則善矣其如天下之憤何其如天下之憤何臣願陛下可有司之奏法皇天之威與公卿大臣議斬叛弔人之師以快天下人人之憤實天下幸甚微臣無任懇悃嫉惡之至蒙恩顧問竊見陛下患戎之意深矣自貞元以來國家所以甘億兆之費於塞下葢以犬戎有侵軼之患而邊人思守禦之利也然而河湟之地日削田萊之業日空塞下之人日亡戎狄之心日熾若此非他不得備之之術也且臣聞之君之命帥帥之命將將之使卒猶心之使臂臂之使指然後敵可擒而軍可制也今之屯戍者則不然衆其城堡異其師長獲一馬則圖功虜一戎則告捷至於屠縣道掠萬人則曰力弱不足以應敵援寡不足以摧凶苟謹閑繕完不失其守者則朝廷議賞之不給又孰肯摧鋒刃冒殊死而出入於係虜哉此又非他衆分力散而責師之刑無所加也而又加之以為農者不教戰屯聚者不兼農寇至則卒伍被甲而乘城野人空弮以應敵此又耕戰之術不修而屯聚之方太逸也今夫邠岐汧隴之地皆后稷公劉之所理也土宜植物人務稼穡陛下誠能使本道節制廣於荒隙大建屯田塞下諸軍除使令守防之外一切出之於野限人名田復其租入然後因其阡陌制之閭井因其卒伍樹之師長固其塍塹以備不虞犬戎適至則有連阡接畛之兵戎騎纔歸則復耰鋤穫耨之事若此則曩時之聚食者盡歸之於服勤之農矣前此之係虜者盡化為守禦之兵矣三五年間塞下有相因之粟邊人無侵軼之虞陛下又董之以良帥威之以必刑則彼瑣瑣之戎陛下將署其君長征其牛羊奴虜以擒之可也螻蟻以攘之可也又何必詢王恢使蘇武用晁錯訪婁敬而後復河湟稱即叙哉此備戎之大略也方今猶有急於此者臣敢冒昧殊死而言之臣聞善奕棋者將刼其棋必固其羸是以敵可殺而地不危今庸蜀有犬吠之驚南蠻絕貢誠之路陛下又輟邊將以統問罪之師脫或蜂蠆相完尚稽天討兵連不解綿夏涉秋則犬戎乘釁啟心之日也陛下其圖之臣無任懇款憂邊之至臣伏見陛下降明詔修廢學增冑子選司成大哉堯之為君伯夷典禮夔教冑子之深旨也然而事有萬萬急於此者敢冒死而言之臣聞諸賈生曰三代之君仁且久者教之然也誠哉是言且夫周成王人之中才也近管蔡則讒入有周召則義聞豈可謂天聰明哉然而克終於道者得不謂教之然耶始其為太子也未生胎教既生保教太公為之師周公為之傅召公為之保伯禽唐叔與之游禮樂詩書為之習目不得閱淫豔妖誘之色耳不得聞優笑凌亂之聲口不得習操斷擊搏之書居不得近容順陰邪之黨游不得恣追禽逐獸之樂玩不得有遐異僻絕之珍凡此數者非謂備之於前而不為也亦將不得見而為之矣及其長而為君也血氣既定游習既成雖有放心快已之事日陳於前固不能奪巳成之習巳定之心矣則彼忠直道德之言固吾之所習聞也陳之者有以諭焉回佞庸違之說固吾之所積懼也諂之者有以辨焉人之情莫不欲耀其所能而黨其所近苟將得志則必快其所蘊矣物之性亦然是以魚得水而游馬逸駕而走鳥乘風而翔火得薪而熾此皆物之快其所蘊也今夫成王所蘊道德也所近聖賢也是以舉其近則周公左而召公右伯禽魯而太公齊快其蘊則興禮樂而朝諸侯措刑罰而美教化教之至也可不謂信然哉及夫秦則不然滅先王之學曰將以愚天下黜師保之位曰將以明君臣胡亥之生也詩書不得聞聖賢不得近彼趙高者詐宦之戮人也而傅之以殘忍戕賊之術且日恣睢天下以為貴莫見其面以為尊是以天下之人未盡愚而胡亥固巳不能分獸畜矣趙高之威懾天下而胡亥巳自幽於深宮矣彼李斯者秦之寵丞相也因讒寃死無以自明而况於疎遠之臣庶乎若此則秦之亡有以致之也漢高承之以兵革漢文守之以廉謹卒不能蘇復大訓是以景武昭宣天資甚美纔可以免禍亂哀平之間則不能虞篡弒矣然而惠帝廢易之際猶賴羽翼以勝其邪心是後有國之君議教化者莫不以興廉舉孝設學崇儒為意曾不知教化之不行自貴者始畧其貴者教其賤者無乃鄰於倒置乎洎我太宗文皇帝之在藩邸以至於為太子也選知道德者十八人與之游習即位之後雖宴游飲食之間若十八人者實在其中上失無不言下情無不達不四三年而名高盛古豈一日二日而致是乎游習之漸也貞觀巳還師傅之官皆宰相兼領其餘宮僚選亦甚重馬周以位高恨不得為司議郎此其驗也文皇之後漸疎賤之至於母后臨朝剪棄王族當中睿二聖危難之際雖有骨鯁敢言之士既不得在調護保安之職終不能措扶衞之一詞而令匠胡安金藏剖腹以明之豈不大哀哉兵興以來茲弊尤甚師資保傅之官非疾廢眊瞶不任事者為之即休戎罷帥不知書者處之至於友諭贊議之徒疎冗散賤之士甚者搢紳恥之夫以匹夫之愛其子猶求明哲慈惠之師以教之直諒多聞之友以成之豈天下之元子而可以疾廢眊瞶不知書者為之師疎冗散賤不適用者為之友乎此何不及上古之甚也近制宮僚之外徃徃以沉滯僻老之儒充侍直侍讀之選而又疎棄斥遠之越月踰時不得召見彼又安能傅成道德而保養其躬哉臣以為積此弊者豈不以皇天眷佑祚我唐德以舜繼舜以堯繼堯傳陛下十一聖矣莫不生而神明長而仁聖以是為屑屑習儀者故不之省耳臣獨以為於列聖之謀則可也計無窮之業以傳後嗣則不可脫或萬代之後有若周成王之中才者而又生於深宮優笑之間無周召保助之教則將不能知喜怒哀樂之所自矣况稼穡之艱難乎今陛下以上聖之資肇臨海內是天下之人傾耳注目之日也特願陛下思成王訓導之功念文皇游習之漸選重師保慎簡宮寮皆用博厚宏深之儒而又練達機務者為之更進迭見日就月將因令皇太子洎諸王定齒冑講業之儀行嚴師問道之禮至德要道以成之撤膳記過以警之血氣未定則輟禽色之娛以就學聖質既備則資游習之善以宏德此所謂一人元良萬國以貞之化也豈直修廢學選司成而足倫匹其盛哉而又俾則百王莫不幼同師長同術識君道之素定知天倫之自然然後選用賢良樹為藩屏出則有晉鄭魯衞之盛入則有東牟朱虛之強蓋所謂宗子維城犬牙磐石之勢也又豈與夫魏晉以降囚賊其兄弟而自剪其本枝者同年而語乎微臣竊不自揆思為陛下建永永無窮之長算輒敢冒昧殊死而言之臣稹謹奏
