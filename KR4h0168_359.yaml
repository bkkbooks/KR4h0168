front:
  text: 全唐文欽定全唐文卷三百五十九甫字子美襄陽人徙河南鞏縣天寶初應進士不第十三載獻三大禮賦帝奇之使待制集賢院命宰相試文章擢河西尉不拜改右衛率府胄曹參軍祿山陷京師赴河西謁肅宗於彭原郡拜右拾遺上元二年嚴武鎮成都奏為節度參謀檢校尚書工部員外郎永泰二年卒年五十九
  hash: sha256:a28b639d68e380cfa588d2b37e067e647ceff0dd38be80b492c623f655d1588f
  markers:
  - {type: head, offset: 14, content: 杜甫, id: KR4h0168_NFKB_359-h1, level: 1}
body:
  text: 冬十有一月天子既納處士之議承漢繼周革弊用古勒崇揚休明年孟陬將攄大禮以相籍越彞倫而莫儔歷良辰而戒吉分祀事而孔修營室主夫宗廟乘輿備乎冕裘甲子王以昧爽春寒薄而清浮虛閶闔逗蚩尤張猛馬出騰虬捎熒惑墮旄頭風伯扶道雷公挾輈通天台之雙闕警溟漲之十洲浩劫礧砢萬山颼飀欻臻於長樂之舍嵬入乎崑崙之邱太乙奉引庖犧左右堯步舜趨禹馳湯驟鬱閟宮之嵂崒坼元氣以經構斷紫雲而竦牆撫流沙而承霤紛隳珠而陷碧霩波錦而浪繡森青冥而欲雨赩光炯而初晝於是翠蕤俄的藻藉舒就祝融擲火以焚香溪女捧盤而盥潄㣥有司之望幸辨名物之難究瓊漿自間於粢盛羽客先來於介胄爍聖主之儲祉敬雲孫而及此詔軒轅使合符敕王喬以視履積昭感於嗣續匪正辭於祝史若肸蠁之有憑肅風飇而乍起揚流蘇於浮柱金英霏而披靡擬雜佩於曾巔芝蓋欹以颯纚中漎漎以回復外蕭蕭而未已上穆然注道為身覺天傾耳陳僭號於五代復戰國於千祀曰嗚呼昔蒼生廠田坴孟德之禍為仲達所愚鑿齒其俗窫窳其孤赤烏高飛不肯止其屋黃龍哮吼不肯負其圖伊神器臬兀而小人詬喻歷紀大破瘡痍未蘇尚攫拏於吳蜀又顛躓於羯胡縱㣥雄之發憤誰一統於亨衢在拓跋與宇文豈風塵之不殊比聰廆及堅特渾貔豹而齊驅愁陰鬼嘯落日梟呼各擁兵甲俱稱國都且耕且戰何有何無惟纍聖之徽典恭淑慎以允緝茲火土之相生非符讖之備及煬帝終暴叔寶初襲編尚新義旗爰入既清國難方覩家給竊以為數子自誣敢正乎五行攸執而觀者潛晤或喜至於泣矧鱗介以之鳴簴昆蚑以之振蟄感而遂通罔不具集仡神光而谷甘閜羅詭異以戢孴地軸傾而融曳洞宮儼以嶷岌九天之雲下垂四海之水皆立鳳鳥威遲而不去鯨魚屈矯以相吸掃太始之含靈卷殊形而可挹則有虹霓為鉤帶者入自於東揭莽蒼履崆洞素髮漠漠至精濃濃條弛張於巨細覬披寫於心胸蓋修竿無隙而仄席以容裂手中之黑簿睨堂下之金鐘得非擬斯人於壽域明返朴於元蹤忽翳日而翻萬象却浮雲而留六龍咸讋跖而壯茲應終蒼黃而昧所從上猶色若不足處之彌恭天師張道陵等洎左元君者前千二百官吏謁而進曰今王巨唐帝之苗裔坤之紀綱土配君服宮尊臣商起數得統特立中央且大樂在懸黃鐘冠八音之首太昊斯啓青陸獻千春之祥曠哉勤力耳目宜乎大帶斧裳故風后孔甲充其佐山稽岐伯翼其傍至於易制取法足以朝登五帝夕宿三皇信周武之多幸存漢祖之自強且近朝之濫吹仍改卜乎祠堂初降素車終勤恤其後有客白馬固漂淪不忘伊庶人得議實邦家之光臣道陵等試本之於青探之於縹囊列聖有差夫子聞斯於老氏好問自久宰我同科於季康敢撥亂返正乃此其所長萬神開八駿回旗掩月車奮雷騫七曜燭九垓能事㯋脫清光大來或曰今太平之人莫不優遊以自得況是蹴魏踏晉批周抉隋之後與夫更始者哉初高祖太宗之櫛風沐雨勞身焦思用黃鉞白旗者五年而天下始一歷三朝而戮力今庶績之大備上方采厖俗之謠稽正統之類蓋王者盛事臣聞之於里曰昔武德已前黔黎蕭條無復生意遭鯨鯢之蕩汩荒歲月而沸渭衮服紛紛朝廷多閏者仍亘乎晉魏臣竊以自赤精之衰歇曠千載而無真人及黃圖之經綸息五行而歸厚地則知至數不可以久缺凡材不可以長寄故高下相形而尊卑各異惟神斷繫之於是本先帝取之以義壬辰既格於道祖乘輿即以是日致齋於九室所以昭達孝之誠所以明繼天之質具禮有素六官咸秩大輅每出或黎元不知豐年則多而筐筥甚實既而太尉參乘司僕扈蹕望重闉以肅恭順法駕之徐疾公卿淳古士卒精一黕宗廟之愈深抵職司之所密宿翠華於外戶曙黃屋於通術氣淒淒於前旒光靡靡於嘉栗階有賓阼帳有甲乙升降之際見玉柱生芝擊拊之初覺鈞天合律筍簴仡以碣磍干戚宛而婆娑鞉鼓塤篪為之主鐘磬竽瑟以之和雲門咸池取之至空桑孤竹貴之多八音修通既比乎旭日升而氛埃滅萬舞陵亂又似乎春風壯而江海波鳥不敢飛而元甲山孝嵺以嶽峙象不敢去而鳴佩剡爚以星羅已而上乾豆以登歌美休成之既饗璧玉儲精以稠謺門闌洞豁而森爽黑帝歸寒而激昂蒼靈戒曉而來往熙事莽而充塞㣥心麌以振蕩桐花未吐孫枝之鸞鳳相鮮雲氣何多官井之蛟龍亂上若夫生宏佐命之道死配貴神之列則殷劉房魏之勳是可以中摩伊呂上冠夔卨代天之工為人之傑丹青滿地松竹高節自唐興以來若此時哲皆朝有數四名垂卓絶向不遇撥亂反正之主君臣父子之別奕葉文武之雄注意生靈之切雖前輩之溫良寬大豪俊果決曾何以措其筋力與韜鈐載其刀筆與喉舌使祭則與食則血若斯之盛而已爾乃直于主索于祊警幽全之物散純道之精蓋我后常用惟時克貞膋以蕭合酌以茅明嘏以慈告祝以孝成故天意張皇不敢殄其瑞神姦妥帖不敢祕其精而撫絶軌享鴻名者矣于以奏永安于以奏王夏福穰穰于絳闕芳霏霏于玉斚沛枯骨而破聾盲施夭胎而逮魚衆寡園陵動色躍在藻之泉魚弓劒皆鳴汗鑄金之風馬霜露堪吸禎祥可把曾宮歔欷陰事儼雅薄清輝于鼎湖之上靜餘響於蒼梧之野上窅然漠漠惕然兢兢紛益所慕若不自勝瞰牙旗而獨立吟翠駮而未乘五老侍祠而精駭千官逖聽而思凝於是二丞相進曰陛下應道而作惟天與能澆訛散淳朴登尚猶日慎業業孝思蒸蒸恐一物之失所懼先王之咎徵如此之勤恤匪懈是百姓何以報夫元首在臣等何以充其股肱且如周宣之教親不暇漢武之淫祀相仍諸侯敢於迫脅方士奮其威稜一則以微言勸內一則以輕舉虛憑又非陛下恢廓緒業其瑣細亦曷足稱丞相退上局天蹐地授綏登車伊鴻洞槍櫐先出為儲胥本枝根株乎萬代睿想經緯乎六虛甲午方有事於采壇紺席宿夫行所如初蓋主上兆於南郊聿懷多福者舊矣今茲練時日就陽位之美又所以厚祖考通神明而已職在宗伯首崇禋祀先是春官條頌祇之書獻祭天之紀令泰龜而不昧俟萬事之將履掌次閲氊邸之則封人考壝宮之旨司門轉致乎牲牢之繫小胥專達乎懸位之使二之日朝廟之禮既畢天子蒼然視於無形淡然若有所聽又齋心於宿設將旰食而匪寧旌門坡陀以前騖彀騎反覆以相經頓曾城之軋軋軼萬戶之熒熒馳道端而如砥浴日上而如萍掣翠旄於華蓋之角彗黃屋於鉤陳之星神仙戌削以落羽魍魎幽憂以固扃戰岐栗華擺渭掉涇地回回而風淅淅天泱泱而氣青青甲胄乘陵轉迅雷於荊門巫峽玉帛清迥霽夕雨於瀟湘洞庭於是乘輿霈然乃作翳夫鸞鳳將至以沖融寥廓不可乎彌度聲明通乎純粹溟涬為之垠堮駟蒼螭而蜿蜒若無骨以柔順奔烏攫而黝蟉徒有勢於殺縛朱輪竟野而杳冥金鋄成陰以結絡吹堪輿以軒輊槍寒暑以前却中營密擁乎太陽宸眷眇臨乎長薄熊羆弭耳以相舐虎豹高跳以虛攫上方將降帷宮之綝縭屏玉軑以蠖略人門行馬以拱乎合沓之場皮辨大裘始進於穹崇之幕衝牙鏗鏘以將集周衛轇轕而咸若月窟黑而扶桑寒田燭稠而曉星落肅定位以告潔藹嚴上而清超雲菡萏以張蓋春葳蕤以建杓簪裾斐斐樽俎蕭蕭方回曲折周旋寂寥必本於天王宮與夜明相射動而之地山林與川谷俱標於是乎官有御事有職所以敬鬼神所以勤稼穡所以報本反始所以度長立極元酒明水之上越席疏布之側必取先於稻秫麴糱之勤必取著於紛純文繡之飾雖三牲八簋豐備以相沿而蒼璧黃琮實歸乎正色先王之丕業繼起信可以永其昭配㣥望之遍祭在斯示有以明其翼戴由是播其聲音以陳列從乎節奏以進退韶夏濩武采之於訓謨鍾石陶匏具之於梗槩變方形於動植聽宮徵於砰礚英華發外非因乎筍簴之高和順積中不在乎雷鼓之大既而膟膋挂罒某月柴燎窟塊騞砉擘赫葩斜晦潰電廠田坴風升雪颯星碎拂勿侹濙眇溟蓯萃聖慮岑寂元黃增霈蒼生禺卬毛髮清籟雷公河伯咸馬否騃以修聳霜女江妃乍紛綸而暗曖執紱秉翟朱干玉戚鼓瑟吹笙金支翠旌神光倏斂祀事虛明於是涾陀乎渙汙紆餘乎經營浸朱崖而灑朔漠洶暘谷而濡若英耆艾涕而童子儛叢棘坼而狴牢傾是率土之濱覃酺醵以涵泳非奉郊之縣獨宴慰以縱橫元澤淡濘乎無極殷薦綢繆乎至精稽古之時屢應符而合契聖人有作不逆寡而雄成爾乃孤卿侯伯㣥儒三老儼而絶皮軒趨帳殿稽首曰臣聞燧人氏已往法度難知文質未變太昊氏繼天而王根啓閉於厥初以木傳子攄終始而可見洎虞夏殷周茲煥炳而蔥蒨秦失之於狼貪蠶食漢綴之以蛇斷龍戰中莽茫茫夫何以從聖蓄縮曾不下眷伏惟道祖視生靈之磔裂醜害馬之蹄齧呵五精之息肩考正氣之無轍協夫貽孫以降使之造命更挈纍聖昭洗中祚觸蹶氣慘黷乎脂夜之妖勢回薄乎龍蛇之孽伏惟陛下勃然憤激之際天闕不敢旅拒鬼神為之嗚咽高衢騰塵長劍吼血尊卑配宇縣刷插紫極之將頽拾清芬於已缺爐之以仁義鍛之以賢哲聯祖宗之耿光卷夷狄之彯撇蓋九五之後人人自以遭唐虞四十年來家家自以為稷卨王綱近古而不軌天聽貞觀以高揭蠢爾差僭粲然優劣宜其課密於空積忽微刊定於興廢繼絶而後覩數統從首八音六律而惟新日起算外一字千金而不滅上曰吁昊天有成命惟五聖以受我其夙夜匪遑宴用素朴以守吁嗟乎麟鳳胡為乎郊藪豈上帝之降鑒及茲元元之垂裕於後夫聖以百年為鶉鷇道以萬物為芻狗今何以茫茫臨乎八極眇眇託乎㣥后端策拂龜於周漢之餘緩視濶步於魏晉之首斯上古成法蓋其人已朽不足道也於是天子默然而徐思終將固之又固之意不在抑殊方之貢亦不必廣無用之祠金馬碧雞非理人之術珊瑚翡翠此一物何疑奉郊廟以為寶增怵惕以孜孜況大庭氏之時六龍飛御之歸上既封泰山之後三十年間車轍馬迹至於太原還於長安時或謁太廟祭南郊每歲孟冬巡幸溫泉而已聖主以為王者之禮告厥成功止於岱宗可矣故不肯到崆洞訪具茨驅八駿於崑崙親射蛟於江水始為天子之能事壯觀焉爾況行在供給蕭然煩費或至作歌有慙於從官誅求坐殺於長吏甚非主上執元祖醇醲之道端拱御蒼生之意大哉聖哲垂萬代則蓋上古之君皆用此也然臣甫愚竊以古者疆場有常處贊見有常儀則備乎玉帛而財不匱乏矣動乎車輿而人不愁痛矣雖東岱五嶽之長足以勒崇垂鴻與山石無極伊太華最為難上至於封禪之事獨軒轅氏得之夫七十二君罕能兼之矣其餘或蹶踣風雨碑版祠廟終么麼不足追數今聖主功格軒轅氏業纂七十君風雨所及日月所照莫不砥礪華近甸也其可恧乎比歲鴻生巨儒之徒誦古史引時義云國家土德與黃帝合主上本命與金天合而守闕者亦百數天子寢不報蓋謙如也頃或詔厥郡國掃除曾顛雖翠蓋可薄乎蒼穹而銀字未藏於金氣臣甫誠薄劣不勝區區吟咏之極故作封西嶽賦以勸賦之義豫述上將展禮焚柴者實覬聖意因有感焉為其詞曰維時孟冬百工乃休上將陟西嶽覽八荒御白帝之都見金天之王既刊石乎岱宗又合符乎軒皇茲事體大越不可載已先是禮官草具其儀各有典司俯叶吉日欽若神祇而千乘萬騎已蠖略佁擬屈矯陸離唯君所之然後拭翠鳳之駕開日月之旗撞鴻鐘發雷輜辨格澤之修竿決河漢之淋漓彍天狼之威弧墜魍魎之霏霏赤松前驅彭祖後馳方明夾轂昌宇侍衣山靈秉鉞而踉蹡海若護蹕而參差風馭冉以縱山雙雲螭縒而遲蚭地軸軋軋殷以下折原隰草木儼而東飛岐梁閃倏涇渭反覆而天府載萬侯之玉尚方具左纛黃屋已焜煌於山足矣乘輿尚鳴鑾和儲精淡慮華蓋之大角低回北斗之七星皆去屆蒼山而信宿屯絶壁之清曙既臻夫陰宮犀象硉兀戈鋋窸窣飄飄蕭蕭洶洶如也於是太一抱式元冥司直天子乃宿袚齋就登陟駢素虬超崱屴天語祕而不可知代欲聞而不可得柴燎上達神光充塞泥金乎菡萏之南刻石乎青冥之北上意由是茫然延降天老與之相識問太微之所居稽上帝之遺則颯弭節以徘徊撫八紘而黑咸黑忽風翻而景倒淡殊狀而異色冏若褰袪開帷下辨宸極者久之雲氣蓊以回復山呼嶪而未息祀事孔明有嚴有翼神保是格時萬時億爾乃駐飛龍之秋秋詔王屬以中休覲㣥后於高掌之下張大樂於洪河之洲芬樹羽林莽不可收千人舞萬人謳麒麟踆踆而在郊鳳凰蔚跋而來遊雷公伐鼓而揮汗地祇被震而悲愁樂師拊石而具發激越乎遐陬㣥山為之相峽萬穴為之倒流又不可得載已久而景移樂闋上悠然垂思曰嗟乎余昔歲封泰山禪梁父以為王者成功己纂終古嘗覽前史至於周穆漢武豫遊寥濶亦所不取惟此西嶽作鎮三輔非無意乎頃者猶恐百姓不足人所疾苦未暇瘞斯玉帛考乃鐘鼓是以視嶽於諸侯錫神以茅土豈惟壯設險於甸服報西成之農扈亦所以感一念之精靈答應時之風雨者矣今茲冢宰庶尹醇儒碩生僉曰黃帝顓頊乘龍遊乎四海發軔匝乎六合竹帛有云得非古之聖君而泰華最為難上故封禪之事鬱沒罕聞以余在位發祥隤祉者焉可勝紀而不得已遂建翠華之旗用塞雲臺之議矧乎殊方奔走萬國皆至元元從助清廟歔欷也臣甫舞手蹈足曰大哉爍乎真天子之表奉天為子者已不然何數千萬載獨繼軒轅氏之美彼七十二君又疇能臻此蓋知明主聖罔不克正功罔不克成放百靈歸華清倬彼馴象毛㣥所推特稟靈於荒徼思入貢於昌期豈不以獻我令辰自林邑而來者稽之舊史在成康而紀之一則識王者之無外一則見遐方之不遺苟形王褱之足偉孰路遠之云辭於是出豐草去長林殊狒狒之被格異猩猩之就擒厲其容也故獸伏我力和其性也故人知我心作蠻方之貢為上國之琛萬國標奇名已馳於魏闕千年表慶價實越於南金況乘之便習或訛或立動高足以巍峩引修鼻而噓吸塵隨蹤而忽起水將飲而回入牙櫛比而槮槮眼星翻而熠熠中黃雖勇力不能加蒼舒信奇知之莫及服我后之皂棧光有唐之域邑驅之則百獸風馳玩之則萬夫雲集故其威容足尚筋力殊壯輪囷而重若旄邱贔屭而高如巨防執燧奔戰牽鉤委貺遇之者或驚駭而反行覘之者或披靡而遙望何斯象之剛克兼美義之不忒懼有齒而焚軀故全身而利國縱使牛能任重馬有報德徒久困於輪轅又每傷於銜勒豈如我邈自遠藩來朝至尊辭桂林之小郡入閶闔之通門負名聞之藉藉守馴擾以存誠幸投之於芻藳豈敢昧於君恩當九秋之淒清見一鶚之直上以雄才為已任橫殺氣而獨往梢梢徑翮肅肅逸響杳不可追俊無留賞彼何鄉之性命碎今日之指掌伊鷙鳥之纍百敢同年而爭長此雕之大略也若乃虞人之所得也必以氣稟元冥陰乘甲子河海蕩潏風雲亂起雪沍山陰冰廠田坴樹死迷向背於八極絶飛走於萬里朝無所充腸夕違其所止頗愁呼而蹭蹬信求食而依倚用此時而椓杙待弋者而綱紀表狎羽而潛窺順雄姿之所擬欻捷來於森木固先繫於利觜解騰攫而竦神開網羅而有喜獻禽之課數備而已及乎閩隸受之也則擇其清質列在周垣揮拘攣之掣曳挫豪梗之飛翻識畋遊之所使登馬上而孤騫然後綴以珠飾呈於至尊摶風槍櫐用壯旌門乘輿或幸別館獵平原寒蕪空濶霜仗喧繁觀其夾翠華而上下卷毛血之崩奔隨意氣而電落引塵沙而晝昏豁堵牆之榮觀棄功效而不論斯亦足重也至如千年孽狐三窟狡兔恃古冢之荊棘飽荒城之霜露回惑我往來趦趄我場圃雖有青骹載角白鼻如瓠蹙奔蹄而俯臨飛迅翼而遐寓而料全於果見迫寧遽屢攬之而㯋脫便有若於神助是以嘵哮其音颯爽其慮續下鞲而繚繞尚投迹而容與奮威逐北施巧無據方蹉而就擒亦造次而難去一奇卒獲百勝昭著夙昔多端蕭條何處斯又足稱也爾其鶬鵠鳥鶂之倫莫益於物空生此身聯拳拾穗長大如人肉多奚有味乃不珍輕鷹隼而自若託鴻鵠而為鄰彼壯夫之慷慨假強敵而逡巡拉先鳴之異者及將起而遄臻忽隔天路終辭水濱寧掩㣥而盡取且快意而驚新此又一時之俊也夫其降精於金立骨如鐵目通於腦筋入於節架軒楹之上純漆光芒掣梁棟之間寒風凜冽雖趾蹻千變林嶺萬穴擊叢薄之不開突杈丫而皆折此又有觸邪之義也久而服勤是可呀畏必使烏攫之黨罷鈔盜而潛飛梟怪之㣥想英靈而遽墜豈比乎虛陳其力叨竊其位等摩天而自安與搶榆而無事者矣故不見其用也則晨飛絶壑暮起長汀來雖自負去若無形置巢嶻嵲養子青冥倏爾年歲茫然闕庭莫試鉤爪空回斗星衆雛儻割鮮於金殿此鳥已將老於巖扃天寶中上冬幸華清宮甫因至獸坊怪天狗院列在諸獸院之上胡人云此其獸猛捷無與比者甫壯而賦之尚恨其與凡獸相近其詞曰瞻華清之莘萃漠漠而山殿戌削縹焉天風崛乎回薄上揚雲旓兮下列猛獸夫何天狗嶙峋兮氣獨神秀色似狻猊小如猿狖忽不樂雖萬夫不敢前兮非胡人焉能知其去就向若鐵柱欹而金鎖斷兮事未可救瞥流沙而歸月窟兮斯豈踰晝日食君之鮮肥兮性剛而清瘦敏於一擲威解兩鬬終無自私必不虛透常觀乎副君暇豫奉命於畋則蚩尤之倫已腳渭戟涇提挈邱陵與南山周旋而慢圍者戮實禽有所穿伊鷹隼之不制兮呵犬豹以相廠田坴蹙乾坤之翕習兮望麋鹿而飄然由是天狗捷來發自於左頓六軍之蒼黃兮劈萬馬以超過材官未及唱野虞未及和冏骨孝矢與流星兮圍要害而俱破洎千蹄之並集兮始拗怒以相賀真雄姿之自異兮已歷塊而高臥不愛力以許人兮能絶等以為大既而㣥有噉咋勢爭割據垂小亡而大傷兮翻投迹以來預劃雷殷而有聲兮紛膽破而何遽似爪牙之便禿兮無魂魄以自助各弭耳低徊閉目而去每歲天子騎白日御東山百獸踿蹌以皆從兮四猛仡銛鋭乎其間夫靈物固不合多兮胡役役隨此輩而往還惟昔西域之遠致兮聖人為之豁迎風虛露寒體蒼螭軋金盤初一顧而雄材稱是兮召㣥公與之俱觀宜其立閶闔而吼紫微兮却妖孽而不得上干時駐君之玉輦兮近奉君之渥歡使奧處而誰何兮備周垣而辛酸彼用事之意然兮匪至尊之賞闌仰千門之崚嶒兮覺行路之艱難懼精爽之衰落兮驚歲月之忽殫顧同儕之甚少兮混非類以摧殘偶快意於校獵兮尤見疑於蹻捷此乃獨步受之於天兮孰知㣥材之所不接且置身之暴露兮遭縱觀之稠謺俗眼空多生涯未愜吾君倘憶耳尖之有長毛兮寧久被斯人終日馴狎已問古之山林藪澤之地各以肥磽多少為差故供甲兵士徒之役府庫賜與之用給郊廟宗社之祀奉養祿食之出辨乎名物存乎有司是謂公賦知歸地著不撓者已今聖朝紹宣王中興之洪業於上庶尹備山甫補衮之能事於下而東寇猶小梗率土未甚闢總彼賦稅之獲盡贍軍旅之用是官御之舊典闕矣人神之攸序乖矣欲使軍旅足食則賦稅未能充備矣欲將誅求不時則黎元轉罹於疾苦矣子等以待問之實知新之明觀志氣之所存於應對乎何有佇渴救敝之通術願聞強學之所措意蓋在此矣得遊説乎問國有軺車廬有飲食古之按風俗遣使臣在王官之一守得馳傳而分命蓋地有要害郊有遠近供給之比省費相懸今茲華惟襟帶關逼輦轂行人受辭於朝夕使者相望於道路屬年歲無蓄積之虞職司有愁痛之歎況軍書未絶王命急宣插羽先翥於騰鷹敝帷不供於埋馬豈芻粟之勤獨爾實驂騑之價闕如人主之軫念屢及於茲邦伯之分憂何嘗敢怠乞恩難再近日已降水衡之錢積骨頗多無暇更入燕王之市欲使輶軒有喜主客合宜閭閻罷杼軸之嗟官吏得從容之計側佇嘉論當聞濟時問通道陂澤隨山濬川經啓之理疏奠之術抑有可觀其來尚矣初聖人盡力溝洫有國作為隄防洎後代控引淮海漕通涇渭因舟楫之利達倉庾之儲又賴此而殷亦行之自久近者有司相土決彼支渠既潰渭而亂河竟功多而事寢人實勞止岸乃善崩遂使委輸之勤中道而棄今軍用蓋寡國儲未贍雖遠方之粟大來而助挽之車不給是以國朝仗彼天使徵茲水工議下淇園之竹更鑿商顏之井又恐煩費居多績用莫立空荷成雲之鍤復擁填淤之泥若然則舟車之用大小相妨矣軍國之食轉致或闕矣矧夫人煙尚稀牛力不足者已子等飽隨時之要挺賓王之資副乎求賢敷厥讜議問足食足兵先哲雅誥蓋有兵無食是謂棄之致能掉鞅靡旌斯可用矣況寇猶作梗兵不可去日聞將軍之令親覩司馬之法闕中之卒未息灞上之營何遠近者鄭南訓練城下屯集瞻彼三千之徒有異什一而稅竊見明發教以戰鬬亭午放其庸保課乃菽麥以為尋常夫悅以使人是能用古伊歲則云暮實慮休止未卜及瓜之還交比翳桑之餓㣥有司自救不暇二三子謂之何哉問昔唐堯之為君也則天之大敬授人時十六升自唐侯者已昔帝舜之為臣也舉禹之功克平水土三十登為天子者已本之以文思聰明加之以勞身焦思既睦九族協和萬邦黜去四凶舉十六相故五帝之後傳載唐虞之美無德而稱焉易曰君子終日乾乾詩曰文王小心翼翼竊觀古人之聖哲未有不以君唱於上臣和於下致乎人和年豐成乎無為而理者也主上躬純孝之聖樹非常之功內則拳拳然事親如有闕外則悸悸然求賢如不及伊百姓不知帝力庶官但恭已而已寇孽未平咎徵之至數也倉廩未實物理之固然也今大軍虎步列國鶴立山東之諸將雲合淇上之捷書日至二三子議論宏正詞氣高雅則遺祲蕩滌之後聖朝砥礪之辰雖遭明主必致之於堯舜降及元輔必要之於稷卨驅蒼生於仁壽之域反淳朴於羲皇之上自古哲王立極大臣為體眇然坦途利往何順子有説否庶復見子之志豈徒瑣瑣射策趨競一第哉頃之問孝秀取備尋常之對多忽經濟之體考諸詞學自有文章在策以徵事曷成凡例焉今愚之粗徵貴切時務而已夫時患錢輕以至於量資幣權子母代復改鑄或行乎前榆莢後契刀當此之際百姓蒙利厚薄何人所制輕重又穀者所以阜俗康時聚人守位者也下至十室之邑必有千鍾之藏苟凶穰以之貴賤失度雖封丞相而猶困侯大農而謂何是以繼絶表微無或區分踰越蒙實不敏仁遠何哉臣甫言臣生長陛下淳朴之俗行四十載矣與麋鹿同㣥而處浪迹於陛下豐草長林實自弱冠之年矣豈九州牧伯不歲貢豪俊於外豈陛下明詔不仄席思賢於中哉臣之愚頑靜無所取以此知分沈埋盛時不敢依違不敢激訏默以漁樵之樂自遣而已頃者賣藥都市寄食朋友竊慕堯翁擊壤之謳適遇國家郊廟之禮不覺手足蹈舞形於篇章潄吮甘液遊泳和氣聲韻寖廣卷軸斯存抑亦古詩之流希乎述者之意然詞理野質終不足以拂天聽之崇高配史籍以永久恐倏先狗馬遺恨九原謹稽首投延恩匭獻納上表進明主朝獻太清宮朝享太廟有事於南郊等三賦以聞臣甫誠惶誠恐頓首頓首謹言臣甫言臣本杜陵諸生年過四十經術淺陋進無補於明時退常困於衣食蓋長安一匹夫耳頃歲國家有事於郊廟幸得奏賦待制於集賢委學官試文章再降恩澤仍猥以臣名實相副送隸有司參列選序然臣之本分甘棄置永休望不及此豈意頭白之後竟以短篇隻字遂曾聞徹宸極一動人主是臣無負於少小多病貧窮好學者已在臣光榮雖死萬足至於仕進非敢望也日夜憂迫復未知何以上答聖慈明臣子之效況臣常有肺氣之疾恐忽復先草露塗糞土而所懷冥寞孤負皇恩敢攄竭憤悶領略丕則作封西嶽賦一首以勸所覬明主覽而留意焉先是御製西嶽碑文之卒章曰待余安人治國然後徐思其事此蓋陛下之至謙也今茲人安是已今茲國富是已況符瑞翕集福應交至何翠華之脈脈乎維嶽固陛下本命以永嗣業維嶽授陛下元弻克生司空斯又不可以寢已伏惟天子霈然留意焉春將披圖視典冬乃展采錯事日尚浩濶人匪勞止庶可試哉微臣不任區區懇到之極謹詣延恩匭獻納奉表進賦以聞臣甫誠惶誠恐頓首頓首謹言臣甫言臣之近代陵夷公侯之貴磨滅鼎銘之勳不復照耀於明時自先君恕預以降奉儒守官未墜素業矣亡祖故尚書膳部員外郎先臣審言修文於中宗之朝高視於藏書之府故天下學士到於今而師之臣幸賴先臣緒業自七歲所綴詩筆向四十載矣約千有餘篇今賈馬之徒得排金門上玉堂者甚衆矣惟臣衣不蓋體常寄食於人奔走不暇只恐轉死溝壑安敢望仕進乎伏惟明主哀憐之倘使執先祖之故事拔泥塗之久辱則臣之述作雖不足以鼓吹六經先鳴數子至於沈鬱頓挫隨時敏捷而揚雄枚皋之流庶可跂及也有臣如此陛下其舍諸伏惟明主哀憐之無令役役便至於衰老也臣甫誠惶誠恐頓首頓首死罪死罪臣以為雕者鷙鳥之殊特搏擊而不可當豈但壯觀於旌門發狂於原隰引以為類是大臣正色立朝之義也臣竊重其有英雄之姿故作此賦實望以此達於聖聰耳不揆蕪淺謹投延恩匭進表獻賦以聞謹言臣某言伏奉今月某日制授臣某官臣某祗拜休命內顧殞越策駑馬之力冒纍踐之寵自數勳力萬無一稱再三怵惕流汗至踵謹以某月日到任上訖臣某誠戰誠懼頓首頓首死罪死罪伏惟陛下以君父任使之久掩臣子不逮之過就其小效復分深憂察臣劒南區區恐失臣節如彼加臣頻煩階級鎮守要衝如此勉勵疲鈍伏揚陛下之聖德愛惜陛下之百姓先之以易間之以樂業均之以賦斂終之以敦勸然後畢禁將士之暴宏洽主客之宜示以刑典難犯之科寬以困窮計無所出哀今之人庶古之道內救惸獨外攘師寇上報君父曲盡庸拙之分下循臣子勤補失墜之目灰粉骸骨以備守官伏惟恩慈胡忍容易愚臣之願也明主之望也限以所領未遑謁對無任兢灼之極謹遣某官奉表馳謝以聞臣誠喜誠懼死罪死罪臣某言伏自陛下平山東收燕薊洎海隅萬里百姓感動喜王業再康瘡痏蘇息陛下明聖社稷之靈以至於此然河南河北貢賦未入江淮轉輸異於曩時惟獨劒南自用兵以來稅斂則殷部領不絶瓊林諸庫仰給最多是蜀之土地膏腴物産繁富足以供王命也近者賊臣惡子頻有亂常巴蜀之人橫被煩費猶相勸勉充備百役不敢怨嗟吐蕃今下松維等州成都已不安矣楊琳師再脅普合禺禺兩川不得相救百姓騷動未知所裁況臣本州山南所管初置節度庶事草創豈暇力及東西兩川矣伏願陛下聽政之餘料巴蜀之理亂審救援之得失定兩川之異同問分管之可否度長計大速以親賢出鎮哀罷人以安反仄犬戎侵軼㣥盜窺伺庶可遏矣而三蜀天府也徵取萬計陛下忍坐見其狼狽哉不即為之臣竊恐蠻夷得恣屠割耳實為陛下有所痛惜必以親王委之節鉞此古之維城磐石之計明矣陛下何疑哉在近擇親賢加以醇厚明哲之老為之師傅則萬無覆敗之迹又何疑焉其次付重臣舊德智略經久舉事允愜不隕穫於蒼黃之際臨危制變之明者觀其樹勳庸於當時扶泥塗於已墜整頓理體竭露臣節必見方面小康也今梁州既置節度與成都足以久遠相應矣東川更分管數州於內幕府取給破敝滋甚若兵馬悉付西川梁州益坦為聲援是重斂之下免至多門西南之人有活望矣必以戰伐未息勢資多軍應須遣朝廷任使舊人授之使節留後之寄綿歷歲時非所以塞衆望也臣於所守封界連接梓州正可為成都東鄙其中別作法度亦不足成要害哉徒擾人矣伏惟明主裁之又天下徵收赦文減省軍用外諸色雜賦名目伏願損之又損之劒南諸州亦困而復振矣將相之任內外交遷西川分壼以仗賢俊愚臣特望以親王總戎者意在根固流長國家萬代之利也敢輕易而言次請慎擇重臣亦願任使舊人鎮撫不缺借如犬戎俶擾臣素知之臣之兄承訓自沒蕃以來長望生還偽親信於贊普探其深意意者報復摩彌青海之役決矣同謀誓衆於前後沒落之徒曲成翻動陰合應接積有歲時每漢使回蕃使至帛書隱語纍嘗懇論臣皆進封上聞屢達臣兄承訓憂國家緣邊之急願亦勤矣況臣本隨兄在蜀向二十年兄既辱身蠻夷相見無日臣比未忍離蜀者望兄消息時通所以戮力邊隅纍踐班秩補拙之分淺待罪之日深蜀之安危敢竭聞見臣子之義貴有所盡於君親愚臣迂濶之説萬一少裨聖慮遠人之福也愚臣之幸也昨竊聞諸道路云吐蕃已來草竊岐隴逼近咸陽似是之間憂憤隕迫益增尸祿寄重之懼寤寐報效之懇謹冒死具巴蜀成敗形勢奉表以聞
