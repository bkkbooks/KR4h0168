front:
  text: 全唐文欽定全唐文卷四百二十常袞十一
  hash: sha256:5ffbe7e94716561336956944c1b0e11637064243f597f5271cf8d3ac67d5818d
body:
  text: 公諱某字某昔蔡雍敘有道之碑已詳姓氏司徒以廉直稱太守以仁明著祭酒之籌畫黃門之才理克祚於曾祖驃騎將軍光祿卿仁最祖汝州司馬茂禕父濟州刺史崇禮咸以文武孝謹傳於子孫公即濟州府君之長子也高朗有識奉親孝事上敬睦於兄弟信於朋友好言王霸大略經術大義而無傲剛近於仁而能端本靜末仗雅居正年十二有老成之量季父崇默不以常兒見遇謂必大吾門伏波之言不敢失墜仲容之器居然宏達尋以明經擢第歷洺州平恩縣尉左金吾衛兵曹參軍明恕貞恪清廉仁愛克施於政政有經矣故幕府三辟時稱得俊御史中丞李處古侍御史崔希逸節度使張嵩爰以將命之務咨焉公之佐廉問也旌別淑慝樹立風聲進厥賢良不仁者遠率由易希下按章從容以和大變其俗公之護戎事也善用文韜制其邊患本詩書之義府資德刑之戰器軍吏緩帶兵車稅鞅談笑樽俎疆陲晏然凡所介二皆有卓絶之稱每歸功於上豈代帥受名而士君子多所推重方將萬里橫海一飛青雲三十有六年至於夭命開元十八年四月十八日寢疾終於長安里第理命薄葬布車一乘而已不忘平生之儉以示後昆之訓惟公博識強辨尤好理論至於搢紳風教得失之間處正其義不以錙毫假物善與人交不改柯葉一時之俊千里應言分宅字孤謂之已任而特相友善者時則有若呂向梁涉厙狄履溫終以偉才良器綢繆省闥每一拜命未嘗不相謂曰使君不歿吾輩豈先處顯地其精鑒雅望有如此者夫人安定梁氏執禮之坊有儀可則哀敬以事宗廟謙柔以和娣姒柏舟之誓年在幼沖諸姑始孩一生所寄送往過禮撫存以慈魚菽之祭以彰勤儉俎豆之訓不墜文儒時人謂之大家國史編於列女徽音淑行雅有餘芳開元十九年十二月二十四日終於雒陽私第元寢異室三紀於茲壬寅歲詔贈府君大理丞追封夫人安定郡太君德盛流光禮徽優典永泰二年十一月日合祔於金城縣太平原禮也嗣子大理丞縱侍御史絳夙遭閔凶不及詩禮之誨尚賴慈獎幼彰令聞白持憲丹筆詳刑忠信孝友合於純性悲夫欲養而親不逮再仕而心不喜春秋窀穸痛結寒泉月日有時禮尊同穴蒸蒸之慕有感人倫以袞夙有通家之好俾敘先君之德銘曰世載忠厚有倬其道尊顯府君光昭祖考達識宏量汪汪浩浩五經紛綸精義入神勞我州縣汨我風塵不屑其志與時屈伸乃佐軍政戎荒底定乃登輶軒郡邑從令交則不黷久而益敬有才無年零落重泉遺孤改隧合祔終焉太上立德我咎繇謀之太極至道我老氏明之施於子孫令聞長世盛衣冠於鄉族傳帶礪於侯社西涼有武昭之諡後魏有姑臧之封祚於我唐親則同姓門閥清顯冠於人倫婚姻所仰齊其大也朝會所推滕其長也君諱某字某其先隴西成紀人也曾祖元道皇朝秦王府十八學士給事中銀青光祿大夫常州刺史祖正基皇太子舍人父犯肅宗廟諱皇膳部郎中淄州刺史文章侍從給事黃門官品第三使符至五軍坊司其啓奏殿柱題其名氏並以博學偉才歷位中外藹然聲問揚於家邦公體元精之和得大雅之正入出孝弟而蒸蒸如也恭儉寡過學如不及起詩書之廢疾通古今之訓注以五經高第冠名太學而四方諸儒多所質疑是時也元宗在上天下大同分王宗枝以崇藩屏高選僚友必極時俊非阮渾純粹鄭袤鑒識徐幹之恬淡寡欲匡衡之射策甲科則何以處畏慎之地當敬愛之禮故命公參陝王忠王義王棣王四府藩佐雖天人帝子不出於清禁而井賦田租必總於朱邸公守以廉介謹均節用用或有差終不奉教春秋匪懈夙夜在公行之維艱不易其操何止攀小山之桂虛望神仙對西園之月空疲宴賞而已開元中御史大夫李商隱按察東都大明黜陟表公清白尤異特拜朝散大夫尋除右衛率府左郎將遷太子右贊善贊三善之德周禮其難將四率之府晉朝所重風流名士文武兼才輝映崇賢肅清屯騎素懷止足亟請歸間至於暮年終不得謝嗚呼道不可屈身屈何傷以天寶十四載正月十七日終於東京崇政里之私第享年若干永泰元年二月皇帝以肅宗藩僚清節明著家丞秋實在先志而不忘中尉夜拜歎流年之已逝又以子列憲臣光我多士詔贈曹州刺史旌有德也夫人滎陽鄭氏明粹柔間配於君子孝敬感於冬鯉勤儉彰於夜螢先公而終其引蓋殯有子二人長曰榮終潤州司功次曰挺前監察御史繼夫人滎陽縣鄭氏輔佐之道宜其家人均養之德愛猶已出有男曰慶前越州參軍從夫啓南城之邑隨子述東征之賦江海悠然往歌來哭以大歷三年五月日葬我濟陰守於偃師縣東姑臧公之塋次蓋二夫人祔焉挺慶等性與純孝幼承訓獎蒸蒸孺慕合葬於防海變山飛銘石不泯詞曰我之始祖自高邱兮繼有賢王霸涼州兮冕紱班然乃公侯兮周之姬姓漢之劉兮卓哉濟陰廣前修兮懷文抱質能剛柔兮羽陵遺誦如流兮介幘單衣從梁遊兮儲宮端士侍銅樓兮長水校尉鳴絳騶兮方期告賜得歸休兮誰謂生涯忽若浮兮先朝宮臣聖眷留兮追命藩守詔書優兮穀也食子難也收兮合祔黃腸千萬秋兮故人清河崔汪字巨源舉秀才校文尋佐戎衛遷廷尉評辟荊襄益三府春秋若干大歷四年月日遇疾終於成都官舍以已酉歲律中南呂庚辰之辰返葬於棲鳳原龜從也惟先德世勳焯敘前志祖仁堅父綱位不配才佐郡二邑而已公志經炳文義精格峻敦孝本義篤近周親定交後求忠告善道達則兼濟否則艱貞天寶之難覩萌晦迹族行導漾儉德全身陶融太和不嬰物纍而辟書狎至傳駟旁午不暇棲伏俯而受命竟友於諸侯咨以書奏籌畫之事抗詞中病動不求合老將嚄唶大豪雄張正色檢御革心畏憚從容儒服以靜邊荒夷險始終坦然一致初郭英乂鎮蜀政暴及禍公以嘗所辟用雖言之不行終全節守義遂與妻子居巖石之下不復斂袂於是府矣及相國衛公式是南邦旌禮賢士待以坐幄咨訪戎政議者謂翰飛紫霄邈其遠矣志士方展國華中零哀哉蓋君子恥食浮於人不患無位故曰孔門不稱其官閥潁川尚慙於卿長公始以文顯中以道勝終以義全斯亦成名矣何必乘軒服冕方謂之達歟然以有王霸之略通質文之變不得與公卿大夫高議明庭鬱湮重泉知者悼惜旅櫬南下浮江阻寇夫人河東辥氏故水部郎中據之女也之死明誓崩戚感動潛舟夜風反柩湍險神明所護川后息波出於萬死之中克此九原之葬可謂貞烈孝婦軌儀壼教嗣子師周十一歲而孤危身過毀以余先君之舊見託銘述詞曰元和內融懿鑠孔純學滔泉源文鬱春雲儉德處難超然世氛即戎雅歌偃息中軍參以天時合於兵機道行則安言發則危終保風節蜀人高之英靈沈埋旅櫬流離哀哀孝婦上訴蒼昊全柩巴江歸魂蜀道田橫舊曲季布餘車卯一閉泉扃千秋蔓草尊主直人則醜正者售禍權侔才忌則害能者構忤況位抗三府勢傾一時天下之事懸在掌握而剛腸立朝鷙鶚橫秋匡拂摩切姦邪是懲至使陰謀協比承間竊發曖昧摧辱加於大臣公諱鉷太原祁人也昔在元宗之盛外攘獯戎內立制度混一天下圖萬世安至於軍旅征伐府庫賜豫聲明羽儀禮文憲則莫不懿鑠震曜龎鴻精備國用荐費闕於經入固宜有卓立大才統集其事公當此時以御史大夫領京兆尹佩帶使印十數焉黜幽陟明考察風俗地征國賦均輸平準天子六間上林三官皆總制之未央前殿離宮下苑亦護作焉公以典訓經之文法緯之明察綱之廉平紀之其運也合變陰陽有以鼓其動其密也至精鬼神不能窺其隙銜策害郡之黠鈐鍵多門之蠧裁兆物計億事沛有餘力矣動一節搖百支無所竄情矣故威檢轂下風清關右紅粟冰紈露積朽腐星精雪駟外廏填溢廣靈囿之百里奉祈年之萬春漢家水衡少府錢四十萬至是而過之俾我巍巍之朝四海雄富丕變於今公之力焉入則轉移大謀出則平決㣥議天子垂拱於旒扆宰臣高枕於廟堂時佐輔陳希烈忌公有宰相器憂在移奪又楊國忠與公權勢相傾事不兩立會有凶人邢宰陰聚姦黨於長安里舍中公以京輔都尉之卒逮捕悉擒詔公與廷尉雜理而希烈洎國忠使法吏以牘背喻風旨於凶首引公愛弟銲連坐公具表其狀請自拘於司敗上以罪不相及猶遣使慰原之而沈猜罔上者密白而下其書舊制大臣不對理陳冤天寶十一年四月十三日奉氂纓盤水北面拜跪而自裁妻子移隸宅於荒服嗚呼歷觀憂國愛君之臣忠信未達而左右所鞫按成其無狀之罪豈勝言也則王章鼂錯納忠漢朝衣冠僇於都市家屬徙於合浦古人有言曰刑罰出於身實難自他及之又何害也知我者其天乎公始以茂才異行首於策詔凡四佐王官之邑七領憲府之命一至殿省再遷臺郎大司空大司徒各一官族德政燕國公張説已敘於烈祖之碑夫人河東郡夫人薛氏存與其榮歿與其辱南北萬里流離十年飲恨餘生以存宗祀以大歷三年五月終於某所嗣子稱以不天之釁承覆巢之餘遷逐炎海幽冤霜露家未悔禍慈親凶歸主人之艱無稱之比永惟先君及難葬故有闕泣血忍死獲終哀誠以大歷五年三月二十一日合祔於中書皇考真宅之次相國許昌公嘗感府辟緬然懷舊改贈移寢周於庀喪有以見京兆知人之明許昌報德之厚袞追敘遺烈亦門生表墓之禮銘曰知者謀始不能知終明者察微昧於數窮任我以事效我以功吉凶悔吝生於其中無象無端茫茫蒙蒙伏恨黃壚孰問蒼穹小君從祔松柏來同上於大臣存歿優禮若忠厚篤敬勤勞有勳則錫以追命之册延曜耿烈使之昭也大歷五年七月癸酉制故太子賓客盧正已可贈太子少保昔唐虞之際龍作納言咎繇弻刑其在周漢申伯于蕃南邦召公宅師東郊四皓輔翼太子公嘗拜蜀郡長史成都尹劒南節度採訪等使大理卿刑部侍郎工部尚書東都留守太子賓客悉更乎明哲道德有馨香於前世之臣所任也才難不其然與公之作鎮也元宗自省方復雍以千官六宮南北軍之從留蜀殆二年矣而元元給輸費苦以公往典通義唐安二郡以理平遷通州刺史七州採訪防禦使課最遂止輦草詔而命之翼勤則黜幽化源以清則㣥服庶尹執事之人不欺矣糾逖則攝懷亂略以寧則蠻夷君長異姓侯王從乂矣匡困資無繇賦既平則鰥寡孤獨廢疾者知所養矣旌德訓農禮讓大行則三老孝悌鄉嗇夫知所勸矣公之議刑也先帝以天下初定禁網疏闊朝廷郡國廢革舊章於是草具科條制刑録三卷以成後代法程無爽侮無佚罰矣公之居守也自胡馬入洛三川大殘長樂衛尉悉無官守中臺文書盡成灰燼而白晝大都之中剽吏奪金殺人橫道河南尹不能禁公以明恕清汙俗以淳和消沴氣禮新序舊士庶欣欣勤懋郎吏增嚴屯校日引月長四方人大和會翼翼之頌復覩於京師矣公之調護也儲后方建迪簡首僚以孝友間博通明道術而保奉之夫大賢濟時而不獨善大才當事而不辭難凡所任遇皆以國之艱急帝所親信而在厥服也始以經明四佐大邑三歷京掾五遷藩鎮三踐臺郎一處右轄再兼中憲以至於九卿元戎師賓居守小司寇冬官卿公字子寬本諱元裕以聲協上之尊稱時方大用優詔改錫焉曾祖君胄虢州參軍王公貞慶高尚不仕烈考履冰歷左補闕皆純古秉哲本經輔行德類賢續以之長世公含精於天性之道用晦於先物之智洞於學炳於文慈惠而厚汪汪洵洵未嘗簡彞不校其犯祿及疏遠家無長物在貴居陋樂而不更春秋之饗僅致君胙賓客之位適容宴豆漿藿未厭於家食稂莠不充於馬餼及賜告得謝安車東歸天子老臣優遊惠養早達元理逮茲逾深追贈之年二月既望疾甚不弛冠帶安坐超然越二十一日甲申薨於東都循善里之私第壽七十有九夫人滎陽郡鄭氏禮儀風教鄉族宗焉淡忘物遷靜與貞會公一其好尚偕其貴壽亦古人之所難并也公薨之前祀八月七日終年六十有五權厝於新安縣龍澗原近先塋也將祔而定壙有伏泉改卜靳塢北里重岡之陽吉六年二月巳酉乃葬是以緩嗣子前祕書郎兼監察御史翰一身主祀泣盡形遺親友所憂言之感涕永惟先公夫人嘗有升堂之拜纂揚風烈非小子而誰銘曰五侯九伯太公征之大輅龍旗桓公受之子子孫孫勿替引之前人光明我公昭之天子作師我公師之懿德顯猷永世則之魯有先大夫其言立於世春秋謂之不朽儒有今世行之後世以成楷則君子之道不患時之不逢患其道之不顯故賢哲所以啓正宗教蓋風於人倫垂之無窮者矣賓客諱無名字某河內溫人也曾祖渠州咸安令諱緒王父王司馬諱毅皇考慶王文學諱楚圭咸以清明粹和高爽顯融經術可以致公卿道德可以居師傅所不至者時之未會歟府君即文學之第三子也伯仲叔季嗣世清德鴻藻振古休聲動時每至徵賢良舉秀才一門擅科半於天下既冠進士擢第其年拔萃登科補益州新都尉開元十年舉文藻宏麗遂上陳皇王之盛下借周漢之諭稽以洪範九疇天人之統災變之異高言體大久而可驗如賈生之論漢也與孫逖同入第二等擢鄠縣尉宇文融寵幸用事總領計簿地有不書登下之數者按而籍之乃明割利言辭義激切聞列於二府竟還其令忘已忤權風節獨立秩滿判入第三等自周隋已來選部率以書判取士海內之所稱服者二百年間數人而已又居其最焉復以常資授萬年尉戢鸞之資搏鷙之用得不夭其性而喪其真歟然亦筆無疑牘庭絶留訟昊天之薦禍於我家也廬於外壤負植封樹哀過而陽和變慘感達而猛獸來馴常伯卿尹四方高士麻弔於郊者匪朝夕而間焉莫不竦歎而希慕也及禮既外除稱疾而不起朝廷方待以議郎博士辭而求邑除潞州上黨令恬淡推誠薰然而化矣故老歌詠洋洋至今入拜起居舍人搜遺求實典册大備撰開元注記三十卷藏在太史除屯田員外郎未幾轉禮部時天寶改元符瑞紛委郡國所獻月有千計公卿稱賀日奏數章總裁實難濬發皆麗元宗每賞異因命女史傳寫時省覽焉方將擢居紫垣專統大誥斯文既喪成命中止以天寶三年十二月二十日薨於西京宣賜里之私第享年五十有六故事中書舍人非寵終之職上以心許久矣特贈此官朝之殊典也以明年正月權厝於少陵之東至上元廣德之間以長子官在清近加贈工部侍郎太子賓客夫人博陵郡夫人崔氏徽間有德明順合禮逮事舅姑嘗佐明祀歸我不永方春即冥開元十七年終於京師年二十五窆於見子陵生長子侍御史著不幸早世繼夫人宏農縣太君楊氏大歷九年三月乙卯棄背於所封之邑其年七月已酉安厝於細柳原自廟見至於終堂三十九載宜家之懿範教子之明訓睦親之令德並載於已酉之銘生次子宏農縣令曾叔子大理評事普季子渭南縣尉魯永惟纍世來遷僅二百年封域連岡昭穆相對禮不忘本時又協吉以大歷十年十月庚午遷祔於宏農太君之塋博陵夫人同合焉夫敵已則不厭以子則咸貴若冡嗣既殘於中年元室不歸於先寢豈成兄之志也所以同異均愛前後相從亦承家之順也孝禮則然詢義惟允君子韙之諸孤不天幼奪嚴訓志以苦立學以慈成克自修潔所承罔墜亦既成人重集大釁思養於下不欲具生血盡而形遺者顧禮而終事也於戲天德於我叔父以扶濟儒元之道元精委其和太古合其淳德之厚也知至至之可與幾知終終之可與存恬然而虛寂然而通識之達也五禮之宗六樂之奧致廣大而盡精微極高明而道中庸儒之博也包括㣥有陶融象外燭日月之光華連星漢之昭回文之雄也若因親立愛則恭友過乎悌引進極乎慈奉先追孝則怵惕於時感齊明乎夙興靖於位而不以善矜儉於家而不以菲廢先哲之休風遐烈未嘗不蹈其域而冥其會也若處之於舜代則肩八元以論道升之於孔門則通四科而鄰聖而位止於上士教淪於衰俗豈蒼生之不幸耶元風之殆絶耶袞積釁少孤恭承憫覆躬誨無倦常至夜分性愚難移猶期日就外傅不得專也諸子不得視也獲漸庶幾實賴慈獎恩未上報禍已先鍾遠慕何申有懷靡及所踐之職昔所彌綸顧瞻庭除出入哀懼微微小子夙夜上慚遷神甫臨省護摧絶哀以傳實不敢假詞銘曰厥初茫茫輔軒致皇至我義信即官於常開國長羅惟右將軍奄受高陽惟光祿勳卬卬天水諡曰貞道赫赫黃黃魏之元老乃生司徒啓佑周邦踐華卻齊實建麾幢戲上賜田自溫而遷逮茲十葉松柏芊芊穆處其後昭列其前哀詞具石永世不騫惟唐至德元年歲在癸卯十二月二日美人河內董氏終於閿鄉縣之別館春秋一十有八嗚呼哀哉美人蘭質幽間苕華婉麗出自漢皋之曲降於巫峽之陽柳絮題詩椒花獻頌德行自成於天性藝能豈假於師資既彰絶代之姿雅叶良家之選瑤臺入寵金屋流芳映月幌而方娥上星樓而比婺恩多不恃顧重無矜讓以同車恭而避寢紫庭著美彤管旌賢屬綵仗巡遊花鈿侍從方執巾於上陌忽蒙被於離宮天道如何泉扃已矣聖上顧懷淑慎言念恩情悲遽夭於先春歎長歸於永夜追加班女之秩式慰衛兒之魂以某年月日葬於某原禮也乃命侍臣紀於貞石銘曰二九之年麗容嫣然春風轉蕙秋水開蓮浣紗選貌納袂求賢承恩玊殿侍宴瓊筵光陰不借神道何偏椒房愛促蒿里悲纏婕妤寵贈女史芳傳丹鳳城外黑龍水邊嗚呼此地永閉神仙古之賢妃四德六行則在女史彤管記言納聘入於天宮儀刑光於帝閫休有懿範歿而可稱涼王妃張氏族茂清河之原家承七葉之盛紱冕繼代勳華襲門曾祖守貞皇朝遊騎將軍左衛中郎將羅國公食實封三百戶職雄戴鶡績茂分茅祖光庭皇朝中散大夫衛尉少卿位亞八屯榮參九列父安仁皇朝正議大夫涇王府長史曳裾上邸託乘西園俱傳帶礪之封克承閥閲之後妃早習詩禮式遵教義令德令儀有要有倫既當八月之期允叶良家之選天寶八載納為涼王妃懿範徽音韶妍婉順恭勤朱邸儼恪丹宵友其琴瑟奉以家室瞻鴈池之閲水嗟駟隙之末光以廣德二年五月十三日終於上都之內邸春秋三十七旋以其年十月六日遷窆於某原禮也涼王倚歎蘭臺傷神桂苑梧桐半落鸞鳳孤飛永逝不追口答然增欷詔葬備禮哀榮飾終笳簫在辰旒旗啓路嗣子保定郡王仕攀號孺慕惟切蓼莪志於幽泉銘以貞石慮佳城之白日識隴樹之青松銘曰清河之邑兮地惟古貝育粹華宗兮賢妃誕載柔順內積言容外彰謀茲淑德輔佐賢王芳年忽馳大暮何速積善虛應兮時長運促空餘懿範兮刻在貞玉
