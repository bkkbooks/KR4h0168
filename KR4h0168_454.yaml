front:
  text: 全唐文欽定全唐文卷四百五十四子卿大歷中進士
  hash: sha256:367b07c15ddfb157e663b3c5b20b2cae685c07faa68dee10a8aaf9f2a79bf0c7
  markers:
  - {type: head, offset: 14, content: 李子卿, id: KR4h0168_NFKB_454-h1, level: 1}
body:
  text: 中國之至聖兮西方之大仙凝旒為出代之日立極是分身之年不然者何以垂其拱而鏡清四海建其像而燭耀三天故知有相無相而雙合前聖後聖而兩全不儀刑乎何以表三身之義不鎔範乎何以塞萬人之意乃命鳧氏立法冬官蕆事寫真於會玉之庭鼓鑄於布金之地炎帝司火飛廉扇吹九天下觀百神旁伺聲激射氣憑凌殷爾而風雷怒囂然而雲霧蒸波旬下回祿升爍寶剎炘金繩忽星透而泉噴遂煙消而氣澄圓相鏡開謂太陽新吐真質山立乃胚渾初凝怡然花臺耀此金髻睟容若動慈眼如睇清淨而青蓮始春圓明而白月新霽光然照夜瑞有應於周王像乃見時夢豈慚於漢帝既營珠額仍輝玉毫見之者宜知極樂之近仰之者誰識須彌之高心遂得於真正身豈有於塵勞乘流者於焉舍筏滯縛者於此操刀夫其發靈光凝瑞相異色傍射晴暉遠暢陽烏自耀於暘谷之中燭龍滅焰於鐘山之上自有頂而咸覩歷恆山而遠望赤光照室而多慚紫氣度關而應讓於是百辟奔走萬姓知歸拂塵而香雲自遍著人而花雨如飛莫不請施瓔珞願解寶衣期誓心於相好聿求福於光輝由是我皇之作也與聖同軌與道合躅降其象使天下有所觀播其光使天下有所燭不言而人化不欲而人足泛兮墊溺之濟巨川煥乎重昏之照初旭至矣哉法王之教將萬代而嗣續皇帝握靈符之三載也天地穆清星日耀潤野訪遺賢朝登傑雋化則垂拱而成令則不言而信時巡之儀展秋獮之禮順思訪俗而觀人若乘乾而出震右輔伊邇離宮在茲前瞻鳴鳳之岫傍指神雞之祠渭水煙波接苑中之洲渚岐山雲物落禁裏之軒墀俄而回鑾輅載羽旗為宴鎬之樂動橫汾之詞況不勞於百姓而有務於三時者哉由是叶清秋練吉日乘石洗皇輿出七騶按隊千乘扈蹕戈矛林森士馬比櫛始地嶪而天旋終電馳而飈疾翻然而八駿騫騰霍濩而六龍奔逸雷公轉轂風伯按馭朱旗列而秋野生春金甲照而暮川增曙陋漢帝之遊衍哂秦皇之逸豫祥煙不散近飛槍壘之間瑞草常開併拂車宮之處廣陌鳴鑾異彼遊盤訪百年之疾苦知五稼之艱難成王之搜由是問古公之政有以觀翠華來兮野老喜屬車至兮國人歡詎比夫隴塞回中妄開行幸之路泰郊畤上虛立禮神之壇穆然深宮駐蹕其中樓枕嶺而倒影殿當川而抱虹閟邃而寒暑隔岧嶢而雲霧通前視八水傍臨九嵕所以明四目達四聰凝睿想播元風比遊心於汗漫侔得道於崆洞亦既下輦於是端冕補闕政修墜典大風之歌作湛露之恩展於是振旅建旄回鑾返轡百蠻懼威武萬姓知教義若臣者巖穴久伏邱園來賁未有燭於皇明竊以覩於人瑞敢獻揚雄之賦庶獲有司之議夫九功不成八音不會所以功成作樂乃知樂之為大上帝以亭育道周故鈞天殷勤軒轅以創業功成故雲門砰礚不才狂智之士敢議聖唐之樂我高祖神堯皇帝歷數在躬鈞樞初握撥亂反正戮諸夏之鯨鯢枯楊生荑掃中原之霜雹太宗以電擊肅慎洗白刃於遼水高宗以風行營邱揚青煙於太嶽二宗一祖功高道邈我開元神武皇帝夷內難纂前緒皇綱弛而更張帝典墜而還舉俾萬人之從欲安一物之失所頃年祀后土夜吐神光中歲燎皇天晝聞山語曠帛丿糸古而未覿非軒頊而誰與宜樂功成當崇簨簴貞觀草創已模五莖六英開元增修更叶黃鐘大呂命夔典事大制宮懸鳴絲則文動奏金則武宣羽旄含其春露干戚耀其秋天慶雲既同於舜日大風無異於漢年於是八音具奏六樂斯備工無奪倫守不假器伏羲之瑟琴有序女媧之笙簧畢萃乘逸韻於伯牙得遺音於師摯窮搏拊之深術盡戛擊之幽致動角則寒谷花明扣商則春林葉墜聲無誤曲周郎之顧何施調有雅音季子之聽應異初舞而魚躍龍騰終曲而鶴翔鳳至誠可以克諧神人交暢天地者矣且述者彰於有聖作者表於有功徵乎正始繫彼國風聲邪則道澆俗弊調雅則人和年豐當今八風通六律同其音正其氣雄文昭德而那對武盡美而未工聆響皆清比無聲而無臭聞風自悅何自西而自東誠宜播在金石永永無窮有龎眉垂白之老擊壤而歌曰功成作樂兮帝力則那樂正崇德兮雅頌則多雲門之典兮大呂之歌金石節奏兮絲竹駢羅天地已正兮神人以和雨階舞羽兮三邊止戈擊壤鼓腹兮不識其他客有獻成功之頌九重深兮其若何我皇以合天為德神化為勳鄙銘功於彞器思播德於樂文由是播大章大夏表克長克君美韶者舜慚濩惟殷未足方其至美而且讓其樂云於是俗泰時康近服遠信聲諧六律事從百順樂府爰闢宮懸始震樹干羽而駢羅列鏞鼓而充牣八佾之疾徐無失九成之洪殺克慎惉懘不生子諒咸進洋洋元化流於管磬之中泱泱大風發於絲竹之韻觀夫崇德之祭也郊上帝祀方祗配祖列位崇壇奉犧六代明備千官肅祇殷薦咸若嘉肴孔時聲音上聞同韶之盡美戩穀下降知神之格思於時曙色初分祥風微扇肅肅嚴配陰陰嘉薦聲明動於皇天文物驚於赤縣至矣哉德不崇無以表金石之娛樂不作無以表天地之符樂作而萬方草偃德表而八裔風趨昔先王之薦也或中和罔紀鏗鏘罔假徒載考而載擊非大者而遠者孰若奮至聖之光薦明德之香陋咸池於堯帝笑舞象於周王秦穆之鈞天遠設軒皇之廣樂空張聖上猶兢自持非禮勿動鄭衛斯斥溺音是恐客有聞至德之音知我皇之所以垂拱天官所以管轄多士藻鑒時英奉帝俞者實在於德為右司者必資於明於是懸鏡之照主衡之平照之無私也自分妍之與醜平之有準也不失重之與輕賢以此達政以此成伊晉室之妙智得山公之令名淵矣深量直哉惟清當為政之時九流式序及沒世之後千古流聲原夫啓事之端得賢為上振淹滯於管庫升側陋於草莽人則洊歸士無長往朝必舉賢羅幽人之貞吉官必有能見君子之道長退李祐一作允而聖主僉謀薦羊祜而國人所仰碔砆懸識自有卞和之鑒騏驎不遺無慚伯樂之賞由是大張明試廣示勸助惟才者不悔其來無德者亦得其去王戎簡要何所能名裴楷清通於茲寡譽九原可作思文子之與歸千載儻交望叔夜之何處當今有司明遺政緝隱逸吉人時薦多士歲入高衢以騁若積水之奮鱗幽谷必登比初雷之啓蟄實薰蕕之有間固青紫而可拾客有希山公之密啓庶場苗之維縶皇矣聖主賢哉良佐廟謨克諧武烈斯播鑿門而上將初出屈指而西戎已破既執訊而獲俘遂策勳而類課覩沙漠之旗偃見邊庭之鼓臥蓋所以示王師之有征識天兵之不挫者矣振旅而還軍容畢覿其出也諧六月之功其入也叶三年之績庭實既備皇歡是式醉百壺而軍聲愷康獻萬壽而喜氣帛丿糸羃茂勳彰於宇縣盛禮陳於宗祏知我功之不宰知我武之無敵六師於是乎張皇百蠻於是乎怵惕然後勇爵高設元功克受搴旗斬將者其錫蕃攻城拓土者其賞厚築京觀而無謂銘鼎彞而可久蒲海長清胸奴已聞於斷臂稿街初列戎王正見於懸首舞干且在於舜階挾纊更聞於堯酒此乃征而不戰為而不有者也由是遐荒必通飲化向風息去病之深入罷張騫之鑿空從此止戈不勞乎四伐五伐因茲解辮無限乎自西自東非我皇明四目達四聰上讓下兢君明臣忠則何以建無大之元功昔先王之朝列位也宴以示慈惠享以訓恭儉故六瑞之等差為百寮之形檢將以守官有序而亦在瑕無掩其質不昧特明乎等威其義則深兼管乎裦貶然而圭璧列布方圓為度煥彼憲章請徵其故且五節之制以瑞為恆美王者有逮下之德而鎮圭是增庶存乎可大可久仍契乎不騫不崩追琢斯成伊桓伊信會朝是執惟股惟肱伯置躬以式禮子揖穀以旌能況不闕一於蒲璧固知夫六瑞之道斯宏若乃伯禹塗山千載攸仰率土肆覲普天歸往獻替之道若木從繩朝宗之心猶風召響棣棣之威儀是浹愔愔之德音克廣徵嘉會之有倫信斯瑞之所獎洎夫道德浸微君臣失義或求車棄禮或舉烽成偽出而非正為邱明所羞召之河陽則文宣興刺九服自失其序四海莫由光被徒以彼翟為好仇豈用我圭為嘉瑞丕休哉否不可終道窮斯達我國家崇儀式禮敦本棄末三起衣荷再徵被褐執玉既翼其左右班瑞仍霑於造闕美其四時展禮百神允懷奉圭以拜闕四字亦授鎮之力孰云祈年而諧則知禮之所貴莫先於玉發六瑞於周典冠二生於舜録其難致也恥應連城之價不易知焉甘刖三獻之足儻未逢至鑑之所珍誰辨混沙以雌伏者哉漢武帝將恢厥功闢厥土使近必伏遠必取乃象滇河以為池法昆明而教武於是水物備石鯨吐茸鱗鏤甲欲動於漣漪掉尾連鬐必隨於風雨殘文沙白古色苔蒼若噴沫而生浪狀銜珠而有光質惟其堅豈有時而泐感則斯應蓋動惟其常方將協靈德薦禎祥豈泥沉而沙臥與地久而天長者哉至若漢苑風霽秦渚流春輕搖淡濘稍動奫淪載沉載浮百尺且規於頒首若明若滅兩崖猶認於文鱗對牛女而光動映樓船而色新誇大豈慚於海客遇屯空笑於波臣及乎雷隱南山雲生北斗鼓怒波擊崩騰水走勢則洶洶有類陽侯之振聲乃虩虩宛是蒲牢之吼若此則非不知靈之所憑神之所有者也且石之為質也磨而不磷魚之為物也動而必順豈比夫為犀蜀郡浦際空沉作燕湘川雨中方振色映乎崖渚性合乎風雷非任子之釣得儻琴高之御來幸見處於河漢亦何辭於劫灰客有感而言曰今失流無虞鏗鐘何託請為不轉之志以就觀濠之樂儻南溟之可圖吾固知夫後時之可以潛躍也殊方之烏兮丹觜黑身異性特立兮既孝且仁徑毳非日黔而得黑快吻豈研硃而益新不頡頏以干物常翩翻而狎人非越鳥之思歸羡海鷗之多機謂富屋之堪止謂芳枝而可依其來也狀銜花未下其去也疑帶火初飛何必將雛聲已傳於緑綺如能反哺遊更狎於綵衣嗷嗷其音泄泄其羽常飲啄於軒砌每棲翔於牖戶凌美翼之鵷雛掩能言之鸚鵡朝食芳餌全忘攫肉之心夜宿雕籠何有啼城之苦顧弱質而誰貴誠主人之厚意非九子之是思仰三足而多愧鳴躍既安摶扶尚未鶯何德而遷喬鶴何功而在位稻粱已飽兮羽翼將調霜臺可宿兮雲漢非遙倘不使余尾之譙譙余音之嘵嘵為君一舉凌丹霄水螢惟蟲惟蟲能天彼何為而化草此何事而居泉腹可自持故無取於蟹足能自運亦曷憐於蚿其形也蠢爾其光也炯然色動波間狀珠還於合浦影懸潭下若星聚於潁川明不可以並時故當晝而潛曜暗不可以同德故候夜而開照近而察之若海砥之陰火遠而望也辟山邊之寒燎潛伏類於全真無欲均於觀妙質未為用是脫豫且之網餌且不貪高視任公之釣徒觀夫困坎而止隨萍則流任晦明而隱見與風水而沉浮自得井蛙之樂何虞轍鮒之憂倘欲觀書固不惜於餘照如將按劍非有意於暗投火為象兮取於時而去其熱水為宅兮質其潤而得其潔且混迹於泥沙詎等夷於魚鱉同至人之樂道類君子之甘節覽於心乃止水之常淨燭於物靡傳薪之無絶由此而言覺吾道之滅裂時不與兮歲不留一葉落兮天地秋況白露之夜遙聽陰蟲之啾啾且鳴因夜急思以秋苦始躍躍而緣階轉喓喓而入戶輕揚颯而韻合殘溜泠而響聚隴水咽而應然峽猿啼而何取由是知悲秋者自此生興感物者因茲為主則有三年逐臣千里遠客鄉路何處君門且隔吟澤畔之風秋臥江臯之煙夕逆旅愁聽鳴蛩四壁欲解寒衣蕭然淚滴婕妤恩薄義猶辭輦永巷秋深層城夜淺涼月斜照明河近轉塵滿瓊鈎珠簾不捲秋聲四入曼睩雙泫長樂歌鐘悲來莫辨香衢甲第趙李經過霞擁繡軸風調玉珂高堂引滿醉舞婆娑永夕之樂孰知其他清露醒後繞砌聲多瞪視凝聽傷如之何去歲良人遠征絶域錦書欲寄翩翩雁翼不語朝紡含嚬夜織其那空閨悲鳴亂逼欲夢翻驚方愁更憶腸絶聲聲門前月色貧士失職寂寞下帷蘭葉風敗苔痕雨滋覽鏡而元髮將白拂塵而素衣已緇柴門日暝響拂茅茨展轉孤枕偏驚故時念懸鶉之正弊恨躍馬之將遲何必葉落自長年悲且蟲之聲也無端人之聽也多緒亦由心羈者多感激志苦者易悽楚苟有任於行藏亦何嗟於寒暑水之積也鱗斯奮風之厚也翼斯舉彼數蟲兮何知且逍遙以容與九月肅霜山靜風落天高氣涼蟋蟀入兮堂戶近鴻雁飛兮天路長欲備歲之無衣無褐始禦冬而載元載黃命婦女事為公子裳若乃田畯入室居人在巷警殺氣之秋殞切嚴霜其夜降物藏於時人感於是雖懷有稔而及節亦念無衣而在此績我絲麻具爾紈綺將備服之纁素豈徒事夫紅紫則知王者之德聖人之思禮法在矣古今以之事陳王業功當天時澤及周王之道歌得豳人之詩既而滌場穹窒熏鼠乘其農間以入室處爰邀載績之功始命縫裳之女摻摻柔腕札札鳴杼天寒夜靜既閲西鄰之光月明更深齊度南軒之杵夫如是事合其制禮亦有序物嚮政方人知義所將前規不昧故斯事必舉資爾績而卒歲是裳授余衣而窮冬可禦方今四隩既宅九州攸同人悅物茂時和年豐男勤耕於稼穡女務績於蠶工雖悅當今之化亦猶行古之風於是彼其之子各稱其服此生之物咸得其㣥念彼及此務穡勸分雖非後作抑有前云豈上帝之私我實下人之戴君客有聞而歌曰天之高兮無不覆君之大兮無不祐生人殖物既庶且富爾在於時爾茅於晝霜始降兮女工就歲時窮兮寒衣授寒月山空蕭蕭遠風有客靜聽雙林之中鷲嶺深兮夜分後龍宮隱兮洪鐘扣蒲牢鬬兮獅子吼魍魎懾兮魑魅走搏泉頂兮隤谷口入有間兮出無有其發地也衆竅怒兮㣥籟起既聾山兮復噎水石鼓震於四荒雲雷飛於百里其在空也漫兮浩浩殷兮雄雄若陽臺之散雨似溟海之生風其稍絶也小不窕兮細不緊斷還連兮遠而近著回風而欲散值輕吹而更引寂兮寥兮忽不知其所盡或有宴坐真境觀空禪林將泯萬法是資一音惟其來無所見其迹察其去不可得而尋繁焉則應應而無心葉繭曾是而聞縛驚猿因斯而受擒別有道翼隱淪學傳文囿鏗爾而作賈勇在於橫撞洞然而來含毫思於一扣嶺上曈曨星漢移松楓颯颯風闕二字吾欲不書山鐘之狀何歌於斯詠於斯皓色旁射兮清虛上騰間階之下兮聚雪崚嶒歎此雪兮具知其有興有滅故為山也庶期乎不騫不崩始也散而從風類元氣之無象今也結而為阜若胚渾之初凝五嶺高標三峰遠跖昔則心往斯焉目擊千里之勢存乎袤丈萬仞之容見乎盈尺皓曜起乎岑嶂曈曨生乎樹石峽裏則秋月長懸封中則曉雲猶白夫其以近則遠以遠則親玉林不夜瑤草先春照寒景而逾潔拂朝霞而更新嶺上林襂作緱氏之仙鶴巖中綽約寫姑射之神人樵傍壑而疏影徑臨崖而絶鄰至若霽日生暖融風變朔危容半頽倘遇嵇康之醉片影初墜謂入郤詵之幄因降高而就卑遂散雕而為朴沍寒始徑猶可持而斫見晛則消不可繫而握因知夫色不久鮮物無常堅始則有於無有今乃然於自然觀陵谷之推易信人世之徂遷亦何必怪桑田之變海都邑之成川國著建封禮存嘉好蓋隆殺之有數何等威之不忒惟彼國公列在王制當享賓之日且欲媵羞於合好之時仍將委幣顧茲謁者今則謂何拜辱拜嘉薎無聞於紹相三揖三讓會不節於周旋五馬初來見使君之佇立三星已下於粲者之未逢慢禮自宜抵罪闕事於何逃責遊詞所及雖委援於五品薄訴徒為祇取慚於一握俾投棘署無聽莠言
