body:
  text: 上闕師左馮翊太守魯闕之事旬有二日奉迎闕尨耋七百餘人獻闕旌旗火天組練雪闕雄貌風清九夷聲闕而赫彌天之崇涖臨闕礡一邑非夫奮霆電闕能自明辟而下逮王公卿士洎趣馬小闕我魯公之肅龔丕闕實勾掾盧奕功掾揚日休馮翊宰前御史薛巘尉裴季通苗元震朝邑尉劉遵素澄城尉邵潤之河西尉權倕不敢怠也仰眺闕掌俯虔靈祠虛聞悉戌之音實荷穰穰之佑倕固陋舊學於師氏見命書事因刻石而闕朏河東人開元中官懷州司馬入為侍御史二十八年遷禮部員外郎君諱稹字道安河東聞喜人也自桐川建封燉煌為郡魏分三祖晉方八王奕代嘉其美闕二字年載其令德高祖定周大將軍馮翊太守襲琅琊公績茂戎昭化成郡國曾祖仁基隋左光祿大夫兼河南道討捕大使以陰圖王充義扶舊主遭時不利玉折名揚皇朝追贈原州都督命諡口忠祖行儉禮部尚書兼定襄道行軍大總管聞喜公贈大尉諡曰獻既明且哲經文緯武故事宗於禮闈大勳炳於雲閣考光庭侍中兼吏部尚書贈太師諡忠獻器識宏遠牆宇高深亮采天階丹青神化君二川淑靈三事鴻烈植貞闕一字之性抱經濟之才生而聰敏幼而穎悟仁和孝友君子之德日新文學吏能賢人之業闕一字盛開元初舉孝廉高第弱冠敕授左千牛備身秩滿轉太子通事舍人闕一字宸捧日青禁朝春詞令可觀風儀有裕歲餘調補太常寺主簿闕二字寺署辨闕一字禮法按驗伏藏動盈纍萬卿韋韜欲以升聞期於顯擢君不求苟祿固讓厥功闕二字京兆府司録未上丁太師憂柴毀骨立殆將滅性杖而後起闕一字日戒期闕二字屢聞寵光是冀爰紆聖札用勒豐碑仍命宰臣俾令護闕一字此乃顯闕一字千古哀榮九原者也太師公直道不回存亡交變明主優闕一字恩禮時列害其公忠定諡之辰將沮其美君晝夜泣血號訴聞天特降闕一字言以旌其實詔改諡曰忠獻豈非孝感之至以發皇家報應之期有如影響憂制缺主上永言念舊方議賞延命執事於五品官時宰以君闕一字量清通不欲處之散地請授史官是日拜起居郎君衰服外除心喪內疚闕二字今職遠闕一字先碑敷奏上感於冕旒情禮近傷於冠佩自武德之始迄於茲日注闕一字所闕四百餘卷南史直筆東掖記言考古而行怡然理順俄遷尚書祠部郎君才兼闕三字典郊廟續祖訥之清言循樊準之儒術明光伏奏聞望攸歸嗚呼天不假年神爽其善視事纍月臥疾彌旬以開元二十八年十二月十九日終於長安光德里私第春秋卌其先葬於聞喜之東涼原也即以辛已歲二月癸丑二十日壬申旋窆於長安萬春鄉神和原禮也初日者有言曰且有橫厄願禳之君曰苟無負於神明亦何禳之有生死有命誠性已齊此則達人之用心也君博識多聞含光育德志希宏濟心鏡無為嘗覽太一之書黃公之略每懷遠大自比范張及我宦成期於身退挂冠投紱臥壑栖林青雲始階黃埃溘至海內豪俊孰不惋惜嗣子倩等異才動俗純孝通神永慕寒泉式刊貞石其詞曰全晉舊國彼汾一方宗門貴仕代有烈光鼎鉉襲懿蘭菊垂芳地靈世德之子含章含章伊何載挺時哲闕一字服教義遐紹忠烈詞煜春葩操貞暮雪圭璧內潤鼓鐘外徹肅祗一命趍侍兩宮奉常典禮左掖記功清輝就日逸翮摶風高選郎署公議攸同建禮休浣漳濱移疾方奏丹墀遽辭白日隱嶙前嶂微茫此室勒銘幽泉永識芳實渙一作渶開元朝官殿中侍御史內供奉遠通漕引近切河渠擁左右之連隄隨深淺之積態屬流水之至長河沓起桃花渺渺實類迷牛之闕一作開竹箭滔滔方比鑿龍之迅委輸無限傷害為虞既為長隄固全豈使下方傷水導之則可毀之匪宜無從津吏之言請依水工之見秀明開元朝官御史遷吏部員外郎彼元天平分以成乎歲也惟日有令將法於王者服蒼玉而應春居明堂而順夏既隨時而有義皆率禮而無捨若乃律中夷則神司蓐收涼風以厲大火西流草木不芳誰忍聞於鶗鴂囹圄再繕亦申命於鷞鳩先三日而太史以謁率百官而天子乃遊然後天仗齊列野慶清秋乘白輅而啓行載白旗而扈從天顏乃穆帝典攸重彼詞客與史臣咸作歌而陳頌既啓鑾輅爰居總章備水潦修隄防鴻雁將賓待橫舟於汾曲鷹隼已擊且校獵於長楊實惟道映三五何啻聲超百王而已哉別有原憲長貧仲尼少賤朝遊白社驚一葉之辭秋夜宿靈臺聚㣥螢而燭卷既覩西郊之禮將述東山之禪欣庇影於禹陰願陳力於周諺什一而稅周道如砥二吾不足魯政斯壞國家鄰善以化寶穀而理上下皆給不學算車移人雍和大來惟知手舞足蹈嗟爾加稅昧我大猷曾不慕於若堯坐貽陷於大桀將謂浚我有司何取於匪躬寧有盜臣中尉且多於尸祿儻能率法抑有前聞若苟而為斯亦奚問國家有道日本請吏皇恩載洽式宴於朝眷彼旄人掌我夷樂邊夏不雜聲未動於禁靺風霜有典罪已彰於惠文雖御史彈毫雅存綱紀而旄人有訴請問鞮鞻天子遍祭無文咸秩牲幣之禮則有司存惟彼恆山是稱北嶽泄雲雨以潤物森草木而藏景有靈則祀故能視彼三公執文而行何其誣我五禮御史以寶符作氣雖久歇於無恤沈辜受欺曾不若於林放按以失禮竊謂其宜誠合沒齒無怨豈為噬臘遇毒所司不伏雖聞飾非敢陳愚見以罰白金鼎開元二十年官金吾將軍出為會稽刺史二十六年移衛州天生五材水善利物且溉且糞長我黍禾為隄為防制為畜泄甲秉國鈞軸作人父母可以興利除害仍舊貫以從時豈宜違俗變常師乃心而改作使或者相駭訛言不懲託黃鵠以興詞冀鴻陂之必復鳥鳴亳社抑有前聞石言魏榆斯無可採昔田疇是闢歌鄭卿之遺愛今羹芋興謠嗟漢臣之不軌緬想翟公之策安可效諸竊詳寧越之鞭非其罪也觀開元時人開元神武皇帝膺圖馭歷出震承天陽春涵惠澤之滋元古興匪常之頌建茲祠室厥瑞駢臻置立以來靈應有五其一也山遙水阻運木頗難不雨不風水忽漂漲汀洲泛溢吹筏近山計木才登水便復舊江人稱異老少咸嗟其二也廟地形勝林芳澗清野竹散林則連岡距谷丹粉雜色則穴出崖生私訪者失路迷津緣廟者往求必獲其三也謝土之際風雲久暗焚香有告俄爾之間雲收風歇野光火色盡耀山林騰焰數回明朗如晝其四也彭蠡臻湊之處三縣水陸皆經時有數百人求渡云我今往廬山謁使者廟汝載我渡當酬汝直留錢經宿咸成紙錢其五也使者騎從刻削馭人或泥或木忽有數軀流汗霢霂凡此五事前世罕聞良以聖德潛通遂使休祥煥著燾圭之孫開元朝官殿中侍御史內供奉遷給事中歷戶部員外郎昔者農皇之治天下也嘗百藥立九候以正陰陽之變沴以救性命之昏札俾厥土宇用能康寧廣矣哉洎周之王亦有冢卿格於醫道掌其政令聚毒藥以供其事焉歲終稽考以制其食十全為上失四下之我國家率由茲典動取厥中置醫學頒良方亦所以極元氣之和也夫聖人之德又何以加於此乎故三代常道百王不易其所從來者遠矣自雷岐倉緩之作彭扁華張之起逮茲厥後仁賢間出歲且數千方逾萬卷專車之不受廣廈之不容然而載祀綿遠簡編虧替所詳者雖廣所略者或深討檢則功倍力煩取舍則論甘忘苦永言筆削未暇尸之余幼多疾病長好醫術遭逢有道遂躡亨衢七登南宮兩拜東掖出入臺閣二十餘載久知宏文館圖籍方書等繇是覩奧升堂皆探其祕要以婚姻之故貶守房陵量移大寧郡提攜江上冒犯蒸暑自南徂北既僻且陋染瘴嬰痢十有六七死生契濶不可問天賴有經方僅得存者神功妙用固難稱述遂發憤刊削庶幾一隅凡古方纂得五六十家新選者向數千百卷皆研其總領核其指歸近代釋僧深崔尚書孫處士張文仲孟同州許仁則吳升等十數家皆有編録並行於代美則美矣而未盡善何者各擅風流遞相矛盾或篇目重雜或商較繁蕪今並采精英銓其要妙俾夜作晝經之營之捐衆賢之砂礫掇㣥材之翠羽皆出入再三伏念旬歲上自炎昊迄於聖唐括囊遺闕稽考隱祕不愧盡心焉客有見余此方曰嘻博哉學乃至於此耶余答之曰吾所好者壽也豈進於學哉至於遁天倍情懸解先覺吾嘗聞之矣投藥治疾庶幾有瘳乎又謂余曰稟生受形咸有定分藥石其如命何吾甚非之請論其目夫喜怒不節飢飽失常嗜欲攻中寒溫傷外如此之患豈由天乎夫為人臣為人子自家刑國由近兼遠何談之容易哉則聖人不合啓金縢賢者曷為條玉版斯言之玷竊為吾子羞之客曰唯唯嗚呼齊梁之間不明醫術者不得為孝子曾閔之行宜其用心若不能精究病源深探方論雖百醫守疾衆藥聚門適多疑而不能一愈之也主上尊賢重道養壽祈年故張王李等數先生繼入皆欽承請益貴而尊之故鴻寶金匱青囊緑帙往往而有則知日月所照者遠聖人所感者深至於嗇神養和休老補病者可得聞見也余敢採而録之則古所未有今並繕緝而能事畢矣若乃分天地至數別陰陽至候氣有餘則和其經渠以安之志不足則補其復溜以養之溶溶波波調上調下吾聞其語矣未遇其人也不誣方將請俟來哲其方凡四十卷名曰外臺祕要方非敢傳之都邑且欲施於後賢如或詢謀亦所不隱按古先服餌賢明繼踵合和調鍊道術存焉詳其羽化太清則素憑仙骨若以年留壽域必資靈助此蓋金丹乳石之用豈流俗淺近而能知所患其年代浸深訣籙微密世有傳習罕能詳正更加服石之士精粗不同雖志貪補養而法未精妙遂使言多鄙褻義益繁蕪每加披覽實長疑惑既子弟不得親授亦家童莫能曉了存諸左右殆謂闕如余宿尚谷神栖心勿藥歲月云久經書粗通知文字之一失乃性命之深誤是以會集今古考量論訣取斷名醫都凡纂要建題篇目並五藏合氣經絡受病八風所中形候論訣兼諸家會同將息妙術及乳石丹與雜石壓埋之法録定倫次即以時代為先後今刪略舊論纂集新要分成上下二卷可謂價重千金比肩萬古垂之於後學豁若冰消者乎夫明堂者黃帝之正經聖人之遺教所注孔穴靡不指的又皇甫士安晉朝高秀洞明醫術撰次甲乙並取三部為定如此則明堂甲乙是醫人之至寶後之學者宜遵用之不可苟從異説致乖正理又手足十二經亦皆有俞手足者陰陽之交會血氣之流通外勞肢節內連臟腑是以原明堂之經非自古之神解孰能與於此哉故立經以言疾之所繇圖形以表孔穴之名處比來有經而無圖則不能明脈俞之會合有圖而無經則不能論百疾之要也繇是觀之書之與圖不可無也又人形不同長短異狀圖象參差差之毫釐則孔穴乖處不可詳也今依準甲乙正經人長七尺五寸之身千金方云七尺六寸四分今半之以為圖人長三尺七寸五分千金方云三尺八寸二分其孔穴相去亦半之五分為寸其尺用古尺其十二經脈皆以五色作之奇經八脈並以緑色標記諸家並以三人為圖今因十二經而畫圖人十二身也經脈陰陽各隨其類故湯藥攻其內以灸攻其外則病無所逃知火艾之功過半於湯藥矣其針法古來以為深奧今人卒不可解經云針能殺生人不能起死人若欲録之恐傷性命今並不録針經惟取灸法其穴墨點者禁之不宜灸朱點者灸病為良具注於明堂圖人並可覽之黃帝素問擲孔穴原經脈窮萬病之所始九卷甲乙及千金方甄權楊操等諸家灸法雖未能遠窮其理且列流注及旁通終疾病之狀爾星開元朝官太常博士慶禮太剛則折至察無徒有事東北所亡萬計所謂害於家凶於國按諡法好功自是曰專請諡為專守節開元時官諸王侍讀守右清道率府長史史記者漢太史公司馬遷作遷生龍門耕牧河山之陽南遊江淮講學齊魯之郡紹太史繼春秋括文魯史而包左氏國語采世本戰國策而托楚漢春秋貫紬經傳旁搜史子上起軒轅下暨天漢作十二本紀帝王興廢悉詳三十世家君國存亡畢著八書贊陰陽禮樂十表定代系年封七十列傳忠臣孝子之誠備矣筆削冠於史籍題目足以經邦裴駰服其善序事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實録自劉向揚雄皆稱良史之才况墳典湮滅簡册闕遺比之春秋言辭古質方之兩漢文省理幽守節涉學三十餘年六籍九流地理蒼雅鋭心觀採評史漢詮衆訓釋而作正義郡國城邑委曲申明古典幽微竊探其美索理允愜次舊書之旨兼音解注引致旁通凡成三十卷名曰史記正義發揮膏肓之辭思濟滄溟之海未敢侔諸祕府冀訓詁而齊流庶貽厥子孫世疇茲史於時歲次丙子開元二十四年八月殺青斯竟損開元朝官侍御史聖人作孚百姓以理農夫服田乃亦有秋中庸可範則鄉有黨而國有學南畝不勤則里有胥而鄰有長豈獨敦崇耕稼平秩出入亦將禮異班白儀成風化胥關於禮自可徵詞長怒逐之夫何釁焉縣司科罪亦未為得無方之士誠宜咎之子漸開元朝官監察御史遷殿中侍御史內供奉南正司天北辰列象昭回可議坐徵雲漢之詩歷數難推自合史官之序當今銅渾設範玉衡齊政四氓各業庶績其凝舉而推之雖頗會於終吉子不語怪竟貽咎於為妖彼何人斯獨探幽説然古人垂教良史屬詞重黎掌日得唐堯之躔次甘公言星明漢家之歷象遐覽前志事有職司攻乎異端誰任其罰請置霜典無取星占承緒豫章南昌人開元中九經擢第釋褐京兆府參軍充虢王府判官拜兵部員外郎出為信州刺史六藝之修五善之備禮稱觀德義在興賢豈加爵而益封實選士而預祭惟甲何者司射澤宮見貍步之張侯以鹿鳴而應樂設中置楅用陳矢算之儀釋獲建旌遂明多少之數賓主存乎百拜公卿繼乎六耦能其中質定以和容豈罰觥之為慙亦削地而成恥禮之美者德實在茲况名位不同自邦君而節制器物有等實王者之殊儀卑不踰尊上得兼下法官所劾敢奉守官之誡訴者有辭恭聞克謹之義獻歲發春列宿分曜人其不惑序惟莫愆乙也司存式瞻天道令乎窮谷以將納冰物其惟新時漸於廟日在北陸其藏之也以周星見東方其出之也以遍克諧冬夏之氣不悖陰陽之宜彼彤繹而不修何祭祀之為禮御史之舉差執簡而不違有司之儀盍變通而盡利刑惟不濫其可加諸景開元時擢書判拔萃科官侍御史罪不伏弓旌待士束帛登賢授方任能察言觀行雖三微改運文質有殊百代可知風聲不替國家克明峻德無曠庶官多士斯聞得人為盛猶恐考槃有作薖軸生詞思草澤之遺芳憶山泉之逸賞傍馳鶴板博訪龜枚將求異等之才載下非常之制方書執簡直指觀風澄清之道莫聞黜陟之宜且昧海隅沉隱未薦裦衣漢陰矯識翻稱抱甕詳延不中使司自是疏遺混沌假修野老若為加罪縣尉能禦盜而不能使民不為盜盜賊息非尉之能盜賊繁過不在乎尉矣上失其平下苦其情弱者困死強者偷生道之常也豈樂盜哉無竭民力民心安益無盡民物民利豐實居鄉聚族有良有睦履詐迹偽有責有愧民之常也孰肯為盜哉故曰能與過不在乎尉在時政之得失爾若夫平鬬訟懾凶狡惟盜是禦者尉之職也苟失其人則貪殘誣枉民不勝弊反甚於盜焉今郡縣至廣庸不知所得者幾何人哉太原王昭度字世範登進士第為河南尉尉之職無所不舉焉然誠不足展世範之才顧其所得亦斯民幸矣世範於景有舊因求記刻於廳壁庶有信於後於是乎書璟開元中官陽翟尉上疏諫置勸農判官貶盈川尉臣聞智者千慮或有一失而愚夫千計亦有一得且夫無益之事繁則不急之務重不急之務重則役數役數則人疲人疲則無聊生矣是以太上務德以靜為本其次化之以安為上但責其疆界嚴其隄防山水之餘即為見地何必聚人阡陌親遣檢量故奪農時致令受弊又因出使之輩未識大體所由殊不知陛下愛人至深務以刻剝為計州縣懼罪據牒即徵逃亡之家鄰保代出鄰保不濟又便更逃一作輸急之則都不謀生緩之則慮法交及臣恐逃逸從此更深至如澄流在源止沸在火不可不慎今之具寮向逾萬數蠶食府庫侵害黎民國絶數載之儲家無經月之蓄雖有厚稅亦不可供戶口逃亡莫不由此縱使伊皋申術管晏陳謀豈息茲弊若以此給將何以堪雖東海南山盡為粟帛亦恐不足豈量田稅客能周給也宙開元朝登進士第官殿中侍御史內供奉既五月兮生一陰猶不雨兮思作霖聖自咎兮天同德誠下答兮神孔歆臣聞澤不潤下意欲乾封豈大明在御而荒歲或逢禮有旱暵之舞詩有昭回之詠陛下退史巫之紛若追后土之虔敬以乾坤而合德何造化之不測當赫曦兮是時與雱雨水它兮為期粵三日而將澍未崇朝而已布霏微露立之壇霢霂風旋之步緬察獄以臨幸嘗禱林而戒懼曷若不言而順於陰步馬曰肅而變其陽數非破塊與鳴條惟滌場及灑路靈臺是升斯考休徵渾儀已緯更酌元亨爾乃紫微涼夏彤庭景深初泛灔於太液復蕭條於上林傾菡萏而花舞散青蔥而葉吟宜刻漏於銀箭雜秋聲於玉琴龍虎飛騰兮多氣色鸛鶴鳴叫兮有清音况田畯之至喜奉聖人以為心惟大君之德也如雨施於上元如澤漏於重泉浸四溟而無遠洞萬物而無偏喜㣥生之遂也山不翦其毛髮河不汚其宮闕思就紺而生虹願從風而移月絶奔雷以無景靜行雲以不發願依稀兮其奚多雖三五而可越厚德載物山澤通氣珍怪奇産虞衡是職無幽不通在山川而有事至誠則感故鬼神以是依惟景肅將天威祗若事典式崇望祀之禮用展沈貍之義而虞人不虔祭物有闕各守爾典奚曠於庶官莫恭其職自貽於伊咎請舉虞人之罪歸於士師之辟利貞河間人開元朝官殿中侍御史內供奉金部員外郎遷御史中丞出為陳留守領河南道採訪處置使卒於官國之大事必存乎祀禮有五經莫重乎祭故肅事享薦雖不祈求而歆馨碩德是資昭報主上纂堯丕緒欽虞大孝是卑宮室固非為已用崇享祭其以佑人故臨遣制使聿修祀典飭躬戒告展采錯事捧圭幣潔牷牲盛儀宿設嘉樂具舉川先河後得沈浮之義因方即陰合瘞貍之禮比時具物責成存乎有司虛中慮事先令期於使者彼何為爾而敢闕供夫惟虞人不應無訴師乾字修然琅琊臨沂人公諱羲之字逸少琅琊臨沂人也原夫在天呈象箕昴垂其宿在地成物嶽瀆耀其英蘊粹含精孕靈誕祕降為人傑君酌其休自黃龍紀德帝軒握大寶之符丹烏啓瑞周儲開氏姓之兆爾其吉駿誠感標秀質於文昌離翦止殺協英圖於武帳既而呂刀慶遠郭筮靈長或瀏瀏風松或爛爛巖電盛哉茂族其昭昭乎繫德象賢為海內之冠冕國史家諜可略言焉曾祖覽清河太守宗正卿光祿大夫即邱子劉德智略始參宗正蔡義經術初登大夫故得象海括河升高能賦祖正散騎常侍父曠建威將軍淮南內史建始侯應德璉之規獻入掌禁中韓安國之嚴明才兼閫外公之生也踐得二之機應五百之慶骨鯁清貴鑑裁端凝夷簡淡雅魁梧頽放性敖如也深為從伯大將軍敦丞相導之所器重學總墳素藝苞流略書窮八體才贍五能至若垂露崩雲芝英薤葉鸞回鵲顧之巧虎踞龍騰之勢信可挺拔終古暉映來今者乎我大唐太宗文武聖皇帝甄陶堯舜漂滌羲軒物色賢良夢寐前載萬機之暇宏覽典墳得之右軍欣然師範親紆聖旨製讚論焉其略曰詳察古今研精篆素盡善盡美其惟王右軍乎心慕手追此人而已斯乃萬代之榮觀也與夫周表商閭漢修樂墓故不同年而語矣時太尉郗鑒負佐命之勳居台鉉之貴使求佳壻於文獻公公令東廂自觀之子姪聞者莫不聳身矜持公獨坦腹而不屑意竟當選矣起家祕書郎石渠奧府天祿仙臺藉非揚雄劉向之才華班固左思之覃思筆削之舉不亦難乎征西庾亮請為參軍纍遷長史參預謀謨總統綱紀魏陽元之領袖早歷清階溫太真之鮮明遽登英位兼此二美在我公焉遷寧遠將軍江州刺史匯澤西浮潯陽重鎮伊昔南夏埒擬扶風江湖涾陀匡廬嵬崫所以山藪藏疾川澤納汚非無草竊之人實有萑苻之盜下車無何梟音遽革公譽望幼挺才器夙彰聲名洋溢公卿藉甚識與不識莫不引領而思交知與不知咸願舉手而同薦頻召為侍中吏部尚書皆不應命常伯補衮冢宰提衡唐虞則龍作納言漢魏則貂蟬近侍卒不降志保真恬怡荀卿所謂德行高則驕富貴禮義重則輕王公於右軍見之矣復授護軍將軍亦推遷不拜除右軍將軍會稽內史甌越奧區地惟關輔浙河襟帶秦嶺股肱士女殷繁商賈聯絡一部之會氓俗難循公示以威恩孚以誠惠敦學校勸農桑梟雄猾賞廉孝未踰期月風化大行然後致書朝端以誡執事詞理鯁亮言旨切直豈徒賈生流涕孟軻浩然而已哉既而金行不競小人道長興言慷慨峻誓墳塋隨時卷舒關國隆替即不屑之願循長往之誠窮遊名山遍歷滄海捐龜組褫龍章練金膏屑瓊蘂濬曲水茂蘭亭開禮賢之館引貞肥之客於是謝安孫綽李充許詢支遁許邁之儔若非抗首謝時即是文章冠代何嘗不攀勝慕德夕處朝遊公自為之序以申其志也竟以樂死遂其初情春秋五十有九卒於會稽之里第朝野軫慟郡縣傷嗟路泣行號風悲日慘豈徒舂者不相工女輟機而已哉追贈金紫光祿大夫諸子仰遵先旨固讓不受公有濟天下之心蘊公輔之量智度淹曠規模宏遠抱劉琨之氣嗟地狹而不容懷樂毅之才嘆主昏而弗用有以知晉室之不延也夫盛德之祀綿於百代公侯之允必復其先自晉迄陳統會稽時殆逾數十可謂英英門戶矣既而黃旗霸盡紫蓋英衰衣冠咸返帝鄉禮樂並歸宸甸子孫流落今為居人十二代孫庭之祐之愔愔善人高尚其事貞不絶俗隱不違親偃仰琴書逍遙魚鳥雖心懷追遠之道而家迫屢空之恨遂使蒸嘗久曠享德無依樂毅之後未封若敖之魂遂餒師乾幸因承乏叨佐越藩仰休烈而延聳俯遺塵而景慕敬聚宗族隆構清祠靈宇森邃修廊轇轕時思之禋再茂如在之敬逾明荃壁藥房煜晨風而轉翠蕙肴蘭藉順四序而流馨北望蕺巖題扇之風更遠東連竹徑養鵝之沼彌清西接邑居朱城麗日南通阡陌翠柳含煙加以萬壑爭流千巖競秀澄湖湛鏡漬星象於波瀾洞穴封金孕靈符於宛委信允常之勝境勾踐之名都焉從十一代孫正議大夫守越州都督上柱國公士希俊師乾八從兄也操行端舉風神朗邁汪汪焉人不能測凜凜然吏不敢犯愛人如父母摘伏如神明春露流滋厮庶銘其巨惠秋霜泛簡豪猾肅其嚴威遊刃有餘雍容多暇乃昌言曰陸機文章猶陳祖德潘嶽詞賦先述家風况我族盛門昌首出天下爰自著姓以迄於茲莫不儀表三台抑揚二鉉英賢濬發才産光揚苟無述焉寧昭勳績恭承嘉命敢不云乎師乾學非覘古文慙秀異聊申舉一詎述芳猷敬疏無愧之詞庶披文以見質公有七子並有重名晉史詳矣或早終絶嗣或無子國除其有子孫蟬聯以暨今日者其惟黃門乎可以配享祖宗列為昭穆矣又諸與公交遊者英貴特達勳績昭著獨謝太傅乎今配食賓筵矣從十四代孫石城寺僧道敬金庭觀道士道崇研空兩諦核妙重元入龍藏而冥搜遊鳳京而賾祕從十四代孫朝議郎行歙州黟縣令爽銅章撫俗墨綬親人惠訓浹於重泉謳謠光乎單父從十六代孫元慶令嗣賢文毒師元保家等並晦迹林泉脫屣纓冕追仲長之逸軌慕郭舉之高蹤共扇家風同宣祖德殫素産頌洪猷勒琬玉於東甌俾庶幾於南峴其辭曰沂波括地緱嶺干天代載雄傑奕葉英賢三槐繼軌九棘蟬聯盛哉茂族人無間然秦則離翦漢惟吉駿武帳揚暉文昌挺韻象賢踵德誕生英俊汪汪萬頃森森千仞常伯獻替納言喉舌僉曰具瞻是屬明哲竟不降志朗其不屑霜氣稜稜風威切切匯澤西楚稽岫東甌人稱險躁俗號輕浮威而不猛善而能柔獄囚靡滯庭事無留有道則仕無道則亡關國隆替與時行藏屑瓊膏銑晦景韜光山川益秀草樹增芳我唐太宗兮皇王冠文經天地兮武戡亂欽墨妙兮右軍發睿詞兮製幽讚幽讚敏兮叨紀綱佐郡未理兮泛沂康欽族祖之休烈峻祠宇兮蕺巖陽明德惟馨兮茂蒸嘗子孫不知其所以遂刊石而流芳
