front:
  text: 全唐文欽定全唐文卷六十憲宗五
  hash: sha256:8700801cf535ec4a26de69b3f66b89a370796c006c11609261b5ed7d7dc46c15
body:
  text: 自今以後在京諸司應決死囚者不承正敕並不在行決之限如事迹凶險須速決遣并特敕處分者宜令一度覆奏朕聞君天下者纘承統業何嘗不樹建儲二安固邦家況長子有主器之義元良貞立國之本上以嚴宗社之重下以順恆久之宜歷考前載率由斯道鄧王寧性與忠敬生知孝友秉寬明之度體慈愛之心學師訓謨詞尚經雅動皆中禮慮不違仁稽以舊章允膺上嗣朕獲纘丕緒夙夜虔恭常懼神明未歆政理多闕曠茲茂典亟涉歲時今屬方隅甫寧品物咸遂覽皇王之制詢卿士之謀時瞻大猷莫此為重是用授之匕鬯位以青宮欽惟永圖俾服休命宜冊為皇太子仍令有司擇日備禮冊命主者施行楊憑頃在先朝委以藩鎮纍更選用位列大官近者憲司奏劾暴揚前事計錢纍萬曾不報聞蒙蔽之罪於何逃責又營建居室制度過差侈靡之風傷我儉德以其自尹京邑人頗懷之將議刑書是加愍惻宜從遐譴以誡百僚可守賀州臨賀縣尉同正仍馳驛發遣朕聞昔之佐時制物者咸有大功是惟五官以配五帝自時厥後有國家者莫不以輔弼之寄社稷之勳名登大蒸陪享清廟苟非茂德孰允盛儀贈太尉冕望重巖廊為時貞幹靈武艱阻首贊經綸宣力股肱平心鼎鉉任戡定之成業推翼戴之嘉猷贈太師晟識精韜鈐神假雄武建中寇孽躬踐憂虞垂餌虎狼致威樽俎刷宮廟之塵穢回日月之光輝贈太尉秀實氣全剛柔節固金石凶渠僭逆潛蹶根萌矯命還師衷刃決死紓阽危於怵迫挫狂狡之奸謀並材為時生用當國否感雲龍而應變炳辰象以降靈光復寰區振揚風概勳庸藏於盟府寵飾備於前朝光陰不追盛烈如在朕頃因郊祀爰舉典常俾差茂勳以配殷祭惟咸有一德允屬乎三臣庶昭示於將來式崇恩於既往冕宜配享肅宗廟庭晟秀實宜配享德宗廟庭淮南揚楚滁三州浙西潤蘇常三州今年旱歉尤甚米價殊高言念困窮豈忘存恤宜以江西湖南鄂嶽荊南等使折糴米三十萬石賑貸淮南道三州三十萬石貸浙西道三州恐此米來遲不救所切宜委淮南浙西觀察使且各以當道軍糧米據數給旱損人等節級作條件賑貸淮南李吉甫浙西韓皋躬親部署令刺史縣令切加勾當使此米必及饑人以副朕意如賑貸三州之外可及諸州亦聽量便宜處置待江西等道折糴和糴米到各處依數收管鎮冀管內諸州百姓等莫匪王人皆同赤子蓋戀生業遂迫凶威暴賦急征既嗟於無告冒鋒觸刃又慮其俱焚言念於茲良深憫惻其應討伐鎮州諸軍所到之處宜先存撫百姓使安其業勿令虜掠傷害以副朕心李元素病中上表懇切披陳云妻王氏禮義殊乖願從離絶初謂素有醜行不能顯言以大官之家所以令自處置訪聞不曾告報妻族亦無明過可書蓋是中情不和遂至於此脅以王命當日遣歸給送之閒又至單薄豈惟王氏受辱實亦朝情盡驚如此理家合當懲責宜停官仍令與王氏錢物通所奏數滿五千貫朕獲纘丕緒憲章成式永維皇祖之訓巍乎一代之典爰俾撰録垂之無窮以卿台輔元臣清直正氣博貫程制該通古今載筆之司遂命監領果諧朕志克就厥功縑緗永存風烈盡在祗若遺範感慰良深眷乃勤勞增用嘉歎所進知朕以東郊藉田禮之重者爰擇吉亥用祀先農上以供粢盛下以勸稼穡式展三推之義敢辭四體之勤亦既草儀方將肅事載思理本旁采衆詞以江淮水旱之餘河朔師旅之後宜寬物力以濟蒸元況當三農休息之時百司供具之費道塗灑掃暴露勤勞惕然在懷是用中止雖前有成命皆巳施行而重煩吾民則無固必其來年正月十六日藉田禮宜停於戲夫聖人無心以徇百姓朕亦虛己用圖大中苟事有未宜則改而求當凡百卿士期悉朕懷兩稅之法悉委郡國初極便人但緣約法之時不定物估今度支鹽鐵泉貨是司各有分巡置於都會爰命帖職周視四方而易從庶叶權便政有所弊事有所宜皆得舉聞副我憂寄丁公著辭官侍親不顧榮利高行至性人倫所稱今執喪致毀又聞過禮其所請旌表門閭宜依仍委本州刺史親自慰問并量給粟帛百官職田其數甚廣今緣水潦諸處道路不通宜令所在貯錢充度支支用百官却令據數於太倉請受朕於百執事羣有司方澄源流以責實效轉運重務專委使臣每道有院分督其任今陝路漕引悉歸中都而尹守職名尚仍舊貫又諸道都團練使足修武備以靖一方而別置軍額因加吏祿亦既虛設頗為浮費思去煩以循本期省事以便人其河南水陸運陝府陸運潤州鎮海軍宣州采石軍越州義勝軍洪州南昌軍福州寧海軍等使額並宜停所收使已下俸料一事已來委本道充代百姓闕額兩稅仍具數奏聞如聞河南陝府兩處比來所給皆是置本利息不破正錢勒便添充兩飧錢雜給不要更徵庶我愛人之心不止於惜費立制之意必在於正名農桑切務衣食所資如聞閭里之閒蠶織猶寡所宜勸課以利於人諸道州府有田戶無桑處每檢一畝令種桑兩根勒縣令專勾當每至年終委所在長吏檢察量其功具殿最奏聞兼令兩稅使同訪察其桑仍切禁採伐犯者委長吏重加責科門下承廟祧之尊固邦家之本重其緒業貞以元良斯今古之通制也乃者春宮曠位已涉歲時祼獻缺主鬯之儀膠庠虛齒學之道其何以億寧方夏彰示教源稽諸往冊用舉彞典遂王宥孝敬忠肅寬明惠和遵保傅之言佩經訓之旨友于兄弟睦于宗親博愛而恕己以誠慎行而飭躬以禮載觀所履克茂厥猷宜升儲闈以對休命朕祗若承憲惟懷永圖法三王垂統之規紹十聖重光之烈致嚴禋配俾奉粢盛式昭上嗣之崇庶叶明離之吉宜冊為皇太子改名恆仍令有司擇日備禮冊命主者施行比聞嶺南五管并福建黔中等道多以南口餉遺及於諸處博易骨肉離析良賤難分念茲遠人受抑無告所以去歲處分諸道不令進獻近因賂遺事覺方驗詔旨不行雖量輕重各正刑典猶慮未降明敕尚有因循自今嶺南諸道輒不得以口餉遺及將諸處博易又有求利之徒以口博易關鎮人吏容縱頗多並勒所在長吏嚴加捉搦如更違犯必重科懲如長吏不存勾當委御史臺察訪聞奏減死戍邊前代美政量其遠邇亦有便宜自今已後兩京及關內河南河東河北淮南山南東西道州府有犯罪繫囚除大逆及殺人外其餘應入死罪並免死配流天德五城諸鎮有妻兒者亦任自隨又緣頃年以來所有配隸或非重辟便至遠遷有司上陳又煩年限向後如有輕犯更不得配流五城光祿大夫行太子詹事路恕正議大夫泗州刺史田景度僥求非類意望賄成迹既涉於邪佞罪難逃於憲典恕可吉州刺史景度可虔州刺史右武衛將軍薛昌期惑於誑誘通是貨財可丹王府長史右衛將軍趙良金莫能修簡妄有交通可撫州刺史前左拾遺內供奉李渤隱居求志殫見洽聞嘗致弓旌之招尚懷林壑之戀如聞肄其素業成此新書詞章典雅謀議深遠獻於闕下良所嘉焉故洽今恩用清舊議可授祕書省著作郎信州刺史李位心希祕術跡狎匪人謂捕景之可求乃先風之是黜名教之內本無異端典刑之中豈容僻好可守建州司馬旌勸是先允協念功之義薦修爰舉聿追配享之儀贈太師瑊鍾秀誕靈逢時翼聖銘鏤金石帶礪山河績既著於先朝業宜光於後裔俾之陪祀用光遺勳宜配享德宗廟室天寶中宥州寄理於經略軍寶應已來因循遂廢由是昆夷屢擾党項靡依蕃部之人撫懷莫及朕方宏遠略思復舊規宜於經略軍置宥州仍為上州於郭下置延恩縣為上縣屬夏綏銀觀察使建中以來州軍及軍國歸人李洧李再春田昂李士真康日知李澄楊政義符璘李惠登薛翼蘇清沔等王者報功義惟過厚存則加其殊秩歿則恤其遺孤然後忠不徒施人知所勸故徐州觀察使李洧等頃逢艱阻各著款誠或以地來歸或率徒效順名迹昭顯史冊具存先朝念功皆極封賞歲月稍久湮沒日多再有甄明用申激勸宜委中書門下即訪其子孫量材敘用君臣運合故徇國以毀家勸賞義明故褒功而顯節存則酬其爵祿歿則録其子孫然後忠義不遺典章斯在故慈晉隰等州觀察使檢校兵部尚書康日知故徐州刺史兼御史大夫李洧等一十家皆有茂功藏於盟府故命搜訪后嗣光賁前人今志寧等或服戎著績或從官有成或投迹軍府之中或滯才州縣之職咸加甄録各茂官榮庶乎受祿者無忘於聿修懷忠者使知其必報勉膺寵渥無替前勞如聞比來京兆府每及臘日府縣捕養狐兔以充進獻深乖道理既違天性又勞人力自今已後宜並停諸司食料錢緣初令戶部出放已久散失頗多須有變通使其均濟其中書門下兩省及尚書省御史臺或務總樞機或職司彈糾而倍稱息利於體尤乖宜以戶部除陌錢每貫先收二十文數外更加五文委戶部別收貯計其所費逐處支給其本利錢先出放者宜各委本司勘會聞奏其合徵收者便充當司公廨什物添修等用其諸司食利亦準此勘會其合徵錢便充飯錢若數少不充以其前件除陌五文錢量所缺添本出放其所收五文錢每歲不闕添本之外合有所餘諸司廨宇破壞者便充修補緣諸司人吏轉遷不常新舊之閒因緣乾沒諸稱走失職此之繇向後須令本判官勾當勒令一一交割者遞相公付仍委御史臺一人專知勘覆仍先具條流聞奏河南少尹潘高陽頃以母老兄患懇求寧覲覽其章奏用遂私情而乃自求宴安致茲淹緩理裝踰月即路涉旬既乖人情頗致物議憲司舉劾宜有薄懲可均王府長史朕以不德君臨萬邦不敢自逸每懷兢惕而凶狡竊發殲我股肱是用當寧廢朝通宵忘寐永懷良輔何痛如之宜極搜擒以攄憤毒天下之惡天下共誅念茲臣庶固同憤嘆宜令京城及諸道所在同捕逐有能獲賊者賜錢一萬貫仍與五品官有官超授如本雖同謀或曾停止但能糾告當舍其罪仍同此科敢有藏匿全家誅戮布告遠近使明知之近緣東都盜賊事連僧徒因此所繇遂有覺察今既各有名籍不得恐動其已出城者所在安存其外國僧亦任隨便居止凡在職司必當廉慎苟懷貪汙實紊政經為理之先固在懲誡其犯贓官本據律文刑名甚重頃者多從寬宥不足懲奸切在申明使其知懼自今以後如錢穀稍多及情狀難恕者宜杖決配流餘並比類節級科處如有此色所在長吏及觀察使不能糾察事發之後並據所犯輕重加責罰庶警貪吏以惠疲人門下天地以大德煦物而高秋勵肅殺之威帝王以至道育人而前王設誅討之典於是乎有阪泉之役有丹浦之師情豈佳兵義存禁暴朕嗣膺寶歷於茲五年以惕厲居於人上以仁恕撫於天下恭惟文祖之訓敢以武功為先昨者吳蜀興妖師徒獻捷朕每念陳原野之衆行鈇鉞之刑雖舉彞章頗懷慚德蓋不獲已豈樂於斯王承宗頃在苫廬潛窺戎鎮而內外以事君之禮將而必誅分土之儀專則有辟朕念其先祖常有茂勳貸以私恩抑於公議使臣旁午以告諭孽童俯伏以陳誠願獻兩州期無二事朕亦欲收其後效用以曲全授節制於舊疆齒勳賢於列位況德棣本非成德所管昌朝又是承宗懿親俾撫近鄰斯誠厚澤外雖兩鎮中實一家而承宗象恭懷奸宵貌稔禍欺裴武於得位之後縲昌朝於受命之中豺狼之心飽之而愈發梟獍之性養之而益生加以表疏之閒悖慢斯甚神祇所不捨天地所不容智士所以奮懷義夫所以興憤式遏亂略期於無刑龔行天誅示於有制其諸道諸軍進討兵馬已從別敕處分王承宗在身官爵並宜削奪其鎮州管下將士官吏等久在戎行未知朝典或陷於邪說或迫以凶威雖有忠誠無由自達但能效順即是王人豈止惟新當加寵渥其有能回戈殄寇因事立功特有褒崇不拘資次貴爵厚祿設之而高懸實封名藩待之以懋賞其以一州歸順者便與當州刺史仍賜實封二百戶如先是刺史以州歸順者超三資與官仍賜實封三百戶如以一縣歸順者超兩資與官賜實封一百戶其長行官健歸順者當與優厚褒賞如將校內有翻然改圖梟斬元惡者授以不次之位寵以殊常之封王承宗如能革心悔過束身歸朝待之如初一切不問仍舊賜官爵別加寵授於戲王者之師蓋除於暴亂止戈之武豈願於傷殘而承宗不能負荷舊勳祗承新命自貽其咎寧怨於天亟此興戎至於用鉞固非素意用歎於懷百辟萬方宜諒朕意宣示中外咸使聞知淮蔡近郊久隔皇化本殲凶虐在拯生靈況今賊黨攜離相繼效順思俾阽危之俗盡霑養牧之恩勞徠招綏今之所切其新除蔡州刺史楊元卿宜令與李訴商量計會且於唐州東界選擇要便權置行蔡州如百姓官健有歸順者便準敕優恤存撫令知國恩必使全活列位選能切於守土分憂求瘼諒在親人言念疲黎載深注意自今已後刺史如有利病可言者不限時節申報節度觀察使刑賞大信國令必行義勇深誠旌答斯在西文城柵歸降都將吳秀琳堅拒逆之計結勤王之心翻然令圖竟效前款高秩厚賜宜酬爾勞可試祕書監兼御史中丞封濮陽郡王賜實封二百戶賞錢萬貫仍令李訴署以重職以獎忠臣見機效節誠固於危途秉義懷忠福生於死地挈其全邑誓彼萬心事且超於等倫賞豈限於班次郾城降將殿中監鄧懷金自王師壓境詔命先施識祝網之深恩感投身之有地縲俘以列介士無譁披於凶墟造我營部聆之者響振慕之者風趨銷遏亂源導迎善氣固可勒功王府播美天衢拜爵當時傳封後裔可檢校太子賓客兼御史大夫封新平郡王并賜實封二百戶賞錢一萬貫入粟助邊古今通制如聞定州側近秋稼多登屬以軍府虛貧未任收糴將設權宜之制以成儲畜之資念切救人不同常例有人能於定州納粟五百石放同承優出身仍減三選聽集納粟一千石者使授解褐官有官者依資授官納粟二千石者超兩資授官如先有出身及官情願減選者每納三百石以減一選天下成賦固有常規刺史進錢實非舊典恐為後例弊及疲民言念於茲義在惻隱其苗稷所進助軍錢絹共二萬六千匹端麻鞋一萬量宜却還本州苗稷將代貧下戶差稅箭一萬隻令付本道都團練使收管吳元濟豺狼醜類敢悖天常不知覆露之恩輒肆猖狂之計拒捍成命焚劫鄰封詿誤我平人殘傷我赤子縣邑黎庶號呼屢聞朕為人父母得不興愧亦嘗告諭曾靡悛心稔慝挻災日滋月甚所以命貔貅之旅致原野之誅雷霆所當巢穴盡覆獲此凶豎正其刑書與衆棄之茲為國典宜準法處斬其餘支黨並從別敕處分帝者承天子人下臨萬國觀乾坤覆載之施常務其曲全用德刑撫御之方每先有宏貸叛則必伐服而捨之倣於典謨亦尚斯道朕祗符前訓纘嗣丕圖砥寧方隅蕩滌氛祲上以攄祖宗之宿憤下以致黎庶之阜康思厚者生務去者殺至於包荒藏慝屈法伸恩苟衷誠之可矜則宥過而無大王承宗頃居喪紀見賣於鄰封後領藩城受疑於朝野國恩雖厚時憲不容戚實自貽寵非我絶百辟卿士昌言在廷四方諸侯飛奏盈篋競請致討爭先出軍尚復廣示招懷務存容納至於動衆事豈願然開境愍罹其殺傷退舍為休其士伍取陷救溺能無慘嗟以其先祖武俊有勞王室書於甲令銘在景鍾雖載駕王師再從人欲而十代之宥常切朕懷近以三朝稱慶八表流澤廣此鴻霈開其自新而承宗果能翻然改圖披露忠懇遠遣二子進陳表章緘圖印以上聞獻德棣之名部發囷奉粟並竈貢鹽地願帥於職方物請歸於司會且天子所臨莫非王土析茲舊服將表爾誠諒申效順之心悉見納忠之志抑而不撫何以示懷朕念此方亦猶赤子一物失所寢興靡寧忍驅樂土之人竟就陳原之戮既克翦暴常思止戈豫之此心天地臨鑒況常山師旅舊有功勞將改往以修來誓酬恩而遷善鑒精誠之俱切俾渙汗而再敷曠滌乃愆斷於朕志復此殊渥常懷永圖其承宗所有瑕釁特宜洗雪可依前守銀青光祿大夫檢校吏部尚書鎮州大都督府長史御史大夫上柱國充成德軍管內支度營田鎮冀深趙等州觀察處置等使應成德軍將士官爵實封等一切仍舊待之如初其管內四州百姓委承宗厚加安慰令守生業官吏以下各守職分於戲禍福無門善敗由己所鑒既因於克念易轍因獲其就安行之維艱守在勿失凡百庶士宜知朕懷事關軍旅並屬節制務係州縣悉歸廉察二使所領實曰管轄諸道支度營田承前各置使自艱虞以後名制因循方鎮除授之時或有兼帶此職遂令綱目所在各殊今日務修舊章思一法度去煩就理衆心為宜唯別敕置營田處置使且令仍舊其忠武鳳翔武寧魏博山南東道橫海邠寧義成河陽等道支度營田使及淮南度支近已停省其餘諸道並準此處分
