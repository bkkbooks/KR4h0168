  text: 全唐文欽定全唐文卷七百二十二兼字處元元和中歷官刑部吏部郎中出為商州防禦使知河南尹兼水陸運使
  hash: sha256:217840cca74266e008350e1284c66420140a4c1e75ca3076917294f604ac77d8
