body:
  text: 學能廣業德可潤身率由此道乃終有慶甲溫故知新博聞強識究前言而識往行致廣大而盡精微故三千門徒續於斧棘十五志學傃其發蒙黃憲而初邑里有聲陳實而終海內多譽方今美其教化厚以人倫春誦夏紘遠邁永平之際東膠西序殊超建武之初戴憑所以重席周福因而獲印於是庭列輜駕堂循禮容將以勸凡今之人豈徒矜稽古之力孔宣父之至德斯其務本桓春卿之雅意誰復間言諸生或非竊謂匪當儒衡字廷碩元衡從弟纍選戶部郎郎中知諫議大夫事兼知制誥終兵部侍郎卒年五十六贈工部尚書臣謹案開元禮太廟九室每年惟五饗六告祭用牲牢俎豆而已劉歆祭議曰大禘則終王壇墠則歲貢二祧則時享曾高則月祀祖禰則日祭國語云王者日祭月饗時類歲祀此則往古之明徵國朝之顯據蓋日祭者薦新也言物有可薦之不必卜擇日時也故叔孫通之言且曰古有嘗果足明古禮非漢制也月饗者朔也論語子貢欲去告朔之餼羊孔子以為不可則告朔必具牲牢明矣春秋又譏閏月不告朔猶朝於廟此則月祭殷周已降皆有之也薦園寢者始於秦之代漢氏因之而不改人君三年之制以日易月喪紀既以二十七月而降朔望奠酹不復親執故既葬之後移之園陵又諸陵祠殿月遊衣冠取象平生務從豐潔所以陵寢朔望上食與太廟日祭月饗本旨不同今王涇所引太廟與陵寢同日時設祭以為越禮臣竊謂王涇但宜論太廟陵寢朔望奠祭可行可廢之旨不當以同日同時為議何者漢朝宗廟園寢一百六十七所郡國祠祀豈不與宗廟同時者乎在禮既祭於室又繹於祊蓋廣乎求神者也宗廟陵寢嘗礿同時理固無害又韓臯引漢官儀古不墓祭臣據周禮冡人之職凡祭墓則為之尸則古亦墓祭但與漢家陵寢不同耳安得謂之無哉又王涇狀以太廟設祭列家常饌以為褻味而韓臯則云法饌依經固非黷祭臣案春官大宗伯以肆獻裸饗先王者謂解牲體薦血腥灌之以鬱鬯者也又祭義云祭之日君牽牲入廟門麗于碑卿大夫袒而毛牛尚耳取膟膋祭腥敬之至也夫豈謂常饌耶文王之祭思死者如不欲生夫豈知增常饌耶蓋其慤焉盡其禮而不過失焉所以然也是以簠簋有數籩豆有殺雖多更聖賢不敢加也今夫常饌庖人羞之膳夫熟之糅以羶香雜以鹹辛具有司之烹炊漏神明於媟近意雖不褻而事已褻矣况古者天子立七廟又為壇墠以祭去祧之主近則起土遠則掃地蓋彌遠而彌尊益敬而益簡臣以為陵廟近也親親也朔望奠獻尚潔務豐宜備常饌以廣孝也宗廟遠也尊尊也禘祫時享告朔薦新宜從古制以正禮也唯太廟望祭無所本據蓋異時有司因其陵寢有朔祭望祭以為宗廟既有朔祭則望祭亦合行之殊不知宗廟朔祭乃告朔也臣以為宜罷此耳仲尼三年無改於父之道蓋言理有改更則三年之外斯可矣况天寶之令行於一時者哉今陛下開十聖之景光廓八紘之氛祲風掃長彗神驅大妖刳金㦸以厚農直玉斗而序政博採㣥議講求典經將欲成一王之教垂萬代之法安可因陵寢緣情取象之理改宗廟薦鬯涓選之儀甚不然也鉉隴右人元和中登進士第儒有聰明卓犖敻然先覺勿懷六蔽之嗤是切三冬之學闕八字無光穿屋如墉豈獨雀之有角且以蘭膏既絶日月其將欲假明於他人之室方鑿竅於夫子之墻乍引潛輝怯投珠之暗忽分圓影疑月出之光觀夫納耀之初流輝乍舒獨見之明何得和光之義則如然後傳之辨鳥遰以分魚諒非偷人之所以固同暗者而求於逗影未周將閲小明之什分輝竟劣難尋光大之書於是舍之則止用之則行彼君子訝來風之穴矧吾儔觀繼日之成誰謂我偷偷則不滅誰謂爾失失亦不驚徒愛夫覽則無欺燭之有私文從曲照字逐圓規守其黑非吾徒也用其光若已有之始慙服暗之議不能牆面終契襲明之旨或異管窺况乎貧則宜甘學也宜耽韜爾光不違於誨盜開吾壁非涉於攘貪志也則勞自知不足豈奪鑒微之見實假照鄰之燭等虛室之白寧喪爾明喜衝孔之光已從吾欲然則能資於昧者可望非親欲求於明者有志無囚達暗之心難固偷光之道何新是可投庸功疑學捨彼求身故能才已徵於夢鳥道非窒於獲麟有山負固兮遠不可窺規模之於米兮了然可知象在其中則遠而視近積而能散故高以就卑所以舉一隅而必狀投一溢而增危峙乃糗糧始覿必盈之積塵其糠粃俄分不讓之為爰將取法非曰作僞初識聚米之夫反為樂山之智同遠近無拔蛇之患殊輕重去壓卵之易善於陳者謂我幄內師謀昧於事者謂我軍前兒戲於是高卑殊狀巖壑再闢爰分杵臼之資寫彼邱陵之積持一撮之多謂能作固迷方寸之地已疑見敵操量鼓者早訝於拔山充糜粥者旋驚其茹石若其似朽疑駮如呀欲平防之於十手所指負之於五斗而盈無還三十之車侔於造化酷似五千之仞勢亦崇成且夫或以筲藏乍疑箕斂搜其存廩之實屹作捍邦之險削培塿而敝帚呈功吐嶔岑兮括囊未掩於是太白忽峙玉山宛呈簸持兮陰靈乍泄轉捧兮雲掌俄生偕病馬之岡莫知其遠指亡羊之路不見而明然以小方大布新除舊有懷狗盜之虞無辭蟻壤之漏爰謀爰度方同數米之人為岡為陵不是傾倉之寇是知進退由已高下在心克盡崇卑之勢難均筲斗之斟勿謂君前嘗巧事外求音功早登於九仞虜何逃於七擒琥珀為枕兮可保而持欲加首兮金瘡是資况無用於寢戈之日固非全於枕轡之時在寶難求不藉金之堅也其脆易破無勞斧以斫一作斯之豈為我寶用安爾止况將展轉之狀用救通中之痏分好惡於千歲之姿定剛柔於一人之捶莫投金柱相如之璧則非不隕霜鋒子雲之珍焉是夫其鏗然始解發耀騰暉定錙銖詎論乎大小考多少未極乎情微異色傍分兮渙然冰釋虹光中裂兮溘爾星飛然後霞彩斷角勢違豈同摘玉之流去彼取此殊異毀珠之日辨是與非美夫節彼用物視其豐約始如席上之珍忽碎封中之藥念刮骨之痛爾將束手於無為在抗首一作道之時我則曲肱而奚若故遠於患無或不良扣兩端兮乍疑分寶摧一角兮尚可含章在目無全似假庖丁之術應手而碎不同石氏之強雖謂大道不寶吾道則屈固非合散之流不是㣥分之物假以衒時為美絶代稱奇昔為永堅之好今傷善價之儀偕符氏之堅名果遭真石同五鹿之神角或遇金鎚猶能動彩熠熠馳精杲杲難分走海之靈尚認涉洹之寶徒美夫棄其異而斥其好曾不知失其枕而獲其道蕃元和中進士官侍御史出為袁州刺史歷尚書郎武宗時為太僕卿持節使黠戛斯丹鳥火熒臨書育明假蠢爾之微照俟終焉而有成由是引素囊開縹帙文的皪而可見影循環而無必孤懸虛牖依依而鳥跡初分回隱薄帷幕幕而龜文乍出嘉其炯若流耀煥乎發蒙瑩分寸而靡隔助舒卷而不窮所以藉微素積輕躬隱映有餘寧虧武子之志熒煌如貫爰明蒼頡之功臨墨池而珠還合浦映草翰而燎點寒叢至若暗室方扃清宵未艾炫微質於幽邃閲㣥言於宵靄餘光不滅能溫故而知新疏彩乍臨為積小而成大爾其杳杳皆徵歷歷可憑分白黑而為度隨編簡而不恆初訝無煙潛凝化草之狀才瞻吐耀暗分垂露之能及夫皓若雲舒明如珠綴互離離而發色紛漠漠而流睇是以象鉤深類冥契儻觀光之不昧庶微躬之足勵聖上崇國本致時康動元象之昭鑒産嘉禾而應祥甸人於是具畚鍤修封疆啓芳穎於修畛薦靈姿於我皇懿夫挺拔自分連拳相接始穰穰而齊實終矯矯而異葉殊其本均二氣以發生同乎心表一德之和協不然者寧擢秀於墳衍載具美於圖牒徵其瑞質稽彼大同見芬敷而共貫信榮結以交通則知符乎帝道發自天功合穗之珍方將效祉於今日異畝之美豈獨標奇於古風於是野老歡心田夫盡力宛移根於沃壤之際俄發耀於丹墀之側祥煙近拂乍疑連理之形喜氣旁臨更辨合歡之色彌彰執契之道載助惟馨之德爾其天鑒非遠坤珍是呈始苕亭而間出終夭矯而曲成豈比躬稼之時盡化晉君之草挺生之歲克符漢帝之名向令質委離披孤生苯䔿安得臨玉砌邇龍衮設穜稑之萌芽為理化之根本是知六府惟序萬邦式孚茅三脊而非偶獸共抵而自殊未若耀青芳於近甸垂嘉貺於靈圖况復聖慮彌深皇猷思永梯山航海未足契其休光菲食卑宮將欲示其豐省斯所謂騰茂實於厚地故薦嘉穗於重穎山溜泠然潄幽石而濺濺恆冪䍥以迸集忽嵌空而下穿介若自持謂稟靈而利物呀而中斷見積小以摧堅且其輕重異源剛柔殊類嘉洞出而無眹知纍功而有自貫白雲之幽抱滴滴方來破蒼苔之古痕泠泠斯至崎峗莫狀激射無窮逗跳沫以居內泄涓流而在中日就月將必漸然而爭赴因微方著殊易者之先攻原乎厥性既柔其平如砥因滴瀝以成象若洞徹而虛已注而匪竭歎追琢之莫加協乃有時顧堅貞而何以下潄而玉中開似冰謂雕以為樽窪而無當疑鑿而成磴豁爾非憑然則引深邃洞觚稜諒在物而靡及非自微而不能由是異類相推於斯何甚蒙兮莫奪堅然是稟清光亂灑初熠熠以穿菱素彩頻垂每熒熒而透錦偉夫炯若方潔於焉注茲或零落以將盡竟連環而不遺依依未通遵神泉之靡息一一將徹聽鳴玉之遠而故可以託質悠悠於山之幽載吐潛液靜如冥搜滴盤礡之間通茲餘潤挺剛克之際分乎至柔諒成功之不遠庶積習之可求日入空隙塵生夜光嘉的的以初引見冥冥而自彰乍拂圓輝積纎形而散亂時搖輕吹翻弱質以悠揚洎夫託彼曜靈起茲虛室恆紛空而色碎每燭幽而景密仰孤光之未及猶在暗而效質由是亭亭旁照冪冪斜飛必炯爾以賦象終飄然而相依故所以臨素壁隱清輝若下歌梁方凝姿而漠漠如驚陳榻幾引耀以霏霏是故當皎皛以自飛引虛光而將扇振遺芳而交集流細影而倏遍散乎幽處非厚地而不揚透彼無間庶高天而可見爾其晶明下射杳靄中攢景熠熠以將盡勢規規而尚殘及皛輝之餘斜分稍易當冥濛之際仰望誠難至若窈窕孤懸熒煌相蹂靜對幽闥間臨虛牖窮隱見而不讓隨方圓而可久若然者則混而同貫自得審於浮沈浩以相鮮孰可辨於妍不是以杳如有待紛若無機穿棟宇以光小拂簾櫳而色微片影方呈似鑿幽人之室輕文靡定如緇遊子之衣故其餘照乍沈纎埃旁達既在陰而不昧將耀質而難奪亦何必越茫洋散空濶願依大厦之內永寄流光之末歌有能者珠有至精既審音於條暢因取象於圓明由是同其妙得于聲上下皆宜固纍纍之相合短長中度方一一而渾成徵彼深旨明乎所謂本潛究於精微終契言於髣佛故永言者以有勇而可保效珍者取無類而為貴將察之於衆音信端如於一氣始乃辨真僞審虛圓顧周流而復舉若的皪以成妍度曲未終或交通而無眹成文不亂喜繁會於自然窅窅彌章規規可則侔碧玉而增美寫朱繩而逾直方自理以心故必臻其極清音乍絶寧罔象而斯求雅韻載揚信希夷而自得則知歌之至計於不朽珠之狀符於妙有所以因彼洪纎形於善否視之不見識遺音之疾徐象在其中分陰魄於先後是故事之精者有以方諸導延促而麗矣引舒緩而直如聽其真疑自一觚之始舉其可方知三代之餘然則淡以成規端然如貫時發響於杳默每韜光於璀璨求乎寂寞豈殊無脛而臻散彼冥蒙匪同溢目之玩美其連綿中矩終始相符暢於心信精粗而自異端其本惟大小以無逾足以徵詞於師乙擅美於帛丿糸駒儻傾心而一聽殊有類於編珠圓月如霜有仙桂兮宛在中央映澄徹之素彩逗葳蕤之冷光杳杳低枝拂孤輪而挺秀依依密樹侵滿魄而含芳觀其皓爾方凝翛然不改隨升沉而自若貫盈闕而長在敻冪冪而臨空杳萋萋而發彩同蟾蜍之片影似濯瑤池異珊瑚之幽叢徒生滄海埃壒初歇關山正秋空泬寥而逾淨色冉弱而彌幽謂扇花薄如圭玷浮望玉露之初垂遙疑滴瀝聽金風之乍起遠若颼飀皎皎孤懸亭亭相向才分杳靄之質微辨輪囷之狀諒攀援而莫及寧欲淹留歎音塵之未期空勞曠望嘉其竦本無地分輝有餘轉低影於穹碧擢幽姿於皓初訝姮娥之繪成文逾靃靡竝秦鏡之照出勢自蕭疏斯所以亘雲路委天衢弱質中植纎條外扶亂彩時搖起飛飛之驚鵲澄波靡隔掩歷歷之高榆是故邈彼輕霄呈茲永夕紛敷遠瑩偃蹇旁射夾餘霞而暫丹經斜漢而彌白臨紫極而天香不散指北斗而仙花可摘况其遠象朣朧挂于冥空惜迢遞而遐想况嬋娟而內融素色不雕自挺雪霜之外清陰逈泛頻移霄漢之中何必詠招隱臥幽叢庶高枝兮可折願逍遙於蟾宮惟極天之樞惟星日之餘日散精而外布天樞要以高居的然守中昭上元之道著爛兮繁會助下濟以光舒况乎有條不紊既明且疏雖貫珠而奚擬縱編貝而豈如周流無窮隨五緯之軌道運行有度參兩曜之居諸疑徐而速若動而息不騫不崩匪差匪忒俱遞遷而序別各有位而分職瞻言粲粲何三五之在東嘒彼纍纍亦四七而朝北是知統太一而為衆處天心而稱極故能總懸象之綱作垂光之則不然何以探天之賾何以表天之闢必得一以含默乃聚黃以修繹明夫據會者靜而處輔相者動而順靜乃常德不離動惟適道無吝然後衆星熠熠外辨方而不迷一極煌煌中居所而作鎮是以仲尼譬為政之德羲和時敬授之信則天道恆象人事或遵北極足以比聖衆星足以喻臣惟臣不矜德合星之夕惕惟聖不伐道配極之日新故得肅清黃道利貞紫宸豈惟大邦是控臨朝御衆而已實將先天稽極後極立經仰觀其動靜旁暢其儀形然後為政同乎北極來方類乎衆星斯乃先哲之臣是崇是奉臯陶所以邁德虞舜所以垂拱不然彼衆星之環北又奚足以為重寶濟南鄒縣人元和時官太常博士元和壬辰歲詔加邊將之封酬屯戌之績朔方之別帥天水閻者有司建苴茅之邑於太原列郡焉主者既行其制閻子上言曰特蒙渙汗恩沾爵土乃九族之榮也而封乖本郡恐非舊典翼日上謂相國趙公有司之誤不可再也宜召通儒碩士辨卿大夫之族姓者綜修姓纂署之省閣始使條其原系考其郡望子孫職位並宜總緝每加爵邑則令閲視庶無遺謬者矣寶末學淺識首膺相府之命因案據經籍窮究舊史諸家圖牒無不參詳凡二十旬纂成十卷自皇族之外各依四聲韻類集每韻之內則以大姓為首焉宏真元和中進士隙有塵兮則惟其常日緣隙兮亦孔之彰何在陰而滅彩能委質以和光藹若成規任隙中之小大紛然無緒隨日際以悠揚觀夫熠熠孤光霏霏素質盡方圓之所至滿虛明而不溢不灑不掃宜靜以探微或欨或吹則動而逾密何冪䍥以可久混空濛而為一一點凝輝異出同歸豈開簾而霰入疑向牖之蟲飛其虛其徐有若無兮漠漠不皎不昧散而聚兮微微既不足以凝榭又何虞於化衣想夫向晦長存匪陽不見的爾東去忽焉西轉嗟柳絮之從風訝雪花之見晛翔而不息安即為難挂高棟而將晚留空隅而助寒疑琢玉成環環中屑墜若窺壺入洞洞裏雲殘美纎姿而無隱雖小道而可觀原夫自託於空而隙能善誘無求於日而隙以虛受察之眴精攬之盈手同白駒之滅沒非野馬之紛蹂遠窺濁水斯自異於浮沉仰觀歌梁必坐分於妍不美其含華有耀委照無違想剝廬之斯衆知舊館之猶稀安寢之堂就餘光而若在偷光之壁尋微燭以相依何異暗室無欺明誠未達伊弱質之隱見在無私之與奪儻高鑒以吹噓願飛翔於天末禽之鷙者鶚兮挺生不翩翻以㣥萃自耿介以孤貞羽族之中雖彼衆而我寡雲路之上如特立而獨行固將殺敵無匹擊鮮莫京豈惟拂之於平野玩之於太清哉卓彼雄姿凜乎壯觀或危石以礪吻或高柯而整翰搏鳩之隼不敢飛揚逐燕之鸇望而伏竄及夫當殺節乘徑秋雙眸電擊六翮雲浮仰之彌高方一舉而千里翔而後集恥乘居而匹遊既而變金風驚商律不類聚以頡頑自孤飛而厲疾介然直下固不可以同㣥邈矣獨翔諒有殊於喪匹摩碧落而上騰與紫氣而相淩自樂其絶侶無求於得朋鷹揚者仰之而不逮鵰悍者攀之而不能莽蒼天高悠揚日厲自暇自逸倏來倏逝何剛者而不懼何勍者而不制風毛雨血在嫉惡而無遺草伏木棲咸畏威而若厲明心不測利用則殊以少為貴匪繁有徒想像乎八紘之間視遠如邇隱映乎九霄之際出有入無諒搏擊而不競豈搜狩而弗圖是知禽之凡者雖纍百而何補士之傑者將無雙而必取亦猶務利觜刷迅羽雖多亦奚以為固非一鶚之為伍儒有貧居在陰志學無必思照字之物類得聚螢於心術散點熠熠文彩之旁流開卷熒熒古今之洞出曈曨隱映積小而成臨竹簡而增美歷銀鉤而轉明讀周室之書每見日中之字覽龎涓之傳猶疑火照其營既有求於時習奚勿用而宵行想夫交錯積中英華發外魚鳥飛動鉛黃暗靄無心於處暗彌見精專取足於臨文豈勞光大炫晃無窮心勤飭躬泛凝暉於垂露翻碎影於雕蟲筆精之體無隱藻思之文有融既的皪於六身之上復浸淫於三豕之中則知雅善後宜功能自勵時當炎燠嗟映雪而未期義涉穿窬忌偷光之失計是用聿求昭質承乏華燈每揚之自此知照况燭之因以輝宏斯作者所以警清士而體物俾無忘其所能善乎養由之為弓也挾穿揚之技推貫金之誠左烏號兮右青莖睨七屬之甲收百中之名神馳手敏體正心平始則一以貫之將疊雙不息終則迭於徑也俾合七而成穎脫洞達鱗差混并旁穿而雀角非徑深入而虻飛有聲觀夫蹲蛟函彀象弭量步遠邇回眸徙倚指鏘鏘之練取中於茲狀纍纍之珠其端若彼驀六以進吾無間然吞八之名我異於是是知弦木之用貫革為先出一札而鋒鋩自利踰百步而犀兕無全虛其中螳螂之衛徒設稽其數混沌之竅齊穿豈徒激白羽開月弦俾晉侯之禽自失漢將之石彌堅且櫜鞬既啓美六材之定體決拾將臨矜一發於巧心是誇妙捷豈憚重深疑疊翮之摧頽猶驚飲羽類縫裳之襞積尚謂紉針夫弓以矢而徑其徹得矢之正故將笑函人之仁掩矍相之盛俾帶甲之士知皮之不存在引弓之人則心莫能競故稱矢無虛發藝得專場考窮深之宜我將用直探破堅之理爾則乘剛方今寰海鏡清皇明朗徹澤宮是選貍首為節望正鵠以進旅奉弧矢之成列然後徹札之人庶驗其工拙溜可穿石柔能陷堅因依而上下相遇悠久而貞剛失全始則泠泠觸浤澄而或躍既而決決窅洞達而旁穿一道中透孤光下懸何載馳之不息終漸靡之使然觀夫習坎能通柔虛洊至虹挂空而飲井星曳練而投地徵老之說柔弱勝於剛強驗夫子之文積善由乎馴致當其涓涓無已皓皓未通若嶄巖之見拒能激射以相攻既潄蕩以探奧遂深沉而鑿空下潄花浮似出桃源之外乘流魚躍如辭丙穴之中言念其美因詳所以石雖堅而有崖溜雖柔而不止進寸退尺常一以貫之日往月來則就其深矣克諧潤下之道實契靈長之理想夫經始之時人莫知之笑我者謂量力而徒爾見機者料成功之遠而既知難而不退長引彼而注茲是能卒獲其求何傷守柔細滴瀝以成響大逶迤而若抽在彼一拳同玉巵之無當經乎五色狀銀漢之分流其空可玩其義可稟庶求福之不回思進身而去甚彼以水投石吁嗟莫承摧鋒飲羽誰謂難能曷若挫鋭而功著積微而道宏妙哉斯賦之旨惟執柔而有恆昔燕王好奇術客嘗巧剡棘刺之微物成沐猴而不撓毫末之細雕鎪既施睢盱之狀委曲無遺當晏陰之靜景辨騰捷之幽姿其始未覯如將受欺虛無之中既焦心於觀者杪末之上宛成形以究之實兮若虛的爾才見霏微而草上霑露冪䍥而條端集霰閃孤光而乍分拂輕靄而將眩觀夫至精惟一至小無朋豈側陋之於用在良工之所能不食而安終有殊於狙怒窮高是處亦何異於猱升原夫作者經之其勤至矣積冲妙於靈府假鋒鋩於纎指蓋以神遇寧將目視因乎有用之質造彼無間之理何剞劂之一變若儇佻之儀止伊竹間之猿父大小相殊想木杪之獑猢憑依酷似若乃徵物類較能不貫蝨心者未喻其精微巢蚊睫者自然之妙有庸知造物之意暫假斯人之手披左生之賦方此由心驗韓子之書誡其騰口事遠前古名聞至今雖幽通之不測終髣佛而難尋然因棘為猴固成其麼質乃觀猴在棘無異於喬林蓋同符於神化而中出於人心斯語可徵妙能曲盡儻雕蟲之不棄希定價於平準月滿於東桂芳其中因澄輝之皎潔見幽茂之玲瓏絢凝冷於清夜寫濃纎於碧空遠莫致之詎攀折以盈手光可鑒也覺清明之在躬夫擢本陰靈流形永夕稟玉燭之和氣潤金波之滋液枝徘徊而若垂葉靃靡以如積同作績於團扇想孚尹於尺璧悠悠歷歷宜乎凜秋滿虛輪而挺秀瑩白暈以含幽天邊無風孕香氣而不散草上有露泛花光而若浮異夫高謝地靈妙融真宰籠元兔以不動映素娥而如在太陽讓美收若木之餘暉列宿懷慙掩白榆而沈彩既寒暑無變亦古今不殊是知託其所終乃異顛而不扶二氣初分誰見栽生之質三光不息斯無朽蠹之虞與然薪之殊患同瑞草之共舒事相傳於托實勢終類於憑虛樓上含華映網軒而列耀園中委照益嘉木之蕭疏千里共瞻九霄之上春冬無清淨之景朒朓闕婆娑之狀及素秋之節信謂逢時當明德之年何憂掩望恥片玉以齊價笑三珠之可尚彼叢生因地森挺淩霜驗植物之斯美杳神功之可量垂蔭何方乃傳天之下界結根何處宛在月之中央又安能較其小大齊其短長冀一枝兮可得敢驤首以觀光冽元和六年進士人立性兮誠明為本水激湍兮動直惟柔將以遊心於淡故其從善如流天理斯在坎德可求謂置懷而必將流惡同赴勢而咸得處休至人之情惟當浩浩君子之道所以猶猶原夫性本皆善誘成遷化湍有常行決而上下得其道則致和平汨其流遂成姦詐故聖人行當順動義不詭隨欲淹淹而處下逾潔將渺渺而致遠不疲順意周流誠隨波而遷染由衷激發庶合道以云為託以洗心從之潔已尊泒別脈分之要道守滌瑕蕩穢之至理符老君之立教心乃善泉同太史之奏言德方在水勢雖相近意當一揆法潤下流謙之迹莫非有為為之愛漂沙宕石之功是皆景行行止心源洞達德澤潛敷在審思其決泄豈求潤於霑濡遠近相沿宛見為仁由已始終共濟足見循道而趨不然則喪其真失其正動必旁午志皆紛競安能使通達為無滯之姿稟受成善利之性德如毛而轉潤行有葉而逾滋心鏡之前若光明而上下察也情田之內同淡泊而左右流之懿其義戒中人事標前典是明各有原本不可遷移豈徒虛閲波瀾以方清淺若然者信乎孟子之言所謂懲惡而勸善冠表朝容飾崇工製示徑悍而貂文既緝彰清高而蟬翼斯綴所以發宰臣之盛改武辨之弊配紫綬而增華入黃樞而轉麗突而將戴翹然可觀揉輕毛而絲絡鬬微殼而花攢引雜錯之光足見乎以文為貴分動搖之影誠誡夫居危如安麗則無挂新而莫彈彩列如星衛文何榮於會辨用當謁帝齊相堪嗤於濯冠所以類鼠咸收如螳必取示威無假於鶡戴呈巧豈矜於鷸聚影麗華簪光聯垂組乍臨天陛澤鮮而日照如濡時受王言質薄而風搖自舞鄙舊規於却敵笑遠適於章甫貂之貴誰憂換酒於晉臣蟬之清是用加金於漢主故能堅逾鐵柱妙奪玉纓非不足之時狗尾何續從有緌而用蜩甲如生柔而輔曲潔以從輕灼灼而自為首飾炯炯而能使心清至矣哉蟬者食潔居高貂者內溫外悍盡飾斯在齊光不散發令姿於綴者王何以尊藉舊葉而珥焉金張益煥將進賢而並美與交讓以相資承柱後之名是表禮無違者冠侍中之首欲使人皆見之道光漢冊事合秦賜冠乎斯用之以明義
