front:
  text: 全唐文欽定全唐文卷六百九十四元裕字景圭渤陽人始名允中大和中改今名第進士元和中纍擢尚書左丞出為宣歙觀察使入授吏部尚書拜山南東道節度使封渤海郡公卒年七十六贈尚書右僕射
  hash: sha256:87e7339d4a5a50859280f74397c4bf6f34e9b6b499ec85c218967f6e7276929c
  markers:
  - {type: head, offset: 14, content: 高元裕, id: KR4h0168_NFKB_694-h1, level: 1}
body:
  text: 伏以天下三司監院官帶御史者從前謂之外臺得以察訪所在風俗按舉不法元和四年御史中丞李夷簡亦曾奏知監院官多是臺中寮屬伏請委以各訪察本道使司及州縣有違格敕不公等事罕能遵行歲月既久事須振起伏請自今以後三司知監院官帶御史者並屬臺司凡有紀綱公事得以指使伏以神策軍所推妖囚訪聞其徒結黨聚衆恣為凶狡合就嚴刑臣亦料軍中推窮必得情實然獄宜公共刑貴正名今刑部大理皆是陛下掌獄之官都不關知便成其獄三尺之法無所憑依伏乞以元惡三人付大理寺重加覆問若無異同便正刑書則凡在中外皆知事歸有司不廢彞典彰陛下慎刑之意快兆人共棄之心臣忝風憲得議刑政事關國體不敢不論夷簡字易之鄭惠王元懿四世孫以宗室子始補鄭丞棄官去擢進士中拔萃科元和時檢校禮部尚書山南東道節度使徙帥劍南西川貞元十三年召為御史大夫進門下侍郎同中書門下平章事出為淮南節度使進太子少師分司東都卒年六十七贈太子太保應給食實封官自貞元十三年已後節度使兼宰相每百戶給八百端匹若是絹更給綿六百兩節度使不兼宰相每百戶給四百端匹軍使及金吾諸衛諸軍大將軍每百戶給三百五十端匹至貞元二十一年七月六日敕應食實封其節度使宜令百戶給八百端匹若是絹兼綿六百兩伏以食封本因賞功封之多少視功之厚薄不以官位散要別制等差其節度使兼宰相請準舊例餘節度不兼宰相準貞元二十年已前例處分紳字公垂潤州無錫人元和初進士穆宗朝拜戶部侍郎開成時為宣武節度使武宗立徙淮南入為兵部侍郎同平章事轉中書侍郎守右僕射門下侍郎封趙國公出為淮南節度使會昌六年卒贈太尉諡文肅松之生也於巖之側流俗不顧匠人未識無地勢以衒容有天機而作色徒觀其貞枝肅矗直幹芊眠倚層巒則捎雲蔽景據幽澗則蓄霧藏煙穹石盤薄而埋根凡經幾載古藤聯緣而抱節莫記何年於是白露零涼風至林野慘栗山原愁悴彼衆盡於元黃斯獨茂於蒼翠然後知落落高徑亭亭孤絶其為質也不易葉而改柯其為心也甘冒霜而停雪叶幽人之雅趣明君子之奇節若乃確乎不拔物莫與隆陰陽不能變其性雨露所以資其豐擢影後凋一千年而作蓋流形入夢十八載而為公不學春開之桃李秋落之梧桐亂曰負棟梁兮時不知冒霜雪兮空自奇諒可用而不用固斯焉而取斯歌者達其志曲者導其情方假象以微妙將類珠而取明於以遂條暢於以考清貞揚穆穆之音端而陳德審纍纍之節貫以成聲且夫發深誠表和氣惟中規之可法諒徑寸而同貴儼然在上初宛轉以凝旒肅若飄空想熒煌而動緯惟乙所傳宜商有焉溫良則無類於曲含暢則有取於圓雅調相依而瀝瀝清音迭奏而綿綿乍起黃鐘疑蚌開而色爛將吟緑水如浦沉而影連美乎回若循環疏非掩抑聲既發而明朗珠既貫而絃直九功是闡同在握以騰光三歎屢聞非暗投而改色其曲彌清其音彌久馳熠熠以交映度連連而相受出乎口吻元珠莫覩於可聞入彼虛無象罔雖求而何有故能直已中奮和心外舒咄長言而皎矣務妙轉以繩如聆湛露之終光懸瑞景體橫汾之末目駐神居斯可以正煩濁別流玩陽春續響於孤絶白雪連耀於璀璨雖聞唱以殊聲終合音於共貫是知大雅含象清明式符曲折而必遵於道周圓而可法於珠俾將繼聲者識乎有曲審音者知我無渝門下王者統馭萬宇緝熙庶政必有文武全器柱石之臣出壯藩嶽入和台鼎使其效彰中外聲播華夷所居而人心自寧所蒞而軍令自肅克是任者其惟至公開府儀同三司守司徒兼中書令上柱國許國公食邑三千戶韓宏受天地凝粹之氣得山川崇深之靈厚其體而莊其容虛其心而宏其量早洞戎韜之略久膺節制之權隱然大梁克有成績及功宣蕩寇志展勤王懇申戀闕之誠竟遂來朝之禮位高百辟榮冠一時恩極而愈恭名光而益勵朕方欲樹以垣翰仗乎忠賢乃眷關河之首實惟股肱之郡自昔重寄無非元勳是用命以上公復茲雄鎮於戲頃居東夏父子偕分閫之榮今處近郊伯仲並登壇之貴道苟積於忠實顧何愛於寵章往惟欽哉副我明命可守司徒兼中書令河中尹充河中晉絳慈隰等州節度觀察處置等使散官勳封如故主者施行據六典隋置諫議大夫七人從四品上大歷二年升門下侍郎為正三品兩省遂闕四品建官之道有所未周詩云衮職有闕仲山甫補之周漢大臣願入禁闥補過拾遺張衡為侍郎為居帷幄從容諷諫此皆大臣之任故其秩峻其任重則敬其言而行其道况謇諤之地宜老成之人秩未優崇則難用耆德其諫議大夫望依隋氏舊制升為從四品分為左右以備兩省四品之闕向後與丞郎出入迭用以重其選又御史中丞為大夫之二緣大夫秩崇官不常置中丞為憲臺之長今寺監少卿少監司業少尹並為寺署之二皆為四品中丞官名至重見秩未崇望升為從四品南宮六曹皆有職分各責官業即事不因循近者戶部度支多是諸軍奏請本司郎吏束手間居今後請祇令本行分判委中書門下擇公幹才器相當者轉授四征不庭錢穀是貴百王所切刑法其難將哀挽粟之勞同舉赭衣之論顧茲建議惟彼獻書職勞不來既有東人之歎惟命難繼永瞻緹縈之感豈擢髮之未允何次骨之攸聞澶漫渭川曾莫顧其千畝刻深秦法且不愧於多端應緣兵未解鞍衣迷襏襫人猶拔劍法異墨幪計必平均不應瘠魯肥杞令資禁止何必噬膚刖足况國家儉嗇寡欲好生惡死永懷其禍每捐無益之功尚愧論兵豈命有司之殺職由是舉合量出入德用不擾當測淺深減功恤勞既令戎祀能紀揆今酌古必使憲章不墜三輔長吏不牽復於所司千代宏綱兼行之於聖日追昔遊蓋歎逝感時發於悽恨而作也或長句或五言或雜言或歌或樂府齊梁不一其詞乃由牽思所屬耳起梁溪歸諫署升翰苑承恩遇歌帝京風物遭讒邪播歷荊楚涉湘沅踰嶺嶠荒陬止高安移九江泛五湖過鍾陵泝荊江守滁陽轉壽春改賓客留洛陽廉會稽過梅里遭讒者再賓客為分務歸東周擢川守鎮大梁詞有所懷興生於怨故或隱顯不常其言冀知者於異時而已開成戊午歲秋八月如來以萬門萬行普示㣥生隨其性根用假方便水月觀象萬泉俱鑑識真如者知非在水慧燈傳照百千同朗識佛智者知燈在覺是以如來開三乘諭演菩提旨傳十二輪度生死海是經之要妙諸佛之心印卷舒萬法彰示凡聖信解得入入為真諦無我無我無為無為無生無生無滅無滅諸佛如來不以寂滅自樂無生自處故現生滅以示㣥迷入煩惱中解衆生縳入有相中示衆生滅是以諸佛如來以一切衆生煩惱苦海無明罪垢為解脫方便故經有火宅窮子以宏法諭有衆生有煩惱離煩惱即諸佛有煩惱即衆生煩惱蓋廠田坴不知明覺如寐如病佛為解寐療病衆生昏業不能解釋故如來廣清淨教開是經典用曉迷愚以示方便聞是經者發菩提心持是經者入如來智一禮一敬皆資勝因刻於貞石瞻仰常覩表佛慈旨無言現言刊諸蓮宮永乘福慧太和六年歲在壬子七月既望缺之二日書濠城之西北隅爽聳四達縱目周視回環者可數百里而遠盡彼目力四封不閲嘗為廢墉無所佇望郡守彭城劉君字嗣之理郡之二載步履所及悅而創亭焉豐約廣袤稱其所便棟幹梯陛依墉以成崇不危麗不侈可以列賓筵可以施管磬雲山左右長淮縈帶下繞清濠旁闞城邑四封五通皆可洞然太和七年春二月紳分命東洛路出於濠始登斯亭周目四矚美乎哉春臺視和氣夏日居高明秋以閲農功冬以觀肅成蓋君子布和求瘼之誠志豈徒縱目於白雪望雲於黃鶴庾樓夕月峴首春風蓋一時之勝爽無四者之眺臨斯亭之佳景固難儔儷哉淮柳初變濠泉始清山凝遠嵐霞散餘綺顧余嘗為玉堂詞臣筆硯猶在請書亭表事刻石記言癸丑歲建卯月七日趙郡李紳書自造父劉纍歿豢氏不副龍不復擾隱去莫狎往時見史必書志代以目識者寡之故工得以詭亂形狀神其變化彪炳五色逾遠真像蓋上飛於天晦隔層雲下歸於泉深入無底考之丹青難以徵驗好事者張其畫以示㣥目觀者或駭疑得其狀長洲令廳北廡有畫蛟龍六焉元素異鱗狀殊質怪驤首拖尾似隨風雷乘櫨薄楣若軼雲雨燕雀懼棲其上螻蟻罔緣其側目視光射瑩無流塵伸盤逶迤如護榱棟每飛雨度牖疏雲殷空鱗鮮耀陰顧壁疑拔志其側曰僧繇弗興之舊度模之不知何人也二工圖龍天與幽思今是壁指遠異代繼之圖法無謝於二子而名漏不傳詢於耆人亦絶傳記茂宰博陵崔君據始命余述舉丹素實驗附邑書末簡庶乎後數百年棟宇斯變龍亡其像而事刻編簡繇昭昭然時貞元癸未歲秋七月記會稽地濱滄海西控長江自大禹疏鑿了溪人方宅土而南巖海迹高下猶存則司其水旱洪為雲雨乃神龍之鄉為福之所寺曰龍宮在剡之界靈芝鄉嵊亭里地形爽塏林嶺依抱剎宇頽毀積有年所自創置基三徙而安此地像儀消化鐘磬不揚堵波已傾法輪莫轉老釋修真持誡茲寺護念常啓願興伽藍而歲月屢遷物力無及貞元十八年余以進士客於江浙時適天台與修真會於剡之陽師言老禪有念今茲果矣後當領鎮此道幸願建龍宮以資福履余以為孟浪之詞笑而不答師曰星歲有期愚有冥告臮元和三年余罷金陵從事河東薛公平招遊鏡中師已臥病而約言無易太和癸丑歲余自分命洛陽承詔以檢校左騎省廉察於茲歲逾再紀而修真已為異物龍宮棟宇將盡命告墳塔因追昔言遂以頭陀僧會真部領工人將以蕆事余以俸錢三百貫闕二字監軍使毛公承泰亦施焉以月俸俾從事僚吏咸同勝因閭里慕仁風靡爭施子來之功力雲集清涼之蓮宇鬱興浹旬而垣墉四周逾月而棟幹連合煥矣真界昭乎化城擇靜行僧居之以總寺事因具香饌告誠法王上以資我后無疆之祚次以資神龍水府之福以名寺之功力為祐靈之顯報一雨之施潤洽必同佛言龍王心力所致七郡山澤城邑萬人介福所安翳我龍德是用回此法力永資泉宮僧齋護念常為仰答余固不敢以修真之言自伐俾竭誠以為人刻石記言於寺之剎銘曰滄海之隅會稽巨澤惟禹功力生人始藉土壤山嶴濱海之東溟漲空闊邈祕龍宮貝闕難知珠宮莫測雲雨交昏深沉不隔聞法必聽依佛必降豈騰溟海亦化長江既資勝因為龍景福節宣風雨以成播育撞鐘以告三界必聞惟爾龍室昭昭不昏我昔麻衣有僧傳言斯人已亡斯言不泯敬報前志以垂後功建飾儀相昭明有融普利㣥生罔資已力琢磨記言垂示無斁賢劫千佛生於後世法輪遞轉應現隨相或國王大臣宰官居士降生有地不以色相故如來言以色見我以音聲求我為行邪道不以金色瑞相蓮花化生降胎示報以潛靈聖上人姓唐氏生於邑之安吉母梅氏奇孕而夢協靈祥在娠而不茹葷血既生能言不為戲弄未齔之歲思求佛乘發念法華三月通貫傳梵音於性稟精護念於神契經聲一發而頑鄙革心晝集夜持而七部圓滿音聲從容指顧間雅雖捷口利辨者皆隨慕念及登戒之歲僧儀首冠西遊長安祥風達於函關瑞相通於帝夢上人以持經為國詣闕請見肅宗皇帝召對禁中上拱而歎曰昔夢吳僧口念大乘五光隨發音容宛若協我嘉徵因賜名曰大光以瑞唐姓肅宗元年降誕之辰會齋於定國寺因賜上人墨詔許以天下名寺持意往者住持令內臣趙思溫送於千佛寺持經道場經四七日而吳音清亮常達聖聽上異其事令高力士以宣諭焉後居藍田精舍先期而寺僧夢天童來降稱曰大光經聲達於峯頂師既晏坐自見神手從天而降拊光之心師乃憶先達抱玉大師常志師言令高法音當有神輔夕夢神僧乳見於心命光口飲自是功力顯揚神形不勞尋山探幽偶墜窮谷龍泉莫測淪溺其間心靈了然無所惑亂因以本經多寶塔為誠願持十萬遍恍然出泉若有神捧後詔住資聖寺大師以慈親在吳未答慈力表乞歸養恩未許還猶繫煩惱之念遂生無妄之疾策蹇強力將投於泉驢伏不前㣥烏拂頂心既時覺疾乃遂瘳昔如來雙鵲巢頂而定慧堅明大師㣥烏摩首而煩疑解脫乃以寶軸加飾首戴法華於千福寺行道日夜候命有詔許還遂止烏程崇修寶塔日持法華偈以成往願焉永泰元年浙西廉察使韋元輔表大師為六郡別駕道場將念之首大歷癸丑歲文忠公顏真卿領郡余先人主邑烏程余生未期歲乳病暴作不啼不覽者七辰師至命乳母洗滌焚香乃朗念法華至功德品遂起席而坐拱而開目師飲以杯水遂命乳哺疾乃隨愈大師視而笑曰汝何願返之速乎因以法師易余幼名貞元中余甫弱冠再遊霅上舟泊之次大師佇於溪側而笑戲拊如兒童焉余為州將飲醉於館大師引宿於道場夜分將醒白光滿室朗然如晝覩大師晏坐妙音方闡若開毫相經音既息光亦隨斂余是年西邁辭大師於法筵撫余頂曰爾得徑山之言我則無以為諭行矣自愛去留有時空王教平等者護念大師於永貞元年十二月黑月既夕示滅於法華寺之經院獸號鳥墜山木驚振異香飄馥三日不息是日告刺史顏防善曰去矣人世無牽夢泡大師熙和暢達無入不得隨機見教經行無閡維摩詰之儔也知機洞如藏往察來默而不顯晉寶公之倫也經通梵界瑞降天童靈相神光照融顯見曇上人之徒也大哉明德慈悲護世通異相於王宮示法輪之寶重昏外識於黎庶懼色相之迷妄是以居若長橋動如浮雲隨鷗自親入獸不亂一衲四十歲無浣濯而居常香馥一飯七十載資禪悅而膚體溫然余遭大師留駐於世而不覩大師寂滅之日年逾耳順昏寄塵勞無法舸以濟河悲火宅之迷室忝門徒者追書梵宮時豫烏臺舊僚天官郎敬君守郡吳興寄言刊石銘曰多寶如來聞經誦塔牟尼闡教以宏正法受持三世以成賢劫或降忉利或生人天金相不顯真如默傳明燈繼焰水月分圓示抱全德資於上賢體實戒珠心惟法鏡懷寶不迷含光不競希夷要妙法凝清淨發諭開蒙藏機匿聖瑞協皇夢功致天童聲宣梵界響達宸聰降靈神手捧溺龍宮迹隱三昧心符六通金粟分身普賢馳象譬喻言辭光明顯相仁滋一雨功歸無量法性天高慈門海曠我昔嬰兒迷蒙疾痼靡日沉魄返年師駐梵音耳聽神光目覩白馬先鑣迷津莫遡鼓音已息慈雲不浮寶樹摧華祥泉涸流稠林喪斧苦海沉舟色相歸空法身無際莫測往來誰分顯晦三表闡仁深乎晏諦敦實憲宗朝為沂亠兊觀察副使時觀察使王遂以慘刻臨下裨校王辨因衆怒為亂敦實及於難積薪如之何伐自中野藏用如之何俟夫爨者當就燥而未及固不材而見捨我盈彼竭在浸浸以增高顛之倒之信多多而益寡來因高岡之上徙殊曲突之下知附熱之足貪兼微光而是假原乎瞻彼林薄爰發條枚綢繆既束負荷皆來始交積以發地俄重而如堆顧遇何期亦有含音之器操持儻用豈無束濕之才匪伐柯於林下疑設燎於庭隈入用雖慚於散木待燃未怯於死灰幸薰灼之可近惟掄擇之所裁必能揚大君之光資烹飪以調味豈徒發太守之化祈澍雨以禳災觀其迹連牆攢形內向功成執熱化歸炎上催發生於庖人廢全模於梓匠曾不知從橫長短之術成結搆高卑之狀犬牙交列未失本枝之形蠅翼巧成猶蓄運斤之望豈徒分強幹弱枝之義留錯節盤根之餘異掄材而晉用似橧巢而夏居幸爝火未熄與獸炭焚如無之實難鑽燧者於茲待乏雖欲勿用和羹者焉能捨諸古人懲用賢之乖喻積薪為偶奚自我而爭先反忽焉而在後念採掇之所在顧高下而何有倘堅貞之可求庶有心而不朽冠卿字子軍青陽人元和二年進士母喪廬墓隱居九華少微峯長慶三年御史李仁修舉孝節召拜右拾遺辭不受九華山古號九子山崛起大江之東揖廬於西岸儼削成於天外旁臨千餘里高峯峻嶺臣焉連岡走隴子焉自元氣凝結幾萬斯年六朝建都此為關輔人視山而天長山閲人而波逝其間聖后賢臣歌詠興言不及者茲山屈焉開元未有僧檀號張姓自㣥舒至為鄉老胡彥請住廣度男女時豪所嫉長吏不明焚其居而廢之時有僧地藏則新羅王子金氏近屬項聳奇骨軀長七尺而力倍百夫嘗曰六籍寰中三清術內惟第一義與方寸合落髮涉海捨舟而徒睹茲山於雲端自千里而徑進披榛援藟跨峰越壑得谷中之地面陽而寬平其土黑壤其泉滑甘巖棲澗汲以示高潔曾遇毒螫端坐無念有美婦人作禮奉藥云小兒無知願出泉補過應視坐石石間潗孴時人謂九子神焉素願寫四部經遂下山至南陵有俞蕩等寫獻焉自此歸山迹絶人里逮至德初有諸葛節等自麓登峰山深無人雲日雖鮮明居惟一僧閉目石室其旁折足鼎中惟白土少米烹而食之㣥老投地號泣和尚苦行若此某等深過已出泉布買檀公舊地敢冒死請大師從之近山之人聞者四集伐木築室煥乎禪居有上首僧勝諭等同建臺殿楩柟豫章土地生焉斷而斫之碔玞琪瓊不求他山肆其磨礱開鑿溪澗盡成稻田相水攸瀦為放生池乃當殿設釋迦文像左右備飾次立朱臺挂蒲牢於其中立樓門以冠其寺丹素交彩層層倚空巖巒隊起於前面松檜陳橫於後嶺日月晦明以增其色雲霞聚散而變其狀松聲猿嘯相與斷續都非人間也建中初張公嚴典是邦仰師高風施捨甚厚因移舊額奏置寺焉本州牧賢者到寺嚴師之敬江西估客於雲外見山施帛若干匹錢若干緍焚香作禮遙以祈祐師廣德焉况親承善誘感悟深哉旁邑豪右一瞻一禮必獻桑土豈諸牧不合禮焉富商大族輕其産哉道德感也本國聞之相與渡海其徒實衆師憂無糧發石得土其色青白不墋如麵夏則食兼土冬則衣半火無少長畬田採薪自給中歲領一從者居於南臺自緝麻衣其重兼鈞堂中榻上惟此而已池邊建臺厝四部經終日焚香獨味深旨時年九十九貞元十年夏忽召衆告別罔知攸適但聞山鳴石隕感動無情與將滅有尼侍者來未及語寺中扣鐘無聲墮地尼來入室堂椽三壞吾師其神歟趺坐函中經三周星開將入塔顏狀亦如活時舁動骨節若撼金鎖經云菩薩鈎鎖百骸鳴矣基塔之地發光如火其圓光與佛廟㣥材締構衆力保護施一金錢報一重果下為輪王上登聖地昔有護法良吏洎施一僧檀越等具刻銘於石士疾歿代不能立殊績以濟衆又不能破餘財崇勝因緣啄腥羶顧兒婦生為人非死為鬼責悲哉時元和癸巳歲余間居山下幼所聞見謹而録之孟秋十五日記承宗成德軍節度使贈司徒士真子也士真卒嗣領節度吳元濟反承宗上書請宥又遣盜殺宰相武元衡數出兵掠鄰鄙詔削官爵吳元濟誅承宗懼求入侍恩許自新復官爵元和十五年死贈侍中臣頃在苫廬綿歷時序恭守朝旨罔敢闕違復奉詔書令獻州郡迫以三軍之勢不從孤臣之心今天兵四臨王命久絶白刃之下難避國刑殷憂之中轉積釁隙中由盧從史首為亂階興天下之兵生海內之亂既不忠於國又不孝於家當其聞父之喪已變為臣之節迫脅天使瀆紊朝經而乃幸臣居喪敗臣求利上敢欺於聖主下不顧其死親矯情徒見於封章邪妄素萌於胸臆今搆禍者已就擒獲抱寃者實冀辨明况臣之一軍素守忠義橫被從史離間君臣哀號轅門痛隔中外伏冀陛下以天地之德容納為心宏好生之仁許自新之路順陽和而布澤因雷雨以覃恩追念祖父之前勞俯觀臣子之來效特開湯網使樂堯年
