front:
  text: 全唐文欽定全唐文卷五百十長源字泳之吳人歷汝州剌史貞元十二年檢校禮部尚書為宣武軍行軍司馬以峻法繩下節度使董晉卒長源知留後為兵士所殺贈尚書左僕射
  hash: sha256:f14526d5228905218dd1c6557571e129b988fc6af83b28d9b00e788c2f470537
  markers:
  - {type: head, offset: 12, content: 陸長源, id: KR4h0168_NFKB_510-h1, level: 1}
body:
  text: 且口説如來之教在處貪財身著無垢之衣終朝食肉苦行未同迦葉自謂頭陀神通何有淨名入諸淫舍犯爾嚴戒黷我明刑本是樵童牧豎偶然戴幘依師不遊元牝之門莫鑒丹田之義早聞僭犯苟乃包容作孽既多為弊斯久常住錢穀惟貯私家三盞香燈不修數夕至於婢僕遍結親情良賤不分兒女盈室行齊犬馬義悖清廉恣伊非類之徒負我無為之教貸其死狀尚任生全量決二十便勒出院別召精潔玉守務在焚修月日太中大夫守汝州刺史兼御史中丞本州防禦使陸長源謹奉書相國閣下相公以命世之略應佐時之器發文苑之鴻猷繼台庭之盛業聖上傾心以待相公之啓沃天下側耳以待相公之政理豈得與房杜異日而不與蘇宋同年哉某比在朝廷接君子之步武聽哲人之語言區區之誠願盡於此今上聰明英武自漢魏以來賢君哲后未有如今上者自臨極以來宰相未有如房杜蘇宋者何偶聖之有期而得賢之無路蓋有以也夫誡人之失亦由端其躬而後求影之直故宰相者導生人之本稽政化之源正辭以固之平氣以待之物有其官官得其人則提綱而網目張振領而毛裘舉至如移制度平軍國事關社稷者斯在宸衷猶望宰相自古況今獻可替否其餘朝廷之常典㣥司之闕務弛張由於下筆指顧在於一言使政歸常典理革前弊和氣浹於下清風穆於上自然宰輔之事行弻諧之義暢何必捨其易而攻其難犯龍鱗之不測蹈虎尾而莫顧哉其宰相之寄也在於用賢賢不濫而人自理次於秉政政不撓而國自安用賢者除改是也秉政者賞罰是也其用賢也絶黨與捨憎嫌使韋弦各施輪轅適用頃者之用人也聲利以撓其心愛惡而昏其識以枉為直破觚為圓除改出於門庭賞罰隨其情欲求道行事舉其可得乎且尚書六司天下之理本兵部無戎帳戶部無版圖虞水不管山川金倉不司錢穀光祿不供酒衛尉不供幕祕書不校勘著作不修撰官曹虛設祿俸枉請計考者假而為資養聲者籍而為地一隅如是諸司悉然欲求網目張裘毛舉其可得乎此宰相之職也且棟傾者正之則屋無壓焉之懼疾甚者攻之則人無祲沴之患正傾在於良匠攻疾在於良醫故政化失諫臣得抗疏以論之敗纍興憲官得持法而繩之諫臣須謇謇匪躬之士憲官須孜孜嫉惡之人今悉求溫潤美秀沈默宏寬者為之蓋北轅適楚圓鑿方枘欲求扶傾愈疾其可得乎貞元初兵戈初解蝗旱為災邑多逃亡人士殍餒至使官廚有闕國用增艱王制曰國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子之食日舉以樂今歲豐年稔穀賤傷農誠宜出價以斂糴實太倉之儲豈可慢易於豐賤之日危急於凶荒之際比年國家和糴殆不得人文帳空存倉廩不實是由賞罰之典曠姦濫之吏生此亦宰相擇人之過也某之州戶口減一萬兵數無二千夏率供秋秋率供夏儻四氣或爽一歲無年實恐投姦有虞為纍非淺况率土州縣其事略同古人云旱則資舟雖在豐稔之時須為凶險之備此亦宰相之職也蝗旱之時聖上憂畿縣凋瘵親擇臺省十人出為畿令其後京畿稍理皆擢以大郡則聖上旌賢賞功之意也頃來度支敕符皆云刺史縣令以戶口減殿一人賦斂增最一人與者騫騰於廊廟嫌者沈淪於草莽欲求其為惡者懼為善者勸其可得乎此宰相之職也况今北虜和親縻費轉甚西戎作梗邊鄙未安所望求方召之才選甘傅之將聯營朔裔復河外之城振旅湟中收隴右之地且田單匹夫也敗樂毅乘勝之師謝艾書生也破麻秋徑鋭之卒豈有其時而無其人哉在用與不用耳此亦宰相之職也太宗得房杜貞觀之政成元宗得蘇宋開元之業泰今相公居廟堂之上當台衮之任與房杜蘇宋列於青史寧肯昵親愛行肺腑踵覆車之轍哉某齒髮向衰志力猶在遇賢相逢明時亦願一豁平生少展微分不然者老於泉石亦求仁而得仁某再拜嵩高得天下之中也所謂名山福地異人靈迹往往而有漢晉間高僧植貝多子於西峯一年三花因為浮圖遂為寰中之真境又有兩阜中斷豁為石門飛流縈回以噴薄喬木森竦以布護先是有高僧元同律師一行禪師鏟林崖之欹傾填乳竇之䆗窱甃玉立殿結瓊搆廊旃檀為香林琉璃為寶地遂置五佛正思惟戒壇思惟者以佛在貝多樹下思惟因名貝多為思惟即三花之義在此自河洛煙塵塔廟崩褫上都安國寺臨壇大德乘如修慈業廣秉律道尊志度有緣法庇㣥動慨茲堙墜遂為聞徹尋有詔申命安國寺上座藏用聖善寺大德行嚴會善寺大德靈珍惠海等住持每年建方等道場四時講律藏用上人逸躅遍尋高情獨邁美殿塔之嚴麗賞泉石之勝絶其迹不朽其教益宏於是鐘梵相聞幡蓋交蔭豈獨爐峯名嶽空記遠公之行沃洲精舍重述道林之迹時貞元十一祀龍集乙亥大火西流之月也建中元祀皇上新景命將致天下於仁壽之域以兵革盜闕一字閭閻闕二字前闕一字之闕一字猶軫闕三字延度求俾乂夏五月壬辰詔書以監察御史裏行戴叔倫為東陽令闕三字也闕六字之間城畫墅婺女以東陽為劇先是山寇闕二字邑人闕二字田闕二字萊人闕十一字路闕一字聲闕一字之以信緩其賦使其人舒平其役使其人勸由是田闕十三字使有闕一字農人或惰業闕一字廬廢樹障公關防徵綃斂縞無以供闕七字以闕三字公闕一字之以勤闕二字使澤有浸由是桑柘茂隄塘修平林接陰大壑含潤室有闕一字而闕二字人無闕一字而有闕七字者困於兼並完聚者苦於剽掠公董之以法容之以闕四字使之如闕十一字然人懷日出之謠犬闕一字夜吠之警政化之闕九字貨賄闕一字聚公闕八字庭無事留物不易肆鞠茂草於囹圄闕二字財於闕一字問公字幼公本譙國人也闕九字仕之日履官之秋唯闕一字問闕十一字之闕十六字莫不負弩先驅包茅爭入闕二字專百里之命化一邑之人闕二字割雞闕四字夫闕七字以親也權豪除盜賊屏教之以讓也鬬訟止商旅至教之以和也闕三字帑藏之闕八字之事傳於郡國謳誦之聲聞於里巷且藉闕三字人不偷闕十五字阜於下副明主闕一字勞之求成蒼生已安之業闕四字伏闕八字州之闕六字輔之才必資於卓茂豈惟執憲殿內闕三字中而已闕六字等闕十字盧清等一邑之彥也里正王承闕一字厲曰家等十室之賢也及百姓徐文闕三字等皆闕六字逾忠良宰范陽盧公曰信以才望蹈公之遐躅以政事闕一字公之令猷與丞闕一字樂闕八字太尉河南豆盧岫尉隴西李惟清闕一字古立則闕二十一字之遺愛其辭曰惟聖作乂其運克昌化闕五字賢良申命於闕一字令乎東陽闕六字斂重人散闕二字公既賢舉亦以名揚以闕一字下信以任闕十字樹闕六字路絶豺狼折獄止訟聚貨通商其俗則泰其人則闕十九字洋洋挹而彌廣久而愈芳巖巖貞石休有烈光法本無生之謂真心因不染之謂寂執有求真之謂著體真歸寂之謂如非夫善發惠源深窮定窟何足以大明觀行獨秉禪宗使定惠兼修空有俱遣道流東夏聖齊北山哉禪師諱元林堯城人也俗姓路氏黃帝之後封於路國因而為氏捕虜將軍端見偽後燕録豫州刺史永出晉中興書邁種於人嗣有明德禪師襟靈爽岸神氣俊遠生而克岐弱不好弄初遊神書府精意儒術覩百氏之奧窮九流之源平叔之疑義兩存康成之未詳多闕莫不窮賾至妙剖析元理渙若冰釋朗然雲開並如枝拒蹶張步騎彈射人則曠劫藝皆絶倫後讀阿毗曇藏遂發心入道依龍興寺解律師學業依年受具隸居靈泉佛寺摳衣之歲惠遠即風雅書生落髮之年道融乃聰明釋子以戒為行本經是佛緣雅間持犯克傳祕密學者號為律虎時人目為義龍推步渾儀昭明歷象天竺跋陀之妙沙門法願之能道契生知理符神授既習空觀遂得真如身常出塵心則離念將在此以超彼不自利以利他不來相而來不見相而見焚天香以崇發宏願鳴法鼓以召集有緣聲振兩河教被千里樹林水鳥竹葦稻麻願結道緣爭味禪悅雖先生槐巿夫子杏壇攝齊之徒未足為喻於是廣度㣥有大庇庶情應悟攝心隨分獲益大雲含潤草木無幽而不芳明鏡懸空妍蚩有形而各兆嘗至城邑因過巷肆屠説停刀酒趙釋爵擁路作禮望塵瞻顏師必款曲以情悅可其意捨資財以攝其利言力役以勤其生漸去客塵令入佛智有苛吏敗俗蠹政虐人伏以剛強示之易見方便力去貢高心破其重昏歸以實相夫學偏者量褊道廣者業宏禪師智括有情德通無礙體含虛韻性有異能妙窮音律雅好圖畫季長公瑾別有新聲凱之僧繇皆得真迹以是好事君子翕然向風檀為施心居無長物有流離道路羈旅風霜鄉隔山川親無強近飢者推之以食寒者解之以衣人中之急難法中之慈濟也景龍三年敕追與僧元散同為翻譯大德纍表懇請詔許還山禪師自居此寺凡六十年或宴坐林中纍日忘返或經行巖下踰月不還迹異人間行標物表每遊峯選勝建塔崇功鷲若飛來鴈如踊出官窯杖標之所得自神人破塢移燈之處傳諸耆老今山上數十處有窣堵波者即其事也自金人入夢白馬員來譯音議於天竺布文字於震旦是為教本實曰道因禪師遍寫藏經以導學者德實無量行非有涯不惟總持辨才禪定智惠而已故騰聲洛下獨步鄴中齊達睿之大名繼稠融之遐躅噫日月大地咸歸有盡之源河海高山不出無常之境天寶五載十二月十日因閲僧務詣至德里回首西方端坐如定不疾而化春秋九十餘僧臘七十一日黑震驚車徒奔集雷慟雨泣隘谷填山粵以其月十七日遷靈坐於本寺禪師真身忽然流汗是知因生有滅乃現真空示聖出凡獨標靈相以八載二月十五日即身塔於寺之西北隅以安神也其夜霜霰霑凝山川草木皓然如素東帶雲門西連硔谷一佛二佛前身後身接林嶺之風煙成鄴衛之松柏禪師洞合神契妙通法源義則解空智能藏往先是寺中新植衆果弱未成林悉令沙彌扶之以杖其夜大雪折樹摧枯唯時小枝不動如故師之冥感多此類也門人等味道通經連州跨境歸宗雖倍入法益稀三千門徒皆傳經於闕里四百弟子空問道於襄陽弟子大通親奉音塵常陪庭院承宮之歲初執勞以求師智稱之年載棄俗而從道調九候以除五疾明六度以伏四魔感自舊恩録憑故事龕塔山古霜露歲深虎溪為陵高蹤不亡於別傳龍山若礪盛德長存乎此詞其銘曰執有非有覩相非相日離諸妄得法捨法悟空非空是出㣥蒙日景常朗雲藏其耀無雲自照佛性常在欲生其塵無欲為真無相捨有出空離法大師宏業覩日除雲無欲歸佛大師祕密茫茫㣥有溺於中流濟之以舟冉冉八苦沒於五濁導之以覺因心發惠惠契於定道澄其性憑緣有生生歸於無理不存軀恆沙一劫藏舟閲水真身去矣連岡萬古雲門靈泉飛塔巋然夫載宇宙懸日月提萬象而首出者其惟道乎夫通聖神該品彙冠百靈而獨立者其惟人乎道所以包渾元經始萬象者也人所以稟淳粹司會百靈者也故人因道而集祉道因人而垂休不宰之功兆乎造物無言之德洽乎生民然後蕭散乎汗漫之間沖融乎希夷之表與天籟而吹萬並谷神而長存者矣紫陽真人大法師諱景昭字懷寶本丹陽延陵人也其先系自顓頊大彭之後在虞為陶唐氏在夏為御龍氏在商為豕韋氏因國命氏芬馥蔓延以至於裔孫孟孟為楚太傅賢為漢丞相昭入吳為侍中昭兄慎為司空法師即吳司空之十六代孫也司空薨葬於延陵子孫因而家焉祖道會父思蕆皆邱園養素道高迹隱載於列仙之籍法師方娠稟異自幼表奇孕元和之粹靈體太元之妙質初以素書發迹配度於延陵之尋仙觀後以丹臺著稱隸居於長安之肅明觀屬元宗廣成問道姑射頤神放心於凝寂之場垂拱於穆清之上法師因得羽儀金籙頡頏玉繩藉藉京師垂二十載爰辭上國思還故鄉重隸茅山之太平觀天寶中與元靜先生奉詔修功德造紫陽觀因而居焉遂於鍊丹院傳黃素之方修齋醮之法祥雲瑞鶴飛舞於壇場甘露神芝降生於庭院初法師師事大法師包士榮榮師事崇元觀道士包法整整師事上士包方廣廣師事華陽觀道士王軌軌師事升元先生王遠知知師事華陽隱居陶宏景自道源錫派元教傳宗玉堂銀闕之人羽蓋毛旌之客府無虛籍代有其徒法師至行稽乎元化通識合於靈造與其有也萬物不得而不有與其無也萬物不得而不無得喪以春秋為死生盈虛以天地為旦暮雲外虎頭之佩雪中鶴鄨之裘孩季通而撫子元師仇公而祖黃太教戒示乎傳授服餌見乎延長侍杖屨者迹遍於江湖傳經籙者事同乎洙泗一居山觀三紀於茲還神契乎時來寂魄同乎物故以貞元元年十一月癸卯委蛻於紫陽之道場顏色怡悅屈伸如常春秋九十有二以其月已酉遷神於雷平山之西原元靜先生壽官之左傳授蘇州龍興觀道士皋洞虛得沖虛之妙用躡上真之元蹤梁巿之客員來華陽之人間出矣道士韋崇珣主修齋醮祭俯仰節度道士朱惠明掌法籙經書修真祕訣法師上編仙籙旁契道樞神含混元德與淳粹誘進㣥動感通衆靈邈然非寰宇之間超然在風雲之表至如身廠田坴世故迹混俗塵發忠孝以飾躬演信義而旌行蓋隨時而不器豈常道之可師與浙江東西節度支度判官檢校尚書兵部郎中兼侍御史扶風竇公曰臮布武區中棲心象外與法師聲同道韻理契德源追往想琴高之祠傳神著務光之傳見徵副墨用琢他山其詞曰惟道之大提功混茫惟人殆庶與道回翔素韻凝寂元功靈長肇形無迹啓迪逾光矯矯法師錫羡華陽本族命世在虞系唐御龍事夏豕韋居商嶷然靈表自幼而彰理冠容成質侔夏黃尋仙發迹肅明始揚宵禮金殿晨朝玉皇丹臺道侶白雲帝鄉楚山萬里故國丹陽醮宮鳴磬齋室焚香芝生庭院鶴舞壇場茅君祕洞葛氏真方來時去順齊彭洎殤化鱗風翥委蛻雲驤峯巒邐迤松桂蒼蒼塵生杖履苔染巾箱龍銜彩眊虎綴槃囊閬風元圃瑤軒玉堂追存如在頌德不亡孤石巋然萬古連岡太平觀道士徐元沼道士許長久徐則內行克修外通儒學許則宿推公幹虔奉真宗叔倫字幼公潤州金壇人釋褐祕書省正字纍官祠部郎中拜撫州刺史封譙縣男遷容管經略使貞元五年卒年五十八臣某言伏奉某月日制書大赦天下雪滌痕纍發生枯朽榮光被於草木和氣貫於華夷含生之徒罔不胥悅臣聞氛沴為妖蒙蔽二曜而祥風掃蕩無損日月之光狂逆亂常震驚四海而元功勘定不虧天地之大伏惟皇帝陛下文武繼聖聰明在躬協堯舜之心崇禹湯之德清廟禮展圜丘敬申猶顧已以求瑕布恩澤以原過康哉沛乎虞夏之盛典也臣忝職藩條實慙尸曠徒積歲星蔑聞化理望九重而稱慶齒百辟以霑恩瞻戀闕庭慶快之至三聖相師大易光著天地之功立矣經傳之功生焉輔成一德謂之六學漢收秦業其道方興置講習訓授之官明君臣父子之體雖禮樂文闕亦足以新忠孝仁義之大綱至如曾孔荀孟之述其闕一字蓋數百千家皆發揮隱微羽翼風教祖儒尊道持法正名縱橫立權變通其要崇儉而有別即農而有序旁行而不流小説去泥而篇繁夥罕備於士大夫之家有梁潁川庾仲容略其要會為子書抄三十卷將以廣搜採異而立言之本或不求全大理評事扶風馬總元會家有子史幼而集録探其旨趣意必有歸遂增損庾書詳擇前體裁成三軸目曰意林上以防守教之失中以補比事之闕下以佐屬文之緒有疏通廣博潔淨符信之要無僻放拘刻言敫蔽邪蕩之患君子曰以少為貴者其是之謂乎余元會之執友故序而記之貞元二年五月二十一日也方郁建中時官洛陽令上四年用大司計侍郎為丞相其明年以我相秉樞機我公掌綸誥宜為避嫌遂自閣下拜河南尹將辭上悄然謂公曰前時洛水為災洛民大潰四走無逃至有沒死者豈勝其寃耶而公今去我無東顧之患矣公既至理事先以恤民為寄活生瘞死大開廩庾賑貧乏飽飢腸暖寒體極於畿甸靡不周悉而又蠲逋租省徭賦俾安穩其起居勤強其事業故遠邇之民相賀而歌曰天災流行兮代有下民昏墊兮時數命無以逃兮諒自嗟豈將天怒我尹之慰恤兮實解豫之愁苦夫得耕兮婦得織日出得作兮日入得息此固我君之憂民兮俾我尹之來即又歌曰明明在上兮天子聖四方取則兮我公令疲民蘇息兮公之政一日將去兮誰活我之性命其都之南嵩嶽橫亘其嶽有廟距都百里每歲季夏日直土用御置祝文用犧牲粢盛醴齊庶品詔我公有事於王禮既公周視廟宇堂殿廊廡見其崩陊毀剝癬頽墮垣墉漫靡榱棟失次梁柱差欹顧謂其邑令李方郁曰吾聞大地列嶽五嵩山居其一其嶽峙中天㣥峯蒼翠異色其岡巒重疊異狀其出雲靉靆異氣其草木森聳異岵其葩卉薈蘙異香其禽鳥間關異聽其溪澗瀺灂異流若此之狀觸目周匝四時迭觀吞吐氣象環一山之上道宮佛寺高閣危樓盡萃其中我國家以神之靈塑神之形俾神之明福我蒼生峩峩其冠整整其衣兵仗駢列羽衛參差天子以時視三公禮而祀之要神之德既厚矣報神之功亦重矣所宜威壯形容華煥宮宇奈何以危毀至是俾爾民之進拜禱祝將何瞻仰乎我今出府庫十萬資以功用爾宜專其事俾爾心與吾心不可以異方郁謹再拜受命退而自言曰方郁為吏稟指使上不敢罔公中不可欺神下不能苦民豈可不成耶遂鳩工庀材四旬而就見若赤白之交映矣見若金碧之分輝矣見若榱桷之粉繪矣見若斗栱之光赫矣見若簷溜之矗截矣見若溝壟之端隆矣見若戶牖之照燭矣見若垣墉之齊削矣旭日明媚夾壇殿之飛翬朝霞卷舒助峯巒之起秀則知公之措制可以邁古冠今使海內神廟修潔崇盛無逾於中嶽公天發晶朗嶽鍾秀粹㣥妙符識萬頃澄襟瓊樹冰壺涵徹於神宇黃鐘朱瑟鏗奏於文章况公尹正之能撫民之美愚知其不日而將與吾相連枝於台座之中致美於廟堂之內將吾君岌立於堯舜之上措吾民登壽於邃古之際必矣方郁忝官在縣行及秩滿特蒙公録以微績上表量留付之修飾輒敢敘德紀事刻石以記
