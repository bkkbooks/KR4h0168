front:
  text: 全唐文欽定全唐文卷三百五十六洽開元時處士
  hash: sha256:6f830aab2bb05450c484b7c85eec94ef08b90cf055948437d9f53dbdb6603515
  markers:
  - {type: head, offset: 14, content: 梁洽, id: KR4h0168_NFKB_356-h1, level: 1}
body:
  text: 雲收野迥兮目極千里空淨川長兮纎埃不起視河外之離宮信寰中之特美飛重樓之沓秀繚長垣而層址詳巨制與宏模固一君而萬祀扼秦晉之襟帶據山河之表裏諒神功之所營匪靈光之能擬邈矣轇轕岌乎崚嶒對華山之贔屭挾重關之股肱文物著明則可久可大制度豐敞則不騫不崩來蘇之詠已作觀風之道斯宏遠樹搖晴挂長虹而欲飲祥煙不散俟吾君之復登宮闕多奇欒櫨謺施倚萬楹以磊砢洞千門而陸離玲瓏玉樹則遍澄霽色連騫繡檻則却映斜曦設璇題以曜殿黏頳壤以文陴度之以几筵則有典有則約之以軌物則不高不卑當今取實去華匪儉匪奢撙節三代光宅四遐豫順以遊御六龍而戾止聲明自溢奄九有而為家且夫書稱梓材易稱大壯自昔棟宇之作未有茲宮之狀夫長者仁壽之宗符春者發生之所向伊嘉名之可偉乃動植之攸尚客有學古之流乃含毫而一望立政施教能則理為器擇材惟良是視政有孚而可大器自斫而稱美學古入官斯可已矣故周公設誡取鑒梓材百工飭化以物作萬勢曲成而象開柏之可伐而取諸新甫松之可斷而美於徂徠何備用之徵要信崇功而大哉觀夫良匠掄木知無不為盡力以獻藝因材而合規勤朴斫而去夫濫窳尚儉素而昭於軌儀知者相物後人述器得成風之妙窮運斤之利或經緯乎陰陽亦法象乎天地上棟下宇資丹雘之餘飾從有之無通舟車乎遠致嘉茲義之可分而發昭乎在位是尋是尺其柳其椐每從繩而則正異投刃而皆虛觀梓匠之斫矣吾是知為政之所如材之既度可施於政若意匠以合則必由庚而在詠侯其禕而念茲在茲政有善人則不欺山有木工則度之材有常質政則匪一每呈器而受用亦相時而陳術夫如是諧利貞保元吉信前賢之濟代豈小人之能悉道之應物兮小大咸信物之感道兮禎祥必順況我儲君光膺在震乾乾夕惕兢兢日慎德澤潤於生靈滄海得無重潤惟海之量百川朝宗猶君之美萬國向風朝宗者歸其廣向風者欽其政既同類以相求故重潤而必應是使日光分色山輝度映風雨不淫魚龍遂性㣥氓仰止是燔瘞以告成外國聞焉願梯航而來聘然則我君之明兩也景育前星休徵夢月主鬯之功昭著牽衣之智逸發四皓既親三朝不闕故曰惟其有之是以似之海則靈潮晨夜而無替君惟順動溫凊而有時詳夫海之為器也吞吸八裔流不逆細怪必斯蓄珍無不麗沖融濜汨轇轕澎濞飛濤謺躍於秋陰白浪翻光於春霽雖則沙石混濁不蕩其清波瀾迅委終復於平惟此之故彰我君明至矣哉靈海之潤孰知其極願乘桴以攸往非引蠡而能測道未行兮竊喜取材敢獻賦兮揚君之德金翦刀者奚其有情柔而能決堅而能貞表裏洞徹上下鮮晶缺處磨盡鋩間淬成長鋒貯其煙色秀彩奪其霜明值凝寒則徑質加勵霑微潤則青衣半生雙刃回合兩稜佹傾閟之而綵縷皆隱用之而畫尺常并及其春服既裁寒衣欲替隙光入座蟠蛟龍於影中暝色浮階下星辰於環際且夫小而輕生閨閣之幽情新而利為房櫳之名器開玉匣則飛光射人落銀牀則喧聲碎地色絲滿篋細錦盈箱推妙使製擇賢而當豈顧常規而在準不徒借美而多傷方須取舍合時短長有限欲去纎過不遺片善貪寸美而寬裁避一花而斜翦紕繆者退之而自慙縟繡者進之而自勉莫不賞茲器之能荷情人之妙選矣大哉乎茲水獨靈長以利貞分位象於八卦得柔謙於五行混之不濁流之不盈蓄恬淡以凝潤合虛無而洞清其近窺也若冰鮮與玉潔映曙空而內徹其遙視也如雨罷而日晶澄遠氣於初晴德之深與上善而均美讓之大居下流而不爭處地為泉源則江漢朝宗之義立在天為霧露則陰陽燮理之功成辨涇渭於九流雖衆不雜察妍媸於萬象在隱皆明亦何異翹翹邦彥濟濟朝英作我吏部為周亞卿昔掌地官其守土也能審今來會府其應物也以精回廣照之能比其妙識以無偏之志喻此持衡故得自陝以東更仰知人之鑒普天之下皆稱如準之平則有登舟未涉處轍未停遊子隴頭嗚咽斷腸之奏知音席上傳聞盈耳之聲倘為廣由中之德流潤下之情則所謂滄浪之清兮可以濯吾纓善利無方莫先乎水蓋當潤色之際必取務滋之旨黑黃蒼赤皆賴其激揚黼黻文章咸本而資始德既洽於濟物色且叶於通理自得元之又元何謝美之為美於以增奕奕於以散煌煌浴飛翬於陳寶浸社土於徐方染氏繄而衆彩繁糅繢人因而品彙咸彰博我以文不獨專於潤下用而不竭將以效其靈長原夫被物如濡霑顏載渥狀暮山而翠謺法朝景而霞駮遠同墨氏類素絲之屢遷尚想蜀江嘉貝錦之斯濯飾衮衣而煥爛成繡服之葳蕤何采章之不昧由浸潤之所資漸以化成能令素以為絢期於敷衍孰云涅而不緇既得色斯舉矣亦可狎而玩之不假濯於滄浪寧同資於碧海凝瑞霞之炫耀發慶雲之光彩寫補天之績鍊石之資必該圖應聖之祥威鳳之儀咸在佐益丹而惟其深矣當後素而不曰白乎流濕之光允若受采之時是須且比成人之美實同因物有孚助其妍而載隨炳其用而無必乍成藻火之文幾變素紈之匹榮光可愛初謂出河之符備色咸宣更入夢江之筆先王所以因而立旨喻以相成含章而其輝未著發澤而其道彌精儻不苟於體用庶可致於文明笛為樂兮人所吹噓龍為神兮天泉是居何音聲之酷似而性質之本疏想其形謂同婉若聆其響稍異翕如始其伐幹厚地因材制器四孔有加五音俱備無煩乎鈞簧促柱有用於娛心滌志乍從容而寥亮究律呂以精粹伊滿堂之咸驚疑在田之忽至淒清韻起方將樂以忘憂想象雲生實曰物從其類庶可分於繁會諒難測於同異徒察其含嚼奔放激濁揚清如泉水之或躍疑御日以飛聲象乎鼉有逢逢之鼓疑乎鳳有嘒嘒之笙雖學如不及莫之與京曷若高下自乎氣洪衰應乎手曲引如變於雲霄霧雨若集其前後劉纍聽之而欲豢葉公聞之而反走非影響以因依實混合於妙有東南之美厥狀蒼筤不因乎度土合木寧謝於玉質金相調逸簫管之奏音含宮招之祥若降於天如聞於野穆公子徒得其遊魂白雪陽春奚稱其和寡考終樂以自然信斯笛之美者當簻易持龍吟似之季長每悲於洛客鄰人能感於子期入耳之初喜攀鱗之有所回眸之際覩截竹而在茲是知夫揮絃戛擊以洋洋轉喉紆餘之靡靡夫神物之相應者無能及此鳳惟應聖竹乃無情何截彼嶰谷之節而吹象朝陽之聲音韻既生訝嗈嗈而成響宮商間起若鏘鏘以和鳴昔黃帝揆日伶倫制律將分天地之氣以正陰陽之術選碧鮮西域而非妙得厚均崑山而無匹既翦既伐玉潤之姿是分以噓以吹金咮之聲斯出貫時之容未改作瑞之思孔將呼吸兮斷而復續疾徐兮抑而更揚散漫於叢篠之間疑郊藪已集飄流於芳林之際謂庭梧來翔此音既舉彼德可序聞軫宮而引商若命儔而嘯侶遂使審音之士睨孤管而生疑考祥之人向高岡而延佇既而合黃鐘制大呂作候不乖於晷刻分時先報於寒暑逸韻蕭寥德音孔昭聆五聲而既備和六氣而能調儻吹於紫閣之前何異巢阿閣之日如發於青山之上可繼鳴岐山之朝且鳳聲雖虛竹響有稟伊異質之可用惟聖人而能審五聲並發疑九雛之互鳴衆響難侔覺七音之異品今國家倣不言而四時以遂法無違而萬物如春竹兮任截鳳兮來馴至仁以調乎元氣大信用洽乎生人由是律候以正其唯大聖亦何必取鳳聲之竹然後測陰陽之令製冠有象惟賢表名冠在首而為用政匪賢而莫成伊進賢之為急乃斯冠之發明古人所尚永代作程豈比夫戴鶡聚鷸瓊辨玉纓彼旌武而貽咎寧比德而同聲念茲在茲侯其禕而山有木工則度之君為政賢必進之木自工以生態政得人而允故君子進退以禮消息候時時既清兮惟賢是急賢既進兮其政必立總六官而謂何嘉此名而可挹客有聞之而言曰或標之豸或珥之蟬所謂二者莫如進賢忝從班於聖日願效試於明臺敢與弓旌之召無遺菅蒯之才琳并州太原人天寶初舉進士纍授大理少卿國子祭酒拜御史大夫平章事除工部尚書罷知政事朱泚之亂扈從至奉天轉吏部尚書遷太子少師再幸梁洋琳以老疾辭不能從止仙遊寺為僧泚至京城授偽吏部尚書官軍收京師斬之晉人用鐵兮從革無方其或五金同鑄百鍊為鋼雕鐫而雲龍動色磨瑩而冰雪生光爛成形於寶鏡期將達於明王故有徹侯居守方物底貢擇使而天驥共飛登車而海月相送妍媸之鑒已久肝膽願呈者衆鏡之既明星衢是亨列照而三光共霽凝輝而四海俱清應人無疲知道不虛受處已不厚見心乎砥平若乃宇宙清朗提攜偃仰旁窺而山澤入懷俯視而雲霄在掌雖因時而委照不偏物以呈象圓規可轉處順之物攸先徑質無虧持盈之道彌張墨客因進而歌曰金之精兮衆寶所參鏡之明兮㣥象所含清至瑩兮氛埃不雜明至察兮醜類相慙幸忝秦臺之一鑒與飛鵲而圖南惟輠以積膏而潤惟人以積學而才潤則浸之所致學則修之乃來亦猶山輝蓋玉之處石川媚乃珠之在胎則炙輠之義斯焉在哉原乎其始方我髦士言物也火及則潤滋言士也用之則邦理喻研朱則其色不奪方扣鐘而其音不已故可以與理窟而爭深配智囊而共美炙之不竭夫豈同於瓶罄用之不窮固有殊於罍恥且國以賢興車以輠進車非輠而安往國非賢而莫鎮脂膏內實宜誡盈於撲滿滋液旁露信同功於河潤豈比薰以香而自燒玉遇火而不燼向非外取諸物內滋其身則一炙可以就燥再乃於焉中貧亦何潤色無斁輝光日新比至道動而愈出方君子磨而不磷原夫伊輠也照身以取路伊賢也開物而成務亦何近取諸身願借秦而為喻喻如何其唯良在茲希德澤而惠物在脂膏以無私若然者豈止滯輶軒以聽察因鈞軸以為期增雨露之濡洽霑草芥而滋熙者哉鶺鴒雍鳥也詩取其鳴行搖尾相應以興兄弟急難之義而已然無窠巢無雛孕不知棲息孳育之所人之見者更無大小之殊隼不能搏彈不能射網不能取朝之與夕常在人間竟不知此鳥之所自來也何鶺鴒之小鳥與羽族而特殊鷸戉鳥飛鳴肖翹畢逋金晴玉爪紺尾青顱電瞥機駭火馳風趨來何從而去何適似出有而入無噫形氣有生之類非卵非胎不巢不穴罕知爾棲泊之所乳伏之節吾自見爾翩翾一狀小大無別莫涯雛孕之源以出陶鈞之轍亦稱王母之使豈在神仙之列咮啄鋒鋩毛衣霜雪惟若驚之近道思數顧以周防苟彈射之莫中匪網而奚張齊薑所以遣重耳范蠡所以逃越王慮晏安之有毒斯警戒以為良務相時而達變豈膠柱而守常偶來池館非意稻梁吾將注目而悠然以逝色斯舉矣而物莫之傷既忘情於進取遂遊仞以翺翔乘興於人間之世全身於自遠之場苟日新於運用能獨善於行藏歲惟大儺國著成命有以焉爾請言其政夫四氣平分三光交映登臺眂祲必書於雲物象魏懸章式陳於時令是以一人垂拱萬方同慶者也且儺之為義其來自久實驅厲以名之於諂神而何有若乃率舊典飭有司上士下士左之右之或囂聲以作氣或詭貌以呈姿示以直道揚乎儺辭何四象之能行豈神明之見斯則有侲童丹首操縵雜弄舞服驚春歌聲下鳳夜耿耿而將盡鼓喧喧而竟送行看北斗已落於嚴城坐待東風方期於解凍皇帝御寢殿正元冠侍臣濟濟宮妓珊珊欣大禮之斯展覺輕陰之尚寒肅肅穆穆南面而看則知天不薦瘥同殄妖氣勿休之瑞吾既聞於方册強死之魄彼其宣於驕意面禳有相向之禮堂贈有無方之事雖殊途而異觀可同歸而一致徒觀其執戈揚盾黃金四目其視耽耽其威肅肅將前驅以戒道必啓行而分逐國人稱之曰當今日月既明乾元以亨福穰穰兮共蒼生恩湛湛兮莫與京恩既湛兮儺人出春王正兮粵翌日願吾君兮千萬壽保巍巍兮唐之室維竹稱慈幾乎有知九族敦敘孝友威儀是竹必滋五服相殘骨月攜離是竹必衰苟自家而刑國亦觸類而增思苯䔿固護檀欒櫛比如束之稠如插之密徑節中聳攢根內實聲唯戛風影不透日類宗族之親比同朋友之造膝至若暮歲窮律霜凝雪霏陶鈞無發生之理松柏有後雕之期是竹也叢篁劈開芽筍怒長紫籜連披青筠紛上有偕老之情感饋親之養如受制於籬界不旁侵於土壤雨露之澤謝爾衆芳細葉未吐貞心已長恥高標而迥出斯裊曲而不揚匪趨時於律候寧隨韻於笙簧保無用而以道自將愧不才而與物俱昌苟成陰於隙地作盛景之清涼重曰夫帛丿糸帛丿糸瓜瓞兮如有子母雍雍鴻雁兮如次弟兄於家則疏附禦侮於國則磐石維城田氏不分庭之荊陳家則應天之星莫不鬱映棠棣急難鶺鴒斯竹也共根連茹一本千莖年深轉密歲晚彌榮一可以厚骨月一可以敦友生於靈臺而莫非信性彰慈孝而感通神靈有斐君子兮將以自怡藝孤篠於前墀玩以時愜所思且面陛則陽笑猗猗而處渭向砌則燠祕青青之在淇問君何事生乎茲嬋娟抱節而無詞借而東南之美會稽千里阻江阻河所貴則那至乃柯葉不二吁嗟此地彼其之子賤目貴耳豈知孤者取稀物莫之依含混元之休氣吸太陽之清暉長則尺準大可寸圍有美遊兮忘其歸更憶朝霞露未晞懸明月而影短帶疏雨而聲微觀乎裊娜容與風生其處應知默定洪鐘律幾日能令童子悟實方就而孤鳳食來枝或成而一龍飛去天造自然含虛佩堅堅以保名虛以戒盈瞻彼標兮人之程萬類則改千竿森在其在伊何增冰峩峩瞻彼磷兮不可磨則知天籟奇兮由我起道生一兮得我始得之者非取玩物而已或曰天生德於聖人是為文宣蒙以文宣之為聖人蓋其自生非天生耳夫道有精德有純禮有意樂有神四物幽贊百靈淳感特與天地位而成三故夫子之前未曾生夫子夫子之後不復有夫子宇宙古今倬惟一人謂天能生曷不能數生也故曰非天生耳河圖鳳鳥言其德梁木泰山言其用謙以況物物由我成且孔聖之道恢張而天下理汙殺而天下亂觀其可以卜理亂也領徒三千博徒三萬桓文不足侔其衆夾谷之戮齊優兩觀之誅少正氣蕩河嶽精回日月然而俯僂魯卿循循鄉黨行道救世不有其躬且唐堯五臣不無四凶周文十亂不無三叔孔徒萬數之內唯宰我怠於晝寢卜商短於假蓋未聞庶其之奔佛肸之叛遺墟舊宅刺草不生則教之所入者深化之所宏者遠鏡懸象緯掌著興亡籌萬代於一算爾我國家敷教訓俗以王者之禮加徽號焉示明王果有宗也德位交敘以奉天時然三皇五帝迄於今春秋釋菜廟食千祀特惟夫子耳則冕旒衮服聖人之餘事封建裦崇有國之盛典化成縣令范陽盧沔純深貞特廉孝潔矩夏大旱偶有事於文宣公焚香至誠雷出自廟指觀倏忽霈然滂沱自下車數月有感輒應無方之神豈情於造物者乎可由而不知也以此頃因祠宇荒僻垣墉頽圯憩聚樵牧褻瀆威靈公以必葺而未言頻假寢以夢聖隙地兼勝此為新官曰衣冠禮樂不下庶人宣風布教職先令長出家財以資匠費督門吏以勤役工青襟黃髮更唱迭和椽欒雖舊而華魄惟新自甲至癸不及旬而功已集郡官畢賀百姓未知足見役不及人也君子曰盧侯以心感神以身律人可謂善政也已矣郡守楊公中和大雅聞善若驚悅而美之曰盧方辭滿不以家為出鍾離俸錢修孔聖遺廟善政之餘地也僉曰都允哉梁國喬琳臺之作為新廟頌頌曰殷之系聖周之斯文生我夫子世教之君六藝折中三才更分視不可見聽不可聞登降既定天人大觀禮樂神鬼幽明協贊由之則理匪由則亂百王同流萬古彌煥夢奠既兆哲人其萎自家刑國廟貌思之周微唐興千祀於茲春秋祭菜俎豆其時維巴之南亦揭其宇盧公宰邑人之父母假我升堂陋彼環堵爰就爽塏長岡之下相協厥居作為新宇不日不月既葺且崇頌徒知歸發篋來同斯之未信此也求蒙時維龍見人懼魃虐寧丁我躬虔鞏是託戶牖之際雷霆震薄雨公及私是刈是穫廟既更矣歲既盈矣公之志思人亦勤止變此夷俗參乎孔里學者行之造次於是雍天寶間進士官金部郎中皇上朝萬國宴千官當獻歲之令節御高樓而賜歡應和風奏以天樂耀長伎出乎花竿偉夫如山之重如繩之直挺其質以百尋繢其文以五色將烜赫以誇衆候鏗鏘而取則高居乃在乎帝庭發迹乃因乎人力於是玉顏直上金管相催顧影而忽升河漢低首而下指樓臺整花鈿以容與轉羅袖而徘徊晴空乍臨若虛仙之踴出片雲時映若天女之飛來矧夫曲終示危乘危中矩八方勞觀億計如堵載之者強項超㣥登之者纖腰回舞猶盡巧於繁節且獻能於聖主廣場合勢則衽舉成帷衆伎驚心則汗流漂雨或有趫材告捷角力爭先鳴鼉鼓以動地仰花竿而拂天初騰陵以電激倏縹眇而風旋或暫留以頭挂又却倚而肩連躡足皆安象高梧之鳳集隨形便躍奮喬木之鶯遷然後贔屭用壯回還變狀度岌岌之雲梯繞森森之仙仗通衢為之翕習太蔟為之條暢人自能藝信咫尺於重霄竿則有材惟飭磨於大匠是日也悅豫重情喧闐鎬京角抵慙妙巴歈寢聲賞含嘉用潤澤寰瀛觀斯樂之為最孰不稱於美名毬猶求也展轉馳逐兮將求仁而得仁毬上有嬪毬以行於道嬪以立於身出紅樓而色妙對白日而顏新曠古未作於今始陳俾衆伎而皆掩擅奇能而絶倫於是揚袂謺足徘徊躑躅雖進退而有據常兢兢而自勗毬體兮似珠人顏兮似玉下則雷風之宛轉上則神仙之結束無習斜流恆為正遊毬不離足足不離毬弄金盤而神仙欲下舞寶劍則夷狄來投方知吾君偃武之日修神仙之術但欲揚其善教豈徒悅其淑質謂豔色兮可輕使宮女兮程功而出疑履地兮不履其地疑騰虛兮還踐其實當是時也華庭縱賞萬人瞻仰洛神遇而恥乘流飛燕逢而慚在掌幾看制而動息幾度紛而來往倏而復歸於雲霄何微妙之忽恍巋然峿臺枕於祈陽迥然楚方臨於瀟湘孤標一峯不止百尺嵯峨巨峻闕一字潔堪礪英才別業雅有儒風河南元公高臥其中位為獨坐人不知貴興愜茲地心間勝事松花對偃薜葉交垂鑿巘作逵因泉漲池乃搆竹亭乃葺茅宇㣥書當戶靈藥映圃嘉賓駐舟愛子能文弄琴對雲酒熟蘭薰何必磻溪方可學釣何必衡嶠方可長嘯我牧此郡契於幽尋刻銘山岑敢告煙林德裕官四門助教昔軒皇之有天下也鑠至範恢崇謨用建皇極永康帝圖徵鐵於晉國之野鑄鼎於荊山之湖以陰陽作炭以天地為爐下碎礦而星入鼓長扇而風驅炎氣旁飛寒雪影消於玉馬紅光四照晴日色掩於丹烏於是以泄以竇以鎔以模故寶鼎之芳迹斯可得而聞乎爾其為狀也下實上虛外圓內朗玉鉉金耳之飾巽木離火之象法三台之位均九州之壤鏤厥奇狀文有鸞鳳蛟龍禦其不若怪無魑魅魍魎故夫長子主之而祭聖人饗之而養徒觀其闡微洞幽崇德辨義作域中之寶通天下之利不汲而盈不炊而沸輕重自隨於德元亨克保於位楚問伊川表周王之至德齊求穀水豈人功之可致當今鼎命翹車鼎刑措獄道德以為矩敦龎以淳俗不取法於六籍不徵金於九牧自獲汾水以定郟鄏邁軒后於往圖遺夏王於後籙况伊尹作相由巢為僕乃傴僂其身不覆餗於足朗日月於金鏡調風雨於玉燭庶績其凝百姓無欲愚雖復望於其道欲負之而局躅士有作吏君之曾臣玉無能以藉手貨不足以藩身曠歲月緇風塵為大夫兮既屈因君子兮求伸載剖厥蚌將投於人恐魚目以相衒乃龍頷以取真得徑寸之寶是千金之珍表裏照爛晶光洞徹體有象而至圓色無瑕而自潔滿若墜露明如積雪高秋之夜月孤上長河之曉星未滅懿此特達湛夫龍光掩趙璧十城之價合吳鉤千戶之鄉不假琢磨自無白圭之玷匪同銷鑠乃越黃金之剛願輝君之掌握而燭君之殿堂必將光輔上台儀形大道慙魏車之承照哂夏璜之有考遇物則遷從人攸好飾春申之履曰非難得之貨遷太守之邦蓋是不貪之寶傳可歷代賞無溢尤復喜鑑於明哲敢自陳於暗投勿以無媒按劍而相拒勿以無脛委地而不收同作貢於楚國而便契於隋侯俾懷寶之君子盡銷聲而莫遊昔武王順天應人奄有周室召公受命作伯宅茲燕土列分冀為幽之都專受脤執膰之命於是建宗廟立城市分器輯其邦家築臺觀乎雲物則候臺之建允或在茲初具版幹陳畚鍤書丈尺糗糧之數度高平遠近之差奔命子來執用林聚約之閣閣荷鍤而雲陰數重築之登登相杵而雷響四合成之不日鬱兮崇山將中天以懸居豈承露以特立然後分保章以典之命日者以覘之使八風不姦五雲式序人無凶札天瘥之疾國絶喪荒水旱之沴凡若是者數百年至六國糜沸九州瓜剖昭王平能破齊抗趙候雲在朔則二至二分之占五紀五緯之數雖少沒振未大滅裂及秦有華戎漢封郡縣析木空聞於分野甘棠已盡於翦伐則視祲之儀掃地都盡廊廡旅乎荊棘階址穴其狐兔自我唐再造區夏大分嶽牧使鎮天子之邦不同諸侯之郡遂及陳迹以作新臺既無占候之事共為宴樂之所雖山楶藻梲禮不僭於大夫而刻桷丹楹誡終慙乎君子代為故事人無間言洎我良牧郭公博采舊史發揮新意文物大備懲勸可觀公名明肅字晉容太原郡人也監門將軍之孫御史大夫之子纘戎餘慶克荷明德靈源與天地爭長廣度與江湖比量故能受明主之詔剖太守之符澤從雲遊心入水淨俗變於道禮賢存擁篲之風人歌其德聽訟擬坐棠之化未三年而政教已成雖一日而牆宇必葺以為先王議事禮不忘本君子懷德人惟求舊況候臺易之古臺也壯址仍存昭王燕之賢王也盛德不泯欲觀古人之象至止可以肅肅如享太牢之味登之可以熙熙遂於臺之外壁列劇辛樂毅焉以為道者萬物之奧天地之禪六度之門寂滅之義施之于國則富證之于人則壽況守道者必嚴之于吸風飲露安禪者必釋之以息照冥境乃於臺之內壁圖桑門宴坐焉以為孝者德之本總人百行貞者事之幹為乾四德至天則風雨以時比竹而霜霰不變廬於墓有田氏之子安其室有王章之妻生芝草於大隧之前是加一等詠柏舟在中河之側乃無二事復於其次為繞墳薦鯉焉俾觀者如堵覽之駭目激懦夫烈士之節警貞女孝子之心豈徒壓百雉之崇墉架九烏之峻堞軒榭窈窕松柳蔭映幽室納寒谷之氣炎天下霜畫梁對霽雨之輝晴虹射日夫如是則登之不假贈扇北風其涼視之不待褰幃大山如礪豈比夫逐荊臺遂為流遁畫麟閣不有姓名者哉別駕彭城劉公循忠從政以賢方協海沂之詠司馬清河張公瓚食祿以德爰光中外之遊咸本濟代之材以成考室之美雖二公宏化有無窮之令聞終三后協心樹不朽之丕構德裕邑人也實寡聞見拔薤投水德未平於任棠築臺置金禮何多於郭隗敢不傳美以為實録藏於屋壁誠有愧於家書勒於碑版庶無慙於臺記時建崇元學之歲秋八月旬有九日其從事參佐等學富今古材堪經濟雖懷坐嘯之功未展摩天之力並勒石于後以克永代非月登科記作自官西河尉火正分司疇人命職欽若天象敬授人時黍絫無愆寸管測陰陽之數葭灰期應閉戶窺天地之心所以申命有司節宣丕序未遂御於乾道近獲戾於叛官辰回雁天不奪於房次月足廠田坴龍宿莫命於勤農二分或錯於春秋九土有虧於啓間不修厥職猶飾彼辭且列在㣥司匪無常典徒有成數黍有常形黍細當合簡孚徒少豈宜緘口防微於始胡不謀先敗而後言無乃太晚愆我星度宜暴刑章待憑高下之班方定重輕之罪挺章國子進士昔陸平原之論文曰詩緣情而綺靡是彩色相宣煙霞交映風流婉麗之謂也仲尼定禮樂正雅頌采古詩三千餘什得三百五篇皆舞而蹈之絃而歌之亦取其順澤者也近祕書監陳公國子司業蘇公嘗從容謂芮侯曰風雅之後數千載間詞人才子禮樂大壞諷者溺于所譽志者乖其所之務以聲折為宏壯勢奔為清逸此蒿視者之目目舌聽者之耳可為長太息也運屬皇家否終復泰優遊闕里惟聞子夏之言惆悵河梁獨見少卿之作及源流浸廣風雲極致雖發詞遣句未協風騷而披林擷秀揭厲良多自開元以來維天寶三載譴謫蕪穢登納菁英可被管絃者都為一集芮侯即探書禹穴求珠赤水取太沖之清詞無嫌近溷得興公之佳句寧止擲金道苟可得不棄於厮養事非適理何貴於膏梁其有巖壑孤貞市朝大隱神珠匿耀剖巨蚌而寧周寶劍韜精望斗牛而未獲目之縑素有愧遺才尚欲巡采風謠旁求側陋而陳公已化為異物堆案颯然無與樂成遂因絶筆今略編次見在者凡九十人詩二百二十首為之小集成一家之言若訥天寶中進士秦雍皇居田疇為上若年有豐耗稅則等差相彼老農聿求多稼勤其四體庶彼千倉必也如京如坻無廢周公之典然而不足與足何恥魯侯之問縣司雖守文不替訴者亦舉直難違豆區之量必均過半之詞自息
