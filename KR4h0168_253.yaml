front:
  text: 全唐文欽定全唐文卷二百五十三蘇頲四
  hash: sha256:35ebd4af17f0cb827fedda3250d34e05d89b91c422673300bc25bb05895d2ae8
body:
  text: 黃門楚州刺史上柱國南安縣開國公秦守一才稱幹理迹遊文藝敏而當劇明以燭姦星闥副於求郎河東美其為宰事殷輦轂時佇絃歌既揚百里之風更緝萬年之政可通議大夫行萬年縣令勳封如故主者施行敕朝議郎守尚書戶部郎中上柱國趙升卿識融而遠心密而堅行副其才文參於吏遊刃之美盡中桑林含香之能獨推蘭握市朝所令輦轂惟溱宜拜神京之宰用懲俠窟之姦可守長安縣令散官勳封如故黃門正議大夫行尚書職方郎中上柱國鄭璿士門雅望名教是先吏道通才聲塵自遠嵩邙帝宅周漢王都宜回起草之能佇息鳴桴之聽可知河南縣令散官勳如故主者施行黃門正議大夫行汾州長史崔隱甫抗迹清循在公明察素稟才識早聞練故以正而不撓和而不同乃眷有洛是稱中土百里居官四方作則宜副曹攄之選俾旌王渙之能可檢校洛陽縣令散官如故主者施行門下正議大夫行雍州藍田縣令元欽裕從政美才幹時良具山稱多玉已鳴絃於屬城地是雨金將候蹕於馳道使助王欣之辨宜符尹賞之遷可行雍州櫟陽縣令散官如故敕朝議郎行岐州陳倉縣令韋光業效官敏濟臨事明察嘉其墨綬聲巳掞於雞祠遷以黃圖政佇成於鹿苑可京兆府高陵縣令敕朝議郎守豫州司馬上柱國艾敬直恪勤官次精練文法往持憲共憚清嚴頃擁使車旌別淑慝好龍遺迹乘鳬舊壤俾州閭之創建佇邦國之成謠可守仙州長史散官勳並如故黃門皇三從兄前洺州司馬守一等自登官序並穆政聲趙際燕陲漳濱淇上控河朔之風土盡山東之郡國宜膺別乘往佐專城可依前件主者施行黃門通議大夫前行剡王府咨議參軍事上柱國韋抱真早以才地久登班序清徽藹然素風罔墜頃遊朱邸嘗寵於背淮俾騖緹軒往之於封虢可依虢州別駕散官勳如故主者施行黃門朝議大夫前行襄州司馬員外置同正員韋表玘風韻融朗文詞富贍故得朝列著聞選曹甄擇漾流為漢嘗藉美於珠皋泗達於河爰馳聲於磬水可守泗州別駕散官如故主者施行黃門朝議郎殿中尚乘奉御兼隴右南牧使張景順襟靈俊爽識具甄明代嗣僕臣家傳馬政慎言且聞於舉策能養曾靡於缺銜惟在坰之可稱彼量谷之伊佇既叶抽奬仍循職事可守原州都督府別駕餘如故主者施行門下中散大夫守興州刺史輕車都尉溫慎微門遺清白家傳詩禮外鳴謙而益光中造理而能密書工懸帳賦掩馳輪間達彰其起草仁明最於分竹乃眷惟揚之藩是稱重江之奧端寮所擇僉議攸歸可守揚州大都督府司馬散官勳如故黃門太中大夫前守榮州都督借紫金魚袋上柱國樊侃早負文詞纍遷省闥頃揚才智受任軍州敏以邀功斷而臨事峨眉作鎮鱉靈開國惟巴蜀之險接西南之夷式遏撫循尤擇時望端寮副職俾承朝委可行益州大都督府司馬餘如故仍知蜀川防禦副使即馳驛赴任門下朝散大夫使持節黃州諸軍事守黃州刺史馮光嗣忠信立名見推人物朝散大夫守相州別駕上柱國鄭國公楊獻通明應務雅有吏能頃在中朝各登清貫自居外郡頗聞政績連率之府二職為難宜膺並命之榮以副缺官之選光嗣可守揚州大都督府司馬散官如故獻可守潞州大都督府司馬散官封如故仍並馳驛赴任敕朝議郎行司農寺竇慈遜爰以幹用歷登班秩憲曹農府星籥未深雍畤岐山絃歌所屬宜遷子男之邑佇聞人吏之謠可岐山縣令散官如故敕前常州晉陵縣丞畢懷亮踐言立行希高慕古弓旌之禮方議於徵辟軒冕之榮每聞於退讓厥聲則遠斯道不渝須嘉賢良可鎮浮競遂其彭澤之志用表太邱之德可滁州清流縣令敕朝議郎行監察御史吳太元清以立身嚴以持法謠成避馬實憚於霜威政佇遷蝗俾聞於風教可行宋州宋城縣令散官如故敕朝議郎前行榮州都督府倉曹參軍上柱國王璬早聞幹用兼擅籌畫龍城達邑俾居銅墨之班鯨海安波仍掌舳艫之事可行營州柳城縣令散官如故仍充海路押運糧使黃門朝請大夫新除河南府司録參軍事陽洽慎則能密清而又公任之養人特曰循吏朱鉤應務迹豈滯於中京墨綬宣風才可臨於大邑可蒲州安邑縣令散官如故黃門朝議大夫前行鄧州長史上柱國臨淄縣開國男于光庭早聞詩禮兼著詞學歷職有聲在公無撓宛潭菊水未旌理劇之能漢邑桐鄉式佇宣風之最可行絳州聞喜縣令散官勳封如故門下惟嶽有五太華其一表峻皇居合靈興運朕恭膺大寶肇業神京至誠所祈神契潛感頃者亂常悖道有甲兵而竊發仗順誅逆猶風雨之從助永言幽讚寧忘仰止厥功茂矣報德斯存宜封華嶽神為金天王仍令景龍觀道士鴻臚卿員外置越國公葉法善備禮告祭主者施行門下古者帝王受命以臨萬國子弟建封用尊五等其所由來尚矣尚書右衛大將軍衡陽郡王成義等敦詩執禮本仁祖義名教之樂得自幾深溫良之容發於忠孝晨趨魏闕則望掩軒霞夕賦曹園則思含澄景朕祗奉歷數旁稽載籍克輔王室所謂通邑大都俾為唐藩故能帶河礪嶽分膺往命咨爾闕慎歟可依前件仍各實封一千戶餘並如故主者施行門下養老乞言是謂侑禮建侯專國因而有命特進行前尚書僕射同中書門下三品上柱國酒泉郡開國公致仕唐休璟才實王佐行為物範自綜理朝綱謨猷揆政文武必濟義存冊公忠不回誠亮始終逮子房休事廣德遺榮雖樂在黃金而慶逢蒼玉重其行賞孰若優賢宜傳帶礪益增土宇可進封宋國公食邑三千戶餘如故主者施行黃門聞鼓鞞之聲者則思於將帥裂土茅之賦者則念彼勳庸右羽林軍大將軍兼安西大都護四鎮經略大使上柱國太原郡開國公郭虔瓘忠壯超倫智謨絶等決勝千里懷孺子之兵符通知四夷有老臣之戎律往者鎮於荒裔獨守孤城煮弩而其人益堅引弓而彼衆不敵故得愛子染鍔名王解辮穹廬掃地而將空沙漠聞風以歸附功則茂矣朕實休之宜誓山河開其井邑可進封潞國公食邑三千戶仍賜實封一百戶餘並如故主者施行門下古之書甲令銘太常若不撫翼青雲馳光白日未有君則議賞速為善而知勸臣亦避榮保流謙而益受豈非君臣之際感通之理然也新除銀青光祿大夫守戶部尚書崇文館學士趙國公王琚體融純綷鑒徹精微謨猷濟時詞學辨政新除銀青光祿大夫守工部尚書楚國公姜皎宏才倜儻勝氣清明含章掞發臨事條解新除銀青光祿大夫殿中監宋國公李令問居惟密靜胄實勳華率禮而和立言以信或受釐則問或捨講相得非直蕭曹不遠自我之舊故能管樂咸起致豫在斯頃掃㣥凶繄賴其力爰升茂寵同辭厥位誠非易奪義所難違俾增秩於掖垣更回班於殿省仍加井邑以答元勳琚可行中書侍郎俸祿防閣品子課等一事以上同三品給加食實封二百戶通前滿五百戶皎可殿中監仍充內外間廣既使加實封二百戶通前滿七百戶令問可行殿中少監兼知尚食加實封二百戶通前滿五百戶散官封學士各如故主者施行黃門諸女皆封先王之制第二女等慶聯霄漢體自穠華常閲禮於后庭必聞詩於師氏朕撫臨億兆憲章古昔俾裂河山之賦用疇湯沐之恩可依前件主者施行黃門兵部尚書兼紫微令監修國史上柱國梁國公姚崇妻滎陽郡夫人鄭氏滎河地緒簪組家聲輝相門以才淑冠邦族而婉嫕蘭儀蕙問式備言容習禮聞詩載兼圖史金彞作輔爰開土宇之封石窖承榮宜表珩璜之盛可封鄭國夫人主者施行門下太僕卿員外置同正員賀蘭琬母楊氏家臨桃塞門映蓮峯賦蕡實於周詩承纍葉於台相言成針戒淑慎其儀德憲圖史間和其性正家貽則徙宅成規姻親載隆寵章猶闕宜比絳紗之學用膺青綬之命可封宏農郡夫人主者施行門下天下神器非上聖無以運其機域中大業非元良無以固其本欽若靈命寅奉神宗屈己順人用安四海承祧主鬯實貞萬國頃者家臻大憫在疚惟憂梟獍滿衢豺狼塞路武職戎政必任凶族國要時權咸升逆黨社稷之守但望包桑忠義之懷誰其艾階禍稔惡伺隙乘閒煩言碎辭所不勝述皇太子隆基正氣凝姿端命育德自家刑國英徽日甚移孝為忠雄謨電發北軍馳入掃欃槍於紫微南宮反正開日月於黃道平亂寧國翼戴朕躬一旅不勞功逾復禹七德咸舉事邈興周聲應吹銅望歸當璧今遣司空讀冊侍中授璽實由立義豈曰尚親承華肇開元嗣以建方流樂風之緒宜申洊雷之澤一作宜申洊雷之澤仍紀景雲之瑞朕爰初踐極喜氣呈祥天人叶心象緯昭貺官名有紀年號用憑可大赦天下門下朕聞曾氏之孝也慈親惑於疑聽趙虜之族也明主哀而望思歷考前聞率由舊典重俊大行之子元良守器往罹構閒困於讒嫉莫顧鈇鉞輕盜甲兵有此誅夷無不悲惋今四凶咸服十起何追方申赤暈之冤以紓黃泉之痛可贈皇太子主者施行門下朕聞天授命者為天所豫人歸德者為人之主故崇高有莫大之尊司牧有非常之號蓋承天敘而立人極也我唐丕業克開之初朕以眇身託元元之上紹休聖緒欽若昌圖戢多難而拯綴旒蕩㣥凶而夷觸柱下安區宇上戴君親朝廷以乂家國以治斯又叶天心而從人願也太上皇釋海內之重負官公闕一字之遠情以朕功宣提劒運膺拜紐爰奉睿謀總親庶政日慎一日問安以慶於三朝為子為臣順色靡遑於五讓虔共若厲寢興是祗賴遐邇宅心戎夷內面奠淳風於寬大思致俗於仁壽而王公卿士獻書草議陳帝王之籙考天人之符乃以鴻名加於菲德然則徇至公之議難以私拒當至誠之請不可詞奪涉川罔濟當寧興懷敬遂禱祈益增寅畏所請上尊號曰開元神武皇帝者宜依有司可涓日練辰虔告郊廟詳諸舊典備禮進冊布告天下咸使聞知主者施行敕朕聞召公曰弗作無益害有益孔子曰奢則不遜儉則固斯乃聖人之至言矣叔代遷訛僻王驕縱惟崇於玉杯象筯不勝於捐金抵璧好之者君也習之者人也即用匹帛服長纓之類歟朕爰在幼沖每期質朴手未曾持珠玉目未嘗觀錦繡願言其志造次不忘自寅奉休圖勉康政道常想漢文衣綈之德晉武焚裘之事竟未能令行禁止敦本棄末朕甚懼之今王侯勳戚下洎廝養所得者重於遠所求者貴於異雖雕文刻鏤衣紈履絲習俗相誇殊塗競爽有妨於政無補於時豈朕言之不明教之未篤也且一夫一女不耕不織則天下有受其飢寒者今四方晏如而百姓不足豈不以尚於珠玉珍於錦繡墾田疇而奪其務出布帛而害其功歟其珠玉錦繡等自今以後切令禁斷如更循舊弊並歸罪長官仍令御史金吾嚴加捉搦州牧縣宰勸督農桑待至秋收課其貯積使人知禮節俗登仁壽有司仍為條例稱朕意焉敕古之王者代有史臣以日繫月屬詞比事舉而則書用存有法事而不法是謂空言蓋褎貶之重慎也自非經術文雅進德修業出忠入孝匡俗佐時惟朕寶臣有邦良輔者孰可綜核班紀發揮蒼籀銀青光祿大夫守中書令上柱國燕國公張說銀青光祿大夫守兵部尚書同中書門下平章三品上柱國梁郡開國公姚元之等並可監修國史餘各如故主者施行黃門朕聞顏回知過不無過也蘧瑗知非不無非也孔子曰過則勿憚改過而能改善莫大焉此則古之賢人所未能闕一字朕祗膺駿命光闡鴻猷思革穨風以清貪吏作程者不要於密貴於必行行令者不要於嚴貴於適中比歲或使者廉按或憲司繩糾未能發明大體頗亦委曲小疵殊異恢恢之言遂行察察之事一從過誤永點彞倫銓管不許其廾瑕簿書寧容其刷恥懷才則每歲見斥登用則終身蔑聞靜言思之誠未為得夫學以從政祿以代農代農不可易業從政不可紊序永鑒前弊當無廢人改而更張朕之志也官人負犯經洗滌赦闕一字者宜並除痕選日量舊資依選例處分諸使通狀事或有枉斷豈無失承前要須却纍通狀人然始為雪各懼罪及致有冤人其訴枉屈人任申牒刑部事狀似枉者為牒本使勘問盡其道理無本使者追本案為其尋究應雪者本司斷後委左右丞更審詳覆然後牒所由闕一字司除痕并牒紫微黃門附簿諸處百姓若被勾徵使人貪功既不納理州縣承敕又不敢放或已輸已役重被徵收或先死先逃勒出鄰保欲令貧弱何以安存自今以後有隱欺須勾者宜勾當年若事連去年者亦通任勾隔年以去更不在勾限其官典及前官隱贓在腹內者不在此例布告天下咸使聞知敕朕聞事君者必在至公行已者貴乎獨立如聞供奉近侍之輩比日因循廣有招攜未能周慎爰與朝列頗相闒茸苟非親表不合數至門庭多行請託便涉趨附眷言此弊須革前非宜體朕懷深自戒勵自今已後百官輒不得與入內供奉往還門下法之所設本以懲非令之必行期於禁止致理為要何莫由斯至如官典受贓國有常法承前雖有處分在外多未遵奉且不戒視成為暴不令而罰為虐豈含容之日久將訓導之未明歟朕情存畫一過欲不二恐愚人陷罪莫識隄防姦吏狥私自嬰徽纆永言於此明發興懷今日已前既往不咎從今以後有犯必繩朕不食言爾無荒怠所以勤勤懇懇豫戒凡百者蓋以罰止罰可不慎哉告示遐邇令知朕意主者施行黃門古者協和萬邦疇咨四嶽柔遠能邇明目達聰以變於人也自朴散醇漓割方回直失於德者格之以禮失於禮者助之以刑故懼羅網而畏書必振其綱而操其柄庶乎舉政之要也閒歲天下諸州嶽牧先充本道按察誠以今之刺舉昔之率連蓋欲為吏之黜陟審人之愁苦中念作姦犯科獲罪相次棄木或尤於拙匠采葑不遺於下體由是申命有司咸多敘用至於按察暫令休罷夫泉有魚矣雖見則不祥林有獸焉而為之不采與其存而勿用孰若狎以玩之俾便於時復修其政銀青光祿大夫益州大都督府長史姚巂處置兵馬使上柱國亠兊國公陸象先等早蘊宏量深甄大體清能勵俗仁以敦風必將檢御權豪昭明淑忒宜興化以樹善佇責成而求當可依前件餘各如故一事以上並準舊例處分本道所隸之州有偏遠不穩便者仍令所司量宜分割永為定額訖奏聞主者施行黃門上天降禍大行太上皇厭代升遐俾豫一人煢煢在疚攀號荼毒觸向摧隕百辟卿士等上遵遺詔下狥㣥心寰區任殷社稷務重資於聽斷不可暫缺遂力衰迷甫從勤請恭惟顧託之旨思致和平之化雖在荒瘵敢忘負荷是用泣血撫膺執喪視事夫后王者代天理物師表者助朕理人物之所以茂育人之所以蕃庶蓋遂其性而安其業也朕每置旌進善仄席翹賢恐閭閻有愁苦之聲草澤無明揚之舉吏或慢法官或非才因之致理且未為得其何以廉敗政恤冤刑問丨旬兮嫠招茂異寬賦斂節更徭使天下為無為事無事也頃分連率則曰使臣將求人瘼克宣朕命諸道按察使揚州長史王志愔廣州都督宋璟益州長史韋抗博州都督程行諶汴州刺史倪若水魏州刺史楊茂謙靈州都督強循潤州刺史李濬荊州長史任昭理秦州都督張嘉貞洪州都督楊虛受梁州都督張守潔等並邁迹垂憲偉才通識有其直方無所回避宜令各巡本管內官人有清介獨立可以標映士林或文吏兼優可以潤益邦政者百姓中有文儒異等道極專門或武力超倫聲侔敵國者並精加訪擇具以名聞其官人有老弱及久病妨於政理并才用劣下全不稱職者上佐巳下委使人便停務其官交要者便清勤人權攝其京官及畿內州委御史大夫及吏部官長準此詳察録奏諸道僻遠州及嶺南道委使人量差判官分道巡按其天下囚徒慮有冤滯宜令大理寺及本巡使所在按理流罪已下非犯名教及官典取受並聽減一等收贖即使非理均事可疑者並杖以下罪並宜放免緣山陵所科夫匠等有父母年老家無中男巳上者容其侍養不須差遣其河南河北遭蝗蟲州十分損二巳上者差科雜役量事矜放百姓聞有不穩便事委按察使與本州長官商度隨事處分奏聞布告遐邇令知朕意主者施行敕苛慝不作人斯無怨寬猛相濟政是以和周禮以官刑糾邦理以官敘正㣥吏允迪前烈式惟舊章且夫寰宇至大不可以周覽黎氓至殷不可以獨化熙我庶政實惟具寮苟非其才罔以稱理朕惟夙夜不遑晏寧言念政道載深宵旰頃開元之初分遣按部糾摘姦犯頗聞懲息以其事久則煩尋亦從其停廢帛丿糸以歲月浸成寬弛今聞在外官寮多違憲法牧守則寄任茲重令長則祿秩且優亟聞侵竊屢有章奏雖賜金為惠未愧張武之心而還珠表德罕見孟嘗之政豈敦諭之意未孚於就列將貞高之節有謝於前修永懷於此良用沈歎且政寬而慢法弊則通弛而張之庶其致理御史大夫王晙等並識通政要位以才達茂其聲實宏此憲章宜分命巡按以時糾察巡內有長吏貪擾訟獄冤滯暗懦尸祿苛虐在官即仰隨事按舉所犯罪狀並推鞫準格斷覆訖聞奏仍便覆囚夫牧宰之任教道是先録曹之職綱紀斯在其有政績殊尤清直獨立者咸以名薦舉餘官有清白著稱及諸色不善各別為科目同狀奏聞其尋常平狀無不須通俾夫善取其尤罰無所濫疏而不漏密不為苛必將正其源流宏彼綱目不可總此煩碎擾其吏人應是州縣常務事非損益者使人更不須干預其百姓麥下不支濟應須處置事有不便於人須釐革者與州縣商量處分訖奏聞宜副虛佇之懷以光澄清之舉其外官充使者至明年冬入朝京官須奏任量事來去判官任使擇各依前件門下朕聞守在四夷蓋安人以和衆加於百姓豈窮兵而黷武然則日之所出弗俾於化故知天之所討必龔其罰自默啜虔劉肆暴桀驁反常獨為匪人假命驕子者有歲時矣雖奉書就邸或遵於聲朔而控弦犯塞已毒於彊場朕惟務懷柔每存含忍遂使庶邦憤積稽其六月之師逋寇禍盈窮此百年之運金山道前軍大使特進賀獵毗伽欽化可汗突騎施守忠二庭貴緒萬里威聲忠而善謀勇則能斷自膺殊禮名寵於外藩思立大勳志勤於中國兼遣弟右監門衛將軍守節長驅沙漠直指金微默啜舉其種類來相抗拒近殪於鋒鏑之下已若亂麻遠慮於廟堂之上將同破竹堅昆在右犄角而東並纍獻封章請屠巢穴朕又聞不得已而用者孰若兵機不可得而違者乃符人事永言取亂宜戒徂征右領軍衛將軍兼檢校北庭都護碎葉鎮守使安撫十姓呂休璟心堅鐵石氣橫風雷始則和戎之利先得晉卿終而逐虜之功方邀漢將可為金山道行軍大總管北庭副都護郭虔瓘安處哲等懷才抱器蓄鋭俟時慣習軍容備知邊要並可為副大總管領瀚海北庭碎葉等漢兵及驍勇健兒五萬騎金山道前軍大使特進賀獵毗伽欽化可汗突騎施守忠領諸番部落兵健兒二十五萬騎相知計會逐便赴金山道朔方道行軍大總管右武衛大將軍攝右臺大夫同中書門下三品上柱國韓國公張仁亶文武將相莫之與京心腹大臣是所繄賴當分閫之任受升壇之律常願身先士卒不以賊遺君父與副大總管右監門衛大將軍魯受信等領蕃漢兵募健兒或用絶㣥飛騎城傍等十五萬騎赤水軍大使涼州都督司馬逸客外寬內明正辭直道標慷慨之節曾不顧身蘊經營之志期於盡敵與右武衛將軍陳邱右金吾衛翊府中郎將李元通副使右驍騎衛鹿陵府折衝能昌仁左衛神山府折衝陳義忠等領當軍及當界蕃漢兵募健兒七萬騎豐安軍大使靈州都督甄粲副使張趙璧常元寂等領蕃漢兵馬六萬騎防禦㣥牧大使臨洮軍使甄亶領當軍莫門積石等軍馬募及秦蘭渭城等州大家子弟總二萬騎建康軍使甘州刺史李守徵玉門軍使肅州刺史湯嘉惠墨離軍使州都督李思明伊吾軍使伊州刺史李眘交等各領當軍兵馬與突騎施守忠呂休璟等計會共為表裏莫不運其長策悉心而效六奇接以短兵指掌而論七縱使天陳齊舉雲置備設賈勇於飲醪之夫以一當萬揚威於汗血之騎左縈右拂咸挈黿斬蛟曳牛佩豕必能力簸窮海聲壓大荒刈谷蠡之庭拔扶渠之壘不遑渭橋之拜已見陰山之哭然則持旌節執金鼓者所以問不賓誅首惡而比夫不誡復迷則凶俾存開網之仁預軫焚舟之歎休璟所領兵馬甲仗一事已上仍依別敕處分主者施行黃門朕聞上古聖王之政理則教之以戰陳之以兵蓋威不讋而服不順也故始於禁暴終於偃革斯不得已而用之朕以寡昧誕膺鴻業思欲率於動靜歸之教化豈要荒之外棄為匪人而亭育之中視則如子罔不遵我文軌修其貢賦歲時相望道路抵屬而默啜素稱桀驁鳴鏑於狼居頃自懷柔屢書於象魏朝廷所以許其通好議以和親使臣纍齎繒帛侍子令襲冠帶庶中國無事長城罷守戢干戈而銷劒㦸者朕之意焉豈謂我盟不渝爾約斯背伊庭之際遂敢侵軼西北偏隅尚聞嘯聚雖摧其精鋭而困於圍逼此不虞之失也朕甚憐之犬羊無親不可恃信而輕敵熊羆有勇咸能宣威而制勝朕由是詢卿士之奏攬英雄之心謀元帥而得佐軍恢遠圖而舉長策隨時之義其在豫乎兵部尚書兼紫微令監修國史上柱國梁國公姚崇天假其才日新厥德禮義為本居有四鄰謨猷是先坐知千里以仲山甫之操管夷吾之能智湧泉而不窮精貫日而愈勵信廟堂之柱石鼎鼐之鹽梅必能奮爾六奇光我三傑可持節靈武道行軍大總管管內諸軍咸受節度右領軍衛大將軍兼檢校單于大都護鎮守軍使張知運寬厚沈毅外方內直威而勇決自攝單于之臺惠則撫循咸仰將軍之樹可中軍副大總管權檢校原州都督李欽憲家承將相器兼文武求古人之節臨事不回讀前史之言好謀而斷可左軍副大總管檢校左威衛將軍靈州都督呂休璟慣知邊要久探戎律誠期報國去病安用家為奮不顧身伯昭不持賊遺可右軍副大總管左驍衛將軍論弓仁右金吾衛大將軍勿部珣左領軍衛郎將攝本衛將軍張直楷單于副都護臧懷亮右領軍衛中郎將王海賓前朔州刺史劉元楷右武衛郎將楊楚客并州定清府果毅元蕭然等頗牧為用關張其敵懷才倜儻嘗邀百勝之功立志經營備習尤章之訓弓仁及珣並可前鋒總管直楷可左虞候總管懷亮可右虞候總管海賓元楷楚客蕭然等並可行軍總管太僕少卿田崇璧鄜州刺史韓思復等強力從政精心在公知無不為利有攸往入敷事典省閣稱其間練出綜條察吏人畏其嚴明崇璧可兼行軍長史思復可兼行軍司馬兵部郎中李休光司勳郎中張敬忠兵部員外郎王上客刑部員外郎楊欽明江州別駕李雍等或特達圭璋所謂登壇之寶或翩翩書記曾聞及霤之詞可以光贊出車宏宣入幕並可行軍判官靈武軍兵加滿十萬人舊馬既少宜於內外間廣既抽壯馬添滿六萬匹原夏等州要害處亦量加馬其後軍兵六萬人馬二萬匹先來點定宜令衛尉卿李延昌左羽林將軍楊敬述等至冬檢閲且當處團結待後進止其有先鋒破賊斬馘摧堅功效灼然者並委軍將便定功賞不須限以常格總管以下有損失兵馬不能力戰棄軍逃命者便殺其有棄軍入賊不能死節者妻子依叛緣坐法凡此和衆誓於師兵統燕犀冀馬之雄屯斬蛟挈黿之勇鼓鼙沸野旌旗彗雲豈式遏於河塞方震驚於沙漠於是乎簞醪以信之芳餌以賞之戮揚干之僕必行其令持穰苴之兵不枉其法堅壁清野則投石而有餘追奔逐北則掃塵而無類俾權宜於閫外仍布告於天下暫勞永逸在此行焉主者施行黃門朕聞天所與者奉天命而不違人所棄者順人心而必伐由是古先帝王光宅區縣實仗威武用清荒戎時義遠矣默啜以叛亡餓隸凶忍遺孽敢迷聲朔獨匪人臣禍皆所召祅不自作舉其巢穴盡是離心瞻我闕庭相望內面猶竄身於寒苦且寄命於旬時當胡運之已窮在軒兵而可逐九姓部落等忠誠貫日義烈聞風數其擢髮之成於屈指之計請除驕子纍遣使臣摧鋒而願先驅蓄鋭而期後命右羽林軍大將軍朔方道大總管薛訥左衛大將軍安北副大都護兼剡王府長史平郡公張知運右羽林軍將軍兼涼州都督赤水大使楊敬述右騎衛將軍論弓仁左武衛將軍大武軍大使于仁誓右武衛將軍豐安軍大使杜賓客豐州都督西受降城使呂休琳勝州都督東受降城使邵宏左金吾衛大將軍回紇伏帝匐右衛大將軍渾元忠左衛大將軍似和舒右武衛將軍兼賀蘭州都督契苾承祖等或出將入相有經濟之才或敦詩閲禮有韜鈐之算或嫖姚仕漢有遮虜之勳或由余入秦有伐戎之策謀彼元帥擇於佐軍可以授旗遂行推轂而進訥可中道大總管賓客宏休琳等為副知運可東道大總管弓仁仁誓為副敬述可西道大總管伏帝匐元忠和舒承祖等為副各領馬兵二萬人與九姓計會三軍既整百道齊入吳鈎楚練照曜陰山之峰冀馬燕犀張皇窮漠之地況彼寇惡積我師義動知存亡者觀其兆摧枯朽者鮮其力庶使彊場罷候從此息人邊鄙不虔因而盡敵布告天下咸遣知聞主者施行黃門朕聞遂物之宜上則聽其和樂違人之欲下則生於怨思一物安可弗遂萬人安可固違且先王卜征觀乎風俗大易順動應乎天地由是巡以五載尚遍於人寰設為兩京況稱於帝宅東幸西顧乃其常也然朕以行必清道不為無事至而供帳是則有勞故恤人之隱憂人不足於今四年矣遂使東土耆老傾心而徯豫中朝公卿屢言以沃朕或謂國之中洛王者上地均諸侯之賦當天下之樞陸行漕引方舟擊軑費省萬計利踰十倍更知夫便於物者非自奉以懷安嗟於人者豈不誠而阻怨於是乎見品彙之阜因京坻之饒則無奪農矣陳太師之言獻史臣之頌則無缺政矣信可以備法駕乘陽春歸於成周布我時令以來年正月五日行幸東都仍取北路所司準式主者施行黃門周宅中土秦里上田皆王者之都也時邁觀風載巡展義皆王者之政也朕嗣守宸極頗移年所冕旒而視心每周於萬邦車轍所屆迹不出於三輔豈懷安以憚勞姑省費而休力然以設京師者不偏於西據奉宗廟者亦俟於東征安可阻從人之心增徯豫之怨是用闓陽發歲練日辰乘和風以應物御惠風以行令永言告至載叶伻來顧茲菲躬畏此鴻業下輦而有宮室即舊不加登臺而有山川覽今猶昔森然在目用軫於懷思宏遠圖俾作寬典不忘師古之義特布惟新之渥可大赦天下自開元五年二月三日昧爽以前大辟罪以下罪無輕重已發覺未發覺已結正未結正繫囚見徙常赦所不原者咸赦除之唯謀反大逆不在赦限云云夫政欲清靜詞尚省要閒者思致於乂未臻其道文書盈几閣而吏益欺詔命下閭里而人莫諭得非失於抵牾弊在煩蕪邪而易從禁則難犯令式格敕有不便者先令尚書省集議刊定宜詳厥衷合於大體亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下知朕意焉主者施行門下觀俗省方所以愛人治國尊崇廟號所以事神享親欽若昔典此言大哉朕祗膺鴻業積念咸秦去歲欲幸洛京已發成命旋屬重營太廟因將中止誠以其繩則板功且未即展軨效駕信弗可違終肆勤於東方恆載馳於西土流晷不駐通喪永畢象居始成如在增慕朕之茲志日夕匪遑乃可以詩陳肅雍禮極禋祀神明之奧時惟雍州稼穡有年莫若關輔王假用告后來其蘇實獲我心俾從人欲可以今年十月取北路幸長安所司準式務在節省無得勞費主者施行
