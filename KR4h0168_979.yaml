  - {type: head, offset: 306, content: 乙有女樂一部御史按之云見任四品清官仰處分, id: KR4h0168_NFKB_979-h6, level: 2}
  - {type: head, offset: 431, content: 對笛判, id: KR4h0168_NFKB_979-h7, level: 2}
  - {type: head, offset: 431, content: 甲制碧鮮以當簻本四加一所由科其不節訴不伏, id: KR4h0168_NFKB_979-h8, level: 2}
  - {type: head, offset: 587, content: 對樂師教舞判, id: KR4h0168_NFKB_979-h9, level: 2}
  - {type: head, offset: 587, content: 甲年十三為國子樂師教之舞象甲不受命樂師將撻甲云違禮不伏, id: KR4h0168_NFKB_979-h10, level: 2}
  - {type: head, offset: 789, content: 對習結風技判, id: KR4h0168_NFKB_979-h11, level: 2}
  - {type: head, offset: 789, content: 得乙習結風之技縣長以其惰業責之, id: KR4h0168_NFKB_979-h12, level: 2}
  - {type: head, offset: 923, content: 對瞽相判, id: KR4h0168_NFKB_979-h13, level: 2}
  - {type: head, offset: 923, content: 得太常備宿懸於大祭有瞽而無相步所由請罪之, id: KR4h0168_NFKB_979-h14, level: 2}
  - {type: head, offset: 1165, content: 對未上假借判, id: KR4h0168_NFKB_979-h15, level: 2}
  - {type: head, offset: 1165, content: 丁受官未上於所部假借科其罪監臨不伏, id: KR4h0168_NFKB_979-h16, level: 2}
  - {type: head, offset: 1233, content: 對乾沒稍食判, id: KR4h0168_NFKB_979-h17, level: 2}
  - {type: head, offset: 1233, content: 乙主稍食輒自乾沒為方書所劾, id: KR4h0168_NFKB_979-h18, level: 2}
  - {type: head, offset: 1330, content: 對取錢授官判, id: KR4h0168_NFKB_979-h19, level: 2}
  - {type: head, offset: 1330, content: 得楊甲選以錢十萬金三十斤求山乙得官後被告大理以甲選數合畱官不越次會恩洗滌甲不解任錢金不追刑部斷甲解見任徵乙金錢, id: KR4h0168_NFKB_979-h20, level: 2}
  - {type: head, offset: 1420, content: 對受囚財物判, id: KR4h0168_NFKB_979-h21, level: 2}
  - {type: head, offset: 1420, content: 丁受囚財增其語贓輕減罪省司駁議非當鬻獄, id: KR4h0168_NFKB_979-h22, level: 2}
  - {type: head, offset: 1496, content: 對脫枷取絹判, id: KR4h0168_NFKB_979-h23, level: 2}
  - {type: head, offset: 1496, content: 祁陽縣尉董則任大理獄吏與囚脫枷取絹兩匹斷除名, id: KR4h0168_NFKB_979-h24, level: 2}
  - {type: head, offset: 1624, content: 對吏犯徵贓判, id: KR4h0168_NFKB_979-h25, level: 2}
  - {type: head, offset: 1624, content: 吏人犯枉法贓會恩免罪所由不徵正贓御史舉以非枉法不伏, id: KR4h0168_NFKB_979-h26, level: 2}
  - {type: head, offset: 1730, content: 對主簿取受判, id: KR4h0168_NFKB_979-h27, level: 2}
  - {type: head, offset: 1730, content: 外州申屬縣主簿部內取受州將不之罪也出錢與之, id: KR4h0168_NFKB_979-h28, level: 2}
  - {type: head, offset: 1847, content: 對尉用官布判, id: KR4h0168_NFKB_979-h29, level: 2}
  - {type: head, offset: 1847, content: 鄖縣尉單則將官布七百端質錢還債經一百日合科何罪, id: KR4h0168_NFKB_979-h30, level: 2}
  - {type: head, offset: 1947, content: 對不奠其祿判, id: KR4h0168_NFKB_979-h31, level: 2}
  - {type: head, offset: 1947, content: 得主司納錢不奠其祿致令不可覆校, id: KR4h0168_NFKB_979-h32, level: 2}
  - {type: head, offset: 2122, content: 對奇請他比議判, id: KR4h0168_NFKB_979-h33, level: 2}
  - {type: head, offset: 2122, content: 法司以奇請他比議為蠲除而畱臺持之不宜數變乃引聖智之所為患, id: KR4h0168_NFKB_979-h34, level: 2}
  - {type: head, offset: 2275, content: 對誘人致罪判, id: KR4h0168_NFKB_979-h35, level: 2}
  - {type: head, offset: 2275, content: 甲誘丁致罪令其同坐云人各有心, id: KR4h0168_NFKB_979-h36, level: 2}
  - {type: head, offset: 2372, content: 對因丑致罪判, id: KR4h0168_NFKB_979-h37, level: 2}
  - {type: head, offset: 2372, content: 癸因丑致罪所由欲科之及丑自死癸云罪人則亡我更何若所由亦不知作何處分, id: KR4h0168_NFKB_979-h38, level: 2}
  - {type: head, offset: 2449, content: 對犯徒加杖判, id: KR4h0168_NFKB_979-h39, level: 2}
  - {type: head, offset: 2449, content: 乙犯徒訴家無兼丁縣斷加杖人告其有妻年二十一以上, id: KR4h0168_NFKB_979-h40, level: 2}
  - {type: head, offset: 2535, content: 對解桎判, id: KR4h0168_NFKB_979-h41, level: 2}
  - {type: head, offset: 2535, content: 得甲送徒道解桎梏恣所過御史糾訴云剋期俱至無違者, id: KR4h0168_NFKB_979-h42, level: 2}
  - {type: head, offset: 2670, content: 對刑罰疑赦判, id: KR4h0168_NFKB_979-h43, level: 2}
  - {type: head, offset: 2670, content: 甲刑罰之疑俱赦有司以刑不上備省科之云適輕下服諸罰有權, id: KR4h0168_NFKB_979-h44, level: 2}
  - {type: head, offset: 2758, content: 對犯憲罰判(判由闕), id: KR4h0168_NFKB_979-h45, level: 2}
  - {type: head, offset: 2975, content: 對兩貫判, id: KR4h0168_NFKB_979-h46, level: 2}
  - {type: head, offset: 2975, content: 甲先有兩貫一延州一屬鄯州為定甲訴云先屬延州, id: KR4h0168_NFKB_979-h47, level: 2}
  - {type: head, offset: 3084, content: 對兩貫判, id: KR4h0168_NFKB_979-h48, level: 2}
  - {type: head, offset: 3084, content: 甲先有兩貫一延州一屬鄯州為定甲訴云先屬延州, id: KR4h0168_NFKB_979-h49, level: 2}
  - {type: head, offset: 3243, content: 對移貫判, id: KR4h0168_NFKB_979-h50, level: 2}
  - {type: head, offset: 3243, content: 乙移貫所由以軍府州不許訴云今不簡點, id: KR4h0168_NFKB_979-h51, level: 2}
  - {type: head, offset: 3358, content: 對樂土判, id: KR4h0168_NFKB_979-h52, level: 2}
  - {type: head, offset: 3358, content: 人進素衣朱襮欲從於沃或告擅去云我聞有命不可告人, id: KR4h0168_NFKB_979-h53, level: 2}
  - {type: head, offset: 3500, content: 對還墳判, id: KR4h0168_NFKB_979-h54, level: 2}
  - {type: head, offset: 3500, content: 劉亨稱元是并州人因隋季而遷長安今請還就墳陵長不許去, id: KR4h0168_NFKB_979-h55, level: 2}
  - {type: head, offset: 3705, content: 對避市籍判, id: KR4h0168_NFKB_979-h56, level: 2}
  - {type: head, offset: 3705, content: 大理稱人多避市籍遠役自陷於圜土所以每年旨條別有處分不得如律若依旨則此刑將措若依法則無以代更請省定, id: KR4h0168_NFKB_979-h57, level: 2}
  - {type: head, offset: 3863, content: 對率家屬籍名田判, id: KR4h0168_NFKB_979-h58, level: 2}
  - {type: head, offset: 3863, content: 甲於鄉里率家屬籍名田乙告甲是賈人犯令沒入田甲訴云無市籍不伏, id: KR4h0168_NFKB_979-h59, level: 2}
  - {type: head, offset: 4000, content: 對是儀書衣主司舉正判, id: KR4h0168_NFKB_979-h60, level: 2}
  - {type: head, offset: 4000, content: 是儀鬻書衣於市或人告其不仁又鞏朔身為主司不舉正之術, id: KR4h0168_NFKB_979-h61, level: 2}
  - {type: head, offset: 4136, content: 對命農判, id: KR4h0168_NFKB_979-h62, level: 2}
  - {type: head, offset: 4136, content: 得習壤常命農夙駕桑田採茅為索人訴遇雨不充其役, id: KR4h0168_NFKB_979-h63, level: 2}
  - {type: head, offset: 4243, content: 對為人興利判, id: KR4h0168_NFKB_979-h64, level: 2}
  - {type: head, offset: 4243, content: 南陽太守好為人興利作均水刻石立於田畔採訪使奏煩擾訴云以防忿爭, id: KR4h0168_NFKB_979-h65, level: 2}
