front:
  text: 全唐文欽定全唐文卷九百七十九闕名二十
  hash: sha256:bf5df818b528b5569783166224caadad323fd81da7bd956aeb0453fa7b521ede
body:
  text: 六同分序則備禮文九夏成章式明詩頌所以賓射喪祭軍旅會同必將有陳罔或無度永言舂牘喻此安絃以諧八音實為三品伐檀欒於雲夢影落梢雲採貞徑於仙壇色移寒雪夙聞揮斫素列廣修因玉潤之呈姿節金奏以為用惟甲司至有昧欽承無相奪倫未求諸已不以其道輕欲訓人杳渺笙歌詎騫回於鳳影嬋娟篠簜殊髣佛於龍鳴應雅莫修塤篪坐缺至若教之陔夏用以娛賓候終宴而言歸慮沈酣而越禮為之行節肅以威儀釀取歎於傾家飲無醉於終日遵其聲律必在和均忽貽顧於周郎豈忘味於宣父不謀其政遐棄厥司當審詞以定刑庶先迷而後得應天為同合雷作氣殊以堵肆設其簴業式觀周禮爰命工人備物雕鐫兼飾丹漆怒鯨與翼鳴僉賦旁行將跳躍咸修因木生姿似得陰陽之氣異體分象各類清濁之音有何疏失以為細碎稽古未爽不伏何疑爵以馭貴樂以報功異其肆堵昭以聲文既比物以飾節亦安德而教和乙也銀艾蟬聯朱輪焯耀名稱貴士位列清班家乃伐冰朝膺食肉二肆未陳於縮霤一部且列於曲房事等馬融義符魏絳且窈窕間淑蛾眉麗姿樂則備於伶人禮可嬪於君子功化絲枲舞節鏗鏘稽命數而合宜在法令而何爽御史糾按無乃深文玉潤碧鮮靄青冥之秀色龍吟鳳吹發寥亮之飛聲始立制於工人方勸侑於君子簡易爰在繁會斯深惟甲練精而成厥象躋攀絶巘陟彼九成剸剡貞姿諡為雙笛撫羌人之效躅裁以當簻感越客而興悲方延作賦霜候無變寧俟斫磨風韻將調遠資律度加君明之後出畢以五音佇叔夏之前規奏其三調落梅香遍自滿風前折柳陰疏橫分塞上固無失於倫序宛有叶於和均不節論辜未知其可夏序殷膠建國重務養老齒胄先生大猷所以長幼分規道業差序或殊誦習將明告教射御書數分制則於樂章中和祇庸遵規儀於性府既大成以方就爰小舞而首陳必在準繩無或差忒興言國子辨慧斯文系彼勳華金張錫慶遵其禮樂游夏申勤學必幼儀言辭外傅年深舞勺乃踐上庠春誦夏絃深其順節尊師重道寧願踰間佩觿之辰成童未及摳衣之日舞象何先雖欲速於有知終見陷於無度儻乎聞一知二亦何守其彞倫必也非禮勿言固可徇之年限制於未亂詳茲雅得紀綱撲作教刑撫事難從捶楚舞以盡意用察其形或因序而持芬有傳規而去籥是以六英方變用禮神祇八允成章以和邦國雖聲歌而會理終鄭雅而殊制陳之典則誡以怠荒乙也妄庸居然訓習非策名於樂府潛託志於結風謂小吏之期仙鳳凰均影學參軍之式宴鸜鵒成衣長袖蹁躚未呈妙於風結鳴絃糾舉爰置罪於霜科足訓疲人誠為茂宰宜從改革無或因循禮以道志樂以和聲為儐詔而率先陳相步而汲引是立扶主之稱式陳視瞭之司相須而成兼濟為道乃鍾牙之比義實陳雷之喻堅等彼塤篪寧聞獨用均茲黼黻必在同施惟太常之官曹司雅樂之制度虔承大祭恭備宿懸杳杳嚴更滴銀壼而始唱鏘鏘逸韻考金奏而斯聞會彼伶人咸資瞽者心則通於師曠目非類於離婁子夏新名徒起移冠之號荊軻舊客終聞擊筑之娛質明而行已敷容於肅敬晏朝而退爰輟響於宮商祝史正詞良非矯舉相步乖位何懵規儀就以逡巡其誰告導若蒙泉之無適非大車之利往雖六變六同不齊其節而及階及席是闕於言良未展於扶主禮將至於顛越此而不罰其有何誅命官以賢底祿以道猶未蒞事胡為賄聞無魏子之悛心有叔魚之黷貨即為假借曾不內愧於躬式冒刑典仍欲外閔其過實叨懫之自速非監臨之謂何加言是丁不可逃罪列爵分官用資監守臨班掌務必藉廉平其有黷貨居心類長安之小吏不貪為寶殊宋國之司城時所未容法宜難捨况主茲稍食慢彼嚴章竊人之財從已之欲方書職惟糾謬用此繩違逐鳥居多彈梟遂允刑之所設本曰懲非罪即不誣任依輕典學古入官不聞黷貨以賢制爵安可非材楊甲人實妄庸謬參調選山乙志惟貪冒多受金錢良以職謝巨源賢慙伯起鴻猷載黜是則難容大理同拘自貽伊戚承恩合免雖則棘署守文會赦獨徵實亦仙臺直筆請依省斷竊謂為宜鬻獄賈直實誡魯史舞文巧詆用存漢策小大之察必惟其情輕重之權固茲無濫眷彼丁者職在監臨貨以藩身見魯豹之裂帶貪而速戾同叔魚之敗官且無屬厭難以末減省司忠告實謂平反刑政所存為國之本有倫有要宏慎斯歸就重就輕哀矜無失董則事緣贓賄斷被除名黷貨於無器之時定罪於有官之日問既承引斷亦甘心兩縑雖則難容雙啓終須審究脫枷狀非枉法準絹不至徒年除名雖據本條斷罪宜無覆定永州申上不詳前任之文刑部重尋妙得無官之例除名之坐未可依前罪不合徒何容濫罰肆眚從輕前王以之宥罪一成不變君子於焉盡心黠吏伊何罔知紀極貪藩身之貨自底不經沐渙汗之恩幸而獲宥雖小懲大戒既曰刑其恤哉而免罪徵贓尚謂罔之生也酌彼三尺折以片言柱後為官御史之舉非斯當頤中有物所由之不伏未孚敢肆剛腸輕申直筆束紳從官既擔人爵析圭銜命須代天工不息惡木之陰不畏貪泉之味豈溪壑其志山川其心錢且深藏非從地出金常密受不畏天知效無彰於萬分法宜加於三尺州將情為寬簡道取敦龎必令上化用孚將使下僚知恥若過而能改合道期於反經若情不自悛罰罪當於懲惡謂更研問方事科條單則策名稽下述職江濱才靡效於一身害已深於五蠹用公府之財酬私門之債虧貞節於箭巖汨清流於鏡水九章彞憲不惠姦渠三尺明科無捨刑故雖復陪填已畢終是濫竊成愆指事論情實嬰疏網披文按法或蔽蒙襟委諸兩造之司庶盡片言之斷正其歲會禮有明文録而書之物合定數莫不登於天府計以月成諒比要之可遵將奠祿而為準憑茲出納乃絶姦欺苟或差遺自貽乾沒龜玉在櫝宜勤夙夜之心刀布如泉何忽隄防之禁覆校斯闕罪纍非輕忝曰主司殊為曠職但三尺之法期閲實以定刑九兩之官闕連事而同坐必若甲乙俱犯上下相蒙規攘竊以故違自胥徒而共議物又全曠情實難容如其數則非多訊之為誤有納處而可驗恕不逮而須矜請紓辨璧之疑方置鈞金之罰政貴有常理惟體要明罰敕法取誡於先王議獄緩死致誠於君子俾其科條克敘輕重有倫惟齊非齊以殺止殺事必謀始則司契之義明道先仍舊則改作之功昧鄭僑鑄鼎猶慙叔向之言周滿作刑稱耄呂侯之策况聖君御物天下文明人識舊章國懸常典舞文巧詆非則於張湯捨虐從寬有依於定國矧乃漢盜陵土惟輕載美於釋之闕於昭八議誠以類而可徵永言三尺復何慙於師古率心無邪詩參履福作為背道經喻焚身若從惡而自貽將異罪而同罰利交相啖惟甲與丁鄰德不慕於田蘇樂禍更移於齊豹謗招惡子名近盜夸且飭躬無良以欲敗度誘人遷迹以義傷風六行共挂於爰書兩造不聞於在宥待窮實狀方置科條生諒不謹法必繩愆既三禁而無移在五用而難捨丑孽不可逭鬼得而誅癸戮出於身官慢其業雖天網不漏亦未失刑而職司是虧攸宜坐罪且罪有輕重失亦降差刑難變於一成減可從其二等麗刑務輕罰懲非死若膚受之訟則哀敬難原乙何人哉有恥未格不化厥訓自貽伊咎當從傅氏之策若赴驪山之徒謂無兼丁則合加杖而有配偶應是克家來訟無情未宜易法縣且失律豈曰能官人之糾謬斯謂不直法在安人刑忌留獄苟信不繼則噬膚而莫懲如得其情則緩死而無逸惟彼甲者奉詔送徒解其桎梏遵大易之利用申其甲庚係小子而且格承命為信義則乖於守官推誠於物仁或昭其恤下與其刑茲無赦利武人之貞曷若感而遂通資文明以悅且虞廷作法人不敢欺鍾離縱徒剋期而至有叶良吏無瀆簡彞欲依驄馬之糾恐越爽鳩之法先王立辟議事以制得情勿喜寧失不經故三宥以順時重一成而不改永懷中典亦謹無良惟罰與刑有疑俱赦厚倫正俗立教在寬二罪並興載難上備五聽無濫宜遵下服既有權而適道當惻隱而從輕不俾小懲將為允當分地而經立儀三市陳政以禁會商百族雖負販而有尊故質劑以結信莫不同其度量別以精粗荒札無征圭璋不鬻君平閲隱取給成都之錢漢武沈魂即覩茂陵之碗甲託茲闤闠徇彼盈虛耀邊鄙以為心雜良苦而成務稱無二賈未偶迹於神仙坐陷三章遂沈名於罪網至若憲罰徇罰中刑小刑既分夥於旗亭固非謬於圜土主司董訓未盡甄明舉而罰之雖則罪人斯得哀而喜也有爽惟刑恤哉且播肆之條誠其過矣示衆之譴無乃重乎在甲薄言均臘肉之遇毒主司苛政實刺骨而成寃復即命渝改之為貴義不可辱事當小懲宜麗本用申典正人則懷土狐乃首邱然蕩析離居罔能定極且甲義殊三徙編貫兩鄉作可封之比屋名標鄯部尋本枝之百代籍掛延州所以舊里馳誠是混新豐之犬故鄉搖思不食武昌之魚想邑呻吟深嗟變橘瞻關敬止實慕維桑欲遣三緘終無二見仙臺制則方闡長途匹夫之志信難可奪版圖一作籍隄防生靈綱紀用收一作悛不道是禁姦慝為政之要莫先此途若能守之人無散逸甲關西男子隴外遊客從沙塞之荒澤棄田園之故鄉先為流民近為編戶同狡兔之三穴匪王人之一心或因官遷數奇以建莊舄以班崇一作榮吟越鍾儀以幽繫思楚編彼樂土歌於歸來蘭署以鄯州臨戎人稀地廣留實邊戶公利實多割近甸之有餘助遐陬之不足依省為定又何可疑若從訴端詐道滋蔓桑梓必敬版圖是崇先王所以制萬國仲父所以居四人農商不遷首尾相援乙里親走集貫實軍府已習金鼓之聲誠堪晝夜之戰何得不懷吾土將樂他鄉雖四海為家孰匪斯人之適然九章作律元止所由之見縱使飛塵既靜裔土無虞猶存朝錯之實邊有慮宣王之薄伐訴無簡點深覺詞游寵辱若驚名器不假亮采有國欽若明憲知繁實之必披誠滋蔓而難除衣襮者何抑乃邦族桐圭錫寵晉國受其明命椒聊盈掬曲沃得其熾昌盍獻可持以匡乃辟胡棄即異取戾厥躬爰將樂於樹檀苟取徵於揚水遽聞有命擅彼適從未可告人且宜安土天工不曠王政有經懷遠附離則上克用乂勞謙匪懈使下無覬覦人而無良不率大戛或者之告允協舊章頃者江濱鹿走道喪隋風晉水龍興祚開唐運干戈忽起自下都而入上都雞犬亂馳辭舊國而入新國劉亨爾日正喜攀龍忽念此時旋悲去鶴顧惟舊浦偶咽水而分聲還念故鄉共行雲而動色秋林葉下遽失維桑春圃花飛俄傷故梓以為生金翠石黃絹仍存掛劒青松貞枝尚鬱四時節物供薦無由萬里蕭條歸寧莫遂冰狐夜聽首邱之戀不窮翔鳥晨驚懷土之悲寧輟披肝上請思切來歸零淚下霑悲深去國雖越吟楚奏幽顯頗殊而移尊就卑禮律通許宜依所請庶叶平反冀南國之禽罷思閩越東平之樹不靡咸陽裨販所興聞乎往代入四人之伍隸九市之籍邪贏所尚錐刀必爭曾不昏於作勞徒乘時以射利故漢之定法禁其未淫秦之設規謫以邊戍發號施令豈徒然哉且民者曰氓懵夫立理避要荒之征役棄父母之版圖雖欲利於飄蓬終見陷於圜土國家罪惟寧失德存好生濟寬猛於隨時審科條於庶慎大哉至化刑措其宜但能峻以隄防明其教令則有符古之道無遺一作其代之更政在養民何須如律道設彞倫用和萬物法垂禮典以制四人故版築隄防各順流而取濟導達㣥品咸徇義以取功甲本市徒早馳聲於鮑魚之肆更率家屬復求潤於龍鱗之田廣事兼并以取浮雲之利專行欺詐曾無多露之嫌商賈蓋藏已聞辜於漢律籍書攜二詎免咎於湯羅乙告沒田自得埋梧之術甲云不伏猶迷食椹之思此而不科刑章徒設請援明法用靜姦流是儀無上族變於勾吳鞏朔司軍績宣於全晉昔聯榮於方冊今異軫於旗亭至於質彼有無雖歸列肆譏其淫巧必在儲胥詭濫有彰典刑斯舉書衣創制編冊攸資厠緑篋以相輝雜紫荷而交映是儀所鬻非法貽譏既多謝於緹油徒獲愆於倍市不仁斯露刑故何逃眷彼主司宜從舉正委而不察事或有由更詰源流兼責名品所犯無謬方可用科為天者食分地而利惟茲習壤命彼老農庶夫四體克勤三事就緒乃脂車以秣馬及零雨以星言芃野是臨桑田攸稅宜其荷蓑荷笠載錫光陰爾茅爾綯不虧晝夜何乃當既泥而自廢假若濡以為辭使七月遺風將乖陳業三時務穡有闕成功既不昏於作勞誠可繩其惰役樂都既康太守成式念為耒之功而無鹵莽開均水之法以防忿爭故經界不正人將生心土田陪敦職競用力規子木偃瀦之政思桓公障谷之盟畚鍤星繁溝塍綺錯孫叔敖之霸全楚意在陂塘邵信臣之典南陽名因溉灌興利除害而人不爭雖歉康缺之薦及因京坻之有望俾知涯分無廢函活何使司之不明而劾奏之非允昔鄧晨開夢理鴻隙而滌源何敞效能流鮦陽而刻石揆今度古自合激揚糾謬繩愆妄云煩擾以茲獲戾不亦太過乎
