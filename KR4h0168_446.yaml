body:
  text: 殿紫宸兮足麗木朱櫻兮可嘉扶疏柔弱暈艷芬葩晚移陰於丹楹朝延影於翠華美其固本宸居獻名清廟藹緑含彩攢紅吐耀晴暘斜映將藻井以相輝初月旁臨與壁璫而共照於是元律方變青陽始萌日近易暖天臨早榮通條液潤附節茸生秦文信之著令漢稷嗣之從行莫不勤其時獻旌此嘉名將畫栱以斜界與金華而對明玉輦行低雲旗雜處迎華桂而搖露向朱明而清暑榮得其時摘得其所於芳也可尚取類也無匹淨拂璇題遠當溫室舊株昔移於漢囿密幹今逢於堯日及夫春宿微雨秋含翠煙冬條雪染夏實珠駢垂一枝於萬葉託沃土以延年玩芳誠百花之首充薦乃衆果之先代帷房之錦帳奪首飾於金鈿濟濟多士鏘鏘拜闕拂露華以晨趨染花香而夕謁始凌寒而驚換才及暖而前發自承恩於攀賞固無憂於翦伐伴穠李以表年笑階蓂之記月貞元初敷文教於率土念畋遊之無度啓鷙鳥幽縶之中示皇家不私之務將以致仁壽明好惡雕籠永閉念受紲之多虞金架爰辭俾凌風而得路由是縱逸翰於寥廓釋猛志於扃固當其海晏時清天高日明離習習之恩重視蒼蒼而體輕捨靈檻而方鋭歷秋林而上征乍遂翻空出君門而不返遙憐厲吻過宮樹而猶驚洎夫恤彼幽間順茲棲止用成端拱之化將盡好生之理足使去韝上而無疑顧人間而何以昔因殊顧幸食肉以見羈今降深衷忽雲翔而有始故得脫身聖代矯迹天衢方縱心於萬里詎斂翼於四隅山藪之思俄失觜距之衛寧無然則播仁風於坱圠乃順時以止殺戒逸氣於荒淫故無用於茲禽豈俟夫養育之勞既久徘徊之懼彌深雖多士盈朝無聞諫獵故黔首在下盡得歡心則知信及纖微念茲棲宿庶㣥情而知感期衆類之蒙福遂使擊搏之性將翱將翔乳哺之心既生既育是用保其鴻業建此深規惠澤爰臨整羽儀於戶牖微誠既展遂鳥雀於藩籬信九霄之可託將一舉而在斯於爍明德兮動休徵縈墨綬兮效素鷹朱草如之何所縈則止玉壺如之何所飲則承借如紫巖碧流煙深樹幽産鷹成羽自春徂秋含陰陽之淳粹任天地之剛柔懷好音與好質非成色而不求厭羽毛於原野戀主人而即留嗟乎含清履潔象君之節厲吻鈎鋭澡毛玉截遷河陽之喬木一點清花映武城之瑤琴孤飛春雪昔王魯同勳賢哉二君或雉隨黃壤或鸞下青雲莫匪白鷹之為最况復見之與所聞良以出自幽谷遷於華屋霜飄上衣星流入目涅而不緇惟公象之比德於玉象公不欲匪我政表來儀者何致之由德玩物則那思君子以馴擾不避虞人之網羅蓋以少而取貴豈同乘雁之為多詡一作翊字載物閩縣人大歷中進士貞元中官戶部郎中知制誥柳美西掖瑞彰聖時感巡遊之未至失榮落於先期雨露所均常比中園之鬱鬱宮闈暫閉若無春日之遲遲所以望車塵之行幸慰都人之怨思物或有憑神固難宰生植不易地而殊榮孤影忽同秋而異色豈上天之降鑒俾下民之是則於以激忠臣之心於以彰大君之德初斯柳之失常人未知其為祥秦原之煙景明媚漢苑之草樹芬芳獨孤雕而稿瘁似永隔於風光無絮花之似雪意膏露之凝霜及夫天回舊步木得其性千官捧日以輸忠萬騎從龍而翊聖彼衆芳之已歇我得秋而始盛豈固異於常材實願貞乎景命偉夫瑞發匪遙成天意之孔昭德惟可覽結人心之幽感不然柳且無情曷枯而生其枯也當煙塵之晦其生也表氛沴之清與時不偶叶聖斯呈政或可持疾風始知夫草徑節無所立歲寒徒稱乎柏貞宜其俯鳳池而灑潤接雞樹以連榮儒有因物比興屬詞揣稱聞瑞柳於春宮遂揄揚於天應星足廠田坴斗次山形鷲立桑門上首曰懷海禪師室於斯塔於斯付大法於斯其門弟子懼陵谷遷貿日時失紀託於儒者銘以表之西方教行于中國以彼之六度視我之五常遏惡遷善殊途同轍唯禪那一宗度越生死大智慧者方得之自雞足達于曹溪紀牒詳矣曹溪傳衡嶽觀音臺懷讓和上觀音傳江西道一和上闕二字詔諡為大寂禪師大寂傳大師中土相承凡九代矣大師太原王氏福州長樂縣人遠祖以永嘉喪亂徙于閩隅大師以大事因緣生於像季託孕而薰羶自去將誕而神異聿來成童而靈聖表識非夫宿植德本曷以臻此落髮於西山慧照和尚進具於衡山法朝律師既而歎曰將滌妄源必遊法海豈惟心證亦假言詮遂詣廬江閲浮槎經藏不窺庭宇者積年既師大寂盡得心印言簡理精貌和神峻睹即生敬居常自卑善不近名故先師碑文獨晦其稱號行同於衆故門人力役必等其艱勞怨親兩忘故棄遺舊里賢愚一貫故普授來學常以三身無住萬行皆空邪正並捐源流齊泯用此教旨作人表式前佛所説斯為頓門大寂之徒多諸龍象或名聞萬乘入依京輦或化洽一方各安郡國唯大師好耽幽隱棲止雲松遺名而德稱益高獨往而學徒彌盛其有遍探講肆歷抵禪關滯著未袪空有猶閡靡不緘藏萬里取決一言疑網雲張智刃冰斷由是齊魯燕代荊吳閩蜀望影星奔聆聲飈至當其飢渴快得安隱超然懸解時有其人大師初居石門依大寂之塔次補師位重宣上法後以衆所歸集意在遐深百丈山碣立一隅人煙四絶將欲卜築必俟檀那伊補塞遊暢甘貞請施家山願為鄉導庵廬環繞供施㧙積衆又踰於石門然以地靈境遠頗有終焉之志元和九年正月十七日證滅於禪床報齡六十六僧臘四十七以其年四月草二日奉全身窆于西峰據婆娑論文用淨行婆羅門葬法遵遺旨也先時白光去室金錫鳴空靈溪方春而涸流杉燎竟夕以通照妙德潛感于何不有門人法正等嘗所稟奉皆得調柔遞相發揮不墜付屬他年紹續自當流布門人談敘永懷師恩光崇塔宇封土纍石力竭心瘁門人神行梵雲結集微言纂成語本凡今學者不踐門閾奉以為師法焉初閩越靈藹律師一川教宗三學歸仰嘗以佛性有無嚮風發問大師寓書以釋之今與語本並流于後學翊從事于江西府備嘗大師之法味故不讓衆多之託其文曰梵雄設教有權有實未得頓門皆為暗室祖師戾止方傳祕密如彼重昏忽懸白日其一唯此大士宏紹正宗雖修妙行不住真空無假方便豈俟磨礱恬然返本萬境圓通其二百千人衆盡袪病熱彼皆有得我實無説心本不生形同示滅此土灰燼他方水月其三法傳人代塔閉山原杉松日暗寺塔猶存藹藹學徒無非及門唯能覺照是報師恩其四元和十三年十月三日建融官直學士貞元中為義成節度使先王作則以廣利制命以居人故官立井樹旅有施舍相彼廬氏實曰職司在故事之允修於從政乎何有既而日暮途遠商子載馳轅端莫向馬首靡託既傷行旅之感加之暴露之憂寒溫失時以干六物飲食不節是生百病且國生納幣咎在晉卿江氏失布盜由楚相玉毀於櫝罪有所在濯上元中進士八政交修桑農為本六官致理富教居先將取地財之生成須辨夫家之沃塉惟甲率是吏職行乎周禮我疆我理爰受授於三農如京如坻佇陳陳於九穀足使丁壯盡力汙萊合宜何斯有功輒欲加罪若也閭閻櫛比煙火星繁占天子之牛田廢將軍之馬埒則當惟辨布政求弊是圖況今邊鄙不聳流庸適至宜翦荊俾生稻粱勸農既任其易耕給地何限於過數庶從行古未可非今天有五星辰居其一地有五材水為之首既作鹹以正味亦凝質而成鹽則橫目之人生齒之歲罔不資焉而後食矣鹽之為用大矣哉寶應靈慶池者山海經所謂鹽販之澤也俗稱官號皆曰鹽池供華夏二十餘州宅黃河千里之曲北抱原勢南負山陰涵濡泓澄浸漬舄鹵外無寸草內絶纎鱗水或紫赤鹽皆潔白有自來矣頃大歷丁巳秋雨成災凡厥井疆漫為塗潦今京東和糴使兼知河東租庸鹽鐵侍御史清河崔公陲時以監察權領是邦憂國恤人籲天有禱乃徵畚鍤集役徒修隄防導溪潤積溜鴻湧白波如山西迤北匯散於沒闕監斯池町畦不沒廬室獲全繄公是賴矣粵翌日亦既開霽紅鹽自生盈掬傾筐或繭或栗形攢伏虎色徹丹砂靈貺休徵古未之有公乃獻狀於戶部侍郎韓公滉韓公伏奏於代宗代宗俾諫議大夫蔣鎮覆之則編於史册薦於郊廟矣與夫白麟赤雁之應野蠶穭榖之祥何以異乎冬十月詔賜池名曰寶應靈慶兼置祠焉蓋國家祈豐財旌瑞貺也其明年因厥農隙創茲神寢卜津涯六十里之半當安解二大邑之間救陾陾㧻士冖柘士冖柘工惟力競役若子來俄結構以時起儼塗塈而斯畢然後審象設煥丹青睟容穆如甲士贔屭則聰明正直之有憑也夫其洞戶南豁滄波渺然樹以修槐羅以香草則風涼會舞之有所也又來歲巳未夏五月九日天子降中貴人以牲牢祀之制祝光臨衣冠列位秩齊四瀆禮視三公亦為盛矣其後西自關輔東踰崤澠南馳陝服北走絳臺馬屯雲車流水乞靈報德可勝紀乎易曰聖人以神道設教而天下服此之謂也遂遷公殿中侍御史京東和糴使逮於斯任豈惟執憲簡頒鹽政必將秉造化應鼎之和羹人皆望焉神所勞矣濯客自東鄙觀藝而來美精誠之動天多築護之盡力輒採聞見題於樂石庶丕績不朽與池始終時建中二年秋八月記頌肅宗代宗時人臣某言伏奉某月日恩制授臣男曖試殿中監駙馬都尉尚升平公主聖慈曲被焜耀私門揣分慚恩以榮以懼臣本寒素愧非閥閲幼男弱稚又乏義方陛下以臣備位台司服勤王室特收賤族許以國姻宗黨生光室家同慶門開魯館地列沁園事出非常榮加望外恩深義重何以克堪糜軀粉骨不知所報無任感戴受恩之至延大歷九年進士武皇帝慕軒后之風儲思幽通叶珍符於瑞牒産靈芝於齋宮太一清精元君降衷色奪兼金發靈姿以溫潤質逾美玉浮真氣以蔥蘢原夫帝在華帳儼於仙杖睿思邈以沖寂神心窅其相向髣佛受釐肅其冥貺非煦育之所致乃精神之潛暢挺茲三秀表信乎三元之符擢此九莖期爾於九坻之上異屈軼之致用類朱英之為狀足表天感與地生或揚臣和而君唱是知至精潛運神物昭彰靈液潛通願生乎枯木貞石神心幽贊故出此閟殿神房冠庶草以為貴故有時而發祥信稟質以津澤非本媚乎馨香豈比夫楚水之空嘉萍實仙宮之獨貴元霜懿夫道心虛淡我則無味以元感化象貴形我乃無根而效靈是用拔奇瑤砌標異彤庭紫蓋與祥雲允合朱莖將火德相冥秀射猗蘭之室光連雲母之屏煥國典而永昭歌頌徹元風而丕耀德馨彼丹甑呈豐器車表德潛美巖野挺芳幽側曷比夫耀甲乙之帳赫矣朱榮結天地之精混然剛克異朝菌之為體同夜光之非飾含聖澤以成春體正陽而稟色是知人心告虔珍物效焉將會昌於㣥帝必功格於上元且神之符則受此靈草神之會則降彼真仙苟獲符而為約與降質而相懸大寶在乎皇極真居本乎丹田苟溺異以趨怪顧汨聽而表年彼乘嶠而求靜此執迷而徵聖徒有托於齋祈信無裨於性命覩芝宮兮緬爾隙駟以奔競庶歸元化之門小彼炎皇之慶轅大歷九年進士旒扆肅誠天地降靈藎臣咸造屈軼生庭翠影如植皇心以寧暑屏寒生感萐蒲之代謝日來月往異蓂莢之飄零舄奕元造誕生厥草表忠蹇之不遲懼壬佞之何早宵承湛露密葉如傾晝偃薰風纖莖若掃猗那且都歌詠難模其生也則一其道也乃殊育於軒階其指或有生於聖代其用則無是靈草之無心以聖人為之心對危行而不侮覿巧言而則侵榮乎砌陰實為龜為鏡肅我皇度式如玉如金冠卉之首帛丿糸代曠有茅三脊之可封芝九莖而延壽曷若茲草之盛莫之與並類貂蟬之性潔均獬豸之質徑得詩人之無邪行孔門之遠佞於鑠屈軼邈乎回出遇唐復生應時作實經百王而影戢歷千祀而宥密如執法之不回奉直道而自必所以野退宵人朝多髦士同魚水之合契絶螮蝀之莫指封思齊於大夫名可比於君子謝有香之蘭蓀惡無言之桃李幹戎州人待詔翰林纍擢諫議大夫封壽春公遷京兆尹改刑部侍郎德宗立坐前與宦者特進劉忠翼陰謀東宮事覺除名長流賜死藍田驛集賢校理潤州別駕歸崇敬議狀及禮儀使判官水部員外郎薛頎等稱禘謂冬至祭天於圜丘周人則以遠祖帝嚳配今欲以景皇帝為始祖配昊天於圜丘臣幹詰曰國語曰有虞氏夏后氏俱禘黃帝商人禘舜周人禘嚳俱不言祭昊天於圜丘一也詩商頌曰長發大禘也又不言祭昊天於圜丘二也詩周頌曰雍禘太祖也又不言祭昊天於圜丘三也禮記祭法曰有虞氏夏后氏俱禘黃帝殷人周人俱禘嚳又不言祭昊天於圜丘四也禮記大傳曰不王不禘王者禘其祖之所自出以其祖配之又不言祭昊天於圜丘五也爾雅釋文曰禘大祭也又不言祭昊天於圜丘六也家語云凡四代帝王之所郊皆以配天也其所謂禘者皆五年大祭也又不言祭昊天於圜丘七也盧植云禘祭名禘者帝也事尊明禘故曰禘又不言祭昊天於圜丘八也王肅云禘謂於五年大祭之時又不言祭昊天於圜丘九也郭璞云禘五年之大祭又不言祭昊天於圜丘十也臣幹謂禘是五年宗廟之大祭詩禮經傳文義昭然今略舉十詰以明之臣惟見禮記祭法及禮記大傳商頌長發等三處鄭元注或稱祭昊天或云祭靈威仰臣精詳典籍更無以禘為祭昊天於圜丘及郊祭天者審如禘是祭之最大則孔子説孝經為萬代百王法稱周公大孝何不言禘祀帝嚳於圜丘以配天而反言郊祀后稷以配天是以五經俱無其説聖人所以不言輕議大典亦何容易猶恐不悟今更作十難其一難曰周頌雍禘祭太祖也鄭元箋云禘大祭太祖文王也商頌云長發大禘也元又箋云大禘祭天也夫商周之頌其文互説或云禘太祖或云大禘俱是五年宗廟之大祭詳覽典籍更無異同惟鄭元箋長發乃稱是郊祭天詳元之意因此商頌禘如大傳云大祭如春秋大事於太廟爾雅禘大祭雖云大祭亦是宗廟之祭可得便稱祭天乎若如所説大禘即云郊祭天稱禘即是祭宗廟又祭法説虞夏商周禘黃帝與嚳大傳不王不禘禘上俱無大字元何因復稱祭天乎又長發文亦不歌嚳與感生帝故知長發之禘而非禘嚳及郊祭天明矣殷周五帝之大祭㣥經衆史及鴻儒碩學自古立言著論序之詳矣俱無以禘為祭天何棄周孔之法言獨取康成之小注便欲違經非聖誣亂祀典謬哉其二難曰大傳稱禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖者此説王者則當禘其謂祭法虞夏殷周禘黃帝及嚳不王則不禘所當禘其祖之所自出謂虞夏出黃帝殷周出帝嚳以近祖配而祭之自出之祖既無宗廟即是自外至者故同之天地神祗以祖配而祀之自出之説非但於父在母亦然左傳子産云陳則我周之自出此可得稱出於太微五帝乎故曰不王不禘王者禘其祖之所自出以其祖配之謂也及諸侯之禘則降於王者不得祭自出之祖只及太祖而已故曰諸侯及其太祖此之謂也鄭元錯亂分禘為三注祭法云禘謂祭昊天於圜丘一也注左傳稱郊祭天以后稷配靈威仰箋商頌又稱郊祭天二也注周頌云禘大祭大於四時之祭而小於祫太祖謂文王三也禘是一祭元析之為三顛倒錯亂皆率胸臆曾無典據何可足憑其三難曰虞夏殷周已前禘祖之所自出其義昭然自漢魏晉已還千餘歲其禮遂闕又鄭元所説其言不經先儒棄之未曾行用愚以為錯亂之義廢棄之注不足以正大典其四難曰所稱今三禮行於代者皆是鄭元之學請據鄭學以明之曰雖云據鄭學今欲以景皇帝為始祖之廟以配天復與鄭義相乖何者王制云天子七廟元云此周禮也七廟者太祖及文武之祧與親廟四也殷則六廟契及湯與二昭二穆也據鄭學夏不以鯀及顓頊昌意為始祖昭然可知也而欲引稷契為例其義又異是爰稽邃古洎今無以人臣為始祖者惟殷以契周以稷夫稷契者皆天子元妃之子感神而生昔帝嚳次妃簡狄有娀氏之女吞元鳥之卵因生契契長而佐禹治水有大功舜乃命契作司徒百姓既和遂封於商故詩曰天命元鳥降而生商宅殷土芒芒此之謂也后稷者其母有邰氏之女曰薑嫄為帝嚳妃出野履巨迹歆然有孕生稷稷長而勤於稼穡堯聞舉為農師天下得其利有大功舜封於邰號曰后稷唐虞夏之際皆有令德故詩曰履帝武敏歆居然生子即有邰家室此之謂也舜禹有天下稷契在其間量功比德抑其次也舜受職則播百穀敷五教禹讓功則平水土宅百揆故國語曰聖人之制祀也功施於人則祀之以死勤事則祀之契為司徒而人輯睦稷勤百穀而死皆居前代祀典子孫有天下得不尊而祖之乎其五難曰既遵鄭説小德配寡遂以后稷只配一帝尚不得全配五帝今以景皇帝特配昊天於鄭義可乎其六難曰衆難臣云上帝與五帝一也所引春官祀天旅上帝祀天旅四望旅訓衆則上帝是五帝臣曰不然旅雖訓衆出於爾雅及為祭名春官訓陳注有明文若如所言旅上帝便成五帝則季氏旅於泰山可得便是四鎮耶其七難曰所云據鄭學則景皇帝親盡廟主合祧却欲配祭天地錯亂祖宗夫始祖者經綸草昧體大則天所以正元氣廣大萬物之宗尊以長至陽氣萌動之始日俱祀於南郊也夫萬物之始天也人之始祖也日之始至也掃地而祭質也器用陶匏性也牲用犢誠也兆於南郊就陽位也至尊至質不敢同於先祖禮也故白虎通曰祭天歲一何天至尊至質事之不敢褻黷故因歲之陽氣始達而祭之今國家一歲四祭之黷莫大焉上帝五帝其祀遂闕怠亦甚矣黷與怠皆禮之失不可不知夫親有限祖有常聖人制禮君子不以情變易國家重光纍聖歷祀百數豈不知景皇帝始封於唐當時通儒議功度德尊神堯克配彼天宗太宗以配上帝神有定主為日已久今欲黜神堯配含樞紐以太宗配上帝則紫微五精上帝佐也以子先父豈禮意乎非止神祗錯位亦以祖宗乖序何以上稱皇天祖宗之意哉若夫神堯之功太宗之德格於皇天上帝臣以為郊祀宗祀無以加焉其八難曰欲以景皇帝為始祖既非造我區宇經綸草昧之主故非夏始祖禹殷始祖契周始祖稷漢始祖高帝魏始祖武皇帝晉始祖宣帝國家始祖神堯皇帝同功比德而忽升於宗祀圜丘之上為昊天匹曾謂圜丘不如林放乎其九難曰昨所言魏文帝丕以武帝操為始祖晉武帝炎以宣帝懿為始祖者夫孟德仲達者皆人傑也擁天下之強兵挾漢魏之微主專制海內令行草偃服衮冕陳軒懸天子決事於私第公卿列拜於道左名雖為臣勢實凌君後主因之而業帝前王由之而禪代子孫尊而祖之不亦可乎其十難曰所引商周魏晉既不當矣則景皇帝不為始祖明矣我神堯拔出㣥雄之中廓清隋室拯生人於塗炭則夏虞之勳不足多成帝業於數年之間則漢祖之功不足比夏以大禹為始祖漢以高帝為始祖則我唐以神堯為始祖法夏則漢於義何嫌今欲革皇天之祀易太祖之廟事之大者莫大於斯曾無按據一何寡陋不愧於心不畏於天乎以前奉詔令諸司各據禮經定議者臣幹忝竊朝列官以諫為名以直見知以學見達不敢不罄竭以裨萬一昨十四日具以議狀呈宰相宰相令朝臣與臣論難所難臣者以臣所見獨異莫不騰辭飛辨競欲碎臣理鉗臣口剖析毫釐分別異同序墳典之凝滯指子傳之乖謬事皆歸根觸物不礙但臣言有宗爾豈辨者之流也又歸崇敬薛頎等援引鄭學欲蕪祀典臣為明辨迷而不復臣輒作十詰十難援據墳籍昭然可知庶郊禘事得其真嚴配不失其序皇靈降祉天下蒙賴臣亦何顧不蹈鼎鑊謹敢聞達伏增悚越公輔愛州日南人第進士補校書郎制策異等授右拾遺為翰林學士從德宗幸奉天擢諫議大夫同中書門下平章事罷為左庶子改右庶子終吉州刺史憲宗時贈禮部尚書白雲溶溶搖曳乎春海之中紛紜層漢皎潔長空細影參差匝微明於日域輕文磷亂分炯晃於仙宮始而乾門闢陽光積乃縹渺以從龍遂輕盈而拂石出穹巒以高翥跨橫海而遠托故海映雲而自春雲照海而生白或杲杲以積素或沉沉以凝碧圓虛乍啓均瑞色而周流蜃氣初收與清光而激射雲信無心而舒卷海寧有志於潮汐彼則澄源紀地此乃泛迹流天影觸浪以時動形隨風而屢遷入洪波而並曜對緑水而相鮮時維孤嶼冰朗長汀雲淨辨宮闕於三山總妍華於一鏡臨瓊樹而昭晰覆瑤臺而縈映鳥頡頏以追飛魚從容以涵泳莫不各得其適咸悅乎性登夫爽塏望茲雲海雲則連景霞以離披海則蓄玫瑰之翠彩色莫尚乎潔白歲何芳於首春惟春色也嘉夫藻麗惟白雲也賞以清貞可臨流於是日縱觀美於斯辰彼美之子顧曰無倫揚桂楫棹青蘋心遙遙於極浦望遠遠乎通津雲兮片玉之人闕問朕聞古之善為國者未嘗不求正士博採直言勤而行之輔成教化者也朕臨御日淺政理多闕每期忠義切投藥石子大夫戢翼藏器思奮俟時今啓乃沃豫當有犯而無隱朕竊不自揣敢慕前王上法羲軒下遵堯舜還已散之淳朴振將頽之紀綱使禮讓興行刑罰不用而人猶輕犯吏尚循私為盜者未奔不仁者未遠豈臣非稷契而致是乎為君謝禹湯使之然也設何謀而可以西戎即敘施何化而可以外戶不扃五諫安從三仁誰最周昌比漢高於桀紂劉毅方晉武於桓靈但見含容兩無猜怒故君不失聖臣不失忠子既其儔應詳往行四賢優劣佇辨深疑在於朕躬所有不逮條問之外委悉書之必無面從以重不德對臣聞堯舜之馭宇也以至理理萬邦以美利利天下百姓猶懼其未化也萬邦猶懼其未安也乃復設謗木詢讜議不敢滿假不敢荒寧伏惟陛下元德統天文思居業慎重光之丕緒返淳古之休風光啓憲章疇咨菅蒯錫臣之策思以啓沃臣狂簡不知化源謹昧死稽顙輒陳愚慮制策曰朕竊不自揣敢慕前王欲上法羲軒下遵堯舜還已散之淳朴振將頽之紀綱使禮讓興行刑罰不用而人猶輕犯吏尚循私為盜者未奔不仁者未遠豈臣非稷契而致是乎為君謝禹湯使之然也大矣哉陛下之言乎臣聞禹稱善人不善者遠矣伏見陛下徵隱逸於空山拔夔龍於下位聘名士禮賢者善無欲之徒發惟新之詔使吏肅人悅法明令張而猶曰君謝禹湯臣非稷契此陛下讓之至也臣何敢間焉夫中於道者易以興化失其道者難以從宜事爽其分則一毫以乖事審其分則殊途同歸計歲者非一時而可用致理者非一日而成功但立法於制事之初望化於經年之外使損益鑒於興替寒暑漸於春秋何憂不均理於羲軒同光於堯舜制策曰設何謀而可以西戎即敘施何術而可以外戶不扃者陛下孚惠心和戎狄相彼君長解辮戶庭應以地僻遐荒未知聖造伏以戎狄輕而寡信貪而無親視邊戍申嚴則請通國好覩疆埸無備則屢起貪心固難可以禮義和難可以恩澤撫取今之要莫過於智將悍卒設險邊隅臣伏以陛下且以恤下為心不以西戎為慮今請制其邊兵有常數邊將有常務分其土而居之給其家而業之因其業也而為之城池因其將也而為之牧守又申嚴其令使獲虜馬者賞以馬使獲虜羊者賞以羊人皆固業戰自力倍則可少安今積甲日深興戎歲廣黎人抗弊未可勤師伏望利物之原息人之道使廣庶類農桑以時宏濟濟之士於朝盛洋洋之化於野使其來也慕斯文物之盛居其邊也杜其利欲之求然後欵塞而可即敘矣夫姦邪生於豪傑廉恥生於禮義禮義立孰有不恥且格乎衣食足孰有背義趨利者乎臣以為遂其富利之業申其仁義之利則外戶不扃矣制策曰五諫安從三仁誰最者夫諫者以諷為先亂國非無直言也直言不用故諂諛勝矣理國非無諂諛也諂諛不用則直言勝矣時逢否閉仲尼或守其主文今日昭明微臣請從其直諫臣之職也敢二事乎昔商紂不君虐棄天物三仁弼諫藩捍宗彞退八百之師抑三分之衆均其憂亂俱可稱仁較其持危或非同德比于知死亡之義且曰陷君微子去父母之邦或云智免進退不失其正在於太師乎制策曰周昌比漢高於桀紂劉毅方晉武於桓靈俱見含容兩無猜怒故君不失聖臣不失忠子既其儔應詳往行四賢優劣佇辨深疑臣聞君明則臣直二聖以乘時開國參佐昌圖二臣以委質造邦克扶興運開忠讜之路成不諱之朝固擬議失倫比方不怍將以感君之未寤致理於升平絶好惡之門傳和睦之代名高終古傳在策書巍巍三代斯為盛美臣素無學術謬竊對揚若變其微斯言之玷使臣以禮晉武寧劣於漢高鼓怒抗辭周昌不優於劉毅制策曰在乎朕躬有所不逮條問之外委悉書之必無面從以重不德者臣固凡陋越在側微仰天地之大全空欣化育體陰陽之廣運每荷陶甄豈意聖詔薦臨猥垂下問心慮隕越夏蟲不覩於春冰曲士寧知於天道欲申微素進退憂惶伏見陛下以道生成以德覆載賞以春夏刑以秋冬捐金玉於江湖反珍奇於藪澤委符瑞為草莽用忠良為靈慶臨㣥下以正德惠兆人以厚生誠太平之道也刑措之漸也臣不勝其忭願陛下俯仰必於是寤寐必於是詩云靡不有初鮮克有終抑臣以為知終終之可以存義者其惟聖人乎伏惟陛下終之臣不勝葵藿傾心之至謹對晉字混成河中虞鄉人明經及第肅宗幸彭原上書行在授校書郎翰林待制歷太常少卿左金吾將軍德宗朝遷左金吾衛大將軍改尚書左丞復拜太常卿貞元五年以門下侍郎同中書門下平章事九年罷為禮部尚書檢校左僕射兼宣武節度營田汴宋觀察使十五年卒年七十六贈太傅諡恭惠古人服冠冕者動有佩玉之響所以節步也禮云堂上接武堂下布武至恭也步武有常君前之禮進趨而已令或奔走以致顛仆非恭慎也在式朝官皆是綾袍袱五品已上金玉帶取其文彩畫飾以奉上也是禹惡衣服而致美乎黻冕君親一致昔尚書郎含香萊子彩服皆此義也服絁縵非制也唐之元臣曰義陽郡王抱真字太元皇開府儀同三司涼州都督河蘭鄯廓瓜沙甘肅九州大總管申國公修仁之元孫開府儀同三司左武衛大將軍永之曾孫兵部尚書懷恪之孫贈太子太保齊管之子蓄河嶽之秀叢祖考之慶克生鴻才以左元后殊勳茂績可得而稱也公體仁執中抱素專直威厲霜雪氣凌雲霓沉毅足以建功寬裕足以安衆召公相武之智申伯翊宣之籌尚父六韜之奇夷吾九合之業未及弱冠公皆達之果為從父兄故相國抱玉所重期以遠大薦於肅宗授汾州別駕僕固懷恩之平史盜也伐虔劉之功恣暴虐之性不率朝典潛懷異圖公髮衝危冠憤激忠節間道詣闕潰其姦謀而渠魁疾顛汾滸底定代宗嘉之拜殿中少監永泰初又兼御史中丞充陳鄭懷澤潞等五州節度留後恩光洊及輝耀當時謙不奉詔纍有陳説上大器之改澤州刺史兼侍御史充節度副使巡內五州都團練使澤人欣欣如戴父母公虔奉聖旨專精吏職一年而流民復田壤闢二年而軍給人阜風俗淳乂時屬散卒聚鐘鼓山肆其猖狂逞其驅劫議者請兵逐之公謂之曰夫人稟元和以生奉五常以立無不思順無不懼逆理亂之道實由於政政和則禮讓興仁義著政否則刑罰滋盜賊起使其叛亂是德之不修也姑務自咎豈可加兵乃申以禍福之門引以開泰之路投戈箙矢塵簸巖蕩撫勞加等仁風載揚遂遷懷州刺史澤人去思之憤凝為愁雲懷人來蘇之慶霈若霖雨為政未幾懷亦如澤焉天子寵文公之能旌龔遂之美以節度使司徒公備戎於西乃授檢校祕書監兼侍御史權知行軍司馬充澤潞節度支度營田觀察處置使留後仍知潞州大都督府事公以殊恩寄任留務浩穰徘徊化源獨與心計乃約故實財成庶政禁暴以安物薄賦以養農省徭以息孤惸均調以資士卒孝弟聞於鄉黨學校興於里閭刑戮廢於戎行鞭撲弛於官署闔境之內不日而教化焉建中元年特授節制并廉察本道兼領潞州大都督府長史練勤王之師修守土之備內勸耕食外揚威武布大君之誠以睦藩鎮導聖朝之化以釋危疑由是上澤德以下流下情得以上達君臣無間臻於太和公之力也屬軍戎之後蟲旱為災公請罪神祗憂見於色精感而飛蝗越境誠懇而霖雨應期稼穡獲全異於他郡古之循吏何以加焉公前後歷官一十八政再為御史中丞尚書常侍三領郡守一登亞相兩踐端揆封義陽郡王食實封六百戶命為承弼同平章事俾平水土兼領司空量宏而深智達而朗常執謙而驚寵不求援以取貴起題輿登補衮簡自皇極鬱為元臣非德及蒼生忠貫白日則何以臻此潞之緇黃耆艾詣闕陳情願勒貞石帝嘉乃誠詔門下侍郎平章事董晉撰文以昭其功銘曰皇矣上帝降祚有唐蘊粹孕靈克生義陽明明天子賢能是獎乃命義陽鎮於上黨烈烈義陽惟國之楨屹若崇山隱如長城用極於正性根於忠英風外馳明謨內融王度克遵惠此罷人以德代刑散澆為淳軍以威凶雄以定懾恢振皇綱輔弼天業帝曰抱真允文允武俾登鼎鉉錫之茅土名高方召道冠申甫刊石紀功用駕終古紹字德素本名純避憲宗諱改焉自太原徙京兆之萬年纍官戶部尚書順宗立轉兵部出為東都留守元和初檢校尚書右僕射為武寧軍節度使復拜兵部尚書卒年七十二贈右僕射諡曰敬伏以京都時用多重見錢官中支計近日殊少蓋緣比來不許商人便換因茲家有滯藏所以物價轉高錢多不出臣等今商量伏請許令商人於三司任便換見錢一切依舊禁約伏以比來諸司諸使等或有便商人錢多留城中逐時收貯積藏私室無復通流伏請自今已後嚴加禁約
