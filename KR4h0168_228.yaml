front:
  text: 全唐文欽定全唐文卷二百二十八張說八
  hash: sha256:bc9abeb7ac3144e410179bed5c05af4feb2cac1edecdb7c83dbeace4bc3678b0
body:
  text: 府君諱步馬字成騭范陽方城人也張祖曰揮帝軒之允肇勳弦木錫姓上矣詩有卿士孝友史有留侯世家八葉至東漢司空皓公子宇北平太守始居范陽四葉至西晉司空華公子韙散騎常侍乃僑江左昆孫太常復歸河洛故河東有司空寨洛陽有散騎里後司空至府君十二代不失仁義矣王父諱弋周通道館學士考諱恪無祿早世府君煢生遺育四代單緒家世尚儒不及伯魚之訓外祖為理遂讀臯陶之書以明法歷饒陽長子二尉介休主簿洪洞丞以所願乎下事乎上以所願乎上交乎下反身與人何往不順臺選貞白覆囚山南人謂是行有典刑矣昊天不弔年五十二調露元年十二月乙卯捐背於縣廨夫人長樂縣太君馮氏父威藍田丞敬修法度踐涉圖史顧復幼孤將就成立家道不殞夫人是賴享年七十有二傾背於東都康俗里第光圭說不天夙遭閔凶又集荼蓼先王制禮不敢從滅以景龍二年七月己酉安厝於萬安山陽祔從周制也惟先君不祿俸不奉親不機杼不資身僚舊無雞黍之接況非其類乎族姻無魚菽之受況其人吏乎是全其高而善其獨也過四十始閲六籍觀詩得之厚觀書得之恆觀樂得之和觀禮得之別觀春秋得之正觀易得之元曰君子多乎哉事斯一言而已矣每誦道記三復三寶曰至人之心有以垂世又聞之太夫人云吾有子五十載非其疾無一日之憂先夫人亦云吾事夫子三十年耳無忤聲目無暴色先君子之違世也其憂戀者尊門在殯歟聖善在堂歟我諸孤無日敢忘及王母終養二祖封崇亦尚克家成遺訓矣若夫安親孝也宜家義也翼子慈也軌迹隱乎含光故當代罕耀馨香發乎潛德故明神終勞先大夫久而益榮沒而不朽蓋此景雲二年天子嘉侍臣之匪躬念前人之蘊德二月乙巳詔曰故官某育德高邁藏器下僚代載儒雅家傳清白河東佐邑長不欺之風山南覆囚溢無冤之聽徂謝永久邱墳不飾啓茲令允貞事先朝宜崇追遠之恩以表揚名之志可贈使持節丹州刺史王澤漏乎泉壤國禮崇乎宗廟漢帝論士恨不見李牧之為人曾子思親泣無逮楚王之厚祿道存運往痛矣餘悲緬尋前哲之所以聞無聲於四海視不見於百代者匪銘頌歟桓麟蔡雍其則不遠嗚呼霜露交積松檟滋深兄弟永懷相顧將老胡伯虎豈敢掩大人之清陳季方何足知家君之德小子銜恤非曰能文莫假辭於他者務傳信於我也銘曰猗嚴考用元妙體太和竭高志貞夫一戒其多孝於親正於家形于訓清厥心晦厥迹畏厥聞寶如何其謙儉孝慈皇哉褒德永世有詞夫孝者法象乎天地感通乎鬼神故愛敬之中又有真報哀戚之外更追冥福元識禪師其人也厥姓桑氏其先長樂人漢尚書洪之後也曾祖梁州刺史諱千秋祖貴鄉縣令諱信考文林郎諱爽自前代無違德基於纍仁是生達者禪師智周萬物而理證本無願度四生而見滅諸有以為空不離色體念子之慈業不忘緣起思親之孝乃於萬山北陌榮陽東原葬先考文林府君先妣太原王氏負土成墳結廬其域置義井取施無求報鑄洪鐘取聞而悟道修古寺造尊容取覩相生信若夫信生攝攝生靜靜生定定生慧於生滅處得常住心於虛空中立一切法其定慧之門乎禪師昔宴坐介山㣥虎自擾今經行宰樹四衆依德至人凝寂雖罕見全象識者餘論亦時存一隅篆美豐石寄詞短偈云爾邈矣上德行密道高哀哀父母生我劬勞禪心護念神足遊遨若河雖廣曾不容舠甘井既泄利物無竭不增不減不流不滯仁靜而鑒智動而悅華鍾既鏗雄雄法聲如來如去如滅如生不有奚得不為胡成寶地嚴飾金山晃耀善惡無門惟人所召境因心起理憑思照慤哉一心混成衆妙良玉禮神用之西序之器捨之南山之璞冏然不有其珍也君子安命進之干城之雄退之去國之老隤然不失其正也語夫杖運以行道屬辭以比德亦何代無其人哉公諱方翼字仲翔太原祁人王周之後也王子以敗狄受姓徵君以遁世為名司徒之濟艱難義形漢室太尉之圖舉甲心盡魏朝聞蔣濟所言則知尚書志力兄弟繼美覽周書所載則見潁川忠烈子姓皆封臣節奮揚於百代家聲籍甚於四海大王父司徒定公秉隋氏之崇也王父駙馬開府文公裕先朝之懿也考特進慎公仁表皇室之甥也公門總四嶽之靈帝子分五潢之氣是生時傑鬱為人紀公雄姿沈毅凜難犯之色虛懷信厚坦招納之量識略精斷達應變之權神守密靜堅不奪之節孝友內兆於免懷忠敬外灼於既冠加以思參造化誠合鬼神文其詩書武其韜略推此才也以從政焉求無匱矣夙遭家艱哀過柴瘁京師號曰孝童王母同安長公主引貴游之誡示作苦之端命太夫人徙居郿墅儲無斗粟庇無尺椽公躬率傭保肆勤給養墾山出田燎松鬻墨一年而良疇千畝二年而厦屋百閒三年則日舉壽觴厭珍膳矣處約能久不亦仁乎在困能亨不亦智乎永徽初始宰安定誅豪暴以育人察奸宄以申冤異政三舉清風一變除瀚海都護府司馬以母疾辭職為姜恪乘便逐徙朔州尚德府果毅歲餘王本立上書理公國之惇孝不宜擯抑有詔徵還而親不待心與哀絶氣屬禮存詔御醫孟默朝夕診視免喪逾年僅堪履立樂成公東討新羅薦為將帥詔公持節雞林道總管軍停不行授沙州刺史未至改拜肅州以為慢防啓寇非重閉也乃大築雉堞嚴備櫓械人知有恃戎亦來威儀鳳歲河西盡蝗獨不入境鄰郡湊稔提挈如雲公傾私泉以資乏引激水以立磑舉火百竈日餔千人遂有芝草叢生豐年屢降人之詠德刊石存焉裴吏部立名波斯實取遮匐偉公威厲飛書薦請詔公為波斯軍副使兼安西都護上柱國以安西都護杜懷寶為庭州刺史大城碎葉街郭回互夷夏縱觀莫究端倪三十六蕃承風謁賀自洎汗海東肅如也無何詔公為庭州刺史以波斯使領金山都護前使杜懷寶更統安西鎮守碎葉朝廷始以鎮不寧蕃故授公代寶又以求不失鎮復命寶代公夫然有以見諸蕃之心搖矣於是車薄啜首唱寇兵㣥蕃響應蝟毛而豎公在磧西獻捷無虛歲蹙車薄於弓月陷咽麥丏於熱海剿叛徒三千於麾下走烏鶻十萬於域外皆以少覆衆以誠動天葛水暴漲祭徹而三軍涉渡葉河無舟兵叩而七月冰合由是士卒益勇戎狄益懼璽書下問皇靈遠爍遷夏州都督徵詣奉天宮熱海之役流矢貫臂陳血染袖事等殷輪帝顧而問之視瘡欷歔曰為國致身乃吾親也妖賊白䥫余據平城以反奉詔與程務挺討擒之善公有發石壞城之計反風焚柵之感封太原郡公元珍寇邊受命討擊公以無甲乃發思造六片木排袴關鈕解合畫為虎文北至關先與虜合戰若驅猛獸蒙臯比莫之敵也胡馬奔駭獲其二啜桑乾舍利兩部來降初公善書與魏叔琬相輩工射與趙持滿齊名帝每矚之賜比鳴輦賞深懸帳嘗獨行入夜有怪人長丈直來趣逼射而仆焉乃朽木也太宗壯之授右千牛及持滿伏法暴骸公哀而收葬為金吾奏劾高宗義之釋而不罪履道坦坦多如此類適將任帝夔龍為國方虎天下膏潤㣥生雲雨惜哉不辰悄焉遘侮嗣聖之際太后臨朝有凶人誣奏公廢后從兄常懷怏怏司刑御史侮文矯制不名等法遷於崖州路至衡山寢疾捐館春秋六十有三垂拱三年閏正月二十九日葬於咸陽原君子曰斯才也斯望也難乎免於斯之代也周公聖而謗屈平賢而放賈誼才而謫李廣勞而喪彼天命之糾紛此人情之惆悵神龍中興以陷酷吏例復官爵孝為人極忠為令德神之聽之始枉終直信矣有子故光祿少卿璵今祕書監珣皆篤行純孝慎終追遠說少也蒙會友升堂今老矣豈能文旌墓遷司漢籍感激論都尉之書雍敘彪情追美樹楊公之碣銘曰上德惟公氣秀才傑孝宏世美忠廣前烈日月心照江河思決難地必通暗機先徹卓犖文藝崢嶸武節歎由宰邑借恂臨郡海女避途山蛇可問師律三總軍聲六振鋭氣入營長雲出陳肅將國威烜赫天外玉弩方擎雲旗卷旆天道茫茫自古多傷功存西域身棄南荒易簀中路懸棺反藏寶刀生衣玉玦無光後有才子先賢不忘星辰懸象所以殷時布氣然而行不言之道者天也文武用才所以勤官定國然而致無為之理者帝也當高宗之休運任名世之良臣清九流而闢四海代天工而張帝德歷選前哲豈多乎哉公諱行儉字守約河東聞喜人也其先出乎嬴姓伯翳之後也秦則裴侯始封漢則侍中受職魏晉之代鬱為盛門八裴方於八王聲振海內三子尊為三祖望高士族自冀州刺史徽至公十二代中軍將軍雙虎至公六葉代無違德不隕厥問者巳大王父伯鳳周驃騎大將軍光汾二州刺史琅邪郡開國公大父定高大將軍馮翊郡守襲琅邪郡公諸侯受封山河傳國天子共理循良克家考仁基隋左光祿大夫以陰圖王充仗義舊主遭時不利玉折名揚聖唐龍興旌淑勵節贈原州都督命諡曰忠蓋春秋之褒也公清明本乎世德正性出乎胎教氣潤河靈貌雄嶽立仁孝之道天生而知將相之器與年俱長以高蔭為宏文生絶事篤學纍年不舉房僕射異而問焉對曰隋室喪亂家乏典籍館有良書探討未遍故少留耳梁公驚曰驥子志氣淩雲當一日千里其早為通人之目也如是明經補左屯衛倉曹詔舉轉雍州司士遷金部戶部二員外歷都官郎中長安令明慶中與長孫太尉褚河南論及中宮廢立國家憂患有公伯僚譖行於季氏出為西州長史又改金山副都護又拜安西大都護西域從政七八年閒窮荒舉落重譯向化我之獨賢邊之多幸乾封歲徵為同文少卿尋除司列少常伯官復舊號為吏部侍郎加銀青光祿大夫自居銓管大設綱綜辨職差才審官序爵法著新格言成故事上元中長星出天禿髮入塞詔公為洮州道左軍總管又為秦州鎮撫右軍總管並受元帥周王節度雖祭公有諫耀武之事不行而方叔帥師來威之道備矣儀鳳二年十姓可汗匐延都支及李遮匐潛搆犬戎俶擾西域朝廷憑怒將行天討公進議曰敬元敗績於茅戎審禮免胄而入狄豈可絶域更勩王師今波斯王亡侍子在此若命使冊立即路由二蕃便宜取之是成禽也高宗善其計詔公以名冊送波斯兼安撫大使公往蒞遺愛洽於人心是行也百城故老望塵而雅拜四鎮酋渠連營而咨酒一言召募萬騎雲集公乃解嚴以反諜託獵以訓旅誤之多方閒其無備裹糧十日執都支於帳前破竹一呼鉗遮匐於麾下華戎相慶立碑碎葉蓋美克雋不殺而用謀安人以德而去害廓氛祲於地表燀皇靈於天外充國有屯田之頌竇憲有燕山之銘詢茲遠略彼何微也遷禮部尚書加上柱國又特降恩命兼右衛大將軍夷典秩宗神必據我文昌有將天道存焉調露中單于可汗伏念外叛大鴻臚蕭嗣業喪律詔公為定襄道大總管軍至朔州斥相接胸奴故態狃劫糧以餒師神將出竒張虛勢以啖敵僞為轉運伏其壯士示羸師以緩行隱精騎以躡跡寇果大下援兵奔散驕虜益驁自為得色驅此車牛憩彼泉井於是箱中兵起千弩齊發要路騎飛一息而至㣥胡顛沛殺傷滿野從茲饋運路無驚者觀夫大漠無倪穹廬靡所追之逃遁捨之憑陵費日老師兵家所病公潛使緩頰均其利心深圖既入狼意亦改及委罪衙官陰送降狀公密上其事人莫知之及如其期舉國歸附煙塵大起師徒惶惑公徐使令軍曰此是伏念執溫傳來降非他寇也俄而銜璧轅門釋縛納款帝嘉其勳命尚書崔知悌乘驛勞軍備禮獻凱策勳之日程務挺張虔勗者行軍之偏將也訴言子營逼逐方降大軍又屬秉鈞忌才下上其手公曰雖不逮㣥帥之讓功猶恥與二王之競力今而殺降後無來者乃封公聞喜縣開國公而伏念溫傳皆戮都市是年也伏念弟元珍擁其餘種復叛則天稱制追正宿枉贈伏念太僕卿程張諸家別故夷族君子以為神理之不可誣也永淳元年詔公為金牙道大總管未行遘疾四月二十八日薨於京師延壽里春秋六十有四長子貞隱早卒嫡孫參元嗣封藐是諸孤哀哀童幼高宗悼焉贈幽州都督賜凶儀還鄉喪葬官供禮部郎中監護窀穸之數率禮有加別敕留守委皇太子擇六品京官一人檢校家事五六年閒待兒孫稍成長日停寵極哀榮禮之厚者澤及存沒義莫重焉太常議諡博古多能文武表式曰憲其年十月葬我憲公於聞喜之東良原禮也神龍中興朝思舊德贈公揚州大都督開元孝享宰嗣延恩贈公太尉生不登乎台階沒追位乎靈宰序四時於下地調三光於上天聖人神教意在茲乎公志堅慮精神勇識徹藝必討本學皆覩奧又善測雲物推步氣象鬼無遁謀靈不藏用著文集二十卷造草字數千文皆寶傳人閒以為代法又撰選譜十卷又為軍營行陳部衆料敵等四十六訣大聖天后令祕書監武承嗣就家取進以為祕術豈比馬卿浮華唯留封禪之草劉安虛誕空傳鴻寶之書而巳哉加以汲引沈淪推奬氣類虛懷而襟帶不設宏亮而城府洞開故虎旅雲從詞林響應若毛羽之宗麟鳳衆川之長江河也在選曹見駱賓王盧照鄰王勃楊炯評曰炯雖有才名不過令長其餘華而不實鮮克令終見蘇味道王劇歎曰十數年外當居衡石後各如其言其在軍麾擇帳下之士則有張知運薛訥閻敬容甘元暕裴思諒王智方呂休璟劉元意引偏裨之將則有程務挺張虔勗王方翼崔智党金毗郭待封劉敬同李多祚黑齒常之凡所進拔盡為名將此則有道之人倫武侯之賞鑒也公之送波斯也入莫賀延磧中遇風沙大起天地暝晦引導皆迷因命息徒至誠虔禱狥於衆曰井泉不遠須臾風止氛開有香泉豐草宛在營側後來之人莫知其處此乃耿恭之拜井商人之化城也公在禮闈敕賜善馬及寶鞍令史奔馳馬倒鞍破懼而逃罪公使召之曰知汝誤耳又平都支遮匐大獲珍異酋長將吏請遍觀焉有馬瑙大盤希代之寶也隨軍王休烈捧盤跌倒應時而碎叩頭流血惶怖請死公笑曰事有不意何至重玉而害人乎此又文饒之含容邴吉之仁恕也公西擒都支北降伏念前後錫馬五百匹僮二百人金銀器物三千品錦罽織皮三百段公受置庭中旬日盡散此又趙奢之待士田文之市義也若夫知人以為本感通以為行善貸以為常散積以為樂古之有道者嘗從事于斯矣公元夫人河南陸氏兵部侍郎爽之女也陸氏卒繼室以華陽夫人厙狄氏有任姒之德班左之才聖后臨朝召入宮闕拜為御正中宗踐祚歸養私門歲時致禮媧皇一作后補天進參十亂少康嗣夏退協三從晉朝公卿列拜虞潭之母周官音注近同韋逞之家皇上臨極旁求陰政再降綸言將留內輔夫人深戒榮滿遠悟真筌固辭羸憊超謝塵俗每讀信行禪師集録永期尊奉開元五年四月二日歸真京邑其年八月遷窆於終南山鴟鳴堆信行禪師靈塔之後古不合葬魂無不之成遺志也長孫參元官至涇鄧二州刺史聿修厥德人忘道存次子延休并州文水令世載文雄家傳草聖次子慶遠協律郎深達禮樂克和神人咸負長才同淪短運季子光庭侍中兼吏部尚書輔政雍熙致君堯舜孝理發乎陵廟仁澤遍乎松檟是故妻以夫榮母以子貴以尚書先贈方伯申命上公夫人舊封華陽增號晉國詩云文武吉甫萬邦之憲上公有焉又曰彼美孟姜德音不忘小君有焉孝經云立身行道以彰一作顯父母侍中有焉合三德而為家橫百代而濟美信可以言時稱伐鏤石刊金者歟神道前銘薛令所撰且有後命俾余係述馬遷世家益孟堅之一傳劉寬表墓並伯喈之兩碑報德教忠俱傳不朽銘曰天生亞聖祚此王國文綜九流武參七德柔遠服叛窮西盡北赫我皇靈去其蝥賊仁則不遠智何不周如山之峻如川之流術與神合藝將道遊書來懸帳賦出登樓司馬軍陳官人綱紀帝加常伯國于聞喜室有令妻家成克子社金傳世桓圭守祀神為上台永介邦祉五嶽可陟惟德也謂之崇高萬物皆化惟名也謂之不朽若夫行欲蓋而德彰道無求而名立常聞其語今見其人公諱某滎陽人也華州刺史襄城公偉之曾孫蒲陽太守大濟之孫荊州刺史乾奬之子在昔周王敦序九族封懿親於鄭維時鄭伯敬敷五教賦善職於周其後蕃衍儒門光華士族威行西域名震京師入則天子授經出則單于抗禮公揭日月表山川體二氣之清淳納百代之層慶越在岐嶷異於常童既以冠帶遊皆長者初以門子宿衛解褐涼州參軍轉嘉州司士又宰鍾離當陽二縣皆秩滿兼攝江陵朞月政不改俗官不易方㣥盜出奔遠人來附其所處也入境聞愷悌之聲其所去也扶路有鬱陶之思非夫忠信以結之法令以齊之易以業之仁義以肥之孰能順人如此其理者乎神皇玉冊受天金壇拜洛頓網而鶴書下闢門而㣥龍至公待詔公車召議宣室目以竒士承一顧之恩許其正人參四率之屬乃墨制除太子右清道長史尋加中散大夫行淄州司馬負士元之才於是拜職遇邱明之疾從茲掛冠洛汭間居漳濱沈痼優游卒歲福應愆期豈非朋友之哭將見神仙之弔享年七十有九神龍二年夏六月十五日終於洛陽之私第冬十月一日歸葬於滎陽之舊原成先志也公執親之喪三年泣血以聞州里不亦孝乎先人餘業一物不有以讓兄弟不亦悌乎加以振窮紓急隱德陰施惠人由己反身待物是用氣類益親聲談載路善擊劍好投壺盡五射之妙巧究六書之體勢此蓋行有餘力則以多能位不充量天之命也有子曰博古曰博雅曰嘉徵曰嘉慶曰嘉重生極其養沒過乎戚恭惟皇考安宅靈邱盛德備於卑位家風缺於國史伐石他山寄哀詞客子産遺愛得無叔譽之言公業不亡實有荀攸之歎式撰鴻烈垂之後昆銘曰大君有命桓公封鄭世執王政其後不競為韓所并以國成姓沇水截河溢為滎波荊山之阿勝氣實多高門峩峩袞服委他猗嗟君子世濟其美動如義市居成仁里鳳集文史猿啼弧矢美政當官惟人所安救危拯越勞而不伐大運奄忽芳留形沒高隴既封深泉又重徑無人蹤蒼苔歲濃哀哀邱隴墮淚青松昔者堯舜既沒文武將墜天縱孔聖誕敷皇極於是乎恢六藝而正王道舉十哲而闡微言雍也為德行之目求也為政事之首吾見乎龍翰鳳雛百代而共貫虎符犀節重世而增華明德之後知其必大公諱實字茂實其先魯國鄒人也古天子有相氏宅於相土實曰冉姓蓋氏族之興舊矣不常厥所今為河南人焉五代祖睢陽公諱道周尚齊南康公主位平南將軍散騎常侍荊州刺史信州都督高祖諱軫仕梁太子左內率荊州刺史齊梁之閒荊巫重鎮世善其職江漢宜之曾大父義城公諱黎在梁雲麾將軍湖州刺史入周拜驃騎開府儀同至隋開皇中為旭州刺史大父黃國莊公諱安昌隋啓平城祚之穀壁唐分蜀國瑞以桓圭其後改封於黃授信州刺史歷潭州總管贈夔州都督烈考天水郡果公諱仁才秩金紫光祿大夫婚皇室漢南縣主涇浦澧袁江永凡六州刺史偉矣哉承家善慶歷代名臣風流載於史官勳業藏於王府公即果公季子天王自出內稟胎教混成之姿外被門風式瞻之訓從容合度造次皆法生而知之孝弟也學而知之禮樂也德義如山文章如泉縉紳之士仰焉宗焉弱冠太學生進士擢第遭家不造府君捐館五日絶漿三年泣血雖麻葛就禮而欒棘加人服闋調并州大都督府參軍事丁太夫人憂過哀終喪有如前制應八科舉策問高第授帛丿糸州司戶參軍轉揚州大都督府倉曹參軍又舉四科敷言帝除益州導江縣令鴻漸二鎮翰飛三蜀府中之孫子荊郡內之岑公孝用能據淮距海我庾如坻岷山導江入境先歎加朝散大夫除鄜州長史仍加關內道支度使去青城之洞府來白帝之鄜祠命服有輝使車何重除婺州司馬入謝於武成殿主上以邊庭有事喜問陳湯宣室清言思逢賈誼公召對蘊藉謀慮深長眷甚前席恩加後命因改恆州長史於時四鎮未復二蕃猶梗屯田繞塞戎馬生郊代郡藏符臨冀北而誠重漢家張掖比西河而還輕乃徙拜涼州都督府長史仍知赤水軍兵馬河西諸軍支度使地壯伏龍城雄飛鳥位居半刺總管三邊公乃利溝洫懋藨蓘庤茭藳積糗糧均轉輸程力役寬御悅使授方任能人胥忘其久勞兵不遠其長道雖金方氣風雨不交之地磧路沙霾草木不植之所莫不豐滯穗於坰牧厭甘於戍時朝廷賴之遷使持節河州諸軍事河州刺史仍知營田使崆峒連五郡之壤積石控九河之源公夙奉皇華政聞行露高車未至闔境相歡既見君子溫其如玉率性仁愛由衷易推是心也物感斯應覩恭肅而無競見禮義而興行不言而庶事熙非教而㣥下順故得大田多稼人和歲豐餉軍廩師處勤餘裕計偕入朝侍宴於長壽殿上謂公曰河州軍鎮要衝屯田最多卿以足食為心朕無西顧之憂矣侑以彩幣錫以文袞及公還州也璽書勞勉王人相繼國家徑流沙梁弱水收西域護南庭連百萬之兵以濟事於外不一日而乏者則公之力也無駭入極可謂費庈父勝之杜預平吳蓋知羊叔子功爾宜登元老作二天朝止於邊服實孤人望享年七十有一證聖元年二月十日寢疾終於官舍天子悼焉凶費喪歸悉命官給是日河湟耆老山谷羌夷反首剺面號奔州邑雖國亡子産吏哭祭遵豈云過也愷悌之化人之父母及其沒也哀亦如之信矣夫夫人金城郡君隴西李氏江夏王道宗之女也宜此象服爛其盈門嗣先姑之徽音立庶姬之範則蕣華前落藳瘞城隅以證聖二年正月合葬於河南之定鼎原禮也天使馬悲啓滕公之室人看鶴舞閉王女之墳松柏接於邙山邱陵對於伊闕石麟將鬬華表何年有子曰祖雍景龍初擢給事中兼侍御史內供奉追惟皇考孝於事親忠於事君恭於立身惠於臨人總是四行旁通具美貽厥孫謀以燕翼子故老之口既絶竹帛之文又滅揚名兮奈何刊石兮來裔其詞曰倬哉冉氏世有仲弓鐵冠繡服給事於中克昭遺懿樹之家風於皇嚴考高明有融德罔不尊藝何不涉嗣武先正思文載協建旟千里逮君六葉龜顧印房盤綬篋官以勤積業因時峻宰號神明掾稱親信驥足既展熊軒亦軔邦國海康京師河潤出車西域我君謨之屯田北假我君護之六軍有饋其誰度之一人無憂其誰樂之猛獸避德均遷所蒞靈鳥依仁霸升執事以今視古名齊績類天不憖遺山頽此位隴首回望秦川斷腸吏人攀紼哀鴈隨喪虛靈奠野行臨帷堂廟立邊郡魂歸故鄉王姬祔葬禮之終也水合蛟龍墳同石馬地積霜露煙攢松檟千載九原高碑淚下
