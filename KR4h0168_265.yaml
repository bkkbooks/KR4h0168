front:
  text: 全唐文欽定全唐文卷二百六十五李邕五
  hash: sha256:2d51709f15e9de59140953e04d4e3a0353ca166902bbd38d5bed5503b0c4cab0
body:
  text: 嘗以清白者賢操之行理迹者公人之業矧乃周仁以子物濟義以闕二字酌闕三字畢闕六字所以闕九字車未下而威先館未即而恩洽衢陌歌頌風俗异聞闕二字披闕一字歷闕二字德闕五字其在闕一字也闕十四字姓之後唐堯理水伯夷封於呂城周武興闕一字太公闕一字於齊國闕二十八字子左庶子祖諱寶素隋晉州別駕考諱安壽帛丿糸州長史莫不闕二字禮闕五字言闕十八字友至性遠與古人貞拔休風高視當代學觀古闕一字樂聽雅聲闕三字以闕三字兌闕一字以闕一字欲闕十五字同於席解褐冀州信都主簿改絳州太平丞階以昇進闕二字不闕四字清闕三字忠公闕十六字無闕一字科賦有條尋宅憂孔艱殆滅至性廬墓沫血闕二字茹荼服除轉闕一字州闕五字恩闕十五字恩除洛州新安宰以犯諱更滎陽率下以闕二字民以孝散闕一字以闕四字以闕二十一字不捨過而獄無其辜匪貸恩而人有其愛莅政闕一字矜闕二十九字璽書是降皇帝問洛州滎陽縣令盧正道闕二十七字祿秩以褒美政勉勗終始無替嘉聲賜卿絹二十匹闕二字蒲州闕一字馬闕二十四字錦州員外司馬朝廷以罰不及嗣罪不在闕一字收之以闕二十七字江東按察判官偕薦德樹賢黜邪闕一字惡汙吏阻格闕一字人闕二字尋遷闕一字州闕十八字飲水賦詩意誠而公義直而亮庭無宿諾事不闕一字於闕二字無闕一字言闕一字不闕一字於闕二十二字通闕一字昔金為闕三字從遊日月有來藥物無效神闕二字及闕十字以開元十四年闕十字修里之私第時宰咸闕一字朝闕一字嗟歎將智逝矣乞言闕一字乎以開元十三年二月闕一字六日闕一字厝闕二字安山闕一字先塋之闕一字禮也夫人滎陽郡闕一字君闕一字氏廣州闕一字史元度府君之息女嚴慈訓子闕二字事姑才德昭宣闕七字姓宜闕一字室闕三字翼後時闕三字祔仲子寬朝散大夫闕一字陵令叔子澈太原府士曹並彞闕四字長齡促闕三字堅前桃林宰季子曉闕五字州司馬闕一字子闕一字太子宮門郎皆在邦聞人惟家有子文史足以達闕一字氣闕一字迹闕一字以闕三字將以先公闕一字休畢闕十字銘泣柏淚枯號天氣絕敬申遺恨遠託故人闕二字莫追闕二字不闕一字其詞曰地藉慶靈兮誕生岐俊博總技藝兮含宏忠信錦闕一字詞闕一字兮雲飛筆陣闕四字兮闕三字進宰縣闕八字志葆光兮懸車解印除日歲斡兮舉燭風迅蒼生有闕一字兮皇天不憖蕭蕭闕一字門兮闕十二字近觀夫道義重者則土芥寵祿闕一字氣廣者則湫阨山林是以混然闕一字人闕一字在於藮闕二字然闕一字事不入於市朝其服也鄉其行也獨介如闕一字石闕三字蘭所以名與風翔業與時並闕一字稱君子詩曰碩人其在茲也居士諱天生字自然扶風人也其先出自夏后少康之允闕一字晉大夫闕六字漢丞相演班固之書豈徒保闕一字河而累葉胙土掃北朔而千載銘山因闕一字秦闕一字今為京兆人矣曾祖居士諱闕一字祖居士諱希求考居士諱闕三字幽抱虛壑閑臥深林黃卷晨開素琴夕引臨沼而下視天鏡仰山而高詠雲莊雖迹在人閒而志逸區外居士幼而神秀長而恬和習志闕三字人育沈冥於後闕一字高尚芝桂闕一字易衣冠其凝神也氣細於虛其闕一字節也冰寒於水則知瓊林玉樹迥出塵容闕二字蓬瀛遙登仙子是以好闕三字名流重真背郊廛變輿馬或靈藥一器或闕一字酒一壺接道闕一字於野庭申秘闕一字於闕一字座曷云招隱聊且懷人至若賦詩闕一字言比物闕一字意眇默闕三字遙昇天莫知曾深但仰元妙時有流俗親懿勸誘浮榮論葉縣於漢仙比漆闕一字於宋傲南郭槁木東方耀星出處有以闕一字名言論有以軌闕三字蕪沒三徑淪湑百齡而以飛遯居貞辭闕一字翫代與夫五辟未就六闕一字不行披霄褐以闕二字冠雲冕以闕二字非所取也居士乃軒辭解謝闕四字太息而言曰僕聞子面吾面肇允不同以馬視馬亦既有異矧爾改父之道則死孝曷申為身之謀則生慮曷保闕一字堯舜在上巢由在下闕三字國則如此以家又如彼自可永闕一字元覽悠悠素襟沒緡清流隱几磐石豈不泰歟議者以為風神照人文史滿腹闕一字聲大谷絕迹幽巖闕四字有膏者不煎有爪者不搏才不同也闕一字何為乎居士賡辭曰且駢指者疾多言者窮意者闕一字欲闕一字無為闕二字道身貴寶貝所以食闕三字寵珍羞所以却吾粒豈徒弄沆瀣踐莓苔買山以游沽名而隱者也闕一字後闕一字薄當軸曾闕一字閉關微赤松不追匪黃庭不誦聊以卒歲式用闕三字呼鶴矯神遷蟬蛻形解雖人事似促而仙路實遐以長安二年正月十三日闕二字化於闕二字時春秋六十夫人沛郡太夫人朱氏性與闕五字親始則輔德從夫終則擇鄰翼子光啟釋教休有禮防傳繫肘之方得觀碁之樂享年八十有六以開元十闕一字年三月七日示滅於京闕三字以其年十月十六日合葬於五齋原禮也長子處賓才與命違壽惟神闕一字丹穴之色闕一字變鳳毛青田之姿闕五字悲人代高步仙遊闕三字賓早慕嗇神久承元覽無玉帛之樂事闕一字詩禮之雅闕一字人求我知我棄人欲貂蟬莫耀荊菊是馨季子正議大夫行內侍上柱國元禮多闕三字全節冠時以孝則忠曰慈故勇西南護塞設五闕一字以闕一字謀東北闕一字戎縱一鼓而包敵由是昭宣豹畧作為虎臣歸西戎之數闕四字之闕三字克寸以少謀勝取多歐脫連頭而受誅穹廬屈膝而請命燕山之石揚先祖之刻銘屬國之官笑闕一字來之繫頸闕三字迫公事違阻闕一字心不闕三字松楸身廬塋墓猶且匍匐泣血擗踴椎心闕一字天地以昭親表山河而刻石其詞曰一門養素兮四葉探元遺土軒葢兮含景靈仙凝神闕一字谷兮洗耳寒泉笙歌蕭闕一字兮闕一字鶴翩翩揮手闕二字兮長歌紫闕四字日兮遼柱闕三字勿求之兮吾將懵焉有美厥後兮是稱其賢闕一字名四主兮宣力三邊孝家忠國兮揚親闕一字天闕二字行闕一字兮性闕三字倬彼石表兮永矣松阡觀厥品目異等業尚獻臣天與才名神福壽考而中留官序小往代艱位不極乎多能績未宣其利用戢駿翮韜良工悲聲起於絕絃泣涕形於抱玉自傷楚老豈獨公明而巳哉公諱某字某廣平新安人也其先出自顓頊重黎之後周之休父入為司馬漢之不識擢居衞尉至若昱輔魏主嬰立趙孤奉日以納忠殺身以明節精誠發於寤寐義烈冠於人倫宜其貽謀克家寵光形國業與時並名與功諧者也五代祖嚮府君陳襲重安侯隋蕭縣宰四代祖育府君隋車騎將軍曾祖皆府君隋涿郡主簿大父宏府君皇朝安陽令考大辨府君泗水六合二縣宰撰東征記兩卷藏之秘省莫不託宿元德從事老成典學積於蓬山能賦秀於詞苑府君令始家則光有國庠博通全經悉數賢行孝曰曾子文似相如下筆不休遣言無擇陳平長者把臂每多田蘇好仁引繩相重解褐徐城尉始足下也旋應五臣昇第遷宋城轉櫟城簿王畿政重帝告事先握札雲飛聽訟風靡載擢來庭長安二赤縣尉撙銜御黠夙駕承天驚暗若神應對猶響籍聽擢左臺監察御史仁克寬文無害恥為誶刻雅欲優閑朝廷許之轉詹事府司直歷城門郎長社武進朝邑曲沃好畤雲陽宰六縣皆代工開化順時布和慎簡里胥周省條簿其清水鑑其坦砥平從心術以外形隨手妙以旁發人樂新政俗勸古風載遷魏州司馬靜守憲矩審喻寀寮官師有章人吏不黷屬后族黜免允嗣姻連奏引諫書醜詆宰輔選其頗闕一字正其奸贓志士寒心朋家質首左遷府君饒州焉嫡子昕崖州舍城尉俄轉府君桂府洎島夷干誅天師問罪憑險縱毒送死阻兵昕乃不俟檄徵自促銳陣挺身而當矢石抆面而覆寇讎馬旋泥中人走岩下憤氣雖作救兵莫臨劒交於胷戈達於腋其命則殞其目不瞑嗚呼爭首謂忠供用謂勇倉卒歸盡零落無成有感路人愍悼慈父沉悲生疾積痛傷年猿堪斷腸鳥可銜木人非命也天何問焉以開元十六年十月五日奄徂化於官舍以某年月日反葬於某原舊塋禮也夫人廣宗潘氏封某縣君即銀州刺史寶勣之息女柔茲孔嘉貞淑丕訓是佐君子宜偕永年桃李早零松柏同祔子晧曜曦等並才彥惟有名教克開優游翰墨之場造次仁義之域宅憂殆滅追孝有望匍匐昭親哀迷紀石邕以披顏友道列坐詞人談笑未終存歿相訣情也有慟涕之無從雖不工於文將達於意其詞曰曾源積兮流彌長高闈慶兮齡亦壽命不泰兮時未將何寵祿之中否徒政理之孔臧坐疎屬之嬰累重愛子之飛章遭一門兮二謫備周歲兮兩喪寄永懷兮身後唯沒代兮名揚觀夫地高公族才秀國華德名昭宣沖用微婉動必簡久言必典彞人之儀形闕一字以為闕三十六字守中轖重養福亢宗以長其代邁德以閌其門者其惟我彭國公歟公諱思訓字建隴西狄道人也闕三十二字至信徙於秦克復其任子仲翔討叛羌於狄道子伯考因家焉洎孫漢前將軍廣子侍中闕一字十四代孫暠闕十一字曾祖闕十五字卿諱叔良都原州長史華陽縣開國公贈寧州刺史諱孝斌或集事雲雷擁旄為將或闕一字光日月闕九字禮以闕三字以闕十六字然寡欲超然遠尋好山海圖慕神仙事且束以名教阻於從游乃博覽㣥書精慮闕一字藝百闕一字偕妙一闕二字知闕二十九字聳義直道首公非忠益之論不關於言非侯度之謩不介其意夫如此可以近大化漸家闕一字功烈闕三十字睪子贊禹甘生相秦莫可得而聞已十有四補崇文生舉經明行修科甲明年吏闕一字以文翰擢闕三十一字未幾加朝散大夫滿歲除常州司倉參軍事出納之恡職司其憂蓋小小者於時也鼎湖龍昇闕三十四字興二闕一字之歎近關而出罔知所從臨河而還復將安處僶俛轉揚州江都宰公曰五行四時十二月闕二字為闕一字五音六律闕八字之多闕十二字義闕一字其闕一字情敷祐話言所以廣德化扇揚和氣所以暢仁心及履霜堅冰終風折木公歎曰天闕三十一字以闕一字家闕一字詬俟時變名求活所恨南陽宗子未舉勤王西京宰臣不聞復辟者曠十有六載及闕二十八字位莫非其人徵拜太常寺丞漸也未月遷太府員外少卿五旬擢宗正即真彤伯加隴西郡開國公食邑二千戶闕三十四字吠傷嗣害國誘關通之邪甘言卑詞售讒巧之譖助逆封已害正亂朝公密奏封章累闕一字啟沃闕二十四字動率闕一字迴闕一字納闕一字㜸之諛開臣禍之兆放逐勳舊慰薦寇讎后族握兵黨與屯衞仡仡賈勇凶凶作威持㦸闕一字其闕二十五字或闕七字之闕一字或外廷揣摩飛白鳥之難然以楚兵致討嘗懼季良淮南荐凶獨防汲黯出公為岐州刺史累闕三十字以闕三字舊也家富勢足目指氣使驅掠以為浮費劒㦸以為盜夸公乃急於長雄緩於闕二字峻闕三十二字國朝以時泰崇文事危尚武取申忠義具屈才能以左屯衞將軍徵家口並給傳乘議者以為式是闕三十一字義闕三字嶠則文雅洽通故散騎平遷侍中兼掌昔也所重今之所難公得之矣復換散騎常侍闕四字應闕二十五字之一闕一字以圖書闕一字此之再任以心膂昇故一從一橫一文一武丈夫也君子哉尋拜右羽林衞大將軍以闕三十五字渝考中上又更右武衞大將軍且師丹廉貞則拜斯職宋昌心腹三登厥官或以闕十六字於闕二十字門也因假開喻是究竟談以實明宗非差別行其道流也默論參元深闕一字見聖始作闕一字於不闕四字於闕十一字地之紀導闕二字之闕四字之闕六字翼皇道決策謀府經德智囊而日月有除霧露成疾莫可救藥誰能度思嗚呼春秋六十六以開元闕一字年八月闕九字第闕十四字州郡督賵布絹四百端匹米粟四百石葬日官給諡曰昭公宜家魏國夫人竇氏德心守彞禮容宏矩闕十三字嗚呼闕十四字不闕一字悲夫以八年六月廿八日合祔陪於橋陵園禮也姪吏部尚書兼中書令集賢院學士修國史闕二字公闕十一字一闕十八字布和宏恕以歸厚刑器有典軌物有倫嘗追如父之恩是切加人之感相與公之長子朝議大夫魏州別駕闕二十八字賢院昭道等並才名用譽業尚居多至性純深終天孔亟嘗恐竹簡紀事未極聲華石闕四字揚風烈闕十二字之闕二字名闕一字之闕四字麟定時秀人才國工詩書樂地典禮良弓率心載德濟義輸忠湖海雅度闕二字清風乃闕一字槐集闕四字伊昔闕五字窮闕十五字通赫赫復闕一字振振秩宗三思嗇禍諸韋荐兇憂厂田坴家國氣薄華嵩闕七字同闕七字衝闕七字雄闕十七字子惟孝靈龜是從桐柏烈烈碑闕崇崇盛業何許佳城此中夫兵者天之威將者人之命非武功不足以遏虐非智勣不足以視師故四朝簡才三邊受略百姓拉之如朽五變轉之若丸橫大漠而左迴出高闕而右去狄虜懷柔以納質匈奴辟易以破膽數騎深偵解鞍却敵入陣周迾搖扇坐謀矧乃大誰羽林離衞宸極蓄志堅石誓心渥丹捧日廓於九霄戴天旋於四孟千年聖主幸而逢之一代勳臣鮮哉稀矣公諱懷亮字時明東莞莒人也其先派於后稷演於周公洎魯孝公子臧因而為氏昔僖伯諫隱觀魚哀伯諫桓納鼎魯多君子視履考祥是以知其有後矣降自璋漢城陽王太傅暉蜀郡太守混晉東海內史曾祖滿府君隋銀青光祿大夫海州總管東海公祖寵府君皇朝請大夫靈州長史襲東海公考德府君皇朝散大夫原州司馬贈銀州刺史上柱國莫不納忠詞光訓彞則大乃嗣種德在人子孫並於昌時龜組疊於榮問公濬發卓犖雄舉倜儻風雨之氣凜凜出徒金玉之聲鏘鏘激物問家以廣孝形國以盡忠朋執義之昆弟友之雖文忠老成而壯武特立自左衞勳應穿葉附枝舉登科授左玉鈐翊府長上始足下也尋以天驕送死勝府纏兵占募出奇衝突包敵遷鴻州長道府左果毅仍長上恩獎充平狄軍都虞候總管轉左衞陝州華望府左果毅長上屬雜虜侵闕一字別將掎角橫戈掉戰匹馬飛行拜遊擊將軍本府折衝都尉仍長上公自任邊事每讀兵書山川之形不勞聚米戰陣之勢有以成圖驟施交賢博聞求巳習明以至用宏畧以壯猷故兵部尚書同中書門下三品平章事韓國公張府君年位不侔志業相許引之入幕辟以論兵抗禮肅庭握手密坐嘗謂人曰此子才經文武氣葢華夷逸翮將摶巨鱗必縱雖趙有李牧漢有衞青練彼朔方勦於獯虜無以居其右也由是聲聞於天威震於朔凡欲追討皆籍率先洎單于紹親閒道畧地絕沙漠闕一字冰河公乃連馬拽柴多旗具火詐示遶擊為出分軍虜以表裏驚疑沮衂奔散轉懷州南陽府折衝都尉仍長上朝議以元功未塞後命載加遷寧遠將軍左領軍衞懷州景福府折衝仍長上充大武軍遊奕副使除定遠將軍大衞雍州通樂府折衝仍長上充大武軍國慶加明威將軍本衞左郎仍充東受降城副使公以虜騎應來備預宜速出敵不意惟我有謀乃毒以井泉焚以草莽中休罔以秣馬夕炊罔以汲人虜歎曰可北而不可以南可望而不可以至公之謀也累加宣威將軍使仍舊載遷忠武將軍左郎將兼安北副都護匈奴以地闕援孤士寡糧絕蟻附城下雨射城中公乃偃旄麾匿金鼓懸門不發衿甲不陳匈奴且夕却軍遲明出塞以功遷單于都護借紫金魚袋公以北鄙禦寇中道扼喉生門以攜之死地以誘之覘其西也將驚其前察其東也將襲其後匈奴進退岐路迴旋二年議者以為約之不以長繩固之不以陷穽非公用智全勝按甲養兵安能預於此恩制加銀青光祿大夫單于副大都護兼朔方軍副大總管上蔡縣開國男公理兵戒嚴撫下勤至感恩挾纊攝威蹈火匈奴不南牧職公之故也拜靈州都督兼豐安軍經畧大使兼朔方軍大總管上蔡縣開國子匈奴利於馬牛指於靈夏嘗以三城分守上將專征議雖畫於河南身竟潛於漠北轉鄯州都督兼河源軍經畧使營田大使上蔡縣開國伯公曰且耕且戰足食足兵古制也於是闢屯積穀高壘止戈轉輸勦勞校卒加勸公之經也恩加雲麾將軍左武威衞將軍兼洮州都督莫門軍經畧營田大使隴西節度副大使上蔡縣開國侯吐蕃恃衆無名嗇禍有素遠掠邇牧橫掉我軍公乃下以單師張以厚陣惑之以聚散分之以從橫左右夾攻首尾盡殪日公當西守虜蕃南侵獲其迹人審其陰計咸以投艱在將解控惟在疑復以本官兼勝州都督東受降城大使營田大使兼朔方軍大總管上蔡縣開國公會六州九胡洊凶階亂倉卒起於懷袖雜杳混於賓主虜接塞聯馬肥弓勁其駭人也公分於二蕃制於散地持必攻之郡計必死之凶上奇兵以四征保危堞以內備雖諸軍合勢而殊效特高恩拜右武衞大將軍賜物三百段餘如故自頃牧胡殘孽留匿傍山或求食敓攘或逃死嘯聚猖狂三窟澶漫數州關隴震驚道路危阻復拜公朔川軍副大使節度河東道諸軍州兵馬圖是寇也公以彀騎雙絕誠難必擒夷險五岳非便不克乃傍山釋馬依林去弓接之以銛戈扼之以武旅襲其所短運其所長凶逆鞠窮旬月厎定以功最拜羽林衞大將軍復以本官兼安東大都護府都督攝御史中丞平盧軍節度使支度營田海運大使往者奚霫諸蕃之詭信也西屬匈奴南寇幽薊乘閒每鈔無虞亟和公以兵數實多藉用尤費輕舉則外患不解大舉則內攻更深是以傳陰符移閒諜飛言以誤其使重賞以賣其鄰既伐碩交且斷右臂所謂以武闢武以夷攻夷雖賈誼計然晁錯策得無以尚也朝廷多之拜冠軍大將軍復本任東莞郡開國公及神武告天有成登岳展禮白羽日野朱旗霞山臨之以天儀列之以地陣公以駿奔走驅熊羆智勞促來風疾孔亟詔使累降御醫洊臻舊疴有痊後命遄拜復起前任無何以本官致仕聖上以公節不可奪故信臣禁兵畧不可謀故臨遣武事入為心膂出作爪牙非夫至公如貔如武焉可遠符夜拜雅杖邊秋萬里為城四鎮為岳澄北海之濤水掃西沙之風昏者哉及乎暮律田園莊座枕蓆壯心不巳餘興未并宿昔霸陵意將軍之夜獵屏營細柳冀天子之幸臨去鷰悲鳴疲驂跼顧賓御太息覽對永懷嗚呼日也者飄入於泉山也者藏歸於澤人謂之遊神謂之遷其可若何以開元十七年八月二十二日薨於京師平康里之私第春秋六十有八主上感悼邊人掩泣羊祜罷市耿恭剺面見於此矣明年秋七月日葬於白鹿原禮也長子敬廉定遠將軍前檢校左監門衞中郎將上柱國次子希莊中大夫前安北都護上柱國三子敬之前左金吾衞中候賜緋魚袋上柱國四子奉忠前左司禦率府長史賜緋魚袋上柱國五子敬泚前殿中省進馬上柱國並淳孝濟義昭武懿文檢崇讓以後身率周仁以集事光備慈訓追遠先塋雖史簡可傳而碑板尚闕顧予以舊執詢予以小才博殷而札翰未宣體大而襃揚不際將竭虛薄曾深其詞云爾惟至聖兮內外無憂任英武兮出入孔休總戎幕兮四紀闕一字羽林兮六周樹元勳兮特立隱敵國兮鮮儔救河曲兮走朔方解遼海兮振漁陽一生一死兮鞍甲臥沙闕一字雪兮疆場橫匹馬兮飛將起萬里兮邊防忠則極兮志亦苦年且高兮疾不愈事枕席兮忘家瞻日月兮戀主情遝遲兮怛化魂恍惚兮破虜志何深兮命何促時不與兮才不贖碑一代兮人英征九原兮鬼籙嘉忠孝兮題紀貽永載兮陵谷嘗以天者常生於人之前人者常化於天之後常生常化其惟天與人乎有物有馮者其惟天仙乎不生不化者其惟大聖乎無為無事者其惟尊師乎師諱思瓘家於臨川隱於麻姑山其先出自有殷春秋後子孫因國為南陽望族後漢有太傅禹蜀有車騎將軍揚武侯芝晉有武威太守世龍以至曾祖和祖甫考嗣偕秉哲衣德參寥洞元代有人矣且源派分流達於江海之內父子傳氣合於天地之初尊師幼入廬山中移恒嶽吸沆瀣潄清泠精魄冥於太虛耳目靜於穹谷身枯木心死灰固不如也開元二十三載皇上下明詔求方士聞本郡別乘李行褘以尊師應辟焉帝請問所習雅重其言常齋太一宮集元元教慮失諸野思得其人臨遣尊師俾巡江南六十郡冥搜元覽欲以張皇大道開覺下人明年春二月甲子復命稱旨意勅度為道士名曰紫陽仍賜紫羅法衣一副絹一百匹配東京福唐觀兼本郡龍興觀以寵之議者以尊師心奉於道身事於君名師於鄉德揚於國莫之比也五月三日又賜絹一百匹紫羅法衣一副所謂高其行而累於賜貴其言而尊於服我聖人之用心也九月七日扈從西京勅安置同德興唐觀君子曰尊師與聖同德而興我唐乃居此觀韙也二十五年冬恩勅許歸覲省出中使二人監侍渥承於主榮及其親兼遂者鮮矣二十六年春特勅詣中岳王屋函谷宗聖及諸名山修功德其所至也神兵降於壇上慶雲集於山下元鶴徘徊於霄漢丹芝鬱馥於原野上聞而嘉之又賜紫羅法衣兩副將以服一生之體潔帛五束將以當五方之鎮綵綾六段將以成純陽四九之數錢十二萬千將以合日月十二時之會僉曰天物備矣道心行矣二月甲子一日兩詔偕召七人初為中禁潔齋後以真源謁廟重聞天聖獨以道高二十七年冬十月朔七日駕幸溫泉宮恩令太元觀安置子夜過半仙裝聿來顧謂門人竹務猷曰虎駕雲車門外十乘青童執節庭中二人吾當從之此迓我也遺言曰吾事親未終於孝愛弟未終於仁請本郡御書仙靈觀額及麻姑山置廟茲事莫遂奄至形解聖上儻問於我君將此辭以聞言畢異香四來奄忽而化篋藏手詔三十紙壁挂道經五千言前後所賜法衣七副而金紫者雜綵七百二十八段錢二十六萬七千尊師盡以幡像香油之供費其餘無幾或賙老病貧窶焉帝聞之流涕賜絹二百匹充其歿養之闕一字用錫尊師孝也度弟思明麻姑廟道士用成尊師仁也御書仙靈觀額立麻姑山廟用昭尊師願也出中使二人監祭造車轝送還本鄉二十八年二月二十日殯於舊居麻姑山頂甲子改葬棺中惟見牙簡香鑪而巳尊師應於盛明昇於上清時春秋三十有七甲子永惟大聖元元皇帝教曰成而不居死而不亡者斯之謂歟夫厂田坴兵者㝢內所苦用武者朔漠所懸粵若董戎三軍司帥萬里未易為也是以累戰必勝所謂興國每守必固所謂扞邊英雄歟忠公歟不然曷以分命山河書勳竹帛者也公諱懷亮字時明莒人也其先周公之祚允自僖伯哀伯正詞魯史太傅太守理迹漢朝克揚厥休不泯於代所從來遠矣公即隋銀青光祿大夫海州總管上柱國東海公滿府君之曾孫皇朝請大夫靈州長史上柱國襲東海公寵府君之孫皇朝散大夫原州司馬贈銀州刺史上柱國德府君之子少而習書長而事武特稟閒氣雅仗大名暗合孫吳自比管樂移家共用乃出孝首公用仁足以子人崇義足以開物弱冠應穿葉附枝舉擢第授長上再遷果毅都尉三除郎將加銀青光祿大夫莅歷單于安北靈勝洮鄯安東七州都督護擁旄豐安河源莫門朔方朔川平盧六軍經畧節度營田大使三入羽林大將軍加冠軍大將軍上蔡縣開國公至若設奇兵勦勍敵智出人境事揚天聲經之三邊忽四紀舉無遺策動有成功雖李牧十年武侯五月罔足以議及乎屯禁旅直嚴更遏周牆之禍萌增鐵障之安國又何加焉自頃臥疾時扶力強飯嘗以匈奴未滅家國所讎長吟朔風太息秋序嗚呼陵谷者地之險有時而遷日月者天之光有時而異況於人乎風瘵彌留以開元十七年八月二十二日薨於平康里之私第時春秋六十有八親友揮淚朝廷歎息逝川歸海長城復隍悲夫以明年七月卜地於白鹿原禮也嗣子定遠將軍前左驍尉翊府左郎將兼檢校左監門衞中郎將上柱國敬廉次子中大夫前安北都護上柱國希莊三子前左金吾衞中賜緋魚袋上柱國敬之四子前左司禦率府長史賜紫金魚袋內供奉上柱國奉忠五子前殿中省進馬上柱國敬泚等並風茹荼薤露泣柏號天自毒負土空寃用紀石銘將符竹簡自承訪舊遠託馳誠事梗㮣於豐碑情辛勤於絕筆其詞曰周公錫允魯國因名矢魚興諫納鼎飛聲家傳禮樂代有賢英才子閒出武功特興提兵北壘救敗西鄙保界七州彌曠四紀無堅不陷無強不却三邊風清萬里雲廓謀慮縱橫威名昭灼物莫能又運何以長邊也不幸人之云亡風沙未息松柏巳行哀哀孝思冥冥泉壤高山或遷其詞爰仰庶石銘之可託式蒿里之無爽嘗以張子纘承珥貂裘者七葉楊公丕搆乘朱輪者十人下闕惟一闕四字郡守闕四字營下闕都督全德安仁畢下闕察其考闕一字謹行府下闕詩書益智犮三年之為下闕殊歎闕三字二九闕一字遼什伍下闕隨闕一字以包欬議者以為良將下闕節公以名數見召義勇備下闕者惟一誠能沮彼勝下闕兵不以穿四闕一字陣甚下闕而排厚無下闕宸翰賜下闕之私第邊鎮奪闕一字士下闕俸散於戰人玉帛均於門下闕廡國家方築壇拜將下闕西河郡司馬府君之息女賢和淑慎靜恭貞白移下闕也允子朝議大夫使持節景瑊下闕大心正懿文壯武廣孝移忠惟下闕山不舉燧利倍往昔功省今茲下闕恐桑田或變陵谷仍遷是題豐石之碑式表先公之墓其詞曰卓彼茂俗赫乎高門經文緯武翼子謀孫其一施及我公克廣爾祖敦下闕筆遼水渺彌隴山岧下闕悲纏九族戀切三下闕
