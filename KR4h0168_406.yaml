front:
  text: 全唐文欽定全唐文卷四百六圖天寶時人
  hash: sha256:c0db9ba6733f0764b521a5520d7f3edfe6bf0b28d8a2a7c6ce5e63a84627da59
  markers:
  - {type: head, offset: 12, content: 蔣圖, id: KR4h0168_NFKB_406-h1, level: 1}
body:
  text: 闕一字國化人代天育物者必資於賢明矣其選才刈闕一字越於吏部乎昔王戎標簡要闕一字也中有吏曹庶士皆考乃聲實器其藝能闕一字鍵秉人物之樞要出納之吝謂闕一字胡山惠清河傅延闕一字宏農楊自然太原王漳源領同寮數十闕二字或以德進或以詞華居最或以翰墨稱闕一字角詩書弱冠文史然而博綜多識靡所不該研機深沈悟色空闕一字達知窈冥而有精湛常樂真如以求實闕一字寮庶品之闕一字福也作是願已罔不悛心則有遠方名工不召闕一字無足而員來或剡或礱成之不日載雕闕一字彪炳則有揮毫騁勢拂花雨而爭鮮垂露矜能懸貝葉而增闕一字真實視之者方開淨眼且宿植德本合求闕一字相宏誓願力永此證明然後乃知是非兩忘得失雙闕三字學嘗試言之目論膚受乃為銘曰闕玉文炳煥妙理宣揚無幽不燭無滯不彰是非雙闕三字堂堂惟一天寶朝官侍御史知雜事歷戶部郎中乾元二年出為華州刺史封平原郡開國公大唐中興剋復兩京後乾元元年自十月不雨至於明年春朝散大夫使持節華州諸軍事檢校華州刺史平原郡開國公賜紫金魚袋張惟一與華陰縣令劉皓丞闕一字峋丞員外郎置同正員李緩主簿鄭鎮尉王禁尉高佩尉崔季陽於西獄金天王廟祈請初發言雲興倏登車雨降蓋精意所感致明神應期庶以潁川之能不慚方伯之事時二月十日題紀翰安西副都護道元子以軍功積纍遷隴右節度副大使知節度事天寶八載以破石堡城功拜特進鴻臚員外卿進封涼國公拜太子太保以風疾廢於家祿山之亂起為皇太子先鋒兵馬元帥討祿山加尚書左僕射同中書門下平章事兵敗為祿山所擒偽署為司空尋殺之蘇毗一蕃最近河北吐澤部落數倍居人蓋是吐蕃舉國強授軍糧兵馬半出其中自沒凌替送款事彰家族遇害二千餘人悉其種落皆為猜阻今此王子又復歸降臨行事泄還遭掩襲一千餘人悉被誅夷猶獨與左右苦戰獲免且吐蕃蘇毗互相屠戮心腹自潰滅亡可期但其王逆逆歸仁則是國家盛事伏望宣付史館旌其慕化光朝天寶時人天垂象見吉凶聖人指象之法莫先於渾儀是以王者將下理於萬人先上齊於七政軒昊之後分重黎二官唐虞之日命羲和四子代掌其器以為人極聖作有程必應其變故有謂之周髀蓋天謂之渾天宣夜用則假於器妙則存乎人曰若開元天寶聖文神武皇帝以為天有時時有變不可從舊更法而取新更立銅渾無毫釐之差得精一之義引而上則邁於古推而下則合於今非古之聰明神睿者孰能為之乎於是五緯連珠兩曜合璧神輸祥瑞天降嘉生默而不談且慮樵夫之笑言而未遠且陳君子之心遣於鄙辭乃為賦曰國之神器名之渾儀法天之象知天之為雖考古以作則亦維新而成規琢璿為衡範金為蓋其狀則小其用則大南極北極正其端隅上規下矩正其外內繚繞黃道環回紫宮斗居其北日起其東別度數於分寸之內點星象於毫釐之中處動而能靜妙同乎造化之意寂無以為有用擬於陰陽之功有象必見惟幽是通乃知近能則遠合下正則上同因之以言寶歷遂乃授乎人時以通天下之志以斷天下之疑違之則失信之無欺聖也智也念茲在茲四時以之咸序萬物以之攸理弦望之候不夭夭心寒暑之期可紀測天地之否泰知陰陽之終始述作固稱於帝王司存乃歸於太史猗此成器為國之寶通幽洞微贊我皇道讜言一作儻言字士龍元宗時擢書判拔萃科君上事地典禮孔明臣下奉天祀物斯辦以騂牲類圓德以黝牲奠方祗必齊躬以祼將咸先甲以從事今乃居陰位施陽禮紊百代之則循一時之宜豈惟不嚴於神實乃有靦於國且祭以崇德禮以展敬况在唐堯之朝守禮樂之秋而享祀禺若牲牷昧如固可捨其不供之辭責其尸位之罪省躬天寶時官侍御史內供奉利用祭物肅敬鬼神不夭夭心乎物實受其祉甲歆司人事著宗伯當執燭以獻數亦敷玉而備儀何肆無稽之言用虧有恆之典雖雅有泂酌以清潔為貴而傳稱瓘斚在祈禱則施福善苟違圭璧之所傷無幾薦誠或應黎元之所獲則多既靡終於舊章奚將表於明德神則不享吾何以觀糾夫失儀信為得實罪自掇也刑其捨諸齊卿天寶時擢書判拔萃科舉善國經為善身守有觀風俗俾擇賢良故軺傳一封尚且通於鍾律埋輪八使豈獨懼於豺狼景以星車達諸天府惟賢能似雖讐不忘御史彈違蒞職肅物臨人謂無失於奉公乃見傷於與善使苟為鬷邁疑是鬷蔑畏此簡書則羊舌廢而不興祁奚誰其請老制命為義雖暫威於柏臺察理蒞仁終取連於茅茹欲成三物方建一官所糾之言其細已甚介福維祺授康緝御未濟溝壑是登邱陵將察視之致虧惟對問之所詔非我族類其心則乖且幼長之行陟降有序儻云能賦遂爾升高或匪事親爰加大杖豈桑榆之已逼將檟楚而收威設取愧於離婁終見傷於寧越外臺置辟實諧所訴華省繩愆請修其本解式之競長年其悲因興立功就敗成罰天之所壞人莫能支泉既稱於濯龍歌未聞於黃鵠是為廢墜匪克修平則當程以土功議其遠邇同夫鄴令舄鹵更生其稻粱彼秦人荷鍤能降其雲雨若乃虞藪澤之利述形勝之由非曰子來敬乎慮始無有猶可勿對其庸子珣元宗時擢書判拔萃科庚補觀生事師來學方欲空中辨氣指寶劒於豐城天上瞻星識賢人於潁水既而天遠人邇功業未就弟子之好束修是徵所務雖殊於算生其致亦同於觀者康成博物計天儀而不差裨竈多知察時變而無舛一彼一此豈曰殊途觀生算生固宜齊例何稱抑納輒此薄言須科虛訴之愆俾從伎術之例祭惟備物往籍攸先禮以貴和前賢所重苟初事之不曠在疾徐之可容相彼孟壬將有事於牲具瞻言仲已乃無何而畢入誠則恭不失備遽而中規俎豆之事載陳金石之音卒奏夫惟贊者忝預於斯既曰偕行還宜共濟安得縱茲大惑發彼小瑕殊成子之不恭禍徵受脤異陳他之如忘釁起臨盟以懈怠之見規則聞前史因備失而歸罪且未合宜事貴無違禮崇得中請從博士之議庶叶隨時之理眷言贊者可無詞乎果元宗時擢書判拔萃科農縣官云恐國用不足眷彼長安是稱輦轂詢於百姓賦彼三農儻儲廩之未供在犬畝而攸給稽諸魯史什一稅而可徵詠彼魏風三百廛而斯取是為盍徹未抵彞倫雖過半有詞且悲杼軸而官惟恤隱宜窒盈庭如或水旱不時藨蓘無取歲莫資於稼穡人必慮其流亡則徹田為糧盡輸王府而賑廩同食猶餼疲人將循古而知方亦從權而未爽璠元宗時擢書判拔萃科不掩厥善代選爾勞伊人祇辟咸示中正朝廷作乂大明黜陟使苴茅永建無替於乃服鄭竹斯刊審欺於誠道丁以祖孫繼體位由當室乙則戒慎不足人自速辜德在友于復公侯於令季既生女子濟緩急其及嗣仰丁鴻之清節遠且逃身慕緹縈之淳志期無鑿顙有司務隨時之才徒高守法當官藉通變之識未宜膠柱昔泰伯三讓公季代緒漢除五刑班史垂則行古之道仲子所以捨孫易父以死趙簡申其禮聘相彼一時之義今為千載之名豈可使帶礪遂絶於承家齠齔服刑而代罪兄則不返封欲誰承女既年弱奴何足任鮑公往矣丁必無由理屈淳于獲宥乙女亦可恤刑景之前聞庶無凝滯周官立法惟聞薄斂魯用不供爰行大桀皇家布聖敬之明德貴因循之令典乃修弛賦之道不足宜陽之計什一而稅億兆以庸何彼所司率由非政不能和彼三事申物土之宜而乃鳩於庶氓成取怨之道豈自貉之為制其於蠆而不若臨財無苟其曰是乎於義或妄未為能也惟此中尉曾無內省若利彼社稷則死生而以之斁我彞倫在憲章而莫捨益之為助空望於十朋孚則未終且成乎一握獲夷不同於入腹出否幸從於顛趾泄天寶時人惟彼馴象産乎南夷其形大也因地而受氣其性順也從心之所資食豐草於幽巖之麓飲清流於長江之湄不忌於人如得其時推誠於物任以縶維此吾王之化被也故遠人得而獻之中心搖搖其道遲遲左顧右盼知出㣥之已遠廣思遐想與草澤而長辭修塗是尋疊嶂嶇嶔或行於陸但隨山而上下或載於舟距涉江之淺深既濟水以次水復出林而入林所過之邦徒觀其骯髒之貌所遇之衆豈識其謙柔之心荒徼已違王畿斯入聞之者遐邇必至覩之者士女咸集人不知其故皆愕然而立或告之曰所馭之者越人所出處者林邑近之可仰遠之可望銓衡不能舉其體丹青足以圖其狀揣輕重者我有蒼舒之智高思柔服也我有周公之德王以之馳三軍比矛戟而齊鋒以之和六氣與簫韶而俱唱稽其來也自南徂北嘉彼所獻充我王國食以筐筥牽以徽纆將致貢於昆夷亦率職於卭僰斯之為義可得而論性之馴良表邊夷之向化體之固實揣中夏之所尊以君好生之故我生必壽以君賤貨之故我齒斯存豈克耕於野輸衆人之力曷如我入貢霑萬乘之恩雖自慚於陋質永願在乎王門季邁天寶時擢書判拔萃科天子六官司徒九比稽其徵令登以歲時力役於是必均施舍自當率理有國之要無相奪倫乙職彼鄉師何速官謗或虧我道孰守爾法且四人分任所以定乎等衰一切從徭何以彰乎貴賤甲乃為吏有別夫家辨任必欲執文復除自應蒙幸與同夫者君役不及於支離長服事焉爾政何傷於滅裂苟欲達於鄉黨豈辱在於泥塗訟則有孚理合無撓免之或可誰曰不然載徵司馬之書難舉鷞鳩之典霜天寶時吏部常選闕尊勝經咒伏願燈光照灼除黑暗之疑幢影參差滅恆沙劫罪乾心稽首乃闕闕破暗網兮樹燈光願合家兮悅時康千秋萬歲兮壽無疆無欲天寶朝官殿中侍御史內供奉典禮之興講經為要安人和衆學古入官丁以專經直講經師訓造藝成重席業固專門歌詠先王頌聲以光於講席討論文義德化藉甚於談筵考課攸歸勤效斯在以無他伎蒙竊惑焉且州縣徒勞自拘於常式庠序爰設亦著於彞章妄告之人須科反坐中國有孚殊方委款不遠波海來趨天闕仰衣冠而竭誠願臣妾而見訴國客茲備式宴且酣方樂未便闕歌與舞旄人典斯鍾鼓職彼靺任既乖用舍之宜須置疏遺之罰為惠文所抵信得其由推鞮鞻之夭夭心未聞其可喪也寧戚禮亦從宜恩有厚於大臣義不遺於小斂今位崇三品名謝百年國章自書其禮物有司豈怠於供擬若春羔已獻在凌室而須開夏蟲正疑闕夷盤而不可自當曠官之責何待司儀之按時則匪要法欲何加瑰意琦行有應則通陳力就列不能則止故營營吏道坐州縣而徒勞寂寂間居退邱園而優逸丁也縣吏職事前修挂幘公門頗遵孤節角巾私第自得遐心州以小道從方恆科守職白雲已遠尚勞矰繳之心尺蠖相趣未識江湖之意責其廉退之節科其高潔之辜欲使疏廣厚顏陶潛負譴僕雖不敏竊謂非宜禮有九命聞之典秩爵惟五品存乎令制以祿饗親追崇孝敬之道以賢致位周旋名器之間從事於斯無宜失墜執禮以動何所遲回然則吾從大夫之後祭中寢而非爽奉守先王之典用太牢而為過今則無廟子欲何之索而致牲古亦詳矣憲臣按法操柄特深訴者執詞情理可據冽天寶十二載官殿中侍御史寰海之內長沙大野妖星既落兮天履其下皇帝將欲罷鑄兵歸馬馬舞比干羽文化區夏在昔則格虞氏之遠人於今則彰我朝之風雅日麗黃道帝臨丹墀鼓靈鼉兮旗翠鳳登舞童而詔樂師兩階儼然而八佾舞之顧步而動兮成文在茲拊金懸始求聲於律呂揚玉戚非取象於華夷且干者兵器去其用而持其實羽者樂音美其聲而秉其質是用抑揚於倒載之後鼓舞於飾容之日肅穆壯成舒遲靜謐周旋乎東向西向行列乎左墄右墄所以增廣殿之煜烜所以符太階之光明然後叶順氣繼和聲騖情而白日重貫造物而洪爐再成必使萬彙千品四維八紘革心而來約泄泄於靈府鼓腹而進仰巍巍於穆清吾君是以黜掌上之纎腰弛庭中之妙戲况丸劒揮霍巾鞶慢易或洶湧於鼇抃或翩翻於鳥企諒文德之無補於樂情之為偽若其條暢旁達聲明遠被俾其洞心駭耳屈膝交臂是知至誠可以幽通大樂茲焉統同彼儀鳳之瑞格神之功雖非至理是必同風不然曷能去肉刑除脂網福如山峙澤若河廣蓋總干動其形容理國觀於指掌而已客有窺萬舞美柏皇然後賦兩階之事知五樂之方禮以訓俗樂以移風粵我皇兮是崇字以形言舞以象德肇開元兮是則是知聖人之合舞也既所以誕敷文教亦所以擬象周旋自我作古示不相沿豈比夫漢主習五行之典虞后陳兩階之前干戚之容雖備文字之旨未全何以哉盡善盡美待吾君其具焉望之如雲聖人為君橫御樓於北極張古樂於南薰八佾之羽儀繁會七盤之綺褎繽紛雷轉風旋應鼉鼓以赴節鸞回鶴舉循鳥迹以成文周瑜之顧不作蒼頡之字爰分竦萬方之壯觀邈千古之未聞其漸也左之右之以引以翼整神容而裔裔被威儀而抑抑煙霏桃李對玉顏而共春日照晴霓間羅衣而一色霧縠從風宛若驚鴻匿迹於往來之際更衣於倏忽之中始紆朱而曳紫旋布緑而攢紅傅仲之詞徒欲歌其俯仰離婁之目曾未識其變通懿夫乍續乍絶將超復發啓皓齒以迎風騰星眸而吐月搖動赴度或亂止以成行指顧應聲乃徐行而順節且歌者所以導志舞者所以飾情觀其容也或以移乎風俗察其字也或以表乎貞明振古不覩斯今獨榮掩雲門而奪大濩鄙咸池而陋六英一人有作萬物咸亨臣固迷於日用願頌美兮載厥聲陳思王榮分帝子寵列天孫集賢東閣追宴西園使趙女攜琴文君送酒劉楨吮墨而作賦王粲稱觴而獻壽樂者所以節宣其意舞者所以激揚其氣不樂無以調風俗不舞無以攄情志王乃奏長歌登舞閣徵絶伎於行宮命夭姬而走索同曳緒之翩聯狀跳丸之揮霍即使燕姬撫琴秦女吟笙楚妃歌防露之曲陳后唱結風之聲則有楚媛巴兒齊童鄭女躡凌波之緩步曳飛蟬之薄縷掩長褎以徐吟頓纎腰而起舞低鳳鬟於綺席聽鸞歌於促柱燭若蓉蕖折波而湧出婉若鴻鵠凌雲而欲舉其為體也似流風回雪而相應其為勢也似野鶴山雞而對鏡總衆麗以為資集㣥眸而動咏觀其躡影赴節體若摧折將欲來而不進既似去而復輟回身若春林之動條舉袂若寒庭之流雪乃其指顧倣徨神氣激昂竦輕體以鶴立若將飛而未翔作之者不知其所觀之者恍若有亡別有邱園羈旅簪纓無序擢高枝於芳桂挺茂幹於長楚頓雌雄於飛伏卜行藏於虎鼠思擢太常之第求奉揚庭之舉徹密貞王元曉再從孫初封東莞郡王徙封濮陽郡歷宗正卿臣徹等伏見禎祥委積河海澄清長瞻北極之尊屢獻西封之疏誠懇不達天鑒未從徘徊闕庭隕越無地陛下再造區宇肇康生人與天合符與道合契故得靈芝表瑞玉版呈文九穀歲衍於京坻百蠻盡習其冠帶能事備於典策盛德光於祖宗升中告成是屬今日惟夫太華高冠㣥山當其少陰鎮此西土自有虞巡狩歷祀三千夏殷以還罕能肆覲陛下雖加進寵號增崇廟宇而大禮未施精意空潔又陛下頃歲建碑曰嘗勤報德之願未暇封崇之禮萬姓瞻豫言可復也臣以為天地之主豈徒言哉神祇候望故已久矣伏願俯順百辟兆人之請明徵刻石銘山之記暫遷萬乘降被三峯奠圭璧於中壇奏笙鏞於上帝使暜天蒙福重賜無疆頻冒宸嚴並期必遂無任懇切屏營之至謹詣朝堂奉陳請以聞萬頃天寶時官河南尹漢辟賢良周升俊造求我士庶登之於朝咨爾大夫褎然為首以弻余教將沃朕心况張敞尹京孫宏待詔軒墀中禁襜褕上謁如咫尺之在顏何槃辟以為禮將三命以必走奚九拜以愆儀然惟才所難與人無備焉可納虛詭之説畏賢能之書苟上第之得人豈左遷之云罪試可乃已吾無間然圭璋天寶時擢書判拔萃科制祿受寵以身許國夫不舉賢宜其削地故何武所薦先於宗黨孫宏慎擇果得詞林至如官則尹京爵為上秩問馬未能於鈎距推賢乃見於槃辟且不求備寧責於周旋如或可收豈徵於拜禮應屬天顏咫尺對揚失墜楚材儻以堪用卞璞詎宜便捨欲求上賞更俟試時因奏左遷孰云其可聖朝刑尚不濫舉賢理合從寬向觀稽首之儀未成不削之罪璲天寶朝官司勛員外郎歷戶部金部郎中國有地官以帥職鄉則大夫而列位政無苟二命在奉初告於鄉里頒司徒之禁令期於歲時登夫家之衆寡眷言甲者斯焉從政既受其法如璽印塗將教所理猶金在鑄是以俊造察本於鄉閭賢能薦登於天府同谷永之舉士不失薛宣類周瑜之貢才無遺魯肅况致事有典大比作程詢衆之謨義存五物禮賓之飲道在三年作良命官是甲未聞失德賞恭罰否彼憲何其謬繩
