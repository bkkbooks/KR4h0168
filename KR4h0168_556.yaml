front:
  text: 全唐文欽定全唐文卷五百五十六韓愈十
  hash: sha256:e226afd8d3f3ba4607bb62adae481ee78094b8ccb179bf27144e229d02b93aa1
body:
  text: 昔疏廣受二子以年老一朝辭位而去於時公卿設供張祖道都門外車數百兩道路觀者多歎息泣下共言其賢漢史既傳其事而後世工畫者又圖其迹至今照人耳目赫赫若前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其鄉世常説古今人不相及今楊與二疏其意豈異也豫忝在公卿後遇病不能出不知楊侯去時城門外送者幾人車幾兩馬幾匹道旁觀者亦有歎息知其為賢以否而太史氏又能張大其事為傳繼二疏蹤迹否不落莫否見今世無工畫者而畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者白以為其都少尹不絶其祿又為歌詩以勸之京師之長於詩者亦屬而和之又不知當時二疏之去有是事否古今人同不同未可知也中世士大夫以官為家罷則無所於歸楊侯始冠舉於其鄉歌鹿鳴而來也今之歸指其樹曰某樹吾先人之所種也某水某邱吾童子時所釣遊也鄉人莫不加敬誡子孫以楊侯不去其鄉為法古之所謂鄉先生沒而可祭於社者其在斯人歟其在斯人歟六年冬振武軍吏走驛馬詣闕告飢公卿廷議以轉運使不得其人宜選才幹之士往換之吾族子重華適當其任至則出贓罪吏九百餘人脫其桎梏給耒耜與牛使耕其傍便近地以償所負釋其粟之在吏者四十萬斛不徵吏得去罪死假種糧齒平人有以自效莫不涕泣感奮相率盡力以奉其令而又為之奔走經營相原隰之宜指授方法故連二歲大熟吏得盡償其所亡失四十萬斛者而私其贏餘得以蘇息軍不復飢君曰此未足為天子言請益募人為十五屯屯置百三十人而種百頃令各就高為堡東起振武轉而西過雲州界極於中受降城出入河山之際六百餘里屯堡相望寇來不能為暴人得肆耕其中少可以罷漕挽之費朝廷從其議秋果倍收歲省度支錢千三百萬八年詔拜殿中侍御史錫服朱銀其冬來朝奏曰得益開田四千頃則盡可以給塞下五城矣田五千頃法當用人七千臣令吏於無事時督習弓矢為戰守備因可以制虜庶幾所謂兵農兼事務一而兩得者也大臣方持其議吾以為邊軍皆不知耕作開口望哺有司常僦人以車船自他郡往輸乘沙逆河遠者數千里人畜死蹄踵交道費不可勝計中國坐耗而邊吏恆苦食不繼今君所請田皆故秦漢時郡縣地其課績又已驗白若從其言其利未可遽以一二數也今天子方舉㣥策以收太平之功寧使士有不盡用之歎懷奇見而不得施設也君又何憂而中臺士大夫亦同言侍御韓君前領三縣紀綱二州奏課常為天下第一行其計於邊其功烈又赫赫如此使盡用其策西北邊故所沒地可指期而有也聞其歸皆相勉為詩以推大之而屬余為序伯樂之廄多良馬卞和之匱多美玉卓斗王褱怪之士宜乎遊於大人君子之門也相國隴西公既平汴州天子命御史大夫吳縣男為軍司馬門下之士權生實從之來權生之貌固若常人耳其文辭引物連類窮情盡變宮商相宣金石諧和寂寥乎短章舂容乎大篇如是者閲之纍日而無窮焉愈常觀於皇都每年貢士至千餘人或與之遊或得其文若權生者百無一二焉如是而將進於明有司重之以吳縣之知其果有成哉於是咸賦詩以贈之貞元中愈從太傅隴西公平汴州李生之尊府以侍御史管汴之鹽鐵日為酒殺羊享賓客李生則尚與其弟學讀書習文辭以舉進士為業愈於太傅府年最少故得交李生父子間公薨軍亂軍司馬從事皆死侍御亦被讒為民日南其後五年愈又貶陽山令今愈以都官郎守東都省侍御自衡州刺史為親王長史亦留此掌其府事李生自湖南從事請告來覲於時太傅府之士惟愈與河南司録周君巢獨存其外則李氏父子相與為四人離十三年幸而集處得燕而舉一觴相屬此天也非人力也侍御與周君於今為先輩成德李生溫然為君子有詩八百篇傳詠於時惟愈也業不益進行不加修顧惟未死耳往拜侍御謁周君抵李生退未嘗不發愧也往時侍御有無盡費於朋友及今則又不忍其三族之寒飢聚而館之疏遠畢至祿不足以養李生雖欲不從事於外其勢不可得已也重李生之還者皆為詩愈最故故又為序云河陽軍節度御史大夫烏公為節度之三月求士於從事之賢者有薦石先生者公曰先生何如曰先生居嵩邙穀之間冬一裘夏一葛食朝夕飯一盂蔬一盤人與之錢則辭請與出遊未嘗以事辭勸之仕不應坐一室左右圖書與之語道理辨古今事當否論人高下事後當成敗若河決下流而東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也大夫曰先生有以自老無求於人其肯為某來耶從事曰大夫文武忠孝求士為國不私於家方今寇集於恆師環其疆農不耕收財粟殫亡吾所處地歸輸之塗治法征謀宜有所出先生仁且勇若以義請而強委重焉其何説之辭於是撰書詞具馬幣卜日以授使者求先生之廬而請焉先生不告於妻子不謀於朋友冠帶出見客拜受書禮於門內宵則沐浴戒行事載書册問道所由告行於常所來往晨則畢至張上東門外酒三行且起有執爵而言者曰大夫真能以義取人先生真能以道自任決去就為先生別又酌而祝曰凡去就出處何常惟義之歸遂以為先生壽又酌而祝曰使大夫恆無變其初無務富其家而飢其師無甘受佞人而外敬正士無味於諂言惟先生是聽以能有成功保天子之寵命又祝曰使先生無圖利於大夫而私便其身圖先生起拜祝辭曰敢不敬蚤夜以求從祝規於是東都之人士咸知大夫與先生果能相與以有成也遂各為歌詩六韻退愈為之序云伯樂一過冀北之野而馬㣥遂空夫冀北馬多天下伯樂雖善知馬安能空其㣥耶解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輒取之㣥無留良焉苟無良雖謂無馬不為虛語矣東都固士大夫之冀北也恃才能深藏而不巿者洛之北涯曰石生其南涯曰溫生大夫烏公以鈇鉞鎮河陽之三月以石生為才以禮為羅羅而致之幕下朱數月也以溫生為才於是以石生為媒以禮為羅又羅而致之幕下東都雖信多才士朝取一人焉拔其尤暮取一人焉拔其尤自居守河南尹以及百司之執事與吾輩二縣之大夫政有所不通事有所可疑奚所咨而處焉士大夫之去位而巷處者誰與嬉遊小子後生於何考德而問業焉搢紳之東西行過是都者無所禮於其廬若是而稱曰大夫烏公一鎮河陽而東都處士之廬無人焉豈不可也夫南面而聽天下其所托重而恃力者惟相與將耳相為天子得人於朝廷將為天子得文武士於幕下求內外無治不可得也愈縻於茲不能自引去資二生以待老今皆為有力者奪之其何能無介然於懷耶生既至拜公於軍門其為吾以前所稱為天下賀以後所稱為吾致私怨於盡取也留守相公首為四韻詩歌其事愈因推其意而序之嶺之南其州七十其二十二隸嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為大府大府始至四府必使其佐啓問起居謝守地不得即賀以為禮歲時必遣賀問致水土物大府帥或道過其府府帥必戎服左握刀右屬弓矢帕首袴鞾迎郊及既至大府帥先入據館帥守屏若將趨入拜庭之為者大府與之為讓至一再乃敢改服以賓主見適位執爵皆興拜不許乃止虔若小侯之事大國有大事咨而後行隸府之州離府遠者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多洲島帆風一日踔數千里漫瀾不見蹤迹控御失所依險阻結黨仇機毒矢以待將吏撞搪呼號以相和應蜂屯蟻雜不可爬梳好則人怒則獸故常薄其征入節而疏目時有所遺漏不究切之長養以兒子至紛不可治乃草剃而禽獮之盡根株痛斷乃止其海外雜國若耽浮羅流求毛人夷亶之州林邑扶南真臘于陀利之屬東南際天地以萬數或時候風潮朝貢蠻胡賈人舶交海中若嶺南帥得其人則一邊盡治不相寇盜賊殺無風魚之災水旱癘毒之患外國之貨日至珠香象犀玳瑁奇物溢於中國不可勝用故選帥常重於他鎮非有文武威風知大體可畏信者則不幸往往有事長慶三年四月以工部尚書鄭公為刑部尚書兼御史大夫往踐其任鄭公嘗以節鎮襄陽又帥滄景德棣歷河南尹華州刺史皆有功德可稱道入朝為金吾將軍散騎常侍工部侍郎尚書家屬百人無數畝之宅僦屋以居可謂貴而能貧為仁者不富之效也及是命朝廷莫不悅將行公卿大夫士苟能詩者咸相率為詩以美朝政以慰公南行之思韻必以來字者所以祝公成政而來歸疾也祕書御府也天子猶以為外且遠不得朝夕視始更聚書集賢殿別置校讎官曰學士曰校理常以寵丞相為大學士其他學士皆達官也校理則用天下之名能文學者苟在選不計其秩次惟所用之由是集賢之書盛積盡祕書所有不能處其半書日益多官日益重四年鄭生涵始以長安尉選為校理人皆曰是宰相子能恭儉守教訓好古義施於文辭者如是而在選公卿大夫家之子弟其勸耳矣愈為博士也始事相公於祭酒分教東都生也事相公於東太學今為郎於都官也又事相公於居守三為屬吏經時五年觀道德於前後聽教誨於左右可謂親薰而炙之矣其高大遠密者不敢隱度論也其勤已而務博施以已之有欲人之能不知古君子何如耳今生始進仕獲重語於天下而慊慊若不足真能守其家法矣其在門者可進賀也求告來寧朝夕侍側東都士大夫不得見其面於其行日分司吏與留守之從事竊載酒殽席定鼎門外盛賓客以餞之既醉各為詩五韻且屬愈為序今之天下之鎮陳留為大屯兵十萬連地四州左準右河抱負齊楚濁流浩浩舟車所同故自天寶以來當藩垣屏翰之任有弓矢鈇鉞之權皆國之元臣天子所左右其監統中貴必材雄德茂榮曜寵光能俯達人情仰喻天意者然後為之故我監軍俱公輟侍從之榮受腹心之寄奮其武毅張我皇威遇變出奇先事獨運偃息談笑危疑以平天子無東顧之憂方伯有同和之美十三年春將如京師相國隴西公飲餞於青門之外謂功德皆可歌之也命其屬咸作詩以鋪繹之其行異其情同君子與其進可也令縱釋氏之秀者又善為文浮遊徜徉迹接天下藩維大臣文武豪士令縱未始不褰衣而負業往造其門下其有尊行美德建功樹業令縱從而為之歌頌典而不諛麗而不淫其有中古之遺風與乘間致密促席接膝譏評文章商較人士浩浩乎不窮愔愔乎深而有歸於是乎吾忘令縱之為釋氏之子也其來也雲凝其去也風休方歡而已辭雖義而不求吾於令縱不知其不可也盍賦詩以道其行乎元和二年四月十三日夜愈與吳郡張籍閲家中舊書得李翰所為張巡傳翰以文章自名為此傳頗詳密然尚恨有闕者不為許遠立傳又不載雷萬春事首尾遠雖材若不及巡者開門納巡位本在巡上授之柄而處其下無所疑忌竟與巡俱守死成功名城陷而虜與巡死先後異耳兩家子弟材智下不能通知二父志以為巡死而遠就虜疑畏死而辭服於賊遠誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳而賊語以國亡主滅遠見救援不至而賊來益衆必以其言為信外無待而猶死守人相食且盡雖愚人亦能數日而知死處矣遠之不畏死亦明矣烏有城壞其徒俱死獨蒙愧恥求活雖至愚者不忍為嗚呼而謂遠之賢而為之耶説者又謂遠與巡分城而守城之陷自遠所分始以此詬遠此又與兒童之見無異人之將死其臟腑必有先受其病者引繩而絶之其絶必有處觀者見其然從而尤之其亦不達於理矣小人之好議論不樂成人之美如是哉如巡遠之所成就如此卓卓猶不得免其他則又何説當二公之初守也寧能知人之卒不救棄城而逆遁苟此不能守雖避之他處何益及其無救而且窮也將其創殘餓羸之餘雖欲去必不達二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽遮江淮沮遏其勢天下之不亡其誰之功也當是時棄城而圖存者不可一二數擅強兵坐而觀者相環也不追議此而責二公以死守亦見其自比於逆亂設淫辭而助之攻也愈嘗從事於汴徐二府屢道於兩府間親祭於其所謂雙廟者其老人往往説巡遠時事云南霽雲之乞救於賀蘭也賀蘭嫉巡遠之聲威功績出已上不肯出師救愛霽雲之勇且壯不聽其語強留之具食與樂延霽雲坐霽雲慷慨語曰雲來時睢陽之人不食月餘日矣雲雖欲獨食義不忍雖食且不下咽因拔所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激為雲泣下雲知賀蘭終無為雲出師意即馳去將出城抽矢射佛寺浮圖矢著其上甎半箭曰吾歸破賊必滅賀蘭此矢所以志也愈貞元中過泗州船上人猶指以相語城陷賊以刃脅降巡巡不屈即牽去將斬之又降霽雲雲未應巡呼雲曰南八男兒死耳不可為不義屈雲笑曰欲將以有為也公有言雲敢不死即不屈張籍曰有于嵩者少依於巡及巡起事嵩常在圍中籍大歷中於和州烏江縣見嵩嵩時年六十餘矣以巡初嘗得臨渙縣尉好學無所不讀籍時尚小粗問巡遠事不能細也云巡長七尺餘鬚髯若神嘗見嵩讀漢書謂嵩曰何為久讀此嵩曰未熟也巡曰吾於書讀不過三遍終身不忘也因誦嵩所讀書盡卷不錯一字嵩驚以為巡偶熟此卷因亂抽他帙以試無不盡然嵩又取架上諸書試以問巡巡應口誦無疑嵩從巡久亦不見巡常讀書也為文章操紙筆立書未嘗起草初守睢陽時士卒僅萬人城中居人戶亦且數萬巡因一見問姓名其後無不識者巡怒鬚髯輒張及城陷賊縳巡等數十人坐且將戮巡起旋其衆見巡起或起或泣巡曰汝勿怖死命也衆泣不能仰視巡就戮時顏色不亂陽陽如平常遠寬厚長者貌如其心與巡同年生月日後於巡呼巡為兄死時年四十九嵩貞元初死於亳宋間或傳嵩有田在亳宋間武人奪而有之嵩將詣州訟理為所殺嵩無子張籍云與衆樂之之謂樂樂而不失其正又樂之尤也四方無鬬爭金革之聲京師之人既庶且豐天子念致理之艱難樂居安之間暇肇置三令節詔公卿㣥有司至於其日率厥官屬飲酒以樂所以同其休宣其和感其心成其文者也三月初吉實惟其時司業武公於是總太學儒官三十有六人列燕於祭酒之堂樽俎既陳肴羞惟時盞斚序行獻酬有容歌風雅之古辭斥夷狄之新聲裦衣危冠與與如也有一儒生魁然其形抱琴而來歷階以升坐於樽俎之南鼓有虞氏之南風賡之以文王宣父之操優遊夷愈廣厚高明追三代之遺音想舞雩之詠歎及暮而退皆充然若有得也武公於是作歌詩以美之命屬官咸作之命四門博士昌黎韓愈序之從事有示愈以荊潭唱和詩者愈既受以卒業因仰而言曰夫和平之音淡薄而愁思之聲要妙歡愈之辭難工而窮苦之言易好也是故文章之作恆發於羇旅草野至若王公貴人氣滿志得非性能而好之則不暇以為今僕射裴公開鎮蠻荊統郡惟九常侍楊公領湖之南壤地二千里德刑之政並勤爵祿之報兩崇乃能存志乎詩書寓辭乎詠歌往復循環有唱斯和搜奇抉怪雕鏤文字與韋布里閭憔悴專一之士較其毫釐分寸鏗鏘發金石幽感鬼神信所謂材全而能巨者也兩府之從事與部屬之吏屬而和之苟在編者咸可觀也宜乎施之樂章紀諸册書從事曰子之言是也告於公書以為荊潭唱和詩序韋侯昔以考功副郎守盛山人謂韋侯美士考功顯曹盛山僻郡奪所宜處納之惡地以枉其材韋侯將怨且不釋矣或曰不然夫得利則躍躍以喜不利則戚戚以泣若不可生者豈韋侯謂哉韋侯讀六藝之文以探周公孔子之意又妙能為辭章可謂儒者夫儒者之於患難苟非其自取之其拒而不受於懷也若築河隄以障屋霤其容而消之也若水之於海冰之於夏日其玩而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲况一不快於考功盛山一出入息之間哉未幾果有以韋侯所為十二詩遺余者其意方且以入溪谷上巖石追逐雲月不足日為事讀而歌詠之令人欲棄百事往而與之遊不知其出於巴東以屬朐䏰也於時應而和者凡十人及此年韋侯為中書舍人侍講六經禁中處厚和者通州元司馬稹為宰相洋州許使君康佐為京兆忠州白使君居易為中書舍人李使君景儉為諫議大夫黔府嚴中丞為祕書監溫司馬造為起居舍人皆集闕下於是盛山十二詩與其和者大行於時聯為大卷家有之焉慕而為者將日益多則分為別卷韋侯俾余題其首元和七年十二月四日衡山道士軒轅彌明自衡下來舊與劉師服進士衡湘中相識將過太白知師服在京夜抵其居宿有校書郎侯喜新有能詩聲夜與劉説詩彌明在其側貌極醜白鬚黑面長頸而高結喉中又作楚語喜視之若無人彌明忽軒衣張眉指爐中石鼎謂喜曰子云能詩能與我賦此乎劉往見衡湘間人説云年九十餘矣解捕逐鬼物拘囚蛟螭虎豹不知其實能否也見其老頗貌敬之不知其有文也聞此説大喜即援筆題其首兩句次傳於喜喜踴躍即綴其下云云道士啞然笑曰子詩如是而已乎即袖手竦肩倚北牆坐謂劉曰吾不解世俗書子為我書因高吟曰龍頭縮菌蠢豕腹漲彭亨初不似經意詩旨有似譏喜二子相顧慚駭欲以多窮之即又為而傳之喜喜思益苦務欲壓道士每營度欲出口吻聲鳴益悲操筆欲書將下復止竟亦不能奇也畢即傳道士道士高踞大唱曰劉把筆吾詩云云其不用意而功益奇不可附説語皆侵劉侯喜益忌之劉與侯皆已賦十餘韻彌明應之如響皆㯋脫含譏諷夜盡三更二子思竭不能續因起謝曰尊師非世人也某伏矣願為弟子不敢更論詩道士奮曰不然章不可以不成也又謂劉曰把筆來吾與汝就之即又唱出四十字為八句書訖使讀讀畢謂二子曰章不已就乎二子齊應曰就矣道士曰此皆不足與語此寧為文耶吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也獨文乎哉吾語亦不當聞也吾閉口矣二子大懼皆起立牀下拜曰不敢他有問也願聞一言而已先生稱吾不解人間書敢問解何書請聞此而已道士寂然若無聞也纍問不應二子不自得即退就座道士倚牆睡鼻息如雷鳴二子怛然失色不敢喘斯須曙鼓動鼕鼕二子亦困遂坐睡及覺日已上驚顧覓道士不見即問童奴奴曰天且明道士起出門若將便旋然奴怪久不返即出到門覓無有也二子驚惋自責若有失者間遂詣余言余不能識其何道士也嘗聞有隱君子彌明豈其人耶韓愈序憲宗之十四年始定東平三分其地以華州刺史禮部尚書兼御史大夫扶風馬公為鄆曹濮節度觀察等使鎮其地既一年裦其軍號曰天平軍上即位之二年召公入且將用之以其人之安公也復歸之鎮上之三年公為政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竱心一力以供國家之職於時沂密始分而殘其帥其後幽鎮魏不悅於政相扇繼變復歸於舊徐亦乘勢逐帥自置同於三方惟鄆也截然中居四鄰望之若防之制水恃以無恐然而皆曰鄆為虜巢且六十年將強卒武曹濮於鄆州大而近軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剝膚椎髓公私掃地赤立新舊不相保持萬目睽睽公於此時能安以治之其功為大若幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未孰化以武則忿以憾以恩則橫而肆一以為赤子一以為龍蛇憊心罷精磨以歲月然後致之難也及教之行衆皆戴公為親父母夫叛父母從仇讎非人之情故曰易於是天子以公為尚書右僕射封扶風縣開國伯以裦嘉之公亦樂衆之和知人之悅而侈上之賜也於是為堂於其居之西北隅號曰溪堂以饗士大夫通上下之志既饗其從事陳曾謂其衆言公之畜此邦其勤不亦至乎此邦之人纍公之化惟所令之不亦順乎上勤下順遂濟登茲不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑無詩歌是不考引公德而接邦人於道也乃使來請其詩曰帝奠九廛有葉有年有荒不條河岱之間及我憲考一收正之視邦選侯以公來尸公來尸之人始未信公不飲食以訓以徇孰飢無食孰呻孰歎孰寃不問不得分願孰為邦蟊節根之螟羊很狼貪以口覆城吹之喣之摩手拊之針之石之膞而磔之凡公四封既富以強謂公吾父孰違公令可以師征不寧守邦公作溪堂播播流水淺有蒲蓮深有蒹葦公以賓燕其鼓駭駭公燕溪堂賓校醉飽流有跳魚岸有集鳥既歌以舞其鼓考考公在溪堂公御琴瑟公暨賓贊稽經諏律施用不差人用不屈溪有賓苽有龜有魚公在中流右詩左書無我斁遺此邦是庥
