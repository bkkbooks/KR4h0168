front:
  text: 全唐文欽定全唐文卷二百四十一宋之問二
  hash: sha256:b30c6826f4655812f11e89f21125191afd05378b23cecf6e36df539e1acc0dc2
body:
  text: 臣聞神器至大非聖無以光臨寶位至尊非神無以長守我金輪聖神皇帝垂妙覺撫鴻勳出軒宮而鎮紫微卷翬衣而襲元亠兊釋罘祝網萬族咸寧革故維新五刑不用潤玉律而含元氣轉金渾而調順晷窮荒極遠重譯左言之俗負阻憑危背德殊風之類莫不厥角稽顙執贄來庭烟火通於萬方車書混於千界慶延八室享配於明祇辟水三雍講論乎道義麟鳳薦祉龜龍奉圖石銘顯瑞於郊畿玉書告祥於宮掖以日繼月紛綸葳蕤竹帛書之而未窮夷夏歌之而不極聖人之具品周矣天子之能事畢矣自千古以下迄於梁隋何功於人比我全德於是寧宴坐展豫遊順四時乘六辨先王洛食上帝河都樞機正於域中雨露均於天下徒觀其離宮別殿彌復道而亘南端高閣重甍瞰崇墉而連北斗滄洲曉氣化為宮闕之形閶闔秋風亂起金銀之樹降雕輿而式燕簪紼凝嚴披鏤檻而升高山河在目參光有地遊日月於天邊睨遠無窮見城池於掌上四達分九重之路積樹捎雲雙莖當鐵鎖之橋流珠耿漢霞漿玉醴與湛露而俱傾鳳管龍絲雜商飇而共奏聖皇乃望芝田賦葛天和者萬唱者千乃命小臣編紀衆作流汗拜首而為序云安平王地惟藩翰才實宗英懸鵲鏡於胸懷運龍泉於掌握以為時和政理實探道之期賤物貴身尚延齡之術悠然遠覽乃卜茲山屬聖主之能仁遂賢王之雅好羅紈罷御與朱邸而長辭金玉滿堂棲白雲而不顧巖石信美結搆多奇錦壁周庭以造天玉泉注戶而鳴壑三光貝樹影入山窗九節菖蒲光搖砌水竹林茅宇自冥棲隱之心藥物圖書即有靈仙之氣人惟帝念巖穴所以增輝地入王家樵採尤其不犯嗟乎林棲谷飲古亦有之豈有貴而為王鍊形雲壑希世獨立萬古誰鄰子晉以來一人而已㣥公等閒紫泥之寵命藉清溪之逸游駐驂騑步巖石御落花而聽時鳥纍宿忘歸蔭芳樹而弄春泉窮年不厭衣冠車馬明日下於春山鸞鶴笙歌今宵共乎芳月隱淪可作將知心與事違城關非遙終惜風流雲散下官少懷微尚早事靈邱踐疇昔之桃源留不能去攀君王之桂樹情可何之請人賦一言俱裁六韻一人御歷乾坤盡覆載之功四海為家朝野得歡娛之契若乃侯門向術近對城隅帝子垂休時過戚里銀爐絳節辭北禁而渡河橋駿馬香車出東城而臨甲第林園洞啓亭壑幽深落霞歸而疊嶂明飛泉灑而回潭響靈槎仙石徘徊有造化之姿苔閣茅軒髣佛入神仙之境芳醪既溢妙曲新調林園過衛尉之家歌舞入平陽之館是日也涼陰稍下溽暑將闌前階晚而白露生後池夕而秋風起重茲行樂欣陪駟馬之遊繼以望舒不頓六龍之轡爰命箋札咸令賦詩記清夜之良遊歌太平之樂事各探一字先成受賞云爾三月上已有袚除褉飲者成俗久矣摯虞對而不經束皙言而有禮漢庭故事衣冠就元霸之橋晉國遺風輜軿耀翠媯之浦興秦宮者我大周之所建也境連伊塞岸隔河都清暑必在於三伏洙寒疑不踰於十里占星已畢擢仙闕而威百神匪日將成宜聖皇而福四海吾儕恭興路寢初忝雲軺違北京之宴樂坐南山之霧雨相與會良友陶暮春席幽林觴曲水是日也雜英初發㣥物半榮春逶迤而上山雪嶔崟而藏谷高人一坐杞梓交陰作者肆筵芝蘭同氣遞襲歌詠不登絃管嵇叔夜之鳴琴偏依緑竹郭子期之春酒本出青山論史可聽談元愈默不覺齊萬品溢九圍愛流波惜遲景顧眄相謂雖非巢許之閒左右同聲盍各巖泉之助請染翰操紙賦詩言志人探一言俱題四韻僕不遊於茲十有五載矣心由物感遐矣不忘跡為事牽近而難挹南陽宗雍文通學古器重名高令君有奉倩象賢丞相生元成邁德暮春修以文之會上巳邀袚褉之遊乃結縉紳撰清辰殷殷轔轔歊霧驚塵望於昆明之濱觀其大浸川陸博資畿甸鳬鷖發海來往沈浮日月麗天東西出入千年珍館無復豫章四面金隄仍同樹杞是日也駕肩錯轂備朝野之歡娛袨服靚妝匝都城之里閈翠幕星布錦帆霞屬餘瀝下醉於綃人新聲遠聒於川后縱目遐覽識皇代之承平得意同歸有吾儕之行樂高明一座桂樹叢生君子肆筵玉山交映束皙以言談得俊張華以史漢先鳴登旨酒而無荒絃清琴而自逸於是涉連榻命孤舟桃水漲而浦紅蘋風搖而浪白逼匡阜兮遵彭蠡邈矣載浮指衡嶽而超洞庭眇焉疑到曲島之光靈乍合神魂密遊中流之萍藻忽開龜魚潛動睎鏤鯨而鼓掉共看燒劫之灰歷牽牛而問津欲取支機之石晴光劃野有象而必形夕陽照山無奇而不見思溢今古心搖草木漢家城闕遺之以雜霸之風秦塞膏腴潤之以太平之色景窮勝踐歸限嚴闉思染翰於上林願揮戈於濛泛主稱未醉惟見馬駐浮雲賓共少留自有魚銜明月宮商待叩㣥公之獲助巳多序引先題下走之求蒙不逮請授素幅以頌佳遊使一時之興詠遙存千古之姓名常在玉樹涼臺之側丹溪洞壑之傍靈聖之所往還蛟螭之所潛伏飛泉鶴挂躡江隅之七里曲磴龍盤架彭門之九折潭如月映狎之者無從石似霞開陟之者莫曉斜馳洛邑徑路接於風煙却枕寒郊年代成乎今昔㣥公以乘星戾止納言以捧日來遊雖復八舍七車情每存於野託貂冠鵲印志彌尚於幽尋探勝迹而忘疲對良朋而不倦於是藉纖草挹清樽咀芝术浮蘭桂同謝客之山行類淵明之野酌時臨夏首繡羽囀而添歌序屬春餘丹花舒而助笑相趍動色縱賞飛談覩軒蓋而為輕悅薜蘿而是重兀然而醉心已合於大道恍爾而醒迹暫均於小隱物外之興致斯遠俗中之囂塵自隔此之嘉會僉曰難逢曹子建七步之才論情實愧江文通五色之管豈宜虛擲長安城南有韋曲莊京郊之形勝也却倚城闕朱雀起而為門斜枕岡巒黑龍臥而周宅賢臣作相舊號儒宗聖后配元今為戚里韋大官雙珠絶價百金懿名文華得俊於陸氏兄弟掩譽於荀家先人結廬當大厦之地衆賓連袂乘暮春之月觀其奧區一曲甲第千甍冠蓋列東西之居公侯開南北之巷嬴女樓下吹鳳降於神仙漢妃館前濯龍走其車馬地靈磊落而閒出天爵蟬聯而相繼拜郎起草襲鴈而傳羔補衮司槐送伯而迎季爾乃闢虛幌敞華筵閨門之秀士咸集京邑之清流畢萃萬株果樹色雜雲霞千畝竹林氣含煙霧激樊川而縈碧瀨浸以成陂望太乙而鄰少微森然逼座尚書未至曳履驚鄰宮尹遞來鳴騶動壑登玉俎醉金觴地高而珍物雖豐理洞而清徽不雜以醉觀德因談獲情外戚遨遊自攜歌吹主人賞會但有琴詩於是下高臺陟曲沼鋪落花以為茵結垂楊而代幄霽景含日晚霞五彩而丹青韶望卷雲春膏一色而凝黛景闌興逸氣清心遠仰大儒之肆其德可師入處士之廬斯人若在諷誦於逸彭之藻沐浴於扶陽之墟向來挹清議擅風流即事奇偉佳辰行樂安可無述文在茲乎酆國善誘詞宗見收士末內史褉亭之集竊倚琳琅衛尉別業之遊濫先題目歸軒莫駐麗城將掩拙而不速恨無倚馬之才婉而且微請談雕龍之什公命賦水字盍成四韻云爾甸服三百里共京都參化良吏二千石與天子分憂覃懷奧區必寄能者皇甫使君纍司寵職夙著香名威惠歷刺於外臺風流載款於京國議者應南宮之象實謂光朝使乎奏西河之能更勞為郡襜帷即路供帳出郊宿雨碧滋浮漢城之氣色朝陽紅景入太山之草樹新豐美酒不換離心函谷重關能搖別恨河內未理暫借寇恂潁川既輯佇歸黃霸廟堂側席㣥公以尚義相高川陸分途我輩以贈言為貴況筵開灞岸路指太行請居人贈王粲之詩去者留阮公之作河閒尹公博物君子解褐調慈州司倉白雲在天不樂為吏有竹林近呼杜南山彈琴讀書日益淪放雖道貴物外久無世情身退名高再顯天爵遂使公卿舉手羔鴈成㣥無何敕書到秦徵詣函洛天子以其老成達學昂藏有古人風命典著書職在補闕時議以謂伯喈得召仲甫登聞既而藉馬入關西攜老幼重見喬木載馳舊山念出處事違居人惜別離車將遠凡我同志賦詩贈行上巳佳遊近郊春色朱軒映野見東流之祓褉白雲在天愴南登之送別杜長史言辭灞滻將適荊河戀舊鄉之喬木藉故園之芳草鴒原四鳥是日分飛輿泉二龍此時云遠緑潭一望青山四極秦人去國乘右輔之修途洛客思歸憶東京之曲水請染翰操紙即事形言各賦蘭亭之詩咸申葛陂之贈夫有別必感今昔共之蓋理迫聚散事均窮達望秦是斷腸之所況念故園懷洛多掩涕之人更分良友裴五官業傳河寶才誕嶽靈彩思有神鬚眉若畫一日不見鄙吝都生千里送歸風流忽遠朝英出餞回北走於郊隅野墅銷氛引南山於庭際客飲恨而歡促席含情而景遲目喬樹之將華青門戀舊背芳萱之稍吐金谷逢春舉杯伊何願君軫之少駐賦詩於是旌豫志之所之敢謂座賓盍宣離唱春其暮兮勞志士之幽嘆友其行矣結吾徒之遠悲豈不以時物歲華好事者賞而不足名流才子相歡者懷而不見河南獨孤冊風儀松竹詞賦雲泉清議多南史之才選署半北部之慰袁侍御風霜利器金石宏材執憲稱柱下之雄禮士採域中之俊爾乃選辰開宴考地疏筵落花覆沼懸藤掃砌竹林以清氣娛賓蘭畹以芳心愛客環坐三尺起君子之風祖道百壺酌賢人之酒去留交軫舞詠相喧管召魚樂杯薰鶯醉此時奚怨盛集無何是日增悲韶芳亦盡啼烏送晚遙棲御史之林班馬嘶歸近送舍人之驛夫登高動詠贈遠形言豈鄙懷之庶幾乃㣥公之事業盍請離唱用貴洛陽之紙焉人採一言各題四韻田二官考室潁陽令狐九間居渭涘徵君太守世業相親洛邑秦京道遊非遠春山採藥揖二子之高蹤夜月回車入故人之窮巷闢書幌卷琴帷緑竹一叢清風三尺幽吟所託遊仙招隱之詩嘉話伊何丹邱白雲之事焚枯未薦飽我以老氏之言舉白無譁醉豫以胡邱之說池塘潤於時雨衣巾漸於和氣蘭欲芳而逼人林將曙而催鳥嗟乎語默恆理聚散何常請揮翰寫心用旌厥事使嵩高洞裏記茲夕之當歌太白巖中念今宵之秉燭共編四韻貽諸好事云至矣哉釋迦之本願也念起於大悲業成於廣濟代俗以積迷為用有感斯通衆生以諸病作身至誠能愈我鎮國太平公主娥靈襲彩女曜聯英戒環佩於中閨邑山河於外館位彌高而迹彌下保是洪猷身日貴而心日微由乎夙植全其忠孝頌美於家邦宜爾子孫理歸於福壽第五子某官某才光性與慧發生知山桂含芳而逼人階蘭吐秀而驚俗頃以寒暄稍改保攝微乖留臥玳瑁之牀陪侍鳳凰之宇公主上祈妙福蒙降慈恩漢賜黃金還依膝下隋珍明月再入掌中今者上報慈恩大張名供於是披甲第闢梵筵幢蓋乘空而下來龍象接武而爰集回供純陀之國求饌香積之宮麥丏為邱而蔽庭酪為沼而環砌龍王獻水噴車馬之埃塵天女散花綴山林之草樹無邊之施下飽於三塗普救之心傍寬於六趣伏願以斯妙福上薦聖朝應天皇帝長保金圖永臨璿極九族既睦袪其有漏之緣萬人以安不捨無生之見順天皇后慶垂椒掖德盛蘭宮國風流洽於鵲巢坤儀光贊於龍扆皇太子業躋聖敬本固元良諸王公主等擢秀本枝崇榮湯沐三槐九庶職㣥寮咸維赤縣之圖共翼青雲之紀備該空有遍燭幽明俱超解脫之津永拔輪回之地維長安二年歲次月日司禮主簿宋某謹以清酌之奠敬祭於故宮尹丞太原王君之靈惟靈顯考抗志恬漠九辟奚顧一邱自樂行擬巢由言重許郭粵我先人比德同道理閫探索詞源論討翰墨具存有真有草古人之言朋友世親王氏兄弟既義且仁撫我則厚莫殊天倫粵我幼蒙哀纏岵屺急難相顧若出諸已聞過必針見善斯喜盛德之後昔聞其昌之子壯年朱紱始光賀者在門哭者在堂慰君之兄撫君之子郭門祖祭平生已矣問天何言閉恨泉裏嗚呼哀哉尚饗維大周某年月日西河宋某謹以清酌脯羞之奠敬祭於楊子之靈曰自古皆死不朽者文北河流液西嶽吐雲叶神通契降精於君伏道孔門遊刃諸子精微博識黃中通理屬詞比事宗經匠史玉璞金渾風搖雲起聞人之善若在諸已受人之恩許之以死惟子堅剛氣陵秋霜行不苟合言不苟忘大君有命徵子文房余亦叨忝隨君頡頏同趨北禁并拜東堂志事俱得形骸兩忘載罹寒暑貧病洛陽裘馬同弊老幼均糧自君出宰南浮江海余嘗苦饑今日猶在之子妙年香名早傳從來金馬夙昔崇賢門庭若市翰墨如泉千載之後聞而凜然死而不亡問余何傷傷豫命薄益友零落生平之言幽顯相託痛君不嗣匪我孤諾君有兄弟同心異體陟岡增哀歸葬以禮旅櫬飄零於洛之汀我之懷矣感歎入冥見子之弟類子之形悼往心絶慰存涕盈古人有言一死一生昔子往矣追送傾城今子來也乃知交情惟郭是戚有崔不易來哭來祭哀文在席帷席可依冰雪四滿家人哀哀賓徑微斷今我傷悲情勤昔時子文子翰我緘我持子宅子兆我營我思子有神鑒我言不欺我有絮酒子其歆之我亦引滿儻昭神期魂兮歸來聞余此詞維大唐神龍二年歲次甲子月日前大中大夫行亠兊州都督府司馬王某謹以清酌之奠敢昭告於仙君之靈夫惟仙君神化寥廓昔為葉宰蒞此郛郭謁帝乘鳬賓天控鶴玉以為棺言降楚鄉土自成壠人知東岡靡靡行邁邑過諸梁實感我先顧慕增傷載馳載奔于陵于谷乃披蔓草式敬喬木孰不懷古誰非後昆靈胄日衰遐心莫存逮及仙伯復茲道門小子實幸忝惟枝孫華陽舊里緱氏新宅二君爰創百代不易豈無沃土永守遺跡有鳥有鳥歸來何斯緬惟此地登真之基願考俠室樹茲豐碑有志未就靈其祐之尚饗維大唐景龍元年歲次丁未十月乙未朔四月戊戌兵部尚書宗楚客弟將作大匠秦客等謹以清酌庶羞之奠致祭於梁宣王之靈惟王神嶽降靈英姿濟代在周錫梁社之寵翊唐有代邸之勳不謂業在必安而釁生非意賊臣結黨大黷宸闈逆子弄兵輕誣懿戚密謀奉主惟以國家為心飛禍及門翻令父子併命九重軫念悼舟楫之堙沒百辟興嗟愴衣冠之殄瘁楚客等早承輝眄夙忝娛遊姻屬謬接於葭莩兄弟竊方於鴈序叨列五等同事兩朝昔以高義銘心今猶德音在耳嚴慈永往伯季凋零友睦申於長妹成立冀於猶子而家不悔禍俱斃仇人入私庭而痛深過王門而悲極竹池舊賞看鴈鶩之猶歸蒿里新歌恨天人之永逝嗚呼哀哉九原撰日萬古營魂士悲高駕帝慟津門殞賢輔而星坼害良臣而霧昏想平生之如在庶髣佛於斯樽尚饗維景龍二年歲次戊申月日兵部尚書楚客弟將作大匠秦客等謹以清酌之奠敢昭告於魯忠王之靈惟王寶構因地瑤林肅天靈資海嶽質冠神仙德潤猶雨機清若泉不孤大造翻摧少年百身豈贖四序云變慈軫玉扆悲盈金殿令德彌秀徽容難見悼前歲之今日共銜酸於隙電錦鸞失偶臺鳳悲隻玳席賓空金鄉戶闃徑不踐兮苔紫庭不遊兮草碧敢申賦於童眇痛平生之姻戚嗚呼哀哉鴈池送夏馬埒迎秋露白天淨雲低隴愁恨名王之淪枉悲促運之浮休蓄哀思而成泣憑聰明而致羞小山一平兮多桂樹故人雖在兮罷蘭遊心追往而將絶淚橫目兮難收嗚呼哀哉尚饗維大唐景龍二年歲次戊申月日某官某等謹以清酌之奠祭於汝南王之靈相門踵德王實挺生天資溫克神與聰明人稱玉樹我嗣金籯芝庭欲秀桂林將逐惟彼鴈堂墜茲鴻陸魅奪精氣墳迷草木漢皇纂籙周母參功夷夏昭洗幽明感通九魂見日一葉隨風孝極先妃丹旐前歸慈殷諸季素旐相次楚氓啜泣秦人下淚荊分自久棣落無餘悲炎海之下制惟觀津之上書鳶忌南而跕水鴈愛北而隨車嗚呼凡在枝戚銜恩極遍寵賁濯龍榮分化燕獨傷元子冥寞無見玉宸下感金屋增悲珠亡禍速沙崩慶遲緑車為贈黃泉各思官舍攸止先塋甫託齊國返葬隨原可作靈之歸來無惑甌駱尚饗維大唐景龍二年歲次戊申月日考功員外郎宋之問謹以清酌之奠敬祭於故修文館學士杜君之靈嗚呼位曰大寶才曰天爵辭業備而官成名聲高而命薄屈原不終於楚相揚雄自投於漢閣代生人而豈無人違代而咸若運鍾唐虞崇文寵儒國求至寶家獻靈珠後復有王楊盧駱繼之以子躍雲衢王也才參卿於西陝楊也終遠宰於東吳盧則哀其栖山而臥疾駱則不能保族而全軀由運然也莫以福壽自衛將神忌也不得華實斯俱惟靈昭昭度越諸子言必得俊意常通理其含潤也若和風欲曙搖露氣於春林其秉艷也似涼雨半晴懸日光於秋水衆轍同遵者擯落㣥心不際者探擬人也不幸而則亡名兮可大而不死君之栖遑自昔迷方逢時泰兮欲達聞數奇兮自傷屬文母之丕運應才子之明揚援淪秀於蘭畹侍仙遊於柏梁命以著作拜之為郎始翔鴛於清列旋禦魅於炎荒遺旅鴈兮超彭蠡作編人兮居越裳殊許靖之新適憶虞翻之舊鄉惟皇龍興再施法度拂洗溟渤騫翔雨露通籍於八舍禁門搖筆於萬年芳樹仰赤墀兮非遠謂白首兮方遇君病何病到此彌留藥雖餌兮寧愈針不及兮可憂雖則妙醫莫識實冀明神獲瘳嗚呼哀哉君之將亡其言也善余向十旬日或再展君感斯意贈言宛轉識金石之契密悔文章之交淺命子誡妻既懇且辨自豫與君弱歲遊執文翰共許風露相浥況窮海兮同竄復文房兮並入川流遽閲隙電初過昔乘運兮如此今造冥兮若何懷君疇好兮恨已積念君近惠兮情倍多道之南宅囷之東粟使君孤之有餘寧我家之不足籍籍流議喧喧薄俗名全每困於爍金身沒誰恨其埋王空落長松千尺詎置生芻一束倬彼韋公贈殷禮縟善乎崔子理感情屬相識有素見賢增勖登君詞賦於雲臺之上藏君齒髮於緱山之曲緱氏山兮山上雲秦城郊兮郊外墳孟冬十日兮共歸君君有靈兮聞不聞我咀瑤屑君知自久坐泣焚芝遙哀畫柳闕視祖載爰遺巵酒願歆悲誠將告良友尚饗維大唐景龍三年歲次己酉月日越州長史宋之問謹以清酌之奠敢昭告於夏后之靈昔者巨浸橫流下民交喪惟后得流星貫昴之夢受括地理水之符砥定九州弼成五服遂類上帝乃延㣥公自有生靈樹之司牧大災莫踰於堯日勤人不越於夏君向微隨山奠川之功蒼生為魚至今二千九百年矣肇為父子始生君臣興用天之道廣分地之利者嗚呼皆后之功也之問移班會府出佐計鄉遂得載踐遺塵遠探名穴朝玉帛於斯地聲存而處亡留精靈於此山至誠而響發悲夫井家相連於今幾年當其葬也上不通臭下不及泉棺絞葛兮墳收壤鳥耘荒兮象耕田先王為心享是明德後之從政忌斯姦慝酌鏡水而勵清援竹箭以自直謁上帝之休佑期下人之蘇息日之吉神之歆激楚舞奏越吟芳俎溢醇罍深遺羞厭於魚鳥餘瀝醉於山林忽雲搖兮鳳舉空壽堂兮陰陰
