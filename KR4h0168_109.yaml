front:
  text: 全唐文欽定全唐文卷一百九後唐明宗四
  hash: sha256:86c01a3a4ef7f9bca99a2cb6216f14624651c01e641d7335f676a6e62c21e7da
body:
  text: 設官分職有國宏圖授才任能前王重事凡繫惟行之命須遵不易之規朕以猥紹丕基務宏至理臨萬國則每勤聽政任庶官則切在得人貴內外之叶和俾華夷之帖泰頃自本朝多難雅道中微皆尚浮華罕持廉讓其有除官蘭省命秩柏臺或以人事相踈或以私讎見訝稍乖敬奉遽致棄捐蓋司長之振威處君恩於何地緬思積弊深所疚懷方當大定之期特示維新之制今後應新授官員朝謝後可準列隨處上事司長不得輒以私事阻滯其所授官仍不得因遭抑挫託故請假庶使孤弱遂升遷之路朝廷無滯壅之端凡爾羣官體豫深旨朕以握圖御宇應運承祧副億兆之歡心賴英雄之叶力雖疇庸之命巳遍及於勳賢而延賞之恩宜更加於骨肉應諸道節度使男及親嫡骨肉未霑恩命者特許上聞任圜方秉國權仍專邦計公家之利知無不為當景運之中興舉皇朝之政事不獨資其經費亦冀便於貢輸載閲敷陳允叶事體宜依所奏乃置監牧委三司使別具制置奏聞訪聞京城坊市軍營有故犯條流殺牛賣肉者仰府縣軍巡嚴加糾察如得所犯人準條科斷如自死牛即令貨賣其肉斤不得過五錢鄉村死牛但報本村節級然後準例納皮曉示天下州府準此處分諸道州府所有專差人持禮往來皆具申奏況列藩交聘諸侯結歡乃自古之通規亦明朝之舊事近日皆宣章奏稟命朝廷既旌敦好之風兼表睦鄰之好且道非越境何勞上聞今令遍降敕命指揮諸道州府自今後應是諸道差人持禮來去並令不要申奏朕自恭承景運祗荷丕圖念寰海生靈録勳賢骨肉承家莫尚於孝報國莫大於忠忠孝兩全古今所重在朝文武臣寮并諸道節度刺史等有父母者宜遍加恩澤使天下為人父者知感為人子者知恩競揚家國之風顯著君臣之道興國之方養民為本衣不可一歲不製食不可一日不充其或桑柘少而望衣充耒耜閒而求食足雖千堯萬舜聖知神功不能致也然則樹踈禽少山廣獸多百川淺則海不深萬姓貧而國不富富庶之要根源可知故王者深居九重奄有四海不可家至而日見只在德盛而教尊千載一時古猶今也李鏻情專奉上務在任人藉官吏當才為國朝布化實以知人則哲惟帝其難肯舉者可嘉堪舉者可重必須愛而知其惡憎而知其美內舉不避親外舉不避讎凡事無私何憂不理李鏻所奏宜即施行其所舉人仍於官告內顯隸所舉姓名赴任之後臨事可觀或有不公當纍舉主兼三品巳上有舊諳行止堪充節度觀察兩使判官者亦各據才業上聞即當委任庶朝廷立制長施勸善之恩臣下推公永絶蔽賢之路忠孝之道乃治國之大柄典刑之要在誅意之深文差若毫釐繫之理道昔紀信替主赴難何青史之永刊今高宏超為父報冤即丹書之不尚人倫至孝法網宜矜減死一等今後指揮諸道州府凡有推鞫囚獄案成後逐處委觀察防禦團練軍事判官引所勘囚人面前録問如有異同即移司別勘若見其本情其前推勘官吏量罪科責如無異同即於案後別連一狀云所録問囚人無疑案同轉上本處觀察團練使刺史有案牘未經録問不得便令詳斷如防禦團練刺史州有合申節使公案亦仰本處録問過即得申送昨六月二十日所降敕文祗為應在洛京有犯極刑者覆奏其諸道巳降旨命準舊例施行今詳西京所奏尚未明近敕兼慮諸道有此疑惑故令曉諭刑故無小義絶惠姦罪疑惟輕事全誅意聖賢明訓今古通規非法無以振其威非恩無以流其澤故有功不奬何以激盡忠有罪不刑何以戒為惡二者無失庶務有成朕統華夷不求奢侈臨食慮兵師之餒授衣思黎庶之寒仗中外勳賢壯國家基址熒惑應犯而自退太陽暫蝕而復圓百果無不熟之方五穀無不豐之處顧惟寡德何稱嘉祥況保義軍節度使石敬瑭晉州留後安崇阮洺州刺史張進耀州團練使孫嶽寧州刺史高允王褱等杜絶誅求尋加奬諭陶輒為聚斂自掇愆尤功過既分黜陟有異在朝備見列國皆知不貪者轉更無私有過者必應自省四方侯伯皆朕忠臣萬國人民皆朕愛子慘舒是繫賞罰齊行務德者雅合古賢效尤者自干朝典除鄧州見取責情罪諸色官員及亳州李鄴外其諸道州府如八月巳前或有偶違條制干國章者諸色人並不得更有託訴若或此後有違許人上告當勘情罪必舉刑書近聞藩鎮幕職內或有帶録事參軍兼鄴都管內諸州録事參軍從前並兼防禦判官設官分職激濁揚清若網在綱各司其局督郵從事兼處尤難沒階則賓主之道虧下榻則軍州之禮失須從改革式振紀綱宜令今後諸州府録事參軍不得兼職如或才堪佐幕節度使須具聞奏不得兼録事參軍鄴都管內刺史州不合有防禦判官之職今後改為軍事判官如刺史帶防禦團練使額即得奏署防禦團練判官仍不得兼録事參軍如此則珠履玳簪全歸客禮提綱振領不紊公途仍付所司選門官吏訛濫者多自今後並令各録三代家狀鄉里骨肉在朝親情先於南曹印署納吏部中書門下三庫各一本得判印狀即許所司給付新簽告兼本任官處及鄉里亦具一本納逐州縣率土黎氓並輸王稅逐年生計祗在春時深虞所在之方無知之輩不自增修産業輒便攪擾鄉鄰既撓公門須嚴定制自今後凡關論認桑土二月一日後州縣不得受狀十月務閒方許論對準格據理斷割河南縣是神州赤縣縣令乃明庭籍臣未審罪名便當極法不削不貶不案不彰困枯木於廣衢抱沈冤而至死衆人具見有耳皆聞何澤對宰洛陽委其實狀今此伸屈直貢表章請雪吞聲以旌幽壤遂其冥冥下士非元恩以不知蕩蕩無私俾輿情而共感宜加昭雪兼賜贈官其子彧文行可稱便許録用頃因用本朝親王遙領方鎮其在鎮者遂云副大使知節度事但年代巳深相沿未改今天下侯伯並正節旄惟東西兩川未落副大使字宜令今後祗言節度使凡居臣下盡抱公忠共為朝廷各榮家族具慶者繼頒恩渥俾耀晨昏既亡者宜澤泉扃以光封樹應中外羣臣及諸道節度防禦團練刺史等父母亡歿者並與追贈加封朕聞為賢諱過含垢匿瑕而皆載在春秋顯其懲勸是以孟明不懈遂霸西戎曹沫有謀克寧東魯列國之臣尚爾爾何異焉責授檀州刺史劉訓早負變通咸推忠壯自隰川而向化繼領竹符平汶上以立功遂分茅社去春以荊門叛逆須議討除將戮賊臣俾司戎律攻城稍滯略地未前屬炎熇以班師責逗留而削爵自居遠郡俄換流年亟聞惕厲以自新宜降恩華而求舊使升環列取象鉤陳可守右龍武大將軍設官分職比委仗於公才詢事考言務恢宏於理道朕自祗膺大寶俯育羣生四門無塞其聰明百辟咸專於諫諍凡閲事務各有職司儻踰越於規繩必申明於典憲其有凶頑之輩遊惰之夫藝不度於荒唐心每懷於僥幸或妄陳條策覽尋而多是訛言或但務訟論按驗而却招情罪不遵格令輒冒乘輿若無止絶之文何戒因循之弊今後凡有詞狀並須各於所司部據理陳論如未盡情或有阿曲即許經御史臺臺司不理則詣匭投狀若有進獻策條則須審明利害有益公私然後投匭朕當選擇施行不得容易接駕如敢故違當行嚴典自家刑國內平外成夫子立言備有關睢之樂春秋垂訓非無石窖之封況夫尊於朝妻貴於室所宜從爵各顯家肥朝臣及諸道節度使妻室未有稱號者宜各加恩皇王宣政侯伯分憂薄賦輕徭方為濟物迎新送故必恐擾人徵賦以不虐黎庶為先銜命以不辱朝廷為貴乃至藩方職列無非勠力奉公各有區別不令踰越朕自臨大寶每尚淳風動不疑人靜惟恭己中外無閒上下相勸建立既列台司兼權邦計所述否臧之事皆窮利病之源情切參裨理當俞允宣準往例州縣官三十月為限刺史以二十五月為限仍以到任日為數其節度使以山河是託與牧宰有殊繫自朕懷難拘常限若頻有除替何暇輯綏仍舊餘依所奏近代巳來文武官階稍高便授柱國歲月未深便轉上柱國武資初官便授上柱國官爵非無次第階勳備有等差宜自此時重修舊制今後加勳先自武騎尉經一十二轉仍永為常式先準同光二年十二月敕北京及河北諸道攝官內有御署一任牒分明前銜先有正官告身者便與據正官資敘依資授一任官其無正官告赤者與黃衣初任官與兩任巳上牒分明兼有正官告赤者特與超資授一任官其無正官告赤亦只有兩任三任牒者與據從黃衣第二任官從各領取近罷攝任處州府文解任詐非特赴選者前件攝官等當任使之際共副憂勤及開泰之期豈宜升降凡有先皇帝御署兼朕署攝牒每一任同一任同官赴任日依資注擬宜令諸道州府知委餘準元敕處分應天下大寺及敕賜名額院宇兼有功德堂殿樓閣巳成就者各勒住持其餘小小占射或施捨及置買目下屋宇雖多未有佛像者並須量事估價一時任公私收買其住持僧便委功德使及隨處長吏均配於大寺安止如院在僻靜之處舍宇無多不堪人承買者便仰毀拆其材木給付本僧田地任人請射仍限敕到後十日內並須通勘騰併了絶如敢遷延及有故違其所犯僧徒二年尼杖七十並勒還俗若有形勢借庇當移不移誑惑官中更求院額既達聽聞所知之人不係官位高低並行朝典如要增修福利則任於合留寺院內興功昔虞舜以恤刑安萬國賴十六相熙帝圖漢高以約法定八方致四百年享天祿故法無常則官有幸刑不濫則民無冤千古同風百王齊致況今朝廷致理中外同心近者無偏遠者不閒慮於聽訟或有惠姦其頻具奏聞所在不勤決斷則諸道侯伯未至盡心兩使賓寮亦非稱職蕭希甫位兼三事務贊萬機更激藩方共裨庶政自此凡有爭訟委隨處官吏據罪詳斷如事有不可裁斷者則結案聞奏成景宏位列百城秩膺八命在旌旃而甚至於委任以非輕所宜均我詔條副豫優寄而乃罔遵彞憲輒至貪求差廩吏以非公取貨財而潤已才行鞫勘果伏罪尤宜行竄逐之文以示澄清之道可貶綏州司戶參軍敕宜令今後諸色舉人委逐道觀察使慎擇有詞藝及通經官員各據所業考試及格者即與給解仍具所試詩賦經帖通粗數一一申省未及格者不得徇私發解兼承前諸道舉人多於京兆府寄應例以洪固鄉胄貴里為戶一時不實久遠難明自此各於本道請解具言本州縣某鄉某里為戶如或寄應須具本貫屬入狀不得效洪固胄貴之例文解到省後據所稱貫屬州府戶籍內如是無名本人並給解處官吏必加罪責京百司發解就試準前指揮兼下貢院具本朝舊格諸色舉人每年各放幾人及第到日續更詳酌處分應將來三傳三禮三史開元禮學究等考試本業畢後引試對策時宜令主司須於時務中採取要當策題精詳考校不必拘於對屬須有文章但能詞理周通文字典切即放及第如不及此格雖本業精通亦須黜落應九經五經明經帖書及格後引試對義時宜令主司於大經泛出問義五通於簾下書於試紙令隔簾逐段解說但要不失疏注義理通二通三然後便令念疏如是熟卷並須全通仍無失錯始得入策亦須於時務中選策題精當考較如粗於筆硯留意者則任以四六對仍須理有指歸言關體要如不曾於筆硯致功則許直書其事不得錯使文字只在明於利害其問義念疏對策逐件須有去留近年諸道解送童子皆越常規或年齒漸高或精神非俊或道字頗多訛舛或念書不合格文主司若不去留貢部積成乖弊自此後應諸道州府如公然濫發文解略不考選藝能其逐處判官及試官並加責罰仍下貢院將來諸道應解送到童子委主司精專考較須是年顏不高念書合格道字分明兼無蹶失即放及第仍依天成三年例主司未出院閒便引就試與諸科舉人同日榜不得前却盧詹職居近侍懇述大綱案州縣之規程重國家之恩命既為允當須示聽從掌綸之任擢才以居或自初命而升或自顯秩而授蓋重厥職靡繫其官雖事分皆同而行綴或異誠由往日未有定規議官位則上下不常論職次則後先為敘宜行顯命當正近班今後翰林學士入院並以先後為定惟承旨一員出自朕意不計官資先後並在學士之上仍編入翰林志縣令化洽一同位居百里在專勸課撫育疲羸苟或因循是孤委任宜令隨處州府長吏逐縣每年考課如增添得戶稅最多者具名申奏與加章服酬奬如稍酷虐輒恣誅求減落稅額者並具奏聞當行朝典其縣令仍勒州司批給解由歷子之時具初到任所交得戶口至得替增減數額分時批鑿將來除官及參選委中書門下併銓曹磨勘宜令三京及諸道州府準此萬物之中人曹為貴百行之內孝道為先凡戴北辰並遵皇化備聞南國多爽時風皆傾事鬼之心不守敬親之道於父母如此無行披日月何以立身弊久積於鄉閭化全繇於長吏昔西門豹一縣令耳尚能投巫百姓保女子之愛絶河伯之虞斷自一時傳於千古況位居侯伯化洽封巡豈不能宣北闕之風變南方之俗宜令逐處觀察使刺史丁寧曉告自今巳後父母骨肉有疾者並須日夕專切不離左右看侍使子奉其父母婦侍其舅姑弟不慢於諸兄姪不怠於諸父如或不移故態老者臥病少者不勤事奉子女弟姪並加嚴斷出嫁女父母有疾不令知者當罪其夫及其舅姑日月流行之處至人億萬之家既絶煩苛無濫力役唯忠孝二柄可以旌表戶門若廣給蠲符深為弊事昨日所為地圖方域逐閏重曡上供州郡之中皆須厚斂而猶尋降誡敕並勒廢停今此幸端豈合更啓逐年蠲紙宜令削去古之治民者勸賞而畏刑恤民而不倦賞以春夏刑以秋冬是以將賞為之加膳此以知其賞勸世將刑為之不舉此以知其刑懲世惟賞以春夏刑以秋冬見聖哲之用心合天地而行事今朕以切於禁暴樂在勸能其或秋後有功不可待冰泮而行賞春時有罪不可俟霜降而加刑漸尚太平方行古道況賞不愆典則立功者轉多刑不濫施則犯法者漸少其在京或遇行極法日宜不舉樂朕減常膳諸州使遇行極法日亦禁聲樂朕以允從人望嗣守帝圖政必究於化源道每從於德本貴全國法以正人倫孟升身被儒冠職居賓幕比資籌畫以贊盤維而乃都昧操修但貪榮祿匿母喪而不舉為人子以何堪瀆汚時風敗傷名教五刑是重十惡難寬雖遣投荒無如去世孟升賜自盡觀察使觀察判官録事參軍失其糾察各有殿罰朕以握圖纘位端已臨民每於刑獄之閒倍軫憂勤之念慮多淹滯纍降指揮儻一物以銜冤撫萬機而是愧近聆數處申奏囚人獄內身殂事既不明理難取證將絶欺罔之弊須頒條理之文宜令今後凡有刑獄切依前準敕命施行斷遣不宜淹停如有賊徒推尋反證斷遣未聞在獄疾病委隨處官吏當面録問令醫人看無致推司官吏別啓幸門大駕巡省六師屯聚覽有司所奏慮軍食稍虧須議轉移然後供贍事非獲巳理在權行而濮州地里匪遙戶民不少才承旨命廣奏逋逃及降條流却申齊足頗驚聞聽猶涉因循蓋撫馭之無方致黎民之暫惑既乖體國何以濟時尚緣裝發巳齊轉納將畢聊從薄罰以誡衆多孔知鄴罰一月俸名官之榮其求甚重試攝之任所得非輕徐究根源亦關治道自亂離巳來天下州府例是攝官皆給試銜或因勘窮便關詐假巳前或有稱試銜者一切不問此後並宜禁止會計之司租賦為本州縣之職徵科是常儻不切整齊必漸滋僥幸今聆舉奏果有逋懸非朝廷之立法不嚴蓋官吏之慢公頗甚緣當獻歲未欲加刑宜顯示於新條貴永除於積弊其天成元年應缺秋稅特與據數放免契丹即為凶黨真定不是逆城蓋闕審詳有茲差誤李琪罰一月俸近據西北藩鎮聞奏定難軍節度使李仁福薨變朕以仁福自分戎閫遠鎮塞垣威惠俱行忠孝兼著當本朝播越之後及先皇興創之初或大剿凶徒或遙尊聖主夙夜每勤於規救始終罔怠於傾輸爰令眇躬益全大節協和羣虜惠養蒸民致朕端拱無為修文偃武賴彼統臨有術遠肅邇安委仗方深凋殞何早忽窺所奏深愴豫懷不朽之功既存於社稷有餘之慶宜及於子孫但以彼藩地處窮邊每資經略厥子年才弱冠未歷艱難或虧御駕之方定啓姦邪之便此令嗣襲貴示優恩必若踐彼危機不如置之安地其李彞超巳除延州節度觀察留後前延州節度使安從進却除夏州節度留後各降宣命指揮使勒赴任但夏銀綏宥等州最居邊遠久屬亂離多染夷狄之風少識朝廷之命既乍當於移易宜普示於渥恩應夏銀綏宥等州管內罪無輕重常赦所不原者並公私債負殘缺稅物一切並放兼自刺史巳下指揮使押衙巳下皆勒仍舊勾當及與各轉官資宜令安從進到日倍加安撫連具名銜分析聞奏朕自總萬機勤宏一德內安華夏外撫夷狄先既懷之以恩後必示之以信且如李從目嚴之守岐隴疆土極寬高允韜之鎮鄜延甲兵亦衆咸能識時知變舉族來朝從目嚴則見領大梁允韜則尋除巨鹿次其昆仲並建節麾下至將寮悉分符竹又若王都之貪上谷李賓之吝朔方或則結搆契丹偷延旦夕或則依憑党項竊據山河罔稟除移唯謀依拒比及朝廷差命良將徵發鋭師謀悉萬全戰皆百勝才興討伐巳見覆亡數萬騎之契丹隻輪莫返幾千族之党項一鼓俄平尋拔孤城盡誅羣黨無遠無近悉見悉聞何必廣引古今方明利害只陳近事聊諭將來彼或要覆族之殃則王都李賓足為鑒戒彼或要全身之福則允韜從目嚴可作規繩朕設兩途爾宜自擇無貽後悔有玷前修今以天命初行人情未定或慮將校之內親要之閒幸彼幼沖恣其熒惑遂成騷動致纍人靈今特差邠州節度使樂彥稠部領馬步兵士五萬人騎送安從進赴任兼以別降宣命嚴切指揮安從進等委以訓戒師徒參詳事理從命者秋毫勿犯違命者全族必誅先令後行有犯無赦更慮孤恩之輩樂禍之徒居安則廣造異端貴令擾亂臨難則却謀相害自要功勳宜令李彞超體認朕懷宣諭彼衆無聽邪說有落奸機宣布丁寧咸令知悉王都負國命將除凶攻伐之勞朕所常憫般運之苦朕實備知近自收城方期罷役宜加矜恤遍示優饒其鄴都幽鎮滄邢易定等州管內百姓除正稅外免諸免差配庶令生聚並獲舒蘇諸道節度使帶平章事兼侍中中書令在京則中書差直省一員引接及赴鎮擬合追還緣使相在京百官請謁須差直省引接兼侍衛出入或恐朝列誤衝及到本道自有客司通引官引接其從厚從榮雖為皇子職本侯王王建立孔循曾掌樞衡見居藩鎮況諸道使相無直省者甚多其到東青許州先將去直省並宜追還中書大壯之觀標於易象不莊之戒著在禮經況乎地列山河貴為侯伯至於邑宰皆肅公庭須整臣之威儀以重民之父母頃當世亂固無暇於修新今既時安誰不思於補故況一日必葺三年有成凡居祿位之流聞此聖賢之語今後諸州諸吏凡於廨宇並須專切增修不得信令摧毀凡所置辦亦令勒其年月編於帳籍受代之際各明交領亦不得託於廨署接便擾人自天成纘紹之初曾降敕應隨駕並內外將校職員許奏名銜當議遷陟俾行賞舊之恩以報維新之命自後纍據奏薦人數極多巳經數載尚有奏陳既是論乞新恩豈宜積年申奏兼恐有後來補署才改職名更望官員妄爭爵命若無止絶慮啓幸門此後諸州諸使不得更有論請新恩如是顯立功勞要行酬奬即委本處長吏特具奏聞酌其續效當議施行故平盧軍節度使霍彥威勳名顯著宅兆巳營爰遵定諡之規俾議送終之制宜以三公禮葬諸司寺監凡有文簿施行奏覆司長須與逐司官員同籤署申發不得司長獨有指揮其主印官或請假差使印須依輪次主掌不得踰越三秀靈芝標仙籍而罔資世務九莖嘉穀按地牒而實表豐年既呈殊異之祥雅叶治平之運宜付史館編記朝廷每有將相恩命準往例諸道節度使帶平章事兼侍中中書令并列銜於敕牒後側書使字今兩浙節度使錢鏐是元帥尚父與使相名殊承前列銜久未改正湖南節度使馬殷先兼中書令之時理宜齒於相位今守太師尚書令是南省官資不合列署敕尾今後每署將相敕牒宜落下錢鏐馬殷官位仍永為常式藏冰之制載在前經獻廟之儀廢於近代既朝臣之特舉按典禮之宜行田敏所奏祭司寒獻羔事宜依其桃弧棘矢巳下事久不行理難備創其諸侯亦宜準往制任藏冰昭宣光烈孝皇帝曾居寶位久抱幽冤近始追崇方安寢廟宜升縣邑以奉園陵宜升曹州濟陰縣為次赤以本縣令兼陵令應諸道州府令録等官告敕牒元是中書進納入內令閣門宣賜其判司主簿官告舊是所司發遣受恩命後赴本任地里遠近各有程限比進納恐有停滯況綾紙褾軸價錢近巳官破今後所除州縣官告身敕牒宜令中書門下指揮不要進納並委宰臣當面給付貴無留滯兼免住京破費尊崇聖祖修飾道宮既復其名固難無額宜令所司依舊造上清宮牌額李商招愆俱在案款大理定罪備引格條然亦事有所未圖理有所未盡古之立法意在惜人況自列聖相承溥天無事人皆知禁刑遂從輕喪亂巳來廉恥者少朕一臨寰海四換星辰常宣無外之風每革從前之弊勤修一德深念五刑寬則不威暴則無惠唯期不濫皆守無私李商不務養民專謀潤已初聞告不公之事件決彼狀頭又為奪有主之莊田撻其本戶國家給州縣篆印只為行遣公文而乃將印歷下鄉從人戶取物據茲行事何以當官今王饒所告李商並招實罪宜奪歷任官重杖一頓處死元論人王饒四人並宜放仍令所在長吏遍示衆多居高者不得貪以陵卑在下者不得驕而訕上體泣罪之意聽祝網之言各守公途共資王道魯奇宣力兩朝統戎三鎮居富庶之地無奢侈之心上為國家下安生聚每行公道全塞幸門儻非大洽人情詎致遠聞余聽有茲為作宜示褒稱仍下諸州令各知悉重誨位重禁庭日親機務與羣官之有異在常式以難拘宜自初聞日共給七日
