front:
  text: 全唐文欽定全唐文卷五百四十五俯字思謙吏部尚書恆子貞元七年進士元和初復登賢良方正制科纍拜御史中丞襲徐國公穆宗立拜中書侍郎同中書門下平章事轉門下侍郎罷為吏部尚書徙兵部授太子少保為同州刺史寶歷三年復以少保分司東都文宗朝以左僕射致仕
