body:
  text: 應諸司諸軍諸使公廨諸色本利錢等伏緣臣當司及祕書省等三十二司利錢伏準今年七月十三日赦文至十倍者本利並放展轉攤保至五倍者本利並放緣前件諸司諸使諸軍利錢節文並不該及其中有納利百姓見臣稱訴納利已至十倍者未蒙一例處分求臣上達天聽臣已面陳奏訖伏以南北諸司事體無異納利百姓皆陛下赤子若恩澤均及則雨露無偏伏望聖慈特賜放免如允臣所奏伏乞特降敕旨並進今年七月十三日赦文處分仍永為定制臣器褊狹此不能強王承宗先朝阻命事無可觀如臣秉筆不能溢美或撰進之後例行貺遺臣若公然阻絶則違陛下撫納之宜僶俯受之則非微臣平生之志臣不願為之秉筆兵者凶器戰者危事聖主不得已而用之以仁討不仁以義討不義先務招懷不為掩襲古之用兵不斬祀不殺厲不禽二毛不犯田稼安人禁暴師之上也如救之甚於水火故王者之師有征無戰此必勝之道也如或縱肆小忿輕動干戈使敵人怨結師出無名非惟不勝乃自危之道也固宜深慎位貞元中佐陜虢觀察使姚南仲幕府改遂州別駕東川觀察使王叔雍希旨殺之臣某言中使某至伏奉某月日制書除臣檢校某官者伏惟皇帝陛下以仲春之月居青陽太廟順發生之令垂溥洽之恩建萬國而親諸侯闢四門而延多士雖成周析壤唐虞命官穆穆皇皇何以加此天子幸甚臣謬列藩鎮極茲寵榮捧戴絲綸形神駭越中謝臣聞謙以立衆明於害闕三字為言在不知退臣敢瀝懇固讓披心自陳何也臣闕二字天枝遂階名級立身終始竊慕古人履官途惟直道而行居聖代而孤立寡援自陛下纂承王業致理雍熙臣以瑣微纍蒙任遇入司宗籍出按節旄報恩百用未申一割悚惕惟厲中夜以興臣伏以爵本酬庸秩由崇德無功庸而冒爵秩乖寒燠而怒鬼神詩有不稱之譏易垂折足之誡仰惟古訓歷選先賢未有不澤潤生人功在王室而可驟升重位安處大名况今同軌絶垠韜弦息甲守戎內地甘食美衣舉勞無汗馬之勤論兵乏出人之略方將尸素刻責豈意恩光荐加在亭育而則然當靦冒而奚若且桓撥之職而布於典策優遊二品師長百僚自漢魏尤難此選非夫李固忠讜黃瓊奏議羊祜以荊州兼領謝安由戎政特拜以臣方之遠有所愧臣高祖淮安郡王神通翼贊神堯竭誠締構勳彰國史方任此官在臣何堪謬繼前哲循涯省分憂悸失圖垂之書不可以訓是願罄露丹懇冀回聖鑒察臣辭避之至恕臣量己之誠乞停今授以俟後效君猶天也焉敢飾詞臣限以所守不獲奔赴闕下拜舞丹墀無任慙惶懇迫之至臣某言某月日奏事官回伏奉敕旨以臣讓官即宜斷表者微臣材劣不足動天再蒙中詔曲賜獎飾捧授之際襟靈若飛中謝臣伏以運屬昌期干戈久戢人懷聖澤閭里乂安臣總戎無分寸之勞為政乏循良之異是以內思陳力難處百揆之崇外愧妨賢願效九官之讓而宸私荐及寵命莫回敢煩君父之聰用申犬馬之志惟當誓心許國盡瘁在公廉問黎蒸訓輯師旅庶立毫髮以副憂勤臣所守有限不獲奔走闕庭拜舞丹墀無任感恩殞越屏營之至臣某言伏奉某月日敕以臣兼充當道營田使者捧受絲綸載驚載躍臣某中謝幸忝宗室沐浴恩波性惟直方官絶依倚凡忝任用皆自宸衷常思殺身以答鴻造所至之職勵精苦節苟可利人利國誠願悉力悉心况西戎狡謀有備無患東都要害居安慮危俱屯偃革之師豈可不耕而食臣是以諭臨邊將士首建屯田董所屬軍人力開荒壤近為水旱之蓄遠減飛挽之勞臣之用心素切於此又軍營衣賜久費度支百方圓融三分全給在臣守土固合分憂此皆塵露至微豈如山海云益陛下曲垂天獎正以使名榮光荐加荷懼惟厲但當撫字鰥寡訓練貔貅克宣皇風底靖藩鎮庶申萬一少報生成臣所守有限不獲奔赴闕庭拜舞丹墀無任感恩殞越之至臣某言伏見聖製政刑針天文昭回八表皆燭睿藻稽古六經不刊臣某中謝伏惟皇帝陛下致理和平躋人壽域猶懷兢業重設針規酌裁成立制之中求司牧措刑之本信成康之能事蓋堯禹之用心可以萬邦作孚千載垂範金石不朽日月俱懸爰自繩契已還歷選列辟憲章代有詞義罕攻湯製局促於盤銘虞歌淡泊於琴曲橫汾乃縱賞之事黃竹匪勸誡之文其餘流薄國風漂淪樂府典謨雅誥寂蔑無聞曷若光啓格言昭融至道勤萬幾於一日二日立盛德於先天後天長垂四目之明詎假百官之獻臣職惟方鎮宗忝葭莩成誦已在於丹心述宣願播於青史臣限以所守不獲奔走闕下拜舞天階無任捧讀跪戴抃躍之至司直大歷十四年舉進士第五人日為天經春為歲始貞三農而允協於度調四時而不於理敬其所出導其所以升黃道而萬化融出青方而百工起所以放勳欽明羲仲是司協和天意敬授人時闕其職則厚生斯廢行其典乃庶績咸熙且曉色曈曨清光杳靄垂大明於有截察幽深於無外守晦明之度數順躔次之交會合一德而無私位三光而稱大煦育無偏陰陽氣宣應律管而初變暖林花而未鮮興農功於燠室發耒耜於原田既陶陶以受歲亦欣欣而樂天則知日以陽為德君以政為恆陽虧則物無仰照政失則年用不登覩寅賓之有則知平秩之方興瞻彼漲海日之所在出扶桑而吐暉泛暘谷而浴彩貞明宇宙協順時候將虔敬而專其所職豈出納而輕其所授我國家獻歲發生舒勾達萌警大田於東作紀斯箱於西成君德與日德俱遠道光與日光齊明將授官而守職俾萬化而為程仲舒字宏中太原人貞元十年策試賢良方正能直言極諫等科登乙第超拜右拾遺纍轉尚書郎元和中自職方郎中知制誥貶硤州刺史遷蘇州穆宗立召為中書舍人出為江西道觀察使長慶三年卒臣某言臣以某月日到本部上訖榮如夢中不敢自信臣某誠歡誠懼頓首頓首臣頃備位省官孤特無與自堅內志不近權門逞憾者以陰計中臣伺其顛沛而臣位從懼進身自危安陛下之保臣也陛下開張至道以福㣥生長人之吏必以歲久課其能否定為差等使無幸人獨臣領常州一年超居近地陛下之私臣也臣當此時不能稱揚隱晦以納聖聰論列奇計以靖封略使下有勝臣而未用者邊有戰聚而偷生者是臣負陛下之知也况今方隅之任得其人則聖慮安失其才則衆情苦斯位不細惟賢者宜之臣前官已曠後恩逾重公議難逭殞越是憂謹當日用皇慈下求利病鎮浮惰之俗杜姦邪之萌冀其小康上天府臣之心也敢有二事不勝感恩戀闕之至臣某言中使某至伏奉三月二十五日敕除臣江陵尹兼御史大夫荊南節度觀察處置等使者如綸炳然中天而下伏讀惶駭不知所裁臣某誠歡誠恐頓首頓首臣既無老謀又無壯事塵玷重位前後六年將陛下覆幬之仁煦嫗㣥物所至之土方獲小安如日照臨人共知見臣敢竊盜以為己功况文昌六星將帥為首非全才碩德未嘗苟居陛下睿慮神行雄威電斷將付斯任尤精其人過量之榮臣獨虛授若在夢寐不敢自期即以今日祗命上道臣團練判官太子舍人兼侍御史楊洽久更吏塗兼練戎事謹差專領留務待李衡交割不勝感恩欣躍之至謹奉表陳謝以聞右奉進止寢宮在山上置來多年曾經野火燒爇摧毀略盡其宮尋移在瑤臺寺左側今屬連年欲議修置緣舊宮本山上元無井泉每緣供水稍遠百姓非常勞斃今欲於見往行宮處修造所冀久遠便人又為改移舊制恐所見未周宜令中書門下及百寮同商量可否聞奏者守右補闕王仲舒議曰伏詳敕旨以太宗陵廟衣冠所遊嚴上之誠重於改作實聖人之孝也但以既經焚毀舊制將來仙馭所經恐違虔奉之意其本地素無泉源日羞饋祀出於人力登降難為褻味又仲尼有言易墓非古臣庶兆域尚重芟夷園寢之間豈宜振擾不可再興版築理足明徵陛下聰明聖神德叶文祖寢宮廢墜歲序滋深獨留其功以候聖旨伏惟精選信任大臣嚴重其禮昭告陵廟以通明靈令於柏城之中卜其近地略雕琢之費因耕稼之休務録愛人節用之心副文皇還朴之志天下幸甚謹議帝唐綏珮之士年未壯其文老成者曰博陵崔秀文峻亮而堅剛貞而和止立而毅其行也不邇聲利其文也文質相制才氣相發於古人立意中往往振起風雅知君者謂君得詩禮之際自然之機故也方將逞詞縱翰為邦國之聞人遭命否厄若干年而夭嗚呼惜哉嘗曰文之難為久矣世有執異端為公是驅法政為利物或雕刻雪月以趣佻巧或侈衒奇詭以新聞見或拘實而忘雄或飾辭而契本使曲直亂次裦貶錯行作者以壓溺處之未嘗弔也深而通而茂華而不流純而不朴仁義物體之序屬辭興事之端於大化也粲而不殊作者之教吾其奉哉由是洽帝王之制度以啓針諫則漢宣中興頌作焉諷前史之闕以貞黜陟則翟義贊形焉較英雄之功伐以傳後世則三傑頌存焉其餘暢賢人之德評一時之事不附於彼而立於才纍然貫珠於遺體不可備舉與君遊者猶是文揆人人在於餘地則君妙識深行又足徵矣噫夫彼化工醇其器堅其志而不使之遂豈將惑於從善者之心乎余於君從母之昆弟也嘗為碣銘志君之文篇目遺逸乃綜而次之敘而引之維年月日從姨弟使持節蘇州諸軍事守蘇州刺史賜紫金魚袋王仲舒謹遣某人以清酌之奠敬祭於故山南道節度使贈尚書左僕射權三兄相公之靈惟靈天受全氣早挺文學用道以直間邪存誠心常坦夷而不離法度操本堅峻而盡歸忠厚自拂衣登朝周歷清重靜專一節造次於是內翊皇極外擁麾旄賢哲極致天下榮觀豐祿足以肥家雄文可以潤屋而奉己彌約素風逾鮮禺卭山立以鎮浮俗嗚呼公之德也公之器也壽享期頤猶謂之夭况相遠乎論道上庠猶謂之薄况不至乎哀哉仲舒及冠之年情契深至非求道之要不為辭端非為文之迹不著心本雲路盡相致之誠間宴諧道舊之適音容如覩書札尚新靈儀宛然驟隔今古局守遠郡臨慟無因敬薦酒殽用申平昔尚饗顏太原人第進士貞元中纍官大理少卿拜御史中丞出為虢州刺史夫何赫赫之太陽忽降精於烏鳥乃呈瑞於皇王足應乾之三數目耀日之九芒降天邑而於我李浴咸池而自扶桑嘗空聞於前牒今實觀於殊祥天既無私祥何能隱昭聖代之有應垂休徵之無盡瑞於帝室表大孝於天衷獻自尹京驗長安之日近始至也衆羽駭集伊人驚萃邁麟鳳之時見何鷹隼之能畏如深就日之誠不效搏風之志願委質而入貢終依仁以馴致入銅籠而戢翼向金殿而矯翅將告於休似對以意由是憐楚人之迷鳳陋越裳之獻翟小哉棲棘之鸞蔑矣應風之鶂未如我陪日馭之出入遊天居之岑寂曩有赤而呈美白以效靈俱非應乎殊貺亦或載於祥經終未如符孝理之永錫昭寶運之康寧則如堯舜登極夔龍夾輔布政無偏惟賢是取故得感陽精於上帝贊陰德於下土光昭萬葉輝映千古良史當載美而記時謏才顧賡歌而蹈舞彼白雀兮降靈朱方羽皎皎而冰淨毛紛紛而雪光既無日浴不假雲翔馴階除兮玉彩相照向庭際而花影飄揚皓然自居賁以為飾與物無競隨時遊息知有文而賈害則純素葆光知惡紫之奪朱則大白呈色叶我皇之金運旌我皇之道極又何貴乎黃以為名赤以為翼然後銜丹書以告祉執玉環以述職所以異其類不能同塵所以隨其俗將以順人不假倉以耗國不穿屋以賊鄰刺穆公之將死以人為殉雪冶長之無罪示人有親無以為凡鳥也不托其實無以為珍禽也不利於物庶考言以察用時有得而無失若以酒成禮我則能近取諸身若以農命官我則能將委其質百揆有序萬物咸秩豈不知鴻鵠之志與斥鷃而為匹悲夫未處大厦間於雕籠心眷戀兮猶期拂日羽摧落兮半已從風望銅臺而路遠忿瑤池而宴終倘吾君兮為開一面呈瑞兮還飛紫宮臣顏言國家虔奉道源天下久安聖化伏見能事必舉善迹必旌臣所部湖城縣界有鑄鼎原是軒轅黃帝鼎成上仙之所闕一字詳史册縣右升仙宮寺具見圖經獨此闕一字原曾無表記微臣愚見是千古所遺歷代因循以至闕一字日只有鑄鼎原名莫知陳迹所在臣今闕一字於原最高處刻石表之當石直下更須穿地闕一字實去月二十八日本縣令房朝靜縣鎮遏將常憲專知官軍將杜晏等同於原上選地對窟穿深四尺得玉石闕二字是一片穿時為土工所折今作四段有懸佩孔子二其日縣令所由等狀送到州臣送觀察使使牒却令州司自進臣以此處合有碑記千古所無臣輒云為自疑妄動今幸得此佩伏喜不妄微臣測度恐是黃帝上升之時小臣遺墜之物臣檢算歷帝記黃帝去今六千四百三十年伏以天下有道地不藏珍今千尺荒原一穿得寶且是軒轅墜物應見聖明之代微臣不勝驚喜慶抃之至其玉佩謹以函盛差朝請郎行司兵參軍暢賞隨表奉進伏望頒示朝廷宣付史館臣顏無任誠惶誠恐頓首頓首謹言吏部兵部侍郎郎中員外共一十三員起去年十一月一日至今年三月三十日並不入朝臣此謂選限內不朝實憑格敕去三月二十一日奉敕轉朝前件官並闕奉慰臣中書門下省并兵部吏部格敕並無文狀國朝故事開元以前旬假節日百官盡入朝至天寶五載始有敕放旬節假日不入比及近來又賜常參分日伏緣前後優待之厚致有慢易違失之愆臣忝職司合當舉正庶使朝行自肅典禮克行伏請釐革惟天為大惟帝堯則之惟道為大惟黃帝得之南華經曰道神鬼神帝生天生地黃帝守一氣衍三墳以治人之性命乃鑄鼎茲原鼎成上升得神帝之道原有為谷之變銘紀鑄鼎之神銘曰道闕一字神帝帝在子人大哉上古軒轅為君化人以道鑄鼎自神漢武秦皇仙冀徒勤去道日遠失德及仁恭惟我唐元德為鄰方始昌運皇天所親唐興茲原名常鼎新始祖無名道之出也曾孫有國周之宗也夫國有開必先粵若后稷播種蒸人乃粒周之先也積仁成德積德成聖以至文王周公與天地合德乃繼為家聖焉周禮周易與日月俱懸允著為家法焉開國德澤之源流為國制度之本末俾百世不易萬方日用豈止三十代中八百年內而已厥後子孫因王顯姓始自四十一代祖周平王孫赤其父泄未立而卒平王崩赤當嗣為叔父桓王林廢而自立用赤為大夫及莊王不明赤遂奔晉晉用為并州牧自赤至龜八代代牧并州龜生喬至文釗十六代通前八代代襲封晉陽侯文釗生叔俊叔俊生伯明伯明生乇乇河東太守征西大將軍乇生卓卓字世盛歷魏晉為河東太守遷司空封猗氏侯夫人河東裴氏父仲賢任雍州牧卓翁年七十九薨於河東時屬劉聰石勒亂太原晉陽不遂歸葬葬河東猗氏縣焉隋併猗氏為桑泉縣今司空冢墓在縣東南解古城西二里至今子孫族焉自古太原鄉也亦猶潤州上元縣有琅琊鄉後魏定氏族僉以太原王為天下首姓故古今時諺有鼎蓋之名蓋謂蓋海內甲族著姓也我卓翁葬河東子孫成族間生將相而太原之望獨不鼎蓋河東著姓乎况本支奕葉金輝玉映洪源長派碧注清漣襲官婚者戚屬兼之澄而為止水絶資蔭者徭稅不暇漫而為衆流隸軍府而耳順方免負終身之恥戍積石而萬里交鎮有次死之苦更接二京之庭驅出九流之外蓋魏地狹隘迫而使之然也開元中左丞相張公説越認范陽封燕國公大歷初左相縉叔越認琅琊封齊國公且河東王承太原顯望久矣一旦為縉叔齊公沒之而望平沈也如燕齊兩公皆名世大賢社稷重器尚爾為也况中智以下薄俗者乎又見近代太原房譜稱顯姓之祖始自周靈王太子晉琅琊房譜亦云太子晉後且晉平公聞周太子生而異使師曠朝周見太子太子年方十五曠謂太子色赤太子謂曠曰吾後三年上賓於帝果十八而仙得不謂元精下降全真上賓則知年未十五已是神仙矣豈於三年之中而始同凡有嗣息耶是各為修譜者務神奇祖先競稱太子晉後不其妄歟凡稱太原王者無非周平王之孫赤之後前已詳之明矣桑泉房隋奉朝請善翁善之子日冉子翁官至開府儀同三司車騎將軍河北道大總管見隋書墓今有碑僧曇延有奇表身長八尺見高僧傳蒲州桑泉人也或有延公贊曰德與天全身居佛半桑泉房幽州都督元圭翁廣州都督方平翁皆盛德光時左補闕智明伯戶部員外郎嶽靈叔猗氏房右丞維叔左相縉叔俱偉文耀世或有上縉叔詩曰朝廷左相筆天下右丞詩人謂戲言時稱定論虞卿房安西北庭二節度正見叔武德冠時如入仕朝廷百舍或一出宧州邑十室二三通文武舉選僅不比屋有以見我卓翁積德積仁垂不已之慶流於無窮也然因官婚或棄鄉族迷失宗望亦往往而在晉司徒昶翁誡宗人曰若結婚姻如暴貴無識猥富不仁慎勿為也又誡曰勿三代不仕不學不看客失婚無譜不葬無墳墓不修仁若是惡事三代皆淪小人也戒之慎之孱孫顏由進士官歷臺省除洛陽令移典杭州入大理少卿拜御史中丞出虢州刺史嘗歎大道久隱澆漓時極今於正經揭道字為志於子史揭道字為翼成五十卷行於代建軒轅黃帝鑄鼎原碑銘聞於朝卓翁冢墓古有碑廟直下宗子四縣離居每年用正月七日一合來祭干戈動來廢至今日時方開泰冀得復行嗚呼魏之風俗儉不中禮周之子孫日失其序顏實永痛力建豐碑有四義焉一歸流遁者之心二正迷宗者之望三伏旌垂慶之德四永銘儲祉之仁銘曰太原一宗晉代三公薨時世故葬此河東孫謀克著祖慶所鍾顯魂凜凜遺冢崇崇謹案蒲州府志以此碑非唐人所作云文中謂周平王孫赤其父泄未立而卒平王崩赤當嗣為叔父桓王林廢之而自立及莊王不明赤遂奔晉求之傳記事皆無有且晉於是時獻公未強并州太原尚在狄地况州牧之官始自漢世安得晉於此時即用以為牧而先立此號又謂自赤至龜八代代牧并州自龜至文釗十六代通前八代代襲封晉陽侯語尤無稽且太原鄉牒其狀乃顏所上狀稱冀州刺史碑乃云河東太守狀稱卓在晉為司空河東太守碑乃云歷魏晉為河東太守遷司空安有一人自述其先世而抵牾不合若此又謂開元中左相張説越認范陽封燕國公大歷初左相縉叔越認琅琊封齊國公夫説與縉自以功名官位得封初未聞越認之事且公侯之爵亦非因越認門望可邀得者云云其辨甚詳今登載原文仍録辨語存證
