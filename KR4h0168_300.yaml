body:
  text: 昊天上帝君位五方精帝臣位帝號雖同而君臣各異陛下享君位於山上㣥臣祀臣位於山下誠足以垂範來為變禮之大者也禮成於三初獻亞獻終獻合於一處宮自黃帝建候神館宋尚書孔靈産入道奏改懷仙館神龍元年再置開元二年敕天師醮龍現敕改龍瑞宮管山界至東秦皇酒甕射的闕一字西石山南望海玉笥香爐峯北禹陵由射的潭五闕三字白鶴山淘砂徑茗闕一字宮山闕二字潭葑田茭池闕一字洞天第十名天帝陽明紫府真仙會處黃帝藏書闕三字闕闕四字禹至闕得書治水闕一字禹之下闕元紘字大綱京兆萬年人開元十四年拜中書侍郎同中書門下平章事加銀青光祿大夫封清水縣男與杜暹不叶罷知政事出為曹州刺史以疾去官拜戶部尚書仍聽致仕二十年起為太子詹事卒贈太子少傅諡曰文忠國史者記人君善惡國政損益一字貶褎千載稱之前賢所難事匪容易今張說在家修史吳兢又在集賢撰録遂今國之大典散在數處且太宗別置史館在於禁中所以重其職而祕其事也望勒說等就史館參詳撰録則典冊有憑舊章不墜矣伏以軍國不同中外異制若人閒無役地棄不墾發閒人以耕棄地省餽運以實軍糧於是乎有屯田其為益多矣今百官所退職田散在諸縣不可聚也百姓所有私田皆力自耕墾不可取也若置屯田即須公私相換徵發丁夫徵役則業廢於家免庸則賦闕於國內地置屯古所未有得不補失或恐未可謹議仙客涇州鶉觚人初為縣小史積功遷洮州司馬王君㚟節度河西召為判官遷太僕少卿判涼州別駕知節度留後事俄為節度使開元二十四年為朔方行軍大總管以工部尚書同中書門下三品知門下事遙領河東節度副大使封邠國公加左相卒贈尚書右丞相諡曰貞臣等伏覩皇太子送十二月德音赴史館伏承陛下前月五日將欲巡幸渭北是夜夢元元皇帝曰明日子欲遊乎北神不在此事宜止五更當自有應且子之享國多歷年所何必此日陛下二更即降制停渭北之行至五更果烈風大起際暮方定伏以玉真體妙莫大於皇極盛明致理孰盛於吾皇由是感而遂通聖與神合言不測之事示必然之期果茲烈風有叶靈夢既彰陛下之祚更表無疆之休同天地而久長若符契之徵驗臣以上自開闢博考圖書神靈效祥帝王膺慶未有若此之昭著者也臣等謬當樞近又忝史官預聞德音不勝抃躍伏望宣示百僚頒及中外臣等伏因侍奉之際天恩令臣升殿觀此烏巢陛下孝弟之至通於神明仁慈所育豈獨黎庶故得上元協應靈烏呈瑞翱翔不離於廷際栖集必歸於軒檻或人俗所有但止於園林今聖感而來乃巢於殿栱依人無懼戀主愈馴博考圖籍未之有也臣等幸忝樞近親覩休祥望頒示中外以彰靈感陛下孝友因心慈仁被物故得上帝儲祉靈烏發祥高棟重櫨共瞻爰止前軒內殿皆覩來巢視之彌馴逼之不懼休祐重沓而交應徵求古今而未聞臣等何人屢觀嘉瑞望與前狀同宣中外克紀禎符此城往緣無備權屬吐蕃天威所臨復為我有而犬戎自送其死且或執迷率彼凶徒輒敢圍逼城中在昔惟水為虞雖佇之則多而汲之路斷陛下每憂無物必期靈祐聖心有屬神道元通遂使拆石流泉分巖瀉液動天地而昭應與造化而同功三軍所資一朝皆足既使無渴乏之慮益勵忠勇之心翦滅寇戎從此非遠傍稽典策博考禎休以欣以躍實倍常品請宣示百僚編諸冊伏以元元孚祐聖感潛通將垂介福必有丕應頃屬初夏微陽暫人心自夢協已來頻降膏澤變茲秋稼成此豐年又數日陰雲通霄澍雨聖容將出天景廓清加以霏烟在天瑞氣捧日元符稠疊若此再三惟皇祖之降靈表吾君以大慶爰自古昔所未嘗聞臣等何人覩茲明應伏望宣付史官兵部尚書兼侍中牛仙客等奏臣等因奏事親承德音陛下謂臣等曰朕自臨御已來向卅年未曾不四更初即起具衣服禮尊容蓋所為蒼生祈福也昨十數日前因禮謁事畢之後曙色猶未分端坐靜慮有若假寐忽夢見一真容云吾是汝遠祖吾之形像可三尺餘今在京城西南一百餘里時人都不知年代之數汝但遣人尋求吾自應見汝當慶流萬享祚無窮吾自度其時今合與汝於興慶中相見汝亦當有大慶吾猶未即言語畢覺後昭然若有所覩朕因即命使兼令諸道士相隨於京城西南求訪果於盩厔縣樓觀東南山阜間乃遇真容一昨迎到便於興慶宮大同殿安置瞻覩與夢中無異者伏以元元大聖降見真容感通之徵實符睿德陛下體至尊之道崇清靜之源何曾不禮謁虔誠為蒼生祈福故得真容入夢烈祖表靈求之西南果與夢協且興慶宮者潛龍舊邸王業所興當此處而告期與嘉名而相會斯乃降於紫府鎮我皇家啓無疆之休論大慶之應陛下爰捨正殿以為法堂是尊是崇至敬至極殊常之理將萬福而俱臻無外皆覃乃億兆而同慶臣等昨日伏承聖恩賜許瞻禮自然相好諒絶名言開闢以來典籍所載未之有也臣等無任慶悅之至謹奉狀陳賀以聞仍請宣示中外編諸冊者延祚開元六年官工部侍郎臣延祚言臣受之於師曰同文底績是將大理刊書啓衷有用廣化實昭聖代輒極鄙懷臣延祚誠惶誠恐頓首頓首臣嘗覽古集至梁昭明太子所撰文選三十卷閲玩未已吟讀無斁風雅其來不之能尚則有遺詞激切揆度其事宅心隱微晦滅其兆飾物反諷假時維情非夫幽識莫能洞究往有李善時謂宿儒推而傳之成六十卷忽發章句是徵載籍述作之由何嘗措翰使復精核注引則陷於末學質訪指趣則巋然舊文祗謂攪心胡為析理臣懲其若是志為訓釋乃求得衢州常山縣尉臣呂延濟都水使者劉承祖男臣良處士臣張銑臣呂向臣李周翰等或藝術精遠塵遊不雜或詞論穎曜巖居自修相與三復乃詞周知祕旨一貫於理杳測澄懷目無全文心無留義作者為志森乎可觀記其所善名曰集注并具字音復三十卷其言約其利博後事元龜為學之師豁若徹蒙爛然見景載謂激俗誠惟便人伏惟陛下濬德乃文嘉言必史特發英藻允光洪猷有彰天心是效臣節敢有所隱斯與同進謹於朝堂拜表以聞輕瀆冕旒精爽震越臣誠惶誠恐頓首死罪謹言宗之開元時官禮部員外郎昭成皇后諡宜引聖真冠后諡之上而誤加大字非也若取單諡配之應曰聖昭若睿成以復諡配之應曰大聖昭成聖真昭成且太穆皇后武德元年五月追諡為穆皇后貞觀元年五月六日又追尊為太穆皇后上元中又追尊太穆神皇后文德皇后貞觀年中諡曰文德上元中追尊文德聖皇后即後漢皇后紀范煜論明矣晉贈太子賓客珦子舉進士及大禮科皆上第先天中纍遷中書舍人歷戶部侍郎襲爵河內郡公開元中加銀青光祿大夫終太子左庶子年五十九問妙盡黃間期於一作乎百發術該一作窮元女寧無七縱聲苟中律不憚撞鐘之求服必稱儒何辭解衣之試況今徵工意匠搴秀談叢梟鸞即事於分區牛驥佇從於別皂謂其淩厲顧盼以雪陳琳之恥一作陳侯之疑何乃罔敞遷延不答馬卿之難豈時英所病共設於翟酺將高尚在懷不屈於周黨薦舉之法抑有多途取捨之方莫能折衷何則含光隱迹不盜處士之名介立寡徒安獲知已之薦舉逸之法應有通規取捨之言非為一作無盡善文武之道方冊所不墜德怨之報人情之大綱射為諸侯杜預無穿札之力士為知己崔洪有挽弓一作弩之悔相圃澤宮失之遠矣子皮鮑叔夫何言哉一作夫何有哉舉賢受賞非才有罰國柄一作秉所加期乎必當驗之從政效無斷限之年試以一作之文才智有遲速之別知而不舉聞譏竊位舉而非一作非其人寧當顯戮臧孫之犯既是虛刑子文之辜復當何典內外齊舉援親豈不致嫌師錫具陳行慶又誰為首凡此歧路罔識攸從遲冀如律一作知律宏其利涉對物以類升方以類降故大小趨捨未始離乎類也所謂同聲相應同氣相求雲從龍風從武時其效歟矧惟生人懷五常含好惡自然之勢也安可處非其類乎斯固士君子砥行立名伸首抗迹思欲奮迅泥滓淩邁雲漢與鸞鳳為伍矣豈不能折其鋒沮其目誠謂類有聚㣥有分下流不可久居且無其時猶欲干進之若此況乎師曠傾耳卞氏拭目將欲察異音求奇彩苟有留者誰肯遷延於解衣之試哉策曰薦舉之法抑有多途取捨之方莫能折衷何則含光隱迹不盜處士之名介立寡徒安獲知巳之薦舉逸之法應有通規取捨之言非無盡善者夫人洪然則深其心飾其狀不可知以貌不可窮以言將為辨者不可也求乎其端或有可知矣夫天之巖乎其上者施人以氣地之坎乎其下者成人以形高下之間不可逃者形氣而巳矣氣之積者彰乎形形之動者感乎物彰於形故可以象察感於物故可以類求察其象長短之材可量矣求其類邪正之氣可識矣雖則含光隱迹介立不㣥終不能以形逃不能以氣隱明矣子曰視其所以觀其所由察其所安人焉廋哉人焉廋哉古聖王之觀人也未嘗越於是取捨之言非不盡善也但夫懷詐飾僞舉世有之干祿者不盡善舉人者不盡智或以勢逼或以利興觀象察言以難其識附威藉利諛媚其心有於此者則取捨之方何所施矣嗚呼負舟登山誠難事也策曰文武之道方策所不墜德怨之報人情之大綱射為諸侯杜預無穿札之力士為知已崔洪有挽弓之悔相圃澤宮失之遠矣子皮鮑叔夫何有哉夫射者先王所以定人之心和人之志亦以示威儀耳以為諸侯分我茅土育我黎蒸撫有威衡持秉生殺當審心定志敷德遵和故為其立飲射之法以導達其志不在穿札貫的矣子曰射不主皮即其義也則夫麗龜貫石者將武夫之伎耳非不侮鰥寡保其社稷之業夫有大功者獲大賞異哉當陽誠無間然矣古之君子冠業而立於朝則必有益於時矣以為益時者莫先於進賢苟得其人則沒齒無怨矣又何可顧望默識乎子曰定其交而後求夫古之人定其交者將宏濟時務克清代幾恐夫道不吾行才為時棄是用定其交求其達豈徒局促存於情之所好哉若以情之所好相求則是便僻比周之人豈得為文雅君子乎崔侯必不以挽弓為悔假使子皮薦國産叔牙舉夷吾終不能光興鄭邦匡合齊社亦未足以紛昭載籍矣策曰舉賢受賞非才有罰國柄所加期乎必當驗之從政效無限斷之年試以文才智有遲速之別知而不舉聞譏竊位舉非其人寧當顯戮臧孫之犯既是虛刑子文之辜復當何典內外齊舉援親豈不致嫌師錫具陳行慶又誰為首夫天之平分萬物體不俱舉有其才者童其首揮其翼者兩其足德不必備才難盡善其人善於政者不必有其文工於詞者不必敏其事書曰無求備於一人詳矣先王均其曲直任其事宜物各有所長工拙不相害矣故書曰明試以功車服以庸則堯試其人以官備在方冊矣夫政有序化有漸時有險夷功有隱顯為政者當責其歲晚不可中道而廢也施政立德不過乎三年人情大可見也孔子曰期月而化成書曰三載考績何得無限斷之年歟夫文者貴其能書理論宣道其業非得意之實乃無意之筌歟夫傳曰言以足志文以足言又曰非文無以自達苟欲考之文詞求之遲速則志有可得在政斯亨言之無文用亦何害且夫官爵者至公之器也薦賢者至公之道也君子持至公之道守至公之器進思盡忠何可回隱復俯薦嫌疑親讎之間哉昔者先王之立制進賢受上賞蔽賢蒙顯戮舉非其實置其阿黨之誅薦得其人介以彙征之賞行慶之典不偏於師錫矣時理則德存代亂則道喪難乎魯無君子楚不足徵使子文安居臧氏無咎痛哉政不難矣不有仲尼蒍賈之喻千載之後何知其過焉謹對問朕聞處域中之大據天下之圖莫不設簴以思賢解琴而願化雖君唱臣和而明鮮晦多所任者或非其人所行者儻乖其道歸於浸弊罔弗由茲朕寅畏上元負荷先構靜言為國有若涉川風俗未淳政教猶鬱黎元寡遂鸞鳳不臻當寧永懷良深愧歎子大夫講聖人之高議明王事之大綱蓄憤謀忠歷年載矣何施而反本於古何用而救末於今何術而人物阜安何德而神靈滋液爾其無隱無忽悉之究之通其條貫朕當親覽對臣聞聖人法天而理察道而行心膂俊賢子惠黎獻吏恭爾位人樂其業朝無粃政俗詠康哉書曰惟天聰明惟聖時憲惟臣欽若惟人從乂此其謂也雖根英異轍火木殊途革去故而鼎就新變咸池而歌大夏然而無易茲典其故何哉蓋以因天人之和順陰陽之數不可替也皇上道高西聖德邁南薰黃龍薦圖翠鳳為寶至於膺正歷享靈符朗七曜於銅儀安萬人於寶歷延祥降福陟酌登封八表黎元歌皇風而周地絡四夷酋長頌元化而建天樞此皆以刻於玉版載於金匱為帝者之祖宗與乾元而始終至於坐衢室端冕旒寂然不動感而遂通赫赫明明之美無聲無臭之化固以榮鏡宇宙發揚神人振古以來未有如斯之盛矣猶復寅畏上帝憂念下人思反朴於鶉居佇遷訛於鴻古夕惕勤止良以深焉爰降綸言俯詢輿議此陛下沖謙之道也愚臣何足以知之然而忝迹明時敢忘披露臣聞帝王之道藉英彥以張風邦國之圖資明謨以垂化故能庶徵有序美政無虧當今制禮作樂懸章布憲可謂文物大備刑政中和而紫宸宏卷舒之風黔首罕阜安之業者良以官僚空曠守宰荒寧不能宣裕皇明洗蒸徒之耳目發揮神化變澆薄於閭閻夫遷物化人著誠去僞豈惟君上之道實亦官聯之職故文翁好儒蜀學比於齊魯毛玠崇質魏士素其裘裳是知易俗移風使天下回心而嚮道者非俗吏之所能為也故董生云黎人未濟皆吏不明使至於此也賈誼亦云下之有過吏之罪也夫聞伯夷之風者貪夫以廉見柳下惠之迹者鄙人以恭故曰教人莫若垂範垂範必仰良材阜俗莫若興農興農必由循吏且擇賢而處其弊猶濫負乘為政何以克堪今若選英傑而實百僚自朝廷而及州縣咸令法易之道慎德刑之教賞以春夏慎其濫矣罰以秋冬敬其刑矣夫賞刑中則庶人安庶人安則財用足財用足則百志成百志成則天人和天人和則神靈滋液矣然後垂訓而理勤法而行宣九式以均財修六禮以節性明七教以興德齊八政以興邦道格元亨風還太古時雍之和可致濟俗之義可宏唐虞之美可逾文景之聲可越謹對惟聖寶賢以齊皇極有若左丞相燕國公右丞相廣平公太子少傅安陽侯皆生人碩德皇國元老道著廊廟績宣華戎由是懋其成功錫以元吉咨日於朔擇時於秋俾對命王庭受職公府見㣥屬揖庶寮禮官辨章掌舍陳次工備佾饔獻蒸六卿拜下以成儀三事自天而來賀秩秩賓序暉暉旅酬玉緯垂文南風和雅頌之變金漿降醴雲天光飫酌之宜宰德貴和盡莊敬具瞻之範㣥情尚洽預周旋晏語之歡方將一心天工勠力帝載寢黑山之柝苞青海之戈雲雨賢才水火菽粟日詠魚藻歲陳由庚頤殷趙之年留魯陽之景爰命在宴乃賡載歌從開元初人中黃子曰豫觀風后握機圖殆有情哉然年代遷遠文字損益或致人心訛矣惜乎夫兵者榮賤覆殺之大機也天地神靈之所閟也洞則王昧則亡故黃帝湯武得其道矣然則兵之用也豈惟道乎亦有工拙矣語大旨有三微焉昔伊尹勸湯呂望勸周子房勸漢祖鄧禹勸光武可謂知命運之微也樂生破竹迎刃之喻曹劌三鼓候衰而作可謂知和氣之微也孫臏邀敵於馬陵韓信置軍於水上可謂知地勢之微也故古人有言曰能知三微霸代之師至夫以智料智因奇縱奇千變萬化不可殫備今夫握機者約而遠幾而深用少以濟廣貫一以締萬微乎微乎可以神會難以迹融非智合曩賢役心深妙者不可以常識偕之今豫依風后大旨略為此圖以擬方陳陳有八物有八容八八相值可離可合中有容效三元天子上將所居常靜不動以象元極以配中黃其理微矣若乃四衡夾三軸九地夾二天吟龍嘯武當前後之衡雲鳥風蛇居摶掣之要敵寡則從武翼之屬風蛇之勢合而圍之彼衆則奮龍武之衡接雲鳥之勢突而擊之亦百勝之術焉昔諸葛孔明以傑時之智將求其源而未得也乃曰八陳成可以橫行天下然武侯陳法亦有武翼翔鳥足明武侯所習則風后五圖也桓溫見蜀將八陳云是常山蛇勢徒妄言耳常山蛇者法出孫子謂之率然蓋直陳也故桓溫覽孫子而有是言殊無旨哉然此離合之勢奇正之術故曰或離而為八或合而為一以正合以奇勝其要在此矣孫子儒者也至注釋務析精奧而多引空言以誣後人何哉馬忽述云增字發明未得精了更益煩蕪豫昔嘗覽焉中失其本每思經述近乃得之聊因時暇刊繁舉要序而第焉二百八十言殆不過尺并為圖式以悟後賢庶有賴云爾昔孔子舉詩書作後王者之法其稱殷頌曰天命元鳥降而生商書曰天工人其代之然則聖人受命賢人受任龍騰武躍風流雲蒸求之精微其道莫不咸係乎天者也故夫受天之命者不可以苟代天之理者不可以私前聖知其如此故明四目達四聰高居而審聽處幽而遐覽㣥才必用衆功乃廣然後天應以福而太和之化臻矣雖三光襲照五運潛周媯圖啓而揖讓興夏鼎移而干戈用德業相踵屯夷不同然激揚名義增廣壇宇何嘗不得賢則理失賢則危哉是故五老尊而軒風熾三仁去而殷道衰淮陰來而漢家昌亞父亡而楚王滅姬漢以降大象淪夷當極者不以垂拱居尊干祿者必以權利邀進鏡物者不以虛巳為德達才者必以寒雋為嫌故洪綱強而萬目頽大理虧而廉讓塞貞良甘退而莫進賢士卷藝以深潛故伯夷為之哀歌綺里為之高遁晉重滅名以避其患楚狂遁世以全其身豈惡富貴哉蓋有為而然也夫明王旰食以求士君子含德以俟時然求應之感徒深而君臣之分猶鮮者何也蓋經達之道難而代乏鮑子蕭何之智也若夫解縛為相古今所罕有登壇受爵賢者歎其難漢高始以為疑齊桓終受其福乃知有管仲之才無鮑叔之介則桓公不納有韓信之略無蕭何之助則漢高不容齊桓漢高不易值矣蕭公鮑子豈屢得哉夫未遇良鑒則夜光不為寶時逢哲后則負鼎可升朝歷求邃古爰覽近圖臣主之際授受之外垂大明以敘下推至公以匡上則有我唐太宗文武大聖皇帝魏文貞者之流也蓋至理之代君子不以王爵私其身而況親屬乎是以貞觀之中賢者在朝各崇至公馬周懷奇思而拔起隴畝李靖多大功而終始援用魏徵數直諫而優游撫納我朝之得才於斯為美彼三國之臣主始當草昧之期卒踐陵遲之運君無尺土之漸而以爭奪為德臣無素定之分而以偷合為功然其屬衰亂之間固貞仁之節接風塵之會吐博奕之謀用能各奉其主克立厥勳者亦不可誣也又若清淑沈懿有顏氏之德靈鑒洞照有子房之能推功給下有終始之勤篤誼守節有風雲之概歎王室之多故懷黍離以永吟遂委忠曹公冀圖匡復而天命潛革人心則殊姑回備物之謨卒抗非常之錫雖欲匡上以德翻乃殺身成仁夫仁義豈有恆在乎不捨道而已是故比干湛身於殷后微子抗跡於周邦雖二美同歸而三仁齊致公達慷慨總角耀奇惡姦臣之擅命想桓文之高舉㣥雄競起漢歷寖微翻然回慮吐詞魏幕原其所以然者豈不以桑榆之暉非魯陽可止溝瀆之節豈仲尼所嘉是以攝管仲之高蹤攀魏武之遐轍全生之理其亦遠乎崔子矯然植青松之操鯁詞直對則左右失容捐生取義千載稱美雖遇讒譖蓋亦其素志矣若乃天命未改則人思其舊乾道將革則物厭其常是以司隸之儀見悲於漢叟先王之跡遠播於汶隅孔明躬耕南陽盤桓俟主吐籌獻策識鼎峙之形總衆臨戎有席卷之望原其去就抑亦懷漢之雅志焉及其撫戎幕持國鈞開誠心布公道賞不失德罰不濫刑又雖古之遺直不能尚也昔管仲用法伯氏無怨子羔刑人終以見德孔明之謫李嚴蓋近之矣周瑜魯肅咸起諸生鶚視烏林鷹揚赤壁然肅為布衣當襄漢之際標賣田宅分財結士以求人傑此其志不小也公瑾推第於孫策子敬輟粟於周郎咸有異於人者也子布剛懷不撓之節屬桓王創業首贊經綸仲謀嗣立躬自扶翊古人所謂託六尺之孤者歟既而忠言屢發直道不回折弋獵之娛沮釣臺之樂斯又王臣蹇蹇國之元老者哉夫江東之於天下猶四體之有一掌耳權不能恢闡雄量以求忠讜而乃輕肆忿毒厭聞至言始抽刃於虞翻終按刀於子布翻既謫終遐裔昭亦廢處家僮故使時望挫傷元功圯衄由是見仲謀之器小也其不能厠跡中原懋長代之業者宜矣夫以子布忠賢承奕代之遇一言忤旨有不測之辜況賤跡之士而欲自下干上罄其孤慮者乎善料古者必察乎今善籌遠者必謀諸近讚詠之作豈必核既往之陳迹蓋將暢其幽情貴使來葉有可觀者聊復采斷為其讚云
