front:
  text: 全唐文欽定全唐文卷三百知章字季真會稽永興人第進士開元中纍遷禮部侍郎加集賢院學士充皇太子侍讀遷太子賓客銀青光祿大夫授祕書監晚年自號四明狂客又稱祕書外監天寶三載上疏請度為道士還鄉里元宗親制詩贈行卒年八十六肅宗立贈禮部尚書
