front:
  text: 全唐文欽定全唐文卷二百一吳仁龍朔朝官右金吾衞將軍封朔方公
  hash: sha256:d5ca04a7f991f1acc13974cdb1dc5a85b7a731035759f7ac451628d67ff1c78e
  markers:
  - {type: head, offset: 12, content: 薛孤吳仁, id: KR4h0168_NFKB_201-h1, level: 1}
body:
  text: 道家立旨取貴於柔謙釋教為宗有存於汲引雖復邁九仙而飛迹標致弗爽於同塵超十地而遊神修行豈乖於忍辱且君親尊重比乾嚴而有裕臣子忠肅申拜伏而無違斯乃萬國之大經千葉之常軌居造次而必踐處少選而難廢至若緇黃二教頓捐茲禮唯擅貢高之法莫循資敬之儀事如同馭寺議中彈虛啟弊風實差彞典事如右武衞議中彈但勸誘之規雖則多躅等歸利物寧履義方何必驕倨為容便躋衆妙之域虔恭表節遂隔真如之鏡事如左戎衞議中彈緬尋指趣深謂不然致拜君親實為通理謹竭愚識庶會宏謨深懼不當退用慚惕謹議神客龍朔時官著作郎宏文館學士上柱國封濟南縣開國男乙速孤府君碑銘幷序天地之大德曰生聖人之大寶曰位生不可以無宰俟有道以存之位不可以無寄闕一字有德以尊之故創極剖天張維闢㝢大君有作闕三字而乘雲多士聿興仰登山而捧日可久可大闡洪業而非常立德立功垂大名於不朽存而為一時之傑歿而為一代之英爰有異人今可得而聞矣公諱神慶字昭祐其先王氏太原人也昔房闕一字以天戈耀象六英開鳳舞之祥后棄以星袟興農萬里厝鸞歌之域帝圖克峻王道攸歸周德方隆翦商以光其業齊功可遂敗敵而有其勳官族著乎天下闕一字緒傾乎海內五代祖顯後魏拜驃騎大將軍偉德挺生稟嵩岱之精魄洪川派別洩江海之波瀾特拔千仞盤紆九野遂賜姓為乙速孤氏始為京兆醴泉人焉有命承家代功居寵然後以周畿委輅奉春異鐘鼎之門漢殿乘軒田秋匪珪璋之操闕一字其榮閥故無得而傳之曾祖貴齊右衞大將軍儀同三司使持節都督岐州諸軍事齊州刺史周上開府儀同三司闕一字附大夫隨河州諸軍事河州刺史河州總管太子右庶子和仁郡開國公祖安齊前鋒都督周右武候右六府驃騎將軍開府儀同三司使持節長州諸軍事長州剌史隋益州都督襲封和仁郡開國公拜前拜後惟昭惟穆咸以忠貞之操並資文武之材終始一心雖百君而每合出入三代居八命而逾榮父晟皇朝上開府右武候闕一字卄府左車騎將軍轉驃騎將軍令緒逾崇高門克大岳靈鳳德紹賢哲以相趨河目龜紋闕一字公侯而繼出公山資海授星傑雷英跨俗騰彩驚時駮矚雖仲連飛兔追日電以長鳴而諸葛臥龍候風雲而戢景俄屬黿鼉駕海猨鶴淩江黃神吟而㝢縣分素靈歎而區域震高祖神堯皇帝開天躧步翼日騰精偃橫流於九海蕩洪氛於八極雲雷噴薄興於晉水之湄天地氤氳闢於渭川之涘於時邑居幅裂豪俊棊分鵲起逢時之心寰中既擾烏止於誰之室㝢內攸瞻公乃存悟井之深幾載驅驪阜知躍泉之祕跡言訪龍田獄訟歸禹不忘於寤寐歌舞迎周獨斷於襟抱以義寧之始乃奉見於涇陽初蒙恩命預參秦府從平京邑授通議大夫賜物六十段戎章克峻雖策勳而既重國圖伊始以門冑而方榮乃取祖長州府君之資任右親衞於時雖地開金策翦鶉甸而斯安而池闕一字玉闕一字亂雞津而未靖公於是奉陪八校薄伐三川從討王充破青城堡賜物一百段幷袍彩牛等加勳大將軍武德元年又征薛舉二年復破武周神兵四舉每推立於後服英圖百勝必賈勇於先登時宋金剛尚憑地險更勞天伐公乃因機有捷燭雲火之高輝應變無方刊風灰之遠陣平寇之後蒙賜馬及金鞌彩物百段王充以巨猾窺舋假位號於成周建德以大盜因時竊仁義於全趙恃連雞之援以興危邦託刑馬之盟方為與國太宗乃韜龍豹旅貔貅黃鉞排天朱旗斷霧沸洛川而憤角震嵩巖而疊鼓王充以迭食為命不移蛩駏之心建德以弱甲相依無舛螳蜋之衞公乃懷奇請奮受命長驅破王充千金堡并從擒建德預軒聖於元符奉堯績於丹浦燕趙俄獲蚌為脯而無遺虞虢終亡馬服輿而不失加勳柱國賜物二百段劉黑闥擁銅馬之餘孽氣蘊圖南阻金鳳之闕一字川兵雄趙北公乃從平清漳洛水二闕二字因遂俘之授上柱國賜物闕一字段幷闕一字馬等綵物一百五十段粵以超時之効恒當不次之恩滿寵受田殊非異賞李忠錫馬遠多慚色尋又從破徐員朗復著奇勳既而聖情載洽念功勞止特蒙賜闕一字用表深榮太宗以元雲入戶未改唐侯之爵白水開錢猶踐蕭王之號秦王府妙資左右公以良家首辟闕一字令長上仍賜大袍既而飛燕侵闕一字長虹竭井雖域中四大正西北之傾維而天下一家有東南之反氣太宗乃殄茲方命殲厥流言推大義以龔行宏至公而克翦公以九年六月四日載靜姧回因而侍衞十闕一字不闕一字既而汾陽脫屣代邸承祧高鳥盡而藏弓歸獸存而去戰公乃方從挾策且欣櫜矢結墳籍而為驅禮義以為禽然以七德攸歸五營斯佇方始執鞭之任式隆初簣之基以貞觀五年授右衞勳衞闕四字長上六年闕二字七年賜絹一百匹八年授右勳衞校尉公以懷才樂道緯武經文闕一字而時習顛沛必於函丈功成不居終始存乎退尺每策勳而命賞常後巳而先人所以幽谷非遷望喬木而韜響澠池徒奮坐大樹而銷聲雖薄闕一字之志每深而厚祿之期終及十年蒙授游擊將軍守左領軍長闕一字府闕一字別將仍於永豐倉留守佳兵七萃左帶皇畿敖庾千箱傍臨陜服正壘壁其斯重瞻海陵其巳陋聿兼其任隆寄存焉十二年以闕二字璇極西顧玉鸞東驚皇輿帝皁肅龍駕於風雲天動神行揚鳳旗於日月董司戎禁載佇忠賢車駕自東都還京乃勑公檢校右勳衞上府郎將十七年以震宮養德乾心佇闕一字乃闕一字詔曰闕三字志懷強濟計略沈遠勞効著於戎旅恪勤宣於階闥宜加榮擢周衞儲闈可守太子右衞率府勳衞郎將於是青闈振景絳地增輝招搖之桂連芳共闕一字蒼琅之竹比節同闕一字十九年馬邑職無蹈於驟山之義龍顏憑怒有事於遼水之陽騖雷輜於碣石洗天兵於海島時高宗天皇大帝銅樓毓粹玉裕流溫雖義在懸弓宜扈於擒縱而時方主鬯實資於監撫乃闕二字州留守命公闕二字奉儲闈卄年丁驃騎府君憂去職逷輟移巷闕一字悲陟岵絕漿九日巳摧唐頌之心茹痛三年每泣高柴之血卄三年詔授太子右衞率府翊衞郎將犀鉤在飾鶴闕一字登榮抑禮援琴仍奏樂風之韻踰朞改燧更承重日之輝既而龍躍在天正銀題於紫極鴻飛漸陸振玉羽於元霄高宗即位之後授右衞郎將永徽三年除右驍衞翊衞中郎將張奐坐帷奮雄邊之遠略馬卿建節馳喻蜀之高文才宦雙美括囊千載五年詔授太子右虞候副率尋加兼太子右虞候副率徐邈授經之彥師表攸存卞敦良將之才閑邪是屬公之授也斯實兼焉俄屬六麟徐駕御西京之霧雨五斗遐拂俯闕一字洛之風煙鉤陳闕一字委英賢是賴駕幸東都之日檢校左領軍衞將軍尋又駕幸幷州勅公於幷州先置還東都日檢校右領軍衞將軍仍知六閑馬事溫驪籋雲歕闕二字於雪谷瑞闕一字生風銜珠耀於闕二字職無不理帝有嘉焉俄又兼太子右衞率闕一字惟闕一字秩實闕一字茲闕六字建功茂仲以主門興績瞻言故實英尚斯途公以儔之則為優矣方冀有仁必壽有壽必隆而位未極於釣璜闕一字問望周之浦齒不延於練玉遽頹觀魯之峯以顯慶五年八月卄四日遘疾闕三字於闕五字之私第春秋六十有二冕方興悼哀榮兼極勅書垂慰賵贈逾隆詔問嗣子行儼等幷賜物二百段粵以龍朔三年歲次癸亥二月乙酉朔十九日巽時永厝於雍州醴泉縣履中川以從先旨禮也惟公降辰象緯誕靈川嶽德光寶璧舒白氣以成虹才苞利器橫紫氣而射斗昔在髫初即踰常類嶷然殊狀如旭日之吐青山湛乎深識若明月之含碧海克岐日就至性天成教以義方則行之靡失趨而有訓則奉以無違承顏必當於隱犯知年每形於喜懼不愆於德瞻梓無以措其徽未嘗有過折葼無以闕一字其罰洎乎歷丁艱疚殆不勝喪在驃騎府君之憂公時巳班隆貴屢將毀滅痛深朝野於時乃有巢燕乳於倚廬觀聽嗟闕一字古今攸絕豈止許孜永慕棲雊翟於虛檐丁密窮哀闕一字鴹鳧於闕一字沼若斯而巳矣加以友于成性闕一字愛為懷共駕無暌屢極鍾輿之闕一字同衾有慰每追姜室之歡兄弟數人公為其長居上斯睦撫下惟仁奕奕增映怡怡可樂其後五門將闢三荊遽慘公乃責深自箠悲共氣而無終訓切在原泣分形而有異雖同胞竟阻王修之喻罕遵而推產不干卜式之資闕一字給公以鼎貴餘業財逾鉅萬一無所取咸以讓焉遐邇嗟服宗姻駭歎公以幼承教義早聞詩禮德思潤巳學尚專門俄屬有隋蕩覆生人殄喪擲書劒而事干戈棄俎豆而修軍旅故得藝殫弧矢精極韜鈐㦸枝楊葉窮取睽之妙金遺玉堂盡殪戎之術所以革車每次大憝斯殲闕一字應闕一字策兵無挫銳非以賞而邀利寧以功而自伐然而因時命律積稔論兵受而莫違當厚惠而居百夫之長推而不有委榮名而辭萬戶之侯卓矣高蹤魯連豈唯於蹈海安平卑位曼倩遂勞於執㦸大雅君子斯之謂焉子國子明經高第朝請大夫行綿州司馬行儼寧遠將軍守岐陽府長上折衝行均游擊將軍守甘泉府左果毅都尉行方等或傳經綜業或良弓嗣美誠在孝而斯勇實致果而為雄仁者安仁心無昧於觀行將門有將理不差於必復既而匪莪嬰酷悴柏纏哀攀蠧索而增慕循鑿楹而載感於是乃與昆季聚族興言以為陵谷難恃風猷易絕雲臺入畫莫究遺芳天祿藏書方成蠧簡欲垂不刊之跡必存無愧之辭於是爰勒他山用旌斯烈庶使波溢渤澥識墮淚於千齡麓徙琅琊傳受辛於萬古其詞曰立功立德惟武惟文銘戈著範勒鼎昭勳名懸日月氣稟風雲誰其克紹卓矣夫君緒派伊笙闕一字隆淮筮肇錫官族即榮昌裔衮服有輝旗章靡替明德斯謀高門是繼英英亮狀灼灼瑰奇不愆於道無忒其儀光含巨闕彩振長離公闕一字比驥呂望非彲運屬時屯道參人傑鵬圖鳳舉雲迥風烈濟水秦亡登山趙滅功成百勝途夷九折巳建宏勳俄膺懋寵期門甫陟羽林初奉帝庾斯衞儲兵載擁㝢省才高司偕位重官連四萃望越五營聲芳漢將器表周楨未登召室遽掩佳城哀纏國寶痛結人英樹慘王哀松凋許泣九泉長送百身何及鶴兆方兼烏墳永戢山秋月思野寒風急傳鉤令緒待漏英才蘭期奄隔楸思俄開圖芳隧路紀德泉臺九原徽烈萬古風埃人雖至靈而稟性含氣同於萬類故吉凶兆於彼而禍福應於此聖人受命龍鳳為佳瑞者和氣同也故漢高斬蛇而驗秦之必亡仲尼感麟而知巳之將死夷羊在牧殷紂以絕鸜鵒來朝魯昭出奔鼠舞端門燕刺誅死大鳥飛集昌邑以敗是故君子虔恭寅畏動必思義雖在幽獨如承大事知明神之照臨懼患難之及巳也雉昇鼎耳殷宗側身以修德鵬止坐隅賈生作賦以敘命卒無患者德勝妖也儼字仲思隴西人龍朔中官中臺司藩大夫大哉乾元播物垂象肇有書契文籍生焉雖十翼精微陰陽之化不測九流沈奧仁義之塗斯闡而勞生蠢蠢豈厭塵門闇海茫茫恒漂苦浪亦有寶經浮說錦籍寓詞駕鳳升雲驂龍棲月跡均轉縷空溺志於邪山事比繫繩詎知方於覺路孰若訓昭金口道祕瓊箱靜痡毒於三漏拯橫流於五濁是生是滅發蓮花之音非色非空被栴檀之簡暨乎鶴林稅軫槃之岸先登鳥筆記言總持之苑斯闢結集之侶揚其實諦傳授之賓宏其妙理然則紹宣神典幽贊元宗跨生肇以遐鶱追安什而曾騖可以聲融繡石采絢雕圖則於我法師而見之矣法師諱道因俗姓侯氏濮陽人也自繞樞凝祉紀雲而錫允貫昴摛祥奠川而分緒司徒以威容之盛垂範漢朝侍中以才悟之奇飛芳晉牒衣冠繼及代有人焉祖闞齊冀州長史父瑒隨柏人縣令並琢磨道德砥錫文藝或題輿展驥贊務於千里或烹鱻製錦馳聲乎一同法師稟祜居醇含章縱哲覃訏之歲粹采多奇髫齔之辰殊姿獨茂孝愛之節慈順之風率志斯存因心以極年甫七歲丁于內艱嗌粒絕漿殆乎滅性成人之德見稱州里免喪之後乃發宏誓而以風樹不停浮生何恃思去髮膚之愛將酬罔極之恩便詣靈巖道場從師習誦而識韻恬爽聰悟絕㣥曾不浹旬誦槃二袠舉衆嗟駭以為神童逮乎初丱方蒙落髮於是砥行飭躳架德緝道篋蛇能翦心猨久制遡流增智望井加勤在疑必請見義思益尋講涅槃十地洞盡幽微宿齒名流咸所歎異及受具戒彌復精苦若浮囊之貞全譬圓珠之朗潔始聽律義遍訖便講辨析文理綜核指歸十誦之端五篇之賾寫缾均美傳鐙在照又於彭城嵩論師所聽攝大乘嵩公懿德元猷蘭薰月暎門徒學侶魚貫鳧集講室談筵為之囂隘遂依科戒而為節文年少沙門且令習律曉四分者方許入聽法師夏臘雖幼業行攸高獨於衆中迥見推挹每敷攝論即令復講而披演詳悉詞韻清暢諸方翹俊靡弗歸仰於是遍窺釋典咸通密藏五乘之說四印之宗照盡幾初言窮慮始每摳衣講席隱几雕堂舉以玉柄敷其金牒渙乎冰釋怡然理順延惠風而不倦同彼清流雁言來響而無疲類夫虛谷搢紳之客慕義波騰緇黃之侶承規景赴法師志求冥寂深厭囂滓乃負袠褰裳銷聲太嶽寢谿扃岫飲露餐霞樹偃禪枝泉開定水凡經四載將詣洛中屬昏季陵夷法綱嚴峻僧無徒侶弗許遊涉於是杖錫出山孑焉孤邁恐罹刑憲靜念觀音少選之間有僧欻至皓然白首請與俱行迨至銅街暨於金地俯仰之際莫知所在咸謂善逝之力有感斯見非夫確至曷以臻乎既而黃霧興祆丹風起孽中原蕩覆具禍以燼法師乘杯西邁避地三蜀居於成都多寶之寺而靈關之右是曰隩區遠接荊舒近通卭僰邑居隱軫人物囂湊宏才鉅彥碩德高僧咸挹芳猷歸心接足及金符啟聖寶歷乘時運屬和平人多好事導元流於巳絕闢妙門之重鍵法師以精博之敏為道俗所遵每設講筵畢先招迓常講維摩攝論聽者千人時有寶暹法師東海人也植藝該洽尤善大乘昔在隋朝英塵久播學徒來請接武摩肩暹公慠爾其間仰之彌峻每至法師論義肅然改容沈吟久之方用酬遣法師抗音馳辯雷驚波注盡妙窮微藏牙折角益州總管鄧國公竇璡行臺左僕射贊國公竇軌長史申國公高士廉范陽公盧承慶及前後首僚幷西南嶽牧並國華朝秀重望崇班共藉聲芳俱申虔仰由是梁之地庸濮之甿飲德餐仁雲奔雨集法師隨緣誨誘虛往實歸昔曇翼高奇教闡沈犀之壤法和通敏道著蹲鵄之域協時揆事抑亦是同考業疇聲彼則非袞而以久居都會情異俶真養中晦跡可求天解復於彭門山寺習道安居此寺往經廢毀院宇凋敝法師慨然構懷專事營輯若乃危巒迢遰俯瞰龍隄絕磴逶迤斜臨鴈水近對青城之巘遙瞻赤里之街雲榭參差星橋縈映於是分巖列棟架壑疏基窈窕陵空俳佪卓景松吟竹嘯共寶鐸以諧聲月上霞舒與璇題而並色仙花祕草冬夏開榮擾獸馴禽晨昏度響諒息心之勝竟毓道之淨場乎而以九部微言三界式仰緬惟法盡將翳龍宮揮兔豪而匪固籀魚網而終滅未若鐫勒名山永昭弗朽遂於寺北巖山刻石書經窮多羅之祕袠盡毗尼之妙義縱洪瀾下注巨火上焚俾此靈文永傳遐劫豈直迷生之類覩之而發心後學之徒詳之而悟道既而清猷遠暢峻業遐昭遂簡宸衷乃紆天紱追赴京邑止大慈恩寺與元奘法師證釋梵本奘法師道軼通賢德鄰將聖朅遊天竺集梵文而爰止旋謁皇京奉綸言而載譯以法師宿望特所欽重瑣義片詞咸取刊證斯文弗墜我有其緣慧日寺主楷法師者聰爽溫贍聲藹鴻都乃首建法筵請開奧義帝城緇俗具來諮稟欣焉相顧得所未聞諸寺英翹懣然祗服咸敷師子之坐用佇頻伽之音法師振以元詞宣乎幽偈同炙輠而逾暢譬連環而靡絕耆年粹德曠士通儒粉滯稽疑雲消霧蕩伏膺請益于嗟來暮惟法師姿韻端凝履識清敏粹圖內蘊溫采外融運柔嘉以成性體齋遫而行巳峻節孤上夷險同貫沖懷不撓是非齊躅加復研幾史籍尤好老莊咀其菁華含其腴潤包四始於風律綜五聲於文緒宿植勝因恬榮褫欲善來佛子落采菴園開意花於福庭濯元波於妙境而貞苦之操絕衆超倫聰亮之姿踰今邁昔信法徒之冠冕釋氏之棟梁乎凡講槃華嚴大品維摩法華楞伽等經十地地持毗曇智度攝論對法佛地等論及四分等律其攝論維摩仍出章疏既而能事畢矣宏濟多矣脫屣於夢境棲神於淨域春秋七十有二以顯慶三年三月十一日終於長安慧日之寺梵宇殲良真門喪善悲纏素侶慟結緇徒即以四年正月旋乎益部二月八日窆於彭門光化寺石經之側道俗門人星流波委銜哀追送衆有數千巖谷為之傳響風雲於是變色慧日寺徒衆並蠲邪迪妙綜理探微保素真源歸元正道自法師戾止咸共遵崇追思靡及情深軫慕弟子元凝等稟訓餐風師稱上足而以慈鐙罷照崇山無仰循堂室而濡涕對几巾弗而流慟敬於此寺刊金撰德氣序雖遷音塵方煽亦猶道林英範託繡礎以長存慧遠徽猷寄雕碑而不朽其詞曰緬哉佛性廓矣元門功昭曠劫化拯重昏沖儀巳謝妙道斯存匪伊開士孰暢其言於顯法師誕靈傑起如松之秀如巖之峙穆穆風規堂堂容止行窮隱括識洞名理爰初紐錦早厭樊籠言從落飾乃沐元風將超八難即悟三空貞圖可仰峻範彌融鹿野微詞猴江粹典源流畢究奧隅咸踐法鏡攸懸信花彌闡振嶽符論奔濤喻辯昔在昏虐時逢禍亂東去戢道西遊違難天啟聖期光華在旦翼教益騰聲巴漢爰雕淨境于彼曾岑分櫩架壑聳塔依林穴八夕金緝義篆石雕金芥城斯盡勝跡無侵載奉王言來遊帝宅慧義資演真宗佇譯紫庭之彥丹臺之客並企清儀俱餐妙賾淪羲闕五字光遽嗟分岸永泣摧梁龕留舊影室泛殘香書芬紀藹地久天長知機儀鳳二年官太常博士去龍朔年司禮少常伯孫茂道奏請諸臣九章服與乘輿冕服章數雖殊飾龍名衮尊卑相亂望請諸臣九章衣以雲及麟代龍升山為上仍正冕名當時竟未施行今請制大明十二章乘輿服之加日月星辰龍或山火麟鳳元龜雲水等象鸞冕八章三公服之毳冕六章三品服之黼冕四章五品服之思元字文成高安人舉進士為文林郎滕王元嬰為洪州都督待以師友之禮國有燕饗代存飲射貴以觀德先乎踐禮故比茲六耦是辨其等威抗彼三侯必憑乎班列眷言伊甲則曰司存實掌厥儀克閑乃事序賓明揖讓之則進或歷階贊射辨升降之儀退惟輔序而決拾是佽弓矢斯調射人發功非無破的之藝司正命獲爰有倚旌之禮將欲乘其多算罰以弛弓使夫沮勸必明威容可則况職不在備禮或從宜無事則兼寧云離局之過有司所糾實負曠官之責尚一趙郡元氏人夫八龍荀里榮問在於當年駟馬于門餘慶消於終古亦有漢將軍之甲第磨滅成空魯司寇之華堂摧殘巳盡豈不以泡露倏忽陵谷遷移寂寥千載煙塵四合雖復武陵洲曲時逢李衡之樹山陽苑中頗見嵇康之竹竟未能激揚真界取大壯於龍宮欽崇妙境授全模於象塔是用神居肅穆靈德支持縱石盡而猶存與金剛而不壞鞠遺蹤於茂草彼或未思攀勝果於堅林我誠先覺開業寺者後魏黃門郎使持節衞大將軍陜州刺史都督冀定瀛相殷五州諸軍事定州刺史尚書令司徒公固安縣開國伯李公捨山第之所立也其地則前臨漳水金鳳騁光而振儀去負常山玉馬騰姿而絕影東瞻峻堞宛若香城西據崇巖依然雪嶺蓋全趙之勝地焉公諱裔字徽伯趙郡元氏人也珪璋盛德代資卿相之材鐘鼎貴遊人負河山之氣便繁竹使入天門而上八重密勿槐庭登太階而步三級朱輪趨闕拜天子於南宮黃閤當衢肅㣥公於北里位望隆矣歡娛極矣乃喟然歎曰假使門兼萬石不能遣生滅之源家累千金不能去吉凶之域以為同生者物異物者超生滯教者方離方者會教挹三明而豁悟乘公正以虛求爰貶泰於豐家庶推煩於朽宅及其高臺未毀曲池猶濬迴季倫之業作須達之園昔我宴居今成法宇變歌梁於月殿即下梵塵移舞觀於花臺還飄淨雪八功德水波通西舍之池四禪定林影庇東鄰之樹爾其考輪奐度崇高或仍舊而標迹或惟新而廣制隨方授矩基階因巨壑之形審曲裁規垣院取重巒之狀岧嶢香閣涌地神行窈窕禪棲中天化立千門遠閌當斷岫而全開百栱危承隱連峯而半出垂珠綴玉日月迴薄於山窗刻贙圖龍風雲吐納於巖棟優填靈匠盡變態而無窮闍崛真容極尊嚴而有睟青蓮目湛猶縱觀於南浮丹菓脣開似微言於西竺詭狀千名而競出殊名萬計以爭陳觸類長之能事畢矣先是有沙門僧明曇寶等並不知何許人屬魏氏之遷都隨孝文而戾止咸以冥通勝範夙證良緣非聲聞乘是菩薩行動機靈於物表屈形相於人間覩茲願力共謀經始當由道資冥助故使天降異人大矣哉諒福庭之最也于彼延昌之末錫其偃角之名孝昌年際改為隱覺自魏歷齊僧徒彌廣德均鶖鷺數若稻麻洎乎周季道消芟夷像教斯虐主之稱亂甚魔王之未降四百八藏之文咸淪汲冡飛錫乘杯之侶悉陷秦坑遂使多寶湮覆支提廢毀散給勳臣以充園第可為長歎息矣公之嫡孫襲固安伯祖元締感遺墟果蒙恩賜城侔越國淨王多後嗣之家地擬齊廛晏子據先臣之宅既而蒼精失御赤運登符大宏妙有廣標靈剎慧日昏而還曙法流塞而更通祖元復捨舊居而為淨域北堂安寢之處重扇元風東閤招賢之所再流清唄遂能上聞旒纊光動絲綸以公淨業攸開更以開業為稱首俄而燬室云謝波旬縱慝寰中法侶盡嬰塗地之災海內仁祠多溺滔天之浸惟此靈構巋然獨存因大聖之依憑威傾六賊賴諸天之守護壤隔三災苟非至德通神奇工入妙其孰能與於此也皇明首出大拯橫流縶醉象而定昆陽斬毒龍而清冀野反淳風於上葉集甘露於中枝都畿壯而帝服開國土淨而天冠敞蜂臺切漢方演化於時和鳳剎臨雲尚韜名於朝命祖元第二子維摩武德年中趙定二州別駕屬乾坤漸泰曦望初華攀龍之茂績既宣展驥之休聲克著永言堂構題目闕如屢有申聞情逾懇至重使澤流元地金輪轉北走之途渙發紫泥銀牓照東方之國粵以貞觀四年還賜舊額為開業寺也上座圓徹寺主圓鏡都維那道英大德僧道寬智圓一圓真道通慈倫道名等並董修戒範持護律儀騰逸氣於三空汎仙舟於八解鳩摩羅什望景傾魂鴈門慧遠聞風動色且夫難捨能捨遠人隆百代之基從明入明君子積萬年之祚誠哉斯道信而有徵公第五子子雄隋輔國將軍平東將軍左金紫光祿大夫通直散騎常侍驃騎大將軍儀同三司使持節豪州刺史鴻臚卿進爵高都公河北道行臺兵部尚書曾孫緯皇朝宗正衞尉司農三寺卿金紫光祿大夫荊州大都督府長史幽州都督戶部尚書太子詹事懷洛蒲三州刺史襲高都公緯弟俊皇朝揚州大都督府兵曹參軍汴州封邱易州易縣舒州太湖三縣令朝議郎行商州司馬上騎都尉箕裘遞襲憑蔗苑而彌昌黻冕相承託檀波而轉盛大仙幽讚鄉長則累葉無慚大覺顯仁公侯則連華必復詎比夫謝家遺宅徒擬甘棠韓國舊臺空傳酸棗而巳但此寺爰初締葺迄乎崇麗公又發宏誓願圖徽曠劫乃建豐碑將符鏤鼎嗟乎十烏傾日二鼠催年空留白几二之名未勒黃金之字俊第八子宣德郎行本州錄事參軍事雲騎尉崇悊即公之元孫也風神秀嶷器業甄明發揮經史抑揚詞翰申鴻漸於上藩屈鵬摶於中錄雖榮庥作牧褰襜之位未登而仕闕一字還鄉衣錦之遊斯在欽惟舊德祗若先功望鹿園而拜首登鷲山而禮足於是仰挹緇徒傍詢碧殿翦荒苔而相質允屬謀孫訪麗藻而披文無遺小子乃命從姪尚一製文焉尚一學謝探微詞慚析妙謝安庭序叨承白雪之篇韋孟宗祧敢述彤弓之詠庶使家風入偈抗佛土以飛英祖德惟真積僧祇而不朽重宣此義乃為銘曰美哉東墅奐乎西第榮觀一時湮沈千歲邪山易擁愛河難濟徒徇假名竟迷真諦其一達人藹藹情洞如如爰推別業式建精廬跨谷彌阜乘危躡虛傍通碣館直抵漳渠其二淩雲之闕一字匪日而就廣制彌新崇基即舊虯檐吐崿鳳甍銜岫月落上楹星迴中霤其三有周滅德怠棄真寶勝彼伽藍咸成鞠草洎於赤帝紹隆元道弊風一革慈雲再造其四漢東鹿走燕南狼籍毒被王城災延帝石四魔怙亂三乘泯迹獨此招提居然不易其五功符化造事叶神憑妙物凝粹真人效徵皇家鳳舉帝室龍興一戎厎定五濁攸澂其六法門既闢闕一字源載返道賁㧙山恩孚柰苑雞峯仞積鶴池波偃地絕風塵人多林遠其七七州論德四闕一字標榮猶嬰有待豈悟無生我祖騰懿天師配明還因梵筆永播家聲其八
