front:
  text: 全唐文欽定全唐文卷八百五十三昫字耀遠州歸義人初為定州王處直觀察推官後唐莊宗朝纍遷庫部郎中明宗即位歷戶部侍郎端明殿學士長興中拜中書侍郎兼刑部侍郎同中書門下平章事清泰初加吏部尚書門下侍郎罷知政事守右僕射晉天福初詔為東都留守遷太子太保兼左僕射封譙國公改太子太傅開運初授司空平章事契丹至以目疾罷守太保卒年六十
  hash: sha256:ec831cce2c6df90016e97492eb04121feb37c78ffc9ad31f98cca6a2299546f0
  markers:
  - {type: head, offset: 14, content: 劉昫, id: KR4h0168_NFKB_853-h1, level: 1}
body:
  text: 臣觀前代秉筆論文者多矣莫不憲章謨誥祖述詩騷遠宗毛鄭之訓論近鄙班揚之述作謂采采芣苡獨高比興之源湛湛江楓長亶詠歌之體殊不知世代有文質風俗有淳醨學識有淺深才性有工拙昔仲尼演三代之易刪諸國之詩非求勝於昔賢要取名於今代實以淳朴之時傷質民俗之語不經故飾以文言考之絃誦然後致之不泥遠代作程即知是古非今未為通論夫執鑒寫形持衡品物非伯樂不能分駑驥之狀非延陵不能別雅鄭之音若空混吹竿之人即異聞韶之歎近代唯沈隱侯斟酌二南剖陳三變攄雲淵之抑鬱振潘陸之風徽彼律呂和諧宮商輯洽不獨子建總建安之霸客兒亶江左之雄爰及我朝挺生賢俊文皇帝解戎衣而開學校飾賁帛而禮儒生門羅吐鳳之才人亶握蛇之價靡不發言為論下筆成文足以緯俗經邦豈止雕章縟句韶諧金奏詞炳丹青故貞觀之風同乎三代高宗天后友重詳延天子賦橫汾之詩臣下繼柏梁之奏巍巍濟濟輝爍古今如燕許之潤色正言吳陸之鋪揚鴻業元稹劉蕡之對策王維杜甫之雕蟲並非肄業使然自是天機秀絶若珠璣色澤無假淬磨孔翠羽毛自成華彩致之文苑實煥緗圖其間爵位崇高別為之傳今採孔紹安已下為文苑三篇覬懷才憔悴之徒千古見知於作者史官奏天成二年九月詔纂修太祖至莊宗實録及功臣列傳四年十一月修懿祖獻祖太祖紀年實録二十卷莊宗實録三十卷呈進其功臣列傳委元修史官張昭遠與史館修撰相次編纂列傳計三十卷今年閏月七日進呈未下所司臣以立功立事須標於竹帛記言記事靡漏於簡編貴資褒貶之文備述艱難之業伏惟陛下大明御宇至道臨人定寰區以武功守宗祧以文德輝耀三古超越百王莫不萬國來庭千官舉職臣叨居鈞軸己愧庸虛曾無筆削之勞謬處監修之任輒茲舉奏冒瀆宸嚴天下州郡於天成二年括定稅率逮今八年近有民於本道及詣闕訴田不均乞簡視臣伏見本院舊例學士入院除中書舍人即不試其餘官資皆須先試麻制答蕃書批答各一道詩賦各一首號曰五題所試並是當日內了便具進呈從前雖有召試之名而無考校之實每值召試新學士日或有援者皆豫出五題暗令宿搆至時但寫淨本便取職名若無援者即臨時特出五題旋令起草縱饒負藝罕能成功去留皆繫於梯媒得失盡由於偏黨此乃抑挫孤寒之道開張巧偽之門積弊相沿澆風未改將裨聖政須立新規況今伏值皇帝陛下德合乾坤明懸日月大興淳化盡革澆風矧惟翰墨之司專掌絲綸之命宜從正直務絶阿私自今後凡有本院召試新學士欲請權停詩賦只試麻制答蕃書并批答共三道仍請內賜題目兼定字數付本院召試然後考其臧否定其取捨貴從務實以示均平庶令孤進者得展勤勞朋比者不能欺罔事關穩便合貢芻蕘自明宗朝每見宰臣節度使為軍民政事有所敷陳或宸旨宣揚皆關道理唯近臣聞聽外面不知先朝時詔樞密直學士閻至於奏對時記録逐季下史館以備纂修自今年四月後詔李專美記録今以改官其記録望別差官臣等據太常博士段禺議云夫宗廟之制歷代為難須廣按禮經旁求故實通古今之理為規式合天道人情為楷模伏緣禮有隨時損益各異遂致議論多別禮出衆途今總歷代之宏規議新朝之定制謹按尚書舜典曰正月上日受終於文祖此是堯之廟也猶未載其數又按郊祀録云夏立五廟殷立六廟周立七廟漢初立祖宗廟郡國共計一百六十七所後漢光武中興後別立六廟魏明帝初立親廟四後重議上依周法立七廟晉武帝受禪初立六廟後卻立七廟宋武帝初立六廟齊朝亦立六廟隋文帝受命初立親廟四至大業元年煬帝欲遵周法議立七廟次便禪命於唐武德元年六月四日始立四廟於長安貞觀九年命有司詳議廟制遂立七廟後至開元十一年後創立九廟又按禮記喪服小記曰王者禘其祖之所自出以其祖配之而立四廟鄭元注云高祖以下至禰四世即親盡也更立始祖為不遷之廟共為五廟也又按禮記祭法及王制孔子家語春秋穀梁傳並云天子七廟諸侯五廟大夫三廟士二廟此是降殺以兩之義也又按尚書咸有一德曰七世之廟可以觀德又按疑義云天子立七廟或四廟蓋有其義也如四廟者從禰至高祖已上親盡故有四廟之禮又立七廟者緣自古聖王祖有功宗有德更立始祖即於四親廟之外或祖功宗德不拘定數所以有五廟六廟或七廟九廟欲後代子孫觀其功德故尚書云七世之廟可以觀德矣又按周捨論云自江左以來晉宋齊梁相承多立七廟矣今禺等參詳唯立七廟四廟即並通其理伏緣宗廟事大不敢執以一理定之故簡録七廟四廟二件之文俱得其宜他所論者並皆勿取請下三省集百官詳議敕旨宜依者臣等今月八日於尚書省集百官詳議伏以將敷至化以達萬方克致和平必先宗廟是以孝為教本所以宏愛敬而厚人倫禮乃民防蓋欲辨尊卑而明法制故禮記王制云天子七廟諸侯五廟大夫三廟疏云周制之七廟者太祖及文王下王之祧與親廟四太祖后稷也殷六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已自夏及周少不減五多不過七又云天子七廟皆據周也有其人則七無其人則五若諸侯廟制雖有其人則不過五此則天子諸侯七五之異名矣至於三代已後魏晉宋齊隋及唐初多立六廟或四廟蓋於建國之始不盈七廟之數也伏惟皇帝陛下大定寰區方興教理既先自家型國固當率土咸賓今欲請立自高祖已下四親廟其始祖一廟未敢輕議伏惟聖裁恐於講德論功有失靈源茂緒稟自中旨共謂得宜臣等幸列明庭獲逢景運顯奉如綸之命共詳立廟之儀雖竭討尋慙非該博有愧上塵聖鑒實慮未協宸衷不免迂疏仍虞漏略伏以嫂叔服小功五月開元禮會要皆同其令式正文內元無喪服制度只有一本內編在假寧令後不言奉敕編附年月除此一條又檢七八條令式與開元禮相違者所司已行多年固難輕改既當議事須按舊章今若鄙宣父之前經紊周公之往制隳太宗之故事廢開元之禮文而欲取差誤近規行編附新意稱制度且違大典言令式又非正文若便改更恐難經久臣等集議嫂叔服并諸服紀並請依開元禮為定如要給假卻請下太常依開元禮內五服制度録出一本編付令文仁錡晉天福中官司天少監臣聞自古創業之君開基之主設官分職革故鼎新必有強名用為公器以誘英彥皆不徒然伏見近年酬賞在京諸指揮使皆遙授刺史得非朝廷以貴其地望優其祿利乎臣以為大輅起椎輪之始濫觴成方舟之流但恐滋深不可改易非創業制命之所宜也今六軍諸衛品秩皆高不用酬勳是成虛設遂使掌禁軍者鄙升朝之貴貪外任者無戀闕之心稍涉官邪徒費國用其六軍諸衛官員伏望委宰臣約前唐故事依文班品第加以料錢自此後非有軍功不可輕授名器無假中外迭居豈惟正於等威抑亦省於經費燦晉天福中官洪洞縣主簿伏以刑獄至重朝廷所難尚書省分職六司天下謂之會府且諸道決獄若關人命即刑部不合不知欲請州府凡斷大辟罪人訖逐季具有無申報刑部仍具録案款事節並本判官馬步都虞候司法參軍法直官馬步司判官名銜申聞所貴或有案內情曲不圓刑部可行覆勘如此則天下遵守法律不敢輕易刑書非惟免有銜寃抑亦勸其立政者元圭晉開運元年官殿中侍御史是非既異沿革不同舉之則雖有舊規考之則全無故實且夫酌人心而致禮依神道而設教此乃經國之大端也況通事舍人居贊導之職押樓御史當糾察之司一則示於紀綱一則防於謬誤所以靜觀進退詳視等威實非抗禮於庭所謂各司其局俾令不拜雅合其宜伏以宰相押班率千官而設拜起居內殿統百辟以致詞儀刑文武之班表式鵷鸞之列不得比贊導之職詎可同糾察之司統冠㣥寮所宜列拜臣位居憲府迹厠同班言或庶其得中罪難逃於多上詹字楚良京兆長安人天祐中為河中從事後唐莊宗即位纍遷中書舍人天成中拜禮部侍郎歷御史中丞兵部侍郎尚書左丞工部尚書晉天福初轉禮部尚書分司洛陽開運初卒贈太子少保一同分土五等命官所以字彼黎民司其輿賦至於田租桑稅夏斂秋徵或旨限不愆或簡量增羡殊非異政乃是常程竊見諸州頻奏縣令多以稅輸辦集便作功勞諸道才有表章朝廷已行恩命且徵科是縣令之職分不過合望於甄酬若一年兩度轉遷則三載六升階級并加寵渥慮失規程伏乞止絶薦論但稽課最即銓司黜陟自有等差貴塞幸門以循舊制歌稱九德彰聖哲於一人國啓四門睦臣賓於萬宇伏惟陛下登臨宸極統御寰區普天之來享來王率土之為臣為子所以西戎獻款北狄輸誠五溪之蠻獠皆臻百越之梯航畢至華夷率服聲教遐流竊見外國朝天諸藩到闕多於便殿引對中外不知既聞來自殊鄉宜使觀於盛事此後每有四夷入貢伏乞御於正殿列彼㣥臣立天仗於廣廷臨宸軒而端拱庶使邊荒異俗向慕華風亦具禮樂威儀更顯聲明文物簡能晉開運二年官殿中丞伏以天地育萬物廣博厚之恩帝王牧黎元行寬大之令是知恤刑緩獄乃為政之先布德行惠實愛民之本今盛夏之月農事方殷是雷風長養之時乃動植蕃廡之際宜順時令以宏至仁竊以諸道州府都郡縣應見禁罪人或有久在囹圄稍滯區分胥吏舞文枝蔓及衆捶楚之下或陷無辜縲絏之中莫能自理苟一人拘繫則數人營財物用既殫功業亦罷若此之類實繁有徒竊恐官吏因循寖成斯弊伏乞降詔旨令所在刑獄委長吏親自録問量罪疾速斷遣務絶寃濫勿得淹留庶免虛禁平人妨奪農力冀召和氣以慶明時渙晉開運三年官太常丞當工全少樂工或正冬朝會郊廟行禮旋差京府衙門首樂官權充雖曾教習未免生疏兼又各業胡部音聲不聞太常樂曲伏乞宣下所司量支請給據見闕樂師添召令在寺習樂敕太常寺見管西京雅樂節級樂工共四十人外受添六十人內三十八人宜抽教坊貼部樂官兼先餘二十二人宜令本寺招召充填仍令三司定支春冬衣糧月報聞奏其舊管四十人亦量添請國珍字彥輔幽州固安人少舉進士纍遷尚書郎晉祖即位自吏部郎中拜左諫議大夫給事中少帝嗣立貶陜州行軍司馬卒請於內外臣僚之中擇選才略之士聚唐六典前後會要禮閣新儀大中統類律令格式等精詳纂集別為一部商議今古俾無漏略目之為大晉政統用作成規臣聞去華務實捨短從長片言不遺㣥材畢録切詢古道宛是良圖將隆講武之規宜舉訓戎之典故左氏春秋傳云禁暴戢兵保大定功安民和衆豐財此所以昭宣七德制服萬邦又云春搜夏苖秋獮冬狩皆於農隙以講武事此所謂聿修戰法俾耀軍威又云三時務農一時講武不教民戰是謂棄之所請每月旦教習事伏乞宣駙馬步軍都指揮使簡練馴閲甚為允當望賜施行敻晉開運時人臣聞國之大事在祀與戎祀則必盡其誠戎則不加無罪伏見以時祭嶽瀆皆是本道觀察使親齎御降祝文祀所行禮惟中嶽頃自故河南尹張全義年德俱高遂請少尹或上廳賓席攝祭近歲多差文參府掾習以為常不惟有瀆於神祇兼慮漸隳於祀典臣欲請河南尹卻於華州亠兊州定州孟州觀察使例請行獻禮仍令本縣令讀祝文者昂青州臨淄人少為臨淄令忤監軍楊彥朗罷去晉祖時詔求孝悌之士擢宗正丞遷少卿少帝即位晉政日壞上疏極諫不聽稱疾歸以壽終臣伏見銅臺逆豎漳水叛城始見利而忽起禍心終負釁而難歸至化遂使雄師大舉元惡未除雖寵極妖興宜奮雷霆之怒而勢窮力屈可哀螻蟻之生況師老費財民勞失本赦過宥罪素垂範於典經含垢匿瑕事頗關於仁恕伏望陛下施雲天之澤收霜雪之威捨獨夫百死之愆救一鎮萬家之命俾范延光令移本任別與小藩於滄邢兩州自選一鎮庶令省過俾遂自新率彼百萬之資金犒我千營之將士庶明陛下不將威脅但以德柔施好生惡殺之仁彰捨短從長之道暫行虛刃必致太和所有隨從官員一任將行赴任或是本城兵士屬府職寮亦仰依舊主持更無移改普覃恩惠不問罪愆臣自請獨駕單車徑入逆壘布穹昊不言之信闡陽春不報之恩佇見偃武修文再覩唐堯之化放牛歸馬必興姬發之風
