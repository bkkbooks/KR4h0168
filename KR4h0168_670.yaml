  text: 全唐文欽定全唐文卷六百七十白居易十五
  hash: sha256:b9bd61c3239d71b9676e9307866dbd317015d8406a1f027b6f0704ac1ad9f94b
body:
  text: 元和初予罷校書郎與元微之將應制舉退居於上都華陽觀閉戶累月揣摩當代之事搆成策目七十五門及微之首登科予次焉凡所應對者百不用其一二其餘自以精力所致不能棄捐次而集之分為四卷命曰策林云耳臣伏見漢成帝以朱雲廷辱張禹令持下殿雲攀檻檻折成帝容之後嘗理檻帝命勿易以旌直臣臣每覽漢史至此未嘗不三復而歎息也豈不以臣不愛死雖憐其死而必諫乎君能納諫雖折其檻而必容乎不然何雲之竭忠也如此而帝之見容也又如此伏惟陛下以至誠化萬國以至明臨兆人故數年之間仍降詔旨四海之內累徵賢良思酌下言樂聞上失諭以旁求之意詢以無隱之辭是則陛下納諫之旨遠出於漢朝微臣獻言之罪不虞於折檻矣况清問之下條對之中苟言有可觀策有可取陛下必光揚其名氏優崇其爵秩與夫勿易折檻以旌直臣之意又相萬也賤臣得不有犯無隱以副陛下納諫之旨乎殫思極慮以盡微臣獻言之道乎唯以直詞昧死上對臣生也幸沐聖朝垂覆育之惠當陛下無忌諱之日斯則朝聞夕死足矣而况於充賦王庭者乎伏念庸虛謬膺詔選誠不足以明辯體用對揚德音欲率爾而言適足重小臣狂簡之過若默默而退又何以副陛下虛求之心是以窺玉旒讀金策慙惶僶俛不知所裁者久矣然以愚慮之中千或一得而往古之成敗耳或妄有所聞當今之得失目或妄有所見進不敢希旨退不敢隱情唯以直言昧死上對臣聞人無常心習以成性國無常俗教則移風故億兆之所趨在一人之所執是以恭默清淨之政立則復朴保和貴德賤財之令行則上讓下兢恕己及物之誠著則蒼生可致於至理養老敬長之教洽則皇化可升於太寧由是言之蓋人之在教若泥金之在陶冶器之良窳由乎匠之巧拙化之善否繫乎君之作為伏惟陛下慎而思之勤而行之則太平之風大同之俗可從容而馴致矣臣聞教無常興亦無常廢人無常理亦無常亂蓋興廢理亂在君上所教而已故君之作為為教興廢之本君之舉措為人理亂之源若一出善言則天下之人獲其福一違善道則天下之人罹其殃若一肆其心而事有以階於亂一念於德而邦有以漸於興交應之間實猶影響今陛下以懋建皇極為先則大化不得不流矣以欽若前訓為本則大樸不得不復矣以緝熙庶績為念則五刑不得不措矣以祗奉宗廟為心則五教不得不敷矣而尚有未流未措未復未敷之問此乃陛下勞謙之德太過故不自見其益也求理之心太速故不自見其功也臣何以知之然臣聞有始有卒者其惟聖人乎此言王者行道非始之難終之實難也陛下又能終之則太平之風大同之俗如指掌耳豈止化流樸復刑措教敷而已哉臣鄙人也生仁壽之代沐文明之化始以進士舉及第又以拔萃選授官臣之名既獲二成君之祿已受一命雖天地不求仁於芻狗而畎澮思委潤於滄溟惓惓之誠蓄之久矣幸遇陛下發旁求之詔垂下濟之恩詳延謨猷親覽條對逢不諱之日雖許極言當無過之朝不知所述無裨清問有負皇明仰冒宸嚴伏待罪戾謹對臣幸逢昭代得列明庭慚無嘉言以充清問輒罄狂瞽惟陛下擇之謹對臣生聖代三十有五年蒙陛下子育之恩覩陛下昇平之化謬膺詔選充賦天庭安足親承德音條對清問逢旁求之日雖許直言當已理之朝將何極諫塵黷聖鑒俯伏待罪謹對臣聞王者之有天下也自謂之理非理也自謂之亂非亂也自謂之安非安也自謂之危非危也何者蓋自謂理且安者則自驕自滿雖安必危自謂亂且危者則自戒自強雖亂必理理之又理安之又安則盛德大業斯不遠矣伏惟陛下嗣建皇極司牧蒼生夙興以憂人夕惕而修已以今日之理陛下視朝廷未以為理以今日之安陛下視海內未以為安而又思酌下言樂聞上失弊無不革利無不興今則嚴禋郊廟猶謂敬之不至愛養黎庶猶謂惠之不宏省罷進獻猶憂人之困窮蠲免逋租猶慮農之勤匱搜揚俊乂猶謂賢之遺逸滌蕩罪戾猶念獄之非辜底定兵戈猶懼其未戢懷柔夷狄猶恐其未賓大化參乎陰陽猶慚之以寡德重光並乎日月猶讓之以不明斯乃陛下勞謙之心合天運之不息也勤䘏之德合地道之無疆也如臣者何所知焉何所述焉伏以聖聰貴聞庶議苟有愚見敢不極陳夫欲使人望塞眾心歸者無他焉在陛下慎初之所致耳臣聞天子動則左史書之言則右史書之言動不書非盛德也書而不法後嗣何觀焉若王者言中倫動中度則千里之外應之百代之後歌之况其邇者乎若言非宜動非禮則千里之外違之百代之後笑之况其邇者乎是以古之天子口不敢戲言身不敢妄動動必三省言必再思况陛下初嗣祖宗新臨兆庶臣伏見天下之目專專然以觀陛下之動也天下之耳禺禺然以聽陛下之言也則陛下出一言不終日而達於朝野動一事不浹辰而聞於華夷蓋是非之聲無翼而飛矣損益之名無脛而走矣陛下得不慎之哉伏惟觀於斯察於斯使一言一動無所苟而已矣言動不苟則天下之望塞焉天下之心歸焉問先王之教布在方策事雖易舉政則難成豈文之空垂將行之未至思臻其極佇質所疑夫欲使政必成化必至者無多焉在陛下敬始慎終之所致耳臣聞先王之訓不徒言也先王之教不虛行也淺行之則小理深行之則大和淺深小大之應其猶影響矣然則天下至廣王化至大增減損益難見其形是以政之損者雖不見其日損必有時而亂也教之益者雖不見其日益必有時而理也陛下但推其誠勤其政慎其始敬其終日用而不知自臻其極此先王終日所務者也終日所行者也不可月會其教化之淺深歲計其風俗之厚薄焉臣又聞易曰聖人久於其道而天下化成詩曰靡不有初鮮克有終此言王者之教待久而成也王者之化待終而至也陛下誠能久而終之則何慮政不成而化不至乎問方今勤䘏憂勞夙夜不怠而政教猶缺懲勸未行何則上古之君無為而理令不嚴而肅教不勞而成何施何為得至於此臣請以三五之道言之臣聞三皇之為君也無常心以天下心為心五帝之為君也無常欲以百姓欲為欲順其心以出令則不嚴而理因其欲以設教則不勞而成故風號無文而人從刑賞不施而人服三五所以無為而天下化者由此道也後代反是故不及者遠焉臣請以三代以後之事言之臣聞後代之天下三五之天下也後代之人三五之人也後代之位三五之位也居其位得其人有其天下而不及三五者何哉臣竊驚怪之然亦粗知其由矣豈不以己心為心抑天下以奉一人之心也以己欲為欲咈百姓以從一人之欲也苟或心與道未合政與時並行得失交爭利害相半如此則雖宵衣旰食勞體勵精纔可以致小康不足以宏大道故出令而吏或犯設教而人敢違刑雖明而寡懲賞雖厚而鮮勸此由捨人而從欲是以勤多而功少也伏惟陛下去彼取此執古御今以三五之心為心則政教何憂乎不洽以億兆之欲為欲則懲勸何畏乎不行政教洽則不殷憂而四海寧懲勸行則不勤勞而萬人化此由捨己而從眾是以事半而功倍也臣又聞太宗文皇帝嘗曰朕雖不及古然以百姓心為心臣以為致貞觀之理者由斯一言始矣伏願陛下從而鑒之嗣而行之則天下幸甚天下幸甚問甿俗之理亂風化之盛衰何乃得於往而失於來薄於今而厚於古或曰興替之道執在君臣又云澆朴之風繫於時代二說相反其誰可從臣聞代之澆漓人之朴畧由上而不由下在教而不在時蓋政之臧否定於中則俗之厚薄應於外也何以驗覈伏請以周秦以降之事言之臣聞周德寖衰君臣陵替蠶食瓜割分為戰國秦氏得之以暴易亂曾未旋踵同歸覆亡炎漢勃興奄有四海僅能除害未暇化人迨於文帝景帝始思理道躬行慈儉人用富安禮讓自興刑罰不試昇平之美隣於成康載在漢書陛下熟聞之矣降及魏晉迄於梁隋喪亂宏多殆不足數我高祖始建區夏未遑緝熙迨於太宗元宗抱聖神文武之姿用房杜姚宋之佐謀猷啟沃無怠於心德澤施行不遺於物所以刑措而百姓欣戴兵偃而萬方悅隨近無不安遠無不服雖成康文景無以尚之載在國史陛下熟知之矣然則周秦之亂極矣及文景繼出而昌運隨焉梁隋之弊甚矣及二宗嗣興而王道融焉若謂天地生成之德漸衰家國君臣之道漸喪則當日甚一日代甚一代不應衰而復盛澆而復和必不爾者何乃清平朴素之風薄於周秦之交而厚於文景之代耶順成和動之俗喪於梁隋之際而獨興於貞觀開元之年耶由斯言之不在時矣故魏徵有云若言人漸澆訛不反質樸至今應為鬼魅寧可復得而教化耶斯言至矣故太宗嘉之又按禮記曰教者人之寒暑也事者人之風雨也此言萬民之從王化如百穀之委歲功也若寒暑以時則禾黍登而菽麥熟若風雨不節則稂莠植而秕稗生故教化優深則謙讓興而仁義作刑政偷薄則訛偽起而姦宄臻雖百穀在地成之者天也雖萬物在下化之者上也必欲以涼德弊政嚴令繁刑而求仁義行姦宄息亦猶飄風暴雨愆陽伏陰而望禾黍豐稂莠死其不可也亦甚明矣故曰堯舜率天下以仁比屋可封桀紂率天下以暴比屋可戮斯則由上在教之明驗也伏惟聖心無疑焉問今欲感人心於和平致王化於朴厚何思何念得至於斯臣聞政不念今則人心不能交感道不思古則王化不能流行將欲感人心於和平則在乎念今而已伏惟陛下知人安之至難也則念去煩擾之吏愛人命之至重也則念黜苛酷之官䘏人力之易罷也則念省修葺之勞憂人財之易匱也則念減服御之費懼人之有餒也則念薄麥禾之稅畏人之有寒也則念輕布帛之征慮人之有愁苦也則念損嬪嬙之數故念之又念之則人心交感矣感之又感之則天下和平矣將欲致王化於雍熙則在乎思古而已伏惟陛下仰羲軒之道也則思興利而除害侔唐虞之聖也則思明目而達聰師夏禹之德也則思泣辜而䘏人法殷湯之仁也則思祝網而愛物鑒漢之盛也則思罷露臺而海內流化觀周之興也則思葬枯骨而天下歸心宏貞觀之理也則思開房杜之讜議以致昇平嗣開元之政也則思得姚宋之嘉謀而臻富壽故思之又思之則王澤流行矣行之又行之則天下雍熙矣夫欲使王澤旁流人心大感則在陛下恕己及物而已夫恕己及物者無他以心度心以身觀身推其所為以及天下者也故己欲安則念人之重擾也已欲壽則念人之嘉生也己欲逸則念人之憚勞也己欲富則念人之惡貧也己欲溫飽則念人之凍餒也己欲聲色則念人之怨曠也陛下念其重擾則煩暴之吏退矣念其嘉生則苛虐之官黜矣念其憚勞則土木之役輕矣念其惡貧則服御之費損矣念其凍餒則布帛麥禾之稅輕矣念其怨曠則妓樂嬪嬙之數省矣推而廣之念一知十蓋聖人之道也始則恕已以及人終則念人而及己故恕之又恕之則王澤不得不流矣念之又念之則人心不得不感矣澤流心感而天下不太平者未之聞也夫欲使人情儉朴時俗清和莫先於體黃老之道也其道在乎尚寬簡務儉素不眩聰察不役智能而已蓋善用之者雖一邑一郡一國至於天下皆可以致清淨之理焉昔宓賤得之故不下堂而單父之人化汲黯得之故不出閤而東海之政成曹參得之故獄巿勿擾而齊國大和漢文得之故刑罰不用而天下大理其故無他清淨之所致耳故老子曰我無為而人自化我好靜而人自正我無事而人自富我無欲而人自樸此四者皆黃老之要道也陛下誠能體而行之則人儉朴而俗清和矣夫欲使政化速成則在乎去煩擾師簡易而已臣請以齊魯之事明之臣聞伯禽之事魯也變其禮革其俗三年而政成太公之理齊也簡其禮從其俗五月而政成故周公嘆曰夫平易近人人必歸之魯後代其北面事齊矣此則煩簡遲速之效明矣伏惟陛下鑒之問號令者所以齊其俗一其心故聖人專之慎之然則號令既出而俗猶未齊者其故安在號令既行而心猶未一者其失安歸欲使下令如風行出言如響應導之而人知勸防之而人不踰將致於斯豈無其要臣聞王者發號施令所以齊其俗一其心俗齊則和心一則固人於是乎可任使也傳曰人心不同如其面焉故一人一心萬人萬心若不以令一之則人人之心各異矣於是積異以生疑積疑以生惑除亂莫先乎令者也故聖王重之然則令者出於一人加於百辟被於萬姓漸於四夷如風行如雨施有往而無返也其在周易渙汗之義言號令如渙汗然一出而不可復也故聖王慎之然則令既出而俗猶未齊者由令不一也非獨朝出夕改晨行暮止也蓋謹於始慢於終則不一也張於近弛於遠則不一也急於賤寬於貴則不一也行於疎廢於親則不一也且人之心猶不可以不一而理况君之令其可二三而行者乎然則令既一而天下之心猶未悅隨者由上之不能行於己推於誠者也凡下從上也不從口之言從上之所好也不從力之制從上之所為也蓋行諸己也誠則化諸人也深若不推之於誠雖三令五申而令不明也苟不行之於己雖家喻戶曉而人不信矣聖王知其如此故以禮自修以法自理慎其所好重其所為有諸己者而後求諸人責於下者必先禁於上是以推之而往引之而來導之使行禁之使止使天下之心禺禺然惟望其令聽其言而已故言出則千里之外應如響令下則四海之內行如風故曰禁勝於身則令行於人者矣又曰下令如流水發源蓋是謂也如此則何慮乎海內之令不如身之使臂臂之使指者哉問萬姓親怨之由百王興亡之漸將獨繫於人乎抑亦繫於君乎臣觀前代邦之興由得人也邦之亡由失人也得其人失其人非一朝一夕之故也其所由來者漸矣天地不能頓為寒暑必漸於春秋人君不能頓為興亡必漸於善惡善不積不能勃焉而興惡不積不能忽焉而亡善與惡始繫於君也興與亡終繫於人也何則君苟有善人必知之知之又知之其心歸之歸之又歸之則載舟之水由是積焉君苟有惡人亦知之知之又知之其心去之去之又去之則覆舟之水由是作焉故曰至高而危者君也至愚而不可欺者人也聖王知其然故則天上不息之道以修己法地下不動之德以安人修己者慎於中也慄然如履春冰安人者敬其下也凜乎若馭朽索猶懼其未也加以樂人之樂人亦樂其樂憂人之憂人亦憂其憂憂樂同於人敬慎著於已如是而不興者反是而不亡者自生人以來未之有也臣愚以為百王興亡之漸在於此也問忠敬質文百代循環之教也五帝何為而不用三王何故而相承將時有同異耶道有優劣耶又三代之際損益不同所祖三才其義安在豈除舊布新務於相反相異乎復扶衰救弊其道不得不然乎又國家祖述五帝憲章三代質文忠敬大備於今而尚人鮮朴忠俗多利巧欲救斯弊其道如何臣聞步驟殊時質文異制五帝以道化三王以禮教道者無為無為故無失無失故無革是以唐虞相承無所改易也禮者有作有作則有弊有弊則有救故殷周相代有所損益也損益之教本乎三才夏之教尚忠忠本於人人道以善教人忠之至也故曰忠者人之教也忠之弊其民野救野莫若敬故殷之教尚敬敬本於地地道謙卑天之所生地敬養之故曰敬者地之教也敬之弊其人詭救詭莫若文故周之教尚文文本於天天道垂文而人則之故曰文者天之教也文之弊其人僿救僿莫若忠然則三王之所祖不同者非欲自異而相反也蓋扶衰救弊各隨其運也運苟有異教亦不同雖忠與敬各繫於時而質與文俱致於理標其教則殊制臻其極則同歸亦猶水火之相形同根於冥化共濟於人用也寒暑之相代同本於元氣共成於歲功也三王之道亦如是焉我國家欽若五帝憲章三代典謨不易之道祖述而大用忠敬迭救之教具舉而兼行可謂文質協和禮樂明備之代也然臣聞孔子曰殷因於夏禮周因於殷禮損益始終若循環然其繼周者百代可知也臣觀周之弊也爵賞黷刑罰窮而秦反用刑名祚因中絕及漢雜以霸道德又下衰迨於魏晉以還未有繼而救者是以周之文弊今有遺風故人鮮朴忠俗猶利巧伏願陛下以繼周為己任以行夏為時宜稍益質而損文漸尚忠而救僿斟酌於教經緯其人使瞻前而道繼三王顧後而光垂萬葉則盡善之道大同之風不專於上古矣問國家將興必有禎祥國家將亡必有妖孽斯豈國之興滅繫於天地之災祥歟將物之妖瑞生於時政之昏明歟又天地有常道災祥有常應此必然之理也何以桑穀之妖反為福於太戊大鳥之慶竟成禍於帝辛豈吉凶或僭在人將休咎不常其道儆戒之徵安在改悔之效何明又祥必偶聖妖必應昏何以明時不能為無災亂代或聞其有瑞報施之道何繆濫哉臣聞國家將興必有禎祥國家將亡必有妖孽者非孽生而後邦喪非祥出而後國興蓋瑞不虛呈必應聖哲妖不自作必候淫昏則昏聖為祥孽之根妖瑞為興亡之兆矣文子曰陰陽陶冶萬物皆乘天氣而生然則道之休明德動乾坤而感者謂之瑞政之昏亂腥聞上下而應者謂之妖瑞為福先妖為禍始將興將廢實先啟焉然有人君德未及乎休明政不至於昏亂而天文有異地物不常則為瑞為妖未可知也或者天示儆戒之意以寤君心俾乎君修改悔之誠以答天鑒如此則轉亂為治變災為祥自古有之可得而考也臣聞高宗不聰飛雉雊於鼎宋景有罰熒惑守於心及乎懋懿德以修身出善言而罪己則升耳之異自殄退舍之慶自臻天人相感可謂明矣速矣且高宗三代之賢主也有一德之違亦謫見於物宋景列國之常主也有一言之感亦冥應乎天則知上之鑒下雖賢主也苟有過而必知下之感上雖常主也苟有誠而必應故王者不懼妖之不滅而懼過之不悛不懼瑞之不臻而懼誠之不至足明休徵在德吉凶由人矣失君道者祥反成妖悟天鑒者災亦為瑞必然而已矣抑臣又聞王者之大瑞在乎天地泰陰陽和風雨時寒暑節百穀熟萬人安賦役輕服用儉兵革偃刑罰措賢者出不肖者退聲教日被謳歌日興此之謂休徵此之謂嘉瑞也王者之大妖在乎兩儀不泰四氣不和風雷不時水旱不節五穀不稔百螣不藏徭役煩征賦重干戈動刑獄作君子隱小人見政令日缺怨讟日興此之謂咎徵此之謂妖孽也至若一星一辰之瑞一雲一露之祥一鳥一獸之妖一草一木之怪或偶生於氣象或偶得於陶鈞信非休咎之徵興亡之兆也何則隱見出處亦不於常明聖之朝不能無小災小沴衰亂之代亦或有小瑞小祥固未足質帝王之疑明天地之意耳王者但外思其政內省其身自謂德之不修誠之不著雖有區區之瑞不足嘉也自謂政之能立道之能行雖有瑣瑣之妖不足懼也臣竊謂妖祥廢興之由實在於此故雖辭費不敢不備而言之問昔周著九疇之書漢述五行之志皆所以精究天人之際窮探政化之源然則五福之祥何從而作六極之沴何故而生將欲辨行可明本末又今人財耗費既貧且憂時沴流行或疾而夭思欲銷六極致五福敺一代於富壽納萬人於康寧何所施為可致於此臣聞聖人興五福銷六極者在乎立大中致大和也至哉中和之為德不動而感不勞而化以之守則仁以之用則神卷之可以理一身舒之可以濟萬物然則和者生於中也中者生於不偏也不邪也不過也不及也若人君內非中勿思外非中勿動動靜進退皆得其中故君得其中則人得其所人得其所則和樂生焉是以君人之心和則天地之氣和天地之氣和則萬物之生和於是乎三和之氣訢合絪縕積為壽蓄為富舒為康寧敷為攸好德益為考終命其羨者則融為甘露凝為慶雲垂為德星散為景風流為醴泉六氣叶乎時七曜順乎軌迨於巢穴羽毛之物皆煦嫗而自蕃草木鱗介之祥皆叢萃而繼出夫然者中和之氣所致也若人君內非中是思外非中是動動靜進退不得其中故君不得其中則人不得其所人不得其所則怨嘆興焉是以君人之心不和則天地之氣不和天地之氣不和則萬物之生不和於是乎三不和之氣交錯堙鬱伐為凶短折攻為疾聚為憂損為貧結為惡耗為弱其羨者潛為伏陰淫為愆陽守為彗星發為暴風降為苦雨四序失其節三辰亂其行迨乎襁褓卵胎之生皆夭閼而不遂木石華蟲之怪皆糅雜而畢呈夫然者不中不和之氣所致也則天人交感之際五福六極之來豈不昭昭然哉臣伏見比者兵賦未減人鮮無憂時沴所加眾或有疾德宗皇帝病人之病憂人之憂於是救之以廣利之方悅之以中和之樂將使易憂為樂變病為和惠化之恩莫斯甚也然臣竊聞善除害者察其本善理疾者絕其源伏惟陛下欲紓人之憂先念憂之所自欲救人之病先思病之所由知所自以絕之則人憂自弭也知所由以去之則人病自瘳也然後申之以救療之術則人易康寧鼓之以安樂之音則人易和悅斯必應疾而化速利倍而功兼六極待此而銷五福待此而作如是可以陶三才繆濫之氣發為休祥敺一代鄙夭之人臻乎仁壽中和之化夫何遠哉問狂常雨若僭常暘若此言政教失道必感於天也又堯之水九年湯之旱七年此言陰陽定數不由於人也若必繫於政則盈虛之數徒言如不由於人則精誠之禱安用二義相戾其誰可從又問陰陽不測水旱無常將欲均歲功於豐凶救人命於凍餒凶歉之歲何方可以足其食災危之日何計可以固其心將備不虞必有其要歷代之術可明徵焉臣聞水旱之災有小有大大者由運小者由人由人者由君上之失道其災可得而移也由運者由陰陽之定數其災不可得而遷也然則小大本末臣粗知之其小者或兵戈不戢軍旅有強暴者或誅罰不中刑獄有寃濫者或小人入用讒佞有得志者或君子失位忠良有放棄者或男女臣妾有怨曠者或鰥寡孤獨有困死者或賦斂之法無度焉或土木之功不時焉於是乎憂傷之氣憤怨之心積以傷和變而為沴古之君人者逢一災遇一異則回視反聽察其所由且思乎軍鎮之中無乃有縱暴者耶刑獄之中無乃有寃濫者耶權寵之中無乃有不肖者耶放棄之中無乃有忠賢者耶內外臣妾無乃有幽怨者耶天下窮人無乃有困死者耶賦入之法無乃有過厚者耶土木之功無乃有屢興者耶若有一於此則是政令之失而天地之譴也又洪範曰狂常雨若僭常暘若言不信不乂亦水旱應之然則人君苟能改過塞違率德修政勵敬天之志虔罪己之心則雖踰月之霖經時之旱至誠所感不能為災何則古人或牧一州或宰一縣有暴身致雨者有救火反風者有飛蝗去境者郡邑之長猶能感通况王者為萬乘之尊居兆人之上悔過可以動天地遷善可以感神明天地神明尚且不違而况於水旱風雨蟲蝗者乎此臣所謂由人可移之災也其大者則唐堯九載之水殷湯七年之旱是也夫以堯之大聖湯之至仁於時德儉人和刑清兵偃上無狂僭之政下無怨嗟之聲而卒有浩浩滔天之災炎炎爛石之沴非君上之失道蓋陰陽之定數爾此臣所謂由運不可遷之災也然則聖人不能遷災能禦災也不能違時能輔時也將在乎廩積有常仁惠有素備之以儲蓄雖凶荒而人無菜色固之以恩信雖患難而人無離心儲蓄者聚於豐年散於歉歲恩信者行於安日用於危時夫如是則雖陰陽之數不可遷而水旱之災不能害故曰人強勝天蓋是謂也斯亦圖之在早備之在先所謂思危於安防勞於逸若患至而方備災成而後圖則雖聖人不能救矣抑臣又聞古者聖王在上而下不凍餒者何哉非家至日見衣之而食之蓋能均節其衣食之源也夫天之道無常故歲有豐必有凶地之利有限故物有盈必有縮聖王知其必然於是作泉刀布帛之貨以時交易之以時斂散之所以持豐濟凶用盈補縮則衣食之費穀帛之生調而均之不啻足矣蓋管氏之輕重李悝之平糴耿壽昌之常平者可謂不涸之食不竭之府也故豐稔之歲則貴糴以利農人凶歉之年則賤糶以活餓殍若水旱作沴則資為九年之蓄若兵甲或動則餽為三軍之糧上以均天時之豐凶下以權地利之盈縮則雖九年之水七年之旱不能害其人危其國矣至若禳禱之術凶荒之政歷代之法臣粗聞之則有雩天地以牲牢禜山川以圭璧祈土龍於元武舞㣥巫於靈壇徙巿修城貶食徹樂緩刑省禮務嗇勸分殺哀多婚弛力舍禁此皆從人之望隨時之宜勤卹下之心表恭天之罰但可以濟小災小弊未足以救大危大荒必欲保邦邑於危安人心於困則在乎儲蓄充其腹恩信結其心而已蓋羲農唐虞禹湯文武皆由此道而王也問一夫不田天下有受其餒者一婦不蠶天下有受其寒者斯則人之性命繫焉國之貧富屬焉方今人多遊心地有遺力守本業者浮而不固逐末作者蕩而忘歸夫然豈懲戒游惰之法失其道耶將敦勸農桑之教不得其本耶臣伏見今之人捨本業趨末作者非惡本而愛末蓋去無利而就有利也夫人之趨利者甚矣苟利之所在雖水火蹈焉雖白刃冒焉故農桑苟有利也雖日禁之人亦歸矣而况於勸之乎游惰苟無利也雖日勸之亦不為矣而况於禁之乎當今游惰者逸而利農桑者勞而傷所以傷者由天下錢刀重而穀帛輕也所以輕者由賦斂失其本也夫賦斂之本者量桑地以出租計夫家以出庸租庸者穀帛而已今則穀帛之外又責之以錢錢者桑地不生銅私家不敢鑄業於農者何從得之至乃吏胥追徵官限迫蹙則易其所有以赴公程當豐歲則錢糴半價不足以充緡錢遇凶年則息利倍稱不足以償逋債豐凶既若此為農者何所望焉是以商賈大族乘時射利者日以富豪田壟疲人終歲勤力者日以貧困勞逸既懸利病相誘則農夫之心盡思釋耒而倚巿織婦之手皆欲投杼而刺文至使田卒汚萊室如懸磬人力罕施而地利多鬱天時虛運而歲功不成臣常反覆思之實由穀帛輕而錢刀重也夫糴甚貴錢甚輕則傷人糴甚賤錢甚重則傷農農傷則生業不專人傷則財用不足故王者平均其貴賤調節其重輕使百貨通流四人交利然後上無乏用而下亦阜安方今天下之錢日以減耗或積於國府或滯於私家若復日月徵求歲時輸納臣恐穀帛之價轉賤農桑之業轉傷十年以後其弊或甚於今日矣非所謂平均調節之道也今若量夫家之桑地計穀帛為租庸以石斗登降為差以匹夫多少為等但書估價並免稅錢則任土之利載興易貨之弊自革弊革則務本者致力利興則趨末者回心游手於道途巿肆者可易業於西成托迹於軍籍釋流者可返躬於東作欲其浮惰其可得乎加以陛下念稼穡之艱難則薄斂而人足食矣念紡績之勤苦則省用而人豐財矣念異貨之敗度則寡欲而人著誠矣念奇器之蕩心則正德而人歸厚矣其興利除害也如彼又修己化人也如此是必應之如響答順之如風行斯可謂下令如流水之源繫人於苞桑之本者矣欲其浮惰其可得乎問今田疇不加闢而菽粟之估日輕桑麻不加植而布帛之價日賤是以射時利者賤收而日富勤力穡者輕用而日貧夫然豈殖貨斂散之節失其宜耶將泉布輕重之權不得其要也臣聞穀帛者生於農也器用者化於工也財物者通於商也錢刀者操於君也君操其一以節其三三者和鈞非錢不可也夫錢刀重則穀帛輕穀帛輕則農桑困故散錢以斂之則下無棄穀遺帛矣穀帛貴則財物賤財物賤則工商勞故散穀以收之則下無廢財棄物矣斂散得其節輕重便於時則百貨之價自平四人之利咸遂雖有聖智未有易此而能理者也方今關輔之間仍歲大稔此誠國家散錢斂穀防險備凶之時也時不可失伏惟陛下惜之臣又見今人之弊者由銅利貴於錢刀也何者夫官家採銅鑄錢成一錢破數錢之費也私家銷錢為器破一錢成數錢之利也鑄者有程銷者無限雖官家之歲鑄豈能勝私家之日銷乎此所以天下之錢日減而日重矣今國家行挾銅之律執鑄器之禁使器無用銅銅無利也則錢不復銷矣此實當今權節重輕之要也問近古以來君天下者皆患人之困而不知困之由皆欲人之安而不得安之術今欲轉勞為逸用富易貧究困之由矯其失於既往求安之術致其利於將來審而行之以康天下臣聞近古以來君天下者皆患人之困而不知困之由皆欲人之安而不得安之術臣雖狂瞽然粗知之臣竊觀前代人庶之貧困者由官吏之縱欲也官吏之縱欲者由君上之不能節儉也何則天下之人億兆也君者一而已矣以億兆之人奉其一君則君之居處雖極土木之功殫金玉之飾君之衣食雖極海陸之味盡文采之華君之耳目雖慆鄭衞之音厭燕趙之色君之心體雖倦畋漁之樂疲轍迹之游猶未全擾於人傷於物何者以至多奉至少故也然則一縱一放而弊及於人者又何哉蓋以君之命行於左右左右頒於方鎮方鎮布於州牧州牧達於縣宰縣宰下於鄉吏鄉吏轉於村胥然後至於人焉自君至臣等級若是所求既眾所費滋多則君取其一而臣已取其百矣所謂上開一源下生百端者也豈直若此而已哉蓋君好則臣為上行則下效故上苟好奢則天下貪冒之吏將肆心焉上苟好利則天下聚斂之臣將寘力焉雷動風行日引月長上益其侈下成其私其費盡出於人人實何堪其弊此又為害十倍於前也夫如是則君之躁靜為人勞逸之本君之奢儉為人富貧之源故一節其情而下有以獲其福一肆其欲而下有以罹其殃一出善言則天下之心同其喜一違善道則天下之心共其憂蓋百姓之殃不在乎鬼神百姓之福不在乎天地在乎君之躁靜奢儉而已是以聖王之修身化下也宮室有制服食有度聲色有節畋遊有時不徇己情不窮己欲不殫人力不耗人財夫然故誠發乎心德形乎身政加乎人化達乎天下以此禁吏則貪欲之吏不得不廉矣以此牧人則貧困之人不得不安矣困之由安之術以臣所見其在茲乎問鹽鐵之謀榷酤之法山海之利關巿之征皆可以助佐征徭又慮其侵削黎庶捨之則乏用於軍國取之則奪利於生人取捨之間孰為可者臣聞君之所以為國者人也人之所以為命者衣食也衣食之所從出者農桑也若不本於農桑而興利者雖聖人不能也苟有能者非利也其害也何者既不自地出又非從天來必是巧取於人曲成其利利則日引而月長人則日削而月朘至使人心窮王澤竭故臣但見其害不見其利也所以王者不殖貨利不言有無耗羨之財不入於府庫析毫之計不行於朝廷者慮其利穴開而罪梯搆然則聖人非不好利也利在於利萬人非不好富也富在於富天下節欲於中人斯利矣省用於外人斯富矣故唐堯夏禹漢文之代雖薄農桑之稅除關巿之征棄山海之饒散鹽鐵之利亦國足而人富安矣何則欲節而用省也秦皇漢武隋煬之時雖入太半之賦徵逆折之租建榷酤之法出舟車之算亦國乏而人貧弊矣何則欲不節而用不省也蓋所謂山林不能給野火江海不能實漏巵夫利散於下則人逸而富利壅於上則人勞而貧故下勞則上無以自安人富則君孰與不足禮記曰人以君為心君以人為體詩曰愷悌君子人之父母由此而言未有體勞而心逸者也未有子富而父貧者也臣又聞地之生財多少有限人之食利眾寡有常若盈於上則耗於下利於彼則害於此而王者四海一家兆人一統國無異政家無異風若奪其利則害生害不加於人欲何加乎若除其害則利生利不歸於人欲何歸乎故奪之也如皮盡於毛下本或不存與之也同囊漏於貯中利將焉往與奪利害斷可知焉是以善為國者不求非農桑之產不重非衣食之貨不用計數之吏不畜聚斂之臣聞榷筦之謀則思侵削於下見羨餘之利則念誅求於人然後德澤流而歌詠作矣故曰利出一孔者王利出二孔者強利出三孔者弱此明君立國子人者貴本業而賤末利也臣伏以國家鹽之法久矣鹽之利厚矣蓋法久則弊起弊起則法隳利厚則奸生奸生則利薄臣以為隳薄之由由乎院場太多吏職太眾故也何者今之主者歲考其課利之多少而殿最焉賞罰焉院場既多則各慮其商旅之不來也故羨其鹽而多與焉吏職既眾則各懼其課利之不優也故慢其貨而苟得焉鹽羨則幸生而無厭之商趨矣貨慢則濫作而無用之物入矣所以鹽愈費而官愈耗貨愈虛而商愈饒法雖行而奸緣課雖存而利失今若減其吏職省其院場審貨帛之精麤謹鹽量之出入使月有常利歲有常程自然鹽不誘商則出無羨鹽矣吏不爭課則入無濫貨矣鹽不濫出貨不濫入則法自張而利復興矣利害之效豈不然乎臣又見自關以東上農大賈易其資產入為鹽商率皆多藏私財別營裨販少出官利唯求隸名居無征徭行無榷稅身則庇於鹽籍利盡入於私室此乃下有耗於商農上無益於筦榷明矣出山海之饒鹽鐵之利利歸於人政之上也利歸於國政之次也若上不歸於人次又不歸於國使幸人姦黨得以自資此乃政之疵國之蠹也今若剗革弊法沙汰姦商使下無僥倖之人上得析毫之計斯又去弊興利之一端也唯陛下詳之問秦居上腴利號近蜀然都畿所理征賦不充故歲漕山東穀四百萬斛用給京師其間水旱不時賑貸貧乏今議者罷運穀而收月八人口價糴戶粟而折稅錢但未知利於彼乎而害於此乎臣聞議者將欲罷漕運於江淮請和糴於關輔以省其費以便於人臣愚以為救一時之弊則可也若以為長久之法則不知其可也何者方今自淮以南逾年旱歉自洛而西仍歲豐稔彼人困於艱食此穀賤於傷農困則難於發租賤則易於乞糴斯則不便於彼而無害於此矣此臣所謂救一時之弊則可也若舉而為法徇以為常臣雖至愚知其不可何者夫都畿者四方所湊也萬人所會也六軍所聚也雖利稱近蜀之饒猶未能足其用雖田有上腴之利猶不得充其費况可日削其穀月朘其食乎故國家歲漕東南之粟以給焉時發中都之廩以賑焉所以贍關中之人均天下之食而古今不易之制也然則用舍利害可明徵矣夫賫斂糴之資省漕運之費非無利也蓋利小而害大矣故久而不勝其害輓江淮之租贍關輔之食非無害也蓋害小而利大矣故久而不勝其利大凡事之大害者不能無小利也事之大利者不能無小害也蓋恤小害則大害不去愛小利則大利不成也古之明王所以能興利除害者非他蓋棄小而取大耳今若恤汎舟之役忘移穀之用是知小計而不知大會矣此臣所謂若以為長久之法則不知其可也問天地之利有限也人之欲無窮也以有限奉無窮則必地財耗於僭奢人力屈於嗜欲故不足者為奸為盜有餘者為驕為濫今欲使食力相充財欲相稱貴賤別而禮讓作貧富均而廉恥行作為何方可至於此臣聞天有時地有利人有欲能以三者與天下共者仁也聖也仁聖之本在乎制度而已夫制度者先王所以下均地財中立人極上法天道者也且天之生萬物也長之以風雨成之以寒燠聖人之牧萬人也活之以衣食濟之以器用若風雨淫寒燠甚則反傷乎物之生焉若衣食奢器用費則反傷乎人之生焉故作四時八節所以時寒燠節風雨不使之過差為沴也聖人制五等十倫所以倫衣食等器用不使之踰越為害也此所謂法天而立極者也然則地之生財有常力人之用財有常數若羨於上則耗於下也有餘於此則不足於彼也是以地力人財皆待制度而均也尊卑貴賤皆待制度而別也大凡爵祿之外其田宅棟宇車馬僕御器服飲食之制暨乎嬪婚祠葬之度自上而下皆有數焉若不節之以數用之以倫則必地力屈於僭奢人財消於嗜欲而貧困凍餒奸邪盜賊盡生於此矣聖王知其然故天下奢則示之以儉天下儉則示之以禮俾乎貴賤區別貧富適宜上下無羨耗之差財力無消屈之弊而富安溫飽廉恥禮讓盡生於此矣然則制度者出於君而加於臣行於人而化於天下也是以君人者莫不唯欲是防唯度是守守之不固則外物攻之故居處不守其度則峻宇崇臺攻之飲食不守其度則殊滋異味攻之衣服不守其度則奇文詭制攻之視聽不守其度則奸聲豔色攻之喜怒不守其度則僭賞淫刑攻之翫好不守其度則妨行之貨蕩心之器攻之獻納不守其度則讒諂之言聚斂之計攻之道術不守其度則不死之方無生之法攻之夫然則安得不內固其守甚於城池焉外防其攻甚於寇戎焉將在乎寢食起居必思其度思而不已則其下化之詩曰儀刑文王萬邦作孚此之謂矣臣聞天育物有時地生財有限而人之欲無極以有時有限奉無極之欲而法制不生其間則必物暴殄而財乏用矣先王惡其及此故川澤有禁山野有官養之以時取之以道是以豺獺未祭置網不布於野澤鷹隼未擊矰弋不施於山林昆蟲未蟄不以火田草木未落不加斧斤漁不竭澤畋不合圍至於麛卵蚳蝝五穀百果不中殺者皆有常禁夫然則禽獸魚鼈不可勝食矣財貨器用不可勝用矣臣又觀之豈直若此而已哉蓋古之聖王使信及豚魚仁及草木鳥獸不狘胎卵可窺麟鳳效靈龜龍為畜者亦由此塗而致也問自古以來君者無不思求其賢賢者罔不思效其用君賢兩不相遇其故何哉今欲求之辨之其術安在臣聞人君者無不思求其賢人臣者無不思效其用然而君求賢而不得臣效用而無由豈不以貴賤相懸朝野相隔堂遠於千里門深於九重雖臣有慺慺之誠何由上達雖君有孜孜之念無因下知上下茫然兩不相遇如此則豈唯賢者不用矧又用者不賢所以從古以來亂多而理少者職此之由也臣以為求賢有術辨賢有方方術者各審其族類使之推薦而已近取諸喻其猶線與矢也線因針而入矢待弦而發雖有線矢苟無針弦求自致焉不可得也夫必以族類者蓋賢愚有貫善惡有倫若以類求必以類至此亦猶水流濕火就燥自然之理也何則夫以德義立身者必交於德義不交於險僻以正直克己者必用於正直不用於頗邪以貪冒為意者必比於貪冒不比於貞廉以悖慢肆心者必狎於悖慢不狎於恭謹何者事相害而不相利性相戾而不相從此乃天地常倫人物常理必然之勢也則賢與不肖以此知之伏惟陛下欲求而致之也則思因針待弦之勢欲辨而別之也則察流濕就燥之徒得其勢必彙征而自來審其徒必㣥分而自見求人之術辨人之方於是乎在此矣問國家歲貢俊造日求賢良何以所得者率尋常之才所來者非師友之佐豈時無大賢乎將求之不得其道乎臣聞致理之先先於行道行道之本本於得賢得賢之由由乎審理若禮之厚薄定於此則賢之優劣應於彼故黜位而朝西面而事則師之才至矣先之以身下之以色則友之才至矣展皮弊之禮盡揖讓之儀則大臣之才至矣南面而坐使者先焉則左右之才至矣憑几據杖以令召焉則廝役之才至矣是以得師者帝得友者王得大臣者霸得左右者弱得廝役者亂然則求師而得友求友而得臣者有矣未有求臣而得友求友而得師者也是故圖帝而成王圖王而成霸者有矣未有圖霸而成王圖王而成帝者也夫以夷吾之賢為不可召之臣桓公所以霸齊也孔明之才為非屈致之士劉氏所以圖蜀也夫欲霸一國圖一方猶審其禮行其道焉况開帝王之業垂無疆之休苟無尊賢之風師友之佐則安能宏其理恢其化乎國家有天下二百年政無不施德無不備唯尊賢之禮未與三代同風陛下誠能行之則盡美盡善之事畢矣問頃者累下詔旨令舉所知獻其狀莫匪賢能授以官罕聞政績將人不易知耶將容易其舉耶臣伏見頃者德宗皇帝頒下詔旨令舉所知自是內外百寮歲有聞薦有司各詳其狀咸命以官語其數誠得多士之名考其才或非盡善之實何則得賢由舉擇慎審慎審由賞罰必行自十年以來未聞有司以得所舉賞一人以失所舉罪一人則內外之薦恐未專精出處之賢或有違濫斯所以令陛下尚有未得賢之嘆也伏惟申命所舉深詔有司量其短長之材授以大小之職然後明察臧否精考殿最得人者行進賢之賞謬舉者坐不當之辜自然上下精詳遠近懲勸謹關梁以相保責轅輪以相求俾夫草靡風行達於上下天下之耳盡為陛下聽天下之目盡為陛下視明其視則舉不失德廣其聽則野無遺賢而後官得其才事得其序如此則陛下但凝神端拱而天下理矣夫官既備而事未舉才既用而政未成者由官與才不相得也且官有大小繁簡之殊才有短長能否之異稱其任則政立枉其能則事乖故先王立庶官而後求人使乎各司其局也辨眾才而後入仕使乎各盡其能也如此則官雖省才雖半可得而理矣若以短任長以大授小委其不可而望其可強其不能而責其能如此則官雖能才雖倍無益於理矣故曰任小能於大事者猶狸搏虎而刀伐木也展長才於短用者猶驥捕鼠而斧剪毛也所不相及豈不宜哉王者誠能量眾才之短長審庶官之小大俾操鑿枘者無圓方之謬備輪轅者適曲直之宜自然人盡其能職修其要彞倫日敘庶績日凝又何患乎事不舉而政未成哉問國家台袞之才臺省之器胡然近日稍乏其人將欲救之其故安在臣伏見國家公卿將相之具選於丞郎給舍丞郎給舍之才選於御史遺補郎官御史遺補郎官之器選於秘著校正畿赤簿尉雖未盡是十常六七焉然則畿赤之吏不獨以府縣之用求之秘著之宦不獨以校勘之用取之其所責望者乃丞郎之椎輪公卿之濫觴也則選用之際宜得其人臣竊見近日秘著校正或以門地授畿赤簿尉唯以資序求不商較其器能不研覈其才行至使頃年以來臺官空不知所取省郎闕不知所求豈直乏賢誠亦廢事且以資序得者僅能參於簿領以門地進者或未任於鉛黃臣恐台袞之才臺省之器十年以後稍乏其人又頃者有司懲趨競之流塞儌倖之路俾進士非科第者不授校正校正欠資考者不署畿官立而為文權以救弊蓋一時之制非可久之術今者有司難於掄才易於注擬因循勿改守以為常至使兩畿之中數縣之外雖資序皆當其任而名實莫得而聞故每臺省缺員曾莫擬議則守文之弊一至於斯伏願思以後難革其前失廣丞郎椎輪之本疏公卿濫觴之源如此則良能之才必足用矣要劇之職不乏人矣問先王建官升降有制遷次有常此經久之道也或云賞善罰惡者不踰時月又曰為官吏者可長子孫豈今古之殊制乎不然何遲速之異如此也今欲速遷而勸善恐誘躁求之心將令久次而望功慮興滯用之嘆疾徐之制何以為中臣聞孔子曰苟有用我者三年而有成舜典曰三載考績三考黜陟幽明雖聖賢為政未及三年不能成也雖善惡難知不過九載必自著也由此而論為官吏者不可速遷也不可久次也若未三年而遷則政未立績未成且躁求之心生而馴致之化廢矣若過九載而不轉則明不陟幽不黜且勸善之法缺而懲惡之典隳矣大凡內外之官其畧如此然則最與天子共理者莫先於二千石乎臣竊見近來諸州刺史有未兩考而遷者豈為善成政之速速於聖賢耶將有司考察之不精耶不然何遷之遽也又有踰一紀而不轉者豈善惡未著莫得而知耶將有司遺忘而不舉耶不然何轉之遲也臣伏見順宗皇帝詔曰凡內外之職四考遞遷斯實革今之弊行古之道也然臣猶以為吏能有聞者既以四考遷之政術無取者亦宜四考黜之將欲循其名辨其實則在陛下獎糾察之吏督考課之官使別其否臧明知白黑仍命曰雖久次者不得逾於四載雖速遷者亦待及於三年此先王較能之大方致理之要道也伏惟陛下試垂意而察焉問吏部之弊為日久矣今吏多於員其故何因官不得人其由何在奸偽日起其計何生馳騖日滋其風何自欲使吏與員而相得名與實而相符趨競巧濫之弊銷公平政理之道長妍媸者不能欺於藻鏡錙銖者不敢詐於銓衡豈無良謀以救其弊臣伏見吏部之弊為日久矣時皆共病不知其然臣請備而言之臣聞古者計戶以貢士量官而署吏故官不乏吏士不乏官士吏官員必相參用今則官倍於古吏倍於官入色者又倍於吏也此由每歲假文武而筮仕者眾冒資廕而出身者多故官不得人員不充吏是以爭求日至奸濫日生斯乃為弊之一端也臣又聞古者州郡之吏牧守選而舉之府寺之寮公卿辟而署之其餘者乃歸有司有司所領既少則所選必精此前代所以得人也今則內外之官一命以上歲羨千數悉委吏曹吏曹案資署官猶懼不給則何暇考察名實區別否臧者乎至使近代以來寖而成弊真偽爭進共徵循資之書賢愚莫分同限停年之格才能者淹滯而不振巧詐者因緣以成奸此又為弊之一端也今若使內外師長者各選其人分署其吏則庶乎官得其才矣使諸色入仕者量省其數或間以年則庶乎士不乏官矣官得其才則公平政理之道所由長也士不乏官則趨競巧濫之弊所由銷也矧又減銓衡之偏重則力不撓而易平矣分藻鏡之獨鑒則照不疲而易明矣與夫千品折於一面百職斷於一心功相萬也得失相懸豈不遠矣臣以為芟煩剗弊莫尚於斯問今者勤卹黎元之隱精求牧宰之才亦既得人使之為政何以撫字之方尚未副我精求之旨疲困之俗尚未知我勤卹之心豈才未稱官將人不求理備陳其故以革其非臣聞王者之設庶官無非共理者也然則庶官之理同歸而牧宰之用為急蓋以邦之賦役由之而後均王之風教由之而後行人之性命繫焉國之安危屬焉故與夫庶官之寄輕重不可齊致也臣伏見陛下勤卹黎元之心至矣慎擇牧宰之旨深矣然而黎元之理尚未副陛下勤卹之心牧宰之政尚未稱陛下慎擇之旨非人不求理非才不稱官以臣所窺粗知其由矣臣聞賢者為善不待勸矣何哉性不忍為惡耳愚者為不善雖勸而不遷也何哉性不能為善耳賢愚之間謂之中人中人之心可上可下勸之則遷於善捨之則陷於惡故曰懲勸之廢也推中人而墜於小人之域懲勸之行也引中人而納諸君子之途是知勸沮之道不可一日無也况天下牧宰中人者多去惡遷善皆得勸沮伏以方今殿最之法甚備黜陟之令甚明然則就備之中察之者未甚精也就明之中奉之者未甚行也未甚精則臧否同貫未甚行則善惡齊驅雖有和璞之貞不能識也雖有齊竽之濫何由知之如此則豈獨利淫亦將失善善苟未勸淫或未懲欲望副陛下勤卹之心稱陛下慎擇之旨或恐難矣臣又請以古事騐之臣聞唐虞之際也敷求俊乂而四凶見用及三考黜陟而四罪乃彰則知雖至明也尚或迷真偽之途雖至聖也不能去考察之法故其法張則變曲為直如蓬生於麻也其法弛則變香為臭使蘭化為艾也且聖人之為理豈盡得賢而用之乎豈盡知不肖而去之乎將在夫秉其樞操其要剗邪為正削觚為圓能使善之必遷不謂善之盡有能使惡之必改不謂惡之盡無成此功者無他懲勸之所致也則考課之法其可輕乎臣又見當今牧宰之內甚有良能委之理人亦足成政所未至者又有其由臣聞牧宰古者五等之國也於人有父母之道焉於吏有君臣之道焉所宜弛張舉措由其心威福賞罰懸於手然後能鎮其俗移其風也今縣宰之權受制於州牧州牧之政取則於使司迭相拘持不敢專達雖有政術何由施行况又力役之限賦斂之期以用之費省為求不以人之貧富為度以上之緩急為節不以下之勞逸為程縣畏於州州畏於使雖有仁惠何由撫綏此猶束舟楫而望濟川絆騏驥而求致遠臣恐龔黃卓魯復生於今日亦不能為理矣夫百職不修萬事不舉皇綱弛而不振頹俗蕩而不還者由君子讜直之道消小人慎默之道長也臣伏見近代以來時議者率以拱默保位者為明智以柔順安身者為賢能以直言危行者為狂愚以中立守道者為凝滯故朝寡敢言之士庭鮮執咎之臣自國及家寖而成俗故父訓其子曰無介直以立仇敵兄教其弟曰無方正以賈悔尢識者腹非而不言愚者心競而是效至使天下有目者如瞽也有耳者如聾也有口者如含鋒刃也慎默之俗一至於斯此正士直臣所以退藏而長太息也豈直若此而已哉蓋慎默積於中則職事廢於外強毅果斷之心屈畏忌因循之性成反謂率職而舉正者不達於時宜當官而行法者不通於事變是以殿最之文雖書而不實黜陟之法雖備而不行欲望善者勸惡者懲百職修萬事舉不可得也然臣以為歷代之頹俗非國朝不能革也國朝之皇綱非陛下不能振也革振之術臣粗知之何者夫人之蚩蚩唯利是務若利出於慎默則慎默之風大起若利出於讜直則讜直之風大行亦猶冬月之陽夏日之陰不召物而自歸之者無他溫涼之利所在故也伏惟陛下以至公統天下以至明御㣥臣使情偽無所逃言行無所隱有若讜直強毅舉正彈違者引而進之有若慎默畏忌吐剛茹柔者推而遠之使此有利彼無利安得不去彼取此乎斯所謂俾人日從善遠罪而不自知也如此則百職修萬事舉皇綱振頹俗移太平之風由斯而致矣
