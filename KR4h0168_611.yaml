front:
  text: 全唐文欽定全唐文卷六百十一直鈞貞元十九年進士
  hash: sha256:5d493887c5837b62b87450782c67f8259f657d8f1027a8fa8514a24dad989ed6
  markers:
  - {type: head, offset: 13, content: 胡直鈞, id: KR4h0168_NFKB_611-h1, level: 1}
body:
  text: 農為務本春則歲華和者取至和之靡忒中者象居中之莫邪吾君將以發教源於仲序配節令於孔嘉知稼穡之道則無逸之書何遠覩播植之論審后稷之訓不遐至若四海無事萬方胥悅野思疆理之勤朝有田疇之説鑄兵器為農器更舊節為新節天子方坐承明之廬端穆清之居百執事孜孜而奉職㣥有司濟濟以進書曰陛下德被淳古時登太初念耘耔之勤每思親勞佇豐年之應曾不自攄臣所以極聞見而獻可庶將獲小大之所如伏以羲徇平秩時在元吉既錢鎛之徒營固準直而何失遲西成於遺秉之歲戒東作於寅賓之日庶居勤之輩咸執其常惰遊之人罔敢不率皇上諧衆議允嘉猷載耒耜而親耕天下皆勸率公卿而終事庶績咸修然後創典章頒遠邇斯載耕之自此佇多稔之於彼稽汜氏之法未足方之考周官之規諒當改是豈不以㣥下執躬在上務農故將降元功於后土介景福於天宗况令節適時良圖合盛近可法於三務遠從規於八政豈將獨播美於茲辰冀終古而輝映昔孝武寤善馬駕英才窮二師於海外獲汗血之龍媒於是宛卒大北神駒盡來駔駿奇狀超攄逸材走追風於馬邑嘶逐日於雲堆因行師之勳著辨前王之業開當夫海西出征掣敵要遠始遲疑而不進承再命之爰晚奉皇風之用宣冀邊草之齊偃既量功就已料生返越窮海之沙塵及大宛之城苑既高勳以茂閥且不愧於分閫芻糧盡取騄驥亦空材為地産之最精降天山之中背不毛之殊俗從入律之東風沛艾骨異低昂氣雄溢鏡光於金勒流雪彩於花驄悉可耀威華夏奪魄獯戎若乃發迹窮荒來儀中國史驚千載之異朝慶一人之得君子之德式孚天王之道允塞騰驤永埒曾何比於權奇滅沒長衢獨有賴於筋力然則馬惟行地君實統天黷兵者耗財之本愛財者有國之先徒知天駟之可獲莫痛征夫之寡全時泰俗饒固理道之所急珍禽奇獸在人君之可捐穆王之荒何取文帝之事足傳竟洽大東之詠奚為天馬之篇况驥之生兮有矣屈之産也在焉復何必勤求於遠卒當耗斁之事邊向使武帝退術士寶賢者罷征戰於戎夷浹風俗於純嘏自將致丹質之鳳鳥豈徒來汗血之龍馬故前代論邊之徒以勞師遠伐屈衆策之下晦字大章第進士登直言極諫科纍拜中書舍人敬宗朝出為同州刺史大和中以禮部尚書致仕開成三年卒贈兵部尚書巨浸不極太陰無私褰積水之遊氣覩圓魄之殊姿皓皓天步蒼茫地維泱漾崩騰助金波玉浪之勢晶熒激射當三五二八之期蓋進必以道豈出非其時繼傾曦以對越擅浮光而在茲嗟乎空濶之容若彼清明之狀如此蜃樓旁起疑庾亮之可從珠蚌潛開異隋侯之所委躔次雖遊風濤詎弭出霞岸而不遲過鼇山而孔邇顧兔搖拽姮娥徙倚將運行以故然諒滌濯之難揣遠絶昏霾回臨津涯竟無幽而不燭斯冥力而上排希逸之賦可稱界於斜漢元暉之詩有作映彼清淮未若皎皎初吐蒼蒼可階叶朝夕以晦朔寧望斷而意乖奫淪涳洞雪翻煙弄水族將蟾影交馳浪花與桂枝相送凝目是遠賞心斯衆苟佳景之必存孰良辰之不共滔滔節宣冉冉徂遷循彼萬流差廣納而觀海推夫兩曜候久照而得天客有吟想此夜淹翔有年感浮桴而偶聖庶乘槎而逢仙亦將覽孤景盥洪漣聊學抽毫而進牘豈追羡魚以臨川次元貞元中進士官吏部員外郎元和中為福州刺史河南尹終江西觀察使右臣伏奉某月日手詔令臣速具前件官本末事由聞奏臣以月日謹具某官歸本道事以聞某月日奏官至伏奉某月日手詔所奏某官尋赴廣州事宜具詳本末想宜知悉者臣伏以綸綍下於紫霄明命光於滄海榮深感極寵洽心驚周章失圖歡惕交集顧臣鄙劣忝寄藩維無補涓埃纍更涼燠矧茲地遠敢望恩加日月照臨之明無幽不燭乾坤生成之德在物莫遺豈期奏報常儀特降詔書慰撫事逾等列喜萬恆情伏以軒墀一違歲序三變謬職愧深於星琯荷恩思拜於彤庭廁清列於班行峨冠劍而何日守炎荒之遐服甘瘴癘以嬰身懷死節之丹誠願生還於絳闕每承存諭之命更切攀戀之心臣不勝感恩歡躍屏營之至右臣伏以青陽發春肇寶歷於茲始元穹降祚仰聖壽而維新正殿嚮明班行承慶顧臣等守土列在東隅空懷捧日之心望雲何及獨闕稱觴之禮鳴佩無因瞻九重而在天空倍情而增戀前件物及衫段宣臺卓座等禮不憚輕物斯展敬節當有慶用申致貢之誠情苟為珍願比負暄之獻臣某不勝感恩忭躍屏營之至右臣伏以律應蕤賓日惟端午訖於四海皆馳必獻之珍節彼南山咸祝無疆之壽臣職叨藩服守在遐方貢菲禮以展誠單微既懼傾葵心而向日捧戴何因情空愧於遼東戀益深於闕下臣某不勝感恩戰灼屏營之極右伏以履長之慶咸歡比日之休率土之濱皆祝如山之壽况臣蚤參近侍出鎮遐藩望闕既遙瞻天積戀手舞足蹈既不及於九流任土展誠空用馳於一獻輕瀆旒扆戰越惟深前件女口及紫袍段銀謺子等謹遣某官隨狀奉進右臣伏以瑤光之祥貫月於佳夕繞樞之感降聖於良辰歡浹寰瀛慶延寶祚百靈效祉固增壽於南山萬國一心皆貢珍於北闕臣謬膺廉問分鎮甌閩當朝寀之稱觴身居遐遠望長安而瞻日戀積心魂前件女口及銀器衣箱等稽禹貢之文敢遵任土比野芹之獻空願竭心冀因此而展誠豈以菲而廢禮輕瀆旒扆隕越伏深臣某言伏以幸遇通年奏請遷奉事伏奉月日手詔令子弟主辦以趁時日者私願上陳天書下降跪承恩命榮感失圖臣實不天幼丁家禍薦鍾凶釁方在童蒙逮於成人終鮮兄弟比以時日非便顧室且貧日居月諸未辦歸祔痛心疾首以候吉辰昨者陳露下情求替遷奉赴任之日亦具奏聞今奉詔書令子弟主辦雖懇辭上瀆而天聽未回荷朝廷之寄深望阡兆而心隕臣即準詔遣子弟專往揚州舒州主辦便赴上都續具聞奏臣揆以才劣職任非輕不敢重陳再煩睿覽懷罔極之感章奏冀允於深誠奉絲綸之書獎任益彰於聖旨顧違恩重哀荷難任臣不勝荒塞摧逼之至嗣復字繼之僕射於陵子第進士博學宏詞長慶初纍拜中書舍人文宗立遷戶部侍郎開成三年以本官同平章事封宏農縣伯進門下侍郎武宗朝出為湖南觀察使宣宗立拜吏部尚書大中二年卒年六十六贈尚書左僕射諡孝穆伶人賤類出入宮禁定刑議罪有異平人若不痛絶即難肅準宣各決痛杖一處死事亦相緣宣下之事未有正敕府司準宣處置又不覆奏稍乖常例有惑衆情陛下躬勤庶政超邁百王每對宰臣日旰忘倦正衙決事二史在前便殿坐日全無紀録長壽初宰臣姚璹奏置時政記旋即不行貞元中宰臣趙退翁請行故事無何又廢恭惟聖政必在發明今請每致延英坐日對宰臣往復之詞關德化刑政之事委中書門下直日紀録月終送付史館所冀帝猷不墜國史有倫龐驥贓貨之數為錢肆百餘千其間大半是枉法據贓定罪合處極刑雖經赦恩不在原免伏以近日贓吏皆蒙小有矜寬類例之間慮須貸死唐有天下二百二十載用文章顯於時代有其人然而自成童就傅以及考終命解巾筮仕以及鈞衡師保造次必於文視聽必於文采章皆正色而無駮雜調韻皆正聲而無奇邪滔滔然如河東注不知其極而又處命書綸綍之任專考核品藻之柄參化成輔翊之勳初中終全而有之得之於相國文公矣公諱德輿字載之天水人也族望祖宗之遠當官行已之道語在國史銘於壙而碑於途此不敢詳今所載者因緣文業而已蚤歲為淮南江西從事掾管記室之任屬詞詣理奏入報可移文走檄疆事迎解登朝為起居舍人改駕部員外郎換司勳郎中遷中書舍人凡四任九年專掌詔誥大則發德音修典册灑朝廷之利澤增盛德之形容小則褒才能敘官業區分流品申明誡勸無誕詞無巧語誠直溫潤真王者之言公昔自纂録為制集五十卷託於友人湖南觀察使楊公憑為之序故今不在編次之內其他千名萬狀隨意所屬牢籠今古窮極微細周流於親愛情理之間磅礡於勳賢久大之業不為利疚不以菲廢本乎道以行乎文故能獨步當時人人心伏非以德爵齒挾而致之貞元中奉詔考定賢良草澤之士升名者十七人及為禮部侍郎擢進士第者七十有餘鸞凰梓舉集其門登輔相之位者前後凡十人其他征鎮嶽牧文昌掖垣之選不可悉數繼居其任者今猶森然非精識洞鑒其詞而知其人何以臻此耶憲宗皇帝紹開中興始以英明申威提法武功既愈文教是圖元和五年冬執政暴疾既瘖且痺未旬日而公作相憲章儒術潤色王度使和聲順氣發自廊廟而鬯浹於幽遐我之所長時以推戴玉立冰潔無緇磷遷染之譏以文德自終豈徒然哉嗣復不佞發迹門館儀曹台席皆忝前躅公之元子中書舍人璩不幸短命其嗣憲孫泣奉文集求鄙詞以冠篇首雖觀於巨海難挹波濤而藉用白茅所資誠敬其五十卷次第具在集目謹序嗣復愚之至也不知愚而所以愚每雕言為斫弊求多譽而自飾曾未辨巧捷輕曲為大妄之枝葉作大愚之藪澤但務躁進不欲靜止因讀莊周書至孔聖九徵乃泫然流涕捫心愧意方覺弛張不得其妙通變不得其精於是火集中腸冰寒肌骨同書紳之作戒仰佩韋以自警贊味斯語欲寡其過乃屏繁機操筆硯各隨本事妄有褒闡雖不作發揮聖作亦表吁嗟尚其九徵之力也太行莫並其高溟津莫同其深且物不能自大因人而大之人不能自名因事而名之即人可以鑒物事可以鑒人物當鑒而振美無斁人當鑒而垂譽無極其九徵之文即鑒人者也救必墜扶必顛登吉途辨吉士如沈疴之服良藥昏夜之有燈燭欣歎不盡敢引類而侔之嘗聞老氏教誇黃庭神驗讀之萬遍必得上升上升之言誘聾俗耳何者真隱之士自保形骸道播四支德耕五藏故述黃庭內景外景並是修身修心之書以時人樂其遠而不樂其近賤其目而不賤其聞故易於易而不易於不易難於難而不難於不難乃假立蘂宮欲伸其説虛張瓊戶使重斯言所以同於道者道以得之同於德者德以得之以心付心以口傳口其要在一讀其文即一修其心讀經萬遍即耳聰目明神清氣靈調衛理營六府和平於是染妄不干筋骸自潔同上清之真侶為出世之高人指名喻仙以勵行者未可脂肥滿腹營慮填胸含蓄是非包藏喜怒口念黃庭之字心迷碧落之門如刻規矩於冰霜齊曲直於雲霧有何功德而自勤哉於是念黃庭之人非修黃庭之事也此九徵之書亦念至萬遍隨而行之即知正知非辨辱辨疑絶詐防機百祿來依於是節貫青松名高白日同上古之君子為當代之令人風格難儔貞華獨立未可剛愎好犯憸虐居中蹈虛迹危甘佞樂拙口念九徵之字身無一行可觀如朽木強雕難施斤斧腐鐵雖淬終乏光輝徒有虛勞而無實迹夫筌者所以在魚得魚而忘筌言者所以在意得意而忘言慎勿失魚而空執其筌失意而空守其言此是讀九徵之夫非行九徵之士也如藥能療病必堅服之書能治身必堅行之堅之至無不愈矣即存身保命力不減於黃庭心淡體間道更融於內景以其拔馳名救物之志同深居避事之徒彼利一身此利多人宏濟邈然孔聖之道長矣而乃不踐幸人之迹長親長者之車口出雅言腹包至行常能外已不私於身還同飲醴味芝便是行雲化雨德經曰修之身其德乃真未有已不修而有真德者也若使敬之如神明仰之如日月一言出而千里響應一行著而四海趨風者此修身而得之未有不修而得之者嗣復年四十一造次至三品人多稱幸凡得其如高名厚利唯恐不及自六七載有拯物之願無自拯之心但力步煙霄躡雲霞之路未足上親天漢恐雨露之恩不濃此貪名也非畏盈懼滿慎終之心也非知進退存亡之心也如此心未決增負乘致寇之迫必待人而拯已何力能自拯也今者洗心滌腸祗荷德語盡夜栗栗若臨深谷必薄嗜捐華袪情除妄至於白首不敢中廢孔子曰凡人心難知於天天猶有春秋冬夏旦暮之期人者厚貌深情不可測也誠哉是言有貌苦而心柔順者有貌和而心酷烈者有貌弱而心徑悍者有貌剛而心懾怯者或美其言而失信寡其辭而好凌近於禮而善諛強其氣而無節又有張君子之腹陳小人之心衒虎豹之文中犬羊之質又有外示躁撓中實靜安不耀已功陰施惠澤又有正言馭物直道觀人哺糟順時受汙合俗又有禮下於人言屈於已顧瞻其行心之不同故不可悉識也君子以此九事觀人者以明鏡矚顏毫微莫隱流光鑒物曲直何逃彼之進不進此知彼也此之退不退彼知此也周於所驗已得於心以驗明周故存於目如於九徵之中粗得一者如蘭生一葉誰謂無芳桂長初條宛然嘉木得二三者如漁舟入浦不揖濁流樵客登山不爭俗路得四五者如鏌鎁之兩利不可當璠璵之輝美不可並得六七者如金石在庭欣逢雅韻黼黻居篋喜觀華章得八九者如驪龍出海光透萬重鵬翼高摶聲聞六合如得其人即傾意而鄰嚮孰敢不勉以副思齊之至也高者附之卑者舉之屈者伸之沈者浮之德者師之謙者友之親者厚之疏者禮之能自觀也上之謂他人之所觀也知上之上慕哉知下之下懼哉崔子玉有座右銘諸葛亮有審心戒所以桎梏誑妄羈鎖滿溢嗣復不敢類古人而創立題目亦欲因古人而刊削是非便以九徵心戒為名用繩準不遷之行正文之下皆嗣復述耳時大和元年丁未歲夏四月十一日謹題古者言之不出恥躬之不逮也嗣復淺鈍極矣亦喜挹此説今者謬為纂釋倍感於心雖有是言實無斯行日省其説讀而改之其達者恐我行不及言必憂迷者喜我行不及言必笑丈夫既有言也豈敢中道而廢當不使相笑者笑相憂者憂必有年矣知余者表余心矣不知余者曷敢言志當自省惕而行之
