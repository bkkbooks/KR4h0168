front:
  text: 全唐文欽定全唐文卷六百五十七白居易二
  hash: sha256:ede0a46190d7845c46af0ae3356ee406943239bd3b406f98d6e483c1b3b0180b
body:
  text: 勅某官裴宏泰以幹蠱之才領鹽鹵之務管榷條制動皆得宜觀其所能若有餘地可假兼職俾之牧人而河北列城久乏良吏俗多思理政不難施亦猶凍餒之人易為衣食今予命爾煦而飫之襦袴之謠佇入吾耳可兼知貝州刺史勅河洛千里都畿在焉俾之乂安屬在尹正鳳翔隴州節度觀察處置等使正議大夫檢校禮部尚書兼鳳翔尹御史大夫上柱國安平縣開國男食邑三百戶賜紫金魚袋崔陵有精敏之用潔直之操施於有政由是知名始資州縣之勞卒致公卿之位况刺部有理行主計無違尹右輔而鎮西郊葢獎能報勤之旨也昔吳公為河南守謹身廉平人服教化袁安為河南尹政令清肅號為嚴明誰其嗣之無易陵者往為表則勿替能名可檢校禮部尚書兼河南尹散官勳封賜如故勅賜太常寺奉禮郎翰林待詔上護軍侯丕夫執藝以事上奉詔而處中其於出入謹身夙夜祗命比他局署實倍恭勤既寵之以職名又優之以祿俸葢先勞後食之義也汝其承之可守壽州霍邱縣尉依前翰林待詔勳如故勅成德軍節度押衙銀青光祿大夫檢校太子賓客兼監察御史崔楚臣材膺爪士職在牙旗每祗命以奉辭必竭誠而得禮既嘉詳敏亦念恭勤式示寵名宜遷憲秩可殿中侍御史餘如故勅成德節度鎮冀深趙等州觀察處置等使金紫光祿大夫檢校工部尚書兼鎮州大督府長史大夫上柱國太原縣開國男食邑三百戶王庭湊曾祖故忠武將守左武衞大將軍員外置同正員兼試太常卿五哥之等鬼神有知履孝敬者福祿至王侯無種仗忠信者富貴來我有列臣本於良允奮發而勵節許國感激而揚名顯親夫教必有初德無不報安有收其才而遺其本愛其後而忘其先乎是用褒崇以宏寵澤庶使聞者起孝作忠可依前件勅前武寧軍節度徐泗濠等州觀察處置等使正議大夫檢校工部尚書使持節徐州諸軍事兼徐州刺史御史大夫上柱國賜紫金魚袋崔㣥天授至寶為國重器始自修巳移於事君輔弼藩宣不失其道及離征鎮召赴闕庭方登道途遂遘疾恙正在頤養之際豈任朝謁之勞誠宜許以便安不可闕其祿食而移秩外史分曹東周加寵優賢無易於此且有後命俟其有瘳可秘書監分司東都散官勳賜如故勅太府丞王建太府丞與秘書郎品秩同而祿廩一今所轉移者欲職得宜而才適用也詩人之作麗以則建為文近之矣故其所著章句往往在人口中求之輩流亦不易得帑藏之吏非爾官也而翺翔書府吟咏秘閣改命是職不亦可乎可秘書郎勅將仕郎權知泗州長史兼殿中侍御史賜緋魚袋董昌齡頃為邑宰分贊郡符皆聞約巳之名每展在公之節稽其器局允謂廉能議以稍遷用彰勤効可許州長史兼侍御史散官勳如故勅徵事郎前河南縣尉柳經儒林郎試太子通事舍人李褒等瀕淮列城泗州為要控轉輸之路屯式遏之師故府有寮軍有倅選擇補署得聞於朝廷而經等皆有所長宜當是選守臣置奏因而可之仍加秩命用示優寵經可監察御史充泗州團練副使散官如故褒可試太常寺協律郎充武寧軍節度泗州兵馬畱後判官仍改名銜散官勳如故勅義成軍節度馬步都知兵馬使光祿大夫檢校太子詹事兼侍御史上柱國張諷等御史府自中執憲暨察視之官皆顯秩也惟懷材而展効者可以授焉爾等昨領偏師出疆赴難指蹤而去摩壘而還忠勇勤勞宜有加獎故以憲職第而寵之可依前件勅守袁州司馬員外置同正員啖異等有司奉新制明舊章凡負疵瑕必霑慶澤况爾等各有才用多淹歲時譴累重輕遽從恩貸班資遠邇率以例遷如聞進修豈忘牽復可依前件勅中散大夫檢校右散騎常侍兼右神武軍大將軍知軍事御史大夫上柱國河東縣開國男食邑三百戶賜紫金魚袋程執撫父贈太子太保懷信等咸有忠勳播為先德悉承義訓垂在後昆故我令臣皆乃愛子襲弓裘而秉詩禮猶水木之有本源將使天下之為人子者感恩天下之為人父者知勸宜加寵贈以表顯揚可依前件勅漢置部刺史掌奉詔條紏吏理葢今觀察使職耳桂林秦郡也東控海嶺右扼蠻荒自隋迄今不改戎府地遠則權重俗殊則理難馭而化之非才不可朝議大夫前守秘書監驍騎尉賜紫金魚袋嚴謨嘗守商洛刺黔巫州部縣道謐然安理是能用寬猛相濟之政撫夷夏雜居之人故也跡其往効式是南邦况爾操行端和文學精茂賓寺書府善於其官勉副前言俟申後命可使持節都督桂林諸軍事守桂林州刺史兼御史中丞桂州本管都防禦觀察處置等使散官勳如故勅生有寵祿歿有褒崇此王者所以明終始之恩厚君臣之道也故桂州本管都防禦觀察等使正議大夫使持節都督桂州諸軍事守桂州刺史兼御史中丞上柱國南陽縣開國男賜紫金魚袋杜式方慶襲台庭任當垣翰服名教乃保家之子樹風聲為守土之臣盡禮事君勞心奉職奄忽淪逝念之惻然况近屬連姻遠藩捐館聞訃之命實悼中心贈飾之恩宜加常等俾趨榮於八座用賁寵於九原可贈禮部尚書仍貝專布帛二百段米粟二百石委度支逐便支遣勅某官武昭王師伐蔡爾在行間致命奮身挑戰當寇忠憤所感卒獲生全求之軍中不可多得司馬以爾信直謹厚可領邊城爾宜酬乃知巳副我朝獎撫獯戎雜居之俗安離石重困之人勉而涖之其任不細可石州刺史勅某官梁希逸頃為蔡將陷在賊庭知有君臣不顧妻子率其所屬當戰陣前反斾倒戈翻然歸我忘家之士希逸有之間從司空再平淮右指蹤銜命皆稱所使可以移用俾之守疆北邊列城蔚為衝要雄右軍號務兼錢刀酬勤選能俾乃兼領宜思來効以續前勞可蔚州刺史兼橫野軍使并知本州鑄錢事勅盧元勳乃者鎮帥承元納款之際柏耆將命之初軍情洶然未知嚮化而元勳挺身奮臂出於眾中指明安危分別逆順顏色不撓聲氣甚厲言行事立朕甚多之雖有優升未酬義烈宜以一郡寵而旌之用勸四方聞其風者可隰州刺史勅楊孝直早以才力從戎冀方專習武經通知吏事承元移鎮孝直實來詢謀驅馳有所裨助軍郡之佐寵秩非輕用答忠勞以明勸獎可滑州長史勅前丹州司馬張嘉泰一從戎旅多歷歲時奉職有勞率身無過軍部長佐資秩不卑自丹轉延頗為優穩題輿便道往守乃官可延州長史勅魏元通有禦侮之才扞城之畧服勤戎職善守邊州訓旅牧人有可稱者夫文武迭用出入序遷所以關才能而均勞逸也爾宜解綬郡邸曳裾王門飭躬慎儀以奉朝謁可依前件勅通事舍人楊造翰林待詔某亡母等生播徽華歿畱儀範訓保家之子為有國之臣或相禮彤庭或待詔金馬咸居禁近率有忠勤風樹之心必憂深而思遠蓼蕭之澤宜自葉而流根並啟邑封各從子貴揚名之孝與汝成之可依前件勅壽州刺史張植亡母某氏等夫忠於上者教有所自仁於下者恩有所延孝理之風實繇此作當今良二千石皆與朕共理雖祿不逮養而名可顯親將慰匪莪之心宜流自葉之澤俾從子貴咸贈邑封勅尚書吏部郎中兼侍御史陳中師早以體物之文待問之學中鄉里選第甲乙科及筮仕立身皆有本末不背俗以矯逸不趍時以沽名從容中道自致聞望累踐郎署再參憲司官無卑崇事無簡劇如玉在佩動必有聲為時所稱何用不可朕以立國之本禮樂為先今之太常兼掌其事貳茲職者不亦重乎歷代迄今謂之清選往復是命佇觀有成予方急才爾寧久次可太常少卿勅某官鄭㣥等今之正郎班望頗重中外要職多由是選故其所選不得不慎必循名實而後命之㣥與士階久典名郡謹身化下有循吏之風會課陟明宜當是選國之大事在祀與戎一掌祠曹一司武庫各領其要爾宜敬之㣥可庫部郎中階可祠部郎中勅通事舍人元稹東宮之有諭德猶上臺之有騎省也清班優秩所選非輕朕前遣使臣往修戎好以稹言信行敬命為介焉揚旌出疆反駕奔命有所啟奏多叶便宜乃知得人可以卒事故加是命以寵勸之可太子左諭德依前入蕃使勅萬州司戶參軍盧昂等頃負疵瑕各從譴謫或遠竄荒裔或未復班資既逢蕩滌之恩俾及轉遷之命况聞修省以克己固將校試而用能吾無棄人汝宜自効可依前件勅李石等用武之地曰涇與原合為一鎮控扼夷虜朕授布金戊責其成功布乃祗惕受命思有以自輔者因上言石縠殷衡等學業才畫堪置幄中分務列官咸可其請而布憂邊甚切選士必精爾宜各竭所能為知巳用可依前件勅王者法鈎陳設環列非勳勤之將信近之臣則何以久張爪牙轉致肘腋者也某官李演常從德宗皇帝南蒐於梁籍名功臣謂之定難洎出分戎律入拱宸居內外周旋不懈於位交㦸之下周廬肅然今之轉遷示益親信移領左廣仍參夏卿夫八屯之警巡七萃之勤惰爾為其正盡得察之宜惜前勞無隳乃力可依前件勅容州本貫經畧招討左押衙兼右廂兵馬使康昇讓等有奉職徇公之勤有理戎殄寇之効其帥公素上章以聞吾方念勞爾宜受賞况容之諸郡有大小郡之兼職有重輕量能第功分命而往噫方藩雖遠朝聽甚卑有善必聞無功不錄吾言及此欲爾知之可依前件勅丞相鎮蜀志在憂邊俾靜蕃蠻實資將校故加寵任以責成功某官某等若干人類例勳勞進登班秩憲官名重郡佐祿優參以命之足為榮獎爾宜恭承主帥慎守封疆戮力一心無落戎事可依前件勅軍有羽林用法星象統之爪士以拱宸居某官某前以忠勞選登戎衞而能訓勇力之士以備時使申誰何之令以奉徼巡夙夜祗嚴不懈於位既終喪紀宜服官常假中執憲之名行上將軍之事勉修舊職用副新恩可依前件勅奉天縣令崔鄯大凡南宮郎無非慎選者也况地官之屬有堆案盈几之文有月計歲會之課故員外郎不可逾時缺不待滿歲遷事劇才難斷可知矣而鄯自操白宰赤縣繩舉違謬惠養鰥惸皆有善聲著於官次豈能於彼而不能於此乎爾宜率廩人佐計務決繁析滯期有可觀可依前件勅某官李景亮夫執藝事上者必揆日時計勞績而後進爵秩以旌服勤况待詔宮闈飭躬晨夜比於他職宜有加恩宮坊衞官以示優獎可依前件勅故某官康太崇嘗習韜鈐夙稱拳勇使之訓旅能叶武經使之守疆能著戎績永言殂謝宜及褒榮俾追寵於朱旛庶知恩於黃壤可贈鄧州刺史勅故某官張懿德善者將啟後人忠孝者克揚前烈有美必復亶其然乎而懿仗忠履義體仁養勇學究韜畧藝窮騎射負幽燕之勁氣雖振其名有將相之長才不得其位命屈當代慶流後昆有外孝孫為吾賢帥以忠許國以順克家揚名顯親自義率祖推恩外族歸美前修俾追八座之榮以輟九原之歎可依前件勅李氏族茂本支行光內則柔明繕性和淑保身輔佐良人克諧家道訓成賢女作相令門善積於中福延於後段公威德當流慶於外孫令伯孝心願推恩於祖母式遵贈典用贊德芬宜從大國之封追正小君之命可贈趙國夫人勅吏部尚書蕭俛頃在台庭時逢郊禮大行慶澤先及輔臣當延賞於允嗣願推恩於友愛厥有典例因而從之咨爾弟伸可恭成命可河中府參軍勅少府少監賈疄行人之官官必有介所以敬王事而重國命也以爾疄稟訓台鼎飭躬搢紳自登班行多歷年祀恪勤官次保守令名斯可以倅貳使臣諭申朝旨宜假憲秩仍加命服以示兼寵俾之出疆况繼好二邦奉辭萬里副車之任選亦不輕茲吾使能期爾復命可依前件勅廬龍軍節度判官檢校刑部郎中張屺司徒總言爾從事於幽冀之間有年歲矣嘗委事任備觀器用務叢而益辦職久而彌勤頗出輩流宜加獎擢况公侯之嗣幕府之英餘慶所鍾有才如是今以名郡寵而任之旌善勸能仍兼中憲可廬州刺史勅朝散大夫檢校左散騎常侍兼右金吾衞將軍御史大夫上柱國賜紫金魚袋韓公武我元老之令子也孝于家忠于國故出則秉旄金戊入為執金吾寵任益崇謙敬彌著而勤於夙夜疾癘所侵上陳表章乞就頤養夫環衞之列心膂之臣雖親信之寄則同而勞逸之間或異宜輟繁重俾從便安可檢校左散騎常侍兼左驍衞上將軍御史大夫散官勳如故勅朝散郎行秘書省秘書郎姚元康儒林郎試太常寺協律郎鄭懿等益部浮陽皆大征鎮也文昌全畧皆賢將相也而能以禮聘士以職任才多聞得人咸樂為用况爾等籌謀文藻各負所長苟能贊察兼掌奏記孜孜不怠翩翩有聲慰薦褒升其則不遠元康可試左武衞倉曹參軍充劍南西川觀察推官散官如故懿可試左金吾衞兵曹參軍充橫海軍節度掌書記散官如故勅右神策軍忻州行營兵馬使試太常卿楊元諒等夫才不錄則勸善之道廢勤不賞則念功之典缺而元諒輩凡三十人咸列禁戎遠從征討臨難有身先之勇奔命無道敝之勞宜以祿秩酬其忠効所謂材不失選賞不逾時亦欲使為善者不疑有功者速勸也可依前件勅李益等去年春朕以陵寢事大哀惶疚心而益等齋慄奔命各率其職俾予孝道型于四海何嘗一日而忘之即命有司舉常典凡爵之高下視執事之重輕有司亦能遵我成命第而次之進級益封無有不當由益而下爾宜欽承可依前件勅王計等咸以材畧載筆從軍藝學智謀霈然足用多歷年祀備嘗艱危進退周旋不聞失道司徒宏正詳奏以聞因以竹符分命試吏而蓬萊二郡各介一方牧人者但不擾其心不奪其力則雖華夷南北土物不同皆可以自足自遂矣宜用此道往安養之可依前件勅某官衞紹則服勤藩鎮敷奏闕庭奉主帥之表章達軍府之情狀嘉其忠効宜可褒升俾洽新恩用充舊職可依前件勅渭南縣尉庾敬休等咸文行清茂士之秀者宜從吏列擢在朝行各隨才用分命以職司諫執憲佇有可稱勅某官韓季重上將臨戎陪臣將命詳其奏報頗盡事情特加寵章用獎勞効王官憲職以示兼榮可依前件勅安南兵馬使封州刺史兼監察御史袁幹委質藩方稔知戎旅嘗驅寇盜累著功勞故命遷領郡符超升憲足以安荒俗耀遠人敬而承之無替前効可封州刺史勅某官吉少華等距河重鎮分陝近藩俾遏寇虞實資士旅勞既同力賞宜徧行次第其名書於勳籍可各賜勳五轉勅夫疆理天下壤制四方乘時省置何常之有故方隅未寧務先經畧則轉委方伯以總統之及兵革甫定思宏風化則並命連帥以分理之朕常以幽薊一方環封千里延袤廣莫專制實難屬元戎改轅新帥進律因而置制以叶便宜葢王者弛張變通之要也京兆尹盧士玟為人端和為政寬自尹京輦人甚便安今司徒總籍甚爾名叶從人望河間列郡乞委士玟因而可之必易為理况新造之府經始之政勞徠安輯是爾所能俾珥左貂兼執中憲寵任不細勉哉是行可依前件
