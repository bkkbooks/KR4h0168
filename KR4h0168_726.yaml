front:
  text: 全唐文欽定全唐文卷七百二十六嘏字乾錫舉進士復以制策歷邢州刺史改考功郎中擢中書舍人李德裕斥為崖州司戶坐書制不深切貶端州刺史
  hash: sha256:64d6b0f54e306f3deac42fa3a640169520f1ec992110e1d82a8d7d59ae822ca5
  markers:
  - {type: head, offset: 14, content: 崔嘏, id: KR4h0168_NFKB_726-h1, level: 1}
body:
  text: 敕前西川節度使令狐定夫言語侍從之臣朝夕論思獻納必求明誠端厚文而不佻者以備吾之顧問今以定業茂儒素道光縉紳恬於晉取之機鬱有貞方之譽踐歷華貫周旋正途佐台席而籌畫居多登副車而聲猷甚暢從知既久畢志方歸嘉其委質之誠寵以附蟬之貴阮貂換酒潘直逢秋既榮高閣之居亦有達人之美勉思清切以遂優游可依前件敕闈冠三省之高奉常列九寺之右凡所選擢必俟才賢惟爾璹以賓筵雅度早踐霜臺儔以正殿雄詞超升省署文雅當於題柱列郡洽於褰帷迭居二尹之雄並處亞卿之列而皆本以明敏發為文學玉在涅而不緇金投火而彌徑眷言久次是用遷升我有絲綸期汝論駮我有金石資爾諧和無忝官常自貽公讓璹可給事中儔可太常少卿敕居諫納之地副銓綜之司致豫聰明適彼倫要自非端方正直之士檢身御衆之才則何以輸及霤之忠誠奉提衡之藻鑑爾等皆擢秀瑤林飛華桂苑早登俊造共許清貞入憲府而自竦孤標歷文昌而更光列宿分符茂績遠繼於龔黃視草雄詞舊推於賈馬是用擢居右省陟彼首曹爾宜徵五諫之司佐三銓之任無疑逆耳必在精心勉服寵光益揚善價可依前件敕朕高居穆清端拱思理尚慮旒纊蔽吾聰明故精求諫納之臣投我藥石之語而天官正郎地連藻鏡職佐銓衡必資明幹之才以副經通之目以勗端方雅厚正以操心以簡求和易周旋敏於臨事而皆富文奧學早升俊造之科利用長才纍處重難之任是用擢於粉署置在禁垣升自外郎膺茲首選爾其詳求五諫左右三銓勉思及霤之忠更致提衡之美勗可右諫議大夫簡求可吏部郎中敕禮部郎中知制誥李訥等彰施帝載潤色王猷朝出乎九重夕馳於四表必資其金相玉立之器懷其騰蛟吐鳳之才以發揮人文流布天澤而臯繇作士謨明以贊至理定國持刑公平而昌後嗣使匹婦無霣霜之嘆遐氓離朿溼之寃陰陽氣和手足可措必在乎理獄之官明慎用刑哀矜守法今訥言等皆以器能犀利文彩光華演綸推倚馬之工剖竹著懸魚之化以茲遷擢誰曰不然勉吾右文恤刑之意也訥可守中書舍人言可大理少卿敕居禁密之地聞善則遷當演綸之工有勞斯陟此所以光吾侍從榮彼縉紳翰林學士司封郎中知制誥裴諗家承茂勳身有羶行早襲弓裘之業克隆堂構之基間淡自居囂浮不染自擢居內署掌茲制命謹密無曠馨香有聞問對備見其一心敏捷共推其七步况臧孫有後且聞得鳳之音枚乘多才雅蓄雕龍之妙爰因滿歲授以正名爾宜思宏用以致君勵精誠而正已慎爾聞見奉吾周旋無彰溫樹之名克保詞林之美可依前件敕傳曰有功德於人者其後必大伊爾烈考勤勞王家出有平寇之功入有致君之志式多令嗣以承清基惟爾諗生而有文弱不好弄中蘊明敏外涵清和藹然君子之風蔚有賢人之操自擢升翰苑入侍禁闈勳必知機靜而適道大玉之韻清越以長小山之姿貞芳自茂是用資其粉澤演我絲綸斧藻方耀於鳳銜揮灑更期於鴻筆式光帝載無鬱王猷可依前件敕載筆赤墀之下掌禮曲臺之中注記行而鉛槧是資褒貶當而縉紳知懼顧茲所職豈易其人而擢備宮僚亦為佳選以瑤貞規素履紹克儉之家風以碣秀質清門承定傾之祖德以瞻雄詞麗藻躡珠履於賓筵以景表退跡安時寄霜華於憲署我之自得爾亦薦聞各膺寵擢之榮自有雲霄之路可依前件敕臺郎望美詞苑地高粲列宿之輝華參起草之宥密自非風儀玉立器宇川停摛掞天之雄文蘊擲地之清韻則不足以膺我妙選為時美談翰林學士考功員外郎裴諗襲慶于門騰芳戴席端莊抱吉士之操謹默得賢人之風灼若春華皎如瑞素自擢居文囿參侍瑤墀進對益見其周詳詞旨不離於雅厚是宜仍金鑾之舊職榮粉署之新恩保乃休光更流芬馥可依前件敕監察御史蕭鄴吾內有宰輔重德作為股肱外有侯伯虎臣用寄藩翰至於參我密命立於內庭即必取其器識宏深文翰遒麗動能持正靜必居中指溫樹而不言付虛襟而無隱此所以選翰林學士之意也前此數者鄴皆有之是用拔於㣥倫置在親近勉爾端行副吾精求可依前件敕吾方以文化天下期於太和故左右侍從之臣詞林宥密之地必求其性識宏茂文藻遒麗以備顧問以參周旋聞爾清直無徒雅厚自處富有天爵蔚為詞人是用輟自儀曹置於翰苑惟端靜可以承渥澤惟敬慎可以期遠圖資爾令猷副我殊選可守本官充翰林學士敕禮部郎中宇文臨吾外有輔臣以匡大化中有股肱以總樞機而發揮絲綸參侍顧問司我耳目廣豫腹心惟是柬求擢居近密以爾詞賦清才圭璋雅韻抱孤貞以適性竦端介以操持處衆流之中不為自異居慎獨之際克念無私由是選自文昌升於翰苑爾宜一心以奉職勤百慮以省躬勿怠疏遠副吾恩顧可守本官充翰林學士敕右拾遺集賢殿直學士沈詢參宥密之命處侍從之地居可以備選用於他年動可以承顧問於此日不獨取文翰遒麗之才亦必求孤貞雅厚之士惟乃祖在建中初以懿文奧學司我元良乃父當元和中以清規茂行典我文誥能流積善之風鍾爾挺生之秀是用思彼前德擢於後來置在禁闈光我詞苑爾宜勤其身以勞夙夜宏其用以新志業無俾枚臯嚴助之流獨承榮於漢帝况職當視草官列諫垣宜思及霤之忠更潤演綸之美可守本官充翰林學士敕提六聯之紀綱總一臺之樞要自非才識兼茂風標峻整則何以統攝㣥吏肅清衆官前天平軍節度使崔蠡軒裳積慶文學藻身黃鍾涵待扣之音青萍蓄善割之利早分列宿獨膺題柱之榮入踐禁闈共許演綸之美纍居重任亟換名藩貢籍銓衡必登於藻鑑觀風馭衆益顯其長才廉車扇愷悌之仁將席蘊韜鈐之略情惟戀闕志在推賢詞必由衷事多餘美顧我任才之意當爾受代之辰言念前勞載加新命爾其瑩秦臺以分美惡操漢律以檢尤違必俟端標用分曲影可依前件敕朕嗣膺寶位繼統洪業思與藩方大臣披其雲霧况中外遞遷勞逸更處當用才之日急病是思及求舊之時任賢斯切而中臺為政理之本冬卿亦統任之基方藉舊僚以裨新政前易定節度使盧宏宣自薊門陷戎爾以舊族遷于洛京惟是冠昏喪祭之儀禮讓敬恭之則推於四姓耀此一門而能自以文業吏師馳驅當代歷踐華顯載茂休嘉纍登齊壇常領京邑功有成效人無間言及罷將軍之麾幢解刺史之印綬來朝絳闕益見丹誠是宜正彼六聯升于八座曳文昌之履通祕殿之香更增北斗之光輝或重南宮之喉舌承我休命爾其敬哉敕河南少尹盧懿總天下之缺員必先閲於吏曹郎然後達於銓官自非神機穎利識用周密則不得備於斯選也以爾詞鋒絢練門緒清華儒席許其溫恭士林推其端厚自分曹洛汭二尹三川淡於趨進之途鬱彼靜專之操晦跡而囂浮自遠長鳴而風雨不渝是用徵還首曹榮以題柱必能佐持衡之重任聯藻鑑之清輝勉服官常無孤所舉可依前件敕韋博等頃以邊城命將肇建麾幢當警塵未息之時及烽火尚明之日故於粉署妙選星郎欲以贊充國屯田之謀佐武賢備戎之術既而賓筵有耀幕畫已多薦居於沙漠之中茇舍於戎旌之下亦既勞績亟更歲寒念其裹革之誠更復握蘭之美而煥本以文學傅之吏能克踐正途久司宗祏今以三農務急九扈才難宜遷丞副之榮用陟亞卿之列無忘素履各服新恩可依前件敕分列宿之位應覆被之榮入可以封還詔書出可以分領符竹優游於粉署之內談笑於錦帳之前苟非清才不在斯選以韜文章炳煥獨步詞科以同靖門胄光華深通聖典荊玉韜含章之美霜鐘蓄待扣之音是用升彼名曹擢於藝閣文昌之地職業非輕式佇彌綸更期遷陟韜可司封員外郎同靖可金部員外郎敕凡在南宮必資望實而儀曹之選益難其人以爾松篁清韻瓖璧貞姿以文章為積行之基用規檢為修身之具飾外以舉其衆能居中自持其謀益佐雲幕而鬱有佳聲處霜臺而介然獨立玉墀之下益振金相載筆之間共推直史是用遷于粉署光彼文昌勉膺起草之求無忝握蘭之美可依前件敕由憲府而入文昌自藩方而升粉署既為佳選亦舉滯才爾等皆以文藻發身馨香馳譽早茂閨門之行久從賓幕之遊或賜告經時頗積退藏之美或綱丞上請雅膺選擢之科祠膳清曹省闈右地勉思起草無念應星步馬可祠部員外郎陟可膳部員外郎敕著作郎李渾等台庭積慶文苑馳聲玉讓其溫華山挺其芳茂幼聞詩禮在家推鯉也之賢夙稟清英行已有藹然之舉蓬邱探討蓮府周旋頗聞編軸之功雅得副車之體綱曹妙選粉帳華資方承綵服之榮共許應星之美為郎匪因於父任題柱自奏於帝知勉服鴻休更觀驥騁可依前件敕司國計者統天下之財貨量入以為用在於賦有餘也事歸一途故必取其疆力多聞分掌薄籍俾操剸無滯精明莫欺宏正上言以爾嘗居憲署亦領郡符通於吏術素傳儒業是可以分列宿之位理聚人之財爾其佐我才臣資於國用無俾健酷以罔遺利可依前件敕具官蘇彰嘗以藝能再升憲府聞其奉使亦甚稱職往來萬里勤勞一心而臥疴經時賜告逾歲遷居粉署用應星文勉思覆被之榮無忝握蘭之美可屯田員外郎敕大理丞溫璋朝廷用人不獨取名聲暢茂曹唱㣥和而命之至於御史府尤藉才能以責官業前時陰率衆吏構成姦謀焚我帑聚其主事以火事上聞付于理寺而璋於㣥疑之中獨出明見比令左驗事則果然此真憲府之任也俾戴豸冠仍加朱紱勉思奉職無忝我用才之意可依前件敕前義武軍節度判官盧就東川節度判官爾朱杭等侍御史居其府則掌領推按糾繩愆尤立於朝則正其視瞻峻彼風範官號清重才資鯁直拔而用之不在階級爾就爾杭立身有文能用嘉猷參于將席憲丞上請咸曰得人嗚呼神羊在庭屈軼在砌觸邪指佞二物可師無為畜縮以孤我誠臣之舉可依前件敕右拾遺李穜等御史府有三院凡所選用其器得以專達必取其剛廉徑健才行兼至者則可奏而授之今穜朴重有文直而不訐司我諫納宏益仍多以澳洎達咸用詞學器識纍參賓畫研朱益丹瑩玉無玷皆可以修明憲職振凜霜標屈軼有靈獬豸不懼惟此二物爾其師之可依前件敕監察御史鄭韜御史府三院轉遷雖曰彞制至於用捨進退亦繫於一時之事迹以韜立志甚賢居官稱職霜簡在手風標竦身其長吏言請用遷陟班我殿內升為近臣屈軼神羊無怠前志可依前件敕監察御史蔡京忠武軍節度副使趙滂桂管副使鄭魯洎陳許觀察判官薛蒙等朝廷之選御史雖委其長吏得以專舉然亦詳求物議然後取舍無私憲丞上言滂與魯洎蒙皆業於儒術傅以吏道其剛明徑果可委以擊斷其溫敏莊肅可資其檢繩而皆久滯藩方未升朝序吾且循其聲跡頗契符言是用擢自賓筵置於憲席而京再覆大獄吏不敢欺滿歲當遷吾何所吝京可殿中滂可殿中魯洎蒙並可監察敕御史府居朝廷之中傑出他署蓋以圭表百吏糾繩四方故選其屬者必在堅明徑峭臨事而不撓不獨取謹厚溫文修整咨度而已爾等皆以詞華升于俊秀從事賢侯之府馳聲館閣之中籌畫居多操持甚固是宜持此霜簡峻其風標使避馬之謠不獨美於桓典埋輪之志無所愧於張綱勉服寵榮無忘職業可依前件敕祕書正字集賢校理李毗等披書殿讐校之文秉東觀鉛黃之筆必選其雄詞擲地敏學通天者而授之爾等皆以後來之英前達所許人推領袖名於縉紳或荊山蘊片玉之姿或桂樹擇一枝之秀五常師於中道萬里視其長途况我台臣監領二職以爾上請是謂得人宜思結綬之榮各勉分飛之勢推輪覆簣其在茲乎毗可藍田縣尉充集賢校理浣可興平縣尉直史館敕兵部郎中楊魯士等朕方以親人之任重其守宰欲使中外迭處周旋可觀至今於尚書省御史府以時序遷者亦皆推於公議復中念孔門以政事文學列為四科而魯士等各擅其能久而益勵付之劇縣分以名曹必能展剖繁析滯之才副題柱含香之美且有後命爾其敬哉敕前知嘉興監盧攸前知湖南院韋宙等國朝之制自外府正郎至於郡丞半刺不由會府之所選授者中外臣僚歲終得以聞薦而有司鍛鍊其簿籍參校其資級夏五月各以其名來上惟爾攸等或以文學再登科第或以才人早居賓幕或以利用纍司榷管之繁或以薦延久佐州邦之理嘉乃成績俾其敘遷至於赤縣銅印之榮三川綱轄之任皆吾之慎選也爾其勉之敕夫任事之官親於人者莫切於令長也非其才則百里告病得其人則元元獲安况授其臣在乎所舉獻狀推允用觀爾能雍可河南府濟源縣令餘如故敕右補闕元壽縣令親人之任在昔為難况我每念疲氓思於共理爾有利用可為此官宜輟任於諫垣俾足才於宰邑解牛利刃來鹿殊祥勉思三異之能無忽百里之地可陸渾縣令敕鍾陵奧區楚澤全壤控帶七郡襟連五湖人推征賦之饒俗擅魚鹽之利靜則易理動則難安思得良能以臻富庶選求之下是舉僉諧中書舍人紇干臮氣惟雅茂才實變通黃鍾涵待扣之音青萍蓄善割之用早以俊造播其馨香霜臺竦介立之標蘭省蔚和光之操洎司綸綍益茂聲猷粉澤惟工克贊鳳池之美溫華自潤皆推鴻筆之資蘊商也之文可以華國布求也之政可以觀風是用輟於演綸付之廉問必能宣我大化蘇其遠人佇聞來暮之謠必有借留之思爾其簡以臨衆清而自持惠養益厚於疲羸操斷無遺於桀驁一方之任不愧於前賢五字之精永光於禁掖仍加中憲式峻外臺可江西觀察使敕地連五嶺川朿三江直千里之奧區雜夷風之阜壤靜則可理動則難安思得長才以綏裔俗求於僉論多曰汝諧給事中鄭亞識洞古今情惟端願富三冬之精學控六變之雄文早升甲乙之科雅有詞華之譽周旋粉署堂堂表題柱之榮糾正霜臺肅肅有埋輪之志人推長者時許多能洎入贊黃樞超居青瑣彌縫闕漏衮職以之無遺參酌憲章國典由其益振朕方宏理道志切惠人精求廉問之才用廣移風之化爾宜將我誠意布其惠和撫俗必務於潔廉奉已宜思於簡儉無以地遠而忽其簿書無以官尊而怠於統馭將期富庶必在嚴明承我寵榮勉思報效敕隴陝之西地連番境雖舅甥和好絶塞無虞而邊徼撫循長才以藉爾武能禦寇智可圖功早推奉國之誠共許統戎之略及位分六校職長千夫爾彰夙夜之勞益盡爪牙之用是思寵擢委以疆場爾宜推赤心以任人勵元甲而訓士約以奉巳忠以報君無興踴虜之功更起事邊之計靜能制動安亦慮危勉而行之富貴可保將表戎旌之盛仍兼專席之榮可隴州刺史兼御史大夫充本州刺史防禦使敕考功郎中薛廷範等吾命重臣往鎮淮海其所選署賓僚得以參用朝列伊爾廷範為時所聞可升天子之堂早入賢侯之幕周旋不忘乎中道出處必踐其正途輟茲考績之能俾倅戎㫋之盛爾能以侍君之道以奉帥則無往而不適矣惟孜與球皆鄆之舊僚也能以通方佐成茂績至今庸蜀人多懷之至於參佐計司主領院務統兩地之榷管專五銖之鎔造各從其請以展良能勉副已知用光所舉可依前件敕前江陵縣令盧戡等藩方之命寀寮雖得以上朝廷亦擇其可者而授之至於升副車首賓席自非賢才孰充佳選戡尚義有聞積學多識去於榮進樂在間放以是為請宜乎得人由山立而下或以吏能發為官業或以詞藻蔚彼雋髦各從所適之宜以廣用人之路銀章赤紱耀彼華筵可依前件朕以靈武重鎮控制西戎故選於和門付以油節思得幹用以佐參畫如聞齊之自得科名留心政術奉沙漠之使佐榷管之司口不告勞人稱奉職某與思謙臨洎思退皆鑽研文學承襲軒裳暢彼聲光端其操履是可以佐樽俎於台席奉指教於才臣而八達九衝曉巡夜警亦執金吾之重務也咸允章奏無忝所從可依前件敕大厦將搆必藉良材雲幕既開是資髦士况易水居常山之北容川當桂嶺之南惟是徐方俱為重寄凡所選用誠皆得人爾等或以文學進身或以簪纓襲慶勉思公舉無忝嘉招至於佐戎幕而靜轅門輯政刑而撫凋瘵亦副車之任也正郎命服吾豈吝焉可依前件敕田密等並以才識聞於所知主帥上言計司有請各從所便分以命之仍假憲臣式彰優寵敕前綿州刺史王叔政等罷專城之印題別駕之榮休摧虜之策遷語掾之任此朝廷所以舉才而振滯也政緣吏升珩以文進分符得理人之術佐賦有羡入之績隨薦實來有司上奏爰因所舉各類所能厚祿高名無忘效用可依前件敕前藍田令崔郁前登封令鄭倚前陸渾令李元夔前京兆尹戶曹李廡等撫鰥惸奉陵寢本於廉白藉彼恪勤爰因參調之資是奉選求之命銓衡之下雖欲掄材資品之間固難專授勉膺獎任無俾蔑聞郁可興元府南鄭縣令倚可鳳翔府天興縣令元夔可莊陵令廡可高陵令敕李瑤等京縣理劇綱曹糾違書殿讐校之清閒光祿膳饈之承副從容於蓮峯之下籌畫於雲幕之間苟非才能不預斯選以瑤等或職任修舉或文業優長用是被之寵光旌此休問各從其適無忝已知可依前件敕國之肆眚必布霈澤所以惠及於下也爾元裕國之重臣守我封部能以惠化富吾疲氓其地分內外之任盡勤勞之誠皆以所能舉其官業是用因茲大慶錫以崇階各敬爾儀無忝休命可依前件敕設堂陛所以辨等威置階級所以彰貴賤苟可授者吾無愛焉爾等或司我繁重夙夜無違或侍吾左右勤勞不懈而皆溫和植性廉潔終身方將委以腹心豈止加於爵位爾其率職以事上用降以持滿勿以貴而驕人無以高而自忽保茲貞吉以永休光可依前件敕記曰爵人於朝與衆共之蓋以階級既崇寵榮斯異疏封錫命列土承家爾等或才推粉澤豈唯五字之工或任重藩垣自茂一方之績或官居象月或位應列星或擁緹騎而分九衢或奉瑤墀而總六尚皆聿修官業克紹家風爰因慶澤之辰更舉山河之誓宜思帶礪永保簪裾可依前件敕慶澤可以示恩榮貴階可以顯勞績至於敘進則有彞章况爾等咸以儒業吏能纍更事任久而益茂志且不渝方承覆簣之勤宜錫崇基之漸封妻蔭子斯足為榮可依前件敕上造出秦中涓自漢古所以敍武功今所以寵文德施恩布澤今古同途爾等皆道光儒業任重藩維才膺歷試之難德茂歲寒之操或卿曹副二多推幹用之方或正殿贊陽共許詳閒之美况橋山奉職鶴禁來儀既讐事往之勞亦舉優賢之典河山在目帶礪為期克保初終永光胄緒可依前件敕夫門交棨㦸身耀金紫抱孫可蔭顧室增封自非峻級崇階其何以致爾等或以強學潤已武略登壇或望重瑣闈輝華於粉署或道光憲席輔相於青宮或以長才纍更事任或以吏道久領郡符用則殊途事皆一致爰因慶澤以布恩榮勉思階級之高無忽柔謙之誡可依前件敕惟善是求有榮必報命其開國賜以崇階轉遷於禁掖之間優寵於樞機之地我有承命爾其敬之具官某等周旋左右出入宮闈盡誠敬於寸心守貞廉於直道皆能介然自處蔚有休聞念其歲月之勞被以寵章之美宜思奉國永保宜家可依前件敕西川貴族南國華容代有功勳門多閥閲早以懿德媲于元臣既推內輔之才頗蘊中閨之德是宜疏封表貴開國旌賢蘭儀永配於金夫蕙問更光於石窖勉思健婦以佐良人可封涼國夫人敕古者男子生則射以桑弧蓬矢蓋取欲使有事天地四方也及長而貴則光其六姻况當高有親堂室自立不有嘉命曷彰令儀具官竇浣等母某氏等或以衣冠胄允或以勳績緒餘皆知訓子之方早識從夫之義爰因濡澤各俾增封式示恩榮用光閨閫可依前件敕權知京兆尹韋正貫詩不云乎京邑翼翼四方是則故趙張邊延馳名兩漢而不疑兼以儒學取重當時斯任也吾豈易哉爾敷用政術列為殊科再升文字之途一舉雲霄之路近者拔於郡府以尹京師有抑強扶弱之心得通變適時之用煦若春日肅如秋霜干將淬而投刃皆虛騏驥馭而追風自遠重以郊天盛禮發號鴻恩訖事而物力安舒設禁而寇攘帖息是用嘉乃成效寵之正名爾其奉上思盡臨事思權轄健吏而惠窮人簡簿書而提綱目處劇勿紊居間勿遺俾椎剽絶迹於九衢枹鼓息鳴於五夜克揚顯績用繼前修可依前件
