front:
  text: 全唐文欽定全唐文卷七百八十四穆員二
  hash: sha256:f9418493e94dca0de6f2092c485946f9c284fd2a51d05c54bbcbc9e83ad88b8b
body:
  text: 皇唐相國博陵公姓崔氏諱渙字某佐元宗扶正厄運保維宸極戴肅宗紹復大業底綏生人事代宗朝羽儀百辟歷官二十三享年六十二以大歷三年冬十有二月二日薨于道州刺史之寢明年歸祔于洛陽北邙山今上六年追贈尚書左僕射夫人滎陽鄭氏華陰郡太夫人以子貴也公三娶前夫人生冢子常山公公之清德重望洎天官亞相之位事後夫人滎陽鄭氏恭公之理命以無違為大而黽俯拘忌出入彳亍恤推周公合祔之事凡龜從筮逆者數嗚呼天不以西漢韋平之美惠于吾君使常山下世永懷不集故有沒代之庸著遺令焉貞元元年秋九月季子京兆府三原丞揚孫前渭南尉元方哀奉常山之志逮乎在殯是月壬午啓博陵公之明月丁酉以華陰郡太夫人洎繼夫人隴西李氏之喪歸禮也公大父諱元暐中書令博陵王於皇唐有再造勳事具國史考璩禮部侍郎襲博陵王與魏元忠趙貞固為友出處齊名公則禮部之第二子也天寶中歷屯田左司二員外郎出為歙州刺史換綿州錫金印紫綬大駕南巡以至誠大義感悟聖主中興之業見於言下擢拜門下侍郎平章事靈武接位與上宰房公琯奉册書國璽唯新景命是時也中原有羿浞之亂東南有吳濞之釁乃三分天下之一以八柄付公俾公仗節督護河南山南江南淮南之地凡受脤專征者由公以律二千石以降唯所遷置公於是度用均賦息人繕兵外攘四封內敘多士望高寄重怙寵者排之降左常侍領杭州刺史俄轉常州徵拜祕書監太子賓客大理卿坐失繫囚移信王府傅轉尚書左右丞吏部侍郎御史大夫大歷中元載顓政中外附之公對揚內庭數其不赦之罪上頷之未諭公抗詞焉寺人屬垣漏言于載未幾有道州之役逞憾故也公標鑒遐明姿度宏粹松茂玉潔風清雨潤文以經邦為用學以為已為宗承祖禰以付子孫者清白孝友其哲人哉夫人磁州刺史曾之孫潁州太守長裕之女年若干捐公之館子曰摐實常山公繼夫人舒州刺史紹之孫左羽林録事參軍晃之女年若干遺公之祿子曰摙仕萬年尉不幸早夭二夫人地清天和夫賢子孝四者均有之清之發祥和之應壽賢之用貴孝之報榮四者皆違之哀哉孝孫元方痛先人存歿不伸之志其號天也與吉凶俱咨于叔父揚曰先志未從不敢以見先祖是日也奉二夫人合於此室既定而常山祔焉員常山門吏見託銘石其詞曰於穆元輔歸全故邱列樹已拱清風悠悠邈矣夫人同凋上春配忠生孝翊聖懷民賴及於國慶達其身五父雙啓九泉同閉遺厥嘉祥及爾昆裔皇唐九葉天啓元聖運并中否蓋有苗不恭舜德於是乎盛獫狁孔熾周道於是乎興而我相國太保義陽王文武命代經綸應期柱石將傾舟楫未濟腹心王略爪牙天罰芟夷大憝覆冒生人公諱抱真字太真本姓安氏世為涼州盛族高祖修仁佐太宗征伐益大其家寵位本州啓封申國曾祖永達開府儀同三司左驍衛大將軍祖懷恪陳州司馬贈兵部尚書考齊管贈太子太保或才光于時或道屈于命從父兄司徒涼國公抱玉事肅宗代宗勳著王室錫以天姓代宗之初僕固懷恩怙兵犯順公時再命汾州別駕隨州陷焉懷恩雅奇公才而懼公之不同所以待公與衛公者偕切公竟以智勇自脫投身京師上方以懷恩為憂不啻于祿山思明之難遣公進討公曰郭子儀領朔方之衆人多思之懷恩因人之心以邀其勢紿其衆曰子儀為魚朝恩所戮劫而用之今若復子儀之位可不戰而克上嘉而納之其後懷恩父子皆敗朔方有衆洎西北兩蕃望子儀而頓伏皆如公策拜殿中少監擢纓清列澤盛當時卿大夫賢者從之遊朝論美價於斯為重大駕幸陝欲遂都洛陽公入陳婁敬子房之説且曰臣見犬戎今已遁去翌日長安告至如公之言代宗器公之才將試其用詔兼御史中丞充陳鄭澤潞節度留後公以所奉之主則從父兄司徒公乃深惟大雅明哲之義罷請留府願效列郡優詔從之拜澤州換覃懷二邦之人得公失公皆如父母未幾復統留府之政纍加御史中丞左散騎常侍并領磁邢二州增秩加邑國之報也今上即位用聰明神武照臨不庭命方叔召虎鎮衛四國是用授以黃鉞俾以專征而方命之徒畏威先舉田悅以暴兵五萬寇我東鄙劫邢州圍臨洺守將乘城如山不拔忿志且恥既悉索境內且乞師于鄰掘地干雲壕壘數合上絶飛鳥下及黃泉公躬執鉦鼓屢挫其鋭詔命太原節度使今侍中馬公與公合從且曰盡敵由是摧堅陳于雙岡釋重圍于二城殲逆徒於洹水凡三戰三北退伏于魏窘如囚拘逆將朱滔誘今司徒王公合范陽恆山之衆來為悅援公與馬公洎㣥帥屯于魏橋相持卒歲無何京師有朱泚之亂鑾輿外次㣥帥失圖蒼黃還師惟恐在後公徐統士馬退次洺州旋奉詔書俾勤所職于時將卒倦戍久矣及其還也如川壅而潰勢不可遏公以至誠大義發為號令俾四郊激勤王之志三軍忘思歸之心進師漳河獨壓強寇先是與公戮力太原朔方盟津洎神策四帥十萬之旅一朝雨散孤軍特立天下危之公忠貫天地機先鬼神動如雷霆峙若山嶽銷難於未眹成功於無戰氛祲四廓豺狼坐馴上在奉天躬禹湯勃興之德曰萬方有罪罪豫一人發號改元與人更始公奉揚天澤浹于四鄰增日月之明廣雷雨之施由公而復爵位者今司徒王公洎魏博青齊三帥凡三道數十州百萬旅歸于聖理公之功也朱滔以幽燕徑卒獯虜驍騎將欲橫行咸洛崛強中原輔其兄泚窺伺神器公以奇謀正義間説成德成德與滔重婚姻事同艱阻與公交鋒對壘積為敵讐乃為國為公忿滔如嚮將欲自竭先誠於公投我以可疑報之以必信公與王公之相見也王公旌斾車騎亘如長雲晦日蔽天風驅而至公以數騎徑造其前王公叱去左右躍鞍而下交臂號呼聲聞昊天即日兩軍億萬之師悉如兄弟公遂入其壘授之以畫明日合勢大破滔軍于涇城之西滔鼠竄舊巢至死不振逆泚折臂㣥凶奪魄諸將聞風益壯踵武獻功既而妖彗滅星足廠田坴復鯨鯢戮海水清而振曜靈威興復昌運自我而始其天啓與公使將如臂使卒如指決勝于千里之外者則河中拔淮夷殄分彼成功什三四焉初臨洺之解遷工部尚書洹水之勝轉兵部魏橋之勤加右僕射漳濱之固轉左僕射同中書門下平章事朱滔之敗遷司空食實封五百戶貞元初上有事于上帝列祖公得請會朝宣室受釐明堂布政對揚丕顯錫命蕃庶方寄股肱而藩屏是切方屬周召而桓文是賴數月受命還鎮公之鎮於潞也垂三十年撫五郡四封之人作之醫作之師生成之富庶之耆老詣闕願刊金石詔俾時宰揚其頌聲乃者大梁東平二帥交惡僉使上介質正於公公以天道助順神明與直裁而辨之司徒王公以不二心合公一德資稟明略有如元龜議者謂上黨之俗地狹尚力氣寒堅冰蓋戰國武卒之餘也故長於步冀之北土馬之所生故長於騎而公與王公天下之傑也各因其俗之所長以伯諸侯嗚呼使公將步王公將騎以征四方以獎王室亂臣賊子誰敢萌心上天為何而降公疾願守謙損固辭崇高請罷三公拜章七還天子重違宗臣之請又迫蒼生之望退授僕射而安危注意之任猶以煩之十年六月一日薨于位春秋六十有二皇上震悼輟朝三日所以贈襚之品禮極數殫中貴護喪達于洛泗冬十月九日葬於澠池祔先君太保之塋禮也公自生勳門幼被儒術長覽太史公班孟堅書服從衡之言至於兵法尢其天性而體乾之剛利坤之貞煦春之仁厲秋之義蹈禮之節包樂之和是以文昭扶翊武著戡清行備九德政成百度忠與勳偕業與時併兵符相印與身終始開國傳家與國無窮盛矣哉公再娶于鄭華宗令德其偶如一前夫人滎陽郡夫人皇洛陽令伋之子也不幸早世後夫人沂國夫人皇洛州壺關令鞏之子也昔以賢輔貴今以哀報榮既大公門且肥公室初公之棄三軍也嗣子前殿中侍御史緘為墮淚所迫俾嗣公位緘曰為先人之嗣者苟生非忠冒死非孝深惟自免之計既而忠孝全焉次子幼成季子幼清次女適清河崔宏雅有幹父裕母之美長女幼女並從西方之教各得其旨緘等以公成功盛德列于史策流于歌頌傳于故老之口巍巍乎其不朽矣若邱壑遷化歲序超忽則貞石是賴不可以不識焉爰假菲詞俾鋪元壤銘曰陰陽成歲百物以生聖賢撫運天下以平神武嗣統朝陽啓明照臨萬邦震曜不庭蠢彼昏迷乃命徂征風行主化雷動天聲靡守不固何攻不傾狺狺豺武率馴忠真茫茫氛祲於變廓清入覲于王惟周之楨帝念藩翰復我長城宜錫難老以主夏盟奈何昊穹天椓壯齡善積存沒報窮哀榮勒勳王府遺業生靈歸我真宅封山表塋永閉泉戶與天壤并唐貞元八年四月十六日福建團練觀察使福州刺史兼御史大夫鄭公薨于位明年孟夏己酉朔歸葬于東都萬安山之南原龜吉筮吉即于人謀且曰前望先君俾公之體魄列侍于後與茲山久還顧洛邑俾爾子孫盈如市朝生拜於前沒會於斯公諱叔則字某滎陽人自元魏中書令周小司空金鄉文公穆凡五葉至皇朝遂州刺史老萊代以婚姻德義俱為家法相授公則遂州之冢子也未冠以明經擢第凡五命至御史府又再遷歷尚書省以屯田員外郎介吏部侍郎李卿觀風之命議者韙之李公出納稱職且多貢巖藪幽滯充于王庭繄公是賴轉庫部相國王縉受居東之寄又資公以畫拜檢校吏部員外郎使罷而真凡吏部分天下之疑析無文之中曰廢置清九流之路坦多士之門曰南曹公酌其會通守以貞固七考二職日新厥聞丁繼母艱免服拜刑部郎中皇上即位思與四方萬姓垂家至而日見之制臨遣八使必朝之良公為首冠清選分命于西江閩越之地所至蠲疾所去遺利並命者取而法焉兩河不開命帥梁汴所求卻縠之比為其中軍授檢校祕書少監兼御史中丞充天平軍節度副使之官拜御史中丞廉問東夏俄領東都留守兼河南尹就加戶部侍郎仍再位副相之寵持憲以清明律下牧人以禮讓和俗保以威重懷遠寇不敢犯吏不忍欺扶危以安制動以靜罷鎮歸省轉尚書左丞未幾兼御史大夫撫淮夷反側之俗四牡蒞止萬人革心如風之清如雨之滌復命遷太常卿國有大事主辦多儀加銀青光祿大夫轉京兆尹理行三載惟遭權臣搆愍貶永州長史謫去之日京師鄽空巷隘車不得前怨咨之聲雷動天聽旋以非罪拜信州刺史居數月又有四嶽十二牧之換方以和風清德移蠻貊之風何斯人之幸與上天之佑較彼炎瘴而不勝焉夫人范陽盧氏著作郎侑之女也望申北州德成公家不幸早世事具前志生一子曰約河南府洛陽縣主簿後夫人范陽郡夫人盧氏華宗美行與前人如一加繁祉餘慶續公之榮生二男一女納前宏文生紳右千牛衛備身女未笄是日約奉范陽夫人命舉前夫人柩會公之喪禮也公之為德也溫純深潤高厚博達文以禮樂本於中和犯不違仁慍不傷善滔然如川澤無不容之者及其秉操厲俗好是正直不畏非畏不疑可疑酷惡春秋之左巫疾陰陽之拘忌嶷然如斷山絶巘不可以邪徑造乎嗚呼使公之得志也天下之人非法言不言非大道不蹈此可以為天子大臣未絶遑數其餘哉是以壽七十有一歷官二十有八政朝仰故事人懷遺德門列朱戟家垂清風而遊公藩者猶以不期頤為歎問神明焉約等以為哀報揚名莫如紀述謂員昔備吏末嘗司斯文將期飾終何敢廢職銘曰嗟哉公居此室猗夫人會琴瑟萬安南山瑞氣浮洛陽北闕家聲流敻千祀兮日悠悠唐貞元四年夏六月陝虢都防禦觀察轉運等使陝州刺史兼御史中丞范陽盧公壽六十中疾於位優詔得謝家東都履信里秋七月甲戌終於其寢冬十月乙酉歸於此堂禮也萬安之腹因山而封嵩邱伊流環帶捧抱龜筮叶吉神宅是宜府君諱嶽字周翰其先齊太公之後公子高奚食采於盧因以命氏乃自東漢中郎植及元魏祕書監陽烏第四子都官尚書道虔凡十葉代代得祿其兄子思道所著家譜詳之道虔生齊左庶子昌衛昌衛生隋澤州內部長寶素寶素生皇朝綿州長史安壽安壽生汝州司馬正紀正紀生絳州聞喜令抗惟是婚姻其類為義方相襲禮樂冠蓋侔其盛焉府君聞喜之第二子也發地之祥鍾天之和處為孝而友悌從之出為忠而貞諒從之施於事物為聰明純粹而寵位從之天寶末擢明經調宋州襄邑主簿歷婺州夔州二録事參軍以大理評事兼監察御史始佐湖南觀察之政前帥韋之晉倚之以清後帥辛京杲藉之以立既真拜又稍遷殿中侍御史京杲入覲咨以留府時有驕將數人京杲實父子兄弟之其蹈罪姦令率以為順府君告之以刑辟明之以無赦而㣥帥如故乃盡戮之由是軍政理而庶政舉初朝廷之任京杲也以恩舊用不責之以龔黃之績至是還之不可易之不能留之京師以盡府君之美若是者五載纍錫銀印朱紱金章紫綬加侍御史建中初今上嗣位有自屬部謫官入為相者謂公才膺方鎮授容管經略招討等使未一年黜陟使奏課為五嶺之表轉桂府觀察經略等使就加御史中丞南越獷俗井稅之入鮮具其布帛之幅通流之貨悉異中土府君以美利利之王制制之又每歲有西原之警府君布政㣥盜為人元年季春賦入貞元三年來朝拜少府監上以陝郊之守藩垣二京冠冕諸夏非沃心之臣勿授前此元臣授之是為郡伯原注今相國中書侍郎李公自陜徵拜思嗣其事重難其選府君於是乎有由衷之拜惟事小不敢不戒大不敢不懲日嚴祗恪惟新厥舊由是軍服其嚴明而報之以肅吏從其簡易而報之以理惜乎其自下車及遘癘不十月焉嗚呼有其才無其時之歎不甚於有其時而無其命今之方鎮蓋唐虞四嶽十二牧之職而周漢股肱爪牙之任府君承堯之咨庸舜之俞纍分共理之憂方咨薄伐之效凌風拂翼徘徊于冥冥之間何天奪上心而命孤人望是可以為歎歟府君前娶隴西李氏實姬薑之偶先春早落今也力不及遠未遑合祔繼室以同宗同德而年位異之三子載戣戡長齒未童幼哀及禮洎兄子嘉猶稟伯父永州司馬嶠之命泣血襄事見託於銘詞曰世重五姓冠于百族倬彼山川來宗嶽瀆帝慈蒸黎命分司牧慎選良臣俾之戩穀猗歟府君受天之祿未見其止如何不淑邱隴何所郊原重復瑞氣嘉祥於是乎育前川為陵北地為谷世系德代於是乎獨有唐趙郡李府君春秋四十有三歷官十有二政以尚書郎柱下史分王命於江淮上元元年秋八月十三日遘疾終揚州官舍之次夫人范陽盧氏先府君三年而少六歲至德二年九月乙亥捐于吳興郡長史之館屬以國難家窶靡遑還葬乃各於次而卜宅焉然其引也蓋殯貞元三年嗣子騰世先人之文行仕殿中侍御史惟周公合祔之事得請于龜冬十有一月奉府君夫人之喪至自吳楚粵明月五日遷窆于某原禮也府君諱澥字堅水京源宗派冠蓋功伐史氏志其大家牒詳其細曾祖行敷皇朝曹州離狐縣主簿祖懷一左千牛并州晉陽縣尉父雍問虢州湖城縣令代有令聞而無違德府君生而博厚長而敏達超特簡厲中和直清著書屬詞居處執事非中道不蹈非聖言不聞天寶中擢進士調太子校書當時海內無事縉紳之徒以能賦為賢及門為貴其望登朝也如天之不可階而升而言語侍從主文典憲之列充其選者必第一流府君以通事舍人轉左補闕監察御史元宗季年逆帥兆亂亂成於寵上莫得聞府君奉使朔陲復而露奏其後以直道不可得而親疏為誅其不附已者所中配流盧溪郡至德歲起家宰江陰歷佐晉陵吳興丹陽三郡或參將府張公鎬軍事其佐郡也廉使輒移真守以避府君大率以古良二千石之理為之其佐戎也王師賴焉明年克復二京博求多士徵拜金部員外郎稍遷刑部郎中言達於上而惠及于下者非一上元中帝念宗室大臣總東南節制時危任重咨忠賢以二之詔加府君御史賜銀印朱紱輟為其介府君方勤王侯伯之事啓其所奉道之將行也末如命何夫人皇朝刑部郎中瀛汝二州刺史宏懌之孫吏部員外郎汝州刺史僎之子年若干歸於府君孝友禮樂得之性命越自齠齓聞于家人率是道也移於夫族而夫族之長幼內外受其厚者報亦如之惟府君才中公卿而位止下大夫爵宜難老而年夭強仕夫人憑善之積作賢之合天與之偶命與之違命也雙劍相從萬里同穴始者鳳凰之兆豈吉凶類乎員辱命長僚託志卒葬而已銘曰仁壽才貴天之所大如何李公不卿不艾宛宛內子福孤具美德豐椒蘭年夭桃李似續惟賢永懷奉先成周還葬於萬斯年唐貞元八年冬十月二十有八日前河南少尹裴公諱濟字莊時春秋五十卒于京師靖安里之旅舍明年夏四月朔葬於絳州聞喜縣之故原從先公居禮也高祖懷節皇朝洛州刺史生太府少卿昭昭生蔡州刺史剛剛生扶風郡雍縣令據公則雍縣府君之長子也生而潁秀長而博辨質如瓊枝文如春林尢長記誦之學酷重許與之耳目一歷輒在心口意氣相合坐遺形骸天寶末學優藝全方登俊造之貢俄屬國難家疚崎嶇險難以喪往事居之孝稱於所至服闋襄陽節度使來瑱表襄州參軍事屬有勢勝而理負與人爭官者州府畏之公時攝功曹掾守文與直不為之撓瑱嘉其所執升之賓介有疑焉輒以咨之他日瑱自相位獲譴已而伏誅凡百門吏逃難解散公與陳郡殷亮始冒危於保衛終毀家於葬喪君子難之故司徒李公勉聆公之節辟以為屬自江西入尹京兆洎節制廣滑汴三府以公明可折獄利可撥繁權可贍給清可澄察而武可臨戎官歷金吾掾萬年尉三御史二尚書郎以至於御史中丞職更推官洎度支觀察二判官以至於行軍司馬公之奉李公也若體從心李公之任公也若素受采李公制用公為利器李公翺翔公為羽翼厥後李公罷鎮遷河南少尹故孜孜勵精二前後之政與我同志者必以吳公李膺之名歸之其有所執賴于周人者非一貞元五年受代來朝上京燕息衡門詠歌卒歲以俟道長末如命何初公之在滑也方屬兩河之驚不敢以非疾之憂貽於高堂堅請退間亦既終養其在汴也有二千石結根貴幸怙寵傲慢收小惠於下隳大計於上公數其不供之咎請以去之言而未行拂衣自免未幾彼果顛覆李公於是厚禮還公且有中軍中憲之授蓋進退終始不違於道多此類也母弟澄檢校膳部郎中潤大理司直涇前潁州刺史少失先府君之教入學入仕為郎為邦皆公之訓誘也夫人隴西縣君李氏故太子賓客翼之子有淑媛之美成公之家事公姑之孝聞焉奉叔公之友聞焉其輔佐之力由中及外者出處聞焉今也髽首泣血自雍及絳一號千里行者悲之子曰鋌弱而有立毀過成人謂員平生交親見託為志其文曰猗歟裴公昭朗直清哭來發迹和李騰聲處則全養出能保貞蒸蒸穆穆為子為孫夭閼遐志摧頺壯齡哀哉哲婦為代之程嗚呼有唐君子河東府君之墓公諱某字某先伯益之苗裔分秦封晉史牒詳之元魏河北太守萬虎兄弟三人時稱三虎並仕於魏魏都河洛在天地之中故裴氏始有中眷之號公則萬虎八代孫也曾祖某冀州都督府長史祖某溫州樂城縣令父某蔡州司田參軍初命左領軍衛倉曹參軍倅商州刺史李佐戎事遷同官縣丞李侯移鎮桂林統師南服表公為監察御史介澄察之政至今二府思李公之美繄公是賴使罷間于洛陽不幸遇疾以貞元六年秋八月庚申終於立德里之第享年四十有五明年辛卯葬于首陽山之陽龜筮與人三者皆吉有子四人男曰綽曰約長方齓幼能言女子孟少綽季少約母弟佐洪州南昌縣尉充本道廉使從事訃之未及河南夫人穆氏祕書監新安公之季女惟是一日二日洎踰月之事實弱妻主之吾聞之生也全其道沒也全其素是之謂君子公性充天醇氣與道冥行本忠恕文以禮樂可不謂全其道乎遘癘彌年待變彌月疾能銷公之體而不能滅公之和命能夭公之生而不能汩公之正可不謂全其數乎表之以君子言之者無愧銘曰壽不與仁相會貴不與才相期福不與善相報命不與事相隨何四者之乖刺而不并集於斯已矣乎非夫人之為慟而誰為唐貞元十年十一月二十一日公棄養於東都歸義里私第適寢明年四月嗣子贊洎質員賞奉遷靈座祔曾王父母于偃師首陽山之北原贊等惟刻石識墓非周孔之訓宋齊以來有之所以藏馨香俟陵谷不可闕也太夫人河東郡太夫人命曰禮經三月之事所以必誠必信勿之有悔焉者蓋孝子自盡之謂然則自盡之大莫大於紀述平素貽簡幽明假詞他人不足以厭自盡之義公諱寧字某十一代祖崇元魏宜都王其後孝文自代遷洛陽遂為洛陽人奕葉王公與魏終五代祖伽皇朝殷州安陽令贈刺史太常卿高祖宏遠水部員外郎曾祖固禮祕書郎祖思恭稷州録事參軍贈光祿少卿考元休相州安陽令贈同州刺史自宜都至殷州以淳粹之氣相遺自殷州至同州以清白之風相授傳洪範九疇究天人之際皇王得之不出戶庭而天下治學者得之為王者師公則同州君之元子鍾天元和發地禎祥性得於孝友忠烈生齊于聰明正直淵深峻極溥博閎厚用先王之禮樂節而文之是以外富直道中積至行始厲高節終全盛德宣尼稱道之將行命也將廢命也命也者似繫一人之謂小子則曰公之道將行時也將廢時也使我公之得志也天下至公立大道行風教厚人倫正天之未俾當時臻乎此也豈繫公之命乎蓋天能使公道可奮乎百代而不洽乎當年才可周乎萬物而不極於所蒞天之不全歟時之不全歟天寶中一命景城郡鹽山尉在官五年凡七宰旁邑三紀郡政二介使臣祿山作亂以郡有煮海之富屬城之乘使其黨曰劉道元以假守之公乃糾合同志首唱大義梟道元以絶祿山而郡佐畏懦多與公駁史思明統衆來寇郡俾公保東光縣拒之思明駭公之才使騎將持書通好公立斬其使以徇于邑且封其書于郡郡佐逾恐且慮思明之見讐也趣公罷攝公嘗佐黜陟使分巡列郡與平原守顏公真卿陰圖祿山當亂所以禦之之畫至是密遣家僮以手疏詣顏公書無他辭曰夫子為衛君乎六字而已顏公執書感泣即日以軍師之禮致公公之許顏公也以長子屬于母弟曰唯所往苟不絶先人之祀吾無纍也既而從顏公登陴誓衆以必死與之俱生援絶孤城公志愈厲顏公麾下有非公所制者伺公請沐中夜迫顏公跳比及於河公方自拔他日顏公詣行在所自訟有立者公之力無成者已之咎肅宗嗟歎以璽書徵公且謂顏公曰由廷尉評以諫議大夫待之既至會顏公以言事忤旨其議遂寢上元乾元之間纍官史府尚書省分王命于河南征鎮之軍僅十餘帥憑勳怙寵乘國艱危自以不叛為文靡顧文法公以至誠格之大順激之清明律之由公徵令者相率如響元帥李光弼將二於上屢姦於公公守正不遷積與之隟日宣不令之言欲公畏之公自泗抵徐馳驛輒至理折其口義勝其心泄其慍於包藏奪其謀於將發代宗聞焉為一二宰臣話之至於歎息于時周鄭路塞東南貢賦之入漕漢江轉商山詔擇文武全才以守夏口我于是有專城連率之寄金印紫綬之寵詔書下日百城肅然清風先翔甘雨隨灑荊越吳蜀之富期月傾之俄封長江與淮西對境厥帥董秦多俾腹心為其津戍拉商旅斷中流畏公明威拱手如梏舟楫上下如行其家萬里來臻若赴于市部有酷吏姻連勳臣敢為貪狠靡所畏忌公糾發贓罪暴之于朝且以鞭朴懲其侮慢我於是有再黜之咎勳臣故也居五稔有詔徵入牽復臺省大歷七年淮南旱和州以師旅後瘡痍深慎選良牧用膺明命視人如子理事如醫居一閏人忘其傷又一閏人忘其化無何受代代者冒以天寶季年版籍之額洎即日所授數上聞是時兵興二十年矣異日版籍百無一存代宗震驚以為亡失在我故有泉州之貶初公屬以徵發之弊抗于刺舉之司既而代至則不知代者之指斐然歟將有為歟贊守闕訟寃三歲聞徹降而御史即州訊問則公初年季年戶增數倍使者還報會今上龍興拜太子右諭德詔曰令子申父之寃憲臣受君之命楚劍不衝於牛斗秦臺自洗於埃塵其明如此宮坊養德優遊卒歲每台輔易位宜以舉直措枉或曰公卿缺員僉議所屬以中外之望必集于公而前後宰政率以不附離之見憚故久滯於次公嘗自卜進退以深識為元龜且時不我容我不時徇則非吾之進也在於退乎默默然有浩歸之志凡謝病垂滿十旬而時議迫隘公望充塞不得已而起者朱泚之亂公方杜門請急出無車馬假乘于故人太子少師韋公倫棄家逃汙出城信宿方審乎所在而奔焉轉祕書少監右庶子録奉天興元之勤也大駕還宮百官復位公曰可以行吾志矣移疾罷免東歸吾土陵後五年就加祕書監致仕遂公之志也考槃于瀍洛之上卜勝于北山之陽良辰暇日盡四時之賞以仁自富以道自貴以孝慈為稼穡以友愛為塤箎十年春喟然手疏述麟德中高宗天皇大帝詔問張公藝九代同居故事撰為家令賜諸子諸婦人各一通贊等暨諸婦拜泣受賜公曰吾之理命也是年秋違豫冬棄背壽七十九公伯姊元夫人與公同稟至性有高世之德公率太夫人所以敬養之道達於神明公之教育成人者高祖曾祖兄弟洎孤甥姪與贊等所以威以勸之慈以撫之一之乎天性之至外姻僮僕不知所以別焉性嗜讀書無學不綜經窮入室之奧史精歷代之博非聖人之教道則知而不言每語及三代損益以逮於國朝典故莫匪成誦聞者退徵於卷則文字甲子靡差毫釐或為卿大夫話其世代蓋郯子范子自言其祖不之逮也仕四朝更三紀歷官二十五政德義政事無非殊效且未嘗有如分之報而三黜一免由之善與人交始不以諂瀆合終不以生死異嘗從王事歷佐權臣入於朋家之門雖周鄭交惡田竇奪移彼不我疑我不彼二嘗宴居誨㣥子曰吾聞君子之事親也養志為大吾之志也直道而已爾事君事人或枉其道日以三牲五鼎充吾庖非養也苟繼吾志或承患難則義重於生宜從其重焉贊等祇荷嚴訓仕於天朝贊以御史中丞質以右補闕皆以守職不避強禦並罹譴逐員以侍御史佐東都留守不敢陷所事殺無辜賞以監察御史呌帝閽解兄難迭逢困厄公申誡曰先王之道洎爾友朋之議及吾異日之訓爾無虧焉愛子者教之以義方不聞以諂爾其勉之贊等永惟古人有欲養不待之痛公高尚不事待養十年而贊等官薄命奇不自極於不才不孝之分內乏擊鮮之獻外貽非疾之憂是以上天神明罰以不得自死之苦夫不死之道有不敢不能贊等伏念為公之嗣且太夫人在堂是則不敢負不肖不逮於義劣不能死荒不及文哀舉大端永閟幽宅有唐故京兆少尹隴西李府君諱佐字公輔年未充其志位未半其才君知其賢天不躋其用親待其養命不偕其榮貞元六年年六十有一三月丁巳終于長安興仁里閏四月丁未夫人范陽縣君盧氏奉公之喪達於洛汭月日壬午弟前監察御史俯承公之喪于告成從先公居且曰理命初公以疾得謝沉痼纍載三事㣥公僉謂公仁可長人武可訓戎正可持刑權可調賦其忠肅明敏尤宜尹京前後執事當趙張三王吳公李膺之選輒遲遲其授以俟公之起而公未聞然及時賢聞此凶訃嗟歎之聲浹于上下詔贈同州刺史貝專以布帛故事公卿薨位有以震悼于上心者則及追贈其或加等申之以賵公以二尹去職禮優飾終有以見才拔乎萃恩超于時若假之永年以極其遇詎可涯也嗚呼惜哉五代祖禮成隋禮部尚書絳郡公祖元恭皇大理少卿知吏部選事父誦高名下位陳州宛邱縣公十歲而孤居喪有過成人之戚太夫人滎陽鄭氏抑之然後復於禮弱冠擢明經調婺州武義縣尉以清白苦節聞故相彭城公辟以從事凡三遷至監察御史領江西之賦又遷申州剌史戎師作亂移公隋州其後僭逆以公先奉太夫人在外疑焉折簡招公公以自脫之計未售辭疾者再元凶使其徒來劫公語以疾愈自祗赴者與逆徒偕先是熟與舅氏克鈞期於境上克鈞日涕泣於襄陽節度使賈公公感而義之為出敢死之士克鈞亦毀家行賂以賈勇奇兵如約公以輕騎脫焉表公為倅者荊南江西鄂嶽三府上以鄂嶽請命先至除檢校戶部郎中兼侍御史充都團練使鑾駕還京公奉章朝奏是時梁汴圯隔漕運不至逆將跋扈屯于近郊關輔困於兵蝗帑藏索於錫與上以貢賦之入必由江津擇全才領商於之地以闢南門於是有刺史防禦中丞之命公心周庶政手集庶物明於理身勤於理家俾天收其災地盡其利峻嶺重負至如川流詔加朝議大夫賜金印紫綬封太夫人滎陽太君賜一子官其事刻之金石實吏部侍郎李公為之頌無何授桂管觀察經略使部內不及朝貢之羈縻州者十八舊例首領賮於官署為刺史一州所貢悉以奉之其或魚肉斯人之甚有來訟者率以遐遠阻險非文法所及置之公於是易之以中土溫良之吏越人之男女不為所鬻資産不為所奪悅而戴之相與稟令其移風俗如此者非一纍以親老陳乞故有亞尹之拜是則假道無如命何初宛邱之人吏感府君之明惠而矜公之孤藐相與竭於賵子所以送死養生之異兼焉太君曰昔吾夫之所以為生也今以沒而受賵則是死吾夫也畢以辭之公由是奉先公之貽訓太君之清德常恐失墜三為郡一為帥從公者二十六年退居無具藥之資沒代無護終之直室有孀姊妹挈孤甥者數房孀與孤者亡無怙之恤一女煢然俯以其弟二子彥主公之後焉嗚呼為富不仁為仁不富信矣積善餘慶何其不信哉不然公之所豐者仁義所不絶者遺愛故事風流於後豈物莫兩大而使然耶俯以員兄弟偏公之遇辱命為志悲而不文銘曰君之生葉成官達尊親揚名天錫純孝古之遺清君之沒背高堂去白日恨榮養之不終吐遺言於將絶祔君於先嗣君於後賢哉悌弟之心有以復君之友公諱某字某馮翊臨晉人其先有漢太子太傅彭祖為左馮翊子孫家焉十二代祖翰林東漢末復守本郡後四業至元魏平南將軍卻陽侯稚玉又四葉至皇朝洮州都督君協協生魏州司功參軍贈太常少卿方約公之祖也方約生銀青光祿大夫左庶子贈宋州刺史損之公之禰也自平南至洮世以侯國相襲事名聲稱之府君迪奕葉之祥鍾生知之美用為孝悌用為忠貞用為循良用為道藝出處終始小大由之天寶中以門子經行擢宏文生調參江陵府軍事時所奉之主永王璘陰有吳濞東南之亂致公賓友之禮公逮其將兆而未發也以智勇免之受命南國洎督王賦者或咨公以畫或倚公以辦三遷至大理司直賜銀印赤綬慎選京邑從容臺署歷京兆府戶曹掾殿中侍御史虞部員外郎河洛思其理理行發聞拜河南令刑部郎中雅素儒學選國子司業建中宰政怙威朋家構閔公以親纍貶潮州司戶時泰道長公議興能推連州刺史換彬州纍加朝議大夫封馮翊縣男旌異政也公母弟士良並龔黃之寄蓋不勝形影分離之憂及聞士良罷歸公亦陳乞自免願言相視而終老焉既至京師復拜國子司業無何士良出牧公悼別加等忽忽不樂燕居如失貞元八年某月某日歸全于長安新昌里之私第春秋六十有五初公自彬之歸也有從祖姑世父母身沒嗣絶旅殯越公鄉匍匐發護毀家襄事各遷祔于先塋服仁義者歸心焉夫人彭城劉氏右僕射彭城公之女生子男三人先公而沒祔先姑于龍門山之北原事具前志嗣子纂次子筠季子篆皆感過于縗毀疑于滅冬十一月二十有一日奉公歸夫人之室且從先君銘曰嚴氏阡北原上先賢後賢如相望我歸曷歸歸我室我友俟我以琴瑟杳長夜兮無白日公諱海賓彭城人也祖滔皇朝散大夫徐州別駕父元銀青光祿大夫澤州刺史公以義俠聞于汧隴之間洎天下兵興以身許國纍功百戰全生萬死歷官十七政至於開府儀同三司御史中丞樂平郡王食實封五千戶充涇原節度兵馬使建中初逆將劉文喜竊涇州叛皇上以神武肅毅齊一四海欲使亂臣賊子作誡于涇六月興戎㣥帥奔命前事之日公挈長子光國度文喜將叛而不支也始以奏請造于帝庭敷露姦慝陳獻忠款期以父子為其膏肓上撫而還之嗚呼天地啓公之謀果有雷電之誅假于光國之手梟磔文喜獻其元于蠻夷之邸城池師旅與功全焉天子御正殿朝百辟引公父子同日封拜公拜驃騎大將軍左驍衛大將軍依前兼御史中丞又賜實封一百五十戶封光國五原郡王是時軒陛之下龍驤虎賁之士相賀且勸不旬時而名布天下宿衛中禁為王爪牙後二年長安有朱泚之亂公與故太尉段秀實約曰公為曹沫我為荊卿期以一劍而復大駕故公先機而發有害其成段公與公是日并命君子謂二公之歿千古如生時建中四年十月十日享年六十有二明年鑾輅還宮於公有未及下車之詔追贈太子太保又賜實封五百戶所以賵禭之品禮極數殫而宸衷㣥望猶未之塞先是淮夷叛命光國東征厥後王事龜筮差池未協蓋不遑五月同盟之會者七年于茲矣貞元七年六月四日夫人鴈門郡太夫人田氏壽若干棄養于東都安國光國銜恤卜兆得北邙山之南原西遠國門三十許里乃以日月有時之事請于居守吏部尚書杜公公列狀以聞而飾終之典如初禮十月乙卯太保公之喪至自京師十月已巳啓太夫人之殯壬申遷而合祔焉夫人承夫以禮訓子以義享其豐報鍾慶於身然而太保有命代之勳寵位未半光國有日躋之孝色養遽違各從其策不極其分悲夫光國以太子詹事兼御史中丞襲樂平郡王充東都防禦左廂兵馬使次子某試太常卿清國太子通事舍人潤國未仕皆大夫之特也光國繼忠襲貴終以哀報願奉不朽銘之墓門其詞曰赫赫太保自天降忠見危致命有始有終佐戎于涇涇帥不龔父心子手震踣元凶皇家中否大盜遘逆偉哉段公與我同德將滅妖彗載清宸極天之方稔運奪其力悠悠青史異代悽惻抑抑夫人率禮無違夫忠子孝寵祿由之九原何許雙劍同歸鼓吹晨發霜清風咽生榮死哀加等備物于嗟後人無忘忠烈
