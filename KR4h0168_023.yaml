front:
  text: 全唐文欽定全唐文卷二十三元宗四
  hash: sha256:627fbef6d31a9c333fcbbe92912e219fba6cdd453b5f7f834bf32b84baffd095
body:
  text: 慎守疆場所以備不虞訓理甲兵所以存禁暴列代通典有國永圖朕以虛薄君臨㝢縣上奉天道務在於生育下順人心無隔於夷夏柔服四裔厎綏萬邦慕義向風盡為臣妾納貢述職咸赴闕庭惟吐蕃小醜忘我大德侵軼封域抄掠邊甿言念於茲無忘鑒寐且本設方鎮以防緣邊至於警急宜相救援今故糾合諸軍團結勁卒務令首尾相衞心力叶同張羅網之形開犄角之勢俾窮寇進不能犯退無所歸秣馬練兵觀釁而動屯田積穀固敵是求殄戎可期戰勝斯在隴右通共團結馬步三萬九千人臨洮軍團八千人河源軍團六千人安人白水軍各團一千五百人積石莫門軍各團二千人河西道蕃漢兵團結二萬六千人赤水軍團一萬人玉門豆盧軍各二千人並依舊統領以不虞更於關內徵驍兵一萬人以六月下旬集臨洮十月無事放散朔方取健兒拏手一萬人六月下旬集會州下十月無事便赴本道賊所向賊於河西下即令隴右兵取閤川過朔方合兵取新泉與赤水軍合勢邀襲令河源積石莫門兵取背掩撲賊於河源下朔方兵從乳漫渡河并臨洮軍兵馬河源軍合勢邀襲赤水軍取背掩撲賊於鳳林關下朔方兵赴臨洮與鄯州兵合勢邀襲河源積石兵取背掩撲所要甲兵遂便支公私營種且耕且戰各宜訓勗以副朕懷河北遭水處城傍及諸蕃投降人先令安置及州縣被差征行人家口等去年水潦漂損田苗頻遣使人所在巡撫兼令州縣倍加矜恤不知並得安存與否今舊穀既沒新麥未登丁壯既差遠行老少慮不支濟朕身居黃屋念在蒼生每思優養無忘鑒寐今故遣中使左監門衞將軍李善才重此宣慰宜令州縣責有乏絕者準吏給糧俾令安堵以副朕意頃屬初陽肇授移輦新宮因施惠布德用順時令徒巳下罪並責保放營農今詳其刑格亦非重罰巳釋囹圄不可更收宜許自新特從免放隴右河西地接邊寇雖令團練士卒終須常戒不虞如聞吐蕃尚聚青海宜令蕭嵩張志亮等審察事勢倍加防禦當須蓄銳以逸代勞其當賊路要害軍縣處須量加兵馬任逐便通融處置仍揀擇有幹略人較明為探動靜須知主將巳下若捉搦用心事無不理者當加重賞如廢官慢盜式遏乖所者必寘嚴憲仍曉示使各勉職以副所委其管城壘應築未了者並早令畢功無致延緩闕於備守昏迷反道天地所以制罰戎狄亂華帝王所以耀武吐蕃小醜頻年犯塞壞我城鎮虜我邊人言念征夫良深憤惋今北軍羽騎萬弩齊發山西飛將百道爭先掃蕩之期在於晷刻然賞罰必信懲勸在焉號令不明忠勇何望若迴避縱敵則寘國刑如克雋擒兇須懸軍格其河西隴右安西劒南等州節度將士以下有能斬獲吐蕃賛普者封異姓王斬獲大將軍者授大將軍獲次以下者節級授將軍中郎將不限白身官資一例酬賞速令布告咸使聞知邦女下嫁義著周經帝子建封制存漢傳朕訓導諸子舊有女師因其婉娩之性進成肅雍之德能鑒圖史頗知法度今選婚華族待禮笄年宜加璽綬之典俾開湯沐之賦第四女可封唐昌公主第六女可封常山公主第八女可封寧親公主各食實封五百戶唐昌公主出降張垍俱用八月十九日所司詳備禮物式遵故事出納王言發揮綸翰宰相之任選衆推賢檢校黃門侍郎同中書門下平章事杜暹同中書門下平章事李元紘等咸勵忠勤用登樞揆雖清以自牧而道則未宏不能同心勠力以祗帝載而乃肆懷相短以玷朝綸朕緣事醜股肱情惟隱蔽掩其累而不率遂其過而彌彰將何以緝敘三光儀刑百辟宜回中禁俾列專城暹可荊州長史元紘可曹州刺史尚書右丞相兼侍中源乾曜十載持衡一心自牧台鼎斯重管綜維繁雖功力在公而暮年微疾俾司端揆罷劇中樞宜停侍中其尚書左丞相如故朕聞四時之義信在不言三代之風德以歸厚道可光乎訓俗理必由乎在位有犯無隱名教之攸先上和下睦憲章之惟舊其有辯言亂政實誡殷書偽行登朝深懲魯典朝請大夫守吏部侍郎上護軍齊澣累踐清要誠宜至公承議郎守興州別駕麻察頻經貶逐理合遷善乃交搆將相離閒君臣作諂黷之笙簧是德義之蝥賊都水監丞齊敷靈州都督府兵曹參軍郭稟等趨走末品姦譎在心左道與人橫議於下並青蠅可鑒害馬難容或任高星象或名微草芥上恥大夫之辱下羞徒隸之刑特解嚴誅宜從遠逐澣可高州良德縣丞員外置長任察可潯州皇化縣尉員外置長任敷宜量決一百長流崖州稟亦量決一百長流白州仍並差使馳驛領逐雖萬方之過情切在予而四罪以聞刑其自爾且如非賢勿理食祿憂政庶乎文武百辟忠公事主出惟長者之遊言必先王之道光昭雅訓可不務乎如或迹在不經思出其位雖輕勿赦抑有常法布之朝綱知朕意焉政理鴻業宏之者大賢文儒盛美典之者茂德自非夔龍閒出周孔挺生則無以翊賛經綸發揮圖史者矣侍中兼吏部尚書裴光庭忠公性與禮樂天資為社稷之臣總喉舌之任儀刑百辟則庶績其凝藻鏡九流則具瞻惟允進規獻替明謨每竭絕編蠧成誦不忘固可以尚論之餘闡尊儒之義經緯廟堂之略論思祕館之文僉曰爾諧期於予理往膺寵命克昭丕績可充宏文館大學士餘如故處士前祕書省校書郎白履忠學優緗道賁邱園探賾以見其微隱居能達其志故以汲引洙泗物色夷門素風自高元冕非貴几杖云暮章秩宜加俾承禮命之優式副寵賢之美可朝散大夫卿孝悌立身靜退敦俗年過耆耄不雜風塵盛德早聞通班是錫豈惟旌賁山藪實欲獎勸人倫且遊上京徐還故里古者作錢以通有無之鄉以平小大之價以全服用之物以濟單貧之資錢之所利人之所急然絲布財穀人民為本若本賤末貴則人棄賤而務貴故有盜鑄者冒嚴刑而不悔藏鏹者非倍息而不出今天下泉貨益少幣帛頗輕欲使天下流通焉可得也且銅者餒不可食寒不可衣既不堪於器用復不同於寶物唯以鑄錢使其流布宜令所在加鑄委按察使申明格文禁斷私賣銅錫仍禁造銅器所在採銅鉛官為市取勿抑其價務利於人皇王之大化備載於所陳必順時而行政將奉天而育物考古之要莫不由斯朕自膺寶位欽若上元萬物叶心庶務易齊七政以察璿璣勸兆庶而勤稼穡日慎一日於今二十年矣何嘗不夙夜祗畏憂勞在懷思致黎元以宏政理屬獻歲初吉乘時布令是用敦本復古將必稽於月令始謀作則先有事於春郊宜因展禮之辰別布惟新之澤其天下見禁囚徒自開元十八年正月五日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之其左降官及流移配隸安置罰鎮効力之類并宜量移近處其官巳復資至敘用之時不須為累其流人配隸并一房家口者所犯人情非劫害身巳亡歿其家口放還流人及左降官考滿載滿丁憂服滿者亦準例稍與量移其亡官失爵放還不齒及諸色被停解免與替人等非犯贓者宜令司存勘責量加收敘其衰老疾病者仍與致仕官天下百姓今年地稅并諸勾徵欠負等色在百姓腹內未納者并一切矜免亞獻太子鴻賜物二千匹終獻寧王憲賜物一千匹文武百官及有司職掌等各賜束帛有差率土之內賜酺三日其海內五嶽四瀆及諸鎮名山大川及靈跡并自古帝王得道升仙忠臣義士先有祠廟者各令郡縣逐處設祭乾坤沖用陰陽所以運行帝王大業文武所以垂範故四序在乎平分五材資於並用式稽乾坤之義載明文武之道永言舊章斯典未洽自我而始爰備闕文昔羲皇立弧矢之象黃帝有甲兵之事將以定禍亂濟生靈分二柄而齊設配兩儀而共久至若用之以仁義行之以禮樂龍豹卷舒而莫測星辰應變而無方誰其尸之則齊太公之道也故宣尼大聖立文以化成尚父維師仗武而宏信齊魯之道列親賢之教興鬱為政源崇我王業遂使金石之奏永播於蹲龍之庭蒸嘗之享不行於非熊之室文武並設斯不然矣豈王風云季禮沒於前修將帥是尊慶彰於今日式崇大典垂裕後昆宜令兩京及天下諸州各置太公尚父廟一所以張良配享春秋二時取仲月上戊日祭諸州賓貢武舉人準明經進士行鄉飲酒禮每出師命將辭訖發日便就廟引辭仍取自古為將功業顯著康濟生人者十人準十哲例配享三秦九雒咸曰帝京五載一巡時惟邦典上腴多饒衍之美仍勞於轉輸中壤均舟車之湊頗聞於殷積朕所以相時度宜期於利物者也況河汴頻稔江淮屢登二周馳望幸之誠三川勤徯予之請然猶未便順動且念人勞期以來年方議時邁而頃京輔近甸膏澤未均陝雒之交稼穡亦盛固不可俟於今日庶用協乎光天豈肆心於宴安期順人而從幸兩京供帳宿有儲擬十月滌場是因暇隙信可備法駕整勾陳清蹕崤潼觀風河雒宜以今年十月四日幸東都所司準式常芬公主公宮成訓歸妹有儀錫號䟽封雖巳洽於前典推恩食邑猶未崇於後命宜書沐賦之榮式昭築館之義可食實封五百戶用今年九月丁巳出降張去奢所司詳備禮物式遵故事用天之道分地之利此庶人之事也非濟育無以致其功務在三時遵其五教此邦家之典也非悅勸無以成其業朕當夜分思理明發聽朝惠綏㣥元若保赤子議獄以緩死薄征以息人年穀頗登時政庶緝而家給之長仍或未均蘊利之徒猶聞贅聚靜言其事應有厥繇如聞貧下之人農桑之際多闕糧種咸求倍息致令貧者日削富者歲滋非所謂益寡裒多務穡敦本之方也思宏惠恤以拯貧窶且義倉元置與衆共之將以克濟斯人豈徒蓄我王府自今巳後天下諸州每置農桑令諸縣審責貧戶應糧及種子據其口糧貸義倉至秋熟後照數徵納庶耕者成業嗇人知勸生厚而德正時順而物成國富家肥於是乎在凡厥主守稱朕意焉行慶施惠所以奉天時緩刑恤獄所以愛人命今陽和布序草木自榮而或入於罪隸嬰於舂槀同被亭育之恩未暢生成之施言念於此深用憫然思宏時令以哀黎庶應天下囚徒罪至死者特寬宥配隸嶺南遠惡處其犯十惡及造偽頭首量決一百長流遠惡處流罪罰鎮三年其徒巳下罪并宜釋放其有官吏犯贓推未了者仍推取實收定名訖然後準降例處分計贓一匹巳上及與百姓怨讎并不須令却上其上都委中書門下䟽理京城委留守天下諸州長官當日處理其責保停務之類並宜準此義不辭難忠為令德保祐君主安固邦家則必荷寵光之休膺土宇之錫安金藏忠義奉國精誠事君往屬酷吏肆兇潛行謀搆當疑懼之際激忠烈之誠突刃剖心保明先聖見危授命沮奸邪之慝轉禍存福獲明夷之貞雖鳴玉銜珠巳備於休命而疇庸䟽爵未洽於殊榮宜錫寵於珪組兼勒名於金石昔之握皇綱執大象者或省方以肆覲或巡狩以觀風故軒轅至崆峒之野夏禹列塗山之會雖往古遺事先王高迹觀其出豫稍涉遐遠朕自臨馭天下底綏人極法駕罕順動之儀蒼生多傒來之歎每欲時邁因而布和憚於人勞必也中止惟彼堯俗古風猶遽方於譙郡王業是同西漢高皇永懷於沛邑東京數帝每幸於舂陵豈不遠思喬木無忘敬梓況境乃近壤城惟列都既行幸是常亦情禮兼遂又嵩郡天險方位土中而陵寢地遙攀望增感且布政而行化實展懷於志思宜取今年十月十二日幸北都便還西京所司準式老子道德經宜令士庶家藏一本每年貢舉人量減尚書論語策一兩條準數加老子策俾尊崇道本宏益化源今之此勅亦宜家置一本每須三省以識朕懷繼好之義雖屬邊鄙受命以出必在親賢事欲重於當時禮故崇於殊俗選衆之舉無出宗英工部尚書李暠體含柔嘉識致明允為公族之領袖是朝廷之羽儀今金城公主既在蕃中漢廷公卿非無專對有懷於遠夫豈能忘宜持節充入吐蕃使所司準式發遣去年江南淮南有微遭旱處河南數州亦有水損百姓皇甫翼等咸謂能賢式將朕命其閒乏絕應須賑貸便量事處置回日奏聞思致雍熙事求良輔久勤夢寐近在周行尚書左丞韓休蘊道宏深秉德經遠清誠可以軌物素行可以律人一自登朝備聞體國志存公亮誠合始終而羽翼朕躬金玉王度人望是在朝選無踰宜拜命於瑣闈俾兼和於鼎實可守黃門侍郎同中書門下平章事王邱夙負良材累升茂秩比緣疾疹假以優閒聞其家道屢空醫藥靡給久此從宦遂無餘資持操若斯古人何遠且優賢之義方冊所先周急之宜激功攸在其俸祿一事巳上並宜全給式表殊常之澤用旌貞白之吏恒州張果先生遊方之外者也跡先高尚深入窈冥是混光塵應召城闕莫詳甲子之數且謂羲皇上人問以道樞盡會宗極今特行朝禮爰畀寵命可銀青光祿大夫號曰通元先生門下春秋之義尚量卿才王國克楨莫先相位用增其命必正其名中大夫守黃門侍郎同中書門下平章事宏文館學士賜紫金魚袋上護軍裴耀卿正議大夫中書侍郎同中書門下平章事集賢院學士副知院事兼修國史紫金魚袋上柱國曲江縣開國男張九齡經濟之才式是百辟正議大夫檢校黃門侍郎賜紫金魚袋上柱國李林甫泉源之智迪惟前人既樞密載光而親賢稱首審能㣥會所莅有孚寧惟是日疇咨故以多年歷選國鈞繄賴邦禮克清宜命曰鼎臣置之廊廟耀卿可銀青光祿大夫守侍中學士勳如故九齡可銀青光祿大夫守中書令集賢院修國史勳如故林甫可銀青光祿大夫守禮部尚書門下三品勳如故主者施行門下訓俗安人是資良牧棄瑕錄用茲為令典使持節衞州刺史信安郡王褘器能之美宗室所推才堪應務久當於任委防缺周身因從於降黜惟推念舊義在睦親宜迴傳於方外俾分符於近服可滑州刺史高懸爵秩以待勳庸能者得之固其宜也契丹兵馬官李過折蕃中貴種塞下雄才其謀慮之深既能轉禍當義勇之發何異疾雷故得積年逋誅一朝蕩滌使鳥竄之衆復為戎人鷹揚之師且息邊甲言念誠節宜超等數特加象輅之封仍異龍城之禮可封北平郡王同幽州節度副大使賜帛一千匹門下司徒之職事殷九賦連帥之任寄重十州兼而統之其在能者銀青光祿大夫守太子詹事上柱國高邑縣開國子李尚隱長才致用直道為謀大任亟登晚節彌厲臨事克斷不敢於煩苛去邪勿疑無避於強禦必能內均土壤外撫華戎保息萬人俾修夏官之典澄清三屬仍總使臣之務可守戶部尚書兼益州大都督府長史持節劒南節度營田副大使兼節度採訪處置使散官勳封如故象先含和毓粹體道居身迹在區中心遊象外懋昭丕德光輔先朝爰降優恩是為師保方期承命以配上祥厲疾無瘳徽音遽隔興言念舊震悼於懷宜旌端揆之職用光窀穸之事贈尚書左丞賻物二百段米粟二百石自古風俗所傳歲時相樂亦合因事大小在人朕生於仲秋厥日惟五遂為嘉節慶感誠深今屬時和氣清年穀漸熟中外無事朝野乂安不因此時何云燕喜卿等即宜坐飲相與盡歡門下汝作司徒以親百姓予有禦侮爰整六師中外之寄藩維是屬太子太師兼涼州大都督河西諸軍州節度大使支度營田九姓長行轉運使上柱國慶王琮克勤於躬允協厥訓每有志於敦學常不忘於樂善事上之道忠順在焉舉能之義親䟽一也固可委以邦教受之廣謀勉圖乃功勿替朕命可守司徒餘如故從服有六此其一也降殺之制禮無明文此皆自身率親用為制服所有存抑盡是推恩朕情有未安故令詳議非欲苟求變古以示不同卿等以為外族之親禮無厭降報服之制所引甚踈且姨舅者屬從之至近也以親言之則亦姑伯之匹敵也豈有所引者踈而降所親者服又婦從夫者也夫以姨舅夫既有服從夫而服尤是睦親實欲令不肖者企及賢者俯就卿等宜熟詳之門下燮和陰陽儀刑端揆自非人傑孰副僉諧金紫光祿大夫侍中宏文館學士上柱國稷山縣開國男裴耀卿才實國楨望為人範懷匪躬之節竭奉上之心金紫光祿大夫中書令集賢院學士修國史上柱國始興縣開國男張九齡器識宏遠文詞博贍負經濟之量有謀猷之能自翼賛台階彞倫有序直道之心彌固謇諤之操逾堅並可以儀刑百寮緝熙庶績宜迴掖垣之任俾列宮師之表耀卿可守尚書左丞相九齡可尚書右丞相散官勳封如故主者施行善為理者固道在至公能官人者俾財無滯用今之㣥吏列於郡國績有可考政或可觀既久於所職當敘之以位衞州長史盧見象等頃在條察克著聲猷計年有成以時議進期乎知勸且曰無遺彼欲速者自衒而至廉恥之道喪干進之責深悠悠斯人朕無所取凡百在位宜悉乃懷朕猥集休運多謝哲王然而哀矜之情小大必慎自臨寰宇子育黎烝未嘗行極刑起大獄上元降鑒應以祥和思協平邦之典致之仁壽之域自今有犯死刑除十惡罪宜令中書門下與法官詳所犯輕重具狀奏聞崇德尚齒三代丕義敦風勸俗五教攸先其曾任五品巳上清資官以禮去職者所司具錄名奏老疾不堪釐務者與致仕道士女冠宜隸宗正寺僧尼令祠部檢校百司每旬節休假並不須親職事任追勝為樂宣示中外知朕意焉夏典有虞賓之位周書載微子之封皆所以啟迪前王發揮後嗣故介國公宇文超男晏倬彼茂緒曰予嘉客肅雍成性溫潤合禮雅有助祭之容宛是宜邦之具爰復爾國以承天休可襲封介國公朕躬承天命嗣守先業不敢失墜將裕後昆所以擇元良策奇器為國之本豈不謂然太子瑛幼而鍾愛爰加訓誘親之師範所望日新年既長成與之婚冠而妃之昆弟潛搆異端頃在東都頗聞疑議所以妃兄薛愿流謫海隅導之誨之謂其遷善駙馬都尉薛鏽亦妃之兄也今又煽惑謀陷弟兄朕之形言愧於天下教之不改其如之何蓋不獲巳歸諸大義瑛可廢為庶人鄂王瑤光王琚等自幼及長爰加撫育為擇師資欲其恭順而不率訓典潛起異端及與太子瑛搆彼凶人同惡相濟亦既彰露咸引其咎孽由己作義在滅親並降為庶人駙馬都尉薛鏽離閒骨肉惑亂君親潛通宮禁引進朋黨陷元良於不友誤二子於不義險薄之行遂成門風皆惡迹自彰凶慝昭露據其所犯合寘嚴誅言念瑣姻用申寬典捨其兩觀之罰俾就三危之竄可長流瀼州百姓門下兄弟之子於近屬而特深恩禮之情在諸孤而更切故惠宣太子男守鴻臚卿樂安郡王瑗等咸自砥礪克修名檢纉承先緒休有令聞能榮曲阜之封不忝高陽之族念往之恨巳無追於百身撫存之恩宜受賜於千室可共食實封一千戶主者施行
