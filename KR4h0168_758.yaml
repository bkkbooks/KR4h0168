front:
  text: 全唐文欽定全唐文卷七百五十八觀官荊州從事
  hash: sha256:be1c1658ae830d961486b0af73311757cfa5b45412781811f8c31057249991bf
  markers:
  - {type: head, offset: 14, content: 謝觀, id: KR4h0168_NFKB_758-h1, level: 1}
body:
  text: 宮闕崇崇縈帶洛河之上據臨天地之中儼百司以環拱流百川兮會同曷君王之未顧屹樓臺而鎮空或斑白里人或前後近侍覩周公之舊制憶開元之故事當域中之正寢實王者之定位何乃內外如一東西有異思紫泥而日日將來仰玉輅而年年未至徒使萬室向曙千門洞開藹臣心以西望希天睠之東迴見紅輪之漸晚又翠華之不來及夫玉漏報更蟾輝永夜皆傾耳以闇屬恐飛詔之潛下徒玉兔之屢虧尚金龍之未駕是必左右獻書股肱啟謀以為王者一德合居上游以為金城千里能制諸侯殊不知四海無虞五兵載戢與殷周而抗節豈秦漢之能及在仁義而聿修奚險固之是且夫中岳為內四岳為藩此則前控伊闕右闢轘轅乃文公立圭之地是成王定鼎之原寧勞百二之勢足居九五之尊所以乾乾屬望戀戀何言尚軫憂人之念未垂巡狩之恩雖年華不負於照灼而煙花暗老於宮垣况復伊洛王畿崤函近地往復無勞人之役邐迤有行宮之備冀我王之臨兮示天下為家之意楚國之君賢人為寶彼則貴於無脛此為尊於有道琢磨仁義而不緇不磷淬礪鋒鋩而既堅既好皎皎神爽稜稜貌清志一潔而靡垢行百鍊而逾精非暗投以取誚不韞匵以沽名廉謹在心命爵而蔑聞銅臭文章滿腹擲地而自有金聲洞徹不欺光芒相燭砥名而可尚礪節而自勗吐清詞之粲粲心水含珠見正色之溫溫情田積玉言錯落而無玷性真明而不瑕袖懷荊璞握有靈虵以鑒姦察邪之煥爛比照乘映廡之光華足可充盈軍國輝耀邦家何必積滿堂以遞矜易連城而助詐一非克儉之教一損不貪之化虞君受垂棘而滅楚國得王孫而霸徒美其色映層闕光能耀夜殊不知寸陰踰尺璧之珍一經奪滿贏之價所以愛茲被褐重彼迷邦以清德之惟一奚白璧之能雙况各藏器俟時見機而作直若弦矢㯋如鋒鍔誠席珍之可任洵柱石之有託以此綏撫而上下康寧以之守禦而內外胥樂既三復之可驗奚衆口之能鑠則知金玉為寶者德義之衰賢人為寶者邦家之基國無日而無事賢無代而無之如此則何必楚也獨二三子之可師峻宇沉沉朱門阻深豈為遙遠有蔽徽音跬步之中易在一言之地踰時之達難于千里之心莫不佇立盤桓瞻風躑躅或持穹崇以懈傲或麗欺誣之阨束遂使阼階之上迢遞於天子之田蕭牆之間帛丿糸邈於黃河之曲且夫百里之遠一日致之中堂之近經旬履之而所以借淹留之喻等邂逅之期豈君子同風之地在小人革面之時瞻廊廡之不遙便成燕宋念庭除之匪邈差若毫釐是絕音塵有暌言語若非入室之士過作脫巾之阻布武之中疲赤驥於崇朝及肩之牆困鴻鵠之一舉唾井之路寥敻及門之子迴翔希日日以見德尚朝朝以觀光每望恩波如桂水之流淼淼時瞻德宇若金城之路茫茫似蔽黃雲纔同明月高深起於顧盼山岳生於忽於是以南軒北宇之嶔岑作河東河西之間越如此禮讓無成薰蕕不明東閣苔滿西園草平倒屣之餘風頓削握髮之清規不行自杜其匡諫之路詎聞乎哀樂之聲是使咫尺蕭條人遐室邇空施棖闑之橫壯但見樓臺之邐迤則可以自勵於己寧求於彼君子勿嗟行路難古來如此肉不愛蟻蟻自來依舜不求人人自來歸爾則以羶生嚮慕我則以思深側微祁祁子來竟歡懷於德飽侁侁類聚各霑濡以家肥是知取喻於彼欲明於此播薰風於酷烈比黎庶於螻蟻溫恭允塞諒不阻於幽微元德升聞固無間於遐邇是故四海紛會千門競追共仰來蘇之日誠非逐臭之時以孔甘為味以潤下為脂率從其旨爰度迺私應其欲而狥矣思所利而噉之各竭血誠汝則如饑如渴無勞肉視吾乃龍章鳳姿載求而羶不在身三嗅而羶不在服在乎安長幼資亭毒行葉揚芳言蘭芬馥以膏腴及萬姓萬姓熙熙以霈澤滂四門四門穆穆咸遂其性各安其族並飲其風順雨調豈止於觴酒豆肉若乃望之如日戴之如天不銷不歇沛然靄然如此乃聞羶者焉如或失之於上迷之於下四罪之徒三苗之野如此乃聞羶之者喻既斯大義豈憑虛以心求芬芳者得以鼻求芬芳者疎自發德馨之惠寧同乳臭之餘服媚媲之而孰可芬香擬之而豈如由是蒸黎子來蠻夷蟻附八方咸戴其煦育九土共臻其道路惠然若歸往也如慕煥重瞳而日月清朗齊七政而恩威布濩至矣哉巍巍堂堂可謂承天有裕君言之重兮發彼加人如絲之細兮出已成綸將慎樞機之本必滋秒忽之因初具體而微降一已之繩準俄觸類而長入百司而縷陳是知作彼紀綱從而推闡密旨欲布殊私以展透冕旒以尚細入鈞衡而漸演及爾如貫審知詞理帛丿糸帛丿糸搏之則微益見言容繭繭且夫謂至密而已著將未聞而已聞遂意淫繹隨聲糾紛無類而洪纎起散有條而派脈別分離一庭之間聽皆歷歷出九門之外遠已云云是故遐邇覊縻上下聯絡毛舉之讚是恤蠶食之譏詎作詔多事而折藕難比寫綢繆而曳緒不若遇終軍之一請便吐長纓偶龔遂之載言俄陳亂索不同抱布而取詎等茹柔而吐孜孜下問義同小往大來軋軋若抽事符以索繼組不可卷也引而伸之不滯異維舟之紼無點殊墨子之絲與奪而起於分寸傾危而失在毫釐夫如是上言也不可不精下聞也不得不受知駟足之難及保三緘之可守語不墮而寰宇歸心思無邪而蠻夷稽首可以網羅八表可以倫貫九有然後緝熙不紊條章有餘自契不言化矣豈假聞斯行諸方知微細之喻也敢願戒慎之所如憬彼越裳南之一方感皇化於蠻貊獻白雉於周王原夫獲皎潔之姿奉鴻私之德閉靈質于雕玉馳星使於絕域夕辭南土形迷夜月之光曉向北風影混朝霜之色嗟乎跋涉空闊江山阻修途程萬里星歲幾周過吳門而練影光透染曹風而麻衣色浮然後達成周之大廷陳本國之所執歷雉門而捧進隨鴻臚而坌入俯雕題而就位拱疏趾以前集利觜玉植修領縞戢風搖細尾當軒而練帶長垂日照輕毛在手而雪花孤立懿其耿介無比貞明可稱距列瑤刺身摛鶴翎徘徊而隟駒其轉奮迅而振鷺將興其淨珉潔其神露凝皎皎敷粉亭亭卓冰自禀時清之化誠非日浴之能勿以臣之賤所獻無徵勿以禽之微所來自遠蒙恩覃而化及似風行而草偃是以齎此嘉瑞唯憂後時欲以明誠上答敢以遐阻為詞作獻靡遼東之豕不緇殊墨子之絲一以見澤兼鳥獸一以彰德被蠻夷王乃愀然色動沉然念茲發明南國之忠汝之遠矣舉奏殊方之瑞予甚嘉之方知雉之潔兮可珍士之潔兮殊衆可珍猶尚於夷俗殊衆可標於歲貢儻援引而不遺願舉白之一送易意難見言以存之得意之後而言可遺本憑詮以指昧既達誠而去詞昔者先王元通默想以深指難可擬議嗟後世無不瞻仰是以錯綜六爻森羅萬象立文以寓其吉凶頤隱以知其來往憑有狀之狀而定其範圍因可名之名以徵其影響悟影響則可名之名息達範圍則有狀之狀無執可名為常名者謬定有狀為常狀者愚方知禮以適變作事之符符以觀設遵意之樞但魚兔之得也於筌蹄而已乎然則言者意之苗得意而根源有據意者言之本得本而枝葉不御假以寄誠明為定據如鑽燧求火獲火而燧之可忘似剖蚌求珠得珠而蚌之可去於戲置文字之館植元牝之根自入存存之室廢乎察察之門不爽毫釐經濟無為之內匪差黍累彌綸有截之垠既而搜未形之形索無眹之眹變以喻而立幽籍明為準則可棄喻取變即明討幽不可以理縛難可以文囚遇陽則明豈必離乃為日遇陰則順何須坤乃為牛夫如是稽其意窮其事旁通其閫閾曲盡其精義英華可採桎梏斯棄儻究忘言之機庶叶表微之思大禹君臨勤求意深苟一言之入耳必載拜以明心蓋以勵華夷形古今所以旨酒盈前莫縱彈絲之響美詞將貢俄聞撼玉之音豈不以詢彼芻蕘防乎驕逸既可大而可久亦無固而無必所以嘉謀乍聽當嶪嶪以折腰直語纔聆復虔虔而屈膝蓋以廣乎所見求其所聞欲使善惡之源自別賢愚之路斯分况乎傳舜之規受堯之命得不固社稷根本察風俗利病是以臣不能諫君兮非曰忠君不能納諫兮非曰聖執至理以垂教採昌言而化人苟有言可佐王道正人倫陶也不得不進禹也不得不遵所以聞妙畧以開容拖冕旒而拂地覽宏謨而致敬低珩珮以鏘身懼溝洫之未通憂禮樂以將壞以正直為龜鏡以忠讜為規戒是以蘊昌言兮不可不陳聞昌言兮不可不拜遂使共守丕業長光帝基若魚水相逢之日同雲龍會合之時符郊畤以陳儀固難比矣望竹宮而設禮曷可方之我皇紹九聖之雄圖舉百王之令典急於求士樂於聞善所以獻昌言之忠臣必待之台鉉赫赫明堂居國之陽巍峩特立鎮壓殊方所以施一人政令所以朝萬國侯王面室有三總數惟九間太廟於正位處太室於中霤啟閉乎三十六戶羅列乎七十二牖左个右个為季孟之交分上圓下方法天地之奇偶時也六年之初孟春之首有截而至無脛而走將欲交正於成王之命所以立辟於周公之手洞入闥以臨八極闢四門而來萬有所司備班品於庭除執事肅文物於前後及夫諸位散設三公最崇當中階而列位與㣥臣而不同諸侯東階之東西面而北上諸伯西階之西東面而相向諸子應門之東而鶚立諸男應門之西而鶴望戎夷金木之戶外蠻狄水火而位配九采外屏之右以成列四塞外屏之左而遙對朱干玉戚森聳以相參龍楊疑豹韜抑揚而相偝肅肅沉沉巒崇壑深煙收而卿士齊列日出而天顏始臨戴冕旒以當軒見八紘稽顙負斧扆而南面知萬國歸心於是鏘金石揚律呂動塤箎搖柷敔儼若思而山立悄不言而雁序一拜一起嶽抃而齊傾舞之蹈之雷屯而復舉俄而翠華轉仙仗迴恩覃率土化溢九垓合蠻貊而畢至盡梯航以爰來彼禹有太室武作靈臺曷與此而同哉倬哉惟漢至德鴻融元功絢煥敷仁義於異域俾華夷而同貫故能臣匈奴來單于超沙漠越余吾棄穹廬而雲起望高闕而風趨屈膝而來有以見其蠢爾垂拱以待是用表於巍乎况當行幸祠祀之禮崇甘泉泰畤之儀盛肅肅乎文物是備昭昭乎威容既正象胥以譯豈言語以不通司儀式班示進退之必敬然後差行列辨尊卑序璧羔皮帛之等第示要荒守衛之威儀冠帶之容間彼荷氊被毳韶濩是作雜夫僸兜離雍容之禮有則倔強之心不施元塞永安寧蝟起兮於彼青蒲方奏猶蟻伏而在斯信純化之雲布俾遠戎之星馳不然何以其國則賒其人不遐修臣之節為國之華朝一人於㝢縣涉萬里之窮沙則周公明堂之儀寧九采之足美而夏禹塗山之會雖萬國而何嘉且夫懷我有方所由者漸德之為被我不可掩非慕義而有求奚尊君之自貶是知撫御之道莫善於漢宣威儀之設莫盛乎甘泉美舞徒稱乎干羽鏤勳何媿於燕然布令陳辭之義行豈事成而後樹引領稽顙之容作乃瞻之而在前自可光九功服九土曠萬代而一時宜耀今而榮古漢七年兮海內已清恃兵強兮深入平城將耀武於窮邊絕域欲用壯於四夷八紘舉國興師婁敬之言莫聽七日不食陳平之計方行於時命雕木之工狀佳人之美假剞劂於繢事寫嬋娟之容止逐手刃兮巧笑俄生從索綯而機心暗起動則流盼靜而直指似欲排君之難匪憚陋容如將報主之讐無辭克已既拂桃臉旋妝柳眉目成可望肉食一作視無遺摛粉藻而標格有度傅簪裾而樸畧生姿節操堅貞狀刳剔之刑無懼穠華窈窕見削成之肩不疑然後迥出孤域逍遙獨步向鋒刃之形稿高秉松柏之心堅固既而踟蹰素質婉娩靈娥日照顏色風牽綺羅覩從繩之容楚楚混如椎之髻峩峩有貌而自為飾詐無情而不轉橫波時也匈奴合圍嬖人興事故持娉婷之淑態用撓閼氏之所忌果驚如劍之眸不識運斤之鼻觀其玉立漢壘花生女垣香飛大漠名動雄蕃各揣蕞陋之姿胡顏恃寵競念腥膻之質苟且孤恩乃儲讐以極諫並懷禮而獻言以為漢之與蕃本為殊國冀兩地之無患曷二主之相殛落日而鳴鼙自怨中夜之重圍暗失李夫人月墜香焚花沉九原繁華委地零落何言有少翁兮術通神鬼為漢帝兮夜致精魂於是詔未央之宮備通靈之所五位之壇離立九奏之音克序珠籠翠幰龍師虎旅銀燭之煌煌次列金管之愔愔慢舉帝乃坐中寢御纎幃森羽衛儼天師佩符籙以威重拂香花而步遲左止簫韶之奏右啟甲乙之旗搢霜珪而歛色執紅旌而盡思立北斗星文之下當中壇月午之時萬籟寂寥發清音於漢殿九天空闊寫招魂於楚詞詞曰白玉潔兮紅蘭芳忽玉折兮蘭已傷魂兮勿復遊他方盍歸來兮慰我皇又曰彩雲裾兮流霞袂而來兮忽而逝魂兮勿復遊四裔歸來兮膺萬歲已而愴悢沾巾淒涼侍臣窸窣而房櫳變色熒煌而戶牖生春如扇如花開覩恍惚之中事非煙非霧卷見希夷之外人珠璫瓊珮鬢髮絳脣髣髴平生之貌依稀歌舞之身顧步嬋娟迴翔綽約似發言而尚默若將前而復卻於是斜漢將傾繁奏爰作琳瑯璀璨綺羅迴薄風淒雨切忽消散於杳冥鳳去鸞歸空珠翠之寥落自是妖妄日恣虛無念作侮萬乘為脫屣陋百載之浮榮幸河海之無事賴干戈之暫平不然少翁此夕豈宜一拜於文成元冥之政已息青帝之令將行太史先三日以奏天子率千官以迎是知齋沐夙興虔恭慎慄命奉常按東郊以嚴備詔金吾肅中禁以警蹕內外相比上下是率俄而斗轉招搖日當甲乙褫元冕於殘漏掛青衣於曉律翠華忽舉見閶闔之初開蒼龍啟行與朝陽而對出觀夫飛輦輅儼珠旒萬騎而前分儀仗千乘而後列公侯出青門之郊至祈神之地簨簴羅植珍羞有次陳靈威於中宮之座設大昊於配享之位東嚮西嚮勾芒歲星而對列左之右之三辰七宿以相厠既竭百辟之心用展一人之事帝乃玉色以進磬折而前求發生之候不忒祈溫和之氣罔盡敬於地冀佑於天一拜而北陸之寒去矣再拜而東方之風煦然獻酬既已尊卑備矣拂祥光於龍顏之上納和氣於御衣之裏鳳詔還闕金輿返軌遂舉措而凝令載行隨指顧而發生四起我風有截郊祀無假於文王我化無為律呂不勞於鄒子故乃布德施政遠達幽通高卑咸沐貴賤攸同始振蟄蟲在好生惡殺遂行慶賜可滅私狥公乃得化洽方隅恩光岐雍遵古典以立則授人時而敬用願迎乎千春萬春與夷夏之所共曹氏之蠅因誤而致既失手以傷善乃象形而取類胡能有定將飾非於寡尢變而從宜善奪真而不異原夫裂素凝璧纎毫露鋒展霜花以雲薄墜松煙而漆濃於不可為之處見不可去之蹤處小瑕之間義寧有怒居太白之上汚實難從由是潤色成功從權善補逐手見營營之狀隨筆長薨薨之羽乍若蟋蟀之居壁復類蠨蛸之在戶然而迥立素絲不失毫釐侔止樊之貌類附驥之姿當似是似非之前吾與點也於一顧一盼之際默而識之將起枚生之說那虞翟子之悲然而就之不爽酷得其象雖違心以著可悅目而賞隱映纎絺之內囊螢處中附麗紃組之間牖蟲將上嗟乎巧以飾詐假能亂真始自不材之典俄成有用之身捷捷幡幡誘讒人之思發跂跂脈脈透輕綃而色新已而吳主是臨奇工斯布左右歷覽徘迴周顧覩詩人止棘之體絕王思立筆之怒迷邂逅之所致載揮拂而方喻將特模於手成了莫知其筆誤懿夫汚不足誚瑕豈難除知過善改巧思橫舒卒能珍賞翫之不失成奇文而有餘彼田夫之禾麥景山之鯉魚方之不如惚不可視無臭無聲恍不可聽希夷杳冥於不可為之內有不可狀之形則可徇其惚徇其恍於無是無非之間見有若存若亡之象似菖蒲之秀聞之而不見其形同合浦之珍知有而難期入掌且夫視之不見將謂虛聽之不聞將謂無則虛無之內有罔象之珠及夫視之可見以為真聽之得聞以為實則真實之外有強名之質故執無而求者理則謬焉執有而求者理亦不然寄精於從無之地韜光於入有之權其象也虛其體也元謂皦兮尚默謂虧兮復全其方不中於矩而規不中於圓自索隱於心契可忘形於意筌靜以神觀黃帝得之於三月反於目聽列子寤之於九年然後含兮如容浩兮如海體混沌而不殆成胚渾而不宰先天地之始已塊然而生後天地之終尚澹然而在何者為在何者為生生萬物兮吾象不顯成萬物兮吾象不呈謂之有兮無眹謂之無兮有精故道我者非常道名我者非常名及夫清有形而為天濁有形而為地列而為九疇八卦播而為五行六位此皆非其象此乃象之器自可外廢其境內存其至一喻老氏之言曷無為之不致手運斧而方圓自縱斧有柯而規模可觀誠取則之非遠曷持心以常難是知選材於山操刃於手將散樸於大巧是侔形於妙有則可審分寸定妍醜不脫故而圖新亦瞻前而顧後然後擬議是啟經營靡停方坎坎以無撓聿丁丁而未寧觀所措而舉措因其形而制形且勿謂效之難尚俟乎繩墨勿謂象之遠仍憂乎差忒左手將舉其樸斵右手足見其成式不離指掌之旁自有短長之域龜鏡頗邇儀容在側見幾而作成於目擊之間殷鑒不遠便契握中之則何必公輸是集梓匠具陳雖欲遠徵其類不如近取諸身於造次顛沛之時尚思行已於一顧一盼之所何必求人庶得揣稱攸宜諮謀可考冀析薪之入用知缺斨之足保終懷繼踵之誠未爽從繩之道嗟乎柯在手兮至近不能觀者有諸道於身而豈遠不能行者信歟故取則於人者失聞道於人者疎乃可端其末慎其初反視於周旋之內收心於躁動之餘因而利焉是可宗也譬以身者方或同於夫如是正其規從其本揆度而枉柄無阻睥睨而迷途自返儻忠恕之內存信率性之非遠國有禁火應當清明萬室而寒灰寂滅三辰而纎靄不生木鐸罷循乃灼燎於榆柳桐花始發賜新火於公卿由是太史奉期司烜不失平明而鑽燧獻入匍匐而當軒奏畢初燄猶短新煙未密我后乃降睿旨茲錫有秩中人俯僂以聳聽蠟炬分行而對出炎炎就列布皇明於此時赫赫遙臨遇恩光於是日觀夫電落天闕虹排內垣乍歷闈璅初辭渥恩振香爐以朱噴和曉日而燄翻出禁署而螢分九陌入人寰而星落千門於時宰執具瞻高卑畢賜降五侯以殷渥歷庶僚以簡易煖逐來命風隨逸騎入權門見執熱之象閱有司識燭幽之義咸就第以照臨示廣德之遐被於是傳詔多士同歡令辰將以明而代暗乃去故而從新均於庭燎貺彼元臣熠熠當門煙助松篁之茂熒熒滿目燄如桃李之春㣥臣乃屈膝辟易鞠躬踧踖捧煦育之溫惠受覆載之光澤各罄謝懇競輸忠赤拜手稽首感榮耀之無窮舞之蹈之荷鴻私之累百然後各爨鼎鑊傳輝膳官爭焚爐炷競爇膏蘭銷冷酒之餘毒卻羅衣之曉寒方知春秋故事未逾於我周禮救災徒稱變火曷若賜於百官萬方同荷大演之數五十其用四十有九未諭一之本末徒訝數之奇偶於是稽所據推所受以不用為用端以非數為數首方知一不可見上不在天一不可尋下不在田是太極含三之本居混元不二之筌成出天入地之契乘屈伸合散之權作數之本為唱之先伏質於無體之體反形於自然而然則無者有之宗有者無之據一從虛而體立數憑一而神助舒而用萬象自虛無而來攝而終萬象復虛無而去安得不存我而立因我而著昧者以此一為無用之徒先聖以此一為庶幾之處是以捨此則數不足兼之則義有餘終萬物之末始萬物之初在窮理以考實勿存形而課虛亦猶一人無為兆人欣從一氣無體㣥生所共本立而道存主適而臣從若十二月之輪轉不宰者歲之宗三十輻之運行無有者車之用今則以未分而象太極中分而象二儀未分而百事隱中分而百事隨然後四四而布七七而具可以明淺深可以明好惡總而舉也叶仲尼知命之籌考其成焉契伯玉識非之數儻明得一之義庶達傳心之路貞元初既平凶醜海縣安阜歸戌人於田里卻戰馬於隴畝所以示力爭之無益昭靜勝之足有乃命司武闢御皁出㣥騶於紫陌閱眾驥於黃道吉行之乘存六駮而有餘無戰之時惜萬蹄而空老於是脫羈鞅任超逾騰驤於古塞之外飲齕於洪地之隅恣蕭蕭之永逸免逐逐之長驅天廏初辭誠貴人而賤畜農車儻駕亦以有而之無留之則踠其駿足而不與人共捨之則遂其生適而省其國用顧東道之常來淩北風而遠縱曩者揚鑣噴沬擐甲鳴鞭角紫燕以行地隨飛龍而御天追風於陣表絕電於君前功德難忘信彌多而不厭驕奢作戒故雖愛而必捐任物自然仁之上者修文偃武德之要也屏危事之形影張禮容於宗社尚茲恬淡見道發宸衷釋彼權奇知化成天下材雖駔駿用亦有時艱難則雲從而騁力開泰則野逸而呈姿昔常代於人勞良多効矣今則遂其天性非曰棄之感君恩之有序彌天壤而得所望驂騑而躑躅依水草而容與彼周武之歸漢文之卻曷足方我王之明舉吳坂之馬兮駿且奇伊孫陽兮知不知伏櫪而誰憐拘絆倚輈而但見清羸兩耳長垂不斷於嘶風噴月四蹄可試何愁於玉勒金羈當其初出渥洼孰分駑驥雖白日之可逐曷青雲之自致頓銜驤首逢人兮不鳴強鳴弄影超㣥知己兮未至須至嗟乎全無芻粟半臥沙泥况精靈之粗有亦毛骨以非低金埒行時儻拔風塵之跡玉鞭垂處願親桃李之蹊於是將躍未騰欲真尚假徘徊龍廏之側踡跼鹽車之下良時易失常憐過隙之光朗鑒難逢多是迷途之者善相爰來精神陡迴奮迅而蝟毛俱聳嘶鳴而星眼俄開舊皁云辭步步而風雲借便長衢一去行行而珂珮相催曩夕猶賤凌晨已貴㣥心惕惕以暗伏衆口喧喧而相謂乍同曲突收將宮徵之音又似豐城指出斗牛之氣蓋非斯人無以辨龍駒非斯馬無以動寰區固二者之冥契播一時之令圖馬兮雖遇新知還因舊主儻一顧之未替必載馳而可覩更有瑤池方外之程願著鞭於造父有驥子兮維之朽索服鹽車兮困於絕漠將發憤於一哀遂求知於伯樂由是騰健步奮奇毛連嘶自若驤首彌高負調鼎之資空慚引重持向人之意終願代勞當其迢遞燕郊蒼茫吳坂悲東道之莫及念北風之將晚既同跼跡載馳之用靡分儻遇知音千里之期何遠寧曳輪之是辱恐負軛之非名飲齕誰憐其垂耳鞭驅奚敢以抗衡是使元黃莫遇款段無營汗血匪難一日有祈於用力求人未易三年何恨於不鳴今也勞役薦臻高名斯矚將激昂以待顧願奔馳而徇欲重伸羸氣自殊覂駕之難載發哀聲幸比擊轅之曲或有賤同牛皁用匪龍媒亦在異於剪拂辨以駑駘夫如是則當於輗軏之下自然不媿於㣥材蟄處於冬雷生自震啟一聲於春候知萬類之奮迅虺虺初動祁祁始振首出庶物為陰陽號令之端有開必先作天地發生之信原夫飛走各志㣥分處陰既不戁以不竦尚聲銷而影沉及夫勾芒御辰夾鐘應律整雲師布露之澤迫和氏春分之日溫風載扇重陰四密動豐隆之大聲發昆蟲之暗室跂行喙息聞填填而鼓舞爭馳脰振翼鳴隨虩虩而雷同競出隱蔽雖久騰揚有期變軯轟而作矣俱引領以從之見㣥生嚮風之義知大鈞播物之時是則感之於彼而乃乘之在茲且遂隱隱以起予各侁侁而挺爾穴處者聆之而厲志泥蟠者聞斯而舉趾均發萬品非唯百里各騰聲實鶯出谷而載飛競逐明時范彈冠而思起搖車效之而可也聚蚊因之而有以然後舍彼即此違陰就陽角觡奮迅羽翼弛張殷南山之粗厲啟出地之潛藏似桴鼓之纔終戈鋋熠熠如擊石之止後鳥獸蹌蹌有若眾彙居蒙一呼而告㣥生未覺一言以導曾無震寢之虞誰有擊臺之暴於是桃吐其秀鷹化為鳩助發生之德省囹圄之囚潛匿假之而振拔毛介因斯而處休大哉震元利拯㣥生而出幽琴蘊雅兮閑暢瑟合音以高張忽雙聲以動作合六律之短長一則玉軫金徽無爽於清濁一則瑟絃疏越不間於宮商君王政美和同化能率舞放鄭聲於域外屏優雅於樂府所以顧綠綺之韻高愛清廟之器古憑曾皙之所奏與師襄而對撫滌慮而匪隔毫釐共坐而自齊徵羽靜而各守動而合矩左諧乎蔡炎之音右扣於湘靈之鼓况復素女絃怨重華調清以風中之響入雲和之輕便契虛徐之節雅符閑淡之名誠二體之區別能九奕而混并流水一聽柱間而涇渭合派簫韶共奏指下而鸞凰和鳴彼弄互揭此意還發一曲之金飇飋䫻再奏而玉堂清越寫斷續於秋空激寥亮於雲中琴絃促而影細瑟絃繁而體殊伊和樂之假主俾合散之同途理心而寧乖高下盈耳而不離笙竽故若出有入無唱予和汝覺肸響於輕重等洪纎於律呂播南風於大道秩秩無差配上古之希聲愔愔備舉遂使敦本志切去邪義深惉懘之亂不作非僻之思不侵由自內而率外皆謂樂而不淫
