front:
  text: 全唐文欽定全唐文卷九十帝諱煜懿宗第七子咸通八年生十三年四月封壽王名傑乾符四年遙鎮幽州文德元年立為皇太弟改名敏翌日即位改今名大順元年正月上尊號聖文睿德光武宏孝皇帝天祐元年朱全忠逼遷於洛陽遂被弒在位十六年年三十八諡曰聖穆景文孝皇帝廟號昭宗
  hash: sha256:a4b1a48a7924800aa9e438313ebe0d6cabdfcefdd55bc46c4988b886d52ffcf8
  markers:
  - {type: head, offset: 11, content: 昭宗皇帝, id: KR4h0168_NFKB_090-h1, level: 1}
body:
  text: 朕以賞罰二柄不可廢也助順誅逆自古行之陳敬瑄出身屠沽驟竊旄鉞包藏姦逆侮慢朝廷敢行專殺之威尤顯不臣之迹惡昭圖之直筆溺闕贍於中流傲狠之心惟思殘害猖狂之志日甚沈迷先皇帝再幸梁洋方當艱否廣張形勢欲脅乘輿全蜀賦租不共天府百城牧守皆出私人近者爰命台臣往持戎律冀因交代亦許罷歸而又結黨連羣以拒王命深溝高壘輒恣兵威罪既滔天誠宜共棄其陳敬瑄在身官爵并宜削奪兒姪等委中書門下商量處分朕聞君天下者先賞而後罰立教化者貴德而賤刑其或道之以爵而不勸是稟匪人之性豈悛不救之謀雖軍旅屢興有慙區宇而干戈勿用何去頑嚚邢磁洺等州節度觀察處置使金紫光祿大夫檢校司徒同中書門下平章事守邢州刺史上柱國隴西郡王食邑三千戶李罕之閭閻下品窟穴微生憑厲氣以感時依凶徒而干紀剽劫郡縣攘害蒸黎水絶安流陸無砥道先皇帝捨於斧鑕委以招修唯聞屠伯之名寧有字人之稱而又擅離河內竊據東郊溪壑貪心涸伊瀍而不潤烏鳶利觜啖郟鄏以成空旋逃原野之誅還聚萑蒲之衆時以上京初復羣情未安宥十死之正刑委三城之重地仍加相印俾耀兵權冀懷再造之恩永戢無厭之暴而乃復招逋逸輒留貢輸始則結王友遇而寇攘終則投李克用而侵軼乃山北以邢洺為要害爾則引戎馬以屠攻洛京以懷孟為咽喉爾則肆爪牙而搏噬謂其當路終可欺天不知祖宗垂休祐豫纘繼中外陳懇成我蕩平專攻之令才行同德之捷巳獻度其鼎斧無一安存降以絲綸用彰攻伐其李罕之在身官爵并宜削奪注毀委招討使宰臣張濬闕駱全雍悉加存恤嗚呼禍福無門惟人自召爾為將相而不能全身爾授旌旗而翻行起亂罪在册府朕安敢私凡百同盟共懲始禍布告中外咸使聞知昔漢武因恭儉富庶之後建置朔方孫宏沮之十不得一良史以宏有宰相之體誠以愛人理國為先拓境開邊為末及孝宣帝值雄才削平之餘將議北伐魏相爭之五將旋罷果致中興號為賢輔況朕值天厭干戈之際人思休息之時敢望皋夔共成堯日庶幾孫魏粗及漢年苟異於斯知何倚注光祿大夫守尚書右僕射兼中書侍郎同中書門下平章事集賢殿大學士判度支兼京畿諸道營田修葺太廟使充河東諸道行營兵馬招討指揮制置等使河東節度觀察處置等使上柱國河間郡開國公食邑二千戶食實封二百戶張濬早以盛名稱為奇士由是再加召用委以鈞衡謂其必致小康克勝大任而乃罔思守道但欲邀功是不詢之計謀起無名之兵甲自云一舉止在旬時妄請抗論勢莫能奪輕葛亮渭濱之役小裴度淮右之行而經歷寒暄糜費百萬虛誕彰於朝野詐詭布於華夷橫草薎聞燎原愈急俾擁旄乘驛之使囚於虜庭致勤王奉國之軍懷歸本土忘廊廟之威重結藩屏之寇讎是使海內生靈竭於貢賦豈獨河中郡邑蕩為邱墟生此厲階欲誰歸咎嗚呼徵朝錯之故事仍王恢之舊章固有明文爾當何逭尚以愛人以禮理體宜然廉鎮極權武昌善地宜罷樞軸之任仍停支度之司勉自深惟以逃後命可檢校尚書右僕射充鄂嶽等州都團練觀察等使朕垂衣嚮明負扆成化內則委輔翼之任外則寄藩屏之臣比用股肱是為心膂況荊衡巨屏禹貢古封南制百蠻西控三蜀或受統臨之命爰崇迭處之榮持危啓運保乂功臣開府儀同三司守太保兼門下侍郎同中書門下平章事國子祭酒充太清宮使宏文館大學士延資庫使諸道鹽鐵轉運等使上柱國魯國公食邑四千戶食實封五百戶孔緯闕里傳宗儒林植操出入纍更於華貫超升遂陟於鼎司宜成我無為歌我有截豈可但崇朋助罕究否臧昨者張濬首請興師親求伐叛且陳謀畫纍贊征行決言旬朔之間克著殊常之效延英互奏幾宜朕言文字繼來固違朕志以至干戈一舉星紀將周并汾之寇孽未除蒲晉之生靈巳盡搆茲紛擾職爾披陳罔思惑亂之由堅執比周之計詢於輿論曷副求今則止罷中樞俾安外閫尚顧始終之念用成進退之宜勉服明恩往祗休命可檢校太保兼御史大夫荊南節度觀察使輔弼之事安危所屬大則調陰陽以期昭泰次則撫夷夏以務洽平俾比屋之可封致乃后於無事兆人允賴百辟具瞻苟異於斯則將安用扶危啓運保乂功臣開府儀同三司守太尉兼門下侍郎同中書門下平章事充太清宮使宏文館大學士延資庫使兼諸道鹽鐵轉運等使上柱國晉國公杜讓能軒裳貴胄禮樂清門蹈姬孔之康莊邁韋平之閥閲夙推重望早歷華資洎陟台司亟更年籥方謂偉儒克承大任而乃首居帷幄輕議干戈棄卿士之臧謀搆藩垣之深釁啓詢之際證執彌堅果致兵集甸畿人散都邑尚賴祖宗垂祐賢智叶謀頓悟朕心別施制命詢彼輿人之論咸推上相之尤須示典章用息騰沸尚居列郡式重大臣可貶梧州刺史夫雷霆雪霜上天降以成物明罰敕法哲王垂以理人是則陽春不可以獨為歲功仁恕不可以專為君德刑威之作其在斯乎朕以眇身祗膺大寶奉祖宗之丕訓荷天地之洪休八年於茲一日無怠遜於志者必本於情苟懲誡之不明懼典章之斯廢威勝軍節度使檢校太尉同中書門下平章事隴西郡王董昌出於行伍屬遇艱難權握兵戎位崇將相器將盈而自覆鼎必折而遂傾因憑生祠輒有狂計假陳妖異惑亂邪巫鼓噪危樓偽為建國不思理代徒生犬吠之音欲就叢祠妄舉狐鳴之兆賴浙西節度使錢鏐與諸州等皆忠誠憤激壯志堅高始以逆順之理飛章諭之而不悟次以攻伐之謀與約脅之而不回至於率兵直以劘壘雖假言誘惑止遏凶邪終為閉壁偷安不使束身歸罪是其陰詐猶欲張皇魚戲鼎而雖亦可哀蜋怒轍而終為不率天討有罪鬼得而誅其董昌在身官爵并宜削奪仍委錢鏐進兵攻討越城之內士庶且多寧無勇敢之徒善以功名自許如梟戮生擒董昌者授三品正員官賞錢一萬貫如有官者超三資酬獎如是董昌威制曾助妖謀翻然改過圖功轉禍為福有所自效者罪並不問賞即與之於戲惡殺好生人君令德仗順伐逆武夫令猷鳴鼓而攻蓋非獲巳奮戈而起亦宜憤諸勿發勻焚無誤無失罔俾觀聽者謂我黷武而佳兵也金紫光祿大夫守禮部尚書安樂郡開國侯食邑一千戶孫偓夙通朝籍纍踐華資竊顧多歧遽墮直道秉弼諧之大政附伎術之小人罔畏公言自為良策處嫌疑而不愧謂寵利之可安而屬我艱危匪能匡救頃因丕變亦貸彞章雖罷萬機尚分六職是惟循省俾息沸騰觀諫臣所上之章陳取戾不巳之狀則正卿之位非爾宜居將警後來遂投荒服行當罪己無或尤人可貶南州司馬員外置同正員仍令所在馳驛發遣其有任崇柱石位重台衡或委以軍權或參諸宥密竟因連謗終至禍名鬱我好生嗟乎強死應大順巳來有非罪而加削奪者並復官資其杜讓能西門君遂李周潼巳下並與昭雪還其爵秩韋昭度頃處台司每伸相業王行瑜求尚書令獨能抑之致於沈冤諒由此事李磎文章宏贍迥出輩流竟以朋黨之間擠於死地凡在有識孰不咨嗟宜並與昭洗仍復官爵國家自盜螫中原兵纏九縣支度牢籠之務施張經制之宜率煩台臣旁綜使務綱條既正豐阜可期宜擇通才俾繼成績僉曰叔父膺豫求詢謀協同毗賴惟允即以虛位并而授之匪私吾宗示張王室惟爾嗣薛王知柔我之近屬國之材人識大體以立朝蘊嘉謀而致用粵自典司宗祏尹正神皋庇本枝而敦序有倫臨帝甸而汚萊盡闢政惟務本生靈懷衣食之源令著先威豪右屏椎埋之迹人懷其惠吏不敢欺封畿新轉置之規園寢備薦羞之禮府署完葺京師砥寧疇茲多能孰可加爾朕言念銅鹽之重賦輿之殷勞於鈞衡多歷年所今將授爾用展其材矧乃司存此專郎吏乾元多難方委公卿離之合之各繫緩急今我用爾思復舊章惟身可以律人惟奉公可以御下取舍勿因於利任使惟其所知無以公務結私恩無以公方樹私怨惟是六者竭乃一心副吾超拔之恩濟我艱難之運悉仍舊貫別示殊恩於戲朝廷之本軍國之用佇爾康濟紓吾焦勞往佩寵光勉施才術苟不稱是又何敢以叔父私於天下哉將我詔命使於四方必惟其人矧乃舊服咨於輔相僉曰汝諧用之不疑行矣思濟李坰國朝名相之令嗣也文行器業雅有家風政事規為克紹先志踐履亟更於中外練達深得其本根頃鎮黔江洽聞善政四年問俗五郡懷仁恩信被於昆夷盛名振於縣道尋移旌蓋往理桂林載揚休聲屢著嘉績兩地遺愛萬人去思今聞黔巫易帥之時頗失睦鄰之道慮成間隟又動干戈念遠俗之無辜向中宵而不寐升爾揆路為吾使星尚念漢地人情必懷龔遂河內風俗未忘寇恂宜其宣我憂勤導豫宵旰強者抑之弱者撫之無俾黔人又墮塗炭用爾專達膺豫求佇其嚮風聞爾稱職殊恩好爵無所吝焉門下擇股肱良臣為社稷大計斯實安危之本必資經濟之才應星象而踐三台平陰陽而調六氣成彼非熊之兆叶茲審象之求既偶通賢爰申並命扶危匡國致理功臣新授武定軍節度湖南管內觀察處置等使金紫光祿大夫檢校禮部尚書同中書門下平章事持節都督潭州諸軍事兼潭州刺史上柱國清河郡開國侯食邑一千戶崔允公台貴胄禮樂名門秉直道以匡時挺貞觀以華國玉山孤峭迥出千峯冰鏡澄明能涵萬象翰林學士承旨銀青光祿大夫行尚書兵部侍郎知制誥上柱國博陵縣開國男食邑三百戶崔遠圭璋蘊德鸞鶴呈姿持偉望以標奇蘊神鋒而匿耀朱絃逸韻既可禮天寶劒雄鋩宜乎折滯或繼膺倚注屢執鈞衡或亟處深嚴嘗司詔誥燮調茂績敏默嘉名昭布朝倫洋溢休稱而體國勵志問牛之美早傅致君載誠吐鳳之名夙著宜陟重任詳觀厥能升諸喉舌之司寵以罏錘之用專祕殿之圖籍度會府之財征俾操化鈞仍綰邦職當此艱難之運爰繫輔弼之功噫未復神州尚茲多壘仍歲有征巡之役兆人懷蘇息之期豫心浩然罔知克濟咨爾良弼共成懿圖勉膺三事之榮恪奉一時之寵允可守中書侍郎兼戶部尚書同中書門下平章事集賢殿大學士判度支遠可守本官同中書門下平章事判戶部散官勳封如故門下朕聞天所以運行不息維之者星辰地所以載厚無疆紀之者海嶽故尹説相殷而帝道盛旦奭佐周而王業昌時之替興事繫輔弼朕勵精理道夢卜披賢繼叶旁求並膺爰立皆號人傑實為國華銀青光祿大夫守中書侍郎同中書門下平章事充集賢殿大學士判戶部事上柱國安樂縣開國子食邑五百戶孫偓大昴分輝維嵩孕秀直如金矢潔若冰壺處諫諍之司言無畏忌守駁正之任道不依違當官而行遇事必立自擢居台席兼領地征蘊持危扶傾之心負憂國忘家之志卓爾孤邁超然不羣稽於衆多僉曰名相銀青光祿大夫行尚書戶部侍郎同中書門下平章事上柱國嘉興縣開國男食邑三百戶陸扆清廟升歌朱干象舞內健外順動直靜專早踐清華旁流休問既登禁密潤暢皇猷言有準繩心無吝悔爰從近侍委以化鈞目無全牛刃有餘地不斯須而離道不造次以違仁考於羣詞咸稱良輔而皆道符夔益業冠蕭曹楷式一時儀刑四海和松磊落鬱為大夏之材賜璉晶瑩宛是接神之器今朕以運丁艱否時未洽平賊臣尚恐其跳梁國計未臻於豐羡煮海之利多失於舊規量地之征未登於貢式須分重務屬我名臣冀大振於頽綱俾漸昌於衰歷是用遷皇極紫微之位總書刊集之司兼以利權盡付全德爾宜振提百度蕩定九圍勉服寵光以綏夷夏偓可門下侍郎同中書門下平章事監修國史判度支兼諸道鹽鐵轉運使扆可中書門下平章事中書侍郎充集賢殿大學士判戶部事散官勳封如故我國家尚法夏殷遠遵漢魏爰設儲二式固宗祧既明兩而作離在立嫡而惟長矧茲沖眇獲嗣丕基將宏永圖宜舉令典德王祐朕之元子孝敬日躋早茂溫文克將岐嶷屬者朝廷多故兵革尚興懷柔方務於舞干典禮未行於主器而忠臣獻議百辟上言請建元良至於三四以奉祖宗之彞教必在前星係億兆之人心宜崇嗣體由是考彼史册詢於蓍龜厥惟舊章乃建嘉命爾其嚴奉師傅敬慎威儀必使流慶萬邦垂芳三善稟教諭之道作圖牒之祥勿怠令猷克光帝載服我明訓永孚於休可册為皇太子仍改名裕令所司擇日備禮册命夔州司馬員外置同正員朱朴本在寒微偶升科第復塵簪組且列膠庠不為自審之謀但務夤緣之計實因姦幸潛致顯榮亦謂術可弭兵學能理國叨半歲容身之貴無一朝輔政之功惟辱中台頗興羣論斥於散外未絶他腸越法制以有圖信愆尤之自作封章所指竄逐尚輕掾彼方州亦云寬典非我好黜惟爾深思可貶郴州司戶參軍王者之子在襁褓中置三師訓之繇古道也我思成人巳來遘此多難師訓之義翦焉闕聞南面稱尊愧於寡昧繇是言念諸子疚於厥心宜擇正人為之傅導今丞相言爾牘老於大學雅有德行明君臣父子之道知禮樂詩書之源可使高步承華大參望苑琢磨羽翼朕有冀焉爰授正卿以加峻級且旌優異往為傅師邪蒿鮑魚勿俾登俎胄筵講肄為惜分陰使其知東平為善之規喜王褒洞簫之賦承萬代之業固磐石之基斯實賴於老成人也門下天地廣運寒暑所以推遷帝王任人理亂係於周稔故叔敖三相往道闕胡廣七為前功斯在因詳文册爰示徽章扶危匡國致理功臣光祿大夫守中書侍郎兼吏部尚書同中書門下平章事判度支上柱國清河郡開國公食邑二千戶崔允金莖擢用玉燭資和朱絃含理代之音蒼璧是禮天之器自付政柄纍遇時艱或巳去而復還每勤官而蒞事雖務直道終失中庸朕昨者初復上京方安庶品且期靜理貴保和光而於敷奏之間獨有去留之説徒妨事體俾長紛爭是用輟乃鈞衡專茲銓鏡亦將示朝廷之典制保君臣之始終更茂前功永孚於道可守吏部尚書天地之數寒暑有推遷輔弼之臣任用有進退蓋以其宣力斯久克修是虧俾夫退列二卿式示朝典以禮之使其在茲乎扶危匡國致理功臣開府儀同三司守司空兼門下侍郎同中書門下平章事監修國史判度支上柱國魯國公食邑三千戶食實封一百戶王搏始以菲才擢升重位亟移星律薎效公忠惟務回邪罔思致正紊朝廷之綱紀致經費之空虛而又朋附近臣隳弛大典豈可尚持國柄所宜降處周行猶念含宏勉為循省可特進尚書工部侍郎工部侍郎王摶久司邦計復掌國鈞致帑藏之不豐則材謀而安在曾無讜正但務回邪盡非燮理之心惟是貪婪之志今則罷其大柄復列二卿雖優宏之制巳行在問俗之司俾任可謫授溪州刺史所在馳驛發遣溪州刺史王搏久居重位罔著嘉猷掌邦計而罕致豐盈顧私室而惟多貪積雖示朝黜未塞羣情俾從行使之權許履掾曹之職可貶崖州司戶參軍員外置同正員兵部司馬之職尚書法從之官古不輕授今難其人蓋戎務之出入馬政之弛張莫不攸繫非有奮勵之材練達之智不足以奉揚威武毗贊機密者矣爾光祿大夫兵部尚書樂仁規粵自蚤歲有志事功自北而南在朕左右及其給事內廷論思獻替之益亦時有焉夏官之選唯爾之能然以八座之官朕非輕以畀人者也爾尚一乃心力以報朕所以見知之意於戲惟秉義守禮則可以謹科條惟趨事赴功則可以行邦正尚思自勉服我訓詞古置御史繩愆糾察為朕耳目董正朝綱厥任非輕必惟其人爾御史大夫史實風裁嚴毅學識淵源徑正之氣足以配昔人之賢明敏之才足以周當世之務今朕丕承鴻緒值造多艱外有侵侮之虞內賴修攘之略特命爾爾宜益勵初心毋荒朕命念爾登科之際當豫反正之年宜降異恩各膺寵命門下朕聞賞有功則勞者勸考其績則政事彰能否既分黜陟斯在其有勳巳銘於册化復被於謳謠表率公侯澄清土宇靜夢澤於千里盡闢汙萊曜軫宿於九霄光生芒角行爵繼祿顯忠遂良式副僉諧爰登寵寄具官成汭氣合冬日志烈秋霜蘊雄特之標中能抑畏抱介潔之操外富通明自節制衡巫統臨荊楚承匪人之貪虐屬生聚之流離比衛文之革車兼無三百同魏相之版戶略不盈千曾未踰時俄成樂國井閻富庶人物殷繁璣組之賦聿修苞茅之貢常入砮丹靡闕箘簵咸臻睦鄰而四境風行蕩寇而三峽浪息況蔓聯湖嶺輻湊梯航既水陸之靡艱致賦輸之罔滯積茲功緒實謂忠勞苟無舉善之文是廢疇庸之典今則移紫微之尊秩疏異姓之殊封位冠三台爵踰五等用獎分憂之績乃申進律之恩勉力在公傾心報國服我休命無忘恪恭門下朝議大夫前使持節房州諸軍事守房州刺史上輕車都尉李踐由朝議大夫行蘄州司馬護軍李惟可等出自士林頻遷官序或方圓異用道有變通或昆友官同法宜回避俾從新令用協舊章踐由可守安州都督府別駕散官如故惟可可鄂州別駕官勳如故門下朕以眇身祗膺大寶十有三載懼不克勝上荷祖宗之靈托於兆人之上虛受謙益每勵於恭勤示儉守文靡忘其宵旰而乃兩經播越屢興兵革生類莫躋於仁壽理道未致於洽平尚賴左右大臣尊獎侯伯共戡多難歸復神州豈我眇沖拯此艱運恭念高祖睿宗元宗順宗或經多難或苦沈疴遂厭萬幾授於令嗣是使進退無爽孝慈兩全人心盡服其至公天性克彰於具美近者忽嬰疾疹旦夕未瘳雖思養襟靈而亦循典故皇太子裕溫恭有立和粹積中蘊孝悌以闕稟聰知而夙賦動惟樂義進則思賢必能廣繼絶之心副傳歸之命萬機至重不可暫闕宜令皇太子裕監軍國事咨爾中外匡弼將相卿士輔朕元子永孚於休凡有庶務悉宜聽監國處分布告遐邇當體朕意主者施行
