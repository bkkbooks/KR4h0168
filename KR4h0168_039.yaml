front:
  text: 全唐文欽定全唐文卷三十九元宗二十
  hash: sha256:29857a8c039cae5954376091873e0f2cb537ea59b516bc9cdcb85149df0617a2
body:
  text: 維開元五年歲次丁巳五月庚子朔二十七日景寅皇帝若曰於戲夫象賢種德匪直諸華開國承家無隔殊俗咨爾勃律國王蘇弗舍利支離泥卿歷代酋渠執心忠肅遙申誠款克修職貢謝知信由其遠略郭虔瓘所以足兵行觀郁成授首何止匈奴斷臂是用命爾為勃律國王爾宜善始令終長奉正朔寧人保國慶及苗裔往欽哉其光膺典冊祗朕寵命可不慎歟維開元十六年歲次戊辰正月戊戌朔十四日辛亥皇帝若曰萬邦述職無隔華夷五等䟽封式固藩屏咨爾䟽勒阿摩支知王事左武衞將軍員外置裴安定誕靈蒲海稟秀葱山蘊義以立名蹈仁而成德雖日月所炤莫非王土而烽燧時警猶曰虜庭遂能扞彼邊陲歸我聲教載闡疇庸之義俾宏利建之風今遣大理正攝鴻臚少卿喬夢松冊爾為䟽勒王於戲允迪由庚勿替敬典綏厥戎落永為漢藩爾往欽哉踐義立身資忠成性稟崆峒之氣威武可稱慕函夏之風款誠必盡功著沙漠聲聞闕庭宜有襃崇俾膺封建今遣大理正攝鴻臚少卿喬夢松冊爾為于闐王於戲祗若順訓聿修令德無怠無荒以保土宇爾往欽哉維開元二十一年歲次癸酉四月丁酉朔五日辛丑皇帝若曰咨爾箇失密國王木多筆於戲奕葉歸順遠舒誠節修職貢之禮受蕃落之寄時有代謝兄亡弟襲保界山川輯率黎庶國有制度俗尚清淨可不勉歟今命爾為箇失密國王恭膺冊命往欽哉於戲王者宅中守在海外必立藩長以寧遐荒咨爾故渤海郡王嫡子大欽茂代承緒業早聞才幹昔在爾考忠於國家爰逮爾躬當茲負荷豈惟立嫡亦乃擇賢休問可嘉寵章宜及是用命爾為渤海郡王爾往欽哉永為藩屏長保忠信效節本朝作範殊俗可不美歟維開元二十八年歲次庚辰三月丁亥朔二十二日戊申皇帝若曰於戲茂秩攸升䟽封有命寵榮斯及必在英賢咨爾石國王莫賀咄吐屯代襲誠節器標果斷盡忠向化作扞蕃陲頃以蘇祿殘妖尚為邊患乃能納其鄰國授以良圖彼疆場相為表裏致令克清邊徼遠輯殊方實賴心膂載宣勳力靜言襃異非爾而誰是用冊爾為順義王爾宜敬慎王猷撫寧部衆永保藩輔可不慎歟維開元二十八年歲次庚辰三月丁亥朔二十六日壬子皇帝若曰於戲乃瞻陰方代有君長至於膺我盛禮榮彼殊鄰必擇其人諒無虛授咨爾突厥苾伽骨咄祿可汗氣稟崆峒材雄朔漠見事無惑執心不渝迄先代以來結好中國自纉承舊業克繼前修遠遣使臣來朝闕下義之所感情實嘉焉不有襃稱孰彰忠順是用冊爾為可汗今遣從弟右金吾衞將軍質持節禮冊往欽哉可汗其丕承徽章益勵名節永保多福以貽後昆可不慎歟於戲王澤無偏義宏於遠邇朝榮所厚諒敦於款誠咨爾麻來兮代襲君長家傳忠信地雖限於絕域心每歸於本朝爰逮爾躬足繼前緒素有馭下之略益堅奉上之心是用冊爾為勃律國王爾其敬膺典冊無忘節義永保土宇以貽子孫可不慎歟維天寶元年歲次壬午六月甲戌朔二十二日乙未皇帝詔曰於戲王者無外不隔遐方必揆忠款是加寵命咨爾骨咄祿毗伽都摩度闕頡斤代襲榮望名擅驍騎信義有聞部衆稱美往在蕃任受制兇威元惡巳除能革心而向化牙纛既立克輔主以懷歸嘉爾誠心載崇賞秩是用命爾為三姓葉護往欽哉爾其祗奉典冊懋明忠順善翊君長勉樹勳庸可不慎歟維天寶三年歲次甲申閏二月乙未朔二十二日景辰皇帝詔曰於戲王化所及禮在於懷柔藩部有歸義存於冊命咨爾陁拔薩憚國王阿魯施多志懷恭順深達智謀賓以使臣修其職貢信義昭著深可襃稱是用命爾為恭化王爾其祗奉典冊懋遵風教忠勤自勵始終無違用率於遐邦以宣我朝命可不慎歟維天寶三載歲次甲申六月癸巳朔十二日甲辰皇帝詔曰於戲覆燾之德豈隔於華夷綏懷之道實貴於忠順咨爾突騎施伊里底密施骨咄祿毗伽承其宗緒達於智謀能和衆心以致寧靜載執蕃禮遠效懇誠節義昭明深可嘉尚是用命爾為十姓可汗往欽哉爾其懋膺典冊祗奉朝化蹈此忠信保於始終用主於遠方以光其寵命可不慎歟維天寶四載歲次乙酉九月乙卯朔二十二日景子皇帝詔曰於戲遠方恭順襃錫宜優累代忠勤寵章斯及咨爾罽賓國王男勃匐準宿承信義早竭款誠寧彼下人二蕃安靜繼其舊業萬里來朝秉節不踰懇懷彌著愿情之至深可嘉焉是用冊命襲罽賓國王及烏萇國王仍授右驍衞將軍往欽哉爾其肅恭典冊保尚忠義承膺於寵命以率於遐蕃可不慎歟爵以酬庸德以懷遠乃建蕃國抑惟舊章十姓突騎施移撥可汗骨咄祿毗伽俱支効款輸誠志稱勇烈克保忠貞之節且兼射御之能信義無愆邊隅是賴加以不從惡黨遠慕華風言念爾勞載懷嘉尚眷茲部伍必仗材雄宜式拜於寵命俾有膺於殊禮可冊為十姓突騎施移撥可汗於戲賞勞之制必崇名器懷柔之典無替疇庸咨爾朅帥國王勃特沒兄素迦代竭忠誠僻居遐裔夙懷智識早聞勇義頃以勃特沒於鄉不孝於國不忠而卿報屈既深久被淪棄今惡黨巳殄兇徒就擒卿遂能輸忠赤於朝廷表仁惠於蕃部永言効節宜膺旌賞是用冊爾為朅帥國王爾其丕荷國恩克修蕃禮子孫萬代長保寵榮豈不美歟可不慎歟維天寶十一載歲次壬辰正月己卯朔二十四日壬寅皇帝詔曰於戲疇賞懋功無隔於中外懷荒卹遠諒歸於典謨咨爾骨咄國王羅金節夙遵聲教志尚忠節作扞邊疆勤效斯著頃者以羣醜撥動方欲脅從而忠懇不渝始終彌固言念於此嘉尚良深是用授爾驃騎大將軍仍冊為葉護爾其祗膺典禮慎守封疆貽慶子孫受茲寵錫可不美歟維天寶十二載歲次癸巳九月己亥朔六日甲辰皇帝若曰咨爾骨咄祿毗伽突騎施黑姓可汗特進登里伊羅密施立國惟信表賢在忠既效信以推誠亦旌忠而懋賞卿才略備舉知勇兼資強足抗敵威能率下故得甲兵孚訓族類懷仁既嚮順以移風亦事大而知禮是用載加榮秩式崇錫命今授卿特進為突騎施可汗卿敬勉良圖光昭盛典保我疆埸惡我寇讎俾業固山河福綏種落永私恩寵可不慎歟維天寶十二載歲次癸巳九月己亥朔六日甲辰皇帝若曰咨爾骨咄祿伊難如三姓毗方伽頡利發夫崇德報功帝王之事講信修睦人臣之禮卿久佐藩部備吏戎落知荐居不可以早賓朝北蕃之俗不能自理遠仗皇威深悟變通克知成敗豈惟款塞之懇常有捍邊之心言念披誠有增嘉歎今授卿左羽林軍大將軍員外置同正員兼賜冊書鐵券永執蕃禮無替華風克終令名常保祿位可不慎歟於戲善於國者賞必加焉自古哲王率由斯道咨爾三姓葉護左羽林軍大將軍員外置同正員骨咄祿毗伽都摩度闕頡斤素稱驍悍兼蘊智謀當蘇祿之時雖力有所闕而懇誠之至乃朕則知元惡既除效勤彌亮果能率衆相歸降斯盡節於朝廷且立功於疆埸信義若此嘉尚良深是用授卿寵章榮彼蕃部今賜卿丹書鐵券傳之子孫永固河山有如日月可不慎歟咨爾護密王子頡吉里匐夫藩扞所寄惟信是從節義可稱雖遠弗隔卿之先代嘗附國朝通使有常書譯相次自卿父繼立近阻強鄰被制凶威有乖夙志今遂能獻誠款潛託歸懷自非心悟遠圖何以克存先意念此誠懇嘉尚尤深今賜卿丹書鐵券以旌忠孝長表信義永傳子孫日月同明山河齊久可不美歟可不慎歟維天寶十二載歲次癸巳九月己亥朔六日甲辰皇帝若曰咨爾骨咄祿毗伽突騎施黑姓可汗登里伊羅密施惟皇建極聲教及於遐荒惟帝念功禮命加於恭順卿雖擁在沙漠常扞烟塵識進退存亡之端知古今成敗之數久率藩部歸化朝廷兼拒兇闕挫其侵軼精貫白日義光青史績用累著嘉尚良深今授卿特進冊為突騎施可汗重爵貴號以崇其寵丹書鐵券以表其忠宜保始終永固誠節山河帶礪福祿長存可不慎歟維天寶十二載歲次癸巳十月戊辰朔十四日辛巳皇帝若曰咨爾故石國順義王男郍俱車鼻施夫柔遠之道必先文德錄誠之美是加命禮卿之先代累賓朝化列在藩王卿又能效節輸忠克復居宇扞邊率下循職修貢信彰夷落義貫幽明言念懇誠良多嘉尚今授卿特進仍封懷化王并賜丹書鐵券以表忠赤宜執於恭順保於終始每資犄角之用永固山河之寵可不美歟祀之大者莫尊於嚴享德之至者莫加於孝敬故周廟頌思文之章漢陵躬展事之禮因心斯在敢不肅祗我國家應天受期駿惠丕命繼武宗文之德重熙累洽之盛故以道高系表首冠帝先朕以眇身獲保鴻業往屬多難時逢國屯推戴神宗纂復興運允迪前烈載康兆人此蓋仗卿士之謀叶人祇之賛豈伊薄德敢承天庥露往霜來久積園陵之思秋嘗夏禘聿思孝饗之誠乃夏朔辰祥芝產於太室及秋吉日珍木瑞於神宮對越上靈拜茲嘉貺頃以秋稼未實民役尚勞每事害農豈惟在予有咎之責因親設教恐違先旨恤隱之方今三時巳和百禮斯洽崇牙宿設萬舞在庭敬爾臣工駿奔執豆蠲潔為糦明德惟馨有來雍雍載懷怵惕之思至止肅肅如聞歎息之聲降格有終纏感罔極瞻弓劒而莫及捧鏡奩而哽咽始自橋嶽終奉梁山紫氣升於壽宮甘露遍於陵樹白兔馴擾瑞草呈祥恭惟昭陵載感王業肆台小子夙奉睿圖及齋戒虔誠率祗祀典聖容昭見靈迹尤彰每四方多虞中國有事雖升龍巳遠而躍馬如神及配奠壽宮親聞抃躍幽明合慶今古未聞蓋皇天眷於我唐神心昌於後嗣延祚之祉豈獨在予一人錫類之恩宜廣覃於四海可大赦天下自開元十七年十一月二十二日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之自先天巳來有雜犯經移近處流人并配隷磧西瓜州者朕捨其舊惡咸與惟新並宜放還其反逆緣坐長流及城奴量移近處編附為百姓左降官量移近處官人有亡官失爵齒力未衰者量加收錄天下百姓無出今年地稅之半如巳徵納聽折來年逋租懸調在百姓腹內者一切放免孝子順孫義夫節婦旌表門閭終身勿事諸州侍老百歲巳上賜帛十段九十巳上賜五段八十巳上賜三段獻陵昭陵定陵官吏并管陵縣官各別加一階陵戶並放從良終身灑掃陵寢仍每陵側近取百姓六鄉以供陵寢永勿徭役自古帝王賢臣將相陵墓宜令所在州縣致祭內外文武官三品巳上加爵一等四品巳下各賜一階亞獻皇太子鴻賜物二千匹終獻慶王潭賜物一千匹邠王守禮寧王憲薛王業各賜物八百匹忠王浚棣王洽鄂王涓榮王滉光王涺等各賜物七百匹中書門下賜物五百匹開府王毛仲賜物三百匹皇親五等巳上諸親三等巳上及文武百寮各賜物有差自古明王因心以待人曲己以施物故休戚共而憂樂同也中書門下丞相尚書開府三省大將軍父並賜三品官九卿三監十二衞監門羽林軍五省長官三府尹大都督長史父各贈四品官五品巳上清官父各贈五品官凡所贈官宜兼贈母邑號俾夫羣臣受榮上延父母先帝遺澤下及幽冥興言及此良多感歎君臣一體榮辱是同龍蛇之歌古今作戒其唐元年兩營立功官三品巳上與一子官其四品巳下選日優與進改京兆府供頓縣免今年地稅諸道戰亡人家仰州縣存恤不支濟者量事賑濟諸軍健兒別勅行人各賜勳兩轉古先哲王之致理也皆上順天心下稽人事時令賛發生之德靈符協紀年之稱考彼前載斯為大猷恭惟烈祖元元皇帝天寶錫慶象帝之先垂裕後人重光五聖自朕嗣守丕業洎三十年實賴宗社降靈昊穹孚祐萬方無事六府惟修寰宇晏如庶臻於理然則乾元在上仁覆為德皇王臨下惠化攸先思宏善貸用廣慈育遵道寶而建元暢元風於不宰況屬陽和布氣獻歲發生宜覃在宥之恩式降惟新之澤可大赦天下改開元三十年為天寶元年正月一日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不原者咸赦除之諸色左降官並流人未經量移者亦與量移陽春布和鳥獸孳育宜禁麛卵以遂生成自今巳後每年春天下宜禁弋獵如聞百姓之內或有人戶高丁多苟為規避父母見在乃別籍異居宜令州縣勘會其一家之中有十丁巳上者放兩丁征行賦役五丁巳上者放一丁即令同籍共居以敦風化天下侍老八十巳上者宜委州縣官每加存問仍量賜粟帛侍丁者令其養老孝假者矜其在喪比者王政優容俾申情理而官吏不依令式多雜役使自今巳後不得更然國之急務莫若求才頃者數遣搜揚士庶尚慮遺逸更宜精訪以副虛懷其前資及白身人中有儒學博通及文詞秀逸或有軍謀越衆或有武藝絕倫者委所在長官具以名薦若乃宏我風化實惟方岳必佇其人以膺共理其京文武官五品巳上清資並郎官據資歷人才堪為刺史者各任封狀自舉但文宣垂訓事必正名而黃鉞古來以金為飾金者應五行之數有肅殺之威去金稱黃理或未當其黃鉞宜改為金鉞副威武之義焉內外文武官九品巳上各賜勳兩轉前王重典在乎祭祀況屬惟新事宜昭告五嶽四瀆名山大川諸靈迹及自古帝王忠臣義士並令所繇州縣致祭惟天法道惟后奉天既合德以降符必執象以明本則上元眷命有以丕承大寶鴻名斯為公義朕纉宗社之重揚文武之烈克勤匪懈服道齊心允迪元猷聿求至理日慎一日三紀於茲矣區夏大寧靈祇集貺而公卿宗子耆艾法流僉曰玉芝白魚神言瑞景天之應也敦信興禮務本崇儒人之應也化洽而風俗還淳氣和而疵癘不作天啟道運其何讓焉上答元符願增徽號披誠詣闕累上封章摯請愈勤懇詞難奪以今日敬膺典冊曰開元天寶聖文神武應道皇帝式副人神感懼交集宜廣恩於善貸俾協慶於惟新可大赦天下自天寶七載五月三十日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒當赦除之其左降官及流移配隷安置罰鎮效力之數並稍與量移亡官失爵放歸不齒及諸色被停與替非衰老疾病者宜令所司量加收敘人和年登休運斯屬輕徭省賦惠政攸先將洽小康必宏厚貸其天下百姓來載租庸並宜放免及諸色勾徵等亦一切放免自古帝王建邦受命必敬先代以循舊章周備禮文既存三恪之位漢從損益唯立二王之後自茲巳降且復因循將廣繼絕之恩宏復古之道宜於後魏子孫中擇譜屬灼然相承者一人委所司勘責準酅公例定為三恪陵廟所奉典職惟崇事雖更於有司任豈循於常秩其宗正卿宜與大常卿同品其少卿及丞亦宜準此又上古之君存諸號氏雖事先書契而道著皇王緬懷厥初寧忘咸秩其三皇巳前帝王宜於京城共置一廟仍與三皇五帝廟相近以時致祭自古受命之主創業之君皆經濟艱難戡定禍亂雖道謝於往古乃功施於生人用率典章亦從禋祀其歷代帝王肇迹之處未有祠宇者宜令所繇郡縣量置一廟以時享祭仍取當時將相德業可稱者二人配祭仍並圖畫立像如先有祠宇霑享祭者亦宜準此式閭表墓追賢紀善事有勸於當時義無隔於異代其忠臣義士孝婦烈女史籍所載德行彌高者所在亦置一祠宇量事致祭古者鄉有塾黨有庠所以明尊卑之義正長幼之序風化之道義在於茲先置鄉學務令敦勸如聞郡縣之閒不時訓誘閭巷之內多虧禮節致使言詞鄙褻少長相淩有黷清猷何成雅俗自今巳後宜令郡縣長官申明條式切加訓導如有禮義興行及紀綱不立者委採訪使明為襃貶具狀聞奏道教之設淳化之源必在宏闡以敦風俗頃列四經之科將冠九流之首雖及門求進頗有其人而覩奧窮微罕聞達者豈專精難就為勸獎未宏天下諸色人等有通道德經及南華等四經任於所在自舉各委長官考試申送其崇元館生自今巳後每至選日宜減於常例次為留放朕每以道元有屬思竭精誠經教所在豈忘崇奉且宗其道者師其人行其教者尊其禮晉琅琊王公府舍人楊真人護軍長史許真人丹陽上計掾許真人皆道著妙門感通元闕降高真之迹為上清之宗後漢張天師教達元和德宗太上正一之道幽賛生靈梁中散大夫貞白陶先生高尚塵表博達元微綜輯真經傳授後學並令有司審定子孫將有封植以隆真嗣天師冊為太師貞白冊贈太保其洞宮山各置壇祠宇每處度道士五人並取近山三十戶蠲免租稅差科永供灑掃諸郡有自古得道昇仙之處雖先令醮祭循慮未周宜每處度道士二人其靈迹殊尤功應遠大者度三人永修香火其茅山紫陽觀取側近二百戶太平崇元二觀各一百戶並蠲免租稅差科長充修葺灑掃應天下靈山仙迹並宜禁斷樵採弋獵如聞山林學道之士每被搜括且法之防邪本有所以至於宿宵妖訛亡命聚衆誘陷愚人故令禁斷郡縣遂一㮣迫逐使志道之士不得安居自今巳後審係清潔更不得恐動以廢修行其五嶽四瀆名山大川各令本郡長官致祭朕刻意真經虔誠至道冀憑元祐永錫黔黎每朝禮三清則宵衣忘寢或齋戒一室則蔬食精專不以勤躬為倦務以徇物為心況於宰殺尤加惻隱自今巳後每月十齋日不得輒有宰殺又閭閻之閒例有私社皆殺生命以資宴集仁者之心有所不忍永宜禁斷且因親設教式本於人倫自葉流根必逮於榮養內外文武職掌官有五品巳上其父祖見在無官者宜各授一官仍令致仕其祖母見在準母例處分京官五品巳下正員如父母巳沒未有官者宜追贈所司勘會即與處分睦親之義因心不忘前開府儀同三司寶㻀頃以容納微人頗虧憲典永懷舅氏追感渭陽宜申國恩再復榮秩可開府儀同三司仍放優閑不須朝會王澤無私豈殊於中外天瑞有慶頻屬於京輦寬大之典則以博覃施惠之恩特申曲被其京城父老宜各賜物十段七十巳上仍版授本縣令其妻版授縣君六十巳上版授本縣丞天下侍老百歲巳上版授下郡太守婦人版授郡君九十巳上版授上郡司馬婦人版授縣君八十巳上版授縣令婦人版授鄉君仍並即量賜酒麥丏內外見任文武官九品巳上宜各賜勳兩轉其京文武官見在京及致仕並陪位官諸方通表使及月番官等一品賜物一百匹二品三品八十匹四品五品五十匹六品七品三十匹八品九品二十匹兩京留守各八十匹其節度採訪使並諸充官使未回者並同在京例賜物貴妃楊氏稟性柔和因心忠孝克慎閨壺蹈禮循詩加以勤志元宗協誠嚴奉率勵宮掖以迪關雎宜賜物三千匹嬪御等賜物有差其太真觀雖先度人住持尚少宜更度道士七人太子璵宜更賜物二千匹慶王琮巳下各賜物有差率土之內賜酺三日
