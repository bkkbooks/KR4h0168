front:
  text: 全唐文欽定全唐文卷九百十三子儀號水月大師天授中樂清白鶴寺沙門
  hash: sha256:c4085a63c163fbb1585320ca38a3115c66d700fcdbd229b82d674e7692677f21
  markers:
  - {type: head, offset: 13, content: 子儀, id: KR4h0168_NFKB_913-h1, level: 1}
body:
  text: 太虛不可量太極不可算而能載有為也含無為之道也無為之道者在乎未形之前而難知有為功也被乎化形之後而易解悟斯理者行斯化也惟我乾竺之大仙乎懿降神知足誕瑞迦維去愛金門棲真雪嶺繼七聖而成道圓十號以稱尊分百億身宅三千界一音雷震一雨霞飛白毫柔狂象之心清風扇火龍之室鹿野先調於五子鷲峯方廢於三車使輪王傾髻裏之珠窮子獲衣中之寶小根小智防微而豫固隄塘大願大心利物而肯貪身命情覃九有恩暜四生闢煩惱之重關涸無明之巨塹優曇浮木豈無緣而偶哉繇是能事畢矣大緣終矣金河月落玉樹雲愁暨騰蘭結轍於胡沙像設來儀於漢室自此中華倣制列剎相望今樂清懸月鶴寺者乃東晉張文君字子雁捨宅為之也以仁山智水足為幽居傲祿藏名卜茲深隱始其拔俗終乎遇仙亭亭鶴影西瞻而似舞如飛迢迢鹿蹤東去而轉高漸遠勝遊一遇塵跡幾何山號丹霞寺名白鶴松蘿四合泉石幽奇樓殿一川煙霞沃蕩縣城東望極於大江岩瀑西來落乎深澗叢荊亂人目香風襲人衣猿嘯急而山寒水去忙而川濬皇唐之代此寺中興有惟謙繼南二上德者外擅百家內窮三學拂衣西上三十餘年居京西明寺被命內殿講新譯仁王等經及武宗會昌之祀彼二上德振錫南歸宣宗大中之載化緣造大佛殿并三龕功德彌陀殿深涉堂相繼成功廊廡旋臻豐廚亦備緣歸十信門引四方有僧伽殿羅漢堂星紀頻移香燈永續檻前翠巘曾迷子晉之蹤門外康衢空鎖綠楊之色霽後而錦鱗躍浪宜慧子之閒情月明而丹頂翹松伴高僧之出定竹扶疎而有實花照灼而無春迴廊而曉見孤燈別院而夜聞幽磬余髫年受業壯嵗遊方錫挂晴空囊無長物瓶汲寒溪之浪衣穿古渡之風自得印南宗蓋是從來之本事承恩北闕乃為望外之殊私陞堂而四寸餘秋繼祀而五三嫡子於戲當年獨去則事往人旆今日重來而松枯檜老粵有檀信旌於所居水月堂閒宜闕一字宴息觀音殿敞麤稱經行或三峯未掩乃為祖榻之祥儻六葉重芳實為宗門之幸也時邑大夫瑯琊王公崇義名家之後裔也承九重之命施百里之恩每及禪關訪我心要因歎此寺獨無碑銘沈吟久之命予敘述予宗門之首非辭人也遂諾公之請乃一夕剪燭染毫直書於記波崙聖歷時沙門若夫此經迺該二諦而無遺括因果而斯盡可謂引萬行之道首進逪提之神足超生死之靈翼昇涅槃之聖翮信知法門幽密教旨沖元非世智之能議匪聰辯之所測有大菩薩號觀自在大悲周於十方愍法界之㣥迷故說此經示其正路斯乃久成正覺是能仁之本師故能十方法界莫不現身暜應㣥機隨緣化益若其聞名滅罪如日銷於薄霜禮念蒙恩似月敷於蓮蘂巍巍蕩蕩聖德高元事超言說之端理絕思量之表余雖愚闇劣而慕法門巡歷兩京尋參善友每念總持如饑若渴於大周聖歷三年嵗次庚子三月庚戌朔七日景辰幸得此經如死再生是西京寶德寺僧慧月與常州正勤寺大德慧林吒於智藏等數人共請北天竺嵐波國婆羅門大首領李無謟以同翻梵本不空羂索經一十六品合為一卷將就北天竺迦濕彌羅國婆羅門大德僧迦彌多囉以同勘梵本久視元年八月景午朔十五日庚戌勘會麤畢則擬將進此十六品斯土未行曾聞隋朝所翻別本六十三紙未嘗見也所願皇基永固德覆十方金枝瓊萼鬱茂常榮三大願力劫劫無窮四宏誓心生生無盡苦海傾竭三寶永存恐時代遷遠聞者生疑故述拙言序之云爾惟夫聖力難逢靈文罕究六神通之妙業八自在之元功持芥實而納崇山析毫端而容大海豈止分身百億現影三千而已乎千眼菩薩者即觀世音之變現伏魔怨之神迹也自唐武德之嵗中天竺婆羅門僧瞿多提婆於細㲲上圖畫形質及結壇手印經本至京進上太武見而不珍其僧悒而旋轡至貞觀年中復有北天竺僧齎千眼千臂陀羅尼梵本奉進上帝文武聖帝勅令大總持寺法師智通共梵本僧翻出呪經并結壇手印等智通法師三復既了即折心懇切佇畱徵應於是感慶喜尊者之俯降形儀通悲喜驚嗟投身頂謁蒙在慰喻問欲何求通曰檮昧庸心輒此詳譯不審情詣稍符聖旨以否默而印許竊表深衷便錄本進上帝委問由緒通具以事述咸愜帝心於是齎藳本出內將顯宏福大德元謩法師一見此文嗟稱不已有人云勅未流行因何忽茲漏洩其本遂寢不復宏揚又有西來梵僧持一經篋以示智通通翻出緒餘不殊舊本唯闕身呪一科有常州正勤寺主慧琳法師功德為務定慧是崇深入總持周窮藝術歷遊京邑棲遲實際伽藍思廣異聞希誠脫簡爰有北天竺婆羅門僧名蘇伽陀常持此法結壇手印朝夕虔祈琳罄折咨詢每致艱阻後同之洛下漸示津途即請一清信士李大一其人博學梵書元儒亦究紆令筆削潤色成章備盡梵音身呪具足至神功年中有仁者自京都至將通師所翻後本有上下兩卷唯闕身呪琳參入其中事若一家宛而備足又佛授記寺有婆羅門僧達摩戰陀烏伏那國人也善明悉陀羅尼呪句嘗每奉制翻譯於妙㲲上畫千臂菩薩像竝本經呪進上神皇或令宮女繡成或使匠人畫出流布天下不墜靈姿波崙又於婆羅門真諦律師聞此像由來云有大力鬼神毗那翼迦能障一切善法不使成就一切惡業必令增長雖有妙力通心無制伏者觀音菩薩現作千眼千臂之形以伏彼神及有呪印用光不朽將來好事者佇無惑焉忽雷澄神龍時人北宗神秀弟子師住匾擔山號曉了六祖之嫡嗣也師得無心之心了無相之相無相者森羅眩目無心者分別熾然絕一言一響響莫可傳傳之行矣言莫可窮窮之非矣師得無無之無不無於無也吾今以有有之有不有於有也不有之有去來非增不無之無涅槃非滅鳴呼師住世兮曹谿明師寂滅兮法舟傾師譚無說兮寰宇盈師示迷途兮之義乘匾擔山色垂茲色空谷猶畱曉了名承遠景龍中靈安寺沙門若夫瑤水之濱歌白雲而長住玉臺之上乘綵霞而不還敬姜布門為門之規班姬光中禁之闕五字參差異轍猶且播芳徽於闕四字實於紫書豈如開八正門去塵離俗入三乘藏鈎深致遠喻栰於愛河之水傳燈於昏衢之地見之於法師矣法師諱法琬俗姓李下闕數字道人也應天神龍皇帝之三從姑焉原夫馬喙高邱彰白雲之茂祉龍光函谷表紫氣之仙望清風映乎中古大命集乎闕二字高祖景皇帝道出鱗皇功高羽帝牢籠天地運日月而揆陰陽彈壓山川驅黎甿而躋仁壽曾祖故鄭王亮諡曰孝咸池別派闕三字枝乾垂帝子之星坤列天孫之嶽刻舟標智岐嶷已稱毀鞍擅奇仁心早茂由是榮開朱邸寵盛綠車豐冠葢之遊列山河之郡祖神闕三字空荊揚并三州大都督上柱國襄邑王諡曰恭潢漢天人紫微帝系大禹以能平水土式叶帝俞茂先以該博知名允諧時望惟揚奧壤闕二字雄藩地枕荊門郊通汝漢張皁葢而按舉褰彤襜而督察去思來晚德化長流五袴兩岐甿謠式著九江士女既聞酌闕一字之詠三晉人吏還歌戢兵之曲父德懋故金紫光祿大夫少府監宗正卿兵部尚書上柱國臨川公諡曰孝爵列公侯地隆勳戚天分斗極闕二字喉舌之榮地括河海仍受股肱之寄法師生積善之門誕象賢之室風神外朗慧敏內融幼懷削髮之因固拒結褵之義臨川公寢苫在疚風樹銜哀莫申罔極之心徒結充窮之痛去永徽六年襄邑王薨其年奉為亡父捨所愛之女請度出家皇上以孝道所憑諒資於冥福誠心克著闕一字展於香緣奉勅出家時年十有三也并度家人三七竝以充師弟子法師即隨吳國公尉綱之外孫其寺吳公之本置也闕二字黃金布地尚疑須達之園白鶴成林即是菩提之樹日宮月殿無晦無明蓮座花臺長春長夏法師別置一院以修道焉苦行精心與冰霜而彌勵戒範禪結將竹柏而逾貞地迺護珠人惟杖錫故得禪枝日茂覺蘂年芳忍鎧橫霜銛鋒穎而無極戒珠含月射光芒而自遠至若貫花散花之典滿偈半偈之經莫不吞若胷臆如指諸掌至迺論堂霞闢曳祴成陰法座雲懸飛錫連影人同竹葦眾若稻麻法師明鏡伺鑒洪鐘佇扣流言泉於玉吻驚思風於牙扇剖疑析滯虛往實歸固以聲華鍱腹德高巢額檀林擢秀鹿苑騰芳蓋元門之棟梁緇徒之領袖矣方冀濡足授手長宏六度之津覃思研精永啟四禪之鍵豈謂隙駒易往藤鼠難畱若東魯之山頹類西州之石折教在運往感息化窮智炬由是淪輝堅林以之變色以垂拱四年嵗次戊子九月己酉朔日遷神於闕二字寺春秋冊有九惟法師襟神雅正操履堅明道在則尊德高為貴法堂宴坐心可降魔梵宇經行影能馴鴿高行鄰於初地雅譽重於彌天誠惟周拯志尚高蹈至於六時清梵想魚嶺而騰音五夜馴行候鯨鐘而肅慮楷模梵眾雪凜冰清導揚聾俗雲歸海赴清徒仰教未極元風迅景不畱奄隨泡露尼山悟迦毗即法師之姪女也義均猶子思承上足貞心雪皎慧性霜凝陶善誘而日深沐慈風而嵗遠悲法眼之淪照痛禪宇之摧梁粵以景龍三年嵗次已酉正月己未朔十五日癸酉奉勅起塔於雍州長安縣之神禾原禮也崇構岧嶢前臨黃嶠之曲層基固護却枕青城之隅草凌晨而薤露晞樹肅夜而松風起以為天長地久日月所以循環露往霜來陵谷以之遷貿昔武成之室勒徽範於貞碑密陵之昭媛德於豐石矧夫道高龍象德隆鵷鷺契無三之妙軫入不二之元樞豈可相質無聞受辛莫紀敢勒清風之頌庶流終古之德其銘曰鶴林西變象教東延邈矣年祀英靈罕傳挺生明慧惟我師焉白雲凝祉紫氣浮天皇宗赫奕帝緒蟬聯誕乎令裔克嗣先賢聚沙之日救蟻之年仁心夙表慧性俄堅方釋塵累遂託良緣心清鏡澈戒潔珠圓精誠苦行雪凜冰鮮三乘洞啟九部咸甄時臨講肆亟陟香筵鵷鷥雜遝龍象駢闐一揚辨囿幾沐言泉法門棟宇覺海舟船四虵詎息二鼠俄遷輔仁莫騐與善徒然式建高塔爰臨古阡南瞻豹巘北瞰龍川桑榆落日松檟生煙山風四起隴月孤懸一銘芬烈三變桑田履空景龍時沙門浮屠寶飾靈所依兮龍山扶護儼瞻歸兮檐楹嶢嶷欲驚飛兮金輪珠火烜赫輝兮大唐景龍三年嵗次已酉題記實义難陀于闐國人武后證聖元年至長安住大遍空寺四年歸于闐景龍二年重入中國景雲元年卒於大薦福寺年五十九此經諸佛心量之元樞㣥經理窟之妙鍵廣喻幽昆洞明深義跋陀之譯未宏流文之義多舛今討三本之要詮成七卷之了教傳燈之句不窮湧泉之義無盡元覺俗姓戴氏永嘉人先天元年卒賜諡無相大師著有永嘉集十卷自別已來經今數載遙心眷想時復成勞忽奉來書適然無慮不委信後道體如何法味資神故應清樂也元覺麤得延時欽詠德音非言可述承懷節操獨處幽棲泯跡闕一字人潛形山谷親朋絕往鳥獸時遊竟夜綿綿終朝寂寂視聽都息心累閴然獨宿孤峯端居樹下息繁餐道誠合如之然而正道寂寥雖有修而難會邪徒喧擾乃無習而易親若非解契元宗行符真趣者則未可幽居抱拙自謂一生歟應當博問先知服膺誠懇執掌屈膝整意端容曉夜忘疲始終虔仰折挫身口蠲矜怠慢不顧形骸專精至道者可謂澄神方寸歟夫欲採妙探元實非容易決擇之次如履輕冰必須側耳目而奉元音肅情塵而賞幽致忘言宴旨濯累餐微夕惕朝詢不濫絲髮如是則乃可潛形山谷寂慮絕㣥哉其或心徑未通矚物成壅而欲避喧求靜者盡世未有其方况乎鬱鬱長林峩峩聳峭鳥獸嗚咽松竹森梢水石崢嶸忘山則道性怡神忘道則山形眩目是以見道忘山者人間亦寂也見山忘道者山中乃喧也必能了陰無我無我誰住人間若知陰入如空空聚何殊山谷如其三毒未袪六塵尚擾身心自相矛盾何關人山之喧寂耶且夫道性沖虛萬物本非其累真慈平等聲色何非道乎特因見倒惑生遂成輪轉耳若能了境非有觸目無非道場知了本無所以不緣而照圓融法界解惑何殊以含靈而辨悲即想念而明智智生則法應圓照離境何以觀悲悲智理合通收乖生何以能度度盡生而悲大照窮境以智圓智圓則喧寂同觀悲大則怨親暜救如是則何假長居山谷隨處任緣哉况乎法法虛融心心寂滅本自非有誰強言無何喧擾之可喧何寂靜之可寂若知物我冥一彼此無非道場復何徇喧雜於人間散寂寞於山谷是以釋動求靜者憎枷愛杻也離怨求親者厭檻欣籠也若能慕寂於喧市廛無非宴坐徵違納順怨債由來善友矣如是則劫奪毀辱何曾非我本師呌喚喧煩無非寂滅故知妙道無形萬象不乖其致真如寂滅眾響靡異其源迷之則見倒惑生悟之則違順無地閴寂非有緣會而能生峩嶷非無緣散而能滅滅既非滅以何滅滅生既非生以何生生生滅既虛實相常住矣是以定水滔滔何念塵而不洗智燈了了何惑霧而不祛乖之則六趣循環會之則三途迥出如是則何不乘慧舟而遊法海而欲駕折軸於山谷者哉故知物類紜紜其性自一靈源寂寂不照而知實相天真靈智非造人迷謂之失人悟謂之得得失在於人何關動靜者乎譬夫未解乘舟而欲怨其水曲者哉若能妙識元宗虛心冥契動靜常矩語默恒規寂爾有歸恬然無間如是則乃可逍遙山谷放曠郊鄽遊逸形儀寂汨心腑恬淡息於內蕭散揚於外其身兮若拘其心兮若泰現形容於寰宇潛幽靈於法界如是則應機有感適然無準矣因信畧此餘更何申若非志朋安敢輕觸晏寂之暇時暫思量予必誑言無當看竟迴充紙燼耳不宣同友元覺和南稽首圓滿徧知覺寂靜平等本真源相好嚴特非有無慧明暜照微塵剎稽首湛然真妙覺甚深十二修多羅非文非字非言詮一音隨類皆明了稽首清淨諸賢聖士十方和合應真僧執持警戒無有違振錫攜瓶利含識卵生胎生及溼化有色無色想非想非有非無想雜類六道輪迴不暫停我今稽首歸三寶暜為眾生發道心㣥生沈淪苦海中願因諸佛法僧力慈悲方便拔諸苦不捨宏願濟含靈化力自在度無窮恒沙眾生成正覺說此偈已我復稽首歸依十方三世一切諸佛法僧前承三寶力志心發願修無上菩提契從今生至成正覺中間決定勤求不退未得道前身無橫病壽不中夭正命盡時不見惡相無諸佛恐怖不生顛倒身無苦痛心不散亂正慧明了不經中陰不入地獄眾生餓鬼水陸空行大魔外道幽冥鬼神一切雜形皆悉不受長得人身聰明正直不生惡國不值惡王不生邊地不受貧苦奴婢女形黃門二根黃髮黑齒頑愚暗鈍醜陋殘缺盲聾瘖瘂凡是可惡畢竟不生出處中國正信家生常得男身六根完具端正香潔無諸垢穢志意和雅身安心靜不貪瞋癡三毒永斷不造眾惡恒思諸善不作王臣不為使命不願榮飾安貧度世少欲知足不長蓄積衣食供身不行偷盜不殺眾生不噉魚肉敬愛含識如我無異性行柔軟不求人過不稱己善不與物諍怨親平等不起分別不生憎愛他物不希自財不吝不樂侵犯恒懷質直心不卒暴常樂謙下口無惡說身無惡行心不諂曲三業清淨在處安穩無諸障難竊盜劫賊王法牢獄枷杖鉤鎖刀鎗箭槊猛獸毒蟲墮峯溺水火燒風飄雷驚霹靂樹折巖頹堂崩棟朽撾打怖畏趁逐圍繞執捉繫縛加誣毀謗橫註鉤牽凡諸難事一切不受惡鬼飛災天行毒厲邪魔魍魎若河若海崇山穹嶽居止樹神凡是靈祗聞我名者見我形者發菩提心悉相覆護不相侵惱晝夜安穩無諸警懼四大康彊六根清淨不染六塵心無亂想不有昏滯不生斷見不著空有遠離諸相信奉能仁不執已見悟解明了生生修習正慧堅固不被魔攝大命終時安然快樂捨身受身無有怨對一切眾生同為善友所生之處值佛聞法童真出家為僧和合身身之服不離袈裟食食之器不乖盂鉢道心堅固不生憍慢敬重三寶常修梵行親近明師隨善知識深信正法勤行六度讀誦大乘行道禮拜妙味香華音聲讚唄燈燭臺觀山海林泉空中平地世間所有微塵已上悉持供養合集功德迴助菩提思惟了義志樂閒靜清素寂默不愛喧擾不樂㣥居常好獨處一切無求專心定慧六通具足化度眾生隨心所願自在無礙萬行成就精妙無窮正直圓明志成佛道願以此善根暜及十方界上窮有頂下極風輪天上人間六道諸身一切含識我所有功德悉與眾生共盡於微塵劫不惟一眾生隨我有善根暜皆熏飾地獄中菩惱南無佛法僧稱佛法僧名願皆蒙解脫餓鬼中苦惱南無佛法僧稱佛法僧名願皆蒙解脫畜生中苦惱南無佛法僧稱佛法僧名願皆蒙解脫天人阿修羅恒沙諸含識八苦相煎迫南無佛法僧因我此善根暜免諸纏縛南無三世佛南無修多羅菩薩聲聞僧微塵諸聖衆不捨本慈悲攝受㣥生類盡空諸含識歸依佛法僧離苦出三塗疾得超三界各發菩提心晝夜行般若生生勤精進常如救頭然先得菩提時誓願相救脫我行道禮拜我誦經念佛我修戒定慧南無佛法僧暜願諸眾生悉皆成佛道我等諸含識堅固求菩提頂禮佛法僧願早成正覺
