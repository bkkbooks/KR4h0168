  text: 全唐文欽定全唐文卷六百二十二庶贈尚書左丞象先姪孫官福建觀察中丞
  hash: sha256:6f25986f7166182c9c323552bbe696c81869373208a20c7d7dfe71c3d0702e2a
  markers:
  - {type: head, offset: 14, content: 陸庶, id: KR4h0168_NFKB_622-h1, level: 1}
body:
  text: 觀夫巨石橫空矯如驚龍南走㣥峯北控遐陸不遠人世宛如蓬瀛得非權輿之初俾宅真仙而幽贊人民脫籠檻於茲地則樵夫之遇二仙其所以示化歟庶牧於是邦逮茲五祀政惟自守人亦安止乘春多暇爰契心期冥搜信宿機類如洗天地之萬類吾生之憂樂將不芥於胸中矣心境相得不知吾之遇靈境歟靈境之遇吾歟炅安陽人徙居汝南官考功員外郎范融係塵甑之苗襲良弓之裔爰瞻乃祖委跡前周道煥九徵禮光三辟運遷正朔載掌邱園翼子謀孫雖慶流於後嗣論官敘蔭須履降於前朝必令許從高議蔭減未盡斷從依請夫復何疑冬芬河內人官宣州刺史元圃邃居青宮祕籞事隔中外理絶登臨景之無良自貽伊咎升高異梁竦之憤抵法挂臯陶之刑且夫子之牆猶其難見儲君之禁焉可輒臨然法難動搖罪宜欽恤典獄雖結於徒坐往訴須從於減科吉甫正平人鶉星兮御夏鵙鳴兮登序日月驟而運長嬴陰陽爭而催小暑詢求縱賞之地枚卜追涼之處尋川徑而棲遲頓林庭而延佇則有應律初蟬舍生自然其聲嘒嘒其翼翩翩參萬物之動植隨四序之回旋避啼鶯於春後伴鳴蛩於秋前廉而有德靜而無纍逸豫攸安沈吟斯慰體素質而標儉養清心而拔萃食不求粒雖黍稷而非珍棲不擇林縱梧桐而何貴暨夫三危露結四野雲平蒼茫日暮爽朗天明託高枝以庇影竄密葉以流聲匝池臺之響亮洞巖壑之清泠㣥吟則少懼孤引則多驚時行時止有虧有盈疑紡絡之雙至似簫韶之九成避雀飛急迎風趐輕飾鬢裁新樣圖冠有舊名雖屈螳蜋之斧終齊斥鳥鷃之情若乃平子歸田仲長就第新開泉石之賞俯洽琴歌之契莫不應促軫而方遠赴調絃而轉麗繁音遞進顧白雪而難酬逸韻爭馳對薰風而莫繼足使牧子興感雍門下涕降翔鶴於雲端出潛魚於水際復有沙塞征夫山川遊子風蕭蕭兮八九月路悠悠兮千萬里坐聽霜雁自無聊復對寒蟬怨何已望鄉關而思積撫搖落而愁起悲深嘶馬之初淚斷啼猿之始觸類多感於何不傷伊茲蟲之菲陋識君子之行藏其立志也不慕於鴻鵠其守分也不越於榆枋任朝夕之棲處極天地之翺翔適其性韜其光豈比飛燕之巢幕流螢之聚囊至如入檻愁猿觸籠窮鳥縶透木之幽志屈淩雲之遐矯豈無故而嬰羅諒有求而自擾聊息心於萬事欣寓跡於一枝淡然兮自守千秋兮若斯甲辰歲夏五月余寓居官舍時雨初止有蝸牛蠢蠢緣堂砌而上恐致踐履之禍因命稚子移於墻陰乃潛角縮殼而有自衛之意退為賦云蕤賓仲月逆旅孤亭薄宧春罷間門晝扄雲漫漫兮雨冥冥荷蕖紅兮苔蘚青卷陰風於北幌間皓月於南櫺觀蝸牛之蕃育何詭錯之殊形若乃順陰而起背陽而化夤緣於草木縈委於臺榭傍庭廡以徐回循墻隅而亂下纖角內奮寧交觸氏之兵堅殼外圍終結野人之舍闕爪牙兮自達無羽翼兮相借本忘情於蚌守亦何憚於鴟嚇故其投迹多間冥心寡欲進不奔競退非飲啄吸大道之淳精體中庸之止足匪徇物而無悔恆居沖而守朴升清流兮不為寵頓潢汙兮不為辱豈蜾識之可量何霓智之能較借如海蛤無脛江龜有靈懷珠胎以自伐韜玉兆以先形蜋之捕也後黃雀而寧懼魚之貪也前翠竿而不驚觀萬夫而恕已會千載而作程乃知無用之為用求生而喪生翊西河人檢校郎中辿子濟濟以寧實惟多士戔戔所賁其在旌賢且抱甕之生代稱高尚垂竿投釣寧殊渭水之公灌園鬻蔬不讓漢陰之叟御史以皇華動俗驄馬生風有隱逸而必求無賢才而不舉今當所薦理合其宜復有澆薄之夫淳和詎識季孫讒於子路未損其容武叔毀於仲尼何傷其德寧使挂瓢之輩道以矯時飲犢之流人稱為妄州司處斷未曰通途季良洛陽人官奉天尉與能贊國於以敷求器人弼政聿先精擇有司審才無遺曲藝雖廝役之未劇亦文學以是徵列彼卒史典新掌故將適時而給務蓋從事以備員百石伊何九流清品禮秩式敘因等夷而不易干求無稽雖誦多而奚取欲加重典之科難取薄言之訴請詳漢道方議呂刑晉洛陽人滑州刺史慶言子六官既分百工有序五里作候十里為亭鐘官所資籍洪爐以鑄金寫傳置之用通遐方以奔走典尚方之衡量總亭郵之掃除位雖列於周官役乃疑於劉氏不充歲計鉛錫有虧私易傳車三千難逭工部以禮闈望重欲飛奏草一作章之刑嗇夫以傍舍朅來將對上林之問庚有詞而難罰亭易傳而置愆會府無妄繩之辜糾人彰嫉惡之德况風嚴北陸日落西山仰鳳闕而神微擁鶉衣而思奪德官殿中丞昌黎公聖人之徒歟其文高出與古之遺文不相上下所履之道則堯舜禹湯文武周公孔孟揚雄所授受服行之實也固已不雜其傳曰佛及聃莊揚之言不得干其思入其文也以是光於今大於後金石燋鑠斯文燦然德行道學文庶幾乎古蓬茨中手持目覽飢食渴飲沛然滿飽顧非適諸聖賢之域而謬志於斯將所以盜其影響僻處無備得以所遇次之為卷私曰文録實以師氏為請益依歸之所云昂馮翊郃陽人官司封郎中泛泛者萍乘流匪寧殊源比影異沼均形初苒弱兮崎岸乍連延兮廣汀映池則草色同翠照日則苔光共青霜凝兮片片成玉月上兮處處疑星入門自媚穠李徒矜其妖豔取足為樂行潦豈小於滄溟觀其枯華有時動靜無必習坎斯止遇亨則逸安卑取順契君子之用心揚波隨流豈漁翁之能詰每託鄰於藻荇不混跡於蓬蓽與菡萏而相鮮向莓苔而如失實幽賞之可嘉何寓遊之足匹夫物之藝藝糾纏誰分茨處牆兮或不才而見棄蘭生幽也終以香而自焚惟茲萍矣獨擅其美謙能居下知則樂水鑒攬芳於楚客寧見羞於彞簋象虛舟而不繫或倏往而忽來類至人之無心更出生而入死噫歟植匪深根長無固蒂將舍之而不芟翦豈見用而能種藝鄙朝菌之暫榮笑匏瓜之長繫空慚雨露之恩竊愧陶鈞之惠願同蒹葭比玉而見珍託陋質於池塘之際有美玉於斯有工人在茲玉待人而成器人舍玉而何之於是施其巧審其思事必堅決心無墜虧再視再度以蒙夫精鑒匪瑕匪穢寧有於吾欺向無質直之性琬炎之姿特達人許清貞自持則大匠不顧天材或遺亦何知入之於火也不變其色投之於泥也不染其緇維彼良工見此多惜直以為珽圓而作璧無枉纖毫皆知所適遇今晨之發彩冀入圭璋察往日之屈蒙期分玉石於是虹氣干白雞冠與赤執之以禮故有藉而見文受之必齊非許城而不易若然者玉隱於石玉無憚於可磨元黃糅色山水騰波但因時而獲賞敢輕議乎其他人未我知甘無言於見棄賢能相達將不索而謂何况乎玉之寡珉之多夫子有比德之歎卞生為追怨之歌曰昔之玉在石石在山山有玉兮隱其間今則石為錯玉為環環亦獻兮君解顏遂與生芻為比與郤桂同攀豈辛勤於道路徒抱泣於荊蠻焯任城人官左補闕至若惑衆創規邦憲貽範能賦雖聞一作云於曩列不呼取誡於前經景登臨此時宮墉近矚方比迹於桓景豈均賞於屈平窺見可徵愆尤自速法司務惟疾惡志在繩非未窮令所之由遽加徒罪之罰待詳疑璧方可揮鉛元弼東海郯人贈太子少保申子元和中官右衛倉曹桉元和姓纂元弼南昌人官中書侍郎代間秦餘地仍周舊俯皇都之近域有文王之古囿遙縈林麓之表遠抱川原之秀沼莫辨於窮流臺靡遺於層構往往歸鳥依依顧獸逢時之慶雖鍾思古之懷亦疚當昔周德資始靈臺是新繚以斯囿洽其至仁使芻牧畢入而獝狘皆馴目以靈知感通於異類大其囿見惠洽於蒸人固以垂耿光本亭育無私公共而有俟勿亟子來而以築不麛不卵仁叶於羽毛以薪以蒸惠昭於郊牧覆露功博誠明感深遂天性於物性即人心於已心白鳥不驚匪觀於狎物非熊已兆奚事於從禽嗟乎遺址全平餘風可挹想千古之蹤未昧嘆三代之英不及猶欲恣窺臨淹佇立微茫似隔乎煙水邐迤半臨於井邑見魚躍想坎窞於泉流聞鹿鳴訪陂池於原隰竟以陰壑蕭條荒榛寂寥無人試問有路通樵悵望風煙之景沈吟黍稷之苗今國家以崇古為心宗周是繼且欲儲休祉降嘉惠園苑資靈囿之規宮室擬靈臺之制是以愛物之誠溥好生之德均仁政潛施於上苑之內靈德已播於率土之濱然簡弋遊於暇日縱芻詞於賤臣稽制度於盛王百里猶小嗣風流於前古千載為鄰肱長城人官湖州刺史鑒天道之惡盈將守之以持滿窮易象之明義排溢美於虛誕鑒其體而如卑明其訓而非緩惟德之柄惟行之管是以賢人君子雖百代而同光聖帝明王歷萬古而相纂然則謙之為義與讓同標苟不由於斯理必災禍而自招是以道映三皇明揚側陋智周萬物詢於芻蕘且聖賢而自貶何凡庶而可驕豈不思行高則憂毀於衆木秀則懼摧於飇矧夫陽光正中映土圭而將轉陰靈才滿隨蓂莢以旋消是故君子覩之以為立身之本名彌彰而彌懼功彌高而彌損不耀彼而自上不明我而自混徒觀其退藏好閉養智於恬幽而坦坦卑以謙謙一辭而行將恥於躁三揖而進何有於嫌况乎海以卑廣居深山以鎮靜可久楚莊懼功茂而終吉晉文恥戰克以無咎嗟凡今誇彼而競進何不覩斯而自守徒欲毀信廢忠謀訐自醜想進德之明義豈見充於虛受曷如君子稱物平施不生頗僻多者用謙為裒少者用謙為益不求翰音以待問必復厚德以珍席儻不伐之可嘉庶無媒以託跡萬里兮蜀郡隋都二橋兮地角天隅相去而如乖夷貊曾遊而只在寰區倚檻多懷結長悲而莫極憑川試望思遠道以何殊昔者滄海朝宗岷山發跡斯觀理水之要若啓鑿穴之役逮夫東土為揚西邦曰益架長虹於兩地客思迢迢浩積水於千秋江流脈脈宇宙帛丿糸帛丿糸今來邈然結構應似途程甚偏將暫遊於楚岸欲徑度於巴川目斷波中過巫峯之十二心馳路半到荊門而五千徒觀夫偃蹇東流崢嶸二邑揭華表以相效刻仙禽而對立俄驚回復潮生而夕月初明孰敢爭先帆去而秋灘正急眇天末之殊方有人間兮異鄉顧盼而層陰動色徘徊而浮柱生光飾丹雘以雖同彼臨淮海度軒車而既異此對銅梁古來幾許行人曾遊此路跨緑岸以長存俯清流而下注寧為駐足之所莫問傷心之故復有逆旅傷情臨卭遠行壯宏制以靈矗壓洪流而砥平家本江都羡波濤而自返身留蜀地偶萍梗以堪驚衍迤歸遙飄流恨結之子去兮揚桂棹長卿還兮建龍節既風月以相間固音塵之兩絶斯橋也可以濟巨川之往來不可以攜手而相別往事多違今年覺非嗟忽度於時景懼將萌於禍機新年當艾服之初方能知過往歲比靈蓍之數未省防微試問何人云蘧伯玉以道為喻因言自勖追向者以何及悟平生之不足處身而每在廉謹立志而常齊寵辱故乃追往日想當年似有失禮疑乎不賢懼愧於三千之內仍思於五十之前雖云時不再來悔無及也所謂過而能改善莫大焉想其悒悒自傷兢兢若厲悲急景以隙過歎芳時而川逝將以防彼終身警夫後世馳心於見善之末託意於思賢之際星霜不駐俄符大衍之籌容貌初移忽及始衰之歲况復日月逾邁春秋載新懼有乖於君子恐時同於小人前違而欲改安得後患而將遷有因百行維修宛見日新其德三緘乍啓可明言出於身自是一悔幽微全忘矯假方同知過之士亡一作何異惡強之者朝來暮往故無得而踰焉亂世危邦則可卷而懷也窮其過兮嗟嗟莫追考其數兮七七惟奇豈因利而有改雖委骨而無移異買臣官達之期未然而覺契孔氏命窮之日既至而知由是三省為人勞謙自責駟馬將追而莫遂中心欲悔而何益永示千載非惟半百故豫當弱冠之年已知非於曩昔昔者聖人之作易也以乾為天以坤為地於乾則資始㣥品在坤乃資生萬類乾為奇矣以三而契彼天經坤蓋偶焉以六而昭乎地位吾嘗仰以觀其氣俯以察其區豈非乾者陽也坤者陰乎於陽乃天之德於陰乃地之符亦猶陽與剛偶陰與柔俱於剛乃天之義於柔乃地之樞况乃取諸物以非真取諸身而非據是則取諸上而彖象咸立取諸下而吉凶斯著元亨之道配柔克以同歸光大之名與沈潛而俱去於乾則易知可察至健斯全其運也直其息也專為君而長為首而先為馬以居要為男而體元大矣哉確然示易若天之父萬物焉於坤則簡能可立至順為理其闢也震其翕也止為臣於主為腹於已為牛以當用為女而資始至矣哉隤然示簡若地之母萬物矣故能酌此生植通諸鬼神究其情於大壯播其義於家人否以知屈泰以知伸授以復而其心見考之咸而其感陳亦何異分彼混茫清為天而濁為地定其律呂宮曰君而商曰臣既生而太極為初並用而三才斯取彼策也三百六十此數也五十有五所以準此知道采之立言列之而其象顯演之而其卦繁蓋動靜之二體總牢籠之衆門斯可謂明覆載之德識化育之根故曰堯舜垂衣裳而天下治蓋取諸乾坤固刑部郎中沛子貞元朝歷官刺史國子司業臣某言伏以受恩之地中外則同戀主之心遐遠愈切臣素無方略又乏理能徒以久侍掖垣嘗叨衮職罪已彰於負乘位猶忝於藩維一違闕庭纍變寒燠虛當重任未答鴻恩常恐愚效未申官謗將及敢不誓心奉職克己臨人哀矜獄情節省財用蠲途誡慎終日憂勤而百越殊風庶氓失業流庸未復於田里逋賦乃積於歲時雍管防虞尚勞師旅海南饋餉猶資費用軍府屢空物力將竭至如奉宣化理恭守國章臣實盡疲駑庶裨萬一將使寇戎殄滅食貨豐滋臣雖策勵終亦無及伏乞聖慈矜念天鑒照臨察臣審分之誠哀臣瀝懇之意儻獲言旋京國重覩天顏則汲黯無恨於淮陽馬援不辭於瘴海矣微臣幸甚無任感恩戀主踊躍之至任和州刺史道沖子求仁得仁孔子歎其無怨達節守節延陵慕其高風甲代襲衣裘家承茅土志無苟得爰作佯狂且元成讓兄初疑人望丁鴻避弟終感友言良史以為美談志士稱其重義雖言詐善尚賢為惡與其寧失猶曰從寬况觀過知仁求之不遠深明知足取則非遙而當斷以嚴科計其大體參也不敏何足知之公復天水人徙居九真官比部郎中射以觀德樂以和聲將選士於澤宮必張侯於相圃所以誓宗廟之賓客備饗宴之威儀何忽武夫而要雅頌豈徒強飲強食勞祝史之正辭采蘋采蘩令太常之奏曲且五善之禮無赳赳之武夫三耦之間盡呦呦之鳴鹿苟用捨而有異在格令而無文責乃其不然乎訴之又益恥也巨川貞元時人夫人姓杜闕二字京兆人也自魏晉已來冠冕相繼載於史闕六字歲中原盜賊奔突避地東土因家南闕二字句容人也父諱闕一字志好高尚性唯沈雅閨門之內闕二字而成夫人即其第二女也闕二字聰惠夙間箕帚仁慈內闕三字則外聞年十九歸於劉氏可謂姬嬴敵美琴瑟闕三字族盛於當時闕一字作闕一字於後代府君不幸先夫人十闕三字君諱闕一字行闕四字夫人孀居晝哭至孝成家享闕四字孫有序何圖積善無慶遘疾彌留貞元十一年十月十一日終於江陽道闕一字坊之第也春秋八十有四臨終之時頓闕三字神色不昧宛若闕二字嗣子二人長曰處鍠前試上元縣闕一字次曰處巖並早承庭訓闕二字長稱泣血居喪哀毀過禮屬年月闕二字龜筮共違且以其年闕二字月九日權厝城南後合祔先府君之塋禮也闕一字恐因循歲月邱闕三字見命斯文用志幽壤銘曰闕八字名齊舉桉貌甚傾國闕二字三從闕二字四德窆於荒原松檟斯植行先德宗時人臣某言臣家忝儒門才非國器生休明之代遇堯舜為君束髮從官三十餘年矣曩日佐幕獲在湖南蒙先聖察臣效愚録臣克謹歷外臺三院知留務五年頻降絲綸驟登朱紫天慈子育不集戾於微躬君父之德且深昆蟲之力難報臣某中謝伏惟陛下繼明授圖誕敷至化特授以刺史兼經略觀察等使頃容管鎮任職方隅逮茲五考要荒外服僻陋在夷不能賦車籍馬以給國儲不能餼牽饋餉以賑軍食忝列位聯率慚無匹間歲陛下避狄奉天省方梁漢臣不獲身當矢石血濺凶渠及陛下掃除妖氛再造區宇臣復不獲扈蹕清道執戈啓行且霑率土之毛莫展事君之節此臣所以內訟刻骨上思訴天茍貪符竹之榮實懼素餐之刺臣今年踰知命齒髮已衰官守炎陬星霜屢改乏中和之理行無考課之彰聞而炎癘暗侵桑榆漸迫常恐一先風燭永謝聖朝况復不識覲見之儀未知班瑞之禮羔雁列序空聞於禮經鵷鷺同行欲求於夢寐伏惟皇帝陛下煦育動植酌心元元垂仁降慈俯遂愚懇許臣得對揚休命抃舞薰風則朝拜玉墀夕歸泉壤愚臣生不恨矣死且不朽臣某言昨遣奏事官馬元宗附臣口奏請赴朝覲馬元宗回奉宣進止語臣云君臣之情不厭相見朕與卿心無二緣途路稍遠卿來後即不免朕憂况乍收復洺州士庶恐未安泰須卿存恤未能遂卿此志且不須作來意者皇靈特降天語密開俯伏流汗殞越無地臣某中謝臣內顧庸虛謬居藩鎮日月云邁然三年空荷邱山之恩未伸絲髮之效隳肝瀝膽豈盡愚誠從頂至踵皆承元造夙夜祗惕悼心失圖誠願暫覩鴛鷺之行獲陪羔雁之列特近宸眷親奉德音則朝聞夕死臣之甚幸而軍城初復天意遙軫戀結之至尚仰懇誠今疆埸無虞干戈已戢軍儲戎賦幸有支持伏望天意許臣至冬末春初已來暫赴朝謁得申犬馬之志庶盡葵藿之心碎首糜軀死之無恨藹字望之太原人水部員外郎華子吳郡顧生能寫物筆下狀人風神情度甚得其態自江以東譽為神妙有好事者先賄以良金細帛必避而不顧設食精美亦不為之謝乃曰主人致殷勤豈無意邪何不醉我斗酒乘其酣逸當無愛惜乃張素座隅前即置酒一器初沈思想望搖首撼頤忽飲十餘杯手一作斗無三揖主人曰酒興相激吾將勇於畫矣午未及夕而數幅之上有帳於京城之外帳中有筵筵中有犧尊二壺觥即求而罍斝即倍犧壺之數而樂師差於前樂有竽琴瑟有笙鏞有缶有筑有鼓而東若鼓手以合奏也列坐皆冕帶盛服有持算主事者有捧斝就飲者有憑軾徐來者有目於騎而回者有仰吻而咍者有俯首而肅者有避席而遺簪履者有促襟而將進者此漢公卿祖二疏也主人久視而問曰東嚮而坐即行客也去國離㣥而容無慘恨何為妙曰二疏之去乃知足也非疾時也非時之不禮也非危於禍機也非避於讒口也非失於權利也既辭勤於夙夜而果其優游故顏間無慘恨之色主人歎曰既不為利易已之能潔也嗜酒而混俗何其高也圖二疏以遺於時俗勸也求其能狀物之情者孰有勝乎禮法不可斯須而去有以禮法而為災忠信不可斯須而去有以忠信而為禍禮法非災人之端忠信非禍人之本理或有害則禮法忠信為禍人之萌狂瞽人之所惡也效之則恐不及其真荒酗人之所恥也履之則恐不自其性狂瞽誠可惡也荒酗誠可恥也臨難而保全則狂瞽荒酗為藏身之藪禮法忠信直也狂瞽荒酗詐也以之保全則直不如詐之功嗚呼三皇之前無所用五帝之後無所不用峴官陝虢觀察使于頔參軍不勝頔暴虐自沈於河聲以成文樂可易俗期於五者不亂故使八音克諧爾乙於何典斯器也爰執干戚雖職列伶官徒紀鏗鏘則義同制氏欲使齊其綴兆節以屈伸縱曰仲由兼人不及鍾儀守職周旋罔墜禮儀何愆或者見非誠為參不敏也而辭且能順勿謂夔其窮歟勃官祕書丞昌黎文公著筆解論語一十卷其間翺曰者蓋李習之同與切磨世所傳率多言為舛始愈筆大義則示翺翺從而交相明辨非獨韓製此書也噫齊魯之門人所記善言既有同異漢魏學者注集繁濶罕造其精今觀韓李二學勤拳淵微可謂窺聖人之堂奧矣豈章句之技所可究極其旨哉豫繕校舊本數家得其純粹欲以廣傳故序以發之冉德宗時官右司郎中臣某言伏惟建中元年正月五日制條諸州刺史授訖於四方館上表讓一人自代者前池州刺史張嚴苦節立身直躬激俗潔廉惠愛特異常流自軍興以來職役繁重江淮百姓多有流亡張嚴在任三年闢田加戶頃因公坐法至免官在理可容原情堪録臣當州自定兩稅以來詎今四歲戶口減省差科日增臣無政能坐待顛躓使嚴代處必有成功伏望天恩遂臣誠請無任悃款之至
