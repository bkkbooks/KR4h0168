front:
  text: 全唐文欽定全唐文卷四百二十六于卲四
  hash: sha256:cbd55fb4773b13a8ea8ccadf1be1d410cdaf361e930a3cf44348d10fe7e9fb5f
body:
  text: 相公閣下某以抱舋遐荒殘魂未絕偷度時刻倏忽四年伏以宗社未安兇逆猶在才無取入死難莫由天地之中甘為棄物豈意當此之日逢相公安撫之時狂夫之言猶有一得芻蕘見納庸可庶乎伏惟相公秉鈞戡難道冠伊呂方期除天地之害更造生靈之本故詔書曰則如親臨又曰其代予言大哉倚賴斯可畏也安得因循故轍返顧於身乎奉惟相公之憂深入骨髓矣聖上纘序鴻業於今六年將求昇平初若不及以無賢相左右虧我聖道近二三年有執事者蔽主之耳目括囊容身內懷姦忌外擅威柄衣冠為之側足道路不敢偶語眾叛人離遂有今日相公所自見知既不能誅宏羊以謝天下則今之所急者皆在相公彀中耳况居儲后之姻重受台廷之寄國弊身弊國安身安既須以形跡遠嫌又須以直道見節為相公之福深以為難是即疏家知止馬氏不侯至今高人借以為誡斯為上矣如或急於救世雖不獲已道德刑政仁義干戈任權重輕惟精惟一斯為次矣此外滔滔者皆是非愚所知今大盜未除㣥寇更起其可處置者惟兩江半淮三蜀五嶺而已其中最切者請舉尤以明之每道皆有客軍本在同心平難側聞將校謀勝監軍爭長節度歛手金多者雖敗即安無金者纔入則退戰勝攻取未之前聞為今之計莫若監軍一切且停客軍權屬節使申明本管無得相干然後慎選良將文武兼備委之鎮撫希在萬一餘則歷在相公目前不敢煩於翰負累憂危年垂七十沉痾積疹四十餘年自到炎方幸未及死豈合以國家大務言達相府乎實以故韋吏部有忘年之分嘗約以相公今日之望每恨生死契濶不盡曩時之期拳拳之心皎如白日良友雖歿情豈忘乎伏蒙每賜書問亦承念及微命恃此不恐輒冒威嚴其是與非不在小子又自悲者平生志業身退毀隨紛紛世情鮮不乘便浮石沉水自古而然焭丶焭丶萬里誰能識察敢託相公門闌之舊輒書當時得罪之由再煩視聽具如別狀因宋侍御上垂詳覽又嘗內省自卜者審既已衰暮又昧時用前年病熱遠視不審去夏罹瘴近聽不聞疲憊之餘難於尸素伏乞曲賜恩波放歸田里傳家就木不夭天年九原之下期以贖責甚大惠也如以歸田聞奏無端即乞以檢校閒官為請許令隨便養病免死殊俗又大惠也伏念斗筲之器須當承乏之用任過其量自合速辜然於其中有可恕者且獲戾之始實謗為深不蒙鞫問至今為累若不然者豈三人同罪而一身受罰蔣鎮列曹會府袁高選牧名藩由此而言痕累未盡每一念至驚危貫心豈無知人誰為言者今之所祈恕者屬鴻恩宥過掩瑕滌穢亡官失爵猶蒙收敘况身佐州端秩猶五品乞從反褐以贖前愆免入量移再罹降黜餘生願畢瞑目如歸幸甚又事有失於知退而終可言者竊以聖上建元立極之初每賜驅策雖無塵露之効頗傳潤色之美有冊皇太后尊號聖神文武尊號皇儲宜建之制皆泥金檢玉著之國史其餘則北蕃西戎詔冊文誥無大無小何密何疎侯王將相出入中外數年之閒事無虛日皆承特旨俾以發揮聲猷所浹必由是也豈惟叨竊之幸實為不朽之幸矣昔隋文帝謂楊素牛宏曰薛道衡老矣宜使朱門列㦸薛公謝恩且辭無功隋文帝詔曰自吾有寶位國家大事皆爾宣行豈非大功耶薛公乃受賜愚雖才不逮薛而焯敘盛明過於薛遠矣願以簪履之念得遂邱園之請追前獎拔雖死猶生伏願相公深納焉沉迷鄙敗不知忌諱馳魂惕慮退不自安死罪死罪相公閣下自蒼生允望帝載緝熙大小仲父四方風動既絕橫議且無多門幸甚幸甚卲復何幸又當此時之則然命乃未偶通塞之分併在去年則相公首薦之恩鄙夫膺受之美徒拭人目孰知其心是以區區子牟不敢忘闕而又自惜昔常陪相公鄉里之舉時應神州甲乙之選其餘馳逸足揮勁翮修容峩峩來以干進者蓋千百數在公堂預鹿鳴之宴猶不可得況會府鶯遷之地者乎相公當時裒然居天下第一愚實不佞忝從斯列六子登科又厠其數凡我連茹世論以榮皆因依相公用白粉黛是乃降神惟嶽有開必先右掖司言中均典翰出入承盼從容十年啟沃之由自此而始則知輔弻之道在天非人嗚呼同時之人零落向盡彭楊李賀冥寞何之今相公宰平天下而鄙夫拘束邊外獨不得一親顏色更露腹心則漢庭于相公何厚哉是以內省可知命焉是以垂頭塌翼不敢思奮况家事未畢立錐無地男可從官女可許笄耳順之年馳復始滿名位日退沉痾歲深君臣之道天人之際心雖如丹誰表赤實此皆鄙夫與相公今日之事也豈無他人在我同志而已况相公無失其親無失其故二江之上獨立無親一麾以還未之有故舉目生憤傷如之何未知相公何以畱念悲趙武之視蔭感伍員之逆施拳拳之心欲罷不忍伏願體道垂統加餐保和乘風雲之感會行宰相之能事無寶斯位無愛斯權無念同升於朝無念若撻於市咸有一德不其盛歟方將伊皋比崇管樂論霸寧展禽三黜無怨在胡廣七登何補鄙老也有知美善不識忌諱遠塵視聽忠告尺書然非盡言之具庶咨道意之本所不爾者謂之何哉前漢州司田樊登兄弟舊遊三十載矣相公席硯昔與之同言念撫塵今也祇召甚大惠也因是利往得無謝焉卲頓首某月日通直郎殿中侍御史內供奉于卲頓首相公閣下一昨外甥右威衞錄事參軍宇文寶至奉傳慰誨不忘疵賤仍及家私造化之地禮物云隔一言一盼盡為曲貸既出望外不知所酧懷仁荷德載兢載懼伏惟相公膺斯夾輔閔心保乂尹正天下易哉為君虞友五臣黃師六相匡救之分心豈異乎自經艱難常處僻陋外乏長策內罹百殃悲生於累心亦盡矣頃者羈齒隴上迫諸寇戎分為係虜永絕殊俗豈意朝廷勤為官之選相公垂推已之美席硯存愛風塵念舊不以蒙鄙才無可觀曾微浹年再忝持憲振拔泥滯復為人知恩深提攜物無所棄進慙其往之誡退累則哲之明彷徨失圖罔知攸効又自悲者天倫之變禍橫相次家途淪胥素業無託他鄉異縣至於流離力未集事死又無補泣血仰天復何可言所以乘流則逝尸祿苟活國步未泰斯何底寧願言掃門不可遂得伏惟相公濟代推功渴日行道方將草創天下經綸時變大啟區㝢再垂衣裳頤神滌慮正在今日無以外物虧損遂為咎也御衡持政前計不迷想廟堂之當安全蒼生之始望小人之幸日月以冀然後但見鴻鵠拂摩青冥不知其極也謹附監察御史蘇端啟事以干罪貽煩黷伏增惶汗某月日某官某謹奏記令公閣下幽風固陰月紀將暮伏惟尊安福履萬壽無疆幸甚幸甚某遠鎮方隅蕃蠻未靖力微寄重憂慮交煎雖無暇自謀終分心遠難一昨中使飛馹王命急宣特論西戎侵偪郊甸即日奔走以副廟謀神往形留豈遑夙夜近知輦下人無動搖復聞朝廷勞師薄伐朱相公以幽燕勁騎先啟戎行而令公以朔漢舊軍暫分兵要始則聖畧不世出而推心與人終則上台應時須而同力戡難朱公稟命而有進令公遣戍而不疑是皆存大業於至公遂表無私以奉已太白所以食昴魯陽所以迴暉斯乃協和萬邦豈必因依一代昔者范宣子讓德晉君以霸藺將軍避怒秦兵不侵書之縑緗名亦不朽令公勳冠天地力存宗社每當一軍隱如敵國若涉大川而令公能濟若火燎原而令公能滅厚德及行葦太和合陽春謙尊而光直方以載四方延頸萬邦立程當今執事在具瞻之上將自下而彌高欲從損而彌益一諾而千萬人說一謙而千萬人讓况作相三朝行師二紀東征西怨遠懷邇安是以蒼海之隅莫不率俾膏雨既滋於百穀人倫復正於五常當今日之嘉猷何邃古之能擬齊晉之際其大此乎某區區不才謬司戎律每欲刳心示眾嘗膽酧恩側聽遠方有行君父忘寢與食思奉前人矧辱在下風特榮恩獎欣逢千載之事竊賀兩君之好感慕書紳未知其極謹遣某官某奉獻情言書非盡言之具蓋陳赤實拳拳之分某頓首再拜某月日某官某乙謹奏記相公閣下羌戎之患蓋三代矣秦漢以還怨詐更作詳諸舊史抑有前聞今則乘我閒釁於茲二紀亂華謀夏腥聞於天貪惏無厭暴殄斯極侵軼我湯沐震驚我兆人十月之初中官驛至密奉宸翰遠使臨邊拜受遂行赴敵宜速西山之役尋已加兵將赴急宣不遑啟處所以晝分忘食夕惕懷氷關山阻隔使信頓絕北望雲闕南馳夢魂近者日有京信方表朝廷清晏雖寇猶外姦而人無內警然則回中未靜鄜役仍勤相公維岳降靈求巖作輔不學古法知幾其神是以聖聰寄揚我武既奉鑿門之禮具稟至天之誠折首摧鋒計日告捷詩云赫赫南仲獫狁于襄不其盛乎伏以令公勳庸冠世焯見於天受三朝將相之託有萬人父母之愛方謝安之體大知鄧禹之道宏相公特稟廟謨龔行天討分邠寧拔距之眾兼漁陽賈勇之軍偶俱無猜上讓下競用獎王室作為人綱一舉而大義全暫勞而殊功倍以此眾戰何戰不剋以此滅戎何戎不盡某遠承惠顧委分知歸感遇因時若此之甚延首北嚮一心如丹謹遣某官某乙奉記陳情不宣某乙頓首再拜閣下昨日愚子皋謨起居迴蒙以放鷹度隴二賦及宗儒銘自發東甌至安南諸作見示隋掌明珠忽蒙分惠秦臺重璧不閒旁臨是何衰暮偶此殊觀幸甚幸甚自微言中絕大義復乖歷戰國縱橫之後遭亡秦煨燼之末四始不作斯文無紀漢興總輯馳騖稍復詩騷之體訖建安之閒皆可垂訓風流更代紛然殽雜迨有高下不可勝論齊梁陳隋乃至流遁矣國家受命煥乎文明開元天寶於斯為盛格高體正者君臣之義天人之際畢備於斯矣先覺後進其誰閒焉屬三十年來兵戈不息所務者急所貴者異過之則進不過則墜考之文章東不流於海南不集於江萬方行紀安可得哉某性乏天假學非專門徒以菲薄少有謬膺清切特用潤色鴻業頗承渥私孤奉明恩競速官謗謫居之地猶佐大藩承府公廕庥忝下榻清讌風亭月觀美景良辰未嘗不接高興陪嘯咏雖唱高和寡未能宏道雲從風感時賴起予如此之眷者如此之樂者歲不我與星迴四周而不知老之將至累之在已餘生之幸斯亦厚矣閣下心無所負神保其真冒南氣之炎鑠泛重溟之湍悍清光可鑑素履惟精雲天意長復此與合有足歡也今網罹俊乂渴日為勞明詔屢下旁求四達未有天生棟梁而不構大厦時遭霸王而不先受器者也在姑務修德而已前宵之命情實未盡燭不見跋露不稱晞區區主人有所慙遜信宿而未獲拜賜者實以沉瘵之故旦暮為劇况南面蒼梧北背瀟湘歲聿云暮於焉遷客心折骨驚復何言哉所得四卷繕寫已畢致之篋笥為藏馳遣皋謨送本不復一一汾陽王令公閣下伏惟戡亂定禍勳載王府致君行已德冠當時講信修睦敦敘舊好悉為古今第一則小子在數科之一而不能上達以自布露九泉之下何以塞責頃年令公先府君刺史于渭家世出牧於岷二境相接數年修好睦為弟兄契以金石則令公之所聞見也久矣初以專經遜業常假籍於渭之渚於時使君又特以禮送問以時務許以大名為之下榻教之改業復歸以報命先人從而誨焉天寶中忝以進士及第其年判入超絕科受校書此則使君負人倫高鑒施及小子不其神乎永懷報德何日敢忘慶流後嗣日以昌大及茲匡救莫之與京謬從庶官之列黜於眾人之下爰自起居郎署省闥未為令公所顧以職在下位不敢干進也殊不知江海納細以為大山岳積壤以為高斯道日顯人皆是傚以不待掃門願陪下拜有若公之令弟少府監知之為人工部趙侍郎賞之為文戶部李郎中列之為友皆朝廷俊選而不相鄙棄庸可誣乎夫有開必先先兆所感如小子者使先文字之已足於此令弟愛之貴壻終眷之及於此而不能再登龍門禮敘世舊未之有也謹奉尺書塵黷執事轉於內屏以待命死罪死罪某再拜七官院長足下愴與子別難以為晤出處默語蓋非一途頃自除官乘流則逝性有定分愚不可移是進已無所干退亦無所悶到家喜骨肉之愛出門全賓友之歡陶然而不知老之將至亦何暇役耳目從智力哉故知山林之士入而不返者宜每逍遙縱觀從亨多暇近覽古公避狄之地緬想周文出畋之師如其仁如其仁又其聖也不遠閭井頹然舊風嗟乎我生不辰遭值世難天未悔禍人猶怨嗟顧子弟之為邑迫時政以多故恭寬信敏惠力行不必果長太息之復何可言猗那楊生行道利物勤於四海君子之踐中朝炳然從容畫計抑有由也勉旃良圖無以自媚風味遐屬此情難論嘗當春臺梅柳動色思與攜手傷如之何時流好音尚慰羈旅幸甚幸甚太尉告身在匠人魚朝處望為收取遠代傳慶不欲失墜慎爾無忽因家人馳驛臨紙惘然于卲頓首某頓首尚書姨夫閣下伏惟秀出天枝挺生王國十年分閫八座居榮善譽嘉聲聞於四海幸甚幸甚某忝接末姻早承餘睠南秦旅寄特奉周旋西掖宦遊叨聯清切高山景行何日忘之去年出守江華未遑進路猥當時議且復拘留滿室遺孤立錐無地朝求暮乞日往月來外愧親朋內慙骨肉屏居陋巷不堪其憂唯此絕糧已復旬日古人併食今實當之側聞姨夫入朝先以貧賤為意頌聲載路誰不歸心某於池陽之閒獲空閑數頃之地誓將作勞隴畝以望秋登所乏耕牛傭賃無計儻或哀此窘迫許以後圖解倒懸之憂廣賙急之路以德報怨先哲格言區區之心竊慕此耳輒肆干觸昧于是非懲諸常情豈敢逃責痼疾暴發末由造門謹使家人投刺不宣某再拜近承書問兼示新書清心滌靈迴視易聽靜以究微婉有義可激悅以觀殊姿外容奚施徒見風雲相馳金玉交映曾不旋踵澤人之思一至於此甚大惠也直翰林之所可法豈不才而獨寶耶尋呈康子初云未見繕寫將送適遇有來遍示幕中無不嘉歎緣家累詣府求醫重陽之前當復北縣旬日之後便赴上都良覿無因此惟歎敘珍重珍重人使不斷絕也轉憑司錄馳白不一于卲頓首侯二山人足下所示三論鉤深索隱俾夜作晝殆浹辰矣如登太山徒仰其高若涉大水不測其深旨哉斯言蓋不可得而儔矣以此究天人何道不宏以此圖戰伐何敵不剋以此養精神何壽不長可謂通幽洞微垂代作教寧止士林爭傚求道趨風乎予復何才敢承末學已令繕寫藏諸袖中刳心寶持不敢失墜幸甚恐須舊本謹勒專送猶賴發蒙何當訪及閒宵對酒斯以為榮不復一一于卲頓首國家以桂林重鎮吳越襟帶有郡縣可以綱紀有蠻夷可以羈縻朔南聲教蓋以此始皇上纘承大位之明年啟謨㣥后載命連率是以范陽盧公自京而來條察二十八州諸軍事千里之地遂無外虞三軍之士皆務前敵然後賞必勞罰必害官不易法府無留事封略既靜公堂自閒况重陽美景得不為樂大合賓佐高張郡樓紅塵發地青山坰牧連天漲海來接蒼梧憑高而翠靄轉微送遠而白鴈看沒泛椒菊而算爵顧絲桐而閒奏賓醉月上主待露晞想彭澤之獨游悵馬臺之陳迹今日之會何其盛歟余負累謫居卒起庭府黜叅佐之禮陪上罇之娛韓灰已燃鄒谷自煖奉命為序冠於㣥篇辭之所難敢謝不敏請分賦五韻書諸即事云以公責左遷於茲迨一周星矣首疾心痗繼日經懷實由南冠尚簪憂所未忘是以幽求人境之外將蕩滌煩慮得諸石橋久之豈無他人不如我志願言卒獲者亦久之殿中侍御史范陽盧子至監理下國未浹辰而居簡乘暇行鑣載勒致為客數公方駕儐從如林煌煌焉奔走乎墟落延屬乎禪宮矣三登彌高累息以進而後偕集於橋下徒觀夫掛長虹以飛來陵半霄而勢去下空如豁纎蘿不生上頂為帷佳木藂秀不可得而總載也以為本於融結庸可自然資於造化力役不及明矣東極大水北走長安羅郭雉堞如示諸掌大田多稼宜乎有秋㣥山積翠以回合好鳥追飛而下上有是勝賞以是開懷盍賦新詩以紀一時之事也侍御以嘗忝鵷沼潤色鴻業以文司錄俾序良游敢復畢辭多慚老敗參軍國族之貴介子也况抗衡神都抵掌翰苑渴日行道推心與人故士君子願游芝蘭不避風雨僕校文者得無勸乎冬至十日雪飛千里攜我入室接君初筵嘉殽惟錯清酤有藇取適可以齊鷓圖及酣可以去狐白始為合獻之禮終為縱飲之樂有足多也飛鴟戾天宿鳥擇木鐘鼓告瞑軒裳欲歸主人諸僕一歲三捷斯文可睹愚以更請賓將不然蓋言之不可以亡也多愧皆讓監察御史蕭公以初獻戎捷塞庭無事從板輿之暇日邀幕賓而揖我必選名勝况臨清江始乘安流終踐樊圃嘉客以入華亭豁開桴浮往來上下皆見竹樹引外郊雲物鳬鷖為夫子家禽豈日駐花閒天鋪潭底自為勝槩而蕭公於是咨密戚荷賓榮惜此交歡愛此遲景飛觴舉白亦云醉止顧我以客時無閒焉拜升堂之嘉慶飽慶壽之餘瀝殿中侍御史鄭公文宗也退而喜曰今日之會允為良辰不有斯文無以終樂遂歷賦諸韻凡二十餘篇命為序引讓之不可春吹萬以為物皆有役我智者惟役之不殆終而有用故君子盡心於藥焉恐精華之不迨已也崇文館校書郎李公寢門之外大亭南敞大亭之左勝地東豁環岸種藥不知斯地幾十步但觀其縹緲霞錯葱蘢烟布密葉層映虛根不搖珠點夕露金燃曉光而後花發五色色帶深淺藂生一香香有近遠色若錦繡酷如芝蘭動皆襲人靜則奪目此李公及時之適也至若上苗可食下體兼採子入菰飯華雜蒲俎既甘平而性寒又辛溫而執熱癖除而不為去傳風愈而安知及書此李公谷中之木也吾徒沐公馨香愛我藥石皆可右坐願為佳遊風生白蘋日映丹浦披搖靃靡則花飛鏡中虛涵崢嶸而山在海底入門而未辨金谷問地而不言河陽况春醞已清家園可摘飲盡落景歡無後時憶戴而乘興自來知鐘而聽絃立應此李公推心之分也禮曰發慮以憲語云從吾所好慮以觀進好無思邪而公智周未兆根據有益上符性命之理下從耳目之玩舉一物而庶美集得不謂之難哉韓康隱名徒進識者羊叔相遺吾無閒然聊對諸人之意用觀賦物之作予乃僚也敢無述乎
