front:
  text: 全唐文欽定全唐文卷六百六十八白居易十三
  hash: sha256:a9f45e53200b76bb20113355b670f5211aa0c7b69086e3c4cf4d72a22c27ac6f
body:
  text: 右伏見六七日來向外傳説皆云有進旨令宣與諸道進奏院自今巳後應有進奉並不用申報御史臺如有人勘問便仰録名奏來者內外相傳不無驚怪臣伏料此事多是虛傳且有此聞不敢不奏伏惟德音除四節外非時進奉一切並停如有違越仰御史臺察訪聞奏今若不許報臺不許勘問即是許進奉而廢德音也伏以陛下憂人思理發自深誠德音中停罷進奉最是大節昨者裴均所進銀器發在德音之前猶慮四方不知將謂容有違越特令送出外庫宣報所司遠近傳呼聞於道路此則不獨人心欣躍感動四方實亦國史光明垂示百代今未踰數月忽有此消息賀德音之使未絶於道途許進奉之聲巳聞於內外此衆情所以驚愕而不測也臣訪昨聞又無明敕伏料聖意必無此處分但恐宣傳之際或致疑誤遂令內外有此流傳實恐旬月之間散報諸道虧損聖政無甚於斯若此果虛即望宣示內外令知聖旨使息虛聲伏願宸衷速有處分謹具奏聞謹奏右緣承璀職名自昨日來臣與李絳等已頻論奏又奉宣令依前定者臣實深知不可豈敢順旨便休伏望聖慈更賜詳察臣伏以國家故事每有征伐專委將帥以責成功近年以來漸失舊制始加中使命為都監頃者韓全義討淮西之時以賈良國為都監近日高崇文討劉闢之時以劉貞亮為都監此皆權宜且為近例然則興王者之師徵天下之兵自古及今未有令中使專統領者今神策軍既不置行營節度使即承璀便是制將又充諸軍招討處置使即承璀便是都統豈有制將都統而使中使兼之臣恐四方聞之必輕朝廷四夷聞之必笑中國王承宗聞之必增其氣國史記之後嗣何觀陛下忍令後代相傳云以中官為制將都統自陛下始伏乞聖慮以此思之臣又兼恐劉濟茂昭及希朝從史乃至諸道將校皆恥受承璀指麾心既不齊功何由立此是資承宗之計而挫諸將之勢也伏乞聖慮又以此思之臣伏以陛下自春宮以來則曾驅使承璀歲月既久恩澤遂深望陛下念其勤勞貴之可也陛下憐其忠赤富之可也至於軍國權柄動關於治亂朝廷制度出自於祖宗陛下寧忍徇下之情而自隳法制從人之欲而自損聖明何不思於一時之間而取笑於萬代之後今臣忘身命瀝肝膽為陛下痛言者非不知逆耳非不知危身但以螻蟻之命至輕社稷之計至重伏乞聖慮又以此思之陛下必不得已事須用之即望改為都監且循舊例雖威權尚重而制度稍存天下聞之不甚驚聽如蒙允許伏望速宣與中書改為諸軍都監臣不勝憂迫懇切倣徨之至右伏聞前件縣獄中有囚數十人並積年禁繫其妻兒皆乞於道路以供獄糧其中有身禁多年妻已改嫁者身死獄中取其男收禁者云是度支轉運下囚禁在縣獄欠負官物無可填賠一禁其身雖死不放前後兩遇恩赦今春又降德音皆云節文不該至今依舊囚禁臣伏以罪坐之刑無重於死故殺人者罪至於死坐贓者身死不徵今前件囚等欠負官錢誠合填納然以貧窮孤獨唯各一身債無納期禁無休日至使夫見在而妻嫁父已亡而子囚自古罪人未聞此苦行路見者皆為痛傷况今陛下愛人之心過於父母豈容在下有此窮人古者一婦懷寃三年大旱一夫結憤五月降霜以類言之臣恐此囚等憂怨之氣必能傷陛下陰陽之和也其囚等人數及所欠官物并赦文不該事由臣即未知委細伏望與宰相商量兼令本司具事由分析聞奏如或是實禁繫不虛伏乞特降聖慈發使一時放免一則使縲囚獲宥生死皆知感恩二則明天聽及卑遠近自無寃滯事關聖政不敢不言臣兼恐度支鹽鐵使下諸州縣禁囚更有如此者伏望便令續條疏其事奏上右臣伏以趙宗儒衆稱清介有恆嚴綬衆稱怯懦無恥二人臧否優劣相懸宗儒自到江陵雖無殊政亦聞清淨境內頗安縱要改移即合便擇勝宗儒者且嚴綬在太原之事聖聰備聞天下之人以為談柄陛下罷其節制追赴朝廷至今人情以為至當今忽再用又替宗儒臣恐制書下後無不驚嘆兼邪人得計正人憂疑大乖㣥情深損朝政臣前後所奉宣撰制若非甚不可者亦不敢切論今此除授實甚不可伏望聖慈更賜裁量其制未敢便撰伏待聖旨謹奏右臣伏以孟元陽激水有功河陽有政自到澤潞戎事頗修但以老年事須與替比諸流輩事迹不同今所除官合加優獎昨者范希朝在太原日昏耄不理人情共知及除統軍衆猶謂屈今元陽事迹不同希朝又除統軍恐似更屈雖加封爵悉是虛名况元陽功效忠勤天下有數今以無能者一例除改無所旌別臣恐今日已後無以勸人以臣所見若改除金吾大將軍輕重之間實為得所只如柳惟晨李之輩有何功業合比元陽猶居此官動逾年歲伏望聖慈以此裁量其制未敢依中書狀便撰謹具奏聞伏待聖旨謹奏右臣等伏奉恩制除前件官今日守謙奉宣進旨特加慰諭并賜告身者聖慈曲被寵命猥加俯以拜恩跪而受賜蹈舞離次驚惶失圖伏以郎吏諫官古今所重位當星象職在針規皆須聞望清方行實端慤然後可以佐彌綸於草昧能正其詞盡獻納於芻言必直其節苟輕所選實忝厥官臣等學識庸虛才質愚懦自居近職忝冒已深况超擢榮班慙惶交至初授殊常之寵聞實若驚再思難報之恩感而欲泣唯當奮勵駑鈍補拾闕遺中誓赤誠上酬元造俯伏憂愧若無所容無任感恩兢惕之至謹奉狀陳謝以聞謹奏右今日守謙奉宣聖旨以臣本官合滿欲議改轉知臣欲有陳露令臣將狀來者臣有情事不敢不言伏希聖慈俯察愚懇臣母多病臣家素貧甘旨或虧無以為養藥餌或缺空致其憂情迫於中言形於口伏以自拾遺授京兆府判司往年院中曾有此例資序相類俸祿稍多儻授此官臣實幸甚則及親之祿稍得優豐荷恩之心不勝感激輒敢塵黷無任兢惶謹具奏陳伏待聖旨右伏奉恩制除臣前件官今日守謙奉宣聖旨特加慰諭兼賜告身者俯僂拜恩怵惕受命戰越局蹐驚惶失容蹈舞屏營不知所據臣叨居近職已涉四年自顧庸昧無裨明聖塵忝歲久憂慙日深况於官祿之間豈敢有所選擇但以位卑俸薄家貧親老養闕甘馨之費病乏藥石之資人子之心有所不足昨蒙聖念雖許陳請敢望天恩遽從所欲况前件官位望雖小俸料稍優臣今得之勝登貴位此皆皇明俯察元造曲成念臣為子之心賜臣及親之祿臣所以撫心知愧因事吐誠烏鳥私情得盡歡於展養犬馬微力誓效死以酬恩榮幸不止於一身感戴實深於萬品無任荷恩抃躍之至右今日守謙奉宣聖旨以臣初入院特賜設者臣生長窮賤才質孱微草野鄙夫風塵走吏豈期聖造擢在禁闈煦以天慈賜以御食臣所以凌兢受命俯伏荷恩心魂不寧手足無措况樽開九醞饌列八珍惠過加籩榮優置醴金罍引滿將王澤而共深玉饌屬厭與聖德而俱飽終食且歎捫心自驚戰汗慙惶隕越於下謹奉狀陳謝以聞謹奏右今日守謙奉宣聖旨以臣初入院特賜衣服者臣自入禁司才經旬月未陳薄效纍受殊私况前件衣服等獻自遠方降從御府既鮮華而駭目亦輕暖而便身臣實何人堪此榮賜必擬祕藏篋笥傳示子孫何則顧陋質而懷慙貌非稱服撫微軀而荷寵力不勝衣因物感恩無任愧懼謹奉狀右今日伏奉聖恩賜臣等於曲江宴樂并賜茶果者伏以暮春良月上已嘉辰獲侍宴於內庭又賜歡於曲水蹈舞局地歡呼動天况妓樂選於內坊茶果出於中庫榮降天上寵驚人間臣等謬列近司猥承殊澤捧觴知感終宴懷慙肉食無謀未展涓埃之效素餐有愧難勝醉飽之恩以此兢惶未知所報謹奉狀陳謝以聞謹奏右今日伏奉進止賜臣等於曲江宴會特加宣慰并賜酒脯等者伏以重陽令節大有豐年賜宴於無事之朝追歡於最勝之地况天廚酒脯御府管絃寵錫忽降於寰中慶幸實生於望外仍加慰諭曲被輝華臣等各以凡才同參密職幸遇休明之日多承飫賜之恩樂感形骸歡容動而成舞澤均草木秋色變以為春徒激丹心豈報元澤謹奉狀陳謝以聞謹奏右今日蒙恩賜臣等前件口蠟及紅雪澡豆等仍以時寒特加慰問者伏以時逢臘節候屬祈寒豈意聖慈不忘微賤念嚴凝而加之煦嫗慮皸瘃而潤以脂膏喜氣動中歡容發外挾纊之恩甫及和則體舒不龜之澤既霑感而手舞臣等省躬懷愧因物諭情豈止飲德縈心唯驚寵賜必擬澡身勵節以答鴻私感躍之誠倍萬恆品謹具奏聞謹奏右今日奉宣賜臣等紅牙銀寸尺各一者伏以中和屆節慶賜申恩當晝夜平分之時頒度量合同之令况以紅牙為尺白金為寸美而有度煥以相宣逮下明忖度之心為上表裁成之德慶澤所及歡心畢同臣等塵忝日深寵錫歲至雖恩光下濟咫尺之顏不違而尸素內慙分寸之功未效捧受愧畏倍萬恆情謹具奏聞謹奏右今日高品官唐國珍就宅宣旨賜臣新火者伏以節過藏煙時當改火助和氣以發滯表皇明而燭幽臣顧以賤微荷茲榮耀就賜而照臨第宅聚觀而光動里閭降實自天非因榆柳之燧仰之如日空傾葵藿之心徒奉恩輝豈勝欣戴右今日奉宣旨賜臣等冰者伏以頒冰之儀朝廷盛典以其非常之物用表特異之恩况春羔之薦時始因風出當夏蟲之疑日忽自天來煩暑迎消清飇隨至受此殊賜臣何以堪欣駭慙惶若無所措但飲之栗栗常傾受命之心捧之兢兢永懷履薄之戒以斯惕厲用答皇恩謹奉狀陳謝以聞右今日蒙恩賜臣等前件新歷日者臣等拜手蹈舞鞠躬捧持開卷受時見履端之有始披文閲處知御歷之無窮慶賀既深感戴無極謹奉狀陳謝右今日高品杜文清奉宣進旨以臣等在院進撰制問賜茶果梨脯等曲蒙聖念特降殊私慰諭未終賜賚旋及臣等慙深曠職寵倍驚心述清問以修詞言非盡意仰皇慈而受賜力豈勝恩徒激丹誠詎酬元造無任欣戴抃躍之至右今日蒙恩賜臣等酒及蒸餅環餅等伏以時維秋社慶屬年豐頒上尊之酒漿賜大臣之餅餌既非舊例特表新恩空荷皇慈豈伸丹慊謹奉狀陳謝右臣等奉中書門下牒稱奉進旨令臣等重考定聞奏者臣等竊有所見不敢不奏伏以今年吏部科第不置考官唯遣尚書侍郎二人考試吏部事至繁劇考送固難精詳所送文書未免瑕病臣等若苦考覆退者必多韓皋纍朝舊臣伏料陛下不能以小事致責臣等又以朝廷所設科目雖限文字其間收採兼取人材今吏部只送十人數且非廣其中更重黜落亦恐事體不宏以臣所見兼請不考已得者不妨僥幸不得者所賸無多貴收人材務存大體伏乞以臣等此狀宣付宰臣重賜裁量伏聽進旨右臣伏準建中元年正月五日敕文武常參官上後三日舉一人自代者伏以前件官有辨敏之學有體要之文文可以掌王言學可以待顧問名實相副輩流所推選備侍臣參知制命酌其宜稱誠合在先臣既諳詳輒舉自代謹具聞薦伏聽敕旨右臣等伏料自欲重試進士以來論奏者甚衆伏計煩黷聖聽之外必以為或親或故同為黨庇臣今非不知但以避嫌事小隱情責深所以冒犯天威不敢不奏伏希聖鑒試詳臣言伏以陛下慮今年及第進士之中子弟得者僥幸平人落者受屈故令重試重考乃至公至平凡是平人孰不慶幸况臣等才識淺劣謬蒙選充考官自受命以來夙夜惶懼實憂愚昧不副天心敢不盡力竭誠苦考得失其間瑕病纎毫不容猶期再三知臣懇盡然臣等別有愚見上裨聖聰反覆思量輒敢密奏伏惟禮部試進士例許用書策兼得通宵得通宵則思慮必周用書策則文字不錯昨重試之日書策不容一字給燭只許兩條迫促驚忙幸皆成就若比禮部所試事校不同雖詩賦之間皆有瑕病在與奪之際或可矜量倘陛下垂仁察之心降特達之命明示瑕病以表無私特全身名以存大體如此則進士等知非而愧恥其父兄等感激而戴恩至於有司敢不懲革臣等皆蒙寵擢又忝職司實願裨補聖明敢不罄竭肝膽謹具奏聞伏待聖裁謹奏右田布以臣宣慰進旨敬命荷恩遂與臣前件絹臣不敢受尋以奏陳昨日中使第五文岑就宅奉宣令臣受取者臣已當時進狀陳謝訖感戴聖恩昨日不敢不謝酌量事宜今日不敢不言臣家素貧非不要物但以昨者陛下遣臣宣諭田布不同常例田布今日之事不同諸家何者未報父讐未雪國恥凡人有物猶合助之况取其材有所不忍又昨除田布魏博節度制中誡云一飯之飽必均於士卒一毫之費必用於戈矛今以五百匹絹與臣臣若便受則是有違制命不副天心臣又以凡節將之臣發軍討叛大費雖資於公給小用亦藉其家財今陛下方欲使田布誓心報讐捐軀殺賊伏料宣諭慰問使者道路相望若奉使之人悉須得物臣恐鎮州賊徒未殄田布財産已空欲救將來乞從臣始此則求田布物者必息而田布感聖渥倍深責其成功必有可望臣食國家之厚祿居陛下之清官每月俸錢尚慙尸素無名之貨豈合苟求伏願天鑒照臨知臣不是飾讓臣又非不知如此小事不合塵黷尊嚴心實不安不敢不奏其前件絹臣尋已却還田布伏乞聖慈許臣不敢取仍望宣示田布令知聖恩謹録奏聞伏待聖旨右今日宰相送詞頭左降前件官如前令臣撰詞者臣伏以李景儉因飲酒醉詆忤宰相既從遠貶已是深文其同飲四人又一例左降臣有所見不敢不陳伏以兩省史館皆是近署聚飲致醉理亦非宜然皆貶官即恐太重况獨孤朗與李景儉等皆是僚友旦夕往來一飯一飲蓋是常事景儉飲散之後忽然醉發自猶不覺何况他人以此矜量情亦可恕臣又見貞元之末時政嚴急人家不敢歡宴朝士不敢過從衆心無憀以為不可自陛下臨御及此二年聖慈寬和天下欣戴臣恐此詔或下衆情不免驚憂兼恐朝廷官寮從此不敢聚會四方諸遠不知事由奔走流傳事體非便伏惟宸鑒更賜裁量免至貶官各令罰俸感恩知失亦足戒懲臣不揆蠢愚輒敢塵黷豈不懼罪豈不惜身但緣進不因人出於聖念自忠州刺史纍遷中書舍人已涉二年一無裨補夙夜慙惕實不自安前後制敕之間若非甚不可者恐煩聖聽多不備論今者所見若又不奏是圖省事有負皇恩伏希天慈以此詳察知臣所奏不是偶然其獨孤朗等四人出官詞頭臣已封訖未敢撰進伏待聖旨右臣等伏見自幽鎮有事以來詔太原魏博澤潞易定滄州等五道節度各領全軍又徵諸道兵馬計士八十萬四面圍繞已逾半年王師無功賊勢猶盛弓高已失深州甚危者豈不以兵數太多反難為用節將太衆則心不齊莫肯率先遞相顧望又以朝廷賞罰近日不行未立功者或先封官己敗衄者不聞得罪既無懲勸以至遷延若不改張必無所望今李光顏既除陳許節度盡領本軍伏請抽諸道徑兵通前約與三四萬人從東速進開弓高糧路合下博諸軍解深邢重圍與元翼合勢令裴度領太原全軍兼招討舊職四面壓境觀釁而動若乘虛得便即令同力剪除若戰勝賊窮亦許受降納如此則鎮州夾攻以分其力招諭以動其心未及誅夷自生變改况光顏久諳戰陳素有威名裴度為人忠勇果決加以明懸賞罰使其憂責在身事勢驅之自須死戰若比向前模樣用命百倍相懸破賊責功無出於此况太原興王之地天下徑兵今既得人足當一面以此計度無如二人右伏請詔光顏於前件四道揀選馬步精鋭者每軍各取三四千人並令光顏專統一則藉其兵力討襲鎮州二乃每軍抽人不為不用其餘放去理亦無妨况令守疆亦足展效或聞澤潞魏博兵馬同討淮西之時素諳光顏勤恤將士必樂為用可望成功今光顏得到下博後即陳許先有八千人昨又發三千人光顏又領鳳翔馬軍一千三百人加以徐泗鄭滑河陽等軍悉皆徑鋭堪用况兼魏博等四道所抽兵馬約有三四萬人盡付光顏足以成事其襄陽陜府東都汝州等道兵馬仍委光顏揀擇可否若不堪用不如放還豈惟虛費資糧兼恐撓敗軍陳今既只留東西二帥請各置都監一人諸道兵馬監軍伏請一時停罷如此則衆齊令一必有成功右伏以朝廷本用田布之意以宏正遇害令報父讐望其感激衆心先立功效今領全師出界供給度支數月已來都不進討非田布固欲如此抑有其由或聞魏博一軍纍經優賞兵驕將富莫肯為用况其軍一月之費計實錢二十七八萬貫今天下百計求取不足充其數月衣糧若且依前將何供給則不如使退守本境自供給衣糧省費之間利害明矣其澤潞易定等雖經接戰勝負略均且昭義全軍收臨城一縣不得則其兵力亦可知矣滄州新經敗挫叔良又乏將謀勢不支任必無可望今請魏博等四道各歸本界嚴守封疆如此則不獨減無用之兵亦可以省有限之費就中魏博尤要退軍虛費資糧最可痛惜者也右伏以行營最切者並不以國用將竭軍費不充更至春夏已來實恐計無所出今若兩道更留六萬其餘退食本道衣糧即每月所費僅減其半一月之用可給兩月唯供六萬所費無多既易支持自然豐足責其死戰敢不盡心臣以為當今至切無過於此右克融庭湊同惡相濟物情事理斷在不疑今朝廷特赦克融新授節鉞縱終助援必恐遲疑當逗遛克融之時是經營庭湊之日遲則心固久則計成三數月間須有次第延引入夏轉難用兵今正是時時不可失以臣等所見謹具如前狀以行營今日事宜真可謂急危極矣其間變故遠不可知但恐如今救已遲晚若猶可及無出於此何者苟兵數不抽軍費不減食既不足衆何以安不安之中何事不有伏料陛下覽臣此狀必有二疑一者以臣等悉是儒生不諳兵事縱知誠懇的未信行臣亦以此自疑久未敢奏今既事切不敢不言若攻戰機宜非臣所習而軍國利害雖愚亦知况察㣥情兼聽衆議與臣此奏所見多同伏望不以臣等儒生輕而不用也二者伏恐行營事勢奏報不真皆云賊徒計日合破又陛下以制置既久難於改移前事若得其宜即合旋有成績至今既無次第安得不務改圖古人云收之桑榆事猶未晚若因循且過即救療轉難臣又切有過憂敢不盡吐肝肺實恐軍用不濟更須百計誅求日引月加以至困極今天下諸色錢內每貫已抽減三百茶鹽估價有司並已增加水陸關津四方多請率稅不許即用度交闕盡許則人心無憀自古安危皆繫於此伏乞聖慮察而念之不以重難改移忽於大計也臣等又憂深州久圍救兵不至弓高新陷糧道未通下博諸軍致於窮地光顏兵少欲入無由外即救援不來內即餱糧罄竭各求生路誰向死門無可奈何忽然奔散即聖心雖悔其可及乎其鑒不遙在貞元中韓全義五樓之敗是也伏望陛下詳臣此狀思臣此言若以為然速賜裁斷臣等受恩日久憂國情深志在懇切言無方便伏望聖鑒俯察愚衷無任感激悃之至謹同詣延英門進狀以聞伏聽敕旨謹奏據刑部及大理寺所斷準律非因鬬爭無事而殺者名為故殺今姚文秀有事而殺者則非故殺據大理司直崔元式所執準律相爭為鬬相擊為毆交鬬致死始名鬬殺今阿王被打狼籍以致於死姚文秀檢驗身上一無損傷則不得名為相擊阿王當夜已死又何以名為相爭既非鬬爭又蓄怨怒即是故殺者又按律疏云不因爭鬬無事而殺名為故殺此言事者謂爭鬬之事非該他事今大理刑部所執以姚文秀怒妻有過即不是無事既是有事因而毆死則非故殺者此則唯用無事兩字不引爭鬬上文如此是使天下之人皆得因事殺人殺人了即曰我有事而殺非故殺也如此可乎且天下之人豈有無事而殺人者足明事謂爭鬬之事非他事也又凡言鬬毆死者謂是素非憎嫌偶相爭鬬一毆一擊不意而死如此則非故殺以其本原無殺心今姚文秀怒妻頗深挾恨既久毆打狼籍當夜便死察其情狀不是偶然此非故殺孰為故殺若以先因爭罵不是故殺即如有謀殺人者先引相罵便是交爭一爭之後以物毆殺了則曰我因有事而殺非故殺也又如此可乎設使因爭理猶不可况阿王已死無以辨明姚文秀自云相爭有何憑據又大理寺所引劉士信及駱全儒等毆殺人事承前寺斷不為故殺恐與姚文秀事其間情狀不同假如略同何妨誤斷便將作例未足為憑伏以獄貴察情法須可久若崔元式所議不用大理寺所執得行實恐被毆死者自此長寃故殺者從今得計謹同參酌件録如前
