front:
  text: 全唐文欽定全唐文卷四百三十五端肅宗朝比部郎中太常諡楊綰曰文貞端持異議帝惡其言醜險不實貶巴州員外司馬
  hash: sha256:d033a93aabc2fca1d105882d91457c450215f8af07615a691b4ab1aa37dfd079
  markers:
  - {type: head, offset: 14, content: 蘇端, id: KR4h0168_NFKB_435-h1, level: 1}
body:
  text: 古者美惡無私裦貶必當將以嘉善而退惡為列辟之明典也可不慎歟今謹詳前諡文貞者稽法考事恐非光允時論發揚來訓矣夫道德博聞曰文清白守節曰貞且元載與司徒友敬殊深推為長者首舉清要人莫與京及司徒寵望漸高載畏其逼又知載隳壞紀綱心二於君既懼其疑因而疏間有口皆知載惡而獨曾無一言或有發載之惡證告未明抱誠坐法者司徒時居上列奏達非難不能因此披衷正詞全志士之命露凶狡之私而乃晏安自泰優遊過日使元載禍大滅身竟勞聖上防伺之慮豈守節不隱耶豈懷道無毒耶非謂文貞明矣洎元載將謀不忠罔聰蔽聖嗇恩於下招怒於上使北塞人勞有過時之戍西郊虜入無弔災之惠礠邢忠義之士將死復生梁宋傷夷之人或寒或餒搜訪旌恤中外所急載皆絶之使王澤不及於下為行路所嗟而楊公當聖上維新之時居天下得賢之望誠宜不俟終日造次速言乃寂寥啓悟禁閉謨猷貪食萬錢之賜虛承一心之顧使防河之人家聞採菉之歎近甸諸邑多興祈父之憂豈慈惠愛人乎既曰不慈不惠何以謂之文有隱有毒何以謂之貞乎古者諸侯有國卿大夫有家上以報祖宗下以處子孫之義也楊公歷處厚俸人謂儒宗曾不立家又無私廟寧使人老闕敬祖之禮位極亡祭祀之宮凡在衣冠誰不歎恨又乖大義克就愍仁接禮之義矣曰文與貞曷可以議聖人立諡有公無私所以周宣不敢私于父諡曰厲漢宣不敢私於祖諡曰戾百王明制歷聖通則昔公叔文子有死衛之節修班制之勤社稷不辱方居此諡爰及太宗初魏公徵有匡救公直之忠中宗末蘇王褱有保安不奪之節所以諸賢甚衆諡文貞者不過數公至於燕公張説先朝辭翰之臣名節昭著省司尚謂不可至今人故稱之由是言之烏可比德請牒大常更詳他諡以守彞章庶乎青史之筆不乖於周漢黃泉之魂免慚於蘇魏謹議南仲華州下邽人乾元初制科登第授太子校書歷御史中丞改給事中出為陝虢觀察使貞元中遷鄭滑節度使授尚書右僕射十九年卒年七十四贈太子太保諡曰貞伏聞貞懿皇后今於城東章敬寺北以起陵廟臣不知有司之請乎陛下之意乎陰陽家流希旨乎臣愚以為非所宜也謹具疏陳論伏願暫留天眷而省察焉臣聞人臣宅於家君上宅於國長安城是陛下皇居也其可穿鑿興動建陵墓於其側乎此非宜一也夫葬者藏也欲人之不得見也是以古帝前王葬后妃莫不憑邱原遠郊郭今則西臨宮闕南迫康莊若使近而可見死而復生雖在西宮待之可也如骨肉歸土魂無不之章敬之北竟何所益視之兆庶則彰溺愛垂之萬代則纍明德此非所宜二也夫帝王者居高明燭幽滯先皇所以因龍首建望春蓋為此也今若起陵目前動傷宸慮天心一傷數日不平且匹夫向隅滿堂為之不樂萬乘不樂人其可歡心乎又暇日起歌動鐘於內此地皆聞此非宜三也伏以貞懿皇后坤德合天母慈逮下陛下以切軫旒扆久俟蓍龜始諡之以貞懿終待之以褻近臣竊惑焉非所以稱述后德光被下泉也今國人皆曰貞懿皇后之陵邇於城下者主上將日省而時望焉斯有損於聖德無益於貞懿將欲寵之而反辱之此非宜四也凡此數事實玷大猷天下咸知伏惟陛下熟計而取其長也陛下方將偃武靖人一誤於此其傷實多臣恐君子是非史官裦貶大明忽虧於掩蝕至德翻後於堯舜不其惜哉今指日尚遙改卜何害抑皇情之殊眷成貞懿之美號下闕至遠始名鵬趙州高邑人上元時制策高第歷司勛吏部員外郎中遷天官侍郎出為壁州刺史卒年四十八夫招搖東指寰區識天下之春溟漲北臨川谷有朝宗之地况乎皇明發而萬物覩天衢亨而四隩宅故以驟險浮深同文協軌者也若乃壤鄰驕子家號名王握蔥野之瑰奇潄蒲源之粹液井蛙自許既纍嗤於越子風鴻且遇仍嗣美於秺侯則大將軍安侯其人矣侯諱附國其先出自安息以國為姓有隋失馭中原無何突厥乘時籍雄沙漠侯祖烏喚為頡利吐發番中官品稱為第二王庭雖局方冠射雕之勇帝鄉何遠空鬱衝牛之氣父朏汗望日月於中衢奮羽毛於邊服勢同鵲起功隨豹變貞觀初率所部五千餘人朝詔置維州即以朏汗為刺史拜左武衛將軍纍授左衛右監門衛二大將軍封定襄郡公寄等連城榮超合壘析圭胙土時議稱之侯運偶千年才標一日服太阿而善斷覽介石以知機有顧鶉籠實懷先覺乃心鳳扆奚歎後豫於是拔迹泥沙翻飛霄漢亦以貞觀四年與父俱詣闕下時年一十有八太宗見而異之即擢為左領軍府左郎將尋令與鴻臚丞趙德楷諭旨於吐谷渾虜安鸋鴂之巢敢恃螳螂之斧旅拒成命逼迫行人遇困加威脅舉步逢艱阻侯以命有所繫靜以體之節不可失貞以守之雖弦矢屢移而鐵石無改既而加兵一蕩凶氛四徹竟獲全歸僉以為蘇武鄭衆不獨高於前代矣璽書歎述遷本府中郎將賚布帛五百假又加秩為忠武將軍行本職十九年太宗揚鑾暫撫清海俗於三韓駐蹕聊麾駭天聲於六漢侯功參末將績預元戎詔論功授上柱國封騶虞縣開國男食邑三百戶永徽元年拜右領軍將軍餘如故荷元天之廣運承湛露以晞陽蒲璧開南面之尊蘭錡盛北軍之寵門驅四馬匣紐雙龜薄暮歸來輝光不獨於三子辨色而入前後方參於五侯謺蓋流軒徽枝岌嶪足以震輝都鄙謳謠氓庶尋丁定襄公憂執喪無替於少連讓爵自先於季札及其字人按部和風布政使幼艾不懷酋渠不驚非樹其長莫諳其俗以此高乎兼本官復拜為使持節維州諸軍事維州刺史朝咨良牧之能物喜吾君之子入虔戎政縟共宿於星廬出變夷歌扇重暉於日域龍朔中隨府易名改為左戎衛將軍總章年進為右戎衛大將軍刺史勳封並如故日觀崇巖雲封峻霄三五之聲已邈八九之迹難追天子潔壇場疏圭璧報功崇德騰茂實於石間侯亦勵熊羆從金鼓前清後禦罄忠勤於玉帳咸亨初追封斯閥仍本封進爵為子加邑四百戶方當降錫上樽行升右地嘯洪崖而自狎揖浮邱以曾舉而殷相肇夢晉寢成妖古謝今形仙禽致是非之難寒凝暑退大椿屬搖落之期哀哉奄以調露二年二月十八日寢疾終於神都春秋八十有三永隆二年二月二十三日葬於雍州長安縣孝悌鄉之原禮也惟侯緒茂膏梁基循鼎胄絳河潛潤每孕傾都之寶丹野成章必矯冠㣥之翼弱便英邁長實宏遠劍連三術道蒙史以前驅德包五善揖楚臣於下席從吾所好方盡鋭於戈矛在物或遺故無資於筆硯加以動會規楷性非因習泣畫象於離宮真資孝敬感飛泉於異域雅蹈忠誠利以義通功以濟物故能夙攀閶闔亟奉鉤鈐效心膂於中年享高明於暮景左右深率從之奇始終無纎芥之隙行師則訓兵以律受任則執禮無違非才優體二道恭感一惟微惟熙至公至平者疇能與於此哉悲夫琴心輟奏去高堂而不留筮氏觀龜創幽穸而期兆鼓秋風於古樹誰識將軍思白日於荒鄰空懷中散賓御旋兮寒野暮池館靜兮浮雲陰可作無時與歸何想長子故右玉鈐衛將軍北平縣公思祗藻身淑慎流聲奕葉繁滋遽委危露先飄次子魯州刺史思恭等趨表闕以劈心涉禮庭而收泗薦蘭之誠徒切集蓼之哀永萃思所以髣佛形容揄揚清懿託問詞於廣陌播雄名於大隧乃為銘曰閬風秀迥河氣靈長於昭化育實延英芳稜飛玉塞勢軼沙場家承有土祚歷無疆分源何從揚飈南入削衽荒庭殺凶大邑孝乎何取忠焉是襲花綬遙遙雲冠岌岌敷命河首逢羈海裔雲天變色鄉關無際虎噬徒交壯心益勵卒延裒謙豈嗟拘滯作固蘭陛仍分竹符盟申帶礪禮盛傳呼巖廊夕警祕宇晨趨還便後殿出必前驅本枝隱蔽宣條求瘼惠起人謠清惟主諾野乃聞勞門非藉惡是聽夏聲諳知戎落旋增厚秩亦追崇封逸豫斯邑車服以庸庭紛舞籥室韻歌鍾寧悲昃景遽落高峯梁木應悲大星俄殞廣川去楫修途廢軫倏兮已喪蕭兮而盡神乎不測天乎何忍永背青皋即安元夜泉臺構壤山門反駕野吹方噎榮輝不借德雖隆於九原神豈奄於萬化寬寶應朝擢書判拔萃科底祿命賢諒存於考核懸象班令克定於程期無慢國經必遵王度哿言丁矣庶得人焉登書拔才量能授職始望政成人化冀及三年而乃褫服抽簪曾不纍日屬參選限敕而詣訴過時徒思揚已露才豈可違文破格然已而靡慍嗟有異於子文留之物移傷不遇於黃霸誠哉廢置實曰司存引明周典之文詎忝冢官之列興言不失宜窒有詞載肅宗朝官中書舍人誰為府君犬必啖肉誰為府僚馬必食粟誰死元公餒死空腹升乾元三年渝州刺史嗣賢宣化兮匪仁誰當尸之吾欲息肩兮物情率我攸宜氣和政洽兮八風融滋皇明燀赫兮萬古今時年豐人康兮鼓腹於斯慚四子之詠兮中和之詩祕肅宗朝官尚書郎護草木性植彼薔薇眼根不染見爾色非聿元宗朝官清漳令遷尚書郎采采春渚芳香天與滌慮破煩靈芝之侶倚御史大夫淹元孫官左衛將軍裂素成器給我救彼密淨圖靈獲生潔水延昌乾元元年官監察御史殿中侍御史知雜事歷度支員外郎吏戶二部郎中京兆少尹加諫議大夫中國經瀆河為長上應析木下朝扶桑演崑崙踰積石繚大漠經龍門灌注九州之間經營萬里之外鱗介所宅神靈所都元冥總之以命官馮夷憑之以為伯唐堯觀諸龍圖肇見周公沈璧榮光發祥元符之來彪炳彰煥古先哲后罔不欽崇奠封居之儀修壇墠之制存乎祀典代以為常則班固序漢書所謂河祠臨晉是也偉其南直太華北鄰中條渭水過其旁汾雎揭其後風雲相蕩精氣交馳於以禮神事之宜也不然發源自遠地則多漫胡為不昭晰於他邦獨受享於茲土前賢經始抑有其由至於春以泮凍秋以涸凍初以歲禱終以報祈嘗醪有加騮駒是薦蓋以在雍州之域通天子之都地既稱雄禮云異數與夫淮流桐柏江出岷山僻在遐方莫我京也幽贊之力實賴河公以潔為清瀾至於數四息昏墊之苦絶羡溢之憂濱河之人濶無大害此靈長之德上善之功也祈以正直享以積誠未嘗不誘其衷而降之吉也或進以便佞言以矯誣未嘗不奪其魄而貽之禍也歲大旱而作霖雨時夭札以惠嘉生依仁而行唯德是輔天寶歲安祿山稱兵朔裔肆逆東夏焰烻扇燥蒸人焉宗社有綴旒之厄士庶有阽危之懼太上南幸肅宗北巡賊相張儒據有長安賊將崔乾祜固守蒲坂今關內河東副元帥中書令汾陽郡王郭公時為兵部尚書門下平章事朔方節度使訓兵誓衆超百二之險謂此邦底定則京師可圖虔禱於河潛軍以往金鼓掩夜渠魁出奔遂收蒲城神所道也及師次渭汭陰霧晦冥公假寢之際夢河神謂曰永豐倉側將有急變不如速退姑以避之比全軍及郊虜已雲合克違寇難神所扶也其後李國楨之遇禍公復總戎故絳僕固懷恩之逆命公又出鎮河東大君日旰食中外騷擾公獨奮無前之勇馳不測之地始按節而來終奠醑其邁所謀必克無往不平再安叛渙神所相也爰自兵亂以迄於今時更十年代歷二聖國之氛霾惟河公蕩滌國之土宇惟河公廓開國之忠良惟河公保祐國之姦慝惟河公殄摧誠靡幽而不應澤罔微而不該得一以靈不其宜哉汾陽王深惟據我屢崇昭報奉牲玉不敢愛也致精意未嘗怠也每蠲吉歷選自郊徂宮奠于堂戶之間則神之昆弟具在酬於屋漏之內則神之伉儷攸居文墨相望男女無別公曰神人之主也禮政之源也人有上下則禮有內外之制人所謂否神其可考盍築館於後以安靈匹乃咨於副元帥副使太子賓客御史大夫知河中府事崔公寓量功命日而後役於河西縣大夫李開不徵貨財不殫日力曾不踰月克復於成大厦耽耽鬱其特起內寢既立神儀穆然於是齒危髮禿之老王端等進而稱曰大河浩蕩弊邑之望也自公杖鉞三至我里靈應肸蠁未嘗或欺國之克復實始於此安天步於臲卼定人心於驛騷大君成湯武之功賢相保桓文之業皆神之由也矧內寢棘翼今茲有成此而無述何以示後願刻樂石以彰厥庸公教曰諸公之辭固不可抑頌祗則可無推美於豫墨客聞敢繫辭曰浩浩長河中國之紀洪流激射橫制地理蒸雲吐霧薦圖效祉是曰經瀆斯為德水聖唐六葉巨猾挻災搟邑靡城如霆如雷汾陽矯矯杖鉞而來乃臨蒲坂神實先道乃亂渭水亦必胥告嗟我上相神之所勞汾陽之德溫恭正直柔嘉惟則忠勤是力秉心泉塞不測不克東西南北勦絶姦慝入登九命一人是毗出統三軍四方是維維言祐之河公降禧衆神在列曾未區別公為之節內寢攸設寢廟亭亭中外有經濯濯厥靈妃偶攸寧嗚呼祠宇焜耀中土在河之滸在城之下刊茲片石昭灼千古休字士美廣平人肅宗朝官左司司封員外郎刑措化成教尊義立將崇大射爰隸舊章先習禮於澤宮且觀德於方國相惟彼甲天子有司展四體而能勤事一人而匪懈固合在儀必備豈可立事無規今則乾道昭回天光臨下捨矢如破雖則射不主皮置福無中如何發彼有的法官之劾以告闕於今供司存之辭訴未聞於古制雖五等有數四侯既張而茲禮不存斯人何罪侃肅宗朝官戶部員外郎司封郎中度土居人是齊勞逸列官撫俗亦藉忠良苟適於宜寧求改作頃者三苗未偃萬人靡安遂令麗土之氓多困轉蓬之役今寰瀛有截率土無虞稽版籍而多虛望喬木而未復有司爰憂爾爵式保我人議併州閭庶節賦役眷夫白屋是啓丹誠請減職員以規省約且廢州則邑居不接聽訟實難省吏則權制可遵恤隱何害况官不必備標之典經人之告勞豈忘惠迪崟肅宗朝官主客員外郎六官分職百辟為憲式訓古典率由舊章惟甲藎臣克崇邦政行司馬之法平理萬人懸象魏之書糾綏四國必在肇修人紀董正戎行審鐃鐲之聲教疏數之度以為諸侯入覲列土朝宗序班爵之賢以觀周禮行搜狩之令來覩漢儀布夏官之典常當正月之元吉斯乃敬其所事無曠庶官儻宣父以遊寧有喟然之嘆而子牟在遠必懷多戀之心玉律惟明豫將有問金吾所見子匪良圖九穀專欲召災蘊利嗇禍克勤于儉庶曰式臧乙志在垂竿居於渭涘師計然之術恥回也之貧侈埒封君竹已遍於千畝富同季氏田不播於九穀遂使檀欒之質請擅利於膏腴耘耔之功不服勤於錢鎛府司登夫衆寡均彼有無爰度百畝之田用收什一之稅誠謂薄賦輕斂人無桀貊之謠缶米稯禾國盈流衍之積自可貢其藝極弗犯有司豈得莠爾煩言以成無妄曾謂鬻貨不如隸農俌字立言元和朝官國子司業生民異業近郊制賦以物地事將均土法惟乙何人卜居渭汭臨川垂釣未坐太公之茅緑葉翠莖且多子猷之竹况梢雲千畝棲鳳五毛豈是齊魯之桑還同漢蜀之漆頗為潤屋咸曰比侯京兆救時什一之稅奚爽乙之無理九穀之訴何為百辟咸乂六卿分職各帥其屬欽乃攸司既立司馬之名亦稱祈父之任相維彼甲是掌邦政率由舊典匪曰曠官將選賢以興功或制軍而轄禁以忠王國實代天工九伐蕆陳且觀其坐作三陽告始克施乎赦令將懸象魏猶秉於周禮不忘舊章載書於魯策既浹日而斂率何法乖且謀之用臧孰云勿許能守爾職夏官未失於先庚不及而言中尉固慚於後動齊梧貞元中自給事中除御史中丞東都留守獻歲布德㣥物俱新懸法施令衆官畢舉是遵往躅無昧彞憲惟甲位當司馬職在平人載舉舊章不忘所守恪言新歲爰率其徒因天地之始和擇官司之令典懸之象魏表一人之有法徇以木鐸俾萬方之知禁將使國風所逮丕冒海隅王化所流率先京邑斯乃行古之道得今之宜進不侵官退非越禮奚金吾之妄糾在古典而斯昧無亦禁衛是恤而於職司致尤夏官既掌邦鄙未嘗學矣周禮盡在吾子何所問焉度田居民因地制賦出不過籍汔可小康貢之無藝是稱大桀相維乙也業乃齊民營營四時頗聞潤屋青青千畝自比封君京兆以任切都城事繁供億主家戚里無聞荻竹之奢比屋編氓何擅渭川之富俾其什一而稅均夫播植之家事雖合權道恐非古必也稅同里布征異漆林自可責以所宜誅其入觀疑九土之法賦不同科四人之事業乃殊等今乃責非其有出不以地僕雖無似竊亦有疑錫土分茅承宗主祭立嗣以嫡非才則賢若拜璧而求則佩玉寧吉惟彼侯國次當擇嗣類田氏之得文緣成愛客同無恤之在趙不墜克家既捨子以貽孫何棄今而行古雖檀弓制服知仲子之非而唐棣與權亦宣尼之訓請從宗計無信或非
