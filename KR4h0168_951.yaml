body:
  text: 原夫井之為德以不變而居貞既成形於方載亦列象於圓清潤下之功爰修之於六府習坎之義則配之於五行惟斯井之肇作實伯益之所營爾乃玉甃爰起銀牀斯立窺尋丈以惟深覘清泉之始及青梧下映泛桂葉以搖揚素綆高懸弄銀瓶之出入光洞徹而緣止影飛翻而為汲且其盥之取新渫之去故體清通之惟審知應物而無忤居上善而且平挹清規而可遇庶乎鸞鏡熒煌而可比鳳池皎潔而為喻別有前臨紫殿俯映丹墀上棟下宇繡栭文楣意者豈非至尊尚恬澹而取諸動善時而已哉懿夫粉署清華飛禽載止對仙郎之章奏近尚書之劒履竊自羞嫫母之陋姿鑒清瀾之眩美若夫氣之為物也寥廓無象沖虛自然激混混而為地蔚蒼蒼而稱天其下降也日月星辰著矣其上騰也山河樹木生焉虹樓隱於雲際蜃閣浮於海邊聖人遇之而為主道士餐之而得仙紛葢松而吐霧擁鑪柏而生煙若乃變化千體包含萬類結慶呈祥敷榮表瑞翳春榮而綺靡籠秋壑而枯顇噴朝霞而共丹騰晚靄而孤翠觸途無限遇物相因扶心體而為命運手足而為身九關用而殯魄六腑通而谷神朦朧虎岫晻曖龍津重輝贊於太子五色彰於異人出舂陵而表貺度函關而浮真既霏微以薈蔚復蕭索而輪囷象圓光於淺暉搖碎影於微塵爾其士冖䂞籥無窮塤篪異態乍舒乍卷如顯如晦罕養懸匏虛驚衆籟或散漫而成羅綺或昭彰而為黼黻昏曉樹而沉沉羃遙峰而靄靄至若噓精吸液含風吐雲拂鮑肆而均臭凝麝幃而共芬和妝臺之豔粉雜舞閣之輕裙汛蘇皋而鬱郁襲桃徑之氛氳有色可見無聲可聞助鸎杯之桂馥添鳳俎之蘭薰肸蠁難名睢盱不測隨致動靜與時消息聚散無定盈虧獨全其纖也入於有象其大也出於無邊憑太虛而作宅終造化而為年隨之不見其後迎之不見其前惟恍惟惚元之又元吾不知其誰氏之子象帝之先先王有作班氏敘其家風遠代無違韋孟陳其祖德是知本枝可重宗葉難輕丁冑望素高勳庸夙著金柯玉葉冠葢之望攸崇青社白茅諸侯之業斯大上林春至花萼均芳下澤秋歸鴻鴈齊列既而風枝不靜星琯屢移何劭承家泫然流涕桓元襲爵悲不自勝苟懷揖讓之風遂有逋逃之迹昔延陵去國令範猶存太伯辭周遺芳未泯必若情深讓弟義等脫身請封韋氏之次男無虧太伯之高節唯賢是舉慎擇為先明試以言得失斯在惟景策名歲貢待扣禮闈將登甲乙之科翻速主君之戾何則帖茲學圃既謝專經策以詞林仍非善中遂使仙臺清鏡徒訝於才難幽谷遷鶯空悲於歲晚顧惟州將豈曰能官據條雖未成分於是恐非公薦景當冒貢請用遠郊之禮守舉非才宜從削地之罰富國強兵允資重種闢土殖穀必俟良農雖云因地之利無爽用天之道惟甲克勤稼穡受任軍屯候正歲之布和乃宣乃理及王瓜之生夏或錢或鎛遂使其茨如梁必周戊已之地其比如櫛不忝京坻之詩眷此屯功宜蒙上賞誰聞興利之舉翻招厭勝之訟然而六甲紀則剛柔異體五行統歲禳厭分區苟獲賴於柔嘉固無嫌於法術況丁也為役職此開渠雖決泄之誠勞豈倉黃而妄告仰稽古訓甲則無辜旁酌人情乙宜致詰必若事非政要術異農祥請遵持斧之繩勿恕薄言之訴國有謨訓人唯定居非周封之井疆異秦制之阡陌乙有嘉樹森乎甫田上含煙飇下潤溝洫擢本抽幹豈彭澤之五柳負陰向陽等江陵之千橘此乃是地良美繇條草木有滋稼穡看施饁野之勞益我公私見滿如坻之積縱使㣥木聳秀何妨百穀用成今則不廢藨蓘況乎實在疆埸里人之讓未知相土之宜司寇之局須寘贖金之名景家非綿上室異毀焚初聞問馬之辭旋至歌龍之斃將救餘燼昧元瑜之舊林言訪遺煨異僖父之前室望人矜茲逝者歌彼蕩乎亦既聚財更其所傷弔生以禮因不違於賵贈哀死及屍亦何儀於贓物誠以魯策求之宋妻邱既吾無閒然預今得為義矣夫禮樂相成人之有生物歸乎理感在乎聲聲之所起其應多矣既聞鄭以戒荒亦稱韶於盡美至若詩陳鐘鼓禮奏笙簧音懷律呂韻合宮商或嬋娟而如絕或窈窕而復揚將曲盡而逾妙遇風吹而更長潛鱗競躍儀鳳來翔嘉此聲之可貴樂吾君之奉常則有思婦傷離芳年屢換織素寒早調砧夜半垤鳴鸛而初合砌吟蛩而正亂何此聲之可悲使空閨之浩嘆況復金徽遠奏一作金微遠戊玉律窮秋陰風烈烈邊樹修修聽胡笳之互動看隴水之分流何此聲之可怨使征客之含愁亦有遁世無悶閒居棲託坐嘯竹林忘形菌一作苔閣憐宿鳥之喧藪愛飛泉而噴壑何此聲之獨殊使幽人之為樂夫意存則言發言發則聲來順之則喜逆之則哀是以文君聽琴而悅矣子期聞笛而悲哉何悲歡之易感使衆人之難裁客有吟者澘然下淚吾將不言安知所謂退失路而流落進無媒而自致思巫峽之猿啼聞洞庭之葉墜易曰同聲相應同氣相求儻知音之見許期厚德而相酬客有憑崇高吹玉簫挾飛仙兮遊遨嘗訪於丹邱之阿附鳳翼而飄颻一日過昇州躡層樓望三山豁雙眸乃見其鍾山龍蟠石城虎踞爰有崇臺中焉而處其高也莫窺幾仞其廣也不知幾許上有琳琅之竿林林兮參穹窿下有堅貞之璞粲粲兮鎮后土左雨華兮為之翼右烏臺兮為之輔銅雀雖高兮焉可與之侔龍虎何壯兮莫能與之伍百靈見之而辟易六丁守之而呵護此其為金陵帝王之地鳳凰來集之所也維時煙銷霧斂晴旭初升萬象森列衆露畢呈長江靜其如練天籟寂其不鳴方將振塵躅陟崔嵬舒玉管據崇臺訪謫仙之遺咏拂龜龍之莓苔歎鳳凰之已去徒撫掌而徘徊嗚呼噫嘻想靈物之雝雝兮羌太和而出世苟或遇之非時兮又奚足以稱瑞昔虞姬之繼作兮胡來儀而鳴岐表雍熙於一代兮斯為瑞也固宜偉茲臺之致祥兮盎太和而闢翕下必有其丹泉兮上必具夫玉食地博厚而鍾靈兮水甘馨而泌汩顧葳蕤而來翔兮繽五綵而翼翼覽德輝而一鳴兮應元嘉之寶歷宜茲臺之擅美兮歷千祀而不易今也不往終焉悒悒於是攀鳳棲涉丹池追故跡訪前知盼遺蹤其忽恍眩寒璞而煙霏景不可乎復得益感歎而忘歸客乃脫帽解襟獨倚臺楹縱舒玉吹聲淩太清聲未既碧穹如洗俄而有仙子駕彩鳳於雲衢下斯臺而暫止客視而驚悚然懼矍然興屏氣斂容稽首稱臣踧踖前詣請問其因仙曰方今天命以仁文運一新制禮作樂多士彬彬立廟堂者乃瑞時之丹鳳居翰苑者乃表祥之白麟雖高蹈而遠舉亦徵用而超伸際雲龍於風虎總附翼而攀鱗故其進也優游乎巖廊之上其退也笑傲於山澤之濱惟聲和而氣和俾嘉瑞之畢臻吾天帝之孫文昌之賓觀子之登崇高吹玉簫振嫋嫋之清聲協嗈嗈之和音律高而調婉克享於天心吾其駕鳳以征達聰以聽進汝為席上之珍登汝為天府之琛客聞其語領然而悟敬再拜而稱謝仙子攜客跨鳳而去對五材遞用前聖因而設刑四象代興往賢則而為治所以明弼五教敬成三德為安上之鞭策作御下之隄防粉黛帝猷脂澤王化故軒皇六禁設言而不違媯帝三居畫象而無犯既而末代多僻亂政滋章網密凝脂文深剌骨威逾夏日苦烈秋荼或酷甚棄灰或刑深盜土遂使棘林之下鬼哭呈祆函谷之前寃魂表沴雖漢文易肌膚之痛孝景減鞭扑之科竟未革弊除煩焉能救焚拯溺方今膺期千載保業重光表至德以泣辜布深仁於解網敬刑若祭重獄如傷誠宜削季葉之慘科襲至安之有美自可駕三皇而騑五帝超千古而籠萬方欲廢彼黃沙赦茲丹筆眷言斯理蒙竊惑焉何者德刑遞施寬猛相濟是知明君至乂不獨任於詩書哲后欽明豈專行於禮樂此乃殺以止殺刑期無刑帛丿糸絕代而不渝邁終古而無替愚謂擯蒼鷹之酷吏棄乳虎之屠伯然後舉皋陶而作士命隨會以守官則內盜自奔不仁斯遠自然防萌之術無闕削觚之化有餘豈止封府之赦不施遺冠之宥無設用捨之義夫何足疑且律之興其來尚矣葢三光列景法星麗於天文五位成形習坎彰於易象爰洎貳負初沿維縶之科降及四凶始受殛流之罰及庭堅翼舜獄律遂此陶情蕭相主劉甲令於焉刻意至如鋸鑽之絕班固書而可知肉刑之興孫卿論而已備謹對位列千官藻火陳輕重之制禮明五服麻絰分喪紀之儀苟失其中章程是紊廖貞門承累葉坐登朝散之榮俞仲痛切連枝行招墨綬之問潘仁之遭譴累將復位而無階子路之寡兄弟欲除喪而未忍與其易而寧戚稍越周公之經當其疾而未遑猶臥大夫之簀下烏臺而遽糾如申避馬之威舉丹筆以緩刑似得求羊之術與奪合理法有固於隄防刑罰失中人無措其手足縱其床簀不易見譏非帛之書服制將逾豈累絃歌之化言規小過欲寘深文令長臨人未庶幾於蠶蠏鷹鸇逐雀亦何問於狐狸聽子輿之言闕罪不假於科繩事終期於改正仲之無罪小鮮之責太深貞亦何辜大理之折斯當樂之容舞為則導於情崇於德製其衣而五方咸備頌其序而八卦不忒然後體利貞而疾徐有度法行健而循環不窮數盈而剛柔匪雜綴短而明德將融初配六以迴旋狀馬行於此及變三而成列如龍化其中信乾坤之易應金石之變通於是步日而前因風而舉乘飄颺而婆娑雜沓映照燭而長短合序既順之而不却亦明之而有所則離巽之不差豈進退之無旅則有應水之理象木之規謺若奔溜散如繁絲五色相宣謂神龜初負八音咸奏知靈鳳來儀震也坎也何斯違斯既以悅隨企其遵令象山而乍結乍凝依澤而若游若泳狀巍巍之德仰之彌高節蕩蕩之音於斯為盛是知艮兌之為美故必隨而不競是故聖人窮樂之變制舞惟新效知來而藏往故有要而有倫非干戚之前設若鈞天之所陳至若卿雲共臨瑞日同霽乍離乍合若翔若滯隨方辨色非前代之舊章應節成文實我唐之新製是知舞以適道無頗樂以審政同和觀象取則異乎側弁峨峨則斯舞也實百代之不訛望之如雲聖人為君克敷厥德以嶷鴻勳大庇黎元始躬耕而載籍旁求俊彥終訪道而崇文於穆我皇乃神乃聖開四目以達聰掩八荒而布政㣥龍順啟沃之旨多士奉疇咨之命大哉邈乎於斯為盛爾其庶士冢宰百寮近臣大夫師長之旅版築巖穴之人舉爾所知乃寸長無捨襃然而至雖片善必申於是朝無遺逸野絕沉淪激昂於鳳闕之下鼓舞於鴻漸之辰且聖澤昭宣惟聞有典有則天威咫尺孰謂不躬不親伊何闕四字百寮增肅仰清問而矯首拜昌言而俯伏烝哉髦士綠驥方呈於長衢賁于邱園白駒自來於空谷亦既贊休命亦既陳厥成將獻可而替否必覃思而研精意彼逸足侔乎先鳴錯翹薪以割楚聊擢桂而敷榮懿乎文物明明威儀赫赫搖綵仗於雲路闢禁闈於廣陌雖知人不易實在乎區分而天鑒孔明自彰乎慎擇夫然才為世出才應時多以才從政兮國有恒典以才為輔兮人知匪他於以代天工則百寮矜式於以掌邦憲則庶事協和亦自此立功亦自此致理邁前王之躅垂可大之紀維翼翼之聖朝務濟濟之多士豈止夫堯吁舜咨可疇德而巳哉南山之下兮無人之境力穡此中兮均夫躁靜勞則不憚既寒耕而熱耘慶有所歸忽異畝而同穎莖駢惜芃芃之色秀合垂䔿䔿之影此焉觀瑞亦祗以異比於木乃連理之祥在於人葢同心之義粰已聞於二米莖乃殊於九穗豈非德之能及實聖朝之所致爰考休徵豐年是憑麥兩歧而能匹茅三脊而徒稱固神倉之可貯期郊廟之以升欲薦堯階且聞挃挃之穫將登禹膳遂入烰烰之烝天道元默瑞以表德豈無沃土而光於我家豈無異方而祚此王國不有嘉生孰謂賓榮友朋之心因取興於連茹兄弟之樂遂作戒於分荊佇聞唐叔之獻頌我后之昇平夫陽烏中而則謝陰兔望而斯蝕諒天道之常理豈人情之能測何此器之知機體變通之消息其形也菲陋任其淳素之姿其質也嶔欹無假丹青之飾平而則正滿而斯側不平不滿無窮無極夫盛衰共貫倚伏多途或始吉而終否或前榮而後枯纔聞棲越遽見亡吳不知戒其盈溢空有歎於姑蘇是知高而不危則治操而有求則競見握髮以存誠慮宵衣而致命老氏貴其善建大易崇其積慶殷湯鏤几以為虞孔甲鐫盤而自鏡爾其冥豫不止懷足無厭釁成山嶽禍起微纖愚者已然而不見智者未兆而斯瞻聖人損之而又損君子謙之而更謙大禹惟聖每殷勤於菲食惟堯則哲終眷戀於茅簷然而默默如存隆隆自絕天且不能固西北之壞地且不能補東南之缺天地尚不能久矧人道之不滅勒茲器以為箴庶作鑒於來哲緬窺皇始傾聽巢風時儀樸略化跡冥蒙結繩云謝徽章漸通乃服牛而乘馬爰斲木而觀蓬故聖人因象以制器隨物而興功北斗在天察四時而行度司南在地表萬乘之光融爾其法制奇詭神妙無窮見其指而皆知其向覩其外而莫測其中輪須藉乎奚子妙乃發於周公觀其作也扃關脈湊衡樞星設煙縈電轉鬼聚神滅離朱目亂計然思絕公輸服其心工王爾慚其手拙雖詞給而口敏終難得而縷說至如帝容順動王塗允泰二月東巡萬國南會羽衞出而天動笳鼓鳴而雷磕司南於是備屬車引行斾候薰風而進指仰卿雲而承葢超搖光景之中縹緲煙霞之外同夫越鳥常有意於南枝異彼魯人竟無情於殿最惟皇明之遠矚驅八駿以遐舉既訪道於襄城亦尋仙於海渚豈須老馬之智寧藉小童之語賴我司南不迷其所伊司南之用溥逢國道之昌平就日月於天路聞簫韶於玉京常使朝朝承北闕何辭歲歲指南行舜為君兮禹為相七政齊兮八風暢備禮容兮和樂章同車書兮一度量龍樓恭巳則無為以垂衣鸞蹕豫遊或有時而端望伊大章之攸作冠輪輿而為上其始也委材質於資斧授規模於梓匠其終也援桴鼓於天街動輗軏於霜仗乃畫界疏疆正位辨方候之以節步先之以啟行象雷而鳴曾不聞其霆擊如蓬之轉終不見其飄揚遵彼坦途違茲險阻勿忘情而習靜殊不知其處所類智者之行藏同至人之默語歷代傳寶鼓車逾好有異人謀宛同靈造行不由徑動能合道向使貴賤混并高卑不問應無迷遠之疾詎有窮途之患則是大章為器國容之利指方位於遙空數田里於厚地節六鼓之以鼉駭首五輅而鱗次望塵不及初非千里之遙聽響爭先終欣一日而至夫然則可以式序秩宗發揮樂府扶持輦轂隱翳干羽以家刑國何一二之能談自邇陟遐雖萬億而可數墨客何為來攀桂枝懸鼓待鳴仰淳淳之風俗剋車就駕識穆穆之威儀伊可大而可久諒斯焉而取斯伊二儀之陶甄覽萬物之生長為隨方而可見獨不測乎茲響同夫道之無質每憑虛而起象既不覩其洪纖亦罕知其尺丈爾乃依聲於發有待而生觸萬竅而皆異會五音而共成隨人心之哀樂因感召而重輕至於驚激萬變高卑千轉臨牝谷而悲多因歸風而去遠感華鐘於霜曙思孤鴈於秋晚觸物類以成態託空虛以運形爾其細也草蟲鳴於潛穴至其大也震雷作於天庭離朱拭目而不見師曠清耳而可聽爾其響發乎器必聲有假故器有盈虛而響為高下隨之則不可究及之如或可寫信造化之自然亦焉知其為者乃有厭處雞㣥窮棲海濱垂六翮而未舉鳴九皋而不聞願託響於星驥希可徹於高雲造化不測長空浩然生於未有物莫能先故其走目遐甸幽不可見流聽高冥漸不可聽既從天而共色又鑒水而同形若乃變化隨時憑乎動止韶空春遍火雲夏起流電奪目殷雷激耳立繞樹之千巖廣長風之萬里驚飇既臨彩虹破陰雨盡天遠雲空澗深百尺樓頭見朝陽之赫奕九重宮裏聞眾鳥之喧林何高秋之遼迥至窮冬而不極感在物之捐華益窮人之歎息惟長空之愛此終生靈兮動植歌和光以同塵每因空以悟色至人恬澹既將元之又元小智多非豈斯文之果測洪惟漢后有事郊禋感流光之委照爰拜賜於上神初自竹宮覩殊祥之溢目俄低玉佩方致敬而俯身有以見感而必應孰謂其尊而不親徒想夫寰宇肅清齋庭夜敞辛日惟吉明神是饗德馨而祀事精慤福降而禎祥歸往彼靈輝之自天若有答於吉蠲下雲路而瞥爾照祠壇而炯然冥感而來狀如虹之炳耀齋莊前致配明火以昭宣武皇自以為備物展禮儲精告虔苟降鑒之不昧宜受賜於上元仰而望之初奪目以爛爛俯而見也且鞠躬以拳拳若然者豈不以蒼璧儼陳圜丘宿設帝心精一祀物豐潔天瑞聖而為光委靈壇而不滅不然則可以煌煌熒熒發自杳冥於以表異於焉效靈臨爟火以助耀照俎豆而分形者乎跡彼光臨實惟冥報宜望拜以俯僂表至精而懇到是知君德允臧天道孔彰崇嚴祀而神降之吉潔齋心而物效其祥初電烻以散色忽星流以耀芒降自彼天豈慙於紫氣不資於水且異於榮光國家德邁炎靈時稱玉燭擁神光而先敬修祀禮而將續有客觀光歎美不足何待時而就列庶餘光之可矚粵若盛唐勃承天光禮樂克備典謨允臧固以轥轢軒昊跨躡堯湯豚魚信行於㝢縣鵷鷺才擢於巖廊至於我后招賁林藪朗金鏡於南面運璿樞於北斗總四靈為禎祥以萬物為芻狗將以天之靈命纘乎已躬國之盛烈在祀與戎乃詢訪太史總攬英雄金門曉闢御路橫通隔歲梅花氛氳於帳殿迎春楊柳搖曳於離宮戈橫鐵騎旗掣長虹謺靈鼓於流水引繁笳於朔風威單于而過代北祠后土而幸河東故致虔誠練吉日甸師清野宗伯奉秩端旒垂綖左輔右弼修五禮之大道酌千靈之故實綵幣藻耀層壇崷崪黃琮展前以備陳白茅有藉而閒出元酒式降以尚本瑞珪不琢而貴質繁纓藻帶燦爛於祭容孤竹雲和鏗鏘於聲律鬱人獻爵司干授器據青野之雕阜肅黃祇之神位鼎氣歊雲神光燭地魏珠映天子之輦汾鴈入大夫之贄薰風偃草以浹洽遲景暄空而明媚河圖所以無隱天寶由其不祕於是湛露沕潏㣥后徜徉接武委贄述職勤王神具醉止降福稿穰包六合而布化橫萬乘以騰芳吾君終以守謙靜重賢良其儀不忒其言有章豈比夫魯蜡有乖仲尼聞而發歎漢祀多僻匡衡陳其用祥顧惟不才宅生帝道願候云亭之事素懷封禪之草儻中人之見談賦上林之振藻當㣥物之具陳唯玉案而是珍青瑩自乎天產追琢資於匠人呈形而色有溫潤成器而道無緇磷由是功倍几杖質殊琳珉當施設之不倦幸發揮而有因顧瞻之時愛苔色之增麗拂拭之後覺花文之轉新振彼高價膺茲美名潔其內而冰徹虛其中而砥平嘉韞櫝之資忽雕鐫而有立以出藍之色作治瑩而斯成美乎充玩好守堅貞小大合度高卑有程諒當人而可託信在物之惟精厠彼華筵雲母之屏邊色麗置乎虛室瑠璃之牕下寒生玉貌宜臨丹心可瑩成其高而有足歷其遠而有脛將以表青骨傳素心既捧執以來此亦保持而在今甘寢之時虛色而空憐角枕閒居之處凝光而但對瑤琴是宜君子之好用資端操質美而微瑕莫容色淨而纖埃不到況能坦蕩而為物以俟依憑而寄傲伊錦繡之段誠可見投此瓊玖之珍是宜相報平居之時中心甚夷當卓爾而空承牘忽藏諸而遂映簾帷見賢之眼惟永日而觀矣比德之心可終朝而用之則知瑰麗之狀物無以尚欲隨時而共美因體物而先唱空附識真之人將一鑒其瀏亮不見物字官韻祀之嚴者饗帝德之盛者降神不勵精孰謂福之自己非表異曷知天實無親武皇卜郊以元吉祈靈於上辛密命始傳光則絪縕未感齋宮爰拜神其肸蠁有因葢以穆爾精勤凝然存想屬屬乎蒼璧既奠煌煌乎太壇攸仰委佩盡飾庶無譁以端莊秉圭展儀闕二十字彼電破乎祥煙逮闇之時熉燭而明爛矣遙望之處拜起而容肅然豈不以配合崇高昭陳宿設圜丘之上將候其耿光竹宮之中以備其齋潔既恍惚而有見竟超遙而未絕或左或右通幽洞冥照灼兮疑分輝於畫燭焜煌兮乍聯影於低星所以彰有德赫炳靈實見祠祈周流福庭望神之休惟一人有慶主日之際必上帝是聽故天降德祥人窺其奧至德而感豈元邈之不臻至誠而祈豈昭彰之不報首茲祀事實在陽方望拜雖同乎手拜神光且異乎蕭光人皆見之孰不仰而祇慄夜則艾矣諒惟遠之馨香殷雉雊而稱異魯郊牛而用傷皆祈報之瑣細非昊穹之降康豈比夫神祠太乙之靈樂飲歌童之曲雖望之而如在懼敬之而不足漢后之虔恭也如此故景光而下燭
