front:
  text: 全唐文欽定全唐文卷八百七十四陳致雍二
  hash: sha256:c2b7a886222d24d418ca920a25e892820bf326acdff8bc6e860e9fdc339d6579
body:
  text: 右竊以祝嘏之説已著開元禮中升降兩義不同大祝云敢昭告小祝云昭告諒其損益盡在往典今高博士請改前經未敢為允既尊其為師待以不臣豈可抑以祀典援其公爵者或商容呂迎逸免也武王式閭維師尚父尚當一時君臣亦不北面為禮況顏子德冠師門道光亞聖千古景行一人而已開元禮太宗纂之高宗述之元宗定之垂為永則豈合改作謹議右臣先據太常博士高遠奏改文宣王配座顏子亠兊國公祝文昭告字援小祀例為致祭高遠意者為與武王祝稱不等欲不敢御署蓋至尊降屈行拜敬之禮殊不知中祀云昭告亦進御署署訖皇帝不拜今既升文宣王為大祀亠兊國公即便是中祀而況顏子德冠孔門徇齊聖智佐食則絶席居前侑酳乃服衮在上既禮容以相稱何貶拂而太懸武成王祝文開元天寶中亦云昭告進署不拜至正元年兵部員外郎李紓奏節文云太公述作止於六韜勳業形於一代豈可擬文宣王之盛哉遂改損昭告字云致祭不進御署今者國朝以其拯民靖亂崇德報功再奉嚴禋重搆廟宇光靈顯被聖澤優褒聖典既修舊章宜正臣卻請升武成王祝文仍舊歸昭告字國公則不合更貶祝仍準禮大祝進御署拜中祝御署不拜夫禮者別尊卑名輕重奉常沿酌折衷後亦何必矯飾間辭蕪穢簡牘穿鑿往事紊亂彞章視茲二途指歸一揆謹具奏聞皇太弟繼統儲宮不得申其喪紀只服緦麻三月服三日公除按喪服傳曰何以緦也與尊者為體不敢私其親今據禮經則是子承父之禮主鬯宗廟承名器之重不敢申私親之服若服則是廢尊者之祭謂於死於宮中者三月不舉祭是也又云君之所不服子亦不敢服開元禮引喪服比公子為其母練冠麻衣纒緣既葬而除練冠則白練布為素冠麻衣纒緣今之白練布為衣裳纒緣其裳也近代庶俗多用白布襴衫非先王喪紀之法服準令文三日成服朝晡五哭止具成居處飲食哭位則從其心喪至葬期反服既葬除服禮也臣聞王者之孝莫大乎尊祖有國之儀必先於崇祀採質文之損益正宗廟之祧遷載在前經垂為重事國家中興土運再造皇猷雖殷薦之禮孔昭而正名之典未舉王良臣因崇清廟遂上封章臣備位明庭攝官禮寺祗承末議思盡寡聞謹具條奏如後禮云天子始受命諸侯始受封為太祖之廟國初以景皇帝始封唐公慶延奕葉高祖雖撥亂以定天下其實因唐以為有國之號改尊景皇帝為太祖然前代諸儒亦議者非一愚臣竊以謂高祖神堯皇帝頃在隋季民實墜塗而濡足救人乘時啓運天命允集歷數在躬豐功厚德比崇三代洎姦凶僭逆皇祚中微九有之民猶思唐德本枝百世貽厥孫謀故烈祖高皇帝再造丕基光宅大寶升元初以高祖有克定之業實受命之君尊居太祖之位是為不易之典酌中考古允得其宜太宗文武皇帝定策濟時戡難立極惠周四海道冠百王烈祖考高皇帝仗義中興應期繼統功逾嗣夏化洽重熙以二聖有大造於人故兩室居不遷之地自餘親親之廟存者四焉夫承祧繼統則降其私親尊祖敬宗則存其大義歷代已降何莫由斯是以先晉元之中興而南頓令與琅琊恭王不祔太廟於春秋之義國君即位未逾年而薨者尚不祔太廟又神龍中義宗孝敬皇帝以儲后追尊入祔太廟尋從輿論亦別創嚴祠而況四親位匪君臨地非正統高皇帝既承太宗之後所謂以義斷恩敘之昭穆未合典故伏見保大初給事中朱鞏著作郎徐鉉奏引秦漢故事請定宗孝靜皇帝成宗孝平王惠宗孝安王慶宗孝德皇帝宜準例於潛龍故地別創新祠以四時而祭既協尊祖之義別為祭禰之宗其太廟昭穆請自昭宗已上未祧遷神主祔並及請遷義祖神主於祠堂就飾廟庭別建嘉號如德明興聖二廟之比者準其年十二月敕文我國家務存孝敬理在不祧㣥官但據典經故禮當迭毀豫不敢違先皇之命不敢忘義祖之恩是降敕書期同闕二字勞於寤寐誠亦未安何者先皇御札尚新言猶在耳儒者已微典實議論紛紜苟歲月既徂德音漸遠畢朕之世雖云厥心不回後代之人且憂其意可奪如是則隳先皇之孝敬豈無時焉祧義祖之神靈信有日矣誰當執咎豫用悔然欲其求萬世之永安未若割一朝之罔極奉於不祧之地冀絶親盡之言嚴恭無虧告享於舊上匪違於先旨下何傷於孝心咨爾宗親當體朕意宜委所司於祠堂別建後殿安置塑像其前殿奉遷祖主以居其寢庭制度祭享之禮一如舊儀永為不祧之廟者所為因時適變以公滅私載考聖謀實符命議雖義祖之廟已正於典禮而四親之主合同於漢晉是為師古人何間言其四親廟臣請依朱鞏等原奏施行或以潛龍故地稍遠恐虧嚴敬只依京都建祀於禮無愆其義祖祠建請準元敕處分伏以懿宗僖宗昭宗三室地未當遷禮宜祔廟請依昭穆以奉蒸嘗五時享焉伏以高宗至宣宗十四室雖親盡當毀而禘祫之祭合敘昭穆今請各造神主居於夾室右臣致雍文慚學禮業昧通經忝在奉常恭承議問須陳管見敢副宸衷然而宗廟居尊祀事為大必資時彥共啓詢謀伏請更於通班各徵議狀然後酌臣可否繫在睿明謹具奏聞右臣伏見太廟行禮百官有緦麻服已上並不預祭謹按禮經諸侯絶旁親之服不敢廢大宗之祭謂官未葬者欲人吉凶不相黷也魏晉已降變行權制緦麻已上假內謂之喪服假滿即吉謂之公除今既葬公除廢葬非也彼公除者使人各得其祭苟私祭不廢則公除無嫌請準開元七年正月七日吏部奏依江左當時知禮者虞談殷仲堪等議相承等行之久矣凡有百執事齋郎室長禮生已來並擬請申詳前令行公除助祭之禮準祠部牒據禮賓使何延錫狀為元應王副嶁公各授官封册所服冠裳及女人有塑像同座共享兼畫僚屬等乞賜改正移易庶合典禮者右檢封祠之制古來有功於民者則祀之無繢容飾貌之狀自漢魏以降所在州郡有神祠塑像衣冠人物有夫婦共座配食之者未知其所由來也於禮無文雖云配祔宗廟鬼神孝子感親之所今元應王遺迹置祠副嶁公或山川之神各有受封爵有受封爵有其廟宇之制殿堂之上左右列侍衛臣僕像人居然如其諸侯外朝正寢之式春秋祀享準令文皆州縣供其牢醴之物長官拜祭祀以夫婦配食之義不同今未委準禮移婦人共座居別座其王各依準衣服令等降飾以衮冕九章之服婦人無爵衣褕狄九章於禮為中仍請差工人就禮院畫衣服章數制度施行者右檢今月十四日冬享太廟伏見攝太尉及亞獻官御署祝版到廟先於殿前拜謂之參神如家人之禮竊以夙興行事裸鬯之後神靈降止然後方行拜敬之禮今未見其所祭而於致齋之內造次撩覿頗甚褻慢事須舉明自今已後便釐革者據太廟置令王嵩申凡遇時享齋郎薦獻皆是每人兩番或三番不免紛紜執事或有差互獻官寧免淹延舊例簠簋籩豆樽罍爵斚並是未明行事之前烹牲取熟之後夙設㽅鉶和羹與三牲俎等是裸爵之後獻薦今欲以三牲俎及毛血準舊例薦獻外其膟膋並太羹和羹所司可商議準果菹復等享前一時先設載量變禮甚合通規不惟稍簡於排諧兼得免彰於喧糅奉判禮院商量者右致雍竊詳郊天以血腥為始宗廟以裸饋為先既裸奠然後薦熟今欲和羹之鉶與膟膋夙設求其禮情不近於義實為未可謹議夫功成事卒身歿名垂平昔茂勳足以追寵某人資性忠果率禦有方久捍邊城適安堡聚復於布化順惠克孚惟其勳臣賴此統牧天不憗遺喪我元良卜竁有期論行可著功高盛烈政和安民按諡法云有功安民曰烈夫君子誕敷厥德垂名於世追美重終諡而有贈某人詞源濬川德基崇嶽出光帝載式冠朝端服爵增華言行有範爰自紫垣演誥潤色皇猷明懿孔彰博聞是謂按諡法云博聞多能曰獻夫實以誄華名由諡易既敷前烈可述來芳某人襟抱融明風標秀逸文為士表信在已先端默持謙恭仁允惠請按諡法云恭仁鮮言曰靜夫贈諡厚賢克敷君惠平生懿行可得而書某人蘊性純和秉德方直業通儒術學任人師宏益姬風儀型國胄敷受之聲不絶典禮之訓有倫請按諡法云典禮不愆曰載夫臣下竭力盡瘁立功於國國安君寧能事畢矣某人器惟正亮性亦融明首贊宏謀力荷王室而自剖符錫壤名冠列藩茂績洪勳惇史備載易名之典謀諡於公卿曰思慮謀遠謂之翼夫逸人遺範秀士流芳須示易名用旌高蹈處士某人懷真蘊道嘉遁雲阿潄石枕流以激濁世人尚高節無以踰焉謀於闕好曰正白先生諡法云清白守節曰正涅而不緇曰白斯之謂與夫服勤官次景行有彰終身則敬忌不忘請誄而褒崇匪吝某人端明立身公正楷俗踐揚名級暉映士林適自入奉承華毗荷儲季克宣令範廉正有稱謹按諡法云廉直經正曰敬夫啓殯告諡德行有褒追美旌功於焉斯著某人度量宏達秉直在躬首自贊職銓衡不遺器任精裁人物疏附允中按諡法云附不黨疏不遺是曰平也夫生不可奪節死不可奪名身歿名垂旌大厥美某人忠鯁維亮風概愈高端委諫垣民宗盛貫極言纍進規正宏綱是謂直臣合旌遺烈按諡法云中正無邪曰質伏以李萬安器度不羈雄豪獨處義勇兼著猛相須嘗毗荷以親賢率衛兵而整肅纍刺臨於列郡治封部以乂寧在昔邊淮之兵連營棄甲惟黃之郡嬰城不拔卻敵之力萬安有功謹按諡法決勝壯敵曰毅伏以號以表功諡以表德慎重厥美君子有終故檢校太保威衛將軍前和州刺史馬洪勇於戰鬬鬱有壯聲動必擒凶舉無遺策被堅執鋭率居行陳之先略地攻城每在衆人之上一麾臨郡嘉績有聞今也身歿名垂請誄匪怪引義為用厥諡彰矣按諡法率義供用曰勇其馬洪請諡曰勇謹議伏以見諡知行終身有稱用旌將帥之臣可著簡編之美馬洪壯於戰鬬知勇亟聞考狀昭詳克揚前烈平霍邱之賊縛周令殷於陳前解彭城之圍擒何仁達於馬上數其軍實夥矣前功今也云亡噫然可惜致果殺敵厥諡彰矣其馬洪請諡曰毅謹議伏以廷英承家軒冕肇迹東南少年以應聘諸侯厥名貴仕往歲以開區啓宇宰府登庸洎叔世替夷姦臣擅命廷英智能料主謂故土不可即宮首率諸侯尊事大國保全多體思寧後昆觀闕一字始終允而彌顯按諡法深慮通遠曰思謹議伏以廷英粵自東南少登貴仕忠其所奉人曰匪躬垂三十年其勤亦至洎王師恢復建壘克平被天朝之懋恩列卿等之華級只為神皋承乏侯服分憂為政理躬有足多者溘然長逝用惻宸衷考行易名敢私典故按諡法名實不爽曰質請以為諡謹議按考功送到行狀稽其往迹敬慎有終紹服爵承家時推華胄考祥視履人垂匪躬既名行以弗愆諒定質而可取按諡法純行不爽曰定名實不爽曰質今請一字諡曰某謹議據考功録到門人華歸仁記其行事蓋惟誄貴之文有司以之弗取復詢輿論無損士風紹服爵登朝檢身立事名行既無愆爽始終須示褒崇按諡法云名實不爽曰質謹議據行狀紹前後從公歲華更事匪躬奉上盡瘁勤王爰自牧守海陵化敷邑里民情稱理奏課居多議名之端歸美於行紹向來安身不競修已自保敬慎有聞始終若一按諡法小心恭慎曰僖謹議公銖祖世朔方捍藩顯功為唐名將公銖便弓馬習戎事有名父之風刺郡部近民情知良吏之節性和不損撫士寬容考終之名用以為諡按諡法寬容和平曰安其史公銖請諡曰安伏以廷浩勇而有謀臨事卻敵往歲北師衆至來攻泰州是時孤城且危外援不救廷浩能厲士卒分地捍禦鑿展深塹斷絶飛橋俟彼布陳援旗引鬬才渡中河半多陷溺不有奇略安能保全諡法臨事有斷曰勇程成起自行間纍以戰功為時名將頃在合肥頻經大敵既斬獲數多賞在上等因且奮身不顧負楯先登陷彼堅陳而被執不撓諡法恃義不撓曰勇元宗皇帝收獎前勳制辭云抗誠不撓奉主言堅命秩既崇忠義可取按諡法云恃義不撓曰勇往歲閩人怙亂賊臣不庭連結外兵竊據東境隋時為裨將分守上遊號令精明訓御嚴整善治攻具妙用戈船下延平闕一字夷之軍破橫海艛櫓之衆越寇畏襲邊郡謐寧剋敵服叛纍功多者舉一為諡謹按諡法服叛定功曰威謹議伏以凜文為已華用能進業行為士本居則撝謙因歷聘諸侯從事楚部在官凡二十任蒞職僅五十秋然而物議不喧祿位無曠矧遇季主荒怠遭時艱難絶居不疑履危無咎保全名節歸休聖朝據行狀云去夫二國不遺惡聲事夫六君不流靜讚按諡法小心恭慎曰僖去二國事六君無惡聲無流讚不謂恭慎乎其諡元凜曰僖謹議誕生將門爰有命聞寬柔得衆勤恪在公幼襲世封克荷先業以忠正奉國以孝悌承家頃奉朝恩守牧滁上民無寃滯吏絶侵漁期年有成風俗大治又據行狀云為皇城使日值北師來侵京邑騷動匡範忘食輟寢晝警宵巡仍散私財以募兵士屢陳章疏乞預征行念茲勤勞夙夜敬事按諡法勤勞無私曰順謹議伏以君子沒世而名有可稱諡以德彰克旌厥美陶敬宣貴襲公爵以文立身華貫繼登允光前烈洎師都亞尹廉正有方東吳牧民勤恤不倦寬裕順理惠和以施諡法慈仁和民曰順其陶敬宣請諡曰順謹議夫功成事卒身歿名垂平昔茂勳足以定寵故其資性忠果威略有成履行端莊聲實無替往以大憝移國偽梁僭圖金全有致討之功復安天步紹宗繼統入扈乘輿式掌兵機克總侯府而又纍仗全越出捍邊危種落安寧疆場肅靜酬勳錫壤皆踐大藩金全知皇運中興能以義諭臣僚聿來慈服諡法慈和遍服謂之順李金全請諡曰順謹議右詳門吏録到行狀楊海父祖仕郡縣為吏海始明經調選有開厥嗣傑作將臣性懷不羈雄豪獨處昔歲中州紛擾㣥盜縱橫自言力勝於人分部得衆歸命我朝爰服休恩擢在上將期門清蹕勾陳衛兵統禦得權嚴整有序用海為新安守到任知物情之所未便補纍政之所未修治隄防築壁壘蠲水害利民居勤績著聞功用可取謹按諡法施勤無私曰順請諡曰順按公正明在躬亮直秉性出光帝載位冠朝端昔者職處掖垣兼持銓綜士無濁者官盡得人踐文章之臺治紀綱之要姦吏展畏貪夫廉隅言必至公門絶私謁日者越人皆誕寇我近畿餘穢盡誅首惡未諭方生釁隙遽詔行人受命而行臨事有斷洎登宰輔允副具瞻股肱其良邦家殄瘁議名請諡敢忘至公謹按諡法廉方公正曰忠臨事有斷曰肅濠州郡團練觀察等使郭全義薨夫諡以行政行因諡立克揚茂烈追美成功全義端委和門明慎師律入司侯府出踐藩垣民政武功雖書甲令易名考行未請省曹今以啓殯有期書方仍待且據郭全義策名已來夙居戎表勇能致敵用以為褒按諡法云好力致勇曰莊謹議賓委質聖朝奮身戎表位兼隆於中尉才復任於列藩勤已居方垂仁訓俗考行誕敷其往烈飾終克保於令名行狀云以援桴鞠旅為已任以燧燔烽舉為時行然而戎候自虛懿誠未誡諡法曰武而不遂曰莊謹議又據狀賓天祐中附翼戎臣仗劍東渡委質聖朝是為知危亡之理慎思慮之謀以義而來克安永嗣諡法云思慮不爽曰原謹議侯仁遇立身端謹前後更歷職任誠節無替往歲攻圍福州之日能厲士決戰奪其城壘殺獲甚多雖功用弗成而壯勇可激按諡法武而不遂曰莊伏以陳謙少年有鄉曲之譽倜儻義烈直氣不㣥頃值東甌兵擾與其伯仲招結猛士擒賊立功拔為上將習戈船水戰之師統劍津下瀨之旅破錢塘軍威振越人界壤海圻兵不敢犯保邦庇民謙之功也近者執圭入覲再陟帥壇俾賴式遏之功永作藩垣之固天胡不憗奪我帥臣歸葬有期啓殯請諡用旌前烈敢忘至公按諡法好力致勇曰莊其陳謙伏請賜諡曰莊謹議
