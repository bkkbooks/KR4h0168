front:
  text: 全唐文欽定全唐文卷四百十八常袞九
  hash: sha256:3aa6686bf5408a00685d6da62c6da2a9dbf1097d5d2a4214e3f4f014bc19afa4
body:
  text: 臣某言內侍喬獻德至奉示答臣所讓新授階封德音宜即斷來表者臣自沐恩私不遑寢息所以上冒宸扆頓首拜章瀝懇于宴賜之辰披誠于對敭之次累煩睿覽下執愚衷竊以榮級清階本因馭貴分茅錫土必在報功冀達舊章非勤飾讓今天書再及嚴旨不移受詔兢惶撫躬震越伏自思念戰汗交馳恐負聖睿之慈當審微臣之分何者謬升非次既參二府之榮縱避今恩不減四方之責唯當勉申駑蹇恭守紀綱苟塵露之可裨雖灰壤而無恨重承嚴命不敢固辭此生甚微厚施何答無任惶懼感荷之至謹奉表陳謝以聞臣某誠惶誠恐稽首頓首謹言臣某言伏奉聖恩捨臣罪戾復臣班榮承命驚慙戴恩惶抃臣某誠歡誠懼頓首頓首伏惟乾元光天文武大聖至德孝感皇帝陛下俯寬國法大庇宗枝兄抵憲章已從輕典臣合緣坐又貸殊私雷霆解威日月迴照枯木之上殘花忽開死灰之中餘燼再爇曲承含育特荷仁慈一門感恩萬死何効謹奉表陳謝以聞臣某誠歡誠懼頓首頓首謹言臣某言伏奉五月十七日恩制授臣兄依前祕書省著作郎太子僕特恩曲降殊私下霑踴躍宛轉兢惶震越臣某誠歡誠喜頓首頓首臣自承錄用已積歲時內省微効未申涓瀝虛受祿俸有靦官榮在公無益已寬臣罪及私之幸又獎臣兄伏以頃冒朝章兄合同坐伏蒙慈貸仍進常班卑賤孤門已墜復立烝嘗獲主將廢更存寵被幽明戴感天日求之古今無臣此例雖肝膽塗地未塞前責而糞土餘生尋加後命臣授方鎮兼錫崇階兄拜宮僚又參高秩慶聯雁序澤及翾飛承命若驚何功至此愧心踧踖赧汗流離非望驟遷罔知所措殘骸萬死難以上酬無任感荷兢抃之至謹遣散將某官某奉表陳謝以聞臣某言伏奉閏五月二十四日恩制授臣兄太常丞祕書省著作郎臣待罪兢灼啟處不遑寵命薦臨驚抃失次臣某誠喜誠懼頓首頓首臣上負國恩自抵邦憲聖慈矜宥屈法全生猶許自新特虧令典惶怖殞越夙夜載馳雖荷殊渥尚憂嚴命臣兄合從連坐伏待貶官不謂元造曲成鴻私下覆在憂惕之際特授寵榮當譴斥之時忽承遷轉品秩下降清望有加復齒周行獲陪班列向非親紆聽斷俯燭幽微則骨月分竄于殊方簪裾永絕于昭代豈望更玷人次再沐朝奉罪重邱山恩過天地感戴慙赧俯伏驚惶臣竊自思惟無所上報庶將懲改前過克勵殘骸苦節誓心冀申萬一無任感恩惶懼之至臣袞言伏奉今日恩命臣亡祖故慶王文學先臣楚珪贈兵部尚書亡祖母王氏贈齊國夫人亡父故京兆府三原縣丞贈給事中先臣無為贈太子太保亡母南陽縣太君張氏贈鄧國夫人仍賜立私廟三室慈旨忽臨憫冊加等哀榮頓極感涕交流今日殺身此生分足臣袞中謝臣聞德及於人功濟於物然後光昭祖考特加追命之榮崇嚴廟室俾展奉先之敬臣授任非據尸位已淹合上叩公朝退身私第顧以未裨神化誓答皇慈尚塵青瑣之闈猶汙玉堂之署乾坤施厚歲月恩深趨進崇階坐封故郡如臣之比罕見其倫今又念及先臣旌其內訓寵以六官之長榮極三師之列魚軒表于東海翟茀賦于南都宗祏有儀春秋有祀變其士祭之禮被其公服之章昭穆偕昇感懷泣血永惟臣之祖父業茂文儒夙荷重名不躋通列微夫小子實忝前人才薄位高上慙無地夙夜感切啟處不寧豈謂寵臨薦加志願俱畢人子之道聖睿曲成情禮之間私門獲遂屬當禁火歸省先塋便奉除書以時昭啟灑雨露於松柏懸日月於邱封閭里相榮故老垂泣不圖存沒頓極于斯寵渥殊常戴荷失次於家出望於國無勞惶赧踧踖不知所報無任感慶屏營之至謹奉表陳謝以聞臣某言伏奉恩命賜臣妻楊氏邑號封宏農郡夫人伏以古者卿大夫之妻咸曰命婦亦曰內子但有稱謂皆無封邑其後雖有石窌延鄉之錫亦無夫人之號唯漢魏戚里晉宋外家平源清河䟽郡以馭貴建昌高密啟邑以睦親猶止于郡縣君而已近代著令國朝相襲階至三品妻封夫人上比鵲巢遠齊翟茀禮秩兼盛等威稍逾其或襄贊勳臣光華戚屬以茲而授尚可相循臣以凡賤謬承委遇尸職已久愧心匪寧仰酬國恩分寸未展內省家事慈渥過豐又蒙曲私霑及主饋特封嘉號載錫徽章中壼慶其秩高外姻賀其禮盛儀參貴列寵極私門自顧何功叨榮至此頓逾涯分退益兢惶無任荷戴屏營之至謹奉表陳謝以聞臣某言伏奉恩旨賜臣詩一篇并酒脯文迴睿思忽懸日月之光膳自御廚更覩雲天之樂感恩抃躍受賜兢惶施已重於邱山功未申於毫髮賞則過望臣何以堪無任感戴悅豫之至謹奉表陳謝以聞臣某誠歡誠喜頓首頓首謹言臣衮言今日內給事潘副宗奉宣勅旨賜臣緋衣一副并魚袋玉帶牙笏等寵自天來恩加望外顧已何幸循涯若驚臣衮中謝臣學愧聚螢才非倚馬典墳未博謬塵良史之官詞翰不工叨辱侍臣之列唯知待罪敢望殊私銀章雪明朱紱霞映魚須在手虹玉橫腰祗奉寵榮頓忘兢惕蜉蝣之詠恐刺國風螻蟻之誠難酬天造捧戴無力兢惶在心無任感荷屏營之至臣某言中使某至奉宣聖旨以臣所進太清宮聖祖殿前橙子賜茶百串榮賚非次承命兢惶伏以陛下尊元元于上宮本枝既盛降馨香于嘉木果實自珍常令護領之司及時採掇以進臣謬當率職正在戎期豈望皇澤之曲臨寵及下臣之私獻貪天是懼蹐地載惶無任臣某言伏奉恩旨賜臣內宴仍賜錦綵綾絹四百匹瓶盤五事衣二副并柑橘等殊常之寵上戴若驚伏惟寶應元聖文武皇帝陛下恭儉以行禮慈惠以布政式厚君臣之義爰崇宴饗之道至如醴以命宥幣以將意非有方叔之勳魯侯之親則不可以禮奉和之樂溥將之也臣以至愚承弼無益尸官夙夜自惟兢惶失次尚蒙慈恕猶辱樞衡薦沐鴻私歡承嘉惠接雲霄之上境陪勳戚于內朝宸威俯臨以戰以悚中食循省實慙孤賤微生遭逢一至於此睿眷流渥慈賞過豐廣乾坤而行慶俾下臣之受福束帛加璧申錫在於王庭珍器黃柑浹洽至于歸第拜恩初喜審分增憂臣實非才事無任効待罪巳久冒榮則多況戎患未寧寅車尚駕聖懷所軫日旰忘勞躬行儉素以濟軍國臣之俸祿猶合助邊臣之服用敢安私室今又俯霑慶賞將此勞臣雖宏覆曲全務於均施而丹誠上感實愧無功不勝荷懼屏營之至臣袞言中使羅希皎至奉宣恩旨賜臣衣二襲金銀器物十事百索兩軸扇一柄特降王人俯臨私第捧承殊賚祗荷失圖臣袞誠惶誠恐頓首頓首伏以聖政惟新方求至理天心所待豈止常才在臣庸愚何足驅使自受恩宸扆已積三旬尸素廟堂未有能事固宜歸責誠合避賢聖恩優容寵渥逾厚今屬三陽屆節五日御辰下濟天光曲流睿澤王人班器司服降衣飾其盤盂示以金玉王度總其領會將以黼藻朝章佩色絲而表祥捧輕箑而迎暑寵光逾分憂負難勝出自禁中珍華未覩在於臣下服用敢安既承飾外之恩彌積善中之懼無任感戴屏營之至臣某言中使某至奉宣聖旨賜臣衣兩襲金銀器物十事扇一柄百索兩軸伏以塵辱台司曠廢事任遭逢若此報效無聞罪譴未加已荷曲成之施庸愚不逮恐傷則哲之明所以亟冒宸嚴懇祈罷黜中慈未允外責彌深徘徊渥恩靦愧朝列四時之錫累沐寵私五日之慶又蒙榮賚衣服器用特降珍華疵賤凡微曷堪光飾況師旅在外疆界未寧日費千金簞無半菽今有功之士賞或未周無益之官寵之過厚已紆成命不敢上辭惶赧拜恩實慙虛受無任荷懼之至謹奉謝表以聞臣某言內常侍王子昇至宣奉聖旨以社日賜臣羊酒脯腊海味油麥丏粳米等仍特賜藥飲者喜抃失容兢慙無措臣誠惶誠悚頓首頓首臣叨踐台階已速官謗聖慈矜宥殊貸曲全猶使省近掖之文重高門之地白骨再起飛魂復還感恩若驚雖死何答伏以宰輔之任燮和所關自頃陽向逾累月近方降雨今復周旬致令水旱不時陰陽失序若令歸責臣亦何逃故事昭然所宜黜免且勾龍立社祀典攸書大稷主農國章斯在以享田祖以報秋成今穎實未登粢盛乖望是君積憂之日是臣獲戾之時豈望慶自雲天曲容酒食之宴恩霑疵賤下及膏粱之珍醉樂空比于堯人宰平實慚于漢相無功受賜有靦何逃上戴寵私益深惶惕無任抃躍屏營之至臣某言中使某至奉宣聖旨以至節賜臣米麥丏羊酒者鹿雜味等伏以非才曠官微臣之愧恥待寬責薄聖造之矜容貸罪則多負恩已甚進思無補退復何顏以周官之職且乖于水旱而漢臣之賜空積于歲時屬北陸涸陰南郊迎日古今良節朝野同休天慈過深榮賚逾厚王人結駟膳宰駢輜特減內庖之珍遍賜遠方之異光華里閈充溢門閭臣本布衣列於賤品千年遇聖忽至層霄萬死酬恩豈裨大化素甘藜糗既飽於粱肉多乏濁醪既醉于醇酎薦沐非常之寵不知所忝之由少長對筵悲歡相慶何功而至此何力以任之捧戴若驚慚惶交集無任臣某言臣一昨特荷聖慈曲承寵會今日又奉進止臣兄太常丞臣某亦霑內宴仍賜錦綵百匹衣一襲并銀器等非據之任已忝股肱曲成之恩更及骨月仰天增愧何地有安臣某中謝臣聞禮之制也以飲食親宗族詩之義也以愷樂宴嘉賓以通上下之情以展君臣之義將以裨於風化故無謬於寵私伏惟陛下稽古以理宗儒之教示其恭儉之訓溥頒雨露之恩叶時布和式崇饗宴至於需以酒食昭其慈惠必先宗戚次及舊勳臣出於孤賤又乏功勞無所克堪豈宜齒列臣兄何幸又沐殊榮寵極膳羞之珍禮優筐篚之至合生成於同氣聚慶賀於私庭昔人猶咏於鹿鳴在臣兼輝於雁序手足無措揣分空慙形影相顧捐軀何答臣無任臣某言內侍蒙日新等至奉宣恩命賜臣面脂口脂香藥澡豆并銀鉼子等伏以受任以來殊私未答每更節候愧曠歲時屬元律送寒清霜戒臘陛下爰修大蜡用告順成既息田夫復祭先嗇臣以涓埃莫効冰炭相仍年穀未登人財益匱致茲不稔之咎實媿報農之辰兢惶失圖啟處無地聖慈全宥寵錫過優珍器鮮華蘭膏芳潤以疵賤之質忽降御香以靦冒之容忽澡天澤省躬無措跪奉何施粉骨酬恩未伸萬一無任感戴欣懼之至謹奉表陳謝以聞臣少游言伏奉恩旨除某州刺史尋即有替又蒙恩除臣京兆尹澤及遐荒榮霑枯朽以驚以惕載抃載歡臣少游誠歡誠喜頓首頓首臣名無德稱官偶時來政謝有經文慚無害朝恩早竊班命累塵每食皆浮何官不曠四三年內榮至崇高萬一分中效仍微薄逾涯若此招損宜然頃者獲罪於天蹐身無地曲承鴻霈仍佐隼旟省揆責輕寢興憂負豈圖昭洗瑕穢發生羽毛不次之恩九霄橫落無階之位四裔超登開散皇明龍銜巨燭捧酬元造鰲戴崇山且河洛軍興京尹寄切念臣術非鉤距識昧平反將何以肅清姦回董正人吏自蒙獎擢願見天顏限以阻修未承勅命傳聞尚惑奔赴終勤以七月一日發自渠州星言即路久冒炎瘴因成癘痁行役支離轉加沈瘵隙光是迫草露將危今月四日乘輿至漢中尋問醫藥直省王許佺至奉宣進止促臣行程震威俯臨精魂飛散進退無措屏營失圖即以今日驅策殘骸載馳鳳閣猶冀獲全餘喘祗謁龍顏犬馬之疾久纏螻蟻之誠愈結無任感戴懇迫之至謹因直省王許佺迴謹奉表陳謝以聞臣少游誠惶誠恐頓首頓首謹言臣某言伏奉恩制授臣銀青光祿大夫祕書監仍聽致仕臣聞不修其德老當見遺無益於時祿不虛詔伏惟陛下以大聖撫運以至公宰物凡在爵秩必俟賢能況茲寵異豈及駑朽臣官歷五朝年逾八十勤勞莫效齒髮久衰舊好同游索然已盡經行郡國不見一人歡娛且少形魄如寄古之養老義在師臣必公卿大夫耆年多疾乃有詔書襃勞之寵靈壽安車之賜不然則高尚之士亦以道存非閔仲之潔清姜肱之孝行固不可猥承嘉命特受殊禮今陛下以臣之甥任在樞近階緣厚遇曲被鴻私官品過崇越於班列疵賤忽貴枯瘁增華親戚相榮以感以涕猶復恤其羸憊貸以休閑成周禮四方之適存漢儀八月之問惠養益厚等威益尊冒恩不訾仰戴無力殘生有幾上報何階無任感戴之至右中使某至奉宣恩命以至節恩賜米麥丏羊酒者鹿及雜口味等者聖旨頻降榮賚過優以周官百品之珍載頒其實雖魏臣五釜之貴豈容其多受賜踰涯拜恩失序臣出自孤賤素甘貧苦不過滿腹竊誡終身且祭不掩豆飯惟脫粟昔聖之美其儉可師敢望豐盈重彰尸曠而雨露偏施歲時益榮俾奉先之饗味兼海陸合族之宴及於膏粱又沐深慈下霑中饋以感以慶啟處難任無德無功慙惶罔措無任戴荷兢惶之至右今月十一日中使劉元玉至奉宣慰命賜臣前件書詔臣謬忝防虞未伸戎効寄分廉察又乏吏能尸素實深咎責難逭聖慈宏貸榮渥累霑俯降天書兼賜墨詔睿詞寵飾曾無毫髮之勞宸旨密臨時受腹心之寄自驚朽骨遠被殊恩捧承戰慄拜跪踴躍駑蹇之力過負已多鴻施未酬慚懼彌積軍州同慶惠澤溥將慰勉載加感悅交集無任抃躍惶悚之至右中使某至伏蒙聖慈賜前件羊酒等臣謬塵重任已積歲時日有餐錢月受高俸過蒙溫飫常愧有餘內省謀猷實慚不足益彰尸忝深誡滿盈屬上戊御辰勞農報社賜兼海陸品極珍鮮上減御飧下豐私室何功而受承寵若驚惶恐拜恩戰懼交集無任戴荷欣抃之至右中使劉君壽等至伏奉恩命賜臣前件餻酒等仍令樂飲者伏以元月戒時清風應律宜於長久欣聖祚之壽昌復見芳華喜陽數之重合時恩忽降節賜荐加王人寵臨御膳分旨膏以粉餌蒸以餹䬾綠芋金茅紫蔗筠節茱萸清酒嘗聞舊俗之傳薏苡調腸今覩靈珍之味此饔人苑吏上獻嘉辰豈伊凡品微生下霑殊貺賜宴既聯于伯仲覃恩更及於室家稠疊寵光低迴隕越一門同慶萬死何酬臣袞言臣聞恩或曲存義不虛受故耆儒碩德方載珍羞大節殊勳乃加禮食至於列曹分署各置餐錢匪頒王饔食有公膳陛下勵精庶政垂意輔臣特降非常之慈屢蒙每日之賜上林果實至必先時大官飧牢送無曠日臣等自登三事已涉三旬當朝廷釐革之時佐海內安危之重入趨殿省常奉憂人之旨出在朝堂每思克已之功而不能陳一策進一賢外無平戎之謀內闕敘官之實四夷未格百姓未寧不副憂勤合當罪譴更承飫賜實用慚惶既招折足之嫌將貽滕口之誚伏望重回宸日卷載允誠詞俯停三錫之恩伏免萬方之責則神明或祐官謗不行在微臣再受多福無任懇迫悚懼之至右中使祁國俊至奉宣恩旨以前件鹿稍覺鮮好特以賜臣者謬竊和羹之任累承分食之恩無補涓塵叨霑雨露上戴洪造內愧素餐伏以陛下順時令以宣風展春蒐之彞典有司奉職上苑從禽將備御庖獻茲鮮獸宜供六膳以副八珍臣實無功何以受賜寵承殊渥味則非時顧調飪而空慚荷生成而何答無任感恩悚抃之至右今月某日喬某至奉宣恩命賜苑中所種甘蔗及芋等其形豐其味甘曲被生成之恩宛同吳蜀之物過蒙頒錫伏用驚喜陛下以萬靈效祉六合同風養之則生孰云其遠化之自我不隔華夷將有絕域之人服中州而禀教故使他邦之產歸上苑而咸植既登天膳實表地成太和之理於斯可見捧承異貺兢跼素餐感戴之誠倍百恒品不任受恩悚懼之至右今月五日監軍某乙差行營十將某乙送正月十二日書詔并賜臣衣三副軍將二人衣二副跪伏捧承惶悚殞越臣素以愚懦昧於吏能虛受寵私豈堪任使謬承條察吏法非明忝司訓練戎行不肅今之曠職獨有微臣宜懲冒榮以勵分鎮豈謂特迴聖睠俯示天書曲降宸慈再加墨詔下頒春服遠被時恩獎飾逾涯兢惶失次載光師旅仍錫偏裨誓以捐軀期於上報無任慶抃悚踴之至右中使某奉宣恩旨賜臣前件馬臣竊位台司已招官謗未申薄効遽沐殊私捧荷驚惶心魂震越上慚慈睠下愧周行素無致遠之資益懼負乘之咎無任感戴之至右奉進止令臣撰詞訖謹隨狀封進伏以纂述坤儀宏宣聖悼禮有追冊文以敘哀前代以來舊章不易屬詞之重高選文臣晉之恭后則王彪之顏延年咸製其詞哀華著稱至貞觀中文德皇后遷座特詔虞世南撰述編於文館永播徽音此三臣者皆以鴻藻奮於一時用能紀皇壼之風煥青史之簡臣才學甚淺典策非工承詔兢悚匪遑夙夜伏自循省叨竊至深陛下往命貴妃追封殊號冊諡之令皆臣奉行德範柔明多所遺闕退思鄙薄於今愧赧況又獲承慈旨重紀芳猷雖竭庸虛慚無藻麗屬文明天下多士盈朝顧其式瞻何以昭示冒嚴上獻益用兢惶無任戰懼之至
