front:
  text: 全唐文欽定全唐文卷四百八十二逢大歷十二年進士
  hash: sha256:2207bfdfbc0b5f3a049d82ec42b51d618bb1b343bc81be6478b8790021b2cf41
  markers:
  - {type: head, offset: 14, content: 黎逢, id: KR4h0168_NFKB_482-h1, level: 1}
body:
  text: 王者施令善人為邦法制惟明伊典章而有六象魏攸設信高闕之以雙故其政坦蕩其教敦龎亦既懸之四方取則及乎瞻也㣥心自降觀夫立如建標旁異懸钀俯明庭之若砥夾馳道其如髮將欲朝百蠻之酋帥集九命之簪笏豈徒競崑閬之瑤臺象河宮之貝闕高齊嵩華勢比恒碣聚北斗之瑞雲挂西山之落月令者政之端春者歲之始非遒人之徇路陋秦伯之懸市取象則金牓為奢指字則銀鈎可似建中於下無或不美六官有成萬姓允理惟精惟一道深黃帝之書不削不刊義合素王之史客有鄒魯之徒為之頌曰巖巖雙闕上干青雲明於著令煥乎成文萬人承式九有來君彼駟牧與露寢曾何足以稱云夫象者制法之流魏者大名之尤合二美以成德懸千古而為儔四門穆焉少正之誅何有大道行矣仲尼之嘆焉求豈唯興禮讓息澆浮而已哉聖人沒而教在明王興而道宣命上公以陳信展大禮以登賢觴酒豆肉金鏞筦懸致克禋以如在當質明而不愆祁祁諸生必恭敬止廓廣庭以容眾峩高冠以修已臨奠獻之筵肅造秀之士階間儼以成列槐陰布以如市將備禮於先師遂儲精於祝史於以致君恢復王化宏闡人文磬音繼於夜杵燭影迎於朝雲見曲暢於和易知具歆於苾芬肅肅階戺陰陰門闕喬木棲於暮煙前軒滿於行月㣥士沓而歲至庶工齊而曉謁上元酒以清滌間朱絃而疎越齊百王於建號歷千古而未歇蓋以教侔天地而不朽功格宇宙而不伐不朽故可貴不伐故彌彰仰而不及融然有光實橫被於歷代獨崇輝於帝唐德教不輟王猷有昌日尊師於廟歲求士於鄉教之於右塾登之於上庠知本末之可務亦師師而不忘將歷試於宗伯必先謁於素王古先哲君任土以作貢洪惟我后嘉善而容眾猶冀獲師於卜獲相於夢時哉康哉宜阿閣之巢鳳國家開文學之科旁求英彥爰將貢於禮闈命先叅於秘殿欲使懷才抱器自此鷹揚當令較伎逞能從茲豹變是以儒風益振睿澤惟新設薦舉為教化之本致朝見為榮貴之因庶使八紘碧嶂絕臥雲之士遂令萬歲彤庭觀獻賦之人莫不張文柄以旁羅詔諸侯而上貢俾離邦去里若攀龍附鳳或稟間生之瑞出則驚人或懷希代之珍來皆動眾期美祿必取期殊科必中莫不遠湊天闕爭趨帝閽曹劉鹿君至賈馬雲屯當仲冬月候丹禁門於時銅壺尚滴粉壁猶昏驪駒波躍蠟炬星繁俄而鐘斷長樂殿啟含元中使森而鶴立諸生凜以駿奔進抑退揚儼裦衣而設禮左旋右折俯丹陛以陳言曰臣等才非可升德非可舉幸以辭乎海上達彼君所今則凝神注目無非繡戶金鋪接踵比肩盡是鴻儔鶴侶歡聲數四周覽再三散漫而龍池霧起叅差而宮樹烟含既而中貴遙宣勞卿遠見咸精筆陣勉赴文戰時康俗泰終有待於英髦擇善搜賢本無遺於寒賤諸生乃退行列整簪裾瞻鳳扆獻玉除俟青春而變化有望當聖意而光輝有餘集鴻都而固難比矣會虎觀而未可加歟則唐之盛也堯舜不如君子之為道也敦詩書說禮樂俾其潤身而浴德克巳而志學亦猶嘉肴在器良玉抱璞肴之知味既因於嘗玉之成功必由於琢物既肖旃士亦宜然知此道者必勤學焉若夫即其講肆齒以冑筵儒風是習素業斯傳以三墳五典為本以八索九邱為先存乎博奧究其精研漁獵乎六籍之內牢籠乎百氏之前得用而行將陳力於休明之代自彊不息必苦節於少壯之年於是慎擇其師審取其友師之嚴則尊敬而靡懈友之直則切磋而可久志有所立言無所苟講道德必探其本原進禮樂必盡其先後故業就而青紫可拾器成而瑚璉自負我天子德廣虞夏業傳高曾展義之心攸克觀風之禮必登故臺之用也斯建臺之名也是宏然後度材比德奢而不盈興功俾役儉而不陋萬物是集百工是湊從繩罔愆運斤以鬬歘以山立揭焉雲構豈不謂鴻休叶贊元德時雍錯綜之典不革經始之道克從闢以九戶聳以千重接祥光於溫液納瑞氣於驪峰觀乎大厦耽耽飛檐穆穆殊形詭制㣥品異族或霞駮而電開或龍蟠而獸伏皓飾彰盛洞文潛蓄既藻井以垂珠亦丹墀而布玉晴天反照垂螮蝀於雕梁霽色澄明挂蟾光於重屋混合元麗巍峩特起入窈窱兮不知其所之視王褱譎兮不知其所以及夫西成罷務北陸將寒霜封原隰雲蔽峰巒金輿斯御綵仗初攢寧侈心以攸往必風俗之所觀設教陳詩事必彰於禮備承天統物政本在於人安至如庭宴薰薰衣冠察察其樂將萬其儀用八奏金石兮匪疾匪徐命鼓琴兮載擊載戛既而若登仙景若奪神功度宏規兮其外動變態乎其中傍眺六合遠視八風吐元和而納純懿詠仁洽而歌道豐則魏之所造漢之所崇伊制作而靡及豈古今而遽同客有觀乎順動審彼始終因厥誠兮受慶宜永永兮無窮瞻彼古臺揆日爰設載徵經始之旨將測運行之節天地之心可見風雨之交既別玉律匪先土圭是揭以徵陰陽之短長以察浮驂之晷轍不然者焉可以酌其數於高空建天中而有截詳厥周典詢諸日官以寒暑為候以陰陽為端且俯接神州迥當嵩嶺憑累土之增構運孤標之直影矧因高以垂範異尋虛而捕景分至有度知王者之迎長盈縮不念志士之思永山蹇嵼峭聳昭明有融九層一驗萬㝢攸同彰宣精而示下表無私而得中況復圭植於臺日生於海當呈象以委照必澄霞而賦彩兩童之辨猶惑太史之占斯在上千里而是馳下寸晷而未改嗟夫悠也久也元之又元昇大明而赫矣顧崇址而巋然是以分北陸識南足厂墨審以作程定此而會期率土中以舉正因茲而仰辨均天惟彼元德我后是則普觀端景知立表於天中潛測末光思勞躬於日昃至若視朔興紀書雲立規浮箭司辰且於室內建木滅影或在天垂豈比夫茲臺之特立平四氣而正兩儀有子墨客卿從事於筆硯之間學舊史之暇日得美石於他山琢而磨之其滑如砥欲精研而染墨在虛中而貯水水隨暈而環周墨浮光而黛起明而未融是以為用久而不渝故以為美器成上吉徵闕里之素王匠法增華叅會稽之內史且王言惟一道心惟微於以幽贊由之發揮從人之欲委質莫違代若遐棄文將疇依肅觀光而霧集賴設色而煙霏實將振文而為邦豈惟韞玉而山輝者哉君無謂一拳之石取其堅君無謂一勺之水取其淨君其遂取我有成性苟有輔於敷閱固無辭於蘊映惟聖人有大寶昊天有成命莫不因我以載形以我而施令志前王之事業作後人之龜鏡夫物遷其常天運不息水有涸兮石有泐代貴其不磷我則愛其白代貴其不染我則愛其黑象山下之泉為天下之式因碌碌於俗間類栖栖於孔墨嗚呼辭尚體要文當絕妙雖濡翰其不疲無繁文以取誚爰貢君子以其勁質或升之堂或入之室對此大匠厠諸鴻筆見珍於殺青之辰為用於草元之日夫氣結為石物之至精攻之為硯因用為名事若可久代將作程斯器也不獨堅之為貴諒於人之有成翕然乎造化能變而窮且其為水也有上善之稱其化為鹽也有美玉之崇豈其清泠之水動變若神為代之寶致邦之豐伊昔煑海為鹽以稟乎天君以和羹之用商以賈賣而遷是知水化之利可貴哲匠之謀可研若也代人所貴此貴為美恒濟古今應乎遐邇求之者豈倦乎疲勞功崇者可不由乎此致夫以水同君子有流通之利或涓涓乎而處於藪泉或浩浩乎而徧乎淮泗或在河而則淡或混海而則鹹國有鹽而且榮家有鹽而不匱條山一竇萬邑之滋使成者將貢於玉闕俾犖碌者使我域求之東西負重南北奔馳豈不因潤下作鹹在乎一變鼎爼既徹長筵美饌五味廢之而忘餐廣座得之為珍膳況水為柔德能乎神化皎皎如霜依依照夜莫不因水而生遇水而吒恨久處於冰泉思工人之一假且天然此物成化特殊匠之所變絕代稱無豈伊水因匠是乃能窮乎變化況乎人得媒寧肯守乎一途或金門獻策或積代英儒感物而賦在乎覬覦仰鹽梅之美用思窮達於高衢行人徘徊登秦原而遊目見漢右之荒臺清風穆其尚在翠華歸而不迴對古情至臨高思來拔蔓草以遐想覩離宮而興哀試問薪者乃秦人也云漢之興茲臺之下馳道通乎中禁周牆繞於平野經逝川而不息撫環堵而殊寡昔漢皇帝幸甘泉宮肆目將遠築臺其中高居物外若與天通祈列仙之戾止致聖壽之延洪繹繹憑雲蹲蹲捧日干元氣以直上倚長空而迴出危檻岧嶢迴塗鬱律植承露之盤開肅神之室將以接上元朝太一乘大君之登降訪總真之摭實於戲郊祀之義志而可採鴻紛之狀望而已改哀壯麗之都失想威靈其如在徒野鳥之飛來何真人之可待且白日可以精貫元珠難乎力求雖崇臺山蹇嵼磴道周流泰畤乎西面齊宮乎上頭仰通蒼昊俯瞰皇州寧不死之可致諒其生也若浮我國家立太平尚清靜儼宸居以自整絕仙臺之望幸雖丹檻栖於列宿飛梁歷於倒景有唐虞之允恭無漢武之遊騁化由其衷居慎其獨有儀可象無思不服自然為域中之大獲天下之福等南山之不騫何高臺之是築季同贈太子少保孟容弟始拜監察御史再遷兵部郎中徙京兆少尹終宣歙觀察使政洽於下物惟表神彼奔走之絕類忽馴擾而歸仁爾來於輈豈陳力以効感我行其野將勸農以務春眷芳林之躍躍偶大車之轔轔觀其煩足高步迴還左顧叅熊軾而左右分光望隼旟而疾徐有度惟德是擇惟賢是輔觀皓影之來儀諒和風之克布暠皛真明霜濃雪輕標玉質貫金精始呦呦而雙止終麌麌而偕行載馳載驅軼輕塵於後乘乍騰乍倚驚逸騖於前旌映丹帷之輝煥陪露冕之光榮懷仁於衛君之轂忘味於食野之苹則福履攸綏神休是格翼戴高駕徜徉廣陌不驚不懼彰爾性之閒和克皎克明契我躬之潔白躑躅徘徊飲化而來政言可矣人詠康哉表靈慶而有同神鳳狎馴養而不異龍媒懿彼僊都誕茲靈獸勁角昭勇鮮光挺秀行而擇地恒町疃於道塗出或以明靡棲息於園囿老之御徒迷王母之乘何陋剪去煩苛敷陳惠和蝗出境而奚爾珠還浦而其何曷若茲鹿擾於明義覈其理而莫窮求其類而罕譬無心而應感不言而表瑞豈止其効於賤微樂馳驅於仁智而已蘊字復夢泉州莆田人累遷禮部員外郎出為邵州刺史坐杖人死流儋州卒愚嘗十分天下之事知其弊者大半二年冬輒獻書思相公正而行之嗟乎無位而言輕相公猶未為行其切者國家有西土猶右臂也臂之附體豈不固歟臂之不存體將安舒愚以此輒敢重陳利病思相公念而行之當昔漢室彼為內府囊賝走馬曾不虛日咫尺萬里烟塵不動是以司馬遷班固得弄刀筆夸大漢功德炳然與三代同風洎房杜佐太宗文皇帝剗革凶孽天下廓清姚宋佐元宗明皇帝聲明文物照耀殊俗後之輔弼不能嗣守故我疆我理陷於犬羊嗚呼今所踐者惟北抵豳郊西極汧隴不數百里則為外域可不痛哉可不惜哉且馭馬者必右執策左執綏恐其有非常之患也儻若臂不勝力體不安坐則踶齧立至豈惟泛駕乎此事雖小可以喻大相公得不念之乎愚嘗出國西抵於涇原歷鳳翔過邠寧此三鎮得不為右臂之大藩乎自畫藩維擁旄鉞者殆數十百人惟故李司空抱玉曾封章上聞請復河湟事亦旋寢功竟不立爾來因循誰復尸之故朝受命而夕寢行日貴富而月驕慢跨廣衢而羅甲第指長河而固允嗣士卒窮年不離饑寒以月繫時力供主將死則已矣賞終不及如棄鳥獸附於藪壤故死者飲恨於地下生者吞聲於邊上五十餘年無收尺土之功者豈朝廷不以為慮乎命將不得其人乎愚以此竊知不惟土地未可復且慮犬戎馳突不一日二日則彼三鎮強者閉壘自守弱者棄壁而逸豈暇為國家以郤戎虜乎愚所謂臂之不存體將安舒今刁斗不聞烟塵不飛蓋宗社之靈也豈禦守者之有功乎且食租則可以備饑衣稅則可以禦寒衣食足然後可以教攻戰朝廷既切念邊軍不遑終夕飛芻輓粟常恐後期然而荷戈負㦸者終歲而餓其來已久時莫能更雖度支有兼知之名節度有營田之目皆以貨利相誘彼公之賓寮悉皆和糴斗粟必欺於丈素一言可致其籝金如此則士卒不得不饑寒將帥不得不奢侈欲其攻戰其可得乎此所謂借寇兵而齎盜糧也其可謂之禦戎乎伏料相公亦已垂意矣愚竊謂為弊既久矣可革而化之化之之術在相公暫迴頃刻之慮思之思之得人則如班超之儔不難得也相公必命將取其封錫已榮者則封錫已榮矣彼復何求以此戰不克寸攻不得何莫不由斯人之徒歟因此言之則又不唯安邊之未得人也相公必以為人不易知儻斷然有一介之士敢露肺肝相公復能特達獎拔俾為千夫之長得以自置於秦隴之外接彼犬戎之域三歲考績能則優獎否則孥戮已乎此賈生終童感激於前跡其慷慨不為不至蓋時之不見信也不知相公以愚此言為率爾乎以其斷然一介之士亦能成功立事乎且天下巖居谷隱之人悉皆有心但用與不用耳假如登奉常之第者未必盡能文章為牙門之將者未必盡能威敵況漢之為漢多有異材豈唐之為唐獨無奇士也伏惟圖之陸賈有言天下有事屬在將天下無事屬在相伏惟相公兼將相之重任執生殺之大柄蘊以竊被教化忝在陶鈞之內四海安平某則與歌虞贊魯之人為儔苟有妖孽某安敢不隳裂肝膽為相公之腹心乎愚者千慮或有一得伏願相公少賜採擇焉道路云云以為淮西兇黨侵犯疆鄙某伏料相公制置如在諸掌矣然則舜有天下闢四門明四目達四聰欲天下之誠畢見矣平津侯開東閣以延天下士欲天下之美惡畢知之矣伏惟相公抱赫赫濟時之略佐明明聖上之朝某切願相公以平津之德致聖上廣帝舜之道使天下之事可重而實諸掌則淮西之寇不足為患矣某幼讀書不求甚解但見古人之有建功立事者心則慕之以是十試藝於春闈竟不成名今為河朔一從事耳苟不自言其誰為言於相公乎且人生天地之間必合達天地之性苟違天地之性者是天地之棄物也今淮西兇黨是天地已棄之物相公誠順天而誅可不偉歟某竊聆議者謂淮西兵強不與恒鄆兩軍犄角相應此皆腐儒䜿子之言不足與相公計大事何者自兵興已來僅六十年人皆尚武各思功業彼或有逆此則有順以順討逆往無不克寸爰自國初垂二百年時有悖逆孰為存者今天下藩鎮六十甲士百萬雖有依違未盡化者不四三所耳議者若以為申說言淮蔡必強則陳許安得而弱乎況以人敵人彼亦人也以兵刃敵兵刃彼亦兵刃也或示其弱則過不在士卒伏計此事已經相公心矣某請徵四年冬出師討恒陽之事明之初王承宗阻兵盧從史潛應天兵欲進賊必知之況內邱與臨城祗二十里北為賊境南是天兵兩處傍山俱置死地堯山與高邑共據一川若盧從史必議引兵直進則趙州高邑立可屠之此既不備彼又得計豈得賊勢彊而天兵弱邪德宗朝韓全義統師自取退恧蓋緣淄青諸道悉會用兵所謂闇齎盜糧不得不敗且兵以售死為效國以厚錫為誠某竊知比者行營師徒苦役錫賚納於將帥饑寒加於士卒欲其破虜其可得乎又朝廷獎用多藉舊人蓋取官崇或言望重殊不料彼已崇重更復何求以此取人往往皆失某輒賀相公昨者制置已得其人則陳許李光顏安州李聽唐州田秀誠切忠的立疑某亦素諳伏願相公任之不疑各委兵柄但絕常鄆兩處莫許知聞其餘連城惟在感激人一其性豈不易圖如此則相公之功不後郭尚父李令公之功也豈佐商輔周之德獨專美於前歟議者若以為恒冀強梁相公則有魏博澤潞制之矣淄青暴慢相公則有梁宋徐泗制之矣以天下無限之勇士破淮西有數之兇賊孰謂不可然則某又切願相公用其勇敢之士分巡諸道將帥有不用命者許以軍法按之士卒有被饑寒者以其赤子保之如此則忠勇奮起姦謀自殄倒戈脫劍不日可期某久歷險難多見成敗比被劉闢欲殺無人薦論本使程僕射入朝之時再三邀請某以謂已出萬死故求一伸窮困蹉跎竟無知者程僕射禮惠逾厚某又愛彼功名至元和十六年方受奏請既奉恩詔兼授憲官心期佐戎必擬立事自到河北首末四年㣥情所難某意獨易蓋以朝廷興法率而行之道路皆知無不驚駭況留家口並不將去今年八月內蒙程僕射薦歸闕庭幾欲半年未蒙公論伏以西南東北兩處從軍自執庸愚不失誠節今當相公舉直之日是某幸得盡言之秋仰望陶鈞置諸倫品柔遠之道此為事先不宣某再拜隨字南式陽平人舉明經累轉司勛員外郎穆宗朝拜諫議大夫敬宗立歷中書舍人翰林學士文宗大和二年拜中書侍郎同中書門下平章事七年冊拜太子太師出為鎮海軍節度使卒年六十贈太保諡曰貞臣聞古者左史記言右史記事事為春秋言為尚書遠自軒皇近惟列聖其間睿哲文明之德格天濟物之功實賴記述傳諸不朽伏以憲宗皇帝承十一葉之基運盪六十年之妖氛神功燀於無外元化光於有截語儉德則漸澣濯以垂訓言憂勤則躬日昃而忘倦廣聰明則惟恐其不聞納忠諫則咸許其自達㣥臣荷裕之德黔首飽慈惠之仁今之舉盛烈者貞觀開元元和而已誠宜垂諸簡牒煥彼縑緗長慶二年詔監修宰臣杜元㯋命翰林侍講學士臣處厚臣趙暨史官沈傳師鄭瀚宇文籍等分年編次實錄屬中外多故筆削未遑或職秩遽移判綴莫就陛下丕承鴻緒思宏祖德前詔處厚繼命臣隨比因奏對促令纂勒臣今採處厚等所錄又與見在史官蘇景裔等博訪遺逸精加研覈以畢其功逮茲周歲錯綜方就謹撰憲宗皇帝實錄為四十卷目錄一卷謹隨表奉獻雖刓精極思徒効其勤勞而測海窺天豈知其萬一無任悚惕兢慙之至謹詣光順門奉進以聞臣昨面奉聖旨以順宗實錄頗非詳實委臣等重加刊正畢日聞奏臣自奉宣旨尋取史本欲加筆削近伏見衛尉卿周居巢諫議大夫王彥威給事中李固言史官蘇景允等各上章疏具陳刊改非甚便宜又聞班行如此議論頗眾臣伏以史冊之作勸誡所存事有當書理宜歸實匹夫美惡尚不可誣人君得失無容虛載聖旨以前件實錄記貞元末數事稍非摭實蓋出傳聞審知差舛便令刊正頃因坐日屢形聖言通計前後至於數四臣及宗閔僧孺亦以永貞以來歲月至近禁中行事在外固難詳知陛下所言皆是接於耳目既聞乖謬因述古今引前史直不疑盜嫂之言及第五倫撾婦公之說皆多此比類難盡信書所冀睿鑒詳於聽言深宮慎於行事持此比類上開聰明特蒙降察稍恕前謬由是近垂宣命令有改修臣等伏以貞觀已來累朝實錄有經重撰不敢固辭但欲粗刪深悞亦固盡存諸說宗閔僧孺相與商量緣此書成於韓愈今史官李漢蔣係皆愈之子壻若遣叅撰或致私嫌以臣既職監修盍令詳正及經奏請事遂施行今者庶僚競言不知本起表章交奏似有他疑臣雖至昧容非自請既迫㣥議輒冒上聞縱臣果獲修成必懼終為時累且韓愈所書亦非已出元和之後已是相循縱其密親豈害公理使歸本職實謂正名其實錄伏望條示舊記最錯誤者宣付史官委之修定則冀聖祖垂休永無慚於傳信下臣非據獲減戾於侵官彰清朝立政之方表公器不私之義流言自弭時論攸宜凡功臣不足以垂後而善惡不足以為誡者雖富貴人第書其卒而已陶青劉舍許昌薛澤莊青翟趙周皆為漢相爵列通侯而良史以為齷齪廉謹備員而已無能發明功名者皆不立傳伯夷叔齊莊周墨翟魯連王符徐稚郭泰皆終身匹夫或讓國立節或養德著書或出奇排難或守道避禍而傳與周邵管晏同列故富貴者有所屈貧賤者有所伸孔子曰齊景公有馬千駟死之日人無得而稱焉伯夷叔齊餓於首陽之下人到於今稱之然則志士之欲以光耀於後者何待於爵位哉富貴之人排肩而立卒不能自垂於後者德不修而輕義重利故也自古及今可勝數乎虬字深原天寶中官永嘉尉終諫議大夫怡亭裴鶠卜而亭之李陽冰名而篆之裴虬美而銘之曰崢嶸怡亭磐礡江汀勢壓西塞氣涵東溟風雲自生日月所經眾木成幄㣥山作屏顧余逃世於此忘形宏景京兆人貞元中進士為汴州浙東從事元和時累拜給事中穆宗朝拜尚書左丞遷禮部尚書東都留守大和五年卒年六十六贈左僕射臣等伏觀制書授前件太僕卿者伏以司僕正卿位居九列在周之命伯冏其人所以惟月膺名象河稱重漢朝亦以石慶之謹愿陳萬年之行潔皆踐斯職謂之大僚今士涇戚里常人班叙散秩徒以父任將帥家富貲財聲名不在於士林行義無聞於朝野忽長卿寺有瀆官常況以親則人物未賢以勳則寵待常厚今更顯任誠謂謬官傳曰唯名與器不可假人蓋士涇之謂臣等職司違失實在守官其劉士涇新除太僕卿敕不敢行下謹隨狀封進方明貞元時人與褚長文俱受書法於清河崔邈昔歲學書專求筆法貞元十五年授法於東海徐公璹十七年授法於清河崔公邈由來遠矣自伯英以前未有真行草書之法姚思廉奉詔論書云王僧虔答竟陵王書云張芝韋誕鍾會索靖二衞並得名書古今無以辨其優劣惟見筆力驚絕耳時有羅暉趙襲並善書與張芝冋著名而張矜巧自許眾頗惑之嘗與大僕朱寬書云上比崔杜不足下方羅趙有餘今言自古能書皆云鍾張按張自矜巧為眾所惑今言筆法亦不言自張芝芝自云比崔杜不足即可信乎筆法起自崔瑗子玉明矣清河公雖云傳筆法於張旭長史世之所傳得長史法者惟有得永字八法次有五執筆已下並未之有前聞者乎方明傳之於清河公問八法起於隸字之始後漢崔子玉歷鍾王以下傳授至於永禪師而至張旭始宏八法次演五勢更備九用則萬字無不該於此墨道之妙無不由之以成也夫把筆有五種大凡筆管長不過五六寸貴用易便也第一執管夫書之妙在於執管既以雙指苞管亦當五指共執其要實指虛掌鉤擫衂送亦曰抵送以備口傳手授之說也世俗皆以單指苞之則力不足而無神氣每作一畫點雖有解法亦當使用不成曰平腕雙苞虛掌實指妙無所加也第二族管亦名拙管謂五指共族其管末弔筆急疾無體之書或起藳草用之今世俗多用五指族管書則全無筋骨慎不可効也第三撮管謂以五指撮其管末惟大草書或書圖障用之亦與拙管同也第四握管謂捻拳握管於掌中懸腕以肘助力書之或云起自諸葛誕倚柱書時雷霹柱裂書亦不輟當用壯氣率以此握管書之非書家流所用也後王僧虔用此法蓋以異於人故非本為也近有張從申郎中拙然而為實為世笑也第五搦管謂從頭指至小指以管於第一二指節中搦之亦是效握管小異所為有好異之輩竊為流俗書圖障用之或以示凡淺時提轉甚為恠異此又非書家之事也東海公璹曰置筆於大指中節前居動轉之際以頭指齊中指兼助為力指自然實掌自然虛雖執之使齊必須用之自在今人皆置筆當節礙其轉動拳指塞掌絕其力勢況執之愈急愈滯不通縱用之規矩無以施為也又云執筆在乎便穩用筆在乎輕健故輕則須沈便則須止謂藏鋒也不止則儉勁之狀無由而生也太流則便成浮滑浮滑則是為俗也故每點畫須依筆法然後書同古人之迹而合於作者又曰欲書當先看所書一紙之中是何詞句言語多少及紙色目相稱以何等書令與書體相合或真或行或草與紙相當意在筆前筆居心後皆須存用筆法想有難書之字預於心中布置然後下筆自然容與徘徊意態雄逸不可臨時無法任筆所成則非謂能解也
