front:
  text: 全唐文欽定全唐文卷五百九十八歐陽詹四
  hash: sha256:16954b5a9bf129c7383b5b9865ee01ddb0619773616c0e5c17a7d5b0c38dd09a
body:
  text: 夫子説季路於人曰片言折獄者其由也歟夫子之言蓋有激於季路之云也後之人不窮聖旨以為夫子美夫季路任一時之見輕而折獄者十有八九焉迂哉斯人也夫兩訟之為獄獄折而有刑刑者侀也侀者成也一成而不可變不其重歟古之帝王將刑一人循三槐歷九棘訊㣥臣訊㣥吏訊萬人億兆絶議然後致法徇於朝於市於野昭然與衆方棄之所以不易也君莫聖於堯而有舜禹稷契佐之莫明於舜而有夔龍縉雲高陽佐之莫哲於禹莫賢於湯莫察於文武莫敏於成康於時皆濟濟盈朝明明在位豈無獨見而可臆斷慎刑之道如斯不敢失明刑獄不可輕也凡至獄訟多在小人至於訟也皆欲已勝何則不勝乃罪戾隨之若是則君子時或妄訟於人未有小人而能自訟者片之為言偏也偏言一家之詞也偏詞雖君子不信之矧非君子乎且先師曰人而無恆不可以作巫醫巫以鬼神占醫以筋脈體無恆之人筋脈且不足以自體而况訟乎鬼神不足以為占而况視聽乎以斯折獄也小則肌膚必有抶撲之濫焉大則性命必有鈇鑕之冤焉夫子祖述堯舜憲章文武師老聃而崇周公此六人無一以傷於人者夫子豈好輕傷哉脫夫子實為片言可以折獄也不幾乎一言可以喪邦歟夫子之言非於季路賢者審之片言不可以折獄必然之理也自性達物曰誠自學達誠曰明上聖述誠以啓明其次考明以得誠苟非將聖未有不由明而致誠者文武周孔自性而誠者也無其性不可得而及矣顏子遊夏得誠自明者也有其明可得而至焉從古而還自明而誠者衆矣尹喜自明誠而長生公孫宏自明誠而為卿張子房自明誠而輔劉公孫鞅自明誠而佐嬴明之於誠猶玉待琢器用於是乎成故曰玉不琢不成器人不學不知道器者隱於不琢而見於琢者也誠者隱於不明而見乎明者也無有琢玉而不成器用明而不至誠焉嗚呼既明且誠施之身可以正百行而通神明處之家可以事父母而親弟兄遊於鄉可以睦閭里而寧訟爭行於國可以輯㣥臣而子黎氓立於朝可以上下序據於天下可以教化平明之於誠所恨不誠也苟誠也蹈水火其罔害彌天地而必答豈止君臣鄉黨之間乎父子兄弟之際乎大哉明誠也凡百君子有明也何不急夫誠先師有言曰生而知之者上也所謂自性而誠者也又曰學而知之者次也所謂自明而誠者也且仁遠乎哉我欲仁斯仁至矣夫然則自明而誠可致也苟致之者與自性而誠異派而同流矣知之者知之委之者知之漢武帝覽交門之歌顧謂東方大夫曰古人列后巍巍蕩蕩者則豫今日其庶幾乎東方大夫曰何謂也曰遠人率俾天降珍祥殷湯上感實獲白狼周成旁浹遠致越裳放勳曰聖幸祀四方武乙不淑出有震亡豫享虞舜於九疑弔罷民乎盛唐登名山於華陰俯大川乎潯陽天清地謐符應昭彰是曠迹交神致放勳之慶修身遠害免武乙之殃紫芝産於甘泉白麟呈於雍畤天馬生於渥窪之域寶鼎出於汾水之濱風雲草木相繼於時頭飛鼻飲之長涅齒穿胸之貌絶域款塞無月無之是多白狼之祉不少越裳之珍也比夫巍巍蕩蕩爾有何見而感焉東方大夫曰噫陛下誤意巍巍蕩蕩歟非古所謂巍巍蕩蕩者夫巍巍者德之容蕩蕩者化之稱非謂廣遊從於險阻幸髣佛於神祇録莫測於妖祥免偶然之壓溺致儻來之貢賦獲無用之戎狄耳且此之數者理不可馮亦明也秦皇帝周施天下不為德我太宗不下階闥不為微周懿死於牖下不為是虞舜崩於蒼梧不為非虢叔得神喪其國西伯無神人以歸龍降於庭夏道昧雉雊於鼎商祚輝苗民逆命堯以盛有緍來賓桀以衰以此觀之即虐如秦皇雖車轍遍於宇內不如太宗端拱於堂上也弱如周懿雖終於帷席不如虞舜之沒於草莽也淫如虢叔雖獲靈祜不如西伯無所禱祈也邪如孔甲雖有嘉祥不如武丁之妖怪也酷如夏桀雖異人屈膝不如唐堯域中之解體也天道沖融變化無窮發祥布象時異始而同終神理閟密吉凶罔測示形告兆亦同紀而異極有多端以表善有積慶以稔慝有無災以厚毒有見眚以警德今多端多慶不知天之表善歟其稔慝歟無災無眚不知神之厚毒歟其亦警德歟以是先王或不致珍祥而有天下或屢服蠻夷而覆宗社或有鴻災巨眚國以寧或有靈蹤異迹而身以傾珍祥之實乍凶乍吉妖怪之蹤乍吉乍凶譬諸藥工也其有活人之者亦有殺人之者焉譬諸酒醴也雖有敗人之道固有成人之道焉武帝曰若之何而信之曰唯德可以信之欽若上帝輯寧下民其表善也雖休勿休則百福是遒其稔慝也將覆不覆則轉禍為福且人神之主天地之心也孰為妖怪神祇也孰為珍祥天地也者苟修德以待人未有主人怡悅而客忿怒心善而形為惡也若有其德日覩妖怪其巍巍也若無其德日對珍祥其未蕩蕩也武帝矍然斂膝而言曰善矣哉微而體大珍祥不必利妖怪不必害而今而後以二者棄乎道德之外敕內府詔宗伯加東方大夫命一等而贈之束帛夫行以檢身非以為人無淫無佚其處宜一孜孜碩人冥冥暗室罔縱爾神罔輕爾質遠茲小惡念彼元吉勿謂旁帷上蓋天監無外勿謂後掩前扃神在無形天不長慝神實正直神怒天誅未始有極昔者趙盾假寐兢莊天回厥害鉏麑以亡又有符堅竊為制度神敗其類蒼蠅以呼天窺神窺人無不知神忿天忿身無所隱澗松抱節幽蘭有薰歲寒不變無人亦芬草木猶爾人其曷云恐懼乎其所不見戒慎乎其所不聞先師有言敢告夫君秦之坤蜀之艮連高夾深九州之險也陰溪窮谷萬仞直下奔崖峭壁千里無土亘隔呀絶巉巉冥冥麋鹿無蹊猿猱相望自三代而往蹄足莫之能越秦雖有心蜀雖有情五萬年間敻不相接且秦之與蜀也人一其性物同所宜嗜欲無餘門教化無餘源可貿遷可親昵擘坼地脈暌離物理豈造化之意乎天實凝清而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空隙有所不開回翔有所不合澄結既定窾缺生乎其中西南有漏天天之窾缺也於斯有茲地地之窾缺也天地也者將以上覆下燾含蓄萬靈可通必使而通者也苟有可通而未通則聖賢代其工而通之故有為舟以濟川為梯以踰山唯茲地有川不可以舟涉有山不可以梯及粵有智慮以全元造立巨衡而舉追氏縋懸纑以下梓人猿垂絶冥鳥傍危岑鑿積石以全力梁半空於木柵斜根玉壘旁綴青泥截斷岸以虹矯繞翠屏而龍踠堅徑膠固雲橫砥平總庸蜀之通途統岐雍之康莊都邑之能步山川之無脛若水決防如鴻向陽南之北之踵武湯湯躋峨峨以自若臨蒼蒼而不懼繇是贄幣以達人神會同稽禮樂之短長量威力之汙隆可王者王可公者公而相次以風或曰受琢之石長存可構之材無窮易刓代蠧斯道也未始有終嗚呼為上懷來在乎德為下昭德在乎義德義之如今日則或人之言有孚其反之則石雖存恐不為琢材雖多恐不為構想夫往昔有時而有有時而無是用惕惕天下蚩蚩知聖賢創物之意之人寡明德義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主德義者存今日之所履踵武湯者荷古人之攸作銘曰天覆地燾本亦備設大象難全或漏或缺損多益寡聖賢代工彼雖有缺與無缺同維北則秦維南則蜀地缺其間坤維不續斗起斷岸屹為兩區秦人路絶蜀火煙孤天實不通賢斯有造鑽堅剡徑無蹊以道若川匪舟若陸匪車緣危轉虛步驟交如構雖在功存亦由德項怫劉怒從完以踣隋落我營自顛而植地非革勢材不易林踣植之致惠怨之心勿謂斯道不恆勿謂斯道可久禮不以禮可有而無恭不以恭可無而有創之之意如彼固之之理若茲彼知不易茲而易知勒石道左其同我思嘗侍論於長者儳有之曰近代之作玉杯麗則麗矣愚以謂不如古人之為陶長者韙之以為知言退而思其所自多亦不忝伊人之譽器以利用道從易簡利用者貴無往而不適易簡者取立功而匪勤今天下之至富者土也不勞而成者火也夫陶掬壤以製焚蒸以凝就其不勞因其至富不瑩而冰清珠皖不鍛而金固石堅一工致功千室以給土角斗鬲罍甗瓶缶杯盂大窮儋石小極圭撮經鼎鑊而自若在燀爇而莫渝滿堂絶侈靡之譏提挈無剽殺之患其功則易簡也其實則利用也其藏又保安也易簡二儀之理利用五行之本保安立身之方執人之方履物之本從天地之理此三皇五帝所以內戶不扃外戶不閉無為之德所由生也豈夫玉杯之獨劣其餘孰得而儔焉則刓材搜璞窮山越壑礱磨雕琢鑄鍊丹雘力盡終年之功財殫不訾之産量才升合質忌湯火置家得奢盈之議中懷生賊害之纍其功則非易簡也其實則非利用也其藏又非保安也悖二儀之理違五行之本乖立身之方此夏桀商紂所以人人頗邪比屋可戮亡身之禍所由生也省費鮮勞皆備於物德且如彼而人賤之煩人蠧財不周於用禍又如此而人貴之久矣哉世之迷也物有賤而可貴亦有貴而可賤惟賢者能審之小子不幸億而有中誠背常人之見敬為銘以廣之銘曰黜汙易抔聖人製器易簡作程利用為貴稽諸往載陶實攸興裁因掬壤成假焚蒸不雘不丹不雕不刻自結金堅天然冰色財無害産功匪殫力量盡洪纖用窮幽仄物有千金相異我取不費為利物有積功相崇我取不勞為工物有患湯忌火我取往無不可物有剽殺焚軀我取懷藏不虞心存目視奢尋彼至室滿堂盈侈莫我生省庸周用所賤謂何賈害勤人所貴者那可貴不貴物失其類失類曰昏雖隆必墜可賤不賤物得其選得選曰明雖幽必見上惟五帝下洎三王實有以興亦有以亡蚩蚩百工孰若我陶敬銘有器永告滔滔曰臣節貴忠后德貴公忠則為其主所自盡公則於其人罔以私咨爾雍齒爾有臣節孔明豫以公心獎爾其敬聽豫言罔忒嗚呼昔嬴氏不臧流毒四海天將剿絶厥類假手於豫一人爾主項氏昧厥命木蠧豬突附振旁撓豫在泉未躍用困於彭地爾為厥主來戕豫實有必戮之志罔若天之歷數徂於豫躬俾泰山萬尋蔽於一葉豫於所自隱有見爾心於時爾為楚臣豫為漢人豫則爾仇敵爾宜討之豫罔攸憾今大寶歸豫夷嬴殲項豫欽若上帝惟天下君爾則率土之濱罔非豫民豫宜子之爾罔攸惕夫爵以尊德祿以養賢爾能致身於厥主孰若爾賢德豫分爾茅土以勸所事君爾奉上之誠罔易乎舊豫體元之政咸用維新砥礪爾能輔豫一人兢兢栗栗共闡大猷無使齊桓管仲專於棄瑕之美念之哉天雖覆育生生如其情則或與或否其與也非徒與其否也非徒否受命有生生者率其道反其道之致焉率則與反則否斯理也固必信至皇帝以孚皇唐百七十有一載皇帝御宇之十四祀也歲在辛未實貞元七年其受命率道天與生生如情之秋與神哉靈哉明允惠和哉是歲之天也亭乎其正洞九霄之清徹清徹之中若有伺夫有求者鬱乎其變浮五色以薰郁薰郁之中若有察夫所厭者稱物之性應時之欲手足之赴人心羽翼之循鳥情農夫在畦蠶婦在林商或舟車工或土廷雘願燥願濕罔不從志其餘則三光序流六氣時行上至事事下洎營營羽毛鱗介勾甲芽萌求諸濡渥則常雨求諸煦旭則常晴求諸吹蕩則常風求諸恬謐則常寧求諸煙雲則常陰求諸日月則常明非不雨也非不晴也非不風也非不寧也非不陰也非不明也合雨而後雨物不乏其雨合晴而後晴物不乏其晴合風而後風物不乏其風合寧而後寧物不乏其寧合陰而後陰物不乏其陰合明而後明物不乏其明實皇帝知上帝以生生為己物與其禍福配己得失而置之欽若兢若溫如穆如心性二儀支體四時似續上元之效與夫人子能領父之憂承父之命繼堂紹構得其心贈遺獻酬愜其衷則財賄器物唯意是役牧圉臺隸惟意是用以其役無不當也以其用無不宜也土德勝隋天實維唐皇帝則唐天第九子也既克負荷上天所以唯意焉且煙雲風雨亦天之財賄也日月星辰亦天之器物也神祇精靈亦天之牧圉臺隸也是以皇帝動息神祇莫不隨旨趣精靈莫不申肅穆寂寥駱驛虛無囊篋日月管鑰風雨敬恭誅責而啓閉多少之故將蔭休施煙雲若自諸帷幕而使舒張矣將灑潤散風雨若自諸盆翣而使澆扇矣將烜清晝布陽德若自諸罏竈而使燀灼矣將光幽夜啓陰靈若自諸燈燭而使昭明矣處置唯滋含靈不折莓莓熙熙蓋子祇父慈相為福釐也凡書惡記善雖史官之職針人述德或人所通規鯫生則人之一夫耳謳吟日用而為之志若簡册已載復何言哉儻猶未也庶補其闕是歲也扶風竇公參河中董公晉輔政之三年趙郡李公紓為天官之四年范陽盧公徵為地官之元年范陽張公濛為春官之三年昌黎韓公洄為夏官之三年吳郡陸公贄同為夏官之二年京兆杜公黃裳為秋官之二年清河張公彧為冬官之五年夫太宰六官於天子之為理棼澄泒而清洪流者故列於斯志之末昔卞和以荊山之璞獻楚懷王王曰非寶也刖之次獻於平王平王亦曰非寶也又刖之世皆有二君不識寶之議小子鄙慮嘗致於斯瞜瞜然若見二君之意後世議者脫未之思焉夫國之安危人之邪正如影與響繫乎后躬于則從而于易則從而易珠玉者勞之母財之蠧侈之本害之圃國君好之下必從之則將有不耕而搜山不藝而攻石背義而忘仁輕穀而賤帛耕之隳藝之墮穀之散帛之耗義之虧仁之挫則國從而喪矣古人有言曰不貴難得之貨使民不為盜又曰大寶曰位二君所言卞氏之璞非寶者蓋寶此者也不然玉之與石猶菽比麥雖至愚昧亦或辨之况二君乎縱時狐疑忍愛玉人須臾之功不試琢磨於一石而忽先王之法輕絶人之四體歟甚不然矣實將抑奇玩去無益翦奢靡之萌啓淳龐之迹欲其塊桴土鼓上復於羲軒象箸玉杯下銷於辛受四方風行而自化百姓日用而不知也大功無形至德無名人以瑣瑣之智莫覩冥冥之情昔宋玉以蕃禽井鮒不測靈鳳長鯨信哉嗚呼使仲尼居今則與秦伯同稱矣小子不敏竊述其旨以佐知言云述甘露昭孝德也貞元壬申歲福州福唐縣尉清源莆田邑人濟南林公瓚太夫人終公每一痛至水漿不入口或三日或五日內外羸憊殆至殞滅癸酉將與先府君修合葬之禮公之於親事存既竭其力送終思盡其勤曰含禭品章則有王度不敢或越也塋域固護實在我私當懇行之而已於是躬開坎室自埏磚甓與兄弟手攻肩負以鑿以築雖率情性而無法度不違典禮而有異常儀載考載理而未之窆春三月五日忽異氣自天氛氳下蒙非雲非煙羃羃帛丿糸帛丿糸彩耀光鮮馨香馥然起朝及暝徘徊不散先是繞壟已栽松柏洎晨枝葉間遍懸露滴其滴齊大如梧子公奇之與兄弟及鄉人時相慰者而嘗之其味甘異於人間所甘之味日漸高不銷不晞轉堅轉明瑩然珠相鏗然玉聲如是者三日覩者爭取或食或玩噫天冥冥其間蓄靈地陳陳其間蓄神靈無形神無身無形無言無身無聲苟有可褒以物而旌苟無可褒物不虛行其德常其物常其德稀其物稀豫聞甘露之説莫覿甘露之實其為稀也不亦甚乎今為公而降公之德豈常德歟况殊香啓途異彩相宣凝結豐圓向日翻堅者哉則其至誠所招又多矣豫執弔禮幸獲而見珍聳不足遂為之述嗚呼死也者君子曰終有唐興元二年六月二十四日銀青光祿大夫行平州別駕馬公終於京師國喪英才家亡令子家國不幸痛毒可知公諱某字某其先京兆扶風人始實趙氏纍葉繼將多總戎塞下有以因居今為燕之名流曾祖某某官祖某某官父某某官公則某官第某子也積奕世忠貞之慶得陰方嚴徑之氣天骨山峻神蔥玉輝有孝有悌閨門以和有信有義州閭以附矛戟韞器風雲馳聲燕趙多奇士公其人也用正直奉籌略擁旄仗節者尊以果斷行政令擐甲執兵者伏前後佐全師大幕不有暫寧方將張翼翔雲揚鬐遊溟大命不永大病遄及享年三十三秦氏醫遲顏生禍促哀哉夫人某處某氏子二人長曰縱次曰緒永思之感至性過人以貞元十二年歲在某月某日大通卜宅於京兆某鄉某里某原禮也天長地久堙川塹阜於何不有乃為銘德而志墓云士比常才如瑜在珉燕趙多奇公則其人業繼忠貞識資籌略器流瑚璉羽族雕鶚題輿大郡佐律雄師雖猶在德亦匪孤時南仰搏鵬更期遐揚東觀逝水忽茲永往卜遠斯及窆於此岡惟安惟永地久天長公諱某字某其先關右宏農人永嘉過江公自始遷之祖若干代處於閩越曾祖某皇唐循州司馬祖某漳州長史父某泉州南安縣丞公則南安第若干子長七尺骨目王褱異溫良節行所至自昭風神識度㣥居不掩六籍外偏好穰苴管子之術永泰中以耕戰之法致梁宋軍畫用有成大歷元年節度使右僕射田公薦授左武衛率府倉曹參軍事在位以貞慎聞公以不仕則墜業躁求則背道或出或處聖人為中依吏部節文敬遵常調大歷八年集授吉州永新縣丞興元元年集授廬州司田參軍貞元二年授鄂州司倉參軍纍職貞慎如率府倉曹時每罷官待集卜勝屏居晏如也鄂州秩滿愛其風土亦止焉貞元十二年冬又合集春赴京師遇疾於途以二月四日終於汝州龍興縣之逆旅時年六十七凡入仕三十一年歷官四政祿非豐儉以足務雖劇通以簡上以中正重下以公平矚皆白圭無玷朱絃有聲嗚呼公之材之量如鐘含音如水待盛大小當應方圓必合我則不衒人胡不求莫能全展光耀以至殞沒悲夫夫保性居業時行則行時止則止道也公昔於名宦之理是焉士祿農耕猶生則營若死則已亦道也公昨於歧路之役是焉公存以道始亡以道終至人不違道公與之周旋正矣乎善始終者也夫人隴西彭氏戴天之感痛以禮成長子晃次子暈季子杲伏凶之號以至見血以某年某月日卜葬某鄉某原禮也佳城一閉他時古邱後之人孰知邱中之德墓許有志故為墓志銘庶覩今為古者明斯地泉下有君子焉銘曰一種鱗物神則曰龍一種植物貞則曰松楊公於人被貞役神藝術潛宏溫良內克名不稱實祿有負德夭桃信美不能秋敷冬日可愛亦用西徂大期斯來無賢無愚英英楊公與逝川俱卜此修原有形永宅東海西山其廬罔易墓有志志有銘志記也銘名也名之記墓庶高岸為谷幽壤或呈情當掩者有所歸認斯馬公之墓也公諱實字某其先扶風人生於幽州高祖某某官祖某某官父某某官若干子皆以雄謀果斷稱公則第三人長八尺有羡雕姿鶚靈霜嚴壁峻樂而後笑時而後言孝弟忠信分義節概覩容可見好史學歷代英豪得失皆核其有不正不直辨論慷慨若加諸已明陰符善司馬法起家為范陽軍要籍本軍疑政畫多自出遷千夫長萬夫長三軍兵馬使莫州近邊戎數為害本軍元帥請統鎮之戎遠逃遁莫人大乂拜御史中丞莫州刺史俄薊州之患如莫州移薊州薊人繼康攝州刺史貞元初本軍之事有大者合議於天子自管內二千石已下擇賢能以公當其選天子異其議奇其詞決所議答於本軍而留近侍拜左驍衛將軍宿衛十一年長松在林利錐處囊森竦穎脫鋒幹獨見天子儲而將用未有所當貞元十四年寢疾其年七月十一日終於京師常樂里之私第出身從事若干年署職蒞官若干政春秋五十一當時俊傑懷材抱器者無不驚呼嘆息嗚呼騏驥有騰千騁萬之足伏乎櫪干將有剸犀截象之鋩閉乎匣將用未用一朝變化為骨燕市入泉延平為知人之痛惜公其比歟夫人雁門田氏雁門郡王某之女哭泣之慕痛而中禮男五人一人先公卒四人在曰綬曰縝曰某曰某綬年三十八縝年十五其餘幼稚不言可知女二人一人先公卒一人在四歲至性攀號感動飛走以某年十一月一日卜葬於京兆府萬年縣洪固鄉延信里司馬村之少陵原禮也其承眷長沙歐陽某執紼及墓就志而銘曰骨肉歸土賢愚共門英英馬公亦封此原大節大成平生所志貞心壯氣松孤壁峙掄擇雖致材成則未岑崟蒼翠俄摧忽墜修短無涯傷如之何貞元十一年歲次乙亥某月某日清源郡晉江縣君子鄭公年若干終於其居州閭親識遠近漣涕重吉人也嗚呼梓植於深林人雖不知不妨其為天下之材也珠玉碎於重泉人雖未玩不妨其喪天下之寶也公之生則深林之材公之歿則重泉之寶不知而有未玩而亡哀哉公諱晚字季實其先宅滎陽永嘉之遷遠祖自江上更徙於閩今為清源晉江人曾祖某官祖某官父某官太夫人同郡潁川陳氏育者三男三女公則長男也自七八歲則明敏嚴潔無復童心洎十二三則溫良貞亮有成人之德既冠儀表可觀孝悌惠和侔於前哲人望無間時譽皆歸鳳不近腥龍多自盤優遊仁里四十不試詹有若人之妹獲配於公公太夫人早世妹不逮事則見公霜露之感蒸嘗之敬公尊府君近捐甘旨妹及同養則見公晨昏之愛縗斬之至奉公居閨門鄉黨者十有五年顧詹於公善良內外兼得受命不永其如命何蘭芬蕙馨或亦中敗惜哉子二人皆幼公在日名之曰彥方彥章詹既在京師不遂撫慰來人有述實孺能號妻亦聞哀有過人禮不踰制窆取遠日堂殯三年以貞元十二年某月日永厝於郡城東偏聞儒里常熟湖之北原禮也妹有遠告咨豫題志既忝真懿實舊知人江嶺則遐想像不昧取思芳茂為銘以寄銘曰有斐季實君子之禎忠信溫良自幼而行少不改任長更推誠材植遠林實産遐壤無知無玩自生自喪骨肉歸土用瘞斯原嗚呼斯原永棲君子之魂貞元九年某旅行虢州稅於村店有一黨先止焉老翁一人丈夫一人婦人一人孩幼兩三人丈夫出絹兩匹賣其囊裹衣服非稱有其絹者視絹有字乃故人鄭師儉手題其名焉問所得曰來自襄陽至臨漢之北郊有閔吾父年老而所乘驢弱者遺此絹使與驢博驢問得姓名乎曰其人扶護親喪回上京不知姓名也某既占鄭書又知鄭侍君靈櫬自南當由彼而還也意其必鄭焉不復問焉各遵所往貞元十一年獲與鄭遇因道所見鄭歔欷為言之曰豫章之回次南陽大澤見一貧翁乘驢驢甚瘠一丈夫肩負雜物可三十斤妻抱半歲嬰孩童稚驅行兩人山路初盡始行陂澤屬久霖雨泥水深老翁瘠驢往往顛踣丈夫則翁之子也每見驢倒擲其負若泥若水無顧惜扶抱洗拭淚輒盈目倒既數悲不自勝遂以所負置諸驢而負其父平田積雨潦淖到脛不至店舍竟無憩歇父在子上殊自安暢子在父下亦盡歡心父與子笑子與父笑如同乘高車連轡逸騎怡怡焉欣欣焉與之行止者三日日無易日時愛其事父母能竭其力也又痛自欲竭力已無其所贈絹一匹令與驢博驢代以載父其人將求驢者三店知欲分路去其絹曰無驢可博願復本絹始嘉其孝又貴以忠為度一絹博驢未就更與一絹自此東西足下之見豈斯人歟某以如其人所行是難能也是亦皇唐純孝一人焉行既可述遂以鄭説為之傳其間問其姓氏亦不知何許人實於南陽澤中見之還以為南陽孝子論曰負父信孝矣而贈絹非孝歟唯其有之是以似之鄭與南陽孝子偕孝矣弔傷而有辭者也噫九江驛之碑其何興辭而弔歟斯碑之材昔太師魯國顏忠肅公所建祖亭之碑也公素負辭華昭代之銘志多公之辭又好采異留名之致頃為湖州牧州産碑材石每使工琢之與詞兼行磨礱而成常心使用者不可勝數斯碑也終山之窮僻得之於自然趺本有龜護頂有螭雖不甚成而拏躩僨興如神如靈公神而珍之精選所處湖州無稱立罷守回朝載而途卜出蘇臺入毗陵亦無稱立轉丹陽遊建業亦無稱立次江州州南有湖湖東有山蛟奔螭引直至湖心頓趾之處則茂林峭石勢王褱氣勝非往時所睇而神祠曰祖將軍廟在焉公覿其詭秀與碑材叶即日以酒酺奠其祖神出錢五萬造亭曰祖亭南香爐峰北潯陽城九江為庭千艘歷階亭既就公製亭之文手勒斯碑而立之公文為天下最書為天下最斯亭之地亦天下最庶資三善加以斯碑之奇相持萬古而采異留名之致一得也後典州吏於州之九江驛有修坯之勞狀其末績乃取斯碑剗公之述置己之述今為九江驛之碑焉豫旅遊江州稅於茲驛祠部員外郎鄭恕同之鄭與州將嚴士良共為豫説而俱以相示嗚呼先賤後貴世之常也先貴後賤人之傷也以祖亭方九江驛則蘭室鮑肆矣以魯公之文方今之文則牢醴糟粳矣以魯公之札翰方今之札翰則錦繡枲麻矣以魯公之用方今之用則華夏夷狄矣痛哉斯碑出祖亭入九江驛失魯公文得人之文削魯公之札翰題人之札翰亡魯公之用就人之用是去蘭室而居鮑肆捨牢醴而食糟粳脫錦繡而服枲麻黜諸夏而即夷狄可悲之甚者况我質天成必將可名魯公所以卜擇敬慎如彼而常人無良黷辱如此與有道而黥無罪而刖投四裔禦魑魅何以別邪石不能言豈其無冤故弔之有文曰情違乃傷理怫乃冤人實有之物亦應然嗚呼子碑冤可豫知陰隲子材豈曰無意必有以殊方頒以異與顏表勝以殊則名從吏居卑以異奚旌子産既授子不終致悠悠彼蒼何嗟及矣美玉抵禽高冠藉足有類子碑先榮後辱繼世生哲詎無賢兮將覿於斯將悼於斯庶滌所黷而復攸宜屹屹子碑如神如祇人得以專天造何為其不然矣其不然矣
