front:
  text: 全唐文欽定全唐文卷六百四十九元稹三
  hash: sha256:ed5cc3285ea3be0168c80799c43d450e66eb1fd56be0b58d5c2097ba1781be29
body:
  text: 勅李拭韋虔度等明皇而下其屬未遠諸王在閤朕得時序其寒溫睿宗而上五十餘族長幼秩序盡委之於大宗正苟非能賢不敢輕授以爾拭踐履中外論備古今主宗之盟綽有餘裕而執事者又曰殿中監總六尚以供名物當進圭進爵之時不敢虛位僉以虔度文學儒素旁通政經執憲南臺挺直不撓以之代拭允謂其良仍假左貂之冠加於宗正之首朕不能無意於吾屬也拭可檢校左散騎常侍兼宗正卿虔度可守殿中監餘如故勅農天下之本也故國有九列而司農氏居其一焉前代非牟融之循理康成之儒學不在茲選今海內無事思與公卿等樹立根柢以制四方是用外選方伯之善職者入補茲任謂之恩榮具官裴武予聞其先始以孝友書其國籍其後累有丞相為唐名臣賢彥因仍代濟不絕武亦嗣其忠孝益熾家聲鬱為元僚所至稱理嘗居內史屢入正卿自華至荊無非劇地鈐轄豪右衣食煢嫠嚴而不殘仁而有制鎮定南服予方賴之而亟請來朝因求內任嘉其戀我難奪乃誠假以秩宗之榮用制國泉之重費而不屈爾其勉之可檢校禮部尚書兼司農卿餘如故勅朕日出而御便殿召丞相巳下計事而大京兆得在其中非常吏也誠以為海內法式自京師始輦轂之下盜賊為先尹正非人則賢不肖阿枉奏覆隔塞則上下不通假之恩威用讋豪右具官盧士玫自居郎署執政者言其溫重不回守法專固副內史事物議歸之日者景陵將建龜筮有時予心怛然懼不克濟爾嘗倅職應其供求和而不同儉而不隘竣於巳事朕甚嘉焉試命元僚亦既不撓今圜丘甫及慶澤將施攘剽椎埋必有幸生之者案牘卒吏亦當因緣為姦公費則多而利不下究惟是數者爾司其憂為爾正名無吝操剸可權知京兆尹餘如故勅卿寺甚重不易其人其或以勳以親以報以勸又何愛焉檢校大理少卿駙馬都尉劉士涇去嵗西戎跳入涇上京師戒嚴朕慨然有思廉頗李牧之志而習事者言爾父司空之在涇也築平涼等八城一堡塹保定平原使涇人益樹麥禾以復后稷公劉之教十有六年犬戎不敢東顧朕聞其人思見其後果有令子在吾懿親與之討論自亦奇士鋪陳將畧殊有父風訪其班資則曰亞諸卿之間嘗十年矣今乃除其憂服命以大僚豈惟報爾先臣榮吾戚里亦欲使緣邊諸將視其愛子為我竭誠可守太僕卿駙馬都尉餘如故勅書曰沖子嗣則無遺壽耉朕以眇末憲章祖宗是用錫於邦伯庶尹至於舊有位人式示知恩以期於理而裴堪等奉事先帝無非舊老更歷中外備有典刑以疾以年皆致厥政遺名自遂勇退推高並沐新恩例升榮級裨朕厥德猶俟安車可依前件勅具官于季友天子六軍必有材官佽飛超乘挽強之士在焉董之以威待之以信分八含之衆寡均二廣之勞逸不吳不揚不掉不挫皆將軍之命也是以李大亮上直禁中而文皇甘寢則心腹爪牙之任斯不細矣以爾季友時予舊婣念徃興懷度才思用榮以服色列於藩垣爾其恭敬無替朕命可守右羽林將軍知軍事仍賜紫金魚袋勅邵同修好息人古之善政至於兵交而猶使在其間况西戎舅甥之國為日久矣前命使臣洎介臣賈持節訃告且明不侵不叛之誠而洎等詿誤戎王為國生事廢我成命咎有所歸而猶彼國君長戒吏乞盟無言不酬思有以報以爾同科甲言語職宣詞令備習地訓周知物情識汲黯之便宜得月氐之要領命汝報聘達予深誠夫用爾之直去其踈用爾之權去其詐用爾之剛去其忿用爾之慎去其疑繼魏絳之和奮由余之智使朕高枕無西顧之憂者在同此去同其勉之授以亞卿仍兼獨坐回無辱命賞有彞章可守太府少卿兼通事舍人兼御史中丞持節充入吐蕃荅請和蕃使餘如故勅元宗簡劉約等敘彞倫節浮競必在於遷次有準以崇廉讓之風是以置具員限資考而猶幸得貪求之士不絕於埃塵間今古之常也聞爾等端靜廉雅行浮於名非公事未嘗至於卿相之門何其自持之優也內史貳秩重而不煩中臺諸郎清而無雜各勉榮授無移素風宗簡可權知京兆少尹約可行尚書司門員外郎並散官勳賜如故勅侍御史內供奉劉師老郭行餘等曩者劉悟以全齊之地斬叛來獻惟帝念功始以鈇鉞棨㦸元纛青旗命悟建行臺於鄭滑得置軍司馬以下官屬妙選賢彥以司謨猷師老行餘皆以天子命為悟僚介會悟遷領他鎮爾等實來握蘭懷芸皆授清秩出入甄異又何加焉師老可尚書右司郎中行餘可守秘書省著作郎餘如故勅吏部郎中楊嗣復官天下之文武重事也兵部郎中二員一在侍從不居外省旁求其一頗甚難之而執事者皆曰近以文章詞賦之士為名輩由此者坐至公卿嫻達憲章用是稀少而吏曹郎嗣復州里秀異議論宏博宜其以所長自多然而操剸吏事細大無遺用副虛求允謂宜稱爾其試守茲任為予簡稽苟能修明旋議超陟可權知兵部郎中餘如故勅二帝三王之所以仁聲無窮績用明而刑罰當也尚書郎專是兩者疇將若予僉曰前國子博士充史館修撰鄭涵文無害可以彰善惡守歙州刺史馮宿思無邪可以盡哀敬庶尹百吏之能否四海九州之性命用汝參斷汝其戒之夫刻則害善放則利滯則不通流則自撓惟是四者時考之難亟則失情緩則畱獄深則礙恕縱則生姦惟是四者時行之難八者不亂然後可以有志於理矣朕所注意爾其盡心涵可考功郎中宿可刑部郎中餘並如故勅行刑部員外郎飛騎尉高允恭書云明德慎罰明猶慎之况朕不德茲用省於有司之獄莫不伏念隱悼周知物情惟爾允恭告我祥刑罔不率協稽爾明効陟於他曹大比生齒之書仍掌折毫之牘戎車方駕物力未豐剖滯應期斯任不細推爾惟恡之意罔或失財用爾無害之文以懲刻下恡不欲過過則不終文不欲繁繁則不逮率是二者時維厥中可守尚書戶部郎中判度支案散官勳如故勅御史府不以一職名官蓋總察郡司典掌衆政副其丞者是選尤難而御史丞僧孺首以朝議郎守尚書戶部郎中判度支案飛騎尉高允恭聞於予曰允恭始以儒家子能文入官在監察御史時分務東臺無所顧慮為刑部郎中能守訓典復以人曹郎佐掌邦計懸石允釐撓而不煩簡而不傲靜專動直志行修明乞以臺郎兼授憲簡雜錯之務一以咨之朕俞其言爾其自勉無俾僧孺狹於知人可以本官兼侍御史知雜事餘如故勅守起居舍人賜緋魚袋栢耆朕聞亟遷則彞倫斁滯賞則勞臣怠兼用兩者謂之政經夫南憲右掖至於中臺我朝之極選也俾爾環嵗之內周歷茲任豈無意焉元和中盜殺丞相疾傷議臣齊冀之間交以禍端相嫁耆自青谿窖中提轉丸捭闔之書馳於諸鎮使承宗疑否隔塞一朝豁然納質獻地克終於善承宗既沒承元授事耆又將朕教告命於承元萬衆無譁一方底定此而不錄將何以勸凡百多士無忘急病之心可守尚書兵部員外郎賜緋魚袋勅行而不息者時也久而不可泯者書也微史氏吾其面墻於堯舜禹湯之事矣尚書郎亦有會計奏議之重非博達精究之才其可以充備茲選乎高釴何士乂等富有文章優於行實捃拾匡益殆無闕遺前以東觀擇才因而命釴視其所以足見書詞俾伺朕之起居遂編之於簡牘不亦詳且實耶而士乂亦以久次當遷移補郎位允膺清秩無忘慎終釴可守起居郎依前充史館修撰士乂可尚書水部員外郎餘如故勅朝議郎前坊州刺史賜緋魚袋班肅馳競之徒能於寒暑之際不以憂畏移其薄厚之道者鮮矣聞爾為祠部員外郎值吾黜姦之日遊其門者莫不跧竄奔迸懼罹其身唯爾安分不渝進退有素搢紳之論有以多之復爾中臺以厚吾俗勉慎其始無輕所從可行尚書司封員外郎餘如故勅殿中侍御史充史館修撰獨孤朗左拾遺韋瓘汝等皆冠圓冠曳方屨以儒服事朕朕甚偉之朗能彰善癉惡屬詞可觀瓘嘗旅進廷爭極言無隱求所以補朕過失從而記之而又書丞相巳下百執事舉措以為來代法非爾而誰是用命爾遞遷諫列次補外郎竄定闕文裁成義類此仲尼春秋之職業也爾等自謂何如哉其可上下心手於愛惡是非乎朗可尚書都官員外郎依前史館修撰瓘可守右補闕充史館修撰餘如故勅權知倉部員外郎判度支案范季睦野有餓殍不知發狗彘食人之食不知檢此經常之失政也而况於戎車未息飛輓猶勤新熟之時豈宜無備乃詔執事聿求其才乘我有秋大實倉廩僉曰季睦副予虛懷汝其徃哉予用訓汝夫廉賈五之不爭之謂也出納必吝有司之常也貳上下之價則茫昧者受弊雜苦良之貨則豪右者受贏惟一惟公乃罔不同惟平惟實乃罔不吉爾其戒之無替朕命可尚書倉部員外郎依前判度支案充京西京北糴使餘如故勅朕聞衮職有闕仲山甫補之蓋所以節宣天子之嗜欲而彌縫其不及也我國家設司諫署以神明其耳目凡在茲選實難其人監察御史楊汝士等文擅菁華言無枝葉更佐大府為時聞人是用置爾於左右前後拾遺補闕苟言之而不用時予之不明或抑之而不言惟爾之不恪方我傾聽之始命爾司聰之榮各懋厥誠無悼後悔可依前件勅朝議郎守尚書比部郎中賜緋魚袋唐慶輦轂之下豪黠僄輕擾之則獄市不容緩之則囊士冖䂞相聚是以前代惟京令得與御史丞分進道路以其捕逐之急也執事言爾慶榷朿池鹵生息倍稱布露飴散於羅落之間而盜賊終不敢近推是為理真吾所求之劇令也無或畏避以艱惸嫠可守萬年縣令餘如故勅前監察御史裏行李珝比制多以詳練法理者行於御史府或滿嵗即真或不時署位亦試可之義也以爾珝文學周敏操行端方執喪有聞俯以就制復爾故秩勉修乃誠可行監察御史勅前東都畱守推官將仕郎兼監察御史王永朕明年有事於南郊謁清宮朝太廟繁文縟禮予心懵然雖舊章具存而每事思問求可以教諸生習儀於朝廷者有司以永來上永其勉慎所職無令觀聽者有云可守太常博士勅朝議郎京兆府士曹參軍李從易昔劉氏子孫在屬籍者十餘萬我唐光有天下二百餘年伯仲叔季幼子童孫可勝道哉第其賢能以次序昭穆皆吾宗寺之職也凡在選任每難其人以爾天屬謹良修明吏理檢身好學有儒者法儀宗長以聞朕不敢議承上莅下無忘敬恭可守宗正寺丞勅守門下省符寶郎賜緋魚袋盧均等辨色而朝百辟輯瑞以會萬方正錯立族談之儀宣注意登庸之命鏘鏘濟濟進退以時名為侍臣以贊導吾左右者通事舍人之任也今郊丘有日事務方殷爾等各茂聲光副朕茲選宜膺寵命無廢國容可依前件勅安邑解縣兩池搉鹽巡官監察御史裏行顏峴古者公卿之子代為公卿所以貴貴也况賢者之後死政之孤寧繫班資以礙升獎惟爾峴嘗與從父太師深犯蜂蠆毒螫之下太師沒焉爾之不回幸而能脫終超逆地來謁奉天列聖念功訪求太師之後有司昧蔽不以爾聞今朕將建東朝深思贊諭異時使朕愛子知忠孝之道如爾峴吾何患焉可守太子右贊善大夫餘如故勅奉天定難功臣壯武將軍行右清道率府率上柱國賜紫金魚袋左龍武軍宿衞荊浦等初朕宅憂西廟祗受丕訓爾或執攜金吾清道前馬或操總戈㦸立陛周廬星拱翼舒誰何不若迺詔超陟因及序常用報有勞且升久次各揚其職無棄厥司可依前件勅奉天定難功臣壯武將軍守右內率府率充左街副使上柱國王惠超等率侍衞以導從吾於黃麾左右者皆東朝之勤吏也乘我出震之憂逢時作解之慶咸當序進式示加恩並列周防宜勤夙夜可依前件勅朕讀詩至於羔裘緇衣之章未嘗不三復沉吟蓋明有國善善之功且思舍命不渝之君子也春秋時鄭多良士是以師子大叔之政而㣥盜之氣潛消聞㯋考叔之言而孝子之心不匱山川在地日月在天今古雖殊人存政舉文林郎守相州刺史兼御史中丞賜紫金魚袋崔宏禮操心尚氣餘力有文感慨風雲號為奇士累更大郡備有休聲予聞則多未校其實侍中宏正以課來上書為第一不有升陟謂之蔽能得於信臣子用丕允郊圻密邇美惡日聞爾其歌雞鳴以自勤稽風雨以守度與我共理副其所知可使持節鄭州刺史餘如故勅朝散大夫守京兆尹上騎都尉元佑風俗之薄厚由長吏之所尚也聞爾佑以甲乙科為校書郎甚有名譽一朝以先臣不幸為黜而自晦其身者二十年何其為子之多也自歷朝序仁聲益彰不雜風塵而徽猷遂遠洋州近郡美惡足以流京師將以慈惠廉讓之道長理之此吾有望於爾矣可使持節洋州刺史勅盧山郡貫平羌江帶卭峽關西南蠻經闕之地也大理寺專獄犴視刑書我國家生人之司命也任非其才為患不細前鄜坊丹延等州觀察判官侍御史內供奉賜緋魚袋袁重光佐觀風於鄜畤聞有能名前湖南都團練判官兼監察御史李踐方參練卒於湘中號為柔立宜當慈惠之選且盡哀敬之心姑務勝殘無或枉撓佇爾布政叶予好生重光可使持節雅州刺史散官勳賜如故踐方可大理寺丞勅尚書刑部郎中齊煚岳州刺史王堪等隸江之西饒為沃野澧亦旁荊之劇郡而鄱陽有鎔銀擷茗之利俗用剽輕政無刑威盜賊多有沅湘間沉怨抑激有屈原遺風吏無廉平人用愁苦惟爾煚洎堪等皆踐臺閣亟歷名部號為良能俾分兩地之憂佇聽二天之諺煚可使持節饒州刺史堪可使持節澧州刺史餘如故勅饒州刺史元藇等自天子至於侯甸男邦大小之勢不同子育黎元其揆一也是以郎官出宰百里牧守入為三公此所以前代稱理也近俗偷末倒置是非省寺以地望自高郡縣以勢卑自劣盤牙不解稂莠不除比比有之患由此起今餘杭鍾離新安順政三有財用一鄰戎狄將有所授每難其人以藇之理課甄明以宏度之奏議詳允以元亮之學古從政以公逵之守道立身僉命為邦庶可勝殘而去殺矣敬奉詔條用慰㷀獨可依前件勅朕子育黎人懍乎懼一物之不至將我德澤流布於遠邇者其惟良二千石乎前京兆府富平縣令韓察等久於史職皆著能名昔嘗奉詔條風聲尚在或歷居郊甸惠養有方命汝臨人勿違其俗夫明近於海懦則姦生通理於巴急則吏擾沔當津會滯則怨起推是三者引而伸之然後可以憂人之憂矣爾其勉之可依前件勅守衞尉少卿襲邢國公韋行立聞爾貴遊之子也出入省寺二十餘年終無尤違斯亦鮮矣江南諸郡戶籍非少皆有賦入之難爾為吾徃理縉雲以宣朕化無虐惸獨俾傷惠和可使持節處州刺史勅元從奉天定難功臣行右羽林軍大將軍兼御史大夫王進岌冀方陶堯之所理也其俗質強有古人遺風兵興已來習為奮武之地非勇毅仁隱之者不能兼牧其甿以爾戰伐居多班資已重副朕茲選必有可觀夫理亂繩唯緩之龔遂之政也忠信可以服暴強仲尼之言也率是兩者以臨其人吾無憂於千里之內矣式兼亞相周賁外臺可開府儀同三司使持節行冀州刺史兼御史大夫充本州團練守捉使功臣勳封如故勅前使持節守忻州刺史賜紫金魚袋論倚日者議鎮之勞例皆甄獎有吏姚泌早聞其勤因以泌為忻州刺史會泌隱惡彰敗不終其任司空度上言前刺史倚忻人懷之復換他守人用不協遂仍命爾以便於忻勉居舊邦無替前効可使持節忻州刺史勅夏綏銀等州節度都虞候檢校太子詹事王元琬河朔之間豐有水草內附諸夷多以畜擾為事吏二千石巳上皆能拊循競致侵削藉其蹄角齒毛之異廉者半價而買貪者豪奪其良困於誅求起為盜賊朕甚患焉近以戎臣祐旁領四郡奉宣詔條祐以元琬僉曰公幹乞為圁陰罔或不臧貽祐之恥可使持節都督銀州刺史充本州押蕃落使餘如故勅封州刺史陳諫倜儻好奇之士常患於不慎所從負累於俗過而能改人其捨諸以爾諫敏於儒學志於政經自理臨封尋彰美化分憂是切滿嵗宜遷始求循吏之才以撫遠方之俗爾宜樹德朕不記瑕可使持節循州刺史勅前順州刺史賜紫金魚袋萬憬皓赦所以宥不幸也爾乃郡守無違詔條而以疾罷去非不幸歟今朕還爾符印俾臨高要之人守吾憲章則有辟可使持節端州刺史餘如故勅臣藩洎逢吉尚書於陵所請劍南西川節度判官某官趙真長等皆以文學政事得參公選觀其列狀尉薦甚勤人各有志朕無不可矧以羊祜之風流盡在文翁之學校復興咨爾真長等無替令猷勉當毗贊淮河之師旅近息荊江之賦入素殷咨爾應等無瘝厥官以擾生聚各揚乃職用副朕懷真長可行某官依前充職應可某官充戶部巡官勾當河南闕二字等道兩稅餘如故勅前汴宋亳潁等州觀察推官殿中侍御史內供奉賜緋魚袋王沂前宣武軍節度推官監察御史裏行范傳規等比制諸侯吏府罷則歸之有司以第敘常秩近或不時以聞謬異前詔朕申明之以復故典而去嵗司徒宏以沂等入覲因獻其能越在後庚之前且寵上台之請命汝好爵時予加恩勉字邦畿無虐黎獻沂可河南府永寧縣令傳規可陝州安邑縣令餘如故勅前河南府登封縣令吉旼畿邦之宰任得其人蓋有以乂我黎庶足以張吾京師也自輦轂在鎬洛務輕長令之善康東人者徃徃移隸內史今京兆尹季同以旼有幹蠱之稱流聞於西遂陳換縣之求無替字人之術可守京兆府渭南縣令勅前江州司馬員外同正員駱怡等一眚而去其人則改行自新之徒蔑由進矣况吏議不一負累多門原陟不必終於廉夫而周處卒為名士此亦曰曩時之明驗也爾等受譴既久省宥斯頻各勵日新以期天秩並復資品宜乎慎終可依前件勅前洛陽縣尉裴溫等南極北向戶北至於桂林旁帶邕容分置征鎮而南海尤居劇地舊制輒得臨莅諸管參酌庶務茲惟郡僚溫等受知於人為報不易勤盡檢白可以無瑕可依前件勅前河中府參軍韓克從聞爾之齒長矣而猶趨馳冉冉其何以堪今命爾為東朝舍人以司贊引豈獨加之恩獎抑亦示其優容宜勤厥官以服休命可守太子通事舍人餘如故勅容州兵馬使試殿中侍御史崔方實蠻蜑之間有黃賊者跧竄窟穴代為侵攘南人患之為日固久而公素破其酋長大獲俘囚檄奏以聞朕實嘉尚是用錫其使者金幣器服而又試為崇班俾耀遠人以勸來効可試太子詹事餘如故勅成德軍節度衙前馬步都知兵馬使檢校右散騎常侍使持節澶州刺史兼御史大夫充本州防禦使李歸仙去嵗成德換帥之際人皆効忠惟爾職在轅門位兼符竹功實居最議當甄升而宏正以收長親人遙領非便司武故事兼可理戎並仍帖秩之榮式遂上台之請可檢校右散騎常侍兼鎮州右司馬替元闕兼御史大夫餘如故勅齊煦等今一邑之長古一國之君也刑罰綱紀約畧受制於朝廷大抵休戚與奪之間蓋一專於令長矣然而天下至大百吏至衆吾安能以一耳一目觀聽其短長煦等皆奉詔條為人求瘼慰薦於爾豈某等皆欺予各勉厥誠以臻於理煦可鄭縣令諷可越州剡縣令勅河陽節度參議兼監察御史韋珩前懷州武德令李鄂等昔先王眚災肆赦則殊死巳降無不宥免而受賄枉法者獨不在數常罪罪之以此防吏吏猶有豪奪於人者朕甚憫焉日者覃懷有過籍之賦使吾百姓無聊生於下非珩等為吾發覺則吾終不得聞東人之疾苦矣今美原藍田皆吾甸內之邑爾其為吾養理生息以惠困窮使天下長人之吏知朕明用廉激貪之意焉珩可守美原令鄂可藍田令勅守京兆府醴泉縣令裴誗等昔竇憲以元舅出征大開幕府以致賢彥是以銘燕然備勳籍用參畫也爾等佐釗斯任不細苟或無狀其思有尤勅容管經略左押衙兵馬使蔡少卿蠻之有黃賊者東南人之虺蜮也經略臣公素隳硩妖巢收復故地俾爾以如和縣等捷書來上道路悠遠其勤可嘉寵以憲官用光戎秩勅李立則國有移用之職曰轉運使每嵗傳置貨賄於京師其大都要邑之中則委吏以專畱事洛之間蓋其一也而柳公綽言爾強白幹舉吏難其倫乞以臺省官假借恩榮俾專劇務勉服所職無忘謹廉勅常亮元等大宗正言爾等或親或能備識其行誠盡才辨可以修奉園陵吾先帝之衣冠所在夙夜思念哀敬不忘爾其盡恭以勗諸吏勅杜載西旅違言侵坑縣道雖有備無患而予心惕然惟爾載奉捷潛奏乘驛以奔吉語亟來人用胥悅念敺攘之畧誠在將軍獎飛馳之勞宜加憲秩歸語爾帥無忘乃庸勅崔蔇等自元和以來有大勳烈於天下先帝賚予以保衡者惟司空度度亦齊慄祗畏不自滿大慎簡其屬毗於厥政惟蔇及洙咸在茲選是用輟我糺察副其勤求惟爾敬元舊佐藩服効誠於長議以序遷峩峩鐵冠皛皛銀印受之以任其樂所從門下昔蕭何用新造之漢而能調發子弟完補敗亡使關東糧饋不絕者以其盡得秦之圖籍而周知其衆寡也我國家乘十一聖之區㝢提億兆人之生齒而曰不能足食足兵朕甚懵焉得非調陰陽撫夷夏者不欲侵貨泉之任而主會計校盈虛者不得參邦國之重乎今將兼之允在能者諸道鹽鐵轉運等使大中大夫守刑部尚書騎都尉太原縣開國男賜紫金魚袋王播在德宗時以對詔入仕踐更臺閣由御史中丞大京兆尹掌縣官鹽鐵為春官尚書乃長巴髳以控蠻蜑盡稱厥職達於予聞洎詔徵還便殿與語得所未得聞所未聞昭然發矇幾至前席重委操剸鋩刃益精國有羨財而人不加賦東師在野物力蕭然不有主張孰能戡濟是用命爾作相仍以舊務因之爾其西備戎羌東定燕冀內實九府外豐萬人百度㣥倫罔不在爾於戲典謨訓誥行之具存邪正是非知之孔易予唯以不敏不明故用爾為股肱耳目又安能以一二戒誨垂之空言爾其自勵於爾心無令觀聽者論爾於鄉校可依前件守中書侍郎同中書門下平章事依前充諸道鹽鐵轉運等使散官勳封賜如故門下朕嘗讀元元書至於佳兵者是樂殺人因念自孩名之逮於覊丱不三十年不能為成人豈忍一朝之忿驅而殺之然而田宏正首以六州之衆歸於朝廷開先帝之雄圖變河朔之舊俗除去苛暴昭宣惠和愛人如身養士如子拊循教訓必以忠孝為先是以魏之師徒一年而知恩二年而知禮三年而知相與讓於道矣故南征淮蔡東伐青齊北定趙地元勳茂績皆自魏師肆我憲宗付之心膂入則輔弼出則藩宣推誠不疑近實無比顧朕小子獲受丕圖嗣守不遑何暇恢復而承元請覲冀部擇才苟非勳賢不敢輕授是用咨我元老臨於是邦而又寵諸將以懋官加三軍以厚賞復其租入惠彼蒸黎於此一方之人可謂無有不至而梟音未革狼顧猶存忍害忠良恣為殘賊臨軒震悼撫几驚嗟天乎不仁一至於此朕下為君父上奉祖宗肆舟楫於鯨鯢㗖股肱於虵豕尚欲因循忍恥僶俛偷安非唯傷心於田氏之子孫亦將何顏謁先帝之陵廟人神共憤卿士叶謀咸願誅夷用申寃痛便合興師進討以剪姦凶尚念一軍之中豈無義勇倉卒變動必非衆謀苟得罪人其餘何過宜令魏博橫海昭義河東義武等軍各出全軍以臨界首仍各飛書檄具諭朝旨如王庭湊能執首謀為亂扇動三軍者送付鄰道或就鎮州處置然後束身歸朝必當超奬三品正員官并與實封二百戶其餘三軍將士一切不問其中大將等或有能相勸諭翻然改圖者各隨事跡當加寵擢如王庭湊遂迷不寤諸道宜便進軍以時翦滅苟不得巳至於用師其有効忠則宜懸賞如有能斬凶渠者先是六品巳下官宜與三品正員官先是五品巳上官節級升進仍與實封三百戶莊宅各一區錢二萬貫以一州歸順者便與當州刺史仍賜實封二百戶如先是刺史以州歸順者超三資與官仍賜實封二百戶以一縣歸順者超兩資與官賜實封一百戶如有能率所管兵馬及以城鎮來降者並超三資與官仍賜實封一百戶錢一萬貫以身降者亦與轉改仍賜錢帛應赴行營將士如有能梟斬凶渠者亦准前例處分其有城鎮將士百姓等守節拒賊身死王事者各委長吏優給其家仍具事跡聞奏當加褒贈其有潛謀誅斬渠魁被其屠戮者宜優加追贈并賜錢帛仍與一子官諸軍所至不得妄加殺戮及焚燒廬舍掠奪資產并有拘執以為俘馘其管內州縣有能自置義營堡柵王師所至能相率來歸各加酬獎時當秋候務切農功邊界之人懼廢耕織應緣軍務所須並不得干擾百姓如要車牛夫役及工匠之類並宜和雇情願仍優給價錢賊平之後應立功將士並與超資改官節級賜物其長行官吏歸降者亦當優厚褒賞幽陵變擾誠謂亂常以其旁及僚有異上加台鉉校其輕重示以招攜尚開迷復之門用廣自新之路昔者堯舜之俗比屋可封虞芮之人讓畔可感仁義則水火可蹈忠信則蠻貊可行由是言之亦在化之而巳逮我長理何其遠哉豈朕之滿假荒寧自聖而不可教耶將朝之魁梧骨鯁自持而莫我念也二者之來皆朕不敏內省終夕其心洗然於戲封域之中干戈作矣廊廟罇俎無忘弭寧布告朕懷以須良畫主者施行忠臣之節莫大於送徃事居君子之方寧忘於養廉遠恥况位崇輔相職奉園陵蒙蔽之過屢聞誠敬之心盡廢朕雖含垢人亦有言深念君臣之恩難厭公卿之論宣歙等州都團練觀察處置等使大中大夫持節宣州諸軍守宣州刺史兼御史大夫上柱國輕車都尉賜紫金魚袋令狐楚早以文藝得踐班資憲宗念才擢居榮近異端斯害獨見不明密隳討伐之謀潛附奇邪之黨因緣得地進取多門遂參台階實妨賢路朕以道遵無改事貴有終再命黃扉之榮專奉元宮之禮而不能率下罔念匡君致於翬政牧之職掩韋術李鄴之舉成朕不敏職爾之由前命乘軺尚期改節人心大惑物議置然雖欲特容難排衆怒俾從謫守猶奉詔條予豈無恩爾且自省可使持節衡州諸軍事守衡州刺史散官勳賜如故仍馳驛發遣朕聞天職生植聖職教化天職舉則四時行聖職修則萬方理然而天不以行四時而為德故蕩蕩無名聖不以理萬方而為功故謙謙不宰顧朕小子獲承丕圖上賴祖宗之靈下託股肱之力先定鎮冀次來幽燕皆吾日月之所照臨車書之所轍跡失之則有以自愧得之則何足自多况今四海雖清物力方困六戎雖伏邊備尚勞百吏雖存官業多曠萬目雖設紀律未張有此四者不遑荒寧思與卿士夙夜俾乂卿宜為我提振大法修明政經懾竄戎夷阜康黎庶四者既理名焉用之朕方以臯夔之務委卿卿宜以堯舜之事教我驟加徽號深恥近名循省表章難遂來請昔齊桓議封禪管仲驟諫其未宜晉武平江東何曾深惟於遠馭彼二臣者居安思危之志明而有犯無隱之誠切也况朕寡德謬應昌期賴先帝削平之威蒙列聖浸漬之澤聿來燕翼甫靖華夷既無德而有成實以祥而為懼卿等所宜朝夕納誨警予荒寧雖休勿休日慎一日而乃過為溢美頻上鴻名諒多忠赤之誠殊非藥石之愛汝為予礪為朕揣摩汝為予舟為朕康濟強我懿號不若使我為有道之君加我虛尊不若使我居無過之地宜罷來請用副迺懷朕以月正元日祗見於九廟對越於上元千官在前萬乘居後覩聲名文物之盛望城社宮闕之尊尚念高祖太宗艱難於經營德宗憲考殷憂於纘服懼不克荷以羞前人寅畏嚴恭式冀無過而燕趙底定戎獯和寧實惟列聖之休焉敢自大其意左右輔弼庶尹師長猥以鴻名願加薄德三詔執事抑而不行物議愈堅予衷未信四陳章表備列古今且曰告虔之時寧忘繼志問安之下胡不慰心有竊於顯榮難從於封執於戲允恭克讓既見奪於㣥情克巳為仁庶自勤於三省勉依來請深用媿懷朕聞上黨亦天下之勁兵昔者李抱真用之一舉破朱滔再舉蹙田悅訓養十萬威聲殷然人到於今號為良將夫以卿之勇義才畧猶將遠慕韓彭區區抱真夫豈難繼况以克融庭湊之狂脆小賤比朱滔田悅之熾大結連是猶以孩嬰而校賁育也蜂蟻相聚其能久乎卿宜密運謨猷明宣號令避強擊惰取暴撫羸勿爭虵豕之鋒宜得鯨鯢之首再圖麟閣永煥縑緗無為他人所先當使功居第一策勳在近勿復為勞所謝知朕聞有衆不言弱有地不言貧是以管夷吾用區區之齊而諸侯九合今朕四海之大億兆之衆獨不能擒庭湊克融而曰物力先困朕甚惑焉况高祖太宗之法令具存德宗憲考之舊章猶在制誥比下選拔日聞較量輕重勤卹仁隱而室閭益耗縣道益貧職業壞隳程品差戾議論講貫殊無古風豈朕聽之不聰而股肱耳目莫得宣其効也先皇帝以卿有廓廟之畫倚以為相眇朕小子得而用之卿宜勉竭誠懷副茲嘉屬無為齪齪以傷先帝之明所謝知
