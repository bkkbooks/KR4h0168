front:
  text: 全唐文欽定全唐文卷三百九孫逖二
  hash: sha256:ec965dcd3fe252e41511c21175df4bf5fbc73c1d2d23c458906e79d3e9d1e834
body:
  text: 門下公族之任得才則難舉親而官選舊惟允銀青光祿大夫殿中監上柱國褎信郡王璆雅正惟恭虛懷敏達近屬藩翰中朝羽儀無競維人不矜於貴分克勤於位每效於忠公敦敘是司疇咨所屬宜居六尚之職以副九宗之委可宗正卿門下宗卿設位邦族是司必擇親賢以光名器金紫光祿大夫行太僕卿員外置同正員上柱國濮陽郡王徹清貞履道淑慎持身行無越思動不踰矩以才從政於歷官而則深以地推恩在同姓而為近敦敘之任疇咨所難宜受寄於本枝更遷榮於列棘可行宗正卿散官勳如故門下銀青光祿大夫行房州別駕員外置同正員廣武郡王承宏地在維城慶延分土頃乖周慎因從降黜捨其公犯用申猶子之恩復其舊資俾踐列卿之秩可光祿大夫光祿卿員外置同正員門下銀青光祿大夫慶王傅員外置同正員上柱國扶陽郡開國公韋珙衣冠耆舊德行名賢吏術該通嘗聞理劇道心遠曉雅好攝生一在優閒久淹年序怡和自保志力猶強宜有命於移官俾承榮於列寺可光祿卿員外置同正員勳封如故門下尚主之恩允歸於人秀睦親之典必洽於朝榮駙馬都尉崔惠童豆盧建等在人物士林在勳華忠緒行能雙美才貌兼資善道自修令名無忝錫之姻好已承築館之榮寵其章服宜列象河之位惠童可銀青光祿大夫衛尉卿建可銀青光祿大夫太僕卿並員外置同正員門下安西都護王斛斯將略稱多忠誠克著頃膺邊寄頗洽人心間歲以來頻有騷警能清寇虐不頓甲兵契軍國之遠圖得攻拒之良術有勞懋賞自昔如茲宜踐列卿之位俾兼并護之職可太僕卿員外置同正員兼安西都護等如故門下列彼九卿正於㣥僕允膺茲命必藉兼才正議大夫守太原尹北都留守使持節河東道諸軍節度營田副大使知節度事兼採訪處置使攝御史中丞上護軍賜紫金魚袋王昱韜是明斷資其理識成務有餘奉公不撓自持軍律兼委使車能啓刑書以懲貪吏到官未幾除惡已多類能則然賞善宜及俾升榮於左馭仍受任於北京可守太僕卿兼大原尹餘如故門下中大夫守太常少卿上柱國李林宗行能溫厚器識該深清白奉公常聞吏術恭謙應物更表身謨自亞河海亟移星歲友于之愛實掌樞衡致美之心俱懷退讓遠嫌滋久舉滯當遷宜正位於名卿俾欽承於密命可太僕卿散官勳如故門下申以婚姻必求於才地制於祿位兼取於親賢竇鍔等克嗣高門能修善道有溫恭之言行兼美秀之形神勳華之緒既連於舊戚選尚之恩更諧於新禮俾升榮秩仍錫寵章可依前件門下賞以懋功官無虛授所貴天秩斯為國典朝議郎守太僕少卿員外置同正員使持節都督鄯州諸軍事兼鄯州刺史隴右節度副使仍知經略支度營田等留後事賜紫金魚袋杜希望器能開敏才略雄深識韜鈐之大綱知戰守之良術頃令討罪爰委行師不憚艱危常先士卒恩威必備權變多方狂寇已清堅城又克疇庸是屬舉善攸歸俾膺超等之榮仍列上卿之位可通議大夫守鴻臚卿員外置同正員攝御史中丞餘如故門下朝議大夫守給事中鄭縣開國男韋恆神清氣爽識遠心微周才可以求備雅望期於必復自登近密已積歲年淑慎有恆閒和易退奉常之亞稱職為難宜回夕拜之榮俾在春官之屬可守太常少卿散官如故門下朝議大夫守衛尉少卿上柱國李林宗寡言敏行清節令名能執謙沖之心以成友悌之美自亞九卿已淹四歲舉必以類既承拜命之榮恩則由中俾佐奉常之職可守太常少卿門下朝議大夫行祕書丞上柱國清水縣開國伯李岫說禮敦詩資忠履孝勵清修而立節包麗則以為文曩者輟務仙臺移官祕府一從閒退七變星霜父在樞衡固守范宣之讓謙沖自牧足鎮於浮躁而進用無黨須歸於至公宜承特命之恩俾踐亞卿之職可守衛尉少卿散官勳如故敕朝議郎前行宗正卿賜紫金魚袋鄭子獻業繼簪裳地連姻戚早升班序纍效忠勤公族之司頃居亞列僕臣之任宜復舊資可守太僕少卿員外置同正員散官勳如故門下朝議大夫守太僕少卿上柱國朱陽縣開國男楊先精勤從事堅白在公任以器能位於河海出納之吝朝廷所難宜回職金之府更膺搜粟之寄可守司農少卿仍東都留守門下守諫議大夫王回質茂學純行國之耆耋左補闕韋廉清才敏識人之英秀藩維日就實賴於師資軒陛晨趨有光於侍奉各施於用皆著其勤宜拜藏書之府俾遷紀言之職回質可祕書監廉可起居郎門下乃立御府其代天工必在信臣以兼重寄銀青光祿大夫太僕卿朔方節度兼關內道支度兼管營田鹽池押諸蕃部落副大使兼採訪處置使㣥牧都使監牧支度營田間廏宮苑五坊等使攝御史大夫上柱國隴西縣開國子牛仙客忠公有度亮直無私長才為萬里之城沈略乃百夫之禦頃持節鉞嘗鎮河湟兵器惟精邊人咸賴出則靖國方資五利之功入則訓騶宜修六尚之職可殿中監散官勳並如故門下朝議大夫前守諫議大夫上柱國襄國縣開國男宋渾明敏自然通和足尚承舊德之餘訓有多才之令名喪制久除朝章式敘宜升髦士之列俾亞上卿之任可守將作少匠散官勳封如故門下滑州刺史翟璋等精勤立志果斷雄才有吏道之能名是郎官之俊選掄材考行用掌百工之事宰邑臨人佇為四方之則可依前件敕朝議郎行祕書省著作佐郎司馬利賓等或富於學業或精於吏能公清為潔已之資詞賦有成名之美舉其同術宜並拜於軒墀甄其異用俾分官於儒館可依前件門下名器所歸必徵於才實進用之序亦憑於歲年邠王傅上柱國豐縣開國男劉瑗等備聞素行纍踐清資佩服文儒周旋禮讓效官惟謹考績皆深以類而遷既有均於平施至公斯在亦何患於後時宜悉虛懷各從分職可依前件門下朝議大夫著作郎裴巨卿厚德馴行性與淳和朝請大夫殿中丞上柱國張九皋雅量清才體合明允咸推遠識皆有令名能勵節於朝廷將致美於兄弟詩書是悅宜當六學之師章奏惟難更擅一臺之妙巨卿可國子司業九皋可尚書職方郎中散官勳如故門下左羽林大將軍兼范陽大都督府長史充范陽節度經略支度營田副大使王斛斯推誠勵節好勇能謀政必有經舉無遺策久鎮幽朔勤修訓練既摧凶以制勝亦懋賞以酬庸而環衛之職金吾尤重宜承後命以寵中權可守左金吾衛大將軍兼范陽大都督府長史餘如故門下中大夫守光祿寺卿員外置同正員賜紫金魚袋張元逸幹蠱於君謙沖自下外姻之旅衆望攸歸置彼周行備聞聲實委之環衛尤切腹心宜易位於右卿俾呈能於真將可明威將軍守右衛將軍勳賜如故門下左衛將軍吳王祗等國之近屬朝之多士或同班警衛有避於天倫或列位周行已淹於歲序各移官命用廣朝恩可依前件門下右威衛將軍兼北庭都護蓋嘉運百夫稱勇萬里將軍智則有謀忠而能毅頃者狂寇作梗鋭師深入用奇以往決勝而歸式酬其庸言命之賞宜增秩於中尉仍握兵於外城可左金吾衛將軍兼北庭都護餘如故敕右監門衛中郎將元環衣冠濟業言行資身地在通姻人稱懿戚徵於舊典洽以新恩宜有命於移官更增榮於賜服可依前件門下中大夫守內侍上柱國賜紫金魚袋趙惠琮素韞智謀早周慎密頃令銜命委以臨戎既逾險而深入亦乘危而苦戰遂清狂寇且振邊威不有賞功將何勸善宜列爪牙之任仍真印綬之榮可雲麾將軍守左監門衛將軍仍兼知內侍省事勳如故門下大中大夫守太僕卿員外置同正員上柱國賜紫金魚袋王斛斯智謀宏遠識量沖深位列名卿才優良將頃膺朝寄作扞邊陲惠威有孚羌戎即序念其勤苦既返斾於西城任以腹心宜典兵於北禁可宣威將軍守右羽林軍將軍勳賜如故門下中大夫使持節都督洮州諸軍事守洮州刺史同隴右節度副使上柱國賜紫金魚袋彭元昭久統邊事咸推武才必也好謀豈唯有勇遞遷中外方表幹能宜典禁兵以膺重寄可右羽林軍將軍門下行左清道率府曹王弼藉慶宗枝升榮官序頗有公纍終非自作曾是黜官亦云纍載宜叶睦親之道俾遷仍舊之職可左武衛將軍勳如故門下將作少匠郭元升忠厚資貞有聞於行守太子家令鄭繼先衣冠濟業不隕其名各在官次頗淹年序宜分職於五校俾增榮於兩宮元升可右武衛將軍守右衛將軍繼先可右武衛率勳如故門下前守右武衛將軍裴倩韞是忠勇資其智謀久樹邊功備詳戎事疆場有警方期於效節金革無避宜後於奪禮可起復守右武衛將軍餘如故門下傅導元子師長庶寮必在正人無非舊德太子少師上柱國信安王褘宗室良翰朝廷碩老踐忠公而立節體明肅而成用頃膺大任頻總中權掌夏司春是為六官之長戢兵禁暴何止萬人之敵睦親尚齒念舊録功宜優天秩之榮俾極宮臣之位可光祿大夫守太子太師勳封如故門下貞萬國者必在於元良教三善者是求於端士銀青光祿大夫守刑部尚書上柱國清河郡開國公崔琳中和稟氣厚德資身雅言有章明議能斷標禮樂於先進效忠公於大官堅白不渝芬芳自久緝熙秋典用簡於心調護春宮更難其選宜取才於六職俾齊名於二傅可守太子少保門下調護儲宮典司延閣必在舉德固無虛授慶王侍讀銀青光祿大夫祕書監員外置同正員賀知章等衣冠耆舊詞學宗師或恬淡風流獨擅東南之美或清貞介特是稱江漢之英負當朝之令名有錫類之純行頃令教導久侍藩維善利則多寵章宜及方之四老用列賓友之任綜彼三墳俾在圖書之府可依前件門下重位高官必歸於舊德中朝內外亦在於更遷金紫光祿大夫使持節同州諸軍事行同州刺史上柱國魯國公孟溫性與嚴明才優政理朝請大夫使持節魏州諸軍事守魏州刺史上柱國安平縣開國伯崔璘清而率下正以持身或纍登要劇聲謠夙著或頻更刺舉歲序滋深出入兼施器能皆適宜膺調護之選俾踐宮坊之任溫可太子賓客璘可太子右庶子散官勳封如故門下宮朝所重賓友為先誰其往諧必也求舊通議大夫守太僕卿上柱國聞喜縣開國侯裴元初已勵行全存誠好德中和應物豈終食而違仁至理為心每忘筌而合道早升清要纍踐崇班能慮始以思終不近名而過實宜膺端士之選以佐元良之貞可太子賓客勳封如故門下儲闈掌事端尹命官疇咨所難慎擇斯在雲麾將軍前左千牛衛將軍上柱國太原郡開國公王暐衣冠貴緒人物通才善自謀身見推於賢戚凡所效職必聞於中外頃緣謝病今則有瘳舉其滯淹用升於朝列甄其望實宜首於宮僚可銀青光祿大夫守太子詹事勳封如故門下宮僚之首必擇正人邦圻之內實資良牧銀青光祿大夫祕書監上柱國許王瓘文儒致位所謂宗英銀青光祿大夫守太子詹事上柱國太原郡開國公王暐言行立誠是稱親懿常以善而為樂每執謙而忘倦從政已多議能惟允彈違是屬宜肅事於東朝理劇尤難俾安人於左輔瓘可太子詹事暐可使持節同州諸軍事守同州刺史散官勳如故門下大中大夫使持節華州諸軍事守華州刺史上柱國盧詢才標公望器重士林頃寄分憂備彰聲實近聞稱病已歷旬時雖從政之能猶堪於臥理而攝生之道終忌於勞神宜增班秩之榮俾在優閒之地可太子詹事員外置同正員門下準繩儲寀師長國庠爰擇親賢用諧任寄鎮軍大將軍行右金吾大將軍兼弩營使上柱國廣平郡開國公程伯獻勳臣業固幹略有餘雲麾將軍守右武衛大將軍上柱國安平郡開國公李仲思宗子地華行能無悔咸推雅量早踐通班或甫及高年或近嬰微疾營校之任久以煩卿優閒之職期於遂性宜膺並拜俾在兩宮伯獻可光祿大夫行太子詹事仲思可銀青光祿大夫國子祭酒員外置同正員門下朝議大夫宗正少卿殷承業行宗正丞王利涉等咸以器能各升班序克勤於事不忝其名九族之司既無取於異姓兩宮之地宜有命於分官承業可太子左諭德利涉可國子監丞敕主客員外郎甘暉前代州長史元嘉福等或遊心淡泊常有慕於幽人或從事劬勞頗知名於邊郡各循班列仍度器能宜序東朝之列俾遷外藩之佐暉可守太子贊善大夫嘉福可守戎州長史散官如故敕朝議郎恆州司馬隨軍副使幽州節度驅使上柱國借緋魚袋蕭誠早標明敏久著聲名詞翰推工才能適用頃從戎幕嘗募征夫宜遷翊贊之榮仍效撫綏之術可守太子左贊善大夫依前幽州節度驅使仍專檢校管內諸軍新召長遠往來健兒事門下朝散大夫守忠王府咨議參軍韋汭等各有才器備彰名實頃膺朝選久在王門儲二作貞既承於新令慶賞行惠必先於舊僚宜叶典章用增班秩門下中散大夫守忠王府長史兼侍讀上柱國殷彥方等朝廷雅望人物周才或聚學沖深或屬詞清遠頃膺授擇皆侍藩維教導之功既聞於日就溫文之德遂涉於春儲國有典章義存褎賞宜進秩於高位俾升榮於近傅可依前件敕典軍郭元融名列戎昭官升王邸頗經歲序克著勤勞宜更文武之職俾在咨謀之任可朝議郎守寧王府咨議參軍敕朝議郎守青州司馬李夷吾門擅文儒才推幹理從事惟謙在官必達二於郡職已聞康海之謠官彼王門宜膺背淮之選可守榮王府咨議參軍散官如故門下朝散大夫前行右領軍衛長史王積薪博藝多能精心敏識久從班秩頗著勤勞俾遷環衛之司宜在從車之列可慶王友餘如故門下三川作都四方取則任能而理求舊為先銀青光祿大夫守太子賓客上柱國崔隱甫冠冕碩人朝廷偉量士林之秀公望攸歸直而能溫寬以濟猛纍踐臺閣備彰德器輦轂之務風化所急鎮茲雅俗俟彼正人宜受任於兼官俾重臨於故府可兼河南尹餘如故門下制天秩者必在於賞功尹王都者是先於舉德朝散大夫守左散騎常侍持節河西節度經略支度營田九姓長行轉運等副大使知節度使判涼州事赤水軍使上護軍攝御史中丞賜紫金魚袋崔希逸深識宏才清標雅致明無不達懸朗鑑於胸懷斷則有餘錯盤根於掌握頃膺邦選爰委兵權能行上將之謀略獻西師之捷寵其命服俾叶於酬庸鎮彼神州更期於表則可銀青光祿大夫河南尹勳如故門下風雨所交是稱中土山河之寶斯為近服有能俾乂其在遞遷中大夫使持節蒲州諸軍事蒲州刺史上柱國裴寬高朗多才懷必割之良器銀青光祿大夫使持節絳州諸軍事絳州刺史上柱國翼城縣開國伯裴胄先貞廉守道秉不凋之徑節或纍拜清秩或頻更劇務三汾作郡各著聲謠八使觀風咸推課最類能而舉僉議攸歸宜受任於洛都更移官於蒲坂寬可守河南尹胄先可使持節蒲州諸軍事蒲州刺史散官勳各如故門下守洛陽縣令陸操才膺利用官歷清資當斷不疑在公必濟京兆之亞夫官之劇既馳名於洛邑宜佐理於汾州可守太原少尹散官如故門下中大夫行尚書刑部郎中上柱國鄭巖形神俊秀理識通明標幹術於公方飾文詞於吏道纍登華省嘗典劇曹宜遷取則之邑更展撥煩之用可行京兆府萬年縣令門下司封郎中徐鍔業繼文儒才優斷割明而不滯幹則有成五等是司已傳名於臺妙四方之會宜展用於京劇可河南府洛陽縣令門下行京兆府司録參軍樊象發跡詞場馳名吏職克勤於位皆著其能掾彼神州既彰人譽宰於近縣俾叶時須可京兆府藍田縣令門下大中大夫使持節徐州諸軍事守徐州刺史上柱國源復等雅才清識踐行立名政表於良康歌聞於是賴或歲年滋久必在於更遷或風俗異宜各期於適用俾膺俞往以副僉諧可依前件門下朝請大夫使持節都督洪州諸軍事守洪州刺史上柱國長山縣開國伯韓朝宗等開濟雄才宏深雅量或纍升清要常展用於高資或頻膺刺舉久馳名於列郡振其淹滯任以器能宜遞遷於遠近俾更踐於中外可依前件門下理人之吏深誡於數易度才而遷必憑於久次朝議大夫使持節都督越州諸軍事守越州刺史元彥沖等幹能自達政術有聞化行一郡並逾四稔克慎終始不名實宜有遞遷更膺分命書不云乎三載考績黜陟幽明舊章則然古制斯在今所進轉皆為限約並須畫一無相奪倫庶懲欲速之人將致有常之化凡厥共理宜悉其心可依前件門下中散大夫前使持節滑州諸軍事守滑州刺史上柱國崔翹等詞學為門貞廉作吏並久從官序能效公心禮及既祥皆聞於俯就才有所適宜在於分官可依前件門下朝議大夫前使持節仙州諸軍事守仙州刺史上柱國宋樽等或郡國良吏或朝廷吉人咸勵厥躬克勤於位循名考行揆務量能宜受命於分官俾呈才於庶績可依前件門下大中大夫使持節鄭州諸軍事守鄭州刺史上柱國張敬輿等克修名操久踐衣冠咸適用於當時各效能於列郡風謠具舉歲序皆深曾是移官用叶平分之義或因去職宜承並命之恩可依前件門下中散大夫守將作少匠上柱國翟璋等名跡修謹藝能該博或纍升清秩或久踐通班三年有成各呈才於外郡庶官無曠咸勵節於中朝重寄所難分憂是屬宜膺稍遷之舉用叶汝諧之命可依前件敕中散大夫守常山郡太守秦昌舜等器能足用政術多方頃在列藩皆聞致理或居官已久或去職當遷長史缺官中朝慎擇宜膺並命更委親人可依前件門下大中大夫前使持節鄭州諸軍事守鄭州刺史上柱國博陽縣開國男劉體微等器能具舉言行兼資嘗踐郎官頻更吏職令名無替成績有聞宜受任於藩邸俾榮遷於郡國可依前件門下中大夫前守安定郡太守裴煒等位分中外名著朝廷或課績多年或招輯成政禮云終服官以授人舊章斯在新命宜及俾膺藩嶽之任更展循良之稱可依前件門下前歙州刺史魏哲等以能入仕以廢疾官頃曾罷歸亦云淹久勿藥有喜既善攝生之術度材而用宜承舉滯之恩可依前件門下亳州刺史李升朝等並膺時選俾踐官資才器則殊行能皆著或居喪之禮俯就於外除或同氣之親有妨於聯事或近停郡職或久滯王門宜各稍遷俾從分命可依前件門下守太子中允李良等早推言行兼有幹能從官必聞服勤斯久分憂是屬慎擇為難宜副恤人之心俾諧良吏之選可依前件
