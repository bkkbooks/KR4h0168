front:
  text: 全唐文欽定全唐文卷五百七十四柳宗元六
  hash: sha256:64fcc3353410b7a78720bc2b9af03f594baea203cfe3461f278c788f316a4452
body:
  text: 四月五日門生守永州司馬員外置同正員柳宗元謹致書十郎執事凡號門生而不知恩之所自者非人也纓冠束衽而趨以進者咸曰我知恩知恩則惡乎辨然而辨之亦非難也大抵當隆赫柄用而蜂附蟻合喣喣趄趄便僻匍匐以非乎人而售乎己若是者一旦勢異則電滅颷逝不為門下用矣其或少知恥懼恐世人之非己也則矯於中以貌於外其實亦莫能至焉然則當其時而確固自守蓄力秉志不為嚮者之態則於勢之異也固有望焉大凡以文出門下由庶士而登司徒者七十有九人執事試追狀其態則果能效用者出矣然而中間招眾口飛語譁然譸張者豈他人耶夫固出自門下賴中山劉禹錫等遑遑惕憂無日不在信臣之門以務白大德順宗時顯增榮諡揚於天官敷於天下以為親戚門生光寵不意璅璅者復以病執事此誠私心痛之堙鬱洶湧不知所發常以自憾在朝不能有奇節宏議以立於當世卒就廢逐居窮阨又不能著書斷往古明聖法以致無窮之名進退無以異於眾人不克顯明門下得士之大今抱德厚蓄憤悱思有以效於前者則既乖謬於時離散擯抑而無所施用長為孤囚不能自明恐執事終於不知其始偃蹇退匿者將以有為也猶流於嚮時求進者之言而下情無以通盛德無以酬用為大恨固嘗不欲言之今懼老死瘴土而他人無以辨其志故為執事一出之古之人恥躬之不逮儻或萬萬有一可冀復得處人間則斯言幾乎踐矣因言感激浪然出涕書不能既一作就宗元謹再拜正月二十一日某頓首十八丈退之侍者前獲書言史事云具與劉秀才書及今乃見書藳私心甚不喜與退之往年言史事甚大謬若書中言退之不宜一日在館下安有探宰相意以為苟以史榮一韓退之耶若果爾退之豈宜虛受宰相榮已而冒居館下近密地食奉養役使掌故利紙筆為私書取以供子弟費古之志於道者不宜若是且退之以為紀錄者有刑禍避不肯就尤非也史以名為襃貶猶且恐懼不敢為設使退之為御史中丞大夫其襃貶成敗人愈益顯其宜恐懼尤大也則又將揚揚入臺府美食安坐行呼唱於朝廷而已耶在御史猶爾設使退之為宰相生殺出入升黜天下士其敵益眾則又將揚揚入政事堂美食安坐行呼唱於內庭外衢而已耶又何以異不為史而榮其號利其祿也又言不有人禍則一作必有天刑若以罪夫前古之為史者然亦甚惑凡居其位思直其道道苟直雖死不可回也如回之莫若亟去其位孔子之困於魯衞陳宋蔡齊楚者其時闇諸侯不能以也其不遇而死不以作春秋故也當其時雖不作春秋孔子猶不遇而死也若周公史佚雖紀言書事猶遇且顯也又不得以春秋為孔子累范煜悖亂雖不為史其族亦誅司馬遷觸天子喜怒班固不檢下崔浩沽其直以鬬暴虜皆非中道左邱明以疾盲出於不幸子夏不為史亦盲不可以是為戒其餘皆不出此是退之宜守中道不忘其直無以他事自恐退之之恐唯在不直不得中道刑禍非所恐也凡言二百年文武事多有誠如此者今退之曰我一人也何能明則同職者又所云若是後來繼今者又所云若是人人皆曰我一人則卒誰能紀傳之耶如退之但以所聞知孜孜不敢怠同職者及後來繼今者亦各以所聞知孜孜不敢怠則庶幾不墜使卒有明也不然徒信人口語每每異辭日以滋多則所云磊磊軒天地者決必沈沒且亂雜無可考非有志者所忍恣也果有志豈當待人督責迫蹙然後為官守耶又凡鬼神事渺茫荒惑無可準明者所不道退之之智而猶懼於此今學如退之辭如退之好議論如退之慷慨自謂正直行行焉如退之猶所云若是則唐之史述其卒無可託乎明天子賢宰相得史才如此而又不果甚可痛哉退之宜更思可為速為果卒以為恐懼不敢則一日可引去又何以云行且謀也今當為而不為又誘館中他人及後生者此大惑巳不勉巳而欲勉人難矣哉退之館下前者書進退之力史事奉答誠中吾病若疑不得實未即籍者誠是也退之平生不以不信見遇竊自冠好遊邊上問故老卒吏得段太尉事最詳今所趨走州刺史崔公時賜言事又具得太尉實跡參桉備具太尉大節古固無有然人以為偶一奮遂名無窮今大不然太尉自有難在軍中其處心未嘗虧側其莅事無不可紀會在下名未達以故不聞非直以一時取笏為諒也太史遷死退之復以史道在職宜不苟過時日昔與退之期為史志甚壯今孤囚廢錮連遭瘴癘羸頓朝夕就死無能為也艹不能竟其業若太尉者宜使勿墜太史遷言荊軻徵夏無且言大將軍徵蘇建言畱侯徵畫容貌今孤囚賤辱雖不及無且建等然比畫工傳容貌尚差勝春秋傳所謂傳信傳著雖孔子亦猶是也竊自以為信且著其逸事有狀不宣宗元白元生至得弟書甚善諸所稱道具之元生又持部中廬父墓者所得石書模其文示余曰若將聞於上余故恐而疑焉僕蚤好觀古書家所蓄晉魏時尺牘甚具又二十年來徧觀長安貴人好事者所蓄殆無遺焉以是善知書雖未嘗見名氏亦望而識其時也又文章之形狀古今特異弟之精敏通達夫豈不究於此今視石之署其年曰永嘉其書則今田野人所作也雖支離其字尤不能近古為其永字等頗效王氏變法皆永嘉所未有辭尤鄙近若今所謂律詩者晉時蓋未嘗為此聲大謬妄矣又言植松烏擢之怪而掘其土得石尤不經難信或者得無姦為之乎且古之言葬者藏也壤樹之而君子以為議况廬而居者其足尚之哉聖人有制度有法令過則為辟故立大中者不尚異教人者欲其誠是故惡夫飾且偽也過制而不除喪宜廬於庭而矯於墓者大中之罪人也况又出怪物詭神道以奸大法而因以為利乎夫偽孝以奸利誠仁者不忍擿過恐傷於教也然使偽可為而利可冒則教益壞若然者勿與知焉可也伏而不出之可也以大夫之政良而吾子贊焉固無闕遺矣作東郛改市鄽去比竹茨草之室而垍土大木陶甄梓匠之工備孼火不得作化惰窳之俗絕偷浮之源而條桑浴種深耕易耨之力用寬傜嗇貨均賦之政起其道美矣於斯也慮善善之過而莫之省誠愨之道少損故敢私言之夫以淮濟之清有玷焉若秋毫固不為病然萬一離婁子眇然睨之不若無之者之快也想默己其事毋出所置書幸甚宗元白宗元白發書得天論三篇以僕所為天說為未究欲畢其言始得之大喜謂有以開明吾志慮及詳讀五六日求其所以異吾說卒不可得其歸要曰非天預乎人也凡子之論乃吾天說傳疏耳無異道焉諄諄佐吾言而曰有以異不識何以為異也子之所以為異者豈不以贊天之能生植也歟夫天之能生植久矣不待贊而顯且子以天之生植也為天耶為人耶抑自生而植乎若以為為人則吾愈不識也若果以為自生而植則彼自生而植耳何以異夫果蓏之自為果蓏癰痔之自為癰痔草木之自為草木耶是非為蟲謀明矣猶天之不謀乎人也彼不我謀而我何為務勝之耶子所謂交勝者若天恆為惡人恆為善人勝天則善者行是又過德乎人過罪乎天也又曰天之能者生植也人之能者法制也是判天與人為四而言之者也余則曰生植與災荒皆天也法制與悖亂皆人也二之而已其事各行不相預而凶豐理亂出焉究之矣凡子之辭枝葉甚美而根不直取以遂焉又子之喻乎旅者皆人也而一曰天勝焉一曰人勝焉何哉莽蒼之先者力勝也邑郛之先者智勝也虞芮力窮也匡宋智窮也是非存亡皆未見其可以喻乎天者若子之說要以亂為天理理為人理耶謬矣若操舟之言人與天者愚民恆說耳幽厲之云為上帝者無所歸怨之辭爾皆不足喻乎道子其熟之無羨言侈論以益其枝葉姑務本之為得不亦裕乎獨所謂無形為無常形者甚善宗元白見與董生論周易九六義取老而變以為畢中和承一行僧得此說異孔穎達疏而以為新奇彼畢子董子何膚末於學而遽云云也都不知一行僧承韓氏孔氏說而果以為新奇不亦可笑矣哉韓氏注乾之策二百一十有六曰乾一爻三十有六策則是取其過揲四分而九也坤之策一百四十有四曰坤一爻二十四策則是取其過揲四分而六也孔穎達等作正義論云九六有二義其一者曰陽得兼陰陰不得兼陽其二者曰老陽數九也老陰數六也二者皆變周易以變者占鄭元注易亦稱以變者占故云九六也所以老陽九老陰六者九過揲得老陽六過揲得老陰此具在正義乾篇中周簡子之說亦若此而又詳備何畢子董子之不視其書而妄以口承之也君子之學將有以異也必先究窮其書究窮而不得焉乃可以立正也今二子尚未能讀韓氏注孔氏正義是見其道聽而途說者又何能知所謂易者哉足下取二家言觀之則見畢子董子膚末於學而遽云云也足下所為書非元凱兼三易者則諾若曰孰與穎達著則此說乃穎達也非一行僧畢子董子能有異說者也無乃即其謬而承之者歟觀足下出入筮數考校左氏今之世罕有如足下求易之悉者也然務先窮昔人書有不可者而後革之則大善謹之勿遽宗元白辱復書教以報張生書及答衢州書言春秋此誠世所希聞兄之學為不負孔氏矣往年曾記裴封叔宅聞兄與裴太常言晉人及姜戎敗秦師於殽一義嘗諷習之又聞韓宣英及亡友呂和叔輩言他義知春秋之道久隱而近乃出焉京中於韓安平處始得微指和叔處始見集註恆願掃於陸先生之門及先生為給事中與宗元入尚書同日居又與先生同巷始得執弟子禮未及講討會先生病時聞要論常以易教誨見寵不幸先生疾彌甚宗元又出邵州乃大乖謬不克卒業復於亡友淩生處盡得宗指辨疑集註等一通伏而讀之於紀侯大去其國見聖人之道與堯舜合不惟文王周公之志獨取其法耳於夫人姜氏會齊侯於禚見聖人立孝經之大端所以明其分也於楚人殺陳夏徵舒丁亥楚子入陳納公孫寧儀行父於陳見聖人襃貶與奪唯當之所在所謂瑕瑜不掩也反覆甚喜若吾生前距此數十年則不得是學矣今適後之不為不遇也兄書中所陳皆孔氏大趣無得踰焉其言書荀息貶立卓之意也頃嘗怪荀息奉君之邪心以立嬖子不務正義棄重耳於外而專其寵孔子同於仇牧孔父為之辭今兄言貶息大善息固當貶也然則春秋與仇孔辭不異仇孔亦有貶歟宗元嘗著非國語六十餘篇其一篇為息發也今錄以往可如愚之所謂者乎微指中明鄭人來渝平量力而退告而後絕固先同後異者也今檢此前無與鄭同之文後無與鄭異之據獨疑此一義理甚精而事有不合兄亦當指而教焉往年又聞和叔言兄論楚商臣一義雖啖趙陸氏皆所未及請具錄當疏微指下以傳末學蕭張前書亦請見及至之日勒為一卷以垂將來宗元始至是州作陸先生墓表今以奉獻與宣英讀之春秋之道如日月不可贊也若贊焉必同於孔跖優劣之說故舉其一二不宣宗元再拜濮陽吳君足下僕之為文久矣然心少之不務也以為是特博奕之雄耳故在長安時不以是取名譽意欲施之事實以輔時及物為道自為罪人捨恐懼則閑無事故聊復為之然而輔時及物之道不可陳於今則宜垂於後言而不文則泥然則文者固不可少也拘囚以來無所發明蒙覆幽獨會足下至然後有助我之道一觀其文心朗目舒炯若深井之下仰視白日之正中也足下以超軼如此之才每以師道命僕僕滋不敢僕每為一書足下必大光耀以明之固又非僕之所安處也若非國語之說僕病之久嘗難言於世俗今因其閑也而書之恆恐後世之知言者用是詬病狐疑猶豫伏而不出者累月方示足下足下乃以為當僕然後敢自是也呂道州善言道亦若吾子之言意者斯文殆可取乎夫為一書務富文采不顧事實而益之以誣怪張之以濶誕以炳然誘後生而終之以僻是猶用文錦覆陷穽也不明而出之則顛者眾矣僕故為之標表以告夫遊乎中道者焉僕無聞而甚陋又在黜辱居泥塗若螾蛭然雖鳴其聲音誰為聽之獨賴世之知言者為準其不知言而罪我者吾不有也僕又安敢期如漢時列官以立學故為天下笑耶是足下愛我厚始言之也前一通如來言以汙篋牘此在明聖人之道微足下僕又何託焉宗元白四月三日宗元白化光足下近世之言理道者眾矣率由大中而出者咸無焉其言本儒術則迂迴茫洋而不知其適其或切於事則苛峭刻覈不能從容卒泥乎大道甚者好怪而妄言推天引神以為靈奇恍惚若化而終不可逐故道不明於天下而學者之至少也吾自得友君子而後知中庸之門戶階室漸染砥礪幾乎道真然而常欲立言垂文則恐而不敢今動作悖謬以為僇於世身編夷人名列囚籍以道之窮也而施乎事者無日故乃挽引強為小書以志乎中之所得焉嘗讀國語病其文勝而言厖好詭以反倫其道舛逆而學者以其文也咸嗜焉伏膺呻吟者至比六經則溺其文必信其實是聖人之道翳也余勇不自制以當後世之訕怒輒乃黜其不臧究世之謬凡為六十七篇命之曰非國語既就累日怏怏然不喜以道之難明而習俗之不可變也如其知我者果誰歟凡今之及道者果可知也已後之來者則吾未之見其可忽耶故思欲盡其瑕纇以別白中正度成吾書者非化光而誰輒令往一通惟少畱視役慮以卒相之也往時致用作孟子評有韋詞者告余曰吾以致用書示路子路子曰善則善矣然昔之為書者豈若是摭前人耶韋子賢斯言也余曰致用之志以明道也非以摭孟子蓋求諸中而表乎世焉爾今余為是書非左氏尤甚若二子者固世之好言者也而猶出乎是况不及是者滋眾則余之望乎世也愈狹矣卒如之何苟不悖於聖道而有以啟明者之慮則用是罪余者雖累百世滋不憾而恧焉於化光何如哉激乎中必厲乎外想不思而得也宗元白古今號文章為難足下知其所以難乎非謂比興之不足恢拓之不遠鑽礪之不工頗纇之不除也得之為難知之愈難耳苟或得其高朗一作明探其深賾雖有蕪敗則為日月之蝕也大圭之瑕也曷足傷其明黜其寶哉且自孔氏以來茲道大闡家修人勵刓精竭慮者幾千年矣其間耗費簡札役用心神者其可數乎登文章之籙波及後代越不過數十人耳其餘誰不欲爭裂綺繡互攀日月高視於萬物之中雄峙於百代之下乎率皆縱臾而不克躑躅而不進力䠞勢窮吞志而沒故曰得之為難嗟乎道之顯晦幸不幸繫焉談之辯訥升降繫焉鑒之頗正好惡繫焉交之廣狹屈伸繫焉則彼卓然自得以奮其間者合乎否乎是未可知也而又榮古虐今者比肩謺跡大抵生則不遇死而垂聲者眾焉揚雄沒而法言大興馬遷生而史記未振彼之二才猶且若是况乎未甚聞者哉固有文不傳於後祀聲遂絕於天下者矣故曰知之愈難而為文之士亦多漁獵前作戕賊文史抉其意抽其華置齒牙間遇事起金聲玉耀誑聾瞽之人徼一時之聲雖終淪棄而其奪朱亂雅為害已甚是其所以難也間聞足下欲觀僕文章退發囊笥編其蕪穢心悸氣動交於胸中未知孰勝故久滯而不往也今往僕所著賦頌碑碣文記議論書序之文凡四十八篇合為一通想令治書蒼頭吟諷之也擊轅拊缶必有所擇顧鑒視何如耳還以一字示襃貶焉奉書辱示以政理之說及劉夢得書往復甚善類非今之長人者之志不惟充賦稅養祿秩足己而已獨以富庶且教為大任甚盛甚盛孔子曰吾與回言終日不違如愚然則蒙者固難曉必勞申諭乃得悅服用是尚有一疑焉兄所言免貧病者而不益富者稅此誠當也乘理政之後固非若此不可不幸乘弊政之後其可爾耶夫弊政之大莫若賄賂行而征賦亂苟然則貧者無貲以求於吏所謂有貧之實而不得貧之名富者操其贏以巿於吏則無富之名而有富之實貧者愈困餓死亡而莫之省富者愈恣橫侈泰而無所忌兄若所遇如是則將信其故乎是不可懼撓人而終不問也固必問其實問其實則貧者固免而富者固增賦矣安得持一定之論哉若曰止免貧者而富者不問則僥倖者眾皆挾重利以邀貧者猶若不免焉若曰檢富者懼不得實而不可增焉則貧者亦不得實不可免矣若皆得實而故縱以為不均何哉孔子曰不患寡而患不均不患貧而患不安今富者稅益少貧者不免於捃拾以輸縣官其為不均大矣然非唯此而已必將服役而奴使之多與之田而取其半或乃出其一而收其二三主上思人之勞苦或減除其稅則富者以戶獨免而貧者以受役卒輸其二三與半焉是澤不下流而人無所告訴其為不安亦大矣夫如是不一定經界覈名實而姑重改作其可理乎夫富室貧之母也誠不可破壞然使其太倖而役於下則又不可兄云懼富人流為工商浮窳蓋甚急而不均則有此爾若富者雖益賦而其實輸當其十一猶足安其堵雖驅之不肯易也檢之逾精則下逾巧誠如兄之言管子亦不欲以民產為征故有殺畜伐木之說今若非巿井之征則捨其產而唯丁田之問推以誠質示以恩惠嚴責吏以法如所陳一社一村之制遞以信相考安有不得其實不得其實則一社一村之制亦不可行矣是故乘弊政必須一定制而後兄之說乃得行焉蒙之所見及此而已永州以僻隅少知人事兄之所代者誰耶理歟弊歟理則其說行矣若其弊也蒙之說其在可用之數乎因南人來重曉之其他皆善愚不足以議願同夢得之云者兄通春秋得聖人大中之法以為理饒之理小也不足費其慮無所論刺故獨舉均賦之事以求往復而除其惑焉不習吏職而強言之宜為長者所笑弄然不如是則無以來至當之言蓋明而教之君子所以開後學也又聞兄之莅政三日舉韓宣英以代己宣英達識多聞而習於事宜當賢者類舉今負罪屏棄凡人不敢稱道其善况又聞於大君以二千石薦之哉是乃希世拔俗果於直道斯古人之所難而兄行之宗元與宣英同罪皆世所背馳者也兄一舉而德皆及焉祁大夫不見叔向今而預知斯舉下走之大過矣書雖多言不足導意故止於此不宣宗元再拜宗元白前以所致石鍾乳非良聞子敬所餌與此類又聞子敬時憤悶動作宜以為未得其粹美而為麤礦慘悍所中懼傷子敬醇懿仍習謬誤故勤以為告也再獲書辭辱徵引地理證騐多過數百言以為土之所出乃良無不可者是將不然夫言土之出者固多良而少不可不謂其咸無不可也草木之生也依於土然即其類也而有居山之陰陽或近於水或附於石其性移焉又况鍾乳直產於石石之精麤疎密尋尺特異而穴之上下土之薄厚石之高下不可知則其依而產者固不一性然由其精密而出者則油然而清炯然而輝其竅滑以夷其肌廉以微食之使人榮華溫柔其氣宣流生胃通腸壽善康寧心平意舒其樂愉愉由其麤疎而下者則奔突結止乍大乍小色如枯骨或類死灰淹顇不發叢齒積纇重濁頑樸食之使人偃蹇壅鬱泄火生風㦸喉癢肺幽關不聰心煩喜怒肝舉氣剛不能和平故君子慎焉取其色之美而不必唯土之信以求其至精凡為此也幸子敬餌之近不至於是故可止禦也必若土之出無不可者則東南之竹箭雖旁岐揉曲皆可以貫犀革北山之木雖離奇液暪空立中枯者皆可以梁百尺之觀航千仞之淵冀之北土馬之所生凡其大耳短脰拘攣踠跌薄蹄而曳者皆可以勝百鈞馳千里雍之塊璞皆可以備砥礪徐之糞壤皆可以封大社荊之茅皆可以縮酒九江之元龜皆可以卜泗濱之石皆可以擊考若是而不大謬者少矣其在人也則魯之晨飲其羊關轂而輠輪者皆可以為師儒盧之沽名者皆可以為太醫西子之里惡而矉者皆可以當侯王山西之冒沒輕儳沓貪而忍者皆可以鑿凶門制閫外山東之稚駿樸鄙力農桑啖棗栗者皆可以謀謨於廟堂之上若是則反倫悖道者甚矣何以異於是物哉是故經中言丹砂者以類芙蓉而有光言當歸者以類馬尾蠶首言人參者似人形黃芩似腐腸附子八角甘遂赤膚類不可悉數若果土宜乃善則云生某所不當又云某者良也又經註曰始興為上次乃廣連則不必服正為始興也今再三為言者唯欲得其英精以固子敬之壽非以知藥石角技能也若以服餌不必利己姑務勝人而夸辯博素不望此於子敬其不然明矣故畢其說宗元再拜奉二月九日書所以撫教甚具無以加焉丈人用文雅從知己日以惇大府之政甚適東西來者皆曰海上多君子周為倡焉敢再拜稱賀宗元以罪大擯廢居小州與囚徒為朋行則若帶纆索處則若關桎梏彳亍而無所趨拳拘而不能肆槁焉若枿隤焉若璞其形固若是則其中者可得矣然猶未嘗肯道鬼神等事今丈人乃盛譽山澤之臞者以為壽且神其道若與堯舜孔子似不相類焉何哉又曰餌藥可以久壽將分以見與固小子之所不欲得也嘗以君子之道處焉則外愚而內益智外訥而內益辯外柔而內益剛出焉則內外若一而時動以取其宜當而生人之性得以安聖人之道得以光獲是而中雖不至耉老其道壽矣今夫山澤之臞於我無有焉視世之亂若理視人之害若利視道之悖若義我壽而生彼夭而死固無能動其肺肝焉昧昧而趨屯屯而居浩然若有餘掘草烹石以私其筋骨而日以益愚他人莫利己獨以愉若是者愈千百年滋所謂天也又何以為高明之圖哉宗元始者講道不篤以蒙世顯利動獲大僇用是奔竄禁錮為世之所詬病凡所設施皆以為戾從而吠者成㣥已不能明而况人乎然苟守先聖之道由大中以出雖萬受擯棄不更乎其內大都類往時京城西與丈人言者愚不能改亦欲丈人固往時所執推而大之不為方士所惑仕雖未達無忘生人之患則聖人之道幸甚其必有陳矣不宣宗元再拜二十六日宗元再拜前四五日與邑中可與遊者遊愚溪上池西小邱坐柳下酒行甚歡坐者咸望兄不能俱以為兄由服氣以來貌加老而心少歡愉不若前去年時是時既言皆沮然眄睞思有以已兄用斯術而未得路間一日濮陽吳武陵最輕健先作書道天地日月黃帝等下及列仙方士皆死狀出千餘字頗甚快辯伏覩兄貌笑口順而神不偕來及食時竊睨和糅燥濕與啖飲多寡猶自若是兄陽德其言而陰黜其忠也若古之強大諸侯然負固怙力敵至則諾去則肆是不可變之尤者也攻之不得則宜濟師今吳子之師已遭諾而退矣愚敢厲銳擐堅鳴鐘鼓以進決於城下惟兄明聽之凡服氣之大不可者吳子已悉陳矣悉陳而不變者無他以服氣書多美言以為得恆久大利則又安得棄吾美言大利而從他人之苦言哉今愚甚吶不能多言大凡服氣之可不死歟不可歟壽歟夭歟康寧歟疾病歟若是者愚皆不言但以世之兩事已所經見者類之以明兄所信書必無可用愚幼時嘗嗜音見有學操琴者不能得碩師而偶傳其譜讀其聲以布其爪指蚤起則嘐嘐譊譊以逮夜又增以脂燭燭不足則諷而鼓諸席如是十年以為極工出至大都邑操於眾人之座則皆得大笑曰嘻何清濁之亂而疾舒之乖歟卒大慙而歸及年已長則嗜書又見有學書者亦不能得碩書獨得國故書伏而攻之其勤若向之為琴者而年又倍焉出曰吾書之工能為若是知書者又大笑曰是形縱而理逆卒為天下棄又大慙而歸是二者皆極工而反棄者何哉無所師而徒狀其文也其所不可傳者卒不能得故雖窮日夜弊歲紀愈遠而不近也今兄之所以為服氣者果誰師耶始者獨見兄傳得氣書於盧遵所伏讀三兩日遂用之其次得氣訣於李計所又參取而大施行焉是書是訣遵與計皆不能知然則兄之所以學者無碩師矣是與向之兩事者無毫末差矣宋人有得遺契者密數其齒曰吾富可待矣兄之術或者其類是歟兄之不信今使號於天下曰孰為李睦州友者今欲已睦州氣術者左袒不欲者右袒則凡兄之友皆左袒矣則又號曰孰為李睦州客者今欲已睦州氣術者左袒不欲者右袒則凡兄之客皆左袒矣則又以是號於兄之宗族皆左袒矣號姻婭則左袒矣入而號之閨門之內子姓親昵則子姓親昵皆左袒矣下之號於臧獲僕妾則臧獲僕妾皆左袒矣出而號於素為將率胥吏者則將率胥吏皆左袒矣則又之天下號曰孰為李睦州讎者今欲已睦州氣術者左袒不欲者右袒則凡兄之讎者皆右袒矣然則利害之源不可知也友者欲久存其道客者欲久存其利宗族姻婭欲久存其戚閨門之內子姓親昵欲久存其恩臧獲僕妾欲久存其主將率胥吏欲久存其勢讎欲速去其害兄之為是術凡今天下欲兄久存者皆懼而欲兄速去者獨喜兄為而不已則是背親而與讎矣背親而與讎不及中人者皆知其為大戾而兄安焉固小子之所懍懍也兄其有意乎卓然自更使讎者失望而慄親者得欲而忭則愚願椎肥牛擊大豕刲㣥羊以為兄餼窮隴西之麥殫江南之稻以為兄壽鹽東海之水以為鹹醯敖倉之粟以為酸極五味之適致五藏之安心恬而志逸貌美而身胖醉飽謳歌愉懌欣歡流聲譽於無窮垂功烈而不刊不亦旨哉孰與去味以即淡去樂以即愁悴悴焉膚日皺肌日虛守無所師之術尊不可傳之書悲所愛而慶所憎徒曰我能堅壁拒境以為強大是豈所謂強而大也哉無任疑懼之甚謹再拜
