front:
  text: 全唐文欽定全唐文卷七百九李德裕十四
  hash: sha256:3ab6ce70be83ba66be9e9e47e84c87237f7089f9aa54923e86e73a691e6a2e99
body:
  text: 或問先王論道之臣事後王乎曰不改先王之道則事之改先王之道則去之以事堯之心事舜禹者其臯陶益稷乎以事武王之心事成王者其周召乎以事漢高之心事惠帝者其蕭曹乎曹參尚不易蕭何之規况高祖之道昔區區楚國醴酒不設穆生先去且穆生豈為已也蓋傷廢先王之道不忍見後王之面其不去者焉得免胥靡之恨哉魏晉以降居相位者皆靦面愧心而已又有攘臂於其間者踦托先王之道以諱舊過改張先王之道以媚新君棄先王之故老以掩其羞用先王之罪人以協其志若天地間無神明則已倘有神明鬼得而誅之矣陳平稱吾多陰謀道家之所禁吾世即廢亦已矣不能復起以吾多陰過也至曾孫何國絶班生著陳平之言以為世戒理當然矣而丙丞相才及子顯黜為關內侯至孫昌乃絶國絶三十二歲復續而張湯杜周子孫世有令名皆在顯位其故何哉丙丞相於漢宣之德可謂至矣晉荀息以忠貞之故不敢負獻公程嬰以託孤之義不忍欺趙氏所以繼之以死終不食言丙丞相於史皇孫微君臣之分無親戚之情而保養曾孫仁心惻隱置于間燥給以私財介然拒天子之使因是全四海之命原注漢書稱因赦天下郡邸獄繫者是恩及四海也又奏記霍光決定大策既而顯徵卿之美削士伍之辭其深厚不伐古所未有夏侯勝以為有陰德者必享其樂以及子孫是宜篤生賢人世濟其美古所謂有後者良謂是矣焉在傳爵邑而已哉張杜有後者豈用法雖深而所治者或能去天下之惡除生人之害所以然也士之有志氣而思富貴者必能建功業有志氣而輕爵祿者必能立名節二者雖其志不同然時危世亂皆人君之所急也何者非好功業不能以戡亂非好名節不能以死難此其梗概也好功業者當理平之世或能思亂唯重名節者理亂皆可以大任平淡和雅世所謂君子者居平必不能急公理煩遭難亦不能捐軀濟危可以羽儀朝廷潤色名教如宗廟瑚璉園林鴻鵠雖不常為人用而自然可貴也原注世謂王劉之儔也然世亦有不拘小疵而能全大節者如陳平背楚歸漢漢王疑其多心令護諸將又疑其受金可謂不能以名節自固矣及功成封侯辭曰非魏無知臣安得進漢高曰若子可謂不背本矣其後竟誅諸呂以安劉氏近日宰相上官儀詩多浮艷時人稱為上官體實為正人所病及高宗之初竟以謀廢武后心存王室至于宗族受禍郭代公倜儻不羈之士也少不以名節自檢當蕭岑內難保護睿宗雖履危機竟全臣節則名節之間不可以一概論也陳平能不背魏無知所以必不負漢王矣今士之背本者人君豈可保之哉人君拒諫有二一曰生於愛名二曰不能去欲雖桀紂桓靈之君未能忘名自知為惡多矣畏天下之人知之將謂諫已則惡不可掩故不欲人之諫已如晉獻非驪姬寢不安齊桓非易牙食不美必不能去之亦不欲人諫已人臣忠諫亦有二欲道行於君可使身安國理者其辭婉欲名高後世不顧身危國傾者其辭訐若考叔啓大隧以成莊公之孝倉唐獻犬鴈以復文侯之愛留侯封雍齒以安㣥臣招四皓以定惠帝此所謂婉也諫大夫言婢不為主白馬令言帝欲不諱原注劉李二人名各不便故書官激主之怒自有其名望其聽從固不可得此所謂訐也漢元帝欲御樓船薛廣德當乘輿諫曰臣自刎頸以血汚車輪則陛下不入廟矣張猛曰乘船危就橋安聖主不乘危元帝曰曉人不當如是耶則知諫之道在于婉矣唯英主必能從諫何者自知功德及生人者大矣雖有小惡不諱人言如漢高械繫蕭相國及聞王衛尉之言乃曰我不過為桀紂主而相國為賢相此所謂不諱也近日名臣王石泉居相時子為眉州司士天后嘗問曰卿在相位子何遠乎對曰廬陵是陛下愛子今猶在遠臣之子焉敢相近有以見君子之心亦倉唐之比也昔管仲對桓公曰宮中之樂無所禁禦不害霸也舉賢而不能任此害霸也余竊窺敬仲此對是欲一齊國之政滿桓公之志然則非專任亦不能致霸故一則仲父二則仲父桓公所以能九合諸侯為五霸之首中代蜀主之任孔明苻堅之用景略雖關羽不能移樊世不能惑蜀與秦皆君安國理非專任之效歟桓公得敬仲則興隆霸業漢元信石顯而反穢明德信任同而理亂異者何也所任用非其人也近世有以宮中之樂餌其君者而苞苴日行紀綱日壞朋黨益熾讒言益昌得非竊管仲之術違管仲之道莊周稱所謂至智也者有不為大盜積者乎又曰跖不得聖人之道不行豈斯之謂也士君子愛身防患無踰於慎獨矣能懼顯覯原注詩曰無曰不顯莫豫云覯不為暗欺忠信參於外雖有盜賊不能為患矣易曰無有師保如臨父母斯之謂也賊入趙孟之門者覩其盛服將朝不忘恭敬悔受君命至于觸槐所以知其不為患也向使趙孟未闢寢門尚安袵席思變詐之數無肅敬之容為盜者必激其怒心增其勇氣焉得保其首領哉推是而言人不可以不誠矣若乃懷詐飾智意忌貌親人已見其肺肝而自謂無迹天已奪其魂魄而不寤將亡此汲黯所以面折公孫宏留言李息莊周稱賊莫大於德為有心以有眼為德者尚不可以有心眼况為惡者乎夫帝王與㣥臣言不在援引古今以飾雄辨惟在而當禮雄辨不足以服姦臣之心惟能塞諍臣之口昔田蚡為請考工地益宅武帝曰遂取武庫衛將軍言郭解家貧又曰布衣權至使將軍知此其家不貧殷仲文言音樂好之自解宋祖曰吾祗恐解此謂而當理足使姦臣奪心邪人破膽矣余歷事六朝弼諧二主文宗辭皆文雅而未嘗騁辨武宗言必要而不能文飾皆得君人之量能盡臣下之辭豈惟王言如是人臣亦當然也其有辨若波瀾辭多枝葉文經意而飾詐矯聖言以蔽聰此乃姦人之雄遊説之士焉得謂之獻替哉為臣者當戒於斯慎於斯必不獲罪於天矣老子曰功成名遂身退天之道也昔余常惑焉自前朝李右相元中書皆宴安厚味終嬰大戮所以文種有藏弓之恨李斯有稅駕之歎張華願優遊而不獲原注裴頠勸廢賈后華答以庶可優遊卒歲傅亮贊識微而不免此四子者皆神敏知幾聰明志古圖國致霸動必成功而自謀其身猶有所恨况常人哉其難于退者以余忖度頗得古人微旨天下善人少惡人多一旦去權禍機不測摻政柄以禦怨誹者如荷戟以當狡獸閉關以待暴客若捨戟開關則寇難立至遲遲不去者以延一日之命庶免終身之禍亦猶奔馬者不可以委轡乘流者不可以去楫是以懼禍而不斷未必皆耽祿而患失矣何以知之余之前在鼎司謝病辭免尋即遠就澤國自謂在外而安豈知天高不聞身遠受害近者自三公鎮于舊楚懇辭將相歸守邱園而行險之人乘隙搆患竟以失巨浪而懸肆去灌木而攖羅余豈不知身退罹殃蓋恥同種斯之不去也則知勇退者豈容易哉而陸士衡稱不知去勢以求安辭寵以招福斯言過矣惟有遭逢善人則庶可無患故范睢得蔡澤退而不辱虞邱得叔孫去而不困其次剛毅者有心者亦可矣子文舉子玉以靖國隨會避郤子以紓亂皆保其後矣若小人則禍必及之無所逃也終不及乘扁舟變姓名浩然五湖之外不在人間之世斯可以免矣爰盎汲黯皆豪俠者也若非氣蓋當世義動明主豈有是名哉爰盎曰緩急人所有故善劇孟匿季心汲黯好遊俠任氣節善灌夫所以知其然也余斯言豈徒妄發楊子所謂孟軻之勇類如是夫俠者蓋非常之人也雖以然諾許人必以節氣為本義非俠不立俠非義不成難兼之矣所謂不知義者感匹夫之交校君父之命為貫高危漢祖者是也所利者邪所害者正為梁王殺爰盎者是也此乃盜賊耳焉得謂之俠哉唯鋤麑不賊趙孟承基不忍志寧原注紇干承基為承乾賊于志寧見其執喪盡哀不忍害之也斯為真俠矣淮南王憚汲黯以其守節死義所以易公孫宏如發蒙耳黯實氣義之兼者士之任氣而不知義皆可謂之盜矣然士無氣義者為臣必不能死難求道必不能出世近代房孺復問徑山大師欲習道可得至乎徑山對曰學道者惟猛將可也身首分裂無所顧惜由是而知士之無氣義者雖為桑門亦不足觀矣帝王之於英傑當須御之以氣結之以恩然後可使也若不以英氣折之而寵以姑息則驕不可任若不以恩愛結之而肅以體貌則怨不為用駕馭之術唯漢高祖盡之黥布歸漢高祖方踞床洗而召布入見布大怒悔來欲自殺出就舍帳服御飲食從官如漢王居布又大喜過望武帝踞厠見衛青青以大將軍之貴而隸人蓄之此不得不絶大漠而蕩葷粥獫狁也蜀先主與關羽張飛同臥起而稠人廣坐侍立終日皆用此道故能成功夫御英傑使猛將與見道德之人接方正之士不同也不可以繁禮飾貌以浮辭足言宜洞開胸懷令見肝肺氣懾其勇恩結其心雖踞洗召之不為薄矣祿山夷狄之譎詐者也非將門英豪草萊奇傑其戰鬬之氣擊刺之才去關張遠矣天寶末受專征之任託不御之權入朝賜宴坐內殿西序雞障之下非其所據果蓄異圖幽陵厲階至今為梗蓋恩甚驕盈以至於此倘以徒隸蓄之豈有斯恨君之擇臣士之求友當以志氣為先患難為急漢高以周勃可屬大事又曰安劉氏者必勃也文帝戒太子曰即有緩急亞夫真可任將兵此皆得於氣志之間而後知可以託孤寄命矣何者人君不能無緩急士君子未嘗免憂患故漢高知周勃可託文帝識亞夫可任信陵降志於朱亥爰盎不拒于劇孟且夫周文有閎夭而禦侮宣孟以彌明而免難孔聖得仲由而不聞惡言宋祖失穆之而謂人輕我則擇臣求友得不先于此乎太倉令淳于公嘆生女不生男緩急非有益也女緹縈自傷乃上書贖父罪詩曰鶺鴒在原兄弟急難父子兄弟未嘗不以赴急難為仁孝况朋友之際本以義合貴盛則相望以力憂患而不拯其危自保榮華坐觀顛覆可不痛哉昔衛青之衰也故人多事冠軍而任安不去吳章之敗也門人更名他師而幼孺自效原注幼孺名敞姓非便故不書此所以可貴也善人良士祗可淡水相成虛舟相值聞其患也則策足先去曰見幾而作不俟終日知其危也則奉身而退曰既明且哲以保其身良士之於人如是曷若識劇孟朱亥哉余開成中作鎮淮服聞東宮為人所搆天子赫然大怒召宰臣及公卿大僚議於內殿其時諫者僉曰太子幼年思慮未至亦曰太子之年足以改過往復移時大略不出於此夫明主可以理奪其要在於聞所未聞昔千秋上書言子弄父兵罪當笞耳武帝一言而寤蓋以而當理魏太祖嘗謂諸子曰吾必不用左右之言以理汝曹何者使左右君子也必不離人父子之間使左右小人也小人之言必不可用其時無人以此言寤主因問主上太子之過得於何人言之者與太子恩愛厚薄何如哉文宗聰明睿知聞之必寤既寤之後太子必安以余揣之不三數日則父子如初矣蓋以父子之愛發于天性言之者必當易寤况一子乎是以漢高覩四皓上壽悲歌鴻鵠宣帝以元成退讓令傅淮陽元帝聞史丹器人於絲竹鼓鼙之間默然而笑皆外感中寤屈已捨愛可不謂之天性哉惜乎文宗竟不得一聞是言豈太子之命也歟古人稱周公吐握下士而天下歸心惟周公則可何也文王之子武王之弟成王之叔父於天下無嫌矣故唯周公則可稟上聖之姿邪不得入是以好士不為纍也漢武為戾太子立博望苑使通賓客多以異端進者始皆欲招賢人而天下賢人少小人多賢人難進小人易合難進者鴻冥易合者膠固矣何以知之劉濞有枚乘鄒陽不用其言而應高田祿伯為其羽翼劉武有鄒陽韓安國不用其謀而羊勝公孫詭為其腹心劉安行陰德好文辭雖愛神仙黃白未害為善終以左吳伍被而敗以是而知雖骨肉之親非周公聖德皆不可也班固稱四豪者六國之罪人也今不復論矣呂不韋習戰國之餘風陳豨值漢網之疏濶逮乎魏其武安終以權勢相傾自武安之後天子切齒衛霍改節則賓客之為害固可知矣公孫宏起客館開東閣以延賢人與參謀議非也然謂之賢人必非黨附朝宰交亂將相者矣其時武帝躬親萬機嚴明御下人自守法不敢為非宰相惟有平津政出一空原注出呂覽自然無傾奪之勢其賓客故人不居顯位似未足為朝廷患也然主父偃言朔方地肥饒阻河蒙恬築城以逐胸奴滅胡之本公孫宏以為不可朱買臣發十難宏不能得其一又奏人不得挾弓弩吾邱壽王以為不便上以難丞相丞相詘服則知平津之賓客不及天子之近臣明矣雖有賓客何益于議謀哉况世秉大政者常不下三四人而輕薄遊相門與柳槐齊列所謀以傾奪為首所議以勢利為先是以魏其武安之徒共成禍敗劉班殷鐵之客不相往來又役姦志獻奇計者導其邪徑苟合匪人世道險巇無不由此昔漢武謂田蚡曰君除吏盡未吾亦欲除吏哀帝責鄭崇曰君門如市何以欲禁切主上皆賓客之害也余謂丞相閉關謝絶賓客則朝廷靜矣欲知謀議之用捨身名之榮辱觀其立論可知也切于時機明于利害人主易曉當世可行其謀必用而終有後咎鼂錯主父偃是也何者切時機明利害皆怨誹所由生享其利而自罹其害謀濶意中言高旨遠其道可法其術則疏必有高名而不用於世賈山王陽是也謀議不行故能無患智足應變道可與權言雖切于人情意常篤於禮義謀不盡用而身無近憂賈誼是也故當漢文之世亦列高位余門客崔世叔即宋廣平之維私也原注崔世叔名犯廟諱又常預燕公代公之戎幕故知三丞相才業甚備曰廣平好言政事燕公好言文學至於經國遠慮意鮮及之與代公言初若涉川未知其止寥廓廣大莫見津涯味之既深思意愈密代公常為西北邊將帥論四夷事慮必精遠則崔之言信有徵矣凡侍坐于君子聞其言可以知其才術遠近用此道也自古得伐國之女以為未嘗不致危亡之患者何也亡國之餘焉能無怨氣其立基創業之祖宗必皆一時之英傑其社稷山川之鬼神嘗為一國之所奉受其血食忿其滅亡故能為厲矣必生妖美之色蠱惑當世之君使其骨肉相殘以壞於內君臣相疑以敗於外危亡之兆鮮不由此史蘇所謂必有女戎妹喜妲巳褒姒是也史蘇言之詳矣今不復論是以晉獻得驪戎佚女太子有雉經之酷禍及三世苻堅納慕容娣弟秦宮有鳳兮之謠敗於五將原注苻堅於五將山破滅梁武取東昏所幸幾至危國隋文嬖陳王之妹終以隕身此皆禍敗之著明者也又夏姬入荊子反疲于奔命吳人始叛楚矣吳嬪至晉世祖怠于為政戎狄乃亂華矣所以王圭覩廬江美人正言納説如王圭者可謂識微之士明于禍福矣魏文典論稱文以氣為主氣之清濁有體斯言盡之矣然氣不可以不貫不貫則雖有英辭麗藻如編珠綴玉不得為全璞之寶矣鼓氣以勢壯為美勢不可以不息不息則流宕而忘反亦猶絲竹繁奏必有希聲窈眇聽之者悅聞如川流迅激必有洄洑逶迤觀之者不厭從兄翰常言文章如千兵萬馬風恬雨霽寂無人聲蓋謂是矣近世誥命唯蘇廷碩敘事之外自為文章才實有餘用之不竭沈休文獨以音韻為切重輕為難語雖甚工旨則未遠矣夫荊璧不能無瑕隋珠不能無纇文旨既妙一作高妙豈以音韻為病哉此可以言規矩之內不可以言文章外意也較其師友則魏文與王陳應劉討論之矣江南唯于五言為妙故休文長于音韻而謂靈均以來此祕未覩不亦誣人甚矣古人辭高者蓋以言妙而工適情不取于音韻原注曹植七哀詩有徊泥諧依四韻王粲詩有攀原安三韻班固漢書贊及當時辭賦多用協韻猗與元勛包田舉信是也意盡而止成篇不拘于隻耦文選詩有五韻七韻十一韻十三韻二十一韻者今之文字四韻六韻以至百韻無有隻者故篇無定曲辭寡纍句譬諸音樂古詞如金石琴瑟尚于至音今文如絲竹鞞鼓迫于促節則知聲律之為弊也甚矣世有非文章者曰辭不出于風雅思不越於離騷摸寫古人何足貴也余曰譬諸日月雖終古常見而光景常新此所以為靈物也余嘗為文針今載于此曰文之為物自然靈氣恍惚而來不思而至杼柚得之淡而無味琢刻藻繪珍不足貴如彼璞玉磨礲成器奢者為之錯以金翠美質既雕良寶所棄此為文之大旨也欲知國之隆替時之盛衰察其任臣而已非常之才固不常有齪齪廉謹足以從政矣其次愚魯朴鄙之人亦不害國唯異於人者可以懼矣原注世所謂差人也何者陳侯愛郭紹以興侮楚之怒伯陽任公孫以成謀社之夢屠黍稱國之興也天遺之以賢人國之衰也天與之以亂人是也然此人將至必有異物為此先兆故知遠君子近小人汙澤所以興刺也鶢鶋止於魯郊下展禽之故也鵜鶘集于魏沼不用管寧之應也是以鸜鵒來而師乙嘆鵩鳥至而賈生懼戴鷦巢而張臻悲微禽尚能為害况異于此者昔殷宗懼而修德以消雉雊之變魏明樂以酣身不免鷹揚之恨可以警戒哉余嘗覽人物志觀其索隱精微研幾元妙實天下奇才然品其人物往往不倫以管仲商鞅俱為法家是不究其成敗之術也原注僧一行稱調盈虛御輕重惟太公管仲雖霸者之佐不及太公亦不宜比商鞅鞅可與吳起同類耳以子産西門豹俱為器能是不辨其精粗之迹也子産多識博聞叔向且猶不及故仲尼敬事之西門豹非其匹也其甚者曰辨不入道而應對資給是謂口辨樂毅曹邱生是也樂毅中代之賢人潔去就之分明君臣之義自得卷舒之道深識存亡之機曹邱生招權傾金毀譽在口季布以為非長者焉可以比君子哉又曰一人之身兼有英雄高祖項羽是也其下雖曰項羽英分少有范增不能用陳平去之然稱羽能合變斯言謬矣項羽坑秦卒以結怨關中棄咸陽而眷懷舊土所謂倒持太阿授人以柄豈得謂之合變乎又願與漢王挑戰漢王笑曰吾寧鬬智不能鬬力及將敗也自為歌曰力拔山兮氣蓋世其所恃者氣力而已矣可謂雄于韓信氣又過之所以能為漢王敵聰明睿知不足稱也治平之世教化興行㣥臣和于朝百姓和于野人自砥礪無所是非天下焉有朋黨哉仲長統所謂同異生是非愛憎生朋黨朋黨致怨隙是也東漢桓靈之朝政在閽寺綱紀以亂風教寖衰黨錮之士始以議論疵物于是危言危行刺譏當世其志在于維持名教斥遠佞邪雖乖大道猶不失正今之朋黨者皆依倚幸臣誣陷君子鼓天下之動以養交遊竊儒家之術以資大盜原注大盜謂幸臣也所謂教猱升木嗾犬害人穴居城社不可薰鑿漢之黨錮為理世之罪人矣今之朋邪又黨錮之罪人矣仲長統曰才智者亦姦凶之羽翼勇氣者亦盜賊之爪牙誠如是言然辨之未盡如是者皆小才小勇祗能用詭道入邪徑鼠牙穿屋虺毒螫人如巨海陰夜百色妖露焉能白日為怪哉大道之行當虀粉矣夫與膏肓同病者不可治也與衰亂同風者不可理也劉向上書曰幽厲之際朝廷不和轉相非怨君子獨處守正不撓衆枉勉強以從王事則反見憎毒讒訴故其詩曰密勿從事不敢告勞無罪無辜讒口嗸嗸又曰分曹為黨往往㣥朋將同心以陷正臣正臣進者治之表也正臣陷者亂之機也漢與幽厲之世同風矣干寶晉總論曰朝寡全德之士鄉乏不二之老進仕者以苟得為貴而鄙居正當官者以望空為高而笑勤恪其倚伏虛矌依阿無心者皆名重海內晉與元成之際同風矣所謂虛曠名重者蓋譏山濤魏舒之儔耳後之竊虛名者曾不得與山魏徒隸齒而靦貌於世未嘗自愧趨之者如飛蛾赴火惟恥不及豈蛩蛩負蹶之謂哉虛名者以衆多為其羽翼時不敢害後來者以聲價出其口吻人不敢議以此相死自謂保太山之安可以痛心哉人君不以聚貨制用之臣處將相弼諧之任則姦邪無所容矣左右貴幸知所愛之人非宰相之器以此職為發身之捷徑取位之要津皆由此汲引以塞訕謗領此職者竊天子之財以為之賂聚貨者所以得升矣貴操其奇贏乘上之急售于有司以取倍利制用者所以得進矣三司皆有官屬分部以主郡國貴幸得其寶賂多託賈人汙吏處之頗類牧羊而蓄豺養魚而縱獺欲其不侵不暴焉可得也故盜用貨泉多張空簿國用日蹙生人日困揚雄上書言漢武運帑藏之財填廬山之壑今貨入權門甚於是矣孟獻子有言與其有聚斂之臣寧有盜臣子輿以利國為非揚雄以榷酤興嘆稱其職者必皆挾工商之術有良賈之才壽昌習分銖之事宏羊析秋毫之數小人以為能君子所以不忍為也卜式言天久不雨獨烹宏羊天乃雨焉有仲尼之鳴鼓將攻卜式之欲烹致雨而反居相位可為之甚痛哉自古中主以降皆安于近習疏遠忠良其主非不知君子可親小人可去而不改者其蔽有二一曰性相近二曰嗜欲深桓靈之主與小人氣合如水之走下火之就燥皆自然而親結不可解也侯覽張讓所以得蔽君矣元成二后皆有所嗜吹簫撾鼓之娛微行沉湎之樂非幸臣無以承意非近習無以共歡宏恭石顯所以得蠧政矣唯人君少欲英明者則能反是如文帝雖有鄧通趙談所信者賈誼張釋之爰盎此所謂少欲也武帝雖有韓嫣李延年而所貴者公孫宏倪卜式此所謂英明也故君聽不惑政無頗類近則開元初內有薑皎崔滌以極宮中之樂外有姚盧蘇宋以修天下之政得元成之欲享舜禹之名六合晏然千古莫及其故何也幸臣不得干政故也後代能如漢之文武及開元致理之要雖有幸臣亦何害於理哉開成初余作鎮淮甸會有朝之英彥廉問剖符于東南者相繼而至余與之宴言皆曰聖上謂丞相鄭公覃李公固言李公石曰李訓稟五常之性服人倫之教則不及卿等然天下之才卿等皆不如也三丞相默然而退余曰李訓甚狂而愚曾不及于徒隸焉得謂之奇才也自古天下有常勢不可變也昔陳平之思呂宗而計無所出嘗間居深念陸賈由戶而進不之覺也賈揣知其情言曰將相和則社稷安矣因為畫策陳平乃寤由是以黃金為絳侯壽將相交歡以敗産祿近世五王之誅二張也漢陽王召大將軍李多祚謂曰將軍爵服隆貴誰人與之曰太帝與之將軍資産富侈誰人與之曰太帝與之將軍子弟榮祿誰人與之曰太帝與之因謂曰感太帝恩乎多祚漼然淚下又謂曰今太帝之子深居鶴禁危若綴旒將軍豈有意乎多祚遂感慨受命與之定策元載之圖魚朝恩也以崔昭尹神州裨昭日請苑中牢醴以為朝恩羊及開饌因與北門大將軍王駕鶴等結歡共籌陰計而朝恩竟敗夫舉大事非北門無以成功此所謂天下之常勢也李訓因守澄得幸雖職在近密而日夕遊於禁中出入無礙此時挾守澄之勢與天子契若魚水北軍諸將望其顧盼與目覩天顏無異若以中旨諭之購以爵賞即諸將從之勢如風靡矣訓捨此不用而欲以神州靈臺遊徼搏擊之吏抱關擁篲之徒以當精甲利兵亦猶霜蓬之禦烈火矣賴中人覺其變未及其亂向使訓計盡行所誅者不過侍從數百人而已其徒尚數千人與北門協力報怨則天下橫流矣何以知之昔竇武之舉事也以五校士數千人屯都亭下中官矯詔令張奐率營士與陳對陳乃大呼武軍曰竇武反汝皆禁兵當宿衛宮省何故隨反者乎自旦至食時兵降略盡由是知自前代以來禁軍皆畏伏中官宰臣焉能使其效死嗟乎焚林而畋明年無獸竭澤而漁明年無魚既經李訓猖獗則天下大勢亦不可用也秦皇漢武非好道者也始皇擒滅六國兼羲唐之弟號漢武剪伐胸奴恢殷周之疆宇皆開闢所未有也雖不能尊周孔之道以為教化用湯武之師以行弔伐而英才遠略自湯武以降鮮能及矣豈不悟方士之詐哉蓋以享國既久歡樂已極馳騁弋獵之力疲矣天馬碧雞之求息矣魚龍角抵之戲倦矣絲竹鞞鼓之音厭矣以神仙為奇以方士為玩亦庶幾黃金可成青霄可上固不在於嗇神鍊形矣何以知之荀卿稱千萬人之情一人之情是也百王之道後王是也余聞武宗之言是以知耳嘗於便殿言及方士皆譎詐丕誕不可信也上曰吾知之矣宮中無事以此遣悶耳余嘗覽曹植論言左慈封君達之類家王及植兄弟以優笑蓄之耳斯言信矣大抵方士皆習靜者為之隱身岩穴不求聞達如山鹿野麋是其志也豈樂翹車之召哉敢自衒其術面欺明主者亦鮮矣時既不用逐之可也殺之非也若以其詐而可誅則公孫卿欒大無非行詐殺其干勢利以自衒者足以大戒蘭艾同焚斯為甚矣貞觀末高宗不誅天竺方士那羅延婆娑寐逐之歸國斯可為後王法矣
