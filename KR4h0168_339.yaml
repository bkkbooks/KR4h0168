front:
  text: 全唐文欽定全唐文卷三百三十九顏真卿四
  hash: sha256:d65e4379db8d8499f88d7c67c07fc46eba2898a63d5c7c26056fcca94962c42c
body:
  text: 嗚呼人方羅織我獨平反周來之徒殺人以媚人而卒亦不免孔子曰無求生以害仁有殺身以成仁而何嘗親密乎行感闕俊臣慘刻吏枘鑿不相入當年公已矣民到於今稱遺直前殿中侍御史正議大夫行洛陽縣令隴西李構年三十七洛陽精堅強項稱賢粉繢圖出風規宛然睟容昭寫卓立神全舉板迎揖吾將答焉土俗所呼博淺水浦與敷音轉爾南有博陽山土人呼為濮陽山濮博聲訛水北有歷下村疑古歷陵也皇唐乾元元年歲次戊戌冬十月戊申真卿自蒲州刺史蒙恩除饒州刺史十有二日辛亥次於華陰與監察御史王延昌大理評事攝監察御史穆寧評事張淡華陰令劉皓主簿鄭鎮同謁金天王之神祠顏真卿題記唐永泰丙午歲真卿以罪佐吉州夏六月壬戌與殷亮韋桓尼賈鎰同次於東林寺時則同愔熙怡二公惠秀正義二律師臮楊鷫在焉仰廬阜之爐峯想遠公之遺烈升神運殿禮僧伽衣覩生法師塵尾扇謝靈運翻涅槃經貝多梵夾欣慕之不足聊寫刻於張李二公耶舍禪師之碑側魯郡顏真卿書記唐永泰丙午歲真卿以疏拙貶佐吉州夏六月癸亥與殷亮韋桓尼賈鎰楊鷫憩於西林寺有法真律師深究清淨毗尼之學即律祖師志恩之上足余內弟正義之阿闍黎也緬懷遠現二公之道烈導余躋重閣示余以張僧繇畫盧舍那佛像臮梁武帝蹙線繡鉢袋因寓題歐陽公所撰永公碑陰魯郡顏真卿題唐永泰二年真卿以罪佐吉州聞青原靖居寺有幽絶之致御史韓公涉刺史梁公乘嘗見招欲同遊而不果大歷二年十月壬寅評事韋甫巳使將歸乃與別駕李闕二字清河房澄同官主簿陸涓甫男七步真卿子姪蔡頔泚頤盰等同宿於下方明日及僧明則智清而登禮焉因覩行思天師經始雙泉之靈迹道契律師纂成闕路之祕藏徘徊瞻仰乃援翰而勒於碑陰皇唐七葉我乾元大聖光天文武孝感皇帝陛下以至聖之姿屬艱虞之運無少康一旅之衆當祿山強暴之初乾鞏勞謙勵精為理推誠而萬方胥悅克已而天下歸仁恩信侔於四時英威達於八表功庸格天地孝感通神明故得回紇奚霫契丹大食盾蠻之屬扶服萬里決命而爭先朔方河東平盧河西隴右安西黔中嶺南河南之師虓谷闞五年推鋒而效死摧元惡如拉朽舉兩京若拾遺慶緒遁逃已蒙赤族之戮思明跧伏行就沸鼎之誅拯已墜之皇綱據再安之宗社迎上皇於西蜀申子道於中京一日三朝大明天子之孝問安視膳不改家人之禮蒸蒸然翼翼然真帝皇之上儀誥誓所不及已歷選內禪生人以來振古及隋未有如我皇帝者也而猶嫗煦萬類動唉四生乃以乾元二年太歲已亥春三月已丑端命左驍衛右郎將史元琮中使張庭玉奉明詔布德音始於洋州之興道洎山南劒南黔中荊南嶺南江西浙江西諸道訖於升州之江寧秦淮太平橋臨江帶郭上下五里各置放生池凡八十一所蓋所以宣皇明而廣慈愛也易不云乎信及豚魚書不云乎暨鳥獸魚鱉咸若古之聰明睿智神武而不殺者非陛下而誰昔殷湯克仁猶存一面之網漢武垂惠才致銜珠之答雖流水救涸寶勝稱名蓋事止於當時尚介祉於終古豈若我今日動者植者水居陸居舉天下以為池罄域中而蒙福乘陀羅尼加持之力竭煩惱海生死之津揆之前古曾何髣佛微臣職忝方面生丁盛美受恩寖深無以上報謹緣皋陶奚斯歌虞頌魯之義述天下放生池碑銘一章雖不足形容明聖萬分之一亦臣之精懇也敢刻金石著其詞曰明明皇帝臨下有赫至德光天乾元啓賾緯武戡亂經文御歷孝感神明義形金石仁覆華夏恩加蠻貊道冠巍巍威深虩虩遘茲多難克廣丕績慶緒致誅思明辟易人道助順天心惡逆撲滅之期匪朝伊夕乘此寶祚永廣宗祏業盛君親功崇列辟交禪之際粲然明白迥映來今孤高往策去殺流惠好生立辟率土之濱臨江是宅遂其生性庇爾鱗翮環海為池周天布澤致茲忠厚罔弗怡懌動植依仁飛沈受獲流水長者徒稱往昔寶勝如來疇庸允格德力無競慈悲孔碩相時傳聞尚賴宏益矧在遭遇其忘敷錫真卿勒銘敢告凡百州西南杼山之陽有妙喜寺者梁武帝之所置也大同七年夏五月帝御壽光閣會所司奏請置額帝以東方有妙喜佛國因以名之舊置在州西金斗山唐太宗文皇帝升極之六年春二月移於此山山高三百尺周回一千二百步蓋昔夏杼南巡之所今山有夏王村山西北有夏駕山皆后杼所幸之地也晉吳興太守張元之吳興疏云烏程有墟名東張地形高爽山阜四周即此山也其山勝絶遊者忘歸前代亦名稽留山寺前二十步跨澗有黃浦橋橋南五十步又有黃浦亭並宋鮑昭送盛侍郎及庾中郎賦詩之所其水自杼山西南五里黃櫱山出故號黃浦俗亦名黃櫱澗即梁光祿卿江淹賦詩之所寺東偏有招隱院其前堂西廈謂之溫閣從草堂東南屈曲有懸巖徑行百步至吳興太守何楷釣臺西北五十步至避它城按説文云它蛇也上古患蛇而相問得無它乎蓋往古之人築城以避它也有處士竟陵子陸羽杼山記所載如此其臺殿廊廡建立年代並具於記中大歷七年真卿蒙刺是邦時浙江西觀察判官殿中侍御史袁君高巡部至州會於此土真卿遂立亭於東南陸處士以癸丑歲冬十月癸卯朔二十一日癸亥建因名之曰三癸亭西北於藂桂之間創桂棚左右數百步有芳林茂樹悉産丹青紫三桂而華葉各異樹桂之有支徑以袁君步焉因呼為御史徑真卿自典校時即考五代祖隋外史府君與法言所定切韻引説文蒼雅諸字書窮其訓解次以經史子集中兩字巳上成句者廣而編之故曰韻海以其鏡照原本無所不見故曰鏡源天寶末真卿出守平原巳與郡人渤海封紹高篔族弟今太子通事舍人渾等修之裁成二百卷屬安祿山作亂止具四分之一及刺撫州與州人左輔元薑如璧等增而廣之成五百卷事物嬰擾未遑刊削大歷壬子歲真卿叨刺於湖公務之隙乃與金陵沙門法海前殿中侍御史李崿陸羽國子助教州人褚沖評事湯某清河丞太祝柳察長城丞潘述縣尉裴循常熟主簿蕭存嘉興尉陸士修後進楊遂初崔宏楊德元胡仲南陽湯涉顏祭韋介左興宗顏策以季夏於州學及放生池日相討論至冬徙於茲山東偏來年春遂終其事前是顏渾正字殷佐明魏縣尉劉茂括州録事參軍盧鍔江寧丞韋寧壽州倉曹朱辨後進周願顏暄沈殷李莆亦嘗同修未畢各以事去而起居郎裴郁祕書郎蔣志評事呂渭魏理沈益劉全白沈仲昌攝御史陸向沈祖山周閬司議邱悌臨川令沈咸右衛兵曹張著兄謨弟薦蒍校書郎權器興平丞韋桓尼後進房夔崔密崔萬竇叔蒙裴繼姪男超峴愚子冗頁顧往來登歷時杼山大德僧皎然工於文什惠達靈煜味於禪誦相與言曰昔廬山東林謝客有遺民之會襄陽南峴羊公流潤甫之詞況乎茲山深邃㣥士響集若無記述何以示將來乃左顧以求蒙俾記詞而蕆事銘曰夏后南巡山名是因梁王東揆寺榜攸詢形勝天絶規模鼎新避它城古垂釣臺堙棚以桂結浦由黃申二庾迢遞三癸嶙峋徑列御史傳紆逸人紛吾著書㣥彥惠臻韻海鏡源自秋徂春編同貫魚學比成麟幸託勝引亟倍僧珍庶斯見傳金石不泯天臨有周誕赫元輔屏內藩外經文緯武隱若長城闞如虓虎功縣日月聲蓋寰宇甥舅之國君親是輔統蜀制梁督隴蒞茲天命假易姦臣不祗憑陵君德暴蔑京師我圖匡救三方奮糾緑巾始繫黃龍失守精貫天地義伏㣥醜節著誠全死而不朽皇唐御歷景命有融賜縑改葬懋烈昭忠鄴有賢守是為張公馨香明德乃建閟宮乃建閟宮閟宮有侐乃建豐碑豐碑有崱妖孽遂止幽明載色戩穀無虧享祀不忒昔申伯翰周降神於維嶽仲父匡晉演慶於筮淮而猶見美詩人騰芳史册豈比夫神明積高之壤百二懸隔之都三峯發地而削成九派浮天而噴激炳靈育粹奕葉生賢括宇宙而稟和總河山而蘊秀莫與京者其惟郭宗乎其先蓋出周之虢叔虢或為郭因而氏焉代為太原著姓漢有光祿大夫廣德生孟儒為馮翊太守子孫始自太原家焉後轉徙於華山之下故一族今為華州鄭縣人夫其築臺見師瘞子致養家承金穴之貴政有露冕之高或哲或謀或肅或乂皆海有珠而鳥有鳳也閥閲之盛其流益光隋有金州司倉諱履球府君懋其德輝不憎下位克已復禮州邦化焉篤生唐涼州司法諱昶府君能世其業以伸其道遠近宗之不隕厥問生美原縣主簿贈兵部尚書諱通府君清識徹照博綜㣥言始登王畿鬱有休稱道悠運促靡及貴仕垂於後昆沒而見尊是生我諱敬之府君府君幼而好仁長有全德身長八尺二寸行中潔矩聲如洪鍾河目電照虬鬚蝟磔進退間雅望之若神以仲由之政事兼翁歸之文武始自涪州録事參軍轉瓜州司倉雍北府右果毅加遊擊將軍申王府典軍金吾府折衝兼左衛長上原州別駕遷扶州刺史未上除左威衛左郎將兼監牧南使渭吉二州刺史侍中牛仙客韙君清節奏授綏州遷壽州纍加中大夫策勳上柱國以天寶三載春正月十日遘疾終於京師常樂坊之私第春秋七十有八乾元元年春二月以公之寶允開府儀同三司司徒兼中書令上柱國汾陽郡王曰子儀有大勳於王室乃下詔曰故中大夫壽州刺史郭敬之纍君子之行育達人之德才光文武政美中和生此大賢為我良弻頃以孽胡稱亂黔首罹殃朕於是鬱興神武之師克掃欃槍之勢而子儀帥彼徑卒赫然先驅取京洛如拾遺翦凶殘猶振稿功存社稷澤潤生人是用寵洽哀榮義申存歿可贈太保於戲體含宏之素履秉沖邈之高烈言必主於忠信行不違於直方清白為吏者之師死生敦交友之分端一之操不以夷險變其懷堅明之姿不以雪霜易其令用情不間於疏遠泛愛莫遺於賤貧拳拳服膺終始靡二故所居則化所去見思人到於今稱之斯不朽矣傳曰德盛必百代祀其有後也宜哉恭惟令公先皇之佐命臣也少而美秀長而王褱偉姿性質直天然孝悌寬仁無比騎射絶倫所蒞以清白見稱居常以經濟自命弱冠以邦鄉之賦驟膺將帥之舉四擢高第有聲前朝三為將軍再守大郡纍典兵要必聞休績天寶末安祿山反於范陽令公以節度使擁朔方之衆圍高秀巖於雲中破史思明於嘉山先帝之幸朔方赴行在於靈武擊同羅於河曲走崔乾祐於蒲坂今上之為元帥也首副旄鉞會回紇於扶風摧凶寇於汶水追餘孽於陝服長驅河洛弻成睿圖再造生靈克清天步乂函夏之未乂安天下之不安一年之間區宇大定丕休哉徒觀其元和降精間氣生德感星辰而作輔應期運以濟時忠於國而孝於家威可畏而儀可象盛德繄物寬仁厚下用人由已從善如流沈謀祕於鬼神精義貫於天地推赤誠而許國冒白刃以率先電擊於雲雷之初鷹揚於廟堂之上凡二歷鼎司兩升都座四作元帥九年中書歷事二聖而厥德維懋易相二十而受遇益深蓋克寸復上都者再戡定東京者一其餘麾城摲邑得雋摧鋒亦非遽數之所周也信可謂王國虓虎生人廕庥者歟非太保之邁種不孤則何以鍾美若是況乎友于著睦矕龍虎者十人貽厥有光紆青紫者八士勳庸舉集今古莫儔昔奮號尊榮紅粟才霑於萬石惲家全盛朱輪不出於十人繇我觀之事不侔矣於戲清廟之興所以仁祖考鴻伐之刻亦以垂子孫爰創制於舊居將永圖而觀德中堂有侐丕構克崇感霜露而木惕以增敘昭穆而敬恭斯在庶乎觀盥禺若既無斁於永懷入室僾然必有覿乎其位哀榮既極情禮用申仁人之所及遠哉孝子之事親終矣豈唯溫溫孔父遠稱讒鼎之銘穆穆魯侯獨美龍旗之祀其詞曰郭之皇祖肇允虢土逮於後昆實守左輔徙華陰兮其一源長流光施於司倉涼州兵部克熾而昌載德深兮其二篤生太保允懋厥道神之聽之永錫難老式如金兮其三於穆令公汾陽啓封文經武緯訓徒陟空簡帝心兮其四含一不二格於天地愷悌君子邦之攸塈貊德音兮其五芝馥蘭芳羽儀公堂子子孫孫為龍為光鏘璆琳兮其六乃立新廟肅雍允劭神保是聽孝思孔照亶居歆兮其七乃立高碑盛美奚多支日月有既徽猷永垂映來今兮其八德有三孝弟稱其至常有五仁道原其終故興化所自則曰侯其在矣死喪相恤疇能亦莫吾聞鶺鴒於焉譬急難棠棣所以勗跗萼糾宗綏族所貴因之誰其庶乎吾見之於臧氏矣爰自伯禽國魯公子氏彄魚賂大諫於僖哀言聖兩垂於文武朗陵會吳而滅蜀東郡感張而絶袁建義而辭器歸高奮筆而陽秋與直賢明之盛今古莫崇積慶所鍾克生隋驃騎將軍府君諱滿滿生皇朝通議大夫靈州都督府長史府君諱寵寵生銀青光祿大夫銀州刺史贈太子少師諱善德咸懷忠良克續徽烈古稱有後今見其然少師生三子曰右武衛將軍贈幽州大都督闕三字懷慶冠軍左羽林大將軍兼營府都督御史中丞充平盧節度採訪兩蕃使懷亮河源軍使安北都護右領軍將軍上柱國上蔡縣開國侯纍贈太常卿魏州刺史工部尚書懷恪皆行冠人倫才兼文武並時迭將為國虎臣朔漠之間峻風斯在其功庸志業各具三原縣先塋神道碑懷慶五子曰左金吾中郎將范陽節度經略副使希古右威衛將軍中受降城使希真殿中監朔方經略副使希賓原州長史監牧副使希昢銀青北平太守仍充軍使希逸懷亮五子曰勝州都督朔方節度副使敬廉金紫文安太守范陽節度副使希莊左清道率幽州經略副使敬之太常卿特進武州刺史今上元帥都知兵馬使讓之左監門將軍敬此懷恪七子曰右衛中郎將贈闕州刺史希崇豐州別駕贈宋州刺史希昶左驍衛中郎將贈太子賓客希忱忠武將軍贈汝州刺史希愔壯武將軍左威衛中郎將贈祕書監希景雲麾麟寧三州刺史左金吾將軍左街使贈揚州大都督希晏魯國公希讓並稟訓義方丕崇閥閲遭逢明盛備展材良能挺力虎谷闞之姿學蘊韜鈐之略糅蘭玉而輝映階庭畫隼熊而光聯旟軾勳庸之盛當世無倫源長流深德盛祀遠開元天寶間宗族之紆青紫佐麾幢者巳數十百人逮乎今上當寧而諸孫冠軍左羽林將軍贈太子詹事彥英忠武左清道率瑗左清道率贈少府監彥佺金紫太僕卿涉特進殿中監玠左金吾大將軍彥璟正議湖州長史隨並不幸早世銀青棣州刺史瑜特進殿中監慈州刺史瑀特進鴻臚卿均特進太常卿彥昭開府太常卿彥皓正議杭州別駕巽銀青鴻臚少卿渙鴻臚卿賾朝散明州長史叔獻少府監楚卿朝散台州司馬晉卿朝散洋州司馬叔雅符寶郎齊卿涇陽縣闕雲卿左金吾衛長卿千牛叔卿京兆府參軍叔清闕文公諱含字宏都琅琊臨沂人其先出於邾顏公子友封於郳是為小邾子為魯附庸居於鄒邑因以命氏孔門達者八人曰路回辛驕祖噲僕何次有丁闔叔子率躅秦有芝貞漢有肆異安樂魏有斐盛盛字叔臺青徐二州刺史關內侯始自魯居琅琊代傳恭孝故號所居為孝悌里生欽字公若明韓詩禮易尚書多所通説學者宗之歷大中大夫東莞廣陵太守葛繹貞子生默字靜伯晉汝陰太守護軍將軍生公少有操行以孝聞兄畿咸寧中死託夢當復生發棺而氣息甚微闔家營視母妻不能無倦公乃絶棄人事躬親侍養足不出戶者十有三年次嫂樊氏失明須髯蛇膽尋求不得忽有青衣童子持囊授公乃蛇膽也尋出戶化成青鳥飛去東海王越以為太傅參軍元帝過江為丞相祭酒東宮初建公以儒素篤行補太子中庶子遷黃門侍郎本州大中正封西平縣侯拜侍中除吳郡太守公所歷簡而有恩明而能斷然以威風御下王導歎曰顏公在事吳人斂手矣未之官復為侍中國子祭酒光祿勳以年老遜位成帝美其素行就加右光祿大夫門施行馬賜牀帳被褥敕大官四時致膳固辭不受時論者欲為王導降禮馮懷以問於公公曰吾聞伐國不問仁人向馮祖思問佞於我我有邪德乎或論少正卯盜跖惡孰深公曰隱伏之姦非聖不誅衆咸服焉郭璞嘗欲為公筮公曰自有性命無勞蓍龜桓溫求婚以其盛滿不許因誡子孫曰自今任官不可過二千石婚姻勿貪世家或問㣥士優劣答曰周伯仁之正鄧伯道之清卞望之之節餘則吾不知致仕二十餘年年九十二薨諡曰靖三子髦謙約並有聲譽公喪在殯而鄰家失火髦與二弟抱柩號叫熛焰垂至忽爾頓絶時人以為孝感事見晉書髦子君道少纂家業惇於學行儀狀嚴整風貌端美桓公見而歎曰顏侍中廊廟之望也尚書郎國大中正給事黃門侍郎以父老不就加給事中晉陵臨川太守侍中本州大中正加秩中二千石光祿勳西平定侯事具約孫延之集生綝字文和騎都尉襲西平侯生靖之字茂宗宣城太守司徒咨議御史中丞生騰之字宏道善草隸書有風格治書御史度支校尉巴陵太守生炳之字叔豹以能書稱奉朝請輔國江夏王參軍生見遠字見遠方正不合於俗梁書云博學有志行齊治書御史俄兼中丞正色立朝有當官之稱高祖受禪不食發憤慟哭而絶武帝恨之曰我自應天從人何預天下人事而顏見遠乃至於此生協字子和湘東王記室梁書有傳生之推字介北齊中書舍人給事黃門侍郎平原太守嘗著觀我生賦云展白下以流漣以靖侯巳下七葉墳塋皆在故也生思魯愍楚集序思魯自作事見本傳入隋生遊秦思魯字孔歸博學善屬文尤工詁訓隋司經校書長寧王侍讀東宮學士嘗與劉臻講論經義臻屈服焉高祖入關率男師古相時勤禮育德奉迎於長春宮授儀同秦王記室國史溫大雅傳云大雅在隋與思魯俱在東宮弟彥博與愍楚同直內史省彥公與遊秦並典校祕閣二家兄弟各為一時人物之盛少時學業顏氏為優其後職位溫氏為盛勤禮字敬幼而朗悟識量宏遠工於篆籀尤精詁訓祕閣司經史籍多所刊定歷校書郎著作郎與兄師古相時俱以文學為崇賢宏文館學士太宗使蕭鈞讚曰依仁服義懷文守一履道自居下幃終日德彰素里行成蘭室鶴鑰馳譽龍樓委質終著作郎生昭甫字周卿少聰穎而善工篆隸草書與內弟殷仲容齊名而徑利過之特為伯父師古所賞凡所注釋必令參定焉為天皇曹王侍讀曹王屬有獻古鼎篆書二十餘字舉朝莫能讀昭甫盡識之贈華州刺史真卿表謝批答曰卿之乃祖嘗為碩儒既高倚相之能遂有臧孫之後不墜其業在卿之門二子元孫惟貞元孫字聿修聰鋭舉進士考功郎劉奇特標榜之歷太子舍人專掌令畫元宗讚之曰孔子亞聖魯國稱賢翰墨之妙莫之與先纍至滁沂濠三州刺史贈祕書監五子春卿明經拔萃蜀縣尉舉茂才偃師丞杲卿字昕常山太守祿山反開土門拜衛尉卿兼中丞贈太子太保諡曰忠節曜卿工草隸五言以文學直崇文館淄川司馬旭卿善草書允山令茂曾篤行頗好詁訓犍為司馬惟貞字叔堅有德行詞學尤善草隸屢登甲科太子文學嶭王友纍贈太子少保事具陸據神道碑七子闕疑孝友仁讓專精詩傳杭州參軍允南孝悌聰鋭工為詩判屢入高等與春卿杲卿曜卿同日為侍郎席建侯所賞歷左補闕時真卿為殿中侍御史正至同拱法座蹈舞而衣袂相接者三故允南侍宴詩云誰言百人會兄弟也霑陪纍遷司封郎中國子司業金鄉男喬卿仁友精晉史有吏道富平尉真長清直舉明經幼輿仁和有醞藉精班漢左衛率府兵曹真卿進士校書郎舉文詞秀逸醴泉尉清白名聞長安尉歷三院御史兵部員外郎以平原太守拒祿山凡五為侍郎右丞三為尚書四為御史大夫七為刺史二為節度採訪觀察使魯郡公允臧友悌有吏幹制舉縣令宰延昌拜監察充郭子儀朔方衣資使遷殿中太子中允江陵少尹再兼侍御史充荊南節度行軍司馬公子謙安城太守約零陵太守孫綸廷尉熙散騎常侍顯護軍司馬曾孫系之益州刺史延之金紫光祿大夫劭之領軍司馬根晉安太守元孫希之新安太守師伯僕射師仲中書郎浚吏部尚書測臨淮太守㲋五兵尚書微之散騎常侍僧度給事中僧超徐州刺史來孫幼明征虜記室昆孫積中書郎翻廣州刺史仍孫誓交州刺史挺山陽太守雲孫之儀周御正中大夫新野公之善隋葉令侍讀十代孫昶寧仁令愍楚侍御史遊秦度支郎中廉州刺史見循吏傳著班漢決疑頤隋汝南侯侍讀十一代孫千里工書殷王主簿師古祕書監宏文崇賢學士相時禮部侍郎天一學士育德太子通事舍人司經局校定經史利仁祕書郎有意沔州刺史博古博學延陵丞十二代孫中和渝州刺史揚庭蔣王侍讀光庭博學注後漢書涉令趨庭職方郎中吉州刺史欣期著作郎益期詳正學士敬仲仁孝吏部郎中平昌男康成進士太子舍人崇文館學士希莊進士銀青和州刺史日損應制高第大基尉嘉賓少有俊才十三代孫大智并州録事參軍隱朝進士拔萃河北尉匡朝工五言朐山令元淑鄰幾景靈並校書郎同寅明經升庠有詞學富陽令恭敏有德行明漢書武功尉知微制舉伊闕丞十四代孫溫之有志行舉方正司門郎中澄之淡之並明經晃有清節饒陽司士抱范縣尉允濟好屬文榆次尉振高陵丞搢援挺據揆撰並明經挺有詞理萬年尉式宣清修進士殿中侍御史茂齊淳謹漢州司法舒俊才制舉長安尉説明經有才器渭南丞順孝悌進士評事勝進士左補闕怡好為詩渾博涉有文太子通事舍人方僑進士宮門丞十五代孫逸好文武康令鏻長安尉廣成將軍泉明孝義佐父開土門彭州司馬季明子幹詡沛頗及外孫沈盈盧逖祿山反死難並贈五品官翽敦敏通義令覿綿州參軍皓西令慈明都水穎河南府功曹校書郎頲孝明經大理司直頔奉禮郎頎江陵頌河中顗鳳翔參軍頡當陽主簿願千牛頂武功丞頗工隸書太子洗馬頤頮並京兆參軍翾峴頡顓須䪻頩盈枝並未仕通明項城尉韶有才氣工詩策進士濮陽尉明華陽尉啓溫江尉襲華陰尉亞邱守道不仕其餘枝派繁衍不可具載於戲吾祖以志行純粹感通神明貽謀子孫奕葉無改其後忠義孝悌文學才業布在青史粲然可知非夫德盛流光何能若是真卿小子懼不克荷頃自撫州代到獲展舊山雖碑版沈淪而邱封儼在敢揚不朽之烈庶竭罔極之思銘曰鑠吾祖渡江浦孝通神名軼古凡七葉葬白下本支分源流溥世忠義謺規矩毣鸞皇炳龍虎文雎渙學鄒魯赫才明振區宇亘今昔難悉數嗟末孫慙下武揚耿光愧無取豐碑立百世覩
