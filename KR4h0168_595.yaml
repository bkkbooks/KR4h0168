front:
  text: 全唐文欽定全唐文卷五百九十五詹字行周泉州晉江人舉進士為國子監四門助教卒年四十餘
  hash: sha256:fa0251cef79a1d2db86fe33a1dfcec64fcec2d61af3cb8a85d3076d14d52dd33
  markers:
  - {type: head, offset: 14, content: 歐陽詹(一), id: KR4h0168_NFKB_595-h1, level: 1}
body:
  text: 出門辭家兮人有志而斯逞豫紛然而遠遊別天性之至慈去人情之好仇嚴訓戒豫以勿久指蒲柳以傷秋弱室咨豫以遄歸目女蘿而起愁心眷眷以纏綿淚浪浪而共流惕懷安以敗名曾何可以少留於是驅忠信以為車執藝業以為贄越三江踰五嶺望堯旌而求試庶亦呈功取爵建德揚名獲甘旨以報勤光晝錦以回衡如弧斯張如鳥斯征射百步而期中飛三年而必鳴風蕭飋天寒崢嶸歲晚鵲聯翩以不定蓬悠揚而自轉逮前程之尚遙顧所離而日遠事紛拿以爭拔情交戾而不和退籓籬則弱羽戀於雲路激龍門則纖鱗限乎尺波身違日日之晨昏戀悽悽而莫遣親益年年之羸老思搖搖而若何慜靈輒於困窮舉冀缺於壟畝一仁聲之永大一孝德之滋久伊錫類以極窮豈今無而昔有爾乃循否泰以俟命默風塵以愴艱苟疏溟以納流願覆簣以成山路實多歧絲無定色任元黃之濡染信彊理之南北管因媒而解縛越自遇而升車虞先榮而後悴姜始卷而終舒傷哉數子之稅駕吾未知其所如荊山之石兮玉在其中和氏不見兮追師不攻內抱貞明蓄圭璋而自異外封磽確與砮礪而攸同紛爾千峰塊然一石石居山而有類玉處胎而無跡昭彰奇彩象鸞鏡之猶埋特達英姿狀蠙珠之未拆齊草木之偕賤謺泥沙而共積王褱材則韞精氣時揚結白虹於林薄浮清氣於巖岡多見已形空知六瑞之貴罕窮未眹誰分十仞之光混瘞嵌巖沈蒙翳薈同夫有智懷其有以若無侔彼不爭守厥屯而俟泰明其內晦其外將藏器以待知不干物以招害原夫石則稱堅而可轉玉則受琢而凝清日遇良工一則有順而無固時惟哲后一則無脛而前呈我唐文武建元成康紹允獲王母之玉琯致淮夷之琛賮向華池而效色從溫樹以流潤伊抱璞之未聞亦梯山而自進佳粱糅粃黃金在沙必簸糠而揚礫冀取實以除華雕琢儻行輝章希發願同三獻之納庶免再來之刖夫何降一人兮將凝帖乎萬方神其精而傑其質兮赫赫巍巍以昂昂應千年之寶歷承八聖之重光道為紀德為綱仁為宅義為防化悠悠而蕩蕩風習習以洋洋沐雨露以蕃昌燭日月以皆康癸亥之歲太皡司政乃作幸於西順上帝之令將行曰相彼元元以哲后為父母視淫君猶芻狗豫其在德則夷狄皆豫之子也伊重關擊柝虞誰而守乎豫其不淑則骨肉實豫讐敵也雖金城湯池於豫何有乎四門大開七寢停警飋凜慓以風清寂澄凝而月靜於時厥有頑民從愚至逆假鴻恩以出入弄神器於閒隙於是天忿地怒人慘神惻積憤氣以交衝謺冤心以潛逼災變流演妖氛充塞山河列以長晦日月在而無色明則士庶幽則靈祇豚魚有識草木無知企喁喁以嗷嗷望我后之來儀如孺子之憶慈親焉如涸鱗之念長津焉如枯苗之待膏雨焉如籠鳥之仰林莽焉既而文物無荒聲名有素木葉猶飛金風未暮聖澤西浹天顏東顧回旌旗整鸞輅雨師啓途風伯前驅豐隆布令列行誅神功莫仇天力誰虞櫛繽紛於瀴溟駢駱驛乎虛無洗地軸拂天衢殲有罪福無辜氛霾掃蕩於寰區塵埃滌濯乎皇都元凶不戮而淪痡品物未覩而遙蘇爾其靈物既先乘輿乃從雲車煙馭春心日容鬱霏霏以葳蕤輝熠熠以嚴禺祥風風矞風矞以淫淫瑞色靉靉而溶溶濛籠焉虹霓之縈儀鳳髣佛焉江霧之送遊龍若夷若夏乃愚乃賢振振駢駢殷殷闐闐巷如流以湯湯野若草而芊芊雲浮巨嶽水集洪川至喜翻悲含淚而前曰自沐元化溟溟綿綿如戴於天如飲於泉卒歲永年皆謂自然異日殷憂方昭厥由歸歟歸歟人其待居是日也皇帝乃闢金門升紫宮宣睿旨將天衷熙乎若微雷淑氣暢昆蟲芬乎若韶光麗景發青葱下蟠厚地上洽元穹扶桑而西虞泉而東百福交通萬彙大同白日三舍以逡巡瞪丕征以融融南山萬歲以爭呼頷若動而崇崇至矣哉之德也深乎大乎滂乎沛乎爾其汪濊乎可謂上合天經下叶坤靈旁統神明中獲人情故能不守有與之守不爭有與之爭此一舉也足見天地之心足辨人神之意諒無黨以無偏唯夫道德之比者也憶求名於薄藝曾十稔以別離才還鄉以半齡又三年於路歧紅顏匪長白日如馳苒苒皆盡悠悠為誰親有父母情有閨闈居惟苦饑行加相思加相思兮寧苦饑辭家千里心與偕歸南陔之蘭北山之薇一芳一菲何是何非歸去來兮秋露霑衣杲杲者日中則重光燭生生於有晦暖物物於無疆人在下君體陽故法之象之宜諸帝王亭然止六合居中赫然洞九霄臨下取其正諒無邪僻之徒倣其明詎有幽陰之者瞻端嚴則體率慕光昭以心寫想照彌乎八紘庶化覃於九野觀夫高舂始上虞泉未移面方輿而再朗點圓昊以重規有隼之墉匿寸陰而影盡無禽之井透百尺以光披含靈亹亹處植離離穴有向陽之戶柯無不煦之枝伊體元在已有國於斯形厥功以居大固其義之攸宜况日則類王王實况日道符罔二理契惟一當其食昃用貶膳以去懸仰以高明直廾儔而背匹是以如之致唐堯之盛假之在周易之豐暮非乏照朝亦有融或背籬東之蟄或遺山右之蒙掩彼不言黜履邪而有蔽放茲取則貴無偏以處中正不正通難通可以勵垂衣之聖政可以激御遠之神聰者也我皇祗若高穹保茲洪祚順三辰之耿耀稽八卦之明諭覿兢莊霑煦嫗美盛德之形容遂屏營而作賦玉之美者其曰瑾瑜雖特達之自有豈疵瑕之則無菲食其端葑采其下苟當無而可用諒在人而罔捨况服飾所珍禮容攸假五德人尚居然總之百寶物雄又其尤者只如夷吾委質曲逆從王一則措其所短一則舉其所長伊十仞之可貴詎一眚而為傷是故異比荊山奇同鄭市縱青蠅之下點有白虹以旁起琢中良工佩宜君子爾若惡其細而棄其大我則揚其表而掩其裏矧乃圭或致磨璧當可指終酬九年之積不損連城之美勗矣乎韞獨明之見宰萬物之工覩其材而辨其器履其始而知其終建莫大之勳與悠悠既異收稀代之寶將瑣瑣寧同砮璞自充散材徒鬱苟無分寸之痕翳罔有尋尺之盤屈瑩乏光華絃乖音律攻之有曠乎日力斫之不益於人物空知有玷與無疣豈不道疏而理拂至剛也必時時而外缺至清也乍渾渾而罔容考瑾瑜之含匿亦厥義之云從不然者元黃已疲奚復騁乎千里輪囷則病焉得用於九重瑜之體全者則稀瑾之無瑕者亦罕惟追師之鑒選納尺長而寸短矯矯徵君居幽行聞朗詠堯年之日棲遲姑射之雲英英時傑好奇藝絶窺窮圖繪之能寫得隱淪之哲豈不以懷材習技我蘊跨俗之工履道全真彼有過人之節者也觀夫杖藜載酒面石依松盡是山中之意全移物外之蹤入室終窺知裂繒而畫出升堂始睇疑在野而相逢如言實默如行實止蘿纖纖以垂帽草青青而藉履洋乎令聞昭晰得其所由儼夫儀刑髣佛知其所以原夫賢達作範丹青立程將模前而示後必體物而歸誠服惟身表容實心旌對冰雪之顏覩蘭蕙之纓暗識伯夷之潔遙憐虞仲之貞知身已謝看畫如生矜且復莊若此辰之有識貪之與欲同在日之無情形似植以亭亭衣如風而曳曳臨諸瑤席之上想彼雲林之際萬物方秀千峰初霽神飄飄而自遠身悠悠而不繫我之心矣惟賢允臧披圖畫於是日得夫君乎此堂乃知君之於德也大畫之於工也長畫非君無以展其妙君非畫莫得揚其光物有相假不其昭彰揆人事之美惡論功庸之夥少伊畫也可以稱智者之先惟君也可以作真人之表者也智之不測有明水焉方諸在手圓月居天象質遐分則迢遙而迥遠英華潛合遂滴瀝以流漣可謂妙自斯妙元之又元此道也自何而來彼靈也從何而借越杳杳之蒼旻阻溟溟之永夜望蟾魄而光彩殊流端蛤形而清泠忽下等陽燧之通感實柔祇之祕化豈不以我惟陽德伊乃陰徒精靈合契氣類相符共稟坤而配坎諒交津以有濡此理焉自取之乎必有斯水也遂生之於本無精潔可嘉清明斯在湛玉壺以無垢入犧樽而有待處罍實爵今則由於鬯人置下升堂已不關乎真宰稽乎所自原夫所致臨庭目擊雖從陰鑒而來向月心祈又似上天而至來莫我挈至莫我精廾本不仁故存名而曰水從宜酌號遂表性而稱明信可薦宗祏祈上清故得歸先歲享告帝功成冠三酒而首進掩五齊以先行招百神之景福致萬姓之元禎無益於人鄙玉漿於夜漏自求其益哂珠露於金莖遊原習坎固有冥感處陸浮空不無元通龍吟雲而致雨虎嘯谷而來風動無千里之效潤才百里之功詎若以握中之瑣細向天上之曈曨精液下融神人以崇而福祿攸同者乎多事佳人假盤盂而作地疏綺繡以為春叢林具秀百卉爭新一本一枝叶陶甄之妙致片花片蕊得造化之窮神日惟上春時物將革柳依門而半緑草連河而欲碧室有慈孝堂居斑白命聞可續年知暗惜研祕思於金閨同獻壽乎瑤席昭然斯義哿矣而明春是敷榮之節盤同饋薦之名始曰春兮受春有未衰之意終為盤也進盤則奉養之誠儻觀表以見中庶無言而見情懿夫繁而不撓類天地之無巧雜且莫同何才智之多工庭前梅白蹊畔桃紅指掌而幽深數處分寸則芳菲幾叢呼吸旁臨作一園之朝露衣巾暫拂成萬樹之春風原其心匠始規神謀創運從衆象以遐覽總㣥形而內蘊彼有材實我則以短長小大而模彼有文華我則以元黃赤白而暈故得事隨意製物逐情裁凝神而珍奇競集下手而芬馨亂開不然者欲玩扶疏須買青山以樹要窺菡萏待疏緑沼而栽將以緩愁豫之思將以逞吾人之才此一作也察其所由稽其所據匪徒為以徒設誠有裨而有助者也曉日離斗兮昏星見奎鴻山冘向北兮龍角徂西天子慮層冰以為災闢凌雲而大納山人於其時而貢職庶壽域以同躋黑牡既馨元冥已祝人惟任土侔有賦以歸王物或稱琛類無脛而奔陸鑿固沍於窮壑閉重泉乎夏屋炯乎干將之出地燦乎連城之韞櫝爾乃東風月仲之節西陸晨覿之朝薦明靈於寢廟頒有位乎中朝光可鑒形鄙照車之寶楚清能禦暑輕萐莆之珍堯向玉堂以孤瑩鎮瓊筵而自昭助微涼於長簟回煩燠於炎飆鬼神以之而饗集君臣以之而利饒豈止疾雷不震淒風不飄致兩儀之交泰作六氣之和調而已哉冰之藏也旨意可稽冰之賦焉英華可覿休宗社之成禮暢乾坤而樹績順時元吉為我政之恆孚悖道致尤寧魯臣之屢析六合蒼蒼萬物攘攘詎無時啓亦有時藏繹其功而此譬於厥德而何方徑挺金相貞清玉質展其用無愧於明時韞其光不欺於暗室乘凜冽以冬入滌赫曦而夏出穿楊發彼觀國於茲幾鬻三冬之學又當二日之時業屬辭以比事遂含毫而賦之丙寅歲因受譴季冬之月次於殷墟歷關龍逄墓焉昔聆其風未嘗不回腸霣涕覩夫塋壟心又增傷遂寫憤於言為賦以弔先生以忠諫致命故以懷忠命篇云其辭曰天生彼辛兮用殲覆於夏家欲悠悠而罔極毒浩浩而無涯無辜殞身肆市朝之若莽有道併命委炮烙以如麻伊先生之諤諤為酷烈之所加嘗披圖於往載每廢卷以興嗟蕭條舊邑漭滄空陂陷陵成坎古木無枝或人曰此其墓也又一倍以增悲嗚呼麟非騰噬之儔詎豺狼之共穴鳳實仁靈之類豈鷹鸇之同列惟玉石之明分亦薰蕕之自別是以謇謇心兢昂昂面折彼炎炎之原燎信撲撲而不滅寧歸死以申懷不貪生而結舌痛矣哉古人有言輔仁者天福善者神胡為是日功不如人使典章之不信俾忠義之空勤律中大呂日臨蒙谷風颼颼於衰草煙茫茫乎平陸思悽悽而填臆淚淫淫以盈目義則非其知友親故遠乎骨肉節臨危而不撓行於艱而彌篤惟其有之是以傷之而慟哭詠聲調兮律聲遍人心厚兮國風變伊在堯之既引載得夔而斯見哀思慮始安和追往宗伯官也擇人乎有才正始化焉選音於無象綴咸池之雅韻去桑間之末響圖風普以雨周算天長而地廣律則以宮激徵詠則從濁揚清且懲流而反正常誡險以歸平若近若遠非幽非明類無臭等無聲信矣惟時與四時而德洽純如合莫彌六合以文成善詠者聲應聲者律會高低以齊奏諧疾徐而並出跡不得尋功如何述為災為眚曾莫奉於淫君調陽序陰屢見資乎聖日故得之者體圓御方失之者亡禋絶祀比屋可戮桀紂罔測其所由率土可封堯舜固知其所以不然者移風之言曷謂易俗之訓則那我所以清六管順賡歌載唱載吹匪塤箎之獨叶一張一弛豈琴瑟之空和八紘有截四海無波物阜人蕃雖歸之乎至德鳥來獸舞蓋於斯而靡他其理微其用遠論有助也侔大君之得一考無情焉同八風之吹萬可謂我詠斯暢我律斯臧發揚六氣孕育㣥方處植者以之而茂實含識者於焉而壽昌彼離連與栗陸復何道而稱皇粵惟日行於翼風發於庚白露下降鴻雁來征野颯颯而木落天寥寥而氣清獨孤亭之不寐見涼月兮東生上迢迢之霄漢掩冽冽之恆星出江山之磅礡豁閶闔之崢嶸皎皎搖搖晶晶盈盈映階墀以歷歷對窗戶以亭亭雖他時之並照何斯夕之為明異夫白鶴翩翻不分其色寒泉灑落空聞其聲乃遙夜以虛燭實純風之至精於是照曜必周通冥洞幽其色也潤林巒之卉物其影也瑩江湖之亂流益池亭之寂寂增氣候之颼颼起離家之遠恨生去國之繁憂何處而不見何人而不愁豈謂征客懷歸徘徊於黃榆之塞佳人怨別蕭條於紅粉之樓已矣哉信知宇宙之中光明為至非凄凉之獨感亦清貞之可類臨照者足以倣有德之君潔白焉宜將匹無瑕之士傷哉不肖倣徨嶺徼時雨露兮未霑自形影兮相弔願窮經兮取老恐用人兮尚少幸君子兮如月冀餘光兮一照唐貞元六年歲在庚午陰陽家流曰歲在午人馬食土人之所食也穀馬之所食也草今言食土明歲無嘉穀而野無青草則運數於茲合凶災之大者於是天尋舊步地轉恆軸交糾回薄將有結於常沴自春三月至於夏五月或赫日杲杲或密雲溶溶為燋灼為霖霪似不日而至皇帝宿布太和人神鳥獸魚鱉咸若騰歡心揚靈臺欣欣熙熙休氣中積浹磅礡浮蒼蒼潛相戛磨力強者勝九陽構旱而莫展六陰作潦而不就氛祲藹為慶雲烈景皎為祥光油油熏熏宛復如春塊不破而雨足條無聲而風暢日者眚氣欲凝淑氣猶競彼雖罔得為禍此亦未能為福徘徊相持時澤不降五稼含萌而待藝百芳蓄穎以思坼至是土膏融甘液宣若決渟泉如開涌煙豐草增歧芃芃綿綿無磽與良沃獲一十於百千賸蔬雲矗以萎圃餘糧嶽峙而棲畝夫體病不能害心心平必能制體古人曰人者天地之心也既和且平則天地之病又焉得成歟况奔走游泳之物曰靈曰祇之類皆吁歈怡逸於其中乎宜其療乾元之宿沴愈坤元之常疾以至於交泰如斯之盛也古先帝王至聖則堯至仁則湯有黎氓以稱理歷水旱而莫禦豈不以道未全洽而德尚涼哉皇帝非徒能禦之又易之為大慶殊祥其於道德可謂充塞洋溢光今而邁古矣元元蚩蚩嗚嗚啞啞歌聖代者動天殷地以夜繼晝而其詞未宏輒為頌二章用貽於康衢庶事明而聲暢流乎無窮而以德勝目篇頌曰歲在午天災於常昔人食土今我飫粱匪徒我飫粱鰥寡千箱盛矣乎吾皇之德變眚為祥休哉德兮歲在午天災斯屬昔馬食土今牛饜菽匪徒牛饜菽犬豕粱肉盛矣哉吾皇之德轉禍為福休哉德兮
