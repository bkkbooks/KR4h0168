front:
  text: 全唐文欽定全唐文卷六百六劉禹錫八
  hash: sha256:d76c98d4261259392f7d7d876ca351db8543ebe4b18de76237f632788186ff80
body:
  text: 初大歷中名儒張參為國子司業始詳定五經書於論堂東西廂之壁辨齊魯之音取其宜考古今之文取其正繇是諸生之師心曲學偏聽臆說咸束之而歸於大同揭揭高懸積六十歲崩剝汙衊淟然不鮮今天子尚文章尊典籍於苑囿不加尺椽而成均以治國學上言遽賜千萬時祭酒皞實尸之博士公肅實佐之國庠重嚴過者必式遂以羨贏再新壁書懲前土塗不克以壽乃析堅木負墉而比之其制如版牘而高廣其平如粉澤而潔滑皆施陰關使眾如一附離之際無迹而尋堂皇靚深兩廡相照申命國子能通法書者分章揆日遜其業而繕寫焉筆削既成讎校既精白黑彬班瞭然飛動以蒙來求煥若星辰以敬來趨肅如神明以疑來質決若蓍蔡由京師而風天下覃及九譯咸知宗師非止服逢掖者鑽仰而已於是學官陳師正等暨生徒凡四百二十有八人請金石刻且歌之曰我有學宇既傾而成之我有壁經既昧而明之孰規模之孰發揮之祭酒維齊博士維韋俾我學徒弦歌以時切切祁祁不敖不嬉庶乎遒人來采我詩時余為禮部郎凡瞽宗之事得以關決故書之以移史官宜附於藝文云益城右門大逵坦然西馳曰石筍街街之北有仁祠形焉直啟曰福成寺寺之殿臺與城之樓交錯相輝繡於碧霄望之如崑閬間物大和四年蜀帥非將材不修邊備南詔君長諜得內空乘隙坌入鬬於城下或縱火以駭眾此寺乃焚高門修廊委為寒燼如是者再歲帝念坤維丞相復來山川如迎父老相識環視故地寺為燋墟載興起廢之嘆爰有植因之願乃命主俸吏以吾緡錢三十萬為經營之基自公來思蜀號無事時康歲稔人樂檀施公言既先應如決川乃傾囊禇乃出懷袖勝因化愚慧力攝慳男奔女驟急於徵令匠者度材以指眾徒藝者運思以役眾技斤鋸磨礱丁丁登登陶者儲精圬者效能歘自火宅復為金繩沿故鼎新因毀成妍華夷縱觀萬目同聳既告訖役公來慶成雲鮮日潤輝映前後於是都人舞忭而謠曰昔公去此福成以燬今公重還福成復完民安軍治亦如此寺庸可勿紀乎公實聞斯言遂折簡見命謹月而日之時大和某年某月日大檀越具官封爵段氏其他發大願者程功董事者自中貴人及賓介將吏若僧徒偕籍之而刻於石佛薪盡於乾竺而像教東行是法平等故所至為淨土是身應供故隨念如降生先是魚復人有以利金為彌勒像者重千鈞睟容瑞相人天兩足鳧氏卒事而他工未備故寓於西偏不知其幾年矣寺僧法照瞻禮發信赤肩白足入諸大城乃至聚落無空過者積十餘年得信財無量繇是購工以嘗巧募徒而畢力四輩增增工麾以肱中樞外脈陰轉陽動歘如地湧岌如山行大匠無言尊容嚮明青蓮承趺金獸捧持藻井花鬘葱蘢四垂邑人膜拜如佛出世法照以願力能就泣於佛前因持片石乞詞以示後桉此寺始於宇文周初瀕江埤庳皇唐神龍中為水所壞有波那賴耶國僧廣照浮海而至頓錫不去遂移於今道場所山曰磨刀嶺曰虎岡其經始與克終皆蕃僧是力後之有志者豈無人哉法照夔人姓穆氏年十有五出家依江陵名僧受具肇自貞元二十年甲申歸此寺願崇建有為凡修大殿立菩薩大弟子侍佛左右逮長慶癸卯有成其善植德本者歟初摩阿迦葉受佛心印得其人而傳之至師子比邱凡二十五葉而達摩得焉東來中華華人奉之為第一祖又三傳至雙峰信公雙峰廣其道而歧之一為東山宗能秀寂其後也一為牛頭宗嚴持威鶴林徑山其後也分慈氏之一支為如來之別子咸有祖稱粲然貫珠大師號法融姓韋氏延陵人少為儒博極㣥書既而嘆曰此仁義言耳吾志求出世間法遂入句曲依僧炅改逢掖而緇之徙居是山宴坐石室以慧力感通故旱麓泉涌以神功示現故皓雪蓮生巨蛇摧伏㣥鹿聽法貞觀中雙峰過江望牛頭頓錫曰此山有道氣宜有得之者乃東果與大師相遇性合神契至於無言同躋智地密付真印揭立江左名聞九圍學徒百千如水歸海由其門而為天人師者皆脈分焉顯慶二年報身示滅道在後覺神依故山戒香不絕龕座未飾夫豈不思乎蓋神期冥數必有所待大和三年潤州牧浙江西道觀察使檢校禮部尚書趙郡李公在鎮三閏百為大備尚理信古儒元交修始下令禁桑門販佛以眩人者而於真實相深達焉嘗謂大師像設宜從本教言自我啟因自我成乃召主吏籍我月入得緡錢二十萬俾秣陵令如符經營之三月甲子新塔成事嚴而工人盡藝誠達而山神來護願力既從眾心知歸撞鐘告白龍象大會諸天聲香之蘊如見如聞即相生敬明幽同感尚書欲傳信於後遠命愚志之夫上士解空而離相中士著空而嫉有不因相何以示覺不因有何以悟無彼達真諦而得中道者當知為而不有賢乎以不修為無也元和十四年春二月王師平河南負固之地十有二州憲宗視地圖戶版俾參其地三月有詔其以曹濮隸鄆為一隅桉部三郡統兵三萬乃新其軍錫號天平蓋承天威以平暴悖志動揚休在稱為雄新邦始徠汙浴猶用朝廷革之以漸故命功臣或辦吏以帥焉大和三年冬天平監軍使以故侯病聞上方注意治本乃以牙璋玉節鼎右僕射官稱賜東都留守令狐公曰予擇文武惟汝兼前年鎮汴州有顯庸往年弻憲宗有素貴徒得君重剛吾四支公西拜稽首登車有耀不踰旬抵治所夾清河而域之惟鄆州在春秋為須句之國涉漢為濟東蓋禹貢亠兊州之域宣精在上奎為文宿畫野在下魯為儒鄉故其人知書風俗信厚天寶末大憝起於幽都虜將因兵鋒取其地右勇左德積六十年公之來思如古醫之治劇病宣洩頤養氣還神復大凡抗詔條國式於身以先之示菲約以裕人信賞罰以格物物力日完人風自移涉月報政踰年鼎治牙門之容暨暨而恭壘門之容仡仡而和里門之容闐闐而遂勞者以安去者以歸分星不搖田祖降福凡革前非罷供第無名錢歲鉅萬菽粟如之錦繒且千兩去苛法急徵毀家償租之令故流庸自占四萬室眾無吁咨和氣乃來三田仍稔草木咸瑞豈偶爾哉初斯堂西墉有刺史記而元戎雄尊之位虛其左方豈有待邪公命愚志之俾來者仰公知變風之自大和五年四月二十六日記文皇帝初元始畫天下為十道古荊梁之地舉曰山南厥後析為東西天漢之邦實居右部桉梁州為都督治所領十有五州縣道帶蠻夷山川扼隴蜀故二千石有采訪防禦之名兵興多故其任益重澄清節鉞二柄兼委建中末德宗南巡狩偃翠華而徘徊簫勺之音洽於巴漢戡難清宮六龍言旋迺下詔復除徵繇升州為府等威班制與岐益同地既尊大用人隨異故自興元至大和五十年間以勳庸佩相印者三以謨明歷真相者九由台席授鉞未幾復入相者再焉磊落震耀冠於天下去年夏四月今丞相趙郡公徵還泰階遂命左僕射燉煌公往踐其武曏之真相及公而十焉初公自河陽節度使入操國柄其後鎮宣武以禮悛獷悍治天平以清去掊克居大鹵以仁蘇薦饑今來是都躡二三大君子之躅道同氣協無所改更如鼓和琴布指成韻羌夷砥平旱麓發生人無左言樂有夏聲俗既富庶居多閒暇圜視府局素闕者補之先是公堂嘗為行殿人不敢斥別營侯居應門有閌棨㦸未具公乃條白上言詔下有司可其奏軍門肅清方有眉目趨而入者聳然生敬焉惟梁山國也其節用虎出揚其威入貯宜潔舊處仄陋黷其雄稜公遂分宅之別齋且據便地署曰節室卜剛日乃遷焉敬君命而壹民心軍中增氣而知禮㦸衣既垂師節既嚴流眄屋壁見前修之名氏列於座右第以梁州刺史鼎興元尹記與今稱謂不合因發函進牘於不佞且曰我已飾東壁以新志累子於是桉南梁故事起自始登齋壇之後為記云時開成二年歲在丁已春二月某日記夔在春秋為子國楚幷為楚九縣之一秦為魚復漢為固陵蜀為巴東梁為信州初城於瀼西後周大總管龍門王公述登白帝嘆曰此奇勢可居遂移府於今治所是歲建德五年隋初楊素以越公領總管又張大之唐興武德二年詔書其以信州為夔州七年增名都督府督黔巫一十九郡開元中猶領七州天寶初罷州置郡號雲安至德二年命嗣道王鍊為太守賜之旌節統峽中五郡軍事乾元初復為州偃節於有司第以防禦使為稱尋罷以支郡隸江陵桉版圖方輪不足當通邑而今秩與上郡齒特以帶蠻夷故也故相國安陽公乾曜嘗參軍事修圖經言風俗甚備今以郡國更名之所以然著於壁云凡名殊必以國事建必以年謹始也長慶二年五月一日刺史中山劉禹錫記此郡於天文與荊州同星分田壤制與番禺相犬牙觀民風與長沙同祖習故嘗隸三府中而別合乃今最久而安得人統也桉宋高祖世始析郴之桂陽為小桂郡後以州統縣更名如今其制誼也郡從嶺州從山而縣從其郡邑東之望曰順山由順以降無名而相欽者以萬數回環鬱遶迭高爭秀西北朝拱於九疑城下之浸曰湟水由湟之外交流而合輸以百數淪漣汨潏擘山為渠東南入於海山秀而高靈液滲漉故石鍾乳為天下甲歲貢三百銖原鮮而膴卉物柔澤故紵蕉為三服貴歲貢十笥林富桂檜土宜陶方瓦故候居以壯聞石侔琅玕水孕金碧故境物以麗聞環峰密林激清儲陰海風敺溫交戰不勝觸石轉柯化為涼颸城壓赭岡踞高負陽土伯噓濕抵堅而散襲山逗谷化為鮮雲故罕罹嘔泄之患亟有華皓之齒信荒服之善部而炎裔之涼地也永貞元年予始以尚書員外郎坐黨累出補茲郡居無何吏議以是遷也不足償其責故道貶為朗州司馬後十年詔書徵還抵京師俄復前命佩故印綬而南曩之騎竹馬北向相徯者咸仕郡縣巾韝來迎下車之日私唁且笑既視事得前二千石名姓於壁端宰臣王晙倖卿劉晃儒官嚴士元聞人韓泰僉拜焉或久於其治功利存乎人民或不之厥官翹禺載於歌謠余不佞從㣥公之後肇武德距於今凡五十有七人所舉者四君子猶振裘之於領袖焉元和十一年七月二十四日刺史中山劉某記歷陽古揚州之邑於天文直南斗魁下在春秋實句吳之封後為楚所取秦幷天下以隸九江而亦為九江治所晉平吳復隸淮南至永興初自析為郡益之以烏江宋臺建目為南豫州又益之以龍亢梁之亡也北齊圖霸功擁貞陽侯以歸王僧辯來迎會於茲地二國和協故更名和州陳隋間無所革國朝因隋武德中更龍亢為含山初開元詔書以口算第郡縣為三品是為下州元和中復命有司參校之遂進品第一桉見戶萬八千有奇輸緡錢十六萬歲貢纖紵二篚吳牛蘇二鈞糝鱏九罋茅蒐七千兩鎮曰梁山浸曰歷湖田蓺四穀豢全六擾廬有旨酒庖有腴魚神仙故事在郊在藪元元有臺彭鏗有洞名山曰雞籠名塢曰濡須異有血閫祥有沸井城高而堅亞父所營州師五百環峙於東南瀕江劃中流為水疆揭旗樹蕝十有六戍自孫權距陳出入六代常為宿兵之地多以材能人處之本朝混一號為善部然用人差輕非復曩時之比也始余以尚書郎得譴刺連山今也由巴東來牧考前二邦之籍與版圖纔什五六而地征三之究其所從來生植有本女工尚完堅一經一緯無文章交錯之奇男夫尚墾闢功苦戀本無即山近盬之逸市無嗤眩工無彫彤無遊人異物以遷其志副徵令者率非外求凡百為一出於農桑故也繇是而言瘠天下者其在多巧乎寶歷元年六月二十一日刺史中山劉某記古諸侯之居公私皆曰寢其他室曰便坐今凡視事之所皆曰廳其他室以辨方為稱今年鄭州刺史楊君作東廳既成而落之且以書抵余為記桉國章以甲乙第方域大凡環天子之居為雄州鄭實邇王畿故望雄視其版多貴人且當大逵故務劇君侯始來三日司稅掾舉七縣董租之吏累百君曰此百螣也悉罷之用戶符而輸入益辦司貢掾舉梨林之徵請戶曉君曰盡弛之勿籍用平賈而果益精里無吏迹民去痼疾授牘占租如臨詛盟土毛人力日夕相長故周歲而完焉比年而愈肥雖軍興餽輓旁午大將牙旗往復相踵而里中清夷雞犬音和人既寧而物有餘政既成而日多暇圜視舊宇宜有以更之且書得時亦以謹始因列名氏授受月而日之庶乎繼踐於茲者知貫珠之首其山望澤浸土風甿俗與前賢之耿光備於正位有天寶中詞人杜頠之文在大和四年某月日本朝以浚儀為汴州刺史治所自隋釃新渠吸黃河而東行州含其樞為天下劇內屏王室東雄諸侯居無事時常帶廉察使兵興已還益以節旄用人得否繫國輕重長慶四年詔書命河南尹燉煌令狐公來莅來刺錫之介圭使印兵符汴人交賀肴醳騰貴惟是邦始都於魏惠王始郡於宇文周星躔回環天駟垂光地為四戰故其俗右武人具五都故其氣習豪公自為宰相時已熟四方之利病凡所戾止參然前知既視事三日挹㣥吏與之言曰吾食止圭田吾用止公入凡他給過制傷廉浼潔者悉罷之壹歸乎公藏凡曲防苛禁不情乖體者悉剗之壹出乎令典凡關徵船算奪時專利者悉更之壹遵乎詔條然後刑麗事而詳賞以時而均興學以勸蓺示寬以化勇居數月而汴州人恂恂然無復故態明年大成議者若曰奕奕浚都國之咽頤咀清嚥和旁暢四支東夏黠馬由我以肥是浚之治非所澤於所履而已初公七代祖在隋為納言大業中持節居此亦號刺史距今餘二百年公實能似既拜闕發魚書合左右契由阼階躋遐踵前武歆然如聞其馨香肅然如覩其形容信乎君子之澤遠而有光輝也他日命遊梁客志之書於廳事謹桉前賢之在此堂者張平原首之陸氏撰節度使記揭於東壁詳矣今公命為刺史記書於右端謹月而日之以公為冠大和元年夏五月某日記大和二年閏三月滎陽守歸厚上言臣治所直天下大逵肘武牢而咽東夏誰何宜謹啟閉宜度先是驛於城中驛遽不時四門牡鍵通夕弗禁請更於外隧永永便安制曰可守臣奉詔無徵命無奪時縻羨財募游手逮八月既朢新驛成鄭人胥說琢石而記曰在兌之方面元負陽門銜周道牆陰行桑一作牆蔭行栗境勝於外也遠購名材旁延世工暨塗宣皙瓴甓剛滑術精於內也蘧廬有甲乙牀帳有冬夏庭容牙節廡臥囊橐示禮而不慁也內庖外廄高倉邃庫積薪就陽峙芻就燥有素而不愆也主吏有第役夫有區師行者有饗亭孥行者有別邸周以高墉乃樓其門勞迎展蠲潔之敬餞別起登臨之思溱洧波瀾嵩邱雲煙四時萬象來貺於我走轂奔蹄遄征急宣入而忘勞出必屢顧其傳舍之尤乎太守姓楊氏字貞一華陰宏農人鄭為雄州非聞人大吏不得在其選夫驛之宜遷於外也前此二千石嘗言之而重改作若貞一可謂果於從政而決行其言惜乎未施於大也開成四年梁州牧缺上玩其印凝旒深思曰伊爾卿族歸氏以文儒再世居喉舌今天官貳卿融能嗣其耿光嘗自內庭歷南臺尹轂下政事以試可為元侯乃付印綬進秩大宗伯兼御史大夫玉節獸符鎮於媯墟公拜手稽首曰臣融敢揚王休於天漢之域既涖止咨於㣥執事求急病者先之咸曰華陽黑水昔稱醜地近者嘗為王所百態丕變人風邑屋與山水俱一都之會自為善部矣惟驛遽之途欹危隘束其醜尚存使如周道在公頤指耳於是因年有秋因府無事軍逸農隙人思賈餘乃懸墾山刊木之傭募其力揆攢鑿撞柲之用庀其工具舁輦畚插之器膺其要鼛鼓以程之糗醪以犒之說使之令既下奮行之徒坌集我之提封踞右扶風觸劍閣千一百里自散關抵襃城次舍十有五牙門將賈黯董之自襃而南逾利州至於劍門次舍十有七同節度副使石文穎董之兩將受命分曹星馳並山當蹊頑石萬狀坳者垤者兀者銛者磊落傾欹波翻獸蹲熾炭以烘之嚴醯以沃之潰為埃煤一篲可掃棧閣盤虛下臨谽谺層崖峭絕枘木亘鐵因而廣之限以鉤欄狹徑深陘銜尾相接從而拓之方駕從容急宣之騎宵夜不惑郄曲稜層一朝坦夷興役得時國人不知繇是駛行者忘其勞吉行者徐其驅孥行者家以安貨行者肩不病徒行者足不繭乘行者蹄不刓公談私詠溢於人聽伊彼金其牛而誘之以利曷若我子其民而來之以義乎既訖役南梁人書事於牘請紀之以附於史官地里志直故郢北走之道其聚邑曰荊門揭起重關殿於樂都名視縣內之制居殷形束之要故吏師重焉通外夷之底貢會南藩之述職故賓禮繁焉其肇允經營實王孫昌夔居荊以表之命行名建而締構之弗暇無幾何有由勇爵而授赤社於茲者徼馳名於省嗇謂相沿為非智因請罷去其號發踐更以董之有司不能端究事本循空言而可其奏繇是分地徵以歸它邑野之人有回遠之歎廢文吏而顓戍督行之旅有誰何之囏是利不及下也黎民病之自鄢而南斯為畫疆抵郡之路貫其七舍持瑞節而銜急宣之使蓋陰相交遂使服縵胡者備問俗之對執刀匕者申餼牽之禮是敬之不及賓也君子病之如是幾二十歲距永貞元年江陵尹裴公政成上游德及矜人大建長利俾無遺害乃外濟㣥欲內張全模周圖經制條白於狀昌言既從公議攸同忘勞之徒樂用之工載大其門載高其墉徑術脈分闤閭架空然後析便地以肥之建具官以司之糜羨財以償其力役汰冗食以資其秩稍田里不聞於徵令縣官無減於歲入越某月既成而落之官修其方人樂其居將迎犒飫之儀展廄置符繻之事舉戍夫有伍公吏有職由彙而分率無踰閑入其封者可以知教元和元年四海會同天子命公師長南宮三年公以介圭入覲途出斯邑邑人之華皓幼童咸須於道周距躍而謠曰起我堙廢而完之徠我蕩析而安之昔室於墟風搖雨濡自公優柔郛閈盈兮昔飲於洿夏溷冬枯自公感通觱沸生兮淑旂之華兮四牡之騑徯公之還兮觴以祝之郤略蹁蹮百形一音公為駐錯衡而勞之有以文從公者紀事於牘且曰民可懷也盍命夫學舊史之事以志焉公不得讓而從之走是以有授簡之辱初公以縣之之便聞於上也禹錫方以郎位貼職於計曹章下之日得以省事逮今以遷人獲宥於善部工休之日得以踐履故於拜命無牢讓於傳信無愧詞以為古之創物建庸宜於人民而得其時者則必謌其事功為後代法雅有營謝美召伯也傳稱城沂賢蒍敖也賦水泉原隰之狀志慮事命日之規當書而詠之細亦弗可略也是用謹其本始而存乎篇俾後之視今者知楚郊之令典云亭於西門尊闕路也實相公以心規㣥僚以辭叶而百工以樂成斧斤無聲丹素有嚴主人肅客落以金石走鄭之門嶔為右垣黃河一支滉漾北軒前瞻東顧甍動軌直含景生姿遡空欲翔汴城具八方之人殊形詭言而耳目一說初公來臨擁節及門馭吏曰此鄭州門公心非之若曰野哉居無何即舊號而更之曰鄭門故事王公大僚之去來元侯前驅翊門而旋率立馬塵坌中挹策為禮公心不然之乃下亭令於執事桉亭東西函丈者三之有奇而南北五之有贏樂縣宴豆前後以位棋闔對明弭掀順時修梁衡建中虛上荷圓脊方廉高卑中經簾鑪茵帟文椸睆榻儲以應猝周用而宜乃命尹閽視亭長抱關視掌固啟閉拚除是謹是孜錫命賜胙勞迎贈餞我當躬行汝先汝蠲挾膳提醪生芻縞衣我寮展事靡問文武汝惟汝從凡入而修容凡出而修軷裼襲威儀勿籍勿訶繇是貴人稱諸朝㣥吏詠於家行者誇於道與人同其安者人人驛其聲而吟之始乎諓諓而成乎龐鴻欲無文字不可也公遂條白其所以然遠命學古者書之公姓令狐氏以文章典內外書命以謨明登左右相以飛語策免以思材復徵自有浚師無如今治文武兩熾其古之大臣歟郡北有短亭繇舊也亭孤其名地藏其勝前此二千石全然見之建言而莫踐去之日率遺恨焉七年冬詔書以竹使符授尚書水曹外郎竇公常曰命爾為武陵守莅止三月以碩畫佐元侯平裔夷降渠魁又三月以順令率蒸民增水坊表火道是歲大穰明年政成農緣畝以勇勸工執技以思賈因民之餘力乘日之多暇乃顧其屬曰郊道有候亭示賓以不慁也雖聞茲地韜美未發豈有待邪自吾之治於斯也購徒庀材大起堙廢未嘗植私庭礱燕寢役必先公人不余瑕調賦幸均矣城池幸完矣而重浹辰之役掠苟簡之問卒使勝躅冒沒猶璞而不攻懼換符之日遂復齎恨無乃遺誚於來者乎言得其宜智愚同贊於是撤故材以移用相便地而居要去凡木以顯珍茂汰汙池以通淪漣自天而勝者列於騁望由我而美者生於頤指箕張筵楹股引房櫳斧斤息響風物異態大道出乎左藩澄湖浸乎前垠仙舟祖軷繇是區處九月壬午工告休亭長受成赤車威遲於以落之肅賓而入圜視有適沈水北澳陽山南麓黑亢焉蘧蘧雄殿郊隅前軒舒陽朱檻環之舞衣回旋樂簴參差北廡延陰外阿旁注芊眠清泚羅入洞戶初筵修平彫俎靜嘉林風天籟與金奏合亦既醉止州從事舉白而言曰室成於私古有發焉矧成於公庸敢無詞觀乎棼楣有嚴丹雘相宣象公之文律煜然而光也望之宏深即之坦夷象公之酒德溫然而達也庭芳萬本跗萼交映如公之家肥熾而昌也門闢戶闔連機弛張似公之政經便而通也因高而基因下而池躋其高可以廣吾視泳其清可以濯吾纓俯於逵惟行旅謳吟是采瞰於野惟稼穡艱難是知雲山多狀昏旦異候百壺先韋之餞迎退食私辰之宴嬉觀民風於嘯詠之際展宸戀於天雲之末動合於誼匪唯寫憂公曰夫言之必可書者公言也從事不以私視予予從而讓之是自遠也其可乎迺授簡於放臣俾書以示後後之思公者雖灌叢葽草尚勿翦拜矧翬飛之革然石刻之隱然歟天下聞寺數十輩而吉祥尤彰彰蹲名山俯大江荊吳雲水交錯如繡始余以不到為恨今方弭所恨而充所望焉既周覽讚嘆於竹石間最奇處得新亭彤焉如巧人畫鼇背上物即之四顧遠邇細大雜然陳乎前引人目去求瞬不得徵其經始曰僧義然嘯侶為工即山求材槃高孕虛萬景坌來詞人處之思出常格禪子處之遇境而寂憂人處之百慮冰息鳥思猿情繞梁歷榱月來松間彫縷軒墀石列筍簴藤蟠蛟螭修竹萬竿夏含涼颸斯亭之實錄云爾然上人舉如意挹我曰既志之盍名之以行乎遠夫余始以是亭圜視無不適始適乎目而方寸為清故名洗心長慶四年九月二十三日劉某記瀕江之俗不飲於鑿而皆飲之流余謫居之明年主人授館於百雉之內江水汒汒周墉閒之一旦有工爰來思以技自賈且曰觀今之室廬及江之涯閒不容畝顧積塊峙焉而前耳請用機以汲俾矗然之狀莫我遏已余方異其說且命之飭力焉工也儲思環視相面勢而經營之由是比竹以為畚寘於流中中植數尺之臬輦石以壯其趾如建標焉索綯以為緪縻於標垂上屬數仞之端亘空以峻其勢如張弦焉鍛鐵為器外廉如鼎耳內鍵如樂鼓牝牡相函轉於兩端走於索上且受汲具及泉而修綆下縋盈器而圓軸上引其往有建瓴之駛其來有推轂之易瓶繘不羸如搏而升枝長瀾出高岸拂林杪踰峻防刳蟠木以承澍貫修筠以達脈走下潺潺聲寒空中通洞環折唯用所在周除而沃盥以蠲入爨而錡釜以盈飪餗之餘移用於湯沐涑澣之末泄注於圃畦雖瀵湧於庭莫尚其霈洽也昔余嘗登陴然念懸流之莫可遽挹方勉保庸督臧獲而挈之至於裂肩龜手然猶家人視水如酒醪之貴今也一任人之智又從而信之機發於冥冥而形於用物浩溔東流赴海為期斡而遷焉逐我頤指曏之所謂阻且艱者莫能高其高而深其深也觀夫流水之應物植木之善建繩以柔而有立金以剛而無固軸卷而能舒竹圓而能通合而同功斯所以然也今之工咸盜其古先工之遺法故能成之不能知所以為我也智盡於一端功止於一名而已噫彼經始者其取諸小過歟
