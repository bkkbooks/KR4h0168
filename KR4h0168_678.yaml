front:
  text: 全唐文欽定全唐文卷六百七十八白居易二十三
  hash: sha256:88f1ea852f4e9eabb11a810f48a098d542f7778ba8db296993354478d78716fe
body:
  text: 碑在石壁東次石壁在廣德法華院西南隅院在重元寺西若干步寺在蘇州城北若干里以華言唐文譯刻釋氏經典自經品衆佛號以降字加金焉夫開士悟入諸佛知見以了義度無邊以圓教垂無窮莫尊於妙法蓮華經凡六萬九千五百五言證無生忍造不二門住不可思議解脫莫極於維摩詰經凡二萬七千九十二言攝四生九類入無餘涅槃實無得度者莫先於金剛般若波羅蜜經凡九千二百八十七言禳罪集福淨一切惡道莫急於佛頂尊勝陀羅尼經凡三千二十言應念順願願生極樂土莫疾於阿彌陀經凡一千八百言用正見觀真相莫出於觀音普賢菩薩法行經凡六千九百九十言詮自性認本覺莫深於實相法蜜經凡三千一百五言空法塵依佛智莫過於般若波羅蜜多心經凡二百五十八言是八種經具十二部合一十一萬六千八百五十七言三乘之要旨萬佛之祕藏盡矣是石壁積四重高三尋長十有五丈厚尺有咫有石蓮敷覆其上下有石神固護其前後火水不能燒漂風日不能搖消所謂施無上法盡未來際者也唐長慶二年冬作太和三年春成律德沙門清晃矢厥謀清海繼厥志門弟子南容成之道則終之寺僧契元捨藝而書之郡守居易施詞而讚之讚曰佛涅槃後世界空虛惟是經典與衆生俱設復有人書貝葉上藏檀龕中非堅非久如蠟印空假使有人刺血為墨剝膚為紙即壞即滅如筆畫水噫畫水不若文石印蠟不若字金其功不朽其義甚深故吾謂石經功德契如來付囑之心唐有善人曰李公公名建字杓直隴西人魏將軍申公發公十五代祖也周柱國陽平公遠六代祖也綏州刺史明高祖也太子中允進德曾祖也綿州昌明令珍玉大父也雅州別駕贈禮部尚書震考也贈博陵郡太君崔氏妣也陳許節度禮部尚書遜兄也渭源縣君房氏妻也容管招討使濟外舅也長慶元年二月二十三日夜無疾即世於長安修行里第是歲五月二十五日歸祔於鳳翔某縣某鄉某原之先塋春秋五十八有二女五男曰納朴恪慤碩公官歷校書郎左拾遺詹府司直殿中侍御史比部兵部吏部員外郎兵部吏部郎中京兆少尹灃州刺史太常少卿禮部刑部侍郎工部尚書職歷容州招討判官翰林學士鄜州防禦副使轉運判官知制誥吏部選事階中大夫勳上柱國爵隴西縣開國男有史官起居郎渤海高錢作行狀翰林學士中書舍人河南元稹作墓志有尚書主客郎中知制誥太原白居易作墓碑大署其碑曰善人墓善人者何公幼孤孝養太君太君老疾常曰㹻子勸吾食吾輒飽勸吾藥吾意其疾瘳㹻子公小字也及長居荊州石首縣其居數百家凡爭鬬稍稍就公決公隨而評之寖及鄉人不詣府縣皆相率曰往問李君公養有餘力讀書屬文業成與兄遜起應進士俱中第為校書時以文行聞故德宗皇帝擢居翰林翰林時以視草不詭隨退官詹府詹府時以貞恬自處不出戶輒逾月鄜帥路恕高之拜請為副在鄜時有非類者至以病去為御史時上任有遏其行事者作謬官詩以諷為吏部郎時調文學科暨吏課高者得無停年又省成勞急成狀限繇是吏史輩無緣為姦迄今選部用其法知制誥時筆削間有以自是不屈者因請告改少尹少尹時與大議歲減府稅錢十三萬在灃時不鞭人不名吏居歲餘人人自化在禮部時由文取士不聽譽不信毀公為人質良大體與用綽然有餘裕為政廉平易簡不求赫赫名與人交外淡中堅接士多可而有別稱賢薦能未嘗倦好議論而無口過遠邪諛而不忤物其居家菲衣食厚賓客敬兄嫂禮妻子愛甥姪初先太君好善喜佛書不食肉公不忍違其志亦終身蔬食自八九歲時始諷詩書日三百言諷畢盡得其義善理王氏易左氏春秋前後著文凡一一作三百五十二首皆理義撮要詞無枝葉其卓然者有詹事府司直比部員外郎廳記請雙日坐疏與梁肅書上宰相論選事狀秉筆者許之薨之日不識者惜識者嘆交遊出涕執友慟哭夫如是其善人乎傳曰善人國之紀也語曰善人吾不得而見之矣噫善人之稱難乎哉獨加於公無愧焉銘曰古者墓有表表有云顯其行省其文故季札死仲尼表其墓曰君子今吾喪李君署其碑曰善人嗚呼李君有知乎無知乎君之名與此石俱王城離域有佛寺號興善寺之坎地有僧舍名傳法堂先是大徹禪師晏居於是寺說法於是堂因名焉有問師之名迹曰號惟姓祝氏衢州西安人祖曰安父曰皎生十三歲出家二十四具戒僧臘三十九報年六十三終興善寺葬灞陵西原詔諡曰大徹禪師元和正真之塔云有問師之傳授曰釋迦如來欲涅槃時以正法密印付摩訶迦葉傳至馬鳴又十二葉傳至師子比邱及二十四葉傳至佛䭾先那先那傳圓覺達摩達摩傳大宏可可傳鏡智璨璨傳大醫信信傳圓一作大滿忍忍傳大鑒能是為六祖能傳南嶽讓讓傳洪州道一一諡曰大寂寂即師之師貫而次之其傳授可知矣有問師之道屬曰由四祖以降雖嗣正法有冡嫡而支派者猶大宗小宗焉以世族譬之即師與西堂藏甘泉賢勒潭海百巖暉俱父事大寂若兄弟然章敬澄若從父兄弟徑山欽若從祖兄弟鶴林素華嚴寂若伯叔然當山忠東京會若伯叔祖嵩山秀牛頭融若曾祖伯叔推而序之其道屬可知矣有問師之化緣曰師為童男時見殺生者盡然不忍食退而發出家心遂求落髮於僧曇受尸一作戶羅於僧崇一作僧藏崇學毗尼於僧如證大乘法於天台止觀成最上乘道於大寂道一貞元六年始行於閩越間歲餘而回心改服者百數七年馴猛虎於會稽作滕家道場八日一作年與山神受八戒於鄱陽作回嚮道場十三年感非人於少林寺二十一年作有為功德於衛國寺明年施無為功德於天宮寺元和四年憲宗章武皇帝召見於安國寺五年問法於麟德殿其年復靈泉於不空三藏池十二年二月晦大說法於是堂說訖就化其化緣云爾有問師之心要曰師行禪演法垂三十年度白黑衆殆百千萬億應病授藥安可以一說盡其心要乎然居易為贊善大夫時嘗四詣師四問道第一問云既曰禪師何故說法師曰無上菩提者被於身為律說於口為法行於心為禪應用有三其實一也如江湖河漢在處立名名雖不一水性無二律即是法法不離禪云何於中妄起分別第二問云既無分別何以修心師曰心本無損傷云何要修理無論垢與淨一切勿起念第三問云垢即不可念淨無念可乎師曰如人眼睛上一物不可住金屑雖珍寶在眼亦為病第四問云無修無念亦何異於凡夫耶師曰凡夫無明二乘執著離此二病是名貞修貞一作真修者不得動不得忘動即近執著忘即落無明其心要云爾師之徒殆千餘達者三十九人其入室受道者有義崇有圓鏡以先師常辱與豫言知子嘗醍醐嗅薝蔔者有日矣師既歿後子出守南賓郡遠託撰述逮今而成嗚呼斯文豈直起師教慰門弟子心哉抑且志吾受然燈記記靈山會於將來世故其文不避繁銘曰佛以一印付迦葉至師五十有九葉故名師堂為傳法公諱孚字某古太嶽允也今博陵人也唐虞之際因生為姜姓暨周封齊分類曰崔氏長源遠派大族清門圭組賢俊準繩濟美斯崔氏所以綿千祀而甲百族也隋散騎常侍諱洽公六代祖也唐冀州武強令諱紹曾祖也監察御史諱預王父也常州江陰令育皇考也公幼以門蔭子補太廟齊郎初調授汝州葉縣尉再調改宋州單父尉時天寶末盜起燕薊毒流梁宋屠城殺吏如火燎原單父之民將墜塗炭公感激奮發仗順興兵挫敗賊徒保全鄉縣拳勇之徒歸之如雲方欲糾合貔虎驅誅蛇豕京觀㣥盜金湯一方本道節度使奇之將議上聞會有同事者爭功陰相傾奪公超然脫屣遂以族行東游江淮安時俟命屬吳王出閣領鎮求才撫人常聞公名試以吏事遂表請為宋城尉事舉移假連水令賞緋魚袋縣政修轉常州録事參軍糾察課賦浙東採訪使聞之奏授越州餘姚令吏畏人悅歲未滿浙西採訪使知之奏改湖州長城令長城之理又加於前二邑焉政成秩滿解印罷去優游自得獨善其身興元元年疾歿於宋太和五年遷葬於洛享年若干詔贈尚書戶部侍郎夫人隴西李氏追封岐國夫人皆從子貴也公為人儀表魁梧氣概倜儻負不羈之才慕非常之功始發軔於單父志立而功不就終稅駕於長城道行而位不達善慶所積實生司空司空諱宏禮公之幼子也以學發身以文飾吏以幹蠱克家以忠壯許國典十郡領二鎮再東土追命上公雖天與之才國與之位亦由公義方之訓輔而成焉大丈夫貯蓄材術樹置功利鎡錤富貴焯耀邦家不當其身而得於後父析子荷相去幾何嗚呼崔公何不足之有按國典官五品以上墓廟得立碑又案喪葬令凡諸贈官得同正官之制其孫彥防彥佐等奉父命述祖德揭石於墓勒銘於碑銘曰天無全功賢無全福既享天爵難兼世祿矯矯崔公道積厥躬大志長略卷於懷中黃綬遏寇思奮奇功銅印字人躬行古風才高位下步濶塗窮竟戢羽翮不展心胸天道有知善積慶鍾昭哉報施其在司空王建侯侯建廟廟有器器有銘所以論撰先德明著後代或書於鼎或文於碑古今之通制也維開成某年某月某日宣武軍節度使檢校尚書右僕射汴州刺史上柱國賜紫金魚袋趙郡李公齊沐祗栗拜章上言請立先廟以奉常祀於是得請於天子承式於有司是歲某月某日經始於東都明年某月某日有事於新廟外盡其物內盡其志三獻百順神格禮成其友居易以李氏宗祖世家名爵與僕射志行官業書於麗牲之碑謹按家略九代祖善權後魏譙郡守八代祖延觀徐梁二州刺史七代祖續某郡太守六代祖顯達隋潁州刺史五代祖遷皇朝宜穀二州別駕贈德州刺史高祖孝卿右散騎常侍贈鄧州刺史曾祖府君諱敬元總章儀鳳間歷吏部尚書同中書門下三品中書令宏文館大學士監修國史封趙國公諡曰文憲才智職業載在國史今祭於第一室以妣薊國夫人范陽盧氏配焉王父府君諱守一屬世難家徙不求聞達避榮樂道與時浮沉終成都府郫縣令今祭於第二室以妣滎陽夫人鄭氏配焉先考府君諱晤歷金壇烏程晉陵三縣令府君為人篤於家行飾以吏事動有常度居無惰容所蒞之邑有善政辭滿之日多遺愛不登貴仕其命矣夫今祭於第三室以先妣上谷夫人范陽盧氏配焉府君纍贈至尚書右僕射夫人纍贈至上谷郡太夫人前後凡三追命六告身渥澤疊洽自葉流根從子貴也郫縣暨晉陵府君咸善積於躬道屈於位儲祉流慶而僕射生焉僕射名紳字公垂六歲丁晉陵府君憂孺慕號踊如成人禮九歲終制孝養上谷太夫人年雖幼承順無違家雖貧甘旨無闕侍親之疾冠帶不解者三載餘可知也執親之喪水漿不入口者五日餘可知也先是祖妣考妣晉陵府君前娶夫人裴氏無子早卒洎叔父兄妹之殯咸未歸祔各處一方公在斬衰中親護九喪匍匐萬里及其一作期襄事禮無闕違至誠感神有靈烏瑞芝之應事動鄉里名聞公卿言孝友者以為表率憲宗嗣統三年李錡盜據京口公居無錫會擢第東歸錡聞公名署職引用初詢以謀畫結舌不對次強以章檄絶筆不書誘之以厚利不從迫之以淫刑不動將戮辱者數四就幽囚者七旬誠貫神明有死無二言名節者以為準程朝廷嘉之拜右拾遺歲餘穆宗知公忠孝文行召入翰林特授司封員外郎知制誥遷中書舍人承顏造膝知無不言獻替啓沃如石投水俄拜御史中丞戶部侍郎既而望屬台衡朝當晏駕時移世變遂出掾高要佐潯陽旋為滁壽二州刺史大凡公之為政也應用無方所居必化臥理二郡以去害為先故有盜奔獸依之感廉察浙右以分憂為功故有恤鄰活殍之惠尹正河洛以革弊為急故有摘姦抉蠧之威文宗知公全才以汴難理乃授鈇金戊俾鎮綏之初宣武師人驕強狠悍狃亂徼利積習生常公既下車盡知情僞刑賞信惠合以為用一年而下懲勸二年而下服畏三年而下恥格肅然丕變薰然太和撫之五年人俗歸厚至於捍大患禦大災却飛蝗遏暴水致歲於豐稔免人於墊溺噫微公之力汴之民其為殣乎其為魚乎殊績尤課不可具舉天下征鎮淮海為大非公作帥不足以長束諸侯制加銀青光祿大夫揚州長史淮南諸道節度觀察等使餘如故詔下之日出次於外軍門不擊柝里巷無犬吠從容五日按節而東百姓三軍挈壺漿捧簞醪遮道攀餞者動以萬輩皆嗚咽流涕如嬰兒之別慈母焉噫若非襦袴之惠及其幼雞豚之養及其老又推赤心置人腹中者則安能化暴戾之俗一至於此乎西人泣送東人歌迎梁楚千里風變化移膏雨景星所至蒙福於時開成會昌之際上方致理公未登庸熙熙蒼生環望而已盛矣哉大丈夫生於世也以忠貞奉乎君以義利惠乎人以黻冕貴乎身以宗廟顯乎親以孝敬交乎神宜其荷百祿輔一德為有唐之宗臣者歟君子謂李氏之廟也休哉公之祭也順哉然曰有孫如此有子如此可謂孝矣故其碑銘曰祭祀從貴爵土有秩諸侯之廟一宮三室皇皇西室皇祖中書孝孫追遠昭穆有初顯顯中室王父郫令順孫祇享盡慤盡敬肅肅東室先考晉陵嗣子奉薦孝思蒸蒸嗣子其誰僕射公垂公垂翼翼齊嚴諒直為子為臣有典有則載膺休命載踐右職以孝肥家以忠肥國乃授侯伯纛金戊旗㦸乃饗祖禰牲牢黍稷家聲振耀國典褒飾六命徽章三世血食光大遺訓顯揚先德子孫承之垂裕無極汨市朝溺妻子非達也困山林擯血屬亦非達也若有人與㣥動處一代間彼為彼我為我不自潔不自汚不巢許不伊呂水其心雲其身浮沈消息無往而不自得者非達人乎吾友吳君從事於斯矣君諱丹字真存太子通事舍人覽之曾孫睦州司馬庶之孫太子宮門郎贈工部尚書銓一作詮之長子以進士第入官歷正字協律郎大理評事監察殿中侍御史太子舍人水部庫部員外郎都官駕部郎中諫議大夫大理少卿饒州刺史職歷義成軍節度推官浙西道節度判官潼關防禦判官鎮州宣慰副使一作司匭函使階至中大夫勳至上柱國讀書數千卷著文數萬言寶歷元年六月某日薨於饒州官次其年十一月某日葬於常州晉陵縣仁和鄉北原從遺志也君生四五歲弄泥沙時所作戲輒象道家法事八九歲弄筆硯時所出言輒類詩家篇章不自知其然蓋宿習儒元之業明矣弱冠喜道書奉真籙每專氣入靜不粒食者纍歲皓氣充而丹田澤飄然有出世心既壯在家為長屬有三幼弟八稚姪嗷嗷栗栗不忍見其饑寒慨然有干祿意乃曰肥遁不可以立訓吾將業儒以馳名名競不可以恬神吾將體元以育德凍餒不可以安道吾將強學以徇祿祿位不可以多取吾將知足而守中繇是去江湖來京師求名得名求祿得祿身榮家給之外無長物無越思素琴在左黃庭在右淡乎自處與太和始終履仕途二十七年享壽命八十二歲無室家纍無子孫憂屈伸寵辱委順而已未嘗一日戚戚其心至於歸全反真故豫所謂達人之徒歟信矣仲弟湖州長史某以豫辱與其兄遊既為同門生又為同舍郎周知初終託為碑記噫先生之道吾能引古以明之銘曰漢中大夫東方曼倩夏侯湛高之作廟貌讚唐中大夫真存先生白樂天知之作神道銘嗚呼二大夫異代而同途其皆達者乎張之為著姓尚矣自漢太傅良侍中肱晉司空華丞相嘉以降勳賢軒冕歷代不乏肱避地渡江始居於吳故其子孫稱吳郡人嘉以孝悌聞於郡故其所居號孝張里嘉之曾孫裕在宋為司徒即公五代祖也司徒之孫儔在隋為吳郡都督即公曾王父也台州臨海令諱鵾即公之大父也袁州司馬諱孝績即公皇考也或以人物著或以閥閲稱迄今為江南右族公諱擇字無擇未冠丁袁州府君憂廬於墓晝號而夜泣者三年矣有靈芝醴泉出焉既冠好學能屬文從鄉試登明經第應制舉中精通經史科補宏文館校書郎調左金吾録事換杭州録事參軍在杭州前後詰僞制補吏者三十八人駁假年侍老者二十人舉而正之人服其明會劉幽求來為刺史舉課上聞詔授絳州録事參軍絳之郡丞有主壻者怙寵侮法豪奪人利公數其罪露章奏之章下丞相府丞相姚元之奇之致書褒美尋改太原府功曹參軍給事中張昶為江淮安撫使表公正直奏署郡從事吏部尚書陸象先為河東按察使狀公清白奏授懷州獲嘉令在獲嘉以不茹柔得人心以不吐剛得罪繇是左遷鄂州司馬移深州司馬轉虢州長史時上方思理詔求二千石之良者時宰以公塞詔擢拜和州刺史公之在郡奉詔條恤人隱而已不知其他無何水潦害農公請蠲穀籍之損者什七八時李知柔為本道採訪使素不快公之明直密疏誣奏以附下為名遂貶蘇州別駕老幼攀泣而遮道者數百人信宿方得去移曹州別駕歲餘謝病歸老於家天寶十三載正月二十一日終於東都利仁里私第其年二月十二日葬於河南府伊闕縣中李原享年八十三噫公生天地間八十有三年可謂壽矣其間當明皇帝馭天下四十有五年可謂時矣有其才得其壽逢其時然職不過陪臣秩僅至郡守凡所貯蓄鬱而不舒嗚呼其命也夫公之文學常為賀知章賈彥璿許之公之諒直常為李雍張庭圭稱之公之政事又為劉姚張陸推之夫以八君子之力援之而不足以一知柔之力排之而有餘厄窮不振以至沒齒嗚呼其命也夫古人云道不虛行又云其後必有達者故公之子大理評事諴以節行聞於時公之孫戶部侍郎平叔以才位光於國報施之道信昭昭矣不在其身則在子孫相去幾何哉長慶二年某月某日平叔奉祖德揭而碑之居易據家狀序而銘之其詞曰有木有木碩大而長破為桷杙不作棟梁有驥有驥規行矩步辱在短轅不駕大輅嗚呼噫嘻公亦如之將時不我遇而我不遇時勿謂已矣天錫多祉既賢其子以濟其美又才其孫以大其門苟無先德孰啓後昆有唐嶺南觀察推官試大理評事吳郡張公大歷三年十一月八日終於伊川別墅五年八月七日葬於伊闕縣中李原春秋五十五元和十三年詔贈主客員外郎明年贈太常少卿又明年贈尚書工部侍郎夫人吳郡陸氏貞元二年一作三年某月某日終於某所春秋六十六追封嘉興縣太君又封吳郡太夫人嗣子通議大夫守尚書戶部侍郎判度支上柱國賜紫金魚袋平叔以長慶二年某月某日立神道碑太原白居易文其碑云公諱誠一作諴字老萊吳郡人父諱無擇和州刺史祖諱孝績袁州司馬由高曾而上世德世祿載在和州府君碑內此不書公年十八以通經中第及調判入高等授蘇州長洲尉秩滿丁先府君憂既禫又丁先太夫人憂泣血六年哀毀過禮以方寸再亂殆無宦情既除喪退居不調者纍年而親友以大義敦責不得已而復起選授左武衛騎曹一作將軍參軍分司東都屬安祿山陷覆洛京以僞職淫刑脅劫士庶公與同官范陽盧巽潛遁於陸渾山食木實飲泉水者二年訖不為逆命所汙及肅宗嗣位詔河南尹薛伯連搜訪不仕賊庭隱藏山谷者伯連得六人以應詔而公與巽在焉繇是名節聞於朝野君子以為知道優詔褒美特授密縣主簿未周歲遷宋州碭山縣令時睢陽當大兵後野無草里無人公撫之一年襁負至二年汙萊闢三年衣食足及解印去縣民相率泣而餞之君子以為知政嶺南節度觀察使李勉偉人也既高公陸渾之節又美公碭山之政欲以名職禮命起而大之遂奏授試大理評事充觀察推官及除書簡牒到門即公捐館舍之明日也才如是命如是嗚呼哀哉公常自負其才不後於人自疑其命不偶於世及將去碭山而反伊川也頓駕搦管沈嘆久之因賦詠懷詩云論成方辨命賦罷即歸田竟如是言終於衡茅之下君子以為知命公有三子曰平仲平叔平季夫人陸氏即國子司業集賢殿學士善經之女賢明有法度初公既歿諸子尚幼夫人勤求衣食親執詩書諷而導之咸為令子又常以公遺志擇其子而付之故平叔卒能振才業致名位追爵命揭碑表繼父志揚祖德此誠孝子順孫之道也亦由夫人慈善教誘之德浸漬而成就之不其然乎居易常辱與戶部遊而知其家事故見託撰述庶傳信焉銘曰猗嗟碭山以文行保家聲以義節振時名以惠政撫縣民而職不登諸侯卿秩不及廷尉評悲哉猗嗟碭山前有和州名德如彼後有戶部才位若此才子之父名父之子賢者兼之可謂具美休哉婆娑世界中有釋迦如來出為上首如來滅後像法中或羅漢僧或菩薩僧在在處處出為上首佛道未喪閒生其人故泗洲開元寺臨壇律德大師實一方上首也大師譙郡酇人世姓暴氏僧號明遠七歲依本郡霈禪師出家十九從泗洲靈穆律師受具戒五夏通四分律俱舍論乃升講座乃登戒壇元和元年衆請充當寺上座明年官補為本州僧正統十二部開元寺北地二百步作講堂七間僧院六所又淮泗間地卑多雨潦歲有水害師與郡守蘇遇等謀於沙湖西隙地創避水僧坊建門廊廳堂厨廄二百間植松杉楠柳檜一萬本由是僧與民無墊溺患旋屬災焚本寺寺殲像滅僧潰者數年師與徐州節度使王侍中有緣遂合願叶力再造寺宇乃請師為三郡僧正奏乞連置戒壇因其施利廓其規度侍中又以家財萬計助而成之自殿閣堂亭廊庖廩藏洎僧徒臧獲傭保馬牛之舍凡二千若干百十間其中像設之儀器用之具一無闕者長慶五年春作太和元年秋成輪奐莊嚴星環棊布如自地踊若從天降供施無虛日鐘梵有常聲四衆知歸萬人改觀於是增上慢者起敬種善根者發心利喜饒益巨能具舉若非大師於福智僧中而得第一若非侍中於敬修人中亦為第一則安能作大佛事而中興像教者乎故如來所謂我滅後我法傳授於弟子囑於大臣斯言信矣師以太和八年十二月十九日齊時終於本寺本院是月二十九日道俗衆萬輩恭敬悲泣備槃威儀遷全身歸於湖西磚塔遵本教而奉先志也報年七十僧臘五十有一始出家訖於遷化志業行願道力化緣引而伸之隨日廣大前後臨戒壇者八登律座者十有五僧尼得度者三萬衆江淮行化者四十年或疑是人如來所使羅漢菩薩吾焉知之初大師以功德為心既成而化侍中以撰録見託未就而薨今按弟子僧元亮素行狀序而銘之嗚呼所以滿大師之願終侍中之志也銘曰平地踊塔多寶示現險路化城導師方便繄我大師亦有大願像法是宏塔廟是建佛人交接兩得相見法有毗尼象有僧尼承教於佛得度於師宣傳戒藏振起律儀四十餘載勤而行之福德如空不可思議緣合而來功成而去知性不動色身無住示有遷化非實滅度表塔勒銘門人戀慕大師號神照姓張氏蜀州青城人也始出家於智凝法師受具戒於惠萼律師學心法於惟忠禪師忠一名南印即第六祖之法曾孫也大師祖達摩宗神會而父事印其教之大旨以如然不動為體以妙然不空為用示真寂而不說斷滅破計著而不壞假名師既得之揭以行化出蜀入洛與俗人有緣用一作月開六壇僅三十載隨根說法言下多悟由是裂疑網拔惑箭漸離我人相者日日有焉起正信見本覺頓發菩提心者時時有焉其餘退惡進善隨分而增上者不可勝紀夫如是可不謂煩惱病中師為醫王乎生死海中師為船師乎嗚呼病未盡而醫去海方涉而船失粵以開成三年冬十二月示滅於奉國寺禪院以是月遷葬於龍門山報年六十三僧夏四十四明年傳教主院上首弟子沙門清閒糾門徒合財施與服勤弟子志行等營度喪事卜兆於寶應寺荷澤祖師塔東若干步窆而塔焉示不忘其本也其諸升堂入室得心要口訣者有宗實在襄復儼在洛道益在鎮知遠在徐曰建在晉道光在潤道威在潞雲真在慈一作磁雲表在汴歸忍在越會幽齊經在蔡智全景元紹明在秦各於一方分作佛事咸鼓鐘鳴吼龍象蹴踏斯皆吾師之教力也不其盛歟衆以余忝聞法門人結菩提之緣甚熟請於塔石序而銘曰伊之西北洛之南東法祖法孫歸全於中舊塔會公新塔照公亦如世禮祔於本宗元和十一年春廬山東林寺僧道深懷縱如建沖契宗一至柔諸智則智明雲皋太易等凡二十輩與白黑衆千餘人俱實持故景雲大德宏公行狀一通贄錢十萬來詣潯陽府請司馬白居易作先師碑會有故不果十二年夏作石墳成復來請會有病不果十三年冬作石塔成又來請始從之既而僧反山衆反聚落錢反施者一作寺府翌日而文就明年而碑立其詞云爾我聞竺乾古先生出世法法要有三曰戒定慧戒生定定生慧慧生八萬四千法門是三者迭為用若次第言則定為慧因戒為定根定根植則苗茂慧因樹則果滿無因求滿猶夢果也無根求茂猶揠苗也雖佛以一切種智攝三界必先用戒菩薩以六波羅蜜化四生不能捨律律之用可思量不可思量如來十弟子中稱優波離善持律波離滅有南山大師得之南山滅有景雲大師得之師諱上宏姓饒氏曾祖君雅祖公悅父和一作知恭臨川南城人童而有知故生十五歲發出家心始從舅氏剃落壯而有立故生二十五一作二歲立菩提願從南嶽大圓大師受具戒樂其所由生故大歷中不去父母之邦請隸於本州景雲寺修道應無所住故貞元初離我所徙居洪州龍興寺說法親近善知識故與匡山法真天台靈裕荊門法裔暨興果神凑建昌惠進五長老交遊佛法屬王臣故與姜相國公輔顏太師真卿暨本道廉使楊君憑韋君丹四君子友善提振禁戒故講四分律而從善遠罪者無其數隨順化緣故坐甘露壇而誓衆主盟者二十年荷擔大事故前後登方等施尸羅者十有八會救拔㣥生故婆娑男女由我得度者萬五千七十二人示生無常故元和十年巳亥遷化於東林精舍示滅有所故是月丙寅歸於南岡石墳住世七十七歲安居六十五夏自生至滅隨迹示教行止語默無非佛事夫施於人也博則反諸巳也厚故門人鄉人報如不及繇是藝松成林琢石為塔塔有碑碑有銘銘曰佛滅度後薝蔔香衰醍醐味醨誰反是香誰復是味景雲大師景雲之生一匡苾芻中興毗尼景雲之滅衆將安仰法將疇依昔景雲來行道者隨踐迹者歸今景雲去升堂者思入室者悲爐峯之西虎溪之南石塔巍巍有記事者以真實辭書於塔碑如來滅後後五百歲有持戒見性者曰興果禪師師姓成號神湊京兆藍田人既出家具戒於南嶽希操大師參禪於鍾陵大寂大師志在首楞嚴經行在四分毗尼藏其他典論以有餘力通大歷八年制懸經論律三科策試天下僧師中等得度詔配江州興果寺後從僧望移隸東林寺即雁門遠大師舊道場有甘露壇白蓮池在焉師既居是寺興佛事元和十二年九月七日遘疾二十六日反真十月十九日遷全身於寺道北祔雁門墳左春秋七十四夏臘五十一至乎哉師本行也以精進心脂不退輪以勇健力撾無畏鼓故登壇進律鬱為法將者垂三十年領羯磨會十三化大衆萬數儀範所攝惠用所誘貴高憎慢罔不降伏其威重如是自興果起東林一盂齊一榻居衣麻寢菅如坐漆室一作七寶繇是名聞檀施來無虛月盡歸寺藏與大衆共之逮啓手足目一作日前無長物其簡儉如是師心行禪身持律起居動息皆有常節雖沍寒隆暑風雨黑夜捧一爐秉一燭行道禮佛者四十五年凡十二時未嘗闕一其精勤如是師既疾亟四大將壞無戀著念無厭離想郡太守門弟子進醫饋藥者數四師頷之云報身非病焉用是為言訖跌坐恬然就化其了悟如是門人道建利辨元審元惣等封墳建塔思有以識之以先師嘗辱與豫游託為銘碣初豫與師相遇如他生舊識一見欣合不知其然及遷化時豫又題四句詩為別蓋欲會前心集後緣也不能改作因取為銘曰本結菩提香火社共嫌煩惱電泡身不須戀戀從師去先請西方作主人
