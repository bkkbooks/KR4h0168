front:
  text: 全唐文欽定全唐文卷八百七十五陳致雍三
  hash: sha256:4a6e1410280b1c039377711a6b8c5ba7f95461ba681081ee1489d6ed3959ef18
body:
  text: 右竊以前件人夙處和風時推驍將屢行征伐亟著勳勞爰自淮壤出師滁城卻敵縱鐵騎而從突拔豫㦸以先登破陳雲騰畏威風靡稽其行狀先皇制命云爾能前率騎兵身先矢石心堅效命勇有可觀豈不謂好力致勇乎謹按諡法好力致勇曰莊其歐陽權伏請賜諡曰莊光山王延政昔者無諸舊壤閩越分封惟嗣承慶基立為極洎乎末途弗譓景祚中零因懷順軌之風永感安宗之念加以敬恭事上慎重寡言作牧鄱陽民安其化舉是美者俱為諡焉謹按諡法敬恭事上曰恭安民法故曰定請以恭定為諡銀青光祿大夫檢校司徒右千牛衛將軍兼御史大夫上柱國蔣彥威卒據狀以雲翼馬軍教授衛兵彥威趫捍過衆騎射絶倫訓練之方申明有律行狀昭載易名可稱謹按諡法云治兵不遷曰簡謹議據行狀竊以于昔年參署戎府總掌簡要簡稽士卒規畫軍師幹局理事垂五十年勤亦至矣其爵命有等諒以名諡可加按諡法勤勞無私曰類竊以易名賜諡蓋用收獎死亡將帥之勳其或入則常直禁中扈蹕著勤出則斥候境土捍寇致力星霜纍歲忠勇盡誠復有爵土可兼名實相稱者則與之周進卿附翼戎臣策名環衛昔者惟以鞭弭隨事非因鞞鼓立功聖君柔遠之恩不循班例之選擢官亟奉再命歷職僅未四稔若使死之日班位可加不謂生之時功行無取而况即日專征者百輩立功者無一人如此之流何足褒與自今已後在任未有勤誠立身全無異行者不合定諡伏以頃者中原作梗郡部多虞進卿隨戎車之徒惠然向化捨鞭弭之役從而策名荷祿驟列清朝衛蹕末施微效以其違去喪亂歸慕聖朝慎思遠圖克保來裔按諡法思慮不爽曰原謹議藉父兄業為將帥臣禦其翊衛之師宮陛盡肅總彼緹騎之任王府克寧方馳乃能適赴忠訓言其永逝用以易名漢遇立事以勤敬不替按諡法夙夜警事曰敬謹議右伏以孫晟蘊經濟之才有慎重之操守之以正固潤之以文辭事先朝居密近之地登右輔稱弼諧之任周歷清顯藹有聞望洎北寇侵軼邊郡驚騷於修德庇民之時奉執謹乘軺之命聞其情專報主動必應機班彪論中興在漢仲尼由大夫思魯深踐虎狼之國競全臣子之節雖死之日猶生之年爰考易名宣旌盡瘁孫晟精於文學達於政事專以知物多聞闕疑豈不謂博物多見乎為一介之使奮不奪之節見危致命確乎不拔豈不謂之忠乎危身奉上曰忠其孫晟請諡為忠竊以立諡之法先王所以懲惡勸善也雖士有百行考終之道節一惠為名守義奮身戎行位以勳立前後功行豈無可書者今復詳守義行狀任日有裨將秦銖稔惡聚徒懷害守義尋則俘擒之云有嚮報之語由神物幽附且守義薰旅訓民不能盡敷君惠致來攜叛職爾之由未嘗引咎責躬而妄興妖語孽由自作神不可誣欲以此事歸美於功不曰疏乎按諡法好變動民曰躁改曰躓伏以君子重終先王有禮既允啓殯請諡弗違敬文允處和門夙馳戎略武昌二君勤勞於茲今也命歿有聞爰加贈典令善類也不曰宜乎按諡法勤勞無私曰類劉敬文請諡曰類謹議竊以一昨淮壖用兵將統無略或始陳懼敵或望風靡旗或挫而受降或窮而被執以至禍難相繼疆土仍侵而漢威能嚴整禦戎精明出令決勝有料動算無遺戎師屢攻城守不拔保全名節集大功勳捍禦多能易諡堪獎按諡法決壯勝強曰武折衝禦武曰毅諡曰武毅謹議伏以昔者東甌別部臨汀舊封兵革遭罹閭邑蕩失俗方阜化民僅息肩延嗣鎮撫得宜物土咸若嗟乎永逝良用追恩按諡法綏和來民曰德改諡曰載伏以策勳諡行名實有倫善惡必書褒貶斯在故龍武統軍使檢校太傅同中書門下平章事河東郡開國侯食邑一千五百戶賈匡浩頃以程功積事服勤有年國朝疏爵之初人惟求舊洎剖符錫壤休顯亦多廬陵上饒聲化且著南康重鎮番禺連封五嶺之南惟王巨屏有溪洞獷民昔嘗恃險竊聚妖凶匡浩控壓蕃要務去元惡致令滋蔓其徒攻剽廬舍而匡浩受方面重寄不曰徒然夫見義而動所舉必剋匡浩執心寡斷何所述哉按諡法述義不剋曰丁賈匡浩曰丁謹議伏以一昨中州阻兵民庶遷蕩福進持其部伍靡所依歸此不右招彼何寧族來思之念順軌是圖按諡法深慮通遠曰思謹議崇佑襲先公之爵踐華胄之封而能禀受兵鈐精持戎律居中宿衛盡瘁勤王晉陵牧民同安治郡未幾滿秩咸著善聲行狀云為政之日獄訟無撓民人乂安按諡法勤恤仁隱曰德豈不謂獄訟無撓乎又曰寬衆優足曰德豈不謂民人乂安乎其劉崇佑請諡曰德謹議孫彥潛少年以節概不㣥雄豪獨處習兵家之法有名父之風訓士禦戎人皆禀令方立功業是賴將臣忽傷銜橛之虞遽痛垂堂之戒雖捐軀自效而獻命不忘謹按諡法述義不克曰丁孫彥潛較藝武場馳驅君所雄勇效力誰曰不然昔魯莊公及宋人戰於乘邱縣賁父御卜國為右馬驚敗績公欲罪其無勇二人遂赴敵而死及圉人浴馬有流矢在白肉公曰非其罪也遂誄其赴敵之功以為諡今彥潛亡命奔馭貽譏有司與其赴敵而死不同若責其垂堂之訓又太過也臣請改以武而不遂曰莊伏以希蘊家甘啓土允胄襲封率事聖朝獲寧來嗣往令藩任連彼闕一字華支轉之懷副軍是賴奄忽永逝於焉增傷追遠之期易名可贈行狀云長自綺紈幼居祿位端莊慎密似不能言縱喜慍家人莫得而知之按諡云安心好靖曰夷伏以吳廷英早列內班頗聞幹事洎升監護亦克訓齊對敵而不避鋒鋩失律而莫諧功業遽從淪喪宜勸將來執固誠堅易名宜著按諡法義勇不遷曰果大戴禮曰犯之以卒而不懼及置義而不遷請諡曰果伏以王令莊嘗事和門頗探戎略久司羽衛之職晚分符竹之任始末不懈民庶興謠黃髮彌年優游卒歲稽其往行豈不謂之寬樂令終乎按諡法寬樂令終曰靖請諡曰靖張易抱耿介之性韞剛直之風宇量獨高識斷明擅詳狀其行昔歲國宗有北門之驚而王師不振大臣獻畫多所異同易抗辭而前獨屈㣥議寧難之略潛合睿謀祗如面斥奸臣不畏強禦傾邪者見之而屏息黨錮者聞之而銷聲而又集諫議之書極匡救之理啓迪聖覽規贊大猷忠鯁之懷風節恆峻議名之狀一惠為諡謹按諡法直道不撓曰正伏以漢鐇以其少年鄉曲有譽頃遭世否蘊有成謀載執干戈散招逋叛保乂故土營衛屬城勳伐因彼有稱爵位爰茲而陟按諡法安民立政曰成漢鐇戍守之民競於亂而故土不遷豈不謂安民立政乎請諡曰成謹議文蔚昔者持慮之日對仗彈事廷劾宰相剛直之性無所顧憚秉心一德中立不回按諡法一德不懈曰簡伏以先王論德行以為諡稽其往者慎終有稱既啓殯而有期諒美名而可易太弟少傅李匡明襲爵承家匪躬立事爰自紫垣演誥潤色皇猷烏府提綱申明庶獄同安理郡惠政以成林林之中清風久著而又攻棊善翰知音審聲執射而容體有儀飲酒而程度不惑學通周問尤多能矣謹按諡法博聞多能曰獻李匡明請諡曰獻伏以鍾承績寇鄧名家褚竇洪族連戚里之貴開爵邑之封揚歷清途周旋峻秩再處方州之任尋統下瀨之師能保和柔奄至淪謝稽諸往行以議易名謹按諡法和柔居中曰懿謹議據考功列到行狀云嗣承慶基有象賢之德中正不倚秉心罔渝祗如再踐鈞樞兩迎魯館富貴絶驕矜之色始終無險陂之心又以道著彌綸功扶翼戴荷先朝之顧命贊登極之法儀百度惟貞四方是則再稽前烈敢忘至公謹按諡法和柔居中曰懿伏以再興經踐歲紀序為將臣昔嘗總翊衛之權居右廣之職戎律既秉謀誠豈無然而偃師中府謝病終老勳伐未著爵位虛崇命數彌加諡名宜賜竊尋其家狀頃自洛京仗義南渡擇主而事思慮不違按諡法通不爽願曰思謹議伏以啓殯納柩日月有期諡行易名始終斯著具銜李承祚承家將種勳德有稱惇謹為人忠勤立事洎司武候夙夜警巡奸盜克殲市廠墨無撓考狀昭載名實有倫按諡法夙興警事曰敬李承祚請諡曰敬謹議夫名實有倫在乎素履考功無籍莫得而書今據故吏裴洪隱紀其行事有司質以為諡惟崇禧一昨受推轂之命師次淮陰終於王事服勤死衆總於弗忘是謂夙夜就事受命不遷曰敬劉崇禧請諡曰敬謹議故具銜王建卒尚書省考功録到行狀其人頃因寇亂起青徐部入魏梁師乾寧中與其徒葛舟來侵壽壘無陳北爭奔涉溺者萬計建獨得數騎臨水勢蹙於是下馬地鬬劍㦸相搏奮有餘勇人莫之勍俄而免胄請執獻命我師爰從委質亟立前勳擒李遇於宣城逐王茂章於淝水攻無錫走越寇建有功也出刺郡吏民無橈疆郵以寧偃師多年懸車卒歲黃髮彌壽忠亮惟堅按諡法克敵勤民曰桓公諱繼勳字紹元琅琊臨沂人因家為泉州晉江人也其先自秦漢至隋唐纍世名德冠冕蟬聯不絶國史家牒莫不詳焉故所謂仁人之利本枝百世昭穆無窮若夫離翦佐時寧亂定功於前渾祥輔主濟民垂名於後歸刀示信誓水指期或闢土肇基宏大功業近則我祖有之也別宗因地始封閩王諱審知族人尊之是為太祖四世之親因之追贈故桂州陽朔縣令贈司徒諱玉公之高祖也司空贈太師中書令諱恁曾祖也守泉州刺史贈侍中追諡武肅諱審邽皇父也福建管內三司發運副使檢校司徒贈太尉諱延禎皇考也崇國太夫人宋氏妣也公大昴炳靈祥麟叶趾弱齡襲爵寅亮秉躬我顯祖光宅閩區功格東表漢封三越奕世重熙修職貢方不替獻命中間赤符未集作帝自娛維彼哲人振振公族矧復閩隸殘孽乘釁肆凶公能刻日指期對天永誓果見克殲猾豎大刷恥讎再造邦家疏爵崇命英簜華路鸞鈴飛鑣加服九章踐登一一事高陽舊里繁盛昔時行部晉安遺愛木泯保大四年諭順祐之理稽筮遷之徵竇融適變而動公臆斷有焉帝嘉其誠允答高秩拜侍中加特進賜推忠效節奉聖功臣食邑三千戶戴蟬珥貂入侍帝闥功冠㣥后位隆鼎司五年領池都團練觀察處置等使守池州刺史秩滿考成績之狀居奏課之最再命陟庸不替厥位七年崇國太夫人奔問至自傷行役版輿闕奉陟屺增望敬勞永思忽焉哀驚逮將絶息羸病扶杖允莫能興萬石君純行篤孝人皆擬倫焉卒哭告祔金革從權起復視事共治七載宜民宜人無怨無惡惠政誕洽庶績咸熙朝拜左威衛大將軍屯守期門率厲士校玉顏鑒物溫言煦春遇士大夫有禮與小人有恩器度豁然貴而不佚兼以書善楷妙經誥墨迹餘暇手寫好學不倦為善是稱招禮耆儒宏廣經義通方之訓隆諸子弟堂構斯盛由公負荷有此之賢如此之親嗚呼天不憗遺哲人其萎享年四十有五以保大十四年七月十二日薨於京師崇禮坊私第正寢皇上撫几增悼廢朝三日詔鴻臚護葬司儀禮賵賻加等啓殯右衛上將軍諡曰敬禮也以其年八月二十五日葬江寧縣安德鄉安宜里往日卜竁於此鄉先夫人青陵原合祔禮也嗚呼祖庭撤奠遷柩屬紼素旒委以曳軫雲翣翼而蔽驂笳鼓悲鳴霜風慘冽世嗣號而踊絶虞歌挽以縈紆嗚呼既葬皇皇求而不見親賓拜以復土輿仗回而下岡微陽疏林歸軒空蓋公娶清河郡夫人崔氏舊朝相國允族孫女也秀發景胄訓承大家曹謝賢才維則是效裴王宗族作嬪可偕不幸先公而亡繼室滎陽郡夫人鄭氏往歲名推賢淑翼贊宮闈玉度有輝蘭儀誕茂作儷於王公從夫爵禮也長男傳嗣池州中軍使顯居右職是司鼓鞞秉同律以聽軍聲陳旌旗以鞠師旅在昔宣任今為具臣仁孝之行天誘其衷端已厲俗勤節苦學寡欲無玩王褱瑋奇才或以德進而必待舉次男曰傳憲次男曰傳勗並冠而未仕就賢親師進德修業吾門以大其在茲乎有女二人長有適人為婦之端次以少未笄既喪父天殆無所怙針管右佩婉惠其儀致雍昔與嚴助同鄉入見諸任在列仰覿亮迹合紀殊庸拂琬玉以增悲愧銘頌之陋略辭曰惟閩有雄冠彼百越皇皇我祖昭昭丕烈景胄流芳維公則哲襲爵弱齡守命邦節伊昔故土猾豎肆逆放弒我君盜據我國世祚中零厥心否塞潛運神謀入翦凶慝泉山䊸盤秀山高峙大荒東流禹迹攸紀帶海一隅膏壤千里疇昔賞功作牧於此崇徽九命踐登三事戴珥貂蟬帝闥入侍守郡池陽風化大治兩地甘棠猶詠蔽芾執親之喪杖寢在廬漢文權制墨縗外除權從金革起剖虎符期門總旅警衛宸居學業優備文武不墜分袂藏書永錫來嗣師禮耆儒論道說義階軒柱楹墨迹猶記偉哉君子威儀堂堂蟬冕照面玉顏生光藂蘭鬱茂高風隕霜緬邈不見人懷永傷元堂一閉兮冥寞幽魂江邊古路兮原頭新墳青林松柏兮他年子孫碑存荒草兮傷嗟哲人先生諱日新字繼平閩侯官人也顯考諱極本朝將作少監端州刺史妣穎川夫人陳氏先生初年誦詩讀書對客答義佩觿獨立岐嶷不㣥七歲舉童子擢第釋褐授京兆府文學執簡對簿吏情若縈振衣彈冠真趣自逸在昔避狄出雒由道涉淮桑野掛書卻公府之辟浮提記柱史之文出仁義室廬棲神世表脫衣冠桎梏蠲纍塵纓受師於問政先生聶君即天柱元同先生閩邱君門人也絶其私親道門如其宗祔焉先生禀太素五神之教內府孔明稽玉帛大歷之符前修可契器宇外朗襟靈內融雖因文為世華許誰雕僞縱使迹在人事俗自喧浮爾乃釋滯升虛句絶元而自牧澄源返照欲勿我生謂五味口爽撤按貶羞一簋歲暮終身晏如亦何必翦薤腸消咽金尸腐者哉保大十一年夏仲月二十三日晨起命易衽席并几杖履遷於正寢凡附身者一一陳之然後秉盥洗潄理髮斷爪勝衣攝袂湛然肅容展繞露壇峻降延閣降屈屢拜如有禱請即日終於金陵紫極宮壽七十有六毀綴則屈身若恆淹襲而顏色不變翽然蟬蛻宛爾形留皇上撫几移時增悼永傷乃命有司給喪事內臣護喪加禮也儲后親王欽順元祖敬接羽人恆於話言多所師仰中朝元輔舊齒名賢沖素見交軌跡相結天不憗遺人懷永傷空懷鶴弔之風莫問鳧飛之路門人捧持遺舄緬慕彼蒼臨谷難追飛筠已遠以其年六月十二日歸靈於方山隱晦解脫恍惚其中綿綿常存天地長永銘曰微妙之教立道為名精思閫奧勤行軌程猶龍難狀扣寂無聲夫子務進階漸而成愛尚文章襟抱質素淆混人事心節堅固五味口爽一簋歲暮食氣者神戶樞不蠧養志養神壽考惟寧明明理命寂寂潛齡元駕一解飛行不停誰期汗漫我出青冥金陵之鄉方山之陽葛仙澤藪寶華宮房解節何往歸形斯藏松喬鶴老萬古淒涼
