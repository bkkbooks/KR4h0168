body:
  text: 我國家出震乘乾立極開統謳歌歷數啓聖千齡文物聲名握圖六葉安祿山夷羯賤類頑凶殘愎頃以捍邊有功專制方面同人者貌謂報效恩私異人者心乃包藏逆亂以為中原無備干戈可動而毒深流禍變起倉卒塗炭萬姓興言痛憤朝市之內忽肆凶殘衣冠之中咸被點汙朕作人父母志雪國讎是用中夜奮發提戈問罪自靈武聚一旅之衆至鳳翔合百萬之師親總元戎掃清羣孽出師之日仍下寬令殲厥渠魁餘無所問有能翻然歸順自縛軍門復其官爵仍加優賞將士等以大軍一舉玉石俱焚元惡就誅凶殘並戮僵尸遍野匹馬不遺今西土罷兵咸以寧輯河雒氛祲一朝翦除廣平王俶受委元帥能振天聲左僕射子儀決勝無前克成大業復有回紇葉護及雲南子弟並諸蕃兵馬等皆竭誠向化力戰賈勇事同破竹易若摧枯朕入城之日百姓咸思戴商復喜睹漢煙風雲景皆是祥光里巷歡呼惟聞相慶朕早承聖訓嘗讀禮經義切奉先恐不負荷今復宗廟於函雒迎上皇於巴蜀導鑾輿而反正朝寢門而問安寰宇載寧朕願畢矣且復人將有主敢當天地之心興豈在豫實憑社稷之祐京城僧道耆老百姓等比者時穀翔貴薪芻不給困窮之極朕常繫心緣初收京城倉庫未積待國用稍足豈忘施惠其諸色行人因陳沒并坊市百姓及諸色蕃胡召募并元惡凶黨昨因破敗所在潛藏并仰於府縣及御史臺陳首一切原其罪如有被人言告捉獲者並從軍令其京城內外文武官有受賊補署罄其心腹自祖及父皆承國恩就逆背順頓忘臣節或有守舊官者請俸料為賊判官或判官之際中間得替並有攝賊偽官兼知職掌其中有京官及私白身皆受擢用其中有隱迹不出固辭疾病色類既廣人數又多宜令御史臺憲部大理三司據狀勘責條件聞奏其外官充使及先有職掌並事故及隔絶未赴任在京者亦委三司勘責奏聞又賊中臺府坊市所繇人等比與逆賊追捕造事之端損害忠良仍奪財物為蠧尤甚情不可容宜令崔光遠禁身切加推勘一一狀奏勿令漏網其內侍省及左右龍武羽林軍並間廄飛龍諸武官應先合從駕人等其中臨行潛避遂受賊驅使並使各委本司使括責量情狀輕重奏聞其隱盜倉庫及偷劫逆賊家錢物或受賊寄附並與賊請料祿等因此隱沒者並限敕到十日內於所繇陳首其物便準數送納本色並還不須科罪慮巳有破用徵納艱辛仍十分放三以示宏貸其近日逆人及隔絶人莊宅宜即括責一切官收又聞人家子女多被侵逼且非本情宜一切不須尋問或與逆賊居住鄰近及作義故往來情非切害一時之事有殊逆黨亦宜釋放其有受賊偽度人宜令所司括責並勒還俗其僧及道士各收本色所在寺觀勿許居止今兩京無虞三靈通慶何以昭事宜在覃恩待上皇到日當更處分咨爾有衆知朕意焉功濟艱難義存邦國萬里絶域一德同心求之古今所未聞也回紇葉護特稟英姿挺生奇略言必忠信行表溫良才為萬人之敵位列諸蕃之長屬凶醜亂常中原未靖以可汗有兄弟之約與國家興父子之軍奮其智謀討彼凶逆一鼓作氣萬里摧鋒二旬之間兩京克定力拔山嶽精貫風雲蒙犯曾不辭其勞急難無以踰其分固可懸之日月傳諸子孫豈惟裂土之封誓河之賞而巳矣夫位之崇者司空第一名之大者封王最高可司空仍封忠義王每載送絹二萬匹至朔方軍宜差使受領朕聞古之聖王臨御天下功懋受賞道無隔於華夷義存有孚信必全於終始故能德被寰宇化延殊俗是以周稱柔遠克著康濟之圖漢結和親式宏長久之策繇來尚矣朕祗若元命永惟稽古內申九命勉膺嗣夏之期外接百蠻庶廣懷荒之澤頃自凶渠作亂宗社阽危回紇特表忠誠載懷奉國所以兵踰絶漠力徇中原亟除青犢之妖實賴烏孫之助而先有情款固求姻好今兩京砥定百度惟貞奉皇輿而載寧纘鴻業而攸重斯言可復厥德難忘爰申降主之禮用答勤王之志且骨肉之愛人情所鍾離遠之懷天屬尤切況將適異域寧忘軫念但上緣社稷下為黎元遂抑深慈為國大計是用築茲外館割愛中闈將成萬里之婚冀定四方之業以其誠信所立家國攸寧義以制名式崇寵號宜以幼女封為寧國公主應緣禮會所司準式其降蕃日仍令堂弟銀青光祿大夫殿中監漢中郡王瑀充册命英武威遠毗伽可汗使以堂姪正議大夫行右司郎中上柱國上邽縣公賜紫金魚袋巽為副特差重臣開府儀同三司尚書左僕射冀國公裴冕送至界首凡百臣庶宜悉朕懷朕聞古之哲王成功立極莫不旁求賢佐用康帝道由是軒登風力所以戡亂保邦漢用蕭曹所以勤王足國故能上扶王室下濟蒼生為社稷之寶臣資帝王之大業丕膺鼎位實屬斯人司徒兼尚書右僕射同中書門下平章事兼靈州大都督府長史朔方節度使上柱國代國公子儀道備文武衷懷忠亮表宏才而應運申茂績而經邦司空兼戶部尚書同中書門下平章事太原尹河東節度使上柱國薊國公光弼業盛勳賢材優將相蘊權謀而制敵勵誠節以匡時往屬凶醜亂常雲雷經始咸能外持戎律內翊皇圖披荊棘而有功歷險艱而無易或分麾東討掃昏祲於兩都或仗節北臨備長城於萬里並以掃清寇孽任切股肱永惟締構之勳久著山河之誓今殘妖佇翦介士猶虞將終九伐之功實藉二南之力是用增其秩序寵以樞衡宜正位於台司俾克宣於嘉績子儀可中書令光弼可侍中出納絲綸是稱喉舌調和鼎飪必在鹽梅況艱難之際擇賢必資於選衆密勿之地論道固期於得人兵部侍郎呂諲間氣挺生宏才迥發訥言敏行強識博聞謀猷出三傑之先德業處五人之上久在朝列尤推審慎復得釣璜之慶宜膺補衮之求可同中書門下平章事郎並平章事制出納帝命經綸王言兆若見於非熊位必登於仲虺行御史大夫兼京兆尹李峴朝廷碩德宗室藎臣中書舍人兼禮部侍郎李揆文房學府命代挺生行戶部侍郎兼御史中丞第五琦武庫智囊應期間出皆中和秀氣維嶽降靈可以宣暢謀猷闡宏體要庶得道光風力名重伊皋俱當入夢之辰共舉從繩之直既用立汝宜其弼豫峴可行吏部尚書同中書門下平章事揆可中書侍郎同中書門下平章事琦可戶部侍郎同中書門下平章事元帥之任實屬於師貞左軍之選諒資於邦傑自非道申啓沃學富韜鈐則何以翊分閫而專征膺鑿門而受律求諸將相允得其人司空兼侍中鄭國公光弼器識宏遠志懷沈毅蘊孫吳之略有文武之材往屬艱難備彰忠勇協風雲而經始保宗社於阽危由是出備長城入扶大廈茂功懸於日月嘉績被於巖廊屬殘寇猶虞總戎有命用擇唯賢之佐式宏建親之典必能緝寧邦國協贊天人誓於丹浦之師剿彼緑林之盜載明朝獎爰藉舊勳宜副出車之命仍踐分麾之寵為天下兵馬元帥趙王係之副知節度行營事台庭之位陶甄是屬在和羹而或爽當折足而貽憂由是舜舉二臣叶心者俾乂漢閎三相無能者同免苟虧公議抑有彞章正議大夫行尚書戶部侍郎同中書門下平章事權知門下省事上柱國扶風縣男賜紫金魚袋第五琦夙表材幹纍升要近久專司於國賦常有利於公家往自艱難備經任使以獎其勤效拔在鈞衡比事以來迹每涉私政非近體率情變法且違行古之方封己怙權稍闕在公之義薄國靡費聚斂尤繁既罔上而取容亦害下而恣怨凡所進拔悉收瑕釁又與賀蘭進明並居權要潛結往來嘗夜會於私第歸必淹於永漏殊乖憲典足表異端頗招黨比之嫌甚失弼諧之望稽諸故事合議刑章但以任在股肱理無按問遂抑情於含匿斯以禮而始終豈可更踐台階尚塵樞禁宜申遠謫之命俾肅懲違之典可忠州長史員外置同正員外官勳封如故上公之位寵極人臣中書之本政先綸綍是知應乾成象用分台鼎之司為國作楨必藉勳賢之業所以漢庭多難絳侯居太尉之尊晉室未安溫嶠掌中書之務至若任兼公相道濟生靈必俟非常之才用膺莫大之寄司空兼侍中幽州大都督府長史河北節度支度營田經略等使副元帥知諸道節度行營上柱國鄭國公光弼器格沈正襟靈邃遠感風雲之密契蘊縱橫之大才成經綸之功足以靜亂懷忠孝之道故能匡國自狂胡構禍寰宇未清義勇竭於忠心勳庸著於王室頃者豺狼餘孽尚稽天討蚊蚋相依仍侵河外是用仗其深略為我長城有穰苴之法令亞夫之威略遂能挫羣凶之鋭全百勝之師為廟堂之寶臣成軍國之重任雖吉甫作憲道可經邦而孫武行兵謀能制敵克壯大業無愧前賢且官惟其人固難虛授業以存善抑聞舊章況經綸之時義參於締搆艱難之際功茂於始終不有殊獎寧彰厥德是以載疇嘉績俾允具瞻宜進上台之秩仍兼右弼之寵可太尉兼中書令君之使臣期叶心以輔政臣之事主當盡忠以明職苟或冒官罔上黷利崇姦靡懲折鼎之凶載履覆車之轍自貽厚責難捨刑章正議大夫行忠州長史員外置同正員上柱國扶風縣男第五琦素以幹能早膺任使自艱難之際帑藏是司久彰歲月之勞頗申強濟之用所以收其課績擢在台階而行闕由衷任惟過量務容身之計虧許國之誠變法多紊於常經率情每違於直道交惟黨比用匪忠良頗乖秉鈞之體諒乏致君之志頃者遂從貶削爰示典章是以輿議日聞僭違益露引承福於肘腋殖貨於中處宋晦於膏腴竊資於外懷金暗室曾不慚於四知納賄私家動有踰於萬計比令按問咸伏其辜且國賦邦徭軍儲歲備朕以戎車屢駕氓俗未康常有戒敕令其節省豈謂陰圖聚斂擅出科條上延謗於公家下益疲於人業徇私封己歸怨稱君忝曰人臣胡寧忍此況又深尤隱慝纍干刑書朕亦含垢匿瑕為之掩惡議以明刑合從秋令顧君臣之義大庶終始而禮全夫除惡務本國家之彞訓申恩念舊王者之深仁屬陽和在辰品物咸遂由是抑從寬典特屈嚴誅宜寬殊死之命俾就投荒之謫可除名長流夷州馳驛發遣仍差綱領送至彼所勿許東西於戲朕臨御以來每更輔弼皆宥以過失存其祿位今者琦之所犯負國誠深義不可以苟容法不可以頻貸申茲憲令用警庶僚凡百卿士宜知朕意古之哲王宅中御宇莫不內封子弟外建藩維故周稱百代抑聞麟趾之美漢命六王亦樹犬牙之制歷考前載率由舊章朕以薄德纘承鴻緒屬豺狼未殄金革猶虞賴文武藎臣協心同德庶克清於元祲期永保於皇圖且授鉞分符義巳先於用武維城作翰道方宏於建親咨爾分閫之崇成余磐石之固彭王僅等銀潢育慶璿萼分輝忠孝稟於天成文武稱其備用今三秦之地萬國來庭誠宜列皇子以建封崇懿藩而制勝資其固本委以臨戎彭王僅可充河西節度大使亠兊王僩可充北庭節度大使涇王侹可充隴右節度大使邵王偲可改封蜀王充邠寧鄜節度大使祀王倕可充陝西節度大使興王紹可充隴右鳳翔節度大使必能輯和戎律慎守封疆外協樽俎之謀中為社稷之衛是以分麾命社革故取新用叶天地之符俾膺家國之任共蕃王室可不慎歟宰輔之重陶鎔所寄用諧時望必藉素名是以殷登左相伊尹成乎一德漢命舊臣孔光由其再起蓋以上扶皇極下庇蒼氓永懷寅亮之美實屬股肱之任特進守太子太傅上柱國韓國公苗晉卿衣冠宿望廊廟公才體文雅之宏量負經通之遠識纍踐臺閣久彰名器自艱難之際協贊有勞早契風雲之期備陳康濟之術頃以疲疴固辭樞務重違誠懇之志爰假優崇之秩雖訏謨暫間而夢寐無忘今戎事猶虞蒸人未乂漢將且聞於辭第留侯豈遂於停飧成余社稷之本懿爾勳庸之望固可勉紆新紱載珥舊貂宜罷輜車之禮俾廣黃閣之政可行侍中弼豫之選審象是求天步未平廟謨尤切必資明表佇以佐時畫一之才取則不遠正議大夫前河中尹兼御史中丞充本府晉絳等州節度觀察等使上柱國嗣徐國公賜紫金魚袋蕭華公輔成名承家繼業詞標麗則德蘊謨明道開雲物之先節貫嚴凝之序早登臺閣多識舊章再履宮坊尤知至行致君望美閲相求能且推伊陟之賢更啓漢臣之閣還依日月佐理陰陽俾參政於紫宸用建中於皇極可中書侍郎同中書門下平章事集賢殿崇文館大學士監修國史散官勳封如故致君惟善輔德在和必俟三台之明用增九鼎之重彞倫所屬元氣是調乃眷公才作豫良弼銀青光祿大夫行尚書吏部侍郎上柱國河東縣侯裴遵慶體凝精粹理暢黃中學奧全經詞深大雅行歸於節固其貞公輔之望攸先古人之風非遠纍階朝序久踐天臺凡所彌綸多為故事咸有斯在王猷是經庶宏翼善之功克濟艱難之運登庸瑣闥參政兩闈宜輟山公之啓以光説命之求可行黃門侍郎同中書門下平章事散官勳封如故勇而有謀是資兼領有則益便實仗宏才開府儀同三司行鳳翔尹兼御史大夫充本府及秦隴興鳳成等州節度觀察使保定郡開國公李鼎成用通明智略深遠攻守之志不憚勤勞報效之誠無忘夙夜頃以岐陽近甸王業大都爰藉政能委之鎮緝下車未幾克樹奇功寇盜砥寧聲謠載洽眷茲隴外戎馬要衝時屬艱虞尤資式遏制勝千里諒在伊人必當振我師徒展茲籌畫兼弱攻昧在此行焉可持節都督鄯州諸軍事鄯州刺史隴右節度營田等使餘並如故保大定功事資於宏量坐籌決勝政總於中軍令在必行寇不可玩欲清小醜須委大臣中大夫守殿中監賜紫金魚袋李若幽宗室英髦士林楨幹出忠入孝抱質懷文包果斷之深謀蘊韜鈐之祕略纍登清貫克振休聲名正西京姦豪屏息紀綱三蜀卭僰乂安黎庶賴其強明搢紳推其利用今河洛之境未殄餘氛晉魏之郊比仍多壘山河襟帶關輔要衝東盡大行南鄰魏汭擁旄亘野精騎成羣必俟元戎以清妖孽靜言其選允謂當仁地官高步於六卿亞相作程於百辟綜斯劇務朝選攸歸宜兼領護之權以副師貞之吉可戶部尚書兼御史大夫持節充朔方鎮西北庭興平陳鄭等州行營兵馬及河東節度都統處置使鎮於絳仍賜名國貞使持節滑州諸軍事守滑州刺史攝御史大夫充滑亳相魏德貝六州節度使令狐彰義勇無倫忠貞有素艱危效用終始不渝頃陷賊庭忠誠屢達來持漢節壯志彌高拔城變六月之師破敵振三軍之氣疇庸議賞須越等夷今淇澳未寧河朔猶梗廓清醜類實屬元戎宜列職於中司俾承榮於茂秩登壇授律藉爾良謀獻凱論功佇聞嘉績可銀青光祿大夫鴻臚卿使持節滑州諸軍事兼滑州刺史御史大夫充滑亳相魏博貝六州節度使所設諫曹欲聞諷議允副從繩之望須成削藳之書其諫官令每月一上封事指陳時政得失若不舉職事當別有處分天位惟艱廟謨是切委在公輔正於四方佇鼎實之能調補衮章之有闕眷求勵翼式允僉諧朝議大夫行尚書戶部侍郎兼御史中丞上柱國許昌縣子賜紫金魚袋充度支等使元載清明在躬貞固幹事信必可復文而不華準繩朝端金玉王度不有其善遹觀厥成固是生靈之傑咸推宰輔之器執茲大政敘以彞倫建中於人莫匪相爾丹青神化參議兩闈宜書一德之篇俾協賡歌之美可中書門下平章事兼集賢殿崇文館大學士修國史餘如故周以五聲聽訟漢以三章約法自下訟上敗俗亂常矯誣之詞妄稱不軌忿意之嫉圖有誅夷朕處分中書門下再令按問備茲閲實其妄告張謙奴附子宜付鳳翔郡集衆決殺聖人有作弧矢爰興歷代以來征伐靡廢自逆胡巳死餘孽猶存所在蕃人多以利合亦有因事便被脅從朕誓雪國恥餘無所問中夜痛憤志安蒼生其假息偷生披城自守池魚幕燕何以喻茲廣平王及諸將分隊夾攻迎軍破敗橫尸遍野積甲如山二十里內可知多少其中逼迫同被殺傷言念於茲良深憫悼今兵馬乘勝便取東京平盧節度使兼領奚契丹五萬又收河北天下之事計日可平緣京城初收要在安百姓又灑掃宮闕奉迎上皇以今月十九日還京應緣供頓務須減省豈忘艱弊當別優賞宣示百姓令知朕意江油舊壤境帶靈山自狩巴梁屢昭感應眷茲郡邑合有增崇可升龍州為都督府賜號應靈郡荷社稷之靈賴上皇之感翦除寇盜克復京都浹辰之間大勳允集掃清宮闕奉迎鑾輿昨自望賢宮得申拜慶重歡侍省深戴君父之恩承順尊嚴固宜臣子之禮卿等訏謨致理翼贊成功方告史臣有慙薄德朕恭承明命親總兵戎掃欃槍之妖拯生靈之患宗社所祐何往不克雖兆自於艱難而終盛於丕業昨日星動順鸞輿回京仰戴君父之恩重歡侍省之慶拜迎之日得展孝誠特荷恩慈多慚薄德遂得祥風引斾瑞雪灑途宮闕生光感應昭著卿為朕心膂夙夜忠勤所請宣付史館宜依朕以眇躬敬承明兩比遭狂寇擾亂宗社不寧稟上皇至聖之謀當仗鉞秉旄之任六師一振殘孽無遺上皇厭彼代紛棄茲人事萬邦之重俾付朕躬傳授寶符乃加徽號朕再三固讓實懷黽勉恭膺典册感慶良深覽卿等來章倍加祗懼依卿等所請特進太僕卿南陽郡公兼御史大夫權知襄陽節度事上柱國金鄉縣公魯炅蘊是韜略副茲節制竭節保邦悉心陷敵表之旗幟分以土田可開府儀同三司兼御史大夫封岐國公食實封二百戶兼京兆尹人臣之節有死無二為國之體將而必誅況乎委質賊庭宴安逆命耽受寵祿淹延歲時不顧恩義助其效用此則可宥法將何施達奚珣等或受任台輔位極人臣或纍葉寵榮姻聯戚里歷踐臺閣職通中外夫以犬馬微賤之畜猶知戀主龜蛇蠢動之類皆能報恩豈曰人臣曾無感激有靦面目事於寇讎亂臣賊子何以過也自逆賊作難傾覆邦家凡在黎元皆含憤怒殺身殉國者不可勝數此等黔首獨背國恩豈可列在崇班荷茲祿位不思君親之分唯與凶逆同心受任於梟獍之間咨謀於豺虺之輩靜言思此情何可矜朕志在含宏法務寬貸然凶惡之類自招其咎人神所棄天地不容原其本心皆合殊死就中情狀仍有處分達奚珣等一十八人並宜處斬陳希烈等七人並賜自盡前大理卿張均特宜免死長流合浦郡國有五典幽閉為重刑有六宮明章內理所以教之陰禮詔之御服至於衡紞紘綖之美織絍纖纊之事任適於用則有司存焉頃年巳來仍遭寇盜違其情性則謫見天象恣其供億則糜費國儲非以達冤煩振繫滯之義也宜放內人三千人各任其嫁其年老及疾患如無近親收養散配諸寺安置待有去處一任東西仍各與一房資財以充糧用並委府縣官勾當勿使侵淩以成朕無為之化也京城之人久陷凶醜亦既砥定莫非王臣比屋可封唐之人闔境皆戴商之舊復以宗廟之器府庫之資散在閭閻紊於綱紀主守者缺以供事竊取者冒其常刑所以遣其撿括必使詳實如聞小臣失所遂使流言寇攘資財驚擾士庶官吏不修其法豪強橫有縱暴或得一官物則破人家産或捕一姦吏則傍纍親鄰仍有不逞之徒因此恐嚇大為侵暴百姓冤苦永言哀念良深歎息委京兆尹兼御史大夫李峴勾當諸使撿括一切並停妄有欺奪宜即推捕奏聞仍榜坊市務令安輯副朕意焉故衛尉卿兼御史中丞恆州刺史顏杲卿任彼專城志梟狂虜艱難之際忠義在心憤羣凶而慷慨臨大節而奮發遂擒元惡成此茂勳屬胡虜憑陵流毒方熾孤城力屈見陷寇讎身歿名存實彰忠烈夫仁者有勇驗之於臨難臣之報國義存於捐軀嘉其死節之誠未備飾終之禮可贈太子太保朕聞古先哲王慎罰以恤人命脅從罔理罪疑從輕成湯有解綱之仁光武有焚書之令蓋惠彼至理受其刑章是以法不濫加刑所以措也間者時遭寇逆患在干戈衣冠之流逼迫者衆事不獲已情稍輕焉頃者委在三司窮其五聽議重者纍申刑典稍輕者猶被勾留況時久淹延人皆窘乏衣食且猶不給家屬又悉乖離艱難之憂無甚於比豈朕泣辜宥罪作人父母之意耶況恩澤頻加科條遞減原其事狀稍近平人豈可尚議遷貶窮其反側萬方有責罪實在豫一物失所憂將誰屬永言憫念用惻於懷而兩京官應被賊逼授偽官三司所推問未了者一切放免其賊中守本官至冬方選曾受驅馳既寬刑典免其貶降並至來冬放選合得官時仍委所司量事輕重注擬其巳貶官者續有處分崇黨近名實為害政之本黜華去薄方啓至公之路房琯素表文學夙推名器由是纍階清貴致位台衡而率性自任怙氣恃權虛浮傲者進為同人溫讓謹令者捐於異路所以輔佐之際謀猷匪宏頃者時屬艱難擢居將相朕永懷仄席冀有成功而喪我師徒既虧制勝之任升其親友悉彰浮誕之迹曾未逾時遽從敗績自合首明軍令以謝師旅猶尚矜其萬死擢以三孤或云緣其切直遂見斥退朕示以堂案令觀所以咸知乖舛曠於政事誠宜效茲忠懇以奉國家而乃多稱疾疹莫申朝謁郤犨為政曾不疾其迂回亞夫事君翻有懷於鬱怏又與前國子祭酒劉秩前京兆少尹嚴武等潛為交結輕肆言談有朋黨不公之言違臣子奉上之體何以儀刑王國訓導儲闈但以嘗踐台司未忍致之於理況秩武遽更相尚同務虛求不議典章何成沮勸宜從貶秩俾守外藩琯可邠州刺史秩可閬州刺史武可巴州刺史散官封如故並即馳驛赴任庶各增修朕自臨御寰區薦延多士常思聿求賢哲共致雍熙深嫉比周之徒虛偽成俗今茲所譴實屬其辜猶以琯等妄自標持假延浮稱雖周行且悉恐流俗多疑所以事必縷言蓋欲人知不濫凡百卿士宜悉朕懷我國家卜代悠久歷數無疆明神降休靈貺斯格昌符兆發寶印呈祥皇帝之徽號既彰天子之鴻名又信斯實纍聖致感上元垂裕豈朕薄德所敢當仁卿國之大臣獲斯嘉瑞光我盛禮何慶如之錢貨之興其來久矣代有沿革時為重輕周興九府實啓流泉之利漢造五銖亦宏改鑄之法必令小大兼適母子相權事有益於公私理宜循於通變但以干戈未息帑藏猶虛卜式獻助軍之誠宏羊興富國之算靜言立法諒在便人御史中丞第五琦奏請改錢以一當十別為新鑄不廢舊錢冀實三官之資用收十倍之利所謂於人不擾從古有經宜聽於諸監別鑄一當十錢文曰乾元重寶其開元通寶者依舊行用所請採鑄捉搦處置即條件聞奏故越州千秋觀道士賀知章器識夷淡襟懷和雅神清志逸學富才雄挺會稽之美箭蘊崑岡之良玉故飛名仙省侍講龍樓常靜默以養間因談諧而諷諫以暮齒辭祿再見款誠願追二老之蹤克遂四明之客允叶初志脫落朝衣駕青牛而不還狎白衣而長往丹壑非昔人琴兩亡惟舊之懷有深追悼宜加縟禮式展哀榮可贈禮部尚書古之聖王臨御天下莫不務農敦本寶儉為先蓋用勤身率下也屬東耕啓爰事藉田將欲勸彼蒸人所以執茲耒耜如聞有司所造農器妄加雕飾殊匪典章況紺轅縹軛固前王有制崇奢尚靡諒為國所疵靜言思之良用歎息豈朕法堯舜重茅茨之意邪其所造雕飾者宜停仍令有司依農用常式即別改造庶萬方黎獻知朕意焉時屬艱難用勤師旅元帥之任必藉廟謀苟非人傑孰允斯寄司徒兼中書令朔方節度副大使子儀風雲有感星象降生秉文武之姿懷經濟之器自凶狂搆禍區宇未寧蘊忠貞以立身資義勇而成務加其識度宏遠謀略沖深張飛乃萬人之敵郤縠是三軍之帥故能掃清強寇收復二京建茲大勳成我王業雖少康嗣位夏靡贊其功光武中興鄧禹集其事以今觀古未足多之但以氛祲未清軍戎是急爰求碩德仗以師貞宜承重委克濟多難可充東京畿及山南東道并河南諸道元帥仍權知東京留守古之哲王臨御區夏莫不好生慎罰以理人命故易稱緩死書貴恤刑所以樂時布和奉天育物者也朕恭守丕緒祗膺皇極順時調氣庶欽若於元樞旰食宵衣每憂勤於黃屋頃自獻春之後膏液稍愆言念人時或稽政本雖離畢之應未獲滂沱而滋萌之漸亦頻霑沐是用申茲渥澤助彼發生宜崇寬大之典俾達陽和之氣其天下應合死罪特降從流流巳下罪放免其事緣反逆造偽頭首情狀難容者所司詳議聞奏其流移左降該恩合量移者宜令所司即類例處分朕為人父母義當亭育時有或愆於令物有不遂其生敢懷自逸之志實受在豫之責但以凶徒尚阻戎旅多虞致使黎庶不堪徭役未息雖國家之事休戚當同而君父之誠寧忘愧惻況春農在田事方興百姓之間固須優恤天下州縣應欠租庸課稅傳馬粟貸糧種子糴糶變稅及營田少作諸色勾徵納未足者一切放免其正義等倉及諸色攤徵亦宜準此其至德二載十二月三十日巳前和糴和市并負欠官物及諸色官錢欠利常平義倉欠負五色一切放免州縣百姓頃屬軍興戶口之間不無流散宜令州縣長官審加勘責且立簿書據見在戶徵課稅其逃亡者別立文案設法招輯終年類例以為褒貶如勘責虛望所繇官長並節級科貶其所繇典正等先決六十仍罰效力其百姓先逃散即能還者並每季申省給復三年其逃戶有田宅邸店堪充課稅者宜令所繇即為租賃不得因茲妄有欺隱主到即郤令分付比者不急之務尋己詔停如聞所司未全減省載求人瘼實切朕懷固當革弊息人勵精為理自今巳後內外不得別有徵求妄為進奉諸色人力役造作非軍國灼然要急及諸色率稅亦一切並停太常寺音聲除禮用雅樂外並教坊音聲人等並仰所司疏理使敦生業非祠祭大祀及宴蕃客更不得輒有追呼其內將作少監及諸供司丁匠等各仰長官逐要量留餘者並委御史臺專加糾察如有違犯具録奏彈宣示中外令知朕意朕聞古者皇王乘時致理莫不上稽天象下順人心所以革弊移風推誠布化也朕自纂膺鴻業再復寰區何嘗不勤己勵精兢兢業業一物失所爰軫納隍之憂四方未寧深懷馭朽之懼頃雖沿革之令隨事每下而弛張之要未得其宜遂使人瘼尚繁寇虞猶梗有乖政本諒在朕躬用懷酌損之儀庶叶維新之典自今巳後常膳及服御等物悉從節減周身之外一切並停武德中尚作等坊除造賞物賜蕃客將士器物及軍戎祠祭所要餘並停刑獄之典以理人命死無再生之路法有哀矜之門是以訟必有孚刑期不用周窮五聽天下所以無寃漢約三章萬人以之胥悅言念欽恤用諧不變自今巳後諸色律令殺人反逆姦盜及造偽十惡外自餘煩冗一切刪除仍委中書門下與刑部大理法官共詳定具件奏聞百姓之間務在優恤前詔巳有處置訖其或事妨於政法害於人尚有因循理資改革前後詔命非不丁寧至於頒行多有掩蔽蓋緣賞罰未著所以恩信或稽自今巳後如有姦吏弄法割剝黎元因公徇私害物傷政委御史臺訪察具狀彈奏當議刑章比緣軍國務殷或宣口敕處分諸色取索及決配囚徒雖務從權實為亂政自今巳後一切並停如非正宣並不得行用中外諸務各歸有司英武軍虞及六軍諸使諸司等比來或因論竟即行追攝既紊綱紀復擾氓黎自今巳後一切須經臺府如所繇處斷不平即任具狀奏聞京城諸色所繇先緣與逆賊追捕比今招捉矜其迫脅一切並放其受賊偽官人莊宅不合收納者一切並還如有巳將借賜即準估量還價直仍委所繇勘會處分賞罰二柄國之大綱令在必行人則無濫自今巳後朝廷及軍府疇庸議罪宜各精詳如舉或因情事有不當所繇長吏必置嚴典王師所往為人除害必使秋毫不犯信義俱明如聞比者諸軍有乖於此或干戈之下殺戮無辜或營壘所經恣行暴虐乃貽怨毒豈曰安人自今巳後各委本將嚴加訓誓明申賞罰儻師徒不攪則凶醜自平如有違犯悉從軍令其御史臺所欲彈事不須更進狀仍服豸冠所被彈劾有稱讎嫌者皆冀遷延以求苟免但所舉當罪則讎亦不嫌如憲官不舉所職降資出臺儻涉阿容仍重貶責今殘妖未殄國步猶艱共體至公以康庶政朕推誠御物與衆共之四海之人皆朕耳目則何功不就何化不成思與蒼生臻夫至道下詔之後百司及諸州府事有非便文有不該仰各條件奏聞即當釐革宣示中外知朕意焉昔公卿面諫載在册令僕陛奏亦惟舊章所以下竭其忠上聞其過君臣同德豈不盛歟公卿巳下有能論時政之非針朕躬之闕有益於國有利於人宜盡昌言以救時弊朕必當行終無諱者朝廷用一人擢一職或有不當亦任奏論京文武五品巳上正員清資官各舉賢良方正直言極諫一人任自封進兩省官十日一上封事直論得失無假文言冀成殿最用存沮勸
