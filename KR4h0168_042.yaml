front:
  text: 全唐文欽定全唐文卷四十二帝諱亨元宗第三子景雲二年生初名嗣升先天元年封陝王開元十五年徙封忠王改名浚又改名璵二十六年六月册為皇太子改名紹天寶三載改今名十五載七月即位於靈武郡至德三載正月上皇册帝尊號曰光天文武大聖孝感皇帝乾元二年正月上尊號乾元大聖光天文武孝感皇帝在位七年年五十二諡曰文明武德大聖大宣孝皇帝廟號肅宗
