front:
  text: 全唐文欽定全唐文卷三百八十七獨孤及四
  hash: sha256:e0c28cf7d91c56675f62bc7b3c22c5296a7e40445d26f3dd7524863f31128fec
body:
  text: 往歲兄之尉匡德刑成禮義舉粃政杜紊綱緝人曰蒞民如此其達必大十四年春王正月再命於元城元城地雄人悍土壤賦錯處宋衛中山燕齊趙魏之都會三川輻湊四術轂擊兄方以德舉吏此大邦則千里之迹兆於是矣彼徒勞者其鶱翥之濫觴乎歲物已春泰山日緑亦既選吉駕言徂東豈不知常棣之詩廢則和樂之好缺盍使伯氏仲氏偕詠歌之以贈行邁冉駹不庭三年矣王師戒嚴將問罪荒服於是上將分職慎選乃僚以許公有持斧舊名斷犀餘地故授以戎政俾發卒於東夫三河之人豪全齊之人武荊吳之人悍藉其餘勇可以盡敵信以致之繄公是賴然則諭王命敦師律度程以料民徵騎以濟衆歌事以遣役輯謀以定功在是行乎高天晚秋殺氣動地靡靡歧路悠悠斾旌送離如之何賦小戎以為好先是先清明一日右金吾倉曹薛華陳嘉肴釃清酤會河東裴冀滎陽鄭裒河南獨孤及於署之公堂引滿舉白自午及子促席於花陰賦詩於月波樂極不醉夜艾而罷後清明三日二三子春服成思欲修好尋盟選勝卜晝裴侯是以再有投轄之會是會也鄭不至吾兄惠然而來堂有琴庭有篠芳草數步落花滿席中和子冠烏紗帽相與箕踞嗢噱傲睨相視稱觴乎其間趣在酒中判為酩酊之客家本秦也能無嗚嗚之聲其詩云上天垂光兮熙豫以青春今日何日兮共此良辰與君觥濁酒而藉落英兮如年華之相親蹇淹留以醉止孰云含意而未申歌數闋裴側辨慢罵曰百年歡會鮮於別離開口大笑幾日及此日新無已今又成昔不紀而賦之如春風何其演為連珠以志此會夏五月小暑至矣吾兄方幕夜天掃月榭有酒如乳醑我乎城隅城臨近山俯瞰平隰秦郊漢苑相錯如繡且有皓氣足以娛人故數君子稱觴焉其誰同之有若功曹隴西李華參軍滎陽鄭洵琅琊王休河東裴貺鄭尉京兆韋造皆卿材也聲同而形骸相忘道契故機事不入是以有高會遠望危言浩歌或心愜清機寓興於物或語及陳迹盱衡而笑於是初筵而惠好修中飲而意氣接既醉而是非遣夫彭澤採菊隱侯臨風謂之盛矣况高城古臺深夜朗月芳樽良友佳景勝事今夕何夕八者俱并盍亦皆賦於此乎觀二三子之志黃盧子滅景上漢千歲矣留碧峯白雲以貽後世故清機勝事未始有極余吏於華之明年道侶裴冀亦再命為臨汝令夏六月假道敝邑稅鞅此山思欲追高步詣真境於是相與攜手及二三友生童子將命者六七人挈長瓢荷大壺以濁醪素琴會於黃神之谷興也桉谷之西頂實三峯東面石壁叢倚朿為洞壑乳竇潛泄噴成盤渦兩崖合鬬若與天接二三子將極其登探也至則繫馬山足披榛石門入自洞口至於梯路踏連嶂與謺崿度嶇嶔而躡凌兢夤緣絶磴及橫嶺而止澡身乎飛泉濯纓乎清漣想夫君俟我於花峯下碧空而嬋娟愛而不見搔首空山然後靡靈草以為席傾流霞而相勸楚歌徐動沂詠亦發清商激於琴韻白雲起於筆鋒是日也高興盡而世緒遣幽情形而神機王頽然覺形骸六藏悉為外物天地萬有無非秋毫亦既醉止則皆足言以志仙跡且旌吾友嘉會之在山也方今內有夔龍皋伊以佐百揆外有方叔召虎以守四海江海之人高枕無事則琴壺以宴朋友嘯歌以展霞月吾黨之職也吾是以有今茲虎邱之會巖巖虎邱奠吳西門崒然如香樓金道自下方而踊鎖丹霞白雲於蓮宮之內會之日和氣滿谷陽春逼人巖烟掃除肅若有待余與夫不亂行於鷗鳥者銜流霞之杯而㣥嬉乎其中笑向碧潭與松石道舊兕觥既發賓主醉止狂歌送酒坐者皆和吳趨數奏雲去日沒梵天月白萬里如練松蔭依依狀若留客於斯時也撫雲山為我輩視竹帛如草芥頽然樂極衆慮皆遣於是奮髯屢舞而歎今夕何夕同者八人醉罷皆賦以為此山故事二公以大司馬之命領浙河東西十有三州之政相與周爰咨度平均邦賦者三月矣當割而遊刃無間臨機而舍拔則獲由是在薄領之際無江海而閒冬十月辛未徵會於此堂宴朋友故舊也賢豪畢會升降有序逢衣淺帶十有五人聲同故窮達不間意得而鄙吝皆遣肴芳酒濃夜寂琴暢慷慨言志絡繹舉白盱衡抵掌啞啞大笑三爵耳熱萬念如洗不復計名身之親疏憂患之去來也况他纍乎既醉余以箸擊唾壺扣商而歌其詞曰簿領日盈機知君傲煩囂飲和自忘渴况以初筵招道契跡自親誰為列宿遙何用結同心緑琴復長瓢日月若走馬炎涼催斗杓一年解頤笑幾日如今宵奉君千金壽莫使歲寒凋是日禮成於易歡生於同滯憤積慘彗掃湯沃方今溟海始波世屯未康二公克壯其猷以立事為已任行當自致青雲之上不復與適莽蒼者㣥矣吾儕浮湛其間與風水俱它日或潛泉唳天一離一合雲動雨散然後知今日尊酒未易再得將子無金玉其音姑偕賦以卒貺復周正之年天子以潤州刺史張公林本集作休為豫章太守豫章之人既庶且富部從事縣大夫缺而不補先以檄徵協律於會稽時人皆賀豫章之得賢協律之遭遇君子則曰夫子刃有餘地不啻切玉割小鮮而用其鋩無乃不可乎夫子曰不然蓋其不患秩卑而患已素餐不患國士之不我遇患遇之而不答苟有用我者吾其為執射乎於是舉帆西陵是日于邁然後知大丈夫之感義而不私其身也於越長路江皋暮春沈吟秦山悽愴鏡水豈不知今日斗酒明旦不共顧懷安敗名無勇也怨別傷離非丈夫也苟將申其道而成其務則萬里咫尺少別何有二三子其詠歌之以代雜佩今年春上以富人侯為丞相百揆時敘九州賦錯方欲齊職貢之法崇砥慎之典使六府修九敘成謂尚書吏部郎賀若公貞明直躬特達公器才足以茂功蕆事政足以宏道救物故俾繡衣持斧巡撫江介分王命也公電發神機霜淬智刃其始至也問謠俗省疾苦命司書示年數之上下削郡縣之版圖且為之實其多與寡以差等井賦焉然後勞之來之安之集之俾其有寧宇而族聚以宣天子之宏恩而煦之於是乎民之樂矣如饑者之得以食也寒者之獲以纊也乃使苞茅之貢必敘而杼軸之詩亦不作冬十一月爰命郡吏致事言旋於京師且將捧府檄於南陔侍版輿以西上事有成而功不伐以是覲揚天子以盡考績之事禮也夫其由家以及於國資事親以事君甘旨之未遑勤於王家奔走之不暇以顯親身斯真能奉慈訓不廢陳力將君命不違色養忠孝之大者又人子人臣之所難及也而况奸宄已弭干戈將戢天子方以律令章程責成三府然則操六轡驟四駱周爰咨詢以成天下之務在是行乎翰飛方騁瞻望何及唯獻酬東閣弻成大猷使蒸人粒海水靜農夫高枕及亦預焉凡執手於路者請偕賦鴻雁取之子于征劬勞于野爰及矜人哀此魚衆寡以為善頌曩子之尉於是邦也傲其跡而峻其政能使綱不紊吏不欺夫跡傲則合不苟政峻則物忤故績未書也而謗及之臧倉之徒得騁其媒孽子於是竟謫為南巴尉而吾子直為已任慍不見色於其胸臆未嘗蠆芥會同譴有叩閽者天子命憲府雜鞫且廷辨其濫故有後命俾除館豫章俟條奏也是月也艤船吳門將涉江而西夫行止者時得喪者機飛不摶不高矢不激不遠何用知南巴之不為大來之機括乎由圖南而致九萬吾惟子之望但春水方生孤舟鳥逝青山芳草奈遠別何同乎道者盍偕賦詩以貺吾子松梓楩楠茂於深山不能逃匠石之顧賢士君子晦其言跡不能使人不已知其勢然也之子言忠信行篤敬以文雅麗則括而羽之而世皆觀頤我獨儉德吾固知長風六翮必有時而去及御史大夫李公之命介也辟書四下果以嗣宗為首歲二月載驟四駱脂車而東閩中者左溟海右百越嶺外峭峻風俗剽悍歲比饑饉民方札瘥非威非懷莫可綏也議者共謂君匡戎幕以義佐師律以禮報國士以直道罷人以德使安危懸於指掌勝負決於談笑則咨謀之道宏矣豈椎髻殊俗覆車畏途足為志士之木惕哉凡吾與之出祖者亦既偕賦之薛侯敦於詩固於學敏於行時然後言言而寡尤口弗言祿祿亦不及識其真者以為永歎而薛侯居之淡如君子哉若人也方以城市鄙於邱壑倦游不如嘉遁是月也拂纓上之塵西游廬山山上有峰頂大林下有東林西林化成遺愛六寺惠遠道生二公昔嘗眷戀於斯焉履痕屐齒遍滿崖谷神期肸蠁恆若對面之子之往獲心契矣苟藏器於身時行則行大之將來隱顯一致彼安貞者其或為利涉之樞機乎趙補闕驊王侍御定張評事有略各以文為貺記行邁之所以然余亦持片言用代疏麻瑤華之贈太尉臨淮王之秉旄淮沂也天子命公為介洎臨淮薨而相國太原公繼授兵符盡護東夏諸將亦表公參成周軍事如初命故事登掖垣者不驅傳居諫臣者不就辟將使其能必易其秩故自左補闕為尚書郎元年仲春始以使節赴洛陽經大盜虔劉之餘頑民雖遷汙俗未返三軍之心注於帥帥之耳目屬於參佐以公貞諒文敏能恤大事且成宣之後也故以部從事咨焉夫民殘則訛訛則流禁流莫若以德兵不戢則玩玩則暴禁暴莫若以信建信與德以為幕中之畫繄吾子是冀將賀不暇別於何有我飲餞者姑以詩代路車乘馬右扶風之地枕跨隴蜀扼秦西門帝命司徒為唐方叔開府之日搜賢自二於是孫侯以監察御史領司徒掾夫子卿族也用文學纘緒而兄弟皆材伯曰宿以秋官郎辟丞相府仲曰絳拾遺君前及余為寮夫子則以貞幹肅恪之能入主方書出佐戎政花萼灼於三臺時人榮之二月丙午乘傳詣部人謂扶風於是乎有三幸獲白額而南山有採藜藿者一幸也先是司徒於南山擒賊帥高玉今夫操兵者如虎而司徒仁而愛人二幸也其府君則賢其幕府多士而孫侯懿之以文德三幸也恪於德以臨事度於義以從政力於忠以成績吾子勉之其蔑不濟矣士為知已者用豈干榮乎請居者歌之子其行乎君子贈人以言亦以是也可以排天下細故使憂吝不作莫聖於酒况與同志者共之復遇司烜出火勾芒宣氣天地氤氳熙我以春乎是日也卉木羅其庭除柔嘉充於圓方言必遺纍笑必造適故談話不及朝市跡無町畦事不機括故和樂不恃笙磬主人有才子四人侍酌於前臺下有南山倚庭碧草芊芊溝塍圃畦如龍鱗龜甲芳樹繡布白花雪下於是一觴解顏再觴解憂三觴忘形而傲隨之商絃數奏牆陰移而坐客醉手持濁醪笑向朗月夫以世道之多故年歲之不吾與也若憂患歡樂衆寡之不侔苟來者猶可追無亦顧隙間之駟以樽酒買笑余敢惜費貽青春羞凡今日之娛莫我若也吾乃今日視薄游空名如爭蝸角又何用知接輿伯夷不遇於杜康乎顧謂滿座展詩以贈亦命夫四子者志之今歲皇帝擇可以守四方之臣分命大司徒涼公作蕃汧陽平秩西夏涼公季弟曰抱真敬事好學仁勇忠信凡仁則不偷勇則不撓忠則能宣力信則人任焉故天子器之方倚以胥附使宅高平綏厥有衆董次將之任且以柱後惠文冠冠之詔下之日軍府胥悅蓋蕭何守關中舉宗詣軍而涼公荷方召之寄亦以愛弟居東旅於行間忠之大者夫高平上黨之地當趙魏燕代潞之咽喉太行恆山為之襟帶公居有專城之任行有亞旅之職其略足以固其封疆其惠足以柔其民人勗哉夫子進吾往也伯兮仲兮執兵之要謹身以肥家自家以刑國高平之政可以未行而窺矣彼瞻望佇立壯夫恥之非歌詩莫足以贈元年夏相國涼公將城汧陽百里二城即戎於境先命從事兵部郎中安平梁公鎮如京師請王命且料民以調兵食五月甲戌至自雍危冠上前手畫地圖以兵機軍儲屈指而條奏上甚悅事下三府六月庚戌以璽書還雍改轅而西既犯軷於是有追而送之者皆賦以美夫使臣將命而往者不辱命而又專對以直君遣使臣以禮詩之所由作也且公亦嘗郎中宰昭應矣而昭應之奏績也賦惟均而人惟和及參事於相府相府穆穆今元帥七萃之士萬計以王命伐不庭公章甫其冠縵胡其纓咨諏乎轅門惟慎惟嚴靡不盡乃心布乃謀敷乃心腹腎腸討軍實而申警之咸莫不指臂其宜也手足之捍頭目也戎政所舉蔑不以濟票衛之制勝在我營平之威謀越人子姑佐之固亦整軍經武而為干城之賴者唯王室是獎夫豈徒以一介之末區區乎載驟四駱皇華原隰之謂也歟秋晚䈥徑隴關雪下企豫望吾子以班固之筆札銘崆峒山而還悠悠我思章句以贈之歲次乙已定襄郡王英乂出鎮庸蜀謀亞尹僉曰左司郎成公可溫良而文貞固能幹力足以參大略弻成務既條奏詔曰俞往公朝受命而夕撰日卜十一月癸已出車吉尚書諸曹郎四十有二人歎軒騎將遠故相與載籩豆盞斚刲羊鱠魴修飲餞於肅明觀以為好飲中客有賦蜀道難者公曰士感遇則忘軀臣受命則忘家姑務忠信夷險一致患已不稱於位於行邁乎何有言訖抗手建節即路且以紛帨刀礪侍輕軒而西凡強學以修業積行以取位赴知已不為名適四方不違親卿大夫之孝也吾子其毋忘可移之忠將咨度是務使岷峨其乂苛慝不作天聽自民誰謂蜀遠夫別細故也豈蠆芥乎凡今會同非詩無以道居者之志二公罷東西曹草奏啓事之劇而參軍西南時人或譏朝廷易其大而難其細及以為不然當其天子命將帥以守四方丞相秉金戊為唐南仲擇佐命介宜先才者賢者事孰大焉彼夫采薇出車以遣役勞勤我則異於是受王命者不言勤赴知已者不愴離今日斗酒姑展交好遂以道吾子四方之志亦使滿座歌二公乎往歲司馬宰湖而湖人安輯是德政之孚也大駕東狩之往復也其供帳職辦無不整具因是天子以為能故寵之以兩綬勞勤也今茲佐商增秩也人謂使人任器之道當處司馬以劇而觀其利用司馬曰與其徇名以利人寧勤身以安親况佐郡之逸乎於是五采其衣是日南邁流火戒節寒蟬嘹唳嶢闕白雲片片秋色二三子之感時傷離者斯可以言詩矣別駕昔嘗宰三縣佐四郡未始不以廉直為己任亦未始以廉直衒已名仕有餘力則寄傲於琴趣遠是以曲高意精是以聲全得於心而形於手故非外獎所及當其操絃如操政焉時人知其琴不知其政善而無伐光而不耀故也今也來思上台解榻卿大夫士從之如不及時因觀操縵之妙可以見從政之道是行也吾子其懋修乃德恪警爾位夫亦將抑與不暇求於何有維湯湯郢音明旦將遠廬峯湓水大江間之風景可同而聽不可共由是衆君子賦詩以壯別且曰備折楊皇華之韻用抒他年之相思遠別非難行路難行路非難相逢難始者與吾子會於撫以吾一日長乎子子嘗敦弟兄之好而不吾先自雲搖雨散凡四悲秋而一會面亦既道舊別又繼之斯亦可以愴矣然君子患德之不逮不患人不我知吾子克慎厥身以荷先大夫之覆露賁然將命為邦司直被服文行而鏃礪之揚其家聲吾惟子之望豈行邁與聚散足貽志士之欣戚乎是別也祗以歌咏貺吾子而已公之為潁州也朝廷以不失人為明潁人以得父母為幸公獨以去色養為戚故執事者難之其為公謀者則曰受命忘家公也愛親讓祿私也君子不以私廢公不以孝棄忠况國家方親親賢賢而當潁人傒師長之日可以此時急聞禮而緩君命乎公曰諾然後明日朱兩轓而東竭力致身之誠於是乎全矣方當輯寧疲人襦而袴之宜其大王事而小行役豈徂暑之熱遠道之思與前期之難足攪胸臆賦詩勗別於以持贈秦吳燕宋之別昔人所愴若君子以令德佐王之使臣將命以適四方當用文教柔遠威懷示德則其舉也可以悅其愴也可以遣况吾子家本全趙倦游一紀駟馬以過故鄉足展南枝北風之思買臣歸越相如還邛古今相望是可同轍明日渡滹沱涉桑乾布王澤覽風俗之暇為我問藂臺蒯邱厥狀何似平原樂毅故事存否歸而揚榷用廣異聞夫道別離之志亦緣情之不能已耳儒家者流鮮肯冠獬豸冠者蓋抗節剛奮以排擊為氣使故也今天子以公身衣儒服力儒行行之修可移於官學之精可專對四方是故公任執法之位且使操節以濟大海頒我王度於大荒之外夫新羅嗣王以喪訃且請命於我矣我則歸賵繼好以策命命之實懷遠示德禮之大者夫亦將宏宣王風誕敷微言使雞林塞外一變可至齊魯不然歸公何以不陋九夷之行也蓋行於忠信者無險易拘於王程者無遠近故公受詔之日則遺其身視涉海如蹈陸謂窮髮猶跬步豈鯨怒鼇抃足戒行李凡以詩貺別姑美遣使臣之盛云爾彼徇名者遭時多故乘地高勢便罕不爭先鞭務飛速以誇當代獨吾子以文行裕蠱思不出其位奉籝金之所遺羞地芥而不拾其初以筮仕也典校祕書祕書之職修尉於渭南渭南無粃政歲二月以紛帨觿燧歸覲於洛白華之戀也和氣用事春物滿眼之子于征五綵其服想成皋花合穀洛水大是吾子拜嘉慶問清高之日歟夫克家而家肥策名而名彰居官而居辦孝之大者也則貂蟬羔雁將在子外府姑務遠圖何嗟少別到洛陽為我寄聲謝鳴皋故山抒離如之何詩以贈遠有大道者遺小成之跡抱宏略者非曲士所見公嘗以匪躬之故三入承明時議用舟楫期公者七載矣而猶建隼河壖洗幘江島興貝錦之歎詠跋胡之詩豈不以名至盛德至廣而廈材多節夷道若纇乎今天子受宣室之釐忽思賈誼以謗書之篋先示樂羊且搜元珠俾詣丹闕則巨鱗方縱未可料也雖欲抱黃老之術與赤松子游公器所歸難乎免於圭組矣夏五月弭棹睢渙脂車而西火雲成峯郊草如織誰謂秦遠岐豫望之有以見升赤霄捧白日在此行也謂攀四牡者各賦南山有臺之四章取樂只君子德音是茂以為志云爾侍郎昔為河南督郵河陽令其解龜也東人思其遺美今出入夷險歷二十載而一來廳樹未老佐吏半在公位望章綬輝光城邑觀者榮之而東都主人亦以籩豆盞斚徵會修好之不暇凡萃止十有五日而去去之日主人歎瞻佇之莫及也故又釃酒於此池池上有雙彩艫與竹齊對布賓主位於樽之左右而蘭臺金閨建禮承明之英十有八人序列其次池外有闕塞雙嶺遙作外戶嵩高逶迤數峯當窗伊洛春樹若剌繡布錦仙桃火然顧我則笑於是游眺之不足則舉白以相勸而狂歌送之唱棹鳴榔簫鼓陳乎其間醉中疑三江五湖去人不遠謂千慮萬事無非妄作况少別可以興愴乎但駟馬行塵明日將遠登而無賦謂樽酒何宜歌而詩之且以見追攀者之志揚州牧趙國崔公使其部從事侍御史吳興蔣朝如京師條奏官府之廢置歲月之要會其來也吳楚之衆君子酒而詩之而薛水部辨李司直翰雙為之序以冠篇首既將命趙公拜左僕射蔣侯加尚書郎之位其還也之子日執書卷以言於朝曰始者與數賢別賴斯文故常若在眼今幸而遷秩行車在門明旦離㣥想今日之會亦猶於此而思彼也非置書袖中人謂我何然後西人之舊者皆賦韻道別而鄙夫和之詩大略蓋美蔣侯以才智任職有周爰咨諏之用而將事不墜專對不辱能一其心以佐大府之政政靡小大惟公是謀謀之臧歸於府不知我者則謂我專趙公所以有成坐嘯之論而無慚示樂羊謗書之篋而不疑斯可謂之明矣今也於歸腰曳兩綬然濁涇素滻春水始生秦原青青諸草皆秀可共樂也而又別焉凡我同寮是以有瞻望不及之歎故送遠之志悉形於文以公責左遷於茲逮一周星矣首疾心痗繼日經懷實由南冠尚簪憂所未忘是以幽求人境之外將蕩滌煩慮得諸石橋久之豈無他人不如我志願言卒獲者亦久之殿中御史范陽盧子至監理下國未浹辰而居簡乘暇行鑣載勒致為客數公方駕儐從如林煌煌焉奔走乎虛落延屬乎禪宮矣三登彌高纍息以進而後偕集於橋下徒觀夫挂長虹以飛來凌半霄而勢去下空如豁纎蘿不生上頂平衍惟佳木藂秀不可得而總載也以為本於融結庸可自然資於造化力役不及明矣東極大水北走長安羅郭雉堞如示諸掌大田多稼宜乎有秋㣥山積翠以回合好鳥追飛而下上有是勝賞以是開懷盍賦新詩以紀一時之事也侍御以嘗忝鵷沼潤色鴻業以文司録俾序良游敢復畢辭多慙老敗
