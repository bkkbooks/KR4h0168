front:
  text: 全唐文欽定全唐文卷一百三十五伏伽貝州武城人隋大業末自大理寺史纍補萬年縣法曹武德初上書高祖擢治書侍御史太宗即位賜爵樂安縣男轉民部侍郎拜大理卿出為陝州刺史顯慶三年卒
  hash: sha256:628bf3a553cb6de06cf73ab76d7c812bd49c9604248a5bc3b3d491b5056d71c8
  markers:
  - {type: head, offset: 14, content: 孫伏伽, id: KR4h0168_NFKB_135-h1, level: 1}
body:
  text: 臣聞王言無戲自古格言去食存信傳諸舊典故書云爾無不信朕不食言又論語云一言出口駟不及舌以此而論言之出口不可不慎伏惟陛下光臨區宇覆育㣥生率土之濱誰非臣妾絲綸一發取信萬方使聞之者不疑見之者無惑陛下今月二日發雲雨之制光被黔黎無所閒然公私蒙賴既云常赦不免者皆赦除之此非直赦其有罪亦是與天下斷當許其更新以此言之但是赦後即便無事因何王世充及建德部下赦後始欲遷之此是陛下自違本心欲遣下人若為取則若欲子細推尋逆城之內誰無罪者故書云殲厥渠魁脅從罔治若論渠魁充等為首渠魁尚免脅從何辜且古人云跖狗吠堯蓋非其主在東都城內及建德部下乃有與陛下積小故舊編髮友朋猶尚有人敗後始至者此等豈忘陛下皆云被壅故也以此言之自外疏者竊謂無罪又書云非知之艱行之惟艱上古以來何代無君所以祗稱堯舜之善者何也直由為天子者實難善名難得故也往者天下未平威權須應機而作今四方既定設法須與人共之但法者陛下自作之還須自守之使天下百姓信而畏之今自為無信欲遣兆人若為信畏哉故書云無偏無黨王道蕩蕩無黨無偏王道平平賞罰之行達乎貴賤聖人制法無限親疏如臣愚見世充建德下僞官經赦合免責情欲遷配者請並放之則天下幸甚臣聞千金之子坐不垂堂百金之子立不倚衡以此言之天下之主不可履險乘危明矣臣又聞天子之居也則禁衛九重其動也則出警入蹕此非極尊其居處乃為社稷生靈之大計耳故古人云一人有慶兆人賴之臣竊聞陛下猶自走馬射帖娛樂近臣此乃無禁乘危竊為陛下有所不取也何者一則非光史冊二則未足顯揚又非所以遵養聖躬亦不可以垂範後代此祗是少年諸王之所務豈得既為天子今日猶行之乎陛下雖欲自輕其奈社稷天下何如臣愚見竊謂不可臣聞天子有諍臣雖無道不失其天下父有諍子雖無道不陷於不義故云子不可以不諍於父臣不可以不諍於君以此言之臣之事君猶子之事父故也隋後主所以失天下者何也止為不聞其過當時非無直言之士由君不受諫自謂德盛唐堯功高夏禹窮侈極欲以恣其心天下之士肝腦塗地戶口滅耗盜賊日滋而不覺知者皆由朝臣不敢告之也向使修嚴父之法開直言之路選賢任能賞罰得中人人樂業誰能搖動者乎所以前朝好為變更不師古訓者止為天誘其咎將以開今聖唐也陛下龍舉晉陽天下響應計不旋踵大位遂隆陛下勿以唐得天下之易不知隋失之不難也陛下貴為天子富有天下動則左史書之言則右史書之既為竹帛所拘何可恣情不慎凡有搜狩須順四時既代天理安得非時妄動陛下二十日龍飛二十一日有獻鷂雛者此乃前朝之弊風少年之事務何忽今日行之又聞相國參軍事盧牟子獻琵琶長安縣丞張安道獻弓箭頻蒙賞勞但普天之下莫非王土率土之濱莫非王臣陛下必有所欲何求而不得陛下所少者豈此物哉願陛下察臣愚忠則天下幸甚其二百戲散樂本非正聲有隋之末大見崇用此謂淫風不可不改近者太常官司於人閒借婦女裙襦五百餘具以充散妓之服云擬五月五日於元武門遊戲臣竊思審實損皇猷亦非貽厥孫謀為後代法也故書云無以小怨為無傷而弗去恐從小至於大故也論語云放鄭聲遠佞人又云樂則韶舞以此言之散妓定非功成之樂也如臣愚見請並廢之則天下不勝幸甚其三臣聞性相近而習相遠以其所好相染也故書云與治同道罔弗興與亂同事罔弗亡以此言之興亂斯在所與皇太子及諸王等左右㣥僚不可不擇而任之也如臣愚見但是無義之人及先來無賴家門不能雍睦及好奢華馳獵馭射專作慢遊狗馬聲色歌舞之人不得使親而近之也此等止可悅耳目備驅馳至於拾遺補闕決不能為也臣歷窺往古下觀近代至於子孫不孝兄弟離閒莫不為左右亂之也願陛下妙選賢才以為皇太子僚友如此即克隆磐石永固維城矣子奢蘇州吳人隋大業中直祕書學士武德四年授國子助教貞觀朝官諫議大夫宏文館學士遷國子司業十五年卒臣聞天地之大德曰生遂其生者元后聖人之大寶曰位固其位者上元豈可不對越壇場欽若穹昊雖復舜格文祖周變商俗體淳德而揖讓濟澆道於干戈步驟之迹以殊損益之功斯異誠有之矣至於詔蹕梁父張樂介邱增類帝之封典射牛之禮考績禋燎繼蹤韶夏豈殊道也臣伏見櫟陽縣尉魏禮臣為斷河池縣令崔文康事失情奉敕解任禮臣不伏詣堂上表稱御史阿曲請更推問若一事有虛乞戮都市大理奉敕更為勘當今大理奏禮臣枉御史不阿敕令依其折辨賜以極法伏尋禮臣斷事乖僻止合解免不知甘罪吞聲更復上聞天聽恩敕重問虛實乃確執不移論其愚蔽朝野同忿然陛下君臨萬㝢子愛蒼生一無失所載懷夕惕矜愚泣罪帝王盛事至如禮臣橫訴止當上表不實律有明條今便賜以極刑恐傷過重且死者不可復生斷者不可重續縱欲思愆改謬安可得乎所以矜獄念刑歷代斯重又聞禮臣母氏年齒極高餘生垂迫前途無幾一旦逢此情何可言伏惟陛下日昃忘勞申理冤屈所以四方士庶咸湊闕庭今欲遂殺禮臣悠悠之徒惟言禮臣上表被誅不知愚昧獲死後有欲自理者必懷此懼恐容納之道或有所虧謹以奏聞伏聽敕旨臣子奢言今月十六日陛下出聖旨發德音以起居紀録書帝王臧否前代但藏之史官人主不見今欲親自觀覽用知得失愚以為聖德在躬舉無過事史官所述義歸盡善陛下獨覽起居於事無失若以此法傳示子孫竊有未喻大唐雖七百之祚天命無改至於曾元巳後或非上智但中主庸君飾非護短見時史直辭極陳善惡未必省躬罪巳唯當致怨史官但君上尊嚴臣下卑賤有一於此何地逃刑既不能效朱雲廷折董狐無隱排霜觸電無顧死亡唯應希風順旨全身遠害悠悠千載何以聞乎所以前代不觀蓋為此也其或有未允謹以奏聞伏待刑憲臣謹按漢丞相韋元成奏立五廟諸侯同五劉子駿議開七祖邦君降二鄭司農踵元成之轍王子雍揚國師之波分塗並驅各相師祖咸玩其所習好同惡異遂令歷代祧祀多少參差優劣去取曾無畫一傳稱名位不同禮亦異數易云卑高以陳貴賤位矣豈非別嫌疑慎微遠防陵僭尊君卑佐升降無舛所貴禮者義在茲乎若使天子諸侯俱立五廟便是賤可以同貴臣可以濫主名器無準冠屨同歸禮亦異數義將安設戴記又稱禮有以多為貴者天子七廟諸侯五廟才與子男相埒以多為貴何所表乎愚以為諸侯立高祖以下并太祖五廟一國之貴也天子立高祖以上并太祖七廟四海之尊也降殺以兩禮之正焉前史所謂德厚者流光德薄者流卑此其義也伏惟聖祖在天山陵有日祔祖嚴配大事在斯宜依七廟用崇大禮若親盡之外有王業之所基者如殷之元王周之后稷尊為始祖儻無其例請三昭三穆各置神主太祖一室考而虛位將待七百之祚遞遷方處庶上依晉宋傍愜人情大哉乾元寒暑違而成歲赫矣上聖禪代乘而為道斯則淳源既往弧矢開戡翦之利天下為公揖讓盛皇王之業是知聖無自我不背時以成務仁惟濟物乃當流而義行豈好異哉蓋因世而已矣若乃執契提象繼天理物張八極叶五緯坐元扈遊翠媯受昭華而錫天佩觀榮河而巡溫洛補石於媧皇之世奠山於文命之初殊質文於車服改正朔於寅丑順天地而財成奄㝢縣而光宅斯固神宗與汜水一致文祖將坶野同歸者也隋政悖道區夏殲潰星亡日鬬天瘥地反馭朽無秋駕之術履薄罕春冰之懼竭人力於醉飽輕神器於奕棊玉杯非藜藿之用金柱乃驕淫之靡旌蹕遍天下馳道窮華裔暴師韓濊宿兵遼碣貪石田之地忘金鏡之寶盜騄之乘騖崦山而不息黿鼉之梁泛滄波其無巳五嶽維塵山川咸震大盜負其扃鐍長鯨衝其漏網介胄不能匡其禍衣冠無以靜其亂伊尹去而夏亡辛甲奔而殷滅人怨神怒衆叛親離觸瑟無漢臣之忠夢驂成秦宮之酷於是九畿幅裂竊名假號四方圜視蜂飛蝟結赤眉起劉樊之衆白梃奮陳吳之兵徇趙北而圖王反淮南而稱帝鈎爪鋸牙遞相吞滅茫茫禹迹溝壑無歸蒼蒼彼天何其罔極若乃崇替相襲天地恆其道靈貺所歸三五更其運是以秦人弛御豐沛膺赤帝之符夏道云衰景亳得白狼之瑞殷憂啓聖必將有主撲原靜海上元有屬我皇帝受之皇帝兆出震之靈稟樞電之精開日月之明審正氣之貞潛德而隱凝元姑射之側感而遂通應迹廟堂之上乘龍之夢夙符於神道斷鼇之心早發於靈鑒蘊風雲於藏用納宇宙於胸懷濡足受手救焚是急於是御太一把鈎陳驅天駟回地軸乾行嶽止雷驚麟震得兵鈐於元女吞戎韜於黃石龍飛晉水鳳翥河干命蒼兕以泛流麾鳥旗以長邁以仁為本扶義而西傳檄百城轉鬬千里戰無交兵之虜攻無湯池之固望鳳墟而一息登灞上而回首觀釁而動俟天休命壺漿溢陌厥篚盈塗鬼神叶贊華夷載佇緤秦嬰於枳道拜殷士於商郊璇臺之珠畢散於邦國諸侯之王不留於服御眷言兆庶企景來蘇薛舉往因天隙偷安隴坻藉九州之險成五幡之暴推鋒東嚮結壘西夏同惡如市轉相煽合帶州連郡豺虺為㣥無竇融之先覺有隗囂之迷謬遊魂放命豕突豳梁雖大風之作梗青邱有苗之稱亂丹浦均強比逆異代同年豈不以道喪鶉居讓王義隱時惟龍戰爭帝理開者乎是以軒轅五十一伐殷后二十七征翦暴壽華之澤戮凶絶轡之野非文德之可綏乃雄略之攸震天子躬御武節親總元戎灑沉災而括地象正斗極而清天步倚長劒以肅威佇中區以傍矚運投水轉規之智蓄禮樂慈愛之兵韜百戰百勝之謀總天關天梁之險驅駕韓白鞭擊雷電命招搖以啓行詔參伐以前掃殉義之士聽鼓鞞而竊誓蹈恩之衆望旌笳而張膽呼吸則河海沸蕩指麾則崑岱掎拔承聖上順天道好生之德體周王掩胔之仁將欲克亂在權善師非戰兵交使在宏其自革而茅旌不建輿櫬莫從告捨既違行迷遂往吠堯之犬終成桀用刺由之客俱為跖徒鳥啄獸窮來犯鋒刃比角為城池之固召雨恣屈強之力非折箠之可笞豈亭長之攸制於時攝提在歲黃鍾紀月義勇同奮賁育爭先下神兵於九天決睿圖於萬里逆順斯懸轟然大潰僵尸蔽莽委甲成山擁秦涇而不流投過㵎而自滿焚巢掃窟野無遺寇正傾旻於西北紐闕地於東南卷氛祲於辰象反光華於日月九伐已施載櫜於武庫五兵罷用偃伯於靈臺分蒨斾於應畢誓山河於將率帝圖咸舉邦正斯澄革汙俗於惟新正王風於舊物鼓之以道德懷之以仁義春雨以潤之秋陽以暴之解網深湯帝之慈焚書下漢皇之詔布以新政刑用輕典四海之內靡然嚮風八荒之表奔走無斁卻塞蹛林之北開郡銅柱之南苑蔥山而池鹽澤踰盤木而跨熱阪鄒生環海自入提封方朔炎州同歸三會豈止菌鶴短狗西鶼東鰈之貢而巳哉若夫至人忘巳義期拯物黃屋非汾水之榮元圭豈具茨之貴聖道運而不積神功為而莫宰雖復大橫固祉長發啓祥猶且置璽陳謙避河為讓道外天下情遺尊極而巖廊餘事人神之望難拒符命儻來歷數之期安避仰遵上元之心俯順域中之請然後履乘石握神珠開黃玉之圖臨紫宸之位冠百王而稱首與三代而同風巍巍乎蕩蕩乎粵不可名也於是衢室闢扉賓門啓路延攬英彥鑒寐幽仄用人不偏於世族得賢無棄於農瑣故非熊非彲致光景之佐為舟為楫獲營求之士等五臣之亮采同六相之訐謨崇臺非一木之支珍裘乃千金之麗濟濟多士皇家以寧重以制禮作樂移風也勝殘去殺刑措也藏書舜嶺菲膳堯宮雉裘非先王之服寶馬豈鸞旗之用運元覽以照物推赤心以期下萬方罪巳軫推溝之慮百姓為心順天從之欲若乃上嗣重光之美元良萬國棣華璿萼之宗本枝百世咸幼陶慈訓言提自昔奉審喻於宸極得樂善於軒殿非藉保傅之勤寧因師友之力踰啓誦而高視越郇韓而上征既而休氣和年祥風薦祉威鳳為寶麟趾遊郊若烟非烟浮曉空而下映似月非月麗宵天而成象禎不絶書靈無遁迹猗歟偉歟事高圖史至於登輿下輦省方巡嶽應感必彰形言彌著道盛金奏每盈玉叶睿思於泉涌諧神功於日用陋柏梁之詞掩南風之曲聖作物覩永貽千載者焉抑又聞之羲農遐邈軒頊悠緬絶傳信於故老非取接於聞見百世可知斯言殆息七代更立求之豈易今之視昔遙然未覩將何以分素青於三后辨天地於九皇遂能歷選列辟詳觀㣥帝得茂實於千古驗英聲於萬葉斯道何哉將由孔某登岱紀金繩者七十管仲對齊陳玉檢者十二亦有漢廓帝圖魏開王業樹豐碑於泗水撰貞石於繁昌莫不垂鴻名騰顯號播休風於六儛歌盛德於九韶與天壤而無窮懸貞明而可久刊勒之美不其懋歟然則事止寰中道流物外未辨西方之聖莫知東被之法求真之理我則未聞雖御辨崆峒非趨涅槃之岸乘雲谷口寧遊波若之門若不同陟耶山俱沉業浪生死無際苦樂相因詎照重昏之日誰翦稠林之樹比夫真如實相解脫妙津道正三千功彌百億何異吹劒首於雷門巢蚊睫於鵬運者哉是知伊蘭無實有為終假漂溺四流邅回九結踐畏塗而卒歲趨捷徑其長往大夢無曉可為歎息粵若能仁深宏慈奬雖寂泊為道無來無去乘機誘發垣璽必追住一子地開方便門翔入正道示如來藏飄香風於有頂灑甘露於無邊慧炬明而幽夜朗法橋構而憑河息但為仁由巳履道自衷表立影從因果非外今我所以仰勝緣於千號紀武功於七德真俗二諦兼而兩之皇上昔居因地早宏誓力應迹忍土荷負㣥生屬憂火燎原稽天方割飇林無自靜之木震海豈澄源之水東戡西翦南征北怨旄鉞所次酣戰茲邦君輕散千金之賞士重酬九死之命莫不競淩鋒鏑爭蹈水火雖制勝之道允歸上略而兵凶戰危時或殞喪褰裳不顧結纓荒野忠為令德沒有餘雄同艱難於昔晨異歡泰於茲日有懷亮烈用切旒扆仍於戰地爰搆神居變穢土於寶城開蓮花於火宅高烽罷照慈燈載朗䳒旌綴警勝幡斯立拔無明於棘林導焦熱於渴井盡諸有結永除苦際雖復去順效逆同歸各徒中涓潁從實惟義重而上忍所被旃檀與利刃兼忘大慈所覃怨賊將義夫齊指俱潤法雨同乘大轅回向菩提無上平等爾乃仰圖景曜東井足廠田坴其分野下料物土西河限其封域雕戈自錫尸臣啓邦之所豳館斯開公劉建都之地梁山南枕甘泉東指面雕雲之鬱蓊想玉樹之青蔥沃野千里平原超忽先王之桑梓西州之都會於是詔司空相原隰四衢如砥八道傍通考極星之曜測土圭之景選梓於南郢徵琬玉於西崑匠石奮斤公輸審墨高門洞啓層甍有亢藻井瞰烟霞之路步櫩拖虹霓之色徘徊珠柱陸離琁題春牖右臨秋窗左闢月殿含影金波上而相照日宮吐曜羲和沉而猶朗何止四柱成臺高多羅之樹五王立寺臨伽尸之水信足上圖駕御傍擬醍醐望鷲山而非遠想雞林而可即法徒萃止應供來遊咸珠戒無缺威儀莫犯錫杖四禪之林攝三塗之路有寶所焉有名僧焉至矣哉伽藍之為盛也雖夫高天巳燼大海成田我皇基與淨剎終永永而長傳其詞曰三界雲擾六趣波揚苦流方割憂火炎岡俱迷津濟莫導舟航長夜無曉非徒未央於昭十號四生是愍道王大千智周上忍慧刀巳裂化城斯引教有殊塗乘無異軫甘露朝灑慈雲夕布品物以亨㣥迷式悟捷徑坦道耶山啓路不有善權誰澄惡趣炎行弛德廢道毀常玉弩驚焰金宿騰芒俯震瀛壑仰紊乾綱九野鯨奮八極鴟張亂離瘼矣孰濟生靈黃星表曜赤伏開禎大君應歷粵御神兵乃聖乃武如雷如霆於鑠王旅除凶靜暴關右長驅唐郊大號壤裂逋醜家離浞奡刷野屠祅空山剿盜見危殞轡懷忠死綏驚燐宵遠窮魂夜飛我有慈被深仁莫違建斯淨域永樹歸依歸依伊何俱消五縛淨域伊何同升妙覺架漢開宇憑霞竦閣木麗瓊丹地嚴金雘鷲山非遠雞林可求七寶低樹八解疏流瑞蓮開曉天花不秋戒定攸息應供來遊凡厥慈衆俱宏上善稠林以闢愛枝爰翦九結冰泮四禪自緬彼岸可歸法輪恆轉金剛不壞璿祚惟長慧識常湛皇基載昌僧祗可算恆沙易量悠哉天歷永配無疆仁師定州安喜人武德初應制舉授管州録事參軍以薦拜右武衛録事參軍貞觀末纍遷中書侍郎參知機務以罪配龔州永徽初授州刺史卒神龍初贈同州刺史自昔羲農以降爰及唐虞或設言而人不犯或畫像而下知禁三代之盛泣辜解網父子兄弟罪不相及咸臻至理俱為稱首及其叔代亂獄滋煩周之季年不勝其弊烈火原於子産峭㵎起於安于韓季申商爭持急刻參夷相坐始於此也秦用其法遂至土崩漢高之務寬大未為盡善文帝之存仁厚仍多涼德遂使新垣族滅信越葅醢見嗤良史謂之過刑晉魏至隋雖有損益凝脂有密秋荼尚煩皇上爰發至仁念茲刑憲酌前王之令典採往哲之嘉猷革弊蠲苛可大可久仍降綸綍頒之九區故得斷獄數手足有措刑清化洽未有不安忽以暴秦酷法為隆周中典乖惻隱之情反惟行之令進退參詳未見其可且父子天屬昆季同氣誅其父子足纍其心此而不顧何愛兄弟既欲改法請更審量敦禮字安上雍州咸陽人武德中官通事舍人貞觀中纍遷兵部尚書永徽時擢侍中封固安縣公進中書令顯慶元年拜太子少師同中書門下三品卒年六十一贈開府儀同三司并州大都督諡曰昭崔子居山閒種松於東岡之上本舒而平培土而密築其殖之也若稚秧之插其憂之也若嬰兒之育戢戢乎黃茅之底眇眇乎蒼岑之麓有客過而嘆曰勤矣子之種松也吾聞天施地生雨露則一草木之長於松為嗇經年僅益於毫末再歲尚湮於蓬棘蓋屢補而莫齊或百枚而得一形如偃蓋兮待千歲之久化為伏龜兮由百歲之積今子施種藝之功竭壅培之力以附土之寸根待干雲於異日不其迂哉余曰噫嘻客之言過矣夫植之微者本必固長之吝者末必榮木有亟茂而先顛物有速蕃而驟零栽桃李者早華種榆柳者易陰柞薪析而愈盛樗槱翦而還生然皆摧折於飛雪之後憔悴於嚴霜之辰隨寒暑以同化與糞壤以俱淪乃若松之茂也幹排風雷根裂崖石鱗蹙百丈髯蒼千尺其柯參天則鸞鳳棲其顛其肪入地則龍蛇伏其窟凜高節兮四時不能易其操建大厦兮萬牛不得輕其力茲豈衆木之凡姿與夫百草之弱質者所能比哉嗚呼在物固然於人亦爾殖德者不貴其苟種學者非圖其易嗇禮義之華實育性情之根柢養其小以成大蓄諸微而至著若曰名以暴集為榮行以速成為貴謂片善為無益以寸長為可棄是猶冀合抱之材而不養其拱把之時望十圍之木而不植於徑寸之際者也淹字執禮司空如晦之叔父隋大業末官御史中丞王世充僭號署為吏部洛陽平太宗引為天策府兵曹參軍文學館學士貞觀初拜御史大夫封安吉郡公判吏部尚書參議朝政二年卒贈尚書右僕射諡曰襄文中子王氏諱通字仲淹其先漢徵君霸潔身不仕高尚鎮天下十八代祖殷仕漢至雲中太守以賢良稱肇家於祁以春秋周易訓授鄉里為子孫資十四代祖述克播前烈著春秋義統公府辟不就九代祖㝢仕晉遭愍懷之難遂東遷焉㝢生罕罕生秀皆以文學顯秀生二子長曰元謨次曰元則元謨以武略升元則以儒術進元則字彥法即文中子六代祖也仕宋歷太僕國子博士以兄用武進常歎曰先君所寶者禮樂先師不學者軍旅兄何為哉遂究心道德博考經籍以為功業不可以小成也故卒為洪儒卿相不可以苟處也故終為博士曰先師之職也不可墜故江左號為王先生受其道者曰王先生業於是始稱儒門世濟厥美矣先生生江州府君煥煥生虬虬始北仕魏太和中至并州刺史創家臨河汾惟曰晉陽穆公穆公生同州刺史彥惟曰同州府君彥生濟州刺史傑惟曰安康獻公安康獻公生銅川府君諱隆字伯高文中子之父也幽識遠悟非禮不動傳先生之業所在教授門徒常千餘人隋開皇初以國子博士待詔雲龍門時國家新有揖讓之事方以恭儉定天下天子常從容謂府君曰朕何如主也府君曰陛下聰明神武得之於天發號施令不盡稽古雖負堯舜之姿終以不學為纍帝默然曰先生朕之陸賈也何以教朕府君承詔著興衰要論七篇每奏帝輒稱善然未甚達也府君始求出補樂昌令尋轉猗氏後遷銅川所在著稱吏人敬愛秩滿退歸遂不仕開皇四年文中子始生銅川府君筮之遇坤之師獻兆於安康獻公公愀然作色曰素王之卦也何為而來地二化為天一上德而居下位能以衆正可以王矣雖有君德非其時也是孫也必能通天下之志而道不行天所命也遂名之曰通開皇九年江東始平銅川府君歎曰吾視王道未有敘也天下何為而一乎文中子侍於側始十歲矣有憂色銅川府君曰小子汝知之乎文中子曰通嘗聞之夫子曰古之為邦有長久之策故夏殷以下數百年四海常一統也後之為邦行苟且之政故魏晉以下數百年九州無定主也夫上失其道民散久矣一彼一此何常之有夫子之歎蓋憂皇綱之不振生人勞於聚斂而天下將亂乎銅川府君異之曰其然乎遂告以元經之事文中子再拜受之十八年春正月銅川府君晏居歌伐木而召文中子子矍然再拜敢問夫子之志何謂也銅川府君曰爾來自天子至庶人未有不資友而成者也在三之義師居一焉道喪巳來斯廢久矣然亦何常之有小子勉旃翔而後集文中子曰請從此行於是始有四方之志矣蓋受書春秋於東海李育學詩於會稽夏琠問禮於河東關子明正樂於北平霍汲考三易之義於族父仲華不解衣者六歲其精志如此仁壽三年文中子蓋冠矣慨然有濟蒼生之心遂西遊長安見隋文帝帝坐太極殿召而見之因奏太平之策十有二焉推帝皇之道雜王霸之略稽之於今驗之於古恢恢乎若運天下於掌上矣帝大悅曰得生幾晚矣天以生賜朕也下其議於公卿公卿不悅時文帝方有蕭牆之釁文中子知謀之不用也作東征之歌而歸歌曰我思國家兮遠遊京畿忽逢帝王兮降禮布衣遂懷古人之心兮將興太平之基時異事變兮志乖願違吁嗟道之不行兮垂翅東歸皇之不斷兮勞身西飛文帝聞而傷之再徵之不至四年文帝崩大業元年一徵又不至辭以疾謂所親曰我周人也家本於祁永嘉之亂蓋東遷焉高祖穆公始仕於魏魏周之際有大功於生人天子錫之地始家於河汾故有墳隴於茲四代矣茲土也其人憂深思遠乃有陶唐氏之遺風焉先君之所懷也且有先人之敝廬在焉家本儉約茅簷土階蕞如也以避風雨道之不行則知之矣捨此欲安之乎不如退而志其道定居萬春鄉之甘澤里乃續詩書正禮樂修元經讃易道蓋有事於述者九年而六經大就門人自遠而至河南董恆太山姚義京兆杜淹趙郡李靖南陽程元扶風竇威河東薛收中山賈瓊清河房元齡巨鹿魏徵太原溫大雅潁川陳叔達等咸稱師北面受王佐之道焉其往來受業者不可勝數蓋將千餘人故隋道衰而文中子之教興於河汾之閒雍雍如也大業十年尚書召署蜀郡司戶不就十一年以著作佐郎國子博士徵並不至十三年江都難作而文中子有疾召薛收而謂之曰吾夢顏子稱孔子之命而登吾階坐於牖下北面援琴而歌曰禮樂既正詩書既成讃明易道聿修元經歸休乎何必永厥齡此殆夫子使回召我也吾必不起矣蓋寢疾七日而終門人薛收姚義等數百人共會議曰吾師其至人乎自仲尼以來未之有也禮云男生有字以昭德也死有諡以易名也夫子生當天下亂昭王不興莫能宗之故退而刪詩書正禮樂修元經纘易道聖人之大旨明矣天下之能事畢矣仲尼既沒文不在茲乎易曰黃裳元吉文在中也請諡曰文中子絲麻設位哀以送之禮畢悉以文中子之書還於王氏蓋禮論二十五篇列為十卷樂論二十篇列為十卷續書一百五十篇列為二十五卷續詩三百六十篇列為十卷元經五十篇列為十五卷贊易七十篇列為十卷並未及行於時遭代喪亂盜賊奔突先夫人用藏其書於竹笥扶老攜幼東西南北未嘗離身焉大唐武德四年天下大定先夫人得返於故居復以書授於其弟凝文中子二子長曰福郊少曰福畤馮字季輔以字行渤海草修人隋末殺賊報讎率衆歸高祖授陟州總管府戶曹參軍貞觀末纍遷中書令兼檢校吏部尚書賜爵草修縣公永徽二年授光祿大夫行侍中兼太子少保卒年五十八贈開府儀同三司荊州都督諡曰憲陛下平定九州富有四海德超邃古道高前烈時巳平矣功巳成矣然而刑典未措者何哉良由謀猷之臣不宏易之政臺閣之吏昧於經遠之道執憲者以深刻為奉公當官者以侵下為益國未有坦平恕之懷副聖明之旨至如設官分職各有司存尚書八座責成斯在王者司契義屬於茲伏願隨方訓誘使各揚其職仍須擢溫厚之人升清潔之吏敦朴素革澆浮先之以敬讓示之以好惡使家識孝慈人知廉恥醜言過行見嗤於鄉閭忘義私昵取擯於親族杜其利欲之心載以清淨之化自然家肥國富氣和物阜禮節於是競興禍亂何由而作竊見聖躬每存節儉而凡諸營繕工徒未息正丁正匠不供驅使和雇和市非無勞費人主所欲何事不成猶願愛其財而勿殫惜其力而勿竭今畿內數州實為邦本地狹人稠耕植不博菽粟雖賤儲蓄未多特宜優矜令得休息強本弱枝自古常事關河之外徭役全少帝京三輔差科非一江南河北彌復優聞須為差等均其勞逸今公主之室封邑足以給資用勳貴之家俸祿足以供器服乃戚戚於儉約汲汲於華侈放息出舉追求什一公侯尚且求利黎庶豈覺其非錐刀必競實由於此有黷朝風謂宜懲革仕以應務代耕外官卑品猶未得祿既離鄉家理必貧匱但妻子之戀賢達猶纍其懷飢寒之切夷惠罕全其行為政之道期於易從若不恤其匱乏唯欲責其清勤凡在末品中庸者多止恐巡察歲去輶軒繼軌不能肅其侵漁何以求其政術今戶口漸殷倉廩巳實斟量給祿使得養親然後督以嚴科責其報效則庶官畢力物議斯允竊見密王元曉等俱是懿親陛下友愛之懷義高古昔分以車服委以藩維須依禮儀以副瞻望比見帝子拜諸叔諸叔亦答拜王爵既同家人有禮豈合如此顛倒昭穆伏願一垂訓誡永循彞則
