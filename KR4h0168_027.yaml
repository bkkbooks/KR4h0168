front:
  text: 全唐文欽定全唐文卷二十七元宗八
  hash: sha256:f0a6f456a935824d687c4e8857cd7b4ccd19b62828fc61b22a9bcc43b5417140
body:
  text: 司牧生人愛之如子眷茲災旱倍切憂勤將理政不明邪冤囚有滯邪癘疵道長邪陰陽氣隔邪何崇朝密雲布未洽也載加寅畏弗敢荒寧誠不動天歎深罪己思從避減以塞愆尤俾月離有期星退何遠朕今避正殿減常膳仍令諸司長官各言時政得失以輔朕之不逮天下見禁囚徒中或以痛自誣者各令長官審加詳覆疑有冤濫隨事案理仍告於社稷備展誠祈諸州旱處有山川能興雲致雨者亦委州縣官長速加禱祀惟刑恤哉古之道也朕撫臨四海茂育兆人思致淳風登之壽域期畫冠而不犯故開羅而在宥念茲下愚自抵常法時屬盛夏天其養生在物最靈惟人為貴朕處臺榭猶有鬱蒸之毒彼居囹圄能無憯怛之憂故令宰臣備加案察省覽所奏用憫於懷爰矜可恕之罪必務惟輕之義將布寬惠俾從原減應合書罪者宜遞降一等論每年十月委當道按察使較量理行殿最從第一等至五等奏聞較考仍使吏部長官總詳覆諸州亦比類定為五等奏聞上等為最下等為殿中間三等以次定優劣改轉日憑為升降縣令每年選舉人內準前條訪擇補置在任有術一任申使狀有兩請兼戶口復業帶上考者選日優與內官其使狀有一請兼帶上考者滿日不限選數聽集優與處分刺史第一等量與京官若要在州未可除改者紫微黃門勘聞奏當加優賞京官不曾任州縣官者不得擬為臺省官吏部銓選委任尤重比雖守職務在循常既限之以選勞或失之於求事選日拔擢一二千人不須限以資次必須究其聲實不得妄相汲引自古鄉舉里選實課人之淑慝其明經進士擢第者每年委州長官訪察行業修謹書判可觀者三選聽集并諸色選人者若有鄉閭無景行及書判全弱選數縱深亦不在選限崇化致理必在得人獎善勸能義資師古皆有煩濫未聞釐革循名責實其道不行為人擇官人蠧猶在既復政理不可因循須加勘以正頽弊古之為國者藏之於人百姓不足君孰與足比者山東邑郡歷年不稔朕為之父母欲安黎庶恤彼貧弊拯其流亡靜而思之非不勤矣今者風雨咸若京坻可望若貸糧地稅庸調正租一時併徵必無辦法河北諸州宜委州縣長官勘責灼然不能支濟者稅租且於本州納餘不須徵却待至春中更別處分有貸糧回簿等亦量事減徵朕以薄德祗膺睿圖曾不能虛己淳源勵精至道將致俗於仁壽思納人於軌訓幸乾坤交泰風雨咸若中外百寮盡知戒懼華夏萬姓頗亦歡康猶恐人或未安政有不愜令外司置匭側門進狀封章論事靡所不達軒階進規於何不盡曾無忤旨之罰實有推心之期豈朕之不誠何人則未諭如聞朝廷之內噂紛然進不昌言退多訕議懸書以謗國僑之患鄧析偽言而辨孔子之誅少正自昔為蠧罔不在茲求於理政固宜懲絶自今巳後制敕有不便於時及除授有不稱於職或內懷姦忒外損公私並聽進狀具陳得失五品巳上官乃許其廷爭若輕肆口語潛行誹謗委御史大夫巳下嚴加察訪狀涉疑似推勘奏聞朕祗膺鴻圖嗣守丕業何曾不馭朽增惕納隍在慮六合之內每勤砥綏五刑之屬尤用欽慎然書多窒惕之訟圜扉有幽滯之人淹恤逾時羈縲相對頗異哀矜之義實慚恢踈之網雖刑政之典彼則自貽而在豫之責終以多愧其大理禁囚前令詳覆者宜按所犯輕者並放重降一等仍依令式處分越巂之地髳羌犯邊孤我大恩敢為小寇雖螳螂舉斧自開屠滅之辰而蜂蠆有毒仍藉討除之勢右騎衛將軍員外置同正員李元通負衛霍之才蘊孫吳之法決勝千里成誦在心通知四夷若指諸掌故能聞敵思勇好謀而成宜發戎瀘夔巴梁鳳等州羌兵三萬人馬二千匹并舊屯兵士赴州討擊賊縱退散亦須窮其巢穴杜絶飛走使無遺類在此舉焉如聞江淮南諸州大蟲殺人村野百姓頗廢生業行路之人常遭死失州縣不以為事遂令猛獸滋多泗州漣水縣令李全確前任宣州秋浦縣令界內先多此獸全確作法遮捕掃除略盡迄今人得夜行百姓實賴其力宜令全確馳驛往淮南大蟲為害州縣指授其教與州縣長官同除其害緣官路兩邊去道各十步草木常令芟伐使行人往來得以防備夫為令者自近而及遠刑罰者先親而後疏長孫昕楊仙玉等憑持戚屬恣行凶險輕侮常憲損辱大臣情特難容故令斬決今㣥官等纍陳表疏故有陳請以陽和之節非肅殺之時援引古今詞義深懇朕志雖從諫情亦惜法宜寬異門之罰從聽枯木之斃即宜決殺以謝百寮彰施服色分別貴賤苟容僭濫有乖儀式如聞內外官絶無著碧者皆詐著緑以為常事又軍將在陳賞借緋紫本是從戎缺胯之服一得以後遂別著長袍遞相倣效又入蕃使等別敕借緋紫者使回合停或有便著曾無愧恥憲司不能舉劾遂令此弊滋甚自今巳後衙內宜專定殿中侍御史本司官長並量事貶降選人既多比銓注過謝了皆不及考遂使每一年選人即虛破一年在於公私俱不便利自今巳後官人初上年宜聽通計年終巳來滿二百日許其成考仍進遷考例至來年考時併較永為常式朕先使人取少雜鳥其使不識朕意採鳥稍多卿具奏其事辭誠忠懇深稱朕意卿達識周材義方敬直故輟綱轄之重委以方面之權果能間邪存誠守節彌固骨鯁忠烈遇事無隱言念忠讜深用嘉慰使人朕巳量事決罰禽鳥並令放訖今賜卿物四十段用答至言今年蝗蟲暴起乃是孳生所繇官司不早除遏任蟲成長間食田苗不恤人災自為身計向若信其拘忌不有指麾則山東田苗掃地俱盡使人等至彼催督其中猶有推託以此當委官員責實若有勤勞用命保護田苗須有褒貶以明得失前後使人等審定功過各具所繇州縣長官等姓名聞此蟲若不盡除今年還更生子委使人分州縣會計勿使遺類關中田苗令正成熟若不收刈便恐飄零緣頓差科時日尚遠宜令併功收拾不得妄有科喚致妨農業仍令左右御史檢察奏聞撫字之道在於縣令不許出使多不得上考每年選補皆不就此官若不優矜何以勸獎其縣令在任戶口增益界內豐稔清勤著稱賦役均平者先與上考不在當州考額之限也故銀青光祿大夫檢校黃門監上柱國漁陽縣開國伯贈荊州都督盧懷慎衣冠重望廊廟周材訏謨當三傑之一學行總四科之二等平勃之輔漢同季文之相魯質鄰於古儉實可師雖清白燕翼籯金非寶然妻孥貧窶擔石屢空言念平昔彌深軫悼宜恤淩統之孤用旌晏嬰之德可賜其家物一百段米粟二百石比來兩畿縣令經一兩考即改其行苟且罕在政要百姓弊於迎送典吏因而隱欺自今以後皆令四考滿滿日聽依京官例選仍不得輒續於前勞如聞兩京間驛家緣使命極繁其中多有妄索供給宜令御史劉升往南北兩路察隨事奏聞朕聞舞干戚者所以懷荒遠固城池者所以款戎夷國家往有營州茲為虜障此北狄不敢窺覘東藩由其輯睦者久矣自趙文翽失於鎮靜部落因此攜離頗見負塗之睽旋聞改邑之歎高墉填塹故里為墟言念於此每思開復奚饒樂郡王李大酺賜婚來朝巳納呼韓之拜契丹松漠郡王李失活遣子入侍彌嘉禾它侯之節咸申懇請朕所難違宜恢遠圖用光舊業其營州都督府宜依舊於柳州置管內州縣鎮戍等並準舊額太子詹事薑師度貝州刺史宋慶禮左饒衛大將軍兼營田都督邵宏鄭州刺史劉嘉言屯田員外郎遊子騫等並貞以幹事恪勤在公爰精衆官之選任以一方之役師度可充營田支度及修築使遊子騫為副宏可兼充燕郡經略鎮副使仍兼知修築使事應須人夫糧等一物巳上依別敕處分有司仍速支配師度等並馳驛發遣伊昔明王奉若天道所寶惟穀所使惟賢故能務穡勸農興利除害朕以薄德纂承洪緒政期克己誠不動天頃歲河南河北諸州蝗蟲為患雖當道遣使除瘞恐今又生育天戒若此朕甚懼焉罪實在豫殃豈移歲且牧宰之任朝廷所委苟得良材式敷惠訓古有壽張飛逝中牟不入者斯其效也刺史縣令等當各竭乃心用攘厥患方考休咎大明黜陟惟爾凡百可不勉哉宜令戶部郎中蔡容往河北道侍御史崔喬往河南道觀察風俗問利害便與州縣籌度隨事處置還日奏聞朕以寡薄忝膺大位嘗恨元風久替淳化未升每用翹想遺賢冀聞上皇之訓以卿黃中通理鉤深詣微窮太一之道踐中庸之德確乎高尚足侔古人故比下徵書佇諧善績而每輒託辭拒違不至使朕虛心引領於今數年雖得素履幽人之貞而失考父滋恭之命豈朝廷之政與生殊趨耶將縱欲山林往而不能返乎禮有大倫君臣之義不可廢也今城闕密邇不足為勞便敕齎束帛之貺重宣斯旨想有以翻然易節副朕意焉朕居萬人之上以百姓為心常恐有冤不申有理見滯憂勤庶績宵旰興懷且六官分事四方取則尚書郎皆是妙選須稱其職焉可尸祿悠悠曾無決斷昨者試令詢問遂有如此稽逋動即經年是何道理至如行判程限素編令式今便準法科責乃是尋常但為積習寬踈欲得申明告諭自今巳後各宜懲革若有犯者別當處分王者制五服綏四方申畫郊畿慎固封守是乃選徒興役禦寇備邊欽若前載率繇茲道朕以薄德紹膺丕運奉天明命為人父母永隔綏養鑒寐以之每念征戍良可矜者其有涉河渡磧冒險乘危多歷年所遠辭親愛壯齡應募華首未歸眷此勞止期於折衷但磧西諸鎮道阻且長數有替易難於煩擾其鎮兵宜以四年為限散之州縣務取富戶丁多差遣後量免戶納雜科稅其諸軍鎮兵近日遞加年限者各依舊以三年二年為限仍不得延留其情願留鎮者即稍加賜物得代願往聽令復行為貴勞逸且均公私咸適宣布遐邇識朕意焉故東平王外孫正議大夫復州司馬楊元嗣第七女譽叶才明體光柔順葭莩懿戚敦睦有倫舜華靡頽德容兼茂屬賢王慕義於以賜親納采問名茲焉逮吉宜升外館之寵俾耀邊城之地可封永樂縣主出降契丹松漠郡王李失活婚之夜遣諸親高品及兩蕃太守領觀花燭古之操皇綱執大象者何嘗不上稽天道下順人極或變通以隨時爰損益以成務且衢室創制度堂以筵因之以禮神是光孝德用之以布政蓋稱視朔先王所以厚人倫感天地者也少陽有位上帝斯歆此則神貴於不黷禮殷於至敬今之明堂俯鄰宮掖比之嚴祀有異肅恭苟非憲章將何軌物由是禮官博士公卿大夫廣參㣥議欽若前古宜存路寢之式用罷辟雍之號可改為乾元殿每臨御宜依正殿禮分命督將保寧疆場且變無知之俗長為不叛之臣必也仁明在乎清整若脂膏不潤豪髮無欺開懷納戎張袖延狄彼當愛官吏猶父母安國家如天地欲其亡散庸可得乎若其心不公所視唯利放縱部曲阿容子弟此乃求鷹鸇以馴乳使豺狼以掌牧欲其輯寧庸可得也往年趙文翽在營府總統乖方近日張知運在單于徵調失所遂令東胡喪亂北虜披猖爰搆征戍之勤頗致瘡痍之酷言念於此可為深戒今諸蕃歸降色類非一在蕃者則漢官押領入附者或邊陲安置風俗未通言語不達至於蓄養實務綏懷宜令所在軍州牧將等倍加存恤申其冤盡其理問疾苦知飢寒公私不得有侵巨細必令無擾儻處馭多僻恩威不孚龜玉之毀典刑斯及御史出入仍訪察以聞君臣之間不當有隱敷納之事必在無私比年百司及諸使奏陳皆侍仗下頗乖公道須有革正自今巳後非灼然祕密不合彰露者並令封狀奏如文書浩大事理交雜者仍進先狀其史官自依舊例古有賓獻之禮登於天府揚於王庭重學尊儒興賢造士故能美風俗成教化蓋先王之所繇焉朕以寡德欽若前政思與大夫㣥士復臻於理故他日訪道有時忘食乙夜觀書宵分不寐悟專經之義篤知學史之文繁永懷覃思有足尚者不示褒崇孰云獎勸其諸州鄉貢明經進士見訖宜令引就國子監謁先師學官為之開講質問疑義仍令所司優厚設食兩館及監府得舉人亦準此其日朝請官五品以上及朝集使往觀禮即為常式易曰學以聚之問以辨之詩云如切如磋如琢如磨此朕所望於賢才矣九族以親克敦其教百代必祀允章厥德故蔡州刺史越王貞執心不回臨事能斷粵自藩國勤於王家光宅之後寶圖將缺懷劉章之輔漢追鄭武之翊周遂能奮不顧身率先倡義雖英謀未克而忠節居多嗣絶國除年踰一紀奠享淪廢朕甚憫焉夫存或高功歿有明祀數屯則安衆罹禍時泰則城陽紹封永言興繼式備典册其封貞從孫故許王男左監門衛將軍員外置同正員夔國公琳為嗣越王以奉其祀王者欽若天道率繇時令考六官之法修五紀之化故得災害不生休徵洊委朕紹膺洪業於茲六載每惇政理思致和平而陰陽未調蝗水仍集天之垂誡朕甚懼焉夫正月東郊祈春賞士孟冬北陸迎寒恤孤參四序之運行稽五材之動用弗協所尚或罹於咎且事必師古禮重執文將命有司允迪厥訓自今巳後每吉月禮官條奏所行事當斟酌古典用孚於休宣布朝廷使知朕意養老乞言人惟求舊尊儒尚齒風化攸先其致仕官所請物宜令所司專定一官勾當送至宅堯屋可封孔門無倨此由淳風彼洽德教宏之在人職歸所屬如聞輦轂之下閭閻之內口無擇言行不近禮則失長幼之序豈儀刑之政宜令府縣長官左右金吾明加訓導捉搦若有犯者隨事科繩自古見其生不食其肉資其力必報其功馬牛驢皆能任重致遠濟人使用先有處分不令宰殺如聞比來尚未全斷郡牧之內此弊尤多自今以後非祠祭所須更不得進獻牛馬驢肉其王公以下及天下諸州諸軍宴設及監牧皆不得輒有殺害仍令州縣及監牧使諸軍長官切加禁斷兼委御史隨事糾彈國之大事在祀神之所歆惟敬潔誠而齊精意以享則可臻介福致休祥深慮有司未副厥旨所緣宗廟社稷嶽瀆等祭宜令禮官博士斟酌古今務加虔肅合於典禮即詳定奏聞別宅安婦先施禁令往年括獲特巳寬容何得不悛尚多此事國有常法宜置于理方畫一於後刑故三令以先德俾從輕法以愧其心今所括獲者見任官徵納四季祿前資準見任自餘諸色並準九品官祿數納粟婦女並放出掖庭即令京兆尹李朝隱求匹配嫁行之京都作戒天下敢更犯者一依常格王者六師必有止殺國之二柄且貴先賞今吐蕃背盟我軍獻捷執訊獲醜以捨於平人歸馬休牛不資於國用利以和義思與卿大夫共之其馬及犛牛等並賜京文武五品巳上清官及朝集使三品者所繇節級分與仲春在膏雨頻流故當法天布和順時行令天下諸繫囚宜令所繇作速疏理斷決勿有冤滯我國家敦古質斷浮豔禮樂詩書是宏文德綺羅珠翠深革弊風必使情見於詞不用言浮於行比來選人試判舉人對策剖析案牘敷陳奏議多不切事宜廣張華飾何大雅之不足而小能之是衒自今巳後不得更然與我共理惟良二千石久於其政然後化成承前巳來頗多僥幸但因入考即有改轉自今以後非灼然應黜陟者更無遷易敦此風俗革其苟且又舊例別駕皆是諸親近年以來頗多餘色先授者未能頓輟巳後自循舊制去冬有因計入朝不可更令却往過考事了並量事敘用分命諸王典於大郡諒存公道以鎮淳風邠王稟性頗寬馭下不肅且復貴未詳倫理故選剛直任之端寮王家奴客等有違法網者長史潘好禮隨事檢校科決若王有訶怪仰好禮具狀聞徹嵩山隱士盧鴻一應辟而至訪之至道有會淳風爰舉逸人用勸天下特宜與五品官授諫議大夫德惟善政政在養人必將厚生阜俗利物宏義朕奉若天命嗣膺王業思一物失所以百姓為心間者河北河南頗非善熟人間糧食固應乏少頃雖分遣使臣巳令巡問猶恐鰥獨不能自存凡立義倉用為歲備今舊穀向沒新穀未登蠶月務殷田家作苦不有惠恤其何以安宜開彼倉儲時令貸給況京坻轉積歲月滋壞因而變造為利宏多將以散滯收贏理財均施所司合作條件俾便公私六卿分設諸郡咸理在於下人合免冤滯如聞越局侵務背公向私其傷則多為政必紊宜令天下州縣百司寮寀俱守乃曹各勤所職或有身名尚屈刑罰不平職役未均徵差無次爰及侵奪亦兼違負凡人所訴大略如斯若縣不為申州必須理州不能理省必為裁上下相持冤訟可息自今巳後訴事人等先經縣及州並尚書省披理若所繇延滯不為斷決委御史採訪奏聞長官巳下節級量貶凡有功者銘書於王之太常祭於大蒸司勳詔之允所謂疇庸紀勞頒賞旌善藏於天府享於廟庭臣哉鄰哉其道光也故尚書左僕射太子少傅贈司空荊州大都督許文貞公瓖間邪存誠允迪厥德故尚書右丞相太子少保郴州刺史徐國公幽求聞義盡節克茂乃勳並儀刑㣥后左右厥辟直道罔缺危言孔臧景雲末年邦國多難愷悌君子服勞王家或親受顧託以安劉氏或潛圖翼贊願奉唐侯纘乃舊服協於先契宏濟弼亮厥猷茂焉俾台小子嗣守文武之業獲奉宗廟之靈實資元輔是揚末命茲豫大享于先王爾祖其從祀以配我有唐之休烈並可配享睿宗大聖貞皇帝廟庭皇輿肇建必有輔佐之臣天步多艱爰仗經綸之業故侍中譙國公桓彥範侍中平陽郡公敬暉中書令兼吏部尚書漢陽郡公張柬之特進搏陵郡公崔元暐中書令南陽郡公袁恕己等並德惟神降材與運生道協台嶽名書讖緯寅亮帝載勤勞王家參復禹之元謀奉升唐之景命雖殂謝既久而勳烈益彰撫彞鼎以念功想旗常而增感緬遵故實用表徽懿俾列在清廟登於明堂克申從祀之儀式茂疇庸之典並可配享中宗孝和皇帝廟庭皇天應人必有所謂此月少雨蓋非徒然深慮繫囚或有冤滯京城內諸司見禁囚徒並以來日過朕將親慮所司量準舊典其杖以下情不可恕者速決自餘即放却
