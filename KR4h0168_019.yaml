front:
  text: 全唐文欽定全唐文卷十九睿宗二
  hash: sha256:fe6ee7ebf81be921c1a7d2dae6bccd17a9b329c7b4c11172bfeee2847852448e
body:
  text: 勅建立州縣列樹官司所以導俗宣風懲奸息暴頃以承平既久中外晏安人懷弛慢之心官無警覺之意遂使潁宋二州屢奏亂常之黨荊并兩府頻言搆逆之徒發露雖復數州包藏猶慮未絕此等妖舋尋自伏誅旬日之閒驚害良善誠由按察寬縱禁止不明或使無辜陷於非命興言及此深用隱惻自今以後所在州官縣僚各宜用心檢校或惰於農作專事末游或妄說妖訛潛懷聚結或棄其井邑逋竄外州或自衒醫占誘惑愚昧諸如此色觸類旁求咸須防糾勿許藏匿又屬當首夏務在田蠶雖則各解趨時亦資官府敦勸若能肅清所部人無犯法田疇墾闢家有餘糧所由官人宜加等第功狀尤異者別外加擢若為政苛濫戶口流移盜發罕能自擒逆謀為外境所告輕者年終貶考甚者非時解替御史及臺郎出使審加訪察各以狀聞宜宣示諸州各令所在知悉門下朕克纉丕業誕膺景命憲章昔典欽若前王克己勵精緬思至道宵衣旰食勤修庶政夙夜寅畏匪遑厎寧若涉泉水罔知攸濟頃屬殷憂啟運多難興邦禮章載復品物咸茂思欲致萬姓於仁壽歸六合於昇平永言政途庶幾沿革猶恐學校多闕賢俊罕登牧宰不存政理農桑末加勸導樽俎之儀不習冠婚之禮莫修朕所以當宁興嗟載懷兢惕者矣庠序者風化之本人倫之先仰州縣勸導令知禮節每年貢明經進士不須限數貴在得人先聖廟及州縣學即令修理春秋釋菜使敦講誦之風天下有奇才異行沈伏不能自達及官人百姓有能諫言時政得失者並令本州責狀封進鄉飲禮廢為日巳久尊德尚齒宏益極深宜令諸州每年遵行鄉飲之禮令有勸慕王公卿士務存訓獎子弟成立則有冠婚婚禮糟粕或存冠禮久為廢闕自今以後並行冠義責以成人之道使知負荷之難食為人天農為邦本綏撫萌庶勸課農桑牧宰之政莫過乎此刺史縣令有課最尤異委廉察使名聞當別加甄擢縣令字人之本明經為政之先不稍優異無以勸獎縣令考滿考詞使狀有清字無負犯明經及第每至選時量加優賞若屬停選並聽赴集真如設教理歸清淨黃老垂範道在希微僧尼道士女冠之流並令修習真寂嚴持誡行不得假託功德擾亂閭閻令州縣嚴加檢察私度之色即宜禁斷諸州縣官有不因選序別犯贓賄非時除授官等皆依倚形勢恣行侵剝如有此色仰州長官錄事參軍速勘責奏聞訖宜停務待進止仍委吏部兵部速勘責處分諸州百姓多有逃亡良由州縣長官撫字失所或住居側近虛作逃在他州橫徵隣保逃人田宅因被賊賣宜令州縣招攜復業其逃人田宅不得輒容賣買其地任依鄉原例租納州縣倉不得令租地人代出租課寺觀廣占田地及水碾磑侵損百姓宜令本州長官檢括依令式以外及官人百姓將莊田宅舍布施者在京並令司農即收外州給貧下課戶凡此數事或宜區分繫乎風俗義存獎勸刺史縣令等各申明舊章勉思撫輯罷彫弊之務歸淳厚之源訓導黎蒸宣我朝化書不云乎德惟善政政在養民布告天下咸知朕意寅亮天工弼諧庶績宰臣之任也彰善癉惡激濁揚清御史之職也政之理亂實繇此焉朕丕膺鴻緒三年於茲日旰而食夜分而寢萬乘非樂四海為憂思欲小康蒸人允答㣥望懲勸之詔歲月相仍然耳不聞彈劾之聲目未覩剛正之舉豈內外寮吏咸未循公耶將有司迴避隱惡不聞耶每念於此惄焉如疚言而不行責在薄德知而不奏誰其過歟御史等不樹朝綱合從屏黜但緣未親處分志在含忍宜許自新以圖遠効內外文武官有老弱疾患貪暴侵漁不舉職事材職不相當者三日內各錄狀進外州刺史上佐多不擇內外之職出入須均京官中有材幹堪理人者量與外官有清慎者與京官皇帝敬問天台山司馬鍊師惟彼天台淩於地軸與四明而蔽日均八洞而藏雲珠闕玲瓏琪樹璀璨九芝含秀八桂舒芳赤城之域斯存青溪之人攸處司馬鍊師德超河上道邁浮邱高游碧落之庭獨步青元之境朕初臨寶位久藉徽猷雖堯帝披圖翹心齧缺軒轅御歷締想崆峒緬維彼懷寧妨此顧夏景漸熱妙履清和思聽真言用袪蒙蔽朝欽夕佇迹滯心飛欲遣使者專迎或遇鍊師驚懼故令兄往願與同來披敘不遙先此無恙故勅鍊師道實徵明德惟虛寂淩姑射之遐軌激具茨之絕風自任鍊藥名山祈真洞壑攀地肺之紅壁坐天台之白雲廣成以來一人而巳足可發揮仙圃黼藻元關海嶽為之增輝風霞由其動色弟子緬懷河上側佇巖幽鶴馭方來鳳京爰降對安期之舄聞稷邱之琴順風訪道諒在茲日所進明鏡規制幽奇隱至道之精含太易之象藏諸寶匣銘佩良深故勅先生道風獨峻真氣孤標餐霞赤城之表馭風紫霄之上遁俗無悶逢時有待蹔謁蓬萊之府將還桐柏之巖鴻寶少留鳳裝難駐閑居三月方味廣成之言別途萬里空懷子陵之意然行藏異跡聚散恒理今之別也亦何恨哉白雲悠悠杳若天際去德方遠有勞夙心敬遣代懷指不多及故勅朕聞司牧兆人有國彞訓敦敘九族前王令典念此宗枝久遭沈翳近從班命庶展才能或授外藩或居內職留念訪察屬想風謠罕立嘉聲或聞蠧政當官不存於職務處事多陷於偏私禽荒酒德者蓋多樂善敬賢者全少將性之昏昧違此義方豈朕之不明成爾薄德當從戒慎勉遂悛改如迷而不復自速愆尤己實為之悔之無及即宜遞相告示以副朕懷勅台州始豐縣界天台山廢桐柏觀一所自吳赤烏二年葛僊翁巳來至於國初學道壇宇連接者十餘所聞始豐縣人毀壞壇場砍伐松竹耕種及作墳墓於此觸犯家口死亡不敢居住於是出賣宜令州縣準地數畝酬價仍置一小觀還其舊額更於當州取道士三五人選擇精進行業者并聽將侍者供養仍令州縣與司馬鍊師相知於天台山中辟封內四十里為禽獸草木長生之福庭禁斷採捕者景雲二年六月二十三日皇帝敬憑太清觀道士楊太希於名山斫燒香供養惟靈蘊祕凝真含幽綜妙類高旻之亭育同厚載之陶鈞蓄洩煙雲蔽虧日月五芝標秀八桂流芳翠嶺萬尋青溪千仞蜺裳戾止恒為碧落之庭鶴駕來遊即是玉京之域百祥覃於遠邇五福被於黎元往帝所以馳心前王由其載想朕恭膺寶位嗣守昌圖恐百姓之不寧慮八方之未泰式陳香薦用表深衷實冀明靈降茲休祉所願從今以後浹㝢常安朕躬男女六姻永保如山之壽國朝官僚萬姓長符擊壤之歡魚鳥遂性於飛沈夷狄歸心於邊徼實希靈鑒用副翹誠今因鍊師遣此不悉朕念卿家門忠於王室奪卿情禮以展殊思屢表固陳詞理懇至循環省覽有足可矜今遂所請用勸浮薄待卿情理云畢更俟後命頃以賊臣結黨后族擅權扇動宮闈肆行鴆毒靈祇所感姦惡伏誅今則宗社乂安天地交泰卿久厭簪紱早慕林泉守道不回見幾而作興言高尚有足嘉稱但怒用不遷罪無相及為善有驗卿之謂與或慮驚疑故令慰謝昔重華嗣德格於文祖高密陟后至於神宗蓋所以敬履端之元申孝享之道皇帝初嗣大寶允膺休命歡洽人靈慶溢宗社宜躬祗祀典用展肅雍可以今月四日謁享太廟所司準式先王省方所以觀風設教聖人順動所以刑清甿服故叶時同律虞典之常道喬嶽翕河周詩之盛德自王風不競茲禮遂亡兩漢本朝有時於邁三國以降日不暇給我皇家開元首出十代重光寰宇大寧車書無外文祖神宗之德洽於人心考祥展義之規昭於國典朕祗若丕構寅奉慶靈夙懷箕潁之心取遂汾陽之志皇帝天錫英武神與聰明純孝極於安親大功深於濟代自陟元后實總朕師時政益明彞倫攸敘而邊甿遐阻藩服悠曠式慰來蘇之懷實允卜征之義加以頃年邊將授任或乖師律以虧軍威不振今盛德在水元冥御辰天道成於積陰王制崇於大閱皇帝宜順時巡狩親幸邊陲掌圖修考事之儀典樂具陳詩之禮西洎河塞東踰燕朔望秩名山肆覲㣥后休農問老誓師訓卒其有牧州典郡功施於人杖節擁旄隱若敵國者當崇進律之賞加以分麾之命若郡政不舉軍令莫修聚歛苛細侵削戰士者宜明茲典憲肅以天誅然後七萃騰裝三軍按節合符釜山之典覽軒帝之遺風勒騎單于之臺踐漢皇之故事使陰山罷祲大漠無塵其供帳所資儲擬之費皆令有司支備不得煩人往者皇運伊始戎政肇修兩置軍旅初分府衞計戶充兵纔足周事遂使二十一年入募六十出軍既憚劬勞咸規避匿不有整革將何置理其天下衞士取年二十五以上者充十五年即放出頻經征鎮者十年放出自今巳後羽林飛騎並於衞中補恤刑緩獄古之通義務本勸農國之常典今陽和布氣膏澤順時凡厥黎萌咸事東作而疲人嬰法自滯圜扉言念於此有軫於懷宜從寬宥使營稼穡其京城內見禁囚除死罪以外並時放免營農天下諸州亦宜準此朕恭巳無為留神元默俯順歷數僉謀公卿式命元子祗膺寶位今庶政逌新光華肇啟但恐天下至廣未達朕心故臨遣使臣宣揚朝典宜以膳部郎中蕭瑗為河南道宣勞使諫議大夫楊虛受為河北道宣勞使賛善大夫薛植為淮南道宣勞使殿中丞薛麟為隴右道宣勞使宗正卿姜晞為河東道宣勞使司門郎中李誠為關內道宣勞使工部郎中高紹為劒南道宣勞使太子右諭德蕭憲為山南道宣勞使宋王府司馬裴綱為江南道宣勞使諫議大夫甯悌原為嶺南道宣勞使皇帝乳母蔣氏莫氏等行藉柔良心惟靜順襁褓祗事夙效於勤勞井邑分封宜申於寵命蔣氏可封吳國夫人莫氏可封燕國夫人天步時艱王業多難亂常干紀何代無之我國家累聖膺期重光繼統戎蠻慕義遐邇無虞朕以寡昧嗣守丕祚嚮明而理昃景忘劬冀㝢內之小康庶㣥生之遂性又使家知禮讓人盡忠良不謂姦宄潛謀蕭牆作釁逆賊竇懷貞蕭至忠岑羲薛稷李猷常元楷唐晙唐昕李晉李欽賈膺福傅孝忠僧惠範等咸以庸微謬承恩幸未申毫髮之效遂興梟獍之心共舉北軍突入中禁將欲廢朕及皇帝以行篡逆朕令皇帝率衆討除應時殄盡元惡既戮姦黨畢殲宗社乂安人神胥悅務申寬大之典宜覃肆宥之恩可大赦天下自大辟罪巳下無輕重咸赦除之其逆人魁首未捉獲及應緣坐者並不在赦限自餘黨類往還一無所問布告遐邇咸使知聞大寶之尊諒非為己神器之重必在與能自昔興王率繇茲道我國家運光五聖業盛百齡大賚洽於人心淳風偃於區外而道不常泰時更小屯朕以菲薄屬茲多難仰讓王之宿志順公議於㣥情丕業既康天保斯定皇帝神武攸縱睿哲克躋安宗社於綴旒拯生人於在溺用遵內禪令總朕師夙夜在勤政刑益理昨者姦臣搆釁潛發禁闈兇黨布於蕭牆飛變聞於帷扆朕慮深倉卒受命討除皇帝遂與岐王範薛王業等勵茲孝心率彼義勇戮鯨鯢於闕下掃欃槍於天路元惡大憝罔不伏誅人神用康功業彌廣信可總璇衡之大政守國家之鴻緒能事備矣朕又何憂自今巳後軍國政刑一事巳上宜並取皇帝處分其岐王範薛王業宜各加實封一千戶朕方閑居大庭緬懷汾水無為養志以遂素心凡百卿士以洎黎庶宜體朕懷各盡誠節布告遐邇咸使聞知昆季恩深歡娛共被汝為留愛天倫其睦斯乃萬方有慶九族延休言念仁慈固多忻慰王者建邦設內輔之職聖人作則崇陰教之道式清四海以正二儀皇帝妃王氏冠葢盛門幽閒令德藝兼圖史訓備公宮頃屬艱危克揚功烈聿興昌運實賴賛成正位六宮宜膺盛典可冊為皇后關睢之化始於國風貫魚之序著於大易用能輔助王道叶宣陰教皇帝良娣董氏良娣楊氏良媛武氏等門襲鐘鼎訓彰禮則器識柔順質性幽閒美譽光於六寢令範成於四教宜升徽號穆茲朝典董氏可貴妃楊氏可淑妃武氏可賢妃昔在姬劉分王子弟用能本枝碩茂算祀遐長皇帝元子嗣直嗣謙等若木分輝咸池䟽派孝愛成性佩服天經岐嶷誕靈風儀遐舉奉聞詩之寶訓資樂善之芳規錫命惟崇巳申綠車之寵登庸在運宜開朱邸之藩嗣直可封為郯王嗣謙可封為鄂王皇孫之寵禮絕於諸侯帝王之制封殊於列國爰自前代茲義存焉皇帝第三子嗣昇岐嶷夙成聰明天假東海壽街之對昔未云奇琅琊日遠之談今可連類允宜胙茲茅土光被磐石永固鴻業式繼維寧可封為陝王誥朕聞古之建皇極承大序者雖創業垂統則至公之器固不可違而居常侍終則必至之期固不可易況朕以薄德累承聖緒常願致虛守靜用遂其真志於崇高富貴本非所重故三為天子三以天下讓蓋從人之欲方御於萬邦知子既明復傳於七廟爰命皇帝寄之司牧觀其體自舜禹以成厥政則朕窅然汾陽無負於時何嘗不問寢以侍膳顏而順色孝巳達於神明愛巳兼於君父成朕之志何慶如斯然朕頃感舊病歘焉大漸聖賢共爾修短其分古無不歿同謂之歸付託得人夫復何恨屬纊之後三日便殯以日易月行之自久厚葬傷生可以深誡其喪紀及山陵制度一依漢制故事社稷務重皇帝不可諒闇自居小殮之後宜即別處視事軍將及岳牧等所在發哀並不須來赴百辟卿士孝子忠臣送往事居無違朕意主者施行維唐隆元年歲次庚戌七月庚戌朔二十日己巳皇帝若曰天有丕命集寶位於朕躬所以奉若天道建茲元嗣其明聽朕言咨爾平王隆基幼而聰允長而寬博有夙成之量焉夫禮以修外樂以修內者是務於文也春夏學干戈秋冬學羽籥者是兼於武也繫於百姓聞於天下者是由於仁也一日三朝嘗藥侍膳者是資於孝也爾有文武仁孝之德以知父子君臣之道朕甚休之閒者賊臣搆逆窺竊神器則我有唐之祚危若綴旒爾義寧家邦忠衞社稷誅其凶惡以之康濟主匕鬯者非爾而誰是用命爾為皇太子古人有言曰爾身克正罔敢不正爾罔不忠惟爾之忠昭昭臨下不可不畏慎乃僚允迪端士恭儉惟德遠於憸人則萬邦以貞答揚我四聖之鴻烈敬之哉維景雲元年歲次庚戌十月戊寅朔二十九日景午皇帝若曰咨爾故皇太子重俊業隆繼體才膺守器辨日高視晉儲防年遐吞漢兩撫軍監國皇基攸固齒冑問安聖圖惟永頃以讒邪浸潤恩禮踈薄外迫伊戾之謀中啟驪姬之譖彼則兇計斯甚搖動元良爾乃誠心密運掃除悖德興晉陽之甲以罪荀寅擁漢闕之兵而誅趙虜嗚呼逆首雖殄凶黨未清屬投杼生疑亂兵旋及朕代天理物推亡固存近勦四凶緬懷三善言徵備禮以慰冥魂銀牓山門畫堂泉室三年遂遠上賓之馭不留千載猶生全節之名長在存著徽烈歿有餘裕志業若此痛悼良深宜加寵號用旌不朽今冊諡爾曰節愍太子魂而有靈嘉茲茂典嗚呼哀哉景雲二年歲次辛亥十月庚寅皇帝若曰於戲咨爾故桂陽王妻楊氏誕承華緒光襲懿風性識柔明言容婉嫕觀詩著範蹈禮成規往應高禖作嬪英邸謹環珮之節珊有其章勵蘩藻之誠恭而式序遣使某持節冊命爾為桂陽郡王妃爾其克保彞訓率由茂則以正於家無替厥命往欽哉門下朕聞大事在祀禮極乎郊丘大德曰生道存乎赦宥故至誠斯感允接神明之休盛典聿修必敷雷雨之施古先代帝躬祠后土所以崇兼載之功配博臨之義有虞氏之合禘徧於山川成周氏之從祀逮於林澤西漢汾陰之脽東洛翠媯之墠雖制度未備而道有可觀曹魏以還數百餘載蓋設儀而不復或誠信而未孚有其廢之莫得能舉我國家之受命也承百王之季啟三統之元高祖神堯皇帝膺籙受圖繼天立極太宗文皇帝弔人伐罪南征北怨是用拯生靈於塗炭登人物於休和高宗天皇大帝惟睿作聖垂衣而理大聖天后受託從權當宁而化中宗孝和皇帝允恭克讓守文御武能致刑措於變時雍朕以眇身恭荷丕構常恐政理乖中風雨愆期惕慮周於萬戶疚懷心於一物幸乾坤交泰宗社降靈氣無疵癘之災物遂生成之性呼韓慕化侍子來庭月支請職名王入貢大荒同軌瀛海無波俯循涼德載懷寅畏故以歲首肅事禋宗爰撰令辰親祀方澤採黃圖之舊制定黑畤之前基心謀取則於禮經宥密同規於詩頌三祖登配㣥望畢從咸池之舞在列合鍾之管斯應祥風入當乎八變之殷瑞日揚暉屬乎三獻之始臣工助而胥悅兆庶觀而相趨誠敬克申感慶交集頃緣郊籍巳肆眚災貸宥之道未應累降但精享云缺既曠代而方循福釐所被思寰宇之同沐宜因大典式暢洪恩可大赦天下改太極元年為延和元年五月十三日昧爽以前大辟罪以下咸赦除之其十惡及劉誠之胡太宰徒侶官人受贓並不在赦限文武官預大禮各賜勳一轉桓彥範敬暉崔元暐袁恕己張柬之等特還其子孫實封二百戶大酺五日臣以宗社事重家國情深誅鋤巨逆奉戴嗣主今承制旨猥推宸極在臣虛薄不敢祗膺循環震驚無任感哽昔漢以關中之事專仗蕭何今者託公亦猶於古所希耆德敬勗廼誠我國家創開天地再造黎元四夷來王萬邦會至置州立郡分職設官貞觀永徽之前皇猷惟穆咸亨垂拱之後淳風漸替征賦將急調役頗繁選吏舉人涉於浮濫省閣臺寺罕有公直苟貪祿秩以度歲時中外因循紀綱弛紊且無懲革弊乃滋深為官既不擇人非親即賄為法又不按罪作孽寧逃貪殘放手者相仍清白潔己者斯絕蓋由賞罰不舉生殺莫行更以水旱時乖邊隅未謐日損一日徵歛不休大東小東杼軸為怨就更割剝何以克堪昔聞當官以留犢還珠為上今之從職以充車聯駟為能或交結富豪抑棄貧弱或矜假典正樹立腹心邑屋之閒囊篋俱委或地有椿榦梓漆或家有畜產資財即被暗通並從取奪若有固恡即因事以繩麤杖大枷動傾性命懷冤抱痛無所告陳比差御史委令巡察或有貴要所囑未能不避權豪或有親故在官又罕絕於顏面載馳原隰徒煩出使之名安問狐狸未見埋車之節揚清激濁涇渭不分嫉惡好善蕭蘭莫別官守既且若此下人豈以聊生數年巳來凋殘更甚卿孤潔獨行有古人之風自臨蜀川弊化頓易覽卿前後執奏何異破柱求姦諸使之中在卿為最並能盡節似卿如此百郡何憂乎不理萬人何慮乎不安卿當益堅勿為後顧嘉卿直道今賜袍帶并衣一副頃者王室不造中宗厭代外戚專政姦臣擅國將傾社稷幾遷龜鼎朕躬與王公皆將及於禍難卿見危思奮在變能通翊賛儲君協和義士殄殲元惡放殛兇徒我國家之復存繄茲是賴厥庸甚茂朕用嘉焉故委卿以衡軸胙卿以茅土然征賦未廣寵錫猶輕昔西漢行封更擇多戶東京定賞復增大邑故加賜卿實封二百戶兼舊七百戶使夫高岸為谷長河如帶子子孫孫與國無絕又以卿忘軀徇難宜有恩榮故特免卿十死罪並書諸金鐵俾傳於後卿其保茲功業永作國楨可不美歟卿器局堅正才識高遠公忠彰其立身貞固足以幹事類張騫之出使同魏絳之和戎職綰文武功申方面勤於王家是為國老頃者顧斯側景願言勇退深惜馬援之能未遂祁奚之請然章䟽頻上雅懷難奪今知脫屣歸閒拂衣高謝固可以激勵頹俗儀刑庶僚永言終始良可嘉尚宜善攝養以介期頤朕聞天之為大也高上下之容可紀地之為大也廣縱橫之數可推則知無去無來不生不滅拯沈淪於沙劫救焚灼於塵區毒龍懼其威光醉象憚其神力其大則包於宇宙其小則隱於毫芒七十二君先在陶鈞之內萬八千載即為俄頃之閒漢日載其通暉周星彰其降誕鷲頭峯下演金口之微言雞足山中舒玉毫之瑞色干戈不用梵志摧鋒甲冑無施波旬潰旅闢圓明之淨域啟方便之禪門慧晷耀於昏衢慈雲清於朽宅無得而稱者其惟正覺乎然則教自西方法流東夏馬鳴龍樹肇闡瓊編羅什道安承宣寶偈關中道俗雖傳貝葉之文江左黎元未極蓮華之旨又以元魏迷於釋典宇文扇於魔風開皇之初暫為修建大業之末遽即分崩我大唐之有天下也睿聖重光文思御歷吞沙靜㜸鍊石稱神巢燧執鞭羲農擁篲懸法王之鏡轉梵帝之輪被正朔於蟠桃混車書於細柳三藏沙門菩提流志者南天竺國淨行婆羅門種姓迦葉氏也年十月二外道出家事波羅奢羅學聲明僧法等倫并歷數咒術及陰陽等年踰耳順遽乃心歸知外法之乖違悟釋教之深妙隱居名嶽積習頭陀初就耶舍瞿沙三藏學經論其後徧遊五天竺國高宗天皇大帝聞其遠譽挹其道風永淳二年遣使迎接天后聖帝應乾司契當宁披圖令住東都居大福先寺譯佛境界寶雨華嚴等經一十一部中宗孝和皇帝循機履運配永登樞神龍二年令住京下於大崇福寺翻譯此經俄屬靈佑虧徵帛丿糸區集禍喬嶽之仙長往茂陵之駕不還朕以庸虛謬膺丕構敬遵前旨勗就斯編法師尋繹故文發揮新句炎涼不懈曉夕忘疲舊翻新翻凡有四十九會總其部帙一百二十卷成以先天二年四月八日畢功進內法師戒珠在握慧炬明心為法門之棟梁啟僧徒之耳目伏願上資七廟八百之祚長延下及萬方億兆之氓恒逸遠邇寧謐朝野歡娛致澆俗於淳源歸迷生於壽域暫乘紫機之暇聊題緗帙之前所有會名具於其目云爾原夫一氣凝真含紫虛而構極三清韞祕控碧落而崇因雖大道無為濟物歸於善貸而妙門有教滅咎在於希聲景龍觀者中宗孝和皇帝之所造也曾城寫質閬苑圖形但名在騫林而韻停鐘簴朕翹情八素締想九元命彼鼓延鑄斯無射考虞倕之懿法得晉曠之宏規廣召鯨工遠徵鳧匠耶溪集寶麗壑收珍警風雨之辰節昏明之飛廉扇炭屏翳營鑪翥鶴呈姿蹲熊發狀角而不震侈而克揚庶其曉散靈音鎮入鵷鸞之殿夕騰仙韻恒流鳷鵲之闈聾俗聽而咸痊迷方聞而永悟洪鈞式啟寶字攸鐫其銘曰紫宸御歷青元樹因傾巖集寶竭府收珍杜夔律應張永規陳形包九乳儀超萬鈞上資七廟傍延兆人風嚴韻急霜重音新自茲千歲從今億春懸玉京而薦福侶銅史而司辰猗歟夫子實有聖德其道可尊其儀不忒刪詩定禮百王取則吾豈匏瓜東西南北爰有上德生而長年白髮遺象紫氣浮天函關之右經留五千道非常道元之又元天造草昧雄圖糾紛赫赫高祖應若興雲秦原鹿喪沛澤蛇分大風一起南面稱君仲達猜忌狼顧為人稱疾迷謬形神不親辛毗仗節蜀將貽巾委質北面終為魏臣緬惟梁武九五居尊何為自屈沈冥釋門災興佛寺兵纏帝閽竟罹凶逼天道寧論
