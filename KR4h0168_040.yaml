front:
  text: 全唐文欽定全唐文卷四十元宗二十一
  hash: sha256:e9295cb1f04506f8b679c46b7669537242c469fd78ed8d90cb113837600ad1e6
body:
  text: 自昔皇王受命必降於元符天人協心乃彰於大號朕纘承元緒虔奉睿圖何嘗不精意真宗專心庶政幸以邊隅砥定風雨時若人和歲稔且洽於時雍極瑞殊祥薦臻於昭應故得玉芝再産祕牒元通至道降休先聖儲祉顧惟菲德曷以克當是用祗薦崇名永揚洪烈羣公百辟援義比事誠請不巳固辭不獲以今日敬膺典冊曰開元天地大寶聖文神武應道皇帝徽章載茂寅畏增深宜因稽古之典式布惟新之澤可大赦天下自天寶八載閏六月五日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之朕永惟風教漸冀還淳至於宏貸之名亦思復古其天下百姓丈夫戶頭者宜各賜爵一級征鎮之役其來久矣雖存素備諒在變通頃者用兵蓋非獲己今西戎摧殄北虜歸降南蠻東夷咸來稽顙亦可謂四海無事萬里廓清減戍息人思宏善貸其軍鎮兵非切要可均減者宜令本鎮節度使與所司商量處置奏聞其百姓有頻經征戍者巳後差點之次不在此限高年給侍義存養老因時定式務廣仁恩其天下百姓丈夫七十五巳上婦人七十巳上宜各給一人充侍任自揀擇至八十巳上依常式處分唐虞省刑畫冠不犯秦漢制法密網維煩理亂之源得失斯在朕常想淳古務崇敦朴刑期不濫政協無為豈惟守於升平庶有臻於大道頃者詳諸條目巳從易至於結斷尚慮深刻所貴從寬示其知禁宜令中書門下與刑部大理寺法官審更詳定法律之閒有所不便者具條目聞奏禘祫之禮以存序位質文之變蓋取隨時國家系本仙宗業承聖祖重熙纍盛既錫無疆之休合享祭神思宏不易之典自今巳後每遇禘祫並於太清宮聖祖前設位序正上以明陟配之禮欽若元宗下以盡虔恭之誠無違至道比來每緣禘祫時享則停事雖適於從宜理或虧於必備巳後每緣禘祫其常享無廢享以素饌三焚香以代三獻又奉先追遠禮惟昭德崇福展敬義在因心自今巳後獻祖宣皇帝宣莊光皇帝光懿皇后忌日宜令京城一日設齊太祖景皇帝景烈皇后代祖元皇帝元貞皇后忌日京城三日行道元宗妙本實備微言垂範傳策將宏至化朕所以發求道之使遠令搜訪因聽政之餘親加尋繹既判訛謬爰正簡編必有闡揚以敦風教今內出一切道經宜令崇元館即繕寫分送諸道採訪使令管內諸郡轉寫其官本便留採訪郡太一觀持誦聖人垂訓蓋先於道學者宗本必有其師文宣王與聖祖同時俱為教首雖考言比德理在難名而問禮敘經跡彰親授思廣在三之義用崇得一之尊宜於太微宮聖祖前更立文宣王遺像與四真人列侍左右且道降真符天有成命藏之於密則取固名山彰之以類則發祥星洞況靈仙所集宜表殊休太白山可封為神應公所繇四時祭祀其金星洞改為嘉祥洞所管華陽縣改為真符縣仍置一祠宇仙人臺下置一觀兩京並十道於一大郡亦宜置一觀並以真符玉芝為名每觀度道士七人修持香火戶部侍郎兼御史中丞王鉷以才授委以忠奉上頃命精求元記克協神心宜旌乃誠俾正章綬特與三品其李渾等三人既親傳真誥因獲元符當有甄明用旌福應宜令中書門下量其所能具狀聞奏當別處分又九州之鎮實著禮經三代之典必崇望秩事既屬於報功義有符於錫命其九州鎮山除入諸嶽外並宜封公仍各置祠宇先巳有祠宇者量更增修其五嶽四瀆雖載常祀儲慶發祥當申昭報宜令所在長官各陳祭禮名山大川亦量事致祭天下侍老並量賜酒麥丏內外見任文武官職事官三品巳上賜爵一級四品巳上加一階其京文武官在京及諸色陪位官通表使等賜帛有差率土之內賜酺三日皇天眷命必順於五行哲后馭時實遵於三統考古之道何莫繇斯朕欽若上元嗣守丕業察璿衡以齊政念稼穡以勸人日慎一日四十載於茲矣何嘗不夙夜祗畏憂勞在懷思致黎元臻夫至理幸以刑清俗阜天成地平萬方砥寧羣物咸遂雖慙大化且謂小康此皆至道儲祉宗社敷祐豈豫菲薄而克致焉然則上稽歷象傍採輿議爰以土德承漢火行是憑大易之辭用紹前王之烈禎祥纍應正閏攸分不改舊章惟新景運屬獻歲初吉乘時布和是用展祀崇禮竭誠昭報庶協發生之序載覃雷雨之澤可大赦天下自天寶十載正月十一日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之其左降官及流移配隸安置罰鎮效力之類並稍量移近處其官巳復資至敘用之日不須為纍其流人配隸并一家往者所犯人情非切害身巳亡沒其家口放還流人及左降官考滿載滿丁憂服滿者亦準例稍與量移其亡官失爵放還不齒其諸色放停解考免與替人等非犯贓者宜令所司勘責量加收敘其衰老疾病者仍與致仕官天下百姓今載地租并諸色勾徵缺負等色在百姓腹內未納者並一切放免且京兆府及三輔三郡百役殷繁自今巳後應差防丁屯丁宜令所繇支出別郡禮者所以訓導人俗昭事明祇所宜增修以會其本況國之大典在於精禋必資備禮以彰尊奉自今巳後設祭南郊薦獻太清薦享太廟其太尉行事前一日於致齊所具羽儀鹵簿公服引入朕親授祝版乃赴清齊用展誠敬夫孝子奉親生極敬愛歿有思戚霜露之感愈深祭以嚴恭蒸嘗之敬如在且廟者貌也取像存焉是禮繇於情因心則感太廟宜置內官以備嚴奉仍於廟外別造一院安置庶申罔極之思無忘事生之禮嶽瀆山川蘊靈育粹雲雨之澤利及生人春秋之義存乎祀典況正其運序式遵咸秩其五嶽四瀆及諸鎮山宜令專使分往致祭其名山大川及諸靈迹并自古帝王及得道升仙忠臣義士孝婦烈女有祠廟者各令郡縣長官逐便致祭其有陵墓屋宇頽毀者量事修葺合應禁樵採宜申明捉搦四海攸廣百川朝宗德乃靈長道惟善利永言澤潤義在封崇其四海宜並封王仍差使備禮冊祭每順時行令奉道施法天心不違靈鑒不遠且去載長至庚子御辰今茲建元辛卯應歷立春乃標於歲首上巳更協於清明此氣序和調乾坤交泰既正東方之位咸歸啓運之祥則政貴宏通上符天意況法以輔德刑以間邪豈在煩苛必資易朕永懷至理思致還淳每軫哀矜之心屢申寬大之詔實欲人皆知禁化洽無為頃者巳令法官每刊刑典猶慮尚乖大體未副朕懷再令中書門下與刑部大理寺審加詳定務從寬典夫共理親人在於郡守縣令今二千石朝廷精擇咸得其人縣令委之選司慮未盡善孰若連職同官見有蹤跡宜令天下太守各舉堪任縣令一人善惡賞罰必及所舉所司仍明作條例每搜羅賢俊旌賁邱園猶慮遁跡藏名安卑守位瞻言及此寤寐思焉其諸色人中有懷才抱器未經薦舉者委所在長官審訪具名録奏禮之王制垂範作程亦既觀德訓人孝敬故天子七廟諸侯五廟大夫三廟士一廟孝享奉先亦各有辨今三品巳上乃許立廟永言廣敬載感於懷其京官正員四品清望官及四品五品清官並許立私廟京官五品巳上正員清資官階相當並五品巳上正員外清官父母先亡歿無官號者並與追贈又父有封爵合傳授子孫或緣申請遲違準式遂停承襲如有此色自開元以來宜令所司審加勘責灼然合襲者特宜許襲天下侍老百歲巳上賜綿帛五段粟五石八十巳上綿帛三段粟三石丈夫七十五巳上婦人七十巳上綿帛二段粟兩石太清宮道士各賜物三十段陪位道士共賜五百段亞獻太子璵賜物二千段終獻榮王琬賜物一千段文武百官及有職掌各賜物有差率土之內賜酺三日王者事天明事地察修身慎行孝德彰矣故風化天下和睦興焉致敬宗廟祖考來格是則禮莫大於嚴享孝莫大於揚名有以通於神明有以光於四海朕承真之道纘聖之業欽若先訓惟懷永圖寶儉寶慈無為而理自南自北有截來威五教聿興家服仁孝四靈咸盛物應純誠百辟公卿萬方夷夏僉奉元貺徵長發於真源屢薦鴻名願昭彰於至德封章守闕於再於三加以聖祖錫符元中啓迪天心垂裕榮光降臨敢不丕承固執沖讓乃展因心之義以宏推尊之典虔上冊禮齊肅思成入室僾然敢忘於目出戶而聽庶幾有聞揚美諡於無疆展永懷於罔極且敬從拜後禮既尊先式副羣心以允成義以今日敬膺典冊曰開元天地大寶聖文神武證道孝德皇帝大號載崇祗若增懼宜因布和之序式宏在宥之澤可大赦天下自天寶十三載二月九日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之官人犯入己贓不可更令却上後不須為纍其左降官並稍量移近處反逆緣坐流配之色宜與量移其王鉷李林甫柴崇耀阿布思等並寄任非輕包藏特甚原情議法深所難容況日月未淹罪坐尤重即從寬宥何以懲肅應緣親纍流配者並不在該及之限左降官承前遭憂皆不得離任孝行之道所未宏通情理之閒深可哀恤如有此類宜並放歸仍申省計至服滿之日準法處分自今巳後編入常式其中有非反逆緣坐及情理切害有父母年老不任相隨無昆弟養者許停官歸侍及有身巳衰老久罹譴責願停官者委本道採訪使擇具名牒中書門下然後放還鰥寡惸獨乏絶者量加賑給三載黜陟百王令典殿最之迹廉問攸歸欲更別遣使臣慮有煩擾今載宜委本道採訪使具官人善惡奏聞以申勸阻自臨御以來四十餘年棫朴延想寤寐求賢林藪無遺旌招不絶猶慮升平巳久策業增多至於徵求或遺僻陋其博通墳典洞曉元經清白著聞詞藻宏麗軍謀出衆武藝絶人者任於所在自舉仍委郡縣長官精加銓擇必取才實相副者奏聞朕尊崇先諡霜露增感於以孝思無忘錫類其內外見任官階俱是三品巳上父未有五品官及無官巳亡歿者宜各贈五品官及母無邑號者亦與追贈其見任四品五品清官官階俱是五品巳上者亡父母先無官號亦準此追贈且厚其風俗五教之旨聿興賁於邱園十翼之風斯在其士庶閒衆推孝弟異代義居高尚確然隱遁巖穴者委採訪使博訪聞薦其孝義之人巳經旌表雍睦無易純至有終著美鄉閭深可嘉尚各賜勳兩轉以彰德行天下侍老百歲巳上版授本郡太守婦人版授郡夫人各賜綿帛五段粟三石八十巳上版授本縣令婦人版授縣君各賜綿帛兩段粟兩石太清宮闕聖祖仙居頻降休徵屢貽啓迪不有優異豈表殊常其本宮道士宜各賜物三十段道門威儀王虛真賜物五十段陪位大德各賜物二十段因心推崇增上美諡惟官統職必在正名今以太常尊事宗廟安可別署為名禮不逼尊情期達敬五陵署改為臺其獻陵臺等五令及丞并升一階以彰崇奉五嶽四瀆及名山大川并靈迹之處先賢祠廟各委郡縣長官致祭其有陵墓祠宇頽壞者量情修葺亞獻皇太子璵賜物一千段終獻榮王琬賜物五百段其餘各賜階爵有差其郡守縣令職在親人必務公勤以康黎庶凡所推擇皆竭乃誠寵錫之閒須甄異等普恩之外太守等並賜爵一級縣令賜勳兩轉庶期勉勵以表朕心其京文武官一品賜物一百匹二品八十匹三品七十匹四品五品五十匹六品七品各三十匹八品九品各二十匹北京留守節度採訪使並京官準敕出使未回者所賜物並同見在例左相陳希烈純粹之道載穆朝廷文儒之風式瞻師表且協和時令翊贊升平柔嘉其德克壯元老與一子五品官賜物五百匹攝太尉奠瓚上冊書寶冊讀冊右相楊國忠當朝正色百僚綱紀廉節遺身三階柱石況發揮孝理潤色鴻猷金玉王廷典禮增緝不有殊等何用為勸宜與一子三品官仍與一子五品官更賜物五百段左僕射安祿山以貞一之心總文武之任出清北落入贊南宮既押登歌又揮寶冊與一子官更賜物四百匹攝太尉張均太清宮祠及修儀注等使普恩之外又賜物一百匹武德功臣及貞觀初宰輔等緬想忠義感會風雲用集大勳肇興王業其有子孫零落冠冕陵夷無任官宦者宜令所司勘責依資與一人京官唐元勳臣績參締構録勞念舊每置於懷普恩之外宜放一子出身如已出身所司依資與一官率土之內賜酺三日朕以薄德嗣守神器何嘗不乾乾惕勵勤念蒼生至於水旱或則禱祠請罪邊鄙微擾則齊戒思過聿來四紀人亦小康蓋祖宗之靈卿大夫之助也是以推心將相不疑於物而奸臣凶黨負信背恩創剝我黎元暴亂我函夏皆朕不明之過豈復尤人哉楊國忠厚斂害時巳肆諸原野安祿山亂常搆禍尚逋其斧鉞朕用巡巴蜀訓勵師徒命元子北略朔方諸王分守重鎮合其兵勢以定中原將蕩滌煩苛大革前弊思與億兆約法惟新上以奉宗廟神祇下以寧華夷動植可大赦天下其天寶十五載八月一日昧爽巳前大辟罪巳下常赦所不免者咸赦除之自兵興巳來有破家者一切與雪流人一切放還左降官各還舊資內外文武官節級賜階爵安祿山脅從官有能改過自新背逆歸順並原其罪優與官賞有唐嗣天子臣某敢昭告於昊天上帝天啓李氏運興土德高祖太宗受命立極高宗升中六合殷盛中宗紹復繼體丕定上帝眷祐錫臣忠武砥綏內難推戴聖父恭承大寶十有三年欽若天意四海晏然封祀岱嶽謝成於天子孫百祿蒼生受福恭惟坤元道昭品物廣大茂育暢於生成庶憑休和惠及黎獻博厚之位粵在汾陰肅恭時巡用昭舊典敬以琮幣犧牲粢盛庶品備茲瘞禮式展誠慤隆基曰一代兄弟一朝存歿家人之禮是用申情興言感思悲涕交集大哥孝友近古莫儔嘗號五王同開邸第遠自童幼洎乎長成出則同遊學則同業事均形影無不相隨頃以國步艱危義資克定先帝御極日月照臨大哥嫡長合當儲二以功見讓爰在薄躬既嗣守紫宸萬幾事總聽朝之暇得展於懷十數年閒棣華凋落謂之手足惟有大哥今復淪亡邈然無對以茲感慕何恨如之然以厥初生人孰不殂謝所貴光昭德行以示崇高立德立名斯為不朽大哥事跡身沒讓存故冊曰讓皇帝神之昭格當茲寵榮況庭訓傳家璡等申讓善述先志實有遺風成其美也恭惟緒言恍焉如在寄之翰墨悲不自勝朕聽政之暇嘗讀道德經文列莊子其書文約而義精詞高而旨遠可以理國可以保身朕敦崇其教以左右人也子大夫能從事於此甚用嘉之夫古今異宜文質相變若在宥而不理外物而不為行邃古之化非御今之道適時之術陳其所宜又禮樂刑政所以經邦國聖智仁義所以序人倫使之廢絶未知其旨道德經曰絶學無憂則乖進德修業之教列子力命曰汝奚功於物又違懲惡勸善之文二旨孰非何優何劣文子曰金積折廉壁壟宜申其義莊子曰恬與和交相養明徵其言使一理混同二教兼舉成不易之則副虛佇之懷臣聞立嫡以長古之制也豈以臣有薄效虧失彞章伏願稽古而行臣之願也神器者天下之大寶受與者帝王之大節臣義兼隱犯誠深敬愛凡所上陳理無苟免國家盛德創物垂範雖時始百年而運經厄會陛下振清廟之徽光蕩欃槍之氛慝紹膺永命導揚洪休千載一期實仰元造便欲抗心太素獨善鴻元登平之俗未躋於下武卜代之期輒虧於一簣伏願沛然易慮俯順羣心則區宇永寧人神胥悅若命在必遂誠無所感必將隕越為期竄伏無地卿國在海南遠通朝貢所獻方物深達款誠今賜卿馬兩匹宜知朕意十姓部落比多款附蕞爾都擔敢為背誕以卿忠果令其討伐遂斬首喪元并兒及妻兼復胡祿屋闕啜等五萬餘帳壺漿塞陌襁負而來自非信著遠蕃何以翕然至此邊陲寧謐繄卿是賴雖鄭吉之護南道班超之臨西域無以過焉言念勤勞豈忘鑒寐我與突厥素通婚好和親之道豈自今日頃為小女且緩其期亦可汗之久無報也今者若真心誠請來歲未賒任自擇日當遣公主出嫁可汗遣一王子來此宿衛以申兩國之好豈不美耶三姓葛邏祿首領散爛俟斤等冒涉遠來並平安好卿等一被驅率多歷歲年遂背逆輸忠閒行歸國言念誠節嘉賞良深緣部落初來巳令逐便安置卿等來日大首領及將士巳下並得安穩與否有所事意具狀奏來長孫昕等朕之密戚不能相遵以禮而使凌犯衣冠雖置以極刑未足謝罪卿志氣忠亮為國柱臣宜以剛腸疾惡勿以凶人介意三姓葛邏祿大漠都督特進朱斯陰山都督謀雒匐雞元池都督實力胡鼻等卿積代以來為國藩捍比緣默啜侵擾中閒屢阻款誠遂能改圖不遠而復每思忠節嘉歎實深巳頻遣書當達此意然金山安置雖是舊居未知初來並得好否默啜凶忍神怒天亡豈惟不識朕恩亦乃負於卿等復讎雪恥今正其時度卿等忠勇之誠校彼殘遺之孽取之有同拾芥滅之何異摧枯兵威暫臨必自面縛故命鴻臚卿鄭嘉祚賚告身袍帶等馳往宣慰便與卿等計會乘其衰弱早就翦除如或因循更令聚結非直有妨於此亦是不利於卿進退籌量固在於速其能捉獲默啜者巳立賞格付嘉祚將往宜各勉思以赴朝委今寄卿等錦袍鈿帶并刀子礪石至並可領取朕聞師克在和不在於衆懷遠以德不獨以兵卿等或宿將重名或賢王貴種咸負才略受任邊疆當須勠力同心盡誠報國捨嫌窒隙忘軀立事近得表狀更相異同又請益兵乃非長算自從開四鎮立諸軍控扼有常置額久定即卿等所統蕃漢相兼以之制邊綽有餘裕在乎善用豈藉所加或云突騎施圍逼石城則緣史獻致寇或云葛邏祿徵集兵馬則被虔瓘沮謀進退遂有兩端讒邪必然三至若大將不協小人閒之自保不遑何功可就卿等去日朕巳面諭不謂即今尚猶如此且史獻十姓酋長先拜可汗一方黎庶共知所屬突騎施部落雖云稍衆當應履信思順安可恃力爭高虔瓘頃將嘉言且以忠道此際尤資史獻未可即來入朝蘇祿先是大將軍未經制命今故遣左武衛翊府中郎將王惠充使宣我朝恩冊為國公令職朝序並賜物二千段及器物等務於綏懷得所不欲征討示威史獻前擬發兵葛邏祿其時遣衆慮於勞擾當更審思其中權宜屬在卿等王惠回日一一奏聞昔相如能屈廉頗竟展功業寇恂不較賈復終承教命率由公道匪徇私情明鏡靈龜各以為鑒卿遠貢忠信請獻駝馬朕元默為神淡泊為德稅彼部落則有勞費巳敕有司不令輒受深領厚意宜體至懷突厥煞省表具知往者默啜狂逆為人之蠧又詐降遣使於我求婚我國家不違賞賜無數所在軍鎮為之解嚴遂背信乘虛縱凶深犯損我百姓陷我數州從此之後常行賊計近者梟戮實謂天誅卿能舉前事之非有降和之請但能誠實何慮不依且漢日有呼韓邪是卿族類既率部落來慕中華終保寵榮足為前鑒今契丹奚等輸款入朝皆封郡王各賜公主放歸所部以息其人卿若能來此是成例官榮重功則授財帛賞善斯行此乃國家所餘亦是卿之所要若懷姦設變口順心違應朝不朝以惡繼惡還學默啜自取殘亡想卿解思不至於此也自從松漠郡王殂歿巳遣使弔祭卿蕃部大臣衆情所望事生送死惟義與忠並敦舊好以副深委近得捍藩使薛泰表云突厥殺兒到大雒揚言萬衆欲抄兩蕃左手有急右手不助既在一身得其自勉力捍時須覺察審防姦詐自從默啜破敗殘賊困窮非時遠來冒死邀利以卿智勇制彼狂愚拉朽摧枯不足為喻深思此便以效忠功動靜與宋慶禮等籌度勿失事理天子臨書是為盛業史官秉筆必佇良才著作強記洽聞時議咸許牧州典郡此類何求豈轉要以從間乃回難而就易私願或愜公道若何國家舊與突厥和好之時蕃漢非常快活甲兵休息互市交通國家買突厥馬羊突厥將國家綵帛彼此豐足皆有便宜自三四十年巳來不似舊時法用總緣默啜可汗失信遂令使命不通一口稱和一心即背每將兵馬常抄邊軍天嗔地知人怨神怒身被誅滅豈不由茲今可汗承破亡之遺餘驗違負之得失禍福斯在吉凶可見計合早相依附如何久事遲回仍襲甘涼復行抄劫初聞為惡不能無怪賴自遣使至此通和國家如海之容如天之覆不念既往之過以納將來之誠可汗若實好心求為和好計彼此百姓各得自安斟酌一生更亦何慮若言無準定意有翻覆還似往日可汗又違今時明信不煩更差使命徒再遣往來至於邊疆不任侵掠自當更擬宜審思之卿再承正朔朝貢闕廷言念所懷深可嘉尚又得所進雜物等並踰滄波跋涉草莽物既精麗深表卿心今賜卿錦袍金帶及彩素共二千匹以答來獻至宜領之卿所進女皆卿之姑妹容儀淑麗德行柔婉自非盡節向風何能割恩忍愛然以辭違本俗離別所親念彼遠貢之勞矜其懷戀之思雖阻來意並不忍留今各加其邑號賜之衣服以達朝恩宜知朕意朔川兵馬飛狐要害委卿經略隨事防虞比來東夷頗盡誠款如聞突厥常欲侵漁部落漸移向東固亦須有備預野營團練今正其時卿若入朝誰當處置宜識此意且未須來書吐蕃小寇干我邊鄙頻經喪衄竟不悛懲卿等早懷勇烈久司戎旅各效忠誠暗申計略遠聞決勝嘉慰良深守圭及思順並宜賜紫其立功人敘録具狀奏聞必要據實勿使踰濫今內出緋紫袍卿等領取量功分賞其被傷人仍給醫藥使得安全陳亡人具名録奏當加優贈金城公主遠降殊方砥寧蕃落載懷貞順之道深明去就之宜能知其人而獻其款忠節克著歎美良深所進物等並領得今寄公主多少信物至宜領取所請物並一依來奏文朕君臨㝢縣子育黎元因百姓以為心懼萬方之有罪昔文成遠嫁將以寵光彼國豈無武力蓋取曲成尋以紛紜有侵亭障重以婚姻之故旋師袵席之閒又降金城以敦前好所期疆場無壘書軌攸同更聞權在強臣遂復違約失順干戈未息道路稱歎今有使臣遠來方悉忠誠彌固舅甥之禮萬里如初協和之勤一心逾亮義節可尚情見乎詞朕以公主在蕃親愛之極縱有違負之過詎移骨肉之情深明至懷知得良算至於止戈為武國之大猷懷遠以德朕之本意中外無隔夷夏混齊託聲教於殊方躋含靈於仁壽朕之深旨來使具知劒南去年生羌就戮雖邊將有此舉動是彼使來以前自茲巳後更無討襲諸軍所守侵掠並停今故使御史大夫崔琳往申信約所有陳請咸不相違并所進器物並依數領得今寄多少信物至宜領取所進牛黃及金銀等物省表具知卿二明慶祚三韓善鄰時稱仁義之鄉代著勳賢之業文章禮樂聞君子之風納款輸誠效勤王之節固蕃維之鎮衛諒中外之儀表豈殊方悍俗可同年而語耶加以慕義克勤述職愈謹梯山航海無倦於阻修獻幣貢琛有常於歲序守我王度垂諸國章乃眷懇誠深可嘉尚朕每晨興佇念宵衣待賢想見其人以光啓沃俟卿覯止允副所懷今使至知嬰疾苦不遂祗命言念遐闊用增憂勞時暄和想痊復也今賜綵綾五百匹帛二千五百匹宜即領取惟爾代雄荒服為國藩衛居萬里之外竭一心之忠用能潛應王師克翦悖寇葱河失險青海無波使我威靈遠加由爾誠節克著言念功效歎美良深今冊爾為本國王并賜衣帶至宜領取皇帝問突厥苾伽可汗國家惠綏黎蒸保乂函夏無有遠邇思致和平俾有厥休共登仁壽之域既罹於咎豈忘匍匐之救況可汗久率忠順屢通款誠既和好克修固災患是恤今聞可汗闕特勒沒喪良用憮然想友愛情深家國任切追念痛惜何可為懷今申弔賻并遣致祭可喻意旨薦茲禮物卿僻在遐荒久修誠款情深本國志慕欽風節義著於家邦忠孝兼於臣子言念懇到歎美良深所請各依可知朕意卿素以清直兼之勤幹自委居守每事多能政肅官寮惠及黎庶城隍宮室隨事修營且有成功不疲人力甚善甚善慰朕懷也念卿亡父素勵誠節與善無徵奄至殂謝興言求往軫念良深卿是長嫡當襲父位宜全忠孝以繼前蹤今故遣使持節冊命兼申弔祭朕與可汗結為父子恩義所感骨肉何殊可汗乃信彼小子自生疑阻前後使往非不具論自爾巳來當所迷也使至省表巳變其節過而能改善莫大焉既效忠誠深可嘉尚朕本意相待如初父子之閒更敦前好凡為君須守信義不信則身危若外飾甘言內藏奸詐未能有損終必自傷想可汗通明固不至於此巧言似實深宜察也若忠信不易更復何憂千秋萬歲俱享多福故令中使專達少信悉朕意焉三姓葛邏祿及拔悉密首領部落等卿等上祖巳來忠赤於國往緣默啜背叛遂被脅從非是本心朕深知悉聞卿等首領皆是忠良雖在遠方嘗願歸化具知此意深用嘉之況今突厥天亡事勢如此在於豪傑多被誅夷所有諸蕃各自奔散智者料事不可失時倘或沈吟必招禍患宜即遞相曉諭勸率早來且金山故地水草豐美安置部落還於此處庶事之閒倍令優恤務取安泰勝於往時兼有重賞高官以待卿等今故遣賜宣慰宜悉朕心塞草具腓秋風巳徑張國容會軍實者孰先於此乎國家之情助其費用周旋省覽以慰所懷昔魏文帝詩云西山一何峻高高殊無極上有兩仙童不飲亦不食賜我一丸藥光耀有五色服藥四五日身輕生羽翼朕每思服藥而求羽翼何如骨肉兄弟天生之羽翼乎陳思有超代之才堪佐經國之務絶其朝謁卒令憂死魏祚未終遭司馬宣王之奪豈神丸之效也虞舜至聖捨傲象之愆以親九族九族既睦平章百姓此為帝王之軌則於今數千載天下歸善焉朕未嘗不廢寢忘食欽歎者也頃因餘暇妙選仙經得此神效方古老云服之必驗今分此藥願與兄弟等同享長齡永無限極卿歸心向化守節安邊常獻忠誠無失蕃禮見不善如鷹鸇之逐鳥雀嫉為惡似農夫之除蔓草信義若此嘉歎良多阿布思負恩至深為衆所棄卿能為擒獲送其形骸且此賊投卿本緣窮蹙苟欲延命元非好心卿密察奸謀俾其就戮卿之智略難可比方又聞數男今見在彼種類既惡留用何為倘蘊習頑凶攪擾蕃落處置不及追悔無繇可宜送來絶其後患卿今載巳前俸祿並令京軍給付後慮其遼遠任於北庭請受所請印信並譯語人官並依來表今則別有少物賜卿至宜領取
