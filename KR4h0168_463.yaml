front:
  text: 全唐文欽定全唐文卷四百六十三陸贄四
  hash: sha256:f35f5e7903cffcc97898ad13ffd4220a75c245711d9ffea039c7579503d9c825
body:
  text: 反易天常悖違人紀衆之所棄罔或逃誅李希烈蔑義背恩窮姦極暴謂神器可以力取謂生靈可以詐欺志在凶殘躬行僭竊罪無與比法實難容以君德不修致人於禍究其端本過實在豫不忍蒸黎重相攻戰屢施詔命務欲懷柔抑㣥帥奮發之誠駐諸軍討逐之勢不憚屈巳期於息人希烈曾無悛心益逞驕志虐毒滋甚吞噬無厭惡貫既盈自砥夷滅開府儀同三司御史中丞臨漳郡王陳仙奇忠勇有餘沉毅能斷攄闔境受汚之憤導三軍思順之心唱義一呼㣥情響附廓清氛祲殲戮渠魁驛書上聞函首入獻方隅既乂役戍其休懸賞之科是宜必信其以仙奇為檢校工部尚書兼蔡州刺史御史大夫充淮西節度仍賜實封五百戶應淮西管內將士官吏百姓等頃迫凶威遂從脅制既誅元惡俱是平人除李希烈一家其餘並準前後赦敕原放更無所問其將士等或本屬平盧或久鎮淮右素推忠義纍著勳庸果能叶志同謀輸誠奉順以茲節效良有可嘉委仙奇即以諸色官錢優與宴勞其中首建謀議同斬希烈人等宜並條録聞奏節次褒賞比年以來有潛圖效順節義著明計或未行為賊屠害者亦當審加訪察具事績以聞如有子孫仍並録名聞奏百姓等久經淪陷兼被傷夷遐想凋殘實足哀憫除供當道軍用外宜給二年應被希烈差點兵馬及團練子弟並即放散其本額將士之中有不樂在軍願歸農業者委節度刺史量給逃死戶田宅并借貸種糧優給復終身使之存濟宜令尚書左丞鄭叔則充淮西宣慰使嗚呼往欽哉自希烈叛命于今五年王澤不通下情亦阻所宜宣我信令以釋危疑敷我惠和以慰疲瘵滌清汚俗咸與惟新砥難一方以稱朕意乃者希烈亂常阻兵竊號汚脅士衆殘虐蒸黎朕志在好生誠深罪已為人受恥不忍加兵惟茲一軍代著忠節果殲元惡不替舊勳詢於衆情就拜戎帥人亦勞止期於小康旋乖恤下之方重致喪身之禍由朕薄德俾人不寧撫臨萬邦且愧且悼猶賴將校士旅秉其誠心邦人不驚軍部無撓以茲節效良有可嘉所宜慰安俾洽寬澤應將士吏人承前所有諸過犯罪無輕重一切釋放曠然昭洗咸與惟新其有先請受莊宅財物者各以見管為主將士衣賜節料并家口糧賜等一切並準舊例以時給付不得停減先令優與賞設亦準元敕處分務令豐厚以稱朕懷仍加曉諭各委知悉國之經制儲畜備災雖遇凶年人無菜色時或弛征散利務穡勸分徙有以均無因豐而補敗救患之術抑其次焉自戍役繁興兩河尤極農桑日廢井邑為墟丁壯服其干戈疲羸委於溝壑傷夷未復荒饉薦臻歷河朔而至于太原自淮沂而被于洛汭蟲螟為害雨澤夭夭心時稼穡卒癢蒸黎重困然猶徵賦不息征役未寧凍餒流離寄命無所興言感悼焚灼于懷朕聞刑罰失中虐沴斯作致咎之本在豫一人萬姓何辜遭罹其弊兢兢惕畏不敢遑安庶蠲下土之災用答上天之戒其宣武等軍宋亳陳州等節度淄青等州節度河陽懷州節度東都畿汝等州節度潞美軍澤潞磁邢等州節度保寧軍節度成德軍恆深趙等州節度易定等州節度每管各賜米五萬碩所司即般運都於楚州分付各委本道差官受領賑給將士百姓等務令均洽以惠困窮屬軍費方殷國儲尚歉今所賜賑給其數非多猶慮孤惸或未周贍穀價翔貴何能自資江淮之間連歲豐稔迫於貢賦頗亦傷農收其有餘濟彼不足允孚發斂之術且叶變通之規宜令度支於淮南浙江東西等道量置場加價和糴米三五十萬碩差官般運於諸道減價出糶貴從權便以利於人無或勞煩重豫不德方嶽守將實朕股肱恤患分憂與朕同體宜即遣使分道宣慰勞勉將士省問鄉閭有可以救歲之凶災除人之疾苦各與本道節度使商議具以聞奏必精必詳用稱朕意朕以薄德託於人上勵精思理期致雍熙鑒之不明事或乖當百度多闕四方靡寧傷夷未瘳而征役荐起流亡既甚而賦斂彌繁人怨聞上天災降下連歲蝗旱蕩無農收惟茲近郊遭害尤甚豈非昊穹作沴深警豫衷局蹐憂慚罔知攸措今穀價騰踊人情震驚鄉閭不居骨肉相棄流離殞斃所不忍聞公私之間廪食俱竭既無賑恤猶復徵求財殫力疲繼以鞭箠弛征則軍莫之贍厚斂則人何以堪念茲困窮痛切心骨思所以濟浩無津涯補過實在於增修救患莫如於息費致咎之本既由朕躬謝譴之誠當自朕始宜令尚食每日所進膳各減一半宮人等每月惟供給糧米一千五百碩其餘悉皆停省年食支酒料宜減五百碩飛龍廣既馬從今已後至四月三十日已前並減半料京兆府百姓應差科徵配及和市和糴等諸色名目事無大小一切並停公私債負容待蠶麥熟後徵收百司非至切之務如追擾百姓及追勘徵收等色府縣並不須承受其尋常訴訟非交相侵奪者亦不得為理百姓及諸色人等如能力行仁義均減有無賙貸貧人全活數衆者府司具事跡聞奏朕當授以官秩蠲其征徭如縣令勸導有方流庸克濟至夏初已來類例勘會但戶口無減田疇不荒亦以狀聞量加優獎百姓有迫於荒饉全家逐食者其田宅家具樹木麥苗等縣司並明立簿書印記令所由及近鄰人同檢校勿容輒有毀損及典賣填納差科本戶却歸使令復業夫致理之本必在於親人親人之任莫切於令長導王者之澤以被於下求庶人之瘼以聞於朝得失之間所係甚大且一夫不獲辜實在豫况百里之安危萬人之性命付以長吏豈容易哉今甸內凋殘亦已太甚每一興想衋然傷懷非慈惠不能恤疲氓非才術無以賑艱食臺郎御史選重當時得不分朕之憂救人之弊昨者詳延㣥彥親訪嘉猷尚書司勳員外郎竇申等十人咸以器能理道精心究蒸黎之疾苦知教化之宗源輟於周行往涖通邑申可長安縣令鄭珣瑜可檢校吏部員外郎兼奉先縣令韋武可檢校禮部員外郎兼昭應縣令賈全可咸陽縣令兼監察御史霍琮可華原縣令兼監察御史王倉可檢校禮部員外郎兼昭應縣令李曾可盩厔縣令兼監察御史荀曾可三原縣令兼侍御史李緄可富平縣令兼殿中侍御史其有散官封賜者並如故應畿內縣令俸料宜準常參官例均融加給涇陽縣令韋滌潔已貞明處事通敏有禦災之術有字物之方人不流亡事皆辦集惟是一邑之內獨無愁怨之聲古之循良何以過此就加寵秩允叶前規可檢校工部員外郎兼本官仍賜緋魚袋并賜衣一襲絹百匹馬一匹嗚呼積行在躬雖微必著咨乃庶尹其惟欽哉朕聞為君者必擇人而官為臣者罔擇官而處弛張繫於理不繫於時升降在乎人不在乎位朕方抑浮華以敦教稽言行以進人非次之恩以待能者彰善黜惡期於必行凡百君子各宜自勉朕巡狩山南自春涉夏師旅殷會日費既廣州閭杼軸歲計其空東作妨時西成罕望雖黽勉從事人不告勞而憫悼積衷豫實知愧昨者減其租稅優以復除庶乎有瘳汔用小息洎駕言旋軫躬履畏途絶澗縈回危棧綿亙時經霖雨道阻且長工徒造舟縣人葺路靡幼靡耋莫獲寧居而又齎負糗糧供備頓舍涉于千里飫我六師居人露處以罔依宿麥過時而不穫覩茲妨奪彌增感傷前所復除未足酬恤式敷惠澤以紓大勞其興元府除先優復外宜更給復二年鳳州全放今年稅其興元府鳳州界內知頓及修道路閣橋州縣官將士等並委嚴震類例功效具名聞奏量與甄獎嗟乎古先哲王東征西怨顧豫不德重以勞人補費録勤是有申命長吏明加優諭稱朕意焉自昔哲王以道化下不竭物以充欲不勞人以樹威億兆之心如戴父母兵革不試四方來同苟或昧於德綏務以力勝士旅疲耗蒸黎困窮幸以成功豈云有補李懷光久從戎旅頗著勤勞拔於等倫授以旄鉞誓師河朔奔難奉天有夷凶嫉惡之誠有弭患釋圍之績俾介元帥仍升上台秉心匪彞自砥不類怙衆貪亂附姦脅君朕用再遷幾危宗廟洎股肱宣力賊泚就誅率土之人咸懷奮擊朕獨排㣥議未忍加兵命復官封志期全貸而乃昏迷不返悖慢逾彰殘害使臣侵敗畿甸密邇京邑人愁無聊諭之不悛乃用致討上帝悔禍元臣協謀克集茂勳以夷大難渠魁授首餘衆革心制勝以謀兵無血刃雖事非獲已義在救人而本其所由情深罪已蓋以信誠未著撫馭或乖至使功臣陷於誅戮謂之克敵寧不愧心然以懷光一家法當殲戮念其昔居將相嘗寄腹心罪雖掛於刑書功已藏於王府以干紀之跡固合滅身以赴難之勳所宜有後非常之澤俾洽幽明雖屈彞章庶旌往效大夫君子無我有尤宜以懷光一男為嗣賜莊宅各一所聽住京城仍還懷光首級及尸任便收葬其妻及諸子孫在室女等並遞送澧州委李臯逐便安置使得存立其出嫁女及諸親戚並宜釋放應先陷河中將士等皆嬰迫脅無路申明多是朔方舊人素蘊忠義并幽州涇原將士頃被朱泚脅從收京之時奔竄在彼究其本末情有足矜况能協力同謀舉城歸順録其成效咸與惟新宜一切洗雪勿為瑕纍先有官爵實封者並許仍舊其中首謀效順事績著明者委副元帥條件聞奏別加甄獎河中及同州絳州百姓並經陷賊又久屯軍骨肉流離生業廢棄興言軫念良用惻然宜各給復一年京兆府奉先美原等縣緣與同州接近隨便供運杼軸既繁流亡頗衆委京兆尹即量事優恤條件聞奏仍加招輯使各安存河中保義軍保寧軍節度使并管內諸軍行營兵馬副元帥河中保寧等軍節度度支營田觀察處置等使銀青光祿大夫檢校司徒同中書門下平章事兼太原尹北都留守北平郡王燧惟嶽降生鬱為時傑奉上勵匪躬之節訓師懷盡敵之謀略地無遺攻城必拔發揚以威強寇感激而服叛徒嘉謀屢聞能事畢備朔方河中同絳陝虢汴等州及管內諸軍副元帥河中絳州節度觀察處置等使開府儀同三司行侍中兼河中尹咸寧郡王瑊鑒識精明宇量宏博秉義率衆推誠待人堅制不奪之心亟陳必勝之略輯睦士旅安慰流庸盛德克彰崇功允集惟乃二帥一其誠心奉行天誅同獎王室有崇讓之美有禁暴之能元惡既除全城砥定是加寵命以答崇勳燧可兼侍中仍與一子五品正員官并階餘並如故瑊可檢校司空仍與一子五品正員官并階餘並如故華州潼關鎮國軍節度使開府儀同三司檢校右僕射并華州刺史上柱國武康郡王駱元光邠寧慶等州刺史御史大夫上柱國許昌郡王韓遊王褱鄜坊丹延等州節度觀察使檢校兵部尚書兼御史大夫上柱國東平郡王唐朝臣等並節著艱危功成討伐鎮于衝要隱若長城取彼凶殘進無堅陳比義同德廓清方隅宜增食于真封且延榮于蔭子可各賜實封二百戶仍與一子六品正員官并五品階餘並如故應諸道諸軍同討懷光將士等一自征役淹歷歲時被服干戈略無寧息賴茲勤效是有成功宜並賜三十萬端匹以充宴賞仰度支即般次送赴並各放歸本道仍令所司敘録即超資與改轉其中大將及功效殊尤者委所司速具名銜聞奏先與處分其先在河中將士亦宜依例賜錢宴賞如本是奉天定難功臣準條合給賞者度支即排比支付嗚呼自國家多難二紀于茲朕嗣位七年連兵五載追惟往事悔恨于懷今二孽既誅諸方甫定哀彼淮右獨為匪人其帥不龔其衆何罪朕晨夕惕慮念之甚詳罷征討則阻命止於數州窮戰爭則流禍及於天下利病之勢較然相懸俾人罹殃寧我忍恥今勳賢列鎮疆理有經縱未偃戈足以保境況天地之大無所不容豈令是邦猶隔朝化因茲大慶使洽鴻恩諸道應與淮西接連宜且各守封境非被侵軼不須進討仍委所在長吏明加招諭宣布朕懷李希烈若能歸降待以不死其餘將士官吏百姓等一切並與洗滌與之更新先有官封亦皆仍舊如能去逆效順因事建功理當甄升以示裦勸其所以優賞科條並準前敕處分朕思與海內去危圖安有過自新雖大必宥朗然明信彰示兆人期爾庶邦自求多福無有遐邇咸使聞知三代立制山澤不禁天地材利與人共之王道寖微強霸爭騖於是設祈望之守興榷管之法以佐兵賦以寬地征公私之間猶謂兼澤歷代遵用遂為典常自頃寇難薦興已三十載服干櫓者農耕盡廢居里閭者杼軸其空革車方殷軍食屢調人多轉徙田畝汙萊乃專煮海之利以為贍國之術度其所入歲倍田租近者軍費日增榷價日重至有以穀一斗易鹽一升本末相踰科條益峻念彼貧匱何能自滋五味失和百疾生害以茲夭斃實為痛傷嗚呼朕丕承列聖之緒遐覽前王之典既不克靜事以息用又不獲弛禁以便人征利滋深疲氓致困豫則不恤其誰省憂應江淮并峽內榷鹽宜令中書門下及度支商議裁減估價兼釐革利害速具條件聞奏削去苛刻止塞姦訛務於利人必稱朕意春陽布和萬物暢茂實兆庶樂生之日農夫致力之時今茲吾人則異於是迫以荒饉愁怨無憀有離去井疆業於庸保有乞丐途路困於死亡鄉閭依然煙火斷絶種餉既乏農耕不興若東作夭夭心時西成何望為人父母得不省憂雖國計猶虛公儲未贍濟人之急寧俟盈豐罄其有無庶拯艱厄京兆府百姓並宜賜種子二萬碩同華州各賜三千碩陝虢兩州賜四千碩委州長吏即於度支計會請受差公清仁恤之吏與縣令親至村閭隨便給付仍加勸課勿失農時應諸倉所有遠年粟麥宜令節度更分二萬碩京兆尹即差官逐便般載賑賜貧人先盡鰥寡孤惸目下不濟者務令均給全活流庸嗚呼朕德之不敷誠之不感上帝降割寧丁厥躬元元何辜罹此災害思欲拯救未知其方長人之官寄任斯重所宜極慮與我同憂勉敷惠和以育疲瘵佇聞良術稱朕意焉國家受天明命平一宇內自武德迄于天寶百四十載海內無事崇德廣化澤浸生人時洽和平俗登富教鰥寡孤惸咸得其所鳥獸魚鱉亦罔不寧凡今有生實賴亭育羯虜伺間盜起幽燕率土之人莫保性命肅宗以神武戡大難先朝以仁德紹興運區域再造億兆再康室家離析而復安子孫煦嫗而相長勞來安集垂三十年則我列聖之於天下惠澤深矣朕以寡昧祗膺寶歷常恐不克負荷罔敢怠荒道有未明事多乖謬㣥情壅而不達大信鬱而不彰兩河之間㣥盜連禍朕務除大患靡憚暫勞是以興有征之師問千紀之罪昨以涇原士徒將赴汝郊失於撫綏致使潰叛朱泚乘釁因構異圖肆其狼心誘我蟊賊謂君可叛謂天可欺縱恣凌悖無所愧畏朕失守宮闕出次郊畿九廟震驚萬姓奔駭內省思咎外顧懷慙罪實在豫不敢自蔽意者宗社降祐大警于朕躬夙夜殷憂庶乎有補實賴股肱心膂勵從戎之節方嶽將校集勤王之師赴難如歸見危思奮堅貞勵操何日忘之平巨猾者必仗㣥雄賞茂績者不限彞典保勳庸於帶礪傳爵邑於子孫崇功美名與國終始其諸軍使應到奉天縣將士等宜並賜名奉天定難功臣食實封者子孫相繼代代無絶身有過犯遞減罪二等子孫有過犯遞減罪一等當戶應有差科徭役一切蠲免其功臣己後雖衰老疾患不任軍旅者當分糧賜等並與全給身死之後回給家口十年勿絶如有能梟擒朱泚者即以朱泚在身官爵授之仍加實封二千戶朱泚所有田宅財物悉並充賜其梟擒賊大將已下并節級特加優寵仍各與實封應梟擒人所有田宅財物亦使賜之其餘立功應合授官給賞並準今年七月敕處分其今日已前身死王事者追贈官爵亦稱奉天定難功臣子孫為功臣之家應合襲封減罪蠲免差役等一切同例宣告中外令知朕懷建中四年十一月二十三日自昔多虞順時而動古公避狄兆永祚於岐下高帝徙蜀建雄圖於漢中王蹟所興子孫是奉覩遷居於遐阻知致君之艱難矧天下為家不常厥邑王者所至四方會同崇號設都於是乎在朕遭罹寇難播越梁岷蒸庶煩於供億武徒勤於扞衛凡百執事各奉厥司人皆競勸物以豐給嘉乃成績豫懷不忘今大憝已除京邑甫定將旋法駕展敬園陵眷于是邦復我興運宜其崇大以示將來古者天子省方則問耆年恤百姓以頒慶賜以茂勳勞用宏布澤之恩式慰來蘇之望宜改梁州為興元府其署置官資望一切與京兆河南府同南鄭縣升為赤縣諸縣並升為畿縣見在州縣官各令終考秩至考滿日放選依本資處分耆壽與板授五品官仍並賜緋先已賜緋並賜紫典正等各賜勳五轉百姓除先減放稅錢外更給復一年洋州宜升為望州見任州官亦並令終考秩并諸縣官等各減兩選無選可減者各加三階應山南西道節度下將士除扈從迎駕已經改官者餘並即與甄敘嗚呼古先哲王東征西怨顧豫不德重豫勤人撫心咎已良增愧歎宣示有衆明知朕懷古者天子巡狩之義以考國典以觀人風在時多虞或所不暇乃命卿士使于四方問人疾苦廉吏善惡苟副所任則如親臨在理平之時尚資勤恤當喪亂之際得無省憂朕以不敏肆于人上撫馭失道誠感未孚寇盜繁興阻兵拒命哀哉臣庶陷于匪人顧茲田疇鞠為茂草不念柔復遽命徂征徵發兵甲萬里必至暴露營壘連年不息冒于鋒刃繼以死傷焭丶嫠無依父母廢食存者積思家之怨歿者倍異鄉之痛又以軍費滋廣公儲不充厚取於人罔率厥典科條互設誅斂無常農工廢棄其生業商賈咨嗟於道路軍營日益閭井日空凋瘵日窮徭役日甚以財力之有限供求取之無涯暴吏肆威鞭笞督責嗷嗷黔首控告何依怨氣上騰咎徵斯應疫癘薦至水旱相乘罪非朕躬誰任其責朕自嗣位逮今六年連兵不解已踰四稔雖本非獲已義在濟人而事乃重勞敢忘咎已皆以朕之寡昧居安忘危致寇之由實在於此豫則不德人亦何辜愧恨積中痛心疾首昨者改元施令悔往布新將反側獲安則干戈日弭賦役差減則衆庶就康還定流亡與之休息猶懼思慮未周于庶務誠感未達于遐方一理失中一夫不獲則何以謝天譴致人和俾代豫言其在良弻宜令門下侍郎同中書門下平章事蕭復充山南東西鄂嶽荊南江西淮南浙江東西嶺南福建等道宣慰安撫使嗚呼往率乃職敬敷朕命慰勉征戍勞徠困窮訪其所安察其所弊淹滯必達寃濫必申無憚幽遠而不被無略細微而不恤洎乎編氓比屋咸若朕之躬親股肱惟良豫則有賴其諸道將士並準今年正月一日制嚴備疆界勿使侵擾仍各令本使本將速具名銜等聞奏悉與甄敘其殊功徑節超越常倫別條狀績當特優獎百姓除每年兩稅定額外自餘徵率一切並停課勸農桑各令安業寇難既定漸息干戈朕當躬先簡約庶務節省兩稅之內亦更減除其諸道事緣急切須處分者即與所在節度觀察使商議裁度務合便宜其餘利害還日條奏朕當詳省以擇厥中宣布遠邇咸使聞知朕獲承先顧付以大器懼德不類貽列聖羞虔恭惕厲罔敢暇逸將欲立法齊一致俗和平小信未孚衆心遂阻事理乖當百度失中君臣之間鬱堙不達致寇雖深於罪已興戎猶昧於省躬期靖亂以濟人反勞師而黷武行者被殺傷之苦居者重齎送之勞四海騷然靡有寧處京輦之下杼軸亦空環列之中遣戍殆盡略內以勤遠居安而忘危賊臣誘姦乘間竊發豺狼穢于宮闕士庶陷于塗炭作威肆戮仇視我人萬姓嗷嗷呼天罔告有殞踣以抗節有脅從以假命且一夫不獲辜實在豫朕君臨萬邦作人父母既不克覆育又從而咎之其心愧恥一食三歎退舍內訟介于梁岷庶乎有瘳以答譴戒皇天悔禍宗社降靈腹心爪牙奮謀宣力元惡稔慝脫身逃遁餘黨歸誠率衆欵附掃氛沴而闢閶闔翦鯨鯢以清郊原函夏載寧室家相慶非將士夾輔王室非卿士交修豫違軍旅叶心畢命盡敵豈伊寡昧克復興運戡定大難載感豫懷宜令吏部侍郎班宏充上都宣慰使勞問將士撫綏蒸黎招輯流亡慰安反側朕續整飭法駕擇日還京告謝于祖宗請罪于天地策勳行賞大報忠烈銘功永代與國同休明宣朕懷咸使知悉朕纂奉丕業託于人上仁不被物義不勝姦頌聲蔑聞暴亂連起叛臣希烈竊據淮沂誠則彼夫無良亦由朕之不德撫御之道失之於初師旅一興綿聯莫解服勞者從役不暇受汚者無路自新旱蝗相承穀糴翔貴兵氓餒死十室九空通邑化為邱墟遺骸遍于原野每念於此傷心涕流且自昔勞師靡有不悔以虞舜之聖屈於苗人漢武之強弊於戎虜矧乎德猶不逮力或未全我其永懷求巳自警乃者下哀痛之詔布寬大之恩普天載新殊死必宥然尚勞師旅作扞邊陲有纍歲棄離家室有經時不解甲胄忠雖為國咎實在豫君人若斯寧不知愧賴節將士旅一其誠心奮發武威慎固疆宇遠人思服元惡就誅蒸黎方致於安寧役戍永期於休息懋官以旌善錫宴以勞旋賞不踰時式遵彞典都統檢校司空同中書門下平章事劉從一宜與子孫一人五品正員官鄭滑節度使檢校尚書右僕射李澄檢校兵部尚書曲環檢校戶部尚書李臯兼御史大夫樊澤等並與子孫一人七品正員官都防禦使工部尚書御史大夫賈耽都團練使檢校左散騎常侍兼御史大夫盧元卿兼御史大夫張建封等並與子孫一人八品正員官檢校司空同中書門下平章事李抱真檢校司空同中書門下平章事李納檢校尚書右僕射同中書門下平章事韓滉檢校工部尚書御史大夫田緒咸遣士旅遠赴行營同討不庭厥有成績抱真納滉宜並與子孫一人七品正員官緒與子孫一人八品正員官應與淮西接界州縣本界鎮守及諸道赴行營將士等宜共賜物三十萬端匹以充賞設度支即約據界首及行營軍額分配定數逐便支送仍委本道都統節度防禦都團練使即條録功第名銜聞奏並與甄敘其行營將士仍各放歸本道明加宣諭令悉朕懷三公之職論道經邦序五行之和任百事之理歷代崇重不常厥官天祚皇家茂生才傑比義齊列同寅協恭以德允台階之望以勳當井賦之賜聿應並命式副具瞻開府儀同三司檢校司空同中書門下平章事使持節恆州諸軍事守恆州剌史充成德軍恆冀深趙等州節度觀察處置等使琅邪郡王王武俊秉志沉密臨事能斷忠而致力勇且有仁奮發之初渠魁即戮危疑之際大節首彰開府儀同三司檢校尚書左僕射同中書門下平章事潞州大都督府長史昭義軍澤潞磁邢等州節度觀察處置度支營田等使上柱國符陽郡王李抱真質重氣和內精外朗智窮變化守必以常學本明誠動有攸利謀猷屢告規益孔多皆戮力盡瘁志匡王室陳師鞠旅同討不庭仗大義而萬衆叶心體至公而千里同契合軍於呼吸之際決策於指揮之間并轡載馳執桴親鼓凶徒殄殪河右廓清國家無北顧之虞姦慝阻南侵之計時乃同德厥功茂焉敷五教而阜人均九土以居衆俾爾更踐備揚洪休乃加真實以貽後嗣武俊可檢校司徒同中書門下平章事抱真可檢校司空同中書門下平章事賜實封五百戶嗚呼古人有言曰惟理亂在庶官矧惟輔臣與國同體明朕德命爾其欽承朕嗣位不明輕費尚力謂武可以靖暴慢謂刑可以懲姦邪德之不修亂是用長士馬疲耗蒸庶流離罪非朕躬誰任其咎自去歲遭變再經播遷歷山川之險艱知軍旅之勞苦惟省前過悔恨盈懷追遠事而不及庶後圖之可補以九廟為重而不憚屈身以百姓為心而不專私欲苟可以保安社稷休息甲兵宏濟蒼生蠲省徭賦含垢忍恥豫無難焉朱滔受任薊門纍著誠績委遇既重封秩亦崇臣節中虧自貽伊阻洎賊泚僭竊上京兄弟之親在法無赦朕以罪不相及情有可原待以如初之誠廣其自新之路執迷不復固敗是求蹙喪而歸既困方悟纍獻欵疏深陳懇誠省之惻然良用憫歎雖將相嫉惡之志固所難容以君上懷柔之情未忍拒絶且善莫大於改過德莫盛於好生叛而伐之服而舍之銷難愛人實惟朕志宜委武俊抱真開示大信明加曉諭若誠心益固善蹟克彰朕當掩舋録勳與之昭雪宣告衆庶咸使聞知朕臨御已來連兵不息自經播越方歷險難耳聞鼙鼓之聲目視殺傷之苦由是覺悟悔於興師既省巳以知非亦欲人之遷善至乃歲有再赦事有屢言務於撫綏不憚煩冗冀朕之誠信日布冀人之患難日除每議用兵惻然不忍而賊臣希烈煽禍滔天虐用其人仇視厥衆狼心多忌梟性無親以芟伐立威以猜刻為志朝為昵比夕為仇讎肆其芟夷蔑若草芥馮陵汝海流血盈川侵軼浚郊積骸遍野農耕廢業井邑成墟積彼妖氛發為災癘蕭條千里無復人煙朕哀彼生靈陷于塗炭苟存拯物不難屈身故於首春特布新令赦其殊死待以初誠使臣才越於郊畿巨猾己聞於僭竊酷烈滋甚吞噬無厭將相大臣咸懷憤激繼陳章疏固請除討朕以所行天誅本去人害兵戈既接玉石難分言念忠良遭罹脅制雖欲却陳臣節厥路無由受汚終身銜冤沒代淪胥以逞誠足痛傷宜令諸道節度使每欲進軍先加曉諭今所致討唯止元凶其餘脅從一切不問如能去逆效順因事建功明設科條以示裦勸其以一州降者便授刺史封異姓王賜實封五百戶以一萬人已上降者授刺史封國公賜實封三百戶其餘各據功效節級甄升列爵建官以俟能者朗然明信朕不食言宣示遠人各令知悉朔方諸軍應在河中絳州朝邑將士等並以義烈繼代勳業冠時艱虞以來常濟國難肅宗代宗再復京邑皆是朔方將士之功去歲朕在奉天凶黨攻逼解圍赴急亦賴此軍言念爪牙情均骨肉濟朕危厄感之豈忘頃以懷光背恩自生猜阻熒惑將士汚脅忠良朕頻降詔書再三曉諭皆被懷光隱匿兼亦志有加誣朕之誠懷竟未宣布夙夜自愧寢食不安時屬嚴凝屢頒衣賜豈以懷光一人拒命遂令將士俱不沾恩朕於功臣義存終始其朔方及諸軍應在河中絳州朝邑將士等今年春冬衣賜並準二月二十一日敕緣赴奉天解圍功臣等第給錢物宜令所司并許計料別收貯待道路通流即當時支遣其有歸順者續給其將士等有先賜實封一切準元敕並州給牒委馬燧渾瑊逐分送付其差人請受仍明加宣諭招撫務令忠義之士各悉朕意沮勸二柄國之大綱獎善懲違固不可廢頃者賊臣構亂京邑震騷惟茲土人奔竄無所或從其誘脅遂染汚名或守以純誠竟全貞節昨所司奏議但舉刑章坐纍者各已條疏守節者並未甄異忠正而不報豈朕意焉應在京百司及京兆府長安萬年兩縣去年十月三日見在職事官在城陷於賊中潛藏不受逆命并諸色前資官被僞署官爵頻遭迫脅首末不出事跡昭著衆所明知者並委御史臺訪察勘核其事勿容虛濫仍限今月內具名銜事跡聞奏五品已上及常參官已受替者委中書門下與處分六品已下各減三選不拘考例聽集其未得資被替非時放選仍稍優與處分如已喪亡者並與追贈使恩加存歿以稱朕懷朕自遷越旋於京師將欲請罪祖宗告謝天地所司擇日行有期矣議者多以大盜之後人勞匪居懼愆歲功請俟農隙若俯順㣥議則私懷不安將祗率典章又疲氓重擾夙夜憂惕罔知所裁宜令中書門下與常參官即詳議折衷聞奏朕以寡德君臨兆人憂四鄙之不寧懼一物之失所降心以懷戎狄期息征徭極慮以綏蒸黎冀遂安輯今諸夏嶽牧咸能撫封九姓可汙薦克敦好寰瀛之內其謂小康愛人雖發於朕心濟理實由於藩輔豈惟菲薄所致於茲然獨吐蕃負恩背盟棄約尚勞師旅備禦西陲亦賴方嶽同心簡練傑俊助其防鎮遏彼奔衝數年以來邊境寧謐乃眷靈武實惟雄藩扼東牧之咽喉控北門之管鍵軍懸寇邇地遠勢孤雖無交切之虞須建久安之策朕屬慮於此殆今纍年晨思廢餐暮想忘寐征兵益戌則憚其勞師移人實邊又念其離土朕欲令萬姓各遂所安抑而使人情有不忍中懷結鬱罔知所從古人有言主憂臣憤今朕憂矣將相牧守得不與我同其慮哉此乃忠臣盡規之時勇士建功之日苟宏良算必有其人宜令諸道節度觀察使各於本管諸色人中募能赴靈武鎮守者取其情願重設賞科仍須精選驍雄薄間一作廣延武藝便以本道諸色錢物給付仍優厚裝朿發赴上都每道各據所管州縣多少通計每州所募多不得過五十人少不減三十人若欲將家口相隨便給資糧同發遣如有戶貫在州者蠲免本戶差科其官健到日朕當超資與官至鎮便替朕之此意非務廣兵欲使四方驍雄俱到塞上壯邊城士旅之氣杜戎醜窺伺之心方嶽信臣所當相悉勿令騷擾副我憂人李希烈首亂淮濆又侵滎汴凶威所及罔不脅從百姓既罹於網羅將士兼質其家口哀我衆庶銜冤莫伸雖欲歸降何有自達朕為人父母不克保安遂使忠良橫遭脅汚興言憫悼思惻深衷今王師四臨所至克寸捷將士百姓欵附甚多或棄其鄉園或捐其家族脫身效節良有可嘉特宜撫綏以獎誠效應淮西界內及鄭汴等州將士歸順者委所在節度防禦等使便與收管切加存恤優給資糧仍各具名銜聞奏當與甄獎并給遣衣賜其百姓從賊界內歸順者亦委所在觀察使刺史量以本道諸色錢物賑給令得存濟如情願便住者即配與死戶田宅使營生業若欲赴諸州縣者隨其所之當時給文牒發遣不得止遏所至之處準前優賞率土之內莫非王臣雖陷冠中諒非獲已但能效順即是平人務於招綏副朕所恤李希烈阻兵淮右虐害蒸人朕哀憫無辜橫遭脅制若興師行伐則玉石俱焚所以頻下詔書再三開諭曾無悛草但益憑陵忠勇之徒皆思奮激朕悔於征伐務在含容以一夫無良遂百姓罹禍安人忍恥初是素懷今東作方興麥秋在近儻行侵擾深害農功一方之人實足矜憫應與淮西接界州縣各委本道都統節度都防禦團練等使明申前敕嚴設隄防務使農人遂其耕穫賊若不先侵軼但自保守封疆勿令越境暴犯田苗及有侵掠務宣朝化以洽遠人仍於所在界首明加招諭咸令知悉遷徙家鄉分離骨肉有生之酷莫甚於斯朕撫育兆人庶臻理道懲過不可以不罰原情不可以不矜將推內恕之心用廣自新之路應從李希烈作亂以來諸道所有擒獲淮西生口配隸嶺南黔中等道宜一切釋放歸本道其投降人等權於諸州縣安置者亦任各從所適
