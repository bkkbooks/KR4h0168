front:
  text: 全唐文欽定全唐文卷一百十六晉高祖三
  hash: sha256:323cca032370e41faa675a8f15ea9c74a0d6cda014a09c11fb0feb6932a2cc6a
body:
  text: 鹽鐵度支戶部應監臨主持場院倉庫官吏等制置場務總榷課程將期共濟於軍流免使偏竭於民力嚮者所差官吏鮮有專勤省司録任之時盡言冰蘗及郡府主持之後例縱輕肥莫濟公家但營私室所以處處多聞其逋缺年年空係其徵催固執遷延坐期蠲放每惟此輩並合嚴誅又以開創之初含宏是切既往者巳關恩制今後者別立嚴規或躡前非必難輕恕豈是願行峻法欲致豐財蓋帑藏猶虛師徒甚衆俟期充濟難縱隱欺宜懸畫一之文兼舉必行之令參選之日考驗之閒稍容易則必長奸欺若艱難則或成淹滯今後宜令所司點文書如有粟錯詳酌事理非藏奸隱幸者不要駮放高信曾剖郡符繼宏方參禁職凡於語默合曉規儀豈得輒於內廷恣行私忿肆喧譁而頗甚侮憲法以若無既駭物情尤傷事體苟無懲沮何戒踰違尚示含容止從譴逐高信宜送復州收管王繼宏勒停送義州衙門前仍常知所在朕自臨御寰瀛躬親庶政靜惟師古動欲便民雖物力方虛每牽經費而田疇微損亦欲矜蠲朕見洛京內麥苗今春稍似旱損尋覩魏府奏報境內亦有微傷須聊示於優饒冀克諧於通濟比欲差官就檢又恐生事擾人其洛京魏府管內所有旱損夏苗縣分特於五分中減放一分苗子其餘四分仍許將諸色斛依倉式例與折納所期渥澤以及衆多報告人戶各令悉知王業肇興德音屢降念茲既往屬我維新宜宏掩骼之仁以廣燭幽之德其太社內應收掌唐朝罪人首級並許骨肉或親舊寮屬收葬其喪葬儀注聊備飾終不得過制仍付所司今後正官滿日宜令逐處長吏準元敕預前奏聞必在審擇能官不得朝差暮替如顯有過犯不在此限仍令曉示諸道進策官前攝鄭州防禦巡官前鄉貢明經張休以廉科擢第義府遊心既堅拾芥之勤果契然薪之志而能救斯時病來貢封章覽其所陳甚為濟要旌諸憂國示以寵章王畿式解於褐衣縣簿仍超於常品可將仕郎守河南府伊陽縣主簿漢大中大夫石奮德盛軒裳道光素享萬石休明之祿成一門忠孝之名彰茂實於前修契興隆於景運宗正卿石光贊特上章疏欲示封崇冀表深原式昭豐祚宜贈太傅昔魏舒人之領袖以二揆而解官劉實邦之宗模自三公而遜位所以審去就之常分保始終之令圖成功退身盡善盡美太子少保梁文矩為仁由巳以道事君烈士徇名久輸忠於象闕達人知足堅請老於菟裘東路角巾南窗羽扇爾思高致朕實嘉之進登保傅之班永顯君臣之義可太子太保致仕朕聞王者懷於有仁所以享靈長之運賞延於世所以勸忠烈之臣唐開府儀同三司守太尉兼中書令西平王上柱國岐國公食邑三千戶食實封一千五百戶贈太師諡曰忠武李晟五代孫職以爾上祖西平王昔在德宗皇帝幸梁洋之歲而有保定大功中興返正扶持社稷之力載諸史氏豫嘉乃德曰篤不忘宜升五代之孫俾陟六聯之位光乃前烈煥乎後昆可將仕郎耀州司戶參軍昨者魏府帥臣忽興狂悖河陽兵士小有驚騷巳各命於討除竚盡平於巢窟軍興之際賊計多奸時發細人潛賫蠟彈意在離閒上下點汚忠良朕固無疑人何懷懼近聞尹暉忽然出外不赴朝參又婁繼英誤有傳聞亦茲濳匿且尹暉婁繼英位居班列事合審詳不謂此時偶乖斟酌朕情深軫憫恩在矜寬專遣招攜時議釋放各委家人諸處招喚出來卻令如舊一切不問此後諸處收捉到奸細文字等其捉事人依舊支給優賞其細人畫時處斬文字當處焚燒冀表推誠免令惑衆布告中外咸使聞知仍付所司方枉狴牢又縈疾疹在典刑之自別顧醫藥以何妨實可施行足彰仁憫宜下刑部大理寺御史臺及三京諸道州府或有繫囚染患者並令逐處醫博士及軍醫看於公廨錢內量支藥價或事輕者仍許家人看所有罪犯合據杖責仍痊損日科決修葺河岸深護田農每歲差隄長檢巡深為濟要逐旬遣縣令行看稍恐煩勞隄長可差縣令宜止喪葬有期哀情慘極其或舉樂可謂乖儀始因伎藝苟求遂致澆訛漸起所陳章疏頗正時風宜下有司永令止絶應追尊四廟行事官等追尊四廟式展盛儀行事庶官合頒溥澤貴承光寵共贊孝思宜令銓司準元敕磨勘如守選年深過格及巳合格指授赴任不得并次一選兩選者先與注官加缺三選四選月限不滿衝替下許非時注擬者即相次注官仍須各依資序如不依元敕指揮缺選數多者即仰都省奏聞人子之道祿貴在於及親王者之恩事必從於尊本應內外文武臣寮父母在如子品秩及格與加恩在朝行者父與致仕官母與敘封郡邑號其外四品巳上節度團練防禦使刺史父與致仕官其餘與同正官母與敘封郡邑號如內外官父巳有致仕及同正官母巳曾敘封子品高者更與加進半俸續議指揮如父有職官不在此限餘並準格文處分仍編令式永著常規舉選之流辛苦備歷或則耽書歲久或則守事年深小有違礙格條例是不知式樣今則方求公器宜被皇恩所有選人等宜各令所司除元駮放及落下事由外無違礙並與施行仍令所司遍下諸道起今後文解差錯過在發解州縣官吏進賢受賞備有前文得士則昌斯為急務竇貞固名參閨籍職在禁庭貢章疏以傾心請班行而薦士於可否之際分賞罰之科所貴當人無或曠職今後宜許文武百寮於縉紳之內草澤之中知灼然有才器者列名以奏納其章疏記彼姓名否臧盡達於豫懷用捨免私於公議仍付所司朝廷之制今古相沿道在人宏禮非天降況以方開歷數虔奉祖宗雖踰孔子之文未爽周公之訓冀崇孝行永載簡編所為二名及嫌名事宜依唐禮施行仍付所司將相之崇朝廷所重並輸忠節仰奉宗祧宜旌佐國之功顯示榮家之慶應中外臣寮帶平章事侍中中書令及諸道節度使並許私門立㦸仍並官給并各賜詔書仍據官品依令式處分薛融官居諫署志奉皇圖特貢忠言備彰直道載觀臣節深契朕懷其洛京大內先令葺修今宜停罷御署官員等自前並於中書陳狀引驗文牒擬官承乏之官從權所任例逢興運咸被異恩其閒慮有曾立事功或未親官業宜稍分於殿最將審驗於行藏免興濫進之譏用副當仁之選其御署官員宜令今後於銓司投狀銓司追引點歷任文書分明者申送中書門下以憑旋據逐人御署因由奏擬韓延嗣因別喝見不避路者輒行毆擊致傷人命法寺定刑比不因鬬故毆傷人辜內死者依殺人論蓋徵相類且非本條罪有所疑法當在宥宜決脊杖十八黥面配華州發運務收管朕奄有四方尊為萬乘所務誕敷教化普濟黎元蓋全師致討於妖狂而比戶未臻於富庶仍聞關輔偏屬旱災致使鄉村多有逃竄達我聞聽深用憫傷宜加矜恤之恩俾遂歸還之計應三處逃移人戶下所缺纍年殘稅并今年夏稅差科及麥苗子沿徵諸色錢物等並放其逃戶下秋苗據見檢到數不計是元額及出剩頃畝並放一半仰觀察使散行曉諭專切招攜應歸業戶人仍指揮逐縣切加安撫勉施惠養副我憂勤敕魏府城內馬步諸軍將校員寮節級軍將長行及參佐官員僧道百姓等朕以范延光是明宗舊臣與朕素敦分義因開懷而捨釋果瀝懇以歸明君臣之義宛然金石之言無改亦繇諸軍將士參佐職員同輸歸向之誠共感懷柔之道備觀忠孝深所歎嘉將遍示於渥恩宜先行於慰撫表豫大信安爾衆心應在城官員將校長行今日巳前罪無輕重一切不問范延光巳除授鄆州節度使賜鐵券封本郡王孫漢威等將校等第除授防禦團練刺史巳各別行制敕命使往彼宣賜恩命仍令各取便路赴任恩命未到閒仍且委薛霸充都巡檢使喬謹充副巡檢范延光赴任後即可取便路發赴所任其餘將帥及參佐官吏隨職員並一一分析名銜奏聞當議各加渥澤其應在城馬步軍將廳子指揮散員親從左右義勇先鋒并入馬直有馬步人神勇弩手鄭韜張進手下兵士并薛霸王建遣諸色將校衙隊名額軍都並升為侍衛親軍排連所有今年冬衣見闕綿數巳指揮楊光遠收寨內綿勘會俵散應有先被張從賓脅從符彥饒驚擾及衛州黎陽陷失因茲走入及隔過官員使臣將士等兼自興師以來前後離背軍都住彼者並不問罪其官員使臣等並與録任其將士等各與依舊請受諸軍收管如有入城後遷轉職名者便據見守職名支給請受如有諸色人輒敢恐動並當深罪在城將校及諸色官員應有物業為人請射者並許給還依舊為主先有抽入城義軍並放歸本家如是巳配在諸軍者各隨本人所願如願在軍者即依舊收管願歸農者即放歸本家所有府城四面人戶三十里內與放二年秋夏租稅三十里外委逐縣令佐專切點檢如實曾經砍伐桑柘毀拆屋舍者分析申奏盡與蠲放租稅切仰招攜速令歸業應九月二十五日巳前因事被殺之家不得更有論訟及相讎報妻孥家産巳配沒者並給還如有自去年七月十九日後來曾經在城將校及諸色人請射舍宇等或為配率柴薪或為自要供燒毀拆卻者只據九月二十五日後見在者舍宇交割其有巳破除卻閒未數日不得更有論索如內有屬官舍宇亦仰準此指揮應自去年七月十九日巳前有諸色商旅或城內與城外親情相識應是寄留諸色錢物羊馬牛畜等或經括率或以沒納入官或破罄盡不計是何公私官員寄付並不許更有論索如敢以敕前事相告言及相讎報者以其罪罪之朕方啓基扃務安華夏每推誠而待物日仗信以懷來布茲誓言質諸天地天雄軍節度副使朝請大夫檢校刑部尚書賜紫金魚袋李式可中大夫檢校尚書右僕射亳州團練使金紫光祿大夫檢校司徒貝州刺史孫漢威可檢校太保隴州防禦使天雄三城都巡檢使檢校戶部尚書薛霸可檢校司空衛州刺史天雄軍馬步都指揮使檢校工部尚書王建可檢校司空虢州刺史天雄軍內外馬軍都指揮檢校戶部尚書藥元福可檢校司空深州刺史天雄軍內外步軍都指揮使檢校兵部尚書繡州刺史安元霸可檢校司空隨州刺史習戰講武歷代通規選士練兵其來舊制宜以每年農隙時講武仍準令式處分先許鑄錢切慮逐處缺銅難依先定銖兩宜令天下公私應有銅欲鑄錢者取便酌量輕重鑄造不得入鉛鐵及缺落不堪久遠流行凡為精舍將結勝緣清虛則神亦相依混亂則人皆不重其或偶然乘興率爾棲心鄉村接漁獵之家廛里定屠沽之戶佛雖無染僧豈不輕宜崇釋梵之因永肅人天之化所有自前院宇即且依舊住持今後城郭村坊一切不得創造訪聞朝臣於外州侯伯求其表狀奏薦交親朕以應天順人開基創業大化方流於區宇至公必絶於澆訛私謁不容朝經具舉更茲告諭止在依行今後文武庶官不可更行薦託如有狀書便宜密具進呈觀察使散下諸州亦準此處分尚書禮部歷代懸科為時取士任使貴期於稱職搜羅每慮於遺才其如銓司注官員闕有限貢闈考第人數不常雖大朝務廣於選求而常調頗聞於淹滯每一闕或經纍年遂令羈旅之人多起怨咨之論將令通濟須識從權庶幾進取之流更勵專勤之業其貢舉公事宜權停一年符彥饒張繼祚婁繼英尹暉等皆受國恩悉虧臣節孽非天作戚實自貽尋正典刑屢遷歲月宜示燭幽之道用推掩骼之仁宜令近親任便收葬桑維翰佐命功全臨戎寄重舉一方之往事合四海之通規況賊盜之徒律令俱載此為撫萬姓而安萬國豈忍罪一夫而破一家聞將相之善言成國家之美事既資王道實契人心今後凡有賊人準格律定罪不得沒納家資天下諸州皆準此處分朕恭巳臨民虛心求理務崇儉約以致和平乃眷臣寮悉懷忠義每觀貢助備見傾輸雖嘉奉上之誠宜示酌中之道其寒食七夕重陽及十月暖帳內外羣后進獻宜停周受龍圖立夏殷之祀唐膺鳳歷開酅介之封歷代相沿百王不易朕顯符景運肇啓丕基乃眷前朝載稽舊典宜開土宇俾奉宗祧用推繼絶之仁以示惟新之德宜以郇國三千戶封唐許王李從益為郇公奉唐之祀服色旌旗一依舊制以西京至德宮為廟牲帛器服悉從官給李道牧前為陸渾縣主簿很直求官強詞抗敕厚誣宰輔纍犯乘輿措言孰顧於斥尊搆意只謀其撓政將懲狡蠧須舉典刑宜令決杖配流永不齒録安重榮功宣締構寄重藩維善布詔條克除民瘼遂致寮吏僧道詣闕上章求勒碑銘以揚異績既觀勤政宜示允俞其碑文仍令太子賓客任贊撰進有唐遠自高祖下暨明宗紀傳未分書志咸闕今耳目相接尚可詢求若歲月寖深何由尋訪宜令戶部侍郎張昭起居郎賈緯祕書少監趙熙吏部郎中鄭受益左司員外郎李為光等修撰唐史仍令宰臣趙瑩監修鄧唐隨郢諸州管界多有曠土宜令逐處曉諭人戶一任開墾佃蒔仍自開耕後與免五年差徭兼仰指揮其荒閒田土本主如是無力耕佃即不得虛自占吝仍且與招攜到人戶分析以聞時屬炎蒸路當衝要使命之往來甚衆州府之迎送頗多既有煩勞所宜軫惻自鄴都至襄州沿路州府除專到使臣依尋常迎送外其餘經過并不任迎送
