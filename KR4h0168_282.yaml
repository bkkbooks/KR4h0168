front:
  text: 全唐文欽定全唐文卷二百八十二適幽州人官至雍州司功
  hash: sha256:d80300ded13ec9ed1205da332366bd56409b2ad8f1aa4c8ebc40563c8612d227
  markers:
  - {type: head, offset: 14, content: 王適, id: KR4h0168_NFKB_282-h1, level: 1}
body:
  text: 郗珍黃冠野客白屋寒生仰桂林之一枝猶思對策掩蓬門之三徑無忘偷光但學以資身行不踰短因人之利尚或不為竊鄰之光何居而可必欲三餘不棄百遍無疲原憲弊衣杖藜而非病顏回陋巷飲水而多歡既知讀書應聞對馬與其鑿壁何如聚螢若觀過知仁推情蔽獄朿縕之婦尚未過於黃沙懸梁之夫庶獲哀於丹筆違禮入律理或難容居法徇私斯焉有在鄴縣時炎漳濱地旱三農務切百里情殷方有正於山川故無遺於祠祀思月離之澤南畝徒勤詠雲漢之詩西郊不潤雖土龍矯首不見朝隮而石燕斂翼無聞夜雨劉感頗學師古未達隨時巫人既不假神河伯又非求婦天則不雨女也何辜遂使睇彼江妃莫反淩波之步偶夫精衛長齊銜石之悲斯則抑人憑河事乃非令違法致罪理在可疑古稱列仙自黃帝尚矣或解形默遁或練氣昭升然業與代殊古將今遠聞之者不見見之者不留世智以局守增疑神人以密化為貴故其道彌大其議彌乖非理契冥通精存元覽者不可得而論己尊師趙國贊皇青山里人也族潘氏名師正字子真唐嵩山上清之全真者也尊師體元和之精含太素之氣誕彌之夕景光充廬客曰此天階之祥非世貴者既而生有仙骨幼無童心足蹈龜文手垂過膝風儀盅秀操履幽貞年十二通春秋及禮見黃老之旨薄儒墨之言白雲在天心已遐矣十三喪母氏攀墳柏以泣血伏冢廬而椎心緬維大孝嚴天非負土之義慎終崇德實致福之基大業云季回手謝俗啓金丹之術祈玉清之臺却粒而練肌鬻菁以虛藏身外無影骨間有聲時升元真人王君居在茅山山有華陽洞天㣥仙之府乃負簏潛往結草幽居受祕籙於金壇奉元文於石室王君以尊師名著紫簡業盛黃邱指以所居告歸中嶽於是朅來上國賁趾中經潄陰嶼之雙泉庇陽崖於二室寢冥孤岫垂將十年以其樵歌尚通隱迹或至歷㣥岩以選勝窮絶界而擇幽得逍遙谷者有古仙之迹雄峯晃朗抗升天之階牝谷空濛洞入冥之路於是因林石結茅構燒楓柏而戒淨練松以存精志逸翔雲神合浩氣吞沆瀣以龜息吸矞皇以龍盤青古疑不留丹田已見冥寂五紀邈與代殊想望三清悠然景會上元三年天皇大帝幸洛都晞嵩阜謁三元之洞徵六甲之圖尊師以道有所申貴有所屈竟不屑命對以無為後年巡豫許京屬想太室願言霄極佇降雲軺師仍隱几謝以幽疾至調露元祀月維孟冬天子乃卬運堯心夙整軒御萬騎雲躍六龍天飛清碧瑤之壇訪皇人之道會師於嵩陽觀焉時天册金輪聖神皇帝潛光寶緯佐理瑤房湥祈絳闕之遊遙契紫元之妙霓裝羽從齋心致謁既而皇眷靡斁青溪尚湥乃稅法駕尋元畤風伯淨壑雨師空岩日月按晷以流光星辰環拱而列曜斧紫蘭以舉玉輦闢丹桂而交翠旗天步穆清雲居攸止鴻崖赩以抗室赤松森而環階藥銚絶煙無若火化林扉擁霧有同巢居天皇乃幸結茅御蟠木訪天人之際究性命之元欣然順風歎以頽景睿情遐佇欲罷不能爰制有司就師立觀即於逍遙隱谷建隆唐焉神皇雅尚仙圖永懷祕訣每灑心咨道探賾求真希步景於青元想餐霞於紫府嘗致書曰九宮神祕顧已通於大綱太乙紫房猶未解其湥旨尊師微言盅得祕世莫聞明年仲春上又以乘輿步輦致師於洛城西宮經罼圭之禁林造上陽之仙閣龍香竟路羽蓋駢陰天子側席齋宮虛襟宣室是日八風徵景五雲卿靄萬姓躊躇以聳矚百神翕習而發幽真與聖冥顯與晦接逖聽千古斯其一交者矣尋而瑞節言旋攀石梁之幽阻神眷動思賦瑤池之浩歌遷延永懷旡心而不及疑乃降制命以嵩陽觀為奉天宮苑接隆唐地鄰隱谷左闢仙遊之路右啓尋真之門月陛互於雲扃紫微通於幽幌大帝於是排閶闔施鈎敶超山蹇嵼御嶙峋屏中侍肅外臣若忘天下窅然踰旬後年復降師於金闕亭問三洞之階稽七真之祕神皇親饌金鼎而獻玉廚五芝雲敷八桂霜靡允執天師之禮以旌問道之勤又以功德事咨祈景福乃於太子甲第建宏道之壇老君壽宮立元元之觀二名稟於師口雙榜題於帝筆有制屈德遙統其綱將以光振玉司慶溢瓊府上乃降雲罕幸觀風命百僚敶九部衣冠趨而銅路咽鐘鼓奏而天津沸龍旗鶴蓋紛以揮靃仙童靈妃忽其倏閃須臾聲散景滅若屆殊庭月曙煙飛已尋幽谷斯亦上九不疑之遁反一無迹之行焉其後乘輿屢涉山宮必敶襄野之問尊師湥視絶景不降河宗之居雖甫對雲霓類蓬壺之恍惚而元通夢寐若胥庭之肸蠁永淳元年正月乙未崇朝風霽乙夜雲密忽而有聞若萬籟聚徐而聽之則五音和非大帝之樂聲即元都之仙韻中使具以狀聞帝曰潘師其升乎即日駕幸奉天上謁虛室帝子扈蹕王姬陪輦暨於寒峯戢景旰谷生陰黃竹申悲邱陵有贈尋而高宗厭世乘彼白雲我師寧極獨守元牝後年季夏一日謂弟子曰吾獲保茲嶺於今五十餘年靈異在谷仙鶴滿野俾吾不接萬乘之尊亦庶幾乎輕舉矣今名登元籙身歷太陰升元之言信吾命也是朔之夕辰象麗天鹿鳴㣥山雉雊衆谷翼日師曰吾其蛻矣乃闔門入靜端坐焚香月至於望日臨於甲命香水投青符浴蘭房披紫褐曰反吾淨矣亭午將化留此十旬歸吾石室乃遺形隱景濟神幽欻於時紫氣氛氳以旁燭紅雲蕭索而上延郁行芳藻流晷煙靄之表若有人焉神聖皇帝聞而興感乃降寶命式諡松扃曰去年冬晚軒皇之駕不追今歲秋寒廣成之居又寂以此哀悼情何可任贈大中大夫追諡曰體元先生昭國禮也尊師業尚盅密勤毖幽湥理心事天所寶惟嗇絶聖棄智不曜其光故真感冥期珍圖祕學性與天道不可得而聞也若乃崇標曠迹遐情遠意志摩青雲蓬視紫闥每歎曰大丈夫業於道不能投身霄嶺滅景雲林而疲疴此山以煩世主吾之過乎遂欲東求蓬萊孤舟入海屬天皇敦篤斯道祈款逾湥遲蹰山隅絶策未往既而金格有命鑣轡遺區於戲昔姑射有神人堯輕天下空洞有至道軒屈順風元真高蹤萬古同德何其盛哉尊師有弟子十人並仙階之秀然鸞姿鳳骨眇旡心雲松者惟潁川韓法昭皆稟訓瑤庭密受瓊室專太清之業遺下仙之儔谷汲芝耕服勤於我蓋歷歲紀也昭等永惟尊師靈迹闕一字業高湥邁古而棄世往矣其若之何乃琢石幽山申頌元德其頌曰漢帝得道白日登天赤松度世紫嶽乘煙業祕千古精淪九仙真蹤誰嗣猗吾體元其一體元惟何仙骨天植沖而神秀幼有至德雲性鴻騫冥心龜息元風獨邁白賁無飾其二金陵福地茅山洞天高真雲景終古貞全寥寥太素渺渺升元惟我師友負笈往焉其三始受玉書即入瓊室機先體二道惟得一學備青台化窮丹術餐霞允矣抱景期畢其四元真有命黃邱自理煙駕來歸雲林萃止葆光藏密冥機畏美嵔壘與居象罔而巳其五有唐天子樂我雲仙芝駕羽蓋霓旌鳳旃齋心來謁契道忘筌瑤池一去鼎化千年其六煌煌女希繼天而立黑龍既濟丹鳳攸集宗我仁師緬懷真級紫房問道青元乃習其七元功聿就洞業克成青童載謁絳虬來迎揮神默解臥闕一字霄行去去金闕悠悠玉清其八岩幽碧洞峯秀金臺少君斯舉青子時來貞松雲鬱虛室霞開永言千載歸鶴徘徊其九志愔博州聊城人擢進士第景雲初拜齊州都督河南道按察使徙汴州封北海縣男開元九年留守京師京兆人權梁山偽稱襄王子謀反將殺志愔以悸卒志愔為大理正奏言法令者人之隄防隄防不正則人無禁竊見大理官僚多不奉法以縱罪為寬恕以守文為苛刻臣濫執刑典實恐為衆所謗臣常著應正論以見微志因上之其論曰嘗讀易至萃利見大人亨聚以正也六二引吉無咎注曰居萃之時體柔當位處坤之中已獨處正與衆相殊異操而聚民之多僻獨正者危未能變體以遠於害故必見引然後乃吉而無咎王肅曰六二與九五相應俱履貞正引由迎也為吉所迎何咎之有未嘗不輟書而歎曰居中履正事之常體見引無咎道亦宜然有客聞而惑之因謂僕曰今主上文明域中理定君纍司典憲不務和同處正之志雖存見引之吉難應行之於已余竊懼焉僕斂衽降階揖客而謝曰補遺闕於衮職用讜言為已任以蒙養正見引獲吉應此道也仁何遠哉昔咎繇謨虞登朝作士設教理訓開物成務是以五流有宅五宅三居怙終賊刑刑故無小於是舜美其事曰汝明于五刑以弻五教期于豫理刑期於無刑人協于中時乃功懋哉故孔子歎其政曰舜舉皋陶不仁者遠此非明辟執法大人見引之應乎季孫行父之事君也舉竊寶之愆黜受邑之賞明善惡而糾慝議僭賞以塞違在虞舜之功居二十之一主司得行其道時君不以為嫌此非巳獨處正引吉一作應正而無咎者乎觀魚于棠臧伯正色賂鼎在廟哀伯抗詞言者得盡其忠聞之不加其罪故春秋稱臧氏之正曰積善之家必有餘慶此非異操而聚引吉之所致乎魏絳理直晉侯乃復其位邾人辭順趙盾不伐其國此非正體未變為吉所迎者乎夫在上垂拱臣下守制若正應乎上乃引吉於下而中士聞道若存若亡交戰於胸臆之中一作譎正之門懷疑乎語默之境懼獨正之莫引忘此正之必亨吁嗟乎行巳立身居正踐義其動也直其止也方維正直而是與何往而非攸利何以明之坤六二直方大不習無不利文言曰直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大則不疑其所行也嵇康撰釋私論曹羲著至公論皆以崇公激俗抑私事主一言可以蔽之歸於體正而巳矣禮記曰刑者侀也侀者成也一成而不可變故君子盡心焉若以喜怒制刑輕重設比是則橋前驚馬希旨論人苑中獵兔從欲廢法理有違而合道物貴和而不同不同而一作之和正在其中矣昔任延為武威太守漢帝誡之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠上下雷同非國家之福善事上官不敢奉詔任延雅奏漢帝是其正言此則歸正不回乖旨順義不以忤懷見忌斯亦違而合道晏子春秋景公見梁邱據曰據與我和乎晏子曰此同也非和也夫和者君甘則臣酸君淡則臣鹹今據也君甘亦甘所謂同也安得為和是知濟鹽梅以調羹乃適平心之味獻可否而論道方恢正體之節俟引正而遵度故曰物貴和而不同劉曼山辨和同之義有旨哉若以不同見議未敢聞誨客曰和同乖訓則已聞之援法成而不變者豈恤獄之寬憲耶書曰御衆以寬傳曰寬則得衆若以嚴綜物異乎寬政矣對曰刑賞二柄惟人主操之崇厚任寬是謂帝王之德慎子曰以力役法者百姓也以死守法者有司也以道變法者君上也然則非人臣之所操後魏遊肇之為廷尉也魏帝嘗私敕肇有所降恕肇執而不從曰陛下自能恕之豈可令臣曲筆也是知寬恕是君道曲從非臣節人或未達斯旨不料其務以平刑為峻將曲法為寬謹守憲章號為湥密內律云釋種虧戒律一日誅五百人如來不救其罪豈謂佛法為殘刻耶老子道德經云天網恢恢疏而不漏豈謂道教為凝峻耶家語曰王者之誅有五而竊盜不與焉即行偽言辨之流禮記亦陳四殺破律亂名之謂豈是儒家執禁孔子之湥文哉此三教之用法者所以明真諦重元猷存天綱立人極也然則乾象震曜天道明威齊衆惟刑百王所以垂範折人以法三后於是成功所務掌憲決平斯廷尉之職耳易曰家人嗃嗃無咎婦子嘻嘻終吝嚴於其家可移於國昔崔實達於理體一無體字而作政論仲長統曰凡為人君宜寫政論一通置諸坐側其大概云為國者以嚴致平非以寬致平者也然則稱嚴者不必踰條越制凝網重罰在於施櫽括以矯枉用平典以禁非刑故有常罰輕無捨人不易犯防之難越故也但人慢吏濁偽積贓湥而日以寬理之可以無過何異乎命王良御駟一作駻捨銜轡於奔踶請俞跗攻疾停藥石於膚腠適見鞅一作秋駕轉逸膏肓更湥醫人僕夫何功之有又謂僕曰成法之變唯帝王之令歟對曰何為其然也昔漢武帝甥昭平君殺人以公主子廷尉上請論刑一無刑字左右為言武帝垂涕歎曰法令者高帝之所造也用親故撓先帝之法吾何面目入高廟乎又下負萬人乃可其奏近代隋文帝子秦王俊為并州總管以奢縱免官僕射楊素曰王陛下愛子請捨其過文帝曰法不可違若如公意我是五兒之父非兆人之父何不別制天子兒律乎我安能虧法卒不許此是帝王操法叶於禮經不變之義況於秋官典職司寇肅事而可變動者乎我皇睿哲登宸高視巖廊之上宰衡明允就列輯穆廟堂之下乾坤交泰日月光華庶績其凝衆工咸理聚以正也僕幸利見大人引其吉焉期養正於下位中正是託子何懼乎夫君子百行之基出處二途而已出則策名委質行直道以事君進善納忠仰泰階而緝政諤諤其節思為社稷之臣蹇蹇匪躬願參柱石之任處則遠辭徵召高謝公卿孝友揚名是亦為政煙霞尚志其用永貞行藏事業心迹斯在至如水中泛泛天下悠悠執馭為榮掃門自媚拜塵邀勢括囊守祿從來長思以為湥恥客乃逡巡不對遂無以問僕也迥秀贈秦州都督大寬族孫弱冠應英材傑出舉長安初歷天官夏官二侍郎同鳳閣鸞臺平章事出為廬州刺史景龍中纍轉鴻臚卿修文館學士持節為朔方道行軍大總管終兵部尚書贈侍中鸞臺朝議郎行左肅政臺侍御史上柱國借緋何彥則風標峻遠志懷毅烈學妙㣥言行歸直道營屯河右克贍軍儲校律湟中載清夷落歲寒彌勵終始不渝宜承懋賞之恩允穆增榮之典可朝散大夫左肅政臺侍御史勳如故蓋聞仲弓之德太邱播其英聲休徵之道琅琊闡其茂績是知利之所博非待殖林而貴名之所遵無假列爵而重若乃地兼崇祿門擅清華邁楊氏之五公冠張侯之七葉森森棟幹聞謝樹之生庭落落王褱奇見韋珠之照乘其於裴府君具之矣公諱希惇字虔實河東聞喜人也有若顓頊導昌源於長流有若大費啓洪基於敷土后子保河汾之邑非子據汧渭之封千乘由其克昌三牢所以能霸至如司空領袖吏部清通勢壓八王名高百秩家風祖德亦何代無其人哉曾祖澄字靜慮後魏著作郎諫議大夫散騎常侍金紫光祿大夫汾州刺史諡曰文儀刑雅淡籍甚當時業茂蒸嘗功標彞器祖尼後魏給事中奉車都尉通直散騎常侍贈輔國將軍隨州刺史道著巖廊譽光朝野屬詞留於騎省追旌被於外臺父之隱隨侍御史上儀同三司駕憲二部侍郎扶風河南二郡贊治皇太僕司農二少卿武安郡太守始州刺史通直散騎常侍益州長史會稽縣開國男諡曰安望重縉紳榮兼出內寄隆咨嶽任切象河八命遵其衮裳五等列於蒲穀公承積慶之繁祉稟中和之正性清光初迪照金玉於靈臺雅量甫成鬱松筠於識宇遠慕先王之道繼通賢哲之德宏止水以待物仰高山以立身涯涘莫窺宮牆罕測談諧諷席業優學肆然則幽林之芳必薦於三閣井里之寶自運於十城解褐受普安郡丞轉蓬州別駕君山該博屈伏六安之丞仲舉峻清來從豫州之辟方義比德千載一時除冀州南宮縣令兩河舊殊常之地中冀為絶北之野民俗昌阜政化大行肥野廉問而識賢孔某及庭而稱善徙瀛州樂壽縣瀛壖之境風壤所接人民知方不言自理稍遷雍州鄠縣令王畿之地帝京是屬子羽捨困於櫟陽無伯祈星於緱氏廉能之化復如在昔拜齊州長史歷下咽喉華泉襟帶州將所其四見疑王化合於萬里公銓藻品第股肱邦國百姓乂安一變鄒魯奏課連最已申考功之名奉計京師遽有永明之拜既留郡邸遘疾彌留上藥難逢莫蠲二豎之害中使罕遇不睹十全之術以永徽元年三月四日終於長安春秋六十三逮景龍年中纘戎帝籙禮穆王姬以公嫡孫巽尚主之故乃下制追贈使持節商州諸軍事商州刺史魏后悅平叔之才晉皇貪司空之族寵成外館榮被宗祔惟公豪邁不㣥風韻彌邵澄清內湛英華外發辨瀉言泉韜光於若訥之旨學該書圃晦迹於惟疑之地總六藝之隅奧括百行之樞機質負圭璋門惟軒蓋祖孫流譽聚潁川之德星鄉邑稱高載平輿之月旦威儀棣棣聲望雅雅猶鄧林之徙植若咸池之疏派公之宰樂壽也既去之後吏人追思美政遂為立碣不其頌歌無間於刊勒榆次紀石止事於身後歷職著聞皆此類焉夫人京兆韋氏贈扶陽郡夫人祖恭故上大將軍隨州刺史建安公父仁基故帛丿糸州別駕龍州刺史殷伯兆其帛丿糸構楚傅開其茂緒朱紱隆可及之暉黃金著經藝之績夫人笄纚式典遵寢門之雅訓匜盥有行叶宜家之縟禮言容孔備國史聿修堇荁是奉蘋藻無匱加以湥悟空寂大闡迦維究隨順理開決擇分六姻景行九族式瞻有婦德焉有母儀焉以乾封二年十一月二日終岐州司士官第春秋六十七粵以景龍二年十月二十六日合葬於咸陽之北原禮也嘉耦是合未窮絳縣之壽同穴終窆遽開京兆之阡敕萬年縣令盧齊卿監護葬事并給帳幕手力羽儀鼓吹仍送至墓所贈授制闕一字率禮加於茲日輕車介士盛儀方於昔年有子六人長曰思進位隨縣令贈蒲州長史太僕卿次曰思約位榮州威遠縣令次曰思禮位宋州穀熟縣令次曰思正大學生次曰醫王位太子僕少曰思溫太學生荀氏八龍且知慙德東萊千里不足方駕懷仁服義海內所推曳組簪纓朝中歸美並父疑從運惟疑未及卜宅風煙銷歇霜露霑濡嫡孫巽鴻臚卿駙馬都尉上柱國魏郡開國公行極天經才為世出名題金榜家振玉簫雕軒繡轂結轍於平陽之第青巾紫綬交錯於沁水之園當年之盛如此永慕之心如彼夫計功稱伐里疑藹於舊聞勒銘刊頌義炳乎來裔豈可使栒櫟靡述衛鼎無聲爰訪世親俾敘鴻烈其詞云惟霍之鎮積玉含章彼汾之水神鼎歊光豈獨靈異亦誕賢良培風直上籋影高驤家聲祖德川流嶽峙家聲伊何載於國史祖德伊何冠乎人紀翕習交映芬芳不已公之生也克壯其猷勝衣志立弱歲名遒華如琬炎絶代莫儔郁若蘭蕙亦孔之休如登之堂月將日就詞高文苑理窮辨囿研味風騷掎托科籀一日千里一年三秀筮仕之班應務陟歷為邑纍課列郡成績忘其忮求晦茲矯敵令聞令望如金如錫藏舟易失傳薪不停未聞九轉俄愴百齡功著口實德範明經安仁願誄子玉思銘黑水西流黃山東出季武成寢滕公見日煙隧蒼茫風煙蕭瑟人世雖謝德音可述喬年禮部侍郎景伯子官左司郎中王者之制加田無征蓋欲崇德厚賢安人薄賦眷言彼甲王室作藩既褎德而受圭亦班朝而錫壤且什一而稅周之通法緡算是資漢之舊典萬姓殷阜中外康寧有大夫之家尚苦於征稅法令爰著不稽舊章片言可折斯之謂矣夷吾睿宗時官竟陵太守五土異宜三農是務井田肇啓稅畝斯均非無沃塉之差實為封疆之異顧惟田畯職在主農徵收雖合以時役使宜遵常典安得不供所職有紊彞章將奪三時之功用此八家之力俾務農之士東作愆期使擊壤之夫西成何望必公田不善即過在夫人私稼靡登乃罪招於吏眷言丁欣理或有憑審聽吏詞義將未可今者百城滯訟八使舉繩曠官之責自貽不法之名斯在謙光景龍時人咨故天龍寺者兆基有齊替呼隋季蓋教理歸寂載宅茲山之奧龕室千萬彌亘崖岊因廠增修世濟其美夫其峯巒岌礏丹翠含赮灌木蕭森濫泉觱沸或叫而合壑喧譁者則參虛之秀麗也雖緇徒久曠禪廡荒闃而邁種德者陟降遐險固無虛月焉大唐天兵中軍副使右金吾衛將軍上柱國遵化郡開國公闕部珣本枝東海世食舊德相虞不臘之奇族行太上懷邦由余載格歷官內外以貞勤驟徙天兵重鎮實佐中軍于神龍二年三月與內子樂浪郡夫人黑齒氏即大將軍燕公之中女也躋京陵越巨壑出入坎窞牽攣莖蔓再休再呬乃詹夫淨域焉於是接足禮已卻住一面瞻眺闕一字歷歎未曾有相與俱時發純善誓博施財具富以闕一字上奉為先尊及見存姻族敬造三世佛像并諸賢聖刻雕闕一字相百闕一字莊嚴冀藉勝因圓資居往暨三年八月功斯畢焉夫作而不記非盛德也遵化公資孝為忠闕一字義而勇憔悴以國蹇連匪躬德立闕一字行事時禮順塞既清只人亦寧只大搜之隙且閲三乘然則居業定功於斯為盛光昭將軍之令德可不務呼故刻此樂石以旌厥問其辭曰闕一字鑠明德知終至而忠信孝敬元亨利而總戎衛服要荒謐而乘緣詣覺歸闕三字利貞睿宗時官和州歷陽丞詳夫釋氏大慈能仁廣運一揮慧劍則結嶽峯摧暫駕寶船則流海波息若乃豐牛步坦香象登津福祉夙昭解行先備非功德修淨其有與於此乎浮圖主石亭府果毅田公者孝乎惟孝忠為令德秉武腰文遊仁踐義富潤石室貨積銅山保性里閈榮足知止尊崇法門福求無上奉為七代先亡見存太夫人合家大小敬造石浮圖七級釋迦像二菩薩神王等一鋪爾其索寶幽谷獲炎崇巖異濟北之神期匪河西之馬瑞欻焉搆造不日而成狀雀離之從天猶多寶之湧地虬簷霧舉寶鐸風吟睟容如在神儀儼若炅朝日以舒鑒爍幽霄以放光伏願冥資先霑七代爰以昭祐慶及見存與慧日而長懸同定水之無竭贊歎功德而述頌云惟佛與佛法所皆空能仁富智廣度多功有清信士産積豐崇檀波羅密琬炎雕礱輪高擢露鐸迥吟風睟穆如在與天地終福霑一切於何不隆從願字子龔相州臨漳人睿宗朝拜吏部侍郎開元末以吏部尚書致仕文學闕二字絃歌政聲動則不徑慮乃先闕一字立言宏遠執禮專精升堂入室凜凜猶生餘慶元宗朝官右散騎常侍偉哉英士既烈且忠宿言無諾弊闕八字山氣雄燔臺闕六字良貞景雲二年進士問三雄鼎立四海分魏氏獨跨於中原孫劉割據於南土五勝更襲唯受命以當塗四大居尊咸仗義而稱帝二十八宿指躔次於何方三十六郡列封疆於何所醇化懿綱非無寬猛之規愛國治人自有弛張之度皇皇祖考並建鴻名眇眇子孫俱聞失德為功業之厚薄而存亡之後先至如獻納忠規縱橫武節既自方於樂毅或見比於張良各有其人詳諸史傳所行事迹咸請縷陳對曰漢代崩離三光分景齊氓蕩析九土殊方權備割據於岷吳瞞丕纂圖於冀亠兊火行土德則有攸歸紫色蛙聲豈無兼峙策曰二十八宿指躔次於何方三十六郡列封疆於何所至若畢昴為大魏之郊井絡應庸蜀之分星紀真全吳之野婺女寄於越之精此其躔次也至若常山巨鹿孟德之設教會稽豫章文臺之建國考廣漢犍為之地實夜郎元德之邦星土之殊于是乎在策曰醇化懿綱非無寬猛之規愛國治人自有弛張之度皇皇祖考並建鴻名眇眇子孫俱聞失德為功業之厚薄而存亡之後先者且夫天命不諂帝圖難僭劉既備矣當禪與人此乃事本於元符何止功殊於厚薄祚窮安樂不亦宜哉至於魏主以雄猜之姿虎噬河朔吳王以英威之略鳳起江南欺孤有言貽譏於石勒令圖發論見稱於陸機蜀滅於前吳亡於後物之理也夫何足疑策曰至如獻納忠規縱橫武節既自方於樂毅或見比於張良各有其人詳諸史傳所行事迹咸請縷陳者山川出雲賢豪擇木英英文若見比於留侯桓桓孔明自方於昌國聞九錫而殊議節表純臣荷三顧而知恩身歸奧主命畢空器不其惜哉威餘返旗蓋亦奇矣大者遠者斯焉取斯謹對精意以享敬於展牲率禮莫違洽乎歸胙甲以膚敏典司蒸禴分以貴骨爰封介葛之犧奉乎高堂用入老萊之膳恩必逮下子道或霑其食餘祭示有先神理詎歆其餕末既比慶封之祀難許叔氏之禮閲水成川賢愚共盡因心制禮榮賤同歸甲以慶絶循陔哀纏罷社綵綵其服永謝老萊之歡戀戀厥心空聞孺慕之切三年茹痛寢苫不爽於喪期九族遷風偃草遂行於仁里御史幸持清憲須辨彞章暴勝繡衣徒然忝竊晏嬰縗服罕悟重輕達禮之誠猶迷寧戚之宜安在請從宗黨之好無憚簡書之威始乎冠婚是惟達禮貽之訓誡用肅令儀今昔或違沿革斯別始辨髦而便棄實表成人初結褵而遂行或諧嘉偶甲以將雛襲慶元服就加乙以鳴鳳告祥束薪言往尊奠于禁未虧寧敬之宜姆加其景方昭有行之誨元端素積雅叶禮經甲阼乙宮信於師古或者之告理實無從希顏睿宗朝官右樂丞開元中歷侍御史內供奉遷戶部員外郎散琴書以吟想多六藝之為儀禮緣情而損益樂與道而推移數方窮於大衍射不貴於主皮書斷決以象夬御周行而取隨則廢一而不可猶五材之並施且夫禮者含七曜均兩儀順之則安違之則危故君當廣敬臣亦盡規不害物以利已每謙尊而守卑況復冕旒十二駱馬千羈會同侯伯享獻神祇者焉人無定樂有曲扣羽增智聞商寡欲必除怗懘之音使優柔以自足然後美教化成風俗魯不納於齊人戎辭遺於秦穆太史之職推步萬端或分或至一暑一寒趣乾坤之取舍知運命之艱難亦有宏羊心計小道可觀便人利國下給上安若乃墨妙之場書淫之客轉注別態圓方自適萬仞崩雲千巖落石垂露霑於緗綺飛花散於竹帛觀夫始用契以代繩未有紙而作策何朴略之難同為智巧之所易也大射之禮先王是崇侯以示其所服正無言而審同飲少算於多算或在澤而在宮天子用騶虞之節諸侯歌貍首之風將以合雅投頌褎德進功敢不慎其所舉取制於中恐前功之相棄故少息而未窮良馬四之分鑣用壯平心正體自下奉上周諏則瑤水遐通虞巡則蒼梧可望不遠千里惟君所向寧止過遠前驅逐禽左廣願終功於造父不見遺於師曠繄彼庶藝孰與之倫圍碁好殺夾食無親祈年設漢左道亡秦今我守則以禮動輒隨人為百工之恆式同六律之相循於戲聞先達之格言才難得而具美伊小人其何執效執御於夫子有餘力以學文恐代匠而傷理屬天地之交泰忝侯藩之貢士儻片善而必收敢長鳴于知已獻先天時官倉部員外郎聖人乘時兮里社鳴聖人御宇兮天下平百姓日用而不盡四方風動而化行外鎮武將內羅㣥英既居尊以體道思順文而偃兵何朔塞之醜類尚居邊而屢驚皇赫斯怒授鉞四七告歷登壇選時習吉流紫泥之明誥聞黃石之祕術旌旗翩翻而篲雲刀劍燦爛而含日望元塞而徐邁度青門而迥出天子乃整師旅振威德班列品類巾拂輈勒雜沓參差駢闐逼側隱隱軫軫鏘鏘翼翼鋭兵含氣武士作色後殿未出於朝廷前驅已羅乎郊國大哉聖主乘時而撫內修恩德於以廣文外整兵戈於以克武設魚麗布鵝鸛良將徑卒威武剛斷欲使凶渠斬首豺狼懾竄一勞而逸永清疆畔爾其有征無戰縑緗所陳兵不可恃惟道是親昔周君有敵雖戎衣一解而夏禹將戰反修德七旬前君尚以行化而感迷悛況我皇上聖德通神別有窮途下客流落羈棲書劍不用山川幾迷失路空歎亨衢未躋幸逢明聖觸類歸正既懷投筆之用希遇封侯之聘惟聖有作含靈大庇萬邦以平㣥動咸遂輸琛景集削衽麇至猶且修干羽除戎器懿文德恢武備大閲之禮所以簡車徒謀元帥以虞以度習無不利故冬令有典夏官是司尚黑服建黑旗各率屬以于往昭用衆之在茲擇元辰於仲月得剛日於斯時然後萊田立表斬牲徇陳斾遊旌控高靷百其勇倍其信駢馳翼驅旅退旅進鉦鐸鐲鐃之數物有攸施坐作疾徐之節教無不順咸以律而自勉諒匪高而匪吝才實天生用猶日慎遵蘭防而合禮罷芄野而作鎮邊陲削平天下文明遂以畋而以狩知足食而足兵戎士趫夫呈才逞武將攖戾以雄入顧振旅而盡取公之私之有倫有矩崇七德之豐禁邁三驅而誇詡豈惟兆於熊羆固乃除於猰貐暨夫整衆而入軍容翕習哤聒騰驤天動地岌亦取暌而致用誡猶火之不戢惟皇建中昭明有融止戈為則垂衣是崇混車書於無外尚何施於一戎別有明試疇庸舉惟慙德徵於二柄或不爽於為邦刑於一言庶無忝於觀國
