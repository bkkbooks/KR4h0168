front:
  text: 全唐文欽定全唐文卷六百三十九李翺六
  hash: sha256:29030b134cffa6de3abc6f2397ecd8559756d05f4b1655e726511ccc84feb61d
body:
  text: 公諱朗字用晦當州刺史贈太子少保憲公之長子憲公有文章名於大歷中每為文輒為後進所傳寫公生數歲而憲公歿與弟郁皆伯父母所養稍長好讀書不煩於師年二十一與弟郁同來舉進士其二年既得之矣會有司出賦題德宗不悅宰相喻使減人數故公與十餘人皆黜公以伯父母無子即日歸養於蘇州使其弟畱以卒業由是孝慈之名稱於朋友間以處士起佐江西宣歙浙東三府得試校書協律郎元和九年拜右拾遺上疏請各令觀察使充本道鹽鐵使場監之任悉歸州縣罷去管榷吏以除百姓之患十年盜殺宰相御史中丞傷以免公疏請貶京兆尹殺捕盜吏事皆不行君子壯之累奏時病有不合上意者貶為興元府倉曹參軍三年復徵入為監察御史改京兆府司錄參軍遷殿中尋加史館修撰入省為都官員外郎修史如前出刺韶州復入虞部左司二員外得郎中數月遷權知諫議大夫敬宗御丹鳳門大赦改元宦官毆傷鄂縣令崔發於雞竿下公疏請取其首為者殺之以正法寶歷元年改御史中丞殿中王源植貶韶州司馬公面諫其屈不得請凡五上疏自請罷去敬宗不許上即位遷工部侍郎太和元年八月以為福建等州都團練觀察等使兼御史中丞公瘡發於背不克入謝病二旬九月壬子以瘡卒年五十三天子為之廢朝贈右散騎常侍有子孟常生九歲矣夫人京兆韋氏給事中貞伯之女未仕而夫人卒十月壬午其姪庠以公之喪歸祔河南之壽安甘泉鄉先公墓次以十月己酉窆銘曰人之有生莫不皆死曰長曰短相望其幾短不足傷長不足恃要歸於盡孰有彼此公壽何迫百年中止喪車東去託骨山趾室無妻哭祭有稚子令名不忘曷其有已由楊喜追殺項羽以功封侯後數世生敞官至丞相敞曾孫寶不應王莽之命光武特徵老病不到寶生震諸儒謂之關西孔子位至大司徒太尉卒以忠死楊氏由是益大載於史傳世不絕人曾祖珪辰州司戶贈膳部員外郎大父冠俗奉先縣尉贈吏部郎中父太清宋州單父縣尉累贈至太保公諱於陵字達夫年十八舉進士第選補潤州句容主簿鄂岳觀察使奏為判官轉左驍衞兵曹累改評事監察御史歷殿中得緋衣銀魚使遷江西公隨之加侍御史著作郎及府除屏居建昌不至京師貞元八年徵拜膳部員外郎轉考功知別頭舉轉吏部員外郎及判南曹宰相之親有以文書不足駮去者宰相召吏人詰之堅執不改遂以公為宣武弔祭使故事南曹郎未嘗有出使者公既出宰相之親由是判成矣故公卒不得在詔誥之清選遂為右司郎中郎官惰於宿直臨直多以假免公白右丞建立條例郎官不悅為作口語宰相有知其事者遽以公為吏部郎中改京兆少尹出為絳州刺史有言公弗當居外者德宗召見遂以為中書舍人其年知吏部選事時京兆尹李實有寵去不附己者故給事中許孟容為太常少卿而公改祕書少監德宗崩為太原幽鎮等十道告哀使持節之遺並辭不受復命除華州刺史賜三品衣魚所取賓僚皆一時名人後皆顯官有至宰相者其年冬遷浙江東道團練觀察使越中大饑人至相食公奏請度支米三十萬斛又乞糴他道以賑救之民得生全入為戶部侍郎未到改京兆尹奏請諸軍使有犯罪者皆禁身推罪以狀牒送本軍又請屬諸軍諸使人置挾名勑五丁者推兩丁屬軍遞立節限以便於治詔皆可其奏京師稱之復為戶部侍郎人望益重僉以公遂為宰相會考制舉人獎直言策為第一中貴人大怒宰相有欲因而出之者由是為嶺南節度使是時得考策者凡四人公既得嶺南員外郎韋貫之再貶巴州刺史而李益鄭敬皆抵於患其在廣州以韋詞為節度判官任之以政改易侵人之事凡一十有七嶺外之人至茲傳道之節度使徐申以己俸薄月加三十萬且曰後來所期共守公引常衮所奏勑皆罷之撤去蒲葵陶瓦覆屋遂無火災民賴以安監軍許遂振好貨戾彊而小人有陰附之者故遂振密表譖公直言韋詞李翺惑亂軍政於是除替罷歸遂振既領後事捶撻吏人求公之非吏人大聲呼曰楊尚書他方所遺尚不收去豈有侵用官錢乎遂振遽令取他方所遺及其既至封印不啟遂振慙而止宰相裴垍素未知公及遂振之譖遂以公為吏部侍郎重修甲勑用備姦源又於南曹更置別歷以相檢覆奏令選人納直為出籤告以給之吏息姦欺官收羨錢公食豐絜廨宇以修迄茲守行遂為故事凡歷四年補內外官三千餘員皆當其分無怨訴者轉兵部侍郎兼御史大夫判度支當淮西用兵漕輓供饋鹽鐵積欠官錢與之廷辯高霞寓以唐鄧之師攻蔡州怯懦不敢直進欲南抵申州出於空虛不守之地其路險狹糧運難繼公面於上前累言利害并以疏陳霞寓逗遛之狀請於北道直進足以援許汝之師賊勢自蹙上許之霞寓深怨之遂內外結構出為郴州刺史霞寓果敗由是談者知公之寃其為郴州躬勤於治不以卑遠為薄明年召拜原王傅數日又為戶部侍郎復知吏部選事元和十四年淄青平兼御史大夫以本官充東平宣慰處置使是時初誅李師道得亠兊鄆州等十二州列為三道劉悟既除滑州猶未出鄆及公至悟出迎公促之悟即日遂發頒行賞賜皆得其實上甚悅謂宰臣曰楊某不易得及浙西觀察使李脩死上問宰臣崔㣥皇甫鎛曰何不進浙西人名皇甫鎛知公方有恩懼作相遂言公所至皆有理績以臣所見莫如楊某凡數百言上惟以一字應之曰惜人聞之者且以必為相矣是時裴門下既出太原崔中書為鎛所譖鎛又改尊號中上旨故鎛計竟行而公不相矣明年遷戶部尚書又一年改太常卿又一年改東都畱守兼兵部尚書御史大夫充蘄汝都防禦使既三年方將告休會以疾而罷乃嘆曰年老致政本吾夙志茲則負吾平生心矣疾平遷檢校左僕射兼太子少傅或勸求分司以自便者公曰年至力憊便當乞骸骨於朝何用分司為遂西至京師朝謝訖不到中書遂還私家不判上案三上表乞自退詔遷左僕射致仕全給俸料數月上表固讓乞就半俸許之廟享之外不復經過人家每佳辰體安則以子弟孫僮侍遊於園沼之中用以為適太和四年十二月癸亥以疾薨於新昌第享年七十有八天子為之廢朝凡朝廷之賢設位而哭者不知幾人冊贈司空明年四月庚午歸葬鄭州滎澤縣先太保之兆祔於潁川韓氏贈華陰郡太夫人之塋夫人丞相少師休之孫丞相晉國公滉之女柔順之德紀於前銘下從舅姑四十有三年矣子景復衞尉卿曰嗣復戶部侍郎曰紹復舉進士登宏詞科曰師復未仕用文為業女適右司郎中韋公素孫承渙試大理評事鄜坊節度巡官承渙之下及在童稚者十有一人大卿侍郎以翺之受恩也久來請為誌銘曰公生六年太保棄捐未及成童虢國又終漂泊江湖誰食誰衣服習文學不勞於師爰始有名既於永歸六十一年祗慎德儀由直屢黜進無異詞凡所臨莅去而可思與之厚者莫匪雋材自我進者多遇良能恩建葭莩濡洽以財袒免緦麻亦盡其哀止足告歸偃息邱園子裔孫童十有五人有列卿曹貴為侍郎祿秩且多膳飲馨香門吏諸生中外顯光車馬盈門歲時之良既壽且貴示終以常福薦攸歸疇可比望為廟太祖百世蒸嘗公諱某字盧符宣州刺史元慶之曾孫著作郎贈少府監恬之子公九嵗貫涉經史魯山令元德秀行高一時公往師焉魯山令奇之號公為馬孺子為之著神聰贊由是名聞中書令郭公子儀奏為懷州叅軍充四鎮伊西庭節度巡官從事河陽三城河東三府累轉試大府丞因得太原府倉曹黜陟使裴伯言謂公堪為諫官薦之於朝拜殿中侍御史充昭義軍節度叅謀召為太子左贊善大夫遷主客員外郎使於海東復命授興元少尹入為將作少監改國子司業遷祕書少監又加史館修撰元和十三年十一月己酉寢疾卒公博覽多藝奕碁居第三品家貧未嘗問生業祇以纂錄自樂為事撰歷代紀錄類史鳳池錄纂寶折桂錄新羅紀行將相別傳及所為文總四百八十八卷年登八十官貳祕書職領太史雖不極於富貴亦儒者之難及也夫人潁川陳氏贈潁川郡君先公終三十年餘矣有子七人曰文則由進士補錢塘尉第二第四子文範並早卒曰文同曰文約讀書著文有名於進士場曰文輿曰溪郎皆恭守家法女五人其存者三人未笄文同等奉公之喪以明年二月祔葬於偃師從先塋謂翺嘗從於史氏之列來請為誌元和九年歲直甲午正月十九日丁卯浙東道觀察判官將仕郎試大理評事攝監察御史李翺奉其叔氏之喪葬於茲叔氏諱術生子曰王老遠在京師翺實主其事銘曰翺生始言叔氏棄歿爰殯於野年周四甲豈無諸親生故或迫亦有息子旅宦京國邱墳孰封松檟未列殯宇零毀狐狸所穴中夜遠思酸悽心骨是以乞假公府言來筮宅追念延陵喪子嬴博葬不歸吳於禮其合唯叔平生游居是邑夭謝於此靈幽其託女姪之西仲兄之北冥昭何異可用居息孰為故鄉乃樹松柏君諱佶字叔正樂安人殿中侍御史元植之孫靈府功曹日新之子君少遭父喪養母以孝稱京兆尹崔光遠表試左清道率府兵曹參軍勅攝富平縣尉知縣事及克復京師以功授成都府犀浦縣丞又以優授涇陽縣尉會吐蕃犯都代宗幸陝州君召募吏人保守佛寺寇不敢逼擢為本縣令充渭北十縣團練使及駕還京為同列潛搆功不得論僕射裴冕冤而奏之得長安縣尉轉本縣丞歷太府寺丞未幾遷監察御史京畿館驛使判官中書侍郎元載為潭漕使請為判官轉殿中侍御史又檢校工部員外郎兼侍御史判官如故元載得罪君左授建州建安尉及楊炎入相君以書戒之由是楊怒而不用又移虔州司戶再授信州司馬觀察使鮑防以為判官權知饒州事遘疾歸卒於信州權窆於州西原有詩兩卷前娶宗王氏女生男冀為邠州司法參軍三女各為士妻後娶杜氏女生子三人曰溆曰羨曰幷女五人長女嫁長洲尉源咸季次女適權㯋三女早卒少女二人未許嫁溆歷佐大府以吏能有聲為度支振武營田使得試協律郎攝監察御史元和十四年杜氏卒溆乃自信州奉府君之喪合葬於萬年楊村從先人舊塋溆嘗與翺同事嶺南府翺知溆之才亟薦於時故溆來請誌銘曰士生於時兮所貴者才有才無命兮古今所哀噫公諱儒衡字庭碩年二十四得進士第歷四門助教故相鄭公餘慶尹河南奏授伊闕尉充水陸運判官及鄭公守東都又請自佐得監察御史轉殿中御史臺奏其材詔即以為真歷侍御史司封員外郎戶部郎中遷諫議大夫三月以本官知制誥歲滿轉中書舍人二年遷禮部入謝賜三品衣魚數月丁尊夫人憂再期服除權知兵部侍郎月餘母夫人暴卒公一號絕氣久而乃息遂得重疾不能見親友既祥益病長慶四年四月壬辰竟薨年五十六公氣和貌嚴望之若神言不妄發與人有誠甫其相信不用約結每以時安危生民之病為己務從父兄元衡再為丞相以重厚名終始公實潛有補助其為諫議舍人每遇事不當必奏疏盡言皇甫鎛為相剝下以媚天子給邊兵衣食以不可用物兵士或以火燔之其帥大哭將自刃者邊幾亂公累以疏言憲宗召問大悅踰月鎛竟罷度支及大行皇帝即位鎛遂斥死崖州其為兵部纔數十日凡議論者潛曰武兵部必相矣蓋上擇日將相之而公以喪免有文集二十五卷制集二十五卷曾大父載德潁川郡王左羽林將軍大父平一懲后族之禍逃官於崧山中宗初徵拜起居舍人考功員外郎有文章傳於當時父登常州江陰縣令贈禮部侍郎夫人隴西李氏先公卒嗣子曰籌年十五次子年十三女二人長女許嫁盧立立良士為興元節度司空晉公從事次女嫁前進士崔搏搏有學行其從父子渾以五月丙子奉公之喪歸祔河南緱氏禮部先公之墓次公之先薨召其友禮部郎中李翺執臂以別且曰我將死凡家事細大皆有條畫在文字矣平生志業於此窮矣公於我厚我死公其銘吾墓以傳焉既十二日而公果歿君子以為知命及薨朋友之在位者皆請告泣哭以相弔其不識者亦望風以嘆天子罷朝一日贈工部尚書籌尚幼哭泣幾絕親戚不忍聞其聲其能奉遺命以終訖公意銘曰武宗出周聖發之苗厥孫聘魯乃列春秋秦漢之交曰臣王趙實大其家亭侯以紹厥支十七晉陽乃封子孫因家以及於唐神堯順天酇侯翼扶武烈諫酷五木成盧考公逃貴於嵩之下江陰潔白世嗣其雅德蘊位細慶叢於公惟公之興罔不自躬言不苟出與人有誠名譽四延震蕩厥聲再罹大苦不堪以病先期告終恬以順命毅毅武公是維碩人我哀刻識俾或可傳府君諱則字某涼武昭王十三世孫大父獻眉州別駕時宰相有請昏者力不可止因去官居家弟遇疾暴卒別駕燒一指以禱於神既而弟復生自說方就縶上帝有命以兄燒指宜復其生別駕生令一侍中源乾曜以子求婚府君拒之固以詞抵之貶黔州彭水尉遂以壽終府君始十餘嵗先夫人以之從喪歸殯汝州由是依於舅族少好老子莊周之言與㣥童遊盡能記他童之所習先夫人學左氏春秋博該百家之書故府君以經史浸潤力田供養由是少不肯求仕善草隸書弓矢博奕皆得其妙既冠得濠州定遠尉假令他縣令嚴而行吏急民寬富豪并貧民之產而不稅者盡以法治之貧民用安罷職復返其初從事嶺南得試左武衞兵曹於福建得試太子通事舍人大理司直授歙州長史宣歙觀察使請為判官奏未下以疾卒年七十四夫人河南元氏壽州刺史從之女年六十八先府君而終生子某子某皆未仕卒女子五人長女壻禮部員外鄭錫次女壻桂州觀察使杜式方次女壻京兆韋放次女壻滎陽鄭循禮小女壻密縣尉鄭公瑜幼子克恭少讀書學文以兄舉進士家事自飭弗克求名故年四十六始奏授睦州司兵累遷試大理司直兼殿中侍御史充鹽鐵推官寶歷三年三月克恭奉府君夫人之喪歸葬於鄭州某縣岡原翺知克恭之材十三年矣故克恭以府君之葬來召請且曰將以六月庚申窆知克恭者若吾季叔又安可以辭銘曰德不稱祿鬼神之責材優以賤古人不戚非道弗求曷計人爵慶蘊而傳後必有積其葬為誰孝子之卜蓍蔡僉吉嘉原剏擇合骨於茲終永其託何以識之有松有柏君諱士瓊字德卿范陽人家世為甲姓祠部郎中融之長子明經及第歷寧陵華陰二縣主簿知泗州院事得協律郎鄭少師之畱守東都奏為推官得大理評事韓尚書代為畱守請君如初尚書節將陳許奏充觀察判官得監察御史府罷歲餘除河南府戶曹以疾免河南尹重其能奏為司錄參軍八月癸酉發疾而卒年六十九君少好著文精曉吏事少遊故丞相楊炎張延賞之門楊美其文詞張每嘆其吏材過人嘗攝職同州當徵官稅錢時民競出粟易錢以歸官斗至十八九君白刺史言狀請倍估納粟下以澤民上可以與官取利刺史詰狀君辯其所以必然刺史行之民用得饒未一月果被有司牒和收官粟斗給六十後刺史到欲盡入其羨於官君既去職猶止之曰聖澤本以利民民戶知之不可以獨享刺史乃懸榜曉民使請餘價因以絹布高給之民亦歡受州獲羨錢六百萬其為戶曹決斷精速曹不擁事及為司錄始就官承符吏請曰前例某等一十五人合錢二千僦人與司錄養馬敢請命因出狀君訶曰汝試我耶使拽之將加杖承符吏眾進叩曰前司錄皆然故敢請君告曰司錄豈不自有手力錢耶用此贓何為因叱出之召主饌吏約之曰司錄判官文學參軍皆同官環處以食精麤宜當一不合別二無踵舊犯吾不恕及月終廚吏率其餘而分之文學參軍得司錄居三之一君曉之曰俸錢職田手力數既別官品矣此餐錢之餘不當計位高下從此後自司錄至參軍平分之舊事掾曹之下各請家僮一人食錢助本司府吏廚附食司錄家僮或三人或四人就公堂餘食侵撓廚吏弊日益長君使家僮二人食錢於司錄府吏廚附食家僮終不入官廚召諸縣府望吏告曰某居此歲久官吏清濁侵病人者每聞之司錄職當舉非法往各白汝長宜慎守廉靖以澠池令為戒其所改易皆克己便人堪為故事及君卒士君子相弔哭咸以為能高而位卑不副有子三人孺方嗣宗嗣業號慕祗守不失家法女二人前娶清河崔敏女無子後娶滎陽鄭虬之女有子故皆祔葬於祠部塋東北孺方叩頭泣曰丈人嘗與先子同官而遊宅居南北鄰敢請紀石翺不得辭乃據所見聞者鐫其實可推類以知凡所從事之賢銘曰嗟盧君性直而用優約己以利人宜壽宜貴以拯時所艱其緘而不伸以喪厥神豈奪惠於東民悲夫侯高字元覽上谷人少為道士學黃老練氣保形之術居廬山號華陽居士每激發則為文達意其高處駸駸乎有漢魏之風性剛勁懷救物之略自儕周昌王陵所如固不合視貴善宦者如糞溲與平昌孟郊東野昌黎韓愈退之隴西李渤濬之河南獨孤朗用晦隴西李翺習之相往來汴州亂兵士殺畱後陸長源東取劉逸淮乃作弔汴州文投之大川以訴貞元十五年翺遇元覽於蘇州出其詞以示翺翺謂孟東野曰誠之至者必上通上帝聞之劉逸淮其將不久後數月而劉逸淮竟死其首章曰穹穹與厚厚兮烏憤予而不攄翺以為與屈原宋玉景差相上下自東方朔嚴忌皆不及也達奚撫為楚州起攝盱眙祭酒李公遜刺衢州請治信安其觀察浙東又宰於剡三縣皆有政不幸得心疾畱其子狗兒於翺家而歸廬山不到卒江西其子壻王適使傭吉勉求君所如值君卒吉勉以君喪殯於袁州之野而復於適適又死適之妻使吉勉來告於翺翺以狗兒歸適妻居二年適妻又死狗兒尚童翺慮吉勉之短長不可期則君之喪終不墳矣故使吉勉往葬之而識其墓以示狗兒年月日故懷州錄事參軍武氏妻傅氏卒於其兄弟之家越月日權葬於汴州某縣某鄉前此者武居官而卒傅氏有子曰俱兒俱兒奔父之喪未及返傅氏又卒俱兒奔父之喪孝道也傅氏卒於兄弟之家戀母也傅氏戀母其教施於子傅氏之歿不為朽矣夫人姓京兆韋氏尚舍奉御說之次女也年十三執婦道於昌黎韓氏府君諱弇自後魏尚書令安定桓王六世生禮部郎中雲卿禮部實生府君進士及第朔方節度請掌書記得祕書省校書郎累遷殿中侍御史貞元三年吐蕃乞盟詔朔方節度使即塞上與之盟賓客皆從其五月吐蕃不肯盟殿中君於是遇害時年三十有五夫人始年十有七矣有女子一人其生七月而孤夫人之母前既不幸矣夫人以其女子歸於其父弗數年其父又不幸夫人泣血食貧養其子有道自慎於嫌節行愈高雖烈丈夫之志不如也猶有董氏姊繼衣食仁之焉不數年董氏姊又不幸夫人於是天下無所歸託矣殿中君從父弟愈孝友慈祥貞元十六年以其女子歸於隴西李翺夫人從其女子依於李氏焉降年短命三十有二貞元十八年八月甲辰卒於汴州開封新里鄉之某村其明年正月辛酉隴西李氏以其喪葬之於陳畱縣安豐鄉岡原殿中君之先葬於河陽惟君之沒不得其喪夫人是以不克葬於河陽而獨墳於陳畱弗克祔於殿中君之族而依於女子氏之黨以從女子之懷權道也且將有待也殿中君文行甚修位甚卑沒於王事初禮部君好立節義有大功於昭陵其文章出於時而官不甚高殿中君又無嗣嘗聞諸君子曰位不稱德者有後禮部君曷為然哉於是敘其孤女之悲以誌於墓門銘曰女子之生兮七月而孤所恃者母兮夫何辜天蒼蒼兮不迴生幾時兮終日哀曾祖仁徹隋吉州太和縣丞祖元之皇考功員外郎贈吏部郎中諫議大夫考義皇汾州司戶參軍贈信州刺史京兆府萬年縣青蓋鄉交原里東海徐公年七十二公諱申字維降東海剡人永泰元年寄籍京兆府舉進士祕書省正字初辟巡官於江西又掌書記於嶺南行營哥舒氏之亂平奏授大理寺評事轉司直兼監察御史賜緋魚袋又充節度判官於朔方改太子司議郎兼殿中侍御史選授洪州都督府長史時刺史嗣曹王舉江西兵討李希烈故以長史行刺史事任職有成曹王薦之遷韶州刺史四十餘年刺史相循居於縣城州城與公田三百頃皆為墟縣令丞尉雜處民屋公乃募百姓能以力耕公田者假之牛梨粟種與食所收其半與之不假牛犁者三分與二田久不理草根腐地增肥又連遇宜歲得粟比餘田畝盈若干凡積粟三萬斛將復築室於州故城令百工之伎以其藝來者與粟有差刺史臨視給與吏無所行其私以故人皆便信應募者數千人陶人不知墁而塗有餘圬人不板築而牆有餘築人不操斤斧而工有餘陶者圬者築者工者各以其所能相易未十旬而城郭室屋建立如初刺史以官屬遷於新城縣令之下各返其室創六驛新大市二道四館器用皆具曲江縣五百人以狀詣觀察使請作碑立生祠公自陳所為不足述假令如百姓言乃刺史職宜如此何足多者不願以小事市名觀察使嘉其讓密以狀聞遷合州刺史其始來也韶之戶僅七千凡六年遷合州其去也倍其初之數又盈四千戶焉初先夫人歿於江西遭賊難未克返葬寓於西原公不赴合州表請奉喪歸祔於河南偃師縣既滄景觀察使奏請景州刺史闕其帥輒以其僚屬將校自為之不請有年矣宰相累進刺史名皆不出及召公入言合上旨遂下詔遷朝散郎使持節景州諸軍事景州刺史充本州團練使兼御史中丞賜紫金魚袋尋加節度副使其明年滄景節度使始朝二年又朝遂畱詔以其從父兄代之奏以公充行軍司馬公遂以信州府君塋近漕河表求改葬於重山詔許之既徵入京師遷朝散大夫使持節都督邕州諸軍事守邕州刺史本管經畧招討使御史中丞賜紫如初是歲貞元十七年也詰俚盜除其暴掠良聚攻禁下如令通蠻夷道責土貢大首領黃氏率其屬納質供賦黃氏周氏韋氏儂氏皆㣥盜也黃氏之族最強盤亘十數州周韋氏之不附之也率㣥黃之兵以攻之而逐諸海黃氏既至㣥盜皆服於是十三部二十九州之蠻寧息無寇害其明年制遷使持節都督廣州諸軍事守廣州刺史兼御史大夫充嶺南節度觀察處置本管經畧等使散官賜如故前節度使歿掌印吏盜授人職百數謀夜發兵為亂事覺奔走公至陰以術得首惡殺之不問其餘軍中以安蠻夷俗相攻擊㣥聚緣盜發輒捕斬無復犯者蕃國歲來互市奇珠瑁異香文犀皆浮海舶以來常貢是供不敢有加舶人安焉商賈以饒二十一年進階銀青光祿大夫元和元年詔加金紫光祿大夫檢校禮部尚書封東海郡開國公食邑二千戶餘如故詔書未至有疾薨於位凡三佐藩屏之臣五為刺史一為經畧一為節度觀察使階累升為金紫光祿大夫爵超進為開國公官亟遷為禮部尚書其事業皆足以傳示後世為子孫法享年七十雖不登於上壽儒者榮之前夫人渤海高氏子皆夭後夫人扶風竇氏封國夫人有子元弼前右衞倉曹參軍以讀書屬文為業謹具歷官行事如前伏請牒太常編錄謹狀曾祖泰皇任曹州司馬祖濬素皇任桂州長史父仲卿皇任祕書郎贈尚書左僕射公諱愈字退之昌黎人生三歲父歿養於兄會舍及長讀書能記他生之所習年二十五上進士第汴州亂詔以舊相東都畱守董晉為平章事宣武軍節度使以平汴州晉辟公以行遂入汴州得試祕書省校書郎為觀察推官晉卒公從晉喪以出四日而汴州亂凡從事之居者皆殺死武寧軍節度使張建封奏為節度推官得試太常寺協律郎選授四門博士遷監察御史為幸臣所惡出守連州陽山令政有惠於下及公去百姓多以公之姓以命其子改江陵府法曹參軍入為權知國子博士宰相有愛公文者將以文學職處公有爭先者搆公語以非之公恐及難遂求分司東都權知三年改真博士入省為分司都官員外郎改河南縣令日以職分辨於畱守及尹故軍士莫敢犯禁入為職方員外郎華州刺史奏華陰縣令柳澗有罪遂將貶之公上疏請發御史辯曲直方可處以罪則下不受屈既柳澗有犯公由是復為國子博士改比部郎中史館修撰轉考功郎中修撰如故數月以考功知制誥上將平蔡州先命御史中丞裴公度使諸軍以視兵及還奏兵可用賊勢可以滅頗與宰相意忤既數月盜殺宰相又害中丞不克中丞微傷馬逸以免遂為宰相以主東兵自安祿山起范陽陷兩京河南北七鎮節度使身死則立其子作軍士表以請朝廷因而與之及貞元季年雖順地節將死多即軍中取行軍副使將校以授之節習以成故矣朝廷之賢恬然於所安以苟不用兵為貴議多與裴丞相異唯公以為盜殺宰相而遂息兵其為懦甚大兵不可以息以天下力取三州尚何不可與裴丞相議合故兵遂用而宰相有不便之者月滿遷中書舍人賜緋魚袋後竟以他事改太子右庶子元和十三年秋以兵老久屯賊未滅上命裴丞相為淮西節度使以招討之丞相請公以行於是以公因本官兼御史中丞賜三品服及魚為行軍司馬從丞相居於郾城公知蔡州精卒悉聚界上以拒官軍守城者率老弱且不過千人亟白丞相請以兵三千人間道以入必擒吳元濟丞相未及行而李愬自唐州文城壘提其卒以夜入蔡州果得元濟蔡州既平布衣柏耆以計謁公公與語奇之遂白丞相曰淮西滅王承宗膽破可不勞用眾宜使辯士奉相公書明禍福以招之彼必服丞相然之公令柏耆口占為丞相書明禍福使柏耆袖之以至鎮州承宗果大恐上表請割德棣二州以獻丞相歸京師公遷刑部侍郎歲餘佛骨自鳳翔至傳京師諸寺時百姓有燒指與頂以祈福者公奏疏言自伏羲至周文武時皆未有佛而年多至百歲有過之者自佛法入中國帝王事之壽不能長梁武帝事之最謹而國大亂請燒棄佛骨疏入貶潮州刺史移袁州刺史百姓以男女為人隸者公皆計傭以償其直而出歸之入遷國子祭酒有直講能說禮而陋於容學官多豪族子擯之不得共食公命吏曰召直講來與祭酒共食學官由此不敢賤直講奏儒生為學官日使會講生徒奔走聽聞皆相喜曰韓公來為祭酒國子監不寂寞矣改兵部侍郎鎮州亂殺其帥田宏正征之不克遂以王庭湊為節度使詔公往宣撫既行眾皆危之元稹奏曰韓愈可惜穆宗亦悔有詔令至境觀事勢無必於入公曰安有受君命而滯畱自顧遂疾驅入庭湊嚴兵拔刃弦弓矢以逆及館甲士羅於庭公與庭湊監軍使三人就位既坐庭湊言曰所以紛紛者乃此士卒所為本非庭湊心公大聲曰天子以為尚書有將帥材故賜之以節實不知公共健兒語未嘗及大錯甲士前奮言曰先太史為國打朱滔滔遂敗走血衣皆在此軍何負朝廷乃以為賊乎公告曰兒郎等且勿語聽愈言愈將為兒郎已不記先太史之功與忠矣若猶記得乃大好且為逆與順利與病不能遠引古事但以天寶來禍福為兒郎等明之安祿山史思明李希烈梁崇義朱滔朱泚吳元濟李師道復有若子若孫在乎亦有居官者乎眾皆曰無又曰令公以魏博六州歸朝廷為節度使後至中書令父子皆授旌節子與孫雖在童幼者亦為好官窮富極貴寵榮耀天下劉悟李祐皆居大鎮王承元年始十七亦仗節此皆三軍耳所聞也眾乃曰田宏正刻此軍故軍不安公曰然汝三軍亦害田令公身又殘其家矣復何道眾乃讙曰侍郎語是庭湊恐眾心動遽麾眾散出因泣謂公曰侍郎來欲令庭湊何所為公曰神策六軍之將如牛元翼比者不少但朝廷顧大體不可以棄之耳而尚書久圍之何也庭湊曰即出之公曰若真耳則無事矣因與之宴而歸而元翼果出乃還於上前盡奏與庭湊言及三軍語上大悅曰卿直向伊如此道由是有意欲大用之王武俊贈太師呼太史者燕趙人語也轉吏部侍郎凡令史皆不鎖廳出入或問公公曰人所以畏鬼者以其不能見也鬼如可見則人不畏矣選人不得見令史故令史勢重聽其出入則勢輕改京兆尹兼御史大夫特詔不就御史臺謁後不得引為例六軍將士皆不敢犯私相告曰是尚欲燒佛骨者安可忤故賊盜止遇旱米價不敢上李紳為御史中丞械囚送府使以尹杖杖之公曰安有此使歸其囚是時紳方幸宰相欲去之故以臺與府不協為請出紳為江西觀察使以公為兵部侍郎紳既復畱公入謝上曰卿與李紳爭何事公因自辯數日復為吏部侍郎長慶四年得病滿百日假既罷以十二月二日卒於靖安里第公氣厚性通論議多大體與人交始終不易凡嫁內外及交友之女無主者十人幼養於嫂鄭氏及嫂歿為之服朞以報之深於文章每以為自揚雄之後作者不出其為文未嘗效前人之言而固與之並自貞元末以至於茲後進之士其有志於古文者莫不視公以為法有集四十卷小集十卷及病遂請告以罷每與交友言既終以處妻子之語且曰某伯兄德行高曉方藥食必視本草年止於四十二某疎愚食不擇禁忌位為侍郎年出伯兄十五歲矣如又不足於何而足且獲終於牖下幸不至失大節以下見先人可謂榮矣享年五十七贈禮部尚書謹具任官事跡如前請牒考功下太常定諡并牒史館謹狀
