body:
  text: 去正月中真卿奉使淮西期不先戒行無素備受命之後不宿於家親黨不遑告別介副不及陳請孱僮單騎即日載馳冒姦鋒於臨汝折元惡於許下捐軀仗義威詬㣥兇遂令脅制者回慮忠勇者肆情周曾奮發於外韋清伺應於內希烈蒼黃窘迫奔固舊穴蓋真卿義風所激也真卿逮事四朝為國元老忠直孝友羽儀王室行年八十被羸老之疾拘囚環堵之間顧眄鉤㦸之下呼嗟憤恚失寢忘食不知悲翁何以堪此伏聞希烈之母鍾念幼子目不絕泣求責希烈又希烈妻祖母郭及妻妹封並逮捕京師此三人留之無益請寘境上以贖真卿先降詔書分明諭告且希烈知真卿人望不敢加害既無嫌隙但因循未遣耳若歸其親愛賊亦何恡還一使哉臣又聞真卿所遣兄子峴及家僮從官奉表來者五軰皆留中其子頵等拳拳實希一見望許休沐告以安否昔殷周以稷契始封遂為不遷之祖其毀廟之主皆稷契之後所以昭穆合祭尊卑不差如夏后氏以禹始封遂為不遷之主故夏五廟禹與二昭二穆而已據此則鯀之親盡其主已遷左氏既稱禹不先鯀足明遷廟之主雖屬尊于始封祖者亦在合食之位矣又據晉宋齊梁北齊周隋史其太祖已下並同禘祫未嘗限斷遷毀之主伏以南北八代非無碩學巨儒宗廟大事議必精博驗於史冊其禮僉同又詳魏晉宋齊梁北齊周隋故事及貞觀顯慶開元所述禘祫並虛東嚮既行之已久實㣥情所安且太祖處清廟第一之室其神主雖百世不遷永歆烝嘗上配天地位於郊廟無不正矣若至禘祫之時蹔居昭穆之列屈已伸孝以奉祖禰豈非伯禹烝烝敬鯀之道歟亦是魏晉及周隋之太祖不敢以卑厭尊之義也議者或欲遷二祖於興聖廟及請別築室至禘祫年享之夫祫合也此乃公食殊乖禮意又欲藏于西夾室永不及祀無異漢代瘞園尤為不可輒敢徵據正經考論舊史請奉獻懿二祖與太祖並從昭穆之位而虛東向奉榮問蒙示相國崔公往復書并諸墓銘奠文及江西路上之作詞致清深華彩巨麗言必合雅情皆中節瓊瑰見辱囊篋增輝又竊文矩不勝幸甚相國於薦中表丈人行也寶應中相國丈被褐營道寓居陸陽薦家於干溝耕於謝湖每歲春蓺秋穫途由漕浦相國丈時與故刑部劉尚書趙洋州戶部兄弟同客是邑或承餘眷留歡浹日無曠再時者數焉洎相國丈以廷尉評賓於姑胥之幕自柱下史退為臨川掾薦皆獲見於湖海之間惠然相念有踰曩歲其後作牧建安屬京師難故猶能抗大節飛密疏犇問官守遠達巴梁薦掌史者嘗記興元元年三月甲子詔書以建州使者舒鄧玢為嘉王府諮議玢之所奉即相國丈也奏章於多難之日陳謀於必勝之地由是見器於助主先定於中台及夫徵入果領樞務惜其憂勤為疾未幾辭免大庇生人之志徒鬱於襟抱以至於薨落搢紳先生所以長嘆息者抑有為焉相國丈與劉齊二公燮諧大政也薦蒙過聽之遇以博士再入東觀三相連步同送拜職榮之於心寧止迄今閣老以志學之歲下帷覃思與古人心會於經誥之上獨行乎貞朗之域逮於弱冠德輝彰聞相國丈傾慕之不足願申以姻好詎假媒介直操槧簡閣老感深見託敬諾嘉命磊落丈夫之事二君子交脩之甚休精識妙鑒得賢斯盛既而夫貴於朝妻尊於室崔門綬帶之慶其有極乎及覽後書援皇極元德之論指匡張孔馬之戒實當益友之目豈惟佳壻而已又覩建昌房州誌文等昔年亦同遊處嘉聞遺諮過作者而不朽矣至如置奠東武之祠興慟子咸之述繼美彥先之句諷而誦之寶而藏之有以見六義昭宣百行醇備名稱赫赫宜乎哉走素不敏猥列僚舊豈悞見厚投以至言也因懷昔遊聊占數闕尹躬大歷中進士元和時為中書舍人左遷洋州刺史惟冠之制惟賢是崇冠俟賢而出賢因冠而通誡於人有傳古之義形於國有尊儒之風吾君於是詔司服進良工考前法以無替覿斯義而有融然後得多士以立效實茲冠而允淑君臣克序用彰有道之時冕弁可儔載稽取象之服則知冠以招士亦猶工以度木匪工也良材何以辨於山匪冠也㣥賢何以求其祿觀夫制作有則威儀孔昭建象於初爰從太古之代更名於後始惟炎漢之朝不繪畫以崇飾在進用以彰德上下率而有差禮容行而無忒不可奢侈不可儉偪蓋取事之大猷亦設官之盛飾上自元后降於公卿用則異數制乃同名五梁三梁表尊卑之序七寸八寸為前後之程惟德是急惟儒是旌叶緇布之遺象與皮弁而齊衡且夫作之罔乖服之有以豈同戴鶡者空尚乎猛聚鷸者不稱於已曷若取鑒斯在為工式孚御膳加大官之列使臣薦不疑之謨稽乎其形諒先王之制本乎其義為君子之儒瞻之克以正創之而以聖列士崇德之規蒸人立身之鏡豈徒在首貫髮雍容肅敬而已昔大歷中進士孝惟行先教實理本故元宗探宣尼之旨為聖理之閫爰索隱以鈎深或詞約而意遠然後勒睿旨於他山之石樹崇臺為儒林之苑天文煥發知孝道之克宣微旨高懸示仁風之已返上崇君德下達人情王猷玉潤帝典金清誼雖型於子道理實暢乎家聲施之於人風俗可移於孝理懸之於教日月方比於貞明不然何以卓爾孤標介然守正金字纍纍以條貫銀鉤歷歷而交暎故嚮之者修睦就之者起敬斯乃示生民之大端仰高山之景行至哉聖化本本元元酌其旨而薄俗可厚毗於政而理道可敦故政以肅教為尊非無詩書始務陳其行本非無貴賤心願宗其化源且高而不危者尚乎臺磨而不磷者莫如石揭貞質於庠序殊祕府之竹帛諒乃侔天地而始終豈特垂載祀於千百靜而繹思文固在茲一人有作比屋允覽君君臣臣之間則心乎愛矣於尊尊卑卑之道則學而知之矧乎雕琢成章區分式序方隅而不失其正篇次而各得其所三千子之鼓篋邈矣具瞻十八章之箴規揭之備舉乃知孝理馨香有時而彰不壞不朽化被無疆所以播鴻休於玉葉表嗣子於明王故曰孝者天之經也宜乎配地久而天長少博大歷中進士硯之施也被乎用石之質也本乎山溫潤稱珍騰異彩而玉色追琢成器發奇文而綺斑蓋求伸於知巳爰待用於君子故立言之徒載筆之史將吮墨以濡翰乃操觚而汲水始爛爛以光澈終霏霏而烟起或外圜兮若規或中平兮如砥原夫匠石流盻藻熒生輝象龜而負圖乍伏如鵲之緘印將飛設之戶庭王充之名巳著置之藩溷左思之用無違徒觀夫清光景耀真質霜浮符彩華鮮精明隱映皎如之色比藏冰之玉壺煥然之文狀吐菱之石鏡當其山谷之側沉奇未識韜玉吐雲懷珍隱德及乎入用以磨礪因人而拂拭故能撫之類磬發奇音對之若鏡開新色既垂文以呈象亦澄瀾而漬墨硯之用也詎可興歎而焚石乃堅然孰謂有時而泐斯可以正典謨之紀垂篆籀之則者也遂更播美六書傳芳二妙用之漢帝常同彭祖之席存之魯國猶列宣尼之廟是以遺文可述茲器奚匹匪銷匪鑠良金安可比其剛不磷不緇美玉未可方其質光鳥跡於青簡發龜文於鴻筆則知創物作程事與利并茲硯也所以究墨之妙窮筆之精者也儲大歷十四年進士惟天為大兮堯實則之命羲和而馭日俾出納而從時肇歲首以平分既中星鳥及宵衣而敬導始見嵎夷所以示農功之有序叶君德於無私我國家克定三元光臨四海纂唐虞之舊說崇德禮而斯在將舉正以履端奉天時而不改繇是春官蕆事太史作程天子居青陽之左个覽萬物之初生始昭宣於東作終協贊於西成杲杲臨空無幽而不燭遲遲鑒下有蟄而皆驚伊兆人分地之利我聖上則天之明淑氣載揚暢禽魚而共躍融風乍扇迨葵藿而咸傾庶績其凝三農式就高臺紀於雲物大野陳其蒐狩畢嚮化以觀光亦順時而敬授歲如何其歲既登節盈縮兮日有恒歲如何其歲將起兆發生兮日之始苟奉順而無違得禎祥而有以原夫君比德於日日麗光乎天撫有萬方每朝君於歲始照臨庶物故出日於春前煦百泉而冰泮薰九陌而花然合璧表無為之化重雲示有慶之年信惟貞而惟一示無黨而無偏客有藏器俟時卑躬思泰遇乾坤之訢合覩日月之光大莫不向春景以自娛沐堯風而永賴執誼京兆人進士擢第對策異等授右拾遺入翰林為學士順宗立以疾不親政王叔文與伾居中用事擢執誼尚書左丞同中書門下平章事憲宗受內禪坐叔文伾徒黨貶厓州司戶參軍代有良驥勤求可致上心好也固有開而必先朽骨沽諸蓋不期而自至於是搜延广既發屠肆出千金而易之獲一骼而無棄不賈其用雖增飾而無成將慮其先使雄名而不墜昔之服纓玉飾軌鞗追長風而噴沫先急景而揚鑣豈知衂駿足於千里摧壯心於一朝權含月而共落蹄帶雪而俱銷當其死而不顧豈其生而可招是以服其無斁守而無失外揚嘉善之名內作旁求之術伊希代之異產固入用而無必處南中之穴莫測從來遊北上之泉始將安出聿求既彰類聚其方人獻騄驥天降此祥滅虞之役不興取諸外广既伐燕之師不舉貢自遐方蓋將翕必張期於至止俾善始而令終寧賤目而貴耳假其力既重之於生思其勞曷輕之於死物以德易道由人宏當不遇其知乃負車而伏櫪苟應乎其感必虯躍而龍騰故八駿咸臻萬邦為楷物非其產將命逾遠而來骨在於斯何惜發幣而買亦猶賢士所趣知機彙征田忌收老以成仁卒強齊國燕昭市骨而種德乃獲樂生覩求賢之未暢悟得駿之非輕儻長鳴之見識庶吾道之將行善見禪師所管施利錢銀到後量收糴米支持到九月以來餘錢即共義商量至秋中糴米收貯訖報當所將錢三百貫內二百八十貫充買莊餘者買取菜園一所此並已帖勾當造寺軍將成文郢訖見禪師可同在意翰林院者在銀臺門內麟德殿西重廊之後蓋天下以藝能伎術見召者之所處也學士院者開元二十六年之所置在翰林之南別戶東向考視前代即無舊名貞觀中秘書監虞世南等十八人或秦府故寮或當時才彥皆以宏文館學士會於禁中內參謀猷延引講習出侍輿輦入陪宴私十數年間多至公輔當時號為十八學士其後永徽中黃門侍郎顧琮復有麗正之稱開元初中書令張說等又有集賢之目皆用討論未有典司元宗以四隩大同萬樞委積詔敕文誥悉由中書或慮當劇而不周務速而時滯宜有偏掌列於宮中承導邇言以通密命由是始選朝官有詞藝學識者入居翰林供奉別旨於是中書舍人呂向諫議大夫尹愔首充焉雖有密近之殊然亦未定名制詔書敕猶或分在集賢時中書舍人張九齡中書侍郎徐安貞等迭居其職皆被恩遇至二十六年始以翰林供奉改稱學士由是遂建學士俾專內命太常少卿張垍起居舍人劉光謙等首居之而集賢所掌於是罷息自後給事中張淑中書舍人張漸竇華等相繼而入焉其外有韓翃閻伯璵孟匡朝陳兼蔣鎮李白等在舊翰林中但假其名而無所職至德以後軍國務殷其入直者並以文詞共掌誥敕自此北翰林院始無學士之名其後又置東翰林院於金鑾殿之西隨上所在而遷取其便穩大抵召入者一二人或三四人或五六人出於所命蓋無定數亦有鴻生碩學經術優長訪對質疑主之所禮者頗列其中崇儒也初自德宗建置以來秩序未立廷覲之際各趨本列暨貞元元年九月始有別敕令明預班列與諸司官知制誥同列故事中書以黃白二麻為綸命重輕之辨近者所出獨得用黃麻其白麻皆在此院自非國之重事拜授將相德音赦宥則不得由於斯稽夫發揮大猷藻繪上命隻簡片削可以動乎人神風行四方萬里始覲非制誥之謂歟蓋人君深拱端默於穆清之中茫茫九區視聽不及雖堯德舜智湯明禹哲不能庭策以朝告不能家閱以戶臻必欲忘典謨掩訓誓陰諭於天下密符於胸襟洪荒以還所蔑聞也故議定於內而事修於外言發於上而旨達於人微乎斯百度闋矣況此院之置尤為近切左接寢殿右瞻彤樓晨趨瑣闥夕宿嚴衞密之至也驂䮽得御广既之駿出入有內司之導豐餚潔膳取給大官衾裯服御資於中庫恩之厚也備侍顧問辨駮是非典持縑牘受遣㣥務凡一得失動為臧否職之重也若非謹恪而有立秉貞而通理俾乂樞要簡於帝心言不及溫樹之名慎不遺轅馬之數處是職者不亦難乎至於強學修詞刀筆應用或久洽通儒之望或早升文墨之科雖必有之乃餘事也自立院已往五紀於茲連飛繼鳴數逾三十而屋壁之間寂無其文遺草簡畧於㭊編求名時得於邦老溫故之義於斯闕如㣥公以執誼入院之時最為後進紀敘前輩便於列詞收遺補亡敢有多讓其先後歲月訪而未詳獨以官秩名氏之次述於故事庶後至者編繼有倫貞元元年龍集景寅冬十月記字師舉京兆長安人第明經累遷衞尉卿為鹽鐵使兼御史大夫元和十三年以工部侍郎同中書門下平章事猶領使卒贈尚書左僕射諡曰恭應諸道州府先請置茶鹽店收稅伏準今年正月一日赦文其諸道州府因用兵以來或慮有權置職名及擅加科配事非常制一切禁斷者伏以榷稅茶鹽本資財賦贍濟軍鎮蓋是從權兵罷自合便停事久實為重斂其諸道先所置店及收諸色錢物等雖非擅加且異常制伏請準赦文勒停播貞元二年官刑部尚書上元中詔擇古今名將十人於武成王廟配饗如文宣王之廟儀伏以太公古稱大賢今其下置聖賢之有聖於義不安且孔門十哲皆是當時弟子今所擇名將年代不同於義既乖於事又失臣請刪去名將配享之儀及十哲之稱憬字退翁渭州隴西人寶應中以褐衣上疏試江夏尉累拜給事中貞元四年遷尚書左丞八年拜中書侍郎同中書門下平章事徙門下侍郎十二年卒年六十一贈太子太傅諡曰貞憲臣謬登宰府四年於茲恭承德音未嘗不以求賢為切至於延薦職在愚臣雖當代天之工且乏知人之鑒漸積歲月負於聖明無補王猷有妨賢路況多疾恙兼慮闕遺頃奉表章備陳肝膈陛下以臣性拙直身病可矜不棄孱微尚加委任自此思省報效尤難莫副堯舜之心空懷尸素之懼伏惟陛下法象應期聖神廣運雲行雨施皆發自然訓誥典謨悉經睿覽臣所以不敢援引古昔上煩天聰且以用人之要願伸鄙見復念稽顙丹陛仰對宸嚴謇訥易窮遽數難辯理詳則塵瀆頗甚言畧則利害未宣若默以求容苟而竊位縱天地之仁幸免而中外之責何逃非陛下用臣之意也其所欲言者皆陛下聖慮之內臣以頂戴恩造不知所為身被風毒漸覺沉痼是以勤勤懇懇切於愚誠也臣聞貞觀開元之際宰輔論事或多上書所冀獲盡情理今臣酌前代之損益體當時之通變謹獻審官六議伏惟閒宴時賜省覽其大指議相則曰宜博採眾賢用為輔弼今中外知其賢者伏願陛下用之識其能者任之求其全材恐不可得議進用庶官則曰異同之論是非難辨由考課難於實效好惡雜於眾聲所以訪之彌多得之彌少選士古今為難拔十得五賢愚猶半陛下謂臣曰何必五也十得二三斯可矣聖主思賢至是而宰臣不能進之臣之罪也進賢在於廣任用明殿最舉其大節棄其小瑕隨其所能試之以事用人之大綱也議京諸司闕官則曰當今要官多闕閒官十無一二文武任用資序遞遷要官本以材行閒官多由恩澤朝廷或將任使多擬要官則人少闕多閒官則人多闕少明當選拔者轉少在優容者轉多宜補闕員務育材用大厦永固是棟梁榱桷之全也聖朝致理亦庶官㣥吏之能也議中外考課官則曰漢以數易長吏謂之弊政其有能理者輒增秩賜金或八九年十餘年乃入為九卿或遷三輔功績茂異遂至丞相其間不隔數官今陛下內選庶僚外委州府課績高者不次超昇致理之法無踰於此臣愚以為黜陟且立年限若所居要重未當遷移就加爵秩其餘進退令知裦貶之必應遲速之有常如課績在中年考及限與之平轉中外迭處歷試其能使無苟且之心又無滯淹之慮議舉遺滯則曰官司既廣必委宰輔以舉之宰輔不能遍知又詢于庶官庶官不能遍知又訪於眾人眾聲囂然互有臧否十人舉之未信一人毀之可疑迨至于今茲弊未改其所以然者非盡為愛憎也苦於不審實而承聲言之大凡常人之心以稱人之善為清以攻人之過為直苟有除授多生橫議由是宰臣每將薦用亦自重難日往月來未副聖意宜須採聽時論以所舉多者先用必非大故皆不棄之議擢用諸使府僚屬則曰諸使辟吏各自精求務於得人將重府望既經試效能否可知擢其賢能置之朝列或曰外使須才固不可奪臣知必不然也屬者使府賓介每有登朝本使殊以為榮自喜知人且明公選大凡才能之士名位未達多在方鎮日月在上誰不知之思登闕庭如望霄漢宜須博採無宜久滯臣叨荷聖慈竊塵台鼎年序頗久績用無聞負乘之敗已彰覆餗之咎俄及而天與之疾福過生災自今日卯時以來稍加困重針灸不及藥餌奚施奄然遊魂終當就木冥冥殘喘豈忍辭天號呼涕零側息心斷反風結草誓報深恩雖死猶生豈孤素願無任感恩嗚咽痛恨之至自昔秦置郡有守漢魏以降因之其秩二千石雖有監剌而宰制威福之重蓋古之諸侯鄂在楚為國秦為縣吳為江夏郡綿歷至宋乃維八郡置郢州及齊更郢為鄂隋氏披其郡猶謂之州官則刺史而政無條刺之法矣皇朝㳂襲舊制或為郡或為州剖符責成其實乃太守之職前代建置所理之處其城不恒今之州即舊城於江夏吳仲謀經營之程普始守之當荊吳江漢之衝要為藩鎮固護之雄制天寶以前四方無虞第據編戶眾寡等衰州望鄂是以齒於下後戎狄亂華㝢縣沸騰屯兵阻險斯稱巨防朝廷尋州陟列將寄勳賢之重廣德二年遂聯岳沔事置三州都團練使大歷八年加觀察處置使十四年六月二使廢特置當州防禦使且屬於江西國家姑務省官息人而終慮咽喉襟帶之地思典守者既輕其權矣復欲俾任重尤難其選是年十月乃命秘書少監兼侍御史李公授之公名兼隴西人也到官三年之五月使改為三州防禦使江岳隸焉仍領元戎之副董江西諸軍銳師以伐叛於襄陽既而克寸平九月就加散騎常侍防禦洎州如舊公之蒞鄂也今茲四年以清德誠信為教化以至公深仁為字育則厂墨閈里閭僑舊詠歌如嬰兒之得乳母餒夫之逢稔歲理軍施令其士卒歡慶亦如之但加乎肅畏而已繇是所防二千餘里洞庭彭蠡在其間水舟陸車山藪塢野皆我長城之內用是加之王人絡繹天書繼至三軍萬戶以為禁而耆老懼去不得而借也初刺史有小大之廳其度甚卑或門屏迫近或廊廡狹隘將吏參集迴旋偪側帛丿糸歷年代未遑革之廳之左二曰府舍摧壞空曠公乃剗濶其地作為新廳大厦既立長廊以二則儉而規法結搆殊精因士卒忘勞之力出貨財足用之羡經營有成井邑莫知惟昔之公門今為外入而遂東廣開崇墉北達於里門棨㦸森列戎徒儼衞每饗士誓眾駢羅廣庭蕭墻之陰旗旐繽紛威容克振君子謂之智憬將赴京師目覩嘉謀輒紀新廳之壁庶允朝選之盛時舊廳有都團練觀察使記刺史無記曩賢名氏多所闕焉是用求訪遺者得之必書蓋李公之志也來哲繼踵冀增輝於此堂時建中三年十有一月也
