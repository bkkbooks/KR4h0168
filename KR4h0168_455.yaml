front:
  text: 全唐文欽定全唐文卷四百五十五薦字孝舉深州陸澤人天寶中李涵表薦才任史官召充史館修撰德宗朝擢拜諫議大夫改秘書少監卒年六十一順宗時贈禮部尚書諡曰憲
  hash: sha256:87aedd399039bf0c652896d74dc0cf82041ff6ee7a32220499745647341dcbb8
