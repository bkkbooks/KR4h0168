front:
  text: 全唐文欽定全唐文卷九百三十一杜光庭三
  hash: sha256:fe8b2b93476d2108ce1ae18d9918d8d12253dc2c2f3af7a0977a4b653d825002
body:
  text: 臣某言伏奉恩敕以臣今月二日上賀登極表一道賜批答奬飾者寵降丹霄榮臨元教綸垂五色出仙禁以昭彰日煥九芒向芝田而照燭驚榮失次抃舞無階臣中謝伏惟皇帝陛下珠衡誕瑞玉斗縱神出震域以重光為乾樞而纂聖德超啓誦宏孝德以垂衣明繼勳華宣大明而御宇湛恩遐布惠渥旁敷歡呼振野以成雷喜氣凝空而作蓋華夷億兆就日瞻雲臣某限以衰遲兼嬰疾恙仰龍墀而潔懇陪獸舞以無因遂貢封章遙陳誠悃豈謂特隆睿奬俯降天章成行之瑞露葳蕤聯幅之卿雲芬郁捧對而嵩衡未重感恩而溟渤非深鷦鷃至微乾坤難報所賜批答臣謹已焚香跪受訖無任荷戴聖恩之至臣某頓首頓首言日月不居大行皇帝奄及某祥伏惟皇帝陛下攀號痛慕聖情難居上為宗祧下徇億兆俯全大禮永福華夷臣衰疾所縈不獲隨例起居奉慰無任隕越屏營之至謹奉表陳慰以聞臣某頓首頓首言日月不居大行皇帝崩背如昨奄經禮制伏惟皇帝陛下攀慕永遠聖情難居四海臣妾服制終禮瞻天靡及履地無容臣伏恨衰疾所縈不獲趨詣闕庭哀慟臣無任感咽摧慕之至謹奉表陳慰以聞臣某言今月某日追册大行皇帝尊諡及廟號者伏惟大行皇帝應天誕睿乘運開圖豐沛振衣功超於漢祖邠岐杖箠仁邁於周文考唐堯翊善之名遵虞舜盛明之號今則式崇尊諡爰美聖功億兆咸哀寰區共感伏惟陛下悲纏罔極孝理萬方仰弓劍以難追奉册書而增感暜天率土哀殞同深臣某言伏承大行皇帝今月某日啓攢宮者哀纏百辟號慟六宮伏惟陛下攀慕哀號聖情難處對弓劍而增感嘆光景以冥懷臣伏恨衰疾所縈不獲隨例哀慟無任隕越屏營之至臣某頓首頓首言伏承某皇帝祔廟禮畢者禮重宗禋序申昭穆克遵嚴祀永耀神功云云伏惟陛下順考禮經欽明孝德正春禘秋嘗之典宗配天奉聖之儀允集鴻休永崇清廟暜天率土哀慕同深臣某頓首頓首言伏覩大行皇帝陵寢封為某陵者臣竊惟大行皇帝吞日協祥履星應夢握乾元而啓歷拓坤野以開基鄙吳魏之三分廣行恩化欲華夷之一統將混車書陵寢正名允符聖德伏惟陛下纂承事重追美為先光顯遺功輝華盛禮仰瞻懿躅稍慰聖情凡在臣寮同深哀慕臣某言伏惟大行皇帝靈駕以今月某日發引者二儀交感兩曜無光億兆銜哀雲霞共慘臣某誠摧誠咽頓首頓首伏惟陛下孝思罔極聖情難居望仙駕以漸遙聽薤歌而增咽追攀不怠哀慕難勝臣某言伏審今月九日皇帝御明德殿聽政者文物羽儀初陳於玉砌行鵷振鷺乍列於瑤墀中外同歡寰瀛共賀臣某誠歡誠躍頓首頓首伏惟皇帝陛下九天誕聖七政縱神執玉斗而御乾龍將寧四海握璿衡而司大象爰牧萬方敷啓后之文明懋成王之道德今則雲開碧落齊瞻北極之尊霞散滄溟共奉大明之照恩覃有截惠洽無垠臣迹滯芝田榮逢寶運悲越吟而自感趨漢殿以無由瞻望堯天不任抃蹈歡呼激切屏營之至臣某言伏承大行皇帝山陵禮畢者神宮長閉仙寢永安率土生靈不任號慕云云伏惟皇帝陛下追慕不怠聖情難居對馬鬣以增悲攀龍髯而永隔遊衣尚在仙駕已遙追想英威摧慕何及臣伏恨衰疾不獲奉慰闕庭不任號殞摧咽之至謹奉表以聞臣某言竊承山陵甫畢皇帝陛下哀慕無窮欲躬赴陵寢者恭聞中旨實駭人情凡被照臨莫不惶惑臣某誠惶誠恐頓首頓首伏以皇帝之孝也法天順人緣理制禮俾生靈咸若而宗廟永安未聞以弓劍之哀誠履曾閔之獨行遽勞警蹕親奉告修伏惟皇帝陛下考百王之舊儀詢歷世之成典特回聖鑒俯契禮文遵前古之通規示後王之令範彌彰孝理以慰萬方臣不任瀝懇虔望迫切之至謹奉表陳乞以聞右臣先蒙今年十月二十二日宣賜舊玉局洞門官舍一所并石像老君一座移在當觀其舍今於殿後講堂基上起立功畢便用安置石像老君焚修供養伏以名山大川二十四化春秋常祀著在舊儀其玉局化所修常醮伏請起天漢元年二月八日委本府縣祇就龍興觀玉局石像老君前修設冀免曠闕以協敬恭又北邙化在巂州積年已來醮祝皆闕况居率土之內宜申咸秩之文前件二化今亦欲就龍興觀一處與玉局同用延祝景貺永福聖朝謹舉如前伏聽敕旨伏覩導江縣令黃璟奏六月二十六日江神移堰事伏以大禹濬江發洪源於龍冢李冰創堰分白浪於龜城導彼靈津資乎民用而涸脛泛肩之誓表則有常若懷山沃日之多奔騰難制立虞墊溺必害蒸黎昨者夏潦渤興狂波未息顧岷江之下瀨便逼帝都當灌口之上遊遽彰神力於是震霆嶪地白雨通宵驅陰兵而鼓譟連天簇靈炬而熒煌達曙回山展石巨堰俄成浸淫頓減於京江奔蹙盡移於硤路仰由聖感仍假英威見天地之合符覩神明之致祐編於簡册冠彼古今叨奉奬私彌增忭躍謹奉箋陳賀以聞素靈符者天師翟君乾祐乾元中自黃鶴山泝流入蜀至巫山峽耽玩林泉周歷峯岫躊蹰嵗餘南至清江北及上庸周旋千餘里神墟靈迹巖扃洞室靡不臨眺一夕夢真人長丈餘素衣華冠立於層崖之上俯而視之若有所命君翼日登天尊峯瞻仰禮謁果見真人也俄於天尊手中得丹書一卷拜而受之即素靈符也按而書用蠲疴療疾徵魔制靈驅役鬼神回尸起死召置風雨鞭策虎狼三峽之人大享其惠天寶中詔入內殿順風問道復還仙都山其後平昌段成式與當時朝彥荊郢帥臣咸師奉之纍年乃得道而去有得此符者傳以救人用之必驗余天復丙寅嵗請經於平都山復得其本編入三洞藏中冀將來同好共知濟物之志焉廣成杜光庭序道本至無能生妙有運至無之道成妙有之功其惟太上老君元元皇帝乎起於象先尊為化本融神億劫之始分靈覆載之中亭毒萬殊陶鈞庶品由是三皇受命尚遵淳一之風五帝握圖漸散無為之朴老君雖歷代降迹隨時應機或為國師或為賓友授經傳道以教時君洎唐虞禪讓之初世道交喪之際舉元凱於野行四罪於朝尚賢之迹既彰疸惡之形又舉內雖揖讓外有干戈人心漸澆道朴云散老君號尹壽子居於河陽憫物性之遷訛恐真宗之陵替以為三皇大德不足以程式後王五帝常道不可以垂訓末俗撮重元奧義著道德二篇欲明道無為也因德以顯之德有用也因道以明之資立言以暢無言因理本而宏妙本為理身理國之要乃至精至極之宗以授於舜非謂絶仁義聖智在乎抑澆詐聰明將使君君臣臣父父子子見素抱朴泯合於太和體道復元自臻於忠孝世儒不知以為老君之道棄仁義隳禮智非立教之大方且夫至仁合天地之德至義合天地之宜至樂合天地之和至禮合天地之節至智合天地之辨至信合天地之時宏淳一之源成大同之化混合至道歸仁壽之鄉固不在乎踶跂雍容噢咻蹩躠然後謂之仁義等也故仲尼亞聖皆默而得之隳體黜聰遺形去智超乎物表永為真人非末學小儒之所知也綿夏商周漢數千百年煥乎與日月齊光巍乎與乾坤並運雖百家詮注㣥彥校揚挹之彌深酌之不竭行之於國刑措而太平修之於身神全而久視拊几揮柄時有其人宏農強思齊字默越濛陽人也幼棲元關早探妙旨丱嵗侍先師京金仙觀講論大德賜紫全真居葛仙中宮讀頌之餘服勤不怠綽有聲稱為時所推僖宗皇帝順動六飛駐蹕三蜀五月應天節默起祝壽行殿寵賜紫衣高祖神武皇帝應歷開圖配天立極二月壽春節允承明命賜號元德大師奕世棲心皆洽光寵羽衣象簡其何盛歟每探討幽元發揮流俗期以談講之力少報聖明之恩手纘所講道德二經疏採諸家之善者明皇御注為宗蓋取乎文約而義該詞捷而理當者勒成二十卷庶乎覽之易曉傳之無窮後之學者知強君之深意焉乃題曰太上老君道德經元經纂疏乾德二年庚辰降聖節戊申日廣成先生光祿大夫尚書戶部侍郎上柱國蔡國公杜光庭序經曰河圖仰謝之法學道之士常能行之度洪災之劫升為種民若兵戈水火旱潦螟蝗星辰變怪天地易常山摧川涸日月薄蝕風霜不時雷電害物妖氣作沴鬼邪惑衆四境不寧猛鷙為暴若帝王國主不安及疾厄災異至於民間危急當告謝天地元感穹旻乃可解度耳天道憫物元聖流慈太上出河洛龜龍之書青文緑甲之字以授帝王此蓋教民致福謝過度厄解災之法也行之則上合天道舉無不應矣三元仰謝齋用壬辰癸巳之日戌亥之時戌亥為天門蛇對於樞知變即成龍龍當其機識化即入道戌亥者天門之津塗辰巳者龍蛇之樞機也感悟求真必由斯日故用辰巳日也壬者陽氣所生太乙之位也故戌亥時升壇告謝子時陽氣通生之首也道法執象導物伏鬼制神御天統人以十二辰為用立德於子表成於丑慎衰於寅戒敗於卯運智慮於辰用消息於已救傾於午即安於未防亂於申開大於酉歸根於戌太平於亥歸根則陰氣盡太平則陽氣升道運則陽升水柔則道合故壬癸為勝順陽合道故也急有祈謝未及壬辰日者寅以慎衰午以救傾戌以歸根此三辰日時急亦可用合天道矣苟能丹苦感徹必契神明者餘日無爽不拘於此矣未齋三日灑掃內外禁絶庶事約飭僚友惟務精嚴一心營備無忘謹敬也序曰珠韜玉札云太上老君降迹行教遠近有四其一歷劫稟形隨方演化即千二百號百八十名散在諸經可得徵驗矣其二此劫開皇之始運道之功孕育乾坤胞胎日月為造化之本天地之根播氣分光生成品彙自五太之首逮殷周之前為帝王師代代應見即鬱華録圖廣成尹壽因機表號是也三皇迭往五帝不歸雲紀龍師時遷數革鳥官火運川逝風移步驟不同澆淳漸變雖揖讓斯在而干戈屢興阪泉有翦戮之師丹浦有專征之旅智詐行而太朴隱仁愛顯而孝慈生元默希夷日以寢薄陶唐以耄昏厭位虞舜以歷試登庸憂軫萬方服勤庶政老君號尹壽子居於河陽以道德真經降授於舜經之旨也道以無為居先德以有稱為次亦猶三皇之書言大道也五帝之書言常道也其下薄裁非之義節兼愛之仁損俯仰之禮挫銛巧之智斥用兵之暴抑譎詐之謀使人復朴還淳以無為無事為理舜雖力而行之竄凶舉相明目達聰敦睦九族平章百姓而恬和清靜之道莫能致也故禹湯之後天下為家各親其親各子其子大道既隱元化不流禮樂滋繁政刑大用矣其三老君以商陽甲子代降神寓胎武丁之年誕生於亳即今真源縣九龍井太清宮是其地也或隱或顯潛化㣥方當周昭王癸丑之年以此二經授關令尹喜傳於天下世得而聞焉其四將化流沙與尹喜期會於西蜀青羊之肆示現降生即昭王丁巳之年也此道德經自函關所授纍代尊行哲后明君鴻儒碩學詮疏箋注六十餘家則有節解上下內解上下想爾二卷河上公章句嚴君平指歸十四卷山陽王弼注南陽何晏河南郭象穎川鍾會隱士孫登晉僕射太山羊祜沙門羅什沙門圖澄沙門僧肇梁隱居陶宏景范陽盧裕草萊臣劉仁會吳郡徵士顧歡松靈仙人晉人河東裴楚思秦人京兆杜弼宋人河南張憑梁武帝梁簡文帝清河張嗣梁道士臧元靜梁道士孟安排梁道士孟智周梁道士竇略陳道士諸糅隋道士劉進喜隋道士李橎唐太史令傅奕唐嵩山道士魏徵法師宗文明仙人胡超道士安邱道士尹文操法師韋録道士王元辨諫議大夫肅明觀主尹愔道士徐邈直翰林道士何思遠衡嶽道士薛季昌洪源先生王鞮法師趙堅太子司議郎楊上善吏部侍郎賈至道士車弼任真子李榮成都道士黎元興太原少尹王光庭道士張惠超龔法師通義郡道士任太元道士沖虛先生殿中監申甫岷山道士張君相道士成元英漢州刺史王真道士符少明元宗皇帝所注道德上下二卷即今所廣疏矣所釋之理諸家不同或深了重元不滯空有或溺推因果偏執三生或引合儒宗或趣歸空寂莫不並探驪室競掇珠璣俱陟鍾山爭窺圭瓚連城在握照乘盈懷敷宏則光粲縑緗演暢則綵文編簡語內修則八瓊玉雪氛靄於丹田九轉琅膏晶熒於絳闕盡六氣回環之妙臻五靈夾輔之功忘之於心息之於踵得無所得而了達化元矣語品證也則擺落細塵超登上秩遊八外而放曠指三境而躋升蹈太乙之位矣而總內外之要兼人天之能者未有其倫我開元至道昭肅孝皇帝降神龍變接統象先戡內難以乘乾咨中興而御極無為在宥四十五年汾水襄城靡勞轍迹具茨大隗自得朋遊廓八溟為仁壽之庭暜萬宇為華胥之國至道至德超哉明哉欽若尊經本朝家教象繫不足以擬議風雅不足以指陳橫亘古今獨立宇宙雖諸家染翰未窮衆妙之門多士研精莫造重元之境凝旒多暇屬想有歸躬注八十一章製疏六卷內則修身之本囊括無遺外即理國之方洪纖畢舉宸藻遐布奪五雲之華天光煥臨則兩曜之色固可以季仲十翼輝映二南若親稟於元元信躬傳於太上冠九流而首出垂萬古而不刊則大風赤雁之歌誠難接武典論金樓之作詎可同年但以疏注之中引經合義周書魯史互有發明四始漆園或申屬類後學披卷多瞢本源輒採托衆書研尋篇軸隨有比况咸得備書纂成廣聖義三十卷大明在上而爝火不休巨澤溥天而灌浸不息誠不知量粗備闕文天復元年龍集辛酉九月十六日甲子序國家保安宗社金籙籍文設羅天之醮投金龍玉簡於天下名山洞府謹按道藏龜山白玉上經具列所在去處十大洞天內一王屋山清虛小有之洞周回萬里在洛京西北王屋縣仙人王真人治之傳曰黃帝於元年正月甲子列席於王屋山清齋三日登山至頂於瓊林臺禱上帝破蚩尢遂敕王母降於天壇母既降黃帝親供侍焉王母乃召東海青童君召九天元女授與破蚩尢之策黃帝依命殺蚩尢於冀天下乃無不克海內安然王母遣西方白虎之神賜黃帝元羽之衣乃命帝會於孤竹之野帝欽命齋戒嚴駕而行既至孤竹見空中千乘萬騎或有了髻青衣童子數百人或五綵羽服或乘飛龍或乘飛虎或乘鸞鶴或執珠幢錦傘霓旌絳節或持如意九曲几及前後歌舞妓樂不可名狀俄見寶車一乘駕五色斑龍九頭上有羽蓋九重中有仙女一人衣黃裳戴金冠隱隱而至左右侍從有仙童一人謂帝曰此西王母也帝接至母令仙童二人命帝坐賀帝曰聖躬安天下寧矣久即戎事得無勞乎帝謝曰賴上帝厚恩聖母諭教得寧天下豈敢稱功乎母乃命飲筵上花果樽罍器皿光赫大小各異而不能辨其一焉復遣仙女宋妙英歌萬年長生之曲歌罷母賜帝茹芝數枚食之不飢不渴又賜修真七昧之書授訖母沖天而去後三載於八月一日母遣西方白虎之神為使命黃帝時在大隗山受母命帝即齋戒至洛陽帝自白波涉渡至王屋清齋三日登山即八月十五日至頂上祝香禱焉俄而西方天香馥郁自天而下遍聞山谷青鳥先至帝曰阿母降矣俄而見空中千乘萬騎一如孤竹之儀既降天壇帝列席下見仙衆羽服冠簡環佩履舄帝乃頻顧之母曰帝何為哉帝曰恐左右不謹母曰帝何不實耶帝乃實對母曰天上之服非人間之有此衣非朝禮星辰國王父母不可服焉帝曰朕南面承尊不敢以羽衣賜人臣母曰善羽衣不拜帝王者自此始也帝欲設食母止之謂帝曰吾之仙衆不飢不渴豈欲造人間之饌乎王母戒帝曰設欲供養神仙上界星辰日月但擇吉日築壇場設淨席布香燈花果而已如無用清水藥苗代之餘皆不可言畢王母賜帝碧霞之漿赤精之果訖王母沖天而去自此每年八月十五日四方善士雲集於此山此日亦係清虛宮中孝校功行仙籍於此山也又真誥云元元帝時命四海龍神所修天下十大洞天用疆鼓之石重重相謺於此尚存焉又上方院者即上訪院也昔軒轅黃帝訪尋四山故曰上訪院後司馬承禎改作上方院焉唐睿宗皇帝時玉真公主於金仙觀修道今即靈都觀是也帝幸真元金仙二觀與西京相對出元武門渡大河至東章村為之曰東章驛敕東濟源縣南河清縣西邵源縣北陽城縣四縣界分巡護金仙貞元二觀王屋山自軒轅黃帝後至晉南嶽魏夫人上帝遷號敕小有洞主王子登下教魏華存於小有清虛宮中四十七真受學道畢南嶽靈官仙衆自清虛宮迎夫人赴南嶽衡山司命之任矣蓋天地不言須憑集文籍開示古傳實迹今録聖境真元混沌未分道氣包含妙本陰陽既判真形出見元經著為圖經俾來者知所自云
