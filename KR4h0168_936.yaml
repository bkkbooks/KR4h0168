  text: 全唐文欽定全唐文卷九百三十六杜光庭八
  hash: sha256:9b154d118965537848c0f5eaa351126c71a808b0a703a556d57fdffbffa4cea3
body:
  text: 伏聞至道開圖三尊垂教惠覃幽顯澤浹死生遊觀八門播宏慈而濟苦憫傷幽夜迴法炬以流光南宮闢鍊化之庭丹啟超昇之籍上智童子願開罪福之由飛天神人請示懺陳之品敷明真奧典拔度幽關披玉匱靈科解銷考對元清昏翳灑潤焦勞拯拔窮魂咸為善爽終天載劫俱沐元慈臣先考運偶道風常參寶籙身逢聖日累踐官榮處世網之中寧無過悞履塵寰之內必有愆違况職主庖羞須行宰戮旋司戎伍每舉刑章出領郡符入居近密或抑強扶弱或三令五申既爽重輕即為釁咎又自鄉關隔越兵火亂離故里墳塋或有侵毀塚訟延注逮及子孫兼割貨所居移易門巷土木修造有觸明神以此憂惶皆祈懺謝是敢遵靈寶科格修明真道場精潔香燈豐嚴信幣披心露懇悔過希恩伏惟太上三尊十方眾聖神光下燭惠渥旁流赦先考累世以來深殃積罪削名地濯質天衢故傷誤殺之愆往債前冤之目後嗣考延之咎先人怨責之瑕竝賜原除內外清淨即乞鍊神丹霍列籍青華不經於岱嶽酆山克證於福堂天路上願九元開度七祖超昇墳墓安寧幽冥潛靜三途六趣共洽勝功內族外親俱臻景祐刳心抆血拜手祈天不任號殞激切涕咽之至謹詞蓋聞至道應機有同響答明神赴感無異影隨緬惟幽贊之私每荷垂休之力六月二十二日皇太子大會諸將用卜吉辰方當暑雨之時遂有晴明之禱果蒙靈貺協此誠祈不移頃刻之間驟止滂沱之勢㣥山曉碧天高而屏翳收雲六合風清日朗而羲和弄轡讌筵克備中外同歡今則旋整車徒爰申弔伐千軍雷動山川絕泥潦之虞萬馬星馳戈甲曜晶瑩之色佇平凶梗大拯黎元思答真官式陳齋薦蓮燈夜簇蘭穗朝飛儀禮精嚴香花紛郁必達清都之聖更崇紫府之勳仰叩元功以昌鴻業不任虔祝之至謹詞蓋聞混漠之先希夷之表厥惟至聖光宅九清敷澹然沖寂之宗行不宰無為之教上自三古旁逮萬區欽若真風贊孚成化粵自經綸之始洎膺推戴以來常矢明誠每申瞻奉而光靈累洽禎貺繼臻仙居賜受命之符顯隆基業宣室發祝祈之念必至感通由是風雨常均氛邪不起四封無警百穀常登祇荷恩休實思昭謝爰因令序特啟齋壇三日精嚴六時蠲潔冀憑關奏上答元功今則方命師徒將平凶醜猶資道力俾殄梟巢借豐隆列缺之威掃鑿齒貪狼之族更垂熹祐永泰寰瀛不任祝望之至謹詞臣聞至道深微元功廣大包萬天而布化周品彙以流恩故能下拯冥關廣寧邦國鎮安土地和豫神明皆遵宰制之歡盡悅慈悲之力古今共稟幽顯無遺臣夙奉元休早承皇澤未展涓埃之効驟叨符竹之榮况累掌重權兼司刑憲評詳獄訟慮乖仁恕之規主領兵師實寡訓齊之要動貽過咎常切兢憂自臨莅郡城每懷兢慎遽鍾殃罰敢望生全禮制所拘殞絕無所偷延視息又降渥恩泣血籲天煢煢何訴竊聞元元啟教紫陽有遷拔之儀正乙垂科黃籙有懺祈之路是敢肅嚴公署崇設齋壇拜表九清騰詞三界伏冀三尊眾聖宏憫濟之慈夜府泉扃遂超昇之路賜鄖國夫人某氏魂神安泰福善資薰積過深瑕皆從蕩滌不拘地府徑上天堂七祖九元前亡往逝俱昇道力齊會福庭又宅宇之中累經修改恐因觸動未獲安寧願憑齋薦之緣旁解犯違之過龍神復位土地安和居止利宜凶災銷殄城隍社廟里域真官密享神功永居福地上願帝圖隆固聖壽延洪太子諸生擁宏休而奉國后嬪主承景貺以匡朝中外寮臣六軍萬姓同歡昌運克遂安貞嵗有豐登俗無疵癘率土之內一統萬方竝臻仁壽之鄉咸奉昇平之化不任歸命披心虔誠懇願之至伏聞至道元通神功廣運裁成天地敷讚帝王羲軒融燧之君堯舜禹湯之主莫不師資沖漠啟迪雍熙致祚歷之厖洪俾聲明之振赫或乘飇滄海或證品紫庭光燭九遐壽均三景伏惟大蜀皇帝乘樞御運握斗披元執大象而撫華夷駕六龍而綏億兆德逾堯禹聖越羲融穹廬窮髮之君奉琛向化靡漢渥洼之虜重譯來賓澤浸山川仁覃草木靈禽棲於內苑嘉獸宅於上林三秀呈祥十朋表異而猶勞謙恭己讓德於天符寧謐無為棲心於祕要今則神明幽贊靈化垂休渥澤潤洽於朽根枝榦再榮於枯柏風來翠壁重飄遠近之香月過華壇復覩扶疎之影其為嘉瑞實冠古先有以見天枝帝葉之繁昌聖壽寶圖之永遠雖禾生清廟蓂吐彤庭徒美前聞難偕聖感臣榮逢昌運叨領郡符屬邑之中覩茲上瑞藻繪朝陳於龍闕絲綸夕降於鳳牋旋賜御詞嚴申醮祝襃稱顯煥榮耀優隆量恩而溟海未深荷聖而乾坤難報敢因皇帝本命之日修金籙道場翹罄丹襟仰祈元貺伏冀諸天降鑒萬聖照臨流巨福於社稷尊靈增景祐於宗祧先聖二儀竝固萬國同文皇帝壽等岷峨明齊日月暜頒正朔一統寰區皇后受福紫宸增齡丹籙皇太子永扶皇極養德青宮公主嬪榮匡聖日諸王百辟欽贊皇基九土乂康五兵韜戢煙塵殄息稼穡豐登動植飛沈三途六趣俱承惠渥咸詣福庭臣誓傾忠孝之規上答聖明之澤伏以五氣元天北宮大帝司明善惡統御死生壽祿吉凶咸資校錄臣竊恐天文宿曜有臨照之災本命行年有刑妨之咎仰祈真聖特具修禳虔罄丹誠同申醮禮伏乞解除災厄延益年齡落死籍於北酆上生名於南極公私和泰眷屬安寧即仰荷帝君慈祐之恩臣獲奉正真參受元籙內期修鍊以保身心外冀威靈以禳災沴依科佩受早遂寶持但慮世務所拘塵機所役齋戒之日朝謁有虧修行之辰香燈或闕善功未立過咎易彰真氣靈官未垂應祐元司天府譴責不專三命五行災衰未蕩旦夕憂懼冰炭在懷今以上會之辰天官考校之日功過善惡巨細無遺是敢瀝懇披心虔誠悔過精修醮禮拜奏章文伏惟眾聖垂慈赦其愆咎降流靈應銷解災凶三部吏兵常加祐護動息康泰永亨利貞即仰荷法籙真官濟護之恩伏以二象既陳三靈配位陰陽陶鑄天地權輿巢居穴處之君澆漓未作上棟下宇之制締構云興由是取則五行定規六紀順之則福延善著違之則禍起災生考其主張實惟五帝臣所居之處經始有年土木之用繼新畚鍤之功累作竊恐上干五帝旁犯眾神又今嵗興修當行年之位近則馮氏忽嬰疾苦懼因犯觸所成輒按元科虔伸醮謝備三天之舊法請五帝之靈符乞降正神俯流真氣永錫安鎮俾獲乂寧凶邪不侵內外康泰疾厄蠲蕩眷屬咸和青宮增祿祚之文黑息災蒙之數克勤修奉以答神功不任臣以凡微獲逢道化常承覆祐實荷真慈自頃以龍紀元年奉使支郡方傳上命遽蹈禍機危懼之中真靈俯祐獲全形命盡脫憂疑兩地未通三年隔絕臣男延龜懇伸禱祝累告神明天鑒誠深親承應兆仰惟至聖介此殊恩思罄丹心克伸報謝今則上元大節啟福良期輒備醮筵上酬明貺伏冀省臨薄禮采納菲誠答往願於當年期降恩於此日永當修奉以荷神庥不任伏聞清濁分形高卑定位南北御死生之籍陰陽有舒慘之殊由是南斗尊神六宮眾聖紀功舉善克揚不死之文主籙定年惟啟長生之本欲使物皆歸道人盡登真副天尊廣濟之慈遵大道好生之理而塵波易溺意馬爭馳罪網牢籠莫有奮飛之路情關固閉曾無開拓之門臣跡處人寰心拘俗役機權在握須行懲勸之文刑賞是司難徇沖和之用慮其過咎累積陰曹更屬災凶便為厄會雖繼伸祈懺上叩於天曹而未吐明誠仰陳於南極今則考祥吉日崇設醮筵輒按真科盡披丹懇元元下土虔露於瑤階昭昭上真必降於瓊席敢期哀宥俯念凡微釋罪除災落北宮之陰錫年增祿上南斗之陽篇六宮永紀其姓名五緯潛資其福祐乞使九元七祖介福朱陵五族六姻延祥紫府誓勤精奉以答鴻慈不任伏聞二氣降和乃形品物三光布象以育㣥生惟茲最靈仰承明祐至於行藏善惡動息吉凶咸繫上天以司下土臣幸承前福叨沐道風事主立身得罄忠誠之節循懷省已常持兢慎之心祿秩所霑神明是貺每增憂灼實慮玷危而眼疾所嬰累年為苦針藥雖至服餌益勤未獲痊瘳倍增驚懼恐陰陽年運遇此重災宿曜循行成其困厄曾申禱醮冀獲安寧今又身宮之中暗虛所歷當茲久疾值此災期啟向無門仿徨失據伏聞真科有格醮酌垂文輒竭丹誠上希神鑒精修醮禮延降尊靈伏惟九曜威神分光照納解其宿咎和釋冤尢銷彼災躔蠲除疾厄使紫童守衞眼宮無痛惱之侵青帝護持肝臟有安平之候凶衰永息祿算惟新敢忘修勵之誠以答照臨之賜不任臣獲以凡微早聞道化棲心澹泊注念正真每展祈誠必蒙昭祐昨以公田既闢壠麥初齊遲遲之春日載陽羃羃之油雲未布眷茲農畝正切憂惶輒叩幽關果垂鴻澤爐香散處便呈潤石之容禁水噀時已變如膏之雨遂使西成有望東作無愆可俟京坁以豐川蜀上聖之延祥既厚下臣之報德何階虔拂翠壇式陳單菲蘋蘩薀藻誠非仰薦之儀繒燭香花敢備上酬之禮伏惟采納永錫嘉祥謝過祈恩不敢繁啟不任伏聞大聖無私隨機赴感至真下濟應念降靈變通不間於塵凡救度豈遺於微眇臣自惟幽陋竊慕元虛洗心依冥漠之鄉潛希懺罪稽首仰鴻蒙之境冀滌前非上祈拯拔於七元次乞和寧於四境纔披素款遽降鴻慈爰俾神交授其嘉夢魂清氣爽全殊化蝶之時捫腹安懷有類得鮫之夕固可表豐嵗之兆知災息之微緬維神功申茲景貺兢榮失次感激難勝思答靈恩重修醮禮鴛燈吐焰參差玉斗之光龍霧飄香散漫瑤池之色全祛萬慮共運一心伏帷丹府上真六宮高聖俯迴鶴轡暫降電旗采納寸誠哀憐末俗拂長生之金札開大宥之洪休賜其延永之年增以自新之祿主務則三農告稔訓戎則七德申威罪咎蠲銷公私昭暢存亡介福眷屬延生北元除錄過之書九府錫增年之籍况復五緯循行或逢臨照三元繫命時有屯亨遇災生福盡之期當减祿奪年之數常情罔測揣分懷憂非仗道慈無由自濟伏聞太上啟修禳之典天師著祈醮之科謝罪必銷祈恩克降今以本命之日輒披正一之文虔拜靈章式陳微醮三宮五緯咸罄誠祈六府七元暜申懺謝伏冀眾尊昭祐大聖鑒臨赦已往之過尤錫將來之福慶三災弭息九厄蠲消壽紀潛延祿祚興益七元九祖超度幽扃五族六親均承道廕公私永泰存沒康寧即仰荷大聖罔極之恩不任臣宿運所鍾遭值道化佩奉真籙獲以稟修而功業未彰愆尢易積陰陽爽候疾疹所嬰憂迫既深叩祈是切果蒙昭祐旋獲痊平又以中元之辰欲陳黃籙之會仰告真聖願遂丹心今則壇席克終功德成就關盟有應風雨無侵冥感聖慈効酬難盡敢因本命虔備科儀設微醮以展誠拜靈章而請福伏冀高尊鑒領眾聖照臨前願已圓殊祥下及使臣罪銷厄滅業著功充奉親既保其安寧薦遠必霑其遷拔永堅誠礪以答真靈不任伏以青城仙山丈人靈觀開九室而數洞觀㣥嶽以稱尊自軒后錫封漢皇望秩元宗構宇先帝增崇仙室益嚴清壇彌肅近則良宰興葺靈宮鼎新而正寢之西猶虛隙地邃牖之北或睹餘基元元之像設未陳帝子之遺蹤宛在輒欲興修祖殿經始齋房永資焚謁之儀克壯清虛之境將施畚鍤慮犯龍神敢備醮筵虔伸昭告伏惟允茲丹懇降以元休使功用必成上下無撓工徒安泰福善攸新不任伏聞天地分靈三官定死生之格陰陽懸象九曜垂照燭之功南宮開延壽之符北府顯繩違之星躔嶽瀆考校無私凡在人寰咸由統御臣自惟微薄獲奉元慈而履行之間恐乖陰步馬運心之際未合神明因遇災凶復兼愆咎遽成厄會莫遂懺祈今年中宮則天符所臨身位乃土星對照大運猶居於劫殺飛旗又寄於行年三命五行恐逢刑剋列星九曜更慮照臨所以轗軻未寧災厄頻作非憑至聖無路叩祈是敢虔罄丹誠克申大醮伏惟眾聖俯降福祥消災咎於將來釋過尢於既往六曹司命增福算於丹天七紀尊神介休祥於元極公私清泰眷屬安康即永荷眾聖祐護之恩不任伏聞道化宣行元功覆載陰陽不測亭育無私由是五帝三皇御六儀而統物天官水府司八會以持綱南宮明錄善之科北極總繩非之品吉凶罪福咸繫靈曹竊惟全蜀奧區華陽會府提封八國柔服諸蕃玉帳既崇金臺實峻外清殊俗威懷則文武兼資內握雄兵申令則賞刑俱用臣切以張某久持重柄獨運赤心上稟聖謀仰遵廟畧或指蹤貔虎清蕩邊陲或恢復城池削平疆土或誅鋤姦猾摧挫兇豪或督課賦輿經營軍食以茲多事詎可禁刑深虞斬決之間重輕有失因成譴咎曾未懺祈又恐三命五行或逢衰厄明星暗曜或值照臨神道至幽常情靡達非聞至聖難滌深瑕是敢依詣靈山修崇大醮遍天地陰陽之府周星辰日月之宮瀝懇披心祈恩悔過伏願靈光迥鑒除已往之愆違惠澤下臨息將來之災否允垂嘉祐永介福祥延壽紀於丹篇落罪名於黑籍以康川境永保㣥生不任伏聞元聖開光高尊俯化澤周品彙慈覆萬夫懸罪福之明科標死生之大法上惟邦國下及人臣同歸統御之門咸宗沮勸之訓古今不紊纖介無遺臣伏念佐聖立功非賢不濟扶危拯難非德靡先節度使王某義貫神明也忠衞社稷耀武畧而先朝返正鼓仁化而今聖理平用是茂勳錫茲巨鎮其間或剋收宮禁誅蕩妖兇秦甸行師襃川振旅廓清庸蜀底定盧彭外靜邊方下戢姦暴蓋不得已未能去兵至乃宣天子之威用將軍之鉞無非仗順必在為時尚慮故殺誤傷因成釁咎天曹地或紀愆違又恐宿曜所臨行年有厄歷運衰否分野災凶須備懺陳以期昭洗臣叨居寮屬輒按經圖仰罄丹誠恭申大醮潔禮頌於仙嶽奉榛糈於靈壇上叩虛無極諸天而禱祝旁周海宇俯九地以虔祈冀達精思曲流真祐願北宮赦罪南極延生五行之否塞清銷三命之災衰弭絕壽將川廣祿與山崇穀稼豐穰蒸黎輯悅常扶聖日永福㣥生上願國祚遐長聖朝寧泰戈鋋自息文軌大同三光順度於上元萬類繁昌於下土幽明異趣水陸殊階咸沐真慈共臻鴻澤不任伏以天地萬神陰陽具職敷舒道化拯育㣥生北極西宮秉刑章而定罪南躔東府播含養以宣功粵自帝王洎諸臣庶咸歸宰執以判吉凶臣夙荷福因叨塵官籍蹈艱危之路當戈甲之秋一從戎旃再居名邑而疆陲遐邈征稅繁豐寬柔則征督無功剛峻則疲羸有怨類驅雞而豈易顧馴雉以殊難况未洽和平猶資刑賞雖絕私自勵惟理自從尚慮重輕或乖中道深憂故誤遂結瑕疵又恐辰耀所居行年所歷因其厄滯以搆災衰境麗仙山雲藏真觀洞包雷雨地集神龍仰靈都於罔象之中願披丹懇瞻玉相於煙霞之表必降元慈是用按靈寶舊科設周天大醮暜九圍之宮府遍十極之威神拜手歸依傾心祈懺洪纖罪目今昔愆違未兆之災將來之咎竝期蠲赦曲賜消禳眾厄清夷宿冤和釋更增微祿俾遂遐年九祖超昇三途開泰臣一家骨月兩地親緣早獲團圓俱賜貞吉頃因修造慮有侵傷冀獲安寧共貽祥祉當境靈廟川澤職司俯祐生靈旁祛氛沴邑無水旱俗富倉箱其有冥漠無依漂零魂爽霑茲福利亦契逍遙不任伏聞三光表瑞九曜凝輝配金木以司方四時攸敘定陰陽而立象萬彙生成立宰幽明統臨罪福臣自惟凡陋獲奉真靈懼履行之間易成愆咎修持之道未契神明况職務所司重輕咸繫恐乖彞法更積過尢惟夙夜在公敢忘虔恪而吉凶難測倍切兢憂兼以宿曜所臨輒罄懺祈之懇爰因本命恭備醮筵備香火以貢誠列星燈而展禮所冀希夷至聖俯鑒丹心九曜上尊曲流元貺釋罪尢於既往解厄運於將來冤債銷平凶衰除蕩更增壽福永介祉祥眷屬乂安公私和泰不任伏以青城仙山丈人靈觀久無營葺近再修崇既畢巨功爰徵繪事輒於廣殿圖肖真儀鶴貌雲容疑謁潛靈之府瓊姿淑態似來澄碧之容莞爾可瞻肅然如在必冀降靈威於水德流福澤於人寰克展醮祈仰希鑒祐無任伏為丈人觀久為荒毀近畢修營土木之役既興粉繪之功是設爰於閟殿圖貌靈儀翠雲丹錦之袍元璧黃琮之器星景日精之品五華七稱之殊二驂六馬之車雲翼霞軿之輦儲副二室佐命八山嶽君水帝之儀溪女河侯之列山林孟長沼沚靈司帝王咸秩之曹典策所封之位或傍司海裔東距方諸或別領洞天西鄰崑嶠莫不振揚雷電嘯嚜蛟鯨按察幽明掌錄川澤贊太上正真之理宣帝王亭育之恩歆彼六氣成乎大化比秋冬春夏遵時令以無虧風雨雪霜均嵗功而不爽俱奉軒轅之命皆持宰執之權與嶽瀆眾靈供上司之職則希夷真君居天尊之重當臨御之嚴頒序朝宗所宜森列今則揮毫匠手彩布循垣燦若星陳矗如雲擁由是宏裾襃袖玉劍珠旒火佩含星瑤珪斂月或瓊顏蒨袖若辭姑射之峯異狀奇姿似照潯陽之浦丹青式備絢煥如生固當契彼神明藂茲福祉上扶邦國傍祐黎元調十雨五風以登稼穡暜九州六合以致雍熙洪圖齊日月乾坤元化匝蚳蝝動植虔修醮酌恭罄祝祈佇降威靈允孚禎貺謹詞伏以三官領籍五帝定生南天司祿算之文北斗統糾繩之目至於嶽瀆真府本命宮曹主張而罪福無差考校而死生攸繫臣竊慮謬膺撫字有曠輯和刑章或爽於重輕教化未臻於德義因成罪咎錄在靈司未申祈謝之儀恐致災凶之兆又慮天文宿曜或值照臨本命行年或逢否塞兼天符五鬼在坤艮之位居本命之辰况正月對衝尢懼衰厄敢因元命之日虔詣靈山修設醮筵披露誠款伏惟天曹釋過地祛災凶咎潛銷福善昭集克延算祿永錫利貞更乞邑境安寧生靈康泰穀稼豐植水旱無侵人無疾癘之傷俗洽和平之美不任伏聞大道生成元和鼓鑄流形品物布化㣥靈申上元宰制之功垂下土吉凶之戒是則懲惡勸善信為格言害盈福謙固惟常訓臣夙聞元旨敢不冥心揣分兢懷省躬思道而叨居祿秩未脫囂氛秉朝憲則筆定典刑督邦賦則庭施檟檚功或興於土木膳未罷於炮燔故誤之罪莫知重輕之文或爽以茲憂懼恐結尢違况臣今年天符臨本命之辰太白居愁滯之位竊恐志隨災易留連於聲色之間情逐禍移沈湎於杯觴之內因思警慎仍切懺陳敢於本命之辰虔罄焚修之禮濯心靈洞歸款名山仰斗極星躔冀銷往咎瞻鳳軒龍葢願降新恩使罪戾蠲平冤尢和釋災凶寧息祿算遐長骨月則兩地樂康生靈則一邑豐泰兵鋒永偃疾癘無侵水旱勿興農桑滋阜龍神安鎮遠近昭蘇誓策丹心上副元造不任
