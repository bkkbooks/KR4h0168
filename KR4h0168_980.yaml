  - {type: head, offset: 3130, content: 對注書判, id: KR4h0168_NFKB_980-h49, level: 2}
  - {type: head, offset: 3130, content: 斛律景注書為長孫乙所竊遂行於代景男訟之, id: KR4h0168_NFKB_980-h50, level: 2}
  - {type: head, offset: 3313, content: 對注書判, id: KR4h0168_NFKB_980-h51, level: 2}
  - {type: head, offset: 3313, content: 斛律景注書為長孫乙所竊遂行於代景男訟之, id: KR4h0168_NFKB_980-h52, level: 2}
  - {type: head, offset: 3479, content: 對易道判, id: KR4h0168_NFKB_980-h53, level: 2}
  - {type: head, offset: 3479, content: 甲居重澤介疾有喜遂存乎辭或告其妄干他事初不量力甲云剛德閑邪何往不利, id: KR4h0168_NFKB_980-h54, level: 2}
  - {type: head, offset: 3634, content: 對易道判, id: KR4h0168_NFKB_980-h55, level: 2}
  - {type: head, offset: 3634, content: 甲惕號暮夜有戎勿恤中軍按逗撓為咎將議明罰甲訴初往不勝今得中道, id: KR4h0168_NFKB_980-h56, level: 2}
  - {type: head, offset: 3740, content: 對易道判, id: KR4h0168_NFKB_980-h57, level: 2}
  - {type: head, offset: 3740, content: 丁即次得童僕乙於處得資斧在旅之時所得各別未知孰是, id: KR4h0168_NFKB_980-h58, level: 2}
  - {type: head, offset: 3890, content: 對易道判, id: KR4h0168_NFKB_980-h59, level: 2}
  - {type: head, offset: 3890, content: 乙入於幽谷三歲不覿郡吏詰之稱澤無水以致命遂志, id: KR4h0168_NFKB_980-h60, level: 2}
  - {type: head, offset: 3989, content: 對易道判, id: KR4h0168_NFKB_980-h61, level: 2}
  - {type: head, offset: 3989, content: 景虞吉有他不燕或謂繫心於一云義及豚魚志不可變, id: KR4h0168_NFKB_980-h62, level: 2}
  - {type: head, offset: 4186, content: 對易道判, id: KR4h0168_NFKB_980-h63, level: 2}
  - {type: head, offset: 4186, content: 景之宋得乾坤丁告違禁景不伏, id: KR4h0168_NFKB_980-h64, level: 2}
  - {type: head, offset: 4284, content: 對署書題閣判, id: KR4h0168_NFKB_980-h65, level: 2}
  - {type: head, offset: 4284, content: 得甲代以署書為業因題閣而變華髮自後而絕鄉黨以墜業擯逐之甲訴無犯不伏, id: KR4h0168_NFKB_980-h66, level: 2}
  - {type: head, offset: 4487, content: 對好長鳴判, id: KR4h0168_NFKB_980-h67, level: 2}
  - {type: head, offset: 4487, content: 子弟好長鳴鄰告是過聲, id: KR4h0168_NFKB_980-h68, level: 2}
  - {type: head, offset: 4613, content: 對巫祠秦中判, id: KR4h0168_NFKB_980-h69, level: 2}
  - {type: head, offset: 4613, content: 南山有巫每祠秦中輒用王禮所由不禁御史詰之詞云恐為厲也, id: KR4h0168_NFKB_980-h70, level: 2}
  - {type: head, offset: 4697, content: 對巫恒判, id: KR4h0168_NFKB_980-h71, level: 2}
  - {type: head, offset: 4697, content: 巫恒堂贈鄉人反接置於廣柳, id: KR4h0168_NFKB_980-h72, level: 2}
