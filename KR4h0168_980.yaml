front:
  text: 全唐文欽定全唐文卷九百八十闕名二十一
  hash: sha256:c18a9201ad712dce758ba4003df7d21ac9adefab1ffc6cd267b4c8c490af99e6
body:
  text: 三輔名區千里奧壤決渠為雨荷鍤成雲衣食之源見資於犬畝桑麻之利實賴於溝渠故隱於金椎沉之石楗用防飄梗爰備蟄流縣令職在字人化兼馴翟用遵常式或未成規良以秋潦未收且疑於瓠子春流詎泛未慮於桃花修葺既非後時府科何其速耳請從按記愚謂合宜九扈分官四星垂彩廢其業則金湯莫守修其本則禮節是興故晁錯獻書每論春稼仲舒上策特說一作憂秋麥人之天也其可輕哉甲有良田從來不墾佩犢之風未革維魚之夢豈成以粟輸官自貽重罰輒將施惠遂有薄言然而周覽經史備觀賢哲漢臣散利不見貽辜齊客市義無聞結怨欲加嚴罰不亦難乎甲告誠是妄陳旅師請從寬宥國勸勤農戶分田畝三時克務九穀斯登乙有良疇頗為膏壤我疆我理式辨於溝塍是藨是蓘以薅其荼蓼觀黍稷之薿薿見麻麥之芃芃佇成庾億之詠冀貯畝鍾之積推耕讓畔異閑田之莫爭越陌度阡爽野廬而不禁乃徑踰而是苦實網漏而將疎蹊田奪牛昔聞太甚議獄詰鼠合則持平宜稽廷尉之法用正野廬之罪列爵惟五肇侯伯而成規分土惟三自夏殷而立制為之中上次以卿士式序代耕之祿攸均列國之田任土歸餘則聞恒政朝宗會正豈得踰閑惟甲策名膺茲利建朱羽入貢一作朱絲入仕漸飛鴻以成儀白茅致封均錫馬之蕃庶子男為秩雖居尊爵一作號之榮井邑分疆爰在閑田之列里不充於五十國誠在於附庸文軌則同朝覲非及禮不合於天子事將託於諸侯抑惟典常一作章孰為乖越科之不伏誰謂非宜丁家類封君田成永業是稱近甸亦曰膏腴資貨乃兼於中人沃野自登於上賈義殊不穡頗謂多藏道則惡盈志何自滿必也德均洙泗學究典墳專經述鄭元之風精義盡邱明之奧學優則仕道尊為師類張禹之置田殊蕭何之遺子况稱恩命豈等平人御史繩之終難糾詰三秦奧壤陸海良田原隰條分溝塍脈散涇渭傍潤鄭白疏流荷鍤成雲決渠降雨秔稻漠漠黍稷油油無爽蟬鳴之期有至鳳冠之稔其地則上厥價惟高準丁而請則無妨廢據勳來射交爽事宜理既不通地須追奪緬彼古制攸列場人候農祥之戒晨服先疇之犬畝乙偶昌運不知帝功是藨是蓘爰稼爰穡場列瓜蔓圃資蔬材艹靃靡芬芳歲阜其用多稌多黍乃顧於中田優哉游哉坐矜於老圃果碩於灌或成蹊而則妨枳樹於籬任為疆而何有里人不識輕為誚一作詰讓徒肆無稽之言難投有戾之任十地分宜順其高下九夫為井列以溝洫式備水泉之害將損壅塞之虞利以生人成其務本永言經典實著廣深自畎澮而陳規及園鄽而不紊守之勿失敏則有功惟彼匠人誠為盡力審端徑術善相邱陵設夫間之小溝明遂上之有徑水勢地勢因而用焉善溝善防斯焉在矣二尺為度殊其不法三農取託乃亦有秋方黍稷之離離見流波之活活決其行潦達彼巨川庀度功程規模曲折即和夷之既藝豈陵谷之將遷樊遲學於孔門自得老農之術哀公問於有若寧有不足之憂縱彼公田何妨稼穡况茲萊地已輟耕耘將為功少取科實為淫刑以逞十門吳堰撫昔事而無慙三章漢條因茲躅而當逭論以天倫分乎季孟鍾其大運異彼賢愚苟愛敬以存誠固傳襲而無忝是以隱公推魯爰高克讓之聲太伯辭吳卒被至仁之道眷言於甲克合氶家同周子之有兄寧分菽麥懷謝庭之列照顧馥芝蘭黃金滿籯已奉一經之訓白茅錫壤言逃五等之封竊意元昆顧伯夷而見捨思深內敏豈酈食之非狂接輿行歌此時方奏州吁安忍是日非聞務以黜聰用辭深疾縱罕著於誠信終自牧於謙撝馮恢不言未將諧於哀懇韋元晦迹俄見劾於方書鴒野急難無違六順豸冠嚴勵何罪雙珠庶將必復台階無乃妄繩憲府氏遂養伯宜再從姪承襲事辨方經野天子之疇庸開國承家諸侯之立社盟河誓嶽藩屏之任攸歸鏤鼎銘鐘公侯之業為大門驅駟馬路擁旛旗謀孫寄於象賢嗣子希於必復伯宜太微參伐登上將之榮階黃土白茅踐通侯之貴秩千二百石與㣥后而俱朝二十八星其功臣而並列當陽侯之文武空勒高碑孟嘗君之池臺終同下淚數奇興歎殊李廣之無封天道何言傷鄧攸之不嗣陳氏鸞傷玉鏡鶴怨瑤徽分劍匣之沉浮異椅梧之生死崩城一慟非無婦之哀染竹千行自有湘妃之泣對霜閨而憫默徒念平生撫猶子而傷心空思繼絕立嫡違法自有金科無後國除宜從甲令千乘制國百堵興詩義非取於復隍道實遵於高壘繕葺惟隙人其以寧廣袤無稽禍由莫大是以京制非經禍延鄭伯梁興不處卒有秦兵在悅使以忘勞豈嚴刑而毒衆甲為其植是訓於從庀以功程務其操築傅巖之野疑將見於代刑邑中之黔即類聞於有沮興其百板就以九成方取託於啼烏佇推功於射隼匪隕孀妻之慟寧頹薛縣之琴晉獻城周初開仞邑華元植宋遂見為謳省已良虧尤人遽覩棄甲而復事本叶於前聞執扑以行譴何貽於是日咸其輔頰雖成滕口之嫌既勤垣墉請逭噬膚之罰五材並用關石是鈞百堵崇墉麗譙斯起頃以春風折棟秋雨摧梁雲構俄見於朝傾邊聲不聞於夜泣既而周官揆日斲之登登郢匠成風行者擾擾杠木之下危於坐堂改途而行何必由戶異文王之所避同子產之見壓孽由已作殃實人興取類憑河有均暴虎據法雖論誤殺在禮為之不弔日中為市天下攸集貿絲抱布虛往實來士馬星繁寶貨山積君平卜肆推步自資相如酒筵朝夕牟利乙識非賢達情昧憲章闤闠少游未見閱書之美旗亭之下自貽恐衆之愆一等事源不可開恕三尺律令請置嚴科甲孟地遙汾澮居此閭閻喧上陌之風塵亂中衢之車馬攸繁湫隘未適閒居仰甲第而多慙顧衡扉而自惡鄰光近接亦重於邱墳竇孔傍流忽染於泥滓遂使浮雲之騎坐惜連乾道路之人行嗟揭厲流惡既侵於五府議刑還抵於三章牒送有司用懲其失惟丁門接通衢美非仁里異汾澮而流惡成閭閻之致沼遂使軒車曉度將墜於曳輪銅墨風行有聞於箠令雖禮律之目彼此或殊小大之情得失斯在而法有恒禁政貴移風故議事之刑則符令典妄情之訴期於自息赤縣分曹黃圖控邑周公曲阜池是浮龜之浦元禮高門人積登龍之望擊鐘鳴鼓歌吹由其沸天向術當衢廛閈於焉撲地屬長空驟雨看石鷰之分飛廣術頹墉見銅駝之咫尺仲尼數仞無復及肩相如上林惟餘填塹徒掃茨之有刺終射隼之無由奚興洛汭之垣載俟傅巖之築雖人惟比屋而地實離疆幸無踰於舊途理宜歸於本界若其衆戶始可興功自招頭會之嫌仍必面牆之請與奪之理斯之謂歟任蘭幸逢昌運得齒齊甿欽奉太和庶延遐壽豈謂夢瓊殘喘奄就飄零連石餘輝遽聞遒盡但以庭虛謝玉掌絕韋珠同伯道之無兒類伯喈之輟嗣孟軻五畝竟闕承基揚雄一區俄從別授縣司以女既出嫁判給晁諺之家州司以宅是見財斷入郭恭之婦宅及資物女即近親令式有文章程宜據帝宅天居深宮邃宇閶闔爰啟甘泉是壯必資恭敬無或登臨景昧科條輒茲違犯且登臨之理抑有前聞桓景所以消災山濤猶其望遠若非此道終合加刑法司處以徒年景訴猶為文過謂從令所冀減嚴科且前星發輝少陽開景銀牓之門斯闢玉裕之德稱尊焉可輕然聿來憑眺法司科詰正合公途宮室九重深居而理山河四顧設險為雄或有登臨當其近密始疑楚客極目春江終類子牟遊心魏闕事必無故情其難捨抵玉律以懲違論赬衣而何失既有詞於令所須閱實於司存懸議科條恐貽深刻天開紫極地列鎬京渭水即飲龍之津橫橋得牽牛之象而二縣稱劇兩城攸壯望雙闕而如雲對九途而若礪頻年淫雨中逵泥濘石梁隳構鐵鎖不修馬惜連乾遲迴於欲渡人嗟揭厲歎息於無良既愆十月之期須明三典之坐然則據地雖從縣管修橋乃合監營職司自可為憂有詞無宜濫罰飭五材而入用選百工以就程俾令蜿蟺如虹佇見闌干若斗請準此狀各牒所由漢陽故國隴岑舊境眷彼郭丹効官茲邑同元淑之計吏比孫楚之參卿而重關設險是稱襟帶因辨馬而方來候鳴雞而載入符繻且棄雖有異於終軍道德斯畱亦何慚於柱史從茲經度未失事宜若論尹喜之辜誰執伯陽之罪胡有妄告合抵刑書在於二人何所推鞫甯成刻薄為吏威酷成章吞舟之魚翻聞不漏觸隅之鳥遽見無逃不能戮辱自明羈遲取効而乃背叛西土蓄積南山刻傳既曰詐欺踰關豈為誣罔請寘周侯之罰仍從漢相之科竟戎地接汾河業膺洙泗道標強學擅英妙於州閭年在弱冠慕明經於鄉國籋雲行地載馳千里之路警露聞天爰振九皋之響遷亭記柱馬生之壯志可追函谷棄繻終軍之雄心尚在雖言高方朔而調下孫宏便抑大成將從小選入仕有吏曹之恥出關無使者之榮名宦以調役生悲田園以歸來興歎昔時過所以委於中途今日行文須憑於下署無宜部傳不可買符事在宏通理難退抑香街隱隱垂柳垂楊行道遲遲載飢載渴既繘井而辨義亦鑿木而設機故窮谷射鮒坐忘抱甕之勞挈水濟人行符種玉之兆魯宣遊往未捨蟻邱之漿漢尹載馳旋覯章臺之陌責其專擅雖掘地而及泉濟以途行庶恢天而漏網苟利則可胡其未從自鳥跡垂文龜圖渙彩經文光乎歎鳳詩什燦乎歌鸞由是百氏分門九師殊見詞義紛雜襃貶莫同針彼膏肓起茲廢疾杜元凱先鳴於麟史王輔嗣推雄於象繫一作經高山景慕何莫由斯斛律景投斧誓心題橋表志研精覃思溫故知新採摭㣥言遂立訓傳實求貽厥垂範將來長孫乙宅心典墳先無書籍習史迷於逐老窺字感於陰陶黃金滿籯罕有一經之譽白珪無玷不聞三復之言而猶借韻李奇竊名州黨今景男有訟方覺是非理須更為昌言美惡自然明白卦演龜文書分鳥字左言右史紛綸於圖牒帝典皇墳昭彰於篆籒自非沉鬱淡雅以居業修辭立誠以進德則未能究精微之奧窮闔闢之源惟彼長孫器劣才窶竊沉冥之號求著述之能覽向郭二莊其為可及見虞王兩史自謂過之殊不知道不虛行名不苟得蜩甲蛇蛻有似之而非真寶玉大弓亦得之而便失厚顏之甚實謂伊人景男之訟誠曰未達聽訟吾猶人也必也使無訟乎慢藏致盜則又誰咎請更詳審待至量斷乾坤既列易行其中六九斯重爻見乎外有同功而異位亦原始而要終惟彼甲也乃居重澤當周公之述聖義存乎詞及尼父之窮微意筌於象然則上下合應利殊攸適剛柔立體位或非居是以同心暫間遄當介疾之失和光使終一作和兌終從聿成勿藥之喜以干事而告未曰知章以量力而言何哉懵識况乎形自然之變含不測之神古皓首而難明今丹筆而爰一作奚定舍而勿問愚謂合宜三才孕育六位時成藏往闡幽鈎深致遠用明失得之報是興易簡之能甲亦何為形諸卦兆居悔吝之地處動靜之中乍行乍藏或進或退初往不勝故惕懼而號呼終歸得中則有戎而勿恤實元亨之利往乃爻象之情言中軍按論憑何議擬括囊已是無咎逗撓寧宜有刑聖人作易窮理盡性君子明道體微知章發揮於剛柔而生爻觀變於陰陽而立卦用存悔吝之介式崇簡易之源既致遠以鈎深亦仰觀而俯察相惟丁乙俱形卦兆匪以蒙而養正諒在旅而多虞異乎先笑後號豈曰大來小往得諸童僕知爾躬以無尤獲其資斧識我心之不快考即次而知是驗於處而覺非稽周象之文休咎斯在閱旅人之卦得失可明請探六畫之旨以取一言而蔽易之為書解類成象因涸澤之為體致幽谷之深潛君子是以養蒙晦明致命遂志豈隕穫於所遇將考槃而自得金車欲駕來尚虛徐朱紱方亨猶多臲卼龍盤所以致用蠖屈豈不求伸十年反常志或斯在三歲不覿吏亦何非苟罔一作用有違可以無詰行克有孚義形於色可為已干櫓將措身波流敢昧斯言不知其可景學乎前訓從事於茲知通幽洞微設卦觀象敬慎不敗利用為恒動協中庸德均上善獲此專吉莫知其他同夏翟之姿難儔耿介比寒松之節但覩青冥非無所守其不可變語稱近義敢匪聞諸易著盈缶死而後已豈荀息之受託終不食言何周勃之為臣取於木訥所以繫心於一存忠篤而不喪執志無二賤華美之外揚及於豚魚應彼鳴鶴或者所謂于何其臻且誰譽誰毀寧當盡好所以所安寔宜必察誠知言者不中無問吉人寡辭景德行純懿道術通明齒迹堯封鬷邁宋國探微研奧鈎深致遠思尚長之薄遊每敷損益同宣尼之志事載演乾坤丁性直狹中奇疑能劉疑善類膚受之讒愬異皮裏之陽秋發言盈庭誰執其咎今動作非妄隄防未渝心儻偶於木人罪庶寬於艾韋卑幹蠱馳聲惕厲終吉振人為義何難之有顛沛於是克荷良存甲絕翰深規代濟其美精逾史籒得方丈之宏模蹟洞張芝改圓池之波態晉廷稱妙即擅一臺越市推珍還標五字諒無隕於前構俾垂裕於後昆孰謂象賢旋聞鮮克屬以功開揆日翥偃蹇之雕甍號起淩雲結曈曨之畫閣式題飛牓方呈鵲返之書坐陟雲梯遂變虎賁之髮菱花鏡裏非復青顏薤葉風前俄隳素業垂堂取誡誠欲謹身良冶遽捐其如棄訓撫韋家之宿事徒想欽承語王氏之門風深違祖述永言邱首難忘懷土之心浩意家聲宜復懸針之藝文物有章威儀以等式昭邦典將糾禮容鼜鼓戒宵發五通於晨警金鉦節旅齊七步於軍氣由是吹豳擊土載享原田奏角鳴鼙爰威鹵簿蓋偏伍之為用誠子弟之能學籥章且誦古典猶施於樂言長嗚好為今日翻抵於鄰告過聲本防於建國吹節何傷於習常肇此刑書終貽滅趾捨功錄過無或噬膚金矢尚艱鍰罰奚詰神祠所置祭享有由苟非國章無列祀典是以分巫覡之職審鬼神之狀恐伯有之為厲矜胡亥之乏祀小大從時輕重不越明無夭昏之患幽得憑依之方生既殊於庶人死何廢於王禮謂執憲之徒詰宜所由之不禁惟彼巫恒志探幽賾以為階儺有禮堂贈無方式從招梗之儀自得禬禳之術鄉人悟不知之毀迷獨見之明恃衆生威率情含怒同舞陽之從代鎮巳能反接異季布之適朱家翻為置柳處之刑典豈待邦成請從片折之詞以白違行之訟王遇稟性不臧立身非謹官雖登於一命慮猶闕於三緘不思口關坐彰言玷妖詞妄作雖未惑於平人正罪應論事可繩於峻典定刑名於木吏應入流條量減贖於金科合從徒坐
