front:
  text: 全唐文欽定全唐文卷七百四十二軻字希仁元和末進士文宗朝宏文館學士出為洛州刺史
  hash: sha256:4f110c2a4dd66ee20f4f675d5c05d0ab13edd12686e04bcedeb45925aaaf5001
  markers:
  - {type: head, offset: 14, content: 劉軻, id: KR4h0168_NFKB_742-h1, level: 1}
body:
  text: 當今帝堯在上夔龍為相犬戎新逐三晉四戰之地無梟雛狼子是宜徼福者爭歸賀於相國某獨不敢以是心同眾人之唯唯思有以一跪吐而未果者誠以相門尊高非布衣可以私謁其或關衡石輕重非先書導誠素則無以為也然而潛是心不為身有所祈輸誠於相公得不以常常之心憐其持意邪陸生有言曰天下安注意相今屬凶孽新夷泰階初平天下之懸懸其心復魏文貞房梁公姚梁公宋開府致太宗元宗故事若啼嬰兒待哺塞是望者獨相公是以聞相公以是為心即房宋不死二宗之道盡得施於上矣語不云乎雖有鎡基不如乘時自用武以來至於今日不謂無時得其時而不乘之以貞觀開元治平之勢則勢之過如發矢耳此所以為相公惜是時之難再也且天下欲上如二宗待相公而肖之耳今相公豈不待天下之士而坐為房宋者也又非有其時無其人人與時偕有矣豈可厚誣多士謂無一可與言房宋故事者邪昔宓不齊邑不方百里師五老而友二十八人齊桓公為諸侯盟主有坐友三人諫臣五人舉過者三十人周公相成王躬吐握之勞所執贄於窮閭隘巷者七十人彼一聖二賢挈下戴上非獨責成其心而天下之人故至於今稱為聖賢況當相公首築太平之基焉知夫有心者不磨勇養氣待相公呼而出之耳今云云論者見犬戎退邊不數十里便謂邊無可虞虜無能為見趙魏之地死一帥易一將便謂天下無事廟堂可以高枕此豈知相公第欲因前之無事不欲為巍巍蕩蕩之績乎抑某聞宰相之事必以天下為言以衡石言之豈不資天下錙銖輕重為平準者邪以鼎實言之豈不資天下水陸飛走為滋味者邪若軻者雖有生之微豈不資衡鼎之一物乎伏念自知書來恥不為章句小說桎梏聲病之學敢希趾遐蹤切慕左邱明揚子雲司馬子長班孟堅之為書故北居廬山亦常有述作幸當相公調元厚生之次不使一物不遂其性一夫不獲其心是宜天下褐衣之徒孤立藝進之秋也謹獻所嘗著隋監一卷左史十卷伏希樞務之暇賜一覽讀恩幸恩幸軻恐懼再拜劉軻謹再拜相公閤下先獻書三日軻將出通化門其心遲遲然若虛其腹如未厭其食者且曰今嗣聖重光相公登庸天下裹誠蓄志之士將不遠千里願獻計於相公者固多矣適會其時得觀光輦下云欲出東門歸江湖業為儒生閱天下利病苟無一詞聞天下善否將何以見江漢之士故退於逆旅思有以效誠於相公者伏念挈瓶負薪之言古人不遺相公其遺邪某自惟輟耕窮書或得侍坐於縉紳長者洎屬文駕說之士每議及國朝相府間事言貞觀則房魏言開元則姚宋自貞觀數十歲至開元中間豈無房魏之相邪自開元數十歲至於今中間豈無姚宋之相邪何說者局於四而不至於五六邪豈無繼之者力不足而追不及邪將力足追及而曰非大有為之時而不能為之者邪某嘗試言之矣夫北轅適楚南轅適晉是不可到日暮途遠是豈力不足追不及耶不由其道故也然則非說者不屈指五六而局於四也故天子以天下事歸於相府相府以天下事為己任故伊尹自負以天下之重周公亦潛心在於伊尹耳故曰周公兼三王以施四事夫周公之潛心於伊尹而不愧為伊尹獨伊尹恥其君不及堯舜故其心愧恥夫其存心直下千歲無人嗣續惟梁公鄭公高視千載之上始潛心於伊尹且亦惟恐太宗不及堯舜故得諡以經緯天地曰宗為不祧之廟至姚公宋公又潛心於房魏亦惟恐元宗不及太宗故致時雍復貞觀治平之風焉某請梗概姚宋舊事而言之諸說以姚之為相也先有司罷冗職修舊法百官各盡其才又奏請無赦宥無數遷吏無任功臣以政於是上責成於下下權歸於上上下交而天下泰矣故曰姚善應變所以成天下之務宋之為相也以彌綸為己任亦以筆硯專隨故曰宋善守文所以持天下之正繇是四十年間威振四海教加百姓政歸有司綺繻羅紈之家請謁不行而戚里束手矣故生於開元天寶之間自幼迨強仕女有家男有室耳不聞鉦鼓目不識兵革故元宗無為恭事元默而已矣今上新嗣大位相公新揭大柄必欲盡天下善美以調和鼎味冀所以沃天心而福眾庶也某知相公固亦潛心於姚宋亦恐聖君不及元宗焉夫姚宋潛心於房魏而已無愧於房魏今相公已潛心於姚宋詎得有愧於姚宋邪夫惟無愧實在應變成務守文持正踐其跡必至其所至俾後人之談者自四公而加相國焉相公必以是為心某知相公未得高枕於廟堂之上者有四矣孔子曰不患寡而患不均今緣邊八鎮之士聞六軍之人坐以受賜莫不開口以待哺將欲賈餘勇以壯邊勢惟恐不厚於六軍之賜矣此亦賞過乎功者不得不搖心也非所謂至賞不費賞明而教行者也某切謂相公未得高枕於廟堂之上一也聖上自儲副即祚蓋三代不刊之事雖巷兒街童知其必然彼貪天之功者以為房閭永巷北宮貞伯子之能事必陰教是謀出一時之策畫寵以懷黃垂組不謂無恩矣脫或天光獨私恩無與對使權量天下輕重以專備顧問雖賢如史游納忠勤心恐必漸宏恭之勢矣古之賢聖遏禍於未芽芽而滋之根著而不可拔矣某謂相公未得高枕於廟堂之上二也昔西京初畱侯譏高祖表用蕭曹故人東漢初鄧禹戒光武以功臣專任貞觀初太宗自秦府登極有上封事者請以秦府舊兵追入宿衛太宗曰朕方以天下為家惟才行是取何新舊為夫以一家國為言誰能無私必以天下為言孰非王人而以家國之私於天下也范煜云舉德則功不必厚奉勞則人或匪賢必處非其地非所以優貸而見惜其功也故姚宋所以無任功臣以政其在茲乎是以門開誰疑與長閉此某切謂相公未得高枕於廟堂之上三也日者有自邊兵來曰凡事閱於目而可寘於口非鑿空架虛事游談者也且國家所以禦戎狄為邊垣者朔方為大夫朔方去戎虜不數百里而近使胡塵不至於亭障者實以邠涇之鎮虜不敢東顧自燕盜已來惟朔方多軍功內以遏不軌外以拓胡虜故朔方之於朝廷雖手足之扞頭目不足過也比者姦回秉政司計者析秋毫以刻肌骨非紅粟腐帛不及於邊兵無襯甲之服以赤肉冒流矢者駢門皆是統率者雖章連十上帝閽九重畱中莫聞至有抽刃垂頸祝殤禱死貴為節制猶無憀若是矧責由卒隸尚安能固其生與戎狄攻鬬邪今釣怨者既逐新恩已大洽相公必深維前弊思有以矯之之術以廟算決勝授成策於邊將者古人以天下喻一身以四邊同支體以中國視心腹支體有疾心腹安得無憂乎善言邊兵者以河隴不如燕薊燕薊不如朔方朔方軍之地連險小雜虜俗習騎射擊軍者非其父兄則其子弟故所以無對於諸軍矣今之存者皆諸軍遷徙或叛孽殘寇之餘遠鄉里別妻子執戈臥甲坐不遑暖胡塵一起連頭應召必無美利以㗖其欲必無爵賞以磨其勇以之防塞可謂連鷄矣此某謂相公未得高枕於廟堂之上四也古之相天下者獨勞一身役一心範天地而俾無遺事於天下也蓋存乎任使而已矣傳曰使智者慮義者行仁者守又曰使智者佐仁者此舜所以穆四門而貞元首者也某所以首多士之伍進希相公必首而納之然後開平津之閣待白屋之士且問曰計安在知政理致君之策駢肩出於門下矣若然者吾君不愧於二宗相公不愧於四公何有力足以追而曰非其時而不為之者邪此小生汲汲於私心誠在乎此切欲使後之秉史筆者直書蕭相公故事亦以無愧辭於史官焉某不勝區區之志唐突尊重伏惟矜其意而宥其罪某恐懼再拜軻今月十日祇奉牓限納雜文一卷又聞每歲舉人或得以書導志軻惟顓魯狃隸山野未熟去就悚惶惕息伏惟寬明少冥心察納軻伏見今之舉士競取譽雌黃之口而知必也定輕重於持衡之手雖家至戶到曾不足裨銖兩苟自低昂已定乎徇已者之論是私已於有司非公有司於已也軻也愚敢不以是規軻本沛上耕人代業儒為農人家天寶末流離於邊徙貫南鄙邊之人嗜習翫味異乎沛然亦未嘗輟耕舍學與邊俗齒且曰言忠信行篤敬雖夷貊行矣故處邊如沛焉貞元中軻僅能執經從師元和初方結廬於廬山之陽日有芟夷畚築之役雖震風凌雨亦不廢力火耨或農圃餘隙積書窻下日與古人磨礱前心歲月悠久寖成書癖故有三傳指要十五卷十三代名臣議十卷翼孟子三卷雖不能傳於時其於兩曜無私之燭不為墮棄矣流光自急孤然一生一日從友生計裹足而西京邑之大居無環堵百官之盛親無葛矣夫何能發聲光於幽陋雖不欲雌黃者之所輕重豈不欲持衡者之所斤銖耶此軻所以中夜憤激願從寒士齒庶或搴芳入幽不以孤秀不擷揀金於沙不以泥土不取閣下自謂此心宜如何答也嘗讀史感和璞之事必獻不至三刖不至再必獻不至再殆幾乎無刖矣伏荷閣下以清明重德鎮定㣥慮衡鏡在乎蚩妍輕重之分咸希一定俾退者無屈辭進者無幸言夫如是非獨斯四輩之望而已矣亦宜實公器而荷百祿豈祇區區世人而已哉軻也生甚微末甚乎魚鳥魚鳥微物猶能依茂林清泉以厚其生矧體乾剛坤順之氣不能發跡於大賢人君子之門乎軻再拜右丞閣下某切伏下風有年矣布衣儒冠讀書耕田焦勞形神求古人道不為不多其閱今之事極耳目之聞見亦以半古之道參乎其心者也行之於古既如彼踵之於今又如此固不必揲乎蓍灼乎龜而卜筮行乎其中矣小生敢欲首天下之忠激敢言之士輒試貢心中事以當閣下閣下知一士之進退關天下之去就今天下白屋之士有角立秀出者或能以黃老言或能以儒術言或能以刑法言思願吐一奇設一策使司化源者開目而見四方之事閣下知天下亦有人乎有是人無其時與無是人同有其言而不行其所以言與無言同此所以理代寡而昇平之運不可得而至也古之大臣不惟諫君人亦諫君亦諫故曰惟尹躬暨湯咸有一德此所以開聖聽而達天視也昔貞觀初天下注心於房魏而太宗果為堯舜開元中天下注心於姚宋元宗幾如太宗今閣下之車轍馬跡相去俯無尺寸天下之注心於閣下聚手而指以為提持大柄在閣下掌握中耳閣下知人意參於天意邪先天而天弗違則其古之相天下者其道不同及其成功一也昔漢孝惠時有若曹丞相以黃老施化而天下清淨孝武時有若公孫宏以儒術御世而天下亦治孝宣時有若魏邴者以刑法檢下實號中興閣下必欲為黃老而館舍下有膠西蓋公邪必欲為儒術而門下有平津之客邪必欲為刑法而與言者有溫舒于公邪此三者在閣下所嗜而行之耳夫橫一木而棟明堂者其力固多然其下有柱柱下有石石下有土積三物而棟力成焉故太元曰崔嵬不崩㣥土彊此明上下節級有扶持之道也今人之望閣下挺一身而棟天下必矣抑不知棟下之柱者誰乎柱下之石土者誰乎此小生汲汲於私心誠在比也某每病此來之欲為丞相者馴致其道積人之望使必曰某公必為宰相白麻未及下而門已扄鐍其此豈謂導萬物之情狀達一人之聰明邪且一人之耳待宰相而聰之一人之目待宰相而明之宰相之耳目亦資天下之士且曰是何賢於我其言亦何補焉此穀梁子所謂上暗下聾也某嘗試論之天下之形聲雖離婁師曠故不能周視遍聽矧閉目掩耳而欲達天下之視聽不亦難哉故曰耳目在天下聰明在宰相故堯所以寄耳目於舜禹時為聰明文思之后焉脫不以天下為聰明某不知其然此亦閣下之所醜聞也故某所徵前事而言之意者實欲閣下踐其地使今之談者曰房魏道在吾君必為太宗矣區區下情輒以此貢心焉伏惟宥其愚而捨其所持意恩幸某恐懼再拜始存之不以予古拙不責予以今人之態能遺其鈆黃外飾直索子心於古人之心在今之行古者然雖無以應君子幸存之不友子以面予何人敢不以心友於存之邪且古人相知在此今愚忌存之固有未予知者矧與相面者其能異於行路之人哉固無也有恨㣥居時口未能言及此還罷又不相處雖素尚蓄積竟未得露一毫於方寸之地每一相見何嘗不嗛嗛於內若飲者實滿於腹思一吐而未果者存之謂予是言似乎哉以為似則予不得不吐於存之矣先此二十年予方去兒童心將事四方志若學山者以一簣不止望嶔崟於上誓不以邱陵其心而盡乎中道也志且未決適遭天譴重罹凶咎日月之下獨有形影存之以予此時宜如何心哉苟將盡餘息以鴻同大化或有論予者相曉以古道且曰若身未立於時若名未揚於人若且死獨不畏聖人之經戒俾立身揚名之意邪蹷然而恐震駭且久曰微夫子吾幾得罪於聖人矣噫聖人之言天戒也天戒何可違乎歷數歲自洙泗渡於淮達于江過洞庭三苖踰郴而南涉湞江浮滄溟抵羅浮始得師于壽春楊生楊生以傳書為道者也始則三代聖王死而其道盡畱於春秋春秋之道某以不下牀而求之求之必謀吾所傳不失其指每問一卷講一經說一傳疑周公孔子左邱明公羊高穀梁赤若迴環在座以假生之口以達其心也邇來數年精力刻竭希金口木舌將以卒其業雖未能無愧於古人然於聖人之道非不孜孜也既而曰以是為駕說之儒曷若為行道之儒邪貯之於心有經實施之於事有古道猶不愈於堆案滿架矻矻於筆硯間邪徒念既往者未及孔門之宮墻自謂與回牛相上下傳經意者家家自以為商偃執史筆者人人自以為遷固此愚所以憤悱思欲以聖人之為市南宜僚以解其紛以衡石輕重俾將來者知聖代有譙周焉此某所以蓄其心者元和初方下羅浮越梅嶺泛贛江浮彭蠡又抵於匡廬匡廬有隱士茅君腹笥古今史且能言其工拙贅蠹語經之文聖人之語歷歷如指掌予又從而明之者若出井置之於泰山之上其為見非不宏矣長恨司馬子長謂挈諸聖賢者豈不然乎哉脫漸子長之言予之厄窮其身將淬磨其心亦天也是天有意我獨無恙何也夫然亦何必瞽吾目然後國語刖吾足然後兵法抵宮刑然後史記邪予是以自忘其愚瞽故有三傳指要十五卷漢書右史十卷黃中通理三卷翼孟三卷隋監一卷三禪五革一卷每撰一書何嘗不覃精潛思綿絡指統或有鼓吹於大君之前曰真良史矣且曰上古之人不能昭明矣某其如何有知予者相期不啻於今人存之信然乎哉此古人所以許一死以謝知已誠難事也如不難亦何為必以古人期於今人待邪又自史記班漢以來秉史筆者予盡知其人矣言東漢有若陳宗尹敏伏無忌邊韶崔實馬日磾蔡邕盧植司馬彪華嶠范煜袁宏言國志有若衛顗繆襲應璩王沈傅元茅曜薛瑩華覆陳壽言晉洛京史有若陸機束皙王銓銓子隱言江左史有若鄧粲孫盛王昭之檀道鸞何法盛臧榮緒言宋史有若何承天裴松之蘇寶圭沈約裴子野言齊史有若江文通吳均言梁史有若周興嗣鮑行卿何之元劉璠言陳史有若顧野王傅宰陸瓊姚察察子思廉言十六國史有若崔鴻言魏史有若鄧淵崔浩浩弟覽高允張偉劉橫李彪邢蠻溫子昇魏收言北齊史有若祖孝徵陸元規湯休之杜臺卿崔子發李德林林子百藥言後周史有若柳虬牛宏令狐德棻岑文本言隋書有若王師邵王冑顏師古孔㯋達于志寧李延壽言皇家受命有若溫大雅魏鄭公房梁公長孫趙公許敬宗劉允之楊仁卿顧允牛鳳及劉子元朱敬則徐堅吳兢次而修者亦近在耳目於戲自東觀至武德以來其間作者遺草有未行於時及修撰未既者如聞並藏於史閣固非外學者可得究諸予雖無聞良史至於實錄品藻增損詳畧亦各有新意豈無班馬之文質董史之遺直者邪蓋有之矣我未之見也常欲以春秋條貫刪補冗闕掇拾眾美成一家之盡善有若採葑菲者無以下體衣狐裘者無以羔袖言不多乎哉以為多則存之視予力志何如耳昔阮嗣宗嗜酒當時以為步兵校尉雖非其任貴且快意今予之嗜書有甚於嗣宗之嗜酒且虛其腹若行哺而實者存之宜如何處予哉傳不云乎心志既通名譽不聞其足下何遺邪此存之所宜動心也脫祿不及厚孤弱名不及善知友匡廬之下猶有田一成耕牛兩具僮僕為相雜書萬卷亦足以養高頤神誠知非丈夫矣所立固不失谷口鄭子真耳敢布諸足下共圖之某再拜前蘭陵令臣况謹奉書於相國春申君足下前者不識事機冠宋章襲儒衣以廉軸駕羸駑應聘於諸侯始入秦見秦應侯會侯方以六國㗖其君且曰吾方角虎以鬬又何儒為故去秦之趙會孝成王喜兵法方築壇拜孫臏欲磨牙而西臣以湯武之兵鉗其口於前趙王亦不少孫臏而多臣臣以是去趙之齊會宣王方沽賢市名達諸侯間人聚稷下若鄒子田駢淳于矒皆號客卿故臣得翺翔於諸子間自威王至襄王三為祭酒號為老師然憫諸生少年皆不登闕里不浴沂水各掉寸舌得紆朱垂組自以為高絜莫我若也臣以乳兒輩畜之何虞其蝎蠆之為毒也由是讒言塞路臣之肉幾為齊人所食伏念相君與平原孟嘗信陵齊名故游談者謂從成則楚王衡成則秦帝以相君之相楚故也不然楚何以得是名以是去齊歸相君相君果不以臣孱固俾臣為蘭陵令臣始下車方弦琴調軫欲蘭陵之人心和且富既富且教必使三年有成然後報政於相君此臣效相君者希以是不意稷下之謗又起於左右俾臣之醜聲直聞於執事執事果亦疑棄臣如脫故屣臣之去蘭陵豈不知相君之棄臣邪臣尚念古者交絕不出惡聲臣懟楚而怨相君也哉頃相君徒欲人之賢已曾不知楚國前事臣不遠引三代洎春秋今雖戰國亦不敢以他事白直道今楚國盛衰之尤者冀相君擇焉自重黎為火正光融天下鬻熊有歸德教西伯弟子洎蚡冒熊繹蓽路藍縷以啟荊蠻歷武文成始臣妾江漢至莊王始與中國爭伯此數君皆郢之祖宗而代亦稱臣之術五尺童子羞稱五伯臣又何必獨為相君道哉然楚君但成莊而已矣自莊而下楚亟不競平王嗣位耳目倒置伍奢以諫死費無極以讒用亡太子走昭王汚楚宮鞭郢墓豈不以一讒而至乎爾下及懷王知左徒屈原忠賢始能付以楚政當諸侯盛以遊說交鬬猶以楚為有人無何為上官靳尚所短王怒疎屈平平既疎秦果為張儀計陷楚之商於地儀計行秦果欺楚是以有藍田之役丹徒之敗懷王囚不出咸陽亡不越魏境客死而屍歸至今為楚痛豈不曰疎屈平親靳尚而至於爾人亦謂令尹子蘭不得皭然無非已不能疾讒又從而惜之俾屈生溺離騷為之作襄王以前事歷目切骨雖有宋玉唐勒景差輩子弟賦風弔屈而已又何能免王於矢石哉今相君自左徒為令尹封以號春申君楚於相君設不能引伍奢屈平以輔政復不能拒無極靳尚之口弭臣見泗上諸侯不北轅不來矣夫如是漢水雖深不為楚塹方城雖高不為楚險相君雖賢欲捨楚而安之也今有李園者世以諛媚薦寵喜以陰計中上根結枝布寖為難拔相君若不以此時去之則王之左右前後不靳尚則無極詎獨臣之不再用也前月相君聘至跪書受命且曰若惡若仇若善若師真宰相之心脫李園之一作何至費靳方試何害臣之不再罷蘭陵也哉敢輒盡布諸執事而無遂子蘭之非况之望也楚子之幸也別韶卿已逾時雖游處讌賞不接然予心未嘗一日去韶卿也且京洛相去八百里足以絕韶卿車轍馬跡矧又自洛南而東涉淮浮江㳂洄數千里安得不悒悒西望邪比予在輦下五六年始不知韶卿及知韶卿兩心始親而形骸已相遠苟未能忘情忍不酸鼻出涕為吾友之思邪前陸掾來得韶卿書知韶卿欲屈道以從人求京兆解送知韶卿道在與否固不在首解於京兆也愚嘗謂與遊者道韶卿膚未雞髮未鶴然其心甚老脫一旦脅肩低眉與諸子爭甲乙於縣官豈愚所謂甚老者邪韶卿曾不是思也愚所謂首出者謂四科首顏閔三十世家首太伯七十列傳首伯夷其為首出豈不多邪韶卿不首於是而欲首於何哉僕又聞京兆等試試官知與否脫有知韶卿人聞烏有不心躬嘿禮靈冠統以待之邪夫然亦何害小伸於知已耳不然則東國絀臣西山餓夫微仲尼何傷為展季伯夷矣韶卿獨不見既得者邪豈盡為顏子太伯伯夷然幸韶卿熟思之無以予不食太牢為不知味者也前月中兩寄狀計必有一達者過重陽當决策東去計韶卿無以予身遠而不予思也勉矣自愛策名春官後當會我於真山先儒以春秋之有三傳若天之有三光然然則春秋蓋聖人之文乎聖人之文天也天其少變乎故詩有變風易有變體春秋有變例變之為義也非介然溫習之所至賾乎其粹者也軻嘗病先儒各固所習互相矛楯學者準裁無所豈先聖後經以闢後生者邪抑守文持論敗潰失據者之過邪次又病今之學者涉流而迷源捨經以習傳摭直言而不知其所以言此所謂去經緯而從組繢者矣既傳生于經亦所以緯於經也三家者蓋同門而異戶庸得不要其終以會其歸乎愚誠顓蒙敢會三家必當之言列於經下撰成十五卷目之曰三傳指要冀始涉者開卷有以見聖賢之心焉俾左氏富而不誣公羊裁而不俗穀梁清而不短幸是非殆乎息矣庶儒道君子有以相期於孔氏之門古老有言曰太極之氣積而為山岳洩而為川瀆然則匡阜之氣其大矣乎庚辰歲山客劉軻採拾怪異自麓至頂卻下半里餘次於黃石巖巖中有棲禪子不知其幾許臘而王褱行峻節人事難能僕高其人而信宿忘返賾其輕重頗見其宅心之地乃問其住年但手指松桂云初毫髮我植今環人臂烏飛兔走吾復何齒矧卯戌之昏旦霜炎之凍炙生落之榮悴去畱之沿泝雖云云自彼而於我蔑如也於戲向非巖房峭絕僧行孤峙則人境兩失固其宜也復何言哉觀夫烟雲生於履舄嵐靄出於襟袖㣥形浩擾併入眸子每至烟雨初霽山光澄練泠泠仙語如在耳右况又聳淩兢上冥冥焉知不能與洪厓接袂浮邱連駕盈縮造化吐納顥氣絕慙容於厚面遠喧卑之腥穢乎不得而然者蓋鉤也餌也名為利鉤利為名餌吞鉤食餌手足羈鎖彼焉得跳躍於此乎夫禪子脫去桎梏四支宣展動與雲無心靜將石何機物我一致端邪徑塞僕所謂非斯人不能住斯境也禪師宜春人俗姓劉名常進時人以師久住遂以其姓易其巖名云昔長沙桓公有定傾翊戴之勳藏晉盟府曾孫潛高尚不仕其後世為匡廬高民乎疑有應真之士產靈祥於粟里矣大師諱智滿先生九代孫也下闕文曰匡阜之下爐峯之北有白馬香象甚奇特兮毛㣥羽族麟鳳稱德絕足雲翔就羈勒兮大毗尼師垂法作則侁侁律子用徽纆兮法社霧壇其儀不忒憧憧古今奔白黑兮三毒六賊本拔源塞蘊界受降師獨得兮神昇茲氏香畱天棘石墖巍巍二林側兮纕褐巾墨門人之服心喪三紀哀無極兮世說域中四名剎棲霞其一以其高僧世出自齊梁間大小郎至大師聲聞相襲故江左重呼其名謂棲霞大師焉大師諱曇玭俗姓王氏晉瑯琊文憲公後自永嘉南遷為句曲人王父師虔會稽守虔生智高尚不仕州里號處士生大師自孩抱絕不為兒弄厪能言標㯋聰拔㣥言秘旨迎耳必了及長不茹葷血乃曰天其或者將滌吾器耶既落髮於金陵希瑜律師受戒於過海鑒真大師後與友人高陵恩律師追遠永之遊乃偕隱匡廬之東林雖欲遺名而名已高矣於是奔走吳楚青徐之學者始五臘講律於豫章龍興環座捧帙者麻葦明年登明寺壇至德三載勅隸於明寺後累蒞事於甘露壇端肅嚴恪儀刑梵眾大歷初乃歸棲霞其蒞壇傳戒一十五會講訓經律三十七座州牧蘭陵蕭公高其人謂標望風度詎獨鄴衛松柏耶乃命為僧正紀綱大振雖一公帖四輩之望無以上也十四年忽昌言於眾曰吾以律從事自謂無愧於篇聚矣然猶未去聲聞之縛既而探曹溪牛頭之旨沈研覃思朗然內得乃曰大丈夫了心當如此建中元年禪坐空谷雖野馬飄鼓星辰凌歷云云自彼我何事焉後瓦官寺其徒聚謀而請曰瓦官寰中之名剎也大師乃江左之碩人也捨是而不居吾屬安仰始出山居焉從人欲也無幾何謂弟子志誠海潮等曰吾休矣邱井夢電之喻必然耳貞元十三年十一月六日丁亥坐化於瓦官寺律堂是月景申茶毗墖於新亭之後岡春秋七十五僧臘五十一門人臨壇者有若廬陵龍興寺明則廣陵定山寺道興鄉邑寺行銓臨淮開元寺澄觀九江寶珍寺智滿當州彭城寺惠興瓦官寺靈津鶴林寺常靜天鄉寺日耀龍興寺惠登皆津梁後進為世燈燭賢七十子而後知仲尼大聖睹棲霞弟子得不為師氏名焉今寶稱領摩訶苾芻眾壇壓廬岳大江西南卓然首出若商那之後繼以掬多得不謂釋氏之雄乎軻夙承寶稱之知見命敘述且曰吾得予銘吾大師吾無恨矣文曰有晉世家地高瑯琊產棲霞兮宿殖有自許身佛氏為釋子兮結夫纏蓋惠刃中淬誰何對兮璞琢金鎣潭澄月映本清淨兮尸羅毗尼開遮止持作律師兮攝深匡高以遊以遨鏗蒲牢兮梵行既立薪傳火襲光岌岌兮維元和十年冬十月已亥我具壽大師歸於廬山東林寺既庀事門弟子道深如建等以銘誌為急白彭城劉軻軻嘗執吾大師之巾錫大師行業德狀軻能言之乃走其徒持事狀於山陽草堂具道其所以來軻既受事仰而哭且曰軻何心遽忍銘吾大師俄而曰我而不銘而誰為於是彳亍涕漣漣作石墖銘誌云大師諱上宏俗饒姓其先臨川人祖公悅父知恭世為南城聞儒故大師自童子耳熟家訓故風流舉動造次必於儒者年十五脫然有方外之志遂依舅氏出家暨二十二歲具戒於衡岳大圓大師大歷八載勅配本州景雲寺後依南昌璡律師學四分毗尼既覃精研究或從我駕說而通者日有百數時謂景雲且在無患無律貞元三年止南昌龍興寺四方風聞者塵至時江州峯頂寺長老法真台州國清寺法裔荊州慶門寺靈裕并有大名於時會有事於靈壇故三長老攝大師以臨之至四十年春九江守李公康以東林遠公舊社不可以無主固請住焉前後蒞事凡一十八會彼域之男女繇我而作比邱者萬有五千五百七十二人大師既通明大教祖述毗柰耶憲章修多羅心同曹溪事同南山故及我門而升我堂者未嘗虛返我所以駕白牛以驅羊鹿孰謂我為小乘者乎繇是薦紳先生若顏魯公姜相公並願依遺民萊民舊事待大師於虎邱雁門之上故游二林者謂生遠猶在將大去乃遺言於二三子曰吾生七十有七臘五十有六年非不耆臘非不高今則去矣爾無謂吾死門人道深懷縱如建冲契宗一智則智明雲臯圖信行允等長號無愬相與立石墖於香爐峯下是月丙寅歸舍利於墖從故事也軻不得讓薦誠於銘銘曰德有墖功有銘功可祖德可宗宗可師師有資嗚呼千載而下資而後者知是墖有毗柰耶之宗師歲丁已開成紀年之明年有具壽沙門曰令檢自上京抵洛師以縹囊盛三藏遺文傳記訪余柴門于行修里且曰聞夫子斧藻㣥言舊矣詎直專聲於班馬能不為釋氏董狐耶抑豈不聞貞觀初慈恩三藏之事乎敢矢厥來旨云三藏事跡載國史及慈恩傳今墖在長安城南三十里初高宗墖於白鹿原後徙於此中宗製影贊諡大遍覺肅宗賜墖額曰興教因為興教寺寺在少陵原之陽年歲寖遠墖無主寺無僧荒凉殘委游者傷目長慶初有衲衣僧曇景始葺之大和二年安國寺三教談論大德內供奉賜紫義林修三藏忌齋於寺齋眾方食見墖上有光圓如覆鏡道俗異之林乃上聞乃與兩街三學人共修身墖兼礱一石於墖至三年修畢林乃化遺言於門人令檢曰爾必求文士銘之檢泣奉遺教直以銘為請非法允之冡嫡誰何至此乎軻三讓不可乃畧而銘之三藏諱元奘俗陳姓河南緱氏人曾父欽後魏上黨太守祖康北齊國子博士父惠英長八尺美鬚眉魁岸沈厚號通儒時人方漢郭林宗有子四人奘其季也年十三依兄捷出家於洛屬隋季失御乃從高祖神堯於晉陽俄又入蜀學攝論毗曇於基暹二法師武德五年受具於成都精究篇聚又學成實於趙州深學俱舍於長安岳於是西經前來者無不貫綜矣初中國學者多以實相性空通貫㣥說俾彖象蹄笱往往失魚兔於得意之路至於星羅碁布五法三性析秋毫以矢名相界地生彙各有攸處曾未暇也大遍覺乃興言曰佛理圓極片言支說未足師决固是經來未盡吾當求所未聞俾跛眇兒視履必使解行如函蓋始可為具人矣且法顯智嚴何人也猶能孤遊天竺而我安能坐致耶初三藏之生母氏夢法師白衣西去母曰何去曰求法貞觀三年忽夢海中蘇迷盧山遽凌波而入乃見石蓮波外承足山險不可上試踴身騰踔颯然飇舉升中四望廓澈無際覺而自占曰我西行决矣至凉州都督李大亮防禁特切逼法師還京法師乃宵遁渡瓠蘆河出玉門經莫賀延磧艱難險阻仆而復起者何止百十耶自爾涉流沙次伊吾高昌王麴文泰遣貴臣以駝馬迓法師於白力城王與太妃及統師大臣等尊以師禮王親跪於座側俾法師躡肩而上資贈甚厚送至葉護可汗衙又以廿四封書通屈支等廿四國獻花繒五百疋於可汗稱法師是奴弟欲求大法於婆羅門國願可汗憐師如憐奴其所歷諸國為其王禮重多此類也自爾支提梵剎神奇靈跡往往而有法師皆瀝誠盡敬耳目所得孕成多聞與夫世稱愽物者何相萬耶詳載如傳惟至中印度冉爛陁寺寺遣下座廿人明詳儀注者引參正法藏即戒賢法師也既入謁肘膝著地舐足已然後起法藏訊所從來曰自支冉欲依師學瑜伽論法藏聞則涕泗曰解我三年前夢金人之說佇爾久矣遂館於幼日王院覺賢房第四重閣日供擔步羅果一百廿枚大人米等稱是其尊敬如此法師既名流五印三學之士仰之如天故大乘師號法師為摩訶天小乘師號解脫天乃白大法藏請畱之法師曰師等豈不欲支冉之人開佛慧眼耶不數日東印度王抅摩迎法師戒日王聞法師在抅摩處遣使謂抅摩曰急送支冉僧來抅摩曰我頭可得僧不可得戒日神武雄勇名震諸國乃怒曰爾言頭可得可將頭來抅摩懼乃嚴象軍二萬船三萬與法師同泝殑伽河築行宮於河北抅摩自迎戒日於河南戒日曰支冉僧何不來抅摩曰大王可屈就王既見法師接足盡敬且曰弟子聞支冉國有秦王破陣樂乃問秦王是何人法師盛談太宗應天順人事王曰不如此何以為支冉主因令法師出制惡見論然小乘外道未即推伏請於曲女城集五印沙門婆羅門等兼十八國王觀支冉法師之論凡十八日無敢當其鋒者戒日知法師無畱意厚以象馬橐裝餞法師又以素謺印書使達官送法師所經諸國令兵衛達漢境法師卻次于闐因高昌商胡入朝附表奏自西域還太宗特降天使迎勞仍制于闐等道送法師令燉煌迎於流沙鄯部迎於沮沫時帝在洛陽勅西京畱守梁國公元齡備有司迎待是日宿於漕上十九年春正月景子畱守自漕奉迎於都亭有司頒諸寺帳輿花幡送經於宏福翌日大會於朱雀街之南陳列法師於西域所得經像舍利等其梵文凡五百廿夾六百五十七部以廿馬負而至自朱雀至宏福十餘里傾都士女夾道鱗次若人非人曾不知幾俱月互矣壬辰法師謁文武聖皇帝於洛陽宮二月己亥對於儀鸞殿因廣問雪嶺已西諸國風俗法師皆備陳所歷若指諸掌太宗大悅謂趙公無忌曰昔符堅稱道安為神器今法師出之更遠時帝將征遼法師請於嵩之少林翻譯太宗曰師西去後朕為穆太后於西京造宏福寺寺有禪院可就翻譯三月己巳徙宏福夏五月丁卯法師方開貝葉廿年秋七月法師進新譯經論仍請製經序并進奉勅撰西域記十二卷太宗美法師風儀又有公輔才俾法師裼緇褐襲金紫法師因以五義褒揚聖德乞不奪其志遂問瑜伽十七地義太宗謂侍臣曰朕觀佛經猶噡天望海法師能於異域得是深法非惟法師願力亦朕與公等宿殖所會及三藏聖教序成神筆自寫太宗居慶福殿百寮陪位坐法師命宏文館學士上官儀對㣥寮讀之廿二年夏六月天皇大帝居春宮又製述聖記及菩薩藏經後序太宗因問功德何最法師對以度人自隋季天下祠宇殘毀緇伍殆絕太宗自此勅天下諸州寺宜各度五人宏福寺度五十人戊申皇太子宣令請法師為慈恩上座仍造翻經院備儀禮自宏福迎法師太宗與皇太子後宮等於安福門執香爐目而送之至寺門勅趙公英中書令褚引入於殿內奏九部樂破陣舞及百戲於庭而還廿三年夏四月法師隨駕於翠微宮談賞終日太宗前席攘袂曰恨相逢已晚翌日太宗崩於含風殿高宗即位法師還慈恩專務翻譯永徽三年春三月法師於寺端門之陽造石浮圖高宗恐功大難成令改用磚墖有七級凡一百八十尺層層中心皆有舍利冬十月中宮方姙請法師加祐既誕神光滿院則中宗孝和皇帝也請號為佛光王受三歸服袈裟度七人請法師為王剃髮及滿月法師進金字般若心經及道具等顯慶二年春二月駕幸洛陽法師與佛光王發於駕前既到館於積翠宮終譯發智婆沙法師早喪所天因扈從還訪故里得張氏姊問塋壠已平矣乃捧遺柩改葬於西原高宗勅所司公給備喪禮盡飾終之道洛下道俗赴者萬餘人釋氏榮之三年正月駕還西京勅法師徙居西明寺高宗以法師先朝所重禮敬彌厚中使旁午朝臣慰問及錫賚無虛日法師隨得隨散中國重於般若前代雖翻譯猶未備衆請譯焉法師以功大恐難就乃請於玉華宮翻譯四年十月法師如玉華館於肅成院五年春正月一日始翻梵本總廿萬偈法師汲汲然常恐不得卒業每厲譯徒必當人百其心至龍朔三年方絕筆法師翻般若後精力刓耗謂門人曰吾所事畢矣吾瞑目後可以蘧蒢為親身物門人雨泣且曰和上何遽發此言法師曰吾知之矣麟德元年春正月八日門人元覺夢一大浮圖倒法師曰此吾滅度之兆遂命嘉尚法師具錄所翻經綸合七十四部總一千三百卅八卷又造俱月互畫像彌勒像各一千幀又造素像十俱月互供養悲敬上油各萬人燒百千燈贖數萬生乃與寺眾辭三稱慈尊願生內眷至二月五日夜弟子光等問云和上决定得生彌勒內眾否頷云得生俄而去春秋六十九矣初高宗聞法師疾作御醫相望於道及坊州奏至帝哀慟為之罷朝三日勅坊州刺史竇師倫令官給葬事又勅宜聽京城僧尼送至墖所門人奉柩於慈恩翻經堂道俗奔赴者日盈千萬以四月十四日葬於滻東京畿五百里內送者百餘萬人至總章二年四月八日有勅徙於樊川北原傷聖情也法師長七尺眉目若畫直視不顧端嚴若神自大教東流翻譯之盛未有如法師者雖滕蘭澄什康會竺護之流無等級以寄言其彬彬郁郁已布唐梵新經矣自示疾至於昇神奇應不可殫紀蓋莫詳位次非上地其孰能如此乎又曰三藏之生本乘願來入自聖胎出於鳳堆大業之季龍潛於并孺子謁帝與兄偕行神堯奇之善果度之不為人臣必為人師師法未足自洛徂蜀學無常師鳥必擇木跡窮夷夏更討身毒寺入爛陁師遇尸羅王逢戒日論得瑜伽瑜伽師地藏教泉府蝟名數璽抽聖緒我握其樞赤幡仍豎名高曲女歸我真主主當文皇臣當蔡梁天下貞觀佛氏以光光光三藏是護是付付得其人經綸彬彬梵語華言胡漢相宣台臣筆受御膝前席積翠飛花恩光奕奕太宗序教天皇述聖揚於王庭百辟流詠三藏慰喜靈祇介祉蔑彼滕什曾無此事我功成矣我名遂矣脫屣玉華昇神睹史發棺開殮天香馥馥地位殊分神人是卜中南地高樊川氣清修墖者誰林公是營門人令撿實尸其事銘勒墖旁撿真法子丙戌歲大饑楚之南江黃間尤甚明年予將之舒途出東山見老農輩鳩其族為禱於伍君祠其意誠而辭俚因得其文以潤色之亦以儆於百執事者云農夫某謹達精誠於明神吁嗟我耕食之人誰非土之人人之有求神得不以聰明正直聽之耶曩者仍歲薦饑人為鰥婺田無耕夫桑無蠶姬癘疫痍瘡一方尤危踵以吳蜀弄兵吏呼其門敺荒餘之人挾弓持㦸女子生別行啼走哭王師有征㣥盜繼誅乃歸其居乃復室廬廬壞田蕪亦莫蠲其租今之收合餘燼人百其力幸大成於秋誠慮旱而不雨既雨而潦必不為潦又慮其苖而不秀秀而不實又慮為螟蝗又慮夫广既馬之奪其食贓吏之厚其歛也嗚呼必馬無厭粟者妾無厭羅紈者吾歛其薄矣亦於何厚其所薄耶伏希神明無有所忽禱曰無瘠農人以肥广既馬無寒蠶婦以暖妓妾無銷耒耜以滋兵刃農人不饑而天下肥蠶婦不寒而天下安耒耜不銷而天下饒妾暖而驕兵滋而殘馬肥而豪不蹟不馳足食足衣皇天皇天胡忍是為苟不此為民其嘻嘻神其怡怡尚饗
