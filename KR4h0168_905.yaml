front:
  text: 全唐文欽定全唐文卷九百五靜邁貞觀中玉華宮寺譯經沙門
  hash: sha256:5d1c755ece547803fb9c6a58da6725da626e0e2f9eed59bc99a23b7c69626c87
  markers:
  - {type: head, offset: 12, content: 靜邁, id: KR4h0168_NFKB_905-h1, level: 1}
body:
  text: 沙門靜邁言竊以策係告先尊父屈體於其子形章攸革介士不拜於君親伏以僧等揚言紹佛嗣尊之義是同故愛敬降高乃折節於其氣容服異俗形章之革不殊致使沙門亦不肢屈於君父窮茲內外雖復繼形變則而心敬君親敢有怠哉至如臣服薨君以日易月形雖從吉而心喪三年是知遏密八音其於三載修於心敬其來尚矣若令反拜父母則道俗俱違佛戒顛沒枉坑輪迴未已况動天地感鬼神者豈在於跪伏耶但公家之利知無不為恐因今創改萬有一累則負聖上放習法之洪恩彌劫粉身奚以塞責伏惟陛下廣開獻書之路通納芻言之辯輕塵聽覽伏增戰汗謹言八月二十五日上夫瀛溟沖廓總川逝而朝宗法性惟元統品物而都會是知無說顯道崇毗耶之息言絕聽雨華宗摩竭之掩室自非德本宏邈孰能究其宏致者哉有三藏法師是稱元奘弱齡軼俗凝神氣於白雲壯志遊真晰智耀於元妙潄其原者隨迎而不知涮其流者游泳而不測大龜啟滅之嵗捐觿韘而整華田須陀問道之年鏡戒珠而嬉行地爰以炎隋季祀三聚創膺深惟蹄旨悟有餘說悼靈章之紊譯愴神理之紕傳故能出玉門而遐征戾金河而殉妙爰有大正法藏實號戒賢道格四依稱流五印凡厥藏海取質若人故以所旌式標洪譽遂於摩揭陀國欽承函丈見所未見聞所未聞雖薩陀之遇曇無蔑以加也因請受菩薩律儀一稔三祈肇允殷望法師以菩薩淨戒諒一乘之彞倫授受宏規信十地之洪範特所吟味匪替喉衿以大唐貞觀二十有三年皇上御天下之始月魄日於大慈恩寺奉詔譯周羯磨戒本爰開兩軸蓋菩薩正地之流澌也邁以不敏猥厠譯僚親稟洪規證斯傳焰動眾形說式讚大猷聊紀譯辰以備攸忘其證義證文正字筆受義業沙門明闕等二十許人各司其務同資教旨道恭蘇州法師貞觀中以高行召至京師余以擁腫拳曲不中規繩而匠石輟斤忽垂顧盼賞激流連殆逾三紀披雲對月賦曹陸之詩跂石班荊辨肇融之論故人安在仰孤帳而荒凉景行不追望長松而咽絕懼陵谷易遷竹素難久託徽猷於貞紺揚清塵於不朽其銘曰五陰城郭六賊邱陵膠固愛網縈迴業繩雄猛調御慈悲勃興危途倏靜穢海俄澄八樹潛暉五師繼軌纂此遺訓克應開士皎潔戒珠波瀾定水有道有德知足知止學總㣥經思深言外樂說河瀉飡風雲會七眾關鍵四部襟帶振紐頹網繄其是賴世途淪喪適化江湄去來任物隱顯從時壞瓶何愛淨土為期有生有滅何喜何悲窀開昔隧封興舊隴春郊草平故山松拱林昏鳥思徑深寒擁妙識歸真元坰虛奉靖邁梓潼人出家簡州福聚寺貞觀中入京師住廣福寺法蘊足論者蓋阿毗達磨之權輿一切有部之洪源也無上等覺入室之神足摩訶目乾連之所製矣鏡六通之妙慧晰三達之智明桴金鼓於大千聲玉蠡於百億擿藏海之奇琬鳩教山之勝珍欲使天鏡常懸法幢永樹眾邪息藩籬之望諸子騁遊戲之歡而為此論也是以佛涅槃後百有餘年謺啟五分之殊解開二九之異雖各擅連城之貴俱稱照乘之珍惟一切有部卓乎迥秀若妙高之處宏海猶朗月之冠眾星者豈不以本宏基永者歟至如八種揵度騖徽於發智之場五百應真馳譽於廣說之苑斯皆挹此涓波分茲片玉遂得駕㣥部而高蹈接天衢而布武是知登崑閬者必培塿於眾山遊溟渤者亦㘭堂於㣥澍諒其然矣矧乎順正理以析疑顯真宗以剖惑莫不鏡此彞倫鑒斯洪範故使耆德婆藪屈我眾賢上座幽宗見負宏致者也題稱阿毗達磨者剏二藏以簡殊也一切有部者對十七以標異也法蘊足者顯此論之勝名也能持自性軌範稱法法有積集策聚為蘊此論攸宗法聚三七皆與對法為依故目之為足三藏元奘法師以皇唐顯慶四年九月十四日奉詔於大慈恩寺宏法苑譯訖大慈恩寺沙門釋光筆受靖邁飾文同州澄城縣鉗耳智通勘定道會俗姓史氏犍為武陽人出家益州嚴遠寺後入京師與法琳同修辨正論下獄釋還鄉里住眉州聖種寺貞觀末卒年七十會弟性不肖家風失墜封爵雖除詔勅猶在門生故吏子孫成列並奮臂切齒思効力用即日劍門雖啟巫峽負固會請躬率徒隸振錫啟途折簡宣威開懷納款軍無矢石之勞主有待成之逸此亦一時之利也惟公圖之自如來潛影西國千有餘年正法東流五百許載雖復赤髭青眼大開方便之門白脚漆身廣示歸依之路猶未出於苦海尚陸沈於險道况五眾名僧四禪教首頭陀聚落唯事一餐宴坐林中但披三衲加以闕無緣之慈想升錘以代鴿履不輕之行思振錫以避蟲今有精勤法子清淨沙門橫被囚拘實非其罪遂使重關早落覩獄吏而魂飛清室晚開見刑官而思盡嚴風旦洒穿襟與中露俱飄繁霜夜零寒心與死灰同殪若竟不免溝壑抑亦仁者所恥彥悰京兆大慈恩寺沙門貞觀末求法於三藏法師夫業理綿微二乘不足臻其極神宰惚恍十地未易暨其深則知賦命交加罕言於孔宣父報應叢雜冥昧於太史公是以先笑後號鸇雀祥而莫准始凶終吉桑穀妖而弗驗或倚或伏之說柱下庶欲照其幾為禍為福之談塞上僅可鄰其次若乃探緣洞業索果明因儔絜大於百家孰有京於十力故能息善住之萬惡杜閻摩之圓戶轉凡階聖引短成修比宋景之退法星猶蒂芥於三舍偶魯陽之撝落日故齟齬於再中何只庇託延祺見聞招賴恧神香於異域恥靈草於瓊田若斯而已哉乃將輕埃附而九惱袪清吹獵而三障殄皎鏡齊光於日寶暉煥比麗於天金雖事若反常而乘機顯妙奚可以常人之耳目擬議大聖之希夷者焉此經以儀鳳四年正月五日朝散郎行鴻臚寺典客令杜行顗與寧遠將軍度婆等奉詔譯進時有廟諱國諱皆隱而避之即世尊為聖尊世界為生界大勢為大趣救治為救除之類是也上讀訖謂行顗曰既是聖言不須避諱杜時奉詔以正屬有故而寢焉無幾勅中天法師地婆訶羅於東西二京太原宏福寺等傳譯法寶而杜每充其選余時又參末席杜常謂余曰弟子庸材不閑文體屈師據勅刪正亦願依文筆削余辭以不敏載涉暄寒荏苒之間此君長逝余歎惋流涕思其若人又懼寢彼鴻恩乖於貝牒因請沙門道成等十人屈天竺法師再詳幽趣庶臨文不諱上奉皇私曲盡方言下符流俗故乃具表曲委陳諸始末俾夫披覽之士無猜此教焉於時永淳元年五月二十三日也金光明經者教窮滿字金鼓擊於夢中理極真空寶塔涌於地上三身果備酬昔報之無虧十地因圓顯曩修之具足所以經王之號得稱於斯將知能宏贊人其位難量者也大興善寺沙門釋寶貴者即近周世道安神足伏膺明匠實曰良才翫閱㣥經未嘗釋手可謂瞿曇身子孔氏顏淵者焉然貴覩昔晉朝沙門支敏度合兩支兩竺一百五家首楞嚴五本為一部作八卷又合一支兩竺三家維摩三本為一部作五卷今沙門僧就又合二讖羅什耶舍四家大集四本為一部作六十卷非止收涓潻海亦是聚芥培山諸此合經文義宛具斯既先哲遺蹤貴遂依承以為規矩而金光明見有三本初在涼世有曇無讖譯為四卷止十八品其次周世耶舍崛多譯為五卷成二十品後逮梁世真諦三藏於建康譯三身分別業障滅陀羅尼最淨地依空滿願等四品足前出沒為二十二品其序果云曇無讖法師稱金光明經篇品闕漏每尋文揣義謂此說有徵而讐校無指永懷寤寐寶貴每歎此經祕奧後分云何竟無囑累舊雖三譯本疑未周長想梵文願言逢遇大隋馭㝢新經即來帝勅所司相續翻譯至開皇十七年法席小間因勸請北天竺犍陀羅國三藏法師闍那崛多此云志德重尋後本果有囑累品後得銀主陀羅尼品故知法典源散派別條分承注末流理難全具賴三藏法師慧性沖明學業優遠內外經論多所博通在京大興善寺即為翻譯竝前先出合二十四品寫為八卷學士成都費長房筆受通梵沙門日嚴寺釋彥琮校練寶珠既足欣躍載深願此法燈傳之永劫恭惟釋迦氏之臨忍土也始演八正啟三寶以出㣥邪之典由是佛教行焉方等一乘圓宗十地謂之大法言真詮也化城垢服濟鹿馳羊謂之小學言權旨也至於禪戒呪術厥趣萬途迺滅惑利生其歸一揆是故歷代英聖仰而寶之八會之經謂之為本根其義也三轉之法謂之為末枝其義也暨夫天雨四花地現六動解其髻寶示以衣珠借一以破三攝末以歸本者也付法藏傳曰聖者阿難能誦持如來所有法藏如瓶瀉水置之異器即為釋尊一代四十九年應物逗機適時之教也逮提河輟潤堅林晦景邃旨沖宗於焉殆絕我先昆迦葉屬五棺已掩千叒冝毛將焚痛人天眼滅蒼生莫救故召諸聖眾結集微言考繩墨以立定門即貫華而開律部據優波提舍以為之論剖㭊空有顯別斷常示之以因修明之以果證足以貽範當代軌訓將來歸向之徒並遵其義及王秦奉使考日光而求佛騰蘭應請策練影以通經厥後易首抽腸之賓播美於天外篆葉結鬘之典譯粹於區中然至賾至神思慮者或迷其性相惟恍惟惚言談者有昧其是非况去聖既遙來教多闕殊途競軫別路揚鑣而已哉法師懸弧誕辰室表空王之應佩觿登嵗心符妙德之誠以愛海無出要之津覺地有栖神之宅故削髮矯翰翔集二空異縣他山載馳千里每慨古賢之得本行本魚魯致乖痛先匠之聞疑傳疑豕亥斯惑竊惟音樂樹下必存金石之響五天竺內想具百篇之義遂發憤忘食履險若夷輕萬死以涉葱河重一言而之柰苑鷲山猨沼仰勝迹以瞻奇鹿野僊城訪遺編於蠧簡春秋寒暑一十七年耳目見聞百三十國揚我皇之盛烈震彼俊之權豪偃異學之高轒拔同師之巨幟名王拜首勝侶摩肩萬古風猷一人而已法師於彼國所獲大小二乘三藏梵本等總六百五十七部竝載以巨象竝諸郵駿蒙霜犯雪自天祐以元亨陽苦陰淫假皇威而利涉粵以貞觀十有九祀達於上京道俗迎之闐城溢郭鏘鏘濟濟亦一朝之盛也及謁見天子勞問殷勤爰命有司詔令宣譯人皆敬奉難以具言至於氏族簪纓捐親入道遊踐遠邇中外讚揚示息化以歸真同薪盡而火滅若斯之類則備乎茲傳也傳本五卷魏國西寺前沙門慧立所述立俗姓趙豳國公劉人隋起居郎司隸從事毅之子博考儒釋雅善篇章妙辯雲飛溢思泉湧加以直詞正色不憚威嚴赴水蹈火無所屈撓覩三藏之學行瞻三藏之形儀鑽之仰之彌堅彌遠因循撰其事以貽終古及削藳云畢慮遺諸美遂藏之地府代莫得聞爾後役思纏痾氣懸鐘漏乃顧命門徒握以啟之將出而卒門人等哀慟荒梗悲不自勝而此傳流離分散他所後累載搜購迎乃獲全因命余以序之迫余以次之余撫己缺然拒而不應因又謂余曰佛法之事豈預俗徒况乃當仁苦為辭讓余再懷慙退沈吟久之執紙操翰汍瀾腷臆方乃參犬羊以虎豹糅瓦石以琳璆錯綜本文箋為十卷庶後之覽者無或嗤焉原夫隱顯二途不可定榮辱真俗兩端孰能判同異所以大隱則朝市匪諠高蹈則山林無悶空非色外天地自同指馬名不義裏肝膽可如楚越或語或默良踰語默之方或有或無信絕有無之界若夫雲鴻震羽孔雀謝其遠飛淨名現疾比邱憚其高辯發心即是出家何關落髮棄俗方稱入法豈要抽簪此即染淨之門權實而莫曉倚伏之理吉凶而未悟遂使莊生宗齊一之論釋子說會三之旨大矣哉諒為深遠實難鈎致竊聞陰陽合而萬物成醎淡和而八珍美何廢四時恒序五味猶別以此言之豈真俗之混淆隱顯之云異或有寡聞淺識則欲智淩周孔微庸薄宦便將位比帝王強自大以立身謂一人而已矣不信有因果遂言無佛法輕毀泥洹賤懱沙門愚襲腐儒戲招冥禍或有始除俗服狀如德冠天人纔挂僧名意似聲高海域慠然尊處佯為極聖豈知十纏猶障三學靡聞不隨機而接物竟抱愚而自守悲夫二子殊途一何蹐駮高懷達士孰可然哉冀欲解紛挫銳假設旗鼓雖復俱有抑揚終以道為宗致其猶五色綺錯近須彌而會同萬象森羅依虛空以總集歸根自芸芸之物吞谷實茫茫之海斯誠光贊於佛道述獎於元門庶令無我無邪允謙允敬式貽後進論之云爾論曰昔在東晉太尉桓元議令沙門敬於王者廬山遠法師高名碩德傷智幢之欲折悼戒寶之將沈乃作沙門不敬王者論設敬之儀當時遂寢然以緝詞隱密援例杳深後學披覽難見文意聊因暇日輒復申敘更號福田論云忽有嘉客來自遠方遙附桓氏重述前議主人正念久之抗聲應曰客似未聞福田之要吾今相為論之夫云福田者何耶三寶之謂也功成妙智道登圓覺者佛也元理幽寂正教精誠者法也禁戒守真威儀出俗者僧也皆是四生導首六趣舟航高拔天人重踰金石譬乎珍寶劣相擬議佛以法主標宗法以佛師居本僧為弟子崇斯佛法可謂尊卑同位本末共門語事三種論體一致處五十之載宏八萬之典所說指歸惟此至極寢聲滅影盡雙林之運刻檀書葉畱一化之軌聖賢間起門學相承和合為㣥住持是寄金人照於漢殿像法通於洛浦並宗先覺俱襲舊章圖方外而發心棄世間而立德官榮無以動其志親屬莫能累其情衣則截於壞色髮則落於毀容不戴冠而作儀豈束帶而為飾上天之帝猶恒設禮下土之王固常致敬有經有律斯法未殊若古若今其道無滯推帝王之重亞神祇之大八荒欽德四海歸仁僧尼朝拜非所聞也如懷異旨請陳雅見客曰周易云天地之大德曰生聖人之大寶曰位老子曰域中有四大王居一焉竊以莫非王土建之以國莫非王臣繫之以主則天法地覆載兆民方春比夏生長萬物照之以日月之光潤之以雲雨之氣六合則咸宗如海百姓則共仰如辰戎夷革面馬牛迴首蛇尚荷於隋侯魚猶感於漢帝豈有免其編戶假其法門忘度脫之寬仁遺供養之宏造高大自許卑恭頓廢譬諸禽獸將何別乎必能駕御神通得成聖果道被天下理在言外然今空事剃除尚增三毒虛改服飾猶梁六塵戒忍弗修定智無取有乖明誨不異凡俗詎應恃宣讀之勞而抗禮萬乘藉形容之別而闕敬一人昔比邱接足於居士菩薩稽首於慢眾斯文復彰厥趣安在如以權道難沿佛性可尊况是君臨罔非神降伯陽開萬齡之範仲尼敷百王之則至於謁拜必遵朝典獨有沙門敢為陵慢此而可忍孰可容乎弊風難革惡流易久不遇明皇誰能刊正忽起非常之變易招無信之譏至言有憑幸垂詳覽主曰吾所立者內也子所難者外也內則通於法理外則局於人事相望懸絕詎可同年斯謂學而未該聞而不洽子之所惑吾當為辨試舉其要總有七條無德不報一也無善不攝二也方便無礙三也寂滅無榮四也儀不可越五也服不可亂六也因不可忘七也初之四條對酬難意後之三條引出成式吾聞天不言而四時行焉王不言而萬國治焉帝有何力民無能名成而不居為而不恃斯乃先生之盡善大人之至德同霑庶類齊豫率賓幸殊草木差非蟲鳥戴圓履方俯仰懷惠食粟飲水飽滿銜澤既能矜許出家慈聽入道斷麤業於已往祈妙果於將來既蒙重恩還思厚答方憑萬善之益豈在一身之敬追以善答攝報乃深徵以身敬收利蓋淺良由僧失正儀俗滅餘慶僧不拜俗佛已明言若知可信理當遵立如謂難依事應除廢何容崇之欲求其福卑之復責其禮即令從禮便同其俗猶云請福未見其潤此則存而似棄僧而類民非白非黑無所名也竊見郊禋總祭惟存仰福為尊僧尚鄙斯不恭如何令僧拜俗天地可反斯儀罕乖後更為敘是謂無德不報者也法既漸衰人亦稍末罕有其聖誠如所言雖處凡流仍持忍鎧縱虧戒學尚談智典如塔之貴似佛之尊歸之則善生毀之則罪積猛以始發割愛難而能捨宏願終期成覺迴而能趣斯故剃髮之辰天魔遙攝染衣之日帝釋遙懽妓女聊被無漏遂滿醉人暫翦有緣即結龍子賴而息驚象王見而止怖威靈斯在儀服是同幼未受具對揚佛旨小不可輕光揚僧力波離既度釋子服心尼陀亦歸匿王屈意乃至若老若少可師者法無賤無豪所存者道然後賢愚之際語默之間生熟相似去取非易肉眼分別恐不逢寶信心平等或其值真纔滿四人即成一眾僧既宏納佛亦通在食看沸水之異方遣施僧衣見織金之奇乃令奉眾僧之威德不亦大矣足可以號福田之最為聖教之宗是謂第二無善不攝者也若論淨名之功早升雲地臥疾之意本超世境久行神足咸歎辯才新學頂禮誠謝法施事是權宜式非常准謂時暫變其例乃多則有空藏弗恭如來無責沙彌大願和尚推先一往直觀悉可驚怪再詳典釋莫非通塗不輕大士獨興高跡警彼上慢之流設茲下心之拜偏行一道直用至誠既非三慧詎是恒式因機作法足為希有假宏教化難著律儀大聖發二智之明制五篇之約廢其爵齒存其戒夏始終通訓利鈍齊仰耆幼有序先後無雜未以一出別業而令七眾普行不然之理分明可見昔妻死歌而鼓盆子葬嬴而襯土此亦匹夫之節豈概明王之制乎况覺典沖邃聖言幽密局執一邊殊乖四辯是謂第三方便無礙者也且復周之柱史久掌王役魯之司寇已居國宰宗歸道德始曰無名訓在詩書終云不作祖述堯舜憲章文武鞠躬恭敬非此而誰巢許之風望古仍邁夷齊之操擬今尚迴焉似高攀十力遠度四流厭斯有為之苦欣彼無餘之滅不繫慮於公庭未流情於王事自然解脫固異儒者之儔矣是謂第四寂滅無榮者也至如祭祀鬼神望秩川嶽國容盛典書契美談神輩為王所敬僧猶莫致於禮僧眾為神所禮王寧反受其敬上下參差翻違正法衣裳顛倒何足相方令神擁護今來在僧祈請之至會開呪力竟無拜禮是謂第五儀不可越者也本皇王之奮起必真人之託生上德雖祕於淨心外像仍標於俗相是以道彰緇服則情勤宜猛業隱元門則形恭應絕求之故實備有前聞國主蘋婆父王淨飯昔之斯等咸己克聖專修信順每事歸依縱見凡僧還想崇佛不以跪親為孝計非不孝之罪不以拜君為敬豈是不敬之愆所法自殊所法已別體無混雜制從於此是謂第六服不可亂者也謹按多羅妙典釋迦真說乃云居剎利而稱尊藉般若而為護四信不壞十善無虧奉佛事僧責功累德然後日精月像之降赤光白氣之感金輪既轉珠寶復懸應天順民御圖握鏡始開五常之術終宏八正之道亦宜覆觀宿命追憶往因敬佛教而崇僧寶益戒香而增慧力自可天基轉高比梵宮之遠大聖壽恒固同劫石之長久然則雷霆勢極龍虎威隆慶必賴兼共使怒及出言布令風行草偃既抑僧體誰敢鱗張但恐有損冥功無資盛業竭誠盡命如斯而已是謂第七因不可忘者也上以畧引吾意粗除子惑欲得博聞宜尋大部客曰主人向之所引理例頻繁僕雖庸闇頗亦承覽文總幽明辨包內外所論祭典尚有迷惑周易云一陰一陽之謂道陰陽不測之謂神竊以昧隱神路隔絕人境欲行祠法要藉禮官本置太常專同太祝縱知鬼事終入臣伍真佛已潛聖僧又滅仰信冥道全涉幽神季葉凡夫薄言迴向共規閒逸相學剃翦職掌檀會所以加其法衣主守塔坊所以蠲其俗役纔觸王網即墜民貫既同典祀詎合稱寶朝敬天子固是恒儀苦執強梁定非通識宋氏舊制其風不遠惟應相襲更欲何辭主人曰客知其一未曉其二請聽嘉言少除異想吾聞鬼者歸也死之所入神者靈也形之所宗鬼劣於人惟止惡道神勝於色暜該情趣心有靈智稱之曰神隱而難知謂之不測銓其體用或動或靜品其性欲有陰有陽周易之旨蓋此之故殊塗顯於一氣誠言闕於六識設教之漸斷可知焉鬼報冥通潛來密去標以神號特用茲耳嘗試言之受父母之遺稟乾坤之分可以存乎氣可以立乎形至若己之神道必是我之心業未曾感之於乾坤得之於父母識含胎藏彌亘虛空意帶熏種漫盈世界去而復生如火焰之連出來而更逝若水波之續轉根之莫見其始究之豈覿其終濁之則為凡澄之則為聖神道細幽理固難詳矣神之最高謂之大覺思議所不得名相孰能窮真身本無遷謝生盲自不瞻覩託想追於舊蹤傾心翫於遺法若欲荷傳持之任啟要妙之門賴此僧徒膺茲佛付假慈雲為內影憑帝威為外力元風遠及至於是乎教通三世眾別四部二從於道二守於俗從道則服像尊儀守俗則務典供事像尊謂比邱比邱尼也典供謂優婆塞優婆夷也所像者尊則未參神位所典者供則下預臣頒原典供之人同主祭之役吾非當職子何錯引由子切言發吾深趣理既明矣勿復惑諸在宋之初暫行此抑彼亦乖真不煩涉論邊鄙風俗未見其美忽遣同之可怪之極客曰有旨者斯論也蒙告善道請從退歸夫沙門不拜俗者何蓋出處異流內外殊分居宗體極息慮亡身不汲汲以求生不區區以順化情超宇內迹寄寰中斯所以抗禮宸居背恩天屬化物不能遷其化生生無以累其生長揖君親斯其大旨也若推之人事稽諸訓詁則所不應拜其例十焉至如望秩山川郊祀天地欲其利物君罄迺誠今三寶住持歸戒宏益幽明翼化可畧言焉斯神祇之流也為祭之尸必叶昭穆割牲薦熟時為不臣今三寶一體敬僧如佛備乎內典無俟繁言斯祭主之流也宋之君二王之後王者所重敬為國賓今僧為法王之允王者受佛付囑勸勵四部進修三行斯國賓之流也重道尊師則勿臣矣雖詔天子無北面焉今沙門傳佛之教導凡誘物嚴師敬學其在茲乎斯儒行之流也禮云介者不拜為其失於容節故周亞夫長揖漢文也今沙門身被忍鎧戡翦欲軍掌握慧刀志摧心惑斯介冑之流也著代筮賓尊先冠阼母兄致拜以禮成人今沙門以大法為已任拯㣥生於塗炭敬遵遺躅祖承嫡允斯傳重之流也堯稱則天不屈潁陽之高武盡美矣終全孤竹之潔今沙門高尚其事不事王侯蟬蛻囂埃之中自致寰區之外斯逸人之流也犯五刑關三木被箠楚嬰金鐵者不責其具禮今沙門剃毛髮絕允嗣毀形體易衣服斯刑人之流也又詔使雖微承天則貴沙門縱賤稟命宜尊况德動幽明化霑龍鬼靜人天之苦浪清品庶之炎氛功既廣焉澤亦宏矣豈使絕塵之伍拜累君親閒放之流削同名教而已余幼耽斯務長頗搜尋採遺烈於青編纂前芳於汗簡重以感淪暉於佛日罄爝火以興詞庶永將來傳之好事又古今書論皆云不敬據斯一字愚竊惑焉何者敬乃通心介曲禮稱無不敬拜為身屈周陳九拜之儀且君父尊嚴心敬無容不可法律崇重身拜有爽通經以拜代敬用將為允故其書曰不拜為文遠公有言曰淵壑豈待晨露哉蓋自伸其罔極也此書之作亦猶是焉達鑒通賢儻無譏矣
