front:
  text: 全唐文欽定全唐文卷九百六十七闕名八
  hash: sha256:d90e3f617a07823323b2d58e96d43f9d6c0dcdb10e17a2360fd2e17eb56f65eb
body:
  text: 諸州刺史諸府少尹次赤令諸州府五品已上官并常參官等在任之例約是三載命代之後遽即到京人數既多闕員常少稍經時月則訴飢寒起今後請據舊章刺史及五品已上官在外應受替去任非有徵召未得到京宜委所在州府每兩月一度申中書門下其初狀仍具前任政績受代月日中書門下准前置具員量才除授其家在上都因自歸止者京兆府申奏舊以第一第二殿中御史知東西推竊以故事三院御史皆初領繁劇後即漸輕近以新入監察兩人監倉監庫殿中既無倉庫兼俸空負推獄憂勤即與臺中從劇入輕頓乖舊例今請殿中第三人第四人分知兩推希同漸殺之文每年供諸司并畿內諸鎮軍糧等計粟麥一百六十餘萬石約以錢九十六萬六千餘貫糴之畿內百姓每年納兩稅見錢五十萬貫約以粟麥二百餘萬石糶之是度支糴以六十而百姓糶以二十五農人賤糶利歸商徒度支貴糴賄行黔吏今請以度支貴糴錢五十萬貫送京兆府充百姓一年兩稅勒二十三縣代緡輸粟八十萬石小麥二十萬石充度支諸色軍糧則開成三年以後似每歲放百姓一半稅錢又省度支錢一十萬貫勸農減費物理昭然仍請百姓廣開田畝更不加稅行之有節富庶可期伏準制書贈司徒郭釗嫡男仲文襲封太原郡公者臣近訪知郭釗妻沈氏公主之女代宗皇帝外孫有男仲辭已選尚主仲文不合假冒自稱嫡子若仲文承嫡即沈氏須黜居別室仲辭不合配尚貴主伏以郭仲文尚父子儀之孫太皇太后之姪戚里勳門無與儔比婚姻嫡庶朝野具知奪宗之配實玷風教且仲文仲辭既非同出襲封尚主不可並行伏請付臺勘當天下之理在能官人古人以還委重吏部自循資授任衡鏡失權立格去留簿書得計比緣今年三月選事方畢四月已後方修來年格文五月頒下及到地遠已及秋期今請起今月與下長格所在州府牓門曉示其所資官取本任黃衣本貫解一千里內三月十日解到省二千里三千里遞加十日並勒本州賫送選人發解訖任各歸家其年七月十五日齊於所住府看吏部長榜定留放其得留人並限其年十二月十日齊到省試注唱正月內銓門開永為定例如其年合用闕少選人文書無違犯可較則於本色闕內先集選深人年長人其餘人既無闕可集南曹俱為判成榜示所住州縣府許次年取本任州府公驗便依限赴集更不重取本任本貫解諸州府如有宗子寄寓貧病不能自濟者有羇旅道途棲遲丐食者並請所在州縣切加存䘏兼隨事接借不得令有侵欺致使抑屈如有違犯禮禁自冒刑名即任所在州縣仔細勘問仍先具罪狀申報宗正寺待寺司聞奏不得懸便科斷所冀遠方宗子平時無困辱之虞守土諸侯聖朝識敦睦之意得覆定石經字體官翰林待詔唐元度狀伏准太和七年二月五日勅覆九經字體者今所詳覆多依司業張參五經字為准其舊字樣歲月將久畫點參差傳寫相承漸致乖誤今並依字書與較勘同商較是非取其適中纂錄為新加九經字樣一卷請附於五經樣之末用證紕誤延英對宰臣須紀錄伏以陛下躬勤庶政超邁百王每對宰臣日旰忘倦正衙決事二史在前便殿坐日全無紀錄長壽初宰臣姚璹奏置時政紀寢而不行貞元中宰臣趙憬請復故事無何又廢恭惟聖政必在發明今請每至延英坐日對宰臣往復之詞關教化政刑之事委中書門下直日紀錄月終送史館所冀政猷不墜國史有倫昨日延英面奏已蒙允許臣等謹按春秋尚書最為前史事言異貫義體兩存今韋籌所著意實即師古欲使本朝大典與千古同風然漢氏已還更立史法稽其指要事歸詳盡伏以聖唐御宇向三百年聲教遠垂文物大備祖功宗德傳諸不朽本紀實錄之外復有注記典歷蓋史氏職司大懼簡畧久已著定遽難變更臣等參酌古今須歸的當況歷代編紀名號實繁雖統制各殊悉傳示於後伏請以籌所進之書藏於史館待其著述功畢令與舊史兼行則國朝典法今古咸備伏准開成元年正月一日勅諸州刺史少尹赤令並常參官等授替去任非有徵召不得到京宜委所在州府取其由歷每兩月一度申中書門下省參詳勅意以前件官到京後未有除授旅食可矜且令在外以候遷陟訪聞遠地不諭朝旨將謂故有勅格阻其戀闕之心干進者亦以迭來守道者便成廢滯恐須釐正以徇重情其諸道州府應有前件官等得替後任赴闕廷或家在四方亦隨所便常參官寒食拜掃今月七日延英面奏進止令准往例給公券者臣等謹檢舊案承常參官應為私事請假外州往來給券牒伏準太和八年八月十日勅釐革應緣私事並不許給公券今臣等商量惟寒食拜掃著在令式銜恩乘驛用表哀榮虔奉聖旨重頒新令其有拜掃不出府界假內往來者並不在給券限准今年二月八日赦節文應諸色勾留官令克寸下手力雜給等與本道州府充攝官課料無本司起請者臣等詳檢諸道官員俸料不一或正官料錢絕少雜給雜料過多若准赦文手力紙筆並令克寸下則正官勾留亦領公事所請俸料不如攝官既未得中亦恐難守本司既無起請中書門下須與條流臣等商量應諸色勾留官正料及手力課雜職課雜給雜料紙筆等錢望各委本州都計錢數每貫克寸二百文充攝官俸料其職田祿粟米望令全還正官不在計入諸色錢數之限臣等又以諸州長馬本是散員判司簿尉或須假攝其所克寸留錢望委州司酌量閒劇差署均融多少支給亦不要各占本色錢數及填滿闕員仍令每至歲終分析申報戶部臺司所奏條流檐子事更須商量其常參官或諸司長史品秩高者有疾及筋力綿怯不能控馭望許牒臺暫乘檐子患捐勒停其出使郎官中路遇疾令自雇夫者若所詣稍遠計費極多制下檢身不合貸借輕賫則不濟所要無借則不可支持如中路遇疾者所在飛牒申奏差替去以此商量度為折衷餘請依御史臺所奏皇城內伊洛等四水伏以伊洛四水載在典墳今人所呼其名甚著其第三水宇御名同東周之人所以請更其名者遂勒所府官司錄以下參議其事今得司錄參軍韋瓊等狀謹按尚書周公將營洛邑卜澗水東瀍水西惟洛食孔安國傳云初卜黎水上不吉迨卜此二水之間吉伏請改第三水字為吉字者臣竊以周居洛宅卜年惟永今改此水雅叶祥符謹具如前伏以江南百姓營生多以種茶為業官司量事設法惟稅賣茶商人但於店鋪交關自得公私通濟今則事須私賣苟務隱欺皆是主人牙郎中裏誘引又被販茶姦黨分外勾牽所繇因此為姦利皆追收攪擾一人犯罪數戶破殘必在屏除使安法理其園戶私賣茶犯十斤至一百斤徵錢一百文決脊杖二十至三百斤決脊杖二十徵錢如上累犯累科三犯已後委本州上歷收管重加徭役以戒鄉閭此則法不虛施人安本業既懼當辜之苦自無犯法之心條令既行公私皆泰若州縣不加把捉縱令私賣園茶其有被人告論則又砍園失業當司察訪別具奏聞請准放私鹽例處分伏以興販私茶㣥黨頗衆場舖人吏皆與通連舊法雖嚴終難行使須別置法以革奸徒輕重既有等差節級易為遵守今既特許陳首所在招數勅令已行皇恩普洽宜從變法使各自新若又抵違須重科斷自今後應輕行販私茶無得杖伴侶者從十斤至一百斤決脊杖十五其茶並隨身物並沒納給糾告及捕捉所繇其囚牒送本州縣置歷收管使別營生再犯不問多少准法處分三百斤已上即是恣行兇狡不懼敗亡誘扇愚人悉皆屏絕並准法處分其所沒納亦如上例謹按天子七廟祖功宗德不在其中國朝制度太廟九室伏以太祖景皇帝受封於唐高祖太宗創業受命有功之主百代不遷今文宗元聖昭獻皇帝升祔有時代宗睿文孝武皇帝是親盡之祖理合祧遷每至禘祫合食如常州縣攝官假名求食常懷苟且不恤疲人其州縣闕少官員今後望委本州刺史於當州諸縣官中量賢劇分配公事勾當如官員數少力實不逮處即於前資官選擇清謹有能者差攝不得取散試官充准監察御史關牒今月十三日祀九宮貴神已勅宰相崔珙攝太尉行事合受誓戒及有司徒司空否伏以前件祭本稱大祠準太和三年七月二十四日勅降為中祠昨據勅文祇稱崇飾舊壇務於嚴潔不令別進儀注更有改移伏恐不合去用大祠禮料伏候裁旨元日御含元殿百官就列唯宰相及兩省官皆未開扇前立於欄檻之內及扇開便侍立於御前三朝大慶萬邦稱賀唯宰相侍臣同介冑武夫竟不拜至尊而退酌於禮意事未得中臣等請御殿日昧爽宰相兩省官鬬班於香案前俟扇開通事贊兩省官再拜拜訖升殿侍立回紇族帳侵擾部內勅勸課種桑比有勅命如能增數每歲申聞比知並無遵行恣加翦伐列於鄽市賣作薪蒸自今州縣所由切宜禁斷臣聞河陽五縣自艱難以後割屬河陽三城使今河南所管五縣中租賦色役盡屬河陽使歸一統便為定制既是雄鎮足壯三城臣等商量其河陽縣望改為孟州仍為望州河陽氾水溫縣河清濟源等五縣改為望縣其縣令以下望且令守本官至吏部注官日替伏聞定安大長公主二月二十五日以回紇背叛恩德侵軼邊陲於光順門內脫去簪珥變服請罪陛下釋其負方敢對見又以宣城公主等違勅不到各罰封物伏以禮法之行始此中壼王化盛事人倫美談周易云正家而天下定矣臣等忝在樞近不任抃賀踴躍之至伏望宣付史館紀述為百代典制擒盜賊并鬬行鬬毆人等被奸惡所由與府縣人吏同情欺罔因緣卜射求取恣為不顧典刑隱藏愆犯臣見今推鞫須立條科應府縣所由輒因事取錢及恐嚇平人遣重囚典引坊市人戶推問得實贓至十貫以上者從今後伏請集衆決殺十貫以下者即量情科斷如捕賊所由捉搦賊贓至五十貫請賞三十貫文如贓至一百貫以上取本贓一半以上充賞庶賞罰必行奸欺止息朝庭設文學之科以求髦俊臺閣清選莫不繇茲近緣覈實不在於鄉閭趨名頗雜於非類致有跋扈之地情計交通將澄化源在舉明憲臣等商量今日以後舉人於禮部納家狀後望依前三人自相保其衣冠則以親姻故舊久同遊處其有江湖之士則以封壤接近素所諳知者為保如有缺孝弟之行資朋黨之勢跡繇邪徑言涉多端者並不在就仕之限如容情故自相隱蔽有人糾舉其同保人並三年不得赴舉仍委禮部明為戒勵編入舉格天下廢寺銅像鐘磬委鹽鐵使鑄錢其鐵像委本州鑄為農器金銀鍮石等像銷付度支衣冠士庶之家所有金銀銅鐵之像勅出後限一月納官如違委鹽鐵使依禁銅法處分其土木石等像合留寺內依舊僧尼不合隸祠部請隸鴻臚寺其大秦穆護等祠釋教既已釐革邪法不可獨存其人並勒還俗遞歸本貫充稅戶如外國人送還本處收管東都太廟九室神主共二十六座自祿山叛後取太廟為軍營神主棄於街巷所司潛收聚見在太微宮內新造小屋之內其太廟屋室並在可以修崇太和中太常博士議以為東都不合置神主車駕東幸即載主而行至今因循尚未修建望令尚書集公卿及禮官學官詳議如不要更置須有收藏去處如合置望以所拆大寺材木修建李石既是宗室官為居守便望令充修東都太廟使勾當修繕臣等昨於延英對恭聞聖旨常欲朝廷尊臣下肅此是陛下深究理本也臣按管子云凡國之重器莫重於令令重則君尊君尊則國安故國安在於尊君尊君在於行令君人之理本莫要於出令故曰虧令者死益令者死不行令者死不從令者死又曰令行於上而下論可不可是上失其威下繫於人也自太和已來其風大弊令出於上非之於下此弊不除無以理國也昨韋宏質所論宰相不合兼領錢穀臣等輒以事體陳聞昔匡衡所以云大臣者國家之股肱萬姓所瞻仰明王所慎擇傳曰下輕其上賤人圖柄則國家搖動而人不靜宏質受人教導輒獻封章是則賤人圖柄矣蕭望之漢朝名儒重德為御史大夫奏云今首歲日月少光罪在臣等上以望之意輕丞相乃下侍中御史詰問貞觀中監察御史陳師合上書云人之思慮有限一人不可兼總數職太宗曰此人妄有毀謗欲離間我君臣流師合於嶺外賈誼云人生如堂㣥臣如陛陛高則堂高亦由將相重君臣尊其勢然也如宰相奸謀隱匿則人人皆得上論至於制置職業固是人主之柄非小人所得干議古者朝廷之上各守其官思不出位宏質賤人豈得以非所宜言上瀆明主此是輕宰相撓時政也昔東漢處士橫議遂有黨錮事起此事深要懲絕伏望陛下詳其姦詐去其朋徒則朝廷安靜制令肅然臣等不勝感憤之至武宗昭肅皇帝祔廟并合祧去舊廟等事伏以自敬宗文宗武宗兄弟相及已歷三朝昭穆之位與承前不同所可疑者其事有四一者兄弟昭穆同位不相為後二者已祧之主復入舊廟三者廟數有限無後之主則宜出置別廟四者兄弟既不相為後昭為父道穆為子道則昭穆同班不合異位據春秋文公二年躋僖公何休云躋升也謂西上也惠公與莊公當同南面西上隱桓與閔僖當同北面西上孔㯋達亦引斯義釋經又賀循云殷之盤庚不序陽甲漢之光武上繼元帝晉元帝簡文皆用此義毀之蓋以昭穆同位不可兼毀二廟故也尚書云七世之廟可以觀德且殷家兄弟相及有至四帝不及祖禰何容更言七世於理無疑矣二者今已兄弟相及同為一代矯前之失則合復祔代宗神主於太廟或疑已祧之主不宜更入太廟者按晉代元明之時已遷豫章潁川矣及簡文即位乃元帝之子故復豫章潁川二神主於廟又國朝中宗已祔太廟至開元四年乃出置別廟至十年置九廟而中宗神主復祔太廟則已遷復入亦可無疑矣三者廟有定數無後之主出置別廟者按魏晉之初主多同廟蓋取上古清廟一官尊遠神祇之義自後晉武所立之廟雖云七主而實六世葢景文同廟故也又按魯立姜嫄文王之廟不計昭穆以尊尚功德也晉元帝上繼武帝而別享惠懷愍三帝時賀循等諸儒議以為別立廟親遠義疎都邑遷異於理無嫌也今以文宗棄世纔六年武宗甫爾復土遽移別廟不齒宗祖在於有司非所宜議四者添置廟之室按禮論晉太常賀循云廟以容主為限無拘常數故晉武帝時廟有七主六代至元帝明帝廟皆十室及成康穆三帝皆至十一室自後雖遷故祔新大抵以七世為准而不限室數伏以江左名儒通賾覩奧事有明據固可施行今若不行是議更以迭毀為制則當上不及高曾未盡之親下有忍臣子恩義之道謹備討古今參校經史上請復代宗神主於太廟以存高曾之親下以敬宗文宗武宗同為一代於太廟東間添置兩室定為九代十一室之制以全臣子恩敬之義庶協大順之宜得變禮之正折古今之紛互立㣥疑之杓指俾因心廣孝永燭於皇明昭德事神無虧於聖代禘祫祝文稱號穆宗皇帝宣懿皇后韋氏敬宗皇帝文宗皇帝武宗皇帝緣從前但序親親以穆宗皇帝室稱為皇兄未合禮文得修撰官朱儔等狀稱禮序尊尊不敘親親陛下於穆宗敬宗武宗祝文恐須但稱嗣皇帝臣某昭告於某宗以下四室勅旨令禮官同商量聞奏者臣與今博士閔慶之修撰官朱儔檢討官王皡同考禮經更無別議請依前狀應諸州刺史既欲責其潔已須令俸祿稍充但以厚薄不同等級無制致使俸薄處無人願去祿厚處終日爭先應諸中下州司馬軍事俸料共不滿一百千者請添至一百千其緊上州不滿一百五十千者請添至一百五十千其雄望州不滿二百千者請添至二百千其先已過者即得仍舊並任於軍事雜錢中方圓置本收利充給如別帶使額者並仍舊不在添限
