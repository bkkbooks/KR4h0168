front:
  text: 全唐文欽定全唐文卷四百九十五權德輿十三
  hash: sha256:1931d7cad6eb9551bb89043e459686afe1d26b00bb49a44d02c2ea8b6c26dae1
body:
  text: 言兩漢所以亡者皆曰莽卓予以為莽卓篡逆汙神器以亂齊民自賈夷滅天下耳目顯然聞知靜徵厥初則亡西京者張禹亡東京者胡廣皆以假道儒術得伸其邪心徼一時大名致位公輔詞氣所發損益繫之而多方善柔保位持祿或陷時君以滋厲階或附凶沴以結禍胎故其蕩覆之機篡奪之兆皆指導之馴致之雖年祀相遠猶手授頤指之然也其為賊害豈直莽卓之比乎禹以經術為帝師身備漢相特見尊信當主臣之重極儒者之貴永始元延之閒天地之眚屢見言事者皆譏切王氏顓政時成帝亦悔懼天變而未有以決駕至禹第辟左右以問之須其一言以為律度為禹計者亦須陳大易堅冰之誡誦小雅十月之刺乘其嚮納痛言得失反以罕言命不語怪為詞致成帝不疑之心授王氏寖盛之勢上下恬然晻忽亡國儻帝慮不至是猶當開陳切劘面折廷辯矧當就第燕閒之際虛懷訪決之時方且視小男於牀下官子壻於近郡款款然用家人匹夫為心以身圖安不恤國患致使㣥盜弄權迭執魁柄禍稔毒流至於新都不可遏也斯可憤也逮至東都順桓之閒國統三絕胡廣以鉅儒柄用位極上台初梁冀席外戚之重貪戾當國既鴆質帝議立嗣君公卿大臣皆以清河王蒜年長有德屬最尊親可以靖人亦既定策冀乃憚其明哲且不利長君私於蠡吾獨異㣥議為廣議者亦當中立如石介然不回率趙戒之徒同李杜所守然後三事百工正詞於朝雖冀之暴恣豈能一旦盡誅漢廷㣥公邪反徇一息之安首鼠畏懦竟使清河徒廢蠡吾為梗邦家陵夷漢道日蹙結黨錮之獄成閹寺之禍禍亂循環以至董卓赫赫漢室化為當塗蓋棟橈鼎折之所由來久矣彼梅福以孤遠上疏張綱以卑秩埋輪獨何人哉而不是思也噫嘻就利違害榮通醜窮大凡有生之常性也暨乎手持政柄體國存亡則謹之於初決之於始以導善氣以遏亂原若禍胎既萌則死而後已白刃可蹈鴻毛斯輕奈何禹廣於完安之時則務小忠而立細行數數然獻吉筮於露蓍沮立後於探籌及夫安危之際邦家之大則甘心結舌陰拱觀變豈止然也方又熾燄燄以燎原決湯湯以襄陵投天下於煙煨擠萬民於昬墊百代之下無所指名雖史贊粗言而不究論本末且出不越境書弒君之惡言偽而辯有兩觀之誅若當春秋之時明禹廣之罪作誡來世可勝紀乎向若西京抑損王氏尊君卑臣則庶乎無哀平之壞東京登庸清河主明臣忠則庶乎無靈獻之亂大漢之祚未易知也或以國之興亡皆有陰步馬之數非人謀能亢則但取瞽矇者而相之立土木偶而尊之被以章組列於廊廟斯可矣何堯舜之或咨或吁殷周之或夢或卜憂勤日昃之若是然後為理耶予因肄古史且嗜春秋裦貶之學心所憤激故辨其所以然至人無感與化升降全而不形保而不蕩汎然順物付之自當苟乖於是無非溺喪保合浩淳先生其人德機不發鳥獸同㣥稽首元關請滌蒙昏笑而謂予道不遠身支離而全以靜為君滑之則散泊之則存夭性者名木伐蘭薰與時卷舒中若浮雲蒘臭絲棼無撓而真勤而用斯至妙之門百昌皆化吾亦歸根動作天紀靜為地文鳥行無章變化沄沄強名無為以鏡心源靜專動直惟乾之德酌用不窮君子中庸矯矯二疏知微知終功成不居父子清風天子賜金㣥公出祖都門之美焯映千古優游衡門棲息化源日飲醇酎心閒道尊人或言利利令智昬清行素風可貽子孫萬物營營吉凶相生環中之樞泊然遺形中林寂寥幽蘭自榮雖有矰繳不羈冥冥知止不殆古先炯戒賢哉大夫終始無悔季真造適揮翰睨壁酒仙逸態草聖絕跡興涵雲海詞韻金石傳於祕邱永永無斁惟西方有極樂國以首楞嚴為理其應溥其用神大抵攝萬緣㣥動會於虛寂其次則感通信誓為釐為福局於世論者多置為他方之教惟孝子信士仰為冥助則像設之綵繪之用申罔極之報今茲西方變即故戶部員外郎贈給事中范公之孤曰傳正傳質奉為先妣博陵崔夫人既練所畫也惟夫人以淑明柔順光配戶部自晝哭之後訓二孤之暇每讀誦大乘微言密詣精理今傳正等又能將順先旨發於孝思於精廬素壁合朱綠金翠之飾天人法相靡不嚴靜以夫人之福履孝子之至誠若乘念以游如經之旨當趺坐於芙蕖上品之中生滅流妄於是昭息予嘗心奉其教故得贊其所以然釋迦大聖以無礙應身演一切法後之人跡文字以為像設誠明以在中而福祉隨之伯舅武進縣丞府君守儒門言行之訓安貞下位其道未光貞元三年捐館舍太夫人從子於鍾陵承訃發哀茹終鮮之痛且痛不得當哭泣之位躬即遠之事期喪之禮禮有加等又曰悲哀鍾於情而不足以為冥助也乃稽諸釋氏說以為幽贊交感之際不相遠也是用徼福以作繪事煥以金碧穆然尊嚴瞻仰之際如至佛剎况孝悌通於神明聖功演乎無方小子德輿謹繫以贊五色相宣兮聖質昭明福祥下照兮保祐冥冥十二因緣之中生死循環憂悲蘊聚非天人大聖以利刃斷之慈航濟之則淪胥顛覆之不給矣惟阿彌陀佛化行西方其號極樂有生之乘念感化之由一作則由於斯今茲功德者清信女士隴西李氏為亡夫襄陵尉滎陽鄭君再期之為也女士歸鄭一周星而孀凡事舅姑以孝從娣姒以敬佐夫以義拊下以仁隱約終窶至於晝哭衛風碩人柏舟之詩實兼痛焉初鄭君旅人於晉因以筮仕成命甫行祿未及而大病女士方侍姑於吳承訃加痛宏誓徼福薦於冥冥紉鍼綴縷叶用五采青蓮白毫髣髴嚬呻彼二大士列侍左右晬容交光炳耀煌煌發於心成於手阿鞞跋致其遠乎哉鄭固善士妻又吾伯舅之女子子也得周知之因以讚曰西方大聖乘念則至寫彼相好導茲志氣冥助無方以成鄭志興元紀號皇上宅位六祀七政貞明於上七教敷聞於下其有不迪不吉不庭不若之徒皆欣然而和晻然而化春三月司天氏奏歲星居心宿五度其色黃明潤大光祥帝位積五十餘日詔下有司頒示中外故臣得而言之以形歌頌臣謹按歲星五帝為蒼五行為木五常為仁五事為貌天意若曰時以至仁為理覆露萬人洽浹生類協夫五行五事之用則發於星緯形於占應陰步馬大化昭報成功元符幽贊其昭昭如是禮運之論聖人曰以日星為紀以四時為柄洪範之敘皇極曰斂時五福用敷錫厥庶人發於人格於天天人交感合若符節其年秋平河中之寇葬其遺骸復其世祀班淮右之師用宏文告用去武備此二帝三代所以恢令名也於是一統類以昭德明法制以塞違薦禮百神賓懷獷俗嘉瑞美祥紛委狎至置之而不有哲人端士連茹播職求之如已失然後端拱於穆清怡神於靜冥驅一代為純誠接萬靈於明庭斯又登邁邃古光昭聞見巍乎紹天統物之盛者也微臣伏於草茅之下沐浴仁聖敢獻歲星居心讚一章以備周詩由庚由儀之闕讚曰皇矣上帝降鑒下人后王承之制作禮文乂用清明家尚孝仁人無癘疵俗以阜蕃敷佑四方發為天祥重華煌煌乃居明堂下煦仁澤上為祥光肸蠁感通天人攸同乃發五事乃建大中君君臣臣德輝昭融保佑命之自天無窮微臣作歌敢備唐風聲為陽所以發越金尚羽所以清徹故鳬氏工焉法器成焉元門揭焉與夫樂出虛鏗立號同其功用而信響受祉之說倍焉興唐觀新鐘者觀主道門威儀太清宮供奉郗尊師彞素之所創也是觀經構之初與舊鐘俱當開元甲戌距今七十有七歲嗄毀棄法音不嗣久矣師有環中大辨為道流龜龍循其照觀其妙法自然無為而無不為所以恢元功宏願力誠修而物應言發而響會上士仁人展其助飛廉回祿理其具精乎六齊合以萬數以心齊以神遇士冖䂞地籟騰天光無害金無耗氣不窕不槬不石不播於是登簴在懸希聲殷然小大隨叩昬昕警眾周六虛而洞三界拔九幽而清五苦皇都人士游者萃者感於耳和於心躁者靜者懸解師之善利利物可勝道哉古者林鐘景鐘皆銘其功儒氏之典也推類以鏤文字師之心也銘曰其動也懸而天其用也虛而圓雷大音兮集㣥僊福元后兮斯億年鏗訇響亮鴻都前上入冥兮下徹泉然後舂容銷散兮返萬物於自然太和熙熙酌而用之旁魄變化皆生乎幾上合乾道萬物陰步馬下為人紀百工咸秩游泳虛無合體渾區乃卷乃舒與㣥有居沖用為工方寸為鑪周行不殆造物可侔一以制動寡以理眾或行其道或藏其用盤桓利貞得時大行燮贊裁成粲然文明舒亘八極藏之無形山川出雲元氣冥冥故曰知幾其神孔父周文去聖遠矣時無其人見幾而作造形斯悟蘧生可卷顏子殆庶物至知之節宣好惡無愆五事無汨百度靜之如淵運之如環得喪糾纆相望其閒不見其眹莫知其然審而用之吾道常全肅肅我祖元鳥自天天乙革夏武丁相賢手文命子開國於權肇荒南荊瓜瓞綿綿爰暨周衰征伐下顓凌暴紛紛遇楚而顛嬴吞四方我邦用遷乃宅隴坻乃封甘泉漢魏之際德業相繼或仁或哲亦夷亦惠圖諜葳蕤十有三世伊川其戎晉化為東九州輻裂苻有關中明明安邱濡跡匪躬二紀清夷明謨之功元魏以降苴茅繼封宜昌鄜城仍世儀同洸洸平涼策勳於隋乃破公祏克寸其枚迴運偶聖時土田載開仗節建旄自東徂西才子六人承家鍾慶百里同休南宮並命自時厥後德煇愈盛不享大官世名文行我曾王父弱歲觀光聲軼太學名登奉常偉節三虎聯華並芳翰苑春生士林鳳翔迨至王父保和居易人文獨步天爵自貴展禽下位賈生不試至今德聲尚聳清議郁郁世範先子承之大節明義人倫宗師行極忠孝道冥希夷卷舒無方焯燿當時曰予無狀齓歲而孤不知義方藐爾惷愚亦既羈丱甫習詩書以直為師與時浸疎琅琅清風皦皦士則及茲頑童是玷是辱聿修之誡大懼不克夙夜以思敢銘世德記曰君子居易以俟命語曰君子坦蕩蕩此蓋視履考祥而不憂不懼也易曰思患而豫防之語曰季文子三思而後行此又戒慎若厲之義也言豈一端而已哉亦各有所當在明者審之而已或不能深推本末而疑吾自若則舟有溺騎有墜寢有魘飲有醉食有饐行有蹷其甚則皆可致斃無非危機其可以盡廢此而如土偶木寓耶不然則憂可既乎憂可既乎辛酉歲予以吏役道於上饒時左司郎中博陵崔公出守郡佐與予語及世道次及人倫大節因曰延州之讓不其至矣或者言吳以太伯讓而興季子讓而亡此乃徇於一方而不超乎大方也原夫太伯避季歷奔荊蠻以就文武之大業則知太伯因天下之尊周以成周也豈以興周為念季子因天下之去讓以全讓也豈以亡吳為念然則太伯季子皆以天下之心為心興亡曾不屑慮彼或者之論誠未通其旨焉予曰誠哉是言然季子之歷聘也聞樂章辯歌詩皆審其盛衰以造乎微精明閎達物無所逃數有所極耳又何區區異論於其閒哉荅曰子之言過矣若季子以興亡必然力不能支乘此而後三讓是利於將亡因以沽名者也豈可為君子言之過矣且以吳之存而季子亡之以讓之廢而季子全之嚮使勤一國之理理於勾吳今亦化為古墟鞠為榛蕪曷與夫禮讓之大使千古是式貪以之廉暴以之仁忍垢冒榮者以之知懼其於為理也不其達歟予乃拜受其論退書所聞且以志過名篇庶乎聞義能徙之義客問主人曰自古理世少亂世多豈真宰有必定之數耶抑人事耶荅曰時風之理亂在士行之薄厚士行薄厚上係於時君大臣所趣向矣自古輔政者或直方不試旋見絀放或進非其任疾顛覆餗之二者進退相隨不足以形理亂理亂者在君臣之際心術合符久而成化焉故聖與賢合則為堯為舜暗與諛合則為幽為厲其閒雖多方萬殊而不遠此二道先師曰人藏其心不可測度莊生亦云人心險於山川難於知天嚱夫淳化為醨利勝於義久矣被薦紳衣冠語道德仁義皆偉然有古君子之風心之所師有異於是者則不仁而多才且以主意為政但慮智不足以取合力不足以固位而不計合之固之枉直焉甚者則塞其聰明道其利欲順非阿旨與俱上下以平仲之和不如梁邱據之同即墨之毀不如阿大夫之譽其風下扇中人之域多由之以其術易修其用易博之為利也持祿觀望則曰明哲保身無所發明則曰大直若屈繆於義則曰反經合道枉於理則曰枉尺直尋或曰夫子之公山或曰管仲有反坫旁緣似是觸類滋長舞六籍之文以伸其邪志迭相薦譽號為通人亦有務名如循實求進如知退雖近習不得其誠巧歷不知其數鄉原邑聚變化周流取美名貴仕如轉圜反掌世教無主蕩然隨之豈曰盡然蓋寡不勝眾其甚也滅天下之公是瞀天下之好惡鉛刀蟬翼為銛為重於是民反德為亂天反時為災愆陽伏陰山童澤涸皆此物也及夫中外蕩析邦家臲卼則相傳曰殆天數乎非人力所及也生極顯尊死有誄諡為惡甚矣而譏議不失故天下之人父教其子兄諭其弟奔走寘力以不能為恥而欲望理多亂寡庸可得乎接輿申徒狄之徒佯狂而不復者皆惡是也蓋在為國者澄其源流以灑士行示三代之直道頒七教於國風取如是之流投禦魑魅示不復用則時風厚而天下理矣客曰請書所聞以為子孫藏或問性命荅曰天之於人也賦其命則有窮有通有壽有夭賦其性則有枉有直有仁有鄙性之不可移猶命之不可移使仁而直者通而壽天下之理理也窮而夭則反是鄙而枉者窮而夭天下亦理理也通而壽則反是其所繫者在天不在人在彼不在此吾何言哉吾何言哉或問富貴荅曰君子之所樂也問曰君子豈樂是而厭窮約耶荅曰先師嘗言之矣樂以其道處之者也不以其道則市井狡儈者皆能得之矣君子之所樂者非樂其身富且貴而已樂為仁由已而推其道於天下也或問出處荅曰出有二道在所執焉爾行道耶趨時耶闕一字居易絜矩坦夷中正則道在已而時不可必也就利為害推移俯仰則時在已道不可必也若道與時叶發紓光大則易之上下交泰詩之南山有臺書之咸有一德三說命是也斯蓋從古之所難也古之處者所以晦其明藏其用窮棲於嵌巖之下與鳥獸草木之為伍者誠角其利病而愛其身愛其道也豈得已之為耶予既醉客有問文者漬筆以應之云嘗聞於師曰尚氣尚理有有通能者得之以是不能者失之亦以是四者皆得之於全然則得之矣失於全則鼓氣者類於怒矣言理者傷於懦矣或狺狺而呀口跕跕以墮水好者則瑣碎以譎怪或如讖緯好通者則寬疎以浩蕩龎亂憔悴豈無一曲之效固致遠之必泥苟未能朱絃大羹之遺音遺味則當鐘磬在懸牢醴列位何遽翫丸索而躭粔餌况顛命而傷氣六經之後班馬得其門其或慤如中郎放如漆園或遒拔而峻深或坦夷而直溫固當漠然而神全然而天混成四時寒暑位焉穆如三朝而文武森然酌古始而陋凡今備文質之彬彬善用常而為雅善用故而為新雖數字之不為約雖彌卷而不為繁貫通之以經術彌縫之以淵元其天機與懸解若圬鼻而斲輪豈止文也以宏諸立身不如是則非吾黨也又何足以辯云大凡此世皆妄作也又何足以滑吾真苟虛中以順外兮吾又不知夫萬物之沄沄為細為大為利為害循環出沒互相變態至人達觀萬殊一槩弊弊焉分得喪於毫之內貴乎其道可以富壽天下賤乎無纖芥之為累者生乎順㣥物而熙熙如春死乎智氣歸虛無以反吾真則何嚮而非適又惡用天性以勞神
