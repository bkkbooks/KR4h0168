front:
  text: 全唐文欽定全唐文卷八百四十一頵字德臣廬州合肥人唐天佑初為宣州節度使與梁太祖謀討楊行密事泄為行密所殺
  hash: sha256:8a6bf4dced768bbe0ee9bf87a23f31526819e2c595753a0fe70ab2690681f230
  markers:
  - {type: head, offset: 14, content: 田頵, id: KR4h0168_NFKB_841-h1, level: 1}
body:
  text: 侯王守方以奉天子譬百川不朝於海雖狂奔猛注澶漫遐廣終為涸土不若順流無窮也況東南之鎮揚為大塵賤刀布阜積金玉願公上恆賦頵將悉儲峙具單車從行廷裕字膺餘昭宗時官翰林學士守尚書司封郎中知制誥遷左散騎常侍梁初貶湖南卒門下惟彼邠郇連城咸鎬雜華夏羌渾之俗有公劉后稷之風地控三州境延千里撫茲疲俗允屬名臣某官磊落喬松晶明片玉以雍睦作理家之本用詩書為干祿之基信厚難窺端莊不倚動皆顧行王遠每恥於妄言志切導人季路罕聞於宿諾明鏡利劍高謝塵埃止水秋山居為圭表自拔於侯府選在明庭心惟業官舉不避事廣明中盜侵關輔兵滿京師恭惟先皇帝遠幸右蜀爾則佐彼上相首誅助桀之人贊我元勳大挫吠堯之黨爾後一麾出牧雙節升壇安人得賢太守之風訓兵盡真將軍之令龔黃並駕管樂齊肩謺是功庸宜臻顯貴眷乃巨屏素號名藩爰自前朝必求名帥郭子儀以山河之誓戡定多難白敏中用廊廟之尊經營薄伐近則薦其喪亂方苦流亡將欲戢彼干戈保其生聚朕意念人惟爾所宜靜以撫封儉而植己弔彼凋殘之後宏其惠愛之誠副我殷憂佇爾蘇息大司空貴秩左光祿崇階亦遣進封皆勸為理苟孤委任其如法何門下在天成象拱帝座者三台在地稱崇鎮方隅者五嶽我有賢輔立乎大朝叶三台照耀之功契五嶽匡扶之力既凝庶績宜峻徽章正議大夫守中書侍郎同中書門下平章事上柱國賜紫金魚袋孫偓壁立孤峯渭清一派早以閨門之行聞於鄉里之間張融高文聚為玉海孫綽麗賦擲作金聲頗喧驚座之詞華遂整沖天之羽翰鵬張上國顏淵首冠於諸科弓招小山穆生道優於置醴厥後簪御史筆講博士書從容纍踐於南宮諫諍俄升於左闥蘭香見忌玉冷多猜比騷人湘浦之行繼賈誼長沙之役朕自知直道召歸掖垣每於敷陳必盡肺腑因朱雲折檻之對識張華王佐之才斷自中宸爰立作相彌縫不倦匡益居先操心願革於澆浮進善必先於行賞搜抉沈滯拔用隱淪致我時風自爾而厚張說當元宗之代初啓集賢竇參居德宗之朝別分戶部一則寵九流之墳典一則萃四海之賦輿式仗英規遂兼茲領高建楚子之爵貴升鄭衆之階勉殄寇讎以復朝社可銀青光祿大夫依前中書侍郎同中書門下平章事充集賢殿大學士兼判戶部事仍封安樂縣開國子食邑五百戶餘如故聖文睿德光武宏孝皇帝自壽邸即位二年監修國史丞相晉國公杜讓能以宣宗懿宗三朝實録未修歲月漸遠慮聖績湮墜乃奏上選中朝鴻儒碩學之士十五人分修三聖實録以吏部侍郎柳玭右補闕裴廷裕左拾遺孫泰駕部員外郎李允太常博士鄭光庭專修宣宗實録廷裕奉詔之日惕不敢息思托實無隱以成一朝之書踰歲修例竟未立國朝故事以左右史修起居注逐季送史館史館別設修撰官起居注外又置日歷至修實録之日取信於日歷起居注參而成之伏自宣宗皇帝宮車宴駕垂四十載中原大亂日歷與起居注不存一字致儒學之士閣筆未就非曠職官無憑起凡例也廷裕自為兒時已多記憶謹采宣宗朝耳目聞覩撰成三卷非編年之史未敢聞於縣官且奏記於監國史晉國公藏之於閣以備討論昔周文王以聖德受命太伯以至仁讓王錫封於吳因國為氏公諱承泌字希白即裔孫也曾祖士侃贈金紫光祿大夫內給事祖德鄘贈特進右領軍上將軍宣宗之朝渥恩特異出則綰兵符而臨巨鎮入則司劇務以闡皇猷懿宗皇帝將奉丕圖公時為弓箭庫使送往事居之際顯著忠規綴衣壓紐之時皆參密議父全紹贈朝散大夫內侍省內侍公則長子也闕四字王夷甫本天仙中人雅度清標嵇叔夜真風塵外物趨庭之歲穎悟過人五始窮經元凱闕一字成於傳癖三冬足用慰祖乃號於書淫百氏九流無不該博而又升高作賦納賈馬之降旗遇景裁詩破曹劉之堅壘韜光未仕藉甚高名學書王右軍妙傳其法受琴甘處士闕一字奪其師韓開府精擇賓僚首行羔雁庾元規之招殷浩謝鎮西之辟袁宏千載論交一時歸美尋以闕二字升之班行乾符末先皇帝以郇瑕之封管榷遺利命公以本官充解縣闕一字監催勘副使明如夏日洞察秋毫每辭种皓之金常遠劉輿之膩潔白無玷課最有聞搜考勾闕一字盡闕一字黠吏青蚨赤仄充於水衡以功賜緋魚袋充解縣催勘使尋屬關河失守盜賊驚奔銅駝既臥之九衢金根去狩於三蜀公則以榷利錢寄河中府單車往河北傳檄諸道言天子蒙塵之辱責官司奔問之儀召彼革車期復上國遂與易定節度使王處存同領甲兵二萬屯東渭橋公奔赴行朝面奏本末先帝感其忠果錫以金章依前充解縣榷稅使會蒲帥王榮盡占鹽租請贍軍伍公復歸朝闕後改充南詔禮儀副使中輟不行中和三年充許蔡通和慰諭使下齊之辨素優方期集事吠堯之犬正衆不克前征朝廷罪之奪我金紫先帝幸寶雞之歲搜訪才能召公充西院承旨卻復章綬尋以疑蛇未辨鬬蟻方喧遂辭清切之班去樂林園之趣馬相如彈琴之地揚執㦸草元之亭自有高情寧拘美爵帝重違其請便充西川宣諭使不到闕者數載聖上虔承大寶振起頽綱歷訪舊臣以裨至理尋加內侍伯判內侍省內給事綜領省務領袖廷臣張華則該博舊章黃瓊則練達故事加內侍充學士使嚴徐論思之地枚馬視草之司公以精識通才光膺是選絲綸夜出得以講陳鴛鷺會同靡不宴洽改宣徽北院司守右監門衛將軍濮陽郡開國伯食邑七百戶公酷好闕一字門誓不茹羶飲酒宥密之地非所願也懇讓者再三上許不奪素志方拜恩焉景福二年改內樞密使加特進左領軍衛上將軍知內侍省事濮陽開國侯食邑一千戶食實封一百戶公素懷遠略常切致君大用之辰納忠不一其他柅制萬務條緝百司闕一字在簡書不可備載乾寧二年春正月二十日薨於渥水年四十五闕稟君命也冬十月一日上御札示中書門下許公昭雪十一月二十日葬於京兆府萬年縣滻川鄉北姚村禮也長男修闕一字次男修睦皆南遷未復小男修禮葬有日公之季知象猶子恕已以書寓門僧請銘於裴廷裕時為天子詞詔之臣不得辭乃序而銘曰泗磬豐鐘其聲不㣥鸞翎鳳翼其闕三字公之苦學公之好文果於盛日匡我明君一言闕二字百歲闕二字聖道闕二字宏恩曲宣以是忠骨藏之下泉祐我國家億萬斯年珍徐州豐縣雍鳳里人梁祖起兵以中涓從尋署宣武右職光啓元年署諸軍都指揮使纍立戰功後與李唐賓不協手斬之梁祖怒其專殺遂誅之敕曰古之王者啓邦經野分職設官疇建殊庸懋昭大德或頒之弓矢或錫之土田我有重臣世膺王爵雖任一方之帥未超極品之榮漢法非劉不王唐制元帥為重實惟大任寧授匪人用錫名藩永扶昌運咨爾匡聖廣運同德保定功臣上柱國吳越國王錢俶乾坤間氣海嶽孕靈為民物之綱維實朝廷之藩翰承家保國奕世美堂構之賢治亂持危四方推英豪之主梯航時登乎丹陛兵革靡及乎蒼生才足以為主而庇民德足以移風而易俗肆歸建極不替忱誠有齊桓尊周之心而忠義或逾乎齊有晉悼駕鄭之略而功名不忝於晉建之都督則百辟允諧使之元戎則三軍從命表海受一方之寄真王啓萬戶之封匪爾令名曷兼衆職爾其不墜善始永圖令終承我徽言毋忝厥位可特授天下兵馬都元帥增食邑二千戶實封五百戶賜推誠保德安邦致治忠正功臣餘如故兢梁開平二年以吏部侍郎加中書侍郎平章事粵自範金合土之制雲師火紀之名禹別九州堯咨四嶽莫不簡求良輔宏濟兆人彰克勤克儉之能垂可久可大之業嗣太叔寬猛之政循仲尼富庶之言既茂勳勞宜標篆刻公名審知姓王氏琅琊人也其胙土命氏疏源演派代濟其美史不絶書後以太祖就祿光州因家於是郡焉曾祖友贈光祿卿王父蘊玉贈祕書少監父恁贈光州刺史繼贈太尉公即太尉之季子也初公兄潮志尚謙恭譽藹鄉曲善於和衆士多歸之福建節度使陳巖既嚮其名又以所屬泉州求牧乃遣禮而請之及到任頗著家聲後巖在軍病甚不能視事軍士等懼無統馭皆願有所依從泉牧遂以郡委於仲弟審邽而與公偕赴至則積惡者屏去為善者獲安因詔授節度使纍加檢校右僕射於是剗其訛弊整其章條三軍無譁萬姓有奉乾寧三年僕射遘疾且付公以戎旅仍具表奏尋加刑部尚書威武軍留後俄授金紫光祿大夫右僕射本軍節度使公器局端雅識理融明稟嵩嶠之真精得圮橋之妙略及膺帝命寵陟齊壇細柳連營旌旗動色蒲盧蒞政草樹逢春一年而足食足兵再歲而知禮知義方隅之內仰止攸同曩以運屬艱虞人罹昏墊農夫釋耒工女下機公既統藩垣勵精為理強者抑而弱者扶老者安而少者懷使之以時齊之以禮故得污萊盡闢雞犬相聞時和年豐家給人足版圖既倍井賦孔殷處以由庚取之盍徹夫述職之道底貢為先九邱爰序於厥包五霸是徵於縮酒雖甸服之近江漢之中或遇阻艱亦絶輸賦惟公益堅尊奬慎守規程松柏後凋風雲如晦地征旁午天庫充盈共仰勤劬咸知匡戴嘗以學校之設是為教化之原乃令誘掖童蒙興行敬讓幼已佩於師訓長皆置於國庠俊造相望廉秀特盛閩川以南地雖設險人尚爭雄或因饑饉薦臻或以刻剝為苦萑苻易聚巢穴難探公感之以恩綏之以德且曰吏實為虐爾復何辜示以寬仁俾之柔服遂使數十年之氛祲遽致廓清一千里之封疆旋觀昭泰張綱以單車入壘虞詡用絳縷擒姦以古況今彼猶懷愧爰自天寶艱難之後經費日繁聚斂之臣名額茲廣即山鳩利任土庀材峻設防隄頗聞賙贍洎經烽燧仍患崎嶇三司之職務空存四海之輪蹄鮮至公桉其程課命以權衡盡叶舊規猶彰宏業而又奉大雄之教崇上善之因象法重興導師如在虹梁雕栱重新忉利之宮鈿軸牙籤更演毗尼之象而又盛興寶塔爭捨淨財日麗飛甍霞攢彩檻顏豔疑回向遠邇歸依用俾㣥緣皆同妙果佛齊諸國雖同照臨靡襲冠裳舟車罕通琛賮罔至亦踰滄海來集鴻臚此乃公示以中孚致其內附宛土龍媒寧獨稱於往史條支雀卵諒可繼以前聞自燎熾西秦煙飛東觀魯壁之遺編莫採周陵之墜簡寧存亟命訪尋精於繕寫遠貢劉歆之閣不假陳農之求次第籤題森羅卷軸夫四鄰共守蓋當偃革之期七德方修必假禦衝之備是以恢張制度固護基局程功而莫匪子來作事而適當農隙立崇墉之百雉表巨屏於一方巖邑湯池曾何足數折筋縈帶固不可憑未若暫勞致茲永逸兵戈洊起帑庾多虛凡列土疆悉重征稅商旅以之而壅滯工賈以之而殫貧公則盡去煩苛縱其交易關譏廠墨市匪絶往來衡麓舟鮫皆除守禦故得填郊溢郭擊轂摩肩竟敦廉讓之風驟睹樂康之俗閩越之境江海通津帆檣蕩漾以隨波篙楫崩騰而激水途經巨浸山號黃崎怪石驚濤覆舟害物公乃具馨香黍稷薦祀神祇有感必通其應如響祭罷一夕雷震暴雨若有冥助達旦則移其堅險別注平流雖畫鷁爭馳而長鯨弭浪遠近聞而異之優詔奬飾乃以公之德化所及賜名其水為甘棠港神曰顯靈侯與夫召神人以鞭石驅力士以鑿山不同年而語矣於戲辨真金於大冶認徑草於疾風不有良臣誰康澤國尋就加平章事檢校右僕射如故腰懸相印手握兵符益壯軍聲彌新殊渥又改光祿大夫檢校司空轉特進檢校司徒然而物議輿詞功厚賞薄以為爵祿未稱疇庸於是異姓分封仍加井邑轉檢校太保琅琊王食邑四千戶食實封一百戶公之仲兄審邽自守泉郡一紀於茲黠馬皆調疲人盡泰公性惟雍睦氣稟中和韻契塤箎政侔魯衛可謂高明輝映超絶一時者也公以天下兵馬元帥太尉中書令梁王勳格穹昊德服華夷奉大國之歡盟為列藩之表率令節度都押衙程贇及軍州將吏耆老等久懷化育願紀功庸列狀上聞請議刊勒元帥梁王以公如河誓著匪石情堅纍貢表章顯陳保證朝廷冀宏誘勸特示褒揚將建龜趺合徵鴻藻兢謬居清列曾乏雄文頃歲嘗詠皇華往宣宸旨已於視聽親飫徽猷今之執簡濡毫得以研精覃思備陳懿績實無愧詞乃作銘曰日月麗天舟楫濟川內外克乂股肱惟賢淮水長清緱嶺方寧慶隨祚遠材為時生伯氏雄特泉人仰德求瘼斯勤頒條有則冠車被疾付以師律政教翕張士庶寧謐懿彼閩越帥實英傑地列周封心馳魏闕聖澤汪洋元戎啓行有典有則為龍為光高懸秦鏡理道自靜比屋懷仁連營稟令航海梯山貢奉循環務其輸季毌憚險艱周征之術公田什一約以有程守而勿失輕徭薄賦謳歌載路高掩龔黃遐追召杜鄉校皆遊童蒙來求雅道靡靡儒風優優惟虺吹毒久依山谷罔恣陸梁竟欣柔服法宮梵宇勝因所主崇構斯精福慶攸聚佛齊諸國綏之以德架浪自東驟山拱北墜簡遺編繕寫精研麟臺矗爾虎觀森然畚鍤其勤雉堞連雲永制爾敵用壯我軍關譏不稅水陸無滯遐邇懷來商旅相繼黃崎之勞神改驚濤役靈祇力保千萬艘劉驥荀龍塤箎雍雍維邦維翰以侯以公元帥梁王虎步龍驤挺彼七德削平四方公能事大推心斯在風雨無渝歲寒不改殊勳茂績盡瘁宣力國之丹青邦之柱石位冠台鼎任隆兵柄重以徽章寵分異姓優詔銘功萬古英風貞珉是勒垂之無窮法師諱朗字闕一字智俗姓王氏其先周靈王子闕四字鄴城生也闕一字祖惟禰芬馥旃禪師生闕一字神闕三字塵濁年七歲投大慈寺主大德起法師闕三字誦維經闕三字至年十二屬大唐太宗闕一字武聖皇帝廣闢度門闕蒙闕四字弱冠闕三字支依本寺曇源律師習毗闕一字業業闕一字之後又闕一字慈潤寺主大德智神論師學闕二字雲闕一字復進學闕一字摩金剛般若并中觀等三經二論闕二字源流闕二字激揚或研精默識加以純之闕一字一分闕一字溫於闕一字易焰元文方同三絶老莊素問博泛㣥闕一字持金剛般若及尊勝咒等各二萬遍文梵音轉闕一字首出緇闕一字春秋六十有八夏踰卌闕二字訖於闕一字安二年六月五日蛻遷識蓋闕一字大闕一字云逝孰不悲傷門徒大雲寺僧元果靈泉寺僧元晤元暉等攀慕慈誨思報莫由遂於州西南六十餘里本寺闕一字懸壁山之陽起塔供養粵以三年十月草五日闕二字永畢塔內便造以彌勒像一鋪圖形奉侍闕二字事闕三字以跡宣敬託雕刊乃為銘曰子晉之後命氏為王風流遠派爰宅真章父功祖德令聞令望降生才子玉質金相而樹來白而花繡黃稻闕一字夙被檀闕一字早芳經泉折玉戒海浮香迦旃妙教羅革鳴莊嚴壇闕一字頂捨筏金剛講誦無怠無荒積誠闕三字心自彊中宗懸解外法通方歌唄特妙唱導尤長以闕三字南北宏揚胚胎有裕利樂無闕一字鞅闕一字早闕一字輪脫輻消殿推闕一字粵有子尚闕一字師剛披山建闕一字剖石開堂敬闕一字來聖勒廟傍身命有闕一字供侍無忘安厝既畢銘頌攸彰裨同遵於大道庶共闕三字常君諱興字文起南陽西鄂人也漢太史衡之胄昔靈表西豐留侯建帷幄之策星移東井常山興締搆之功或師範萬乘照彰圖籍光臨千里煥炳縑緗異動三台識司空之忠烈吟謠兩穗表太守之仁明奕葉簪裾蟬聯圭組規矩重謺代有人焉緬究遺編可略而言矣曾祖瓘魏冀州信都縣令絃歌不奏美化洽於一同鳴琴詎張仁風清於百里祖虔周太僕寺主簿才能幹濟智略強明尋見辟除轉授瀛州河間縣令父才隋揚州江都縣丞輔弼風規俗流清化贊導名教邑致歌謠君系高華等琨珸之良劍箕裘纂組若青邱之祥鸞義烈因心未資於典籍忠良天縱不假於規模崇有道之林宗慕無移之闕二字道契虛元性符高尚縱寂寥而賞趣特淡泊而怡神志道研精非由鼎食窮微盡要詎徇輕肥得性琴書吟嘯煙霞之表時談物義進退木鴈之間妙榮期高符黃綺時遊三徑乍撫一絃以道義而為尊輕蟬冕而非貴探賾幽隱迥邁莊惠之機致遠鉤深遙鉗黃老之趣想秦晉之有近見潘楊之代親遂婚於辰州辰溪縣令漢陽趙徽之女幽閒婉嬺中饋聿修懿淑溫和母儀庭宇君纂業成勞遇揚雄之痼疾淫書作瘵遭皇甫之沉疴氣擁膏肓疾纒腠理屬華他而不愈見扁鵲而無瘳以貞觀草二年七月草二日歹卒於私第春秋六十有二夫人趙氏歹卒於永徽四年春秋六十粵以龍朔元年歲次辛酉十月癸亥朔草三日乙酉合葬於故鄴城西禮也面平原背漳浦左帶蕪城右連林麓刊茲元石紀以清徽勒彼鴻名光斯泉戶庶使青山為礪表盛德而彌芳碧海成田闡家聲而不泯嗚呼哀哉乃為銘曰規矩重謺圭璋代映三台表異兩歧興詠人倫楷模搢紳龜鏡百代逾芳千齡彌競道合幽元性符林壑迹齒滄波名流臺閣貴不充詘賤不隕穫思巧雕龍光逾刻鸖有謂升堂相期入室帷簿猶空繁華未實倏忽不幸咄嗟已失一棺猶閉萬事長畢苕蕘壟首山麗崺山足露銷草翠風飛樹緑元門一掩寒燈無旭私壤式題貞芳載燭準字不欺乾寧中舉進士荊南節度使成汭辟為推官後為汭所殺臣門非冠蓋家本軍戎親朋之內盱睢為人報怨昆弟之間點染無處求生背故國以狐疑望鄰封而鼠竄名非霸越乘舟難效於陶朱志切投秦出境遂稱於張祿又云成為本姓郭乃冒稱本避犯禁之辜敢歸司寇別族受封之典誠愧諸侯伏乞聖慈許歸本姓洎梁開平元年以翰林學士擢兵部尚書知貢舉二年以兵部侍郎兼鹵簿使近代設詞科選胄子蓋所以綱維名教崇樹邦本者也曩時進士不下千人嶺徼海隅偃風嚮化近歲觀光之士人數不多加以在位臣僚罕有子弟就其寡少復避嫌疑實恐因循漸為廢墜今在朝公卿親屬將相子孫有文行可取者請許所在州府薦送以廣育才之義珽字公度隴西燉煌人僖宗朝舉進士纍拜左補闕梁祖即位為左諫議大夫兼宣徽副使友圭之亂除右散騎常侍充侍講學士內討之日為亂兵所傷卒澤宮舊典相圃遺法實備多儀亦彰異數至若一日之澤息物休農四牡既朝勞勤式宴於是取像貍步設廣庭之禮物載張獸侯量下綱於地武射之義也豈直主皮神則憑焉必俟工祝羞酺醢之嘉薦陳警戒之順辭或中鵠而升則實爵以獻終乃示其慈惠庶將強其飲食正依經理寧畏簡書爰詢柏署之言未達梓人之職甲之不伏可謂守官
