front:
  text: 全唐文欽定全唐文卷六百八十四良器德宗朝右司郎中
  hash: sha256:84fe357ca2cabbd79643b786b80e390e9b9f4d1f26672c17b5dd0776e94a1880
  markers:
  - {type: head, offset: 14, content: 獨孤良器, id: KR4h0168_NFKB_684-h1, level: 1}
body:
  text: 皇上御寶歷之惟新闡乾符發坤珍德被華夷敷雲雨之廣澤恩及飛走含天地之全仁乃却走馬以反素斥馴象而不異非耳目之可役同寶玉之遐棄放之於無人之境歸之於不毛之地或㣥或友伊飲齕之無虞載寢載興信生成之自遂解網之惠無聞放麑之仁克類然後以儒為林毓賢哲以為禽以道為囿利忠良以為獸亮功格於人神至德齊於宇宙是由化與澤俱仁與道符賢為其寶太康之訓不作獸用不擾虞人之箴遂無徇物之情允著好生之德式孚可以順天然可以遂亭育既絕燧尾之患不虞焚身之戮去狂顧於人寰徇野心於林麓伊昔漢氏惟其晉家焚雉頭之裘於前殿却千里之馬於後車猶自颺休垂美有聞無譁况我一人溫恭允塞本忽之而勿營非欲之而復抑徃籍之所未覩前王之所不克誠可以懷四夷柔萬國者也郁德宗朝尚書左丞禘祫之禮殷周以遷廟皆出太祖之後故得合食有序尊卑不差及漢高受命無始封祖以高皇帝為太祖太上皇高帝之父立廟享祀不在昭穆合食之例為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其高皇太皇處士君等並為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西潁川等四府君亦為屬尊不在昭穆之列國家誕受天命累聖重光景皇帝始封唐公實為太祖中間代數既近在三昭三穆之內故皇家太廟唯有六室其宏農府君宣光二祖尊於太祖親盡則遷不在昭穆之數著在禮志可舉而行開元中加置九廟獻懿二祖皆在昭穆是以太祖景皇帝未得居東向之尊今二祖已祧九室惟序則太祖之位又安可不正伏以太祖上配天地百代不遷而居昭穆獻懿二祖親盡廟遷而居東向徵諸故實深所未安請下百寮僉議謹案孝敬皇帝忌不廢務伏以讓皇帝位非正統親則旁尊詳考舊章合同孝敬其忌日廢務請罷乃者宗子名御皆云皇某親行於文疏曹署此非避嫌自卑之道也謹按儀禮曰諸侯之子稱公子公子不稱先君公子之子稱公孫公孫不得祖諸侯此自卑別尊之道也又禮記公君有合族之道族人不得以其戚戚君位也鄭元注云族人皆臣也不得以父兄子弟之親自戚於君位謂齒列也所以尊君別嫌今宗子若以皇字為稱首從數為序親誠非卑別尊不戚君位之義又按儀禮從父昆弟即今同堂也從祖昆弟即今再從也族昆弟即今三從也聖朝方崇敦敘宜辯等威其三從內伏請依舊其餘各以祖禰本封為某王公子孫則親疎有倫名理歸正郊字東野湖州武康人年五十始第進士調溧陽尉鄭餘慶鎮興元奏為參謀卒年六十四張籍諡之曰貞曜先生道德仁義天地之常也將有人主張之乎將無人主張之乎曰賢人君子有其位言之可以周天下而行也無其位則周身言之可也周身言之可周天下言之不可也仲尼當時無其位言之亦不可周天下而行也及至著書載其言則周萬古而行也豈惟周天下而已哉仲尼非獨載其言周萬古而行也前古聖賢得仲尼之道則其言皆載之周萬古而行閣下道德仁義之言已聞周天下誦之久矣其後著書君子亦當載之周萬古而行也幸甚幸甚道德仁義之言天地至公之道也君子著書期不朽亦天地至公之道夫何讓哉是故不以道德仁義事其君者以盜賊事其君也不以道德仁義之衣食養其親者是盜賊養其親也閣下既以道德仁義事其君聞之天下久矣小子願求閣下道德仁義之衣食以為養也謂之中庸之道謂之中庸則敢求也謂之特達則不敢求也小子嘗衣食宣武軍司馬陸大夫道德仁義之矣陸公既沒又嘗衣食此郡前守吏部侍郎韋公道德仁義之矣韋公既去衣食亦去道德仁義顯其主張謹載是書及舊文又有子遇之書同乎緘獻輕重可否傾一言陳謝誠冀於異日不宣郊再拜天之與人一其道也天地不棄於人人自棄於天天可棄於人乎曰不可人自棄也已曰人皆棄之乎曰賢人君子不棄也凡人棄之可天有殺物之心而無棄物之心則萬物莫能生矣是故君子之於萬物皆不棄也而况於身乎棄其身是棄其後也棄其後是棄其先也故曰君子之道豈易哉敢不法天而行身乎所以君子養其身養其公也小人養其身養其私也身以及家家以及國國以及天下以公道養天下則天下肥也以私道養天下則天下削也養身之道豈容易哉養其公者天道養也養其私者人情養也以天道養其人則合天矣以人情養其人則不合天矣以人情養其人自棄矣天道質也人情文也天道靜也人情動也質者生之侈也靜者生之得也動者生之棄也文不以質勝之則文為棄矣動不以靜制之則動為棄矣天者水之謂也人者魚之謂也魚棄水則螻蟻得之矣人棄天則疾病得之矣魚可安於水而不可翫於水其失也在乎恣波浪而不迴也人可安於天而不可翫於天其失也在乎恣嗜慾而不迴也所謂安於天者法天之味而食之食不違於四時也法天之聽而聽之聽不違於五節也法天之明而視之視不違於五色也食與視聽苟違於天則疾病得之矣故曰君子法天而行身也小人翫天而棄身也書之座右嵇康猶有所棄秦之醫和晉之杜蒯其亦不書於右則何以為君子之座哉良藥苦口也苦口獲罪於人苟或有矣仁義之獲罪於天未之有也恩養下將遠辭違書寫至誠之言不勝惶悚之甚不宣郊再拜貌是古印言是空音在酒不飲在色不淫非獨僧禮亦使儒欽感此補亡書謝懸金巖德宗朝禮儀使判官司門郎中墳墓之義經典有常自古至今無聞異制層甎起塔始於天竺名曰浮圖行之中華竊恐非禮况肅王天屬名位尊崇喪葬之儀存乎簡冊舉而不法垂訓非輕伏請準令造墳庶遵典禮謹按大唐開元禮五服制度婦為舅姑及女子適人為其父母皆齊衰不杖周稽其禮意抑有其由也蓋以婦人之道以專一不得自達必繫於人故女子適人服以夫斬而降其父母喪服傳曰女子以適人為父母何以周也婦人不二斬婦人從人無專用之道故未嫁從父既嫁從夫夫死從子父者子之天也夫者妻之天也先聖格言歷代不易以此論之父母之喪尚止周歲舅姑之服無容三年且服者報也雖有加降不甚相懸故舅姑為婦大功九月以卑降也婦為舅姑齊衰周年以尊加也其父母舅姑除變之節十二月小祥除腰絰十三月大祥除衰裳去絰十五月而禫踰月復吉紳官寧國令夫人姓周氏其先汝南人也爰自炎漢達於有唐綿歷衣冠其來尚矣曾王父府君珪皇承務郎勅授薊州三河縣令王大父府君歸皇宣德郎試左贊善大夫賞緋魚袋兼上柱國王父君彥皇彭城郡高望府折衝賞緋魚袋兼上柱國皆業崇儒行世繼簪組閭次門慶逾長夫人則折衝府君之長女幼年貞柔至性純孝凜乎正氣賢行自天雅量絕儔風期難並適佐君子令淑尤彰雍睦承家母儀增書是以闕儉恭聞惠和不以鉛粉益容但以禮節資德時貞元辛巳歲寢疾終於莫亭集賢里之私第伏枕逾月醫無所為以其年五月十三日奄從於化享年四十八嗚呼天命數盡生也有涯哀哉哲人何為不壽瑤琴絕聽寶鏡休窺珍玩滿室莫之能守親戚彌切痛無偕老之期歧路感傷嗟有懷仁之德以其年冬十一月八日卜兆於鄚城東南二十五里世業原平之禮也雲結長川風悲草樹嗣子操次子模並殘骸毀容能竭孝道慮恐陵谷將變歲序將遷刊石紀時其銘曰郡城東南兮滹水湄歲徃月來兮無盡期明明寒月兮對孤壠蕭蕭白楊兮風吹偕秘書監乂子以父任歷右拾遺史館修撰轉補闕主客郎中累遷太常少卿公元和二年四月以監察御史選充翰林學士未幾改主客員外郎依前充學士逾年轉司勳員外郎來年改本司郎中依前充學士自始直內署周旋凡五年不獨以文章號令為應職意欲極直諫之道開天子之耳目致生人於仁壽以為巳任是時因抗言論事面命授中書舍人賜之金紫時憲宗固以為南司大用矣不逾年自戶部侍郎遂平大政其後二十年間崇踐中外卒以剛鯁致姦凶之大禍大中初有詔史官差第元和間相臣五人將臣五人將命圖形以補凌煙二十四人之次有司即以公之名跡列在選中及上奏獨公之名畱中不報噫自古忠臣不得其死者自兩漢王嘉李固至西晉張華如國朝褚河南裴河東之類剛毅不回有類公之遺烈於公之生今中執法夏侯公乃授余以公平生所論諫凡數十事其所爭皆磊磊正直臣風㮣讀之者令人激起忠義自始內廷迄於罷相次成七篇著之東觀目為李相公論事集下以楷模於後代上以顯元和聖后納諫之德昇平之運可惜其致云爾大中五年辛未歲冬十月史臣蔣偕序諫德宗時人為劉晏屬吏臣某言伏以大行皇帝導揚天命付陛下以宗社託陛下以殷憂俾抑情以順人節哀以聽政伏惟皇帝陛下哀思至孝與天罔極不忍遵奉喪過乎哀㣥臣上陳未蒙降允荒迫之至不知所措伏以上天降禍率土號慕哭泣之哀喪紀之節凡在臣子所宜同哀豈合此時再三陳請但四郊尚有師旅萬國未登和平衆事從宜兆人思理當通變之日非慕已疑之時陛下臨之浹辰則雍熙可覩廢之一日則憂慮或生所以遺旨殷勤俾三日而聽政非欲抑陛下至哀之情蓋為社稷萬人之計不得不爾也臣聞周稱成康漢稱文景咸為至理之主百王則而象之然成王有顧命康王翌日而踐祚文帝著遺令景帝釋服而視朝夫豈無私懷為至公抑也伏惟陛下省當時安危之理順普天延企之望睿謀光於八葉成天子不匱之孝答先聖乃眷之情凡在生靈孰不悲戴臣等時逢繼聖位忝通班犬馬之心不勝哀懇臣某言臣聞先王立禮所以安邦國定社稷也帝王喪制之義古今損益不同蓋時有安危禮有沿革當萬邦無事可以諒闇屬百度思理固當節哀時殊事異不得不然至於罔極之情孝思之感皆由率天性隱痛深焉或不在喪服之輕重臨朝之遲速也臣謹案孝經云事天明事地察德教加於百姓刑於四海蓋天子之孝也又禮中庸曰武王周公其達孝乎夫孝者善繼人之志善述人之事者也臣等伏考前典保寧家邦嚴薦胙於九廟流慶祚於萬葉此所謂繼先皇之志也哀痛既徃經營將來致干戈於不用登兆庶於壽域此所謂述先皇之事也陛下倘忘此二者未忍哀情固違百辟之誠請不咨前王之故實其若天地宗廟何其若萬方四海何臣等位忝班行同國所戚不任哀迫之至臣某等言昔袁盎以漢文孝過於曾參臣今伏以聖情之慟過於漢文遠矣凡在㣥下孰不歸仁臣等荒迫之中竊有所感伏以大行皇帝深惟天下之重憑几顧命俾陛下三日而聽政今熙熙萬國企聞王言已七日矣而御哀永慕未忍抑從尚可謂奉先皇之旨行天子之孝乎大行皇帝封植萬邦傳之陛下屬艱難之運當金革之辰庶務權宜懸於晷刻如或一夫不獲一事不理雖陛下心同大舜跡齊武丁豈可謂負荷祖業永利兆庶之望也臣等荒愚未見其可所以前後三表血誠上請祗冒宸扆戰越伏深無任憂戚之至安定梁肅字敬之學止觀法門於沙門元浩其未知也患不能知之既知之患不能至之於是作心印銘蓋几杖盤盂座右之類取其自省也其文自浩浩㣥生至有無云云言未知也自本則不然至終篇言其既知也以既知之心印其未知號曰心印銘大抵與經論合而歸於無相庶乎哉諫獲與敬之遊又嘗聞浩公之言故序其所由然著於銘之首云中書侍郎平章事高陽齊公昔遊越鄉閱翫山水者垂三十載初棲於剡嶺後遷於玉笥自解薜此山未二紀而登台鉉乃施舊居之西偏為昌元精舍其東偏石傘巖付令弟秀才推俄而中書即世推高尚之致文行之美與伯氏相侔至元和九年秋九月七日浙東廉使越州牧兼御史中丞楊公洎中護軍王公率僚佐賓旅同遊賦詩紀登覽之走耳乚小子承命序其梗㮣以冠篇竊謂斯地也斯文也必傳於後世與蘭亭東山俱為越邦之不朽者矣開元天寶間天下戶千萬至德後殘於大兵饑疫相仍十耗其九至晏充使戶不二百萬晏通計天下經費謹察州縣災害蠲除振救不使流離死亡初州縣取富人督漕輓謂之船頭主郵遞謂之捉驛稅外橫取謂之白著人不堪命皆去為盜賊上元寶應間如袁晁陳莊方清許欽等亂江淮十餘年乃定晏始以官船漕而定吏主驛事罷無名之斂正鹽官法以裨用度起廣德二年盡建中元年黜陟使實天下戶收三百餘萬王者愛人不在賜與當使之耕耘織紝常歲平斂之荒年蠲救之大率歲增十之一而晏猶能時其緩急而先後之每州縣荒歉有端則計官所贏先令曰蠲某物貸某戶民未及困而奏報已行矣議者或譏晏不直振救而多賤出以濟民者則又不然善治病者不使至危憊善救災者勿使至賑給故賑給少不足以活人活人多則闕國用國用闕則復重役矣又賑給近僥倖吏下為姦彊得之多弱得之少雖刀鋸在前不可禁以為二害災沴之鄉所乏糧耳它產尚在賤以出之易其雜貨因人之力轉於豐處或官自用則國計不乏多出菽粟恣之糶運散入村閭下戶力農不能詣市轉相沾逮自免阻饑不待令驅以為二勝晏又以常平法豐則貴取饑則賤與率諸州米常儲三百萬斛豈所謂有功於國者耶侹字庶中元和中為荊南從事玉泉寺覆船山東去當陽三十里疊障迴擁飛泉迤邐信途人之淨界域中之絕景也寺西北三百步有蜀將軍都督荊州事關公遺廟存焉將軍姓關名羽河東解梁人公族功績詳於國史先是陳光大中智顗禪師者至自天台宴坐喬木之下夜分忽與神遇云願捨此地為僧坊請師出山以觀其用指期之夕前壑震動風號雷虩前劈巨嶺下堙澄潭良材叢木周匝其上輪奐之用則無乏焉惟將軍當三國之時負萬人之敵孟德且避其鋒孔明謂之絕倫其於殉義感恩死生一致斬良擒禁此其效也嗚呼生為英賢歿為神靈所寄此山之下邦之興廢歲之豐荒於是乎繫昔陸法和假神以虞任約梁宣帝資神以拒王琳聆其故實安可誣也至今緇黃入寺若嚴官在傍無敢褻瀆荊南節度工部尚書江陵尹裴均曰政成事舉典從禮順以為神道之教依人而行禳彼妖昏祐我蒸庶而祠廟墮毀廞懸斷絕豈守宰牧人之意也耶乃令邑令張憤經始其事爰從舊址式展新規欒櫨博敞容衞端肅唯曩時禪坐之樹今則延袤數十圍夫神明扶持不凋不衰胡可度思初營建之日白龜出其新橋若有所感寺僧咸見亦為異也尚書以小子曾忝下介多聞故實見命紀事文豈足徵其增創制度則列於碑石貞元十八年記古武陵封壤所至湘岳辰澧皆附庸之部楚辭載涔陽羅江即其證也今俗豪家多嗜書知敬殆黔中遺風不絕者歟東漢光武二十五年駙馬都尉梁君松平五溪名郡廨置漢壽城即荊州刺史所治地有陽山神祠直上千仞橫袤三峯紅崖青壁赩若彩繢日月迴薄仙馭徃來沉沉洞官孰詳突奧昔王郎新志謂雲夢之神夏首獻魚訖於秋分魚潮之初㣥彙各異網罭雖設無能獲者至今洞庭餘艎若遭迅風靡不卬首求請多獲利濟頂上有池下漻山麓即書沱潛之源驗在茲矣故此邦之人是依是憑用介景福余嘗以楚山為天下絕若陽山者又此無倫亭亭孤標迥出天外彰善癉惡猶影響焉永貞元年沅水泛溢壞及廬舍幾盈千室生人禽畜隨流逝止明年雲漢為厲稼穡之土斂為負租三年旱彌深郡牧遍走無訴俗不可以終否故良牧宇文公得以肆力焉公名宿字元明始至之日巷鮮居人有獸奔禽駭之勢公感憤激衷誓拯焚溺請於廉使條白上聞詔使臣錫以廩粟公申布聖澤遍問里閭逮斑白稚齒延頸仰給皆聯聯鼓舞喜得生活公乃詢於衆曰山澤之神利及物者安在合禱祈之矧喦喦陽山此地之望某雖寡德敢不先謁焉迺沐浴致齋斂咎薦誠再拜而後祝曰惟人神之本今人若墜冰谷時歟事歟曷不可歟今彫喪殆盡而神不恤使清淩全州鞠為茂草豈獨予之辜抑神之宿謬當朝廷分憂之寄嘗懼丹懇不達以速官謗惟神降鑒明聽予言余或不虔不恪余將勵精勵志勤以勸人敢徼肹蠁之福音動左右禮無媿詞自時厥後一晴一雨皆符郡人小大之望財若天雨流庸半還食菽飲水室家相保穜稑所產集為有年乃聚族謩曰良牧之仁通於神明無有窮已噫詩不云乎愷悌君子人之父母仁遠乎哉且又神祇昭答如此而不思有以報乎乃相與繕修祠屋整頓睟容想像如在共旌陰隲之感庶展麾縣之敬願公壽考禔福穰穰庶渤海潁川異時為並駕齊驅云先生名寀天水人蟬聯戚屬才為時選再登憲府三領大郡不樂進取機密求出為武陵相聞桃源有黃君瞿童之事甘心而請學焉黃君欣然留公秋分中夜授以洞神正一券云蒼崖沉沉如交杳冥羽節繽紛徃來無聲黃悚異命公為記時淮將跋扈朝議以正人涖之可使遷善傳召公為申州刺史公將命始至敷陳王綱誘諭忠節然察其惡稔亦以上聞渠兇愈怒鑿空構禍初貶韶陵怒猶未厭逗遛不遣再貶韶州司戶參軍獲脫虎口矣於是忠賢失志長蛇肆毒天子念公之勤重惟險阻詔還恩降造膝面拜汝州刺史錄前効也為節將挾忿奏替改授澧州刺史澧人熙熙如蒙春陽星歲七稔里俗丕變公將償宿心方圖別墅居無何轉吉州刺史公乃歎曰夙奉道牙志期修進而流年不待齒髮將暮湛恩稠疊恐遂無報乃上言乞以皇帝誕慶之辰度為武陵桃源觀道士永焚香火庶竭涓埃之力少酬亭育之報優詔襃美賜號遺榮仍宣付史館以尚賢也朝右詞臣歌詩頌德者凡百餘首嘗試論之太上有立德立功之道是使君子步驟而不敢懈五秉之粟七鍾之祿亦固爭之安有視青綬蒼玉為泥土指丹霄白雲為枕席者乎噫心願已諧而降年不永謝安石所以長太息於舟中矣以貞元七年十一月三日順化於鍾陵宗華觀甲子三百九十有八天下嚮道之士無不泫然出涕僉云聖唐敷道德之教垂二百年能以進退出處消息無累者惟稽山賀君桃源閽君兩人而已漢庭二疏不至於道烏足云云迺相與諡為貞範先生從古義也贊曰大道既隱百氏紛昏爰有黃庭孰知其門於惟先生金華玉英解綬乞身誓遊三清上惜其才難奪其誠乃寵嘉號是曰遺榮蒼蒼桃源煙巖盤盤上有洞宮下有星壇醮火既明羽斾珊珊跪授玉書列為真官東海三秀西山五色老萊近名嵇康寡識曷若先生臨爐自得陽巡陰轉三十有六賸魂遺形古仙同域浮山舊侶梗㮣微德仲方韶州始興人貞元中擢進士登宏詞補秘書省正字調咸陽尉為邠州從事歷侍御史倉部員外郎文宗朝官至秘書監累加銀青光祿大夫封曲江縣伯開成二年卒年七十二贈禮部尚書諡曰成披流沙之至寶惟良金而可求諒稟質以相混信韜光而莫儔處其汙而含潔潛其剛以產柔將陶甄以入用在晶熒而必收爾乃發彼衆彩瑩然祕寶砂礫之下自守其堅剛茫昧之中我得其精好遠邇必取纎微罔遺泛隤沲以吐色洗蒙垢以成姿匪塵泥之足亂豈玉石以生疑既乍明而乍滅在沙之而汰之同至人受汙以不吝等君子藏光以俟時且流形厚地晦質元造厥貢取戒於不貪旁求必歸於有道然後百寶惟斥三品惟崇美價初炫微明內融晦沉潛而不雜秉熠爚以潛通將耀質而有異豈藏山之與同鑑裁無疲期必分於醜好拂拭相借固不假於磨礱俾精鍊以作範庶從革以成功亦何異夫才為物表道出常途標百行以卓爾摛繁文而煥乎每和光而不昧居衆流而有殊善惡由茲必分真偽於焉可辨雖知已而見錄本良工而妙選將永隔於下流且不遺於片善故明因特達道靡邅迴乍披之而可玩亦求之而乃來同無脛而斯感豈衆口以為猜今振藻以作賦而愧乎擲地之無才古者易名請諡禮之典也處大位者舉其巨節蔑諸細行垂範當代彰示後人然後書之垂於不朽善善惡惡不可以誣故稱一字則至當焉舉一事則至明焉定襃貶是非之宜泯同異紛綸之論贈司徒吉甫稟氣生材乘時佐治博涉多藝含章炳文燮贊陰陽經綸邦國惜乎通敏資性而便媚取容故載踐樞衡疊補台衮大權在已沉謀罕成好惡徇情輕脫寡信諂淚在臉遇便則流巧言如簧應機必發夫大臣之翊戴元后者端俗致治孜孜夙夜緝熙庶績平章百揆兵者凶器不可從我始及其伐罪則料敵以成功至使內有害輔臣之盜外有懷毒蠆之孽師徒暴野戎馬生郊皇上旰食宵衣公卿大夫且慙且恥農人不得在畝紡婦不得事桑耗賦斂之常貲散帑藏之中積徵邊徼之備竭運輓之勞僵尸血流胔骼成岳毒痛之聲號訴無辜勦絕㣥生逮今四載禍胎之兆實始其謀遺君父之憂而豈謂先覺者乎夫國之論大功者不可以妄取不可以枉致必咨籌畫乃著丕顯不競而分豈妨全美當削平西蜀乃言語侍從之臣擒剪東吳則訏謨廊廟之輔較其時則有異言其力則不倫何乃捨其所重而錄其所輕存其所小而畧其所大且奢靡是嗜而曰愛人以儉授受無守而曰慎才以輔斥諫諍於外豈不近之蔽聰乎舉忠烈之廣豈不近之匿愛乎焉有蔽聰匿愛家範無制而能垂法作程憲章百度乎謹案諡法曰敬者夙夜儆戒曰敬書曰敬明乃訓易曰敬以直內內而不肅何以形於外憲也者刑也法也戴記曰憲章文武又曰發慮憲義以為敬恪終始載考歷位未嘗劾一法官讞一小獄及居重位以安和平易柔自處考其名與其行不類研其事與其道不侔一定之辭惟精審慎異日詳制貽諸史官請俟蔡寇將平天下無事然後都堂聚議諡亦未遲謹議傳師字子言禮部員外郎既濟子貞元十年進士登制科乙第寶歷中累官尚書右丞歷江南西道觀察使轉宣歙池觀察使入為吏部侍郎太和元年卒年五十九贈尚書臣聞乾坤定而上下分矣至於播四時之候遂萬物之宜在驗乎妖祥之二氣祥氣降則為豐為茂妖氣降則為沴為災君臣立而卑高隔矣至於處神明之奧詢獻納之辭在審乎邪正之二說正言勝則為忠為讜邪言勝則為讒為諛故詩云萋兮斐兮成是貝錦刺其組織之甚巧也語曰邪徑敗良田讒口亂善人惡其莠言之蠧政也蓋謂似信而詐似忠而非便便可以動心捷捷可以亂德豈止鶗鴂彫卉薏苡惑珠者哉况立國立家自中徂外道偏則刑罰不中讒勝則忠孝靡彰逖覽前聞緬思近古招賢容鯁遠佞嫉邪慮之則深防之未至伏惟睿聖文武皇帝陛下垂衣御宇化洽文明謨猷博訪於搢紳旌賁屢臻於巖穴尚復廣四目周四聰制理皆在於未萌作範將垂於不朽乃詔掌文之臣令狐楚等上自周漢下洎隋朝求史籍之忠賢罹讒謗之事迹敘瑕釁之本末紀謠諑之淺深編次指明勒成十卷昔虞舜有堲讒之命我皇修辨謗之書千古一心同垂至理將俟法宮退日昃之政別殿備乙夜之觀則聖慮先辨謗何由興上天不言而民自信矣茂元濮州濮陽人德宗時上書自薦擢試校書郎太和中檢校工部尚書嶺南節度使遷涇原節度使封濮陽郡侯召為將作監領陳許節度使會昌中徙河陽卒贈司徒諡曰威右臣得所由狀報吐蕃請於鳳翔交馬者臣伏以吐蕃衆則犬羊心唯虵豕不思率服但逞姦欺國家務以懷柔極其撫御敦惠好於非類擇使命於本朝容養甚宏錫賚非薄昔魏酬倭國止於銅鏡鉗文漢遺單于不過犀毘綺袷並一介之使將萬里之恩豈若陛下選彼周行取於宗屬而敢淹停曠日畱止彌年久已迴車又請交馬視其詭詐難以保明深算機宜未可容許臣又見蕃中來人說云其首領素己年侵更兼心疾不恤其衆連誅舊臣差徵無時凶荒累歲以此遂違盟約仍致逗遛今恐事出多端致由㣥下上欺聖德旁損廟謨翻覆難知善惡未決竊計君奕合有表章伏望更勅㣥臣商量且命界首止絕儻須存遠馭要示殊恩但言彼蕃來徃不時邊將奏論甚切亦無妨國體未阻戎心臣自擁節旄亟諭星館修器械蓄積良儲又時巡訪川原討尋蹊隧每當衝要必有隄防增築故城穿濬新塹徧箱鹿角未易可當木柹魚膏不曾虛棄雖臨搖落免有寇攘忖彼物情未能闕一字衆其若便侵亭障自起烟塵臣且率勵當軍猶可獨當一面况其隣道悉是強兵敢忘充國之請行不慮張宗之辭難伏乞聖恩鑒臣鐵石納臣芻蕘使其畏懾威靈挫平姦宄臣不勝憤激懇迫之至按史記本傳及圖經先生秭歸人也姓屈名原字靈均一名平字正則本實楚之苗系大父瑕受屈為卿遂以命氏先生義特百夫文橫千古其忠可以激俗其清可以厲貪仕楚為三閭大夫屬君懷不惠與靳尚等夷尚嫉原才譖漏憲令構成釁狀錮絕恩私由是忠言如風不入主聽險黨若鐵斥為窮人始楚與齊連衡以弱秦秦以商於之地六百里為河外五城以餌楚楚嗜張儀之紿不納先生之諫子蘭鄭袖內於朝虵秦豕齊外披封畧原為放臣王卒客死離騷始作徒冀幸君之一悟汨羅終赴痛皆醉而獨醒嗚呼忠在禍先功成罔貴洎成忠死世責何深蓋有國有家之所大病志士仁人之所悼嘆也嗟乎先生君辱身死周旋存歿之際感慨今古之心宜乎上與比干夷齊攜手作華胥羲軒之遊假靈於遺芳而困於佞幸者也安可為鼠肝蟲臂魚腴鼈跡而已哉元和十五年余刺建平之再歲也考驗圖籍則州之東偏十里而近先生舊宅之址存焉爰立小祠憑神土偶用表忠貞之所誕卓犖之不泯也銘曰麟出非時終困於人劍有雄鋩不用無神矯矯先生不緇不磷舉世皆醉抱忠沒身汨水悠悠言問其濱歸山高高獨揖清塵誕靈是所粵秭歸土義風敬承廟貌無睹庭而可修予期負弩死不可作余構其宇聳忠來者載陳清酤乞靈臧氏非愚所取已矣先生蘋誠其吐籍字文昌和州烏江人貞元中進士終國子司業古之胥教誨舉動言語無非相示以義非苟相諛悅而已執事不以籍愚暗時稱發其善教所不及施誠相與不間塞於他人之說是近於古人之道也籍今不復以義是執竿而拒歡來者烏所謂承人以古人之道歟頃承論於執事嘗以為世俗陵靡不及古昔蓋聖人之道廢弛之所為也宣尼沒後楊朱墨翟恢詭異說干惑人聽孟子作書而正之聖人之道復存於世秦氏滅學漢重以黃老之術教人使人寖惑揚雄作法言而辯之聖人之道猶明及漢衰末西域浮屠之法入於中國中國之人世世譯而廣之黃老之術相㳂而熾天下之言善者唯二者而已矣昔者聖人以天下生生之道曠乃物其金木水火土穀藥之用以厚之因人資善乃明乎仁義之德以教之俾人有常故治生相存而不殊今天下資於生者咸備聖人之器用至於人情則溺乎異學而不由乎聖人之道使君臣父子夫婦朋友之義沉於世而邦家繼亂固仁人之所痛也自揚子雲作法言至今近千載莫有言聖人之道者言之者惟執事焉耳習俗者聞之多怪而不信徒推為訾終無裨於教也執事聰明文章與孟子揚雄相若盍為一書以興存聖人之道使時之人後之人知其去絕異學之所為乎曷可俯仰於俗囂囂為多言之徒哉然欲舉聖人之道者其身亦宜由之也比見執事多尚駁雜無實之說使人陳之於前以為歡此有以累於令德又商論之際或不容人之短如任私尚勝者亦有所累也先王存六藝自有常矣有德者不為猶以為損况為博塞之戲與人競財乎君子固不為也今執事為之以廢棄時日竊實不識其然且執事言論文章不謬於古人今所為或有不出於世之守常者竊未為得也願執事絕博塞之好棄無實之談宏廣以接天下士嗣孟子揚雄之作辨楊墨老釋之說使聖人之道復見於唐豈不尚哉籍誠知之以材識頑鈍不敢竊居作者之位所以咨於執事而為之爾若執事守章句之學因循於時置不朽之盛事與夫不知言亦無以異矣籍再拜籍不以其愚輒進說於執事執事以導進之分復賜還答曲折教之使昏塞者不失其明然猶有所見願復於執事以畢其說焉夫老釋惑乎生人久矣誠以世相㳂化而莫之知所以久惑乎爾執事才識明曠可以任著書之事故有告焉今以為言諭之不入則觀書亦無所得為此而止未為至也一處一位在一鄉其不知聖人之道可以言諭之不入乃舍之猶有已化者為證也天下至廣民事至衆豈可資一人之口而親諭之者近而不入則舍之遠而有可諭者又豈可以家至而說之乎故曰莫若為書為書而知者則可以化乎天下矣可以傳於後世矣若以不入者而止為書則為聖人之道奚傳焉士之壯也或從事於要劇或旅遊而不安宅或偶時之喪亂皆不皇有所為况有疾疚吉凶虞其間哉是以君子汲汲於所欲為恐終無所顯於後若皆待五六十而後有所為則或有遺恨矣今執事雖參於戎府當四海弭兵之際優游無事不以此時著書而曰俟後或有不及曷可追乎天之與人性度已有器也不必老而後有或立者昔顏子之庶幾豈待五六十乎執事目不覩聖人而究聖人之道材不讓於顏子矣今年已踰之曷懼於年未至哉顏子不著書者以其從聖人之後聖人已有定制故也若顏子獨立於世必有所云著也古之學君臣父子之道必資於師師之賢者其徒數千人或數百人是以沒則紀其師之說以為書若孟子者是已傳者猶以孟子自論集其書不云沒後其徒為之也後孟子之世發明其學者揚雄之徒咸自作書今師友道喪浸不及揚雄之世不自論著以與聖人之道欲待孟子之門人必不可冀矣君子發言舉足不遠於理未嘗聞以駁雜無實之說為戲也執事每見其說亦拊抃呼笑是撓氣害性不得其正矣苟正之不得曷所不至焉或以為中不失正將以苟悅於衆是戲人也是玩人也非示人以義之道也泌河南洛陽人長慶中官臨汝令在下陵上昔賢所恥嚴法峻文平國不設是用敏於從事可以臨人必也允乎平反方堪議罰丁為小吏不慎厥躬未能謹恪以執謙恭之道縱是暴慢且招苛酷之名奉上有類於成操下乃同於東濕孽則自作罰實難逃雖欲文過引人無乃執迷於已行惲穆宗時人廖真干祿從班既處大夫之職立朝束帶須勤公正之心不著芳聲俄嬰罪累人非士師同展禽之三黜才異河陽若潘仁之再免既而巢鵀作釁止鵬成災膚腠乖宜初驚二豎之夢手足將啟終切九泉之悲眷彼禮容須依貴賤瞻言令式亦具科條有德乃合旌門無官誠宜易簀不思林放之問有昧曾子之儀憲局彈違實得其所
