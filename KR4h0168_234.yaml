body:
  text: 惟千秋之令節啟聖壽兮無疆詔百辟以高會挾宸歡而未央地勝樓闢天清氣涼禮容克備樂府斯張翕赫曶霍熒熒煌煌伊曠古之未有豈名言之得詳廼有殊伎特異呈材累至動不勤物用非假器觀夫立象蓋取諸意本自宮中之傳名為索上之戲掖庭美女和歡麗人身輕體弱絕代殊倫被羅縠與珠翠鋪瓊筵與錦茵其綵練也橫亘百尺高懸數丈下曲如鈎中平似掌初綽約而斜進竟盤姍而直上或徐或疾乍俯乍仰近而察之若春林含耀吐陽葩遠而望之若晴空迴照散流霞其格妙也窈窕相過蹁躚却步寄兩木以更躡有雙童而並騖還迴不恒踴躍無數驚駭疑落安然以住雖保身於萬齡恃君恩於一顧節應鐘鼓心諧律呂履冰谷兮徒云臨焦原兮虛語是時齊謳輟響趙舞掩色絲桐發而沮勢丸劍調而挫力方今寰海清太階平兵革不用兮國無征風雨既洽兮年順成上曰可樂人胥以亨大則有燾載之義小則無角抵之名固端拱而成理豈繫物而為程者哉卓絕之伎不為則巳為必陵㣥駭目駕俗驚耳觀透撞之兒信其然矣雲竿百尺繩直規圓惟有力者樹之君前僔僔就日亭亭柱天鬼魅不敢傍其影鵷鸞不敢翔其顛此兒於是跂雙足㦸兩臂踴身而直上若有其翅盡竿而平立若餘其地人以為難我以為易人以為恐我以為戲難中有戲戲中有難倒輕軀墜高竿如更嬴之鴈下空裏似蒲且之鶬落雲閒不識者謂之尚奇好絕自取其殘眼為之慘心為之寒怖甚虀粉之勢不敢仰看庸詎知所憑之竿暗相扶所恃之術私有準掩都盧其若無顧鷰戲而足哂屹然中駐餘勇不盡於時也解雀散鳥逃龍走魚跳劒臂折呪刀口呿一場之內獨雄雄如既而天眷偏及天顏賜喜曰其絕人有如此其服人有如此豈止投竿之兒抑由持竿之士持若不定或掉而或傾透雖自強何怙而何恃乃迴天札題其兩絕降天酒賞其雙美斯道也誠則小哉可以感於知己神慶貝州武城人舉明經武后長安中官太子右庶子封魏縣子神龍初坐前推張昌宗獄不實流欽州卒年七十後贈幽州都督臣伏思五品以上所以帶龜者比為別勅徵召恐有詐妄內出龜合然後應命況太子元良國本萬方所贍古來徵召皆用玉契此誠重慎之極防萌之慮臣昨見緣突厥使見太子合入朝參直有文符下宮曾不降勅處分太子當時又報臣云昨日至晚侍奉不見聖人諭及遣來今者直準臺符入朝事得安否臣又思周禮儀注例皆奏聞臺符所下必將非妄臣又自到朝堂審知是實所以太子遽往當今人稟淳化內外同心然古人慮事於未萌之前所以長無悔吝之咎況太子至重不可不深為誡慎以臣愚見太子既與陛下異宮伏望召太子先報來日非朔望朝參應須宣喚伏望降墨勅及玉契以符重慎之道憲宋州寧陵人第進士累除鳳閣舍人神龍初坐為張易之所引自吏部侍郎出為渝州刺史景雲初遷太子詹事卒贈亠兊州都督殷賢名編荊楚行達神明實稟先賢之風遍聞至孝之感甘露降其樹還同淚柏之林芝草生其廬即在寢苫之室雖禎祥驟委諒神理無欺而謗議是興為鄉人所惡且求諸故事抑有前聞率土莫非王臣含靈皆用天道通論則歸於有國析理則存乎其人以匹夫之感皆為王者之瑞則皇天所相何彰孝德之深梁靜須正刑書刺史不煩疑惑臣以今月二十二日侍從外參親奉令旨令臣勾當所進書隨了隨進并語臣云當今閒暇正好讀書臣自承殿下之好尚私心歡喜不能自勝伏惟天縱神武生知睿哲誠時與理會固無待勤求然自古及今皆重於學至於光輝盛德發揚令聞安靜身心保寧家國除此之外更無以加常人讀書擬干爵祿事須精熟乃堪試練殿下居副君之位有絕世之才豈假尋章摘句哉蓋應略知大意而巳用功甚少為利極多伏願克成美志無棄暇日上以慰至尊之心下以荅庶寮之望幸甚幸甚侍讀褚無量經明行修在朝罕匹是以皇帝擇令侍殿下謂宜時蒙召問而察其言臣以愚劣忝跡士端區區之誠莫不罄竭謹啟武之去虣與文德而競馳陰之為功配陽和而並運利用厚生之事依古以來折衝禦侮之材何代蔑有秦之強也起翦恬賁用其兵漢之盛也辛李衞霍為其將大唐操斗極把鉤陳帶甲百萬授鉞四七其有中分麾下總堂堂正正之師儼若敵國負赳赳桓桓之稱者在於乙速孤府君矣公諱行儼字行儼本姓王氏太原人也五代祖有功於魏始賜而氏焉因居京兆之醴泉縣王子晉之上仙肇開茂緒車千秋之作相重錫華宗家何代而乏賢人何時而不貴曾祖安齊前鋒都督右武候右六府驃騎將軍開府儀同三司上柱國河州刺史隨益州都督襲封和仁郡開國公徙孝移忠遷虞事夏司馬安之四至晏平仲之一心祖晟皇朝上開府右武候右廿府左車騎將軍驃騎將軍藏器於身待時而用功參列將寵盛興王父神慶右虞候副率檢校左右領軍衞將軍氣岸王褱傑志力雄武持軍以禮陰德有徵才子挺生將門斯在公鍾家代之休烈奉韜鈐之成訓鵬圖奮於霄漢噩鳥陣溢於風飇得射法於僊靈習軍容於嬉戲子房智勇時其無敵郤縠詩書頗亦兼善永徽中司成生擢第明慶中丁父憂性實過人俯而就禮麟德初授宣德郎虢王府記室參軍事閒平邸第枚馬交遊曳裾其閒首席推美咸亨元年以將門子弟授振威校尉守普濟府左果毅都尉丁太夫人憂哭泣之節饘粥之數復如居府君之喪儀鳳二年勅除興國府右果毅都尉鎮河源軍定州道遊奕護河陽橋垂拱二年授游擊將軍黃城府左果毅都尉致果為毅治戎以律洗兵鹽澤秣馬中山護濁河之橋綰黃圖之府智謀洋溢威武紛綸功靜朔垂氣雄京邑永昌元年制除朝散大夫帛丿糸州司馬天授二年加朝議大夫長壽二年除資州長史延載元年加中散大夫題輿帛丿糸外展驥資中風俗所同政教如壹證聖元年制除使持節萬州諸軍事萬州刺史萬歲通天元年制加中大夫二年加大中大夫其年檢校永州刺史聖歷二年授使持節都督夔歸忠萬渝涪肅等七州諸軍事守夔州刺史三年授使持節都督廣韶端康封岡等十二州諸軍事守廣州刺史長安三年授使持節泉州諸軍事守泉州刺史神龍元年授使持節都督黔辰沅等州諸軍事守黔州刺史其年加正議大夫神授政理之材天挺公侯之表故能方州典郡盡周官牧伯之尊越海淩山窮禹貢荊揚之域控御數千里周旋廿年化洽夷夏功成方國置生祠之廟往往而存畏清酒之盟于今莫犯神龍二年墨制授忠武將軍守右武衞將軍員外置同正員特勅停南衙上下專委北軍事羽林之任歷代為重用周勃而後安召宋昌而先拜以公確乎忠信厲然壯勇頒命卿之秩掌孤兒之軍宿衞陛殿而逾嚴徼巡巖廊而匪懈壘垣增肅軒禁穆清錫御府之金錢分大官之玉食殊恩所逮中使相望而執闕一字持㦸筋力為倦輸節竭誠心術俱盡神用疲而致損腠理勞而生疾其歲夏中遇病廳事半體云廢經時未瘳願休攝於家庭遂遲迴於天闕陳情拜䟽理切詞殫有感宸衷特聽致仕仍襃美績更惜羸痾睿旨殷勤形乎綍翰公結欷而辭雲陛投迹而返私門懸廣德之安車施仲翁之行馬仙方上藥冀養性而延齡芳醞嘉羞且忘憂而永日而公素無息允命昆弟之子令從為嗣鞠育侔於巳生仕為太子通事舍人坐外氏累左除溱州扶驩縣令公天屬為重既切猶子之慈門寄所鍾何深舐犢之念亦既離譴舊疾暴增春秋七十有二景龍元年十二月十五日薨于大寧里第嗚呼哀哉惟公盛德溫恭雅懷寬肅行無文飾言不浮華出身入仕儀家刑國靡欺暗室獨運虛舟於人之善無所遺於人之惡無所記可疑之地投足莫踐弗稽之謀措心所絕親友信而敬之老少安而懷之惟汲汲以行仁豈遑遑而求利防衞之際屢有奇功撫字之方亟彰靈感公之在永州也屬時闕一字不登土人多餒罄倉儲而罕贍捃山谷而無資所部界分素饒穭竹盤根合翠彌漫蒼然忽於一朝結實咸徧若五穀之含穎油然可觀比千箱之載詠俄而告給人皆和闕三字盈路公仍持數石奏進京師聖旨咨嗟嘆其靈味公之在夔州也鄰界不虞㣥蠻暫擾侵軼城郭殘傷吏人公不俟制命星言致討威靈震蕩氛穢廓清稽顙咽於巫雲闕三字於江水天朝命將甫戒於師期邊郡飛書巳聞於戰捷雖耿弇之不遺賊於君父亦何以尚茲時嘉乃功璽書慰勉疾亟之闕一字思慮彌長遺書戒令從曰吾遭遇闕四字卅餘載恨無以報不敢絲毫有負於聖朝家業素貧喪葬所須務從節儉勿違吾平生志也所樹碑務令存實無為虛美以掩吾真爾等唯清唯慎勿矜勿伐則吾死而無恨矣夫人常樂縣君賀若氏宋公弼之姪孫開州刺史懷武之第六女門宗之盛鐘鼎連華家室之歡瑟琴齊契春秋五十一證聖元年八月五日亡於萬州官舍維景龍二年歲次景申二月辛卯朔十六日景午合葬於雍州醴泉縣白鹿鄉李中川先府君之塋次禮也嗣子令從叫叫穹蒼哀哀霜露永言闕一字誓終身奉行子壻右驍衞鎧曹參軍安定梁望之代業通家天資長者冰清玉潤常懷國士之恩石字金書願託中郎之筆闕二字言行乃作銘云公侯子孫必復其始將門有將其來久矣伊我將軍奕代為美壯勇傑出威稜峻峙文則循良六條千里武以侍衞巖除軍壘黃霸匪儔宋昌寧擬中外從闕三字勤止年至禮優神勞疾起有生終謝令問不巳賢哉伏波誡其兄子朱賓雍州藍田人君諱寺字師暕雍州藍田人也丕承帝緒自雍墟而逮夏陽克勤王家由安定而宅京兆其如萬氏昆季列於三方有類林家昭穆光乎十德至若衣冠禮樂之盛烈廉孝賢良之儀表固以舄奕當代昭彰季葉者乎曾祖遵周秦州清水縣令遽賒相用勞逸兼資重泉之磬載昌單父之琴斯洽祖殊隨監門錄事參軍德以潤身學以從政八屯由其式序五校於是克隆父柱皇朝奉義郎騎都尉識量夷雅風神耿介青田表秀丹穴摛祥進而不榮安乎散列退而不野鄰乎湫隘君承積善之餘祉挺生人之上姿因心而好孔墨捥跡而齊曾閔縱王佐之奇表揚於王庭屈公輔之宏量薄遊公府咸亨四年授文林郎隨班例也日者東風爽侯西旅不庭三軍乏坐甲之資七萃興懸磬之歎君散陶凝慮指囷推誠躬親饋饁之勞式周儲峙之務恕己及物下布人謠憂國忘家上紆帝念永隆二年恩詔授上柱國道光西漢巳極武功之尊名冠南荊竟保昭陽之貴既而上僊興慕下代纏哀梁山降白鶴之祥畢陌啟青烏之兆君深悲考逝義切子來茂績顯於園塋豐功徹乎旒扆垂拱元年授朝議郎行澤王府主簿以枚馬之英規偶閒平之上邸芳風扇乎蘭坂茂躅隆乎桂山東閣由是希聲西園以之藉甚豈期攝生謬理與善失常西山何高未接仙童之羽南溟尚遠翻墜化鵬之翼以垂拱四年十月五日終於長安懷德里第春秋卌有一夫人晉昌唐氏名惠兒後魏驍騎將軍本部守契之七葉孫即故司農寺長樂監敏之第二女也巫山降祉巽位摛精挺琬玉以成姿懷冰霰以清慮纂組織絍之務早擅女工幽閑婉嫕之規夙彰婦德恭謙娣姒宗族所以推先肅事舅姑閨門由其作訓將以鵷驂並騖常接影於仙樓不意龍劒雙沈竟連形於寶匣以垂拱四年九月廿七日終於長壽里第春秋卅有六粵以其年十一月十七日合葬於終南山楩梓谷口隋信行禪師林側陪大父錄事參軍之舊塋由夙志也惟君器周大雅德備中和敏殫衆藝好兼靈迹牟子博之異錄動息會其情虞孝敬之奇記俯仰明其術黃金積釜鎮寫真容白玉成田併開精舍夫人亦凝心貝葉屬思曇花幼彰龍女之功長契勝鬘之德婉茲嘉偶咸借慶於一乘倬彼好仇並歸神於八正其子景先等以為形資業起業立則形存化以緣生緣亡則化息履霜增感豈若奉於遺音聞雷警慕固可託於真侶式崇寶構虔考勝因寄篆刻於幽埏庶飛芳於奪里其詞曰有秦支子始國於梁帝堯景冑必復其唐易代載德繼軌傳芳雅符秦晉信叶潘楊其一於惟君子夙承家慶顯允夫人早標門令笙簧其德黼藻其性問望備隆容工兼盛其二身由業立果乃因成共資有相並證無生八正凝想七覺馳情德踰善德名葢淨名其三積善方融輔仁無準始驚炭折俄看薪盡悲哉則豹騎連翔痛矣則螭軒接軫門庭兮蕭索墟落兮淒緊其四哀哀鞠子慼慼遺孤共詳勝地式奉先謩搆曾臺於翠阜刻貞石於黃壚山山兮靈塔往往兮真徒其五寶積瀛洲人喪親廬墓以哀毀卒若夫真宗奧鍵言象昧其津源俗諦法門性闕一字詮其教義自三天錫福十聖揚猷道俗薰修階資積習若海流懸闕一字涵闕二字而闕一字天江源濫觴下歸塘而括地至如闕一字波傳話素契闕一字於菩提墨血摛文闕一字志期於上德善才童子求友不逾於十城羅剎聖僧談經無過於半偈未有濟巨川而棄楫昇彼岸而闕二字者哉粵若大覺乘乾天仙利現應賢劫而開運耀佛日以光臨載誕王宮獻異蓮花之步撫監儲苑呈祥白馬之蹤伽耶非立行之場擅特是坐忘之地始則舉筌蹄而繹理終乃期得意以忘言空色兩捐是非俱遣斷言語之路開不二之門湛湛常存如如不動不皦不昧水鶴無分無去無來空鵝詎辨洎恒星不見之後金人入夢而還象教西流創經行于震旦龍波東注餐妙化於迦維仁祠偏滿於郊虞支提充創于州部矣建興寺者晉朝建興元年所立也薙草開基䟽源設砌多招法侶廣置緇徒大辨名僧摳衣戾止天親大德挾錫來遊歷晉宋而常存經齊梁而永固屬隋季喪亂因而廢焉蕪沒一朝荒涼十紀洞房幽闥空留野獸之蹤廣廡長廊竟滿巢禽之響崩榛塞路淒涼闕一字道之懷駭壁潰墉痛切桑門之掖有唐上元二年天皇大帝為孝敬皇帝崩制所立也三善空留四皓罷遊聲沈鳳鑰影絕龍樓皇帝悽馳道之無恭傷臨渦之輟調普天之下廣闢仁祠其地距維揚岡連楚塞歸峯南峙淩倒景而干雲蠙浦西通下焦溪而沃日且土風多最人望攸高漢帝祠壇瑤席徹球王將之韻楚王陳迹淮淝播英傑之名徐偃行仁徽猷尚在汲黯臥理嘉譽猶存實荊壤之奧區楚都之勝境者也唐之有天下七十餘載矣高祖神堯皇帝鳳起唐郊龍飛參野翦奔鯨而清㝢縣銷伏鼈而靜雲雷出震有臨繼天當宁重規累聖被淳曜於圖書允武允文揚鴻輝於帝籙太宗文武聖皇帝樞電摛祥彤雲薦祉大橫成卦三讓之禮愈恭寶祚開元八百之隆巳永高宗天皇大帝握蘭演慶夢月貽祥紹三皇五帝之絕軌光乃聖乃神之洪祚皇上聖孚光宅元德昇聞億兆事繁馭朽之懷轉切萬幾務重履冰之戒愈深神皇德尊軒聖道叶坤元鍊石而補旻穹執契而成品彙稽帝籙披皇圖搆合宮啟陽館神工而符神造天製而合天心嶽澤効靈河洛開奧慶雲紛郁閒霞彩以成文甘露泛闕一字混珠光而動色郊栖祥鳳苑樂遊麟東楛西環望帝閽而入貢南蠻北狄思解辮以來王天域垂平樂和禮貴而比邱僧惠靜俗姓卞氏周濟陰侯卞英之後也三歸早攝六波先悟戒律思備闕一字惜鵝珠道德兼修取光虹玉自道闕一字沒後惠遠生前闕四字道綱解紐其有紹斯高躅者其惟上人法師識悟三生心明四果乘因趣級登十路以高遷喪律背緣入四流而下墜去垂拱元年發心敬造彌勒像一鋪奉為皇家帝主及州縣官僚師僧父母一切庶類數年之閒裝嚴闕二字且連眸示妙便寫真容紺髮開儀還圖實相圓光煥彩亂晨景之照梁背日流明炯朝虹之燭牖談之不可巳巳其在茲歟次有寺主比邱僧智須僧智雲上座惠品都維那法闕字惠崇惠明淨琛淨泰法融等夙懷敏悟早譽克聰行潔珪璧業周禪誦靈山之妙法毗邪之善談敬之重之載挹載味而心不住法捨乃遺情知幾其神抑惟明德邛州鎮將劉元炎蔚州鎮將王本柱國王文霸柱國王超柱國王仕弼上柱國王楷騎都尉王肆騎都尉王智略劉德逸並淮南蠹桂江北明珠肆談柄于鷄窻縱武能于虎帳既開冠葢之理還闢通德之門屬踐畏途共取誡于冰谷馳心妙境同見樂於閑居各捨冰紈志求無上而已下官少披孔籍覃思三墳晚學釋經窺窬十步雖日夜無倦端倪靡躬行坐未疲波瀾詎際法師不遺淺識見請慇懃雖假數句以成文章終懼一字以為襃貶敢竭愚瞽輒陳聖諦庶化城空而劫石盡貞石無刊滄海變而桑田改元言不昧乃為銘曰理超繫象道先天地譯有開宗因無成器嘉號稱十妙門匪二湛然不動見應斯至其一先佛後佛千名萬名天上天下王城化城一來一去不死不生賢哉妙覺實曰儲明其二出門悟道數歲成因遠超三界深明六塵化馴鱗羽德洽天人言語一段千載元津其三箭驚宵漏舟移夜壑漢夢纔通周日巳落孤阜棲鷲踈林隱鶴質明金剛形圖丹雘其四慧日遙臨道風振響發迹伽衞聿來中壤月殿崢嶸日宮宏敞二諦開教三乘駕網其五炎靈告謝黃神嘯吟竟飛闕二字爭怒鼃音沙河咽鳴闕二字崩岑一摧道樹詎識檀林其六皇家創歷廓土開疆繼蹤媧燧齊聖虞唐法門再闢釋網重張緇徒濟濟梵響琅琅其七去斯塵累歸茲法宇妙辨銀鉛深明水乳緇衣領袖道塲儀羽廣樹福田增崇帝主其八邈哉伊人至哉㣥彥遽驚折軸俄悲毒箭榮利誰重解脫斯羨蠡髻韜姿開模紺殿其九廣川化雉高岳稱龜帛丿糸帛丿糸畎澮硌硌川土天高城迥平路通逵接江之滸連河之湄其十日月晦冥寒暑遷易始聞生死俄成古昔天衣拂兮歲深塵劫空兮年積幸微言之不昧刊芳猷於元石其十一
