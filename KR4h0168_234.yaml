front:
  text: 全唐文欽定全唐文卷二百三十四楚金并州人贈工部尚書道源子鄉貢進士擢第高宗朝為刑部侍郎武后朝遷秋官尚書賜爵南陽侯為酷吏周興所陷配流嶺表卒
  hash: sha256:45359d5e6826f7a36e658abf65dfd31f4375c3c3bb8987b0f680844c9cc37a85
  markers:
