front:
  text: 全唐文欽定全唐文卷一百六十才博州清平人貞觀時召直宏文館累遷太常博士擢太常丞龍朔中為太子司更大夫麟德二年卒
  hash: sha256:ecef467d66ffd129ab068f5f9fdfb73150d456a27426f747f5f4054ac39dbd2c
  markers:
  - {type: head, offset: 13, content: 呂才, id: KR4h0168_NFKB_160-h1, level: 1}
body:
  text: 朝請大夫權知司天少監事兼提點歷書上柱國開國伯食邑九百戶賜紫金魚袋臣呂才奉勅修臣聞婚者是興萬世之始也合二姓之好繼先聖之後為天地宗廟社稷之主寧不重哉夫天地判然後有男女男女生然後有夫婦夫婦合然後有父子父子親然後有德義德義立然後有禮法禮法作然後萬物安故先王所以得天下者貴乎生育之本重乎萬世之嗣言夫婦之道乃天地之大義風化之本源蓋取於異姓者所以附遠厚別幣必誠辭無不腆矣偶配生成必致昌益之道故孔子曰天地不合萬物不生夫婦不順有失萬世之嗣焉昔三代明王必敬其妻子妻也者乃立親之主生養之宗繼先聖之後為大禮之本歟固不可不敬也臣謹所言或有可采擇善而從以平不拔之基永建久興之業功掩前朝道隆往代豈不為立萬世至治之美也臣才誠惶誠懼頓首頓首謹言時大唐貞觀歲次柔兆執徐仲秋望日上表臣按禮記及家語云舜彈五弦之琴歌南風之詩是知琴操曲弄皆合於歌又張華博物志云白雪是天帝使素女鼓五十弦瑟曲名又楚大夫宋玉對襄王云有客於郢中歌陽春白雪國中和者數十人是知白雪琴曲本宜合歌以其調高人和遂寡自宋玉以來迄今千祀未有能歌白雪曲者臣今準敕依琴中舊曲定其宮商然後教習並合於歌輒以御製雪詩為白雪歌詞又案古今樂府奏正曲之後皆別有送聲君唱臣和事彰前史今取太尉長孫無忌僕射于志寧侍中許敬宗等奉和雪詩以為送聲合十六節今悉教訖並皆合韻一謹案老子道德經云域中四大王居一焉又案仁王般若經云地前三賢菩薩位當四天下主內經又云假令比邱得須陀洹果經八萬刼始見於地前今令道士女冠拜敬域中之大僧之及尼拜敬地前菩薩此乃不乖本教正合其宜彈曰佛經所以不令僧敬俗者良以出處不同故也縱使三賢菩薩為四天下主而猶現有妻子相不捨家位厚信曰如然致敬則無誠說故涅槃經云諸出家人從諸白衣諮受未聞不應禮拜據此則殊乖本教何謂正合其宜耶皇后皇太子尊同於君理合敬拜彈曰仁王經云出家人法不拜國王國王尚不許拜自下斷焉可知矣一又案道經云道士一人得道乃追榮七葉父母此則立身成道貴於追顯前葉今時未得道者見生父母理合拜敬又案內經云西方妙樂國土本為法藏比邱願力所成是知妙樂之所乃是比邱願往生處也又案無量壽觀經云願生妙樂國土者先須孝養父母後云具足戒行然經宿不見即須跪問孝之儀也不拜父母何成孝義今令僧尼道士女冠拜敬父母亦是不違本教彈曰如經所云生西方者該通道俗言孝養父母者此明處俗往生因也言具足戒行者此明出家往生因也此則道路懸隔修行兩殊安得混彼二因俱言釋侶且孝養異儀寧唯跪禮揚名後世亦其至也故五分律云若諸沙門左右二肩荷擔父母親於身上便利不淨縱使一劫猶不能報須臾之恩若教父母識三寶四諦受持五戒行十善道於一念頃即為以報父母之恩何以故荷擔等事是人中善不能令彼生天證聖若教父母識諦實因果受齋持戒由此因緣即能證聖又四分律云佛言比邱不應禮敬一切白衣父母雖曰居尊終同白衣之例佛教不令禮拜若拜乃陷於親雖生有致敬之容死招無量重罪不孝之極寧越是乎一謹案周禮有九拜之儀一曰稽首注云首至地也又案尚書言於禹益等拜皆言稽首此為拜君之敬通於古今也然今之僧尼禮拜正當稽首之法是以維摩經云導衆以寂故稽首然今若令尼作婦女跪拜但為衣服不稱恐爽於常情聖人無心以百姓心為心俗行已久不求改變今令尼等拜敬望請許其稽首此則不乖古今之儀順於輿人之頌彈曰夫希顏之士亦顏之儔慕驥之乘亦驥之類今尼等辭榮是一入道不殊何獨慮爽之常情即欲令其稽首若也不求改變稽首未是循常情既也不循豈順輿人之頌謹議蓋聞一消一息範圍天地之儀大哉至哉變通爻畫之紀理則未宏於方外事乃猶拘於域中推渾元而莫知窮陰陽而不測豈聞象繫之表猶開八正之門形器之先更宏二智之教者也故能運空有而雙照冥真俗而兩夷泛六度於愛河駕三車於大宅是知法王法力超㣥生而自在自覺覺人摧衆魔而獨悟業運將啟乃雷震而電耀化緣斯極亦火滅而薪盡觀其應跡若有去來察此真常本無生住但以宏濟之道有緣斯應天祚明德無遠不臻是以萌蔕疇昔神光聊見於曩時祥瑞有歸淨土咸歎於茲日伏惟皇唐之有天下也運金輪而臨四有握璿極而撫萬方耀慧日於六天蒸法雲於十地西越流沙遂荒妙樂之地東漸於海奄有歡喜之都振聲教於無邊通車書於有頃遂使百億須彌既咸頒於望秩三千法界亦共沐於皇風故令五印度國改荒服於槀街十八韋陀譯梵文於祕府乃有三藏元奘法師者所謂當今之能仁也聰慧夙成該覽宏贍德業純粹律禁翹勤實三寶之棟梁四衆之綱紀者也每以釋教東遷為日已久或恐邪正雜擾水乳不分若不稽實相於迦維驗真交於摩竭何以成決定之藏為畢竟之宗者乎幸逢二儀交泰四海無塵遂得拂衣元漠振錫葱嶺不由味於蒟醬直路夷通豈藉佩於杜衡遙途近易於是窮源河於西域涉河水於東維採貝葉於鷲山窺金文於鶴樹所歷諸國百有餘都所獲經論向七百部並傳以藩驛聿歸上京因得面奉聖顏對揚宗極此因明論者即是三藏所獲梵本之內之一部也理則包括於三乘事乃牢籠於百法研機空有之際發揮內外之宗雖詞約而理宏實文微而義顯學之者當生不能窺其奧游之者數載不足測其源以其衆妙之門是以先事翻譯其有神泰法師靖邁法師明覺法師等並以神機昭晰志業兼該精習㣥經多所通悟皆蒙別勅追赴法筵遂得函丈請益執卷承旨三藏既善宣法要妙盡幽深泰法師等是以各錄所聞為之義疏詮表既定方擬流通無緣之徒多未聞見復有栖元法師者乃是才之幼少之舊也昔栖遁於嵩岳嘗枉步於山門既筮仕於上京猶曲睠於窮巷自蒙修攝三十餘年忉怛之誠二難具盡然法師節操精潔戒行冰霜學既昭達於一乘身乃闕一字局於十誦才既覩其清苦時以開遮折之但以內外不同行已各異言戲之間是非鋒起師乃從容謂才曰檀越復研味於六經探賾於百氏推陰陽之伏察律呂之忽微又聞生平未見太元詔問須臾即解由來不窺象戲試造旬日復成以此有限之心逢事即欲穿鑿但以佛法元妙量謂未與彼同雖復強學推尋恐非措心之所何因今將內論翻用見譏者乎法師後逢因明創行義趣幽隱是以先寫一通故將見遺仍附書云此論極難深究元妙比有聰明博識聽之多不能解今若復能通之可謂內外俱悉矣其論既近至中夏才實未之前聞恥於被試不知為復強加披閱於是依極成而探義深憑比量而求微旨反覆再三薄識宗趣後復借得諸法師等三家義疏更加究習然以諸法師等雖復序致眾富文理會通既以執見參差所說自相矛盾義既同稟三藏豈合更開二門但由釁發蕭牆故容外侮闚測然佛以一音演說亦許隨類各解何必獨簡白衣不為衆生之例才以公務之餘輒為斯注至於三法師等所說善者因而成之其有疑者立而破之分為上中下卷號曰破注解其間墨書者即是論之本文朱書者以存師等舊說其下墨書注者是才今之新撰用決師等前議凡有四十餘條自鄶已下猶未具錄至於文理隱伏稍難見者乃畫為義圖共相比較仍更別撰一方丈大圖獨存才之近注論既外無人解無處道聽途說若言生而知之固非才之望也然以學無再請尚曰傳燈聞一知十方稱殆庶况乎生平不見率爾輒事含毫今既不由師資注解能無紕紊竊聞雪山夜义說生滅法邱井野獸歎未曾有苟令所言合理尚得天仙歸敬才之所注庶幾於茲法師等若能忘狐鬼之微陋思句味之可尊擇善而從不簡真俗此則如來之道不墜於地宏之者衆何常之有必以心未忘於人我義不察於是非才亦扣其兩端猶擬質之三藏君姓王氏諱勣字無功太原祁人也高祖晉穆公自南歸北始家河汾焉歷宋魏迄於周隨六世冠冕國史家牒詳焉君性好學博聞強記與李播陳永呂才為莫逆之交陰陽歷數之術無不洞曉大業末應孝弟廉潔舉射高第除祕書正字君性簡放飲酒至數斗不醉常云恨不逢劉伶與閉戶轟飲因著醉鄉記及五斗先生傳以類酒德頌云雅善鼓琴加減舊弄作山水操為知音者所賞高情勝氣獨步當時及為正字端簪理笏非其好也以疾罷乞署外職除揚州六合縣丞君篤於酒德頗妨職務時天下亂藩部法嚴屢被勘劾君歎曰羅網高懸去將安所遂出所受俸錢積於縣城門前託以風疾輕舟夜遁隨季版蕩客遊河北去還龍門武德中詔徵以前揚州六合縣丞待詔門下省時省官例日給良醞三升君第七弟靜為武皇千牛謂曰待詔可樂否君曰吾待詔祿俸殊為蕭瑟但良醞三升差可戀爾待詔江國公君之故人也聞之曰三升良醞未足以絆王先生判日給王待詔一斗時人號為斗酒學士貞觀初以足疾罷歸欲定長往之計而困於貧貞觀中以家貧赴選時太學有府史焦革家善醞酒冠絕當時君苦求為太樂丞選司以非士職不授君再三請曰此中有深意且士庶清濁天下所安不聞莊周避漆園老聃恥柱下卒授焉數月而焦革死妻袁氏時送美酒歲餘袁又死君歎曰天迺不令吾飽美酒遂掛冠歸田自是太樂丞為清流君後追述焦革酒經一卷其術精悉兼採杜康儀狄已來善為酒人為酒譜一卷太史令李淳風見而悅之曰王君可為酒家之南董君歷職皆以好酒鄉里或咍之因著無心子以喻志河汾中先有渚田十數頃稱良沃鄰渚又有隱士仲長子光服食養性君重其貞素顧與相近遂結廬河渚縱意琴酒慶弔禮絕十有餘年河渚東南隅有連沙盤石地頗顯敞君於其側遂為杜康立廟歲時致祭以焦革配焉貞觀中京兆杜松之清河崔公善繼為本州刺史皆請與君相見君曰奈何悉欲坐召嚴君平竟不見崔杜高君調趣卒不敢屈但歲時贈以美酒鹿脯詩書往來不絕君又葛巾聯牛躬耕東皋每著書自稱東皋子晚歲醉飲無節鄉人或諫止之則笑曰汝輩不解理正當然或乘牛駕驢出入郊郭止宿酒店動經歲月往往題咏作詩好事者錄之諷咏並傳於代貞觀十八年終於家時年若干臨終自克寸死日遺命薄葬兼預自為墓誌所著詩賦並多散逸鳩訪未畢且緝成五卷又著會心高士傳五卷酒譜二卷及註莊子並別成一家不列於集云易曰上古穴居而野處後代聖人易之以宮室蓋取諸大壯逮乎殷周之際乃有卜宅之文故詩稱相其陰陽書云卜惟洛食此則卜宅吉凶其來尚矣至於近代師巫更加五姓之說言五姓者謂宮商角徵羽等天下萬物悉配屬之行事吉凶依此為法至如張王等為商武庾等為羽欲似同韻相求及其以柳姓為宮以趙姓為角又非四聲相管其間亦有同是一姓分屬宮商復有複姓數字徵羽不別驗於經典本無斯說諸陰陽書亦無此語直是野俗口傳竟無所出之處唯桉堪輿經云黃帝對於天老乃有五姓之言且黃帝之時不過姬姜數姓暨於後代賜族者多至如管蔡郕霍魯衞毛聃郜雍曹滕畢原酆郇並是姬姓子孫孔殷宋華向蕭亳皇甫並是子姓苗裔自餘諸國準例皆然因邑因官分枝布葉未知此等諸姓是誰配屬宮商又檢春秋以陳衞及秦並同水姓齊鄭及宋皆為火姓或承所出之祖或繫所屬之星或取所居之地亦非宮商角徵羽共相管攝此則事不稽古義理乖僻者也謹桉史記宋忠賈誼誚司馬季主云夫卜筮者高談祿命以悅人心矯言禍福以盡人財又按王充論衡云見骨體而知命祿覩命祿而知骨體此即命祿之書行之久矣多言或中人乃信之今更研尋本非實錄但以積善餘慶不假建祿之吉積惡餘殃豈由刼殺之災皇天無親常與善人禍福之應其猶響影故有夏多罪天命勦絕宋景修德妖孛夜移學也祿在豈待生當建學文王憂勤損壽不關月值空亡長平坑卒未聞共犯三刑南陽貴士何必俱當六合歷陽成湖非獨河魁之上蜀郡炎燎豈由災厄之下今時亦有同建同祿而貴賤懸殊共命共胎而夭壽更異桉春秋魯桓公六年七月魯莊公生今檢長歷莊公生當乙亥之歲建申之月以此推之莊公乃當祿之空亡依祿命書法合貧賤又犯句絞六害背驛馬生身剋驛馬驛馬三刑當此生者並無官爵火命七月生當病鄉為人尫弱身合矬陋今桉齊詩譏莊公猗嗟昌兮頎而長兮美目揚兮巧趨蹌兮唯有向命一條法當長命依檢春秋莊公薨時計年四十五矣此則祿命不驗一也又按史記秦莊襄王四十八年始皇帝生宋忠注云因正月生為此名政依檢襄王四十八年歲在壬寅此年正月生者命當背祿法無官爵假得祿合奴婢尚少始皇又當破驛馬生驛馬三刑身剋驛馬法當望官不到金命正月生當絕下為人無始有終老而彌吉今檢史記始皇乃是有始無終老更彌凶唯建命生法合長壽計其崩時不過五十祿命不驗二也又檢漢武故事武帝以乙酉之歲七月七日平旦時生亦當祿空亡下依祿命書法無官爵唯向驛馬尚隔四辰依祿命法少無官榮老而方盛今檢漢書武帝即位年始十六末年巳後戶口減半祿命不驗三也又桉後魏書云孝文皇帝皇興元年八月生今桉長歷其年歲在丁未以此推之孝文皇帝背祿背命並驛馬三刑身克寸驛馬依祿命書法無官爵命當父死中生法當生不見父今檢魏書孝文皇帝身受其父顯祖之禪禮云嗣子位定在於初喪踰年之後方始正號是以天子無父事三老也孝文皇帝受禪異於常禮躬為天子以事其親而祿命例云不合識父祿命不驗四也又按沈約宋書云宋高祖癸亥歲三月生依此而推祿之與命並當空亡依祿命書法無官爵又當子墓中生唯宜嫡子假有次子法當早死今檢宋書高祖長子先被篡殺次子義隆享國多年高祖又當祖祿下生法得嫡孫財祿今檢宋書其孫劉劭劉濬並為篡逆幾失宗祧祿命不驗五也易曰古之葬者衣之以薪不封不樹喪期無數後代聖人易之以棺槨蓋取諸大過禮云葬者藏也欲人之不得見也然孝經云卜其宅兆而安厝之以其顧復事畢長為感慕之所窀穸禮終永作鬼神之宅朝市變遷豈得豫測於將來泉石交侵不可逆知於地下是以謀及龜筮庶無後難斯乃備於慎終之禮曾無吉凶之義暨近代以來加之陰陽葬法或選年月便利或量墓田遠近一事失所禍及生人巫者利其貨賄莫不擅加妨害遂使葬書一術乃有百二十家各說吉凶拘而多忌且天覆地載乾坤之理備焉一剛一柔消息之義詳矣或成於晝夜之道感於男女之化三光運於上四時通於下斯乃陰陽之大經不可失之於斯須也至於喪葬之吉凶乃附此為妖妄傳曰王者七日而殯七月而葬諸侯五日而殯五月而葬大夫經時而葬士及庶人逾月而巳此則貴賤不同禮亦異數欲使同盟同軌赴弔有期量事制宜遂為常式法既一定不得違之故先期而葬謂之不懷後期而不葬譏之怠禮此則葬有定期不擇年月其義一也春秋又云丁巳葬定公雨不克葬至於戊午襄事禮經善之禮記云卜葬先遠日者蓋選月終之日所以避不懷也今檢葬書以巳亥之日用葬最凶謹桉春秋之際此日葬者凡有二十餘件此則葬不擇日其義二也禮記又云周尚赤大事用日出殷尚白大事用日中夏尚黑大事用昏時鄭元注云大事者何謂喪葬也此則直取當代所尚不擇時之早晚春秋又云鄭卿子產及子太叔葬鄭簡公於時司墓大夫室當葬路若壞其室即日出而堋不壞其室即日中而堋子產不欲壞室欲待日中子太叔云若至日中而堋恐久勞諸侯大夫來會葬者然子產既云博物君子太叔乃為諸侯之選國之大事無過喪葬必是義有吉凶斯等豈得不用今乃不問時之得失唯論人事可否曾子問云葬逢日蝕舍於路左待明而行所以備非常也若依葬書多用乾艮二時並是近夜半此則交與禮違今檢禮傳葬不擇時其義三也葬書云富貴官品皆由安葬所致年壽延促亦由墳隴所招今按孝經云立身行道則揚名於後世以顯父母易曰聖人之大寶曰位何以守位曰仁是以日慎一日則澤及於無窮苟德不建而人而無後此則非論安葬吉凶而論福祚延促臧孫有後於魯不關葬得吉日若敖絕祀於荊不由遷厝失所此則安葬吉凶不可信用其義四也今之喪葬吉凶皆依五姓便利古之葬者並在國都之北兆域既有常所何取姓墓之義趙氏之葬並在九原漢之山陵散在諸處上利下利蔑爾不論大墓小墓其義安在及其子孫富貴不絕或與三代同風或分六國而王此則五姓之義大無稽古吉凶之理何從而生其義五也且人臣名位進退何常亦有初賤而後貴亦有始泰而終否是以子文三已令尹展禽三黜士師卜葬一定更不回改冡墓既成曾不革易則何因名位無時暫安故知官爵宏之在人不由安葬所致其義六也野俗無識皆信葬書巫者誑其吉凶愚人因而徼倖遂使擗踊之際擇葬地而希官品荼毒之秋選葬時以規財祿或云辰日不宜哭泣遂莞爾而受弔問或云同屬忌於臨壙乃吉服而不送其親聖人設教豈其然也葬書敗俗一至於斯其義七也宏直雍州咸陽人為漢王元昌友徙荊王友龍朔中卒夫宗子維城之託者所以固邦家之業也大王功無任城戰克寸之效行無河間樂善之譽爵高五等邑富千室當思答極施之洪慈保無疆之永祚其為計者在乎修德冠屨詩禮畋獵史傳覽古人成敗之所由鑒既往存亡之異跡覆前戒後居安慮危奈何列騎齊驅交橫壟畝野有遊客巷無居人貽眾庶之憂逞一情之樂從禽不息實用寒心儼常州義興人擢明經第為左屯衞兵曹參軍太宗朝再遷殿中少監蒲州刺史永徽二年為右衞大將軍文明中封義興縣子以太子詹事致仕垂拱三年卒年七十八中宗立以舊恩贈禮部尚書足下負巢由之峻節傲唐虞之聖主養煙霞之逸氣守林壑之遯情有年載矣故能聲出區宇名流四海主上屈萬乘之重申三顧之榮遇子以商山之客待子以不臣之禮將以輔導儲貳漸染芝蘭耳皇太子春秋鼎盛聖道未周拾遺補闕臣子恒務僕以不才猶參庭諍誠以素非德望位班卒伍言以人廢不蒙採掇足下受調護之寄是可言之秋唯唯而無一談悠悠以卒年歲向使不飡周粟僕何敢言祿及親矣以何酬塞想為不達謹書起予乾祐雍州長安人貞觀初為殿中侍御史歷治書侍御史永徽初擢御史大夫出為邢魏滄三州刺史入為司刑太常伯坐漏禁中語免官鄭州人鄭宣道先聘少府監主簿李元義妹為婦即宣道堂姨元義先雖執迷許其婚媾後以情禮不合請與罷婚宣道經省陳訢以法無此禁判許成親何則同堂姨甥雖則無服既稱從母何得為婚又母與堂姨本是大功之服大功之上禮實同重况九月為服親亦至矣子而不子辱以為妻名教所悲人倫是棄且堂姑堂姨內外之族雖別而父黨母黨骨肉之恩是同愛敬本自天性禽獸亦猶知母豈可令母之堂妹降以為妻從母之名將何所寄古人正名遠別後代違道任意恐寖以成俗然本屬無服而尊卑不可為婚者非止一條請付㣥官詳議永為後法
