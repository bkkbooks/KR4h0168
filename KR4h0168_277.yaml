  text: 全唐文欽定全唐文卷二百七十七曾河南洛陽人景雲中為吏部員外郎開元初拜中書舍人知制誥坐事貶洋州刺史徙慶州鄭州入拜光祿少卿遷禮部侍郎十五年卒
