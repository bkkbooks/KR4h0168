body:
  text: 原夫水能利物鏡以含虛泛鷁攸往盤龍是居蘊靈長而遠蓄懸洞鑒而藏諸其止水也體靜而舒惠風拂而逾益明月來而不如清則徹底蒙紛濯洗朗亦難雜逢昏可合則有分流學海挂影仙臺映冰壺而洞徹連錦帳以徘徊是用益澄流品取鑒㣥材涸鮒思躍飛雞自猜挹餘波而得潤雖屢照而常開惟茲道也可允孚惟茲務也可長守所以息僥幸之心杜讒慝之口將座銘之不若雖撲滿而何有士或湮淪時多苦辛願濯纓而未暇思照膽而無因空匪材而濫挹願將此以書紳朕聞宇宙者至公之器不獲已而臨之帝王者因時之運非有待而居之蓋在於拯俗濟人功成名遂而已朕以寡昧虔奉鴻休本殊王季之賢早達延陵之節昔在聖歷已讓皇嗣之尊爰洎神龍終辭太弟之授豈惟衣冠所睹抑亦兆庶咸知頃屬國步未夷時艱主幼大業有綴旒之懼寶位深墜地之憂議迫公卿遂登皇極日慎一日以至於今一紀之勞勤亦至矣萬方之俗化漸行矣將成宿願脫屣寰區昔堯之禪舜惟能是與禹以命啓匪私其親神器之重允歸公授皇太子隆基有大功於天地定阽危於社稷溫文既習聖敬克躋委之監撫已移歲年時政益明庶工惟序朕之知子庶不負時歷數在躬宜陟元后可令即皇帝位有司擇日冊授朕方比迹洪古希風太皇神與化遊思與道合無為無事豈不美歟王公百寮宜識朕意微臣詳據典禮謂宜天地合祭謹按禮記祭法曰有虞氏禘黃帝而郊嚳夏后氏禘黃帝而郊鯀傳曰大祭曰禘然則郊之與廟俱有禘祭禘廟則祖宗之主俱合於太祖之廟禘郊則地祇㣥望俱合於圜丘以始祖配享皆有事而大祭異於常祀之義禮大傳曰不王不禘故知王者受命必行禘禮虞書曰正月元日舜格于文祖肆類于上帝禋于六宗望于山川遍于㣥神此則受命而行禘禮者也言格于文祖則餘廟之享可知矣言類于上帝則地祇之合可知矣且山川之祀皆屬於地㣥望尚遍況地祇乎周官以六律六呂五聲八音六舞大合樂以致神祇以和邦國以諧萬人又云凡六樂者六變而致象物及天神此則禘郊合天神地祇人鬼祭之樂也三輔故事漢祭圜丘儀云上帝位兆正南面后土位兆亦南面而少東又東觀漢記云光武即位為壇於鄗之陽祭告天地採用元始故事二年正月於洛陽城南依鄗為圜壇天地位其上皆南向西上按兩漢時自有后土及北郊祀而此已於圜丘設地位明是禘祭之儀又春秋說云王者一歲七祭天地合食於四孟別於分至此復天地自常有同祭之義王肅曰孔子言兆圜丘於南郊南郊即圜丘圜丘即南郊也又云祭天而地配此亦郊祀合祭之明說惟鄭康成不論禘當合祭而分昊天上帝為二神專憑緯文事匪經見又其注大傳不王不禘義則云正歲之首祭感帝之精以其祖配注周官大司樂圜丘義則引大傳五禘以為冬至之祭遞相矛盾未足可依伏惟陛下膺籙居尊繼天在歷自臨宸極未親郊祭今之南郊正當禘禮固宜合祀天地咸秩百神答受命之符彰致敬之道豈可不崇盛禮同彼常郊使地祇無位未從禘享今請備設皇地祇并從祀等座則禮得稽古義合緣情然郊丘之祀國之大事或失其情精禋將闕臣術不通經識慚博古徒以昔謬禮職今忝諫曹正議是司敢陳忠讜倘事有可採惟斷之聖慮臣聞作樂崇德以感人神韶夏有容咸英有節婦人媟黷無預其閒昔魯用孔子幾致於霸齊人懼之饋以女樂魯君既受孔子遂行戎有由余兵強國富秦人反閒饋之美女戎王耽悅由余乃奔斯則大聖名賢疾之己久良以婦人為樂必務冶容娃姣動心蠱惑喪志上行下效淫俗將成敗國亂人實由茲起伏惟殿下神武命代文思登庸宇內禺禺瞻仰德化而渴賢之美未被於氓謠好妓之聲或聞於人聽豈所以追啓誦之徽烈襲堯舜之英風者哉至若監撫餘閒宴私多豫後庭妓樂古或有之非以風人為弊猶隱至於所司教習彰示㣥寮慢妓淫聲實虧睿化伏願下明令發德音屏倡優敦雅頌率更女樂並令禁斷諸使採召一切皆停則朝野內外皆知殿下放鄭遠佞輝光日新凡在含生孰不欣戴謹啓王者大司馬制軍詰禁封國正朔惠綏蠻貊刑齊猾夏其儀尚矣天子道穆三象功清六合截海來威窮荒揆教將以靜流服度藩畿削除淩暴昭蘇寡弱乃命元宰兵部尚書燕公專節朔方授律㣥帥涉河之外距關之西公皆統之重分閫也公智以開物精以造微文為一變之英武有萬人之敵歷登庶尹王猷載寧三宅台衡帝采惟亮雖坐堂足以制勝而勤國忘其定居閹茂次年仲夏貞閏拜手東洛馳軺北闕備官而行成旅以從是日也景風司至星火殷宵伯趙鳴而戒陰爽鳩習而揚武賦可以升高望遠詩可以出宿餞行有詔具寮爰開祖宴且申後命寵以蕃錫天章賦別御札題箋副衣表挾纊之誠兼閫喻投醪之旨筐篚以將其貺筆硯以表其文前載未書今冊斯覩侍中安陽公以仁體國中書令河東公以德熙朝燮贊功成訏謨景暇慕采薇之興張伐木之朋詢彼旬師卜茲郊候鼎門右轉歧路旁分當闕塞之斷山接華林之高樹幕人宿設重帟雲平大官饔舉百羞霞錯四夏六允之變朱干玉羽之容雷殷川原電烻林薄朝傾多士巷無居人接蓋陰衢揚袂風野羽觴遞進列座酣而不譁清鐃閒發將士激而逾厲視日知其吉氣吹律驗其商聲則己景列穹都風騰沙漠西域輕郅支之使東胡息冒頓之虞顧夫南仲于征吉甫薄伐不其遠也若木還照前茅啓行聽闐闐之去鼓目悠悠之轉斾歌事者每懷靡及念離者跂豫望之成志在心發言同唱天子有念式敘清風請編出車之什以繼蒸人之雅敬忠中宗朝監察御史張仁願在朔方奏判軍事遷吏部司勳郎中開元中為左散騎常侍益州大都督府長史劍南道節度大使攝御史中丞本道採訪經略大使右內品官毛懷景道士王仙卿等使伏奉閏十二月十一日墨敕蜀州青城先有常道觀其觀所置元在青城山中聞有飛赴寺僧奪以為寺州既在卿節度檢校勿令相侵觀還道家寺依山外舊所使道佛兩所各有區分者臣差判官宣義郎彭州司倉參軍楊璹往青城山准敕處置其飛赴寺佛事及僧徒等以今月九日並移於山外舊所安置訖又得常道觀三綱甘道榮等狀稱奉敕移飛赴寺依山外舊所觀還道家今蒙使司對州縣官及僧等准敕勒還觀訖更無相侵者其山中先緣寺界所有竹木等寺既出居山外觀今置在山中務使區分不令侵競臣巳牒所管州縣亦許觀家收領訖謹附采藥使內品官毛懷景奏狀以聞謹奏自然木文真容隱起神迹殊妙洗削愈明非圖畫所能成非雕刻所能及伏以太上老君先天大聖變化不常潛現難測瑞花旁繞知芳輝之不歇華蓋上浮明魄寶之常貴現於殿柱杳疑作史之年照彼佛祠緬若化胡之日雖鳳巢軒閣麟伏周庭豈若仙祖降靈聖孫膺運伏望冊歡九廟昭配兩儀編付史官布告天下若水字子泉恆州藳城人第進士纍遷右臺監察御史開元中拜戶部侍郎再為尚書右丞卒臣若水言臣伏以方今九扈時忙三農作苦田夫擁耒蠶婦持桑而以此時採捕奇禽異鳥供園池之玩遠自江嶺達於京師水備舟船陸倦擔負飼之以魚肉閒之以稻粱道路觀者豈不以陛下賤人貴鳥也陛下方當以鳳凰為凡鳥麒麟為凡獸即鵁鶄鸂鶒曷足貴也陛下昔龍潛藩邸備歷艱虞今氛祲廓清高居九五玉帛子女充於後庭職貢珍奇盈於內府過此之外復何求哉臣承國厚恩超居重任草芥殘命常欲殺身以效忠葵藿微心常願墮肝以報主瞻望庭闕敢布腹心直言忤旨甘從鼎鑊欽明等本自腐儒素無操行崇班列爵實為叨忝而涓塵莫效諂佞為心遂使曲臺之禮圜丘之制百王故事一朝墜失所謂亂常改作希旨病君人之不才遂至於此今聖朝馭歷良臣入用惟茲小人猶在朝列臣請並依黜削以肅周行澤蒲州解人景雲中拜監察御史開元中纍遷太子右庶子出為鄭州刺史卒贈兵部侍郎臣聞藥不毒不可以蠲疾詞不切不可以補過是以習甘旨者非攝養之方邇諛佞者積危殆之本臣實愚朴志懷剛勵或聞政之不當事之不直常慷慨關心夢寐懷憤每願殉身以諫伏死而爭但利於社稷有便於君上雖蒙禍被難殺身不悔也伏惟皇帝陛下聰明齊聖孝悌通神樂善好諫除繁去惑不邇聲色不殖貨利仁明睿哲有過於堯舜然而刑政德教或乖於典則若不革弊易轍塞源拔本愚竊料未臻於太平竊見神龍以來㣥邪作孽法網不振綱維大紊實由內寵專命外嬖擅權因貴憑寵賣官鬻爵朱紫之榮出於僕妾之口賞罰之命乖於章程之典妃主之門有同商賈舉選之署實均闤闠屠販之子悉由邪而忝官黜斥之人咸因姦而冒進天下為亂社稷幾危賴陛下聰明神武拯其將墜此陛下耳目之所親擊固可永為炯誡者也臣聞作法於理猶恐其亂作法於亂誰能救之祇如斜封授官皆是僕妾汲引迷謬先帝昧自前朝豈是孝和情之所憐心之所愛陛下初即位時納姚元之宋璟之計所以咸令黜之頃日以來又令敘之將謂為斜封之人不忍棄也以為先帝之意不可違也若斜封之人不忍棄也是韋月將燕欽融之流亦不可褒贈也李多祚鄭克義之徒亦不可清雪也陛下何不能忍於此而獨能忍於彼使善惡不定反覆相攻使君子道銷小人道長為邪者獲利為正者銜冤奈何導人以為非勸人以為僻將何以懲風俗將何以止姦邪今海內咸稱太平公主令胡僧慧範曲引此輩將有誤於陛下矣謗議盈耳咨嗟滿衢故語曰姚宋為相邪不如正太平用事正不如邪書曰無偏無陂遵王之義無反無側王道正直臣恐因循流近致遠積小為大纍微起高勿謂何傷其禍將長勿謂何害其禍將大又賞罰之典紀綱不謬天秩有禮君爵有功不可因怒以妄罰不可因喜以妄賞伏見尚醫奉御彭君慶以邪巫小道超授三品奈何輕用名器加非其才昔公主為子求郎明帝不許今聖朝私愛賞及憸人董狐不亡豈有所隱臣聞賞一人而千萬人悅者賞之罰一人而千萬人勸者罰之臣雖未覩聖朝之妄罰已覩聖朝之妄賞矣書曰官不及私昵惟其能爵罔及惡德惟其賢臣恐近習之人為其先容有謬於陛下也惟陛下熟思而察之雖往者不可諫而來者猶可追願杜請謁之路塞恩幸之門鑒誡前非無纍後悔申畫一之法明不二之刑不詢之謀勿庸無稽之言勿聽則天下之化人無閒焉日新之德天鑒不遠頃者韋氏險詖姦臣同惡賞罰紊弛綱紀紛綸政以賄成官因寵進言正者獲戾行殊者見疑海內寒心實將莫救賴神祇祐德宗廟降靈天討有罪人用丕保陛下睿謀神聖勇智聰明安宗廟於巳危拯黎庶於將溺今龐眉鮐背歡欣踴躍望聖朝之撫輯聽聖朝之德音今陛下蠲煩省徭法明德舉萬邦愷樂室家胥慶臣又聞危者安其位也亡者保其存也亂者有其理也伏惟陛下安不忘危理不忘亂存不忘亡則克享天心國家長保矣詩曰罔不有初鮮克有終伏惟陛下慎厥終惟其初非禮勿視非禮勿聽非禮勿言非禮勿動書曰爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗甚可畏也甚可懼也伏惟陛下慎之哉夫驕奢起於親貴綱紀亂於寵幸願陛下禁之於親貴則天下風隨矣制之於寵幸則天下法明矣詩云刑于寡妻至于兄弟以御于家邦若親貴為之而不禁寵幸撓之而見從是政之不行令之不一則姦詐斯起暴亂生焉雖嚴刑峻政朝施暮戮而法不行矣縱陛下親之愛之莫若安之福之寵祿之過罪之漸也非安之也驕奢之淫危之本也非福之也前事之不忘後事之師也伏惟陛下精求俊哲朝夕納諫縱有逆於耳謬於心者無速之以罰姑籌之以道省於厥躬雖木朴妄忤願恕之以直用開諫諍之路也或有順於耳便於身者無急之於賞當求諸非道稽之典訓其不叶於德必置之以法用杜側媚之行也有進淫巧於陛下者遽黜之則淫巧息矣有進忠讜於陛下者遽賞之則忠讜進矣臣又聞生於富者驕生於貴者傲石碏曰臣聞愛子教之以義方弗納於邪驕奢淫逸所自邪也書曰罔淫于逸罔遊于樂穆王有命曰實賴前後左右有位之士繩愆糾謬格其非心今儲宮肇建王府初啓至於僚友必惟妙擇若因親舊率情奏請恐非其人懼纍於德今驕奢之後流波未變慢遊之樂餘風或存夫小人弄臣易合於意奇伎淫巧多適於心臣恐狎於非德滋為奢怠書曰慎乃僚無以巧言令色便僻側媚其惟吉士僕臣正厥后克正僕臣諛厥后自聖伏願採溫良博聞之士恭儉忠鯁之人任用以為東宮及諸王府官仍請東宮量署拾遺補闕之職令朝夕講論出入侍從受以訓詁交修不逮臣又聞馳騁田獵令人發狂名教之中自有樂地承前貴戚鮮克由禮或打毬擊鼓比周伎藝或飛鷹奔犬盤遊藪澤此甚為不道非進德修業之本也書曰內作色荒外作禽荒又曰無若丹朱傲惟慢遊是好朋淫于家用殄厥代伏惟陛下誕降謨訓敦勸學業示之以好惡陳之以成敗以義制事以禮制心圖之於未萌慮之於未有則福遐祿厚與國並休矣臣又聞富不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至信矣斯語明哉至誡頃者韋庶人安樂公主武延秀等可謂貴矣可謂寵矣權侔人主威震天下然怙侈滅德神怒人棄豈不謂愛之太極富之太多不節之以禮不防之以法終轉吉為凶變福為禍諺曰千人所指無病自死不其然歟書曰殷鑒不遠在彼夏王今陛下何勸豈非皇祖謨訓之則也今陛下何懲豈非孝和寵任之甚也禮曰愛而知其惡憎而知其善可不慎哉夫寵愛之心人則不免去其太甚間之禮節適則可矣今諸王公主駙馬亦陛下之所親愛也矯枉之道在於厥初鑒戒之義其則不遠使觀過務善居寵思危庶夙夜惟寅聿修厥德經曰在上不驕高而不危所以長守貴也制節謹度滿而不溢所以長守富也富貴不離其身然後能保其社稷書曰制官刑警于有位敢有恆舞于宮酣歌于室時謂巫風敢有徇于貨色恆于遊畋時謂淫風敢有侮聖言逆忠直遠耆德比頑童時謂亂風惟茲三風十愆卿士有一于身家必喪邦君有一于身國必亡甚可畏也甚可懼也伏惟陛下必察而明之必信而勸之有奢僭驕怠者削其祿封有朴素修業者錫以車服以勗其心使其奉命無使久而忽之無使遠而墜之臣聞知之非艱行之惟艱又曰常厥德保厥位厥德匪常九有以亡伏惟陛下慎之哉前車之覆實惟明證先王之誡可以終吉若陛下奉伊尹之訓崇傅說之命不作無益不啓私門刑不差賞不濫則惟德是輔惟人之懷天祿永終景福是集儻陛下忽精一之德開恩幸之門爵賞有差刑罰無當則忠臣正士亦不復談矣不見所欲使心不亂是知見可欲而心必亂矣竊見慶立雕製詭物造作奇器用浮巧為珍玩以璚怪為異寶乃治國之巨蠹明王所以嚴罰者也昔露臺廉費明君不忍象箸非大忠臣憤歎王制曰作異服奇器以疑衆者殺月令曰無作淫巧以蕩上心巧謂奇技怪好也蕩謂惑亂情欲也今慶立欲求媚聖意搖蕩上心陛下信而使之乎是宣淫於天下慶立矯而為之乎是禁典之所無赦陛下新即位固宜昭宣菲薄廣示節儉豈可以怪好示四方哉
