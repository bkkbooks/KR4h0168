front:
  text: 全唐文欽定全唐文卷七太宗四
  hash: sha256:1cba29c2fb9c82e2c954799712548dc7891f3e3a6daf59e3262321e369aba76b
body:
  text: 自古皇王褒崇勳德既勒銘於鐘鼎又圖形於丹青是以甘露良佐麟閣著其美建武功臣雲臺紀其迹司徒趙國公無忌故司空揚州都督河間元王孝恭故司空萊國文成公如晦故司空相州都督太子太師鄭國文貞公徵司空梁國公元齡開府儀同三司尚書右僕射申國公士廉開府儀同三司鄂國公敬德特進衛國公靖特進宋國公瑀故輔國大將軍揚州都督褒忠壯公志元輔國大將軍夔國公宏基故尚書左僕射蔣忠公通故陝東道大行臺尚書右僕射鄖節公開山故荊州都督譙襄公柴紹故荊州都督邳襄公順德雒州都督鄖國公張亮光祿大夫吏部尚書陳國公侯君集故左驍衛大將軍郯襄公張公謹左領軍大將軍盧國公程知節故禮部尚書永興文懿公虞世南故戶部尚書渝襄公劉政會光祿大夫戶部尚書莒國公唐儉光祿大夫兵部尚書英國公李績故徐州都督胡壯公秦叔寶等或材推棟梁謀猷經遠綱紀帷帳經綸霸圖或學綜經籍德範光煒隱犯同致忠讜日聞或竭力義旗委質藩邸一心表節百戰標奇或受脤廟堂闢土方面重氛載朗王略遐宣並契闊屯夷劬勞師旅贊景業於草昧翼淳化於隆平茂績嘉庸冠冕列辟昌言直道牢籠搢紳固以瞻伊呂而連衡邁方召而長騖者矣宜酌故實宏茲令典可並圖畫於凌煙閣庶念功之懷無謝於前載旌賢之義永貽於後昆地記之設繇來尚矣區外具於山經海內陳於夏載職方王制才舉淮夷漢志晉圖略記郡國自茲以降著作實繁或學非博通多所遺闕或地分南北雅有短長求其折中無聞盡善左武大將軍雍州牧相州都督魏王泰體業貞固風鑒凝邈學綜策府文冠詞林樂善表於夙夜好士彰於吐握討論輿地詳延儒雅博采方志得之於舊聞旁求故老考之於傳信內殫九服外極八荒憲章之規條目有序戎夏之域今古無遺而能周博而尤要足以度越前載垂之不朽宜加褒錫以申獎勸可賜物一萬段其書宜付祕閣吾嘗誡汝勿近小人正為此也汝素乖誠德重惑邪言自延伊禍以取覆滅痛哉何愚之甚也為梟為獍忘孝忘忠擾亂齊郊誅夷無罪去維城之固就積薪之危壞盤石之基為尋戈之釁背禮違義天地所不容棄父無君神人所共怒往是吾子今為國讎萬紀存為忠烈死不妨義汝則生為賊臣死為逆鬼彼則嘉聲不隕而爾惡迹無窮吾聞鄭叔漢戾並為猖獗豈期生子乃自為之吾所以上慚皇天下愧后土惋歎之甚知復何云去冬之間雪無盈尺今春之內雨不及時載想田疇恐乖豐稔農為政本食乃人天百姓嗷然萬箱何冀昔頽城之婦隕霜之臣至誠所通感應天地今州縣獄訟常有冤滯者是以上天降鑒延及兆庶宜令覆囚使至州縣科簡刑獄以申枉屈務從寬宥以布朕懷庶使桑林自責不獨美於殷湯齊郡表墳豈自高於漢代朕聞死者終也欲物之反於真也葬者藏也欲人之不得見也上古垂風未聞於封樹後聖貽則始備於棺槨譏僭侈者非不愛其厚費美儉薄者實亦貴其無危是以唐堯聖帝也穀林有通樹之説秦穆明君也士冖柘泉無邱隴之處仲尼孝子也防墓不墳延陵慈父也嬴博可隱斯皆懷無窮之慮成獨決之明乃便體於九泉非徇名於百代也洎乎闔閭違禮珠玉為鳬鴈始皇無度水銀為江海季孫擅魯斂以璠璵桓魋專宋葬以石槨莫不因多藏以速禍由有利而招辱元廬既發致焚如於夜臺黃腸再開同暴骸於中野詳思曩事豈不悲哉由此觀之奢侈者可以為戒節儉者可以為師矣朕居四海之尊承百王之弊未明思化中宵載惕雖送往之典詳諸儀制失禮之禁著在刑書而勳戚之家多流遁於習俗閭閻之內或侈靡而傷風以厚葬為奉終以高墳為行孝遂使衣衾棺槨極雕刻之華靈輀明器窮金玉之飾富者越法度以相尚貧者破資産而不逮徒傷教義無益泉壤為害既深宜為懲革其王公以下爰及黎庶自今以後送葬之具有不依令式者仰州府縣官明加檢察隨狀科罪在京五品以上及勳戚之家仍録奏聞肇有皇王司牧黎庶咸立上嗣以守宗祧固本忘其私愛繼世存乎公道故立季歷而樹姬發隆周享七百之期黜臨江而罪戾園炎漢定兩京之業是知儲副之寄社稷繫以安危廢立之規鼎命由其輕重詳觀歷代安可非其人哉皇太子承乾地惟長嫡位居明兩訓以詩書教以禮樂庶宏日新之德以永無疆之祚而邪僻是蹈仁義蔑聞踈遠正人親昵㣥小善無微而不背惡無大而不及酒色極於沈荒土木備於奢侈倡優之技晝夜不息狗馬之娛盤遊無度金帛散於姦慝捶楚遍於僕妾前後愆過日月滋甚朕永鑒前載無忘正嫡恕其瑕釁倍加訓誘選名德以為師保擇端士以任官僚猶冀中人之性可以上下蟠木之質可以為容愚心不悛凶德彌著自以久嬰沈痼心憂廢黜納邪説而違朕命懷異端而疑諸弟恩寵雖厚猜懼愈深引姦回以為腹心聚臺隸而同遊宴鄭聲淫樂好之不離左右兵凶戰危習之以為戲樂既懷殘忍遂行殺害然其所愛小人往者巳從顯戮謂能因茲改悔翻乃更有悲傷行哭承華制服博望立遺形於高殿日有祭祀營窀穸於禁苑將議加崇贈官以表愚情勒碑以紀凶迹既傷敗於典禮亦驚駭於視聽桀跖不足比其惡行竹帛不能載其罪名豈可守器纂統承七廟之重入監出撫當四海之寄承乾宜廢為庶人朕受命上帝為人父母凡在蒼生皆存撫育況乎冢嗣寧不鍾心一旦至此深增慙歎昔者哲王受圖上聖垂範建儲二以奉宗廟總監撫以寧邦國既義在於至公亦事兼於權道故以賢而立則王季興周以貴而升則明帝定漢詳諸方册豈不然乎并州都督右武大將軍晉王治地居茂親才惟明哲至性仁孝淑質惠和夙著夢日之祥早流樂善之譽好禮無倦強學不怠今承華虛位率土繫心疇咨文武咸所推戴古人云知子莫若父知臣莫若君朕謂此子實允衆望可以則天作二可以守器承祧永固百世以貞萬國宜立治為皇太子可令所司備禮册命朕聞生育品物莫大乎天地愛敬罔極莫重乎君親是故為臣貴於盡忠虧之者有罰為子在於行孝違之者必誅大則肆諸市朝小則終貽黜辱雍州牧相州都督左武大將軍魏王泰朕之愛子實所鍾心幼而聰令頗好文學恩遇極於隆重爵位窮於寵章不思聖哲之戒自搆驕僭之咎惑讒諛之言信離間之説以承乾雖居長嫡久纏疴恙潛有代立之望靡遵義方之則承乾懼其淩奪泰亦日增猜沮爭結朝士競引凶人遂使文武之官各有託附親戚之內分為朋黨朕志存公道義在無偏彰厥巨釁兩從廢黜非惟作則四海亦乃貽範百代可解泰雍州牧相州都督左武大將軍并削爵土降為東萊郡王朕觀前烈建國君臨未有不藉忠良而能濟其功業者也朕顯承宗祀獲奉鴻基側席求賢有年載矣而山林莫致珍玩必臻豈朕好惡之情未達於下其令州縣舉孝廉茂才好學異能卓犖之士朕以寡德祗膺寶命而政慚稽古誠闕動天和氣愆於陰陽亢旱涉於春夏靡愛斯牲莫降雲雨之澤詳思厥咎在豫一人今避茲正殿以自克寸責尚食常膳亦宜量減京官五品巳上各進封事極言無隱朕將親覽以答天譴皇太子治忠孝成德志業光茂地惟儲副寄深監撫兼統禁旅實允舊章宜知左右屯營兵馬事其大將以下並受處分懷遠之規前王令典繼世之義列代舊章高麗王嗣子藏器懷韶敏識宇詳正早習禮教德義有聞肇承藩業誠款先著宜加爵命允茲故實可上柱國封遼東郡王高麗王遣使持節册命朕聞上靈之應疾於影響茂祉之興積於年代朕嗣膺寶歷君臨區宇憑宗社之介福賴文武之同心時無風塵之警野有京坻之積厚地降祉貞石表祥瑩翠色而流光發素質而成字前紀厥初之德次陳卜年之永後述儲二之美並名字昭然楷則相次曠代之所未聞故老之所未覩猥以寡德虔奉成命緬惟往載良增兢惕自天之佑豈惟一人無疆之福方覃九土自非大報泰壇稽首上帝則靡申奉天之志寧副臨下之心今年冬至有事南郊所司率繇舊典朕嗣守宗祧夙夜寅懼憂勤在於政道撫育遍於含生十七載於茲矣上元儲祉貞石表瑞朕式備禋燎躬謝蒼旻逮於儲兩亦申虔奉朔風既切飛雪載零及登泰壇六合開朗神祇介福豈獨在豫和樂之慶宜被率土可賜酺三日自漢魏以來或賜牛酒牛之為用耕稼所資多有宰殺深乖惻隱其男子年七十已上量給酒米麵梁州管內大辟罪巳下見禁囚皇太子慮過諸州並遣使人分往唯十惡不在慮限餘皆量情降宥焉吾昨見麞鹿懷孕者多縱有空身其子甚小母亡而子存者未之有也吾與汝雖復不射無仁心之人得便終無放理昆蟲無知須推己以及也推己之孝於父母以及此類則天下有識者懷之推己之惡死以及蟲豸含生之屬何有不賴所以明日不行百濟高麗恃其僻遠每動兵甲侵逼新羅新羅日蹙百姓塗炭遣使請援道路相望朕情深愍念爰命使者詔彼兩蕃戢兵敦好而高麗姦惑攻擊未巳若不拯救豈濟倒懸宜令營州都督張儉守左宗衛率高履行等率幽營二都督府兵馬及契丹奚靺鞨往遼東問罪行師用兵古之常道取亂侮亡先哲所貴高麗莫離支蓋蘇文弒逆其主酷害其臣竊據邊隅肆其蜂蠆朕以君臣之義情何可忍若不誅翦遐穢無以澄肅中華今欲巡幸幽薊問罪遼碣行止之宜務存節儉所過營頓無勞精飾食唯充飢不須珍膳水可涉度者無假造橋路可通行者不勞修理御營非近縣學生老人等無煩迎謁隋室淪亡其源可覩良繇智略乖於遠圖兵士疲於屢戰政令失度上下離心德澤不加於匹夫刻薄彌窮於萬姓當此時也高麗之主仁愛其人故百姓仰之如父母煬帝殘暴其下故衆庶視之如仇讎以思亂之軍擊安樂之卒務其功也不亦難乎何異入水而惡其濡踐雪而求無迹朕緬懷前載撫躬內省昔受鉞專征提戈撥亂師有經年之舉食無盈月之儲至於賞罰之信尚非自決然猶所向風靡前無橫陳蕩氛霧於五嶽翦虎狼於九野定海內拯蒼生然則行軍用兵皆億兆所見豈煩言哉及端拱巖廊定策帷扆身處九重之內謀決萬里之外北殄胸奴種落有若摧枯西滅吐谷渾高昌易於拾芥包絶漠而為苑跨流沙而為池黃帝不服之人唐堯不臣之域並皆委質奉貢歸風順軌崇威啓化之道此亦天下所共聞也況今豐稔多年家給人足餘糧栖畝積粟紅倉雖足以為兵儲猶恐勞於轉運故多驅牛羊以充軍食人無裹糧之費衆有隨身之廩如斯之事豈不優於曩日加以躬先七萃親決六奇使攻無所守戰無所拒略言必勝之道蓋有五焉一曰以我大而擊其小二曰以我順而討其逆三曰以我安而乘其亂四曰以我逸而敵其勞五曰以我悅而當其怨何憂不克寸何慮不摧可布告元元勿為疑懼耳觀乎天道鼓雷霆以肅萬物求諸人事陳金革以威四方雖步驟殊時質文異制其放殘殺禁暴虐戮干紀討未賓莫不扶義而申九伐文德昭於率土因時而董三令武功成於止戈朕祗膺寶歷君臨宇縣憑宗社之靈藉卿士之力神祇儲祉夷夏宅心故上柱國遼東郡王高麗王高建武夙披丹款早奉朝化忠義之節克著於嵎夷職貢之典不愆於王會而其臣莫離支蓋蘇文包藏凶慝招集不逞潛懷異計奄行弒逆冤酷纏於濊貊痛悼徹於諸華纂彼藩緒權其國政法令無章賞罰失所下陵上替遠怨邇嗟加以好亂滋甚窮兵不息率其㣥凶之徒屢侵新羅之地新羅喪土憂危日深遠請救援行李相屬朕愍其倒懸之急爰命輶軒之使備陳至理喻以休兵曾不知改莫遵朝命窺窬亭障首鼠窟穴完聚更切賦斂尤繁丁壯盡於鋒刃羸老弊於版築久廢耕桑咸罹飢饉生肉表異顯其亡徵雨血為妖彰其數盡比室愁苦闔境哀惶華髮青襟不勝苛政延頸企踵思沾王澤昔有苗弗率勞大禹之駕葛伯仇餉動成湯之師況亂常巨寇紊三綱而肆逆滔天元惡窮五刑而莫大者哉朕所以宵衣興慮日旰忘食討罪之意既深於投袂救人之義彌軫於納隍類上帝而戒途詔夏官而鞠旅可先遣使持節遼東道行軍大總管英國公績副總管江夏郡王道宗士馬如雲長驅遼左奮夷嶽之威屠豕蛇於險瀆乘建瓴之勢斬鯨鯢於鏤方行軍總管執失思力行軍總管契苾何力率其種落隨機進討契丹蕃長於勾折奚蕃長蘇支燕州刺史李元正等各率其衆絶其走伏使持節平壤道行軍大總管張亮副總管常何總管左難當等舟楫相繼直指平壤新羅王金善德傾其城邑竭其府藏荷不資之澤復纍葉之讎出樂浪而衝腹心臨沃沮而蕩巢穴百濟王扶餘義慈早著丹款深識時機棄歷稔之私交贊順動之公戰贏糧蓄鋭唯命是從凡此諸軍萬里齊舉頓天羅於海浦橫地網於遼陽朕然後經塗白狼之右親巡元菟之城執薣鼓而戒六軍載太常而麾八陳使流湯者魚爛握炭者冰消誅渠魁於惡稔弔黎庶於厥角其或擁衆立功或行間自拔宜宏寬大各復農土有勞者當加其賞懷能者不滯其才如其長惡莫悟迷途遂往斧鉞既下必嬰喪元之悲玉石一焚徒軫噬臍之嘆具宣朕旨咸使知聞朕比尋討經史明王聖帝曷嘗無師傅哉前所進令遂不覩三師之位黃帝學太顛顓頊學緑圖堯學尹壽舜學務成昭禹學西王國湯學威子伯文王學子期武王學虢叔前代聖王未遭此師則功業不著乎天下名譽不傳乎載籍況朕接百王之末智不同聖人其無師傅安可以臨兆民者哉詩不云乎不愆不忘率由舊章夫不學則不明古道而能致太平者未之有也可即著令置三師之位非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由茲道形神心氣非此為勞今聞讜言虛懷以改聞師訪道殊域今得歸還歡喜無量可即速來與朕相見其國僧解梵語及經義者亦任將來朕巳敕于闐等道使諸國送師人力鞍乘應不少乏令燉煌官司於流沙迎接鄯善於沮沫迎接昔望諸列國之相漢主尚求其後夷吾霸者之臣魏君猶禮其墓況乎正直之道邁青松而孤絶忠勇之操掩白玉而振彩者哉殷故少師比干貞一表德臣鄰成性以明允之量屬無妄之辰玉馬遽馳愍其邦之殄悴寶衣將燎惜其君之覆亡見義不回懷忠蹈節讜言才發輕百齡之命淫刑既逞碎七尺之軀雖復周王封墓莫救焚原之禍孔聖稱仁寧逭剖心之痛固巳冤深終古悼結彼蒼朕觀風趙北問罪遼東經途秀麥之墟緬懷梓林之地駐蹕而瞻荒隴願以為臣撫躬而想幽泉思聞其諫豈可使盡忠之義久闕於往册揚名之典無聞於後代宜錫寵命以展夙心可追贈太師諡曰忠烈公仍遣三品持節祭告四品為副封崇其墓修葺祠堂州縣春秋二時祀以少牢給隨近五戶以供祭享及灑掃朕以寡薄君臨區夏奉神祇之永命當億兆之重責宵衣旰食憂六宮之未安寒心銷志懼一物之失所濊貊僻遠豺狼縱毒元凶尚稽乎天罰遺黎久陷於坑穽朕是以發自瀍澗言巡遼碣命元戎以先驅播凱澤於遐裔省方之務既勞於躬親監國之重允屬於儲二皇太子治溫文表德睿哲日躋仁孝之誠彰於溫凊絃誦之美著於膠庠禮義既茂徽猷彌遠委以賞罰之權任以軍國之政詳諸前載實惟令典發定州巡遼左之後宜令太子治監國其宗廟社稷百神咸令主祭軍國事務並取決斷省所奏悲感何言天地運流弓劒渺邈方寸久亂泣血無追憂乃終身豈惟一日哀以內結非假外彰今既戎旅事大不可失在機速昔周武伐殷載廟在道雖多虧小禮而功成大孝往賢之道可不遵歟所以仰順古風俯從今請臨紙摧心慟焉如割五兵爰始軒皇戰於阪泉七德收基唐帝克寸於丹浦莫不除剪暴逆克濟生靈斥土開疆威加四海朕欽承寶歷削平天下六合之內咸以為家三光所臨義無偏照繇是環裨之表咸渺渺以航深垓宇之中盡容容而面內而島夷陪隸虐殺其君毒被朝鮮災流濊貊幼孤者不勝苛暴忠概者仰我來蘇朕言念匪人深懷夕惕親御戎軒躬執金鼓意在以殺止殺仁育被於㣥生用刑清刑義征戡於不譓廓滔天而調雨露擒猾夏以正封疆用此佳兵事非獲巳仰申天罰遂乃龔行先命行軍大總管英國公績行軍總管張儉等率領驍鋭元戎啓行北狄西戎之酋咸為將帥奚霫契丹之旅皆充甲卒如貔億計躍馬千㣥總萃遼東之城攻其南面副大總管江夏郡王道宗第一軍總管虢國公張士貴等率五陵之徑騎董六郡之良家分麾引道攻其西面申命前軍大總管夔國公宏基等分統猛士填其濠塹賊據城臨險激梁水以環流聳堞淩雲壓頽山而靡懼於是雲羅四合地道九攻危城倏巳復隍湯池俄而失險猶且析骸窮壘壁巢幕以偷安轉骨深溝坐積薪而待燎愍其塗炭申其再造頻加誨誘固執迷塗繇是猛士衝冠壯夫挺劒咸頓首於馬前請因機而電掃難違衆議爰詔許之乃分命諸軍四面雲合朕登高迥矚授其節度又命檢校太常卿鄂國公敬德領黃門之軍樂奏元雲之雅歌將帥聞而增憤士卒繇其作氣於時凍雨初晴驚風漸急聊命縱火數處熸然焚其樓雉並為煨燼合城男子面縛軍門取彼渠魁屬之司敗千載逋寇一朝清蕩斯並宗廟威靈上元幽贊忠臣猛將盡節陳謀徑卒勇夫輕身效命協同心力成此大功豈朕一人獨能致此今茲克寸捷普天同慶宜令頒下咸使聞知日者隋師度遼時非天贊從軍士卒骸骨相望遍於原野良可哀嘆掩骼之義抑惟先典其令並收瘞之上天之道先德而後刑王者之師有征而無戰是以炎農翦暴夙沙自縛其君元德一興有苗不固其險朕勞神濟物用百姓而為心則天宏化環四海而開宇義非獲巳繇是舉兵每蓄哀矜深存宥罪自濟遼水先令告喻而蓋牟不革其面遼東猶抗其斧既觸天網遂縱兵鋒未展鷹揚巳皆魚爛朕乃鼓行乘勝師次白巖凶徒相率登陴拒守因山搆壘仰切浮雲縈澗疏隍下臨無景妖氛蝟聚如憑劒閣之深同惡鴟張若負洞庭之險乃命行軍大總管英國公績等統咀彘冠雞之將率挈黿斬蛟之士石發甚於星霣樓毀同於山壤朕憫彼同焚情深惻隱乃親御八駿幸敕三軍賊既倒懸方思轉禍積甲齊於熊耳獲庾方於海陵建十州之旗各復於桑梓反三韓之士不易於農肆焚櫬錫爵驅馳遼浿之間鑿井耕田編列辨辰之野古人有言曰全國為上蓋斯之謂焉又燕碣土風素多霖霔軒皇遭召雨之寇晉后苦涌水之災自朕出師上靈幽贊旭日澄靄膚雲輟陰所指未有堅城所向乃無完陳天道人事義等合符窮穴傾巢庶將非遠宜以大慶頒示普天上帝明威鼓雷霆而震曜先王仗順用甲兵而弔伐故能經綸九野清滌八荒二十七征元王創其鴻業五十二戰黃運垂其大名騰有國之英猷光列代之通典朕荷構乾象大庇㣥生池濛泛而苑扶桑紐天紘而疆日域蠢茲皮服敢亂天常但折彼螽股何俟五丁之力射其雀目無假萬弩之機然以先聖救焚成言援手自惟己任是用躬親故知矢石交前非勝巖廊之道介胄為飾不逮旒冕之容若命將以授戈愧奉身而役物爰親征而沐雨務勞形以安衆一義宜鑒所向弗違自涉遼陽受降之城纍築曾未期月獻凱之歌日奏傳烽告捷異往昔之照甘泉資敵為糧矯向時之挽紅粟復以今日中攻其安市城重圍四布勢同三板之危縣命短晨哀其守陴之哭高麗偽主掃其境內罄茲驍鋭咸發從軍爰自平壤長驅影援有徒十五萬連旗三十里煙火稽天若黃蛇之吐霧彀騎橫野邁赤蟻之為㣥朕私心計其地形屈指籌其破日分命衆將各稟新書臨事設奇因機制變行軍大總管李績率總管虢國公張士貴等馬步軍十四總管當其西南面又命趙國公無忌率馬步軍二十六總管馳自東谷合其來道抵背扼喉塞其歸路朕乃潛師偃斾登於北山候彼交鋒於茲聳轡若處中天之闕俯周宮於目前如登太嶽之岑觀魯封於掌內出其不意凶徒遂擾初為一陳四拒績軍及此三分因而大潰流血川溢滄波為之暫丹斬級彌山顱骨以之成嶽蓋由鏑鋒交下玉石同湮雖則可哀理無兼濟其兵將大耨薩延壽惠真率其餘衆一心輸款但高麗國政本闕二人今總委偽軍隻輪不返大慶允集益深祗懼可歸美清廟昭告懋功頒示萬邦賜酺三日自莫離支為主官以賄成單貧之家困於稅斂一馬匹布隻兔纖鱗或進域主或輸耨薩其有自給類加箠楚編戶飢寒莫知告訴至斯責罰即用夷刑反接鞭笞下手無數瘡深快意然後乃巳所以陳兵伐罪兼暢皇風使懷附之徒同霑聲教息彼貪殘除其弊俗今遼東之野各置州縣或有舊法餘風未殄宜即禁斷令遵國憲西戎賢相寵光秦册北夷嗣子榮珥漢貂羈以長纓用表元功之大掩茲宏網式昭天覆之博高麗位頭大兄理大夫後部軍主高延壽大兄前部軍主高惠真等并馬韓酋長鯷海英髦分羲景於扶桑數鍾天厭竊封疆於孤竹自貽神怒臨危轉禍率衆來降申其膝行之敬成其面縛之禮向風舉踵良足可嘉咸宜收其俊才嗣鳥官於郯子録其成效映龜組於梅鋗延壽可鴻臚卿惠真可司農卿授以勳級本據有功若不優異無繇勸獎今討高麗其從駕爰及水陸諸軍戰陳有功者並聽從高品上纍加朕聞之聖人慎罰觀兵於再駕明王舉事制勝於三年合諸侯以討逆既擒而且縱總海內以除殘臨行而止殺其故何哉信繇上天之德曰生王者之師曰義是以網開三面干舞七旬豈有恣欲稜威取鯨鯢而竭澤覆巢探穴罄麛卵以塗原者乎憬彼島夷僻居鯷壑晉皇淹駕才克一城隋帝頻師淪兵百萬朕光承寶歷司牧普天陶化紫宸法兩儀而導俗推心黔首徇萬宇以勞神纖介不安終宵輟寢蠻陬未艾日旰忘餐是以遠涉天涯比焦原而未險長驅若木譬平圃以非遙憤角遼陽躬親節度摐金海表震曜威靈克寸其元菟橫山蓋牟磨米遼東白巖卑沙麥谷銀山後黃等合一十城凡獲戶六萬口十有八萬覆其新城駐蹕建安合三大陳前後斬首四萬餘級降其大將二人裨將及官人酋帥子弟三千五百兵士十萬人並給程糧放還本土又獲牛馬各五萬館穀十旬不假贏糧之費徒兵纍萬咸發兼乘之歌自夏涉秋係虜相次繇燕及雍襁負不絶緬維湯文取亂嘗懷偃伯之心虞夏勝殘實宏光被之美有懷戢武造次何忘但以賊帥莫離支猶不授首本圖未果志無旋斾忽屬徼外霜嚴海濱寒沍念茲兆衆便命班師朕所向必摧上靈之祐也所攻無敵勇夫之力也方且仰酬元澤展大禮於郊禋賚此勤勞録摧鋒於將士有勳者別頒榮命無勳者並加優恤諸渡遼海人應加賞命及優復者所司宜明為條例具狀奏聞朕將親為詳覽以申後命皇太子愛敬所覃格於四海仁孝所感周於百姓自春監國既處定州首創德風在乎茲境所以事君養民之道有隱無犯之情爰自中山流於率土地居宣化之本人稟純孝之深有足可嘉特須優異其定州管內以孝行聞者宜與宗姓老人同賜宴會小人在列為蠧則深巨猾當樞懷惡必大侍中檢校戶部尚書清苑縣開國男劉洎出自閭伍言行罕稱於國無涓滴之勞在朕匪枌榆之舊但以驅策稍久頗有吏能擢於凡瑣之間收其鳴吠之用超倫越品使居常伯紆青襲紫攝職文昌冀有葵藿之情知慙雨露之澤茲朕行履小乖和豫凡百在位忠孝纏心每一引見涕泗交集洎獨容顏自若密圖他志今行御進狀奏洎乃與人竊議窺窬萬一謀執朝衡自處霍光之地窺弄兵甲擅總伊尹之權猜忌大臣擬皆夷戮朕親加臨問初猶不承傍人執證方始具伏此如可恕孰不可容且皇太子治春秋鼎盛聲溢震方異漢昭之童幼非周成之襁褓輒生負圖之望是有無君之心論其此罪合從孥戮但以夙經任遇不忍梟懸宜免家纍賜其自盡皇太子地在震方禮絶㣥后而令書法式未著彞章近代以來例皆名白謙過逼下書依衆庶無以別貴賤之差將何顯尊卑之序理非通允宜有更張凡處分論事之書皇太子並宜畫令左右庶子以下署名宣奉行書按次畫日其餘與諸親及師傅等書不在此限古人立孝毀不滅身聞卿絶粒殊乖大體宜抑摧裂之情割傷生之纍
