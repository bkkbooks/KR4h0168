front:
  text: 全唐文欽定全唐文卷四百五十八參大歷朝官戶部郎中歷國子司業
  hash: sha256:9ed16f50c783cb1b44996dc863653f93978fa119bb462d49ffd82bd7d7f08871
  markers:
  - {type: head, offset: 14, content: 張參, id: KR4h0168_NFKB_458-h1, level: 1}
body:
  text: 易繫辭曰上古結繩以理後代聖人易之以書契百官以理萬人以察蓋取諸夬夬決也王庭孚號決之大者決以書契也逮周禮保氏掌養國子以道教之六書謂象形指事會意諧聲轉注假借六者造字之本也雖蟲篆變體古今異文離此六者則為謬惑矣王者制天下必使車同軌書同文故教人八歲入小學文有疑者則必闕而求之春秋之末保氏教廢無所取正各遂其私故孔子曰吾猶及史之闕文也今亡矣蓋夫子少時人猶有闕疑之問後亡斯道歎其不知而作之也蕭何漢制亦有著法太史試學童諷書九千字乃得為吏以六體試之吏人上書字或不正輒有舉劾皆正史遺文可得焯知者也劉子政父子校中祕書自史籀以下凡十家序為小學次於六藝之末後漢許叔重收集籀篆古文諸家之學就隸為訓注謂之説文時蔡伯喈亦以滅學之後經義分散儒者師門各滯所習傳記交亂訛偽相蒙乃請刊定五經備體刻石立於太學之門外謂之石經學者得以取法焉遭離變難僅有存者後有呂忱又集説文之所漏略著字林五篇以補之今制國子監置書學博士立説文石經字林之學舉其文義歲登下之亦古之小學也自頃考功禮部課試貢舉務於取人之急許以所習為通人苟趨便不求當否字失六書猶為一事五經本文蕩而無守矣十年夏六月有司以職事之病上言其狀詔委國子儒官勘校經本送尚書省參幸承詔旨得與二三儒者分經鉤考而共決之互發字義更相難極又以前古字少後代稍益之故經典音字多有假借謂若借后為後辟為避大為太知為智之類經典通用陸氏釋文自南徂北遍通衆家之學分析音訓特為詳舉固當以此正之唯今文尚書改就今字刪定月令依其時進本與釋文音訓頗有不同卒以所刊書于屋壁雖未如蔡學之精密石經之堅久慕古之士且知所歸然以經典之文六十餘萬既字帶惑體若冪幂同物禮經相舛蒍薳同姓春秋互出詁故同義詩題交錯之類音非一讀若鄉原之鄉為嚮取材之材為哉兩音出於一家而不決其當否學者傳授義有所存離之若有失合之則難並至當之餘但未發其傍而已猶慮歲月滋久官曹代易儻復蕪汙失其本真乃命孝廉生顏傳經收集疑文互體受法師儒以為定例凡一百六十部三千二百三十五字分為三卷説文體包古今先得六書之要若古文作明篆文作明古文作坐篆文作之類古體經典通行不必改而從篆有不備者求之字林若祧禰逍遙之類説文漏略今得之於字林其或古體難明衆情驚懵者則以石經之餘比例為助若變為宜臸曰變為晉之類説文臸曰人所難識則以石經遺文宜與晉代之石經湮沒所存者寡通以經典及釋文相承隸省引而伸之不敢專也若變為壽鹵木變為栗之類石經湮沒經典及釋文相承作耳近代字樣多依四聲傳寫之後偏傍漸失今則采説文字林諸部以類相從務於易了不必舊次自非經典文義之所在雖切於時略不集録以明為經不為字也其字非常體偏有所合者詳其證據各以朱字記之俾夫觀省無至多惑大歷十一年六月七日司業張參序巡與張參齊名時相李勉辟為判官甚敬禮之崇構邈矣層甍巋然嶷如玉立黕若雲連仰顏滿月危踐中天上標銀榜下列金仙扶持有助陵谷無遷道昌大歷十二年官蘇州觀察使嗚呼萬古邱陵化無再出君是何人能間詩筆何代而亡誰人子姪曾作何官是誰仙室寂寞夜臺悲乎白日不向紙上石中隱出桃源三月緑草垂楊黃鶯百囀猿聲斷腸不題姓字寧辨賢良嗚呼痛哉嘆惜先賢空傳經史終無再還青松嶺上嵯峨碧山孝智大歷八年官祠部員外郎兼侍御史成域中之大歸天下之往曰王王者應歷以宰物酌時以觀化威聲雷霆號令風雨不嚴人理合自然之運不行家至契如神之速德叶協於幽明道徜徉於古始無為無事其大矣哉洎乎澆淳既變仁義斯起偃息庠序棲遲洙泗憲章萬物之首馳騁百王之末清頽波於幽厲扇儒術於殷周故春秋作而亂賊懼風興刪而廉恥生美韶濩而惉懘之音息行揖讓而莊敬之心勸夫子聖者歟名與日月同流業與乾坤終始隱焉而光暗然而彰命服袞裳纍代稱王曲阜聖人之鄉也先是閟宮霞蔽正殿岑立繚以環堵邃其臺門巍若化造嶷如闕一字動允所謂淹中之勝概闕里之全模刺史孟公休鑒德潤尊師道肥希聖研精百代闕三字言夜火非官曹之燭春桑無附枝之詠判官郡功曹盧曈以文發身以清檢物博通闕三字數四科惟此祠廟厥初層搆朱戶半傾雕甍中落難名之閫奧造次可遊如在之闕四字易覩將何以克恭過位加敬及庭於是孟公首之盧公翊之因命縣大夫兼大闕五字裴公新其南門書時也公名有象育元含貞廣學攻文始登甲科吏於舒舒人闕五字等吏於亠兊亠兊人悅服蓄可大之用為致遠之資由是庀乃程具乃役不斬仲闕六字山之石償以石而給功不時而就大屋橫亘雙扉洞開丹栱繡栭膠葛固闕七字景飛簷駢逼而棲霧扃鐍既固享獻聿修官吏惟清肅之謹邑人無褻瀆闕七字席及階而升數仞之牆由戶而入君子以為非孟公之化不行非盧公之闕八字不成三事叶同闕一字底於善孝智不敏儒家之流徒挹春秋舍菜之禮闕九字志不腆之文俾刊永貞之石時大歷八年十二月一日也少真大歷朝官侍御史學以知道行以成德謂修已之不懈則化人而有孚甲括習詩書佩服忠信談經不同於稷下請益其多強學頗類於關西發蒙斯衆既聞講道亦見習儀且享以訓恭射則觀德素木瓠葉足表獻酬之教桑弧蒿矢方昭揖遜之容學不習而則落禮不行而斯壞刑而致詰何迷鄒魯之風習以見尤其如城闕之刺祭遵施之於軍旅尚不云非劉昆列之於家庭且未言失古則可據今何以疑所謂習不違經學無廢業告人昧識徒效西鄰之責言在甲合儀請遵東觀之故事乘代宗朝官倉部員外郎出為吉州刺史受福之祭固存乎肅恭出令以言實在乎頒告繄有司之不腆乃事神而未達不能先備禮物預頒祀典存彼舊章介茲景福雖自牖納約所貴齋心倘入廟未知將何措手若也禮則斯缺人心匪虔信且未孚福將何有且祀有大小罰有重輕大則合置於刑徒小則宜從於笞坐須明大小方辨重輕奚有建立洎乎崩壞必慎傷人無致害物何哉主者會不任能顧彼匠人豈因何巧既無備慮且乏周防遂昧立身果貽誤殺事殊隟壞物異榱崩將壓有契於國僑不弔遂符於戴禮況造作之與毀壞匠人之與主司著皋繇之書合以所由為罪且人誰無死痛其不終宜用明刑以慰幽壤祿秩之序貴有常尊凶喪之儀禮無越等已矣逝者魂兮不來死實生哀歿西山於九夜招之望反將北面而三號既而骨月復歸精魄無象宛其死矣則無不至且祭神不能如在神猶未饗復魂不似其服魂將奚依至若在館在家匪無名數公侯卿士實有彞倫小者則褕狄素紗諸侯乃衮衣冕服未詳甲也其位若何儻有土之公卿御史斯為折角若食菜之鄉士甲也宜從噬膚仲雲代宗朝官左司員外郎樂云鐘鼓詩美琴瑟貴以平心非徒娛耳惟茲四品諧此八音苟嘉樂之可觀在官班而有節況升平之代朝野多歡簫韶之陳獸猶來格家室之際女也何妨未乖至理之宜何速憲司之按此而獲過豈曰知音琨濟南郡鄒縣人代宗朝官左司司封郎中知制誥寒郊已暮兮景氣澄鮮遙林罷色兮古岫蒼然我皇將出豫滌思觀風獵賢於是旭日霽野慶雲靄天指鳳城之香陌得驪阜之甘泉乃乘雕玉之輿駕飛黃之馬羅霜仗於灞亭之上駐清蹕於秦山之下賦汾水於秋風詠在鎬於周雅若其嚴氣盛陰雲寒冰生巨壑雪滿層巒河海方閉溫泉正湍豈獨鑒天心於曲渚藻聖慮於清瀾洞上善之為信秉至柔之自安伊昔竹殿始秋梧宮未落空望幸之杳渺怨嬉遊之寂寞藝徒馥於玉階月虛容於金閣接遠樹於新豐韻曉鐘於長樂皇歡是并品物咸享逶迤清泚皎潔澄明奏鈞天而寒谷變律陳羽衛而陰飊換晴故能蠲憂除患利用永貞於時澤洽㣥臣恩遍區宇野豐擊壤則有頌於康哉帝之何力空賡歌於聖主因返旆回鑾逍遙近甸度祥光之蕭索鬱佳氣之蔥蒨鈎陳不改下輦成宴誡軹道而興嗟想磻溪而流盼然後省娛遊之樂念淳朴之儔開靈液之廣潤與萬姓而同休施兔罝於中谷賁束帛於巖幽獨有執戟三道棲遲一邱空想臣朔之列常陪漢武之遊載詳圖籍爰尋古往功闢二儀物標萬象既拆之於混沌亦聞之於惚恍雖處中而可求信居外而能想陰陽式布造化斯分江河草木日月煙雲或育靈而稟氣或照曜而氛氳不因象而可覩豈無聲而得聞仰察天文傍觀地理燦爛星布巍峩嶽峙或守位而不易或鎮方而恆止不因象之所尊豈為君而勝紀至若刻鳳之琴盤龍之鏡開玉軫以交錯寫菱花而輝映聲信美而具出質含虛而轉靜不因象而可識豈克愛而為盛則有大樂鼓吹聖人輿蹕備禮而制乘時而出宛轉國門逶迤天術不因象之為用豈二儀而不失物皆有象象必可觀聽之則易審之則難借如玉京上天貝闕中海其名可識其象安在象以影隨影圖象遍居暗莫察因明則見衆象之德唯人是則任以去留委其通塞則有心沉迹淪栖遲問津無才補國用道藏身潁水尋隱商山訪真欣逢道遠應時來賓既無容而可託空以象而為親觀夫物則有名而有竭空則無竭而有名以空自名何縮何盈搏之不得書之不明二儀肇分運寒暑則與時而應百功勤務鑿戶牖則用之以貞泰山岌而不以為阻鴻毛至而不以為輕恬淡者體之而為性澆浮者象之而為情情性之別共稟殊呈是知均乎空者既若茲倍乎空者竟如彼卷之在方寸之內舒之盈宇宙之裏上皇得之而化淳季葉失之而亂起妙一以為稱總萬以歸理詎華説之所精非掞藻之能擬及夫天朗氣高地平風暢揚飛鴻六翮之遠彰彩雲五色之狀若士九垓以冥期蘭子七劒以寥亮背之而騁捷遂之而攸向同士冖柘籥之罔窮越視聽之餘量況使皓鶴聞天白駒出谷囹圄鞠草洞簫生曲歟是時端拱聖皇坐嘯英牧暫勞求士永介戩祿事無事為無為衢常樽滿路不拾遺蓋有由而致之安人立政輯寧是職苟失厥德其惟不康伊甲宰邑墮爾于位異彼魯恭無聞馴翟詎同言偃不見割雞視茲荻蒿嗤士言之招納且修保障類尹鐸之權宜事雖害公義不徇已損其戶數法所難踰務以繭絲時維救弊假如晉陽始禍朝歌同惡事貴適時辭之或可況今聖惟敦本政在養人且乖既庶必照明罰察使所糾寧叶大中章大歷五年官吳興縣令歷司封郎中建中六年遷諫議大夫竊見去年所選授官者多以六月七月方至任所扶老擕幼不遠數千里以就一官到才經年遂見停替又見在留中人多有注貞元四年闕者準格至來年正月赴上其續留人注五年闕者遽以今年八月便上一等用闕一等授官五年闕者授替在前四年闕者準格上仍在事後交非允可今制命已行難於改易其所授官人請令至來年二月上赴翃官御史大夫亭亭仙都峻極維嵩屹立溟右削成浙東發地直方磨霄穹崇靈沼在上祥雲積中圭植千仞柱寧四封目覩不及翰飛靡窮㣥阜奔走列仙會同黃帝攸訪碧嶺是沖丹穴傍起金溪下融日臨霞附月映綃蒙壤絶棲塵木無寓叢居幽不昧守一而雄萬歲報響九成來空嘉名乃復展禮斯洪籙作懲止年祈感通莫高匪茲造物之功季卿京兆人明經擢第代宗朝官潮州刺史先侍郎之子曰曜卿字華名世才也宏毅樂易機符朗徹既冠遭家不造諸季种藐植之以闕一字藝博之以文行始調祕書正字授右衛騎曹轉新闕一字尉豪猾未孚立信以示之禮浮窳未復本仁以示之義領長安尉直京師浩穰決賊曹繁劇有立斷焉焯見焉左遷普安郡戶掾賦古樂府草四章左史韋良嗣為之敘文集十卷闕一字卿字萬天骨琅琅德闕一字文蔚識度標邁弱冠以明闕一字觀國蒞鹿邑虞鄉二尉巍守崔公沔洎相國晉公闕二字甲科第之進等舉之嘗遊嵩少夜聞山鐘賦云闕二字繼也洪爐沸鼎火半死巨壑重林風稍止無間闕三字未已詞人珍之轉金城尉曹無受謝吏不敢闕四字卷行於世闕一字卿字榮栗柔立於穆不瑕起家拜靈昌主簿已丑歲小冢宰李公彭年尚其文翰署朝邑簿時漆沮決溢馮翊昏墊釃渠楗災股引脈散下土為漧上腴成賦人到於今賴之文集百一十二篇於戲三英孝友曾閔儔也文學繼業璿碧産也純固含章梓材也昊穹生德宜受封福僅逾強仕以講陰堂未盈一紀三墳相比思其咎職訊之逢占占者邵權曰霸陵故塋葬不違禁害于而家歲攝提格乃貞陽卜而祔大墳三墳以東南為伯仲叔貤之若鴈行然大歷建元之明年於斯刻石恐夫溟海為陸老沙防焉粵烏呼昔蒼龍大泉獻遭家不造先侍郎即世建塋霸陵遺令也先大夫徐公高闕一字備矣洎單閼歲十有一月先夫人合祔天寶改元我之伯也卒間五六年仲也卒不四三年叔也卒君子曰李氏子天假其才不得其壽盍謀及龜策謀及鬼神歟方士邵權遍得管郭之道唶曰霸岸鑿龕客土耗矣干溫冥之禁非窀穸攸宜是用闕一字叶永地其原鳳栖筮之遇損之解曰損孚解緩吉孰甚焉乃虔卜邰城左畤闕一字右維茲食枚卜滻水東樊水西亦惟茲食新卜塋連山南佐平岡闕二字坤勢之宜隧而順之伯氏仲氏叔氏三墳陪側攝提格辜月仲旬闕一字日靈輀以降壽藏有侐無藏金玉厥惟琴書先志也異時述闕一字三百篇永泰中小宗伯賈公至為之敘上澤悅幽明錫類闕二字追贈黃門侍郎申命禮部尚書闕二字清河郡太夫人闕三字版未篆皇命大歷惟二刊刻貞石竦大歷二年登進士第官司封員外郎遷吏部郎中纍官戶部尚書鄧嶽觀察使國有二柄以濟人天有四時以成歲文武者君之威惠春秋者天之生成故人君法天時順人望人歸於德天應以時莫不奉此而寧災由斯而康俗所謂文者足以經邦國所謂武者足以定禍亂故武在合變不可一黷文貴經久可守為常請借前事而明之庶斯得矣夫以堯舜揖讓湯武干戈干戈在乎止亂揖讓資乎偃武故得享國日久多歷年所三王既往霸者是繼晉文伐原以示信齊桓勤王以稱德宋殤好戰以隕越徐偃專文以喪亡王霸陵夷到於秦漢始皇威懾六國建萬代業隳城郭焚詩書卒使宗廟為墟身隕下國黷武之徵也高皇夷秦項誅韓彭陸生著書叔孫制禮修文之漸也光武以長者戡難孟德以應變即戎故得擒樊崇破袁紹雖未悉於至理道亦存乎息戈晉文之對何曾不聞經國惠皇之溺賈后竟至破家吳王石頭之都劉備益州之地但區區於守險曾不暇於修文後魏則多難臨朝後周則經國日淺孝文捨辮髮服衣冠未能倒載干戈休放牛馬武帝降高緯戮晉公甲兵未寧中道而殞武則不可文則不如東晉之僅保江山宋祖之草創社稷道成以殷憂啓祚蕭衍以戡定興王陳主以好內亡隋皇以征遼喪皆不明於文武適足為我驅除況高祖端拱無為太宗大功繼統高宗致位於元默中宗御俗以康寧睿宗之恭膺大寶元宗之克清海內肅宗之收復二都皇帝之光有六合方今四夷向化萬姓歸心總七聖之殊勳正百王之墜典然干戈未息瘡痍未瘳修文之期取則不遠偃武之義今則時哉仲武渤海人詩人之所作本諸心心有所感而形於言言合典謨則列於風雅暨乎梁昭明載述已往撰集者數家榷其風流正聲最備其餘著録或未至正焉何者英華失於浮遊玉臺陷於淫靡珠英但紀朝士丹陽止録吳人此由曲學專門何暇兼包衆善使夫大雅君子所以對卷而長歎也唐興一百七十載屬方隅叛援戎事紛紜業文之人述作中廢粵若肅宗先帝以殷憂啓聖反正中興伏惟皇帝以出震繼明保安區宇國風雅頌蔚然復興所謂文明御時上以化下者也某不揆菲陋輒罄謏聞博訪詞林採察謠俗起自至德元年首終於大歷末年作者數千選者二十六人五言詩一百四十首七言詩附之列為兩卷略敘品彙人倫命曰中興間氣集且夫微言雖絶大制猶存詳略其臧否尚可擬議古之作者因事造端敷宏體要立義以全其制因文以寄其心著王政之興衰國風之善否豈其苟悅權右取媚薄俗哉今之所收殆革斯弊但使體格風雅理致清新期觀者易心聽者竦耳則朝野通載格律兼收自鄶以下非所附麗凡百君子幸詳至公渙本不平者善用白弩巴人號曰白跖賨人患之以比莊蹻後自知非乃變節從學鄉試擢第纍遷至御史佐湖南使崔中丞權幕崔遇害渙遂踰嶺扇動與哥舒滉跋扈交廣此猶蛟龍見血本質彰矣五年作變律詩十九首上廣州連率李公其文意長于諷刺亦有陳拾遺一鱗半甲故善之或曰此子左右嬖臣侵敗王略今著其文可乎答曰漢策紀蒯通説詞皇史録列祖君彥檄書此大所以容細也夫善惡必書春秋顯訓孟子格言渙者其殆庶幾乎但不可棄其善亦以深戒君子之意也
