front:
  text: 全唐文欽定全唐文卷二十一元宗二
  hash: sha256:c2dd2932e37fe6dc1ccaa254ea54eef129d5faecac0fbf9f78c3fc03e963dafc
body:
  text: 朕昔與弟兄聯居藩邸虔奉聖訓遂膺昌期嘗思鄠杜之遊頗有芒碭之氣王等固陳符瑞取則不遠擬備巡幸推而弗居雖府在京師亦同於譙沛式遵故事宜依今請如聞百官家多以僧尼道士等為門徒往還妻子等無所避忌或詭託禪觀妄陳禍福事涉左道深斁大猷自今巳後百官家不得輒容僧尼道士等至家緣吉凶要須設齋皆於州縣陳牒寺觀然後依數聽去仍令御史金吾明加捉搦出師不臧本於喪律責帥歸罪聞於記言并州大都督府長史兼左衛大將軍和戎大武等諸軍州節度大使同紫微黃門三品薛訥頃者總戎禦邊建議為首暗於料敵輕於接戰張我王師衄之虜境偏裨失節乃斯令之不明中軍靡旗則厥謀之不振況鴈門斬級魏尚豈得論功馬邑亡輜王恢必聞議罪進退之咎典刑攸屬且觀其疇昔頗嘗輸罄每欲資忠效主見義忘身儻曹沫不死於辱終能自奮秦赦孟明之敗漢從李廣之贖古常有矣朕每懷之特緩嚴科俾期來效宜放其罪所有官爵並從除削黃門周以魯衛之親夾輔王室漢以間平之寵來朝京師旁稽舊章允迪前訓太常卿兼左衛率并州大都督岐王範荊州大都督兼祕書監薛王業等朕之同氣邦之偉才周旋禮樂佩服儒雅爰職奉常則墜典咸秩是司外史則㣥言罔遺光我謨猷敷於事典日同問安之慶時歸受制之廷出入重於楚元始闕欽於沛獻家人撫愛雖屬於從梁國史垂聲必期於分陝乃眷畿輔不遠闉闍漆沮既從河華作鎮削桐所寄磐石攸宜遂其至公之請佇聽牧人之術範可使持節華州諸軍事兼華州刺史太常卿勳封如故業可使持節同州諸軍事兼同州刺史祕書監勳封如故至州日須稍優遊不可煩以細務自非大事及奏事餘並令上佐知主者施行朕聞天生五材廢一不可不教人戰是謂棄之我國家光宅天下守在海外後於弔伐之義豈窮兵以黷武先以威德之懷欲安人而和衆將戒不虞諒不獲巳突厥比通和好頗負盟約不有金革孰寧疆埸不有師徒誰扞牧圉昔者命彼南仲城於朔方軍出隴西勞於渭北此其備也今寒露腓草秋風揚塵必順時以致師方休農以卒我圖靖國其在綏邊衛尉卿兼檢校左金吾衛大將軍涼國公李延昌克樹勳庸遍該韜略關張萬人之敵勇不顧身程李二將之名忠於衛主董司戎事行料兵權可充隴右道防禦大使左武衛將軍白道恭等居運六奇行謀百勝早聞營平之議思覩票姚之捷可為之副宜取朔方後軍兵及前年朝堂應募健兒等總十萬人㣥牧馬四萬匹於秦州成蘭渭等州界逐便屯集教練仍書報贊普共為聲援明加偵勿使失機朕聞夷不亂華既殊於中外虜或犯塞必興於甲兵我國家一戎定業纍聖膺期干戚斯舞梯航畢至小蕃遠寇假息遊魂爰自昔年慕我朝化申以婚姻之好結為甥舅之國歲時往復信使相望繒繡以益其饒衣冠以增其寵鴻恩大造特加於蠻貊狼子野心遂同於梟獍在於亭障頗聞驚擾巳命師徒遄往追躡摧凶殄逆今也其時滅迹掃塵期之不日然以問罪之義百王所以龔行戒嚴之典六軍所以親御是用中宵按劒昧曉求衣豈自逸於崇高而不勤於櫛沐眷茲右輔遠在西陲雖駐蹕之暫勞佇觀兵而決勝宜取今月擇日進發其差取後軍四萬人諸色蕃兵二萬人京兆府兵一萬人飛騎二萬人量追三百里內兵留當下人充萬騎五萬一千人豳隴兵各二千人岐州兵五千人並集本州待進止其馬四萬匹取三百里內諸廄及府馬充所追兵馬及押官委本州精赴集衛尉卿兼檢校左金吾大將軍王毛仲為左一軍總管右金吾將軍康海源為副左武衛大將軍李昌為右一軍總管左武衛將軍馬衛為副左羽林大將軍趙成恩為左二軍總管右領軍將軍秦義禮為副右羽林將軍楊敬述為左三軍總管右領軍將軍鮮于庭誨為副左羽林將軍馬崇為右三軍總管右監門將軍執失善光為副所司準式俾其長驅隴坻深入湟中授以方略掃清氛祲其緣頓支供務從省約樹之后王所以輯寧黎獻承之儲副所以安固宗祧故能崇四術之科為萬國之本長幼君臣之序齒胄知歸溫文恭敬之風㣥生攸屬古之制也其在茲乎郢王嗣謙聰睿夙成端莊特秀三雍禮樂必也生知五官詞藻居然暗合體道為器非假於學問資靈授德自符於神解夏絃春誦地義天經立人之道既彰為子之誠皆著今升平在運中外咸寧將有事於元良固不踰於三善宜光近日之敏俾則前星之耀宜以來年正月四日備禮册為皇太子所司準式存有其榮歿有其贈古之典也希玠有賢戚之美登台階之秩冀其永年俾作元老不幸薨逝用震悼於厥心可贈尚書左丞相凡諸郡縣仍令太守縣令課勸農桑先處分太守縣令在任有增減戶口成分者所由司量為殿最自今以後太守縣令廉能勾當租庸每年加數成分者特賜一中上考如二載之內皆有成分所司録奏超資與處分黃門司空兼虢州刺史邠王守禮第二女王門誕秀師氏尚柔婉嫕凝芳間和順則佇儀膏族俾錫脂田可封華亭縣主自古帝王皆以厚葬為誡以其無益亡者有損生業故也近代以來共行奢靡遞相仿效浸成風俗既竭家産多至凋弊然則魂魄歸天明精誠之巳遠卜宅於地蓋思慕之所存古者不封未為非達且墓為真宅自有便房今乃別造田園名為下帳又明器等物皆競驕侈失禮違令殊非所宜戮尸暴骸實由於此承前雖有束約所司曾不申明喪葬之家無所依準宜令所司據品令高下明為節制明器等物仍定色數及長短大小園宅下帳並宜禁絶墳墓塋域務遵儉凡諸送終之具並不得以金銀為飾如有違者先決杖一百州縣長官不能舉察並貶授遠官盤矛赴敵義光忠壯免胄捐軀情殷悼惜故防禦㣥牧使豐安軍使右衛率府率王海賓七萃楨幹萬里長城抱鐵石於胸襟運韜鈐於掌握屬犬羊為寇牧圉罹災出車徇其征討躍馬先其掩襲挫彼鋒鋭殲厥渠魁充國持邊佇終文略建威臨陳忽喪驍雄興言震懷思有褒美宜加大將之禮兼茂後昆之秩黃門宋王長女流芳桂邸稟訓梧宮體自間和成其婉娩玉笄始茂金燧方嚴爰寵錫於脂粉俾開榮於湯沐可封安吉縣主主者施行古稱納言亦號常伯厥命惟允朕之股肱俾乂成績聿歸良輔黃門侍郎同紫微黃門平章事盧懷慎氣實溫厚生於薊北年始英妙出相山東王佐所期人師攸屬考彼揚歷多所獻替學以充其忠讜才以運其清明所謂許國忘身立朝正色有仲山甫之節成管夷吾之能故其道彌尊其心益下可以輔我王度弼於朕躬用增輝於侍帷宜拜寵於參乘可檢校黃門監散官黃門如故帝王之政必厚風俗男女不別深蠧禮經至如別宅婦人久未悛革近今檢括配入掖庭將示小懲使及知禁朕愍其愚惑尚在含宏思屈常憲許其遷善特放出令府縣即配嫁不得影認更為藏匿畜別宅人容其自新並宜放免自今巳後更有犯者並準法科斷五品巳上仍貶授遠惡處官婦人配入掖庭縱是媵妾亦不得別處安置即為常式青春式序陽和布氣萬物熙熙莫不遂其性而嘉其生也申念愚人干我王度日陷坑穽置之網羅朕代天理物為人父母眷言囚繫良增隱惻豈憲章之尚密將教道之不明歟順時行令抑惟常典兩京及天下見禁囚除犯惡逆并造偽闕以前宜決一百配流嶺南磧西諸州其餘一切放免高麗莫離支高文跌都督跌思太吐谷渾大首領刺史慕容道奴郁射思大首領鶻屈頡斤大首領刺史苾悉頡力高麗大首領高拱毅等或遼海貴族或陰山寵裔知則能勇權而善謀從事本藩頡頏高位料順逆之道知變通之節或誓以沈族或翻然庇身共驗郅支之亡遂觀由余之入將軍遇敵永罷射雕使者迎降果聞乘傳棄寒苦之地就陽和之澤爾其誠矣朕實休之宜開土宇之封式盛壇場之制文可封遼西郡王食邑三千戶行左衛大將軍員外置同正員賜宅一區馬四匹物六百段跌思太可特進行右衛大將軍員外置兼跌都督封樓煩郡公食邑三千戶賜宅一區馬三匹物五百段道奴可左威衛將軍員外置兼刺史封雲中郡開國公食邑二千戶賜宅一區物四百段馬兩匹鶻屈頡斤可左驍衛將軍員外置兼刺史封陰山郡開國公食邑二千戶賜馬兩匹物二百段苾悉頡力可左武衛將軍員外置兼刺史封鴈門郡開國公食邑二千戶賜馬兩匹物四百段宅一區拱毅可左領軍衛將軍員外置兼刺史封平城郡開國公食邑二千戶賜馬兩匹物四百段鶻屈頡斤妻契苾賜物一百五十段手力二人各賜物五十段管制古之命將帥訓甲兵所以宣威武而制戎狄也自非欒郤之裔孫吳之才何以總中軍而絶大漠矣右羽林軍大將軍上柱國河東郡開國公涼州鎮軍大總管薛訥家代名將國朝元臣智湧泉源氣橫雷電廟堂之上則寬而有謀旗鼓之間則勇而無撓頃者單于地隔驕子天亡衆巳離心魑魅懸首今則須行弔伐用滅逋逃宜憑推轂之權將待覆巢之勢可持節充朔方道行軍大總管太僕卿呂延祚謀慮經遠才明沈斷右威衛將軍兼靈州刺史杜賓客三軍之雄萬人之敵以之入幕孰不師臧曾謂出車肅茲王命並宜充副總管黃門朕聞王者神器天之大業震百里而崇孟侯照四方而建元子其所由來尚矣我國家參天二地濟以豐功祖武宗文承於密命顧循菲德寅畏鴻名太上皇命朕以位卿大夫補朕之闕僉謂率先自邇稽古維新國本之大不可以不務皇儲之重不可以不立故宵衣當寧聞義是將朝服升階擇賢而舉皇太子嗣謙生知禮樂性成仁孝字孫之愛則敬不絶馳問豎之安則恭而至寢觀其言精視牘思敏題鞭固以核東序之討論契南山之調護今少陽踐位獻歲發春草樹自榮乾坤交泰副君之榜巳別其宮太史之書更藏於府帝圖斯永人望所歸庶符知子之明豈獨在豫之慶用施寬惠光於政理今望苑初開端僚是切天下有高才懋德碩學純儒比迹春卿齊名夏綺具以徵辟朕聽政之暇常覽史籍事關理道實所留心中有闕疑時須質問宜選耆儒博學一人每日入內侍讀昔周有岐陽之搜漢有扶風之命或講師習武夸胡曜威故王者狩必以時虞人招之以禮時則遠矣朕自祗膺圖籙於今四年每巡幸郊畿不出百里且愛力而節用豈盤遊而好樂間者四方無事百穀有成因孟冬之月臨右輔之地戒茲五校爰備三驅非謂獲多庶以除害一昨長圍巳合大綏未舉而夜聞朔風天降微雪狐裘且御未免祁寒鶉衣不充寧堪凍露朕便截狡獸要輕禽以此遊娛孰云矜恤況為之父母育彼黎元中宵耿然明發增惕其圍兵並放散各賜布一端綿一屯圍將賜物三十段副使二十段押官十段岐州兵馬於此給付餘兵馬至京請受詩人賦田以備搜狩之義王者順時式展畋遊之禮頃者築場神甸清道子來經上林之苑囿指扶風之藪澤雖獵將提鼓虞人植旗仍憫沍寒之節不行肅殺之命豈惟虞舜之典咸秩山川所冀周文之風及於鳥獸繇是罷還士卒非重盤遊眷彼吏人致有煩擾所謂行者幸也后來其蘇宜申恩惠用符古者所經州縣供承頓官百姓并造營幕橋道等事宜令所司勘會奏聞其緣御路及頓場麥苗有損者亦令實具奏聞周命召奭相宅建邦漢命蕭何留臺作鎮眷言斯土任在其人太子賓客昭文館學士薛謙光右散騎常侍元行沖等國之耆儒朝之碩彥舉直錯枉清心不可容非殫見洽聞白首以之從學履歷時久精明日新必能慎固邦畿保釐都邑佇成居守之務宜叶往俞之委謙光宜充東都留守行沖為副凡稱原減頗詳故事罪至死刑寬其大戮況聽成有法閲實無冤屬陽和上春積雪未降天地之於庶物正亭之而毒之皇王之撫兆人寧以殺而止殺申念重辟惻然疚懷特布湛恩助茲生氣其犯斯刑者宜決一百配流遠惡處其犯杖配流者宜免杖依前配流巳決及流三千里者節級稍移近處二千五百里以下並宜配徒以殿黃門樹於藩屏莫非親屬居以形勝必任親賢司空兼隴州刺史邠王守禮德比間平賢於魯衛動不忘於仁恕言必備於忠肅入連花萼擁駟來朝出割竹符憑熊往鎮眷茲樊鄧是稱漢沔惟城池之枕倚乃川陸之雄要故鳴騶戒路建隼為邦副朕陝東之美更聞峴南之政可使持節襄州諸軍事兼襄州刺史司空勳如故至州日須稍優遊不可煩以細務自非大事及奏事餘並令上佐知主者施行黃門虞放三苗允歸於敷德周稱二陝用切於聞政頃以驕子運微胸奴氣盡願為臣妾者望塞款門編我氓黎者雲屬波委北窮大漠西被流沙撫而柔之僉曰分命郯王嗣直陝王嗣升聰察天假英明日新忠肅恭懿寬仁孝友探沛易之彖象自詣精微讀楚詩之比興能傳麗則故可揚威懷之旨宣靜鎮之風畀以藩翰俾清疆場嗣直可安北大都護仍充安撫河東關內隴右諸蕃部落大使嗣升可安西大都護仍充河西四鎮諸蕃部落大使右衛大將軍兼安北大都護上柱國長平郡開國公張知運右羽林大將軍兼安西大都護四鎮經略大使上柱國潞國公郭虔瓘等國之老臣朝之宿將闕長策子房所以運籌安邊遠圖充國所以言事必能寬則得衆惠以養人各綏一方兼委二佐知運可安北副大都護仍兼郯王府長史及安撫諸蕃副大使虔瓘可安西副大都護仍兼陝王府長史安撫諸蕃副大使餘如故主者施行混一六合紀綱四海開物所以苞舉華夷列爵所以範圍中外契丹松漠州都督李失活奚饒樂州都督李大酺等並材雄劒騎家襲簪組翻飛涿鹿之郊高視無閭之地往屬詿惑遂爾攜離海表為虞在苞桑之厚戒彙征順命乃連茹而同歸柔懷有章寵渥斯在俾侯利建宜膺胙土之榮上將師貞仍允齋壇之拜失活可封松漠郡王食邑三千戶行左金吾衛大將軍大酺可封饒樂郡王食邑三千戶行右金吾衛大將軍並員外置餘如故門下軒夢三相舜舉八元咸佇人傑以宣邦政尚書左丞上柱國安陽縣開國男源乾曜博文強學達識周才貞白可以勵時道義可以宏物虛懷同於抱月懸鏡不疲利器比於成風刜鐘無滯固可充左曹之駮議翊中禁之謀猷用參金鉉之司兼踐玉臺之制可黃門侍郎同紫微黃門平章事勳封如故門下虞廷稱盛任於夔龍周邦以寧屬於閎散是知出納惟允必藉英奇啓沃有光實資茂彥銀青光祿大夫守刑部尚書上柱國廣平郡開國公宋璟宇量凝峻執心徑直銀青光祿大夫行紫微侍郎兼知制誥上柱國許國公蘇頲風檢詳密藻思清華或掌憲南宮持平邦典或代言西掖匡輔政途咸竭奉上之心俱盡匪躬之節九流俟其澄序衆務資其弼諧宜委銓衡兼侍帷幄璟可守吏部尚書兼黃門監頲可同紫微黃門平章事散官勳封並各如故貴德尊賢飾終念往此聖人所以理天下厚風俗也王友貞稟氣元精遊心太朴孝惟不匱獨貫於神明道則難名高謝於人代言念錫類方期鎮俗遽爾凋殂良深愍悼生無大位雖隔外臣之儀歿有餘榮宜贈上卿之服可贈銀青光祿大夫仍委州縣長官特加弔祭興滅國繼絶代天下歸心焉況乃仁不遺親德必在祀光復土宇率繇教義者哉故徐州刺史密王元曉望重天人地居藩屏家邦伊賴休戚是均乃者王室多難睿圖中缺凡我宗子咸從殛竄神龍初歲寶運紹興爰命近屬以為後嗣而胄緒凋翳是非紛雜曇子承隟妄尸茅土神且不歆非類人亦奚祀非族奠享無主永懷惻然其封元曉再從孫銀青光祿大夫行太僕少卿員外置同正員東莞郡開國公徹為嗣密王以奉其祀太原薄伐之地句注出屯之所兵戈不可以不習亭障不可以不備默啜鳴鏑之餘自貽泯滅骨咄祿男小殺覆巢之餘仍敢陸梁九姓等雖類頗親而仇讎久著譬彼西戎巳獻郅支之馘同夫東越初雪會稽之恥深憂復怨固請防萌況高秋在律胡風振野正可以揚武功順殺氣扼茲地險張我天威宜於并州集兵八萬衆置天兵軍并州長史上柱國張嘉貞有文武之材勵公忠之操較陳利害頻奏封章必能料敵於未形臨宜以決勝可充天兵軍大使并州司馬王喬典禮不易其可用也右監門衛中郎將薛徽軍旅之事則嘗聞焉並為副左拒遼陽之師右連河上之戍車徒列次鼓角傳聲俾其雷斷一方雲橫萬里宏茲廟算稱朕意焉戢兵始於威武扼險先於要害以制悍俗用綏遠人九姓等頃立勳庸先除桀驁列在蕃服保其疆宇然而獷戎頗近寇盜時侵雖文德未宏武備素設漢垣通於句注夏屋枕於燕山是稱近胡量藉遮虜固可節其萬部成犄角之形屯我六師示張皇之勢其蔚州橫野軍宜移於山北古代郡大安城南仍置漢兵三萬人以為九姓之援拔曳固都督頡質略等並望雄蕃緒聲振朔垂戎略既昭兵旅惟緝各陳武列分統軍政頡質略出馬騎三千人充橫野軍討擊大使同羅都督毗伽末啜出馬騎二千人充橫野前軍討擊大使霫都督比言出馬騎二千人充橫野後軍討擊大使回紇都督夷健頡利發出馬騎一千人充大武軍左軍討擊大使僕固都督曳勒哥出馬騎八百人充大武軍右軍討擊大使左縈右拂先偏後伍作扞雲代指清沙漠宣威料敵度功蕆務咨爾庶士稱朕意焉其五都督討擊大使各量給賜物一百匹領本部落蕃兵取天兵軍節度其兵有事應須討逐探量宜追集無事並放在部落營生並使本軍存問務使安輯應修築所及支運兵馬糧等所司亦與節度使商量處置書稱四征不庭綏厥兆人可以覆昏亂執有罪保大定功利物懲慝故高陽有九黎之伐大舜有三苗之征欽若聖謨是為殷鑒突厥殺窮漠餘裔大邦逋誅恃其悍俗未遵朝化比為潛遁幽茫隔閡華壤固聲朔之不被將羈縻以畜之而擾我諸蕃窺我邊境今㣥方輯睦重譯會同奉琛執贄者萬數請吏來王者億計咸以為衆之所加各自統領師徒取其仇怨拔悉密右驍衛大將軍金山道總管處木昆執米啜堅昆都督右武衛大將軍骨篤祿毗伽可汗等弧矢之利所向無前契丹都督左金吾衛大將軍靜析軍經略大使松漠郡王李失活奚都督右金吾衛大將軍保塞軍經略大使饒樂郡王李大酺等士馬之精何往不克並總戎雲萃賈勇風馳西從沙磧至於德犍山下東發海浦期乎獨活河上九姓拔曳固都督稽洛郡王左武德大將軍頡質略同羅都督右監門衛大將軍毗伽末啜霎都督右驍衛將軍比言僕固都督左驍衛將軍曳勒哥等種分業異效節輸忠梟彼凶魁掃除遺孽並左犄右角連營合圍故路絶飛走計窮躍噬然我國家以止戈存義釁鼓傷仁方欲先德後刑有征無戰庶番之請抑而莫從皇天有命將不獲巳突厥殺若迷而知復困即能通革面虜庭委身魏闕解其縛焚其櫬有逢伯之前聞大者王小者侯即田橫之故事況默啜之子右金吾衛大將軍右賢王默特勒逾倫自拔於亂頃投於國今不計其先人之僭復加以右賢之寵右威衛將軍左賢王阿史那毗伽特勒左武衛大將軍燕山郡王火拔石失畢左領軍衛大將軍阿婆啜阿史那褐多右驍衛大將軍賀魯窒合真阿婆屬等或彼貴種應繫人思或彼信臣巳歸邦化咸從衆望並錫尊官隨師以籌謀採狄之情狀便立衙帳令居塞垣其首領百姓等有能轉禍為福去逆效順爵賞之科國朝有典且發單于之使諭其觸網之徒優而柔之五申三令儻覆巢未悟沸鼎猶安習苦為甘聞言不信則戈矛所接玉石同焚勉思良圖罔替成命朔方道行軍大總管銀青光祿大夫右散騎常侍攝御史大夫王晙長才多奇大勇不鬬寄用扞城隱當敵國當出閫之寄有辭第之公故可總是中軍以宏上略凡蕃漢三十萬衆並取晙節度大戴禮云王者之征猶時雨也至則人悅之矣俾夫武威外照仁德內洽用恢天聲以靜邊徼布告遐邇咸使聞知昔在帝堯全許由之節緬維大禹遂伯成之高則知天子有所不臣諸侯有所不友遁之時義大矣哉嵩山隱士盧鴻一抗迹幽遠凝情篆素隱居以求其志行義以達其道雲臥林壑多歷年載傳不云乎舉逸民而天下之人歸心焉是乃飛書巖穴備禮徵聘方佇獻替式宏政理而矯然不㣥確乎難拔靜己以鎮其操洗心以激其流固辭榮寵將厚風俗不降其志用保厥躬會稽嚴陵未可名屈太原王霸終以疾歸宜以諫議大夫放還山林歲給米百石絹五十匹充其藥物仍令州縣送至隱所欲知朝廷得失具狀以聞王者懷柔莫不率俾禮其君長必備典章右武衛大將軍員外置突騎施都督車鼻施啜蘇祿中部貴人右賢豪緒族系繁於朔野郊廛拒於陰寒自趨風入獻服義來歸爰奉戎索實司邊行懋勳可紀忠節是嘉俾升絶席之尊仍茂錫圭之寵可左羽林軍大將軍員外置仍封順國公食邑三千戶餘如故並賜錦袍鈿帶魚袋七事仍充金方道經略大使所司備禮册拜
