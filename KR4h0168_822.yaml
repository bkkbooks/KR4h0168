body:
  text: 周以創三十代啟八百年既鳴鳳以授德復興龍而御乾奔天下之二分豈惟雨驟擎雒中之九鼎寧止波旋當其韜仁聖以表威靈湧禎祥而呈氣色岐梁㸌銜耀之所岍隴湛蟠泥之域幾年貪餌吞將呂望之鈎一旦飛天霹破殷辛之國觀夫或屈或伸非假非真澤霈六合恩濡兆民以息虞芮作在田之跡以卻夷齊為逆物之鱗掀陸海之波濤固殊鯨浪擴九重之宮室肯類鮫人則知指縱而或仗爪牙善戰而靡資血肉火兵戈而雖假燒尾鏡古今而未嘗寐目遂使盟津契會此時莫愧於雲從羑里棲遲昔日何傷於魚服下蟄如此高翔曷量於蠻貊而蟲沙附申忠信而鬐鬛張足以雄飛革命首冠興王駕木德於震宮蒼然被彩應陽精於乾象赫矣飛光所謂建皇基立寶位模日楷月規天矩地非三聖之尤異焉可以神物而取類邈罔象乘鴻濛奔霆迸電驅雷走風非四靈之感通焉可以與周而同功豈徒角樹臣佐穴起域中拏開粟而攫散財滂沲有截壽九齡而豢十亂振奮無窮懿乎後煥放牛前光播穀愈彰聖德於王者益驗神蹤於介族則老聃之道漢祖之顏永宜雌伏長鯨入鼎兮中原六龍迴轡兮蜀門杳鼇闕而難尋豔質經馬嵬而空念香魂日慘風悲到玉顏之死處花愁露泣認朱臉之啼痕莫不積恨綿綿傷心悄悄逝川東咽以無駐夜戶下扃而莫曉襃雲萬謺斷腸新出於啼猿秦樹千層比翼不如於飛鳥初其漢殿如子燕城若讐驅鐵馬以飛至觸金輿而出遊謀於劍外駐此原頭羽衞參差擁翠華而不發天顏愴恨覺紅袖以難畱鴛鷺相驚熊羆漸急千行之珠淚流下四面之霜蹄踐入神山表態忽零落以無歸雨露成波巳沾濡而不及棧閣重處珠旒去程玉壘之雲山暫幸金城之烟景旋清六馬歸秦卻經過於此地九泉隔越幾悽惻於平生金义飄彩鳳之蹤鬢蛻元蟬之跡茫茫而今日黃壤歷歷而當時綺陌雨鈴製曲徒有感於宮商龍腦呈香不可返其魂魄空極宵夢寧逢曉粧輦路見梧桐半死煙空失鸞鳳雙翔鏡殿三春莫問菱花之照耀驪山七夕休瞻榆葉之芬芳大凡有國之尊罕或傾城之遇就言天寶之南面奚指坤維而西顧然則起兵雖自於青娥斯亦聖唐之數以玉為寶兮寶之常名以不貪為寶兮寶其可驚彼空矜其純粹此特禀其清貞潔已虛中既處一言而落落飛聲擅價終傾衆寶以鏗鏗宋人獲希代之珍子罕當連城之贄且曰伊我之寶非君莫遺提攜而日月耀手跪拜而邱山屬意殊不知飲冰勵節如冰之色何煩匪石推心剖石之姿足棄如此則別號瓊瑰得之非荊山者哉獨為奇美種之乃情田而己莫不掃埃垢於嗜慾擴規模於廉恥器之於國雕鎪皆仗劍之流利之於人貿鬻悉投錢之士繇是煥爛㣥目鏘洋一時自叶至珍之比永辭凡口之嗤豈可輕重貴賤諏議磷錙衒實矜華爾則以琬炎當也輝今暎古我則以惇素稱之卒使民知反樸之風俗靡攫金之過豈唯清白以足謂固亦溫良而大播所以不潤屋而潤身蓋非貨而曰貨則知以非貨而為寶者少以所貨而為寶者多少則與珪璋而合美多則與瓦礫而同科故其滌以蕪穢加諸琢磨採於己而不採於彼貴於我而不貴於他縱饒秦氏當時曾欺趙地爭奈楚君昔日薦刖荊和宋人於是辭默而慙顏赬而走斯言既得以佩服吾寶乃分其妍醜誰能持確論秉貞姿問貪夫之信不臺城破兮烟草春舊井湛兮苔蘚新自亡跡於天子幾興懷於路人蓋悲萬乘之尊投身到此豈為一泓之故舉世驚神叔寶以立作荒君在為亡國玉樓之絲管宵咽桂岸之兵戈晝逼御天失措且四方之大何從沒地無慙顧九仞之深可匿便委鴻業旁攜綠鬟奔入泓澄之內冀逃吞噬之艱殊不知理昧納隍處窮泉而詎得誠乖馭朽攀素綆而胡顏既而出作窮鱗奪歸偏爵一時之覆轍如此千載之遺波儼若陌上澄澈邱中寂寞暗淘人事以冰釋旁寫江天而鏡擴青銅有恨也從零落於秋風碧浪無情寧解流傳於夜壑徒觀其蕪沒沙逕葳蕤澤葵漁樵汲引荊榮衰雖虛中而可鑒終徹底以堪悲寶鏡休分豈有得銅之日雕筵罷設永無投轄之期固以滌盡繁華銷平曩舊猶驚鼎沸於餘湧更弔山崩於謺甃荒涼四面花朝而不見朱欄滴瀝千尋雨夜而空啼碧溜斯則堙塞終古蕭條永年半竭而珠璫或出陸沉而翠葢寧旋莫可追尋玉樹之歌聲邈矣最堪惆悵金缾之咽處依然嗟夫穿鑿豈殊淺深非異蓋悲鮒蟄之穴不見龍潛之地所以避匿其中莫比漢高之事虛者無形以設有者觸類而呈奚課彼以責此使從幽而入明寂慮澄神世外之筌蹄既歷垂華布藻人間之景象旋盈昔者陸機賦乎文旨推含毫佇思之道得散樸成形之理雖㣥言互發則歸於造化之中而一物未萌乃鏁在渺茫之始是宜囊括元牝箕張混元暗造無為之域潛臻不死之根致彼音塵莫隱於秋毫纎芥令其影響俄通於萬戶千門然後扇作波瀾騰為氣色無論於遠近高下罔計於飛沉動植如鏗至樂非所聞而遽聞若摘元珠非所得而遽得則知文本於道道不可量杳韜存而韞亡道散於文文不可當乃飛鋒而耀鋩取之者取之逾遠偶之者偶之不常故其越兔影邁烏光向無聲無臭之間陶開品彙於出鬼入神之際定作圓方乃使巧拙應機虧全任器考其始而始則無覩驗其終而終則有自物居恍惚牢籠而俟以真歸精匿杳冥搜索而期乎實至所謂擺揚恬澹剖判虛空冀其神貺逮彼幽通豈惟率爾邈然散著於山川草木風飛泉湧爭飄於鳥獸昆蟲夫如是則洞啟幽元曾無險隘流音既自於扣寂成象還同於畫卦然後知文苑之菁華亦沖和之一派南浦風煙傷心渺然春山歷歷春草帛丿糸帛丿糸那堪送行客啟離筵一時之萍梗波濤今朝惜別千里之秦吳燕宋何日言旋當其繫馬出船候潮待月低徊而少婦對景愴恨而王孫望闕莫不撚嶰竹以凄楚撥湘絃而激越且當蘋澗把芳酒以畱懽莫被薰風吹片帆而便發君不見陌上塵中奔西走東車輪似水馬足如蓬夜泊而猿啼霜樹晨征而月在煙空爭得枝間比翼更同於越鳥只應波上離㣥便逐於燕鴻莫不太苦行人偏傷別妾龍媒而嘶出金埒鸞扇而持歸玉篋於時莫展歌嚬全沉笑靨郊天路口愁攀夾渡之柳條採蕨山前忍看解維之桂檝是知無人免別有別皆傷使人落顏貌枯肺腸淚成雨鬢侵霜朝悲五嶺暮怨三湘夢去不到書來豈常況一川之煙景茫茫橫衝楚徼兩岸之風濤渺渺直截炎荒無不銷魂如何舉目齎行而寶劍三尺畱下而明珠十斛林駢樛木推誠而敢望合懽洲躍嘉魚取信而當期剖腹及夫樂闋人散龜飛日曛遺鞭卻取解珮還分玉窗之歸步愁舉蘭棹之移聲忍聞須知赤帝之江頭兩心似火莫自蒼梧之岸曲一去如雲雖佇錦衾而贈我終摛錦字以醻君己而誰不別離別離如此誰不相送相送於是則東門與北梁不足云爾昔隋煬帝幸江都宮制龍舟而礙日揭水殿以凌空詭狀奇形雖壓洪流之上崇軒峻宇如張丹禁之中當其城苑興闌烟波思起截通魏國之路鑿改禹門之水於是怪設堂殿妙盤基址屏開於萬象之外嶽立於千艘之裏還於玉闕控鼇海以崢嶸稍類雲樓拔蜃江而聳峙皆以綵飾無比雕鐫罕量裝羽毛而搖裔謺瓊璧而熒煌鏡豁四隅遠近之風光寫入花明八表古今之壯麗攢將天子乃縱巡遊極駕馭登巨艦以龍躍擴深扃而虎踞旌旗劍㦸以絡野珠翠歌鐘而觸處三十六宮之雲雨澒洞隨來一千餘里之煙塵冥蒙撲去百幅帆立千夫腳奔上搖烏兔下竄蛟黿天河邂逅以驚殺地軸參差而軋飜蘭棹桂檝之駢闐行辭洛口鴛瓦虹梁之岌嶪坐徹夷門啟閉詎常登臨罔畢雷訇之竹箭衝過輻湊之木蘭貯出柳絲兩岸裊為朱檻之春水調千聲送下青淮之日既而遄驚鬼瞰遽及神謀鑾輅而飄成覆轍樓船而墮作沉舟寶祚皇風一傾亡於下國霞窗繡柱大零落於東流嗟夫駕作禍殃樹為罪咎穿河彰沒地之象泛水示沉泉之醜血化兆庶財殫萬有所以湯武推仁不得不加兵於癸受海童以泛泛浮浮愛於白鷗遂將窮於賞玩乃相狎以遨遊彼鳥何知苟同心而同德斯人足驗諒不忮而不求當其訪物外之高蹤得沙間之逸致雲心瀟洒以薦往鶴貌飄颻而謺至列為儔侶肯無求友之聲卻盡猜嫌皆得忘形之意至若海鏡秋碧天藍霽青磨開桂月於浩渺畫出蓬山於杳冥爾乃瞻雪影緬風翎曲得其情此曠蕩而來依別派不言而信彼聯翩而飛下迴汀四目夷猶兩情容與曾無隼擊之患忘到鳩居之所羅列靡慚於交契固類朋遊參差罔愧於弟兄還同雁序斯則別號羽客參為水仙楊柳之江頭雨夜蒹葭之渡口霜天莫不探此景象窮乎歲年異鷄㣥之逈處殊鶯谷之高遷掃塵緒以皆空那虞觸網負身弓而不綰詎肯驚弦則知蟬蛻是非羽翔凡俗豈鷹揚於霄漢之外乃鶚立於煙濤之曲因嗤鴻渚蓋春去以秋來翻笑鵲河竟離長而會促其父既駭於斯爰令執之纔及入籠之念已興登俎之疑潮滿滄洲游泳空期於水際日生丹壑翺翔遽在於雲湄所謂禍機中藏物情外釋且斯鳥之猶爾豈於人而能隔則包含詭紿之流宜覽之而改易白之能知須守黑於所為黑之能守則知白而無咎聖人所以立言於彼垂訓於後將令學者得韜光用晦之機不使來人有衒實矜華之醜是宜採厥理扣其辭豈非白也吐耀含輝禀西金而成姿或元黃而可得或蒼赤而可期知之者必能洞徹萬物昭彰一時故為禍患之所之黑也光沉影匿浸北水而成色既視之而不見亦曉之而莫得守之者必能混合㣥象冥蒙衆惑故為安寧之所則繇是任懷霜而懷雪不在明言縱如璧以如珪終須默識如此則準繩萬國龜鏡八區俾其擅清名者若昧抱明智者如愚有於不有無於不無亦猶玉之貫虹以韞石而為妙珠之象月以蚌胎而為殊論於物而物且能爾驗於人而人焉忽乎是以釣璜於西渭之濱扣角向南山之夕須知刖足以招禍莫若漆身而遁跡君不見斗牛烏兔垂大明而或隔陰霾麟鳳龜龍作嘉瑞而常居藪澤則知以白藏黑兮道無不全以白離黑兮理其不然若內包乎皎皎當外處乎帛丿糸帛丿糸故懷希代之珍者被褐負不羈之才者草元然後宏彰典式克免危顛夫如是則垂戒無垠推誠觸類靡令受彩之質或爽處蒙之意吾徒也勉之哉佩帶斯言而勿墜王子淵兮誰與倫洞簫賦兮清且新麗藻上聞於天子妍詞遍誦於宮人名價有茲寫札於御牋彤管風流無比吟哦於貝齒朱脣斯賦也述江南之翠竹生彼雲谷甘露朝洒瑞烟晴撲般斤遽取於貞勁夔律乃知其韞蓄既而植物惟一樂工惟獨九重聖主俄聆於玉韻金聲兩掖佳人爭致於瑤編繡軸受授相從彤闈絳宮始喧喧而歷覽旋一一以精通十二瓊樓不唱鸞歌於夜月三千玉貌皆吟鳳藻於春風莫不魯殿慙魂巫山破夢應教墨客以心死解得紅妝之口諷時時桂席驚飄舞雪於羅衣往往蘭臺誤下歌塵於綺棟於時閒趙瑟寢秦箏駐雲雨咽咸英非春而御苑花折當夏而幽閨景清如鷰人人卻以詞鋒而勵吻雕龍字字爰於禁署而飛聲泉噴香喉雲靡綠鬢豈貫珠之歌同調固如簧之言別韻遂使霞窗觸處不吟紈扇之詩樂府無人更重箜篌之引斯則琴賦與笛賦奚過才子獲才人咏歌體物之能有是屬辭之道如何一千餘字之珠璣不逢漢帝三十六宮之牙齒詎啟秦娥方今天鑒求文詞人畢用有才可應於妃后工賦足流於嬪從洞簫之作兮何代無誰繼當時之吟誦明彼今古聞諸聖賢易垂言而著在八卦人有文而形於普天用以成章既驗斯風之肅穆矚之於物乃知厥德之昭宣吾君秉此格言恢乎至理以為文在天而苟可鑒文在人而誠足視在天則時變從之在人則化成有以故體此以御宇取茲而教人且文也肇自河龜見洛書陳道德故仁義新出無為而入有象齊父子而一君臣既而上古遐中古邇苟流播之如此乃弛張而若彼始則六十四位演自周王旋則三百五篇刪於孔氏故得有國之君準繩斯文詩書禮樂以表裏干戚俎豆以區分莫不經天緯地髣髴氤氳布彼寰瀛風行而草偃被於億兆玉潔而蘭薰然後鏗作咸韶散為風雅調暢動植周通夷夏車書得以合矣貴賤與而同也遂使九州四海皆瞻黼黻於朝端墨客詞人交露鋒鋩於筆下大哉人文之義也煥矣赫矣可名可觀唯聖朝之所擅豈悖德之能干推其時而時或異論其道而道斯完故將垂百王而作範豈惟充萬國以咸懽者也夫如是則肩比三王威銷五霸宏彰馭馬之成政克俾雕龍之擅價彬彬乎哉郁郁乎哉有以見我唐之至化吳王歿地兮吳國蕪城故宮莫問兮故事難名門外已飛其玉弩座中纔委其金觥舞榭歌臺朝為宮而暮為沼英風霸業古人失而今人驚想夫桂殿中橫蘭房內創丹楹刻桷之殊制釦砌文軒之詭狀如同渤澥徙蓬闕於人間若自瑤池落蘂宮於地上繡柱雲楣飛蛟伏螭基扃鬱律鈎楯參差碧樹之珍禽夏語綠窗之瑞景冬曦吳王乃波伍相輦西施珠翠族來居玉堂而澒洞笙簧擁出登綺席以逶迤觸物窮奢含情愈惑欲移楚峽於雲際擬鑿殷池於檻側花顏縹緲欺樹裏之春光銀焰熒煌卻城頭之曙色殊不知敵國來攻攢戈耀空虎怒而拏平雉堞雷訇而擊碎簾櫳甲馬萬蹄卷飛塵而滅沒瓊樓百尺爆紅燼之冥濛悉繇脩袖舞殃朱唇唱隟瑤堦而便作泉壤玉礎而旋成蘚石恨畱山鳥啼百卉之春紅愁寄壠雲鏁四天之暮碧悲夫往日層構茲辰古壕香逕而同歸寂寂稽山而杳自高高遺堵塵空幾踐㣥遊之鹿滄洲月在寧銷怒觸之濤已而西日悤悤東波浩浩松楸而駢作荒隧車馬而輾通長道彼雕牆峻宇之君宜鑒邱墟於茂草陳皇后一鏁長門蕭條渥恩欲寫退宮之永恨因求體物之嘉言蜀郡才高述遺芳於桃李漢皇心感歸舊職於蘋蘩想夫跡墜城南寵移天顧難期獻蠒於春晝不忍解簪於日暮瓊樓寂寂空高於明月秋風瑤草凄凄莫輾於金輿玉輅於此蓄憤夫何釋情犀浦有多才之著上林推獨步之名沽酒而居每樂當壚之事量金以至爰流擲地之聲於是摛妍辭貌濃黛侔錦字陳綺態鬱芬馥於茝席悄丁當於珠佩鵲巢入搆翻成別鶴之悲馬首虛瞻不識牽牛之會振動文苑旋彰國朝既切採蘼於藻麗遂牽連理於桃夭一旦惻聖鑒錫嘉昭已無為雨之期空懸夢寐終自凌雲之製能致烟霄莫不傾北園駭南國絲蘿而昨日靡託珠翠而今朝改色玉臺有恨舞鸞之影孤來金闕無恩吐鳳之才續得設使幸望禺若含情默然擢髮同論於漢殿揮毫莫構於巴川則此日前魚定作小鱗而赴海寧令破鏡卻成圓月以昇天懿夫掞天之手雖奇麗水之珍可博苟非茲賦之讚詠奚救當時之黜削方今妃后悉承歡不是後賢無此作白帝承乾乾坤悄然潘岳乃驚素髮感流年抽綵筆謺花牋驅走㣥言寫抑鬱之懷矣搜羅萬象賦蕭條之景焉於時凄凄漠漠零露蒙作杳杳冥冥勁風吹成或青山兮薄暮或綠水兮新晴昨日金輿天子自西郊而迎入此時火斾祝融指南極以遄征於是踆烏減赫顧兔添明地上落紅渠之態煙中吟玉笛之聲華嶽峯高染蓮花而翠活湘川樹老換楓葉以霞生愈碧吳山偏清漢水松栢風高兮歲寒出梧桐蟬急兮煙翠死衡陽落日龢旅雁以飛來劍閣中宵逐哀猿而嘯起遂使隋堤青恨吳嶺綠愁廬阜之蟾開石面錢塘之雪入濤頭空三楚之暮天樓中歷歷滿六朝之故地草際悠悠魚美東鱸獸獰西虎送鸞扇之藏篋迎朱絲之織戶海上而輕籠皓月皎潔成冰隴頭而惹著陰雲蒼茫欲雨斯則寒暑推移衰榮可知金生火死菊換蘭萎豈惟自遐及邇窮高極卑上澄鵲漢以清淺東瑩鼇洲而渺瀰數聲之元鶴驚時九臯搖落一夜之新霜撲處百卉離披是時坐客聞之侔色揣稱咸言此日之摛藻更苦曩篇之秋興拔塵俗之能琴其誰不欽戴安道之亶名斯異武陵王之慕義彌深降使殷勤將召來以聆雅越持誠慷慨爰擊碎以示胸襟想夫名利莫羈煙霞為賞澗松雖聳於梁棟野鶴不侵乎羅網吳山越水韜物外之清光蜀軫虞絲播人間之妙響杳杳區區何人戒途白屋忽驚於嘶馬朱門欲俟於啼烏焉有平生探樂府錚鏦之妙爰教一旦厠侯門戛擊之徒於是賁出月窗毀於蓬戶擲數尺之鸞鳳颯一聲之風雨朱絃併斷類冰泉裂石以丁零玉柱交飄誤隴雁驚弓而飛聚使者焉知宣言大非且異鍛珠之義寧同碎斗之譏陌上迴塵走清風於玉殿堂間釋手章素節於金徽於時野客相高時人或陋梧雕桐斷以寧顧漆解膠離而莫救至若池亭夜月之景巖谷春風之候遙當野岸肯思流水之曾彈靜對庭蕪待從幽蘭之不奏向若投綠綺以無意緬維城而有情亡一時之高躅矜六律於新聲則此日知音但仰躍魚之弄碧山煙霧寧畱藏豹之名則知藝至者不可以簪笏拘情高者不可以王侯致終挺特以驚俗不斯須而辱志於今人語其風孰不揖當時之事象帝以伐出物我陶開杳冥至精風散元氣雨零一濁一清既定乾坤之體或融或結遂為河嶽之形豈非斷乎鼇足之時剖彼鷄黃之日二儀各立以交泰一氣旁流而洋溢於是蒼茫不定奔為歸谷之墟積聚無從謺作干霄之質則令川陸天下江山域中淺深莫極夷險難窮剛柔隨之而洶湧嗜欲繼之而隆崇翻雪浪與霜濤下吞方厚拔重峯兼謺嶂上列圓空爾乃產鱗介蟲沙植羽毛草木星辰晝夜以明滅烏兔東西而往復則有龜負龍擎文籍其陽九陰六共觸愚移傾缺其天樞地軸如疏樸畧波萬壑以派分似截渟泓仞千巖而雲矗旋聞大禹鞭神巨靈湧身鑿通浩渺擘斷嶙峋然後摠注滄海爭磨碧旻舟檝風生航利名於世世輪轅雷起駕禍福於人人至今若帶興言如拳設喻牢籠下土以箭急控壓中洲而石固三門九曲競呈昇沒之源太華維嵩交闢奔衝之路誰能究厥理考其情溝瀆曷為而散作邱陵奚補而攢成致彼至柔灑回邪而互急俾其峻極干道德以全平吾欲炭鞴陰陽罏燃天地鼓將邐迤之濬谷寫破連延之積翠令今日之形象復當時之寤寐默默帛丿糸帛丿糸然卻歸於無事我太宗之啟聖崇基魏侍中之推誠輔時恐羽獵以失德採風騷而屬詞瞻仰皇情欲止畋遊之事激揚丹懇爰陳諫諍之詩當其內則雍熙外無攻討閒憶擒飛而逐走靜乃搜林而索草殺傷有度雖知不損於仁心獮狩非時或慮微妨於帝道於是傾素節揣深衷何以闡禹湯之誡莫如陳周召之風願開三面之仁上行君聖遂取二南之義下効臣忠爾乃揮以綵毫流於妙墨文高而簡牘增煥思若而烟霞動色莫不大罄箴規堅持讜直輝珠耀玉面陳丹陛之前諷古諭今袖獻紫宸之側錯落清唱錚鏦雅言敘獲獸爭禽之理述好生惡殺之源少補元化輕裨至尊字字而請休馳騁篇篇而乞罷驅奔非不能繼子雲操賦而進非不能續司馬裁書以論蓋以詩也中律鏘金成章燦綺掬山川氣象於彼載帝王興衰於此以之剌上則上或風從以之化下則下皆草靡所以摛此章句依於典墳希一覽而恩覃羽族冀再觀而惠及毛㣥庶幾六藝之妍終資睿鑒當使三驅之禮不越明文然後甲馬休飛騂弓莫控俾百獸以率舞致四夷之入貢故其旌逸調賞清辭錫綵繒而甚衆王獻之繢畫彌精變通可驚失手而筆唯誤點應機而牛則真成用是飾非既擅一時之妙持功補過爰垂千載之名當其團扇羽輕素繒雲薄搦金管以如湧露秋毫而似削莫不佇思翔鸞澄神丹鵲臨風緬想滿輪之桂月鋪開對景嘆嗟一點之松烟飄著隱暎瑕匿依稀漆濃既黑白之斯異顧東西而曷從南容之玷難磨空傷往事曹氏之蠅可學遂展奇蹤於是逐手摛成隨宜演出斯須亡墮落之所頃刻見下來之質筆為鋒也無慙賣劍之年墨作池焉豈愧蹊田之日則知負藝通神呈功駭人遽從無而入有俄背偽以歸真況乎鳥文黛暗駮彩花新兔翰初停旁起落毛之想鼠鬚尚對遙懷食角之因足令飲潁牽懷飯秦動思坐驚踐葦之處立驗放桃之地手捫而執紖罔殊衣惹而飾繒奚異經年不去寧生舐犢之心終日長閒豈有駕車之意所謂取象於斯稱工在茲雖恨纎芒而到此終持妙跡以加其矧復首尾曲盡毫莫遺示不用於秋深之日自無全於縷斷之時桓溫乃拂拭增驚周旋載顧徒見奇於手巧了莫知其筆誤大凡遊藝之人無不卻塵而掃污王者以御彼萬國居於九重既體天而立制遂如首以猶龍視聽無偏四海自看其波湊聰明罔失兆民咸覩其雲從豈非祖述聖明披陳道德以王者為天下之大域中之式非澄耳目不可以燭暗通幽非審細微不可以開基建極於是設喻斯異微文特殊以端拱之尊比義取產澤之靈合符則而象之既不雷同於形質區以別矣爰將首冠於寰區然後嶽嶽高居禺禺克定翼左右而何慙角聳鏡遠近而宛同神瑩雖云黈纊洪纎之狀咸觀縱使垂旒巨細之音畢聽則知播雍熙之化為昭聖之君遽配騰驤於水物益彰超邁於人㣥濬恩波而固類興雨呈瑞氣而非同召雲侔其矯舉之形無幽不鑒彼孤標之貌有象皆分故得逈拔可觀感通自有散皇明而珠耀於頷揚德澤而浪生於口寧同荀爽只擅美於弟兄更異華歆但垂名於朋友所謂表有截播無私乃藹然而同德非蠢爾以呈姿言乎漢祖之顏方能比也念彼伯陽之道未可方之今我后變見乘時飛翔叶理四方盡入於傾聽陸海無遺於俯視夫如是則龍之首兮未可論功而較美天上神仙人間得焉青囊有術白日昇元能拔跡之如是非禀生之偶然明明而飛出寰區其誰不駭去去而立臻霄漢成道奚先斯人也學至感通質離寒暑揮毫而金簡初載端冕而玉皇有佇綿邈而龜臺鶴浦幾刦勤求參差而羽駕霓裳一朝輕舉當其瑞景融融圓虛碧穹有煙霞兮蓊鬱數處有鸞鳳兮盤旋半空競矚塵眼誰原道風俄然乘軒后之龍朝辭水上忽爾控王喬之鶴晝入雲中滅沒孤飛飄颻莫駐數聲如觸於瓊珮一片漸高於綵霧何門積學換俗骨以輕輕此日登真躡瑤池而步步莫不極雲路逗天津崑邱入境閬苑尋春瓊樹之煙花有主蘂珠之宮闕無塵翹首仰攀更接蓬壺之士低眸俯視大驚朝市之人得非龍虎專修陰陽久習早成金鼎之九轉迎嚥玉罏之一粒則必夙居丹壑冥契浮邱卻歸鼇背之三島遽別羊腸之九州不然者安得從地面昇雲頭當紅塵之午景為碧落之良遊較美古今列子之乘風固劣論功晝夜姮娥之奔月非優懿夫曦轡亭亭烏光杲杲爰脫屣於方厚驟致身於蒼昊蓋以研鍊斯至囂煩克掃愚將蹈妙域以扣元關學取上昇之道曲也者厥理惟何直也者其辭可屬一則見回邪之所自一則非平正而不欲故聖人立此格言為乎懿躅俾有家而有國不與混同令自高而自卑靡相參觸至如木也或表從繩之直或謺來巢之曲雖則含煙帶雨共呈蒼翠於巖間而聳本盤根各禀規模於山足勿言同地而錯雜固乃殊途而瞻矚所以方能中矩俟良匠之所知勁不為輪信奇材而可錄莫不分彼邪正鎮於時俗且木之理兮猶不差忒人之道兮切在忠直直也不可以曲從曲也不可以直飾行於己而己有異施於人而人是測由是屈原在楚餔其糟而不為比干相殷剖其心而可得顧惟忠讜之受性豈與邪諛而同域其不相入也理苟如是俗奚以惑小人曲媚或乘造次以得時君子直誠可仗英明而輔國今我后恢睿哲以御乾澄聖心而立極惡似鈎而在物樂如絃而比德惟曲是斥彰萬乘之準繩惟直是求示百王之楷式微臣之獲詠歌敢不佩之於取則文皇帝以精求要義下訪良弓以木心之邪正既別將理道之比方乃同木若有邪奚副準繩之一一理如無苟必資國祚之崇崇斯蓋體元立制啟聖乘乾與禹湯而接軫將堯舜以差肩覩於物也必有誠焉言念為弓尚窮元於脈理豈於有國不注意於英賢否則何以宏丕圖於赫赫垂寶祚於綿綿者哉則知黃帝造舟車之旨其難為比周武倒干戈之文殊不稱美觀草木而尚此燭幽統寰區而足彰致理遂使度木掄材之子每自依依獻可替否之臣曾非唯唯今吾皇播聲教以鏘洋濬恩波而浩汗乾坤與之而合德夷夏有之而一貫斯弓不制洞其理以明明斯問克興露其言而粲粲儒有生在江嶺來趨輦轂波濤久慕於化鯤兮謹按洪邁容齋四筆此賦有五聲後闕入聲一韻
