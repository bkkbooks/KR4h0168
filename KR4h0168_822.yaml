front:
  text: 全唐文欽定全唐文卷八百二十二滔字文江泉州莆田人乾寧二年進士光化中除四門博士天復元年受王審知辟以監察御史裏行充威武軍節度推官
  hash: sha256:061b78ea08920d5084eac64d9e5f246e28eafc089596957545ab7bb517327e79
  markers:
