front:
  text: 全唐文欽定全唐文卷七百八十李商隱十
  hash: sha256:fed5bb1fb140db8f32ddf7a03328fe09315869b2405b02e80816ede40e009a26
body:
  text: 聖敬文思和武光孝皇帝陛下在宥七年尚書河東公作四證堂於梓州慧義精舍之南禪院圖益州靜無相大師保唐無住大師與洪州道一大師西堂知藏大師四真形於屋壁化身作範南朝則閣號三休神足傳芳東蜀則堂名四證乃今銓義與古求徒綵扎既新睟容伊穆爰命詞客式揚道風蓋惟麾玉柄於元津初流二諦隱金椎於覺路終駕一乘理在無言情殊有待慧間雲布誰爭潤礎之功禪際河流匪競浮槎之遠旁詢地志遐考山經昆陵未曰天齊泰岳徒稱日觀定竺乾於身毒郭璞之言有徵證羅衞於華胥王邵之書可信雖復一緣既演五夢斯呈闃寂雙林崩騰八國而心心授印寧關乾鵲之祥頂頂傳珠未待驪龍之寐吾知之矣代有人焉惟無相大師表海遐封辰韓顯族始其季味疑夙挺真機見金夫以有躬援寶刀而敗面大師得因上行豁悟迷塗載騐土風東國素稱君子旋觀沙界西方是有聖人遂西謁明師遇其堅臥俄烘一指誓續千燈火鼠衣光燭龍引焰火如燈蠟霅若煎膏師乃引與之言歎未曾有退從谷隱惟製草衣曳屨用自牧之荑結束引難圖之蔓農夫乍去或議裁縫薙氏云歸方聞襞積寧思天柱詎學水田鮮華不望於鬱泥密致那期於刻貝加以峰危鳥道林絕人蹊梁置之鹽鄰殊莫致鬱單之米界絕難通於是橡栗無求鳧茈不掘想餘糧於蓬堁調美膳於苔垣吞沙了異於羅旬得塊返欣於重耳昔平輿釋子猶餌石帆隴右沙門尚餐松葉比若斯等方信莫同章仇兼瓊擁節內江分符右蜀因其百請始議一來遇羯虜亂華鑾旌外狩局皇圖於巴濮指赤縣於犍䍧猰貐磨牙鯨鯢奮鬛上皇顯圖內禪自恃真期久披宸襟徐叩妙鍵無慚漢室空禮清涼之臺有陋魏朝徒建須彌之殿道含九主恩浸四生獲永固於靈根實仰資於圓智時無住大師尋休劍術早罷鈐經韜綦連之四弓捨步陸之七箭逕欣道在罔憚人遐坎軻汾陰飄遙益部聿來胥會默合元符本惟肅於尊顏竟克諧於妙果優孟之同楚相不亦遼哉丑父之類齊侯竟何為也事雖可引義則殊歸宴坐窮喦化行奧壤頂輪降祉肉髻開祥及將寓信衣乃誤因罷士經過九隧流落六㣥彼既懸定於傳刀此亦熟驚於袪篋璧留曲阜詎為張伯所藏劍出豐城豈是雷華可佩適來適去悉見悉知故得大梵下從通僊右繞臂舒百福眉曜千光靈禽例散於覺花瑞獸常銜於忍草寧止山神且屆但送甘松藩后絕臨空分沈水凡茲異迹未可殫論杜相國鴻漸崔僕射旰並望切龍門情殷荷擔留迷待楯出病求攻克揚靜眾之名特峻保唐之號蜀誠有矣楚亦宜然惟洪州道一大師古相標竒足文現異俯愛河而利涉靡頓牛行過朽宅以銜悲頻迴象眎早從上首畧動遐心攜仁壽之剃刀振天台之錫杖遄違百濮直出三巴拂衡岳以倘徉指曹溪而悵望都遺喻筏盡滅化城罷懸柝於頓門抗前旌於超地披荊西裏坐樹南康有感則通無聞不聳醫龜思遇哽虎求探化漢水之漁人奚求往哲度青蘿之獵客肯愧前修智藏大師以松闕之英梓潭之靈目廣青蓮脣飴赤果自有來而致敬由無取以相歡綿邈星霜留連几杖初聞四句誠為入實之賓末聽三幡了是無師之智遽援坐席令傳了經非取履於下邳還稱可教異服膺於泗水更謂不如明牧前歸英人後感相紫階則生金吐義禮白塔則盡竹書名彼四大士者皆行貫迦維名高記別且夫紛綸藻繪列慈氏之雲臺合沓緗囊貯聖王之蓬閤我幕府河東公天瑞地寶甘雨卿雲總海內之風流盛漳濱之模楷號鳴文苑陟降朝階自作我上都統以京尹輦轂之下紱冕所興本之以強宗近親因之以豪猾大俠丙吉為相出遇橫屍袁盎免官歸逢刺客公貞能盪蠱正可辟邪殷貨殖於五都無勞走馬屏椎埋於三輔何必問羊託宿於天官假道於雒宅五年夏以梁山蟻聚充國鴟張命馬援以南征委鍾繇以西事大張鄰援尋覆賊巢既而軍壘無喧郡齋多暇紗為管帽布是孫衾神仙中人方其攜手風塵外物乃以關身夢裏題詩醉中裁簡臨池筆落動草琴休至於三堅八正之言四攝六通之說則理超文外照在機先修竹長松不曾形迹孤峰澹澗未覺親疎鄙物物以肇端自如如而取證讚同范泰律若張融王澄徒服其嘉言孟顗不知其慧業屬者以洪州三大師靈儀未集華構將成乃進牘求真移書抒意江西廉使大夫汝南公黃中秉德業尚資仁動之則瑤瑟瓊鐘鏘洋清廟靜之則明河亮月浩蕩華池遠應同聲函緘遺貌試殿中監魯郡鄒從古家承作繪藝有傳神授以齋修俾之雕煥情勞若病思苦如癡拂壁但見其塵驚倚柱不知於雷震妙分塗掌巧寫應身如安所洗之腸若見不沾之足詎同袁奮畫一室之維摩畧等戴逵寫五天之羅漢况剎懸慧義山聳長平花市分區香城轉軫龕流逈漢梯倚重霄桂處吳剛榆邊傅說轡迴羲仲則日欲推輪門啟蘇林則天堪倚杵斯堂也爰初置臬靡託金材或以篔簹參於棼橑如堪韜布恐劉肇以裁筒苟可當簻慮蔡邕而製笛公遂養之宏棟易以榮椽黃楠可訪於下巢翠篠罔攀於清渭漸鴻得桷賀鷰依梁望同老氏之春臺牢若文翁之石室本乎初念逮彼成功自一毛半菽之微至雕玉布金之麗皆不資官廩無取軍租非飲馬之餘錢則遺盜之舊布將遣涪川習定郪道降魔苟能浣爾之塵勞莫不涉子之閫奧又院有緇叟族高隴西頃據方壇時稱律虎晚修圓覺世謂義龍石磬朝吟銅瓶夜滿不扃外戶靡立中圍公喻以傳香假其譚柄且山毛綜覈未挂支提許郭輩流偏遺梵行斯固天機有裕世網無纏盍裛縟於縑緗可鋪舒於琬炎愚也中兵被召上士聯榮敢同譙郡之功曹願作山陰之都講何言此事叨謂當仁矧紅磴時尋多逢翠碣紫榛乍倚每見丹碑龍門慕新野之能江夏服盈川之富恨不疆場俯接旗皷親交貫其三屬之犀皮焚彼十重之鹿角以靈才結課用逸思酬恩來者難誣前言不戲庶使禰衡讀後重峻文科王粲背時更昇鄉品其詞曰熙矣無上怡然至真壽長滴海劫遠吹塵蒼茫去聖造次求仁誰從多轍自涉殊榛婆斯南遊達摩東止智劍拭土信珠澄水道在肝膽化行竹葦廬阜伸拳城安得髓猗歟靜眾來隔天潯遺珪擲組燼指求心柔管代毳掏土延陰蘚含檀缽露止瓊針鳴光天靈倉絲地望勢隔嚴道人同寶相梵眾來格魔軍內向犀枕金爐冰崖雪嶂從容大寂挺拔曹溪情超地位意小天倪呦呦苑鹿喔喔園雞融心露鏡刮瞙模篦末有西堂克流英盼翦拂慧炬貫穿戒線金浦涵月瓊嵓躍電雲母飄花流黃舉扇我公有命咨爾丹青恢崇大廈寫載真形簷垂義網戶綴元扃三生聚石九子垂鈴公實挺姿褰涵天壤捧日孤起橫秋直上謝安塵尾王恭鶴氅灰琯迎和霜鐘進爽六通勝範四證微詮蜂音出妙鳥偈留元傳真得果聚福成田遼遼鵬壑眇眇龜年掩靄巴山繁華蜀國世界嚴靜人天腷臆崇基式固芳音無斁長現優曇永觀摩勒梓潼帥所治城東北一里有宮曰紫極宮宮有道士曰胡君宗一東都佐漢尚書即諫於探籌南國仕梁遊擊還聞於奉鏡既還閨紫府納陛丹臺遂擺落家聲而削除世系今乃元元之遐冑玉皇之後昆青骨綠筋元邱白誌洞士之鬚面處子之肌膚舌響瓊鐘骨搖金鏁霞烘帔薄籜嫩冠欹開天上之文房應收筆硯入人間之武庫未見戈矛其稟質之秀也如此青囊藥聖緗扆方神華陽之洞裏茯苓湯谷之肆中甘草神憂智藏鬼謝秋夫以刮雲長者為凶以鍼孟德者為忍郭太醫兩難之說無乃疎乎徐從事九轉之方既聞命矣其造微之術也又如此膺是美祿以資元遊歎楚俗之醉稀怨中山之醒早歷城伏日會稽暮春麴枕凌晨蓮筩落晚覆景升之伯雅倒季倫之接䍦比者解醒多調琬涎向來巳渴例用瓊漿千鍾初戒於初筵百榼未成於荒宴其寄情之遠也又如此不橫何筯靡對朱杯崑崙之禾徒稱於商徼桄榔之麥丏浪出於丹區朱鳥含津蒼龍鍊氣用庖書為外典以食蔬為空言日彩九芒便同業鼎露華五色巳當僖盤其絕累之至也如此至於直置形骸混齊歌笑或久留白社或蹔詣丹麾遲迴而稍至牆東倏忽而遷居竈北由來箕踞禰正平未曰狂生所過糞除王彥伯齊稱道士則固非一端可定二教能拘諒不測於仙階亦難論其鄉品然而能持慈寶不蠧元樞忽聞濟物之功聊有寄言之路尚書河東公作鎮之三載也雨苗均惠風草馳聲郄元帥之詩書那宜奪席曹相國之黃老未足爭鞭君忽唱曰斯民也凡帶城闉畢趨宮井且蠻沙易濫賨壤多疎不可家置銀牀人開玉甃其或踆烏未上趙尊之戶扇方扃顧兔猶毚曼倩之窗櫺未啟則詞人臥病莫冀霑唇窮子號冤無容灑面况北通上路南際殊鄰有渡漢之靈牛有還燕之駿馬少陽用事抱瑩角以來思畏景無陰踠奔蹄而至止苟虧上善或致中乾君乃於宮之西南載攷水經仍窮井德一八四八鮑侍郎遽爾庾辭九二九三鄭司農藹然深義將就厥志必求所同時則有若我同僚六君子者竇將軍之府內元甲朱旗王太尉之幕中紅蓮綠水偕崇虛室並攝靈臺陰功共矢於三千久眎同期於八百倒夫筐篋竭以抒機君乃指此甘凉畢其溝沼烟移宋畚雷動劉鍬晉塊咸除涇泥盡漉靡踰浹日遂冽寒泉復博采貞珉遐求怪王乘混沌之鑿幾裂雲根樸屬之車爭馳風磴武都引鏡東海分橋下壁立以呈堅上觚稜而顯巧方流與潔靈沼分清丹竈飛華寧有代僵之李赤簫遺響終無半死之桐隅落松門藩籬檜殿未飛劫燼尚紐坤維武夷重讌於曾孫宣岳更歌於阿母亦永絕無禽之咎終微射鮒之虞君更以我輩數人一時之彥具惟方臭盍議雕刊疑余曾夢綵毫或吞文石屢迴隆顧亟闕一字斯文八斗知慙四科奚取天長地久同銜瀉炎之規古往今來無復結茆之困言之不足乃作銘云光芒井絡鬱勃天彭於惟教父誕此仙鄉聞闕一字秦畤見臘嘉平黃寧虛位綠字題名其一徐瓠留犀扁桑分水虢蹷趙夢齊痁秦痔金繩續脉玉管損疑髓蛇膽明眸虎鬚牢齒其二酕醄過市酩酊經壚潯陽傲令富渚狂奴三春竹葉九日茱萸延年裸袒孟祖號呼其三龜咽存元熊經養秀曠矣鼎鼐悠哉籩豆穢若食帶鄙同探鷇竹實雖繁山梁不齅其四爰嗟繘井載隔搴林拜異疎勒穿殊漢陰膏融土脉乳瀵泉心匠得鳧舄上分鳳簪其五吾黨具采藩條是贊千尋建木萬丈絕岸華裾上榻白桁素案明月離雲鉤星在漢其六燕齊賓客楊許師資養生著論招隱裁詩元中領悟塵外襟期共防綆短同慮瓶羸其七古有三巴今分二蜀縈紆九折崢嶸七曲元鶴華表仙人棊局我刻斯銘永日郭朝旭其八公以致仕刑部尚書年七十五會昌六年八月薨東都贈右僕射十一月遂葬龍門子景受大中三年自潁陽尉典治集賢御書侍太夫人宏農郡君楊氏來京師胖胖兢兢奉公之遺畏不克既乃件右功世以命其客取文刻碑文曰公字樂天諱居易前進士避祖諱選書判拔萃注秘省校書元年對憲宗詔策語切不得為諫官補盩厔尉明年試進士取故蕭遂州澣為第一事畢帖集賢校理一月中詔由右銀臺門入翰林院試文五篇明日以所試制加段佑兵部尚書領涇州遂為學士右拾遺滿將擬官請椽京兆以助供養授戶曹時上受襄陽荊州入疏獻物在約束外公密詆二帥且曰非善良後雖與宰相不厭禍其後禮官竟以多殺不辜謚于頔為厲李師古襲父事逆務作項領以謾儕曹上錢六百萬贖文貞故第以與魏氏公又言文貞第正堂用太宗殿材魏氏歲臘鋪席祭其先人今雖窮後當有賢即朝廷覆一瓦魏氏有分彼安肯入賊所贖第耶上由是賜錢直券以居其孫在職三年每讌見多前笏留上輦是否意詔湔剔抉摩望及少年見天下無一事五年會憂掩坎廬墓七年以左贊善大夫著吉武相遇盜殊絕賊棄刀天街日比午長安中盡知公以次紙為疏言元衡死狀不得報即貶江州移忠州刺史穆宗用為司門員外四月知制誥加秩主客真守中書舍人敘緋受旨起田孝公代衡陽孝公行贈錢五百萬拒不內燕趙相殺不已公又上疏列言河朔畔岸復不報又貶杭州既至築堤捍江分殺水孔道用肥見田發故鄴侯泌五井渟儲甘清以變飲食循錢塘上下民迎濤祠神伴侶歌舞徙右庶子出蘇州授秘書監換服色遷刑部侍郎乞官分司得太子賓客除河南尹復為舊官進階開國九年除同州不上改太子少傅申百日假又二歲得所薨官白氏由楚入秦秦自不直杜郵事封子仲太原以有其後祖某鞏縣令考季庚襄州別駕贈太保一女妻譚氏始生公七月能展書指之無二字縱橫不誤既長與弟行簡俱有名故李刑部建庾左丞敬休友最善家居以戶小飲薄酒朔望晦輒不肉食攜鄧同韋楚白服遊人間姓名過海流入雞林日南有文字國為中書舍人三日如建中詔書上鄭公覃自代後為相質直文宗時文貞公果有孫起使下數歲至諫議大夫賢可任為今上御史中丞他日景受嘗跪曰大人居翰林六同列五具為相獨白氏亡有公笑曰汝少以待其曾祖弟今右僕射平章事敏中果相天子復憲宗所欲得開七關城守四州以集巨伐仲冬南至備宰相儀物擎跪齋栗給事寡嫂永寧里中有兄弟家指嚮健慕以信公知人集七十五卷元相為序系曰公之先世用談說聞肅代代優布蹤河南陰德未校公有弟昆本枝不搖乃果敷舒匪骼匪臑噫其醇腴於鄉洎邦取用不窮天子見之層陛玉堂徵徵其中上汰唐禹帝為輦留續緒襞縷歲終當遷戶曹是取煜白其華㬭不痕緇用從棄遣至道天子疇誰與伍率中道止納筆攝麾綽三郡理既去刑部倏東其居大尹河南翦其暴逋君有三輔臣有四畝臣衰君強謝不堪守翊翊伸伸君子之文不僣不怒惟君子武君子既貞兩有其矩孰永厥家曾祖之弟坤柄巽繩以就大計匪哲則知亦有教詔益裒其收揠莠而導刻詩於碑以報百世公老於東遂葬其地曾祖諱某皇美原令祖諱某皇安陽縣尉父諱某皇郊社令處士諱某字某郊社令第二子也年十八能通五經始就鄉里賦會郊社違恙出大學還滎山就養二十餘歲乃丁家禍廬於壙側日月有制俛就變除遂誓終身不從祿仕時重表兄博陵崔公戎表姪新野庾公敬休平陽之郡等以中外欽風處在師友誘從時選皆堅拒之益通五經咸著別疏遺畧章句總會指歸韜光不耀既成莫出麤以訓諸子弟不令傳於族姻故時人莫得而知也注撰之暇聯為賦論歌詩合數百首莫不鼓吹經實根本化源味醇道正詞古義奧自弱冠至於夢奠未嘗一為今體詩小學通石鼓篆與鍾蔡八分正楷散隸咸造其妙然與人書疏往復未嘗下筆悉皆口占惟曾為郊社君造福於墅南書佛經一通勒於貞石後摹寫稍盛且非本意遂以鹿車一乘載至於香谷佛寺之中藏諸古篆眾經之內其晦跡隱德率多此類長慶中來由淮海塗出徐州時有人謂徐帥王侍中曰李某真處士也遂以賓禮延於逆旅願枉上介與為是邦處士謂徐帥曰從公非難但事人匪易長揖不拜拂衣而歸其詞蓋譏其崔相國事也復歸滎上講道如初享年四十有三以太和三年三月二十六日棄代以其年十月卜葬於滎陽壇山原望於先域夫人滎陽鄭氏合焉二男瑊頊時甚幼孺猶子思晦寔尸其禮至會昌三年以風水為患松楸不立二子號呌願更蓍龜商隱與仲弟羲叟再從弟宣岳等親授經典教為文章生徒之中叨稱達者引進之德胡寧忘諸願襄改卜之禮敢遺撰美之義閣下獨執文律首冠明時頃於篇翰之間惠以交遊之契竊書遺事敢請刊銘冀推族類之恩用永隱淪之德伏紙酸哽十不存一謹狀北祖大房夫人姓盧氏曾祖諱某某官父諱某兵部侍郎東都留守夫人兵部第三女年十七歸於安陽君諱某字叔洪姑臧李成憲滎陽鄭欽說等十人皆僚壻也安陽君年十九一舉中進士第與彭城劉長卿中山劉眘虛清河張楚金齊名始命於安陽年二十九棄代祔葬於懷州雍店之東原先大夫故美原令之左次美原諱某字既濟其墓長樂賈至為之銘一子邢州錄事參軍諱某字叔卿始夫人既孀教邢州君以經業得祿寓居於滎陽不幸邢州君亦以疾早世夫人忍晝夜之哭撫視孤孫家惟屢空不克以邢州歸祔故卜葬於滎陽壇山之原上俾自我為祖百世不遷後十年夫人始以壽歿諸孤且幼亦未克以夫人之柩合於安陽君懷鄭相望二百里而遠仍世多故塋兆尚離日月遄移將逾百歲曾孫商隱以會昌二年由進士第判入等授秘書省正字所以稱家克寸謀啟合罪戾增積降罰於天卜吉之初再丁凶舋永唯殘喘寄在朝夕懼泉阡乖隔松檟摧殘銜哀抆血盡力襄事克寸以來年正月日啟夫人之櫬歸合於懷之東原永瞻貽厥之恩詎忘論撰之義閤下我祖妣之族子今天下之文宗深惟託分之重實仰錫類之旨敢祈刊勒薦慰尊靈叩心獻狀辭不宣德謹狀昔我先君姑臧公以讓弟受封故子孫代繼德禮蟬聯之盛著於史諜王考糺曹君以隱德不耀俛仰於州縣烈考殿中君以知命不撓從容於賓介惟我仲姊實漸清訓年十有八歸於河東裴允元故侍中耀卿之孫也既歸逢病未克入廟實歷周歲奄歸下泉時先君子罷宰獲嘉將從他辟遂寓殯於獲嘉之東厥弟不天旋失所怙返葬之禮闕然不修至會昌三年商隱受選天官正書秘閣將謀龜兆用釋永恨會允元同謁又出宰獲嘉距仲姊之殂已三十一年矣神符夙志卜有遠期而罪舋貫盈再丁艱故且兼疾瘵遂改日時明年冬以潞寇憑陵擾我河內懼惟樊發載軫肝心遂泣血告靈攝縗襄事卜以明年正月日歸我祖考之次滎陽之壇山仲姊生稟至性幼挺柔範濳心經史盡妙織絍鍾曹禮法劉謝文采顧此兼美自平生知而上天賦壽不及二紀此蓋㣥弟不肖之所延累也銘表之託本於文人將慰歸來之魂實在不刊之筆銜哀摧咽五情已崩孤苦蒼天永痛蒼天京兆杜牧為李長吉集序狀長吉之竒甚盡世傳之長吉姊嫁王氏者語長吉之事尢備長吉細瘦通眉長指爪能苦吟疾書最先為昌黎韓愈所知所與遊者王參元楊敬之權璩崔植為密每旦日出與諸公遊未嘗得題然後為詩如他人思量牽合以及程限為意恒從小奚奴騎距驢背一古破錦囊遇有所得即書投囊中及暮歸太夫人使婢受囊出之見所書多輒曰是兒要當嘔出心始已耳上燈與食長吉從婢取書研墨謺紙足成之投他囊中非大醉及弔喪日率如此過亦不復省王楊輩時復來探取寫去長吉往往獨騎往還京雒所至或時有著隨棄之故沈子明家所餘四卷而已長吉將死時忽晝見一緋衣人駕赤蚪持一版書若太古篆或霹靂石文者云當召長吉長吉了不能讀歘下榻叩頭言阿彌女長吉學語時呼太夫人云老且病賀不願去緋衣人笑曰帝成白玉樓立召君為記天上差樂不苦也長吉獨泣邊人盡見之少之長吉氣絕嘗所居窗中勃勃有烟氣聞行車嘒管之聲太夫人急止人哭待之如炊五斗黍許時長吉竟死王氏姊非能造作謂長吉者實所見如此嗚呼天蒼蒼而高也上果有帝耶帝果有苑囿宮室觀閣之玩耶苟信然則天之高邈帝之尊嚴亦宜有人物文彩愈此世者何獨番番於長吉而使其不壽耶噫又豈世所謂才而竒者不獨地上少即天上亦不多耶長吉生二十四年位不過奉禮太常中當世人亦多排擯毀斥之又豈才而竒者帝獨重之而人反不重耶又豈人見會勝帝耶滎陽鄭璠自象江得怪石六其三聳而銳上又一如世間道士存思圖畫人肺胃肝腎次第懸絡者又一空中而隱外若癭癃殃疝病不作物者又一色紺冰去聲而理平漫彈之好聲璠為象江三年不病瘴平安寢食及還長安無家居婦兒寄止人舍下計輦六石道費俸六十萬璠嗜好有意極類前輩人陶生有恒人善養又善與人遊又善為官會昌時生病骨熱且死是年長安中進士為陶生誄者數十人生在時吾已得之矣及既死吾又得之右一人字蟠之其父少良本鄆盜人也晚更與其徒畜牝馬草吂月馬凡一私作弓矢刀仗學發冢抄道常就迥遠坑谷無廬徼處依大林木蚤夜偵候作姦李師古貪諸土貨下令䘏商鄆與淮海競出入天下珍寶日月不絕少良致資以萬數每旬時歸妻子輒置食飲勞其黨後少良老前所置食有大臠連骨以牙齒稍脫落不能食其妻輒起請黨中少年曰公子與此老父椎埋剽奪十數年竟不計天下有活人今其尚不能食况能在公子叔行胡浪反耶公子此去必殺之草間毋為鐵門外老捕盜所狙快少良默憚之出百餘萬謝其黨曰老嫗真解事敢以此為諸君別眾許之與盟曰事後敗出約不相引少良由是以其資發舉貿轉與鄰伍重信義䘏死喪斷魚肉葱一貝又韭禮拜畫佛讀佛書不復出里閈竟若大君子能悔咎前惡者十五年死子驤率不知後一日有過其母罵之曰此種不良庸有好事耶驤泣問其語母盡以少良時事告之驤號泣數日不食乃悉散其財踰年驤甚苦貧就里中舉負給薪水灑掃之事讀書日數千言里先生賢之時與饘糗布帛使供養其母後漸通五經歷代史諸子雜家往往同學人去其師從驤講授又其為人寬厚滋茂動靜有繩墨人不敢犯烏重允為鄆帥喜聞驤與之錢數十萬令市書籍驤復以其餘賚諸生其里閭故德少良者亦嘗來與驤孳息其貨數年復致萬金驤固不以為已有繩契管揵雜付比近用度耗費了不勘詰道益高開成初相國彭城公遣其客張谷聘之驤不起右一人字义不知其所來在魏與焦濛閭冰田滂善任氣重義大軀有膂力常出入市井殺牛擊犬豕羅網鳥雀亦或時因酒殺人變姓名遁去會赦得出後流入齊魯始讀書能為歌詩然恃其故時所為輒不能俯仰貴人穿屐破衣從尋常人乞丐酒食為活聞韓愈善接天下士步行歸之既至賦冰柱雪車二詩一旦居盧仝孟郊之上樊宗師以文自任見义拜之後以爭語不能下諸公因持愈金數斤去曰此諛墓中人所得耳不若與劉君為壽愈不能止復歸齊魯义之行固不在聖賢中庸之列然其能面道人短長不畏卒禍及得其服義則又彌縫勸諫有若骨肉此其過人無限武后篡既久頗放縱耽內習不敬宗廟四方日有叛逆防豫不暇時宜都內人以唾壺進思有以諫者后坐帷下倚檀机與語問四方事宜都內人曰大家知古女卑於男耶后曰知內人曰古有女媧亦不正是天子佐伏羲理九州耳後世孃姥有越出房閤斷天下事者皆不得其正多是輔昏主不然抱小兒獨大家革天姓改去釵釧襲服冠冕符瑞日至大臣不敢動真天子也然今者內之弄臣狎人朝夕進御者久未屏去妾疑此未當天意后曰何內人曰女陰也男陽也陽尊而陰卑雖大家以陰事主天然宜體取剛亢明烈以消㣥陽陽消然後陰得志也今狎弄日至處大家夫宮尊位其勢陰求陽也陽勝而陰亦微不可久也大家始今日能屏去男妾獨立天下則陽之剛亢明烈可有矣如是過萬萬歲男子益削女子益專妾之願在此后雖不能盡用然即日下令誅作明堂者堯去子舜亦去子周公去弟後世人以為能斷此絕不知聖人事者斷之為義疑而後定者也聖人所行無疑又安用斷聖人持天下以道民不得知聖人理天下以仁義民不得知害去其身未仁也害去其家未仁也害去其國亦未仁也害去其天下亦未仁也害去其後世然後仁也宜而行之謂之義子不肖去子弟不順去弟家國天下後世皆蒙利去害矣不去則反宜然而為之堯舜周公未嘗疑又安用斷故曰斷非聖人事世以為能讓其國能讓其天下者為賢此絕不知賢人事者能讓其國能讓其天下是不苟取者耳湯故時非無臣也然其卒佐湯有升陑之役鳴條之戰竟何人哉非伊尹不可也武故時非無臣也然其卒佐武有牧野之誓白旗之懸果何人哉非太公望不可也苟伊尹之讓汝鳩仲虺太公望之讓太顛閎夭則商周之命其集乎故伊尹之醜夏復歸太公望之發揚蹈厲當此時雖百汝鳩百仲虺伊尹不讓也百太顛百閎夭太公望亦不讓也故曰讓非賢人事臣伏聞系自象先道尊元教有無名之璞不可雕鎪開眾妙之門未嘗關揵達人大觀上士勤行始有胥連爰交尊陸皆稟混成之教以凝懸解之功及至化漸漓真元稍散七十神虎窮蹈籍之姿九百毒龍恣貪殘之患乃復吳宮合石王屋流珠方班萬國之朝始定百靈之位大之則籠羅八極居蔕芥之微小之則陶冶一身後天地而老上維皇屋下及蒸人莫不受煉朱陵施功酆部故五臘二直八節三元咸開懺拔之科用顯修崇之旨臣某幸生昭代素稟元風每秋水凝情春臺寫望暢靈襟而抽思若振羽毛動元籥以開懷如餐沆瀣因循官牒漸染君恩既乖紫氣之占遂阻丹邱之會五嶺之表再麾始臨撫凋瘵之民人壓蠻髦之雜俗竊恐見聞所及未契元科舉措之間有踰真裕或散為疾瘼或遘作凶饑敢薦真師式陳妙會况此府水環湘桂山類蓬瀛固亦武陵之谿桃源接境平昌之井荊水通津洞乳凝華嵒煙結氣浮邱別館薊子郵亭豈直發地五千獨稱於大華去天三百惟迷於武功實幸廉車得親靈境今則凉飈已戒溽暑尋徂九外八遐靜無氛翳二元三景藹有輝光雲篆鳥章珠巾琳几畧皆備物粲有加儀伏乞太上三尊十方眾聖曲流元澤大降鴻慈先俾清朝克逢多福南面慶千春之壽北辰康億載之歡三事百官共綏天祿四夷萬有長叶帝謨然後所部封疆當州寮屬皆無虛士屢有豐年臣齋功獲申道念增厚式揚藩任妙選宸心慶靈長被於身枝清裕永霑於家屬則仰荷大道無極之恩臣限以嚴扃屬茲戎寄不獲躬齎素簡親詣黃壇望紫府以馳誠向清都而潔慮謹附臣李道琮墨辭上啟惶恐謹辭臣忝系仙枝獲蒙道蔭早佩相印屢登齋壇雖八景三清麤聞科戒而七情五賊未勉修持入輔出征綿時歷歲伏慮政刑非當賞罰或乖積夭夭心咎於元司負委寄於皇渥今謹齎薄具仰獻微誠伏乞太上三尊十方眾聖曲垂保祐大賜滌除俾善業克成良願無擁金柯玉葉奉聖祖於千秋黃屋丹墀戴吾君於億載百蠻康樂萬國乂安然後散及冥塗霑諸酆部寒靈罷對滯爽騰輝俱升仁壽之方共奉太平之化唐某年月日朔上清大洞三境弟子妾某本命某年若干歲某月日生屬北斗某星住河南府河南縣正平坊安國觀內今謹攜私屬弟子某等詣京兆府萬年縣永崇坊龍興觀內奉謁受上法師東岳先生鄧君奉依科儀於三聖會仙堂內修建黃籙妙齋三日三夜轉經行道奉為先受法尊師並道場男女官眾及九元七祖弟子門徒等懺罪拔苦祈恩辭上謁虛無元始自然天尊太上大道君太上老君金闕後聖李君十方靈真三界官屬三十六部尊經元中大法師天地水三官北斗尊神本命星尊神洞天林谷一切棲隱諸靈仙等妾夙值師尊欽聞教旨伏以元皇布氣時播㣥生太一傳形肇流品庶皆陶無始成彼自然及三古已還九皇秘迹㣥妖眾孽黷亂真元鬼道尸邪干迷至正於是大分治化廣闢章符金板玉繩載演修存之術河源酆部重明考治之科故得三靈無墊壞之虞萬物被生成之德妾內惟幼騃晚遂修持爰在童蒙被諸僭咎去元和某年獲託於故戶部尚書贈左僕射臣馬總極紛華於少壯結胎血之因緣况臣總被沐君恩久居藩鎮受專征之寄擅外閫之權殄寇下城所傷者不記用刑持法所坐者至多雖事上之心誠無顧避而奉行之際或爽重輕故臣總平生之時許妾以虛無為念冀因晚節同結良緣及臣總捐家妾終喪紀婚姻麤畢門戶如初故東都某觀道士南岳先生符君哀妾香火之勤成妾巾褐之願爰從披度驟歷年光雖積穢行尸感通莫冀而三蟲六賊制伏無虧流輩之中吹噓驟至謂可以奉三洞之尊法稽七真之異聞勸請殷勤推許重疊妾雖榮從非望亦念切良時遂於某年於某處奉詣大洞師東岳先生鄧君奉受上法迴車畢道交帶紫紋負荷元科叨忝真位妾夙宵感勵寢食慙惶於今五年益勤一志兼誓除俗累漸慕清修休絕巳來志念愈潔所希稍存真氣可降眾靈又按仙記云師與弟子能相保七年法者當得道况今國家奉元元之裔聖上崇清淨之風妾師奉為君親廣存濟度妾又筋骸非病齒髮未衰仰佩元恩實為罔極是敢重投靈地再獻微誠遂有同學男女官某嘉妾至心勉妾上路即以今夕再次仙都慶百生有幸之辰登三聖會真之室修崇始畢朝禮云初何必銀臺遠居東海詎資瑤闕近到西昆窺觀而羽翼疑生行列而雲霓交暎欣榮過極感泣不勝謹用上按仙儀旁徵齋法特延清眾重請本師伏乞太上三尊十方眾聖曲流元澤大降鴻私錄妾一念之清心赦妾億劫之重罪伏願善緣益長丹懇獲申君王冀保於千齡輔弼永綏於百福五穀豐稔四方乂寧先授道師遷洞天之位今傳法主享龜鶴之年道俗二緣咸蒙覆露幽明兩代並洗夭夭心尢先魂無冡訟之辜同志絕干城之患陰幽滯爽狴犴窮冤皆獲遷昇盡從寬釋妾誓持女弱永奉元微苟負盟文冀當冥考妾某無任懇惻祈恩之至謹辭唐會昌三年太歲癸亥十月丙辰朔十五日庚午上清大洞三境弟子中岳先生黃帝真人張抱元於所居宮內奉依科儀修建下元黃籙妙齋兩日兩夜轉經行道懺罪乞恩拜上諸虛無自然元始天尊太上大道君太上老君十方眾聖三界靈官三十六部尊經元中大法師崇岳山諸靈官等妾聞至極含虛真人在巳陶混元於無始稟靈性於自然莫不龐贅有為粃糠非道摽北門而高視泛虛舟而不羈及夫淳化漸離真元稍秘於是教垂三洞文演九辰地紀天元因斯立極北酆南霍自此分區猶以修崇之旨未宏懺援之科尚昧故七神五藏降虛黃之上經三日元時開青女之秘訣事踰元象道介希夷正一真人餘文具在三天教主遺法斯存妾慶自多生時丁休運永惟女弱早服師門佩秘籙於上清階眾真之高位雖限存性分而事繫因緣丁寧湯谷之遊髣髴朱陵之會貪叨斯極負荷不勝故八慶三元良時吉日莫不廣開龜座大闢龍山耀銜燭於幽都稽歘駕於元路况所居觀宇乃肇於貴主創自平時絳館清宮居惟帝女珠囊錦帙來自天家通仙之象設可憑大國之慶靈無泯自開元厥後天步攸艱閬苑融臺倒遘鬱攸之毒霓旌絳節咸罹竊發之災而斯觀棟宇無虧圖書不蠧綵扎如舊靈文若新况鎮我神州正當午位北瞻翔鳳自傾臣子之丹誠南眺鑿龍宛是神仙之福地雖浮邱尚阻而佳氣遙通先皇帝重振元風今天子廣明至道恬神姑射系志崆峒銀甕告存非假華山之出珠胎展瑞不因赤水之遺平陽之絳鬛時來崑岳之白環屢入故二京法眾四海名流咸得蔭藹天光晞霑睿澤雲竈盡期於九轉靈階畢慕於三清高功臣抱元捧日降精因星命氏骨鳴金鏁響振瓊鐘昔自綺紈遂辭祿仕倦薊子之都尉厭東方之侍郎固已名列紫書位通丹岳調三關而自適通九館以忘憂頃以台嶠名遊雲臺高邁清溪萬仞丹桂八重爰以金慈忽聞至止故妾及男女官等因下元大慶之日水官校籍之辰稽首求哀摽心奉請願攜清眾為按元科將有望於感通冀必聞於御徹今則元冥司候陰魄將圓魚鑰開簧麟廚備味列炬而房名流電燎鑪而館號明霞伏乞太上三尊十方眾聖曲垂鑒映大降優恩使妾等齋功克成道分增益聖君萬壽良輔千秋凡在生靈悉蒙休祐上通清漢下及幽淵長育咸絕於夭傷窮滯皆蒙於開釋又伏以山東逆豎代北饑戎負義背恩興兵動眾亦願元惡面縛而歸罪㣥校倒戈而顯忠汙俗惟新迷塗復正溥天之下率土之濱永無草擾之虞長保升平之福妾幽明兩代道俗二緣在位者長簡於帝心求道者早升於仙籍誓盡軀命欽奉香燈苟違斯言分當冥考妾以微生幸蒙嘉運得因師友奉佩符圖品在高真文參上法而塵泥賤質肉血微軀未能絕迹人寰棲心物外永懷真格有負元科然至於澡雪身心修勤香火五臘二直八節三元誓以嚴持不敢怠志然恐舉措之際未合元機過咎之來積於酆部年深月遠釁重責深罹寒靈考治之科辱大道興隆之運夙夜自念冰炭交懷今謹因中元大慶之辰地官校籙之日輒於靈地敢獻微誠伏乞太上三尊十方眾聖曲流元澤大降慈恩錄一念之清心赦億劫之重罪使元功克就良願大成君王長享於萬年臣庶咸離於五苦上自雲鳥下及泉魚凡曰生靈皆蒙覆護然後及於私室資彼幽魂見存名上於南宮過往神離於北部河源滯爽狴犴幽冤咸乞蕩除俾從遷適即仰荷大道罔極之恩以妾某所佩圖籙先經遺墜今復尋獲乞恩歸罪據辭上詣虛無自然元始天尊太上大道君太上老君太上丈人三十六部尊經元中大法師所佩籙中靈官將吏三界官屬一切靈化嵩洛名山眾真高隱妾運從往業慶及今生獲以愚蒙早佩經法而注念不謹修奉多違殃與時增善隨日削莫忘塵累備極艱虞兒息凋零孫姪孤藐一辭西雍久寓東周五遷家居十變年序昨者以所授寶籙盛以雕奩既忘誨盜之資果有擔囊之酷遂使金科玉篆見辱於宵人神將靈官久凌於暴客尋求未獲披露無因分已名繫幽官位標黑籍萬劫永沈於狴犴九元同役於河源而罪重憂深誠專感達始聞尋索旋得蹤由爰以吉辰迎歸靜曲修存香火拂拭塵埃瑤緘錯落以如新錦帙爛斑而若舊永懷釁戾不敢遑安今輒請高真仰陳薄具負荊泥首引劒投軀伏乞太上三尊十方眾聖曲流殊渥旁勅元司錄其歸咎之誠許以自新之路使良緣漸固真路稍通既勤肉血之餘長奉靈仙之戒苟其重渝今誓猶涉初心請候真科以從冥考
