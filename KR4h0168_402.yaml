front:
  text: 全唐文欽定全唐文卷四百二庭誥開元時擢書判拔萃科
  hash: sha256:c01baa5e45d8c61d0c32543f40d6651236a48017f3e4e34d7861e8fb5ffd866c
  markers:
  - {type: head, offset: 12, content: 劉庭誥, id: KR4h0168_NFKB_402-h1, level: 1}
body:
  text: 前王列土各有疆場司徒典邦敷陳禮教茍違近以適遠必咨官以辨族彼其之子是何人斯罔協厥居越在他邑動而有悔速訟所以成愆行而有由鄰人於何告攝離其鄉居彞倫或紊逞其旌節有授而來信既由衷何往不濟伍實妄訴宜其詬諸灣先天時進士溝洫之宜隄防是急惟禹盡力乃安生人自鄭渠來興秦壤增利清白相映雲天竝開稻粱交陰雨汗俱發東風適降南畝初勤曉波猶微春修未遽縣令以恤人從術計役乘閒雖蟄戶驚飛方期伐木而斗門議立且恐勞人未為瓠子之決欲后桃花之水府司按職體要俱懷聽風俗於初聞謂弦歌於未理誠以溉灌無闕經營有圖豈乖蒲宰之明當寬柳惠之黜情存審慎可適隨時貞開元時官潤州刺史議曰今文孝經是漢河間王所得顏芝本至劉向以此本參校古文省除繁惑定為此一十八章其注相承云是鄭元所注而鄭志及目錄等不載其故往賢共疑焉惟荀昶范煜以為鄭注故昶集解孝經具載此注而其序以鄭為主是先達博選以此注為優且其注縱非鄭氏所作而義旨敷暢將為得所其數處小有非穩實亦未爽經傳其古文二十二章元出孔壁先是安國作傳緣遭巫蠱代未之行荀昶集注之時尚有孔傳中朝遂亡其本近儒欲崇古學妄作此傳假稱孔氏輒穿鑿改更又為作閨門一章劉炫詭隨妄稱其善且閨門之義近俗之語非宣尼之正說按其文云閨門之內具禮矣乎嚴兄妻子臣妾繇百姓徒役也是比妻子於徒役文句凡鄙不合經典又分庶人章從故自天子以下別為一章仍加子曰二字然故者連上之詞即為首章不合言故是古文既亡後人妄開此等數章以應二十二章之數非但經文不真抑亦傳習淺偽至注用天之時因地之利其畧曰脫衣就功暴其肌體朝暮從事露髮塗足少而習之其心安焉此語雖旁出諸子而引之為注何言之鄙俚乎與鄭氏之所云分別五土視其高下高田宜黍稷下田宜稻麥優劣懸殊曾何等級今議者欲取近儒詭說殘經缺傳而廢鄭注理實未可望請準式孝經鄭注與孔傳依舊俱行又注老子道德經者實謂元言注家多罕窮厥旨河上公蓋憑虛立號漢史實無其人然其注以養神為宗以無為為體其詞近其理宏小足以修身潔誠大足以寧人安國且河上公雖曰注書即文立教皆體指明近用斯可謂知言矣王輔嗣雅善元談頗深道要窮神用乎士冖䂞籥守靜默於元牝其理暢其旨微在於元學頗是所長至若近人立教修身宏道則河上為得今請望王河二注令學者俱行又按劉向七畧有子夏易傳但此書不行久矣所存者多失真本又荀勗中經簿云子夏傳四卷或云丁寬所作是先達疑非子夏矣又隋書經籍志云子夏傳殘缺時六卷今二卷知其書錯謬多矣又王儉七志引劉向七畧云易傳子夏韓氏嬰也今題不稱韓氏而載薛虞記又今祕閣有子夏傳薛虞記其質粗畧旨趣非遠無益後學不可將帖正經謹議史記者漢太史司馬遷父子之所述也遷自以承五百之運繼春秋而纂是史其褒貶覈實頗亞於邱明之書於是上始軒轅下訖天漢作十二本紀十表八書三十系家七十列傳凡一百三十篇始變左氏之體而年載悠邈簡冊闕遺勒成一家其勤至矣又其屬稿先據左氏國語系本戰國策楚漢春秋及諸子百家之書而後貫穿經傳馳騁古今錯綜檃括各使成一國一家之事故其意難究詳矣比於班書微為古質故漢晉名賢未知見重所以魏文侯聽古樂則惟恐臥良有以也逮至晉末有中散大夫東莞徐廣始考異同作音義十三卷宋外兵參軍裴駰又取經傳訓釋作集解合為八十卷雖麤見微意而未窮討論南齊輕車錄事鄒誕生亦作音義三卷音則微殊義乃更畧爾後其學中廢貞觀中諫議大夫崇賢館學士劉伯莊達學宏才鉤深探賾又作音義二十卷比於徐鄒音則具矣殘文錯節異音微義雖知獨善不見旁通欲使後人從何準的貞謏聞陋識頗事鑽研而家傳是書不敢失墜初欲改更舛錯裨補疏遺義有未通兼重註述然以此書殘缺雖多實為古史忽加穿鑿難允物情今止探求異聞採摭典故解其所未解申其所未申者釋文演註又為述贊凡三十卷號曰史記索隱雖未敢藏之書府亦欲以貽厥孫謀云夫太史公紀事上始軒轅下訖天漢雖博采古文及傳記諸子其間殘缺蓋多或訪搜異聞以成其說然其人好奇而詞省故事覈而文微是以後之學者多所未究其班氏之書成於後漢彪既依遷而述所以條流更明且又兼采衆賢㣥理畢備故其旨富其詞文是以近代諸儒共所鑽仰其訓詁蓋亦多門蔡謨集解之時已有二十四家之說所以於文無所滯於理無所遺而太史公之書既上序軒黃中述戰國或得之於名山壞宅或取之以舊俗風謠故其殘文斷句難究詳矣然古今為註解者絕省音義亦希始後漢延篤乃有音義一卷又別有音隱五卷不記作者何人近代鮮有二家之本宋中散大夫徐廣作音義一十卷惟記諸本異同於義少有解釋又中兵郎裴駰亦名家之子也作集解注本合為八十卷見行於代仍云亦有音義前代久以散亡南齊輕車錄事鄒誕生亦撰音義三卷音則尚奇義則罕說隋祕書監柳顧言尤善此史劉伯莊云其先人曾從彼公受業或音解隨而記錄凡三十卷隋季散亂遂失此書伯莊以貞觀之初奉敕於宏文館講授遂采鄒徐二說兼記憶柳公音旨遂作音義三十卷音乃周備義則更畧惜哉古史微文遂由數賢祕寶故其學殆絕前朝吏部侍郎許子儒亦作註義不覩其書崇文館學士張嘉會獨善此書而無註義貞少從張學晚更研尋初以殘缺處多兼鄙褚少孫誣謬因憤發而補史記遂兼註之然其功殆半乃自惟曰千載古史良難紬繹於是更撰音義重作贊述蓋欲以剖盤根之錯節遵北轅於司南也凡為三十卷號曰史記索隱云太史公古之良史也家承二正之業人當五百之運兼以代為史官親掌圖籍慨春秋之絕筆傷舊典之闕文遂乃錯綜古今囊括記錄本皇王之遺事採人臣之故實爰自黃帝迄於漢武歷載悠邈舊章罕補漁獵則窮於百氏筆削乃成於一家父作子述其勤至矣然其敍勸褒貶頗稱折衷後之作者咸取則焉夫以首創者難為功因循者易為力自左氏之後未有體制而司馬公補立紀傳規模別為書表題目觀其本紀十二象歲星之一周八書有八篇法天時之八節十表放剛柔十日三十世家比月有三旬七十列傳取懸車之暮齒百三十篇象閏餘而成歲其間禮樂刑政君舉必書福善禍淫用垂炯誡事廣而文局詞質而理暢斯亦盡美矣而有未盡善者具如後論雖意出當時而義非經遠蓋先史之未備成後學之深疑借如本紀敍五帝而闕三皇世家載列國而有外戚邾許春秋次國畧而不書張吳敵國蕃王抑而不載竝編錄有闕竊所未安又列傳所著有管晏及老子韓非管晏乃齊之賢卿即如其例則吳之延陵鄭之子產晉之叔向衞之史魚盛德不闕何為蓋闕伯陽清虛為教韓子峻刻制法靜躁不同德刑斯舛今宜柱史共漆園同傳公子與商君竝列可不善歟其中遠近乖張詞義踳駮或篇章倒錯或贊論麤疏蓋由遭逢非罪有所未暇故十篇有錄無書是也然其網絡古今敍述懲勸異左氏之微婉有南史之典實所以揚雄班固等咸稱其有良史之才蓋信乎其然也後褚少孫亦頗加補綴然猶未能周備貞業謝顓門人非博古而家傳是學頗事討論思欲續成先志潤色舊史輒黜陟陞降改定篇目其有不備竝採諸典籍以補闕遺其百三十篇之贊記非周悉竝更申而述之附於衆篇之末雖曰狂簡必有可觀其所改更具條於後至於徐廣惟畧出音訓兼記異同未能考覈是非解釋文句其裴駰實亦後進名家博採㣥書專取經傳訓釋以為集解然則時有冘長至於盤根錯節殘缺紕繆咸拱手而不言斯未可為通學也今輒按古今仍以裴為本兼自見愚管重為之註號曰小司馬史記然前朝顏師古止註漢史今竝謂之顏氏漢書貞雖位不逮顏公既補史舊兼下新意亦何讓焉成裕開元二十九年官博州刺史奉閏四月二十一日敕中書門下奏請宣示中外者歷觀寶諜曾所未聞側捧瑤緘不勝忭躍臣謹按洛下閎太初歷云後八百年歷差一日有聖人正之至陛下定歷之年正當八百今又元元皇帝以聖明之代來見真容於夢寐之間再陳靈應稱陛下慶流萬葉享祚無窮則知聖歷昌期合符同契者久矣雖縑緗已載而苕琬未書將何以對越神休光昭睿德臣之愚昧敢以上聞伏請於開元觀具寫綸言勒於貞石入仙宮而物覩知聖祚之天長如允臣所請諸州亦望准此嘉隱開元中衞士獻繩伎賦擢拜金吾闕曹參軍律南呂兮仲之秋帝張樂兮秦之樓鼓舞令節鏗鏘神州萬國會百工休俾樂司咸戢繩伎獨留此聖人之新意也與衆共之降賞成列服也德之稱容兮已之悅觀八佾則羅韤生塵髧兩髦則麻衣如雪結繩既舉彞倫攸序杳若天險之難升忽爾投足而復阻來有匹去無侶空中玉步望雲髻之峨峨日下風趨見羅衣之楚楚足容捷貌容恭鳥斯企雲相從煜煜兮映朱樓之花萼煥爛兮開甲帳之芙蓉橫竿却步疊卵相重繢人不能窺其影謀士不能指其蹤既如阿閣之舞鳳又如天泉之躍龍徘徊反覆交觀奪目擁金騎屯繡轂高詞論者族談多才藝者心服既得擅場其能未央應鼓或躍投繩或翔婉孌兮弄玉之隨蕭史仙妻之別劉綱淩波不足奇其術行雨未可比其方然後知海之深則孤楂可泛河之廣則一葦能航不奔明月不赴高唐食君之珍膳衣君之褧裳喜千秋之令節願獻壽兮天長於是衆變格行無力歡百姓之心傾四方之國掌上失妙宮中沮色所寵者寵其回邪所好者好其正直視履不懼柔嘉惟則故知我者謂我從繩不知我者謂我憑陵繩有弛張藝有廢興用舍靡定倚伏相仍如臨如履何兢何喜猶君之從諫則聖伎之從繩則正惟伎可以為制節繩可以為龜鏡殷鑒不昧在此而已豈徒昭玩人喪德豈徒悅彼姝者子明后居高視卑創物成規此乃堯舜之用心使吾人之載喜慶賜必周將順其美來娉婷去輕盈奇伎兮忽還天上而不可見繩繩兮道之遠兮不可名延齡開元時人獨夜寥寥兮清我素襟踐藝城兮遊遨書林觀先王之行道見古人之同心羲農之精微兮含陰吐陽周孔之奧祕兮神入鬼出有禮樂經邦之化有德刑御人之術雖興風而致理或因文以喪質借如助築於澗垂釣在川夢來而所象方得繇啟而其貺必甄何風雲之冥感而君臣之道全謨明弻諧開物成務儀在楚而何辱隗得燕而何遇起之來兮而長平不守季之入兮而武關非固將吉凶之由人伊存亡之有數若乃大夫西都之佳賞公子南皮之勝矚將軍之畫閣天半衞尉之涼臺水曲馳香車與寶馬眩纎羅及美玉玉饌金觴暮不歸妙舞清歌斷方續何貴幸之斯甚為歡娛以自足士有竄江濱兮不用首河梁兮永辭長門幽絕恨欲死掖庭一去還無期黃鳥嚶嚶兮野花落白露瀼瀼兮邊草衰此時但能登高而遠望孰云不腸斷兮淚如絲夫以總明正直維神之假有才無位奚其為者行莫過於顏曾文莫先於班賈空兢兢於人世竟蹉跎於物下能育其寶則宜無屯不與其命何生此人仗雄劒以激憤一欲問夫蒼旻夜如何其夜以闌閑琴牢落坐南端流月曈曈兮素華滿銀釭煜煜兮清光寒於是開中軒曬晴盼天敞朗兮北斗何高雲依微兮南山可見銀河既已傾玉窗又以明哀鴻嗸嗸兮空際遠墜葉紛紛兮林外輕已而㣥感互興衆念相積憐稚顏兮何暮對流年以自惜徒見其生也楊柳繁華為我春不知其死也松檟幽泉為我夕何恃俊於禰衡何慟窮於阮籍幽蘭無人兮終自芳郭璞蒙垢兮豈不潔黃綬從來兮非所願白雲逶迤兮滿山自得長歌太平事胡為擾擾風塵間葛稚川見素抱樸傲世忘榮循潔白之道吸元和之精泊乎意眹飄然體清於時秋風蕭蕭秋夕凜凜野猿垂幕山童薦枕須臾之間乃安斯寢神倏爾而逾邁眇不知其所屆紛溶溶而上馳將若遊乎天外駕白鹿驂斑麟飛翠蓋騰紅輪橫絕南斗超淩北垠出崑墟以騁志過滄溟而問津呵風伯叱雷父披天門謁天宇太一之居兮金碧堂洞鬱密兮不見陽蕊珠履地雲屏匝廊色郯郯其揚彩爛煜煜以成章旖旎旌節襂襹羽裳蒼龍吹箎丹鳳為舞洞轇轕乎東廂此其大較也若乃㣥仙之所盤薄珠庭之所雘濩曼以玉堂映以朱閣靈怪潛祕光華相錯陰陽不能授其寒暑造化不能生其美惡及乎上真降命赤書爰作速陽侯而波靜走姮娥而月落值江妃之倩練驚海童之閃爍其翺翔曠遠者嬉九垓排三山紫烟生白雲閒偃蹇夭矯翩帛丿糸縹緲可見而不可攀至夫靈草自然珍木不死餐霞嚥液乘鴻躡鯉或隱山林或游城市斯實元都之能事羌難測其云已洪崖先生方睟其容頷其頤曰中州之士也爾來何遲出祕訣約真期挹華池之水唱天關之詞既乃避席屏氣拜命之辱精皦皛兮從空浮長覺悟兮還舊邱惟見塵書滿屋皓月生樓涉花窮極無迹難求豈莊周夢為蝴蝶蝴蝶夢為莊周歟意者天聰明神正直親其貞亮之概照以元魁之極雙童兮何日再逢上清兮何時再陟掩空館而愁臥撫長懷而歎息夫何言吉夢兮杳杳冥冥若有一人兮遺我鴻筆居然五色兮其狀炳靈煥錯彩於無像紛斑斕而有形匪沈淪於畫墨那渾濁於殺青獲乎希微來何處所彩非染而自備管在搦而神與意藻思之相授期文章而見許信魂夢之有乎曾目成而不阻神之正直福非回邪何代無才曷江淹之允屬則吾豈敢疇郭璞之孔嘉繄有靈兮未悟儻如夢兮增華始其良夜幽閒齋心朗暢寢彌安於自得思不適於無妄故降彩筆冥徵元貺與蠅集而殊端方兔毫而詭狀丹青式序元黃可分參乎素色爛以成文若以我修辭五彩必能吐鳳若以我揮翰一飛何謝慶雲是知物有幽通神為真宰夢以掌握驚茲夕以靈奇瞻彼筆端勝常時之光彩誠有志而必達宜飭躬而不殆展轉虛室曈曨曉日目眩昧於花容想綢繆於錦質或乍進而乍退類若虛而若實既而駭人恍然觀身雖放言之在我豈假手而非神則知五色之靈筆善誘斯文之日新待徵開元時人遺之後有火過於西鄰鄰告云妖有司科之使司奏請旌異至誠感神天道應善雖欲蔽德其如予何王祖母病既日臻甘脆蓋闕劉公孫孝惟天性墾鑿多勤坐北堂而搖魂仰南陔而結思是賴天靈其鑒地輸其珍綠堇欺霜而沓榮紅粟無稼而呈粒此一奇也又何如焉况丹燄飛空以災糜竺之室元應必感不昧劉殷之家鄰者奚愚以厚誣而害物有司何酷載重詰而傷仁明哉使乎清識遠矣舉直錯枉揚於王庭蒙雖不才請從斯矣大吉開元朝擢書判拔萃科惇宗將禮以祇祀事命滌宿宮存乎饗獻執觚奉爵理必祖於敬恭藉茅設洗事無忘於豐潔惟壬榮班命數羔鴈同行擇日筮尸將行懿祀充牲視物具祭為先列羞鼎於門祊升俎載於階序巾盥在手餚核旅陳醜平仲豚肩之陋思由也戶堂之禮仲已恪恭所執持畢而來仰觀好雨之星欲理如湯之鼎此乃思無出位舉不失宜贊者有言事同差舛博士科罰理當淺深故椒舉規過須有愧於國僑張湯用法將無慚於虞詡請從寬典無寘急刑助開元朝官江陵少尹易以龍象乾以馬明坤隨事義而取象是故春秋傳辭多因物象而六十四卦三百八十四爻之文觸類而長洎甲子以六十為運而卦則六十四為周六十四而參六十合九百六十年為一元紀助今采於往疏未釋後學滯懵者標出目為周易釋疑屬象比事約辭伸理云爾靜開元時官慶州刺史聞夫慧門廣闢理絕色相之端覺路遙登跡晦名言之表悲夫能仁示現應化無方開妙典於三乘暢真詮於八部所以發揮至賾懸梵景於昏衢光闡大猷泛禪波於欲浪是以金棺掩耀玉毫收彩孤標靈鷲之英獨負成麟之業者其惟大師歟大師俗姓戴氏永嘉人也少挺生知學不加思幼則遊心三藏長則通志大乘三業精勤偏宏禪觀境智俱寂定慧雙融遂使塵靜昏衢波澄元海心珠道種瑩七淨以交輝戒月悲花耿三空而列耀加復霜松潔操水月虛襟布衣蔬食忘身為法愍傷含識物物斯安觀念相續心心靡間始終抗節金石方堅淺深心要貫華慚潔神徹言表理契寰中曲已推人順凡同聖則不起滅定而秉護四儀名重當時道扇方外三吳碩學輻輳禪階八表高人風趨理窟靜往因薄宦親承接足恨未盡於方寸俄赴京畿自爾以來幽冥遞隔永慨元眸積翳忽喪金鎞欲海洪濤遄沈智檝遺文尚在龕室寂寥嗚呼哀哉痛厂田坴心腑所嗟一方眼滅七衆何依音德無聞遠增悽感大師在生凡所宣紀總有十篇集為一卷庶同歸郢悟者得意忘言耳今畧紀斯文多有謬誤用俟明哲非者正之敬徵開元時人無射良秋重陽佳節登高有興坐追桓景下堂傷足多侔子春雖異全歸何妨憂色寧損為孝之道而斷不應之條告之者未達其幽趣科之者固知其失道棄而不問幸無濫焉伯瑜開元時人學者以詩大小序皆子夏所作未能無惑如關雎之序首尾相結冠束二南故昭明太子亦云大序是子夏全制編入文什其餘衆篇之小序子夏惟裁初句耳至也字而止葛覃后妃之本也鴻雁美宣王也如此之類是也其下皆是大毛公自以詩中之意而繫其辭也後人見序下有注又曰東海衞宏所作事雖兩存未為允當是鄭元於毛公傳下即得稱箋於毛公序末畧而為注耳毛公作傳之時漢興已亡其六篇但據亡篇之小序惟有一句毛既不見詩體無由得措其辭也又高子是戰國時人在子夏之後當子夏之世祭皆有尸靈星之尸子夏無為取引一句之下多是毛公非子夏明矣昇朝元宗時官亳州刺史國家頓網鵷鴻廣羅舟檝人降三傑俾機務允釐天飛五老而元氣清晏猶且弓招歲下徵拜日聞無是子毓德郊扉澄神虛白效宣尼之竊比無踰老彭徵武侯之故事終期管晏雖復跡符媒衒終是志越儕流或未可量有足嘉尚昔月中見字尚表英童今夢裏乘舟故符王佐但聖朝以邱園佇秀物色求人乘箕降昴之賓金礪玉璜之相必循名實方漸台階今者邑子薄言告以虛誕且鄉人所惡未可即依翁歸自陳亦難憑據言之無罪告上何傷國輔青州人應縣令舉授抒昌令集賢直學士禮部員外郎天寶中坐王鉷近親貶竟陵司馬崔國輔謹上書於都督何公節下昨有自府廷而退者云君公垂責以為怠於奉上之禮死罪死罪竊聞禮不妄說人為近佞媚也不好狎自全仁義也故教訓正俗非禮不備君臣上下非禮勿定宦學事師非禮勿親所以君子恭敬撙節退讓以明禮修身踐言合道以成禮今人無禮多涉於佞媚不全於仁義故以難進而易退孜孜善行者為失禮悲夫古之有禮者則貴今之有禮者則賤雖然君子修身終不棄禮為茍容詩云風雨如晦雞鳴不已言善人不拘俗也國輔常見君公有謀贊之能明恤之量敢以大雅之道而事君公殊不知君公以凡徒見待君公聞叔向乎聞張良乎夫叔向者不能言退然不勝衣為晉國之望張良婦人也而懦夫下輩宜君公不禮蕭曹為刀筆吏碌碌無奇節百里奚在虞而虞亡在秦而秦霸屈原之忠貞逐於楚張儀之利口鞭於梁皆士之屯蒙莫能自異僕今日復何言哉
