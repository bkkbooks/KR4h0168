front:
  text: 全唐文欽定全唐文卷三百十八李華五
  hash: sha256:0bb91bd23a7648fe1a449a050dfec0b2e2dd675e847f23c7c684d1010cc9ab5d
body:
  text: 晉侯方圖秦既而有疾秦伯使醫和視之將行戒之曰鄰國相病大夫何以為行對曰臣不發藥石請以詞痊晉侯而國無害秦伯悅以卿禮遣之和至於晉晉君幄銅鞮之宮憑豐肥倚柔容更衣被珠玉者百許人膳夫列鼎於庭而後延客客辭曰始受命於寡君以除君疾為役今大國反以色與食病臣非臣所及也中軍師對曰此寡君待先生之禮也不意為過敬惟所擇客曰臣轡而馳千里形甚勞而氣不足所欲者酒一盛果一器腒鱐佐飯而已其餘不敢煩大國再拜受賜而診之曰君聲流而陽氣濁而浮色寒而容壯與楚王相若亦可為也亦不可為也晉侯曰楚子何如而方寡人客曰臣嘗聘楚楚境大而富山川林藪之盛踰淮而竟南海晉與齊秦不敵也晉侯曰寡人未嘗涉楚且置楚王願聞其國之説客曰君不念臣亦未究楚封疆之事直以所見言之楚也近郊去郢尚三百里引車登岡平視諸宮丹素燭天仰不見空如水漂浮半在其中滄波動搖低昂隨風藹藹南極山松不盡乍伏乍起參差高卑流雲重輕或滅或明道路帛丿糸帛丿糸縈山繞川車蓋如軒稍覺登原赤霄冒頂舉手摩天向之高者乃在車下陰溪冥冥投石無聲狀其乳苑之內則連山黯以當戶容杳杳而嶪嶪若堅刃與幔塗呀將拆而復合露封隙之嵌空聲小往而大答聳崖峴以日爌穿偃仆而雲音濱江皋衍百里芳草往往白沙日炙皛溔緑野芊帛丿糸走舉蒼連箘簵楩梓橘柚之林密孕元氣寒暑若一翳不流風幽不漏日猿狙飛走經息百態啾啾互號終昕竟晦墜英紛目如雪蔽路四望無人移足沒屨黃鳥時鳴白鷴飛度臨險瞰江江隗為潭庱庱不動常有神怪龜魚涵泳露鱗出介纖草以風颭波起崩濤迸沫勢不得止精怖魂怕毛骨洗然攀木瞑眸猶懼踣泉頽麓疏冗繁源鼻噴支流瀯瀯合注湯湯晝夜有聲當暑清涼透崖撲湍躍而後逝初疑可及忽似無際旋昡回榾淜泊兌宕輥石敵磨火發川上才夷又亞傾沙委浪白煙微蒼通波滿望淡淡灔灔久而生垠淅淅飛雨冥冥起雲沅湘春生蒼梧日晚聲與聽盡色隨望遠蘋荇荷華組繡一川吅丂一羽族之多名紛合散於水間泛隨流而將下時逆浪而復還喧呼雷駭沈起雲翻兩不相傷貌豫體間緣涯疊觀照江成霞碧水漣漪深淺見沙旁經闈闥溢浸欄檻上有嬪嬙帛丿糸音入雲侵杳而將絶隨隤風而復聞齊宋鄭衛之樂張於宮中撞金擊石草木競發堅城雉圻崇山峯墜鳥獸狂悸淮湖皆沸首飾戴千金一膳傾千家恥不相及者以粒計倉祿之衆半於平人秣馬之費倍於租入其餘奇麗之富奉養之侈率與是侔楚王甚泰而楚人甚病申叔請老而不與政言未畢晉侯舒氣而伸幹曰向先生言亦可為也何哉客曰此未足纍楚故曰可為也若張而無厭則不可為也晉侯色生力起斥御者撤膳羞而請曰先生終説寡人病幸間矣客乘時而動之曰楚使令尹司馬理兵於北疆以臨斃邑斃邑大夫少者則請開關以戰老者則曰君務息人楚恃其富強因侈生欲未足畏也寡君乃發府將賙而四境寡小或以四時之用為請寡君曰是出於人而歸於人無人則無是夫何愛焉申命上大夫布幣於人而謝之曰孤不德使爾父兄子弟不自保於楚師故罄以相勞秦人感君皆泣婦人處子亦請執兵報楚楚朝聞而夕卷師君臣震伏而受職於秦此先王不戰之術也晉侯洸然以楚事而照於晉遂輟謀秦由是大國修好小國來朝戎狄皆附客果以詞痊晉故曰言醫上之於賢也患不能好之好之也患不能求之求之也患不能知之知之也患不能任之任之也患不能終之終之也患不能同其心而化於道是故士貴夫遇懼夫遇而不盡也古之帝者非不欲厚其養泰其身固揣於變化之原而要之以極亦至矣蓋以為上逸則下困困百衆而逸一人非天意也極非天意亦不忍為也故下逸而上困帝者甘心焉況百姓逸君孰與困書曰元后作民父母父母勞於養子則襁褓之疾弭闕則父母之心泰推是而求之聖人志於儉薄不得不爾也為國者同於理身身或不和則藥室之針炙之若夫扶病而不攻疾病則斃扶之者尸也齊隨之亡也以貞於終始為惑苟而無恥為明慢於事職為高賢見義不為為長者繩違用法則附強而潰弱也議於得失則異寡而同衆也尚學希古謂之誕趣便中時謂之工觀其燥濕而輕重之侯其成敗而裦貶之肉食之尊以滋味糊其口忍危亡而僥祿利自是而下則曰上司猶如之我於國何有設能憤發則逆為備豫動閡關束氣沮志衰亦從以化幸於生者炎炎而四合死於正者求援而無繼麒麟悲鳴鳳鳥垂翅鴟鼓害翼犬呀毒喙則蛇鴆虎狼之熾其可向耶嗟乎心腹支體一也為病者萬焉雖有岐緩而不請岐緩視之而不救噫齊隋不亡得哉返是而理則王道易易也攀巢之雛羽翼將成習飛而從其母不幸為烏鳶所震墮於塵轍閥閲之家有侈女焉雕車繡茵過於中陌遇而憐之藏以玉笥粒以紅稻胡然而然材小為貴養而玩之易為力也充軛之牛望若山行其生也任重致遠以利天下其死也筋角皮骨皆為器用水旱寒暑之不時艱難驅乏登降重岡踣起塗潦蹄離節坼力氣皆頓病矣目猶睨人盜鳥爪其背嘴其肉猶恨喙噉之未逞鴉鴉而相呼㣥犬引其腹胃狺狺而爭之車馬往復於傍以千萬計不顧也胡然而然材大為纍扶而救之難為功也向若不殫斯須之勞而存之其利固厚矣悲夫材之大也為纍材之小也為貴戾於理悖於道莫甚焉君天下者辨而返之則不世而仁矣或有人示以文卷者中有小學説一篇其略曰鴻文先生坐於堂上手執經一卷弟子以次立先生講既已而為文焉示於衆子則不善書也小學家流曰先生通儒也而弗能字學何哉鴻文先生方隱几聞是言也笑而召之責曰夫儒之立身以學乎以書乎苟其書則孔子無以加也且止云典籍至是則無聞也爾徒學書記姓名而已已乎已乎華既覽之心目賁目賁然思有以喻故作論云夫六藝中此為難事人罕曉其奧子非能也亦嘗聞其旨蓋用筆在乎虛掌而實指緩衄而急送意在筆前字居筆後其勢如舞鳳翔鸞則其妙也大抵字不可拙不可巧不可今不可古華質相半可也鍾王之法悉而備矣近世虞世南深得其體別有婉媚之態凡云八法學者悉善豫有二字之訣至神之方所謂截拽也苟善斯字逸少伯英彼何人哉噫諒哉書功之深人之難能知也是歟曷可已乎天靜地一默成四時人妙其用三靈推移遁蛻秦禍出扶漢危道不可屈南山採芝抱和全默皆享期頤山下水濱四墳纍纍悚慕元風徘徊古祠元宗季年逆將持兵天錫房公言正其傾㣥凶害直事乃不行虜起幽陵連覆二京帝慈蒸人避狄西蜀爰命撫國理兵北朔登賢為輔讓子以續公賫册書亦捧瑞玉聖人神聖天地咸若子孝臣忠元元踴躍命帥中軍謀殲羿浞人或有言志屈道行公曰不可屈則佞生柄不在公衆昏曀明退師儲宮出守函谷入為尚書正色諤諤又刺汾澮遽臨彭濮何負而東何負而西公受挫抑邦人悽悽帝懷明德俾我不迷徵拜秋官僉曰休哉薨殂閬中國瘁人哀喬嶽隕躓輔星昏霾天子洟涕追崇上台巖巖岱宗瞻其峻極赫赫房公尊其盛德昔撫宜春列邦是式建銘江濱以慰南國天寶十五載逆將犯闕虜塵翳郊廟上皇哀蒼生避狄幸蜀皇帝誓復君父之恥理兵於朔方避狄仁之盛也復恥孝之大也惟仁盛孝大故不逾年而收京師奉陵寢凶孽走而天降之戮化氣和而人至於道巍巍乎堯舜之烈不足比崇天子齊心元默運行慈煦為元吉卿士妙講化之宗以為五帝三王之道皆如來六度之餘也厥初生人降及中古君臣父子日用而不知故元聖師竺乾而升有古先師宣尼有言三皇五帝皆非聖者而西方有聖人其為大千之尊乳育㣥聖明矣夫玉帛非為禮之本捨玉帛則無以為禮象飾豈施教之源捨象飾則無以為教建塔廟為禮容履霜堅冰物有其漸於是卿士從兆人從九圍之中列剎相望矣盈川非古邑也襟東江西山因而城之寺在遠郊信者勞止自官吏耆耋至於商旅咸以津梁未建為愧為羞邑城之西有淨名廢寺背連山而面通川杉栝晝暝緇褐經行寒潭夕清車馬無聲境勝心間十金果成耆壽徐君贊録事徐知古等請於縣令隴西李公平平請於前刺史趙郡李公丹丹請於河南等五道度支使御史中丞京兆第五公琦琦聞於天子墨制曰可僧義璿等伏以乾元之初元惡掃除國步既清廟易名榜因改曰乾元國清寺昭睿功也自所志洎於州縣之長僚吏以降多捨清白之俸徵梓人求繪工為民儲福為佛成宮高殿倚雲長廊生風蓮花出界開在空中自江南無有是剎上座某等至某都維那某奉前佛之心印得輪王之髻珠第五公以上智利國人登宰輔李使君以全德公才持憲為郡今刺史陳郡殷公日用忠武傑出長城江海專知官司馬隴西李公乾嘉峻能操綱清可激俗縣令李令宗室大儒政之善者皆易簡詣於真境清淨符於度門醍醐勝味甘露妙源正性無説宏之在言其詞曰東裔名剎西方樂土吳山倚垣越水當戶柳松黝藹下有象潭龍在泉中水容耽耽景象光徹江湖氣含天清寶界地湧靈龕大聖蒸蒸動乎天地百神奔走戎服既備命將誓師殄殲逆類奉迎太上開闢正位神人釋憤品物咸遂鼓舞賡歌上通元氣無思不洎雜沓禎瑞輪帝御宇像法昭融須彌四洲建大蓮宮倬彼盈川秀冠越中縣有德政州有名公奉宣睿謀爰度崇工梵侶開士慈雲惠風願言上報聖壽無窮建表勒銘堂堂乎鍾君諱堅字倫名與宗人同故以字稱東海郯人也象德所自如山積高佐人施澤如水鍾下三代以降仁賢不絶至宋齊間位望益尊三公令僕常伯卿將追贈衮司降嬪帝女南朝衣冠宗之國子博士東莞男諱文遠有盛名於國朝東管生王屋令士安析城以東人受其賜王屋生大理卿贈越州都督諱有功社稷之衛也高宗棄萬國太后臨朝宗室元臣以猜受釁頑虐阿指扇成大獄海內懍懍不保其生凶殘朋黨嚼牙頓翼起於上國延及諸夏不止於此將圖我國家三分蒸人其一為血宗社垂靈而生大理俾幹刑典扞蔽本朝元惡憚其義烈人鬼衛其愷悌惟身與族隨正而行爭性命於豺狼之口解威怒於雷霆之下大者完州郡小者活門閭纍為㣥凶所排阽於破滅神佐貞獨終以真合昔咎繇事唐虞釋之定國當盛漢赫赫大理而丁此時功倍古人聲動百代是之謂也君即大理之元子直溫秉廉深於德行祖考之訓叢乎厥躬以蔭宿衛調臨卭主簿親纍故也歷懷州參軍邵王府戶曹陝州司法清方知名朝廷以先父之勞超拜大理司直聞者皆垂涕而喜平端讞議果振家風皇舅大尉希瑊以先大理嘗拔家冤表讓官於君以申蓼莪罔極之感拜恭陵令除陳州別駕改陝州入為岐王府司馬轉慶王府階朝議大夫襲封東莞侯開元十六年四月二十九日終於洛陽南郊居春秋六十八不登期頤不至大官嗚呼惜哉天地之於物順也君子如之窮達之於人命也君子安之惟君德性與是相準執親之喪哀毀逾禮逮啓手足不貽憂於墳墓孝也守官廉平未嘗違道干譽奉長臨下小大悉心一夫得罪則為之損容色有可緩者欣欣然出之仁也惠文太子之在岐邸膚敏好學上最器念四時鍾渥澤賓客多詞人君每引道書滿盈之誡以扶俊德忠也仁孝與忠雖無位為貴禮所謂以道得人而已況承前人之烈光被聖代之冕服乎夫人贊皇縣君趙郡李氏北州望族左司郎中公淹之孫杭州刺史自抱之女左司博古杭州知人訓成懿淑光配有德後君六歲而終合祔於濟源之燕川南原龜從筮從兆因德叶嗣子光祿少卿瑴前蜀郡兵曹參軍殷句容尉毅出言舉足不墜孝慈瑴行備忠厚辭無枝葉朗而不華直而容衆有古人之情君子之度為大理正負荷前猷歷宰三縣牧守一郡人感懷之刊石繼起再蒞京邑不求名聲推心而理盛德有後曷其崇高神道聰明豈曠人欲君從父弟惲御史中丞陳留太守河南採訪清廉有威所向霽肅大理歿而有中丞中丞歿而有光祿徐氏之興將在裔乎爰族幽兆與天地極是文也華無愧詞銘曰三命益恭慶祚猶鍾矧我大理全人門宗扞蔽皇家枝梧㣥凶百族感慕大哉勳庸克生茂德山鎮泉塞卷以道風舒為士則如何哲人終始藩國在昔偃王仁義道興沿源而下勳德相承或西討濟河或北義延陵又有達者魯連服膺綿綿世祀奕奕髦士晉宋齊梁名臣繼起薦躡公府連嬪帝子東莞以降羽儀清朝美矣哉如金如玉如翰如翹君子踐修德音孔昭抑抑仁人宜於進退合符黃老不皎不昧推心無方我德用大建世何居松門已藹永言孝思光祿有之式播芳烈為將來師唐之元老有大庇於生人曰韓公張仁願盡力天朝位尊將相三城立廟軍帥乞靈則祠之天寶季歲華奉使朔方展敬祠下式瞻風采像與神合沈沈如生嗚呼生以功為臣歿以靈為神神乎宜奉公總戎疆外懸衡審政拒隴循河帛丿糸亘萬里堅城雄防扞蔽三輔介胄之士垂十萬人瞻我麾節以為進退先是突厥犯塞乘勝入朔方遊騎至安定守軍不到經略失守虜乃驅監牧之騋牝退存廬帳進圍聚邑鳴弓躍馬規復漠南邊人搖心元聖軫念節將更至咸以為請縉紳獻議則以和親為便中宗未之許也初以公耋老且重煩之及卜師於太宮之庭惟公之吉至尊親臨前殿授以兵符公承命徂征北蕃逆駭記所謂君子有其時有其命公得其二而伸其一者也公忠貫神明慮幾造化鎮以長策潰其姦謀一麾偏師屠名王復喪馬奪塹拂雲堆而城之並河之阿列築三鎮將精士鋭談笑就役胸奴莫敢南視雷哭而遁老幼望公以相震怖不然則乘冰轉鬬無日無之既而據河山玩其動靜納行旅歸之衽席憑墉而望匹馬單兵不匿形影虜由是械手足而刳腹心朝廷無草竊之虞天下減征役之半矣詩云文武吉甫萬邦為憲又曰方叔元老克壯其猷公之謂也帳下之厮尚有存者曰公號令素嚴人無違禁自將吏騎卒咸有旗表節不常出出則賞罰隨之賞無非功罰無非罪上流而下競心行而事從謀全功成由此術也三城既就刊木標櫓記之種落刻其降年後皆如之豈挺生上將之龜策也奇鑒先物之然也夫鳥獸草木出其倫輩猶或利害憑焉況殊績功勳始終天地翼輔先聖寵綏元元有茅社之尊符節之重後奉者果一勝遂一謀庸非明神幽贊之效雅有吉甫薄伐至於太原王命南仲城彼朔方傳稱齊桓伐戎攘狄以其病燕滅衛魏絳和戎狄合諸侯從古及今以為大功其餘秦恬漢青之倫才邱垤耳尚或詩頌揚之簡策貴之況忠武卓異屨履今昔而詠歌無之非古也竊感趙孟懷隨武之德寤寐永嘆奉銘神宮其文曰赫爾韓公司武有經受命北伐渠魁就刑敢或不順鼓行風霆崇岱壓卵滄波灌螢沈泉雷動機發冥冥功奮三城人謠億齡謀出先後構危於寧張天之威恢廟之靈北狄頓顙山戎來庭萬里寢析緣河罷扃趨拜故祠德謝惟馨翔野何有㣥山青青感激遺風徘徊涕零吾誰與歸式薦斯銘昔在召公相武王除害去虐敷命帝庭周公佐成王卜洛定宅登頌清廟奉康王會朝豐宮克致太平惟崔公相元宗保寧聖德鎮安天下輔肅宗掃除凶穢紹享太平一作天命事今上振宣明威撫綏淮海惟申伯翊宣王登南邦興周室小白率諸侯征楚翼奉王室與崔公叶德同勳皆薑姓也夫議盛德諭大功贊大賢舉其殊倫卓然昭明不書其細申大體也故詩陳方叔之烈曰方叔元老克壯其猷又美韓侯之封曰有倬其道韓侯受命今述崔公亦不名不備官古之制也後魏尚書亮八代至公海內首族人倫德範公少負文學重名具兼宏略揚於王庭甲科入仕歷京兆倉曹參軍再遷司勳員外郎丁太夫人憂以毀聞終喪拜刑部員外郎兼侍御史知劒南節度留後事逆臣起幽陵陷潼關至尊哀兆人思古公避狄之義於是帝車西南依我心膂拜中書侍郎平章事劒南節度採訪使元宗克讓聖子家為唐虞公出納王命至於朔方弻諧二聖孝慈光明自西自東殄殲元惡天討之師岌如山行寇若霜藳鼓燎無餘帝曰爾圓實叶朕志官中書令拜趙國公公拜稽首臣敢上冒以負天明命帝遂其高俾作少師師訓東宮兼長邦憲居守洛京乃傅濟王又典汾州王德日宣汾州阜安乃統江淮主三軍督萬人加工部尚書時征鎮之司恃勳姦令公獨露奏慝用輟興轉吏部淮南既清軍有餘逸夷難江南萬里康哉六歲在鎮心馳王幄戀慕之極至於涕洟獻章請朝帝恩降允公不俟駕建斾將馳耆耋泣訴吏人遮道指日詣闕乞留者三百餘人公申諭而行至於京師天子大悅曰趙國公先帝元臣常為朕師自我不見於今六年有司如朕意待之加尚書左僕射遂淮南之請所部八州人舞手蹈足祕書省少監兼廬州刺史長樂賈深有文有武忠於王室推心馭下嘉績升聞戴公仁明思揚盛德合肥令彭城劉商先后之族臨人惠和一州之老幼咸曰我州我邑敷王德澤崔公封內我是以安其仁不銘其德不可謂賢華嘗忝公遊咨以為頌夫五嶽視三公四瀆視諸侯公入掌三公之政出踐諸侯之長昔鄭武公為卿士詩人賦緇衣魯僖公為周賢侯史克頌坰野敢附前烈以書公不朽故裦大臣則王室尊崇美政則王命行不唯頌公尊天王也今載公朝覲之禮以宏大之其文曰思崔公出鎮之崇克孝克忠宣帝之武恢帝之功自蜀自朔至於秦宮出納大命決事於中思崔公烈烈郁郁以雍以肅乃統淮服洎江之隩闐闐長轂霞斾霜鏃蠢爾凶毒罔不顛覆思崔公三世元臣德綏生人乃朝於王王顧殊倫且曰東南飲化如春為朕腹心寧其咏吟思崔公入覲於王鑾聲央央佩玉以鏘秉圭奉璋公復於揚四牡其驤公慕彤庭涕濡於裳思崔公廬江州邑孰不垂泣我公之還陽和起蟄乃求樂石樂石爰立刊之頌之介福攸集州人斯及禮之中庸曰父為士子為大夫葬以士祭以大夫是禮也於國為恩於人為孝朝廷贈趙公之先人故晉州司法參軍贈清和太守三至太子少師裦少師之德揚趙公之孝國之恩也書之洪範曰是訓是行以近天子之光趙公奉若少師之訓為國股肱翊大君之明可謂忠矣傳曰有明德者必昌於後世後必有達人故叔梁紇有子曰文宣王陳仲弓有孫曰司空㣥積德於身以垂厥後猶洪河廣大於涓流太山峻極於邱陵蘊百行惟少師宣六德惟趙公父慈子孝移孝於忠盛矣哉維烈山氏以稼穡代畋漁伯夷以秩禮諧神人太公以大勳平禍亂季子以讓德辭社稷崔氏其後也有魏名臣炎降至宋度支郎中贈冀州刺史元孫隕身成名興起百代生魏吏部尚書左僕射貞烈公亮六為吏部郎三為吏部尚書再為大中正連部二千石一為大將軍歷侍中太常光祿大夫男為部官女為九嬪與伯父之子僕射休首出㣥姓為海內甲門孫曰肇師以令望為中書侍郎以才辨為聘梁使中書孫諱道淹北齊安州總管掾生少師之祖諱方騫皇朝萬年主簿臨洺子臨洺子生少師烈考諱貞固皇朝武功主簿贈吏部尚書娶趙郡李氏新定之子高都之姪中外之甲光標士林少師諱景晊清河東武城人也三歲丁太夫人憂十二居武功艱號哭無時鄰里輟相終制讀書歲不踐閾一覽數紙終身不忘年十七與親兄晙一舉明經同年擢第二十三調補梁州南鄭縣尉以能政聞轉蜀州晉原縣尉以清白器幹為按察使倪若水表薦大理評事以親纍貶利州葭萌丞歷梓州鹽亭丞晉州司法參軍公風度詳雅器宇方深有道者悅之而不厭不仁者憚之而遷善蘧瑗在衛衛多君子子賤居魯魯有賢人若至聽詞必察臨事能斷吏不忍欺人不敢犯刺史齊景胄洎州長舉公清明中正差充支使畢構代齊假為判官開元三年終於官舍春秋四十權厝於邙山元元廟西北原公之逝也宗族嘆曰孝可以動神祇而不壽僚友嘆曰仁可以師天下而不貴聞者嘆曰清可以激貪俗而不昌命矣天乎盛德不興宜其後也夫人滎陽鄭氏皇朝兵部郎中衛州刺史元升之子吏部侍郎平章事愔之女弟以德範儀少師以才明訓趙公天寶十二年享齡六十九終於京兆崇賢里殯於長安南杜陵原有一子二女神龍中申明舊詔著之甲令以五姓婚媾冠冕天下物惡大盛禁相為姻隴西李寶之六子太原王瓊之四子滎陽鄭溫之三子范陽盧子遷之四子盧輔之六子公之八代祖元孫之二子博陵崔懿之八子趙郡李楷之四子士望四十四人之後同降明詔斯可謂美宗族人物而表冠冕矣在周則邵單為公族媯嬴為上國西京竇傅之貴東漢袁楊之盛魏以荀陳為德門南朝以王謝為高望方之於公川谷江海也嗣子圓以文學早知名射策上第官歷臺省尋拜蜀郡長史兼御史中丞加節度使時安祿山起幽朔連陷潼關賫表腰金懇迎元宗省表垂泣召宰相謂曰世亂識忠良今見之矣除中書侍郎益州長史節度等如故及乘輿至蜀朝廷羽儀如京之制終古難之肅宗幸彭原將復天下以劒南無事不假此人詔赴行在咨以締構扈從遷宮日月並照元宗獲申聖慈肅宗獲申聖孝酇侯功大博陸賞尊詔曰一匡天下大庇生人遷特進中書令集賢殿大學士修國史封趙國公昔成王以曲阜命周公王曰叔父親親也以營邱命太公王曰叔舅賢賢也惟肅宗亦以趙國錫崔公今上以少師贈先公三代之極教也後轉太子少師兼御史大夫東京留守尋為工部尚書揚州長史浙江東西三道觀察使吏部尚書知省事餘如故又轉尚書右僕射四年某月日龜筮叶吉奉少師滎陽夫人之喪合祔於東京河南邙山之某原禮也世傳清白子孝臣忠山東士大夫以五姓婚姻為第一朝廷衣冠以尚書端揆為貴仕惟公兼之清河崔氏至趙公三代僕射可謂盡善矣泰山羊世傳清德北海范育兒無常親總此二者為公家法華學放史氏敢播風烈焉昔孔悝銘鼎備舉前代史克頌魯獨美僖公用以誕敷先人昭示後代在禮然也今之作頌書國家之孝理列聖君之得人崔氏之世緒少師之懿範趙公之孝思士風祖德永為不朽崔氏之門為不朽矣若終者華安得不頌之其文曰周之上公讓為大夫秦之司徒家於冀都伯從清河德緒繁多仕至揚州出將封侯惟德惟器魏之中尉降及元魏㣥從並貴才如尚書德如評事古之廷評伏念惟刑我聞德聲繼佐葭萌安道和俗化行三蜀彼汾之曲片言折獄清風人穆升聞輦轂葦轍蒲帷公行不歸哲人其萎後賢用微滎陽夫人柔明佐君嫁有嘉聞首代馨芬高陽才子唐虞多士克先趙公大雅爰起有子如是可謂孝矣崇原既平伊洛攸清永安厥靈萬有斯年子孫以寧
