front:
  text: 全唐文欽定全唐文卷三百八十五獨孤及二
  hash: sha256:ffcdc28240573e0709acf27d9b630956adf09f42261af59d0390cfc20e42146c
body:
  text: 臣沐言頃陷身凶族待罪黃沙戮社釁鼓職臣之分陛下照臣以日月之光察其微懇拔臣於縲絏之下授以專城今日餘生實聖朝所賜寵章榮命豈賤臣之心碎首粉骨未答天造今以某月日到濠州上訖謹當竭力官守正身率下勉勵苦節綏安疲人冀立犬馬之誠或申絲髮之效無任感懼之至謹附表陳謝以聞臣某言得田神功等狀稱官軍以正月二十六日過江大破賊衆擒元惡於祘山之下凶殘撲滅江界無事臣某誠歡誠喜頓首頓首臣聞四時成歲秋為司殺故聖人則之以作五兵蓋姦宄賊寇或乘釁而起則干戈弧矢亦有時而用陛下率遏亂略再造區宇欃槍旬時竹破瓦解蕞爾狂狡敢干天誅作為長蛇薦食江漢乃矯誣我天命攘竊我王師暴殄我城邑俶擾我邊鄙荊吳之人若墜泉谷萬姓業業奔走無所陛下神聰不測睿算無方將欲擒之必固縱之先侈其心而厚其毒然後制勝兩楹之下授略千里之外使神功等一戰而陷陳再戰而逐北三戰而擒渠魁繫頸以索覆巢傾穴刮野掃地如烈風之破駭浪嚴霜之隕落葉浹辰之內平揚州定淮南下朱方收三吳流亡者復故業塗炭者返壽域扇以皇風與之更始遂令東土耆老復見漢官威儀非陛下乃文乃武之鴻烈日用不知之元化孰能陰步馬聖功如此其速臣無任慶忭之至臣某言臣聞當逆賊劉展擁兵過江之日變起倉卒鋒不可當人心動搖物情危駭五道節制望風潰散自淮而南至於海隅遂無敢保一城守一節者惟少府少監李藏用以宗室近屬憂國如家臨危抗憤忠勇奮發收集散卒糾合義師挺身履險出萬死一生之地與賊轉戰堅守蘇州相持經月殺獲過當使凶徒逆黨鋒鋭挫衄自此王師載張賊衆知懼其後以外援不至衆寡懸絶遂移師就險退保杭州當此之時江淮諸軍已散平盧之師未至三分全吳賊有其二藏用且募且戰獨守孤城以忠義感激令驍勇樂用旬月之內致死士三千賊遣偽將張景超孫待封等盡率鋭卒分道來攻藏用與將士等戮力一心義形於色殊死決戰奮不顧身遂能兵鋒所加無不摧陷皆一舉盡敵覆而屠之前後俘斬虜獲至數萬計向使微夫人之力捍此州之境則江界土宇盡為戎疆海隅蒼生非復吾有由是浙江之外南至閩嶺士庶免有波迸道路窮寇不敢唐突藩籬屏息風波晏然百姓樂業父不喪子兄不哭弟藏用之功也今都統使停本職已罷孤軍無主莫知適從將士嗷嗷未有所隸天聽高邈無人為言遂使殊勳見委忠節未録口不言賞賞亦不及伏恐非聖朝旌有德表有功之意今逆寇雖殄人心猶攜山洞海島往往結聚睦州草竊為蠧猶深惟憚藏用之兵是以未敢進逼若此軍一散必㣥盜交侵則臣此州危亡是懼伏望早降恩旨以答其勤錫之勳策委之戎政俾總統所領以鎮遏江表實江東萬姓禺禺之望艱難之際人多二心以宗子維城智勇如此必能使寇賊姦宄不敢窺伺間隙則江淮足以高枕而臥而陛下可無東顧之憂臣辱忝葭莩任居牧守安危之分臣實預焉無任懇款之至臣聞聖人之生不能使大盜不起唐堯之代時則有四凶在列王制所以誅不恪討不庭小者市朝大者原野姦宄草竊何代無之劉展包藏禍心為日固久敢肆姦慝乘間阻兵長驅凶徒掩臣未備以偽言亂衆謂天命在已於是有豕食淮泗鯨吞荊吳之心使黎庶播越人神憤怒臣職司靖難敢不戮力當憑廟略以殄寇仇謹遣副使少府少監攝侍御史李藏用屯兵杭州伺隙進討且分處隘害以遏其唐突賊衆狃於初役師輕而驕不虞吾軍能折其鋭也乃以今月三日使其偽將軍張幹朱法雲等領步卒七千馬軍六百徑入杭州東門焚燒閭閻鼓噪而進藏用引其精鋭設伏於途羸師張之使入死地然後整堂堂之陳以薄其壘使左廂兵馬使潭州長史李澄為左軍左第一將張嵓光先鋒將李強李陵等佐之都押衙高幹為右軍左押衙楊履和都虞候魏守寂佐之左第二將皇甫山棲左三將梁朝康承寂左四將吳季之李楚玉顏光允等督遊軍之騎以彌縫其闕表裏合戰奇正夾攻以將帥之餘勇因黎元之積憤奮皆敢死登必爭先赤羽交而三軍風生金鼓鳴而萬夫氣作自卯至午覆而敗之神扶電掃雷落山破噍類無餘隻車莫返鋒鏑之血朱殷長江甲齊崇山尸作京觀實賴陛下聰明齊聖與日月合照故能慮圖發於樽俎而威靈加於遠方臣等盡敵如拾芥成功如指掌惡氣沴祲掃蕩無餘海隅蒼生比屋何幸臣無任慶快之至臣聞皇天分時秋為司殺王者立極兵為禁暴唐虞有共工三苗之患殷周有鬼方昆夷之戰蓋蠻夷猾夏自古有之自頃胡寇作逆吳越震恐龔厲父子乘間起兵劫明州之人略餘姚之地負阻海口憑陵江干蟻聚偷安蠶食取給屬王師北伐未遑南征逮茲二年侵掠益甚將擬復東甌故地窺南越僭迹邊邑黎庶為之騷然臣方荷推轂之寄懷盡敵之計思所以扶乘天威圖制遠略料其貪而無整勇而無剛烏合獸聚不足當堂堂之陳山潛海匿不足用桓桓之師難以力制易以計滅臣遂遣軍將潘景蘭領輜馱數十輩偽為商旅傍山谷往來以餌之又遣軍將呂道光領拍刀手一百人取其便道為伏以待之遣軍將左璋率弩手一百五十人為左翼軍將余能變率弩手一百五十人為右翼皆三吳良家百越徑卒爭賈餘勇樂於公戰蓬頭突鬢焱駭火烈相為輔車夾敵之路又遣軍將張思覽率拍刀手一百人為中軍操中權之制以節其進退以三月二十九日至青煙洞口果如臣策賊遂出山先者遇伏鼓譟合戰於是奇正畢舉四軍夾攻賊衆奪氣不知所守鳴鞞雷動飛鏑雨集轉戰四十里殺其三百餘人龔厲尚稽天誅且偷晷刻收合餘燼八九十人更登高堽背山借勢張思覽等連弩亂發引軍合圍天聲揚而勇士厲鋭氣作而妖星隕遂斬元凶父子擒其妻孥餘黨僵仆原隰脂膏草莽猶恐蔣潢翳薈尚有伏姦遂攪山搜谷刮野掃地傾其巢窟返斾而旋纍載逋誅一朝撲滅非陛下聖謨神策與天合契制勝兩楹加威四海則安能翦豺狼如拉朽掃欃槍如拾芥使吳越乂安江漢澄廓臣受鉞未幾覩茲成功無任慶快之至謹差攝福州泉山府別將左璋奉捷書以聞并齎逆賊父子頭奉獻伏望懸之藳街以示百姓其餘首級於當州梟示訖所獲賊物各令分賞將士器械官收山海餘妖自取誅滅既非強敵不足敘功謹録奏聞臣某言伏奉某月日敕除臣使持節都督洪州諸軍事洪州刺史充洪撫等七州都防禦觀察等使臣才不如人位忽過量仰戴天造兢然自失臣某誠惶誠恐頓首頓首臣往歲祿山以盜泉飲臣臣受左衽之辱而不能死陛下以鴻私活臣臣荷乾坤之施而不能答徒竊寵祿三典藩郡至於俗阜不擾人或小康此實堯風被物比屋日用敢貪天功以為已力不謂陛下獎勸是務以臣為勤自春徂秋凡三錫命九州之伯臣忝其一况豫章重鎮荊揚奧區五嶺控其南九江在其北連帥所統安危是繫分憂之寄豈臣足當負荷恩輝懼隕越於下今以某月日到所部上訖謹當靖恭守位夙夜在公宣皇猷以導風俗仗天威以訓師旅庶以四境無虞百姓輯睦為報力或不足則繼之以死臣之分也敢有二事臣無任喜懼之至謹奉表陳謝以聞臣某言臣仕於太上聖皇之朝早蒙寵秩位至剖竹任兼干城摩頂至踵皆聖皇所賜陛下又不以臣菲薄加臣憲威殊私降臨榮命重謺臣頃雖罄誠竭節竟未能夷凶靖難思所以仰酬天造緬邈無階以去年五月五日於淮陽鑄上件鏡欲獻之行在為聖皇壽冀申犬馬之意臣子之心屬豺狼方熾道路艱阻懇願空積上達無由今宸極正而乾坤貞觀驚塵收而日月開朗當白露盛序之秋是黃河澄清之日臣幸逢佳節願展微忱謹遣某乙進上件二鏡一獻聖皇一獻陛下輒以愚懇上續聖壽臣伏以聖皇執垂化有如金玉之式陛下時乘馭天騁飛龍於國步臣故以金龍飾鏡以表聖德伏冀纎塵莫翳朗鑒長懸挂仙臺而如日之升含品物而無私不照而臣之肝膽亦庶呈於此輕黷宸扆戰越交深臣無任臣聞任非其賢則負乘之寇至寵過於分則尸素之患生所以建官者必惟賢是擇就列者亦量力而處臣幸以駑蹇遭逢聖明頃當遏亂之日謬以專城見委雖常嘗膽歷年然未有以報國陛下獎臣微效驟加崇班以執憲剖符之職兼推轂授鉞之寄位至十連澤及三族臣豈不知踰涯越分冒寵叨榮顧凶黨尚存王師未戢當聖主宵衣之日非臣子釋負之秋是以勉勵疲朽不敢陳讓然邇來竟未能奮一奇展一策掃蕩寇賊仰酬恩私而事乖誠願又加風疾無功而當厚賞抱病而處大藩尸位曠職臣實增懼今聞大軍長驅已濟河圍鄴妖氛沴氣朝暮廓清聖朝方當櫜弓矢而休牛馬搜俊乂以備鴛鷺豈臣菲薄之質疲苶之身所宜猶握兵要仍居寵秩使上黷朝倫下速官謗以臣固陋猶知其不可況聖心乎伏乞特降睿慈憐臣尫瘵許臣停官養疾以避其賢良則慺慺餘生於茲幸甚臣無任感戴之至臣某言今月十九日越州長史盧漸至伏奉某月日敕書特賜慰勞聖藻御札降臨自天二十三日中使劉光俊至又奉宣口敕賜臣衣一副銀盤碗等各一兼百索一筒紫衣十副分賜用命將士端午續命推心而澤流萬里頒賜而慶及三軍臣等奉戴恩渥隕越是懼臣某誠惶誠恐頓首頓首臣拔自周行見委戎律受金鉞分竹符荷天之寵歲一周矣竟未能虔奉廟略誅鋤殘寇使邊烽尚燃虜馬未却臣之罪也陛下不以臣官非其據任重於力而驟降殊榮纍加厚賜天文下矚而星辰爛宸翰俯臨而煙雲動況盤盂器用章服繒綵賜臣為壽施及行間投醪之恩未足言醉挾纊之德曾何喻暖臣等雖勉勵忠勤誓清塵霧然絲髮之效未展雨露之渥亟加揣分循涯臣懼深矣謹當宣皇恩以勵將帥奉師律以練甲兵必使江漢無虞士卒知訓然後畢力殄寇以答鴻私臣無任臣及言臣伏奉今年五月一日敕授臣使持節濠州諸軍事濠州刺史臣頃待罪禮官備位郎署職曠無補增懼且愧陛下不以臣愚擢居二千石之列今之刺史古之諸侯州人安否係在一吏臣非其才無以稱旨奉詔之日懼有甚焉以閏六月十二日到所部上訖惟當奉宣聖猷竭誠帥下瞻戀天造酬效無階臣無任喜懼之至謹附驛奉表陳謝以聞臣及誠惶誠恐頓首頓首臣及言臣奉七月十八日敕加臣朝散大夫使持節舒州諸軍事舒州刺史充當州團練守捉使兼知淮南岸當界緣江賊盜臣典濠州無政可紀人幸不擾時和所致流者稍復年登之力臣亦何敢貪此以為已能陛下過聽驟降殊私既增之秩又命以服無德受賞愧孰甚焉仰戴皇渥且榮且懼今以九月二十七日到州上訖州經積年寇盜瘡痍之後百姓流窳十不一存臣以奉宣聖慈與之休息勞來鰥寡薄其徭賦是以招攜亡者輯柔存者庶經秋之後賴獲安集非曰能爾冀竭力焉臣無任感戴之至謹奉表陳謝以聞臣及言臣伏奉三月一日敕加臣檢校司封郎中使持節舒州諸軍事兼舒州刺史充當州團練守捉使仍知淮南岸當界緣江賊盜賜紫金魚袋殊榮厚渥驟鍾臣身且喜且驚以愧以懼臣聞堯舜建官三考黜陟漢代二千石以循良稱者於是有璽書勞勉增秩賜金之制臣到官始半載職事未有所補見在戶口才肯地著其中鰥寡疲弱不能自存者十猶六七徵遣征賦未嘗及期此臣政不逮力不任之效獲宥罪戾幸固深矣豈謂皇恩驟降復以古典命臣加位受服寵過臣量伏讀詔旨懼孰大焉此則古荊舒之地詩人懲其剽輕復當賊寇虔劉比屋流亡之後其人心已難安易動况加徭役稅斂日不獲已緩之則驕急之則散輯柔底綏之道尤非愚臣所及伏思夙夜勉勵力安斯人省事以慰其愁示信以杜其爭亦冀俗稍務本人漸足食使貢賦之入歲增月長三歲大比以版圖歸於有司犬馬之心敢有二事臣無任感戴之至臣及言臣伏奉去年十二月二十三日敕授臣使持節常州諸軍事守常州刺史充當州團練守捉使臣伏以江東之州常州為大陛下不以臣不肖拔臣於㣥吏之中以考則年未久以勞則功無可録而除拜之次加於人一等臣及誠惶誠恐頓首頓首臣往歲嘗忝諫官歷博士尚書郎之秩雖備嘗獻納纍黷天聽竟無絲髮裨補明盛及典濠舒二州出入七年又不能副陛下政平訟息與吾共此之歎至如流人自占旱不為災實由陛下當勤恤之初下哀痛之詔寬減租稅入三分之二是以和氣旁感變災為福福流臣州人是以乂臣寧敢貪天之功以為已力今陛下賜臣詔曰斷獄歲減流庸日歸以人俗之豐給當淮湖之災旱陟爾明效宜列中朝臣無其實謬奉殊獎伏覽聖旨惶悚隕越况陛下勵精百揆之始日以堯吁舜咨旁求俊造或經時不除一吏除必以公才為先苟非其人位不虛授搢紳之輩僥幸望絶臣當此時獨荷榮寄人之多幸將自臣始致寇速謗實憂自貽今以三月十七日到州上訖雖欲勉勵疲鈍增修吏職懼力不逮上纍皇明奉詔夕惕且慚且駭無任感戴喜懼之至謹奉表陳謝以聞臣及言臣州內廳東階下二松樹自今年十月十三日夜至今月十八日夜前後二十七度甘露下降樹根枝葉霑灑皆遍潔白凝沍味同飴蜜餘溜滴地委積成泥傾州官吏咸共榮觀臣謹按鶡冠子云聖王之德上及太清下及萬靈則甘露下瑞應圖曰王者德至於天則甘露降松柏陛下實行慈儉懷柔遠近無為之政與太古同風故天地氣和合而呈瑞况休徵感應之始當陛下降生之日皇符昭晰天意炳煥蓋表聖壽寶歷將與天比崇臣為州三年無績可紀疲朽何幸目覩禎祥臣無任喜忭之至謹奉表以聞伏望宣付史館臣某言中使某至宣示赦書大赦天下者臣伏以作解宥過前王之茂典嚴配享神聖朝之縟禮非大孝無以肅祗宗廟非洪勳不得告承天下伏惟皇帝陛下誕敷文德昭烈武功鋪於八埏橫被四海拯兆人之疾苦恢纍聖之洪業伐叛問罪電發王師為人除災為時誅惡陛下恬神凝慮儲道蘊德以義制事以欲從人雷霆之震也心不恕於凶戾元惡之戮也勳不書於簡策淡泊功德陰步馬萬邦大哉聖王之為君也無得而稱矣頃者賊臣伺梟獍之變翠華巡遊四方愁冤百神震駭誅翦大憝清復闕廷事不稽於浹旬慶已延於萬億接踵之禍又起近郊犬羊猖獗相繼夷滅然後舉墜典修禮文鏟革繁苛搜揚嘉遁自上古之所不臣前聖之所未賓梯航而來悗當作悅我聲教掃除氛沴日月載貞大安反側上下交泰而又發德音降明詔歸過罪已降去鴻名含生動植許遂其性草木知感况在人倫今以履端之初先陳盛禮豐潔易簡應時順人展敬於郊壇薦誠於清廟丕昭列聖咸秩神祇抑臣聞之仲尼曰明乎郊社之禮禘嘗之義是陛下德合祖宗道符三五慶於祉福與天無疆鴻私湛恩溥施萬國洗蕩痕垢咸使維新牢獄空虛囚拘蕩滌禎祥鬱於川瀆嘉氣塞於乾坤天下臣妾不勝慶幸臣某言伏奉今月某日制大赦天下恭承恩詔宣布藩隅負瑕纍者咸荷生成被傷痍者如蒙覆育中賀臣聞春以首時蓋本於陽德澤以周物取象於鴻私伏惟皇帝陛下出震繼明體元立極作解施會順時致和問安禮備於三朝班朔恩加於九有猶念刑不可變死不復生泣辜興慈納隍軫慮與民更始其命維新禦魑魅者復還係桎梏者咸宥丹檄疑當作徼無滯黃沙已空疏漢網而遠無不賓祝湯羅而下無犯順雖水旱繫於常數每惻憂勤以征賦本於黎人載加蠲貸應天以實推已以誠疇庸懋能自家刑國或圖舊以延賞或錫類以崇先日月遍燭於幽明雨露不私於中外舊章備舉墜典咸秩崇儒術所以宏教化旌孝義所以厚時風憫耆耋而廩賜有差廢橫斂而凶荒是禦皆歷代哲王之茂典今陛下修而行之洋洋聖謨曠所聞見雖虞帝之孝殷后之仁垂拱而人無間然鞬櫜而兵不復用方於今日未足比崇臣幸屬昌期謬領藩服官惟責實未效涓埃之勞賞及無功亦洽一作沾渙汗之寵拜恩竊忭萬倍恆情臣莊言伏奉今月十九日制書以臣為中大夫持節魏州諸軍事守魏州刺史寵命光臨心靈震奪中謝臣才質汚濫學藝空疏往緣乏人謬參多士膏雨降而鮮鱗躍和風流而短翮飛遂以庸微纍升清貫天臺望重始預郎官帝贊務殷仍霑縣宰翊州司而罕效撫邊鎮而何功睿澤旁滋皇明遠照曲顧先臣之舊不忘支屬之姻遷臣以大樹之榮總臣以儀本之任既而力微招責祿厚延疴深慮即填溝壑不得重趨階陛伏屬天地仁慈聽臣入都醫療承恩之日頓減焦勞在路已來小將瘳健若何以仰祗嘉惠俯策疲駑當河北之奧藩忝山東之厚寄魏郡太守豈岑熙之可攀冀州刺史寧籍章之敢列伏乞回光斂露寢汗停綸矜臣竊位之誠遂臣量能之請庶知人之鑒影響不差循吏之聲期年而至無任忝冒屏營之至謹詣朝堂奉表陳讓以聞其所讓人別狀封進臣某言伏奉今月日制書以臣為使持節潤州諸軍事潤州刺史散官如故前命甫流後恩遄集進退維谷憂喜聚門臣某中謝臣材質孤陋藝能鄙薄徒以頗承舊業遂得歷踐清資國庠司級一作極既非所據六衛陪軒又無足採久欲避賢公府移疾家園不悟沖眷曲臨殊私屬委匏溝東望始拜寵於韓臺竹里南浮遽遷榮於楚澤何以仰承皇寄俯緝氓徭伏乞日月回光雲雨流霈深惟鑒察改任良能則朝有至公臣知免戾無任屏營之至臣某言臣聞審官而用者君上之明也量力而動者人臣之義也然則審官先於責實量力在於知止苟違斯道是必終凶臣以薄劣素空行藝遭逢際會纍忝驅馳自受京尹向逾周月上無報國安民之效下乏推賢審已之能官謗日深內省知愧伏以去年冬末迄於今日竊聽閭閻頗有流散在於京輦亦多攘奪臣兄枉橫為賊所傷哀苦之中忍恥尤甚雖久令分捕而竟未就擒臣之無能於茲可驗偷安重任夫亦胡顏况臣同氣數人相次淪沒閨門之內哭不絶聲應由臣無德而祿召此殃釁興言感慕痛骨摧心又臣老母素多羸瘵近從數載頗益沈綿臣妻先亡無人侍側飲膳衣服臣悉親躬頃任京兆少尹中間又司帑藏雖稱要劇亦有餘間臣每退朝便道暫親方藥自公言歸早見安否老母以數在左右都忘呻吟及臣典領大府事繁務切雞鳴而出暮夜方歸清晝之時莫見親面凡所服餌或非調適心有未快疾亦轉侵在臣焦灼啓處無地專力養則有妨吏職徇公事則闕奉慈顏忠孝兩虧紀綱將廢以天倫哀緒未平之日憂老母方寸已亂之時雖欲自強必不勝任倘漸荒府政小紊朝經他日噬臍固將何及或當重責已負前恩是敢泣血祈天瀝肝請命乞特免臣所職就養私門非惟有光孝理實亦少裨元化龜蛇賤類上報何階烏鳥微情反哺斯足無任懇願迫切之至謹詣右銀臺門奉表陳乞以聞誠惶誠恐頓首頓首臣某言伏奉某月日敕書慰問將士等跪承寵錫仰荷天慈忭躍周章不知所措臣某中謝陛下體仁恤遠崇德念功恩浹勳賢禮優方國臣行能無取志略非長徒以嘗謬台司遂叨藩守誠寬覆餗之罪更切致寇之憂豈謂宸眷不遺天波薦及獎飾加於尸素恩意逮於庸微嶺嶂萬里回日月之私照偏裨一介沐乾坤之厚施緇黃載躍班白相歡騰喜氣於城壘舞祥風於旌斾臣曠官已久無補休明戀闕滋深又移寒燠纍忝逾涯之賜敢安非據之榮邱山至重灰壤寧報無任感恩戀主屏營之至臣某言經略副使太子右諭德傅濤至伏承鑾駕欲有親征恭聞聖旨載惶載懼臣以薄劣謬總元戎受命於朝成師以出雖志期靜難而力未摧凶邦甸多虞有貽聖慮遂使六軍雷動七萃天行臣實無能萬死餘責然臣面辭之日已具奏聞假令寇賊猖獗猶願陛下務於持重內安宗廟外固人心臣之素懷正在於此縱微臣智力淺短終無所成陛下仍須別擇英才授之師律豈有事非至切便欲親戎誠恐上國衣冠自生震恐遠方士庶更有驚疑以臣觀之竊謂非便凶虜傷沮其勢式遏天威赫赫所向皆靡陛下責成之日愚臣死難之秋伏望付臣以專征委臣以集事回鑾上國端拱中朝豈惟微臣受賜抑亦萬方幸甚謹奉表以聞尚書省考功夫存以行觀其志歿以諡表其德則名實不虧善惡知勸謹按故尚書祠部員外郎贈使持節陝州諸軍事陝州刺史裴稹鼎鉉公族圭璋令名孝克負荷忠能匡諫宏圖方壯利涉未息舟壑遽遷音徽已沫命官裦德合荷寵章考行飾終敢徵前典謹上
