front:
  text: 全唐文欽定全唐文卷二百三十張説十
  hash: sha256:c16e0f044994a689fddd27ab3604a566807164da32da8dd277852f89e31843d9
body:
  text: 昔高祖之起唐侯革隋命太宗之威四海正萬邦作藩帝家用建王國二十一族堯之昭也十有一宗文之穆也王諱琮字某文帝之孫紀王之子龍種異品鳳毛秀色仁義天啓德威日就學無不探藝無不究故齊王之允以爵推恩周公之子以才分政總角封義陽郡王弱冠拜歸州刺史又守檀州又撫沂州若敖之舊荊人是懲單于之衝胡馬自遠淮沂其乂邦國不空遭王運中微投於南海書稱大去憫失土之諸侯禮不逃誅義無辜之王子某年月日遘六道酷吏薨於桂林之野春秋五十神龍之初興廢繼絶追贈陳州刺史王生不得志沒受遺榮信乎才之短長不如命之豐約德之輕重不如藝之厚薄有矣季子豫州刺史行休髫齔羈孤託身炎厲藐是餘慶巋然獨存泣血上請迎喪遠裔開元四年二月至桂林王同氣三人往偕遇禍殯殮無主封樹缺如歲月茫茫盡為野草問鄰母而失處訪樵童而莫識議者以為不可復得宜招魂而葬行休拊心蒼昊誓不徒還乃掃亭館設地席潔齋懇惻覬乎幽報遂頻夜髣象曲示其端夢魯王乘舟舟分為兩既而適野見東洲中斷因忽悟焉陰隱微明率此類也又靈堂鎖莖一夕自屈管上有三指凹迹一竒二並其傍鐵生文理布列成卦衆駭其異使善易者張法蓍之曰屈者於文為尸出指者於義為指蹤一竒二並三殯近闊若引渦山揆之可以察先王之心矣考夢協卜定處剋辰以其月二十八日於桂城東洲發見神柩舉體咸備而一節闕焉行休甚痛惋若自毀裂其夜又夢王告在南洛州厥明直舊殯而南十有九步沙洲痕下掘而得之安合如故他日北郭之外併收二叔父焉於是乎驗蓍夢之有徵也孑孑三旐連舳歸飛遙遙百越經途瞻歎零桂人士以為美談夫至孝潛通精魂昭應果虛無之見推步而有必窈冥之體尋求而致雖前志所詳未有幽感反覆若斯之昭晰矣以某年月日陪葬於昭陵柏城妃汝南周氏祔焉禮也妃考曰駙馬都尉梁郡襄公妣曰臨川大長公主宗周元胄大君自出左右圖史循環法度邦有好逑室無偕老以王之故薨於掖宮初永昌之難王下河南獄妃録司農寺惟有崔氏女屝屨布衣往來供饋徒行悴色傷動人倫中外咨嗟目為勤孝王之二子配在雟州及六道使之用刑也長曰行遠以冠就戮次曰行芳以童當捨芳啼號抱行遠乞代兄命既不見聽固求同盡西南傷之稱為死悌君子謂勤孝者仁之厚也死悌者友之難也感神者誠之至也此三者有以見義陽之義方賢妃之內訓繼體之崇德夫如是淳美上歸乎本朝盛烈延耀乎邦族安可闕而不飾碑版無文而已哉銘曰高邱白雲惟堯大理函谷紫氣維周柱史百代福流千齡運起富有海內貴為天子聖帝才子於穆紀王賢王祚允倬哉義陽慎徽九德九德有常允釐三郡三郡以康明夷于飛丹崖之下梁木其壞桂林之野不識阡陌無存松檟於以求之人無知者哀哀孝子眷眷靈夢語妙常閣文微甄仲南洛占從東洲億中舊穸移楄新棺改賵既克返葬亦祔山陵卜云其吉神心允憑人非地是迹謝名稱青青松柏不顯不承維天命帝子萬邦維坤配乾母萬物以親九族后父之屬尊以敘百官開府之班最執謙德而光重地者則祁國公其人也公諱仁皎字鳴鶴太原祁人王子賓天啓靈仙之族司徒衛漢大忠義之門盛德之後仁賢繼出曾祖景孝隋屯田侍郎祖詮歙縣男贈汾州刺史考文洎贈右僕射纘戎前列啓迪後人公之生也膺汾霍之禎體敦龎之度禮樂狃於代襲忠孝萌於自然克寬克恭不激不傲鑒窮未兆而養之以蒙智周無際而處之以默故質勝於文行過於譽其隱德也三年不鳴其會時也一日千里初以翊衛調同州參軍換晉州司兵應將帥舉授甘泉府果毅遷左衛中郎將上升春宮后正妃壺擢將作大匠事時工練八材孔修轉太僕正卿騶訓車攻六飛如舞先天內禪引伸外戚懷柔畏滿厭劇思間公既深辭以職事上亦優之以散秩乃加特進禮異㣥公乃拜開府儀同三司策上柱國封祁國公邑戶三千實賦三百公於是寓情宴喜迹朝行入告嘉猷密而人莫窺也陰薦多士晦而人莫知也不自異於當路每同塵於衆流常語所親曰明明天子擇賢共理瑣瑣姻婭則無膴仕不識不知樂我而巳善矣夫人臣位極遇莫大焉王曰外舅厚莫重焉而能明道若昧進道若退事不事而縣解為不為而理會一以無目牛之全一以無亢龍之悔所謂言合古行中權歟後之人慎終始而保福祿者固將沿通波而蹈高軌也享年六十有九開元七年歲次己未四月己未朔草日戊寅薨於京師皇上悼焉設次大臨輟朝纍日榮之以華衮寵之以飾終追贈太尉益州大都督賜東園祕器含襚贈錫率加常禮乃命尚書彭城侯劉知柔攝大鴻臚俾之監護京兆少尹崔琬介焉申命詹事南安侯龎承宗持節弔祭左庶子白知慎倅焉公卿命士更弔迭唁溢巷填街為之縞素粵以十月初吉葬我昭宣公㣥官執綍祖奠國門如前會夫天作聖合必起大邦故軒妃美於西陵周婦表於東海公藩衍之慶祚允二十或哲或謀或肅或乂永錫之類也如是元女祥發望雲業參練石內被螽斯之德外偃關雎之化門風之至也如彼長子惟力戴君畢心禦侮奉雲雷之會懸日月之功庭訓之致也如此高陽有才子八族我盈其二武王有理臣十人家出其兩稽諸舊史罕或前聞若乃積三盛事而重之以純德篆於金石垂於億萬宜哉其文字光華撰録旨要則皇帝所為也詞臣奉詔作之銘曰於穆祁公誕靈信厚有倬其慶天子外舅高以卑牧盈將沖守忠焉孝乎沒而不朽人之忠孝其德不回天俾純嘏大福時來貴踰九列榮並三台祚之元社帝曰欽哉祁公之德柔嘉維則令儀令色小心翼翼如何昊天喪此邦式休問其永豐石是刻我思肥泉孝心罔極公諱孝斌字順姓陸河南洛陽人也其先帝媯啓姓陳胡立族敬仲之孫有齊國宣王之弟封陸鄉蓋命氏之所由興也秦並諸國陸氏分適燕吳在燕者魏文成帝時東平成王俟生平原王麗重世遊美為國之華公即王七世孫也曾祖彥升北齊以文藝高選任祕書郎以至德表所居號終孝里祖元亮隋鷹揚郎將父淳感盤桓利貞弓招莫進同志誄行諡為惠康孝悌仁義世不殞矣公誕靈沖和稟識高朗而中禮易而達節篤學勵行著實飛聲文史者宗其淵府德行者仰其牆仞舉國子明經選絳州參軍始州司法其在官也示人親其親長其長不苛察而小無廢不皎異而大有成知識日明常憺如也喪親過哀因中風廢臥疾纍年不起楚邸肇封大羅雲逸雖沈疴未彌而僉望允歸授楚王府兵曹參軍實有躬降師賓之禮目擊儀刑之訓府罷換趙州録事參軍以病去職聖歷元年胸奴入趙公危邦不處盡室以行望河南而將濟至黎陽而疾甚年六十有二十月丁未終於姚村之逆旅歸殯於滏陽之郭北先天二年皇帝踐祚以故吏贈齊州司馬惜哉用公之道行公之志上可以序三光下可以平九土存則位不充其德沒則榮不逮其身命矣夫夫人范陽郡太君盧氏故岐山丞元瑾之女恭儉之德備貞信之教興妻道母儀自家刑國享年七十有六開元六年十一月丁未終於洛陽之宣教里八年五月丙子合葬於漳北之神岡禮也初咸亨中王師征遼公參是軍事友人太原王守義遇疫於海東路艱寇阻兵危勢急公獨顛沛致喪歸其井邑其在安州也朝廷以公精達法理乃命覆囚劍南梁岐冤繫動盈千百丹筆所詳十全八九其捨生徇義返已施仁皆此類也禮莫重乎飾終於是見其不朽矣善莫大乎餘慶於是知其有後矣四子伯玉仲容叔獻季良泣血銜恤視天若墜俾豫作頌式昭遺懿銘曰曠哉陸公覩奧臻妙文雅外炳清明內照從政本仁資忠移孝不言而理正身作教才何富之命何負之居喪柴毀遭疾棲遲垂彼雲翼落此盛時沒後榮進終延贈寵德之休明位匪為重嗟嗟千載賢士之隴敘曰八柱承天高明之位定四時成歲亭育之功存畫為九州禹也堯享鴻名播時百穀棄也舜稱至德由此言之知人則哲非賢罔乂致君堯舜何代無人有唐元宰曰梁文貞公者位為帝之四輔才為國之六翮言為代之軌物行為人之師表蓋維嶽降神應時間出者也公諱崇字元之姚姓有虞之後遠自吳興近徙於陜今家洛陽焉烈考長沙文獻公樹勛王室建方與巂府公紈綺而孤克廣前業激昂成學榮問日流武庫則矛戟森然文房則禮樂盡在弱冠補孝敬挽郎又制舉高第歷佐濮鄭並有聲華入為司刑丞天授之際獄吏峻密公持法無頗全活者衆進夏官員外郎郎中侍郎朝廷曰能遂掌軍國遷鳳閣侍郎監修國史兼相王府長史始則天人讓王承置醴之顧終以飛龍利見延參乘之恩自時厥後恆當大任凡三處兵部尚書三入中書令一為禮部尚書左庶子又肅政大夫總靈武軍兵馬又司僕卿知隴右監牧使出典亳宋常越許申徐潞揚同十郡景雲初以藩邸舊僚封梁國公食賦百室公性仁恕行易虛懷泛愛而涇渭不雜真率徑盡而應變無窮常推是心以御於物故所蒞必氓庶風偃驁狠化從言不厲而教成政不威而事理去思覩頌來暮聞歌既登邦政卒乘輯睦及在宗伯神人克諧今之中書是為理本謀事兼於百揆論道總於三台公執國之鈞金玉王度大渾順序休徵來臻懋德格天名遂身遜拜開府儀同三司崇其秩逸其志也初太夫人在堂公授職西掖頗限扃禁求侍晨昏優詔既許尋令還職公固請以泣制曰家有令弟足慰母心國有棟臣安可暫闕其後剖符江表敦諭起復衰麻外墨欒棘內毀變禮中權通識所貴神龍之首預聞興復疇其井賦纍讓而停夫以革故鼎新大來小往得喪而不形於色進退而不失其正者鮮矣君子曰忠不忘親仁也哀不違事義也讓功辭邑禮也濟代全名智也仁以長人義以和下禮以安上智以周身宜其光輔四帝軒冕三紀池臺琴築優遊暮齒傳爵土於祚允保祿位於終始矣享年七十有一開元九年九月寢疾薨於東都之慈惠里皇上悼焉國人慕焉撫牀輟舂曾未云比制贈揚州大都督諡曰文貞禮也十年二月葬於萬安山之南原在疾也王人賜膳御醫視藥於薨也中使弔臨羽儀哀送君臣之義厚莫重焉子子奕思綴遺美以置罔極有詔掌文之官敘事盛德之老銘功將以寵宗臣揚英烈帝乃灑恩仙翰鏤澤豐石民日月臨照於佳城煙雲變態於神道寶其文字別為㣥玉之山禁其樵蘇即表三司之墓銘曰源深自虞派別從吳避地魯陜居家洛都神明遠契嶽瀆冥符翊聖斯偶生賢不孤仁將勇濟孝與忠俱學刃攢植文鋒迅驅才安卑位即騁長途惟實惟有若虛若無再三軍國一二訏謨戎柄尤重王綸最樞兼司任切久政榮殊黼藻彌煥丹青靡渝以寬容物以鑒分區外或形放中恆禮拘針雖誡口諍亦忘軀但覩渾璞誰詳瑾瑜伊皋尺寸管樂錙銖名正身遂言誠願孚方辭漢祿更辱齊租既積而散窮歡盡娛川歸東極日去西晡上惻旒扆傍悲路衢藍田美玉荔浦明珠載廣休慶爰宏典謨豐碑乃立盛業其鋪帝念頻軫仙毫特紆鐫金刻石鳳篆龍圖七曜光動三泉澤濡銓能敘事理鬱詞敷求舊銘實慚殫恧蕪緬思雲霧尚想江湖有道之德其何以踰延陵之墓空此嗚呼存沒終始遐哉邈乎鄭國夫人者宏農楊氏之女也開元神武皇帝惠妃之母曾祖諱諶以禮樂習文為越州司馬祖衍以折衝學武為遊擊將軍父宏以門才入仕為雍縣丞而早卒初則天之代夫人言歸武氏曰恆安郡王生惠妃及家令忠太子僕信開元十年三月終於通化里其四月卜宅於少陵原哀子銜恤號旻仰訴怨報德而未待託思齊於永慕皇帝悒鸞殿之內憂悵鶴池之外慘揚淑聲而金石刻揭高行而天地感國史司文命為鄭志若夫清明下濟嶽瀆上升祥會德門慶育邦媛神授孝理之性天啓聰達之心加以潤澤詩書遊玩圖傳伯宗好直預戒將亡重耳羈遊先稱必霸豈直漢庭章奏假借仲長之才周官禮儀咨稟宣文之學昌言嘉論有如此者螓首蠐領修睂橫波既工嚬笑易為容止肅恭而不局舒和而不倨商周革命遇屯有怡懌之顏桑霍警子在貴無驕矜之色端容一貌有如此者紘綖祭服闕翟朝衣纂組入神翦制驚國雕胡之飯露葵之羹五齊六清三臡七醢咸一見而洞理或不習而知和女工中饋有如此者惠載誕皇子在者四人驪泉多龍丹穴皆鳳克岐克嶷預見元凱之才實覃實訏早聞霄燭之艷亦關陰德之潛襲胎教之密傳乎又名子以義成家以禮忠者以令德為忠信者以不欺為信傳云去食存信信而有徵經云移孝為忠孝則不匱周宗咸覆紀季獨存至德深圖有如此者壁司徒之妻邑其合禮南城侯之婦封其舊功況夫慎徽四德四德咸舉經綸二義二義克從匿武收繼趙之勳産姚承配夏之慶吹凱風於椒掖外王母於梧宮盛德大業窮光極寵啓國西鄭不亦宜乎十數年間二子榮立每至四時令節六參嘉會魚軒照門龜艾交室為壽則珠貝山積侑幣則錦綺霞飛白玉滿堂聚姻親而同有黃金作穴散鄰里而無餘君子欽其市義聖人嘉其寶儉故寢疾則飲食天廚湯藥御府匪日伊夕上宮絡繹於閨庭送終則威儀傾都車騎曀目自宮徂野中使相望於道路哀榮之盛書記罕聞猗歟所謂小君之遺美聖善之高烈者也如使後代考南史議西陵披牘而歎息臨山原而茫昧旌賁之道不其闕而然則外孫之碑武擔之石非明淑之壟其何設焉辭成進御帝稱曰善顧謂尚札我其書之於是灑翰黃縑鏤字青琬雲橫波蹙神變艷爛於山門鶴倚鸞翔生氣宛延於松路禮尊事絶恩榮迹遠斯又元德動天幽誠回日之竒致也誰昔未覩名言莫逮係曰代有母德厥氏楊兮祖考為士父為王兮聖后中葉總萬方兮天命未改復歸唐兮賢淑啓佑繼絶亡兮宗周雖滅神女昌兮建號西鄭榮舊鄉兮魚軒翟茀盛龍光兮二子雙飛華綬章兮出入輪奐庭韡煌兮去此昭昭即茫茫兮何處詔葬少陵阜兮貴妃慈親侯王舅兮寒暑流易山川久兮古墳坡陀老樹朽兮壽宮靈寢百代守兮頌石光華千載後兮臣聞堯有娥英承九族之敦序舜有霄燭動百里之光耀大聖之後天必縱之積善之家神所慶矣豈惟上帝之女雲漢為靈平王之孫肅雍其德連華前志代有其人皇唐鄎國長公主者睿宗之第七女也母曰崔貴妃構纍聖而成門合濟美而為室蘊乾坤之純粹演日月之清明神媛誕靈常言所絶免懷之歲天奪聖善不食三日哀比成人文母流胎教之慈曾子得生知之孝由是宮闈延矚邦國遠聞及乎玉筓耀首油車並在馭錫之美地邑以荊山求之令族嬪於薛氏爾其居玩圖史動修法度服其浣濯恭儉之教興鼓其琴瑟敬讓之風被其行己也安親惠下之謂仁敬宗合好之謂義降貴接卑之謂禮恕情周物之謂智推心而行罔不該備其理家也視膳饔餗之均和主饋醴酏之品齊絲竹七音之徽靡纂組九華之縟麗經目所涉罔不精詣每至三元上賀五日中參進對詳華折旋舒婉故以式瞻貴里儀範通門如千花之泛惠風百卉之涵膏露窈窕之宜克舉繁衍之福大來有男子四女子五瑤碧生階芝蘭滿室者也習禮明詩日漸庭闈之訓銀章艾綬地連恩澤之侯自先朝徹扆之辰迄公主成笄之日外除過制內疚餘哀手寫金字梵經三部躬繡綵線佛像二鋪貝葉真偈現心相於銀鉤蓮花妙容呈意生於玉指孝思惟則道遠乎哉開元繼明推恩由已進封鄎國長公主食邑一千四百戶田賦廣而彌儉禮秩尊而益恭其後君子晨歌夫人晝哭未亡為稱生意盡矣撫視遺孤將守柏舟之誓志祈剃落永從奈苑之遊朝制斷恩改降鄭氏陵谷可移隋和之德不昧寒暑有遷松竹之性如一均養七子庥廕二宗汾陰之室忘亡滎陽之黨相慶既而善福虛應寢疾彌留盡國醫之技遠方畢至供御府之藥中使相望命之必至不可支也堂邑山林忽焉瘁色平陽歌舞適足愁人開元十三年二月庚午薨於河南縣之修業里春秋三十有七震悼紫庭哀傷朱邸傾家若墜舉國同悲有詔光祿卿孟溫禮監護喪葬京兆尹馮延休副焉窀穸之禮一如涼國長公主故事夏四月恩旨陪葬於橋陵不祔不從古之道也皇上念同氣之致美感閲川之永謝恨棣華之半缺悲瑤草之先化乃命國史昭銘懿迹降恩禮於雲露寫哀詞於金石水非湘渚還起帝子之祠山是洛陽即封天妹之冢銘曰帝系白雲仙源紫氣漲家成國承天作貴赫赫聖祖曰文曰武皇皇睿宗一變萬邦挺生淑媛慈和孝恭清目盧如神娥睂無雙邸第立官湯沐建封年及笄總禮施環珮鳴鳳獻祥乘龍擇對帝唐降女天乙歸妹珠玉過庭蘋蘩正內蛟門早闃龍湖忽上無地何載無天何仰金澱書經華絲繡像欲報之德昊天罔極孰是言歸良人永違銀爐煙斷羅幕霜飛懇願毀形託身壞衣不諒人只改嬪他士稟命曰從從人曰順息媯繩楚懷嬴霸晉反經合權與道同韻燠休二室均歡等潤四海謐清九族和平萬物向榮衆雛未成心戀盛明形隨落英祖載鼎城歸窆咸京挽歌揚聲鹵簿凶行哀哀聖情惻惻同生橋山片石千秋令名公諱忠敬字某武威人也軒轅帝孫降居弱水安息王子以國為姓世高之違漢季自河南而適遼東高陽之受魏封由陰山而宅涼土高陽王同生尚書左僕射河澗公原晤真河澗生建節將軍西平公纈從正西平生龍驤將軍黃門侍郎廣宗侯薛晤徵纍葉勳華載於魏史高祖何藏器廣宗之子也周開府儀同三司寧遠將軍肅州刺史張掖郡公曾祖羅方大隋開府儀同三司皇朝贈石州刺史貴鄉公祖興貴右武大將軍涼州刺史徙封榮涼歸三國公考文生不仕涼公皇運經綸首平李軌大舉河湟之地遠通城郭之國寵錫蕃庶冠絶等夷水出渥窪之神文馬者二千乘山得崆洞之武朱輪者四十人公育榮盛之門鬱豪爽之氣孝友天至清華玉立幼聚童兒必為軍陳之戲長交英俊唯談韜略之書始以良家子僕射韋公待價引於帳下安息軍建竒績解褐授遊擊將軍臨洮府右果毅復以善部統御史大夫唐公休璟處之前鋒洪源谷立異效遷右威衛翊府右郎將兼新泉軍使進本衛中郎將赤水軍副使兼赤水新泉兩軍監牧使改會州刺史營田使換松州都督防禦使遷左司禦率兼河西節度副大使臨洮軍使轉鄯州都督使如故其在軍州傾心下士視人如子無約而親附不言而條理其在農牧大田多稼如茨如梁思馬斯才有驈有皇輸力四朝歷官三紀名參禁衛身任疆場以靜總繁以逸待寇我無亡鏃之費敵有不戰之屈茲所謂一方之干城者也享年六十有六開元十四年十一月二十八日寢疾終於位知與不知莫不隕涕十五年某月葬於烏城之南志公鄉祔先塋也公寬以御衆卑以自牧直而無訐廉而無劌朋友不聞臧否之言家人不見喜慍之色加以心淨三業躬勤八戒推是而行何往不濟初甘州有舍利沙多禪師道場之四果也嘗云檀越德充於內神護於外雖冒鋒鏑永無害也及百戰之後啓手歸全西州士人聞之激厲有子仲璋如璋季璋金璋重璋庭襲芝蘭喪過欒棘敬奉窀穸備禮儀於文武撰述家風刻功名於金石詞曰玉關氣爽金波秋徹涼野蕭條寒山積雪授靈産義精徑才傑孝固純深忠維剛烈負羽從軍奮飛青雲麾幢按部惠流時雨總軍挾郡入文出武三十年間式遏戎虜疆場務靜非公莫鎮金鼓氣雄非公莫震神山與鋏龍池取駿霹靂陷營衝風入陳勇將知時仁兵善持反耕罷戰王者之師牧馬如雲屯庾如坻西軍方壯東首長辭振古同嗟沒而不死所謂明德永傳神理鐘鼎題門珠玉名子信言豐石令問不巳夫積德垂裕之謂仁追遠揚名之謂孝仁則慶鍾厥後孝則榮及其親嘗三復於斯言今於馮府君見之矣府君諱君衡其先長樂人也釋趙歸秦本家上黨分燕徙越又據高良自遠祖榮懷化侯業以至於大父贈荊州都督盎先考高州使君智戣咸以勳績建方與本郡甲兵雄於一方政化沓於千里君蘊含宏光大之德守沖默安貞之志秉難進易退之操詣希聲若訥之道為而不有故物譽難得而稱靜以居常故世榮無由而及以聖歷之歲終於本城子幼家艱喪禮蓋闕夫人麥氏備母師之六行履先姑之四德處順思柔以成婦道及衛亡共伯而魯重敬薑誓以泛舟之詩遵其門為門之禮季子今冠軍大將軍右監門衛大將軍上柱國渤海郡開國公力士始自齠齔來儀上京既違徙宅之歡爰從倍年之訓感三州之深義易百代之因生捨馮亭之本枝從高傒之令族千秋仕漢遂去田宗隨會在秦別為劉氏遇風雲之感會承日月之光輝茅土答其勳庸貂璫寵其忠信太夫人踰越嶺嶠就養高堂孝子展白華之勤慈母欣綵衣之貴精誠所感振古難儔噫歟資孝為忠隱心後動引桑霍之深誡慕金張之周密敬以衛主愛以安親而善不彰官不遂者未之有也由斯言之則哀樂存乎心不以至音改禍福惟所召不以偏覆及詩云魯侯燕喜令妻壽母明神勞善人而壽其母也夫人以開元十七年享年八十有七五月十二日壽終於京兆之來庭里舍天子悼先賢之晦德嘉侍臣之克孝思賵襚之未崇愴窀穸之將及於是詔贈先府君潘州刺史備禮飾終招魂合葬是歲也大享宗廟遍謁園陵錫類之恩施於卿士重贈府君使持節都督廣韶循康等一十六州諸軍事廣州大都督夫人受邑舊邦啓號南海從夫加贈改封越國夫人哀榮備於始終寵光洽於中外為子之道何以加焉於是與兄左衛中元璡左領軍衛郎將元圭等惟舊業之難名感新恩之薦及思建碑表以永芬芳夫育至德以庇後嗣仁之厚者也揚令名以崇祖考孝之大者也仁為五常之先孝實百行之首貫經教而莫比標人倫而獨出宜其鏤美金石式旌墳無忘清徽昭示來葉何必會稽江上獨有紀孝之碑安陵廟前空傳尚德之頌其詞曰明珠紫貝産於南國代所珍兮允矣君子不耀其德克全真兮慶流我後高驤迥翥中貴臣兮朱轓象服寵及泉路榮其親兮孝道不隕勒銘表墓留芳塵兮至哉坤元萬物資生王者母事德合天明義有大報用協永貞茫茫九土思索其精因天事天因地事地彼汾之曲高脽傑異景象遺光壇場舊位寂寥千祀精靈永閟誣神不祥復古維祺文所無者秩而祭之矧曰后土昔載明祠何必因陰乃為我師意多漢武迹在橫汾風流可接簫鼓如聞壽宮創制神鼎勒勳古往今來豈無斯文巉巉太華柱天直上青崖白谷仰見靈掌雄峰峻削菡萏森爽是曰靈嶽衆山之長白帝西下黃河北來陰陽孕育精氣徘徊偶聖呈瑞逢昏降災玉池神挹石室仙開海絶瀛洲天遙元圃偉哉此鎮崢嶸中土鬼神乍遊風雲忽聚高標爀日半壁飛雨自古王者巡方必至龍駕帝服封天禪地南面會神西后在位待豫治國安人然後徐思其事
