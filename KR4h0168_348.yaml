front:
  text: 全唐文欽定全唐文卷三百四十八李白二
  hash: sha256:9d8f53cecd9641cf929755722360d39e017cdfeee87307355e63b10af99df8d8
body:
  text: 惟十有四載皇帝以歲之驕陽秋五不稔乃慎擇明牧恤南方凋枯伊四月孟夏自淮陰遷我天水趙公作藩於宛陵祗明命也惟公代秉天憲作程南臺洪柯大本聿生懿德宜乎哉橫風霜之秀氣鬱王霸之奇略初以鐵冠白筆佐我燕京威雄振肅虜不敢視而後鳴琴二邦天下取則起草三省朝端有聲天子識面宰衡動聽殷南山之雷剖赤縣之劇強項不屈三州所居大化咸列碑頌至於是邦也酌古以訓俗宣風以布和平心理人兵鎮唯靜畫一千里時無莠言公退之暇清眺原隰以此郡東塹巨海西襟長江咽三吳扼五嶺輶軒錯出無旬時而息焉出自西郭蒼然古道道寡列樹行無清陰至有疾雷破山狂飇震壑炎景爍野秋霖灌途馬逼側於谷口人周章於山頂亭候靡設逢迎闕如自唐有天下作牧百數因循齷齪罔恢永圖及公來思大革前弊實相此土陟降觀之壯其回岡龍盤沓嶺波起勝勢交至可以有作方農之隙廓如是營遂鏟崖堙卑驅石翦棘削汚壤階高隅以門以墉乃棟乃宇儉則不陋麗而不奢森沈閈閎燥溼有庇若鼇之湧如鵬斯騫縈流鏡轉涵映池底納遠海之餘清瀉蓮峰之積翠信一方雄勝之郊五馬踟蹰之地也長史齊公光乂人倫之師表司馬武公幼成衣冠之髦彥録事參軍吳鎮宣城令崔欽令德之後良材間生縱風教之樂地出人倫之高格卓絶映古清明在躬僉謀僝功不日而就總是役也伊二公之力歟過客沈吟以稱歎邦人聚舞以相賀僉曰我趙公之亭也㣥寮獻議請因謠頌以名之則必與謝公北亭同不朽矣白以為謝公德不及後世亭不留要衝無勿拜之言鮮登高之賦方之今日我則過矣敢詢耆老而作頌曰耽耽高亭趙公所營如鼇背突兀於太清如鵬翼開張而欲行趙公之宇千載有覩必恭必敬爰遊爰處瞻而思之罔敢大語趙公來翔有禮有章煌煌鏘鏘如文翁之堂清風洋洋永世不忘共工不觸山媧皇不補天其鴻波汨汨流伯禹不治水萬人其魚乎禮樂大壞仲尼不作王道其昏乎而有功包陰陽力掩造化首出衆聖卓稱大雄彼三者之不足徵矣粵有我西方金仙之垂範覺曠劫之大夢碎㣥愚之重昏寂然不動湛而常存使苦海靜滔天之波疑山滅炎崑之火囊括天地置之清涼日月或墜神通自在不其偉歟魯郡崇明寺南門佛頂尊勝陀羅尼石幢者蓋此都之壯觀昔善住天子及千大天遊於園觀又與天女遊戲受諸快樂即於夜分中聞有聲曰善住天子七日滅後當生七反畜生之身於是如來授之吉祥真經遂脫諸苦蓋之天徵為大法印不可得而聞也我唐高宗時有罒炎刀賓桑門持入中土猶日藏大寶清園虛空檀金淨彩人皆悅見所以山東開士舉國而崇之時有萬商投珍士女雲會衆布蓄沓如陵琢文石於他山聳高標於列肆鑱珉錯綵為鯨為螭天人海怪若叱若語貝葉金言刊其上荷花水物形其隅良工草萊獻技而去聖君垂拱南面穆清而居大明廣運無幽不燭以天下所立茲幢多臨諸旗亭喧囂湫隘本非經行圍繞之所乃頒下明詔令移於寶坊吁百尺中標矗若雲斷委翳苔蘚周流星霜俾龍象興嗟仰瞻無地良可歎也我太官廣武伯隴西李公先名琬奉詔書改為輔其從政也肅而寬仁而惠五鎮方牧聲聞於天帝乃加剖竹於魯魯道粲然可觀方將和陰陽於太階致吾君於堯舜豈徒閉閣坐嘯鴻盤二千哉乃再崇厥功發揮象教於是與長史盧公司馬李公等咸明明在公綽綽有裕韜大國之寶鍾元精之和榮兼半刺道光列嶽才或大而用小識無微而不通政其有經談豈更僕有律師道宗心總㣥妙量包大千日何瑩而常明天不言而自運識岸浪注元機清發每口演金偈舌搖電光開關延敵罕有當者由萬竅同號於一風衆流俱納於溟海若乃嚴飭佛事規矩梵天法堂鬱以霧開香樓岌乎島峙皆我公之締構也以天寶八載五月一日示滅大寺百城號天四衆泣血焚香散花扶櫬臥轍仙鶴數十飛鳴中絶非至德動天深仁感物者其孰能與於此乎三綱等皆論窮彌天惠湛清月傳千燈於智種了萬法於真空不謀同心克樹聖跡太官李公乃命門於南垣廟通衢曾盤舊規纍構餘石壯士加勇力侔拔山才擊鼓以雷作拖鴻縻而電掣千人壯萬夫勢轉轆轤於橫梁泯環合而無際常六合之振動崛九霄之崢嶸非鬼神功曷以臻此況其清景燭物香風動塵㣥形所霑積苦都雪粲星辰而增輝掛文字而不滅雖漢家金莖伏波銅柱擬茲陋矣或日月圓滿方檀散華清心諷持諸佛稱贊夫如是亦可以從一天至一天開天宮之門見㣥聖之顏巍巍功德不可量也其録事參軍六曹英寮及十一縣官屬有宏才碩德含香繡衣者皆列名碑陰此不具載郡人都水使者宣道先生孫太沖得真人紫蘂玉岌之書能令太乙神自成還丹以獻於帝帝服享萬壽與天同休功成身退謝病而去不謂古之元通微妙之士歟乃謂白曰昔王文考觀藝於魯騁雄辭於靈光陸佐公知名在吳銘雙闕於盤石吾子盍可美盛德揚中和恭承話言敢不惟命遂作頌曰揭高幢兮表天宮嶷獨出兮淩星虹神摐摐兮來空仡扶傾乎蒼穹西方大聖稱大雄橫絶苦海舟㣥蒙陀羅尼藏萬法宗善住天子獲厥功明明李君牧東魯再新頽規扶衆苦如大雲王注法雨邦人清涼喜聚舞揚鴻名兮振海浦銘豐碑兮昭萬古臣某言臣誠惶誠恐頓首頓首臣聞社稷無常奉明者守之君臣無定位暗者失之所以父作子述重光疊輝天未絶晉人惟戴唐以功德有厚薄運數有修短功高而福祚長永德薄而政教陵遲三后之姓於今為庶非一朝也伏惟陛下欽六聖之光訓擁千載之鴻休有國之本㣥生屬望粵自明兩光岐之陽昔有周太王之興發跡於此天啓有類豈人事歟皇朝百五十年金革不作逆胡竊號剝亂中原雖平嵩邱填伊洛不足以掩宮城之骸骨決淇河灑秦雍不足以蕩犬羊之羶臊毒侵區宇憤盈穹旻此乃猛士奮劒之秋謀臣運籌之日夫不拯橫流何以彰聖德不斬巨猾無以興神功十亂佐周而克昌四凶及虞而乃去去元凶者非陛下而誰且道有興廢代有中季漢當三七莽亦為災赤伏再起丕業終光非陛下至神至聖安能勃然中興乎以臣料人事得失敢獻疑於陛下臣猶望愚夫千慮或冀一得何者賊臣楊國忠蔽塞天聰屠割黎庶女弟席寵傾國弄權九土泉貨盡歸其室怨氣上激水旱薦臻重罹暴亂百姓力屈即欲平殄蝥賊恐難應期且圖萬全之計以成一舉之策今自河以北為胡所淩自河之南孤城四壘大盜蠶食割為洪溝宇宙嶢杌昭然可覩臣伏見金陵舊都地稱天險龍盤虎踞關扃自然六代皇居五福斯在雄圖霸跡隱軫猶存咽喉控帶縈錯如繡天下衣冠士庶避地東吳永嘉南遷未盛於此臣又聞湯及盤庚五遷其邑典謨訓誥不以為非衛文徙居楚邱風人流詠伏惟陛下因萬人之蕩析乘六合之譸張去扶風萬有一危之近邦就金陵太山必安之成策苟利於物斷在宸衷况齒革羽毛之所生楩柟豫章之所出元龜大貝充牣其中銀坑鐵冶連帛丿糸相屬剗銅陵為金穴煮海水為鹽山以征則兵強以守則國富橫制八極克復兩京俗畜來蘇之歡人多傒后之望陛下西以峨嵋為壁壘東以滄海為溝池守海陵之倉獵長洲之苑雖上林五柞復何加焉上皇居天帝運昌之都儲精真一之境有虞則北閉劒閣南扃瞿塘蚩尤共工五兵莫向二聖高枕人何憂哉飛章問安往復巴峽朝發白帝暮宿江陵首尾相應率然之舉不勝屏營瞻雲望日之至謹先奉表陳情以聞臣某聞天地閉而賢人隱雲雷屯而君子用臣伏見前翰林供奉李白年五十有七天寶初五府交辟不求聞達亦由子真谷口名動京師上皇聞而悅之召入禁掖既潤色於鴻業或間草於王言雍容揄揚特見裦賞為賤臣詐詭遂放歸山閒居製作言盈數萬屬逆胡暴亂避地廬山遇永王東巡脅行中道奔走卻至彭澤具已陳首前後經宣慰大使崔渙及臣推覆清雪尋經奏聞臣聞古之諸侯進賢受上賞蔽賢受顯戮若三適稱美必九錫光榮垂之典謨永以為訓臣所管李白實審無辜懷經濟之才抗巢由之節文可以變風俗學可以究天人一命不霑四海稱屈伏惟陛下大明廣運至道無偏收其希世之英以為清朝之寶昔四皓遭高皇而不起翼惠帝而方來君臣離合亦各有數豈使此人名揚宇宙而枯槁當年傳曰舉逸人而天下歸心伏惟陛下回太陽之高暉流覆盆之下照特請拜一京官獻可替否以光朝列則四海豪俊引領知歸不勝慺慺之至敢陳薦以聞臣某言伏蒙聖恩追赴行在臣誠惶誠恐頓首頓首臣聞胡馬矯首嘶北風以局顧越禽歸飛戀南枝而刷羽所以流波思其舊浦落葉墜於本根在物尚然矧於臣子臣位叨磐石辜負明時才闕總戎謬當強寇駑拙有素天實知之伏惟陛下重紐乾綱再清國步慜臣不逮賜臣生全歸見白日死無遺恨然臣年過耳順風瘵日加鋒鏑殘骸劣有餘喘雖決力上道而心與願違貴貪尺寸之程轉增犬馬之戀非有他故以疾淹留今大舉天兵掃除戎羯所在郵驛徵發交馳臣逐便水行難於陸進瞻望丹闕心魂若飛慚墜履之還收喜遺簪之再御不勝涕戀屏營之至謹奉表以聞白嶔崎歷落可笑人也雖然頗嘗覽千載觀百家至於聖賢相似厥衆則有若似於仲尼紀信似於高祖牢之似於無忌宋玉似於屈原而遙觀君侯竊疑魏洽便欲趨就臨然舉鞭遲疑之間未及回避且理有疑誤而成過事有形似而類真惟大雅含宏方能恕之也白少頗周慎忝聞義方入暗室而無欺屬昏行而不變今小人履疑誤形似之跡君侯流愷悌矜恤之恩戢秋霜之威布冬日之愛睟容有穆怒顏不彰雖將軍息恨於長孫之前此無慚德司空受揖於元淑之際彼未為賢一言見冤九死非謝白孤劒誰託悲歌自憐迫於悽惶席不暇暖寄絶國而何仰若浮雲而無依南徙莫從北遊失路遠客汝海近還䢵城昨遇故人飲以狂藥一酌一笑陶然樂酣困河朔之清觴飫中山之醇酎屬早日初眩晨霾未收乏離朱之明昧王戎之視青白其眼瞢而前行亦何異抗莊公之輪怒螳螂之臂御者趨召明其是非入門鞠躬精魄飛散昔徐邈緣醉而賞魏王却以為賢無鹽因醜而獲齊君待之逾厚白妄人也安能比之上挂國風相鼠之譏下懷周易履虎之懼慜以固陋禮而遣之幸容越之辜深荷三公之德銘刻心骨退思狂五情冰炭罔知所措晝愧於影夜慚於魄啓處不遑戰局無地伏惟君侯明奪秋月和均韶風掃塵辭場振發文雅陸機作太康之傑士未可比肩曹植為建安之雄才惟堪捧駕天下豪俊翕然趨風白之不敏竊慕餘論何圖叔夜潦倒不切於事情正平猖狂自貽於恥辱一忤容色終身厚顏敢昧負荊請罪門下儻免以訓責恤其愚蒙如能伏劒結纓謝君侯之德敢以近所為春遊救苦寺詩一首十韻石巖寺詩一首八韻上楊都尉詩一首三十韻辭旨狂野貴露下情輕干視聽幸乞詳覽宿昔惟清勝白帛丿糸疾疲薾去期恬退才微識淺無足濟時雖中原橫潰將何以救之主命崇重大總元戎辟書三至人輕禮重嚴期迫切難以固辭扶力一行前觀進退且殷深源廬嶽十載時人觀其起與不起以卜江左興亡謝安高臥東山蒼生屬望白不樹矯抗之跡恥振元邈之風混遊漁商隱不絶俗豈徒販賣雲壑要射虛名方之二子實有慚德徒塵忝幕府終無能為唯當報國薦賢持以自免斯言若謬天實殛之以足下深知具申中款惠子知我夫何間然勾當小事但增悚惕白聞天下談士相聚而言曰生不用封萬戶侯但願一識韓荊州何令人之景慕一至於此耶豈不以有周公之風躬吐握之事使海內豪俊奔走而歸之一登龍門則聲價十倍所以龍蟠鳳逸之士皆欲收名定價於君侯願君侯不以富貴而驕之寒賤而忽之則三千賓中有毛遂使白得脫穎而出即其人焉白隴西布衣流落楚漢十五好劒術遍干諸侯三十成文章歷抵卿相雖長不滿七尺而心雄萬夫王公大臣許與氣義此疇曩心跡安敢不盡於君侯哉君侯制作侔神明德行動天地筆參造化學究天人幸願開張心顏不以長揖見拒必若接之以高宴縱之以清談請日試萬言倚馬可待今天下以君侯為文章之司命人物之權衡一經品題便作佳士而君侯何惜階前盈尺之地不使白揚眉吐氣激昂青雲耶昔王子師為豫章未下車即辟荀慈明既下車又辟孔文舉山濤作冀州甄拔三十餘人或為侍中尚書先代所美而君侯亦一薦嚴協律入為祕書郎中間崔宗之房習祖黎昕許瑩之徒或以才名見知或以清白見賞白每觀其銜恩撫躬忠義奮發白以此感激知君侯推赤心於諸賢之腹中所以不歸他人而願委身於國士儻急難有用敢效微軀且人非堯舜誰能盡善白謨猷籌畫安敢自矜至於制作積成卷軸則欲塵穢視聽恐雕蟲小技不合大人若賜觀芻蕘請給以紙筆兼之書人然後退掃閒軒繕寫呈上庶青萍結緑長價於嶭卞之門幸推下流大開獎飾唯君侯圖之白聞天不言而四時行地不語而百物生白人焉非天地安得不言而知乎敢剖心析肝論舉身之事便當談笑以明其心而粗陳其大綱一快憤悶惟君侯察焉白本家金陵世為右姓謹按此二句不可解舊唐書云白山東人父為任城尉因家焉新書云白興聖皇帝九世孫隋末以罪徙西域神龍中逃還客巴西竊思白既為興聖九世孫世為西州右姓如自泝其族望則金陵或係金城之訛否則定因前涼張氏僑置建康郡於敦煌人遂目此建康為金陵故下句云遭沮渠蒙遜之難奔流咸秦按崔鴻十六國春秋云沮渠蒙遜殺呂光酒泉太守疊滕共推建康太守段業為涼州牧應即此事若云江左金陵則白雖因崔宗之官金陵曾經遊此並非世居且與下句遭沮渠蒙遜之難云云俱不可通矣遭沮渠蒙遜之難奔流咸秦因官寓家少長江漢五歲誦六甲十歲觀百家軒轅以來頗得聞矣常橫經籍詩書制作不倦迄於今三十春矣以為士生則桑弧蓬矢射乎四方故知大丈夫必有四方之志乃仗劒去國辭親遠遊南窮蒼梧東涉溟海見鄉人相如大誇雲夢之事云楚有七澤遂來觀焉而許相公家見招妻以孫女便憩跡於此至移三霜焉曩昔東遊維揚不逾一年散金三十餘萬有落魄公子悉皆濟之此則是白之輕財好施也又昔與蜀中友人吳指南同遊於楚指南死於洞庭之上白禫服慟哭若喪天倫炎月伏尸泣盡而繼之以血行路聞者悉皆傷心猛虎前臨堅守不動遂權殯於湖側便之金陵數年來觀筋骨尚在白雪泣持刃躬申洗削裹骨徒步負之而趨寢興攜持無輟身手遂丐貸營葬於鄂城之東故鄉路遙魂魄無主禮以遷窆式昭朋情此則是白存交重義也又昔與逸人東巖子隱於岷山之陽白巢居數年不跡城市養奇禽千計呼皆就掌取食了無驚猜廣漢太守聞而異之詣廬親覩因舉二人以有道並不起此則白養高忘機不屈之跡也又前禮部尚書蘇公出為益州長史白於路中投刺待以布衣之禮因謂㣥寮曰此子天才英麗下筆不休雖風力未成且見專車之骨若廣之以學可以相如比肩也四海明識且知此談前此郡都督馬公朝野豪彥一見盡禮許為奇才因謂長史李京之曰諸人之文猶山無烟霞春無草樹李白之文清雄奔放名章俊語絡繹間起光明洞徹句句動人此則故交元丹親接斯議若蘇馬二公愚人也復何足陳倘賢者也白有可尚夫唐虞之際於斯為盛有婦人焉九人而已是知才難不可多得白野人也頗工於文惟君侯顧之無按劒也伏惟君侯貴而且賢鷹揚虎視齒若編貝膚如凝脂昭昭乎若玉山上行朗然映人也而高義重諾名飛天京四方諸侯聞風暗許倚劒慷慨氣干虹霓月費千金日宴㣥客出躍駿馬入羅紅顏所在之處賓朋成市故詩人歌曰賓朋何喧喧日夜裴公門願得裴公之一言不須驅馬埒華軒白不知君侯何以得此聲於天壤之間豈不由重諾好賢謙以下士得也而晚節改操棲情翰林天才超然度越作者屈佐鄖國時惟清哉稜威雄雄下懾㣥物白竊慕高義已經十年雲山間之造謁無路今也運會得趨末塵承顏接辭八九度矣常欲一雪心跡崎嶇未便何圖謗詈忽生衆口攢毀將欲投杼下客震於嚴威然自明無辜何憂悔吝孔子曰畏天命畏大人畏聖人之言過此三者鬼神不害若使事得其實罪當其身則將浴蘭沐芳自屏於烹鮮之地惟君侯死生不然投山竄海轉死溝壑豈能明目張膽託書自陳耶昔王東海問犯夜者曰何所從來答曰從師受學不覺日晚王曰豈可鞭撻越以立威名想君侯通人必不爾也願君侯惠以大遇洞開心顏終乎前恩再辱英盼白必能使精誠動天長虹貫日直度易水不以為寒若赫然作威加以大怒不許門下逐之長途白即膝行於前再拜而去西入秦海一觀國風永辭君侯黃鵠舉矣何王公大人之門不可以彈長劒乎某啓辭違積年伏戀軒屏首冬初寒伏惟相公尊體起居萬福某蒙恩才朽齒邁徒延聖日少忝末吏本乏遠圖中年廢闕分歸園壑昔相公秉國憲之日一拔九霄拂刷前恥升騰晚官恩貸稠疊實載邱山落羽再振枯鱗旋躍運以大風之舉假以摩天之翔衣繡霜臺含香華省宰劇慚強項之名酌貪礪清心之節三典列郡寂無成功但宣布王澤式酬天獎伏惟相公開張徽猷寅亮天地入夔龍之室持造化之權安石高枕蒼生是仰某鳴躍無已翦拂因人銀章朱紱坐榮宦達身荷宸眷目識龍顏既齊飛於鵷鷺復寄跡於門館皆相公大造之力也而鐘鳴漏盡夜行不息止足之分實愧古人犬馬戀主迫於西汜所冀枯松晚歲無改節於風霜老驥餘年期盡力於蹄足以答明主下報相公慺慺之誠屏息於此伏惟相公收遺簪於少昊念亡弓於楚澤衰當益壯結草知歸瞻望恩光無忘景刻淮南小壽山謹使東峰金衣雙鶴銜飛雲錦書於維揚孟公足下曰僕包大塊之氣生洪荒之間連翼軫之分野控荊衡之遠勢盤薄萬古邈然星河憑天霓以結峰倚斗極而橫嶂頗能攢吸霞雨隱居靈仙産隋侯之明珠蓄卞氏之光寶罄宇宙之美殫造化之奇方與崑崙抗行閬風接境何人間巫廬台霍之足陳耶昨於山人李白處見吾子移白責僕以多奇叱僕以特秀而盛談三山五嶽之美謂僕小山無名無德而稱焉觀乎斯言何太謬之甚也吾子豈不聞乎無名為天地之始有名為萬物之母假令登封禋祀曷足以大道譏耶然皆損人費物庖殺致祭暴殄草木鐫刻金石使載圖典亦未足為貴乎且達人莊生常有餘論以為斥鷃不羡於鵬鳥秋毫可並於太山由斯而談何小大之殊也又怪於諸山藏國寶隱國賢使吾君榜道燒山披訪不獲非通談也夫皇王登極瑞物昭至蒲萄翡翠以納貢河圖洛書以應符設天綱而掩賢窮月竁以率職天不祕寶地不藏珍風威百蠻春養萬物王道無外何英賢珍玉而能伏匿於巖穴耶所謂榜道燒山此則王者之德未廣矣昔太公大賢傅說明德棲渭川之水藏虞虢之巖卒能形諸兆日感乎夢想此則天道暗合豈勞乎搜訪哉果投竿詣麾舍築作相佐周文讚武丁總而論之山亦何罪乃知巖穴為養賢之域林泉非祕寶之區則僕之諸山亦何負於國家矣近者逸人李白自峨眉而來爾其天為容道為貌不屈巳不干人巢由以來一人而已乃虯蟠龜息遁乎此山僕嘗弄之以緑綺臥之以碧雲潄之以瓊液餌之以金砂既而童顏益春真氣愈茂將欲倚劒天外挂弓扶桑浮四海橫八荒出宇宙之寥廓登雲天之渺茫俄而李公仰天長吁謂其友人曰吾未可去也吾與爾達則兼濟天下窮則獨善一身安能餐君紫霞蔭君青松乘君鸞鶴駕君虬龍一朝飛騰為方丈蓬萊之人耳此則未可也乃相與卷其丹書匣其瑤琴申管晏之談謀帝王之術奮其智能願為輔弻使寰區大定海縣清一事君之道成榮親之義畢然後與陶朱留侯浮五湖戲滄洲不足為難矣即僕林下之所隱容豈不大哉必能資其聰明輔其正氣借之以物色發之以文章雖烟花中貧沒齒無恨其有山精木魅雄虺猛獸以驅之四荒磔裂原野使影跡絶滅不干戶庭亦遣清風掃門明月侍坐此乃養賢之心實亦勤矣孟子孟子無見深責耶明年青春求我於此巖也
