front:
  text: 全唐文欽定全唐文卷八百五墉咸通時布衣
  hash: sha256:4afd39478d1476ebffcc7d64d30eb5cb1005b7e28307529177b9ee30e320a514
  markers:
  - {type: head, offset: 12, content: 高墉, id: KR4h0168_NFKB_805-h1, level: 1}
body:
  text: 天性本聰敏執心謙沖推善讓人曾不自伐事鄉曲乃鄉曲欽承理家道而家道篤睦者厥有周文王毛公苗裔國汭國崇之昆季也仁孝並舉義讓克修雖古高柴田真難可將比焉祖立職轅門妙間弓矢正直在己匡救邦家吾君賞其勳勞延及後嗣父敬承先祀相紹無差上令下從罔墜基緒書曰功加於時德垂後裔斯之謂歟暇日昆季議曰阿翁遺意保厥孫謀衣食粗充心思上報既而上下協睦同望勝因乃召匠選石施功琢削磨礱既就崇窣堵波是日功終立於營所其地則北視橫山南鄰畢陌東西逾遠故號洪川意望將此勝因資及七代先靈并亡兄姊妹等願神識不昧得覩真容彌勒佛前親承聖旨現存孫息眷屬等福樂無窮壽等青山福同滄海願法界衆生普霑此福乃為銘曰天雖高兮尺寸可知地雖厚兮里數可期海水深兮毛渧記之大地廣兮微塵無遺烏兔交兮四時有盡立窣堵兮福布無涯鉶咸通中為靜海軍節度高駢掌書記加侍御史內供奉後官成都節度副使加御史大夫巨浸無涯接天茫茫狂飇捲蹙駭浪屹起若流堆而走雪岫瞬息萬里皚皚然縱天英之神威亦不能抑遏其勢長鯨憂其蹭蹬巨鰲困其擺闔水族之偉者尚不得安况橫越之舳艫焉能利涉耶即摧檣裂帆覆溺而不可拯有之乎今天威徑者自東漢馬伏波欲剪二徵將圖交趾煎熬饋運間濶滄溟乃鑿石穿山遠避海路及施功用死役者不啻萬輩竟不遂其志多為霆震山之巨石自巔而咽之伏波無術不能禁乃甘其息自唐皇有三都護其舊迹俱沒欲繼其事遂命疊燎沃醯力殫物耗踵前功而不就又各殞數千夫積骸於徑之畔邇者無有敢議其事者自僕射渤海公剪蕩蠻夷跨踰滄漲削平交趾克復郡城錯磨鋋殳駐罩卒伍然運粟走食尚阻洪濤召術徵謀未閲長策渤海公曰我再有丹徼重闡皇風聚兵安人須便於事遂命攝長吏林諷湖南軍都將余存古等部領本將兵士并水手等一千餘人往天威徑而疏鑿之渤海公諭之曰天道助順神力扶直今鑿海派用拯生靈苟不徇私何難之有前時都護乃犒師不至持法不堅博約營私人須怠惰今我則不然只要濟其王事耳諷等遂唯而去自咸通九年四月五日起手操持鍬鍤豐備資糧鋭斧剛鏨刊山琢石是石堅而頑盤而厚併手揭折藂力鐫槌逾月之間似欲開濟但中間兩處值巨石嶄嶄焉繚亘數丈徑硬如鐵勢不可減鑿下刃卷斧施柄折役者相顧氣沮手柔莫能施其巧矣至五月二十六日當晝忽狂雲興怒風作窺林若瞑視掌如瞽俄有轟雷磷電自勵石之所大震數百里役者皆股栗膽動掩聰蔽視移時而四境方門郭衆奔驗視其艱難之石倏而碎矣或有磊磊者落落者約人而不能舉俱為雷之攫拏擲於兩峯耳又其西堅確之石至六月十一日後大震如初霆雷之赫怒迅烈復愈於東之所震者衆復驗之是日以磨泯若有所失旁之盤陀者亦碎裂數十丈又其西復值巨石亦不可措手工人息攻皆仰恃穹昊意有所待復興雲雷又大震巨石乃隳裂有泉迸出味如甘醴此乃乾坤拯助造化扶持回換艱難一瞬夷坦皆渤海公心無私契精貫上元使列缺之與豐隆矜神功而誇妙用風雲接助增益勳庸感應如斯古無儔匹遂使決泄一派接引兩湖中間合流無纖阻窒經過卒校梯溟漲而不艱危趲運倉儲棹舟航而無覆沒凡涉交趾履險之處昔如履冰宋洞沙之鏵觜耕其淪漣女漚灣之石頭湧其沸騰大蒙神之山腳蹴其洶涌舟人所歷毛髮自寒今則安流坦途不復經斯險矣於戲渤海公之功績與鑿汴渠開桂嶺可等肩而濟其寰區耳諷與存古勤潔奉公精專辦事指麾之外更能審曲面勢伐山徵材結構高亭創修別館泉驅來而走碧橋架險以橫虹神室雷祠道堂僧署無不克備皆能顯宏至其年九月十五日畢工諷存古等堅請刻石紀次以示曠代渤海公從之因命於掌記直書其事鉶謬當秉筆不敢退讓銘曰天地汗漫人力微茫渡危走食冒險駕航脫免者稀傾沈是當我公振策勵山鑿石功施艱難霆助震激泄海成派泛舟不窄渤海坦夷得餉我師天道開泰神威秉持庶揚州人工畫花鳥韶則盡美聽何可忘况至德之斯過聆奇音之孔揚天縱多能信以嘉乎擊拊神資博學知具美於典章用而不匱樂亦無荒若充乎四門之術不離乎數仞之牆驗則足徵用之可貴聖者妙而合道志者仰而自慰悅五音而肆直孰謂其聾致六府之和平自忘於味省風而八風叶暢觀德而九德昭宣季子慙遊於魯地穆公徒饗於鈞天曷若覩率舞聆薰絃變態固已周流自然可以深骨髓而期富壽豈徒資視聽而娛聖賢至若清磬虛徐朱絃疏越鼗鼓以之迭奏笙鏞於焉間發以感陰陽於宇宙耀光明於日月自表虞德之不衰豈效文王之既歿是知武也未善頀也有慙均化歸於二八讓德明乎再三所以其道不窮厥見斯在驗率舞於百獸想同和於四海如其樂正非關自衛而來儻俟風移有異從周而改愔愔不極杳杳作迷俄將復矣抑又揚兮夢周公而不見想聖德而思齊聞斯行諸厥不踰矩感心駭耳視何其覩悠然而往三歎如在夫寥天倏爾而旋萬籟已吟於九土詎忘味於三月諒永懷於千古幸賦韶樂之遺音美哉尼父范大夫廟在龍陽縣之赤山山接沅江縣東有湖古名赤山春夏水繞之一云天寶六載巡使蕭子寶改山與神同名今民庶憚其靈罔敢呼者廟後倚高山前臨湖水山即峯巒疊疊觀如隊羊水即渺漠雲夢章華之洞澤其廟古與禪林臺同為一院乃有長松巨竹豫章雜樹煙霞鬱茂旁有渚名南浦居人列牆而住徑帆往來無不湊者向南二里餘有巨石數十逼臨湖水大者狀如宮室如舟航繫於灣島名曰石碑石畔有潭秋冬不乾號橫潭池夏日洪濤洶湧魚龍之所會沿崖有路通行上有垂藤古木鳥獸所居崖岸數里遠望如霞西望隔湖平田數百畝中有古城俗呼澥湧城林木森聳每春水泛溢嵐翠湖光氣蒸祠宇按郡記云即楚附庸君城也廟北去太湖五里餘有上壠連山腳而截湖如堤防上有一柱冬居壠上春夏迥在水中名繫馬柱廟無碑記相傳神以光宅二年臨北境時見乘石牛巡山擇地至第三岡曰覆盆岡上有豫章盤根數丈垂枝下掃其地神於此置廟或云貞觀以來曾蒙國祭禪林臺有殿宇佛事悉皆開元中建立咸通十一年二月前使塞中丞施金帛建廟院昭度字正紀京兆人咸通八年登第乾符中纍遷中書舍人從僖宗幸蜀拜戶部侍郎中和二年以本官同平章事兼吏部尚書授司空遷太保兼侍中昭宗立守中書令封岐國公王建攻陳敬瑄於成都詔拜行營招撫使還為東都留守景福二年以司徒門下侍郎復為平章事進太傅後為王行瑜所害贈太尉伏以萑蒲嘯聚車馬省方天災流行國家代有陛下下成湯罪已之詔徵王者有征之師顧彼凶妖即當殄滅清平既彰於嘉兆幽贊爰覩於祕文赤雀銜書貺豈同於天上元龜負卦慶難比於平災况因宗室齋醮之辰仍有祥光跳躑之瑞其為感現可謂丁寧伏自翠華南指黃道西分山行則六鳳翔軒水渡則雙龍負楫劍飛峭壁芝秀行宮祥文泛木於湘川麗日交輝於蜀國蓋由聖神所祐謙抑不居遂令感動元穹發揮厚土青羊故里精思盤石之臣白馬新蹤默啓靈甎之篆仙家祕密景祚延洪周旋六字之中契合千年之運魏代之始營宮廟玉璽效祥舜朝之流眄庭除金車迥出方於貽疑難繼斯文賞功罰否前聖之令猷含垢匿瑕百王之垂訓是以雷解而羲文象德網開而湯化歸仁用彼懷柔式存彞範上自軒農之代下臻文武之朝罔不允洽寬宏以流霈澤况國家當德祖守成之日憲宗致理之時車軌一同桑麻萬里燭龍外野悉在梯航火鼠窮郊咸歸正朔然猶王承宗擁兵鎮冀詔范希朝討之仍歲無功卒行赦宥而又朱滔以幽州之衆結田悅李納王武俊之強遣馬燧等征之不克旋又寬之以纍聖之典謨睿哲大朝之紀律文明非不欲厲彼風驅快其電掃然且考春秋之義稽楚鄭之文或退而許平或服而更捨存於舊史載彼新書李克用代漠強宗陰山貴允呼吸而風雲作氣指揮而草木成形仰天指心誓獻秩訾之首伏韜毆血屢親都護之營所謂勇多上人自匪窮來歸我及陛下聖考懿宗皇帝之朝彭門失守親驅鋭卒首建殊功而先帝即位之初渚宮大擾復提義旅克靜妖氛其後封豕長蛇薦食上國繼以子朝之亂皆因重耳之盟保大朝之宗祧垂中興於簡册蓋聖主之御天下也有勳可書有績可載宥過不忘於十代念功豈止於一時天高聽卑請事斯語且四海之內創痏猶殷九貢之邦綱條未理昨者遽起邠岐之衆尋已退還又徵燕薊之師倏聞內變出於餉饋失職資屝絶供致此投戈是乖借箸蓋下計之未熟非聖謀之不臧儻宸斷重新天機間出録茲誠款散彼師徒虛其舊念之懷待以如初之禮臣等所議實在於斯抑又聞往者漢將趙充國欲因邊境衰弱出兵擊之是時魏相上書盡陳利害且曰恃國家之大矜人物之衆欲見威於敵者謂之驕兵兵驕者滅非但人事乃天道也又曰臣不知此兵何名者也兵出無名事乃不成漢宣納之竟罷其伐伏惟皇帝陛下鑒往古用師之難採列聖遷善之美恩加區宇信及豚魚則臣等不勝懇願况今汴魏猶難幽定方困縱遣之調發豈能集事虛行號令徒召寇讐將以勦人非惟辱國且黠戛斯舉勤王之衆推效命之誠未能虜騎獨攻所望漢兵同力令茲數鎮奔命不遑難致濟師恐又生事諭其漸當暑熱非利戎旃悉力頒霑遣還蕃部重榮陳五郡之卒益謹關防王珙振兩河之雄更嚴旗鼓然後獎其上表哀以自陳録彼前勞責之後效徵神爵之往典還日逐之故封諭其已斥王恭不使更疑晉帝凡百臣子實切乃誠其克用在身官爵並請却還仍依前編入屬籍蟾字隱圭下杜人大中中進士徐商辟掌書記咸通十四年官御史中丞終上書左丞應諸州刺史除授正衙辭謝后託故陳牒請假實為容易自今後如實有故為衆所知者三日外不在陳牒之限應內外除官入京合便謝如有犯條章頗乖禮敬自今已後望準故事如未朝謝須俟於都亭驛如違臺司勘當申奏肅咸通中官大理司直盧龍節度衛前兵馬使故甘泉禪院大師諱曉方蘇州常熟縣人師事五泄山靈默大師慈悲以濟物勇猛以化人橫身塞河決之波舉手正山岡之勢碎裂魔網高張法雲得岸拋舟不師文字上天燒尾別創風雷方嶽公侯連城守宰偃風渴道靡不皈依百草滋甘露之芽三獸極淺源之渡皇哉巍乎則置院之碑詳矣咸通十一年三月十日遷神於此山報齡七十七僧夏五十八門人法順等肇建靈龕於院西南百步盤龍山首焉咸通十二年歲次辛卯閏八月盧龍節度衛前兵馬使前朝議郎試大理司直中山郎肅記虔冉咸通時官撫州兵曹參軍撫州刺史渤海李公一日無事理舟汝水泝流而上顧視原野而歎曰焉有沃壤如此而不富於民耶有田戶鄒稜跪而拜曰稜臨川之小民老於農者請以利害計於使君願申其説公曰然因得盡搜故事得華陂舊基焉稜曰華陂始於上元在大歷中有若顏魯公亦建土塍陂尋亦廢塞在貞元中有若戴公置冷泉陂其迹尋荒在太和中有若杜公修置不成咸通五年七年有若皇甫公有若鍾離公相承八十餘年皆儀圖其地卒不能就公曰不然吾試為汝成之於是究其源度其地鳩其工諭其民民咸樂之九年八月鑿冷泉故基自文昌橋直抵南洲鋪上口凡九百七十餘丈接汝江皆沙礫排窒微有其趾於是畚鍤既備併其工而開鑿乃浚其洫乃高其壖土與江口平盡出其沙與積壤縈束盤委望之若帶焉過報恩寺趨文昌橋下透隴畝而分其溝塍綺錯鱗差二十餘派陂偃五所以節水勢公又於其上橫截汝江置千金陂南北百二十五丈斬木為橦疊薪為濢間以巨石而絡之江水小長陂則蹙其水丈餘而入於冷泉之新渠奔流貫激通舟楫之利利於窮民走文昌橋北沿流三十餘里灌注原田新舊共百有餘頃自茲田無荒者民悉力而開耕爾後又不可勝紀其頃畝矣先是荒廢陂水不入仰天雨積潦而溉之苟旱暵不雨苗則盡稿是臨汝長寧長樂三鄉之民固無望秋成而輸王之稅不減他戶窮民焦號無所控訴至有鬻妻傭女其苦甚矣嗚呼不有天意將大拯於撫民則公曷蒞於臨汝耶曷成於千金陂耶民咸聚而謠曰公倅景城民蘇南皮南皮斗門厥績今存在昔河流西走燕魏民困隄防日憂理水舟楫壅遏為弊仍歲公作斗門分水之勢亦不役民荷公之制又曰公作千金撫民惠深陂水沈沈樂乎人心我田不荒我苗如林憂公之去誰其嗣音十年夏新陂成公召郡從事及賓客載酒張樂觀陂以落之由是軍民無少長繄公之德賴公之惠因録其績聞於廉使請詣闕借留引寇恂故事而聲聞朝廷為上郡之政首逮十一年夏公秩將滿懼公之去惜公美績恐汨於後録事參軍衛宗卿臨川令陸怤都押衙李莊都虞候吳敦實子糾候讓勾覆王贊洎州縣胥吏等㣥進衆拜於庭曰公之利臨川其績彰彰厥功懋哉而千金之創特異於古雖汝南何敞開銅陽以利物邵侯斷洪流以溉田無以過也不刊於石則撫人何所仰其德哉衆有議曰軍倅柏虔冉早踐文場善屬詞筆宜勒其事虔冉才非博古學昧通經而繆為賓吏纂我公之懿德豈能備乎辭不獲免因操筆覼縷事志於貞石愧無文飾咸通十一年歲在庚寅六月壬午朔草八日己酉記武陵字晦伯咸通時官倉部員外郎戊辰秋八月吳郡朱遐景自秦還吳南次無錫命豫及故人竇丹列會於惠山之精舍是時山林始秋高興在目涼風白雲起豫坐隅逍遙於松檜之下偃息於盤谷之上仰視雲嶺俯瞰寒影夕陽西歸皓月東出㣥動皆息視身如空元言妙論以極窮奧丹列有遁世之志遐景有塵外之心豫亦樂天知命怡怡契合視富貴如浮雲一歌一詠以紓情性夫良辰嘉會古人所惜序述不作是闕文也山水之下景物秀茂賦詩導意以紀方外之遊畦山陰人第進士官諫議大夫以諫討河東出為潤州刺史長河北控太行東隅粵有奧壤厥為全魏其中土宜耕俗最淳孝子忠臣義夫節婦觸類可觀比屋可封地勢自然物理斯在是以代有將軍稱義兵控北敵之咽喉扼南燕之襟帶歲月鞏固朝野賴之至於命帥臨戎非賢則德或失其統馭則禍必起於蕭牆昔廬江公承襲一方子孫三世逮及衰季始墮弓裘四人切弱一作溺苦之音六郡當舉贏之患乃督三軍之衆千萬同心闕五字英雄應選闕五字僉命我公雄仁蘊長者之譽德負不孤之聞語其力則五丁比肩較其藝則三傑齊價秉磊落大度挺昂藏偉才河山之精貔貅之勇表率魏邦瀝懇魏人天道照臨宸衷慰悅軺使鹿君至軍務克諧金貂之峻秩負來烏府之崇資不踰期月爰登魏博節度至三台之重公感歎彌殷遙駐一作馳罔極之誠驟冀追崇之寵天子乃嘉其大孝錫以珥貂用副孝思式贊幽壤公既獲拜嘉命念哀榮無常若不即以刊之貞石無以闡將門之業無以傳曠古之名因授以賓徒俾詳其事繄吳畦序焉公諱國昌世係汝南人也其先與周同姓姬氏其後苗裔事晉得姓於韓故曰韓武子武子世本云萬生遁伯遁伯生伯簡伯簡生子輿子輿生獻後四十世有韓厥從封為韓氏厥孫於景公三年屠岸賈將作亂誅靈公之賊趙盾趙盾亡死矣欲誅其子趙朔韓厥止之告賈賈不聽厥告趙朔朔曰子必不能絶其事賈誅趙厥稱疾不出卒全其孤春秋書之至於秦晉會盟楚漢襲服綽有勳烈犖然功庸迄於我唐不絶流派公纍代魏將剖分符節曾祖魏博節度押衙祖朝魏博節度押衙兼臨清鎮遏都知兵馬使檢校國子祭酒兼侍御史烈考魏博節度押衙充都知兵馬使檢校國子祭酒兼御史中丞公之為人也天假樹忠神符抗節好謀而斷知幾而明約言有常敏行無玷以孝弟成其性以文武全其才少即承祖宗之餘芳長最好孫吳術讀黃石書指力爭為末燼笑氣吞為細事嘗慕攝衣決勝坐籌出奇軍中少年靡不取則時值王室為難邊疆舉烽公乃拔自偏裨擢於列籓尋擊賊有功乃行賞酬庸論功載筆是時洋溢懋績充塞宇宙心服軍旅名垂竹帛藩翰可期芳訊繼臨密詔垂下公倜儻成癖優遊素深時雖料敵摧堅不廢吟風嘯月執堅守胄鋭氣難奪自思今若終天力絶不顧骨骸後時願乞陪臣不越吾土遂脫輻謝病挂冠養高搢紳有聞物論稱平尋以牽復舊位脫履王畿監止於方鎮懋績崇榮其孰能宗歟公始及裨副載分劇職入奉訓齊之令出揚整肅之權推公而直若引繩行己而平若止水言不好弄服不好華卷舒自得於時宜喜怒不形於顏色崇善觸邪柯葉不遺紫髯最冠於㣥公青眼靡遺於衆卒藹若聞望喧然令圖公非獨王事有作復乃閨門立程稜稜而廷訓惟嚴察察而鄉義尤峻先教之以仁義後導之以詩書諭雍容禮讓之節示惻隱慈愛之心馳騁田獵雜服詭辭趨若仇讐屏如蝎螫肆我武勇平成以賴適方一箭發而號猿猱三尺舉而吼龍虎豫盾山立旌旗血融言其壯則扛鼎拔山顧其勇則馮河逐日七十城而應敵下四十萬而乘時坑此乃用武之克捷行師無不利者若以瞻雲望氣一否一臧辨成敗之機宜鑒吉凶之休咎則武非文而不備文非武而不揚實共濟而相恤無殊塗而別蹤矧豫才立名業闕一字仗弓劍者也豫之身甘為不肖孜孜以未墜之緒力闕一字於命子者其庶幾乎議者乃赧赧絶詞唯唯而退今闕九字僕射果自闕四字德闕公昔之闕一字習非偶然哉武宗涖祚初年逆賊拒命天討薦加常從廬江公以勦叛廬江公異公英勇以前衝統衆弦道係將纍日公度其軍勢相以人心雖機上之可期若在彀中耳謂廬江公曰魏師以久不振旅時無恆心今乃越境而出若非肅齊則衝敗莫制若悅豫其情則前驅不踵公請審其向背妙以機謀督餽餉之心敦戰伐之道在爪牙者去駢羅於後如市人者皆跨列於前自然表裏相應寬猛得中此勇之大勢也一作故可係時時必偃其干戈翹下闕廬江乃俞良策卒成大功鎮山東壯武之聲擅日下勤王之效莫不由此言無謬歟公雖初心不求朝拜藩府所獎符竹為先遂遷攝貝州刺史兼本管效奏御史中丞公既解戎韜俄從郡政三尺之綱條不紊四知之敬慎惟敷瘡疲既起於沈滯勞逸復均於疴癢雖黃霸行教龔遂立誠求之北方孰以優劣公忽不自懌曰久從軍中心無逸闕一字冒馬勞金瘡之績竊蹈忠履信之名稼穡少知艱危歷試不冒榮於好爵不伐闕二字殊勞避授鉞於他邦止建侯於我土今齒髮云邁桑榆足悲胡可尚存碌碌勞勞不知間居適志遂乃命納軾旟終賁林野文言曰知進退存亡而不失其正者其惟聖人乎以大中六年七月十二日寢疾薨於魏州元城縣德教里之私第享年六十有六以大中八年二月二十五日殯於當州莘縣修善鄉依仁里至咸通二年六月二十六日贈左散騎常侍夫人清河張氏同時月日贈清河郡太君有子三人長曰君雄魏博節度觀察處置等使檢校尚書右僕射兼御史大夫仲曰靖魏博節度押衙兼部從檢校太子賓客兼侍御史季曰楚魏博節度押衙兼刀斧將檢校太子賓客兼監察御史噫公以德符陰隲慶延子孫世居封贈之尊蔭極人臣之貴建碑道左顯褒冥途畦序説為銘銘曰堂堂聖朝烈烈文明仁以配德德以延英社稷康人將帥惟精欽我魏疆為河為方厥賦以上厥土惟良異物既産賢臣復彰擾以六韜峻以五常弧矢不幹忠孝為光少齒得志勵節勤王扼腕不斷瀝膽可嘗虬龍屈盤雕鶚翱翔平寇計高伐叛名揚運籌毳帳決勝沙場功業有勳朝廷議勤加以羽纛陟以親軍賜以好爵固以藩身得路我土保祀我禋貔貅舊統畏敬無垠符竹嘗剖惠愛猶存訓子文行果極名臣罔極知報帝命爰臻錫以峻職飾以王綸褒榮令嫡激勵愚嚚褒崇既尊典禮斯陳昭彼懿德勒自貞珉
