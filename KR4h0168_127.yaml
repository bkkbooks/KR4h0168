seq: 127
front:
  text: 全唐文欽定全唐文卷一百二十七貞皇后曹氏莊宗母太原人以良家子嬪於太祖為次妃封晉國夫人莊宗即位尊為皇太后崩諡貞簡
  hash: sha256:dcd18081e602b3ec85ea023164ecd25a00107a1f1c6af639768973e103d1e255
  markers:
  - {type: head, offset: 14, content: 後唐太祖曹皇后, id: KR4h0168_NFKB_127-h1, level: 1}
body:
  text: 皇帝以萬機至重八表所尊勿衣粗衰勿居諒暗三年之制以日易月過三日便親朝政皇后諸妃及諸王公主並制齊衰本服以日易月十三日除中書門下翰林院學士在朝文武百官內諸司使及諸道節度觀察防禦使刺史監軍及前資官並寮佐官吏士庶僧道百姓並準本朝故事降服施行勿使過制皇帝釋服後未御八音勿廢羣祀勿斷屠宰勿禁宴遊園陵喪制皆從省故申遺令奉而行之明宗后曹氏初封楚國夫人天成三年正月冊為淑妃長興元年正月冊為皇后應順元年正月冊為皇太后晉天福五年追冊曰和武顯皇后先皇帝誕膺天眷光紹帝圖明誠動於三靈德澤被於四海方期偃革遽嘆遺弓自少主之承祧為奸臣之擅命離閒骨肉猜忌盤維既輒易於藩垣復驟興於兵甲遂至輕離社稷大撓軍民萬世鴻基將墜於地皇長子潞王從珂位居冢嗣德茂沖年乃武乃文惟忠惟孝前朝廓清多難有戰伐之大功纘紹丕圖有夾輔之盛業今以宗祧乏嗣園寢有期須委親賢俾居監撫免萬幾之壅滯慰兆庶之推崇可起今月四日知軍國事權以書詔印施行先皇帝櫛風沐雨平定華夷嗣洪業於艱難致蒼生於富庶鄂王嗣位奸臣弄權作福作威不誠不信離閒骨肉猜忌盤維鄂王輕舍宗祧不克負荷洪基大寶危若綴旒須立長君以紹丕構皇長子潞王從珂日躋孝敬天縱聰明有神武之英姿有寬仁之偉略先朝經綸草昧廓靜寰區辛勤有百戰之勞忠貞贊一統之運臣誠子道冠古超今而又克巳化民推心撫士率土之謳歌有屬上蒼之眷命攸臨一日萬幾不可以暫曠九州四海不可以無歸況因山有期同軌斯至永言嗣守屬任元良宜即皇帝位高祖后李氏後唐明宗第五女天成三年四月封永寧公主長興四年九月進封魏國長公主清泰二年九月改封晉國長公主晉天福元年十一月冊為皇后七年六月尊為皇太后開運四年三月與少帝同遷於契丹之黃龍府晉室皇太后媳婦李氏妾言張彥澤富珠哩等至伏蒙皇帝阿翁降書安撫者妾伏念先皇帝頃在并汾適逢屯難危同纍卵急若倒懸智勇俱窮朝夕不保皇帝阿翁發自冀北親抵河東跋履山川踰越險阻立平巨孽遂定中原救石氏之覆亡立晉朝之社稷不幸先帝厭代嗣子承祧不能繼好息民而反虧恩辜義兵戈屢動駟馬難追戚實自貽咎將誰執今穹旻震怒中外攜離上將牽羊六師解甲妾舉宗負釁視景偷生惶惑之中撫問斯至明宣恩旨曲賜含容慰諭丁寧神爽飛越豈謂巳垂之命忽蒙更生之恩省罪責躬九死未報今遣孫男延煦延寶奉表請罪陳謝以聞高祖皇后李氏晉陽人高祖領藩鎮纍封魏國夫人天福十二年冊為皇后隱帝即位尊為皇太后周太祖入京請后權臨朝聽政及即位上尊號曰昭聖皇太后居太平宮顯德元年薨高祖皇帝翦亂除凶變家為國救生靈於塗炭創王業於艱難甫定寰區遽遺弓劒樞密使郭威楊邠侍衛使史宏肇三司使王章親承顧命輔立少君協力同心安邦定國旋屬四方多事三叛連衡吳蜀內侵契丹啓釁蒸黎恟懼宗社阽危郭威授任專征提戈進討躬當矢石盡掃烟塵外寇蕩平中原寧謐復以強敵未殄邊塞多艱允賴寶臣往臨大鄴疆埸有藩籬之固朝廷寬宵旰之憂不謂凶豎連謀羣小得志密藏鋒刃竊發殿庭巳殺害其忠良方奏聞於少主無辜受戮有口稱冤而又潛差使臣矯賫宣命謀害樞密使郭威宣徽使王峻侍衛步軍都指揮使王殷等人知無罪天不助奸今者郭威王峻澶州節度使李洪義前曹州防禦使何福進前復州防禦使王彥超前博州刺史李筠北面行營馬步都指揮使郭崇步軍都指揮使曹英護聖都指揮使白重贊索萬進田景咸樊愛能李萬全史彥超奉國都指揮使張鐸王暉胡立弩手指揮使何贇等徑領兵師來安社稷逆黨皇城使李業內客省使閻晉卿樞密都承旨聶文進飛龍使後贊翰林茶酒使郭允明等脅君於大內出戰於近郊及至力窮遂行弒逆冤憤之極今古未聞今則凶黨既除羣情共悅神器不可以無主萬幾不可以久曠宜擇賢君以安天下河東節度使崇許州節度使信皆高祖之弟徐州節度使贇開封尹承勳高祖之男俱列盤維皆居屏翰宜令文武百辟議擇嗣君以承大統天未悔禍喪亂孔多嗣王幼沖羣凶蔽惑搆奸謀於造次縱毒蠆於斯須將相大臣連頸受戮股肱良佐無罪見屠行路咨嗟羣心扼腕則高祖之洪烈將墜於地賴大臣郭威等激揚忠義拯濟顛危除惡蔓以無遺俾綴旒之不絶宗祧事重纘繼才難既聞將相之謀復考蓍龜之兆天人協贊社稷是依徐州節度使贇稟上聖之資抱中和之德先皇如子鍾愛特深固可以子育兆民君臨萬國宜令所司擇日備法駕奉迎即皇帝位於戲神器至重天步方艱致理保邦不可以不敬貽謀聽政不可以不勤允執厥中祗膺景命昨以姦邪搆釁亂我邦家勳德效忠翦除凶慝俯從人欲巳立嗣君宗社危而再安紀綱壞而復振皇帝法駕未至庶事方殷百辟上言請豫蒞政宜允輿議權總萬幾止於浹旬即復明辟王室多故邊境未寧內難雖平外寇仍熾據北面奏報強敵奔衝繼發兵師未聞平殄須勞上將暫自臨戎宜令樞密使郭威部署大軍早謀掩擊其軍國庶事權委宰臣竇貞固蘇禹圭樞密使王峻等商量施行在京馬步兵士委王殷都大提舉比者樞密使郭威志安社稷議立長君以徐州節度使贇高祖近親立為漢嗣爰自藩鎮徵赴京師雖誥命尋行而軍情不附天道在北人心靡東適當改卜之初俾膺分土之命贇可降授開府儀同三司檢校太師上柱國封湘陰公食邑三千戶食實封五百戶侍中功烈崇高德聲昭著翦除禍亂安定乾坤謳歌有歸歷數攸屬所以羣情推戴億兆同歡老身未終殘年屬茲多難唯以衰朽託於始終載省來箋如母見待感仞深意涕泗橫流其諸誠懷難盡宣述繼岌莊宗子莊宗即位充北都留守同光三年封魏王是年伐蜀以為都統蜀平回軍至渭南聞莊宗敗師徒潰散自縊死捨過論功王者示好生之道轉禍為福聖人垂善變之文矧彼蜀人代承唐德元宗朝以兵興河塞久駐金鑾僖宗朝以盜起中原曾停玉輅蜀之乃祖乃父或士或人而皆內稟忠貞外資驍果武負關張之氣文傳揚馬之風迎大駕以涉岷峨合諸軍而定關輔忠氣冠乎日月勳業著乎山河凡在幽遐皆所傳達不幸龜龍忽去蛇豕尋生遇此匪人據斯重地蜀主先父出身陳許擁衆巴庸接王室之頻遷保邊隅而自大蓋屬昭宗皇帝方茲播越正切撫綏洗彼瑕疵潤之雨露綰紅斾碧幢之貴兼鳳池雞樹之榮狂兕逢山漸展橫行之志鳴梟出穴曾無返哺之聲拔本塞源見利忘義加以結連同惡聚集羣凶當天步多艱莫展扶持之節及坤維暫絶却為僭僞之謀烈士聞之撫膺懦夫見之攘臂洎茲餘裔益奮殘妖閹豎擅權而勳賢結舌不稼不穡奢侈者何啻千門內淫外荒塗炭者巳餘萬室而更納其短見侮我大朝輒橫拒轍之臂擬舉投羅之翼我皇帝仰膺元讖再造皇圖四時順而玉燭明萬彙安而金繩正惟茲蜀土敢隔朝風連營虧恤養之恩比屋困煩苛之政每聞殘酷深所憫傷是命車徒以申弔伐步卒則矗如山列騎車則迅若雷奔振雄聲而聒動乾坤騰鋭氣而動搖河嶽彼若率兵赴死我則無陳不摧彼若據壘偷生我則無城不拔却慮高低士庶遠近封巡不早回翔終同覆滅故今曉示貴在保全應三川管內有以藩鎮降者即授之節度有以州郡降者即授之刺史有以鎮縣降者即付之主守有能見機知變誅斬僞命將帥以其藩鎮城池降者亦以其官授之如列陳交鋒之際有以萬人巳上降者授之節度五千人巳上授之大郡三千人巳上授之次郡一千人巳上授之主將有蜀城將校誅斬僞主首領降者授以方鎮如蜀主王衍首過自新以三川歸國即授方面其同謀將校當加列爵有舊在本朝文武官或負罪流落在蜀者苟能率衆歸朝一切不問大軍所行之處不得焚燒廬舍剽掠馬牛所有降人倍加安撫所罪者一人僭僞所救者萬姓瘡痍況蜀主宗枝成都父老較其罪狀良可矜寬只如僞梁挾我皇威窺吾大寶為四十年之巨寇覆十九葉之丕基昨國家平定中原只誅元惡列藩牧伯咸不替移闔境生靈一無騷擾雖蜀中遐僻亦合傳聞各宜審計變通速謀歸向據茲事件得以旌酬勿謂無言竟貽後悔故茲示諭各宜知悉
