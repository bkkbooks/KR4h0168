front:
  text: 全唐文欽定全唐文卷九百七十四闕名十五
  hash: sha256:d98f835c656e098447e6ac0e6b0873027c3dc1554c7d530815d4c838f03a9799
body:
  text: 伏見儲二未立明兩虛位纍有陳請愚誠不從陛下以郊壘多虞羌戎侵軼抑茲大典姑務安邊誠聖主憂勤謙讓之心非國家固本久遠之計易曰重明以麗乎正乃化成天下書曰一人元良萬邦以貞謹按歷代哲王守邦建國未有不先定冢嗣以叶㣥情然後修禮文緝刑政於是諸侯以秩進戎狄以義敘匕鬯以時主監撫以事明宗祀之本不可暫闕今大盜初滅先零猖狂時號艱虞人懷底定而守嫡不建繼體未孚天下喁喁實有所望陛下固辭未免億兆搖心伏願遠圖百代之謀俯遂㣥臣之請必冀四夷向化萬國歸誠伏以華陽公主輟朝又當夏至節假臣等趨事向隔旬時惶駭失圖瞻局若歲仰惟公主夙成神悟仁眷特鍾嘗禱必親已承減膳幽明遽間倍軫慈衷臣等微誠無由感達伏惟陛下守纍聖之公器御㣥生之重畜夷百戰之艱患撫四夷之傷殘虜候為虞戎師近警一言萬務裁成聖心得失謬於毫釐安危存於晷刻伏慮顧懷猶切神志未和衆情之所以不寧臣子之所宜兢悸伏願抑周喪之私痛均品物於至公下慰黔黎上安宗社天下幸甚伏以臺司奏報並有舊條昨因左巡奏疏闕已準敕科罰聞奏訖臣今檢尋條件本不該詳事須添改令可遵守伏請添一節文應諸司科決人致死雖不死而事異於常稍稍涉非理者並準前條聞奏禁城內不在此限庶得從今以後免有闕遺近日新置刺史赴官多違條限請準舊制不逾十日常參官及六品以下分司官比來淹延亦動經纍月自今以後常參官分司請敕下後二十日發其六品以下分司官請待臺牒到發限外如妄稱事故不發常參官奏聽進止六品以下官臺司舉罰兩月俸料內外六品以下官有不之任諸色事故勾留等伏以任官員數素定奉公無分有常一處闕人庶務失本法苟不舉斃恐滋深今國計所須江淮是賴江淮州縣官俸料稍厚處勾留倍多除準敕正額勒留人外有事故離任者每年須部送兩稅左藏庫行綱不知處差常務例置以官糜費因緣所害甚廣況勤勞責纍移在他人俸祿資考則為已有欲將求於致理先是察其曠官伏請起今除元有敕額勾留之司及宰相節度使幼小子弟恩例一官不之任外縱有要籍並須具事由聞奏挾名敕下即任離本官任仍當時牒報御史臺有違請免所居官并殿三選其州府長史奏聽進止三院御史盡入到朝堂從前無止泊處今請置祗候屋宇門下直省院西京兆府尹院東有官地請準長慶元年八月於中書南給官地起造請度支給錢一千貫文臺司自勾當便從便起造伏以京城囚徒準敕科決者臣當司準舊例差御史一人監決如囚稱冤即收禁聞奏便令監決御史覆勘者伏慮監決之時各懷疑憚務求省便難究寃辭恐至無告屈之人失陛下好生之理且臺司本定四推以讞疑獄六察職事已重不合分外領推伏請自今以後有囚稱寃者監察御史聞奏敕下後便配四推所冀獄無寃滯事得論理伏以國家開設庠序比要教授生徒所以日就月將知討論之不廢卜禘視學明考較之有程先生既以親臨學士豈宜他適蓋以頃者監名雖補各以私便無常且居罔離㣥則學能敬業終成孤陋誰為琢磨但希託迹為梯媒只以多年為次第罔思蟻術惟俟鶯遷忍淹違養之時徒積觀光之歲今國家化被流沙漸海政敷有截無疆大扇素風恢張至道是以重興數仞分設諸官教且有常業成無忒而況時物甚賤館舍尤多諒無懸磬之虞足待撞鐘之問但自學徒所好可以教亦隨機既欲成名必須精業如有好春秋者教之以屬辭比事三體五情尊王室而討不庭昭沮勸而起新舊其所異同者則引之以二傳也如有好禮者則教之以恭儉莊敬長幼尊卑言揖讓而知獻酬明冠昏而重喪祭其所沿革者則證之以二禮也如有好詩者則教之以溫柔敦厚辨之以草木蟲魚美盛德而刺淫昏歌風雅而察正變如有好書者則教之以疏通知遠釋之以訓誥典謨思帝德而敬王言稽古道而建皇極如有好易者則教之以潔靜精微戒之以躁動競進體十翼而分六爻應吉凶而先擬議也至於歷代子史備述變通既屬異端誠非教本但以適當凝凍將近試期欲講小經以消短景今已請尚書博士田畝講勘論語孝經行莫大於事親道莫逾於務本如有京中諸官子弟及外道舉人況四門博士趙著見講春秋若有聽人從其所欲顓俟放榜別啓諸經既溫故而知新惜寸陰而輕尺璧顓經者若能口誦碩學者又得指歸自然縻好爵以當仁策科名而得俊幸不孤於選士冀有益於化風月令云八月日月會於壽星居列宿之長五者土之數以生為大臣竊以壽者聖人之長也土者皇家之德也陛下首出壽星之次旅於土德之數示五運開元之期萬壽無疆之應請兩京各改一殿以萬壽為名至千秋節會百寮於此殿如受元之禮每至八月社日配壽星祠至於大社壇享之伏見天寶以前國館學生其數至多並有員額至永泰後西監五百五十員東監近置一百員未定每館員額今謹具定額如後伏請下禮部準額補置準建中元年敕常參官授上訖三日內上表讓一人以自代者伏以人臣拜職皆有謝章晉太尉劉實著崇讓論請因謝章便有所讓令主者掌此讓文類其被舉最多者有官闕據此選用如此則事不專於宰府材須選於衆人唐虞僉諧義實由此臣請自今常參官舉人後便選擇進具所舉人兼狀上中書門下如官闕要人先於所舉人中選擇進擬臣又聞周之㣥僕委於伯冏漢之多士辟於有司故凡稱大寮皆得進善陛下善念黎元之困設令長之科㣥寮舉知四海蒙福然薦延相繼沮勸未行苟或容私則慮害政伏請所舉縣令到任後刑罰寃濫及有贓犯者其舉薦官削階及停見任書下考夏綏銀節度使今月八日因取土修城於西北角近倉掘得釜大小共計二百五十四並容六斗以下五斗以上俱無破損如新器物者伏以人天所資粒食為本錡釜之用火化是因今大軍方興此物自出則知向時藏瘞蓋神誘其衷今之彰呈豈天有所助聖作物感一何昭然望付史館據吏部分察姚中立稱準敕考試別頭進士明經等官考功員外郎高鍇考試禮部關送到進士鄭齊之李景素兩人明經王淑等十八人並及第放榜之後㣥議沸騰職當分察不敢緘默及得高鍇狀伏以進士明經並先無格限其所送進士二人文藝並堪與及第明經比年所送不過三五人今年禮部開送十一人及考試帖義十一人並堪與及第據屯田郎中唐扶鄧州內鄉行市黃潤兩場倉督鄧琬等先主掌貞元二年湖南江南運到糙米至浙江於荒野中權造囤盛貯差鄧琬等交領除支用外六千九百四十五石多年壞爛已成灰塵準度支牒徵原主掌所由從貞元二十年以後所由鄧琬父子兄弟至元孫相承禁繫經今二十八年前後禁死九人追孫及元孫等四人見枷禁準正月九日敕文放免諸司食利錢每年別賜錢三萬貫文充諸司公用今準赦文酌量間劇率配如後準長慶三年十二月九日敕賜諸司食利本錢共八萬四千五百貫文四分收利一年祇當四萬九百九十二貫文今據赦文所賜錢三萬貫文若據舊數率配即欠一萬九百九十二貫不足今請落下徵錢驅使官每貫二百文課並更請於合給錢內四分中落一分均攤分配長慶三年得新賜錢三十二司外更有剩錢五百四貫八百文使將此錢均給東都臺省等一十四司祇用新賜錢三萬貫文並得充足諸司雖落下一分錢緣置驅使官員於人戶上徵錢皆被延引或人逃散失落常不得足雖有四分收利之名而無三分得利之實今新賜錢入日便請更無懸欠用即可足繁劇司比有官錢出放欠亦侵用本錢今既無本錢支料須足伏緣中書門下公事不同諸司恐不可落下一分及徵錢人課今請每月並舊錢添至三百貫文其御史臺頻得報牒稱本錢數多支用處廣雖有諸道贓罰公用常不充足今請每月合得利錢數外每月更添至三百貫文內侍省據自司報牒稱省內公用稍廣利錢比於諸司最多今請於合得錢外亦添至三百貫文兵部吏部尚書等銓一十一司緣有舊本錢準敕放免又有公事今請每月共與一百五十貫文并中書門下御史臺及兵吏部諸銓每年共當六千八百二十九貫六百文伏緣三萬貫文均給諸司已盡臣今於新賜外更請添賜上件錢所費不廣所利至多則內外諸司永得優足伏望聖恩允臣所奏其諸司分配賜錢若據諸司牒報見收利多少分配或以人戶逃散經恩放免見在本錢所存無幾其間有三五司自方圓致本數即稍多事例不同難於均一人吏得以欺隱實數不可交尋今請依長慶三年十二月九日均賜錢敕額分配新賜錢三萬貫事有根柢亦得均平酌量間劇皆有所據其逐日錢數多少續具子細分析聞奏據兩池榷鹽使狀應舊鹽法敕條內有事節未該及準去年赦文合再論理事件等一曰準貞元元和年敕如有姦人損壞壕籬及放火延燒捉賊不獲本令合當殿罰皆已有條制今見施行但未該地界所繇及無捉賊期限伏以鹽池提禁只仰壕籬如有放火延燒故損壞本縣分一周年內十月度同捉得五斗以上私鹽先準元和十二年六月三日敕與減一選即所酬殊寡難使盡心若必遣縣令須令賞罰相稱伏請從今以後其縣本界內若五度捉得私鹽每度捉得一斗以上兼賊同得者不限歲內歲外但數足後即與減一選如纍捉得亦請纍減減至三選即止如是別色現任正官員前官差攝縣令亦準正縣令處分如是散試官差攝縣令無選可減者亦得年五度捉得私鹽并賊同得者即請別賞見錢五十貫纍捉得亦請纍賞如兩畿令及赤縣令無選可減者在任之日但界內捉得私鹽件數與敕文相當檢勘別無異同即請申中書門下秩滿後便與依資除官如此則必心悉心奉法不失罪人其餘即請各準元敕處分一曰應捉獲越界私鹽并刮鹻盜兩池鹽賊與劫奪犯鹽囚徒頭首關連人等推勘是合抵死刑者承前並各準元敕極法處分者伏以本制鹽法束勒甚嚴近年以來稍加寬令又準會昌六年五月五日赦文靈武振武天德三城封部之內皆有良田緣無居人遂絶耕種自今以後天下囚徒各處死刑情非巨蠧者特許全生并家口配流強盜鹽賊蹤入界各許本州界一月內捉賊送使如過限不到即是私存慢易搜索未精其元敕內所罰縣令課科便請準敕文牒本州府當日據數徵剋送使又弓矢射所繇等晝夜只於池內檢巡其壕籬外面山林掩映村柵相次每有姦人興心結構必須與村人相熟乃敢下手若或無人勾致即遠賊不敢自來亦緣從來未立科條以此沿池所由都無稟束伏請從今後如有姦人損動壕籬及放火延燒并有盜竊蹤迹其地界保社所繇村正居停主人等如有自擒捉得賊每捉得賊一人推勘得實所捉人當日以官中諸色見錢一十貫文充賞如漏網及不覺察到並請追就便各決脊杖十五如推勘與賊知情即請準所犯人條例處分如是所繇及別色人等捉得亦請準前給賞其餘並請各準元敕處分一曰諸州府應捉搦販賣私鹽及刮鹻煎賊等伏請前後敕節文本界縣令如一周年內十度同捉獲私鹽五斗已上者本縣令減一選如每年如此即與纍減者伏以私鹽厚利煎竊者多巡院弓矢力微州縣人煙遼敻若非本界縣令同立隄防煎販之徒無繇止絶其縣令本界漏網私鹽據石斗各有元敕並請依舊條處分如縣令若侍本此三道者當時應緣鹽法捉獲前件賊等並是固違敕文挾持弓刀棒杖皆非殺人調致巨蠧凶惡情狀難原如或詐有生全則必欺偷轉甚別無其法可以畏之今伏請捉獲此色賊推勘得實合置極刑者並請各準奏處分以前戶部侍郎判度支盧宏正奏臣又得兩池榷茶使檢較司封郎中兼侍御史司空輿狀自領職以來披尋捉鹽條制其間有此三節須重奏論伏以鹽法條制須是嚴刑稍似寬容則姦人無懼招收榷課數闕伏望聖慈許依司空輿所請即冀私鹽杜絶榷課增加詩稱有客書載虞賓實因禪代之初必行興繼之命俾之助祭式表推恩兼垂恪敬之文別示優崇之典徵於歷代襲用舊章謹按唐朝以後魏元氏子孫韓國公為三恪以周宇文氏子孫為介國公隋朝楊氏子孫為酅國公為二王後今伏以國家受禪封唐朝子孫李從為萊國公今參詳合以介國公為三恪酅國公萊國公為二王後周知微踐楊華省獻納明廷所貢讜言深符治道蓋慮細微之物便為贓賄之名遂致刑章過行深刻須知撙節務守廉隅或是監臨之司或因公事之際凡關取與便涉阿私物若顯屬貨財並宜為贓罪其餘不是監臨不因公事不在此限應推斷科條不得有違格律二十六日明宗忌㣥臣奉慰行香固有常禮恭以陛下初遇忌辰合存降殺仰惟追感難抑孝思固於茲時不同常歲臣等商量請於忌辰前後各一日不坐禮經云禮不諱嫌名二名不偏諱注云嫌名謂音相近若禹與雨邱與區也二名不偏諱謂孔子之母名徵在言在不稱徵言徵不稱在此古禮也唐太宗二名並諱元宗二名亦同人姓與國諱音聲相近是嫌名者亦改姓氏與古禮有異廟諱平聲字即不諱餘三聲諱側聲不諱平聲字所諱字玉文及偏旁闕點畫望依令式施行深州司功參軍李自倫六世義居奉敕準格處分按格敕節文孝義旌表苟存虛濫不可褒稱必在纍世同居一門和睦尊卑有序財食無私遐邇欽承鄉閭推伏州縣親加按驗狀迹殊尤簡覆既同準令申舉方得旌表當司當本州審到鄉老呈言等自倫高祖訓訓生燦燦生財財生忠忠生自倫自倫生光厚六從弟兄同居不妄太常禮院狀申高祖十二月二十日祔饗於太廟禮畢合定逐年四季郊壇配坐準禮例逐年勘造祠祭晝日及編附令式伏請奏聞宣下者靖祖孝安皇帝配冬至祀昊天上帝殷釐務公廉以德化下獄無囚繫刑無鞭撲薪水之事不擾於民力賦輿之數不失於公程三時勸農躬行田井乾餱曝饊裹行而食一邑熙熙長幼有序流者歸復如戀父母今考秩垂滿衆情願留敢希明恩重令治任嗣宗先被百姓趙覺直論訟不公法寺定罪合徒一年半以官收贖贖銅三十斤府司尋科放訖據新除襄邑令王允升狀申稱張嗣宗不肯交割縣務稱未考滿者伏以劉昫經國才高正君志切方屬體元之運實資謀始之規宜注宸衷委司判計漸期富庶永贊聖明臣等商量望授依前中書侍郎兼吏部尚書同中書門下平章事充集賢殿大學士兼判三司散官勳封如故未審可否如蒙允許望付翰林降制處分謹録奏聞方今兵寇在興民力凋斃所望明公弼成大化彌綸紀綱舉賢任能以光庶事俾萬物各得其理百姓日用不知損不急之官杜私門之請如此則刑清俗富天下自無窮人不宜專政廟堂方行小惠昔子産以已車濟人於溱洧君子謂不知為政不如以時修橋梁惟明公察焉
