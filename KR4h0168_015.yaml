front:
  text: 全唐文欽定全唐文卷十五高宗五
  hash: sha256:6d63c97a88d8bdae82d97c64a6dfc58c80195ba1b9997783aa9b4029cb3fd11a
body:
  text: 伏承聖躬去賊城不踰百步臣魂飛膽戰莫知自處伏願思宗社之重以億兆為心收雷霆之威駐矢石之外臣之愚誠敢以死論治素無才學性不聰敏內典諸文殊未觀覽所作論序鄙拙尤繁忽見來書褒揚讚述撫躬自省慚悚交并勞師等遠臻深以為愧省表知欲晦迹巖泉追遁遠而架往託慮禪寂軌澄什以標今仰挹風徽實所欽尚朕業空學寡靡究高深然以淺識薄聞未見其可法師津梁三界汲引四生智皎心燈定凝意水非情塵之所翳豈識浪之能驚道德可居何必太華謺嶺空寂可舍豈獨少室重巒幸戢來言勿復陳請即市朝大隱不獨貴於昔賢見聞宏益更可珍於即代王地在宗枝寄深磐石幼聞詩禮夙承義訓實冀孜孜無怠漸以成德豈謂不遵軌轍踰越典章且城池作固以備不虞關鑰閉開須有常準鳩合散樂並集府僚嚴關夜開非復一度遏密之悲尚纏比屋王以此情事何遽紛紜又巡省百姓本觀風問俗遂乃驅率老幼借狗求罝志從禽之娛忽黎元之重時方農要屢出畋遊以彈彈人將為笑樂取適之方亦應多緒何必此事方得為娛晉靈虐主未可取則趙孝文趨走小人張四又倡優賤隸王親與博戲極為輕脫一府官僚何所瞻望凝寒方甚以雪埋人虐物既深何以為樂家人奴僕侮弄官人至於此事彌不可長朕以王骨肉至親不能致王於法令與王下上考以愧王心人之有過貴在能改國有憲章私恩難再興言及此慚嘆盈懷海東三國開基日久並列疆界地實犬牙近代以來遂構嫌隙戰爭交起略無寧歲遂令三韓之氓命懸刀俎尋戈肆憤朝夕相仍朕代天理物載深矜愍去歲王及高麗新羅等使並來入朝朕命釋茲讎怨更敦款穆新羅使金法敏奏書高麗百濟脣齒相依競舉兵戈侵逼交至大城重鎮并為百濟所併疆宇日蹙威力並謝乞詔百濟令歸所侵之城若不奉詔即自興兵打取但得故地即請交和朕以其言既順不可不許昔齊桓列土諸侯尚存亡國況朕萬國之主豈可不恤危藩王所兼新羅之城並宜還其本國新羅所獲百濟俘虜亦遣還王然後解患釋紛韜戈偃革百姓獲息肩之願三蕃無戰爭之勞比夫流血邊亭積尸疆場耕織並廢士女無聊豈可同年而語矣王若不從進止朕巳依法敏所請任其與王決戰亦令約束高麗不許遠相救恤高麗若不承命即令契丹諸蕃度遼澤入抄掠王可深思朕言自求多福審圖良策無貽後悔蓋聞羲皇至賾精粹止於龜文軒后通幽雅奧窮於鳥篆考丹書而索隱殊昧實際之源徵緑錯以研幾蓋非常樂之道猶且事光圖史振虞薰於八埏德洽生靈激堯波於萬代伏惟皇帝陛下轉輪垂拱而化漸雞園勝殿凝旒而神交鷲嶺總調御於徽號匪文思之所窺綜般若於綸言豈繫象之能擬由是教覃溟表咸傳八解之音訓浹寰中皆踐四禪之軌遂使三千法界盡懷生而可期百億須彌入提封而作鎮尼連德水邇帝皇之滄池舍衛庵園接上林之茂苑雖復法性空寂隨感必通真乘深妙無幽不闡所謂大權御極導法流而靡窮能仁撫運拂劫石而無盡體均具相不可思議校美前王焉可同年而語矣爰自開闡地限流沙震旦未融靈文尚隱漢王精感託夢想於元宵晉后翹誠降修多於白馬有同蠡酌豈達四海之涯取譬管窺寧窮七曜之隩洎乎皇靈遐暢威加鐵圍之表至聖發明德被金剛之際恆沙國土普襲衣冠開解脫門踐真實路龍宮梵說之偈必萃清臺猊吼貝葉之文咸歸冊府灑茲甘露普潤芽莖垂此慧雲遍霑翾走豈非歸依之勝業聖政之靈感者乎大菩薩藏經者大覺義宗之要旨也佛修此道以證無生菩薩受持咸登不退六波羅蜜關鍵所資四無量心根力斯備蓋彼岸之津涉正覺之梯航者焉貞觀中年身毒歸化越熱坂而頒朔跨懸度以輸賝文軌既同道路無壅沙門元奘振錫尋真出自玉關長驅奈苑至於天竺力士生處訪獲者經歸而奏上降詔翻譯於是畢功余以問安之暇澄心妙法之寶奉述天旨微表贊揚式命有司綴於終卷夫顯揚正教非智無以廣其文崇闡微言非賢莫能定其旨蓋真如聖教者諸法之元宗衆經之軌躅也綜括宏遠奧旨遐深極空有之精微體生滅之機要詞茂道曠尋之者不究其源文顯義幽履之者莫測其際故知聖慈所被業無善而不臻妙化所敷緣無惡而不翦開法網之綱紀宏六度之正教拯㣥有之塗炭啓三藏之祕扃是以名無翼而長飛道無根而永固道名流慶歷邃古而鎮常赴感應身經塵劫而不朽晨鐘夕梵交二音於鷲峯慧日法流轉雙輪於鹿苑排空寶蓋接翔雲而共飛莊野春林與天華而合彩伏惟皇帝陛下上元資福垂拱而治八荒德被黔黎斂袵而朝萬國恩加朽骨石室歸貝葉之文澤及昆蟲金匱流梵說之偈遂使阿耨達水通神甸之八川耆闍崛山積嵩華之翠嶺竊以法性凝寂靡歸心而不通智地元奧感懇誠而遂顯豈謂重昏之夜燭慧炬之光火宅之朝降法雨之澤於是百川異流同會於海萬區分藝總成乎實豈與湯武校其優劣堯舜比其聖德者哉元奘法師者夙懷聰令立志夷神清齠齔之年體拔浮華之世凝情定室匿迹幽巖栖息三禪巡遊十地超六塵之境獨步迦維會一乘之旨隨機化物以中華之無質尋印度之真文遠涉恆河終期滿字頻登雪嶺更獲半珠問道往還十有七載備通釋典利物為心以貞觀十九年二月六日奉敕於宏福寺翻譯聖教要文凡六百五十七部引大海之法流洗塵勞而不竭傳智燈之長焰皎幽暗而恆明自非久植勝緣何以顯揚斯旨所謂法相常住齊三光之明我皇福臻同二儀之固伏見御製衆經論序照古騰今理含金石之聲文抱風雲之潤治輒以輕塵足嶽墜露添流略舉大綱以為斯記河汾之寶山嶽之英早袪俗纍夙解塵纓緇門仰德紺宇馳聲式亞龍樹爰齊馬鳴順訪峒山鐫芳金石道光軒駕聲流姬迹矧此崇巖介通帝宅峻侔銅柱祥韜金碧飲渭南通鳴岐西格炎生肇授彤暑初融高明叶宇卜揆裁宮鳳標銜露鳥跂捫空丹溪繚繞旋一作堤樹玲瓏徑分餘雪嶺界斜虹流花縟景清籟嘶風波移控鯉雲飛御鶴沈沈松嶝萋萋蘭幕霧宿重巒寒生洞壑峯高鳥路月對林垂交藤散緑懸鏡成規鵷歸繞蕣鳳下標椅崖依注蘚池涵卷葹廣運堯心式昭夏諺端靈養白申歌祕殿菌閣流霜椒臺凝霰玉榮闕賞瑤池肆宴福壽無雙華封斯薦朕聞乾坤締構之初品物權輿之始莫不借形后土藉覆穹蒼然二曜輝天靡測盈虛之象四溟紀地豈究波瀾之極況乎法門沖寂現生不滅之前聖教牢籠示有無形之外故以道光塵劫化洽含靈者矣緬夫王宮發跡蓮披超步之花神沼騰光樹曲低空之幹演德音於鹿苑會多士於龍宮福巳罪之㣥生興將滅之人代能使下愚挹道骨碎寒林之野上哲欽風魂沈雪山之偈絲飄法雨清火宅而辭炎輪升慧日皎重昏而歸晝朕逖覽緗史詳觀道藝福崇永劫者其惟釋教歟文德皇太后憑柯瓊樹疏派璇源德照塗山道光媯汭流芬彤管彰懿則於八紘垂訓紫宮扇徽猷於萬古遽而陰精掩月永戢貞輝坤維絶紐長淪茂迹撫奩鏡而增感望陟屺而何追昔仲由興歎於千鍾虞邱致哀於三失朕之罔極實有切於終身故載懷興葺創茲金地卻背邠郊點千莊之樹錦前臨終嶽吐百仞之峯蓮左面八川水皎地而分鏡右鄰九達羽飛蓋而連雲抑天府之奧區信上京之勝地爾其雕軒架迥綺閣臨虛丹空曉烏煥日宮而泛彩素天初兔鑒月殿而澄輝薰徑秋蘭踈庭佩紫芳巖冬桂密戶叢丹燈皎繁華焰轉煙心之鶴幡標迥剎彩縈天外之虹飛陛參差含文靈而棲玉輕簾舒卷網靨宿而編珠霞班低岫之紅池泛漠煙之翠鳴佩與宵鐘合韻和風共晨梵分音豈直香積天宮遠慚輪奐閬風仙闕遙愧雕華而巳哉有元奘法師者實真如之冠冕也器宇凝邃若清風之肅長松縟思繁蔚如綺霞之輝迥漢騰今照古之智挺自生知蘊寂懷真之誠發乎齠齔孤標一代邁生遠以照前迥秀千齡架澄什而光後以為淳風替古澆俗移今悲巨夜之長昏痛微言之永翳遂乃投迹異域廣餐祕教乘杯雲漢之外振錫煙霞之表滔天巨海侵驚浪而羈遊亘地嚴霜犯淒氛而獨逝平郊散緒衣單雪嶺之風曠野低輪肌弊流沙之日遐征月路影對宵而暫雙遠邁危峯形臨朝而永隻研窮智境探賾至真心罄元津研幾祕術通昔賢之所不逮悟先典之所未聞遂得金牒東流續將斷之教寶偈西徙補巳缺之文於時眷彼靈基棲心此地宏宣奧旨葉方翠於祗林遠闢幽關波再清於定水朕所以虔誠八正肅志雙林將延景福式資冥助奉願皇太后逍遙六度神遊丹闕之前偃息四禪魂升紫極之境悲夫玉燭易往促四序於炎涼金箭難留馳六龍於晷漏恐波遷樹在夷溟海於桑田地是勢非淪高岸為幽谷於是敬刊貞石式旌真境其銘曰三光照象萬品流形人途超忽時代虛盈淳風久謝澆俗潛生愛波滔識業霧昏情猗歟調御迦維騰迹妙道乘幽元源控寂鷲峯遐峙龍宮廣闢慧日舒光慈雲吐液眷言聖教載想德音義徽往劫道冠來今騰神九域晦迹雙林漢夢如在周星遽沈悲纏奩鏡哀深棟宇濯龍潛潤椒風韜緒露葉朝侵風枝夕舉雲車一駕悠哉萬古乃興輪奐實構雕華紫棟留月紅梁藻霞雲窗散葉風沼翻花蓋低鳳偃橋側虹斜爰有慧命英氣虛沖孤標千載獨步三空給園味道雪嶺餐風智燈再朗真筌重宗四運周流六龍馳騖巨夜銷氣函關啓曙茂德徽範微塵表譽勒美彼文遐年永著朕聞金臺楃苕遰超忽崑閬之閒玉闕參差帛丿糸邈蓬瀛之際是以周王肆轍唯招既往之漢帝遐遊空益將來之弊豈如岐陽峻阜鎮茲京甸疏林光之別館建甘泉之離宮東望嵩華千林結影一作結綵西瞻隴阪派水分流南俯荼原風雲交映北臨石柱川嶽相縈迥迥孤岑秀三襲於霞表斜斜危路環九折於雲心復㵎澄陰扇炎風而變冷重巒潛暑韜夏景而翻寒故知五鎮之基空號神州之地三仙之嶺虛傳靈府之都未若翦石裁宮搆飛檐於迥漢騰虛架宇聳紫殿於遙空百仞朱樓月盈虧於青璅千尋翠閣雲舒卷於丹墀岫綴霞衣點虹梁而散錦巖飛溜帶濽石砌而飛珠浮涼氣於彤闈庭留花而雪夏凝清陰於碧沼池結鏡而冰春泉擊花潭沁雙峯而吐秀波搖錦石皎兩鏡而騰暉幾片斷雲縈松合蓋數藂幽桂捶月分香暝壑棲煙籠千崖而散碧朝原吐日輝四野而舒紅笑樹餘花低空落影吟風宿鳥響谷雙嬌鶯不恨而虛啼蝶無情而散舞朕載懷千古流鑒百王思欲屏逸收驕怡神遣慮崆峒訪道欽往哲之高風姑射尋真挹先賢之宿志所以停軒禁籞駐蹕榆川非欲賞恣盤遊途窮轍迹加以時侵首夏日帶餘春露泣修篁風清邃㵎松蘿雲起藤蔦星懸可以陶瑩心靈澄清耳目鏡冰霜則廉潔斯在撫松筠則貞操非遙昔姬后西征猶刊弇石秦王東指尚勒稽峯況勝地淹留何必華胥之國蕭然物外不假元圃之阿故以劭美千齡騰徽萬古景其前躅爰紀茲地其銘曰靈山作鎮挺秀岐陽遠圖天柱迥儷瑤房鶯嬌淑氣花泛韶光樹含冬霰巖留夏霜搆宇重巘裁基謺岫石砌披錦山窗點繡佩小蘭新峯殘蓮舊雪徑如花冰溪恆晝標途天外聳闕雲端煙霾邃谷霧宿危巒闕㵎曲回湍彤闈潛暑翠幌凝寒憩駕離宮淹留禁苑柳初睂細潭深鏡遠蓋逐雲穿苔隨雨卷葉冷帷秋莊濃闕晚泉飛嶺腹景鏤巖心霞踈錦薄草密袍深露荷傾玉風螢散金簷空䴏靜山昏日沈邱壑怡神林篁賞性千里眺覽八州澄鏡玉燭調序薰琴動詠仰則高山刊規遠映朕聞鍾山玉闕羽駕之所巡游崑嶽金臺霓衣之所翔集雖復真宗窅眇神理希微猶居三界之中未出九天之外唯有乘如廣運妙覺圓明因無生以濟有生就無象而成大象道隔去來之際筌繫靡得其端理忘動寂之機隨迎罕窺其奧得其門者如髻寶之希逢臻其極者似曇花之難遇南齊徵君明僧紹者平原人也仲雍誕其帛丿糸允井伯播其靈苗芳源肇於孟明因即以明為姓曾祖忱晉著作郎祖玩晉建威將軍鳳經流譽雅韻隆於八儒豹略申威香名高於七校父略宋平原太守中書侍郎朱明出撫揚惠化而傍霑紫誥攸司罄忠規而奉上徵君早植淨因宿苞種智悟真空於綺歲體法性於青襟照與神通心將道合遺榮軒冕少無塵雜之情託志林巖自叶幽貞之趣亭亭秀氣掩璧月而架丹霄皎皎清襟漱瓊湍而淩碧瀨即相非相指萬象為虛空無我無人等四流於寂滅加以學窮儒肆該綜典墳論極元津精通老易至若鹿野龍宮之祕猿江鶴樹之文莫不遞貫清衷總持丹府班荊坐樾獨神王於亭皋朗嘯長吟乃情超於宇宙蒲輪每至攀桂之節逾高玉帛屢陳枕石之誠彌固遂乃緬懷飛遁抗迹嶗山託岫疏階憑林結棟紉蘭製芰方輕藻火之衣爽籟風松自代管絃之響橫經者四集請益者千餘高鳳愧以韜光張超謝其成市於時南風不競東土搆屯人厭豺狼之毒家充蛇豕之餌盜仍有道望境歸仁共結盟誓之言不犯徵君之界豈非至誠攸感木石開心者乎及元歷告終青光啓祚齊高祖希風佇德側席傍求屢下徵書確乎不拔其後又移居鬱洲掩榆山栖雲精舍情親魚鳥志狎煙霞蛻影樊籠蕭然獨往齊建元元年又下詔徵為散騎侍郎又不就既而濟岱淪胥公私蕩覆稽天之浸將湮蹈海之居燎原之火欲燼藏山之璞乃鴻鶱鳳舉騰萬仞以高翔擇木選君相九土而遙集淩江迥憩遂屆南京負杖泉邱游睨林壑歷觀勝境行次攝山神谷仙巖特符心賞於是披榛剃草定跡深棲樹槿疏池有終焉之志此山其狀如繖故亦號曰繖山丹穴紅泉共星河而競瀉珠林鏡巘與月桂而交輝鳥哢巖虛猿吟㵎靜松門杳靄去來千里之雲花楥丰茸含吐十枝之日實息心之勝地乃宴坐之名區爰集法流於焉講肄音容秀徹宇量端凝投論會奇興言入妙若洪鍾之虛受有擊必揚似明鏡之忘疲無來不應於時元儒兼闡道俗同歸俱號淨名以旌至德先是山多猛噬人罕登臨升巖有仙谷之危越㵎等憑河之險徵君心不忤物總萬類以敷仁故使物乃革心屏三毒而歸惠興風斂暴遽承探鯁之恩游霧含辛自埒報珠之感於時齊道方修寤寐求賢永明元年又徵為國子博士徵君隱居求志義越乎由光不降凝心跡高於園綺鑿壞貞遁漱石忘歸鶴版載臨豹姿逾遠俄有法師僧辨承風景慕翼徒振錫翻然戾止法師業隆三藏道邁四依戒行堅明律軌嚴淨欣然一遇叶契千齡子琴為莫逆之交溫雪豈容聲之友因即鄰巖搆宇別起梵居聳嶠飛柯含風吐霧栖霞之寺由此創名福地裁基肇發初心之誓法門搆邃遽鍾後說之辰安居頃之辨師遷化六年頂拜雖開青石之壇千日威光未建紫金之嶽徵君積緣登妙至感入微嘗夢法身冠於曾巘後因垂眺屣步林亭乃有浮磬吟空寫圓音於帷樹飛香散迥騰寶氣於爐峯又覩真顏於巖之首神光駭矚若登靈鷲之山妙力難思如游瞽龍之邑豈止無垢佛國獨蔭珠雲淨德王家方承珂雪是知不行而至冥通應感之符為法而來實昭光啓之福非夫慧因宿植其孰與於此哉於是拜受嘉徵願言經始將於巖壁造大尊儀乃眷為山未遑初簣遽而西州智士與曉嶽而俱傾東國高人隨夜星而共沒瓊瑤落彩峯岫沈暉永明二年奄遷舟壑第二子臨沂公仲璋顧慕曾巒既崩心於岵望徘徊曩構更泣血於楹書遂琢彼翠屏爰開葉座捨茲碧題式建花宮上憲優填之區仰鏤能仁之像校美何充之宅遽興崇德之闈逖彼蕭宗大宏釋典文惠太子及竟陵王或澄少海之源派朝宗於法海或茂本枝之穎發萌柢於禪枝咸捨淨財光隆慧業時有沙門法度為智殿之棟梁即此舊基更興新製又造尊像十有餘龕及梁運載興鋭心回向大林精舍並事莊嚴臨川王載剖竹符宣化惟揚之境言尋奈苑興想拔茅之義以天監一十五載造無量壽像一區帶地連光合高五丈滿月之瑞湛珠鏡以出雲崖聚日之輝升璧輪而皎煙路參差四注周以鳥翅之房迢遰千尋飾以魚鱗之瓦擊鳴乾於爽籟則步影齊歸麗停午於高曦則息心攸萃逾錦城而特建掩銀界而孤標良由積慧所符大士著甚深之業用能遙誠克果永代增希有之緣以曠劫之隆因開舍生之至福偉哉壯觀無得而稱朕肅纂禎圖丕承寶歷澄九溟而有截宴八表而無為紫塞丹岑接封畿於上苑白門青野款賝贄於仙闈將使率土蒼生鎮升仁壽之域普天黔首永蹈淳古之源崇慶越於兩儀景運逾於萬劫屬以冕旒多暇物色傍求瞻江海而載懷詠林泉而興想欽風味道恨不同時古往今來撫運化而雖寂德崇業著眷神理而猶存寤寐遺塵有兼前烈瞻言勝軌歎佇唯深今故於彼度人常滿七七各兼衣鉢錢二百貫絹二百匹蘇參拾斛繡像織成像新舊翻譯一切經一藏并幡華等物憑幽尋之曩跡光顯德門託嘉遁之名區追崇仁里就福宇而延福即祥基以締祥冀緣金囿之庭近叶珠囊之耀所願通因法岸契果禪林九鼎與元極同安七廟與紫微齊固總三千之淨土並沐薰歌罄百億之恆沙長為壽算鐵圍之所苞括玉燭之所照臨常餐六氣之和俱藻一音之聽夫象以盡意意非象而不申言以會情情非言而不暢是以發揮二諦宏演四依迥託蓮花之峯遙刻芝英之字庶海桑頻變孤超弇嶽之碑城芥屢空獨跨稽岑之篆式陳茂實乃作銘云悠悠法界總總含生輪回欲海起滅身城俱安大夜共習無明愛塵嶽聚毒樹雲平其一邈矣遍知超然獨悟遽乘五演高被六度大空善說中天巧諭引彼迷途歸之覺路其二猗歟淨行育彩昆田家承圭組代著忠賢戒支宿習種智斯圓棟梁三寶薰修四禪其三爰始筮賓薜蘿攸整蹈海沈跡棲巖滅影天地搆屯干戈互警北林罔庇南轅載騁其四翻飛澤國歷考山圖言瞻碧磴自韞元珠憑峯架室枕壑通衢鱣庭廣跨馬帳宏敷其五同氣相求善鄰遙託道符久敬心均常樂對闢金園並疏銀閣谷停帝馬巒歸梵鶴其六空分瑞塔地積香臺珂月霄映珠雲旦來千光霧起七淨霞聞谷邊飛錫㵎下乘杯其七桂巘參差松亭隱靄石壇照錦瑤泉瀉籟岫接香罏峯承寶蓋翔鳧演法毒龍銷害其八梵宮既啓福海長深噬虺忘穴飛梟革音㣥生普戴奕祀同欽不有高節寧符宿心其九御扆多間聞風逖想茂軌遐劭清暉遽往佇契業於圓明冀崇緣於方廣鏤飛篆於曾嶽齊勝基於穹壤其十朕聞乾象上浮南陸啓黃離之耀坤元下闢東明敞碧題之居稽古前王憲兩儀之大則傍求列聖崇二極之丕緒所以長隆守器永茂承祧膺繼明而闕四闕萬闕藻人文以成務茂實光於載鼎嘉聲表於洊雷區分四德之規具美八繁之誡其於宏有之矣宏字宣慈高祖神堯皇帝之曾孫太宗文武聖皇帝之孫朕之元子也緬惟聖系崇高極天無以方其峻仙源渺邃浴景無以喻其深如霓表夜月之禎類馬鬱秋雲之瑞關浮紫氣開闕之闕地闕高祖屬山鳴之標運躡神嘯之屯期受大命於闕宮修闕氛於闕野太宗雲行雨施撲炎嶽而救焚架橇乘舟濡沸海而匡溺更張天地息龍戰而靜陰陽重懸神象弭麟鬬而清日月細柳盤桃之域總入提封銅標珠闕之鄉並歸正朔闕纍聖之崇基纘重光之大業幸休徵再洽景歷維新宇宙無虞環瀛有截揚玉燭而調四選品彙昭蘇握金鏡而朗八荒中外禔福自蒼昊而垂祐闕結本闕由闕而發祥闕承魏雲而育質戴玉連珠之異相發於髫初注琴銘劒之能道光於丱始年才一歲立為代王鳧嶽崇封闕景風之典象舟勝智益峻闕人之高朕以主鬯攸闕宰是命闕龜以闕春闈習禮秋籥殫藝宮之奧旨究肅成之宏義一物載行九教闕允廣延端士納審諭之良針博採正人佇宣翼之明行略詮其美闕德焉爾其至性純闕道闕承闕五起問堅切非三闕朕及天后攝衛微乖則色不滿容行不正履出青宮而視膳輟寢通宵入紫庭而扇枕纏憂永日豈止衣闕帶藥必親嘗而巳哉此其至孝也監國字人務在闕刑慎闕身後闕竊金馬而無尤祗召惟恭出銅龍而載惕此其至仁也承天奉地貽肅雍之大矩迎郊過廟極祗敬之崇儀闕獨不惰其容居暗莫移其檢同輿共帳接闕均闕之風闕橫經闕之禮闕喻其神望景揣情藏往無以論其智心融道鏡應萬象以含幾器韞元珠苞六合而凝照辨防年之訟義出㣥心驗長壽之書事惟獨察此其至明也極柱茅簷闕衣菲食戀闕以為闕朕每賜以闕佩服以承恩雅淡既隆還委襞而從好此其至儉也不邇聲色符帝乙天性之高載植踈通有顓頊沖年之量馳騁末事廾之而弗為書劒淺技能之而勿貴西苑闕遊闕林泉闕東闕之娛闕範小道恐泥不留聰於異端此其至正也七門四徹之書互窮泉極蓬府柏臺之祕遞綜真筌考闕典於叔時採德義於羊傳罷搖嶺之風樂鐘鼓六經輟闕之闕笙闕此其至闕也柔而能闕匡諷之宜政或是非潛申獻替之益朕所惡者有片善而必揚朕所好者無纎微而不舉父有諍子是之謂歟此其至直也帛丿糸瓞葭莩因心之戀巳切桂山棣屏闕之愛尤深闕輦闕遊未足闕其孔懷此其至睦也為而不恃闕柱史之妙門異而能齊體蒙叟之虛室賓實斯混語默兩忘咸英與林籟同歸衮紱與雲霞一致此其至通也迪闕衆德闕踐闕詔闕洛陳謨淩太山而開辨圖闕魚㐌去俎禮不忘於須臾釣鱉臨座文必申於造次畋遊寢跡不待燔翳之書道德立身無容設木之諫雖復謳歌未作戴啓之願闕攸歸贊闕之頌斯達朕闕山脫屨褰裳願尋真於汾水不飾情於外禪無待咨嶽之闕逸巳於中宸自申知子之授潛圖釋負未述所懷屬炎籥戒辰涼宮避暑闕因扈闕沈闕及其闕愈乃申闕性特隆一聞斯言因便感咽伏枕流欷哽絶移時重致帛丿糸留遂咸沈痼西山之藥不救東岱之魂吹湯之醫莫返逝川之命以上元闕年闕月草五日薨於闕之闕既仰謝於姬昌變髮之悲遂俯同於容俊闕不知至人無愛大道忘情雖慕延陵之通終愴卜商之感天后心纏積悼痛結深慈相鳳闕泣昔周闕言朕之至懷不欲違其心許故申舊命爰贈尊名粵以吉辰乃諡為孝敬皇帝其葬事威儀及山陵制度皆准天子之禮惟爾識自生性闕合體闕日將月就㣥方欽其麗正多士挹其宣猷愛敬極於九重光耀究於四海卑詞降東園之逸高談接南館之賓儲君之德盛焉天子之望隆矣庶其三闕茂方闕徵奄促上賓之駕興言念往震悼良深朕以其孝於承親恭於事上意欲還京卜葬冀得近侍昭陵申以奉先之禮順其既往之志但以農星在田務方殷重歸關輔恐有勞廢遂割一己之慈闕便兆人之業闕以為言故賵殮絶於珠璣明器惟資瓦木一從本志無奪宿成即以上元二年八月十九日遷窆於景山之原禮也冀樹闕陽無隔風雲之路鶴歸緱闕合之有遷刊貞珉而垂範式旌往行乃作銘云震象凝位離景騰輝地浮重海天開少微惟皇取則利建儲闈承祧是寄主鬯攸歸其一運啓昌圖祚隆先聖丹霧流闕慶闕正其二研幾道闕發慮闕津戈臨春序籥奏春秋旻商巖佇逸望苑通賓考藝方遠宣猷日新其三禮茂承顏闕融錫類愛敬兼極君親一致闕義重闕情至性闕其四闕優游四德績劭撫軍譽宣監國便坐垂範寢門貽則量湛用沖化敷元默其五虛佇丞凝崇奉師保望行辨牘臨渦闕藻讓闕宮闕逾闕道闕德斯闕為寶其六闕楹闕靜愈鳴葭締游䴏廚斯啓魚㐌俎弗羞恭行一物澄汰九流其七緬惟釋重載追前懿爰念少陽將推大位純孝深感聞言哽泗闕命未申闕其八玉闕彩珠沈夜光未闕泣元圃風悲畫堂感今興悼念昔增傷其九崇諡追尊鴻名贈冊伊洛疏兆嵩環卜宅隧擬橋巖塋圖畢陌霧凝平楚煙生竹柏其十原隰闕仙殿闕飛鳳碑空篆鶴駕無追其十一朕聞四維紀地坤元所以載物八柱承天乾策由其列耀故軒邱御歷資六相以經綸豐水膺圖憑九臣而締搆莫不道符金礪契叶鹽梅虎嘯龍騰風翔雲起公名績字懋功闕一字州衛闕四十一字祖康齊伏波將軍譙郡太守追贈濟州刺史父蓋散騎常侍陵州刺史上柱國濟陰郡王後固辭闕一字改封舒國公贈潭州都督業傳弓冶代列簪裾載德象賢闕一字光惇史闕三十九字英闕一字年甫十七屬隋運分崩於時率土沸騰㣥方競逐黃龍白騎㸦動干戈丹浦緑林遞興氛祲家負吞沙之力人懷鍊石之心李密據大洛以稱兵臨二周而闕一字濟公權推盟主暫闕八字之闕三字高祖神堯皇帝應昊穹而撥亂順斗極以龔行四海樂推兆人思戴及密來投附公獨未歸既承其旨方奉皇運誠於所事造次必形風霜之節其在茲矣高祖乃詔公為黎州總管上柱國萊國公尋改青曹公賜同國氏公臨危守義類文聘之懷忠建策承恩同奉春之得姓武德二年又授右武大將軍是時國步未夷王塗尚梗太宗文武聖皇帝愍茲交闕一字大拯橫流公出贊元戎入參神算受分麾之重寄沐賜戶戈木之殊榮劉武周率彼犬羊憑陵汾晉先朝躬親矢石公則任屬偏裨蕭斧才臨朝闕一字俄翦闕一字充竇德潛議合從南瀕控鶴之山北距飛狐之塞擁周韓之鋭卒驅趙魏之梟兵自謂力動天關威回地軸闕二字營闕二字月闕三十一字徐員朗虔劉齊地南征北伐並效深功憬彼胸奴自昔為患乘折膠而犯鄣侯滿月而來侵朔騎騁於唐郊胡笳沸於汾隰簸林搖嶽噴野騰川烽火照於闕一字中羽檄飛於闕一字下公出車闕三十二字豪之逢巨燎彌山抑室似危葉之遇衝飇滅跡掃塵追奔逐北乃加食封九百戶參墟奧壤闕一字迹所基傍控寶符之鄉近對金庭之域眷言樞要綏撫特難鎮俗威邊闕三十七字浮革船而度闕一字河窮闕一字海而傾巢闕一字狼臺以闕一字穴遂使地空塞北靜漠南漢將勒燕然之銘胡騎動陰山之闕一字既而頻丁巨罰殆不勝哀纍詔寬解敦還闕二十六字先聖承間曲垂談宴緒言之際以朕託公便即齧指流血銘肌為記忠貞之操振古闕一字倚金石之心唯公而巳改封英國公授兵部尚書尋授特進太子詹事左衛率闕三字九年授闕二字道行軍大總管闕七字先朝東征大破駐蹕尋授靈州道安撫大使破延陀於烏德鞬山又授太常卿出為謺州都督尋除特進檢校闕一字州刺史朕纂承丕緒延想舊勳又授公開府儀同三司尚書左僕射闕二十一字以闕十字授職勳賢異宜踐位未淹遽申闕一字讓朕成公之美權遂謙光尋拜司空用旌闕一字德傍敷九土上穆三台聿膺元武之符載調黃鼎之飪彞倫式敘庶績其凝乃將有事闕二字以公為闕二十二字先朝親行弔伐雲衝萬道天兵四臨闕一字醜徒於握中置凶㣥於几上但聖心惻隱不忍坑夷賜以重生返其歸路猶復收合餘燼背義忘恩莫念解網之仁還興舉斧之逆朕恭惟往志情切授柯思清隧穴之祅誓雪園陵之憤昔王翦舊將方吞南楚之強充國老臣始定西羌之孽立功立事耆德是憑故勞公暮年出征外域乃以公為遼東道安撫大使行軍大總管韞玉闕一字之宏闕四字之妙闕二十八字一縱閒諜以知窮因鄉導而乘隟殄茲寇壘不藉九攻之勞獲彼凶渠唯恃七擒之術傾源拔奔海罄山空萬代逋誅一朝清蕩及旋拜太子太師闕一字封二百戶公自少及長闕一字身奉國闕三十一字上藥名醫相望道路曰仁必壽竟爽神期天不憗遺殲我良懿以總章二年十二月三日薨於私第春秋七十有六朕闕一字車軫慟去籥興哀爰命闕一字寮廢朝七日闕一字宜闕三字相鄭闕三十字給以咸亨元年二月六日陪葬昭陵所築之墳一准衛霍故事象烏德鞬山及陰山鐵山等以旌破北狄東夷之功焉其遷葬之晨朕自至橫門投書永訣穿壁疹不救鶴板之災登城闕一字泣徒深蟻闕一字之感闕三十字朋則虛舟靡逆行己則暗室無欺晦雨不革其音疾風闕一字知其徑奉親思孝遽彰懷橘之誠事上資恭無待觀闕一字之誡孫吳藝術弗學而生知管樂才闕三字而斯闕三十二字替之言外不彰其直入盡弼諧之致出不顯其忠就禮俗而存道因善謔而申諷抵掌宏議庶政咸仗其謀造膝詭詞㣥寮莫知其際夷險一致寵辱不驚闕六字之闕六字之闕二十字之懼其為吏也嚴而不殘其為將也威而能愛子顏之方敵國在昔多慙道濟之比長城於今為劣朕以公桑榆昃景力謝年侵欲令諸子仕闕一字得闕三十五字餘生懷此知足加以卜居閒宇唯欣里宅之卑列壤疏封獨尚寢邱之儉豈非業光三傑譽重二南為社稷之元勳實期運之隆棟公材公望有始有終闕三十七字逝何痛如之徂光倏而不留宰樹森其成列恐栒邑之地竟淪彩於雕戈庶武昌之原永傳輝於翠玉式旌遺懿乃勒銘云惟皇建極惟臣佐功吟嘯元感卜夢潛通如鱗縱壑若羽隨風弼諧天構光亨棟隆其一爰有傑人胄承華緒德闕一字殆庶道光性與情希管樂器侔伊呂闕一字物闕六字其二闕三十一字泉其三金石齊貞松筠表徑攝下唯闕一字基身以正賜厚分驂恩隆得姓燮和師律抑揚辭令其四營開偃月斾闕一字連雲下江澄靄平林散氛元池妙略黃石崇勳威橫百戰勇冠三軍其五闕二十八字慎同溫室其六出車青徼申謀絳宮駕狄攻狄驅戎伐戎鯨銷海晏蜃闕一字樓空永殪逋藪長清大風其七締構邦基經綸國步戒盈辭滿鳴謙履素克壯其猷闕二字歲暮凜闕一字奇節溫溫闕二字其八闕二十四字竭誠戴主傾身奉國其九負山潛遠夢瓊興愴階裂下台星沈上將朝悲野泣投環輟相晉原長往吳閶徒望其十三河聚騎五校陳兵旌軒委鬱笳挽淒清沈沈闕二字寂寂闕十字其十一闕十四字峴首墳象闕一字山樹疑營柳人謠國頌天長地久其十二嗣天子臣治敢昭告於昊天上帝有隋位極顛危天數窮否生靈塗炭鼎祚淪亡高祖仗黃鉞而救黎元錫元圭而拯沈溺太宗功宏鍊石定區宇於再麾業比斷鼇飲滄溟而一息臣忝奉餘緒承威積慶遂得崑山寢燎炎海韜波雖業茂宗祧實降靈穹昊今謹告成東嶽歸功上元大寶克隆鴻基永固凝薰萬姓陶化八紘維乾封元年歲次景寅二月戊戌朔二日己亥皇帝遣司稼正卿扶餘隆以少牢之奠致祭先聖孔宣父之靈惟神玉鈎陳貺靈開四肘之源金鼐流禎慶傳三命之範神資越誕授山嶽以騰英天縱攸高蘊河海而標狀折衷六藝宣創九流睿乃生知靈非外獎於是考三古褒一言刊典謨定風什莊敬之容畢備鐘鼓之音載和父子爰親君臣以穆蕩乎煥乎樂正雅頌各得其所可不謂至聖矣夫朕以涼德嗣膺神器式崇祗配展義云亭感周禮之尚存悲素王之獨往杼軸洙泗如挹清瀾留連舞雩似聞金奏昌門曳練徒有生芻之疑漢曲移舟非復祥蓱之實慨然不巳爰贈太師堂宇卑陋仍命修造褒聖子孫合門勿事庶能不遺百代助損益之可知永鑑千年同比肩而為友聿陳菲奠用旌無朽梅曙霞梁松春月牖德音暢而無斁形神忽其將久儻弗沫於生前亦知榮於身後尚饗使至得所進枇杷子良深慰悅嘉果珍味獨冠時新但川路既遙無勞更送今者梅炎藻夏麥氣迎秋香飄蘭坂之風鏡轉桂巖之月為善之暇想足怡神延望白雲載深離緒聊疏緑字此不多申咨叔藝韞多材慈深善誨藹夙奉趨庭之訓早擅臨池之工聞其比來復愛飛白昨故戲操翰墨聊以示藹慚六文之麗則異五際之芳詞忽枉來書談飾過實顧惟菲迹非敢當仁披覽循環祗以增愧故斯表意餘不多云咨
