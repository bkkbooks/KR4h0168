front:
  text: 全唐文欽定全唐文卷九百四十五周氏番陽曹因妻
  hash: sha256:88f2a31dd0fbe0c8e6ba9e67b8b2dbcc7f25c6398dc6bd898933b3ffbdc4c219
  markers:
  - {type: head, offset: 14, content: 周氏, id: KR4h0168_NFKB_945-h1, level: 1}
body:
  text: 君姓曹名因字鄙夫世為番陽人祖父皆仕於唐高祖之朝惟公三舉不第居家以禮義自守及卒於長安之道朝廷公卿鄉鄰耆舊無不太息惟豫獨不然謂其母曰家有南畝足以養其親室有遺文足以訓其子肖形天地間範圍陰陽內死生聚散特世態耳何憂喜之有哉豫姓周氏公之妻室也歸公八載恩義有專故贈之銘曰其生也天其死也天苟達此理哀復何言應真牛肅長女適宏農楊唐源著有遺芳集庚辰歲子嬰沈痼之疾不起者十旬毀頓精神羸悴形體藥物救療有加而無瘳感莊子有魍魎責影之義故假之為賦庶解疾焉魍魎問於豫影曰君英達之人聰明之子學包六藝文兼百氏賾道家之祕言探釋部之幽旨既虔恭於中饋又希慕於前史不矯性以干名不毀物而成已伊淑德之如此良精神之足恃何故羸厥姿貌沮其精神煩寃枕席憔悴衣巾子惟形兮是寄形與子兮相親何不誨之以崇德而教之以自倫異萊妻之樂道殊鴻婦之安貧豈痼疾而無生賴將微賤而欲忘身今節變歲移臘終春首照晴光於郊甸動暄氣於梅柳水解凍而繞軒風扇和而入牖固可蠲憂釋疾怡神養壽何默爾無營自貽伊咎僕於是乃勃然而應曰子居於無人之域遊乎魑魅之鄉形既圖於夏鼎名又著於蒙莊何所見之非博何所談之不長夫影依日而生像人而見豈言談之足曉何節物之能辨隨晦明以興滅逐形骸以遷變以愚夫畏影而蒙鄙之性以彰智者視陰而遲暮之心可見伊美惡兮由已影何辜而遇譴且豫聞至道之精窈兮冥至道之極昏而默達人委性命之修短君子任時運之通塞悔吝不能廠田坴榮曜不能惑喪之不以為喪得之不以為得君子何乃怒豫之不賞芳春責豫之不貴華飾且吾之秉操奚子智之能測言未卒魍魎惕然而驚歘爾而起曰僕生於絶域之外長於荒遐之境未曉智者之處身是以造君而問影既談元之至妙請終身以藏屏君徽字文姬鮑徵君女善詩德宗嘗召入宮與宋若昭姊妹齊名每賡和賞賚甚厚臣以草茅嫠婦重荷寵恩自謂生有餘幸矣獨念妾也幼鮮昆季長失椿庭室無雞黍之餐尚有垂白之母衷情迫切臣不啻隱忍方慮控訴無門焉茲者幸遇聖明詔臣吟詠一入御庭百有餘日弄文舞字上既以洽明聖之歡心搦管揮毫下既以倡諸臣之賡和惟是㷀然老母置諸不問豈為子女者恝然若是耶臣一思維寸腸百結伏願陛下開莫大之宏恩聽愚臣之片牘得賜歸家以供甘旨則老母一日之餘生即陛下一日之恩賜也臣不揣愚昧冒死以進溫氏李雍妻妾溫氏言雍效職不謹狀涉貪狼逼迫囹圄獲罪以聞誠宜不待刑書便當殞滅然事有所隱恐負明時天地敻遠號訴不敢倉卒之際分從嚴誅豈謂天鑒仁明雍得生竄荒外再造之幸上答何階死罪死罪雍少習文章薄竊時譽疾惡如讎往任拾遺奏張昌宗之黨後參憲府劾武三思之罪坐此為纍不容於衆秉邪佞者切齒攻文章者側目由是頻謫遠郡削跡朝端不見闕庭何啻十載歲時凝戀聞者傷懷屬國家有事東嶽大禮告成法駕西旋路遊近境普遵牛酒之獻各展臣子之心不意天澤曲垂恩私屬沐雍當再躍何以為心懇至夙誠冀遂申效妾聞正直見用邪佞生憂雍之禍端自此為始且雍比任外官竟無一議天顏暫顧罪則旋生諺云士無賢不肖入朝見嫉伏惟陛下明察此言妾之微軀萬死無恨死罪死罪雍初蒙勘當即便禁身水不入口向逾五日孤直援寡邪黨相趨窘急至深實不堪忍氣微息奄惟命是聽遣雍手書事生吏口貸百姓蠶糧抑稱枉法市羅以進令作贓私吏以為能寄此加罪當時匭使朝堂潛皆守捉號天訴地誰肯為聞嚴命將行恭往奔逐泣血去國沒骨炎荒長任欽州示以無用願雍充一卒之用效力明時膏塗朔邊骨糞沙壤使得身死王事成雍夙心妾則碎首粉身萬死為足妾夫婦義重常見其志不避罪責冒死上聞儻天光垂照即當殞滅妾之榮幸實荷再生謹奉表投延恩匭元真越王貞之元女孫曾祖珍於先天中得罪配流嶺南元真祖父皆亡歿嶺外雖經恩赦而未昭雪元真進狀請歸葬越王墓次詔許之即敕於咸宜觀安置為女道士曾祖名珍是越王第六男先天年得罪流配嶺南祖父皆亡歿嶺外雖纍蒙洗雪未還京師去開成三年十二月內嶺南節度使盧均出俸錢接借哀妾三代旅櫬暴露各在一方特與發遣歸就大塋合祔今護四喪已到長安旅店權下未委故越王墳所在伏乞天恩允妾所奏許歸大塋妾年已六十三孤露家貧更無所依倚鄭氏侯莫陳邈妻妾聞天地之性貴剛柔焉夫婦之道重禮義焉仁義禮智信者是謂五常五常之教其來遠矣總而為主實在孝乎夫孝者感鬼神動天地精神至貫無所不達蓋以夫婦之道人倫之始考其得失非細務也易著乾坤則陰陽之制有別禮標羔雁則伉儷之事實陳妾每覽先聖垂言觀前賢行事未嘗不撫躬三復歎息久乏欲緬想餘芳遺蹤可躅妾姪女特蒙天恩策為永王以少長閨闈未嫺詩禮至於經誥觸事面墻夙夜憂惶戰懼交集今戒以為婦之道申以執經之禮並述經史正義無復載乎浮詞總一十八章各為篇目名曰女孝經上至皇后下及庶人不行孝而成名者未之聞也妾不敢自專因以曹大家為主雖不足藏諸巖石亦可以少補閨庭輒不揆量敢茲聞達輕觸屏扆伏待罪戾妾鄭氏誠惶誠恐死罪死罪謹言愔號見素子居太白山注黃庭內景圖一卷夫天主陽食人以五氣地主陰食人以五味氣味相感結為五臟五臟之氣散為四肢十六部三百六十關節引為筋脈津液血髓蘊成六腑三膲十二經通為九竅故五臟者為人形之主一臟損則病生五臟損則神滅故五臟者神明魂魄志精之所居也每臟各有所主是以心主神肺主魄肝主魂脾主意腎主志發於外則上應五星下應五嶽皆模範天地稟象日月觸類而取不可勝言若能存神修養克己勵志其道成矣然後五臟堅強則內受腥腐諸毒不能侵外遭疾病諸氣不能損聰明純粹卻老延年志高神仙形無困疲日月精光來附我身四時六氣來合我體入變化之道通神明之理把握陰陽呼吸精神造物者翻為我所制至此之時不假金丹玉液琅玕大還自然神化沖虛氣合太和而升雲漢五臟之氣結五雲而入天中左召陽神六甲右呼陰神六丁千變萬化馭飛輪而適意是以不悟者勞苦外求實非知生之道是故太上曰精是吾神氣是吾道藏精養氣保守堅貞陰陽交會以立其形是也愔夙性不敏幼慕元門鍊志無為棲心淡泊覽黃庭之妙理窮碧簡之遺文焦心研精屢更歲月伏見舊圖奧密津路幽深詞理既元賾之者鮮指以色象或略記神名諸氏纂修異端斯起遂使後學之輩罕得其門差之毫謬逾千里今敢搜羅管見罄竭謏聞按據諸經別為圖式先明臟腑次說修行并引病源吐納徐疾旁羅藥理導引屈伸察色尋證月禁食忌庶使後來學者披圖而六情可見開經而萬品昭然時大中二年戊辰歲述楊氏宏農人宰相王搏妻著女誡一卷豫有令子儉衣削食以紀先功志刊貞石彼蒼不遺俾善莫隆今豫建立痛寃無窮
