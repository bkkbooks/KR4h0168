front:
  text: 全唐文欽定全唐文卷一百二梁太祖二
  hash: sha256:2e46a9dc30c035e2ee5dbc9478cce263ac59d8cd79228c4954ae961e6d994259
body:
  text: 朕以干戈尚熾華夏未寧宜循卑菲之言用致雍熙之化起八月一日常朝不御金鑾崇勳兩殿只於便殿聽政建國之初用兵未罷諸道章表皆繫軍機不欲滯留用防緩急其諸道所有軍事申奏宜令至右銀臺門委客省畫時引進諸道公事即依前四方館準例收接所在長吏放雜差役兩稅外不得妄有科配自今後州縣府鎮凡使命經過若不執敕文券並不得妄差人驢及取索一物巳上又今歲秋田皆期大稔仰所在切加條流本分納稅及加耗外勿令更有科索切戒所繇人更不得於鄉村乞託擾人公事難於稽遲居處悉皆遙遠其逐日當直中書舍人及吏部司封知印郎官少府監及篆印文兼書寫告身人吏等並宜輪次於中書側近宿止魏博管內刺史比來州務並委督郵遂使曹官擅其威權州牧同於間冗俾循通制宜塞異端並宜依河南諸州例刺史得以專達司門過所先是司門郎中員外郎出給今以寇盜未平恐漏姦詐令宰臣趙光逢專判凡諸給過所先具狀經中書點判下即本判郎官據狀出給許昌雄鎮太保韓建朕用之布政民耕盜止久居其位庶可勝殘矣宜令中書門下不計年月勿議替移食人之食者憂人之事況丞相尊位參決大政而堂封未給且無餐錢朕甚愧之宜令日食萬錢之半今載春寒頗甚雨澤仍愆司天監占以夏秋必多霖潦宜令所在郡縣告喻百姓備淫雨之患近者星辰違度式在修禳宜令兩京及宋魏州取此月至五月禁斷屠宰仍各於佛寺開建道場以迎福應國之重典祀事為先監察御史本虞不恪今則衆官晨興已到御史日晏方來既紊國章難虧朝典其鄭觀宜停見任切慮德以朕至亠兊州行營津置內人承侍緣諸軍在野不可自安令鄭仁誨專心體如德津置內人東來便須上聞約住或取索鞍馬不得供應如意堅確即以手敕示之乃者有唐告終王政日紊婦寺亂常於內蠻貊犯順於邊列鎮張膽而相攻大臣捫心而無措惟思家族遑恤朝廷朕起自兵戎歷階節度憂皇天之不弔閔黎庶之倒懸誓衆興師為民請命東征西怨共徯我后來蘇簞食壺漿咸若厥角墜地竟以數州之力大翦諸國之鋒歷試諸艱遂叨九錫稽舜禹之禪法隋唐之敕天步多艱人情習亂因商民之思紂嗾桀犬以吠堯職具不共何所不至咨爾上柱國吳越王錢鏐山川育秀二五儲精以不世出之才行大有為之主納交伯府翼戴中朝靖淮甸之邪氛不得紊我王氣斬羅平之妖鳥不得鳴我王郊逮乎受禪之初首遣宣諭之使頗知天命不效狂謀匪兼二國之封曷奬尊王之義今遣使金紫光祿大夫尚書上柱國姚洎使副尚書禮部主客員外羅衮持節備禮胙土分茅册爾為吳越國王嗚呼車徒萬乘何戎狄之不可膺節制三方何強梁之不可伏矧百粵夏后駐蹕之地三吳泰伯肇封之疆句踐用之以親周夫差因之而駕晉方賴率三軍而挺荊楚糾列國以平淮戎允為東海屏藩永保中原重鎮毋姑息以敗事毋誇大以隳功欽哉其聽朕命臣獨兼四鎮逮事兩朝分數千里之封疆受二十年之恩渥微同物類猶解感知忝齒人倫寧忘報效臣昨將兵士奔赴闕庭尋過京畿遠迎車駕初因幕吏面奉德音尋有宰臣頻飛密札或以京都紛擾委制置於中朝或以鑾輅播遷俾奉迎於近甸臣是以遠離藩鎮不憚疲勞昨奉詔書兼宣口敕令臣速抽兵士且歸本藩仍遣百官俾赴行在覩綸言於鳳紙若面丹墀認御札於龍衣如親翠蓋然知從來書詔出自宰臣每降宣傳皆非聖旨致臣誤將師旅遽入關畿比令迎駕之行翻挂脅君之過臣今見與茂貞要約釋兩地猜嫌早致萬乘歸京以副八紘懇望其宰臣百官已下非臣輒有阻留伏乞詔赴行朝以備還駕今月二十日得襄王偽詔及朱玫文字云田令孜脅遷鑾駕播越梁洋行至半塗六軍變擾遂至倉皇而晏駕不知弒逆者何人永念丕基不可無主昨四鎮藩后推朕纂承巳於正殿受册畢改元大赦者李熅出自贅疣名汙藩邸智昏菽麥識昧機權李符虜之以塞辭朱玫賣之以為利呂不韋之奇貨可見姦邪蕭世誠之土囊期於匪夕近者當道徑差健步奉表起居行朝現駐巴梁宿衛比無騷動而朱玫脅其孤騃自號台衡敢首亂階明言晏駕熒惑藩鎮陵弱廟朝闕夫唐虞致治遵禪讓之明文湯武開基允人神之至願必有神器是膺皇圖況古今迭代之期英傑興隆之數莫不上關天命下順人心啓王霸之宏基為子孫之大計咸遵軌轍並載編且念與皇帝八兄頃在前朝各封異姓土茅分裂皆超將相之尊魚鴈往來久約弟兄之契歡盟甚固功業相推俄隔絶於音塵止因緣於間諜以至時衰土德運應金行雖手足胼胝粗平多難而星辰符瑞謬付厥躬當百辟之羣情極四方之積患爰都河洛用答乾坤尋聞皇帝八兄奄有西陲盡朝三蜀別尊位號復統高深一時皆賀於推崇兩國願通於情好徵曹劉之往制各有君臣追楚漢之前蹤嘗分疆宇所冀同清夷夏俱活生靈載籍具存恢張無爽去歲密聞風旨遐慰寤思憤岐隴之猖狂逼褒斜之封徼欲資牽制用速掃除遂委永平軍節度使劉鄩特遣行人先道深意旋巳徑差精甲將擊妖巢合數鎮之驍雄鼓六師之威勢尋聞退遁殆至滅亡允諧犄角之謀尤得輔車之利近併覽同華奏報皆進呈褒祥書題具悉事機良多歎沃今專馳卿列備達衷懷重論金石之交別卜塤篪之分山河共永日月長懸瞻佇好音言不盡意今遣光祿卿盧玭閣門副使少府少監李元聊馳書幣專戒道途兼有微禮具在別幅謹白馬一十匹紅纓絡子鞍幞各一事計紅耳叱馬發馬一匹金玉閙裝四垂鞍轡一副紫叱馬發馬一匹白玉裝鞍轡一副白驄馬一匹金鍍閙裝鞍轡一副烏叱馬發馬一匹金鍍龍鳳五垂銀鞍轡一副烏叱馬發馬一匹金鍍銀閙裝鞍轡一副白驄馬一匹金鍍銀閙裝鞍轡一副青叱馬發馬一匹裏花五垂銀鞍轡一副青叱馬發馬一匹陷金玉五垂鞍轡一副騮叱馬發馬一匹金鍍閙裝五垂銀鞍轡一副紅耳叱馬發馬一匹金鍍五垂閙裝銀鞍轡一副又玉犀腰帶雜物等計黃排方王弗琳腰帶一條頭尾順鉠十二事通牡丹犀排方腰帶一條頭尾順鉠十二事金香一十斤麝香五十劑犀一十株琥珀二十斤玳瑁二百斤金稜琉璃碗十隻銀稜祕色䤬鑼二面金花銀裝廚子一對金花渾銀裹龍鳳儀注槍四條并鞘子犛牛紅拂子全金花銀裹龍鳳儀注槍四十條綾袋盛金銅甲二副并副膊兜鍪全又藥物十三位計茯苓一十斤茯神一十斤酸棗仁五十斤玉鹽五斤新羅人參一十斤牛膝一十斤枳殼一十斤五味子五斤赤箭一十斤鹿茸一十對顆棗一千枚羚羊角五對牛黃一百銖右件藥物等或來從燕市或貢自炎方或馨香能助於薰爐或華妙可資於寶玩光涵星斗藥有君臣願伸兩國之情重固千年之約愧非縟禮粗達深衷特希檢留幸甚謹白朕今天下皆平惟有太原未服卿能長驅精甲徑至新莊為我翦彼仇讎與爾便行封册帝諱瑱初名友貞太祖第四子唐文德元年生開平元年封均王乾化三年二月即位改名鍠末年改今名在位十一年年三十六朕仰膺天眷近雪家讎旋聞將相之謀請紹祖宗之業羣情見迫三讓莫從祗受推崇懼不負荷方欲蒸嘗寢廟禋類郊丘聿徵定體之辭用表事神之敬其或於文尚淺在理未周亦冀隨時別圖制義雖臣子行孝重更名於已孤而君父稱尊貴難知而易避今則虔遵古典詳考前聞允諧龜筮之占庶合帝王之道載惟涼德尤愧嘉名中外羣寮當體朕意宜改名鍠王者愛育萬方慈養百姓恨不驅之以仁壽撫之以淳和而炎黃有戰伐之師堯舜有干戈之用諒不獲已其猶病諸然則去害除妖興兵動衆殺黑龍而濟中土刑白馬而誓諸侯終能永逸暫勞以至同文共軌古今無異方册具存朕以眇末之身託億兆之上四海未乂八年於茲業業兢兢日慎一日雖踰山越海肅慎方來而召雨徵風蚩尤尚在顧茲殘孽勞我大邦將士久於戰征黎庶疲於力役本年木牛暫息則師人有不爨之憂流馬盡行則丁壯有無聊之苦況青春告謝朱夏已臨妨我農時迫我戎事永言大計思致小康宜覃在宥之恩稍示殷憂之旨用兵之地賦役實煩不有蠲除何使存濟除兩京已放免外應宋亳輝潁鄆齊棣滑鄭濮沂密青登萊淄陳許均房襄鄧沁隨陜華雍晉絳懷汝商等三十二州應欠貞明四年已前夏秋兩稅并鄆齊滑濮襄晉輝等七州兼欠貞明四年巳前營田課利物色等並委租庸使逐州據其名額數目矜放所在官吏不得淹停制命徵督下民致恩澤不及於鄉閭租稅虛捐於帳籍其有私放遠年債負生利過倍自違格條所在州縣不在更與徵理之限亠兊州城內自張守進違背朝廷結連蕃寇久勞攻討頗困生靈言念傷殘尋加給復應天下見禁罪人犯大辟合抵極刑者宜示好生特令減死除準格律常赦不原外徒流以下遞減一等左降官未經量移者與量移已量移者更與復資我國家賞功罰罪必叶朝章報德伸冤敢欺天道苟顯違於法制雖暫滯於歲時終振大綱須歸至理重念太祖皇帝嘗開霸府有事四方逮建皇朝載遷都邑每以主留重務居守難才慎擇親賢方膺寄任故博王友文才兼文武識達古今俾分憂於在浚之郊亦共理於興王之地一心無易二紀於茲嘗施惠於士民實有勞於家國去歲郢王友圭嘗懷逆節已露凶鋒將不利於君親欲竊窺於神器此際值先皇寢疾大漸日臻博王乃密上封章請嚴宮禁因以萊州刺史授於郢王友圭才覩宣頭俄行大逆豈有自縱兵於內殿卻翻事於東都又矯詔書枉加刑戮仍奪博王封爵又改姓名冤恥兩深誑欺何極伏賴上元垂祐宗社降靈俾中外以叶謀致遐邇之共怒尋平內難獲勦元凶既雪恥於同天且免譏於共國朕方期遁世敢竊臨人遽迫推崇爰膺纘嗣冤憤既伸於幽顯霈澤宜及於下泉博王宜卻復官爵仍令有司擇日歸葬太祖皇帝六月二日大忌朕聞姬周已還並用通喪之禮炎漢之後方行易月之儀歷代相沿萬幾斯重遂為故實難遽改更朕頃遘家冤近平內難倏臨祥制俯迫忌辰音容永遠而莫追號感彌深而難抑將欲表宅憂於中禁是宜輟聽政於外朝雖異常儀願申罔極宜輟五月二十二日至六月二十九日朝參軍機急切公事即不得留滯並仰畫時聞奏施行朕聞禮非天降固可酌於人情事繫孝思諒無妨於國體今以甫臨忌日暫輟視朝冀全哀戚之情用表始終之節宰臣等纍陳章表備述古今慮以萬幾之繁議以五日之請雖茲懇切難盡允俞況保身方荷於洪基敢言過毀而權制獲申於至性必在得中宜自今月二十九日輟至六月七日無煩抑請深體朕懷分疆裂土雖賞勳勞建節屯師亦從機便比者魏博一鎮巡屬六州為河朔之大藩實國家之巨屏所分憂寄允謂重難將叶事機須期通濟但緣鎮定賊境最為魏博親鄰其次相衛兩州皆控澤潞山口兩道並連於晉土分頭常寇於魏封既須日有枝梧未若俱分節制免勞兵力困奔命於兩途稍泰人心俾安居於終日其相州宜建節為昭德軍以澶衛兩州為屬郡以張筠為相州節度使魏博寇敵接連封疆懸遠凡於應赴須在師徒是以別建節旄各令捍禦并鎮則委魏博控制澤潞則遣相衛枝梧咸遂便安貴均勞逸已定不移之制宜從畫一之規至於征伐事權亦無定例且臨清王領鎮之日羅紹威守藩以來所領事銜本無招討祗自楊師厚先除陜滑二帥皆以招討兼權因茲帶過鄴中原本不曾落下苟循事體寧吝施行況今劉鄩指鎮定出征康懷英往邠岐進討祗令統率師旅亦無招討使銜切宜遍諭羣情勿興浮議倚注之意卿宜體之閫外之事全付將軍河朔諸州一旦淪沒勞師弊旅患難日滋退保河壖久無鬬志昨東面諸侯奏章來上皆言倉儲已竭飛挽不充于役之人每遭擒虜夙宵軫念惕懼盈懷將軍與國同休當思良畫如聞寇敵兵數不多宜設機權以時翦撲則豫之負荷無纍先人行營諸軍馬步都虞候匡國軍節度觀察留後朱圭昨以寇戎未滅兵革方嚴所期朝夕之間克弭煙塵之患每於將帥別注憂勞而謝彥章孟審澄侯溫裕忽搆異圖將萌逆節賴朱圭挺施貞節密運沈機果致梟擒免資讎敵特加異殊之命用旌忠孝之謀便委雄藩俾荷隆渥可檢校太傅充平盧軍節度淄青登萊等州觀察處置押新羅渤海兩蕃等使兼行營諸軍馬步軍副都指揮使仍進封沛國郡開國侯應文武朝官或有替罷多年漂流在外者宜令中書門下量才除授勿使栖遲或有進士策名纍年未釋褐者與初任一官已釋褐者依前資敘用兩都左右街賜紫衣及師號僧委功德使具名聞奏今後有闕方得奏薦仍須道行精至夏臘高深方得補填每遇明聖節兩街各許官壇度七人諸道如要度僧亦仰就京官壇仍令祠部給牒今後只兩街置僧録諸道僧正並廢郊禋大禮舊有渥恩御殿改元比無賞給今則不循舊例別示特恩其行營將士賞賚已給付本家宜令招討使霍彥威副招討使王彥章陳州行營都指揮使張漢傑曉示諸軍知悉朕君臨四海子育兆民惟持不黨之心庶叶無私之運其有齒豫戚屬雖深敦敘之情干我國經難固含宏之旨須遵常憲以示至公特進檢校太傅使持節陳州刺史兼御史大夫上柱國食邑三千戶惠王友能列爵為王頒條治郡受元戎之寄任處千里之封疆就進官資已登崇貴時加錫賚以表優隆宜切知恩合思盡節撫俗當申於仁政佐時期效於忠規而狎彼小人納其邪説忽稱兵而向闕敢越境以殘民侵犯郊畿驚撓輦轂遠邇咸嫉謀畫交陳及興問罪之師旋驗知非之狀瀝懇繼陳於章表束身願赴於闕庭備述艱危覬加寬恕朕得不自為屈已姑務安仁特施貸法之恩蓋舉議親之律詢於事體抑有朝章止行退責之文用塞衆多之論可降封房陵侯於戲君臣之體彼有不恭伯仲之恩豫垂立愛顧茲輕典豈稱羣情凡在臣寮當體朕意王周佐國賢臣殿邦良帥戰伐之功顯著葺綏之政尤彰昨者殄寇澡山總戎涇水安邊靜塞克施撫馭之方察俗觀風盡去煩苛之弊備陳條件足驗公清一方既洽於詠歌百姓頓期於蘇息王周宜賜詔奬安叔干折獄惟良化民有術治彼無訟使之知禁鳴枹息於砥路茂草生於圜土求之古人何以臻此三載考績不忘明允之能五刑有服無違中正之道以斯為政良可嘉焉朕若不與鞫究謂豫不念赤子若遂行典憲謂豫不念功臣為子君者不亦難乎其華溫琪所受贓宜宮給代還所訟之家敕吳越國王錢鏐朕念敬尊元老禮無出於父師崇樹華姻事莫先於婚媾故金張貴族方膺下嫁之榮齊宋大邦始稱和鳴之兆恭惟先帝與卿素同盟約誓掃寇讎遠裨締搆之功終集興隆之運雖崇資厚祿酬勳已極於當時而懿戚周親結分思聯於奕世尋期愛女欲配高門三邊未息於戎機百兩遂稽於宿諾今朕祗膺天眷獲嗣皇圖念三年無改之規思二姓好逑之重願遵先旨特舉令儀況傳瑛驪頷奇光鳳毛異彩不俟折笄之訓已當壓紐之祥媯汭名門雅稱太姬之匹張敖顯族宜承元女之姻是用先降徽章特加異數擅齋壇之斧鉞兼台室之鈞衡既明必復之徵且展維私之分料卿精識體朕至懷今授傳瑛大同軍節度使檢校太傅同中書門下平章事駙馬都尉兼加食邑八百戶敕給事中韋彖等到鎮選尚今陳讓恩命事具悉卿六朝元老一代純臣挺金石之心功參締搆識風雲之會力贊邦家歌鐘不足以宣猷册尋盈於編紀所以先帝頃在潛龍之際欲敦鳴鳳之文擇彼芝蘭聘於骨肉及開張運祚巡狩寰區雖媯汭降嬪未行嘉禮而晉原埋土不享修齡朕去歲特輟近班俾道遺訓冀諧良匹別付至親卿又過執謙沖遠形辭避且知子莫若父知臣莫若君將相聯榮公王疊慶豈無令器可奉明恩勿堅撝抑之儀速副選求之旨佇行制命勉沃朕懷欽重之餘延矚無已卿功高鼎鉉爵極土茅光紀年繫月之書等巢閣負圖之瑞朕自惟寡薄猥荷基扃唯於舊勳敢墜先志所以再謀選尚用洽姻親況卿男傳璟學禮聞詩資忠履孝前代則何郎風貌克著嘉名近朝則郭令功崇爰推愛子既臻具美須降明恩俾升右揆之榮兼正九卿之秩奉車增貴鳴玉趨朝騁騏驥之修途契鳳凰之吉兆眷戀之外慰沃良深今授傳璟檢校尚書右僕射守司農卿駙馬都尉已從別敕處分想宜知悉敕曰朕聞越紀亂常前王無赦懲惡勸善有國不私苟罪惡以顯彰在刑名而何逭其有身當殊寵既受國恩敢行不軌之心具驗速辜之迹頒行典憲仍令詰諸靖海建武等軍節度使上柱國平南王劉巖頃因乃父發迹本藩尋賴其兄致身賓席受先朝之拔擢極上將之寵權念其尊奬之誠許繼藩宣之任乃自行軍之職繼膺推轂之恩秩進三司位同四輔自朕獲承大寶纍進崇資一門無比其超榮百世豈疇其寵耀而敢飛章不紀希寵無厭始求都統四鄰後請封王南越貪叨斯甚踰僭無階朕每含容再伸優渥授之東鎮加以南平比罔思止足益恣凶狂妄稱漢室遺宗欲繼尉他醜迹結連淮海阻塞梯航徒惑遠方僭稱大號在人情而共棄豈天道以能容宜命討除用清逆亂爾天下兵馬都元帥錢鏐志扶社稷任總兵師每興憤激之辭願舉誅夷之令是用俾爾元老討彼叛臣先行奪爵之文爰舉摧凶之典劉巖在身官爵並宜削奪於戲將相重任子孫殊榮不能常守於藩修而乃自干於國典指凶殘而必取念染汚以將新非我無終始之恩實彼有滿盈之罪凡百珍重悉體朕懷朕聞惟辟動天惟聖時憲故君為善則降之以福為不善則降之以災朕以眇末之身託於王公之上不能荷先帝艱難之運所以致蒼生塗炭之危兵革薦興災害仍集內省厥咎蓋由朕躬故北有邊裔狡逞之師西有蒲同亂常之旅連年戰伐積歲轉輸虔劉我士民侵據我郡邑師無宿飽之饋家無擔石之儲而又水潦為災蟲蝗作沴戒譴作於上怨咨聞於下而況骨肉之內竊弄干戈畿甸之中輒為陵暴但責躬而罪己敢怨天以尤人蓋朕無德以事上穹無功以及兆庶不便於時者未能去有益於民者未能行處事昧於酌中發令乖於至當招致災患引翼禍殃罪在朕躬不敢自赦夙夜是懼寢食靡寧將勵已以息災爰布澤而從欲今以薰風方扇旭日初升朔既視於正陽歷宜更於嘉號庶惟新之令敷華夏以同歡期克念之心與皇王而合道其貞明七年宜改為龍德元年應天下見禁罪人除大辟罪外遞減一等德音到後三日內疏理訖奏應欠貞明三年四年諸色殘欠五年六年夏稅殘稅並放侍衛親軍及諸道行營將士等第頒賜優賞已從別敕處分左降官與量移已經量移者與復資長流人各移近地已經移者許歸鄉里前資朝官寄寓遠方仰長吏津置赴闕內外文武常參官節度使留後刺史父母亡歿者並與封贈公私債負納利及一倍已上者不得利上生利先經陳歿將校各與追贈夷門太祖創業之地居天下之衝北拒并汾東至淮海國家藩鎮多在厥東命將出師利於便近若都洛下非良圖也公等如堅推戴册禮宜在東京賊平之日即謁洛陽陵廟
