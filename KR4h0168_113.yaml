front:
  text: 全唐文欽定全唐文卷一百十三帝諱從厚明宗第三子唐天祐十一年生長興元年封宋王四年十一月即位應順元年四月被廢為鄂王旋遇害在位一年年二十一晉天福元年追諡曰閔皇帝
  hash: sha256:f96f9d0d333b8539b02f89ce4f87076928f109bcafb98af27e1fc27fc4220ff9
  markers:
  - {type: head, offset: 13, content: 後唐閔帝, id: KR4h0168_NFKB_113-h1, level: 1}
body:
  text: 參選之徒艱辛不一發身遲滯到老卑低宜優未達之倫顯示惟新之澤其經學出身一任兩考元勅入中下縣令下州錄事參軍起今後更許入中下縣令中州下州錄事參軍一任三考者於人戶多處州縣注擬如於近勅條內資敘無相當者即準格循資考入官其兩任四考者準三任五考例入官餘準格條處分不得起折朕猥以沖人獲膺大寶賴神祇之賛助顯天地之休禎夷夏駿奔式符於睠命聲教綿遠虔荷於炳靈德薄承祧憂深馭朽克奉治平之道諒繇冥助之功集是殊祥敢不寅畏賴陰陽行運致時雨以應期稼穡順成得歲功而叶望咸臻上瑞普泰兆民宜令三京諸道州府界內名山大川祠廟有益於民者以時精虔祭祀稱朕意焉今後藩侯帶同平章事巳上薨謝者並差官撰文宣賜未帶相印及刺史以令式合立碑者其文任自製撰不在奏聞刑柄為制禮之先獄訟乃有國之重一成共守四海同文咸符欽恤之言乃致太平之道以近及遠列職分司申明皆有其舊規決斷各繇其所屬惟理則罪疑可定惟正則刑措可期諒在舉行方無壅滯應三京諸道州府繫囚據罪輕重疾速斷遣比來停滯須奏取裁不便區別故為留滯今後凡有刑獄據理斷遣如有勅推按理合奏聞不在此限凡在苴麻並須終制比有金革遂有奪情孝以移忠藉其陳力其內諸司使副帶西班正官者宜過卒哭起復授官不帶正官者及供奉官殿直承旨等宜過卒哭休日赴職其有帶東班官者祗以檢校官充職服闋日加授前職帝諱從珂本姓王氏鎮州人唐光啟元年生明宗養為巳子長興四年封潞王應順元年四月以兵脅廢閔帝遂自即位晉高祖入洛舉族自焚在位二年年五十二余叨居冢嫡謬列盤維成家於十死九生立國於千征萬戰事父母敦於至孝為臣子敢於盡忠將期夾輔之勳以廣文明之祚一昨先皇晏駕嗣聖承祧敢不遵周召以勤王相成康而在位社稷既然有奉人民於是知歸但固宗祊敢論季孟豈意梓宮在阼靈駕未歸而朱宏昭馮贇等妄興猜忌之心驟起窺圖之計喪紀在近除書遽行津涯莫知迫促尤甚況又不宣麻制便降使臣立遣離藩俾其懼禍霆電之速軍民可知是以聊葺城池以緩碪机十鎮驅貔貅而遽至六師擁組練以齊來當此阽危如何旅拒不謂天道鑒其非罪人情愍以無辜憚以攻城自來束手數鎮憑陵之帥立自滅亡九重侍衞之師翻為心腹以至抱義者感泣懷憤者咄嗟凡百有知皆悲無罪今則軍戎大集園寢將成羣帥獻忠迫令赴闕載念遺弓在近仙駕將歸既息憂惶又盈哀慘今則須將禁旅入赴山陵面朝太后太妃自訴為臣為子今月二十七日巳次陝州其在京文武兩班內諸司使務除朱宏昭馮贇家族伏法外凡百士庶並無憂疑況禁令嚴明軍都整肅必無暴犯克保平寧苟渝此言何以行令王者司牧兆民寵綏四海爰屬統臨之始宜布渙汗之恩仰測天心俯從人欲所以春秋冬夏四時先布於發生草木禽魚萬彙乃期於蘇息伏念大行皇帝承天眷祐立極艱難繄予眇躬嘗佐興運櫛風沐雨從湯征而多歷勤劬匣劒櫜弓賛周道而克成底定爾後繼持玉節獲受桐珪事君必盡於忠誠為子益堅於孝道諒穹蒼之可鑒冀宗社之永寧旋屬國人憂荊山鼎就痛攀髯之靡及念同軌之將臻爰自汧岐徑朝伊洛所冀宿參蜃輅親奉山陵纔覲宮闈旋承告令百辟堅陳於勸請三讓莫諧六師共切於推崇羣情益固昔夏啟以謳歌有屬能承大禹之基漢文以將相叶心克嗣高皇之業顧惟小子豈逮前王自纉鴻圖如登虎尾惟當慎終若始居安慮危保七百載之延昌致億兆人之開泰將布改元之令爰敷在宥之文宜改應順元年為清泰元年可大赦天下四月十六日昧爽巳前內外見繫囚徒據罪巳發覺未發覺巳結正未結正罪無輕重常赦所不原者咸赦除之應左降官及徒流人與量移巳量移者更與量移巳放歸者量與敘錄應內外文武臣寮節鎮州府等使刺史文武職員將校並與加恩應自鳳翔扈駕員寮凡主兵主事者各賜功臣名見在京隨駕并諸道馬步將士並與等第優給並從別勅處分自二月十四日西來文武參佐沒於王事者各與追贈仍敘錄子孫隨駕前資文武官寮并量才任使鳳翔民李存劉實罄出家財以助軍賞並與命官起事之初鳳翔三城民戶多遭燒燬並宜本道檢視量給瓦木工價各令修葺自岐雍華陝巳來王師所經踐履去道三里內夏稅並與放免應三京諸州府長興三年十二月巳前欠夏秋殘稅並與除放其鳳翔即自長興四年十二月終巳前並放恭惟先皇帝夷凶靜亂開國承家社稷危而再安乾坤否而復泰宏宣一德寵惠兆民八年之閒家給人足然而致理之績雖巳播於頌聲紀事之書尚未編於史氏緬惟纉奉之道良增愧惕之懷其實錄宜令史館疾速修撰呈進惟務周詳勿令闕漏應勸進諸選人前京兆府武功令龎濤而下四百九十有四人方在京都遘茲際會既同勸進宜示奬酬其前資州縣官及黃衣進選人近日緣少闕員難於減選合格日各超一資注擬行事官亦於注擬時優與處分長流人巳歸本貫即以赦書節文處分攝試官推巡令錄宜并許比三轉出身判司衙推主簿比明經出身各守選限自今年始合格日與初官宗子未有出身者與出身有出身者同選人例處分給與憑據李元龜官處法司次當對以稍於時雨請特降於優恩初則以貶謫官亡歿外州乞容歸葬次則以亡歿者兒孫絕嗣請本處瘞埋宜依所陳頒告諸道樞密使朱宏昭馮贇宣徽南院使孟漢瓊西京留守王思同前邠州節度使藥彥稠共相朋煽妄舉干戈互興離閒之謀幾搆傾亡之禍宜行顯戮以快羣情仍削奪官爵請再示賞罰提舉縣令事百里象雷之地一同製錦之人期在養民豈宜失職諸州觀察使刺史嚴切提撕請牢籠俊乂搜訪賢良況選部貢闈每年慎擇尚慮貞廉之士愧趨躁競之門諸道廉使更宜搜訪請斷無名率配委三司使省奏舉行請止急徵暴賦況秋夏徵科自有常限宜令官吏不得踰違吳嶽成德公昨遇亨期克申幽賛宜加王號以表神功可進封靈應王其祠享官屬仍舊同五嶽擇日冊命在京諸獄及天下州府見繫罪人正當暑毒之時未免拘囚之苦誠知負罪特軫予懷恐法吏生情滯於決斷詔至所在長吏親自慮問據輕重疾速斷遣無令淹滯改元重事告廟常規凡在班行宜思策勵孔知鄴等方當任使皆合恪恭豈可居常則各冒寵光臨事則自圖便穩苟無懲誡何肅紀綱孔知鄴華光遠並停見任其告廟官差右武衞將軍高允崇義存兩造善推鞫者故合奬酬法貴一成務欽守者豈煩更改劇可久所陳章奏備驗忠勤然於取舍之閒未盡諮詢之理其軍巡使都虞能覆推刑獄雪活人命及推按不平致人負屈者起今後宜以長興四年五月二十三日勅條施行合有奬酬亦等第比附行遣其故入人罪律有本條何煩別定長興二年閏五月勅律令格式六典凡關庶政盡有區分久不舉明遂致隳紊宜令京百司各於其閒錄出本司事裁成卷軸或粉壁寫在廨署本司官常宜省覽以備顧問自勅下至今累年如聞諸司或以無廨宇處並未書寫施行宜令御史臺差兩巡使分巡百司局以聞如因事未辦處與限五日須抄錄依元勅指揮其諸道州縣亦有六典內合行公事條件抄錄粉壁官吏常宜觀省其律令格式事繁昨以撮成四卷州縣差人抄錄以備檢尋今後宜令御史臺每至正初具錄前後勅文告示諸司及州府永為常式朕自中春釁生家國長子重吉遽陷無辜其供奉官楚祚乘幼主之猜嫌徇賊臣之指使纔聞差使遽自請行坐情過甚於仇讎臨法不依於制度恣加淩辱隱奪資財縱便致於族誅亦未平於深恥朕再惟大體不欲極刑抑沈痛於恩情示好生於天道且令遠斥粗釋幽冤宜配登州長流百姓常知所在其父西京副指揮使處章放令自便縱逢恩赦不在齒錄之限朕嘗領藩條屢親政事每於求理務在卹民況今子育萬方君臨四海日慎一日思漸致於小康雖休勿休冀終成於大化得不察生靈之疾苦知稼穡之艱難俾蠲積弊之原庶廣惟新之澤省三司使奏自長興元年至四年十二月巳前諸道及戶部營田逋租三十八萬八千六百七十二端匹束貫斤量或頻經水旱或併值轉輸悉至困窮蹙成逋欠加以連年災沴比戶流亡殘租空係於簿書計數莫資於經費蓋州縣不公之吏鄉閭無識之夫乘便欺官多端隱稅三司使患其僥倖便欲推尋朕閔彼蒸黎慮成淹滯示體物憂民之旨徵滌瑕盪垢之文特議含容且期均濟應自長興四年巳前三京諸道及營田委三司使各下諸州府縣除巳納外並放應有逃戶除曾經革外所有後來逃移者委所在觀察司使刺史速下本部徧令招撫歸業除放八月後至五年八月並得歸業所有房親鄰近佃射桑田不得輒有占據如自越國程故不收認其所徵租稅卻從清泰元年四月後委三司重行革別議施行舉賞罰之明條立徵催之年限不得更欠租稅致啟倖門勉懷成務之勤以副劇繁之選有要行事件三司畫一奏聞仍報中書門下不得漏落昨以稍愆時雨慮損嘉禾朕親赴龍門遍申祈禱甘澤尋降豐稔可期宜令元差禱雨官各赴祠宇昭賽應徽陵行事官各無遺闕巳議奬酬比少闕員難以減選遂許合赴集日各與超資今又懇有披論宜特與減一選其今年合格者便委南曹磨勘送銓注擬來年合選者勒赴冬集所司磨勘無遺闕旋送銓免取文解其去冬判成未得官者宜先注擬應前任正授賓從亦宜減一年無年可減便與擬授苦雨連綿巳逾旬浹差官祈禜尚未晴明宜令宰臣李愚劉昫盧文紀姚顗各於諸寺觀虔告應自鳳翔及沿路迎接隨從到京州縣等官或昔經患難罄竭忠勞或遠奉乘輿奔馳扈從既各憑其御署遂溥降於優隆爰示等差特行革所有自振武西京河中鳳翔巳前御署員寮或因無員闕權且補差或託彼薦論偶經任使不可悉謀援例便望授官將堙僥倖之源須立區別之限自八月三日後應所稱御署官員除內有處分特行恩澤外其餘稱御署並許逐攝同一任正官依限期赴選不得更令進狀及與施行朱宏昭馮贇孟漢瓊康義誠王思同藥彥稠等朕志切行仁情惟念舊雖顛覆自貽其伊戚而愍傷猶軫於予懷宜降特恩許其歸葬其親屬骨肉及元隨職員並放逐便所在不得恐動久雨未霽禮有祈禳禜都城門三日不止乃祈山川告宗廟社稷宜令太子賓客李延範等禜諸城門太常卿李懌工部尚書崔居儉告宗廟社稷李德舟顯陳藝術特貢封章以霖雨之為災恐粢盛之不稔請修祈醮以示消禳恭以天地星辰宗廟社稷雨師風伯皆遵祀典薦告不虧名山大川屢行祈禱今據德舟所陳據祠禱不該者所司嚴潔祠祭以表精虔霖霪稍甚愆伏為災朕燭理不明慮傷和氣都下諸獄委御史臺差官慮問西都差留守判官藩鎮差觀察判官刺史州委軍事判官諸縣委令錄據見繫罪人一一親自錄問恐奸吏逗留致其淹抑及時踈理如是大獄即具奏聞官吏通衢陳訴比來時亦有之若抱屈難伸或有理未雪固難抗節須至望塵至於方潔之人猶以為恥近則無知之輩遽相倣例寖以成風頻至於列肆長街遮闌宰臣陳訴及其處理多礙格式或勅命巳行確祈追改亦於赦條之外妄有披論不惟紊亂於紀綱抑亦有同於輕侮此後州縣官或有所陳并於中書門下據事理陳訴如實有屈塞登時即與勘窮如是僭越虧公付銓量與殿選如不關銓量陳訴者即下法司推詰所冀羣官奉法勉令進取以澆訛萬國來王復覩朝廷之整肅姚顗所奏銓管實合規程不唯六典昭彰抑亦三銓整肅而長定格是聖朝重定條件甚精若令千載以無隳必使萬方而有則俾其復舊深合羣情如聞依循資格行用年深事條差舛必須詳正方免弊訛其分銓事宜依循資格宜令吏部三銓尚書郎南北曹給事中參詳其閒條件如其舛誤即革以聞初成園陵彌軫孝思遽履節辰尤增顧復所奏各儀宜停朕君於人上燭理不明自冬初迄今未降密雪深虞愆伏災及黎民宜令宰臣百寮分詣諸祠壇祈告朕猥將寡昧虔嗣宗祧草木蟲魚思宏於覆育蠻夷戎狄固切於綏懷睠彼契丹孤我恩信忽驅族類擾亂邊陲殺害生靈窺窬保障惟貨財是視殘疾是行逞虐肆凶莫甚於此人神之所共怒天地之所不容今則上將臨邊衆軍大集克寸日必成於盪定望風巳報於奔逃雖料彼戎夷他日終期於葅醢而顧予生聚此時方抱於瘡痍或骨肉分離或邱園荒廢凝旒載想過在朕躬將卻復於阜繁宜特行於卹隱應振武新州河東西北邊經蕃戎蹂踐處百姓兩稅差配今日後並放三年宜令逐處長吏分明曉諭其人戶陷蕃者宜令設法招尋各令歸復稱朕意焉夫命將所以行兵聚兵所以遏亂必在上下有理進退無違入則畏法以謹身出則圖功而效命畏法必無罪戾圖功則有寵恩以此言之不可不慎王彥塘方期任使輒敢恃憑既都將以上言在軍法而難恕況屬環衞并在藩方上至偏裨下及行伍皆是久經訓練備曉條章官爵甚高衣糧極厚必能共思整戢自務保全是宜特舉規程徧加曉諭責令遵守務肅轅營今後在京及諸道馬步將士上至都尉下及長行並須各據職資共存禮體遞相鈐轄遵稟指揮如紊亂條章下不從上指使前卻使酒訛言其長行犯者委本都副兵馬使巳下節級科罰其副兵馬使節級犯者委本都頭科罰其都頭犯者若無事不出時錄罪申奏若出軍指使之時便委隨處統將科罰其或所犯人自負罪不伏首領刑責便即奏聞如指揮使都頭巳下但務顏情藏庇凶輩自招負累必不恕容頒下內外諸軍知悉列聖陵寢多在關西中興巳來未暇修奉宜令京兆河南鳳翔等府耀州乾州奉陵諸縣其陵園有所闕漏本處量差人工修奉仍人給日食祭告下太常宗正寺參詳奏聞杜崇龜術精元象職在禁廷覩苦雨之霖霪視文星之變異形於章奏足驗忠勤修德省躬朕誠有愧見災而懼安敢忘懷載閱所陳深所嘉奬程遜等所陳時務並關王道兼雜霸圖益國利民無所不至成仁去害悉在其閒救時病以良多比忠言之更切封駮詔勅尤可施行餘據事條下所司馬勝所陳理亦公當嚴刑去盜正切救時付中書門下告諭中外於極刑之中不得因緣枉濫務在懲惡止姦審詳行遣盧文紀早踐班行迭更顯重動惟稽古言必為時當朕求治之初首居輔弼之位能竭事君之節以申報國之勞引經義而究其本根合時事而先於條貫請宣學士兼召諫臣言陰陽序理之端人事調和之本又嚴修祀典精事神祇宜令有司依奏虔潔所云進忠良而退不肖除寇盜而恤惸嫠雖責在朕躬亦資於調燮刑法舒慘宜令大理寺御史臺明慎詳讞勿至寃誣選賢退愚宜令三銓選部精覈慎選所冀得人新舊制勅宜令御史臺與三司官員詳擇以聞朕聞宮鳴商應則律呂和君唱臣隨則邦家理興化之本百代同歸朕顧惟眇沖獲奉基構慮生靈之未泰憂政教之不明旰食宵衣未嘗暫暇副我焦勞之意屬於輔相之臣卿等濟代英才鎮時碩德或締構於興王之日或經綸於纉聖之時鹽梅之任俱崇藥石之言並切請復延英之制以伸議政之規而況列聖遺芳皇朝盛事載詳徵引良切嘉歎恭惟五日起居先皇垂範俟百寮之俱退召四輔以獨昇接以溫顏詢其理道計此時作事之意亦昔日延英之流朕叨獲嗣承切思遵守將成其美不爽兼行其五日起居令仍舊尋常公事亦可便舉奏聞或事屬機宜理當密秘量事緊慢不限隔日及當日便可於閤門祗候具榜子奏聞請面敷敭即當盡屏侍臣端居便殿佇聞高議以慰虛懷朕或要見卿時亦令常侍宣召但能務致理之實何必拘延英之名有事足可以討論有言足可以陳述宜以沃心為務勿以逆耳為虞勉罄謀猷以裨寡昧朕猥將眇質獲嗣丕圖暑往寒來知昊天之罔極憂深思遠惟觸地以無容卿等學究源流文苞體要以致財成之美復陳孝理之規援引古今鋪陳茂實道朕以愛親之禮勉朕以追遠之文取則昭成明徵章敬仍加美諡益見忠誠至於權立閟宮頗亦叶於時變劬勞莫報長懸陟屺之心聖善斯崇且慰循陔之念謹依典禮景慕增深祠祭國家重事切在精虔若不提撕漸成踈慢今後監祭使每祭親視酒饌幣玉不得令饌料失於蠲潔如有所聞罪在監祭使其壇廟墻屋勿令䟽漏本司常舉修葺以聞運當昭泰時屬樂康思欲導和氣於雍熙布休光於幽隱將期恤物必軫深仁今以甫及蕤賓適茲炎毒宜茂好生之德俾敷在宥之文足以寬肺石之冤辭叶薰風之解慍庶遵時令獲奉天心宜令御史臺河南府運巡道州府自五月一日巳前見繫罪人常赦不原及巳見情狀之外悉令疾速斷遣勿至淹停朕聞奇伎淫巧增費損功古先哲王嘗戒其事朕憲章百代臨御萬方以其欲致延鴻必絕驕奢之漸將期富庶須除蠧耗之原每務實以去華期化民而成俗近者諸色進奉寶裝龍鳳雕鏤刺作組織之異曾經革尚敢踰違宜在舉行貴於遵守今後此色物諸處不得進奉所繇司不得輒通令錄之任總六曹之紀轄係百里之慘舒惠養吾民可以親承顧問內殿辭謝可如舊制藩侯郡守薦人或諳公事或有裨益不可全阻許依天成勅帶使相藩臣歲薦三人餘二人直屬京州羣防禦團練一人諸色官誥舉人春關冬集綾紙聞喜關宴所賜錢並仍舊官給餘從之聽政不坐禮儀而合使先知牧馬趨朝道路而宜令有異況民家占侵於御路固合條流牛馬往來於天津宜須禁止盧損益深奉職言切為時詳五件之封章俾四方之觀政除光政門外下馬一件續有處分設官分職為時主之敷恩推賢讓能乃朝廷之盛事是以詩稱伐木史載彈冠俾拔茅連茹之時見力行修身之道劉鼎官居雉省立近龍墀因貢讜言請行故事欲使子皮舉善終明子產之賢鮑叔讓能不掩夷吾之略兼可以致同心叶力表後巳先人克揚文子之風免有展禽之嘆舉實公當便可施行情涉阿私理當比驗上書言事諫署舊規各有所司豈宜越局若思出於位理或侵官言匪盡忠徒欲沽於謇直詞多率意實有望於指陳許遜所上封章請依近勅各司其事允叶舊章近日告勅牒書寫生䟽裝褫鹵莽未欲便行罰責今後書禮裝褫並宜如法中書舍人辭告亦可以其人揚歷功效或訓或奬並宜允當又須體認急切如有宣取盡時應副無令稽緩偏旁文字音韻懸殊止避正呼不宜全改楊檀宜賜名光遠其餘依奏安崇賛父有力皇家著之青史雖然得罪於先朝此日特行於延賞況頻逢赦宥可繼烝嘗亦欲忠義之士知朕念勳之旨擢為上佐爾惟勉旃特授孟州司馬故庶人從榮獲罪先帝貽禍厥身巳歷歲時未營宅兆雖軫在原之念宜從有國之規且令中書門下商量葬禮近以內外臣寮出入迭處稍均勞逸免滯轉遷應兩使判官畿赤令長取郎中員外補闕拾遺三丞五博少列官寮選擇擢任一則俾藩方侯伯別耀賓階次則致朝列人臣備諳時政今後內有巳滿闕月限外或偶是闕員宜便依此施行凡布化條惟務均一苟公平之無爽即中外以適從國子監每舉舉人皆自四方來集不詢解送何辨是非其附監舉人並依去年八月一日勅須取本處文解如不及第者次年便許監司解送若初投名未嘗令本處取解者初舉落第後監司勿更收補其淮南江南黔蜀遠人即不拘此例父有社稷傳之於子君有禍難倚之於親卿於鄂王故非䟽遠往歲衞州之事天下皆知今朝許王之言人誰肯信英賢立事安肯如斯王者父天子民深居高視恭巳以行道襃賢以勸功蓋以上承天休下除民瘼率輦下以勸天下闕一人而惠萬人為子為臣不可不察朕惟寡德獲纉丕圖奉先聖之神靈荷皇天之眷祐寅畏夕惕罔敢遑寧思與將相王公良牧賢宰共敷政教同致雍熙繇是詳酌政刑搜求利病以今觀古夜思朝行才濟於時雖蒿萊而必采言干於道雖誹謗而必容然而近歲巳來多事之後邊陲尚擾府庫未殷扞防必假於兵師供饋須資於民力既未能便停征伐固不可頓減賦租念乃疲羸勞於夢寐今歲爰自初夏稍屬愆陽朝昏正積於焦勞祈請果垂於甘澤所宜行慶以答殊休言念狴牢之人屬此鬱蒸之苦毒之狀所不能言況當長養之時特降哀矜之令應三京諸道州府見禁囚徒自五月十二日巳前除五逆十惡光火劫舍持仗殺人官典犯贓偽行印信合造毒藥外委逐處長吏據巳發覺未發覺巳結正未結正不在追呼支蔓只正身招罪便疾速斷遣并見欠省司錢物外諸罪無輕重一切釋放應天下藩侯郡守令錄等為我股肱作民父母必在精窮事理杜塞倖門副我憂勤察民疾苦刑獄不可以阿曲法令不可以滋章私不得害公利不得傷義長思砥礪共致隆平凡百庶官宜體朕意
