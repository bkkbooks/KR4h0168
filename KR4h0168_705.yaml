front:
  text: 全唐文欽定全唐文卷七百五李德裕十
  hash: sha256:4e7b27c6d3b43494315570191cfb92e3d1cd67ecfaaefda0ce4b448ede1fce86
body:
  text: 右嗢沒斯既加軍號甚壯邊城錫以牙旗尤彰寵異臣等商量望依神策諸城鎮使例賜以旗兩口豹尾兩對器仗并刀一副令中使押領宣賜如以中使行速齎持稍難其槍旗令於太原節度使下揀新好者充賜亦穩便謹録奏聞右嗢沒斯既加軍號請留家口在太原安置與諸弟等若處先登者臣等商量嗢沒斯赤誠向闕極力捍邊請遣宗族盡歸內地非惟絶其顧望足以堅彼鬬心望詔劉沔義忠於雲朔等州揀一空間城壘兼與隨事造土屋其嗢沒斯及愛耶勿宰相等家口等即與別造壯淨屋宇安置其應歸漢家口等大口每月給米三斗充糧食委度支供軍使逐月支給仍委劉沔差漢兵勾當防援不得令側近部落侵擾馬駱駝等狀右緣回鶻新得馬價絹訪聞塞上軍人及諸藩部落苟利貨財不惜駝馬必恐充為互市招誘外蕃豈惟資助虜兵實亦減耗兵備望詔劉沔忠順義忠守志等切加鈐鍵如有違犯並按軍令馬及互市物納官如有人糾告便以所得物充賞右臣等商量賜可汗甚全國體望付翰林賜可汗書得嗢沒斯表稱在本分馬價絹並合落下請充進奉以可汗本國破殘久在邊陲此已量與嗢沒斯以下本分馬價絹便賜可汗兼望賜嗢沒斯詔獎其忠義緣卿率衆歸國若又落下馬價絹恐可汗與卿結怨轉深事體之間亦慮非便以卿等所請奏進奉馬價絹回賜可汗所冀部落早退令卿等各保安謐望約此意處分實為允愜右臣等纍日精慮回鶻自到把頭烽北已是數日奏報寂然更無侵軼察其情狀只與天德振武界首不殊前日尚書丞郎鄭肅等皆見臣等懇説且欲曲全恩信告諭丁寧縱要驅除只可出於邊將常令曲在於彼未要便與交鋒望更詔劉沔令遣使邀約若事非獲已驅逐不遲恐劉沔撰書敘朝廷意不盡望付翰林賜劉沔書白臣等今月一日所商量遣石雄斫營事今且駐更審候事勢仍望兼賜遂泰詔處分右臣等昨日已於延英面奏請太原振武天德各加兵備向後不更往來救援伏蒙聖恩許臣等以進狀請更徵發陳許徐汝襄陽等兵今回鶻雖已抽退康志亮稱退渾走捉嵐石等州臣等料其必歸靈夏又河曲黨項向與回鶻有讐至河冰合時深慮可汗出過河兼與吐蕃連結則為患不細深要防虞其所徵諸道兵恐不可停須要及冰未合時前各到所在謹特具聞奏未審可否右自兩日來臣等竊聞外議云石誡直久在京城事無巨細靡不諳悉昨緣收入鴻臚懼朝廷處置內求奉使意在脫身又云石誡直先有兩男逃走必是已入回鶻料其此去豈肯盡心臣等伏以自可汗在邊已使苗縝王會楊觀三度告諭又曾領常照安魯卿同往逗留塞上終不悛心石誡直是一卑微首領豈能有所感寤况自今夏以來兩度點檢摩尼回鶻又寵待嗢沒斯至厚恐誡直之徒必懷疑怨此去豈止於無益實慮生姦伏望速詔劉沔所在勒回實為允愜仍望兼賜崔巨元詔右緣回鶻牙帳漸移向東去振武疆界稍近今以草青馬壯深慮有意窺邊望令劉沔於雲伽關及邊界要害添兵嚴加警備先令鄭許陳滑兩道兵馬於代州就糧今緣把頭烽北一川皆是散地若回鶻萬一馳突更無重兵備禦則退渾部落先被破傷太原北境不免騷擾望付翰林賜劉沔詔令酌量事機審探回鶻情偽更於把頭烽北添置令速詳利害聞奏如蒙允許伏望約此意撰詔處分一緣回鶻猶在雲州頗擾邊境據二州蹤迹必無深遠之謀所慮邊上姦人走投回鶻為其設計令在雲朔等州斷天德振武驛路切須有備防患未萌望速令度支差使於河西路潛為準擬一元和八年回鶻回過磧南取柳谷路打吐蕃天德防禦使周懷義奏到朝廷未測其故人情無不憂恐臣德裕先臣奏請自夏州至天德復置廢館十一所以通急驛又請發夏州兵士五百人於故經略軍應接驛路兼護黨項臣等未知此路舊館今已廢毀為復猶有存者望賜忠順詔於此路量事再修舊館以通天德奏事驛路一訪聞麟勝兩州中間地名富谷人至殷繁蓋藏甚實望令度支揀幹事有才人充和糴使及秋收就此和糴於所在貯蓄且以和糴為名兼令與節度使潛計會設備如萬一振武不通便改充天德軍運糧使勝州隔河去東受降城十里自東受降城至振武一百三十里此路有糧東可以壯振武西可以救天德所冀先事布置即免臨時勞擾右臣等纍日商量且如八月九日處分太原三道各嚴兵守備更令劉沔遣使告諭待至來春回鶻人馬羸困之時計會驅逐則漢兵免冒寒苦易為施力臣等思慮量為得計若如此可行即幽州兵馬望且令於本界屯集待候處分入太原界後即須供出界糧未有用處日費殊廣恐度支物力供饋不辦若慮冰合後回鶻更有馳突事當及早驅逐即速為計會至十月已後寒凍轉甚恐施力不得須便三五日內方及事機又緣太原步兵鈍弱素為河朔所輕兼本道奏事官孫寮孫儔自稱太原兵敵回鶻不得即須於河朔側近別徵兵取滿萬人方可濟事須令一兩月內便見成功如此即免費資財得早安邊境伏以自兩漢每四夷有事必令公卿集議蓋以國之大事最在戎機元和中征討王承宗李師道長慶中征討李穴介並令集議况聞向外議論不一互有異同若不一度遍詢㣥情終為間詞所撓望令公卿集議兩日內聞奏所冀博盡㣥議厭服衆心未審可否一議狀云選將練卒未甚得人今緣邊節鎮將下㣥守誰人最不稱職文武班中誰人堪任將帥須指陳其事不得泛言一又云守禦要害未甚有備犄角之設不相應輔車之謀不相依今何處置兵即為要害何處加備即為相應並須指言去處一又云來即驅逐去亦勿追昨所令集議出師驅逐去亦勿追如此相守何時得了軍糧日有所費邊境終無安寧此最關取舍大計須便堪行用一又云部落能自攻討者不須止遏而邊上諸蕃多者一二千帳少者力又不足各有家口畜産常自護惜昨者回鶻暫到雲州諸蕃奔逃不暇雜虜既無統一誰肯盡心今欲將何部落討逐亦須指言去處一又云各敕邊將遣自招收其遠征戍卒請漸令抽罷此事朝廷非不素知只緣去年將江淮六道衣糧召募天德官健僅經一年更無一人應募李忠順請自招召經半年只得六百人塞上守備處召得一二千人都未濟事戍卒如何抽罷亦須更別陳方略以前謹具如前昨所降敕旨云且須切應事機不得更為虛論今詳議狀並未切事機臣等商量望令牛僧孺與夷行同議仔細分析兩日內聞奏未審可否處須更令分析謹連如前右臣等伏詳公卿所議猶未切要狀云邊將不聞以攻守之術上聞朝廷則將略可知也又諸道徵兵其數不少烏合之衆號令不齊又近者回鶻攻劫雲州漸入內地節級城守莫能式遏亦未見鄰近堡柵首尾救援者竊詳此意只自見大段形勢實未切事機朝廷比來待遇回鶻惟推恩信諭其職分便自退歸所徵戍兵只令守備都未嘗有攻討之意昨來回鶻迫于飢困至雲州劫奪牛羊已為侵暴事須與城柵鬬敵兵法所謂疾雷不及掩耳便云莫能式遏亦似過誣堡柵既無重兵合須自守令其首尾救援亦是虛談自古所云烏合之衆皆謂臨時召募未經訓習如韓信驅市人而戰即是烏合陳許淄青等兵並是節制之師久經戰伐但令一處指揮自然號令齊一固不可謂之烏合又云漢兵遠襲恐遺虜擒兵法云善用兵者致人之師不可自致所謂致人者是令其自來况虜騎倏忽以來疾如風電固不合將兵遠襲今可以計者緣其有家口輜重不離漢境二三百里遠去未得既有定所便可為謀魏武破烏丸李靖擒頡利皆用此計公卿等都不議亦似未見形勢非令集議只緣問驅逐守備二計何先今既云守備過冬方圖進取斯為上策便可施行即與昨來加劉沔招撫使且令告諭理亦相近恐不暇更有訪問未審可否右訪聞張仲武是幽州大將張朝先之子沈勇有謀陛下縱欲加恩亦須且挫其氣又幽州旬月之內移易三人因此翻覆多端亦要令其知愧臣等商量且望令符徹與大將已下一書觀其報答詞理足以知其情出鄰道節將于國體無虧其書白謹同封進一雲州之北並是散地備禦之要繫把頭烽今符徹雖修繕已畢把頭烽內並未添兵鎮守事同虛設恐不應機未廢把頭烽以前把頭烽內舊有軍鎮數處自廢把頭烽後併合抽卻望令巡邊使速與符徹計會卻抽舊兵依前制置如舊兵已少即于太原城下及間處抽兵其與山東接處及西北鎮兵不在抽限如更要築堡城亦委逐便制置一三受降城相去四百里自置天德軍及振武節度其東受降城中並在腹內都無大段兵馬鎮守就中中受降城不過三五十人古城摧斷都不修築今虜衆在陰山之北山中盡有過路若突出山南便入二城即天德振武當時隔斷其中受降城本是突厥拂雲祠最是要地今天德人力不及望令太原振武共出三千人速與修築便令鎮守即天德形勢自壯虜騎不敢窺邊一東受降城緣是近年新築城內無水城外取金河水充飲又于城西門掘一二十井若被圍守即須困蹙今築月城護取井水其張仁願舊城頗當要害張惟清錯奏恐黃河侵壞先賢制置皆有神靈保持廢來二十年基址依舊園蔬樹木至今盡在隔河便是勝州相去數里望委巡邊使與劉沔計會如何卻復舊城至為穩便以前件臣等伏以回鶻在邊切須有備邊備既壯制置不難訪問利害大約如此一要切須得使臣專往自驗機宜謹具條疏如前其間條疏不盡者望委巡邊使與所在節度使商量聞奏謹具於前條疏應接天德討逐回鶻事一請速降中使齎敕至雲朔天德已來宣諭生熟退渾及黨項諸部落等待天德交鋒後任隨便出軍討逐如得羊馬錢物奴婢等任便本主自收官中更不尋問仍據殺戮回鶻多少別議優賞一自古出師皆有副二以防主將有故便須得人石雄驍勇善戰當今無敵望授天德軍都防禦副使兼馬步都知兵馬使助田牟攻討仍勒乘遞赴天德軍一回鶻藥羅葛元政馬價絹望且勒留在振武令中使與忠順同檢點收管如田牟已用兵其藥羅葛元政便望委忠順收録如請歸降仍作般次送付太原除首領外委劉沔且散配儀沁嵐石等州去塞遠處安置並官給糧食如不肯降即須收係待後處分其趙進用等亦望詔劉沔收管其首領於公館安置長行等散配諸處一田牟都似不曉兵機奏狀已出三千人拒回鶻計其兵數必是全軍盡出忽有不利城內豈免空虛馬上馳突是戎虜所長攻城圍守戎虜所短田牟只合堅守城壘以俟救兵望速詔田牟輒不得出兵野戰待諸處兵至方可逐便討除一回鶻馬軍難於支敵依林守險須用弓弩望于浙西取弩手四百人宣州取弩手三百人令從河曲路赴天德如所在逢回鶻便令把隘及依叢林射馬河曲路與天德直對兼經歷鹽夏等州所在要處便堪應急到天德後權取田牟指揮一嗢沒斯誠款雖未知真偽然早要別加官爵縱使不誠亦是反間且要獎其忠義為討伐之名令遠近諸蕃知朝廷只是責可汗犯順非是要滅回鶻一回鶻既之糧食又纍年勞苦人心易動必可招降望且遣田牟速招降者許以優賞如有降虜旋給糧食遞過太原取優賞不得留在天德以前臣等商量若待天德奏到已恐不及事機望付翰林各撰密詔令中使向前審詳事勢如已接戰便須準此處分如蒙允許其石雄便須今日降敕未審可否右太原奏事官孫儔適到云回鶻移營近南四十里劉沔料必是緣契丹不同恐襲其背所以移營又幽州進奏官孫方造云仲武破回鶻之時收得室韋部落主妻兒昨室韋部落主欲將羊馬金帛贖妻兒仲武並不要只令殺回鶻監使即還妻兒室韋使已領幽州軍將同去殺回鶻監使緣軍將未回仲武未敢聞奏據此事勢正堪驅除臣等問孫儔與幽州合勢向前移營驅除得否更要添多少兵馬孫儔答云若係移營亦不要添大段兵馬只緣大同軍兵少得易定一千人大同即得其鎮州馬軍臣等商量不用徵發穩便未審可否右訪聞蕃渾羊馬多在渾河川恐啓戎心更來侵掠回鶻未退尤須備邊朝廷比來所乏最在戎馬因此收市深得事機宜收壯馬令入東闕保無散失臣等商量望委劉沔誘諭蕃人緣回鶻常有意劫奪恐蕃人作主不得應堪服衣甲壯馬並與收市其以太原見貯戶部物充賞價如市收得後旋送樓煩監收管諸道若有欠缺即量賜與如蒙允許望付翰林賜劉沔詔處分未審可否右奉宣旨思忠請前件馬軍合勢令商量奏來者臣等商量令劉沔與幽州振武天德合出大軍置營柵漸移向前逼蹙即令思忠領蕃渾馬軍深入計思忠兵勢相及可汗牙帳必自有變兼令招其降者即易成功其蕃兵分為兩廂各令蕃將押領至為穩便何清朝契苾通是蕃人各令管一廂所冀諳識虜情易為指使如蒙允許其何清朝計行李未遠望便以中書門下帖追未審可否右臣等訪聞退渾與回鶻久為讐怨恐合勢後不與思忠叶心或別生事須令遂泰審與劉沔商量如有可疑即便假發遣其興唐感義奉誠等軍及契苾退渾等部落先各有本管都使都督須令部領自去即得兵將各相諳識易於指揮望付翰林賜劉沔忠順遂泰等詔處分右思忠本請蕃騎緣言語相通易於指使若令易定兵去恐不相當魏楚又稱向北進軍每頭軍事須得蕃兵一二百騎引行若全令抽卻進軍不得臣等商量沙陀兵望許劉沔量留一半其一半依前令與思忠合勢如蒙俞允望賜劉沔詔處分右臣等前日商量令契苾通等不受思忠指揮何清朝分領部落臨事取思忠指揮昨日奉宣恐契苾通等不受思忠指揮不要分領臣等亦有深慮不敢不再陳論沙陀部落比在太原衙內性至循良於人情狎熟不令別人管領亦得所虜退渾昨者張獻節才欲責罰便疑為惡忽恐思忠制御不得卻自因此生事契苾通本自蕃中王子先在蔚州且遣分領必上下情通更無所慮又思忠雖志誠效順然使用之初亦未可獨任漢將分領事亦得宜契苾通等雖是蕃人任使已熟切更誡勵豈敢不順思忠臣等所見如此伏望聖明裁斷未審可否右訪聞塞北諸蕃皆云振武是單于故地不可存其名號以啓戎心臣等謹詳國史武德平突厥後於振武置雲州都督麟德三年改為單于大都督聖歷元年改為安北都護開元八年復為單于都護其安北都護本在天德自貞觀二十一年以來移在甘州遷徙不定今單于都護望改為安北都護如此制置稍存故事未審可否臣伏見國朝故事駙馬緣是親密並不合與朝廷要官往來元宗開元中禁止尤切臣訪聞近日駙馬公至宰相及要官私第此輩無他才伎可以延接惟是漏泄禁密交通中外㣥情所知以為甚斃其朝官素是雜流則不妨來往若職在清列豈可知聞伏望宣示宰相其駙馬諸親自今已後有公事任至中書見宰相此外更不得至宰相及臺省要官宅伏以前代帝王多求遺逸朝觀夕覽取鑒於斯陛下睿聖欽明凝情好古聽政之暇將以怡神前件書畫歷代共寶是稱珍絶其陸探微蕭史圖妙冠一時名居上品所希睿鑒別賜省覽伏以元宗皇帝天縱神武藝冠前王凡所畋遊必存繪事豈止雲夢殪兕楚人美旌蓋之雄潯陽射蛟漢史稱舳艫之盛前件圖臣瞻奉光靈素所寶惜陛下旁求珍迹以備石渠祖宗之美敢不呈獻臣有生多幸獲遇昌期受寄名藩每憂曠職孜孜夙夜上報國恩數年以來災旱相繼罄竭微慮粗免流亡物力之間尚未完復臣伏準今年三月初三日赦文常貢之外不令進獻此則陛下至聖至明細微洞照一恐聚斂之吏緣以成姦雕瘵之人不勝其弊上宏儉約之德下敷惻憫之仁萬國㣥氓鼓舞未息昨奉五月二十三日詔書令訪茅山真隱將欲師處謙守約之道敦務實去華之美雖無人上塞丹詔實率土已偃元風豈止微臣獨懷忭賀況進獻之事臣子之常心雖有敕文不許亦合竭力上貢惟臣當道素號富饒近年以來比舊則異貞元中李錡任觀察使日職兼鹽鐵百姓除實出榷酒錢外更置官酤兩重納榷獲利至厚又訪聞當時進奉亦兼用鹽鐵羡餘貢獻繁多自後莫及至薛蘋任觀察使時又奏置榷酒上供之外頗有餘財軍用之間實為優足自元和十四年七月三日敕卻停榷酤又準元和十五年五月七日赦文諸州羡餘不令送使惟有留使錢五十萬貫支用猶欠十三萬貫不足須自諸事節用百計補填經費之中未免懸闕至于綾紗等物猶是本州所出易於方圓金銀不出當州皆須外處回市去年二月中奉宣令進盝子計用銀九千四百餘兩其時貯備都無二三百兩乃諸頭收市此時亦稍優饒悉力上供幸免敗闕昨又奉宣旨令進粧具二十件計用銀一萬三千兩金一百三十兩尋令併合聖節進奉金銀造成兩具進納訖今差人於淮南收買旋到旋造星夜不輟竭力營求深憂不逮臣若因循不奏則負陛下任使之恩若分外誅求又纍陛下慈儉之德伏乞陛下覽前件榷酤及諸州羡餘之目則知臣軍用短闕本末有由伏料陛下見臣論奏必賜詳悉知臣竭愛君守官之節盡納忠罄直之心伏乞聖慈宣令宰臣商議何以遣臣得上不違宣旨下不闕軍儲不困疲人不招物議前後詔敕並可遵承輒冒宸嚴敢陳丹懇無任戰汗之至臣昨緣宣索已具軍資歲計及近年物力聞奏伏料聖慈必垂省覽又奉詔旨令織定羅紗袍段及可幅盤絛繚綾等一千匹伏讀詔書倍增惶灼臣伏見太宗朝臺使至涼州見名鷹諷李大亮令獻之大亮密表陳誠太宗賜詔報云有臣如此朕一本有復字何憂再三嘉嘆事載史書又元宗令中使於江南採鵁鶄諸鳥汴州刺史倪若水抗表陳論元宗亦賜詔嘉納其鳥即時皆放又令皇甫詢于益州織半臂背子琵琶銲撥鏤牙合子等蘇頲不奉詔書輒自停織元宗皆不加罪欣納所陳臣竊以為鵁鶄鏤牙至為微細若水等尚以勞人損德瀝款效忠當聖祖之朝有臣如此豈明王之代獨無其人蓋有位者蔽而勿言必非陛下拒而不納又伏覩四月二十三日德音云侯伯有位之士無或棄豫謂不可諫其有違道傷理徇欲懷安面刺廷爭無有隱諱則是容納善道增光祖宗不盡忠規過在臣下况元鵝天馬掬豹盤絛文彩珍奇只合聖躬自服今所織千匹費用至多臣愚亦所未曉昔漢文衣弋綈之衣元帝罷輕纖之服仁德慈儉至今稱之伏乞陛下近覽太宗元宗之容納遠思文帝孝元之恭已以臣前表宣示㣥臣酌當道物力所宜更賜節減則海隅蒼生無不受賜臣不任惶惕懇誠之至
