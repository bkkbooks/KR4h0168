front:
  text: 全唐文欽定全唐文卷五百九十一柳宗元二十三
  hash: sha256:3b99467fdfd417d103c8ade77b686a3396d97d2bd4477d9d9267ad50092d9c57
body:
  text: 亡妻宏農楊氏諱某高祖皇司勳郎中諱元政司勳生殿中侍御史諱志元殿中生醴泉縣尉諱成名醴泉生今禮部郎中凝代濟仁孝號為德門郎中娶於隴西李氏生夫人夫人生三年而皇妣即世外王父兼居方伯連帥之任歷刺南部夫人自幼及笄依於外族所以撫愛視遇者殆過厚焉夫人小心敬順居寵益畏終始無驕盈之色親黨難之五歲屬先妣之忌飯僧於仁祠就問其故媬傅以告遂號泣不食後每及是日必遑遑涕慕抱終身之戚焉及許嫁於我柔日既卜乃歸於柳氏恭惟先府君重崇友道於郎中最深髫稚好言始於善謔雖間在他國終無異辭凡十有三歲而二姓克合奉初言也夫人既歸事太夫人備敬養之道敦睦夫黨致肅雍之美主中饋佐蒸嘗怵惕之義表於宗門太夫人嘗曰自吾得新婦增一孝女况又通家愛之如己子崔氏裴氏姊視之如兄弟故二族之好異於他門然以素被足疾不能良行未三歲孕而不育厥疾增甚明年以謁醫救藥之便來歸女氏永寧里之私第八月十日甲子至於大疾年始二十有三嗚呼痛哉以夫人之柔順淑茂宜延於上壽端明惠和宜齒於貴位生知孝愛之本宜承於餘慶是三者皆虛其應天可問乎衰門多舋上天無祐故自辛未逮於茲歲纍服齊斬繼纏哀酷其間冠衣純采朞月者三而已矣無乃以是纍夫人之壽歟悼慟之懷曷月而已矣哀夫遂以九月五日庚午克葬於萬年縣栖鳳原從先塋禮也是歲唐貞元十五年龍集己卯為之志云坤德柔順婦道肅雍惟若人兮婉娩淑姿鏘翔令容委窮塵兮佳城鬱鬱閉白日兮之死同穴歸此室兮我伯姊之葬良人博陵崔氏為之志凡歸於夫家為婦為妻為母之道我之知不若崔之悉也然而自笄而上以至於幼孩崔固不若我之知也又烏可以已今之制凡志於墓者琢密石加蓋於其上用敢附碑陰之義假茲石而書焉嗚呼夫人天命之性固有以異於人孩而聲和幼而氣柔以吾族之大尊長之多夫人自能言而未嘗誤舉其諱與其類戲於家游弄之具未嘗有爭先公自鄂如京師其時事會世難教告罕至夫人憂勞踰月默泣不食又懼貽太夫人之憂慮紿以疾告書至而愈人乃知之善隸書為雅琴以自娛樂隱而不耀工足以致美於服而不為異言足以發揚於禮而不為辨孝之至敬之備仁之大又以配君子然而不克會於貴壽以至於斯孰謂之天有知者耶太夫人生二女幼曰裴氏婦如夫人之懿在二族咸以令德聞而皆早世其弟昏愚而獨存孰謂天可問耶嗚呼痛其甚歟遂濡血以書志終天之哀與茲石永久柳氏之先自黃帝及周魯其著者無駭以字為展氏禽以食采為柳姓厥後昌大世家河東嗚呼公諱某字某曾王父朝請大夫徐州長史諱子夏遺貞白之操表儀宗門王父朝請大夫滄洲清池令諱從裕垂博裕之道啓佑後允皇考湖州德清令諱察躬宏孝悌之德振揚家聲惟公端莊無諂徽柔有裕峻而能容介而能㣥其在閨門也動合太和皆由順正愷悌雍睦莫有間言故宗黨歌之其在公門也釋回措枉造次秉直事不失當舉無秕政故官府誦之用沖退徑盡之志以宏正友道信稱於外焉用柔和博愛之道以視遇孤弱仁著於內焉此公修己之大經也自進士登高第調受河南府文學秩滿渭北節度使論惟明辟為從事受太常寺協律郎元戎即世罷職家食無何朔方節度使張獻甫辟署參謀受大理評事賜緋魚袋改度支判官轉大理司直遷殿中侍御史加度支營田副使此公從政之大略也既佐戎事實司中府匪頒有制會計明白嗚呼分閫委政繄公而成務朝右虛位待公而周事宗門期公而光大姻黨仰公而振耀貞元十二年歲在丙子正月九日壬寅遇暴疾終於私館享年五十痛矣夫人吳郡陸氏洎仲弟綜季弟續冢姪某等抱孤即位牽率備禮祗奉裳帷歸於京師以某年二月二十八日庚寅安厝於萬年縣之少陵原禮也公有男一人始六年矣在髫知孝呱呱涕洟凡我宗戚撫視增慟嗚呼哀哉初公元兄以純深之行端直之德名聞於天下官至侍御史持斧登朝憲章肅清嘗以先公之神未克遷祔不正席不甘味及撰日定期而昊天不弔志奪禮廢公實敬承遺志行有日矣而閔凶薦及不克終事則我宗族之痛恨其有既乎惟公盡敬於孝養致毀於居憂表正宗姓觀示他族故宗人咸曰孝如方輿公修詞以藻德振文而導志以為理化之始莫尊乎堯作堯祠頌以為述德之道不忘於祖作始祖碑以為紀廣大之志敘正直之節不嫌於親作元兄侍御史府君墓志其餘諷詠比興皆合於古故宗人咸曰文如吳興守當官貞固確乎不拔持議端方直而不苛故宗人咸曰正如衛太史率性廉介懷貞抱潔嗣家風之清白紹遺訓於儒素故宗人咸曰清如魯士師兼備四德具體而微公之謂矣小子常以無兄弟移其睦於朋友少孤移其孝於叔父天將窮我而奪其志故罔極之痛仍集焉朴魯甚騃不能文字敢用書宗人之辭以致其直故質而俚輟哭紀事哀不能文故敘而終焉從父弟宗直生剛健好氣自字曰正夫聞人善立以為己師聞人惡若己讎見佞色諂笑者不忍與坐語善操觚牘得師法甚備融液屈折奇峭博麗知之者以為工作文辭淡泊尚古謹聲律切事類撰漢書文章為四十卷歌謠言議纖悉備具連纍貫統好文者以為工讀書不廢蚤夜以專故得上氣病臚脹奔逆每作害寢食難俯仰時少間又執業以興呻痛咏言雜莫能知兄宗元得謗於朝力能纍兄弟為進士凡業成十一年年三十三不舉藝益工病益牢元和十年宗元始得召為柳州刺史七月南來從余道加瘧寒數日良已又從謁雨雷塘神所還戲靈泉上洋洋也歸臥至旦呼之無聞就視形神離矣嗚呼天實折余之形殘余之生使是子也能無成是月二十四日出殯城西北若干尺死七日矣俟吾歸與之俱志其殯雲峰和尚族郭氏號法證一作澄為竺乾道五十有七年年七十有八貞元十七年九月十七日終十月二十七日葬凡度學者五萬人為弟子者三千人色厲而仁行峻而周道廣而不尤功高而不有毅然居山之北峰以為儀表世之所謂賢人大臣者至南方咸所嚴事由其內者聞大師之言律義莫不震動悼懼如聽誓命由其外者聞大師之稱道要莫不悽欷欣踴如獲肆宥故時推人師則專其首詔求教宗則冠其位披山伐木崇構法宇則地得其勝捐衣去食廣閲㣥經則理得其深其道實勤而其心無求自大師化去教亦隨喪嗚呼大師之葬門人慕號長老愁痛遂相與以為茲塔礱石峻整植木蓊茂凡衡山無與為比者然而未有能紀其事余既與大乘師重巽遊巽其徒也亟為余言故為其銘銘曰苞元極兮韜大方威而仁兮幽以光行峻潔兮貌齊莊氣混溟兮德洋洋演大律兮離毫芒度㣥有兮耀柔剛棟宇立兮像法彰文字闡兮聖言揚詔褒列兮宅南方道之廣兮用其常後是式兮宜久長閟靈室兮記崇岡即元石兮垂文章學者慕兮哀無疆衡山中院大律師曰希操沒年五十七既沒二十七年其大弟子誡盈奉公之遺事願銘塔石公咱姓凡去儒為釋者三十一祀掌律度衆者二十六會南尼戒法壞而復正由公而大興衡嶽佛寺毀而再成由公而丕變故當世之士若李丞相泌道未嘗屈覩公而稽首尊之不名出世之士若石廩瓚公言未嘗形遇公而歎息推以護法是以建功之始則震雷大風示其兆滅跡之際則隕星黑祲告其期斯為神怪不可度已故其與物大同終始無爭受學之衆他莫能偕也凡所受教若華嚴照公蘭若貞公荊州至公律公皆大士凡所授教若惟瑗道郢靈幹惟正惠常誡盈皆聞人嗚呼始終哉為之銘曰首有承兮卒有傳革大訛兮持法權衆之至兮志益虔雷發兆兮功已宣星告妖兮壽不延靈變化兮迎大仙礱茲石兮垂萬年世有壞兮德無遷太尉始為涇州刺史時汾陽王以副元帥居蒲王子晞為尚書領行營節度使寓軍邠州縱士卒無賴邠人偷嗜暴惡者卒以貨竄名軍伍中則肆志吏不得問日㣥行丏取於市不嗛輒奮擊折人手足椎釜鬲甕盎盈道上袒臂徐去至撞殺孕婦人邠寧節度使白孝德以王故戚不敢言太尉自州以狀白府願計事至則曰天子以生人分公理公見人被暴害因恬然且大亂若何孝德曰願奉教太尉曰某為涇州甚適少事今不忍人無寇暴死以亂天子邊事公誠以都虞候命某者能為公已亂使公之人不得害孝德曰幸甚如太尉請既署一月晞軍士十七人入市取酒又以刃刺酒翁壞釀器酒流溝中太尉列卒取十七人皆斷頭注槊上植市門外晞一營大譟盡甲孝德震恐召太尉曰將奈之何太尉曰無傷也請辭於軍孝德使數十人從太尉太尉盡辭去解佩刀選老躄者一人持馬至晞門下甲者出太尉笑且入曰殺一老卒何甲也吾戴吾頭來矣甲者愕因諭曰尚書固負若屬耶副元帥固負若屬耶奈何欲以亂敗郭氏為白尚書出聽我言晞出見太尉太尉曰副元帥勳塞天地當務始終今尚書恣卒為暴暴且亂亂天子邊欲誰歸罪罪且及副元帥今邠人惡子弟以貨竄名軍籍中殺害人如是不止幾日不大亂大亂由尚書出人皆曰尚書倚副元帥不戢士然則郭氏功名其與存者幾何言未畢晞再拜曰公幸教晞以道恩甚大願奉軍以從顧叱左右曰皆解甲散還火伍中敢譁者死太尉曰吾未晡食請假設草具既食曰吾疾作願留宿門下命持馬者去明旦來遂臥軍中晞不解衣戒候卒擊柝衛太尉旦俱至孝德所謝不能請改過邠州由是無禍先是太尉在涇州為營田官涇大將焦令諶取人田自占數十頃給與農曰且熟歸我半是歲大旱野無草農以告諶諶曰我知入數而已不知旱也督責益急農且饑死無以償即告太尉太尉判狀辭甚巽使人來諭諶諶盛怒召農者曰我畏段某耶何敢言我取判鋪背上以大杖擊二十垂死輿來庭中太尉大泣曰乃我困汝即自取水洗去血裂裳衣瘡手注善藥旦夕自哺農者然後食取騎馬賣市穀代償使勿知淮西寓軍帥少尹榮剛直士也入見諶大罵曰汝誠人耶涇州野如赭人且饑死而必得穀又用大杖擊無罪者段公仁信大人也而汝不知敬今段公惟一馬賤賣市穀入汝汝取之不恥凡為人傲天災犯大人擊無罪者又取仁者穀使主人出無馬汝將何以視天地尚不愧奴隸耶諶雖暴抗然聞言則大愧流汗不能食曰吾終不可以見段公一夕自恨死及太尉自涇州以司農徵戒其族過岐朱泚幸致貨幣慎勿納及過泚固致大綾三百匹太尉壻韋晤堅拒不得命至都太尉怒曰果不用吾言晤謝曰處賤無以拒也太尉曰然終不以在吾第以綾如司農治事堂棲之梁木上泚反太尉終吏以告泚泚取視其故封識具存元和九年某月日守永州司馬員外置同正員柳宗元謹上史館今之稱太尉大節者出入以為武人一時奮不慮死以取名天下不知太尉之所立如是宗元嘗出入岐周邠斄間過真定北上馬嶺歷亭鄣堡戍竊好問老校退卒能言其事太尉為人姁姁常低首拱手促步言氣卑弱未嘗以色待物人視之儒者也遇不可必達其志決非偶然者會州刺史崔公來言信行直備得太尉遺事覆校無疑或恐尚逸墜未集太史氏敢以狀私於執事謹狀公字惟深其先河東人晉永嘉年有濟南太守卓者去其土代仕江左公實後之柳氏自黃帝后稷降於周魯以字命族因地受氏載在左氏內外傳及太史公書自卓至公十有一代為士林盛族著於南朝歷代史及柳氏家牒惟公質貌魁傑度量宏大宏和博達而遇節必立恢曠放弛而應機能斷其居室奉養撫字之誠儀於宗戚而內行著焉其蒞政柔仁端直之德洽於府寺而外美彰焉凡為學略章句之煩亂采托奧旨以知道為宗凡為文去藻飾之華靡汪洋自肆以適己為用自始學至於大成耽嗜文籍注意鑽礪倦不知游息威不待檟楚儒言雅旨夙有聞知年十餘歲有稱神巫來告曰若相法當夭且賤幸而為釋可以緩而死耳位祿非若事也公諸父素加撫愛尤所信異遽命奪去其業從巫之言也公不可且曰夫性命之理聖人所罕言搢紳者所不道巫何為而能盡之也且令從之而生去聖人之教而為異術不若速死之愈也於是為學甚篤其在童幼固不惑於怪譎矣開元中舉汝州進士計偕百數公為之冠禮部侍郎韋陟異而目之一舉上第調授宋州單父尉操斷舉措通乎細大潔廉檢守形於造次加雲騎尉秩滿江南西道連帥聞其名辟至公府以信州都邑人罹凶害靡弊殘耗假守永豐令公於是用重典以威姦暴溥太和以惠鰥嫠毆除物害消去人隱吏無招權乾沒之患政無犯令厖茸之蠧宰制聽斷漸於訟息耕夫復於封疆商旅交於關市既庶而富廉恥興焉既富而教庠孰列焉里閈大變克有能稱遂表為洪州豐城令到職如永豐之政而仁厚加焉授衢州司馬夫器宏者恥效以圭撮之任足逸者難局以尋常之地公遂滅迹藏用遁隱於武寧山㣥公交書諸侯走幣皆謝絶不就方將究賢人之業窮君子之儒味道腴以代膏粱含德輝而輕紱冕遺榮養素恬淡如也朝右籍甚有聲徵拜御史公曰君命也安敢逃乎即日裝束上道公常好大體不為細故家之迫速非其志也以疾辭授右補闕不隱忠以固位不形直以干名除殿中侍御史賜緋魚袋赴江西與租庸使議復榷鐵及常平倉便宜制置得以專任和鈞關石之緒出納平準之宜國利人逸得其要道遷侍御史充江南西路都團練判官時屬支郡不知連帥之職公請出巡盡征之地大詰姦謬所至風動其有非常之政裕於人者必舉其課績歸之使府又以文采殷勤歌詠之俾其風謠頌聲聞於他部達於京師而後已改祠部員外郎轉司勳郎中餘如故就拜袁州刺史公於是酌古良牧之政宜於今者宗而奉之考諸理國之說稱於人者承而守之均利器用以致其富昭明物則以教之禮示優裕之德以周惠利緩九賦推廣厚之心以固和慈保萬人明其制量臨長㣥吏示之法禁考中備敗無不得其極理行高第朝廷休之召拜諫議大夫充浙江東西道黜陟使將舉其能政端於外邦也公則修虞書之考績舉漢代之課第處事詳諦無依違故縱之敗奉法端審無隱忌峭刻之文時分部所繫於公尤重陵江並海竟吳越之域皆所蒞焉復命稱職加朝散大夫又拜左庶子集賢殿學士奉翊儲后修其宮政統理文籍紀於祕府拜尚書右丞直而多容簡而有制去苛削之文而吏皆率法務宏大之道而政不失中加銀青光祿大夫遷右散騎常侍涇卒之亂公以變起卒遽盡室奔匿於終南山賊徒訪公所在追以相印既及公而問焉公變名氏以紿之捐家屬以委之賊遂執公愛子榜箠訊問折其右肱而公不之顧即步入窮谷披草徑踰秦嶺由褒駱朝於行宮上嘉其誠節不時召見公頓首流涕纍陳計畫賊平策勳賜輕車都尉封宜城縣開國伯拜尚書兵部侍郎初公名載字元輿至是奏請改命以滌僞署之汙是歲盜據淮滸方議討戮宰相以大理評事李元平者有名以為才堪攘寇拜為汝州㣥臣望聲狥利者皆曰德舉公獨慷慨言於朝曰是夫喋喋衒玉而賈石者也王衍誤天下殷浩敗中軍華而不實異代同德往且見獲何寇之攘時人不之信也未幾盜襲汝州以元平歸凡百莫不嗟服焉俄以本官同中書門下平章事登翊聖皇匡弻大政造膝盡規諫之志當事無矜大之容援下情於上以酌天心順嘉謨於外用彰君德故致績用茂著而人罕知之然其章布於外敷聞在下者十一二焉貞元初上以甸服長人天下理本於是親擇郎吏分宰於京師外部未幾而人謠大和擊壤之頌歸於帝力上召丞相告之左僕射平章事張延賞忭蹈稱慶公俯伏不賀且曰甸服之政固宜慎重然此屑屑者特京兆尹之職耳陛下當擇臣輩以輔聖德臣當選京兆以承大化京兆當求令長以親細事夫然後宜捨此而致理可謂愛人矣然非王政之大倫也不知所賀上深然之漢惠悅曹參之言絳侯慚曲逆之對考之前志我無負焉既而西戎乘間入邑詐以請盟侍中北平王燧建議許之自公卿以下莫有異慮公獨陳謀獻畫言戎之詐固不可許竟留中不下而前議遂行於是冊命上將蒞盟諸戎戎果縱兵逼好大毆掠而去上召對前殿嘉歎者久之時諫臣有廷諍陷於訕上者上未之善也公從容候間陳古以諷所以示寬裕之德招讜正之言詞旨切直意氣勤懇動合聖謨卒見納用無何工人有以理乘輿服器得罪於左右者有司以盜易御物請論如法制初可之公不奉詔因抗疏曰迹其罪狀未甚指明方春殺人恐傷和氣上覽之大悅即原其罪刑官慎恤之事正於邦典聖君含育之德彰於天下論者難之時上相與光祿卿裴腆不協候公休沐以御酒或闕陰請貶之制命既行公堅執不下請訊支計之吏校其供入之實原本定罪窮理辨刑而腆竟獲宥克復本職白志貞有羇靮之勤獻利屢中上嘉其功效特寵異之方議大用公以為胥徒雜類出自微賤負乘致寇盜之招也纍疏以聞而止公竭誠盡忠憂勞庶務有耄忘之疾懇迫陳讓除右散騎常侍罷知政事貞元五年二月五日薨於昌化里終於散地故褒贈不及惟公致君之志孜孜焉不有怠也立誠之節侃侃焉無所屈也故處心積慮博蹇之道表於朝端弻違釋回朴忠之誠沃於帝念內有敢言之勇進當不諱之明用能直道自達而無罪悔者也公纍更重任祿秩之厚布於宗姻無一廛之土以處其子孫無一畝之宮以聚其族屬待祿而飽傭室而安終身坦蕩而細故不入其達生知足落落如此夫其子恭父慈善行也拊循制理能政也直廉潔靜儉德也拒疑獨斷明識也冒危以扞牧圉大節也犯顏以陳訏謨至忠也有一於此尚宜旌褒矧茲備體焉可以已固當飾以榮號章示後來而故吏遺孤淪寓遐壤久稽彞典罪在宗屬敢用評隲舊行敷贊遺風若乃揚孔氏褒貶之文舉周公懲勸之法徵於誄諡則有司存謹狀公姓陳氏自潁川來隸京兆萬年胄貴里諱京既冠字曰慶復舉進士為太子正字咸陽尉太常博士左補闕尚書膳部考功員外郎司封郎中給事中祕書少監自考功以來凡四命為集賢學士德宗登遐公病痼輿曳就位備哀敬之節由是滋甚遂以所居官致仕貞元二十一年四月二十五日終於安邑里妻黨之室無子伯兄前監察御史璫仲兄前大理評事萇以公文行之大者告於嘗吏於公者使辭而陳之大歷中公始來京師中書常舍人衮楊舍人炎讀其文驚以相視曰子雲之徒也常以兄之子妻公由是名聞遊太原太原尹喜曰重客至矣授館致餼厚以泉布獻焉公曰非是為也某嘗為北都賦未就願即而就焉其宮室城郭之大河山之富關閈之壯與其土疆之所出風俗之所安王業之所由興苟得聞而覩之足矣若曰受大利是以利來蓋異前志也吾不能敢辭遂逆大河踰北山徜徉而歸賦成果傳天下為咸陽尉留府廷主文章決大事得其道為博士舉疵禮修墜典合於大中者衆焉涇人作難公徒行以出奔問官守段忠烈之死上議罷朝七日宰相曰不可方居行宮無以安天下公進曰是非宰相之言天子褒大節哀大臣天下所以安也况其特異者乎上用之其勞勤一作勤勞侍從謀議可否時之所賴者大巡狩告至上行罪已之道焉曰凡我執事之臣無所任罪豫惟不謹於理而有是也將復前之為相者公曰天子加惠㣥臣而引慝焉德之厚也而為相者復無以大警於後且示天下率其黨爭之上變於色在列者咸恟而退公大呼曰趙需等勿退遂進而盡其辭焉不果復上迎訪太后間數歲外頗怠其禮公密疏發之天子感悅焉初禮部試士有與親戚者則附於考功莫不陰授其旨意而為進退者及公則否卓然有有司之道不可犯也太廟闕東向之禮且久矣公自為博士補闕尚書郎給事中凡二十年勤以為請殷祭之不墜繄公之忠懇是賴故有赤紱銀魚之報焉昭陵山峻而高寢宮在其上內官懲其上下之勤挽汲之艱也謁於上請更之上下其議宰相承而諷之召官屬使如其請公曰斯太宗之志也其儉足以為法其嚴足以有奉吾敢顧其私容而替之也奏議不可上又下其議凡是公者六七人其餘皆曰更之便上獨斷焉曰京議得矣從之在集賢奏祕書官六員隸殿內而刊校益理納資為胥而仕者罷之求遺書凡增繕者乃作藝文新志制為之名曰貞元御府㣥書新録始御府有食本錢月權其贏以為膳有餘則學士與校理官頒分之學士常受三倍由公而殺其二書史之始至入禮幣錢六十緡亦皆分焉公悉致之官以理府署作書閣廣㣥官之堂不取於將作少府而用大足居門下簡武官議典禮上以為能益器之與信臣議且致相位遇公有惑疾使視之疾甚不能知人遂不用用鄭吏部高太常為相而以祕書命公所以示優之也公有文章若干卷深茂古老慕司馬相如揚雄之辭而其詁訓多尚書爾雅之說紀事朴實不苟悅於人世得以傳其藳其學自聖人之書以至百家諸子之言推黃炎之事涉歷代洎國朝之故實鈎引貫穿舉大苞小若太倉之蓄崇山之載浩浩乎不可知也豈楊子所謂仲尼駕說者耶夫其忠烈之褒也相府之有誡也太廟之東向也昭陵之不更其故也官守之不可奪也立言之不可誣也利之不苟就也害之不苟去也其忠類朱雲其孝類潁考叔廉類公儀休而又文以文之學以輔之而天子以為之知既得其道又得其時而不為公卿者病也故議者咸惜其始而哀其終焉公之喪凡五十四日而夫人又沒毀也夫人之父曰偕司農卿祖曰某贈太子太保宗元故集賢吏也得公之遺事於其家書而授公之友以志公之墓謹狀永貞元年八月五日尚書禮部員外郎柳宗元狀
