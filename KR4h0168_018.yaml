body:
  text: 門下朕聞自古帝王光膺圖籙則尊尊親親之義著於典謨諒在至公蓋非獲巳我大唐乘時撫運累聖重光當四海之樂推受三靈之眷命大行皇帝奄棄㝢縣痛結仇讎朕志掃巨逆保寧嗣主今皇帝哀煢在疚託於朕躬勤懇再三願成茲意朕以不德猥承丕緒念今追昔載感於懷若涉大川罔知攸濟思荷宗祧之業屬此惟新式揚渙汗之恩與之更始可大赦天下頃屬昊穹降禍雲馭上僊外戚成挾主之謀奸臣起移國之計皇太子隆基見危而起補天立極朕方息肩朱邸拭目清時幸太平之無事期小山之自逸溫王以推崇叔父固禪萬機隆基以克獎帝圖進登儲貳此則明有日月幽有鬼神朕不敢執私而廢公違衆而專意也今君臣既定天下巳安欽奉鴻業思臻至理推心兆人之上畢至千秋之下猶望始終一德無有貳心人其視余天實知我如聞在外尚有浮言睥睨朝廷窺測閒隟或云朕意欲脫屣宸居或云東宮乃主器非長嗚呼無識曾莫之思昔唐堯帝摯之弟也昇於帝位王季太伯之少也立為太子能明俊德光啟邦家闕四字屢有流言潛圖廢立止以為中宗之時吾乃一王耳憂危不暇今靜禍難安社稷天下利之所謂非常之事不可以常禮議之地有二南載懷敦睦罪非七國奄隔休明故左金吾衞大將軍兼益州都督上柱國成王千里懿親賢德高才重器強力幹事獨冠等倫保國乂人克成忠義願除凶醜翻陷誅夷永言淪沒良深痛悼俾復舊班用加新寵可還舊官甯嘉勗能重明節事高欒向幽塗巳往生氣凜然靜言忠義追崇襃寵可贈永和縣令門下朕聞唐虞膺錄畫象而人知禁夏商御圖設刑而罪不息周秦以降沿革罕同漢魏而還條流浸廣雖或輕或重一弛一張義在於訓人事期於肅物然則刑辟勿用見稱於昔典法令滋章貽譏於前哲朕情在愛育志切哀矜踈網恢恢實素懷之所尚苛政察察良夙心之所鄙方冀化致無為業先刑措近見所司進律令格式一一自觀至於經國成務之規訓俗懲違之範萬目咸舉一事無遺但能奉以周旋守而勿失自可懸諸日月播之黎庶何事不理何化不成先聖憂勤萬務省念庶績或慮須有弛張所以迅令刪定今既綱維備舉法制宏通理在不刊義歸無改豈可更有異同別加撰削必年月久遠於時用不便當廣延㣥議與公卿等謀之今未有疑無容措筆其先律令格式之本宜早宣布凡厥在職務須遵奉輒造異端妄踰軌躅者咸禁除之庶用刑符於畫一守法在於無二內外寮寀知朕意焉門下功定宗社者可以高邁等夷事超縑者故能永昭徽烈鎮國太平公主若華分景穠李流芳以同氣之親鍾先朝之愛忠孝行己仁明絕倫才無不周識無不綜頃夷國難爰戴朕躬大義動天懇誠貫日氛祲巳廓每聽鳴謙之詞井田未優復聞辭貴之請朕方至公被物豈以小節從人宜增土宇更傳帶礪可加實封一千戶朕聞曾氏之孝也慈親惑於疑聽趙虜之族也明主哀而望思歷考前聞率由舊典重俊大行之子元良守器往罹搆閒困於讒嫉莫顧鈇鉞輕盜甲兵有此誅夷無不悲惋今四凶咸服十起何追方申赤暈之冤以紓黃泉之痛可贈皇太子諡曰節愍陪葬定陵慎終追遠斯乃舊章表德旌賢有光常策故中書令裴炎含和稟粹履信居貞望重國華才稱人秀唯幾成務績宣於代工偶居無猜義深於奉上文明之際王室多虞保乂朕躬實著誠節而危疑起釁倉卒罹災歲月屢遷邱封莫樹永言先正感悼良多宜追賁於九原俾增榮於萬古可贈益州大都督門下才為於時以宣可大之業精貫於日以定非常之勛古稱王佐今乃人傑太中大夫守兵部侍郎兼知雍州長史修文館學士騎都尉安平縣開國子崔日用果行育德修辭立誠孝則揚親忠於事主堂堂乎貌暢君子之風諤諤其言蘊大臣之節故能書讀萬卷文窮四始高步登朝平心待物日者醜孽未殄嘉謀潛斷臨危不顧見義而作是用厎績實所繄賴師兵戢矣京兆晏如宜緝台階之政式拜掖垣之寵可銀青光祿大夫行黃門侍郎參知機務學士勳封如故主者施行尚書右僕射同中書門下三品監修國史許國公蘇王褱自周旋近密損益樞機謨猷有成弼賛無怠頃者遺恩顧託先意昭明奸回動搖內外危逼獨申讜議實挫邪謀況藩邸寮屬念殷惟舊無德不報抑惟令典可尚書左僕射皇后公主既尊且親有遷幽之義無戮辱之典倉卒之時亂兵所及致不以禮深用憮然宜矜罪戾且慰泉壤韋氏可一品禮葬悖逆庶人可二品禮葬所司準式故儋州司馬薛季昹剛幹義烈早承先顧驅策中外績譽昭宣有張湯之推舉同汲黯之強直屬醜正操衡除其異巳橫加竄責卒至殂亡言念忠冤有懷嘉悼可贈左御史大夫仍同敬暉等例與一子官故許州司戶參軍燕欽融先陳忠讜頗列章奏雖干非其位而進不顧身永言奄亡誠所傷悼方開諫路宜慰窀穸可贈諫議大夫仍令備禮改葬特授一子官故蘇安恒文學基身鯁直成操往年抗䟽忠讜可嘉屬回邪擅搆奄從非命興言軫悼用惻於懷宜贈寵章式旌徽烈可贈諫議大夫襃德紀功事華典冊飾終追遠理光名教吏部尚書張柬之翼戴興運謨明帝道經綸謇諤風範猶存往屬回邪搆成釁咎無辜放逐淪沒荒遐言念勳賢良深軫悼宜加寵贈式賁幽泉可贈中書令封漢陽郡公夫不吐剛而諂上不茹柔而黷下者君子之事也踐霤必繩登車無屈者正人之務也中大夫行長安縣令李朝隱見義不回強直自遂亟聞嘉政累著能名近者品官入縣有乖儀式遂能責之以禮繩之以愆但閹豎之流多有憑恃柔寬之代必弄威權每觀載籍常所歎息朕規誡前古勤求典憲能副朕意實賴斯人昔虞延持皇后之客梅陶鞭太子之傅古稱遺直復見於今思欲旌其美行遷以重職為時屬閱戶政在養人宜加一階用表剛烈可太中大夫特賜中上考兼絹百匹以忠報國典冊所稱感義捐軀名節斯在故右羽林大將軍上柱國遼陽郡王李多祚三韓貴種百戰餘雄席寵禁營廼心王室仗茲誠信翻陷誅夷賴彼神明重清姦慝永言徽烈深合襃崇宜追歿後之榮以復生前之命可還舊官仍宥其妻子潞州刺史趙彥昭交結回邪諂附凶孽輿金輦貨冒寵祈榮可歸州刺史建官惟賢典誥丕訓任人以器先王令圖蓋欲庶政和平萬邦祗乂朕以寡昧克纉休業求衣側席無忘寤寐頃屬奸回擅權撓亂綱紀互相引進遞為比周點汙清朝實繇於此遂使玉石無辨涇渭莫分其制勅授官宜令所司勘責不因別功遂越賞授先有負犯罔冒得官並量事處分彰善癉惡異等區分梟鸞不接羽蒿蘭不同類宣示中外知朕意焉元元皇帝朕之始祖無為所庇不亦遠乎第八女西城公主第九女昌隆公主性安虛白神融皎昧並令入道奉為天皇天后宜於京城右造觀仍以來年正月令二公主入道才生於代必以經邦官得其人故能理物朕恭膺大寶慎擇庶僚延佇思英無忘終食思欲蕭艾咸採葑菲不遺而商山幽曠渭濱寂寞夫以貴耳賤目殊通方之論捨近謀遠非應務之術今四方選舉㣥才輻湊操斧伐柯求之不遠其有能明三經通大義者能綜一史知本末者通三教宗旨究精微者善六書文字辨聲象者度雅曲和六律五音者習韜略學孫吳識天時人事者暢於詞氣聰於受領善敷奏吐納者咸令所司博採明試朕親覽焉惟天生人牧以元后維皇立國副以儲君將以保綏家邦安固後嗣者也朕纂承洪業欽奉寶圖夜分不寢日昃忘倦茫茫四海懼一人之未周蒸蒸萬姓恐一物之失所雖卿士竭誠守宰宣化緬懷庶域仍未小康是以求下人之變風遵先朝之故事皇太子隆基仁孝因心溫恭成德深達理體能辨皇猷宜令監國俾爾為政其六品巳下除授及徒罪巳下並取太子處分朕聞釋及元宗理均迹異拯人救俗教別功齊豈於中閒妄生彼我不遵善下之旨相高無上之法有殊聖教頗失彞章自今每緣法事集會僧尼道士女冠等宜令齊行並進自頃以來政教尤闕時或水旱人多困弊府庫益竭寮吏日滋僶俛政途罔然如失雖繇朕之薄德固亦輔佐非才安石可尚書左僕射東都留守元振可吏部尚書懷貞可左御史大夫說可尚書左丞並停知政事朕以眇身紹膺鴻緒紫機夙讓黃屋非尊屬天衢未亨王室多難載迫公卿之議遂膺歷數之重凜乎馭朽慄若涉泉自臨萬邦斯為三載頃者居遏密之際莫議郊禋之禮霜露之思日月增深今三元告辰萬物伊始假於清廟昇彼圜丘躬耕祈穀率禮斯備太官視膳而牲潔奉常陳樂而邕和爰自降制之始迄於禮畢之際祥風律瑞日揚光卿雲紛集於壇場甘露傍流於郊甸非常之慶豈獨在予宜因天地之心式覃雷雨之澤可大赦天下設官分職本期致理惟賢是任匪私親昵若使才勝其任望重於時一日累遷固未為速如或化工無取考績非明十年不調豈應論屈頃者官失其序僥倖路開人不務德惟速是視在職無幾妄希遷陟又每謁見之時多請仗下奏事不聞公議惟乞榮班王爵與能豈繇干請朕雖遠慙聖哲多媿大明自臨寰宇斯焉兩載卿士人材皆所知悉不被昇擢蓋自取之當務責躬何宜往訴且難進而易退君子格言後己而先人往哲明訓周文多士虞舜舉才克讓滿朝故稱為理今位參臺省階列通班唯務趨競餘何足紀朕方欲大革澆浮俾歸淳俗自今巳後謁見之日若更有干冒祈榮者雖地處親勳才稱俊秀皆當格之清議一從屏黜崇廉恥之節洽昇平之化故左僕射齊國公魏元忠代協人望時稱國良歷事三朝俱展誠效晚年遷謫頗非其罪宜特還其子著作郎晃實封一百戶王道至公所以承於天地臣心一德所以固於邦家朕紹膺丕業務存惠冀有恥且格無侵于刑如聞百司非常寬縱凡是與奪公然囑請及其不遂即生謗鑠御史縱知亦不彈糾文昌會府衆務所歸御史憲司繩劾斯舉自今巳後王公朝士有囑請者所繇官密奏聞若苟相容隱御史訪察彈糾朕聞措刑由於用刑去殺存乎必殺明罰峻典自古而然立制齊人於是乎在自我朝建國僅將百年天下和平其來巳久往承隋季守法頗專比襲時安持綱日緩況朕薄德甚莫逮先惟人難理遠不如昔粵從守位三載於茲庶務煩勞不損晷景嘗謂自我作則感而成化痛乎迷俗忘返不威罔懲將至純風先歸重典比者贓賄不息偷濫公行放心未寧禁犯無懼此焉暫革期於永平遂割小慈以崇大體自今巳後造偽頭首者斬仍沒一房資財同用廕者並停奪非頭首者絞其承前造偽人限十日內首使盡官典主司枉法受贓一匹以上先決杖一百其緣贓及惡狀被解及與替者非選時不得輒入京城縱家貫在京不得輒至朝堂妄有披訴如有此色並決杖仍加貶斥其先在京城者限三日內勒還上下官僚輒緣私情相囑者其受囑人宜封狀奏聞成器巳下朕自決罰其餘王公巳下並解見任官三五年閒不須齒錄其進狀人別加襃賞御史宜令分察諸司若有罪過不能糾獲者貶與外官門下疇庸懋賞允屬親賢利建䟽封式固藩屏光祿勳兼左金吾衞大將軍邠王守禮器資文武節蘊忠貞容範霞軒孝友天至豈如服儒歸美諒以樂善稱仁載叶推恩增其井賦作夫屏翰誓以山河門下敦教睦親事光彞典分形共氣理冠恒倫宣城公主慶聯霄極榮開邸館柔闕應圖婉順為範義歸從子榮匪求郎國難初平朝獎思及宜加井賦式崇優寵可加實封五百戶故吏部侍郎同中書門下平章事吉頊體識宏遠風規久大嘗以經術之才允膺匡佐之委曩時王命中圯人謀未輯首陳反正之議克創祈天之業永懷忠烈寧忘厥勳可贈御史大夫門下舜去四凶而功格天地武有七德而戡定黎人故知有大勳者必受神明之福仗高義者必為匕鬯之主朕恭臨寶位亭育寰區以萬物之心為心以兆人之命為命雖承繼之道咸以冢嫡居尊而無私之懷必推功業為首然後可保安社稷永奉宗祧第三子平王隆基孝而克忠義而能勇比以朕居藩邸虔守國彞貴戚中人都無引接㣥邪害正兇黨實繁利口工言讒說罔極韋溫延秀朋徒競起晉卿楚客交搆其閒潛結回邪排擠端善居人集木君子阽危愒日視陰朝不保夕擁羽林萬騎率左右屯營先害朕躬并及太平公主中外良士咸擬剿屠隆基密聞其期先難奮發挺身鞠旅衆應如歸呼吸之閒凶渠殄滅安七廟於幾墜濟㣥生於將殞方舜之功過四比武之德逾七靈祇望德昆弟樂推一人元良萬邦以定為副君者非此而誰可立為皇太子有司擇日備禮冊命集州刺史譙王重福幼則兇頑長而險詖幸託體於先聖嘗通交於巨逆不臣不子自絕於天有國有家莫容於代往者頗不含忍長令幽縶自大行晏駕韋氏臨朝將肆屠滅尤加防衞洎天有成命集於朕躬永懷猶子之情庶叶先親之義所以開置寮屬任隆刺舉冀其悛改以怙恩榮而詿誤有徒狂狡未息便即私出均州詐乘驛騎至於都下遂逞其謀先犯屯兵次燒左掖計窮力屈投河而斃雖人所共棄邦有常刑我非不慈爾自招咎具聞其故有惻於懷昔劉長既沒楚英遂殞以禮收葬抑惟舊章屈法申恩宜仍舊寵可以三品禮葬朕聞彰善癉惡有國之常典糾寬濟猛為政之通規朕以薄德濫膺明命瞻言賞罰未適時宜至使忠良未進小人未退貪吏未懲流亡未安賢良者未歸懷冤者未理在予之責有愧良深不能致君於堯舜者亦㣥公㣥士之所恥也卿等將何規補使致咸亨各以狀聞朕當親覽其才望兼優公清特著可以宣風道俗者具以名聞但百司承寬共為苟且事多咎無復紀綱令各本司長官審善惡才識限十日進狀庠序之興教自元子禮經之最奠始先師中古迄今斯道無替皇太子天資聖敬日就文明絃誦之業巳高元良之德斯茂自昇儲博望主器承華執經之問雖勤用幣之意未展今仲丁獻吉有事兩塾備禮三尊宜遵舊章俾緝徽典營建創造必有所因豈欲勞人蓋不獲己朕頃居諒闇煢疚於懷奉為則天皇后東都建荷澤寺西都建荷恩寺及金仙玉真公主出家京中造觀報先慈也豈願廣事營構虛殫力役朕每卑宮菲食夕惕宵衣惟木從繩虛心啟沃所欲修營兩觀外議不識朕心書奏頻繁將為公主所置其造兩觀並停其地便充金仙玉真公主邑司令竇懷貞檢校所有錢物瓦木一事以付公主邑司收掌諸處供兩觀用作調度限日送納邑司朕當別處創造終不勞煩百姓此度修葺公私無損若有干忤當寘于刑朕聞御宸極握靈圖為天下之尊居域中之大者上以奉宗廟下以育黎元迹宜彰於編事須聞於朝野朕高宗少子特蒙慈愛顧復之至禮絕諸王運屬上仙時遭家難中宗出藩大聖天后臨朝以權立朕為嗣朕自惟虛薄固讓中宗誠願上從用寧社稷比居藩邸深嘉清閑不意景龍之閒先帝暴棄天下凶族潛計謀覆邦家高祖之業幾墜於地皇太子隆基忠孝天感仗義行誅一夕之閒戡定禍難朕當宿夕初不聞知及見事平且悲且慰方與四海同奉嗣君子溫王幼沖頻屬艱疚因發驚悸日夜啼號因以先聖立朕為太弟之意令鎮國太平長公主諫議大夫薛稷等奉承先旨朕固誠請至於再三乃使中書舍人蘇頲奉表陳乞襄王便不肯視事避於別宮中外皇皇莫知所向隆基鎮國太平長公主成器範業薛稷劉幽求麻嗣宗等以為宗廟不可無主萬幾不可暫曠且從人望因定策禁中朕又固辭僉謀卿士得蕭至忠崔湜韋嗣立趙彥昭麻嗣宗薛儆鄭萬均唐晙等同辭勸進以為幼主之心既不可奪先聖之旨固不可違事不獲巳乃順衆望要盟之言其文猶在朕纂承洪業於今三年謂宗廟郊天大禮斯備永惟所以獲奉宗禋臨兆人者蓋非朕之本心實乃鎮國太平長公主皇太子諸王郡公之意也雖禺禺之誠四海同望然因時致力在此數人巳依西漢舊章各酬其德董狐執筆闕而未書宜勅左右編於史冊汝為孝友須遵朕命用陟元后無宜固辭汝為季俗多虞淳風未洽欲朕回慮兼理萬幾昔舜之禪禹猶躬行巡狩況朕授汝豈忘家國其軍國大務及授三品巳上并重刑獄當兼省之劉幽求風雲元感川嶽萃靈學綜九流文窮三變義以臨事精能貫日忠以成謀用若投水茂勳立艱難之際嘉謨盈啟沃之初存讜直以不顧為姦邪之所忌釁萌頗露譖端潛發元宰見逐讒人孔多既殄㣥凶方宣大化期問政於經始載登賢於夢卜可依舊金紫光祿大夫守尚書左僕射知軍國事監修國史上柱國徐國公仍依舊還封七百戶并賜錦衣一襲
