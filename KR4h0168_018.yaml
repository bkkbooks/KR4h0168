front:
  text: 全唐文欽定全唐文卷十八帝諱旦高宗第八子龍朔二年生封殷王乾封元年徙封豫王總章二年徙封冀王初名旭輪改名輪上元三年徙封相王永淳二年又封豫改今名嗣聖元年二月即位武后臨朝天授元年降為皇嗣仍名輪聖歷元年又封相復今名神龍二年改封安國相王唐隆元年六月復辟延和元年八月傳位元宗在位三年年五十五諡曰大聖貞皇帝廟號睿宗加尊元真大聖大興孝皇帝集十卷
