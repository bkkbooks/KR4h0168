front:
  text: 全唐文欽定全唐文卷一百七後唐明宗二
  hash: sha256:eddf4ca707738010a51cf5f9c5af66a9740b437d4bc9ce781c699d9f57771019
body:
  text: 朕臨御寰區當明賞罰刑既加於有罪道貴洽於無私將據親踈宜分皂白特行寬宥俾釋憂疑罪人元行欽孔謙及應犯法人田宅巳從籍沒其門人使下任從穩便不詰罪尤灼然有才能者仍許所司録任四夷來王歷代故事前後各因強弱撫制互有典儀大蕃須示於威容即於正衙引對小蕃但推於恩澤仍於偏殿撫懷憲府奏論禮院詳酌皆徵故實咸有明文正衙威容未可全廢內殿恩澤且可常行若遇大蕃入朝即準舊儀於正殿排比鋪陳立仗百官排班於正門引入對見會府華資皇朝寵秩凡霑新命各納禮錢爰自近年多隳舊制遂致紀綱之地遽成廢墜之司況纍條流就從減省方當提舉宜振規繩但緣其閒翊衛勳庸藩宣將佐自軍功而遷陟示恩澤以奬酬須議從權不在其例其餘自不帶平章事節度使及防禦團練刺史使府副使行軍巳下三司職掌監務官州縣官凡關此例並可徵納其檢校官自員外郎至僕射祗初轉一任納錢若不改呼不在徵納仍委尚書省部司專切檢舉置歷逐月具數申中書門下責授費州司戶參軍豆盧革夷州司戶參軍韋說等自居台輔纍換歲華負先皇倚注之恩失大國調燮之理朕自登宸極常委鈞衡略無謙遜之辭但縱貪叨之意除官受賄樹黨徇私每虧敬於朕前徒自尊於人上道路之喧騰不巳諫臣之條疏頗多罪狀顯彰典刑斯舉合從極法以塞羣情尚緣臨御之初含宏是務特軫墜泉之慮爰施解網之仁曲示優恩俯寬後命革可陵州長流百姓說可合州長流百姓仍委逐處長知所在同州長春宮判官朝請大夫檢校尚書禮部郎中賜紫金魚袋豆盧升將仕郎守尚書屯田員外郎崇文館學士賜緋魚袋韋濤等各因權勢驟列班行無才業以可稱竊寵榮而斯久比行貶謫以塞尤違朕以纂襲之初含容是務父既寬於後命子宜示於特恩並停見任藩鎮幕職皆有舊規奏薦官寮須循前例苟或隳紊難止弊訛承前使府奏請判官率皆隨府除移停罷近年流例有異前規使府雖巳除移判官原安舊職起今後若是朝廷除授者即不計使府除移如是使府奏請即皆隨府移罷舊例藩侯帶平章事者所奏請判官殿中巳上許奏緋中丞巳上許奏紫今不帶平章事亦許同帶平章事例處分如防禦團練使奏請判官員外郎巳下不在奏緋之限其所奏判官州縣官並須將歷任告身隨奏至京如未有官假稱試攝亦奏狀內分明署出如藩鎮留後權知軍州事並不在奏請判官之限如刺史要奏州縣官須申本道請發表章不得自奏近日州使奏請從事本無官緒妄結虛銜不計職位高卑多是請兼朱紫不惟紊亂實啓僥求宜令諸道州府切準敕命處分鳳翔節度使李目嚴世聯宗屬任重蕃宣慶善有稱忠勤顯著既在維城之例宜新定體之文是降寵光以隆惇敘俾煥成家之美貴崇猶子之親宜於本名上加從字御史臺是本朝執憲之司乃四海繩違之地凡居中外皆待整齊藩侯尚展於公參邸吏豈宜於抗禮遽觀論列可驗侮輕但以喪亂滋多綱紀隳紊霜威掃地風憲銷聲今則景運惟新皇圖重正宜加提舉漸止澆訛宜令御史臺凡關舊例並須舉行稍不稟承當行朝典盧文紀自領憲綱頗思振舉備觀條奏皆叶通規李琪以內殿起居不廢辭謝蓋慮留滯乃是權宜盧文紀以正衙序班恐隳故事請次日亦可允依所請三銓免朝事繫繁省選人既少公務非多宜且依所奏鎖銓前五日免朝將來人數漸多須容點檢即許開曹後免朝永以為例付所司朕中興寶祚復正皇綱萬國駢羅俱在照臨之內八紘遼敻咸居覆載之閒矧彼雲南素歸正朔洎平僞蜀思錫舊恩於乃眷以雖深欲霈覃而未暇百蠻都首領李卑晚六姓蠻都首領勿鄧標莎等天資智勇世稟忠勤梯航之道路才通琛賮之貢輸巳至率其種落竭乃悃誠備傾向化之心深奬來庭之意今則各頒國寵別進王封其巂州刺史李及大鬼主離吠等或遙貢表函或躬趨朝闕亦宜特授官資各遷階秩勉敦信義無墜冊書示爾金石之堅保我山河之誓欽承休命永保厥終亂離斯久法制多隳不有舉明從何禁止而衣服韉馬之流多踰品式今後三京及州使職員名目是押衙兵馬使指揮使巳上騎馬得有暖坐諸都將衙官使下係名籍者只得衣紫皂庶人商旅只著白衣此後不得參雜兼有富戶或投名於勢要以求影庇或希假於攝貴以免丁徭須議條流以懲踰越如有此色人仰所在禁勘追索文書申奏當行嚴斷以肅姦欺君使臣以禮臣事君以忠禮不可一日不修忠不可一夕不念二者全則上下順一途廢則出入差須振綱維以嚴規矩凡在策名之列皆知辨色之朝儻不夙興是虧匪懈君上思政猶自求衣未明為下服勤固合假寐待旦宜令御史臺遍示文武兩班自此每日早赴朝參職司既得整齊公事的無壅滯如或尚茲懈怠具録奏聞朕以荊門伐叛方委勳臣而聞統帥縈切戎機勤劬王事致乖攝理深軫寤懷輟卿樞近之繁達我優隆之旨固於旬朔巳就宣和苟或尚未全平且要暫還本道便於將息亦可允俞委卿精白凡事詳酌審於準節庶協籌謀料度攻收撫綏軍旅咸繄明略更集殊庸倚注之心再三在念朕昨以妙選師臣往除凶孽自長驅於鋭旅將併擊於孤城巳發使臣曡頒詔諭料龍韜之此舉顧蟻垤以即平今巳漸向炎蒸不可持久切在訓齊貔虎速進梯衝必期此月之中須殄干天之逆貴令戰士免至疲勞兼冀生民早諧蘇息惟卿忠烈體朕憂勤儻能克副於指呼便見立成其功效固於酬奬豫無吝焉朕以名藩龍潛舊地思覃風教爰議巡遊今月九日至滎陽得朱守殷詐奏本道都指揮使馬彥超等欲謀叛逆輒使殺害尋令宣徽使范延光徑往撫諭自後更無申奏節度使宋敬殷及使臣十餘並遭陷沒至十日探知虜掠近城居人上城閉門顯為拒捍朕親御六軍徑臨孤壘守殷逆黨敵於鄭門百姓望風下城效順守殷一家遂自屠戮尋獲首級巳復城池且朱守殷久事本朝繼膺重委洎朕纘承宗社前後纍降渥恩統處尹宗薦居節制位兼將相貴極人臣比謂勠力一心贊時為國殊不知濳懷梟性暗蓄狼心全無事上之忠遽恣欺天之意遂加誣於都校兼殺戮於近臣驅脅生靈拒張車駕果貽衆怒誅厥全宗凶狂之釁自招悖逆之辜莫逭一方既靜萬國永安凡所聞知當極慶快如有諸色人被朱守殷密行文字妄有扇搖蓋慮姦細黠黷良善朕皆明察不汝疵瑕當各安懷勿為挂慮諸道州府自同光三年巳前所缺秋夏稅租并主持務局敗闕課利并沿河舟船折缺天成元年殘缺夏稅租並特與除放太子少保致仕任圜早推勳舊曾委重難既退免於劇權俾優閒於外地而乃不遵禮分濳附守殷緘題罔避於嫌疑情旨頗彰於怨望自收汴壘備見蹤由若務含宏是孤典憲尚全大體止罪一身巳令本州私第自盡其骨肉親情僕使等並皆放罪朕聞后來其蘇動必從於人欲天監厥德靜宜布於國恩近者優恩多因州使僥門淹留敕命或公然隱匿全不施行官吏但言幸浚郊暫離洛邑蓋逢歲稔共樂時康不謂姦官遽彰逆狀為厲之階既甚覆宗之禍自貽俾我生靈遘茲紛擾永言軫惻無輟寐興宜覃雨露之恩式表雲雷之澤應汴州城內百姓既經驚劫須議優饒宜放二年屋稅兼公私債負如是在城回圖錢物及公私質庫除點簡見在外實經兵士散失者不計年月遠近並宜蠲放兼不得輒差配管內戶有因納稅入州便值更變或散失車牛其車牛許本主識認勤王之節雖出自勳賢入貢之勞抑繇於使介其有諸道進奉使或巳入汴州陷失土貢宜與收破無勞重有貢輸專人經劫奪者宜與優給不軌之徒巳加顯戮無辜之士當慰幽冤馬彥超宋敬殷等宜與追贈逆人有子及弟姪者仰並釋放一切不問輦輅之下姦逆遽興既難戢於戈鋋因莫分於玉石昨王師攻下汴州之時翦除凶逆之際恐其士庶偶陷鋒鋩言念傷殂良多嗟憫宜令石敬瑭遍加存問兼勘在城殺傷人口奏聞量加給恤衛主亡軀摧凶效命偶徇脅從之勢終懷忠藎之誠首議向明理宜行賞昨車駕初到城下之時有將士率先開門及下城朝見宜令石敬瑭奏聞當與甄酬禁暴戢兵實由武德安民和衆乃契天心車駕自離洛京戒嚴兵士不配一物不役一夫河流井水自此外無取尚恐州縣以迎駕為名妄有配率如或察知必不容恕布澤之命必叶於羣心宥過之文庶臻於至理應天下諸州府見禁囚徒除十惡五逆殺人光火劫盜合造毒藥官典犯贓僞行印信屠牛外罪無輕重並宜釋放瑕疵可滌既責其自新稂莠未除必從於去害應諸道或有人先偶曾為非及其背役衙官懼罪藏隱宜令隨處長吏設法招攜各勒歸家一切不問諸色人不得輒有搖動如或自守狂迷尚且結集當令嚴加捕捉無致遁逃貴靜封隅永安黎庶策名筮仕誠切於進身制祿命官義從於責實既懲黷貨宜有代耕應天下州縣官員逐月俸料如聞支給多不及時縱或支遣皆是爛弱斛斗既闕供輸難責廉慎自此隨處官員所破料錢宜逐縣人戶於合送納稅物內計折充支一則免勞於人戶輸納一則便於官僚仍下三司速與計度掄選之道雖在精研調業之勞頗聞艱苦應選人內有過格年深無門參選縱有材器難遂進趨宜令三銓磨勘行止即與今年冬集判成選人例量材注官如或詐稱不在此限為政之要切在無私聽訟之方唯期不濫天下諸州府官員如有善推疑獄及曾雪冤濫兼有異政者當具姓名聞奏別加甄奬敬老之規前王所重養親之道為子居先應有年八十巳上及家長有廢疾者宜免一丁差役俾遂奉養許國之心忠貞為本承家之法孝友為先應天下有孝子順孫義夫節婦兄弟繼世義居者隨處長吏聞奏當行旌表嫌疑之釁多起於蒼黃似是之非率難於明辨應去年四月一日諸州府軍變內有詿誤身沒者並許子孫禮葬頃以兩軍對壘仍廢交鋒亡歿甚多暴露不少宜令滑濮鄆澶衛等州各據地界內有暴露骸骨並與埋瘞仍差官致祭其餘諸道州府有暴露者亦委長吏指揮埋瘞夫天災流行時雨愆亢既關地分宜減國租今歲岐華登萊自夏稍旱須加軫念以示優恩四州所管百姓令長吏切加安恤其所旱損田苗宜令檢行詣實申奏與蠲減稅租仍不得有差徭科配於戲罪已責躬前王之大德滌瑕蕩穢往世之深仁致逆孽之亂常蓋眇沖之寡德誠深惕厲罔敢怠荒既行逮下之恩當守不移之信更在朝廷卿士藩翰侯王同堅奉守之心共致治平之道宜布遐邇當體朕懷朕聞開國承家得以制禮作樂故三皇不相襲五帝不相沿隨代創規於理無爽矧或情關祖禰事繫蒸嘗將崇追遠之文以示化民之道馬縞秉持古學歷覽羣書援兩漢之舊儀雖明按據考百王之立制未盡變通且議諡追尊稱皇與帝既有增減之字合陳褒貶之辭大約二名俱為尊稱若三皇之代則不可加帝五帝之代亦不可言皇爰自秦朝便兼其號爾後纂業承基之主握乾應運之君洎至我唐不易斯議至若元元皇帝事隔千祀宗追一源猶顯冊於鴻名豈須遵於漢典況朕居九五之位為億兆之尊不可總二名於眇躬惜一字於先代苟隨執議何表孝誠又如堯咸舜韶夏松殷柏隨時變禮厥理斯存縞則以徵事上言深觀動靜朕則以奉先為切慮致因循須足一塗以安四廟可特委宰臣與百官詳定集兩班於中書逐班各陳所見陵州合州長流百姓豆盧革韋說頃在先朝擢居重任欺公害物黷貨賣官靜惟肇亂之端更有難容之事且夔忠萬三州地連巴蜀路扼荊蠻藉皇都弭難之功徇逆帥僭求之勢罔豫視聽率意割移將千里之土疆開通狡穴動兩川之兵賦禦捍經年致朕莫遂偃戈猶煩運策近者西方鄴雖復要害高季興尚固窠巢增吾旰食之憂職爾朋奸之計而又自居貶所繼出流言苟刑戮之稽時處忠良於何地宜令逐處刺史監賜自盡本朝列聖及新追四廟諱近日章奏偏傍文字皆闕點畫凡當出諱止避正呼若回避於偏傍則虧缺於文字宜從朴素庶便公私此後凡廟諱但避正文其偏傍文字不必減少點畫德州流人溫韜生為黔首起自緑林依憑中夏干戈劫盜本朝陵寢遼州流人段凝豺狼類性梟獍為謀無端而幾害平人得便而常懷逆節嵐州司戶陶曾司藩翰恣黷貨財自處竄流彌興怨望憲州司戶石知訥比居賓佐合務參揮當守殷閉據夷門發文字扇搖戎帥原州司馬聶嶼擢從班列委出親賢不守條章強買店宅其後細詢行止頗駭聽聞喪妻未及於半年別成婚媾棄母動逾於千里不奉晨昏而皆自抵刑章各行竄逐都無省過但出怨詞在朕意雖欲含宏於物論固難容舍尚全大體只罪一身並令本處賜死都尉之子太尉之孫能念儒書備彰家訓不勞就試特與成名宜賜別敕及第附今年春榜凡於祿仕固有規程發身必藉於器能在任須彰於勞考否臧斯異黜陟並行朕自統寰區務均渥澤淹滯者皆期振舉勤恪者亦議旌酬既開進取之門遂有躁求之衆或不守選限捷路希恩或才罷官資奔波取事侵有數之員闕屈無媒之選人以此比方宜各條理自今後應前資官有出身及兩除官並可依常調赴選兼有莊宗并朕御署亦可準近敕赴選其一任除官未入選緒若無定制難以進身宜約所守官資序高低許令同有出身人合格年限求官赴京日仍須本道申送則與除第二任官兩除後便準常調選人例如此則事有區分人無奔競如藉才器非時升擢不在此限今年夏苗委人戶自供手狀具頃畝多少仍以五家為保委無隱漏攢連手狀送於本州本州具帳送省州縣不得差人括如或人戶隱欺許令保內陳告其田並令倍徵本朝一統之時除嶺南黔中去京地遠三年一降選補使號為南選外其餘諸道及京有司諸色選人每年動及數千分在三銓尚為繁重近代選人每年不過數百何必以一司公事作三處官方況有格條各依資考兼又明行敕命務絶阿私宜新公共之規俾慎官常之要其諸道選人宜令三銓官員都在省署子細磨勘無違礙後即據格同商量注擬連署申奏仍不得踵前於私第注官如此則人吏易可整齊公事亦無遲滯朕顧惟涼德獲紹丕基賴心膂之訏謨繫股肱之寅亮懼難負荷嘗勵齊莊惟誡荒寧敢自滿假卿等謨猷迭著翼亮彌勤遽以鴻名將加眇質雖驗忠貞之懇誠非謙慎之懷往年繼上封章纍增宣達近者告虔宗廟展禮郊丘皆輔弼之盡心亦纘承之常道縱頻摧北虜烽燧猶存雖稍靜南方車書未混至於年穀豐稔皆繇台輔燮調豈豫沖人當斯盛美爾宜明豫畏相體朕師臣勉務弼諧無忘裨救堯舜禹湯之大道足可敷陳聖明神武之虛名無煩往復諒茲深意即斷來表左散騎常侍集賢殿學士判院事蕭希甫身處班行職非警察輒引凶狂之輩上陳誣骩之詞逼近郊禋扇搖軍衆李筠既當誅戮希甫寧免謫遷可貶嵐州司戶參軍仍馳驛發遣臺轄之司官資並設左右貂素來相類左右揆不至相懸以此比方豈宜分別自此宜升尚書右丞官品與左丞並為正四品故天策上將軍守太師尚書令楚國王馬殷品位俱高封崇巳極無官可贈宜賜諡及神道碑文仍以王禮葬要道才行則千歧共貫宏綱一舉則萬目皆張前王之法制罔殊百代之科條悉在無煩改作各有定規守度程者心逸日休率胸臆者心勞日拙天垂萬象星辰之分野靡差地載羣倫嶽瀆之方隅不易儻各司其局則皆盡其心且律令格式六典凡關庶政互有區分久不舉行遂至隳紊宜準舊制令百司各於其閒録出本局公事巨細一一抄寫不得漏落纖毫集成卷軸兼粉壁書在公廳若未有廨署者其文書委官司主掌仍每有新授官到令自寫録一本披尋或因顧問之時應對須知次第無容曠闕每在執行使庶寮則守法奉公宰臣則提綱振領必當彞倫攸敘所謂至道不繁何必期年然後報政宜令御史臺遍加告諭催促限兩月抄録及粉壁書寫須畢其閒或有未可便行及曾釐革事件委逐司旋申中書門下當更參酌奏覆施行久愆時雨深疚豫心雖遍虔祈猶未溥足宜廣推恩之道更敷恤物之懷貴獲感通必彰靈應宜令諸道州府各委長吏親問刑獄省察冤濫應見禁囚徒除死罪外餘盡及時疏放除省司主持回圖敗闕軍將及諸色人等見別指揮三司商量或有情可矜憫或非欺罔積年致有逋懸各具分析續行敕命并公私債負放至秋熟填納今年取者不在此限地道安靜以動為異前文備載歷代不無因有災祥深加警戒朕自登九五每念生靈樂聞忠正之言惡見驕奢之事歲時豐稔中外和同近聞河南數數地動駭彼羣聽深軫豫衷李祥居諫諍之官抱讜直之氣懇裨正道特上封章恐朕忘創業艱難之時有功成矜滿之意不惟舉職備見為時況朕守聽政之勤如踐祚之始嘗持翼翼不忘兢兢今更體李祥之言以前代為鑒理不忘亂安不忘危臣下須進思盡忠退思補過日慎一日有始有終如此則何休祥之不臻何咎徵之不泯唯并州之地乃豐沛之鄉巳命親賢往分憂寄必資慎靜專務輯綏刑獄之閒不得令有冤滯凡關利濟并許奏聞事有不便於民皆須止絶其北京山川之神仍宜差官專往祭禱朝廷靜可以惠四海侯伯靜可以福一方冀安比屋之人以鎮興王之地周崇呂望有尚父之榮漢重蕭何有不名之禮錢鏐冠公侯之位疏吳越之封宜示異恩俾當縟禮其錢鏐宜賜不名朕猥以眇躬纘承丕構欲華夷之共泰於刑賞以無私其有位極人臣寵踰涯分擅威權而積惡詢物議以難容苟緩刑章是滋凶慝安重誨始從幼稚獲備指揮既倚注以漸深亦旌酬而益甚自朕紹興王業委掌樞機官列三公望崇四輔謂勤劬之可恃每率暴以居懷且孟知祥董璋自守藩維素堅臣節輒從閒諜令負憂疑擢任姻親往分符竹濳設猜防之計擅興割據之言兩川飲恨以俱深一旦飛章而頓絶又錢鏐位冠王公嘗輸愛戴朕方禮優元老恩遇遠人而重誨採掇瑕疵遽行止絶且去年郊天禮畢率土乂康重誨既綰國權復希兵柄輒出渡淮之語貴邀統衆之名事雖不行謀實可懼其後終興戈甲遽討巴卭將士疲勞梯船阻絶又遣專臨寨所俾料軍儲恣威虐以復多致民兵之共怨朕尚存大體特示優恩爰自禁庭委之藩翰方繄共理旋乃貢章豈謂別有動搖濳懷怨望長子崇緒親居內職次子崇贊顯列朝行遣彼元隨偷歸本道據茲悖逆須究端繇勞千里以興師致四方之駭聽果明罪釁難逭誅夷其安重誨宜削奪自身官爵仍并男崇贊崇緒及重誨妻阿張等四人宜並賜死務穡勸耕前賢之令範裒多益寡往聖之格言比者諸道賦稅一定數額廣種不編於帳案頻通恐撓於鄉村如聞不逮之家困於輸納爰議有餘之戶共與均攤貴表一時之恩不作常年之例宜委諸道觀察使於屬縣每村定有力戶一人充村長於村人議有力人戶出剩田苗補下貧不逮頃畝自肯者即具狀徵收有詞者即排段檢括便自今年起為定額富民之道莫尚於務農力田之資必先於利器器苟不利民何以安近聞諸道監冶所賣農器或大小異同或形狀輕怯才當墾闢旋致損傷近百姓秋稼雖登時物頗賤既艱難於買置遂抵犯於條章苟利錐刀擅興爐冶稍聞彰露須議誅夷緩之則贍國不充急之則殘民轉盛加以巡檢節級騷擾鄉閭但益煩苛殊非通濟欲使上不奪山川之利下皆遂犬畝之宜務在從長庶能經久自今後不計農器燒器動使諸物並許百姓逐便自鑄諸道監冶除依常年定數鑄辦供軍熟鐵并器物外只管出生鐵比巳前價各隨逐處見定高低每斤一例減十文貨賣雜使熟鐵亦任百姓自揀巡檢節級勾當賣鐵場官并鋪戶等一切並廢鄉村百姓只於係省秋夏田畝上每畝納農器錢一錢五分足陌隨秋夏稅二時送納去國祚中興皇綱再整合頒公事遍委羣臣先敕抄録六典法書分為二百四十卷從朝至夕自夏徂冬御史臺官員等或同切催驅或遞專勘讀校前王之舊制布當代之明規宜有奬酬以勵勤恪御史丞劉贊近別除官今加階爵宜從別剌處分呂琦姚遐致宜加朝散大夫李凝吉朝議大夫馬義朝朝散大夫仍賜柱國勳干遼李濤並朝散大夫徐禹卿張可復王曉並賜緋魚袋文武兩班每遇入閣賜食從前御史臺官及諸朝官皆在敷政門外兩廊食唯北省官於敷政門內別坐既為隔門各不相見致行坐不齊難於肅整今後每遇入閣賜食北省官亦宜令於敷政門外東廊下設席以北為首待班齊一時就坐省洋州及興元奏探聞得董璋把截劒門關路不通利州與西川往來兼稱董璋自領徒黨侵逼西川管界西川巳出兵士禦備其利州人情不安未知兩川的實音耗等事朕聞天惟福善神必禍淫元鑒昭然冥符定矣故積功纍仁者無所不濟窮兵黷武者未或不亡是以齊國尊周終全霸業吳王伐越自取喪亡纍驗古今足分成敗卿時推閒傑世仰全才知治亂於未萌測安危於未兆首參締構再復宗祧英謀迥掩於耿吳茂業遐超於申甫論功為最錫壤居先自居守於北門往鎮臨於西蜀安民有術撫衆多恩方靜治於龜城期永扶於鳳闕董璋比膺朝寄薦領戎旃曾無犬馬之勞但縱豺狼之性頃歲濳懷逆節密設奸機志欲兼并懇謀閒諜始奏卿之得失知朕不容後說朝廷之短長圖卿相信只憑詭詐便欲侵吞欲西犯於蜀川遂東窺於閬郡不煩覼縷可驗包藏亂常之罪惡既彰伐叛之刑書難赦朕乃眷求良帥殄滅凶渠此際尋委卿兼東川行營供饋應接使方倚仗於戚藩俄阻艱於寇境路歧雖隔情好如初中閒令進奏官蘇願及進奉軍將杜紹本等相次歸還令傳詔旨想其到彼備達豫懷卿制敵多方折衝有備雖深嫉惡猶示睦鄰尚抑驍雄觀其釁隙而董璋果然顛蹶盡露奸邪初控扼於劒門遽侵騷於錦里為臣若此滅族非遙卿可嚴誡師徒妙抒籌畫按茲良便速殄元凶朕亦尋遣軍前徑臨境上為卿犄角扼賊咽喉佇掃蕩於氛霾復流通於信使當覃異渥式奬殊功卿宜慎固遠圖秉扶大節保君臣之重義成家世之美名況卿骨肉至多邱園在此自來存問並得安全可表朕之倚卿所冀卿之為朕佇觀英斷定集大勳豈惟只委於節旄長居貴盛兼俟別頒於綸綍更廣封崇奸醜自分始終可鑒其為眷注無忘寐興今遣卿外甥李王褱齎詔慰諭想當知悉省所奏東川董璋爰自為鄰從初不睦嘗厚誣於表疏每深閒於朝廷欲竊兵權來併土宇忽去年四月二十八日暴興兵士至五月一日驟入漢州尋差馬步都指揮使兼知武信軍節度留後李仁罕右廂馬步都指揮使兼知寧江軍節度兵馬留後張知鄴衙內都指揮使兼知昭武軍留後李肇等各於界分警備又令副使權知武泰軍節度留後趙季良在府巡守其左廂馬步都指揮使兼知保寧軍節度留後趙廷隱先次部領兵士三萬人出次新都卿自統領衙隊二萬人騎繼進至三日交戰殺敗董璋斬首萬餘級執八千人擒賊將校八十餘員甲馬七百匹收衣甲器械十萬事其董璋與男光嗣四日巳時走入東川前陵州刺史王暉斬璋父子首級來獻軍門尋收下東川城又奏今夏方議賞功其文武將吏等衆意難違巳取六月十一日權兼東川指揮公事具悉朕以董璋位列山河名兼將相全昧輸忠事主以禮睦鄰輒恣凶狂擬謀吞噬譖卿則妄呈章奏誑朕則欲竊兵權奸計未成賊機尋露既無閒於搆惑唯有志以攻侵卿雖認包藏久從含忍但務戢兵而靜治只期應敵以禦衝俟落彀中即加翦撲若居度外且示協和而董璋果出妖巢暴興叛黨忽犯成都之境驟踰漢郡之疆蟻聚蜂屯鴟張豕突謂錦川而可取謂天網而可逃及卿密運戎機大張軍勢劒㦸川排而亘野旌旗雲布以蔽天鵝鸛才交豺狼巳殄棄甲者追擒既盡投羅者剿戮無遺尋迫元凶遁歸孤壘不暇守陴而慟哭便當傳首以迎降惡蔓頓除禍胎全拔永肅潼江之波浪盡收郪道之封疆不有賢良誰分憂寄儻非英特孰靜方隅紀功而煥耀旗常載德而輝華冊捷音初至慶快良深嘉歎之餘旌酬是切況聞衆懇巳請兼權實契朕懷即加真命其為眷矚無忘寐興其立功將校權兼留務李仁罕張知鄴李肇趙季良巳下咸著忠良亦須正授續行渥澤相次奬酬想宜知悉朕猥以眇躬纘承丕構賴忠良之共理冀寰宇之永康矧念元勳早聯懿戚永保君臣之分足論終始之心卿出應貞期生符閒氣洞曉圯橋之兵略元通渭水之戎韜重整漢儀首參大計再隆周道迥立殊功實有令名載於良史是膺朝奬繼領藩宣外則覃聲教於百蠻內則效忠勤於雙闕交修職貢備竭臣誠方表率於諸侯永維持於景運不謂董璋夙懷蠆毒濳貯狼貪擬吞并於仁封詐傾輸於直節密飛章奏纍述事機或敘卿之短長或報卿之動靜無非鬬激每欲攻侵朝廷貴要協和久從隱忍表文具在事狀甚明又知不納其讒邪乃去反陳於離閒仍於鄰道頓起釁端只憑誑惑之詞便縱窺覦之暴既干紀律須舉憲章爰命帥臣共平寇孽此際遂委卿兼東川行營供饋應接使如斯倚注豈有猜嫌渥澤方行使車將發旋屬道塗之阻塞復當邊境之沸騰繇是去意莫通來音亦絶偶致關防之多事久聞分野之延災蓋以朕至德未孚純風未洽每自責躬罪已敢忘旰食宵衣況卿動稟針規深懷鑒識從初料其操守豈敢徇彼狂迷只應屢中巧言偶生疑論遂且徐觀其向背終圖自別於妍媸其閒但務訓兵止期應敵遐想勤王之力詎移許國之心所以中閒先令進奏官蘇願及進奉軍將杜紹本等相次歸還式明安慰朕又知董璋果謀鼠竊轉恣鴟張輒侵岷益之崇封俄越梓潼之末界茲察詭計究彼初心附皮毛脣齒之歡足明矯妄竊郡邑金湯之利可驗包藏朕乃尋遣近臣徑齎明詔示其犄角表此招懷仍許優恩別傳密旨果聞卿意備體豫懷即決遠圖亟回英斷驅鋭旅而既殲寇黨取危城而方剿渠魁爰效至忠克全大節盡傾衷素曡貢封章併袪往日之疑襟細述此時之戎事大朝正朔奉之不渝列鎮規程守之無易仍厚支其館穀濟闕過之王人載認恭勤益明尊奬尚未舛誤得以平持今後協和自然悠久魚水之情宛在山河之任永居足保勳榮轉期富貴至於封賞固不食言凡在繁文更宜宣力嘉歎之外注矚斯深
