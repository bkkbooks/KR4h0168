front:
  text: 全唐文欽定全唐文卷五百八十四柳宗元十六
  hash: sha256:659d98edfd650cde5ab745d4d2c371143605924127baf2953d9dbcd0d66a1a1b
body:
  text: 昔在帝堯光有四海元首萬邦時則舜禹稷卨佐命垂統股肱天下聖德未衰而內禪元臣繼天而受命四姓承休迭有中邦五神環運炎德復起周道削滅秦德暴戾皇天疇庸審厥保承乃命唐帝之後振而興之又俾元臣之後翊而登之所以紹復丕績不墜厥祀故曲逆起為策士輔成帝圖吐謀洞靈奮奇如神舜之胄也汝陰脫帝密網摧虜暴氣扶乘天休運行嘉謀禹之苗也酇侯保綏三秦控引漢中宏器廓度以大帝業卨之裔也淮陰整齊天兵導揚靈威覆趙夷魏拔齊殄楚平陽破三秦虜魏王絳侯定楚地固劉氏皆稷之裔也克復堯緒昭哉甚明天意若曰建火德者必唐帝之胄故漢氏興焉翼炎運者必唐臣之孫故㣥雄登焉是以高帝誕膺聖祚以垂德厚探昊穹之奧旨載幽明之休祐殺白帝於大澤以承其靈建赤旗於沛邑以昭其神假手於嬴以混諸侯憑力於項以離關東奉纘堯之元命而四代之後咸獻其用得乘木之大統而秦楚之盛不保其位既建皇極設都咸陽撫征四方訓齊天下乃樂沛宮以追造邦之本乃歌大風以昭武成之德乃奠舊都以壯王業之基生為湯沐之邑沒為思樂之地且曰萬歲之下魂遊於此惟茲原廟沛宮之舊也祭蚩尤於是庭而赤精降導靈命於是邦而㣥雄至登布衣於萬乘而子孫得以纘其緒化環堵為四海而黎元得以安其業基岱嶽之高源洪河之長蓄靈擁休此焉發迹蓋以道備於是而後行之天下制成於是而後廣之宇內天下備其道而神復乎本宇內成其制而心懷於舊宜其正名以表功用成其始俾生靈盡其敬焉陳本以宅神用成其終俾生靈盡其慕焉故高帝定位建茲閟宮惠皇嗣服爰立清廟帛丿糸越千祀至今血食此所以成終而成始也且夫以斷蛇之威安知不運其密用佐歲功以流澤歟以約法之仁安知不流其神眷相舊邦之遺黎歟以紹唐之餘慶統天之遺烈安知不奮其聖化大祐於下土歟然則展敬乞靈烏可已也銘於舊邑以迪天命其辭曰蕩蕩明德時惟放勳揖讓而退祚於後昆㣥蛇輔龍以翊天門登翼炎運唐臣之孫秦綱既離鹿駭東夏長蛇封豕蹈躍中野天復堯緒鍾祐於劉赫矣漢祖播茲皇猷揚旗沛庭約從諸侯豪暴震謺威聲布流總制虎臣委成良疇勦殄霸楚遂荒神州區宇懷濡黔黎輯柔表正萬國炎靈用休定宅咸陽以都上遊留觀本邦在鎬如周穆穆惠皇宗禋克承崇崇沛宮清廟是憑原念大業肇經茲地乃專元命亦舉嚴祀建旗釁鼓遂據天位魂遊故都永介丕祉煥列唐典嚴恭罔墜勒此休銘以昭本始惟夏后氏建大功定大位立大政勤勞萬邦和寧四極威懷九有儀刑後王當乎洪流方割災被下土自壺口而導百川大功建焉虞帝耄期順承天歷自南河而受四海大位定焉萬國既同宣省風教自塗山而會諸侯大政立焉功莫崇乎禦大災乃錫元圭以承帝命位莫崇乎執大象乃輯五瑞以建皇極政莫先乎齊大統乃朝玉帛以混經制是所以承唐虞之後垂子孫之丕業立商周之前樹帝王之洪範者也嗚呼天地之道尚德而右功帝王之政崇德而賞功故堯舜至德而位不及嗣湯武大功而祚延於世有夏德配於二聖而唐虞讓功焉功冠於三代而商周讓德焉宜乎立極垂統貽於後裔當位作聖著為世準則塗山者功之所由定德之所由濟政之所由立有天下者宜取於此追惟大號既發華蓋既狩方嶽列位奔走來同山川守神莫敢遑寧羽旄四合衣裳咸會虔恭就列俯僂聽命然後示之以禮樂和氣周洽申之以德刑天威震耀制立謨訓宜在長久厥後啓征有扈而夏德始衰羿距太康而帝業不守皇祖之訓不由人亡政墜卒就陵替向使繼代守文之君又能紹其功德修其政統卑宮室惡衣服拜昌言平均賦入制定朝會則諸侯常至而天命不去矣茲山之會安得獨光於後歟是以周穆遐追遺法復會於是山聲垂天下亦紹前軌用此道也故豫為之銘庶後代朝諸侯制天下者仰則於此辭曰惟禹體道功厚德茂會朝侯衛統一憲度省方宣教化制殊類咸會壇位承奉儀矩禮具樂備德容既孚乃舉明刑以弻聖謨則戮防風遺骨專車克明克威疇敢以渝宣昭黎憲底定寰區傳祚後允丕承帝圖塗山巖巖界彼東國唯禹之德配天無極即山刊碑貽後作則惟蜀都重險多貨混同戎蠻人尨俗剽嗜為寇亂皇帝元年八月帥喪衆暴㣥疑不制妖孽煽行怙恃富強滔天阻兵攻陷他部北包劍門憑負邱陵以張驁猛堅利鋒鏑以拒大順謂雷霆之誅莫已加也惟梁守臣禮部尚書嚴公以國害為私讎以天討為己任推仁仗信不待司死而人致其命立義抗憤不待喋血而士一其心悉師出次祗俟明詔凡諸侯之師必出於是儲峙饗賚取其豐穰乃遣前軍嚴秦奉揚王誅誕告南土十一月右師逾利州蹈寇地乘山斬虜以遏奔衝左師出於劍門大攘頑嚚諭引劫脅蟻潰鼠駭險無以固收奪利地以須王師刲刳腎腸振拔根柢俾無以肆毒用集我勳力鼓賁鼓一振元戎啓行取其渠魁以為大戮由公忠勇憤悱授任堅明謀猷宏長用能啓闢險厄夷為大塗衰沮害氣對乎天意帝用休嘉議功居首增秩師長進為大藩宅是南服將校㣥吏願刊山石昭著公之功垂號無窮銘曰井絡坤垠時惟外區界山為門環於蜀都叢險積貨混並羌髳狂猾窺隙狺狺嘯呼憑據勢勝厚其凶徒皇帝之仁宥而不誅暴非德馴害及巴渝乃出王旅乃咨列嶽牧臣司梁當其要束器備攸積糗糧是蓄人無增賦師以饒足喋血誓士元機在握分命貔貅陳為犄角右逾岷山左直劍門攻出九地上披重雲攀天蹈空夷視阻艱破裂層壘殄殲㣥頑內獲固圉外臨平原天兵徐驅卒乘嘽嘽大憝囚戮戎夏咸歡帝圖厥功惟梁是先開國進位南服於藩邦之清夷人以完安銘功鑒亂永代是觀壽州刺史臣承思言九月丁亥安豐縣令臣某上所部編戶氓李興父被惡疾歲月就亟興自刃股肉假託饋獻其父老病已不能啖啜經宿而死興號呼撫臆口鼻垂血捧土就墳沾漬涕洟墳左作小廬蒙以苫茨伏匿其中扶服頓踊晝夜哭訴孝誠幽達神為見異廬上産紫芝白芝二本各長一寸廬中醴泉涌出奇形異狀應驗圖記此皆陛下孝理神化陰中其心而克致斯事謹桉興氓庶賤陋循習淺下性非文字所導生與耨耒為業而能鍾彼醇孝超出古列天意神道猶錫瑞物以表殊異伏惟陛下有唐堯如天如神之德宜加旌褒合於上下請表其里閭刻石明白宣延風美觀示後祀永永無極臣昧死上請制曰可銘云懿厥孝思茲惟淑靈稟承粹和篤守天經泣待羸疾默禱隱冥引刃自嚮殘肌敗形羞膳奉進憂勞孝誠惟時高高曾不是聽創巨痛仍號於穹旻捧土濡涕頓首成墳陷膺腐眥寒暑在廬草木悴死鳥獸踟躇殊類異族亦相其哀肇有二位孝道爰興克修厥猷載籍是登在帝有虞以孝蒸蒸仲尼述經以教於曾惟昔魯侯見命夷宮亦有考叔悟莊稱純顯顯李氏實與之倫哀嗟道路涕慕里鄰邦伯章奏稽首殷勤上動帝心旁達明神神錫祕祉三秀靈泉帝命薦加亦表其門統合上下交贊天人建此碑號億齡揚芬元和七年四月黔巫東鄙蠻獠雜擾盜弄庫兵賊脅守帥南鈎牂牁外誘西原置魁立帥殺牲盟誓洞窟林麓嘯呼成㣥皇帝下銅獸符發庸蜀荊漢南越東甌之師四面討問畏罪憑阻逃遁不即誅時惟潭部戎帥御史中丞柳公綽練立將校提卒五百屯於武岡不震不騫如山如林告天子威命明白信順亂人大恐視公之師如百萬視公之令如風雷怨號呻吟喜有攸訴投刃頓伏願完父子卒為忠信奉職輸賦進比華人無敢不龔母弟生壻繼來於潭咸致天庭皇帝休嘉式新厥命凶渠同惡革面向化如醉之醒如狂之寧公為藥石俾復其性詔書顯異進臨江漢益兵三倍為時碩臣殿於大邦文儒申申有此武功於是夷人始復聞公之去相與高蹈涕呼若寒去裘昔公不夸首級為已能力專務教誨俾邦斯平我老洎幼由公之仁小不為虺蜮大不為鯨鯢恩重事特不邇而遠莫可追已願銘武岡首以慰我思以昭我鄰以示我子孫彌億萬年俾我奉國如令之誠鄰之我懷如公之勤其辭曰黔山之巑巫水之磻魚駭而離獸犯而殘戶恐谷竄披攘仍亂王師來誅期死以緩公明不疑公信不欺援師定命俾邦克正皇仁天施我反其性我塗四闔公示之門我愚抵死公示之恩既骨而完既亡而存奉公之訓貽我子孫我始蝥賊由公而仁我始寇讎由公而親山畋澤虍魚欠輸賦於都陶穴刊木室我姻族烹牲是祀公受介福揲蓍以占公宜百祿皇懋公功陟於大邦遠哉去我誰嗣其良有穴之丹有犀之顛匪曰豫固公不可賂祝鄰之德恆遵公則勗豫之世永謹邦制南夷作詩刻示來裔始州之人各以罌甈負江水莫克井飲崖岸峻厚旱則水益遠人陟降大艱雨多則塗滑而顛恆為咨嗟怨惑訛言終不能就元和十一年三月朔命為井城北隍上未晦果寒食冽而多泉邑人以灌其土堅垍其利悠久其相者浮圖談康軍事牙將米景鑿者蔣晏凡用罰布六千三百役庸三十六大甎千七百其深八尋有二尺銘曰盈以其神其來不窮惠我後之人噫疇肯似於政其來日新韓愈謂柳子曰若知天之説乎吾為子言天之説今夫人有疾痛倦辱飢寒甚者因仰而呼天曰殘民者昌佑民者殃又仰而呼天曰何為使至此極戾也若是者舉不能知天夫果蓏飲食既壞蟲生之人之血氣敗逆壅底為癰瘍疣贅瘻痔蟲生之木朽而蝎中草腐而螢飛是豈不以壞而後出耶物壞蟲由之生元氣陰陽之壞人由之生蟲之生而物益壞食齧之攻穴之蟲之禍物也滋甚其有能去之者有功於物者也繁而息之者物之讎也人之壞元氣陰陽也亦滋甚墾原田伐山林鑿泉以井飲窾墓以送死而又穴為匽溲築為牆垣城郭臺榭觀遊疏為川瀆溝洫陂池燧木以燔革金以鎔陶甄琢磨悴然使天地萬物不得其情幸幸衝衝攻殘敗撓而未嘗息其為禍元氣陰陽也不甚於蟲之所為乎吾意有能殘斯人使日薄歲削禍元氣陰陽者滋少是則有功於天地者也蕃而息之者天地之讎也今夫人舉不能知天故為是呼且怨也吾意天聞其呼且怨則有功者受賞必大矣其禍焉者受罰亦大矣子以吾言為何如柳子曰子誠有激而為是耶則信辨且美矣吾能終其説彼上而元者世謂之天下而黃者世謂之地渾然而中處者世謂之元氣寒而暑者世謂之陰陽是雖大無異果蓏癰痔草木也假而有能去其攻穴者是物也其能有報乎蕃而息之者其能有怒乎天地大果蓏也元氣大癰痔也陰陽大草木也其烏能賞功而罰禍乎功者自功禍者自禍欲望其賞罰者大謬矣呼而怨欲望其哀且仁者愈大謬矣子而信子之仁義以遊其內生而死爾烏置存亡得喪於果蓏癰痔草木耶有鷙曰鶻者巢於長安薦福浮圖有年矣浮圖之人室宇於其下者伺之甚熟為豫説之曰冬日之夕是鶻也必取鳥之盈握者完而致之以燠其爪掌左右易之旦則執而上浮圖之跂焉縱之延其首以望極其所如往必背而去焉苟東矣則是日也不東逐南北西亦然嗚呼孰謂爪吻毛翮之物而不為仁義器耶是固無號位爵祿之欲里閭親戚朋友之愛也出乎鷇卵而知攫食決裂之事爾不為其他凡食類之飢唯旦為甚今忍而釋之以有報也是不亦卓然有立者乎用其力而愛其死以忘其飢又遠而違之非仁義之道耶恆其道一其志不欺其心斯固世之所難得也豫又疾夫今之説曰以喣喣而默徐徐而俯者善之徒以翹翹而厲炳炳而白者暴之徒今夫梟鵂晦於晝而神於夜鼠不穴寢廟循牆而走是不近於喣喣者耶今夫鶻其立躍然其動砉然其視的然其鳴革然是不近於翹翹者耶由是而觀其所為則今之説為未得也孰若鶻者吾願從之毛耶翮耶胡不我施寂寥泰清樂以忘飢柳子為御史主祀事將朝日其僚問曰古之名曰朝日而已今而曰祀朝日何也豫曰古之記者則朝拜之云也今而加祀焉者則朝旦之云也今之所云非也問者曰以夕而偶諸朝或者今之是乎豫曰夕之名則朝拜之偶也古者旦見曰朝暮見曰夕故詩曰邦君諸侯莫肯朝夕左氏傳曰百官承事朝而不夕禮記曰日入而夕又曰朝不廢朝暮不廢夕晉侯將殺豎襄叔向夕楚子之留乾溪右尹子革夕齊之亂子我夕趙文子礱其椽張老夕智襄子為室美士茁夕皆暮見也漢儀夕則兩郎向瑣闈拜謂之夕郎亦出是名也故曰大采朝日少采夕月又曰春朝朝日秋夕夕月若是足矣又加祀焉蓋不學者為之也僚曰欲子之書其説吾將施於世可乎豫從之永州之野産異蛇黑質而白章觸草木盡死以齧人無禦之者然得而臘之以為餌可以已大風攣踠瘻癘去死肌殺三蟲其始大醫以王命聚之歲賦其二募有能捕之者當其租入永之人爭奔走焉有蔣氏者專其利三世矣問之則曰吾祖死於是吾父死於是今吾嗣為之十二年幾死者數矣言之貌若甚戚者豫悲之且曰若毒之乎豫將告於蒞事者更若役復若賦則如何蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久已病矣自吾氏三世居是鄉積於今六十歲矣而鄉鄰之生日蹙殫其地之出竭其廬之入號呼而轉徙飢渴而頓踣觸風雨犯寒暑呼噓毒癘往往而死者相籍也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死即徙爾而吾以捕蛇獨存悍吏之來吾鄉叫囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而臥謹食之時而獻焉退而甘食其土之有以盡吾齒蓋一歲之犯死者二焉其餘則熙熙而樂豈若吾鄉鄰之旦旦有是哉今雖死乎此比吾鄉鄰之死則已後矣又安敢毒耶豫聞而愈悲孔子曰苛政猛於虎也吾嘗疑乎是今以蔣氏觀之猶信嗚呼孰知賦斂之毒有甚於是蛇者乎故為之説以俟夫觀人風者得焉柳子為御史主祀事將䄍進有司以問䄍之説則曰合百神於南郊以為歲報者也先有事必質於戶部戶部之詞曰旱於某水於某蟲蝗於某癘疫於某則黜其方守之神不及以祭余嘗學禮蓋思而得之則曰順成之方其䄍乃通若是古矣繼而嘆曰神之貌乎吾不可得而見也祭之饗乎吾不可得而知也是其誕漫惝恍冥冥焉不可執取者夫聖人之為心也必有道而已矣非於神也蓋於人也以其誕漫惝恍冥冥焉不可執取而猶誅削若此况其貌言動作之塊然者乎是設乎彼而戒乎此者也其旨大矣或曰若子之言則旱乎水乎蟲蝗乎癘疫乎未有黜其吏者而神黜焉而曰蓋於人者何也豫曰若子之云旱乎水乎蟲蝗乎癘疫乎豈人之為耶故其黜在神暴乎眊乎沓貪乎罷弱乎非神為之也故其罰在人今夫在人之道則吾不知也不明斯之道而存乎古之數其名則存其教之實則隱以為非聖人之意故嘆而云也曰然則致雨反風蝗不為災虎負子而趨是非人之為則何以豫曰子欲知其以乎所謂偶然者信矣必若人之為則十年九潦八年七旱者獨何如人哉其黜之也苟明乎教之道雖去古之數可矣反是則誕漫之説勝而名實之事喪亦足悲乎子曰道不行乘桴浮於海從我者其由與子路聞之喜子曰由也好勇過我無所取材説曰海與桴與材皆喻也海者聖人至道之本所以浩然而遊息者也桴者所以遊息之具也材者所以為桴者也易曰復其見天地之心乎則天地之心者聖人之海也復者聖人之桴也所以復者桴之材也孔子自以拯生人之道不得行乎其時將復於至道而遊息焉謂由也勇於聞義果於避世故許其從之也其終曰無所取材云者言子路徒勇於聞義果於避世而未得所以為復者也此以退子路兼人之氣而明復之難耳然則有其材以為其桴而遊息於海其聖人乎子謂顏淵曰用之則行舍之則藏唯我與爾有是夫由是而言以此追庶幾之説則回近得矣而曰其由也與者當是歎也回死矣夫或問曰子必聖人之云爾乎曰吾何敢吾以廣異聞且使遁世者得吾言以為學其於無悶也揵焉而已矣楊誨之將行柳子起而送之門有車過焉指焉而告之曰若知是之所以任重而行於世乎材良而器攻圓其外而方其中然也材而不良則速壞工之為功也不攻則速敗中不方則不能以載外不圓則窒拒而滯方之所謂者箱也圓之所謂者輪也匪箱不居匪輪不塗吾子其務法焉者乎曰然曰是一車之説也非衆車之説也吾將告子乎衆車之説澤而杼山而侔上而輊下而軒且曳祥而曠左革而長轂以戟巢焉而以望安以愛老輜以蔽內垂綏而以畋載十二旒而以廟以郊以陳於庭其類衆也然而其要存乎材良而器攻圓其外而方其中也是故任而安之者箱達而行之者輪恆中者軸挶而固者蚤長而撓進不罪乎馬退不罪乎人者轅卻暑與雨者蓋敬而可伏者軾服而制者馬若牛然後衆車之用具今楊氏仁義之林也其産材良誨之學古道為古辭沖然而有光其為工也攻果能恢其量若箱周而通之若輪守大中以動乎外而不變乎內若軸攝之以剛健若蚤引焉而且御乎物若轅高以遠乎污若蓋下以成乎禮若軾險而安易而利動而法則庶乎車之全也詩之言曰駟牡騑騑六轡如琴孔氏語曰左為六官右為執法此其以達於大政也凡人之質不良莫能方且恆質良矣用不周莫能以圓遂孔子於鄉黨恂恂如也遇陽貨必曰諾而其在夾谷也視叱齊侯類蓄狗不震乎其內後之學孔子者不志於是則吾無望焉耳矣誨之吾戚也長而益良方其中矣吾固欲其任重而行於世懼圓其外者未至故説車以贈扶風馬孺子言年十五六時在澤州與㣥兒戲郊亭上頃然有奇女墜地有光煜然被緅裘白紋之裏首步搖之冠貴遊年少駭且悅之稍狎焉奇女頩爾怒曰不可吾故居鈞天帝宮下上星辰呼噓陰陽薄蓬萊羞崑崙而不即者帝以吾心侈大怒而謫來七日當復今吾雖辱塵土中非若儷也吾復且害若衆恐而退遂入居佛寺講室焉及期進取杯水飲之噓成雲氣五色翛翛也因取裘反之化為白龍徊翔登天莫知其所終亦怪甚矣嗚呼非其類而狎其謫不可哉孺子不妄人也故記其説子之疑木膚有怪文與人之賢不肖壽夭貴賤果氣之寓歟為物者裁而為之歟豫固以為寓也子不見夫雲之始作乎勃怒衝涌擊石薄木而肆乎空中偃然為人拳然為禽敷舒為林木嵑山蘖為宮室誰其搏而斫之者風出洞窟流離百物經清觸濁呼召竅穴與夫草木之儷偶紛羅雕葩剡芒臭朽馨香采色之赤碧白黃皆寓也無裁而為之者又何獨疑茲膚之奇詭與人之賢不肖壽夭貴賤參差不齊者哉是固無情不足窮也然有可恨者人或權褒貶黜陟為天子求士者皆學於聖人之道皆又以仁義為的皆曰我知人我知人披辭窺貌逐其聲而核其所蹈者以升而降其所升恆多蒙瞀禍賊僻邪罔人以自利者其所降率多清明沖淳不為害者彼非無情物也非不欲得其升降也然猶反戾若此逾千百年乃一二人幸不出於此者徵之猶無以為告今子不是病而木膚之問為物者有無之疑子胡橫訊過詰擾擾焉如此哉鹿畏貙貙畏虎虎畏羆羆之狀被髮人立絶有力而甚害人焉楚之南有獵者能吹竹為百獸之音昔云一作寂寂持弓矢罌火而即之山為鹿鳴以感其類伺其至發火而射之貙聞其鹿也趨而至其人恐因為虎而駭之貙走而虎至愈恐則又為羆虎亦亡去羆聞而求其類至則人也捽搏挽裂而食之今夫不善內而恃外者未有不為羆之食也古之書有記周穆王馳八駿升崑崙之墟者後之好事者為之圖宋齊以下傳之觀其狀甚怪咸若騫若翔若龍鳳麒麟若螳蜋然其書尤不經世多有然不足采世聞其駿也因以異形求之則其言聖人者亦類是矣故傳伏羲曰牛首女媧曰其形類蛇孔子如倛頭若是者甚衆孟子曰何以異於人哉堯舜與人同耳今夫馬者駕而乘之或一里而汗或十里而汗或數十里百里而不汗者視之毛物尾鬣四足而蹄齕草飲水一也推是而至於駿亦類也今夫人有不足為負販者有不足為吏者有不足為士大夫者有足為者視之圓首橫目食穀而飽肉絺而凊裘而燠一也推是而至於聖亦類也然則伏羲氏女媧氏孔子氏是亦人而已矣驊騮白羲山子之類若果有之是亦馬而已矣又烏得為牛為蛇為倛頭為龍鳳麒麟螳蜋然也哉然而世之慕駿者不求之馬而必是圖之似故終不能有得於駿也慕聖人者不求之人而必若牛若蛇若倛頭之問故終不能有得於聖人也誠是天下有是圖者舉而焚之則駿馬與聖人出矣
