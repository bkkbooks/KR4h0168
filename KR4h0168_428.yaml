front:
  text: 全唐文欽定全唐文卷四百二十八于卲六
  hash: sha256:6a7882980467b9e8fc9a054fd0ba7e4ab53fe5df12e1501154077d12d4033f38
body:
  text: 中朝有蕭牆之變王宮不開夫莠尚在我憂未弭都人共駭遠服多虞大唐思汔可之安率土獲將來之祐詔下哀痛恩覃動植天地更張乎範圍日月復次於黃道人既受賜其官爰議其能非其能則我命用隳奪其賜則彼氓何戴授之二者至於勤斯桂管都防禦經略觀察使范陽盧公道千乘之國齊百蠻之化敬事而信視人如傷頃者嶺外諸守除書中絶內無合契之符外闕分憂之寄望吳隱而莫至希士燮以實難是用舉所知延幕客盧與鄭二郡有光凡官材定論物格知至今之抑與誰曰不然必能發準的於彀中化陋夷於度內上以奉知巳下以拯黎元力行近仁於斯為美何必秉鈞當軸方及於人哉桂林陽亭南越之勝雙旌啓路舉棹茲始諸公惜別宿設戒期雲岫座中烟花雨後愛時景之可共悵高帆之不留遷客于卲書其事大官大邑唯賢者主之臨安大邑也而崔公兼領浹年之閒輿人致誦雖更化有命居之無何然與人休息行難為繼矣屬太夫人在堂閨門之敬舊家於漢上張仲孝友行思板輿談公維私式歌弄印崩波沿泝重阻謺里亦既至止稱歡壽觴前彭州司馬公之元昆所遊有方嘉此良會皆才膺開物刃有餘地從士大夫遊必先曲禮二龍方騁未可量也國有衡鏡人歸品藻十月良日駕言北遊當山公持刈楚之鍔信多士發長鳴之日也以彼前慶續茲高選雖欲勿用其若才何雖古人捧檄在此行也因同人惜離出餞于野遠山四合長空泬寥望青林而不盡看白日而將暮忝座右之末陪難孫之行不腆斯文俾專序別蓋讓之不可遂冠於首篇天寶中謬掌鉛槧領卿大夫門子出於龍樓以鼓篋為事是時與楊氏兄弟相見於今十年矣曾不以薄劣移意克全乎相知不出樓數年各以才進果行敏德依仁據義焜煌而金玉交映肅穆而風塵不雜入其門森森然是所謂難矣屬中原多故荊棘未翦竄身郊山復與合疇昔之好實獲我心今年春青羌白氐相率為虐震我郡邑毒痡生人而楊公侍親日有憂色擇地以養告別遂行是以二王趙蕭四族偕往懿親密友義切同舟並駕而逸足相追拔茅而彙征斯吉方將導黑水以合漢適樂土而中權豈止奔波雲山悵望歧路而已哉蓋隨之為義也大矣巴防楚塞猿聲千里東出桐柏南距荊州三江五湖可以利涉心斷卬否薄送於郊非斯人之為別吾誰為賦矣與兵曹公敵惠於今三世矣然則子之大人某當肩隨之日雖中年隔別而榮問不輟不虞康子來涉吾境見父之執果於覲親可謂達也况風骨爽秀機會駿發約之以禮博我以文青雲之姿於是乎見矣以日迫諸寇家君在蜀乘閒赴覲靡遑底寧曾未信宿駕言于邁以此道別無如之何副相嚴公總統江劍東西郡邑蓋以百數皆風靡波偃奔走乎大府威名之下誰不心注且鳥擇高梧人歸如水吾子之往矧有舊乎郊坰之南于以送遠楊柳雖緑我意悲春喬梓有方君心是慶白華之美者故歌而道之幕中有行軍馬公判官張公書記崔公高副時選相期郢匠執子之手幸謝故人韋公顯名三蜀出入東西川垂二十年矣至於是邦必聞其政蓋禮者德之幹利者義之和由之不失其道也噫夫克有具美而抑與之徒淹歲月未上霄漢俾其知已者慙而已雖多亦奚補於時議哉有以知君子不見而彰義然後取信吾寶也杜陵鄉曲千里而近楚王壇上瞻望仍遙鴈隨陽而昨夜初過木落山而寒霜始白今日何日江干送歸豈無樽酒可以留餞國家開設會府綜核九流衡懸而不欺輕重論定而必先遠大之子之往求善價而沽諸孚愛惟允將美利而利物夫然則家之肥而國又肥也南山之山日復羈齒時因便風無金玉爾音千里韋生跂豫何日今之天府急賢為事者多矣然則中丞張公賢而佐之公總統巴檄蓋郡邑百數皆夙興夜寐奔走乎梁州一方無虞千里坐嘯何寇盜之敢暴不澄清而彌肅所以賢與不肖有別而孟戶曹應辟焉非夫學究精微德含光大貞幹克副於公望勤勞可著乎王家豈中丞之與能而幕府之英選能致於此閏四月告軷指途出郊相餞昨夜殘雨朝烟稍霽黃鳥上下緑陰若浮此時送君微我無酒况東郊西郊鼓鼙猶作征軸之弊又急乎安人勉旃孟侯無以自媚決曹掾穆侯理行歸於劍十月寒矣艱哉是行休於嘉陵之陽日與樵牧為伍而吾子言涉江水至於室廬告軷之期不遠千里然則取諸羽翮擊彼風水時之來也鳴可驚人而愛親之道敬養為切安得擇仕而以三語為屈哉東江劍門又足助興地氣初閉河風稍嚴青冥為空黃落向盡感物論別者庶存乎歌詩人謂穆子通於理者也裒然作掾榮問所致自隴之下清風可挹人能盡歡卲真知勉矣頃以令弟仕於劍太夫人就養適乎遠雖迫王事心馳倚閭朝辭府庭夕次郊郭不俟高駕拂衣而南㣥公錫類詎敢留心各以壺酒垂楊好陰金秋始交火雲猶赫指日獻壽在原增光送君遂行千萬無盡豫籍奉化君之猷甚矣今也何幸辱與萬年君遊而獲展禮焉公有入室之清行有專門之奧學加之理要飾以藝文三十年中猶宰一邑是何奇偶之所不倫乎先是公由外署嘗攝行此職未拜真而復罷人到於今思之豈彼人之幸猶多而資公之政為理不然奚十年之外復與此合耶况今年吏曹尤難其選天子申明乎詔令宰輔論定乎官材天官卿孜孜於取捨膺此舉也授受者安易為力哉拜恩前殿隨牒上道萬年君軫陟岡之歎愴異縣之違敘離公堂言具旨酒二三親好獻酢有章既敬而兄又悅而弟上友下悌何其韡歟鶉尾之會火雲初飛前春花木是日仍茂感而惜分於是為切夫以卿士大夫之會未嘗不引詩人之興以宣其志萬年君所以進牘抽翰邀文屬辭蓋合斯義將用貺別云爾將理大國若烹小鮮不敢撓之故也况子男之為邑庸可撓乎方今兵薄四海師老十年罄人之耕桑窮人之術數勤以奉中國翦以賜諸軍軍興猶艱國議尚乏非夫表微物外洞鑒人間曷能除其災害拯彼塗炭於戲天官氏得之於韋金壇矣公文以藻身行以勵俗道必孚於損益名可達於家邦醇粹居中而英華發外且三辟大府連衡者人皆奪容一登廷評獨行者我無慍色樂天知命君子攸難偶爾墮銓序之勞超然在甲科之列豈無清切之地竟迫親人之選飛鳬此去逸驥何施然則其崩角所不容悼心而無告者我實行矣爾何對焉鍾茅之閒化可見矣厚地始坼寒山盡空同雲不開積雪增沍折楊追餞蔣亭愈邈心乎愛矣何日忘之今之送君感別而已王公秀出士林香傳國譽玉立增映金聲自遠故弱冠之後代為文人不四三年而交辟如契豈惟鴻鵠志在千里自是鳳雛生而五色今大夫當弄印之貴積蒼生之望立程朝端舉正天下少府公晨昏之際戀深獨立爰自東洛達於上京且因王命得及私覲喬梓之慶實為時榮然則赤縣多務不遑久留素琴在御匹馬云邁清風霽景隨我佳興又足名也頃忝臺憲出於門闌遂使小子知名敢忘國士之遇心乎愛矣此別何言前郊一葉凉風已半金吹淅瀝淒然欲寒兵部員外郎王公以從父之仁敦北阮之好猥顧同舍謂余知音相期都門方以送遠才子東矣得無斯文天寶年中以公持刈楚之柄言采其華將拔其俗蓋良馬逐逐在公之伯仲乎忝嘗齊衡永以為好逮茲二紀相逢蜀遊不虞斯來復與前合况總括六藝又擢一枝青春之年黃綬標映瑩若玉立蹌然鶴峙長空無倪可以直上人之望也今諫議大夫崔公冀國之貴介弟於公為外舅焉以兄弟之子猶子也冰玉不閒潘楊載睦始君之來拜乎姻婭由君之美加乎愛矣東林表郤公遠鑒南宮實夫子知賢光昭好逑能以德選自中形外論者休之實沈之會言旋上國蜀多名園載酒交餞雪氷初下同雲始飛寒暄正中跋涉無苦豫亦羈齒久而越吟曷為歸期十月良日方將尋鮑子之舊復田蘇之遊若君此行不歎卬否尚書兵部郎趙公謀以貺別尚書虞部李公作為新題㣥公僉同各以位敘云祁丞公表微造理之士也嘗精其思而深於詩警其神而存乎象深於詩者得之於風雅存乎象者受之於丹青非奇峰絶壑則不能運其機非緣情體物則不能動其興機興之作為達者多之去年八月閩越納貢而吾子實董斯役水陸萬里寒暄浹年三江五湖敻然復遊遠與為別故人何情虞部郎中岑公贈詩一篇情言兼至當時之絶也凡敘所以廣意既先見我又何載焉送君都門舉手千萬判官擢天府一枝之秀居十二年而先其文章用譽聲馳寰海內行修潔正為人言故王公卿士願見顏色皆延以座右挹以上樽結平生之至歡聽傳習之餘論翕然而風靡矣自隨牒吳楚諸府交辟有車轔轔無一日而止故驟遷於維荊仍假治書亦既達矣今上觀兵鳳翔之歲公以錫貢會於闕庭舉朝延首以望真拜屬多難之際蒼黃易誣斬馬未聞於去佞宏羊且偏於用法是有流沙之譴不及旬日至於五原犬戎合圍我在堅壁以功復為詞曹外掾雖雷雨作解而風塵未厭流離辛苦又屆乎漢陽雲天路長骨肉為念將欲出三峽浮三江漸達於吳會接行鴈於舊地問伯魚之他日蓋生死骨肉之會豈勝言哉大寒之歲衆木皆死相彼松柏雖復小凋而貞心徑節不改柯易葉實君子之大端也持此貺別不知其他賈生深於義者也又能保和天資強學不倦甘禦寇之執爨處原憲之非病行於林泉蓋數周矣實沈之會賁然來思南郭之下言尋舊好顧州縣而不為道屈齊得失而介茲福利實君子之大端也知我者鮮謂豫知之朝夕之歡經時不去式歌且賦嘗至於夜分不知天下之秋颯然而至咏采薇以獨往始班荊而送別南指蜀路江山四蔽苟吾道之可存居鳴水而何陋是為不侵不叛之地得以長處約矣乃知全謀決策可以遠馭青溪白雲時復助興二三子豈知樂在其中乎出郊之時論別而已叔父乃相國東海公猶子之慶裔今少師郢國公外王父之介弟也生於台庭長於儒門修先王之典禮操作者之文律斯亦叔父立身之道宏矣屬時艱難流離辛苦田園蕪沒族黨淪謝斯又叔父厚生之道窮矣三十年閒為東西人豈無常科亦有世路道之不由吾其與也得非恢達自是處之無悶耶况郢公和義以仁如存展敬居常館給不度以年因得造寢席問起居不敢墜睦親之禮久矣夫不羈之才若不繫之舟不然則何以泛其流而析其滯歟既而將登商顏尋綺季翼儲之顯晦進浮滄浪追漁父遁代之始終或經九嶷或入五嶺探靈感廣異聞崇朝命駕來告于邁不懌者結遐方之離思所賀者從諸侯之勝遊敬奉觴以祖軷遂贈言於慎夏云昔者秦賦渭陽之詩蓋孟公子之出祖也綿歷千祀頌聲不泯幼失慈愛於斯為苦未嘗不廢卷撫膺書紳自勉以為罔極之報祭在如存之禮不其然歟自幽燕稱亂伊洛內覆爰我舅黨舉族東遷祏室無祀名園何在永懷展敬渴日無緣叔舅十年過江三命作吏慶垂必復休有令聞使車斯來輒不自意陽翟駿選天書寵光思同晝遊有日矣伯舅京劇先鳴曷遊偕往小子江華罷守未離繫滯指途惜別卜勝初筵當獻歲之方春對上林之晴雪興酣景晏欲罷不能則叔舅之慈惠鍾於我也良可知矣望鈞臺舊都返伊川故里出鄢郢長道控河淮要衝於焉馳名於以在我况清白以世業留遺貞幹以天資自許鴻鵠之舉雲霄可期慙無酷似拜命之辱敘離道念庸不喻乎司勳員外郎鄭昌締卲同等也實為首倡其或繼之者則以多為貴爾宏農楊倓世以文藝登甲乙科而倓克構前烈復修儒行升高作賦正始言詩期於拾青今也被褐蓋未遇云爾桂林之遊我何憂哉在幕則副使韋公存乎舊判官韋公置乎客其外則韓萬州為知舊則倓不孤客則倓有託知則倓可遊豫亦子之舊也見其來則撫之憂則樂之命諸子以同之其他則不如二三子之強大嘗所愧焉忽有餘興言將南邁尋桂江之遠近度疑山之險易適諸侯之館披三越之圖並蒼梧以右轉觀象地之發跡亦何謝泛五湖探禹穴而暢其孤憤哉扁舟一葉風濤千里於所適復何危乎吾當俟子於壽星之會而復祗命所在念此無忽興元之元季夏之望河南于卲詞夫以禮樂為用檢身若不及者嘗聞其語矣今見厙狄子雅而有之况心氣爽練尤於妙理原憲非病黔婁自安沽之哉吾待價也漢陽之禾人食如玉有妻子以宜家無饘粥以糊口余承艱否又不能救夏四月告余以行舉家杖藜將赴於蜀蜀多奇士吾道其南風水之便宜未量也隴俗春晚梅花始發言送山路蕭然雨寒四郊多虞舉手千萬老夫負纍炎方僻處南館東阻高岸西臨通衢衡門寂寥誰與為晤數日之後而得比鄰盛卿者眷道以閒處約以靜詩禮日訓柴荊晝關嘗思急病之用載勤稽古之力每接以三餘時復一見來不飲酒去無可欲儒之敬慎有如此者春三月叩門告別且曰本剡中人也家於錢塘一入桂林十周星矣慚走長安之道將尋吳會之事乘其波流聊以自適僕老者病者以憂以悒留之則難別又不易子之不飲不可以斗酒歡我以窮途無得以束修贈執手分別傷如之何雲雨一散江山萬里東西南北其有會乎遷客于卲贈言而已嘗喜南中之遇墨客者甚矣今又得會稽朱因卿焉序而字之蓋美之爾况其學也博其文也精凡作為篇章皆可興咏處之於代則詩人之選也卲故東西南北願與修好從可知矣始至之日贄見於我府公府公答之以客禮亦既館給終焉宴私高枕延國士之風開門多長者之轍義非苟合道不虛行叩清徵而況我知音執禮容而許我先達歡於老夫接辱與允子遊風雨如晦孰云其已而北走長安萬里帝王居治所也賢關啓鑰哲匠見焉鵬摶鳳翥造次於是彼美因卿在斯一舉餘勇可賈矧爾彀中瀟湘悠悠鄢郢阻修商峴衡嶷白雲閒之登山臨水楚人之重別也人涉卬否衛詩之歎異也雖欲勿歎得無歎乎秀才以我府公有元昆同官之舊邂逅不見於今三年故不遠數千里泝瀟湘踰零桂而循來上謁府公府公嘉是來也館有加籩之餼宴有承筐之禮上下交好州人悅之既而盈卷新文惠豫佳句舟羲舟將往咨我緒言夫閉門循來者遷客之心也窮巷迂轍者達士之情也以達士之情眷索遷客不腆之作雖處憂危得無承乎多謝之仁行矣自愛昔泰卿賦多與太學英達為之遊二十年閒學者逃難石渠遂閉鼓篋無聞近三四年復與士合每歲以故事選實而流頌聲則江寧冷侯由此擢秀今乏與比前或少雙是以中朝宗文當代秉義者蓋嚮風矣不復相鄙愚無閒然得為田蘇之遊不負金石之契亦既多矣吳會之地慈親倚門冷侯言歸心切攸往白鴈初過青冥轉高駕言東遊雲雨惜別卲亦是日理裝也始同末異愴此歧路冷侯深於詩也祕監韋公敘焉其為歌詩以出餞皆漢廷顯達士林精妙各附爵里為一時之榮卲何言哉貺別而已曩歲忝西掖舍人與秀才同官遊朝赴玉墀夕下金闕於今二十年矣今復左遷僻地羈旅信安不期東遊邂逅相遇而能倍年下禮論舊加敬實高標雅裁為邦家之光故懷袖雄文豫得興咏長途逸足豫將企望而殿中侍御史范陽盧公聿來監州持我文柄解書之畏當翰林主人來者飲德挹之不竭嘯歌攸同逮茲中冬將盡厚意不虞作別况豫之與名輩者乎如何選舟告我行邁羅郭之下縠川可厲枯桑槭而不知有風暮天暗而且欲飛雪此時以長年其悲懷哉曷日相會哉蔡氏之子曰虛舟以十月良日旅次於信安謂余老於文者展後進之禮清晨來思贈余舊文凡數十篇與之討論導以無倦蔡子乃盱衡而納焉夫如是則何患乎名不揚道不行春官卿復將示諸掌乎佻兮達兮亦以永日言飲之酒時無閒焉客非滯者遊有常者言告言歸明日遂行雖江南地暖於景度短急張帆便風猶可及遠蔡子其將邁乎常山公于卲敘別通公釋門之秀者也生本達節出修梵行表之以威儀文之以外教始具戒於衡山之下瀟湘之閒嘗以律人法雖可住而相不可住是以杖飛錫入五嶺將遠舉於羅浮尋跡於現靈為矯其因而集乎緣遊其方而廣乎志洪惟通公之為心也其至矣夫猶復歷天柱訪爐峰背淮淝即嵩潁翺翔乎中國以及乎上京上京聖君布政之所也公觀夫宮闕則曷若西方之諸天公接彼龍象則曷若西方之衆聖加以探密藏傳意珠發揮象法啓迪來學在此行也扁舟而南溟漲茫茫要荒積阻動千萬里歲月不之計歧路不之悲曠哉釋子不可得而攀也釋氏之有出家猶儒門之務行道既得其道則思其通過去諸佛以故能聖則出證於無生歸於等觀安可倪乎有乘精於斯勤於斯乃至旋頂無苦剜身為樂赴湯蹈火而不捨晝夜者是夫鋭公天縱明惠學究多聞誦詩三百而言思無邪閲部十二而義心自了寄文章為語默任施捨為行藏內修為法律外習為祕苑豫則不敏人皆仰之前年背自瀟湘登桂嶺大人君子延方丈之室與論實相下士齊人奉次第之食為說皆空習靜而外郛永安得朋而西山有寺青蓮宮裏日月宵中雖法侶常遊而吾儕不閒嘗憶浮山是蓬萊一島浮來與羅峰合秀寶房瑤室七十有二松閣石樓千百其數麻姑舞鳳之地葛仙蟬蛻之所將欲導殊勝廣異聞鋭公此行天下莫二矣十月良月晴天愛景密葉彌茂繁花不寒㣥山壁立而合沓百蠻長江海連而澎湃萬里搜奇索異可駐行舟懷哉勝遊不愧相送逮春之冰泮期我於荊峴之閒乎序曰卲高叔祖皇朝尚書左僕射侍中太子太師燕國定公諱志寧博學多聞徇忠秉直為秦府十八學士其左右庶子不道嘗撰諫苑三十篇諷之凡有文集若干卷於代又述作之外修集家譜其受姓封邑衣冠婚嫁著之譜序亦既備矣歷一百七十餘年家藏一本人人遵守未嘗失墜洎天寶末幽寇叛亂今三十七年頃屬中原失守族類逃難不南馳吳越則北走沙朔或轉死溝壑其誰與知或因兵禍縱橫吊魂無所或道路阻塞不由我歸或田園淹沒無可回顧所以舊譜散落無餘將期會同考集不齊奚為修集實難有待今且從卲一房自為數例有若九祖長房今太子少保譙國公頎與卲同升於朝股肱四聖為國元老卲之弟也有若九祖第三房今襄王府録事參軍載與卲同在京列保家履道為宗室長卲之兄也各引才識子弟參定其宜從而審之誰曰不可又以子孫漸多昭穆編次紙幅有量須變前規亦春秋之新意也今請每房分為兩卷其上卷自九祖某公至元孫止其下卷自父考及身已降迭相補注即令卲以皇考工部尚書為下卷之首此其例也且諸房昭穆既同尋而繹之可以明矣後能代習家法述作相因從子及孫從孫及子孫孫子子興復宗祧豈唯兩卷乎將十部而彌盛矣其文公第四子安平公房此建平公已上三房衣冠人物全少今與文公第五子齊國公文公第六子葉陽公文公第七子平恩公文公第八子襄陽公文公第九子桓州刺史併以六房同為一卷就中第五卷已下子孫皆名位不揚婚姻無地湮沈斷絶寂爾無聞但存舊卷而已後有遇之者知之者以時書之其五祖九祖分今敘在三卷並録之於後時貞元八年歲在壬申八月朔日金紫光祿大夫太子賓客上柱國襲恆山郡開國公于卲述
