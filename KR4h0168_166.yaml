front:
  text: 全唐文欽定全唐文卷一百六十六照鄰字昇之幽州范陽人初授鄧王府典籤調新都尉因風疾去官沈痼攣廢不堪其苦投潁水死年四十
  hash: sha256:705bac7d306c33232b76ad46951024f597e645db8f4cd4f195bf879a00723342
  markers:
  - {type: head, offset: 14, content: 盧照鄰(一), id: KR4h0168_NFKB_166-h1, level: 1}
body:
  text: 日昨於著作局見諸著作競寫雙槿樹賦蓬萊山上即對神仙芸香閣前仍觀祕寶金懸秦市楊子見而無言紙貴洛城陸生聞而罷笑故知柔條朽幹吹噓變其死生落葉凋花剪拂成其光價方且傳石渠之故事得槿樹之新名足以脂粉仙臺丹青祕府者也若布衣藜杖巖棲藿食當堯時而非吏處漢代而無田學涉蕪淺文多瞽陋宜其屏竄用其靜默蓋窮而思達人之情也卑而應高物之理也故疾雷作而蟄蟲飛浮雲興而石磶潤不可廢也雖云聖朝多士而公實居之草澤有人亦國家之美事也故復獎刷芻鄙作雙槿樹賦辭義猥薄退增慚靦賦曰方丈蓬萊邈矣悠哉芸扃石室圖天揆日若乃羲和掌日太史觀星銅渾玉策寶笥金銘地則圖書之府人則神仙之靈中有芳蕣鬱鬱亭亭觀其兩砌分植雙階並耀葉鏤五衢榮分四照紛廣庭之靃靡隱重廊之窈窱青陸至而鶯啼朱陽升而花笑紫蔕紅蕤玉蕊蒼枝露華的皪風色徘徊采粲照灼婀娜隈緌迫而視之鳴環動佩歌扇開遠而望之連珠合璧星漢迴狀仙人之羽葢疑佚女之瑤臺寂寞攸利棲閒此地委命卷舒隨時榮顇外無嬰夭之禍內有逍遙之致朝朝暮暮落復開歲歲年年紅以翠若夫遊蜂戲蝶封其萼輕烟弱霧絡其條去不謂之損來不謂之饒故能出君子之殊俗入詩人之舊謠齊顯昧於兩曜效生死於一朝同喪我之非我固雖凋而不凋別有亭伯儒門令思詩友翰苑曠其吞夢文鋒高而照斗詠蕪滋之朝夕悲積薪之先後縟繡起於緹紡煙霞生於灌莽豈與巖幽弱篠澗底枯松徒冒霜而停雪空集鳳而吟龍詎得奉仙闈之廣價連筆匠之為容已矣哉東方生聞而歎曰故年花落不留人今年花發非故春倏兮夕隕忽兮朝新侏儒何功兮短飽曼倩何負兮長貧聊寄辭於庭樹儻有感於平津孕天然之靈質稟大塊之奇工嘴距足以自衞毛羽足以淩風懷九圍之遠志託萬里之長空陰雲低而含紫陽星升而帶紅經過巫峽之下惆悵彭門之東既而摧頹短翮寥落長想忌蒙莊之見欺哀武溪之莫往進謝扶搖之力退慚歸昌之響腐食多懼層巢無像屈猛性以自馴抱愁容而就養於是傍眺德門言棲仁路不踐高梁之屋翔止吾人之樹聽鳴雞於月曉侶㣥鵲於星暮狎蘭砌之高低玩荊扉之新故循廣庭之一息歷長檐而徑度若乃風去雨還河移月落徘徊亂於雙燕鳴舞均乎獨鶴乍嘯聚於霞莊時追飛於雲閣荷大德之純粹將輕姿之陋薄思一報之無階欣百齡之有託余曾有橫事被拘為㣥小所使將致之深議友人救護得免竊感趙壹窮鳥之事遂作窮魚賦常思報德故冠之篇首云有一巨鱗東海波臣洗淨月浦涵丹錦津映紅蓮而得性戲碧浪以全身宕而失水屆於陽瀕漁者觀焉乃具竿索集朋黨鳧趨雀躍風馳電往競下任公之釣爭陳豫且之網螻蟻見而甘心獱獺聞而抵掌於是長舌利嘴曳綸垂鈎拖鬐挫鬣撫背扼喉動搖不可騰躍無由有懷纎潤寧望洪流大鵬過而哀之曰昔予為鯤也與是遊乎自予羽化之子其孤俄撫翼而下負之而趨南浮七澤東汎五湖是魚也已相忘於江海而漁者猶悵望於泥塗癸酉之歲余臥病於長安光德坊之官舍父老云是鄱陽公主之邑司昔公主未嫁而卒故其邑廢時有處士孫君思邈居之君道洽今古學有數術高談正一則古之蒙莊子深入不二則今之維摩詰及其推步甲子度量乾坤飛煉石之奇洗胃腸之妙則甘公洛下閎安期先生扁鵲之儔也自云開皇辛丑歲生今年九十二矣詢之鄉里咸云數百歲人矣共語周齊間事歷歷如眼見以此參之不啻百歲人也然猶視聽不衰神形甚茂可謂聰明博達不死者矣余年垂強仕則有幽憂之疾椿菌之性何其遼哉於時天子避暑甘泉邈亦徵詣行在余獨臥病茲邑閴寂無人伏枕十旬閉門三月庭無眾木惟有病梨一樹圍纔數握高僅盈丈花實顦顇似不任乎歲寒枝葉零丁纔有意乎朝暮嗟乎同託根於膏壤俱稟氣於太和而修短不均榮枯殊質豈賦命之理得之自然將資生之化有所偏及樹猶如此人何以堪有感於懷賦之云爾天象平運方祗廣植挺芳桂於月輪橫扶桑於日域建木聳靈邱之上蟠桃生巨海之側細葉枝連洪柯條直齊天地之一指任烏兔之棲息或垂陰萬畝或結子千年何偏施之雨露何獨厚之風烟愍茲珍木離離幽獨飛茂實於河陽傳芳名於金谷紫澗稱其殊旨元光表其仙族爾生何為零丁若斯無輪桷之可用無棟梁之可施進無違於斤斧退無競於班倕無庭槐之生意有巖桐之死枝爾其高纔數仞圍僅盈尺修幹罕雙枯條每隻葉病多紫花凋少白夕鳥怨其巢危秋蟬悲其翳窄怯衝飈之搖落忌炎景之臨迫既而地歇蒸霧天收耀靈西秦明月東井流星顦顇孤影徘徊直形狀金莖之的的疑石柱之亭亭若夫西海夸父之林南海蚩尤之樹莫不摩霄拂日藏雲吐霧別有橋邊朽柱天上靈楂年年歲歲無葉無花榮辱兩齊吉凶同軌寧守雌以外喪不修襮而內否亦猶縱酒高賢佯狂君子為其脗合置其憂喜生非我生物謂之生死非我死谷神不死混彭殤於一觀庶筌蹄於茲理覽萬物兮竊獨悲此秋霖風橫天而瑟瑟雲覆海而沈沈居人對之憂不解行客見之思已深若乃千井埋烟百㕓涵潦青苔被壁綠萍生道於是巷無馬跡林無鳥聲野陰霾而自晦山幽曖而不明長塗未半茫茫漫漫莫不埋輪據鞍銜悽茹歎借如尼父去魯圍陳畏匡將饑不爨欲濟無梁問長沮與桀溺逢漢陰與楚狂長櫛風而沐雨永棲棲以遑遑及夫屈平既放登高一望湛湛江水悠悠千里泣故國之長楸見元雲之四起嗟乎子卿北海伏波南川金河別雁銅柱辭鳶關山夭骨霜露凋年眺窮陰兮斷地看積水兮連天別有東國儒生西都才客屋滿鉛槧宜虛儋石茅棟淋淋蓬門寂寂蕪碧草於園徑聚綠塵於庖甓玉為粒兮桂為薪堂有琴兮室無人抗高情以出俗馳精義以入神論有能鳴之雁書成已泣之麟覩皇天之淫溢孰不隅坐而含顰已矣哉若夫繡轂銀鞍金杯玉盤坐臥珠璧左右羅紈流酒為海積肉為巒視襄陵與昏墊曾不輟乎此歡豈知乎堯舜之臞瘠而孔墨之艱難幽憂子學道於東龍門山精舍布衣藜羹堅臥於一巖之曲客有過而哀之者青囊中出金花子丹方相遺之服之病愈視其方丹砂二斤穀楮子則山中可有丹砂則渺然難致昔在關西太白山下一隱士多元明膏中有丹砂八兩予時居貧不得好上砂但取馬牙顏色微光淨者充用自爾丁府君憂每一慟哭涕泗中皆藥氣流出三四年羸臥苦幾至於不免復偶於他方中見一說云丹砂之不精者服之令人多訪知一處有此物甚佳兩必須錢二千文則三十二兩當取六十四千也空山臥疾家業先貧老母年尊兄弟祿薄若待家辦則委骨於巉喦之峰矣意者欲以開歲五月穀子熟時試合此藥非天下名流貴族王公卿士以仁惻之心達枯骨朽株者孰能濟之哉今力疾賦詩一篇遍呈當代博雅君子雖文不動俗事或傷心儻遇晏嬰脫左驂而見贖如逢孔子分秉粟以相憂則越石原憲不辛苦於當年矣惟當坐禪念室以答深仁若諸君子家有好妙砂能以見及最為第一無者各乞一二兩藥直是庶幾也仲尼曰有能一日用其力於仁者乎未有力不足者又曰君子無終食之間違仁在坐則參於前在輿則倚於衡古人心可見矣又曰仁遠乎哉我欲仁斯仁至矣言能苟行之仁道不遠也朝英貴士博濟而好仁者何必相識故知與不知咸送詩告請無案劍同掩體骸云爾山僕至自都太子舍人裴瑾之太子舍人韋方賢左史范履冰水部員外郎獨孤思莊少府丞舍人內供奉閻知微符璽郎喬偘並有書問余疾兼致束帛之禮以供東山衣藥之費嗟乎代與道交喪其來尚矣殷揚州與外甥韓康伯別慨然而詠富貴他人合貧賤親戚離因泣下交頤不能自已余以其為人也名過其實然窮達之際則西狩獲麟所不能免斯亦古君子之大悲也自鄶而下曷足譏焉余家咸亨中良賤百口自丁家難私門弟妹凋喪七八年間貨用都盡余不幸遇斯疾母兄哀憐破產以供醫藥屬歲穀不登家道屢困兄弟薄遊近縣創鉅未平雖每分多見憂然亦莫能取給海內相識亦時致湯藥恩亦多矣晚更篤信佛法於山間營建所費尤廣本欲息貪寡慾緣此更使貪心萌生每得一物輒喜歡更恨不足嗚乎道惡在而奔競之苦茲雖觀若空無常而此業已就不可中廢祈獲福澤思與士君子共之昔張子房處太傅之尊自疏於南山隱公孫宏居丞相之位亦伏於東方生伯喈已亡孔文舉將老兵而造膝方回尚在王羲之就傖奴而共談良史書之高賢不以為累自古朝野曷常以人廢言况下官抱疹東山不干時事借人唱和何損於朋黨延州子期聞音竊抃猶冀身膏丹壑脫寶劍於山阿骨掩黃塵罷瑤琴於天下則捐金抵玉於山谷者非太平之美事乎幽憂子白昔文王既沒道不在於茲乎尼父克生禮盡歸於是矣其後荀卿孟子服儒者之褎衣屈平宋玉弄詞人之柔翰禮樂之道已顛墜於斯文雅頌之風猶綿連於季葉痛乎王澤既竭諸侯為麋鹿之場帝圖伊梗天下作豺狼之國秦人一滅舊章大愚黔首㣥書赴火化崑岳之高烟儒士投坑變蓬萊之巨壑樂沈於海河間王初睠睠於古篇禮失諸夷叔孫通乃區區於綿蕝安國討論科斗五典叶從史遷祖述獲麟八書爰創衣冠禮樂重聞三代之風玉帛謳歌無墜六經之業鬱其興詠大雅於是為㣥自此迄今年逾千祀聖門論賦相如為入室之雄闕里裁詩公幹即升堂之客陸平原龍驚學海浮天泉以安流鮑參軍鶴翥文場代黃金之平埒臨曲臺之上路面通衢之小苑蓮紅水碧堪釣叟之淹留桂白山青宜王孫之攀折香車貴士不掩龍關縫掖書生時通驛騎坐蘭徑敞松扉北牖動而清風來南軒幽而白雲起欣然命駕弔曲江之隑淵興盡而歸聆伊川之笙吹三朝慶謁趨劍履於南宮五日歸休聞歌鐘於北里雍容車騎屢動雕章嘯傲煙霞仍含寶思奢不敗德笑金谷之羅紈儉不邀名悲蘭陵之芻布榮期三樂君寔四之平子四愁我無一矣君教訓子弟不讀非聖之書撫愛家僮常恐名奴之辱婚嫁已畢欲就金丹輪葢非榮猶思道樹明霞曉挹終登不死之庭甘露秋團儻踐無生之岸凡所著述多以適意為宗雅愛清虛不以繁詞為貴足以傳諸好事貽厥孫謀故撰而存之凡為若干卷云爾昔者龍蹲東魯陳禮樂而救蒼生虎據西秦焚詩書以愚黔首通其變參天二地謂之神合其機一陰一陽謂之聖是以楚漢方鬬蕭曹絳灌負長劍於此時袁曹已平徐陳應劉弄柔翰於當代聖人方士之行亦各異時而並宜謳歌玉帛之書何必同條而共貫文質再而復殷周之損益足徵驪翰三而改虞夏之興兦可及美哉煥乎斯文之功大矣自獲麟絕筆一千三四百年游夏之門時有荀卿孟子屈宋之後直至賈誼相如兩班敘事得邱明之風骨二陸裁詩含公幹之奇偉鄴中新體共許音韻天成江左諸人咸好王褱姿艷發精博爽麗顏延之急病於江鮑之間疎散風流謝宣城緩步於向劉之上北方重濁獨盧黃門往往高飛南國輕清惟庾中丞時時不墜嗟乎古今之士遞相毀譽至有操我戈矛啟其墨守三都既麗徵夏熟於上林九辯已高責春歌於下里蹖駮之論紛然遂多近日劉勰文心鍾嶸詩評異議蜂起高談不息人慚西氏空論拾翠之容質謝南金徒辯荊蓬之妙扌叐十得五雖曰肩隨聞一知二猶為臆說僉曰未可人稱屢中化魯成魚曷云其遠非夫妙諧鍾律體會風騷筆有餘妍思無停趣作龜作鏡聽歌曲而知兦為龍為光觀禮容而識大齊魯一變之道唐虞百代之文懸日月於胸懷挫風雲於毫翰含今古之制扣宮徵之聲細則出入無間麤則彌綸區宇逶迤綽約如玉女之千嬌突兀崢嶸似靈龜之孤樸乘槎上漢誰問坳堂之淺深荷㦸入秦寧議長安之遠近是非未定曹子建皓首為期離合俱傷陸平叔終身流恨超然若此適可操刀自茲已降徒勞舉斧八病爰起沈隱侯永作拘囚四聲未分梁武帝長為聾俗後生莫曉更恨文律煩苛知音者稀常恐詞林交喪雅頌不作則後死者焉得而聞乎貞觀年中太宗外厭兵革垂衣裳於萬國舞干戚於兩階留思政塗內興文事虞李岑許之儔以文章進王魏來禇之輩以材術顯咸能起自布衣蔚為卿相雍容侍從朝夕獻納我之得人於斯為盛虞博通萬句對問不休李長於五言下筆無滯岑君論詰亹亹聽者忘疲許生章奏翩翩談之未易王侍中政事精密明達舊章魏太師直氣鯁辭兼包古義來闕十二字禇河南風標特峻早鏘聲於冊府變風變雅立體不拘於一塗既博既精為學遍游於百氏自豸冠指佞雞樹登賢內掌機密外修國史晨趨有暇持綵筆於瑤軒夕拜多閒弄雕章於琴席含毫顧盼漢家之城闕風煙逸韻縱橫秦地之林泉魚鳥黃山羽獵幾奏瓊篇汾水樓船參聞寶思南津弔屈去逐蒼梧之雲西路悲昂來挽葱巖之雪江湖廊廟造次不忒其儀沙塞朝廷顛沛必歸於漢是使名流俱至兔翰闐門愛客相尋雞談滿席嚶嚶好鳥花欲白兮柳將菲潎潎遊魚蓮欲紅兮蘋可望綠樽恒湛齋閣臨霞綺札逾新園亭坐月凡所著述千有餘篇今之刊寫成三十卷早遊西鎬及周史之闕文晚臥東山憶漢庭之遺事平津侯之賓館馬廏蕭條李司隸之仙舟龍門荒毀交交黃鳥集於栩兮集於桑營營蒼蠅止於藩兮止於棘九原可作松有隧兮兔有埏三湘不追川無梁兮鳥無徑輟斤之慟何獨莊周聞笛而悲寧惟向秀徒勤觀海未知渤潏之倪永好談天莫究氤氳之數遂抽短翰為之序云聞夫歌以永言庭堅有歌虞之曲頌以紀德奚斯有頌魯之篇四始六義存兦播矣八音九闋哀樂生焉是以叔譽聞詩騐同盟之成敗延陵聽樂知列國之典彞王澤竭而頌聲寢伯功衰而詩道缺秦皇滅學星琯千年漢武崇文市朝八變通儒作相徵博士於諸侯中使驅車訪遺編於四海發詔東觀縫掖成陰獻書南宮丹鉛踵武王風國詠共驪翰而升沈里頌途歌隨質文而沿革以少卿長別起高唱於河梁平子多愁寄遙情於壠坂南浦動關山之役作者悲離東京興黨錮之誅詞人哀怨後人皷吹樂府新聲起於鄴中山水風雲逸韻生於江左言古興者多以西漢為宗議今文者或用東朝為美落梅芳樹共體千篇隴水巫山殊名一意亦猶負日於珍狐之下沈螢於燭龍之前辛勤逐影更似悲狂罕見鑿空曾未先覺潘陸顏謝蹈迷津而不歸任沈江劉來亂轍而彌遠其有發揮新體孤飛百代之前開鑿古人獨步九流之上自我作古粵在茲乎樂府者侍御史賈君之所作也君升堂入室踐龜字以長驅藏翼蓄鱗展龍圖以高視林宗一見許以王佐之才士季相看知有公卿之量南國蛟龍之燿下觸詞鋒東家科斗之書來游筆海朝陽弄翮即踐中京太行垂耳先鳴上路當赤縣之樞鑰作高臺之羽儀動息無隔於溫仁顛沛安由乎正義玉階覆奏依然汲直之聞銅術埋輪先定雍門之罪霜臺有暇文律動於京師繡服無私錦字飛於天下九成宮者信天子之殊庭㣥山之一都也五城既遠得崑閬於神京三山已沈見蓬萊於古輔紫樓金閣雕石壁而鏤㣥峯碧甃銅池俯銀津而橫眾壑離宮地險丹磵四周徼道天迴翠屏千仞衞尉寢蒙茸之署將軍無刁斗之警中巖罷燠飛霜為之夏凝太谷生寒層淮以之秋沍天子萬乘驅鳳輦於西郊㣥公百僚扈龍軒而北輔春秋絡繹冠葢滿於青山寒暑推移旌節喧於黃道夕宿雞神之野朝登鳳女之臺青鳥時飛白雲無極千年啟聖邈同汾水之陽七日期仙頗類緱山之曲經過者徒知其美揄揚者未歌其事恭聞首唱遂屬洛陽之才俯視前修將麗長安之道平恩公當朝舊相一顧增榮親行翰墨之林先標唱和之雅於是懷文之士莫不嚮風靡然動麟閣之雕章發鴻都之寶思雲飛綺札代郡接於蒼梧泉湧華篇岷波連於碣石萬殊斯應千里不違同晨風之鴪北林似秋水之歸東壑洋洋盈耳豈徒懸魯之音郁郁文哉非復從周之說故可論諸典故被以笙鏞爰有中山郎徐令雅好著書時稱博物探亡篇於古壁徵逸於道人撰而集之命余為序時褫巾三蜀歸臥一邱散髮書林狂歌學市雖江湖廊廟賓廡蕭條綺季留侯神交髣髴遂復驅偪幽憂之疾經緯朝廷之言凡一百一篇分為上下兩卷俾夫舞雩周道知小雅之歡娛擊壤堯年識太平之歌詠云爾梓州城池亭者長史張公聽訟之別所也徒觀其巖嶂重復川流灌注雲窗綺閣負繡堞之逶迤澗戶山樓帶金隍之繚繞信巴蜀之奇制也時鳳扆多閒上得和平之政鯷瀛有截下無交爭之人以公寄切上僚故久無州將連四千石之重任總十萬井之雄班職逾劇而道彌高位逾崇而德彌廣市獄無事時狎鳥於城隅邦國不空且觀魚於濠上賓階月上橫聯蜷之桂枝野院風歸動葳蕤之萱草則有明珠愛客置芳酒於十旬羽服神交契仙遊於五日圓潭瀉鏡光浮落日之津雜樹開幃彩綴飛煙之路藤蘿杳藹挂疎陰以送秋鳧雁參差結流音而將夕百年之歡不再千里之會何常下客悽惶暫停歸轡高人賞玩豈輟斯文咸請賦詩以紀盛集諸公迹寓市朝心游江海訪奇交於千里惜良辰於寸陰常恐辜負琴書荒凉山水於是脫屣人事鳴棹川隅言追挂犢之才用卜牽牛之賞邊生經笥送炎氣以濯纓郝氏書囊臨秋光而曝背似遇緱山之客還疑星漢之游願駐景於高天想乘霓於縮地繁絲亂響凉酎時斟戲翔羽於平沙釣潛鱗於曲浦乘流則逝不覺忘歸咸可賦詩探韻成作夫清風動駕謁阮籍於山陽素雪乘舟訪戴逵於江路猶名高好事迹標良史未有鶯臨綺月筵開許郭之談花聚繁星門枉荀陳之馭泛煙光於紫瀲翻露色於丹滋亭臯一望平蕪千里萋萋芳草童兒牧馬之場亹亹朝川野老休牛之塔釣臺隱隱先生之桑梓可知茨嶺巖巖隱士之風流尚在豈使臨卭樽酒歌賦無聲彭澤琴書田園寢詠夫圯上黃公靈期已遠湘中元乙化跡難徵况乎神理巋然近帶青溪之路王褱姿可望俯控丹巖之下予以歸骸空谷言隔市朝濯髮長川載離寒暑心灰兩寂長無具爾之歡形木雙枯將有終焉之志不悟喬鸎始囀喈喈於鶺鴒野萼初開鞾鞾於棠棣命壺觴而引宴即沐新蘭尋磵戶以安歌仍攀野桂萋萋春草王孫游兮不歸秩秩斯干幽人去而忘返皷我舞我修袖滿於中巖神之聽之多祜興於觸石爰有嘉命咸遣賦詩請題四韻列之如右相樂夫人韋氏者益州都督長史胡公之繼親也夫人寓跡蘭閨栖情香岫琢磨六行與三明而並驅馳騖四禪將十訓而齊駕粵以乾封紀歲流火司晨敬遣靈龕奉圖真相青蓮皓月爭華蚊睫之端寶樹天花競爽鴻毛之際納須彌於纖芥嘗謂徒言置由旬於方丈今過其實重宣此義敢為讚云猗歟寶相顯允神功規模鹿苑圖寫龍宮分身諦聽列坐談空㣥天颯纚眾寶玲瓏雕窗引月鏤網搖風一窺妙境高謝塵蒙夫鎔金逞妙徒鏧中人之產架寶崇奢未階大乘之化豈若圖徽紈素卷舒方丈之筵表裏丹青藻繪多林之色獨為先覺其在茲乎益州長史公道洽中孚履黃裳以貞吉寄隆分陝苴白茅而涉川猶為龜組相輝不離泡幻之域熊車結轍尚迷苦愛之津爰捨淨財幸求多福為亡女宇文氏敬造像等徵奇綃於水府採妙色於霞莊月面澄華疑金雲之夜敞蓮毫吐照狀珠浦之晨開花寶參差眺鶴林其非遠仙雲肸蠁登鷲嶺其可望窮形盡相陋燕壁之含丹寫妙分容嗤吳屏之墜筆式揚顯福俾讚幽魂其詞曰正教東漸遺像西至化格三天功超十地偉歟大士宏茲遠致追慟幽途載營檀施皎潔霜紈照影丹素果發金口蓮生玉步地寶天花星羅雲布慧炬長設迷津永度自古為文者多以九七為題目乃有九歌九辨九章七發七啟其流不一余以為天有五星地有五嶽人有五常禮有五禮樂有五聲五者亦在天地之數今造五悲以伸萬物之情傳之好事耳一悲曰恭聞古之君子兮將遠適乎百蠻何故違父母之宗國從禽獸於末班將矯詞兮不往將背俗兮不還寧曲成而薄喪不直敗以厚顏彼聖人兮猶若此况不肖於中間古往今來邈矣悠哉嵇生玉折顏子蘭摧人兮代兮俱盡代兮人兮共哀至如左邱失明冉耕有疾兵法作而斷足史記修而下室高明者鬼瞰其門正直者人怨其筆雖為鏡於前代終抱痛於今日別有漢陽許掾邠國臺卿抗希代之奇節負超時之令名坎壈九死離披再生伊才智之為患故賢哲之所嬰若乃賈長沙之數奇崔亭伯之不偶思欲削魯史之高行鉗楊墨之辯口為書為禮驅季俗於三古之前垂譽垂聲正頹綱於百王之後天子聞之而欲用㣥公畏之而莫取徒窘蠢於泥沙竟龍鍾於塵垢異乎稽之古人則如彼考之今代又如此近有魏郡王公曰方華陰楊氏曰亨咸能博達奇偉覃思研精探孔門之禮樂吞鬼谷之縱橫嶽秀泉澄如川如陵高談則龍騰豹變下筆則煙飛霧凝土則官終於郡吏楊則官止於邑丞何異夫操太阿以烹小鮮飛夜光而彈伏翼灼金龜兮訪兆邀玉騏兮騁力雖勞形而竭思吾固知其不得予之昆兮曰杲之余之季兮曰昂之杲也杲杲兮如三足之烏昂也昂昂焉如千里之駒杲之為人也風流儒雅為一代之和玉昂之為人也文章卓犖為四海之隋珠並蘭馨兮桂郁俱龍駒兮鳳雛生於戰國則管樂之器長於闕里則游夏之徒以方圓異用遭遇殊時故才高而位下咸默默以遲遲青青子衿兮時向晚黃黃我綬兮鬢如絲昆兮何責坐乾封兮老矣季兮何負橫武陵而棄之舉天下兮稱屈何暗室之足欺為小人之所笑為通賢之所悲童子尚知其不可矧衡鏡與著龜故曰至道之精窅窅冥冥至道之極昏昏默默焚符破璽而人朴鄙剖斗折衡而人不爭捩工倕之指而天下始巧膠離婁之目而天下始明然後除其矯點之患安其性命之精太平之代萬物肫肫凡聖脗合賢愚淆昏公卿不接友長吏不迎尊當成康勿用何暇談其兵甲典謨既作焉得耀其書論雖有晏嬰子產將頓伏於閭巷雖有冉求季路且耕牧於田園彼尋常之才子又焉可以勝言命鸞鳳兮逐雀驅龍驥兮捕鼠使掌事者校其功兮孰能與隼狸而齊舉金為舟兮瑁楫不可以陟邱陵些珠為衣兮翡翠裳不可以混樵蒸些何器用之乖刺悼斯人之勤奓倚長巖以為枕兮吸流光以高臥見城市以盈虛若蚊虻之相過當其時也巢由滿野不知稷契之尊周召盈朝莫救夷齊之餓若夫管仲不遇齊桓則城陽之贅壻太公不遭姬伯亦棘津之漁夫一仁一義柴也來兮由也醢一忠一孝微子去兮箕子奴聖人百慮而一致君子同歸而殊途推既焚兮胥既溺桀亦放兮文亦拘笙簧六籍則秦谷有坑儒之痛黼藻百行則漢家有黨錮之誅鄴都傾覆飛禍厂田坴於高鼻洛陽板蕩橫死坐其無鬚喔吚口栗嘶口含天憲睚眦蠆芥屍僵路隅變化與屈伸交逐窮達與存亡並驅因其所有而有之則萬物無不有就其所無而無之則萬物無不無有竅而生寧惟混沌無用而飽何獨侏儒是以蘧伯玉卷兮長卷甯武子愚兮更愚庭有樹兮樹有荊園有鳥兮鳥有鴒鴒其鳴矣思諸兄矣荊其顇矣思諸季矣巖有芳桂隰有棠棣枝巃嵷兮相樛葉翩翻兮相翳天之生我胡寧不惠何始吉兮初征悲終凶於未濟二悲曰流淚公子傷心久之歷萬古以抽恨橫八荒而選悲有幽巖之臥客兀中林而坐思形枯槁以崎嶬足聯踡以緇釐悄悄兮忽愴眇眇兮惆悵迢遙兮獨蹇淹留兮空谷天片片而雲愁山幽幽而谷哭露垂泣於幽草風含悲於拱木徒觀其頂集飛塵尻埋積雪骸骨半死血氣中絕四支萎墮五官欹缺皮襞積而千皺衣聯褰而百結毛落鬚禿無叔子之明眉脣亡齒寒有張儀之羞舌仰而視睛翳其若瞢俯而動身羸而欲折神若存而若亡心不生而不滅其所居也不爨其所狎也非人古樹為伴朝霞作隣下陰森以多晦傍恍惚兮無垠松門草合石路苔新公子方撫其背兮曳其裾曰子非有唐之文士歟燕地之高門歟昔也子之少則玉樹金枝及其長則龍章鳳姿立身則淹中不足言其禮揮翰則江左莫敢論其詩每兢兢於暗室恒詡詡於明時常謂五府交辟三臺共推朝紆會稽之綬夕獻長楊之辭痛私門之禍速惜公車之詔遲豈期晦明乖序寒燠愆度鱗傷羽折筋攣肉蠧離披於丹澗之隅觳土角束於藪山之路已焉哉已焉哉崑山玉石忽摧頹事去矣事去矣古今聖賢悲何已天道如何自古相嗟項羽帳中之飲荊卿易水之歌何壯夫之懦抑伊兒女之情多借如蘇武生還溫序死節王陵之母伏劍梁之妻泣血事蓋迫於功名情有兼於貞烈若關羽漢陰田橫海島孤城已迫疲兵尚老離離碣石之鴻羃羃江潭之草迴首永訣吞聲何道及夫獻帝偷生懷王客死哀西都之城闕憶南荊之朝市鳳凰樓上隴山雲鸚鵡洲前吳江水一離一別兮漢家宮掖似神仙獨坐獨愁兮楚國容華競桃李別有士安多疾顏奇不起馬援困於壺頭冉耕悲於牖裏平生書劍宿昔琴樽研精殫於玉冊博思浹於銅渾思欲為龜為鏡立德立言成天下之亹亹定古今之諄諄一朝溘臥萬事寧論君徒見邱中之饒朽骨豈知陌上之有遊魂假使百年兮上壽又何足以存存三悲曰奇峰合沓半隱天綠蘿蒙蘢水潺湲因嵌巖以為室就芬芳以列筵川谷縈迴兮迷徑路山嶂重複兮無人煙當谽谺之洞壑臨決咽之奔泉中有幽憂之子長寂寞以思禪暮色蹐蹐朝思綿綿形半生而半死氣一絕而一連自言少年遊宦來從北燕淮南芳桂之嶺峴北明珠之川東魯則過仲尼之故宅西蜀則耕武侯之薄田舊鄉舊國白雲邊飛雪飛蓬暗遠天蹔辭薊門千萬里少別昭邱三十年昔時人物都應謝聞道城隍今可憐忽憶揚州揚子津遙思蜀道蜀橋人鴛鴦渚兮羅綺月茱萸灣兮楊柳春煙波淼淼帶平沙閣棧連延狹復斜山頭交讓之木浦口同心之華嚴君平之卜肆戴安道之貧家月犯少微弔吳中之隱士星干織女乘海上之仙槎長安綺城十二重金作鳳凰銅作龍蕩蕩千門如錦繡巖巖雙闕似芙蓉題字於扶風之柱繫馬於驪山之松灞池則金人列岸太華則玉女臨峰平明共戲東陵陌薄暮遙聞北闕鐘洛陽大道何紛紛榮光休氣曉氤氳交衢近接東西署複道遙通南北軍漢帝能拜嵩邱石陳王巧賦洛川雲河水河橋木蘭栧金閨金谷石榴裙曾入西城看歌舞也出東郊送使君一朝顦顇無氣力暴骸委骨龍門側當時相重若鴻鐘今日相輕比蟬翼驅代情兮共此何余哀之能得使我孤猿哀怨獨鶴驚鳴蘿月寡色風泉罷聲嗟昊天之不弔悲后土之無情松架森沈兮戶內掩石樓摧折兮柱將傾竊不敢當雨露之恩惠長痛恨於此生四悲曰傾葢若舊白頭如新嘗謂談過其實辨而非真自高枕箕潁長揖交親以蕙蘭為九族以風煙為四隣朝朝獨坐惟見㣥峰合沓年年孤臥常對古樹輪囷相弔相哭則有饑鼯啼夜相慶相賀則有好鳥歌春林麌麌兮多鹿山蒼蒼兮少人時向西溪吸水或就東巖負薪百年之中皆為白骨千里之外時見黃塵平生連袂宿昔銜杯談風雲於城闕弄花竹於池臺皆是西園上客東觀高才超班匹賈含鄒吐枚一琴一書校奇蹤於既往一歌一詠垂妙製於將來絃將調而雪舞筆屢走而雲迴自謂蘭交永合松契長幷通宵扼腕終日盱衡罵蕭朱為賈豎目張陳為老兵悲蒼黃兮驟變恨消長之相傾貴而不驕人皆共推晏平仲死且不朽吾每獨稱范巨卿及其蹇產摧聯支離括撮已濡首兮將死尚搖尾兮求活莊西貸而魚窮姬東徂而狼跋今皆慶弔都斷存亡永濶凴駟馬而不追寄雙魚而莫達向時之清談尚存今日之相知已沒則有河濱漂母隴上樵夫盤飧帶粟粥麥丏兼麩藜羹一簋濁酒一壺夫負妻戴男歡女娛攀重巒之岝㟧歷飛澗之崎嶇哀王孫而進饋問公子之所須因謂予曰哀哉可憐聖人之過久矣君子之罪多焉詩書禮樂適足衰人之神用宗族朋友不足駐人之頹年削跡伐樹孔席由來不暖摩頂至踵墨突何時有烟一朝至此萬事徒然自昔相逢把臂談元橫雕龍於翠瓦飛縞鳳於瓊筵各自雲騰羽化谷變鶯遷鳴香車於闕下曳珠履於君前豈憶荒山之幽絕寧知枯骨之可憐傳語千秋萬古寄言白日黃泉雖有㣥書萬卷不及囊中一錢五悲曰禮樂既作仁義不死生有命富貴在天一變一化一虧一全去其外物歸於內篇儒與道兮方計於前其書萬卷其學千年鐘皷玉帛蹩薜足蹁躚金木水火混合推遷六合之內慕其風兮如市百代之後隨其流兮若川三界九地往返周旋四生六道出沒牽聯硠硠磕磕蠢蠢翾翾受苦受樂可悲可憐有超然之大聖歷曠劫以為期戒定慧解非因人慈悲喜捨非見思聞儒道之高論乃撞鐘而應之曰止止善男予觀向時之華說乃天下之辯士請弄宜僚之丸以合兩家之美若夫正君臣定名色威儀俎豆郊廟社稷適足誇耀時俗奔競功名使六藝相亂四海相爭我者遺其無我生者哀其無生孰與乎身肉手足濟生人之塗炭國城府庫恤貧者之經營捨其有愛以至於無愛捨其有行以至於無行若夫呼吸吐納全身養精反於太素飛騰上清與乾坤合其壽與日月齊其明適足增長諸見未能永證無生孰與夫離常離斷不始不終恒在三昧常遊六通不生不住無所處不去不滅無所窮放毫光而普照盡法界與虛空苦者代其勞苦蒙者導其愚蒙施語行事未嘗稱倦根力覺道不以為功所言未畢儒道二客離席再拜稽首而言曰大聖哉孔晚聞道耼今已老徒知其一未究其術何異夫戴盆望天倚杖逐日蒼蒼之氣未辨昭昭之光已失嗚乎優優㣥品遑遑眾人雖鑿其竅未知其身來從何道去止何津誰為其業誰作其因一翻一覆兮如掌一生一死兮若輪不有大聖誰起大悲請北面趨伏願終身而教之
