front:
  text: 全唐文欽定全唐文卷八十七僖宗二
  hash: sha256:3bacb4ce6bc823fb59774d0908e9ebfa3d781b44cf023521af421a8cdb4860e1
body:
  text: 蠻蜑如尚憑陵固須倍兵禦敵若巳奔退即要併力追擒方藉北軍助平南寇其三處兵士宜委高駢到蜀日分布驅使且務多多之辦寧辭整整之師其河東一千二百人令竇澣不要差發王郢江鄉賤卒營伍微材忽撫御之小乖敢憑陵而搆亂迫脅將相恣竊干戈劫資財於建鄴之城聚徒黨於狼山之戍尋則浮江泛海掠鎮攻城摽掠三州傷殘萬戶又於福建管內毒害生靈淩犯紀綱悖違天地朕為人屈法惡殺好生累降勅書曲存招諭王郢包藏奸慝誑惑軍師詐示歸降密為抗拒昨者拘留魯實巳驗凶狂今聞再犯溫州顯與官軍抵敵魯實陷在舟檝王師敗於鋒鏃兩浙震驚百姓憂擾滔天之罪擢髮難書然以分野興災雖關定數神祇助順必翦羣凶既違雨露之恩寧逭雷霆之殛是以別銓名將更益雄師兼福建之精兵雜番禺之戰士水陸俱發腹背齊攻須剋旬時必破妖孽除先徵諸道五千一百人及福建南海并虔吉衢婺等州兵士外今更抽忠武軍一千五百人感化軍五百人泗州五百人宣州五百人都計一萬五千以上前左武軍大將軍宋皓負關張勇智有韓白英雄累著戰功再居環衞思豺狼之未滅恥荊棘之猶存誓願長驅速清羣醜今除授檢校左散騎常侍守右龍武大將軍兼御史大夫充江南諸道招討使應新舊行營兵士悉取指揮各宜憤激忠誠淬厲戈㦸識機翦撲取勢芟夷速立殊勳迎俟超獎其王郢部下徒黨等或本同謀議或偶被脅從或因窮餓依投或遭俘縲指使所宜舍逆取順去暗趨明勉圖富貴榮華勿受驅除翦戮如生擒及斫得王郢頭歸順者當授四品正員官并賞錢一萬貫賜莊宅一區如能率衆於所在解甲歸降者亦當厚與爵賞明垂信誓必不欺渝凡在忠烈之徒皆宜賈勇增氣省所奏修築羅城畢功并進畫圖事具悉卿天平急召井絡專征臨卭夢叶於三刀按部恩覃於兩劒上言大鎮空有子城殊百雉之環迴是千年之曠闕便依陳奏未隔寒暄每日一十萬夫分築四十三里皆施廣厦又砌長磚城角曲收逸迭攻而勢勝甕門直截容拒守之兵多利及後人智高前古繼孔明於掌內坐張儀於腹中是以輕笑木牛感通金馬增上頭之睥睨架裏面之闌干橋象七星不移舊岸錦逢三月可濯新濠役徒九百六十萬工計錢一百五十萬貫卓哉懋績固我雄藩罄府庫之資儲捨陰陽之拘忌但為國計總忘身謀並無黎庶之怨嗟不請朝廷之接借忽聞進奏言巳畢功見圖寫之甚明舉神化而急速方念處身廉潔報國忠貞始終能協於一心清美久聞於萬口欲人檢騐具見公忠朕巳知臣何勞請使便欲寵渥恐卿自往雅州既發師徒方勞館驛且留賞典專俟迴軍蜀川既及於春風蠻寇盡離於河岸便酬勳績各進官階勉效七擒佇聞三捷故茲詔示想宜知悉冬寒卿比平安好遣書指不多及亂常干紀天地所不容伐罪弔人帝王之大典歷觀往代遍數前朝其有怙衆稱兵憑凶搆孽或疑迷於郡縣或殘害於生靈初則狐假鴟張自謂驍雄莫敵旋則鳥焚魚爛無非破敗而終蓋以逆順相懸幽明共怒近者龎勛拒命王郢挺災結聚至多猖狂頗甚尋則身膏原野喉斃僕姑資財分散於他人親戚誅夷於利刃亦有方從叛亂忽悟歸降回吉凶於反掌之閒變禍福於立談之際諸葛爽今為刺史朱實見任將軍宏伯郎任職於禁營宋再雄策名於淮海莫不身名光顯家族輝榮近者諸道奏報草賊稍多江西淮南宋亳曹潁或攻劫郡縣抗拒官軍或窘厄商徒俘掠進奉出彼入此鳥逝風驅雖云俊利於一時豈不憂危於終日以有限之逆黨敵無數之王師寧論歲時必自殲滅朕以寬宏致理慈愍居心每念蒼生同為赤子恨不均其衣食各致豐肥寧忍迫於鋒鋩斷其身首是以誕敷文誥且務招攜如或不共用兵無悔其王仙芝及諸道賊頭領等見制勅後各宜洗心悔過解甲收兵詣所在州府投降便令申奏必當超授官爵厚賞資財永作忠臣常居祿位其節級自補職掌等亦於大藩鎮內量材與職額衣糧其拋棄田園脅從隊伍者並當撫綏慰勞各令歸業營農是謂捨暗從明得生逃死依朕命者豈不休哉如或頑傲不悛凶強自恃猶事兵甲尚困鄉閭使田者不耕蠶者不織則須為人除害非曰黷武佳兵宜令諸道帥臣選練驍勇將卒分兵截道併力合威必務翦除不得縱翫其主兵大將若全擒戮得一火草賊數至三百人巳上者超授將軍仍賞見錢一千貫文如斬首級移兵攻徒黨收奪資財器械覆驗摭實者據其功績高下授官賞財如逢寇不追臨陣不戰貪瀆逗撓敗失師徒宜令本州道勘尋準軍法處分應鄉縣田園之內有材傑敢勇之人若能糾率丁夫捍禦寇賊搴旗斬將破陣成功者委所在長吏速具奏聞亦與官職優賞如鄭溢湯羣之輩皆巳分領郡符朝廷必不食言鄉黨所宜助順於戲宿麥將實秋苗正滋漸及蒸燠之時豈是戰爭之日惟願務農偃甲布德行恩遍告州閭各宜知悉王仙芝本為鹽賊自號草軍南至壽廬北經曹宋半年燒劫僅十五州兩火轉鬬踰七千衆諸道發遣將士同共討除日月漸深煙塵未息蓋以遞相觀望虛費餱糧州縣罄於供承鄉村泣於侵暴今平盧軍節度使宋威深憤萑蒲請行誅討朕以威前時蜀部破南詔之全軍比歲徐州摧龎勛之大陣官階甚貴可以統諸道之都頭驍勇素彰足以破伏戎之草寇今巳授指揮諸道兵馬招討草賊使候宋威到本道日供給犒設並取上供錢支給仍命指揮都頭凡攻討進退取宋威處分朕祗膺寶祚嗣守宗祧夙夜一心勤勞八載實欲驅黎元於仁壽致華夏之昇平而國步猶艱羣生憂遂災眚荐起寇孽仍臻竊弄干戈連攻郡邑雖輸降欵未息狂謀江左海南瘡痍既甚湖湘荊漢耕織屢空言念疲羸良深軫惻我心未濟天道如何賴近者嚴勅師徒稍聞勝捷皆列聖之潛祐寧菲德以言功屬節變三陽日當首歲乃御正殿爰命改元況及發生是宜在宥自古繼業守文之主握圖御宇之君必自正月吉辰發號施令所以垂千年之懿範固百代之洪基莫不繇斯道也可改乾符七年為廣明元年近日東南州府頻奏草賊結連本是平人迫於饑饉驅之為盜情不願為委所在長吏子細曉諭如自首歸降保非詐偽便須撫納不要勘問如未倒戈即時翦撲東南州府遭賊之處農桑失業耕種不時就中廣州荊南湖南盜賊留駐人戶逃亡傷痍最甚自廣明巳前諸色稅賦宜令十分減四其河中府太原府遭賊寇掠處亦宜準此吏部擢選人粟錯及長名駮放者除身名踰濫欠選考外並以比遠殘闕收注入仕之門兵部最濫全無根本頗壞紀綱近者武臣多轉入文臣依資除授宜懲僭幸以辨品流自今後武官不得轉入文臣選改所冀輪轅各適秩序區分其內司不在此限漢祖護信陵之冢厥有前聞晉朝修子房之墓垂有故事況本朝元老功冠鼎彞屬允嗣凋零墟域摧毀雖古無修墓孔子有言而義存掩骼周王是命斷從朕意適表念功宜減賜御膳錢三千貫文雇丁匠即日修築仍令所司明年春仲以太牢祭子儀廟卿志安封域權總戎麾夷夏具瞻社稷全賴今月五日草賊黃巢奔衝十六日駐蹕梁漢上慙九廟下媿萬方藩閫乍聞痛憤應切專差供奉官劉全及往彼慰喻卿宜差點本道兵士酌量多少付北面副招討使諸葛爽俾令入援卿等素挺至誠克彰奇節舉靈旗而誓衆顧狡穴以生威每振軍聲實揚我武今者煙塵未息羽檄尚飛相彼交鋒終宵疚慮況踰年稔禍連歲興師念其戰陣之勞深究拊循之意將士等皆爭功用命悉力摧凶唯堅抵捍之心共雪宗祧之恥哀茲瘡痛不捨朝昏爾宜各勵始終速收城闕殊功上賞延子及孫帶礪之言神明不昧卿等淬厲戈鋋激揚志氣決戰而誓平賊壘爭雄而遠鎮軍麾久歷辛勤繼當矢石念其報國惟佇酬功所宜早復都城速擒巨猾唯懸信賞以獎殊庸朕自違奉寢園播越梁蜀日往月來首尾三年比元宗避難之期校德祖蒙塵之數星霜巳過收克未期每北望山河東瞻陵廟想豺狼汙辱宮殿荒涼士庶黔黎悉遭塗炭松楸桑梓半作蒸薪未嘗不當寢震驚臨食吁歎氣填胸臆淚灑衣襟蜀國素號繁華朕不觀綺艷教坊樂官繼到朕不聽笙歌思將帥闕乏衣裝朕服踈布大練憫兵士欠少糧食朕進糲飯素飡言必告天心惟罪己祗待還京之後永期修德覃恩爰自二年以來累與卿等書詔無不殫詞瀝懇實貴感動卿心其於超擢官資遷轉階級存則母妻邑號歿則考妣封榮幽明之閒無所愛惜將士等離親別愛冒鏑當鋒有修城下寨之勞逐北追亡之役最為辛苦尤所憫傷正當窮蹙之秋若不合力齊心一時進逼此時不了更待何時卿宜乘發使人密持書札與諸將帥類會約一兩日佳辰四面進軍諸門齊入以二十萬忠勇之衆討三二萬殘逆之妖用正擊邪破之必矣最忌者不和不叶相嫉相爭論位妬功彼進我退用軍之弊莫過於斯實希七月以來刷朕三年之恥向上極有官爵酌報功臣勿更因循以孤倚注垂淚修語宜體朕心勅光庭昔得郭遵大奏青城山齋醮祥異事具悉夫宗元道觀靈寶齋場星官上奏於殊庭驛騎初傳於詔命光摛五鳳狀列宿於空中聲吼長鯨若飛霞於豐嶺祥鱗忽現椶榦分榮神仙難期陰陽不測驗茲祥應自帥精虔追蹤於五利文成事美於文皇漢武嘉歎所至寤寐不忘故茲詔示想宜知悉秋冷師皆好否遣書指不多及其修齋道士等一十七人各賜有差太上元元大帝與弟子文始先生講真經於樓觀之臺約後會於青羊之肆便乘雲駕俱入流沙仙記傳聞地圖標載自周昭至於此日歷數約二千餘年景象寂寥基蹤牢落今因巡幸靈貺昭彰殊光跳躑於庭前靈篆申明於樹下甎含古色字驗休徵中和之災害欲平厚地之禎符乃見足表元穹降祐聖祖垂祥將殲大盜之兵戈永耀中興之事業須傳冊兼示寰區以付史官備令編錄仍模勒文字告示諸道及軍前其觀可改號青羊宮仍置殿堂屋宇側近屬觀田地約有兩頃近來散屬黎甿多植葱蒜清虛之地難使熏蒸巳賜錢二百貫便令收贖仍給公驗永歸精廬宗子特立除官道士李無為巳賜紫所宜昇獎用慶靈休敬瑄位冠公台風行郡國效節於延洪之代修心於道德之鄉遂令境內銷兵地中呈寶其如休美倍可嘉稱太上垂祥青羊應現禮宜崇飾用答殊休諸道州府紫極宮宜委長吏量事修飾仍選差有科儀道士祭醮朕以眇身恭臨大寶唯思克相上帝寵綏四方而況於垣翰之中臣僚之內豈不能掩其瑕釁而欲肆之法網乎其包藏禍心違拒君命罪惡巳彰其悖亂誅鋤難逭於彞章迫於羣情蓋非獲巳光祿大夫檢校司空兼尚書右僕射上柱國中山縣開國公食邑二千戶楊師立本實庸材曾無遠慮幸因薄伎久列禁軍遂委節旄蓋循事例必謂保其富貴勵乃忠貞況自朕出狩巴庸頻加渥澤進水土之劇任兼輔相之殊榮不能上報國恩而乃敢虧臣節昨因制置防遏不肯發兵遂有替移尋昇端揆罔思寵待輒恣凶謀鼓潼水之驚波作左帛丿糸之祆氣不遵詔命偷固戎藩動衆興師欲收其郡邑重門守險顯絕於朝廷據綿州奏聞楊師立巳於涪城屯兵下寨又差都將郝蠲等占奪綿州帶甲數千去州十里賴有奉國兵士禦敵殺戮大挫鋒鋩城池方遂保全士庶免罹塗炭續據劒州申報楊師立與刺史姚卓文欲領兵士直赴西川兼署姚卓文充指揮應使仍與鎮縣書板反狀具明況聞廣集庸丁教習武藝稅外恣行掊歛支郡無處完全別制親軍用為心膂及令捍寇莫整鼓旗大校阻謀延頸被戮而又致害監庫家累骨肉洎於判官元從無不罹殃又殺送官告內使更無噍類深用驚歎此固天地之所不容人神之所共棄其楊師立在身官爵及先父所贈官兼母所封邑號等並削奪西川節度使太尉兼中書令陳敬瑄以義事君擁銳敏之師徒擅訓齊之政令必能勦除逆豎鎮定蜀川巳兼諸州都指揮等使宜令差兵攻討處分應楊師立叛官及將校官吏等如或不同謀議及衣冠僧道百姓等臨事脅從者宜各審詳情狀切務安存無令誤有殺傷致其冤濫其將校等如有梟擒楊師立歸順者朝廷別議獎酬其立功將校等委敬瑄等第聞奏亟行賞典嗚呼作孽者誠自投於法網矣亦由吾理化之道未信於人焉負扆凝思良深自咎布告天下咸使聞知楊師立趨走庸流缻筲殘品因緣禁旅忝冒藩方迷天地覆載之恩虧臣子忠孝之道積禍既久懷奸巳彰爰自左川擢居右揆蓋亦全君臣之分益亭育之仁殊不知梟獍逾凶豺狼難養敢違勅命賊害使臣據蛙井以睢盱固牛涔而旅拒敬瑄開張武略并奉睿謀選將果得於雄才練兵莫非於教士舞梯衝而將平雉堞整旗鼓而巳挫蟲沙付高仁厚攻心之謀授鄭君雄反掌之策果梟逆首盡戮凶徒捷音纔奏於九天喜氣自孚於四海殊勳盛烈前古無儔巳賜詔命獎示訖其首級宜令西川節度使準例處分朕子育萬方為人父母常欲含哺四海均養九州去三面之網羅惟一心於教化共躋仁壽永使洽平豈於將帥之閒勳舊之內不思終始遽及誅鋤但楊師立本無汗馬之勞擢取建牙之任年纔五十位及於公侯恩被一門榮沾於骨肉有弟與子皆列朝班自母及妻畢開邑號師立之愛君體國未見一毫唯朕之優遇寵私實為異等而不知逆順但使貫盈初則寢廢詔書扇動軍伍後又容縱盜賊殘害鄉里且巡使是朝廷官員有除移則不許交代監務是庶邦公事遣區分則堅拒勅文本道不屯甲兵妄占上供錢物命便尋究虛有支分害監軍使於本城殺官告使於近驛干紀之謀有素不臣之跡轉彰中外臣寮共知狂悖包含掩慝未忍疵瑕竟迫於多難之時須明國法止殺之義難顧私恩遂命西川節度使兼太尉中書令潁川王敬瑄點校土軍仍委行在都指揮使十軍軍容令孜量抽三兩道迎駕兵士指期齊進同議討除三令五申止擒元惡戢兵禁暴不損平人整王師而易若建瓴殲叛卒而勢同破竹初雖閉壘旋乃下城果見支黨離心魁渠付首不假別令將帥不勞遠取干戈謦欬之餘遂夷梟獍代宗朝同華節度使周智光亦因國家多難敢逞凶心擅殺杜冕一家以報私憾及逆節萌露又劫諸道供獻及掠剽行路衣冠將謂朝廷力不能制亦是未煩征討巳為帳下所戮師立之事頗類智光猰㺄磨牙豺狼當道若存凶逆必長亂階朕知人不明爵賞踰量盈茲小器煩我大刑況善陣不交曾無大枉未勞一矢便戮元凶諸道節度觀察防禦等使位重藩寄義均休戚未覩平戎之奏常深許國之誠副我分憂固同慶快鄭君雄能分逆順卓有功名拂秋水以捐軀向錦川而獻首姜膽遽剖袁顱遂梟須議加恩以激忠節巳從別勅超受官資仍賜莊宅錦綵銀器寶帶法服等餘準詔宜處分
