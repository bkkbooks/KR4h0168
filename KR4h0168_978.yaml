front:
  text: 全唐文欽定全唐文卷九百七十八闕名十九
  hash: sha256:48ab9097fb8f8a5821520b3560f3c629861a6f9bb7dec2b95f67313c7a82fb0e
body:
  text: 讓禮之本矜伐之賊大勇不鬬小智自私故范宣執謙其下皆讓宣尼垂訓欲速不達景也出師自承王命被堅執鋭皆奉廟謨斬將搴旗莫非皇化雖聞拓地之績未可貪天之功彼師不仁責其後殿有詞則捨之可也詐善亦不猶愈乎天子令德銘曰日新諸侯計功取彼凡獲永啓厥後無忘遠圖方展器於樽彞果昭宣於篆刻所以懲其不恪載此嘉猷何蕞爾之小侯敢招賢於大國雖出師以律其如剋敵之雄而救死何庸乃是因人之力同季孫之取惡且鑄齊兵聞臧氏之所言誠非魯德亦胡顏於燕翼遽有訟於妨時請從軍正之言以蔽林鍾之失弧矢所以立威征伐所以柔遠瞻言甲也利用行師奮長策以從戎俄聞獲醜遽前歌以獻捷方見勞旋惟彼非寮職居何等將守死以效節豈成仁而有渝謀之孔臧實曰有倫有義忠以明訓必也主亡與亡行為盡室之謀坐為刻吏之詰類伯夷之潔已不食於周同夙沙之策名何賴於鼓主則辱矣士也何依既無二君之心宜遂匹夫之志休明在時蒸人忘戰雖塞垣無恐猶勞禦侮之師而鋭士從戎理急策勳之典日者白蘭塵起紫塞煙飛無風而羌笛自吟有月而胡兵不去天子聞鼓鼙之響按劍興師將軍厲甲胄之容登壇受鉞景以聲雄薊北望重關西斬將搴旗威推八陳屠凶執馘勇冠三軍盛績攸聞戎氛自滅甲首五級功可傳於藁街請隸五家罪方招於石室論咎雖云蹈利據理抑可酬功罰疑從輕景訴誠為順理賞疑從重霜臺豈可置刑既有司存請依彞典危事不齒善敗豈亡苟能愛而盡忠何傷詐以兼智惟甲迹同丑父貌類頃公立我戎馬之前應識被廬之術進則思賞退則圖全擁鐸拱稽初言以律靡旗亂轍俄見覆軍方知處死之難期於隕命之禮梅林止渴蓋是從權竹簡議刑將何勸善免於軍難亦曰師貞殊不知索彼車中范睢以遠降之城下紀信空存宜表洋洋之人以旌赳赳之列有司見劾無罪可書兵居死地百戰功宣將鑿凶門三軍獻凱度關山之月橫笛吟秋驅隴路之風長旌曳曉實賈豫勇寧老我師告捷攸屬獲多斯舉故得繫頸請命不以懸首為威亭障罷警邊城偃柝十角搖讋二毛就擒徵古可縱在今莫舍既負投石之力允當操袂之來執法劾止未諧通議請依軍見得謂其宜師克在和軍政以順將敷奏其勇何求掩於人以為司馬出征君子于役即戎禦寇初利於九征執訊獲醜俄獻於三捷式宣王命大殪戎師而悉引厥功以為已力橫草可重坐樹無聞方飲御於諸友遂揚言於執事同郤至之稱伐非范宣之能讓攻戰必取欲先二子之鳴班列不同終在七人之下聚為怨府職在亂階蓋是速戾於爭功實乃包羞於閲禮不可在位何以佐軍獲則必取兵家舊法捨之從權伐國新意惟甲早從師旅久戍邊庭將立大勳以圖貴位爰從是役得展其謀於萬人之中力能獲醜用七縱之術志在平戎是則捨此一家將來九族果取其國何止於鄉類孔明之用師威懷蠻長同叔子之居鎮德服吳人皆呈輔相之材明於制敵誰謂偏裨之任暗合前規節使屬當戎行未知軍要此宜論賞翻欲加刑由是觀之罪有所在德以綏邊仁惟克敵必將制勝是曰能賢乙出師以和攻昧以順戈矛雲合士卒星馳既左旋右抽期一月三捷人思懸布軍以獲俘以為安忍無親黷武無烈作其令主徵冶夫之謀費還其侵地善羊祜之取吳則寒者衣之人遽叛於南氏歸乃有所城亦復於季孫美績可書策勳宜賞彼或非者徒測海而多愧爾有詞焉固包荒而無怍古之用兵抑為制勝或以柔遠或以伐謀逸乃楚囚其來報也無扞樵採亦我誘焉果而稱師特蘊權決不薄之險隘不邀之未濟而壯士曲踊於幕庭將軍下矢而鳴鼓豈止血刃當觀繫俘亦有藏地勢之間用人謀之運右廣初駕左輪未殷犯圍蹈鋒申厥誠果襟甲面縛釁鼓縲囚列之前伍以待後殿而薄威去備類陳振旅使戈旌霜指耀征壘而衝喉劒氣風趨駭轅門而籍骨於惟勝敵亦為奇兵何失軍容更成餘議受命啓行有死無二雖因義以制令寧以權而滅親斷布重城先期賈勇析骸懸釜冀以論功食子自同於樂羊純臣多慙於石碏與其廢禮傷愛豈若徇節忘恩既覆醢以稱仁何請羹而遺我告為虧義誰復間言情則不經言亦有素君惠於臣父愛其子蓋稟天性豈直物情事或不可義將何若乙以忝列藎臣合輸貞節言念幼子痛自闕於防間欽奉大邦懼乃撓於法制若執人以求貨皆罄室以全生則因循而來虜掠何算欲求苟免之道恐貽嫁禍之所以促兵冀其盡敵雖喪克家之子終成輔國之臣大義滅親且類橋元之操深仁濟物奚取卜商之慈劾以嗇財將何沮勸臨變有謀始聞勝敵興師無律終以臧凶甲受命以行觀釁而動輶軒始發將遠使於四方臨衝載馳遂收功於萬里殊傅介之密旨因取樓蘭若陳湯之矯制更夷康國况今偃革息馬綏戎糾華奚貪一夕之勳遂侈三軍之事雖掠美以自滿終嗇禍而難封執事念彼武功以為勇爵或人思我王度方循政典苟示化以徇物無忘紀以敗常將為後圖是亦為政受命以出惟德之恭見可而行亦仁之勇矯節何者從茲使乎夙駕載馳異將軍之授律飲冰言邁逢邦國之交讐同楚君之用兵且聞觀釁殊羽父之能請因見出師爰發干戈以祈爾爵克寧邊鄙肇敏戎功事貴從宜賞期當物必也不虞或至拒寇爰來滅虜地之煙氛息漢庭之烽堠專則可也賞宜及之如或胡塵自飛我疆不聳空勤遠略終匪臧謀苟免戾而已多何議功之敢望進退二理庶乎一隅天討有罪成師以出注意於將稟命不威丁任既干城寵亦受脤非以惠敵期於伐謀履武人之貞居元戎之副執訊獲醜義非喪律有虔秉鉞誅在明刑議七德以不傷爰九伐而何害主將不能命之以徇分謗生人方欲糾之以違篤責軍簿奉車都尉雖謂專而請誅龍驤將軍固違令以告捷况斬之以法乃非徇私副在別屯異於擅殺欲加之罪無以為詞受命以出一鼓作氣惟師在和七戰皆獲觀釁而動者謂之軍志相時設教者是曰武經甲惟理戎興茲薄伐司馬決勝以先啓行彼徒我車懼其侵軼鑿門受脤陳其教令既遇隘而難進請為行而制敵校尉不肯斬之奚傷違其毀車有類荀吳之嬖是稱亂命以戮晉卿之僕奏以專殺斯則不然功立於時身有寵祿政死於國家備哀榮至若羽林孤兒且不遺於漢主膠庠養老猶見恤於周人雖廩食或求而間粟是用法所當得昔嘗稅於關門無若我何今慮擠於溝壑既受一夫之粟何慙七子之居惟乙所供理亦為當制刑閲實勿替前典詰罪理軍必條隱令既輕過而悅使同寄令而宥人雖疆場無虞而蜂蠆有毒欲觀攻取必資甲兵謫以分金嘗聞管氏入茲束矢復起齊邦師古可權士門之良圖惟允倚法以削按察之糾謬何深理貴平反寧聞伐善總戎之寄爰比善於穰苴受甲之徒忽方疾於荀偃均其挾纊始勉三軍惠以吮膿方憂七發佇盡佳兵之力坐興慈母之哀非輟哭於敬薑實先悲於蹇叔以父觀子固旋踵而無期論將綏兵乃推誠而有及預起三殤之慟雖欲妨明深詳七萃之謀寧宜見罪天生蒸民稟氣各異國徵武士以壯為先惟丁力冠圉人勇過延壽因材官以效職列羽林而為將恆拔距以習戲樂彼從戎乍超樓而自矜聊為試辨各適其適亦謂合宜有能不能奚為見止董元藝極穿犀官參戴鶡言思報國即此臨營冒矢前驅爭為跳蕩交鋒直進詎肯遷延忽逢蛺蝶之兵遂掃螳螂之卒摧凶殺敵已立殊功準格酬庸例升榮級前關已蒙褒錫後送獨被稽留既申橫草何能倚樹但今將執戟雖切披陳曩日橫戈且知優劣既言功薄明既效殊懸登執雁之階慮動續貂之刺詞令不能斷效命捐軀式標於盡節冬溫夏凊載竭於因心靜母西日沉榆氣息奄奄順弟南風吹棘兄弟怡怡咸承大被之恩並藉高堂之慶靜之充侍須崇扇枕之方順乃從征宜著橫戈之績豈期兵交白刃侍丁為報國之臣饌躍赬鱗征客作安親之子或移忠入孝或徇國違家忠孝不可俱全家國終無暫闕投筆以去狀既不合論辜戀母而還法亦無煩置罪銅章既難推劾玉律須有哀矜請俱釋於九章庶並從於三宥精氣為物聚極則散遊魂為變死而有招歸地歸天人皆共盡在師在旅禮則從宜若道屬多虞時因喪律勤王徇節載居鋒鏑之中委骨捐軀但非歌笑之處既覩亂麻之積爰崇復矢之儀亦同蕢尚在途畫宮受弔仲尼於館脫驂有情雖流千載之聲並是一時之事眷斯劉説有異邾人稱是家喪胡申戰禮罕遵升屋翻比登車驗古有殊論今莫可科其越禮雅合彞章天子授鉞將軍運籌廣練精兵數道深入壯哉乙者屬當戎行攘臂專征負羽輕氣警勵部伍張皇武威密爾元凶尚懷旅拒甘泉火起初疑減竈之餘朔野風高已得摧枯之勢既而凱歌還國酬庸武勳漢不孤恩方錫班超之職商乎見議詎奪弦高之詞或人盈庭是相喧聒既而斟酌典憲採托㣥言樊噲擢於屠沽宏羊起於賈豎以今况古其誰不然今之遊詞一何狂簡有功之賞理請必行無稽之言事宜勿用道在則業金籯非寶學而時習珍席為儒甲業擅專門勤茲閉戶夙漸淹中之訓方傳壁裏之書絳帳談經蒙求者雲集緇帷講道鑽仰者電趨濟濟祁祁升堂入室夏弦春誦未厭於青藍閲水頽山遽悲於壞木歿而不作逝者何追道無常師未宜膠柱貌有相似自可摳衣昔夫子門人見師於有若馬融弟子或從於鄭元故事非遙讓之未可膠庠之設國容在焉禮樂既陳王教茲始學之不講儒者為憂道或未行達人增歎皇上崇大文教褒進儒書屬澗蘋可採爰奠祭於先師壇杏初開將發明於古學胡甲許乙説禮談經異議既生爭論斯起操持捶撲恐學業之不明顛墜衣裳見朝儀之有失四方從學華荒並湊百寮觀禮簪紱成行不慎於儀何所取則既規矩合置刑科君子為儒學以致道聖人立教言無非法乙惟廣業義取精嚴函丈席間未述唐虞之際開筵講肆遽言湯武之非符彼黃生之談爰有青襟之刺不能伏義故為撻人喻以馬肝足為知味折之麈尾嘖有煩言一抶何傷將子無怨
