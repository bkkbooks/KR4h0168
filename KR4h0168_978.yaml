  - {type: head, offset: 1873, content: 丁為軍副在別屯輒以法斬人主將奏誅之訴云專軍別將不在部曲於法不合罪, id: KR4h0168_NFKB_978-h30, level: 2}
  - {type: head, offset: 2011, content: 對司馬斬嬖判, id: KR4h0168_NFKB_978-h31, level: 2}
  - {type: head, offset: 2011, content: 甲與戎戰司馬曰所遇有隘毀車以為行甲所嬖校尉不肯司馬斬之以徇軍正奏其專殺, id: KR4h0168_NFKB_978-h32, level: 2}
  - {type: head, offset: 2125, content: 對死政判, id: KR4h0168_NFKB_978-h33, level: 2}
  - {type: head, offset: 2125, content: 死政之老求廩食乙以其無所歸供以間粟, id: KR4h0168_NFKB_978-h34, level: 2}
  - {type: head, offset: 2213, content: 對輕過罰甲判, id: KR4h0168_NFKB_978-h35, level: 2}
  - {type: head, offset: 2213, content: 士門使輕過罰甲按察使糾之, id: KR4h0168_NFKB_978-h36, level: 2}
  - {type: head, offset: 2305, content: 對恤士判, id: KR4h0168_NFKB_978-h37, level: 2}
  - {type: head, offset: 2305, content: 得甲為將卒有患癰甲吮之卒母哭而訴甲將殺其子請罪之甲不伏, id: KR4h0168_NFKB_978-h38, level: 2}
  - {type: head, offset: 2405, content: 對勇壯踰羽林亭判, id: KR4h0168_NFKB_978-h39, level: 2}
  - {type: head, offset: 2405, content: 丁為羽林將超踰羽林亭樓或止之辭曰試弁而已仰斷, id: KR4h0168_NFKB_978-h40, level: 2}
  - {type: head, offset: 2479, content: 對立功流例判, id: KR4h0168_NFKB_978-h41, level: 2}
  - {type: head, offset: 2479, content: 執㦸董元於閻敬下立功流例七百人並跳盪功敘錄咸依元格酬勳賜階准元軍司削階不入五品, id: KR4h0168_NFKB_978-h42, level: 2}
  - {type: head, offset: 2598, content: 對背侍從征判, id: KR4h0168_NFKB_978-h43, level: 2}
  - {type: head, offset: 2598, content: 王靜母年八十身充侍丁弟順名預軍團練點從征鎮靜棄母投募陷陣有功順戀母背征據法應罪縣令以靜闕養以順棄軍俱追勘當各科其罪靜云情存徇國順云意在懷親既並有, id: KR4h0168_NFKB_978-h44, level: 2}
  - {type: head, offset: 2763, content: 對復矢判, id: KR4h0168_NFKB_978-h45, level: 2}
  - {type: head, offset: 2763, content: 劉說家有喪登車轂用箭復魂人告越禮, id: KR4h0168_NFKB_978-h46, level: 2}
  - {type: head, offset: 2906, content: 對立功執商判, id: KR4h0168_NFKB_978-h47, level: 2}
  - {type: head, offset: 2906, content: 乙立軍功合授官或告親執商賈業, id: KR4h0168_NFKB_978-h48, level: 2}
  - {type: head, offset: 3066, content: 對事貌相似判, id: KR4h0168_NFKB_978-h49, level: 2}
  - {type: head, offset: 3066, content: 甲容貌與乙相似甲歿後門人師事乙鄰人讓其非禮, id: KR4h0168_NFKB_978-h50, level: 2}
  - {type: head, offset: 3198, content: 對釋菜爭論判, id: KR4h0168_NFKB_978-h51, level: 2}
  - {type: head, offset: 3198, content: 得胡甲許乙俱任直講因釋菜爭論遂形於顏色各持棰以相打法司科罪, id: KR4h0168_NFKB_978-h52, level: 2}
  - {type: head, offset: 3328, content: 對持論湯武判, id: KR4h0168_NFKB_978-h53, level: 2}
  - {type: head, offset: 3328, content: 乙開筵講湯武事弟子曰無食馬肝乙撻之不伏折師塵尾, id: KR4h0168_NFKB_978-h54, level: 2}
