front:
  text: 全唐文欽定全唐文卷七百八十三員字與直祕書監寧子杜亞留守東都署佐其府授侍御史
  hash: sha256:7b52315a065e1c1d5fcf6227c5afa75035c9bb5c358cc2ab450c94f2bbc63ee4
  markers:
  - {type: head, offset: 14, content: 穆員(一), id: KR4h0168_NFKB_783-h1, level: 1}
body:
  text: 臣某言伏奉正月九日敕授臣使持節汝州諸軍事守汝州刺史充本州防禦使臣祗荷寵命兢遑戒路以今月二十五日到州上訖臣聞位非所據榮實為憂任過於量勤不補敗伏自省懼心魂震驚臣某誠惶誠恐頓首頓首臣頃佐方鎮本逃飢寒推遷歲時纍忝班序而身遠迹賤才薄官微宣力中朝事將望絶昨者一介陪隸萬國朝元不寤日月垂明幽隱斯燭荒徼未效記意於勞問之初愚懇微誠畢辭於朝賀之次亦能信宿遽承寵光况地屬王畿任當時要憂寄所切文武是資何堪負乘又過獎擢唯當以竭誠自勵戒懼自持庶副所受安人理戎之命少酬萬一無任懇悃屏營之至謹遣某官奉表陳謝以聞歲五日杜揚州出鎮東洛㣥公禮賓用餞會於此堂以候於戲從公率俗道機交態倦息得於此樂道得於此衆君子同之員亦同之况乃竹深寒庭雪淨禪室境捐世染坐對天涯甘茗代醪清論如藥蓋勞生之少息㣥心之一勝會耳惜乎夕鳥集暝客散候人至車馬行各從爾司復返吾患嚮來所聚倏爾成空索過風於前林求往夢於既寤不可及也尚書郎李君曰其可及者詩猶庶乎詩之哉二月中節時芳為人柳先攀折而垂水待臨泛而滿花迎酒客而笑鶯隨詩人而吟有良二千石徐公解印南國將赴鎬京與東風遲日偕至洛中賢士大夫以公著名茂實詩言酒態相從於賞春之場其潤色也與鶯花並東溪南陌詩鋒函合迭為晉楚者日有聞焉惜乎偕賦不疲㣥芳未老而不謀者別中道間之嚮之待人攀折臨泛與笑而吟者又似有意乎傷且怨矣矧同遊者之心乎僕也貧不知春病不逮會諸公以異日徵文之籍不獲辭焉所以敘作者之意共歎春未去而公去故其思也同仲春之節洛帥還近郊亞尹尚書郎御史元公李公韋公將事如軍賞心百里豫時有所繫不克與偕三君子賦嵩峯漢陵維源竹澗仙壇五篇遺我居者善乎詩之時用也如繪出其芳鏡涵㣥象翬呈鮮彩琴韻雅音俯仰吟詠之間若在春原之上晴峯之下境移衆目勝集我心詩之時用也如此否則一時得之人與間雲並散興與夕陽俱盡春與殘花共謝遊者居者等無及焉他日屬和之聲洛陽為之動既編次盈什則不可不紀其所以然甲子歲秋大旱螽蝗生其為異也聽如疾風視如飛雨仰如陰雲俯如流水乃至天降其高地增其厚明為之昏其災也如農夫剃草繁霜凋木烈火燎原嗚呼甚矣矧夫既枯之稼僅遺之粒其可望也余時從師於東周居鎮之府僚友霍總賦蝗旱詩一章七十有二句其指兵生蝗蝗生和和生瑞猶夫空谷之響立表之影以其類至必然若乃春秋書災紀異之法詩人風化美刺之義備閲章句則知其文余味之深敘以為引凡我東周之遊誰非君子之門吏子之至也惠㣥公之思且惜其去之速子有別墅我為甘棠富清溪翠竹豐流鶯密樹比而遐幽而曠美而不華野而不陋用厥㣥勝甲於東溪四月之節其芳始茂葉成清陰花結朱實中林惟籜碧玉呈鮮麥風之秋與輕暑偕至二三子春醪夏服於是乎宜之陟則在處降則在舟湍泠竹韻合如簫管時有山鳥雜乎其間㣥籟同音俱以留客而嚴城暮日與林泉意殊奪我當歡趣子命駕諸公以為他日過庭之問次詩禮者其惟吾黨與東溪乎屬事徵詞實假會文之友况吾子以言以立可久可大作者之意不惟系召南之什宜用緇衣之美副焉分洛為漕斗門在都城東南中橋之右舊制喉不深口不朿其流隨之水斯溢旱斯涸東有斜堰俾其來往終歲不修輒壞修則水積高而迤南北北傷則洛亘邙趾南傷則魚遊井廠墨不修則漕復於陸且其地與岸皆置薪焉不再閏不一易每歲繕塞斜堰洎南北隄橋之費相與盈萬其斗門之功不計蓋其弊者也安平公治三川之暇顧念於此之疾未去且曰水之性導無不順壅無不害善為水者唯其所趣使若自然其要在於不與之競而已是用浚斗門之下以量其入庳斜堰之上以歸其餘庶乎饒不為增傷不為減盈萬之費歲收於公而通海之波率土之運東西交騖合朝宗之義焉中橋之旁有古堰廢石沈於泥沙公乃發而轉之以代置薪之制省於自他山而致者蓋百之一猶懼剛之不勝柔岸化於水乃授規矩俾之追琢如斧斯鋭以分其衝如月斯仰以折其勢積石山鬬中流湯湯南鄰鑿龍永代無愧上濟行邁是為通橋歲三月興作四月畢事人不見始而覩其終埒其功用不足於常歲之數而不朽之利與皇都洛水垂之無窮焉嗚呼物之至柔者水不得其理甚者懷山襄陵其次決隄防隤城邑夫惟不爭之力然後勝之天下之理一理也制天下之至強者其唯不爭乎於水也見公之政於政也見公之德異日觀易簡久大之業此非其一隅哉公以為成公之志者實肄其勤命以名氏刻於岸石仍俾末吏謹而書之貞元四年四月丁亥日記儒之執喪也極其哀止於毀其於既往也則無及焉西方聖人以大慈大悲為功追護往生為誓凡爾銜恤靡至克窮罔極如有求而不獲者何末由斯而泄之貞元八年百一旬有六日我伯姊前烏程令宏農楊萃故夫人之喪再周先是哀子泰衡嵩復觀洎女子相與號曰我之生也自親之生今我報親幾何而既何先王制禮不即人心何羲和迅節不恤余慕於是合哀僝聖誠而禱之男冥其心女集其指逮茲日而阿彌陀佛現嗚呼西方之教念焉斯至矧是像也一縷一哀一哀一聖凡億萬縷為億萬聖億萬大慈大悲一之乎爾願其為追護也可訾量哉泰等毀傷見者之神號墮鄰人之淚是月之慕有逾其初舅氏員撫而廣之曰親之於子也生三年而免於懷子之於親也喪三年而免於服是則服之終也豈哀之終乎記所謂君子有終身之憂蓋哀之終也此又哀之終也豈孝之終乎經曰立身揚名以顯於後世夙興夜寐無忝爾所生此孝之終也若然者爾之孝爾之哀偕爾身齊爾性於是始孝何痛夫終焉員悲不能文強為之記貞元七年孟夏月再旬有六日我伯姊宏農楊氏夫人之喪期女祕書省正字河東裴求已妻痛夫四序往而還萬化周而始慈顏復覩終天無期伏念身體髮膚重於所受不敢以毀生為報其發於一號者則昊穹可聞泉壤可徹恭西方之教有追護之功崇建是像庶乎有及吾聞之古之泣血不必以血為淚痛之至者如泣血焉是像也起爾一心成千手千眼自素為繢自繢為相自相為聖自聖為福所以復於爾所生者庸非爾之血乎希微窅冥之間惟至可至之至者孰至於哀哀爾思舅氏員自以一虧而不可復續者骨肉之謂泣撫其事從而記之我生同氣者七人先五後二兄姊弟妹半之不弔天降割于我今年春夏次妹安國寺大德尼伯姊前烏程令宏農楊夫人逾月繼酷先是兩兄郴州刺史贊前右補闕貶連州司馬質從官於遠員洎弟妹前監察御史河東裴某妻痛支體一斷終天不續乃相與鬻衣庀直揭茲靈幢願得輕風微塵洎日月度影之所及也深茲至念慘與之俱然則巍巍永永斯乎風土日月相無極焉是幢也實表安國之塔伯姊之隧貞元六年秋七月七日前侍御史穆員記按經文我以神力供養不如以身供養故曰若能燃手指乃至足指者是名第一之施蓋菩薩之行也今我上人以兩臂為爐爇香千度用夫苾芻蕭之義以簡萬望夫以百福莊嚴之重千度焚燒之苦與夫一指之功不為多乎又刺體之血以嚴經像若素為塗若繪為綵若寫為墨凡成就阿彌陀佛一軀觀音勢至二善二菩薩各二事經千卷經以皮為紙以血為墨書寫經戒亦菩薩之行也曷若加之圖像三十二相八十種好盡取諸身乎上人姓王氏東周河南人七歲喪所恃十一喪所怙童蒙孤子無兄弟之親自毀其生用集封樹己而嘆立身揚名無逮既往乃發大宏誓以報罔極大歷五年始居龍興寺鎮國般舟道場爾來足不踰閾者垂三十載其為業也形不住心夜不息晝外不舍百刻之一中不遷萬化之二勞其形與天健精其志與日新蹈極樂於自竭之操前後以一月有一旬旬有九日為一息者不記百數其願以本尊本以願為願其病以衆生之病為我病我生未已我病曷袪我病未袪我願曷已然則大慈大悲之誓竟我願云竟無邊生生之苦盡我病云盡我生有滅我願與生生俱生我形或勞我心與極樂無極巍巍乎可思量哉員太夫人河東郡太夫人性合真如業通禪寂嘗謂學者千萬達者二三苟未至於心離有無迹超生滅則苦行為難為至誠格諸天念嚮㣥望亦足使見聞聳善遠邇歸心况乎嗤嗤回向之徒聞道甚稀睹相且衆則上人所以持本教濟衆生與夫禪門諸祖迭為舟梁可無愧矣又懼夫物之尢者見異於類行之殊者或疑於常申命小子以紀精苦之能所以題之於此貞元十年五月二十五日前侍御史河南穆員記京洛佳賞盡走乎闕塞次則東城以桃李繁華相高北山瀍陽有崖谷豁洞之勝蓋天然疏鑿以遺來者而人不之爭我公懸車之三年探得其最凡遠於國門邇於闕塞者四之一買之直減於東城之貴者亦如之連岡謺磴中斷夾鬬為其拱跱如狀如意翠竹茂樹縈環森羅為其緣飾如績如織泉出山腹釀而為池釃而為派帶於竹樹蔥籠之間池可行舟派能流響果園蔬圃用以為溉其餘與瀍水合於山下臨玩之美耳潺潺目磷磷不俟潄浥而煩襟如洗於是卜瀍之上泉之側周竒顧盼擁抱之勢作為新亭春之日百花流鶯笑語滿谷迭相為主待人為賓始至也若宴賞之之疏將去也若怨棄之之速夏之日清風入林徘徊不散若為繁暑與之竟夕而流泉娛客亦奏雅音秋之日霜凄氣肅萬象畢清亭中一望超忽天外而片雲行鴈又似與賞心遠目相期於前冬之日木落天迥遙山入戶可愛之景照於陽坡遲遲為人人散而斂凡四時暇日公與大夫從甥姪子孫攜琴樽翰墨遊於斯燕於斯慈顏怡天和熙一觴舉萬福隨穆穆雍雍翼翼夔夔中外具慶如塤如箎公曰人生知足為富當時為貴奚俟外獎則此地足以忘年何必陸賈擊鮮疏廣散金然後為適與王氏之少長咸集潘家之兒童稚齒吾之適也爾㣥子識之謹按春秋之義地從主人今我公開國新安則家谷宜以新安為稱新安之為解也既所以旌新之安亦所以祝吾家之慶與茲山之賞日月新而永永安安之謂也又江南有新安者山水之異絶於中國維其似之是以命之第三子員受命紀石且若從者名位列之於陰也斗門卒事之月安平公罷尹杜公實來明日公會杜公觀厥成績即得洗心遠目之所盡一覽四時之美乃授中制創為此亭有若嵩高二室萬安闕塞實簷前之山清洛麗都類夫河漢實砌下之池春流夏雲露風霜月殊狀異態同歸於勝實座中之器修橋曳虹左右扶翼層樓飛鳳前後擁抱實四楹之飾而皓氣清風徘徊旦暮若有所為凝為清陰不唯待羊公之登眺李膺之臨泛使忘機倦俗之客得人人而私之或曰二公之來也境與耳目共清其心心為事源政得於靜有以助清靜之理可無述乎刊諸珉石之陰是為亭記今年天之不佑我也甚矣春三月謫我以次妹安國寺律師之喪夏四月繼以伯姊楊氏夫人之酷季妹前監察御史裴氏妻泣曰人皆有姊妹而我獨亡所以發於骨髓者深宜格於神明之聽先是太夫人嘗為安國繡地藏菩薩逮卒哭而就是夜季妹夢伯姊謂之曰嘗知是像追護於我是用鬻衣充直緘淚僝工亦逮卒哭而就嗚呼萬聖一致乎慈悲莫大於救苦苦有生死之異聖者亦隨之而殊如周之六官分天地四時之職蓋同歸於理而各有典司若乃拔三塗證六道紓有生追往之慟則菩薩超㣥聖焉時貞元六年孟秋初七日也將以謹功之始既月而日之且系之以讚曰維我素履景福崇嗟爾至聖元感通有赫大士願力同五綵萬縷相好備一心十指聖靈萃振幽冥兮如髣佛貞元八年九月二十八日員傷神之慟至是而期外姑故河南令裴君夫人鄭氏雅有天性之愛加人一等而疾視之勤喪戚之甚則又加焉至哉母之於子也想其方娠想其既育想其乳抱想其稚戲想其習教想其有行生十九年而夭歲一周矣無一日不同其十九年之愛見其遺迹見其同類見其所從見其所嗜則哀與之新訴於神明而不聞禱之寤寐而莫睹索於太虛而無像追之往事而日遠乃求大聖之旨裂素點絢丹青睟容願以己之深慈託於佛之巨力且曰吾子之生也以至仁為性積善為行二者之報同期於福今也夭而不深慈託福施不在於生不在於後宜在於既往矧聖者以巍巍赫赫從而振之然則是像也金蓮之品安知非爾往生乎讚曰生如花兮夭如花先笑後號鍾我家喪有殺兮悼無涯哀慈母兮晝夜哭歲一期兮聲相續懇元聖兮降冥福萬聖本願同歸乎慈一致乎至有若東方藥師琉璃光佛洎大悲觀世音菩薩其威神德力最著於㣥生倬然於人間者也我季妹是用圖厥晬容永以成功其發念也淚逐聲盡福隨響至其成功也靈以指集慶將縷延如其經文則曰火不焚水不溺鬼不災祅不厲矧乃無妄之疾有生之害何從而來哉且聖功元化陰步馬潛護宜於自然動亨元吉彼解焚拯溺禳災祓厲之功又安得而施之讚曰伊聖力溥如天吾何願壽百年唐故監察御史河東裴府君捐館舍二十五月而祥貞元乙亥歲仲秋再旬有七日其孀員季妹也號曰吾觀天道日昃月虧幾何而追吾觀四時寒來暑往往來如奔吾觀萬物秋落春榮榮落相續吾觀人事禍福倚伏則維其常何天道人事四時萬物同歸於復其運如環而逝者棄於川流日遠未亡之酷終於此生恭聞西方之教有三塗報應之事大聖拯護之功是用發念髣佛有無之間躬現是像嗚呼若聖功則亦無幽冥之苦蓋魂氣無不之也其返於太初乎苟有三塗則聖者之力唯誠是據宜乎罪消一念福積萬指可思量耶讚曰嚴哉有赫自爾誠晬容巨力於是并能使往生生彼國餘及未亡無終極惟元精之和惟元聖之功惟善之報惟人之心順之則冥感之所契蓋善積而福會心至而靈應類夫有開必先之義存乎恍惚杳冥之間天不言神無像發於寤寐者其昭昭歟我裴氏弱妹疇昔之夜夢老僧意夫聖者祈太夫人之福懇懇焉聖者復之曰當繡若繪救苦觀世音菩薩且視其形則如是覺而念之誠矣未果越旬朔嗣夢如初是用心冥聖功指集晬容圓光具發朝日曈曨歲八旬有六日我慈親生之辰也願於是畢工於是終聖於是興福於是始同氣不類神明我遺禎夢靡臻斯文敢闕讚曰猗經文兮頌聖德非知知兮焉識識我夢願兮永符巨力如四維虛空兮夫何有極東方藥師琉璃光佛事具本經今我季妹裴氏嚴是像也誠而禱之其嚴之何裂素點絢攢針緝縷以五采章成三十二相八十種好意夫十二上願從之其祝之何况我太夫人福如上願而壽如縷數夫以大聖之力加於積善而赴於精誠宜乎其至也如歸其答也如響其久大無極而不可思量也如東方虛空抑經之有偈所以啓迪誓願發揚聖德者也苟以至誠為用員敢讓於文乎讚曰上天報應為福為極有赫大聖與天同力而我景行與聖同德存存如山念念如川大聖拯護同符自然十二願我之事億萬縷我之年聖人之教有三儒之先師曰孝者德之本教之所由生又曰立身揚名以顯父母孝之終也若乃崇樹景福追護既往有無上無邊之力非智智識識之功則道釋二宗其用一致記曰君子有終身之憂忌日之謂也歲孟秋晦我王母太原郡夫人棄養之辰我公霜露永懷發是上願謂夙夜種德以無忝為念裕蠱垂範立家開國不足以為顯鼎鼐之豐蘋蘩之潔不足以為饗蓼莪罔極石窖啓封不足以為報且曰元始天尊大道之原也釋迦牟尼佛萬聖之祖也以五綵繪圖二晬容及此辰而就眷命小子贊揚聖功其詞曰嚴哉煥乎觀者回向有類夫朝日初升圓月始望又若二聖現於空中髣佛乎不知其像我公孝思福應如響於戲聖力巍巍蕩蕩有唐尚書東海宣公姓鮑春秋六十九公從三十六載致政二一作三年歷官二十五凡居達官之長十二領四嶽十三州牧之寄三貞元六年秋八月景申薨於洛陽私第冬十月旬有七日從先公於北邙南原一作郊詔贈太子少保給鹵簿鼓吹旌其卒葬後三年嗣子宗由惟中古封樹之制且曰邱壠與年代相推幾何而平松柏霜露相薄幾何而盡將令百代之後遊九原者徘徊不朽之烈歎息可作之美其惟金石刻乎是用建碑墓以揚先懿公諱防字子慎河南洛陽人其先蓋夏禹之苗裔春秋時杞公子有仕齊者食采於鮑因以命氏曾祖標一作諲皇隴州汧陽令祖仁爽雅州飛越尉贈眉州刺史父思溫彭州唐昌丞贈工部尚書皆盛德下位發祥於公天寶中天下尚文其曰聞人則重侔有德貴齒高位公賦感遇十七章以古之正一作名法刺譏時病麗而有則屬詩者宗而誦之舉進士高第調太子正字中州兵興全德違難辭永王去來瑱為李光弼所致光弼上將薛兼訓授專征之命於越輟公介之始兼訓之奉光弼也以順命為忠不及於義公知光弼之不終也諭而絶焉東越仍師旅飢饉之後三分其人兵盜半之公之佐兼訓也令必公口事必公手兵兼於農盜復於人自中原多故賢士大夫以三江五湖為家登會稽者如鱗介之集淵藪以公故也徵尚書郎優遊公卿間執政者以代言之司見屬無何薛兼訓寢疾太原上以北門寄重軫念於薛思所以二而代之者莫與公比召對勞賜寵而遣之公之至也人不知其帥之疾帥不自知其疾及其代也由亞尹中丞洎居守專征之倅各遷其任一作各還其長兵自勇厲至於輯睦人自安業至於移風政自無闕至於有典代宗嘉歎之不足圖寫公形列於別殿蓋麟閣名臣之次也三載朝覲屬今上嗣位惟新大政授公紀律俾作典刑拜御史大夫旋以文武之柄方鎮為大南國萬里俾之師長統閩越轉江南公之撫人也以家勤之以子愛之利用用之厚生生之詔加銀青光祿大夫右散騎常侍紀成績也真拜右常侍扈從巡狩轉禮部侍郎上還鎬京展謝郊廟公預太常折無文之禮進封東海公詔徵賢良求其讜言時薦一作員仲兄不敢違詔承詔原注絶句實蒼生利之宰臣病之與公並命考第者以為異日故事言或有犯投之不疑焉公曰使上聞所未聞聖朝之瑞也擢居甲第每歲貢士充於王庭心為靈龜事絶請托京師仍歲蝗旱務殷人耗拜京兆尹詔下風行令宣政舉威革難理惠周無告既而痿痺生疾陳乞遂間上置上將軍員以待功臣先用文儒耆耄以寵其選拜右武衛上將軍厥疾加劇優詔授工部尚書致仕徙家東周富天祿貴天一作人爵樂天命順天和以終夫天年嗚呼賢哉公德本於孝才歸於用從王牧人即戎臨事大略以忠肅慈惠沈毅莊敏為稱喜善怒惡不必為已論交任人必惟其終入為羽儀出作藩翰夔夔然以家人嚴君之義屬於長兄蓋仆卿之祿千乘之賦一以奉之四時賓客之事車服器用之費一以稟之公與夫人視諸孤㣥從唯所授公不敢以禮秩異夫人不敢以居有私而敬公和樂之道於是乎久御史中丞武威賈全公之甥也少長於我登朝異門教切義方慈均天性故全之報也稱天下甥舅加禮焉一作加愛焉鄭滑節度使隴西李融公之吏也推以腹心齊厥憂寵歷佐三道其間如一故融之報也類天下賓主加歡焉於全也見公之內如融也見公之外然則公之行已與人可知矣夫人蘭陵郡夫人蕭氏始佐公賢終成公貴及公既沒清風如同二孤前左衛兵曹參軍殿中省進馬宗參以文學世公之業孝友繼公之志猶曰不足以抒夫罔極於是發揚垂裕之義作為銘曰穆穆宣公為王藎臣終始明哲優遊寵勛在昔理平逢時尚文高唱寡和長才不㣥星河麗天卉木榮春羽翰方陸雲雷構屯乃佐戎師名屈道伸乃登天朝盛美惟新茫茫南國赫赫北門股肱王室父母生人執憲承式尹京作則春官主文宗一作常伯尚德出捍牧圉入趨宸極望實攸并謀猷允塞賢宜翼聖道厄於命方叔元一作員老冉耕所病明明天子禮優致政曳履散金頤真保性良辰何遽厚夜何長歸全故邱一作邙鞏洛之陽貞石是勒德音孔彰於戲宣公百世不忘
