  text: 全唐文欽定全唐文卷七百二十一肇元和七年試太常寺協律郎遷司勛員外郎
  hash: sha256:6396bb9a0c8e9d159338079633cc8bb9c7406c5eb7f98d9a088832765391623b
  markers:
  - {type: head, offset: 14, content: 李肇, id: KR4h0168_NFKB_721-h1, level: 1}
body:
  text: 昔宋昌有言曰所言公公言之所言私王者無私夫翰林為樞機宥密之地有所慎者事之微也若制置任用則非王者之私漢制尚書郎主作文書起草更直於建禮門內臺給青縑白綾或以錦被帷帳氊褥畫通中枕大官供食湯官供餅餌五熟果五日一美食下天子一等建禮門內得神仙門神仙門內得光明殿神仙殿自門下省中書省蓋比今翰林之制略同而所掌輕也漢武帝時嚴助朱買臣吾邱壽王司馬相如東方朔枚臯之徒皆在左右是時朝廷多事中外論難大臣數詘亦其事也唐興太宗始於秦王府開文學館擢房元齡杜如晦一十八人皆以本官兼學士給五品珍膳分為三番更直宿於閣下討論墳典時人謂之登瀛洲貞觀初置宏文館學士聽朝之隙引之大內殿講論文義商較時政或夜分而罷至元宗置麗正殿學士名儒大臣皆在其中後改為集賢殿亦草書詔至翰林置學士集賢書詔乃罷初國朝修陳故事有中書舍人六員專掌詔誥雖曰禁省猶非密切故溫大雅魏徵李百藥岑文本褚遂良許敬宗上官儀時召草制未有名號乾封以後始曰北門學士劉懿之劉褘之周思茂元萬頃范履冰為之則天朝蘇味道韋承慶其後上官昭容獨掌其事睿宗則蘇稷賈膺福崔湜元宗改為翰林待詔張說陸堅張九齡徐安貞相繼為之改為翰林供奉開元二十六年劉光謹張垍乃為學士始別建學士院於翰林院之南又有韓紘閻伯輿孟匡朝陳兼李白蔣鎮在舊翰林院雖有其名不職其事至德宗以後翰林始兼學士之名代宗初李泌為學士而今壁記不列名氏蓋以不職事之故也釋迦者流有十二部經由儒之詩書易禮樂春秋皆立言垂教之本儒無文字則天下久已大壞三藏之說不行西方聖人之教幾乎息矣若聲聞乘之四諦門緣覺乘之十二因緣門菩薩乘之六波羅蜜門以至佛乘之一切種智生而知之則已學而知之者向微斯文是必懵然不自知其術也人主擅萬乘之權富有四海至於生死報應之際常必瞿然有生之徒奔走之不暇實由斯言之烜赫而致化夫塔廟莊嚴之為像教其用大矣佛有天龍大會未嘗不以契經為事佛滅後大迦葉召千羅漢結集法藏阿難傳焉西土以胡文紀之謂之梵書科斗文字之類也著以貝葉謂之梵夾殺青為簡之類也後漢天竺人摩騰始至中國出其文二十四章翻為隸書其後稍稍不絶至晉沙門法護遍遊西國達言語之不通者究三十六書之體而還梵書之詁訓音義然後大備雖為道滋廣而難能亦甚蓋以事生六合之外教出五常之後時人無能知者小則誤於文句大則失其宗旨道安嘗歎釋經有五失本三不易故信奉之代亦以名臣佐而成之自漢永平至唐開元祖述之士凡一百七十六人有桑門之重譯有居士之覃思有長老之辨論有才人之撰集校其經律論傳記文集刪改之惣五千四十八卷號為實録其中貞觀法師元奘作居多五分其數有其一其為該博首出前輩而歷代精舍能者藏之方之蘭臺祕閣而不繫之官府也五都之市十室之邑必設書寫之肆惟王公達於衆庶靡不求之以至徼福祐防患難嚴之堂室載之舟車此其所以浩瀚於九流也廬山山嶽之神秀而東西林為海內名剎有惠遠道安之遺風四百餘年鐘磬之音不絶然而三藏經論闕而無補元和四年雲門僧靈徹流竄而歸棲泊此山將去言於廉問武陽韋公公應之如響往年公夫人蘭陵蕭氏終有金義梳佩服之資而於荊州買良田數頃收其租入以奉檀施至是取之增以清白之俸而經營焉爰即洪州諸寺雜理其事雕函飾軸漬蘗磨墨僧謀而吏職暑兆而寒就先命度地之宜以圖建置默設規制懸成剞劂乃結搆而浮於江以至於東林施為殿堂用尊祕藏得浮槎大德義彤為之主受持灑掃者七人以備名山之闕而資學者之求公之素志爾初彤公受具於廬山浮槎寺嘗討大藏惡其部帙繁亂將理之不可遂發私誓四十餘夏果得志焉於是搜遠近之逸函墜卷目在辭亡者得之互文合部者兼之斷品獨行者類之本同名異者存之以僞亂真者標之又病前賢編次不以注疏入藏非尊師之意並開元庚午之後洎德宗神武孝文皇帝之季年相繼新譯大凡七目四千九百餘卷立為別藏著雜録七卷以條貫之命開元崇福舊録惣一萬卷舉藏以志函隨函以命軸微塵句偈如在常中然後金口之說流於娑婆者盡在於茲山也五年韋公薨七年博陵崔公以仁和政成憫默舊績由是東林以遺功得請篆刻之盛其成公志故家府從事李肇為之文曰多羅之教神道不測迦葉承之布西域兮毗尼之用其法翼翼優波受之垂作則兮阿曇之文演暢宗極苾芻龍象甚奇特兮三者之藏傾如轥墨王公大人為之飾兮韋公之績崔公之德及茲寶藏何崱屴兮崇崇彤公合發願力傳之歷劫千百億兮爐峯之北靈壇之側系之迦陀金石刻兮敬之字茂孝侍御史凌子元和初進士文宗朝為國子祭酒兼太常少卿轉大理卿檢校工部尚書臣有意諷賦久不得發偶出東門三百里抵華嶽宿於趾下明日試望其形容則縮然懼紛然樂蹙然憂歊然嬉快然欲追雲將浴於天河浩然毀衣裳晞髮而悲歌怯欲深藏果欲必行熱若宅爐寒若室冰薰然以和怫然不平三復晦明以搖其精萬態既窮乃還其真形骸以安百鈞去背然後知身之治而見其難焉於是既留無成辭以長歎翛然一人下於崖金玉其聲霜雪其顏傳則有之代無其鄰姑射之神蒙莊云始不敢視然得與言粲然笑曰用若之求周大物用若之智窮無端三四日得無顛倒反側於胸中乎是非操其心而自別者耶雖然喜若之專而教若之聽無多傳嶽之初成二儀氣凝其間小積焉為邱大積焉為山山之大者曰嶽其數五余尸其一焉嶽之尊燭日月居乾坤諸山並馳附麗其根渾渾河流從禹以來自北而奔姑射九土嵏荊巫梁岷道之云遠兮徒遙而賓嶽之形物類無儀其上無齊其傍無依舉之千仞不為崇抑之千仞不為卑天雨初霽三峯相差虹霓出其中來飲河湄特立無朋似乎賢人守位北面而為臣望之如雲就之如天仰不見其巔肅阿芊芊蟠五百里當諸侯田嶽之作鬼神反覆蛟龍不敢伏若歲大旱鞭之朴之走之馳之甘雨爛漫百川東逝千里而散噫氣蹶然怒乎幽巖漸於人間其聲瀏瀏嶽之殊巧說不可窮見於中天挲挲而掌峩峩而蓮起者似人伏者似獸坳者似池窪者似臼攲者似辨呀者似口突者似距翼者似抱文乎文質乎質動乎動息乎息嗚乎嗚默乎默上上下下千品萬類似是而非似非而是其乃繕人事吾焉得畢議今作帝耳目相其聰明下矚九州在宥㣥生初太易時其人俞俞其主人者始乎容成卒乎神農中間數十君姓氏可稱其徒以飲食為事未有仁義時哉時哉又何足涖是後敬乎天成乎人者必闢其心假其神與之齡降其人故軒轅有盛德蚩尤為賊生物不遂帝乃用力大事不可獨治降以后牧三人有心烈火就撲其子之子其孫之孫咸明且仁雖德之衰物其所宜由夏以降湯發仁以王癸受暴以亡甲戊誦釗不敢有加唯遵其常享國遂長天事著矣莫見乎高而謂乎茫茫余受帝命億有萬歲而不敢怠遑臣贊之曰若此古矣祖矣大矣異矣富矣庶矣駭矣怖矣上古之事粗知之矣而神之言又聞之矣然起居於上宮室於下如此之久矣其所見何如也曰見若咫尺田千畝矣見若環堵城千雉矣見若杯水池百里矣見若蟻垤臺九層矣醯雞往來周東西矣蠛蠓紛紛秦速亡矣蜂窠聯聯起阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣其下千載更改興壞悲愁辛苦循其上矣臣又問曰古有封禪今讀書者云得其傳云失其傳語言紛綸於神何如也曰若知之乎聞聖人撫天下既信於天下則因山嶽而質於天不敢多物若秦政漢徹則率海內以奉祭祀圖福其身故廟祠相望壇墠迤邐盛氣臭夸金玉聚薪以燔積灰如封天下怠矣然猶慊慊不足秦由是剃漢由是弱明天子得賢者在位能者在職廟堂之上垂衣裳而已其於封禪存可也亡可也又新字孔昭工部侍郎薦子元和中進士歷左右補闕李逢吉用事又新與李續劉栖楚附之有八關十六子之目逢吉罷相領山南東道節度表為行軍司馬坐田伾犯贓命貶汀州刺史李訓用事復召為刑部郎中訓死復貶終左司郎中北海守李公文人之雄書品之能者也開元十年作東林寺碑手筆一軸俾模而刊石藏於寺者凡百一十三歲僧之歷居者不啻大千數未始有議建竪者釋雲臯本謝氏子讀書為文將就鄉試舉進士遇明師悟寂滅之樂因矒頭就學遂僧於東林且有年矣一旦視碑卷歎曰遠公之名德振千古東林之聲藉冠宇內而是詞是翰記其所由然誠天下之妙絶山門之光大儒釋之美談也宜乎始至而揭諸顯敞俾文士名僧趨嚮之不暇是何卷於塵中踰百載莫石莫刊將焉用僧豫僧門一士也一杖一屣足以歷岨嶮一鉢一衲足以了朝夕不著不繫視千萬里若尋丈間遂裹足道途東西南北募緣以成其事會河東裴公自中書舍人開廉府於鍾陵敷文行政教之餘得六度三乘之祕聞臯志願亦垂信施因自染翰贊列爵秩名氏於卷末又有以增名迹重為光也臯乃得模而刊於碑會昌三年四月磨礱既成遂光遂平鐫之硜硜夬象奎呈如蛇如龍如飛如行如筯玉在漆如元穹列星立之亭亭弗磷弗傾於寺之明余時刺茲郡因減俸緡屋其上且嘉臯建志不苟古人云智過千人謂之英臯之有決補遺事之智有崎嶇辛苦以成其智之實過於百一十三年歷居之僧遠矣庸不謂為僧之英乎故記碑之陰故刑部侍郎劉公諱伯芻於又新丈人行也為學精博頗有風鑑稱較水之與茶宜者凡七等揚子江南零水第一無錫惠山寺石水第二蘇州虎邱寺石水第三丹陽縣觀音寺水第四揚州大明寺水第五吳松江水第六淮水最下第七斯七水余嘗俱瓶於舟中親挹而比之誠如其說也客有熟於兩浙者言搜訪未盡余嘗志之及刺永嘉過桐廬江至嚴子瀨溪色至清水味甚冷家人輩用陳黑壞茶潑之皆至芳香又以煎佳茶不可名其鮮馥也又愈於揚子南零殊遠及至永嘉取仙巖瀑布用之亦不下南零以是知客之說誠哉信矣夫顯理鑒物今之人信不逮於古人蓋亦有古人所未知而今人能知之者元和九年春豫初成名與同年生期於薦福寺余與李德垂先至憩西廂元鑒室會適有楚僧至置囊有數編書余偶抽一通覽焉文細密皆雜記卷末又一題云煮茶記云代宗朝李季卿刺湖州至維揚逢陸處士鴻漸李素熟陸名有傾蓋之歡因之赴郡抵揚子驛將食李曰陸君善於茶蓋天下聞名矣况揚子南零水又殊絶今者二妙千載一遇何曠之乎命軍士謹信者挈瓶操舟深詣南零陸利器以俟之俄水至陸以杓揚其水曰江則江矣非南零者似臨岸之水使曰某擢舟深入見者纍百敢虛紿乎陸不言既而傾諸盆至半陸遽止之又以杓揚之曰自此南零者矣使蹶然大駭伏罪曰某自南零齎至岸舟蕩覆半懼其鮮挹岸水增之處士之鑒神鑒也其敢隱焉李與賓從數十人皆大駭愕李因問陸既如是所經歷處之水優劣精可判矣陸曰楚水第一晉水最下李因命筆口授而次第之廬山康王谷水簾水第一無錫縣惠山寺石泉水第二蘄州蘭溪石下水第三峽州扇子山下有石突然泄水獨清冷狀如龜形俗云蝦麻蟲口水第四蘇州虎邱寺石泉水第五廬山招賢寺下方橋潭水第六揚子江南零水第七洪州西山西東瀑布水第八唐州柏巖縣淮水源第九淮水亦佳廬州龍池山頭水第十丹陽縣觀音寺水第十一揚州大明寺水第十二漢江金州上游中零水第十三水苦歸州玉虛洞下香溪水第十四商州武關西洛水第十五未嘗泥吳松江水第十六天台山西南峯千丈瀑布水第十七郴州圓泉水第十八桐廬嚴陵灘水第十九雪水第二十用雪不可太冷此二十水余嘗試之非繫茶之精粗過此不之知也夫茶烹於所産處無不佳也蓋水土之宜離其處水功其半然善烹潔器全其功也李置諸笥焉遇有言茶者即示之又新刺九江有客李滂門生劉魯封言嘗見說余醒然思往歲僧室獲是書因盡篋書在焉古人云瀉水置瓶中焉能辨淄澠此言必不可判也萬古以為信然蓋不疑矣豈知天下之理未可言至古人研精固有未盡強學君子孜孜不懈豈止思齊而已哉此言亦有裨於勸勉故記之的字學鍾元和時人禪師法號觀宗得姓留氏東陽人也世積貞隱元泯不耀初尊夫人夢吉祥天女引行摩利上宮而娠太白焉闕有善護懷月不薰不腥肌窕彌澤藏珠川媚蘊玉方流至寶處而殊倫至人出而體別異香襲乎襁褓童顏清於冰雪文字進誘偏聰佛經滋味筵之但甘鹽素年至十二懇求出家如哀者欲淚不可遏也昔太子逾邁寧辭父王香象頓騰擺落羈紲乃登秦望山禮善惠禪師求無上法一見奇秀如會宿心舊徙門階新我堂室服勤左右道務精微初受楞伽思益等經便入禪宗性海然後波瀾祕藏不習而了其功文字有窮生知莫際囊鉢衣祴遐求戒珠便往南嶽禮制空禪師稽首論心演通祕奧菩提樹上汝得新枝師子座前詎量高下祖師傳教南北一十二人今牛頭山中禪師是最後者遠將啓慕研復真言以心印心以法證法法且無別心寧有差失大善無修頓了無入二際清淨佛何間然禪師貌出常倫挺秀八尺時牛頭法衆欲近萬人無礙辨才闕瞻仰彼土緣盡思歸太白上方務安靜也不游京國遠名利也扄不關楗示無畏也常有兩虎依臥菴前低目輕步馴於家畜四境之內不聞暴聲我蘊大慈力感㣥物諸毒皆善豈唯獸焉山雖高深不能隱其大德遠近禮謁如川之流故明州刺史王公術故明州刺史李公岑故劒南東川節度行軍司馬檢校戶部郎中任公侗故明州刺史盧公雲前後皆駐騎雲根稽求上法飢渴無量虛往實歸每有異香聞者非一嗚呼孰謂法梁將壞般若舟沈元和四年八月十五夜跏跌化滅享齡七十九僧臘卌九以其年十月一日權閉於太白峯南先意也州尊邑尹祭奠交衢緇素齊道幢幡翳野慈雲聚而還散定水咽而更流猿鳥悲吟聲慘風雨物感如此人哀可知抵元和乙未歲建層龕邇於多寶佛塔依法像也門人闕海法常道真明徹惠見光獻元徽清瑗元悟等皆承師教戒定慧雙修恐劫火重然嵐風碎嶽請銘大德於無朽文曰如來示滅教留祕法言說非傳清淨即合火鏡陽照山空響答其一真乘無相妙覺無形三界上界前生下生月虧魄隱冰泮流清哭之香塔徒傷有情其二汾官太常博士祠部員外郎佑之寬容得衆全和葆光不病於物類其能考終得不為寬容乎和好不爭自卑士而極重任一心於理以惠物潔行廉正人無尤怨得不為一德不懈乎請諡為安簡楚元和時人臣某言伏奉恩制授臣同州刺史本州防禦長春宮等使即以今月八日到任上訖載服明命叨塵寵光逾涯之榮滿覆是懼臣某中謝臣幸逢昌時早獲入仕由乎邑吏參佐戎藩材謝中人官寧期達聖朝道廣菅蒯不遺遂得牧守連擢大郡徒以清心自約直質在公未申致命之誠久負竊位之責前秋屬奸凶搆禍譟動朱方臣所部當州首為劫脅乃藉天聲以告鄰境戮其僞將以阻奸謀蓋知無不為是臣職分陛下特録其微效超授方隅從政未洽於遠人進律俄遷於近輔非次之獎臣何以膺又臣伯父贈太師臣真卿在肅宗朝嘗典茲郡餘蹤遺事較然可徵臣以不腆之姿繼序官業誠比德非肖陳力異能而代受國恩若未失墜臣不勝感涕榮荷之至當今德澤被於寰宇薰風襲於隱微俗臻大寧吏易為理臣專奉揚大化申報皇慈事有未便於人者續具條奏以酬陛下子育之旨臣無任戴恩隕越之至權憲宗時人臣某言臣聞惟德動天惟睿作聖既聖德格於上下故元貺動於乾文天高聽卑應猶影響臣得上都進奏院狀報司天臺奏八月某日老人星見於井東色黃明潤大者臣按文耀鏡曰老人星見則主安又熊氏瑞應圖曰王者承天得理則老人星臨其國中賀伏惟睿聖文武皇帝陛下德邁勛華道侔覆載武以戡亂文以化成然猶旰食宵衣憂勤庶政令動植得所㝢縣和平故上感絪縕發端辰象色黃兆土德之有慶見井表聖年之無疆昭昭垂庥上帝允答求諸簡冊光絶今古凡在億兆孰不歡抃臣限以祇守藩鎮不藉稱慶闕庭舞詠之誠倍萬恆品謹遣某官奉表陳賀以聞晦饒州刺史淇子按圖經山以石文橫布彩翠相間若疊綵然故以為名東至二里許枕壓桂水其西巖有石門中有石像故曰福庭又門陰搆齊雲亭迥在西北曠視天表想望歸途北人遊此多軫鄉思會昌三年六月蕆功南自曲沼上極山椒四年七月功既山名四望故亭為銷憂亭之前後綿絡山腹皆溪梁危磴由西而北復東上疊綵石崖至福庭石門約三十餘步全緯與李德裕同時人陽之理化任乎人陰之宰司在乎神人保於城城保於德德者神所憑依也則都邑之主其城隍神之謂乎蜀地土惟塗泥古難版築至秦惠王始命張儀與蜀守張若城成都其環十二里其高七十尺廨署廛里畫其下井幹樓櫓森乎上其金椎初作壤頽莫就有大蔡周旋而行俾壘堵依準而立即今城也其神功乎由此而來乃墉洫崇濬啓塞扃固萬雉邐迤一都繁會神明支持金湯繕完故前年蠻寇卒來戎備無素但擾郊鄙不近闉闍閉關戎嚴即時罷退則扶傾捍患之力其陰靈幽贊之神乎前之舊祠寓託隈堞偏陋逼隘星歲滋深是用改度方隅惟新經搆去乎幽奧就於高明其日惟丙其辰惟已其卦直巽其宮在西揭署於高門宏敞於正堂丹雘於周墉圖繪於回廊廟貌如生像容有睟神保是饗永安定位俾夫農無水旱人不夭札屏絶蠻夷阜安閭里護乎封域富庶乎億年爰書經營以昭祀事韜贈吏部尚書宿之子登進士第文宗朝官金部司封員外郎虜犯榆塞軍屯柳營觀文帝勞師之禮得亞夫為將之名其始也威獨立氣橫行由棘門而及灞上列千騎而陳五兵羽衛爰來威儀既盛馬壯而塵起旗整而風徑全忘以律自矜萬乘之尊是用加囂未發三軍之令及其回鳳蓋駐金輿師徒方俟於倏往介胄俄驚其勃如人心為之激發天步為之躊躇方警蹕之初傳自南自北洎鑾鈴之有節匪疾匪徐偉夫推轂而行受脤而出苟心腹之無二視尊卑之如一足使他將顏厚餘凶股栗戈鋋有耀壓灞水之波瀾士馬無聲悄轅門之風日焜耀今古光昭典墳振天聲於絶漠笑兒戲於諸軍山河保誓竹帛垂勳守官而敢違上命不戰而自息祅氛時也暴去彊秦功成大漢炎火興而劉氏將熾旄頭耀而胡㣥尚叛思堂堂之陳用拓封疆得赳赳之夫以平禍亂宜其威加異類才出非常精貫金石貞含冰霜近鎮秦城之上遙臨渭水之將觀爾類之可殲師安得奪諒我戰之則克敵何以當國家威武有制寇銷蜂蠆之毒臣展爪牙之衛斯幸也誠則可嘉殊足稱於其帝覃宰相珣瑜子歷工戶刑三部尚書進右僕射以本官同平章事封滎陽郡公加門下侍郎宏文館大學士進太子太師開成四年罷相守左僕射會昌二年以司徒致仕陛下新即位宜側身勤政而內耽宴嬉外盤游畋今吐蕃在邊狙候中國假令緩急臣下乃不知陛下所在不敗事乎夫金繒所出固民膏血可使倡優無功濫被賜與願節用以所餘備邊毋令有司重取百姓天下之幸也
