front:
  text: 全唐文欽定全唐文卷一百七十八王勃二
  hash: sha256:ca4c54c5eec7c4d68e293e197b4a7cb273d2c5ebf8bdee5f44edafce380e0b52
body:
  text: 臣聞鵬霄上廓瓊都開紫帝之庭鼇紀下清珍野闢黃靈之館兼山配極照鸞闕於霞標薦水涵元湛驪宮於霧壑斯則神徵語怪功潛鳥迹之初理涉非經道昧鶉居之始授鳳書而稽碧落仙構罕存按龜籙而質黃圖金模間起粵若風移處暗層巢恢火運之機業洎嚮明上棟括河圖之奧三階布政詠匪日於靈臺百堵陳詩頌斯干於考室亦有黃軒瞰月譙門頽九洛之功璿闥排煙牧野構三河之酷御燕臺而臨北極缺王度於祈招列雲閣而拒南山隕皇謨於軹道然則卑宮喪禮采椽輕四海之尊豐屋延災柏梁非萬乘之有雖因時立事奢儉殊流而宏道在人興亡迭運靈光末造不窺九室之榮景福宏規猶擁三方之釁瞻風舊史逮曹馬而無譏觀迹故墟歷周隋而未得自我唐太陵遷構均五方於鶴几之前中野凝圖調六氣於虬牀之下坐圭臺而清俯仰晷緯齊明臨鼎邑而重威靈風雷合響得元功於大壯其在茲乎我大唐雞渾指極樹神宰而制山河鶴讖裁儀闢太虛而有天地黃精吐瑞潛龍苞象帝之基紫氣徵祥鳴鳳呈真王之表高祖太武皇帝虹星湛色開寶胄於金壺蛟電凝陰發皇明於石紐白蛇宵斷行移海嶽之符蒼兕晨驅坐遘雲雷之業屬東鄰委馭扇虐政於叢祠北拱隳尊紊皇圖於寶極蜚鴻集野瞻烏鮮投足之因青犢嘯風㣥鹿無擇音之所天街五裂截鯨浦而飛芒地紐三分觸鼇山而按節元虬在御掃圻甸而廓星都黃鳥分麾動扶搖而駭雲陳鑣宮仗金戊跨高陌而登元轡野韜戈陟圯壇而擁號皇圖不恃聖人追卷領之風神器無私才子奉褰裳之運太宗皇帝雲房揖契壓麟璽於庭軒雷渚翔英擾龍鈐於周鎬八能亨運抗鵷邸而仗朱髦十亂恢基臨鶴州而擁黃金戊唐雲祕族潛開白水之徵代景回輪光踐丹邱之運權輿象緯削茅社而建瓊祧草昧風雲席蘿圖而創璿歷紫庭合粹括宇宙於宸襟丹扆凝尊運陶鈞於寶思摛碧霄而鍊石上清耀魄之宮詔寰海而捐珠俯睇陽侯之室功驅偃伯頓鶚視於華封道被來王靜龍吟於武庫元樞上運卜年開纍聖之符丹竈升遐遺範敞謀孫之畫皇帝陛下椒庭襲慶曜璿萼於霞莊蘭殿分休湛珠衡於月館道凝瓊鎮下蒼掖而照重熙業峻銅樓憑紫軒而揖㣥后環四瀛於舜抱漏蟻覃津棲十景於堯襟巢螟荷照上元開籙寶龜定皇邑之模下武崇基飛龍錫帝臺之構貞明啓運齊玉鏡於鸞門易簡成功偃銅符於鶴仗懷降尊於襄野太階忘七起之勞念負重於焦原中席託三危之險臨翠媯而則道天孕時成坐元扈而被圖神超物妙皇后星潯縱淑曳珠紱於銅皋雲野疏祥抗瓊枝於桂浦素蟾登慶六虛充牝馬之貞丹雀銜休三雅合關睢之好璿宮夜靜居龍幰而調元金屋晨開御鴛階而緝化芝庭揖訓遠清和鳳之儀蘭佩承風競峻當熊之節皇太子承雲紫座翊八柱於乾維湛粹青衢揖三樞於地戶黃離踵曜太陽分銑樹之輝蒼震薦音少海控銀河之色鶴筌飛奏想丹駕於瓊山鮑俎捐芳齒元冠於寶序彤闈問豎禮崇監撫之威黼席興賢義極君親之愛若乃東門恤允謺仙構於熊山西苑承家導靈波於鴈沼桐圭作瑞鳳毛曜丹穴之英茅壤分維麟距冠元邱之俊巽宮延粹闢朱柱於娥臺兌野流芬疏紫蘭於別館頻隈育範雲扃分戚里之歡覃嶼凝規星閣絶郎官之請雕龍命職縱跳澤而驤鱗翠鷃調司順義飈而撫翼月軒宵佇虞溪降璿緯之精震帳晨披薑水洞金韜之賾飛鶴書而抽海狀桂壑於是投綸轉麟斾而揖山容松澗由其削袵軒圖瑞矞泛花綬於雞林農紀祥炎濯蘭纓於鳳水仙臺俶務三圭銓棘序之風天秩調邦六府燮槐衢之典金門獻納縱麟筆於苔箋石館論思核龜章於竹槧淹中訪禮蹲龍搖璧水之波稷下談經飛兔躍環林之秀詞庭吐鳳玩鳥迹於春黌書帳翻螢閲蟲文於夏閣杏花千畝紺轅照磨蜃之功桑柘三宮元紱降親蠶之禮圓邱上闢奉蒼璧於靈壇方澤下凝列黃琮於寶墠朱絃翠瓚履霜懷四饗之尊復霤重簷涓日正三綱之首五靈奔慶冠蛇澤於黃樞六祀銜欣揚麟煙於紺席遺弓積慕虔深太廟之儀執豆推恩道振明堂之禮瑤山廣樂備逸調於宮懸洞庭仙奏納遺歌於帝府九韶分唱后夔清桂序之音六變同和飛鳳掌梧軒之律樽俎折旋之數苞舉陰陽堂庭節奏之規彌綸宇宙靈襟索隱控風伯於詞林睿想鈎深詔天吳於筆海神窮獨照傍探赤水之珍思洽幾深回寫丹溪之韻金壇紫露映銀籀而翻華瑤林白雪藻瓊章而吐絢蟬機撮化銅渾將九聖齊懸虬箭司更銀漏與三辰合運爽鳩分職素雲頽馬喙之祥神獬關司元水照龍顏之則黃沙鞠草剗叢棘而遷訛丹石滋苔仰甘棠而息訟融皋再稔方聞外戶之謠昧谷千箱坐溢康衢之奏百城煙峙望秋露而乘風千室雲開合宵霆而組化彤幃獨選熊轓下蘆鴈之祥墨綬分賢犀檢降槐鸞之祉筠驂佇信髦士剖竹而相尋葦杖霑仁鮐叟攀輪而不暇龍蛇可踐野人豐荷杖之歡雞犬相聞城尉輟鳴桴之響五雲抽潤湛芳氣於璿臺六府咸殷唱豐歌於銅闕不戒而東戶恩周動植之津博施而舉南風化偃胎萌之寓神謀備預嚴七萃於丹樞邃略防微肅千廬於紫衛元戎握節黃公授犀闕之圖帝座聞鼙元女薦龍庭之策赬柯捭刃中權決勝於兩階白羽俄麾善陳推亡於四表朱匡反景之域削蛇弭於文㮰黑山明月之鄉委龍琛於武帳錦軒星騖控乾絡而觀風繡服霞驚浹坤紘而問俗川浮沒羽鯨溪靜丹浦之虞陸薦飛毛熊巘動青雲之偵銀關驟雨望紫陌而趨恩鐵幌馳風計彤闈而瀝思赤馬文猿之寶叢積乎郊虞紈牛露犬之貢滿盈乎儲邸青邱畫野不踰征賦之鄉蒼水奉圖未盡隄封之貫且夫緯武經文宏業也含幽育明至誠也混齊六合大功也規模百代昌數也故能襲九空而寧庶物劃千里而統諸侯休徵象德而動嘉符觸類而至風揚晷洽藻乾慶於芳年司節河清藹坤禎於明渚瑤枝結慶泉埃蕩玉蓋之文瓊液浮甘天酒綴金莖之色黃牟紫脫湊仙穎於中畿翠箑丹蓂謺靈株於上序駢眸候日漾影蒙池比翰翻風棲光理木祥飛井絡震鱗題瑞朔之元祉絢新郊枵獸紀和年之序具靈篇之絶貺究仙牒之殊休天人之際交矣皇帝之道備矣由是三靈物覩扣蘭禁而棲誠九服子來詠蒿宮而騁力去奢去甚不矜黃屋之隆匪朴匪雕方順丹墀之請宸規相宅考周舊於靈都睿覽思和獲秦餘於正殿㣥臣列陛奏蕭相之遺模天子臨軒採荀卿之故事炎洲八桂簉仙栱於林衡岱畎五松委靈材於梓匠衢宮記範萬機抗九戶之尊海孽移琛千欒省十家之費飛廉卷靄徹煙極而浮薨屏翳收津劃星墟而置槧瑤階百雉光懸寶露之壇瓊璧萬尋影綷崇霞之閣拖虹梁而四注星漢虧於上榮謺雲棟而三休寒暑隔於中霤雕楣鶴企沓勢分規繡桷虬奔殊形別起圖璫布藻罄羽璧於狼泉方鏡披蓮孕花機於蜃浦芝樓對幄薰傳五日之風藝閣列錢彩鍛三旬之霧文疏罩迥陰兔息肩於綺寮翠幌籠霄陽烏鎩翼於珠網豐隆按節下復橑而司階列缺施鞭低叢楹而假道溫房佇幸煦芳景於佳辰涼室乘間凜徂飈於火序金鋪夕照若帝圃之耀瓊英寶綴晨懸類阿房之聚銀燭煙邱碧桂翊珉陛而披香雨岫赬筠夾璿流而揚影九衢翻翠雜仙卉於中逵四照霏紅間靈葩於右墄神禽率舞光浮肆夏之軒瑞鳥相鳴響叶鈞天之樂鈎陳宿列儼雙碣於丹霄綺徼霞周闢千門於紫露爾其左扃嵩鎮申侯降太室之禎前枕莘郊伊尹發空桑之秀揭熊山而北眺貝闕猶存覩龜溜而西分瓊臺易接總交中宇廓川陸而疏畿竟想善鄰揆風霜而建野然則因秦構極祖宗耀金策之符作洛恢基我后創璿居之始援天引聖隔代重暉橫紫都而可襲配元宮而非遠故能使神光夜燭鏡麟趾於文除仙淹晨華委鸞章於繡礎靈爻密發八方昭大有之和寶篆潛開六合啓同人之會兩儀交慶虛碧墠而翹旌萬宇披歡指蒼車而候蹕雖青蒲頌德東朝獻龍鳳之圖而丹極鳴謙南面動貂羊之詔百神推策望璆徑而虔誠三讓奉符顧瑤壇而肅事龜書吐瑞按五校而分營鳳策揚輝翔八鸞而節步帷宮霧轉列芝蓋於中天帳殿星離軔蒲輪於大野紫鱗充饋若大帝之共臨素鶴翔華類㣥仙之廣宴花開瑞雪委瓊饌而調芳綵絢祥雲夾珠旗而曳影功推三祖銀繩勒東岱之威業峻一人金策奉南山之壽道既成矣元符集矣代既貞矣元勳緝矣運三辰而虛玉柄風兌渙其中孚懸五禮而偃金科雷坎光其作解奔烽舉爵溢仙酒於中衢謺鼓分肴浹宸輝於下里吞九皇而上運控八聖而遐征翔赤驥而睇風區吟翠虬而掩霄甸隱隱轟轟雷動天驚回輿斜盼而降乎乾元之殿司宮庀職肅坁堮而神行掌舍巡方煥巖廊而洞啓赫若朱螭負漢而輝橫海之鱗默若蒼鵬架壑而振垂天之翮千官曉次傃銀榜而端簪萬戶宵披候瓊膏而肅帶靈戈列陛天官具三揖之儀雲輅充庭宗伯演九賓之禮瑤鯨戒響懸猛虞於端闈銅狄分形肅嚴扃於左序排紫微而立極宸儀冠明后之三俯黃道而披軒仙歷用乾元之九蕩蕩乎何聖人之無外巍巍乎而神功之不窮也臣勃席芳十步企景三冬雖承宣室之談猶窘靈臺之影仙壇遠祕已多謝於祥鶼大厦初成復攀榮於賀雀慨深梁甫終乖捧日之歡恩極甘泉未動凌雲之價神圖不測固流絢於丹縢微志可存庶鐫芳於翠琬敢獻頌曰紫扃垂耀黃樞鎮野銀樹霜披珠臺月寫嚮明立極橫神廓社大壯摛爻斯干韻雅其一鶉居化沒狙訛道長瓊構霞明璜軒露廠棄人崇欲違天蠧象南巢不救東鄰長往其二瑤緘考懿金板藏功道凝茅屋業盛蒿宮龍階察祲鵷閣調風推訪華禮酌儉思沖其三懸漦結釁傅翼生災千薨嶺接萬栱星開爭圖絢侈福極凶來風寒碣館露慘蘇臺其四十館營秦金房砥室千間架漢韜雲閟日濟惡承危同亡異術傾輈未遠遺墟繼出其五龍川結禍鶴塞稱符塵驚八際霧慘三都穹廬寶極罽幕璿樞司宮墜典掌舍淪圖其六蒼衢育祉丹邱表聖鳳矯仙樞龍回寶命道凝金册功馳玉鏡紫氣抽華黃輝謺映其七神稽鶴讖迹播雞渾重光纍極翼子謀孫經天緯象就日提元鸞軒湛粹鳳几裁尊其八祥抽紫歷業昭彤管珍雀朝翻仙蟾夜滿丹墟獻迹青臺墜卵椒閫儀風芝閨奉欵其九登三建緒明兩開儀龍譙霧鬱鵷禁霞披波分璿渚景峻瑤枝黃扉曉列丹轂宵移其十龜文獵彥麟旌收逸桂客攀榮松賓改律紫鵷開紀丹虬聳秩縱壑摶飈登山捧日其十一功融棘序道備槐庭不仁者遠惟道斯行煙搖墨綬電轉朱車並境懷春翟野散秋螟其十二鄭竹分科燕棠輟諷銅機化極珠囊業洞禮貴丹虬樂調朱鳳珠坰獻寶綿鄉委貢其十三龍闕靜拆鶴塞投弦歌呈豹尾舞進鳶肩銅鐃月斥鐵輞星懸繩幽架險驛霧馳煙其十四霧壇凝紫河宮湛碧翠箑翻飈丹蓂候魄霜均雹散連珠契璧花蓋籠霏花衢墜液其十五年和政美化極風調靈臺軫詠考室興謠循圖訪典去泰捐雕道存南面讓屈東朝其十六望雲裁構籠霄建宇方鏡星離圖璫月聚梓匠傾思林衡授矩畫栱棲煙文軒架雨其十七芝房謺翠桂廡流丹霞張萬戶霧葺千欒重扃駐燠洞牖棲寒神加有敘貺入無端其十八帝圖臨御皇僚萃止電戟揮霜雲旌拒晷紫宮可逼黃街易履鳳礎騰文麟庭抗禮其十九珠泥暢績銀繩鬱契鶴嶺雲明龍壇景惠道超中古功推下濟惟帝惟天惟天惟帝其二十微臣上稽龍繇下閲龜謀觀天地之至道考皇上之大節武宣七德未嘗踰息亂之鄉文招大功未嘗出升平之域並能懸日月而高視駕雷雨而先鳴或皮幣而踐大階或干戈而躡乾步至於理定創禮功成作樂振長策以敘諸侯設靈機而制㣥動猶虞階已泰不能息洞庭之誅夏載克寧不能罷會稽之戮故將體剛柔而立本法震曜而崇威一戎而宇縣平四罪而華夷服然後皇旗大輅詔殊號於圜邱電轉星回奏元符於孝理天下黎人知四海之安樂寰中殊域奉三靈之康泰德兼祥風灑道與和氣遊不言而大寶用貞無事而元功有立捨彼代也其誰與哉若夫應運而生繼天而作鼓動千載之下超騰百王之上遂能發軒庭之景曜躡隋運之頽風揖讓而取文明指麾而清函夏則我皇唐得之矣高祖以黃旗錫瑞靜雲火之橫氛太宗以赤羽登期補星辰之絶縷授瑤圖於新邑付璿歷於鈞臺人更三聖道昭千古於是俯臨睿極趨四荒於鳳闕之前端委廟堂調萬國於龍軒之下八鸞徐動頓湯文於後塵九駿長驅佇堯舜於中路邦家之具得矣易簡之業存矣猶有朱蒙戾俗違光蓬艾之間青徼遺氓假氣陶鈞之內背熊山而搆虐擁狼潭而稽誅竊瀛海之風波弄乾坤之綱紀漢圖西返惟收五都之名魏律東窮未出三韓之險姦謀蓄於有漸逆節成於不悔長蚊蚋之雷霆附豺狼之羽翼豈知夫至人無外撫天下以為家真數有歸弔㣥方而罪已三門遁甲黃公成不戰之師五壘神兵元女下先登之策肅牙璋而按律耀旄節而分麾降南宮之元老裂西營之毅卒良將首路偏戎竟野軸轤萬里旌旗四合金箱玉匱司空憑百勝之威鶚視龍趨將軍仗萬全之略負鼇邱而峻壁據黿壑而深溝一鼓而亭塞無塵七縱而江山失險伐罪以明而不以衆懷遠人於絶境均惠化於殊鄰登若木以照臨折紅桃以延佇然後分州列鎮對明月以收營返斾旋戈部元雲而振旅望神都而獻捷仰靈社以書功辛亥謁於昭陵癸丑告於太廟時乘黑帝月旅元枵大唐有國之五十一年皇帝有天下之一十九載也元惡既殄萬宇清矣元勳既輯萬寶成矣以為周郊上帝裁延肅慎之賓漢禮甘泉未拯朝鮮之亂想元功而反側奉先旨以遲回思答上靈之心以洽庶黎之望爰考吉日遂淨行宮有司具典乘輿乃出撫元虯戴翠鳳鼉鼓按節鯨鐘疏響千乘嶽動萬騎林回星陳而天行雷震而霧合是時未登夫泰壇也乃齋帷宮宿帳殿華蓋移影鈎陳從蹕千營夕布亘蒼野而煙凝萬幕宵懸背黃闉而霧列既而屏翳清曉飛廉警旦孫叔奉轡王良縱策雲藏星謐宇曠山明旌軒具照簫笳互凝陟名嶽以告成歷神邱而展事國容象物而動朝章視令而肅宸儀有晬虛徐大帝之庭列侍無譁髣佛華胥之國於是襲袞服戒俎豆端瑞班儼華旒樂懸六代禮備三古奠惟蒼壁藉用白茅鳴孤竹之簫管奏空桑之琴瑟感格以誠不以事動植咸歡敬神以道不以華天人合應然後駐聲名於上邑反文物於仙宮因雷雨而作施法雲天而用饗風行電舉未寸景而浹九埏野抃途歌不崇朝而晏六合我之元極建矣我之能事異矣超帝寰而振足越皇衢以驤首不其休乎雖睿化無方比神圖而絶唱而小臣不佞撫洪筆而當仁敢作頌曰遼河巨浸碣石危峯城分元菟塞接黃龍憑遐作梗恃險忘恭人殘鬼哭主暗臣凶有晉不綱戎麾內逐帝隋失御皇輿外鶩九縣塵征三靈霧黷長茲下慢逋我天戮五材無隕千齡有聖武創元基文清寶命波恬四海明宣七政息衆以寧綏荒以令飛龍繼迹鳴鳳重光遂均夷夏迭用柔剛戈船泛月劍騎橫霜風驅海石電掃辰陽帝師無戰神兵有伐丞相陪麾司空仗鉞危雲旦起長星夜發萬壘爭屠千城自蹶功超薄伐義極兼該殊方底定善陳徐回歸俘獻捷課績分材建侯清廟偃伯靈臺考事龜謨凝清鳳扆仰觀俯察享神作祀道則推天功非在已豐隆旦出招搖夕指神壇嶽立齋館雲深鑾旗曉引葆吹晨吟山明野徹日降天臨鏘鏘盛服肅肅圭簪俎豆畢陳笙鏞間撫玉觴分獻金錞暢矩青帝鳴琴朱靈會舞上和下悅神歆福聚收歡巨野反斾靈躔恩周宇宙樂極寰埏德因時立頌以詞宣帝之功也臣何飾焉臣聞在天垂曜璿宮列乾象之墟在地班形珠闕鎮坤靈之野洎夫三精車並運即寥廓而為宮九聖旋遊遍洪荒而可宅則有瑤房玉室崑山分大帝之庭金屋銀臺滄海濯元元之宇豈非神明其道騁仙轡於無垠浩蕩其居示清都於不宰若夫扃牖六合奔走八神占日月而揆山川駕陰陽而法天地非聖人其孰能與於此乎至若文開遁甲仇峯城蒼后之躔樂奏鈞天洞嶺駐黃軒之駕業融環堵下姑射而尋真道濟巖廊望衡山而展覿斯則三階遍下唯臨布政之宮六位時乘未覩巡方之館其後兩龍齊騖抗瓊闥而同嬉八駿高驤指瑤池而結興殷風不競砂邱雄別館之娛秦道無章雲閣絢殊庭之賞於是功虧大壯頌闕祈招豐屋同亡危輈繼及遂使來年候迹名山為縱觀之場並海遵河沃野盡行宮之地皇天震怒於上蒼黎氓慟哭於下土其有斟酌千古文明一代蒿宮不陋茨山可仰祈誠東嶽唐帝復衢室之尊用饗西岐天子合鈞臺之運得其道也蓋有存焉國家梯霄架極罄域裁基纂高邱白雲之裔鬱函都紫氣之兆宸扉既闢一宇宙而來王聖籙潛躋二乾坤而作帝高祖天旗夜立制黃馬而先驅太宗日馭晨飛驂緑螭而首出雖立極承祧之業進燭前文而重光纍洽之符歸功下武陛下承靈太乙踵睿登三星虹沓祉電虬發慶丹書碧篆神符煥河洛之文玉斗珠衡天骨挺皇王之表用能捨桐圭而宣匕鬯肅玉籍而揖宗祧寫靄九天騰景萬里御風雷七曜於上博臨之功顯用山川六府而下輔相之宜得元宮密運敷造化於靈襟黃屋神凝創經綸於寶思鳳闈宵靜陰靈宣玉閫之華鶴禁朝趨離象峻銅樓之景川分帝子控鯤壑而疏源嶽動天孫擁熊山而列鎮其化成也如彼其強幹也如此猶乃停旒正室儼纊中軒玉階匪泰金門為險停虹旃於月澗嶽瀆生光飛鶴蓋於煙皋江湖動色桃溪逸彥塞丹井而歸風松磴遺英斬元關而奉制位兼河海九卿參巨濟之功道合星辰三事鬱經天之象朱轓緝化泣故老於中溪墨綬宣風繞春童於上陌王化之基已洽天工之代有序建銅儀而測曜象緯齊懸按璿璣而書雲禎氛謺舉祥嗈十二紫鵷調夏谷之音大禮三千赬蛇應黃鍾之曲蠶功順令業著於青裳蜃磨迎春恩周於黛耜黃砂靜讞爽鳩興頓足之悲丹石銷寃神獬輟摧鋒之計詠時和於帝壤動植咸歡歌道泰於華封昆蟲自樂星墟列將輝玉節而長驅天策神兵下金壇而決勝橫麾赤坂蔥山成不戰之郊命繳青邱桃野見其亡之兆煙馳火徼勵珠産而移琛雪騖氷洲駕瑤溪而納賮乾坤徑復載遵赤縣之封曦望環周未出黃圖之域故夫含吐萬物至功也制乎八表大業也一陰一陽神道也乃文乃武聖圖也用能使天不愛寶地不藏珍日月五行風雲四序龍章鳳彩舄奕於郊墟黃鉉紫玉磊砢於坰圃集靈風於翠箑浴甘露於朱英澤馬飛鑣山輿結轍殊徽狎至祥書竭東郭之毫纍譯同歸朝册盡南山之竹然後瑤壇備物陳帝服而展皇儀后室疇庸登太山而小天下功宏事畢狹廣宙而三遷風舉雲搖歷神都而一憩考遺基於汶上稽故典於淹中光總章之瑞紀嗣乾封之寶歷大矣哉升中作睿握四海而為尊則大斯模肇三宮而配永憑太室而高視靈壇八百坐明堂而恭已諸侯一萬時既貞矣襄城辭訪道之遊功既成矣元圃頓尋仙之駕由是南宮奏議和元禁而成章西土謳歌指皇輿而佇眷咸以珍臺靚穆陽靈開避暑之宮清序鈞調景福制追涼之殿然則高棟深宇威神之大節也順氣發生巡遊之大功也况乎石城金室偏興井鬼之區珠藪瑤池宛在秦豳之境應雷車並而出豫蒼帝其時面炎馭而思和朱明不遠雖塗吟野忭黎元欣望幸之符而屈已從人天子下勞謙之詔候離宮而從宴尚惕三危清近縣而移鑾猶詳再駕以為三十六所帝劉非舜禹之心四十二宮全趙異成康之歷詠荊臺而夕厲思蒲坂而晨凝方奉後天之期俯順觀風之請萬靈禔祉三辰合慶姬文考筮容成奏日千旌鳳轉儼鏤象而星陳萬騎龍嘶伐靈鼉而曉徹靜帷宮於緑野肅帳殿於黃街奔欃槍而走陸梁陳浮靈而侯明月前驅電竦下列缺於騰鞭後乘雷驚起豐隆於驟轂瓊戈晝灑太陽疲轉日之鋒玉劍宵翻懸象暗衝星之氣天旋霧散嶽運川回林兵護野方神啓路黃麾紫蓋雜真氣而西浮雲動神行背封巒而右指吐霧馳風以臻夫九成宮禮也爾時峯橫地乳景戴天糜分閬井而圖基蔭秦星而耀址靈墟寶藏代興雍之間峻阜長岑謺鎮岐梁之域丹溪碧洞吐納虹霓灌柏叢篁騰遷雨露獲秦餘於故兆地擬林光訪周舊於遺風山連水滸前趨劍棧玉壘千尋傍望斗城金墉萬仞架陰邱而北走境瞰鄜祠分沓嶂而西馳塗交隴坂仙都密邇猶連上苑之扃靈宮巋然直透崇岡之曲即喬基於澗道利在斯干固拱木於虞衡規同匪日彌峯跨谷層城萬轉庇險乘危回廊四注山祇盡石出徼道而終年風伯贏糧半長途而中宿架千樓而致極爛若神扶羅萬戶而窺天巍如化立離堂早照皎日籠光於綺寮合殿宵深歸雲納影於重廡珉房砥室畫栱相望緑岫紅巖雕櫳間出元熊蚺蟲炎俯棟宇而危心青鳥歸飛仰櫺軒而墜翼轉飛簷於秀崿上出重冥蔭反宇於回溪下臨無地紅葩紫的垂倒井而披文金鎖銀鋪接重扃而炫色儼鈎陳於漢陌泰階非遠設陛戟於煙莊仙梯可陟華璫璧散挂明月於崇朝密網珠連落奔星於已曙丹梁發秀彩沓虹文皓壁凝鮮光涵蜃氣銅龍對霤接飛泉而瀑流鐵鳳連甍遡還飈而佇立雖南纏統序北室開榮凜徑氣於叢楹起淒風於洞穴踆烏失轡出澗戶而無光金兔低輪下山扉而變色陰庭阻夏祝融無竊據之因邃屋乘春顓頊定忘歸之策飛廉扣響超北闕而神寒屏翳收津局南端而股戰蒼蒼八桂白露為霜落落千松元陰昧景金人列陛來危砌而思裘玉女窺窗伏曾巒而請纊陽秋代駕不凋仙囿之華天地為爐未解幽陵之凍至若氣清乾步景霽山維棲翠靄於崇榮列朱霞於復榭瓊枝纍道移綴文㮰碧樹周阿光瑤鏤檻靜簾帷而洞啓穆羽相和肅坻堮而天臨纖塵不動宸儀有晬蓬萊與城闕俱榮㣥后多歡蘿薜共簪裾合賞巖花落砌綴龍扆而成文嶂葉交軒拂鸞旗而追影爐峯轉靄香傳玉几之風石瀨鳴湍響入銅壺之水乃有陵陽駕鶴奉丹墀而稱臣子晉吟鸞下青蒲而謁帝箕精失曜傅説恭命於東廂昴宿低芒庭堅奉職於西序三臺九署雲端極目霓裳鳳髻闕下相尋張良臥疾攀赤松而有地綺季來朝歌紫芝而忘返若夫功成旰食道濟宵衣漢宮追聽覽之餘堯殿得巡來之隙霞登月憩光睿幸於彤闈玉振金聲藻宸章於翠掖洛陽才子承間盡宣室之談蜀郡詞人還奏動甘泉之賦復有軒庭十四出桂閫而乘茵永巷三千望椒塗而奉幣翊鸞臺之廣晏扈鴛砌之仙遊羅綺芳兮四面春環珮鳴兮九重暮風閨夕敞攜少女於歌筵月幌宵朧下姮娥於舞席元房俟宴雲姬辭豹尾之歡紺幄承顏星媛入魚鱗之戲若乃屯營櫛比對閣道而斜趨廨寺棋分混文昌而外屬周朝瑞鸑聲參叶律之宮陳寶鳴雞響雜司晨之序名都廣會閭閻萬室帝籞仙垣亭皋千里山村野孰家連菌草之園谷飲川居戶有桃符之水故夫恩加草樹囿原澤而無私道被翔行苑山川而不禁每至旻天戒序高風嘯律虞官獻秋獮之儀司馬奉梁騶之典將軍布卒略元灞而東馳都尉關營繞黃山而北睇於是逢蒙列階蚩尤並轂材官發射期門走仞杖元麾而直指鶚視千㣥奮朱鬣而橫行龍驤萬計層旗廣斾出宇宙而三驅謺鼓鳴鐘運雷霆而一呼前旌逐日夸父斷洪河之流後騎超山共伯挾崑崙之柱近陵吐焰縟奔電於長鋒灌莽生塵隕飛霜於徑鏃合戈鋋而照地猛兕知窮振罟網而籠天騰龍失據崩林磔石毛㣥無挺險之資蔭澤風山羽族落垂雲之影長圍躞蹀得駿馬於秦坰大輅徜徉載飛熊於渭浦然後還師振旅考事陳功皮軒按節牙璋復路祝餘生於大野誓廣校於長陬班腥於嶻山辟之墟省蠟於長楊之館命奔烽而舉釂火照甘泉總輕騎而行庖雲驚上路聲兼萬籥歌鐘空廣樂之庭禮被三雍玉帛盡塗山之會龍胎鳳卵入禹膳而調芳石乳瓊漿委堯樽而湛色恩霑下帛宴液仙宮雖大夫思濯鷁之歡而天子可回鸞之奏然後拜釐清廟考德齋宮用元功而不有宅太虛而無迹勳崇易簡規萬祀而化黃金道貫幽明徵百靈而饗丹甑得元珠於舜海尚警氷危朗天鏡於堯儀猶勤日昃虔恭上帝東朝懸待諫之旌清問下人南面聽登聞之鼓則有郊童候蹕敢讓天師野老排閽唯歌帝力風行比屋忠臣收折檻之謀化溢康衢良使息埋輪之請設神規而動俗庶績其凝握元符而發祉殊方合應華胥已泰濟㣥生於不死之庭閶闔可觀致仙歷於無窮之境蕩蕩乎發育萬物而顯諸仁洋洋乎包舉六氣而藏諸用均兩儀而得一恥三皇而不四者矣臣勃東皋賤節北阜幽姿常叨召見之恩驟玷明揚之列書生謁相望闕推輪下客遊梁榮參賜帛終童立志空投函谷之繻馬令同時未給尚書之筆雖元機妙鍵已寂兆於忘言而詠德陳功請追聲於匪頌其詞曰九門浩蕩三山超忽帝坐金房仙成玉闕浮丹麗紫棲霞冠月真匠難徵虛談易越其一旋窺鳳紀極睇龍墳曾巢化沒上棟爻分茅宮蔽雨松殿來雲猶迷匪陋尚闕斯文其二道倫明一風遷繼五禮讚三宮詩歌百堵黃圖未洽紫庭無輔局促墉垣逡巡度矩其三盛衰環襲沖盈舛騖璿宇夏闕瑤扃殷樹奢窮地絡毒流天步相日遄奔尋雲速仆其四災延六國運逼三川分雄競侈禮僭圖全飛薨月徑列廡霞阡乾溪敗楚碣石亡燕其五阿房秦構文軒五里建章漢立仙闥萬戺詭代齊徑違天縱已望夷有釁甘泉不祀其六宛郊嗣籙譙鄉警衆蜀跨梁岷吳吞楚夢相宜裁軌崇楹纍棟雲闕同華泉臺罕共其七晉圖終否胡風肆極霧黷丹圍塵埋紫域皇階不守帝庭無色帳殿相臨氊牆間飾其八南承有宋北洎亡隋功慙戶牖守在城池樓船水覘車陳山窺吳庭再毀代鼎三移其九火德初融江陽喪旅奄收淮船遂朝吳渚象錯驕秦龍舟壞楚雄圖乃溢傾宮不處其十海嶽呈華風雷寫慶翦諸戎首光我靈命紫氣雲蒸黃星月映轥商為業遵唐啓聖其十一景閟丹繩祥抽翠籙格天垂範模神騖躅朱極重光黃離繼旭道清金鏡時和玉燭其十二徵規鳳閫育訓鸞闈桐宮宿列桂邸霞飛台精變道嶽耀裁幾朝盈振鷺境比馴翬其十三武韜弓矢文經步驟爽鳩議獄龍夔掌奏玉帛華夷提封宇宙譯書歲欵祥圖月湊其十四帝功得一乾元用九鏤玉天齊塗金社首神京四邑明堂八牖燮而可大為而不有其十五層宮望幸堯封佇悅伺隟披圖乘時徙轍赤騮俟駕蒼虬按節月車宵移星闈曉列其十六方神護野嶽將清塗回麾嶠路逗蹕山樞千靈電騖萬辟風趨鈞臺有問洞岫無虞其十七五城分秀雙巒抗影畫栱彌峯雕甍亘嶺煙閨夜謐雲房晝靜竹殿棲寒松軒祕景其十八紫庭晨御彤闈早闢天子凝旒辟公奉璧薜蘿齊致簪裾混迹仙鶴隨輪靈鳧墜舄其十九風扃濬敞震廊藻邃玉網星開金鋪月墜山樓獸矯雲臺鳥次復嶂披丹回流轉翠其二十仇夷聖宅姑射神心樂翔丹鳳使引青禽羲壇葉暗禹洞花深沼分瑤水苑跨珠林其二十一順時宣節分戎講將星騎朝飛雲羅夕張寶雞獲祉非熊入貺駕掩岐搜禮高秦望其二十二酆庭未遠塗山有戮襄野迷軒清都宥穆罕夷乾步徒豐帝屋光總大猷允歸天祿其二十三合宮垂訓靈臺韻雅功映寰中頌流天下皇圖已泰鴻筆難假帝有力焉惡非能者其二十四
