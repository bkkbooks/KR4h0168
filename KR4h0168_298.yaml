body:
  text: 臣晙言臣聞鴻勳大猷必崇昭饗至德廣運莫先郊禋伏惟陛下紹皇開圖纂聖興業舉昭祀之典尊嚴配之儀伏以長至陽升用書雲物元穹有事祐福無窮畿嶽會同卉木咸悅臣獨擐甲朔野履冰一作理兵河外不獲躬陪玉一作大輅預奉圜壇屏營塞垣抃躍何巳無任翹翹鳬藻之至臣某言臣伏承陛下親拜南郊恭禋上帝竭孝誠於殷薦示彞訓於兆人寰海無虞元穹啓祐百靈效職九服駿奔燔燎洞合於神光日月共禎於瑞色乾坤交泰動植歡榮臣限以守職在藩不獲趨陪大禮無任慶躍屏營之至臣某言臣得度支鹽鐵轉運副使戶部侍郎潘孟陽狀報伏承皇帝陛下以來年正月四日謁元元宮五日饗太廟六日拜南郊制命施行中外慶抃臣某誠歡誠抃頓首頓首臣聞四氣首時履端為貴六經重祭報本是先伏惟皇帝陛下光啓睿圖纂承寶歷功格宇宙德冠勳華以建寅之吉辰備用辛之大禮祗事宮一作宗廟克禋烈祖之嚴對越天地聿修孝孫之敬萬靈從祀以肸蠁四夷率職而駿奔樂奏九成神降百福臣幸逢昌運外守藩條不及侍蒼輅之後塵仰泰壇之盛典心馳魏闕目極漢儀踴躍海隅倍萬恆品臣晙言直省王容至伏奉恩敕朔方無事且赴大禮者臣肅承寵命喜躍交并臣某中謝臣實不才纍承恩奬入參喉舌叨居國相之榮出總旌麾謬忝元戎之寄常願俯陳螢爝寧有益於曦舒思竭涓塵何以裨於海嶽每憂折鼎負乘碎首糜軀何階答於照臨撫已增於悚息伏以禋宗大享禮備郊天特垂綸綍之私聽同玉帛之會馳心輦蹕不遑俟駕局影塞垣迫於遵守以慶以懼戰汗兼深今長河始冰大漠初雪邊亭有賊今正其時事不可期兵難預度倘驚塵忽起禍出不虞臣進不之京退不及事微軀塞責無益於軍誠願陪扈屬車仰望雲漢顧惟軍旅之重正當預備之辰不敢釋此嚴防馳赴恩命惟當利兵訓卒息烽候於三邊耀武懷荒宣皇威於萬里無任悚荷屏營之至突厥時屬亂離所以塞降附其與部落非有讎嫌情異北風理固明矣養成其釁雖悔何追今者河曲之中安置降虜此輩生梗實難處置日月漸久姦詐逾深窺邊間隙必為患難今有降者部落不受軍州進止輒動兵馬屢有傷殺詢問勝州左側被損五百餘人私置烽鋪潛為抗拒公私行李頗實危懼北虜如或南牧降戶必與連衡臣問沒蕃歸人云却逃者甚衆南北信使委曲通傳此輩降人翻成細作儻收合餘燼來逼軍州虜騎憑陵胡兵應接表裏有敵進退無援雖復韓彭之勇孫吳之策令其制勝其可必乎望至秋冬之際令朔方軍盛陳兵馬告其禍福啖以繒帛之利示以麋鹿之饒説其魚米之鄉陳其畜牧之地並分配淮南河南寬鄉安置仍給程糧送至配所雖復一時勞弊必得久長安穩二十年外漸染淳風持以鋭兵皆為徑卒若以北狄降者不可南中安置則高麗俘虜置之沙漠之曲西域編氓散在青徐之右唯利是視務安疆場何獨降胡不可移徙近者在邊將士爰及安蕃使人多作諛辭不為實對或言北虜破滅或言降戶安靜志欲自言功效非有以徇邦家伏願察斯利口行茲遠慮邊荒清晏黎元幸甚臣料留住之議謀者云遵故事必言降戶之輩舊置河曲之中昔年既得康寧今日還應穩便但時異事變先典攸傳往者頡利破亡邊境寧謐降戶之輩無復他心所以多歷歲年此類皆無動靜今虜見未破滅降戶私使往來或畏北虜之威或懷北虜之惠又是北虜戚屬夫豈不識親疏將比昔年安可同日臣料其中頗有三策若盛陳兵馬散令分配內獲精兵之實外祛黠虜之謀暫勞永安此上策也若多屯士卒廣為備擬亭障之地蕃漢相參費甚人勞此下策也若置之朔塞任之來往通傳信息結成禍胎此無策也伏願察斯三者詳其善惡利害之狀長短可尋縱因遷移或致逃叛但有移得之者即是今日良圖留待河冰恐即有變臣蒙天澤叨居重鎮逆耳利行敢不盡言兢汴州浚儀人以史才薦拜右拾遺內供奉直史館開元中拜諫議大夫兼修文館學士歷台洪饒蘄四州刺史加銀青光祿大夫封長垣縣子天寶初入為恆王傅八年卒年八十餘臣自掌史東觀十有七年歲序徒淹勤勞莫著不能勒成大典垂誡將來顧省微躬久妨賢路乞罷今職別就他官至於理人之政在兢尤所詳曉望令試典一郡刺舉外臺必當效績循良不負朝寄又兢父致仕巳來俸料斯絶所冀祿秩稍厚甘脆有資烏鳥之誠幸垂矜察草土臣兢言伏奉去年八月十日恩敕追臣赴京起復尚書水部郎中依舊兼判刑部郎中知國史事聞命驚號心手無措臣兢中謝臣行負幽明禍延所怙銜哀茹血五情崩潰卜鄰之訓永慕不追陟岵之感窮寃已及但心同木石未能自死豈悟皇明旋加辟命且臣聞在家稱孝居國必忠苟違斯理實虧禮教焉有躬嬰荼毒而迹忝南史首伏苫廬而名叨東觀將何以發揮帝典褎貶人倫定一代之是非為百王之準的臣不敢遠喻前古廣飾浮辭自近歲以來起復者則有御史大夫解琬黃門侍郎張説工部侍郎蘇頲皆訴哀陳特蒙矜遂此實成例竊敢庶幾伏願陛下敦孝理之風全通喪之典追收綸渙俯納懇誠許其畢疚私庭終服凶次獲申負土之禮用展攀柏之悲則雖死之年猶生之日無任荒迫之至謹遣臣大學生終奉表陳乞以聞草土臣兢言頻表乞哀誠辭已罄未蒙矜亮獎喻彌切鞠躬周章倍增號震臣聞自昔墨縗本因兵革權宜變禮不為文儒後來浮薄罕存喪紀事匪軍容亦從權奪陛下休明撫運景業惟新伏望革近代之澆漓復先王之至德況史官之任為代準的若苟虧情理輒徇恩榮靦目強顏操書事適足玷聖朝之孝理何以樹終古之風聲特乞天慈少加矜察使畢情苫少申悲露則天地之恩實為至厚臣子之道幸此克全無任懇迫之至謹詣朝堂路左奉表乞哀以聞草土臣兢言臣去秋九月一日冒死哀訴冀得終服私門天眷猶邈未垂哀察局影窮號罔知自置又奉十一月二日敕史館要才須從權奪宜令州縣敦諭發遣者伏對崩號觸緒屠裂臣某中謝臣孝虧誠感奄遘憫凶瀝膽銜荼崩心茹棘尪骸殘喘豈冀生全天澤曲私屢加奪命令居史閣是掌記言臣昔忝此官十有餘載才輕寄重答效無施未能褎貶有章使人倫知勸典謨大訓與日月俱懸即微臣平日其曠職如此今心形隕越荒疾失圖寧可重處南董之司頻叨班馬之列實貽貪祿之咎更招廢禮之辜顧視等夷何施面目且三年之制貴賤同遵四時之悲几筵是託乞歸身苫趨侍松塋既不負素心亦不玷皇化干黷已屢伏待刑書無任崩迫之至謹詣朝堂路左奉表乞哀以聞臣彥範言伏奉恩制除臣侍中光大之命忽降望表顛越之懼頓積心涯臣某聞君子樹功心在利物義夫建策口不言賞故田疇以責塞為闕十六字趾達於閭里筮仕本祈於州縣屬天道貞觀功能咸録曾未一紀殆將十遷二入憲司莫禁姦宄再升會府寧裨準繩掌棘木之刑訟聲詎弭受羽林之寄軍容未肅循省知懼寢興弗遑頃逆豎等潛搆禍端竊窺神器外結凶黨陰懷密圖則天大聖皇帝天縱睿明察之於將兆陛下性命神武擒之於發機臣職統士卒受命梟斬此宗社之福也陛下之明也臣何力之有焉金紫佩腰已虧於曩節貂蟬冠首胡顏於後命不出旬朔頓越等倫臣知不可物議誰塞臣又聞暴進者罹咎知止者無辱詩有匪服之議易著折足之誡歷考前載益用惶惑且賞罰之柄國之大典罰一罪使天下革心賞一人使天下知勸今皇極肇建明命初基惠化始覃而賞勸失中此臣所以固讓也況此官出納帝命喉舌王言政之理亂實所攸繫豈可以微蚋之力能負邱山一葦之航克濟溟渤伏願覽任官惟賢之旨察量能受職之義寢巳施之澤鑒不奪之誠幸甚幸甚臣兢言伏見明制來年五月五日幸東都道路皆以陛下至長春宮及沙苑當有畋獵之事今東土耆艾關河士女莫不欣躍舞忭翹望帝車延頸企踵所思者德伏願陛下舉無失禮動則有章詩云敬慎威儀惟人之則愚臣以山陵始畢甫及逾年陛下縗服雖除心喪未巳四海之內八音尚遏豈可遽將犬馬為娛鷹隼是務必或如此則恐傷人子之道虧天地之經欲令萬方何所取則況禮經云三年之喪自天子達之陛下既俯順當時之請唯行易月之制奈何更盤于遊畋以徇從禽之樂豈可謂明王之孝理天下乎而望德教加於百姓必不可得也昔魯侯觀魚于棠春秋尚列其戒陛下若既葬而獵後代豈不為刺且馳騖山澤之間經過林薄之下水谷之危未遠銜策之變不恆伏願陛下重慎防微須為社稷自愛老子曰我無為而人自化我無欲而人自朴詩云爾之教矣人胥效矣由是觀之居上者必慎所好愚臣職居待問兼掌史筆竊以君舉必書位在無隱既聞衆所流議實恐有玷聖猷區區之誠唯在於此輒敢死上陳伏願留神省察恕此狂斐之罪臣聞易稱君子思不出其位言各止其所不侵官也此實百王準的伏見敕旨令韋抗等十人分掌吏部銓選及試判將畢遞召入禁中決定雖有吏部尚書及侍郎皆不得參其事議者皆以陛下曲受讒言不信於有司也然則居上臨人之道經邦緯俗之規必在推誠方能感物抑又聞用天下之智力者莫若使天下信之故漢光武置赤心於人腹良有旨哉昔魏明帝嘗卒至尚書省尚書令陳矯跪問曰陛下欲何之帝曰欲按行省司文簿矯曰此是臣之職分陛下非所宜臨若臣不稱職則就黜退陛下宜即還宮帝慙而返又陳平丙吉者漢家之宰相也尚不對錢穀之數不問路死之人故上自天子至於卿士守其職分而不可輒有侵越也況我大唐萬乘之君卓絶千古之上豈得下行選事頓取怪於朝野乎凡是選人書判並請委之有司仍停此十銓分選復以三銓還有司臣兢言臣愚比嘗見朝野士庶有論及國家政教者咸云若陛下之聖明克遵太宗之故事則不假遠求上古之術必致太宗之業故知天下蒼生所望於陛下者誠亦厚矣易曰聖人感人心而天下和平今聖德所感可謂深矣竊惟太宗文武皇帝之政化自曠古而來未有如此之盛者也雖唐堯虞舜夏禹殷湯周之文武漢之文景皆所不逮也至如用賢納諫之美垂代立教之規可以宏闡大猷增崇至道者並煥乎國籍作鑒來葉微臣以早居史職莫不成誦在心其有委質策名立功樹德正詞鯁義志在匡君者並隨事載録用備勸戒撰成一帙十卷合四十篇仍以貞觀政要為目謹隨表奉進望紆天鑒擇善而行引而伸之觸類而長之易不云乎聖人久于其道而天下化成伏願行之而有恆思之而不倦則貞觀巍巍之化可得而致矣昔殷湯不如堯舜伊尹恥之陛下儻不修祖業微臣亦恥之詩云念我皇祖陟降庭止又云無忝爾祖聿修厥德此誠欽奉祖先之義也惟陛下念之哉則萬方幸甚不勝誠懇之至謹奉表以聞謹言臣往者長安景龍之歲以左拾遺起居郎兼修國史時有武三思張易之昌宗紀處訥宗楚客韋溫等相次監領其職三思等立性邪佞不修憲章苟飾虛詞殊非直筆臣愚以為國史之作在乎善惡必書遂潛心積思別撰唐書九十八卷唐春秋三十卷用藏於私室雖帛丿糸歷二十餘年尚刊削未就但微臣私門凶釁頃歲以丁憂去官自此便停知史事竊惟帝載王言所書至重儻有廢絶實深憂懼於是彌綸舊紀重加刪輯雖文則不工而事皆從實斷自隋大業十三年迄乎開元十四年春三月即皇家一代之典盡在於斯矣既撰將成此書於私家不敢不奏又卷軸稍廣繕寫甚難特望給臣楷書手三數人并紙墨等至絶筆之日當送上史館今聞道路云云皆言賊臣等竊議以安國相王連謀於重俊共加羅織將欲置於法臣既忝職諫曹安敢不奏臣聞庶物不可以自生陰陽以之亭育大寶不可以獨守子弟成其藩翰昔武王聖主也成王賢嗣也然封建魯衛以扶社稷所以龜鼎相傳七百餘載始皇絶昭襄之業承戰爭之弊忽先王之典制比宗親於黔首孤立無輔二代而亡及諸呂用權將傾劉氏朱虛為其心腹絳侯作其爪牙劉氏復安豈非宗子之力歟國之安危在于藩屏故設官分職先親後疏詩云宗子維城書云九族既睦自文明之後皇運中衰國之祚裔不絶如線洎陛下龍興恩被骨肉搜謫竄於炎障復衣冠于庭闕萬國歡心孰不慶幸且安國相王實陛下之同氣六合至廣親莫加焉但賊臣等日夜同謀必欲置於極法此則禍亂之漸不可不察夫相王之仁孝幽明共知頃遭荼苦哀毀過制以陛下為性命亦陛下之手足大孝於父母而惡於兄弟者未之有也若信任邪佞委之於法必傷陛下之恩失天下之望所謂芟刈股肱獨任胸臆方涉江漢棄其舟楫可為寒心可為慟哭自昔翦伐枝幹委權異族者未有不喪其宗社也何以明之秦任趙高卒致傾敗漢委王莽遂成篡逆晉家以自相魚肉寰瀛鼎沸隋皇以猜忌子弟海縣塵飛驗之覆車安可重迹是以任之以權雖踈必重奪之以勢雖親必輕臣又聞之根朽則木枯源涸則流竭子弟者國之根源豈可使其朽竭哉先王所以廣封樹存親親使謀孫翼子柯葉碩茂況皇家枝幹零落無幾方之先朝十不存一自陛下登極于今四紀一子以弄兵被誅一子以愆失遠任惟此一弟朝夕左右斗粟尺布之刺可不慎焉蒼蠅之詩誠可畏也昔者謗書盈篋難明於主君讒言三至見疑於慈母伏願陛下降明制曉㣥邪使忠臣孝子知友于之愛姦佞庸回執讒慝之口下全棠棣之美上慰罔極之心德教加於兆人風化流於千載則㣥生幸甚臣本布衣匪求官達聖明過聽拔齒諍臣不勝受恩之甚謹昧死讜言輕瀆天威伏增戰汗自古人臣不諫則國危諫則身危臣愚食陛下祿不敢避身危之禍比見上封事者言有可采但賜束帛而巳未嘗蒙召見被拔擢其忤旨則朝堂決杖傳送本州或死於流貶由是臣下不敢進諫古者設誹謗木欲聞已過今封事謗木比也使所言是有益於國使所言非無纍於朝陛下何遽加斥逐以杜塞直言道路流傳相視怪愕夫漢高帝赦周昌桀紂之對晉武帝受劉毅桓靈之譏況陛下豁達大度不能容此狂直耶夫人主居尊極之位顓生殺之權其為威嚴峻矣開情抱納諫諍下猶懼不敢盡奈何以為罪且上有所失下必知之故鄭人欲毀鄉校而子産不聽也陛下初即位猶有禇無量張廷圭韓思復辛替否柳澤袁楚客數上疏爭時政得失自頃上封事往往得罪諫者頓少是鵲巢覆而鳳不至理之然也臣誠恐天下骨鯁士以讜言為戒撓直就曲斫方為刓偷合苟容不復能盡節忘身納君於道矣夫帝王之德莫盛於納諫故曰木從繩則正后從諫則聖又曰朝有諷諫猶髮之有梳猛虎在山林藜藿為之不采忠諫之有益如此自古上聖之君恐不聞已過故堯設諫鼓禹拜昌言不肖之主自謂聖智拒諫害忠桀殺關龍逄而滅於湯紂殺王子比干而滅於周此其驗也夫與理同道罔不興與亂同道罔不亡人將疾必先不甘魚肉之味國將亡必先不甘忠諫之説嗚呼惟陛下深鑒於茲哉隋煬帝驕矜自負以為堯舜莫巳若而諱憎諫乃曰有諫我者當時不殺後必殺之大臣蘇威欲開一言不敢發因五月五日獻古文尚書帝以為訕巳即除名蕭瑀諫無伐遼出為河池郡守董純諫無幸江都就獄賜死自是蹇諤之士去而不顧外雖有變朝臣鉗口帝不知也身死人手子孫勦絶為天下笑太宗皇帝好悅至言時有魏徵王圭虞世南李大亮岑文本劉洎馬周褚遂良杜正倫高季輔咸以切諫引居要職嘗謂宰相曰自知者為難如文人巧工自謂已長若使達者大匠詆訶商略則蕪辭拙迹見矣天下萬機一人聽斷雖甚憂勞不能盡善今魏徵隨事諫正多中朕失如明鑑照形美惡畢見當是時有上書益於政者皆黏寢殿之壁坐望臥觀雖狂瞽逆意終不以為忤故外事必聞刑戮幾措禮義大行陛下何不遵此道與聖祖繼美乎夫以一人之意綜萬方之政明有所不燭智有所不周上心未諭於下下情未達於上伏惟以虛受人博覽兼聽使深者不隱遠者不塞所謂闢四門明四目也其能直言正諫不避死亡之誅者特加寵榮待以不次則失之東隅冀得之桑榆矣自春以來亢陽不雨乃六月戊午大風拔樹壞居人廬舍傳曰欲德不用厥災旱上下蔽隔庶位踰節陰侵於陽則旱災應又曰政悖德隱厥風發屋壞木陰類大臣之象恐陛下左右有姦臣擅權懷謀上之心臣聞百王之失皆由權移於下故曰人主與人權猶倒持太阿授之以柄夫天降災異欲人主感悟願深察天變杜絶其萌且陛下承天后和帝之亂府庫未充冗員尚繁戶口流散法出多門賕謁大行趨競彌廣此弊未革實陛下庶政之闕也臣不勝惓惓願斥屏㣥小不為慢遊出不御之女減不急之馬明選舉慎刑罰杜僥幸存至公雖有旱風之變不足纍聖德矣陛下爰自雒邑將告禪岱宗行經數州屢以畋獵為事伏恐外荒之攸漸成非致理之所致況陳封告成禮容甚大伏願罷此遊畋之事克備文物之儀又貞觀時太宗文皇帝凡有巡幸則博選識達古今之士以在左右每至前代興亡之地皆問其所繇用為鑒誡伏願陛下遵而行之則與夫騁奔馬於澗谷要狡獸於叢林不慎垂堂之危不思馭朽之變安可同年而較其優劣有唐良相曰侍中安陽公中書令河東公以時逢聖明位居宰輔寅亮帝道弻諧王政恐一物之乖所慮四維之不張每克已勵精緬懷故實未嘗有乏太宗時政化良足可觀振古而來未之有也至於垂代立教之美典謨諫奏之詞可以宏闡大猷增崇至道者爰命不才備加甄録體制大略咸發成規於是綴集所聞參詳舊史撮其指要舉其宏綱詞兼質文義在懲勸人倫之紀備矣軍國之政存焉凡一帙一十卷合四十篇名曰貞觀政要庶乎有國有家克遵前軌擇善而從則可久之業益彰矣可大之功尤著矣豈必祖述堯舜憲章文武而巳哉其篇目次第列之於左瑒字瑤光華州華陰人開元中歷遷國子祭酒再遷大理卿拜左散騎常侍卒年六十八贈戶部尚書諡曰貞今之舉明經者主司不詳其述作之意每至帖試必取年頭月尾孤經絶句自今已後考試者盡帖平文以存大典今之明經習左氏者十無一二恐左氏之學廢又周禮儀禮公羊穀梁亦請量加優獎太學者教人務禮樂敦詩書也古制卿大夫子弟及諸侯歲貢小學之異者咸造焉故曰十五入太學學先聖禮樂而朝廷君臣之禮班以品類分以師長三德以訓之四教以睦之人既知勸且務通經學成業著然後爵命加焉以之效職則知禮節以之蒞人使識廉讓則棫朴之咏興也伏聞承前之例監司每年應舉者嘗有千數簡試取其尤精上者不過二三百人省司重試但經明行修即與擢第不限其數自數年以來省司定限天下明經進士及第每年不過百人兩監惟得一二十人若常以此數而取臣恐三千學徒虛廢官廩兩監博士濫縻天祿臣竊見流外入仕諸色出身每歲尚二千餘人方於明經進士多十餘倍則是服勤道業之士不及胥吏浮虛之徒以其效官豈識於先王之禮義國家大啓庠序廣置教道厚之以政始訓之以士先豈徒然哉將有以也陛下設學校務以勸進之有司為限約務以黜退之臣之微誠實所未曉臣伏見承前以來制舉遁迹邱園孝弟力田者或試時務策一道或通一經粗明文義即放出身亦有與官者此國家恐其遺才至於明經進士服道日久請益無倦經策既廣文辭極難監司課試十巳退其八九考功及第十又不收其一二若長以為限恐儒風漸墜小道將興若以出身人多應須諸色都減豈在獨抑明經進士也渙蒲州解人河北道推勾租庸使兼復囚使判官衛州司功參軍開元初為中書舍人臣堂伯祖奭去顯慶三年與褚遂良等五家同被譴戮雖蒙遺制蕩雪而子孫亡沒並盡唯有曾孫無忝見貫龔州蒙雪多年猶同遠竄陛下自臨宇縣優政必被鴻恩及於泉壤大造加於亡絶先天巳後頻降絲綸曾任宰相之家並許收其淪滯況臣伯祖往叨執政無犯受誅藳窆尚隔故鄉後嗣遂編蠻服臣不申號訴義所難安伏乞許臣伯祖還葬鄉里其曾孫無忝放歸本貫於繹工妙沖訊靈若架海維河浮黿役鵲伊制或微茲模蓋略析堅合異超涯截壑支堂勿動觀龍是躍信梁而奇在啓為博北走燕薊南馳溫洛騑騑壯轅殷殷雷薄攜斧拖繡騫驄視鶴藝入侔天財豐頌閣斫輪見嗟錯石惟作並固良球人斯瞿目郭紹正福州長樂人開元中官少府監守殿中丞纍遷戶部侍郎封安昌縣開國男自夏以來時稍微旱昨令臣畫龍刻魚聖躬親用祈禱先天不違油雲鬱興甘澤滂降百穀豐就萬物滋成臣忝有司實荷殊慶請宣付史館以闡皇猷
