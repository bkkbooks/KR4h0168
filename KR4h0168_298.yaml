front:
  text: 全唐文欽定全唐文卷二百九十八晙滄州景城人徙家洛陽弱冠明經擢第景龍末充朔方軍副大總管兼安北大都護隴右㣥牧使開元十年拜太子詹事纍封中山郡公十一年同中書門下三品充朔方軍節度大使二十年卒年七十餘贈尚書左丞相諡曰忠烈
