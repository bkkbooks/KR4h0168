front:
  text: 全唐文欽定全唐文卷三百八十一元結二
  hash: sha256:9b45e5ba4fbe54cdb5402ec1e9ef4ca2c225d55ac3ebfcad2a60dc01a035df42
body:
  text: 故荊南節度觀察使江陵尹兼御史大夫呂諲姪男季重右見任祕書省著作郎以前件狀呂某立身無私歷官清儉身歿之後家無餘財長男幼小未了家事前件姪質性純厚識理通敏仁孝之性不慙古人自其疾甚不視事向五六十日軍府之事皆季重咨問事無大小處之無猜以臣所見季重不獨為賢子弟今時穀踊貴道路多虞漂流異鄉無以自給伏望天恩與季重便近州一正員官令其恤養孤幼謹録奏聞伏聽敕旨當州準敕及租庸等使徵率錢物都計一十三萬六千三百八十八貫八百文一十三萬二千四百八十貫九百文嶺南西原賊未破州已前三千九百七貫九百文賊退後徵率以前件如前臣自到州見租庸等諸使文牒令徵前件錢物送納臣當州被西原賊屠陷賊停留一月餘日焚燒糧儲屋宅俘掠百姓男女驅殺牛馬老少一州幾盡賊散後百姓歸復十不存一資産皆無人心嗷嗷未有安者若依諸使期限臣恐坐見亂亡今來未敢徵率伏待進止又嶺南諸州寇盜未盡臣州是嶺北界守捉處多若臣州不安則湖南皆亂伏望天恩自州未破以前百姓久負租稅及租庸等使所有徵率和市雜物一切放免自州破以後除正租正庸及準格式合進奉徵納者請據見在戶徵送其餘科率並請放免容其見在百姓産業稍成逃亡歸復似可存活即請依常例處分伏願陛下以臣所奏下議有司苟若臣所見愚僻不合時政干亂紀度事涉虛妄忝官尸祿欺上罔下是臣之罪合正典刑謹録奏聞當州奏永泰元年配貢上都錢物總一十三萬二千六百三十三貫三十五文四萬一千二十六貫四百八十九文請據見在堪差科徵送九萬一千六百六貫五百四十六文配率請放免以前件如前臣當州前年陷賊一百餘日百姓被焚燒殺掠幾盡去年又賊逼州界防捍一百餘日賊攻永州陷邵州臣州獨全者為百姓捍賊今年賊過桂州又團練六七十日丁壯在軍中老弱餽糧餉三年已來人實疲苦臣一州當嶺南三州之界守捉四十餘處嶺南諸州不與賊戰每年賊動臣州是境上之州若臣州陷破則湖南為不守之地在於徵賦稍合優矜今使司配率錢物多於去年一倍已上州縣徵納送者多於去年二分已下申請矜減使司未許伏望陛下以臣所奏令有司類會諸經賊陷州據合差科戶臣當州每年除正租正庸外更合配率幾錢庶免使司隨時加減庶免百姓每歲不安其今年輕貨及年支米等臣請準狀處分謹録奏聞右謹按地圖舜陵在九疑之山舜廟在太陽之溪舜陵古老已失太陽溪今不知處秦漢已來置廟山下年代寖遠祠宇不存每有詔書令州縣致祭奠酹荒野恭命而已豈有盛德大業百王師表歿於荒裔陵廟皆無臣謹遵舊制於州西山上已立廟訖特乞天恩許蠲免近廟一兩家令歲時拂灑示為恆式豈獨表聖人至德及於萬代實欲彰陛下元澤及於無窮謹録奏聞臣州僻在嶺隅其實邊裔土風貪於貨賄舊俗多習吏事獨季秀能介直自全退守廉讓文學為業不求人知寒餒切身彌更守分貴其所尚願老山林臣切以兵興已來人皆趨競苟利分寸不愧其心則如季秀者不可不加褎異臣特望天恩令州縣取其穩便與造草舍十數間給水田一兩頃免其當戶徭役令得保遂其志此實聖朝旌退讓之道亦為士庶識廉恥之方謹録奏聞右方城縣舊萬餘戶今二百戶已下其南陽向城等縣更破碎於方城每縣正員官及攝官共有六十人以前件如前自經逆亂州縣殘破唐鄧兩州實為尤甚荒草千里是其疆畎萬室空虛是其井邑亂骨相枕是其百姓孤老寡弱是其遺人哀而恤之尚恐冤怨肆其侵暴實恐流亡今賊寇憑陵鎮兵資其給養今河路阻絶郵驛在其供承若不觸事救之無以勞勉其苦為之計者在先省官其方城湖陽等縣正官及攝官并戶口多少具狀如前每縣伏望量留令并佐官一人餘並望勒停謹録狀上當軍孤弱小兒都七十六人張季秀等三十九人無父母周國良等三十七人有父兄在軍以前件狀如前小兒等無父母者鄉國淪陷親戚俱亡誰家可歸傭丐未得有父兄者其父兄自經艱難久從征戍多以忠義遭逢誅賊有遺孤弱子不忍棄之力相恤養以至今日迄令諸將有孤兒投軍者許收驅使有孤弱子弟者許令存養當軍小兒先取回殘及回易雜利給養謹録狀上當軍將二千人父隨子者四人母隨子者二十八人以前件如前將士父母等皆因喪亂不知所歸在於軍中為日亦久夫孝而仁者可與言忠信而忠信者可以全義勇豈有責其忠信使之義勇而不勸之孝慈恤以仁惠今軍中有父母者皆共分衣食先其父母寒餒日甚未嘗有辭其將士父母等伏望各量事給其衣食則義有所存恩有所及俾人感勸實在於此謹録狀上臣某言臣自以昏庸無堪逸浪江海陛下忽降公詔遠徵愚臣陛下豈不以凶逆未除盜賊屢起百姓勞苦力用不足將社稷大計與天下圖之者乎荒野賤臣始見軒陛又拘限忌諱不能悉下情以上聞則陛下又安用煩勞車乘招禮賢異臣實不能當君子之羞受小人之辱故編輿皂之説為三篇名曰時議敢以上聞抵冒天威謹伏待罪臣結頓首謹上乾元二年九月日前進士元結表上時之議者或相問曰往年逆亂之兵東窮江海南極淮漢西抵秦塞北盡幽都令趙衛之疆悉為盜有凶勇之徒在四方者幾百餘萬如屯守二京從衛魁帥者不計當時之兵可謂強矣當時人心已不固矣天子獨以數騎僅至靈武引聚餘弱憑陵強寇頓軍岐陽師及渭西曾不踰時竟能摧堅鋭復兩京逃降逆類悉收河南州縣今河北隴陰姦逆尚餘今山谷江湖稍多亡命今所在盜賊屢犯州縣今天下百姓咸轉流亡今臨敵將士多喜奔散今賢士君子不求任使天子往在靈武至於鳳翔無今日兵革而能勝敵無今日禁制而無亡命無今日威令而盜賊不起無今日財用而百姓不亡無今日封賞而將士不散無今日朝廷而人思任使何哉豈天子能以弱制強不能以強制弱豈天子能以危求安而忍以未安忘危時之議者或相對曰此非難言甚易言矣天子往年悲恨陵廟為凶逆傷汚怨憤上皇忽南幸巴蜀哀傷宗戚多見誅害驚惶聖躬動息無所是以勤勞不辭親撫士卒與人權位信而不疑渴聞忠直過則喜改如此所以能以弱制強以危求安今天子重城深宮燕私而居冕旒清晨纓佩而朝太官具味當時而食太常修樂和聲而聽軍國機務參詳而進萬姓疾苦時或不聞而廏有良馬宮有美女輿服禮物日月以備休符佳瑞相繼而有朝廷歌頌盛德大業四方貢賦尤異品物公族姻戚喜符帝恩諧臣戲官怡愈天顏而文武大臣至於公卿庶官皆權位爵賞名實之外似已過望此所以不能以強制弱忍以未安忘危若天子能視今日之安如靈武之危事無大小皆若靈武何寇盜強弱可言當天下日無事矣時之議者或相謂曰吾聞道路云云説士人共自謀曰昔我奉天子拒凶逆勝敵則家國兩存不勝則家國兩亡所以生死決戰是非極諫今吾屬名位已重財貨已足爵賞已厚勤勞已極天下若安吾何苦哉天下若不安吾屬外無仇讐相害內無窮賤相迫何苦更當鋒刃以近死乎何苦更忤人主以近禍乎又聞曰嗚呼吾州里有忠義之者仁信之者方直之者今或有病父老母孤兒寡婦如身能存者皆力役乞丐凍餒不足況於死者父母妻子人誰哀之又聞曰今天下殘破蒼生危急受賦役者多寡弱貧獨流亡死生悲憂道路蓋亦極矣天下若安我等豈無隴畝以自處若不安我等不復以忠義仁信方直死矣縱有盜於我者安則隨之人且如此其然何故時之議者相對曰今國家非欲其然蓋失於太明太信而然耳夫太明則見其內情將藏內情則罔惑生焉罔上惑下能令必信信可必矣故太信焉太信之中至姦元惡卓然而存如此使朝廷遂亡公直天下遂失忠信蒼生遂益冤怨如公直亡矣忠信失矣冤怨生矣豈天子大臣之所喜乎將欲理之能無端由吾屬議於野者又何所及時之議者或相問曰今天子思安蒼生思滅姦逆思致太平方力圖之非不勤勞於今四年而説者異之何哉時之議者或相對曰如天子所思如説者所異天子大臣非不知之凡有制誥皆嘗言及言雖殷勤事皆不行前後再三頗類諧戲今或有仁恤之詔憂勤之誥人皆族立黨語指而議之其由何哉以言而不行之故也天子不知其然以為言雖不行足堪沮勸嗚呼沮勸之道在明審均當而必行也必不行矣有言何為自太古以來致理興化未有言之不行而能至矣若天子能追行已言之令必行將來之法且免天下無端雜徭且除天下隨時弊法且去天下拘忌煩令必任天下賢異君子屏斥天下姦邪小人然後推仁信威令與之不惑此帝王常道何為不及某月日前進士元結頓首尚書公閣下結每聞賢卿大夫能以至公之道推引君子使名聲德業相繼稱顯則思見之若不以至公之道推引君子使禍惡凶辱同日更受則不思見之結所以年四十足不入於公卿之門身不齒於利祿之士豈忘榮顯蓋懼汚辱昨者有詔使結得詣京師至汝上逢山龜亦承詔詣京師結與山龜俱得乘郵而來郵長待結頗如龜者前日謁見尚書俯拜階下本望齒乘郵與諸龜結待命而退不望尚書不以結齒之於龜以士君子見禮問及詞賦許且休息此結之幸豈結望尚書之意古人所以愛經術之士重山野之客採輿童之誦者蓋為其能明古以論今方正而不諱悉人之下情結雖昧於經術然自山野而來能悉下情尚書與國休戚能無問乎事有在尚書力及能不行乎結頓首月日新授右金吾兵曹參軍攝監察御史元結頓首相公執事某性愚弱本不敢干時求進十餘年間在山野過為知已猥見稱譽辱在鄉選名汚上第退而知恥更自委順亦數年矣中逢喪亂奔走江海當死復生見有今日林壑不保敢思祿位忽枉公詔命詣京師州縣發遣不得辭避三四千里煩勞公車始命蹈舞帝庭即日辭命擔囊乞丐復歸海濱今則過次授官又令將命謀人軍者誰曰易乎相公見某但禮文拜揖之外無所問焉忽然狂妄男子不稱任使坐招敗辱相公如何某所以盡所知見聞於左右不審相公以為可否如曰不可合正典刑欺上誷下是某之罪謹奉詔書及章服待命屏外某頓首某月日荊南節度判官水部員外郎兼殿中侍御史元結頓首某聞古之賢達居權位也令當世頌其德後世師其行何以言之在分君子小人察視邪正使無冤濫而無憤痛耳某不能遠取古人請以端公賢公中丞為喻前者獲接端公餘論某嘗議及中丞某以為賞中丞之功未當論中丞之冤至濫端公不知情至泣涕交流豈不為有冤濫未申而生此憤痛某與端公頗為親故官又差肩曾不垂問便即責使冤濫者豈獨中丞而已乎憤痛者豈獨端公而已乎所以至遣使者試以自明端公前牒則請不交兵端公後牒則請速交兵如此豈端公自察辨誤耶有小人惑亂端公耶端公又云荊南將士侵暴端公豈能保荊南將士必侵暴乎豈能保淮西將士必不侵暴乎端公少垂察問某又聞泗上鄰家之事請説以自喻昔泗上有鄰家有朋友遊者鬥之遊東家則曰公之友賢能益主人西家之友愚能損主人遊西家則曰公之友智能譽主人東家之友狡能毀主人見其友亦如鬥主人之論於是鄰家之友相惡將相害鄰家之翁怒將相絶里有正信之士為辨之然後鄰家通歡鄰友相善荊南與江西猶鄰家也某其友乎遊者方相鬥誰為正信之士一為辨之某敢以此書獻端公閣下某月日某官某再拜相公閣下某嘗見時人不能自守性分俯仰於傾奪之中低徊於名利之下至有傷汚毀辱之患滅身亡家之禍則欲劇為之針於身豈願踰性分取禍辱而忘自針者耶某性荒浪無拘限每不能節酒與人相見適在一室不能無歡於醉醉歡之中不能無過少不學為吏長又著書論自適昔天下太平不敢絶世業亦欲求文學之官職員散冗者為子孫計耳自兵興以來此望亦絶何哉某一身奉親奔走萬里所望飲啄承歡膝下今則辱在官以逾其性分觸禍辱機兆者日未無之某又三世單貧年過四十弱子無母年未十歲孤生嫁娶者一人相公視某敢以身徇名利者乎有如某者以身徇名利齒於奴隸尚可羞而況士君子也歟某甚愚鈍又無功勞自布衣歷官不十月官至尚書郎向三歲官未削人多相榮某實自憂相公忍令某漸至畏懼而死甚令必受禍辱而已某前所言相公似未見信故藉紙筆煩瀆門下某再拜月日次山白何夫子執事皮辨時俗廢之久矣非好古君子誰能存之忽蒙見贈驚喜無喻次山漫浪者也苦不愛便事之服時世之巾昔年在山野曾作愚巾凡裘異於制度凡裘領緇界緇緣緇帶其餘皆褐帶聯後縫中腰前繫愚巾頂方帶方垂方緇葛為之元絲為縷次山自衣帶巾裘雖不為時人大惡亦嘗辱其嗤誚方欲雜古人衣帶以自免辱贈及皮辨與凡裘正相宜若風霜慘然出行林野次山則戴皮辨衣凡裘若大暑蒸溼出見賓客次山則戴愚巾衣野服野服大抵緇褐布葛為之也腰擔為裳短襟為衣裳下及履衣垂及膝下不審夫子異時歸休適在山野能衣戴此者不乎若以為宜當各造一副送往元次山白河南元氏望也結元子名也次山結字也世業載國史世系在家牒少居商餘山著元子十篇故以元子為稱天下兵興逃亂入猗玗洞始稱猗玗子後家瀼濱乃自稱浪士及有官人以為浪者亦漫為官乎呼為漫郎既客樊上漫遂顯樊左右皆漁者少長相戲更曰聱叟彼誚以聱者為其不相從聽不相鉤加帶笭箵而盡船獨聱齖而揮車酒徒得此又曰公之漫其猶聱乎公守著作不帶笭箵乎又漫浪於人間得非聱齖乎公漫久矣可以漫為叟於戲吾不從聽於時俗不鉤加於當世誰是聱者吾欲從之彼聱叟不慚帶乎笭箵吾又安能薄乎著作彼聱叟不羞聱齖於鄰里吾又安能慙漫浪於人間取而醉人議當以漫叟為稱直荒浪其情性誕漫其所為使人知無所存有無所將待乃為語曰能帶笭箵者全獨而保生能學聱齖者保宗而全家聱也如此漫乎非邪天寶十二年漫叟以進士獲薦名在禮部會有司考校舊文作文編納於有司當時叟方年少在顯名迹切恥時人諂邪以取進姦亂以致身徑欲填陷穽於方正之路推時人於禮讓之庭不能得之故優遊於林壑怏恨於當世是以所為之文可戒可勸可安可順侍郎楊公見文編歎曰以上第汚元子耳有司得元子是賴叟少師友仲行公公聞之諭叟曰於戲吾嘗恐直道絶而不續不虞楊公於子相續如縷明年有司於都堂策問㣥士叟竟在上第爾來十五年矣更經喪亂所望全活豈欲迹參戎旅苟在冠冕觸踐危機以為榮利蓋辭謝不免未能逃命故所為之文多退讓者多激發者多嗟恨者多傷閔者其意必欲勸之忠孝誘以仁惠急於公直守其節分如此非救時勸俗之所須者歟叟在此州今五年矣地偏事簡得以文史自娛乃次第近作合於舊編凡二百三首分為十卷復命曰文編示門人子弟可傳之於筐篋耳叟之命稱則著於自釋云不録時大歷二年丁未中冬也元結作篋中集或問曰公所集之詩何以訂之對曰風雅不興幾及千歲溺於時者世無人哉嗚呼有名位不顯年壽不終獨無知音不見稱頌死而已矣誰云無之近世作者更相沿襲拘限聲病喜尚形似且以流易為辭不知喪於雅正然哉彼則指詠時物會諧絲竹與歌兒舞女生汙惑之聲於私可矣若令方直之士大雅君子聽而誦之則未見其可矣吳興沈千運獨挺於流俗之中強攘於已溺之後窮老不惑五十餘年凡所為文皆與時異故朋友後生稍見師效能似類者有五六人於戲自沈公及二三子皆以正直而無祿位皆以忠信而久貧賤皆以仁讓而至喪亡異於是者顯榮當世誰為辨士吾欲問之天下兵興於今六歲人皆務武斯焉誰嗣已長逝者遺文散失方阻絶者不見近作盡篋中所有總編次之命曰篋中集且欲傳之親故冀其不亡於今凡七人詩二十二首時乾元三年也乙未中詔吳興張公為元武縣大夫公舊友河東柳潛夫裴季安扶風竇伯明趙郡李長源河南元次山將辭宴言悉以言贈上有勸仁惠恤勞苦之風下有惜離異戒行役之論元子聞之中有所指國家將日極太寧垂休八荒故自近年兵出滇外訂者或曰西南少疲是以天子特有命也將天之命斯未易然於戲蜀之遺民化於秦漢純古之道其由未知無置此焉姑取廢也如德以涵灌義以封植其教遲遠其人迎喁至乎不可固未必也則曰保仁以敦養流惠以懷恤知其所勞示其所安無以醜之當可然也潛夫聞之中興不樂歎曰吾嘗與朋友有四方之異不甚感人如今之心多問其故對曰嗟嗟子能有是言也吾故感焉行有規矣多無曰我四十於此無曰我時祿位下哉公乃復曰當不失於二公之意為異年觀會之方也已敢戒行役敢自清慎終不貽朋友之憂何如於是醉歌中堂極樂而已諸公有贈遞相編次乾元初漫叟浪家於瀼溪之濱以耕釣自全而已九江之人未相喜愛其意似懼叟衣食之不足耳叟亦不促促而從之有王及者異夫鄉人焉以文學相求不以羈旅見懼以相安為意不以可否自擇及於叟也如是之多叟在舂陵及能相從遊歲餘而去將行規之曰叟愛及者也無惑叟言及方壯可強藝業勿以遊方為意人生若不能師表朝廷即當老死山谷彼區區於財貨之末局局於權勢之門縱得鍾鼎亦胡顏受納行矣自愛耿容州歡於叟者及到容州為叟謝主人聞幕府野次久矣正宜收擇謀夫引信才士有如及也能收引乎二三子賦送遠之什以系此云吾於九疑之下賞愛泉石今幾三年能扁舟數千里來遊者獨雲陽談子談子文學隱名山野隱身雲陽之阿世如君何牧犢愛雲陽之宰峻公不出南嶽三十年今得雲陽一峯談子又在焉彼真可家之者邪子去為吾謀於牧犢近峻公有泉石老樹壽藤縈垂水可灌田一區火可燒種菽粟近泉可為十數間茅舍所詣才通小船吾則往而家矣此邦舜祠之奇怪陽華之殊異潓泉之勝絶見峻公與牧犢當一一説之松竹滿庭水石滿堂石魚負樽鳧舫運觴醉送談子歸於雲陽漫叟元次山序昔元次山與韓方源別於商餘約不終歲復相見於此山忽八年於今始復相見悲歡之至言可極邪次山與方源昔年俱頤於山谷有終焉之意今方源得如其心次山汙在冠冕次山一顧方源再三慙羞時復飲酒求其安我今方源欲安家肥陽次山方理兵九江相醉相辭不必如昔年之約此情豈易然者邪乙未之前次山有元子乙未之後次山有猗玗子戊戌中次山有浪説悉贈方源庶方源見次山之意癸卯歲京兆王契佐卿年四十六河南元結次山年四十五時次山頃日浪遊吳中佐卿頃日去西蜀對酒欲別此情易邪在少年時握手笑別雖遠不恨以天下無事志氣猶壯今與佐卿年近五十又逢戰爭未息相去萬里欲強笑別其可得乎與佐卿去者有清河崔異與次山住者有彭城劉灣相醉相留幾日江畔主人鄂州刺史韋延安令四座作詩命余為序以送遠云漫叟年將五十與時不合垂三十年愛惡之聲紛紛人間博陵崔曼惑叟所為遊而辨之數月未去會潭州都督張正言薦曼為蜀邑長將行叟謂曰叟異時乃山林一病民耳宜不相罔行矣勿惑吾子有才業且明辨又方年少必能樹勳庸垂名聲若求先達賢異能相抆拭正在張公張公往年在西域主人能用其一言遂開境千里威振絶域寵榮當世公往在淮南逡巡指麾萬夫風從遭逢猜疑弛而不為今海內兵革未息張公必為時用吾子勉之所相規者宜緩步富貴從容謀畫少節酒平氣概耳
