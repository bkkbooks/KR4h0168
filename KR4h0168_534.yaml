front:
  text: 全唐文欽定全唐文卷五百三十四李觀三
  hash: sha256:3f7eff2406853e2402cb575baa9c8a9691a8e36067d72c24c6c2ddf0c23801a4
body:
  text: 觀江東一布衣耳客遊長安五年以文藝求容而無特達之操籍甚之名固不當以干王侯大人言天下之事也然竊聞閣下光大含宏博采兼覽隤然淵乎焯爍今古言仁義則天下莫不宗之道權謀則天下莫不先之若禮智忠信溫良易簡之德天下莫不稱焉誠哉閣下生人之傑者也若閣下憂國忘家安人君宏道遺物與時不爭則天下一人而已誠哉閣下戴盛名負盛德者也然閣下于藩之事則既聞之矣來朝之事則如何哉陳何利宜以補天下進何計謀以光朝廷閣下此來其有意乎不然何人望之不淺也今天下不為不安矣朝廷不為不盛矣君臣不為不和矣運命不為不樂矣是知將諫者難其説將計者難其詞自非方伯元侯及三公純仁碩德之臣從容對揚終朝移時則何能發其深慮規其長圖於人君哉今天下所務所勞所費者在邊在兵在食也為憂也為患也弗可弗慮思之於危則無所及巳知謀始固終斯為時也且夫守邊要在乎兵所以養兵要在乎財所以生財要在乎民所以養民要在乎政然則政為民之命民為財之資則財為兵之府兵為邊之守其相藉如此之大也其可忽邪閣下之至以來亦常與人君語及此乎不可不思也何者以閣下方鎮大臣入覲於王上下勤望思有所助也今則罔聞即以已乎伏惟閣下慮之且今軍食重務安危至道君臣計謀天下性命惟居大官享大祿之臣所得共之也閣下豈不謀哉夫貧賤固陋之士尚日夜齊咨思有所計則閣下去就豈容易哉今砥寧東方屬在閣下朝廷去就則已明矣伏惟閣下必有所計而後已也孰敢不幸觀方欲進謁旌麾申露心款厥路無由日懼未察輒先以短書藉以為便若有可嘉庶垂引遇企踵窮居伏俟還命觀辭違盛德曠阻拜跪自始及今三改其時方寸之心戴慕何窮但以久寓之身無所取資故或丏於北或遊於南秋夏逍遙途極還東業不增舊文不加新將往拜見愧無所容終乃因循懼日至疏執事方擅名於時出入兩宮上悅對問外內公卿無疑議無間言斯乃前漢賈誼王褒之徒弗及也豈復能思觀之在天下竊竊哉然觀嘗以未成名前高見揄揚遠邇之人以觀為執事門生然作公門生當人此言豈曰易乎豈曰蕩乎誠敢望耶誠不敢望耶然每思念士有勝己者而上薦之執事以恃知德之深也常用為心今有孟郊者有崔宏禮者俱在舉場靜而無徒各以纍舉可嗟甚焉孟之詩五言高處在古無二其有平處下顧兩謝崔之文鴻健宏深度中文質言之他時必得老成言之今日粲然出倫執事導之輩流於觀日深矣故得言今輒以二子之文布之下風執事豈以為黨乎蓋良匠之明有所無由而見者二子之美有所無從而求者蓋以慕舉爾所知遺其友之言慕之多以至不量力也其孟子之文奇其行貞其崔子為文如適所陳為行則磊落不常俱非苟取是之人也特惟哲匠執而匠之引而塗之未若觀之愚也嘗望處分維摩詰贊初若不安應命乃遲方今勵精上或可觀豫嘗聞周穆王八駿之説乃今獲覽厥圖雄凌趫騰彪虎文螭之流與今馬高絶懸異矣其名盜驪蜚黃騕裊白羲之屬也視矯首則若排雲視舉足則若乘風有待馭之狀有矜㣥之姿若日月之所不足至若天地之所不足周軒軒然嶷嶷然言其真也實星降之精思其發也猶神扶其魄軾者如仙御者如夢將變化何別哉世説周穆王駕八駿日會王母於瑤池從㣥仙而遊按山海經云崑崙山去中國三萬里乃非虛説也而不知其所從得之厥神是生為之用歟何古無其匹歟圖之首有禇公遂良題云秦漢傳之降於梁隋至於皇唐不泯厥迹卓爾昭然奇哉信乎苟今考之於古則人大笑矣求之於時則曠世矣由是知物有同者不必良有異者不必否或慮觀之者昧故為序以表焉觀聞國朝置觀察判官故事於今之老成人則曰邇乎哉乃本而言之厥自兵興上憂天下列郡無綱紀文章是用命忠臣登車為觀察使而鎮撫其民人今來亦三紀於茲古者所謂出連城守今則大者或十數城或七八城小者或四五城觀其所以察其所由使亂不得長使理不得渝猶川之有防猶戶之有樞其繫厚矣其臨高矣其下賓佐實有常任其大者曰觀察判官一人謀以濟美佐以成能必求賢者禮而居之無則闕如不苟其人允矣乎浙右之疆包流山川控帶六州天下之盛府也國之盈虛於是乎在太原王公廉察之七年署監察御史李公士舉為觀察判官公從事浙右十有餘年能事備乎遊章光烈灼乎簡書始從韓公多辨疑獄多釋冤囚疑似得昭糾紛得寧四方翕然籍甚於公後從王公盛德日新六州人殷姦宄易容民不淳良吏不廉清無日無之公乘軺車日往月還剖斷善惡明白可觀六州之士為頌作歌天下名賢罕不咨嗟九年冬蘇州刺史有丁憂去官連城命公來撫吳德化憸人如春之和吳人樂康嗟乎夫有其任無其事十有八九豈虛耳哉非其任有其事如公之作者百無一二焉議者以為視公之為佐可謂忠於佐矣視公之斷獄可謂敏於獄矣視公之理人可謂達於理矣諒哉有以頌連城之表賢有以見吳人之多幸有以見李公之攸宜矣從姪觀拜命而書愧為公羞九年十一月十四日記常州列郡也天下有緊我居其一焉軍事亟務也天下有三我備其屬焉於是求厥人任厥事觀厥能不亦難乎則汝南袁德師今在選焉夫三軍稱帥萬夫之望誠不若也其於輯睦亦何二焉夫大臣開幕多士委質誠不若也其於裨補亦何二焉袁生恢恢然晢晢然寬而有紀明而無鄰行飾以貞言飾以溫始韋公以給事匪躬之故出釐是邦生方尉於義興裦然見嘉乃殊常寮軍事之機議之堂上軍事之宜開之府中誠舊制也韋公答其人以禮盛其居以華揚其智以文美焉哉韋公遇生以善生報韋公以誠某嘗聞生南陽公之孫也夫維嵩之於天下非常之山也黃河之於地中非常之川也南陽之於時非常之人也嵩以喬天蓋之河以流地載之南陽大忠以子孫嗣之六年冬皇帝郊昊天理百神修廢繼絶求舊惟新生以尋南陽之孫一命茲官九年冬復命襲爵南陽公某以為古人曰賞延於世又曰善人雖十世猶將宥之其是之謂也是年十一月某赴京師自蘇州至常州會袁生引廳前軒如翬斯飛植竹新欄如鳳斯食乃白府公留為記韋公歡然不見逆且自天下稱兵三四十年間擁旄曰使持節曰州使曰節度曰團練有副使判官大歷中宰臣常公以為費不能去其大而去其細乃罷團練今之軍判官猶是也命某記書其事實始於今請以生之官氏冠乎將來非以媚生也願以光乎非常之人之後也記之年月在乎記中新定劉法師大漢之遐裔也老氏間氣性識沖厚體貌魁岸弱齡味道雄節邁古淮海勝景無不綿歷內蘊研精茹术歷載三紀雖形存方內而神泊太素天機不淺積學所運也可與董奉抵掌葛洪拍肩先生以至德三載束身制度配住茲觀巋然端居煙霞排空松桂滿目抗出塵之想秉超世之操無何大歷之初緑林狂寇作禍斯邑居人萬戶冰裂瓦解暴骸骨於郊野注膏血於邱壑桃源化為戰地羽客倏以蓬轉先生乃披霓裳闕一字丹訣將適南嶽途經鄱陽先相國第五琦時左遷鄱陽守其人廊廟之柱石帝王之股肱波澄萬頃壁立千仞先生於是植杖以請謁一見而斂衽再見而倒屣忘言相契志意偶合於時先生法播南楚聲動人㣥故江西連帥路嗣恭其人寥廓之徑翮銛鋼之利器忠信亞前史文武表前代雖受年不永可與三傑並騖復雅重黃老尊崇虛無始聞先生望風委質先詢以簡禮後聘以車乘服門人之禮約方外之遊如是未幾路公歸朝先生汛若不繫之舟亦厭凡境大歷十三年旋此舊迹未盈數歲陵谷殊狀親戚耆宿淪喪略盡所止堂宇荊棘生焉閴其儀像埃塵磨滅寒葉墜於灌木山鬼聚於叢薄先生頓足而四顧攬涕而興歎惜馳光於過隙念往事於餘燼乃假村閭丁壯戮力芟翦板築頽址掃除崩榛構長廡以梓漆飾危殿以赬素激引元旨招攜道流先生乃於其觀西南隅獨立高堂智者與議良工操斤憑山建基鑿石開戶墾磽確以植靈苗撥崢嶸以樹修竹苔駮竹徑風吟步虛巖生夏雲林散秋色先生方據梧長嘯煮茗留客且我所貴者隱隱所貴者道道以隱而含耀隱以道而無悶玩是幽處得非仙府不必瀛洲方丈乃為絶境先生自然以得真依真以養生瀟灑無事機恬淡無戚容高談能離堅放意能了空噫嚱老莊之微言先生決之如叩鐘人間榮位與多財先生視之如浮雲是以天子不得臣諸侯不得友或所與遇者其唯縱古之士遁俗之人在乎昔元宗之有天下得道之統垂五十載億庶輯睦四夷亦寧自後國家多故皇帝旰食二教稍弭兵符競趨深慮是法不可振茲二教者三界之根柢㣥生之雨露使匹夫取捨亦有損益用之於上其可廢乎竊悲大塊勞我以聲色要我以名利未果握先生之手登先生之堂然不死之術願與共有臨壁抽思以旌善人某年月日記朗寧郡王張公擁七尺之節臨三州之師牧我邠荒藩我雍疆德邁乎龔黃聲稱乎四鄰戎無南侵國無西憂師嚴民釐封守晏如聖上聞之曷嘗不負扆而咨之因乃寵以彤弓嘉以墨書乃慰乃止曷日而無哉於是仗鉞總戎之臣咸望公而歡懼無能稱於維朗寧之卒已仗誠而言曰獲拜錫之光聖上之寵崇朗寧足以勵不戮力之臣然斯事也君臣之殊尤敢不述之而已焉哉越春王二月河澌未流東風始湊優柔委蛇被公軍容公曩奉詔親率師備胡乘虛君命未復不自議還雖閫外得專亦大有所不專也於是軍吏之職事者進復於戲下曰舊以是月賞功息勤惠老及疾哀死及孤厥死無怨厥生而愈所以數軍實賚師徒實舊典也違之不孚公從之乃練令辰豁連城鼓於四門旆於四墉日既登塵不騰窮陰閉淑氣升軍聲歡康儲輿靁硠翕乎萬民湊乎氐羌空山之木春近塞之草芳朗寧乃鳩文武之吏列而為行東面向闕而再拜如蒙上之命命之然後申號而惠周升堂而澤溥賁育之倫列於軍之宇校師之士次於軍之堂進如風行坐如雲屯旌旗蔽日刀戟交光公於是衆食而食衆安而安士盡感之優用醉飽而御酒肴是日饗軍無樂無亂音右金鼓左羽旄所以奮武之烈壯軍之容其餘管磬之歡絃匏之繁罔不合奏節諧雅音俾三軍之士毅其氣和其心㣥羌之長釋我俘歸我侵少壯重鋭老疾謳吟祲化為祥虜趨為擒洪矣偉矣朗寧之理明德遐被者乎乃知夫致饗者不止乎味張樂者不止乎聲仁可以碩其膚和可以齊其情故朗寧之饗士兼以仁和被之豈以羶腥猗之哉武有七德朗寧其由二三焉於時歲紀協洽國家郊祀之明年觀布衣來遊賓公之筵宗盟兄侍御史益有文行忠信而從朗寧之軍惡㣥小之日取媚也故不自書命觀書之曰子之文直長於記事益知之乃題曰邠寧節度饗軍記觀讀漢史見景帝殺御史大夫朝錯以姑息吳王濞痛非其罪也故直筆以議按錯潁川人起於諸生事文帝為太常掌故以英詞射策纍擢為中大夫及景帝即位極言獻替未嘗不忠於心乃命副丞相錯所以推心不顧思永漢室而患諸侯侈大上書請削其土是用翦其葉而固其本也度錯之志豈有負漢哉原吳濞之反誠有由然間人骨肉而塞小忿自非上達能不生怨怨端既立臣節安附欲無為逆終不可得已蓋以南方富殖而諸夏初乂狂夫為計料勝一舉遂搖長舌交搆七國借誅錯為名景帝無非常之見而聽亂臣一説乃斬錯不問冀在紓難而七國之兵曾不少減足以察其來不為錯明矣且袁盎與錯宿不相善况景帝豈不知二臣之不叶而聽偏議是為臣報隙也若宗社何及鄧公吳還乃歔欷長悲益為天子之羞爾始高帝封濞於吳以誡東南之必亂於時豈有錯削地之議蓋天之歷數有理亂也脫使無梁國以絶其道無條侯以耀其武則秦之鹿復駭盎之肉可食初錯介然孤立指畫高議大臣疾小臣怖人人束約各欲倳刃其父知其必戮也而深病之錯曰所以尊君上安宗廟父曰劉氏安朝氏危矣吾不忍見禍及先禍死矣噫史臣責錯之父不逮趙括母何其鄙也夫趙括持必敗之勢而母言於趙王不可使將及括失律母以先見獲宥朝錯用至忠之略與必敗之勢異也其父雖懼禍至奈其子所籌國之大事也且使括母言之足稱明婦人也使錯父言之是沮其子為忠也孰可擬議或人有復言錯忠則有矣而智不足愚則不爾夫忠所以補君智所以濟身苟圖濟身則忠有不遂忠有不遂是臣不臣亦何生為賊由袁盎昧在景帝非智之短時不與也古云直木先伐愚智何足道哉論曰客有言曰仲尼聖人也曾參孝子也十哲皆仲尼門人也察其能孝於家能忠於君能友於兄弟能信於友朋可以臨事可以成章故加其美目也而曾參雖不聞兼此數者乃其近者小者而仲尼區別四科前後十哲曾參不與者何也主人對之曰噫非仲尼於此異也四科十哲之名乃一時之言也非燕居之時門人盡在而言也於時仲尼圍於陳畏於匡曾參不在從行之中故仲尼言在左右者揚其德行言語政事文學皆可邀時之遇行己之材不得者是以美而類之傷而歎之非曾參不當此數子也使曾子於時得與數子從行則仲尼之聖不遺參之孝不後冉伯牛仲弓之目也必矣客於是稱謝而退或者止之曰客之問知其一未知其二主人對得其細未得其大且仲尼抱至聖之德值多難之代周遊棲遲不遇天下仕魯不終聘過宋伐樹之衛不用適楚逢患而四科之徒未嘗離其起居闕其絃誦不以師道窮而曰妨已之進不以身之私而越去終日溫溫孜孜提攜負荷從其行止如手足羽翼時仲尼有仁思德慮未言者顏回輒發之故謂之德行矣仲尼言有所陳未達而端木賜輒達之故謂之言語矣子路勇毅果正之士也侍仲尼而不善之道不得入焉故謂之政事矣子遊子夏之文春秋之外得與仲尼論之故謂之文學矣故數子居則講仲尼之道行役則任仲尼之事而曾參安則在焉患難則未嘗有用焉且夫孝者人性常然也不至者非人也參苟至之乃得為人矣夫何異也且十哲之徒孰有非孝乎而曾參獨以有孝之名加其數子之長故不得與之同目也何謂不在從行之中而遺之也夫孝者不止於家也事君慎其事忠其命乃孝也事師聘其道敬其事乃孝也不去危即安不冒利背誼乃孝也而參不敬其事矣不能冒義背利矣乃孝其孝矣非孝也子從儒守學宜識所言何言之介也主人拊几而起曰爾之辨則辨矣如何斯可謂攻乎異端斯害也巳世載儒訓者隴西李氏子觀正詞為潔執潔為奠恪以上薦桓撥之十有三祀孟秋之月朔修冕帶問廟而入再拜兩柱之下乃退伏而稱曰於皇夫子之道之德與天地同施與日月並明乃聖乃神炳乎典謨惟王者得之以事神使民庶人得之以不失其死生諸侯得之以事天子卿大夫得之以保祿位怨災不及其身四時得之而序行天下得之而大同然則天地神人之事昭乎夫子之道之德也至矣何小子之所竊歎焉斯嘆也其惟來學乎其惟乞靈乎曰某不敢然也且夫禮樂浹於明夫子之善道也斯可謂以學矣鬼神瞰於幽夫子之明靈也斯可謂以敬矣孰敢捨道而來學黷敬而乞靈者乎於是再拜而起徊翔而觀章施足徵像設無喧我廟俎豆我王衣冠夫子得之亦無愧言七十之徒亦公亦侯外如君臣內實討論蒸蒸小子思得其門夫子聖人天錫元精其未生也若超然神遊與兩氣俱存其既生也遇三季之會飄颻湮淪絃歌之音拊而不和仁義之圖卷而靡陳及相魯而有喜色去宋而曰桓魋其如豫何聖人之窮乃有如是也耶噫俾夫子生於堯之代堯必後舜而先夫子生於舜之代舜必先夫子而後禹聖人得時化可知也如舜禹生於夫子之年則不過守於畎畝之中安有夫子之教垂於無窮若今日之澶漫者乎惟夫子生實陪臣歿乃王爵有聖德也惟紂生實殷辟死曰獨夫有逆德也惟爵諡在德惟德有聖有逆惟聖逆在人不在於尊嗚呼夫子聖人之極歟鳳鳥不至無其時也秦人燒書文之衰也唐帝爵王德之興也惟夫子之德洎唐之德永而能安古而更新降康下民敻有烈光訖無間然小子忡忡栗栗拜奠而出匪作匪述有涇人告我曰虜侵涇州去城六十里涇軍陷圍固無藩籬脫有走飛有王將軍雖實涇師別戍而來奮少擊衆提急赴危身先其兵兵後其私張旗為風伐鼓為雷風雷之威壯哉鼓旗全涇軍如雲回破虜陳如山開然後創痛還奔戎醜殘摧將軍猶殺敵不窮駭怒疾馳遂沒於沙埃吁少卿生降蘇武老歸竇憲出師曷如將軍之亡哉主上聞之贈官汾州賞則厚矣我竊悲焉悲賞出死後用失生前天下之有用不得聞故多敗歿上之執賞死而加之利為空名繇是將軍之倫何嘗勸焉涇州之師何嘗保焉苟聖人用人一如將軍斧鉞之雄征鎮之類則將軍無僨尸涇州無陷圍亦可知矣惜昔兵微用卑以至於是焉於戲傷哉吁審厥劒在昔天地之靈器也而莫我敢知漢皇得之初其天成乎其神造乎其人為乎何乃出而逢經綸用而會大人斬白帝於澤升赤龍於雲然後安繹騷乎荒屯作之臣作之君豐雄倜儻若斯之不測耶亮惟天地革而大人用靈器化成肆能前人而謀先鬼而靈託三尺之質扶堪輿之傾非楚金工之能名天討聖作也亶乎哉夫周之衰也天子孤外臣強而不有用之者時不可匡也周之末也天下哀恫磔為七雄而不有獲之者人不足與也秦皇帝鯨鯢㣥豪噬嗑六合而不得寶之者德不足終也逮秦上瀆於神下毒於民人神興妖上下軋秦是劒將翼大人而運天下也宜其如虎貔如蛟螭或嘯在谷或飛在涯故漢皇卒然攘袂而得之於是仗之而行嚮之而威日月照臨星辰發揮楚之以負秦之以危是日月天地之靈器所以嬴項授之倒持哉後代寶之歷中興魏晉已還無德於民靈器不能久安張茂先見飛而去或以為龍於是絶矣有知言者非之曰夫人事有窮神物無方曷知非得於此失於彼漢皇所以昌齊宋梁魏所以亡也然數國者享年不長其劒亟去卻猶三代之鼎九州之險不可以昏亂而守况窮化極靈而隱見計之乎然苟以至神推之則未嘗遺於聖人矣繇是黃帝得之誅蚩尤周武得之戮殷辛漢得之而斬白蛇唐得之而革隋亂則是器也神而應用用靡王非刑刑之謂也其惟聖人而已動出乎妄靜以制之靜不可終終違其時顧道非遠妄動則遠道以處我我孰能反利往則施無庸則卷合於一致何妄能損天一地二三光飄颻無恆流行萬物則妖大化孕人人有成性動牽於妄妄亦斯競惟天之大而世作鏡下頤人心如環無端食其遊詞共叔自殘劉殲英韓楚滅子干五者實妄不妄必完妄由動生動以妄姦能以義勝動歸乎安晉文教戰一戰民悅勾踐泣讐再戰讐雪知幾不殆妄動斯折二國尚然况一夫節
