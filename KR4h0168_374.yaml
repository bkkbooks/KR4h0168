front:
  text: 全唐文欽定全唐文卷三百七十四楚賓應賢良科擢第官雷鄉令
  hash: sha256:ff4ded53eb072c49830bbda83888924bfdf0a74940084f359cd8ceb20136cb71
  markers:
  - {type: head, offset: 14, content: 杜楚賓, id: KR4h0168_NFKB_374-h1, level: 1}
body:
  text: 開元丁丑春二月朔又七日杜楚賓令雷鄉之二年雷鄉之民情事耕作其具修其種戒於茲曰乃俶載焉古者遂大夫正歲稼器修稼政三歲大比則帥其吏而興氓明其有功者屬其治地者而司稼掌巡邦野之稼而辨穜稑之種周知其民與其所宜地以為法而縣於邑閭嶺南無祁寒故二月民殷東作楚賓以牧民職得遵天子勸農詔省耕於民見耕者不休餉者不息方引以為喜取饟具嘗之烝髦士勞之忽有白鹿二縞然鮮毛昂然勁角從湖山來如將依人初不知其為何物及近視之乃鹿也一奔而踣十人使人逐之還西山乃即縣之西郊潛化為二白石夫鹿壽物也千年而白萬年而元又瑞物也一獲於敏邱再獲於槐里齊之以伯漢之以王得其一焉已為難矣況雙出乎其化為石者彷彿夢幻不知石為鹿而鹿為石意者天將假此以志皇唐盛際寖明寖昌白璧應圖厥瑞不常矧循州南方之極也上應南極為一人之壽徵下應西郊兆萬井之豐稔人文赫奕將千萬年而盛易曰密雲不雨自我西郊言陰已上也鹿亦自我西郊則陰而就陽也一氣潛化金石可格鳥獸潛形況於人乎乃命匠大刻白鹿石三字記之石之上建為亭亭之上立碑為文以誌一時奇事昔有石化為羊白鹿隨車良不誣哉庶後之君子覩此記者知民事當重不使循吏傳中專美於前云開元丁丑二月朔七日應賢良舉雷鄉令杜楚賓記良器開元時官殿中侍御史兵部員外郎夫君所以為天下重者以其寶位鼎所以為天下貴者以其神器則君得鼎以祚長鼎應君以時昌故黃帝徵大匠稽舊章異國貢物遠人來王鏟銅於雷首之下合冶於荊山之傍聲沓沓以海沸氣瞳瞳而電光乾坤於是震動日月於是昭彰歘然烟收而燼滅卓爾成功而效祥煥以雕文錯蚪龍之鱗介騰乎瑞色雜天地之元黃蓋聖人所以享帝養賢烹飪薦祉重以安國利以出否納之不以其道則君失其人聽之不以其聰則雉鳴於耳是以囊括眾彙恢模崇深苞木火於六爻之象鏤山川於九牧之金於是總百靈之異見萬國之心然美其影射金晶光飛玉鉉論者徒議其小大觀者寧識其深淺故道歸天命無勞楚子之言德自休明實賴王孫之辨爾其法剛柔之節順行藏之志乃有道則見生於汾水之陰無道則隱沒於彭城之地可以斥姦慝可以禦魑魅應時而動吉無不利故曰作者之謂聖述者之謂明何明聖之至神契陰陽之至精德表先知火不然而自沸量含光大水不汲而自盈既去故以元吉終取新而利貞則知執虛以待物者正乎位體柔而進已者宜乎亨故能應皇家之至德垂不朽之鴻名域中四大得一者王混同區宇端拱巖廊運元功而莫測故神用之無方穴處巢居時尚傳於朴畧結繩刻木化始漸於昭彰暨夫扇澆薄事征討知慧出而下有大偽忠信興而上失其道聖人以智周萬物仰觀俯考追淳化於往初發鳥迹而爰造是鑄至堅之金騁至巧之性方圓設象以迴合雕錯得宜而瑩淨其道恒其體正其君者是效故有聞於至孚王者是司故不待於嚴令詳觀其貌且橫且直文繚繞而外轉字連帛丿糸而內逼迹處泥而髣髴容因朱而翕赩迫而察之若披彩畫之圖遠而望之若散晴霞之色爾其大小咸準委曲相襲隨時而行仗義而立㣥吏則有慮其誕故合之而給天子則不責於人故司契而執借如九命作伯三朝謁帝服冠冕而去來佩印綬而有繼當司存之部領覽職事之巨細罔不典常作師圖忱之子且契之不明訟之所起契之既用人得而理豈徒中山張氏化墜鵲而初成餘不亭侯感迴龜而相似光錫忠義若斯而已亂曰古之善為道者非以明人執其左契欲使還淳故得永全太朴不斁彞倫斯亦為政之機要何止更光於搢紳朝廷兮赫曦冠劒兮逶迤惟斯履之所用得禮容之威儀綴珠綦以崇飾遵玉趾而更移其始造也佳人運思女工妙選爰斯功之始畢出閑庭之試踐眇輕步以相矜指奇文而爭衒若乃相國承寵尚書見榮歷彤階而曳響上玉殿而規行出郡標奇則簷前燕落入朝表異則雲際鳧驚運蓍絲以示儉躡瓜田而見明時行則行時止則止潔其容色固其表裏偶簪裾未以為榮踐泥沙而以為恥其義翼翼其貌邕邕曳踵則輪軌不斷接武則塵迹相重其取進也每迎前以啟路其守謙也常處下而翹容其受用也既虛中以待物其順人也亦應時而曲從是以加其絲飾廣其文繡所以表威儀光領袖宗廟祭祀非履不行揖讓周旋舍履何就易履者禮也吾謂斯文之不謬懿哉聖人之所為觸類而長緣情以施大則察乾坤之用小則稽鳥獸之儀近取諸身既制冠以象德遠取諸物亦模範而開規玉彩而晶耀鈿珠華而陸離禮容於是乎克尚首飾於是乎攸宜故柔以虛中剛而勁外惟德是輔惟仁是大綴香簪以半出垂寶纓而雙對珥白筆以孤懸總紺髮而繁會若乃九門朝啟千官奉職劒履鏘鏘旌旗翼翼趨玉階以雲聳入金門而電赩於赫朝廷其儀不忒此乃禮容之有則也爾其尊卑異制古今殊情備鶡所以貴勇加蟬所以貴清進賢表文者之號章甫尊儒者之名獬豸觸邪惡佞臣而直指夋鳥䴊崇飾光近侍以增容此又威儀之孔明也是以舉之有節施之無妄或用晦而冕旒或蔽聰而黈纊居正而不失其職得位而不愆於上每守分以自安故雖高而不亢此乃進退之惟當也客有賦之而歎曰夫檢身者禮表容者服服之不稱必近於妖祥禮之或差自階於傾覆故君子履道以遠害小人崇奢而取戮鄭臧聚鷸果貽出境之誅疏受挂門克保永終之祿則知逆理者天之所禍順常者神之所福況乎在位之庶寮可不鑒茲而敬肅瓊之歸州刺史說父元宗朝官殿中侍御史國禮在祀先王志其嚴潔神歆惟德靈鑒期於肅恭苟有孚於蘋藻固非馨於黍稷鹽人職列周官事供王祭因潤下之成用備奉上之班司屬夏禴爰臚㣥祀咸秩孚薦饗於中霤式虔誠於內饔五行之味或爽七祭之容遂闕然時有異同事有隨變至信為用誠應明心亨飪不虧何傷介福既異不供之罰難科作笞之刑講信修睦禮行於時人和年豐神降以吉屬歲陰云暮田畯至喜農事不作役車告休於是乎具器孚薦陳粢戒掌答成功於眾神設禋祀於大蜡雖既滌既灌不愆不忒日違精擇神將曷歆吁嗟是司不謹有職昔仲尼觀魯助祭興於喟然今大卜差時儐神失於禺若祝史陳信其多媿詞司存不舉坐寘恒罰水旱雩禜山川沈埋畢為雨師斗亦司命順四時之序祈萬姓之福㽬辜充祀於百物望秩備禮於四方事或闕供罪亦斯得無止風之磔狗同告朔之餼羊卜而罷郊以著春秋之失祭而廢禮宜投司寇之刑倚天寶時官侍御史內供奉遷左司員外郎御史中丞終吏部侍郎問四岳疇庸羲和代掌其任九官命職稷禹不易其能逢化久以庸一作康時藉功深而成務洎乎嬴劉以降曹馬承流罕為官以擇人直循資而就列或十旬而登三事或一日而致九遷遂開趨競之門莫守代工之美國家網羅㣥彥驅駕時英其政洽於至和其人淳於太古今欲削漢魏之遺法復堯禹之遠圖能其事者永守其官稱其職者不遷其任增秩賜爵用申勸善之規金帛璽書載表優賢之義變通之理尚或多端用捨之途佇聞良算對昔者明王之御天下也奉若天道建邦設都樹之以后王化之以師長用人勿及私昵建官惟在賢才夫難知非獨在於今日故曰知人則哲惟帝難之自生人以來有國之王莫不得賢則治失賢則亂此乃自然之義百王不能易也是知賢人君子國之所急詩曰南山有臺北山有萊樂只君子邦家之基言人君得其賢臣所以成其美化廣其基業也遐觀歷代聖王之求賢哲也義匪一途或精選以取之或降訪以得之有營之經載而始獲有求之不日而便至遲速之理雖異輔弻之職不殊黃帝勞於夢想而感力牧誠之至也唐堯務於疇咨而致夔龍訪之審也至唐虞之黜陟幽明三載考績夏禹之顧盼空谷七起成名殷宗託夢於傅巖姬文遊心於渭水此六君者可謂勤於求賢而善於用人也故能使元凱就績申甫登朝道濟五臣功宣十亂康良作誦喜起成歌人無險詖之情代有雍熙之樂由庚入咏天保為詩下懷報主之心上荷受天之祿書曰百僚師師百工惟時庶績其凝此之謂也斯並政符大道理合至公委質能臣之一德所以天工可代人爵攸宜憑久化以濟寰瀛藉深功而安宇宙暨戰國之代王道寖微各佇英賢或雜或霸楚襄勞持金之聘燕昭躬擁篲之禮空聞僭號之議未覩升平之業雖桓公之有仲父晉侯之獲趙文委任責成共登霸道唯勤鬬爭之理不務淳和之績而動乖王度舉違帝典故五尺童子恥之不論況所由齷齪何其卑也秦皇不仁虐亂是極儒生填於坑井詩書滅於烟火忠貞清白以為徒苦諂佞邪媚謂之至公卒以覆亡為後代誡實由遠賢近佞使之然也漢高祖雖不好儒然亦任用英傑登壇而禮韓信輟洗而迎酈生委蕭曹以股肱寄張陳以社稷至孝武之代儒學漸該採董仲舒之策始令郡國貢舉於是賢良方正之士霧委雲集其晁錯公孫宏匡衡蕭望之輩並繼踵而至故當文景之代號為得人詩稱濟濟多士文王以寧漢所以寧者亦士之力也光武仗吳鄧以立功任賈寇以起事拔奇取異決自於心爰至顯宗中興於茲為盛由此而兩漢之代數百年閒陟正黜邪裦善貶惡雖不襲唐虞之法亦去煩芟亂幾乎大成矣逮獻靈之際姦猾縱橫升必以財進不由道於是搢紳潔白之士疾之若讐乃曰舉秀才不知書察孝廉父別居寒素清白濁如泥高第良將怯如龜至乃懸爵而賣之列價而爭之守正道者以為陸沈由斜徑者謂之智變衣冠為之失序賢哲由是潛藏遂使社稷喪亡後嗣覆滅悲夫此伐檀所以興刺黍苗所以勞歌無他故焉賢人不得進也及乎當塗啟運典午開基陳㣥制九品之條劉毅興八損之權故曹羲疾其濶遠孫楚以為鬼錄遂令權要歸於中正威福去於天朝臧否任情品藻乖次宋齊之季梁隋之末聘士求賢罕聞稽古棟撓鼎折唯見陵夷既同自鄶之譏詎勞更僕之說聖上覽百王之得失立萬代之規模大開舉爾之科廣陳訓迪之典用與不用賢否各稱其能材與不材輪桷並當其任小人去位疾之猶若寇讎君子盈朝求之恒如不及故得百僚無濫九有昇平不聞濡翼之譏永絕爛頭之誚仲長亡越級之論賈生無調下之悲今欲遠服堯禹之蹤近棄劉曹之法增秩令其永任錫帛許其不遷使官不易能職遵代掌雖優賢之義有所會通而隨時之談或恐未可何則太古敦朴務靜人希敦朴則易淳務靜人希則易理故不勞而功可就今聖明撫運才多俗阜俗阜則事煩才多則理劇必咨明哲獨任不以避嫌但使委得其人數遷何妨化理如其用失其理久任豈補功虧愚管所窺以為如此大體期於不濫所務在於得賢苟違此途未知其可謹對諫字仲幾休寧人靈洗七世孫開元二十七年進士再選藍田尉累遷著作郎大理司直汾州巡官入為衞尉卿京兆少尹終密州刺史堯階蓂莢兮實稱休禎蓋歷代而難值至我后而斯呈植之以前墀左墄映之而鏤檻丹楹激薰風而葉轉迎太陽而心傾日往月來深符大小之數時和歷應因見天地之情觀乎榮謝以月德為常卷舒以日數成類隨初吉以增茂暄然自春度既朢以漸零翛然如寄體盈虛而方同得道任消息而匪殊有智金波桂樹遠合象於彫榮炎漢芝房近方慙於祥瑞彼朱草與萐蒲曷於茲而擬議則知聖作物覩物興由聖聖於赫而克著元亨物效祥而天莫之令然而蓂之為應也博蓂之為瑞也昭贊睿主則太平在邇測陰靈則時變不遙初也則日益一日終也則宵盡一宵弱質浹金莖之露輕姿散玉戶之飇或曰麟在郊而合圖牒鳳來儀以聽簫韶雖咸見而可貴於列迹而斯超豈如蒙賁著總集於厚地焜燿於皇朝恭敬何常少長有禮自以引以翼無失於等威左之右之動從於瞻視苟昧斯者則何以觀解式陪彼長年身居弱歲比景未聞於有德居卑且見於無儀於是捨車而徒升高自下異梁鴻之適越不覩興謠殊桓景之禳災豈能成俗既而碧空一色翠微萬里迷周流於遠眺闕咫尺以承顏梢雲之杖遂行白雪之途且默然鞭以為罰恐傷剛暴且人而無禮寧罷防閑與其居尊而肆威曷若導愚而誘暗況擊蒙垂象於周易叩脛設教於孔門徒事薄言寧容文過剖符之郡涉深故以鬬論握蘭之司雅議懲於失入子天寶時進士君德惟馨天文效靈於是廓氛霧埽青冥發彼嘉氣浮茲景星南有光而霞赤東有色而烟青合彼氣之郁郁渾此色之冥冥昭然在天明乎有德仰其狀而可嘉究其靈而莫測君有至道不閒元以韜光時無纎埃必在天而發色或出或處念茲在茲占莫知其常度出必應乎盛時所以當今夕而彰矣向青霄而仰之乘乎方色遵彼天逵泰階正其位五星守其維然後見茲星之昭燭經彼天以逶迤晴空寥寥列星炫炫紛乎二氣始若烟而非烟炯彼㣥星初乍隱而乍見並我質之惟黃總彼氣而成絢霏微類干呂之雲輝赫如繞樞之電星氣合會光華動搖二氣之色交至三星之狀孔昭曭朗惟明疑沐其雲露光芒振曜若擊夫天飇明麗太極遐映青昊呈貺遙對乎三台效祥何慙於五老克表王德信由元造在翼常瑞於堯年居房永叶乎舜道載美往牒今祥我邦觀茲瑞之尤異知景福之攸降當其次天關歷牛斗既應道而昭格豈越度於前後出無常處向樂土以是臨仰之彌高登靈臺而可偶是知景星之為德也必得瑞一時光九有乃傳芳而永久
