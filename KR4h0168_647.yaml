body:
  text: 臣伏奉庚寅之詔曰天子以樂為御其義則那臣以為引重任者無御不可播盛德者非樂而何蟠乎地而際乎天周流既超於馬力發乎邇而應乎遠馳聲亦倍於鑾和喻之為至此實居多大道既移則舞行象成於覆載小戎或駕則琴音決勝於騶歌故聖王取彼歡然喻諸沃若制其節奏戒乎行作聽祈招之什冀絶迹於奔車賦盤遊之詞俾慮危於朽索是以南薰馳而虞德盛北里騁而殷道惡控海內當並騖於勳華執人柄豈爭功於良樂斯御也動無險阻發自和平周旋罔害歡愛則行止之而優遊靈府推之而浹洽寰瀛非勞轅軛但布莖英陋乎足迹運以精誠爾或馳驅難期於無災無害我之步驟乃在於大鳴小鳴故曰得禽而詭遇不如率獸以仁聲且跋涉者疲於山川條暢者格乎穹昊慕入律而百蠻鹿君至錫有功而諸侯軌道豈出戶庭非專擊考乘六氣之辨哂六轡之徒施鼓八風而行知八駿之非寶於是屏造父命后夔或無聲而至矣或先進以道之豈獨周域中而利其銜策亦將肥天下而淪乎膚肌若此則宇宙蓋由乎一馬牽制盡在於四維雖質文更變而公共操持莫不得之者昌失之者損俗化清而鞭撲廢和順積而車書混故臣稹前跪而言曰引重任者御為之先播盛德者樂為之本伏惟皇帝陛下推是心而居其奧臣徒欲貢所聞而安敢窺其閫珠以編次歌有繼聲美綿綿而不絶狀纍纍以相成偏佳朗暢屢比圓明度雕梁而暗繞誤綴網之頻驚響象而然非謂結之以繩約氣至則爾故可貫之以精誠原夫以節為珠以聲為緯漸杳杳而無極以多多而益貴悠揚緑水訝合浦之同歸繚繞青霄環五星之一氣望明月而宛轉感潛鮫之歔欷若非象照乘之珍安能忘在齊之味其始也長言邐迤度曲纏綿吟斷章而離離若間引妙囀而一一皆圓小大雖倫離朱視之而不見唱和相續師乙美之而謂連當其拂樹彌長凌風乍直意出彈者與高音而臻極及夫屬思漸繁因聲屢有想無脛者隨促節而奔走以洞徹為精英比瑕疵於能否次第其韻且殷勤於士衡之文上下其音謂低昂於遊女之手窈窕遠矣徘徊繹如髣佛成象玲瓏構虛頻寄詞於章句之末願連光於咳唾之餘清而且圓直而不散方同纍丸之重疊豈比沉泉之撩亂懼無知者初憫默於暗投善則返之乃因循於舊貫美清泠而發越憶輝光之璀璨始終雖異細大靡殊中規矩於圓折成條貫以縈紆似是而非賦湛露則方驚綴冕有聲無實歌芳樹而空想垂珠美惡難掩前後不踰亦比掄材而至者豈獨善歌之謂乎天子之鎮圭十有二寸其長義在撫十有二州之域而為億兆之王圭比德焉所以表特達之美鎮大名也有以示彈壓之強以之徵守則有土之臣至以之恤患則受災之地康當寧無為於南面朝日有事於東方會百辟而執之班五瑞於來者作山龍之端表我則清光皎然雜蒲穀以成行爾則鞠躬如也想夫彤闈乍曉碧砌生寒當玉座而高居狀中峯之冠瑤岫透爐煙而迥出意秋月之壓雲端是以聖后矜持庶寮瞻重安八荒於度內故捧必當心握萬務於掌中故大不盈拱映冕旒則璿樞星綴間黼黻而瓊枝花擁豈獨使威儀可觀亦以明社稷有奉美哉聖人之制器也靡不有類鋭上以象天方下而法地備采章以盡飾瑑崇高而定位夫衆色不可以雜施依方面之正者惟五㣥山不可以咸寫選域中之大者有四盡舉凡而得一故相傳而莫二義存敬慎道在底綏詳觀組約足辨操持俾經制之不亂若繅藉之相維况國家備物繼周垂衣體舜自天有命非因桐葉而封唐提象握機故配土行而執鎮豈惟傳歷代之瑞寶抑亦彰受命之符信者也重曰圭鋭也睿作思而百志靈鎮安也安於道而萬物寧亦嘗三復斯名矣所以表道德之惟馨若此則君為道之本器乃道之形苟能據於道而依於德亦可以執無名之璞而逍遙乎大庭大司馬以馳射而選才衆君子皆注目而觀藝至張侯之所乃執弓而誓誓曰今皇帝製羽舞以敷文德擇材官而奮武衛兼以超乘者為雄不惟中鵠者得祭用先才捷志亦和平以多馬為能故以馬為試以得鹿為美故以鹿為正豈獨武人之利實惟君子之爭射者皆曰諾雖五善之未習庶一舉而有成於是馬逸騤騤士勇伾伾蓄鋭氣候歌詩初聽采蘋之章共調白羽次逞穿楊之妙忽縱青絲旁瞻突過咸懼發遲冀驥足之展矣翻猿臂而射之揮弓電掣激矢風追方當耦象決裂麗龜砉爾摧班示偏工於小者安然飛鞚故無憂於殆而信候蹄之不爽則舍拔之無遺故司射舉旌以效勝曰爾能克備我爵可期賈餘勇者宜乘破竹之勢善量力者當引負薪之辭由是靡不爭先莫肯為後皆曰措柸於肘十得其九忝明試者亦何嘗而不有破的之術萬不失一凡獻藝者豈自疑於無必衝冠髮怒揚鞭氣逸引滿雷砰騰凌飇疾皆窮百中之妙盡由一札而出乃知來者之藝蓋亦前人之匹若此則蹲甲壯基揚觶觀孔信一場之獨擅終六轡之未總豈比乎浮雲迥度開月影而彎環驟雨橫飛挾星精而搖動雖當至理不忘庸功天子垂衣儼鵷行於北闕夏官司馬閲騎從於南宮貢士之程職思其舉會款塞五方之俗觀校埒百夫之禦得雋為雄唯能是與星郎草奏上獻拱辰之防天驕解顏喜見射雕之侶客獨顧之而笑曰此蓋有司之拔萃固非吾君之右汝我有筆陳與詞鋒可以偃干戈而息戎旅司文者聞之而驚曰爾其自礪於爾躬吾將獻爾於王所臣奉某日詔書曰惟元祀月正之三日將有事於南郊直端門而未出天錫豫以靈瑞是何祥而何吉臣拜稽首敢言其實陛下乘五位而出震迎五帝而郊天五方騰其粹氣故雲五色以相宣控壇乍直捧日初圓獸蹲而龍鱗熠熠鳥跂而鳳翼翩翩羽蓋凝而軒皇暫駐風馬駕而王母欲前影帶旗常疑錯繡之遙動昭章文物比摛錦之相連觀之者無小無大謂之曰若煙非煙昔者卿雲作歌於虞舜白雲著詞於漢武皆跂望而為言非仰觀而遂覩今陛下德至天地恩覃草莽當翠輦黃屋之方行見金枝玉葉之可數陋泰山之觸石方出鄙高唐之舉袂如舞昭布於公侯卿士莫不稱萬嵗者三並美於麟鳳龜龍可以與四靈而五於是載筆氏書百辟之詞曰郁郁紛紛慶霄之雲古有堯舜幸得以為君象胥氏譯四夷之歌曰煒煒煌煌天子之祥唐有神聖莫敢不來王帝用愀然曰豫何力澤未周於四海雲胡為而五色來爾㣥后舉爾衆職因五行以修五事由五常以厚五德正五刑以去五虐繁五稼以除五賊苟順夫人理之父子君臣安知夫雲物之赤黃蒼黑進我輦路就我陶匏雖有光華之萬狀不若豐穰於四郊凡百庶寮相趨而顧稍疑江上之綺果異封中之素補天者雖欲抑之而不出吞筆者安可寢之而無賦越明日臣稹詠霈澤於雞竿之前覩斯雲散之為五采之湛露敕范傳式御史府多以法律見徵苟覆視之不明於薄責而何逭傳式在先朝時嘗為監察御史會孫革以毀牧競田之獄來上朝廷意其未具復命傳式理之不能精求盡以前却使岐人衆來告我職爾之由須示薄懲用明失實嗟乎長人之吏信在言前當革非心無因故態過而不改寧罔後艱敕王炅等乃祖乃父勤勞邦家佐吾先臣相國捍患摧凶世為勳籍故吾聞成德諸將心猶悚然爾等初喪元戎能以衆整送迎新舊之際不無夙夜之勞言念功庸宜升秩序闕二字憲署命之崇班特示加恩匪用彞典敕高端等周官嵗終則稽其醫事以制其食斯亦賞勞之典也爾等皆執藝術待詔公車和六飲六膳以會其時察五色五聲以知其變朕嘗因苦口必念沃心每思藥石之臣咸聽肺肝之語凡百多士無以美疢愛豫因爾厥官用警有位敕李昆日者王承元以成德喪師之狀來告爾實將之能使承元之意上通朝廷之澤下究昆有力焉將議獎勞是宜遷秩郡丞憲吏用表兼榮敕劉頗朕以自鄜而北夷夏雜居號為難理乃詔執事求才以綏懷控壓之者皆曰頗在茲選且言其伐蔡之役常參謀於懷汝之師部分弛張允協軍政遂命試領銀州郡事衆庶寧附邊人宜之連帥以聞議請甄獎河西近邊擇吏惟精勿吝牛刀為我烹割敕王迪為吏不廉受賄六千餘萬據其贓罪合置重條言事者以為伐蔡之時陷其家屬適遭蜂蠆並為鯨鯢尚念爾於茲當從末減議遷郡佐無忘悛心可守永州司馬員外置同正員仍所在驛發遣敕執千牛刀以侍奉吾左右者命子弟之選也莊憲皇后姪王悅等或勳戚蔭餘或公卿貴允佩觿有趨蹌之美釋褐參侍從之榮勉奉我朝廷之儀敬順爾父兄之教可依前件敕三品子崔適等左右備身在吾旒扆之側非貴遊子弟之可親信者不在選中爾等閥閲甚崇教誨斯至事我猶事父畏法猶畏師勿惰勿佻以期無誨斯可與成人並行於朝廷矣敕姚文壽出入中外備嘗劇職靜以自勝高而益謙先皇帝以其忠願謹信知書有文每決務宮中付以密命巳事而復終無漏言朕方藉良能奪其情禮起自哀疚命為監臨和而有常威而不侮修身處衆兩得其宜憂服既除庸功可獎崇階厚秩兼以命之無忘慎修用副毗倚敕徐智岌邠之地后稷公劉之所理也俗饒稼穡土宜六擾內扞郊圻外攘夷狄故吾特命禮樂詩書之上將俾為長城立監臨戎亦慎茲選以爾自更事任巳著公方端介而不失人心謙和而能宣朕命寵以將軍之號仍加內省之榮復職舊藩勉終前效敕天子有內諸臣所以參侍奉備傳達而將外諸臣之復也其或久更事任績效甄明者必擇其良能而分命焉元從興元朝議郎行內侍邵常政等或扈從於艱難之際或服勤著廉善之名宜序班資用優階秩夫奠東司而臨象教爾無忘於肅清將成命以察戎行爾無忘於畏慎正闈闥以親賓客爾無忘於敬恭行是三者可以長守其祿位而不離於榮近矣各揚爾職稱朕意焉可依前件敕近制選內臣之善於其職者監視諸鎮蓋所以將我腹心之命達於爪牙之士也宣義郎行內侍宋常春等皆以謹信多才得參侍從更掌上府尢見吏能守官無毫髮之暇勵巳有氷霜之操迹其聲實可備監臨汝其往哉豫用訓爾夫處衆莫若順犯衆則不安約身莫若廉奉身則不足推是兩者引而伸之然後入可以近天子之光出可以護將軍之旅矣罔或失墜以貽後艱勉當柱國之榮無忘立表之誓全實可宣德郎行內侍省宮闈局令員外置同正員常春可徵仕郎內侍省內僕局令員外置同正員敕慎能至王姪大公則等洲東之國知義之道與華夏同風者爾輩是也冒越深阻和會於庭豫嘉乃誠命以崇秩用奮威衛保爾恩榮無怠無違永作藩服敕大定順王姪大多英等我十有二衛將軍以率其屬皆匡備左右為吾近臣自非勳庸不以輕授以汝各贄琛賮勞於梯航俾耀遠人宜示恩寵歸撫爾類知吾勸來門下朕聞君法天大臣體君命數名等威上下以兩昔漢丞相金印紫綬黃扉黑轓亦所以異車服於百辟也今朕宰相階級不稱甚無謂焉既當行慶之恩宜用加崇之典守門下侍郎同中書門下平章事賜紫金魚袋令狐楚端慎嚴恪夙夜在公按度懸衡守而不失守中書侍郎同中書門下平章事賜紫金魚袋蕭俯深敏敬恭寤寐思理伏蒲焚藳知無不為守中書侍郎同中書門下平章事賜紫金魚袋段文昌坦易堅白風雨有常推賢舉能如恐不及咨汝三后弼子一人汝為股肱耳目以賚子豫敷心腹腎腸以告汝汝其一乃志以奉上周乃惠以接下敬乃事以臨官是三者孫叔敖嘗用之於楚矣位愈高而愈戴祿愈厚而人愈懷夫以朕之不敏不明尚克用濟實賴吾二三臣朝夕之誨詩云無言不酬無德不報爰因進等之詔用申交警之詞各竭乃誠同底於道康天下平泰階而後越級之賜行焉茲謂敘常非以為報楚可太中大夫俯可朝議大夫文昌可中散大夫餘各如故某等越正月惟朕憲考集大命於朕躬宅憂昏逾罔克攸濟惟爾俯屢贊大儀以詔豫一人惟爾文昌作策度以道揚末命俾小子審訓弗違時乃之休王功曰勳茲用報汝尚克納誨毋忘協心銘於太常永作元輔門下列爵惟五所以褒有德也朝議大夫守門下侍郎同中書門下平章事上騎都尉襲徐國公賜紫金魚袋蕭俯等外撫四夷內順百度同德比義以堯舜之道事豫厥惟懋哉遂行益地之詔俯乃讓封於弟亦協推恩開國承家永綏厥後惟克恭敬以和神人某官李逢吉是朕皇子時侍讀也忠孝之訓何嘗忘之惟祕洎瓘實為藩臣克壯威猷用以垣翰楊造等祗事內外夙夜惟寅並沐前恩遞升榮級上下有等式示彞章門下朕聞有天下者道德仁義以為理城郭溝池以為固故曰不教人戰是謂棄之有備無患可以應卒此先王驅攘戎狄保障黎元之大略也五原居有夏靈慶之中當蛇豕豺狼之突將扼咽喉之要爰命腹心之臣厥有成功宜膺茂典邠寧慶等州節度觀察處置等使金紫光祿大夫檢校司空兼邠州刺史上柱國武威郡開國公李光顏氣敵三軍心師百行有卞莊之勇守之以仁有日磾之誠濟之以武叱吒則風雲回合間宴則樽俎周旋蓋文武之令才真古今之良將是以淮蔡之役百勝功高青齊之師一面居最朕以蕭關尚警馬嶺猶虞五餌之詐可羞百雉之城爰度先是屬役每難其人惟爾良能果諧豫願程功而不於素訖事而不勞於人比命有司褒乃實力僉曰古諸侯勳德優盛則就加特進以寵之我國家封植崇重有朝請一字以異之子嘉乃勤兼用兩者茲謂上賞爾惟欽哉可特進餘如故門下階陛所以升堂奧也歷清貫者亦由是而登進焉國朝由散官而命為大夫者凡十一等以銀青朝散為名者非我特制則不克授蓋門戶有棨戟之榮腰佩有龜緺之異也朝議郎守中書舍人王仲舒等或歷職清近代豫格言或分命藩方宣我程品或懸車以請老或持節以臨人或親或能或勞或久皆承霈澤之慶宜當並命之榮凡爾四十有三人各服我休命並朝散大夫餘如故粵若十有二勳以馭親賢以詔勞舊以稽秩序以行慶賜而刑部尚書兼司農卿郭釗實我元舅寅亮朕躬傅師洎肇共司子言發揚書命倰二教官長財善物證居環尹夜警晝巡堪致厥政時惟舊老高陽而下五十有六人分命內外祗勤於理越二月發大號於天下延寵庶官錫爾崇勳無替嘉命某乙等古人以朝散大夫為榮是以自矜於歌詠况今由是級者則服色驟加誠足貴矣儒衡等皆吾內外之臣並在賢能之選頃因慶澤第許崇階朕不食言勉當嘉命某官某乙階之設二十有九有庸有事有敘有加用是四者以詔百吏由郾而上至於元略曰加曰敘進而下至於景曰事曰庸光我侍從之臣且優致政之老詔賢詔德於是乎在堂奧益近爾其敬之門下寧遠將軍兼左金吾衛大將軍御史大夫充左街使賜紫金魚袋胡證等近古赦天下則勳秩階爵因緣而行亦欲與卿大夫同美利也爾等率其屬部分義甚明皆吾勞臣是有恩獎益進榮級宜其允恭某等能執干戈討定逋孽功懋懋賞厥惟舊哉分命庶官秩建五等次用於十有二勳式示等威蓋以勞之小大為上下也門下劍南西川節度使下準制敘勳將士朝議大夫試太子家令上護軍史憲等蜀形勝之地也南控蠻蛋西扼戎羌厲禁之勞實賴汝三千八百六十有六人之力使之必報並賜崇勳各懋乃誠勗率以敬可結前件敕古者天子設六宮以詔內理是以關睢樂得淑女憂在進賢將聽雞鳴之詩豈惟魚貫之序鄭氏山東令族海內良家每師班女之文嘗慕樊姬之德桃姿焜耀蘭行馨香爰用擇才冀無傷善勉當選進之重無忘和平之心門下長女等抱子弄孫之榮貴賤之大情也朕以四海奉皇太后於南宮問安之時諸女侍側螽斯之慶上慰慈顏鳲鳩之仁內懷均養雖穠華尚少出閣未期而湯沐先施分封有據宜加美號以表令儀可依前件主者施行敕故成德軍節度鎮冀深趙等州觀察處置等使金紫光祿大夫檢校尚書左僕射贈侍中王承宗母燕國太夫人吳氏魯文在手燕夢徵蘭道以匡夫仁而訓子教日磾竭誠之操義必資忠戒陳嬰自大之心明於處順是以承宗辭代之際承元領務之初或輟哭以據牀每形言於憂國人知趣向道實光明宜受進封之恩用表貫霜之節敕夫尊於朝婦貴於室由古道也安有邦君之妻而無湯沐之地乎涼國公李訴妻韋氏德宗皇帝之外孫也笄年事訴克有令儀天蔭雖高猶執婦道持其門戶使訴有姻族之和奉其蘋蘩使訴有蒸嘗之潔訴當分閫之際終無內顧之憂者由此婦也今訴積行纍功以致爵位六遷重鎮名列上台而韋氏猶彞章未嘗開國甚不稱也因訴大名之邦式建小君之號可封魏國夫人門下朕聞昔者明王之以孝理天下也莫不因嚴以教敬推類以明恩朕以眇身欽承大寶為億兆人之君父奉十一聖之宗祧捧烏號知㣥臣有良弓之思瞻彼蒼念㣥臣有所天之感是用仲月五日申命有司大錫追崇式彰餘慶而魏博等州節度觀察處置等使魏州大都督府長史田宏正亡父贈兵部尚書庭玠等教必以忠歿而不朽茂仲弓之德而位屈當年副孔父之恭而福流來裔惟爾宏正為朕方叔以殿大邦惟爾夷簡為朕河間李夷簡宗室宰相故云以光宗籍惟爾度為朕呂望以司專征子有勞於王家父豈忘於錫命進以師長之贈加之保傅之尊咨爾三臣告是五廟永錫忠孝賚於邦家可依前件敕朕聞水積者不涸德積者不窮肆我高祖武皇帝傳序纍聖逮豫沖人嗣守朝廷之常不克是懼而侯甸藩服亦克用乂誠賴吾邦伯庶君之不墜吾祖宗之典也追念本始無忘爾先永錫追榮用彰彞訓檢校司空使持節滄州刺史烏重允亡父贈工部尚書承玼等根本粹茂源流浚發載誕頗牧降生申甫或並列藩方或常參鼎鼐承我制詔備陳孝思皆曰閲禮資忠實賴先臣之教欲報之德願言克從遂命褒崇以示幽顯可依前件敕國子祭酒韓愈父贈祕書少監仲卿等子生則射桑弧蓬矢以告四方三月孩而名之十年出就外傅孔子雖欲遠於鯉也而猶教之詩禮所以相承先而重後嗣也然而免水火之災從師友之後服軒冕以為卿大夫者一族幾何人惟爾愈雄文奧學秉筆者師之與某等各用所長列官朝右榮則至矣其父皆不及焉歿而有知能不望顯揚於地下贈以崇秩慰其幽魂推吾永懷示用怛然於此可依前件敕朕嗣立之二月五日在宥天下澤被幽顯凡百執事延崇於先而守尚書左司郎中韋審規父大理卿漸等生有列爵歿有懿行積德於身慶儲於後嘉乃令子為吾望郎遂可有司之奏以錫先臣之命可依前件門下檢校司徒田宏正母贈韓國太夫人鄭氏等詩云哀哀父母生我劬勞欲報之德昊天罔極子欲養而親不待之詞也朕有臣宏正等皆社稷之臣也或寄重股肱或親連肺腑而克忠於國克孝於家歌康公念母之詩感日磾見圖而泣朕方推廣孝以闡大猷乃詔有司深惟贈典若曰幽魏并揚實鎮之大既以命於勳賢齊晉清河惟號之美何用光於窀穸永錫爾類豫何愛焉嗚呼子為列嶽之崇母用追封之禮亦可謂生榮死哀孝子事親之終也惟爾欽哉無或失墜可依前件敕㯋考叔食美而思遺其親此孝子不違於一飯也而况於萬石在前纍茵在側慰心不及非贈而何尚書吏部侍郎孔戣母贈扶風郡太君韋氏等柔以睦姻明於訓子惟嬪之禮始自敬薑擇鄰之規優於孟母慶鍾嗣子皆我藎臣祗告有司丕序先烈錫以大邑達其深誠庶無風樹之嗟且壯秋霜之節可依前件敕孝子之於事親也貧則有啜菽之歡仕則有捧檄之慶離則有陟圯之歎歿則有纍茵之悲推而言之其揆一也不有追錫何以達情檢校吏部尚書使持節襄州刺史李逢吉母贈平陽郡太夫人王氏等皆朕公卿之母也或象感台階生申及甫或氣鍾河嶽非龔則黃出入恩榮羽儀中外苟無善訓安得令人簡想徽猷用宏封邑式光子道以盛母儀可依前件敕檢校禮部尚書使持節許州刺史李遜母贈義封縣太君崔氏等昔康公貴為諸侯而念母之詞甚悲悲親之不逮也曾參仕三釜而其心甚樂樂及於親也今遜等有地千里有祿萬鍾頤指氣使無不隨順所不足者其惟風樹寒泉之思乎朕方推廣孝豈吝加恩並封啓邑之榮咸慰循陔之念可依前件敕檢校兵部尚書王潛母贈晉國大長公主於朕祖宗之姑姊妹也始以肅雍之德下嫁於公侯淑問怡聲禮無違者訓其愛子有過嚴君不因恩澤以求郎每致忠貞而事主使勤富貴戒斁廉能鬱為勳臣實資聖善徽猷盡在典禮宜加猶狹平陽之封式廣營邱之地克宣朕命用慰潛心可贈齊國大長公主敕守起居舍人賜緋魚袋王璠母贈成紀縣太君李氏等古人云生願為人兄欲奉養之日長也若此則及子之貴顯親之榮能幾何人是以聖王因心以設教由是揚名追孝之禮生焉朕宅帝位思宏大孝乃詔執事追用疏封而璠等皆以諷賦語言得參侍從欲報之歎發乎肺肝追加啓土之榮用深罷社之痛可依前件敕朕聞仲尼歿而魯公誄之柳莊死而衛靈請往夫以區區魯衛而猶念賢臣碩德也如是况朕小子獲承祖宗實賴一二元老朝夕教誨以儀刑於四方天胡不仁遽爾殲奪而今而後誰其屏余故金紫光祿大夫檢校司徒兼太子少師上柱國滎陽郡開國公食邑二千戶鄭餘慶始以衣冠禮樂行於山東餘力文章遂成儒學出入清近盈五十年再任台衡屢分戎律凡所劇職無不踐更貴而能貧卑以自牧謇直行於臺閣柔睦用於閨門受命有考父之恭待士比公孫之廣焚書逸禮盡可口傳古史舊章如因心匠朕方咨稟庶罔昏逾神將祝豫痛悼何及乞言既阻贈典宜加追書保養之榮用彰明允之德可依前件敕天子之於百辟也公則有君臣之義私則有父子之恩生則有列爵以報功沒則有加榮以錫命遠則罷朝以申悼近則幸第以臨喪而况於代濟勳庸時方委遇死而可作吾何愛焉故檢校尚書右僕射王承宗海岱孕靈弓裘襲藝詩書禮樂稟訓於祖先勇敢謨猷自生於誠腑逮居劇鎮益辨長材每懷戀闕之誠遂行割地之效屢陳密欵方俟來朝天不與年素志沒地表章前上忠懇備存不以二子為憂且曰三軍求帥承元繼志雅有兄風雄藩既耀於連枝寵秩宜加於幽穸上台之首左輔之崇特越彞章用明加等忠魂尚在期爾有知可贈侍中仍令所司備禮册命賻布帛五百段米粟三百石委度支逐便支送敕秦郡守分土疆以牧人漢剌史乘軺車而按部兼是兩者才唯艱哉而况於鎮定遠荒經略逋寇毗倚方切忽焉薨殂不有追崇曷彰憫悼故朝散大夫持節桂州刺史兼御史中丞裴行立積德之門代濟英哲班超奮筆志在功名酈寄秉心義先忠孝纍及事任益見良能龔遂著稱於潢池處默去思於交趾遺風尚在錫命宜加寵以貂蟬賻之穀帛用光幽穸式慰營魂可贈左散騎常侍賻布帛三百段米粟二百石仍委度支逐便支送敕故元從奉天定難功臣柳州刺史陳憲忠在德宗時執羈靮以從遂加戡難之名在憲宗時沐雨露之恩實被念功之詔朕敬承先志崇獎舊勳爰命有司用申常典生有熊當其軾歿有雁隨其車可謂男子之哀榮矣可贈使持節衡州諸軍事衡州刺史敕故容州本營經略招討左押衙兼行營中軍兵馬使檢校太子詹事楚繼吾故廉州古邱營鎮將試殿中監衛宏本等比以荒服不虔侵掠縣道乃詔毅勇為人驅攘而繼吾等奮不顧身深入巢穴豺狼雖殪蜂蠆誤加方聞振臂之雄忽有歸元之歎其帥具上其功伐請議褒崇言念云亡尢用憫悼不有異等孰以勸忠特追有土之榮用明死政之節繼吾可贈使持節都督容州諸軍事容州刺史宏本可贈使持節都督雍州諸軍事雍州刺史昔羽父為無駭請諡於魯侯而衛君亦自稱公叔文子之迹則考行必在於有司賜諡或行於君命久矣故致仕太子賓客燕國公于頔祗奉三朝橫鎮襄漢雖便宜從事難以法繩而武毅立名實為威克來朝而後亦既降心敬以事君明能知子朕以禮存錫命恩在展親考以慮深通敏之文參用追悔前過之義深詔執事宜諡曰思敕司徒之妻有禮齊加石窖延鄉之母有德漢置封邱生既不渝歿亦宜及故宋若華我德宗孝文皇帝躬勤庶務寤寐以之乃命女子之知書可付信者省奏中宮而若華等伯姊季妹三英粲兮皆在選中參掌宥密班裂素之詠謝氏散鹽之章琤然玉音記在彤管先皇帝乙夜觀書之際亦嘗傳窈窕德象之篇於若華言念云忘禮宜加等特追封邑豈礙彞章可贈河南郡君敕某等各以貴寶會於明庭既飲食以勞之又爵秩以遣之式所以示懷柔於遠人也爾宜將我皇風慰彼黎獻可依前件敕朕聞德教加於四海則遠人斯屆余德不類而爾等實來良用愧於厥衷是以置野廬以勞其勤委舌人以通其意始於郊迓還以禮成寵秩仍加厚意斯在被服冠冕無忘敬恭
