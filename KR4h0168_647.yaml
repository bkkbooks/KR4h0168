  text: 全唐文欽定全唐文卷六百四十七稹字微之河南人擢明經判入等補校書郎元和元年舉制科對策第一拜左拾遺穆宗朝擢祠部郎中知制誥入翰林為承旨學士長慶二年進同中書門下平章事貶同州刺史改浙東觀察使太和四年拜武昌節度使卒年五十三贈右僕射
