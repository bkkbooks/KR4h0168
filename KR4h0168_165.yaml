front:
  text: 全唐文欽定全唐文卷一百六十五揚庭祕書監師古子官符璽郎
  hash: sha256:6cf559342deab33a41810882359e90020d101d91d1f6bbd19d8ffafb11d362c6
  markers:
  - {type: head, offset: 14, content: 顏揚庭, id: KR4h0168_NFKB_165-h1, level: 1}
body:
  text: 臣揚庭言臣聞纖埃不讓嵩華所以極天涓流必納溟渤所以紀地况乎業隆學海義切為山庶進簣於崇高思委輸於潤澤恭惟皇帝陛下誕膺睿圖光臨大寶隆周比及遠邁成康炎漢儔功近超文景時和玉燭龍圖薦於長河道包金鏡龜書浮於清洛收羽陵之蠧俾備蓬山采汲冡之舊文咸歸延閣一言可善屢動宸衷九術不遺每回天眷臣亡父先臣師古嘗撰匡謬正俗藳草才半部帙未終以臣亹犯幽靈奄垂捐棄攀風罔及陟岵增哀臣敬奉遺文謹遵先範分為八卷勒成一部百氏紕繆雖未可窮六典迂訛於斯矯革謹齎詣闕奉表以聞輕觸威嚴伏深震悚永徽二年十二月八日符璽郎臣顏揚庭上揚昊成均監太學博士史記云老子楚人也生於商時為守藏史孔子適周問禮於老子老子曰子之所言者其人骨已朽矣獨其言在耳吾聞之良賈深藏若虛君子盛德容貌若愚去子之驕氣與淫欲皆無益於子之身吾所以告子者若是也孔子歸謂弟子曰吾今日見老君其猶龍耶老子出關尹喜曰子將隱矣願為我著書於是作道德經五千餘言莫知所終或言老子一百六十歲或言一千二百歲罔知其然又劉向列仙傳云老子好養氣重無名久而入大秦乃知其聖人也思道宣德郎行右補闕宏文館學士老君現形東土演教西方事著前書蹟彰往牒化胡是實為經不虛言包天地之先理起文範之表或則恂恂接物爰開柔弱之宗或則察察繩非乃挫剛強之力隨機設教妙旨難量應病施方聖功莫測如璿武后朝太中大夫秋官侍郎為來俊臣所誣流漢州李釋元同未始有異法身道體應現無方降迹誕靈各行其志且老子發自東方遠之西域雖莫知其終而事見之前史謹按後漢書云老子入夷狄為浮屠之化高士傳曰老子化戎俗為浮屠皇朝實録云于闐國四五百里有毗摩伽藍是老子化胡之所建老子至是白日升天與㣥胡辭決曰我昔遊天上定人鬼之録尋當下降因立此祠焉然則歷考經典煥乎可矚則知化胡是實為經不虛浮屠即佛陀也化俗豈無經乎但聖人設教應物施行况復中人上士性分有殊道佛二門隨性開化洪通兩教不亦宜乎半千字榮期齊州全節人本名餘慶少師事王義方義方謂曰五百年一賢足下當之矣因改名半千上元初舉八科皆中授武陟尉又應嶽牧舉對策擢上第垂拱中纍補左衛胄曹入閣供奉長安中五遷正諫大夫除棣州刺史中宗時為濠蘄二州刺史睿宗立徵拜太子右諭德兼崇文館學士加銀青光祿大夫封平原郡公開元九年卒年九十四臣某言臣貧窮孤露家資不滿千錢乳杖藜糗朝夕才充一飯有田三十畝有粟五十石聞陛下封神嶽舉英才貨賣以充糧食奔走而歸帝里京官九品無瓜葛之親立身三十有餘志懷松柏之操不能糴賤販貴取利於錐刀㪷酒隻雞求舉將何以辨投匭進款奉敕送天官捧以當心似懸龍鏡家乏以守若戴鼇山於今立身未蒙一任臣恨不能益國死將以選地不賜臣一職剖判疑滯移風易俗以報陛下深恩若使臣平章軍國燮理陰陽臣不如稷契若使臣十載成賦一代稱美臣不如左太沖若使臣荷戈出戰除凶去逆臣不如李廣若使臣七步成文一定無改臣不愧子建若使臣飛書走檄援筆立成臣不愧枚臯陛下何惜玉階前方寸地不使臣披露肝膽抑揚辭翰請陛下召天下才子三五千人與臣同試詩策判箋表論勒字數定一人在臣先者陛下斬臣頭粉臣骨懸於都市以謝天下才子望陛下收臣才與臣官如用臣芻蕘之言一辭一句敢陳於玉階之前如棄臣微見即燒詩書焚筆硯獨坐幽巖看陛下召得何人舉得何士無任鬱結之至粵以煌煌丹草非濟物之用而冊府書之粲粲白石豈益國之器而史官紀之况乃六義基身四維成性風調百里雨潤一方動植俟之以滋榮人倫資之以和樂使仰之者若日月敬之者若神明畏之者若雷霆愛之者若父母而可闕一字盛德湮滅無聞於後哉君諱思敬字安儼河南洛陽人也若乃二星分北掩龍沙以居宗六月圖南擅鵬溟以為大實天命昌意啓我幽都帝封始均天雄弱水積六十七葉凡九十九姓豫鄰之代分為諸國兄弟七人各統一部天倫之盛達奚居上高祖遷洛有志諸華思變其風多改舊俗故達奚於後使姓奚焉周氏沿革復姓達奚氏矣自茲厥後可略而言曾祖諱武宇文朝為玉璧大將軍東道大行臺十二將軍同華二州刺史雍州牧太師太傅太保鄭國公諡曰桓於時齊氏跋扈於并鄴有遷鼎之宏志周人經綸於關輔當運斗之有功兩界交爭三運遽及攻守之術應變若神戰勝之方倉卒得妙由是天臺八柱分作宰牧之尊帝座三台合為師保之貴大父睿太子左千牛尚輦直長時高臺漸傾曲池向平金玉滿堂化為道德瑚璉入廟直接明神早露先霜不登爵秩昭考諱孝茂皇朝滑州司兵參軍易州易縣令卻負盧龍之塞漢陽之突騎成風前款飛狐之門邯鄲之俠客交亂君水火相濟文武兼施巨闕之前訟端自喪常山之下符采生輝君則驪泉夜光虹巖朝彩籠雲罩月之穎必由於尺蘖遵江及海之浪亦經於寸源敘用有階莫或不踐總章中以仁勇校尉守左衛率府翊衛秩滿以文藝優長入吏部後解褐承奉郎行幽州新平縣尉雖時以為美心非所好故咫步之間無因騁迹也秩滿停家積年授徵展駿足未超前路辭滿之後遂以邱壑為心垂拱之初天命已改則天皇帝攝行君政心遍區中採芳草於蘭澤省山苗於松澗乃留神陸沈隨方擢善二年授高陵縣主簿以舊德起也屬西方不靜北方多難被奏充金牙道行軍司兵事不獲以遂即戎焉君設策請拔碎葉疏勒于闐安西四鎮皆如所計謀存於我功在諸人授之加朝議郎行蒲州司法參軍事既表裏山河股肱要壤用之惟器選擬為難君盤根錯節等庖人之遊刃發伏摘姦同郢匠之揮斫紫宸回顧赤縣瞻風長安二年調補乾封丞矣蜀岷山井絡之分帝以會昌梁州輿鬼之躔人為繁雜相如之宅無復德音文翁之堂空餘陳跡人不見德年代以深舊稱難理斯焉是賴四年授蜀州青城縣令以人望遷之君下車布政推誠待物舉義壯忠貶惡除盜或謂曰不乃闊乎君謂之曰前史有之舉有義者所以救貪污無恥也舉有行者所以救廢亂失道也舉廉讓者所以救分爭也舉遜順者所以救橫逆也舉質朴者所以救離弊也舉惇厚者所以救殘賊也今若此皆有吾何已焉吾薄劣實荷榮獎既承澆競之餘復當巧詐之盛若不憲章古道祖述前修貞彼傾轍不遷其軌必也政成何望朞月遂為明科例自形諸已以上善而包荒用中而禁暴曾不晦朔闔境肅清剽狡潛散謠頌攸遠聲震錦城雙流為之變色德充錦里八郡以之易心屬七廟靈長三光復道則天推位應天嚮明以加朝散大夫承國慶也將謂魯恭才識坐入司空卓茂賢明行升大傅豈馳波易遠過隙難留遽沈連石之暉遂往懸碑之路神龍二年八月二十七日終於長安之義寧坊私第也惟春秋五十有九惟君少懷忠義以信分為冠冕長好急難以然諾為爵邑天姿孝友率性沖和虞仲寧學高德博而蒸嘗無主劉休涓帝室王門而禋祀不繼太夫人隴西李氏將軍該之女有行業每以此歎之君夫人義興縣君蔣氏則尚藥奉御豈之曾孫太子門郎義安之女琴瑟友之同詠河洲之什蛟龍合矣共赴延平之津景龍二年十月十六日終於義寧里春秋五十有一以景龍三年三月十日合葬於咸陽之畢陌原禮也有第二女道光柔順德備幽間雖裁柳絮之篇未獻椒花之頌適太原郭氏左衛武亭府別將長上如玉之妻牆宇端肅風神爽邁溫良日用忠孝生知束髮祈榮彈冠入仕敢當仁於潘掾荷昔眷於戴侯爰託青烏方榮白鶴南瞻渭水庶見儀天之橋北望荊山長標鎮地之固其詞曰龍司北溟鵬翻南海地鬱靈氣天降神宰奄有諸華遂荒章亥抑推高祖正朔斯在兄弟之國七族攸昌親賢胙土四姓斯光奚于陸穆衣冠紀綱西魏將末北齊竊號太祖經綸玉璧是犒匪禁小賊用虞大盜纍加重秩每贈優勞守禦功多鄭國是報昏明遞運陵谷成災直長垂翼有美且偲青松藹藹白雲皚皚施於易縣尉有楚才欽若惟君歷游華渚整翮理翰嘯儔命侶風光融融零露湑湑道以濟俗德以禦侮龍飛中興明鸑上騰五方星聚六合雲蒸朝興斯炳大夫如陵翼搏風而上征倚天衢而元亨風叩京兆之郡日薄長安之城白鶴崇隴青烏相塋琬璧斯勒存沒為榮聞夫真人者出巨殼歷倚杵騎蜚廉從敦圉臣雷公妾密妃朝濯髮於湯泉夕晞首於暘谷仍丹邱以長嘯戴翠華以高遊自非殖因曠劫肅恭大浩從事於金房之前鏤心於玉晨之上攜青童而應黃籙者奚以成後來之妙相乎繼絶景而允希聲則尊師其人矣尊師諱文操字景先隴西天水人也後秦尚書僕射緯之後緯仕長安故為扈人焉若乃鬱為帝師降迹於唐勛之代光乎王佐應命於周武之朝家籍代資可略言矣曾祖洪宇文朝商州長史大父舒隋文州別駕昭考珍皇朝散大夫以先知授尊師特稟異氣垂實冥華始降迹也其母袁氏夜夢元妙玉女授九老丈人之符寤而記之每存思也數月而聞腹中誦經聲且時時有異光繞身矣及載弄之始目光炯然眸子轉盼若有所見矣袁氏以其所夢有徵心志而不言也及勝衣之日自識文字惟誦老子及孝經乃曰此兩經者天地之心也此後見好殺之字若蹈水火視無禮之文如墜泉谷稍長聞有尹真廟乃精心事之不近俗事因讀西升靈寶等經漸達真教既得元味便契黃中聞師者傳道之父母行道之神明無數劫來妙經是出不因師學謂之長昏遂章惶無已求師不暇時有周法者內音之先鳴上皇之高足乃願參軒效駕陪景嘯空奔走禮謁以申宿志周法見之乃謂尊師曰汝於劫會之中已受龜山之籙也便訓以紫雲之妙旨授以青羽之隱法一入其心謂赤松王子喬可與撫煙月矣年十五道行已周有名於遠近矣屬文德皇后遵上景而委中宮於時搜訪道林博採真迹尊師即應元景行預緑雲奉敕出家配住宗聖觀雖翦芝瓊園採琳元隴意每遠出未近謝也將欲沐浴東井棲遲南昌保護崑崙窺窬渾沌矣故屬想丹煙游心紫度遍尋五嶽備涉九元尋三君之祖氣成七晨之慧眼旋謁周法便居終南寂慮於溫泉冥精於寒谷有年日矣既通八景又達九天知來藏往多所曉悟若有神曰周法上遷及省所居已去順也貞觀末年行喪既畢永徽三年乃遊太白入重元也見所未見聞所未聞此後丹字紫書三五順行之法扶晨接晝九六逆取之方咸得其要尊師所有遊山異迹祈醮靈應並有別録此不載之至於顯慶以來國家所賴出入供奉詢德咨量救世度人轉經行道元壇黃屋帝座天言東都西京少陽太乙九城二華展敬推誠三十餘年以日繫月始終不絶有感必通凡是效驗君臣同悉敕書往復日月更回神道昭彰歲時交積者不可具載並傳於帝居一二要者略舉其目初尊師遊太白高頂雲霧四周聲振萬壑闕六字千仞復有象充九色其高十仞欣然長往者意已篤焉高宗之在九成宮有孛彗經天長數丈以問尊師尊師對曰此天誡子也子能敬父君能順天納諫徵賢斥邪遠佞罷役休征責躬勵行以合天心當不日而滅上依而行之應時消矣是故高宗以晉府舊宅為太宗造昊天觀以尊師為觀主兼知本觀事儀鳳四年上在東都先請尊師於老君廟修功德及上親謁百官咸從上及皇后諸王公主等同見老君乘白馬左右神物莫得名言騰空而來降於壇所內外號叫舞躍再拜親承聖音得非尊師之誠感也由是奉敕修元元皇帝聖紀一部凡十卷總百十篇篇別有贊時半千為尊師作也紀贊異秩繕寫進之高宗大悅終日觀省不離於玉案乃授尊師銀青光祿大夫行太常少卿尊師固讓不得已辭官而受散職焉永淳二年天中有望告成有日萬乘雷動千騎風馳天子乘閣道而御帝車㣥官陪六儀而承七曜將禮於天樞幸中嶽也金繩未舉玉檢猶潛而六龍頓轡三光斂色聖體不安旋於皇極屬紫微虛位白雲上征萬國號訴四方遏密太后咨訪尊師尊師曰真坊仙境亦著代謝物有榮悴氣有初終大道之常幸康神器陛下宜存思諒暗極想欽明密理百神潛芘萬姓文操人間地上物裏天中所有靈明倍百祈請亦望二十四結火燒而憂盡七十二教水鍊而法成皆見先徵以明後事乃著祛惑論四卷消魔論三十卷先師傳一卷垂拱四年將賓玉帝也上足時道成咸願奏章以延福蔭尊師止之曰有順宜遵不可犯禁言訖委化顏色如常粵以長壽四年四月十四日遷兆於終南文仙谷弟子侯少微等追思龍漢遠慕龜巖冀德音與天地同久神道共陰陽齊化昭芘騫林冥滋柏樹俾斯貞石文若三光其詞曰去矣大仙悠哉上元玉谷白芝之座金闕紫蘭之前既嘯景於瓊札固交歡於碧泉出三萬六千之厚地入三萬六千之遠天咀九華之翠菊坐五色之紅蓮常吟外景每握內篇春霞飛乎絳雪秋風生乎紫煙裴回高黃嶺顧步太白巔三秦四塞帝王國京兆長安龍鳳川煌煌兮四明路浩浩兮八景年今以向上襲前果何時來下降宿緣當乘道之氣應傳道之味必使氤氳六合中自然昌揚萬劫通稽首寧歌步願得乘九素天下同此心非獨騫之林太元武后朝中散大夫典膳郎道本中華釋垂西域隨方設教同體異名且老君變化無方易形改號或在天為帝或在世為師隨物見形靈應難測縱使史籍無據釋教不異老君
