front:
  text: 全唐文欽定全唐文卷四百九十八權德輿十六
  hash: sha256:a4b958f41ee3e7cf4a99669930ccdc9e590b71e2a2971da9ec38bc0b85966678
body:
  text: 博陵崔公諱某字某仕至御史中丞洪州刺史江西都團練觀察使元和七年冬十一月某甲子啓手足於郡舍享年五十五皇帝不視朝襚以左散騎常侍印綬命郎吏弔祠明年十一月祔窆於東都河清縣先正之大墓又明年其孤仲謨纂其代德家法命書愍冊請刻石繫辭且自本曰炎帝之後秦夏里黃公廓漢東萊侯伯基東漢長岑長駰濟北相瑗晉左僕射洪之代也洪七葉至北齊禮部尚書文恭公聖念聖念四葉至君曾祖知晦應銷聲舉授亠兊州金鄉丞王父瑜朝議大夫忠王府咨議贈太子賓客烈考灌再為澧州潭州刺史以御史中丞領湖南觀察使當宣武之際用愷悌修政為代吏師優詔錫今爵推理行第一神道繆盩遭罹戕害他日以君之勤贈太子少師君慈和修潔平粹文敏以勤身之功善揚積厚之風類始以門廕調河中府參軍歷邑丞廷史從事察視凡南臺外三為殿中侍御史嘗以公事貶台州司馬聯帥表於理下旋以上介入拜侍御史遷考功員外郎度支吏部二郎中商常二州刺史以至按部撫封為太子守臣所居可紀漸漬光大其為郎中考課經費彌綸綜核三劇曹無留事瀕江郡國仍歲夭癘而浙河之東凶旱特甚縣官恤然臨遣使臣發吳之公聚賑越之囏食君受載馳仁聲先翔噢咻憯怛布施優裕不樂宴私不嘗酒肴東人鼓舞感動肝膈其為常州漕引河渠通申夏二浸以宣利澤郡有聽斷之下有如神明及處方任為仁由已凡封逋負數千萬夫家病焉君曰不曠然大貸無以休息悉用條上盡蒙可報然後均列城之田賦去都府之煩弊吏措手足事無尢違仁矣哉詩稱仲山甫柔嘉維則申伯柔惠且直惟君亦柔而立溫良而能斷教訓導利外寬內明函達於雅故勤施於政事稽洪範三德其甫申之柔乎凡歷柱下史東曹郎皆居代官列郡二千石方帥執法皆循風訓江湖之閒壤地相錯蒙君父子仍代之澤豈天意之裕斯人耶鄙夫久二六官與君周旋甚熟頃忝宰府詳知報政逮茲居守而仲謨儼然焉衰疾不文直詞傳信銘曰矯矯少師蒞湖之南播遺懿兮抑抑常侍在江之西施美利兮仍代元侯寬明輯柔政樂易兮此物此志四封茂遂古循吏兮宜永介福奄然廞復左貂襚兮河清鮮原羽葆翻翻潛智氣兮有涯必盡流此淑聞斯可貴兮刻飾豐碑崔嵬龜螭永為識兮詩之小雅曰尹氏太師秉國之均大雅曰王命尹氏戒我師旅然則代為天子三公大夫參掌文武故吉甫有作憲之美翁歸為兼備之才周漢以還似續忠厚今義武軍節度使相國延德郡王司徒公之從事曰澄從公來朝朝有賞典式寵戎輅當簪法冠永懷罔極之恩願回追錫之命司徒嘉焉以其詞列上先皇帝孝理天下愀然曰俞繇是輟功次之遷遂飾終之澤乃三月丁酉有詔贈澄之先人正議大夫趙州別駕錟為壽州都督先夫人吳郡陸氏為吳郡太夫人印綬璜珩光耀幽穸哀榮所被名教多之澄又稽甲令繹家牒以漏泉告第之恩有螭首龜趺之制於是傳詩而系辭云都督以諱為字天姿剛健經術百氏陰符六韜皆所講習通其旨奧天寶初舉進士不第幕府上功盧龍府別將稍遷瀛州高陽縣令歷恆州司法參軍藳城令寶應初以太子中允兼恆州長史錫金印紫綬廣德中遷易趙二州別駕節將推其才表為營田副使理二縣佐三郡勞徠安集周爰圖慮以饑饉之歲丁師旅之殷敷其慈和得以安靜議者以魯仲堪龎士元方之既董大田實居上介俗知禮節師以阜饒方陟勞課奄然大病以大歷七年秋七月啓手足於恆州靈符里享年六十一以明年夏五月窆於藳城縣東子樂原夫人嵐州刺史道之孫密雲令昌嗣之女能以仁順洽於宗姻晝哭既除喪十四歲以貞元四年冬十月歿於道州以十一年冬十二月祔焉從魯禮也有子三人長曰渾唐縣尉次曰濤趙州司功參軍皆不幸短命澄即其幼子也尚學理文敏信誠厚雅有悃愊不隨波流山東士大夫多稱其名義由北平尉為定州功曹掾辟司徒府主其謀猷每懷戎章驅疾傳陳賦輿之事明利害之鄉叶於中權皆有功效洎元侯入覲天子録功賓僚傳校命賜優重而澄永懷霜露願賁邱封感於宸衷盛此徽數君子曰是舉也有以見尹氏之孝思都督之流慶上公之與善元首之加恩以風四方以厚士教雖澄之未貴仕其所以宏助者多矣初都督之禰曰本古仕至常州武進尉武進之父曰正義歷許相宋三州刺史司農少卿司農之父曰良終滄州司馬司馬之父曰文哲仕隋青泗曹濮陜宋洺相等州刺史本郡太守大理卿戶部尚書皆有德善揚於官業蓋二雅遺烈之所從來遠矣德輿門人蘭陵蕭籍與澄為寮同在公府狀其往行兼列命書忝二邦教敢忘聳善乃為銘曰尹氏代律聿修文武自周帛丿糸漢炳耀圭組懿懿都督遠承丕矩方騁夷塗俄歸野土慶延嗣續職佐藩垣遠從上台來翊天門追飾二尊輝榮九原密印畫綬隼旟魚軒官才掾吏跡重知已恩回大君澤及先子以盡忠養以宏孝理楬立貞珉芳馨在此孫公神道碑銘并序元和元年冬十月內省少監致仕孫公寢疾薨於京師廣化里私第享年若干十有一月有詔追贈揚州大都督法賻布絹各以百數明年十一月葬於涇陽縣之某原命婦諸孤家老故吏以服勞詔祿恩華慶賞之不可以不識也請鏤豐碑楬於鮮原云唯聖唐仁澤汪濊威靈燀耀乃法辰象以嚴武師惟肅宗創新軍於北落克靖患難惟德宗置中護於內朝而為總制翊宸嚴以宣七德正師律以張四維勤勞警巡柬拔忠厚不失於正克保其終者惟公有焉公諱榮義字某其先吳郡人也軒裳延耀本冠邦卿版籍推遷幸來京轂今為京兆涇陽人曾祖翣皇右金吾衛中候祖庭玉贈亠兊州刺史父知吉皇開府儀同三司行右領軍衛大將軍知內侍省事上柱國魏國公或徼循筮仕道在安卑或麾節加恩義彰追遠以至於先公貴位名重前朝宏內省之事任受大封之徽命承休襲慶終踐代官裕蠱教忠備遵家法公端良謹重潔白詳明事無尢違心必誠信至德中策勳至上柱國起家掖庭局監轉掖庭局丞宮闈局令再為內謁者局敘品至朝議大夫恩錫章服又加中散大夫貞元十七年充右神策軍護軍中尉判官才浹辰遷內常侍充副使越翌日兼右街功德副使十九年拜右驍衛將軍充右神策軍護軍中尉右街功德使明年有詔知內侍省事歲中加特進右武衛大將軍封樂安縣開國男德宗棄天下順宗諒暗整訓爪牙勤宣翼戴進驃騎大將軍益封樂安縣公食邑一千五百戶今皇帝踐祚以年疾加侵固辭戎政重違誠懇恩禮舊勞拜開府儀同三司既積沈恙纍章陳乞乃下優詔遂其致政之請焉初公以大歷中奉使交廣裔夷嗇禍有梁氏尋氏聚為寇襄公與守臣決策潛師盡殪南服以清厥猷茂焉建中中將軍許庭遊將命北蕃公為之介屬張光晟暴斃其衆與陰方為仇野心煩言將逞憾以報才全智免終靡盬而歸俄而希烈干紀淮濆不靖受中旨合兵符取桂嶺湘川之衆益漢陽夏口之鎮以當劇賊且護成師收應山援安陸凡鄂之成績公有助焉尋又監慶州行營兵馬皆奮策畫用寧邊鄙暨夫拊循爪士參贊禁營乃升副車超踐中尉講軍志循武經比詩人祈父之職得易象貞師之義承睿謀以決勝授㣥帥以懋功肅肅然安人而禁暴雄雄然由中以制外積勞不伐受寵若驚恩波深而守以慎懼爵祿厚而不萌侈汰其或方國問遺歲時交歡公曰有齒以焚古人所誡無脛而至廉士不居外不易於人中不易其操泛然虛受悉助軍實強力匪懈推誠在公或籍在行閒而法干吏理苟書所至必械繫送之心無私焉直而後已當親重之任護腹心之臣入近天子之光出列諸侯之上豈徒然哉先魏公信嚮釋氏薰修心法嘗於邑里奏建寶應衆善寺五代之壤樹依焉至公又請於寺內置無垢淨光法華三院塔額檀施臧獲為淨人者十輩所以修先志所以崇佛乘孝子信士斯為至矣昔漢室以灌嬰為謁者隨何為護軍正伯參珥貂之制環列據銜珠之重驃騎儀同品皆第一護封益食事軼常均及屏去燻灼翛然恬曠家居得謝以至沒身其動也本兵柄而不可犯其靜也冥道樞而無所纍納忠循理議者嘉之前夫人郭氏驃騎大將軍贈開府儀同三司全羽之女克恭婦道不幸先沒今夫人東平郡君呂氏柔嘉有儀晝哭遵禮奉終誠信以前夫人祔焉長子某次子某官某等棘心雪泣銜恤無怙趨承軒禁嗣續忠勞公之兄前保壽寺上座內供奉監義大德道系捨筏之宗已超學地在原之痛猶切孔懷公之弟某官某等同氣聯華致美有裕忍哀襄事先遠是圖龜兆告猷芻靈啓路卜佳城於此室體魄焉依轉樂石於他山聲塵斯在銘曰大君御極修理百職抑抑樂安逢時竭力超侍軒墀抱公絶私乃將命令以會師期保合誠信周旋險夷韜鈐講貫印紱葳蕤帝座之西星文昭晰鉤陳之北武旅森列為之總制所以關決凡在拊循士皆感悅委重三朝成功九霄退身崇讓息偃迢遙逝川閲水截道驚飇恩崇幢蓋吹咽笳簫涇流湯湯谷水池陽舊邱崇岡若斧若堂宰樹如雲仁祠在旁刻銘於茲兮永永不忘在漢孝宣厲精理道則有魏相通故事丙吉知大體百職修明中興有聲惟皇帝在位十四祀得賢相成紀公趙氏受天清淳佐時緝熙本洪範之正直躬大雅之明哲左輔右弻調和鼎味降祥而生盡瘁而終時貞元十三年年六十一歲上震悼不視朝三日詔奉常具儀法冊贈太子太傅又俾百執事為位哭於其庭弔祠禮賻率有加等二府之屬或銘其德於壽堂或狀其行於考功有司稽實諡曰貞憲公之盛業斯謂不朽又舉其始中終之略識於神道公諱憬字退翁天水隴西人其先成子之文宣子之忠文子之知人左邱明太史公實書之曾王父仁本皇司列少常伯同東西臺三品以忠清勵翼多所發明乾封總章之際號為稱職王父贈趙州都督誼歷右司郎中乾封縣令司僕少卿烈考贈鄭州刺史道先仕至洪州録事參軍惟祖禰含章故慶延追錫崇構丕矩復大於公公保抱之歲生知色養羈貫之年則無幼志及夫被儒服踐法言敬直而文肅莊而溫端誠博物錯綜古今非大中至正不接於心術寶應中元宗崩肅宗幸梓宮有司議方中復土之制時西鄙日聳歲饑人流公以王者追孝恤禮宜儉褐衣上疏詞指約明君子曰此劉更生諫昌陵之言也息偃江介名聲籍甚始佐州司乃辟戎車自試守江夏尉三遷至監察御史其後翹車繼轍賢侯虛左大凡難理之府皆待公為重歷殿中侍御史太子舍人丁太夫人憂柴毀孺慕殆將死孝感導善氣降為嘉生有芝煌煌秀於壤樹之側公默而去之人莫知者既免喪徵拜水部員外郎未幾檢校工部郎中副湘中七州軍事居一年詔領留府尋踐方伯以中執法錫金印紫綬罷職家居拜給事中執法懷和北狄有下嫁冊命之禮復兼憲丞以副皇華旋軫未至遷尚書左丞俊乂用彰皆以貞勝其初撫封上狩於漢中守臣之任憂寄愈切公恤隱布和仁而愛人輿師知訓善吏樂職行之三年教化明備砥貢有藝賦政不煩潔矩以杜奇邪露章而無吐茹飛語雷動明誠山立受代踰年事實敷聞故有左曹之命講貫舊章惟直是視刑或失入議將必還公望日盛其勤靡盬故有和戎之役致賜諭旨協寧殊鄰疆場之言專對而不跲紀綱之僕承事而不征保就安利北方感悅故有在塗之拜整南宮之紀律起郎吏之功緒風望素重法制尢精常歲終舉吏可以長人者或以其細故深詆將以病公公乃移書自訟請下其考有博大之度無怨欲之私一臺承式六轡在手持剛體要善否有章故積公輔之望貞元八年夏四月拜中書侍郎平章事明年五月轉門下侍郎以厚德載物以全才宣化舉直盡忠敷納詳明正百度之本去一朝之便事有統紀心無面從嘉猷讜言鎮定宏大謙厚而不伐持平而居易闢邪塞違貞厲而不校陟恪始終帝載用和嚱夫先正常伯歷左肅機東臺侍郎充著休功再參大政公皆踐之是以似之嘗以為漢庭諸公罕備其用以石慶之醇謹而不能關決薛宣之方略而失於煩碎翟方進之通明而固其位公孫宏之節儉而近於名公備有其長彼實多缺唯丙魏所履我無愧焉嚮使天與之年盡行其道則公之所化可勝既乎故其登庸也士之仁者相賀而不仁者相弔其全歸也士之仁者相弔而不仁者相賀斯可知已至若睦中外之姻而均其祿賜嚴宗廟之祀而不理第室啓手足之日家無餘財奉終即遠待恩禮而後備難矣哉嗣子宣亮全亮元亮承亮等伯季以門子為宏文生叔仲始解巾受祿皆稟德風幼而孝謹以十一月景午時得吉卜奉公之喪祔窆於河南緱氏縣景山之原禮也以德輿叨居宰士嘗辱深知職奉贊書備詳盛烈俾刻金石聞於無窮銘曰晉有成宣代稱忠勳先正常伯匪躬事君纘復於公為時獻臣德不踰間心不違仁貞其所履以翼天子大猷是經中立不倚乃賦明命宜躋遐紀吾道方伸修塗遽已緱原蒼蒼宰樹成行令名章章樂石在旁噫嘻太傅之風永代不忘天地欣合以生萬物其成歲功也則有肅殺震曜之助焉君臣保乂以熙百志其講武功也則有經綸翼戴之輔焉龍蛇起蟄山澤通氣與運相值有開必先斯太師所以宣力四代稽謨七德輝曜威靈勤身濯行霆擊風行乃緝熙於光明故雕戈淑旗以嚴師律黃旒元衮以正台曜湛露彤弓以覺報宴納書追命以榮恤禮蕃錫始終如公之功公諱瑊字某其先夏姒之後為淳維漢劉之代為渾耶或強為與國或分以保姓貞觀中開置州壤就加官師曾祖元慶皇豹韜衛將軍靈邱縣開國伯祖文壽皇太子僕贈尚書左僕射考釋之皇開府儀同三司太常卿兼御史中丞寧朔郡王贈司空惟靈邱紹先公之職居次卿之重僕射以積厚克家寧朔以偉才雄邊貴仕崇勳乃列茅社流光追遠是加密印回復介祉閒生元臣功昭於前人德合於大君建中癸亥翠華西狩公以大司馬艱貞翼從部勒戎車揣摩殺機勤勞行內為上心膂登壇授律誓命交感如漢拜淮陰侯故事而又加焉乃進左揆遂參大政總賦輿而為之師長恢王略而以之北伐凶黨盡鋭壁於武亭公以事巨師老則傷威重正合奇勝在於疾力奮寡擊衆鼓行無前殲夷潰溺如建瓴水中堅席勝又復於咸陽長轂啓行既門於延秋會西平王以東諸侯之師清宮獻捷公乃抑其賈勇須彼成功窒士心之剋伐息兵火之氣焰然後窮追斬級寇孽以平備法從於清蹕捧大明於黃道告類薦功登拜上台撫封尹正復與虜確時北平王出大鹵收絳臺而公已總成師下左輔於是緝忠力揚奇鋒復離宮拔堅壘衡陳壓境傅於蒲津金鼓之聲氣相合山河之表裏皆復渠魁授首師帥協附安流以濟方軌而前士不罹傷工不易肆殄寇正刑四方咸和論道進律乃平水土秉誼靖人以修班制休嘉賁於草木利澤逮於鰥寡言為軍志動為吏師貞元景子政成一紀進掌邦教遂居左弻十五年冬寢疾十二月辛未薨於理所享年六十四皇上悼歎不視朝五日冊贈太師賻襚弔祠有司備物大僚襄事明年二月甲申葬我太師於萬年縣洪固原太常跡其功德奏諡曰忠武禮也初公年十一以將門子仕於邊部未弱冠五遷至左驍衛將軍始從朔方之師戰黑山次從隴右之師摧石堡又嘗西出臨洮奪昆夷之善地而為之壁壘北絶大漠破獫狁之堅甲而焚其廬帳又從汾陽王臨淮王討反虜於山東南攻贊皇北取真定射其突將李立節貫於左肩斃之又五遷至太常卿皆以功次其閒開地於河曲以靜九蕃宣威於陝西乃定三川凡王師之所以剋獲都邑元老之所以發揚蹈厲公必居其先偏而當其勍劇故以御史中丞為靈州左司馬以御史大夫為邠州刺史以工部尚書為單于大都護專征上郡榆林之地入為左金吾衛大將軍又以戶部尚書奉晉王出車之重自時厥後投艱感慨能納大忠以恤大事理蒲十六年再陟公台以司空兼侍中以司徒兼中書令大凡歷官二十八次真食千八百室居節制者五副元帥者四材力絶人始封樓煩方內洽平乃建咸寧凡汾陽王九代之勳公皆左右四履之地公皆踐歷憫冊師禮法諡尊名公皆如之所不至者壽而已矣惟公厚性寬中智謀深靜秉儀類以賦明命植端誠以糾王慝講功述職遠意長利執德之柄蹈禮之輿致其用以格天啓其心以沃聖協建皇極為宗工元龜雅好左氏春秋班氏史得考父之恭范宣之讓驃衛之功略黃韓之教化又嘗慕太史公自敘著行紀一篇詞不矜大而事皆明備有子五人曰殿中少監鍊太子中允鎬太子司議郎巨櫟陽尉鋼雲陽尉鐬著位於兩宮以奉朝請試吏於縣內以修事任食德而才稟訓而忠皆以純孝致其哀敬令弟輔國大將軍右領軍衛將軍武當郡王與諸孤等推蒸彞景鐘之義因識表以聞有詔詞臣刻石傳信乃採其贊書侯表作神道碑銘曰北戴斗極陰方尚武元金朱轓錫命都府太師閒代感會雲雨四征庇人九合尊主昔未成童則能肆勤卓行深入致果忘身弱冠摧鋒環列南軍中興之後書社策勳援枹兩河轉戰三秦靈朔郇邠所居必聞出統蕃衛入司徼巡時丁厄難節冠㣥倫逋誅煽結狂穢宮闕西平鞠旅公亦授鉞既臨延秋如火烈烈休士退舍時惟不伐祲沴濛濛蒲津未通北平釋位公實撫封胥命長春克成厥功開壁勞軍靡有不公以律則臧在和而克時惟太師有嚴有翼乃敷仁澤乃布條職時惟太師有功有德三公二府是獎是陟襚印易名以尊以飾材官介士鹵簿悽惻大隧鮮原終南之北萬邦作憲永代是式追琢馨香與唐無極
