front:
  text: 全唐文欽定全唐文卷五十六帝諱純順宗長子大歷十三年生貞元四年六月封廣陵郡王名淳二十一年四月立為皇太子改今名永貞元年八月即位元和三年正月上尊號曰睿聖文武皇帝十四年七月又上尊號曰元和聖文神武法天應道皇帝在位十六年年四十三諡曰聖神章武孝皇帝廟號憲宗加尊昭文章武大聖至仁孝皇帝
  hash: sha256:7bd6e2cda760ea3b718e02becaec1302d29b779430e76a734caf16ca510e187f
