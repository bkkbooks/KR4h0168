body:
  text: 銀青光祿大夫守散騎常侍翰林學士上柱國富陽縣開國男王伾將仕郎前守尚書戶部侍郎充度支及諸道鹽鐵轉運等副使賜紫金魚袋王叔文等夙以薄伎並參近署階緣際會遂洽恩榮驟居左掖之秩超贊中邦之賦曾不自厲以效其誠而乃漏泄密令張皇威福畜姦冒進黷貨彰聞迹其敗類載深驚歎夫去邪厝枉為國之要懲惡勸善制政之先恭聞上皇之旨俾遠不仁之害宜從貶削猶示優容伾可開州司馬員外置同正員叔文可守渝州司戶參軍員外置同正員並馳驛發遣有天下者曷嘗不選賢與能納於輔弼用乂厥辟以和羣生所以敘彞倫平憲度建用皇極砥乎雍熙者也朕祗若大訓圖任舊人疇咨庶工用佐豫理朝議大夫守尚書左丞輕車都尉賜紫金魚袋鄭餘慶全器茂學蹈中秉直易則可久和而不流嘗踐禁闈亦參衮職每盡王臣之節實彰君子之風服於大僚克有休聞洎綜理會府紀綱羣司率繇舊章協於成式固可以儀型庶尹寅亮天工可中書侍郎門下平章事餘並如故為臣之道必在盡忠其有朋黨比周挾邪敗度事資懲戒必正典刑正議大夫中書侍郎同中書門下平章事崇文館大學士修國史賜紫金魚袋韋執誼幸以文藝久從任使早居禁署謬列鼎台直諒無聞姦回有素負恩棄德毀信廢忠言必矯誣動皆蒙蔽官由黨進政以賄成朕初臨萬邦務於宏大每存容恕冀有悛心而乃不顧憲章敢行欺罔宜投荒服以警無良以祗事先朝嘗參近職尚寬極法俾佐遐藩可崖州司馬員外置同正員仍即馳驛發遣朝廷者天下之楨幹宰輔者王化之根源朕夙寤晨興講求為理之本思所以仰承宗廟之重俯協億兆之心諧和陰陽茂育區宇以貞百度以敘九疇佐豫成功實賴良弼具瞻之地公望攸歸朝議大夫守中書舍人翰林學士上柱國賜紫金魚袋鄭絪秉仁迪哲守約居易懿以文德擇乎中庸體元和之淑姿服大雅之明訓纍登班序休有令聞羽儀周行黼藻王度洎發揮綸翰典職禁闈以溫文雅麗之才居獻納論思之地從容中節密勿盡規先朝任能委遇斯重恪恭夙夜爰歷歲年誠節貫於屯夷茂勳參於顧託名書彞鼎心著丹青朕祗膺睿圖誕受明命宏宣大典澤潤鴻猷保乂於一人儀刑於萬國於朕志用選厥勞圖任舊人以輔乃辟疇咨四嶽罔不僉同宜膺弼亮之求式懋彌綸之績於戲為君之難在乎舉而不任為臣之患在乎知而不言事舉其中政修其本永綏厥位時乃之休可中書侍郎同中書門下平章事兼集賢殿大學士散官勳賜如故劒南兩川疆界素定藩鎮守備各有區分頃因元臣薨謝鄰境不睦劉闢乃因虛搆隙以忿結讎遂勞三軍兼害百姓朕志存含垢務欲安人遣使諭宣委以旄鉞如聞道路擁塞未息干戈輕肆攻圍擬圖吞併為君之體義在勝殘命將興師蓋非獲巳宜令山南西道節度使嚴礪領當道士馬與劒南東川節度使李康掎角應接仍令神策行營節度使高崇文領馬步五千人為左軍左右神策京西行營兵馬使李元奕領馬步二千人為次軍並相續繼發仍仰高崇文等各差人先與嚴礪計會齊進朕以三蜀之人本無過犯征鎮將士各著勳勞迫於威制不能自拔各宜分明曉諭令悉朕懷如劉闢稟奉朝經抽兵却歸本鎮朕務存誠信必當委待如初其效順之誠臨鎮歸款高位重賞當不食言如尚執迷自貽覆滅法既無赦令在必行宜一乃心恭守所職其置頓糧料等仍委度支使差官勾當無令闕失朕以寡薄獲奉睿圖嚴恭寅畏不敢暇逸永惟萬邦之廣庶務之殷而燭理未明體道未至思欲復三代之盛烈覲十聖之耿光是用詳求正言思繼先志子大夫等藏器斯久賁然而來白駒就維洪鍾待扣膺茲獻納朕甚嘉之言觀國光宜有廷試本將詢事豈忘臨軒園邑有期營奉是切永言誠感未暇躬親爰命公相洎於卿士親諭朕意延訪嘉謀至於興化之源才識攸重練達吏理詳明儒術當是三道副朕旁求意或開豫靡有所隱條例所問畢志盡規當酌古而參今使文約而意備朕將親覽擇善而行並宜坐食食訖就試門下第二女等樂以柔懿備聞風訓知中闈內則之義稟傅姆女史之規禮有待年恩從廣愛徵於舊典俾洽疏封式分湯賦之榮庶承肅雍之德宏我慶澤被於家邦可依前件門下昔周室制法備建宗盟漢氏垂統畢封子弟其盛也二南教化首在國風其詳也九國土疆載於侯表朕嗣守丕業惟懷遠圖永言磐石之固宜本價人之重男平原郡王寧等孝友忠敬溫文惠和稟其樂善之姿強於好古之學君親之教罔敢失墜保傅之言亦惟佩服由是寡悔至於通方庶可膺茲典章列是藩屏疏爵以冠於侯伯分茅以錫於山川用明至公且叶前訓平原郡王寧可封鄧王同安郡王寬可封澧王延安郡王宥可封遂王彭城郡王察可封深王高密郡王寰可封洋王文安郡王寮可封絳王第十男審可封建王宜令有司擇日備禮册命主者施行慶賞刑威所以為國既用鉞以誅有罪則建侯以報有功懲綱紀於未然勸事君於巳著歷考前載斯為大章劒南東川節度副大使知節度事管內支度營田觀察處置靜戎軍等使開府儀同三司檢校兵部尚書使持節梓州諸軍事兼梓州刺史大中大夫上柱國渤海郡王高崇文為時生材緯武成器抱厥沈斷確乎堅剛鷙隼挺凌厲之姿高秋凝肅殺之氣自築壇受命宜社徂征形義色以即戎瀝忠誠而誓衆康衢以視其重阻怒心如報於私讎令踰風行勢輟電走殲凶邪於未障完危壁於將傾然後總無前之師搏猶鬬之獸仰斷飛鳥高橫戰鋒掩鬼神以用奇越邱陵以制勝生致逆豎洞開金城引漢將之旗鼓見蜀川之父老貞以紀律弔其傷殘兵無亂行市不改肆上靖井絡下清岷江銘而篆之豈有慚德乃眷庸部其惟奧區畢功以除其禍災圖勞宜享其土地滌蕩汙俗純綏異行觀風勵韓黃之化按節修方召之任爰自六職俾登三司仍疏大封且賜珍食不踰次以彰殊伐不踰時以示休利敬服嘉命宏宣壯猷殿茲坤維屏我王室可檢校司空兼成都尹御史大夫充劒南西川節度副大使知節度事管內支度營田觀察處置統押近界諸蠻及西山八國兼雲南安撫等使仍改封南平郡王食邑三千戶并實封三百戶歲時有豐歉穀價有重輕將備水旱之虞在權聚散之術應天下州府每年所稅地丁數內宜十分取二分均充常平倉及義倉仍各逐穩便收貯以時出糶務在救人賑貸所宜速奏昔周之周召出為二伯是以宗公而領方任也鄭之桓武入作三事是以諸侯而宰邦政也然則荷中外之寵享崇高之名不有盛德孰膺寵命金紫光祿大夫門下侍郎同中書門下平章事兼宏文館大學士充太微宮使上柱國南陽郡開國公杜黃裳道惟無方才則不器陋齷齪之廉謹本誠明而坦夷澄波納寬瑞玉凝素夙以令望更於達官議論必通於大經損益咸酌於中制代所準的朝之羽儀爰授樞衡俾居左右所緝者墜典所陳者格言色無面從志不枉撓宏茲冒遠之化啓彼夷凶之征將明則然忠利斯在惟股肱之郡有節制之師兵威外接於太原地形內錯於左輔是用謀帥僉歸碩人籍台庭之素風執戎鉞以蒞衆示以嚴重廣其封疆統平陽之十連賜元侯之四履超列鼎足仍參廟謨增二象之光輝濡一方之膏雨大邦雄屏羣后所瞻爾其敬哉無替舊績可檢校司空依前同中書門下平章事兼河中尹充河中晉絳慈隰等州節度支度營田觀察處置等使散官勳封如故門下昔周宣王思宏文武之道則以申甫代天工漢宣帝思繼祖宗之風則以邴魏執邦柄是以克紹前烈俱稱中興朕以眇身託於人上亦思所以纘列聖之緒致太階之平懷柔四夷親附百姓將成莫大之業遂獲非常之才授之鈞衡俾作舟楫銀青光祿大夫行中書舍人翰林學士上柱國李吉甫符彩外發清明內融體仁而溫抱義而峻識洞精賾知皇王致理之由學該古今窮天人相與之際自擢於綸閣列在禁闈鼓三變之文潤色王度總五才之用參贊廟謨化俗思邁於成康致君願及於堯舜當注意之所向每罄心而必陳深中不回獨立無懼經綸常見其道遠激切多至於涕零王綱以張蜀寇斯殄左右密勿實由嘉言降神而生輔朕為理調三光以序六氣遂物情而熙帝猷是為中樞司我大本命爾俞往其惟勗哉於戲宰相之任安危所繫百辟為憲萬邦所瞻與其明察以為公不若嚴重而有制與其將順於甚美不若匡救於纖違審涇渭以序人倫謹繩墨以正天下交泰之運其若斯乎敬聽朕言以踐乃職可守中書侍郎同中書門下平章事散官勳如故主者施行惟人代工與物施化財成者元首輔翼者股肱況國之號令本於內史政所關決審於黃樞爰發四方用寧庶績必求同德資以弼豫朝議郎尚書戶部侍郎天水縣開國子賜緋魚袋武元衡挺生偉才克振前緒蹈禮合樂謙厚端和居暗室而不欺處巖廊而益重文能合雅吏必立程再司石室之圖遂踐春華之署故事可舉嘉猷日新爰委地征實為邦本勤於小物宏以大綱一心不移於吐茹衆務必歸於領會鬱此時望稱為名臣朕祗奉鴻休懼於負荷居則神明之隩位當億兆之尊常恐明不燭幽慮不及遠一物未獲萬方在豫書不云乎臣作股肱耳目是用命爾處茲弼諧爾其慎於將明勉於規誨必思衮闕無或面從直哉惟清副我明命可朝議大夫守門下侍郎平章事賜紫金魚袋封如故地有西蜀國之奧區百濮羣蠻外匝於封域雙流重阻內固於襟帶形勝所屬統綏惟艱近者翦其凶魁鎮以勳力實有威惠至於和寧而匪遑寧居纍布丹懇激戀闕之深志將執圭而展儀誰其尸之允在能者乃聽僉議輟茲台臣太中大夫守門下侍郎同中書門下平章事宏文館大學士太微宮使兼戶部事上柱國蕭縣開國伯賜紫金魚袋武元衡器惟宏深行本端敬圭玉不琢雷風有恆夙彰嘉聞亟歷華貫乃司邦憲有遂物之誠乃踐地官有阜財之績益振公望克諧朕心擢於鼎司授以大柄謀由外而不伐慎由衷而自彰展代工之勤宏冒物之化以道則直以心則和丙吉雅通於國體山甫誠補於衮職朝夕有恪毗豫一人眷茲西南憂寄方切非寬大無以蒞衆非慈惠無以厚生非誠信無以撫蠻夷非忠賢無以殿邦國眷我心膂膺茲重任外分兵符以副於重望中佩相印不離於具瞻峻秩爰首於六官崇階更登於七命且示加等仍疏大封勉承寵光無替朕命可銀青光祿大夫檢校吏部尚書兼門下侍郎同中書門下平章事成都尹充劒南西川節度使營田觀察處置統近界諸蠻及西山八國雲南安撫等使進封臨淮郡開國公食邑二千戶王者立國本以安人海隅蒼生不忘宏覆天下至廣咸務和寧其或郡國罹災存撫為重發廩蠲賦時為舊章獻歲布和前聖高躅朕祗膺眷命纘承洪緒居兆乂之上五載於茲推大信以撫萬邦體至仁以蕃庶類夕惕惟厲憂深納隍豈布理猶鬱上帝未感精祲相蕩陰陽或愆近者江淮之間水旱作沴帛丿糸亘郡邑自夏徂秋雖誠禱羣神無愛圭璧而災流下土虧我生成逋亡靡依凋瘵斯甚疲俗艱食時豫之辜當寧疚懷宵衣興歎憫茲求瘼臨遣使臣分命巡行特加存恤往救災患冀安流庸俾免其田租賑以公廩隨便拯給惠此困窮其元和三年諸道應遭水旱所損州府應合放兩稅錢米等損四分巳下宜準式處分四分巳上者並準元和元年六月十八日敕文放免仍令中書門下即於朝班中擇人分道存撫其有單貧乏戶轉徙未安便以常平義倉所貯斛斗量事賑貸務令存濟副朕憂軫嗚呼方嶽長吏職居親人永言分憂亦惟善政敬哉有土咸悉豫懷皇王理本繫於輔弼內以熙庶績釐百工外以撫四夷式羣后三五巳降崇替繇之朕祗荷丕圖思砥于道夙夜惟厲登延俊賢若涉大川俾作舟楫朝散大夫守給事中上柱國李藩天鍾粹美氣稟清英信在言前行為人表蘊經邦之識度發自明誠見理道之本根鬱為公器學探旨奧文以忠貞大玉斯寶於東序朱絃可薦於清廟廣則難挹剛則有容處衆無溷其風標在險嘗推其名節纍登華署克贊彌綸擢授左丞專聞駮議永惟股肱之任翼亮是資必求其人豈限常次黃樞選重僉曰宜之爰舉朝章式副公望於戲爾惟率正邪罔不懲惟匪躬直誠可以事上惟秉鈞平施可以致和毗豫一人允理三事懋乃攸績永孚于休可朝議大夫守門下侍郎同中書門下平章事賜紫金魚袋朕思欲恢宏大化登乎洽平翔聲朔於鬼區煥日月於黃道士網開而萬宇垂澤太階峻而百神受職叶於夢卜天其賚豫朝議大夫守門下侍郎同中書門下平章事上柱國賜紫金魚袋李藩德宇凝粹神襟超曠量寬而不入粗滓理當而不留枝葉行治古之道為君子之儒溫然玉容流競斯遠潔矩以居正開誠以納忠起文章之廢滯通天下之和惠內則褒美良能塞邪枉之路外則銷鑠災患寧黔首之艱廣豫聰明宏益良厚言念報禮發乎深衷爰加書圃之職用飾賢人之光寵靈斯重汝其敬之可兼宏文館大學士餘如故夫定社稷濟生人存不朽之名垂可久之業者必報以殊常之寵待以親比之恩與國無疆時惟茂典故奉天定難功臣太尉兼中書令上柱國西平郡王食實封一千五百戶贈太師李晟間代英賢自天忠勇邁濟時之宏算抱經武之長林貫以丹誠協于一德嘗遭屯難之際實著戡定之功鯨鯢既殲宮廟斯復眷茲勳伐則既褒榮永念天步之夷載懷邦傑之力是加崇於往烈爰協比於後昆睦以宗親將豫厚意其家宜令編附屬籍門下鎮衛甸服控臨河津當五達之要衝主三軍之號令自頃選任多用勳勤必為忠良乃稱獎擢昭義軍節度右廂都押衙兼馬軍都知兵馬使同州節度副使銀青光祿大夫檢校太子賓客兼潞州大都督府左司馬御史中丞上柱國張掖郡開國公烏重允稟潔白之性抱堅貞之資在涅不緇淩寒益茂承家得孫吳之術許國慕辛李之風固巳業擅戎韜聲滿軍府乃者山東振旅河右致誅守臣習非浸以成過事君不信撫衆無恩言多隱欺政務苛刻孤我委遇自虧功名士心咸忿其驕矜人力頗怨其凋盡雖趣召而有命蓋羣情之不容惟爾迹在轅門屬當此際一言秉禮百衆無譁居常表持重之難臨事見知幾之勇況地當師次營壓虜塵人情素悅而易從軍令既明而自戢眷茲諒實可委蕃垣必能同士伍之衣食知黎元之病苦繼前政之風躅為將來之表儀是用拜之壇場授以旌鉞命副相之崇秩牧覃懷之舊封式佇嘉猷用報明獎夫行高則名著事舉則功存立政在初為仁由己無或墜替欽承寵光可使持節懷州刺史御史大夫充河陽三城懷州節度營田等使散官勳並如故主者施行夫蓋之如天容之如地王者之盛德叛而伐之服而捨之魯史之明義所患教化之未宏不患威令之不振所患忿懥之不當不患臣妾之不恭逐稔惡以彰典刑納忠誠以滌瑕釁糾慝宥罪其在斯乎朕嗣守丕圖虔奉先訓明有所未燭信有所未孚德罔洽人而懲法度之未一道靡化物而慮風俗之未齊頃者誤於知人因以動衆雖亂是用長俾投於荒而靖以自思敢吝其過故太尉中書令武俊嘗拔艱危有大勳力重以親戚連其子孫壯容圖於綵繢武烈書於鍾鼎十代之後尚延其寵渥四海之內豈利其土田我之初心蓋不如此盧從史首獻章表深陳便宜乃心頗類于向公如流遂昧於進熟乃割二郡別為一鎮付其密親以示無外而承宗不諭朝旨遂干國章以至於斯事豈得巳既而將帥同德干戈四臨幽薊以節制之衆收城池易定以雄猛之師獻俘馘火則方燎天其可逃然而大兵所罹庶物皆悴農桑遂廢於壠老幼咸膏於鋒鏑為之父母深用憫然王承宗困而能通迷而斯覆冒於白刃貢以赤誠仰日月以激於中腸罄封蔀而誓於後效賦奉其常數官奉其闕員以闔境之性命祈肆赦之恩澤我亦思省至於再三違命而用刑蓋有常憲順命而赦罪是亦前經寰海之饒寧私於數縣之地雨露之溥豈遺於一境之人加恩俾復其土疆改過是還其官秩其王承宗特宜洗雪依前起復雲麾將軍守左金吾衛大將軍員外置同正員檢校工部尚書兼鎮州大都督府長史御史大夫上柱國充成德軍節度管內支度營田等使鎮冀深趙德棣等州觀察處置使成德軍將士官爵實封等一切如舊待之如初諸道行營將士等皆賈雄心爭輸忠力以戰則勝以攻則摧加以跋涉道途暴露原野各宜賞級仍并歸還宜共賜物二十八萬四百二十端匹並令度支隨便近即時支遣仍令糧料使與本軍計會豐厚宴設於戲帝王作兵以輔文德雷雨施澤亦酌人情況乎忠烈之遺勳親之後每稱破敵嘗用愧懷聞覆衆而增傷覽捷書而興歎一夫不獲尚泣於前王百姓何辜罹禍於茲日雖為彼制孰非吾人事苟便時朕寧屈己庶當修政思理推誠致和奉天地之心大祖宗之業姑以濟物豈務申威虞帝之征載示兩階之舞殷王之網式宏三面之仁惠此方隅置於安靜凡百多士宜諒豫懷門下夫宰相之任上以代天工輔佐之宜下以立人極燮調之理闕爰得忠正方膺股肱正議大夫守太常卿上柱國襄武縣開國侯賜紫金魚袋權德輿器度端實智資通敏學成師法文為國華素履常踐於貞方黃中允合於易簡自出入清列茂著嘉聲名利無屑於中懷風雨不移其常性驥騄之質常識於遠途鸞鳳之姿宜巢於阿閣期於致理推之至公寵以春卿掌我樞務輔天地之德俾化及清寧導陰陽之和使物靡疵癘豫違汝弼言無面從君可臣否事巳心同用佇宏美式副虛懷可守禮部尚書同中書門下平章事散官勳封賜如故輔弼之重邦家所屬寄深垣翰則外撫諸侯望切股肱則入熙庶績迭居其任厥惟舊章前淮南節度副大使知節度事管內支度營田觀察處置等使金紫光祿大夫檢校兵部尚書兼中書侍郎同中書門下平章事揚州大都督府長史上柱國趙國公食邑三千戶李吉甫宏經遠之才研極深之慮脫落細故洞開中懷文稽典諅學升堂室洎司我密命言屢表於獨明參豫衮職道每彰於孤直貢其誠節竭以公忠墜典載張彞倫攸敘輔豫不逮懷之豈忘曩以江淮大都吳楚雄鎮歲屬艱食人多愁聲是假全才用康疲俗下流水利不憚勞心故矗以長塘瀦其天澤變舄鹵為稻粱之壤致蒸黎有衣食之源吏守成規人無遷志庶富之教既宣於封內輔相之宜俾及於天下顧茲重務屬於良臣去其外職之繁專以中樞之任至於別館良史之褒貶內殿集賢之清祕爰舉舊典式洽新恩無曠厥官往踐乃位可中書侍郎平章事兼集賢殿大學士兼修國史散官勳封如故爰立輔臣以熙庶績聿膺其任是亦難能至於明用捨之宜全始終之道茲惟大體寧忘豫懷中散大夫守門下侍郎同中書門下平章事兼宏文館大學士上柱國賜紫金魚袋李藩早以學行聞於縉紳洎升朝端克慎素履頃者拔於非次列在鈞衡是宜直己以佐時匪躬而納誨用副明獎越於常倫而授任巳來再逾年序夙夜之勤雖著弼諧之效未孚將何以允至公之求成天下之務宜輟黃樞之重尚居端尹之崇爾其勉之式謂優禮可守太子詹事散官勳賜如故朕聞王者之牧黎元也愛之如子視之如傷苟或風雨不時稼穡不稔則必除煩就惜力重勞以圖便安以阜生業況邦畿之內百役所叢雖勤恤之令亟行而供億之制猶廣重以經夏炎暵自秋霖霪南又虧播植之功西成失豐登之望內乏口食外牽王徭豈惟轉輸之虞慮有餒殍之患斯蓋理道猶鬱和氣未通永言於茲良所咎歎宜加惠貸式示誠懷比者每令折糴本以便人為意今田穀所收其數既少必恐徵納之後種食不充其京兆府宜放今年所配折糴粟二十五萬石如百姓有粟情願折納即於時價外特加優饒與納仍令當處收貯委度支逐便支用今春貸百姓義倉斛斗屬歲旱歉須議優矜宜令所司容至豐收日徵填京兆府從元和五年巳前諸縣租稅有逋懸錢在百姓腹內者放免其百姓職田數額甚廣近緣水潦道路不通計搬運腳價所費猶倍務令寬濟使其安存其破損外職田粟宜令逐近貯納仍委度支隨便支用其職田粟送城腳價亦宜放免百官今年本分職田粟據損數外宜令於太倉請受其草及水田租既緣城中無可回給即宜據損數外準舊例令今年畿內田苗應水旱損處有無聞至今檢覆未定又屬霖雨所損轉多有妨農收慮致勞擾其諸縣勘覆有未畢處宜令所司據元訴狀便與破損不必更令檢覆其未經申訴者亦宜與類例處分朕以為理之本在乎安人咨爾尹京宰邑之臣實惟親人阜俗之寄必當詢其疾苦奉我詔條恤隱為心無怠於事罔或徇利以剋下吐剛而茹柔使閭井咸安惸嫠獲濟各勉忠效宜悉朕懷王者教化本於婚姻由親以理疏自內而型外故詩稱好合所以成子姓也禮有待年明其必及時也恭惟纍聖之後子孫衆多教於公宮巳知婦順而從人之義重擇配之才難以茲兢兢久曠嘉禮況時方無事年及有行宜加祿邑之榮以俟御輪之吉言念於此惕然興懷思宏厚恩用協敦敘恩王等女六人可並封縣主仍委中書門下與宗正卿及吏部尚書侍郎計會諸親之內及常選之中精求其人副我誠意門下司重柄者允屬於長才熙大猷者固資於端士朕纘承鴻緒撫有萬邦夙夜祗勤懼遠於道故每注意宰輔勞懷夢想誠以得失之效邦家所繫疇若僉論豫深衷必惟其人是舉成命朝議郎守尚書戶部侍郎驍騎尉賜紫金魚袋李絳質秀圭玉文含采章抱器挺生居貞特立有史魚秉直之操勵山甫匪懈之誠忠孝兩全學識兼茂清標可以範雅俗正氣可以肅羣倫頃自周行俾參密命動由於義知無不為蹇蹇懷匡濟之心孜孜陳遠大之略言無隱避居則靜專貫於初終其道一致地卿之二爰委典司理財先示於廉利物每懲於聚斂經通立制器用彌光臺閣之間鬱有公望是宜權衡百度宰理庶工允副具瞻掌我樞密於戲豫欲驅人俗以躋富壽感人心而致和平爾尚修明憲章宣布德澤必寬大其志無皎察為公恆其道以秉彞裕其體以臨下各任以職無忘陳平之言苟便於人勿憚蕭何之請敬茲寵擢其懋戒哉可朝議大夫守中書侍郎同中書門下平章事勳賜如故主者施行
