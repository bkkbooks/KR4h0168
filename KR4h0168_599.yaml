front:
  text: 全唐文欽定全唐文卷五百九十九禹錫字夢得彭城人貞元九年進士又登博學宏詞科順宗朝擢屯田員外郎憲宗立貶連州刺史開成中官至太子賓客分司會昌二年卒年七十一贈戶部尚書
  hash: sha256:4a65fdbac804ffe6fc74559da08cfaa1be16721fde60118ca4de7dacd1704170
  markers:
  - {type: head, offset: 14, content: 劉禹錫(一), id: KR4h0168_NFKB_599-h1, level: 1}
body:
  text: 邈不語兮臨風境自外兮感從中晦明轉續兮八極鴻蒙上下交氣兮㣥生異容發孤照於寸眸騖遐情乎太空物乘化兮多象人遇時兮不同嗟乎有目者必騁望以盡意當望者必緣情而感時有待者瞿瞿忘懷者熙熙慮深者瞪然若喪樂極者冲然無違外徙倚其如一中糾紛兮若斯望如何其望最樂睎慶霄兮遡阿閣如雲兮天顏咫尺如草兮臣心踴躍扇交翟兮葳蕤旗升龍兮蠖略日轉黃道天開碧落凝瑞景於庭樹掬非烟於殿幕望如何其望且歡登灞岸兮見長安紛擾擾兮紅塵合鬱葱葱兮佳氣盤池象漢兮昭回城依斗兮闌干避御史之驄馬逐幸臣之金丸望如何其望攸好宗萬靈兮越四隩漢帝仙臺兮秦皇海嶠霓裳踊於河上馬跡窮乎越徼紫氣度關而斐亹神光屬天而照耀晥眷眷以馳情聳專專而觀妙望如何其望有形視蠢蠢兮窮冥冥楚塞氛惡兮蕭關燧明暈籠孤月兮角奮長庚沙多似雪磧有疑城烟雲非女子之氣草木盡王者之兵審曳柴之虛警破來騎之先聲信有得於風鳥示無言於旆旌望如何其望且慕恩意隔兮年光度雕輦已辭兮金屋何處長信草生兮長門日暮徯翠華之儻來仰元天以自訴况復湘水無還漳河空注淚染枝葉香餘紈素風蕭蕭兮北渚波烟漠漠兮西陵樹夫不歸兮江上石子可見兮秦原墓拍琴翻朔塞之音挾瑟指邯鄲之路望如何其望最傷俟環玦兮思帝鄉龍門不見兮雲霧蒼蒼喬木何許兮山高水長春之氣兮悅萬族獨含嚬兮千里目秋之景兮懸清光偏結憤兮九回腸羡環拱於白榆惜馳暉於落棠諒衝斗兮誰見伊戴盆兮何望豈止蘇武在胡管寧浮海送飛鴻之滅沒附陰火之光彩鶴頸長引烏頭未改恨已極兮平原空起何時兮東山在永望如何傷懷孔多降將有依風之感宮人成憶月之歌歌曰張衡側身愁思久王粲登樓日回首不作渭濱垂釣臣羞為洛陽拜塵友余既幼惑力命之說兮身久放而愈疑心回穴其莫曉兮將取質夫秉龜楚人俗巫而好術兮叟有鬻卜而來思乃招而訊之曰嘻人莫不塞有時而通伊我兮久而愈窮人莫不病有時而閒伊我兮久而滋蔓吾聞人肖五行動止有則四時轉續變於所極一歲之旱人斯具舟三月之熱人斯具裘極必反焉其猶合符子首圓而足方子腹陰而背陽胡形象之有肖而變化之殊常經曰剝極則賁居賁而未嘗剝者其誰否極受泰居否而未嘗泰者又其誰鶴胡不截鳧胡不裨夔何罰而踸踔蚿何功而扶持紛紜恣睢交作舛馳似與似奪似信似欺孰主張之問於子龜卜者曰招我以粗問我以微有天下之是非有仁人之是非在此為美兮在彼為蚩或昔而成或今而虧君問曷由主張其時時乎時乎去不可邀來不可逃淹兮闕孰舍孰操豕喙之毒堇雞首之賤毛各於其時而伯其曹屠龍之伎非曰不偉時無所用莫若履狶作俑之工非曰可珍時有所用貴於斫輪絡首縻足兮驥不能跬前無所阻兮跛鱉千里同涉於川其時在風沿者之吉泝者之凶同藝於野其時在澤伊穜之利乃穋之厄故曰是耶非耶主者時耶諒淑惡之同出兮顧所卜之若何夫如是得非我美失非我恥其去曷思其來曷期姑蹈常而俟之夫何卜為言訖執龜而起豫退而作何卜賦於是蹈道之心一而俟時之志堅內視㣥疑猶冰釋然人之所以取貴於蜚走者情也而誕者以遣情為智豈至言耶豫授室九年而鰥痛若人之夭閼弗遂也作賦以傷之冀夫覽者有以增伉儷之重云歎獨處之悒悒兮憤伊人之我遺情可殺而猶毒境當歡而復悲人或朝歎而暮息夫何越月而踰時太極運乎三辰轉寒暑而下馳有歸於無兮盛復於衰猶昧爽之必暮又安得而怨咨我今怨夫若人兮曾旭旦而潛暉飄零日及之萼倏忽蜉蝣之衣川走下而不還露迎陽而易晞恩已甚兮難絶見無期兮永思我行其野農民桑者舉桉來饁亦在林下我觀於途裨販之夫同荷均挈荊叉布襦羽毛之蕃鱗介之微和鳴灌叢雙泳漣漪薨薨伊蟲蠢蠢伊豸遊空穴深兩兩相比何動類之萬殊必雄雌而與俱物莫失儷以孤處我方踽踽而焉如我復虛室目凄凉兮心伊鬱心伊鬱兮將語誰坐匡牀兮撫嬰兒何所丐沐兮何從仰飴襦袴在身兮昔圍蹉跌鞶囊附臂兮餘馥葳蕤誠天性之潛感顧童心兮如疑嘵然有難繼之慕漠然減好弄之姿指遺袿兮能認訴空帷兮欲歸我入寢宮痛人亡兮物改其容寶瑟僵兮絃柱絶瑤臺傾兮鏡奩空寒爐委灰虛幌多風隙駒晨轉窗蟾夜通步搖昏兮網粘翡翠芳褥掩兮塵化蚷蛩閲刀尺之餘澤見巾箱之故封玩服儼兮猶具繁華謝兮焉從想翩翻於是非求悉卒與冥蒙信奇術之可致嗟此生兮不逢徒注視以寂聽恍神疲而目窮還抱影以獨出紛百哀而攻中系曰龍門風霜苦別鶴哀鳴夜銜羽吳江波浪深雌劍一去無遺音悲之來兮憒豫心洶如行波洊浸淫悵緣情而莫極思執禮以自針已焉哉苒苒生死悠悠古今乘彼一氣兮聚散相尋或鼓而興或罷而沈以無涯之情愛悼不駐之光陰諒自迷其有分徒終怨於匪忱彼蒙莊兮何人豫獨纍歎而長吟惟天垂象惟聖作程播二氣而是分晷度立五則而在審權衡上穆天時應陰陽之克正下統人極俾準繩而惟平於是黍纍無差毫釐必究等度量而化通遠邇體平均而勢行宇宙當其夾鍾中律南呂戒候銅渾應節於寒暑玉漏方齊乎宵晝繇是命有司而申令考前王而是遵權輕重以審則中規矩而和鈞事垂文兮風傳乎千古道如砥兮日用於兆人懿夫正以處中平而立矩命其同也有虞之制克彰稱其謹焉宣父之言可取故能用該仁里象合天文既左旋而右折量輕併而重分持平罔虧可為範於秉鈞之佐立信惟一將有助於執契之君不然則何以懸之而息彼姦詐正之而協於晨夜得平則正我之道兮允執厥中益寡裒多衆所用兮不言而化化之有孚功莫可踰立規程罔慙夫龜鏡揣鈞石寧失乎錙銖匪假垂鈞而其用不匱何勞剖斗而所爭自無方今百度惟貞萬邦承則順時設教兮靡不獲所同律和聲兮允臻其極玉衡正而三階以平七政齊而庶政不忒矣美君臣之同體猶權衡以合德宰準繩之在心庶輕重之不惑南方氣泄而雨淫地慝而傷物媼神噫濕渝色壞味雖金之堅亦失恆性始豫有佩刀甚良至是澀不可拔剖其室乃出遡陽眇視傳刃蒙脊鱗然如痏痂如黑子如青蠅之惡鋭氣中錮猶人被病然客有聞焉裒密石以遺豫沃之草腴雜以鳥膏切劘下上真質焯見躊躇四顧逌爾謝客微子之貽幾喪吾寶客曰吾聞諸梅福曰爵祿者天下之砥石也高皇帝所以礪世磨鈍有是邪豫退感其言作砥石賦我有利金兮以利為佩遭土卑而慝作兮雄芒為之潛晦如景昏而蝕既兮與肌漆而為厲顧秋蓬之不可刜兮尚何遊乎髖髀之外利物蒙蔽材人惆悵俾百汰之至精蟠一檢而多恙豈害氣之獨然兮將久不試而然彼屠者之刀兮獵者之鋋不灌不淬兮糅錯銜鉛日鼓月揮兮刲腴擊鮮睨㸌火蒦以耀芒滃淫夷而騰羶豈不以涉暑而蒙沴兮鼎用之而成妍有客自東遺豫越砥圭形石質蒼色膩理剗其鱗皴滑以滫瀡如衣浣垢如鼎出否霧盡披天萍開見水拭寒焰以破眥擊清音而振耳故態復還寶心再起既賦形而終用一蒙垢焉何恥感利鈍之有時兮寄雄心於瞪視嗟乎石以砥焉化鈍為利法以砥焉化愚為智武王得之商俗以厚高帝得之傑才以奏得既有自失豈無因漢氏已還三光景分隨道闊狹用之得人五百餘年唐風始振懸此大砥以礱兆民播生在天成器在君天為物天君為人天安有執礪世之具而患乎無賢歟山陽故城遺趾數雉四百之運終於此墟裔孫作賦蓋憫漢也辭曰我止行車霣涕於山陽之墟是何蒼莽與慘悴舂陵之氣兮焉如踣昌運於四百辭至尊而伍匹夫有利器而倒持兮曾何鋩刃之足舒懿王迹之肇基暨坤維之再敷邈汜陽與鄗土恍蛇變而龍攄痛人亡而事替終此地焉忽諸嗟乎積是為治積非成虐文景之欲處身以約播其德芽迄武乃穫桓靈之欲從心於昏爇其妖焰逮獻而焚彼伊周不世兮姦雄乘釁而騰振物象摧以易位被虛號而陽尊終勢殫而事去胡竊揖讓以為文嗚呼維神器之至重兮蓋如山之不騫使人得譬乎逐鹿固健步者所先諒人事之云爾孰云當途之兆也自天亂曰久矣莫可追升彼墟兮噫嘻獨遺武兮貽後王之元龜豫既謫於武陵其地故郢之裔邑與夜郎諸夷錯雜繫乎天者陰伏陽驕繫乎人者風巫氣窳是以囂氛浮浮利於樓居城之麗譙實鄰所舍四垂無蔽萬景坌入因道其遠邇所得為楚望賦云翼軫之野祝融所司陰迫而專專實生沴天濡而雺土泄而泥氣罕淑清兮淫氛曀曀中人支體兮為瘥為瘵以曠滌煩兮利居高於物外我卜我居於城之隅宛在藩落麗譙渠渠四阿垂空洞戶發樞眸子不運坐陵虛無歲更周流時極慘舒萬象起滅森來貺豫櫺軒之外㣥山巃嵷岡陵靡陀勢若相拱出雲見怪窈蔚森聳露夕霞朝望如飛動簷廡之下大江澒洞支流合輸泄入雲夢羲和望舒出沒兩涯涵泳之族聱耴咸次呀秋水灌盈漩石飄沙流枿軒昂舞於盤渦逮及收潦淡如醁醽白石磷磷倒影羅生蘋末風起有文無聲悠遠烟帛丿糸與空蒼然湘沅之春先令而行臘月寒盡溫風發榮土膏如濡言鳥嚶嚶三星嘒其曉中植物颯以飄英雲歸高唐草蔽洞庭目與天盡神將化并圓方相函遊氣杳冥熙熙藹藹藻飾㣥形枿樹童邱積空凝青環洲曲塘含景曜明恢台之氣發於春季涉夏如鑠逮秋愈熾土山焦熬止水瀵沸翔禽跕墮呀喙垂翅曦赫歊蒸陽極召陰二儀交精下上相歆雲興天際歘若車蓋凝目盧未瞬彌漫霮䨴驚雷出火喬木糜碎殷地爇空萬夫皆廢懸霤綆縋日中見昧移晷而收野無完塊少陰之中景物澄鮮丹葉星房燭耀川原夕月既望曜於丹泉上鏡下冰湔塵濯烟宿麗潛芒獨行高躔皓一氣之悠悠潔有形而溢清元杳微明以斐亹想遊目於化先夜無眹以徂征金霞暈乎海壖明星方揚斜漢西懸璿柄如墮半沈層瀾雞啁口析而晨鳴兮日荏苒以騰晶動植瞭兮已分山川鬱乎不平復人寰之喧卑洶浩浩以營營追向時之景光不可驟得以再更意華胥之夢還猶仿像而馳精日次於房天未降霜百卉猶澤水泉收脈故道朘削衍為廣斥水禽嬉戲引吭伸翮紛驚鳴而決起拾綵翠於砂礫於時北風振槁揚埃蕭條邊聲與雁俱來寒氛委積萬竅交激楚雲改容飛雨凝滴灑林遞響淅瀝梢槭飛電照雪以騰光柔蔬傲霜而透坼躔次殊氣川谷異宜民生其間俗鬼言夷招三閭以成謠德伏波而構祠投粔籹以鼓楫豢鱣魴而如犧蟠木靚深孽妖憑之祈年去厲蠲敬祗威擊鼓肆筵河旁水湄薦誠致祝卻略躨跜渚居鮮食大掩水物罟張餌啖不可遁伏顯舉潛縋晝撞夜觸設機沈深如拾於陸彼游鯈之瑣類咸跳脫於窘束雖三趾與六眸時或加乎一目亦有輕舟軒輊泛浮拖綸往復馴鷗相逐暮夜澄寂嘯歌㣥族傖音俚態幽怨委曲逗疏柝於江城引哀猿於山木巢山之徒抨木開田灼龜伺澤兆食而蟠鬱攸起於巖阿騰絳氣而蔽天熏歇雨濡穎垂林顛盜天和而藉地勢諒無勞而有年罷士間人逸為末作求金渚涘淘汰瀺灂流注濻沱繁光熠爚貪賈來貿發於懷握無翼而飛潤於豐屋哂耘耕之悒悒徒胼胝以自鞠我處層軒日星回環閲天數而視民風百態變見乎其間非耳剽以臆說兮固幽求而縱觀觀物之餘遂觀我生何廣覆與厚載豈有形而無情高莫高兮九閽遠莫遠兮故園舟有楫兮車有轄江山坐兮不可越吾又安知其所如恍臨高以觀物相國中山公賦秋聲以屬天官太常伯唱和俱絶然皆得時行道之餘興猶有光陰之嘆况伊鬱老病者乎吟之斐然以寄孤憤碧天如水兮窅窅悠悠百蟲迎莫兮萬葉吟秋欲辭林而蕭颯潛命侶以啁啾送將歸兮臨水非吾土兮登樓晚枝多露蟬之思夕草起寒螿之愁至若松竹含韻梧楸蚤脫驚綺疏之曉吹墮碧砌之涼月念塞外之征行顧閨中之騷屑夜蛩鳴兮機杼促朔雁叫兮音書絶遠杵續兮何泠泠虛窗靜兮空切切如吟如嘯非竹非絲合自然之宮徵動終歲之別離廢井苔冷荒園露滋草蒼蒼兮人寂寂樹槭槭兮蟲咿咿則有安石風流巨源多可平六符而佐主施九流而自我猶復感陰蟲之鳴軒嘆凉葉之初墮異宋王之悲傷覺潘郎之么麼嗟乎驥伏櫪而已老鷹在鞲而有情聆朔風而心動盼天籟而神驚力將痑兮足受紲猶奮迅於秋聲魯文六年秦伯任好卒以子車氏之三子奄息仲行針虎為殉皆秦之良也國人哀之為之賦黃鳥君子曰秦穆之不為盟主也宜哉先王違世猶貽之法而况奪之善人乎是以知秦之不復東征也秋季月吾西遊汧渭出於岐雍之間於古道傍得三良冢心甚哀之涕泗者久之而去辭曰昨宿岐城曉涉渭東霜凌雪結飛沙亂蓬中野躊躇屆此古墟野人曰即車氏之冢方驅駕班如久而咤曰吾嘗讀舊史矣古者秦氏大於穆公出師則寧東夏用賢則霸西戎大邦服其禮小邦畏其雄謀已集戰亦武不能勤王不為盟主者何居以滅天之良喪人之特百夫仰系一朝而踣可哀也哉宛其三子遭時迍邅主已即世身皆靡全指冥茫而為期撫昭世而坐捐方惴惴以臨穴且哀哀而號天闕從有言於寒原莽蕩千里回眺無垠上刺衰德下傷幽魂挂驂壠樹脫劍山門掇野芳以為薦汲行潦而充樽矧今情之猶悲諒古恨之潛吞死而不作吾誰與言代事浩溔人壽爾夭言念君子中心悄悄哀生人之長慟赴永夕之莫曉歸去來兮不可留且悲吟於黃鳥古稱思婦已歷九秋未必有是舉為深愁莫高者天莫濬者泉推以極數無踰九年伊我之謫至於數極長沙之悲三倍其時廷尉不調行當跂而天有寒暑閏餘三變朝有考績明幽三見顧堯之民兮亦昏墊而有嘆歎息兮徜徉登高高兮望蒼蒼突辨之夫我來始黃合抱之木我來猶芒山增昔容水改故坊童者鬱鬱兮涸者洋洋天覆地生蓊兮無傷彼族而居嚮之投荒彼軒而遊昨日桁楊信及澤濡俄然復常稽天道與人紀咸一僨而一起去無久而不還棼無久而不理何吾道之一窮兮貫九年而猶爾噫不可得而知庸詎得而悲苟變化之莫及兮又安用夫肖天地之形為始余失臺郎為刺史又貶州司馬俟罪朗州三見閏月人咸曰數之極理當遷焉因作謫九年賦以自廣是歲臘月詔追明年自闕下重領連山郡印綬人咸曰美惡周必復第行無恤歲杪其復乎居五年不得調歲二月有事於社前一日致齊孤居慮靜滯念數起伊人理之不可以曉也將質諸神乎謹貢誠馳精敢問大鈞其夕有遇寤而次第其辭以為賦圓方相函兮浩其無垠窅冥翕闢兮走三辰以騰振孰主張是兮有工其神迎隨不見兮強名之曰大鈞欹以臨下兮巍乎雄尊天為獨陽高不可問工居其中與人差近身執其權心平其運循名想像或可以訊曰嘻蒙之未生其猶泥耳落乎埏埴惟鈞所指忽然為人為幸大矣工賦其形七情與俱嗇智不受之以愚坦坦之衢萬人所趨蒙一布武化為畏途人或譽之百說徒虛人或排之半言有餘物壯則老乃惟其常否終則傾亦不可長老先期而驟至兮否踰數而叵量雖一夫之不獲兮亦大化之攸病謹薦誠上問兮俯伏以聽是夕寢熟夢游乎無何有之鄉抗陛級乎重霄兮異人間之景光中有威神巾金甲而煒煌命之使前兮其音琅琅曰吾大化之一工也居上臨下廉其不平汝今有辭吾一以聽播形肖貌生類積億士冖䂞籥圈匡鎔鍊消息我之司智初不爾嗇不守以愚覆為汝賊既賦汝形輔之聰明盍求世師資適攸宜胡然抗志遐想前烈倚梯青冥舉足斯跌韜爾智斧無為自伐鑿竅太繁天和乃泄利徑前誘多逢覆轍名腸內煎外火非熱今哀汝窮將厚汝愚剔去剛健納之柔濡塞前竅之傷痍兮招太和而與居貰以待人兮急以自拘道存壼奧無示四隅軋物之勢不作兮見傷之機自無汝不善用吾焉嗇乎且夫貞而騰氣者膴膴健而垂精者昊昊我居其中猶輪是蹈以不息為體以日新為道倮鱗蜚走灌莽苞皂乃牙乃甲乃殈乃剖陽榮陰悴生濡死槁各乘氣化不以意造賦大運兮無有淑惡彼多方兮自生醜好爾奚不德余以驟壯姑尤我以速老耶觀汝百為又或不然赤子哇哇忽其能言亦既名物幾時蹁蹮春耕其邱投種之日釋耒而嘆何時實栗望所未至謂余舒舒欲其久留謂我瞥如我一子二誰之曲與彼蒹葭之蒼蒼兮霜霰苦而中堅松竹之皸皴索籜兮不若榯筍之可憐納材葦而構明堂兮固容消而力完揚且之皙兮不可以常然當錫爾以老成蒼眉皓髯山立時行去敵氣與矜色兮噤危言以端誠俾人望之侮黷不生爾之所得孰與壯多不善處老問余而何授教而回蘧蘧形開嚮之威神孰為來哉乃遽衣促盥端慮滌想委佩低簪持簿叩顙而言曰楚臣天問不酬今臣過幸一獻三售始厚以愚終期以壽忘上問之罪濯已然之咎心增故術腹飽新授馳神清元拜手稽首敕周制倉人以辨於邦用廩人以待乎匪頒後代或均輸或平糴皆周官倉廩之職也於戲王者藏於天下吾何私焉收斂以時儲蓄必謹俾夫凶荒無患貧富克均宜味京坻之詩勿守豆區之限可敕漢制尚書郎四人一人主營部成帝又置客曹主外國戎狄事皆今主客之任也其後或東西列職左右分名統彼行人之家綏其外臣之務朝聘則定位宴會則辨儀穆我四門深於九譯用委藳街之政克資粉署之賢可敕周以司會質歲成漢以計相經國用或考百官之要或制三年之期稽以簿書辨其名物俾夫會算必得經費無差充選望郎以臨計吏可敕詩云雨我公田遂及我私蓋美大田之盛思賢主之詩人必先公而後私者借力而耕其來尚矣周以司徒蒞職漢以侍郎訓田今則務切如雲任專列宿總於豫政克藉公才可敕太子太傅古今之重任也其使吾子目見正事耳聞正道左右前後無非正人繄爾太傅之力久虛其位式佇端人以爾命之朕無慚德可敕禮云三王之教太子入則有保出則有師是以教諭而德成也其實一焉必擇恭敬溫文以輔道其德使吾太子觀爾之道景行之無人則虛不求充位校德而命其稱厥官可
