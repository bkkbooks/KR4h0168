front:
  text: 全唐文欽定全唐文卷九十一昭宗二
  hash: sha256:e24df694f182cdd76efca9c8cbb9f03936adc8759ceb1aa9f6ecb99da6e846e4
body:
  text: 有國之規無先學校理官之要莫尚儒宗故前王設塾庠陳齒冑所以敷揚至道宏闡大猷者也國學自朝廷喪亂巳來棟宇摧殘之後歲月斯久榛蕪可知宜令諸道觀察使刺史與賓幕州縣文吏等同於俸料內量力分抽以助修葺大海所以長百川者下流必納大地所以載萬物者有質皆容哲后體之事無常勢弔人拯溺則龔發王師錄舊棄瑕則大開法網斷自朕志又何愧焉陳敬瑄發跡禁軍遂居大鎮因緣遭遇窮極寵榮先皇帝頃屬艱難遂至巡狩敬瑄當鎮都會頗罄忠誠大則有天下赴難之師皆求宿衞次則有官司奔走之吏重創朝廷玉帛波輸梯航露集實竭勇智備極經營度支日費而未省告勞供饋星煩而竟無橫斂全由盡節果叶中興朕初奉宗祧未熟政理遽忘前績俄至興師責楚子之包茅爾雖曠職忘公孫之豆粥予亦無恩致我勞臣莫明素志近者視朝無事乙夜觀書則盧綰之在四夷尚堅宿衞周勃之居一縣足表厚誣前史具存殷鑒何遠矧朕沖眇敢忘勳勞相印兵符高爵顯位既從昭雪寵宜如初勉思禍福之門重契君臣之分抑人情而遵天道既巳無疑思福善而誡禍盈便當自省王建顧彥朗等久屯師旅頗罄忠勤盡懷頗牧之謀俱奉及之戍眷言勳效常所歎嘉今則大布寬仁永安詿誤在稟垂櫜之令勿辜偃革之恩便令部領師徒各歸所任其迴戈將士等仰彥朗王建以奉本道上供錢物量事優賞訖奏兼聞楊晟等深知逆順首率歸投陳勁草之心備輿櫬之禮書之信史永播忠規敬瑄重作藩侯列牧復為州將勉思和叶以保初終無搆厲階重貽伊戚敬瑄可開府儀同三司太師兼中書令成都尹上柱國潁川郡王食邑四千戶食實封八百戶充劒南西川節度副大使知節度事管內觀察處置統押近界諸蠻及西山八國雲南安撫制置營田供軍糧料等使於戲刻舟求劒取笑古人膠柱調瑟故難忘理茲以通變冀息干戈苟有利於蒼生又何辭乎改作布告遐邇咸使聞知夫賞有功而刑有罪饗國明規邪務去而任無私君人大節其有顯犯典憲謀危宗祧難貸大刑式謝四海崖州流人李周潼驩州流人段詡儋州流人西門君遂雷州司戶參軍杜讓能等結為奸黨請發禁軍假言防託山南心乃攻伐近鎮傾危宗社讒搆忠良包藏禍心附會狂計昊穹降監宗廟炳靈大臣繼有封章列藩瀝懇論奏朕親鞫問罪狀顯然須行憲章諒非獲巳於戲朕以沖眇嗣膺丕圖任用之閒固無疑事而讓能一居台鼎八換星霜必謂能罄忠誠不辜所仗殊不知手操國柄身作亂階政以賄行化由財進舉枉錯直愛憎繫於一時鬻爵賣官聚斂逾於巨萬仍復舉倍息之利恣兼并之心市肆貨財曰歸私第隣伍店宅旋入所居政事決於胥吏奢華縱於婦女邱某一家杖殺曾不奏聞湖外二年兵戈曾闕敗闕或以闕益藏或以狂誤交通朕以久務含宏未能決謫一旦彰露萬口咨嗟君遂等始終同謀表裏相濟納貨則更相問遺謀人即放還闕至於烟塵四郊紛被九陌擁兵而固請巡幸差人而縱火宮中頃刻之閒警蹕無禁綴旒累卵未足為危四罪既誅中禁立定國法斯在朕何敢私尚慮道途傳聞遠近誤謬四海之內未委事端故降命書明示天下凡在臣庶宜體朕懷朕以景宣全瓘行實繼鵬為表裏之奸謀縱干戈於雙闕烟塵倏忽劫殺縱橫朕偶脫鋒鋩遂移輦輅所為巡幸止在近郊蓋知卿統領雄師駐臨蒲坂累飛書詔繼遣使人期卿以社稷為憂君親在念必思響應速議龔行豈謂將涉兩旬未有來表憂虞是切寢食不遑豈忠義不切疚懷而道途或有阻滯今則專令親信懇託勳賢故遣延王戒丕丹王允與供奉官王魯紆等宣示卿宜便董貔貅徑臨邠鳳蕩平妖穴以拯阽危是所望也昨延王迴言卿憂時體國執禮輸忠接遇之閒周旋盡節備知肺腑識我恩榮靜惟尊主之心果契知臣之分朕欲取今月二十四日卻復都城冀寧兆庶倚我勳德有若長城速伸翦盪之謀以慰黔黎之望邠州節度副使崔鋋破城之時勿令漏網鋌與崔昭緯去年朋黨交結王行瑜搆合禍胎原繇此賊付四面行營知悉朕猥以眇身恭臨大寶修前王之法度奉列聖之紀綱未嘗以喜怒之心行其賞罰唯務以誠信之道示於寰區有功有勞既不恡於爵祿負恩負法寧可貸其誅夷是謂至公庶臻理道左降官崔昭緯頃居內署粗著微勞擢於侍從之司委以燮調之任不能忠貞報國端慎處身潛交結於姦臣致漏泄於機事星霜累換匡輔蔑聞其罪一也又快其私仇輒恣陰謀託崔鋋之險巇連行瑜之計畫遂至稱兵向闕怙衆脅君故宰臣韋昭度李谿並以無辜見害幾危宗社顯辱君親其罪二也及行瑜敗滅京國甫安而乃自懼欺誣別謀託附又於藩閫潛請薦論不唯苟免罪愆兼亦再希任用貪榮冒寵僭濫無厭敗俗傷風賢愚共鄙其罪三也又將厚賂欲結諸王輕侮我憲章玷瀆我骨肉貨財之數文字具存賴諸王作朕腹心嫉其蠹害盡將昭緯情款兼其親吏姓名直具奏聞拒其求託昭緯曾居宰輔久歷清崇但欲逞其回邪都不顧其事體觀其識見實駭聽聞其罪四也自姦邪既露情狀難容尚示寬恩未行嚴憲投於荒裔冀其自新而不能退省過尤恭承制命速赴貶所用守常規而猶自務宴安尋聞所在留駐攪擾藩鎮侮慢朝章曾無懍畏之心可驗包藏之計罔知咎唯謗朝廷其罪五也朕以恩澤者帝王之雨露刑法者邦國之雷霆無雨露則庶物不榮無雷霆則萬邦不肅體天道以化育遵王度以澄清罪既昭彰理難含垢凡百多士宜體予懷其崔昭緯宜差使往所在賜自盡鎮國軍節度使韓建忠貫雪霜義堅金石十陳章表備竭憂國之誠一詣行宮愈驗愛君之志況華州城壘牢固糧儲贍豐兵士又免遠行車輿且絕他慮卿武抱七德瑞應四靈挺生德門佐我丕祚綵衣就養深知百行之原布被奉家不以三公之貴朕聞卿高節獎卿崇勳遷幸巳來社稷是託卿宜每關朝政莫惜揣摩既位列大臣亦不為越分至於道路警晨夜隄防皆佇良籌用致高枕無令奔軼以慰焦勞諸道節度使知卿至忠服卿威望卿宜各移書檄告以安危使有兵者陳勤王赴難之謀豐財者展急病上供之效合成忠孝同濟艱難啟我中興允屬上將山河為誓不在他人卿始以勤儉鎮關輔為列嶽準繩近以忠赤扈和鑾立大朝綱紀誠恪備盡豐省中規下有慰於孝思上無累於供億創行廟之功也羣后在廷盛典咸舉復累朝之廢墜崇萬代之本根建儲宮之效也而又請散兵甲大斥奸邪忠言屢聞成績可數以身許國其心動天雖仲尼興微管之言漢祖有必勃之謂方用經濟殊曰寂寥永言茂恩詎非異數但念成人之美君子所先執德不回格言斯尚是用寢美號重封之澤就謙光崇讓之規足以警勵貪夫教化疲俗巳議依允尤切歎嘉卿才本濟時道惟師古致君不欺於辱市憂國每至於忘家自朕薄狩近關倏踰周歲備見忠勤之效莫非傾盡之必允謂良臣宜膺重寄會同州元戎失職軍旅不安況接行朝尤思得帥是用資爾兼領鎮乎危邦冀疲瘵之漸蘇而烟塵之徹警何乃遽陳章表過有撝沖方藉當仁豈宜多讓固難依允無至再三食君之祿合務於盡忠秉國之鈞宜思於致理其有謺膺異渥繼執重權遽萌狂悖之心忽構傾危之計人知不可天固難容扶危定亂致理功臣開府儀同三司守司空兼門下侍郎同平章事充太清宮使宏文館大學士延資庫使諸道鹽鐵轉運等使判度支上柱國魏國公食邑五千戶崔允奕葉公台蟬聯珪組冠歲名升於甲乙壯年位列於公卿趣向有聞行藏可尚朕採於羣議詢彼輿情有冀小康遂登大用殊不知漏巵難滿小器易盈曾無報國之心但作危邦之計四居極位一無可稱豈有都城合聚兵甲暗養死士將亂國經聚貔武以保其一坊致刁斗遠連於右輔始則將京兆府官錢委元規召卒後則用度支使榷利令陳班聚兵事去公朝權歸私室百辟休戚由其顧盼之閒四方是非繫彼指呼之際令狐渙姦纖有素操守無堪用作腹心共張聲勢遂令濫居深密日在禁闈罔惑朕躬偽行書詔致茲播越職爾之由豈有權重位崇恩深獎厚曾無惕厲轉恣睢盱顯構外兵將圖不軌朕以士庶流散兵革繁多遂命宰臣與之商議五降內使一貢表章堅臥不來拒召如此況又拘留庶吏廢闕晨趨人既奔驚朕須巡幸果見兵纏輦轂火照宮闈烟塵漲天干戈匝野致朕奔迫及於岐陽翠輦未安鐵騎旋至圍逼行在焚燒屋廬覩此阽危咎將誰執近省全忠章表兼遣幕吏敷陳言宰臣繼飛密緘促其兵士西上靜詳構扇熟測包藏無功及人為國生事於戲君人之道委之宰衡庶務殷繁豈能親理盡將機事付爾主張負我何多構亂至此仍存大體不謂無恩可責授朝散大夫守工部尚書宦官之興肇於秦漢趙高閻樂竟滅嬴宗張讓段珪遂傾劉祚肆其志則國必受禍悟其事則運可延長朕所以斷在不疑祈天永命者也先皇帝嗣位之始年在幼沖羣豎相推奄專大政於是毒流宇內兵起山東遷幸三川幾淪神器迴鑾之始率土思安而田令孜妒能忌功遷搖近鎮陳倉播越患難相仍洎朕纂承益相侮慢復恭重遂逞其禍道弼季述繼其凶幽辱朕躬淩脅孺子天復返正罪己求安兩軍內樞一切假借韓全誨等每懷憤惋曾務報讐視將相若血仇輕君上如木偶未周星歲竟致播遷及在岐陽過於羈紲上憂宗社傾墜下痛人庶流離茫然孤居無所控告全忠位兼二柄深識朕心駐兵近及於三年獨斷方誅於元惡今謝罪郊廟即宅宮闈正刑當在於事初除惡宜絕其根本先朝及朕五致播遷王畿之甿減耗太半父不能庇子夫不能妻室言念於茲痛深骨髓其誰之罪爾輩之由帝王之為治也內有宰輔卿士外有藩翰大臣豈可令刑餘之人參預大政況此輩皆朕之家臣也比於人臣之家則奴隷之流恣橫如此罪惡貫盈天命誅之罪豈能捨橫屍伏法固不足矜含容久之亦所多愧其第五可範巳下宜並賜死其在畿甸同華河中並盡底處置訖諸道監軍使巳下及管內經過并居停內使勅到並仰隨處誅夷訖聞奏巳令準國朝故事量留三十人各賜黃絹衫一領以備宮內指使仍不得輒有養男其左右神策軍並令停廢朕以眇身託於人上皇天不佑寇難薦興外無桓文內無平勃每一念至芒刺在懷卿忠義貫日至誠許國三川不寧一麾巳定清淨中原再造我國家朕有望於卿也朕去年在鳳翔與茂貞熟計誅韓全誨等以謝全忠崔允固請廢兩軍盡去北司朕止欲誅有罪之人全忠允必欲盡殺朕方危迫不得不從而允與鄭元規朋助全忠閒諜誘惑欲起兵收鳳翔次及西川天人助順崔鄭就誅昨正月二十日朕御樓撫慰軍氓具告允等罪狀宰臣裴樞等受全忠密旨亟奏鳳翔川軍巳及咸陽脅朕遷洛後二日東兵擁朕出長安朕與后妃宗室吏人匍匐就道艱苦萬狀六軍偕廢朕益孤危再賜茂貞密詔使告卿糾合諸鎮共迎朕西歸偵知全忠遷朕至洛盡斥內外侍衞雖有書詔不可復通藩鎮諸侯或信偽詔彊者歸之則賊勢轉盛卿自先帝時立功數助朕征討受賊誣構寧不冤憤計此賊必先討鳳翔次及卿與河東然後取天下卿安忍負高祖太宗三百年德澤而束手黃巢餘黨宜亟告茂貞繼徵克用行密及襄幽鎮魏同舉勤王之師迎朕還京朕兵盡力窮危及宗社臨軒西望灑血告卿我國家化隋為唐奄有天下三百年之盛業十八葉之耿光朕自纉丕圖垂將二紀雖恭勤無怠屬運數多艱致寰宇之未寧覩兵戈之屢起賴勳賢協力宗社再安豈意宮闈之閒禍亂忽作昭儀李漸榮河東夫人裴貞一潛懷逆節輒肆狂謀傷疻既深巳及危革萬機不可以久曠四海不可以乏君神鼎所歸須有纉繼輝王祚幼彰岐嶷長實端良裒然不羣予所鍾愛必能克奉丕訓以安兆人宜立為皇太子仍改名柷監軍國事於戲孝愛可以承九廟恭儉可以安萬邦無樂逸遊志康寰宇百辟卿士佑茲沖人載揚我高祖太宗之休烈張實等忠勇冠時韜鈐出衆俊輕鵰鶚氣激風雲六奇之妙術難偕三略之英謀有素拔山背水曾不遜於昔賢左馬右人巳無慙於今日但以中興啟運舉善從宜將激勸於功庸合甄陞於義烈豈可尚淹憲省未副陟明宜進霜威勉承光寵更觀後效勿替前勞朕惟兵興以來人情厭苦苟有預備多免侵傷錢鏐能於本鄉建築城壘況聞不擾蒸庶盡出軍行省閱奏章良用嘉歎宜依所奏者未息兵戈須依營寨錢鏐安人撫衆爰建危牆累有奏陳須賜營額宜以安衆為務仍不致妨耕農牒至準勅者夫勝殘去殺古聖之格言阜俗安人前王之令典逆賊楊守亮楊復恭楊守信等結於黨援聚作奸邪謂天可欺謂神可罔言惟訕上既騐於無君動即謀人非因其有道枉殺元舅沈溺一家闕節旄阻留恩命隔西川之貢奉絕數鎮之綱商欲使朝廷支費不充又遣藩方資糧有闕擢髮不足以數罪糜軀未足以當辜萬姓脂膏苛斂作奉身之具一方丁壯盡驅為不軌之兵以至夫不得耕婦不得織愁歎尋盈於道路瘡痍僅遍於鄉閭每切焦勞不忘頃刻昨者幸賴股肱重寄心膂元臣共興貔武之師盡破豺狼之窟今則烟塵頓息戈甲以寧成闕堵之期用遂息肩之泰得不去其前弊示以新恩爰興惻隱之心乃降優宏之命應興元界內及洋州金商等州兵火傷殘之後各委長吏切加安存至於賦稅並宜酌量矜減其雜色差役悉仰權停如有百姓軍人前資見任凡百詿誤一切不問其京畿界內有兵馬屯駐之處亦委京兆府量宜蠲免俾令通濟無令重傷疲瘵其鳳翔邠寧秦州東川華商等道將士等二年于役苦戰摧凶竟於蕩平寧忘酬獎應立功大將節級等各委本道節度使定其功狀具名銜聞奏當議處分又飛輓之勞宴賞之費盡出方面不在朝廷誠曰嘉謀亦由協力應用軍巳來本判官并主掌官吏各仰分析奏聞各與獎拔於戲王者為心不忍一物失所君人御宇豈忘四海為家全資有土之臣共廣無私之化布告中外咸使聞知錢鏐押衙王高至省所進版築茆山安衆營圖一面事具悉卿茂績勤王功深守土動惟有備居必思危以數邑之地里稍遙慮外寇之窺覦為患爰興版築式固金湯況力役自盡於介夫勞擾豈問於黔首尋則隣封充斥果使衆庶保安既彰先見之明復有及人之利閱其繪事實驗長才豈惟列在縑緗固可垂於素嘉歎之極寐興不忘想宜知悉冬寒卿比平安否遣書指不多及高宗夢傅說周文遇子牙列位則三公弼諧則四輔朕纂承鴻緒克紹寶圖思致理平未臻至化今大朝方興文物須擇賢良冀於僉選之閒以觀廊廟之器今年新及第進士張貽憲等二十五人並指揮取今月九日於武德殿祗委中書門下準此處分仍付所司朕自君臨寰海八載於茲夢寐英賢物色巖野思名實相符之士藝文具美之人用立於朝庶裨於理且令每歲鄉里貢士考覈求才必在學貫典墳詞窮教化然後升於賢良之籍登諸俊造之科如聞近年巳來茲道寖壞鷃多披於隼翼羊或服於武皮未聞一卷之師巳在遷喬之列永言其弊得不以懲昨者崔凝所考定進士張貽憲等二十五人觀其所進文書雖合程度必慮或容請託莫致精研朕是以召至前軒觀其實藝爰於經史自擇篇題今則比南郭之竽音果分一一慕西漢之辭彩無愧彬彬既鑒妍媸須有升黜其趙觀文程晏崔賞崔仁寶等四人才藻優贍義理昭宣深窮體物之能曲盡緣情之妙所試詩賦辭藝精通皆合本意其盧贍韋說封渭韋希震張蠙黃滔盧鼎王貞白沈崧陳曉李龜禎等十一人所試詩賦義理精通用振儒風且躡異級其趙觀文等四人并盧贍等十一人並與及第其張貽憲孫溥李光序李樞李途等五人所試詩賦不副題目兼句稍次且令落下許後再舉其崔礪蘇楷杜承昭鄭稼等四人詩賦最下不及格式蕪纇頗甚曾無學業敢竊科名浼我至公難從濫進宜令所司落下不令再舉其崔凝爵秩巳崇委寄殊重司吾取士之柄且乖慎選之圖辜朕明恩自貽伊咎委中書門下行勅處分奏來其進士張貽憲等二十四人名準此處分賜陸扆馮渥銀器分物其落下舉人並賜絹三匹國家文學之科以革隋弊歲登俊造委之春官蓋欲華實相符為第一用近寖訛謬虛聲相高朕所以思得貞正之儒以掌其事而聞刑部尚書知貢舉崔凝百行有常中年無黨學窺典奧文贍菁英洎遍踐清華多歷年數累更顯重積為休聲遂輟其憲綱任之文柄宜求精當稍異平常朕昨者以聽政之餘偶思觀閱臨軒比試冀盡其才及覽成文頗多蕪纇豈宜假我公器成彼私榮既觀一一之吹盡乏彬彬之美且乖朕志宜示朝章尚遵含垢之恩俾就專城之任勉加自省勿謂無恩可貶合州刺史有虞氏之為君始言省狩周襄王之告難乃曰出居或肆覲於他邦或播遷於近服然則地圖之內車轍所臨備庶官而取象拱辰入九貢而以時述職是云守宇皆可建都昔者德祖省方平戎服國升漢中之列郡同諸府以正名藩翰之光典章實重朕越在關輔屢經歲時苟寬失馭之憂蓋獲視朝之所鎮國軍節度使韓建始者星馳感憤雪涕奉迎邀天力以來同激人情而共固以茲駐蹕安類覆盂邑無夜犬之驚野有春耕之樂今則元龜告吉六馬將還望山河而信是金湯顧宮室而若無風雨眷言至此我實懷之俾慰衆心爰遵故事宜改為興德府其所置官員資望一切與五府同鄭縣升為次赤諸縣為次畿其將校等並賜華州安蹕功臣鎮東軍節度使左押衙充明州都押衙銀青光祿大夫檢校刑部尚書兼御史大夫上柱國持節辯州軍事樂仁厚居總大藩之萬里出揚阜俗之雙旌況辯州昭五嶺之衝南浦控三峽之要俾爾勳忠列於奏薦隼飛萬里熊耀雙旛右副爾知同安疆域故勅省所奏進重修建天柱觀圖一面事具悉我國家襲慶仙源遊神道域普天之下靈跡甚多然自兵革薦興基址多毀況茲幽邃豈暇修營卿考一境圖經知列聖崇奉親臨勝概重葺仙居仍選精慤之流虔備焚修之禮冀承元貺來佑昌期豈惟觀好事之方抑亦驗愛君之節既陳章奏披翫再三嘉歎無巳想宜知悉冬寒卿比平安好遣書指不多及王摶材類蕭葦器劣瓶筲秉鈞無數於時情畜志常多於姦計結朋豎黨蠹物害公包聚貨財肥濃私室管領官職贍濟一門雖行降黜之寬恩未塞衆心之忿怨須歸極典方正朝章宜令所在賜自盡
