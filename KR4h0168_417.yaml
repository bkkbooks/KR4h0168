front:
  text: 全唐文欽定全唐文卷四百十七常袞八
  hash: sha256:5cda065b54f3b6eda2cba11c5966793e649f7a664d0c7dd41e4d28629a70e525
body:
  text: 臣某言臣聞陽倡陰和合之則理任重力寡強之則顛苟稱竊位何所逃責伏惟陛下以大聖之資除去姦惡臣荷承正刑之後擢在台衡不能有所建明坐致災旱燮理之任虧紊固多邦畿之間愆亢特甚陛下發勤閔之慮躬旰昃之勞大憂庶獄並走㣥望而踰夏涉秋天則不雨垂落復散人其謂何伏以東漢之制存乎舊史或陰陽失節水旱不時必策免三公勵精百揆蓋以其陽倡而不和力薄而位崇所以答天譴也今上元赫赫如此舊史昭昭如彼臣尚以愚劣偷安廟堂負乘不慙靦冒難處伏乞解臣所職更擇良才省致旱之由求作霖之輔則萬姓咸賴百穀用成上寬聖憂下塞人望臣敢尸位重祿以負明時無任兢惶惕厲之至臣某言伏奉今月恩制以臣兼東都留守河南淮西山南東道副元帥伏以東征之寄相宅之選皆周召之臣保釐統一也故二南風化見美詩人況洛邑經陸渾之戎有舊染之俗賴陛下發皇明以燭之布陽和以煦之流散稍歸傷痍甫起然稱君師之任宜得經濟之才自河而南至於吳楚節制戎律半乎天下非宏略傑出功冠一時不可以專五侯九伯之征總衣裳兵車之會臣以衰朽薄劣待罪台司塵辱尸忝無裨朝政每趨宸陛益愧周行豈謂殊常之恩屢出非望注意之責并在微軀憂懼慚惶寸刻難措臣聞惟名與器不可假人審已量力未宜虛授若貪榮冒寵黽勉苟容神明昭昭必速其害伏望歷求百辟委之兼才以分三老之任用增九鼎之重則至公大行㣥下知勸無任懇迫之至臣某言伏奉五月二十五日恩制授臣銀青光祿大夫使持節都督福建諸軍事福建刺史充福建等州都團練觀察處置等使以今月二十一日至所部上訖臣負恩至深睿慈曲宥待罪猶近殊渥薦臨蕩滌瑕纍超遷方任寵榮非次荷懼失圖臣誠恐誠喜頓首頓首臣本性下愚起自孤賤代耕之望心在於斯經遠之謀實非所及先朝驅策以奉綸言曲承眷私纍漸階歷遂參重務有斁彞倫未申報效永負天地孽由自作罪在難容伏以宸斷察微聖慈憫下抑㣥議以屈法捨萬死以矜愚猶委藩條不坐親屬如臣之比前例所無戴感兢惶殞越無措誓將沒齒效職南荒刻責自新庶補前咎常恐惡聲已被有汙於史册朽骨縱歸實穢於泉壤豈謂天波一洗塵渣忽除面目何施灰粉亦足聖朝使過始有庸臣特賜崇階超授連率減論之貸曾未周星録用之榮頓極今日素多孱劣又乏幹能將何以式遏外虞澄清列郡幸遇德音頻降霈澤普覃惠恤困窮均省財賦盡除疾苦莫不昭蘇海隅蒼生自樂淳化臣奉宣清問遠布皇猷老少懷安抃躍相慶臣才非所任不敢冒榮必招無德之殃恐致負乘之寇伏請削除三品退守一州冀循恆資免至踰分庶回宸鑒俯恤血誠所忝榮班請授能者無任戰荷懇迫之至謹差特進試鴻臚卿臣郝誠溢奉表謝恩陳乞以聞臣鴻漸惶恐言臣本自諸生素乏經邦之具無才無行至愚至拙其所望者在寸祿代耕而已往屬先帝中興時方草昧攀附日月遭逢盛時獲奉馳驅遂蒙委遇毫髮未報哀惶靡及陛下龍飛踐阼俊乂滿朝猶顧微臣使參大政備位宰輔出入六年上不能調和陰陽下不能親輔百姓朝典隳廢聖慮憂勞其心愧恥中夜三歎況外統㣥帥遙制戎閫在臣懦劣非所堪任曩者受命而行屬西南未安中外所注雖有危難臣不合辭崔寧頃至朝廷親授經略及還方鎮事頗條理叔明獻恭並是良將自蒙擢用甚允聲實可以倚辦並堪獨任且將在閫外事得專之遠道取決恐失要會坐而臨制誠亦非宜今又靖謐臣何所效豈苟貪榮利以固寵恩蓋鎮撫四夷宰相之任也陛下不以臣薄陋待罪鼎司至於疆事不休戎車不息實得參議任其安危無以裨補皆臣之罪也何必一方之務獨有責成特乞下鑒愚懇俯停戎號則王朝無兼授之寵臣下有知止之分昧死上言冀回宸眷無任惶迫屏營之至謹奉表陳露以聞臣某言伏奉今月日恩制以臣兼河南江淮山南東道副元帥祗奉詔書俯伏流汗驚悚惶灼若無所容臣某誠惶誠恐頓首頓首臣聞將帥者四方之守中夏垣翰也上以衛社稷外以撫戎夷國容不入於軍閫戎事得專其將命漢讓韓信以安危存亡之地齊擢穰苴以文武威附之名所授既難所責亦重非才而處鮮不敗事臣固陋無識蒙國厚恩遭時備位塵辱華袞見貽胸奴之哂不副蒼生之望效拙無補六年曠官陰陽愆和政理乖度金革未戢水旱相乘常待罪於策免敢希恩於望外臣所以徘徊渥澤尚忝中樞豈持祿保身苟自容也以其瀝誠未鑒不敢固辭頃者即戎巴蜀總制㣥師屬兩川未安遂任憂責而邊患稍息方隅甫寧此蓋憑神武之威用廊廟之策不然者將顛沛是懼豈望於天幸哉陛下覆之如天容之如地矜其疾病察以愚懇特蒙優詔獲上兵符喜抃未寧遽承新命東南至海俾護諸軍外綏四國專制萬里以天子二老之任會諸侯九合之師事之濟否所繫尤大在臣懦劣非所克堪誠願飾愚磨鈍展效毫髮以報所授之恩以勤所忝之職而器非所適力又不任加之衰老事多廢忘豈可訓師詰禁以張威武伏冀求方叔南仲之賢授統一專征之寄天下大柄豈私於臣實恐傷陛下之知人干處士之橫議誓將死請輒露血誠輕黷威嚴庶回宸斷無任懇款屏營之至臣某言伏以智小識淺懇辭新命德音緬邈聖旨如初憂悸慙惶寸陰難處情有所迫再黷宸嚴冀天光之下濟期夕殞之無恨臣某誠惶誠恐頓首頓首臣聞以賢授任猶誡盈滿無德而祿固宜勇退如或不量其分苟患失之貪榮冒寵以曠職事禍之所伏亦可畏也臣孤陋疵賤自視缺然遭遇盛時謬此榮達得以貂蟬袞服趨侍雲陛擁旄仗節統護戎師崇班厚遇頓極於此退自惟省夙夜慙惶內曠論道經邦之位外乏濟河登山之功但終恩眷萬不酬一四方歸責喧喧盈耳陛下矜其不逮近罷即戎未踰旬時又辱謀帥私懷爽絶以驚以怖昔光武見事於千里之外諸將授成算而已陛下聰明神武超然過之戡濟多難犬戎大定今天下方鎮東南最寧但委之將守授以經略自可致理又何足虞豈必以不才之臣竊非據之位加之衰憊難於力強陛下知人則哲憫臣竊位之愚固當降殊私之貸開至公之選倘以懦敗事謗缺上聞雖欲宥之其可及也昧死陳乞庶鑒愚誠祈於必從不敢有隱伏冀收春雨之既降回朝陽而見燭俾不能者止實望於曲成之仁也無任懇迫屏營之至臣某言伏奉今日制書加臣銀青光祿大夫特封河南郡開國公食邑二千戶承命戰驚伏詔惶駭拜抃無次感涕失容中謝臣纍代宗儒傳經素位所以勉修學藝將業其官而文愧承家識非半古本期代耕之祿稍階載筆之地幸參近署久侍內朝謬霑雨露之恩頗甄歲月之效獲承大命謝謨訓之規載忝有司無辨論之實既虛職守常懼滿盈無日不思每期負敗當時同列咸所明知豈意朝廷方正於紀綱天地忽思於微細擢升佐輔望出㣥情陳乞靡從曠廢何甚在萬邦之化育處百辟之儀刑出自諸生猥當非據所以風雨愆候歲穀不登邊檄交馳田租減耗凡此數事職臣之由歷觀舊典合貶優秩纍因陛下奏獻封章天威俯臨愚誠屢奪雖瀝懇無報期至誠必通上仰於朝庶幾諧願受策於第是所甘心方祈獲免之時更遇非常之賜特承七命之貴超過八階仍叨五等之榮坐封千里雖庭堅謨弼之德山甫將明之才榮遇今恩亦稱踰分況臣道慙先哲識類平人未遂退還已紆聖眷頻煩寵拜實懼神明伏乞俯照血誠特回睿旨夫上有無功之授則下多不勸之嫌涓滴之勞未彰於近掖風塵之議已集於遠方所以撫心疚懷不敢奉詔拜手流汗詎容飾詞無任慙惶之至臣某惶恐言臣聞無德而祿殃咎必至又鬼神害盈而福謙蓋經籍之明言聖哲之垂誡也臣儒門孤賤行拙性愚自甘散棄豈望榮達時來驟進任遇頗重備位將相無補聖朝道惡其滿天與之疾素有氣癖兼之風眩又多煩躁事劇則昏伏以軍國重務猥承參決強策駑朽以親事任精爽潛耗病源益深近日有加曠旬彌滯食不知味所進殊少形神憔悴惘惘不樂聖慈憐憫曲念微生御膳名醫屢蒙降錫霈然有喜載感於渥恩終亦無瘳復增其沈痼豈不以祿秩過量憂負在心強其不逮之分促其有終之限以茲速戾固亦明徵且臣子之急必告君父在臣今日實堪憐憫以陛下之知臣豈獨厚其爵位也以陛下之念臣豈不存其骸骨也臣以冒寵則鄰於危殆辭榮則安於攝衛伏冀特回宸眷俯察愚誠削除官爵使養衰疾庶垂白之年受賜於陛下生成之德有過於天地無任懇迫屏營之至臣某言伏以衰疾沈綿久曠樞務憂惶迫切不敢自安所以昧死讓將相列侯印綬披瀝丹愚再有陳乞顧景待命還旨如初窮情未達轉益危困臣誠惶誠恐頓首頓首臣內顧微躬自量拙分無片善可取無一事可稱皆緣際會參務軍國尸榮竊位公責所歸且智小謀大鮮不敗事福過災生常然之理一自嬰瘵旬朔未瘳大減服食晦明異候竊料氣力衰憊恐先犬馬乞遂間退庶安形神且臣素疵賤敢期貴達常慮薄質不堪重任今祿位俱極過逾涯分致此沈痼得非害盈思自損抑冀通神理又不親政事歷受寵榮廢公曠時益用慙懼所以塵黷旒扆至於再三情迫於茲敢有所隱愚朴之性陛下素知加以危頓豈容矯飾伏望罷其新授貸以殘生昔漢魏近臣有以暮年久疾者則賜告就第或再起復位若大限未盡羸疴漸平聖慈不棄驅策非晚重得珥貂丹禁絛紫玉墀則微效獲伸所乞無幾如或殆至深慮何必暫榮儻生遂其志沒無所恨矣實冀皇天聽卑於在上太陽回舍於生成俯納誠祈退令攝衛衰朽餘齒殊私曲全受賜則多生涯之幸臣無任懇迫之至臣某言臣聞綆之短者無以汲深馬之疲者無以致遠臣實凡淺素乏器能爰自效官纍蒙驅策服勤中外三十餘年始奉將作遽加節制叨尹京觀之任兼副八座之權空勵駑鈍竟無補裨陛下寬其罪戾特見優容尚列周行更升榮級臣以殿中監依前檢校刑部尚書未經數月又集賢待制豈臣才能及此皆是明主曲成感戴殊私不忘寢食誓將竭節以報國恩而去歲以來纍嬰沈瘵形神久殆筋力漸微在假日多朝天未克顧惟所職倍益兢惶地近宮闈事繁供應統茲六尚之務不可一日缺人以臣之曠所害尤甚雖欲匍匐就列支持守官力所不任難於自勉伏乞矜臣不逮許停此官在臣血誠實惟志願無任懇迫之至臣某言臣聞為臣事君貴於無隱情有所切必以上聞苟易茲道即非盡節臣以衰憊形貌支離自冬徂春心勞力竭竊料旬月之內未能趨拜闕庭殿省務殷實憂廢失昨以所瀝上請乞罷此官天路高深未能允納伏覿墨詔冰炭交懷且人之立身大抵榮祿蓋有欲之而不得未有得之而願辭今臣務總六尚位雄九列往來中禁輝映當朝在臣私門實深慶幸若力能奉職智可效官豈敢罔冒天聽堅為飾讓推之物理況見愚衷又臣疇昔之志每懷勤恪比雖綿惙倍益殷憂小有供擬盡關心慮以茲重困轉覺疲羸伏乞天慈察臣不逮儻獲免所職俯救沉疴生成之恩無以堪比無任懇迫之至臣袞言伏奉去年十二月二十六日恩制授臣考功郎中餘如故猥降詔書特榮新命祗荷殊造若無所容臣袞誠惶誠恐稽首頓首臣本諸生素虧令望憑藉儒業遭逢聖時幸從彞序纍踐清秩得以文墨侍於軒墀五字非功四年待罪禁垣之右朝奉如綸宸扆之前夜參視草以地尤密惟才必精在臣無堪忝迹斯甚食浮之議所責何逃陛下宏獎文儒優容侍從恕其職事之闕録以歲時之深爰錫朝章俾遷郎位典掌如舊寵榮有加翺翔雲霄沐浴雨露俯伏拜賜心靈若飛效薄恩崇罔知攸措何以上報期於死節無任感戴屏營之至臣袞言伏奉今日恩旨除臣門下侍郎平章事祗奉失圖進退無據捧詔驚駭銜恩戰惶微存懇誠得自陳露臣某誠惶誠恐頓首頓首臣本書生粗傳舊業猥以文藝辱於職官去歲已前尚忝絲綸之末今年夏首遂登鈞石之司舊德名臣當朝宿齒不忝此選獨進非才撫已再思何顏自處伏以朝廷新有處分重舉典章而上稟睿謀下清庶品通於元本猶懼匪服之嫌訪於顓蒙將貽覆餗之責伏乞俯回天鑒更擇時賢則三階有協贊之功兩府無尸曠之誚無任恐惶之至臣袞言臣退省無堪恐辱寵授是以昧死上言拜手稽首讓於百辟卿士冀回宸鑒以遂至公鴻私復降墨詔未允慙赧惶怖不知所圖臣某誠惶誠恐稽首頓首臣聞左右惟賢國安在相處儀表之地當興化之源故有開必先元感幽贊軒皇則三台作配虞舜則五老同遊殷夢帝而得説周降神而生甫用能洽皇王之道致天地之和至於漢興亦用人傑爰及江表猶擇偉才當此大任固非常品臣性惟愚拙才無經濟徒以趙宮覩聖逮事先朝潁川扈蹕獲承中顧凡所履歷莫非塵忝出於始望之外不知自至之由豈謂元造曲成大明私照俾佐邦政得參廟謀竊以當今樞務之重在昔上公之任臣識非通博不可以論道文非雅正不足以經邦德不能鎮撫四夷政不能親附百姓況戎車尚駕邊患未寧方欲宏濟艱難以崇大化故非齷齪廉謹所能稱職若不自揣度苟貪寵榮寧止尸官備員期於鼎折棟撓伏乞訪求㣥議選用上才使聖朝有則哲之明臣下無虛據之責蹐天局地誓將死請如或聖眷俯回實亦天下幸甚無任懇迫屏營之至謹奉表陳乞以聞臣武言伏奉今月十八日恩制除臣黃門侍郎忽降紫泥擢升黃閣出自非望感恩戰懼臣某中謝臣才乏經綸時逢際會纍更天秩何補聖朝三踐掖垣九除憲府有慙匡正空忝觸邪犀節四持亂繩不理牙璋再建橫草無功既曠職於神州又尸官於華省屬犬戎猾夏鑾駕省方未殄國讎正當臣辱陛下分麾以討傳檄自安空隨冗從之流竟乏橫行之議尚淹致命仍更冒榮方扈宸遊遽膺夕拜久缺斯任永難其人本求英儒將備顧問素無學術何以允諧竊汙軒屏謬塵瑣闥寵榮非望祗荷失圖恩重才微難於捧戴眷深效淺祗益兢惶上答生成唯知死節無任感戴屏營之至臣某言奏事官特進試鴻臚卿臣郝誠溢至伏奉墨制優答兼賜手詔宸旨寵臨榮渥光被跪讀流汗捧抃失容臣某誠歡誠喜頓首頓首臣伏以聖慈宥過朝獎踰涯敢希身榮以冒班列昧死陳乞冀遂愚誠天覆棄瑕藩寄如舊宜勉駑鈍以效涓塵不敢稽恩有靦承命感戴欣躍仰荷殊私踧踖戰兢實憂曠職謹當宣布德澤奉行科條苦節以輯疲人誓心擬補前咎夙夜祗畏懲省微勤期於萬一以申上報無任捧戴屏營之至謹奉表以聞臣某言臣冒犯刑章合當萬死曲蒙慈貸特賜再生仍假分符更承寵授感恩待罪心魂戰越以九月十一日到州上訖臣某誠惶誠恐頓首頓首臣凡賤末品非才冒榮虛忝國恩實昧朝典尸榮無補公責所歸竊自循省早宜譴黜永惟光顧未答殊私慙負至深衷惶靡及陛下以大聖承統以至明照臨孝思感於天地儉德齊於堯禹道在還淳化先無事臣宜進賢以報國同力以守公而乃輕奏忠良苟循愚執豈非臣褊心失措躁遽而然亦是速戾之時迷誤至此負恩至重自孽何逃處之嚴刑猶未逭責豈謂特回宸斷俯降天慈矜臣蠢愚憫臣孤弱全其將朽之骨復其已逝之魂俾奉藩條獲從職守悚丨勇懼荷罔知所圖臣自辭闕庭深省罪釁未嘗頃刻輒忘悔尤終朝再馳每懷懲戒終夜不寐每思兢慙尚偷餘生誓將改過敢惜微命以自懷安敬勵丹誠庶答鴻覆況親人之寄在遠尤切謹當宣揚聖化慰撫海隅少安疲氓以展微效伏以差使上謝有虧格文局蹐憂惶不敢專擅無任懇迫之至謹附本道觀察使便使奉表陳謝以聞
