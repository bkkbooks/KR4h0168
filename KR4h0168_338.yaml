front:
  text: 全唐文欽定全唐文卷三百三十八顏真卿三
  hash: sha256:3dc493a3e14ba57e45fb59a9a5dcd1e77c7abcde0f9d01b159d040be960da67a
body:
  text: 撫州城東南四里有翻經臺宋康樂侯謝公元嘉年初於此翻譯涅槃經因以為號公諱靈運陳郡陽夏人也祖元晉車騎將軍父瑍祕書郎公幼穎悟好學博覽㣥書文章之美江左莫逮以襲祖爵世人宗之盛稱謝康樂初為劉毅衞軍從事中郎太子左率出為永嘉太守郡有名山水公素愛好肆意遨遊稱疾去職於始寧縣修營故墅傍山帶江盡幽居之美因著山居賦並自註之與隱士王宏之等遊放為娛有終焉之志每一詩至都邑莫不競寫宿昔之間士庶皆徧徵為祕書監再召不赴太祖使范泰與書敦奬之乃出就職尋遷侍中日夕引見賞遇甚厚多疾不朝賜假東歸免官與從弟惠連東海何長瑜潁川荀道雍泰山羊璿之以文章賞會時人謂之四友尋山登賞常著木屐上則去其前齒下則去其後齒會稽太守孟顗事佛精懇公謂之曰得道應須慧業丈人生天應在靈運前成佛必在靈運後顗深恨此言後遂表公有異志公馳出自陳太祖知見誣除臨川內史公以曇無讖所翻大涅槃經語少朴質不甚流靡品數疎簡初學者難以措懷乃與沙門范惠嚴顧慧觀依舊泥洹經共為潤色勒成三十六卷義理昭暢質文相宣歷代寶之盛行於天下其餘感神徵應具如高僧傳所說邈乎階扃不改棟宇具無真卿叨刺是邦茲用愾息有高行頭陀僧智清緒發洪誓精心住持請以佛跡寺僧什喻仙臺觀道士譚仙巖同力增修指期恢復自是法堂之遺構克崇先達之高蹤不泯百里而遙四山不逼三休而上十地方超經行之業既崇斗藪之功斯懋大歷已酉歲四月丙午都人士庶相與大會設嚴供而落焉以真卿業於斯文見咨紀述後之君子其忘增修乎銘曰摩訶般若解脫法身是則涅槃衆經中尊曇無肇允嚴觀是因實賴同德宏茲法輪謝公發揮精義入神理絕史野文兼郁彬一垂刊削百代咸遵遺跡忽睹高臺嶙峋載悲徂謝曷踐音塵真卿愀然憫故孰新檀那衣鉢悉力經綸不日復之周邦仰仁緬懷敦慕子亦何人徒願神交媿非德鄰刻銘金石永永不泯如來以身口意三業難調伏也淨尸羅以息其內行住坐臥四威儀攝善心也明布薩以昭其外故曰波羅提木义是汝之師則憍陳如之善來迦葉波之尚法諸聲聞三歸約衆十四年以八敬度尼羯磨相承其致一也至漢靈帝建寧元年有北天竺五桑門支法領等始於長安譯出四分戒本兼羯磨與大僧受戒至曹魏有天竺十尼自遠而來為尼受具後秦姚萇宏始十一年有梵僧佛陀耶舍譯出四分律本而關內先行僧祗江南盛行十誦至元魏法聰律師始闡四分之宗聰傳道覆覆傳惠光光傳雲暉願願傳理隱樂洪雲雲傳遵遵傳智首首傳道宣宣傳洪洪傳法勵勵傳滿意意傳法成成傳大亮道賓亮傳雲一賓傳岸超慧澄澄傳慧欽皆口相授受臻於壼奧欽俗姓徐洪州建昌人葢漢孺子之後也二十二尋師於臨川楮山後五歲削髮隸於高安龍岡寺遂受戒有唐義淨則譯經上足曰洪州靈傑其秉宣羯磨者曰兩京清滌使法慧欽智度沖深神用高爽行無權實身絕開遮闡律藏而日月光明騁辯才而龍象蹴踏江嶺之外凜然風生開元末北遊京師充東京福先大德常誦大涅槃經而講之兼明俱舍論維摩金剛經每登講座其下日有二三千人由是名動輦轂屬祿山作亂杖錫南歸居於西山洪井雙嶺之間慕高僧觀顯之遺蹤於寺北剏置蘭若山泉之美頗極幽絕欽雖堅持律儀而志在宏濟好讀周易左傳下筆成章著律儀輔演十卷嘗撰本州龍興寺戒壇碑頗見稱於作者大歷三年真卿忝刺撫州東南四里有宋侍中臨川內史謝靈運翻大涅槃經古臺階扃儼然軒構摧圯有高行頭陀僧智清者首事修葺安居住持明年秋七月真卿績秩將滿有觀察使尚書御史大夫趙國魏公願以我皇帝降誕之辰奏為寶應寺仍請山林高行僧三七人冬十月二十三日聖恩允許於是鼎新輪奐其興也勃焉乃請止觀大師法源法泉襄陽乘覺清源善宏羅浮圓覺佛跡十喻餘杭慧達臮當州海通海岸等同住董修以資景福僉以為學徒雖增毗尼未立明年三月乃請欽登壇而董振鐸焉仍俾龍岡道幹天台法裔招提智融白馬法允衡岳正覺同德義盈香城藏選龍興藏志開元明徹等同秉法事於是遠近駿奔道場側塞聖像放光而龍王不雨者四旬僧尼等三百五十七人而文士正議大夫前衞尉少卿張廷皋脫俗歸真其名曰王褱綱為稱首焉又欽比年以來為受具者凡一萬餘人江嶺湖海之間幅員千餘里像法於變此皆欽教道之力焉臨川在嶺隅未嘗宏律於是二衆三百餘人請法裔敷演而依止之矣復有上都資聖寺高德曰還本律主偉茲能辨深嗟歎而贊美之請於寺東南置普通無礙禪院院內立鎮海觀音道場請善宏居之以開悟心要雲一上足曰智融精持本事如會尊衆乃命智光等於普通道場東置律藏院剏立戒壇以佇欽公之來儀且施肇紀之不朽經營未幾壇殿鬱興庶乎渡海浮囊分毫絕羅剎之請嚴身瓔珞照耀有摩尼之光則入佛位而披伽梨者名香普薰神足無極其可勝紀而蕪絕乎有唐大歷辛亥歲春三月行撫州刺史魯郡開國公顏真卿書而誌之麻姑者葛稚川神仙傳云王遠字方平欲東之括蒼山過吳蔡經家教其尸解如蛇蟬也經去十餘年忽還語家人言七月七日王君當來過到期日方平乘羽車駕五龍各異色旌旗導從威儀赫奕如大將也既至坐須臾引見經父兄因遣人與麻姑相聞亦莫知麻姑是何神也言王方平敬報久不行民間今來在此想麻姑能蹔來有頃信還但聞其語不見所使人曰麻姑再拜不見忽已五百餘年尊卑有序修敬無階思念久煩信承在彼登山顛倒而先被記當按行蓬萊今便蹔往如是便還還即親觀願不即去如此兩時間麻姑來來時不先聞人馬聲既至從官當半於方平也麻姑至蔡經亦舉家見之是好女子年十八九許頂中作髻餘髮垂之至腰其衣有文章而非錦綺光彩耀日不可名字皆世所無有也得見方平方平為起立坐定各進行廚金盤玉杯無限美膳多是諸華而香氣達於內外擗麟脯行之麻姑自言接待以來見東海三為桑田向間蓬萊水乃淺於往者會時略半也豈將復還為陸陵乎方平笑曰聖人皆言海中行復揚塵也麻姑欲見蔡經母及婦經弟婦新產數十日麻姑望見之已知曰噫且止勿前即求少許米便以擲之墮地即成丹沙方平笑曰姑故年少吾了不喜復作此曹狡獪變化也麻姑手似鳥爪蔡經心中念言背蛘時得此爪以杷背乃佳也方平即知經心中念言即使人牽經鞭之曰麻姑者神人汝何忽謂其爪可以杷背邪見鞭著經背亦不見有人持鞭者方平告經曰吾鞭不可妄得也大歷三年真卿刺撫州按圖經南城縣有麻姑山頂有古壇相傳云麻姑於此得道壇東南有池中有紅蓮近忽變碧今又白矣池北下壇傍有杉松松皆偃葢時聞步虛鐘磬之音東南有瀑布淙下三百餘尺東北有石崇觀高石中猶有螺蚌殼或以為桑田所變西北有麻源謝靈運詩題入華子岡是麻源第三谷恐其處也源口有神祈雨輒應開元中道士鄧紫陽於此習道蒙召入大同殿修功德二十七年忽見虎駕龍車二人執節於庭中顧謂其友竹務猷曰此迎我也可為吾奏願欲歸葬本山仍請立廟於壇側元宗從之天寶五載投龍於瀑布石池中有黃龍見元宗感焉乃命增修仙宇真儀侍從雲鶴之類於戲自麻姑發迹於茲嶺南真遺壇於龜源華姑表異於井山今女道士黎瓊仙年八十而容色益少曾妙行夢瓊仙而飡花絕粒紫陽姪男曰德誠繼修香火弟子譚仙巖法籙尊嚴而史元洞左通元鄒鬱華皆清虛服道非天地氣殊異江山炳靈則曷由纂懿流光若斯之盛者矣真卿幸承餘烈敢刻金石而志之時則六年夏四月也夫德之所感淪骨髓而非深誠之所至去神明而何遠有唐大歷壬子歲宋州八關齋會者此都人士臮文武將吏朝散大夫使持節宋州諸軍事行宋州刺史兼侍御史本州團練守捉使賜紫金魚袋徐向等奉為河南節度觀察使開府儀同三司太子太師左右僕射知省事兼御史大夫汴州刺史上柱國信都郡王田公頃疾良已之所建也公名神功冀州南宮人稟元和之粹靈膺期運以傑出含宏厚下正直率先起孝而德感生人竭忠而精貫白日和衆必資於寬簡安人務在於撫柔況乎武藝絕倫英謀沈祕所向而前無強敵日新而學有緝熙故能殿天子之邦鬱蒼生之望有日矣羯戎搆逆公以平盧節將佐今右僕射李公忠臣收滄德攻相州拒杏園守陳留許叔冀降而陷焉思明懼忠臣圖己令公佐南德信隨劉從諫收江淮至宋州欲襲李銑公斬德信走從諫遂並其衆而報焉肅宗大悅拜公鴻臚卿再襲敬釭於鄆州加中丞討劉展於潤州斬平之遷徐州刺史明年拜淄青節度使屬候希逸自平盧至公以州讓之時宋州刺史李岑為賊所圍副元帥李光弻請公討平之拜御史大夫加開府充兗鄆節度破法子營又討敬釭釭歸順焉史朝義聞之奔下博投范陽自縊死廣德元年授戶部尚書封信都郡王上幸陝公首來扈從都知六軍兵馬每食宿公皆躬自省視上感焉方委以政事公涕泣固辭而止二年拜汴宋節度遷兵部大歷二年加右僕射封母清河張氏為趙國夫人妻信安郡王褘女為涼國夫人太夫人慈和勤儉睦於親黨公性純孝居常不離左右閱讀書史或時疾病公輒累月不茹薰家中禮懺不絕仍造崇夏宏聖二寺以祈福祐五年兼判左僕射知省事加太子太師公德厚量深勞謙重慎功既高而心益下位彌大而體益恭故遠無不懷邇無不肅今夏四月忽嬰熱疾沈頓累旬積善降祥勿藥遄喜鷹犬之翫悉皆棄捨㣥帥感焉無復弋獵四履之內咸懷歡欣雎陽之人踴躍尤甚乃咨於州將曰昔我公之陷賊也至敝邑而首誅德信李岑之見圍也破其黨而克保城池是即我公再有大造於敝邑矣微我公之救恤即皆死於鋒鏑入於煎熬矣尚何能保完家室嬉戲鄉井者乎不資齋明何以報德徐公悅而從之來五月八日首以俸錢三十萬設八關大會飯千僧於開元伽藍將佐爭承唯恐居後已而州縣官吏長史苗藏實等設一千五百人為一會鎮遏團練官健副使孫琳等設五百人為一會耆壽百姓張列等設五千人為一會法筵等供仄塞於郊坰贊唄香花喧填於晝夜其餘鄉村聚落來往舟車聞風而靡督自勤聳惠而怵先胥懋者又不可勝數矣非夫美政淳深德風汪濊則何以感人若此其至者乎某叨接好仁飽承餘烈覩茲盛美益靦求蒙若不垂諸將來則記事者奚述南齊徵士吳興沈君名驎士郡人也蘊道德晦於邑之餘不溪家貧無資以織簾為業故時人號為織簾先生精於禮傳嘗自詁訓宗人吏部郎中淵中書郎約累薦徵為著作郎高臥不起名重江表臨終遺教依皇甫元晏棺中貯孝經一卷穿壙三尺置棺平土不設机位四時地席元酒而奠子彞奉而行之吳郡陸惠曉張融皆為之誄徵士嘗製述祖德碑立於金鵝山之先塋年月淹遠風雨蠧蝕朽字殘文翳而莫分乾元中為盜火所焚碑首毀裂嶔然將墮過江二十葉孫御史中丞震移牒郡國請其封葺或屬兵凶曠而莫修忽有仆樹生於龜腹盤根抱趾聳幹夾碑嶷如工造鬱若神化欹者復正危而再堅夫德無名遇賢而鍾慶神無質假物以申應沈氏積善既遠徵士植德既深天將興舊族乎吾知沈之復大也權檢校宗事十九葉孫前太廟齋郎怡拜泣松檟增修舊塋感先碑之隕覆懼遺文之殘闕乃具他石傳而貳焉崇其本所以尊先也建其新所以嗣德也以真卿江南婚姻之舊中外伯仲之穆謬忝拜刺見託斯文刊諸碑陰以傳無朽因改其樹為慶樹以旌其美焉沈氏之故事具於家諜今闕而不紀時有唐大歷八年冬十二月公諱沔字若沖博陵安平人其先出於齊太公之後自亭伯三世文宗祕書監六闕一字派別叔軌季則俱死王事神謙神通並高循績子彭宏度以武幹稱景雋巨倫以文行著繼方面者累代列史傳者十人奕葉相承恆為鼎族曾祖宏峻隋銀青光祿大夫趙王長史祖儼皇朝益州雒縣令父暟年未四十為庫部員外郎因擇能吏為壽安令又充江西道廉察使徙醴泉遂歷四邑盤桓不進以剛正也累至朝散大夫汝州長史封安平縣男贈衞尉少卿公即安平之次子也全德天至成人玉立葢聖代之寶臣華宗之孝子文章之哲匠禮樂之祖師既不可以一名又何能以悉數年二十四舉鄉貢進士考功郎李迥秀器異之曰王佐才也遂擢高第其年舉賢良方正對策萬數公獨居第一而兄渾亦在甲科典試官梁載言陳子昂歎曰雖公孫鼂郄不及也召見前殿拜麟臺校書郎繇是名葢天下御史張思敬以德行薦久之以資授陸渾主簿平陽王敬暉宏度外之交略上官之禮丁府君憂服除太夫人勉起之以所試超邁擢拜左補闕遷殿中侍御史奉敕按竊金者公得其情許之不死竟得減論諸王或恃貴不遵法度舉而按之其不吐茹也如此尋遷起居舍人當扈從以親老抗疏乞退薦瑯琊王邱太原郭潾渤海封希顏等自代睿宗嘉之特許留司以遂其孝養遷祠部員外郎倖僧有請度人者公拒不奉詔遷給事中大理卿韓思復用法小差權臣致劾公特寬之遷中書舍人省改紫微其官仍舊又固辭以親老除虞部郎中開元初攝御史中丞或訟吏曹之不平公與崔泰之銜命詳理多所收拔俄而即真兼都畿按察使歲或不稔公請發粟賑貸之賴全活者以萬數內謁者霍元忠有罪公執之以聞元宗使以璽書勞之公之澄清中外也以畿縣令長陸景融劉體微盧暉有異政丞尉宋遙皇甫翼陳希烈宋鼎蕭隱之范冬芬楊慎餘劉日正高昌寓州掾李瑱裴曠等並以清白吏疏而薦之二十二年置十道採訪使公所舉六人在焉執事子有不法者公舉之不回移著作郎尋遷祕書少監修圖書使尋判大理卿禮部侍郎公既職司典禮乃刪寫疏論數百卷以備闕遺特加朝散大夫遷左庶子丁太夫人憂徵拜中書侍郎出為魏州刺史乃肇移元城徙置新市吏人便之乙丑歲元宗東封知頓使奏課第一賜絹二百匹嶽下觀禮獻慶雲頌又賜絹一百匹明年入朝分掌十銓公與王邱為選人所歌曰沔人澄明澈底清邱山介直連天峻時人韙之還州以理有異績御史大夫崔隱甫中丞宇文融朝服表薦璽書寵慰無何徵拜左散騎常侍上以六宮親蠶絲賜近臣公獻御絲賦又侍讌別殿賦端午詩屢蒙錫以縑帛綵羅兼判國子祭酒俄充東都副留守十七年有事陵廟追贈安平公及太君曰安平夫人駕還罷留守二十年春奉敕撰龍門公宴詩序賜絹百匹延入集賢院修老子道德經疏行於天下二十一年遷祕書監修撰如故屬耕藉田為居守賜絹百匹遷太子賓客出兼懷州刺史二十四年罷州又以本官充東都副留守累加通議大夫二十七年冬十一月十有七日寢疾薨於位春秋六十有七元宗震悼贈禮部尚書葬日量借手力幔幙故吏前監察御史博陵崔頌為公行狀云公德充符契精貫人極孝愛聞於天下制作垂於無窮執太夫人之喪徒跣吐血以身為糞土況乎含宏內恕夷坦外名德至矣乎今之達者若以富貴崇德行藏養高則老萊闕於榮親黔婁褊於謀道又加於古人矣故養則致其樂喪則過乎哀以兄姊之戚亞其親甥姪之慈甚其子至於藥砭備物溫清異宜手胝杵臼之間身辱澣濯之伍汲汲然矣每至宗廟心齋嚴恭祀事明發不寐翌日餘悲故聲氣感人者深儀形化人者遠躬踐五德退讓於恭儉溫良行張四維加信於仁義禮智而老驥伏櫪以鮑驄不忘白鳩巢檐以家瑞終黔則非殊倫絕輩擬議乎萬一矣太常博士裴總議曰公醇一誕靈文明含粹蹈元和以為天性籍間氣以為人師前後歷官或拜而不至或至而不留瘠形瞽目誓尊孝養可不謂孝乎遂諡曰孝公凡所著文集二十九卷並嗣子祐甫論次先志一卷為三十卷吏部員外郎趙郡李華為集序云公之侍親也孝達乎神祇居憂也哀貫乎天地喪期有數而茹荼終身親交鄰里飢者待公而炊寒者待公而裘烝嘗之奠待公而具故祿廩雖厚而未常足也傳祖禰之美合於禮經見公文章知公行事則人倫之序理亂之源備矣祐甫純行而文直清而和希公門者謂公存焉亡賢數載如此初太夫人患目公傾家求醫或曰療之必愈恐壽不得延太夫人及公悲恨而罷自是竭力奉養不脫冠帶者僅三十年每至良辰美景勝引佳遊必扶侍左右笑言陳說親朋往來莫知太夫人之有苦也公年官雖高至於食菓蔬菜與子姪躬自植藝溉灌以申馨潔臮終喪雖見孩稚者必設位束帶盡哀以禮之公與江夏李邕友善為校書郎時引邕館於祕閣之下讀書者累年邕由是才名益盛邕與尚書席建侯嘗過公怪乘馬癯羸曰何不於廳前自觀䬴飼忽然致殞何以更之公唯而不易他日二公又以為言公良久則曰每欲發言恐涉有疑於厮養者所以沈吟自媿二公退而謂人曰每想崔公此言使人慚恧如醉延和太極之間公既留司東都遂鬻所乘馬就故人監察御史張汯子深河南府崇政坊買宅以製居建宗廟於西南維先太夫人安平郡夫人堂在宅之中儉而不陋淨而不華六十餘年榱棟如故堂東嫂盧夫人所居堂之東北鄭氏李氏姊歸寧所居堂之北五步之外建瓦堂三間以居之雜用舊椽不崇壇無赭堊累歷清要所得祿秩但奉烝嘗資嫂姊給孤幼營甥姪婚姻而已朝服衣馬一皆取其下者唯祭器祭服稱禮焉其室竟不修臮夫人太原郡太夫人王氏捐牀帳之後公徙居他室或在賓館而無常所為常侍時著陋室銘以自廣天寶末子孫灑掃貯書籍劒履而已逆胡再陷洛陽屋遂崩圮唯檐下廢井存焉長子成甫倜儻有才名進士校書郎早卒祐甫能荷先業以進士高第累登臺省至吏部郎中充永平軍節度使尚書李公勉行軍司馬兼侍御史中丞永懷先德明發不寐恐茂烈烟淪罔垂後裔乃刻陋室銘於井北遺址之前以抒所志某夙仰名教實欽孝公之盛德晚聯臺閣竊慕中丞之象賢又能好我不遺見託論譔採風猷而莫窮萬一涉泉海而豈究津涯操筆強名退增戰恧時則大歷十一年青龍景辰孟夏之月也湖州烏程縣南水亭即梁吳興太守柳惲之西亭也繚以遠峯浮於清流包括氣象之妙實資遊宴之美觀夫搆宏材披廣榭豁達其外暌罛其中雲軒水閣當亭無暑信為仁智之所創制原乎其始則柳吳興惲西亭之舊所焉世增崇之不易其地按吳均入東記云惲為郡起西亭毗山二亭悉有詩今處士陸羽圖記云西亭城西南二里烏程縣南六十步跨苕溪為之昔柳惲文暢再典吳興以天監十六年正月所起以其在吳興郡理西故名焉文暢嘗與郡主簿吳均同賦西亭五韻之作由是此亭勝事彌著間歲頗為州僚據而有之日月滋深室宇將壞而文人嘉客不得極情於茲憤憤悱悱者久矣邑宰李清請而修之以攄衆君子之意役不煩費財有羨餘人莫之知而斯美具也清皇家子名公之允忠肅明懿以將其身清簡仁惠以成其政絃歌二歲而流庸復者六百餘室廢田墾者二百頃浮客臻湊迨乎二千種桑畜養盈於數萬官路有刻石之堠吏廚有餐錢之資敦本經久率皆如是略舉數者其餘可知矣豈必夜魚春躍而後見稱哉於戲以清之地高且才而勵精於政事何患雲霄之不致乎清之筮仕也兩參雋乂之列再移仙尉之任毗贊於蜀邑子男於吳興多為廉使盛府之所辟薦則知學詩之訓間緝之心施之於政不得不然也縣稱緊舊矣今詔升為望清當受代而邑人已軫去思之悲白府願留者屢矣真卿重違耆老之請啟於十連優詔以旌清之美也某不佞忝當分憂共理之寄人安俗阜固有所歸雖無魯臣掣肘之患豈盡言子用刀之術由此論之則水亭之功乃餘力也夫知邑莫若州知宰莫若守知而不言無乃過乎今此記述以備其事懼不宣美豈徒媿詞而已哉大歷一紀之首夏也粵以江南之地佳麗垂名山嶽之間宛有仙洞余祇膺聖澤廉察臨州一日按地理圖得屬邑崇仁縣華葢山有王郭二真君壇存焉欣覩異事未原其始他日公餘因令軍將往山下訪求碑銘果得一石記乃隋開皇五年焚修道士李子真於壞碑上再錄出其文則知王郭二真君仙不顯名王則方平之從姪郭乃王之族弟也始於金華山修道以圖輕舉尋遊洞府自玉笥山將之麻姑洞中道悅一山問故老曰此為何山對曰巴陵華葢山也二真君相與言曰此山福地名亦異焉因求卜止再煉神丹山下父老詣而再拜曰敢問真人之名字曰吾等修志於虛無不欲述焉後有一道士來謁敢問真人之師曰吾師浮邱先生則上界大仙也頃於金華山遇焉二真君能走石飛符興雲致雨或有人疾苦暴亡往而告之即飛符以救之歲時大旱即致霖雨以濟之至晉惠帝元康二年二月一日綵雲連晝仙樂喧風二真君乃驂鸞駕鶴冉冉上昇今上昇之壇及浮邱先生之壇存焉其後立觀焚修境邑將旱若詣壇禱之則雲雨立應矣故事昭然仙蹤儼若雖遺史籍安泯聲華鸞鶴對飛共作壺中之客林巒疊秀別含象外之春因與府官議崇觀宇永利焚修尋差軍將以公用錢詣山換殿宇門廊不日而迴云工畢矣予德慚好道任忝分符原始要終罕測沖天之日飛文染翰用貽終古之芳銘曰元牝之門澄心養神學則彌衆得者幾人冉冉千古堂堂二真丹成巖谷道應穹旻綵雲色煥仙樂聲勻遲日初麗柳花正新驂鸞援俗駕鶴超雲言歸紫府笑別芳辰山存華葢長含異春恩流豐澤用濟烝民浮雲世速好月生頻儼若聖祉永播清芬東方先生畫贊者晉散騎常侍夏侯湛之所作也湛字孝若父莊為樂陵太守因來覲省遂作斯文贊云大夫諱朔字曼倩平原厭次人魏建安中分厭次為樂陵郡又為郡人焉厭次今移屬樂安郡東去祠廟六百里故厭次城今在平原郡安德縣東北二十二里廟西南一里先生形像今則捏素為之並二細君侍焉郡嘗為德州其贊開元八年刺史韓公思復刻於石碑真卿去歲拜此郡屬殿中侍御史平公冽監察御史閻公寬李公史魚右金吾冑曹宋公謇咸以河北採訪使東平王判官巡按狎至真卿候於境上而先生祠廟不遠道周亟與數公臮家兄淄川司馬曜卿長史前洛陽令蕭晉用前醴泉尉李伯魚徵君左驍衞兵曹張璲麟遊尉韋宅相朝城主簿韋夏有司經正字畢燿族弟渾前參軍鄭悟初同茲謁拜退而遊於中唐則韓之刻石存焉僉歎其文字纖靡駮蘚生金四十年間已不可識真卿於是勒諸他山之石葢取其字大可久不復課其工拙故援翰而不辭焉至若先生事跡則載在太史公書漢書風俗通武帝內傳十洲記列仙神仙高士傳此不復紀焉有唐天寶十三載季冬辛卯朔建肅宗皇帝恩許既有斯答御劄垂下而真卿以疎拙蒙譴粵若來八月既望貶授蓬州長史臮今上即位寶應元年夏五月拜利州刺史屬羌賊圍城不得入恩敕追赴上都為今尚書前相國彭城公劉公晏所讓授尚書戶部侍郎二年春三月改吏部廣德元年秋八月拜江陵尹兼御史大夫充荊南節度觀察處置等使未行受代轉尚書右丞明年春正月檢校刑部尚書兼御史大夫充朔方行營汾晉等六州宣慰使以招諭太師中書令僕固懷恩不行遂知府事永泰二年春二月貶峽州別駕旬餘移貶吉州大歷三年夏五月蒙除撫州刺史六年閏三月代到秋八月至上元爾來十有六年困於疎愚累蒙竄謫其所置碑石迄今委諸巖麓之際未遑崇樹七年秋九月歸自東京起家蒙除湖州刺史來年春正月至任州東有苕霅兩溪溪左有放生池焉即我寶應元聖文武皇帝所置也州西有白鶴山山多樂石於是採而斲之命吏幹磨礱之家僮鐫刻之建於州之駱駝橋東蓋以抒臣下追遠之誠昭先帝生成之德額既未立追思莫達客或請先帝所賜敕書批答中諸事以緝而勒之真卿從焉勒願斯畢瞻慕不足遂志諸碑陰庶乎乾象昭回與宇宙而終始天文煥發將日月而齊暉時則有唐大歷九年青龍甲寅之歲孟秋甲子之日也初公任監察御史持服於沙河縣屬突厥寇趙定州河朔兇懼邢州刺史黃文軌投艱於公公以父母之邦金革無避及賊至城下公為曉陳禍福其徒有素聞公威名者乃相率而去之開元末安西都護趙含章冒於貨賄多以金帛賂遺朝廷之士九品以上悉皆有名其後節度范陽事方發覺有司具以上聞元宗切責名品將加黜削公一無所受乃進諫焉元宗納之遂御花萼樓一切釋放舉朝皆謝公衣冠儼然獨立不拜翌日入奏元宗謂公曰古人以清白遺子孫乃卿一人而已公曰含章之賄偶不至臣門非不受也元宗深嘉歎之前碑闕焉故略述於此公第三子渾之為中丞也方欲陳乞御製碑頌未果而中受譴責旋羯胡作亂事竟不成真卿時忝監察殿中為中丞屬吏故公孫儼泣請真卿論譔之昭義軍節度觀察使尚書左僕射兼御史大夫平陽郡王嶭公曰嵩以文武忠義之姿為國保障上慕公之德業歎尚無窮次嘉儼之懇誠崇豎莫致迺命屯田郎中權邢州刺史封演購他山之石曳以百牛僝刻字之工成乎半歲磨礱既畢建立斯崇遠近嗟稱古今榮觀雖大賢為德樹善庸限於存亡而小子何知附驥托跡於階序真卿刺湖州之日因成文請儼刻其側而志之未及雕鐫而第六子衡因謫居沙州參佐戎幕河隴失守介於吐蕃以功累拜工部郎中兼御史河西節度行軍司馬與節度周鼎保守燉煌僅十餘歲遂有中丞常侍之拜恩命未達而吐蕃圍城兵盡矢窮為賊所陷吐蕃素聞太尉名德曰唐天子我之舅也衡之父舅賢相也落魄如此豈可留乎遂贈以駝馬送還於朝大歷十二年十一月以二百騎盡室護歸士君子偉之乃古來所無也上欲特加超獎且命待制於側門十三年春三月吏部尚書顏真卿記西楚霸王當秦之末與叔梁避讎於吳蓋今之湖州也雖滅秦而宰制天下魂魄猶思樂茲邦至今廟食不絕其神靈事迹具見竟陵子陸羽所載圖經大歷七年真卿蒙刺是州十二載姦臣伏法恩命追真卿上都闕二字克寸期首路竟陵是諗予以故碑顛趾嘗因闕三字已而復闕之真卿乃命再加崇樹闕五字紀之時則仲夏方生明之日太保謝公東晉咸和中以吳興山水清遠求典此郡郡西至長城縣通水陸今尚稱謝公塘及遷去郡人用懷思刻石記功焉歷代至皇唐天寶末㣥盜起公之碑誌失於所在眷求蕪沒深為愴然借舊史遺文敬刊息石公之雅量宏度蓋嗟歎之不足神居武陵其地有湖每出則神獸前道形如白馬側蹲鴟而墜石勒緩縱以藏機弩灣環而勢曲趯峻快以如錐策依稀而似勒掠仿髴以宜肥啄騰淩而速進磔抑走昔以遲移
