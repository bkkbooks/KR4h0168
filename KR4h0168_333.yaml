body:
  text: 臣某言臣聞百工允釐方可咸熙庶績九流不雜所以彌獎人倫苟非其才胡顏妄處臣某中謝臣智識凡近藝能瑣薄徒以遭逢運遇預奉休明謬忝宗枝特承甄拔爰從散職拜以中司三入仙臺兩登禁掖久於近密衆莫能過念臣愚者聖慈收臣直者天斷頃者外總戎律曾無決勝之謀內參鈞衡實寡推賢之舉將何以彌綸庶政翊贊雍熙以此慙惶無忘鑒寐況中書理本軍國務重事無巨細稟於睿旨暫愆時雨陛下每降於親祈未有邊塵陛下尚勞於遙詔無幽不燭有感必通在臣何人叨居大任雖願荷恩效力更勉驅馳其如竊位妨賢自多愧恥鴻私茂寵於臣已極纖勞薄效在國何施況貞觀以來相無宗子唯臣忝越擢自宸衷誠宜粉骨碎首闕七字尸素之嫌久招輿議屏退之分臣之宿心實恐上纍明時下玷良史比因趨奏屢有陳祈天眷未回聖情猶阻伏惟陛下察臣之情憫臣之訴賜臣止足之分恕臣不逮之力賜停今職退守間司且臣感恩至深報效殊淺儻中外任使衆所辭難臣願先登冀罄誠節豈敢偷安重祿自保優間特望更選㣥賢以秉成績庶使朝無闕政天下稱公區區懇誠期於必遂不勝戰汗惶懼之至謹奉表詣朝堂陳乞以聞臣某言伏奉恩旨臣兄前長安縣尉某特授左補闕內供奉賜紫金魚袋踰涯之澤忽降於重霄非次之榮猥延於同氣自天有命闔室相歡臣某中謝臣兄比因寇孽濳迹江湖臣侍奉皇輿委身巴蜀艱虞萬里兄弟一方分成吳越之人久切支離之思陛下克清禍難再闢寰區臣兄幸遇休明得歸鄉陌雖骨肉之愛重喜如初而班秩已停久嗟失職臣昨因對奏遂竭懇誠情至所陳言將無隱陛下道宏孝理念廣睦親載懷遂物之仁爰軫在原之急皇慈曲被朝獎仍加擢同補袞之司錫以腰章之寵況臣官參秩禮任在司言身上列於紫垣兄遽升於青瑣故得連枝捧日方並侍於軒墀比影朝天復總華於朱紫一門受賜舉族增榮斯實眷自宸衷恩加望外臣比承顧使本不因人今又沐殊私特延慈旨投軀有地報德無階非臣灰粉所能答效惟當昆弟相勗以孝資忠螻蟻之負細塵誓將裨補烏雀之銜微毳志願填河將九死而猶生豈百年之足謝云伏奉今月恩制特授臣三品恩出非常罔知所措臣以薄劣久忝班榮幸以地籍宗枝遂得位參卿寺常憂踰分忝於正名豈臣灰粉所能答效自殊私俯及宿疾頓除既承七命之貴更荷在生之澤才輕遇重以榮以憂又先承聖恩賜臣藥酒自蒙救療日覺痊平但以微虛未堪趨伏拜恩閭巷喜懼難勝馳心闕廷戰荷交集無任惶悚之至右臣伏承今日恩制除臣兄太常少卿林寇為太僕卿明命自天惶忭無地臣兄每私門誓約公道為心務竭忠勤敢踰涯分豈謂陛下降中旨之詔假望外之恩拔自奉常正於㣥僕臣久居宰輔職忝進賢考槃之詩未能息詠葛藟之蔭先及本根渥澤既重於邱山光輝復聯於花萼一門有幸九死何酬無任感戴惶悚之至右臣今月某日中使郭全羽至奉宣聖旨賜臣兄太僕卿林宗紫衣一副並犀角帶及金魚袋恩出非常榮超望表闔門捧戴喜懼失圖臣少遭閔凶早違怙恃兄弟素少形影相依幸遇休明俱霑官序且一身叨竊謬踐台衡闔門寵榮皆承天覆恩獎所及始望已過但兄林宗年力稍侵近嬰風病常恐溘先朝露不報前恩豈謂睿渥特深鴻私曲被河海重寄已叨命卿之榮章印崇班更承綬服之賜慶流公族光照私門雖喜鶺鴒之詩終懼維鵜之刺無任喜懼感佩之至右臣今日曲蒙聖恩處分仙客令與臣男岫五品並授員外郎愚誠懇辭天鑒不察仙客承旨又已進宮憂懼失圖不知死所臣幸承天蔭特荷殊榮無補涓塵常靦面目至如邊城克捷狂寇肅清皆睿略元通聖謀獨斷臣之遙統但有空名敢冒天功而為己力虛承厚委深是曠官況在頑童何議延賞假使天慈善誘宸眷曲臨變其服章已深榮幸更塵清獎何以自安且郎官之任朝廷俊選無人則缺不可虛授臣男岫性資愚戅無所能為臣實知之非為矯飾儻謬踐華省深纍聖朝必負黃童之才豈憚祁奚之舉知其不可敢乞收恩制命未行猶祈便寢無任懇款之至謹冒死陳請以聞右昨晚內使曹侍仙至奉宣聖旨賜臣臘日所合通中散駐顏面脂及鈿合並吃力伽丸白黑蒺藜煎揩齒藥等逼夜又賜粳米一百石麵二十袋適中使楊元新至又賜鯸鮧魚魴魚鮭魚等仍便令膳造伏以嘉平舊節鍊藥良辰錫靈仙之祕方均雨露之殊澤金膏玉散駐齒髮於衰容瑞麵香粳頓豐盈於私廩况鯸魚魴鮭等降自天廚中使炮烹皆承聖法不資椒桂之力備適鹽梅之味臣竊位歲久叨榮日深調鼎之功未施於毫髮登俎之美屢浹於恩波徒荷生成何酬造化無任稠疊感戴之至右內給事袁思藝奉宣聖旨賜臣藥金盞一匙並參花蜜餘甘煎及平脫合二平脫一作平晚兼令中使輔朝俊親授昨所賜金方法者伏以聖澤無涯已沐九天之施真方不祕更示八公之法王人俯及寶器仍頒自昔名臣近代良佐雖功業攸著或不承此賜況臣才不逮古雨露之澤逾深任重當時涓塵之效無補仰瞻元造上答何階無任感戴之至右內給事袁思藝至奉宣聖旨賜臣江東成金二挺若服之後深有補益兼延駐者伏以仙方所祕靈藥稱珍必候休明之辰上益無疆之壽不意復回天眷念及微臣賜九轉之金駐百年之命且螻蟻賤質豈能長固蒲柳易朽常慮先凋竊荷生成之恩寧酬造化之德澤如河海空欣羽翼之期寵若邱山何伸灰粉之謝不任欣忭之至右內品官史鳳節至奉宣聖旨賜臣鹿肉一盤捧戴殊私喜躍無地伏以十月農隙三泰歲成展豫離宮時巡近甸幸承扈蹕已荷陪遊之榮恩降自天更沐珍鮮之賜慶覃野坎一作次澤被私門顧螻蟻之至極仰邱山而何答無任感佩惶悚之至右內品官葉惠仙至奉宣聖旨賜臣魴魚一盤仍便令造羹伏以九天之使頻過衡門八珍之羞屢霑御膳登盤既榮於薦熟正席更喜於先嘗每侍軒墀曾無獻替歸休私室偏沐恩波空荷紅鮮之慈實負素餐之責無任惶悚感戴之極右中使焦庭望至奉宣恩旨賜臣生蟹一盤便令造食臣自叨陪侍從纍沐殊榮朝天賜浴於御湯退食每霑於仙饌賞隨恩積慶逐時新臣之何功偏承厚錫遊泳渥澤但懼踰涯徘徊寵私無階答效無任望外荷戴之極右內品官葉惠仙至奉宣聖旨賜臣車螯蛤蜊等仍令便造膳適中使賜臣水犢肉一合伏自濫陪巡幸纍沐殊私每荷天恩曾不踰日或承海味或降珍鮮況皆聖主傳芳王人調飪薄效無裨於涓滴厚施轉積於邱山昔周美康侯特霑蕃庶之錫漢崇張禹亟覃賜饌之榮才不逮於前賢而遇每深於曩眷雖竭心盡節何答生成右內官趙承暉至奉宣聖旨賜臣車螯蛤蜊等一盤仍令便造趙臣忠至又賜生蟹一盤高如瓊至又賜白魚兩箇伏以衡門之下頻降王人簞食之中纍承天饌適口之異無時不霑駭目之珍每日皆遇顧循涯分何以克當徘徊寵私罔知攸答軫汝南人帝唐之於宣昭立極本乎神堯彌六葉以開泰接三正而會朝樂一人之淳德成萬國之謳謠故太宗載櫜而象舞聞於破陳我后垂拱而作樂嗣曰雲韶夫道者率性作者謂聖統同積和倫理知政斯古之所以歌九德誦六詩咸池備矣大章繼之玉戚朱干降及禮文之代蕢桴葦籥行乎朴略之時若乃周道衰王澤竭正始之音奔散哀思之風鬱結逾千載而未返以俟我開元之濬哲噫我樂之方作也天保定武功成紹堯光澤嗣武重明感物以風下理心而和聲稽六律之宮變諧八音而磬清越二十四祀建寅望之夕啓千門以達陽氣御重城而臨百辟張彩燈之煌煌敞新樓之奕奕甸師庭燎武賁陛戟命典庸使設簨簴飾羽毛而展金石納四夷之僸人未兜離奏六代之翕純皎繹乃翼日出雲韶而舞之徒觀其降輦路臨廣場曳羅裙之嫋嫋鳴玉佩之鏘鏘始逶迤而並進終宛轉而成行於是合以絃匏從之磬管昭敬意於廉直本喜心之嘽緩克和四氣應春候而角調取象八風如舞行之綴短霓裳綵鬬雲髻花垂清歌互舉玉步徐移俯仰有節周旋中規將導志以變轉幾成文於合離爾其美目流盼輕姿聳峙或少進而赴商俄善來而應徵魚貫初度驚鴻乍起容裔自得蹁躚未已褧衣屢更新態不窮忽舉袖而縈紫復回身而拖紅及夫繁音九變曲度將終神人以和天地攸同道五常之行移四海之風然後樂師告罷退之帷宮時也皇歡浹睿澤深一人有慶萬國歡心㣥臣獻華封之祝天子御薰絃之琴照寰光於合璧式王度其如金乾道兮下濟湛恩兮汪濊四三皇兮六五帝于胥樂兮千萬歲潛字季通荊南人開元十四年進士調宜壽尉入為集賢待制遷右拾遺終著作郎在昔元命運革唐德大象有歸神器載復天人用慶元津扇福乃命率土崇之法堂錫名取類棟宇以光善本物持淨亦神護發地騰焰莫知其故疏綴煙消回廊燼去半落層構斜通平地烈烈皇叔總我古城象設不覯風埃咸盈崩殘不葺忠孝何并乃廣其施誘人助成英英郡二亦既同聲粲粲僧士誰非會情投心霧塞效信泉傾舊製俄滿新規更營龍跳透檻虎翼飛甍與國同劫配天作程假詞紹美吁其以驚諲開元中進士官右補闕大唐混合寰宇開張時雍體黃中之一德居紫微之九重既而成化再造天下有道得綵鳳之靈圖據飛龍之大寶美其歷數會昌纍葉重光真宰無為盛先天之景業聖人有作立配帝之明堂寫神規之大造嶷崇基之正陽磷磷爛爛熒熒煌煌徒觀其藻畫周設雕刻具美綺寮豁達以生風重簷周流以藏晷嶔崟崎嶬狀崑嶽含霧而插天衢隆崇峍屼若蓬萊駕鼇而涌海水屹乎氤氳孤標紫氛璇題皓飾金鋪洞文拱星辰以端居傍眺白日馮軒檻以直視俯見青雲爾乃環曲析構重屋蓮銜綺井豔窋叱以垂珠階接彤庭影連延而造玉若夫靈姿衆出詭變叢生畫栱攢施龍桷參差以星布陰室晝朗粉垣皎曜以月明及夫四海波晏一人有慶寒風初盡陽月既正蠻夷颯沓以來王文物葳蕤以交映信所謂不宰而合通居中而作聖我唐有國塹炎海而苑絶漠封日域而隄流沙生堯舜而開統誕文景而承家於茲百有二十載開元皇帝御極居藩符五馬之兆在天豈一龍能加愛弟則淮南之仙術名王則臨淄之才華朝有土階之約官靡瑤臺之奢飾舊館而納景建飛觀而臨霞長公子之自薄塞主人之相誇非徒擬花萼之麗蓋取諸棠棣之華請循其始仍舊而作珍林自生靈池不鑿下池塘之煙霧植掖垣之花萼鳬鷖翕習而來止樓臺山蹇嵼而相錯雨日而雲起澄潭霽夕而月懸高閣歸梁國於上苑通代邸於平樂洞復道而為臨幸矗層城而作垠堮於是於城之陬建此飛樓橫邐迤而十丈上崚嶒而三休仰接天漢俯瞰皇州百鄽之所回合九逵之所夷猶總萬象之多少極二曜之環周為棟宇之殊觀實崇高之寡仇蓋術者之不陋亦帝王之所遊規模制度去奢維素方面曲折匠石所務浮欄鬱律而卻偃飛甍參差而前注連磴道而內屬曳軒窗之橫騖龍獸撫注而相驚虹霓亘薄而齊布塗椒蘭以為馥銜明月而為炷榜題仲將之手頌登文考之賦六合清朗天地靜謐明主垂裳賢臣屈膝龍輿親覽珠旗曉出言羽衛以清帳敕太史之擇日點翠幕而夾道列雲影而竟術萬國爭馳而駢會千官畢扈而咸秩宮闕迢遙其若浮郡國森羅以加一廣宴頒大官之膳鴻霈寬司寇之律獻春之望嚴更羅守月上南山燈連北斗魚啓鑰於樓上龍銜燭於帳口帝城縱觀而駕肩王宮望瞻而仰首鼓吹更落琴笙夜久清歌齊升而切漢妙舞連軒而垂手張廣樂以建和示至樂於㣥有天子偃伯天下高臨穆清理國以道與代作程不純儉以愆德不徇奢而害盈建宮而豐其屋則遵求舊作室而節其用則示間情其孝友也署為花萼之號其勤人也則榜以政本之名何聖人之啓意物與道而相并秦作阿房而窮侈靡漢宮未央以自尊榮由是展禮樂開孰序太學時薦列國奉舉擇仙郎為清選之官闢星臺為明試之所顧無智士之知難而勞能者之虛佇稽古太初穴處巢居則大壯之垂象上棟下宇成其室廬逮於中葉僭奢違道木衣緹緗土被文藻列蟠螭於欄檻拖長虹於欀橑謂桂柱之不堅施柱礎以侔其壽考相萬祀而一人階天地而相保其始也徵士尚方聚徒巖畔經回溪之紆鬱梯嵯峩於天半披林離之修蘿刮莓苔之爛漫曜雲霞之綵駮嘉錦章之輝煥圖嵌空設妙算或攻或鑿叫嘯相贊磓山成雷擊石火散初髣佛而縷析忽砰以冰泮五丁力殫九牛流汗自彼幽藪登庸華觀乃命王爾操繩公輸削墨規上成範方下為則錯坎缺之參差開青熒之古色入紅壁對朱扉廊回月皎殿廣星稀隨風起潤逐日呈輝扣逶迤之環佩拂回旋之舞衣及夫荏苒時移崢嶸歲久堂惟荊棘塵埋戶牖嗟建章之火流何金石之可守礎則不易人將誰壽礎兮礎兮全堅固曾見深宮幾人故夫礎之為德既堅且貞華而尚素晦而尚清象君子之待問扣之則鳴誠在位之有式居必底平平則可久久則不傾無靳固而守朴非昭章而眩明庶夫人之鋭意覽茲物而篤誠於赫至化時惟大君推歷比夫軒后授人齊乎放勳北風戒節南至司分驗律飛灰遙應乎懸炭登臺視祲必在乎書雲麗乎時方別色天斂殘氛星連珠而候曉日合璧而呈文衆瑞咸集禎祥薦至雲散黃光天浮喜氣金柯郁郁而蔽野玉葉飄飄而委地回紀天表永無兵意災沴靡作罷札瘥之虞水旱不行詠京坻之事得此先甲還同漢日之觀報以豐年不假春秋之備於時帝在暘谷風后陪驂會玉帛而塗山有愧朝公卿而汾水懷慙佳氣從龍遙連渭北非煙拂日俯對終南懿聖誕之與萬美皇道而超三保章告其符祉太史視其簪紱應子月兮生一陽奏黃鐘兮動萬物乃明南至者日極之數視雲物者歲占之故其在必書不常度慶瑞滿於圖牒獻納盈其府庫鳳凰下於元都銅雀棲於溫樹調玉燭而陰陽燮和撫黔首而時令大布日之方夕歲聿云暮才非瞽史未知天道之祥文似相如願獻淩雲之賦國將郊禘王有聘享宴而習禮射以觀德大侯既抗敦弓乃堅天子張熊武之威諸侯異朱元之殺不及地武何所失儀高其下綱誠為順理然禮崇三讓無聞固請之辭射有五容先招不至之誚雖飲於少算自可奠豐而獻爾發功方觀袒決於賓微為舍禮在景何所儀但欲旌能期於書過東海于門高容駟馬南陽張第榮珥七貂通德未孚薄言斯露或以霞扉晝敞臨大道之青樓畫栱雲構接長楊之綺陌有同樹塞不遠人境車馬之客相闐冠蓋之賓坐合若也人惟白屋奢僭之辜何逭必其地是朱門公侯之家始復有勳有蔭既未審於高卑應闔應開誠可窮其新舊敬申三覆然定五刑
