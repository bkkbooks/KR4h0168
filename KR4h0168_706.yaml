front:
  text: 全唐文欽定全唐文卷七百六李德裕十一
  hash: sha256:780cc6e2dbf6684731513c9f81f353701ae08b2355924cdaeff6254273daf874
body:
  text: 臣訪聞此水本因妖僧誑惑狡計丐錢數月以來江南之人奔走塞路每三十家都雇一人取水擬取之時病者斷食葷血既飲之後又二七日蔬食危疾之人俟之病愈其水斗價三貫而取者益之他水沿路轉以市人老病飲之多至危篤昨點兩浙福建百姓渡江者日三五千人臣于蒜山已加捉搦若不絶其根本終恐無益黎氓昔吳時有聖水宋齊有聖火事皆妖妄古人所非乞下本道觀察使令狐楚速令填塞以絶妖源王智興於所屬泗州置僧尼戒壇自去冬于江淮以南所在懸榜招置江淮自元和二年後不敢私度聞泗州有壇戶有三丁必令一丁落髮意欲規避王徭影庇資産自正月以來落髮者無慮數萬臣今于蒜山渡點其過者一日一百餘人勘問惟十四人是舊人沙彌餘是蘇常百姓亦無本州文憑尋已勒還本貫訪聞泗州置壇次第凡矒夫到者人納二緡給牒即回別無法事若不特行禁止比至誕節計江淮以南失卻六十萬丁壯此事非細繫於朝廷法度下闕右臣等伏聞開成中文宗嘗顧問宰臣欲褒崇憲宗功德其時宰臣莫能推順美之心明尊祖之義臣等至愚竊所嘆息伏思國家受命二百二十五年矣列聖之功德區宇之廣大王化之盛興禮樂之備具過殷周遠矣而未有中興不遷之廟臣等所以夙夜發憤也禮祖有功宗有德夏之祖宗經傳無聞殷則一祖三宗成湯為始祖太甲為太宗大戊為中宗武丁為高宗劉歆曰天子七廟苟有功德則宗之所以勸帝者功德博矣故周公作無逸舉殷之三宗以勸成王漢景帝詔曰孝文皇帝德厚侔天地利澤施四海廟樂不稱朕甚懼焉其為孝文皇帝廟為昭德之舞以明休德然後祖宗之功德施於萬代其與丞相列侯中二千石禮官具禮儀奏焉丞相申屠嘉等奏曰功莫大于高皇帝德莫盛于孝文皇帝高皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜代代獻祖宗之廟又漢宣帝詔曰夙夜惟念孝武皇帝躬履仁義選明將討不服功德茂盛不能盡宣而廟樂未稱其議奏有司奏請尊孝武為世宗廟奏盛德文始五行之舞天子代代獻此則子孫褒崇祖宗之明據也自天寶以後兵宿中原強侯締交髖髀甚衆貢賦不入刑政自出包荒含垢以至于貞元德宗懲奉天之難厭征伐之事戎臣優以不朝終老于外其卒則以幕吏將校代之故長武城在王畿之內斥逐主將河中居股肱之郡坐邀符節韋臯因備邊之勢自擅靈關李錡竊煮海之資專制澤國而兩河蕃鎮或倉猝易帥甚于奕碁或陸梁弄兵同于拒轍憲宗攄祖宗之宿憤舉升平之典法始命將帥順天行誅元年僇惠琳暨闢錡季年梟元濟及師道其他或折簡而召或執圭請覲獻其名城割其愛子不可遍舉豈有去天下之害不享其名致生人之安不受其報臣伏見元和初議遷廟之禮而史官稱中宗不得號中興之君凡非我失之自我復之謂之中興漢光武晉元帝是也臣等竊思此議實所未盡中宗朝自以政事多釁權移后所以未得稱為中興恐議者復以此為疑夫興業之與隆道事實不同漢光武再造邦家不失舊物晉元帝雖在江左亦能纂緒此乃王業中興可謂有功矣殷高宗躬行大孝求賢俾乂周宣王微而後興衰而復盛此乃王道中興可謂有德矣故詩云車攻宣王復古也宣王能內修政事外攘夷狄復文武之境土又蒸民美宣王任賢使能周室中興焉又江漢美宣王能興衰撥亂命召公平淮夷又漢書宣帝贊曰功光祖宗業垂後嗣可謂中興侔德殷宗周宣之美若皆如漢光武晉元帝則殷宗周宣並不得稱中興矣臣等伏思任賢使能內修政事平淮夷之叛復祖宗之土皆憲宗有之所謂隆道中興與殷高宗周宣王漢宣帝侔德矣臣等敢遵古典請尊憲宗章武孝皇帝為百代不遷之廟上以昭陛下大孝之德廣貽謨之訓下以表臣等思古之憤申欲報之誠如合聖心伏望令諸司清望官四品以上尚書兩省御史臺與禮官參議聞奏謹録奏聞右奉批答巳蒙允許今欲頒下制命昭布萬方伏以軒屈崆洞堯遊姑射未有不心期於至道而能功濟於生靈暨漢之文景尊奉黃老理致刑措時稱大康開元中元宗經始清宮追尊元祖闡繹道要遂臻治平六合晏然四十餘年今者陛下蹈軒后之靈蹤修開元之故事進道不遺于尺璧澄心已得于元珠聖壽必過于殷宗景化方躋于漢代臣等所上徽號義雖盡美意有未周今謹上尊號為仁聖文武章天成功神德明道大孝皇帝所冀冠皇王之高號盡臣子之至誠伏希聖慈容鑒丹懇謹録奏聞伏候敕旨奉宣宣懿皇太后祔光陵同元宮及不移福陵只祔廟何者為便商量奏來者右臣等伏以園寢已安神道貴靜光陵因山久固僅二十年福陵近又修崇足彰嚴奉今若再因合祔須啓二陵或慮聖靈不安未合先旨又以陰陽避忌亦有所疑不移福陵實合禮意伏以照臨在天光靈未遠合食清廟于禮無違足以申陛下大孝之心表先后昭配之德既遵舊典尤愜衆情臣等商量祔太廟不移福陵實為允便臣等不任感切之至奉宣宣懿皇太后祔廟事令更審商量奏來右臣等伏以陛下孝極因心感深追遠敬慎禮典發于至誠臣等仰奉聖情旁詢物議經旬思慮敢不精詳並請依前狀只祔太廟不奉陵寢實為合禮謹再奏狀以聞謹奏宣懿皇太后祔廟事右臣等訪求典禮敢不詳慎伏以太廟合食非臣子所議苟不由禮必為後代所譏漢書云古人據正守順不敢私其君如此之難也臣等若輕為獻議不守禮經非惟上負聖德固亦自貽物論所以前者附欽義承慶口奏假以太皇太后之意即于禮至順人無異詞制中云近因慶誕太皇太后追感先帝久曠配食之禮便及先太后母德慈仁合配先聖陛下祗承聖旨詔臣下行之於禮無違可為後代之法若捨此商量便須出於聖意降敕情禮至重實難措詞伏望陛下察臣等愛君之心約臣等秉禮之至特允所奏必合㣥情臣等不勝懇切之至孟州汜水縣高祖太宗塑像右汜水武牢關是太宗擒王世充竇建德之地關城東峰有高祖太宗塑像在一堂之內伏以山河如舊城壘猶存威靈皆畏于軒臺風雲還疑于豐沛誠宜百代嚴奉萬邦所瞻西漢故事祖宗嘗所行幸皆令郡國立廟今緣定覺寺例合毀拆望取寺中大殿材木於東峯改造一殿四面兼置宮牆伏望號為昭武廟以昭聖祖武功之盛委孟懷節度使差幹事判官一人勾當修造緣聖像彩色頗已故暗望令李石于東都差揀絶好畫手就加嚴飾初興功日望令東都差分司郎官一人薦告至功程畢日別差使展敬未審可否右伏見禮記云君子將營宮室宗廟為先廣既庫為次宮室為後又韋彤五禮精義對曰古之制廟必中門之外吉凶大事皆告而行所以親而尊之不自專也今令城外置廟稍異禮文書于史策必虧聖政伏以朱雀門至明德門凡有九坊其長興坊是皇城南第三坊便有朝官私廟實則逼近宮闈自威遠軍向南三坊俗稱圍外地至間僻人鮮經過于此置廟無所妨礙臣等商量今日以後皇城南六坊內不得起私廟其朱雀街緣是南郊御路至明德門夾街兩面坊及曲江側近亦不得置餘圍外深僻坊並無所禁所貴不違禮意感悅人心臣等頻奉聖旨有事許再三論奏輒罄所見庶裨聰明謹具奏聞伏候敕旨右今月十三日於延英殿陛下謂臣等云侍講稱孔子其徒三千亦可謂之朋黨臣等自元和以來嘗聞此語幸因聖慈下問輒敢覼縷而言西漢劉向云昔孔子與顏回子貢更相稱譽不為朋黨禹稷與臯陶轉相汲引不為比周何則忠於為國無邪心也臣嘗以鯀共工歡兜與舜禹雜處堯朝共工歡兜則為黨舜禹則不為黨何者共工歡兜相與比周迭為掩蔽也如賢人君子則不然忠於國則同心聞於義則同志退而各自行已不可交以私是以趙宣子隨會繼而納諫司馬侯叔向比以事君不為黨也公孫宏每與汲黯請間黯先發之宏推其後武帝所言皆聽汲黯雖與公孫宏並進然庭誥云齊人少情譏其布被為詐則知先發後繼不為黨矣國史稱太宗嘗與房元齡圖事則曰非杜如晦莫能籌之及杜如晦至竟推元齡之策此又同心圖國不為黨也何者為黨漢書稱朱博陳咸相為腹心背公死黨東漢周福房植各以其黨相傾議論相軋故漢朝朋黨始于甘陵二部及其甚也謂之鈎黨繼受誅夷以王制言之非不幸也魏朝何晏丁謐依附曹爽祖尚浮虛使有魏風俗由茲大壞此皆為朋黨也略舉數節以明其類至於歷代朋黨不可殫言仲尼知季路之不免子遊識子張之未仁曾子罪卜商喪親無聞夫子罪宰我鑽燧為久惡既不掩善固宜稱此又不可為黨也班固稱周室既微由是列國公子魏有信陵趙有平原齊有孟嘗楚有春申抵掌而遊談者以四豪為稱首於是背公死黨之議成守職奉上之義廢矣此四豪者各有門客三千而謂之黨仲尼三千則不為黨蓋仲尼之徒惟務仁義不以爵祿為貴四豪之門惟務譎詐嘗以勢力相高今侍講欲以奔走權勢之徒攫拏名利之輩比方孔門上哲實罔聖聰臣未知元和以來所謂黨者為國乎為身乎若以為國則隨會叔向汲黯房元齡之道可得行矣不必聚黨成㣥以臣觀之今所謂黨者進則誣善蔽忠附下罔上歙歙相是態不可容退則車馬馳驅唯務權勢聚於私室朝夜合謀清美之官盡須其黨華要之選不在他人陰附者羽翼自生中立者抑壓不進孔門顏冉豈有是哉陛下以此察之則姦偽自見臣恐更有小人妄陳此説輒舉事例庶裨聰明伏望陛下留臣此狀時賜覽閲所冀小臣瞽説免惑聖心臣不任懇激之至謹録奏聞右臣等每蒙延英殿召對獲聞聖言常欲朝廷尊臣下肅此則是陛下深究為理之本伏以管仲古之大賢明于理國其言可以為百代之法管仲云凡軍國之重器莫重于令令重則君尊君尊則國安故安國在乎尊君尊君在乎行令明君察於理人之本莫要於令故曰虧令者死益令者死不行令者死留令者死不從令者死五者死而無赦又曰令雖在上而論可與不可者在下是上失其威下繫於人也自太和以來風俗大壞令出於上非之者在下此弊不除無以理國韋宏質所論宰相不合兼領錢穀臣等敢以事體聞奏昔匡衡云所以為大臣者國家之股肱萬姓所瞻仰明王所慎擇也傳曰下輕其上爵賤人圖柄臣則國家動搖而人不靜矣今韋宏質受人教導輒獻封章則是賤人圖柄臣矣臣等又以蕭望之是漢朝名儒重德為御史大夫奏云今首歲日月少光咎在臣等上以望之意輕丞相乃下侍中御史中丞詰問又貞觀中監察御史陳師合上書云人之思慮有限一人不可兼總數職太宗云此人妄有毀謗止欲離間我君臣流師合於嶺表又賈誼云人主之尊譬如堂㣥臣如陛衆庶如地故陛九級上廉遠地則堂高陛無級廉近地則堂卑亦由將相重則君尊其勢然也如宰相有姦媒隱慝則人人皆得上論至於制置職業固是人主之柄非小人所得干議古者朝廷之士各守其官思不出位况韋宏質賤人豈得以非所宜言上黷明主此是輕宰相矣後漢太學諸生頗干時政其時謂之處士橫議皆是亂風深要懲絶伏望陛下知其邪計從朋黨而來每事明察遏絶將來之漸則朝廷安靜邪黨自銷臣等不勝感憤輒具聞奏伏望特賜省覽謹録奏聞右據大唐六典隋氏門下省置諫議大夫七人從四品下今正五品上自大歷二年升門下中書侍郎為正三品兩省遂闕四品建官之制有所未備謹按左氏傳云衮職有闕惟仲山甫補之能補過也仲山甫則周之大臣漢書汲黯稱願出入禁闈補過拾遺後漢書張衡為侍中嘗居帷幄從容諷諫拾遺左右皆大臣之任故其秩峻其任重則君敬其言而用其道况謇諤之地宜用老成之人秩不優崇則難用耆德其諫議大夫望依隋氏舊制升為從四品分為左右以備兩省四品之闕向後與丞郎出入迭用以重其選右中丞為大夫之二緣大夫秩崇官不常置中丞常為憲臺之長今九寺少卿及祕書少監國子司業京兆少尹等並省寺之二皆為四品惟御史中丞官業雖至品秩未崇望升為從四品為大夫之二令不隔品亦為丞郎出入迭用以重其選以前臣等商量緣事關朝廷典制須行之可久必在博盡㣥議詢謀僉同望令兩省御史臺五品以上尚書省四品以上太子太保太常卿參議聞奏未審可否右長壽二年宰臣姚璹以為帝王謨訓不可闕于紀述史官疏遠無因得書請自今以後所論軍國政要宰臣一人撰録號為時政記厥後因循多闕紀述臣等商量向後坐日每聞聖言如有慮及生靈事關興替可昭示百代貽謀後昆者及宰臣獻替謀猷有益風教並請依國朝故事其日知印宰臣撰録連署名封印至歲末送史館右起居注比者不逐季撰録至有去官三五年後猶未送納者伏以每度延英奏事後向外傳説三事猶兩事虛謬豈有起居注記皆三二年後採於傳聞耳目已隔固非實事向後起居注記望每季初即送納向前一季文字與史館納訖具狀申中書門下史館受訖亦申報中書門下其起居改轉便望以注記遲速為殿最如有軍國大政傳聞疑誤者仍許於政事堂都見宰相等臨事酌量如事已施行非關機密者並一一向説所冀書事信實免有傳疑右準天寶三載十月六日敕九宮貴神實司水旱功佐上帝德庇下民冀嘉穀歲登災害不作每至四時初節令中書門下攝祭者準禮九宮次昊天上帝壇在太清宮太廟上用牲牢幣璧類于天地神祇天寶三載十二月元宗親祀乾元元年正月肅宗親祀伏以纍年以來水旱愆候恐是有司禱請誠敬稍虧今屬孟春合修祀典望至明年正月癸丑差宰臣一人祈請向後四時祭並差僕射少卿尚書等官所冀稍重其事以申嚴敬臣等去月二十五日已于延英面奏伏奉聖旨令檢舊儀進來者今欲及祭時伏望令有司崇飾舊壇務于嚴潔謹録奏聞伏候敕旨右既經兩朝親祀必是祈請有徵伏以自太和以來水旱愆候陛下常憂稼穡每念蒸人臣等所以上副聖心以修墜禮伏見太和三年禮官御史等狀或言縱司水旱兵荒品秩不過列宿今者五星悉是從祀日月猶在中祀又云太一天一此九神於天地猶子男也竊觀其意皆是以星辰不合比於天地曾不知統而言之則為天地而在天成象自有尊卑謹按後魏五均志大辰第二星盛而常明者為天皇露寢大帝常居始由道奧而陳變通之迹又天皇大帝其精耀魄寶蓋萬神之祕圖與河洛之命紀皆稟焉此則上帝是星之明據也天一掌八氣九精之政令以佐天極微明而有常則陰陽序而大運興太一掌十有六神之法度以輔人極微明而得中則神人和而王道平又北斗有衡權二星天一太一參居其間所以財成天工輔相神道也若一概以列宿論之實為乖謬又按漢書天神貴者天一太一佐曰五帝古者天子以春秋祭太一則列于祀典其來久矣今五帝猶為大祀則太一豈宜降禮稍重其祀固為得所劉向言祖宗所立神祇舊位誠未易動又曰古今異制經無明文至尊至重難以疑説正也以劉向博通尚難改作况臣等學不究于天人禮尤懵於祀典妄為參酌恐未得中伏望更令太常卿與禮官詳定庶獲明據右伏以近例其日若遇有敕權停朝賀惟詣興慶宮賀太皇太后義安太后積善太后不詣闕庭恐乖嚴敬臣子之禮實不遑安臣等商量向後冬至歲如遇有敕權停朝賀者其日中書門下與百僚先詣東上閣門拜表稱慶望內降高品宣答百僚受宣畢然後赴興慶宮庶為得禮仍望永為常式未審可否謹録奏聞伏候敕旨右伏見天寶以前中書舍人六員除機密遷授之外其他政事皆得商量宰臣姚崇奏云事有是非理均與奪人心既異所見或殊抑使雷同情有不盡臣既是官長望於狀後略言事理優劣奏聞進止自艱難以來務從權便政頗去於臺閣事多系於軍期決遣萬機專在宰弼伏以陛下神武功成昧旦思理精核庶政在廣詢謀詩云不愆不忘率由舊章前漢魏相好觀故事以為古今異制方今務在奉行故事而已數條漢興以來國家便宜行事奏請施行臣等商量今日以後除機密及諸鎮奏請戎事有司支遣錢糧等外其他臺閣常務關于沿革州縣奏請系于典章及刑獄等並令中書舍人依故事商量臣等詳其可否當別奏聞右今月十三日於閣中面奉聖旨令撰書進來者臣請待鄭肅等與語了撰述今撰訖謹進上右奉宣令臣於書內添堅昆事者緣未審知頡戛斯的是堅昆之後恐須粗言梗概未可明書今已依宣添改其間有詞意未盡處亦更加添臣學識空虛文理淺近再陳嚴扆伏積兢惶謹連封進右奉宣令臣撰進來者臣詳其表中情款一一報答盡不闕遺兼不為文言遣其易會緣册命時須令其稱蕃事須云册命之禮並依回鶻故事若須更有邀約即待朝廷命使日別賜敕書稍為允愜謹緣上進未審可否右臣等伏見近日實録多云禁中言者伏以君上與宰臣及公卿言事皆須衆所聞見方合書於史策禁中之語向外何由得知或得於傳聞多出邪妄便載史筆實纍鴻猷向後實録中如有此類並請刊削更不得以此紀述又宰臣及公卿論事行與不行須有明據或奏議允愜必見褒稱或所論乖僻固有懲責在藩鎮獻表者必有答詔居要官啓事者自合著明並當昭然在人耳目或取舍存於堂案或與奪形於詔敕前代史書所載奏議無不由此近見實録多載密疏言不彰于朝聽事不顯于當時得自其家實難取信向後所載㣥臣奏議其可否得失須朝廷共知者方可紀述密疏並請不載如此則書必可法人皆守公愛憎之志不行褒貶之言必信矣以前臣等伏見近日實録事多紕繆若詳求托實須舉舊章謹件如前右按史記仲尼在位獄訟之詞有可與人共者不獨有也伏以漢魏以來朝廷大政必令公卿奏議講求理道博盡㣥情所以政必有經人皆務學著在史策粲然可觀臣等商量如有事關禮法㣥情凝滯者各望令本司申尚書都省下禮官學官詳議意見不同者任為別狀如是刑獄亦令法官同議然後丞郎以下詳具可否聞奏如郎吏有能駁難者皆許上聞並須先據經義其次取正史策故事不得自為意見言涉浮華如禮官學官才識出人議論精當者向後擢授臺省官郎吏別與遷擢所冀漢魏之風復行今日以前臣等今月二十五日已於延英面奏奉聖旨令條疏將狀來者謹具如前
