front:
  text: 全唐文欽定全唐文卷九百二十七含光揚州江都人天寶時道士
  hash: sha256:c02834cb6622856307b0d88cbba1d298b0a50fdb6c8b2cd6de17b64c928fe34a
  markers:
  - {type: head, offset: 14, content: 李含光, id: KR4h0168_NFKB_927-h1, level: 1}
body:
  text: 道士臣含光言今月十八日品官王遊仙宣口勅賜臣法衣六副又今日將軍高力士宣旨賜臣御製詩一首縑二百疋幷香爐等臣雖在道流素無深識因遇聖代仍荷國恩霓裳羽服出自天府神筆睿藻頓集微軀臣之叨受實踰涯分臣自嬰風疾十載有餘形衰力弱觸事俱廢惟願香爐致福上答聖躬終此餘生不敢有二無任恐懼之至道士臣含光言今月二十四日中使啖庭瑤及道士唐若倩齎貝危物幷詞至山即以二月十五日與庭瑤若倩於華陽洞門燒香讀詞兼藏貝危信至暮事畢臣又奉勅旨錫號幷賜法衣忽承聖旨進退惶懼臣以僥倖頻忝國恩功微德薄寄情靡所不勝悚荷之至因投貝危已了謹遣楊慎奢奉表陳述幷謝以聞臣含光言竊見紫陽觀東隱居先生舊合丹所忽生芝草八十一莖形狀王褱奇光采秀麗根憑松石氣鬱蘭荃斯實矌代希有當今罕見伏惟陛下推誠洞府展敬無虧睠言紫陽載興修葺是以神物繁植用表吉祥凡與知聞僉云聖德所感莫不喜悅臣不勝欣躍之至謹遣楊慎奢先奉表以聞今圖寫芝形委曲詳辨事畢之日別差使上聞臣含光言今月十八日中使啖庭瑤齎御詞幷香至山臣即以昨十九日與庭瑤及同法劉行矩等詣紫陽觀東大橫山右燒香啟真密宣詞旨以今月依法採芝其芝草大小八十一莖籠盛如列無任喜懼之至因庭瑤謹奉表以聞臣含光言臣弟子唐若倩與前句容縣令李越成進芝幷奏以今日到伏承芝生藥院素表千莖丹化神罏光踰九轉自非聖德至重希代神物無由卒至謹按參同契論此丹云帝王永御千秋常存既未聞於往日實有徵於聖代不勝慶躍之至謹奉表陳賀以聞臣含光言臣雖服膺道法而拙於理身久患風疾月八人口膝無力入秋以來漸覺羸弊物性所習南北異宜伏望天恩許還本土冀漸醫藥稍延視息無任區區之至臣含光言昨十四日內侍袁思藝宣口勅以御製送臣歸廣陵詩一首見賜伏惟陛下虛巳應物巨細無遺爰寄睿懷降茲神筆翰兼雲篆之妙詞發玉晨之音顧慚優渥捧對無倦臣行裝已辦即日戒途違遠闕廷但深愧戀臣含光言季夏毒熱伏惟聖躬起居萬福去月八日中使啖庭瑤至山宣口勅以所齎縑二百疋幷香三合令臣於茅山用施齋醮幷賜臣衣兩副臣謹承聖旨於紫陽觀東鬱岡山右別立靜院剋取今月二十七日人定啟齋二十八日寅時為正齋之始自此之後以漸遵行計至冬間法事迺畢務盡心力以求感通但臣無功每蒙賜及伏增戰慄今供擬已辦謹遣弟子唐若倩隨中使齊令詵奉表以聞臣含光言晷度環周日長南至伏惟陛下膺納乾祐罄無不宜臣等今於茅山為國焚修齋醮無任欣悅之至謹遣中使啖庭瑤起居謹奉表以聞臣含光言前所奏請紫陽觀東鬱岡山右奉修齋醮自六月二十七日起首行道至今月七日冬至日初出時緣是齋人及中使齊令詵等咸見齋壇四遠松樹悉有甘露其色白其氣香其味甘其松去壇漸遠者而露亦漸少計今凡降甘露松樹都有二百三十株謹按道德經稱天地相合以降甘露人莫之令而自均焉元聖著經以為嘉瑞齋醮遇此又為吉祥敢不以聞謹遣弟子唐若倩隨中使齊令詵奉表供進甘露二合臣含光言孟春猶寒伏惟聖躬起居萬福去載十二月二十五日中使啖庭瑤及臣弟子唐若倩等至伏奉恩勅勞問臣蒙賜絹百疋行道道士賜絹二百疋又奉聖旨以本命紫紋七十疋五方紋繒各二十疋銀五百兩令臣依河圖內篇奉修齋謝幷餘功德臣爰以去載十二月晦及今載元正之日先於廣陵郡大唐廣業大龍興觀謹修嵗節吉齋以助履新之慶今又於茅山紫陽觀中銓舉同法有戒行者共營齋具講習之儀務令合法然後施用至夏齋畢隨時上聞但臣自顧非材謬參道法不意庸淺頻荷國恩雖竭愚誠豈酬萬一無任悚懼之至臣含光言仲夏炎熱伏惟聖躬起居萬福臣先奉聖旨令於茅山修奉河圖齋謝頻屬霖雨遂闕施行至今月八日夜始就宿啟次九月十日夜依法正齋幷伸禮獻次十二日江中投璧以望日設齋飯賢自始及終頗為周悉伹臣等學非師授材愧聰明雖謹按成規而所疑未洗不勝惶懼之至謹遣唐若倩奉表以聞臣含光言昨十日中使孟遊仙齎勅至茅山修功德所仰感聖恩伏增恐懼先於此日與諸道士能戒行者共遵香燈之務庶以助國扶教消災致福但臣等雖班法任愧乏感通區區之心不敢有二因孟遊仙使回謹奉表上謝以聞原夫赤明始開雲篆肇形於霄極炎漢後啟靈文漸布於人間西蜀則金闕遺科東吳則太極傳教繇是大有祕笈洞真瓊章張徐顯之於前陶陸敷之於後師資繼踵代生其人矣太上慈悲道場消災九幽懺者始自太極左仙公葛元於後漢桓帝時居天台上虞山隱身修行感太極真人徐來勤下降於仙公之室以靈寶天書玉字洞真洞元洞神三十六部寶經授之於仙公焉仙公在山精思靜念數十年間通神感聖山精木鬼衞護稽首沈魂逝魄悉得超生自謂大乘奧旨可以開導眾生拯濟沈溺遂於三洞品內撮其樞要纂集懺文使令當世㣥生悉聞悉見將來多士易悟易行至於無間酆都阿鼻寒夜三途五苦八難九幽沈滯苦魂不遭幽閉乃及見存過去未來所犯新罪宿愆冤結災難暜得法潤俱會正真因而流傳當爾之後趨惡緣者百不二三悟善因者十有八九是故仙班之業爰備化導之功既盈故立斯文標於卷首云耳愔秦州天水人初為道士開元二十年召拜諫議大夫集賢院學士兼修國史固辭不起詔以道士服視事乃就職卒贈左散騎常侍臣聞易曰精義入神以致用也利用安身以崇德也富哉言乎富哉言乎是知義必精然後可以入神致用致用必利然後可以安身崇德義不精而云致用用不利而云安身身不安而云知道者未之有也然則沖用者生化之主也精氣為物謂之委和漠然無間有與立矣則天地大德不曰生乎全其形生者在乎少私寡欲抱樸柔和遊心於澹合氣於漠且清明在躬志氣如神嗜欲將至有開必先故聖人垂教以檢之廣業以持之專氣致柔以導其和向晦宴息以窒其欲洗心藏密窮神知化然後身安而國家可保德用而百姓不知是以自天祐之吉無不利矣伏讀此經五章盡修身衞生之要全和含一精義可以入神坐忘遺照安身可以崇德研味滋久輒為訓註臣草茅微賤恩霈特深天光不違自忘鄙陋俯伏慚懼徊徨如失臣愔頓首頓首開元二十三年十二月十一日京肅明觀道士臣尹愔上瑋天寶時宏道觀道士皇上闕三字天下之卌載也物歸混茫人闕一字太璞故我元元聖祖闕一字服龍駕雲闕三字天明示真闕一字錫以寶符靈命國祚嘉祥所謂純嘏丕業永昭於左契矣明年春三月既望乃詔上清元都大洞三景法師玉真長公主有事於雝都闕二字宮洎名山闕一字岳亦既闕十一字無休也公主承天恭拜受命鬷假闕七字所以履虛闕一字而昭炯戒也於是浮函關之紫氣望帝鄉之白雲登華闕三字睢及渙驅馳百靈悠闕一字千里闕二字月屆於闕一字宮闕一字懇宣闕二字誠闕一字若闕一字奠闕一字聖敬之闕一字德闕一字皇心之在人精意闕二字休闕二字跡闕一字先天后廟有朱文隱成太字垂八角之闕五字宮有飛龍躍闕一字重泉闕二字井之瑞既而闕一字金闕一字河圖則天地合莫貞明連曜或潛虬吐液以澄映仙鶴縈空而鳴舞紫霞散壇彩雲拂樹允所謂降福穰穰惟休於無疆若是其至矣者哉迴闕二字旋闕二字太室捫日闕一字步元州挹上清羽人焦真闕一字於中峯絕頂訪以空同吹萬之始丹田存一之妙不逾月又將朝於王屋之天以及仙人臺而北岳洞靈宮胡先生賁闕一字來會先生文離其德骨乂其容河眸徹照嶽犀橫偃思闕二字寶聲動天庭廿五人獨守貞於恒代卅六洞遠陟降於清虛公主因齋心順風膝行避席請受八籙三洞紫文靈書先生竝虛已闕四字冥合遂以是月下宿甲午子夜象設壇宇星陳香燈以金寶盟天霜羅薦地時也煙霏夕霽闕一字朝徹林外如有靈官闕一字儀法位周列簫管清籟闕三字發倦成希微髣髴觀闕三字灑萬水䬃然闕一字音而壇無搖旌燈不闕一字焰公主於是官三極府百神左右不戒而嚴肅如也洎乙未丁酉異夕同符皆有甘露夜零珠明玉潤華滿庭樹闕一字龍人闕三字臺下有泉石闕三字紛綸闕二字殆不可測每有至人精思遐感則霜韻潛鳴迺五月辛丑之夕公主闕二字文闕一字玉闕一字鐘聲闕二字發深底遠闕二字韶自暝達曙舂容不絕壬寅佩五老真印杖八威神闕一字瑞五嶽靈飛六甲傳豁闕三字或日月交輝或煙霞動色晃朗天宇揚光仙山至若闕一字陰闕四字雲闕一字鬱儀結璘之錄闕二字宴景之道則有闕一字公闕一字保三闕二字司皆降飛雲闕一字朝闕七字授闕二字冥感闕二字故署仙格曰玉真萬華真人闕一字有命自天理闕三字甲辰宮功受祛闕二字解散闕一字有祥煙蓬蓬自中壇而起闕一字神闕一字羽駕歸飛於太空闕八字徐轉公主闕一字鳴闕一字大鼓闕三字延闕二字之迄乎居室矣是嵗東周炎冗自春徂夏人闕二字力野無良苗公主闕一字仙闕二字洞府闕一字鑪闕五字剛俾夫金龍驛傳壁奠闕一字禮闕七字流盈尺故當時遠近咸謂之為公主雨焉則知大德苞於經濟者其惠也廣行通於神明者其感也深自非降闕一字彤庭孕靈金格持受無闕二字為至人則曷能靜該闕一字道闕三字天祐祈誠必應休有明徵者哉公主法號無上真字元元睿宗大聖貞皇帝之十女今上之闕二字妹青闕五字洞虛闕一字葆闕一字元門而禎符不一年十二嵗當景雲之初始受闕一字道於括蒼羅浮真人越國葉公其時老君為親降法壇闕一字烏三刻言皆口授旨以神融故闕二字章隱訣代莫得而聞也今見事載青史辭編玉諜西京闕一字陽闕一字之樓觀者昔文始先生尹真人望氣之所山水厔盩蒼蒼古墟崢嶸丹宮後聖有作公主以闕二字天寶之前嵗孟夏月佩采靈之印混闕二字之心能自存真斯焉悠處若然者七日而所居精室卿雲覆之有二青衣玉童自雲來拜因而動承指使常在左右也闕一字仙格之稱不其闕二字自是闕三字之闕六字踵息聽道遺形絕粒動無違事矣不闕三字能周闕一字萬象徧索㣥岳得於茲山焉夫此山者隱元陽臺小有天洞環合曾翠淩闕五字騰赤霄闕六字丹闕一字而闕四字昔王子晉舉手緱嶺息駕於斯者詣天壇凡卌里傍連大行闕二字千闕三字皆秀孤松自煙况其呀谷攢峯玉林瑤草可名言也公主未筓闕二字為采真人居闕一字門闕六字丹竈闕一字日藥園長春白水闕四字卷石可以闕二字也主上前年揮灑宸翰光題寶額曰平陽洞府小有仙臺又於山門別署金牓為靈都觀公主爰遊爰處將廿年功行已成昇仙階近故凡五闕一字真錄闕二字植闕一字合闕一字移步闕三字如闕四字之輕舉元默天闕一字蓋闕一字願祝堯不能忘魏是知無往不適與闕一字道為徒者非至德其孰能與於此焉有若監度保舉中岳三洞鍊師闕三字王玉京同法壇西岳道士敬延壽中岳內謁者監程元暹王屋令李拯官寮道俗莫不咸同盛觀時東京法眾元元觀主王虛貞等闕一字金闕二字靈封陪闕一字乎絳節之前倘佯乎碧宇之外闕三字會闕一字聲揚言慶大君受祚於元元大妹同符於女偊詠歌不足願紀斯文瑋幸得奉辭瑤壇舐札仙府輒敢扣沖寂搜窅冥昭列元猷闕一字茲闕二字誠慚闕一字翰或愧當仁時昭陽記嵗蕤賓貞月有唐天寶十二載也先生諱探元字體微家世南陽正一真人道陵師君之冑也真人光上清之版蓋中古之仙眄睞而驅馳鬼神指麾而震動河岳仙支流乎百代真氣降於三天元元將斧繢妙門光傳法印興復乃烈是生貞元曾祖儼周襄國紫州刺史大父幹隨平州司馬襲封朝陽縣開國子父睿遭季世亂離終身向晦莅州也政符於德儒司武也才叶於文若避世也道鄰於仲御盛矣哉其先自沛遷鄧朝陽因官徙廣平令為臨洺人也先生童而遜悌冠而貞愿勁若修篁之節和如浮磬之聲正衣冠而冰雪在容離堅白而窽郤遊刃師君之施遠矣文明初天皇下席國家延慶於道度為仙官隸本郡明山觀道士開元初輔西京景龍觀大德恩詔供奉將授諫官先生執心堅明守道純固固辭見許十年朝廷增崇大聖祖元元廟祠庭有侐密邇宮垣擇賢才以時禋潔天子精選黃褐親垂紫書先生與峩眉王仙卿青城趙仙甫漢中梁虛舟齊國田仙寮等允膺宸鑒有司備禮冠葢紛迎登邙山俯河洛飄飄明霞之外窅窅凝元之際望者以為神仙之會也廿一年詔為東都道門威儀使與洞元先生司馬秀同拜於玉清元壇冠重謺之五雲佩離羅之九色霜臨絳府冰鑒元都邈登仙階永執天憲自是采真遊者知證曏之所存焉俄兼聖真元元兩觀主清飈不弭令望如初先生異時靡然歎曰始吾擢德繕性矜仁宿名將以跡混人間心存應帝殊不知外韄內揵已滑真焚和大丈夫當神動天隨披然闕是因歷選海岳至止乎茲山焉入清虛洞宮得皇人祕記曰凡初躋道位必先詣陽臺即此山是也先生乃考卜幽勝薦辭明靈至誠元通若遇神授雖子真谷口遠遊邙中亦一時也古老相傳曰仙人臺也昔周王昇仙太子朝天壇於此臺上有憩笙鶴之跡我唐玉真公主於臺下構館為集靈仙之都元風嘉聲信萬古之同德其地即是古奉仙觀前有投鐘泓為蜺桓之潘每至陰凝黛碧則霜韻常聞雖千載之湮淪亦九州之殊異者也公主以天人之貴帝子之尊玉鏡清懸瓊華洞照自夫署真官於金格列仙位於瑤臺曰大洞三景法師四紀於茲矣頃年搖羽節吟鳳簫真相光煌於九夭風馭周遊於㣥岳以為此地青溪萬仞碧洞千門煙蘿嘶風金澗生月可冥八祕滋五牙朝會丹田豫遊沖漠皇上奉尊祖之孝穆友于之仁恩降紫宸光融碧落題上方公主幽居曰平陽洞府小有仙臺又於山門別署金榜為靈都觀貴主又罄散湯沐首事增修先生亦德契言從道同心一盡以天恩所賜巾裘器服及私居莊碾園野資營繕焉惜乎厥功未就而奄然體逝享年七十有六默遷於山口雲泉之業時天寶元年七月丙寅也先生將示疾也豫修金籙法事躬奠河圖醮禮倏有二仙光降百神昭明其景象靈命及遺誡元謌誌傳詳焉文多不載及乎解蛻也非煙覆寢異香盈室奓老龍之戶疏子鶴之塋鄰人見先生紫衣白馬俄亡所在烈風迅雷晏而後息八月壬寅封樹之際赤氣被於元宮信夫昇仙之驗也奉仙觀主段抱質聖真觀監齋寇含光夙奉主恩經始靈都之役道士席守元馮若水闕一字絢朱運劉意竝承天澤服御元牝之門猶子庭芝門人靈應或感愴泉洞或悽傷竹林相與歎雲雪霓之不歸望松檟之增慕瑋也肅尚其德悅聞其風敬諡曰貞元先生頌崖畧於幽石溥博泉源清璋孕靈淪激波怒如雷如霆於昭乎貞元才全而德形端若表炯若星嶷岳峙潛泉渟同乎而來委天和而出寧修然而往混元化以歸冥乘日之車兮馭雲之軿飛霞丹霄兮流金火鈴小有空洞兮清虛明庭雲層峩峩兮上震下炯浩劫洋洋兮厥德彌馨礪俗天寶時丹陽郡紫陽觀道士道士臣礪俗等言伏奉五月十三日恩制紫陽觀取側近百姓二百戶太平崇元兩觀各一百戶竝蠲免租稅差科長充修葺灑埽者實以光昭洞府永搆元門埽飾開清靜之場施力增人戶之福伏惟開元天寶聖文神武應道皇帝陛下廣崇道化克著真宗重闡山微猷彞倫法要遂使靈山祠宇載葺頺綱茅許仙居感蒙創迹臣等愚昧濫在法流叨沐殊恩曲霑霈澤所以遠馳丹禁跼蹐天庭無任感荷喜悅之至謹躍龍門奉表陳謝以聞政觀開元時景龍觀道士勅內肅明觀道士尹愔宣勅內出御文賜臣師主臣跪奉天章仰瞻宸翰以惶以喜載慶載悲臣忝與門人不勝感愧之至謹錄陳謝以聞辨天寶時道士臣自凡愚生逢大聖服膺真教庇影元門謬得侍奉禁闈恭承待問夙夜兢惕將何克堪伏見陛下親教步虛及諸聲讚以至明之獨覽斷歷代之傳疑定驎驥於海陸分景鏡於真偽平上去入則備體於正聲吟諷抑揚則宛仍於舊韻使詠之者審分明之旨聞之者無言為舛之嫌妙協鈞天克諧仙唱伏以靈章本趣理固如然但為流傳人間訛謬滋久非應道之主孰能正之是可以振暢元風發揮聖作臣忝趨仙禁豫聽正聲欣戴之誠倍萬常品乞特賜編諸史冊宣示中外
