front:
  text: 全唐文欽定全唐文卷二百八十七張九齡五
  hash: sha256:95b7648365d124a4a50c1ec78ae6e92d984e2a55d088fa09dc2861338f6dd689
body:
  text: 皇帝問吐蕃贊普近竇元禮往事具前書贊普後來亦知彼意朕推心天下皆合太和況於彼蕃復是親婭仍加結約盟誓再三以至道言之此亦仁義不薄也而贊普且猶未信復是何心君長大蕃固不容易所云去年七月巂州將兵抄掠兼有詐誘巂州之外尚隔諸蠻既背吐蕃自行寇抄掠而乃推托於我何為遙信虛詞且西南㣥蠻別是一物既不容於我亦不專於吐蕃去却不追來亦不拒乃是兩界所有只合任其所歸自數十年來或叛或附皆所親見豈假縷言往者此蠻背恩侵我邊鄙昆明即巂州之故縣鹽井乃昆明之本城今復舊疆何廢修築而云除却是何道理且邊境備守彼此常事今既和好何有嫌疑至如西自蔥嶺已來沿邊諸處或地勢是要或水土是好彼有城鎮亦皆內侵朕既不解廣求更以自益緣已和好不可細論且八疊山築城置鎮皆入漢界何曾以此為言而彼即生詞未知何意邊城委任當擇忠良無信小人令得閒搆夏中已熱贊普及平章事部落百姓並平安好遣書指不多及皇帝問贊普自與彼蕃連姻亦已數代又與贊普結約於今五年人使往還未嘗有閒朕以兩國通好百姓獲安子孫已來坐受其福疆場之事幸且無憂此雖境上有兵固是存而不用在彼邊事與此何殊近得來章又論蠻中地界所有本末前書具言贊普不體朕懷乃更傍引遠事若論蠻不屬漢豈復定屬吐蕃耶彼不得所即叛來此不得所即背去如此常事何乃固執復於國家何有朕豈利之至如彼中鐵柱州圖地記是唐九徵所記之地誠有故事朕豈妄言所修城壁亦依故地若不復舊豈為通和蠻中抄掠彼人勘問亦有此事緣其初附法令未行亦有姚巂邊人奸險求利或入蠻同盜亦不可知既與贊普重親朕又君臨大國正欲混同六合豈復侵取一隅再三巳論何乃不信顧慙薄德良用咨嗟且如小勃律國歸朝即是國家百姓前遭彼侵伐乃是違約之萌朕以結信既深不顧其小中閒遣使曾不形言贊普何獨相尤而不思巳西之事所存既大當共成之近聞莽布支西行復有何故若與突騎施相合謀我磧西未必有成何須同惡若爾者欲先為惡乃以南蠻為詞今料此情亦巳有備近令勒兵數萬繼赴安西儻有所傷慎勿為怪也朕心無所負事欲論平但國家之所守者信鬼神之所助者順未有背道求福違約能昌何況兵衆不可當而又天道所不假以此求濟不亦難乎遠道所傳多應不實亦計贊普不合異圖故令人審看定何緣也待潘息回日更別具委曲今附少物具如別數為路遠不得多附春首尚寒贊普及公主比如宜也平章事及首領以下並平安好今使內常侍竇元禮遣書指不多及皇帝問贊普得七月一日信所言陰承本奏請不擬與彼和將兵馬大入者至如和與不和事皆由朕自斷何人輒敢奏聞何兵即敢擅入所結親好不是近年文成公主巳來亦重疊矣中閒或絶或繼終是舊好存焉惟道此有讒臣不知彼專搆造亦須自覺豈可推過至如兵馬邊備彼與此同既見彼處加兵豈此總無備矣疑自彼起不可相尢近日築城不出疆界邊頭有要隨事修營何所致疑以此為語如彼頻歲亦築數城若不惡心何故嚴備固是邊境常事不足為言忽此相尢深所未達彼蕃必其自守此兵終不妄行所立盟約更知何用鬼神知意不必多言秋氣已冷贊普及平章事以下並平安好遣書指不多及皇帝問贊普此使前至之日具知彼意竇元禮中閒所云亦巳備論且親以舅甥之國申以婚姻之好義非不重心豈合疑頃歲以來加之盟約此又不信其如之何至如境上蠻夷元是衆物來不可拒去不可追前書己言想所知也而每來信使皆以為詞或云越界築城或稱將兵抄掠且蠻即背彼伊自築城城在蠻中人即隨地所以侵竊亦是㣥蠻皆在荒遐豈關處分而歸過於我無乃甚乎邊境小人不識大體此既未免彼亦有之閒搆既行猜嫌互起朕近已知此贊普亦須察之勿取浮言虧我大信以絶兩國之好甚善甚善所有諸事皆具前書公主所請與人官及內人品第即當續有處分春晚漸熱贊普及平章事首領百姓並平安好今有少物別具委曲至宜領取遣書指不多及敕金城公主歲月流易忽復經年言念遠情何能巳巳比者通好信使數來知彼所宜善足為慰國家大計以義斷恩離別嬰心固當自抑仍善須和順使歡好如初所請授官及內人品第既久在彼誠亦可矜即當續有處分宗元禮衰疾近不能起賈混之緣此未得獨行待其稍瘳亦即遣去今有少信物至宜領取春晚公主已下並平安好遣書指不多及皇帝問贊普朕與彼國既是舊親近年以來又加盟約如此結固仍有猜嫌明知異域之心亦難可保比者所有信使惟知怨此相違自料國家何負於彼至於突騎施蕞爾醜虜頃年恃我為援幸至今日而敢辜恩朕未即誅之待其惡積贊普越界與其婚姻前者以意向道即云尋已告絶朕亦委信以為必然今乃定婚如初黨惡可見又莽布支西出朕具知之今竇元禮往彼問以何故又道別緣他事為此遣還其人實將兵西向擬行攻取前後詐妄言與事違驗在目前得不歎恨夫人之所以為貴者以其有信有禮國之所以能強亦云惟信與義若言不可信義不可親雖在匹夫尚多恥愧何況君長能無情乎彼突騎施人面獸心偏僻荒遠見利則背與親實難贊普背朕宿恩共彼相厚應非長策可熟思之又比來觀彼事意有殊往日惟任計數以此為能今與突騎施和親密相結託陰有贊助而傍作好人如此潛謀亦非遠計所欲為患不過邊庭且邊鄙之於中國如毫毛之在身耳以彼戎狄侵我毫毛雖實無多何須有損朕所以殷勤和好欲靜邊人君國之心不能忘也亦與贊普纍代舊親幸無大故不宜輕絶今邊鎮兵馬不可不防彼亦有之與此無別既不先舉自足知心從前所言豈有虛也秋晚稍冷贊普及平章事首領百姓並平安好遣書指不多及敕金城公主數有來使聞彼安寧差慰遙心想所知也柔順之道既以夙成終始用心貴於無失惟此而已餘不足言所附物並依領具有還答並更附少信物別有委曲至宜領取秋冷念比何似遣書指不多及皇帝問吐蕃贊普比亦覺彼事勢有異略加防備仍未益兵今得安西表來莽布支率衆巳到今見侵軼軍鎮并踐暴屯苗先知彼有異謀猶未自將至此者且莽布支西出朕先知之前令問其行由得報自緣別事今乃為賊負心如何安西諸軍去此萬里倉卒遇敵何暇奏裁既彼交侵必應拒鬬倘有傷損可無相尢軍城鎮守之人不可朿手就死事由彼起深所咨嗟且纍代舊親復新有盟約彼既欺負天地違犯鬼神如此用心更知何道一往邊頭所備只緣慮有非常今果如言防乃不錯突騎施異方禽獸不可以大道論之贊普與其越境相親只慮野心難得但試相結久後如何於朕巳然義則合絶但為誓約在近親好又深彼雖背恩豈我尢效先令奔問欲盡舊情必定為惡別為之所一昨遣內常侍劉思賢送公主封物并每年國信物見已臨路適會表來思賢此行量其在道遲緩今故令劉思賢判官劉明子先行具宣往意秋冷贊普公主及平章事首領百姓並平安好遣書指不多及敕天山軍使西州刺史張待賓吐蕃背約入我西鎮觀其動衆是不徒然必與突騎施連謀表裏相應或恐賊心多計諸處散下鐵關千術四鎮咽喉倘為賊所守事乃交切巳敕蓋嘉運與卿計會簡練驍雄於要處出兵以為聲援仍遠令探候知其有無自外臨時皆委卿量事秋冷卿及將士並平安好遣書指不多及敕河西節度副大使太僕卿攝御史大夫牛仙客突騎施連歲犯邊凶惡如此若不威服祗長寇讎自夏及今連歲不散疏勒雖解邊城見侵雖無如我何亦為邊所患終須有計以挫凶謀卿可於西河諸軍州揀練驍雄五千人即赴安西受王斛斯部分朕當發遣十八年安西應替五千四百八十人與彼相續足得成師若無暫勞何從息甲且此賊狂悖不論信義直肆凶毒其意巳然不此加兵以圖撲滅使其驕暴豈有寧時巳敕蓋嘉運與王斛斯審量事宜臨時為計既為卿探訪所管亦宜隨要指麾兼有別敕發三萬人此但聲援而巳可大張威勢遠使震攝又恐安西資用之乏卿可於涼府將二十萬段物往安西令隨事支擬及充宴賜朕則續支送涼府冬中甚寒卿及將士並平安好遣書指不多及敕天山軍使張待賓近知賊下燒此安然即去竟無斥堠來不預知如此防邊無乃踈闊此一分頭抄掠計其數不至多向若烽燧稍明復與北庭計會相與來擊賊可無遺且邊鎮統軍俱受朝委共防患害何異一家況在絶漠尢宜相協巳敕蓋嘉運訖可與之籌宜凶黨復來固須有預冬中甚寒卿及將士並平安好遣書指不多及敕護密國王真檀朕知卿忠赤能保國境所以前加禮命用叶蕃情卿感此殊恩盡力外禦聞有凶寇能伸遠績以義動衆雖弱必強豈獨人心亦有神鑒朕用嘉歎不可忘也冬末甚寒卿及將士並平安好遣書指不多及敕護密國王真檀發匐積惡自取滅亡想所具知不復煩述卿比者雖受冊立緣此未得還蕃彼既伏辜固無隔閡卿宣揚國命慰撫遠人保我西陲長守誠節突騎施凶悖恣其抄掠卿宜善計勿令不覺其來已西商胡比遭發匐劫掠道路遂斷遠近吁嗟卿宜還國必須防禁蕃中事意遠路難聞可量彼權宜便與王斛斯計會夏末甚熱卿及首領百姓並平安好遣書指不多及敕識匿國王烏訥沒莫賀咄卿比與護密相為唇齒而發匐凶狡劫殺商胡罪不容誅走投異域朕知其惡積改立真檀遽聞却來還占本國卿等讎疾頑暴相率誅之纍歲逋逃一朝翦滅永言忠義深所嗟稱今授卿將軍賜物二百匹錦袍金鈿帶七事巳下節級亦有衣物各宜領取夏末甚熱卿及百姓並平安好遣書指不多及敕勃律國王蘇沒謹忙得王斛斯表卿所與斛斯書知卿忠赤輸誠聞有外賊相誘執志無二又聞被賊侵寇頗亦艱虞能自支持且得退散并有殺獲朕用嘉之卿兄麻來兮及首領已下各量與官賞具如別敕今賜物三百匹銀盂缶銀盤各一衣一副並金鈿帶七事至宜領取夏中甚熱卿及首領以下並平安好遣書指不多及敕諸國王葉護城使等突騎施不道連年作寇使我邊鎮常以為虞諸處攻窺所在堅守能伺其隙各有誅夷比卿等赤誠臨事效節使襖不勝德氛祲自消遙料凶謀還慮再下且賊衆烏合疲於重來勞則心離久必有隙卿等常須有預以逸待之一二年間奇功可立富貴之舉彼賊是資忠烈之懷此心可度今各賜卿衣一副聊慰誠勤所有勳勞已令敘定當續有處分想亦知之春暄卿及將士並平安好遣書指不多及敕罽賓國王得四鎮節度使王斛斯所翻卿表具知好意然事在絶域不可預圖卿若誠心任彼量度事遂之日必有重賞朕每於遠國未嘗有所食言想亦知之勿致疑也秋初尚熱卿及首領以下並平安好遣書指不多及敕日本國王王明樂美御德彼禮義之國神靈所扶滄溟往來未嘗為患不知去歲何負幽明丹墀真人廣成等入朝東歸初出江口雲霧斗暗所向迷方俄遭惡風諸船飄蕩其後一船在越州界其真人廣成尋已發歸計當至國一船飄入南海即朝臣名代艱虞備至性命僅存名代未發之間又得廣州表奏朝臣廣成等飄至林邑國既在異國言語不通並被劫掠或殺或賣言念災患所不忍聞然則林邑諸國比常朝貢朕已敕安南都護令宣敕告示見在者令其送來待至之日當存撫發遣又一船不知所在永用疚懷或已達彼蕃有來人可具奏此等災變良不可測卿等忠信則爾何負神明而使彼行人罹此凶害想卿聞此當用驚嗟然天壤悠悠各有命也中冬甚寒卿及首領百姓並平安好今朝臣名代還一一口具遣書指不多及敕西南蠻大帥特進蒙歸義及諸酋首領等卿近在邊境不比諸蕃率種歸誠纍代如此況卿等更效忠赤朕甚知之頃者諸酋之中或有攜二相率自討惡黨悉除即日蕃中應且安帖然則地臨外境亦須有預人無遠慮必有近憂卿可思之豈虛語也所有蕃中事意使者具知之比秋涼卿及百姓並平安好遣書指不多及敕柘靜等州部落昨王承訓去緣當州百姓有相扇動故令宣旨告示彼人如卿柘靜等州種落各異本自寧帖何復為言比者採訪使處置或未得所朕既知之已有處分卿等祖父忠赤輸誠國家既是子孫久襲冠帶各守先業是得坦然何所憂虞而云驚懼宜各遞相告語勿使更然夏中已熱首領百姓並平安好遣書指不多及敕蒙歸義吐蕃於蠻擬行報復又巂州鹽井本屬國家中間被其內侵近日始復收得卿彼蕃落亦應具知吐蕃惟利是貪數論鹽井比有信使頻以為詞今知其將兵擬侵蠻落兼擬取鹽井事似不虛國家與之通和未嘗有惡今既如此不可不防卿即與達奚守圭部落團練候其有動方可出兵必無事蹤亦不得先舉巂州相去道里稍遙若有驚急復須為援並委卿與達奚守圭計會無失事宜卿於國盡誠在邊為捍委寄得所朕復何憂秋中漸涼卿及首領部落百姓並平安好今故令內給事王承訓往一一口具遣書指不多及敕故姚州管內大酋長郍傍時嫡孫將軍鐸羅望卿之先祖輸忠奉國遽聞徂逝深愴於懷言念邊人必藉撫綏又逼蕃界兼資鎮遏卿宜纘承先業以副朕心故遣宿衛首領王白於姚州都督達奚守圭計會就彼弔慰便授卿襲浪穹州刺史並賜綾彩三百匹至宜領取秋中已涼卿及首領已下並平安好遣書指不多及敕安南首領巋州刺史爨仁哲潘州刺史潘明威獠子首領阿迪和蠻大鬼主孟谷誤姚州首領左威衛將軍爨彥徵將軍昆州刺史爨嗣紹黎州刺史爨曾戎州首領右監門衛大將軍南州刺史爨歸王南寧州司馬威州刺史都大鬼主爨崇道升麻縣令孟耽卿等雖在僻遠各有部落俱屬國家並識王化比者時有背叛似是生梗及其審察亦有事由或都府不平處置有失或朋讎相嫌經營損害既無控告自不安寧兵戈相防亦不足深怪也然則既漸風化亦當頗革蠻俗有須陳請何不奏聞蕃中事宜可具言也今故令掖庭令安道訓往彼宣問並令口具有不穩便可一一奏聞秋中巳涼卿及百姓並平安好遣書指不多及穰苴出軍必誅莊賈孫武行令亦斬宮嬪守圭軍令若行祿山不宜免死門下朕獲主三靈於今一紀聽政中昃每不敢康觀書乙夜將求諸道頃年已來每思至理或遠人不率或嗣歲不登淳朴未還惕厲斯在為人上而慙德奉天明以畏威故祝史正辭必期於陳信郊丘備禮將俟於升平今正宗廟降靈克開厥後乾坤交泰保合太和麟鳳龜龍元符黃瑞之祉蠻夷戎狄梯山航海之琛莫不日月以聞道路相屬顧惟不德當茲休運欽若昭報疇咨故實所以今年獻春恭祠后土季秋吉日追崇九廟採必先於魯經稽肆類於虞典爰因長至欽謁上元告受命之元符昭嚴配之成績大典云備至誠克展諸侯駿奔來於穆之相百神受職率咸秩之文六變已陳三獻斯畢蓋春秋之大事莫先乎祀王者之盛禮莫重於郊柴燎克終感慶罔極豈豫一人之福亦爾萬邦之賴宜因咸和之際俾承厚下之澤可大赦天下自開元十一年十一月十六日昧爽已前罪無輕重巳發覺未發覺已結正禾結正繫囚見徒大辟罪已下咸赦除之其十惡死罪造僞頭首劫賊殺財主在不赦例就中仍慮有冤濫者所司具狀送中書門下盡理詳覆奏聞朕將親覽其有亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之升壇行事官及供奉官三品巳上賜爵一級四品以下加一階諸縣官並準此升壇例內外文武官及致仕并前資陪位者賜勳一轉緣大禮有職掌並押當者更加一階齊郎並放出身皇親諸親陪位未出身者並放選已出身者賜勳一轉親王公主各與一子官三品衛監門黃衣長上飛騎萬騎並仗內雜色人在齊宮宿衛及諸色人有資勞人緣大禮有職掌並流外行署預見大禮者亦賜勳一轉其充香爐執扇及禮生祝史贊者賜勳外日選優與處分兵士宿衛齊宮并諸色無資勞緣大禮職掌及京兆府百姓緣南郊祗應者各免其家一年雜科差南北衛將軍率中郎將宿衛齊宮者並同升壇例其諸軍節度大使及三都留守雖不陪位委寄既重特宜同升壇官例百歲老人賜棉帛五段粟五石縣令至其家存問給付孝子順孫義夫節婦旌表門閭終身勿事已旌表者量加優恤諸州百姓或因逢水旱流寓未安者宜令所司與朝集使即作賑恤安輯法奏聞其單貧衛士番鎮久次令州府長官擇灼然者放免番役征行人家州縣檢校勿使侵欺磧西鎮人途路懸邈特宜賜勳一轉魚衆寡惸獨亦令州縣倍加矜恤使得存濟元置義倉救人不足承前貸百姓糧及種子未納者並放免不得却徵自古聖帝明王忠臣烈士名山大川並令所管致祭其已得替官人並輕纍未得處分非老弱疾病猶堪處事者量加收敘使免失職其左貶官非逆人五服內親及犯贓賄名教者所司責勘奏聞量移近處其官人有清白政術堪任刺史縣令及抱器懷才不求聞達者州長官其以名薦宗室中有孝悌才術為衆所知仍在卑任者委宗正具以名奏君臣一體休戚共焉朕欽承天命恭傳大寶蓋憑纍祖餘業得一之符亦由㣥公舊勳不二之力永言繄賴其敢忘之自武德已來實封功臣知政宰輔有身無大故而亡官失爵子孫淪屈者所由勘實具以狀聞存者可疇其官榮逝者當録其允嗣使幽明同慶知有今辰亞獻邠王守禮終獻寧王憲各賜物一千匹捧俎申王撝夾侍岐王範辥王業各賜物七百匹侍中源乾曜中書令張說兵部尚書同中書門下三品王晙各賜物五百匹正衣駙馬都尉王守一王繇溫曦宗正少卿崔澄各賜物三百匹二王後賜物一百五十匹壇場使京兆尹孟溫禮賜物二百匹修造羽儀使賜物一百匹修撰儀注官五品已上賜物一百匹六品已下賜物七十段自餘陪位預宴官一品賜物一百匹二品三品八十匹四品五品六十匹六品七品四十匹八品九品三十匹鴻臚諸蕃使與見大禮及在本蕃王侯大酋長並同宴會例給賜郡主縣主各賜物八十匹緣大禮數處有職掌者任於一頭從高敘天下州府賜酺三日京城五日任所在百姓村坊宴樂不得科率聚斂其有處分未該者令所司及本使比類奏聞赦書日行五百里主者施行門下朕聞天監惟后后克奉天既合德以受命亦推恩而復始厥初作者七十二君道洽跡著時至符出皆用事於介邱升中於上帝人神之望蓋有以塞之皇王之序固可得而言也朕接統千歲承光五葉惟祖宗之德在人惟天地之靈作主往有內難幽贊而集大勳聞無外虞守成而纘舊服未嘗不乾乾終日思與公卿大夫上下叶心聿求至理以宏我列聖其庶幾乎馨香今九有大寧㣥氓樂業時必敬授而不奪物亦順成而無夭懋建皇極幸致太和洎乃幽遐率由感被戎狄不軌唯文告而來庭麟鳳已臻將覺悟而在藪以故凡百執事亟言大封顧惟不德初欲勿議伏以先聖儲祉與天同功荷傳符以在今敢侑神而無報大節斯在朕何讓焉遂奉遵高祖太宗之業憲章乾封之典時邁東土柴告岱宗精意上達肸蠁來應信宿行事雲物呈祥登降之禮斯畢嚴配之誠獲展百神㣥望莫不懷柔四方諸侯莫不來慶斯事天道之介福邦家之耿光也無窮之休祉豈獨在豫非常之惠澤宜其逮下可大赦天下自開元十三年十一月十三日昧爽已前大辟罪巳下罪無輕重巳發覺未發覺已結正未結正繫囚見徒咸赦除之惟十惡死罪不在此限流人未達前所者放還其有挾藏軍器亡命山澤百日不首復罪如初敢以赦前事相告言者以其罪罪之內外文武官三品已上賜爵一等四品已下加一階邠王守禮寧王憲岐王範辥王業各與一子三品官公主嗣王郡主縣主各與一子官其應文武行從官加階之外並賜勳兩轉三衛引駕細引黃衣長上飛騎彍騎先有武散官者加兩階未給武散官者各賜勳兩轉衛士馬主戎車主幕士掌間供膳太常及仗內音聲人行署及蕃官闕二字並別敕雜色定名行從人亦賜勳兩轉緣大禮登山闕三字從行事輿腳等官三品已上特賜一階仍與一子闕三字已下特賜一階仍賜勳兩轉量與進改其四軍別闕二字山宿衛及諸司上山執當官三品己上賜爵一等仍與一子出身四品已下加一階賜勳兩轉亦量與進改其白身人及行署蕃官放蕃選其山下升壇行事官三品已上加爵一等賜勳一轉四品已下加一階賜勳一轉選日稍優諸獻官及宿衛齊宮將軍率中郎並郎將並兩京留守諸軍節度使並同升壇例諸有職守押當非升壇例諸有職人加一階選日優量其加階應入三品五品人非特賜者並依十一年三月二十八日敕節限齊郎禮生見任官前資官已上人並依資量材與處分未出身者放出身皇親別敕承恩陪位者亦準此諸州嶽牧四府長史朝覲陪位者泛階之外各賜勳一轉諸方使人及諸州父老宗姓并從家子孫至嶽不得陪位者並賜勳一轉賜物五段諸州及亠兊州道僧至嶽見大禮者並賜物五段孔子後褎聖侯量才與處分天下致仕官各依本品賜一季祿並束帛其陪位者仍賜勳一轉諸蕃侯王酋長來會禮者各加一官至都節級並與賜物其入朝留在邊軍人亦準此其蕃中祗候衙官刺史縣令並賜物及袍帶突厥可汗小殺等諸國王守護塞垣歲月朝貢並宜賜物副使將往侍老年百歲已上者版授下州刺史婦人版授郡君年九十巳上者版授上州司馬婦人版授縣君年七十巳上者版授縣令並婦人版級量賜粟帛其預見大禮侍老各別加侍丁一人孝子順孫義夫節婦旌表門閭終身勿事行人之家及魚衆寡惸獨並疾病不能自存者委州縣長官倍加存恤諸軍行有文武散官已上者加一階白身者賜散勳一轉缺負官物逋懸租調並宜放免其行過州縣供頓劬勞並貼頓百姓有雜差科並車馬夫役者並免一年租賦亠兊州免二年租賦當頓官人始末不絶者與中上考仍賜勳一轉朕永惟王業繄賴舊勳元首股肱其猶一體自武德已來功臣宰輔或名存王府遣嗣沈淪或身無大故銜屈泉壤宜令所司訪擇申理唐此處隆字避元宗諱元年六月二十六日立功官人往屬艱難能盡忠義今成大禮何日忘之宜各與一子出身無子者任回與周親之人有司試策三道等第收獎朕躬陟天門宿齊日觀時屬嚴冬雪後初夜風寒朕因露立祈恩誓欲代人當咎俯仰之際頓息霜飇奠獻之晨變同韶景誠荷上天垂祐亦賴靈山吐祥詩云無德不報宜封太山神為天齊王禮秩加三公一等宜令所管崇飾祠廟環山十里禁其樵採給近山二十戶復以奉神祠率土之內賜酺七英華作五日任於村坊內宴樂不得聚斂煩勞其節文有未霑及者所司比類奏聞其封祠有數處行事者從一處敘赦書日行五百里主者施行門下昔者巡狩所至柴瘞斯行蓋取誠享以遵告類朕恭承祖宗之烈獲主神祗之祀夙夜祗畏不敢荒寧故勒兵朔陲先展義於汾社回斾脽上遂有事於郊壇王者父事天母事地漢氏祈穀未始正名周禮降神乃為徼福而巳朕以天命之重子道為先惟茲精誠在乎敦孝庶蒙福於四海期永康於兆人是以率由舊章敬恭明祀嚴配之誠既展奠獻之禮又終且春秋之義大事在祀齊祭之福庶品維祺豈獨在豫而有斯慶可大赦天下自開元二十年十一月二十一日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之官人犯贓及有罪被推者本罪雖原不得更令却上仍別與處分自先天已來有雜犯流移人等並配隸人等各量移近處左降官未經量移及經量移未復本資者奏聽進止天下遭損免州應損戶成詔令作減一分已上者及供頓州無出今年地稅如已徵納聽折來年地稅逋租懸調貸糧種子缺負官物在百姓腹內者並宜放免其不損處一作免州自開元十七年巳前所有貸糧種子負缺官物在百姓腹內者亦宜準此諸州緣供頓所差貼助夫亦放其家今年地稅孝子順孫義夫節婦旌表門閭終身勿事諸州侍老百歲已上賜粟七石九十已上賜粟五石八十已上賜粟三石所由速付勿淹旬日太原潞州府侍老等先已加恩不在此例亞獻皇太子鴻賜物二千匹終獻慶王澤賜物一千匹邠王守禮寧王憲辥王業各賜物一千匹忠王浚已下各賜物三百匹夾侍正衣進圭捧圭汝陽郡王淳等各賜物三百匹皇太子夾侍正衣各賜物一百五十匹裴光庭蕭嵩弻亮朕躬宏益斯遠本有優異何殊等夷加階賜爵之外各與一子官無子者任與周親仍各賜物三百匹二王後各賜物二百匹長公主各賜物三百匹嗣王郡主縣主賜物二百匹行從文武官三品已上賜物八十匹四品五品賜物六十匹六品七品賜物四十匹八品九品賜物二十段升壇官三品已上特賜一階四品已下各加一階應入三品五品官階相當不限考數聽得入知頓使及判官修禮儀官撰玉冊文官知頓御史加一階修壇場州刺史及書冊官各賜物一百匹其已有升壇職掌從頭處分緣大禮有職掌官賜勳三轉行從官首末不絶及陪位官各賜勳兩轉內外文武官三品以上賜爵一等四品己下各加一階致仕官三品已上賜物七十匹四品五品各五十匹行從蕃客鴻臚安置陪位見大禮者宜賜物五十匹節級分付南北衙應宿衛齊宮官及左右廂知兵馬虞候總管已下及判官別奏兼孔目官等更加勳一轉前資官選日稍優與處分白身人有資勞者簡選之日優與處分無資蔭者賜勳兩轉南北衙行從三衛飛騎萬騎引駕細引及監門直長主帥黃衣長上各賜勳兩轉仍各賜物五段兩營弩一作弓手六番併行宜各賜勳兩轉物五段仍量折番役諸衛彍騎及兵角弓手官馬主掌間幕士駕士供膳士供膳主習馭工人樂人雜戶官戶白身有職掌人合行從人等各賜勳一轉物三段其齊郎既是見任官準壇上壇下有職掌官例處分執彈三衛及禮生贊者各減二年勞無勞可減者選日稍優與處分流外行署從者各賜勳一轉有職掌者各賜勳兩轉供頓州刺史同陪位官例始末專知頓官各與一中上考蒲州刺史寶鼎縣官同升壇官處分管壇一鄉百姓給復二年蒲州侍老等準太原潞州例降一等處分武德初功臣每有大慶必存追遠業參運始義合賞延其子孫沈翳無在朝者宜令勘實即與一子官唐此處隆字避元宗諱元年立功官等艱難之際誠效亦深言念其初豈忘終始其三品已上各賜一品官五品已上各賜紫金魚袋有亡沒者優贈一官仍與一子官一子先得官者選日優與處分兩京留守京兆河南尹四大都督府長史諸軍節度副大使準行從官例處分諸方通表疏使人預見大禮準陪位官處分諸道戰亡人家仰州縣存恤不周濟者量事賑給諸軍健兒別敕行人各賜勳一轉仍令所司速勘會團奏官寫告身送付諸道行人或有身死被逃猶徵課役纍及親鄰即宜審勘為其除削皇親中有文武才用堪任使者委宗正具薦當與獎擢五嶽四瀆名山大川自古聖帝明王忠臣烈士輔相各令致祭務盡誠潔赦書有所不該者所司比類奏聞亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之率土之內賜酺三日赦書日行五百里布告天下咸使聞知主者施行門下昔者受命為君體元立極未有不謹於禮而能見教於人朕其庶乎有慙作者方冊存而可舉舊章絶而復尋自古所行無一而廢將以上乞靈於宗社下蒙福於黎元朕茲精誠天實降鑒今嗣歲初吉農事將起禮有先於耕藉義緣奉於粢盛是所嚴祗敢不敬事故躬載耒耜親率公卿以先萬姓遂終千畝謂敦本之為小何布澤之更深宜有順於發生俾無偏於行惠可大赦天下自開元二十三年正月十八日昧爽已前大辟罪無輕重已發覺未發覺已結正未結正繫囚見徒咸赦除之其犯十惡死罪不在赦限自餘死罪特宜配流嶺南遠惡處官典犯贓本犯至死貶與嶺南遠惡左降官至流者亦量貶與遠官典配諸軍效力計贓至徒仍不得重令却上天下諸州損免處地稅先矜放其非損免處有貧乏未納者並一切放免京兆河南府秦州百姓有諸色勾徵及逋懸缺負亦宜放免其在官典及倉督等腹內者不在免限天下色役爰及支用務令節減並諸州貢賦先令中書門下均融減省宜準前敕速即條奏損免州稅戶錢未納並七等已上戶租先未處分及五色資錢課未納灼然不辨者並放至蠶麥秋收已來贖納損免州逃兵健兒承前訪捉不獲合取籍人充替自資送裝送軍程期逼迫頗亦辛苦並放至蠶麥已後發遣仍令所司預與軍州計會諸軍征行人並令州縣存恤其行人有父母年七十已上者委本道採訪使檢責取實牒報本軍即放還本貫軍司據闕數募取健兒充替行人及防丁有身亡者為造棺櫬遞還本處諸州應發遣防丁去本貫一千里已上比來除正課之外給一丁充資多不濟辦宜更量與資助兩京城內今年所有諸雜夫役並宜免放應須使役以諸色錢和雇取充農桑是時不得妨奪州縣長官倍加勸課孝子順孫義夫節婦旌表門閭魚衆寡惸獨不能自存量加優恤天下侍老百歲已上版授上州刺史九十中州刺史七十已上上州司馬其九十以上所由仍量給酒肉各令存問亞獻皇太子鴻賜物二千匹終獻慶王潭賜物一千匹邠王守禮等各賜物一千匹忠王浚已下各賜物三百匹夾侍正衣進圭捧圭汝陽郡王淳等各賜物二百匹皇太子夾侍正衣等各賜物一百匹裴耀卿張九齡李林甫自其翊贊誠有忠益頒賞以序等數須優宜與一子官仍各賜物三百匹二王後各賜物一百匹長公主公主各與一子官仍各賜物二百匹嗣王郡主縣主各賜物一百五十匹在京文武官見任及致仕並諸色陪位官一品賜物八十匹二品七十匹三品六十匹四品五十匹五品四十匹七品六品三十段八品九品二十段節度使副大使三都留守京兆尹各一百匹四大都督府長史諸道採訪使各八十匹諸賜物應兩給者從一處給其耕官及侍耕官各賜勳兩轉丞相蕭嵩與一子官仍賜物二百匹攝九卿諸侯等各與一子出身仍各賜物一百五十匹侍耕執牛官各賜物一百二十匹升壇行事官修禮儀官及刺史判官等更賜一階應入三品及五品官階相當減四考聽入攝司徒信安郡王禕禮儀官韋縚既不敘階禕與一子官賜物二百匹縚與一子出身賜物一百五十匹其升壇及修禮儀兩兼者從一加階應與一子官及出身者若無子聽回與周親供奉及押階不升壇並壇下行事及助耕勒牛官別敕差中書門下差定人等泛階合入三品五品官階至考未定者待考定日聽敘非待考者賜勳四轉未承別賜者各賜一等知頓使賜物一百匹修壇場長官屯官撰玉冊文官各賜物八十匹書玉冊官賜物五十匹管藉田縣令賜物六十匹在東京文武官朝集使外官充十道採訪使並判官諸道節度副大使並諸方通表使諸敕使判官新除五品已上官未赴任都城畿縣令見陪位者三品以上轉爵一級四品已下進一階皇親諸親及九廟子孫不入等陪位者並外文武官九品已上各賜勳一轉諸蕃入朝及賀正蕃客應陪位者共賜物五十匹節級分付南北衙行從宿衛齊宮者及文武官押當有職掌並諸色雜職掌並應耕公卿從官等各賜勳一轉萬騎及飛騎見當上者各賜勳一轉其宿衛齊宮者加賜物三段仗內坊侍諸色行從人各賜物三段彍騎番兵角弓手弩手官馬主見當番及留帖人掌間幕士駕士供膳習馭工人樂人見當上有職掌並庶人應耕者各賜物三段齊郎禮生贊者行事者並減兩年勞無勞可減者齊郎放出身禮生贊者選口稍優與處分三衛七色見當番並流外行署及蕃官見上有職掌者各轉一勳河南洛陽縣陪位父老各賜物五段近壇百姓各免今年雜差科宗廟致享務在豐潔禮經沿革必本人情籩豆之薦或未能備物服制之紀或有所未通宜令禮官學士詳議具奏朕自臨天下二紀於茲不敢荒寧日加兢業而災眚未弭黎人未康若有由而然則在豫之責有能直言極諫者具以狀聞每渴賢良無忘鑒寐頃雖虛佇未副旁求其才有王霸之略學究天人之際智勇堪將帥之選政能當牧宰之舉者五品已上清官將軍都督刺史各舉一人孝悌力田鄉閭推挹者本州長官勘實有才堪應務者各以名聞致仕官久歷清資始終稱著年漸衰邁情有可矜量與改職依前致仕宗子中有才行著聞比尚沈屈者委宗正勘實奏聞唐此處隆字避元宗諱元年兩營立功官任折衝並改與郎將郎將改與中郎其亡官失爵量加收敘五嶽四瀆名山大川及自古聖帝明王忠臣良相並令所在長官以禮致祭赦書有所未該者所司比類奏聞亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之都城內賜酺三日赦書日行五百里布告遐邇咸使知聞主者施行
