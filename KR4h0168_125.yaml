front:
  text: 全唐文欽定全唐文卷一百二十五帝諱榮本姓柴氏聖穆皇后之姪太祖養為巳子唐天祐十八年生廣順三年授開封尹封晉王顯德元年正月即位在位六年年三十九諡曰睿武孝文皇帝廟號世宗
  hash: sha256:59ac1424486822f735e00aff669d492d67da44e4432d21948b899688f0c6fffd
  markers:
  - {type: head, offset: 14, content: 周世宗, id: KR4h0168_NFKB_125-h1, level: 1}
body:
  text: 故輸忠翊戴功臣鎮國軍節度華商等州觀察處置等使兼河東道行營先鋒都指揮使檢校太保史彥超嚴能齊衆武可摧凶振鐸號軍伸其膽勇登鋒捍寇誓以身先一昨北戎阻兵同惡相濟爾乃力排羣醜體中重創雖虜騎巳大奔而將軍之先歿袵金革而剛強巳矣聽鼓鼙而傷歎如何言念純臣宜膺褒美俾追贈於崇秩用報慰於重泉可贈檢校太師朕自履宸極思平泰階出一令慮下民之未從行一事懼上元之罔祐晨興夕惕終歲於茲雖禮讓漸聞興行而風雨未之咸若豈刑政之斯闕而德教之未敷哉繇是進用良臣輔宣元化雖朕志先定亦輿情具瞻爰擇嘉辰誕敷明命樞密院直學士中大夫尚書工部侍郎上柱國晉陽縣開國男食邑三百戶賜紫金魚袋景範昔佐先帝每罄嘉謨逮事眇躬愈傾忠節奉上得大臣之體檢身為君子之儒一昨戎輅親征皇都是守賛勳賢於留府副徵發於行營軍政所資國用無闕今則靈臺偃革宣室圖功思先朝欲用之言成聖考得賢之美俾參大政仍掌利權爾其明聽朕言往敷元化予欲則垂象而清品彙爾則順天道以序彞倫予欲恤刑名而息戰爭爾則謹憲章而恢廟略天人之際懸合軍民之事罔渝則國相之尊非爾孰處邦計之重惟才是臧勉思倜儻以致君勿效因循而保位佇聞成積用副虛懷可正議大夫中書侍郎平章事判三司姬旦分疆肅慎列明堂之位武王尊德朝鮮受箕子之封矧乃代守東藩材稱閒世襲衣冠而奉正朔瞻象魏以走梯航推誠遠慕於華風重譯來朝於興運嘉乃丕績宜覃懋恩特進檢校太尉使持節元菟州都督大義軍節度使上柱國高麗國王王昭地控辰韓風行日域命氏本神仙之族炳靈分象緯之精為仁自契於太平既觀繇巳述職罔殊於諸夏來奉充庭朕嗣守鴻圖方崇王道禮樂征伐之柄盡出眇躬山河帶礪之盟思傳不朽但遵聲教豈限遐遙俾光燾土之封更假自天之寵於戲儀同三事無先開府之尊冠聳四梁愈見上公之貴琢蒼玉為爾珮飾豐貂為爾冠用報好音且彰柔遠爾其仰宣朝命下慰州民泛濟水為恩波還同在藻指家山於緱嶺免詠式微永為屬國之賓無闕外臣之禮可授開府儀同三司檢校太尉依前使持節元菟州諸軍事行元菟州都督充大義軍使高麗國王勳如故禮以緣情恩以悼往矧在友于之列尤鍾惻愴之思故皇弟贈太保侗贈司空信等玉葉聯芳金莖比瑞屬景運之初啟何大年之不登未翦桐珪連彫棣萼俾予終鮮實動永懷既登敘以無階在䟽封而豈恡贈其王爵慰我天倫侗追封郯王信追封王鴻水未堙舟楫賴濟川之用密雲既雨郊原成利物之功惟賢哲之保躬蹈初終於元吉我有良相時惟正人七年竭力於扶持六氣遂乖於頤養踰歲伏枕九陳讓詞敦諭雖頻告請彌切暫輟秉鈞之任不移論道之資仍益戶封斯為異數推忠協謀佐理功臣特進守司空門下侍郎同中書門下平章事監修國史上柱國隴西郡開國公食邑一千五百戶食實封二百戶李穀昔事先朝勤勞王室暨登上相佐佑朕躬疾因憂國而有加志在避權而知足煩燮調而斯久釋難重以為宜漸俟痊平別期委任俾展輅車之禮用光水土之官惟爾誠明當體優異凡百有位知予尚賢可守司空加食邑五百戶食實封二百戶功臣散官勳如故仍令所司擇日備禮冊命制策懸科前朝盛事莫不訪賢良於側陋求讜正於箴規殿庭之閒帝王親試其或大裨於國政有益於時機則必待以優恩縻之好爵拔奇取異無尚於茲得人者昌於是乎在爰從近代久廢此科懷才抱器者鬱而不伸隱耀韜光者晦而莫出遂使翹翹之楚多致於棄捐皎皎之駒莫就於縻縶遺才滯用闕孰甚焉天下諸色人中有賢良方正能直言極諫經學優深可為師法詳閑吏理達於教化者不限前資見任職官黃衣草澤並許應詔其逐處州府依每歲貢舉人試例差官別考試解送尚書吏部仍量試策論三道共三千言以上當日內取文理俱優人物爽秀者方得解送取來年十月集上都其登朝官亦許上表自舉故皇從弟贈左領軍衞將軍守愿贈左監門衞將軍奉超贈左千牛衞將軍遜等天潢演派棣萼騰芳咸敦孝悌之情並著謙和之譽頃因季代不享遐齡每念非辜難忘有慟宜加贈典復賁泉扃守愿可贈左衞大將軍奉超可贈右衞大將軍遜可贈左武衞大將軍令錄之官政理之本親民總務在幹與廉雖銓衡舊規每常慎擇而縉紳多士難以具知爰開舉善之門以廣用才之道應在朝文資官翰林學士兩省官內有曾歷藩郡賓職州縣官者宜令各舉堪為令錄者一人務在強明清慎公平勤恪其中有巳曾任令錄亦許稱舉並當擢用不拘選限資敘雖姻族近親亦無妨嫌只須舉狀內具言除官之日仍署舉主姓名若在官貪濁不公懦弱不理或職務廢闕或處斷乖違並量事狀重輕連坐舉主仍令御史臺催促本官旋具奏聞限兩月內舉狀齊足如出使在外者候回日準此指揮務在稱揚循吏激勸官途庶符用乂之方共布惟和之政善操理者不能有全功善處身者不能無過失雖堯舜禹湯之上聖文武成康之至明尚猶思逆耳之言求苦口之藥何況後人之不逮哉朕承先帝之靈居至尊之位涉道猶淺經事未深嘗懼昏蒙不克負荷自臨宸極巳過周星至於刑政取舍之閒國家措置之事豈能盡是須有未周朕猶自知人豈不察而在位者未有一人指朕躬之過失食祿者曾無一言論時政之是非豈朕之寡昧不足與言耶豈人之循默未肯盡心耶豈左右前後有所畏忌耶豈高卑疎近自生閒別耶古人云君子大言受大祿小言受小祿又云官箴王闕則是士大夫之有祿位無不言之人然則為人上者不能感其心而致其言此朕之過也得不求骨鯁之辭詢正直之議共申裨益庶洽治平朕於卿大夫才不能盡知面不能盡識若不採其言而觀其行審其意而察其忠則何以見器略之淺深任用之當否若言之不入罪實在予苟求之不言將誰執咎應內外文武臣僚今後或有所見所聞並許上章論諫若朕躬之有闕失得以盡言時政之有瑕疵勿宜有隱方求名實豈尚虛華苟或素不工文但可直書其事理有謬誤者當期舍短言涉傷忤者必與留中所冀盡情免至多慮諸有司局公事者各宜舉職事有不便者革之可也理有可行者舉之可也勿務因循漸成訛謬臣僚有出使在外迴者苟或知黎庶之利病聞官吏之優劣當具敷奏以廣聽聞班行職位之中遷除改轉之際即當考陳力之輕重較言事之否臧奉公切直者當議甄升臨事蓄縮者須行抑退翰林學士兩省官職居侍從乃論思諫諍之司御史臺官任處憲司是擊搏糾彈之地論其職分尤異羣官如逐任官內無所獻替啟發彈舉者三月限滿合遷轉時宜令中書門下先奏取進止凡爾有位宜悉朕懷惟王建國實曰京師度地居民固有前則東京華夷臻湊水陸會通時向隆平日增繁盛而都城因舊制度未恢諸衞軍營或多窄隘百司公署無處興修加以坊市之中邸店有限工商外至億兆無窮僦賃之資添增不定貧闕之戶供辦實艱而又屋宇交連街衢湫隘入夏有暑濕之苦居常多煙火之憂將便公私須廣都邑宜令所司於京城四面別築羅城先立標幟候將來冬末春初農務閒時即量差近甸人夫漸次修築春作纔動便令放散如或土功未畢則迤邐次年修築所冀寬容辦集今後凡有營葬及興置宅竈并草市並須去標幟七里外其標幟內候官中擘畫定街巷軍營倉場諸司公廨院務了百姓即任營造釋氏真宗聖人妙道助世勸善其利甚優前代以來累有條貫近年巳降頗紊規繩近覽諸州奏聞繼有緇徒犯法蓋無科禁遂至尤違私度僧尼日增猥雜創修寺院漸至繁多鄉村之中其弊轉甚漏網背軍之輩苟剃削以逃刑行姦為盜之徒託住持而隱惡將隆教法須辨否臧宜舉舊章用革前弊諸道府州縣鎮村坊應有勅額寺院一切仍舊其無勅額者並仰停廢所有功德佛像及僧尼並騰併於合留寺院內安置天下諸縣城郭內若無勅額寺院祗於合停廢寺院內選功德屋宇最多者或寺院僧尼各留一所若無尼住祗留僧寺院一所諸軍鎮坊郭及二百戶巳上者亦依諸縣例指揮如邊遠州郡無勅額寺院處於停廢寺院內僧尼各留兩所今後並不得創造寺院蘭若王公戚里諸道節刺巳下今後不得奏請創造寺院及請開置戒壇男子女子如有志願出家者並取父母祖父母處分巳孤者取同居伯叔兄弟處分候聽許方得出家男年十五巳上念得經文一百紙或讀得經文五百紙女年十三巳上念得經文七十紙或讀得經文三百紙者經本府陳狀乞剃頭委錄事參軍本判官試驗經文其未剃頭閒須留髮髻如有私剃頭者却勒還俗其本師主決重杖勒還俗仍配役三年兩京大名府京兆府青州各處置戒壇候受戒時兩京委祠部差官引試其大名府等三處祗委本判官錄事參軍引試如有私受戒者其本人師主臨壇三綱知事僧尼並同私剃頭例科罪應合剃頭受戒人等逐處聞奏候勅下委祠部給付憑由方得剃頭受戒應男女有父母祖父母在別無兒息侍養不聽出家曾有罪犯遭官司刑責之人及棄背父母逃亡奴婢姦人細作惡逆徒黨山林亡命未獲賊徒負罪潛竄人等並不得出家剃頭如有寺院輒容受者其本人及師主三綱知事僧尼鄰房同住僧尼並仰收捉禁勘申奏取裁僧尼俗士自前多有捨身燒臂鍊指釘截手足帶鈴挂燈諸般毀壞身體戲弄道具符禁左道妄稱變現還魂坐化聖水聖燈妖幻之類皆是聚衆眩惑流俗今後一切止絕如有此色人仰所在嚴斷遞配邊遠仍勒歸俗其所犯罪重者準格律處分每年造僧帳兩本其一本奏聞一本申祠部逐年四月十五日後勒諸縣取索管界寺院僧尼數目申州州司攅帳至五月終巳前文帳到京僧尼籍帳內無名者並勒還俗其巡禮行脚出入往來一切取便今後諸處祠祭應有牲牢香幣饌料供具等仰委本司官吏躬親較務在精至行事儀式依附禮經大祠祭合用樂者仍須祀前教習凡關祀事宜令太常博士及監察御史用心點檢稍或因循必行朝典朕昔覽兵書麤知前事將觀機要委卿撰述曾未踰時遠來呈進披尋之際備見精詳論戰法之大綱與孫吳而共貫賴卿博學副朕所懷宜示頒宣用明恩寵嘉奬在念再三不忘今賜卿衣著二百匹銀器一百兩朕自渡長淮尋清千里戎輅方期於南下金陵哀告而上章乞駐禁軍稱臣待罪念其危迫未遣攻收不謂忽逞狂謀又屯殘寇韓令坤趙韓等憤其姦詐勠力掃除銳旅纔交賊徒大敗生擒偽將盡奪樓船竚於旦夕之閒便見澄清之運凡聞克捷諒極懽呼諸司職員皆係奏補當執役之際悉藉公勤及聽選之時尤資幹敏苟非慎擇漸致因循應諸司寺監今後收補役人並須人材俊利身言可採書札堪中自前行止委無訛濫勒本司關送吏部引驗人材考校筆札其中選者連所試書跡及正身引過中書餘從前後格勅處分仍每年祗得一度奏補輦轂之下謂之浩穰萬國駿奔四方繁會此地比為藩翰近建都城人物諠闐閭巷隘陿雨雪則有泥濘之患風旱則有火燭之憂每遇炎蒸易生疫疾近者開廣都邑展引街坊雖然暫勞久成大利朕昨自淮上迴及京師周覽康衢更思通濟千門萬戶庶諧安逸之心盛暑隆冬倍減寒溫之苦其京城內街道濶五十步者許兩邊人戶各於五步內取便種樹掘井修蓋涼棚其三十步以下至二十五步者各與三步其次有差書契巳來史冊相繼明君暗主罔或遺之所以紀一時之興亡為千古之鑒戒梁均帝唐清泰二主皆居大寶奄宅中區雖負扆當陽不享延洪之數而編年紀事宜存纂錄之規用備闕文永傳來裔其梁均帝唐清泰二主實錄宜差兵部尚書張昭修纂其同修纂官員亦委張昭定名奏請伏以太祖聖神恭肅文武孝皇帝削平多難開啟洪圖用干戈而清域中修禮樂而治天下克勤克儉乃武乃文八紘方混於車書三載忽遺於弓劒英謀睿略既高冠於前王聖德神功尚未編於信史詢於典禮闕孰甚焉宜垂不朽之文以永無疆之美其太祖聖神恭肅文武孝皇帝實錄宜差兵部尚書張昭修纂其同修纂官員委張昭定名奏請史館所少書籍宜令本館諸處求訪補填如有收得書籍之家並許進納其進書人部帙多少等第各與恩澤如是卷帙少者量給資帛如館內巳有之書不在進納之限朕自守丕圖嘗勤庶政念萬方之至廣終日勞心恐一物之未蘇通宵不寐屬乾元資始春日載陽升紫殿以發德音秉鎮圭而朝羣后順青帝發生之令體元穹亭育之仁思與羣生同慶嘉運及物之澤罔閒於幽遐作解之恩宜均於雷雨應天下見禁罪人除犯大辟外一切釋放應諸色亡命之人官中自來追捕未獲者今並放罪諸道州府應欠顯德三年終巳前秋夏稅物並與除放諸處敗闕場院人員自來累行徵督尚有逋欠實無抵當者宜令三司具欠分析數目聞奏別候指揮內外文武職官自前曾有犯罪停免黜削人等宜令中書門下樞密院具罪犯因繇聞奏別候進止應淮南界內百姓宜令行營將校告報諸軍不得俘虜傷害應有文學之吏武勇之人或幕府州縣官等臨事強明在任有所振舉為衆稱譽者宜令所在長吏具名聞奏在朝文武臣僚於知識人中有如此者亦可公舉並當擢用待之厚祿於戲帝王之於億兆也教之化之納於仁壽當五兵未戢舜干暫舞於兩階洎中夏小康湯網宜開於三面用示好生之德竚遵且格之言凡被照臨體朕至意朕昨者再舉銳師重清淮甸憑元穹之助順賴將相之協心盡致援軍便臨孤壘劉仁贍智勇俱竭請罪軍門相次遣男奉表輸誠乞全生聚今月十一日大陳兵衆直扺城池劉仁贍率在城兵士一萬餘衆及軍府將吏僧道百姓等出城納款尋便撫安壽春既靜於煙塵江表竚同於文軌遠聞克捷當慰衷誠朕昨者再幸淮淝盡平諸砦念一城之生靈久困重圍豁三面之疎網少寬疲瘵果聞感義累貢來章卿受任江南鎮茲淮甸踰年固守誠節不虧近代封疆之臣卿且無愧忠烈迴翔之際不失事機萬民獲保於安全一境便期於舒泰卿便可宣達恩信慰撫軍城將覿儀形良增欣沃覽奏嘉奬再三在懷朕臨御萬邦推誠克巳當五兵未戢雷霆宣震耀之功暨萬旅投戈覆載示生成之德況卿等受任本國保茲列藩勠力邦家將帥常道救援不及迴翔得宜事主盡心何罪之有巳令宣諭當體優恩勉自保調無更疑慮稱奬在念寤思不忘父子之道聖賢不忘再思夭閼之端愈動悲傷之抱故皇子賜左驍衞大將軍誼贈左武衞大將軍誠贈左屯衞大將軍諴等鳳雛龍翰嘗聳其殊姿玉折蘭摧早罹於非禍載惟往事有足傷懷宜增一字之封仍贈三台之秩表吾追念慰乃英靈誼追封越王誠追封吳王諴追封韓王朕暇日觀書見前代名臣議時政得失皆直指其事不尚枝詞舉一善必適其材懲一惡必當其咎故能中外無壅悔吝不生居上者聽之而不疑在下者言之而無罪嘻埋輪都亭惡梁冀也陳屍下室進蘧瑗也曹參期獄市無撓充國議屯田之制李勉嫉惡謂盧為姦邪詩人樂善美張仲之孝友皆明述臧否端若貫珠時主聞之可以區別施於臣僚得事君盡忠之義用之邦國有從諫如流之稱爰自近朝頗虧公道上封事者言無可採議刑罰者事不酌中論阿黨則莫顯姓名述正直則曾無按據卒歲延納終無可觀為臣事君不當如是今後每遇入閣其待制官候對及文武臣僚非時所上章䟽並須直書其事不得隱情但云某人有文某人有武某人曉錢穀某人能理人某處所官吏因循某州縣刑獄冤濫某事利於國而未舉某事害於民而未除經營四方者術策何施裨賛萬機者闕遺何補何人讜正之士何人詐偽之端苟上下同心則綱紀有序當寡昧求理之際適賢良獻可之時當極言之朕自詳覽黜陟二柄期於必行咨爾羣僚各體深意其待制候對官今後於文班內論次充不在只取刑法官準令諸論田宅婚姻起十一月一日至三月三十日州縣爭論舊有釐革每至農月貴塞訟端近聞官吏因循繇此成弊凡有訴競故作逗遛至時而不與盡詞入務而即便停罷強猾者因此得志孤弱者無以自伸起今後應有人論訴物業婚姻取十一月一日後許陳詞狀至二月三十日權停自二月三十日巳前如巳有陳詞至權停日公事未了絕者仰本處州縣亦與盡理勘逐須見定奪了絕其本處官吏如敢違慢並當重責其三月一日後至十月三十日前如有婚田詞訟者州縣不得與理若是交相侵奪情理妨害不可停滯者不拘此限文武之道迭用軍旅之事非輕朝廷方整車徒欲清區宇咸資戎事甚渴雄才勇鷙之人每延頸而在念照臨之內非博訪以難知應在朝上將軍統軍大將軍將軍率府率副率等宜令各舉有武勇膽力騎射趫捷堪為軍職者三兩人仍具年歲及歷職去處奏聞如巳在禁軍者不在稱舉俟舉到日並當此職騎射看驗人材雖是姻親亦許公舉但於狀內具言如任用之後不副所舉即量事輕重連坐舉主職官攸設數易則弊生政理所施久行則民信前典有三載考績之義昔賢垂三年報政之規將欲化民莫如師古諸道幕職州縣官依舊制以三十箇月為滿起今年正月一日後所授官並以三周年為月限閏月不在其內每年常調選人及諸色求仕人取十月一日巳前到京下納文解及陳乞文狀委所司依舊例磨勘注授至十二月上旬終並須了畢便令赴官限二月終以前到任若違程仰本處不得放上且令舊官在任如是無故違程依格殿選其有故違程者須分明出給得所在憑由許至前冬赴集今年赴任者不在此例其特勅除授及隨幕判官赴任不拘時月之限應授官人至滿日替人未到閒宜令且守本官主當公事依舊請俸州府亦不得差署攝官替下如是遭喪停任身故假滿非時闕官之時只可差前資正官及有出身人承攝如逐處無正官及有出身人即選清強人承攝仍依正官例支與俸錢具名奏聞比者以近年貢舉頗是因循頻詔有司精加試練所冀去留無濫優劣昭然昨據貢院奏今年新及第進士等所試文字頗有否臧爰命詞臣再令考覆庶涇渭之不雜免玉石之相參其劉垣單貽慶李頌徐緯張覲等詩賦稍優宜放及第王汾據其文字亦未精當念以頃曾駮落特與成名熊若谷陳保衡皆是遠人深可嗟念亦放及第郭峻趙保雍楊丹安元度張昉董咸則杜思道等未甚苦辛並從退黜更宜修進以俟將來知貢院右諫議大夫劉濤選士不當有失用心可責授右賛善大夫俾令省過以戒當官朕以寰宇雖安蒸民未泰當乙夜觀書之際較前賢阜俗之方近覽元稹長慶集見在同州時所上均田表較當時之利病曲盡其情俾一境之生靈咸受其賜傳於方冊可得披尋因令裂素成圖直書其事庶王公觀覽觸事經心利於國而便於民無亂條理背於經而合於道盡繫變通但要適宜所務濟世繄乃勳舊共庇黎元今賜元稹所奏均田圖一面至可領也朕以干戈既弭寰海漸寧言念黎元務令通濟須議普行均定所貴求適重輕卿受任方隅深窮理本必能副寡昧平分之意察鄉閭致弊之源明示條章用分憂寄竚聆集事允屬推公今差使臣往彼括餘從別勅處分翰林學士職係禁庭地居親近與班行而既異在朝請以宜殊起今後當直下直學士並宜令逐日起居其當直學士仍赴晚朝竇儼所上封章備陳政要舉當今之急務疾近世之因循器識可嘉辭理甚當故能立事無愧莅官所請編集大周通禮大周正樂宜依仍令於內外職官前資前名中選擇文學之士同共編集具名以聞委儼總領其事所須紙筆下有司供給黃禹錫至省所上表歸附大朝兼於京都置邸務事具悉卿自保全土宇惠養黎元立功早達於機權臨事固無於凝滯乃能望中原而內附陳方略以輸誠永言恭勤良多嘉奬爰自江南通和之後朝廷禮遇方深用恩信以綏懷俾寰區而是則兼以卿本道地鄰江表常奉金陵遽有改圖理宜盡善如上都置邸與彼抗衡雖百谷朝宗無以異也禮樂之重國家所先近朝巳來雅音廢墜雖時運之多故亦官守之因循遂使擊拊之音空留梗㮣旋相之法莫究指歸樞密使王朴博識古今懸通律呂討尋舊典撰集新聲定六代之正音成一朝之盛事其王朴所奏旋宮之法宜依張昭等議狀行仍令有司依調制曲其閒或有疑滯更委王朴裁酌施行據月令孟冬祭司寒於北郊其司寒一祠一且準月令施行藏冰開冰祭司寒之神事屬別祭後有冰室尚取指揮經典之來訓釋為重須資鴻博共正疑訛庶使文字精研免至傳習眩惑其經典釋文巳經本監官員校勘外宜差兵部尚書張昭太常卿田敏詳校尚書禮部貢院奏今年新及第進士李覃嚴說何儼武允成王汾閭邱舜卿楊徽之任惟吉趙鄰幾周度張慎微王翥馬文劉選程浩然李震等一十六人所試詩賦文論策等國家設貢舉之司求英俊之士務詢文行方中科名比聞近年巳來多有濫進或以年勞而得第或因媒勢以出身今歲所放舉人試令看詳果見紕繆須至去留其李覃何儼楊徽之趙鄰幾等四人宜放令及第其嚴說武允成王汾閭邱舜卿任惟吉周度張慎微王翥馬文劉選程浩然李震等一十二人藝學未精並宜勾落且令苦學以俟再來禮部侍郎劉溫叟失於選士頗屬因循據其過尤合行譴謫尚示寬恕特與矜容劉溫叟放罪其將來貢舉公事仍令所司別具條理聞奏國家之利泉貨為先近朝巳來久絕鑄造至於私下不禁銷鎔歲月漸深奸弊尤甚今採銅興冶立監鑄錢冀便公私宜行條制起今後除朝廷法物軍器官物及鏡並寺觀內鐘磬鈸相輪火珠鈴鐸外其餘銅器一切禁斷應兩京諸道州府銅象器物諸色裝鉸所用銅限勅到五十日內並須毀廢送官其私下所納到銅據斤兩給付價錢如出限有隱藏及埋窖使用者一兩至一斤所犯人及知情人徒二年所由節級四鄰杖七十捉事告事人賞錢十貫一斤至五斤所犯及知情人各徒三年所由節級四鄰杖九十捉事告事人賞錢二十貫五斤巳上不計多少所犯人處死知情人徒二年配役一年所由節級四鄰杖一百捉事告事人賞錢三十貫其人戶若納到熟銅每斤官中給錢一百五十生銅每斤一百其銅鏡令官中鑄造於東京置場貨賣許人收買於諸處興販其朝廷及諸州見管法物軍器官物舊用銅製造并裝飾者候經使用破壞即時改造仍今後不得更使銅內有合使銅者奏取進止朕自纉承基構統御寰瀛方當恭巳臨朝誕修文德豈欲興兵動衆專耀武功顧茲昏亂之邦須舉弔伐之義蠢爾淮甸敢拒大邦因唐室之陵遲接黃寇之喪亂飛揚跋扈垂六十年盜據一方僭稱偽號倖數朝之多事與北境而交通厚起戎心誘為邊患晉漢之代寰宇未寧而乃招納叛亡朋助凶慝李金全之據安陸李守貞之叛河中大起師徒來為應援攻侵高密殺掠吏民迫奪閩越之封疆塗炭湘潭之士庶以至我朝啟運東魯不庭發兵而應接慕容觀釁而憑陵徐部沭陽之役曲直可知尚示包荒猶稽問罪爾後維揚一境連歲阻饑我國家念彼災荒大許糴易前後擒獲將士皆遣放還自來禁戢邊兵不令侵撓我無所負彼實多奸勾誘契丹至今未巳結連并寇與我世讎罪惡難名人神共憤今則推輪命將鳴鼓出師徵浙右之樓船下朗陵之戈甲東西合勢水陸齊攻吳孫晧之計窮自當歸命陳叔寶之數盡何處偷生應淮南將士軍人百姓等久隔朝廷莫聞聲教雖從偽俗應樂華風必須善擇安危早圖去就如能投戈獻款舉郡來降具牛酒以犒師奉圭符而請命車服玉帛豈恡旌酬土地山河誠無愛惜刑賞之令信若丹青苟或執迷寧免後悔王師所至軍政甚明不犯秋毫有同時雨百姓父老各務安居剽虜焚燒必令禁止自茲兩地永為一家凡爾蒸黎當體誠意祭祀尚誠祝史貴信非誠與信何以事神禴祭重於殺牛黍稷輕於明德犧牲之數具載典經前代以來或有增損宜採酌中之禮且從貴少之文起今後祭圓丘方澤社稷並依舊用犢太廟及諸祠宜準上元二年九月二十一日制並不用犢如朕親行事則依常式齊州管內元於秋苗上俵配蠶鹽謂之察頭鹽每一石徵錢三千文苗畝雖減於舊時鹽數不侈於往日且聞黎庶頗亦艱辛其滄棣濱淄青五州管內所請蠶鹽每一石徵絹一匹地里相接苦樂頓殊輸輕者量與增添賦重者時宜蠲減庶無偏黨用示均平其齊州所納鹽價錢特與減放一半只徵一千五百文其滄棣濱淄青等州每鹽一石舊徵絹一匹起來年後加一匹銅魚之設雖載前編原其始初蓋防偽濫今諸道牧守每遇除移並特降放制書又何假於符契如聞請納頗是煩勞宜易前規罷茲虛器其銅魚並宜停廢攝官承乏或久罄於公勤因時側揚宜特行於旌錄諸處自前應有攝官曾經五度者與一時出身仍先令所司磨勘須得親任公事文書解由分明每攝須及半年巳上方得充為任數仍行所司引驗人材及考試書判的然堪錄用者方得施行
