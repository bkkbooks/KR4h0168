front:
  text: 全唐文欽定全唐文卷四百一南砅開元時擢書判拔萃科
  hash: sha256:f5f854b46ec1e0d4440a0cb33384aa224863b6aee560848660400fc394e3433e
  markers:
  - {type: head, offset: 12, content: 田南砅, id: KR4h0168_NFKB_401-h1, level: 1}
body:
  text: 罰懲其淫禮主於敬若長幼而失節在典刑而無捨蠢爾解式從於長年三人而行尚聞擇善十年以長非可肩隨况侍上邱陵不能向其所視如問及雲物其將對以何詞無儀所謂於伊人有體自均於相鼠杖其傲禮固未乖宜昔者蜡畢出遊言偃問其何歎幼而不遜尼父叩其夷俟合志為友前言猶且不嗤年長以倍今日云何致罰必若齒於鄉黨則應金作贖刑如或列於父兄豈可求之凡鬬失入宜從省見定刑更待州申欽哉惟刑捨此將濫不為開元時擢書判拔萃科儒惟教先學乃德本苟立誠以脩業終養中而果行故道存斯貴方類是歸無愆自遠之會庶廣克成之業雖門人請益既有孚於鼎新而邑里無儀却興言於獄訟沈吟漢牘反覆周典黨而成衆義非止於嚴科問以辯之理何妨於聚學况杜門不出事非干進敦魯服之元風指楚郊之遠避講習典禮翺翔墳索足以激揚時俗光闡儒門諒旌賁之可知豈訟聲之所及捨而勿問深合國章庶開元時擢書判拔萃科戎御近官事資良藝或逐禽而過表且並轡而授綏克敵是因搴旗攸屬卜氏參名訓僕奉職佳兵懸父之馬或奔晉侯之車將敗師徒小却鉦鼓微旋既獲譴於有司載興慚於無勇鳴轂小故猶有伏劒之臣敗軍大尤須聞免冑之客是用捐軀不恡視死如歸東野傾轅雖則其罪國書殞首終用可嘉足比乘邱之能宜錫滑臺之誄庶甄死節以寵鬼雄自厚開元朝官御史德懋懋官功懋懋賞是崇開國之典以致承家之事陳乙志符前彥愛結友于雖佯狂之或違亦志義之可尚循令問而克嗣慮不當仁依德言而靡渝理應承嫡况操刀使割能則無傷執射從畋貫乃斯獲仕進所取孝弟歸先苟以讓而入官能濟人而輔國以之立長可不謂賢鄰告失宜竊以為得兟一作先開元時擢書判拔萃科聖人成能設位待士君子脩業考行入官等威有倫名器不假一作紊乙爵登寵命位列周行舉善有存乎禮物敬享無虧於豐殺既感霜露不忘豺獺是以用禴於焉展牲信以大夫之禮能行孝子之志緣祀而加誠不違於舊典或人妄告固未適於時宜雖二簋之可享豈少牢之為僭此其禮歟固無尤矣霽開元時擢書判拔萃科導水東流百川歸海甘泉北對二渠交錯灌注不息黔黎資上善之功奔瀉無窮生靈得下潤之廣鄭國創業白公繼焉秦兼十倍之資韓得數年之力決渠降雨不待商羊之歌荷鍤成雲寧假飛龍之氣理合克奉時令謹塞隄防水潦盛昌懼有奔突桃花泛溢增修及二月之前瓠子興謠流潤安四人之業縣宰絃歌緝化鸞雉添祥雷震一時風行百里遵乎令典誠未失時見彼章程不罹其咎有詞難罰無濫斯人同開元時擢書判拔萃科度地制邑徹田為糧必均三壤之宜以成九賦之則是以政令惟簡乃黎庶時蘇法物苟紛必謗讟日浸昔魯備齊難作邱甲之法晉為秦擒起爰田之制俱錐刀之末開喪亂之始今三時不害四人成功疆理多兩穗之收倉廩必九年之蓄惟彼州縣誠非紀綱既無恤人之心豈曰奉公之理省徭慎役未挂於愚心貪財徇名巳間於拙見昔興稅畝嘗聞尼父之嫌今欲萊田有類哀公之志非愛人以治國何深恩而淺謀使乎察彼衷情允茲上訴丁停厚斂冤者爰申官寘嚴刑罪人斯得既有雅見實曰良圖仲和開元時擢書判拔萃科潤下斯弊漂流是虛欲崇堙塞必藉隄防津吏以下方致災冀應除毀水工以長隄作務不可依憑競有兩端事難雙允請闢千里無虧五詞則拯溺不待於規行聞諸往說而塞川頗類於防口得自今辰方見河渠之書自嫻標準溝洫之志以會規模左毀則右傷右毀則左弊左右俱毀便沈下方津吏之言雖陳水工之志難奪既不合毀咸宜告知偁開元時擢書判拔萃科沃土塉土厥有區分一易再易非無異制實資均政以利耕者甲有司也政實存焉因資地利之殊計若農家之請庶以通其勞逸齊厥等差實謂更耕克精受授孰云過數且曰守經古有明徵今寧有罰粲開元時擢書判拔萃科宗周布政漢家舊法藏冰於陸自古有之頒冰於朝方今靡替倚那厥職乃丁是掌西攀咸鎬寄甘泉之北宮東邑鞏洛入邙山之陰洞履霜知堅和翠微而一色積雪偕凍岌稜層而流寒當忝司存合閑主守苟違命士得無常刑若惟陳迹良亦異聞且太歲換韶盛德在木上從天子下際㣥公大給千官備霑累命青熒片片光研金鏡之空缾央瓦峩峩姿凜玉壺之態蓋將以蕩清暑辟炎毒水晶簾內飛燕嬌歌而對山虎魄盤中省署永吟而陶酒時或稽緩人必其憂况士不頒冰闕也春不修鑑怠也秋仍輒刷非也三者備矣夫何言哉眷言伊丁請用常典瑱河東人元宗時登進士第乾坤設象帝出乎震文經邦而遐邇安武禦寇而上下順厥二道之可久同五材而皆進故軒轅出涿鹿之戰顓頊列共公之陣足以克定禍亂天祿永終雖八荒有截而七德是崇若乃元冥用事律變冬中胡地馬肥寧控弦而習戰漢家農隙且講事而威戎於是簡車徒命將帥崇文物設武備旌旗裔裔而風飛士馬囂囂而雲萃竟澤彌谷殷天動地銜枚無聲擊鼓作氣琱弓月滿寶刀霜利申前驅誅後至為三表而有節歷千古而不墜者也爾其兵勢崩騰軍容翕習元甲鱗布長戈岳立虞人萊野㣥吏作旗事著六職禮分四時可以順少長匡邦國匪盤匪遊有典有則是時也長楊草落鄠杜霜明既不虞而作式亦因狩而治兵大田獲之以三品和門樹之以兩旌抱木之猿見矯矢而遙泣傷弦之雁聞虛弓而巳驚且夫設席張幕蒙盾負羽獸之大小既公私而殊獲野之險易亦人車而各主豈即鹿而無虞誠獻禽而後取此非以田獵縱天下之極觀亦因之簡衆而習武自勵開元時登進士第先天年獫狁孔熾動搖邊陲是以我國家有事於沙漠也徵甲選徒星馳雲集楚劒霜利吳鈎月懸將以驅日逐之首斬天驕之族蓋使烽埤無火亭障息肩大矣哉自古出師未有若斯之盛者藉雖不敏敢述賦云赫哉帝唐葉殷累聖光明乾道洗清邦政德所以和懷四夷教所以平章百姓用能盡奄有於天下得樂推於㣥黎鳳符以謳歌而適龍歷以揖讓而躋既神化之無外何鬼方之獨迷若乃皇赫斯怒元戎是出其制敵也以威其用師也以律琱戈電舉鐵騎風疾霜明鋒刃夕曜曜以衝星火色旌旗晝炎炎以篲日橫行有同於千里止步不過於六七桓桓大將黃石老之兵符赳赳武夫白猿公之劒術謀無再陳其來若神攻則必取諒資於武既作氣以鼓行受脤者實在乎國英雖假靈於廟算決勝者亦關於天斷固將以拒十角之猖狂豈止掃一隅之陵亂然後作寰宇之清謐成皇王之壯觀別有其儀不忒詩書是則鱗翮初就將騰躍於風波冠劒末從尚棲遑一作遲於翰墨願高闕之氣殄佇燕然之銘勒優哉悠哉小臣高歌帝德從龍者雲召風者虎物之相應時哉則侶傅巖捨築渭浦收綸命或時偶時維道親時既行焉西漢之臣附鳳時之否也東魯之父傷麟時可以謀身時可以達命季子談說宣尼歷聘平津列侯長卿國命時廢時通知之則慶元穹埏埴時運收成日月貞輝時合晦明大火流兮歲律云暮春花歇兮寒露將生感天時之興替矧人事之窮亨時乏良工龍泉掩彩時逢伯樂驥坂長鳴借如紅樹呈色玉顏含粲貴當時而則榮恥後時而貽歎古之君子謀於終始薦之惟賢士或知巳刺途者棘垂陰者李其道可存將來之士遷喬者鶯待時而鳴芬庭者蘭候時而榮易曰時止則止時行則行自古而觀惟時之大豈獨夫今日之情者也粵若受天明命配天啟聖其作則也必敬敷五教齊七政節春夏秋冬之候順金木水火土之性變通無失表正度以為平雩祀有常示帝圖之斯盛始或星分於木斗建於寅配其宮於甲乙面其地於庚辛莫不合乎序應乎人念㣥生而悉遂彰盛德以維新則是柄也非父非子而天下親暨夫候應乎離音諧於徵列其位於丙午制其方於壬子莫不循厥功究厥旨導貞悔之所由體長嬴之所以則是柄也非堯非舜而天下理至乃金精儲其氣白帝涖其事有湛露兮斯降涼風兮斯至是則仰察於天俯觀於地司肅殺而不忒憫凋落而無遺抑是柄也五帝惟六三皇復四又若元律騰輝伊水德兮膺是期有積雪兮自爾有堅冰兮自茲是則上窮於象下順於時念衣褐之未濟表歲寒之不欺抑是柄也兩漢非遠二周可追况復正巳無替虛心罔差隨土圭而暗測同灰管以潛知執陰陽代謝之功咸歸不宰用日月推遷之候盡合無為由是暉映化權鏘洋德柄契皇明於玉燭流睿覽於金鏡士有隨計上京觀光末路欣有準於時政賀無疆於聖祚故尋繹於禮經因抽毫而是賦天下之美風猷崇五日重千秋歡心達於四海聖澤均於九州是日也天子以載誕昔辰同漢武猗蘭之殿登高撫政則聖文花萼之樓皇帝乃御龍衮拱洪休申景命於萬方㝢縣賜明鏡於百辟公侯偉其爛矣生光炯爾明發色洞秋水精涵夜月均曲池之引照或淺或深比太陽之圓明不盈不闕咨爾千品勗爾萬官欽哉明主之錫訓爾為臣之難手平者必正體靜者必安水清則鑒澈表正則影端居燥濕而不變是之謂可久無小大而虛受是之謂內寬可以勵心者堅白可以接翼者鵷鸞擬茲鏡之在匣則何憂乎考槃於是㣥公卿士警扈仙蹕寵賚自天恩深此日執明鏡者無所私其照對明鏡者無所隱其質並陳力以效能各呈才而獻術莫不再拜稽首奉承天子之休備有德於咸一儒有討混元搜綿祀既覿寒暑之終亦測興伏之始覘風驚於一葉委時換乎千里寒之厥狀自茲而起若夫大火宿藏青霜晨烈則蜀井烟閉漲海氛滅長河天浹綴珠崖而生冰幽朔地窮濛飛沙而雨雪乃知蘇武增感李陵愁絕聽胡笳以攪思儷漢庭之仳別及幽林風掃時物霜殘柔條危勁奧室淒寒有美人兮心恍惚情怵悼而難安陰凝柳塞怨龍庭之路隔月透羅幌憐鴛衾之夜單屣銀階之悄悄雪珠淚之珊珊縫筐笥之紈素寄戎幕之艱難別有陸沈之子厠跡荒藪器宏偉而可觀命屯剝而不偶當其時也趨炎俯僂佩日敢噓吸無詩人卒歲之衣雨泉客將離之泣豈祁寒而致憾亦遭時而不息終乖挾纊之暄更悲綈袍之及層冰咽溜宋生則綴悵而相望皓雪盈門袁子則茹悲而於悒雖居榮而可貴亦憂道而不入於時倚歎窮律佇目遐坰伊鮮物之皆悴獨霜松之常青縱寒苦之飄激淬堅明而自寧汨吾情之浩蕩願冥志於紫靈太虛運化勞息有期聖人制禮哀樂殊節甲以詩稱伐木義切斷金追管鮑之平生欣然相得鄙張陳之棄置莞爾無取臨川興歎逝者如斯怨天地之不仁撫琴書之空在昔之莫逆把黃菊而思來今也則亡乘素車而慟哭哭於門外禮亦宜之責以相輕誰執其咎且孔父將聖昭著格言有弟何知胡然昧議龍頭不見巳喪朋從鳳字未題遽招伊戚非理輒毆宜啟刑書請驗所傷用申明罰元伯開元時人石門海口厥土惟南爰有寒泉注涯之潭洶溢得窟既潔且甘古來共傳飲之則貪或曰不然人心自欲銅山恒有意亦未足矧來茲土舶車相屬利汨其心貨盲其目在昔賢守惟孟與吳雖飲此泉捐金還珠由是言之自有貪夫匪以泉故其心則渝嘗讀舊史錢神銅臭漢晉昏濁多門取授上下相蒙靡恤靡救由物而已豈泉之搆皇唐啟聖開元御歷黜陟幽明官人慎擇道風淳儉吏業清白於戲爾泉其名可易器滿必覆撲滿不完不貪為寶子罕詞殫潤屋潤身禍福之端勒銘貪泉作誡庶官子卿開元時人古之王者出師有征無戰然則兵革之事聖人是興蓋所以威不軌而昭文德也帝乃欽若堯禹承天運行鮮卑在圖夜郎無外而旄頭賊醜忘道弄邊河侵海寒障路幽朔皇赫斯怒親師用征搖星纛神召募雄合白羽森月朱旗爛空俾夫翕東海之焱波掃北荒之沙雪國用長策人忘暫勞聊勝詠歌取思而賦賦曰莫高匪天兮生我聖人聰明運用兮不測惟神恩澤洪融覆幬彌淳噴窮陸霈無垠珍怪烟委而波屬蠻夷鳥狎而蟲馴粵若鬼方兮玁狁孔狡固陰沍寒兮陵我河津於是按玉劒而憑怒耀金戈而雷震禡蚩尤誓勾陳會白帝騎蒼鱗天動地應羅羽衞而煌煌風咆雷鬬作笳鼓之殷殷別有哮悍之旅毅勇之賓爰自幽并而投召走巴楚而來臻鐵馬金甲虹旌電輪鳴弦者飛鴈由其殞越揮戈者白日所以逡巡國體兵勢殊容其身既出師於鄠杜亦獵虜於新秦野氣蒼茫而助殺軍聲慷慨以含仁奮威則鯨鯢忉釁流詠則梟獍懷親大荒搖落知單于之魄死層冰泮渙感天子之情春昆彙雜種於何不臣寧直跨胡而北省亦當撫柔於叢榛海岱攸類匪兵是遵固將歷三五而高視豈與夫費百萬於同勤齊望開元時擢書判拔萃科三才既分六宗爰設或因地事地或因天事天明堂尊嚴配之儀清廟崇禘祫之典國之盛禮其何以先神之至誠罔或不降於是陳以簠簋薦之犧牲瑟奏空桑管吹孤竹甲言參大享監彼有司獻灌無虧福祐攸洽貴骨以頒於高品賤體仍霑於庶僚他日鯉趨且聞歸胙今朝神惠更用祭先錫類之美則多黷禮之嫌宜避瑱開元時官諫議大夫臣聞堯以欽明文思察洪水而其咨湯以布昭聖武帛丿糸鑠石而不雨彼穹蒼之災沴豈睿君與聖主我明德之馨香終時康而俗阜大唐以率俾蠻夏莫非王土主上以光宅君臨粵若稽古以淑德崇化為乾作輔其廣運也包二儀以覆載其亭育也想㣥生之父母聖謨洋洋嘉言孔彰惟精惟一無怠無荒百姓有過引之歸巳一物失所納之於隍夫人之所重者食也政之所先者農也近歲以冬雪不盈春雲少澤綠疇合瘁朱夏將革無西畢之霶雨氵它有南威之赫奕我藝闕秀甫田虛闢湘燕垂翼而不飛應龍矯首而何益爾乃邦人大恐皇念勤眷思轉災以為祥宜樹美而除譴移正寢徹豐膳釋幽冤索遺彥達聰明目廣視聽於四方恤獄緩刑開網羅於三面誡絕崇慝懲離黨援衮路清太階平君臣咸一邦家輯寧天方悔咎淪孼垂休降靈雲布族而靄䨴電驚空而煌熒殷雷震而闐闐飛雨零而冥冥夫其森沈散漫颯灑淩亂瀝液汪洋周流津漢濯上林之靃靡漲昆明之瀾汗驟繁響於闕庭浮清風於樓觀元澤優而霽止晴光炳兮澄渙奔餘潦於迴塘挂晴虹於霄漢阡陌條暢而增綺黍稷芬榮而若換野老熙熙農人相持嘉廩儲之望歲喜甘霈之流滋鼓腹擊壤賡歌稱詩詩曰有渰淒淒興雨祁祁雨我公田遂及我私皇上睟容有穆神心載怡㣥卿大夫濟濟纓緌拜手稽首足之蹈之賀農祥於介福答聖造於休期有諫議大夫沈瑱因進而稱曰臣聞昔者飛雉升鼎用墜殷宗之德熒惑守心旋移宋景之慝禾苗盡起孺子感動於周公桑穀並生太戊獲相於伊陟夫君人者修巳以敬乾乾日昃奉堯舜以為心崇禮讓而為則放黜回佞敷求讜直使人以時用邱明之昏定異物不貴誡老氏之難得哀賑惸嫠勉敦稼穡自然灾伏至誠感於天地及當而行湛恩浹於寰瀛珍絡繹瑞縱橫海氣蒙晏河光吐榮甘露凝而醴泉涌麒麟遊而鳳凰鳴烟雲蕭索而紛郁日月光華而淑清我后慎終如始用晦為明為而不有沖而不盈向之能事動植由庚欽敬開元時擢進士第粵若大君光宅海內文思開帝王之洪緒振皇紀之綱維敷化布和設明堂以聽政發祥儲祉坐宣室而受釐有典有則念茲在茲負扆恭巳凝旒肅祗享會必依乎是月寒暑不易乎斯時若乃睦以神人施乎政令鋪惠澤以流渥鼓薰風而入詠日月惟朗星辰克正調歷數之璿衡叶乾坤之寶命况乎陽氣告始豳歌御冬惟時是恤維政之雍穆元堂以敷化感黃冠以勞農命魯史之登臺式書雲物審周官之有祀時命秩宗於是恒憲聿修舊章遐布飭蓋藏之是密警門閭而必固一以永寧各知攸措滌器物之疏奄釐冰地之凝沍休力役省征賦養國中之魚眾寡罷官守之尸素是使風雨丕順曾不爽於豐年霜露以時諒匪夭夭心於歲暮撫三五之遐軌案道德之平裕方見與羲農而比崇豈直等成周之景祚而已顧慚眇質叨承選衆神仙作尉非漢氏之稱梅孝友承家媿詩人之歌仲謬昌言於聖德豈緣情而有中典禮是興訓導為本俗以遷善從乎樂郊生而在勤克有寧宇今丁之適無乃是諸鄰伍以追其昧授於旌節邑吏之罰胡不恤於宜岸縶茲行者類厥罷人雖徇等門關曾不忍於為厲內於圜土且未見於虧則終是迷而妄作輒利動以生悔瑜瑕既不相掩齊楚豈能均得誨人不倦其若是乎遂使信不可知義無所立薄刑猶可誤作往訴何太詞游爰叩兩端且知三失况率土無外曷謂他邦當官以行何非巳任免戾實由勤職結罪終無正條寧其刑淫是亦為政恭惟我王設險以守諸末遊彼何人斯干國之紀異驅傳之高節非買符之達人去必乘星學雞鳴而夜度行惟渴日談馬邑而朝迷此則匿姦於心詐偽難恕徒急切以文過豈刑章之可逃速歸爾尤無惑朝憲晉開元時擢書判拔萃科作利生人實資水德至於泛濫或以災成故立陂隄存夫令式雖墨綬為化不願於勞人而黃潦或湧益深於害物况作事謀始合用於農隙啟塞隨時豈待於春仲論事乃拙於為政語對何聞於有司堰既不立於千金刑亦安疑於兩璧郡侯所詰爰按科條潤開元時擢書判拔萃科元正告朔品物惟慶萬國朝宗九賓式序尊儒尚齒以申其宴慰養老乞言以成其福祿威儀秩秩弁舞傞傞等申公之置醴同齊侯之拜爵大㪷以將其厚意加籩以寵其元老既醉既飽以引以翼引大雅之謙和致太平之樂事光祿乃遵乎古道未蹈深愆比部則格以金科言從勾納法其畫一理在徵收刑貴惟輕不宜加罪唐堯稽古時謂能官周文小心號稱多士雲龍感召鸞鷺充庭蒲璧交衢弓車荐委薦異能之士採非常之德遊太學而橫經詣公府而高第驥足千里同主父之三擢桂林一枝恥公孫之十上爰求九錫之命以旌三適之功惟甲書生可貴能移太守之尊小吏雖卑猶奪宰君之望在道雖云可重傷倨無宜寘刑理在優賢不勞加黜邦寧本固書稱經理之方慮始樂成易著變通之義且河分南北境控青徐壤雜下田土為上賦荐逢堯水乍闕殷儲感發於中思索其極順時令庀工徒版築爰興隄防互設崛然特起同斷岸之孤標的爾殊形狀屯田之錯峙期於永逸汔用小康望免外徭式酬平價州將當撫循之寄顧瞻黔黎省司膺出納之權愛存府庫俱為奉國咸是循公探源若混其淄澠究理頗別於涇渭何則雖言營造本資其井田徒謂繕修未起於桑梓力常有限徭或可蠲役靡踰時價無宜給是則上省勞費人忘阻饑無闕於農不夭夭心於素縱使隄疏瓠子不復興歌浪起桃花誰能為害勝曲阜人擢進士第官右補闕以陋於饌則以泰訴云禮令無違廟者曰貌死者曰歸神人異業敬則如在牲牷必備祭而勿黷秩有五品榮加三命誠乃錫類孝能尊先春露既濡增怵惕之感秋霜巳降發悽慘之心雖欲饗親孰為知禮祭於寢也自合刲羊祀諸廟焉方聞用犢庖丁展事雖則無全鄒人將入如何不問令無立廟理歸於寢祭設庶人之位薦以大夫之牲索而用之非其古也蘋蘩可重豈煩介葛之犧黍稷非馨寧展烝嘗之禮精意以饗神其吐諸禮雖徵於曲臺罪自招於石室欲加之罪其無辭乎理範通明國圖惟遠班和正本式古崇風訓學興文當今是教甲乙同志偃化從師春誦夏弦自得西河之美摳衣函丈無非北海之遊道叶雩壇聲高闕里鴻都盛業方列義於儒堂電隙流年奄生悲於泉戶兩楹之夢豈迴景於西山二豎之災竟遊魂於北斗壞木之悲師也何追頹山之哀吾將安仰因情定禮自可處於心喪弔服加麻實無虧於聖政甲出而絰是依古也乙居則否奚所咎焉既不異於門人信無徵於魯禮欲加之罪其有辭乎休死勞生存亡大數絕漿泣血孝敬常期乙也哀摧禍鍾凶舋感風枝而殞魄反哺何施陟霜屺而縻心跪乳奚及願言負米空結戀於梁山痛深懷橘愴開編於吳史凶門列位夙著等差方取則於殷周驗昭然於典禮既虞而作瘞重之制自分有祔於姑為主之儀寧惑坦然明白可舉而行事不亂於大猷法難加於小累生榮死哀士有恒禮弔喪歸賵國著成規三品云亡九泉方閟窀穸有事未展懸棺之儀含襚所陳遂闕夷槃之典至若夏德方暑自可歸冰冬陰沍寒何煩設器待窮獻羔之禮方議鷞鳩之刑叔齊開元時擢書判拔萃科陟屺纏哀終天永慕形神訾毀有切於何曾流慟傷神詎慚於吳隱於是牛山卜兆魚岫開塋帝軒轅之乘龍衣冠作王子晉之御鶴劒舄成墳因班牛而動祥樹石馬而旌貺既而元門告掩丹旐云飛聊申虞祀之儀方則夏殷之禮立主之義自有常條以重當輕終乖禮式既無虧越何爽公途廣開元時擢書判拔萃科仁焉而終智焉而死九原悽愴寧聞可作之期千日荒涼徒結有涯之恨乙以悲深厚地痛結終天充窮於溢米之晨荼毒於寢苫之日青烏襲吉巳託萬家之地白鶴飛來俄聞再奠之禮所以表斯廬位設彼銘旌佇馴獸之見遊希祥禽之或至言申陟屺之戀再寫循陔之悲既結歎於生靈實無慚於死孝或人言告未可依憑哀敬之心理在矜察審慎之典必藉平反淫濫儻行手足無措既非月之無失何如霜之可繩
