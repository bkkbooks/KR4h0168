  - {type: head, offset: 4280, content: 甲監享以胙歸父餕而祭, id: KR4h0168_NFKB_401-h47, level: 2}
  - {type: head, offset: 4405, content: 沈瑱, id: KR4h0168_NFKB_401-h48, level: 1}
  - {type: head, offset: 4414, content: 賀雨賦, id: KR4h0168_NFKB_401-h49, level: 2}
  - {type: head, offset: 5099, content: 張欽敬, id: KR4h0168_NFKB_401-h50, level: 1}
  - {type: head, offset: 5108, content: 仲冬時令賦(以題為韻), id: KR4h0168_NFKB_401-h51, level: 2}
  - {type: head, offset: 5427, content: 對移鄉判, id: KR4h0168_NFKB_401-h52, level: 2}
  - {type: head, offset: 5427, content: 丁適他邑伍謂其叛追之遽出旌節以徇伍訴諸邑吏將納之圜土曰來有授也, id: KR4h0168_NFKB_401-h53, level: 2}
  - {type: head, offset: 5607, content: 對越關判, id: KR4h0168_NFKB_401-h54, level: 2}
  - {type: head, offset: 5607, content: 越度關府欲科罪稱告急切不暇請公文, id: KR4h0168_NFKB_401-h55, level: 2}
  - {type: head, offset: 5688, content: 劉晉, id: KR4h0168_NFKB_401-h56, level: 1}
  - {type: head, offset: 5698, content: 對清白二渠判, id: KR4h0168_NFKB_401-h57, level: 2}
  - {type: head, offset: 5698, content: 得清白二渠交口不著斗門堰府司科高陵令罪云是二月一日以前, id: KR4h0168_NFKB_401-h58, level: 2}
  - {type: head, offset: 5797, content: 劉潤, id: KR4h0168_NFKB_401-h59, level: 1}
  - {type: head, offset: 5807, content: 對大㪷酒判, id: KR4h0168_NFKB_401-h60, level: 2}
  - {type: head, offset: 5807, content: 元日會序賓光祿以大㪷酌醴祈黃耉比部以無令式勾徵訴稱以引以翼古之道也, id: KR4h0168_NFKB_401-h61, level: 2}
  - {type: head, offset: 5933, content: 對薦賢能判, id: KR4h0168_NFKB_401-h62, level: 2}
  - {type: head, offset: 5933, content: 甲薦賢能三詣公車試皆高第表請錫彤弓矢廷尉致詰詞云適有功, id: KR4h0168_NFKB_401-h63, level: 2}
  - {type: head, offset: 6061, content: 對無夫修隄堰判, id: KR4h0168_NFKB_401-h64, level: 2}
  - {type: head, offset: 6061, content: 河南諸州申無夫修理隄堰請與之平價仍免外徭省司以為與平價則官無所供免外徭則公事廢闕不之許州訴人實阻饑恐不及冬成至春復桃花水為害, id: KR4h0168_NFKB_401-h65, level: 2}
  - {type: head, offset: 6282, content: 顏勝, id: KR4h0168_NFKB_401-h66, level: 1}
  - {type: head, offset: 6294, content: 對大夫祭判, id: KR4h0168_NFKB_401-h67, level: 2}
  - {type: head, offset: 6294, content: 有五品祭寢不祭廟饌用索牛御史劾於寢則, id: KR4h0168_NFKB_401-h68, level: 2}
  - {type: head, offset: 6481, content: 對弔服加麻判, id: KR4h0168_NFKB_401-h69, level: 2}
  - {type: head, offset: 6481, content: 甲乙二人所受學師亡皆弔服加麻甲出有所之則絰乙居則絰出則否縣司科甲乙不合為師制服並不伏, id: KR4h0168_NFKB_401-h70, level: 2}
  - {type: head, offset: 6653, content: 對父在凶門判, id: KR4h0168_NFKB_401-h71, level: 2}
  - {type: head, offset: 6653, content: 乙父在喪母立凶門或告一家不合二門乙訴云虞而無主以重當輕, id: KR4h0168_NFKB_401-h72, level: 2}
  - {type: head, offset: 6777, content: 對不供夷槃判, id: KR4h0168_NFKB_401-h73, level: 2}
  - {type: head, offset: 6777, content: 三品喪事夷槃不供司儀云時所不要, id: KR4h0168_NFKB_401-h74, level: 2}
  - {type: head, offset: 6851, content: 屈突叔齊, id: KR4h0168_NFKB_401-h75, level: 1}
  - {type: head, offset: 6862, content: 對父在凶門判, id: KR4h0168_NFKB_401-h76, level: 2}
  - {type: head, offset: 6862, content: 乙父在喪母立凶門或告一家不合二門乙訴云虞而無主以重當輕, id: KR4h0168_NFKB_401-h77, level: 2}
  - {type: head, offset: 6975, content: 裴廣, id: KR4h0168_NFKB_401-h78, level: 1}
  - {type: head, offset: 6985, content: 對父在凶門判, id: KR4h0168_NFKB_401-h79, level: 2}
