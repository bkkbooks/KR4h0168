seq: 910
front:
  text: 全唐文欽定全唐文卷九百十道宣二
  hash: sha256:66679d29ebf3934e8572dc03f8bb4b0bdac9f3cc2933291ee458cb3ffc356dfb
body:
  text: 觀夫聖人之利見也妙以清澄界繫亡我傾倒以為言焉故張三學之教源顯八正之道業揚四部之清訓樹五衆之良規莫不橫厲重關高翔極有者矣然則學雖多位誠戒居先豈不以衆善宏基依因之所本也自古詳教咸分兩途化教則通被道俗專開信解之門行教則局據出家惟明修奉之務三輪則攝於憶念四藏則統在毗尼義約則行教所收從文則歸承法聚止作兩善名實昧於即機受隨二戒願行標於時衆所以前修後進成誦維持代漸浮訛不無沿濫自法流東夏開務實繁戒本羯磨淨分異轍良由受體止持攝修之極無越戒本據行作持量處之要其惟羯磨戒本序致如別所陳羯磨衆氏義須詳顯或單翻出即古本曹魏所翻者或依律文即令一家依本直誦或准義用即光師所述首云三藏者或引緣據即願師後述廣子注者讎校諸本成務紛綸增減繁略互見得失單翻則失於文旨包舉難尋依本則得在執據前後易惑准義理雖無爽藏蹟可嫌緣據似是具周止存別見竝隨事尋誦臧否冥然惟可卷收信如龜鑑又依本綴疏廣引遊辭附文摘義鮮逢其器逮於近世繼有作者盛解律文空張辭費至於行事未見其歸撫務懷仁實增勞想今不揆庸昧試纂聖言削彼繁蕪增其遺漏具依正量傍出行用各顯部類仍隨義舉指瑕則知過宜改摘理則思擇有蹤時務則廣樹厥儀同廢則略題名相本雖行世於理未陳故復相從勒開文義余老矣恐徒移日晷妄損正功耽滯無益之辭以送有涯之命誠不可也大集法行之言律頒常一之教此而不審餘竟何言所題曇無德者中梵本音唐言譯之名為法鏡部謂黨類之別名運起正法之初位四分即說之斷章言律乃行所詮教對彼繁略故題刪補對彼潛務故曰隨機羯磨天音人翻為業凡百所被莫不成濟且開大略廣要如後四分戒本者斯乃通萬行之關鍵實三乘之階轍者也昔夢㲲告徵機分利鈍之本喻金顯道教無離合之宗然則二部五部隨務或張五百十八任緣時舉同孚聲教竝會真空導達化源通明理性故能乘津五衆覆燾㣥萌開務攝持允符元旨至如四分肇興祖習綿遠正法初百便列其宗斯人博考三機殷鑒兩典包括權實統收名理集結茲藏通被時實故使韋編成規欽承無絶自諸部遠流咸開衢術獨斯一宗未壞支派良田師稟有蹤知時不墜故也蘊結西土千有餘年譯傳東夏將四百載諸有傳授同異非無元魏季歷慧光律師隨義約文重出一本首題歸敬者是也此與姚秦覺明所出頗得相符高齊末祀法願律師誦律計文又出一本略於歸敬首題戒德者是也斯則三本行世宏魏者多見心紛擾於今未靜考核諸集蓋不足陳經遠大觀義無讎抗余以暇日遍覽㣥篇互擊波瀾僅分其異至於行事盛結遲疑豈非單寫本文通略正解致令後鋭罔冒愈深所以敢依律部具集正經仍隨本律即為注述卷成流廣隨務可歸至於義理未遑修葺今有二三遊學共結山門每以戒為入道之清途出有之明略講通既寡悟入何從大律廣而難求斯經約而易授故不獲己試復敘之博要適機己絶唱於前達舒演義類敢程器於將今且酬來貺隱括詳後夫戒德難思冠超衆象為五乘之軌導實三寶之舟航依教建修定慧之功莫等住持佛法㣥籍於茲息唱自大師在世偏宏斯典爰及四依遺風無替逮於像季時轉澆訛爭鋒脣舌之間鼓論不形之事所以震嶺傳教九代聞之拔萃出類智術而已欲明揚顯行儀匡攝像教垂彞範訓末學紐既絶之元綱樹已顛之大表者可得詳而評之豈非憑虛易以形聲軌事難為露潔者矣然則前修託於律藏指事披文而用之則在文信於實録而寄緣良有繁濫加以學非精博臆說尢多取類寡於討論生常異計斯集致令辨析釁戾輕重倍分衆網維持同異區別自非統教意之廢興考諸說之虛實者孰能闢重疑遣通纍括部執詮行相者與常恨前代諸師所流遺記止論文疏廢立問答要抄至於顯行世事方軌來蒙者百無一本時有鋭懷行事而文在義或復多列遊辭而逗機未足或單題羯磨成相莫宣依文用之不辨前事竝言章碎亂未可披檢所以尋求者非積學不知領會者非精鍊莫悉余因聽采之暇顧盼㣥篇通非屬意俱懷優劣斐然作命直筆具舒包異部誠文括衆經隨說及西土賢聖所遺此方先德文紀搜駮同異竝皆窮核長見必録以輔博知濫述必翦用成通意或繫文以顯事用或略指以類相從或文斷而以義連或徵辭而假來問如是始終交映隱顯互出并見行羯磨諸務是非導俗正儀出家雜法竝皆攬為此宗之一見用濟新學之費功焉然同我則擊其大節異說則斥其文繁文繁誰所樂之良由事不獲己何者若略減取其梗概用事恆有不足必橫評不急之言於鈔便成所諱今圖度取中務兼省約救急備卒勒成三卷若思不贍於時事固有闕於行詮則略標旨趣以廣於後然一部之文義張三位上卷則攝於衆務成用有儀中卷則遵於戒體持犯立懺下卷則隨機要行託事而起竝如文具委想無紊亂但境事實繁良難科擬今取物類相從者以標名首至於統其大綱恐條流未委更以十門例括方鏡曉遠詮自戒本之行東夏也曹魏中世法護創傳羯磨乃明戒本蓋闕姚奏關輔方譯廣文覺明法師首開律部因出戒本附譯傳寫高齊御歷盛昌佛日三方釋侶二百餘萬法上大統總而維之沙門慧光當時僧望班聯上統攝御是圖以夫振紐提綱修整煩惑非戒不立非戒不宏更以義求纂輯遺逸重出一本廣流千世則其本首題歸敬者是也隋運并部沙門法願鄙光所出宗理爽文後學憑附卒難通究乃準的律部連寫戒心通被汾晉最所傾重則其本首題戒德者是也參互三本讐校同異通會皆附正經摘理義無不可是以先達晚秀奉而莫遺意在忘筌豈惟文綺世有惰學浮侈之徒博觀未周隨言計執同我則審難為易異聽則達是言非比周成俗卒未懲曉嘗以餘景試為通之如光所詮我今說戒願之所出我說木叉及披律解木叉是也願出初戒則云不還光所傳詞便言不捨檢律誠釋違願附光取意統文莫非還淨如斯舉例其相可知若夫戒德戒宗誠明定慧銷煩靜務超世超生初涉門津會歸舟濟非文不啓非義不通妙識兩緣雙袪二執蕩焉無纍紛諍何從今余所述還宗舊轍芟略繁蕪修補乖競詞理無昧投說有蹤庶幾言行并傳愚智通解悠悠來裔未達斯歸略為題引序之云爾惟夫慢幢難偃三界由此輪回愛水未清四惑因茲流湎自非獨拔開士出有至人何能裂愛網而闢重關質深疑而啓昏趣有離垢慧菩薩者道高初住德跨八恆假時俗之津途發深識之嘉問如來以無緣之勝辨赴有待之幽情斷五趣之蓋纏藉五輪之禮念所以五通五眼自此增修五位五生承斯圓滿蘊結中夏千六百年頽運有蹤載聞東壤洎龍朔二年有天竺三藏厥號那提統括六異之宗窮微四圍之典九部八藏詞無昧於自他十諦一乘義有乖於空色竝詳略名理妙達宏致來儀帝里頻謁天庭降厚禮於慈恩將歸飛於海表以此經㣥聖之發軫凡衆之初心乃出流布傳於道路俗遂依繕寫所在通之恐未悉其由來故因敘其緣致云爾觀夫創入道門未即間其妙行要遵承以法訓方乃曉其律儀事若闕於師承持護冥然無準故知不有教誡行相誰宣不有學人軌模奚設然釋迦行化法本西天自金口收光言流東域化教含其漸頓灑定水於三千制教輕重斯分熏戒香於百億律制五年依止意在調伏六根有智聽許離師無智猶須盡壽屢有初心在道觸事未諳曾不尋其教章於法每纏疑網或非制而制是制便違或云我是大乘之人不行小乘之法如斯者衆非一二三此則內乖菩薩之心外闕聲聞之行四儀既無法潤乃名枯槁衆生若此等流古今不絶自非持法達士孰能鑑之者哉時有學人運情疏躁求行者少求解者多於制儀門極為浮漫夫以不修樿刐三昧長乖真智之心不習諸善律儀難以成其勝行是以古今大德實為世者良田淨業成於道儀清白圓於戒品氣高星漢威肅風雲德重邱山名流江海昂昂聳傑秀學千尋浩浩深慈恩波萬頃懷師子之德現象王之威人天贊承龍神欽伏實謂蒼生有感世不空然所以德焰聯輝傳光靡絶雅行堅操真僧寶焉余乃愧省下流實懷慙於上德準教纂斯清訓以將呈誨未聞夫戒律之宗理有任持之志遂使內自增其心善外令儀軌可觀諸行條件録之於後用光新學并題敘云夫三寶利見其來久矣但以信毀相競故有感應之緣自漢洎唐年餘六百靈相肸蠁㣥録可尋而神化無方待機而扣光瑞出沒開信於一時景像垂容陳迹於萬代或見於既往或顯於將來昭彰於道俗生信於迷悟故撮舉其要三卷成一部云夫損己利他者蓋是僧家之義也害物安身者非為釋子之理也有賞善罰惡之能斷是非不平之事若道先人後己契諸佛之慈心如或爾死我活乖六合之妙行為主者倘存仁義感十方衲子之雲臻若乃私受人情招千里惡名之遠播為賓者懷恭執禮有義而到處安身苟取狂圖無義而隨方惹怨今者幸生中國得賴空門脫萬丈之火坑拋千里之羈網如囚出獄似鳥開籠履布金積善之場住七寶無殃之地天龍恭敬神鬼欽崇非桑蠶而著好衣不耕田而飱美饌何須結怨叨利非理圖財求蝸角之虛名閉人天之坦路取龜毛之小利穿地獄之深坑積恨結於今生受波吒於後世縱使滿堂金王牽纏自己愚身直饒羅綺盈箱鬬亂子孫業重少求儉用免逼迫於心田知足除貪幡馨香於意地或住梵剎或挂雲堂莫論他非但省己過若有才高之闕一字把三藏以研窮志淺之流覽五乘而課誦切莫口行慈善肚裹刀鎗面帶笑容心藏劍㦸貧者不恤老者不憐忘慈親鞠養之深恩乖師長提攜之厚德如斯用意退十方檀越之信心執假迷真惹四海英賢之譏誚是以丁寧勸諭仔細精專聞之者破我慢之高山覽之者塞昏迷之巨海皆希稟信暜願回心只宜來世勝今生莫遣今生勝來世奉勸大衆疾須覺知大限臨頭悔之莫及余以暗昧少參學府優柔教義咨質賢明問道絶於儒文欽德承於道立故居無常師追千里如咫尺惟法是務跨關河如一葦周流晉魏披閲纍於初聞顧步江淮緣構彰於道聽遂以立年方尋鉛墨律儀博要行事謀猷圖傳顯於時心鈔疏開於有識或注或解引用寄於前經時抑時揚專門在於成務備通節目流漸可知至於戒本壇場曾未陳廣雖因事敘終非錯言今年出從心旦夕蒲柳一尋此路若墜諸隍力疾書之遺滯非咎乃以乾封二年於京郊之南創宏斯法原夫戒壇之興所以立於戒也戒為衆聖之行本又是三法之命根皇覺由此以興慈凡惑假斯而致滅故文云如何得知佛法久住若中國十人邊方五人如法受戒是名正法久住是知比邱儀體非戒不存道必人宏非戒不立戒由作業而克業必藉處而生處曰戒壇登降則心因發越地稱勝善唱結則事用殷勤豈不以非常之儀能動非常之致然則詳其廣也談論可以處成尋其要也行事難為準的是以諸律文云方相莫委於分齊唱令有昧於前緣衆集不曉於別同通和懵分於成敗竝曰非界咸乖聖則雖受不獲以無界故是知空地架屋徒費成功無壇結界勝心難發今博尋㣥録統括所聞開法施之初門仰住法之遺則若不分衢術則推步者不識其由故略位諸門使曉鋭者知非妄立云爾自大夏化行布流東漸懷信開道代有澆淳斯由情混三堅智昏四照故使澆薄之黨輕舉邪風淳正之徒時遭佞辨所以教移震旦六百餘年獨夫震虐三被殘屏禍不旋踵畢顧前良殃咎已形取笑天下且夫信為德母智實聖因肇祖道元終其正果據斯論理則內傾八慢之惑核此求情則外蕩六塵之蔽蕭然纍表非小道之登臨廓爾高升乃上人之翔集然以時經三代弊五滓之沈淪識蒙邪正銓人天之法網是以內教經緯立法衣以攝機外俗賢明垂文論以宏範昔梁鍾山之上定林寺僧祐律師學統九流義包十諦情敦慈救志存住法詳括梁晉列辟㣥英留心佛理構敘篇什爰撰宏明集一部一十四卷討顏謝之風規總周張之門律辨駮通議極情理之幽求窮較性靈誠智者之高致備於祕閣廣露塵心然智者不迷迷者非智故智士興言舉旨而心通標領迷夫取悟繁詞而方啓神襟若夫信解之來諒資神用契必精爽事襲元模故信有三焉一知二見三謂愚也知謂生知佩三堅而入正聚愚謂愚叟滯四惑而溺欲塵化不可遷下愚之與上智中庸見信從善其若流哉是以法湮三代竝惟寡學所纏故得師心獨斷禍集其計向若披圖八藏綜文義之成明尋繹九識達情智之迷解者則正信如皎日五翳雖掩而逾光矣余博訪前敘廣綜宏明以為江表五代三寶載興君臣士俗情無異奉是稱文國智藉文開中原周魏政襲昏明重老輕佛信毀交貿致使工言既申佞幸斯及時不乏賢剖心特達脫穎拔萃亦有人焉然則昏明互顯邪正相師據像則雲泥兩分論情則倚伏交養是以六術揚於佛代三張冒於法流皆大士之權謀至人之適化也斯則滿願行三毒之邪見淨名降六欲之魔王咸開逼引之殊途各立向背之宏轍今且據其行事決滯胥陵喻達蒙泉疏通性海至如寇謙之拒崔浩禍福皎然鄭靄之拒周君成敗俄頃姚安著論抑道在於儒流陳琳綴篇揚釋越於朝典此之諷議涅而不緇墜在諸條差難綜緝又梁周二代咸分顯晦之儀宋魏兩朝同乘宏誘之略沈休文之慈濟顏之推之歸心詞彩卓然迥張物表嘗以餘景誠為舉之弊於庸朽綜集牢落有漢陰博觀沙門繁贊成紀顧惟直筆即而述之命帙題篇披圖藻鏡至若尋條揣義有悟賢明孤文片記撮而附列名曰廣宏明集一部三十卷有梁所撰或未討尋略隨條列銓目歷舉庶得呈諸未覩廣信釋紛擬人以倫固非虛託如有隱括覽者詳焉
