front:
  text: 全唐文欽定全唐文卷十太宗七
  hash: sha256:77a70735412ccc5c570aea15b8a796a774ba31a597156f84d76e1c47e6cd3314
body:
  text: 太尉尚書令陝東道益州道行臺雍州牧左右武大將軍使持節涼州總管上柱國秦王世民告柏谷塢少林寺上座寺主以下徒衆及軍民首領士庶等比者天下喪亂萬方乏主世界傾淪三乘道絶遂使閻浮蕩覆戎馬載馳神州糜沸㣥魔競起我國家膺圖受籙護持正諦馭舄飛輪光臨大寶故能德通黎首化闡緇林既沐來蘇之恩俱承彼岸之惠王世充叨竊非據敢逆天常窺覦法境肆行悖業今仁風遠扇慧炬照臨開八正之途復九㝢之迹法師等并能深悟機變早識妙因克建嘉猷同歸福地擒彼凶孽廓茲淨土奉順輸忠之效方著闕庭證果修真之道更宏像觀聞以欣尚不可思議供養優賞理殊恆數今東都危急旦夕殄除并宜勉終茂功以垂令範各安舊業永保休祐故遣上柱國德廣郡開國公安遠往彼指宣所懷可令一二首領立功者來此相見不復多悉雲霧不披山河在望企余之歎良用興懷鄭息有違齊楚交絶自遠勞師旅當甚疲敝我國家與彼本非仇隙彼之於我未始猜嫌往者趙魏諸藩皇風久扇恆衛之地素為我有足下首為寇亂屢來侵奪但以淮安喪師責躬由己公主飄寓歸寧本朝并得保宥危亡負荷大惠親鄰之好昭然著明雖則俘若王官翦同羈馬既懷坦蕩曾無蒂芥庶此冠蓋相望輶軒繼軌引弭兵之義敦方穆之期如何信不由衷翻懷匿怨無名之舉遽發危機背德之蹤遂為戎首吁可怪也良深歎息王世充滔天猾夏自貽伊戚舋毒三川腥聞四國皇情軫慮哀彼黎元推轂投柯申茲弔伐走以不武奉遵朝寄自揚旌河洛結壘伊瀍拯敝除凶屢摧㣥醜其餘渠魁危䠞獨保孤城重圍巳合自知淪敗苟延朝夕之命空為衒誘之言其濟惡反善雷同寇逆適所以心同霸楚若非國家膺圖受籙翦暴除凶亦當并吞東夏自稱西伯足下豈不屈膝稽首著在前聞飾智詭詞以分謗亂渝盟背惠職此之由又世充與足下舊稱和好中途翻覆罕能結誠遣使頻說胸奴欲令侵伐冀土外欺內忌唯利是圖居安尚不自存處危何力之有況今糧儲罄竭帑藏空虛析骸煮孥命懸晷刻足下欲以三軍之衆仰哺他人千金之資坐求外費理如畫餅未見其宜足下前者徇地屠城親至東境孟海公歷時抗禦未即從順頻令告急請我師救見逼求和義所不取是以按兵辭使恩全世充又我國家不遑及遠海公援絶方歸執事假我風雲差無負德滎下諸州鄰近東鄙以足下風牛罕及亭戍靡戒農居安堵未相猜二所以曹公兵前並未追足下乘我無虞之城貪冒尋常之地進無投迹之所退有迷據之色誰為計者良非上算比者漳滏喪沒既往不追河濟傾淪成事誰咎今乃過相陵侮方深起難所以故到成皋佇承來旨昨者前茅警路後騎啓行乃與足下中途相遇旌麾未列鋒鏑暫交彼之士馬自相騰踐郊勞之儀遂爽犒師之禮未通雖則為彼禍先能無懷愧國家夷凶撥亂唯以匡時濟俗不欲窮民極武專任甲兵故蓄鋭停師冀聞擇善可否之事幸速圖之若不獲命終為怨府雄夫奮其智勇猛士發其餘怒諸軍霧合指日風驅屬橐鞬於中野縱矢鏑之餘費燎原覆醢雖悔難追必然繼好息民更敦前好況兵交使往遲覽還音吾與卿叔共事或軍旅多務或文詠從容何嘗不馳驅經略款曲襟抱比雖疾苦日冀痊除何期一朝忽成萬古追尋痛惋彌用傷懷且聞其兒子幼小家徒壁立未知何處安置宜加安撫以慰吾懷知公巳共可汗結和遂使邊亭息警烽火不燃和戎之功豈唯魏絳金石之錫故當非遠王世為君長撫有東藩海隅遐曠風濤艱阻忠款之至職貢相尋尚想徽猷甚以嘉慰朕自秪承寵命君臨區宇思宏王道愛育黎元舟車所通風雨所及期之遂性咸使乂安新羅王金真平朕之藩臣王之鄰國每聞遣師征討不息阻兵安忍殊乖所望朕已對王姪信福及高麗新羅使令具敕通和咸許輯睦王必須忘彼前怨識朕本懷共篤鄰情即停兵革卿情深奉國志在忠孝爰録前烈圖之丹青事兼勸獎足勵風俗再三循覽朕甚嘉之攻戰之重器械為先將士屬心待以制敵卿星言就路躬事修營干戈才動梯衝暫臨三軍勇士因斯樹績萬里逋寇用是克寸平方之前古豈足相況昔隋末喪亂百姓凋殘酷法淫刑役煩賦重農夫釋耒工女下機徵召百端寇盜蜂起人懷怨憤各不聊生水火之切未足為喻先朝不忍塗炭思濟黎元朕稟承神算奮劒南起與彼境英雄同心協力不顧軀命以救蒼生爰自晉陽興兵立義雄鋒接刃櫛風沐雨除凶去暴布德行仁天下乂安戎車止息九夷八狄莫不來庭以至於今二十餘載豈豫一人所能致此實賴天地之靈宗社之福賢人君子為朕股肱文士盡其才智武夫宣其武力朕端拱無為庶幾王道然漢祖悲歌嘗思豐沛晉皇吟咏唯在溫原此人情也況并部之地創業之基與諸父老首立大事引領北望感慕兼深思與父老一日敘舊懷之在心所不忘也但海內殷曠萬幾事多巡省四方未獲周悉父老宜約勤鄉黨教導後生親踈子弟務在忠孝必使風俗敦厚異於他方副朕此懷光示遠邇使旌表門閭榮寵家國書名竹帛豈不美乎夏序甚熱想各平安善自頤養動靜聞奏故有此敕想見朕心卿破焉耆虜其僞王功立威行深副所委但焉耆絶域地阻天山恃遠憑深敢懷叛逆卿望崇位重報效情深遠涉沙場躬行罰罪取其堅壁曾不崇朝再廓遊魂遂無遺寇緬思竭力必大艱辛超險成功深足嘉尚新羅委命國家朝貢不闕爾與百濟宜即戢兵若更攻之明年當出師擊爾國矣吾初向賊陳心并在戰攻為憶汝之言所以不執斧鉞如其不爾將大決戰此後必不親行陳勿為憂慮也先生操履夷德業沖粹屏棄塵雜棲志元虛吐故納新食芝餌术念衆妙於三清之表返華髮於百齡之外道邁前烈聲高自古非夫得祕訣於金壇受幽文於玉笈者其孰能與此乎朕昔在藩朝早獲問道眷言風範無忘寤寐近覽來奏請歸舊山已有別敕不違高志并許置觀用表夙心未知先生早晚已屆江外所營棟宇何當就功佇聞委曲副茲引領近已令太史薛頤等往詣令宣朕意突厥頡利可汗未破已前自恃強盛抄掠中國百姓被其殺者不可勝紀我發兵擊破之諸部落悉歸化我略其舊過嘉其從善并受官爵同我百寮所有部落愛之如子與我百姓不異但中國禮義不滅爾國前破突厥止為頡利一人為百姓之害所以廢而黜之實不貪其土地利其人馬也自黜廢頡利以後恆欲更立可汗是以所降部落等并置河南任其放牧今戶口羊馬日向滋多元許冊立不可失信即欲遣突厥渡河復其田土我策爾延陀日月在前今突厥理是居後後者為小前者為大爾居磧北突厥居磧南各守土境鎮撫部落若其踰越故相抄掠我即將兵各問其罪此約既定非但有便爾身貽厥子孫長守富貴也吾以君臨兆庶表正萬邦汝地居茂親寄惟藩屏勉思橋梓之道善侔閒平之德以義制事以禮制心三風十愆不可不慎如此則克固磐石永保維城外為君臣之忠內有父子之孝宜自勵志以勗日新汝方違膝下悽戀何巳欲遺汝珍玩恐益驕奢故誡此一言以為庭訓所上意見極是讜言辭理可觀甚以為慰昔齊境之難夷吾有射鉤之罪蒲城之役勃鞮有斬袪之仇而小白不以為疑重耳待之若舊豈非各吠非主志在無二卿之深誠見於斯矣若能克全此節則永保令名如其怠之可不惜也勉勵終始垂範將來當思後之視今亦猶今之視古不亦美乎朕比不聞其過未覩其闕賴竭忠懇數進嘉言用沃朕懷一何可道朕歷觀前代詳覽儒林至於顏閔之才不終其壽游夏之德不逮其學惟卿幼挺圭璋早標美譽下帷閉戶包括六經映雪聚螢牢籠百氏自隋季板蕩庠序無聞儒道墜泥塗詩書填坑穽眷言墳典每用傷懷頃年已來天下無事方欲建禮作樂偃武修文卿年齒已衰教將何恃所冀才德猶茂臥振高風使濟南伏生重在於茲日關西孔子故顯於當今令聞令望何其美也念卿疲朽何以可言朕以二九之年屬天下喪亂毒流區夏禍遍郊畿㣥雄則駭雲興猛將則風驅霧合年二十有四慷慨京邑電發中原震蕩三川掃清八荒及至壯年獲臨寶位然乃遠夷委贄萬國歸心致使朝有進善之臣野無行歌之士節義盈於私室獄訟息於公門一尉於東西混車書於南北由是偃組練而敷禮樂放牛馬而逸黎元方欲紀石封山握河沈璧功既成矣世既貞矣信可以優游暇豫作樂崇德者歟故因茲餘隙乃修苑囿其勝地則有積翠凝碧其川阜則有濯龍平樂若乃南面雙闕北對芒山引洛浦之通波連郟鄏之餘址叢薄本麗加之以芳節池沼素美瑩之以初陽舞蝶游絲帶清飈而散影分花交柳映碧浪而成文巨樹千尋結輕煙而聳翠危峯萬仞照落景而開紅雲氣縈巖似遊仙於巫峽霓光染溜類濯錦於成都戲羽閒關互飛沈於蒙密游鱗瀺灂乍出沒於芰荷翔泳之美盡斯仁智之樂備矣可以遁形匿跡可以養志恬神獨往襄城之中斯可觀也邈然姑射之上何以加茲余每覽巢許之儔松喬之匹未嘗不慨然慕之思可脫屣長辭拂衣高謝歘復以時運見羈因留連於大任徒有輕舉之志而不達者其天意也豈人事乎蓋聞二儀有像顯覆載以含生四時無形潛寒暑以化物是以窺天鑒地庸愚皆識其端明陰洞陽賢哲罕窮其數然而天地包乎陰陽而易識者以其有像也陰陽處乎天地而難窮者以其無形也故知像顯可徵雖愚不惑形潛莫覩在智猶迷況乎佛道崇虛乘幽控寂宏濟萬品典御十方舉威靈而無上抑神力而無下大之則彌於宇宙細之則攝於毫釐無滅無生歷千劫而不古若隱若顯運百福而長今妙道凝元遵之莫知其際法流湛寂挹之莫測其源故知蠢蠢凡愚區區庸鄙投其旨趣能無疑惑者哉然則大教之興基乎西土騰漢庭而皎夢照東域而流慈昔者分形分跡之時言未馳而成化當常現常隱之世民仰德而知遵及乎晦影歸真遷儀越世金容掩色不鏡三千之光麗象開圖空端四八之相於是微言廣被拯含類於三途遺訓遐宣導㣥生於十地然而真教難仰莫能一其指歸曲學易遵邪正於焉紛糾所以空有之論或習俗而是非大小之乘乍沿時而隆替有元奘法師者法門之領袖也幼懷真敏早悟三空之心長契神情先苞四忍之行松風水月未足比其清華仙露明珠詎能方其朗潤故以智通無纍神測未形超六塵而迥出隻千古而無對凝心內境悲正法之陵遲栖慮元門慨深文之訛謬思欲分條析理廣彼前聞截僞續真開茲後學是以翹心淨土往遊西域乘危遠邁杖策孤征積雪晨飛途閒失地驚沙夕起空外迷天萬里山川撥煙霞而進影百重寒暑躡霜雨而前蹤誠重勞輕求深願達周遊西宇十有七年窮歷道邦詢求正教雙林八水味道餐風鹿苑鷲峯瞻奇仰異承至言於先聖受真教於上賢探賾妙門精窮奧業一乘五律之道馳驟於心田八藏三篋之文波濤於口海爰自所歷之國總將三藏要文凡六百五十七部譯布中夏宣揚勝業引慈雲於西極注法雨於東垂聖教而復全蒼生罪而還福濕火宅之乾焰共拔迷途朗愛水之昏波同臻彼岸是知惡因業墜善以緣升升墜之端惟人所託譬夫桂生高嶺雲露方得泫其花蓮出淥波飛塵不能汙其葉非蓮性自潔而桂質本貞良由所附者高則微物不能纍所憑者淨則濁類不能沾夫以卉木無知猶資善而成善況乎人倫有識不緣慶而求慶方冀茲經流施將日月而無窮斯福遐敷與乾坤而永大朕聞大德曰生大寶曰位辨其上下樹之君臣所以撫育黎元鈞陶庶類自非克明克哲允武允文皇天眷命歷數在躬安可以濫握靈圖叨臨神器是以翠媯薦唐堯之德元圭錫夏禹之功丹字呈祥周開七百之祚素靈表瑞漢啓重世之基由此觀之帝王之業非可以力爭者矣昔隋季板蕩海內分崩先皇以神武之姿當經綸之會斬靈蛇而定王業啓金鏡而握天樞然猶五嶽含氛三光戢耀豺狼尚梗風塵未寧朕以弱冠之年懷慷慨之志思靖大難以濟蒼生躬擐甲胄親當矢石夕對魚鱗之陳朝臨鶴翼之圍敵無大而不摧兵何堅而不碎翦長鯨而清四海掃欃槍而廓八紘承慶天潢登暉璇極襲重光之永業繼寶籙之隆基戰戰兢兢若臨深而馭朽日慎一日思善始而令終汝以幼年偏鍾慈愛義方多闕庭訓有乖擢自維城之居屬以少海之任未辨君臣之禮節不知稼穡之艱難朕每思此為憂未嘗不廢寢忘食自軒昊以降迄至周隋以經天緯地之君纂業承基之主興亡治亂其道煥然所以披鏡前蹤博採史籍聚其要言以為近誡云爾此十二條者帝王之綱安危興廢咸在茲焉古人有云非知之難惟行之不易行之可勉惟終實難是以暴亂之君非獨明於惡路聖哲之主非獨見於善途良由大道遠而難遵邪徑近而易踐小人俯從其易不得力行其難故禍敗及之君子勞處其難不肯安居其易故福慶流之故知禍福無門惟人所召欲悔非於既往惟慎禍於將來當擇哲主為師毌以吾前為鑒取法乎上僅得乎中取法乎中祗為其下自非上德不可效焉吾在位已來所缺多矣奇麗服玩錦繡珠玉不絶於前此非防欲也雕楹刻桷高臺深池每興其役此非儉志也犬馬鷹鶻無遠不致此非節心也數有行幸以亟勞人此非屈己也斯數者吾之深過勿以茲為是而取法焉但我濟育蒼生其益多平定寰宇其功大益多損少人不怨功大過微德未虧然猶之盡美之蹤於焉多愧盡善之道顧此懷慙況女無纖毫之功直緣機而履慶若崇美以廣德則業泰身安若肆情以從非則業傾身喪且成遲敗速者國基也失易得難者天位也可不惜哉可不慎哉夫工書須從師授必先識勢乃可加功功勢既明則務於遲止遲止和矣無繫拘局拘局既亡求諸變態變態云者在乎奮研奮研之理資於狀異狀異之變無溺荒僻荒僻黜矣藉於神彩神彩之至機於元微元微則宏逸無方矣設乃一向規模隨其工拙勢以返覆肥瘦體以踈密齊平放則失之於速留乃至之於遲畏懼生疑否臧不決運用迷於筆前震動惑於手下若此欲造於元微則未之有也皇帝道叶金輪心居黃屋覆燾萬方舟航三界欲使雲和之樂共法鼓而同宣雅頌之聲隨梵音而俱遠乃命鳬氏範茲金錫響合風雷功侔造化騰驤猛虡負簨業而將飛宛轉盤龍繞乘風而如動希聲旦發犍槌夕震莫不傾耳以證無生入神而登正覺圓海有竭福祚無窮方石易銷願力無盡朕歷觀前代讒佞之徒皆國蟊賊巧令朋比暗主庸君莫不迷惑忠臣孝子泣血銜冤故叢蘭欲茂秋風敗之王者欲明讒人蔽之如齊隋閒事斛律明月齊朝良將威震敵國周家每歲斫汾河冰慮齊兵西度及明月被祖孝徵讒搆伏誅周人始有吞齊之心高熲有經國大才為隋文帝贊成霸業知國政者一十餘載天下賴以康寧文帝唯婦言是聽特令擯斥及為煬帝所殺刑政由是衰壞又隋太子勇撫軍監國凡二十年早有定分楊素欺主罔上賊害良民使父子道滅逆亂之源自此開矣隋文既淆混嫡庶竟禍及其身社稷尋亦覆敗古人云代亂則讒勝誠非妄言朕每防萌杜漸用絶讒搆之端猶恐心力所不至或不能覺悟前史云猛獸處山林藜藿為之不採直臣立朝廷奸邪為之寢謀此實朕所望於㣥公也朕比見隋代遺老咸稱高熲善為相者遂觀其本傳可謂公平正直尤識治體隋時安危繫其存歿煬帝無道枉見誅夷何嘗不想見其人廢書歔嘆又漢魏以來諸葛亮為丞相亦甚平直亮嘗表廢廖立李嚴於南中立聞亮卒泣曰吾其左袵矣嚴聞亮卒發病而死故陳壽稱亮之為政開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰卿等豈可不企慕及之朕今每慕前代帝王之善者卿等亦可慕宰相之賢者若如此則榮名高位可以長守古之帝王有興有衰猶朝之有暮皆為蔽其耳目至於滅亡書云可愛非君可畏非民天子有道則人推而為主無道則人棄而不用誠可畏也為政之要務全其本若中國不靜遠夷雖至亦何所益隋煬帝纂祚之初天下強盛棄德窮兵以取顛覆頡利近者足為彊大意既盈滿禍亂斯及喪其大業為臣於朕葉護可汗亦大強盛自恃富貴通使求婚失道怙亂奄至破滅其子既立便肆猜忌衆叛親離覆基絶嗣朕雖不能遠慕堯舜禹湯之德目覩此輩何得不誡懼乎初書之時收視反聽絶慮怡神心正氣和則契於元妙心神不正字則欹斜志氣不和字則顛仆如魯廟之器也又云為點必收貴緊而重為畫必勒貴澀而遲為擎必掠貴險而徑為豎必怒貴戰而雄為戈必潤貴遲凝而右顧為環必郁貴蹙鋒而總轉為波必磔貴三折而遣毫夫字以神為精魄神若不和則字無態度也以心毫為筋骨心若不堅則字無徑健也以副毛為皮膚副若不圓則字無溫潤也所資心副相參用神氣沖和為妙今比重明輕用指腕不如鋒芒用鋒芒不如沖和之氣自然手腕虛則鋒含沈靜夫心合於氣氣合於心神心之用也心必靜而已矣虞安吉云未解書意者一點一畫皆求象本乃轉自取拙豈是書耶縱倣類本體樣奪真可圖其字形未可稱解筆意此乃類乎效顰未入西施之奧室也故其始學得其粗未得其精太緩者滯而無筋太急者病而無骨橫毫側管則鈍慢而肉多豎筆直鋒則乾枯而露骨及其悟也心動而手均圓者中規方者中矩粗而能鋭細而能壯長者不為有餘短者不為不足思與神會同乎自然不知所以然而然矣夫學書者先須知有王右軍絶妙得意處真書樂毅論行書蘭亭草書十七帖勿令有死點畫書之道也學書之難神彩為上形質次之兼之者便到古人以斯言之豈易多得必使心忘於筆手忘於書心手遺情書不妄想要在求之不見考之即彰皇帝臣某敢以元牡昭告皇皇后帝太上皇厭居宸極凝情姑射倦此萬幾釋茲重負人神不可以乏主天序不可以無統歷數有歸猥當寡薄神器有奉用集大命懼忝帝位固辭弗克遂膺大禮臨馭兆民敬元日告類上帝即皇帝位惟祈敷祐萬邦永綏天極臣上蒙穹昊明命中賴宗社餘祉自惟不德濫承寶位既乏元首之能實乖教子之道遂有承乾不軌君集無君元昌懷逆祐亦好亂臣暗昧既彰誡誘多闕負罪引慝慚懼增深謹造庭階躬申拜謝古先帝王爰有征伐堯戰丹浦舜伐有苗文王戡黎成湯征葛此四君者豈樂櫛沐風雨勞師疲衆以為不誅凶殘化不洽不翦暴亂人不安高麗莫離支虐殺其主盡戮大臣自餘黎庶怨入骨髓此等皆力不能制擁在寇城想望朕師若思膏雨高麗滅亡徵兆人誰不見時不可失天不可違朕豈厭重帷而安暴露薄華殿而樂風塵且以弱年行師頗識權變今者士卒咸集戈甲如山衝輣雲梯指影可捷夫農夫勤春乃始有秋士卒先力然後受賞若能齊力一心屠城陷敵高官厚秩朕不食言若敢逋逃違棄營伍厥身從戮罪及妻孥此皆邦國之典刑古今之常事記朕誓言誠宜自勉皇帝菩薩戒弟子稽首和南十方諸佛菩薩聖僧天龍大衆若夫至理凝寂道絶名言大慈方便隨機攝誘濟苦海以智舟朗重昏以慧日開曉度脫不可思議弟子夙罹愆舋早嬰偏罰追維撫育之恩每念慈顏之遠泣血崩心永無逮及號天躃地何所厝身歲月不居炎涼亟改荼毒之痛在乎粉骨敬養已絶方恨不追怨酷之深百身何贖惟以丹誠歸依三寶謹於宏福道場奉施齊供并施淨財以充檀捨用斯功德奉為先靈願心悟無為神遷妙喜策紺馬以入香城躡金階而升寶殿遊玩法樂逍遙淨土永蔭法雲嘗餐甘露疾證菩提早登正覺六道四生並同斯願拳毛黃馬黑喙平劉黑闥時所乘前中六箭背二箭贊曰月精按轡天駟橫行弧矢載戢氛埃廓清其一什伐赤純赤色平世充建德時乘前中四箭背中一箭贊曰瀍㵎未靜斧鉞伸威朱汗騁足青旌凱歸其二白蹄烏純黑色四蹄俱白平薛仁杲時所乘贊曰倚天長劒追風駿足聳轡平隴回鞍定蜀其三特勒驃黃白色喙微黑色平宋金剛時所乘贊曰應策騰空承聲半漢入險摧敵乘危濟難其四颯露紫紫燕騮平東都時所乘前中一箭贊曰紫燕超躍骨騰神駿氣讋山川威凌八陳其五青騅蒼白雜色平竇建德時所乘前中五箭贊曰足輕電影神發天機策茲飛練定我戎衣其六夫興邦建國資懿親以作輔分圭錫社實茂德之攸居非親無以隆基非德無以啓化是知功侔分陝奕葉之慶彌彰道洽留棠傳芳之迹斯在惟神誕靈周室降德酆都疏派天潢分枝璇極經仁緯義履順居貞揭日月以為躬麗高明之質括滄溟而為量體宏潤之資德乃民宗望惟國範故能協隆鼎祚贊七百之宏基光啓維城開一匡之霸業既而今古革運陵壑潛遷雖地盡三分而餘風未泯世移千祀而遺烈猶存元化曠而無名神理幽而靡究故歆祠利禱若存若亡濟世匡民如顯如晦臨汾川而降祉搆仁智以棲神金闕九層鄙蓬萊之已陋玉樓千仞恥崑閬之非奇落月低於桂筵流星起於珠樹若夫崇山亘峙巨鎮參墟襟帶邊方標臨朔土懸崖百丈蔽日虧紅絶嶺萬尋橫天聳翠霞無機而散錦峯非水而開蓮石鏡流輝孤巖宵朗松蘿曳影重谷晝昏碧霧紫煙鬱古今之色元霜絳雪皎冬夏之光其施惠也則和風溽露是生油雲膏雨斯起其至仁也則霓裳鶴蓋息焉飛禽走獸依焉其剛節也則治亂不改其形寒暑莫移其操其大量也則育萬物而不倦資四方而靡窮故以衆美攸歸明祇是宅豈如羅浮之島拔嶺南遷舞陽之山移基北轉夫以挺秀之質而無居常之資故知靈嶽標奇託神威而為固加以飛泉涌砌激石分湍縈氛霧而終清有英俊之貞操任方圓以成像體聖賢之屈伸日注不窮類芳猷之無絶年傾不溢同上德之誡盈陰㵎懷冰春留冬鏡陽巖引溜冬結春苔非疏勒之可方豈瀑布之能擬至如濁涇清渭歲歲同流碧海黃河時時一變夫括地之紀橫天之源不能擇其常莫能殊其操信乃茲泉表異帶仙宇而為珍仰神居之肅清想徽音其如在是以朱輪華轂接軫於壇衢玉帛豐粢連箱於廟闕氤氳靈氣仰之而彌高昭晰神光望之而愈肅潛通元化不爽於錙銖感應明徵有逾於影響惟賢是輔非黍稷之為馨惟德是依豈筐篚之為惠昔有隋昏季綱紀崩淪四海騰波三光戢耀先皇襲千齡之徽號膺八百之先期用竭誠心以祈嘉福爰初鞠旅發迹神祠舉風電以長驅籠天地而遐掩一戎大定六合為家雖膺籙受圖彰於天命而克昌宏業實賴神功故知茫茫萬頃必俟雲雨之澤巍巍五嶽必延塵壤之資雖九穗登年由乎播種千尋聳日本藉崇基然則不雨不雲則有炎枯之害非塵非壤則有傾覆之憂雖立本於自然亦成功而假助豈大寶之獨運不資靈福者乎故無言不讎無德不報所以巡往跡賽洪恩臨汾水而濯心仰靈壇而肅志若夫照車十二連城三五幣帛雲委珍羞山集此乃庸鄙之享恐非明神所歆正當竭麗水之金勒芳猷於不朽盡荊山之王鐫美德於無窮召彼雨師宏茲惠澤命斯風伯揚此清塵使地祇仰德於金門山靈受化於元闕括九仙而警衛擁百神以前驅俾洪威振於六幽令譽光於千載豈若高唐之廟空號朝雲陳倉之祠虛傳夜影式刊芳烈乃作銘云赫赫宗周明明哲輔誕靈降德承文繼武啓慶留名翦桐頒土逸翮孤映清飈自舉藩屏維寧邦家攸序傳暉竹帛降靈汾晉惟德是輔惟賢是順不罰而威不言而信元化潛流洪恩遐振沈沈清廟肅肅靈壇松低羽蓋雲掛仙冠霧筵宵碧霞障晨丹戶花冬桂庭芳夏蘭代移神久地古林殘泉涌湍縈瀉砌分庭非撓可濁非澄自清地斜文直㵎曲流平翻霞散錦倒日澄明冰開一鏡風激千聲既瞻清潔載想忠貞濯茲塵穢瑩此心靈猗歟勝地偉哉靈異日月有窮英聲不匱天地可極神威靡墜萬代千齡芳猷永嗣朕以萬機暇日遊心前史仰六代之高風觀百王之遺跡興亡之運可得言焉每至軒昊之無為唐虞之至治未嘗不留連讚詠不能巳巳及於夏殷末世秦漢暴君使人懍懍然兢懼如履朽薄然人君在上皆欲永享其萬乘之尊以垂百王之後而得失異趣興滅不常者何也蓋短於自見不聞逆耳之言故至於滅亡終身不悟豈不懼哉覩治亂之本源足為明鏡之鑒戒亂未嘗不任不肖治未嘗不任忠賢任忠賢則享天下之福用不肖則受天下之禍臨危之主各師其臣若使覺悟社稷安有危亡之覆特由不留心於任使翻屬意於遨遊豈不哀哉若以遨遊將為任使以任使將為遨遊豈不善哉古人言舜禹不愛於聲不貪於色豫謂不然將為愛也人云桀紂耽於聲色豫將為不好也何以知之桀紂命不終於天年樂不終於一世以此為不好也舜禹壽命於終樂畢於世豫謂之愛也夫人有強躁寬弱之志愁樂貪欲之心思情聰哲之才此乃天命其性有善有不善者也由是觀之堯舜禹湯躬行仁義治致隆平此稟其性善也幽厲桀紂乃為炮烙之刑刳孕婦剖人心斫朝涉脯鬼侯造酒池糟邱為長夜之飲此其受於天不善之性也夫立身之道在乎折衷不在乎偏射吳起曰昔有桑氏之君修德廢武以滅其國有扈氏之君恃衆好勇以喪社稷仲尼曰寬以濟猛猛以濟寬仁義之道猶不得偏何況於左道乎何況於不仁乎為君之道處至極之尊以億兆為心以萬邦為意理人必以文德防邊必以武威孔子曰夫文之所加者深則武之所服者大德之所施者博則威之所制者廣不可以威武安民不可以文德備塞大鯨出水必廢遊波之功鴻鵠沈泥定無淩空之效若使各令遂志不失其能古人云欲搆大廈者先擇匠然後揀材為國家者先擇佐然後定民大匠搆屋必以大材為棟梁以小材為榱橑所有中尺寸之木無棄此善治木者也非獨屋有棟梁國家亦然大德為宰相亦國家之棟梁也豫思三代以來君好仁人必從之在上留心臺榭奇巧之人必至致精遊獵馳騁之人遠臻存意管絃鄭衛多進降懷粉黛燕趙斯來塞切直之路為忠者必少開諂諛之道為佞者必多古人云君猶器也民猶水也方圓在於器不在於水以是而言足為永誡夫玉不琢不成器人不學不知道仲尼師於郯子文王學於虢叔聖人且猶如此何況於凡人者乎治主思賢若農夫之望歲哲后求才若旱苗之思雨亂君疾勝己如讎視不肖如子懷之中心何日暫忘王莽僞行仁義之道有始無終孫晧權施恩惠之風有初無末二子猶膠船之泛巨浪毀在不遙若駑馬之奔千里困其將至古人云升不盛石小智不可謀大巧詐不如拙誠信非謬矣有明主有暗主高祖攝衣於酈生比干剖心於辛紂殷湯則留情於伊尹龍逢則被誅於夏桀楚莊暇隙而懷憂武侯罷朝而含喜暗主護短而永愚明主思短而長善觀高祖殷湯仰其德行譬若陰陽調四時會法令均萬民樂則麒麟呈其祥漢祖殷湯豈非麒麟之類乎觀夏桀商辛嗟其悖惡之甚猶時令不行寒暄失序則猛獸肆毒蟊螟為害夏桀商辛豈非猛獸之儔乎豫以此觀之豈非天道之數也雖曰天時抑亦人事成湯之世有七年之旱翦爪為犧千里降雨太戊之時桑穀生朝懼而修德遂使十有六國重譯而來此豈非人事者也或云為君難或云為君易人君處尊高之位執賞罰之權用人之才用人之力何為不成何求不得此言之實易論之實難何者輕陵天地衆精顯其妖忽慢神靈風雨應其暴是以帝乙有震雷之禍殷紂致飛沙之災多營池觀遠求異寶民不得耕耘女不得蠶織田荒業廢兆庶凋殘見其饑寒不為之哀覩其勞苦不為之感苦民之君也非治民之主也薄賦輕徭百姓家給上無暴令之徵下有謳歌之詠屈一身之欲樂四海之民憂國之主也樂民之君也此其所以為難也且用人之道尤為未易己之所謂賢未必盡善衆之所謂毀未必全惡知能不舉則為失材知惡不黜則為禍始又人才有長短不必兼通是以公綽優於大國之老子産善為小邦之相絳侯木訥卒安劉氏之宗嗇夫利口不任上林之令捨短取長然後為美夫人剛柔之情各異曲直之性不同古今奔馳貴賤不等為上之孝與下豈均上則匡國寧家志存崇禮下則承顏悅色止存敬養虞舜孝也不為慈親所安曾參仁也不為宣尼所善孔子曰子從令者不得為孝臣苟順者不得為忠如斯之類不可不察也逆主耳而履道戮孔懷以安國周公是也順上心而安身隨君情以殺子易牙是也棄己之命安君之身紀信是也挾國謀事以報私讎袁盎是也孑身而執節孤直而自毀屈原是也外顯和睦之端內懷湯火之意宰嚭是也忠諂之道以此觀之足為永鑒白起為秦平趙乃被昭王所殺亞夫定七國之亂卒為景帝所誅文種設策滅吳翻遭越王所戮伍胥竭力為國終罹賜劒之禍乃是君之過也非臣之罪也至若趙高韓信黥布陳豨之儔此則自貽厥釁非君之濫刑也高祖失於存功之能光武獲於置將之妙臣安君社稷之固君處臣危亡之地豈是相酬之道也為天下之君處萬民之上安可易乎背道違禮非惟損己乃為賢人之所笑卑身勵行實為君子又為庸夫之所譏越品進官其類必為深怨偏與人語衆望以為曲私任使賢良則謂偶得委仗庸夫則言愚暗言數則謂太繁辭寡則講道薄恣情忿怒則朝野戰栗留心寬恕則法令不行民樂則官苦官樂則民勞四海之內莫非王土要荒為枝葉畿內乃根本古人云皮之不存毛將安傅當使本固根深委之內相而伊尹傅說人所希逢至如鎮積冰之塞守飛雪之邊而魏尚李牧當今罕遇遣人遠撫則眷戀而不忍愍而不遣則枝葉落而不存二宜之閒致心何所是用晨興夕惕無忘斯事為上猶然何況臣下易云書不盡言言不盡意今略陳梗概以示心之所存耳古語云勞者必歌其事朕非故煩翰墨以見文藻但學以為己聊書所懷想遠見㣥賢不以為嗤也古有胎教世子朕則不暇但近自建立太子遇物必誨諭見其臨食將飯謂曰汝知飯乎對曰不知凡稼穡艱難皆出人力不奪其時常有此飯見其乘馬又謂曰汝知馬乎對曰不知能代人勞苦者也以時消息不盡其力則可以常有馬也見其乘舟又謂曰汝知舟乎對曰不知曰舟所以比人君水所以比黎庶水能載舟亦能覆舟爾方為人主可不畏懼見其依於曲木之下又謂曰汝知此樹乎對曰不知曰此木雖曲得繩則正為人君雖無道受諫則聖此傅說所言可以自鑑聖哲之所尚者孝也仁人之所愛者親也朕幼荷鞠育之恩長蒙撫養之訓蓼莪之念何日忘之罔極之情昊天匪報昔子路歎千鍾之無養虞邱嗟二親之不待方寸亂矣信可悲夫朕每痛一月之中再罹艱疚興言永慕哀切深衷欲報靡因唯資冥助敬以絹二百匹奉慈悲大道儻至誠有感冀銷過去之愆為善有因庶獲後緣之慶夫忠烈盡世往賢明軌亡身殉國先哲良規惟爾等心包鐵石志列風霜勇氣雄圖衝冠裂眥懷忠立節重義輕生奮劒提戈摧城陷陳冒鋒刃而不顧赴湯火而如歸殞命戰場殘形寇壘膏潤原野身喪名存搖落寒關遂非生入蒼茫雪野無復餘蹤涉出塞之前途掩靈櫬而反骨歌陽春之往路黯長夜之歸魂山川宛其不殊存亡颯焉非昔然則身者今之所重名者後之所貴身乃常有而愚夫怯焉功則難立惟烈士成焉若以一生之短期收千載之令譽此聖賢之操也豈直忠勇者乎所以按轡停輿撫膺一慟嘉乃誠節痛爾遺靈酒俎既陳魂其斯享嗣天子某祚繼鴻業君臨㝢縣夙興旰食無忘於政導德齊禮愧於前修天有成命表瑞貞石文字昭然歷數唯永既旌高廟之業又錫眇身之祚逮於皇太子治亦降貞符紀其姓氏列於石言仰瞻睿漢空銘大造顧惟寡薄彌增寅懼敢因大禮重薦玉帛上謝明靈之貺以申祗栗之誠皇太子治亦恭至泰壇虔拜於蒼昊庶憑眷佑之德永膺無疆之休維大唐貞觀十九年以太牢之奠敬祭於恆嶽之靈次蒼蒼元氣紀三光而成象茫茫后土鎮五嶽以成形衡岱啓東南之址嵩華表西中之固惟靈山之秀峙亘朔野而標奇獸嘯龍騰風雨之所吐納霓裳鶴蓋神仙之所往還謺嶂參差凝煙含翠重岡紛糾照日分紅絶壁千尋孤峯萬仞桂華侵月松蘿挂雲幽㵎冬暄飛泉夏冷寶符臨代邦之美靈蛇表陳勢之奇鑠石七年無以虧其大含波七載不能損其高巍巍乎與乾坤而永固隱隱乎橫古今而不絶屬以授旗趙郊誓師冀土敢薦牲王惟神饗之朕與卿義重君臣道符冥契鱗波順乎風勢早啓沃乎朕心如何一朝奄成異代眷言疇昔用切深衷自幽明一謝將歷數旬尚同城闕之閒想遊魂其如近今既丹旐戒路歸骨窮泉望隔邱野之中思令德而方遠凝哀笳於晨路引嘶驂於夜臺嗟爾世之長辭結余心之永恨追懷前賞極宴終娛豈謂樂情迥成悲緒酒有千日之號人無再飲之期昔臨膳以增歡今撫杯而益慟故遣陳茲饗禮以寄曩懷魂如有靈歆我哀饌道喪時昏姦邪并用暴君虐主正直難居雖識鑒存亡詎遣凶殘之纍智周萬物不離顛沛之閒然則大廈將崩非一木之能正天道去矣豈一賢之能全奮不顧身有死無二蹈斯節者罕有其人所以悽愴風煙靡尋餘跡暄涼邱壟空有其名雖古今殊塗年代冥寞式遵故實爰贈太師諡忠烈公清酌少牢以陳薄禮游魂髣佛昭此嘉誠夫大德曰生資二儀以成化大寶曰位應五運而遞昌貴賤廢興莫非天命故龍顏日角顯帝王之符電影虹光表乾坤之瑞不可以智競不可以力爭昔漢室豆分㣥雄嶽立夫民離政亂安之者哲人德喪時危定之者賢輔伊尹之臣殷室王道昏而復明霍光之佐漢朝皇綱否而還泰立忠履節爰在於斯帝以雄武之姿當艱難之運棟梁之任同乎曩時匡正之功異於往代觀沈溺而不拯視顛覆而不持乖徇國之情有無君之跡既而三分肇慶黃星之應久彰卜主啓期真人之運斯屬其天意也豈人事乎數年來每有征動雖復事非為已猶恐下有怨咨所以廢甘泉之遊履燋金之弊寧可違涼忍暑不能適已勞民想汝誠心惟吾是念自非孝情深結孰能以此為懷省書潸然益增感念善自將愛遣此不多哥哥敕
