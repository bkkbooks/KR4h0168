front:
  text: 全唐文欽定全唐文卷一百四十魏徵二
  hash: sha256:9fcb2afe0f26bbe0bc692003de057da88051cb7e05ca2dcbf49dc56f06e7cb06
body:
  text: 今發使以立可汗為名可汗未定即詣諸國市馬彼必以為意在市馬不為專立可汗可汗得立則不甚懷恩不得立則以為深怨諸蕃聞之必不重中國馬市既不可得縱得馬亦還路無從但使彼國安寧則諸國之馬不求自至矣昔漢文帝有獻千里馬者曰吾吉行日三十凶行日五十鑾輿在前屬車在後吾獨乘千里馬將安之乎乃償其道路所費而返之又光武有獻千里馬及寶劒者以馬駕鼓車劒以賜騎士今陛下凡所施為皆邈於三王之上柰何至此欲為孝文光武之下乎又魏文帝求市西域大珠蘇則曰若陛下惠及四海則珠不求自至求而得之不足貴也陛下縱不能慕漢文之高行可不畏蘇則之言乎陛下為人父母撫愛百姓當憂其所憂樂其所樂自古有道之主以百姓之心為心故君處臺榭則欲民有棟宇之安食膏粱則欲民無饑寒之患顧嬪御則欲民有室家之歡此人主之常道也今鄭氏之女久已許人陛下取之不疑無所顧問播之四海豈為人父母之義乎臣傳聞雖或未的然恐虧損聖德情不敢隱君舉必書所願特留神慮臣觀自古帝王受圖定鼎皆欲傳之萬代貽厥孫謀故其垂拱巖廊布政天下其語道也必先淳樸而抑浮華其論人也必貴忠良而鄙邪佞言制度也則絕奢靡而崇儉約談物產也則重穀帛而賤珍奇然受命之初皆遵之以成治稍安之後多反之而敗俗其故何哉豈不以居萬乘之尊有四海之富出言而莫已逆所為而人必從公道溺於私情禮節虧於嗜欲故也語曰非知之難行之惟難非行之難終之斯難斯言信矣伏惟陛下年甫弱冠大拯橫流削平區宇肇開帝業貞觀之初時方克壯抑損嗜欲躬行節儉內外康寧遂臻至治論功則湯武不足方語德則堯舜未為遠臣自擢居左右十有餘年每侍帷幄屢奉明旨常許仁義之道守之而不失儉約之志終始而不渝一言興邦斯之謂也德音在耳敢忘之乎而頃年已來稍乖曩志敦樸之理漸不克終謹以所聞列之如左陛下貞觀之初無為無欲清靜之化遠被遐荒考之於今其風漸墮聽言則遠超於上聖論事則未踰於中主何以言之漢文晉武俱非上哲漢文辭千里之馬晉武焚雉頭之裘今則求駿馬於萬里市珍奇於域外取怪於道路見輕於戎狄此其漸不克終一也昔子貢問理人於孔子孔子曰懍乎若朽索之馭六馬子貢曰何其畏哉子曰不以道遵之則吾讎也若何其無畏故書曰民惟邦本本固邦寧為人上者柰何不敬陛下貞觀之始視人如傷恤其勤勞愛民猶子每存約無所營為頃年已來意在奢縱忽忘卑儉輕用人力乃云百姓無事則驕逸勞役則易使自古已來未有由百姓逸樂而致傾敗者也何有逆畏其驕逸而故欲勞役者哉恐非興邦之至言豈安人之長算此其漸不克終二也陛下貞觀之初損己以利物至於今日縱欲以勞人卑儉之迹歲改驕奢之情日異雖憂人之言不絕於口而樂身之事實切於心或時欲有所營慮人致諫乃云若不為此不便我身人臣之情何可復爭此直意在杜諫者之口豈曰擇善而行者乎此其漸不克終三也立身成敗在於所染蘭芷鮑魚與之俱化慎乎所習不可不思陛下貞觀之初砥礪名節不私於物唯善是與親愛君子踈斥小人今則不然輕褻小人禮重君子重君子也敬而遠之輕小人也狎而近之近之則不見其非遠之則莫知其是莫知其是則不閒而自踈不見其非則有時而自昵昵近小人非致理之道踈遠君子豈興邦之義此其漸不克終四也書曰不作無益害有益功乃成不貴異物賤用物人乃足犬馬非其土性不畜珍禽奇獸弗育於國陛下貞觀之初動遵堯舜捐金抵璧反樸還淳頃年已來好尚奇異難得之貨無遠不臻珍玩之作無時能止上好奢靡而望下敦樸未之有也末作滋興而求豐實其不可得亦已明矣此其漸不克終五也貞觀之初求賢如渴善人所舉信而任之取其所長恒恐不及近歲已來由心好惡或衆善舉而用之或一人毀而棄之或積年任而用之或一朝疑而遠之夫行有素履事有成跡所毀之人未必可信於所舉積年之行不應頓失於一朝君子之懷蹈仁義而宏大德小人之性好讒佞以為身謀陛下不審察其根源而輕為之臧否是使守道者日踈干求者日進所以人思苟免莫能盡力此其漸不克終六也陛下初登大位高居深視事惟清靜心無嗜欲內除畢弋之物外絕畋獵之源數載之後不能固志雖無十旬之逸或過三驅之禮遂使盤遊之娛見譏於百姓鷹犬之貢遠及於四夷或時教習之處道路遙遠侵晨而出入夜方還以馳騁為歡莫慮不虞之變事之不測其可救乎此其漸不克終七也孔子曰君使臣以禮臣事君以忠然則君之待臣義不可薄陛下初踐大位敬以接下君恩下流臣情上達咸思竭力心無所隱頃年已來多所忽略或外官充使奏事入朝思覩闕庭將陳所見欲言則顏色不接欲請又恩禮不加閒因所短詰其細過雖有聰辯之略莫能申其忠款而望上下同心君臣交泰不亦難乎此其漸不克終八也傲不可長欲不可縱樂不可極志不可滿四者前王所以致福通賢以為深誡陛下貞觀之初孜孜不怠屈巳從人恒若不足頃年已來微有矜放恃功業之大意蔑前王負聖智之明心輕當代此傲之長也欲有所為皆取遂意縱或抑情從諫終是不能忘懷此欲之縱也志在嬉遊情無厭倦雖未全妨政事不復專心治道此樂將極也率土乂安四夷款服仍遠勞士馬問罪遐裔此志將滿也親狎者阿旨而不肯言踈遠者畏威而莫敢諫積而不已將虧聖德此其漸不克終九也昔陶唐成湯之時非無災患而稱其聖德者以其有始有終無為無欲遇災則極其憂勤時安則不驕不逸故也貞觀之初頻年霜旱畿內戶口並就關外攜負老幼來往數千曾無一戶逃亡一人怨苦此誠由識陛下矜育之懷所以至死無攜貳頃年已來疲於徭役關中之人勞弊尤甚雜匠之徒下日悉留和雇正兵之輩上番多別驅使和市之物不絕於鄉閭遞送之夫相繼於道路既有所弊易為驚擾脫因水旱穀麥不收恐百姓之心不能如前日之寧帖此其漸不克終十也臣聞禍福無門唯人所召人無釁焉妖不妄作伏惟陛下統天御㝢十有三年道洽寰中威加海外年穀豐稔禮教聿興比屋喻於可封菽粟同於水火暨乎今歲天災流行炎氣致旱乃遠被於郡國凶醜作孽忽近起於轂下夫天何言哉垂象示誡斯誠陛下驚懼之辰憂勤之日也若見誡而懼擇善而從同周文之小心追殷湯之罪已前王所以致理者勤而行之今時所以敗德者思而改之與物更新易人視聽則寶祚無疆普天幸甚何禍敗之有乎然則社稷安危國家理亂在於一人而已當今太平之基既崇極天之峻九仞之積猶虧一簣之功千載休期時難再得明王可為而不為微臣所以鬱結而長歎者也臣誠愚鄙不達事機略舉所見十條輒以上聞聖聽伏願陛下採臣狂瞽之言參以芻蕘之議冀千慮一得衮職有補則死日生年甘從斧鉞臣聞為人君者在乎善善而惡惡近君子而遠小人善善明則君子進矣惡惡著則小人退矣近君子則朝無粃政遠小人則聽不私邪小人非無小善君子非無小過君子小過則白玉之微瑕小人小善乃鉛刀之一割鉛刀一割良工之所不重小善不足以掩衆惡也白玉微瑕善賈之所不棄小疵不足以妨大美也善小人之小善謂之善善惡君子之小過謂之惡惡此則蒿蘭同嗅玉石不分屈原所以沈江卞和所以泣血者也既識玉石之分又辨蒿蘭之嗅善善而不能進惡惡而不能去此郭氏所以為墟史魚所以遺恨者也陛下聰明神武天姿英睿志存汎愛引納多途好善而不甚擇人疾惡而未能遠佞又出言無隱疾惡太深聞人之善或未全信聞人之惡以為必然雖有獨見之明猶恐理或未盡何則君子揚人之善小人訐人之惡聞惡必信則小人之道長矣聞善或疑則君子之道消矣為國家者急於進君子而退小人乃使君子道消小人道長則君臣失序上下否隔亂亡不卹將何以求治且世俗常人心無遠慮情在告訐好言朋黨夫以善相成謂之同德以惡相濟謂之朋黨今則清濁並流善惡無別以告訐為誠直以同德為朋黨以之為朋黨則謂事無可信以之為誠直則謂言皆可取此君恩所以不結於下臣忠所以不達於上大臣不能辨正小臣莫之敢論遠近承風混然成俗非國家之福非為治之道適足以長奸邪亂視聽使人君不知所信臣下不得相安若不遠慮深絕其源則後患未之息也今之幸而未敗者由乎君有遠慮雖失之於始必得之於終故也若時逢少隳往而不返雖欲悔之必無所及既不可以傳諸後嗣復何以垂法將來且夫進善黜惡施於人者也以古作鑒施於己者也鑒貌在乎止水鑒己在乎哲人能以古之哲王鑒於己之行事則貌之妍媸宛然在目事之善惡自得於心無勞司過之史不假芻蕘之議巍巍之功日著赫赫之名彌遠為人君者可不務乎突厥自古至今未有如斯之破敗者也此是上天勦絕宗廟神武且其世寇中國百姓寃讐陛下以其為降不能誅滅即宜遣發河北居其舊土匈奴人面獸心非我族類強必寇盜弱則卑服不顧恩義其天性也秦漢患其若是故時發猛將以擊之收以為郡縣陛下柰何以內地居之且今降者幾至十萬數年之後滋息過倍居我肘腋用邇王畿心腹之疾將為後患尤不可河南處也晉代有魏時胡部落分居近郡平吳已後郭欽江統勸武帝逐出塞外不用其言遣居河南數年之後遂傾瀍洛前代覆車殷鑒不遠陛下必用彥博言遣居河南所謂養獸自遺患也臣伏見八月九日詔書率土皆給復一年老幼相歡式歌且舞在路又聞有勅丁巳配役即令役滿折造餘物亦遣輸了待至明年總為準折道路之人咸失所望此誠平分萬姓均同七子然下民難與圖始日用不知皆謂以國家追悔前言二三其德臣竊聞之天之所輔者仁人之所助者信今陛下初膺大寶億兆觀德始發大號便有二言生八表之疑心失四時之大信縱國家有倒懸之急猶必不可為況以泰山之安而輒行此事為陛下為此計者於財利則小益於德義則大損臣誠智識淺短竊為陛下惜之伏願少覽臣言詳擇利益冒昧之罪臣所甘心自豫章公主薨逝陛下久著素服㣥情悚慄咸不自寧臣聞古之王者絕於期服此乃前書典禮列代舊章陛下發上聖之慈深下流之慟素服以來遂經旬月悼往之義足為加隆伏願割無已之痛從先王之禮改御常服以副㣥下之心臣濫蒙重任不敢寢默元齡王珪俱是國家重臣並以忠正任使其所考者既多或一兩人不當祗是見有左右終非心有阿私若即推繩不相信任此事便不可信何以堪當重委假令錯謬有實未足虧損國家窮鞫若虛失委大臣之體且萬紀每日常在考堂必有乖違足得論正當時鑒見一無陳說身不得考方始糾彈徒發上嗔怒非是誠心為國無益於上有損於下所惜傷於政體不敢有所阿黨臣聞採尺璧者棄其微瑕錄大功者不論細過西行諸將雖無大功君集萬均克平寇亂不辱國命跋涉艱阻來往二年考其勤勞與在家者不異即使人無怨讟亦不可勸勉將來臣愚以謂西行諸將君集萬均已外五品已上有功勳無罪殿者其考請更斟酌匪惟一事得所足以勸後人也帝王所重在乎定君臣明父子正夫婦三者不亂然後內外安寧比見弟子陵師奴婢忽主下多輕上皆有為而來漸不可長又帝王大如天地信如四時諸葛亮小國之臣猶能開誠心布公道今之為政未能平心亦虧公道心所愛則雖僻不以為非心所嫌則雖正不以為是今每發言常疾私相請託或至小事自所未免上為下效理必然也臣聞道德之厚莫尚於軒唐仁義之隆莫彰於舜禹欲繼軒唐之風將追舜禹之跡必鎮之以道德宏之以仁義舉善而任之擇善而從之不擇善任能而委之俗吏既無遠度必失大體惟奉三尺之律以繩四海之人欲求垂拱無為不可得也故聖哲君臨移風易俗不資嚴刑峻法在仁義而已故非仁無以廣施非義無以正身惠下以仁正身以義則其政不嚴而理其教不肅而成矣然則仁義理之本也刑罰理之末也為理之有刑罰猶執御之有鞭策也人皆從化而刑罰無所施馬盡其力則有鞭策無所用由此言之刑罰不可致理亦已明矣故濳夫論曰人君之理莫大於道德教化也民有性有情有化有俗情性者心也本也俗化者行也末也是以上君撫世先其本而後其末順其心而履其行心情苟正則姦慝無所生邪意無所載矣是故上聖無不務理民心故曰聽訟吾猶人也必也使無訟乎道之以禮務厚其性而泯其情民相愛則無相傷害之意動思義則無畜姦邪之心若此非律令所理也此乃教化之所致也聖人甚尊德禮而卑刑罰故舜先勅契以敬敷五教而後任咎繇以五刑也凡立法者非以司民短而誅過誤也乃以防姦惡而救禍患檢淫邪而內正道民蒙善化則人有士君子之心被惡政則人有懷姦亂之慮故善化之養民猶工之為麴豉也六合之民猶一廕也黔首之屬猶荳麥也變化云為枉將者耳遭良吏則懷忠信而履仁厚遇惡吏則懷姦邪而行淺薄忠厚積則致太平淺薄積則致危亡是以聖帝明王皆敦德化而薄威刑也德者所以循已也威者所以理人也民之生也猶鑠金在爐方圓薄厚隨鎔制耳是故世之善惡俗之薄厚皆在於君世之主誠能使六合之內舉世之人感忠厚之情而無淺薄之惡各奉公正之心而無姦險之慮則醇釅之俗復見於茲矣後王雖未能遵專尚仁義當慎刑卹典哀敬無私故管子曰聖君任法不任智任公不任私故王天下理國家貞觀之初志存公道人有所犯一一於法縱臨時處斷或有輕重但見臣下執論無不忻然受納民知罪之無私故甘心而不怨臣下見言無忤故盡力以效忠頃年已來意漸深刻雖開三面之網而察見川中之魚取捨枉於愛憎輕重由乎喜怒愛之者罪雖重而強為之辭惡之者過雖小而深探其意法無定科任情以輕重人有執論疑之以阿偽故受罰者無所控告當官者莫敢正言不服其心但窮其口欲加之罪其無辭乎又五品已上有犯悉令曹司聞奏本欲察其情狀有所哀矜今乃曲求小節或重其罪使人攻擊惟恨不深事無重條求之法外所加十有六七故頃年犯者懼上聞得付法司以為多幸告訐無已窮理不息君私於上吏姦於下求細過而忘大體行一罰而起衆姦此乃背公平之道乖泣辜之意欲其人和訟息不可得也故體論云夫淫泆盜竊百姓之所惡也我從而刑罰之雖過乎當百姓不以我為暴者公也怨曠饑寒亦百姓之所惡也遁而陷之法我從而寬宥之百姓不以我為偏者公也我之所重百姓之所憎也我之所輕百姓之所憐也是故賞輕而勸善刑省而禁姦由此言之公之於法無不可也過輕亦可私之於法無可也過輕則縱姦過重則傷善聖人之於法也公矣然猶懼其未也而救之以化此上古所務也後之理獄者則不然未訊罪人則先為之意及其訊之則驅而致之意謂之能不探獄之所由生為之分而上求人主之微旨以為制謂之忠其當官也能其事上也忠則名利隨而與之驅而陷之欲望道化之隆亦難矣凡聽訟理獄必原父子之親立君臣之義權輕重之序測淺深之量悉其聰明致其忠愛疑則與衆共之疑則從輕者所以重之也故舜命咎繇曰汝作士惟刑之恤又復加之以三訊衆所善然後斷之是以為法參之人情故傳曰小大之獄雖不能察必以情而世俗拘愚苛刻之吏以為情也者取貨者也立愛憎者也右親戚者也陷怨讐者也何世俗小吏之情與夫古人之懸遠乎有司以此情疑之㣥吏人主以此情疑之有司是君臣上下通相疑也欲其盡忠立節難矣凡理獄之情必本所犯之事以為主不嚴訊不旁求不貴多端以見聰明故律正其舉劾之法參伍其辭所以求實也非所以飾實也但當參伍明聽之耳不使獄吏鍜鍊飾理成辭於手孔子曰古之聽獄求所以生之也今之聽獄求所以殺之也故析言以破律任案以成法執左道以必加也又淮南子曰豐水之深十仞金鐵在焉則形見於外非不深且清而魚鼈莫之歸也故為上者以苛為察以功為明以刻下為忠以訐多為功譬猶廣革大則大矣裂之道也夫賞宜從重罰宜從輕君居其厚百王通制刑之輕重恩之厚薄見思與見疾其可同日言哉且法國之權衡也時之準繩也權衡所以定輕重準繩所以正曲直今作法貴其寬平罪人欲其嚴酷喜怒肆志高下在心是則捨準繩以正曲直棄權衡而定輕重者也不亦惑哉諸葛孔明小國之相猶曰吾心如稱不能為人作輕重況萬乘之主當可封之日而任心棄法取怨於人乎又時有小事不欲人聞則暴作威怒以弭謗議若所為是也聞於外其何傷若所為非也雖揜之何益故諺曰欲人不知莫若不為欲人不聞莫若勿言為之而欲人不知言之而欲人不聞此猶捕雀而揜目盜鐘而揜耳者祗以取誚將何益乎臣又聞之無常亂之國無不可理之民者夫君之善惡由乎化之薄厚故禹湯以之理桀紂以之亂文武以之安幽厲以之危是以古之哲王盡已而不以尤人求身而不以責下故曰禹湯罪己其興也勃焉桀紂罪人其亡也忽焉為之無己深乖惻隱之情實啟姦邪之路溫舒恨於曩日臣亦欲惜所不用非所不聞也臣聞堯有敢諫之鼓舜有誹謗之木湯有司過之史武有戒慎之銘此則聽之於無形求之於未有虛心以待下庶下之情達上上下無私君臣合德者也魏武帝云有德之君樂聞逆耳之言犯顏之諍親忠臣厚諫士斥讒慝遠佞人者誠欲全身保國遠避滅亡者也凡百君子膺期統運縱未能上下無私君臣合德可不全身保國遠避滅亡乎然自古聖哲之君功成事立未有不資同心予違汝弼者也昔在貞觀之初側身勵行謙以受物蓋聞善必改時有小過引納忠規每聽直言喜形顏意故凡在忠烈咸竭其辭自頃年海內無虞遠夷攝服志色盈滿事異厥初高談疾邪而喜聞順旨之說空論忠讜而不悅逆耳之言私嬖之徑漸開至公之道日塞往來行路咸知之矣邦之興衰實由斯道為人上者可不勉乎臣數年已來每奉明旨深懼㣥臣莫肯盡言臣切思之自比來人或上書事有得失惟見述其所短未有稱其所長又天居自高龍鱗難犯在於造次不敢盡言時有所陳不能盡意更思忠竭其道無因且所言當理未必加於寵秩意或乖忤將有恥辱隨之莫能盡節實由於此雖左右近侍朝夕階墀事或犯顏咸懷顧望況䟽遠不接將何以極其忠款哉又時或宣言云臣下見事祗可來道何因所言即望我用此乃拒諫之辭誠非納忠之意何以言之犯主嚴顏獻可替否所以成主之美匡主之過若主聽則惑事有不行使其盡忠讜之言竭股肱之力猶恐臨事恐懼莫肯效其誠款若如明詔所道便是許其面從而又責其盡言進退將何所據欲必使乎致諫在乎好之而已故齊桓好服紫而合境無異色楚王好細腰而後宮多餓死夫以耳目之玩人猶死而不違況聖明之君求忠正之士千里斯應信不為難若徒有其言而內無其實欲其必至不可得也伏見勅旨令魏王泰移居武德殿此殿在內處所寬閒參奉往來極為便近但魏王既是愛子陛下嘗欲其安全每事抑其驕奢不處嫌疑之地今移此殿便在東宮之西海陵昔居時人以為不可雖時殊事異猶恐人之多言又王之本心亦不安息既能以寵為懼伏願成人之美明早是朔日或恐未得面陳愚慮有疑不敢寧寢輕干聽覽追深戰慄
