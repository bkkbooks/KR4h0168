front:
  text: 全唐文欽定全唐文卷一百八十三王勃七
  hash: sha256:d864fbb643e59add2ebed39bd432ba61b77c48de22e119a493258457429f5ff5
body:
  text: 受訓椒殿承輝桂閾資父事君自家刑國孝惟忠本忠隨孝得履薄臨深惟王之則列藩好德清修互起峻局剛情中孚素履道契元極芳圖青史為善不同同歸於美榮分上邸業盛文場爭開寶札競聳雕章氣淩雲漢字挾風霜後之來者其在君王榮開社稷業照旗常是恢藩化或固朝章功成道洽身沒名揚唯忠與孝千載生光奔霆易駭巨壑難遊主明臣直撫類相求道行言用性逸神休吁嗟盛軌從善如流功惟應物業貴逢時君王樂道上客含詞情起月肆興入煙逵文林辨囿何代無之列后雲騰英童霧躍年妙識遠理豐詞約寵照玉旗文先銅爵勿疏小善方恢大略寵榮有極恭沖是守軸碎㣥毛金銷衆口全忠衛國順時藏垢周之宗盟異姓為後具覽藩猷遐窺國篆罕兼百行多褎一善履忠存性慎終思遠生榮死哀身沒名顯述夫帝車南指遁七曜於中階華蓋西臨藏五雲於太甲雖復星辰蕩越三元之軌躅可尋雷雨沸騰六氣之經綸有序然則撫銅渾而觀變化則萬象之動不足多也握瑤鏡而臨事業則萬機之湊不足大也故知功有所服龜龍不能謝鱗介之尊器有所歸江漢不能竊朝宗之柄是以朱陽登而九有照紫泉清而萬物覩粵若皇靈草昧風驪受河洛之圖帝象權輿雲鳳錫乾坤之瑞高辛堯舜氏沒大夏殷周氏作達其變遂成天下之文極其數遂定天下之象衣冠度律隨鼎器而重光玉帛謳歌反宗禋而大備洎乎三川失御九服蒙塵俎豆喪而王澤竭鐘鼓衰而頌聲寢召陵高會諸侯輕漢水之威踐土同盟天子窘河陽之召三微制度乘戰道而橫流千載英華與王風而掃地大業不可以終喪彞倫不可以遂絶由是山河眹兆素王開受命之符天地氤氳元聖舉乘時之策興九圍之廢典振六合之頽綱有道存焉斯文備矣夫子姓孔氏諱邱字仲尼魯國鄒人也帝天乙之靈苗宋微子之洪緒自元禽翦夏俘寶玉於南巢白馬朝周載旌旗於北面五遷神器琮璜高列帝之榮三命雄圖鍾鼎冠承家之禮商邱誕睿下屬於防山泗水載靈遙馳於汶上禮樂由其委輸人儀所以來蘇排禍亂而搆乾元掃荒屯而樹真宰聖人之大業也若乃承百王之丕運總千聖之殊姿人靈昭有作之期嶽瀆降非常之表珠衡玉斗徵象緯於天經虎踞龍蹲集風雲於地紀亦猶三階瞰月恆星知太紫之宮八柱衝霄㣥嶺辨中黃之宅聖人之至象也若乃順時而動用晦而明紆聖哲於常師混波流於下問太陽亭午收爝火於丹衡滄浪浮天控涓涔於翠渚西周捧袂仙公留紫氣之書東海摳衣郯子敘青雲之秩接輿非聖詢去就於狂歌童子何知屈炎涼於詭問聖人之降迹也若乃參神揆訓録道和倪辱太白於中都絆乘黃於下邑湛無為之迹而衆務同並馳不言之化而㣥方取則雖復霓旌羽斾齊人張夾谷之威八佾三雍桓氏逼公宮之制洎乎歷階而進宣武備而斬俳優推義而行肅刑書而誅正卯用能使四方知罪爭歸舊好之田三家變色願執陪臣之禮聖人之成務也若乃乘機動用歷聘棲遑神經幽顯志大宇宙東西南北推心於暴亂之朝恭儉溫良授手於危亡之國道之將行也命道之將廢也命歸齊去魯發浩歎於衰周厄宋圍陳奏悲歌於下蔡聖人之救時也若乃筐篚六藝笙簧五典折旋洙泗之間探賾唐虞之際三千弟子攀睿化而升堂七十門人奉洪規而入室從周定禮憲章知損益之源反魯裁詩雅頌得絃歌之旨備物而存道下學而上達援神敘教降赤製於南宮運斗陳經動元符於北洛聖人之立教也若乃觀象設教法三百八十四爻四十有九窮神知化應萬一千二百五十策五十有五成變化而行鬼神觀陰陽而倚天地以鼓天下之動以定天下之疑索衆妙於重元纂㣥微於太素聖人之讚易也若乃靈襟不測睿視無涯石砮昭集隼之庭土缶驗羵羊之井稽山南望識皓骨於封禺蠡澤東浮考丹萍於夢渚麟圖鑒遠金編題佐漢之符鳳德鉤深玉策筮亡秦之兆聖人之觀化也時義遠矣能事畢矣然後拂衣方外脫屣人間奠楹興夕夢之災負杖起晨歌之迹撓虹梁於大厦物莫能宗摧日觀於魯邱吾將安仰明均兩曜不能遷代謝之期序合四時不能革盈虛之數適來夫子時也適去夫子順也為而不有用九五而長驅成而勿居撫雲霓而高視聖人之應化也自四教遠而微言絶十哲喪而大義乖九師爭大易之門五傳列春秋之輻六體分於楚晉四始派於齊韓淹中之妙鍵不追稷下之高風代起百家騰躍攀戶牖而同歸萬匹驅馳仰陶鈞而共貫猶使絲簧金石長懸闕里之堂荊棘蓬蒿不入昌平之墓聖人之遺風也導揚十聖光被六虛乘素履而保安貞垂黃裳而獲元吉故能貴而無位履端於太極之初高而無名布政於皇王之首千秋所不能易百代所不能移萬乘資以興衰四海由其輕重雖復質文交映瞻禴祀而長存金火遞遷奉琴書而罔絶蓋易曰觀乎人文以化成天下又云聖人以神道設教而萬物服焉豈古之聰明睿智神武而不殺者夫國家襲宇宙之淳精據明靈之寶位高祖武皇帝以黃旗問罪杖金策以勞華夷太宗文皇帝以朱翟承天穆玉衡而正區宇皇上宣祖宗之纍洽奉文武之重光稽歷數而坐明堂陳禮容而謁太廟八神齊饗停旒太史之宮六辨同和駐蹕華胥之野文物隱地聲名動天樂繁九俗禮盛三古冠帶混並之所書軌八紘閭閻兼匝之鄉煙火四極竭河追日夸父力盡於楹間越海陵山豎亥塗窮於廡下薰腴廣被景貺潛周乾象著而常文清坤靈滋而衆寶用溢金膏於紫洞雨露均華栖玉燭於元都風雷順軌丹蓂翠菌藻繪軒庭鳳彩龍姿激揚池籞殊徵肸蠁不召而自至茂祉昭彰無幽而不洽雖復帝臣南面降衢室而無為岱畎東臨陟名山而有事靈命不可以辭也大典不可以推也由是六戎宵警橫紫殿而摐金五校晨驅蹴元雲而噴玉星羅海運嶽鎮川渟登碧墠而會神祗御元壇而禮天地金箱玉册益睿算於無疆玳檢銀繩著靈機於不竭功既成矣道既貞矣歷先王之舊國懷列聖之遺塵翔赤驥而下云亭吟翠虬而望鄒魯泗濱休駕杳疑汾水之陽尼岫凝鑾暫似洞山之典乃下詔曰可追贈太師託鹽梅於異代鼎路生光寄舟楫於同時泉塗改照咸亨元年又下詔曰宣尼有縱自天體膺上哲合兩儀之簡易為億載之師表顧唯寢廟義在欽崇如聞諸州縣孔子廟堂及學館有破壞並向來未造生徒無肄業之所先師闕奠祭之儀久致飄零深非敬本宜令諸州縣官司速加營葺成都縣學廟堂者大唐龍朔三年鄉人之所建也爾其州分化鳥境屬蹲鴟縈錦室於中區託銅梁於古地玉輪斜界神龍蟠沮澤之雲石鏡遙臨寶馬蹀禺山之影天帝會昌之國上照乾維英靈秀出之鄉傍清地絡庠序由其糾合纓辨所以會同文翁之景化不渝智士之風猷自遠於是雙川舊老攀帝獎而翹心三蜀名儒想成均而變色探周規於舊宅詢漢制於新都開基於四會之足廠田坴授矩於三農之隙土階無級就擊壤於新歡茅茨不翦易層巢於故事莊壇文杏即架椽欒夾谷幽蘭爰疏戶牖儀形莞爾似聞沂水之歌列侍誾如若奉農山之對緇帷曉闢橫紺帶於西河絳帳宵懸聚青襟於北海雖秋禮冬詩之化已洽於齊人而宣風觀俗之規實歸於上宰銀青光祿大夫譙國公諱崇義大武皇帝之支孫河間大王之長子高秋九月振玉贙於唐邱寶算干齡躍璇虯於太渚我國家靈命東朝抗裘冕之尊宗子維城南面襲軒裳之重析元元之允緒擁朱虛之祿位拜玉節於秦京輝金章於蜀郡元機應物潛消水怪之災丹筆申寃俯絶山精之訟魏文侯之擁篲道在而謙尊董相國之垂帷風行而俗易司馬宇文公諱純河南洛陽人也皇根帝緒列五鼎於三朝青瑣丹梯跨千尋於十紀仲舉澄清之轡未極夷塗士元卿相之材先登上佐冰壺精鑒遙清玉壘之郊霜鏡懸明下映金城之域縣令柳公諱明字太易河東人也梁嶽之英長河之靈沐雲漢之精粹荷天衢之元亨旌旗赫奕於中古圭組陸離於下葉鳳巖抽律擢層秀於龍門驪穴騰姿吐榮光於貝闕自朱絲就列光膺令宰之榮墨綬馳芬高踐郎官之右仙鳧旦舉影入銅章乳翟朝飛聲含玉軫臨卭客位自高文雅之庭彭澤賓門猶主壺觴之境曠懷足以御物長策足以服人重泉之惠訓大行單父之謳謠遂遠猶為夏絃春誦俗化之樞機西序東膠政刑之根本上只朝憲下奉藩維爰搜復廟之儀載闡重櫩之制三門四表煥矣惟新上哲師宗肅焉如在將使圓冠方領再行鄒魯之風鋭氣英聲一變賨渝之俗於是侍郎幽思摛鳳藻於王褱材丞相高材排龍姿於璧沼遺榮處士開簾詮孝悌之機頌德賢臣持節聽中和之樂其為政也可久其為志也可大方當變化台極儀刑萬宇豈徒偃仰聽事風教一同而已哉勃幼乏逸才少有奇志虛舟獨泛乘學海之波瀾直轡高驅踐詞場之閫閾觀質文之否泰衆矣考聖賢之去就多矣自生人以來未有如夫子者也嗟乎今古代絶江湖路遠恨不親承妙旨攝齊於遊夏之間躬奉德音攘袂於天人之際撫聲名而永悼瞻棟宇而長懷嗚呼哀哉敢為銘曰五帝既沒三王不歸天地震動陰陽亂飛山崩海竭月缺星圍禮樂無主宗禋遂微其一大哉神聖與時回薄應運而生繼天而作龍躍浩蕩鵬飛寥廓奄有人宗遂荒天爵其二尼山降彩泗濱騰氣志匡六合神經萬類夾谷登庸中都歷試睿情貫一元猷絶四其三栖遑教迹寂寞河圖違齊出宋歷楚辭吳風衰俗壞禮去朝蕪麟書巳卷鳳德終孤其四杳杳靈命茫茫天秩吾道難行斯文易失式宣六藝裁成四術虛往實歸外堂內室其五邈矣能仁悠哉化主力制㣥辟權傾終古陸離彩粲蟬聯茅土涉海輕河登山小魯其六皇家載造神風四極檢玉題祥繩金署德聿懷聖迹同享天則乃眷台庭爰升袞職其七玉津同派金堤茂版智士高風文翁澤遠氓淳壤沃聲和俗願載啓仁祠遂光儒苑其八沈沈壺奧肅肅扃除靈儀若在列配如初槐新市密杏古壇疏楹疑置奠壁似藏書其九泛泛寰中悠悠天下徇名則衆知音蓋寡碝石參瓊迷風亂雅仲尼既沒夫何為者其十原夫帝機寥廓雲雷驅妙有之功正氣洪荒清濁構乾元之象融而為川瀆結而為山嶽五城韜海接崑閬於大都八洞藏雲冠瀛洲於巨闕造化之所偃薄靈谷之所啓處極緹油而縱觀詠頌寧殫出宇宙而高尋風煙罕測是知玉巵無當遐荒非視聽之津金榜所存城闕盡江湖之致何必九虯齊騖直訪銀宮八駿長驅遙臨石室武都山淨慧寺者梁太清年中之所建也名山列嶽之舊仙都福地之湊黃龍負匣著寶籍於山經紫鳳銜書蔭榮光於井絡須彌峯頂仍開梵帝之宮如意山中即有經行之地爾其盤基跨險列嶂憑霄日月之所竄伏煙霞之所枕倚飛泉瀑溜蕩滌峯崖緑樹元藤網羅邱壑飛廉作氣被萬吹於中巖帝頊司寒宅千霜於北谷丹梯碧洞杳冥林岫之間桂廡松楹寂寞風塵之表是稱英鎮實瞰崇岡閭閻當四會之街城邑辨三分之地帛丿糸溪錦瀆下浸重巒玉阜銅陵旁分絶磴山川絡繹崩騰宇宙之心原隰縱橫隱軫亭皋之勢頃以黃旗夜徙紫蓋晨傾九服失圖三靈在疚姦臣躍馬據折坂而吟雲壯士聞雞擁陽關而嘯雨岷峨失險化為鋒鏑之場江漢橫流非復朝宗之國禪宇由其覆沒法衆是以凋淪國家奄有帝圖削平天釁紫宸反照皇階即敘萬國順百靈朝幽顯再立華戎一揆燭龍韜景避堯日於幽都雲鵬斂翼候虞風於晏海以為軒階具美功窮望祲之臺漢道兼宏力盡祈年之觀爰經寶地大啓祥宮撫香象而高視鳴法螺而再唱龍垣淨土連帝道而重光鶴苑崇基脫皇居而首出况乎山精舊壤下鎮偏隅天帝遺墟上干足廠田坴次王舍城之宮闕白玉猶存給孤獨之園林黃金尚在法物由其大備盛德所以相尋株兵奉天藏之圖泉女獻山祇之籍離亭合榭因岸谷之高低謺觀連房就岡巒之曲直丹崖反照畫栱相臨緑嶂斜煙雕簷間出豐隆曉震次復霤而悽皇列缺晨奔望崇軒而眙愕千香寶樹自起風煙九乳仙鐘獨鳴霜雪銀龕佛影遙承雁塔之花石壁經文下映龍宮之葉虹生北澗即挂新幡鳳下東岑還栖舊剎若乃尋曲岫歷崇隈周行數里直上千仞蒼松蓄吹臨絶徑而疏寒黛篠防煙繞回疆而結蔭春巖橘柚影入山堂秋壑芙蓉光浮水殿亦有山童採葛入丹竇而忘歸野老紆花向青溪而不返山神獻果送出菴園天女持花來遊淨國實杳冥之祕訣託幽深之逸境豈直淮南桂樹暫得仙家江左桃源終迷故老而已爰有寬闍黎者俗姓楊氏其先華陰人也因官徙地家於帛丿糸竹山分太華水帶長汾川嶽會同風雲感召元經素論侍郎居八俊之英緑綬黃軒太尉列三台之首法師玉函降彩金瓶探色振八解之遙源踐三明之廣路靈機入證窮象載於初髫妙諦因心釋羊車於弱冠三千法界由廣位而出無明十二因緣自普濟而登彼岸宏宣誓願大振沈黎揮覺劍而破邪山揚智燈而照昏室彌綸所被白馬盡於禺同權漸所開黃牛至於嶓冡虔誠樂土憩影茲峯乃以貞觀九年於寺西院立七佛堂一僧舍星毫動牖月面分階彩鳳銜旒神龍負塔飛煙湧座龕龕忉利之天香霧成臺樹樹菩提之果朝散大夫行縣令清河張楚親承妙業俯刊貞珉林宗有道伯喈無愧法師夙機少晤應變多奇玉山中斷瓊林下雜支道林之好事語默方融釋慧遠之高居風埃遂隔洎乎坐忘遺照返寂歸真城肆颯然若遺空山黯而無色豈直巖枝泣血澗戶摧梁而已哉縣令劉照彭城人也自碭山仗劍綰鳳歷於雲臺春郊授鉞嗣龍圖於白水玉壘三分之胄下雜公門金陵一霸之基旁參帝緒翠緌丹紱歷今古而先鳴人傑地靈冠山川而得雋君膺嶽瀆之秀挺風雲之會昆溪劍鍔直照胸襟楚澤圭璋潛周履行魯恭明德方升漢輔之階潘嶽能文且職河陽之縣仁徽可被闔境仰其風猷威德所加百城謺其霜彩尚乃康莊妙域光開不捨之壇舟楫愛河昭暢無生之業痛鷲林之殄瘁悲象教之榛蕪爰命緝興式光泉藪虎蹊龍澗近分廬嶽之圖金闕瑤臺更計瀛洲之記銘曰武都仙鎮龍墟奧域邑動香城山開淨國澗流百道峯雲五色谷暗藤斜山高樹逼千楣鶴列萬栱星懸分林構址接磴開廛臨階竹樹繞棟風煙龕前怪石塔下秋泉緑崖疏徑青岑拒室霧道相縈煙房互出葉濃磎淨花深嶂密鳥度難尋猿驚易失簷分石竇地絡金沙丹邱抗月碧洞棲霞松開野路桂列仙家仙爐柏葉寶座蓮花砌因巖曲橋隨峯返果出天廚香來仙苑玉鑰啓曙金鐺照晚谷思鍾張山悲鐸遠閭閻踐勝銅墨高情聲飛別邑望動專城懸金道肆刻石山楹千載之後吁嗟令名若夫玉繩高曜分寶歷於皇階金榜洞開導璸暉於帝幄雖復蒼梧北望湖湘盈舜后之歌緑荇西浮江漢積文妃之頌未有激揚煩蔭栖妙果於香城揮發蓋纏樹冥基於淨域則紫房丹室猶居燬室之間朱紱瑤筐未出塵籠之際我國家鳳翔元氣駕黃幄而層飛龍躍太虛絶蒼根而止傃文皇帝以八才御宇光升岱野之榮文德后以十亂乘時恭贊塗山之業握仁王之寶鏡日月重光驅梵帝之金輪雷霆靜祲槃甘露承眷而宵流般若靈音雜祥以晝引蛟臺蜃閣俄交震旦之墟月面星毫坐照毗邪之國善寂者蓋舊寺之餘趾梁武帝之所建也爾其碧雞仙宇分絶障於金堤石兔遙源控長江於玉峽封畿四會龍坰舍衛之壇里閈三分鹿野經行之地洎蒼鵝上擊銅馬交馳祗園興板蕩之悲沙界積淪胥之痛火炎崑嶽高臺與雁塔同平水浸天街曲岸與猴池共盡山川隱嶙空傳鷲嶺之基灌莽蕭條非復鶯林之樹武德伊始君子道亨正皇極而撫寰中登太階而臨天下函關雲物更逢真聖之期井絡星辰重集會昌之運雖開基撥亂獄訟知歸而繼絶興亡經綸未暇先皇統業貞觀御宸奉文物於三天布聲名於十地參羅上下充士冖柘籥於襟懷八部神祇薦圖書於掌握皇寶降地符升含生無昏墊之虞法衆有來蘇之望俄而後庭搆厲椒房穆卜六宮震恐三靈愕眙馳瑤展幣有事於㣥宗碧劑元針無徵於衆術帝乃降監回慮屏璧與圭追勝迹於靈關事良緣於福地爰紆聖綍重啓禪宮峙璇剎於將傾鎮銀繩於巳絶絲綸既洽棟宇行周坤德用寧陰儀載朗於是林衡授矩周官詮揆日之工梓匠揮斤荊客鍊成風之巧重楹畫栱坐出天霄復樹文閨俯臨霓宇顯慶中縣令蕭君道宏理鉤繩於日用憑藻繢於天成仙宮之妙匠可尋盧舍之神模不墜雕甍鶴翥曳珠網於星津繡桷虬伸吐璿璫於月徑緑房丹鎖彩綴晴霞紫閣青疏光含薄霧春風瓊樹香飄席上之蘭秋水銀塘影數軒中之芰晨光轉卉翻寶宇之龍花溽露低枝蕩真文於貝葉天童潤色黃珉碧玉之壇海聖彌縫師子龍王之會建靈幢於厚夜珠飾年深懸法鼓於迷津規模歲遠時又於佛堂東壁畫二聖僧丹青未畢大啓神光鄰玉塵之崇輝發金龕之實相朱軒夕朗似遊明月之宮紺宇晨融若對流霞之闕由是岷英蜀秀攀講序以雲趨帶燕裙鸞仰齊庭而霧合貪機大阻淨施旁流綺羅分解佩之因軒蓋得捐金之所靈妃翳日捨翠幄於香筵仙客停雲落霓裳於寶地自非沖姿密契景應潛周豈能昭義祉於氤氳動元機於肸蠁者也爰有上座宏一等節並沈研性符隱括凝妙律於神珠肅靈椒於寶印大昊奉楫截苦海而橫流風伯扶輪歷邪山而效駕騰燭龍於慧炬俯鏡重昏奏鳴鳳於天歌下清㣥籟摩珍在握遙臨七寶之宮正覺為心俯闢三乘之路湛衢樽於忍地品藻雞園推水砥於言河扶持象化縣令宇文某河南人也帝隋尚書之元孫皇唐侍中之令子爾其虹旗萬里御六氣而鵬飛霜戟千㣥擁三州而鶚視帝葉皇枝之重對越乾坤金縢石匱之功光華宇宙公上流提慶中和育祉見鍾鼎於南鄰奉軒裳於北闕雲姿月步下瑤澤而追風雪羽霞翎麗珠田而矯霧芳蘭公子即以地業高人幽桂王孫即以琴樽待物敘徽猷於禮樂則俎豆縱橫談賞契於林泉則煙霞咫尺自裁聲百里揆化雙川收武城之故事擇中牟之令典仁風易狎候丹翟於春坰惠化難經佇青鸞於曉隊山巨源之遠量嘯傲行藏謝太傅之高風從容語默縣丞王敬衣簪舊族孝友名家白虹緘抵鵲之光紫電蓄衝牛之氣七年高秀拂層漢以非遙六月雄圖擊長波而未遠鄉望等少承榮緒中區勝族門稱東別之標地接西隅之嚮嚴君平之履道盛德家傳秦子整之談天風流代襲咸以為妙圖真諦事出於無名翠玉元碑道凝於不朽弇州北跨猶疏騄驥之名文石東區尚勒元龜之頌况乎玉衣流慶事屬於仙幃金屋延祥福纏於梵宇爰求勝筆載記芳謠下官弱植少徒薄遊多暇薜蘿人事空餘江海之心筆札神交尚有淵雲之氣相如謝病訪詩酒於臨卭邱也棲遲聽絃歌於單父㣥公以道之存矣思傳記德之書下官以文在茲乎願展當仁之筆其詞曰蜀嶺東漸岷山西積月峽星橋騰金孕碧肸蠁靈兆邱墟梵迹雁塔推基鹿苑遺迹肅肅黃運英英文母配乾垂慶儀坤握矩寵照香城仁沾淨土爰光大壯聿求多祚青牛福地白鶴禪林重扃霧敞復殿雲深龕雕翠玉剎樹黃金龜鏡夕照鳳鐸晨吟慧樓彌望化臺出沒棟列長虹窗虛明月果脣周映蓮眸間發雨霽猴池煙生龍窟肅穆禪衆優遊令宰方駕康衢連舟性海鷲嶺增飾雞林潤彩藻繪相尋丹青盡在我今懷矣窮路何歧承風詠德展義陳詞百年心事千載風期東西南北栖遑幾時
