front:
  text: 全唐文欽定全唐文卷一百四十一魏徵三
  hash: sha256:058d7d4c07899654891f035323cb51840f6ca798d8ba87716032e20676f59244
body:
  text: 明堂之作其所由來遠矣爰自軒唐逮乎秦漢有損有益或同或異記述參差莫能詳究今稽諸古訓參以舊圖其上圓下方複廟重屋百慮一致異軫齊歸暨當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端蜂起是非舛互靡所適從遂乃以人廢言止為一殿宋齊則仍其舊梁陳遵而不改雖嚴配有所祭饗不匱求之典則道實未宏何者夏禹哲王致美於祭服周公大孝備物於宗祀聖人設教夫豈徒哉然則身處卑宮神居重屋斯豈苟求壯麗崇飾華侈固亦致孝尊親之道因高事天之義求其遠趣非無深旨蓋以神本虛元無聲無臭視之不見聽之不聞既杳冥而莫測故廣袤之度罔知夫孝因心生禮緣情立心不可極故備物以表其誠情無以盡故飾宮以廣其敬宣尼美歎意在茲乎自五帝迄今代有損益宮室制度每越舊章重屋規模獨虧前典文祖過土階之儉世宗踰卑宮之陋配天致極理必未安伏惟陛下以上聖之英靈承皇天之眷命一六合而光宅得萬國之懽心九譯之貢既承明堂之位仍闕永言殷薦誠感自中臣等親奉德音預參大議思竭塵露增崇山海凡聖人有作義重隨時萬物斯覩事資通變若據蔡邕之說則至理失於文繁若依裴頠所為則大體傷於質畧求之情理未臻厥中今之所議非無用捨請為五室重屋上圓下方既體有則象又事多故實下室備布政之居上堂為祭天之所人神不雜禮亦宜之其高下廣袤之規几筵尺丈之度則並隨時立法因事制宜自我而作不必師古圖像備陳決之聖慮廓千載之疑議為百王之懿範不使泰山之下惟聞黃帝之法汶水之上獨稱漢武之圖則通乎神明庶幾可俟子來經始成之不日謹議竊以刑辟之設世輕世重防奸慮禍異代同歸傳曰舜之誅也殛鯀其舉也興禹書云父子兄弟罪不相及此乃哲王盛德稱之自遠爰逮近古漸為深防刑人不在君側雖著禮經子孫緣於父祖猶無定式故張湯伏辜安世為漢朝名相嵇康就戮延祖為晉室忠臣是知君有刑臣之道下無讐天之義至於子孫方之昆弟愛敬不同非無等級考之刑憲參詳古今科條既殊節文又異量輕重以原情因親踈以定制踈而不漏而易從示無私之心坦至公之路論德則可大為法則可久不失理不害義因循弗革切為未允至若被推劾者期以上親不許入內此由罪狀初發君怒未怠父子兄弟義不自安上展睿聖之心下申恐懼之意且不聽入未為失理依舊不改亦非乖謬謹議臣竊聞之禮所以決嫌疑定猶豫別同異明是非者也非從天降非從地出在人情而已矣人道所先在乎敦睦九族九族敦睦由乎親親以近及遠親屬有等差故喪紀有降殺親踈有九服術有六隨恩以薄厚稱情以立文舅之與姨雖為同氣推之於母輕重相懸何則舅為母之本宗姨乃外戚他族求之母族姨不預焉考之經文舅誠為重故周王念齊每稱舅甥之國秦伯懷晉實切渭陽之詩今在舅服止一時為姨居喪五月徇名喪實逐末棄本此古人之情或有未達今之損益實在茲乎記曰兄弟之子猶子也蓋引而進之也嫂叔之無服蓋推而遠之也禮繼父同居者則為之期未嘗同居則不為服從母之夫舅之妻二人相為服或曰同爨緦然則繼父之徒並非骨肉則服重由乎同爨恩輕在乎異居故知制服雖繫於名文蓋亦緣恩之厚薄者也或有長年之嫂遇孩童之叔劬勞鞠養恩若所生分饑共寒契闊偕老譬同居之繼父方他人之同爨情義之深淺寧可同日而言哉在其生也愛之同於骨肉及其死也則曰推而遠之求之本原深所未喻若推而遠之為是則不可生而共居生而共居為是則不可死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在且事嫂見稱載籍非一鄭仲虞則恩禮甚篤顏宏都則竭誠致感馬援則見之必冠孔伋則哭之為位此並躬踐教義仁深孝友察其所行之旨豈非先覺者乎但於其時上無哲王禮非下之所議遂使深情鬱於千載至禮藏於萬古其來久矣豈不惜哉今屬欽明御宇光華再旦五禮詳洽一物無遺猶且永念慎終凝神遠想以為尊卑之敘雖煥乎大備喪紀之制或情理未除爰命秩宗詳議損益臣等奉遵明旨觸類旁求採摭㣥經討論傳記或損其有餘益其不足使無文之禮咸秩敦睦之情畢舉變薄俗於既往垂篤義於將來信六籍所不能談超百王而獨得者也其損益之事備陳如左謹按高祖父母舊服齊衰三月請加為齊衰五月適子婦舊服大功請加為期眾子婦舊服小功今請與兄弟子同為大功九月嫂叔舊無服今請服小功五月服其弟妻及夫兄亦小功五月舅舊服緦麻請與從母同服小功五月謹議臣聞三代之利建藩屏保乂皇家兩漢之大啟山河同奬王室故楚國不恭齊桓有召陵之師諸呂稱難朱虛奮北軍之謀九鼎絕而復安諸侯傲而還肅比夫秦之孤立子弟為匹夫魏氏虛名藩捍若囹圄豈可同年而語哉至於同憂共樂之談百不一存始蒙聖帝敷至仁以流宏澤沐春風而沾夏雨一朝棄之為諸侯之隸眾心未定或致逃兦其未可一也既立諸侯當建社廟禮樂文物儀衞左右頓闕則理必不安粗修則事在未暇其未可二也大夫卿士咸資祿俸薄賦則官府困窮厚斂則人不堪命其未可三也王畿千里征稅不多至於貢賦所資在於侯甸之外今並分為國邑京師府藏必虛諸侯朝宗無所取給其未可四也今燕秦趙代俱帶蕃夷黠羌旅拒匈奴未滅追兵內地遠赴邊庭不堪其勞將有他變難安易動悔或不追其未可五也原夫聖人舉事貴在相時時或未可理資通變敢進芻蕘之議惟明主擇焉謹議昔晉文反國爰議從兦之賞漢皇定鼎先說入蜀之功太宗兆協大橫未忘代邸之舊光武符膺赤伏猶念潁川之勤此一霸三王名高前代豈溺情於近習曲私於一物哉葢理有必然義不得巳也書曰人惟求舊左右等攀附鱗翼多歷歲年入參社稷之守出為羈絏之僕冒犯鋒鏑契闊險難或力盡鞍甲恩澤莫沾或身沒戰場子孫未錄㣥議不息實由於此今時來有運天門已開故攀柱之懽未絕積薪之歎尚深若不申此大通疑考之㣥望介之推高潔猶未免言臣等慮不及遠輒申狂瞽伏惟深察悚慄謹議自隋末亂離㣥雄競逐跨州連郡不可勝數魏公起自叛徒奮臂大呼四方響應萬里風馳雲合霧聚眾數十萬威之所被將半天下破世充于洛口摧化及於黎山方欲西蹈咸陽北陵元闕揚旌瀚海飲馬渭川翻以百勝之威敗於奔兦之虜固知神器之重自有所歸不可以力爭是以魏公思皇天之乃睠入函谷而不疑公生於擾攘之時感知已之遇根本已拔確乎不動鳩合遺散據守一隅世充以乘勝餘勇息其東畧建德因侮兦之勢不敢南謀公之英聲足以振於今古然誰無善始終之慮難去就之機安危大節若策名得地則九族蔭其餘輝委質非人則一身不能自保殷鑒不遠公所聞見孟賁猶豫童子先之知幾其神不俟終日今公處必爭之地乘宜速之機更事遲疑坐觀成敗恐凶狡之輩先人生心則公之事去矣觀夫膺期受命握圖御宇咸建懿親藩屏王室布在方策可得而言自軒分二十五子舜舉十六族爰歷周漢以逮陳隋分裂山河大啟磐石者眾矣保乂王家與時升降或失其土宇不祀忽諸然考其盛衰察其興滅功成名立咸資始封之君國喪身兦多因繼體之后其故何哉始封之君時逢草昧見王業之艱阻知父兄之憂勤是以在上不驕夙夜匪懈或設醴以求賢或吐飧而接士故甘忠言之逆耳得百姓之歡心樹至德於生前流遺愛於身後暨乎子孫繼體多屬隆平生自深宮之中長居婦人之手不以高危為憂懼豈知稼穡之艱難昵近小人疎遠君子綢繆哲婦傲很明德犯義悖禮淫荒無度不尊典憲僭差越等恃一顧之權寵便懷匹嫡之心矜一事之微勞遂有無厭之望棄忠貞之正路蹈奸宄之迷途愎諫違卜往而不返雖梁孝齊同之勳庸淮南河東之才俊摧摩霄之逸翮成窮轍之涸鱗棄桓文之大功就梁董之顯戮垂為明戒可不惜乎皇帝以聖哲之姿拯傾危之運耀七德以清六合總萬國而朝百靈懷柔四荒親睦九族念華萼於棠棣寄維城於宗子心乎愛矣靡日不思爰命下臣考覽載籍博求鑒鏡貽厥孫謀臣輒竭愚淺稽諸前訓凡為藩為翰有國有家者其興也必由於積善其兦也皆在於積惡故知善不積不足以成名惡不積不足以滅身然則禍福無門吉凶由已惟人所召豈徒然哉今錄自古諸王行事得失分為善惡各為一篇名曰諸王善惡錄欲使見善思齊足以揚名不朽聞惡能改庶得免乎太過從善則有譽改過則無咎興兦是係可不勉與竊惟載籍之興其來尚矣左史右史記事記言皆所以昭德塞違勸善懲惡故作而可紀薰風揚乎百代動而不法炯戒垂乎千祀是以歷觀前聖撫運膺期莫不懍乎御朽自強不息朝乾夕惕義在茲乎近古皇王時有撰述並皆包括天地牢籠㣥有競採浮豔之詞爭馳迂誕之說騁末學之傳聞飾雕蟲之小技流蕩忘反殊塗同致雖辯周萬物愈失司契之源術總百端彌乖得一之旨皇上以天縱之多才運生知之睿思性與道合動妙幾神元德潛通化前王之所未化損已利物行列聖所不能行瀚海龍庭之野並為郡國扶桑若木之域咸襲纓冕天地成平外內禔福猶且為而不恃雖休勿休俯協堯舜式遵稽古不察貌乎止水將取鑒乎哲人以為六籍紛綸百家蹖駮窮理盡性則勞而少功周覽汛觀則博而寡要故爰命臣等採摭㣥書翦截浮放光昭訓典聖思所存務乎政術綴敘大畧咸發神衷雅致鉤深規摹宏遠網羅政體事非一日若乃欽明之后屈已以救時無道之君樂身以兦國或臨難而知懼在危而獲安或得志而驕居業成以致敗者莫不備其得失以著為君之難其委質策名立功樹惠貞心直道軀殉國身殞百年之中聲馳千載之後或大奸巨猾轉日迴天社鼠城狐反白作黑忠良由其放逐邦國因以危者咸亦述其終始以顯為臣不易其立德立言作訓垂範為綱為紀經天緯地金聲玉振騰實飛英雅論徽猷嘉言美事可以宏奬名教崇太平之基者固亦片善不遺將以丕顯皇極至於母儀嬪則懿后良參徽猷于十亂著深誡于辭輦或傾城哲婦兦國艷妻候晨雞以先鳴待舉烽而後笑者時有所存以備勸戒爰自六經訖乎諸子上始古帝下盡晉年凡為五袠合五十卷本求治要故以治要為名但皇覽遍畧隨方類聚名目互顯首尾淆亂文義斷絕尋究為難今之所撰異乎先作總立新名各全舊體欲令見本知末原始要終並棄彼春華採茲秋實一書之內牙角無遺一事之中羽毛咸盡用之當今足以殷鑒前古傳之來葉可以貽厥孫謀引而申之觸類而長葢亦言之者無罪聞之者足以戒庶宏茲九德而易從觀彼百王不疾而速崇巍巍之盛業開蕩蕩之王道可久可大之功並天地之貞觀日用日新之德將金鏡以長懸矣其目錄次第編之如左早挹芳猷未諧披展甚為翹佇興寢增勞寒勢轉嚴比得清吉及處危城無乃憂悴自猜狂嗣位多歷歲年剝削黔黎塗毒天下瓊室瑤臺之麗未極驕奢糟邱酒池之荒非為淫亂加以違忠臣之諫從婦人之言殺戮忠良科稅無巳是以蝟毛而起豹變其文共舉義旗同翦凶虐今者屯營鞏洛開發太倉賑恤饑羸或從充健吳戈電照隸首算而無窮冀馬雲屯宏羊計而難盡是以八方並湊萬里俱來莫不期入關以兦秦爭渡河而滅紂東窮海岱南洎江淮凡厥遺黎承風慕義唐公起兵黎疑作晉陽軍臨灞岸三秦父老千里犒師協義同心共為犄角元寶藏武陽興義即取黎陽燕趙之郊來蘇成詠唯滎陽一郡仍獨守迷爰以宗盟尚疑銜璧敬陳鍼藥冀愈膏肓夫微子紂之長兄親實為重項伯籍之季父戚乃非踈然其去朝歌而處周背西楚而歸漢豈不眷戀宗祊留連骨肉但為識寶鼎之遷移知神器之先改河決不可壅樹顛不可維所謂元覽通人明鑒君子者矣而王之先代家住山東本姓郭氏乃非楊族只為宿與隋朝頗有勳舊遂得預沾磐石名在葭莩婁敬之與漢高殊非血允呂布之於董卓良異天親芝焚蕙歎事不同此又王之昏主心若豺狼儲忿同胞乃甚沈閼惟勇及諒咸罄甸師魏文之毒任城漢武之鴆河獻假使宗祧是一疎不間親况乃族類為非有何疑阻王之為臣無所獻納不能曲突徙薪除煩去惑致令四海鼎沸百姓亂麻高壘深溝自固而巳藩屏之寄豈若是乎欲免大責其可得也為王計者莫若舉城從義開門送款識幾知變足為美談乃至子孫長守富貴今王世充屢被摧破偷存漏刻段達等東都窘迫自救無聊世充朝兦彼便夕死又江都荒酣酒色流湎忘歸內外崩離人情怨憤上江米船皆被抄截士卒飢餒半粟不充事切析骸義均煮弩舉烽火於驪山諸侯莫至浮膠船於漢水還日未期近得朱粲啟詞銳師百萬已破襄陽總帥熊羆沿流東下克寸期指日定滅江都分項籍於五侯切王莽於千段王獨守孤城援絕千里餱糧之計僅有月餘弊卒之多才盈數百何以恃賴欲相抗拒求枯魚於市肆即事未遙因歸雁以運糧竟知何日然城中豪傑王之腹心思殺長吏將為內應只恐禍生匕首釁起蕭牆枉以七尺之形徒償千金之購可為寒心可為酸鼻者也今貔貅百萬馬首欲東惟待王世充破了鼓行東邁梯衝亂舞鼓角潛鳴笑虢叔之死焉悲襄陽之噍類南陽守齮封侯之事杳然東門逐獵臨刑之歎何晚深相愛惜裂帛裁書幸可三思自求多福仰臨砥柱北望龍門茫茫禹跡浩浩長春維貞觀六年孟夏之月皇帝避暑於九成之宮此則隋之仁壽宮也冠山抗殿絕壑為池跨水架楹分巖竦闕高閣周建長廊四起棟宇膠葛臺榭參差仰視則楃苕楃蔕百尋下臨則崢嶸千仞珠璧交映金碧相輝照灼雲霞蔽虧日月觀其移山迴澗窮泰極侈以人從欲良足深尤至於炎景流金無鬱蒸之氣微風徐動有淒清之涼信安體之佳所誠養神之勝地漢之甘泉不能尚也皇帝爰在弱冠經營四方逮乎立年撫臨億兆始以武功一海內終以文德懷遠人東越青邱南踰丹徼皆獻琛奉贄重譯來王西暨輪臺北拒元闕並地列州縣人充編戶氣淑年和邇安遠肅㣥生咸遂靈貺畢臻雖藉二儀之功終資一人之慮遺身利物櫛風沐雨百姓為心憂勞成疾同堯肌之如腊甚禹足之胼胝針石屢加腠理猶滯爰居京室每弊炎暑㣥下請建離宮庶可怡神養性聖上愛一夫之力惜十家之產深門下固拒未肯俯從以為隋氏舊宮營於曩代棄之則可惜毀之則重勞事貴因循何必改作於是斵彫為樸損之又損去其太甚葺其頹壞雜丹墀以砂礫間粉壁以塗泥玉砌接於土階茅茨續於瓊室仰觀壯麗可作鑒於既往俯察卑儉足垂訓於後昆此所謂至人無為大聖不作彼竭其力我享其功者也然昔之池沼咸引谷澗宮城之內本乏水源求而無之在乎一物既非人力所致聖心懷之不忘粵以四月甲申朔旬有六日已亥上及中宮歷覽臺觀閒步西城之陰躊躇高閣之下俯察厥土微覺有潤因而以杖導之有泉隨而湧出乃承以石檻引為一渠其清若鏡味甘如醴南注丹霄之右東流度於雙闕貫穿青瑣縈帶紫房激楊清波滌蕩瑕穢可以導養正性可以澂瑩心神鑒映㣥形潤生萬物同湛恩之不竭將元澤之常流匪惟乾象之精蓋亦坤靈之寶謹按禮緯云王者刑殺當罪賞錫當功得禮之宜則醴泉出於闕庭鶡冠子曰聖人之德上及太清下及太寧中及萬靈則醴泉出瑞應圖曰王者純和飲食不貢獻則醴泉出飲之令人壽東觀漢紀曰光武中元元年醴泉出於京師飲之者痼疾皆愈然則神物之來實扶明聖既可蠲茲沈痼又將延彼遐齡是以百辟卿士相趨動色我后固懷撝挹推而弗有雖休勿休不徒聞於往昔以祥為懼實取騐於當今斯乃上帝元符天子令德豈臣之末學所能丕顯但職在記言屬茲書事不可使國之盛美有遺典策敢陳實錄爰勒斯銘其詞曰惟皇撫運奄壹寰宇千載應期萬物斯覩功高大舜勤深伯禹絕後光前登三邁五握機蹈矩乃聖乃神武克禍亂文懷遠人書契未紀開闢不臣冠冕並襲琛贄咸陳大道無名上德不德元功潛運幾深莫測鑿井而飲耕田而食靡謝天功安知帝力上天之載無臭無聲萬類資始品物流形隨感變質應德效靈介焉如響赫赫明明雜遝景福葳蕤繁祉雲氏龍官龜圖鳳紀日舍五色烏呈三趾頌不輟工筆無停史上善降祥上智斯悅流謙潤下潺湲皎潔蓱旨醴甘氷凝鏡澈用之日新挹之無竭道隨時泰慶與泉流我后夕惕雖休勿休居崇茅宇樂不般遊黃屋非貴天下為憂人玩其華我取其實還淳反本代文以質居高思墜持滿戒溢念茲在茲永保貞吉觀乎天造草昧之初有聖經綸之始原鹿逐而猶走瞻烏飛而未定必有異人間出命世挺生負問鼎之雄圖鬱拔山之壯氣控御英傑鞭撻區㝢志逸風飇勢傾海岳或一丸請封函谷或八千以割鴻溝夏殷資以興兦楚漢由其輕重懋功隳乎既立奇策敗於垂成仰龍門以摧鱗望天池而墜翼求之前載豈代有其人者哉公諱密字元邃隴西成紀人自種德降祉宏道垂風導碧海之長瀾竦閬峯之遙構家傳餘慶明哲繼軌論文德則弻諧舜禹語武功則經綸秦漢其餘令聞令望且公且侯垂翠緌拖鳴玉者蓋亦耆舊未得盡傳良史莫能詳載矣曾祖弻周太師上柱國衞公祖曜周太保魏公父寬隋上柱國大將軍涼州總管蒲山郡公並匡周之美呂望愧其嘉謀平吳之功杜預慙其遠畧公渥洼龍種丹穴鳳雛降列象之元精稟成形之秀氣雲生五色一日千里起家左親衞府東宮千牛備身趨馳武帳暉映廊廡出入龍樓光生道路隋文帝精華已竭義不斷恩始開陵長之源將致覆宗之禍公見機而作謝病言歸優游經史晦明藏用風塵靡雜賓友簡通交必一時之俊談必霸王之畧尚書令景武公楊素崖岸峻峙天資宏亮壁立千仞直上萬尋嗣關西之孔子追陜東之姬旦深謀遠鑒獨步當時公年甫弱冠時人未許景武一見風神稱其傑出乃命諸子從而友焉並結以始終之期申以死生之分暨有隋二世肆虐黔首三象霧塞五岳塵飛妖災所臻匪唯血落星隕怨讟所動寧止石言鬼哭轍迹遍於天下徭戍窮於海外寃魂塞宇宙白骨蔽原野墳壟發掘城郭邱墟萬里蕭條人烟斷絕公與楚公協契共拯橫流未息溟海之波幾及昆岡之火兦自道中竄身草澤奮臂大呼㣥雄嚮起豹變梁楚鳳翔鞏洛據敖庾而塞轘轅登太行而臨白馬九服諸侯四方豪傑或跨州連郡或稱帝圖王合從締交爭兦秦族者莫不驅茲青犢背彼黑山擊長轂以雷奔望高旗而電集不期而會者以百千數遂大開幕府肇啟霸圖敷七德以宣威掩八紘而取俊鱗羽畢萃草澤無遺於是發人文以化之播仁義以乘之應時機以鼓之總㣥策以決之九野風馳六合雷駭彈壓趙燕振驚江漢世充甚昆陽之敗煬帝同望夷之禍化及師殲於黎陽建德稽顙於河朔七國之地四為我有五都之所三在域中胡騎千㣥長㦸百萬餘馬則河洛可竭作氣則嵩華自飛近無不懷遠無不肅聲溢寰宇威懾華夷屬人神乏主以天下為已任荒裔佇來蘇之望遺黎有息肩之所雖實下民伊賴然非上帝所臨壯志展於人謀雄圖屈於天命始先鳴於大樹終垂翅於㣥孽乃眷西顧舉茲東夏載驅周道來謁承明帝曰念功降茲休命上柱國邢國公拜光祿卿公威雖未振主自為謀葢當世舊部先附多出其右故吏後來或居其上懷漁陽之憤憤從吳耿後列同淮陰之怏怏羞與絳灌為伍負其智勇頗不自安俄屬元帥秦王經營洛亦親承祕策率卒先行既出雞鳴之關方次休牛之塞詔命施號更盡嘉謀公想雲夢之偽遊慮青衣之詐反心辭魏闕之下志在江湖之上慕范蠡之高蹈追赤松之遠遊熊耳峯危羊腸路險降吳不可歸蜀無路短兵既接修途已窮陰陵失道詎展拔山之力騅馬不逝徒切虞兮之歌臨陣喪元時年三十有七故吏上柱國黎陽總管曹國公徐世勣等表請收葬有詔許焉公體質貞明機神警悟五行一覽半面十年雅善書劍尤精文史輕一夫之勇學萬人之敵至於三令五申之法七縱七擒之功出天入地之奇拔幟擁沙之策莫不動如神化應變無窮負縱橫之才遇風雲之會望紫氣以驤首淩扶搖而振翮總不召之眾問獨夫之罪從我如流三分將二遂有囊括四海之志併吞六合之心既而神器有歸朝宗天闕率從義之旅為勤王之師更以名重自疑功高是懼將遠遊以避難翻途窮而及禍惜乎高鳥未盡良弓遽折敵國猶梗謀臣已喪天子過細柳以興嗟聞鼓鼙而軫慮雅重事人之節方申詔葬之禮粵以武德二年某月日葬於黎陽山西南五里之平原禮也故吏徐世勣等或同嬰世網共涉艱難感意氣於一言託風雲於千載所恨並發唐代不列元凱之功俱為漢臣獨漏山河之誓是以慟深欒布悲甚向雄慮陵谷之推移勒斯銘於泉戶庶使神遊楚國無慙項羽之臣魂往齊都不愧田橫之冡乃為銘曰如馬唐臣猶龍周史宏道百世邁德千祀帶地深源極天峻峙玉種逾潤蘭芳不已成形騰氣成象降精餘慶鍾美惟公挺生少表奇智早擅美聲符采發越志畧縱橫隋道方衰始開陵長覩茲兆亂緬然長想閉關晦迹招弓莫往盤桓利居不嬰世網運居道消時逢改卜朱旗爰止素靈已哭野戰㣥龍馳走原鹿競窺周鼎爭兦秦族時遭蠖屈運偶鳳翔劬勞百戰經營四方振蕩六合牢籠八荒始聞楚霸終基漢王㣥雄並起莫恢王度聖人既作皇天乃顧爰自東夏言遵西路來擬竇融寵逾英布爵窮五等位登九棘帷幄參謀高衢騁力海運方遠圖南未極縱壑摧鱗摩天墜翼熊耳失路新安殞身長男喪楚少女留秦驚魂靡託反葬何因列樹松檟唯餘故人
