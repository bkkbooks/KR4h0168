seq: 36
front:
  text: 全唐文欽定全唐文卷三十六元宗十七
  hash: sha256:1cc6860844c50ea58fe1e282ef497a4eefef5de49f09ed0aa3a467e8be66b75f
body:
  text: 感而遂通神之鑒也祈而必報禮之經也今農巳畢功歲則大稔京坻之積寰海攸同用陳蠲潔之薦以答明禋之祉宜令侍中牛仙客等分祭郊廟社稷嶽瀆等其四海四鎮及名山嶽瀆使有道路由過者亦宜便祭京畿地狹人戶殷繁計丁給田尚猶不足兼充百官苗子固難周濟其諸司官令分在都者宜令所司具作定額計應受職田並於都畿給付其應退地委採訪使與本州長官給貧下百姓其應給職田亦委採訪使與所繇長官勘會同給仍永為常式朕每念黎庶無忘餐寐冀其家給人足富而且壽宏濟之方莫如道教大聖垂範微言粲然遵而行之其應何速況時將獻歲萬物發生既協陽和或存惠養宜令天下諸觀起來年正月一日至年終巳來常轉本際經其四大齋日每百官齋之日常令講誦庶澤及無外稱朕意焉李嘉寵土風所育體幹出羣因其器用之宜俾在人門之次可武衞長上仍配左監門衞番上贈太師光庭嘗為重任能徇忠節忽隨化往空存遺事其子屢陳誠到請朕作碑機務之繁是則未暇朝廷詞伯故以屬卿彼之行能卿之述作宛其鴻裁因茲不朽耳洪州人鄔元崇往在文明年中傳元元皇帝真誥於天后曰我國祚無窮當千萬君遂遭禁錮因茲淪喪自非忠義之士感激過人孰能不避死亡之誅竟達神靈之命宜與追贈以慰泉壤其子瓊亦依資授一官古之善政者貴於足食欲求富國者必先利人朕思關輔之閒尤資殷贍比來轉輸未免艱辛故置此潭以通漕運萬代之利一朝而成將允叶於永圖豈苟求於縱觀其陝郡太守韋堅始終檢校夙夜勤勞賞以懋功則惟常典宜特與三品仍改授一子三品京官兼太守判官等並即量與改轉其專知檢校始末不離潭所者並孔目官及至典選日優與處分仍委韋堅具名錄奏應役人夫等雖各酬庸直終使役日多並放今年地稅且啟鑿功畢舟檝巳通既涉遠途又能先至永言勸勵稍宜甄獎其押運綱各賜一中上考準前錄奏船夫等宜共賜錢二千貫以充宴樂昊穹眷命烈祖降靈休昭之儀存乎祀典莊子文子列子庚桑子列在真仙體茲虛白師元元之聖教洪大道於人寰觀其微言究極精義比夫諸子諒絕等夷其莊子依號曰南華真人文子號曰通元真人列子號曰沖虛真人庚桑子號曰洞靈真人其四子所著改為真經崇元學置博士助教各一員學生一百人如聞河東河北官人職田既納地租仍收桑課田樹兼稅人何以堪自今巳後官人及公廨職田有桑一切不得更徵私課今之牧守古之諸侯撫育黎元歲有朝會蓋問之疾苦審以安危必在適時期於不擾洎告辭處分師古前規如聞遙自朝廷初到郡縣便遠追僧道廣說滋彰山谷往還日夜疲弊通賢當無此事俗吏誠恐有之朕夙夜在心期之清淨頃聞此說深疚乃懷宜覺前非俾無後悔當道採訪固不得違寮友之閒遽相戒勵宜知朕意各守章程並宜好去古者諸侯歲時朝覲將以陳其政理用申考績今卿等受委親民遠來會計經途冒涉曾並安好朕每憂勤念茲黎庶憫其徭役未息流寓莫歸是以當宁興嘆中宵忘寢永言共理實冀分憂凡有百姓及鰥寡孤獨並乏絕之戶征鎮之家凡可矜恤卿等此來若何為養今年稼穡大率少似不豐閭閻之閒有貯積否至於百姓閒事朕欲委曲盡聞卿等遠來疲勞卒難備對且聽尋親知續當序進以問風化敬惟明神普存於祀典咸秩羣望式重於邦畿頃者分命使臣致誠嶽瀆山川便近亦巳有處分其關輔之內屢有陳祈王者所都禮亦異數應關內名山大川各委所繇郡長官稍優於常禮致祭於京兆府界宜委蕭炤同與少尹分祭倍崇精潔以副誠祈王者父事天母事地所以昭孝敬之道通神祇之德朕虔奉明命備稽大猷實在緣情不惟相襲伏以昊天上帝義在尊嚴恭惟祀典每用冬至既於是日有事於圓丘更受朝賀實深兢惕自今以後冬至宜以次日受朝仍永為恒式朕聽政之餘精思理本意有所得庶益於人且什一而稅前王令典農桑異宜舊制猶闕今欲審其戶等拯貧乏之人賦彼商賈抑浮惰之業優劣之際有深察之明閭里之閒無不均之歎頃以人不欲擾法貴從寬所以比來未全定戶今巳經數載產業或成適可因茲平於賦稅自今巳後每至定戶之時宜委縣令與鄉村對定審於衆議察以資財不得容有愛憎以為高下徇其虛妄令不均平使每等之中皆稱允當仍委太守詳覆如有不平縣令錄奏量事貶降其鄉村對定之人便與節級科罪覆定之後明立簿書每有差科先從高等務茲不足庶叶彞倫尊師道德之重仙真所欽是以修齋必有精感況山惟地肺會司命之福庭壇邇天宮則真人之舊館演弟子勤志致蒼生壽域迢遙東望日夕傾心至於開春佇迴風馭以慰渴賢之想來敷元妙之教也初秋尚熱尊師平安好遣書指不多及鍊師李含光道高紫府學總黃庭賁然來思式敷至妙既而屬念茅嶺言訪真經近出咸秦遠遊方外朕載懷仙境延佇勤修將使九有之人同歸元教三清之衆俯鑒遵行豈徒夢寐華胥馳誠碧落而巳想尊師建立真儀所修壇宇初至經搆殊用勞心甚寒得平安好遣書指不多及眷言仙府旁連洞宮青壇舊居緬想靈迹紫臺新宇煥啟真宗式彰崇奉之誠爰置修葺之戶尊師等副朕茲意清靜寶持也昨程元暹至得所進圖具規矩矣然崇飭仙觀祈望真遊若不幽邃清閒豈降霓裳羽蓋且在科儀猶有差降至於仙真道衆故亦不可同居所置紫陽觀大院內更不須著人居止但作虛廊四合清潔殿堂以修香火用雲駕其道衆等別院安置今具圖往應所添加亦入支科矣尊師體真遠識含和內融必能上合靈仙之心下副欽崇之意也甚寒得平安好遣書指不多及承前諸道差使賀正十二月早到或有先見或有不見其所賀正表但送省司又不同進因循日久於禮全乖自今巳後應賀正使並取元日隨京官例序立便見通事舍人奏知其表直送四方館元日仗下後一時同進道者是萬有之宗法者是九真之契大聖以垂教後學以進修弟子比欲敬受經法以未詳嚴祕又真經散逸紕謬處多近訪得天真遺蹟至於科儀無不條備加以募寫一依戒旨喜夙志之見遂荷真靈之降恩以今月十八日仰啟三清尊君太師元師真師潔齋受訖載捧真文恭披鳳篆將以運心太虛之境以養谷神之壽也其貝危信具依經傳造足今並投詞封以附往尊師體道之要含光之和清無為與予合志請為弟子以前件詞及貝危信投茅山華陽洞天金壇靈府以為明信用證勤精夫有德者尊以美號則葛洪著抱樸之稱陶君有貞白之名永言前修事實不遠今號尊師為元靜先生以昭懿德彰高行也故令使往甚暄尊師平安好遣書指不多及尊師秉德之和探道之要為弟子親藏貝危信以啟靈真且加號以表精修衣服者所以展誠敬是申崇尚之意式賛仙階之美也所謝知靈芝者和氣以生真仙鑒植昔軒轅至道三秀屢芳永惟貞符載瑞茲日黃輝朱采八十一莖色叶金方數應陽吉或連跗並萼或雙本同枝出天洞以敷榮就藥壇而結秀實曠代嘉貺至感殊祥尊師既陳詞達誠遠致真錫弟子敬受元吉當服餌焉甚熱平安好爐開仙藥九真示傳院合靈芝三茅鑒植徵之元錄蓋未曾聞唯魏伯陽豫兆於前今李越成効之於此朕當齋心以伺專使往迎與尊師同承道錫也所賀知尊師所奏靈芝信殊祥也若彩雲繁布比芳蘭芬馥當紫陽之福地叶丹誠之吉徵遠與大同玉芝遙為合應斯仙真上祐尊師潔誠是降休徵用深慶慰今令將詞及香投謝天洞式憑高德以達虔心也朕每重清真親乎有道而覽茲誠請義在難違俾遂廼懷以就醫藥亦既痊損當早來旋尊師抱一守中探微昭遠能回真潔發揮道門遂與太和先生啟是仙宗起予虔奉崇飭靈迹廣求真經則詩以寵行物將厚意永慰岐路以彰禮賢也所謝知尊師遠訪名山精求至教建立壇宇載寫真經庶事用心殊勞倦也朕志求道要緬想真仙將憑潔誠以修元妙今以十八日清齋潔壇以受經誥靈仙降祐祈有證明今將詞及香信等往尊師當為宣揚科儀奉詞陳謝庶上達仙宮下垂昭應甚暄尊師得平安好遣書指不多及朕祗肅羣祀祈在三農冀幽賛之有憑必昭報而無闕宜令工部尚書郭虛己等分祭五嶽四瀆朕永念黎元務宏愛育所以惠政頻及善貸相仍亦將克致和平登於仁壽如聞流庸之輩漸亦歸復浮食未還其數非廣靜言此色並見其繇蓋為宰牧等授任親人職在安戢稍有逃逸恥言減耗籍帳之閒虛存戶口調賦之際旁見親鄰此弊因循其事遂久寤寐興念良用憮然不有釐革孰致殷阜其承前所有虛掛丁戶應徵租庸課稅令近親鄰保代輸者宜一切並停應令除削各委本道採訪使與外州相知審細覆申牒所繇分其逃還復業者務令優恤使得安存縱先為代輸租庸不在酬還之限本置採訪使令舉天下大綱若大小必由是一人兼理數郡自今巳後採訪使考察善惡舉其大綱自餘郡縣所有奏請並委郡守不須干及朕祗膺寶歷殷鑒遠圖慮草澤之遺賢降弓旌於屢辟是以三紀於茲羣材輻輳或一言可紀必適輪轅一善有經每加獎進庶六合之內靡然同風四科之門咸能一貫何茲意之緬邈而增修之寂寥今者舉人深乖宿望朕之所問必正經史卿等所達咸皆少通所問多否以獨鑒未周必資僉議爰命朝賢三事精加詳擇咸以為闕於聚學莫可登科至於每歲秀才有司考試帖經問策兼以雜文假如及第在階選序今之將舉待以榮班各非異才孰可超獎墾鑿經傳且未精勤俯拾青紫豈宜倖覬其懷才抱器舉人並放更習學即好去其有不對策羅嘉茂既是白丁宜於劒南効力全不答所問崔慎惑劉灣等勒為本郡充學生之數勿許東西其所舉官各量貶殿以示懲誡尊師以道樞宏濟以真宗啟迪來致元妙去還雲山詩以見懷用彰惜別也所謝知敬問元靜先生先生稟潔白之節得黃中通理學徧九流逾守元默心遊八景益混光塵則密行高節良可歎矣然能屈獨往之心廣宏濟之道緬迪真祐深啟淳源知前後所修功德皆有感應瞻望東南馳心日夕今附物及香棗等尊師更為九度修功德也庶使蒼生承日用之福外化有歸順之心天下和平惟道所庇修功德了當蹔迂風馭一至京來甚寒尊師比清暢唐師回遣書指不多及齋醮之儀顧有模楷將致誠懇必仗精修故屈尊師敬申妙旨知巳事畢良多愧也所謝知尊師思慮熟精虔心齋潔致福利物其功實多況擇高流同勤至道精修不怠嘉尚彌深香信之資用昭誠意也尊師以至道妙用精誠感真薦福朕躬居寧寰宇俯及長至來慶休祥履端之吉是與同也遲至來春當共尊師相見尊師上清真修下宏仙教為朕致福以庇蒼生三皇祕文巳承嘉應河圖內記祈延福祥虔誠之心遙屬茅嶺所寄少物豈答勤勞春景漸和尊師比加宜也敬問元靜先生昨弟子唐若倩至具知去月十一日功德事畢夫以至誠之心精修之感壇在仙境宜按沖科下庇蒼生上資宗社永求福應元感昭然及知天地至和人神胥慶以降甘露以表休符則視履考祥其旋元吉今歲聿云暮璿璣運行不愧再勞事緣萬姓今附香信往至年下且請尊師於所居修功德以助履新至來載春和復請尊師於茅山上為宗社下為黎元修河圖大齋應緣功德之物觸新再造無以多勞所利者廣又道德相親氣味縣合諸山聖迹多有異人若有尋訪尊師當為弟子招致也甚寒尊師道體安和唐若倩還遣書指不多及勅江南東道採訪處置使晉陵郡太守董琬山嶽上䟽分野下鎮方隅降福祐於人施雲雨之惠且茅山神秀華陽洞天法教之所源羣仙之所宅固望秩之禮雖有典常而崇敬之心宜增精潔自今巳後茅山中令斷採捕及漁獵四遠百姓有喫葷血者不須令入如有事式申祈禱當以香藥珍羞亦不得以牲牢等物卿與所由存心檢校漸寒卿得平安好錢貨之用所以通有無輕重之權所以禁踰越故周立九府之法漢備三官之制永言適便必在從宜如聞京師行用之錢頗多濫惡所資懲革絕其訛謬然安人在於存養化俗期於變通法若從寬事堪持久宜令所司即出錢三數十萬貫分於兩市百姓閒應交易所用錢不堪久行用者官為換取仍限一月日內使盡庶單貧無患商旅必通其過限輒違犯者一事巳上並作條件處分唐虞分理命以子男周漢建官委以令宰朕稽古前哲寤寐全才委之銓衡慎擇銅墨至於上敷朝政下字淳人親其農桑均其力役使惸嫠者視之猶父母俾匱乏者賴之以安全然後八使類能六條舉最擢以含香粉署獎以秋霜臺是乃立身效官移忠入仕榮家報國豈不美歟若徇己冒私擾人敗政有懷潤屋無懼害公豈惟刑網貽憂抑亦名節隳替蓋士君子之所恥亦名教之罪人鴻漸於磐豈不勉哉今卿等將欲赴官朕之所言提撕之耳所謂聽訟吾猶人也必也使無訟乎況今之人也與古人不殊今之官也與古官無別穀璧銅印其猶昔榮而卓茂魯恭迥然無繼將勸獎之道不至豈淳樸之風未還撫事君臨載深厲惕今者庶乎卿等能副此心賞既超倫刑必當罪各宜勉勵敷我皇猷無謂天高四聰必達並即於朝堂賜食食訖好去頃緣少雨遍於致祭旋降甘澤實荷靈祇其先令中使祭者別有昭報京兆府比來應有祈請處並畿內名山靈迹並令府縣長官各申賽祭國子監諸生等既非舉時又屬暑月在於館學恐漸炎蒸其有欲歸私第及還鄉貫習讀者並聽仍委本司長官具名申牒所由任至舉時赴監東京監亦準此九族既睦百官有序至於班列宜當分位嗣王實先於主祭國老有貴於乞言比在朝儀尚為閒雜非所謂睦親敦舊之義也嗣王宜與開府儀同三司等致仕官各居本品之上用為永式蘇良嗣往者頻被言告指驗非虛朕以其年迫桑榆情敦簪履掩其惡迹竟不發揚洎乎歸壤之辰爰備飾終之禮不謂因子重發逆蹤所司執法論科請申毀柩之罰朕念勞志切惟舊情深是矜因赦之科特降非常之霈式延恩於朽骼俾流渥於幽魂特免斵棺之刑寬其籍沒之典得所進詩甚有佳妙風雅之道斯焉可觀並據才能略為賛述具如別紙宜各領之故惠宣太子女襄樂縣主等德稟賢王名高淑女資其婉順遘此偏孤念遠之德惟恩是屬宜受賜於湯沐俾承榮於敦敘可各賜實封一百戶司馬鍊師以吐納餘暇琴書自娛瀟灑白雲超馳元圃高德可重蹔違蘿薜之情雅志難留敬順松喬之意音塵一閒俄歸葛氏之天台道術斯成頃縮長房之地脉善自珍愛以保童顏志之所之略陳鄙什既敘前離之意仍懷別後之資故遣此書指不多及勅丹陽郡太守林洋及道俗父老百姓等朕遠遵元妙載想靈仙眷茲茅山是為天洞瑤壇舊觀餘址尚存道要真經散落將盡永言法寶良用憮然今為黎元大崇道本故令清修之士建立真儀訪迹靈山以新觀宇庶使元宗再闡瞻奉知歸降福寰瀛致之仁壽也又比年以來每遵清淨官吏有修良之美農桑屬豐稔之期百姓之閒庶無乏絕也微寒卿及道俗父老百姓等平安好遣書指不多及
