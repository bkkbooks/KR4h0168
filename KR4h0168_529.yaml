front:
  text: 全唐文欽定全唐文卷五百二十九顧况二
  hash: sha256:9521eb1b38be13b3f137c561b5826bfce4d4e7f2797d6b2ac6897c33ee9d09f2
body:
  text: 右洞庭左彭蠡公所臨也先庚式武後甲徵文公所總也夫以清淨和平之德下施於民猶之不理既當其樂不觀其華不在吐曜騰光自開自落而已欣戚之氣實棲其閒繡衣使者詞客張君相閣之賢從事于公疆理一曰均賦二曰省徭三曰主文能中質茲亭之樂其可節乎蓋取之明離麗君子健應之象昔洛下鄴中蘭亭峴首文雅之盛風流之事蓋一方耳今席有芳樽庭有嘉木飲酒賦詩皆大國聖朝㣥龍振鷺握蘭佩玉者也在古其有陋乎在今其有榮乎終宴一夕寄懷千載是時也暮春駘蕩孟夏恢台之交耳楚天暮秋衰草多霜我送朱兄置酒寒塘他方有遺名之人語出世之事昔我大師居毗耶離方丈之室以虛空量納諸㣥有為法而來難於酬對兄辨才者精於語默雪山有草可生醍醐上賢不自豐故貧也上智不任數故樂也言出以機在心為咎故慎也和平發中金玉鏗鏘如秋水之溢塘殊不知長松倚空遠鶴孤唳如兄也將刀畫水水中不斷以道親人人何有別何山不可以為家何水不可以泛舟我送朱兄浮於亂流主明不在諫故諫臣在瀾漫之遊相國大司徒統戎於汴汴之介者有長鬣廣顙乘遽四方交歡諸侯以利軍實我大夫待以加等問其所欲蓋相國於其君義疏而後有誡誡存而後有別此敬相國而及子其告復乃賦平字之什以寵之春秋之義凡君子之嘉一善接一士皆欲有所用必相其宜而比之昔代之阿鄄燕侵河上晏相之薦穰苴文能附衆武能威敵果却燕晉之師珠玉在淵蘭在深林士不定方而處東陽佳地樓上隱侯之八詠溪中康樂之贈答韋生翺翔若復故都會豫放逐相逢姑蔑之山所裁新詩婉而有意凡遊山水苦無卷軸復無幽人攜手一何異飛鳥一翼行車隻輪眼界孤矣放言自遣以貺處士乎哉晉司空十四代梁尚書左僕射纘五代孫曰鳴謙問行於我我對曰乃祖蹈道隱黃鵠山乃先敦德隱朝陽山今子洽聞繼修先好是一門而三隱矣臺仲之處也雲翔冥廓亦復何礙又將嫁於四方余常適越東至剡南登天姥天姥而西即東陽太末姑蔑之地盤桓乎弋陽其山霞錦其水紺碧其鳥好音其草芳葩奪人眼睛猶未麗也仙人城在其上可以汰神可以建文可以棲闕一字子獨不見錯誅而回樂乎感隙駟之末光事塗龜之修齡觀萬化之始終道訓曰處其厚不處其薄丈夫之事豫亦從此逝矣適人之適孰與自適其適乎傳稱公侯子孫必大也天寶末安祿山反天子去蜀多士奔吳為人海帝命乃祖掌乎春官介圭建侯統江表四十餘郡雷行蟄動時况搖筆獲登龍門斷乎禮部訖乎吏部陳謀沃論五十載感恩懷故今復得子蓋天贊豫不奪前好鋪耀光列慶鍾於後相如植文文以澡行行以宣業業盛而罔有不安身安而後坦慮坦慮而後造適臻其平我恢拓尋度不在職之小大祿之厚薄在蠱乃事也十連之方九層之霄也使乎東洛盡族而來之謂何夫宣洞邑險而棲盜古不偃兵今則不然革其土樂其民安其俗阜其業客有乘堅策肥緩步闊視者張厥羽翰待風而振豫見子之達也雅之略曰有華皇皇公所以寵大夫也溫州人李庭等大歷六年入山斫樹迷不知路逢見漈水漈水者東越方言以挂泉為漈中有人煙雞犬之候尋聲渡水忽到一處約在甌閩之閒云古莽然之墟有好田泉竹果藥連棟架險三百餘家四面高山回還深映有象耕雁耘人甚知禮野鳥名鴝飛行似鶴人舍中唯祭得殺無故不得殺之殺則地震有一老人為衆所伏容貌甚和歲收數百匹布以備寒暑乍見外人亦甚驚異問所從來袁眺賊平未時政何若具以實告因曰願來就居得否云此閒地窄不足以容為致飲食申以主敬既而辭行斫樹記道還家及復前蹤㣥山萬首不可尋省商邱之地辰火之宿孟諸之湄閼伯所遷微子所封之國也厥貢絺紵厥篚纖纊有蒙盧二門有雎渙二水炊骨易子隕星退鶂仲尼之伐樹子罕之棄甲皆此地焉梁孝王時四方遊士鄒生枚叟相如之徒朝夕晏處更唱迭和天寒水凍酒作詩滴是有文雅之臺清泠之地鴈鶩之所棲集園苑三百餘里制度法於長安漢末始置為雎陽郡皇家大臣房梁公嘗牧此州今相國彭城劉公勛德有光亦典此郡前破李靈曜後破李希烈為梁開路而東方諸侯井賦鹽泉所入歲約三千萬緡商在其外明年西朝天子天子嘉之俾平水土乃拜司空俾敷五教乃拜司徒入參大政出曜威武范陽君以智略佐之由御史中丞行軍司馬節度留後而領於是邦幕府得人於斯為盛下車之日無土不殖桑麥翳野舟艫織川城高以堅士選以飽詩所謂誰謂宋遠誰謂河廣者矣自貞觀以來列名氏者以房梁公為首存乎東壁大歷之後繼聲躅者宜司徒公為首遂刊於座右貞元五年四月十九日記江表大郡吳興為一夏屬揚州秦屬會稽漢屬吳郡吳為吳興郡其野星紀其藪具區其貢橘柚纖縞茶紵其英靈所誕山澤所通舟車所會物土所産雄於楚越雖臨淄之富不若也其冠簪之盛漢晉以來敵天下三分之一其刺史沿革不同或稱太守或稱內史或稱都督他州或否如魯史晉乘侯牧一也其鴻名大德在晉則顧府君祕祕子衆陸玩陸納謝安謝萬王羲之坦之獻之在宋則謝莊張永褚彥回在齊則王僧虔在梁則柳惲張謖在陳則吳明徹在隋則李德林國朝則周擇從令聞也顏魯公忠烈也袁給事高讜正也劉員外全白文翰也洎于頔大夫作塘貯水溉田三千頃今使君詞唐景皇帝七代之孫先公尚書先公大夫奕葉之勛有功於民公實嗣之孔悝銘鼎天下重器天王裦拔于公陟襄陽節度李公陟當道觀察統諸道鹽鐵轉運二牧既陟唯公盤桓鴻鵠不飛飛即摩漢其逋者復其危者安其憂者泰所謂善緝於是拓郛耰萊就便除害政之餘力作消暑樓於南端復亭署於白蘋洲聿興廢土光明敞豁湧出溪谷其舊記吏部李侍郎紓撰其圖經竟陵陸鴻漸撰使君命况總兩家之說俶落晉宋訖於我唐凡一百九十七人及歷代良二千石儀形略也鋪張屋壁設作存勸竦神告人春秋不朽之義也貞元十有五年十二月哉生魄華陽山人顧况述正德利用阜財足食國之本也天寶末天下兵起乾元初上司奏議宜以鹽鐵之職總以社稷之臣斡乎山海之利以富人也淮海閩駱其監十焉嘉興為首朝廷以是蠲貸恆賦實乎大內大臣奉法為事選人拔其賢幹升於憲署以宣原隰光華之寵趨其署者如好鳥之棲茂林相國劉公嘗以大監小州不相若也故其職員不忝乎爵秩其刀布必倍於租入渤海高君日倫世以勛烈緩步闊視胸襟洞開中有方略不循進級故一廷評於茲二紀傾酒定交擲金巿義不餌不仁之粟前使張侍郎滂王尚書緯總其卜式宏羊之計遂有採山煮海之役十年六監興課特優至是未期從百萬至三百萬鹽一作監人賈人各得其所故端介之節風彩自高繼夫漕運波委陸溢此天下之利器也可示人乎夫以步光莫耶切玉如泥刜鐘無聲不以一割均其銛鈍君子以知人則哲無德不酬鴻飛九霄驥騁千里前祕書省著作佐郎顧况美使臣之得人貞元十七年歲在辛巳正月朔記陶氏之隱誥云張李二君勤行仁義異代同德慶鍾包君鮑靚通靈之士秦有包邱漢有包咸世為學官隨晉南渡今為延陵人也隋書儒林傳包愷包愈兄弟皆治漢書從子弟千餘人樹碑紀德惟皇六葉鴻臚宣力於王室著作垂名於當代起居祭酒聲隱都野與翰林供奉朝析其流派君辟秀才以文字自附嘗夢入冥府浹時而蘇根於修短有開之兆言地下之法峻於人閒頗符干寶搜神之事隨難奉天重圍暗解上撫其背而春官亦以賓禮待之及為華亭有闢田增戶均賦愛人之政語曰千室之邑百乘之家由也可使治其賦而君實有之舊章壁記記其官敘野史之流也平原之谷水崑山鱸魚蓴菜海錯陸産彼何人而不知今記其異庶有補於化耳博陵崔公端憲臺出九江涉吳換虢三牧作乂仁聲上騰上裦之以宣歙等州團練觀察採石軍使內棲茂行外傳純德德鋪生人生人受賜所部無事緝乎井屋高棟大廡樓傳高亭署以崇牙虔君命也略五千架圬墁赭堊燭乎一川竹釘木㞕皆適所用前鎮未之有也其辟一士未嘗不當其任其裁一未嘗不以憂人為心兵馬使南陽張伯陽承公指揮應接不暇廣而不費華而中儉堡有嚴柝封有巨防巢洞之寇化為平民銅官戰馬牛渚姑熟之隘籠波絡谷莫不帖焉夫宣戶五十萬一戶二丁不待募於旁郡而宣男之半已五十萬矣跖徑弩耀雄㦸吞敵如脯戎心不啓其或有啓戎心備鋭而襲之淮海之援過賓之寵亦所以補凡例也庚辰年正月下旬日前祕書著作郎顧况記衆樂琴之臣妾也廣陵散曲之師長也琅邪王淹兄女未笄忽彈此曲不從地出不從天降如有宗師存焉曲有日宮散月宮散歸雲引華嶽引意者虛寂之中有宰察之神司其妙有以授王女於戲天地鄙吝而絶神明倜儻而授中散沒而王女生一作傳其閒寂寥五六百年先王作樂殷薦上帝有不得而聞者鼓鐘時動敢告於太師皇帝建立甲子考定星歷於是有天地神人之官少昊既衰神人雜擾顓命羲和以司天地三苗九黎不復亂逆周室既壞君不告朔漢道隆興方定餘閏世時昭昧君平季主張衡索紞陳訓韓友卜珝京房管輅郭璞干寶樂房班固云陰陽多拘忌以為無益嗟乎古論陰陽以和神人以順風雨以播稼穡以除災害後之學者但張恢譎不自戒慎不固親疏之道不精逆順之理不達性命之分而裁衣拜官沐浴翦爪徵於歷日豈不悖哉左道亂政先王無赦往見術者序卜筮之書及諸家祕訣七曜九宮六壬三五復返十精飛鳥天目地耳計神漢以天赦母倉為吉朔歷以雲漢密莫為吉各生異氣天竺律法復與大衍有差吾誰歸矣又以姓配音以音配墓以墓配殺此莊惠以荒唐舛駮之論且黃帝二十五子得其姓者十三人或以地為姓或以官為姓或以諡為姓或以王父字為姓士會在虞為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜在晉為范宣子在隨為隨武子在秦為劉氏女嫁欒黶為祁氏焉此一人之身改姓三改氏五范蠡在陶為朱公在齊為鴟夷子范雎稱張祿先生第五倫王伯齊鮑永本姓包京房本姓李張良之後為留氏田橫之後為王氏姓有兩字三字四字五字孰先孰後孰是孰非長平同坑南陽同封時日或同吉凶或異行年本命其事安在周時玉尺漢代黃鐘河汾鼎氣沈埋自久不可仰則其道多門行則無盡不如也是故文字非上學上學神聽原其性也集解非宗師宗師授受扶於理也端心靜一神明將至黃帝遺元珠象罔得之漢主心動獲貫高襄子心動得豫讓披髮祭野野人之遺魂非有陰陽算術之功涉津無涯安濟所届釋氏五蔭輪為四生或居人中以為鬼神唯代有佛法獨能究竟白雲依山出入自得飛鳥以滅虛空不礙清明在躬志氣如神陰陽不測唯佛而已周語之略曰孝敬忠信仁義智勇教惠讓皆文也天有六氣地有五行此十一者經緯天地叶和神人名之為文其實行也文顧行行顧文文行相顧謂之君子之文為龍為光上古云言之無文行之不遠堯之為君聰明文思文王既沒文不在茲乎文王之代草木鳥獸皆樂文王之沼曰靈沼文王之臺曰靈臺虞芮不識文王入文王里所見耕者讓畔行者讓路班白不提挈自相謂曰吾黨之小子不可治於君子之庭詩人美之云文王斷虞芮之訟晉文與楚子戰而霸諡曰文公夫以伏羲之文造書契黃帝之文垂衣裳重華之文除四凶舉八元周公之文布法於象魏夫子之文木鐸徇路此其所以理文也伊尹之文放太甲霍光之文廢昌邑呂尚之文殺華士穰苴之文斬莊賈毛遂之文定楚從藺相如之文奪趙璧西門豹之文引漳水沈女巫建安正始洛下鄴中吟咏風月此其所以亂文也夫以文求士十致八九理亂由之君臣則之舜堯禹湯有文桀紂幽厲無文太顛閎夭有文飛廉惡來無文昔霍去病辭第曰胸奴未滅無以家為於國如此不得謂之無文范蔚宗著後漢書其妻不勝珠翠其母唯薪樵一廚於家如此不得謂之有文且夫日月麗乎天草木麗乎地風雅亦麗於人是故不可廢廢文則廢天莫可法也廢天則廢地莫可理也廢地則廢人莫可象也郁郁乎文哉法天理地象人者也周易贊乾曰大哉乾元萬物資始贊坤曰至哉坤元萬物資生唯大者配乾至者配坤幽者賾鬼神明者賾禮樂不失於正謂之為文金剛記寶頂記花三昧頂輪三昧等經云蘇迷盧南有俱露州州西南面夷羅國俱尸那城南去八千由旬至於雪山茲山純白厥草肥膩高六十由旬周二千二百拔提河在左長仙園在右清熱惱海在南跋陀海在北善法堂在上瞽龍洞在下日月回泊在俱物羅奢半空脅是龍居此洞地堅牢恆沙諸佛成道諸所如意輪於此山閒佛言毗勒那鉢奢無忘無心是離那奢多性本空是祗彌物都思觀身實相是悉那鉢多彌觀佛亦然是又問何者是陀羅尼相貌佛言空觀心無為心廣大心常住心不變異心無無心無無心是恆沙諸佛諸佛摩頂密語也言在身中恐人輕教諸佛不許內外雙立非賢不轉如意輪本名少足少法也其法滿足謂之少足與夫圓滿滿願廣大大悲等慈慈觀智網寶手千手眼得無畏清淨光除業道破諸暗無障礙無等等與夫普明慈明千光王佛十億之號猶為至略淨華宿王智佛時所立名記普門願行此應見聞隨方說法法同而名異固云賢劫中千佛助化此為一佛二尊不並願為侍者寶德佛時名庶命仙人定光佛時名安忍童子請願之後名如意輪大悲菩薩是愚於蔭界畫彼真形法華經云一華獻畫像漸見無量佛讚曰同體如來所說總持法內外雙建為普門大悲廣運無邊際已渡塵沙生滅海圓滿滿足各如意破除業暗發光彩亭亭石傘有物有名如蓋若傾如芝一莖又如搖袂拂著上清俯踏不平仰捫雲行石傘山東山銜日宮石傘山西山銜月宮南巒北阜首出屹雄千里在掌五更見日我來豫疾毛竪汗出齊侯賁趾以隱為榮往往洞穴聞金奏聲橡栗裊險猿猴相爭喬木千尋凡人幾生芳樹洌泉懵夫惶愡螺旋錦沓鶴鳴山空杳兮神乎不宰其功龍在甲寅永嘉大水損鹽田溫人曰雨潦不止請陳牲豆備嘉樂祀海龍揀辰告廟拜如常度况曰不可夫天雨若其冥數也天苟不已龍曷能已先王經物祀典有常今海為川長龍為介長不應祀而祀之非禮也動不合禮祀猶不典頽典毀教罪之大者也夫溫夷越雜居役斂煩多皆有遠志宜昭賞刑謹吏則勤而不懈猶恐罔從而淫神貪福海盜亦將亂溫人其不免乎昔三王祭川先河後海而諸侯祭其疆季氏旅於梁甫孔子譏之今海廟在溫溫人其可祭乎神禍慢祉虔醜回嘉直者也驅迫窮氓索罄南邑罔其神以縱毋乃不可乎三代之祈甘雨也則納稷契其除水害也則流共工其愛人勝祀翼日雨止鹽人復本泉貨充府
