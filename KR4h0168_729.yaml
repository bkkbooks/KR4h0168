front:
  text: 全唐文欽定全唐文卷七百二十九龜從字元吉清河人元和十二年登第以三中賢良方正拔萃科釋褐拜右拾遺太和二年改太常博士纍轉考功郎中史館修撰九年轉司勛郎中知制誥正拜中書舍人開成初出為華州刺史三年入為戶部侍郎四年權吏部尚書大中四年為中書侍郎同平章事六年罷為宣武節度使數徙鎮卒
  hash: sha256:2153ce8028a666460badf6c5f12d25a36a65f1bc73995d4ca05c3e523282ebfa
  markers:
