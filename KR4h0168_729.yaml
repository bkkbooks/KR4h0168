body:
  text: 伏以近日文武三品以上薨卒皆為輟朝其有未經親重之官今任是散列者為之變禮誠恐非宜自今已後文武三品以上非曾建功勳及曾任將相及曾在密近宜加恩禮者餘請不在輟朝例其餘並請依元奏狀當管三州水陸官驛先準敕文條流水夫具有定制并不許行轉牒供券外剩人歲月滋深仍被過客格外干求剩索人夫別配糧料臣今欲條流諸道節度觀察使刺史及諸道監軍別敕判官赴任及歸闕庭若有家口及參從人即量事祇供其本管迎送軍將官健所由諸色受雇人等本道既各給程限兼已受傭直並請不供伏恐使客曾得館驛分外祇供忽此遭減必巧言謗讟上聞聖聽今欲準此釐革不敢不奏九宮貴神舊制是太祀伏以九宮貴神經典不載天寶中術士奏請遂立祠壇事出一時禮同郊祀臣詳其圖法皆主星名縱司水旱兵荒品秩不過列宿今者五星悉是從祀日月猶在中祠豈容九宮獨越常禮備列王事誡誓百官尊卑乖儀莫甚於此若以嘗在祀典不可廢除臣請降為中祠伏以廢朝軫悼義重君臣所貴及哀尢宜示信自頃已來輟朝非奏報之時備禮於數日之外雖遵常制似不本情臣不敢遠徵古書請引國朝故事貞觀中任王褱卒有司對仗奏聞太宗責其乖禮岑文本既歿其夕為罷警嚴張公謹之亡哭之不避辰日是知憫悼之意不宜過時臣謂大臣薨禮合輟朝縱有機務急速便殿須召宰臣不臨正朝無爽事體如此則由衷之信載感於幽明稱情之文無虧於典禮臣審詳孝字載考禮文義本主於子孫理難施於兄弟按禮記十虞之文子孫曰哀兄弟曰某然則虞之稱哀與祭之稱孝其義一也於祖禰則理宜稱孝於伯仲則止可稱名又東晉溫嶠議宗廟祝辭於孝字非子者則不稱傍親直言敢告當時朝議咸以為宜今臣上考禮經無兄弟稱孝之義下徵晉史有不稱傍親之文臣謂饗敬宗廟宜去孝弟兩字余長慶三年從事河中府一夕夢與人入官署及其庭望見室內有人當陽儀衛甚偉又一人側坐容飾略同而皆隆準睅目搦管視几狀若決事者因疾趨及階拜唯而退行及西廂視廡下牖間文簿堆積於大格如今之吏舍有吏抱案而出因迎問曰此當是陰府某等願知祿壽幾何吏應曰二人後且偕為此州刺史無勞閲簿籍也余時試評事官不期達因自念曰得為郡足矣及出門又見同時從事席地而樗蒱既寤大異之髣佛在目唯所與同行者夢中故知其姓名是嘗所遊及覺遂忘其人明日入公府話於同舍皆故為吉解曰君夢得郡而又見樗蒲君後當知主秉節臨蒲州乎爾後每入祠廟輒省所夢當時屢謁河瀆及為華州拜西嶽屋宇神像皆非夢中所見前年四月自戶部侍郎出為宣州去前夢二十年矣五月至郡吏告曰昭亭神實州人所嚴奉每歲無貴賤必一祠焉其他祈禱報謝無虛日以故廉使至輒備禮祠謁余時方痔病瘍發於尻不便於跪起至秋疾愈因祇謁廟下既易公服盥手執笏而進及門恍然屏上有畫人抱案而鞠躬夢中之吏也入廟所經歷無非昔夢惟無同行者及歸私以告妻子明年七月得疾苦下泄尤不喜食暮夜輒大劇因自稱前夢以為吏所告者吾其終於此乎因心禱之既寐又夢晨起視事如常時將就便室及側門有家吏姚桂者附耳言曰左府君使人傳語聞之心悸而毛竪意其非常人就室未及坐有一人戎服捉刀奔趨而入視其狀魁岸面黝而加赤不類人色紫衣黯剝乃昭亭廟中階下土偶人也未及語余厲聲問之曰我年得幾許遽應曰得六十幾夢中記其言及覺遂忘其奇數意者神不欲人逆知其終歟遲明自為文以祝神具道所以命兒姪持酒牢以禱先是疾作醫言疾由寒而發服熱藥輒劇遂求醫於浙西廉使盧大夫為臣命醫沈中象乘驛而至既切脉且言曰公之疾熱過而氣壅當以湯治之藥劑以甘草犀角為主如其言涉旬而稍間經月而良已自以為必神之助又自為文以祝神因出私俸修廟之壞隳加置土偶人馬垣墉之畫繪者一皆新之大設樂以享神自舉襟袖以舞始長慶感夢之時絶不為五木之戲及至江南方與從事盛為呼盧以賭勝至是又驗云嗟乎鬼神之事聞見於經籍雜出於傳聞其為昭昭斷可知矣然而聖人不語者懼庸人之捨人事而媚於神也吳越之俗尚鬼民有病者不謁醫而禱神余懼郡人聞余感夢之事而為巫覡之所張大遂悉紀其事與祝神之文刊之於石因欲以權道化黎氓使其知神雖福人終假醫然後能愈其疾耳宣州圖經云宋永初山水記宛陵北有昭亭山山有神祠又案齊諧記云宋元嘉二年有錢塘神姓梓名華居住東境友人雙霞乃識之神遂得與攜接同住廟中更具酒食言宴別後縣令盛凝之縱火焚燒來託此山百姓恭祭乃號昭亭山至今祠禱必致靈驗謝元暉為文又有賽昭亭兩詩文嘗遊此賦詩曰茲山亘百里合沓與雲齊隱淪既已託靈異居然棲維開成五年歲次庚申九月甲戌朔十四日丁亥宣歙池等州都團練觀察處置等使朝散大夫使持節宣州諸軍事守宣州刺史兼御史大夫上柱國賜紫金魚袋崔龜從謹遣長男詳等以牢醴駝馬之奠致祭於梓華府君之神惟神託跡靈山興自宋時昔之賢守已形歌詩斯邦之人虔奉靈威有危必禱有疾必祈嘉報昭應響答影隨龜從謬忝觀風志撫惸釐苦心剋己神其鑒知頃以請禱伏拜廟墀惝恍昔夢悟於斯時爰自秋夏疾作體羸因捨官俸補廟之隳涉旬有間藥與醫宜昨暮得夢靈告壽期廟有偶人宛其容姿於戲神理昭晰不可度思顧惟瑣陋神實保持遽備薄薦以謝以祈扶疾操管恭述其辭冀獲良已齊戒率袛大具牢醴樂以侑之仰答神佑庶民不欺尚饗彥威太原人元和中舉明經甲科大和時纍遷司農卿拜平盧節度使開成中檢校禮部尚書為忠武軍節度使徙宣武封北海縣子卒贈尚書右僕射諡曰靖臣謹按開元禮凡受冊官並與卑官答拜國朝官品令三師三公正一品尚書令正二品並是冊拜授官上之日亦無受朝官再拜之文僕射班次三公又是尚書令副二之職雖端揆之重有異百寮然與㣥官比肩事主禮曰非其臣即答拜之又曰大夫之臣不稽首非尊家臣以避君也即僕射上日受常參官拜事頗非儀况元和七年已經奏議酌為定制編在國章近年上儀又有受拜之禮禮文乍變物論未安請依元和七年敕為定起自至德乾元之際迄於貞元元和之初天下有觀察者十節度者二十有九防禦者四經略者三犄角之師犬牙相制大都通邑無不有兵都計中外兵額又至八十餘萬長慶戶口凡三百三十五萬而兵額又約九十九萬通計三戶資奉一兵今計天下租賦一歲所入總不過三千五百餘萬而上供之數三之一焉三分之中二給衣賜自留州使兵士衣食之外其餘四十萬衆仰給度支伏以時逢理安運屬神聖然而兵不可弭食哉惟時憂勤之端兵食是切臣謬司邦計虔奉睿圖輒纂事功庶裨聖覽社者神地之道也郊特牲而社稷太牢鄭元以為國中之神莫貴于社固前古為大祀至天寶三載二月十四日敕云祭祀之典以陳至敬名或不正是相奪倫况社稷孚祐百世蒙福列為中祀頗紊大猷自今以後升為大祀爾後因循又依開元禮為中祀然而牲用太牢太尉攝行事祭之日不坐並是大祀之義列為中祀是因循謬誤教人報本未極崇嚴有國之儀惟此厭屈今請准敕升為大祀庶合禮中議曰于頔剛毅特立博遊文藝蘊開物成務之志為從橫倜儻之才剌湖州復南朝舊陂以溉人田由是斥鹵生稻粱歲時大化得丁壯之物籍者取什一代貧人租入故輕重以濟江南卑溼送終者無懸窆封樹之制高則不隱深則及泉土才周棺水至露胔頔悉命以官地收瘞當時稱之為蘇州則繕完隄防疏鑿畋澮列樹以表道決水以溉田其為襄陽當吳少誠弄兵王師有征軍不乏見糧師未嘗退表克吳房朗山生得賊將遽以兵柄授之推誠於人有古將略然惜其不能善終如始奉初以還跋扈立名滿盈不戒則有司擬議之際安可不善善而惡惡哉元洪剌郡以官事被謫中貴人銜命部領便道之徙所路出於漢頔遽命武士持刃捕捽洪既就執王人徒歸又不奉詔出師而西抵于鄧軍聲甚雄人聽日駭夫師出以律其出不命時人不能識其指歸王者功成而作樂諸侯則否頔之反斾於蔡也作文武順聖樂貞元御宇務求寵綏有司請編優詔許之事出一時之澤樂作諸侯之庭良可惜哉然則如頔者是知樂之可作而不知禮之不可作者也迹其馭衆為政之術蓋初以利興害去為己任而令行禁止其源出於法家者流文深意苛有犯無捨至有屋誅同命之慘然未嘗別白其罪以示顯戮人到于今而冤之洎乎天恩下浹元侯入覲朝廷申婚姻之好復以宰相待之則又子罪官貶而連起國獄縉紳之論寖益非之謹按諡法殺戮不辜曰厲愎狠遂過曰厲請諡為厲或曰頔繇文學政事而揚歷中外卒當登壇補衮之寄推於事任亦謂難能則易其名者宜兼舉美惡二字以正褒貶今特諡為厲或有未安愚以為不然夫類能而授聖人之勸勉議諡貴當有司之職分禮經言諡蓋節以一惠至于論撰之際要當美惡咸在細大無遺議乎諡名則以優迹春秋之義也况援其功不足以補過契其美不足以掩瑕其馭下也任威少恩其事上也失忠與敬諡之為厲不亦宜乎天子之葬七月春秋之義志崩不志葬必其時也舉天下葬一人故過期不葬則譏之高祖中宗葬皆六月太宗四月高宗九月睿代二宗皆五月德宗十月順宗七月惟元肅二宗皆十二月有為為之非常典也且葬畢而虞虞而卒哭卒哭而祔皆卜日今葬卜歲暮則畢祔在明年正月是改元慶賜皆廢矣謹按國初故事無兩都並建宗廟並行饗祭之禮伏尋周書召誥洛誥之說實有祭告豐廟洛廟之文是則周人兩都並建宗祧至則告饗然則兩都皆祭祖考禮記並興自神龍復辟中宗嗣位廟既偕作饗亦並行天寶末兩都傾陷神主亡失肅宗既復舊物但建廟作主於上都其東都神主至大歷中始于人間得之遂寓於太微宮不復祔饗臣等謹按經傳王者之制凡建居室宗廟為先廟必有主主必在廟是則立廟兩都蓋行古之道主必在廟實依禮經今謹參詳理合升祔謹按元皇帝是追王高宗中宗睿宗是祧廟之主其神主合藏於太廟從西第一夾室景皇帝是始封不遷之祖其神主合藏於太廟從西第一室高祖太宗元宗肅宗代宗是創業有功親廟之祖伏準江都集禮正廟之主藏於太室之中禮記㣥廟之主有故則聚而藏諸祖廟伏以德宗之下神主未作代宗之上后主先亡若歸本室有虛神主事雖可據理或未安今高祖已下神主並合藏於太祖之廟依舊準故事不饗如陛下肆覲東后移幸洛陽自非祧主合歸本室其餘闕主又當特作而祔饗時祭禘祫如儀臣又按國家追王故事太祖之上又有德明興聖懿祖別廟今光皇帝神主即懿祖也伏緣東都先無前件廟宇光皇帝神主今請權祔於太廟夾室居元皇帝之上如駕在東都即請準上都式營建別廟作德明興聖獻祖神主備禮升祔又於太廟夾室奉迎光皇帝神主歸別廟第四室禘祫如儀或問曰禮作栗主瘞桑主漢魏並有瘞桑之議大歷中亦瘞孝敬皇帝神主今祔而不瘞如之何答曰禮作練主瘞虞主其義以桑栗代謝捨故取新夫作主以依神無可埋之理是以禮說廟之主藏於西壁北壁之中故韋元成議瘞太上皇惠帝之主終見非於漢代秦靖請瘞處士君亦不行於魏朝貞觀中議遷廟主亦云萬國宗饗食所從來一旦瘞藏事非允愜孝敬尊非正統廟廢而主獨存從而瘞藏謂叶情理又問古者天子巡狩必載遷主如鑾駕東幸則準此文載主而前今東都神主又祔於廟便是廟有二主如之何古者師行以遷主無則主命自非遷祖之主別無出廟之文凡邑有宗廟先君之主曰都則兩都宗廟各宜有主又問曰古者作主必因虞練若主必歸祔則室不可虛則當祔已亡之主創當祔之主禮經無說如之何答曰虞練作主禮之正也非時作主事之權也王者遭時為法因事制宜苟無其常則思其變如駕或東幸廟仍虛主即準肅宗廣德二年上都作主故事特作闕主而祔蓋主不可闕故禮貴從宜春秋之義變而之正者也臣伏思祖宗之主神靈所憑寓於太微不入宗廟據經復本允屬聖明元載諡成則不得為縱縱則不得為成成縱並施美惡齊致考之常法實不通經夫蕭瑀諡貞詔命加褊事出恩制不可據依爾後崔韶以平厲諡楊炎以壯繆易伊慎此皆惑於貞褊混淆不可之文祥在駮議今明其說恐誤後來古之聖王立諡法者所以彰善惡垂勸誡使一字之褒賞踰紱冕一言之貶辱過朝市此有國之典禮陛下勸懲之大柄也頔頃擁節旄肆行暴虐人神共憤法令不容擅興全師僭作王樂侵辱中使擅止制囚殺戮不辜誅求無度臣故定諡為厲今陛下不忍改賜為思誠出聖慈實害聖政伏以陛下自臨宸扆懋建大中聞善若驚從諫不倦况當統天立極之始所謂執法慎名之時一垂恩光大啓僥幸且如頔之不法然而陛下不忍加懲臣恐今後不逞之徒如頔者衆矣死援頔例陛下何以處之是恩曲於前而弊生於後若以李吉甫有賜諡之例則甫之為相也有犯上殺人之罪乎以頔况之恐非倫類如以頔常入財助國改過來覲兩使絶域可以贖論夫傷物害人剝下奉上納賄求幸尢不可長其漸焉自兩河宿兵垂七十年王師憓征瘡痏未息及張茂昭以易定入覲陳權以滄景歸朝故恩禮殊尢以勸來者而于頔以文吏之職居腹心之地而倔強犯命不獲已而入朝豈茂昭之比乎縱有入財使遠之勤何以掩其惡迹伏望陛下恩由義斷澤以禮成褒貶道存僥幸路絶則天下幸甚伏惟禮經三代之制始封之君謂之太祖太祖之外又祖有功而宗有德故夏后氏祖顓頊而宗禹殷人祖契而宗湯周人郊祀后稷祖文王而宗武王自東漢魏晉漸違經意沿革不一子孫以推美為先自始祖已下並有建祖之制蓋非典訓不可法也國朝祖宗制度本於周禮以景皇帝為太祖又祖神堯而宗太宗自高宗已降但稱宗謂之尊名可為成法不然則太宗造有區夏理致升平元宗掃清內難翊戴聖父肅宗龍飛靈武收復兩都此皆應天順人撥亂反正至於廟號亦但稱宗謹按經義祖者始也宗者尊也故傳曰始封必為祖書曰德高可宗故號高宗今宜本三代之定制去魏晉之亂法守貞觀開元之憲章而擬議大名垂以為訓大行廟號宜稱宗通穆宗朝官少府監大和時為國子祭酒當司所授丞簿及諸博士助教直講等謹按六典云丞掌判監事凡六學生每有業成上于監者以其業與司業祭酒試之明經帖經口試策經義進士帖一中經試雜文策時務徵事注云其試法皆依考功口試明經帖限通八以上明法明算皆通九以上主簿掌印勾簡凡學生有不率師教者則舉而免之其頻三年下第九年在學無成者亦如之注云假如違程限及作樂雜戲者同准彈琴習射不禁諸博士助教皆分經教授學者每授一經必令終講所講未終不得改業諸博士助教皆云諸學生讀經文通熟然後授文講義每旬放一日休假前一日博士考試其試讀書每干言內試一帖帖三言講義者每二千言內問大義一條總試三條通二為及第通一及全不通者斟量決罰謹具當司官吏及學生令典條件如前伏望敕下有司允臣所奏越中山水之奇麗者剡為之最剡中山水之奇麗者金庭洞天為之最其洞在縣之東南循山趾而右去凡七十里得小香爐峯其峯即洞天之北門也谷抱山鬬雲重煙巒回互萬變清和一氣花光照夜而常晝水色含空而無底此地何事嘗聞異香有時值人從古不死真天下之絶境也有晉代六龍失馭五馬渡江中朝衣冠盡寄南國是以琅琊王羲之領右軍將軍而家於此山其書樓墨池舊制猶在至南齊永泰九年道士褚伯玉仍思幽絶勤求上元遂啓高宗明皇帝又於此山置金庭觀正當右軍之家故書樓在觀之西北維一間而四徘徊高可二丈已下墨池在尊殿之東北維方而斜廣輪可五十尺已下池樓相去東西羡值才可五十餘步雖形狀卑小不足以壯其瞻玩而恭儉有守斯可以示於將來况乎處所遐深風景秀異契逍遙之至理閲鸞鶴之參差其金庭洞天即道門所謂赤城丹霞第六洞天者也案上清經其洞天在天台桐柏山中辟方四十里其北門在此小香爐峯頂人莫得而見之有山樵夫往往見之者或志之以奇花異草還報鄉里與鄉里同往則失其所志也過此峯東南三十餘里有石竇呀為洞門即洞天之便門也或人或入之者必贏糧秉燭結侶而往約行一百里二百里多為流水淤泥所阻而返則莫臻其極也通以元和二年三月二三道友裹足而遊登書樓臨墨池但見其山水之異也其險如崩其聳如騰其引如肱其多如朋不三四層而謂天可升經再宿而還以書樓缺壞墨池荒毀話之於邑宰王公王公瞿然徵王氏子孫之在者理荒補缺使其不朽即事題茲實録而已行餘元和時第進士纍擢京兆少尹太和初遷楚州刺史移汝州入為大理卿李訓謀誅宦官令募兵授邠寧節度使事敗及難京兆府在漢有尹有都尉有丞皆詔自除循而不改開元時諸王為牧故尹為長史司馬即都尉丞耳令尹總牧務少尹副焉未聞道路間有下車望塵拜者故事猶在倞刑部尚書汝士子元和時官大理評事昔周公稽古三五之道損益夏殷之典制禮作樂以仁義理天下其德化刑政存乎詩至於幽厲失道始變風變雅作矣平王東遷諸侯力政逮五霸之後則王道不絶如線故仲尼定禮樂作春秋然後三代遺風弛而復張而無時無位功烈不得被于天下但門人傳述而已陵夷至於戰國於是申商苛虐孫吳變詐以族論罪殺人盈城談說者又以慎墨蘇張為宗則孔氏之道幾乎息矣有志之士所為痛心疾首也故孟軻闡其前荀卿振其後觀其立言指事根極理要敷陳往古掎挈當世撥亂興理易於反掌真名世之士王者之師又其書亦所以羽翼六經增光孔氏非徒諸子之言也蓋周公制作之仲尼祖述之荀孟贊成之所以膠固王道至深至備雖春秋之四夷交侵戰國之三綱弛絶斯道竟不墜矣倞以末宦之暇頗窺篇籍竊感炎黃之風未洽於聖代謂荀孟有功於時政尤所耽慕而孟子有趙氏章句漢氏亦嘗立博士傳習不絶故今之君子多好其書獨荀子未有注解亦復編簡爛脫傳寫謬誤雖好事者時亦覽之至于文義不通屢掩卷焉夫理曉則愜心文舛則忤意未知者謂異端不覽覽者以脫誤不終所以荀子之書千載而未光焉輒用申抒鄙意敷尋義理其所徵據則博求諸書但以古今字殊齊楚言異事資參考不得不廣或取偏傍相近聲類相通或字少增加文重刊削或求之古字或徵諸方言加以孤陋寡儔愚昧多蔽穿鑿之責於何可逃曾未足粗明先賢之旨適增其蕪穢耳蓋以自備省覽非敢傳之將來以文字繁多故分舊十二卷三十二篇為二十卷又改孫卿新書為荀卿子其篇第亦頗有移易使以類相從云時歲在戊戌大唐睿聖文武皇帝元和十三年十二月也公諱紓字無畏扶風平陵人曾祖行炎媯州刺史祖於龍平州刺史父實右驍騎將軍御史中丞並有功幽蘭書勳竹帛公即中丞第草五子幼有奇節性唯聰悟見古名將勳業之事未嘗不廢書發憤沈吟久之闕寄河朔志蕃王室欲變風俗期乎坦夷遂委質戎府纍遷魏大將自天寶末安史為亂雖克勦闕翻恣驕凶以故將帥帶州連郡蕃貢罕至而魏博諸田相繼立元和中上以文德武功定叛亂雖魏帥詐順尋亦如舊大和初滄帥李全略死子同捷盜襲其位先皇震怒徵兵討之魏帥以封壤連接潛相應援時中書令裴公掌兵柄謀撓魏事公以才辨為戎帥率如每有奏請獨當其任遂申密款於裴公天子嘉之乃大張皇威深述聖旨開向國之福戎覆巢之厄帥立歸誠未幾王師大捷而同捷就戮萬夫解甲兩河肅清皆公始謀之力天子以公忠果可任大事拜左武衛將軍後出為寧州刺史在郡有聞堂帖赴闕拜右領軍大將軍至開成中博陵更師丞相進闕取可繼作者以蔚為闕鄰闕易遷就乃拜公蔚州刺史兼御史中丞洎中謝文宗皇帝臨軒歎賞面許重事以遣之既收安遷公綏戎以德撫下以恩野無南牧之虞俗講東里之禮三年去任執轅遮道者闕路蔚人思公令德日闕於廉帥廉帥聞於朝廷又拜蔚州刺史闕疾闕尋西河上聞之惻然候疾愈方授以大柄神不庇善以會昌四年三月十日終於所寄之第享年五十六嗚呼才長壽促志遠途窮闕廣所以為有識所歎公兩娶裴氏張氏皆名族生一男二女男補太廟齊郎娶徐氏次女適裴氏長女在室即以其年七月十日歸窆於關中少陵原祔其先塋合先之墓禮也銘曰皇道熙熙天寶末盜弄干戈正猖獗滄帥死兮有餘枿魏為親鄰志相活河海橫流馬公遏溟盜亟誅天被闊忠義克彰遂聞達天子臨軒歎賢傑將委邊陲闕勳烈將分竹符後闕鉞所理蘇息無饑渴才有餘兮悲未豁長衢方騁摧輗軏彼蒼者天何謁謁嗚呼馬君道消歇中壽未登神奄絶唯有雄名流不竭
