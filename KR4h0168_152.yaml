front:
  text: 全唐文欽定全唐文卷一百五十二許敬宗二
  hash: sha256:a4342ea0e426ce28df137462823c4b57cbdb99a66a94b91570200f4106bb5f3e
body:
  text: 臣聞古人蒞職不膳池魚前良罷官尚留家犢拔園葵而自潔垂往哲之通規飲吳水而齊清標曩代之遺則若乃營求不巳貪猥無厭徇私利而黷官方挾朝權而侮天憲有一於此必置明科風聞唐儉往任尚書之日付託前鹽州刺史張臣合遣録事參軍張正表元大節等專令檢校牧放私羊所判文書自云檢示約束剪毛之貨易州僚判署潛立公文市司勘估一同官案並有放羊人康莫賀咄所署文牒共稱牧長依問巡察使楊謨狀與所聲秩同謹按前兵部尚書光祿大夫莒國公唐儉門資斗食器劣瓶筲在勢為優唯聞酒德席賓常滿無匪博徒以逐兔之微庸屬鳳翔之興運功未參於執帛賞巳茂於桓圭效無補於經綸位乃隆於常伯由是越自泥滓超驤雲漢甲第高門與絳灌而並列朱輪翠蓋共吳鄧以齊驅寵出勳前化家開國任超才表揮翼在梁瀝膽隳肝未答謬官之刺驛魂飛魄豈謝匪服之榮反復乘此恩波肆其溪壑之性憑茲惠渥縱其姦慝之心敢以私産託於州將芻豢交易並立案於曹司牧圉家童咸假署於名級情包僭擬家有擅除以此論深驚視聽稽諸往冊國有常科其鹽州刺史張臣合昔在部符寵膺繁露趨其勢位擅役官僚資給貪夫成其敗類順行私令汨亂天綱請皆付法以清攸斁無任嫉惡之至謹奉白以聞臣聞元儲以貴立嫡之義尤彰罔敢同名正本之文逾顯所以內崇宗廟外重郊社取鑒前王行之自久陛下憲章千古含育萬邦爰立聖慈母儀天下繼而皇后生子合處少陽出自塗山是謂吾君之允夙嫻胎教宜展問豎之心乃復為孽奪宗降居藩邸縱然養德猶韜甲館之符未纂承華尚阻商山之道是使前星匿彩瑤嶽韜峯臣以愚誠竊所未喻且今之守器素非皇嫡永徽爰始國本未生權引彗星越升明兩近者元妃載誕正允降神重光有融爝暉宜息安可以濫茲皇統叨據溫文國有諍臣孰逃其責謹按春秋左氏傳云隱公元年春不書即位攝也昔宋武公生仲子有文在其手曰為魯夫人故仲子歸於我生桓公是以隱公立而奉之自營菟裘遜而歸老孔子褒其讓嫡旌於比事之書又東觀漢史云光武皇帝子彊居長建武之初為皇太子及皇后陰氏有子曰莊繇是彊不自寧固求遜位帝乃從之封彊為東海王竟以莊為太子是為孝明皇帝竊惟息姑克讓可以思齊劉彊守藩宜遵往軌追蹤太伯不亦休乎踵武延陵固當安矣寧可反植枝幹久易位於天庭倒襲裳衣使違方於震位蠢爾黎庶云誰係心垂裕後昆將何播美又且父子之際人所難言事或批鱗必嬰嚴憲臣竊為身計苟且隨流尸祿偷榮故知無咎伏自思忖荷眄先朝引於陋巷之中申以後車之禮雲臺畫象十有八人三紀於茲唯臣僅在趨事陛下綿歷二坊叨處調護之流濫齒正人之伍蔭璇華於望苑雕朽木以為容推鑾轂於天衢偶雞樹而徒老常思勉力少報洪恩既屬天步康寧效沈族而無所太階平晏須焚宗而靡由今茲冡嗣執圭下枝當璧孟侯淪屈大典未申臣既分職文昌典司嘉禮位陪宗伯弗敢曠官效命之秋宜在茲日所以思不出位輕呌帝閽冒嚴威干斧鉞忘忌諱竭精誠天或弗違從其至理朝聞夕殞忭若登仙如塞讜言譴其芻瞽煎膏染鼎亦所甘心仍望奉見指陳彞典按令光祿式祭天地日月嶽鎮海瀆先蠶等籩豆各四祭宗廟籩豆各十二祭社稷先農等籩豆各九祭風師雨師等籩豆各二尋此式文事深乖謬社稷多於天地似不貴多風雨少於日月又不貴少且先農先蠶俱為中祭或六或四理不可通先農之神尊於釋奠籩豆之數先農乃少理實差舛難以因循謹按禮記郊特牲云籩豆之薦水土之品不敢用褻味而貴多品所以交於神明之義也此即祭祀籩豆以多為貴宗廟之數不可踰郊今請大祀同為十二中祀同為十小祀同為八釋奠準中祀自餘從座並請依舊式新禮祭畢收玉帛牲醴置於柴上然後燔柴燎壇之左臣敬宗謹按祭祀之禮必先降神周人尚臭祭天則燔柴祭地則瘞血祭宗廟則火草蕭灌鬯皆貴氣臭用以降神禮經明白義釋甚詳委柴在祭神之初理無所惑是以三禮義宗等並云祭天以燔柴為始然後行正祭祭地以瘞血為先然後行正祭又禮論說太常賀循上言積柴舊在壇南燎祭天之牲用犢左胖漢儀用頭今郊用脅之九個太宰令奉牲脅太祝令奉圭璧俱奠燎薪之上此即晉氏故事亦無祭末之文既云漢儀用牲頭頭非神俎之物且祭末俎皆升右胖之脅唯有三禮賀循既云用祭天之牲左胖復云今儀用脅九個足明燔柴所用與升俎不同是知自在祭初別燔牲體非於祭末燒神餘饌此則晉氏以前仍遵古禮唯周魏以降妄為損益納告廟之幣事畢瘞埋因改燔柴將為祭末事無典實禮闕降神又燔柴正祭牲玉皆別蒼璧蒼犢之流柴之所用四圭騂犢之屬祀之所須故郊天之有四圭猶祀廟之有圭瓚是以周官典瑞文勢相因並事畢收藏不在燔例而今新禮引用蒼璧不顧圭瓚遂亦俱燔義既有乖理難因襲又燔柴作樂俱以降神則處置之宜須相依準柴燎在左作樂在南求之禮情實為不類且禮論說積柴之處在神壇之南新禮以為壇左文無典故請改燔柴為祭始位樂懸之南外壝之內其陰祀瘞埋亦請準此臣聞七廟觀德義冠於宗祀三祖在天式彰於嚴祀致敬之情允洽大孝之道克宣是以八佾具陳肅儀形於綴兆四懸備展被鴻徽於雅音著作樂之明義擇皇王之令典前聖所履莫大於茲伏惟皇帝陛下天縱咸通率由冥極孝治昭懿光被於八埏愛敬純深追崇於百世一作葉永言錫祚思宏頌聲鍾律革音播鏗鏘於享薦羽籥成列申蹈厲於蒸嘗爰制典司加隆一作加崇稱號循聲核實敬闡尊名竊以皇靈滋慶濬源長委邁吞燕之生商軼擾龍之肇漢咸韜光於九二漸發迹於三分高祖紐地補天重張區宇返魂肉骨再造生靈恢恢帝圖與二儀而合大赫赫皇道共七曜以齊明雖復聖迹神功不可得而窺測經文緯武敢有寄於名言敬備樂章式昭彞範具列如左皇祖宏農府君宣公懿王三廟樂請同奏長發之舞太祖景皇帝廟樂請奏大基之舞世祖元皇帝廟樂請奏大成之舞高祖大武皇帝廟樂請奏大明之舞文德皇后廟樂請奏光大之舞七廟登歌請每室列奏謹議謹按舊儀漢丞相韋元成以為毀主瘞埋但萬國宗饗有所從來一旦瘞埋事不允愜晉博士范宣意欲別立廟宇奉征西等三主安置其中方之痤埋頗叶情理事無典故亦未足依又議者或言毀主藏於天府祥瑞所藏本非斯意今謹準量去祧之外猶有壇墠祈禱所及竊謂合宜今時廟制與古不同共基別室西方為首若在西夾之中仍處尊位祈禱則祭未絶祈享方諸舊儀情實可安宏農府君廟遠親殺詳據舊章禮合迭毀臣等參議遷奉神主藏於夾室本情篤教在理為宜無忌惶恐白內使滎陽夫人至蒙寄歎別五韻並垂示擬古一首蹤開玉札炫目澄心行諷金聲式歌且抃竊惟化成天下資繫象以導洪源體物緣情自風騷而綿列代莫不咸相祖述罕見生知伏惟殿下摛絢紹天含章挺睿溫文表裕藻清漢於離暉麗則凝華縟春秋於博望乃以監守餘暇俯貺清篇覽夜月之流光降無私於遠客想懸旌之未卷察翹心於征斾加又作依依垂柳益愴邊城鬱鬱中園偏傷遠塞殊私所被文旨兼深詞運理而參神氣凌雲而含粹五章間發若啓榮光之圖六律相宣如覿奏金之字無忌幸從神武愧乏王粲之才忝降斯文益深吳質之戀無任感荷慶躍之至於是叩寂求音繼震方之逸響披肝見意吐爝火之微光某頓首頓首謹言臣敬宗行成季輔等啓昨晚內坊丞王君德奉宣令賚臣等玉華山宮銘賦二本拜承恩貺駭抃交懷跪玩清辭江河溢目伏惟殿下天資學府道貫生知絢發詞林若春華之麗韶景漪清碧海譬秋水之淡晨霞仙鶴和吟慙八音於雅韻神龍縟彩謝五色於雕文綺布天庭雲生石砌理含貞邃雅達谷處之端趣極幽間妙盡嵓居之體烟松合翠露桂分紅察彼殊形翻然共色究寫真之奧旨擅體物之窮神若乃漢月鉤空乍臨珠箔石苔垂髮式映莊帷莫不理超辭表意生文外自餘清拔觸類奇新成若神化之工光乎性道之製蓋由基天挺裕纂聖凝離故能邁古超前納卿雲於度內逾儔絶侶括啓誦於胸中臣等忝荷殊私曲蒙垂示見所未見情百恆品無任鳧藻之懷謹上啓陳謝謹啓某啓少傅元齡奉宣令旨垂使撰恩光曲詞六言四章章八韻謹率愚管宣述睿懷自惟淺陋深懼不允竊尋樂府雅歌多皆不用六字近代有三臺傾杯樂等艷曲之例始用六言今故雜以兮字稍欲存於古體起草適畢未敢為定蒙假不獲面啓對封藳本上呈可不之宜伏聽後命謹啓原夫三才成位爰彰開闢之端六羽為居猶昧尊卑之序訊餘軌於襄陸淪胥靡徵考陳跡於懷英寂寥無紀暨乎黃軒振武元頊疏功帝道盛於唐虞王業著於殷夏葳蕤玉冊照耀金圖茂範曾芬詳諸歷選然則基神襲聖衍慶摛和軼三代而孤標掩百王而迥秀我大唐皇帝無得而稱矣斷鼇初載萬有於是宅心飛龍在辰六幽於是仰德偃洪流而恢地絡練清氣而輯天維散服韜戈扇無為之道移澆反朴宏不言之化悠悠庶類叶夢於華胥蠢蠢懷生遂性於仁壽大禮大樂包曲臺而掩宣榭宏謨宏典澄璧水而藻環林瑞露禎雲翊紫空而表貺祥鱗慶翼擾丹禁而呈符歲精所記之洲咸為疆場暄谷所談之縣並入提封廣闢轅宮被文軌於殊俗還開姬奕均正朔於王會大業成矣大化清矣於是遊於羽陵寓情延閣總萬篋於天縱表一貫於生知洞照神襟深窮性道俯同小技則絢發三辰降習微毫則妙逾八體居域中之大寶畢天下之能事雖則甲夜觀書見稱優洽華旦成曲獨擅風猷仰校鴻徽豈可同年而語矣有元奘法師者昭彰辨慧躡身毒之高蹤生稟神奇嗣摩騰之芳軌爰初束髮即事抽簪迥出蓋廠田坴深悟空假研求四諦嗟謬旨於真宗鑽仰一乘鑒訛文於實相遂乃發宏誓願起大悲心思拯迷途親尋正教幸屬時康道泰遠安邇肅裂裳裹足直趨迦維闡皇澤於遐方徵釋教於前域越葱嶺之外猶跬步而忘遠遵竹園之左譬親受而何殊訪道周遊十有七載經途所亘百有餘國異方之語資一音而並貫未譯之經罄五財而畢寫若誦若閲喻青蓮之受持半句半頌隨白馬而俱反以貞觀十九年持如來肉舍利一百五十粒佛像七軀三藏聖教要文凡六百五十七部還至長安奉敕於宏福寺安置令所司供給召諸名僧二十一人學通內外者共譯持來三藏梵本至二十一年五月十五日肇譯瑜伽師地論論梵本四萬頌頌三十二言凡有五分宗明十七地義三藏法師元奘敬執梵文譯為唐語宏福寺沙門靈會靈雋智開和仁會昌寺沙門宏度瑤臺寺沙門道卓大總持寺沙門道觀清禪寺沙門明覺承義筆受宏福寺沙門宏謨證梵語大總持寺沙門宏應正字大總持寺沙門道宏實際寺沙門明玉寶昌寺沙門法祥羅漢寺沙門慧貴宏福寺沙門文備蒲州栖巖寺沙門神泰廓州法講寺沙門道深詳證大義本地分中五識身相應地意地有尋有伺地無尋唯伺地無尋無伺地凡十卷暜光寺沙門道智受旨綴文三摩呬多地非三摩呬多地有心地無心地聞所成地思所成地修所成地凡十卷蒲州暜救寺沙門行友受旨綴文聲聞地初瑜伽種性地盡第二瑜伽處凡九卷元法寺沙門元賾受旨綴文聲聞地第三瑜伽處盡獨覺地凡五卷汴州真諦寺沙門元忠受旨綴文菩薩地有餘依地無餘依地凡十六卷簡州福衆寺沙門靖邁受旨綴文攝決擇分凡三十卷大總持寺沙門辨機受旨綴文攝異門分攝擇分凡四卷暜光寺沙門處衡受旨證文攝事分十六卷宏福寺沙門明濬受旨綴文銀青光祿大夫行太子左庶子高陽縣開國男臣許敬宗奉詔監閲二十二年五月十五日絶筆總成一百卷佛滅度後彌勒菩薩自覩史多天宮降於中印度阿瑜陀國為無著菩薩之所說也斯固法門極地該三藏之遺文如來後心暢五乘之奧旨元宗微妙不可思議僧徒並戒行圓深道業貞固欣承嘉召得奉高人各罄幽心共稟新義功畢奏上有感宸衷曲降殊恩親裁鴻序情超繫象理絶名言皇太子分耀黃離纘基青陸北搖傳樂仰金聲而竊愧東明御辨瞻玉裕而多慙九載勤經漢儲斯陋一朝成賦魏兩韜英既覩天文頂戴無已爰抽祕藻讚歎功德行二聖之仙詞闡三藏之幽鍵載揚佛日永導元津開夏景於蓮華法流逾潔泛春光於貝葉道樹增榮俾夫聖藻長懸與天地而無極真如廣被隨塵沙而不窮凡厥含靈知所歸矣有唐建極將事補天物色異人營求國器採六奇於楚將而疆宇廓清探九賾於商賢而彞倫式敘若乃西戡建闕一字東闕公諱靖字藥師隴西成紀人也源夫龍德在躬法混成而謂道猿靈象臂縱飲羽以窮神譬諸吞乙皇靈由其闕梓靈源所漸美地冠於神洲國諜攸章茂緒光於列代蓋以被於金石無俟一二詳焉曾祖歡後魏河秦闕一字州刺史闕一字縣開國公闕和復硤殷五州刺史永康縣公中南降靈材高文梓關西出將氣蓋削成遊刃六條理棼絲而有緒擁旄千里讋闕軍事荊州刺史綺歲權奇慕成慶之高義弱齡耿介服子路之嘉言竟能縶馬埋輪自立闕二字之譽走魂闕一字骨以闕五字公心闕以納方邵於胸中轥趙辛於跨下豈非帝錫賢弻以胙聖人比夫闕一字成作師用康漢道滋泉入繇實沃闕一字心生闕八字之闕行事咸施可久謀而後動智越老成寬而納衆量含多士數召與語嘉其志氣每商榷通變靡究闕一字涯闕之可畏矣年十有六長安令調為功曹蓋以望表黃圖光膺禮賁英標赤縣不謝弓招俄而雍州引闕一字賓闕二字策闕崩次骨嚴科濫加端士天倫之長竟被凝脂由是除公為汲縣令歷安陽三原考績連最於時寰中萬宇並闕設地險而分疆公乃以德安邊長城㢮木運奇料敵合境無塵於時黿鼉為梁久盤澤國盜驪窮轍留滯闕一字鄉公闕而渙汗流湯之旅猶未倒戈漸臺之衆尚嬰窮壘故知元天覆構非斷鼇之所持巨壑騰波豈精衛闕一字能闕一字公闕引居周衛申之以心膂太宗地居帝子冥應寶圖則哲欽明內韞知臣之鑒推心通夢預投闕二字之闕溪赤堇守江塹以誰訶由是命公撫寧荒憬建旟直指進次苜次州招集遺黎將申問罪銑徒再肇跨有㣥闕一字利闕一字沈闕止授以兵權慰勉痍傷人皆拔拒奮揚衰怠髮並衝冠孤城掩扉已經二載能勝兵者裁八百人夜赴賊闕一字乘其闕一字意闕揚塵翳景我師既鮮人皆色變公徐撝馬策而謂衆云賊擾且囂是其怯也及未成列可以薄之闕一字二百人蔽山闕是清定因請孝恭進圖蕭銑詔授行軍總管便事首途於時八月凉秋稻水湊荊門之厄二江行潦闕四字嶺之闕其巢勢若疾雷敵必無備遠徵不可以應速近召未足以成軍計日就擒此兵家之上策也由是闕一字計闕一字為先鋒闕之爭搏救其懸命處死地以圖山先犯後軍闕一字師遂恧賊爭虜掠散地交馳公親率前茅射虛而進擒其僞帥由是闕江撫循嶺外承制選補百越率從敕授嶺南道安撫大使檢校桂州總管東漸閩區南踰象浦雕題鑿齒並闕烈闕一字霓分糒投醪惠深時雨玉桴括野候玉弩以馳威金鐲乘飆指金陵而振旅僵短狐於洞澤則溆浦闕一字流漸長闕太宗統極寵渥增隆徵拜刑部尚書參圖國政別食邑四百戶仍以本官行太子左衛率未幾轉兵部尚書再闕俱遠若乃旄頭上列星野於是分區大沙下布地脉因而致絶謂天驕子代蹙中原隨氏季年長圍扆闕一字自茲闕引弓超忽白登不聞吟鏑公乃輕齎畢景隨飛雪而長䘪勒騎通霄籋遺風而遠襲奄逾高闕勢若飆馳潛闕二字庭闕一字如闕之功是稱繄賴進封代國公增邑三千戶加位左光祿大夫餘官如故曩代和戎賞褒舞佾昔人出塞闕一字號冠軍以闕尚書右僕射當權執憲象雨露之無私緯俗經邦法嶽瀆之為紀遠清邇晏畫一之道無闕一字翊政還醇闕一字三闕上不能抑下詔從之加授特進許其間逸散金之賞擬迹疏公松子之歡比肩張傅安車宏大隱之義闕二字協闕太宗憫茲視宍瘧彼遊魂乃詔徵公為西海道行軍總管於是撝羽申令立表即戎懸旌鄯善之阿酣戰崑崙闕彼有慙德改封衛國公授濮州刺史疇其爵邑子孫承嗣太山如礪信誓之文不渝鏤鼎傳銘世祿之闕一字方闕詔曰儀比台階允歸時望位參亠兊職必俟茂勳是以漢之鄧隲垂芳於往載晉之鄭袤著美於當時特進衛國公靖闕居端副志在奉上知無不為叶贊之道既彰止足之風彌遠自違朝寵仍屬沈痾攝養私第炎涼亟改言念闕職事望重台槐職雕神化追蹤昭伯勝映前猷繼美叔林儀形當代庶將乞言膠序相禮云亭天下憗留俄從化闕一字以闕詔贈司徒使持節都督並汾箕嵐四州諸軍事並州刺史給東園祕器班劍卌人羽葆鼓吹凶事所須並命優闕景武公禮也惟公才膺衡石契合休明受律九天之上收功四維之表洞庭狼顧翦不崇朝惟楊闕三字如闕始濟東流遽閲揭日未淹西嵫已晦將軍從驃之客望祁山而慟懷丞相開閣之賓對佳城而掩泣乃與家闕一字室闕猗歟茂族同源帝先鬱雲摽隴切漢分川闕一字牀攸出金輿在旃洪基誕聖末派生賢秦州忠烈執羈從闕顧盼揚采鼓動生風惟皇作極求賢委政軒后順風有虞申命在我明辟道包前聖擬漢藩荊如周引鄭闕一字宮南紀闕智繳大風威殲鑿齒夷波海澨廓氛江汜昏昏鹿塞渺渺雞田編穹浹野蘊沴蒸天受律橫奮電掃雲褰闕著績溢宇騰聲壑舟潛徙國棟俄傾託辰沈曜愛景韜精朝念明謨哀深詔葬士思令範緬懷宗闕一字晉原不闕二字山闕蓋聞嶽靈昭貺協其神者申甫緯象騰斌含其精者伊傳用調芳玉鉉增耀金符譬八柱之承天猶四溟之載地是以邠郊創業冥契非彲一作熊之兆沛野開基鬱會攀鱗之傑莫不凝徽簡策篆勳戈鼎此裂河西而濟美期礪嶽以疇庸若乃經啓睿圖彌綸聖業扈兵師於丹水夷餌石之祅渠振文策於烏江掃拔山之巨祲抑揚七佐鎔鑄五臣致我后於勛華軼前修於樊灌名高絶代其在忠武公乎公諱恭字敬德河南洛人也一作朔州善陽人原夫玉派靈長控昌源於弱水瓊基峻遠峙層構於軒臺叶粹氣以擒賊威橫朔野奄崆峒而擅武跡跨中原亦猶江馬南浮圖基巨麗溟鯤北運激勢扶搖是故軒冕傳華半神州而交蔚忠良秀美煜帝里而馳芬與夫由余去危斥翦鶉而作霸口磾受顧光珥貂而纍華考諸聲實固不同年而語也曾祖本貞後魏中郎將冠軍將軍漁陽郡開國公贈中外六州諸軍事諡曰懋道粹黃中寄侔丹化襲徽章於圭瑞飛茂績於鍾鏞大父益都北齊左兵郎中遷金紫光祿大夫入周濟州諸軍事濟州刺史雕鎪梓黼藻人倫用匪齊鉤亟深微管之寄價符趙璧愈擅入秦之美考伽隋授儀同三司衛王記室皇朝追封常寧安公贈汾州刺史幽州都督材緯三端揚鑣武庫位階一命頓轡文房下調悲於季葉飾壤昭於昌運故知壯氣猶生貫千秋其尚想名臣不作瞻九原而增悼再縟部符之贈式冠封墳之典公鄧林抽穎崑嶠疏源非假七齡早鬱淩霜之幹爰滋九潤先孕聯雲之寶瞻言廣術企列㦸於髫初屬想傾羲俯回戈於度內雄姿岐嶷覆簣裁規沈勇潛貞涌泉韞量飾躬由禮檢性依仁匪衛拔於齊桃亟翹誠於孟筍言泉河瀉應千里而無違俠氣飇騰輕百金而有裕加以鈐符元祕劍術精微偃月疏營右澤左陵之勢浮雲寫陳鵝張鶴列之奇莫不夙契靈臺暗窮神奧由是譽光日下聲蓋秦中而翠虬驤霧必先階於尺木紫燕追風初發蹤於步武爰膺執㦸之選以效棄觚之節蒙授元帥都督拜朝散大夫轉正議大夫加銀青光祿大夫大業十二年也未展雄飛載羈下列何意乎九苞呈瑞儷彩司晨一角效祥儔蹤警夜俄而運鍾旒冕疑政弛永疑衣大浸襄陵長虹貫日公乃行吟梁父希管晏以思齊屈跡淮陰俟蕭張而佐命皇家補傾極振頽綱提劍風驅援旗電掃劉武周不稽天氣實暗人謀怒窮轍以抗威臨焦原而自逸公見縻昏僞迫以驅馳取譬辛毗甫依袁而免戾同夫馬援聊寄隗以偷全尚鞠醜徒據其危堞太宗俯離鳳邸親御龍韜軍次介休將屠僞邑早欽英略深嘉義勇飛箭以述皇威投金以申同德公鑒窮無象識照先機虛一作雪西楚之如狼陋張角之吠犬遽歸真主期乎定人擢授秦府統軍於時帝道維新王途多故瑞雞之野式靜雲雷獻蜃之川來均霜露蕞爾凶狡久肆回邪載動神兵龔行天罰救楚妙算雖獨運於沖襟授律宏規固思憑於猛將乃以公為行軍總管遵彼前茅一作旌旄追奔若順海乘茲破竹潰敵如決河積甲齊山中嶽由其咸定封尸築觀王城於是乂安飲至鎬京策勳居最所賜金帛蓋以千箱其後六統偏師五為總管北殲猾夏南廓滔天戮鯨鯢於洙泗弱驂䮽於漳滏所向風靡賞鉞彞班時外難初康內釁方兆春坊階亂構禍深於戾園季屏窮凶為蠧尤於傲象公早參帷幕思固宗祧驟起聖懷纍明大義九年六月二凶伏辜雖天道禍淫蓋賴君之算也擢拜左衛大將軍兼太子左衛率貞觀元年授右武大將軍屯兵數萬咸令統領職歷二官兼司七校龍飛靜拆總禁旅於瑤山馬珥臨戎肅嚴兵於錡禁於是威馳銀榜寵峻金吾拜上柱國吳國公食邑三千戶實封一千三百戶若遷疑黼曰疑疏峰奄衡巫而廓鎮雷導風一作服驅瀉江漢以咸池餘礫涵輝明珠韜媚是稱奧壤獨擅雄州佇寄惟良以敷景化連帥之重僉曰爾諧貞觀四年授襄鄀鄧浙唐五州都督襄州刺史班朝警俗載屏丹帷虛犴遷澆寧因赭服布中和而驛化浹旁潤以馳威惠澤潛通吐浪由其絶渚仁風普暢嘯谷所以浮江弛風牘於東皋歲儲京庾契成麟於西序家知禮讓道彼湘沅俗均鄒魯里稱冠蓋既洽氓謠地接股肱佇求人瘼八年授光祿大夫行同州刺史封建功臣改封鄂國公冊拜宣州刺史昔炎周裂壤滎陽茂十邑之庸有晉疇榮壯武峻重封之典校其優劣詎可扶輪纍遷靈鄜夏三州都督懋茲宏德亟牧大藩控十角於星街信覃元塞總百城於天塹義偃朱方端委之風褫危冠而變俗氊裘之長棄鳴鏑以歸仁及乎紫封流渥朱輪徙傳莫不情深借寇戀切留黃可謂柔遠以德人稱遺愛者矣既而俯鑒忘筌景文成之茂躅深惟滿器躐大傅之高蹤漏促銅儀循良夜之不怠體安玉杖諒坦路之難追奏欵青規辭榮絳闕特回天眷賜一作肆其誠請於是冊拜開府儀同三司禮秩加等已而從容廊廟怡暢邱園架巘圖蓮疏池瀉箭後堂歌吹通逸響於南鄰別業林泉接芳陰於西第加以陶風元穆勳胄兼資里邃高陽門承通德故能聯姻瑤腑結慶璿枝榮亞元吉寵班右威清樓聳構遙通婺女之津黃閣凝扉近接天孫之館長筵綺合韋珠與謝玉交輝廣廡雲闕浮籥共摐金遞奏庭烏效祉燮曜槐端隟駿流年俄潛柳次嗟乎巨川既濟奄遷舟於夜壑高臺遽傾倏摧梁於夢奠粵以顯慶三年十一月二十六日遘疾薨於長安之私第春秋七十有四皇上情切宗臣痛深國老舉哀別次罷朝者纍辰昔平仲云亡趨輪軫慟宣尼告逝述誄申哀未足方此撤縣喻斯輟祭追贈司徒詞曰飾終之典實屬於勳賢追遠之恩光歸於令望故開府儀同三司上柱國鄂國公敬德志局標舉基宇沈奧忠義之節歷夷險而不渝仁勇之風雖造次而必踐欵誠申於伯府茂績展於行陳西漢元勳韓彭非重東京名將吳鄧為輕著恭肅於軒陛馳聲猷於藩嶽方隆朝寄之榮便追止足之分闡雄林而兼濟植高操而孤往道映千古舉光百辟與善俄騫殲良奄洎永言遺烈震動於心宜崇禮命式旌幽壤可賜司徒使持節都督並蔚嵐代等四州諸軍事並州刺史餘官封並如故所司備禮冊命給班劍四十人及羽葆鼓吹贈絹一千五百段米粟一千五百石陪葬昭陵葬事所須並宜官給並賜東園祕器儀仗鼓吹送至墓所仍送還宅並為立碑仍令鴻臚卿琅琊郡開國公蕭嗣業監護光祿少卿殷令名為副使務從優厚稱朕意焉又下諡詔曰名以實稱事光於前典諡為表禮縟厚於尊言故博聞強立少傅擅文成之美行剛服遠冠軍膺景桓之賜故開府儀同三司上柱國鄂國公贈司徒並州都督敬德襟宇宏邵機神祕遠氣茂英果情馳義烈闡雄圖而贊業標峻節以凝功道叶宗臣望隆時宰爰升九命之寵宜享三尊之位福謙從說悼往增酸奉上危身誠許國之貞操安人和衆亦經邦之懿範式詳茲典錫以大名可諡忠武仍遣使持節備禮告柩以顯慶四年歲次巳未四月丁未朔十四日庚申陪葬於昭陵禮也惟公資和清粹稟鋭雷霆勇冠六軍不失獨夫之色志澄四海期於萬里之外登范車而繹慮撫陳室以栖情蒼璧內融負青冥其非遠白圭外審體黃裳而愈固藝或微而咸綜技雖末而旁該象珥初彎先穿臥石魚文且擊遂引飛泉擅扛鼎而推雄掩蒙輪而效捷觀其事親孝事君忠居身節與士信識通其變遠鑒窮於未形智括其神臨事期乎不測非外物之攸奬咸宜體以自然運屬艱虞披荊而扶帝業功宣草昧借箸以沃神襟載扈升陑爰參誓牧掩孫吳而高視轥韓白以長驅是以捨代偃齊似青邱之吞夢澤推堅衄鋭猶黃間之穿魯縞祥符捧日亮堯景而增輝道契從風燮虞薰而演化故能丹書誓策青社疏榮位兆銜珠資五申而統律寄深錫壤按十部以宣風年暨抽簪禮優執酳懸輿勝躅昭茂寵於安車納駟高門峻朝章於行馬斯所謂道烈可紀令終有俶者歟有子右領軍將軍寶琳鳳羽摛姿龍媒騁逸丞相之子道懋傳經王公之孫望高倒屣掩八屯而效職副九列以騰芳履孝揚名克隆華閥顯親穆譽爰樹豐碑紀德盧山載表茂陵之域題貞畢陌式分京兆之阡庶令過客披文立名可則故懷斯惠望拜知歸其銘曰商周龍躍尹望鷹揚風雲宜感鱗翮曾驤於赫皇祚禔禎會昌錫茲元弼勳烈推光茂德初誕英徽早暢狼宿摛精龜文協貺棄繻關下受符圯上祕策金韜騰猷玉帳貞心孤邵猛氣橫飛長戈參捷雄㦸雙揮蛟分承影鴈落忘歸韜奇佇睿屈跡乘機釁起射天妖凝鬬日明一光啓半干秀出道契披圖功宣授律冀北先馳圖南載逸受脤揚威尊征耀武馬陵削樹鳶方鑄柱雲卷鳴祠風謳嘯雨靜祲破竹銷氛玉弩戎衣式定河帶同盟望高四履寵峻千兵裂壤剖邑分麾建營網羅方邵躡跡良平出建隼旟入參鳳輦名班贄玉賁光儀鉉朱戶吟笳青門樹冕金裝甫散璇霜遽踐昔恭丹扆載奉薰琴今陪元襚空悲穀林紛紛禮縟杳杳光沈閽桐永閟宰樹方深瞻言史策遠振徽音蓋聞闕而不闕四字之闕之闕二字同闕神凝物表久抗梁甫之吟運拒轍來思效扶搖之舉方闕三字域闕下省修起居注超綜國言虔司帝舉良直之道驟簡宸心貞觀六年闕無競惟人八年擢授承議郎行侍御史頃之加位員外散騎侍郎仍行本闕二年轉守中書舍人久之遷持書侍御史彯纓西掖潤元紱以申闕三字南闕淳贊端拱之元猷將致五刑之厝彌綸昌運實允具瞻闕而飛文揮翰鴻波入紫宸而衍誥任遇斯極時論榮之及大闕五闕一字而闕二字十八年闕一字正議大夫守中書令仍兼左庶子闕一字兼朝闕而順動乃闕二字隨駕闕一字規中山軍國務殷總歸闕二字后闕青闕七字金闕一字黃闕一字靜闕一字趨闕五字闢建禮之闕銀青光祿大夫闕二字飛闕三字於是闕一字其闕七字無所闕幽往莫不闕二字聖闕二字發神衷褒善之義以彰闕一字人之舉闕一字盛闕臣特超於終古俄嬰沈瘵攝餌私庭分玉饌於仙廚驛珍羞於御府綸闕二字發闕正月九日薨於萬年縣之隆慶里第春秋卌八太宗撤懸闕一字悼慟結闕一字殲闕詔以其年歲次戊申三月辛已朔四日甲申陪葬於昭陵賻闕五字葬事所須闕一字令官闕茅社而旌德永徽二年詔贈高唐縣開國公食邑一千戶恩兼闕二字禮闕書贈幽州都督高唐縣開國公馬周宇量沖深思用韻舉昔佐藩邱闕二字兼隆逮闕宜申旌壤之義兼如延賞之恩可贈尚書右僕射餘官封如故其子闕二字朝散郎闕二字之恩闕夷簡神情朗晤天經地義基百行以立身覩隩升堂包四科而敬業蕪闕二字量闕高步文昌之右體無私於雨露隨方被霑沐之歡燮大造於陰陽稱物闕一字平公之施闕明故得任切近機榮躋上秩附蟬留影用表高潔之姿行馬闕知至是焚之式符藏用危纊逾迫無忘致美之心隅燭既陳猶闕三字之節闕陰德無爽緝丕搆以增遙契奪金蘭幾凝悽於宿草芳留玉樹足慰闕一字於闕姬御疇庸趙城開國望高秦右聲馳魏北奕葉提休蟬聯種德靈慶斯遠芳闕餐荼思越純慮冥感至情天發芟除纖縞乃綜緹緗弋獵闕二字隱闕一字文闕雲幄纍綜霜臺清襟月湛朗議霞開黃扉夕拜紫禁朝陪簪纓闕三字廟登材闕塤箎歲寒增勵夙夜無虧望竦鶴關榮昭蟪冕推轂謀暢持衡譽闕贈闕一字陵歸闕一字畢闕一字式陳容衛載光窀穸捨玦哀盈投闕一字慕積鈞臺闕貞石永闕三字蓋聞高陽洪胄響振虞庭高闕一字餘闕一字光闕九字粵闕二字獻公闕一字公諱儉字士廉闕十一字靈命闕一字河闕一字壤咸樹懿闕二字玉闕一字金寵隆磐石酆郇魯衛並闕四字風闕六字濟於皇諜亦既昭於史冊此可略闕一字言焉曾祖翻闕五字尉闕一字黃鉞闕一字尚書事闕一字清河闕五字武闕九字躬闕一字擁樹闕四字密闕一字英雄道濟闕二字實闕一字宣力