body:
  text: 乙巳歲冬十二月客鍾陵由章江入劒池過臨川時天久雨水泉將涸風不便行維舟於岸左岸左有小渚小渚之間垂舟之介揭厲而獲碑為介者異而告發而視之字殘闕存者十七八考其文則故臨川內史顏魯公之文識者以為公牧臨川日所沈碑其文亦多載魯公之德業輒碎敗而已會同濟者謂余曰且魯公沈是碑也必將德業不稱於後世故沉之今子既不能文而補之寫傳之亦不可復沈之於濬流俾後人覩是碑者抑亦昭魯公之德業也子亦蔽人之善歟不然胡碎之而已余曰吁秦嬴政初併天下天下大定海內一統於是出行郡縣登諸名山刻石記功德焉及其仁政不修後之人語及秦嬴政者咸以為虐君也堯舜無為而治巍巍蕩蕩俾鑿井耕田者不知帝力歷於萬紀厥道愈光今之人語及堯舜者咸以為聖君之至若峴首之碑睹者墮淚斯乃荊之人感羊公之德化故泣而思之設使羊公之德化不及於荊人則是碑也不能感荊人之泣矣且魯公之德業史傳載之矣遺俗傳之矣夫德業者病不著於當世豈病揚於後世乎苟魯公德業史傳不載雖全是碑亦不能揚魯公德業於後世夫如是碎之何傷寧國臨縣徑之東南古勝地也頃屬兵興以後盡目蕪焉稂莠蔽川嘉樹不長氛煙塞路清泉不發幽埋異沒誰復相之是邑汝南長君治民有瘳任人得逸乃卜別墅就而營之前有淺山屹然如屏後有卑嶺繚然如城跨池左右足以建亭邱隴高下足以勸耕泓泓盈盈漣漪是生蘭蘭青青疏篁舞庭斯亭何名化洽而成民化洽矣斯亭乃治長君未至物景頽長君既至物景明媚物之懷異有時之否人之懷異亦莫如是懿哉長君雅識不㣥愚不紀之孰彰後人時乾寧三年仲夏月十有九日記界江南宣州實為奧區凡厥貢之盛厥土之饒則古所良也暨巨盜起芒碭環弊於四方是邦載罹窘厄雖城隍僅免而外無孑遺矣及兵部裴公慶餘去任竇常侍聿自池牧來臨蒞事未幾遽為秦彥所據姦連鄰憝一作憝一旦擁兵渡江引黨趙鍠以代已任是歲南徐劉皓作亂揚州繼喪師律二境流離人不堪命宏農王方作自淝水爰奮義旗詢於同盟則田公司空首決宏謀及維揚克定秦彥就誅宣人有言曰何獨後豫徯其來蘇宏農王允憫是誠我公復勵兵進討鍠悉鋭逆戰亟為崩之及追蹙保壘兵食內空而外不絶商市無改肆鍠知人和在彼乃冒圍宵奔我公追擒之自此江表略定大順元年建子月孫儒大據維揚又來寇我舉不以義自老厥師復為我公擒之其衆盡漬宏農王去寧揚土我公嗣總藩條天子嘉公之勳就轉左僕射命觀察於是明年建寧國節度又明年加司空宣城薦屬戎事便廳久缺司署者進言曰盍葺諸公曰民室未完民逃未復於是用文德以來之既來而安之不期歲車者闐闐舟者聯聯比屋滯貨盈市溢廠墨司署者復進言曰民室完矣民逃復矣公曰倉廪未實田野未闢於是薄其賦而省其徭給其乏而賑其飢不期歲荷耰秉犁橇蟠於泥如雲之稼穰穰在畦司署者復進言曰倉廪實矣田野闢矣公乃許然後度材相址不匠事橫梁虹亘山節峯峙嶫嶫崇崇觀者改視公喜退顧人曰凡事之治不治無賢愚貴賤顯然知異觀此當其未治人咸慊之及其治也人咸榮之則吾於為政也豈不榮乎治哉我今欲刊成績宜付所能則沈氏子以文售子其何可辭焉乾寧二年乙卯秋九月八日記人一其視而不一其明故目有時盲人一其聽而不一其聰故耳有時聾蓋目之盲由物亂其睛耳之聾由聲惑其聰且玉者咸知其玉也石者咸知其石也而碔砆亂焉宮者咸知其宮也商者咸知其商也而鄭衛惑焉夫人者孰欲棄真而取偽背正而歸邪諒視不詳而聽不審耳俾視不詳而聽不審者豈不以碔砆鄭衛之故乎吁天下之大萬物之衆其亂目惑耳者非特碔砆鄭衛而已則知非聖賢其不惑於視聽者稀矣凡所謂祥者必曰麟鳳龜龍醴泉甘露景星朱草所謂妖者必曰天文錯亂草木變性川竭地震冬雷夏霜或者以察王道之廢興國家之治亂則乩考於是而不知君明臣忠百司稱職國之祥也信任讒邪棄逐讜正刑賞不一貨賂公行國之妖也三代以後廢興之兆理亂之故鮮不由此矣若嚮所祥者果祥則周道衰而麟見妖者果妖殷道盛而桑穀生庭不其明與夫祭典之興所以奉祖宗而表有功也非所以祈明神而邀福佑也故王者郊天地而立七廟諸侯奉社稷而置五廟士庶人各以其家功施於民則祀之以死勤事則祀之以勞定國則祀之昔列山氏之子曰柱能植百穀夏興也周繼之故祀於稷共工氏為九域其子曰后土能平九土故祀於社舜勤事而野死鯀障洪水而殛死冥勤其官而水死有虞氏禘黃帝而祖顓頊郊堯而宗舜夏后氏亦禘黃帝而祖顓頊郊鯀而宗禹商人禘舜而祖契郊禹而宗湯周人禘嚳而郊稷祖文王而宗武王故所謂奉祖宗而長有功也非所以祈明神而邀福佑也必以明神可祈福佑可量則三代不易世秦漢不更氏王者無明暗卿士無賢愚能盡其祭祀則享其福祚矣神必私於禱祈悅於肥腯而降其禧祥則王者盡堯舜也侯者盡桓文也水不為潦也火不為災也年無壽夭也民無貧富也戰無不勝也守無不固也禍無不殄也疾疹不生也國家無危亡也宗祀無廢絶也是皆祈而不得禱而無應明矣然則經百代而不易其俗傳百王而不革其風者誠有以也夫兩國相持必有其勝也萬邦各治必有其康也祈年者必有其豐也祈病者必有其瘳也祈仕者必有其遷也祈貨者必有其饒也有一於此咸以神之佑也而不知人事之起匪成即敗匪得即失用之有巧拙智之有先後歲有豐儉運有否泰非神之所置也於是廢業而不為非竭産而不為悔姦巫乘之以語禍福竟不能明寖以成俗得非上失其正下效其為者乎嘗讀李肇國史補云韓文公登華嶽之巔顧視其險絶恐栗度不可下乃發狂慟哭而欲縋遺書為訣且譏好奇之過也如是沈子曰吁是不諭文公之旨邪夫仲尼之悲麟悲不在麟也墨翟之泣絲泣不在絲也且阮籍縱車於途途窮輒哭豈始慮不至邪蓋假事諷時致意於此爾前賢後賢道豈相遠文公憤趣榮貪位者之若陟懸崖險不能止俾至身危踣蹶然後嘆不知稅駕之所焉可及矣悲夫文公之旨微沈子幾晦乎舜禹之代象刑而人不敢犯言象刑者以赭以墨染其衣冠異其服色凡為三等及秦法苛虐方用肉刑鋸鑿箠朴楚毒畢至而人犯愈多俗益不治其故何也非徒上古醇朴人易為化亦由聖智元遠深得其理故也夫法過峻則犯者多犯者多則刑者衆刑者衆則民無恥民無恥則雖曰劓之刖之笞之撲之而不為畏也何以知其然也夫九人冠而一人髽則髽者慕而冠者勝九人髽而一人冠則冠者慕而髽者勝民不知冠之髽之為勝但見衆而為慕矣今免者多而刑者少人尚慕其多矣及刑者多而免者少焉以少為勝乎故曰法過峻則犯者多犯者多則刑者衆刑者衆則民無恥民無恥則雖曰劓之刖之笞之撲之而不為畏也凡民之心知恣其所為而不知戒其所失令辱而笞之不足以為法也何者蓋笞絶則罪釋痛止則恥滅恥滅則復為其非矣故不足以為法也虞舜染其衣冠異其服色是罪終身不釋恥畢世不滅豈特已以為恥也人之見之者皆以為恥也皆以為戒也愚故曰非徒上古醇朴人易其化亦由聖智元遠深得其理故也古者國家將有事乎戎祀必先擇時日以定其期是用備物於有司習儀於禮寺俾臻其慮而戒其誠非所以定吉凶決勝負也後之惑者不詳其故惟考時日妄生穿鑿斯風不革拘忌益深至使凡庶之家將欲越一溝隍拆一葭葦必待擇日而後為之搆一衡宇剃一榛蕪必審方位而後為之且凶吉由人焉繫時日夫四達之衢輪蹄未嘗息也五都之市貨賄未嘗絶也萬家之邑斤斧未嘗斷也七雄之世戰伐未嘗已也其凶也必由於人其吉也必由於人故吉人凶其吉凶人吉其凶一於人之所為而已矣然則惑者不知其在人有一不知一作吉則罪於時日矣且以不謀之將不練之士有能以時日勝者乎不耕之土不實之穀有能以時日種者乎以鐵為金以石為玉有能以時日濟者乎是皆不能也則時日於人何有哉夫王者之兵以德勝霸者之兵以義勝其次以智其次以勇故古之名將未嘗不以此而戰勝也未嘗不以此而立功者也知佞之讒讒忠不知佞之讒讒國故人君弗為意也且曰彼誠佞耶豫不過寵一臣彼誠忠耶豫不過黜一臣豫受天命有天下豈少若人乎奈何咈豫心而不知寵一佞而百佞進黜一忠而百忠退矧忠者寡而佞者衆乎是以宰嚭讒子胥而吳滅趙高讒李斯而秦亡無極讒伍奢而楚昭奔靳尚讒屈原而楚懷囚愚故曰知佞之讒讒忠不知佞之讒讒國悲夫論者以五帝不逮於三皇時變也三代不逮於五帝時變也五霸不逮於三代時變也或曰時其在君乎在臣乎在民乎沈子曰在君不在臣在臣不在民在民不在君臣古若羲若軒若陶若虞時在君也若殷武丁若周武王若齊桓公若晉文公時在臣也若夏之桀殷之辛周之赧秦之二世時在民也故時在君則為皇為帝時在臣則為王為霸時在民則為禽為虜為禍矣夫君德日勤時在於君君德不申時在於民愚故曰在君不在臣在臣不在民在民不在君臣吁唯明君而能知時之所在乎全諷字上諫昭宗時官撫州刺史兼御史大夫後為徐溫所虜當州昔為臨川郡城在此城之北古堞猶存寶應中太守王公圓以不便於民卜遷於此然所立郡宅未叶地形昃倚城西低臨水際頗更年代莫議遷移洎乾符初寰海沸騰兵寇焚略無遺堵靡認餘基中和乙巳歲全諷奉詔分符拜官本郡傷凌夷之纍政歎榛以經時且召伯臨人憩息只依於棠樹而謝公為郡餘間尚築於經臺得不革故從新去彼取此既獲其形勝又叶此夷隆凡廨署之中而公廳在首此際雖當建立猶是權宜每視事之時或延賓之際常因目擊但蓄心期未辦增修二十年矣今則聚力於三農之隙求材於千仞之林獲楠梓而皆良招郢匠而畢集是用拓開基址高建棟梁恢張而雅稱參衙壯觀而無餘法則盤勝概而咸歸萬象鎮嚴城而更益三威立事立言必垂名於不朽乃積乃業冀貽美於將來豈為耳目之娛而勤土木之事者哉當州刺史宅自唐乾符中因諸道亂離有巨寇黃巢闕柳彥璋等奔突焚燒略無遺堵爾後封疆俶擾城邑荒涼洎中和五年春三月全諷蒞郡之始製置之初以其宅僻倚西隅而甚欹側乃易其舊址遷此新基高而且平雅當正位於是芟去榛棘草創公署此際多以舊木權宜製之於今十有四年卒就摧朽今則躬親指畫再闕一字基場闕二字重堂傍竪廚庫西廊東院周回一百餘間才涉數旬切扁俱畢雖虹梁闕二字不獲飾焉而鈴閣郡齋闕二字壯觀建闕二字續益稱闕城闕敘其由故記壁文圭陳州西華人乾寧中及第為裴樞宣諭判官後依寧國節度使田頵頵死事吳先主掌書記武康元年拜翰林學士禹貢別九州之廣揚鼎居先淮夷控七郡之雄廬邦最大真四塞山河之國乃一方禮樂之鄉地勢壯而金斗高人心剛而風土徑洎皇唐光宅四海奄有八紘窮日月之照臨皆臻仁壽混車書於華夏咸屬文明視赤子以如傷播洪鈞而不比眷惟刺史之任獨曰親人之官凡當出牧是邦必選良二千石矣昔故相歇馬之所今通侯建隼之區太守清河張公乾象降靈人龍命世一劒躍而蛟斷六鈞挽而猿號忠自孝基勇由義立爰從稚齒便奮雄心庚子歲巢寇陷秦關僖宗幸蜀部王綱弛壞國制搶攘瞻烏載飛走鹿爭逐救疲民之焚溺資間代之英雄先吳忠武王虎步江南鷹揚肥上汪汪偉量涵一萬頃之澄波落落洪襟包九百里之夢澤是以多士之歸也如百川赴海㣥材之用也若衆腋成裘勤求卓犖之倫肇建龎洪之業下痊民瘼上報國恩以太守張公英俊不㣥鄉關素友隸職帳下責效軍前入委腹心出舒羽翼由余之拓十二國多賴宏規耿弇之屠三百城略方殊績以至潰趙相國鍠七萬之衆先拔句溪破孫司徒儒五倍之師次收淮甸不獨身先百戰抑亦謀贊六奇故得擢自偏裨升於列校亟更職任纍拜專城天祐三年承制檢校司徒守常州刺史而毗陵杭越接境梁汴連衡公才駐熊車潛施龜畫早曾修城築塹杜漸防萌寒暑未遷金湯遽設功用未畢王澤迭加以績效轉官檢校太保授廬州刺史兼本州團練使天祐四年八月到任公自臨錦里即建羅城謀雖貯心言未出口蓋以先王臥龍之地謹合繕修君子變豹之風詎宜卑陋況西連襄漢北接梁徐秣馬訓兵靡忘寢食勸農習戰誓靜氛埃今吳太師嗣茅土全封紹彤玈重寄旌賢寵善念舊策勳雖承制以褒酬迭進秩於保傅淮南行軍司內外都軍使鎮海寧國等軍節度使檢校太尉兼侍中東海徐公首輔大政力啓霸圖遜德推功先人後已纎粟之勞必録錫豫之美無偏公執玉而歸覲王庭鏘金而入陪相閣語家國之至計屬西北以介懷遂咨稟廟謀增修戰壘鋪舒妙見商較遠圖且曰居安慮危聞於聖哲為主制客宜賴城隍乃知恃陋弗修莒子蹈危亡之運一日必葺叔孫留忠恕之機懿彼肥川舊有羅郭自咸通十年盧諫議出牧此州值彭門用軍鄰封多警纍拜表章之請遂興版築之功綿歲月以滋深致締建之匪固漸成崩潰難禦奔衝況今稼穡豐登煙塵貼息宜當農隙潛募子來嘉言上沃於王心成算允諧於台畫繇是量材度費揆力興工設窑竈於四郊燒甎礫於億萬蒸沙似鐵運甓如山千畚雲翻萬杵雷動役五丁而神速甃百雉以天橫粉堞既全湯池是濬瀦長壕於四面斢巨浪於長江其城周回二十六里一百七十步壕面濶七十丈至六十丈深八丈城身用甎砌高三丈置窑竈五十五所其甎每口長一尺三寸濶六寸建造羅城門十三所及大弩樓都共四十四所公旦暮檢轄躬親指揮以饌以觴且酣且飲致勞勇兼集公私允諧天祐六年十二月終版築向圓開鑿始半汴賊寇彥卿將領馬走徒黨五萬餘人乘修勵未辦之間恣倉卒奔衝之計夜驅㣥孽直渡城隍搭長梯於女牆攢霜矛於鵲垜人皆凶懼公獨晏如遂開廬江潛橋兩門親領馬步鋭師當處殺敗逋逆或鹿君驚而塗地或狼狽以投壕死溺如麻生擒若市押背黏襲遠過獨山棄甲聯翩高齊峻嶽諸郡收奪槍甲不少招降人馬甚多仍值積雪連天陰風刮地寒僵餓殕僅滿平川匹馬隻輪偶漏元惡天祐十年孟冬月汴將賀壞與王彥章復驅甲騎四萬直抵羅城西獨山門排列至瓦步門延亘數里此際堅墉漸備濬洫已周巨堞屹而山橫大弩發而雷吼雖㣥偷飄至暴客狂衝萬騎雞連千戈蟻潰但昂頭而歎息咸破膽以逋逃尋屬淮海行軍侍中東海公親統大軍徑追勍寇縱七擒於淮岸破十寨於戎河非楊府之大幕雄軍不足以平欺敵國非肥水之深壕高壘不足以外挫賊鋒致我師競願北驅彼衆不敢南牧立中流千年柱石壯吳部一面山河昔司馬宣王統晉國車徒覽諸葛武侯渭川營壘而歎曰真天下之奇士今清河公良可匹矣高燕公頃築西川羅城皆破上供錢米當其無事尚以為能清河公今繕理重垣疏導百谷廣通商而貿易咸竭産以經營上下無私方圓有術不蠹府庭之尺素斗粟無妨黎庶之易耨力耕從容蕆事則首尾一年周旋僝工則歌謠五邑永賀覆孟之固免虞拾瀋之譏或聽訟之餘或訓戎之暇憑高送目選勝延賓三重之雉堞延登四望之秋毫必見西風獵獵撒豹騎於平蕪冬日融融竟牛耕於曠野此外水矗蒙衝之艦陸轟霹靂之車十年之儲蓄有餘千弩之金繒足用且獨山秀而峭肥水清而靈宜有異才同正霸業大則仗戎節駕廉車次則剖竹符參蓮幕其間燕趙多奇士豐沛皆故人千載風雲一時會合而公志惟尊主務切經邦摧陳敵若私仇視玉帛無停蓄尚季布之然諾篤仲由之信誠吳漢之不離公門袁安之每念王室凡諸廨宇久歷星霜多至摧頽咸新剞劂荀郎中湘五十五年前常典茲郡建東水閶門虹梁朽而螮蝀沈碧瓦爛而鴛鴦碎公皆表裏修換躬親指南壯軍城而金翠相鮮耀水柵而舟車倍湊并建兩畔挾樓都一十四間換門樓橋柱十三虹公又深惟久要永欲流傳別運十綱散令回貨廣市於楠木團梓遍修於寺廟橋梁不箕斂於王民盡圓融於私帑所建州內廨舍間架甚繁兼添置梵舍琳宮神祠儒廟及造明教橋一所次造市橋一所次造縣橋一所次造通遠橋一所次造西水閶門一所奇妙難名龍身蚴蟉於波間鴈齒參差於川上往來咸濟不勞鄭産之輿揭厲無疑如假傳巖之楫郭內官路造小史橋一所次造赤欄橋一所東正門橋一所崇化門橋一所懷德門橋一所都共造橋一十一所並用楠木團梓鶴柱雕欄畫檻縱橫洪流直道有利於物知無不為乙亥歲孟夏月畫圖入覲告厥成功相府僉諧王綸賞重承制就加都團練觀察處置等使守刺史餘勳階如舊至天祐十四年四月二十七日蒙恩轉授武寧平難軍節度滁宿等州觀察處置等使依前權淮南行軍副使知廬州都團練觀察處置等使餘官勳如故褒勤藎也且兵書所尚地利居先霸國圖安人和是最兼茲二者不其久乎一品之秩自才升萬鍾之祿由勳進安于固晉陽之險墨翟拒宋國之圍楚興燧象之師齊奮火牛之陳設奇應變以逸待勞何代無人有備誰患丈圭墨徒摩楯筆愧如禒近駕軺車曾趍戟牖目擊連雲之巨壘神驚截海之深壕聊得直書無非實録雕鎪琬炎敢期八字之褒稱易變桑田幸記千年之城郭同部轄都頭節級寮吏名銜並勒碑云耳天祐十四載歲次丁丑七月戊申朔二十六日癸酉建立淮南節度掌書記殷文圭文
