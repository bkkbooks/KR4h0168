  text: 全唐文欽定全唐文卷八百六十八顏字可鑄湖州德清人唐翰林學士傅師之孫天復初舉進士授校書郎屬亂離奔湖南馬氏未幾歸吳為淮南巡官纍遷禮儀使兵部郎中知制誥翰林學士順義中卒
