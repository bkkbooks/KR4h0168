front:
  text: 全唐文欽定全唐文卷二百七璟邢州南和人舉進士調上黨尉為監察御史纍拜黃門侍郎睿宗立遷吏部尚書同中書門下三品開元初纍封廣平郡公授開府儀同三司罷知政事十七年遷尚書右丞相二十年以年老乞休二十五年薨年七十五贈太尉諡曰文貞
  hash: sha256:55794cd0c156cb20d0c33972c6481501f74b890c4e7de8e0951376a1cccc2d9d
