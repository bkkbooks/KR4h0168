body:
  text: 垂拱三年余春秋二十有五戰藝再北隨從父之東川授館官舍時病連月顧瞻圯牆有梅一本敷花於榛莽中喟然歎曰斯梅託非其所出㣥之姿何以別乎若其貞心不改是則可取也巳感而成興遂作賦曰高齊寥歲晏山深景翳翳以斜度風悄悄而龍吟坐窮檐以無朋命一觴而孤斟步前除以躑躅倚藜杖於牆陰蔚有寒梅誰其封植未緑葉而先葩發青枝於宿枿擢秀敷榮冰玉一色胡雜遝於衆草又蕪沒於叢棘匪王孫之見知羌潔白其何極若夫瓊英綴雪絳萼著霜儼如傅粉是謂何郎清香潛襲疏蕊暗臭又如竊香是謂韓壽凍雨晚濕夙露朝滋又如英皇泣於九疑愛日烘晴明蟾照夜又如神人來自姑射煙晦晨昏陰霾晝閟又如通德掩褎擁髻狂飇捲沙飄素摧柔又如緑珠輕身墜樓半含半開非默非言溫伯雪子目擊道存或俯或仰匪笑匪怒東郭慎子正容物悟或憔悴若靈均或欹傲若曼倩或嫵媚如文君或輕盈若飛燕口吻雌黃擬議難遍彼其藝蘭兮九畹采蕙兮五柞緝之以芙蓉贈之以芍藥玩小山之叢桂掇芳洲之杜若是皆物出於地産之奇名著於風人之託然而豔於春者望秋先零盛於夏者未冬巳萎或朝華而速謝或夕秀而遄衰曷若茲卉歲寒特妍冰凝霜沍擅美專權相彼百花誰敢爭先鶯語方澀蜂房未喧獨步早春自全其天至若棲迹隱深寓形幽絶恥鄰市廛甘遁巖穴江僕射之孤鐙向寂不怨悽迷陶彭澤之三徑長閒曾無愔結諒不移於本性方可儷乎君子之節聊染翰以寄懷用垂示於來哲從父見而勗之曰萬木僵仆梅英再吐玉立冰姿不易厥素子善體物永保貞固臣某言臣伏以漢崇元巳齊曰上遊咸聞執蘭以盛禊飲洛水之會囂呼不足紀也永和之遊僻陋不足追也臣等生逢多幸遇會聖明賜與榮渥逾溢涯分詢於史策超軼古今臣某伏惟皇帝陛下屈巳愛人布和施恩慶賞所及萬國歡心財成之道與天悠久爰以令節錫宴公亭翠帟文茵俱來天上嘉肴清酤亦自大官欣歡之聲浹於億兆銜感之至形於頌歌而天心霈然宸章煥發曲蒙賜示捧讀兢懼涵泳五音光輝二雅流於籥虒磬永播無窮豈臣庸愚詎能思度今狂虜衰息年穀屢登俗被湛恩人歸壽域宴遊高會適助時康况上宰冡卿修簪長劒前後羅列小大相從所以序聖朝之多士為百代之風流臣等叨榮無任懇迫報效何日進退知慚不勝欣忭之至臣某等言伏以雲韶是稱天樂華夷不覩庶品徒瞻伏惟皇帝陛下慶洽人神惠敷雲雨合歡飲於八仙闕伎降於九重遂使六樂增唱萬人駭歎豈激楚之足匹何鈞天之能擬况復飾無貴寶衣用大帛遠而望之如金翠之旅近而觀之同弋綈之髣其廣大也可以俗應陽和其純儉也可以人知軌物故能作程海內垂裕天長望編史冊永彰明聖臣等不勝悅豫之至臣伏以太常狀以皇太子冠准東宮典記有上禮之儀謹按上禮非古從南齊後魏方始有此事而垂拱神龍更扇其道㣥臣斂錢獻食君上厚賜答之姑息施恩方便求利每緣一事有此再煩齊魏之風故不足效後車轍有前車之戒應當取適皇太子冠乃盛禮自然合有賜賚上臺東宮兩處宴會非不優厚其上禮宜停近者日永南陸雲密西郊鬱彼炎氣暫愆時雨陛下順天布德憂人在念潔壇菲膳恤獄緩刑故得膏澤應期會旬而至夜良田望歲自公而及私觀其灑液九重雜梅香而共溢含涼入水將麥氣而俱清臣等預睹休和叨承霑沐臣璟言臣聞力不足者老則更衰心無主者疾而尤廢臣昔聞其語今驗諸身况且兼之何能為也臣自拔幽介欽屬聖明才不逮人藝非經國徒以久承驅策歷參試用命偶時來榮因歲積遂得再升台座三入冡司進階開府增邑大郡所更中外巳紊彞章逮居端揆尤竊右職何者丞相官司之長任重昔時愚臣衰朽之餘用慚他日位則逾盛人則浸微盡知其然何居而可頃者僶俯從政蒼黃不言實懷覆載之德冀竭涓塵之效今積羸成憊沈痾莫瘳耳目更昏手足多廢顧將隕越寧遂宿心安可苟徇大名仍尸重祿且留章綬未上闕庭儀刑此乖禮法何設伏惟陛下選能以授為官而擇察臣之有詞矜臣之不逮使得罷歸私室養疾衡門上弭官謗下知死所則歸全之望獲在愚臣養老之恩施於聖代日暮途遠天高聽卑瞻望軒墀大深感戀臣比伏枕不堪詣闕無任懇誠之至謹遣男朝請大夫行起居郎渾於朝堂奉表陳乞以聞王子將封三十餘國周之麟趾漢之犬牙彼何足云於斯為盛竊以郯郟王等皆傍有古邑字臣等以類推擇謹件三十國名又王子先有名者皆上有嗣字又公主邑號亦選擇三十美名皆文不害意言足定體又令臣等別撰一佳名及一美邑號者七子均養百王至仁今若同等別封或緣母寵子愛骨肉之際人所難言天地之中典有常度昔袁盎降慎夫人之席文帝竟納之慎夫人亦不以為嫌美其得久長之計臣等故同進更不別封上彰覆載無偏之德太學助教張知謙與臣等言論故黃門監盧懷慎清儉身死之日家無餘財遺嗣貧窶衣食不給伏以懷慎歷官中外數十餘年晚在黃門足為貴秩清約守道朝廷共推親弟懷莊雖居朝列然其簡身素謹亦有兄風妻子居貧無可以給聖朝褎賢勸善激濁揚清貪婪者靡不棄捐介潔者宜應念録况富本榮業所貴能散天地至仁所貴能養行賞必於合義賜與難以妄加如懷慎者既曾任宰相特承皇眷施舍可愛沮勸斯在臣等暗識不早陳聞知謙上言理足甄用望出制論懷慎平生苦更賜其家物一百段粟二百石以示不遺十月十四十五日承前諸寺觀多動音聲今傳有仗內音聲擬相誇鬬官人百姓或有縛綳此事儻行異常喧雜四齊雖許作樂三載猶在遏音伏惟孝理深在典故臣等既聞此事不敢不陳悲田養病從長安巳來置使專知且國家矜孤恤窮敬老養病至於按比各有司存今遂聚無名之人著收利之使實恐逃逋為藪隱沒成姦昔仲繇仕衛出私財為粥以施貧者孔邱非之乃覆其饋人臣私惠猶且不可國家小慈殊乖善政伏望罷之其病患人令河南府按比分付其家徵祥所寶在於聖德興慶休應宇內咸知頒告刻石恐塵大體望宣付國史臣伏見韶州奏事云廣州與臣立遺愛頌但碑所以頌德紀功披文相質臣在郡日課無所稱縱恭宣政理幸免罪戾一介俗吏何足書能濫承恩私見在樞密以臣光寵成彼諂諛欲革此風望自臣始請敕廣府即停嘉會表稱突騎施車鼻施勾引大食吐蕃擬取四鎮見圍撥換及大石城嘉會巳發三姓葛邏祿兵與史獻同掩襲臣等伏以突騎施等跡巳叛渙葛邏祿等志欲討除自是夷狄相攻元非朝廷所遣若大傷小滅皆利在國家成敗之狀即當聞奏王惠充使本為綏懷事意既殊未可令去望待以西表至續更商量陛下屢降德音勤恤人隱此誠蒼生繄賴明主用心但河北不登或須給貸貴在用遍省於差科共遵程式又考使去日恩敕再三若有饑弊隨使賑廩山東蒸黎德施溥洽又頃者緣農桑在候恐囚繫尚多徒巳下刑並責保放唯流死等色則情不可寬古人慎赦義在存法恐今有言事者未能細知直以月蝕修德或云分野應有災祥因而多言冀惑上聽臣以為君子道長小人道消女謁不行讒夫漸遠此所謂修德也囹圄不撓甲兵不興理官在平不以深苛為獄軍將慎舉不以輕進邀功此所謂修刑也向時祈陳皆朝廷常巳留念縱日月慎盈滿將因此而致福必指期而有應且君子恥言浮於行故曰豫欲無言又曰天何言哉四時行焉百物生焉望以至誠動神不要制書頻降其京城諸司及府縣繫囚仰重臣等即准敕興所由參詳處分夫儉德之恭侈惡之大高墳乃昔賢所誡厚葬實君子所非古者墓而不墳蓋此道也凡人子於哀迷之際則不以禮制為思故周孔設齊斬緦免之差衣衾棺槨之度賢者俯就私懷不果且蒼梧之野驪山之徒善惡分區圖史所載衆人皆務奢靡而獨能革之斯所謂至孝要道也中宮若以為言則此理固可敦諭在外或云竇太尉墳甚高取則不遠者縱令往日無極言者其事偶行令出一時故非常式貞觀中文德皇后嫁所生女長樂公主奏請儀注加於長公主魏徵諫云皇帝之姑姊為長公主皇帝之女為公主既有長字合高於公主若加於長公主事甚不可引漢明故事云㣥臣欲封皇子為王帝曰朕子豈敢與先帝子等時太宗嘉納之文德皇后奏降中使致謝於徵此則乾坤輔佐之間綽有餘裕豈若韋庶人父追加王位擅作酆陵禍不旋踵為天下笑則犯顏逆耳阿意順旨不可同日而言也况令之所載預作紀綱情既無窮故為之制度不因人以搖動不變法以愛憎所謂金科玉條蓋以此也比來蕃夷等輩及城市閒人遞以奢靡相高不將禮儀為意今以后父之寵開府之榮金穴玉衣之資不憂少物高墳大寢之役不畏無人百事皆出於官一朝亦可以就而臣等區區不巳屢以上聞諒欲成朝廷之政崇國母之德化浹寰區聲光竹素儻中宮情不可奪陛下不能苦違即準令一品合陪陵葬者墳高三丈巳上四丈以下降敕將同陪陵之例即極是高下得宜墨綬臨人國僑隨班於邑宰青襟敬業希顏齒跡於鄉校將宣風於禮教道化未敷議為政之得失訟聲斯起利害之間非是相半何則修六禮以節性明七教以崇德蓋闡皇王之風何虧令長之教至若廢耕釋耒方行殷摯之法計畝分疆後施子産之令風雨惟序豈資區種之勤虞芮不爭焉用井田之制處事則於人不便容或施張加箠則於法有違固須科結宋臣位末名卑迹參郎署前任後改亦異階資欲定見任之階希取視流之品且視流於正流既別勳品將三品斯殊階雖請於後高品終在於前任章程可據體例先施犯罪雖許同科定階難為共貫宜從二品庶允三章文之禮樂適可成人目以政事方為具臣豈才不足寧道斯屯其謂國老眇然清塵朝隱字友清趙州欒城人纍遷給事中聖歷二年轉麟臺少監諂事張易之常代作篇什易之伏誅坐徙嶺外先天中復為祕書少監坐事貶通州別駕一陰一陽備藻繢以成文章載清載濁挂天涯而臨地角生於氣立於空宛宛轉轉曈曈曨曨上下明媚表裏沖融洗奇光於暴雨留艷彩於飄風隱顯之情奚爾造化之理何窮若乃碧嶂無雲清江息浪曲折異體低昂殊狀半出高岊疑蟾魄之孤生全入澄瀾若蛾睂之相向又乃綺窗遠闢錦帳斜褰髣佛天上依稀目前暐兮煜兮既類丹山碧樹之重疊斷兮連兮又似美人彩女之嬋娟察之無涯究之無實光天地之大造保雲霄之元吉爰有下才或趨微秩其志蹇蹇其心栗栗體物無功著書有疾既蘊慚於明鏡載有閣於鴻筆夫元亨利貞開物之綱鍵也典謨訓誥設範之源流也變通周於三古而闕二字其情浸潤洽於九區而人乘其利闕二字之捶歲探其微如箠之折日取其半萬代而不盡府君之道歟府君諱本字闕二字長樂信都人也周之為主天子授以丕基晉則有人丞相登其寵渥自後衣冠代起組綬駢驅邦家必聞出幽都而獨秀名教可樂入魏國而先鳴曾祖闕一字後魏外兵參軍北地郡丞昂藏絶㣥耿介負俗其功可立思奧主而吁噓其道不行視危邦而傲睨祖悅宇文朝驃騎將軍定安闕一字郎中令與隋文帝有舊辟命不出去病以威名動俗升之驃騎雍齒以故舊生釁封以什方國步重清出為嘉州峩睂縣令仁恩浹於旋靶信義流於闔棺父賢隋校書郎國初率子弟應接義旗加通議大夫檢校定州北平縣令蒼匹篆籕之指歸陰陽術數之城府莫不備窮制造妙盡精微建功則與天會留委質闕五字重規沓矩驥闕一字鵬飛為珠則漢水聯華為玉則崑山動色公波瀾萬仞節目千丈闕一字衣璧水見科斗之為文鼓闕七字成字草隸斯盡筋肉備存或取以龜圖或詳諸鳥跡或理窮元妙或思盡毫芒以之象形㯋脫於前載以之會意闕九字解褐利州參軍徙帛丿糸州參軍頻丁父憂去職結廬在墓負土成墳父兮母兮鞠我育我取敬取愛以尊以嚴事闕七字荼蓼陟屺岵而不見行碎肝闕一字僅全毀滅之中重起簪裾之內服闋遷淄州録事闕二字乾封中入計上臨軒問闕九字王是臨奇獸不入九十百衆日月歲資草秸盡有為之門倉丘虛不急之事闕二字庾一粒積成九稔之儲露闕八字之産陛下以損為未損微臣以安為未安爰下天書載牧坰澤有犯無隱皆闕二字也尋擢亳州録事參軍如闕八字如網提綱得鳥期於一目功無所蔽過無所容巡察使以清白聞秩未進於闕二字名巳登於岱籙以咸亨四年闕六字春秋六十有四人吏傷心仰徽容其若疚友朋交臂顧支體其若失夫人恆農楊氏繼夫人上闕八字交接為國則土宇齊封陽數奇陰數偶以久視元年五月廾二日合祔於先塋禮也嗣子銀青光祿大夫闕六字留直昭文館敦直曾輿至孝閔闕一字醇心公才備於四科帝奬隆於三篋若韋闕一字之銘寶器若李斯之篆銅人挺生間起角立傑出兼張華之博物若孔光之深慎剖析凝滯則明鏡見膽鎔裁得失則利劍吹毛闕二字劬勞未盡罔極之報匍匐感咽庶期不朽之文朝隱竹簡舊遊蓬山遺老有企無愧考行直書乃銘其言俾刻於石冀東西南北闕夫子之墳焉其辭曰瓜瓞帛丿糸帛丿糸系於周年畢公自出畢萬是遷仕晉何代封魏何年食邑命氏馮鄉有焉符運代起水火更王闕一字燕稱孤入魏為相士流模楷名教宗匠冠冕搢紳允歸時望光光郡丞挺生其後昂藏獨得耿介是守辭疾邱園養高林藪雖即千駟非義不受赫赫驃騎聲雄五都盈尺美玉徑寸明珠盧綰即舊雍齒何辜或出或處與時並驅爰降異靈是生良宰陰陽數術篆籕文采嬌鷺未振潛龍有待以忠事君其跡斯在鳳凰有雛闕二字有駒雛鳴鏘鏘駒行昂昂登闕一字胄子擢於上庠參卿軍事其道逾光盡節匡時受命河洛典茲刺舉繩違景亳物情刻刓代務闕二字無謂我固藏舟於壑哀哀嗣子惴惴餘生孝友成性忠貞令名通於天地感於神明冀搖雄筆以紀頌聲千秋萬歲灌木豐草子孫盈門軒車闕一字道或青或紫以拜以掃披其遺文與天同老瓊一作伯瓊永昌元年進士問朕聞北辰端扆佇衆彥以經邦南面居尊俟㣥材而緯俗是知九官分職薰風之詠載敷八元匡朝就日之規方遠歷選列辟遐考前修並建明揚之躅式廣亠包方求之義故康衢扣角授相越於齊班海上牧羊封侯超於漢秩洎乎淳風陵替雅道湮沈仕必因基官非材進官雖備職位匪得人遂使七輔之材銷聲於巖穴六佐之彥晦跡於邱園寤寐以之載勞虛佇今欲革因循之弊躡稽古之蹤此志雖勤其途未遂為是旌賁爽於前代英傑寡於今晨佇爾昌言朕將親覽對珠衡上列聖人居耀魄之尊玉理旁融元后握乾坤之柄膺寶歷而推五勝皇綱居混沌之先懸玉鏡而運三千帝系出氛氳之上莫不闢天關以統業橫地軸而開基象列宿而環北辰制諸侯而嚮南面柱州巢氏之際晦聲迹於龍圖結繩鍊石之餘摛景曜於龜象未有巨川巳濟不資舟楫之功大厦巳成不假棟梁之力至於遠電流祉既委任於三台就日居尊亦僉謀於四嶽道德為富魏文侯之式廬禮義可尊燕昭王之擁篲孔明佐蜀叶魚水以陳謀仲父相齊假鴻毛以康俗洎嬴暉掩鏡漢道亡珠位以恩升榮非德進挂網羅者則黃鵠高飛縻爵祿者則青鳧競至自欽明撫運憲章稽古司光鳳紀位映龍名振鷺來儀襲憲飇而鼓舞白駒萃止食苖場以縶維所以繩準百王牢籠萬代伏惟聖母皇帝陛下闢陰陽之一氣獨化初皇啓日月之三光混成太極靈祇翕忽出震宮而齊巽圍雲雨氤氳辨天垓而通地圻慕崩沙之靈運符潤石之休期憂在進賢道叶採苓之化恩無不逮德合樛木之風掩媧后以彌尊邁姬旦而立政吹竽釣璜之侶接武於階墀騎星弄電之夫肩隨於廊廟雖良駿充廄逾懷買骨之謀真龍在堂久佇丹青之玩應休璉之獨坐鳥雀來庭尹叔良之間居蠨蛸在戶傍加策問親覽政途詞麗汾州聲洋沛一作洛邑掩鵬圖而該魏網漆園無控地之詞飛鶴板而徵漢臣九皋有聞天之譽凡曰㣥生孰不幸甚臣中庸賤逸下澤幽微忝預明易攴謬承採擇馳心日路冀三捨以矜魂纍息天門瞻九重而惕慮謹對元義垂拱初為成均助教謹按孝經云孝莫大於嚴父嚴父莫大於配天既言莫大於配天明配尊大之天昊天是也物之大者莫大於天推父比天與之相配行孝之道莫過於此以明尊嚴之極也又易曰先王以作樂崇德殷薦之上帝以配祖考鄭元注上帝天帝也故知昊天之祭合祖考並配請奉太宗文武聖皇帝高宗天皇大帝配昊天上帝於圜丘義符孝經周易之文也神堯皇帝肇基王業應天順人請配感帝於南郊義符大傳之文又按祭法云祖文王而宗武王祖始也宗尊也所以名祭為尊始者明一祭之中有此二義又孝經云宗祀文王於明堂文王言祖而云宗者亦是通武王之義故知明堂之祭配以祖考請奉太宗文武聖皇帝高宗天皇大帝配祭於明堂義符周易及祭法之文也謹議撰韓王元嘉子少以文才見知諸王子中天后朝官通州刺史元嘉起兵誅武氏與父同坐誅有唐五十三祀龍集敦牂哀子李訓誼撰諶銜恤在疚置懷靡所永言報德思樹良因敬立大道天尊及侍真像粵若稽古藐覿遂初真宰貞乎得一混成表於沖用元之又元蹟超言象之域惟恍惟惚理冥視聽之端所以峒山順風勞乎靡索汾陽御辨窅然自喪曠矣哉道之韞也其寄於寥廓之場焉至於玉笈宣徽琅函吐祕方壺神闕蒙穀靈遊倏忽九陔導飛廉而從敦圉俯仰六合戴列星而乘雲氣固亦昭章逸軌肸蠁孤風淳化其瞭幽契無爽伏以先含貞載德克懋柔儀延慶台華正位藩閫動容資於典禮發言光乎針訓故紘綖是肅粢盛無違大當叶曜中閨以睦況倚閭分甘之澤徙居側目之規義越人倫恩深振古重以凝神道域抗志澄源淮館儀仙參鴻寶之靈術楚壇敷教暢微言之盛範儒元兼洞真俗兩該德冠母儀事高嬪則豈圖昊天不惠積善無徵咎罰奄鍾荼蓼俄集訓等痛纏過隟感切風枝泣血攀號自期顛隕祗奉嚴訓慈勉備隆偷存視息遄移氣序几筵寂寞瞻望長違創巨徒深寄哀何地所以貪及餘漏祈福元宗敬寫真容庶幾終古而土木非可久之致鎔鑄為誨盜之先肅奉沖規圖輝貞質睟容伊穆元儀有煒金真摛耀疑金闕之易奔琳華揚彩若琳房之可覲霓裳交映歘駕斯留帝晨飾翠雲之美香童散朱陵之馥載雕爰畢式展咸祈以此勝因上資神理伏願栖真碧落飛步黃庭謁㣥帝於天關攜列仙於雲路融心懸解宅美希夷注儀鄰以同煥指乾坤而齊極介茲多祉藩度惟隆如山作固永播熊章之烈循陔自勔冀申烏鳥之志孔明在鑒匪曰道遐同心嘄閽庶斯無拔昔人銜哀罔極鉛槧騰聲柔紛克劭義切張憑之誄至德興思痛深陸機之賦況清輝懋範宛若前蹤瞻言景行敢忘刊紀餘魂弱喘情不逮文謹託真猷直書心事音儀日遠風烈空傳叩心感慕終天何及
