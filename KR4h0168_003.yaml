front:
  text: 全唐文欽定全唐文卷三高祖三
  hash: sha256:fca0680354f7bdb632171f756ed7f8ffd4dbb82491db411f8217d9983da840aa
body:
  text: 六經茂典百王仰則四學崇教千載垂範是以西膠東序春誦夏弦說禮敦詩本仁祖義建邦立極咸必由之自叔世澆訛雅道淪缺爰歷歲紀儒風莫扇隋季以來喪亂滋甚眷言篇籍皆為煨燼周孔之教闕而不修庠孰之儀泯焉將墜非所以闡揚徽烈敦尚風範訓民調俗垂裕後昆朕受命膺期握圖馭宇思宏至道冀宣德化永言墳素深存講習所以捃托遺逸招集散亡諸生胄子特加獎勸而凋弊之餘湮替日久學徒尚少經術未隆子襟之歎無忘興寢方今函夏既清干戈漸戢搢紳之業此則可興宜下四方諸州有明一經巳上未被升擢者本屬舉送具以名聞有司試策加階敘用其吏民子弟有識性開敏志希學藝亦具名狀申送入京量其差品並即配學明設考課各使勵精琢玉成器庶其非遠州縣及鄉各令置學官僚牧宰或不存意普更頒下早遣立修夫安上治民莫善於禮出忠入孝自家刑國揖讓俯仰登降折旋皆有節文咸資端肅末葉踈惰隨時將廢凡厥生民各宜勉勵又釋奠之禮致敬先師鼓篋之義以明遜志比多闕略更宜詳備仲春釋奠朕將親覽所司具為條式以時宣下自古為政莫不以學則仁義禮智信五者俱備故能為利博深朕今欲敦本息末崇尚儒宗開後生之耳目行先王之典訓而三教雖異善歸一揆沙門事佛靈宇相望朝賢宗儒辟雍頓廢王公以下寧得不慚朕今親自觀覽仍徵集四方胄子冀日就月將並得成業禮讓既行風教漸改使期門介士比屋可封橫經庠序皆遵雅俗諸王公子弟並皆率先自相勸勵自有隋失馭盜賊交侵四海㣥飛六合雲擾上天降鑒爰命朕躬戡定凶災廓清宇縣然而江湖之外水鄉僻遠向化之民未能自達逆賊輔公祏驅扇凶醜蟻聚蜂屯侵虐黎民擾動城邑朕憫茲塗炭義在弔撫命彼偏師聊申薄伐沿流而下應機雷克寸氛祲清蕩遐邇乂寧文軌大同朝野咸慶今朱明戒節時方長育宜順天心播茲仁惠可大赦天下自武德七年四月一日昧爽巳前大辟罪巳下巳發露未發露繫囚見徒悉原免其犯十惡劫賊官人枉法受財主守自盜及常赦不免流巳上道者並不在赦例亡命山澤挾藏軍器百日不首者復罪如初其江州道行軍經途悠遠非無勞倦應供運轉及從軍之內有犯除解官人立勳效者並復官爵仍依本品隨才處分揚越之民新沾大化見在民戶給復一年其與賊同心共為逆亂非被迫脅情狀難原者不在此例古不云乎萬邦之君有典有則故九疇之敘興於夏世兩觀之法大備隆周所以禁暴懲奸宏風闡化安民立政莫此為先自戰國紛擾恃詐任力苛制煩刑於茲競起秦并天下隳滅禮教恣行酷烈害虐蒸民宇內騷然遂以顛覆漢氏撥亂思易前軌雖復務從約法蠲削嚴刑尚行葅醢之誅猶設錙銖之禁安民之化實有未宏刑措之風以茲莫致爰及魏晉流弊相沿寬猛乖方綱維失序下陵上替政散民凋皆由法令湮訛條章混謬自斯以後㝢縣瓜分戎馬交馳未遑典制有隋之世雖云釐革然而損益不定踈密無準品式章程罕能甄備加以微文曲致覽者惑其淺深異例同科用者殊其輕重遂使姦吏巧詆任情與奪愚民妄觸動陷羅網屢聞釐革卒以無成朕膺期受籙寧濟區宇永言至治興寐為勞補千年之墜典拯百王之餘弊思所以正本澄源式清流末永垂憲則貽範後昆爰命㣥才修定科律但今古異務文質不同喪亂之後事殊曩代應機適變救弊斯在是以斟酌繁省取合時宜矯正差違務從體要迄茲歷稔撰次始畢宜下四方即令頒用庶使吏曹肅無取懸石之多奏讞平允靡競錐刀之末勝殘去殺此焉非遠自隋以來離亂永久雅道淪缺儒風莫扇朕膺期御宇靜難齊民欽若典謨以資政術思宏德教光振遐軌是以廣設庠序益召學徒旁求俊異務從獎擢寧州羅川縣前兵曹史孝謙守約邱園伏膺道素爰有二子年並幼童講習孝經咸暢厥旨義方之訓實堪勵俗故從優秩賞以不次宜普頒示咸使知聞如此之徒並即申上朕加親覽特將褒異厚地載物社主其祭嘉穀養民稷惟元祀列聖垂範昔王通訓建邦正位莫此為先爰暨都邑建於州里率土之濱咸極莊敬所以勸農務本修始報功敦序教義整齊風俗末代澆浮祀典虧替時逢喪亂仁惠弛薄壇壝闕昭備之禮鄉閭無糾合之訓朕握圖受歷菲食卑宮奉圭璧以尊嚴潔粢盛而禋燎尚想躬稼勵精治本永言享祀宜存往紀是以吉日維戊親祀大社率從百僚以祈九穀今既南畝俶載東作方興州縣致祀宜盡祗肅四方之民咸勤殖藝隨其性類命為宗社京邑庶士臺省㣥官里閈相從共尊社法以時供祀各申祈報兼存宴醑之義用洽鄉黨之歡且立節文明為典制進退俯仰登降折旋明加誨勵遞相勸獎齊之以禮有且格布告天下即宜遵用槐路清肅台階重峻經邦論道燮諧是屬然而表德優賢昔王令典庸勳紀績列代通規尚書左僕射魏國公寂地胄清華風神閒悟立志溫裕局量宏雅爰自義旗早參締搆冥契所感實資同德譬茲梁棟有若鹽梅翊贊綢繆庶政惟允歷居端揆彞章緝穆元功懋德膺茲重望可司空三台望重仰叶辰曜五教任隆俯安邦國實資懿德式寄親賢侍中并州大都督左衛大將軍上柱國齊王元吉器量凝邈風神爽邁徽猷夙著嘉譽早隆出蒞方嶽政績兼懋入侍帷扆獻納允屬推轂閫外備展勳庸職司禁旅戎章以緝燮理之任朝典攸宜可司徒餘如故門下釋迦闡教清靜為先遠離塵垢斷除貪欲所以宏宣勝業修殖善根開導愚迷津梁品庶是以敷演經教檢約學徒調伏身心捨諸染著衣服飲食咸資四輩自覺王遷謝像法流行末代陵遲漸以虧濫乃有猥賤之侶規自尊高浮惰之人苟避徭役妄為剃度託號出家嗜欲無厭營求不息出入閭里周旋闤闠驅策畜産聚積貨物耕織為生估販成業事同編戶迹等齊人進違戒律之文退無禮典之訓至乃親行劫掠躬自穿窬造作妖訛交通豪猾每罹憲網自陷重刑黷亂真如傾毀妙法譬茲稂莠有穢嘉苗類彼淤泥混夫清水又伽藍之地本曰淨居栖心之所理尚幽寂近代巳來多立寺舍不求閒曠之境唯趣喧雜之方繕築崎嶇甍宇舛錯招來隱匿誘納姦邪或有接近廠墨邸鄰邇屠酤埃塵滿室羶腥盈道徒長輕慢之心有虧崇敬之義且老氏垂化本實沖虛養志無為遺情物外全真守一是為元門驅馳世務尤乖宗旨朕膺期馭宇興隆教法志思利益情在護持欲使玉石區分薰蕕有辨長存妙道永固福田正本澄源宜從沙汰諸僧尼道士女冠等有精勤練行守戒律者並令就大寺觀居住官給衣食勿令乏短其不能精進戒行有闕者不堪供養並令罷退各還桑梓所司明為條式務依法教違制之事悉宜停斷京城留寺三所觀二所其餘天下諸州各留一所餘悉罷之朕恭膺寶位臨馭萬方綏育黔黎於茲九載欲使仁惠之政達於天下德義之方孚於宇宙豈謂莫大之釁近發蕭牆反噬之惡滅於天性皇太子建成地居嫡長屬當儲二處以少陽冀克負荷遂昵近㣥小聽受邪謀蔑棄君親離阻骨肉密圖悖逆潛為梟獍司徒齊王元吉寄深盤石任惟翰屏寵樹既厚職位非輕背違天經協同元惡助成隱慝遞相驅扇醜心逆迹一旦盡彰惟彼二凶罪窮數稔禍不旋踵用取屠戮念茲醜惡慙恨盈懷今禍難既除氛祲澄蕩國步夷坦政道惟新思與萬民滌除更始可大赦天下自武德九年六月四日申時巳前罪無輕重巳發露未發露繫囚見徒悉原免凶逆之事止在二人自餘徒黨其被詿誤一無所問各從曠蕩其僧尼道士女冠宜依舊軍國事皆受秦王處分儲二之重式固宗祧一有元良以貞萬國天策上將太尉尚書令陝東道大行臺尚書令益州道行臺尚書令雍州牧蒲州都督領十二衛大將軍中書令上柱國秦王世民器質沖遠風猷昭茂宏圖夙著美業日隆孝惟德本周於百行仁為重任以安萬物王跡初基經營締搆戡翦多難征討不庭嘉謀特舉長算必克寸敷政大邦宣風區隩功高四履道冠二南任總機衡庶績惟允職兼內外彞章載敘遐邇屬意朝野具瞻宜乘鼎業允膺守器可立為皇太子所司具禮以時冊命朕君臨率土劬勞庶政昧旦求衣思宏至道而萬機繁委成務殷積當扆日昃實疲聽覽皇太子世民夙稟生知識量明允文德武功平一宇內九官惟敘四門以穆朕付託得人義同釋負遐邇寧泰嘉慰良深自今以後軍機兵仗倉糧凡厥庶政事無大小悉委皇太子斷決然後聞奏既溥天同慶宜加惠澤為父後者若有封爵皆令襲繼諸赤牒擬授職事官見任者並即為真其巳得替者參選之日聽依階敘亡官失爵者量加擢用逋租宿賦及先負官錢物悉從蠲免文武官人節級頒賜務存優洽稱朕意焉乾道統天文明於是馭歷大寶曰位宸極所以居尊在昔勛華不昌厥緒揖遜之禮旁求歷試三代以降天下為家繼體承基裔嗣相襲故能孝饗宗廟卜世長遠貽慶後昆克隆鼎祚朕膺期受命握圖闡極大拯橫流載寧區夏然而昧旦丕顯日昃坐朝馭朽兢懷履冰在念憂勤庶政九載於茲今英華巳竭耄期倦勤久懷物表高蹈風雲釋纍遺塵有同脫屣深求閒逸用保休和皇太子世民久叶祥符夙彰奇表天縱神武智韞機深自雲雷締搆霸業伊始義旗之舉首創成規京邑克平莫非其力乃皇極巳建天步猶艱內發謀猷外清氛祲英圖冠世妙算窮神伐暴除凶無思不服薛舉負西戎之衆武周引北狄之兵蝟起蜂飛假名竊號元戎所指折首傾巢王世充藉府庫之資憑山河之固信臣精卒承閒守險建德因之同惡相濟金鼓才震一縱兩擒師不踰時戎衣大定夷劉闥於趙魏覆徐朗於譙亠兊功格穹蒼德孚宇宙雄才宏略振古莫儔造我大唐繄其是賴既而居中作相任隆列辟百揆時總三階以平地屬元良實維固本萬邦咸正兆庶樂推晷緯呈象休徵允集華夏載佇謳頌知歸今傳皇帝位於世民所司備禮以時冊授公卿百官四方嶽牧及長吏下至士民宜悉祗奉以稱朕意夫政惟通變禮貴從宜利在因民義存適要條章法度不便於時者隨事改易勿有疑滯昔漢祖撥亂身定大功㣥臣推奉光宅帝位而事父資敬五日一朝備禮尊崇號稱太上朕方游心恬淡安神元默無為拱揖憲章往古稱謂之儀一準漢代庶宗社之固申錫無疆天祿之期永安勿替布告天下咸使知聞師仁乳母王氏慈惠有聞撫鞠無倦提攜遺幼背逆歸朝宜有褒隆以賜其號可封永壽郡君得公之言特存社稷運智者之策以能成人之美納諫者之言以金寶酬其德今賚公黃金一函以報智者勿為推退也書云知人則哲唯帝難之易曰通其變使民不倦故太伯端委周室以隆東海就國漢基方永立權致治不其然乎朕世襲緇衣家傳鼎業佐魏及周勤勞王室有隋御歷地居戚里嘗以補天在慮納揆為心大業道喪皇極如燬傾維折柱天下分離塗炭納隍黔黎殆盡顧茲九有鋒鏑縱橫靜念持扶計無所出世民幼懷大度性合天道韞經緯之奇文包湯武之宏略深謀祕策沃朕拯溺之心壯思雄圖起豫救焚之志因其感激許以經綸糾合義師投袂而起車次於平陽之郊劒及於孟津之會元戎所指冰消霧捲曾未浹旬廓清京邑定非常之業建不世之功三古以來未之聞也朱旗西指則仁杲喪元白羽東臨則世充泥首摧武周如拉朽收建德若拾遺至若黑闥逋誅圓朗小醜三捷七擒不可勝計一人之力冠今超古暴之遐邇豈待昌言往以建成嫡長冀其養德日就不謂匿怨友于忌能毀善讒言屢發殆至鑠金賴天啓朕心宗社降福密悟凶邪指麾殲殄朕愧受浸潤深念元功乃敬授帝圖先天傳政懼其溢滿驕上未稱三靈之心縱欲肆情不恤萬方之重朕故仍居紫極處之肅成察其復禮觀其齊政露往霜來四載於茲矣比聞思我王度克難克艱昧旦丕顯去奢去泰朝夕視膳蒸蒸之性日嚴昃景憂民翼翼之情日慎南越驟水北狄款關四海晏然五兵偃戢招君璋之衆只用尺書屠師都之城無虧寸刃公卿輯睦遠邇乂安金鼓絶於疆場玉鏡懸於億兆盡善盡美吾無閒然匪天祐之孰能至此令月吉辰風調雨順朕俯觀人事仰鑒穹旻當養性別宮使其正位居極宜令有司具禮務在周備朕得脫屣高蹈擬跡於軒轅授歷傳璽爰屬於啓誦大寶既固卜年惟永付託有所何樂如之百辟卿士等或晉陽從我同披荊棘或秦邸故吏早預腹心並以德舉言揚進忠顯孝保乂社稷天平地成惟當帶礪山河與國休戚可悉心輔弼無黨無偏罔或隳哉替爾丕績善事元首稱朕意焉君之於臣尚須探察父之審子豈可同常汝夙懷忠孝吾愛汝亦過於諸子況立功德具如前詔所恨吾受讒言幾至投杼上元降福神器安寧此乃宗廟有靈非獨吾之幸也比察汝布政聽汝德音洋洋盈耳副吾所望昔齊有粃政而致小白晉有艱難而獲重耳今天下慶賴在汝一人頃者寒暑不調水旱乖節止是吾之與汝安處未得其位乃致承乾所居非少陽之體吾今往西宮方思萬代之福汝何勞撝抑頻此言請且深思大道永保社稷善始令終無或懈怠奉行吾誥勿以小讓為懷至公之言彼宮此室勢何殊也異姓賢者尚欲權之今汝巳克負荷應茲當璧極慰吾意宜絶常辭也嗚呼夫受命終畢人之大倫修短之所共同聖賢之所不免朕往逢喪亂思濟黎元櫛風沐雨東征西伐克寸平宇內從此樂推遂膺景命恭承寶歷但蒙犯矢石羈束戎旅久厭干戈常思閒逸是以拂衣高謝歸老櫟陽爰委萬幾屬之才子所授得人遐邇寧輯四海清晏八表來庭養志怡神於今十載但去秋巳來夙疾咸發自爾彌留至於大漸皓首歸全斯何恨矣洮頮憑几略陳素志朕每覽漢文遺詔殷勤歎焉以為當今之世咸喜生而惡死厚葬而破業重服以傷生吾甚不取且朕既不德無以佐百姓今崩又使重服久臨以罹寒暑之數以重吾之不德謂天下何吏民令到出臨三日皆釋服無禁嫁娶飲酒食肉此豈非深達天命哀矜百姓者歟又魏文終制亦有可取朕雖德愧古人豈忘景行屬纊之後三日便殮文武官人三品巳下三日朝晡哭臨十五舉音事訖便出四品巳上臨於朝堂殿中當臨者非朝夕臨時無得擅哭其方鎮嶽牧在任官人各於治所舉哀三日且今王師四討軍機急速小殮既竟嗣子宜於別所視事軍國大事不得停闕尋常閒務任之有司其服輕重悉從漢制以日易月於事為宜其園陵制度務從儉約斟酌漢魏以為規矩百辟卿士孝子忠臣送往事居勿違朕意焉夫天地定位否泰迭其盛衰日月著明虧昃貶其貞滿惟神莫測尚乃盈虛矧茲王道能無悔吝古先帝世炎漢商周撥亂乘乾多歷年所厥嗣墜緒時屬艱危則其股肱宰衡藩屏親戚勠力同獎推心翼戴顛或可扶糾合而奔官守惡不可救廢放而安宗社伊霍桓文並其人也率爾踵武代有其事布在方策可得而言日者蒼精云謝炎運將啓上天眷命屬乎隋室於是我高祖文皇帝以后父之尊周親入相豹變陝左龍飛漢東誅尉迥於韓魏則神鉦遏響勦王謙於巴蜀則靈山斯鏤四罪咸服九有樂推經綸帷幄之閒揖讓巖廊之內造我區夏不更期月舜禹以來受終未有如斯之易者以故臨朝恭己庶績為心親覽萬幾平章百姓兢兢慎於馭朽翼翼懼於烹鮮齊六合為一家等黔黎於赤子有陳不率殄虐政於江湖獯醜相屠降封虜於沙漠其弔民也如彼其和戎也若茲散馬牛於山林鑄劒㦸為農器求瘼恤隱訟息刑清輕徭薄賦家給人足倉庫流衍於里閭職貢委輸於帑藏豈獨水衡貫朽常平粟紅而巳哉加以愛民治國節用而敦本深根固蒂因河而踐華肆覲朝宗止於京邑元覽縱觀弗踰岐下遐邇叶和內外禔福凱澤洋溢休祥紹至一世之氓咸賴仁壽二紀之治可謂隆平揚榷往初歷選前辟詩書所美莫之能尚然聖人千慮失於知子以正萬國輕易元良廢守器之長立不才之庶兆亂之萌於是乎在異哉今上之行已也獨智自賢安忍忌刻拓狂悖為混沌苟鴆毒為恣睢飾非好佞拒諫信讒敵怨誠良仇讎骨肉巡幸無度窮兵極武喜怒不恆親離衆叛御河導洛肆舳艫而達江馳道緣邊徑長城而傍海離宮別館之所在車轍馬跡之所向咸塹山而谷畢結瑤而搆瓊遼水屢征殲丁壯於億兆伊谷轉輸斃老幼於百萬禽荒罄於飛走蠶食窮於水陸征稅盡於重斂民力殫於勞止十分天下九為盜賊荊棘旅於闕廷豺狼充於道路帶牛佩犢輟耕者連孤竹而寇潢池鋤耰棘矜大呼者聚萑苻而起芒澤青羌白狄剽夷道而闕二字黃巾赤眉屠閭左而竊號暴骸如莽僵尸若麻敵國滿畫鷁之舟胡越繞和鸞之轂四海波振而冰冸五嶽塵飛而土崩踞積薪以待然鉗衆口而寄坐明明皇祖貽厥無人赫赫宗隋滅為亡國某以庸虛謬蒙嘉惠承七葉之餘慶資五世之克昌遂得地居戚里家稱公室典驍衛之禁兵守封唐之大宇義無坐觀綴旒之絶不舉勤王之師苟利社稷專之可也廢昏立明敢遵故實今便興甲晉陽奉尊代邸掃定咸雒集寧㝢縣放後主於江都復先帝之鴻績固配天於圜寢存司牧於蒼生豈謂一朝言及於此事不獲巳追增感欷凡厥士民義旅豪傑敏究時難曉達權謀家怨國雪乎今日從我同盟無為二志有渝此盟神其殛之皇帝臣某敢用元牡昭告於皇天后帝生人以來樹之司牧眷命所屬謂之大寶歷數所在罔或偷安故舜禹至公揖讓而興虞夏湯武兼濟干戈以定商周事乃殊途功成一致後之創業咸取則焉某承家慶世祿降祉曰祖曰考纍功載德賜履參墟建侯唐舊地居戚里門號公宮承緒建基足為榮矣但有隋屬厭大業爽德饑饉師旅民胥怨咨謫見咎徵昭於皇鑒備聞卑聽所不忍言某守晉陽馳心魏闕援手濡足拯溺救焚大舉義兵式寧區宇懲邊荒之辮髮輯兆庶之離心誓以捐軀救茲生命掃除喪亂期之乂安有功繼世無希九五惟身及子竭誠盡力率先鋒鏑誓以無二再蒙宏誘克濟艱難電掃風驅廓清天邑傳檄而定岷峨拱手而平關隴西戎即敘東夷底定非啓非贊孰能茲速尊立世嫡翼奉宗隋勠力輔政無虧臣節值鼎祚云革天祿將移謳歌獄訟聿來唐邸人神符瑞輻湊微躬遠近宅心華夷請命少帝知神器有適大運將去遜位而禪若隋之初讓德不嗣㣥情逼請六宗闕祀七政未齊罪有所歸恐當天譴請因吉日克舉前典設壇肆類祗謁上帝惠茲下人翼子謀孫罔敢愆德則小則大無或有違對越鴻休伏深慚懼謹遣太尉公裴寂等用薦告之禮瑞冊蒼璧秬鬯清酌薌合薌萁明粢嘉蔬禋祀於皇皇后帝明靈降享闕備羽儀法物臨軒大赦天下改義寧二年為武德元年維武德四年歲次辛巳十一月甲申朔二日乙酉皇帝若曰於戲咨爾太尉尚書令左右武大將軍陝東道行臺尚書令涼州總管秦王世民夙標器望早樹風猷業創經綸功高運始重以廓清秦隴翦伐鯨鯢掃蕩河汾芟夷凶逆周韓大盜趙魏逋誅二寇弗賓用阻朝化嚴兵鞏洛總率戎麾內運奇謀外申威略凶渠攝竄假命危城河朔蟻徒來相赴援一鼓誓衆以擒建德回戈旋指遂獲世充二方克定師不再舉武節既宣朝風遐暢宏規懿績獨冠卿尹宜錫寵章式加殊號光備禮物特超恆典是用命爾為天策上將位王公上領司徒陝東道大行臺尚書令增邑二萬戶通前三萬戶餘如故加賜金輅一乘衮冕之服玉璧一雙黃金六千斤前後二部鼓吹及九部之樂班劒四十人欽哉恭承寵命可不慎歟夫天生蒸民樹以司牧三靈輔德百姓與能粵自夏殷傳業裔祚軌物長世率繇茲道朕祗膺靈命肇開寶歷聲教所覃無思不服然而萬幾填委九區輻湊明發不寐極夜觀書聽政勞神經謀損慮深思閒曠釋茲重負咨爾聰明神武德實天生君人之量爰備夙成王業初基雲雷伊始英謀獨斷祕策潛申及拓定關隴澄清河雒北通元塞東靜青邱宏圖遐舉元功克茂氛霧廓清鯨鯢斯盡澤霑方外聲暢無垠總統機衡百工以乂敷宏德化四門允穆謳歌所屬宇內宅心象緯告徵靈命斯在朕是用上稽蒼昊俯順黔黎推而弗居永垂顯號致皇帝位於爾躬今命司空上柱國魏國公寂尚書左僕射上柱國宋國公瑀齎璽綬授爾其纂承洪緒對揚休命式隆寶祚以康四海鄭州刺史李淵為男世民因患先於此寺求佛蒙佛恩力其患得損今為男敬造石碑像一鋪願此功德資益弟子男及合家大小福德具足永無災鄣弟子李淵一心供養朕恭膺寶命君臨率土祗順三靈綏柔萬國普天之下情均撫字日月所照咸使乂安王既統攝遼左世居藩服思稟正朔遠修職貢故遣使者跋涉山川申布誠懇朕甚嘉焉方今六合寧晏四海清平玉帛既通道路無壅方申輯睦永敦聘好各保疆埸豈非盛美但隋氏季年連兵搆難攻戰之所各失其民遂使骨肉乖離室家分析多歷年歲怨曠不申今二國通和義無阻異在此所有高麗人等巳令追括尋即遣送彼處有此國人者王可放還務盡撫育之方共宏仁恕之道卿昔久在桂州仍屬隋室運終四方圯絶率衆保境未知所統朕撫臨天下志在綏育眷彼幽遐思沾聲教況卿朕之宗姓情異於常一家弟姪並立誠效公又分遣首領申諭諸州情深奉國甚副所望卿之子弟並據州縣俱展誠績每所嘉歎不能巳巳令並入屬籍著於宗正昔在青襟同游庠序博士吳玉其妻姓仇追想此時宛然在目荏苒歲月遂成纍紀且在安州之日公家乃蒞嶽州渡遼之時伯裔又同戎旅安危契闊纍葉同之其閒游之處觸事可想雖盧綰與劉邦同里吳質共曹丕接席以今方古何足稱焉而公追硯席之舊歡存通家之曩好明鑒去就之理洞識成敗之機爰自荊門馳心絳闕惠懷士庶糾合賓寮踰越江山遠申誠款覽此忠至彌以慰懷涪州之全卿之力也功績垂成念自勗勵富貴之事非卿而誰
