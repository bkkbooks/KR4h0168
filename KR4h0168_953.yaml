  text: 全唐文欽定全唐文卷九百五十三
  hash: sha256:e997d990d9b001ccfaba721073f9c13cc4082d8617daf5be466f4233974fc167
  markers:
  - {type: head, offset: 14, content: 常暉, id: KR4h0168_NFKB_953-h1, level: 1}
body:
  text: 昔者帝軒君臣道叶刳木為舟剡木為楫洪水以之徑度大川於焉利涉疑夏日之初蓮似秋風之落葉動而必利其物居而必虛其心善蘭桂之得性惡泥滓之陸沈清流澈影岸狹波深直容與而孤運非軌轍之能尋動而何極居而不測以謙虛而受盈尚樸素而思飾為而不有質而能力不以克己辭於功不以利物矜其德夫潛行不離於水有似智焉虛已以濟於物有似仁焉不畏蛟龍之浦不恥魚鼈之泉任規模於匠者隨物理之推遷橫不測之流無慙於勇決指送歸之路有類於神仙爾其渡遼按甲伏波受命絕島如雲長川似鏡值衝風之颯起引孤帆而高映榜人奇唱櫂聲不一赴海淩川箭馳風疾臨地角而長逝望天涯而迥出飄颻畫鷁決孤影而排風迢遞檣烏轉危竿而就日且夫履有常道濟無不通嘉守義於共伯慚棄仁於衞公安而不傾得性江湖之上悠哉獨運託質浮況之浪為用也大為德也廣操檝則津女輕歌畫土則廩君孤往襄城帶其寶劒神亭飛乎銀仗惟傅巖之版築臨巨川而長想崇崇大舟內谽谺而坑谷外突兀以山邱長百尋受萬斛淺淮泗滯原陸兀若簸大海以出鯨魚邈如漂崑崙而橫地軸及夫縱大壑鼓雄風謺高濤肇蒼穹連山嶪於天外疾雷吼於地中當此時也忽然湧出漫若乘空挺無何之鄉樹摩天之檣檜檝不舉雲帆高張平林焂閃以藏沒㣥島飛動而相望兩儀混沌萬象渺茫崇山成秋毫滿月猶隙光一日二日經岷峨而歷扶桑外甚馳騖中唯虛閒所以望之者勢同纍卵居之者安如泰山借如唐堯洪水大浸桑田包山上陵刮地滔天無巨舟矣人其魚焉有若漢武習戰羽衞雲陳鑿昆明者四十里坐豫章者一萬人夫其為大與世殊倫暨乎巨象初來輪囷其貌錙銖犀兕蠛蠓貔豹向非刻舟鑒其淺深殆輕重而難較岑彭西伐杜預南征千里江漢三軍甲兵若非廣艘宏舸何以蜀滅吳平稽前代之為用信殊途而同軌以古况今相去遠矣何者我后無唐堯洪水懲漢武昆池笑魏家秤象偃晉國興師則大舟之用殊於昔時乃令守在海外化漸無垠浮三江以實倉廪遶四溟以周乾坤既而飛鳳詔宣鴻恩或西盡月窟東臨朝暾南國徂遊北極馳奔窮水路以適遠為大舟之用存於戲向者將遊萬里之外滯一曲之內故知德有所長皆以拙於用大今以濟渡為功適天下而皆通假其風水之力不離江漢之中向使移舟為人以海為主元首契合大舟夾輔則傅說之濟川同功軒皇之刳木何取客有扣舷而歌曰是舟也非大匠則無以成非大水則膠而傾非大風則道不行此皆大匠之則大海之德一日千里者風之力也余以天倫篤睦日重月深每惟兄弟孔懷在物無喻嘗讀陸士衡之兄弟文懃懃懇懇未嘗不廢卷歎息尚其為人而世人云陸機兄弟同居以之為異傷哉斯固異其所稀見也將恐悠悠千載不無此惑敢託陸之旨以作論云客謂陸平原曰吾聞天降地騰夫婦之情見矣星分岳列兄弟之義存焉是以聖人之立教也上稽元極下順人情故使牉合為同穴之親昆季有異居之道斯則人倫之大典豈作者之謬陳哉而子大夫名為習禮伯仲無門庭之別室家匪琴瑟之間雖激揚風俗獨為君子違道任心將使先人事也事不師古蒙竊惑焉豈有說乎願聞其旨平原曰何居斯言之玷可謂末學膚受曾莫是師即如君子之談必且輕於身而累於俗矣獨不聞夫六龍方駕斯有御天之功駟馬班如用効行地之力是故大鵬之始宛轉北溟鄧林之初婆娑下土至於羽翮相資遂能負蒼天而遊罩青雲而立此則相須之道宏也至如梁山萬仞上干星辰楚殿三休俯臨風雨及土石異勢榱棟分離遂與沙麓俱崩㘭堂共泯此則相須之道乖也是知同德者易為功離心者難為力在物猶爾而况人乎然不善莫大於不睦溺於情者薄於義寡於私者豐於道故牝雞晨鳴三賢孥戮關睢樂得十亂同心固名賢之所聞豈烏有之談也且夫兄弟者同天共地均氣連形方手足而猶輕擬山岳而更重靈蛇可斷兄弟之道無分鶺鴒載飛急難之情斯切先王知兄弟之為重也故歌之於韶夏之舞誦之於風雅之篇敦骨肉而正人倫風鬼神而動天地大矣哉請為左右梗㮣其說夫兄弟之情也受之於天性生之於自然不假物以成親不因言而結愛䦧牆不妨於禦侮踰里猶惜於伐樹馭朽則須洛而歌彎弓則涕泣而道斯乃情存於不捨義形於惻隱豈如悠悠良辰從容永歎而已是以四鳥禽也不能鳴離別之聲三荊木也不能忍分張之痛矧在人流有靦面目折枝分骨如何勿傷至於夫妻之為義矣非有血屬之親譬猶風虎雲龍騰嘯相感至如髧彼兩髦結歡二族始有共牢之禮終為同穴之親斯亦未為輕也然而德在聽從主唯蘋藻不可以寄百里之命不可以託六尺之孤况有棄姓無常拂衣再醮至如買臣之室主父之妻固未可以言也自非道讚移天德均維鵲孰能長螽斯之羽翼茂葛藟之本根者乎是以通人君子動無失德全同生之重則恭順有章戒惟家之索而椒蘭無替夫妻和於鼎餁兄弟穆於清風綠衣無燕燕之悲角弓匪騂騂之歎其或分星宅土開國承家則能藩屏維城左右王室力足拔山不敢問九鼎之重才能動俗不敢窺司馬之門遂使封豕長蛇望國門而斂迹井蛙幕燕覩磐石而飛鳴故能本支百代洪基峻極配合二儀平章百姓其在白屋黃冠蓽門圭竇三逕五畝有足相容至有同衾共席推梨讓棗樂以簞瓢榮同華萼死生契白刃交前弟瘦兄肥無胥遠矣爾其友于怡怡揚名以顯高視風俗長揖縉紳斯又足為樂也而無賴之徒不思其友或溺於私愛棄彼天倫生在膏腴乘藉地勢錫珪分竹奄有山河不能輔車相依股肱同患乃欲搖動我家室拔塞我本源既而青蠅飛於干旌無極遊於二壘集矢長勺撫劒共池是以五爭四裂非關虵鬬之妖九合一匡猶見蠱流之禍鬼神不勝其酷生民不勝其弊吁可畏也何其謬哉又有里閈之人繩樞之子棲息不過於蓬蓽咀嚼不越於糟糠無財可不忿爭乃復尺布斗粟不能相容睚眦蠆介側目切齒遂使蕞爾箕帚蠢爾孩童萋菲其章成是貝錦於是乎分裂蝸角稱競鴻毛骨肉為行路之人兄弟無陟岡之望痛矣悲矣何必情矣宮之奇脣亡之歎深可撫心王叔治斷臂之言足為流涕其知也如此其繆也如彼遠乎得失豈可同年而語哉是知禍福無門唯人所召靜言成敗則可得而論何則存亡之道若行邁之有途得之者安於廟堂失之者顛沛斯及至如三叔狼顧七國雞連貔虎搏噬江山表裏當其時也滄波可汲而斷泰山可蹋而覆朱旗尚卷蒼兕未馳不待高壘之謀勿俟銜枚之陣固以冰泮瓦解魚潰鳥驚身膏草莽名彰史策經過者為之迴車言談者為之洗耳斯豈時不利而兵不勁者哉固以天地所不容人神所同惡者也斯乃在和不在衆在德不在強商周之不敵亦所聞也假使驅長狄駕遺風宋萬附輿慶忌參乘勍弓飲石長劍拄頤冠雞佩猳拖象拉兕然而使之超九折跨三危浮呂梁赴滄海五尺童子心知必亡何則道之非也苟令心腹無瑕昆季輯穆雖使要離策杖不占緩步周流九逵容可危乎近者劉荊州之意氣袁渤海之縱橫當其吐納荊揚鞭笞河朔猛將厲於鵰鶚謀臣盛於雲雨從容嘯咤有席卷八荒之心固以震慴人靈熏灼宇宙者既而良圖未就壯志先秋瘡痏實生蕭牆糜潰天道與人心共往生人與草木俱萎雖睦於曹公尚無旰食之暇安得馬上而舞哉斯有惑之甚也豈如稷契昇朝同心同德魯衞為政雖休勿休得使康哉良哉之歌洋洋盈耳卜代卜年之祚悠悠無極是知管蔡之玉食不如夷齊之餓死君頹之萬闕不如延陵之退耕詩不云乎此令兄弟綽綽有裕不令兄弟交相為瘉善哉言也吾無間然今吾子以同穴者重之於天倫異居者成之於行路是見詩人之糟粕未覩宮牆之室家固未可與適道也若以骨肉遠而為疎即手足無腹心之用牉合近而為重即衣衾為血屬之親若衣衾附體而可離手足遠身而可絕斯則室家之不侔於兄弟固亦明矣况作者之意有異是乎夫異家者所以避私同穴者示以不返故傳曰昆季一體又兄弟之道無分然而有分者何謂異居同財者若委支體於行路阻天倫於胡越固非其所謂願聞也且余與士龍少遭憫凶攀風樹而興歎懷仁義以罔極零丁齠齔霜露摧心契九夷更相為命常恐黃耳蕭條白駒超忽洞庭木葉零巖花落無時雖復飲啄相依光華未著跼天蹐地每深慙德友于兄弟何日忘之將謂吾子有以成教而反問我比以流俗祇足以攪其心慮非所望於吾賢也於是客赧然而起曰僕固小人無聞至道雖生堯舜之代未登孔子之堂苟有胷而無心遂逐情而忘性言排名義之外身陷泥塗之下今子大夫幸而見覩博我以友弟宏我以禮經洋洋乎理出天人之表恢恢焉道周仁義之鄉而今而後謹聞命矣是知安社稷御邦家調陰陽化風俗播清猷於緗素垂令範於黎甿橫之於天地而自安處之於生死而無慮者其惟兄弟乎月周於紀水次於行其候凜冽其氣清英倏歲陰之將盡復陽春之載萌知北陸之寒光尚斂喜東郊之暖氣先迎是以候雁思朔潛鱗或驚裂金犬以取諸助氣策土牛以示乃發生在弦望而宜早當晦朔而得平我皇於焉以設教賢相由是以持衡請循其本也太史告時有司選吉冬官蕆事牛人乃出將協地紀克符天秩約歲時之儉泰示農耕之遲疾惟穀是登惟人是恤察前後之準祈倉廪之實故知丑以牛為用牛以土為質合陰陽之妙旨齊冬夏之祕術豈比夫作享昊天為牲繭栗而已哉於是時既斯得令無不通候農祥而取正引丁壯而就功我疆我理自西自東以茲政行而化洽宜其人和而年豐徒觀乎彼蟄將啟斯牛是作正我耒耜務我耕鑿首巍巍以山聳角戢戢而林錯制以洪縻飾以丹雘出北陸以送寒佇西成而取穫野人知五畝可樹遊子懷二頃負郭國之有令罔敢不敬一人布和萬邦咸慶恩深草木澤浸翔泳考來今之規矩立振古之龜鏡自得上行下效紛紛輝映然後鼎取新革去舊惟利是持惟時是授自可家給而人足無乃兵強而國富曾孫之稼克稔唐叔之禾乃秀不忤於物有利於人稽乎天文上列於乾象究諸地志下協於坤珍不獨山川其舍曷云九十其犉夫如是物各遂其性農不奪其時仰崇邱之翼翼登春臺而熙熙相陳力而久矣願負重而來斯永懷種德冀念茲而在茲代有遊童樂事末工飾素紙以成鳥象飛鳶之戾空翻兮度將振沙之鷺杳兮空先漸陸之鴻抑之則有限縱之則無窮動息乎絲綸之際行藏乎掌握之中其翰非逸其羽乃疾弄輕影昂素質侔瑞鵲之臨河學靈烏之就日詭狀萬殊奇姿非一衝激吹而頻驚入增塵而乍失及夫晚際蕭寥近日迢遙出虛景逼長宵豔豔裔裔亭亭迢迢如片雪之初下似殘雲之欲消何裕如之囂囂紛攜茲而玩玩其上同綺翼之遷喬其下若馴雛之就喚虞羅獲免弦繳莫憚野鵠來遷而伴飛都人相視而指看歎乎升騰得勢真假相亂殊不慙鸚鵡之被籠蒼鷹之受絆六鶂尚退於宋都大鵬猶沈於海畔彼無識而無知亦曷足以見嗤但仰牽運不能自為無仙鶴九皋之響乏晨雞五德之奇零落倏忽悠揚暫時偕鵷鸞之侶入鳳凰之池向若勞力高風莫吹安有望於寥廓必不出於藩籬且紙之所尚事有攸往供筆陣之樂起詞華之賞故莫載於鳳文而反圖於鴟像因人而進爭路而長固不濟於時須欲屏之兮何爽長河千里聖主一清漢帝宣防猶負薪於瓠子王尊東郡尚堅立以安人所以河公不仁時聞泛濫主司有事每見隄防蓋卻畧於石門亦摧殺其水怒傅以客土將全其邑居聚之淇竹實拯以昏墊常流不弛於正道泗野寧浮於齧桑諒巡植之為功奚褰帷而見詰必人同鄭白食我京師或且溉而有餘何屯膏而不作均夫鄴令招不智於漳河異彼武安頓遺利於鄃邑良能沃野義在隨時請據河渠之書無違溝洫之志祭以主敬射以觀德三侯既設遂聞熊豹之差二簋可享爰申脯醢之奠甲進退有度揖讓而升方備於五善詎畧於六藝有如武子之妙以取牛心類后羿之能無全雀目祭必如在神當格思唯寧者立以繼代不屬者抗而射汝強飲強食陳祝史之正辭克禋克祀介曾孫之景福必也正其齒位稱彼兕觥將勞農以休息乃示宴以惠慈鐵冠所糾恐未三思鉛刀見用終資一割同於噬腊難以甘心聖上以睿德昭宣宸衷吉蠲靜以法地動而合天天何言哉每降鑒於明主君為政也亦仰觀乎上元是以魯史薦書雲之典禮經徵視朔之篇於時㝢縣昇平朝廷無事闢朱樓於曉日垂紫旒於空翠至誠必應果呈證聖之祥至感必通遂有效明之瑞乍異色而抱日或神光而覆地是知昊穹成命必在於昌期元象著明詎違於躔次萬國來朝十月之交時當盈數氣發陰爻晴色俯臨遠接黑龍之水清輝四散仍縈彩鳳之巢臣竊觀前代之君也居九重之深據四海之大遇皇天之陰隲屬當時之交泰則必怠政理而不修唯昇平而是賴今陛下則不然體至道以得一播元精以吹萬發號施令必酌於故實垂範制法亦咨乎前憲古人云朔者蘇也陛下視之所以蘇息兆人雲者運也陛下觀之所以廣運明德人既蘇而寧靖德乃運而充塞猶儲精而谷神尚克己而作則方將揚耿光於五聖布深仁於萬國三事大夫抃而同歡上言曰陛下敦本棄末圖易於難夫此視朔情深履端况式瞻於萬象將布政於千官固可軼緹油而播美藏金匱而不刊然聖上方以無為作慮不宰為心鼓元氣之士冖䂞調薰風之琴以至德撫御以大明照臨盛矣夫聖德若此豈微臣之所能謳吟祀事孔明必先於酒醴神其戾止亦在於馨香所以實彼樽彞達其牆屋太常恪勤乃職無忝司存光祿簡慢是彰自貽伊戚且酒人之職素著於周官酎飲之儀頗聞於班史殷因夏禮斯損益之可知漢立秦祠固典章而無墜本經不失前法宜遵何廢禮而速尤欲隳官而招譴包茅不入尚責於齊侯鬱鬯廢供且虧於唐禮既不知於金草斯自掛於玉條祠部所云奚其不當徒稱沿廢罕顧禮經且千畝陳儀牲牢致用而三清乏薦犧象焉施仙臺所論愚管非測禮虧禺若刑其捨諸巫山之岡秦川之陽垂條引蔓布綠敷黃彌皋被野含芬吐芳轉晨風之穆穆湛宵露之瀼瀼花葉則煜煜煒煒文彩則焜焜煌煌錦繡為之失色霞日為之奪光遠而望之粲兮爛繁星列兮曜長漢光色連延遙相煖迫而察之瓞兮帛丿糸明璣盈蚌媚重泉大鱗巨介近相連細雨流風每飄颻兮葉上遊蜂戲蝶時歷亂於花前爾其大則三尺二升美則金漿玉實貍頭羊骹之字黃㼐白摶之質感仙貴於孫鍾避世資於步步馬異蔕表於前代同心彰於曩日既而橫綺席會嘉賓琴罇逸賞海陸具陳香分四座氣雜八珍既取類於母子亦取辨於君臣欽哉彼美流玩不巳何以剖之金錯刀何以澆之玉英水邵平因植以著業阮籍託詞而興已非但畱怨於戍夫抑亦取誡於君子阜俗敦本長財飭力三時展務九扈分官自公田而及私田俾我疆而豐我理千箱起詠佇美於詩人四體既勤孰慙於夫子當勤甿而有典奚議課以不齊景也伊何職茲為吏任農均力未恤於人言徇公害私旋招於物議事頗彰於妨奪法難逭於科繩考魯宣之舊章有同大桀徵穀梁之前志須示小懲宜詳刑於士師盍歸罪於田畯容貌相似陽貨惑於仲尼德義可尊門人師於有若歲丁辰巳甲遂云亡月亦居諸乙方傳學實喪予於東魯復疑汝於西河已寂琴歌詎聞金石思其笑語寧忘罰一作菽水之恩慕彼威儀一作循誘爰動頹山之戀不墜吾師之業還昇弟子之堂惟爾嗣音專之可也讓其非禮於已不然有事古風未驚今聽臣某言伏蒙天恩贈臣父尚書右丞司農卿先臣某揚州大都督禮極哀榮感戴增懼臣某中謝臣父受教儒門宣力王室雖典司綱轄而未及崇班臣殃咎所終早失嚴蔭恭守遺訓致及人倫逮事休明謬登清貫常恐不克負荷忝辱祖宗豈謂陽和之仁因下炎上雨露之澤自葉流根大府名藩位秩崇重授之庶姓罕有其倫是臣父著績於先朝蒙寵於今日臣事君之節未効涓塵為子之方已榮松檟感恩思報豈謂為忠覆族殞身孰云非孝方任有限拜謝無由徬徨海隅進退哀懼不任荷恩之至當官而行必議徵斂賦里以入宜均有無政或違於小康稅乃行於大桀是以我疆我理分上下之田有國有家建中正之術不是過也皆將取焉伊惟縣官昧爾為政誠合酌於古訓量其經入使穀不過藉人斯樂輸今乃將多徵於前復重斂其後所謂莫益或擊徒聞浚我以生雖億兆是謀用給如貔之士而徵求失道寧忘碩鼠之詩且九年之儲常聞富國二猶不足匪曰能言請從避馬之繩庶叶公羊之訓君子寧小窮而大達小人寧小達而大窮小者人之役大者人之道也孟子論帝王之道於諸侯諸侯不志我言則去之豈不以小窮而大達也歟衞鞅論帝王之道於秦伯秦伯寐於是鞅乃易之以霸強之術而苟容之豈不謂小達而大窮歟君子不患乎無才患乎不知窮達之理也孟子大達遠盜蹊而遵正路者也衞鞅大窮舍正路而趨盜蹊者也秦不知蹊以問鞅鞅指之趨盜蹊而強去也我知盜之蹊而返然之曷若遵正路而遠盜蹊哉兵惟靜難食以聚兵儻歲計之無虞必軍須之不繼縣司以職其日給科彼倉儲薿薿公田嗟不登於晚歲嗷嗷士卒慮縣罄於糗糧厚斂之旨豈坐於冉求盍徹之稅已聞於有若情非徇已事或從權請霽霜簡之威庶獲雨田之稔
