front:
  text: 全唐文欽定全唐文卷八十六帝諱儇懿宗第五子咸通三年生六年封普王名儼十四年七月立為皇太子改今名是月即位乾符二年正月上尊號聖神聰睿仁哲明孝皇帝光啟元年五月再上尊號至德光烈孝皇帝文德元年五月又上尊號聖文睿德光武宏孝皇帝在位十六年年二十七諡曰惠聖恭定孝皇帝廟號僖宗
  hash: sha256:974c21328352b40c9b5230c1adbd2ffc53d4933b961b8085143a994c50989f49
