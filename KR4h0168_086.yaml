body:
  text: 朕以沙陀驍勇重累戰功六州蕃渾沐浴王化念其出於猜貳互有傷殘而克璋報仇其意未巳被我君臨之德軫吾子育之心爰擇良能俾之宣撫惟爾先正嘗鎮北門待國昌以雄傑之才置國昌於濟活之地既藉奕葉之舊又懷任土之觀是用付以封疆委之軍旅必集王事無墜家聲彥昭歷試有勞僉諧無媿涉於六月秉是一心修乃文可以興文教勵乃武可以成武功重整前規兩司大計清能壁立政乃風行姦欺屏絕於多岐請託銷摧於正議不煩內庫有助涓毫不假外藩有進絲髮軍食所入餘剩於明年郊廟所供克辦於今歲頗符神化真謂廟謀不有良臣安能富國宜酬勳於黃閤俾正位於紫垣敬服誡詞永堅茂業嗚呼秉均之道何所難哉覆車之塗近巳多矣與其樹黨不若修身與其收恩不如秉直買暫勝者貽其永敗沽小智者囊其大愚不貴及人唯爭自我初誠潤屋尋以危家金玉滿堂莫之能守縱經營而得位用枉撓而當辜唯爾選自朕心採於人望宣詔既畢閑門未知來遂奔車退無私謝獨推元老曾請急徵以守道而自臻實榮親之最重爾其堅持正直允執規程但畏幽陰必歸公當甘言可憚敘往可嗤獎善須明懲姦須銳利於人者雖難必舉利於己者雖易勿為頻念孤寒每思耕織常自勤於數事便有望於中興彰朕知臣在卿匡國必使恩從下布法自上行但立直標終無曲影苟致我於堯舜亦比爾於皐夔可中書侍郎依前判度支事頃者時鬱正途權歸邪幸爾畋執心無惑秉節被讒徵復鴛行愈洽人望既負彌綸之業宜居輔弼之司可本官同平章事門下將相之權安危所係注專戎律秉持國鈞謂成靖亂之謀以著匡時之績方期功就俄以疾辭仍乖撫字之方且異毗予之道尚居崇秩猶念初心諸軍四面行營都統鳳翔隴等州節度觀察處置等使開府儀同三司守司空兼門下侍郎同中書門下平章事鳳翔尹上柱國滎陽縣開國子食邑二千戶鄭畋藝高冊府譽動詞林禮樂在躬衣簪奕代虹玉動連城之價朱絃含清廟之音才無不周識無不綜踐歷既久聞望時稱禁林傳麗藻之工鳳沼著經綸之業洎凶徒犯順上國罹災駕當出於全蜀鎮方臨於右輔因時建策遂首興師上寬焦灼之懷下慰蒸黎之望念其竭節頻降殊恩任三事之優崇授四面之節制許於除授皆俾遵行則朕於施功之臣可謂無有愛惜而不能傾心養士盡力惜人致興半菽之嗟竟起多寒之怨既乖撫馭幾誤權宜賴仗義之徒叶心王事主善暗符於朕意摧姦必建於勳庸尚保傅於承華仍優游於東洛未妨頤養猶示渥恩凡百庶寮宜體朕意可太子少傅分司東都散官勳封如故仍且於興元管內逐便將養疾損日赴任主者施行古者公卿在朝則輔主致理有事則統衆出征是以郤縠行師爰求說禮祭遵推轂不廢雅歌今者羌寇未寧烽煙尚警慎擇鎮安之路尤資柱石之功若非文武兼才將相全業夙蘊峻望為吾鼎臣豈傾丹赤之懷以授股肱之任開府儀同三司門下侍郎兼兵部尚書同中書門下平章事充太清宮使宏文館大學士延資庫使上柱國滎陽郡開國公食邑二千戶鄭從讜秀稟岳靈操含冰潔趙衰冬日樂廣青天端操而峭壁寧偕曠度而澄波未測周密得大臣之體誠明宏君子之儒許月品題人倫自警膺門步武明彥知歸奮飛早踐於修途育德邁高於輿論仗節三光於侯府題劒累涉於崇班洎擢處鈞衡若來麟鳳才惟應物動必研幾屹若嵩巒炳符台曜嵇松磊落長標構厦之姿和璧溫良克表如虹之氣朕以北門重鎮興王故都披全晉之山河有陶唐之風俗以爾曾施惠化尚有去思方當用武之時暫輟調元之職爾其厚撫戰士謹備糧儲必使黠虜革心征師賈勇善守訓齊之令以圖台鼎之勳帖以上公式光元輔佇殲凶醜副我憂勤往惟欽哉可檢校司徒同中書門下平章事行太原尹充北都留守河東節度管內觀察處置兼行營招討等使門下朕聞天下安注意於相天下危注意於將爾今應吾內外之委任也朕以塵昏㝢縣血染生靈乘輿播越於道途巡幸奔馳於巴蜀夙夜思咎寢食不遑期早殄於羣妖冀速清於國步今則重煩台德再秉鈞衡碧幢不離於岐山黃閣暫移於隴坻安危倚望中外具瞻諸軍四面行營都統鳳翔隴等州節度觀察處置等使開府儀同三司檢校司空同中書門下平章事兼鳳翔尹上柱國滎陽郡開國侯食邑三千戶鄭畋岳瀆炳靈星辰煥發雅裁既揚於冰玉沖襟咸契於神明達古今理亂之源識文武經綸之道作時柱石為國棟梁洎周旋闕榮出入將相功業每留於史冊懿範允播於縉紳昨鎮近藩首摧巨盜今雖狼心漸革蠆尾將攻干戈尚遍於咸秦虵豕猶侵於宮闕運雖至此天實賚予況誓掃寇讎志收社稷蘊沈機而愈勁奮獨斷而不回激諭軍行倡率義旅下韝必中傳檄無疑指呼而方面悅隨慷慨而懦夫請命風生貔武川湧熊羆期繫頸於逡巡佇舂喉於旦夕朕且念用兵汧隴駐蹕坤維指揮而遠在一隅請急而動聞踰月於以舉疇庸之典於以圖必勝之謀在乎盛以軍戎任其陶鑄使統制並遵於麾下訏謨皆在於彀中將凱還佇其冊命於戲簪裾禮樂儼然丞相之風旗幛鼓鼙蔚爾將軍之貴裴度以出征淮蔡敏中以招討羌戎皆仗以節旄付之樞柄期樹功業固不同年勉圖大勳同酬殊渥位正台階之重官崇水土之榮敬之哉無忝我重命可守司空兼門下侍郎同中書門下平章事依前充四面行營都統鳳翔隴等州節度觀察處置等使兼鳳翔尹散官勳賜如故仍令所司收復京城後備冊命主者施行夫足食足兵古之善政故趙充國以屯田為上策諸葛亮用祁連作奇謀皆前代伐叛之良規兵家聚衆之急務也況乎命我元老平彼羣凶必兼才力之司方濟軍師之用賴茲一舉以保萬全諸道行營都統指揮收復京城兼租庸等使權知義成軍節度使鄭滑等州管內觀察等使開府儀同三司守司徒兼中書令判延資庫使上柱國晉國公食邑三千戶王鐸偉望宏材宏襟遠慮三登台輔久領樞機蔚為社稷之臣實重巖廊之器近以京都未克寇孽尚存妙算屢陳忠誠奮發思登壇以糾合誓建斾以掃除朕由是暫輟陶鎔俾專統制五侯九伯盡列戎行猛將謀臣皆瞻馬首得不分其國柄委以地征收租賦於四方從便宜於萬里軍須無闕天討必行副予倚注之懷全仗廟廊之力敬承休命佇策大勳可兼判戶部事餘如故門下朕以煙塵犯闕士庶貽災思九廟以懷慚顧萬邦而是愧危同馭朽誡甚履冰遂乃虔祝上元冀平積憤勞於宵旰實貫神明其有捨元輔之崇副大朝之切拜章瀝懇面奏請行者得不超茲爵秩盛以統臨今則釐斾經時駐軍未進宜更戎號以煥寵光諸道行營都統指揮諸軍兵馬收復京城租庸等使兼判延資庫戶部事權知義成軍節度鄭滑潁州觀察處置等使兼開府儀同三司守司徒兼中書令上柱國晉國公食邑三千戶王鐸碩德名門清風直道為一時之圭表作百行之源流騏驥絕塵方知逸勢松篁犯雪更耀寒光洎中第從軍昇朝擅價掌綸業茂選士功高進必流芳勞惟可則專銅鹽之任副舟楫之權雅有令名不誣信史爾後再持鈞軸重領藩維智識愈精始終無替旋屬省方之際犯難而來首冒鋒鋩忠貫天地由是將我大柄答爾明誠當其危阽之時實有整持之計沈機累獻祕畫頻聞漸理綱條儼予班序致使簪裾復盛禮樂重興克念爾勞諒洽人聽而又忿茲國難期以身先懇望統師力求專伐既佇平於狡穴貴獨耀於將星宸命登壇俾之仗鉞及之白馬謺降紫泥雖嘉將就之勳尚滯進軍之策而諸軍觀望相顧遷延將謀盪定之期因有改更之制在吾優賢之道求舊之心俾循和嶠之榮敷其五教更假卻縠之用惠此一方爾宜振彼宏圖聳於東夏式資論道共賛中興體我深懷敬承休命可檢校司徒守中書令使持節滑州諸軍事守滑州刺史充義成軍節度使滑潁等州觀察處置等使散官勳封如故主者施行門下五帝垂衣本資乎輔弼三王御宇必藉其謀猷誠聖哲之規章實邦家之軌範然則得其人則天下致理輕其任則海內多虞興廢之端古今斯在開府儀同三司行太子少師上柱國晉國公食邑三千戶王鐸台階降瑞鼎位呈祥峻極承天清暉助日保道德而立性因文章而飾身良玉重礲貞金百煉道惟經濟自西虢以安人術本匡時辭東山而為國洎歷揚中外出入班行栖息鸞臺優游鳳沼榮膺三事冠絕羣寮致君之業彌深及物之功益著朝散大夫守尚書兵部侍郎判度支上柱國賜紫金魚袋蕭遘紫庭鍾律元圃琳瑯韻協金莖光昭衮黻自精通藝行履歷清崇逸翰摩雲高踪絕地近者臺綱稱職歲計成功霜威巳戢其奸邪日用無虧於饋輓昨以東隅寇盜嘯聚為羣俶擾關防奔衝畿甸朕巡遊梁益將復京都欲救生靈必資賢相鐸乃朝廷碩德社稷誠臣戴君之力無窮許國之心益勵是使重敷五教爰總萬端勿廾前修無忘厚獎遘乃孤標特立潔白不渝利可剸犀清能鑒髮輔成乾道兼領冬曹各副憂勤可安宵旰鐸可門下侍郎兼司徒同中書門下平章事散官勳賜如故仍令所司擇日備禮冊命遘可銀青光祿大夫守工部侍郎門下平章事仍落下判度支事主者施行門下夫宰相之任本於佐理陰陽節宣風雨允釐百工康濟萬邦豈可以經費之煩勞弼諧之重比以戎車方駕國用未充將欲定其準繩遂兼委於衡軸今則立事有制成規可遵既陳堅確之誠益尚執持之節宜加懋寵用示渥恩特進行中書侍郎兼戶部尚書同中書門下平章事監修國史上柱國蕭遘功高作礪業茂秉鈞韻同戞玉之清應作鏗鐘之響九流百氏供筆下之波瀾五色六章集人閒之光彩真為王佐衆號國楨射策詞高曳裾望重優游華貫黼黻明庭和符律呂之音簉合鸞皇之影譽洽多士聲振天朝負嚴樂之才華既司天語將徐庾之事業尤潤帝謨爰執憲綱搢紳自肅及專邦計饋餉無虧倚注之期朝昏是屬旋以塵侵羽衞寇犯郊畿保於患難之中不改始終之節首奔行在備竭忠謀明知管葛之才足副皐夔之選朕念茲士庶深痛傷痍授以鹽梅拯其塗炭及總機務大庇生靈盥薦之道益光奉上之心尤著藉其敏果委畀繁難果能窮利病之源去奸期之弊事皆條貫法以彰明特進退讓之誠益重燮調之任爾宜潛施祕略益進昌言激猛將以弭羣凶召和風而銷戾氣焚巢盪穴促其獻捷之音定賞策勳乃是銘鐘之日則更加峻秩別示寵章宜升黃閣之尊式表納言之貴可門下侍郎兼吏部尚書門下平章事監修國史散官勳如故仍落判度支門下宰相之任調元氣以作輔執大柄以匡君況狂寇未平戎車尚駕顧我勤勞之意在茲籌畫之功雖循舊規式加新寵光祿大夫行中書侍郎兼禮部尚書同中書門下平章事充集賢殿大學士上柱國蕭遘琮璜上瑞韶頀正音灑落襟靈品流多士有仲山補衮之助抱子房借箸之謀銀青光祿大夫行兵部侍郎同中書門下平章事上柱國韋昭度山岳蘊靈星辰耀彩澄澹不撓端莊自持懇懇常務於燮諧孜孜不忘於賛理而皆便蕃顯貫履歷清華為宗廟之棟梁作邦家之柱石言成損益知合蓍龜彌彰及霤之誠盡著匪躬之節每聽爾嘉話寬我殷憂所宜縱掌上之奇兵弭茲寇孽啟胷中之利器翦彼妖狂佇見中興之期須茲輔臣之力安危是注倚仗彌深地官既示其加恩大儀式彰其峻秩掌東觀陽秋之重總石渠刊校之權茂勳增榮崇階示貴久處黃閣宜正紫垣庶其更運籌謀速見平蕩佇丹青垂美鼎鼐勳高永茲魚水之歡用契雲龍之會承我茂寵爾其勉之遘可特進行中書侍郎兼戶部尚書同中書門下平章事監修國史勳如故昭度可光祿大夫行中書侍郎兼禮部尚書同中書門下平章事充集賢殿大學士上柱國勳如故主者施行門下朕聞先王之道相者調燮陰陽則四時順其序均和品彙則萬物適其宜然後扶危持顛易亂成理俾生植咸遂邦家克康故周卜帝師得諸渭水殷夢賢佐求之傅巖我擇股肱獲之侍從翰林學士承旨銀青光祿大夫行尚書兵部侍郎知制誥上柱國韋昭度誠貫金石行通神明氣含元精識洞蓍蔡窮文武弛張之道作棟梁舟楫之資為時閒生作我良輔洎昇名俊造歷官清華鴻翥九霄驥逸千里旋召宥密備著聲猷使我語言追三代之風使我典則符百王之法當風雨之如晦勵節敬恭念艱難之在途夙勤晨夜臨難得近臣之體效忠彰明哲之心是用總以萬機納於百揆作邦之楨秉國之均若魚水之相歡諒雲龍之合應君臣之道今古攸同於戲竊逆滔天兵戈散地宮朝未復宗社靡寧爾宜動察安危居圖匡濟設六奇之祕策發三略之沈機定元凶於一戎振頹綱於四裔紹貞觀太平之業啟開元中興之期光賛一人永阜羣庶勉集盛烈勒功盤彞往欽哉敬服休命可守本官同中書門下平章事勳賜如故主者施行門下玉斗七星降作帝王之子金枝百代生為列聖之孫冬夏教以詩書春秋訓以禮樂然後封其茅土示以寵光建王震天賦明哲氣稟粹和含日月之英華蘊山河之瑞秀心懸壽鏡腹貯學川智燭不稟而自明德車非駕而引重信逾翦葉名掩刻舟九苞之鳳儀赤霄五色之麟行丹地瑤池仙派非百水之同流銀漢雲源自三天而別注況幼稟師訓生知義方洊雷之象克明元良之名益著四教咸備三善永全喻葛藟之延長表瓜瓞之昌熾仁義道振孝忠聲聞似覩卿雲如觀景宿堪膺寵擢可賜爵封列國之榮暫領雄藩宜遵故事可授開府儀同三司守太保充魏博節度管內觀察處置等使兼魏州大都督府長史仍令所司擇日備禮冊命主者施行門下任賢勿貳有國之令圖惟帝念功昔人之善訓朕遐觀往代每慎厥終其有道濟邦家任巳崇於屏翰忠存宗社義可貫於神明宜徵帷幄之謀重委廟堂之算冀清大難以啟中興開府儀同三司守太子少傅分司東都上柱國滎陽縣開國侯食邑二千戶鄭畋八柱比崇三階垂耀繁露演先儒之學高風追大雅之文外標威鳳之儀內貯函牛之量煥如綸之旨共許才高被貝錦之辭彌彰道直體茲全德歷試崇資燮賛中樞極致君之事業鎮臨三輔標坐樹之威名洎虜犯封畿塵飛象魏避狄之謀既決微管之賴誠深而能竭預慮之機用安君父舉從權之計以誤奸凶當代之勳格天莫比此際雖咸思義舉盡蘊忠謀且聞盟主臧洪登壇有誓將軍祖逖擊楫忘身致蕃漢之齊驅由懷柔之有術今則不從人望內斷予衷罷列岳而登三公自金壇而昇玉鉉魚水之歡盡在君臣之契可知於戲寰宇未清予則仗綏懷之毗園陵失守予則佇收克之功次則揚惠化以拯窮人宏無私而敘羣品山河有誓金石豈渝更俟殊庸以膺極寵可守司空兼門下侍郎同中書門下平章事充太清宮使宏文館大學士餘如故仍命所司擇日備禮冊命主者施行天用日月司之以晦明帝賴股肱寄之以休戚念其功則報無所恡厚其賞則誡在可危爾勿徇於驕盈吾靡勞於姑息也時溥為時傑出臨難慨然用禮樂為身基知德刑為戰器文惟附衆武足取威萬旅無譁一方厎定朕以彭門人兼傖楚地控淮河因命專征果聞善訓公忠所化氣俗自平極將相之崇高作藩宣之軌則噫成功未易持祿尤難倚伏相循安危是繫朕嘗覽祖宗之紀每欽兼濟之圖尚父汾陽王太尉武穆王皆道合中興勳高往烈然子儀以恢宏體國保富貴於永年而光弼雖剛正奉公積猜嫌於晚節蓋坦懷未至則全美或虧言念大臣足為前鑒惟爾竭誠保奉著節始終疇咨雖顯於上台制爵宜加於異姓彼邦遺事故老當傳勿勞銘鼎之恭用永紳河之誓服茲休寵慎乃令圖庶俾君臣永於竹帛門下朕推轂求才登壇命將每於邊遠尤屬賢能況邕南地界蠻鄉甫新戎號外虞連歲創痍焚劫之餘上將開藩兵甲繕完之始中權所寄慎固尤難一作慎束固難用迴攘接之仁往整律竭之旅某官鄭愚價高東序氣茂南薰挺超卓之奇名蘊精剛之利器詞源獨濬其波瀾經笥莫窮其韜略佇自郄堂搴秀儉府增華霜署諫垣聯翩羽翰郎曹史館洋溢聲光益部播戎率之功商嶺著條刺之跡博洽強志居無流心遠略精能動有餘地日者熟其業用委以察廉果能宣布惠和講求利病纔報下車之政巳蘇闔境之人發為歌謠流滿道路朕以朗寧地分零桂共控夷蠻將以重城鎮於兩江壯服領於西道俾崇旄節用固疆陲而屬統馭有乖攪循生變戎章既失城守巳離宜得通敏之材以敷勞來之旨是用輟於隣部授以軍麾載觀易地之能俾服揚旌之貴既懋師節仍長憲臺勉承顧遇之榮佇觀輯柔之績可守邕州刺史兼御史大夫充嶺南西道節度觀察處置等使散官勳封如故主者施行我國家天歷自歸君臨無外十七聖滂流元澤積潤山靈三百年保定鴻基方延運祚其閒數纏災運禍起凶狂纔聞竊命之稱巳觸震雷之怒或腹心生變或骨肉相圖近事可明靈誅不漏蓋人祇之共憤乃宗社之儲休亦賴中外重臣佐佑薄德大恥既雪小康可期須申誥諭之勤用致綏懷之旨爾宗權藩垣攸屬倚仗特深雖章表繼來至誠可騐而兵戈未戢物論猶疑是生交構之端益惑親隣之聽況位崇將相爵極侯王圖功則國禍可平快志而家冤巳雪勸忠貞於部伍莫若率先鑒成敗於古今當思釋禍猶冒屬厭之誡適搖怙亂之機且患難雖繁封疆有制各圖侵軼自掇悔尤高潯之下澤州將攻偽帥周岌之窺臨汝本利危邦翻為致寇之資蓋昧啟讎之釁得土地為他人所有得貨財亦他人所資勢敵則相傾力均則相忌害莫深於歸怨利莫厚於圖安況井邑皆空耕桑盡廢歎瘡痍而未復軫哀痛而難忘且雒邑通都非列蕃之所併河陽要地亦諸夏之必爭若不制自本朝豈可公然竊據節旄寵授須俟王人賦稅均輸合資國用至於封疆隣接續可商議指揮但將還舊京尤藉近鎮繼聞薄陝巳受攻圍河外既事於枝梧關中自妨於漕轉迴車或阻奉國逾虧今者先在息兵各令守境爵位幸非愛惜君臣足保初終尚或執迷方知誤計若法制不行於一處即征伐須徇於衆情人亦有言理難為黨雖萬方之罪當責朕躬而九廟之威更憑天力縱以黃巢頃盜宮闕曾會師徒既戮元凶須遵後命所以寢興念慮詔示殷勤猶期遠保宿心不欲便乘衆怒山河著誓當明指日之心聖哲好生必用舞干之德佇披深欵勉蹈良圖朕以涼德祗膺寶圖不能上承天庥下正人紀兵革競興於㝢縣車輿再越於藩垣宗廟震驚烝嘗廢闕敬承典禮倍切哀摧宜付所司
