front:
  text: 全唐文欽定全唐文卷七百七李德裕十二
  hash: sha256:f56147a3f2ec0199b21f7dd28da3b7d6591468bf99c1d7d2f726640ae051f784
body:
  text: 會昌三年八月二十日大唐河東節度使檢校右僕射劉沔致書于九姓回鶻頡于相公閣下曩者回鶻因延陀之亂歸心中國太宗親幸靈武納彼降人置瀚海都督列於內地爰初封植自我深恩回鶻立國立家莫非唐德皇帝自聞回鶻乖亂繼以災荒為紇扢斯所攻國已殘滅可汗率傷痍之衆席捲而來朝廷遣告諭之使轂擊於外誠宜恭聽詔命漸歸漠南國家得以施拯救之恩成招攜之禮昔呼韓單于亦以離亂歸附漢廷定計之初則遣子入侍款塞之後又來朝京師既得為臣之義實展外藩之敬然後漢家擁護出塞救恤加恩况回鶻纍代稱藩久修臣禮只合先請朝謁自陳艱危太和公主是帝室愛女太皇太后夙所鍾念可汗亦宜遂其情禮便遣入朝雖皇帝不許當勤固請為可憐之意陳自託之誠豈不感明主之心塞華夷之望則我之救恤無所愧懷而乃睥睨邊城桀驁自若邀求過望如在本蕃遐邇之人無不驚嘆今又深入邊境殘虐生人以退渾為名侵暴未已黎庶伏竄莫敢定居秋稼盈疇不遑收刈夫欲求大國之援繼姻好之情當務交歡豈宜如是來書又云蕃人易動難安加忿怒後不可制得只如回鶻為紇扢斯所困豈可一日暫忘舉國將相遺骸棄於草莽纍代可汗墳墓隔在天涯固宜泣血枕戈嘗膽思報大雪寃恥告謝幽魂回鶻忿怒之心合施於彼而欲滅棄仁義逞志中華天地神祇豈容此事詩云剛亦不吐柔亦不茹回鶻以紇扢斯之強不敢報復可謂吐剛矣輕退渾之弱惟務傷殺可謂茹柔矣又詩云君子如怒亂庶遄沮君子怒以止亂不聞生亂望相公深思此義勿更輕言今弊邑恃回鶻之信不憚回鶻之怒若外與中國結怨內為紇扢斯所排遷集鳥徙流離蓬轉以沔揣度終難取濟前代郅支單于不事大漢寄命堅昆尋又遠託康居自成夷滅往事之戒得不在懷昔呼韓之敗也其臣伊秩訾勸呼韓稱臣事漢從漢求節呼韓納用其策竟保安全又戎子駒支將預晉盟執政以有二心數於朝駒支乃自稱不侵不叛何惡能為執政嘉之遽命即事今相公以偉才宏略匡弼可汗既無秩訾之明謹於事大又無駒支之辨自達其誠而欲絶纍代之歡興二國之禍稱雖釋憾何以戴天又古人云失之東隅收之桑榆倘自改悔實未為晚恐未嘗思此聊布所懷信之與否幸垂見示不具沔白來牒云未得般次歸國不知今日推明日回鶻聞此事盡頭悶者國家富有四海豈惜微細資財比在京交付藥羅葛九政藥羅葛氏也之時已不管領只緣可汗都無定所來去不常又無大段駝馬自取般次恐諸蕃劫奪須稍安詳欲令送至東北嶺外忽慮萬一散失又以詞語見尤望依前自遣駝馬般運此令兵馬護送又云嗢沒斯王子不合親近我國家統御四夷皆同赤子倘順於國盡合綏懷如天地之廣無不覆載如江海之大無不包容况嗢沒斯是先可汗子孫今可汗兄弟窮而歸命尤所矜憐若棄其款誠何以柔遠回鶻須自愧不恤兄弟令其不安更欲追尋是何道理彼酋長如迫於饑渴願歸國家優待之禮必與嗢沒斯無異想知朝廷眷遇回鶻之深也如可汗早依聖旨不入邊疆但歸漠南候命朝廷豈有所惜又云回鶻往前蕃人易動難安不可制得朝廷只要回鶻承順國家常為好事惟行仁義不作尤違則朝廷欲疏隔回鶻一日不得若只務侵擾漢界劫奪牛羊以此為強實所不憚如此行事與諸小部落何如欲稱回鶻強大豈肯敬貴忠順邊將粗才性本愚直輒此忠告幸垂三思紇扢斯專使將軍踏布合祖達千楃葛悉禾亥義判官元因娑拽汗阿已時等七人至天德上表云破滅回鶻之時收得皇帝女公主緣與大唐本是同姓之國固不敢留公主差都呂施合將軍送至南朝至今不知信息不知得達大唐為復被奸人中路隔絶緣此使不回今出四十萬兵尋覓若被別人留連不放請子細報即差人就彼尋覓上天入地終須覓得送公主使若入吐蕃國去即至吐蕃皇帝自覽表章頗深軫念緣與回鶻可汗久修鄰好加以姻親艱難之時常展勛力情義至重休戚是同今紇扢斯讐怨可汗兼求公主必慮大興兵甲糾合諸蕃長馳南行直至塞上今可汗人衆饑饉兵數無多強敵倘來將何禦捍非惟大唐之力救助至難兼恐邊城之民因此罹患可汗須與將相熟議早務良圖依倚側近山川深自藏匿且送公主歸國以避責言且紇扢斯雖來足得免禍又踏布合祖云紇扢斯即移就合羅川居回鶻舊國兼以得安西北庭達怛等五部落又云昨者二千騎送踏布合祖至磧北令纍路逢著回鶻即殺踏布自本國至天德西城更不逢著回鶻一人無可殺戮又恐回鶻與吐蕃通信已令兵馬把斷三河口道路則籌略兵馬之勢揣度可知且興廢在天否泰有運紇扢斯以寡為衆以弱為彊豈止人謀固是天贊古人云大福不再來蓋以天亡之後終難再振若欲且依黑車子延引歲時不惟雄豪所恥實亦諸蕃輕笑倘紇扢斯逼逐則黑車子之心焉可保信不如早歸大國自保安全順天命以去危恃姻好而求福皇帝寵待存恤必更加恩輒獻良針幸垂採納恐要見紇扢斯表本今亦録往某月日河東節度使符徹致書幽州大將周都衙以下比聞海內之論幽州師有紀律人懷義心河朔諸軍以為模楷今之所覩異於是矣竊知大將以下初上表舉陳行恭尋又舉張絳皆云文武全才軍情悅服今又不容張絳斥逐而來取舍之間蒼黃驟變且舉碁不定春秋所譏遠近聞之莫不口某蟲笑旬月之內移易三人不可謂師有紀律矣不俟朝旨專自樹置不可謂人懷義心矣今思頓雪前恥再取美名莫若謝罪朝廷別請戎帥如此則一軍盛美千古流芳徹忝在近鄰素欽風儀輒陳鄙見實謂良圖幸大將等三思不至疑惑昨覽大將等陳情表未知迷復頗事游詞宏敬任忝專征兼許招諭思欲布朝廷大信解彼深疑指事而言更無文飾只如公等本使疾病綿惙既以上聞便須請監軍權知兵馬以俟朝旨豈有表章未發邪計已萌遽遣劉稹衙內決事不令常侍父疾既虧子道深纍國章遠近聞知無不駭聽姜崟四月十三日到城至二十三日聖上驚異此事要知端的遂令追問冀得實情姜崟狀稱四月六日大衙宅內小聽實見本使至八日晚後劉稹傳本使處分令入城請醫並不見本使又云女壻李方四月五日降職至十將妹壻王再晟被發遣山東充邯鄲鎮佐軍虞候崟見女壻輩皆被降黜遂懷憂懼求郭誼覓使入城至四月三十日追問梁叔乂亦只緣公等本使不見宣慰問疾使又不見醫官梁叔乂自通狀云劉守義扶劉稹時叔乂對都押衙郭誼向守義道且莫如此若擬扶郎君待國家處分不可依河朔自專劉守義因此懷恨叔乂詐傳本使處分令入奏謝醫藥方便奪叔乂職事姜崟梁叔乂是彼心腹尚不得面見本使于朝廷通狀稱本軍盡云已亡軍中法嚴不知委細宣慰使既不得面見固難辨明今公等表章仍云故使初奏疾病姜崟梁叔乂並云被臺司收繫軍人聞此消息且言故使尚未薨背事已如此自是公等行詭譎之計誣罔朝廷凡所施為事多矯詐在朝廷須知事實焉得不一一追問及奏公等本使喪亡聖上三日廢朝寵贈師傅方欲遣使弔祭以備哀榮尋屬薛常侍回知不入衙門不受敕又鎮州省使方回及常道軍將樊琮回知公等拒命之心必無悛改聖上曲為含忍詢訪百僚朝廷大臣藩翰戎帥切齒憤惋如報私讐聖上事非獲已方降明制始終恩禮可謂無遺公等須知罪惡貫盈神人共棄更不得扇虛妄之說歸怨朝廷聊布所懷各當知悉自天寶以後兵起山東惟澤潞一軍不虧臣節李司徒抱玉以元勛上將初領戎韜李相公抱真武略忠誠復總戎柄教習步射振起軍聲為列鎮之雄皆李公之力及說諭太尉武俊首破朱滔擊韓師于武安屋瓦皆振剪符寇于淮服草木皆兵六十年間忠名尚在及李相公殂謝朝廷以王尚書虔休代之追李緘令居喪東洛一軍受命莫敢借留致澤潞功勛成澤潞節義邇代節相誰繼李公彼軍尚不顧私恩以隳王制豈有從諫跋扈既久忠孝無聞于彼一軍有何恩澤若委心澤潞將校即不合別置紀綱以劫脅人心自圖身計奈何拒君親之命從逆亂之謀近者盧從史首鼠兩端貪狼成性包隱奸慝逗留兵機彼大將烏司徒與王憲等因事圖之尋就束縛破朱滔之功未朽擒從史之效又彰誠動上元忠貫白日一軍盛美可不惜哉比聞從諫志在猖狂招致亡命逆人親黨遊客布衣皆在公宴之中列于大將之上一軍憤愧固已積年豈可舍纍代之美名忘近歲之深恥將性命家族以徇騃童生為不忠之人死為不臣之鬼彥佐忝受明命總彼成師感嘆之懷寢食忘次願將忠素宣布皇恩俟彼英豪見幾而作爵秩榮寵身自取之豈得臨難因循為人受禍勉思奇策以副深心賈㣥至承二十八日書誨承郎君自知愆負思保生全望闕披誠祈天請命遠述迷復聊慰石懷以石思之郎君為子為臣忠孝並棄居喪求襲阻命專權數遣亂軍侵軼鄰境比者河陽晉絳未有重兵侵犯顏行屢焚廬舍又疆場之吏收得彼管簿書皆呼官軍為賊來即痛殺可謂悖言肆口逆節滔天今欲自新誠為善意伏思聖上屈纍朝之法實亦至難在將相等懷忿惋之心豈宜延納然須得實事並見忠誠則聖上矜貸有名㣥臣陳請有路惟有盡率國屬面縛來降石即馳詣界首親自受納然後承詔解縛送赴闕庭則在朝公卿豈有異議臨境將帥皆得息詞如擬先求解兵次望洗雪則此暫延旬月之命以偷頃刻之安苟懷是心誰敢保信石屬忝宗室任極台階將身族保人豈是小事况國家自元和以來纍剪叛臣至于事迫計窮潛輸密款僞詞變詐無不備諳今欲行之必恐非計夫魯陽回日鄒子動天更無其他只在誠信如未從鄙見空獻表章石忝帥臣豈敢任受時不可失幸少詳思不宣石白鈞繆承寵寄獲撫雄藩實欲布時雨潤物之仁昭蘇合境揚薰風解慍之德安輯疲人想彼衆心必當感悅况昭義艱難之後常保忠名興元之初又著勳力穆宗以劉稹祖宗乘機變歸款朝廷委以節義之軍授以腹心之寄豈謂移淄青舊染之俗汙上黨為善之人日往月來㣥情如醉今王師問罪將及歲期憫彼一方迷而不返皆以奉劉稹為義實所懵然且封壤城池莫非王土軍人黎庶豈非王臣劉稹祖父竊我憲章質爾家族蔑棄大義顯負於君親將何詭詞自固於軍旅且夫示衆於大順求人以盡心而五郡從之終乃不悟昔晉侯重耳曰君父之命不校校者吾讐公等豈無誠心見此事理又公等貴劉稹祖者必以識君臣之義審順逆之心濯身滄波上覩白日以此為是遂能樂從今則自遭其時足以行志近者楊辨起于卒伍敢亂晉陽康政孫制等皆是耆將已居右職一旦狂惑助其凶威曾不再旬果就擒縛僇於都市罪及妻孥公等覩此禍機得不深戒李丕中丞能全徑節自拔亂邦曾未一年驟歷三郡已分茆土為國功臣公等見其光榮得不健羡成敗利害昭然可知禍福無門行之即是鈞所以不引古事不飾虛詞直指目前易於取信公等倘梟戮劉稹自建功名大則別領將旄次則不失符竹身受爵祿福及子孫去危就安事同反掌又得戎旅解甲黎庶歸耕老幼無焚灼之虞閭井得宴安之樂再洽恩化豈不美哉先布至懷各當信納夏首初熱伏惟十三叔動止萬福丕自歸朝廷頗獲優寵三領大郡榮列中司想十三叔遠聞必深喜慰頃歲寓遊上黨與主公素未相知十三叔翦拂提攜遂叨右職尋蒙見哀羈旅申以婚姻託繫援於高門實光榮於鄙族每懷恩遇刻骨銘肌去年初投國家便蒙聖上于三殿召對此時丕具奏云臣是十三叔遣密歸國先布款誠十三叔久受劉家厚恩未忍便棄留待挾持不得勢力稍衰必擒翦軍中惡人率先歸國聖上深賜信納已記十三叔姓名自後緣丕除授欣州去彼疆界遙遠常抱深恨無由自申今蒙改授晉州兼充右尚書副使密邇封壤瞻望不遙若不披露赤誠實負姻好回鶻可汗士馬已盡一身歸投黑車子近黠戛斯國王遣將軍百餘人入朝請發本國兵四十萬衆襲逐可汗擒送京闕又西蕃贊普近亡新立贊普才年十歲國中至今未定兩蕃宰相以下進表請託附大唐今國家邊塞底寧八表無事須將國力平殄五州除有司饋運之外聖上不惜內府金帛頻以出賜又諸道兵馬微有損傷即徵兵填替必作數年討伐之意十三叔自料形勢必當坐見危亡幸因丕在鄰近朝廷委信必須早圖功效自取寵榮保衰老之年全一門之命書名竹帛豈不美哉丕只在冀氏相去咫尺只要十三叔有一明據得聖上密知此狀到後且望惠數行手示潛布忠款丕便遣人進上必請密詔安存此事石尚書並不知丕指天誓心達此誠意幸垂延納不至遲疑禍機在身豈得顧望古人云晏安鴆毒不可懷也蓋以偷安比于鴆毒切望思之臨楮零涕此情何極不宣丕再拜雄白比者牙一本有內字兵馬使棄纍代之勛業為四海之罪人寄命網羅坐待夷滅將謂迫于將校未遂本心今則將校盡離軍心日駭若不見幾而作必恐受僇于人昨打暮宿寨收得文書云陳許游奕使賀意密報云官軍二十五日齊進雄牒報王尚書請勘虛實近得王尚書報云追到賀意勘責款稱曾在昭義效職與彼軍遊奕使唐再清情分至深每因遊奕相見彼此說軍中密事並已承伏王尚書便已按軍令訖賀意又款稱唐再清隔乾河密說云朝廷若與郎君節須從西面來若從南面來緣劉公直心懷兩端必恐自取又云二郎疾病絶重命在朝夕軍中已別有準擬不久即是王人忠武軍何必苦相殺傷又收得彼處投降軍將高文端等皆云回西諸寨兵馬商量欲立安全慶替兵馬使文端等不願更事全慶所以歸國雄雖久在行間不與先相公交接然俱是河朔軍將臭味略同將睹覆亡不無深惜今聖上方示大信以安危疑倘能自新必舍罪釁况兩面主兵大將皆有賊心事迫圖全必自救禍兵馬使若不早決大計束身歸降更欲遷延即無所及凉風已至白露將凝弓徑馬豪視險如砥糧儲豐足器甲精堅並是諸道強兵近方抽到士皆宿飽人有鬬心大兵一交立見焦爛輒申愚慮幸納至懷不具雄白何司徒頃因軍中擾攘起授翰垣推體國之誠動遵朝典罄守藩之禮終保令名遽此淪亡深可悼惜聞以監軍朝覲貴安物情軍府事權令後嗣勾當本於忠順固匪循私伏以聖上君臨惟新景化施王者之號令事貴有名奉祖宗之法度不可輕易旋觀臣節豈惜恩榮今公卿之議皆請別命戎帥聖上恩深悼往義在安人以司徒之盡忠方垂茂軌想後嗣之善繼必有令圖只在鄰近將帥成其美志元和初兩河跋扈之勢尚未可懷朝廷制置之宜難于今日李師道兵鋒物力足以自強猶悉獻吏員請頒貢賦管內鹽法皆歸有司瀝款披肝乃授留務王承宗迷而知復尋自納忠進德棣兩州以效誠節故得舉族榮盛一門保安望尚書以朝廷公議兩鎮舊體令速效忠款自求寵榮不使河朔鄰封誤其大計尚書藩方重寄宗室信臣報國之忠仰思展用成人之美必為忠謀望早布嘉言勤于善誘邀其實效勿受詭詞臨事制宜固在明略若未獲要領無憚再三待知赤誠方可聞奏但出于雅意不可云某等令布此懷其間若須商量者望於判官大將中揀忠信有才識人令充使至此伏希鑑悉不宣某等狀張判官至奉問具承情旨尚書以幽薊頻有叛亂志在澄清遠陳嘉猷益見忠懇况先侍中纍代繼美功德在人尚書自按鄰封日彰惠政想彼人情瞻望芬若椒蘭聖上天縱英明文武並用正是忠良報國之日將帥展力之時聖意又以幽薊一方頻害節將懲其汚俗未欲加恩張絳固須首變亂風恭俟朝旨若擬作三軍章表坐望兵符竊料聖情未必允許倘不早圖良計先效赤誠計不日之間必又致變聞彼軍大將多是舊人感先侍中深恩聆尚書美政導其善意必合遵承且望密遣腹心大布誠信令張絳自求多福以保永安若能請朝廷命帥舉尚書領鎮便自歸闕必不失二蕃金吾若欲外任即商量宋亳大郡便與亞相軍中兼與二十萬匹物充賞大將以下皆酬以官榮令此一軍永為朝廷心腹倘不思大義姑務因循即三數月間且不問著既未降朝命何以保安望尚書審更籌度早施方略必不可費國家財力致他日興師倘成此功永光史策張判官到後且詳觀事勢密自揣摩可之與否速望報示不宣某等狀上近聞遊奕使更收得劉稹章表竊以王太尉武俊有安國之大勳藏於清廟至於孫承宗阻命在鎮猶遣親弟承恭自太原詣張相上表祈哀憲宗不許旋又遣男知感知信入朝屬淄青殄滅因制使楊僕射檢得文案方知危害武相本在淄青承宗無盜殺之罪方獲昭雪今劉稹父子無功皆負重釁既不詣尚書面縛又不遣家屬祈哀置章表于衢路之間望朝廷降非常之澤悖慢無禮前古未聞遊奕將不便毀除實恐非是况楊辨遣親姪入潞州潛通情計劉稹並不擒送又石會關將楊珍去還石會關兼投賊界劉稹便敢受納已加兵固守比令逆將賈㣥送表至太原少傅李相公奏聞旋屬軍中有變竟未有進止處分楊辨潛送賈㣥卻歸劉稹亦便受領狡童逆狀如此不知進表何為昔漢宣帝將圖霍禹名臣張敞云不合明詔自親其文只合明詔以恩不聽㣥臣以義固爭今將帥大臣容其章表即是私惠歸於臣下不赦在于朝廷事體之間交恐不可切慮尚書以疆場之事皆須上聞惟此事抑而不奏未為至當望向後更有章表便令將校所在焚之惟面縛而來然後可受領輒此披陳幸垂鑒納不宣某等上狀聖上以尚書廉簡奉公和惠恤下所至之地皆有能名以昭義乘僭侈之餘非廉簡無以革弊當掊克之後非惠和無以安人故輟自漢南撫寧上黨承入境之日煦然如春壺漿塞途幼艾相慶甚善甚善近頻見章表救雪罪人姑務和寧以安反側竊循雅旨備見深懷然周書云刑亂國用重典蓋以汙染之俗終須蕩滌雖唐虞之際至理之極猶投放四罪天下乃定且以近事明之頃歲劉總送出幽州大將二十人當時執政以苟且為意奏請放還其後朱克融之徒皆是其數朝廷深懲前弊不得不然尚書公忠簡儉皆以具美惟稍缺威斷實願彌縫昔子産戒太叔以政莫如猛夫火烈人望而畏之故鮮死焉水懦弱人狎而玩之則多死焉太叔為政不忍猛而鄭國多盜太叔悔之曰吾早從夫子之言不及此諸葛入蜀刑法至峻法正諫曰君初有其地未垂惠恤且客主之義宜相降下願緩刑弛禁以慰其望亮答曰寵之以位位極則殘順之以恩恩極則慢吾今威之以法法行則知恩限之以爵爵加則知榮榮恩並濟上下有節為理之道於此而著尚書以子産諸葛亮何如人也尚不以而理斷可知矣切望猛相濟仁勇並施仗義而行臨事必斷不以小惠擾茲至公待一方之人皆明大順然後漸布仁德平之以和斯為得也輒陳至言幸垂信納不宣某等狀上某當先聖御極再參樞務兩度冊文及宣懿太后祔廟制聖容贊幽州紀聖功碑討回紇制討劉稹制五度黠戛斯書兩度用兵詔敕及先聖改名制告昊天上帝文並奏議等勒成十五卷正觀初有顏岑二中書代宗朝常相元和初某先太師忠懿公一代盛事皆所潤色小子詞業淺近獲繼家聲武宗一朝冊命典誥軍機羽檄皆受命撰述偶副聖情伏恐製序之時要知此意伏惟詳悉謹狀閏冬極寒伏惟諫議十五郎尊體動止萬福即日某悲緒外蒙差趙押衙至奉示問不任悚荷無由拜伏倍積瞻戀謹因使回奉狀不次閏十二月二十八日從表文崖州司戶參軍同正李某狀上天地窮人物情所棄無復音書平生舊知無復弔問閣老至仁念舊盛德矜孤再降專人遠逾溟漲兼賜衣服器物茶藥至多槁木暫榮寒灰稍暖開緘感切涕咽難勝大海之中無人拯恤資儲蕩盡家事一空百口嗷然往往絶食塊獨窮悴終日苦饑惟恨垂沒之年頓作餒死之鬼自十月末得疾伏枕七旬屬纊者數四藥物陳裛又無醫人委命信天幸而自活羸憊至甚生意方微自料此生無由再望旌棨臨紙涕戀不勝遠誠病後多書不得伏惟恕察謹狀伏蒙又賜口針不任感戴東都日所惠本留洛中無人檢得兼以道路艱阻二年來不曾有人至洛以此前狀咨請倍深惶悚小生舌針更改三五字不欲兩本流傳今謹録新本獻上舊本伏望封還如不能遠寄伏惟必賜焚卻下情切望趙總管知廣州時多此月下旬方至此伏惟照察謹狀太和八年秋八月乙酉上於紫宸殿聽政宰臣涯以下奉職事上顧謂宰臣曰故內臣高力士終始事迹試為言之臣涯謹奏云上元中使臣柳芳得罪竄黔中時力士亦從事巫州因與周旋力士以舊嘗司史為芳言先時禁中事皆芳所不能知而芳亦有質疑者芳默識之及還編次其口語號曰問高力士說上曰令訪史氏取其事書之臣涯等既奉詔乃詣芳孫度支員外璟詢事璟曰某祖芳前從力士問覼縷未竟復著唐歷採托義數尤相近者以傳之其録或祕不敢宣或怪奇非編録所宜及者不以傳今按求其書甚實臣德裕亡父先臣與芳子吏部郎冕開元初俱為尚書郎後官亦俱東出道相與語遂及高力士說且曰彼皆目覩非出傳聞信而有徵可為實録先臣每為臣言之臣伏念所臆授凡有十七事歲祀久更遺稿不傳臣德裕非黃瓊之練習愧史遷之該博唯次舊聞懼失其傳不足以備大君之問謹録如左以補史官之缺云會昌二年四月甲申回鶻大將勒嗢沒斯率其國特勒宰相尚書將軍凡十二人大首領三十七人騎士二千一百六十八人內附制授嗢沒斯特進檢校工部尚書左金吾衛大將軍同正封懷化郡王其酋帥遍加戎秩賜之金紫於是穹廬之長盡識漢儀左衽之人咸被王澤矣臣聞書載率服美大舜之功詩列既平顯周宣之德暨漢宣帝亦單于慕義呼韓來朝歷紀數千稱者三代則知非常之運必待非常之君誠契感通斯為難遇伏惟仁聖文武至神大孝皇帝紹高祖太宗之神武慕元宗憲宗之遠略英才天縱武節霆馳靜深之謀淵然若海先定之志屹然若山自嗢沒斯歸款朔邊注心魏闕制置大略盡出宸算漢高從善能用六奇光武揣情坐知千里諸將無搴旗之效㣥臣乏借箸之籌夫天以信而成功地以定而載物惟大君懋一德法兩儀故能懷異俗之心盛中興之業嗢沒斯者回鶻之貴酋也夙稟正性生知大義識倚伏之數明禍福之機回鶻運屬天亡歲久不稔畜産大耗國邑為虛流亡遍于沙漠僵仆被于草莽由是國之將帥各率支兵或入西戎或歸諸部惟嗢沒斯精誠上達天誘其衷拔自狼居之山願拜龍顏之主封章瀝懇指日誓心不奪之誠介如石矣先是有赤心宰相桀傲亂常頗為邊患嗢沒斯潛布誠款於天德軍使田牟暴其罪狀梟首以徇歸大國明也戴聖君忠也去亂邦智也執醜虜義也具此四美是謂誠臣昔仲尼知曾參孝因為陳君臣父子之義以著孝經今聖主以嗢沒斯忠爰採武功貞烈之事以為歸忠傳則聖人善誘之道又何以加于此乎乃集秦漢以來至聖朝去絶域歸中國以名節自著功業保忠者三十人勒成上下兩卷其不自獻款無迹可稱者今並不載臣又聞為善者天報之以福為不善者天報之以殃神道昭晰應如影響嗢沒斯方欲保大節成大勳宜乎佩服斯文以為鑒戒臣備位台鉉獲奉睿謀受詔序事冠于篇首昔越裳貢雉薦於宗廟西旅獻獒陳以典訓所以感其至而戒其初也仁聖文武至神大孝皇帝御歷之四年天瑞燦爛王道昭焯五材並用六轡斯柔布政宣室以張神化振兵朔野以耀威靈故得天晬而清日晏而明蟲螟不生嘉穀以成中㝢既安四夷來庭由是龍荒君長黠戛斯遣使注吾合素等上表獻良馬二匹絶大漠而貢赤誠涉流沙而霑赭汗非至德所感孰能臻於此乎皇帝以前有鸞旗焉用驥騄不貴龍友唯駕鼓車乃命其使見於內殿賜以珍膳錫之文錦謹按故相魏國公賈耽所撰古今四夷述黠戛斯者本堅昆國也貞觀二十一年其酋長入朝授以將軍印拜堅昆都督逮于天寶季年朝貢不絶暨中國多難為回鶻隔礙黠戛斯忿其桀驁乘彼薦饑於是破龍庭焚罽幕蕭條萬里地無種落始得出重泉而見白日披氛霧而睹青天臣伏見太宗謂㣥臣曰南荒西域自遠而至其故何哉宰臣房元齡對曰殊域來朝者中國乂安帝德遐被所致也太宗曰向中國不安亦何緣而至朕覩此懷懼何者昔秦始皇並吞六國漢武帝威加戎狄今殊方異類無遠不賓竊比秦漢想無多愧亦欲傳之子孫念二王之末途朕所以不能不懼耳臣伏思太宗往日之懼致我唐百代之隆則聖祖詒謀可謂深矣此太宗所以永保鴻名為受命之祖陛下所以丕承王業為中興之主豈不宜哉天旨以賈耽有陳平鎮撫之才得充國通知之敏其所述作該明古今乃詔太子詹事韋宗卿祕書少監呂述往蒞賓館以展私覿稽合同異覼縷闕遺傳胡貊兜離之音載山川曲折之狀條貫周備文理洽通臣伏以貞觀初中書侍郎顏師古上言昔周武王天下太平遠國歸款周史乃集其事為王會篇今萬國來朝蠻大弓率服實可圖寫請撰為王會圖有詔從之臣輒因韋宗卿呂述所紀異聞飾以繪事敢叙率服以冠篇首臣聞行險而言闕上者非謂謗也是實之所招也蹈仁而被誣者非巳所召是盜之所憎也夫理身絶嫌人臣止謗之術虜受不納人君辨謗之明然則正者邪之所仇直者曲之所矯有能為不才所忌有功為無庸所嫉四者苟立四謗必隨况僞必亂真佞實似智鑠金之口不謀而同唱成雷之蚊未響而先合以㣥陰而蔽孤陽以衆比而排獨立結其禍患咸本謗言莫不巧中於隱伏之微善成于疑似之際忠賢被之無以自辨亦良可哀哉伏惟皇帝陛下體乾坤簡易之德合日月無私之照視聽自天神明其化惡淫哇之亂聽疾紫色之眩目堲其讒說常詠格言臣等將順天聰綴緝舊典發東觀藏書之室得元和辨謗之文辭過萬言書成十卷以其廣而寡要繁則易蕪方鏡情僞之源尤資詳略之當遂再加研考所以理昔賢被誣之狀表前王善鑒之明實願視則倚衡居則宥坐絶其根枿永杜其來必也視之於未形鑒之於無象方夏后盤盂之誡比周王玉几之銘測深慮遠取為殷鑒使播揚有所消其象萋菲無以成其文忠臣得納其誠武臣得盡其力矣于是徵之周秦覃及聖代必極精簡有合針規特立新編裁成三卷謹繕寫封進臣等上奉宸謀竭其鑽仰敢不虔序聖旨冠于篇首云豫頃歲吏道所拘沈迷簿領今則憂獨不樂誰與晤言偶思當世之所疑惑前賢之所未及各為一論庶乎針而體要謂之窮愁志凡三卷篇論四十九首銷此永日聊以解憂地僻無書心力久廢每懷多聞之益頗有闕疑之恨貽於朋友以俟針規
