  - {type: head, offset: 0, content: 甲雇乙剉草乙睡誤斬指斷請保辜不伏, id: KR4h0168_NFKB_982-h2, level: 2}
  - {type: head, offset: 135, content: 對造瓦判, id: KR4h0168_NFKB_982-h3, level: 2}
  - {type: head, offset: 135, content: 甲雇乙造瓦口五分畢計其全乙不伏, id: KR4h0168_NFKB_982-h4, level: 2}
  - {type: head, offset: 238, content: 對造五齊三酒非九穀判, id: KR4h0168_NFKB_982-h5, level: 2}
  - {type: head, offset: 238, content: 所司造五齊三酒憲司以非九穀罪云歲無餘, id: KR4h0168_NFKB_982-h6, level: 2}
  - {type: head, offset: 315, content: 對公酒後時判, id: KR4h0168_NFKB_982-h7, level: 2}
  - {type: head, offset: 315, content: 甲為公酒後時為主司所詰辭曰酒材不足, id: KR4h0168_NFKB_982-h8, level: 2}
  - {type: head, offset: 395, content: 對酒正以水入王酒判, id: KR4h0168_NFKB_982-h9, level: 2}
  - {type: head, offset: 395, content: 甲為酒正以水和酒入於王之酒府法司劾其矯濫訴稱時供六飲以為涼不伏科, id: KR4h0168_NFKB_982-h10, level: 2}
  - {type: head, offset: 608, content: 對庖人進炙判, id: KR4h0168_NFKB_982-h11, level: 2}
  - {type: head, offset: 608, content: 乙為庖人進炙有髮繞之將科罪訴云當有讎事, id: KR4h0168_NFKB_982-h12, level: 2}
  - {type: head, offset: 698, content: 對甲為食官判, id: KR4h0168_NFKB_982-h13, level: 2}
  - {type: head, offset: 698, content: 甲為食官準赦合入五品所司不許, id: KR4h0168_NFKB_982-h14, level: 2}
  - {type: head, offset: 799, content: 對盜酒判, id: KR4h0168_NFKB_982-h15, level: 2}
  - {type: head, offset: 799, content: 卓媼翁伯並業卓嘗遭盜竊飲傾釀翁教以多養猛犬卓家酒滯而翁賓客猥售獨收其利媼告伯方便取人財, id: KR4h0168_NFKB_982-h16, level: 2}
  - {type: head, offset: 897, content: 對夢殿上有禾判, id: KR4h0168_NFKB_982-h17, level: 2}
  - {type: head, offset: 897, content: 乙夢太極殿上有禾三穗跳而取之得中穗其友賀云中台之象人告其妖, id: KR4h0168_NFKB_982-h18, level: 2}
  - {type: head, offset: 1007, content: 對寢延部人判, id: KR4h0168_NFKB_982-h19, level: 2}
  - {type: head, offset: 1007, content: 撫州別駕豆盧安舍正寢延部人乙弗乾公事稟而後行所由舉不法安不伏, id: KR4h0168_NFKB_982-h20, level: 2}
  - {type: head, offset: 1131, content: 對詐稱官銜判, id: KR4h0168_NFKB_982-h21, level: 2}
  - {type: head, offset: 1131, content: 辛詐稱官銜取給州縣所司以偽論不伏仰正斷, id: KR4h0168_NFKB_982-h22, level: 2}
  - {type: head, offset: 1216, content: 對部曲判, id: KR4h0168_NFKB_982-h23, level: 2}
  - {type: head, offset: 1216, content: 巳男準格不合取部曲妻違者被繩訴云強幹弱枝竊將益利未知合利否, id: KR4h0168_NFKB_982-h24, level: 2}
  - {type: head, offset: 1288, content: 對婢判, id: KR4h0168_NFKB_982-h25, level: 2}
  - {type: head, offset: 1288, content: 命官婦女阿劉母先是蔣恭家婢被放為客女懷阿劉娠出嫁恭死後嫂將劉充女使劉不伏投匭訴, id: KR4h0168_NFKB_982-h26, level: 2}
  - {type: head, offset: 1429, content: 對買奴云是良人判, id: KR4h0168_NFKB_982-h27, level: 2}
  - {type: head, offset: 1429, content: 王丙於趙丁處買奴勤心至家一月餘日乃自云是良人丙告縣勘是良人科趙丁及奴罪申州州斷科趙丁其奴無罪, id: KR4h0168_NFKB_982-h28, level: 2}
  - {type: head, offset: 1508, content: 對奴判, id: KR4h0168_NFKB_982-h29, level: 2}
  - {type: head, offset: 1508, content: 下士有僮指千為鄰人所告縣斷不應云遇廉賈五(一作金)之所致州覆無罪, id: KR4h0168_NFKB_982-h30, level: 2}
  - {type: head, offset: 1629, content: 對奴死棄水中判, id: KR4h0168_NFKB_982-h31, level: 2}
  - {type: head, offset: 1629, content: 丙奴死不埋棄水中人告之, id: KR4h0168_NFKB_982-h32, level: 2}
  - {type: head, offset: 1697, content: 對夢冰下人語判, id: KR4h0168_NFKB_982-h33, level: 2}
  - {type: head, offset: 1697, content: 得甲為人作媒云夢立冰上與冰下人語當仲春成婚乙告甲誑惑, id: KR4h0168_NFKB_982-h34, level: 2}
  - {type: head, offset: 1793, content: 對夢處女鼓琴判, id: KR4h0168_NFKB_982-h35, level: 2}
  - {type: head, offset: 1793, content: 乙封侯嘗夢見處女鼓琴而歌曰美人熒熒顏若苕之華後遂納國人姓為內子御史劾其僭訴云夢應也, id: KR4h0168_NFKB_982-h36, level: 2}
  - {type: head, offset: 1938, content: 對正室為門子判, id: KR4h0168_NFKB_982-h37, level: 2}
  - {type: head, offset: 1938, content: 甲多諸媵之子乃以正室為門子令限出入或人告有違不伏, id: KR4h0168_NFKB_982-h38, level: 2}
  - {type: head, offset: 2192, content: 對告密判, id: KR4h0168_NFKB_982-h39, level: 2}
  - {type: head, offset: 2192, content: 雍州申綿州告密囚王禮告本州人有謀反行至散關夜已將半關吏以其夜到不為開門禮緣事急遂越關而度至畱守所告關令趙秀幷自首越關事到神都法司斷秀應為而不為主簿批為不當舉牒議卿判秀當知反而不告下符科結秀經廉使批訴仰正斷, id: KR4h0168_NFKB_982-h40, level: 2}
  - {type: head, offset: 2321, content: 對官戶判, id: KR4h0168_NFKB_982-h41, level: 2}
  - {type: head, offset: 2321, content: 官戶炙面送掖庭舊有疹疾所由以非五十以, id: KR4h0168_NFKB_982-h42, level: 2}
  - {type: head, offset: 2410, content: 對竊錢市衣與父判, id: KR4h0168_NFKB_982-h43, level: 2}
  - {type: head, offset: 2410, content: 丁竊錢市衣以與父父曰邑長如是使詣縣首丁往長問之具以父言長以衣賜其父錢主告長縱盜, id: KR4h0168_NFKB_982-h44, level: 2}
  - {type: head, offset: 2555, content: 對折指判, id: KR4h0168_NFKB_982-h45, level: 2}
  - {type: head, offset: 2555, content: 甲緣木損折枝指謂三疾數足官不許事, id: KR4h0168_NFKB_982-h46, level: 2}
  - {type: head, offset: 2622, content: 對病疾判, id: KR4h0168_NFKB_982-h47, level: 2}
  - {type: head, offset: 2622, content: 得甲為郡守賜告養病而出界歸家法司科罪甲不伏, id: KR4h0168_NFKB_982-h48, level: 2}
  - {type: head, offset: 2787, content: 對臥大夫簀判, id: KR4h0168_NFKB_982-h49, level: 2}
  - {type: head, offset: 2787, content: 甲寢臥大夫簀執燭者請易竟不改而卒, id: KR4h0168_NFKB_982-h50, level: 2}
  - {type: head, offset: 2913, content: 對縣君死復判, id: KR4h0168_NFKB_982-h51, level: 2}
  - {type: head, offset: 2913, content: 縣君死於路所由不以綏復於右不給役車遞還, id: KR4h0168_NFKB_982-h52, level: 2}
  - {type: head, offset: 3034, content: 對男取江水溺死判, id: KR4h0168_NFKB_982-h53, level: 2}
  - {type: head, offset: 3034, content: 顧乙從母所好令男十五里取江水溺死不為之服, id: KR4h0168_NFKB_982-h54, level: 2}
  - {type: head, offset: 3146, content: 對男取江水溺死判, id: KR4h0168_NFKB_982-h55, level: 2}
  - {type: head, offset: 3146, content: 顧乙從母所好令男十五里取江水溺死不為之服, id: KR4h0168_NFKB_982-h56, level: 2}
  - {type: head, offset: 3236, content: 對男取江水溺死判, id: KR4h0168_NFKB_982-h57, level: 2}
  - {type: head, offset: 3236, content: 顧乙從母所好令男十五里取江水溺死不為之服, id: KR4h0168_NFKB_982-h58, level: 2}
  - {type: head, offset: 3370, content: 對溺死判, id: KR4h0168_NFKB_982-h59, level: 2}
  - {type: head, offset: 3370, content: 甲與乙同舟既而甲懼水自投因溺死其家訟乙故殺縣斷以疑, id: KR4h0168_NFKB_982-h60, level: 2}
  - {type: head, offset: 3556, content: 對溺死判, id: KR4h0168_NFKB_982-h61, level: 2}
  - {type: head, offset: 3556, content: 甲與乙同舟既而甲懼水自投因溺死其家訟乙故殺縣斷以疑, id: KR4h0168_NFKB_982-h62, level: 2}
  - {type: head, offset: 3714, content: 對同姓為主判, id: KR4h0168_NFKB_982-h63, level: 2}
  - {type: head, offset: 3714, content: 甲妻亡無主後者乃命同姓主或人告失禮所由科之, id: KR4h0168_NFKB_982-h64, level: 2}
  - {type: head, offset: 3917, content: 對主者不杖判, id: KR4h0168_NFKB_982-h65, level: 2}
  - {type: head, offset: 3917, content: 甲卒女子在堂無主喪者命同姓主之喪者不杖令女子杖所由科失禮, id: KR4h0168_NFKB_982-h66, level: 2}
  - {type: head, offset: 4106, content: 對寢苫枕草判, id: KR4h0168_NFKB_982-h67, level: 2}
  - {type: head, offset: 4106, content: 甲雅修士禮為宗黨所敬居斬縗寢苫抌草閭里化之御史劾其惑衆, id: KR4h0168_NFKB_982-h68, level: 2}
  - {type: head, offset: 4224, content: 對奪情腰絰服事判, id: KR4h0168_NFKB_982-h69, level: 2}
  - {type: head, offset: 4224, content: 甲腰絰服事既而曰不即人心致仕而退時謂非禮稱人蓋善之, id: KR4h0168_NFKB_982-h70, level: 2}
  - {type: head, offset: 4371, content: 對輿屍謁廟判, id: KR4h0168_NFKB_982-h71, level: 2}
  - {type: head, offset: 4371, content: 鄭太曾祖亡輿屍謁其家廟人告狂怪, id: KR4h0168_NFKB_982-h72, level: 2}
