front:
  text: 全唐文欽定全唐文卷九百八十二闕名二十三
  hash: sha256:595f66aa645c3f10a22e67f51143de749961c62d784fbb6b8b238004f43ff9e9
body:
  text: 變古易俗因物造器蓋取諸用有適於時六職五材既攻金而攻木服牛乘馬亦秣之而策一作莝之甲有雇求乙為傭保徇乎輕篋式供朝夕之資摧以生芻無乖阜養之事人或因寐譬驪龍而自失指致見傷瞻螮蝀而誰敢遂令食黿不效空怒子公喻馬元非豈齊莊叟誤由彼已歸全既謝於垂堂損乃自貽在理孰當於毀櫝保辜之請法未可依工商異等埏埴殊制故有質茲土化均貨日中乙也徇業求傭偶鑿坯而取給甲則溺情豐屋冀如雪一作雲以自潤雖載弄牀瓦故無取於舉全約以陶穴亦何驚於敝漏且全毀興訟雇買異儀雇則不可計全買則合徵成算乙之不伏誠則有詞甲之無良訟宜從記和其神人亦在酒醴能善乃事則惟司存故陶器必良既麴糵以云備六物式序必黍稷而非馨今者周官列職徒聞於五齊憲府舉非或虧於九穀尚負罍恥總貽神羞既無餘之起訴何有詞之能代酒以成禮國之大經祭祀賓客咸賴其用甲惟賤伍掌我斯職不率其度旋聞後時水泉必香無傳清苦火齊不作幾空賢聖主司方詰甲乃有詞酒材不供鼎書難議明庶折獄君子攸存噬嗑論刑恐貽遇毒五齊分名陳乎式法六飲成薦差以時序明其有則誡以無彞率由典常俾克永世是以用光朝覲湛露興詩取備蒸嘗質明行事資以王度入於天府苟或不亦何專一惟其酒正職在漿人非作僞以心勞實陳力而就列相時後動跡匪踰間師古而行事乃從禮四運其易六飲攸供佇以稱涼爰資受和俯銀床之露井始汲香泉泛玉斚之流霞旋開聖酒若三軍之盡醉即見投醪分八樽之立儀斯成薦飲炎光在候正有叶於頒冰清虛坐升序將捐於溽暑官無留事責乃非宜未覩旌功奚為蔽善將同矯濫何至寃誣法司自且不明酒正誠非忤典相彼庖人政司口實式調玉饌以金薦金門屠蒯之德莫如陳政之讎已作執鸞刀而袒割蟬翼必裁揚獸炭之赫曦鴻毛罔燎以此而科情則可知况乎鼠穢蜜一作梅中巳申寃於吳日髮生肉內豈獲譴於唐年請推讎人以雪庖者君有充庖臣實司味是掌公餗以供王舉甲周均仲咡位涉膳夫漢類高袪秩登食監鼎俎斯設刀匕是供屬澤降紫書榮頒朱組黃香之秩咸以云增潘嶽之階獨當不進所司陋其烹飪黜彼乘軒昔笥餌立誠既加都尉壼餐著節亦拜大夫以愚所窺合霑錫命媼翁接閈巵酒當壚不逢漢高之過何能大售頻遇畢公之竊闕煩小盜教其養犬蓋以防人聞夜吠以雖懲在春醪而頗滯素蟻空泛鄴中之賢者莫傾盧鵲斯喧高陽之酒徒那至但非抑壓教有緣由獨收當曰非宜方便殆成無狀宜科誣謗以置刑名執古以道格人其經捨而或踰動則奚軌乙位居堯嶽名列漢藩擁百姓一作城之寄乘六夢之吉朱門雄雄虛受冠蓋翠樓奕奕傍挂烟霄同唐叔之得禾身居大殿異張華之博物忽踐中台覺後成空賴功曹之來賀失而復得允蔡茂之高班夫何妖哉古則有矣告人無識其若是乎豆盧安幸屬清泰早襲衣冠陪去獸而宣風贊還珠而緝化題輿就職行聞仲舉之風展驥臨人坐振士元之躅爰於正寢延茲部人罕言私情但舉公事乙弗乾既奉嚴命稟而後行論情未越於古風據理何乖於即事王子之臨東海雖未贈刀盧君之撫南康終其化鶴所司妄舉將有昧於條章安既有推詞請從於緘默辛在德多涼於朝不齒九班之榮未及三思之志闕如妄稱爵里之尊以求州縣之給詐難久恃僞果自彰行詐為官仲由以欺天見誚言僞而辨少正以左道亦誅前史以舉其不然在律又繩其有過理宜緘口何恤薄言國家每軫納隍偏憂邊徼在庸微之俗隔良賤之婚千頭之奴具傳其號百姓之女罕聞其卜故為罔冒取陷刑書何強幹而弱枝非愛人而治國議事以制非我博哉斯之謂宜確乎不拔阿劉母先從侍兒放為客女夢蛇納慶先含候月之胎附馬申歡即就行霜之禮才欣執盥仍誕弄磚既而李善主君俄驚闞室仲尼兄子欲契宜家遽擁妖妍將充媵婢徒為枉抑終見稱張望彼劉閨寧甘誦賦均夫鄭室聊事薄言論母既謝萱枝按女即非桃葉方欲指腹稱賤憑胎索婢自可以大匹小將古明今劉氏若屬蔣家秦政須歸呂族據斯一節足定百端美言可市老經之格言聚人曰財彖象之明義王丙室盈龜貝持貨蒼頭雖挾諸龎之規終成教子之競經三十日非關買者之依三千條須結鬻良之罪趙丁宜從縣斷勤心難聽州裁彼此攸同斯為可矣爵以馭賢祿以頒士去嫌守職雖殆亦榮捨道成富在官所醜况位霑下士利掩上農千指家僮等江陵之橘樹萬金賈子均洛陽之富商畜伎既埒於卓孫遇業頗同於翁伯財之所聚但覺浮雲訟之所興果為鳴鼓雖州縣兩斷片折未分而鄰人一言商亦何玷士且同於賈豎州頗昧於正刑是可忍焉孰為過者丙為不道魚鱉何親情之不良僮僕是棄愛其有力未聞削舟之恩欺其遊魂更比懷沙之慘雖不封不樹家僮無葬送之儀而載沉載浮甲令有棄尸之禁告言不謬刑典宜申甲以判合為資行媒是務瞻言匪斧有類因針爰求六夢之徵告以三星之會微波可託豈脈脈於輕冰仙漢難攀尚盈盈於一水將同竹鳳之驗有符芻狗之言乙以至人所無告其誑惑必人同趙一術等周宣王濬懸刀不聞加罪仲尼曳杖未陷深國以定封邑惟利建社稷是衛邦畿以藩乙將度以土圭設其苑序式遵厥度宜立其家鳳凰之兆未期桃李之妖將至剛柔自應精爽潛通吉以有祥將一作符表神來之兆庶乎無亂理齊藏往之感位在通侯夢茲處女橫角枕而就寢見鼓琴而作歌熒熒之詞聞彼魂交之日夭夭之質覩茲形開之時六夢之驗若存八徵之候如會納為內子誠類小君稱僭欲繩未通平典五常之教以經王道三族之別則辨人倫正昭穆以承祧分嫡庶而繼代必誡差忒克明敦敘是以微子從禮捨其孫腯獻公泛愛立以奚齊璧埋太室之庭楚則違命寶藏恆山之上趙乃知才順之克昌易則生亂苟至於道訟不可成甲齊其家宅心知訓鐘鼓思樂早聘問名媵姪從觀仍邀卜姓自殊南陌豈秋胡之遲回寵若東山即謝安之攜賞於是慶徵蘭夢義感桑弧探社金而屢祥列階玉以分照同石駘之六子庶孽斯聞均衛家之一兒冡嫡其取爰崇立長有以代親詎黜商臣非取厚於江芊寧謀伋子亦何怨於惠公趨庭既學詩人正室遂為門子達其禮典穆以閨門掌政令而攸歸限出入而奚失信居家之理寧父子之嘻或人所陳深為未可王禮生於劍表長自巴中身在重關之外心馳魏闕之下踰岷越障雖效赤誠觸網冒羅遂縈丹筆何者但緣謀反律有明條本州既不告言他邑寧且寢默必也同夫兆一作風火應合控彼星昴何須乘夜犯關侵宵越棧異田文之徑度不聽雞鳴殊孫龍之縱辨無論馬色雖未詳其五聽聊請叩其兩端告密縱使非虛越關無宜首免上不許倬彼舊章聞於白粲嗟夫賤妾隸我丹書當年且欲於役身稱疾式瞻乎炙面平陽白髮既乏子夫之容應門緑苔爰閉掖庭之恨薄言之訴情或可哀壯齒之年且殊知命嘉所由之直筆執法不回想官戶之循涯吞聲未爽盡敬事親居致其樂永錫爾類將為色難丁也無良斂怨為德殺牲之養猶曰不仁竊人之財誰謂其孝動生悔吝行乏義方惟彼循良是稱邑長飲冰壺以從政播清風而成俗用既戒惡觀過知仁將順一作顧綵衣之歡以原丹筆之罪雖聚蒲惡子難以法寬而偃草小人或期化理諒從權而適道豈撫俗以隨時錢主簿言誠稱縱盜宰君善政可謂勝殘於豫何誅將子無怒甲稟氣陶形偶華胥之代輕軀弱質謝都盧之人不能鑿井耕田翻乃奔林緣木損其枝指蓋是懸疣雖折一枝幸祛數外之纍即圖三疾便為非分之求理不可依宜從告免四嶽咨命九土司牧功共理於伏熊期得賢於建隼淮陽臥理聞汲黯之政譽渤海行歌美龔公之化洽甲官忝列郡未著能名庭無致仕之蘭院少延年之菊漳濱臥疾雖比迹於古人潁川流譽何靦顏於今吏膏肓所及知藥石之無施肝膽具披果祈求而有遂賜告養疾宜輟務於公庭出境而行何慢官於私第斷非斥吏欽漢相之高風才不逮人招尸祿之遄謗豫告賜告議理懸殊應為不為自貽諸咎不敬之罰曷所逃刑喜怒不時患生腠理營衛失度疾起膏肓是以長卿文園空傳封禪之草劉楨漳浦亟聞埋玉之悲人誰不亡道貴從正身苟正矣哀亦何傷且衛臣不祿猶陳尸諫楚尹屬纊城郢為謀春秋書之用旌厥善况銀燭皛晃以流照華簀輝煥以潛鋪既不率於典常法宜加於僭擬必因國君之賜有符曾氏之詢過也非文童子何識眷彼縣君征途有疾庚子戒日止鵩生憂辰巳臨年巢鵀起歎東流逝矣北首長辭遽委魄於松門奄歸魂於蒿里不祿公館須申皋某之儀屬纊私家即罷求幽之義禮有明說焉可輒違準例合得遞車所司如何不給但比璧用刑須窮兩造鈞金察獄必聽五詞公私之節未明左右如何定罪請更詳委方可要終孝乃因心禮從適變惟彼顧乙德合天地甘旨必在於無違承顏克遵於不匱瞻言愛子取汲長江庶南陔之不虧豈東流而永逝掌玉茲碎庭蘭坐歇顧斯惟疾之憂恐阻長筵之樂既不彰於枲服誠有切於斑衣雖失禮入刑合置彞典而割情循養庶可權宜既竭姜詩之孝無置蕭何之律顧乙行繼人志譽美天經嘗申不匱之誠每竭服勤之養母以不甘井汲好味江流爰將植杖之男當其抱甕之役異曹娥之父無復還尸均屈原之妻空餘往恨眄瞻前誥既有同於姜詩詳彼舊章亦何殊於庾季雖云不服欲置何辜顧乙依仁植性履孝因心生我之義方深倚廬之思何極扇枕溫席造次無違候旨承顏欽從所好屠雞留膳不為執友之賢求鯉探泉兼入鄰家之饌順慈親之旨忘愛子之勞屬以回浦生風長江起浪因茲汲引遂見沉淪乙類姜詩無復弄璋之念男同精衛空搖銜石之悲不服以殤初疑越禮苟全於孝取叶隨時既有符於古風恐難置於令典語稱有朋自遠易曰朋從爾思同氣相求同舟共濟呂安之懷叔夜或泛黃河之水王子之尋戴逵亦冒山陰之雪何以仰止欽賢是慕想彼甲乙道契筌蹄泛漲海之雲若見蓬萊之樹棹倚砂之日方追河洛之仙既而智乏謀身情乖拯物覆舟之慎想伯夷而載虧驚濤之遊歎伯昏而遂遠三命有極百齡俄謝禍兮難倚寧收轉壑之魂比之匪人忽覩盈庭之訟尋端指狀於甲誠亦可矜據理詳刑在乙寧宜置罪何者禮稱不弔溺者已絶律通人情乙惟無咎庶從平典用叶大倫鴻爐賦象人壽幾何生榮死哀物類同致晝夜不捨宣尼興其歎息吉凶共同賈誼發其詞賦眷言甲乙俱涉大川懸流波而得朋理征棹而云邁乙則同舟而濟宛若神仙甲乃懼水而投遽嗟沉溺波心乍沒還疑觀影之人泉路不歸便是懷沙之客然則渡河奏曲曾不爾思逝水沉魂自招其咎家人有訟虛陳故殺之端乙既無讎難置惟輕之典薄訴不伏理合哀矜縣斷以疑殊乖部察以愚管見釋放為宜美而無子賦以碩人生也有涯歸乎大夢贄榛栗而方就據蒺藜而何辜眷言於甲倏喪宜家鳳凰于飛八代徒兆蛟龍中絶一劍空悲扣盆之哀但取傷於對簟懸孤之義本未徵於夢蘭有歎溘先無以為後爰邀同姓將陳主喪三祖思崇五哭攸設永惟哀戚誠則靡捐撫以禮經猶為未達且男主婦主之道同姓異姓之儀抑有前聞奚宜此謬蓋匪慎諸坐貽差互至若婦主必使異姓厥義彰乎外成反是不思捨禮何立道有取於宗婦事非屬於族人甲所為喪誠為不法哀興弔影雖撫事以傷神迹未吞聲罪恐餘於滅耳男主女主則異其族苴杖削杖而別於儀良無扈扈之嫌用竭親親之道承家有託亦何詢於異門繼代或虧乃陳攝於同姓甲年馳石火光陰坐沉訓絶金籯允嗣非立若敖之餒固冥理而方嗟鄧攸之謠諒天道而多懵桑弧靡設詎憂嵇紹之孤葛覃在辰空有緹縈之類謝庭窺雪奏歌詠於常時蔡氏知絃輟娛歡於是日三星尚阻未及有行五哭斯崇奄嗟無怙喪主既非棣萼輯杖固屬摽梅同切昊天寧遺巽位撫禮深達將譴何憑則豫一人諒斯取而不謬惟刑三復宜伏念於無辜甲修道訓允乎厥休宗黨稱其有儀閭閻美其惟孝而夜壑匪固風林多感雖就禮之則俯同縗絰之儀而由衷之心無奪純深之至寢苫枕草抑惟寧戚仁里德門所居則化御史驄威電發隼視霜雄坐非平仲之仁行問冶長之罪且鄉人化善則置刑章鄰母興悲欲從何典既有明於古事亦何滯於今科出師正邦大易有象率義殄寇春秋則書用孚中行攸往夙吉以威作慝取渙於㣥甲閨門罹凶苴麻纏疚喪則寧戚義能繼恩痛深倚廬雖授杖以不起政急分閫或執兵而啓行介以趨軍絰而躬役魯侯金革我直以興晉襄墨縗彼舋而動克壯輿輻能豶豕牙任長子以帥師利元戎以光濟策勳苟進不即人心致仕能歸何暌孝體有為也無仁乎得反經以合道胡責善以非禮聖人設教蔚在蓬山諸侯立家藏彼栗主豈惟孝子不匱薦蒸嘗於四時亦取孝孫承家咨吉凶於五廟鄭太乃祖厥德嘉聞有彰良弓克傳投筆從事孝比參也在家必聞勇超仲由從政何有或胡塵暗塞漢將鳴鼙逐金革之威唯聞死節登玉門之險不見生還輿尸方弟子之凶掃埏合鄒人之禮所謂去死事生來宜廟謁薄言狂怪何太疏遺
