front:
  text: 全唐文欽定全唐文卷四百六十八陸贄九
  hash: sha256:d1b8c7d8b34f52137ad2e700806a1ad5dfb31a289f460669487f31acf9466307
body:
  text: 隱朝昨日奉宣聖旨逆賊雖退猶未收城令臣審思當今所務何者最切具條録奏來者伏以初經大變海內震驚無論順逆賢愚必皆企竦觀聽陛下一言失則四方解體一事當則萬姓屬心動關安危不可不慎臣謂當今急務在於審察㣥情若㣥情之所甚欲者陛下先行之㣥情之所甚惡者陛下先去之欲惡與天下同而天下不歸者自古及今未之有也夫理亂之本繫於人心況乎當變故動搖之時在危疑向背之際人之所歸則植人之所去則傾陛下安可不審察㣥情同其欲惡使億兆歸趣以靖邦家乎此誠當今之所急也然尚恐為之不易者蓋以朝廷播越王命未行施之空言人或不信何以言其然今天下之所欲者在息兵在安業天下之所惡者在斂重在法苛陛下欲息兵則寇孽猶存兵固不可息矣欲安業則征徭未罷業固未可安矣欲薄斂則郡縣懼乏軍用令必不從矣欲去苛則行在素霽威嚴言且無驗矣此皆勢有所未制意有所未從雖施於德音足慰來蘇之望而稽諸事實未符悔禍之誠且動人以言者其感不深動人以行者其應必速蓋以言因事而易發行違欲而難成易發故有所未孚難成故無思不服今陛下將欲平禍亂拯阽危恤蒸黎安反側既未有息人之實又乏於施惠之資唯當違欲以行已所難布誠以除人所病乃可以彰追咎之意副惟新之言若猶不然未見其可頃者竊聞輿議頗究㣥情四方則患於中外意乖百辟又患於君臣道隔郡國之志不達於朝廷朝廷之誠不升於軒陛上澤闕於下布下情壅於上聞實事不必知知事不必實上下否隔於其際真僞雜糅於其間聚怨囂囂騰謗籍籍欲無疑阻其可得乎物論則然人心可見蓋謂含宏聽納是聖主之所難鬱抑猜嫌是衆情之所病伏惟陛下神無滯用鑒必窮微愈其病而易其難如淬鋒潰疣決防注水耳可以崇德美可以濟艱難陛下何慮不行而直為此懍懍也臣謂宜因文武㣥官入參之日陛下特加延接親與敘言備詢禍亂之由明示咎悔之意各使極言得失仍令一一面陳軍務之際到即引對不拘時限用表憂勤周公勤握髮吐餐而天下歸心則此義也又當假之優禮悅以溫顏言切而理愜者必賞導以盡其情識寡而辭拙者亦容恕以嘉其意有諫諍無隱者願陛下叶成湯改過之美裦其直而勿吝其非有謀猷可用者願陛下體大禹拜言之誠獎其能而亟行其策至於匹夫片善采録不遺庶士傳言聽納無倦是乃總天下之智以助聰明順天下之心以施教令則君臣同志何有不從遠邇歸心孰與為亂化疑梗為欣合易怨謗為謳歌浹辰之間可使丕變陛下儻行之不厭用之得中從義如轉圜進善如不及推廣此道足致和平其於昭德塞違恐不止當今所急也慮有愚而近道事有要而似迂冀垂睿思反覆詳覽必或無足觀採捨棄非遙謹奏臣某言賊泚逋誅尚穴宮禁陛下思念宗廟痛傷黎元仁孝交感至於憤激猥以急務下詢微臣臣雖鄙懦尊慕仁義荷陛下知己之遇感陛下思理之誠愚衷所懷承問輒發不以淺深自揆不以喜怒上虞誠缺於周防承順之規是亦忠於陛下一至之分也前奉詔問尋具上陳請延㣥臣稍與親接廣咨訪之路開諫諍之門通壅鬱之情宏採拔之道自獻答奏逮茲彌旬不聞施行不賜酬詰未審宸旨以為何如昧於忖量但務竭盡恐由辭理蹇拙不能暢達事情慺慺血誠敢願披瀝頻煩黷冒豈不慙惶蓋犬馬感恩思效之心眷眷而不能自止者也臣聞立國之本在乎得衆得衆之要在乎見情故仲尼以謂人情者聖王之田言理道所由生也是則時之否泰事之損益萬化所繫必因人情情有通塞故否泰生情有厚薄故損益生通天下之情者莫智於聖人盡聖人之心者莫深於易象其別卦也乾下坤上則曰泰坤下乾上則曰否其取象也損上益下則曰益損下益上則為損乾為天為君坤為地為臣天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下於義順矣而反謂之否者上下不交故也氣不交則庶物不育情不交則萬邦不和天氣下降地氣上騰然後歲功成君澤下流臣誠上達然後理道立損益之義亦猶是焉上約已而裕於人人必悅而奉上矣豈不謂之益乎上蔑人而肆諸已人必怨而叛上矣豈不謂之損乎然則上下交而泰不交而否自損者人益自益者人損情之得失豈容易哉故喻君為舟喻人為水水能載舟亦能覆舟舟即君道水即人情舟順水之道乃浮違則沒君得人之情乃固失則危是以古先聖王之居人上也必以其心從天下之心而不敢以天下之人從其欲乃至兢兢業業一日二日萬幾夫幾者事之微也以聖人之德天子之尊且猶慎事之微乃至一日萬慮豈不以居上接下懼失其情歟書曰人心惟危道心惟微微則萬幾之慮不得不精也危則覆舟之戒不得不畏也夫揆物以意宣意以言言或是非莫若考於有跡跡或成敗莫若驗於已行自昔王業盛衰君道得失史冊盡在粲然可徵與衆同欲靡不興違衆自用靡不廢從善納諫靡不固遠賢恥過靡不危故詩書稱堯德則曰稽於衆捨巳從人數舜之功則曰明四目達四聰言務同欲也序禹之所由興則曰益贊於禹禹拜昌言述湯之所以王則曰用人惟已改過不吝言能納諫也歌文王作周則曰濟濟多士文王以寧美武王克殷則曰亂臣十人同心同德言皆從善也堯舜禹湯文武此六君者天下之盛王也莫不從諫以輔德詢衆以成功是則德益盛者慮益微功愈高者意愈下及代之衰也則道亦反焉故書曰紂有億兆夷人離心離德言違衆也詩曰汝炮烋于中國斂怨以為德不明爾德時無背無側爾德不明以無陪無卿又曰雖無老成人尚有典刑曾是莫聽大命以傾言遠賢也書曰謂人莫已若者亡詩曰惟彼不慎自獨俾臧自有肺腸俾人卒狂言自用也前史數桀紂之惡曰強足以拒諫辨足以飾非言恥過也考得失於已行之迹鑒盛衰於已驗之符孰失道而不衰孰得理而不盛報應以類影響不差胡可不則而象之敬而畏之乎粵自秦漢暨於周隋其間將歷千祀代興者非一姓繼覆者非一君雖所遇殊時所為異迹然失衆必敗得衆必成與堯舜禹湯同務者必興與桀紂幽厲同趣者必覆全失衆則全敗全得衆則全成多同於善則功多甚同於惡則禍甚善惡從類端如貫珠成敗象行明若觀火此歷代之元龜也尚恐議者曰時異事異臣請復為陛下粗舉近效之尤章章者以辨焉太宗文皇帝以天縱之才有神器之重武定禍亂文致太平威行如雷霆明照侔日月英略施於百務聖功被於九歌固非庶品之所度量常情之所鑽仰然猶兢兢畏慎懼失人心每戒臣下獻規恆以危亡為慮夙興聽理日旰忘勞公卿迭趨庭奏庶務評議得失與衆共之下無滯情上無私斷退朝之暇宴接侍臣咨訪謀猷詢求過闕或論往古成敗或問人間事情每言及暗主亂朝則省懼自戒言及賢君理代則企竦思齊言及稼穡艱難則上下相匡務遵勤儉言及閭閻疾苦則君臣同慮議息征徭懋德懲違觸類滋長尚恐過言謬舉既往難追每召宰相平章必遣諫官俱入小有頗失隨即針規得一善必遽命甄升聽一諫必明加裦錫故得時無闕事人樂輸誠又引文學之流更直宿於內署或講求典禮或諷誦詩書每至夜分情忘厭倦夫以太宗之德美貞觀之理安且猶務得人心其勤若此是則人心之於理道可一日而不接乎高宗始年亦親聽納故當時翕然歸美以為有貞觀之風兼賴遺澤在人先範垂裕幸無改作俗以阜康數十年間天下無事承平之業滋久倦勤之意頗彰燕居益深接下彌簡前哲之耿光浸遠中宮之威柄潛移卒有嗣聖臨朝天授革命豈不以經邦之道闕疇咨於大猷宴安之懷溺偏信於近狎馴致禍變幾將傾邦雖亂匪自他然其失一也弊俗一靡餘風遂流訖神龍景雲之間皆嬖幸亂朝聰明不達元宗躬定大難手振宏綱開懷納忠克巳從諫尊用舊老採拔㣥材大臣不敢壅下情私昵不敢干公議朝清道泰垂三十年謂化已行謂安可保耳目之娛漸廣憂勤之志稍衰侈心一萌邪道並進貪權竊柄者則曰德如堯舜矣焉用勞神承意趣媚者則曰時已太平矣胡不為樂有深謀遠慮者謂之迂誕驚衆有讜言切諫者謂之誹謗邀名至尊收視於穆清上宰養威於廊廟議曹以頌美為奉職法吏以識旨為當官司府以厚斂為公忠權門以多賂為問望外寵持竊國之勢內寵擅回天之謠禍機熾然焰焰滋甚舉天下如居積薪之上人人懼焚而朝廷相蒙曾莫之省日務遊宴方謂有無疆之休大盜一興至今為梗豈不以忽於戒備逸於居安憚忠鯁之怫心甘諛詐之從欲漸漬不聞其失以至於大失者乎肅宗懲致寇之由蘊撥亂之略虛受廣納同符乎太宗招延詢謀輟食廢寢洞啓誠腑推心與人豁披胸襟忘已應物故得來蘇之望允塞配天之業勃興先皇帝繼守恭勤而益之以和惠惠則有感和則有親雖時繼艱屯而衆不離析理尚寬大務因循而重作為然於紫宸聽朝常限三人奏事亦宣諭德令課責侍臣或賞其盡規或讓以容默性本仁恕事多含宏諫雖未從且不深忤情苟有阻終獲上通故君臣相安而人亦小息陛下英姿逸辨邁絶人倫武略雄圖牢籠物表憤習俗以妨理任削平而在躬以明威照臨以嚴法制斷流弊日久浚恆太深遠者驚疑而阻命逃死之亂作近者畏懾而偷容避罪之態生君臣意乖上下情隔君務致理而下防誅夷臣將納忠又上慮欺誕故睿誠不布於㣥物物情不達於睿聰臣於往年曾任御史獲奉朝謁僅欲半年陛下嚴邃高居未嘗降旨臨問㣥臣局蹐趨退亦不列事奏陳軒墀之間且未相諭宇宙之廣何由自通雖復例對使臣別延宰輔既殊師錫且異公言未行者則戒以樞密勿論已行者又謂之遂事不諫漸生拘礙動涉猜嫌由是人各隱情以言為諱至於變亂將起億兆同憂獨陛下恬然不知方謂太平可致陛下以今日之所覩驗往時之所聞孰真孰虛何得何失則事之通塞備詳之矣人之情僞盡知之矣列聖升降之效歷歷如彼當今理亂之由昭昭如此未有不興於得衆殆於失人裕於僉諧蔽於偏信濟美因乎納諫虧德由乎自賢善始本乎憂勤失全萌乎安泰今陛下將欲悔禍徼福去危從安若不循太宗創業之規襲肅宗中興之理鑒天寶致亂之所以懲今者遷幸之所由則何以孚聖懷彰令問新遠邇之聽歸反側之心乎前承德音訪及庸鄙敢緣私議輒以獻聞自爾已來反覆千慮愚智有分信非可移至今拳拳猶滯所見不勝愚誠懇欵謹復布露以聞臣某惶怖死罪謹言朝隱奉宣聖旨頻覽卿表狀勸朕數對㣥臣兼許令論事辭理懇切深表盡忠朕本心甚好推誠亦能納諫但緣上封事及奏對者少有忠良多是論人長短或探朕意旨朕雖不受讒譖出外即謾生是非以為威福朕往日將謂君臣一體都不隄防緣推誠信不疑多被姦人賣弄今所致患害朕思亦無他故却是失在推誠又諫官論事少能慎密例自矜衒歸過於朕以自取名朕從即位以來見奏對論事者甚多大抵皆是雷同道聽塗說試加質問即便辭窮若有奇才異能在朕豈惜拔擢朕見從前已來事秪如此所以近來不多取次對人亦不是倦於接納卿宜深悉此意者聖德廣大如天包容俯矜狂愚仍賜獎諭嘉臣以懇切目臣以盡忠雖甚庸駑實懷感勵夫知無不言之謂盡事君以義之謂忠臣之夙心久以自誓以此為奉上之道以此為報主之資幸逢休明獲展誠願既免罪戾又蒙裦稱庶奉周旋不敢失墜儻陛下廣推此道施及萬方咸獎直以矜愚各録長而捨短人之欲善誰不如臣自然聖德益彰㣥心盡達愚衷懇懇實在於斯睿眷特深縷宣密旨備該物理曲盡人情其於慮遠防微固非常識所逮然臣竊謂天子之道與天同方天不以地有惡木而廢發生天子不以時有小人而廢聽納帝王之盛莫盛於堯雖四凶在朝而僉議靡輟故曰惟天為大惟堯則之是知人有邪直賢愚在處之各得其所而已必不可以忠良者少而闕於詢謀獻納之道也昔人有因噎而廢食者又有懼溺而自沉者其為矯枉防患之慮豈不過哉願陛下取鑒於茲勿以小虞而妨大道也臣聞人之所助在乎信信之所立由乎誠守誠於中然後俾衆無惑存信於已可以教人不欺唯信與誠有補無失一不誠則心莫之保一不信則言莫之行故聖人重焉以為食可去而信不可失也又曰誠者物之終始不誠無物物者事也言不誠則無復有事矣匹夫不誠無復有事況王者賴人之誠以自固而可不誠於人乎陛下所謂失於誠信以致患害者臣竊以斯言為過矣孔子曰可與言而不與之言失人不可與言而與之言失言智者不失人亦不失言由此論之陛下可審其所言而不可不慎信其所與而不可不誠海禽至微猶識情僞含靈之類固必難誣前志所謂衆庶者至愚而神蓋以蚩蚩之徒或昏或鄙此其似於愚也然而上之得失靡不辨上之好惡靡不知上之所祕靡不傳上之所為靡不效此其類於神也故馭之以智則人詐示之以疑則人偷接不以禮則徇義之意輕撫不以恩則效忠之情薄上行之則下從之上施之則下報之若響應聲若影從表表枉則影曲聲淫則響邪懷鄙詐而求顏色之不形顏色形而求觀者之不辨觀者辨而求衆庶之不惑衆庶惑而求叛亂之不生自古及今未之得也故唯天下至誠為能盡其性能盡其性則能盡人之性若不盡於已而望盡於人衆必紿而不從矣不誠於前而曰誠於後衆必疑而不信矣今方嶽有不誠於國者陛下則興師以伐之臣庶有虧信於上者陛下則出令以誅之有司順命誅伐而不敢縱捨者蓋以陛下之所有責彼之所無故也向若陛下不誠於物不信於人人將有辭何以致討是知誠信之道不可斯須去身願陛下慎守而行之有加恐非所以為悔者也臣聞春秋傳曰人誰無過過而能改善莫大焉易曰日新之謂盛德禮記曰德日新日日新又日新商書仲虺述成湯之德曰用人惟已改過不吝周詩吉甫美宣王之功曰衮職有闕惟仲山甫補之夫禮易春秋百代不刊之典也皆不以無過為美而謂大善盛德在於改過日新成湯聖君也仲虺聖輔也以聖輔而贊揚聖君不稱其無過而稱其改過周宣中興之賢主也吉甫文武之賢臣也以賢臣而歌誦賢主不美其無闕而美其補闕是則聖賢之意較然著明唯以改過為能不以無過為貴蓋謂人之行已必有過差上智下愚俱所不免智者改過而遷善愚者恥過而遂非遷善則其德日新是為君子遂非則其惡彌積斯謂小人故聞義能徙者常情之所難從諫勿咈者聖人之所尚至於贊揚君德歌述主功或以改過不吝為言或以有闕能補為美中古已降淳風浸微臣既尚諛君亦自聖掩盛德而行小道於是有入則造膝出則詭辭之態興矣姦由此滋善由此沮帝王之意由此惑譖臣之罪由此生媚道一行為害斯甚太宗文皇帝挺秀千古清明在躬再恢聖謨一變流弊以虛受為理本以直言為國華有面折廷爭者必為霽雷霆之威而明言獎納有上封獻議者必為黜心意之欲而手敕裦揚故得有過必知知而必改存致雍熙之化沒齊堯舜之名向若太宗徇中主之常情滯習俗之凡見聞過則羞已之短納諫又畏人之知雖有求理之心必無濟代之效雖有悔過之意必無從諫之名此則聽納之實不殊隱見之情小異其於損益之際已有若此相懸又況不及中才師心自用肆于人上以遂非拒諫孰有不危者乎且以太宗有經緯天地之文有砥定禍亂之武有躬行仁義之德有致理太平之功其為休烈耿光可謂盛極矣然而人到于今稱詠以為道冠前古澤被無窮者則從諫改過為其首焉是知諫而能從過而能改帝王之美莫大於斯陛下所謂諫官論事少能慎密例自矜衒歸過於朕者臣以為不密自矜信非忠厚其於聖德固亦無虧陛下若納諫不違則傳之適足增美陛下若違諫不納又安能禁之勿傳伏願以貞觀故事為楷模使太宗風烈重光於聖代恐不可謂此為歸過而阻絶直言之路也臣聞虞舜察邇言故能成聖化晉文聽輿誦故能恢霸功大雅有詢于芻蕘之言洪範有謀及庶人之義是則聖賢為理務詢衆心不敢忽細微不敢侮鰥寡侈言無驗不必用質言當理不必違遜于志者不必然逆于心者不必否異于人者不必是同于衆者不必非辭拙而效速者不必愚言甘而利重者不必智是皆考之以實慮之以終其用無他唯善所在則可以盡天下之理見天下之心夫人之常情罕能無惑大抵蔽於所信阻於所疑忽於所輕溺於所欲信既偏則聽言而不考其實由是有過當之言疑既甚則雖實而不聽其言於是有失實之聽輕其人則遺其可重之事欲其事則存其可廾之人斯並苟縱私懷不稽皇極于以虧天下之理于以失天下之心故常情之所輕乃聖人之所重圖遠者先驗於近務大者必慎於微將在博採而審用其中固不在慕高而好異也陛下所謂比見奏對論事皆是雷同道聽塗說者臣竊以衆多之議足見人情必有可行亦有可畏恐不宜一槩輕侮而莫之省納也陛下又謂試加質問即便辭窮者臣竊以陛下雖窮其辭而未盡其理能服其口而未服其心何以知其然臣每讀史書見亂多理少因懷感歎嘗試思之竊謂為下者莫不願忠為上者莫不求理然而下每苦上之不理上每苦下之不忠若是者何兩情不通故也下之情莫不願達於上上之情莫不求知於下然而下恆苦上之難達上恆苦下之難知若是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人恥聞過騁辨給眩聰明厲威嚴恣彊愎此六者君上之弊也諂諛顧望畏愞此三者臣下之弊也上好勝必甘於佞辭上恥過必忌於直諫如是則下之諂諛者順旨而忠實之語不聞矣上騁辨必勦說而折人以言上眩明必臆度而虞人以詐如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之說不申矣夫以區域之廣大生靈之衆多宮闕之重深高卑之限隔自黎獻而上獲覩至尊之光景者踰億兆而無一焉就獲覩之中得接言議者又千萬無一幸而得接者猶有九弊居其間則上下之情所通鮮矣上情不通於下則人惑下情不通於上則君疑疑則不納其誠惑則不從其令誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不敗何待是使亂多理少從古以然考其初心不必淫暴亦在乎兩情相阻馴致其失以至于艱難者焉昔龍逢誅而夏亡比干剖而殷滅宮奇去而虞敗屈原放而楚衰臣謂夏殷虞楚之君若知四子之盡忠必不勦廾若知四子之可用必不違拒所以至於忍害而捨絶者蓋謂其言不足行心不足保故也四子既去四君亦危然則言之固難聽亦不易趙武訥訥而為晉賢臣絳侯木訥而為漢元輔公孫宏上書論事帝使難宏以十策宏不得其一及為宰相卒有能名周昌進諫其君病吃不能對詔乃曰臣口雖不能言心知其不可然則口給者事或非信辭屈者理或未窮人之難知堯舜所病胡可以一酬一詰而謂盡其能哉以此察天下之情固多失實以此輕天下之士必有遺才臣是以竊慮陛下雖窮其辭而未窮其理能服其口而未服其心良有以也古之王者明四目達四聰蓋欲幽抑之必通且求聞巳之過也垂旒於前黈纊於側蓋惡視聽之太察唯恐彰人之非也降及末代則反於斯聰明不務通物情視聽祇以伺罪釁與衆違欲與道乖方於是相尚以言相示以智相冒以詐而君臣之義薄矣以陛下性含仁聖意務雍熙而使至道未孚臣竊為陛下懷愧於前哲也古人所以有恥君不如堯舜者故亦以是為心乎夫欲理天下而不務於得人心則天下固不可理矣務得人心而不勤於接下則人心固不可得矣務勤接下而不辨君子小人則下固不可接矣務辨君子小人而惡其言過悅其順巳則君子小人固不可辨矣趣和求媚人之甚利存焉犯顏取怨人之甚害存焉居上者易其害而以美利利之猶懼忠告之不蔇況有疏隔而勿接又有猜忌而加損者乎天生蒸人本以為國人之有口不能無言人之有心不能無欲言不宣於上則怨讟於下欲不歸於善則湊集於邪聖人知衆之不可以力制也故植謗木陳諫鼓列爭臣之位置采詩之官以宣其言尊禮義安誠信厚賢能之賞廣功利之途以歸其欲使上不至於亢下不至於窮則人心安得而離亂兆何從而起古之無為而理者其率由此歟苟有理之之意而不知其方苟知其方而心守不一則得失相半天下之理亂未可知也其又違道以師心廾人而任巳謂欲可逞謂衆可誣謂專斷無傷謂詢謀無益謂諛說為忠順謂獻替為妄愚謂進善為比周謂嫉惡為嫌忌謂多疑為御下之術謂深察為照物之明理道全乖國家之顛危可立待也理亂之戒前哲備言之矣安危之效歷代嘗試之矣舊典盡在殷鑒足徵其於措置施為在陛下明識所擇耳伏願廣接下之道開獎善之門宏納諫之懷勵推誠之美其接下也待之以禮煦之以和虛心以盡其言端意以詳其理不禦人以給不自眩以明不以先覺為能不以臆度為智不形好惡以招諂不大聲色以示威如權衡之懸不作其輕重故輕重自辨無從而詐也如水鏡之設無意於妍蚩而妍蚩自彰莫得而怨也有犯顏讜直者獎而親之有利口讒佞者疏而斥之自然物無壅情言不苟進君子之道浸長小人之態日消何憂乎少忠良何有乎作威福何患乎妄說是非如此則接下之要備矣其獎善也求之若不及用之懼不周如梓人之任材曲直當分如滄海之歸水洪涓必容能小事則處之以小官立大勞則報之以大利不忌怨不避親不抉瑕不求備不以人廢舉不以巳格人聞其才必試以事能其事乃進以班自然無不用之才亦無不實之舉如此則獎善之道得矣其納諫也以補過為心以求過為急以能改其過為善以得聞其過為明故諫者多表我之能好諫者直示我之能賢諫者之狂誣明我之能恕諫者之漏泄彰我之能從有一于斯皆為盛德是則人君之與諫者交相益之道也諫者有爵賞之利君亦有理安之利諫者得獻替之名君亦得採納之名然猶諫者有失中而君無不美唯恐讜言之不切天下之不聞如此則納諫之德光矣其推誠也在彰信在任人彰信不務於盡言所貴乎出言則可復任人不可以無擇所貴乎已擇則不疑言而必誠然後可求人之聽命任而勿二然後可責人之成功誠信一虧則百事無不紕繆疑二一起則㣥下莫不憂虞是故言或乖宜可引過以改其言而不可苟也任或乖當可求賢以代其任而不可疑也如此則推誠之義孚矣微臣所以屢屢塵黷而不能自抑者蓋以陛下有拯亂之志而多難未平有務理之誠而庶績未乂有堯舜聰明之德而未光宅於天下有覆載含宏之量而未翕受於衆情故臣每中夜靜思無不竊歎而深惜也向若陛下有其位而無必行之志有其志而無可致之資則臣固已從俗浮沉何苦而汲汲如是惟陛下詳省所闕亟行所宜歸天下之心濟中興之業此臣之願也億兆之福也宗社無疆之休也謹奏
