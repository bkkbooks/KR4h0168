front:
  text: 全唐文欽定全唐文卷四百七十七佑字君卿京兆萬年人貞元三年纍拜尚書左丞轉刑部尚書十九年拜檢校司空同中書門下平章事元和元年册拜司徒封岐國公七年薨年七十八贈太傅諡安簡
  hash: sha256:76d46eda9e75d2816d9291214784ee96464cd9e48cebb46a1c3663043107cd79
  markers:
  - {type: head, offset: 14, content: 杜佑, id: KR4h0168_NFKB_477-h1, level: 1}
body:
  text: 臣聞太上立德不可庶幾其次立功道行當代其次立言見志後學由是往哲遞相祖述將施有政用乂邦家臣本以門資幼登官序仕非遊藝才不及人徒懷自強頗玩墳籍雖履歷叨幸或職劇務繁竊惜光陰未嘗輟廢夫孝經尚書毛詩周易三傳皆父子君臣之要道十倫五教之宏綱如日月之下臨天地之大德百王是式終古攸遵然率多記言罕存法制愚管窺蠡測豈達高深輒肆荒虛誠為臆度每念懵學莫探政經略觀歷代衆賢著論多陳紊失之弊或闕拯救之方臣既庸淺寧詳損益未原其始莫暢其終尚賴周氏典禮秦皇蕩滅不盡縱有繁雜且用準憑至于往昔是非可為來今龜鑑布在方策亦粗研尋自頃纂修年踰三紀識寡思拙心昧詞蕪圖籍實多事目非少將謂功畢有愧乖疏固不足發揮大猷但微臣竭愚盡慮凡九門計二百卷不敢不具獻上庶明鄙志所之塵瀆聖聰兢惶無措臣伏見近者黨項與西戎潛通屢有降人指陳事迹而公卿廷議以為誠當謹兵戎備侵軼益發甲卒邀其寇暴此蓋未達事機匹夫之常論耳夫蠻夷猾夏唐虞已然周宣中興獫狁為害但命南仲往城朔方驅之太原及境而止誠不欲弊中國而怒遠夷也秦平六國恃其兵力北築長城以拒胸奴西逐諸出於塞外勞力擾人結怨階亂中國未靜白徒競起海內雲擾實生謫戍漢武因文景之富命將興師遂至戶口減半竟下哀痛之詔罷田輪臺前史書之尚嘉其先迷而後復蓋聖王之理天下也唯務綏靜蒸人西至流沙東漸于海在南與北亦存聲教不以遠物為珍匪求遐方入貢豈疲內而事外終得少而失多故前代納忠之臣並有匡君之議淮南王請息師於閩越賈捐之願棄地于珠崖安危利害高懸前史昔馮奉世矯漢帝之詔擊莎車傳其王首於京師威震西域宣帝大悅議加爵土之賞蕭望之獨以為矯制違命雖有功效不可為法恐後之奉使者爭逐發兵為國家生事述理明白其言遂行國家自天后已來突厥默啜兵強氣勇屢寇邊城為害頗甚開元初邊將郝靈佺親捕斬之傳首闕下自以為功代莫與二坐望榮寵宋璟為相慮武臣邀功為國生事止授以郎將由是訖開元之盛無人復議開邊中國遂寧外夷亦靜此皆成敗可徵鑒誡非遠且黨項小蕃雜處中國本懷我德當示撫綏間者邊將非廉亟有侵刻或利其善馬或取其子女便賄方物徵發役徒怨苦既多叛亡遂起或與北狄通使或與西戎寇邊有為使然固當懲革傳曰遠人不服則修文德以來之管子曰有國家無使勇猛者為邊境此誠聖哲識微知著之遠略也今戎醜方強邊備未實誠宜慎擇良將誡之完葺使保誠信絶其求取用示懷柔來則懲禦去則謹備自然彼懷我德革其姦謀何必遽圖興師坐致勞費陛下上聖至仁覆育㣥類動必師古謀無不臧伏望堅保永圖置兵袵席天下幸甚臣識昧經綸學慙博究竊鼎鉉之寵任為朝廷之老臣恩深莫倫志懇思報臧否備閲芻蕘上陳有瀆旒扆伏深惶悚晉司律中郎將陳頎云昔杜夔傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭太和中左延年改夔騶虞伐檀文王三曲更作聲節其名雖存而聲實異惟夔鹿鳴今不改易也魏代正朝大會太尉奉㣥后行禮東廂雅常作者也後有三篇第一曰於赫篇詠武帝聲律與古鹿鳴同第二曰巍巍篇詠文帝用左延年所改騶虞聲第三曰洋洋篇詠明帝亦用左延年所改文王聲第四復用鹿鳴之聲重用而除古伐檀及晉初食舉亦用鹿鳴按左傳穆叔如晉晉侯享之工歌鹿鳴之三三拜曰鹿鳴所以嘉寡君也敢不拜嘉毛詩云鹿鳴燕㣥臣嘉賓也既飲食之又實其幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心也詩傳並無行禮及叔孫通所制漢儀復無別行禮事荀氏云魏氏行禮食舉再取周書鹿鳴又以宴嘉賓無取於朝考之舊聞未知所應荀勗乃除鹿鳴舊制更作行禮詩四篇先陳三朝朝祭之義食舉歌詩十二篇元肇㣥后奉璧趨步拜起莫非行禮豈容別設一樂謂之行禮耶荀譏鹿鳴之失似屬誤謬還制四篇復襲前軌禮記但有獻酬無上壽文惟詩雅云再拜稽首天子萬壽豳風云為此春酒以介眉壽雖非灼然明文要是髣佛其實古者詩工皆歌之故可得而言也漢興叔孫通定禮儀七年長樂宮成諸侯朝禮畢復置酒侍坐殿上皆伏尊卑以次起上壽漢故事上壽四會曲注言但有鐘鼓無有歌詩魏初作四會有琴築但無詩雅樂郭瓊云明帝青龍二年以長笛食舉第十二古置酒曲代四會又易古詩名曰羽觴行用為上壽曲施用最在前鹿鳴已下十二曲名食舉樂而四會之曲遂廢漢故事鄧吳及瓊等食舉之曲與時增損張華上雅樂詩表云魏上壽食舉時及漢代所施用其文句長短不齊皆未合於古雅漢故事則云上壽四曲華亦言有歌辭會其注當是闕文晉代歌詩傅元述具存周官云王大食三侑皆合鐘鼓漢蔡雍云王者食舉以樂今但有食舉樂食畢則無樂按膳夫職以樂侑食禮記云客出以雍徹以振羽論語云三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂如此徹食應有樂不容同用食舉也讀時令非古制也自東漢始焉其後因而沿襲按太宰職正月之吉懸治象之法於象魏使萬人觀之又春官太史頒告朔於邦國玉藻復云聽朔於南門之外並無讀時令故事而辟閭仁諝云元日受朝讀令此則聽朔禮畢合於玉藻之文王方慶雖有所駁大旨與仁諝不異皆臆説也凡言時者為四時耳若正月之朔讀令則合云歲令何以謂之時邪其夏秋冬又何為不讀邪則辟閭輩誤矣議曰唐虞稽古建官惟百夏商官倍亦克用乂周建六官各有徒屬雖上文去質吏衆事繁然而條流不紊職非重設秦氏立制多因時宜漢初沿襲後漸增廣光武建武六年廢罷四百餘縣吏職十置其一魏太和中分命使臣省州縣吏正始中又并合郡縣等晉太元六年省七百餘員隋開皇三年廢五百餘郡國家貞觀初省內官六百餘員詳設官之本為理衆庶所以古者計人置吏故周官鄉遂稍縣畿約人定員吏無虛設自漢魏晉隋暨於聖唐皆因戰爭流離征繕艱勞節省吏職存諸方策晉荀勗桓溫俱有此議息人救弊何莫由斯昔皋繇作士師正五刑今刑部尚書大理卿是二皋繇也垂作共工利器用今工部尚書將作監是二垂也契作司徒敷五教今司徒戶部尚書是二契也伯夷秩宗典邦禮今禮部尚書禮儀使是二伯夷也伯益作虞掌山澤今虞部郎中都水使者是二伯益也伯冏作太僕掌車馬今太僕卿駕部郎中尚輦奉御間廣既使者是四伯冏也古者天子有六軍漢家前後左右將軍四人今則十二衛神策等八軍凡有將軍六十人也歷代增益以至於是舊名不廢新職日加名繁職重不可遍舉所以後周依古周建六官蓋由於此今略徵外官別駕本因漢置隨刺史巡察若今觀察使之有副使也參軍後漢末置參諸府軍事若今節度判官也官名職務遷易不同空存虛稱皆無事實又司田頃景龍三年嘗置無何以煩冗却停併入司戶殊為折衷誠宜斟酌繁省詳考損益欲求致理必也正名神龍中官紀隳紊有司務廣集選人競收名稱其時無闕注授於是奏署員外官者二千餘人自爾遂為恆制當開元天寶之中四方無虞百姓全實大凡編戶九百餘萬吏員雖衆經用雖繁人力有餘帑藏豐溢縱或枉費不足為憂今兵革未寧黎庶凋瘵數年前天下簿帳到省百三十餘萬戶自聖上御極分命使臣按比收斂土戶與客戶共計三百餘萬比天寶中才三分之一就中浮寄仍五分有二出租賦者減耗若此食租賦者豈可仍舊如一州無三數千戶置五十六員官十羊九牧疲吏煩衆顧茲大弊實思革之議者多云尚有跋扈未庭併省官吏之後恐被罷者仕進無路別有依託且縻爵祿兼示隄防此乃常情之説慮非救時之論有才者即令薦用不才者何患奔亡而況各有姻戚顧戀家産後漢建武六年減縣省官公孫述隗囂未滅魏太和正始中則吳蜀鼎立晉太元六年吳國尚在隋開皇三年陳氏割據皆招羅俊乂志相吞滅此時猶不慮有失賢資敵務以救弊為謀今田悅之徒並是庸瑣繁刑暴賦惟恤軍戎衣冠士人遇如奴虜豈比公孫述諸葛亮之在巴蜀孫權陳霸先之有江南固無范睢業秦賈季強狄之慮斯斷可知矣今若以人情因習既久不能更改制度併省內官但且權停省外官別駕司馬及參軍州縣額內官約人戶減縣尉其被罷者但有德行才器委州府長吏搜擇論薦固亦不遺器能如或渝濫先坐舉主誰敢罔冒以陷刑章其有不被舉論但全舊名任參常調自當修進更俟甄收暫罷歲時何負此輩如柱國後魏末置並是當時宿德勳盛業崇皆主重兵寵貴第一周隋以後授受至多暨乎國家回作勳級唯得三十頃地耳又開府儀同三司及光祿大夫亦是官名還為人多回作階級隨時立制遇弊變通不必因循重復改作待戎車息駕百姓稍寧欲增庶官則復舊制謹議議曰昔堯試舜於大麓領録天下事是其任也周之司會又其職焉秦時少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢承秦置及武帝遊宴後庭始用宦者主中書以司馬遷為之中間遂罷其官以為中書之職至成帝建始四年罷中書宦者又置尚書五人一人為僕射四人分為四曹通掌圖書祕記章奏之事及封奏宣示內外而已其任猶輕至後漢則為優重出納王命敷奏萬機蓋政令之所由宣選舉之所由定罪賞之所由正斯乃文昌天府衆務淵藪內外所折衷遠近所稟仰故李固云陛下之有尚書猶天之有北斗斗為天喉舌尚書為陛下喉舌斗斟酌元氣運乎四時尚書出納王命賦政四海令及左丞總領紀綱無所不統僕射及右丞分掌廩假錢穀漢初尚書雖有曹名不以為號及靈帝以侍中梁鵠為選部尚書於是始見曹名總謂之尚書臺亦謂之中臺大事八座連名而有不合得建異議二漢皆屬少府魏置中書省有監令遂掌機衡之任而尚書之權漸減矣晉以後所掌略同八座丞郎初拜並集都省交禮遷職又解交本漢制也至於晉宋唯八座解交丞郎不復解交也宋曰尚書寺居建禮門內亦曰尚書省亦謂之內臺每八座以下入侍門生隨入者各有差不得雜以人士凡尚書官大罪則免小罪遣出百日乏代人聽還本職其令及二僕射出行分道之制與中丞同令僕各給威儀十八人自晉以後八座及郎中多有不奏事梁天監元年詔曰自禮闈陵替歷茲永久郎署備員無取職事粳粃文案貴尚虛間空有趨墀之名了無握蘭之實曹郎可依昔奏探自是始奏事矣又詔尚書中有疑事先於朝堂參議然後啓聞舊尚書官不以為贈唯朱卒特贈右僕射武帝寵之故也自魏晉重中書之官居喉舌之任則尚書之職稍以疏遠至梁陳舉國機要悉在中書獻納之任又歸門下而尚書但聽命受事而已後魏天興元年置八部大夫於皇城四方四維面置一人以擬八座謂之八國各有屬官分尚書三十六曹及諸外置令大夫主之四年又復尚書三十六曹天賜元年復罷尚書三十六曹別置武歸修勤二職分主省務至神麚元年始置僕射左右丞及諸曹尚書十餘人各居別寺北齊尚書省亦有録令僕射總理六尚書謂之都省亦謂之北省後濟北王以太子監國立大都督府與尚書省別理衆事仍開府置佐後周無尚書隋及大唐皆有其制略同凡尚書省事無不總龍朔二年改尚書省為臺咸亨初復舊光宅元年改為文昌臺垂拱元年又改為都臺咸通初復舊長安三年又改為中臺神龍初復為尚書省都臺居中左右分司都堂之東有吏部戶部禮部三行每行四司左司統之都堂之西有兵部刑部工部三行每行四司右司統之凡二十四司分曹共理天下之事盡矣謹議按僕射秦官其名則微其職甚細東漢以後雖委任漸重職司會府而非百僚師長之職也又按丞相亦秦官秦氏每㣥臣上表皆云丞相臣某為首漢之宗臣蕭何為丞相漢儀丞相進天子御座為起在輿為下有疾法駕至第問得戮二千石申屠嘉欲斬內史鼂錯是也霍光受顧託之重當伊周之地廢昌邑王上表太后丞相臣敞為首大司馬大將軍臣光次之其尊崇如此中間嘗置左右丞相亦嘗改為相國亦為大司徒大抵漢之丞相是為三公於天下無所不統後漢亦以三公為宰相則司徒本西漢丞相也其後或為丞相或為相國或為大丞相雖互為之名其實一也曹公司馬師昭趙王倫王敦王導劉義宣齊高帝梁武帝爾朱榮陳武帝侯景齊獻武隋文帝皆為之歷代多非尋常人臣之職亦多為贈官然自秦以降實居百僚之長今尚書令統領衆務提舉綱目僕射二之誠為崇重且非統國政宰天下之任宜侍中中書令如直以尊崇則太師不然上公太尉始可師長命百僚也龍朔中天寶初嘗改侍中中書令為左右相遠協伊尹仲虺為左右相周公召公相成王為左右之義斯誠允當或謂尚書令僕射則録尚書之職是官之師長按前代録尚書霍光張安世王鳳趙喜牟融鄧彪張禹李固王導褚彥回齊明帝之徒或是三師或是三公或是大將軍大司馬兼之皆秉朝政猶古冢宰百官總已實宰輔也其時別自有令僕今僕射雖嘗改為丞相名同而職異品秩又未崇極上有三司三公尚書令豈比前代丞相受任也其襲舊名無實者若今刺史皆云使持節按前代使持節得戮二千石其王公已下封國皆南面臣人分茅建社其開府儀同三司則禮數班秩皆如三公置府辟吏今並豈有其實乎此例甚不能遍舉安有僕射因改丞相之名都無丞相之實而為百僚之師長也又與丞郎絶禮若隔品致敬則諸司長官與隔品僚屬其可絶禮乎斯不然矣謹議佑少嘗讀書而性且蒙固不達術數之藝不好章句之學所纂通典實采㣥言徵諸人事將施有政夫理道之先在乎行教化教化之本在乎足衣食易稱聚人曰財洪範八政一曰食二曰貨管子曰倉廩實知禮節衣食足知榮辱夫子曰既富而教斯之謂矣夫行教化在乎設職官設職官在乎審官才審官才在乎精選舉制禮以端其序立樂以和其心此先哲王致治之大方也故職官設然後興禮樂焉教化隳然後用刑罰焉列州郡俾分領焉置邊防遏戎狄焉是以食貨為之首十二卷選舉次之六卷職官又次之二十二卷禮又次之百卷樂又次之七卷刑又次之大刑用甲兵十五卷其次五刑八卷州郡又次之十四卷邊防末之十六卷或覽之者庶知篇第之旨也佑此莊貞元中置杜曲之右朱陂之陽路無崎嶇地復密邇開池水積川流其草樹蒙蘢岡阜擁抱在形勝信美而躋攀莫由爰有處士琅邪王易簡字高德經術探於壼祕文章擅於風雅精識窮於治理奧學究於天人棲遲衡茅粃粳爵祿旁洽他藝尤精術數短褐或敝簞笥屢空守道安貧不求不競素嗜山水乘興遊衍踰月方歸誠士林之逸人衣冠之良士佑景行仰止邀屈再三惠然肯來披榛周覽因發嘆曰懿茲佳景未成具美蒙泉可導絶頂宜臨而面勢小差朝晡難審庸費不廣日月非延輿識無不為疑佑獨固請卒事於是剃叢莽呈修篁級詰屈步邐迤竹徑窈窕藤陰玲瓏勝概益佳應接不足登陟忘倦達於高隅若處煙霄頓覺神王終南之峻嶺青翠可掬樊川之清流逶迤如帶蕆役春仲成功秋暮其煩匪病不於素開雙洞於巖腹當鬱燠而生寒交清泉於巘上遭旱暵而淙注止則澄徹動則潺湲宛如天然莫辨所泄懸布垂練搖曳晴空定東西之方隅正子午之晷度境象一變賓侶咸驚矧其流觸灣環曲池奫淪美景良辰賢英迭臻泛方舟而騁懷聽清商而怡神寧知景之將曛勝事嘉趣諒難備陳遠祖西漢建平侯家於杜陵綿歷千祀佑實虛薄謬竊公台作相兩朝空尸高秩初過從心之歲即陳歸老之誠渥澤猥流皇慈未替特優筋力之禮俯念朝謁之勤任適田廬恣尋山水荷天地之大德蒙亭育之厚恩上答何階兢慙是積而枌榆之敬恭肅敢虧每出國門未嘗公服導從輩悉令簡省芻蕘者莫止唐突及栖弊陋時會親賓野老衰宗嗇夫遊徼亦同列坐或與銜杯由是盡得歡心庶將洽比鄉黨其城曲墟落緇黃童艾杜名杜氏遍周川原㣥情既用光榮老夫唯增祗懼或曰茲地頗堪遊玩深慮勢家凌奪佑以為不然聖主明君固當制抑神龍中故中書令韋公嗣立驪山幽棲谷莊實為勝絶中宗愛女安樂公主恃寵懇求竟不之許曰大臣産業宜傳後代不可奪也恭惟聖德載在史策貞元中族叔司空相國黃裳時任太子賓客韋曲莊亦謂佳麗中貴人復以公主賞愛請買賜與德宗不許曰城南是杜家鄉里終不得取仰奉聖言布於人聽則二后皆切禁止所冀善以保安在子孫但履孝資忠謹身奉法無疑欽達節克守素風復何虞也司徒平章事岐國公京兆杜佑記秦以區區關中滅六強國今竭萬方之財上奉京師外有犬戎憑陵陷城數百年內有兵革未寧三紀矣豈制置異術古今殊時乎周制步百為畝畝百給一夫商鞅佐秦以為地利不盡更以二百四十步為畝百畝給一夫又以秦地曠而人寡晉地狹而人夥誘以三晉之人耕而優其田宅復及子孫使秦人應敵於外非農與戰不得入官大率百人以五十人為農五十人習戰故兵強國富其後仕宦途多末業日滋今大率百人才十人為農餘皆習他技又秦漢鄭渠溉田四萬頃白渠溉田四千五百頃永徽中兩渠灌浸不過萬頃大歷初減至六千畝畝朘一斛減少四五百萬斛地利耗人力散欲求富強不可得也漢時長安北七百里即胸奴之地侵掠未嘗暫息計其舉國之衆不過漢一大郡鼂錯請備障塞故北邊妥安今潼關之西隴山之東鄜坊之南終南之北十餘州之地已數十萬家吐蕃綿力薄材食鮮兵拙不及中國遠甚誠能復兩渠之饒誘農夫趨耕擇險要繕城壘屯田蓄力河隴可復豈惟自守而已夫音生於人心心慘則音哀心舒則音和然人心復因音之哀和亦感而舒慘故韓娥曼聲哀哭一里愁悲曼聲長歌衆皆喜忭斯之謂矣是故哀樂喜怒敬愛六者隨物感動播于形氣叶律呂諧五聲舞也者咏歌不足故手之舞之足之蹈之動其容象其事而謂之樂樂也者聖人之所樂可以善人心焉古之天子諸侯卿大夫無故不撤樂士無故不去琴瑟以平其心以暢其志則和氣不散邪氣不干此古先哲后立樂之方也周衰政失鄭衛是興秦漢已還古樂淪缺世之所存韶武而已下不達振鐸上不達謳謠但更其名示不相襲知音復寡罕能制作而況古雅莫尚胡樂薦臻其聲怨思其狀迂怪方之鄭衛又何遠乎爰自永嘉戎羯迭亂事有先兆其在於茲貞觀初作破陳樂舞有發揚蹈厲之容歌有和易嘽發之音以表興王之盛烈何讓有周之大武豈近古相習所能思關哉而人間胡戎之樂久而未革古者因樂以著教其感人深乃移風俗將欲間其邪正其頽惟樂而已太宗文皇帝留心雅正厲精文教命考隋氏所傳南北之樂梁陳盡吳楚之聲周齊皆胡虜之音乃命太常卿祖孝孫正宮調起居呂才習音韻協律郎張文牧考律呂平其散濫為之折衷西漢以來郊祀明堂有夕牲迎神登歌等曲近代加祼地迎牲飲福酒今夕牲祼地不用樂公卿攝事又去飲福酒之樂周享神諸樂多以夏為名宋以永為名梁以雅為名後周亦以夏為名隋氏因之國朝以和為名旋宮之樂久喪漢章帝建初三年鮑鄴始請用之順帝陽嘉二年復廢纍代習黃鐘一均變極七音則五鐘廢而不擊反謂之啞鐘孝孫始為旋宮之法造十二和樂合四十八曲八十四調至開元中又造三和樂又製文舞武舞文舞朝廷謂之九功舞武舞朝廷謂之七德舞樂用鐘磬柷敔晉鼓琴瑟箏竽笙簫笛箎塤錞于鐃鐸舞拍舂犢等謂之雅樂唯郊廟九會冬至及册命大禮則辨其曲度章句而分始終之次二十九年六月太常奏東封太山日所定雅樂其樂曰豫和六變以降天神順和八變以降地祗皇帝行用太和之樂其封泰山也登歌奠玉幣用肅和之樂迎俎用雍和之樂酌福飲福用壽和之樂送文迎武用舒和之樂亞獻終獻用凱安之樂送神用夾鐘宮元和之樂禪社首送神用林鐘順和之樂享太廟迎神用永和之樂獻祖宣皇帝酌獻用光大之舞懿祖光皇帝酌獻用長發之舞太祖景皇帝酌獻用大政之舞世祖元皇帝酌獻用大成之舞高祖神堯皇帝酌獻用大明之舞太宗文武皇帝酌獻用崇德之舞高宗天皇大帝酌獻用鈞天之舞中宗孝和皇帝酌獻用太和之舞睿宗大聖貞皇帝酌獻用景雲之舞徹豆用雍和之舞送神用黃鐘宮永和之樂臣以樂章殘缺積有歲時自有事東巡親謁九廟聖情敦禮精祈感通皆祠前纍月考定音律請編諸史册萬代施行
