front:
  text: 全唐文欽定全唐文卷二百二十崔融四
  hash: sha256:dc4fc7040351870a212b1f5619e1033de0c045b46652c306a6a58b0e660fc5d1
body:
  text: 孔安家承闕里訓習淹中黃叔度之平生朱買臣之故事康成進德斯覽卷於八千士安行道願加年於數百邑宰職當訓俗務在化人管幼安之藜牀莫欽高義王君公之板榻靡尚真規縲絏冶長昔聞其事鞭撻寗越今見其人徒有望於勸農終致慙於勵學廉使親承聖旨肅事澄清一字之褒人知激節片言之貶士識愧心附狀稱不闕一字優賢據理自闕一字慙德更闕一字文過懷刑須事言提弈弈九重鏘鏘萬國凝旒闢纊天臨布政之宮曳組垂紳日旰懸書之闕臺郎伏奏蕭翟初飛縣宰退朝王鳬稍下度金錢之廣埒過鐵鎖之長橋河南帝城是惟都會陜西王邑須禁椎埋何得逢暴客而不收委僵屍而無詰徵洛陽之故事行馬先知採漢相之遺塵停車有問當其所職曾不懼於宣風越其所司翻見憂於喘月妄干他事深謂當然牒送所由任依常典僕去夏遄征徂秋戾止於舍弟圓處辱吾子贈書撤函敷紙恬神靜諷龍文陽發居然異氣射人鳳律雄鳴自有竒音震物是何詞裁清雅興旨奧深黃縑白鍛吐其文玉篆銀鈎艷其彩超超美論上陵於八十五篇婉婉成章下該於五十六字心靈密會許予以煙霄鸞鳳之交景氣潛通博我以風雨魚龍之感雖曰不敏竊所庶幾下走才不逮於中人名謬參於下士頗亦希達者之陳跡慕君子之遺風何不勤勤於接賢汲汲於結善見一才庶褰裳千里聞一德期負笈七州而心跡相妨竟未之致也且僕之於君早欽風素子未知僕載勞翰墨同聲相應可謂知言庸詎知哉是何言也善乎東方生有言曰士大夫相知何必垂髮齊年拊手塵游僕每覽此嘉其旨氣重其達識斯可謂之知言矣足下博聞強學豐才贍思以為魏蜀名遊吳鄭竒節不獨於古可生於今若高明之禮樂大器足并吞於八九若下走之瓶筲小才豈與言於萬一也然才器雖不足揆風尚或可思齊區區之誠有望於此耳夫黃金之為寶也重矣而衆或鑠之白玉之為璞也真矣而衆或非之木秀於林堆出於岸者卒為風波所擊材出於衆行高於人者必為時俗所議以孔宣之德也而招毀於武叔以周公之德也而見疑於管叔此古而有之子何為怪者若吾子之蘭薰雪白冰清玉潤變通古今識貫終始而不免於讒口者斯亦可以痛心哉然則霜雪增加然後知松柏之勁也陰陽薄蝕然後知日月之明也涅而不淄磨而不磷者此非其效歟嗟乎王事不遑行役無定及君降止伊余載馳庶將自過黃叔度不意求尋陳仲舉參差不展踧踖為勞而吾子泛交直造余室弱季愚者因此得聞夕飽儒珍朝充道味南指有資於先覺北面頓廓於初蒙成人之美君子之務也遂令齊聲五對嗣美一枝名登甲乙之科身預賢良之末此非師資之效歟僕志尚幽閒體業疎放自拘文墨屢學栖遲院草侵階而不薙惜其十步有芳也庭樹當軒而不徙重其一枝可巢也素琴委篋絃上之聲勿取也道書盈架物外之情足徵也此僕之不能忘懷聊復爾耳而子矜余以傲吏誇我以高人多見其翫人喪德者也僕少乏文章長微學藝緣情體物誠所不工雕朽礪鉛有時牽拙直將歌其勞事豈欲冒彼知音而吾子廣肆褒揚深加提飾上揆飛龍之奏旁援儀鳳之音語人必於其倫在僕何可至此足下德擅宗師名推雄伯文高積玉昇學日以照天光韻警鏘金激思風而吹地籟至若山柱河官之作珠胎鼎氣之篇並登作者之心每諷詞人之口竊霑餘論久已懷音重勞賜殊深荷戴謹當藏之於篋書之於紳奉以周旋期諸永久僕自恭承綵札握翫瓊章筆硯俱焚神氣都盡所以遲迴曠日俛仰窮年者抑由於此矣亦將性不好書往賢之通論言非盡意前哲之美談苟意得而言忘冀神交而道合耳而竟不能以已者恐爽無言不酬之美云耳相知心期要以會面景山足下勿我棄遺敬慎德音邀君歲暮耳當今六月頗暑二時隆赫敬想出忠入孝自公及私養親以祿効官以智邕邕然致足樂也僕拙於札翰行復推遣未卜清言良深太息不具崔某白臣聞天地生成其法自然之謂道陰陽鼓舞其功不測之謂神然則物或類感事因通變乾棟傾而三光北馳坤輿缺而百川東瀉河淪越雟有郡邑之為魚水陷陽有吏人之化鼈訪遺蹤於女峽風雨蕭條徵往事於姑泉絃歌響亮盈虛靡定合散焉常不知誰子既老氏之多懵忽然為人寧賈生之足辯仰觀俯察裁識幽明之故原始反終未窮生死之說得於道而失於道義有必然出於機而入於機理無或廢知變化者其知神之所為乎臣謹按啟母廟者葢夏后啟之母也漢避景帝諱改啟之字曰開厥後相傳或為開母而顧野王輿地志盧元明嵩高記並不尋避諱之旨以為陽翟婦人事不經見諒無所取粵若玉斗璇璣李母之居鄰北極金臺石室王母之宅在西山氣為母則㣥物以萌月為母則容光必照坤為母則上下交泰后為母則邦家有成故華胥履跡而雄氏孕女登感神而炎運作星流華渚而白帝生月貫幽房而黑精降明明有夏穆穆塗山予娶於度土之辰女婚於台桑之地搜竒帝紀摭異歸藏束生發蒙而有迷韓子稱賢而不朽漢臣之筆墨泉海陳其令名秦相之一字千金敘其嘉應士歌南國徒聞禹之詞石破北方終見生余之兆則郭璞所謂陽城西啟母石李肜所謂嵩山南啟母祠隋巢之說有徵鴻烈之言無爽者矣昔者鸞川之上母變空桑豚水之濱男生破竹美人之虹名螮蝀仙婦之月作蟾蜍精衞銜木而償冤女尸化草而成殯一作媚山崩蜀道臺婦而無歸石立武昌亭望夫而不及論乎誕載㣥下莫尊於帝王語乎遷易凡百無聞於感致美矣哉不可得而稱也大唐革去故鼎取新與運而生繼天而作握乾坤而造物海內知春闢混沌而為家域中無外天皇膺數順謳歌金櫃玉版服皇王之能事衢室廟堂承祖宗之茂烈垂衣裳而作元后端拱北辰負黼扆而朝諸侯嚮明南面周邦赫赫其道洽於成康漢室巍巍其化鍾於文景東漸西被遠安邇肅海三年而無波雲連月而不散天瑞降地符昇靈鳳五文歲時來苑囿神龍八卦昏旦遊池沼禮云乎哉無取於周旋揖讓樂之謂也必在於移風易俗司祿益富家國於是乎有餘司命益年臣人於是乎不夭明王三懼未嘗遺戒慎之心天子四鄰莫能展弼諧之用家安其業但聽於鄰雞人得其和遂同於野鹿表讖記奏河圖四十六事之著明曷云尚也登太山禪梁甫七十二封之可識何以加乎且夫窮聖神備道德滋萌元氣開闢太初斯乃天皇氏之所以應乎天也依土地明神靈駕六羽而上騰度九州而下濟斯乃人皇氏之所以順乎人也造書契教畋漁合五緯而節四時登九天而類萬物斯乃犧皇氏之所以制人法也務播殖該變通嘗藥以救兆人聚貨而交天下斯乃農皇氏之所以興人利也振夔鼓載龍旗天則元女授符帝則黃神降斗斯乃軒轅氏之所以除人害也均度量正都邑惣秋令於金天分瑞官於鳳紀斯乃帝昊氏之所以為人極也潔祭祀義鬼神履時以象天養財以任地斯乃帝頊氏之所以為人教也秋乘馬春乘龍順三辰而天道平建五正而人事理斯乃帝辛氏之所以為人政也明如日晦如陰人無識其名帝何力於我斯乃帝堯氏之所以昭君德也聞一善舉八才帝唱動而爛星雲天歌發而蹌鳥獸斯乃帝舜氏之所以章后功也夫三統者道之大五行者生之宗三皇法之而列五帝則之而序道以三興德以五立非天下之至聖孰能兼於此乎而猶雖休勿休損之又損下明詔發德音尊天而重人省方而巡狩舉星畢曳雲梢召風伯以清塵命山靈而護野馳洛邑騖襄城天迴而地游雲合而霧沓周穆王來遊太室先徵夏啟之居漢武帝有事嵩邱即訪姒開之石徒觀其丹青歲古霜露年侵聖情有睠興言改葺其山則古文之外方其地則新邑之中土銘壇邐迤斜分玉女之臺碑闕相望近對石人之廟金草生而五色貝樹長而三花紫雲合沓於溪㵎白霧氛氳於巖嶺考之易林信為神明所伏求之遁甲固以威靈肅然夫其命有司乘務隙因高背下察隱嶙之餘基審日觀星揆摧殘之落構周官置臬郢匠揮斤異態神行全模化造紅葩奪日飛累榭於山閒綺綴衝風架迴廊於木末仙人在棟神女臨窗周施玳瑁之椽徧覆琉璃之瓦赤玉為階甃黃金作門闕山如白岸樹似青溪羞蘊藻於前庭藉生芻於後徑蘭香夾水居然洗沐之資竹帚臨風自隔囂塵之境夢臺雲雨宋玉對而先驚楚壁山川屈原書而幾倦壽宮憺兮不擾象設安兮逾肅霜羅曳曳雲錦披披鴛鴦褥兮翡翠幬白羽扇兮青絲履垂玉鸞之珮若往而若還戴金雀之金义不長而不短其居處也曖曖昧昧陰閉陽開其被服也煌煌熒熒霞駮雲蔚鼎俎則麟胎鳳卵烝蕙燃蓂餌膳則木蜜金膏玉漿瓊酒當是時也合五岳訊九魁選太陰命元闕馮夷鳴鼓女媧清歌左蒼龍兮吹篪右白虎兮緪瑟金真拂座玉女焚香肅肅習習天媛來風雨雰雰霏霏神姬下霜雪孔雀飛而儀鳳舞弄玉邀歡軿車合而羅綺陳智瓊陪宴麻姑服道變海水而來遊織婦希風填河津而下謁洛綽約江帛丿糸眇元女以明月為珠素女以穨雲作髻九天真母八極夫人畢集於茲矣青霞衣兮翠雲裘靈連蜷兮既留車迴風兮馬飛電視倏忽兮無見昔者濟陰山下降堯母之精靈湘川水曲留舜之響像壝壇或在徒聞介福之名棟宇不修誰辨安歌之處豈知夫三仙福地百姓尊祠挾王者之都畿當聖人之順動犧牲玉帛可以洽氣和神幼婦外孫可以披文相質虔奉綸旨式陳壯觀雖周人作詩自得后之美而魏臣獻賦終慙神女之工敢作銘曰九州地險五岳天中蛟龍洞穴日月仙宮蓄洩雲霧震蕩雷風笙歌近接鍾鼓遙通其一昔在媯帝洪泉未塞昏墊下人汎濫中國於鑠大禹顯允天德龍畫旁分螺書徧刻其二佩文北海省土南方還從碣石更下台桑子娶有禮我都攸昌八年不顧四載維荒其三宛委既登轘轅佇鑿家室誤往熊羆方作天道幽祕生涯糾錯其化則遷其靈是託其四虙之館仙女之臺物類通感精魂去來巫山廟立漢水祠開壝壇歲古棟宇年摧其五皇矣大唐麗哉神聖膺圖受籙體元居正赫赫高祖天有成命明明太宗於茲為盛其六重光累洽下武嗣文負扆而化垂衣以君三靈肸蠁六氣氤氳魚鼈咸若雞犬相聞其七重譯請命殊鄰稟朔化及中孚風移大朴天秩百禮人和萬樂汾水可遊崑山何邈其八隨巢舊說夏啟遺居盛德不泯嘉聲在諸周王轉蹕漢帝迴輿聿懷降鑒其祀如初其九虞衡掌木班倕葺宇虹亘梅梁龍盤桂柱草積庭院水周堂廡石室置儔軒宮為輔其十珠簾洞卷玉座含清金翠玓瓅羅縠輕明儀形若動侍衞疑生依稀有物惝怳無聲其十一帝子湘川天孫漢曲翩帛丿糸縹眇躊躇躑躅神女弄珠靈啟玉倏來忽往星繁電燭其十二壯矣麗矣神之聽之聰明是屬景福無欺夫人立館幼婦鐫辭巍巍皇室萬萬餘基其十三公諱仁愷字仁愷鄭者宗周之圻內國宣王封其弟友於咸林以國為姓京兆闕其都闕至武公定平王東遷之後晉鄭焉依闕八字濟前華後河食溱洧焉河南新鄭是故今為熒陽人我武公父子代為周司徒詩人美之其詩曰緇衣之宜兮弊予又改為兮闕有司農闕二字漢有司農闕六字晉有司空袤洋洋乎良史書之清風流於四海盛德加於百代鬱為天下甲族搢紳士大夫靡然到今猶鱗介之宗龜龍也曾祖闕育周議曹闕四字騎中闕六字守祖子裕周畢王友大丞相府倉曹武泉郡太守父宏諒隋安定郡法曹並列為君子之林稱為英俊之闕易其至矣知微而知章詩不云乎令聞闕令望楊公四葉遠推闕二字之孫杜侯五代復見神仙之子公吸淳耀滋靈液因地美而芝蘭生受天真而松柏茂懷文抱質闕三字方機思內潛闕二字外闕拔自弱冠闕六字艱闕殆將滅性屬隋氏爽馭海水㣥飛衣冠蕩析既亂離而瘼矣禮樂逃散爭攜持而去之聖唐載造區夏削平宇宙闕道焚林求賢命職起家補闕八字宗衞錄事參軍拜闕二字子通事舍人遷詹事府主簿漢邸與鄒枚並遊鄴園與應劉方駕轉豳州三水同州蒲城二縣令君述職二城推明三輔覈為政闕四字養闕三字闢土植穀夏長秋成市無墮遊家安農業魚菜不乏食毛米無所闕三字望風闕四字黨聞名而自化秩滿遷萊州長史是時也青邱負阻滄海揚波乃眷行師深惟利涉制命公為造船使赤馬黃龍萬艘千軸成之不日望之如雲闕十字以西候多虞邊寄為重制授公闕州都督府司馬馳驛之官都督崔餘慶絕俗之士也每推公清心談不容口屬高宗升中岱岳預陪闕十字尋闕二字州長史闕之闕二字舊壤湫闕四字咨闕訴闕五字乃闕二字占星離疆畫野得郊原之爽塏當水陸之要衝城邑洞開閭閻對出闕十二字權授使持節密州諸軍事守密州刺史闕叶推良門歸通德有同衣錦時論榮之居無何遷使持節亳州諸軍事亳州刺史傳車驂駕鼓吹旌旗故人不敢私恩闕三字子闕二字相名闕鄉闕三字國霸闕三字大行惠化豐洽闕乎時禮云及年病相成可以致政於君可以傳事於子詣闕上書乞辭榮秩優制許焉從高志也婆娑田闕夭㑥邱墳始鳩杖而闕二字俄闕衣而闕五字元闕歲闕三字九月闕二字朔廿五日闕二字遘疾薨於東都惠訓里第享年七十有六嗚呼哀哉惟公五山之精六金之英大闕所成刜鍾無聲生而異狀幼而殊闕五字成闕五字信發闕四字清機虛沖默體言出乎口應而莫違道存乎身酌而罔極延頸者日有所得傾耳者日有所聞節於損已豐於濟物四踐闕二字二登邑宰三為別闕十一字朝闕夫學始於周孔中於老莊終於釋教故能全耳目逸形神兀然體命油然合道彼蒼不仁殲我明悊嗚呼哀哉以其年十一月與夫人合葬闕十字平原禮也垂拱二年貝州父老乃相與而謀曰自州辭驥足及野送龍車春纏慕百城行淹一紀昔年草莽閒桃李而闕十字兩邑闕九字德逾芳神其如在咸恐欒公之社蓬渚何常武侯之祠桑田且變廣祈時彥奉讚徽音乃建豐碑式揚清德其碑先寘於闕十字臨闕八字紀勣刊碑情深於即事未有居諸逾於十載猶結去思人吏隔於存亡仍崇頌記雖周人緬懷於邵伯未是過闕十六字豫郡闕六字之鎮荊州千年墮淚夫人清河郡君房氏隋司隸刺史皇朝贈徐州都督臨淄定公之孫太尉闕二十九字公特所鍾愛每謂親族曰我女實賢明嘗退朝之餘時與參謀政事及御車有典結鏡言歸芬若椒闕二十三字匡夫闕範訓子知方博綜書林深明覺道性純孝初丁公憂哀毀踰禮乃表奏男智度女光嚴出家以申追福闕二十四字悲闕今日西階之葬應天皇帝纂堯興運嗣夏配天遽覃錫類之恩特降追榮之禮神龍二年二月一日制贈公闕十三字軍事安闕七字之贈鴻恩被於九京高密鄧禹之封盛烈光於千載有子十人長曰愛客萬州刺史贈闕州刺史闕四字朝闕二十字朗州刺闕二字子真客中散大夫晉州臨汾令次子智度京懿德寺僧次子固忠定潞許三州刺史少府少闕五字二闕四字書闕部侍郎次子慈明趙闕六字卿曹州刺闕次子信卿左屯衞長史八龍齊騁六鳳㣥飛讀先聖之文行諸侯之孝潘中郎之茹泣顧慕修埏闕內史之銜闕三字大闕靈衣曳曳容駕遲遲當松柏之闕二字在桑榆之暮時元闕闕二字不復覩陰堂閉兮從此辭乃作銘曰大哉宣后詩歌中興武公載德緇衣是稱乃作卿士良哉股肱玉鈜金幹闕湧闕蒸盛德必祀信而有徵其一惟岳降神生甫及申闕二字純嘏文質彬彬道光邦國行重彞倫廊廟之寶社稷之臣其二肅肅端士宦成兩宮英英時彥闕三字同舞鸞馴雉闕二字返風太邱賁德密賤推功其三魏重題輿漢隆闕五字軾三居展驥鼇川波靜鳥城風被楛矢東來白環西暨其四按節海沂分符譙沛明明良牧帝庭稱最遷闕獸威闕四字一變澆俗翳公是賴其五歲窮鍾漏日運闕六字廣德懸車方尋三畧言從二踈俄悲夢奠忽愴楹書其六漢封樂毅周祀庭堅皇矣聖作疇德旌賢昭錫闕六字滕公之室原氏之阡棠陰一謝墮淚千年其七闕三字兮謂盛德遵釋老兮憲孔墨孝于家兮忠于國人之英兮士之則朱鳥南兮元武北日翳翳兮泉門黑闕冥冥兮闕三字翠闕三字丹字刻其八維神龍元年歲次乙巳十一月丁丑朔二十六日壬寅大行則天大聖皇后崩於洛陽宮之觀象殿旋殯於集仙殿之西階粵二年歲次丙午某月朔日將遷祔於乾陵禮也祖庭火燼攢宮月曉雲戴黼翣風牽絳旐儼天衞之蒼蒼邈宸儀之窅窅哀子嗣皇帝諱慕切充窮誠殷遣奠瞻象服其如在攀龍車而不見閟慈範於長陵戢神暉於前殿示人軌訓先王典則爰命史臣颺言聖德其詞曰天生后稷飛鳥覆翼天護武王躍魚隕航施於成康武子有光豐沛之疆河汾之陽異氣發祥聖后其昌穆穆皇皇作合於唐至哉坤德沈潛剛克竒相月偃惠心泉塞蘋藻必恭紘綖是則訓自閨閫風行邦國九一作七廟肅祗六宮允釐中外和睦遐邇清夷家道以正王化之基皇曰內輔后其謀咨謀咨伊俟皇用嘉止亦既顧命聿懷代己聖后謙沖辭不獲巳從宜稱制於斯為美仗義當責忘軀濟戹神器權臨大運匪革宗祧永固寰區奄宅負扆肅清垂旒光赫洸洸我君四海無氛英才遠畧鴻業大勳雷霆其武日月其文灑以甘露覆之慶雲制禮作樂還淳返樸宗祀明堂崇儒太學四海慕化九夷稟朔沈璧大河泥金中岳巍乎成功翕然向風乃復明辟深惟至公歸閑於大庭之館受養於長樂之宮品彙胥悅謳歌載隆鼎祚既穆璇樞已肅庶保太和長介景福如何靡怙而降斯酷后弄孫其未淹人喪妣其焉速嗣皇擗摽列辟扶服九族號咷萬姓荼毒嗚呼哀哉積憂勞而弗悆兮搆氛沴而成災逢冰霜之慘烈兮見草木之凋摧感大漸之將逝兮遺惠言而不回付聖子其得所兮顧黎元曰念哉頒寵錫以留訣兮節禮數以送哀邈終天而一往兮復何時而下來嗚呼哀哉光陰荏苒兮氣序迴互泣盡冬霜兮悲生春露攢塗云啟兮同軌畢赴湘川未從兮漢塋葢祔古則禮闕今也儀具嗚呼哀哉夜漏盡兮晨輓發轉相風兮搖畫月厭河洛兮不臨去嵩邙兮飄忽指咸陽之陵寢長安之宮闕旋六馬兮須期考三龜兮中歇嗚呼哀哉出國門兮林邱一作夷由覽舊迹兮新憂具一作備物森兮如在一作無改良辰闋兮莫留當赫曦之盛夏宛蕭瑟之窮秋山隱隱兮崩裂水洄洄兮逆流嗚呼哀哉掛旌旐於松煙即宮闈於夜泉下幽翳兮無日上穹窿兮葢天隧路嚴兮百靈拱殿垣虛兮萬國旋如有望而不至怨西陵之茫然嗚呼哀哉軼帝皇之高風兮欽文母之餘懿時來存乎立極數往歸乎配地何通變之有恒兮而始終之無愧惟聖慈之可法播徽音於後嗣嗚呼哀哉
