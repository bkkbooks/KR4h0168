front:
  text: 全唐文欽定全唐文卷七十八武宗三
  hash: sha256:eab3a32009180f2da699e7561de4dd2bcf1c581aa4691be17fac0616e37de8f1
body:
  text: 朕粵自藩邸來握乾符銜哀受遺當寧興感永惟我高祖太宗艱難創業其後列聖奕葉重光英睿相繼洎於先帝秉文之德光闡皇猷將洽理平甫臻仁壽顧豫沖昧叨承大統祗命若臨於泉谷思理未詳於政刑空懷濟物之心將纘巳成之業所尚者節儉所寶者忠良肆眚法解網之仁厚生敷流澤之惠上憑靈祉下便物情期中外以叶心冀遐邇而咸入爰遵典訓特沛鴻恩諒表政於惟新敢忘憂於馭朽可大赦天下自開成五年二月八日昧爽巳前大辟罪巳下罪無輕重咸赦除之惟十惡叛逆故殺人官典犯贓不在此限門下古之令主肇建皇極莫不嚴禋郊廟統和神人將以承上天之眷命告下土之率服恪有令典留為後法是以太陽施光調無私之臨照和風扇物樂有截之生靈明察為先誠敬攸屬斯道不遠宏之在豫朕以寡昧入奉丕構應三靈之協慶祗一德以咸美代邸樂推賴元臣忠力虞琴方鼓冀萬國歡心顧以涉道多闕惕若馭朽凜如蹈冰納隍勤誡勵之懷置器審安危之地苟一物失所時豫之深辜粵以獻歲吉辰禋祀上帝煙燎既達牲幣克修百神受職而敬恭六合承休而霈洽禮成而退慶孰大焉思與公卿大夫內外臣庶導迎善氣同我休嘉變生人之耳目振大化之綱紀立號垂統自中形外延八表之洪福敬五始之惟新事天之禮既因高以薦誠及物之恩宜順時以布澤可大赦天下改開成六年為會昌元年門下昔我高祖太宗始造區夏闢乾坤以覆載揭日月以照臨盛德耿光格於上下昊天有成命我二后受之列聖丕圖克大其緒文綏武靖奕葉連枝逮豫纘修罔敢失墜誠欲追蹤在昔貽範將來陶末俗於至和返大朴於巳散而道不足以居域中之大文不足以成天下之化恭己南面夙興夕惕遐思理古歉然於懷至於嗣歲豐穰寰海康靜祆沴滅息華夷大同茲實監祐自天匡救在下諒非己出安敢自多而三台百辟陳忠瀝懇加我大號其何以堪謂豫守文宜述先志抑而不行者三請確而不拔者羣誠豈貪在己之名姑念從人之欲祗膺典册良深惕勵於戲顏子匹夫也猶曰舜何人哉矧有其位行其教化而不思齊其道也尚念交修俾克用乂今維夏長養之時動植之物莫不自遂思有以導迎和氣生活吾人是用稽犧經之作解法虞書之肆赦推恩宥過思與同休可大赦天下自會昌二年四月二十三日昧爽巳前大辟罪巳下巳發覺未發覺巳結正未結正繫囚見徒罪無輕重咸赦除之惟犯十惡叛逆巳上故殺人及官典犯贓不在此限應左降官恩赦後未經量移者與量移近處丁憂去任服闋日亦與量移如準前制巳合量移有司未注擬者速與處分流人未到所在及巳到未經量移者並與量移近處僧尼道士移隸未經量移者亦與量移近處中外前資見任官頃因延纍未及用才并左降官中有事情可恕名迹素聞者宜委中書門下量加獎用勿使屈滯俗未臻於富庶念每切於黎元衣食寡充旰昃興歎百司田疇地有高低歲有善惡傷於水潦則低田不稔稍遇亢旱即高處無苗近聞州縣長吏掩其災損務求辦集惟於熟苗上加徵將填欠數致使黎元重困惠養全乖自今後州縣百姓有遭水旱苗稼不收處檢驗不虛便準前後敕文破免不得加徵熟田人戶令本配額外重出斛斗商通百貸士奉公程俾無行旅之虞在去萑蒲之聚應州郡連帶江湖常多寇盜結搆羣黨潛蓄弓劒殘害平人剽劫財物道途商賈常患不安方今海內無虞所宜普湊委諸道節度防禦使如界內帶江山淮海處切加警備仍差巡檢更於要害處加置軍鎮捉搦擇有機略軍將鎮守遊奕明立賞罰如能設計擒獲賊黨二十人巳上并獲贓物推問行劫蹤迹分明者量其功績節級優賞仍與遷職如界內有劫殺不能捉獲者亦節級重加懲責仍委出使郎官御史及所在巡檢院切加察訪不得更使因循邊戍禦扞戎夷士卒衣糧最為切事如聞逃亡浸廣營壘多虛又供給公私皆率官健妻孥困乏不免飢寒委本道節度使與監軍使躬親點閲據逃死欠闕人數便取軍中少壯有武藝子弟填替不得遣有虛名其見在將士衣糧皆須及時給付正身不得輒有減刻別將支用令其凍餒仍委出使郎官訪察聞奏有違當案覆科貶抑強扶弱實王道所先賦役以均則窮人靡怨度支鹽鐵戶部諸色所由茶油鹽商人準敕例條免戶內差役天下州縣豪宿之家皆名屬倉場鹽院以避徭役或有違犯條法州縣不敢追呼以此富屋皆趨幸門貧者偏當使役其中亦有影庇真偽難分自今巳後委本司條疏應屬三司及茶鹽商人各據所在場鹽正額人名牒報本貫州縣準敕文處分其茶鹽商仍定斤石多少以為限約其有冒名接腳短販零少者不在此限其小鋪所由主人牙郎火夫牛戶父兄子弟并在任州縣依例使例所冀勞逸稍均疲人蘇息給事郊廟之服奉繭稱絲之稅蠶桑是繫封植攸資宜設科條用絶違犯勤課種桑比有敕令每年奏聞如聞都不遵行恣為翦伐列於市肆鬻為柴薪州縣宜禁斷不得輒許更賣犯者科違敕罪理貴便人事存可久苟非托實則昧適時州府兩稅物斛斗每年各有定額徵科之日皆申省司除上供之外留後留州任於額內方圖給用縱有餘羡亦許州使留備水旱其留使錢物更令諸道分析破用去處所立文帳皆是搆虛文百姓墾田承前巳申頃畝及斛斗單數近年又令其人戶稅錢等第墾田水陸頃畝挾縣鄉分析徒為繁弊無益政途今年巳後並宜停送州縣攝官假名求食尚懷苟且不恤疲人其闕少官員處並委本州刺史於當州諸縣見任官中量間劇分配公事勾當如官員數少力實不逮處即於前資官中選擇清謹幹用者差攝不得取散試官充職制祿授田著於定制貪猾利己不修舊章應畿內在京百司職田方聞本地多被狡吏及豪強平直隱蔽回換遙指荒間塉薄田地即配與浮客佃食免被豪吏欺隱如或因循不存勾當官吏等必當節級處分使命經行供備夫役既隳額例事頗姦欺須議舉明以全物力江淮兩浙每驛供使水夫價錢舊例約十五千巳來使過元額須別供船夫近日相承取索無度從蘇常巳南每驛便供四十餘千或界內或四五驛往來須破四五百千宜依往例不得數外妄供如更有違長吏巳下節級書罪立政之本所務均平設法之源在絶僥幸京畿諸縣太常樂人及金吾角子皆是富饒之戶其數至多今一身屬太常金吾一門盡免雜差役今日巳後只放正身一人差使其家下並不在影庇限涉歷吏事蓋崇理本自因近制卻啓幸門太和九年十二月十八日敕進士初合格並令授諸州府參軍及緊縣簿尉未經兩考不許奏職蓋以科第之人必宏理化黎元之弊欲使諳詳非惟可塞幸門實亦用懲澆俗近者諸州長吏漸不遵承雖注縣僚多縻使職苟從知己不顧蒸人流例寖成侵費不少況去年選格更改新條許本郡奏官便當府充職一人從事兩請料錢虛占吏曹正員不親本任公事其進士宜至合選年諸道依資奏授州縣官即不在兼職之限武官選用本求才藝近日入仕多門虛偽轉甚就中兵部武選其弊尤深都無本根妄兼甲歷但求遷轉莫可討尋其武選且停見任武官即仰依前守職仍差官量與修甲歷得甲歷定然後許前資赴集輦轂之下諸色人中非吏非商間行遊手總名趁事潛得容姦自今後有自謀職任私用貨財詭計多端經過朝貴者委御史臺京兆府嚴加察訪捉搦畿甸賦繁園陵至重先事立制冀免虛勞親陵柏栽每歲添補約力計費役用至多歲久而不見其功人勞而未除其弊蓋由栽植動土須先奏聞待敕下有司及擇日到縣巳過期限豈盡施功空閲數以計傭皆朝種而夕朽自今巳後每至歲首委有司於正月二月三月八月四箇月內擇動土利便之日先下奉陵諸縣分明榜示百姓至時與設法栽植畢月縣司與守管使同點檢據數牒報與折本戶稅錢高秩峻級榮蔭子孫蓋寵勞能著存令式近者漸寡廉朴多補名身不獨假蔭近房兼有規求厚利選曹既闕磨勘長吏不聞糾繩此弊公行吏途太濫自今後並須準格用蔭人數年限不得逾越委吏部及御史臺嚴加覺察據其選授官到本道本州須審磨勘稍疑踰濫及察知冒賣資蔭便收禁牒報有司懋官述職禦侮申威暨於庶僚咸竭乃力峻其爵級以極封崇內外文武見任及致仕官三品巳上賜爵一級四品巳下加一階仍賜勳兩轉神策六軍金吾威遠皇城將士普恩之外各賜勳兩轉位列虞賓胄崇褒聖所以闡德教而昭前烈也二王三恪及文宣公各賜物五十匹二廣拱辰五營列衛明庭執玉航海會朝念申力以賞勞示懷柔而優寵神策及六軍金吾威遠皇城等諸軍將軍統軍巳下各賜物有差鴻臚禮賓院應在城內蕃客等并節級有賜物光贊典册發揮鴻名實賴重臣共揚休烈爰推恩以廣愛亦峻給以崇階攝侍中讀寶官中書侍郎平章事李紳攝中書令讀册官右僕射兼中書侍郎平章事崔珙各賜一子出身撰册文官司空兼門下侍郎平章事李德裕賜一子出身正員官奉寶綬官書玉册官書寶官各加兩階進寶綬進中嚴外辦禮儀贊導押寶册官各加一階其應職掌行事官三品及寫制官太常修儀注禮官并內行事官三品巳上賜爵一級四品巳下加一階仍并賜勳一轉鐫造寶册并填金字造寶裝玉册官各賜物五十段養老引年旌閭表行冀宏忠厚之俗以振節義之風天下百姓年九十巳上委所在長吏量加存問孝子順孫義夫節婦旌表門閭終身勿事先巳旌表者亦量加優恤降神表峻出寶應圖秩視公侯德禳災患式崇明祀咸薦吉蠲五嶽四瀆宜委本州長吏備禮致祭名山大川自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例奏聞敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行門下王者事帝必嚴禋祀之容臣下歸功爰極推崇之義既膺鴻號式展盛儀因時布和順歲更始前聖垂範後人是遵矧以眇身幸逢昌運雖履冰惟懼而涉道未周繄我輔臣洎茲列嶽內盡交修之志外分共理之憂乃者虜衆乖離部族欵附救帝子於氊裘之所致名王為冠帶之臣堅昆來朝不遠萬里夷貊嚮化克同九州重以上黨狂童竊襲叛迹問罪之師既集元凶之首遂梟廓清亂風洗滌汙俗翦逆辨而故都底定竄摩尼而壞法永除由是退惡進賢化行令舉刑姦贓之吏破黷貨之家此皆宗社降靈助成時政豈朕涼德獨擅厥功而中外誠臣文武多士纍陳懇疏再舉鴻名辭不獲從被此虛美是用虔告清廟明禋上元煙燎所升靈貺如答既展郊禮重申國經宜因行慶之辰誕布惟新之令同我景福永孚於休可大赦天下自會昌五年正月三日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不原者咸赦除之惟犯十惡反逆巳上及故殺人官典犯入己贓持仗行劫縱不殺人並不在免限左降官量移近處巳經量移者更與量移如巳在近處未復資者有司別條聞奏如復資者五品巳上中書門下速與處分六品巳下依常調選丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州府申請從九月二十九日降郊禮敕後流貶人不在此例兼比來與劉稹楊辨同謀惡逆配流及伏法身死有父兄子弟及諸親族等配流者並不在放還及量移之限別敕因責授降資正員官未經轉者量與進改亡官失爵放歸不齒者量加收敘縱元敕云終身不齒者亦量與收敘流人未到所在及巳到者並放還惟降死從流者與移近地如收敘者量才録用并僧尼道士移隸者亦放還其情狀難容者不在量移及放還之限得罪人巳亡歿家口未許歸者一切放歸如自情願住者亦任諸色得罪人中如先有敕云縱逢恩赦不在免限者并別敕安置者亦委中書門下量事狀輕重節級處分左降官及流人先有官者如巳亡歿各還本官流貶及諸色等罪人所有在任身亡任其親故收以歸葬仍仰州縣量給棺櫬優當發遣近年將相及任事之臣如因事貶降身巳淪沒情理屈者並量與追贈諸色人中有痕纍禁錮及逃匿者一切並與洗滌應昭義逆黨親族除巳處置外其他素不同謀者並一切不問常參官及諸色刺史先因停替及以病解免終制未授官者委中書門下量才進擬勿令稽遲國家與吐蕃甥舅之好彼此無虞自今後邊上不得受納投降人並擒捉生口功蓋本朝賞延後嗣是加恩禮用勸臣心故尚父汾陽王贈太師晟贈太尉秀實贈司徒顏杲卿贈太師顏真卿許遠張巡南霽雲子孫中未經甄獎者每家與一人出身耕桑豐約上應徵租泉貨輕重宜均物力丁徭若絶其影占組織又去其纖奇則農桑無荒女工斯勸京畿百姓應兩稅及青苗地頭納見錢等充給府縣官吏及諸色支用今天下諸州所納兩稅皆據分數納見錢除納省估匹段給用之日錢貨並行其京畿應納諸色錢等許納諸州及本土上色絹每匹與折八百文充官吏料錢及諸色給用京畿今年夏稅麥數內每斗放五勝京兆府諸縣應欠開成五年終巳前青苗榷酒秋夏品送府倉正稅地租百官職田資百姓種糧戶部和糴變色粟驛蓄科稈草麥屑䴬並放免畿內條稅百姓準元和二年八月二十五日敕及會昌元年正月九日赦節文計戶內丁數多少充諸司盡稱子弟致令鄉縣所由無人差役各委諸軍諸使司準前後敕文收補仍具姓名奏聞敕下京兆府重磨勘如有人戶違越妄託屬諸軍諸使不準敕文影占收補者並準前後敕文處分諸使諸軍諸司人在鄉村及坊市店舍經紀準前後赦文收與百姓一例差科不得妄有影占應屬官莊宅使司人戶在店內及店門外經紀求利承前不復隨百姓例差科者從今後並與諸軍諸使一例準百姓例供應差科畿內諸縣百姓租佃百官職田地訪聞其中有承虛名配佃多時縣司但據額徵收租子或無本地及被形勢莊園將塉薄田地回換令人戶虛頭納子歲月既久無因申明各委縣令子細磨勘別立簿書具明段四至申報仍委當司審闕一字勘會分析奏聞畿內諸縣鄉村及城內坊市人戶不是正額食糧官健及非工巧之徒假以他名諸司諸使影占納課其數至多各本司釐革凡是納課人戶並停解送歸本縣收入色役京畿內近日足陌用錢惟益富室匹帛苦賤反害疲人宜卻令依前行墊陌錢每墊八十文其公私交關五貫巳上令一半折用匹帛武功既暢經術是修宜闡儒風以宏教化應公卿百僚子弟及京畿內土人寄客修明經進士業者並隸名太學每一季一度據名籍分番於國子監試帖三度帖經全通者即是經藝巳熟向後更不用帖試如三度全不通及三度託事故不就試者便落下名籍至貢舉時不在送省之限其外寄居及土著人修進士明經業者並隸名所在官學仍委長吏於見任官及本土著學行人中選一人充試官亦委每季一試餘並準前處分如無經藝雖有文章不在送省之限所冀人皆嚮道學務通經職局官常各宜歸正詳刑決獄豈可容姦在京諸司典吏考滿合赴選者官成後皆作計勾留不肯赴任今日巳後官成後便勒赴任本司不至各令本司釐正不得奏請勾留如一年選不成者且勒依舊執行文案至二年選不成者勒停守選諸州府有遣攝官及職掌人推案刑獄比及刑部詳斷其間或節目不盡或豫奪用情將有勘尋便稱停罷向後諸州府推事並須差見任官仍在兩考內者其刑部大理法直並以明法出身人充據律巳去任者公罪流巳下勿論公罪之條情有輕重苟涉欺詐豈得勿論向後公罪有情狀難恕者並不在勿論之限上柱國前代烈勳謂之八柱品居第一宜峻寵章向後非特恩不在纍敘之限近日諸道奏官其數至廣非惟有侵選部實亦頗啓幸門向後淮南兩浙宣鄂洪潭荊襄等道並不得更有奏請其三川邊鎮河南北地遠官無選人肯去闕員稍多處即任量要切奏請仍每道一歲不得過七員應諸道軍將昨緣酬獎戰功多授正秩今日巳後非因戰功不得請正官其巳有正官者或因停替亦須待三五年後方得奏請比來山劒湖嶺間剌史多居周行散位日久而選縣佐率是諸曹胥徒年滿則授生人舒慘屬在此流朝廷典章罕能具舉自今巳後每除湖嶺山劒南間剌史取其流品稍高兼曾歷三四任巳上州官者如有政績委本道觀察使具以名聞其遠處縣邑多是中下縣其縣丞簿尉等例是入流令史苟求自利豈知官業其中下縣丞中縣簿等自今巳後有衣冠士流經業出身經五選如願授者每年便許吏部投牒依當選人例下文書磨勘注擬如到任清白幹能剌史申本道觀察使每年至終使司都為一狀申中書門下得替巳後許使上縣簿尉選數赴選與第二任好官三衙官中名本於宿衛當番就役其事甚徵疑每年兵部選時號為文合選之數全淺於明經齋郎注擬之時爭先於諸親宗子其於踰濫莫甚於斯入仕之門此途最弊自今巳後但令武其文並停宗子每因恩澤皆賜出身自幼授官多不求學未詳典法頗有愆違委宗正寺收補明經每年許參三十人出身同兩館例與補各搜圖籍精驗源流明為保舉不得容有踰濫仍一季一度試帖經餘並進士明經條例處分京師佛剎相望其數巳多既臨康莊足壯都邑近緣疏理僧尼訪聞大寺房院半巳空間其坊內小寺或産業素貧或殿宇摧毀僧數既少不足住持併合同居事從當委功德使條疏各具去著名額奏聞其所拆寺僧尼如行迹非違不守佛之禁戒者亦宜揀選勒令還俗仍依前敕處分兼具數聞奏其餘僧尼即令移入側近大寺有房院居住又京城諸市亦不盡有産業就中即有富寺今既疏理僧尼兼停修造所入厚利恐皆枉破委功德使檢責富寺邸店多處除計料供常住外賸者便勒貨賣不得廣占求利侵奪疲人所去不均之患冀合裒多之義又諸州府所申還俗僧尼巳有定額若無私度日當減耗諸道每至年終各具見在僧尼數申省其續有死亡及犯事還俗并分析申報本司磨勘奏聞如聞兩浙宣鄂潭洪福三川等道緣地稍僻姑務寬容僧尼之中尚多踰濫委長吏更加揀其有年少無戒行者雖先在保內亦須沙汰古者受祿之家食祿而巳不與人爭業然後利可均布人可家足如聞朝列衣冠或代承華胄或在清途私置質庫樓店與人爭利今日巳後並禁斷仍委御史臺察訪聞奏如聞兩川稅租盡納見錢蓋緣人多伎巧物皆纖麗凡所織作不任軍資所以人轉困窮俗增侈靡然以風土所習頓革稍難委剌史與縣令商量勸課有機杼之家依果閬州且織重絹仍與作三等估上估一貫一百下估九百待此法行後每年兩稅一半與折納重絹即冀人少蘇息軍用不虧或因宦遊遂輕土著戶籍既減征徭難均江淮客戶及逃移規避戶稅等人比來皆係兩稅並無差役或本州百姓子弟才霑一官及官滿後移住鄰州兼於諸軍諸使假職便稱衣冠戶廣置資産輸稅全輕便免諸色差役其本鄉家業漸自典賣以破戶籍所以正稅百姓日減州縣色役漸少從今巳後江淮百姓非前進士及登科有名聞者縱因官罷職居別州寄住亦不稱為衣冠戶其差科色役並同當處百姓流例處分除盜懲姦在去其枝葉校功責課必削其根本如聞江淮諸道私鹽賊盜多結羣黨兼持兵仗劫盜及販賣私鹽因緣便為大劫江賊有仗者雖未殺人不在該恩之限又逃還復業戶雖先有格令近來多因剌史縣令務虛名者招攜逃戶侵奪巳成産業轉令居者不安姦人得計苟求非時考課虛申招復逃亡及至定稅徵科依前逃散稅錢緣巳申省使即須攤配疲人從今巳後應諸州縣逃戶經二百日不歸復者其桑産居業便招收承佃戶輸納其逃戶縱歸復者不在論理之限其有稱未逃之時典貼錢數未當本價者便於所典買人戶下據戶加稅亦不在卻收索及徵錢之限義重維城慶流多葉敘睦之道寵渥惟宜中外羣僚文武多士或郊禋奉職或局署業官各洽恩波以類申典亞獻撫王紘等各賜物一百匹夾侍正衣進圭捧圭各賜物五十匹亞獻終獻正衣各賜物四十匹大長公主公主嗣王郡主縣主各有賜物內外文武見任及致仕官三品巳上賜爵一級四品巳下加一階合入三品五品欠考未合敘者待考足日聽敘孔氏行教折中於百王虞賓展敬不廢於千古敢怠咨稟爰用褒明文宣王之後及二王三恪與一子出身各賜物五十匹其祠廟委所司量加修飾堯稱睦族漢貴推恩在明廣敬之義式展奉親之孝太皇太后二等巳上親皇三等巳上親委中書門下各擇有才行者量與改官如無堪獎用者即不必與改皇五等巳下親及三品巳上賜爵一級五品巳上加一階六品巳下及前資常選散官選日優與處分應陪位皇五等巳上親及太皇太后皇太后三等巳上親三品巳上賜爵一級四品巳下加一階四等五等親并諸色陪位官五品巳上加一階六品巳下及白身並賜勳兩轉其前資及有出身各減一選前聖立言教人以孝慶覃存沒禮洽閨門俾奉高堂之榮用霑漏泉之澤常參官及諸州府長官父母見存未有官封者並量與三品致仕官及階并邑號如巳有官封者並量與進改如官巳至五品巳上者即與五品階父母巳歿未經追贈者量與贈官及邑號公台輔弼柱石列藩俾宏追飾之恩仍昭賞延之典加於存沒用洽寵章中書門下及節度使帶平章事者宜與一子正員八品官祖父母先亡歿各與追贈巳經贈者更與改贈破回鶻及攻討昭義立功節度使不帶平章事者及劉沔李思忠各與一子正員九品官節度使東都留守度支鹽鐵觀察處置諸防禦經略招討使及神策金吾六軍將大將軍威遠鎮國等使皇城留守各與一子出身父母先亡歿未經追贈者各與追贈禮儀使京兆尹各與一子出身寅奉典册肅恭明禋或勤贊相之義或專扈從之禮時當慶澤豈吝恩華應郊廟升壇升殿行事官普恩之外中書門下尚書省御史臺三品巳上特加一階四品巳下各賜一階如合入三品者量減三考入五品者量減二考仍待考足日聽敘其合選人與減一選內行事官三品巳上更賜爵一級四品巳下更加一階內侍省及內坊官四品巳上各賜勳五轉應從駕至郊廟者普恩之外三品巳上賜爵一級四品巳下各加一階白身賜勳兩轉攝侍中讀寶官攝中書令讀册官各賜一子出身撰册文官賜一子正員官奉册奉寶綬官書玉册官書寶官各加二階進寶綬進册進中嚴外辦禮儀贊導押册押寶綬舉舁寶册官各加一階合選人減一選其餘應職掌行事官及寫制書官太常修撰儀注禮官并內行事官三品巳上賜爵一級四品巳下加一階仍并賜勳一轉鐫造玉册并填金字造裝玉册官各賜物五十段禁營軍師信宿警衛宜頒慶賚以獎勳勞神策六軍威遠營左右金吾及皇城將士應緣大禮儀仗宿衛御樓立仗等普恩之外三品巳上賜爵一級四品巳下加一階仍準舊例賜物有差其神策將士應在京畿諸縣者亦各有賜應緣大禮職掌行事官并修撰儀注及留守副留守守倉庫卿等普恩之外三品巳上賜爵一級四品巳下各加一階梯航奔走慕化在庭藩嶽奏陳不虧奉職勤勞禁署巳積歲時鴻臚禮賓院應在城內蕃客等各有賜物諸道知上都進奏院官在城者各賜勳三轉應緣大禮四方進表疏及賀正官各賜勳三轉翰林待詔供奉并諸色直見任及前資并員外試官三品巳上賜爵一級四品巳下各加一階無官者賜勳兩轉祠薦展儀掌贊供事恪勤無怠甄獎宜申郊廟行事齋郎減兩年勞至室長掌座禮生贊者便放出身崇元館行事學生及齋郎禮生番考巳滿所司緣大禮卻追入行事各減一選國子監學生陪位者賜勳一轉中書門下專知儀制官各特加一階應緣祗供作官直司長上諸州行綱考典兩縣耆壽諸色番役當上在城并量留十二月番者各賜勳兩轉飛龍間廄宮苑典引掌扇內園總監栽接少府將作內中尚武德軍器內外弓箭庫等諸司諸使下白身及無品直司定額長上雜匠巧兒黃衣長上監門直長雜仗三衛七色引駕細引執扇手角手弩手纊騎武士天文觀生漏生典鼓典鐘工人樂人主衣主膳主酪典食胡食手宰手掌間幕士御士醫工獸醫門僕藥僮御書手楷書手典書外行署等各賜勳一轉耆老加惠著在前經節義所褒用明古道天下百姓年九十巳上委所在長吏以留州物量加存恤孝子順孫義夫節婦旌表門閭終身勿事先巳旌表者亦量加優恤公卿視秩靈瑞降祥生植所資導利庶物五嶽四瀆宜委本州府長吏備禮獻祭助宣和氣福我黎人將達精誠在嚴祀事名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具條例聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行維大唐會昌五年歲次乙丑十月乙亥朔十四日戊子仁聖文武章天成功神德明道大孝皇帝臣某謹稽首再拜虔誠上啓至真無極大道元始天尊太上大道玉晨君大聖祖高上大道金闕元元天皇大帝太上老君玉清大有天寶君上清元妙靈寶君太清太極神寶君三寶尊神三寶丈人元都紫微九天太帝君東華南極西靈北真四天君三十六天帝三十二天君十方靈寶至極天尊五老上帝三景君道德衆聖三元君太帝天帝天師君元洞至極明皇道君三十六部尊經元中大法師三光衆聖八景靈君三十六地嶽瀆正神河海川澤名洞靈山諸化福地得道神仙三界應感一切真靈臣聞萬化之初總之者妙道羣靈之表冠之者至真剖判元黃裁成品彙幽明既辨主宰有倫九皇司牧以無為八帝統臨而有度洎乎清源斯壅元澤不流舜禹違揖讓之風湯武起干戈之役禮樂隳於大朴俎豆矜其小成玉帛徒美於爭馳世道亦悲於交喪斯所謂時君忘本至理莫追悠悠含生步然何怙是知凝旒負扆非道無以寧至理垂裳非德無以立我國家元元錫祐仙李標華承德明興聖之基紹高祖太宗之業庭除六合簷廡九圍扇之以薰和沐之以渥澤致之以聲教正之以詩書惠露洽於幽陰百神咸秩仁照周於萌蘗大樂同和越二百年一臻於道顧惟涼德祗嗣洪圖思宏清淨之規以布寰瀛之福冥心丹屬想元經披太上九天之文得元洞生神之旨將膺寶籙首備齋壇錦幣華繒金龍白璧普萬天而展禮極三境而告虔所期肸蠁咸通昭彰會祉鶼林鰈水咸歸仁壽之鄉海外域中一變華胥之俗豈使燕昭臺上獨寧三素之雲漢武殿前嘗降九靈之駕蓋保綏於億兆非企慕於騫騰列聖衆真鑒茲沖懇謹遣道士東嶽先生修九天寶齋三日四夜稽首以聞謹詞
