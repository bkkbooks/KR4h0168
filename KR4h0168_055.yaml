front:
  text: 全唐文欽定全唐文卷五十五德宗六
  hash: sha256:e1be5edff510986009f8c81e7b7e410aaf2e9f9acf7e181c9fb1cadb2b7b04e7
body:
  text: 朕以菲薄託於王公之上恭承天地之序虔奉祖宗之訓遐想至理思臻太和而誠不感物化不柔遠聲教猶鬱征賦仍繁頃者務於安人不憚屈己與西蕃結好申以齊盟而戎心無厭背義虧信劫脅士庶屢犯封疆元元何辜皆朕之失乃者輦轂之下凶徒結構上帝垂祐悉自伏誅刑以止殺諒非獲巳今三陽布和萬物資始思與羣公兆庶惟新政理宜敷在宥之澤以覃作解之恩可大赦天下大辟罪巳下繫囚見徒常赦所不原者咸赦除之官吏犯贓不在免限流人配隸放還左降官量移近處巳經量移者更與量移百姓逋缺一切放免諸州遭水旱委長吏貸種子天下兩稅更審定等第仍加三年一定以為永式涇隴邠寧振武靈鹽夏銀官健常例之外每年加賜兩段軍州官吏寄客能務農業入粟助邊量其多少酬以官秩天下刺史與一子正員官戶口增加田疇廣闢者長吏加一階縣令減選優與處分額內官勿更注擬見任者三考勒停各官食錢所欲別置本宜令中書門下與百僚議可否奏京九品巳上官各上封事極言得失賢良方正直諫者高蹈不仕隱居巖穴孝弟力田聞於鄉里所在長官具名聞薦諸色官有清白政術堪任刺史縣令者常參官各舉所知朕當親自策試之諸軍立仗將士共賜物一萬匹陪位蕃客賜一千匹禮稱日至而郊詩美豐年之報然則迎日之始時莫大焉順成之祐慶莫重焉朕承天眷懷俾作神主朝夕砥礪日月永思惟人安化洽是勤惟歲稔時和是冀上靈降鑒豐祉聿臻展禮郊丘申大報之義祗禋宗廟極追孝之誠四海具瞻百神咸秩古者凡有大澤必與天下樂之慶賜遂行無思不備內外文武及致仕官並諸將士等三品巳上賜爵一級四品巳下加一階宰相及東都留守六軍統軍諸道節度神策神威金吾六軍及都團練防禦觀察使京兆河南尹正員尚書御史臺長官太常卿各與一子官大禮行事官各加一階立仗將士及守本營者共賜物十八萬端匹故尚父子儀與一子五品正員官如巳五品巳上量與改轉贈太尉秀實與一子官張巡許遠南霽雲顏真卿顏杲卿各與一子正員官天下見禁囚徒罪至流死者各遞減一等徒罪巳下一切放免左降官經三考流人配隸效力之類經三周年者普與量移近日州縣官吏專殺立威杖或踰制自今巳後有責情決罰致死者宜令本道觀察使具事繇聞奏並申報刑部御史臺吐蕃比虧信約自絶通和邊鎮之閒事資備禦因其犯邊纍獻俘囚既切懷歸之心復加幽縶之苦永言覆育豈閒華夷應所獲吐蕃生口見在者一切放歸本國仍並遣人送至界首量事資遣使得自全應諸道自艱難巳來戰陳喪歿及荒凶死亡骸骨暴露者長吏各令收瘞奠酹守宰之任弊在數更自今刺史縣令以四考為限嗚呼朕獲主圭壁十有二年於茲天地明察罔敢不祗一日萬幾罔敢不慎遷己之過庶無心致人之安實有明志夫祀之馨香在德天之視聽在人惟命不常聖有謨訓慶感既集於茲日警厲方戒於將來冀勉增修聿懷多福凡百有司所宜同之朕以寡德祗膺天命勵精理道十有五年夙夜惟寅罔敢自逸小大之務莫不祗勤皇靈顧懷宗社垂祐年穀豐阜荒服會同遠至邇安中外咸若永惟多祜實荷元休是用虔奉禮章躬薦郊廟克展因心之敬獲申報本之誠慶感茲深怵惕惟厲可大赦天下自貞元九年十一月十日昧爽巳前大辟罪咸赦除之左降官及流人並量移近處內外文武見任及致仕官並諸軍諸使將士等三品巳上賜爵一級四品巳下加一階將士白身者賜勳兩轉緣大禮職掌行軍法駕南郊後留守副守及太倉左藏庫及陪位官等三品巳上更賜爵一級四品巳下加一階其郊壇宮廟行事官仍各賜勳兩轉皇親應陪位者三品巳上賜爵一級四品巳下加一階及諸色應陪位官等各賜勳兩轉親王大長公主長公主嗣王郡縣主酅公介公鴻臚蕃客神策神威六軍及諸使應緣大禮宿衛御樓立仗及守本軍本營者諸道節度在京帖仗將士賜物有差宰輔及在方鎮者祖父各與追贈東京留守諸軍節度觀察都防禦都團練經略鹽鐵轉運使左右神策神威六軍等統軍大將軍英武威遠軍使戶部侍郎判度支及京文武三品巳上正員官尚書省四品官中書門下省御史臺五品官父在未有官者量授檢校官巳有官者加一階母在未有邑號者授邑號巳有邑號者更進邑號父母亡歿者各與追贈應諸軍防秋兵馬使及別敕定名充邊地兵馬使等備禦勤勞所宜優異其父在未有官者各授檢校官母在未有邑號者各授邑號邊軍鎮守及諸道諸軍防秋將士經三周年未改轉者宜與甄敘其九廟配享功臣封爵廢絶者宜令紹封以享祀故尚父子儀太尉秀實宜與一子六品正員官天下有才德高遠為衆所知及隱遁邱園不求聞達者委所在州府長吏具名迹聞薦諸色人中有賢良方正能直言極諫或博通墳典達於教化或詳明政術可以理人者委常參官及州府長吏各舉所知聞奏朕當親自策試諸司官有陳時政得失各盡所見條流封進人有冤滯事有闕遺悉當極言無所隱避臣性本凡愚識無久遠夙承訓誨未達禮經俾踐元良是輕主鬯顧惟孱懦何以克堪然臣頃總戎麾恭憑睿略在臣何力妄欲貪天且五帝三王立嗣殊制王者家天下以傳子帝者官天下以傳賢胡有居五帝之時行三王之禮臣雖不敏竊謂非宜乃知古之正統不以年樹後不以嫡明矣若以臣居嫡而廢德在長而捨賢恐大道淳風隱而不見伏以天下之公器不可虛涉宗廟之宏綱不可輕舉伏惟陛下敦三善之本審萬國之貞不可以私授為心但可以推賢為慮則陛下享唐虞之德臣蒙伯邑之名乞回聖慈俯寢恩命大朴既散有為遂作名利牽乎伐巧智喪乎真愛惡攻乎性情因緣堅其染習內則百慮無節外則六根競誘天理滅而莫知道源迷而忘返淪溺苦海劫盡還初惟至人了萬物之宗越三界之表廓獨立而不改遍諸有而常然故能開導羣疑濟拔流品六波羅密多經者衆法之津梁度門之圓極也昔日月燈明如來為菩薩說歷劫曠遠真偈寂寥文殊師利於耆闍會中嘗與彌勒菩薩語及其事成一切種智會無量義因唯佛能知惟佛能說教必有主其在茲乎是以釋迦如來為法而生俟時而現三身不異故處代而常離萬行無修故隨方而自在運慈悲之力開攝護之門因其六塵示之六度導於法分令證法身結習紛綸乘理而悟是真般若之旨也故有慈氏善問大音讃言天垂寶華雲集仙蓋甘露流液光明燭幽使迷方淺深皆得自然之慧恆沙億衆能通般若之知嘗試論之先儒有言誠者自成而道自道也夫誠己於內則不勉而中不思而得誠物於外則不言而應不為而成其內者證法之身其外者大悲之力德産之致也密化育之功也大春風發吹萬類咸滋旭日升晝羣陰盡釋乾坤易之道是則大同神明幽贊之情孰云區別殊塗一致其理固然朕虔奉丕圖保乂蒸庶思建皇極以升大猷遐想靈蹤期於叶契而舍城妙說久祕梵文徒懷瀉瓶未啓遺夾微言不昧將或起豫於是罽賓沙門般若受旨宣揚光宅沙門利言為之翻譯時大德則資聖寺道液醴泉寺超悟慈恩寺應真莊嚴寺圓照光宅寺道岸西明寺圓照䛒空良秀等法門領袖人中龍象證明正義輝潤元文知釋迦之寶城識衆尊之滿字以貞元四年歲次戊辰十二月二十八日於西明寺譯成上進凡一部十卷龍神翼衛如從金口之傳梵衆護持無異毫光之現朕齊心滌慮仰味宗源聞所未聞實為希有然以汲引之旨流布為先庶憑真詮永濟浮俗聊因暇日三復斯經雖法海甚深而波流不讓舉其梗概昭悟將來朕以南面勵精理道雖及和平之濟未臻元古之風夙夜孜孜勤求不怠夫安人以正輔政以刑蓋為之立中非使人從欲也是以務兼聽以酌羣情擇庶官以資共理恆勉不足而遏其過我欲仁矣尚逮夫意哉然萬務是殷必戒其失聽政之暇常志所存聊綴斯文庶乎自警爾大朴既散利欲是生惟辟御時建極作程導以仁政齊以典刑惠此下人致之和平立政伊何必循道德詳刑伊何必去煩刻不以人從欲不以枉傷直故百度惟貞萬物作式匪陽不生匪陰不成寬則致慢猛亦取怨酌於大猷戒厥偏見罔咈人志罔興人患邇言必察芻蕘必詢奉無私之心以誠其意廣無情之聽思得其真喜怒有節措置有倫是以令肅如秋化行如春無邇憸人無信側言憸人則敗政側言乃惑聽罔攻異端慎乃出令知人不易在觀其行事實求理法乃因時法非生斃聖哲不為導物類之情以通其變相天地之道咸盡其宜教必明於順動必慮於違是以天覆之德日用不知六馬並馳在鈞銜策五音並奏在理金石苟去回邪可行蠻貊因人而理自古不易唐堯赭服夏禹泣辜以弼於理冀遷其愚寧漏吞舟豈求噬膚陷之於過是曰毒痡天監孔明無臭無聲罔載而僞必先爾誠蟻壤不防太山可傾患生所忽禍起所輕故作事謀始而戒於未形豫臨兆人道存化育祗荷元貺幸清九服闕若履深谷思正其源庶登於朴監於往躅書以自勗夫惟德惠人惟辟奉天從諫則聖共理惟賢皇立有極駿命不易總萬機以成務齊六合之殊致一心不能獨鑑一目不能周視敷求哲人式序在位於戲君之任臣必求一德臣之事君咸思正直何啓沃之所宜自古今而未得且以讜言者逆耳讒諛者伺側故下情未通而上聽巳惑俾夫忠賢敗於凶慝譬彼輕舟蒸徒楫之亦有和羹宰夫膳之孰云理國不自得師覆車之軌豫其懲而高以下升和由甘受惟君無良亦臣之咎聞諸辛毗牽裾魏后則有禽息竭忠碎首勉思獻替以平可否勿謂無傷自微而彰勿謂何害積小成大事有隱而必見令既出而焉悔鼓鐘在宮聲聞於外浩然涉水朕未有艾將負扆以虛心期盡忠而納誨在昔稷契實匡舜禹近茲魏徵佑我文祖君臣協德混一區宇肆豫寡昧獲纘丕緒臣哉鄰哉爾翼爾輔高秋始肅我武維揚輟此禁衛殿於大邦戀闕方甚嘉言乃昌是規是諫金玉其相辭高理要入德知方總彼千慮備於八章宣父有言起豫者商殷有盤銘周有欹器或誡以辭或警以事披圖演義發於爾志與金鏡而高懸將座右而同置人皆有初鮮慎厥終汝其夙夜期保朕躬無曰爾身在外而爾誠不通一言之應千里攸同導彼遐俗達豫四聰華夷仰德時乃之功既往既來懷賢忡忡唱豫和汝式示深衷朕每覽上古之書及唐虞之際君臣相得聖賢同時日夕孜孜講論治道或陳其鑒誡諷以歌詠煥乎典謨百代是式有以見啓沃之道理化之端意甚慕之而未能逮也頃靈鹽節度使杜希全著書上獻多所規諫聊為君臣針用答其意河東等道副元帥司徒燧固請勒石貽厥後人朕以文既非工義又未備垂諸後裔良所恧焉起豫者商因之有作庶乎朝夕自警且俾後代知我文武殿邦之臣歟宸扆銘天生蒸人性命元淳嗜欲交馳利害糾紛無主乃亂樹之以君九域茫茫萬情紜紜目不備覩耳不備聞覩之聞之矧又非真事失其源道遠莫親理得其要化行如神失源維何不自正身正身之方先誠其意罔縱爾欲罔載爾僞體道崇德本仁率義必信若寒暑無私象天地感而遂通百慮一致任人之術各當其器捨短從長理無求備事多總集衆才咸遂知而必任任而勿二以天下之目為鑒我鑒斯明以天下之心為謀我謀則智求賢惟廣辨理惟精逆耳咈心必嘉乃誠順旨苟容亦察其情斥去奸諛全固忠貞先人立言為代作程諤諤者昌唯唯者傾繫以興亡曷云其輕承天子人夫豈不貴伊昔哲王夙夜祗畏馭朽為戒納隍為志神將害盈天匪假易四海為家夫豈不富伊昔哲王勤儉固陋土階罔飾露臺罷構遠奇技淫巧放珍禽異獸敬之慎之天其永佑欲令必行順人之情欲誠必著清己之慮心無億詐事必忠恕凡將有為靡不三思喜怒以節動靜以時毫釐或差禍福亦隨慢易厥初悔其曷追刑不可長武不可恃作威逞勢厲階斯起垂旒蔽明黈纊塞耳含宏光大是以為美覆之如天愛之如子仁心感人率土自理嗟豫寡昧嗣守丕圖寇戎薦興德化未孚大業兢兢其敢以渝俯察物情仰稽典謨作戒斯言置於坐隅台衡銘天列台星垂象於人聖人則天亦建輔臣以翼以弼為衡為鈞如耳目應心如股肱運身是則同體孰云非親陰陽相推四序成歲君臣相得萬邦作乂感同風雲合若符契以道匡救盡規獻替木必從繩金其作礪帝者之盛時維陶唐乃聞疇咨側陋明揚洎乎有虞二八騰芳爰逮伊尹相於成湯載生姜牙涼彼武王道無不行謀無不臧君聖臣賢運泰時康漢高既興蕭曹亦彰烈烈我祖應期而昌剗滅羣凶砥平四方維衛及英啓闢封疆曰房與杜振理維綱亦有魏徵忠謇昂昂偉茲衆材為國棟梁蕩蕩巍巍邦家有光是知道之興廢係於時主主之得失資於台輔經之以文緯之以武出為方召入為申甫絶維載張闕衮斯補惟德是依惟才是求人不易知德亦難周傅說版築夷吾射鉤任之不疑千載垂休體於至公何鄙何讎追維哲王必賴良弼矧豫不德昧於理術師旅繁起政刑多失遘茲艱屯夙夜祗栗翊我戴我實維勳賢內熙庶績外繼十連威武載揚謀猷日宣長城壓境巨艦濟川同心同德持危扶顛豫嘉爾誠爾相豫理惟后失道亦臣之恥自昔格言慎終如始功藏鼎彞道冠圖史無俾伊傅克專厥美作鑒勒銘永世是紀立人之道曰君與臣為臣之義曰忠與節忠莫極於衛國節莫大於忘身存其誠德貫乎天地致其功用施於社稷獨斷剿凶慝之命沈謀安宇宙之危其智勇足以拯時其義烈足以宏教非昊穹錫慶敷佑皇家重振紀綱再激汙俗何遘迍之會而獲見斯人開府儀同三司檢校禮部尚書兼司農卿上柱國張掖郡王段氏名秀實字成公應期降生扶翼唐祚稟陰陽之粹氣備剛柔之全德體正明道從時卷舒蓄為淳和發為功烈朕宅帝位之五載孟冬十月賊臣朱泚反天悖人因時多虞乘我無備誘聚叛卒作亂於京師朕深惟罪己之誡遠遵避狄之義駕自中禁狩於近坰賊陰謀為奸陽言示順以公嘗任涇帥素得士心採諸衆情引以自助公感時悲憤思定大業謂復國安人由己不可以顧私謂開物變化在權不可以虛死略匹夫之褊介蘊曠代之宏規內貞其心外混其跡且探察元惡情狀將因而圖之賊果不疑委以心腹遽發凶黨謀襲我師公詭說以詞止之不可乃竊取官印假為兵符急追寇軍不遠而復銷禍紓難陰陽若神於時物情危疑忠邪莫判卒乘未輯軍旅未完微公之謀吾幾蔑濟既而密結勇敢誓殲寇讎決策剋期中外發應會賊泚召公計事引入閣中露其姦情言及僭竊公氣填胸臆植髮衝冠仰天大呼元鑒何昧孰為臣子而忍是心語未絶音奮笏前擊凶徒敗面既躓而奔左右愕然初未敢動繼者不至事遂無成逆徒交鋒因而遇害嗟乎天生萬物惟人最靈稟元氣之精鍾五行之秀是宜守正居順移孝資忠君君臣臣父父子子各履於達道同臻於太和天乎不融生彼狂悖神乎不惠喪我忠貞靜言思之輟饋忘寐詳求其理抑有以焉茲朕不明敗德招損故列聖垂祐警戒於豫則泚之亂所以懲既往勗將來禮教陵夷風俗訛弊故上帝元鑒聳動於人則段公之死所以勵當今傳不朽也訪彼前史稽諸昔賢全大節者不必成功建大功者或未立節非節不可以裨教非功不可以持危義實相須事難並備吉甫以文武翼周室宣王中興絳侯以智謀安劉氏文皇紹立茂功著矣而節未可稱董卓脅國以擅威伍孚刺之而不畏王敦擁衆以稱亂周顗折之而無疑奇節偉矣而功竟不就至若屈伸合變進退知機智以遂其謀勇以決其死功與時並節與名偕中古巳還無公儔比貞烈之至通於神明桀驁聞之而動心仇讎感之而不怨死於義而義著忘其家而家全行路興悲懦夫增氣矧豫之慟其可弭忘且人之所愛者身也國之所重者位也公能殺身徇國朕得不以重位報之哉乃詔有司冊贈太尉諡曰忠烈賜實封五百戶莊宅各一所嗣子授三品正員官諸子各授五品正員官表其閭里護其喪葬官立祠宇史載忠勳哀榮之典備矣君臣之義極矣公始以天寶四載奮筆從戎才為時生官為才達得司馬戰陳之法參將軍帷幄之籌纍典方州更踐臺寺出擁旌節入為卿士位歷十七歲踰三紀封王列於異姓開府比於台司參職六官食賦百室言不伐善慮常下人恆持順信之規罔居疑悔之地利刃在手投節皆虛貞松有心老而彌徑吞大憝於方寸之內定危疑於晷刻之閒力可屈而志不可遷身可殺而節不可奪所謂有始有卒為臣之極致者歟日月有期宅兆云畢身歿功在凜然如山勒銘傳芳終古不滅以志吾過且旌善人銘曰浩浩上天四序唯均氣或堙鬱過為災氛否不可終必復元亨洗以膏雨播之祥雲濟濟蒸人五常是則時或迍難乃生凶慝亂必有定允歸皇極極以茂勳輔之明德勳德克崇茲惟段公實天降靈寧保朕躬日月蔽虧宇宙昏蒙冏然明識獨誓深忠豺狼為羣斤斤逞志咆哮奔突乘我未備公飛尺符橫制醜類變化若神邦家不墜元惡大憝誘姦作狂竊器僭名反易天常公獨挺身奮擊暴強烈烈英武歿而彌彰義振名教功存社稷贈極上台賞延真食省咎祗畏懷賢憫惻刻銘豐碑昭示萬國天有柱以正其傾地有維以紐其絶皇王有輔佐以濟其艱難非命歷所歸不得生良弼非君臣相合不能集大勳非暴亂宏多不足表忠節非奸猾熾焰不克展雄才天與事肆會然後臣功著而王業興焉高祖太宗拓跡垂統掃乾坤之沴氣拯生靈之塗炭其受命也正其布澤也寬六宗丕承克廣前烈雖遇屯否化危成安二百年閒五夷大難由內以正宸極者再自外而復都邑者三山嶽降神雲龍叶契繼生賢哲保定邦家神龍中諸武擅權惎閒王室則有若扶陽王彥範等推戴中宗紹復洪業景龍末嬖韋窺國瀆紊乾綱則有若徐國公幽求等左右元宗掃除凶穢天寶之季盜起幽陵翠華南征潼關不守廣德之際戎軼邠郊皇輿東巡酆官罷警則有若尚父子儀等殄殪醜逆冊肅宗於岐攘却蕃夷翊代宗於陝建中四祀寇發上京暴蔑人神僭稱名器則有若西平王晟等翦滅大憝廓清中區惟茲數公異時同德道濟於社稷勳書於鼎彞唐之得人於斯為盛東渭橋抵王城東北四十里而國之廩積在焉始晟於此駐孤軍糾羣帥俟時而動一舉成功豫是用揚其美而紀其功以明事之有因謀之有素也粵若菲德嗣膺大寶化乖柔遠明不燭幽淮右賊臣提兵犯順憑陵汝服震壓洛師朕憫將吏之受汙哀蒸黎之無訴罔思衛己姑務靖人亟發禁師東征不軌猶慮勝敵之未勇乃徵涇師以繼之賊泚畜姦覷隙乘便餌誘貪卒扇結暴徒伺其不虞譟聚犯闕朕引咎出次薄犯二畿封豕長蛇穴處宮廟磨牙噴毒噬螫害人晟時總偏師遠戍河朔曾不俟召聞難駿奔鼓義勇仗順之師吞敗亡稔惡之寇雄威勝勢疾若飈馳屬賊帥昏迷恃衆貪亂誘我蟊賊連謀內逼朝廷載遷關河長擾豺狼塞路羿澆爭驅人烟絶於井邑陰燐交於田野物情大駭蕩然靡依晟乃設會軍門哭而誓衆國讎不滅無以身為遂發感激嗚咽流涕天地為之變色將帥為之動心軍中較然知有逆順晟乃度公積計私課程賞典定刑章行令自身録功先下由是勇者奮力智者效謀其氣增倍其心如一屹立堅壁於渭之陽姦逆畏威而震懾忠義奮氣而聳慕分二凶之勢不敢相附為諸鎮之援俾得自堅晟之力也二月守暨乎夏五月晟知衆心可用乃揀日饗士乙未陳師於東郊如虎如貔如熊如羆凶徒接戰纍合皆北倒戈棄甲罔敵我師乘而殪之摩壘而止戊戌方旭連營進攻賊衆相驚股戰魄駭登陳而不敢拒闔門而不敢窺晟仗鉞啓行執桴親鼓敜隍塹排牆垣勝氣兆於風雲威聲振於原野指顧摧靡蕩無孑遺布朝旨以寬脅從勵臣節以誅同惡乾軸傾而復紐皇維弛而更張遷梟聲為好音變祆祲為和氣然後間戎律釐軍容不喧不譁有嚴有翼搜苑囿殄遺寇清宮門授彼有司宣言於衆曰恭行天討將以遏亂略去人害王師所至歌舞從之其或矜勇恃勳作威肆掠是則以暴易暴夫何賴焉懋功有恆賞違禁有常罰惟國之令典不得以贖論敢犯令者殺之無捨爰擇便地引軍出屯馬無錯羣士必成列剋敵彌日都人莫知徐命有地之官同諭廠墨里士庶聞巨猾之殲殄而我師闕壺觴犒軍如恐不及者若赤子之保慈母涸鱗之赴洪波或欣而呼或感而泣吾是以知烈祖積德人懷其深賢臣佐時功濟斯美晟有興運之略有匪躬之誠有定亂之勳有禁暴之德俾豫從乂垂拱仰成乃冊拜司徒兼中書令加實封一千戶録功第一序位居首事業編乎史冊德輝流乎頌聲入為夔龍出作方召贊贊徽烈中外具瞻而晟居高牧卑辭滿守約崇讓而勳閥彌耀惡盈而福祿攸歸斯又明哲之規慎終如始者也夫制敵在謀不在衆感人以義不以威當天地屯蒙邦家離析援孤者踣黨勝者強羣心囂囂靡所止戾若風動中野波騰滄溟從而拯之豈易為力於時馬不滿百駟兵不盈萬人無郡邑土田之資無城池險阻之固獨立不懼氣吞羣凶以盡忠誓心以必死勵己以大順率衆以至誠動天衆心攸同天意允答故措軍散地而不可拔致討勍寇而力有餘國危能安軍勝能整古所謂衛社稷者晟其當之播揚休風篆刻貞石俾厥後嗣無忘乃功銘曰赫矣我唐受天眷命祖功宗德浸澤儲慶窮海請吏遐荒稟令寧一九服惠康萬姓三五以還莫之與盛逮豫不類辱守丕圖燭理匪時立誠未孚蠢爾孽臣扇茲潰徒震驚朕師黷穢皇都宇宙沸騰人神睢盱重以統戎誘姦同貫播遷斯載歲聿云半未既悔禍人胥厭亂乃錫元臣夷凶翦叛昏祲茫茫橫流湯湯挺然孤軍在渭之陽我城非完恃順為防我旅非衆同心為強由義率人人皆嚮方萬事如一爭先啓行拗憤求逞蓄威斯張力足勢全時惟鷹揚以戰則克以謀則臧指麾之閒羣醜潛亡鯨鯢既平宮室既清軍伍無聲都人不驚成功禁暴自昔稀有實天生德彰於厥後洋洋令名茲為不朽闕西川節度大使檢校司徒兼中書令上柱國南康郡王韋皋紀功碑銘并序闕以陰陽闕忠賢作弼宣翼贊之力用能致闕則孰闕柔之略致恢復之勳者焉闕祖太宗受闕握乾符以垂統廓宇宙而貞觀盛德被於闕宗重光克闕庭禦大災清大難佐闕閒生才賢斯實我闕垂佑闕謀猷仗忠義之臣以闕鎮乃命左金吾大將軍韋闕而有謀闕集闕其鎮撫之宜至則宣闕朝旨揚國威仁義服闕足廾纎闕之闕人知國家有安撫之闕矣雲南昔在漢為西域郡闕龍闕大定區夏闕來朝獻開元中詔以蒙闕為雲南王天寶巂州將軍善能闕西川其孫闕歸內附朕嘉其誠節懿闕時值搶攘而心不變易乃闕為司空而九土以平契闕五教以敷蕭何漕運不乏而闕籌帷幄闕朕深惟德化之未遠風闕憫此元元以圖無疆之休闕於闕以一旅之師闕一闕之闕徒外牧黎庶一時闕然闕謹財賦以豐其用故得闕欲來遠人之貢賦闕言前事符響應闕雲南闕以致遐邇尊王之闕為純臣輸賝委贄稽顙闕德以闕則闕代之賢忠良之佐闕豈虛也哉昔秦漢或闕面非闕謂闕皋一心奉國百闕義之忱集邦家之闕能制闕復王闕建闕言而理此皋之忠勳斯闕檢校司徒兼中闕等使宜闕書蓋詳諸家諜矣茲所闕茂勳紀威績刻闕臣其詞曰闕鴻烈尊主以忠持危以節闕時之傑我有闕惟闕遐闕及此小康實扙忠賢撫綏闕吾事惟臣闕西闕惟一闕前聞異時同致保族承家闕苟能建績功曰不朽闕忠之闕文武之全才道闕實維時傑純誠闕於闕宜刻金石用表忠勳闕股肱闕念忠賢存於夢寐闕諒當體豫闕帝諱誦德宗長子上元二年生始封宣城郡王大歷十四年六月進封宣王十二月立為皇太子貞元二十一年正月即位七月以疾令皇太子監國八月傳位皇太子元和元年正月上尊號曰應乾聖壽太上皇是月崩年四十六諡曰至德大聖大安孝皇帝廟號順宗大中三年加諡至德宏道大聖大安孝皇帝宰相之職寅亮緝熙導陰陽之和贊天地之化裁成百揆總領庶官非道契時中識通理本則何以敷暢皇極阜安羣黎朕以眇身嗣守丕業思立人紀以承天休其代豫言允屬良弼朝議郎守吏部郎中騎都尉賜緋魚袋韋執誼孝友忠肅自誠而明茂實本於宗師英華發於事業久參內署動直靜專纍踐中臺職修事舉克有公望冠於羣倫以豫沖人恭默思道是用命爾納誨弼違必能行四方之風成天下之務祗服乃職厥惟欽哉可守尚書左丞同中書門下平章事賜紫金魚袋周制國用委於冢卿漢調軍食資於相府必由中以制外則政一而事行所以阜安兆人平均九賦弼成富庶之教馴致雍熙之化實仗兀老佐豫經邦銀青光祿大夫檢校司空同中書門下侍郎平章事充太清宮使上柱國扶風郡開國公食邑三千戶杜佑體資易直德合宏大事君以道修己以誠寅亮先朝毗贊盛業秉忠直之大節備文武之全才保乂朕躬載申啓沃發揮政本開導化源謨明緝熙三事允理必能綜領經制變而通之權貨幣之宜成軍國之務外均庶土內贍中邦俾豫一人恭己而理宏敷五典式協於中可檢校司徒充度支及諸道鹽鐵轉運等使依前同中書門下平章事太清宮使散官餘如故主者施行門下肇自周漢至於國朝莫不建立親賢以為藩衛擇茲賢哲撫鎮北門舉是彞章式協公議撫王紘智量端平體識沈遠育德早聞於詩禮成器可比於圭璋居然岐嶷之姿雅有信厚之譽是宜獎其令美授以旌旄況全晉雄藩興王故地屏護狄塞統制甲兵撫循繄將領之才居守藉公侯之重一昨師徒擾叛帥令不遵用爾遙臨以綏其衆爾宜持嚴而務恕約法而推誠戒之慎之載揚丕績可開府儀同三司充河東節度觀察處置等使兼太原尹北都留守封如故主者施行王者嗣統必上尊祖廟中立人紀下及孫謀所以光贊鴻猷發揮大典者也皇太子大男寧等溫敏茂淑依仁游藝齠齔之歲自降其心詩書之言夙盈於耳朕初建儲兩永固宗祧既當知子之明彌稱抱孫之慰是用依方建邑籍土疏疆俾奉邦家式崇藩屏本支百代冀邁於周詩子弟畢封更高於漢室於戲承紫極之慶稟青宮之訓惟師友是敬惟忠孝是憑以樂善為心好賢為德古有成範爾其欽哉門下古之命將帥修封疆在於整軍非以耀武故繕理亭障訓齊車徒以申國威以固王略非誠節茂著無以分統六師非勳績彰明無以並護諸將副茲重任實在忠賢特進檢校右僕射右金吾衛大將軍充右街使成紀男范希朝有貞臣之節有良將之風識達武經學綜兵要臨事能斷好謀而成嘗領元戎鎮於朔野控河上之塞拒漢南之庭修其政刑諭以威德士吏向化裔夷綏懷入覲京師策勳王府洎司警衛禁旅增嚴直道彌彰嘉庸益茂固可以總統北落節制西陲成魏絳和戎之勳振朝錯備邊之策俾異俗率化穡人成功師乘以和烽無警懋建丕績時乃之休可開府儀同三司檢校左僕射兼右神策軍京西諸城鎮行營兵馬節度使如故輔弼股肱之臣所與共成天功左右邦理者也朕承至尊之重居羣后之上夙興寅畏不敢康寧思所以統天人之和彰祖宗之烈以行四方之政以遂萬物之宜敷求哲人以輔台德銀青光祿大夫守太常卿充禮儀使上柱國鄭縣開國公杜黃裳宏深易資博厚之德朝議郎檢校左散騎常侍兼左金吾大將軍充左街使雲騎尉賜紫金魚袋袁滋沖茂精微體誠明之性咸以器業閎茂服在大僚祗事先朝克荷休命識達道奧文為國經固可以儀刑具僚參綜庶務寅亮天下毗豫一人罔不同心以輔乃辟黃裳可門下侍郎平章事滋可中書侍郎平章事朕承天眷命獲主兆人思致雍熙用康區夏布和緝化屬在輔臣所謂適宜實為通典銀青光祿大夫守吏部尚書平章事上柱國鄭珣瑜銀青光祿大夫守刑部尚書平章事上柱國高郢等咸以忠靖纍更班列秉彞廉慎植操貞常自參輔中樞皆能勵節祗勤庶務夙夜惟寅歲月滋深嬰纏疾恙衮職有闕無以彌綸況銓綜為選士之本刑法乃生人之命俾從專掌以盡至公宜輟台司副豫所委珣瑜可吏部尚書郢可刑部尚書王者之制子弟畢封所以固藩輔而重社稷古今之通義也第十弟諤等寬忠厚生知孝敬行皆由禮志不違仁樂善本於性情好賢宗於師傅朕承天之序稽古展親宜舉徽章俾開土宇第十弟諤封欽王第十一弟諴封珍王男建康郡王渙封郯王改名經洋川郡王沔封均王改名緯臨淮郡王洵封淑王改名縱宏農郡王浼封莒王改名紓漢東郡王泳封密王改名綢晉陵郡王湜封郇王改名綜高平郡王淑封邵王改名約雲安郡王滋封宋王改名結宣城郡王淮封冀王改名絿德陽郡王湑封和王改名綺河東郡王浥封福王改名綰洛交郡王況封珍王改名繕第十三男絢封衡王十四男纁封會王十七男紘封撫王十八男緄封嶽王十九男紳封袁王二十男綸封桂王二十一男綽封翼王朕君臨寰海子育兆人思欲阜其財求俾遂生殖然後導之以禮樂齊之以政刑興廉讓之風洽和平之理而比聞官司之內尚有逋懸每念黎蒸用深憂軫永言勤恤宜有蠲除其莊宅使從興元元年至貞元二十年十月三十日巳前畿內及諸州府莊宅店鋪車坊園磑零地等所有百姓及諸色人應缺租課斛㪷見錢絁絲草等共五十二萬餘並放免朕方與人休息致之富壽物有不得其所事有可利於人寤寐求思豫無所愛宜加曉示令悉朕懷朕承九聖之烈荷萬邦之重顧以寡德涉道未明虔恭畏懼不克祗荷常恐上墜祖宗之訓下貽卿士之憂夙夜祗勤如臨淵谷而積疢未復至於經時怡神保和嘗所不暇永惟四方之大萬物之殷不躬不親慮有曠廢加以山陵有日霖潦踰旬是用警於朕心思答天戒其軍國政事宜權令皇太子純勾當百辟羣后中外庶僚悉心輔翼同砥於理宣布朕意咸所知聞朕聞生死者物之大歸修短者人之常分古先哲王明於至道莫不知其終以存義順其變以節哀故存者不至於傷生逝者不至於甚痛謂之達理以貫通喪頃在弱齡即敦清淨逮於近歲又嬰沈痼嘗亦親政益倦於勤以皇帝天資仁孝日躋聖敬爰釋重負委之康濟而能內睦於九族外勤於萬幾問寢益嚴視膳無曠推此至德以安庶邦朕之知子無愧天下今厥疾大漸不寤不興付託得人顧復何恨四海兆庶亦奚所哀但聖人大孝存乎善繼樞機之重軍國之殷纘而承之不可暫闕以日易月抑惟舊章皇帝宜三日而聽政十三日小祥二十五日大祥二十七日釋服方鎮牧嶽不得離任赴哀天下吏人誥至後出臨三日皆釋服無禁嫁娶祠祀飲酒食肉宮中當臨者朝晡各十五舉音非臨時禁無得擅哭釋服之後無禁舉樂他不載誥中皆以類從事伏以崇陵仙寢復土才旋甸邑疲人休功未幾今又重勞營奉朕所哀矜況漢魏二文皆著遺令永言景行常志夙心其山陵制度務從儉約並不得金銀錦綵為飾朕寢疾歲久以至彌留醫藥伎術之人夙夜無懈念其盡瘁頗謂極誠必在優容務令得所百辟卿士宣力盡忠克申送往之哀宜展事居之禮布告天下明知朕懷朕以寡昧嗣膺大業永惟列祖之德肅奉山園之重夕惕若厲懼有缺遺賴一二元臣公卿庶士叶乃心力克申典禮今九虞既畢永慕惟深爰奉疇勞之義差其異數之命山陵使杜佑若子若孫與一人五品正員官禮儀使杜黃裳特加一階與一子六品官副使李鄘按行山陵地副使李扞賜一級各與一子官鹵簿使鄭雲達與一子出身儀仗使舁梓宮官各賜爵一階邑爵掌優賜有差三京元高陵高陽縣人夫寒凍近道鄰村坊市屋宇什物田苗被毀損並近陵百姓偏有使役委京兆府勘覆聞奏挽郎挽士量加優恤甸內百姓奉山陵秋冬滯雨供應疲弊所配折納和糴並停維貞元二十一年歲次乙酉四月庚子朔九日戊申皇帝若曰建儲二者必歸於上嗣固邦本者允屬於元良咨爾元子廣陵郡王純幼挺岐嶷長標恂淑佩詩禮之明訓稟忠孝之宏規居常保謙動必循道識達刑政器含溫文愛敬奉於君親仁德聞於兆庶神祗龜筮罔不協從是用命爾為皇太子於戲惟我烈祖之有天下也功格於上帝祚流於無窮光纘洪緒逮豫十葉虔恭寅畏日慎一日付爾以承祧之重勵爾以主鬯之勤以貞萬國之心以揚三善之德爾其尊師重傅親賢遠佞非道勿履非禮勿行對越天地之耿光丕承祖宗之休烈可不慎歟維永貞元年歲次乙酉八月丁酉朔九日乙巳太上皇若曰咨爾皇太子純惟皇上帝降休於我家用集大命克綏厥猷惟后祗率大典茲惟艱哉朕承纍聖休德膺守邦之重不蒙天佑降疾在躬上不能昭事郊丘祗見烈祖下不能臨視庶政保綏兆人是用命爾當位嗣統宜陟元后代豫憂勤今遣使檢校司徒平章事杜佑副使門下侍郎平章事杜黃裳持節冊命於戲爾有光大之德敷於萬邦爾有仁孝之誠刑於九族慈和寬克享天心元符不可以固違明命不可以不畏爾惟察納忠直子惠困窮咨於正言慎乃儉德臨庶官以敬哀庶獄以情允執其中無忝我祖宗之丕訓朕纂承天序嗣守鴻業以不敏不明託於萬國兆人之上永惟高祖太宗肇造區夏列聖休德洽於人心肆惟寡昧膺受多福大懼不克負荷為宗廟羞若涉大川罔知攸濟思與羣公卿士方伯連帥祗若丕訓惟懷永圖內熙庶績外宏至化以弼豫理臻於大中俾懷生之類各遂其性咸得自新導迎休和蕩滌瑕纍可大赦天下自貞元二十一年二月二十四日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不原者咸赦除之左降官量移近處如復資者任依常調赴選如有親故在上都任於所司陳狀便與處分別敕因責授降資正員官者亦與追改亡官失爵放歸不齒者量加收敘流人放還僧尼道士移隸者罪人巳亡歿家口未許歸者一切放歸如自情願住者勿抑令歸如先有敕云縱逢恩赦不在放還之限者及別敕安置者並宜放還其安置之人五品巳上奏待進止左降官及流人亡歿有官者各還本官今日巳前痕纍禁錮及反逆緣坐一切並與洗滌應緣山陵制度及喪儀禮物博詢可否務遵禮度必誠必信副朕衷懷橋道置頓並以內庫錢充諸有費用先給工價仍以見錢更不折物不得輒令科配天下百姓應缺貞元二十一年二月三十日巳前榷酒及兩稅錢物諸色逋懸一物巳上一切放免京畿諸縣應今年秋夏青苗錢並宜放免天下諸州府應須夫役車牛驢馬腳價之類並以兩稅錢自備不得別有科配仍並依兩稅元敕處分仍永為常式不得擅有諸色榷稅常貢外不得別進錢物金銀器皿奇文異錦雕文刻鏤之類若已發在路者並納左藏庫清淨者理國之本恭儉者修己之端朕臨御萬邦方宏此道苟可濟物豫何愛焉宮掖之中宜先省約其後宮細人子弟音聲人等並宜放歸親族應緣宮市並出正文帖仍依時價買賣不得侵擾百姓所緣宮中要妳母並取食糧戶充稅不得科配寺觀諸軍先擒吐蕃生口配在諸處者宜資給放還本國天下官吏應行鞭捶本罪不致死者假以責情致令殞斃每念致此良增惻然宜切加察訪內外文武見任及致仕官並諸道將士等賜爵加階賜勳有差二王三恪褒聖侯各與一子官大長公主嗣王等各與一子官及出身有差宗子中有才用者委宗正卿以名聞量才敘用皇五等巳上親賜爵加階有差陪位者年十五巳上並放出身武德巳來配享功臣及張巡許遠南霽雲顏杲卿顏真卿等子孫中各與一人正員官故尚父子儀贈太師晟太尉秀實子孫中各與一人正員五品官及諸州府長官及京常參官父見在未有官者並與五品致仕官及階父歿母存者與邑號父母亡歿量與追贈陝州元從寶應功臣興元元從奉天定難功臣賜爵勳有差亡歿者與追贈中書門下節度使東都留守度支鹽鐵等使京兆尹觀察招討等使及神策神威金吾六軍將軍大將軍英武威遠鎮國軍使隴右經略軍使節度留後各與一子官有差其神策神威六軍將軍大將軍英武軍等使並與加官神策神威六軍英武威遠營左右金吾及皇城將士及緣御樓立仗將士等賜物及爵階有差應東宮官及侍讀侍書教授在正月二十六日巳前者國初巳來職掌行事及冊命官授顧命撰制詔修冊文並寫制詔官等賜爵加階勳進改有差蕃官等共賜物一千八百七十匹義武軍節度使下官健在城立仗共賜物三千八百四十五匹立仗將士將量加改轉內侍省及內坊宮正諸道進奏院及奏事官賜爵階勳有差內外五品巳上文官及臺省常參官宜至四考滿與改轉中外遞遷量才敘用其中政績尤異須甄升者不在此限常參官及諸州刺史有先得替及假百日經喪去官未授官者並即與進擬百司及在城諸司息利本錢徵放多年積成深弊內外官科錢職田等厚薄不均兩稅及諸色榷稅錢物重輕須有損益並宜委中書門下與逐司商量具利害條件以聞不得擅有閉糴禁錢務令通濟諸色人中有才識兼茂明於體用者經術精深可為師法者達於吏理可使從政者宜委常參官各舉所知其在外者長吏宜精加訪擇具以名聞仍優禮發遣朕當詢事考言審其才實如無人論薦者即任自詣闕應內外官及諸色人任上封事極言時政得失有可觀者別當甄獎百姓九十巳上版授及賜各有差仍令官吏就家存問順孫孝子義夫節婦旌表門閭重加優恤
