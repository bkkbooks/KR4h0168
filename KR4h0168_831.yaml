front:
  text: 全唐文欽定全唐文卷八百三十一珝字瑞文徽之子起之孫唐末官知制誥進中書舍人梁門平初貶撫州司馬卒
  hash: sha256:528eb95beb806831e025a2fc7bf982e9e95babc34fce1229edc14be43324fe35
  markers:
  - {type: head, offset: 14, content: 錢珝, id: KR4h0168_NFKB_831-h1, level: 1}
body:
  text: 維年月日皇帝若曰我國家作法於仁達情以禮振典謨而誕告載名器以公行何嘗不重懷多難豐報丕烈矧乃圖先廟社允集王功誠動日星必承天祐王功建而臣節盡天祐至而君命宜昔經武為師賜履荷宗周之寵今在邦稱傑剖符受全楚之封英偉自侔古今同典當勳而舉非我有私具官某博厚自持堅剛不惑抱公能察守貴必恭鶱然飛行之風增彼懦夫之氣而先臣奇備間代雄材圯上視書太公來受雲中饗士李牧復生出鞏洛以行師轉淮沂而殄寇倬哉茂績興在後昆爾乃開國象賢勤王繼志諒因心而無改敬遺體以有為英簜既臨文茵是籍率乎㣥后自絶他時控彼諸戎不連右臂日者毆除大盜爰復神州焜耀元功載書盟府以啓紹開之慶是資戡定之勞而伏念先朝薦罹否運朱玫則罪極邊伯李熅則親非子頽肆其樹置之謀黷我纘承之統是以奮飛長檄條列本枝遏濟惡之亂流披崇姦之僭黨夷凶有力賀福無違近則王行瑜驕以叛恩顛將敗族爾乃先知塗地每恥同天顧刑憲之可加抗封章而不避潛思歃血憤欲寢皮而逆豎犯闕興兵朕方奔車出次始懷愧懼未暇翦除行瑜轉禍終迷干誅罔畏螫手而不能自斷噬臍而誰復與論爾聞難成憂直躬決策衝冠激怒折箠興言龔行已勵於五申急召寧煩於二節武剛夙駕屈産跳驅存誠而有禮則安舉事而不疑何卜乃聲鐘鼓乃合諸侯留屯雖在於郊圻宿飽匪勞於漕挽爾臨渭曲深溝而親拒寇讐我復鎬京高枕而無虞侵軼然後進攻外壘盡復強軍支翦喉舂如麻滿野或反袂以來獻俾噍類之不遺元惡出奔勢窮就戮廓清而罷約束尚嚴受降兼讓於使臣擇帥請行於國命一如紀律以報會盟天贊孔昭主憂盡釋始未見若之面今盡見若之心神聽斯言衆圖是賞畫雲臺而莫顯篆樂石而非多師氏建官位惟極致春秋列國晉實大名典重而近古不行勳盛而豫衷何愛廣廷備物且授詞臣法座臨軒式光體命今致遣中書舍人薛廷圭册爾為太師兼中書令仍進封晉王於戲獨立王功忠乃善藏之府永膺天祐敬惟能保之軀則必慶於而家樂於而土戒之勿息與國無窮敕具官裴廷裕國之用材在乎稱職況詞臣之任君命所垂苟詳慎之有乖繫事機而實重既聞輿論得以移官以爾學植素深文鋒甚鋭自居侍從亦謂勤勞乃推遊刃之功庶叶匿瑕之道未能降秩且復立朝珥貂猶假於寵光夾乘仍親於左右將存大體以息多言可依前件敕西省設官之重實代吾言故修禁之章漏泄居其首而稽緩次之受選者率用靖默專敏之士然後為得具官盧光啓勵精不怠處默有倫定志而靜專其謀好古而敏求其要總是四善謹於一心則攻學典文嘗試之於禁闥矣能於散地自安素風不去乃資公論復典訓辭夫入官惟勤執事惟敬苟視禁以無犯則立身而有章行之克終利亦焉往可依前件敕遷不欲速則人將競遷而不安其職也掌誥故事多用外郎歲滿而升乃正郎位歲又滿始得其秩所以持重官次展張辭業有毛羽者不亦樂於翺翔乎具官王巨敏於內而秀於外其發也為文章棲於禁垣奮以健筆若夫規格罔有輕浮試之三年未嘗亂日且聞講學必務本根今掌誥再遷一如故事論諸遊官於爾甚優兼佩金章俾光飛步自茲而往厥路彌高敬而行之何患不到可依前件敕某官某夫舉典申命以進退在位之士而指其否臧兼警百職者本乎聖人之法言也法言之不為浮言而已知言之士過實必羞因使出辭當能近法巨積中有美欲昧而彰永惟季父令名常恐所承不似百川學海進則至焉吾欲激而成之是以擢居禁省往司明誥罔畔法言至不漏不踰茲為能矣可依前件敕具官顏蕘等昔太師魯公拘在寇廷渠魁有危迫之問對以諸侯朝覲之禮奮發直言不屈端凝守正而歿理命之戒家廟為先賢哉巨人可謂忠而知禮矣今蕘行高學茂洪緒有承因太師之所為遂以禮曹郎命爾用昭遺德且勉令修德璘合矩中規擅髦彥之稱渥端居慎守積監視之勞擢為諫臣實就近列使吾聞過繫爾當官無或面從以墜其職可依前件敕具官韋序等近朝賢相名卿以貞重簡潔益大其門者序則承之故華選陟居昭其嗣也爾復稟粹揚清不汙不屈播在公論使我思聞其或風法名家巨宗稍替溪則飾身而進志欲與為一羅等疑謨久為羈滯仍嘉好學俾列近班夫箋奏所司典章誠重而昭嗣之選大不在辭廷諍之臣惟直是舉欲與之志官以道彰華選近班各詳茲訓可依前件敕具官崔居邈等郎署之選優諫臣之選重必用門子以清朝倫居邈願而自求以守名卿之嗣建學而不倦能從長者之言聞其退居皆已甚久苟無甄擢何為搜揚可依前件敕具官李漸等朕常推感寤之意闢艱難之途實務塞違用昭致理爾等或奕代之盛風聲有傳強以自圖守若不墜或從學之道外直固在中慎無揣我之情然後舉職從諫則聖吾詎無心於此哉可依前件敕執事近臣上無不可敬時一作持文墨而分禁職者又加等焉蓋咨訪之勤密期宏益訓詞之暇必進語言思引君當道之心乃多士以寧之本則授禁職之選被加等之私安可徒任筆端然後為得具官韓偓動人之行率性自強慎獨不渝考祥甚遠資以講學見於文章惟是求已之多播於㣥譽矣朕初嗣丕業擢升諫曹繼陳言辭罔不摩切雖公賞曾光於赤紙而直誠尚記於皂囊愈聞勵修宜列左右故命爾之誥以詩人孟子之説為端者茲不有賴於侍從乎可依前件敕文也者性之表也積中為性發外為文冠乎妙用之先繫彼化成之大而文之雅奧本具典謨所以教誥萬方昭明百度代我而作求之必公具官張元晏嘗聞薦紳論者多以爾儒行踐修出言之章能顧於是聚問之學斯不為人乃知發外之文實自積中之性吾越在關輔不遑燕居大盜未屠蒸人且墜謂引過則責躬必至謂伐叛則用武方勞爾其據體會機翦煩總要而復念害成於垂誡安假寵以自圖勿使詞臣不當朝選可依前件敕朕常考易象否泰之説詩人雨雪之作知君子消長之際繫王者政理之端矧乃大宥已行衆纍皆滌非其罪者敬以命之具官劉崇望吉德在躬明誠格物辭倡寡和自合正聲昭兆先知宜居前列朕初繼大統方求國楨侍從之臣論思在爾代言之下宏道良多察其寬裕之姿授以弼諧之任恢張大體師法碩人以掩細過為所能以觀故事為所樂頃因讒慝偶惑聽聞害賢曾置於典章尚德敢忘於覺寤顧直書之史册何損於明還暫免之冠緌且復其所流澤而余心未足經邦而卿位乃虛來整軒裳再提衡鏡山公密啓更廣規模楚客騷辭休勞諷諭勉居會府以率六卿可依前件敕周之九法歷代用焉進賢興功以分厥職故夏官之重高位久虛則有嘗秉化權方臨邦教惟人之命我不敢私俾正衣冠用光表著具官陸扆貌先恭肅氣實清明言欲訥於否臧德有容於醉飽中出而靜可謂達於樂乎外作而文所以深於禮也頃以宏博奉吾論思繼令祖之典謨去邪辭之枝葉洎當大用且屬多虞執政雖新犯顏已急我則有違蹇叔爾詎不如王陵剖竹遂行伏蒲未足還好爵而來惟辨色掩間門而退乃韜光考之中庸有以自得往次六卿之首無輕一等之遷進賢興功必在敦故可依前件敕具官趙昌翰國之舊章繫會府者僅什六七坐曹郎見墜不舉焉用官為而善最之法所墜尤重非精材強力安能舉之昌翰以名家子實自修整為縣罷去翛然自安公卿有知已之門車馬無致身之迹善養材用益聞精強是以考績處之且欲明試於爾噫擇名曹置名士吾不知設官之始獨為人乎如或深思必將召寵可依前件敕具官李巨川夫強學者始自為已移於事人君齊美儒闕先登志士之場優入㣥書之域中權之佐前著實高多務講論直歸翼戴爾所自比我能知之推共奬王室之心慕不以兵車之力文翰之樂迅捷若飛雖觀者已煩而作者甚暇陪臣盡善賢帥盛稱上既策勳下難遺賞且升郎位誠守茲任為豫簡稽苟能修明旋議超陟可權知尚書兵部郎中餘如故且升郎位句下文苑英華一作如事所知理在庶官勉興墜典常聞好古當念陟明可依前件敕具官崔貽孫冠族以德範遺後昆者剛鯁清素代稱爾家又能樹立本根嗣守風法為士之道自求必聞故朝缺美官人思公舉今丞相以版賦之重用爾為佐理之才更遷右曹往事吾相無謂司貨籍者近乎俗吏而忽於躬親使滋其煩弊也可依前件敕國家之設公器也君將揭而與之者必問於朝皆曰可與則徇公況御史中丞持天下所共之法等乎庶尹重有加焉乃詔名卿來承俊選具官薛昭緯吾閲元和遺事嘉爾祖執憲之能軌躅可尋風聲自在美延後嗣克奉貽謀爾又歷落開懷精明照物好讓不惑寡過自強出典誥而理勝辭豐第甲乙而以文兼行且屬多梗使於列藩與諸侯言繫安危事自肺腸而到社稷激意氣而誘公忠選無虛褒言有清論皆入吾耳盡知乃心宜正衣冠立為繩準將分厥職惟聽茲言夫太剛太柔不折則廢作之可久必在居中爾當率寮屬以講求振綱條而審固與其就名而生事未若審實以業官勉思勤行無害有益可依前件敕具官鄭黃庭法者治之具也以人就之則得其所理矣而執法之吏剛失入虐柔失入懦有善執者惟居其中今御史中丞歸昌以贊二之闕推擇斯難舉爾之書稱善頗至亦聞爾端肅詳慎能理其身移之當官信可陳力夫理之不勝吏實相循處剛與柔期於無失審固在已遵行有章克念居中斯為善執可依前件敕御史中丞光逢以望執憲縉紳間咸觀其初故選薦府僚審而後定以爾學文惟博藏器則深正道甚夷有進不競其守則峻其用必通斯可正秋曹郎率白簡吏二綱紀之服執而整墮矣古皇之庭實生屈軼安得今之服冕不若其古者之為草乎官有舊章爾當明舉可依前件敕九卿間重而顯者大宗正卿與廷尉實次奉常焉易官而處惟典之章具官遜等皆吾屬之楨幹也而又荷出相戟之門遜繼分郡符必聞其政久歷庶位咸稱有材克助承忠孝之家踐修罔墜多所該練揚於縉紳今載葺京師敬先宗廟資乎集事速以成功而方備法官是宜改秩往趨急務更在厲精伏念旬時獄可知也我有具律遜其盡心可依前件敕具官韋師貞國朝考課之法有三善者升上下籍師貞強仕之歲繼為字養糾率之官三善之名四書於籍校諸能事不亦多乎歷年且深為吏斯得慰茲班白宜有陟遷夫辨酒必良視牲不瘠祭祀之事繫爾所司往為列卿勉戒㣥吏可依前件敕具官王鄯等稱職之吏無所陟明則陳力者之志怠矣爾自居官次必公為先若恥告勞但思責實頃者乘諸軺傳使彼海濱善徵榷酤之名允集鹹鹺之利往不廢命還可程功是用進爾於朝且升卿列宜奉警巡之事如專行役之心克念不渝後寵當至可依前件敕具官賈渭等渭比以學文通經之勤而不得志於壯歲束帶入仕今至九卿紱冕既崇光陰云晚詔之就列以慰其心方吏術甚長免官仍久暮齒已踰於月制下僚尚歎於陸沉置之不遷君道何在往作亞尹錫之金章亦有以嘉於老者矣可依前件敕暢中發外以應天地之和在夫樂而六樂雅司於奉常絃工磬師存者尚習具官崔就負足用之學表之以能文思有畔之農施之於善政失爵之纍無機則然乃非敗名人亦觀過一眚之黜數歲方還言念常情得無所鬱遂以奉常之亞命服之朝欲爾聽六樂之和以平其氣茲為君道當識豫心馭貴之崇亦惟其舊可依前件敕具官任蕖丞相進人之請吾嘗觀其所陳或舉淹滯或稱才用有一於此未嘗不行今言爾在公實踰四紀同塗之吏達者固多立事之心老而不已俾越下僚之次以寬暮齒之憂可依前件敕具官楊玢士子由科而進得為館殿吏者俯視華資如拾地芥然而道不益固名不益彰則朝之華資其可俯視而拾之哉玢質秀氣實自立頗強窺其所為誠在於道固名彰之本也今既列書殿仍懷令圖奚患華資不能俯拾可依前件敕右武以來國子失教聖域何遠儒風寖衰今朕考元龜備法駕言旋京師有日矣姑欲開六學之署以教諸生而張吾理道之本思得通四術者以蒞厥職具官李涪以爾受爵素高去朝斯久奉車親重乃以太僕命之宗籍宿儒時謂非稱擢居雅秩幸得其人以爾蘊學之優當吾選求之要勉來分職昭我用才可依前件敕昔孟明視荀林父之為將也獲罪於二君或敗以見囚或歸而請死彼秦穆晉景之為君卒能宥而復用朕雖涼德寧昧於諸侯之霸者哉具官滿存頃列將壇頗懷臣節且聞禁暴斯有功能未嘗驕矜欲保勳績而爾之前事人亦公言幸無爭歃之盟但逼自焚之勢洎乎連坐得以惟輕懼罪而不懈於心補過而願陳其力是用徵為環尹兼復疏封載加論道之名俾重棄瑕之典庶乎有位知我念功敕環衛之設貴同命卿有以大將軍之名加其秩者賞典彌重具官蓋寓凡天下統帥將佐勤勞每至賞勳鮮當仗鉞吾以克用事君有偉節匡國有大功而寓預謀必忠推誠必順致我藩后光於册書是以特越舊章授之師律頗能謙讓復願改張得不表以寵休陟居戎列仍遂再三之請俾圖始卒之心直舉訓辭是為嘉善敕具官李鎔等大將軍之設有以總勳翊折衝之屬者有以司禁衛門籍之法者非嚴謹恭願不可輒居以鎔處交戟之門有勳可庇嚴而能謹蓋稟於家以繼美當銜珠之名有勇可使恭而且願復秉於心咸以美材俾遷上列兼秩之寵勸善並行
