front:
  text: 全唐文欽定全唐文卷二百四十二嶠字巨山趙州贊皇人舉進士纍遷麟臺少監聖歷初同鳳閣鸞臺平章事轉成均祭酒罷知政事檢校文昌左丞長安三年復以本官平章事中宗朝封贊皇縣公拜中書令加修文館大學士進封趙國公元宗踐位以中宗時嶠密表相王諸子勿留京師下制放斥尋起為盧州別駕卒年七十
  hash: sha256:f409c1ba2322c97b0317ab9b545a15fb1f4acb9fd85ad390933222b2e046a8ce
  markers:
  - {type: head, offset: 14, content: 李嶠(一), id: KR4h0168_NFKB_242-h1, level: 1}
body:
  text: 序曰登高能賦謂感物造端者也夫情以物感而心由目暢非歷覽無以寄杼軸之懷非高遠無以開沈鬱之緒是以騷人發興於臨水柱史詮妙於登臺不其然歟蓋人稟性情是生哀樂思必深而深必怨望必遠而遠必傷千里開年且悲春目一葉早落足動秋襟坦蕩忘情臨大川而永息憂喜在色陟崇岡以纍嘆故惜逝慜時思深之怨也搖情蕩慮望遠之傷也傷則感遙而悼近怨則戀始而悲終達節宏人且猶軫念苦心志士其能遣懷是知青山之上每多惆悵之客白蘋之野斯見不平之人良有以也余少歷艱虞晚就推擇揚子甘泉之歲潘生秋興之年曾無侍從之榮顧有池籠之嘆而行藏莫寄心跡罕并歲月推遷志事遼落棲遑卑辱之地窘束文墨之閒以此為心心可知矣縣北有山者即禹貢所謂岐東之荊也岧嶢高敞可以遠望余簿領之暇蓋嘗遊斯俯鏡八川周睇萬里悠悠失鄉縣處處盡雲煙不知悲之所集也歲聿云暮遊子多懷援筆慨然遂為賦云爾眇乎忽然高山之顛露團團而濕草風烈烈而鳴泉對蒼茫之寒日聽蕭瑟之悲蟬廓獨處而無晤吾凝睇乎八埏於是繁懷載紆積慮未豁生遠情於地表起遙恨於天末霜盡川長雲平野濶恨遊襟之浩蕩憤羇怨之忉怛寂焉長想倏若有亡固將言而已歎信無哀而自傷撫余情之增軫悼人事之多戚曾浮促之幾何而思緒之纏邈思何憂而不入心何慮而不攢雖感目之一致終寄懷而百端若乃平原杳兮千里春晴山沓兮萬里新迷故鄉之處所滅愛舊之聲塵願寄言而靡託思假翼而無因徒極睇而盡思終夭性而傷神或復天高朔漠氣冷河關漢塞鴻度吳宮燕還對落葉之驅壽怨浮雲之慘顏爾乃永眺無見端居不聊音留愴歸軒之寂寂傷遠客之悠悠月臨城曉風送邊秋唳鶴聞兮炯不寐凝笳動兮此夜愁及夫寒野蕭條空山寂寥目鄢郢而途眇指邯鄲而路遙傷永離兮浦曲決遠送兮河橋眺平蕪之漫漫瞻遠樹之迢迢仡然直視嗌兮魂銷形將槁木同植心與飛蓬共飄至如隴上從軍漢疑陽謫戍插羽朝急要鞭夜赴黯黯塞雲蒼蒼關樹甘埋影於異域暫回首於歸路魂逝兮邑里目斷兮煙霧步將前而復留望欲罷而還顧覩驚塵之歘起見征羽之將度泉石愴而增咽行旅悲而失措亦有搗衣思婦織錦佳人看粉黛兮無色視桃李兮非春君去兮還無期妾心兮私自悲高臺四望杳無極天涯一去何盡時天涯兮帛丿糸帛丿糸問道路兮將幾千朝朝暮暮綺窗前長懷此恨終永年若夫羇旅失職之人放逐流離之客羌抱恨而誰訴塊緘愁而不釋於是窮澤際天滄流拂漢屬榮悴兮時改遇炎涼兮節換莫不瞻草木而孤絶向風煙而永歎故夫望之為體也使人慘悽伊鬱惆悵不平興發思慮震蕩心靈其始也罔兮若有求而不致也悵乎若有待而不至也悠悠揚揚似出天壤而步雲莊逡逡巡巡若失其守而忘其真㣥感方興衆念始并既情招而思引亦目受而心傾浩兮漫兮終逾遠兮肆兮流兮宕不返兮然後精回魄亂神苶志否憂憤總集莫能自止雖剛悍武力之夫法度禮容之士孰不解威失毅廢綱遺紀借使據河負海牛山之美可遊左江右湖京臺之樂難忘闕邈千秋金石悲兮綺羅傷顧山川以永慨邀山月而詎央乃若羊公愴惻於峴山孔宣憫然於曲阜王生臨遠而沮氣顏子登高而白首惟夫作聖明哲寬和敦厚亦復怛色愀容喪精虧壽故望之感人深矣而人之激情至矣必也念終懷始感往悲來㳂未形而至造思繫無而生哀此歡娛者所以易情而慨慷達識者所以凝慮而徘徊者也鸞臺文昌右司郎中于惟謙局量宏深理識精遠幹能兼備詞學並優會府提綱雖佇才用鎖闥待問更資宏益宜登侍從之職以光清切之署可朝請大夫守給事中鸞臺朝散大夫行太子舍人劉如玉朝散大夫檢校麟臺著作佐郎崔融等並言芳蘭芷行溫圭璧或譽美銅樓或名高石室記言之重選衆尤難宜收博辨之才俾居良史之任並可行右史散官如故敕朝散大夫行通事舍人員外置同正員楊泚肅承簪笏頗著聲芳趨奉軒墀兼效勤恪宜加恩命俾從優獎可檢校通事舍人散官如故鸞臺天作機衡實惟北斗朕之喉舌其在南宮揆德而居非才莫可新除司府卿上柱國芮國公豆盧欽望踐仁履義抱質含文出蒞藩條具聞威惠入為朝諫多所宏益立身必由於清謹處職無廢於忠勤外府國泉雖藉幹用中臺天憲更資明允宜膺尚德之舉令踐詰奸之位可銀青光祿大夫守秋官尚書勳封如故主者施行鸞臺事典職隆禮闈望切自非明德莫允具瞻具官建昌郡王攸寧道臻八元名高兩獻行兼為善業茂多才待問七車屢聞獻替參司百揆多所宏益頃以牙璋首路羽檄乘邊委以樽俎之謀藉其股肱之用而卑以自牧成而不居固守鳴謙願辭劇職重違雅志用成其美宜遷九法之司回典百工之任可冬官尚書封如故鸞臺參二百揆樞衡九法是司邦政尤切帝難具官唐奉一宇量深明襟懷雅正文場得雋翰苑推工瑣闈內朝致延譽之美圭符出守樹威恩之績永言禁暴事切安人俾升五戎之府佇諧九流之選可夏官侍郎鸞臺朝散大夫行尚方監丞崔元暐理懷沈正文藝優深內府策名已馳聲績中臺揆務更佇良能宜收起草之才俾升握蘭之位可行文昌庫部員外郎散官勳如故主者施行敕承議郎前行鼎州司兵參軍崔升等學可從政文能按章幹局並優清勤咸著丹墀持法既佇良才白繩違尤資器識宜膺石室之命俾參鐵冠之侶可依前件敕通直郎行瀛州河間縣丞馮嘉賓砥礪名節恭勤職務幹能兼備清直有聞黃綬隨班未展才用繡衣蒞事方觀舉察可行左肅政臺監察御史散官如故鸞臺百工惟時必在推擇九族既睦仍資敦敘右千牛衛大將軍上柱國高平郡王重規宗室儀表衣冠領袖有姬旦之藝兼劉蒼之善出居連帥功名著於兩河入奉鈎陳誠款申於八校本枝望重河海職隆宜輟掌於魚鈐俾專司於麟族可司屬卿勳封如故主者施行鸞臺宗卿之任選衆尤切銀青光祿大夫檢校司禮卿上柱國芮國公豆盧欽望體業貞幹能詳備歷官中外具聞政績象河惟月太府國泉繁要所鍾委任斯在宜加榮擢允茲公議可太府卿勳封如故主者施行敕朝請大夫守司僕少卿宋元爽藝能詳洽局量優深踐行不虧歷官著稱參守僕正以表公勤可兼檢校司膳少卿餘如故鸞臺新除齊州刺史張沛禮義高族忠賢令緒才優識通學敏詞贍實蘊幹時之具雅懷在公之節絃歌出撫亟動於謳謠符傳所經必聞於課最允稱衣冠之望是謂廊廟之珍三署為卿九流莫尚宜回負海之駕俾登象河之列可司膳少卿主者施行鸞臺銀青光祿大夫守秋官尚書上柱國杜景佺薄有吏能頗間時務比加獎擢令典樞衡乃輕違憲章私樹恩福罔懷緘慎屢有泄言朕情在含宏不忍置之嚴憲五曹顯秩非可濫居九列通班冀當自效可司刑少卿勳如故主者施行鸞臺中散大夫行文昌左司郎中東苑縣開國男徐有功器局宏深文藝優贍秉節守義直道正辭繩準憲曹樞機會府咸歸平恕雅有聲績獄吏輕重人咨胥怨天工推擇朕之所難選衆而居庶乎不濫可守司刑少卿散官勳如故主者施行鸞臺校理文籍緝宣大典惟國所重非才勿居新除右散騎常侍中山縣開國男張昌宗鐘鼎盛門圭璋重器資忠履孝遊藝依仁碩學惣於邱墳高才軼於睢渙資淡雅之操無欲無營體撝謙之風不矜不伐每懷五嶽之舉期陟九仙之路雖混濟之量未去朝廷而元遠之心恆對山水頃立功祠廟欲以致福朕躬嘉其懇誠用增顯秩而有懷難進深懼將滿固辭侍從之班願在優游之地子雲寂寞雅好文詞季長博通堪典經史宜因松柏之性處以蓬萊之山可麟臺監餘如故鸞臺藝閣祕文蓬山奧府是為國重尤切帝難銀青光祿大夫行鳳閣侍郎同平章事上柱國石泉縣開國子王方慶鍾鼎高門簪纓舊德學富今古才優舒向自參機密亟改涼暄謇諤之風不忘於獻替謙挹之美屢陳於衰病西垣掌誥雖藉謨猷東觀屬詞更資通博宜輟鳳凰之省俾緝麒麟之署可麟臺監仍修國史勳封如故主者施行敕前中大夫檢校洛陽縣令上柱國平陽縣開國男敬暉體業端詳識用強濟護衣仙閣已著聲芳制錦神畿遽聞課績杼人務切署名高宜回三善之能令得百工之任可檢校營繕少監散官勳封如故鸞臺正議大夫行司刑少卿皇甫文佾早預衣簪纍居清顯恭勤無怠歷職有聲徽纆為官已淹歲序斧斤成用更佇才能宜輟掌於庭俾升營於梓匠可行營繕少監散官如故主者施行鸞臺具官崔融長才廣度贍學多聞詞麗楊班行高曾史外臺美其方正中省推其良直永言司典尤俟得人載筆西垣既藉微婉紬文東觀更資博通宜升著作之庭兼踐記言之地可著作郎仍兼右史內供奉官鸞臺太中大夫使持節博州諸軍事守博州刺史崔挹懷才抱器悅禮敦詩博究毀陵深窮壞壁秦章漢綬雖踐吏途魯衣宋冠無輟儒行虎門齒胄蟻術橫經重道尊師於是乎在宜罷外臺之任俾升上庠之秩可行成均司業散官如故主者施行鸞臺冠軍大將軍行右豹韜衛將軍員外置檢校源州都督良鄉縣開國男烏薄利族茂蕃庭位參朝佐懷恩慕化守義全忠宜錫殊榮以旌美烈可左金吾衛大將軍主者施行鸞臺昔程李二將分領東西之宅周召兩藩並行南北之化兼此重務允歸賢戚右金吾衛大將軍兼檢校洛州長史上柱國河內郡王懿宗司屬卿兼檢校并州長史上柱國高平郡王重規並麟趾英髦犬牙良翰承朱紱之寵命奉彤弓之征伐勳藏天府名入史圖或誰何警巡忘晝夜之倦或敦敘宴翼協親踈之理題輿河輔而桴鼓希聞別乘汾坰而狴牢不葺勤誠著於文武美績宣於內外爪牙任切都輦寄深求賢審官不踰伯叔之國叶心共理佇觀兄弟之政懿宗可左金吾衛大將軍依舊檢校洛州長史重規可右金吾衛大將軍依舊檢校并州長史勳封如故主者施行鸞臺升降銅樓輔弼玉裕必求時望以隆國本麟臺監王方慶盛門良緒敏學豐才道藝夙彰言行無玷備歷清顯式昭幹具體溫恭之性造次不違守廉退之風終始若一實舊德之明允見通人之老成昔張良以三傑之才始傅儲右史丹資八舍之重方護春宮賢任能抑有前事宜膺九德之選用光三善之業可行太子左庶子散官勳如故鸞臺新除朝議大夫守隨州刺史于復業志識端雅藝能詳洽既罷臺閣方驅節傳銅樓依俊銀榜翹賢漢水觀風且輟彤襜之務瑤山聽樂宜煦黃離之景可守太子中允散官如故主者施行鸞臺相王男壽春郡王成器育彩桂山承規椒掖韶容霞舉美志月將望苑翹才瑤山佇俊宜參多士之選俾從正人之列可中大夫太子左贊善大夫勳封如故主者施行鸞臺壯武將軍行定王左親事府典軍上柱國成善威效績藩邸宣功戎陳新除中大夫守甘州刺史上柱國卜處沖久參武衛夙奉文㮰張掖遐陬老帛丿糸故俗地連荒憬人藉撫循寄以厚城佇觀美績善威可使持節甘州諸軍事守甘州刺史處沖可使持節龍州諸軍事守龍州刺史散官勳如故仍並馳驛赴任主者施行鸞臺大中大夫坊州刺史上輕車都尉郢城郡開國公豆盧志靜等登朝受服咸積歲年蒞職當官並有聲稱與我共理實存咨嶽代天無曠受任得人分命良材佇觀美績可依前件主者施行鸞臺寧遠將軍守右衛彭池府右果毅都尉張元福素間武略兼有吏能荷㦸臨戎屢陪蒼兕之陳題輿撫俗庶清白羊之黨可朝議大夫行勝州都督府長史仍馳驛赴任主者施行鸞臺邢州司馬上柱國陳璲智足禦戎才堪理劇題輿趙北未展器能分乘河西佇清邊徼假以優命行觀成績可朝散大夫守涼州都督府長史勳如故主者施行鸞臺中大夫檢校上方少監杜從則體素端固器識通敏驅策自久績效有聞作二神州實資幹用兼司劇署載佇公勤宜踐新榮仍兼舊職可雍州司馬兼知尚方少監事主者施行鸞臺檢校河源軍營田游擊將軍守左衛杜陽府左果毅都尉員外置上柱國吉義福等勤績兵欄效申田祖五戎既戢萬庾斯殷宜輟掌於連營俾收功於別乘可鄯州都督府司馬敕朝散大夫行鼎州長史鄭仙客識量淹通理懷沈正攝官無怠歷職有聲三輔名畿五方雜俗求人之瘼惟帝所難宜遷題坐之風俾試鳴絃之化可檢校長安縣令散官如故敕奉議郎行涪州隆化縣闕元素履綰銅兩穴遊刃三巴府推其能人便其政賓寮戀仰蠻漢謳吟宜遂所祈以終美績可忠州臨江縣令敕通議大夫前守文昌司勳員外郎李承嘉擢秀士林升榮禮閣公勤無怠幹制有能既修太原是惟舊國爰制美錦實佇良材宜錫崇班佇聞異績可檢校并州太原縣令散官如故仍馳驛赴任敕朝議郎前行慶州同川縣丞趙崇嗣儒林郎守蓬州大寅縣丞陳義全等或典農朔陲致京庾之積或驅驛巴徼有綏輯之功且敘成勞俾無遺賞崇嗣可行隴州南由縣令義全可守潼關令散官並如故敕麴元福拔跡輪臺策名會府宜受芝泥之命往參蒲海之邑可將仕郎守北庭蒲類縣主簿鸞臺清邊中道前軍總管冠軍大將軍行右武威衛將軍上柱國賓山郡開國公沙叱忠義三韓舊族九種名家夙奉戎麾遂參文衛蕃夷豕荐虜騎蜂屯頻出奇謨屢摧凶黨昔臨鴈塞能羈縛馬之妖今拒狼河更翦奔鯨之孽勤功允著誠效克宣宜酬矢石之勞用廣山河之賦可封郕國公食邑三千戶主者施行鸞臺左金吾衛大將軍員外置檢校源州都督烏薄利家近圓城任隆方嶽惠洽藩部功宣朝廷扶津搆虐穴生氛能拒妖凶固守臣節踰馬韓而獻冊泛鯨海而申虔計議並深忠懇咸到書勞有典方隆將帥之班舉善不遺宜拓公侯之宇可左金吾衛大將軍員外置同正員仍封歸義縣開國子食邑一千戶主者施行鸞臺朝散大夫行左肅政臺監察御史劉執當朝秉軺撫俗效彰伏柱勤深攬轡堅貞之操既申於柏臺利建之榮宜及於茅社可封彭城縣開國男食邑三百戶主者施行軍制鸞臺辭第鑿門允稱鼓鼙之將列位疏爵是為廟堂之賞冠軍大將軍行右武威衛將軍檢校左羽林衛上柱國郕國公右奉宸內供奉沙叱忠義遼東壯傑名蓋於狼河東武威衛將軍員外置同正員右奉宸內供奉駱務整薊北雄渠氣高於龍塞並受登壇之任俱懷出閫之略或輕齎絶險以應青邱之別軍或高壘抗威以要黑山之潛遁兵強由算師克在和爰清食彘之祅遂廓浮黿之黨操袂成市執袪盈路屈指告捷未待於經年疇庸冊勳豈假於踰月宜膺剖圭之錫兼峻銜珠之寵忠義可行右金吾衛將軍餘如故務整可左武威衛將軍封盧龍縣開國男食邑三百戶餘如故主者施行鸞臺朝議郎行宣州宣城縣令儲孝任等並早從推擇久著勤勞績茂綰銅時逢檢王千齡有慶既屬休符百里能官宜從榮獎可依前件主者施行鸞臺宣威將軍守右衛親府中郎將檢校左羽林衛上柱國裴思諒等八屯五校俱奉職司三垓九埏咸屬休慶錫以班秩用存優獎可依前件主者施行鸞臺中散大夫使持節通州諸軍事守通州刺史于光遠等並資才藝咸剖符竹勤勞有積聲望俱優神嶽泥金明堂會王頒賞行慶宜加恩獎可依前件主者施行維神龍三年歲次丁未九月景申朔五日庚子具官某及文武㣥官等謹昧死再拜稽首奉冊言爰自厥初肇興司牧皇矣撫極蒸哉察道莫不因時適變改物殊徽推五運而陟崇高步三微而膺歷數天地人皇之立稱始別洪荒唐虞夏帝之居尊漸詳文質姬水以椎輪發號烈山以斫耒增名然後仁被德宣功昭業遠歷訪前古茲為舊式我大唐受乾坤之眷命當㝢縣之謳歌奄有蒸黎遂荒宸象應天皇帝陛下垂旒御辨截海披圖承四業之休光握三靈之寶契虞舜蒸蒸之德永錫㣥方周文翼翼之心其凝庶績驅齊民於仁壽致雅俗於醇醲六府咸修五兵不用航海梯山之客奉贄輸琛耕田鑿井之夫擊壤鼓腹中外靜謐表裏雍熙而孽子滔天亂臣干紀謀同觸瑟禍劇弄兵不虞之災忽生於肘腋無象之鑒獨憤於神祇於時凶豎逼樓聖君憑檻威靈下濟覺封豕之周惶醜逆上瞻見神龍之傅翼寶仗似億千之衛天儀成丈六之容衆瑞俱臨㣥祅大駭盡迷方而失據咸喪氣而亡精顧眄而斬馘輿尸指揮而冰銷霧廓雖復草為兵甲秦師驚蔣帝之神樹作幡幢釋主屈魔王之衆軀之變媧后蛟影之隨漢高未足以匹此奇徵方斯偉應自非冥符幽贊睿感潛通何以承波若之護持享高明之福助昔者伏牛之主是曰犧皇名鳥之君仍題鳳紀法身用馬鳴成道上士以龍德為仙敢託元符爰咨故實謹上尊號曰應天神龍皇帝鴻猷載肇昌歷惟新庶以仰順乾心俯從人欲天長地久更隆四大之尊名玉振金聲恆為百王之稱首盛矣美矣皇哉唐哉臣某等誠歡誠喜頓首頓首死罪死罪再拜以聞
