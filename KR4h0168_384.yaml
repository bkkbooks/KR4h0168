front:
  text: 全唐文欽定全唐文卷三百八十四及字至之河南洛陽人天寶末以道舉高第補華陰尉代宗立以左拾遺召遷禮部員外郎歷濠舒二州刺史加檢校司封郎中徙常州刺史卒年五十三諡曰憲著有毗陵集
  hash: sha256:dfe695c61b838f765fc7bcd5058baa32ea65a0368c73d9d158001ac795c7f9ad
  markers:
  - {type: head, offset: 14, content: 獨孤及(一), id: KR4h0168_NFKB_384-h1, level: 1}
body:
  text: 老氏稱吾所以有大患者為吾有身大哉聖人之知微乎夫生者一氣之暫聚耳有天地之和自然之力以運其行止節其夭壽非智力之所能扶明矣而舉世矻矻莫不保持形骸謂為已有特執迷妄往而不返小者攘禮樂竊忠信以賈譽大者盜天地之權至於忘身道德之衰皆此物也余生於浮而長於妄汨沒當世與㣥動俱智不能逃形於名聲之韁鎖脫屣於冠冕之籠檻及其世界顛倒萬物反覆始返照收視以觀身世然後知一生之患假合豈直芻狗土苴熱焰聚沫而已則我之身也與百憂偕長況重險之中乎思欲沖三清出五濁乘凌虛極與造物者為伍莫有由矣嘗中夜夢飛升太空若有以名迹見誚者覺而自失乃為賦以狀遠遊且旌悟道之晚也其詞曰仰太素兮觀元精之煙熅孰官司乎物物兮得流形而為人太皞遺吾八卦藏天地於文字黼而黻之為聖為智裦衣之徒相與擊建鼓而揭日月兮奔孝慈而走仁義其弊也古是而今非身賤而名貴驂驔馺遝兮道路屯雲而奔波絢煥轇轕兮玉帛鐘鼓之駢羅霍火蒦一作夔兮心懸天地而火馳蒼黃兮得未終也而失已繼之百骸與日月并走五藏與哀樂交戰羲和未及弭轡榮枯紛而萬變何生涯之侘傺兮蹇吾降此中州憑世道以上下若涉水而迷津兮與吹萬同其波流況世緒坱軋兮如棼絲之相樛見辰極之低昂兮知杞人之殷憂顧兔呀以蝕月兮天地閉而雲愁鳳凰焚其故巢兮繞舊國以失儔埃火翁以上薄兮虞羅紛其四周吾始未知夫六合湫隘之若此孰與吾兮遠遊豈無太清之路兮夫何漫漫而迢遞望帝鄉之低徊兮微白雲之與偕逝澄豫神於遙夜與皓氣期於無垠真境沕穆以傍感精誠薰然而來親欻乘夢以奮飛博至靈以上賓望見碧落天地如掌洞開八門別有萬象亭亭物外乘化直上身世雙遣一作遺獨與道往其往也泛兮若遊魚振鱗而泳清川冏兮若翔雁得順風而緣秋天忽不知豫誰之身夫何為者深本集作冞入空界七曜在下問豫津於混茫兮蹇徜徉以延佇若有人兮縹眇指人間以唁豫曰鳳兮鳳兮何德之暌天固桎若以禮義梏若以機事盍支離其德而超乎物纍使逸翮可得而籠樊兮孰云夫吾毛之自異天運地載剛柔生焉千變萬化如環無端彼興廢與往復同大壑之波瀾將令歸根明徵其源則吾與若皆幻也又奚睢盱於其間幻未始有封物未始有疆成則虧進則傷無汨而和無易而方山立其中央善汝行密汝藏道將自光吾在大羅之上元都之所乾坤為家日月為宇噓吸元氣大虛之下音戶尚一乃心勿謂道阻遊乎無窮吾顧見汝奉真告以自省兮五情惄其增熱哀攀龍之無階兮思過天之曷月未知去下方幾萬億兮退將返遵吾歸轍修玉虛以下降濟銀漢以中歇憑東井以俯視識故國之城闕千門萬戶遙如蟻穴百川綺分五嶽羅列覓舊山與喬木才依希而明滅見伊川大道鞠為戎狄歷陽故人半作魚鱉曩之奔命於市朝者如紛紜飛馳囁囁嗤嗤蹩躃蹁躚肖翹陸離若蟣虱之聚壞絮蜘蛛之乘遊絲吾乃今日識㣥動之變態兮莞然倚長空而犮之亦既自得周覽未畢惕焉形開萬象如失㣥有儼以偕作百慮繽其來歸乃夙昔之人寰始故時之喧卑向之俯仰欣戚無非妄者然後知我之生也與妄皆生邪氣乘之萬緣合并為憂為患為虧為盈彼君子方碌碌然自以為覺猶飾妄以賈名安知聖人不以世界為重狴死生為大夢視變化與品類亦猶神交飛動與遺物以顧身兮悟生浮而質陋以一氣之倏忽與萬化而紛糅自視俄本集作羽戈然寄形宇宙尚何能濡首於榮辱之境甘心於哀樂之圃鷦鷯于飛載翩載翻君子至止栖息化元獨立道樞怡神渾萬物轉薄吾真長存止水不波浮雲無根與時盈虛委質乾坤倚伏相軋吉凶同源物各自爾豫欲無言優哉遊哉聊以窮年昔漢光武收河北之年馳馬將進滹沱在前為敵所迫當冰不堅及軍裝隱轔以登岸殺氣崢嶸而塞川意者欲定神器於茲日彰聖人之動天若非使不道者喪有德者王則水不能以造次而結冰不能以斯須而壯變浩浩之流為峩峩之狀擁高旌以進雷長轂以上及企路以全軍又迎風而破浪於時進隔關於長津顧邀遮其後塵患勢莫之敵沒不可振求一徑而莫遂惟㣥臣之不親賴王霸至誠之力協光武至聖之德人從悅已之詐天贊勤王之直故得舟楫不設衣裳不濡避地以往乘冰以趨一水之上兩軍相殊使後人視水則有求冰則無望飛塵而惆悵對寒流而踟蹰由是知天人之合發與神祇而相符不然則何以延十二之祚總四七之輔滅新室流毒之日作漢氏中興之主受命之瑞也亦何異元女降於軒轅白魚躍於周武燕趙之間清流瀰瀰高風以遠遺躅於是唐興百三十有八載皇帝在宥天下鑄五兵為農器栖萬姓於壽域道證德洽神人以和春正月冢臣上將卿士庶尹洎三老五更公侯伯子男相與揭厲皇猷請增明號上撝謙而未許也僉曰陛下孝達神明道超先帝以德則符廣運以時則復大朴以功則保定丕業格於上下而尊稱猶淺鴻名未光億兆之心何戴神祇之望何塞天子南嚮而讓者九不得已而俞之乃命有司具昭告之禮二月乙酉備法駕朝太清宮敕宮神以灑掃詔月將使警蹕雲動天旋至於靈壇報功乎三清祈禠乎上元景戌享太廟用明水越席玉豆雕纂之禮焫蕭以合薌灌鬯以報魄神休擁而萬靈接精意陳而六幽感丁亥朝㣥臣於蓬萊前殿於是四方人大和會命太尉班五瑞合六樂遂展禮奉策虔受大號曰開元天地大寶聖文神武證道孝德皇帝是日也解商野之三網受塗山之萬玉大赦天下與人更始協時月同度量贊俊傑書雲物恤高年禮大祇接天瑞受地釐撫柔萬邦存省其安危遂迎日推策布慶行賜扇薰風調元氣拓千歲之大統操三皇之遺珠垂其衣裳與天地合符樂遍禮崇乘輿乃入然後屏椒房而徹黃屋徜徉乎大庭氏之館泊兮凝神恍兮存真想洪崖廣成之倫披霓裳而下鳳闕蹁躚左右上千萬壽凡遭逢昌運沐浴聖涯而不能頌蒸人賦江漢吉甫仍叔之罪也臣敢有二事乃作頌曰穆穆閟宮敷時繹思天有成命孝孫受之鋪衍下土報功神祇我瑞如山我福孔夷聖敬攸感上元豈私誕受鴻名載揚緝熙風動雲行雨飛露垂昆蟲昭蘇草木阜滋恭已南面無為之師柏皇尊盧萬代一時昭假遲遲上帝是祗永錫多祜萬壽無期按晉陽秋阮公諱籍字嗣宗陳留尉氏人也夫雲蒸於山不擇時而出故公以全德生於衰世於時中州多故大道浸闕缺於用者知膏火自鑠逃於纍者懼木雁兩傷公由是內張道機外隳天彀土梗聖智粃粳軒冕遂登廣武以覽古望梁臺而寓詞埋照於竹林放神於蓬池德充也爾其興懷昔遊故為東平相怡情善釀故受步兵校尉弛張蘧寧之際出處夷惠之表否泰莫得介於靈府名實不足汨其沖氣螭蟠龍臥與道偕隱所以沈吟志全慷慨神王獨立長嘯遺榮此臺當其寓興也蓋將豪視泰山囊括浩氣頽然自得與造化者為友故卷其用而懷之世莫得而窺也其外物所感則寄之翰墨焉謂道莫至於專氣抱一於是著釋老論哀莫大於矯時死名於是有弔比干文情動於中而形於言賦咏懷詩問道蘇門犮而不答作大人先生傳歲在元黓余登大梁之墟墟中之人方誦公遺塵歎元風蕪沒議樂石以旌朽壤余採其故事之存於糟粕者勒而為嘯臺頌頌曰天下多故賢人穀恥隱於沈飲以俟傾否越禮逃用晦德忘已不知我者為我狂且長嘯懷人詠古著書感時而慟非必窮途沔彼汴水東流無返迹是人非荒臺可踐升高延佇想見青眼道烏乎在日逝日遠一本作五運相錯三徵交戾天地之氣有時而閉居子迷陽亦既懸解萬象離境一杯韜世大辨不言至清無徒泠然長嘯味道之樞神和天倪迹寄窮途物我兩忘獨與化俱湯湯汴河東流不返之子已往德音日遠荒臺未傾嘉樹勿翦升高延佇思見青眼山有萊隰有薇逝者不作吾誰與歸望古刻石永昭清徽敕吐蕃贊普外甥朕共贊普代為與國自我元宗至道大明孝皇帝與生一作甥贊普和親結好將六十年仰思當時之約豈為一朝之故實欲相恤災患永同休戚使代代子孫為兄弟甥舅如手足之相衛脣齒之相依自爾便息戍罷兵二境無征戰之苦金玉綺繡問遺往來道路相望歡好不絶贊普寧忘之乎自我國家有安祿山史思明之難朕謂言贊普必有恤鄰救患之意豈知乘我之舋恣其侵軼煞略河湟之人爭奪汧隴之地又與朕叛臣僕固懷恩共扇誘回紇等諸蕃同惡相濟犯我都邑三年之間三至城下此實贊普苟窺分寸之利自棄一家之信不念婚姻之好忍絶甥舅之歡纍代親鄰一朝併棄有目有耳者皆為贊普羞之夫以小國伐大國且勞師襲遠而助叛臣有是三者神宜悔怒果然懷恩自斃回紇來降羌渾諸蕃內難外散天實有眼心可負乎朕頃以背盟不祥絶親不義寧人負我我不負人所以含垢數年未忍致討既不得已方思用師正欲悉天下精兵長驅西向弔人問罪然後凱旋上以雪宗廟之讎恥下以釋將士之憤怒自料以德征暴以大攻小以信討詐以義伐不義當如沸湯沃雪猛火焚枯人神同力何往不濟籌議之次適會彼國使來云願修前好復如舊日覽書見意良用憮然欲不許則人來歸我欲許則信不可恃是以遣御史中丞楊濟往諭朕意且探誠款九月濟與彼國宰相某乙等同到得所寄書然後知事皆由衷言無虛謬再披來旨朕甚嘉之何者自非聖哲人誰無過過而能改亦古人之所善追思六十年之舅甥有先祖先贊普之誓約言在史册信結天地豈以小不忍而隳大體使百姓疲於甲兵兩主遂為仇讎二過遷怒朕所不取敬依來請彼此結和而今而後不復念惡已令內外屯戍罷柝解嚴凡我二國洗瑕遷善經略封疆素有分地各守土宇爾無有侵永為親好復如開元中故事昊天上帝山川鬼神實聞朕言無謂不信冬寒贊普外甥比平安遣書指不多及問天六地五經緯斯列內和外順禮樂攸興體也備而後成履也踐而乃立厥語則興導諷誦厥德則祇庸孝友而大道之行本無制作忠信之薄翻為亂首終以六君子繇此振三代之英四豪士違之嬰五伯之罪焉往可以還厚反朴何適可以持盈守成郁乎文哉周監二代網羅奔放沿革多端至若緇布纁裳夏腒冬雉弓矢詢於五物嚌啐正於三命示惠而加折節訓恭而置房蒸間問殷聘搢三挾一詩懷祝嘏絲紑尸賓抗木虞筐桑匰蒩館然冥鷖總盎涗瓢齎苟敬之儀甫竁之節此等之物各為何興用之安所捨之何從經邦之略焉假設施別白書之無或曖昧問聖人握天下之圖居域中之大莫不仗㣥材而康庶績資多士以牧黎元夢想傅巖之野佇思磻溪之上遂得乘箕入相就三命而作鹽梅投餌升朝封四履而稱師父故知英靈間出千載一賢皇化軌躅殊途共貫我大唐道冠犧軒功高媧燧長楚必割翹木無遺虛席旌賢宵衣納善降賢良之制下徵辟之書子等并藏器待時懸瓢俟扣深識宰相之體妙達經邦之術欲使陰陽調六律風雨應四時一百姓之心平九州之利餘糧棲畝外戶不扃亭障無虞關河罷戍漁者虛湍瀨田者讓肥腴路不拾遺市無二價眷言於此何道以臻至如九儀八座之指歸四師六典之題目并馭人之大體撫俗之良規幸陳名義之端無致疏遺之對問儒有安身以全德有殺身以成仁有徇名以行已有忘名以救物雖俱出於儒墨而用之不同聖人立言豈其無操持歟夫魏顆違命申生受賜伍尚赴郢伍胥如吳四者孰孝比干死之微子去之太公投竿伯夷采薇四者孰義石戶竄於海上伯陽隱於柱下范蠡泛舟於越三者孰潔今欲考其本末度長以挈大較其去就合異以為同渴聞貫之之道辨之之説問黃帝氏以無為為政垂衣裳而天下順周人三千其儀亦克用乂舜誅四罪天下咸服而成康恭已刑措不用致化之本豈不同源而文質殊貫損益相反以古範今何去何就孔子用鉞兩觀而魯至於道而宓子賤鳴琴愔愔單父亦化寬猛之際大小不侔比權量實其義焉在敷暢厥旨敬佇嘉言問傳曰其君齋明精潔則神饗人聽故明神降之夫天地絪縕沖氣為人神何由降明何由出至於晉祟實沈嵩生申甫編傳穀城之老言發魏榆之石檮杌杜伯與商周而存亡黃熊白毛將晉虢而興敗是何祥也根本焉在二三子賁然來思宜究乎天人之終始其悉數以對問大象無體元功陰隲雖稟生之類萬殊而含道之原一致是以至人垂訓將以微言演為真宗貽厥後學包括六藝周流八表或因事以立言或寓言以詮意至如交樂於天交食於地不相與為事不期與為謀善無所私惡無所棄施之於教何以勸勉經曰不爭善勝不言善應正直如繩平易如水常務斯道何往不臻又曰善建不拔善抱不脫子孫以祭祀不輟斯言信矣昔放勳欽明光宅天下人歌擊壤政叶雍熙可謂善乎建抱善乎拔脫宜其帝緒蕃遠貽厥孫謀綿綿瓜瓞邁德垂裕何丹朱之不嗣而祭祀輟乎又天無二日民無二主若以天下觀天下豈有二君乎夫君為元首臣為股肱君無賢臣誰與共理粵若舜舉八元致垂拱之化漢用三傑成霸王之業夏殷之末任佞去賢宗社淪亡為無匡輔經稱不尚賢者其旨何也聖人立教專氣致柔故形不欲勞性不欲竭深根固蒂可以常存則有朝穆肆任勞逸過度促齡損性却以為然又有惟靜惟清守貞守朴二經之説何取則焉又聞善攝生者動與吉會武不措爪兵難容刃單豹嵓居水飲身代俱損壽永色孺不免噬搏何衛生之不異而利害之頓殊子既洞曉元經探微索隱矛盾若此何以會明側席虛心佇聞啓沃對臣聞道之為物無名無形蓋聖人酌而用之推而宏之取其精以修身用其粗以救物從本降迹散朴為器於是有可道之道忘言之言其大略雖以沖寂為宗虛極為體然妙用無眹故不可致詰今陛下詰其體探其宗豈不欲因言演教於教奚有夫長風吹而衆竅號則大無不動細無不應況陛下用大道為風以鼓㣥有臣則吹萬之一音也敢不唱於衆竅之末臣謹按天有施地有利用天之施以處其和謂之交樂分地之利以養其正謂之交食夫相與生於有為有為生於有事有事則謀名存矣善惡生於公私公私生於用用則棄名立矣然聖人有為不為焉有事無事焉有謀不謀焉有善無善焉有惡無惡焉泯善惡於一致合異同於萬殊則妙門可存教父斯在臣又按道德經云天網恢恢疏而不失常有司殺者殺之此不爭善勝之應也文宣王稱天何言哉四時行焉百物生焉此不言善應之驗也周書云無偏無黨王道蕩蕩此正直如繩之效也經又云居善地心善泉與善仁言善信此平易如水之證也陛下宏其言挹其道以為天下式三十有二載矣且復推功外名不有不恃考言詢事若沖若缺詔臣等曰常務斯道曷往不臻臣鯫生也焉知其辨雖然有一於此願陛下守而勿失與神為一使神不遠於人人不遠於天天人合并如影響交應則甚夷之道焉往而不臻夫有國者必善建皇極善抱至道道之不存傾其宗遷其社之謂拔桀放南巢受死牧野是也極之不建失其器亡其國之謂脫太康去洛汭幽王敗驪山厲王流彘是也至如堯知天歷在躬故以至公官天下天下戴之而不辭知丹朱不肖又以至公禪天下天下去之而不怨可謂邁德矣其後裔更霸迭王重之以御龍唐杜之代祿可謂垂裕矣陛下興廢繼絶立五帝祠即春秋備其祭典亦可謂祭祀不輟矣方之拔脫臣謂不同經曰不尚賢使民不爭大哉聖人之知微知彰乎夫尚賢者國家之所當先然古先聖人曰雖求賢審官其用未始不無為也而聖人能無為於求賢不能使無為無迹存則有為者尚之以為利於是有飾智以驚愚修身以明汙其漸起於一時之名其弊存乎千載之後不尚賢者非謂廢股肱之任絶匡輔之力也蓋欲因時致功功成則遣而遺之因義立事事遂則有而無之無之則迹滅迹滅則爭息爭息則於為無為於事無事雖八元以翼唐弻虞三傑之戡秦滅項其無為無事一也若夫齊天地冥萬物莫大於全真專氣致柔全真之本也惟清惟靜全真之中也各然其所然各可其所可全真之末也設教者三合其道一以貫之雖逍遙與道養殊途然性情與力命同轍苟因其合而較其分則子産不得不勞於刑政朝穆不得不逸於肆任若矯其肆任之性以徇刑政之端是續鳧截鶴虧其全矣故聖人以大猷御六氣之辨以大方合二經之旨明應變無方立言不一學者宜忘言以究其體統不可執言以滯其筌蹄經不云乎反者道之動惟動而常靜靜可以取則權足以合義義無反經凡養生者以本為精以物為粗閉其外慎其內迹不踐凶危之境故兵不能容其刃心不居馮暴之地故武安得措其爪苟守其精而遺其粗故得於內而喪其外外內無以持其分則衛生之經悖矣謂之不異臣竊異之至如希微大體徼妙元鍵陛下得黃帝之遺珠久矣雖廣成無所陳其至精傳説無所用其舟楫啓沃之問豈臣及之有黷睿謀懼殞越於下謹對臣某言臣等伏見開府儀同三司魚朝恩奏含暉殿及白華亭院內并芝草生者臣等謹披圖按牒竊考前志蓋王者以道蒞天下而德及庶物則有神木靈草儲祥效異陛下賢聖恭儉慈仁愛人開闡學校尊教勸德將以五經根本庶政風化斯浹神人以和和氣旁感蒸而為瑞不然豈靈芝菌蠢異處同植不産他宇必於宸居輝輝九葩之蓋煌煌三秀之質蓋表陛下之欽明光宅以人文成化靈根碩茂萬葉無疆神應炳然天意如答臣等獲忝朝列幸覩禎祥臣無任喜慶之至臣等言臣聞征而無戰王者之師也將而必誅春秋之義也臣伏見周智光傲很頑虐昏迷猖狂敢專生殺之威以慢王度崇飾姦慝之志自干天誅陛下謂罪在已躬視人如子永言式遏之義不得已而用師而將才受鉞兵未血刃已梟元惡之首載安舊汚之俗昔漢征黥布望陳而憂殷伐鬼方積年乃克豈若今日陛下朝命將帥夕殲渠魁制勝神速從古未有臣無任慶快之至臣某等言臣等伏見河南副元帥行軍司馬太子右庶子兼御史中丞袁傪露布奏今年五月十七日破石埭城賊方清并降烏石山賊陳土等徒黨二萬五千五百人者臣間聖人之生不能使大盜不起故唐虞之代時則有三苗之師姦宄草竊為患舊矣山賊方清等蕞爾狂狡敢干天誅聚椎剽之徒謂險遠可恃作為蛇豕以薦食勾吳乃有跨據大江吞噬東土之計七州之地人罷耕織百姓業業全活無所陛下方鋭志於偃武不得已而用兵乃命將受略使先勝後戰故傪等役不再舉而師有成績巢窟皆傾俾無遺類詿誤之輩得返故業汚俗更始流人汔康此三代之舉也非陛下齊聖格天文思柔遠豈能砥綏盜亂如此其速臣等幸覩成功不勝大慶臣無任抃躍之至臣某等言臣聞天有春秋冬夏之氣時也時有分至啓閉之候節也至若寒食上已端午重陽或因人崇尚亦播為風俗況歷運光啓聖人降生固宜紀載震之辰與八節同號故元宗生日命曰天長節肅宗生日命曰天平地成節并以飲食宴樂布慶萬方使賜及同軌風流異代陛下纂祖宗純懿與天地同德禮樂克修憲章咸備而聖誕之日未有嘉名將何以表出震之期慶流虹之瑞率土延企思扇舊風是以臣等禺禺不勝大願願以十月十三日為天興節其王公士庶上壽作樂悉如開元乾元故事上以殷薦崇先天不違之德下以布澤錫萬代無疆之休使鳳鳴河清實在茲日臣無任臣等言伏見京兆尹李勉奏櫟陽縣有醴泉湧出飲之者痼疾皆愈臣聞王者澤周庶類則神降百祥天地之心去人不遠陛下厚德載物與坤同符以善利人如水潤下故后土獻瑞湧泉療疾靈源酌而不竭沈痼飲而皆痊勿藥之喜萬人是賴仰窺天意豈不以是彰陛下之德施乎不然何衆庶禺禺強名聖水彼丹井朱草白麟赤雁徒稱太平之瑞未聞功施於人方之聖泉豈踰神異臣等無任喜慶之至臣某等言伏見今月一日雲物陰晦太陽當虧不虧者臣聞殷太戊宋景公皆修德立言而妖變為福陛下以日月薄蝕勞謙惕厲而災不勝德雲為垂陰若天降衷使其謫收不見易象曰既憂之咎不長也臣等無任欣戴之至臣某等言臣伏見陳鄭澤潞隴右節度使奏潞州使院行軍司馬裴政廳事柱上生紫芝草七莖長子縣厚載鄉生嘉禾兩莖同一穗者臣聞靈芝嘉禾太平之瑞昔在周漢嘗表休徵當時福應疾如影響今庶政方乂而二瑞薦臻是天降殊祥用彰有德豈非陛下寶持慈儉輯柔遠邇克俾天下和平當如周漢之盛乎神祇景貺實甚昭晰彼唐叔之獻與齋房之歌明德所感古今同契臣無任臣等言伏見陛下屢發德音招延獻納使左右侍臣得直言極諫忠謇者無不聽狂訐者無不容又辛丑詔書詔裴冕崔渙等十有三人并集賢殿待制以備詢事考言之問此五帝之盛德也而臣以目覩生則幸矣然頃者陛下雖容其直而不用其言進匭上封者大抵皆事寢不報書留不下但有容諫之名竟無聽諫之實遂使諫者稍稍自引鉗口就列飽食偷安相招為祿仕此忠鯁之士所以竊歎而臣亦恥之十室之邑必有忠信如孔某者況以朝廷之大卿大夫之衆而陛下選受之精與假令不能如文王之多士堯舜之比屋其中豈不有溫故知新可使懋陳政要而億則屢中者乎陛下唯虛存其儀令條奏不曠及議政之際曾不採其一説堯之疇咨禹之昌言豈若是耶昔堯設謗木於五達之衢孔子亦曰以能問於不能以多問於寡又曰某也幸苟有過人必知之然則多聞闕疑不恥下問聖人之心也臣不勝大願願陛下試以堯孔之心為心日降清問啓其宏議不可者罷之可者議之於朝與執事者共之使知之必言言之必行行之必公則君臣無私論朝廷無私政天下無私是陛下以此辨可否於獻替而建太平之階可也況國體乎自師興不息十年矣萬姓之生産空於杼軸擁兵者第館亘街陌奴婢厭酒肉而貧人羸餓就役剝膚及髓長安城中白晝椎剽京兆尹不敢詰加以官亂職廢將惰卒暴百揆隳刺如紛麻沸粥百姓不敢訴於有司有司不敢聞於天聽士庶茹毒飲痛窮而無告今其心禺禺獨恃於麥麥不登則易子咬骨可跂而待眠於焚薪之上豈危於此陛下不以此時軫薄冰朽索之念勵精更始思所以救之之術忍令宗廟有纍卵之危萬姓悼心而失圖臣實懼焉去歲十二月丁已夜中星隕如雨昨者清明降霜三月苦熱寒暑氣候錯繆顛倒沴莫大焉豈下凌上替怨讟之氣焰以取之耶不然天意之丁寧譴誡以此警陛下宜反躬罪已旁求賢良者而師友之黜棄貪佞不肖而竊位者下哀痛之詔去天下所疾苦廢無用之官罷不急之費禁止暴兵節用愛人罔使宦官亂國政佞言敗厥度兢兢乾乾以徼福於上下必能使天諴感而神心應反妖災以為和氣彼太戊桑穀宋景熒惑焉足為陛下道哉臣一昨陳奏請減江淮山南等諸道兵馬以贍國用陛下初不以臣言為愚妄許即施行然及今竟未有沛然之詔臣竊遲之今天下唯朔方隴西有吐蕃僕固之虞邠涇鳳翔等兵足當之矣自此而往東洎海南至番禺西盡巴蜀萬里無鼠竊之盜已積歲矣而兵不為之解傾天下之貨竭天下之穀以給不用之軍而為無端之費臣不知其故假令居安思危用備不虞自可於厄要之地少置屯禦餘悉休之以其糧儲屝屨之資充疲人貢賦歲可減國賦之半陛下豈遲疑於改作逡巡於舊貫使大議有所壅而率土之患日甚一日是益其弊而厚其疾也臣竊惑焉夫療癰者必決之使潰今兵之為患猶癰也不以漸戢之其害滋大大而圖之必力倍而功寡豈周易不俟終日之義與伏惟圖其始而要其終天下幸甚臣無任懇款之至草土臣某言臣昨以哀瘵愚懇昧死上陳冀回日月之光曲念螻蟻之志伏奉丁酉詔未蒙矜允捧讀聖旨五情殞裂臣某中謝伏以適四方宣王命之任必擇職位素貴聞望炳著學能專對才有餘力者以充其選臣以宗室未屬妄荷寵命惟才與智俱不如人況今衰羸殘喘加以病苦支離沈瘵歷夏及秋終日不過一食不杖不能自起自料若力疾祇命適數千里雖欲自強必中道委頓璽書詔旨廢失是憂臣伏見廣德二年七月赦書罷天下起復之官許終喪禮此陛下孝德過於兩漢然渙汗之發率土霑霈豈獨令臣隔在赦外又尚書右丞會府之樞轄御史大夫天下之繩墨宣慰巡檢朝廷之大寄今臣受此三職而以起復為名因臣過舉破陛下法令使百寮師師何以取則臣夙遭不造備生人之艱官始一命先臣棄背慈母鞠育至於成立遭罹二京覆沒弱弟以宗室見害臣惸然茹痛獨侍板輿備嘗險阻冀及榮養才擢掖垣慈顏違代罔極之痛終天莫追今靈筵未塵墳土尚濕遽令臣荷金印之寵處黃華之榮使繐帷廓然奠祭無主此恆情之所不忍也陛下其忍之乎伏乞以聖慈曲臨皇明下照矜臣尫瘵察臣不逮更擇時彥授之使職許臣得以羸骸終其喪紀實天地之施鍾於臣身倘殘魂未滅朽質可委誓當摩頂至踵以答聖造臣無任哀瘵懇迫之至草土臣某言臣再以微誠伏闕請命綸言纍降天聽未回仰戴聖情俯循哀戚悲懼交迫悼心失圖臣某中謝臣才能不及中人且未嘗有毫髮勳效陛下不以臣不肖特降殊私授以驅馳之任賜以親賢之目臣且匍匐奉詔戮力將命寧敢矯禮為名以讓自飾顧臣羸瘵奄奄行步支離力有所不任用有所不逮風憲重任也宣撫大典也誠恐以疾墜王命隳使職負陛下所舉以重臣之罪方今濟濟多士盈於朝列陛下舍而不用而拔臣於苫廬之中必以臣智識為小有可採臣之他日猶不如人況今尫薾餘息方寸紊矣焉能為陛下振揚休命覽觀風俗竊自惟忖知不勝任是以拳然寸丹猶冀識察陛下仁聖孝德錫類海內豈令善貸不霑臣身敢希殊造俯遂微懇則死之日生之年也臣無任哀懼之至臣某言一昨臣以哀瘵叨奉恩私封章三上不蒙矜允猥以羸薾之質謬銜出疆之命賴陛下威靈免貽咎責復得待罪朝闕許守几筵仰荷天慈俯慙靈祐臣某中謝頃陛下不以臣駑蹇特加寵渥者豈非知臣屬辱忝宗盟曾奉使河朔謂能闡揚天旨懷柔遠方而尚書省材賢如林庶政必舉陛下垂拱㣥臣守職固不假臣以區區之力重尸省闈明矣今將命既復本職未解敢恃皇眷輒復陳乞臣煢然在疚獨無兄弟荼毒日淺創巨痛甚且又疹病四體支離重寄榮遇人之所欲力有不任名敢虛受此臣所由拳拳不已有望於陛下也臣伏以三年之喪未足申罔極之恩先王制禮以節人情臣在喪未逾一年奉使已歷三月若又假國家名器食陛下祿俸是臣亡母於臣有終身之愛而臣於亡母無數月之報先聖以孝感為號陛下以孝德格天錫類之恩宜及海內今寵命一降使臣有不孝之目子而不孝如臣不忠不孝不忠人所當棄是又豈足為陛下操持綱轄彌綸憲章臣之頑固猶知不可况天下僉論朝廷公議乎伏願許臣免冠遂臣私志倘終喪紀尚有餘息誓當摩頂粉骨以答殊恩臣無任臣某言臣去年十一月某日又詣銀臺門下上表陳情至今積旬未奉恩旨屏營無地哀惶疚心臣某中謝臣蕞爾朽質叨奉明恩違天固辭豈不知罪實由恃陛下蒸蒸之德故敢守臣子區區之意伏以忠孝之道禮生於情資親事君愛敬同等臣生處聖代齒力未衰致身日長效節途遠獨慈親違棄永往莫追先王制禮居喪之紀有限昊天不弔欲報之德罔極而今茹痛緘哀冒寵干責雖欲僶俯從事使臣何以為心蓋三年之喪金革無避自魯公伯禽晉襄公始也實以徐戎秦師之役有為為之非是則否故孔子對子夏問曰以三年之喪從利者吾不知也今朝無徐秦之難臣非金革之任竊陛下名器是從利於喪也食稻衣錦之責捨臣誰歸凡曲全萬物使不失性天地之仁也鞠育煦嫗知寒熱疾痛父母之慈也兼而有之明君之惠也臣是以又持悃款昧死上言竊希天父之恩不奪臣子之志泣血待命惟陛下省察臣無任臣頃頓首昧死詣闕纍陳情狀肝膽悉以披露懇誠冀蒙識察於今浹辰德音不下實由臣詞淺意陋無以動天哀惶失圖局蹐無地臣某中謝臣雖親忝葭莩才實駑鈍位忽過望恩亦加等宜竭精力仰酬造化豈敢飾讓自言企禮顧望嘗聞上有至仁之君下無失性之人陛下以蒸蒸聖德格於上下故哀哀孝思敢辭榮祿陛下豈忍抑其微誠假令臣損情變禮陳力就列亦猶雙鳧乘雁何補江海況敢貪不次之寵遺罔極之報因喪從利以哀為榮此臣所以屢瀆天威望回宸聽懇至之願形於纍表拳然待命惟聖慈察之臣無任臣某言伏奉某月日批敕矜臣荒謬之情許以殘喘終喪使奉几筵獲展哀報陛下誕敷五教惇敘九族以臣屬忝枝葉哀廠田坴蓼莪恤以皇慈使及於禮天地之意曲全人欲日月回照下及苫廬伏讀詔書感懼交集仰戴聖造若蚉負山屏營瞻奉惶懼隕越臣無任哀戴之至臣某言伏奉二月五日制書大赦天下喜氣動天榮光被物百神踊躍衆庶悅豫臣某誠歡誠喜頓首頓首臣聞大道所寶莫先於慈聖人之德無以加孝陛下執大象以御物不得已而用兵假一戎之威為萬物戡難再造區宇以康黎元慈之至也纂服配天不失舊物然後增鴻名以嚴父正榮號以恭已元元本本尊尊親親孝之大也猶慮物有不遂其性政有不阜於俗宏肆眚之恩與天下更始滌瑕蕩穢燭幽及微風行物表鏡照海內雷作而萬戶蟄振網開而三面鳥飛陽春無私品物何幸臣位忝郡守預沐渥恩績考勳微徒沾潤澤臣無任抃躍之至謹奉表陳賀以聞
