front:
  text: 全唐文欽定全唐文卷四百二十九于卲七
  hash: sha256:84622227b298eada687c83d8b53d8454765f8a9d5181550faa79b919683fc5bc
body:
  text: 周克殷列爵惟五實分子男之位洎秦漢以降或令或長雖小有差其揆一也皆銅印墨綬秩六百石非理道之君愛人如子則不能為官擇人矣國家坐進此道至於憂勤爰增祿秩以勸能者皇帝觀兵朔方之歲始上祿縣更名漢源將復禹舊績以從人欲其山川形勢土地風俗近鎬千里華風不閒多乎哉蓋小國以聚大國之義也且夫南呀蜀門東豁雍畤西走連磧北逾大漠四郊憧憧者於是乎終故有獄市之煩供億之費上咨郡府下用臨恤非貞固不足以幹事非廉慎不足以率人清靜則可乎不擾忠恕則可乎求瘼時謂京兆韋子當公府之選推而有之至于今人易受賜邑則稱理聞之見之政參乎前從事雖疲於改易用舉自多於㯋脫我則無貳不其難乎嗟乎絆驥已久及瓜將代顧此屋壁何其寥寂前芳無聞後進奚覩記者史家之流也亦所以發揮廳事啟迪人物又知韋公授受之始其或繼之者從而記之前後相映光采洽人乾元三年孟夏之日記開元中有柴希言自滏陽縣尉拜以清白名聞遷洛水縣令天寶中有郭瞻自永康縣尉拜甚有能事秩滿遊河朔遇亂未知所適至德中有郭伯陽自某官拜恂恂如也遷洋州司馬其餘日月某通名氏失之不得次于公之列耳司錄之職雅有前志著乎屋壁舊矣自乾元元年四月皇帝郊于上元用柴禮以報功也施惠行慶大庇于生人厥有條目其一在天下糺曹而加秩以為此官郡府之樞轄政之小大自我裦貶若網之在綱猶衣之有領會人存政舉所益者多蓋聖人之新意為國之大體由此作者時論宜之副相李公兼領京兆祇奉明詔深難其選自中及外心必參之趙郡李侯春自監察御史出行虞鄉令到官九十日表之而還則向來之言無所闕矣上布此令下乃宏是舉咸有一德庶乎賡歌凡厥能事此非所載猶恐遞遷之後混而無別不務首題孰為夫子愚以李侯同聲之故見副舉善之方謹而志之敢以專達如後之觀者將辨乎始事覽此中記非公誰歟易曰艮為山為徑路為門闕梁山之有劍閣也厥象備焉首以峨嵋足以荊巫前裦斜而後靈關橫亘乎數千里之閒孕川含陸以作全蜀趨蜀之路必由是山連峰戛天上絕飛鳥極於此也峭壁中斷兩崖相嶔如門斯闢如劍斯植辨徑術之可從於彼也於戲上古聖人之宅於九囿也必因山川之固為設堡障以安之恐其自絕於一方也雖有高深之阻必啟行路通之是故天下書同文教同體梯航內向而禍亂不作觀乎劍閣見聖人之德焉偉夫抉連山開積阻剖盤石擘崇巒呀然洞裂斗絕千仞遠迹奇伏神靈怪異謂之天造之資則有攻鑿之形矣謂之人力之用則無掎拔之勢矣豈五丁為役歟泯泯茫茫不可得而詳也若乃迫隘之所容邅迴而後通翕巴漢之萬轍總岷嶓之重險一夫而禦之則三軍無所施其勇覆簣而防之則逸足不能踰其阻故漢高因焉以定楚項之難元宗幸焉以銷陽九之變蜀王無道惠文伐之公孫僭號光武滅之由是而言則劍門之險所以助順不以興亂所以輔中州不以限荒服苟戎夷議侵軼狂愚懷割據逆天反道必覆敗隨之皇帝諒闇之初歲在已未漁陽公作鎮之一紀也蠻夷之眾寡君長之情偽道途之險易攻守之利病皆暗得於胷中不差於毫髮矣而犬戎承我遏密犯我亭障以其控弦十萬與㣥蠻之師出沉黎出火井出束束火道出仇池邊兵禦之不勝歊然有北閉劍關而拒我後援西入蜀都而全其地時西州伯朝覲京師寇出不虞㣥情大駭朝廷固已知漁陽公舉無遺策仍發禁衞貔貅之旅俾受律於公公元合廟算分軍守隘且度其能來而不能用可取而不可迫命諸營堅壁勿得戰收軍入閣道示之以無人賊見諸壁不可攻而劍門不設備果疑有伏莫敢前窺公曰彼悉銳而來謂所行無却今頓軍數日其氣已衰且入我既深多而不整可以擊之矣乃夜出精卒擣其前營㣥兇震擾駭若隄潰棄其矛甲者十有四五顛於坑谷者不可勝計公命緩逐勿遏其歸既而又破之于龍安不二旬緣邊千里之寇悉燒營遁去危邦載合天府載寧州閭以出溺相存父子以厥初相歡自蕃戎為梗未有若茲歲之甚惟中權制勝未有若是役之大天子聞而嘉之焉即下詔書勞之略曰微公戮力王室蜀其左衽矣德音裦倚也如此於戲仁者由劍門以之為福不仁者由劍門以之生禍獨漁陽公之克戎於是也配乾功之可久與坤德而同順革戎心于永代揚天聲于無極昭昭焉難乎其與京矣昔班孟堅勒銘燕然紀竇耿勳業夫燕然無王褱異之迹徒以書其片石見載前錄人到於今稱之而劍門井絡垂芒坤維蘊靈漁陽得其形便輝灼藩翰語乎山則有畫象之奧語乎人則有蓋代之績而頌聲不著於燕然英名不加於竇耿抑當時之所取而吾黨之所病昔予剖符列郡祗服元侯耳目所得稱傳罕備雖言之不逮其可已乎是用纂述為劍門記卜筮生靈之縕耶必遵以信時日畏法令決嫌疑定猶豫者也自伏羲畫卦周公制禮率先斯道以惠其人故立筮人建卜曰卜職或掌三易以辯乎九筮或開四兆以作乎八命俾吉不相習假爾有常叶乎乾坤調彼昭昧占兆審卦異位同功不其然歟夫以原始要終鉤深索隱則象事知器占事知來蓍辯吉凶則圓神而方知龜窮禍福乃戴陽而履陰繇得蒺藜終驗齊莊之難兆聞鳴鳳便興敬仲之宗然則筮短龜長嘗聞其語義之何著今試論之且其兆體百有二十夫其頌聲千有二百由是其尚也夫龜者著性命之理有好惡之情善出入之端存生死之變冠㣥甲之長居四靈之閒上高法天下平象地壽三千歲而遊於蓮葉之上吸以沆瀣之精蓋通其聖也何彼叢薄之下蘙會之中生而無靈長而無識奉大衍之數而為準求元亨之義而為用探賾而知其變審爻而據其辭豈與夫灼而專達居然獨見同年而語矣史偏以之佐昌此其效也墨以之從長又其效也衞人以龜為有知漆雕以為善對又其效也至如管輅卜鄰之火孔愉反顧之鑄蓋小之也則知靈德感應觸類而長矣故朔望則灼孟冬命舋蓋先王之重者萬事之階也信矣夫石龕之作司馬楊公福謙室無他贏蓋損已以蕆事憑厥底績資于有家聖無不通必與此合况西方之樂大會之地鳥獸草木長皆為梵聲我心既降彼應潛速故喜施願往者率多於諸方廷尉平于卲聞而贊曰倬現睟容蒼然高岑上非道隔下不塵侵自此中逵發彼狂心往來既護我福攸深右轉清㵎前瞻布金獨園對境雙樹齊陰石泉潺潺山木森森詎知奇物未識珍禽西方之因妙樂傳音維是設像毫光載臨去聖何遠茲焉可尋佛功德所以俾福也如鄭童之福得無俾乎閒者門闔卒廢僨于童上絕倒不寤久之而蘇收在懷抱氣則奄奄心如旁懼口不能言遂啟手足以全告審視聽以示舊膝下之愛辟咡而詔舉以善攝悉能自強父之寮于卲目而奇之曰不有此慧安有此令鄭氏其興乎奇童名自此而始然則菩薩者利益故觀音者觀世是用繢事發于童心相好已具大圓既照天衣若飛楊柳疑拂以是憑福信無有邊贊曰奇童奇童兮厄于門門雖廢兮童其存菩薩觀音兮破諸昏丹青相好兮人中尊福我奇童兮永無垠孟冬十月旬有三日我皇帝降誕之辰也百靈會祉萬方集慶於是檢校刑部尚書左羽林大將軍紀國公臣高昇與一二軍吏稽首言曰竊稽首窅冥賾乎至精道本無二聖惟歸一超於物則拯拔㣥迷現於時則亭育眾品電繞之與夜明也豈其俶歟惟聖表聖唐哉皇哉請以真如之像延景洪福粹容留霍神變燭耀四天周迴八部圍遶信足以上旌至德下攄至誠臣哉鄰哉敢為贊曰道本一兮聖無二靈相炳兮我身是狀至聖兮昭至尊叩帝閽兮羾天門福穰穰兮委如山仙狀秀出丹青寫似亭亭玉立峩峩嶽峙野鶴無㣥天鵬擊水英華閒發真素相擬銳上當侯豐下有子環林既搆鐵柱茲始風騰雲會一日千里相者何為贊之而已英姿一絕自出常倫揮毫得妙又全其真真不失舊舊有彌新挺如鶚立婉似虹伸當封在骨得正從神綠車協相白馬稱珍吳侯吳侯翻然收秦愛而不見見似思人貴之者真得之者難松有勁質匠乎筆端森疎空倚挺拔上干如出絕壑若生大寒枝蟠龍變皮拆龜攢青蘿若挂白鷺愁看美華原之墨妙能入室而思禪願主人之比壽從君子之靜觀惟士立德必先修詞學猶殖也問以辨之古有明訓守而弗失質豈勝文文其猶質近古以降末學非倫友無求已進欲干人鐘鼓在堂和聲遠至金玉無質良工以器良工謂何如琢如磨唯善克舉不知其他文之為大言不可已上應天光下符地理彼其之子云胡不知見豺則戰惟武之皮坦坦履道自強不息粲然可觀何命與力耽耽公府秩秩德音文苑重式詞場以箴側陳芻議敢告翰林維貞元二年秋八月天子以郡國二千石之高第者曰隴西李某字某利澤施於裔土美化被乎遐甿是用遵虞書陟明之義參周官進律之典俾之由檢校右散騎常侍兼御史中丞容州刺史本管經略守捉招討處置等使為御史大夫嶺南節度經略觀察處置等使實授兵符加擁使節某月自合浦如南海於是縣道谿谷鰥寡孤老洎于士吏相與懷思隱然不去乎心森然不離乎目願所以昭明其德光示于後嶺南經略使判官權知容州留後事監察御史裏行同郡李牢始以文學居辟選之首遂參帷席復以謀能當器任之重留總軍府美公之政大備感公之禮有加因其人之請而上之上可其奏夫其郡之四封濱于百越外則有山寇海孽比境雜處之虞內則有勤戍勞師流散轉死之弊親帥其下以撫吾人慰薦傷夷安集疲耗懼貨貢之闕至助之以家財憫徭事之繁至代之以私屬選武藝歸老疾罷減塞卒四千餘人以趨農事率浮墮闢汙萊開置屯田五百餘頃以足軍實舍寇賊之為縲囚者釋而遣之以除其怨而狙獷以順禁人民之相虜賣者執而誅之以去其害而童昏以安常歲有災濫炎而連燒于廬舍公創制以禦其鬱攸而邑居以葺舊俗多怨睚眦而致毒于飲食公立防以解其悁忿而鄉黨以和樹板幹而啟閉畢脩列亭燧而呃害斯控差重輕以行徵令無不均之譏量遠近以納貢職無不供之責人用富庶家有儲峙敦之以禮懷之以仁潔已而不汚未嘗有貰貸勤身而不怠未嘗有懈弛明足以照遁情隱慝而不為察威足以制猾人暴吏而不為苛古之良能何以加此其人之獻狀云爾惟公我有唐宗室枝屬之選鹽州刺史諱孝詵府君之曾孫宏農郡太守諱璟府君之孫太子太傅贈司徒諱齊物府君之子洪緒丕績之餘裕宏休純懿之下鍾寬博而柔良高明而疎達根於經義飾以藝文故其仕王畿宰京邑累執憲且登軺車備重臣賓介之職居大府紀綱之任三亞京尹兼中司之貴復為宮相在常伯之位歷饒州刺史而後至於是州恩結於人功加於物必聞理効而興頌聲且夫有美焉有刺焉詩人之義也善善而裦之惡惡而絀之春秋之事也使賢士大夫之事業不沒於後太史公之制也以余之嘗修史記而為訓辭緣人之懷心而頌之曰帝念南方迫於蠻夷人新被寇歲或勞師屬之於公俾養牧之匪直勤身亦帥其屬贍我貧匱字我惸獨息人便農墾田積粟修其教化被以威德賊害既除禍災斯息完我廬舍親我骨肉咸保其生且易其俗蚩蚩㣥族孰不蒙福播為頌聲公受百祿彤弓玈矢以長諸侯人之懷德刊石垂休易之繫云君子之道或出或處其出也為國藎臣銘勳彞鼎其處也保家燕居谷神齊物蓋舒卷在我不違其正而已今得之於孫常侍歟公姓孫氏諱常楷京兆涇陽人也有魁岸之姿有沉毅之略年甫羈丱而筮仕焉委質四朝咸著聲績在元宗朝拔乎㣥萃之中始受賞九層之構兆於此矣在肅宗朝特見寵遇其時襄陽易師滑臺命將屬安羯史盜作亂之後兩軍未戢王命或壅以公有奉使專對之才俾受節鉞將我詔旨襄峴嚮風河滑朝宗皆公之力也在代宗朝僕固懷恩擁眾汾上仍以姦子作亂外邑北窺大鹵之地南侵蒲坂之封蟻聚鴟張關輔震駭公以單車之使仗節直進誕敷威德陰攜黨與元惡奔潰狡童折首猶以餘眾嘯聚朔陲公乃通和獯戎俾發義師與郭汾陽等諸軍犄角姦兇敗績萬國底寧斯又公之勞也前此急宣藩維會計大務必能盡瘁以奉投艱明明三后稱歎多矣事今上也每侍帷幄且曰求舊嘉謀讜詞入陳出祕扈避狄也著奔問之勤從省方也有執羈之効逮法駕還宮特加裦獎斯又公之忠也其後晦明生疾屢在長告是能閉朱門蔽華屋不屑塵事隱几頤神惟清淨為師惟友愛是篤物我俱喪不知老之將至云爾本其族姓則春秋時在衞世卿三國時有吳稱帝魏晉而下代生明哲至大父孝廉擢第烈考庭玉右金吾衞中侯贈亠兊州刺史或高尚不仕或大用靡臻第其揚歷則四進散官五遷近職釋褐內寺伯遷文林郎內謁者監賜緋魚袋轉朝議郎內給事上柱國特加朝散大夫更名常楷擢受內常侍修功德使夫積善之家其後必大故長兄嘉賓黃州別駕贈大理少卿仲兄知古故開府儀同三司魏國公公與開府宣力王家首冠貂璫腰垂銀艾便繁禁闥炳燿聯華四紀于茲亦云盛矣貞元五年七月二十三日卒于廣化里之私第享年六十一明年十二月五日葬于涇陽縣高平原先塋之側次亡兄之兆蓋不違親而得族葬之制也夫人魏郡邵氏祔焉用周公之典也初開府當肅宗朝以直諫忤旨配流費州及代宗踐祚公屢建勳伐密勿之際陳懇友于即日詔追仍復官爵既至矣特上封章請割衣食之費於涇陽縣卜爽塏之地建立伽藍上報皇慈覆燾之恩次展天屬怙恃之功優詔嘉許錫名曰寶應眾善計費維億繄公是職君子曰開府創之公能就之豈非忠於國孝於家嗚呼吾見夫二公報主之心昭矣顯親之道終矣異時歲或大祲人有菜色公常設粥以食餓殍斯不曰仁乎公植性慈惠尤深象教靡茹葷血務施緇徒斯不曰善乎故歸全之日恍如先知乃召㣥子載授理命尸坐自若奄然而終談者以為報施明徵矣有子良斌朝議郎前行原王府錄事參軍上柱國賜緋魚袋克奉前修雅有令問進可事國退可幹家先公而亡矣猶子正議大夫行彭王府諮議系朝議大夫內侍省內給事上柱國充慶州監軍榮義朝議郎內典引上柱國僧法航法律等奉引進之恩深泣血之感窀穸哀送必虔必信以卲嘗備史官見託銘述蓋春秋裦善之義敢不承之銘曰兵諫雖忠不可以訓賦詩而對亦奚足徇猗我孫公不緇不磷以道而退以禮而進摭實去華履剛能順策名四后克昭忠藎宣諭反側以安觀釁悖叛是殘迺和獫狁迺復天倫闕四字忠焉孝焉家邦必聞移病歸休從吾所尚道心中接塵機外喪繇是歸真不嬰無妄高平之原于以卜葬後人與歸觀銘是諒司馬姓田氏名某字某其先蓋自齊諸田之裔遠代仕漢徙家於秦世為京兆茂陵人也生而岐嶷七歲能誦詩遂通諸經齒太學數歲不上第因左常侍王倕受鉞西河之地乃喟然而歎謂同舍生曰大丈夫立身致位不在於此徒索長安米耳遂投刺王公見而奇之數日酬對以為必可用也遂表隨軍要籍從事耳目甚有裨補居無何公罷將軍下勢祿乃不及亦無慍色御史大夫哥舒翰兼統五原雅知其人得之甚喜表清勝府別將非其好也人皆歎屈獨不以介意驟改永平府左果毅長松府折衝雖從例敘亦不出牙幢之內矣天寶中士馬殷富國用仰給哥舒公得黷武於河隴之閒橫行青海河收九曲西拓蕃境數千里置亭侯郡邑創鄯城郡於河源軍又隸臨蕃縣由是選舉能吏以充員位者見善如不及臨蕃介在大府尤難其人所被斟酌者蓋百餘輩人人自以為得令而哥舒公決策取之招輯新附承上接下罔有不悅其聲洋洋播於遠近會安祿山以范陽叛潼關失守有詔御史中丞郭英乂專制隴右未及下車表渭州隴西縣令實資舊跡撫我凋甿曾未浹年風俗大變郭公嘗按部至邑見其治理裦歎久之不以禮物為隔時為公道見合下榻宴慰累日方還今閬州刺史馬雄參謀軍事亦幕之良也時有序述滿歲鳳翔尹李鼎復兼隴右以秦渭臨洮餉饋不繼發漢陽之賦以資之遂舉知長道縣事仍表請起拜清要固謝不獲隨牒員來在公之勤歲寒不易嘉聲美政益震於曩時自是日慎一日謙而致讓者至於數四時特進鴻臚卿兼刺史太原王公勞於取人逸於用人前後裦貶無有不當田公雖讓德有餘而王公渴日不足遂舉攝司馬仍知縣事聊以為喻且俟後命書曰靡不有初鮮克有終田公有焉詩曰惟其有之是以似之王公有焉故人歌之曰二公更事闔境之庇二公其休誰其為嗣君子聞之曰漢陽之郊政有經矣昔有巫宓卓魯亦由今之視昔雲霄之望豈徒然哉卲忝春秋之徒實採輿人之誦執以往為之傳云
