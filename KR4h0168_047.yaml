front:
  text: 全唐文欽定全唐文卷四十七代宗二
  hash: sha256:a770c27e391edb16d16aaa465950f6610206af59bf0fdb271c62bb94948c0e3b
body:
  text: 聖祖仙都高宗園寢希夷清淨之所肅穆哀敬之地二鵲翔集以月繫時常銜塈茨用補缺壞顧政禮之多闕而先靈之幽助祗奉貺祐感切良深卿等道備梓材任當構廈覩茲符應庶洽康寧實賴嘉謨弼豫不逮所請編諸史冊者依故齊王倓承天祚之慶保鴻名之光降志尊賢高才好學藝文博洽智略宏通斷必知來謀皆先事識無不達理至逾精乃者寇盜橫流鑾輿南幸先聖以宸扆之戀將侍君親惟王以宗廟之重誓寧家國克協朕志載符天時立辨羣議之非同獻五原之計中興之盛實藉奇功景命不融早從厚穸天倫之愛震惕良深流涕追封胙於東海頃加表飾未極哀榮夫以參舊邦再造之勤成天下一家之業而存未峻其等歿未尊其稱非所以旌徽烈明至公也朕以眇身纘膺大寶不及讓王之禮莫申太弟之嗣所懷靡殫邈想逾切非常之命寵錫攸宜敬用追諡曰承天皇帝與興信公主第十四女張氏冥婚諡曰恭順皇后有司準式擇日冊命改葬於順陵仍祔於奉天皇帝廟同殿異室焉夏后氏五十而貢殷人七十而助周人百畝而徹其稅皆什一也故謂之天下中正而頌聲作矣乃者因三代之制定其稅典務於行古庶以便人屬以外攘四夷歲會戎事軍國用度公儲匱乏役費薦至近於倍征而吏或奉法不謹失我字人之意孤惸者資有厚斂豪富者貸以輕徭動而生奸浸而流弊稅之什一其實大半致有去父母之邦供庸保之役流離逋蕩靡室可依阽於死亡而莫之省每一念至良深憫惻頃以釐改從其便安置沃塉之差寬賦斂之重今邦畿之內宿麥非稔去秋墾田又減常歲昨者徵稅其數頗多朕以萬姓不安三農將廢憂勤鬱切中夜以興思以康濟庶臻其道每欲悉免量入將惠其困而未解兵嚴猶資日費用蠲常數以恤疲人其京兆府於今年所率夏麥宜於七萬石內五萬石放不徵二萬石容至晚田就後以雜色斛斗續納仍委京兆府尹崔昭差少尹李椅于頎等分縣巡撫必躬必親宣示朝章令悉朕意獻誠早分戎閫屢建茂勳出靜漢川入司版籍傷和致疹寢疾經時深執謙沖屢陳章表願辭右職冀及痊平嘉茲懇誠曲遂勤請佇聞痊復當有褒升所請者依恃衆專殺謂之亂常合族併命謂之不道按以春秋重其責帥況自悖人理實生厲階合從棄市之論尚就議親之典夷州流人前潁州刺史李岵幸以宗屬列於藩任政之不修亂是用長輕侮法令動搖軍州御史姚奭巡至所部其弟參於佐理諸將素有猜嫌欲加之罪不可無狀遂言使者之來事在不測俾其完聚甲兵變更將守潛疏其意以搆禍萌而岵親自點竄詐云奭之遣墮以此疑衆因而合謀兄弟同誅宗黨咸淪胥而斃又陷數家勒兵抗威以拒所統人不堪命一方騷然頃發近臣審令按理醜圖既露姦狀甚明薄示戒懲巳從流斥詢於羣議頗屈常典朕思以道德在宥天下庶使一代之人登於仁壽之域風俗猶薄政教不明致令長吏專此威暴無罪無辜橫分身首冤氣慘結有傷元和惕然增懷良亦自咎期於止殺不可措刑寬其斧鑕之誅降從盤水之禮宜賜自盡雖恩不掩義道在無私而禮有緣情誠亦多愧王者之法敢忘至公凡百卿士宜知朕意蓋議讞之道期於無刑有明罰以校其犯者有立訓以導其迷者有捨過以舉其才者有諭旨以愧其心者在於聽理必參而用之朝奉郎守京兆府奉先縣令賜緋魚袋張增忝為奉法之吏不具獄論而自專威命雖義形嫉惡而情近深文鄜坊都防禦使衙前將右驍衛大將軍員外置同正員賜紫金魚袋叔孫勝不率戒訓自抵彞章恣其奮猛以至凌犯豈非惠姦縱暴者歟凡人之情各於其黨皆不能屈心引義同合至公過用此生刑用此作詢於卿士咸引正議朕以增之宰邑頗有政能惠於疲人可謂良吏勝亦久服戎事備經戰守艱虞巳來纍有勳績並寬以常憲惜其所長俾從罷黜用佇來效宜各解見任其叔孫勝仍付抱玉軍前驅使夫計人而置官度事而賦任因時立制損益在焉吏足以理人人足以奉吏則官稱其祿祿當其秩然後上下相樂公私不匱昔漢光武時及魏太和中並減吏員兼省鄉邑致理之道此其一隅今連歲治戎天下凋瘵京師近甸煩苦尤重比屋流散念之惻然人寡吏多困於供費欲其蘇息不可得也設令廉恥守分以奉科條猶有祿廩之煩役使之弊而況貪猾縱欲而動踰典章作威以虐下厚斂以潤己者乎古者縣置大夫一員足以為治奚必二佐分掌而後治耶且京畿戶口減耗大半職員如舊何以堪之豈可以重困之人供不給之費使人不倦其在變通制事之宜式從省便其京兆府長安萬年宜各減丞一員尉兩員餘縣各減丞尉一員餘委吏部條件處分朕嗣守鴻業恭臨寶位夕惕若厲蹈乎春冰啓三乘之真如為萬姓以作福大雄感應示現毫光茂對禎祥多慚薄德卿等百辟勤修庶政休徵薦集慶慰當深所請編之史冊宣示中外者依比屬秋霖頗傷苗稼百姓種麥其數非多如聞村閭不免流散其大歷五年夏麥所稅特宜與減常年稅卿公輔朕躬協全大化頃緣軍國務總陽和致乖涉於旬時藥弗瞑眩屢薦章表固求歸閒謙沖再三辭志懇苦冀遂全攝重違厥誠康復之日且有後命內外文武官及前資官六品巳下並草澤中有碩德專門茂才異等知謀經武諷諫主文者仰所在州府觀察牧宰精求表薦如所繇搜揚未盡遺逸林閭者即宜詣闕自舉親當策試量能擢用王制命市納價以觀民之好惡布帛精粗不中數廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉克己惇朴化人每尚素元之服庶齊金土之價而風俗不一踰侈相高浸弊於時其來自久耗縑繒之本資錦綺之奢異彩奇文恣其誇競今師旅未戢黎元不康豈使淫巧之工更虧常制在外所織造大張錦硬軟瑞錦透背及大閒錦竭鑿六破巳上錦獨窠文紗四尺幅及獨窠吳綾獨窠司馬綾等並宜禁斷其常行高麗白錦雜色錦及常行小文字綾錦等任依舊例造其綾錦花文所織蟠龍對鳳麒麟獅子天馬辟邪孔雀仙鶴芝草萬字雙勝及諸織造差樣文字等亦宜禁斷兩都委御史臺諸州府委本道節度觀察使切加覺察如違犯具狀奏聞文單遠國自古未賓能瞻八律之風來申重譯之貢君臣入覲嬪御偕朝越海踰山輸琛獻象顧慚薄德有邁前王此皆宗社效靈上元幽贊卿等寅亮台鼎燮和神人翼致感通無遠不屆永言輔弼慶賀良深所請付史官者依周有越裳重譯漢有槃木獻詩遠方來儀從古所記文單國副王婆彌慕我中朝之化方通南極之風義在撫柔禮當加等可開府儀同三司試殿中監卿位重台衡勳崇師律爰加倚任兼總漢中庶展謀猷遠寧郡邑而卿情殷退讓辭統巴岷志戀闕庭兼鎮河隴高謝玉宇務更分憂言念至忠益堅大節永懷誠願深用慨然覽卿表章曲遂來請大道之行同合於異相王者至理總歸於正法方化成之齊致何儒釋之殊途故前代帝王罔不崇信法教宏闡與時偕行特進試鴻臚卿大興善寺三藏沙門大廣智不空我之宗師人之舟楫超詣三學坐離於見聞修持萬行常示於化滅執律捨縛護戒為儀繼明善教之志來受人王之請朕在先朝早聞道要及當付囑常所歸依每每執經內殿開法前席憑几同膠序之禮順風比崆峒之問而妙音圓演密行內持待扣如流自涯皆悟滌除昏妄調伏魔冤天人洗心於度門龍鬼受職於神印固以氣消災厲福致吉祥實惟宏我之多寧止利吾之美當有命秩用伸優禮而得師為盛味道滋深思復強名載明前志夫妙界有莊嚴之士內品有果地之儀本乎尚德敬順時典可開府儀同三司仍封肅國公贈司空諡曰大辨正廣智不空三藏和尚帝王之制禮有三驅弧矢之威財成理道朕方欲清靜流化無為軌俗射御之藝闕而不書卿等援據禮經博求良典舉聖祖岐陽之狩徵漢皇郊廟之歌再陳表章頻志簡冊式遵彞訓宜依所請淮南數州秋夏無雨揚洪宣等三州作坊往以軍興是資戎器既屬時歲大歉慮乎人不寧尸占徵夫役工損費尤甚務從省約以息疲人亦宜並停如聞巴南道州自頃年以來其有結聚或攻陷城邑者申明朝旨曉諭令歸各許自新一切不問庶亦隨材敘用俾效誠勤各復其居勉從所務展歲時伏臘之祀洽宗黨鄰里之歡人之常情當所思慕必在長吏敦率設法安存勸其農耕恤其疾苦如刺史縣令有能政字人民使流亡日還戶口歲益宜委觀察使録狀奏聞當別加超獎宣示士庶令知朕意四海之內方協大寧西戎無厭獨阻王命不可忘戰尚勞邊事朕頃以兵革之後軍國空耗躬率節儉務勤農桑上元儲休仍歲大稔益用多愧不知其然雖屬此人和近於家給而邊穀未實戎備猶虛因其天時思致豐積將設平糶以之餽軍然以中都所供內府不足粗充常入之數豈齊倍餘之收其在方面藎臣成茲大計共佐公家之急以資塞下之儲每道歲有防秋兵馬其淮南四千人浙西三千人魏博四千人昭義二千人成德三千人山南東道三千人荊南二千人湖南三千人山南西道二千人劒南西川三千人東川二千人鄂嶽一千五百人宣歙三千人福建一千五百人其嶺南江南浙東亦合準例恐遠路往來增費各委本道節度觀察都團練等使每年取當使諸色雜錢及回易利酒贓贖錢等每人計二十貫每道據合配防秋人數多少都計錢數市輕貨送納上都左藏庫貯以納充別敕和糶用并不得剋當軍將士衣糧充數仍以秋收送畢卿憂深慮遠殊沃朕心始終倚賴未可執辭也虞夏之制諸子疏封漢魏以還十連授律是用錫圭班瑞磐石開疆信通邑之紀綱為中都之屏翰然則旌鉞之寄推擇攸難因親之任各膺其命第四子述第五子逾第六子連第七子迥第八子遘第十三子造第十四子暹第十五子運第十六子遇第十七子遹第十八子通第十九子逵第二十子逸等並敏茂純懿稟於衷誠溫良孝恭形於進退動皆合義居必有常可以理衆靖人撫封宣化而總列城之賦繕分閫之謀克勤公家允輔王室今則均茅社之寵盛槐庭之儀授鉞登車副茲朝典維城之固爾其懋哉述可封睦王充嶺南節度支度營田五府經略觀察處置等大使逾可封郴王充渭北鄜坊等州節度大使連可封恩王韓王迥可汴宋等州節度觀察處置等大使遘可封鄜王造可封欣王充昭義軍節度觀察處置等大使暹可封韶王運可封嘉王遇可封端王遹可封循王通可封恭王逵可封原王逸可封雅王仍並可開府儀同三司自古屈法申恩與之更始者為君之道也務善改過期於自新者為臣之節也其或棄瑕含垢宏貸之澤巳深而挾僞藏奸干紀之情轉露則亦中外同棄刑憲不容西漢伏信越之誅東京齊萌寵之罰此皆前王典式也魏博節度支度營田觀察處置等使開府儀同三司太尉檢校尚書左僕射同中書門下平章事兼魏州大都督長史上柱國鴈門郡王田承嗣出自行閒策名邊戍早參戎秩效用無庸嘗輔凶渠驅馳有素洎再平河朔歸命轅門朝廷俯念遺黎久罹兵革自祿山肇禍瀛博流離思明繼釁趙魏堙厄枌榆井邑靡獲安居骨肉室家不能相保念其雕瘵思用撫寧以其先布款誠寄之為理所以委授旄鉞之任假以方面之榮期爾知恩庶能自效崇資茂賞首冠朝倫列異姓之苴茅登上公之禮命子弟童稚皆聯臺閣之華妻妾僕媵並授國邑之號人臣之寵舉集其門將相之權兼領其職夫宰相者所以匡輔王室休庇生靈獻可替否救灾恤患而乃據國家之封壤仗國家之兵戈虐國家之黎人調國家之征賦掩其資實憑竊威靈內包凶邪外示歸順陷誤良善賊害平人騁其樂禍之心俾叶同惡之體且相衛之略所管素殊而逼脅軍人使之翻潰因其驚擾便進軍師事跡暴彰奸邪可見不然者豈志清之亂曾未崇朝子期光朝會於明日足知先有成約指期而來是為蔑棄典刑擅興戈甲既云相州騷擾鄰境救災旋即更并磁州重行威虐此實自相矛盾不究始終三州既空遠邇驚陷更移兵馬又赴洺州實為暴殄不仁窮極殘忍又薛雄乃衛州刺史固守本藩忿其不附橫加淩虐門盡屠戮無復噍類酷烈無狀人神所冤又四州之地皆列屯營長史屬官擅請補署精甲利器良馬徑兵全軍之資裝農藏之積實盡收魏府迥無孑遺更復收管將士闕其本部劫質妻子給我資糧觀其所為蓋在無赦且藏庾者平人之膏血恣行貪竊甲兵者干城之腹心輒為舉動欲行討問正厥刑書猶示含容冀其遷善俾豫東夏之人終免無辜之酷抑於典憲務使慰安遂遣知古遠奉詔書喻以深旨乃命承昭副茲麾鉞撫彼舊封而承昭又遣親將劉渾先傳詔命承嗣逡巡磁相仍劫知古偕行先令姪悅潛扇軍吏至使引刀自割抑令騰口相稽當衆喧囂請歸承嗣論其奸狀足以為憑此而可容何者為罪今尚全其首領更授藩條貸以朝章用遵時令其承嗣宜貶授永州刺史兼許十歲以下一男一女隨身便路赴任委河東節度使兼御史大夫薛兼訓練馬步一萬五千人即赴邢州取承昭處分逐便招撫應變權宜成德軍節度使檢校左僕射寶臣精選驍雄馬步三萬二千人屯集深冀貝州等路進取幽州節度使留後兼御史大夫朱滔舉馬步軍二萬五千人進逼滄瀛權宜招討淄青等節度使檢校左僕射正己率所管馬步三萬人北臨德博淮西節度使檢校右僕射忠臣永平軍節度使兼御史大夫李勉汴宋節度使留後兼御史大夫中丞田神玉並河陽澤潞等道兵馬共六萬五千人直據淇園皆擐甲整戈犄角相應如承嗣不時就職尚在執迷則所在進師按於軍法今數郡之地迫受其兵深哀士人重遭剽掠丁壯離於農畝女工廢於蠶桑胡寧忍之蓋非獲巳緬思塗炭過在朕躬其昭義軍管內五州宜給復二年仍委承昭撫慰務使蘇息且聖人之教必也勝殘王者之師存於止殺其魏博磁相等將士並懷忠義皆被脅從但恐玉石俱焚當宜各思自拔除其首惡咸與維新事定之時罪止元凶一身並其姪悅其餘官吏將士爰及弟姪等能自歸順者皆無所問如有擒執渠魁下其城邑便以承嗣在身官爵資財田宅一切回賜自餘立功者節級酬賞夫軍行除害本以安人將吏所經薪芻必禁秋毫之犯律有常刑凡在師人各宜深誡於戲天地之大德時或降霜皇王之至仁亦聞用鉞顧維寡薄之理昧於授任之明以至興戎多慚黎庶布告天下令知朕懷臣子之義違而必懲春秋之辭服而先捨故武威以制其不恪文德以懷其自新田承嗣誤惑姦邪輒干紀律朝有彞憲當奉典刑猶示含容薄令降黜冀其遷悔全彼平人不赴所貶之官再任造端之將遲回師旅綿引旬時朕猶憫脅從誤茲併命其人何罪顧悼增懷深思改過之期以救無辜之禍而承嗣果能剋責頻獻誠辭泥首束身請歸庭闕輸心瀝懇備在封章而正己地邇蕃陲具昭誠款遂屢有陳奏達其深衷故宜宥以悔非之誠全其改往之志翻然效順頗用嘉之即宜與子姪家口等同赴上都當待以殊恩永守終吉豈不美歟其魏博所管官吏將士僧道耆壽百姓等初因迫脅曾受驅馳或久抗官軍辭不獲巳或徵科郡邑出入門庭皆懼於不全蓋素非元惡既往之咎並與維新一無所問或先在昭義軍管內諸州者並宜却還本貫各安舊業其昭義所管官吏將士截耳軍健身及家口先在魏博等州妄有驅迫各被質留原其初心本非巨惡既因詿誤先合蠲除仰即歸本州亦一切莫問各守所務無相奪倫王典無私信存賞罰脅從罔理前聖嘉謨歸命者必全知過者必宥今既納承嗣之懇請亦巳虛懷捨脅從之前非悉命原免如其譎詭時日猶事逗留國有常刑法難屢屈過期不至獲罪如初其諸道兵馬即宜同力協心大軍剋期不可追悔轉禍為福惟在此時至於再三非不深切想及官吏將士巳下奉而行之知朕懷也昔在虞舜舞干羽于兩階而苗人服洎漢高帝遣陸賈宣赦南越光武亦下璽書招附竇融然則太上以德撫人其次因時制宜其或有阻兵梗化未從紀律將畏刑以紓禍俟文誥而斯懷則明恕之道宥過為大其來久矣永州刺史前魏博等七州節度觀察處置管內支度營田等使開府儀同三司太尉檢校尚書左僕射同中書門下平章事兼魏州大都督府長史上柱國鴈門郡王食實封一千戶田承嗣頃因封壤之外或收郡邑是以下尺一之詔徵縣道之師貶刺零陵式彰典憲而國家十連將帥千里旌旗車騎繈屬於山河樓船鎖結於淮海而承嗣轅門宿將方面舊臣授鉞持衡素經委遇乃繕甲修備越河應敵然未離魏郡嬰壘自固頻遣章奏申聞款誠懇祈革心永用遷善又聞聚族興歎常思更新廢食遺寢沈憂成疾夫為君上者承天子人兼宥廣覆一夫不獲則曰時豫之辜今河南河北之人皆朕之人也豈不可念隱恤求逞其心令其父兄乘城子弟攻取矢石之下骨肉相殘邑里之閒敵讎交斃而又兵連禍結廩餼取資暴賦急征井閭殫竭男釋耒耜女廢蠶桑流離凍餒擠於溝壑而欲勞師黷武必舉彞章終夕惟慮誠所未忍且使蒼生罹此塗炭皆繇朕司牧無方非朕不德誰之過也今將損膳撤懸內省歸咎以寬承嗣宜並復承嗣本官爵仍委在彼勾當軍州事不須入朝弟庭琳及子姪等凡所連坐貶降者一切釋放並還本官仍各依舊職掌驅使其魏博相衛等管內諸州各判官兵馬使以下及州縣將吏百姓及汴宋過河將袁奉圭祝舜并將士等並從原宥一無所問於戲以欲從人必求諸道澤渚時禁仁有被於泉流麛卵不傷德可懷於鳥獸今則偃戈務全兆庶以茲明誠上答天眷公卿百辟悉朕意焉播州帶水縣百姓田悅等王者之於典刑也舉違是放聞義則歸雖審而有常亦宥而不過況本於黜免各從親纍今與之更始宜復官常當思遷善之規載勤事上之命田悅可依舊魏博節度中軍兵馬使銀青光祿大夫檢校右散騎常侍兼魏州大都督府左司馬御史中丞潮州程鄉縣尉田綰可依舊檢校尚書駕部郎中兼御史中丞柳州義章縣尉田緒可依舊試京兆府參軍萬州南浦縣尉田淪可依舊試大理評事自頃軍嚴未解政或隨時多逐權宜未歸理本宜委中書門下郎與諸司長官各舉所司內外遺闕商量釐革處置作條件聞奏俾昭宣軌度永備彞倫便俗安人典章式敘宣示中外咸使知聞往者大盜亂華梁宋偏罹其害危城絶援析骸纍月南霽雲貞心壯節淩邁臧洪殞命敵場凜然生氣宜以其子為歙州別駕昔豫太祖太宗之御天下也功格二儀不私於己化覃萬宇猶問於人外與公卿大夫討論政典內與鴻生碩老演暢儒風日旰忘勞時稱至理猶復旁求諫諍俯察謳謠廣延不諱之書載建登聞之鼓於時中朝無闕政四海無疲人歷代是遵列聖相軌朕承天序祗奉睿圖戰戰兢兢日慎一日於茲十六年矣何嘗不勵精理道欲得忠賢虛己清心日有所待直詞讜議時或罕聞五諫七臣人其安在眷懷於此耿歎良深頃以任非其人凡事壅蔽今則巳懲厥罪正乃惟心式佇嘉猷庶裨不德自今巳後諫官所獻封事不限早晚任進狀來所繇門司不得輒有停滯如須側門論事亦任隨狀面奏即便令引對如有除拜不稱於職詔令不便於時法禁乖宜刑賞未當征求無節冤濫在人並宜極論得失無所回避以稱朕意其常朝官六品巳上亦宜準此其擊登聞鼓者金吾將軍收狀為進不得輒有損傷亦不須令人遮擁禁止其理匭使但任投匭人投表狀於匭中依常進不須勒留副本並接時妄有盤問方便止遏欲使萬邦之事無隔於九重獻替之謨不遺於聽覽又自頃軍嚴未解政或隨時多逐權宜未歸理本宜委中書門下即與諸司長官各舉所司遺闕商量釐革處置作條件聞奏俾昭宣軌度永備彞倫便俗安人典章式敘宣示中外咸使知聞王者之於大臣也存則寄其腹心均於支體參於軍國之重敘以陰陽之和亡則誄其事功加之命數告於宗廟之祭禭以紱冕之章則九原可歸百辟知勸故朝議大夫守中書侍郎同中書門下平章事集賢殿崇文館大學士修國史上柱國賜紫金魚袋楊綰性含元和身齊律度道光雅俗器重宗彞寬柔敬恭協於九德文行忠信宏於四教內無耳目之役以孝悌傳於家外無車服之容以真實形於代西掖專宥密之地南宮領選舉之源以儒術首於國庠以禮度掌於郊廟廉其質奉職同休頃以任非其才毒流於政爰登清靜之輔庶諧至理之期道化既穆於朝班儉德巳行於海內雖賢人之業著於可久而夫子之命末如之何方有憑依遽此淪謝屏豫之嘆震悼良深所懷莫從長想何及況歷官有素絲之節庀家無尺帛之餘故飾以華衮增其法賻備膺典策載賁朝經可贈司徒褒德勸善春秋之舊章考行易名禮經之通典垂範作則存乎格言朝議大夫中書侍郎同中書門下平章事集賢殿崇文館大學士修國史上柱國賜紫金魚袋贈司徒楊綰履道居貞含和育德行為人紀文合典謨清而晦名無自伐之善約以師儉有不矜之謙方冊直書秩宗相禮辭稱良史學茂醇儒委在樞衡掌茲密命彌契沃心之道纍陳造膝之誠將以布天下五行之和同君臣一德之運遽軫藏舟之嘆未展濟川之才素業久而彌彰清風歿而可尚自古飾終之義皆錫以美名諡法曰忠信愛人曰文平易不懈曰宜諡曰文頃者逆豎靈耀阻兵大梁淮西都虞試太常卿贈揚州大都督張自勉往觀釁焉奉議正詞無所屈撓賊臣肆忿斃於鈇鑕朕用憫焉雖錫命之恩巳旌窀穸而賞延之典爰及子孫可追贈實封五十戶朕以黎元者君之肢體傷之則慘怛賦稅者國之衣食均之則贍濟然特圖其本先假貧人之獲安所謂富國所以砥慎財用蠲省征徭期致理於太寧庶自邇而及遠如聞巴南諸州自頃年以來西有蕃夷之寇南有羌戎之聚歲會戎事城出革車子弟困於征徭父兄疲於餽餉賦益煩重人轉流亡荒田既多頻歲仍儉戶口凋耗居民蕭然去桑梓之重遷保山林以自活念性命於俄頃或逡巡於敓攘傳不云乎窮斯濫矣顧其閭井夫豈不懷哀哉矜人蓋非獲巳朕之不德自咎良深其巴蓬渠集璧充通開等州宜放二年租庸及諸色徵科亦宜蠲免仍委本道觀察使及刺史縣令切加招撫令子申父之冤憲臣奉君之命楚劒不衝於牛斗秦臺自洗於塵埃
