body:
  text: 惟我皇御宇兮法象乾坤天步順動兮行幸斯存雨師灑路兮九門洞啓千旗火生兮萬乘雷奔紫雲霏微隨六龍而欲散還聚白日照耀候一人兮當寒却溫蓋上豫遊以叶運豈伊沐浴而足論若乃北騎殿後鈎陳啓前辭紫殿而魚不在藻出青門而龍乃見田霜戟森森以星布玉輅迢迢而天旋聲明動野文物藻川月落鳳城巳涉於元灞日生暘谷俄屆於甘泉於是登三休兮憩神轡朝百辟兮禮容玉堂憑艮面鶉野以高明石溜象蒙繞龍宮之清毖處無為兮既端拱時或濯兮溫泉湧聖躬清兮聖德廣四目明兮四聰朗與元氣之氛氳如晴空之滌蕩觀夫巍峩宮闕隱映煙霞上薄鳥道經回日車路臨八水砌比萬家樓觀排空時既知於降聖忠良在位諒勿疑於去邪儒有鵬無翼風有摶每俟命以居易尚愧身於才難觀國光以舉踵歷華清而展歡不賡歌以抃舞夫何足以自安乃為歌曰素秋歸兮元冬早王是時兮出西鎬幸華清兮順天道瓊樓架虛兮靈仙保長生殿前兮樹難老甘液流兮聖躬可澡俾吾皇兮億千壽考聖人調玉燭握金鏡乘正陽而馭六氣之辨考中星而授四時之命所以平三階而齊七政惟十有六祀日躔於南紀火德方盛炎曛自始主上問飛候之或失徵驕陽之所起未明求衣當食昃晷恐六事之害政引萬方而罪巳乃設槱燎奠椒醑豈史巫之紛若惟誠德之是與稽元穹以誓期樂形影以增佇善言既發靈應無越天垂貫斗之雲神召離星之月有淹淒淒南山朝隮林鳴陰鳥澗隱晴霓九光之霞冠於雲日五色之氣映於巖溪始攢團而未下終颯灑而俱齊合散縈直紛飛驟息肇自千畝周於八極及乎我私長我黍稷我箱既萬我庾惟億人咸謂之神功爾孰知夫帝力若乃拂珠箔含綺疏微霧氣於金掌糅香煙於玉除下碧雲而陰合滴銅池而響餘君王乃倚雲閣憑雨殿臨清暑奏繁薦欣大德之在生知上靈之有眷於斯時也一人有慶萬國歡心㣥臣獻華封之壽天子御薰絃之琴昭宸文於合璧式王度其如金乾道兮下濟湛恩兮汪濊四三皇兮六五帝于胥樂兮萬千歲敕朝議郎行殿中侍御史杜暹禮樂之器直方效節通直郎殿中侍御史內供奉馮宗文儒之業堅正在心咸以清公副茲望實風霜既肅臺閣推美持我邦憲載穆時談俾遷周史之能更奉楚冠之任並可侍御史敕朝議郎行河南縣尉皇甫翼朝議郎行長安縣尉韋紹朝議郎行醴泉縣尉張季瑀等備聞清操雅有深識進乃安卑退非求譽察其才行副是名實任之舉直可以觸邪並可監察御史敕左拾遺內供奉鄭虛心茂其德業蘊是辨詞識通於政理行著於公直清可勵物正以繩違褐衣召見既司諫省之職繡服承榮俾奉憲闈之任可監察御史門下任事而爵古之彞訓論功以封朝之通典銀青光祿大夫守中書令上柱國張嘉貞忠肅恭懿宣慈敏達函清明以育德體文武而成器自光帝載昭宣廟謨鼎味用和台階增峻事君有犯而無隱奉國以公而滅私持其憲章式是軌度既邦教有敘亦王猷以穆頃統軍政則城朔方爰底其績未疇厥賞固宜命以圭社崇其禮物俾楚臣授邑克表寢邱之制漢道優賢更叶平津之美可封河東縣開國男食邑三百戶主者施行易有四象有天文焉有人文焉所以察時變而觀化成也詩有六義有大雅焉有小雅焉所以陳國風而美王政也文之時用其肇於茲自長發禘殷正考述其典在坰頌魯史克明其訓由是比興繼作風流彌繁黃竹白雲垂芳於帝籍楚蘭班素作麗於辭人莫不究情性之微含風騷之旨吟咏先王之澤光昭正始之宗故情發於中而申之以歌詠文生於情而飾之以辭采所以立言會友感物造端藻暢襟靈導揚隱伏潤彼金石流於管絃以告其成功而懿我文德者也嗚呼斯文未喪命世聿興發揮造化之微鼓動江山之氣轥轢前古昭彰後葉疇克有之則尚書許公應運而挺生矣公四代相門十卿崇構海域挹其軒冕縉紳推其軌儀夫其導源錫允之慶克家屏宗之美論道布政之典推誠立節之效並巳勒於豐碑紀在良史此則略而不言焉公神秀穎發自然生知五歲便措意於文每坐臥吟諷未嘗暫輟至於八九歲則有若大成焉一覽誦千言有若素習十七遊太學對策甲科振麟溟渚濯羽弱泉海內重林宗之名朝廷藉賈生之譽矣時吏部侍郎馬載名知人見公歎曰蘇生一日千里王佐才也後因選集時屬糊名考判公與宋璟俱入殊等由是天下益稱焉公任御史時兩臺有送別四韻詩四十餘首試令公誦之一遍倒覆之遂不錯一字其敏悟也如此公任起居郎屬考功員外郎闕時中書令李嶠執筆曰考功郎非蘇君莫可遂拜考功員外郎遷給事中特制授修文館學士遷中書舍人專知制誥僉議允歸制命敕書皆出自公手筆不停綴思無所讓及是見君深所歎伏焉今上嘗謂公曰朕每見卿文章與諸人尤異當令後代作法豈惟獨稱朕心及東封詔公撰朝覲壇頌加金紫光祿大夫與一子官賞能也公性與道合神無滯用惟深也總衆妙之門惟才也體生人之秀若乃學以聚之問以辨之括囊道藝之場探賾幽微之數至若栒戈考篆魯鼎看銘書有亡篋文稱墜疑絳老之年走朝有問卜晉侯之疾訪史莫知莫不取揆宏襟詢謀達識公辨無不釋言必造微掩雲夢以吞之湛陽秋以昭之如太嶽之覽㣥山若滄溟之朝百谷者矣至乃緒發而宮商應言形而雅頌興爽律與雲天並高繁章與霞月俱亮故能虛明獨照壯思雄飛自我心極為之宰匠嘗亦紀秦望銘華山勒函谷之關刊燕然之石繁絃間發縟采相輝歌奏而白雪遂孤賦成而黃金有貴豈惟排終拉賈駕王超陳而已若乃天言煥發王命急宣則翰動若飛思如泉湧典謨作制於邦國書奏便蕃於禁省敏以應用女完而有章則近代以來未之前聞也豈學而得之歟抑亦天縱之歟何其殊尤而懿鑠也惜乎循途未及閲川行謝雖洞簫為賦方傳漢帝之宮而禪草遺忠空留茂陵之下思盛烈其如在覽餘文而增歎曲池無處舊館寂寥感知已以悼恩懷舊德而何極豈峴山之上長留墮淚之詞延閣之中不紀藏書之録謹撰緝文誥成一家之言凡四十卷列之如左請藏於祕府以示來裔有梁拓迹開統建邦立號王業始於憂勤霸功成於海縣乃昭事上帝惠綏遠人文軌通於四海正朔繼乎三代屬天步未夷皇綱中圮巨猾開釁大盜潛移宗廟鞠為禾黍衣冠翦為戎狄則我梁之業將墜於地國之郊禋蓋無主矣而天未絶商鼎猶祀夏炎精翳而復揚文德懿而方肇明命斯在神休允歸則我中宗宣皇帝代宗明皇帝乘彼樂推撫其歸運者矣宣皇帝諱察明皇帝諱巋姓蕭氏蘭陵中都里人也房雲祚商大火封宋功昭革夏之業德盛明周之禮故能慶緒崇緬哲源浩濬樂叔之封既命遂列於諸侯高辛之祚克昌俱有於天下始宋公子食采於蕭國以得氏其後居於豐沛自漢丞相何侍中彪奕世載美不忝前烈洎於裔孫整東晉淮陰令始渡江居於南徐州之蘭陵焉整生雋及轄雋曾孫道成是為齊高帝轄以四代孫丹陽尹順之生高祖武皇帝衍高祖生昭明皇帝統宣皇即昭明皇帝之子明皇即宣皇帝之子也降元精之吉乘正陽之氣星斗發祉日衡兆祥德叶於天地之和名書於帝王之籙故其本枝榮慶歷試肇迹勿用而履夫重剛明夷而蒙彼大難乃鞠旅樊沔投戈雍梁政始東國化行南紀取長沙而兵不血刃戰江夏而舉無遺策推賢用之而如不及委政授之而心不疑誅豷羿而廓天關掃欃槍而清帝座遂撫方夏用膺徽號訓兵同於一旅申命式於九圍克祗上靈之眷光啓中興之業於斯時也飛鴻滿野戎馬生郊庭旅荊棘室同煨燼由是躬大禹之菲薄同衛文之節儉千里襁負一年成都適其樂國歸我有道者蓋同於遷豳而居此也於是搜夢澤朝渚宮五德配天二郊在國不失舊物重覩漢官之儀叶於新命還秉宗周之禮用能布令結援修好申盟我譽延乎四方人心洽於一德始則誕受多福終亦繼明重熙豈惟敵國挫師克申威武信亦強鄰結好芬若椒蘭謹其外虞宏我邦本孝心虔於紱冕儉德過於茅茨立教以至仁為宗宏風以清淨為樂豈非古之聰明神武而不殺者夫方欲觀兵上國清蹕中壤混一區宇削平四方而乾道臨於大過雄圖屈於知運霸功則肇王業未宏雖慷慨於當年竟遲回於卒歲者矣嗚呼陵谷驟改市朝無處荒墳嵬然蔓草蕪沒孟嘗尊貴獨愴雍門之言魏武英威空留士衡之弔有可悲矣嗣子琮屬金陵畢氣天祿永終山川不出於伯符歷數有同於歸命終我梁祚是為虞賓其天意也豈人事也次子珣梁南海王隋左光祿大夫梁國公食邑三千戶贈遷州刺史承百祀之重稟二宗之慶恩昭異代禮崇物子鈞皇朝中書舍人率更令崇賢宏文兩館學士鈞子灌皇朝渝州長史贈吏部尚書疇其慶靈俾爾戩穀盛名昭於海內高秩謝於人寰實彰燕翼之宜克享褎崇之禮嗣子曰嵩金紫光祿大夫吏部尚書兼中書令河西節度經略支度營田九姓長行轉運等副大使知節度事判涼州事赤水軍使檢校天下諸軍兵募健兒使集賢院大學士上柱國徐國公秉靈迪哲體道宏正自我人秀惟其國楨亮采而三階已平疇咨而九功式序糾逖王慝緝熙邦政文武體用清明在躬地奉紫垣之寵門延絳河之貴永言孝思式是前烈雖大統云集而鴻芬莫紀時逢喪亂迹昧於亡隋之年運屬光華功盛於有唐之日邱墟遂遠碑表莫存豈使配天之功不勒於金石終古之美永翳於邱山式繼武於蒸夷俾披文於大隧緬思至道俯課虛懷幸陪論政之餘空愧知音之託乃為銘曰天祚我梁受命而王於穆烈祖昭惟武皇德配華夏功成翦商克受丕祉宏茲太康陰極為剝泰終而否九伐未修四郊多壘戎州孔熾王室如燬不有繼明孰彰我祀四子有命二宗代興歷數攸在天人叶徵靈心允洽元德昭升奄有成命其歸與能長江作限上京未復永念殊邦思同比屋拔山雖壯逝水何速嗣王不辰終我天祿洪惟德門卓彼孝孫弻我王道宏其政源式播前烈貽厥後昆勒茲貞石永馥蘭芬巳矣焉哉昭邱一望盡煙埃楚塞斷兮荊門開緬千里以環繞見二陵之崔嵬銅臺虛兮繐帳暗金扃閟兮黃鳥哀嗚呼百年人畏其神者豈獨軒轅之臺夫賢者所以稱至業也居賢而德故有尊位者所以敘才用也有才而位不必貴緬覿志則代有其人焉公諱鈞字季和京兆杜陵人也昔大彭授征伐之任總齊㣥后立為商伯扶陽擅儒雅之道儀刑列辟起為漢相由是邁種厥德光昭盛門軒裳奕葉以濟美靈庭肸蠁而相屬故夫重輝洪業啓彼元緒淳德介祉歸諸後昆者焉曾祖澄皇朝國子祭酒儒門肇業國庠貽訓祖慶植皇朝舒密二州刺史政成師長化洽黎元父瑤皇朝駕部員外郎譽重國楨道高人望光膺三署之拜克彰九德之美公淳輝秉靈鴻芬錫祉合英秀發揚光炯曜其少也則圭璜自然克有成器其長也則禮樂攸在光其大名式是古訓洽於前烈懷利器而待割含虛明而獨照學無不綜窺先王之書府言必有則得夫子之文章挹其道則虛往而實歸論其德則敬容而貴允所謂樂只君子邦家之暉者也解褐以常調授綿州魏城丞矯曾翰淩絶壑立茲政聲宏彼邦教以尤異擢授雍州長安尉未幾遷雍州司士參軍超於輦劇佐此神京既位以才遷亦高由政舉無何轉洛州陸渾令京皋底績河縣為榮銅墨載美絃歌用譽以親纍出為晏州嵯峨縣丞尋改授雅州司功參軍遷雍州三原縣令又改授邠州三水令又改岐州扶風令窮通在命喜慍在我當運而寵辱不驚養空而逝止恆適用能因事立訓自公滅私雖得喪繫乎其時亦風軌存乎所蒞者矣嗚呼物不可終否道不可以遂喪夷然順之艱以貞之俾夫人亨則自天而佑之矣景龍二年聖人發明制褎有功授太子司議郎內供奉尋正除乃遷尚輦奉御恭承嘉惠肅奉彞則膺美選於禮門拜殊榮於御府又以親纍授果州司馬尋改授漢州司馬公道直而正德貞而修雖行必恆存而運無常泰善不違已固無負於神明纍則因人亟又從於貶降且人有厚於德而薄於命行其道而屈其身者歟棲遲下列竟以卒歲以開元十一年十二月十九日遘疾終於漢州之官舍春秋六十有四惟公含宏光大洵秀沖雅淡然而靜漻乎以清神崖自高海量孰測韞隨和以增美將草洍蘭而共芬而天爵斯茂朝宗莫及盛名空在昌運不留可為長歎惜者也以開元十二年七月二十五日遷窆於萬年縣洪固鄉陪先塋禮也公之第四女蘭畹生秀金閨植德以良家之選參帝子之榮克彰慶善之餘允洽徽章之命開元二年正月四日乃下制贈公邠州刺史贈先夫人辥氏晉國夫人制曰代榮竹替組才稱楨幹方居參佐奄謝中年朝選良家既聞餘慶義崇恩禮爰在飾終且分符節之榮無忝笳簫之夢可贈使持節邠州刺史并贈夫人為晉國夫人非夫宏風勵俗明察在人豈能褎崇光茲訓翼者也君子曰管氏之代祀不亦宜乎其斯之謂歟有子尚舍直長悅然等晉之明用幹蠱而克永惟孝思訓我淳則爰播美於穹壤用圖芳於篆刻乃為銘曰緬彼大彭兮佐於有商自我楚傅兮慶流扶陽逮茲後昆兮奕世以昌誕此明德兮與時而光良玉不斫兮幽蘭自芳為邦之彥兮為人之綱明德之修兮而命之不臧既道崇而位薄亦身沒而名揚嗚呼積其善也聞季女之寵章崇其構也稱鄭公之不亡勒貞石旌高堂德音昭昭以孔彰俾夫墮淚之美者豈獨峴山之陽維開元二十二年歲次甲戌七月庚申朔十日己巳司徒辥王薨於洛册諡惠宣太子翌日殯於正殿之西階粵八月二日庚寅將陪葬於橋陵禮也涼陰戒秋白露凝夜傃哀挽於郊道儼虛容於池榭皇帝痛棣華之既凋矚蘭坂而增欷撫徹奠以無及恨潛泉之永閟光乎典册升彼儲嗣爰命史臣揚言其懿其詞曰於昭帝系濬發元裔逮堯升唐自辥而王粵有成德遂荒東國大啓土宇聿崇典則夫其秉靈在初迪哲惟濬惇敏秀鑠淳龐淑慎謀謨以成蹈道而順文英獨越武烈惟振百辟式瞻五宗以訓惟茲大賢克懋天秩為藩為屏是輔是弻保釐我邦家左右我王室沛獻演易楚元説詩藝無不綜學罔有遺分以寶玉建其旌旗出宏聲政入贊雍熙咨爾公族是惟敦睦王曰介弟寵其車服俾侯於京怡怡弟兄穆以家人之禮崇其藩后之榮曷常不樂彼同輿却東平之歸奏詢其異政欽少海之能名將以天倫之愛可以昭於載籍友于之道可以貫於神明宜其善有其慶禍無其胎享此睂壽祐其多才胡勿藥以為疾逮彌旬而成災躬為禱兮無不至誠以請兮無不備走㣥祀以纍祈徵上醫而畢洎蒼黃而晦明未隔暗忽而古今斯異嗚呼哀哉神理無昧人寰巳非想河樂其猶在望淮仙而不歸悲由中而自切情限禮而相違帳丙舍而云遠飾承華以增輝嗚呼哀哉靈龜肇吉服馬先路悼津門之永違遵河橋以直度笳哀洛陽之道旐靡咸京之樹換憂歡於今昔變風景於新故嗚呼哀哉夫行以諡尊恩由禮盛申物以增飾緬貞徽而獨映俾重為善之名以彰有後之慶嗚呼哀哉庭榭戚以驚秋川波咽而不流歷神皋兮望國寢背華宇兮歸山邱流塵滿兮虛榭暗緑苔生兮行徑幽惟盛德與鴻烈亦天長而地悠嗚呼哀哉鍔元宗朝官河南府告成縣主簿遷司封郎中洛陽縣令夫日月出矣而輝耀十方時雨降矣而澡漉萬物況我身常樂湛虛空之相妙覺圓明融心行之本唯曒唯昧不生不滅者哉是以闢無學之地聿修伽藍啓息言之津亶作羅奈智勝菩薩起方便之緣淨居天人發成就之力稱謂所絶者其第一義乎自恆星夜掩仙虹晝爍青鉢傳其睟容寶棺現其金臂法山摧仞拂魔箭於危屏直水橫流繫慈航於彼岸烏呼妙藏不可以常祕戒輪不可以終盩雖雙林下圭石示於泥洹逮一千年遹被於聲教龍持貝葉亟傅摩竭之城象負蓮華遂滿真丹之境三十七品慈悲於火宅一十二經引喻於妙界矣大寶積經者後漢迦葉摩騰竺法蘭及今朝元奘法師菩提流志等咸自西天竺所致也如來昔在鷲峯利建平等金口注海酌之而不竭寶言如綸振之而有緒炯茲瑞憲久翳鴻都原壑屢非市朝多變歷代徇齊之主競興參譯跋陀授記之言罕能丕就洎我唐之有天下也功橫鐵圍化帛丿糸忉利苑禦千界提封萬剎張四攝之扉廣納諸有騁六通之驥冥濟㣥惑太上皇以澤深智海掌耀禪珠神皇帝以勛格梵宮胸懸法印肅敷元誥昭灑鴻波歷選緇徒明揚列寀博考同異聿興刊緝勇振頽綱嚴持絶紐爰有沙門大德思忠東天竺國婆羅門大首領臣伊舍羅等譯梵文者求善住緣悟無生忍博聞強識精而譯之復有天竺沙門波若屈多沙門達摩證梵義者開忍辱場破煩惱衆弻諧神侶明而辨之復有沙門大德履方宗一普敬慧覺等筆授者令問孔昭威儀不忒手渥仙札受而字之復有沙門大德深亮勝莊塵外無著慧迪等證義者國之大師佛之右臂探諸了義演而證之復有大德沙門承禮雲觀神暕道本等次文者庇影多林息肩香窟勤修精進纂而次之復有潤文官者銀青光祿大夫邠王傅上柱國固安縣開國伯盧粲銀青光祿大夫太子詹事崇文館學士兼修國史上柱國東海縣開國公徐堅朝議大夫守中書舍人崇文館學士上柱國野王縣開國男蘇晉朝議郎給事中內供奉崔璩等位列鳳池聲流雞圃分別二諦潤而色之復有銀青光祿大夫守侍中兼太子左庶子兼修國史上柱國巨鹿縣開國公魏知古兵部尚書上柱國郭元振銀青光祿大夫檢校中書令上柱國范陽縣開國男張説銀青光祿大夫行中書侍郎同中書門下三品監修國史上柱國興平縣開國侯陸象先等朝踐瑣闥夕遊珠域護持四法總而閲之爾乃杖錫之士端圭之俊麻列定筵林攢樂土蔭祥雲而演譯倏換炎涼吸甘露而勤求載淹衡晷大乘章句義不唐捐小品精微拯無遺溺能事畢矣佛何言哉今所新翻經凡有四十九會七十七品合一十二帙以類相從撰寫咸畢以先天二年六月三十日進太上皇八月二十一日進皇帝禁闈曉闢真教上聞仙寧克怡宸襟允穆竦鈎陳於白日親御靈臺落雲雨於彤霄薦加殊尉賢愚稽首以為利見仁主真俗歸心以為潛登覺道次有清信佛弟子前少府監丞李式顏等皇朝金紫光祿大夫兵部尚書贈侍中隴西公逈秀子也復有清信佛弟子前右拾遺徐鐈等皇朝銀青光祿大夫太子賓客昭文館學士高平公子也咸屬彼穹降禍私門墜構陟遙岵而崩心瞻冥途而獻福於是胠篋探笥檀波羅蜜廣疊箋首崇書寫不變槐火遽盈苔袟然後裝之鏤軸綴以瓊籤羅綵簟而霓舒播珠函而錦縟方使猛風吹嶽長存妬路之文劫火燒天不壞多羅之典太一景雲中為洹水令拜監察御史裏行遷戶部員外郎一闔一闢分陽分陰坎為水兮離為火東方木兮西方金惟土德之為大處中位而君臨寒暑不能易其節鬼神無以測其深吐納清濁區分宇縣帝軒感氣於星斗虞舜降精於雷電爾其荊河墳壤淮海塗泥草木漸苞於赤埴璆鐵作貢於青黎火以炎上為母水以潤下為妻黃白分於雍冀官位列於東西蒸之以為城闕北連朔野纍之以為臺觀上構虹霓為海為河為牛為馬起圓規於陳法美教化於王者負之為模胡人失其膽氣得之為祥晉卿載於原野且久且大非名可名定剛柔於坤德合絲竹於宮聲夫其為重也封割五色分茅錫社夫其為厚也包括萬象含姿育靈處瘠則勞處沃則逸白獸忽見羵羊間出體均物而為象抱溫柔以成質舟航才盡則青鏤飛神六五既臨則黃裳元吉萬國收其利三公主其秩因覆簣而成山為幽居而鑿室不借譽於龍鳳直養德於麒麟失之則昆蟲作孽得之則宗族以親雖鼇足初分重濁者為之地而羊角勃起輕清者為之塵授之可薦於宗廟捧之未塞於孟津起刑馬而為首祀勾陳以為神漢廟玉環方之則君王納諫豐城實劍拭之則光彩射人含物吐象包藏玉石均王四時卑陛三尺運乎虛舟之中不以為損捧乎泰山之上不以為益土之為德也重土之為性也平爰稼穡而為務被朱紫而為榮余以既藉形體承恩天壤公和之山窟非陋子猷之冬林自賞先君列國猶未斷於封疆軒佐吹塵直庶幾於夢想
