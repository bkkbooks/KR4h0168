front:
  text: 全唐文欽定全唐文卷二百九十五休京兆長安人初舉賢良元宗在春宮親問國政對策乙第擢禮部侍郎兼知制誥開元二十一年拜黃門侍郎同中書門下平章事旋罷政事遷太子少師封宜陽縣子二十七年卒年六十八贈揚州大都督諡曰文忠寶應元年重贈太子太師
  hash: sha256:ce36452dc922c1861817033dab3fc3dc9e639dc4ff64fdcac601cbda915ce2d7
  markers:
