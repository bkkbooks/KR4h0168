front:
  text: 全唐文欽定全唐文卷八百六十從乂周顯德二年官節度掌書記試大理司直
  hash: sha256:382239a4444abc8cb72a12aad342aba3ef6ab14bc62480c7ad0b763c9ed04664
  markers:
  - {type: head, offset: 13, content: 劉從乂, id: KR4h0168_NFKB_860-h1, level: 1}
body:
  text: 原夫了無相之因乃歸寂默現有為之教即示莊嚴攝闕生浮想於是闕一字無相而詮真諦以有為而誘鈍根嗟乎劫闕動地但漲情闕二字負寃而不能堙苦海之波蟻有術而不能闕以指迷津而闕一字彼岸開惠日而破昏衢未廣度於能仁應機誤闕隨業化緣質闕二字難信之疑立像法相沿之理不有開士孰匡闕故思遠禪師之經始也禪師本王氏子回中人也道性元通闕調象馬能降闕一字之情體化蒲蘆盡作如來之種微言殆絶景行彌高扣闕無階駕真乘而長往詳僧傳則於是乎在創佛宮則可得而言禪闕化南昌教闕三字時洪州廉使侍中彭城公請住香城禪院闕二字二紀有志四方乃振錫浮江闕一字徒登路念三輔五陵之豪族想規天矩地闕三字思闕一字鷲峯遂歸闕松柄未揮歸依者掎裳連袂而來檀施者接足駕肩而至感優曇闕之良緣莫不童子標花神人獻柱兢施布金之地闕一字投纍壁之錢闕材朽宅之頽基聳搆正殿中蹲而闕一字起長廊四注以雲舒蟾蜍納闕葩於藻井文楣憐亂畫栱攢羅達法堂以悟空設真教以陶智闕定布經行之地以豫遊無里閈之囂塵闕二字泉之爽氣聿成佛闕我皇祖在宥之二載也太尉袁公罷侍闕玉節次宗結社潛懷出俗之心靈運居官己熟生天之業拜封闕榜以斯題遂敕賜號廣慈禪院以廣闕一字慈闕等苦節橫霜高名跨世精進而身田自潤住持而眼界常空闕而下蔭欲於寶剎思勒貞珉託敘美於非才庶傳芳於不闕存托實之辭時歲在單閼月旅季秋記禹圭字元錫高密人以五經中第辟遼州倅歷青鄆從事轉潞并管記纍檢校至戶部郎中漢祖鎮并門奏為兼判及即位授中書侍郎平章事兼刑部尚書加右僕射集賢殿大學士少主時轉左僕射入周守司空世宗嗣位封莒國公顯德三年卒年六十二太原故郡大夏名封郊野列於參墟山川開於晉國俗通馬首坔管羊腸稱號神京實為樂土皇朝鳳舉三百年之遺迹尚存聖祖龍飛一千載之耿光斯應士馬雄盛井邑駢羅語之八都并為最也而又俗敦釋教重二乘方便之門人貴善根導五濁昏迷之性金繩寶樹雁塔蜂臺大有莊嚴鉢光像法據傳記開化寺北齊文宣帝天保末年鑿石通蹊依山刻像式揚震德用鎮乾方成招提之勝因侔釋迦之真相人皆回向時湊福田齊後主然油萬盆光照宮內仁壽元年隋朝造大閣而庇尊像焉仍改為淨明寺洎唐高祖在藩邸時至此寺瞻禮回夜夢化佛滿空毫光數丈登極之後復改為開化寺後顯慶二年高宗駕至出左右行藏資緡珤玉崇嚴飾之後會昌甲子歲敕廢大閣露尊像雨滴風摧僅六十載化隨消長道有汚隆明矣乾寧二年武皇虎踞并州龍潛晉水遙奉擎天之業克安在鎬之君一境煙靜塵消不修闕二字千里民稐俗阜正樂豐穰或乃治兵間修講武上西山而指顧屾仌非北禮於慈悲痛望真身而受霜露乃下令遣䊷徒管內講化計口隨年錢收數百千萬緡更有自施信財者不可勝計復造大閣焉時也擇班輸之物己豐多斫徂徠之松材闕一字藏足既當農隟闕一字乃興工闕一字役者荷鍤如雲剡木者運斤震地工無舍夜人不知勞自乙卯至己未首尾五年蓋成大閣兼裝佛像厥功三十萬闕一字所聚財盡矣莫不獸簇千楹星攢萬拱榱題黮黝階闕一字嶙峋甍宇齊平可下觀於岡險闕一字才閰偃闊宜上摘於星辰仰之彌高觀之尤麗萬人瞻仰樹福於茲至今五十載矣莫禁二鼠日月般而年代移闕一字從四蛇高閣隳而聖儀毀非國王大臣力其可再修乎遇北平王鎮臨之五年也疆境乂安人民豐足衣錦而彰七德玉帳論兵出籌而蘊六奇金臺禮士矛逢矠不舉烽燧皆停暇日遊西山至開化寺焚香見閣宇傾欹佛像崩闕乃言曰縱有僧灑掃供養豈令人喜瞻禮乎遂舍俸錢重修薦之爰求郢匠俾聚杍材功用具充役工畢至是薦大閣五層一百三十間并添換瓦木文彩賁飾及閣內尊像沿寺功德護法善神塗金彩畫大小咸具無不畢備兼創造斗帳四間閣上二十四窗竹網特蓋行牆五間并諸殿宇一新其舊及置閣上麻網一十五扇蓋將己俸不撓民財況日給於米鹽更時頒於賞勞百工無怠衆役惟勤踰時而畢重新鹿苑載耀雞園視高閣於凌雲悉施藻繢變睟顏於淨域別顯相儀浮柱霞棲倔闕一字而生玉葉飛梁虹指岧嵽而在金田美哉輪焉煥乎盛矣四人依仰二衆焚修實資奉福之因允叶募緣之果王視其功畢大會沙門慶讚而雷殷梵音供養而雲籠香焰成茲勝概乃樹貞珉撰記仁祠靦顏主擇禹圭謬塵郗桂獲厠庾蓬隨簪玳以履珠忽承明命則援毫而滌硯須抒謏聞非敢虛詞止書實録庶貽後代以紀芳猷大晉開運二年七月十三日記去非周顯德五年官義成軍節度掌書記大岯山者上摩乾象下壓坤牛左巨浸而右太行誠為壯觀南夷門而北大魏最擅繁華遐重昔人能擢勝境以茲山之足為佛足矣以茲山之頂為佛頂焉寺內有缺闕一字碑銘載相續日月儼三十二相亦四五百年首蔟連珠肩隈合璧或孤鴻夜至移雁塔而自闕一字方六出朝飛拔雪山而歸此處神功捧護巨靈措手以難開佛力昭彰秦后著鞭而不動傍臨回漢顯超岸於當時俯瞰危峯類投崖於今日不待龍吟深谷我有法雨而濟陳根何須虎嘯深崖我有惠風而吹昏垢潛施殊福溥及㣥生雖日用不知且人何以鄙今皇帝均臨區宇子視黎元慮一夫不耕天下有餒者一婦不織天下有寒者向乃頒行天命條貫僧居有敕額者存無敕額者廢非輕釋氏用誡遊民勞哲后以去華使空王之保大茲寺也詢諸耆老唯曰大岯蓋前古之寺名非近年之敕額如斯敷列胡免廢停我主公都尉指命僧徒繕録銘記閲其狀迹頗歷光陰遽為奏陳卻獲仍舊寺主僧從超住持甚久焚禮甚精初議毀除鬱有白㲲之歎及聞存惜為刊黃絹之辭去非碑謝溲雞文慚吐鳳既高僧之固請乃下筆以直書庶紀厥由終無革故時大周顯德五年景儒周顯德時陝州夏縣人伏以景儒等生居塵網長在牢籠汨沒愛河豈有涯闕二字身是幻假四大以成形悟性空時莫不憑善道如電露似石火而難停若闕二字坊衆闕一字等闕十六字不悟以去逞津梁無準景儒等自闕一字年前遂見當院精藍寶地是皈依作福之田結闕一字善緣乃為衆會名羅漢邑闕一字景儒等遂又不改善果真誠年五十敬造尊勝陀羅尼經幢一尊奉供闕二十字圓就所修上善功德各各闕一字備早立勝緣已俟他歲略述其宗不可具載奉為國皇萬闕一字歲帝祚遐昌文武官僚常居祿位闕一字祈闕一字坊表幼永保清貞過去未亡俱登清淨之境一切時闕一字沾闕一字利下闕穎周顯德二年官左散騎常侍近制一月兩度入閣五日一度起居近年以來入閣多廢每遇朔望不面天顏臣請命後朔望入閣即從常禮如不入閣即請朔望日起居冀面聖顏以伸誠敬皓周顯德二年官御厨副使國之造物時惟用天履在歲之窮紀知層冰之腹堅可以備用凌人主焉利秬黍以為薦率司寒而是先於是入坎窞踰崢嶸乍逼側以經險復趦趄而不征爽氣旁達凝陰上清始峩峩而不見遽沖沖而有聲是伐是取登乎上京候朝風而益壯對夜月而俱明崇凌既啓陰井方泄含聲色而轉深拂霜威而逾潔不劘不劂如磋如切掩下方以涸沍匪上騰之發泄方見象於為寒且多驚於內熱顧惟不佞括結成性彼蓄物以俟用亦何異乎藏冰將有冒於嚴凝豈見遺於水鏡學以居士人斯守業曾射御之必習在師資而有敬甲性匪生知才殊特達將祈代耕之祿式執摳衣之訓既而請益不倦寧止於五經廣業惟勤實包乎六藝庶將貽厥小學冀亦臻夫大成判孔氏之四科登周官之一命且猶父之禮義固非經從夫而尊敬亦宜廣厥妻雖忘於母訓惟乙且豫於人師縱鄰樹以致嫌匪門生之或譴何乃窺其家室專務去彼遂使老萊之婦坐失齊眉之歡買臣之妻終成反目之恨況人實有偶甲則無良訐以為直嘗聞君子之惡犯而不隱乃昧事師之迹失禮之告誠為有孚行古之道未知其可遜周顯德二年官祕書少監貶蔡州別駕清泰二年為右拾遺臣見上封事者多不關時政得失或以事不合己或有位未及人但欲虛鼓聲名妄邀抽擢全非切當空事遊詞數件之中無一可取不惟熒惑聖聽兼屬侮慢朝綱今後請除兩省官合上封事者其別班除論本司公事外請準太和二年敕輪轉待制給事合司封奏大凡食祿之道本在致君不可獨善一身歸惡萬乘惜暫時之逆耳貽他日之痛心事切三思理實不可其切要言者或居上情耽酒色志好畋遊言動稍乖理須論諍職司其事合在諫官況陛下嗣位己來憂勤庶政鮮有過誤無可陳論朝廷班外之宜職在御史臺如有愆違御史彈糾其餘鞫獄自有法司事若有違他自論奏此外越局言事並望寢停載字仲熙北燕人周廣順初舉進士授校書郎直史館再遷監察御史拜水部員外郎知制誥遷翰林學士卒年三十六歲帝軒轅乘土德之運其臣曰奢龍祝融能辨方域以制區夏帝媯氏禪陶唐之基其臣曰伯夷后夔能典禮樂以和人神上古佐命之道闕五字焉三政嗣興圖史寖盛彌綸輔翊代有其人皆金册丹書絢繪功業垂其訓聚而為墳典形其美流而為歌頌陋篆籒之質略我則潤之以闕五字之淪朽我則鏤之以貞珉銘以紀功碑以志行千載之下燦然可觀者其惟神道之表乎故中書侍郎平章事景公諱範闕四字皇朝元佐顯德二祀冬十一月薨於淄川郡之私第天子廢視朝軫殲奪之令制贈侍中遣使贈奠飾終之典優而厚詔詞臣闕一字文闕一字炎盛矣闕三字孔悝彞鼎不出廟門杜預豐碑空沉漢水始自矜於名氏誠未顯於家邦與夫輝煌帝恩導揚休烈闕八字者可同日而語也闕四字綸言直而敘之用丕顯我大君之命臣聞景氏之先出於芊姓從楚王於夢澤差闕一字侍臣畫漢闕一字於雲臺丹推名將濟美垂闕六字生偉人惟周之輔長山之下淄濬為川地勝氣清惟公故里夫嘉遁絶世高臥於是者足以闕一字皓氣而為闕七字生於是者足以闕三字而為世傑故公之先由烈考太僕府君之上曰王父賓大王父閏皆貞晦不仕介享天爵而巢許闕十四字仲曰篆公闕四字世闕二字聿登相位而申甫之祥著矣昔者聖人之教天下也本之以仁義制之以經籍是謂人文是謂人闕六字以闕一字開物成務者闕四字所于此闕二字以公輔之位必由稽古升廊廟之才必以經術顯而公以明經擢第於春官氏則賢哲之闕六字為吏於青陽闕十一字掾於高密郡秩滿而闕一字授范縣令大鵬之翼鎩北溟以未舒蟄雷之聲殷南山而不起然則闕七字于之闕十五字通人之才變而順則方圓之量不能局故公之佐縣政也人謂其勤且潔矣典刑書也人謂其闕八字邑恪闕一字以闕八字使闕一字政闕一字而從之者則人謂其賢且能矣粵若日月之彩得天而大明風雲之期遇屯而勃起闕十字磻溪闕一字璜闕七字我大周聖神恭肅文武孝皇帝建大功於漢室為北藩於魏邦初筵既開得賢斯盛於是我公闕九字而君臣之闕九字龍飛在天躬載曜靈至於霄極之闕二字皇建肇建制以公為秋曹郎進階至朝散大夫而闕九字萬闕十二字之樞惟聖人執左契臨萬邦經久制大命日政之機國之大柄總於樞務者可謂重矣而公闕九字忠而賢闕十一字公為左司郎中充樞密直學士尋轉諫議大夫充職今皇帝嗣位之始登用舊臣而并人乘我大喪擁衆南寇親征之舉迅若奔雷分命大臣保釐闕七字於公仍拜二卿闕九字振帝伐張黃鉞白旄殪㣥凶而皆盡參旗河鼓導清蹕以言旋大祲既已平九服又已定闕四字時惟輔臣而公昌言可闕十一字聖謨碩望可以鎮流俗爰立之命帝心允孚六府肇修兵賦充大邦之調用闕五字公自立不回信而有守闕十字哉大運逢時洪鈞在手資忠孝於君父享富貴之崇高而盡瘁之勞因成恙疢封章纍上優詔褒稱聽解利權闕一字專闕七字以列卿歸第懸車故鄉嗟風樹之忽驚訴昊天兮何及見星而往夕露方多泣血以居晨漿屢絶哀與性盡臥疾而終享年五十有二闕二字觀夫公之行事則其道也淳而粹充充焉無能稱其言也直而肆謇謇焉無所忌耿介以自安徑直以自闕一字故其仕也闕一字一命之卑闕一字三闕六字無悔吝古人之操何以尚也秉筆者得無愧於詞矣許國夫人李氏嗣子太廟齋郎儼信等闕三字靈闕一字光闕二字蒸嘗翼翼賢人闕九字子事終之禮佳城閉日長楸篲雲勒銘垂休以示千古其詞曰長山滄滄淄水湯湯哲人之生逢時會昌哲人之逝魂遊舊鄉其一高山兮峩峩逝水兮驚波闕一字而闕一字死闕十其八字二山有頺坂水有高岸人何世而弗新善有名兮獨遠猗歟公兮時用丕顯其三沖乂周世宗朝以左散騎常侍為工部侍郎呂澄贓賂事發因鎮將上論乞取之贓又無文簿鎮將遍下鄉村勘問又無人戶姓名積數雖多未嘗正格量其情狀難逭刑章勵開封人周顯德元年官侍御史知雜事入宋遷尚書膳部員外郎廣南轉運使竊見潁州為天中節放見禁罪人伏以祝萬壽之延洪但要齋心潔懇臨一州之生聚當思共理分憂且見禁罪人或干格法或因劫盜或是爭論各有科條須分曲直若負罪者獲免即銜寃者莫伸此時不有發明諸處便成流例直恐每逢慶節擅放縲徒豈止惠姦深為長惡望行止絶免紊章程潯周顯德時人夫月滿則虧日平則昃盛衰之道古今而同也其有秀而不實者得無痛乎夫人徐氏其先東海人也粵以元元降聖盤條仙樹之端洎唐后啓圖析派天潢之側龍飛鳳翥殷鼎闕壇閥閲勳賢無出其右官諱訶任省營田隊夫人媸渤海闕吳皓僕射闕宣賜褐裳之管轄營田隊務文華擅美器宇宏深夙嫻闕悌之規才冗見熹之色百行之美實無闕焉悲娶闕二字一卒九乎三紀何期隟駟難追遊波莫遏享年五十有六偶暫攝調闕三字於顯德三年歲在丙辰九月庚寅朔五日甲闕寢疾殞於吳縣令德鄉之私第也闕二字夫人有子六人長曰承嗣效闕衙內直番隊充副將次曰承寵係營田甲將次承鄴營田副將次五兒滿兒淡幼稚未效職員有女三人長曰十八娘聘於金氏次曰十九娘在室未從伉儷次草娘捨棄俗華以投金地於福田寺慕貞堅守緇門精專戒行子一人金氏宏綰新婦二人長曰沈氏次曰曹氏嗚呼封樹告期龜策叶吉以十月庚申十四日癸酉窆於吳縣胥鄉臺尚書里闔閭城西去祔五十餘里先祖瑩之側禮也特恐天地長久陵谷變遷令嗣號訴願勒貞石以志於墓潯忝獲知音得不涕泗揮毫敘録其實而為之銘曰委質荒漢凝神上仙繞繞二界茫茫九泉遠岫煙暝高空月懸聲沉永矣松檟蕭然良周顯德時人太宗己定天下而高祖己登九五矣太宗於閭閻疾瘼干戈勤勞且盡知之於仁義之治興大平極治之功容或有未究焉耳既作文學館延四方英俊講貫紬繹薰陶耳目者莫非帝王之事彼十八登瀛人必曰為如是事而治為如是事而亂以太宗之明刻記於心肯圖衰亂乎一意於求治而己仁爐義鞴道薪德火日往月來就聖神之模其為宗廟社稷生靈者炳焉與三代無以異矣故太宗之功烈自漢高以降莫之與敵十八人之力也朴字文伯東平人漢乾祐中舉進士授校書郎周顯德初纍拜左散騎常侍充端明殿學士三年征淮以為東京副留守還拜戶部侍郎樞密副使遷樞密使檢校太保四年再征淮兼東京留守六年卒年四十五贈侍中臣聞聖人之作也在乎知天人之變者也人情之動則可以言知之天道之動則當以數知之數之為用也聖人以之觀天道焉歲月日時由斯而成陰陽寒暑由斯而節四方之政由斯而行夫為國家者履端立極必體其元布政考績必因其歲禮動樂舉必正其朔三農百工必授其時五刑九伐必順其氣庶務有為必從其日月六籍宗之為大典百王執之為要道是以聖人受命必治歷數故得五紀有常度庶徵有常應正朔行之於天下也自唐而下凡歷數朝亂日失天垂將百載天之歷數汨陳而己矣今升下順考古道寅畏上天咨詢庶官振舉墜典以臣薄遊曲藝常涉舊史遂降述作之命俾究迎推之要雖非能者敢不奉詔乃包萬象以為法齊七政以立元測圭箭以候氣審朓朒以定朔明九道以步月校遲疾以推星考黃道之斜正辨天勢之升降而交蝕詳焉夫立天之道曰陰與陽陰陽各有數合則化成矣陽之策三十六陰之策二十四奇偶相命兩陽三陰同得七十二同則陰陽之數合七十二者化成之數也化成則謂之五行之數五行得期之數過者謂之氣盈不及謂之朔虛至於應變分用無所不通所謂包象矣故以七十二為經法經者常也常用之法也百者數之節也隨法進退不失舊位故謂之通法以通法進經法得七千二百謂之統法自元入經先用此法統歷之諸法也以通法進統法得七十二萬氣朔之下收分必盡謂之全率以通法進全率得七千二百萬謂之大率而元紀生焉元者歲月日時皆甲子月日五星合在子正之宿當盈縮先後之中所謂七政齊矣古之植圭於陽城者以其近洛故也蓋尚慊其中乃在洛之東偏開元十二年遣使天下候影南距林邑國北距橫野軍中得浚儀之嶽臺應南北弦居地之中皇家建國定都于梁今樹圭置箭測嶽臺晷漏以為中數晷漏正則日之所至氣之所應得之矣日月皆有盈縮日盈月縮則後中而朔月盈日縮則先中而朔自古朓朒之法率皆平行之數入歷既有前次而又衰稍不論皇極舊術則迂回而難用降及諸歷則疏遠而多失今以月離朓朒隨歷校定日足廠田坴朓朒臨用加減所得者入歷定日也一日之中分為九限逐限損益衰稍有倫朓朒之法可謂審矣赤道者天之紘帶也其勢圓而平紀宿度之常數焉黃道者日軌也其半在赤道內半在赤道外去赤道極遠二十四度當與赤道交則其勢斜當去赤道遠則其勢直當斜則日行宜遲當直則日行宜速故二分前後加其度二至前後減其度九道者月軌也其半在黃道內半在黃道外去黃道極遠六度出黃道謂之正交入黃道謂之中交若正交在秋分之宿中交在春分之宿則比黃道益斜若正交在春分之宿中交在秋分之宿則比黃道反直若正交中交在二至之宿則其勢差斜故較去二至二分遠近以考斜正乃得加減之數自古雖有九道之説蓋亦知而未詳空有祖述之文全無推步之用今以黃道一周分為八節一節之中分用九道盡七十二道而復使日月二軌無所隱其斜正之勢焉九道之法可謂明矣星之行也近日而疾遠日而遲去日極遠勢盡而留自古諸歷分段失實隆降無準今日行分尚多次日便留自留而退唯用平行仍以入段行度為入歷之數皆非本理遂至乖戾今校定逐日行分積逐日行分積以為變段于是自疾而漸遲勢盡而留自留而行亦積微而後多別立諸段變歷以推變差俾諸段變差際會相合星之遲疾可得而知之矣自古相傳皆謂去交十五度以下則日月有蝕殊不知日月之相掩與暗虛之所射其理有異焉今以日月經度之大小較去交之遠近以黃道之斜正天勢之升降度仰視旁視之分數則交虧得其實矣乃以一篇步日一篇步月一篇步星案以下脫一篇步發斂五字下云以卦候沒滅為之下篇者言為步發斂之下篇歐陽史約其文稱謹以步日步月步星步發斂為四篇是也以卦候沒滅為之下篇都四篇為歷經一卷歷十一卷草三卷顯德三年七政細行歷一卷臣檢討先代圖籍今古歷書皆無蝕神首尾之文蓋天竺胡僧之妖説也近自司天卜祝小術不能舉其大體遂為等接之法蓋從假用以求徑捷于是乎交有逆行之數後學者不能詳知便言歷者有九道以為注歷之恆式今並削而去之昔在唐堯欽若昊天陛下親降聖謨考歷象日月星辰唐堯之道也其歷謹以顯德欽天為名天道元遠非微臣之所盡知但竭兩端以奉明詔疏略乖謬甘俟罪戾夫樂作于人心成聲于物聲氣既和反感于人心者也所假之物大小有數九者成數也是以黃帝吹九寸之管得黃鐘之聲為樂之端也半之清聲也倍之緩聲也三分其一以損益之相生之聲也十二變而復黃鐘之總數也乃命之曰十二律旋迭為均均有七調合八十四調播之於八音著之於歌頌宗周而上率由斯道自秦而下旋宮聲廢洎東漢雖有太子丞鮑鄴興之人亡而政息無嗣續之者漢至隋垂十代凡數百年所存者黃鐘之宮一調而已十二律中惟用七聲其餘五律謂之啞鐘蓋不用故也唐太宗復古道乃用祖孝孫張文收考正雅樂而旋宮八十四調復見于時在懸之器方無啞者安史之亂京都為墟器之與工十不存一所用歌奏漸多紕繆逮乎黃巢之餘工器都盡購募不獲文記亦亡集官詳酌終不知其制度時有太常博士殷盈孫案周官考工記之文鑄鎛鐘十二編鐘二百四十處士蕭承訓校定石磬今之在懸者是也雖有樂器之狀殊無相應之和逮乎朱梁後唐歷晉與漢皆享國不遠未暇及於禮樂以至於十二鎛鐘不問聲律宮商但循還而擊編鐘編磬徒懸而已絲竹匏土僅有七聲作黃鐘之宮一調亦不和備其餘八十三調於是乎泯絶樂之缺壞無甚於今陛下天縱文武奄宅中區思復三代之風臨視樂懸親自考聽知其亡失深動上心乃命中書舍人竇儼參詳太常樂事不踰月調品八音粗加和會以臣嘗學律歷宣示古今樂録令臣討論臣雖不敏敢不奉詔遂以周法以秬黍校定尺度長九寸虛徑三分為黃鐘之管與見在黃鐘之聲相應以上下相生之法推之得十二律管以為衆管互吹用聲不便乃作律準十三絃宣聲長九尺張絃各加黃鐘之聲以第八絃六尺設柱為林鐘第三絃八尺設柱為太蔟第十絃五尺三寸四分設柱為南呂第五絃七尺一寸三分設柱為姑洗第十二絃四尺七寸五分設柱為應鐘第七絃六尺三寸三分設柱為蕤賓第二絃八尺四寸四分設柱為大呂第九絃五尺六寸三分設柱為夷則第四絃七尺五寸一分設柱為夾鐘第十一絃五尺一分設柱為無射第六絃六尺六寸八分設柱為中呂第十三絃四尺五寸設柱為黃鐘之清聲十二律中旋用七聲為均為均之主者宮也徵商羽角變宮變徵次焉發其均主之聲歸乎本音之律七聲迭應而不亂乃成其調均有七調聲有十二均合八十四調歌奏之曲由之出焉伏以旋宮之聲久絶一日而補出臣獨見恐未詳悉望集百官及內外知音者校其得失然後依調制曲八十四調曲有數百見存者九曲而已皆謂之黃鐘之宮今詳其音數內三曲即是黃鐘宮聲其餘六曲錯雜諸調蓋傳習之誤也唐初雖有旋宮之樂至于用曲多與禮文相違既不敢用唐為則臣又懵學獨力未能備究古今亦望集多聞知禮文者上本古曲下順常道定其義理於何月行何禮合用何調何曲聲數長短幾變幾成議定而制曲方可久長行用所補雅樂旋宮八十四調并所定尺所吹黃鐘管所作律準謹同上進唐失道而失吳蜀晉失道而失幽并觀所以失之由知所以平之術當失之時君暗政亂兵驕民困近者姦於內遠者叛於外小不制而至於僭大不制而至於濫天下離心人不用命吳蜀乘其亂而竊其號幽并乘其間而據其地平之之説在乎反唐晉之失而已必先進賢退不肖以清其時用能去不能以審其材恩信號令以結其心賞功罰罪以盡其力恭儉節用以豐其財徭役以時以阜其民俟其倉廩實器用備人可用而舉之彼方之民知我政化大行上下同心力強財足人安將和有必取之勢則知彼情狀者願為之間諜知彼山川者願為之先導彼民與此民之心同是與天意同與天意同則無不成之功攻取之道從易者始當今惟吳易圖東至海南至江可撓之地二千里從少備處先撓之備東則撓西備西則撓東彼必奔走以救其弊奔走之間可以知彼之虛實衆之強弱攻虛擊弱則所向無前矣勿大舉但以輕兵撓之彼人怯弱知我入其地必大發以來應數大發則民困而國竭一不大發則我獲其利彼竭我利則江北諸州皆國家之所有也既得江北則用彼之民揚我之兵江之南亦不難平也如此則用力少而收功多得吳則桂廣皆為內臣岷蜀則飛書而召之如不至則四面並進席捲而蜀平矣吳蜀平幽可望風而至唯并必死之寇不可以恩信誘必須以強兵攻力己竭氣已喪不足以為邊患可為後圖方今兵力精練器用具備㣥下知法諸將用命一稔之後可以平邊臣書生也不足以講大事至於不達大體不合機變惟陛下寬之至神無體妙萬物以為體至道無方鼓萬物以為用故渾淪未判一氣湛然太極才分三才備位是以陰陽無私順萬物之理以生之天地無為輔萬物之性以成之夫人生居天地之中雖稟五行之英為萬物之秀者其形未兆其體未分即夙具其美惡蘊其吉凶故其生也天地豈容巧於其間哉莫非順其世循其理輔其自然而已故夙積其善則賦其形美而福祿素積其惡則流其質凶而處夭賤此其灼然可知其確然不易也是以古之賢聖察其人則觀其形觀其形則知其性知其性則盡知其心知其心則知其道觀形則善惡分識性則吉凶著且伏羲日角黃帝龍顏舜目重瞳文王四乳斯皆古之瑞相見之間降之聖人也其諸賢愚修短猶之指掌微毫絲末豈得逃乎故相論形神之術自此而興焉其來極多其論至冗許負袁天綱陶隱居李淳風之後不可勝計然皆窮幽探賾得之至妙其或紊亂所説或異或同至使學者不能貫於一致余自稚歲潛心於此考古驗今無不徵效遂特離林屋洞下山三載遍搜古今考之極元者集成一家之書目之曰太清神鑑以其至大至明形無不鑑至清至瑩象無不分然未足奪天地賦形之機亦可盡人之性情耳謹序
