front:
  text: 全唐文欽定全唐文卷二百六十冽武后朝官侍御史歷倉部郎中
  hash: sha256:9a525d4cb847527034dadc24ce8b43cc6c832fc00ab92e02bc248950636fc5cd
  markers:
  - {type: head, offset: 13, content: 張冽, id: KR4h0168_NFKB_260-h1, level: 1}
body:
  text: 藉慶食邑象賢繼踵承家之道將不愧於前修疇嗣之宜庶遙符於古義眷言長嫡疾乃天然既類郤克之刑將同孟縶之廢且仲子立衍循魯禮而知歸韋家封成鏡班書而有序瞻惟乙請未爽通規在律雖違行權則可請停司禁無拒乙辭廷芝武后朝官河陰令遷戶部員外郎郗珍荷衣橫帶緝柳編蒲有賤贏金將希片王南都自富北郭實貧殊謝梁鴻不求因熱乃如蘇季願借餘光巳接武於匡衡方齊蹤於甯越室仞非邃未窺夫子之牆紡績可兼輒鑿隣人之壁情非竊伏事涉穿窬抑有前聞宜徵故實請從按記不合論辜皇都赤縣帝宅仙居萬國攸歸四方是則縣令幸陶昌化謬宰神京過北陸之寒初屬南宮之朝退珂迴九陌騎歷三條俄逢躉芥之兇復屬闌單之變材非玉鉉顧牛喘而多懷任綰銅章覩人亡而不問既昧為邦之術徒興體國之心是曰曠官足成侵職所司糾劾有合通途任志慶偶千齡榮登萬室彈弦作宰動宓賤之芳聲製錦無傷追尹何之美政浹辰行化方類子平終日清談更同夷甫有恥且格寧收檟楚之威以德代刑但示蒲鞭之罰王茂幸編名數預奉弦歌欣承赤子之恩喜沐慈君之惠屬以皇明遠散天使遐巡思甄三異之能式舉一同之善訪察使官膺珥筆任總方書飲騘馬於江城集霜烏於海樹埋輪糾忒豈謝張綱攬轡澄清何慙孟博眷言褒貶當適古今儻昧激揚遂乖彰癉徵劉寬之故事仁迹斯存覽任志之清猷嘉聲可挹既稱良吏雅合名聞忽見吹毛便虧直指銅章有術久垂桃李之陰鐵柱無謀且寢梧桐之問鄭冑家承曳履職綰鳴弦將登會玉之山欲屆沈錢之浦方冀騁牛刀於劍冶舞鸞磬於鍾巖不孤王阜之能方繼子游之躅洎乎行窮楚塞路入吳江遙山將遠樹不分極岸與長天共合歸濤活活全疑白鷺之飛去舸遙遙直似青鳬之逝覩茲艱險慮有漂沈方懷魚腹之憂豈顧龜膓之斃情來歛轡既有慕於王陽興盡迴舟亦何思於戴道行背浙流之右坐歸漳水之濱從此挂冠頗諧高節因茲弭棹未犯彞章輙被告言殊驚物聽任其罷退良謂合宜月觀遙臨旁分震澤雷陂迴瞰近屆邗溝郊連五達之莊地近一都之會人多輕剽俗尚驕奢序屬良辰躔係令節江干可望俱遊白馬之濤邑屋相趨并載飛龍之舳泛長波而急槳有類乘毛涌修浪而鳴舷更同浮葉簫吟柳吹疑傳塞北之聲棹引蓮歌即唱江南之曲王文閭閻賤品蓬蓽庸流名教非閑喪儀多闕三年巨痛無聞毀瘠之哀五月佳遊且預歌絃之樂重以情存勝負志在雄豪爭馳赤馬之津競賭青蚨之貫先後由其不等忿爭於是遂興無思李老之言俄折羊公之臂然則居喪聽樂已紊科條在服傷人一何凶險論情撫事深穢皇猷定罪明刑理資丹筆矩武后朝官侍御史頃者小人告訐習以為常內外諸司人懷苟免姑息臺吏承接強梁非故欲其然規避誣搆耳又推劾之吏皆以深劾為功鑿空爭能相矜以虐泥耳籠頭枷研揳轂摺脅籤爪懸髮薰鼻臥鄰矢溺曾不聊生號為制獄將或累日節食連宵緩問晝夜搖撼使不得眠號曰宿囚此等既非木石且救目前苟求賒死臣竊聽輿議皆稱天下太平何苦要反豈被告者盡是英雄以求帝王耶只是不堪楚毒自誣耳何以覈之陛下試取所告狀酌其虛實者付令推之微訊動以探其情所推者必上下其手希聖旨也願陛下察之今滿朝側息不安皆以為陛下朝與之密夕與之讐不可保也聞有追攝與妻子即為死決故為國者以仁為宗以刑為助周用仁而昌秦用刑而亡此之謂也願陛下緩刑用仁天下幸甚思齊武后朝官刑部員外郎凡斷刑名須得指實朦朧作狀斟酌結刑司刑比申過為非理欲令集議須審議由狀未指歸遣議何事仰尋所推之案取堪憑據之由齊哲長安四年官洛陽縣尉臣聞古先哲后咸以為獨智不可以任已專欲不可以違衆所以樹板徵謗懸鼓納諫思聞過而從善全直言而沃心用能綱紀天下統成大業經曰無為而治者其舜也與夫何為哉安人之道貴於省事陛下以大足元年冬廼睠咸京長安三年冬還洛邑四年又將西幸聖躬得無窮於車轝乎士卒得無弊於暴露乎扈從僚屬俶裝而不濟隨駕商旅栖泊而匪寧東周之人咸懷嗟怨昔者周穆王欲周行天下使皆有車轍馬跡祭公謀父作祈招之詩以止王心陛下玉琯四周金輿三駕車轍馬跡雖未出於兩都巡狩省方事不師於五載雷動天轉海運山移儼彼六龍歲適千里此亦近於形人之力矣安人之道臣用有疑此邦父老抗表留駕陛下告以吐蕃和親為詞臣愚以為未得也況吐蕃最醜西隅咫尺自京到洛曾不崇朝陛下乃欲務其艱遠惠然從之夫千鈞之弩尚不為鼷鼠發機況萬乘之君輕為邊戎枉駕夫人至賤而不可至愚而不可欺經曰可畏非人是人不可欺也今陛下此言是欺下也使國史何以書之臣朽才淺學竊為陛下籌之陛下今幸長安也乃是背逸就勞破益為損何者神都帑藏儲粟積年充實淮海漕運日夕流衍地當六合之中人悅四方之會陛下居之國無橫費長安府庫及倉庶事空缺皆藉洛京轉輸價值非率戶徵科其物盡官庫酬給公私靡耗葢亦滋多陛下居之是國有橫費人疲重徭由此言之陛下之居長安也山東之財力日匱在洛邑也關西百姓賦役靡加背逸就勞破益為損殷鑒不遠惟念之文王敬授民時所重惟穀今陛下鑾輅以明年正月即塗歲首是就耕之初駕行非務農之意無乃不可乎元琮武后時人昔者結而為山嶽融而為江海炎上作苦實表陽九之德潤下作鹹克明陰八之數上泄雨露純陽流沛之道也下疏川瀆凝陰潤物之理也是以雨露為長物之本川瀆為潤物之宗故稱之以靈長亦賴之以通濟則知水之為德其大矣哉百門陂案水經出自汲郡共山下泉流百道故謂百門會同於淇合流於海魚鹽產利不可談悉爾乃闕一字溫夏漁飛濡漱沫負㣥巖以作固涵細溜而成廣酌而不竭挹之彌沖帶蘇門以霧杳望太行而煙接借如楚國雲夢廬峯太湖樊邱之隈小溪抱寒而永注東海之外大壑潀流而靡極亦有崑嶺四水陽山二泉敘浦見美於郢歌蓬池久通於汴邑斯並昭著方冊備經帛丿糸世分派雖衆為利不宏豈與夫導源迅激積潤潛涌比魏代之龍號同漢官之鴈名或以熨升標奇或以元武為稱仙公臥隱聞諸抱朴之篇叔度凝清出在林宗之論洎夫洗累蕩穢揚清激濁所以顯乎義也浴及㣥生滜流萬祀所以昭乎仁也弱而難勝即其勇也變盈流謙即其智也以此四德以利萬人悠悠既湊滔滔不息加以背險絕面形勝奔流暴灑層波疊躍或沷日以收㶑忽因風以作濤其利也則商榷畎澮吐納疆場蓄為屯雲泄為行雨沐時稼以俱就喜年穀之屢登其清也則湛若狐凘凈猶蟾魄可以洽洗耳之樂興濯纓之歌皎鏡不限於冬春洞澈無隔於深淺其險也則仰眄崇岫俯臨遐潭潤壑窈窕而助闕一字葛蘿闕一字沈以增峻其神也則不行而至不疾而速惟慌惟忽若有若無禎應克著休祥閒發無幽不顯有感必通祠堂滿陰靈石周險每至元律既謝韶陽肇開紫鶯嬌春紅萼笑日申祈者焂來忽往奠祭者煙交霧集綺羅縟野遠增芳歲之色泉瀨吟吹闇合雲龢之音樂哉盛哉抑亦曠古之異迹也縣令曹府君諱懷節仞宇峻邈德聲昭宣軒軒霞容湛湛海量夙明撫字之要載綰弦歌之秩虞君蒞俗已剏三科滕令移風時兼六縣可謂愷悌君子人之父母者也丞齊顗德量沖遠器業通明抱信以居忠養真以凝粹光八顧之清範韜七州之敏學主簿程列剛毅有斷撝謙自牧尉王表霜雪其操芝蘭其芳尉霍南金不受私謁閑於公政頃以西郊失候南畝思澤未浹滂沲之潤尚勞雲漢之謠曹君恤人疾苦傷時稼穡躬率僚伍親祠廟壇叩頭流涕拜手啟祝曰懷節濫司銅墨時屬炎陽思與幽冥實佇靈祐若商羊起舞報以牲牢如川䴏不飛覆其棼橑於是樽俎具迾弦歌三請下湘君於鱗屋水馬吹泉期太一於蛟館雲魚噴浪俄而景貺昭發飛甘驟零實符三闕一字之請頗叶一旬之驗或時獨雲鬱起密雨晦飛又以啟晴應時獲霽豈不以至誠允切神道遙徵故得歲阜人和風行草偃休詠盈於道路美聲逸於都鄙雖復江陵滅焰緱氏祈日何以加也其廟有二古碑篆隸磨滅不可復覩鄉望前泗州徐城縣尉樂處機獲嘉公賈粗光古錄事隗允張明張福等或舄弈簪屨或優游耕鑿擊壤食太平之粟長歌悅文明之代僉以為百門之利千載無易增修舊烈不亦可乎猶恐歲光忽變靈跡無紀式刊翠炎將表鴻休怡諫隴西人官殿中侍御史內供奉陰闕一字潤下德稱靈長既成物而宏濟闕一字發源乎濫觴涵仁不測垂利無疆廣矣浩浩濞焉湯湯鄘衞之野共山之下爰出靈泉洗霧游煙禎應昭顯祠堂巋然神樂泠吹珍羞迾筵分派逾廣飛湍靡極吐納隄防周流稼穡序悲炎亢時乖播植幾勞雲漢之篇徒望湘濱之翼曹君為政樂不可支敬羞蘋藻式薦靈祇景貺潛發浮甘遠洎允符束皙之請豈謝闕一字琨之異蕤賓在月穀雨盈旬酌彼行潦薦於神明稽首請止獲霽於辰天長地久歲不留刊石紀銘表禎休闕四字淩千秋志素武后時官司刑司直按邱鼎身居文職黑襖子即是武夫之衣若不夙懷叛心擬投豫州無故不合輙造又燒却反狀分明請付法者邱鼎反逆夙蘊包藏非祇一塗豈唯今日虺貞荊河作逆之歲於時秩滿神泉准其家在西京旋即合歸本舍為與虺貞相應紆道水下嘉州更至荊襄路過淹留遂經一歲當聞荊州河起逆星夜即向唐州荊河界首於懸泉館遂共男晙俱作黑褐襖子擬充戰服即明事相應接及聞貞敗星夜走來神都即將襖子布施天宮寺明知元來所造緣反合殺況又聖澤哀矜重令來中丞推覆追奴問鼎勘案逾明論其本愆辜當萬死徐丞內縱姦慝外詐平反奉勅令推反人得實寧敢隱默者邱鼎謀反與虺族同謀包藏日深又共逆黨連結有功舞文巧法黨逆不忠批退欲縱反人每有唯希僥倖不尋案狀孟浪即批即不據科條法外豈得依允請據志素所批之狀與有功意故縱逆人之平即請申秋官及臺集衆官議歸仁武后時人張校書作虛室賦以示子文旨清峻元義深遠予味之有感聊為宴居賦以和之其詞曰氣序忽諸日月其除夏盡炎歇秋至涼初地僻而人物自少庭閑乃室宇成虛寂爾無悟蕭然宴居覽聖賢於上古窺得失於前書或智之不足或愚而有餘諒千變而萬化尤難得而備疏若夫名因行立身由才致官要則謗議斯起譽高必讒毀自至所以君子逃名達人避位養性以安其體摛文以見其志且貴不如賤善亦同惡貴則但益憂勞善乃未離貪著徒憐顛覆之禍虛纏愛欲之縛前事既忘後車焉託倘來未足有慰或去可以無怍固當絕於可否齊其適莫聞寵詎驚其心居陋寧改其樂葢老氏稱德所貴先慈孔門之道一以貫之於常則有允出厥茲屈伸委運行用隨時既無去無取亦何慮何思愔武后時人臣聞百王之失皆由權歸於下宰臣持政常以勢盛為殃魏冉誅庶族以安秦非不忠也弱諸侯以強國亦有功也然以出入自專擊斷無忌威震人主不聞有王張祿一進深言卒用憂死向使昭王不即覺悟魏冉果以專權則秦之霸業或不傳其子孫陛下創業興王撥亂英主總權收柄司契握圖天授已前萬機獨斷發命皆中舉事無遺公卿百寮具職而已自長壽已來厭怠細政委任昭德使掌機權然其幹濟小才不堪軍國大用直以性好淩轢氣負剛強盲聾下人芻狗同列刻薄慶賞矯枉憲章國家所賴者微所妨者大天下杜口莫敢一言聲威翕赫日已熾盛臣近於南臺見勅曰諸處奏事陛下已依昭德請不依陛下便不依如此改張不可勝數昭德參奉機密獻可替否事有便利不預諮謀要待畫旨將行方始別生駮異揚露專擅顯示於人歸美引義不如此州縣列位臺寺庶官入謁出辭望塵慴氣一切奏讞與奪事宜皆承旨意附會上言今有秩之吏多為昭德之人陛下勿謂昭德小心是我手臂臣觀其膽乃大於身鼻息所衝上拂雲漢近者新陷來張兩族兼挫侯王二仇鋒銳更不可當方寸良難窺測書曰知人亦未易人亦未易知漢光武將寵龐萌可以託孤卒為戎首魏明帝期司馬懿以安國竟肆姦回夫小家治生有千百之資將以託人尚憂失授況兼天下之重而可輕忽委任者乎今昭德作福專威橫絕朝野愛憎與奪傍若無人陛下恩遇至深蔽過甚厚臣聞蟻穴壞堤針芒寫氣涓涓不絕必成江河履霜堅冰須防其漸權重一去收之極難臣又聞輕議近臣犯顏深諫明君聖主亦有不容臣熟知今日言之於前明日伏誅於後但使國安身死臣實不悔陛下深覽臣言為萬姓自愛承嗣隴西人維大周長安三年九月十五日隴西李承嗣為尊親造阿彌陁像一鋪鐫鏤莊嚴即日成就威嚴相好燦然圓滿所願資益慈顏永超塵網銘曰有善男子投心正覺是仰是瞻爰雕爰斵金容寶相雲蔚霞駮一契三明長銷五濁師旦新豐人官會稽尉二京分邑墨綬居官三揖通班黃圖作宰自可遠聞善政廣樹嘉猷江陵叩頭止風有驗洛陽強項據地無從可得道乏良規人餘惡少翳桑墻下不見童子懷仁垂楊路傍唯聞暴客相殺一朝之忿爰揮白刃百年之命遽掩黃泉縣宰既不開口死者固難瞑目人雖進路事屬退朝忽此逢牛翻能駐馬㣥非向楚詎是因風氣似還吳猶疑見月但以時流冬景寒結層冰自有慘切之容元無溫燠之候六畜行觀致喘四時坐見失宜此乃丞相及言何煩邑宰垂詰操刀之術罕明代斷之口厶虫難免憂喘不憂殺正是越司問牛不問人豈非離局以為妄干他事實亦雅叶本條璀武后時擢書判拔萃科大夫稱家榮高食采冢子當室業茂本枝盈大足徵期克昌於魏國六三能履或取笑於齊堂弱足者居奉身而退遵康叔之命以崇次及察韓黯之衷雅符高讓則先茅舊土今也載傳孤竹遺風此焉無替法聽棄疾禮貴象賢立弟捨兄理復何惑師道垂拱元年進士開元時官司勛倉部員外郎戶部郎中問欲使吏潔冰霜俗忘貪鄙家給人足禮備樂和庠序交興農桑競勸善師期於不陣上將先於伐謀未待干戈遽清金庭之祲無勞轉運長銷玉塞之塵利國安邊佇聞良算明言政要朕將親覽對臣聞棲培塿者不覩嵩泰之干雲遊濘濴者詎識滄溟之沃日臣蒿萊弱質衡泌鯫生未識廣廈之居安知太牢之味不量蕞爾輕縱襃然謬達天聰兢惶聖問粵惟皇家出震累葉重輝天人歸七百之期宗祊聯億兆之慶太宗以明一察道括珠囊而總萬方高宗以通三御宸轉金鏡而清九服用能肅清天步夷坦帝途垂莫大之鴻基託非常之元聖伏惟皇太后陛下道超鍊石化軼捫天被子育之深仁宏母儀之博愛星階已正尚雖休而勿休宸極既安猶損之而又損方欲還淳返朴振三古之穨風緝政蒼生降四海之昌運拔幽滯舉賢良黜讒邪進忠讜故得鴻稽接軫和宇宙之陰陽龍武分曹節風雨之春夏禮樂備舉學校如林俗知廉讓之風人悅農桑之勸猶復旁求輿議虛佇芻蕘既屬對敭敢陳庸瞽誠願察洗幘布衣之士任以台衡擢委金讓玉之夫居其令守則俗忘貪鄙吏潔冰霜矣旌好學之流賞力田之伍則家䍐貧惰位列文儒矣降通親之使喻彼梟心發和戎之官收其雞肋則四夷左衽顛倒來王三邊元惡謳謠仰化矣自然籠羲駕昊六五帝而四三皇遠肅邇安飛英聲而騰茂實謹對問朕聞運海摶扶必藉垂天之羽乘流擊汰必佇飛雲之檝是知席蘿黃屋握鏡紫微誠資獻替之功必待弻諧之助所以軒轅撫運遂感大風之祥伊帝乘時遽致秋雲之兆朕雖慙古烈而情切上皇未校滋泉之占猶虛傅野之夢欲使歲星入仕風伯來朝河薦蕭張之名山降甫申之佐垂衣佇化端拱仰成多士溢於周朝得人過於漢日行何政道可以至斯思聞進善之言以副求賢之旨對臣聞立極膺乾之君當宁御坤之主欲臻至道將隆景化莫不旁求俊彥廣命英奇凝庶績以安人綏萬邦而撫俗是故軒邱膺籙委四監以垂衣丹陵握圖舉八元而光宅於是齊桓擬之於飛翼殷武興之以羹梅克贊人謀實宣神化陛下功包邃古道逸上皇授受惟明謀謨克序弻輔之任惣風力於前驅爕理之司列伊周於後乘振鷺翔鸞之客畢湊天階乘箕降昴之英咸趨日路猶且虛心卜兆託想旁求冀山谷之無遺庶賢良之畢萃俯訪愚魯敢述明敭誠願發德音下明詔咨列嶽訪㣥公舉爾所知不遺於側陋知人不易無輕於慎擇下僚必錄上賞頻霑則葉縣遊龍自九天而下降燕郊駿馬赴千金而遙集漢未為得周豈能多盡善盡美於斯為盛謹對問朕聞明王闡化感人心之靈聖后宣風移動植之性遂使翔龍薦檢鳴鳳司晨獸解觸邪草能指佞仰惟前烈何德而臻此乎朕逖聽遂初載欽神化每欲反斯煢薄景彼上皇欲使瑞萐司庖僊蓂候月遊四靈於翠苑集五老於榮河致此休徵良由政感佇聞啟沃以副虛襟對臣聞化浹乾樞景緯呈其靈貺澤周坤絡卉木效其禎祥是以若霧非煙必應文明之后九莖三秀允符光宅之君陛下應期納籙撫運登皇孝道格於元穹仁心光於紫極自臨萬域輯御㣥方靈瑞屢臻休徵薦至五蹄仁獸樂君囿而來遊六象威禽拂帝梧而萃止豈直銀黃玉紫雉白烏丹翻鄗上之二稃拔江閒之三脊固亦巡河受檢拜洛披圖降五老於星躔歸四神於雲路盛矣美矣巍乎煥乎躪三五以騰徽吞八九而高視尚且崇謙讓之道守沖撝之德抑斯天瑞訪此人謀陛下雖不宰其成功微臣亦不知其所謂謹對問朕聞三微遞代哲后所以承天五運因循明王由之革命或金水而鱗次應火木以環周或寅子變正天人之統斯辨驪騵改色昏旦之用有殊茲乃渙汗圖書昭彰歷數受位出震以迄於今莫不母子相承終始交際然而都君土德翻乃尚青天乙水行寧宜用白深明要旨其義何從若以秦氏霸基便有符於紫色則魏人鼎足豈復應於黃星緬鏡前修又以矛盾張蒼之議既頗反於公孫賈傅之談復遠乖於劉向子大夫學包㣥玉文擅鏘金既聽南史之篇方佇東堂之問詳敷事實靡得浮詞商搉前儒誰為折衷對臣聞方圓既闕帝王斯建四遊將六氣交馳五德與三微遞變自攝提著紀出震登皇循木火而相承用驪騵而繼作雖復武功文德揖讓干戈御旒扆以高居握圖籙而深視莫不垂天人之統順寅子之正始終之際何莫由斯暨乎運偶都君時云土德道鍾天乙數叶水行子勝母而尚青母生金而尚白略言其美斯窮奧旨至若秦居閏位紫實非正之符魏得中區黃標應星之紀未有矛盾允愜隨時漢祖承天人多異議張蒼言水而黑畤方興公孫據土而黃龍復應代二劉之父子推五運之相沿較彼前談斯為折衷臣學非博古識昧知新輕陳管穴之窺猥奉天人之問慚惶靡地悚越兼深謹對問朕以紫極暇景青史散懷眇尋開闢之源遐覽帝王之道或記載遙邈無其處而有其名或墳籍喪亡有其號而無其事將求故實以佇多聞至如化被柱州創基刑馬兩代之事誰遠五德之運何承石樓之都見匪均霜之地窮桑之壤元非測景之區時將域彼偏方惟一隅而獨王輕茲中土棄九洛而不營大夏之時化臻禁甲隆周之日道致韜戈而七十一征翻在風皇之運五十二戰更屬雲官之期斯則偃伯之人無聞於太古推鋒之弊反息於中葉澆淳之道名實何乖欲令歷選前聖遠稽上德採文質之令猷求損益之折衷何君可以為師範何代可以取規繩遲爾昌言以沃虛想對臣聞一剖為三始鴻濛於太易九變於七漸茫昧於無為既分清濁之儀乃列君臣之位則有天皇首出瞰柱州而宅土地皇革命俯刑馬以開都年匪異於萬八千號稍殊於七十二既云木德亦曰火行開於天地之初錄自帝皇之紀至若石樓遠界窮桑延壤非萬邦之土中為二代之天邑斯乃時猶鷇飲道上鶉居誰知風雨之均能建皇王之宅亦分長於九域豈獨王於偏方乃觀象垂衣化穆羲軒之代翦商伐扈人澆周夏之年而皇德方隆未弭戰爭之患王道纔著復存韜偃之日是則懷柔伐叛取亂侮亡雖鍾大道之行終佇勝殘之戰是政劣於太古非事優於中代陛下選芳列辟垂範千年王化既平能事斯畢亦何必損益今辰之政師謨往聖之規撫和琴而促柱御夷途而止轍因循勿失臣謂其宜謹對鍠洛州溫人神龍中官黃門侍郎卒橫戈出塞雖五校之嚴規主奠臨喪亦十倫之重制建德身參戎旅名列材官負羽鞬將馳邊戍枯魚銜索旋迫私庭瞻大樹於轅門痛風枝之不靜聽嘶驂於戎幕感隙駟之難留燕雀之心己纏於罔極熊羆之效未遑於載馳詳甲乙之科無虧典禁推忠孝之道何爽公私既而匍匐墳埏充窮隴隧霜露之思義貫天經精感之微遂彰靈應白兔呈貺背三窟而來馴紫芝符祥對九莖而擢秀州司請加襃異錫類之儀載光使局作此科繩昧禮之情何甚聖朝孝理史官自合發揮建德至誠門閭固宜旌表連梵武后朝對策擢第問元默垂拱理歸上德法令滋彰事鍾澆季是以唐虞盡象四罪而咸服姬夏訓刑三千而愈擾故知勝殘去殺必在於宏仁反樸還淳不務於多辟方將削茲三尺專循五禮幸陳用捨之宜以適當時之要對法星垂象列九霄而照燭習坎分爻疏六位而輝煥故有皇王慎罰正俗以經時聖哲詳刑開物而成務莫不克清函夏載穆黎元制天討之威嚴宏秋官之典憲舜遊媯汭乃去四兇湯出鑣宮諒除三面然則質文異代興廢殊途微禹會昌仁流於下泣獨夫受戮禍招於剖心自運往道消淳離朴散王風不兢菀柳之刺斯聞后德方衰杞槐之制斯闕望夷招敗酷甚凝脂函谷生災冤多精氣雖復蕭何改創爰始九章溫舒上言仍譏一失網漏吞舟之罪士苟持寬律加盈閣之繁吏還舞智邈乎遺法允屬升平大唐執紀先天凝圖王氣化軼胥庭之上功超步驟之前掃氛祲於乾樞靜囂塵於地軸紫微君聖時乘光於得一黔首安生日用陶其吹萬皇帝上元統歷下武嗣徽道叶順風契黃神之罔象精通就日符赤運之文明於是職列英奇朝班俊乂載升降之節既著禮容臨甲乙之科方在政辟道無為以端拱思有罪而責躬念向隅之獨嚬乃納隍而軫慮曲詢管庫取薦芻蕘誠宜妙平反旁求庶獄渭橋驚馬必歸張季之言禁圍射兔勿爽高柔之旨於公陰德委以廷尉之司盛吉深仁授以憲曹之任剖符寄劉寬之輩蒲鞭之教可追分陝趨召奭之儔棠陰之聽斯在加以五詞咸備兩造兼持運靜躁於韋弦聽遲速於寬猛獬豸雖觸咎繇行其惠化蒼鷹輟號郅都息於煩苛自然圄犴空虛靡怨黃沙之罪鉗釱安用無施白粲之刑則迹邁成康道逾文景不仁自遠無得而稱謹對不耀文成子武后時上表請代父死臣某言臣聞哀哀父母生我劬勞欲報之德昊天罔極臣父文成充使不了特寘嚴刑罪小責深不勝冤苦街衢驚歎長幼咸嗟皇天后土實所鑒照臣聞有理不伸枉填溝壑臣子情切骨肉恩深請以微軀代父當死乞寬父之殘命展愚臣之孝心伏乞天命俯垂矜察不耀萬死猶荷再生臣父朝無近親孤宦獨立苗踈難植根淺易危無風而自倒不寒而自戰李全交挾邪作蠱舞法弄權虐甚周興酷殊來俊枉陷良善以立已功惡貫已盈貪殘事敗不慙顏厚猶事糾繩不懼皇天仍居憲府罪輕責重其枉實深但恨明時虛編咎悔伏願陛下採輿人之誦聽左右之言乞不濫無辜庶冤魂重返即臣雖死之日猶生之年不任酷裂之至冒死投匭以聞
