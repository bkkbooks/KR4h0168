front:
  text: 全唐文欽定全唐文卷一百七十四張鷟三
  hash: sha256:0674a48f3f11d64b5f6fa851cb47e26e02203750b0dbe20c2eaa8d2ec03ef14a
body:
  text: 狼望蕭條龍堆莽蕩迤邐白蘭之表迢遞蒼松之外傍通鬼域遠絕人區綿亘三十六蕃經過數萬餘里公主遠嫁徒聞黃鵠之歌高昌入朝即動金驢之唱陳湯斬首之烈遙靖郅支班超定遠之蹤俯臨蒲海戊已校尉鎮靖遐荒都護羌夷招攜異域田慎名參越騎位典戎韜仗節烏壘之前揚斾絳賓之右不能因利乘便躡充國之英規矯制申功展陳湯之盛績羸師遠入追廣利以長驅煮弩充飢慕耿恭之無退豈得暫辭艱弊不顧宏圖纔住十年即停四鎮功無縮地阻境界於邊庭虛奏聞天失威嚴於大國遂使皇威曠蕩莫漸於流沙聖澤滂沱不行於近磧區區炎漢猶拓土以開垣赫赫隆唐擬抽邊而削地誠合解退以肅朝章所請無端告記為允糴食以救之並免飢餓御史彈不承制命擅用官物大宛之國舊出名駒小月氐郊素宜良馬出陽關而直望但見平沙歷險固以遐征惟多積雪秋風旦慘白日黯而將昏寒雲夕愁黃塵暗而無色斜衝烏弋直指龜茲踐無雷之舊墟馳不霜之故地東道之駿仍未交關西迴之兵輒為賙賑但重人賤畜往哲之嘉謨救死扶危明王之盛事若逢兵餓汲黯之擅無傷矯費齎資敬聲之狀無捨柏臺奏劾合寘嚴科棘署論刑更宜推鞫待知的狀方可量裁天孫東岳有國之元儲帝子前星通邦之上嗣河海重潤控玉檻以疏源日月重輪順珠囊而叶度位隆銀牓青方列長子之宮望重銅樓紫極纂承祧之業濟南鳳集天骨已彰清河蛇盤靈資早應丁讓職惟清道務掌干城列羽衞於瑤山典戎旗於望苑自可畫堂之側肅肅霜戈甲觀之前森森電㦸何得安細針於座上竟未匡毗帶長劍於街中曾無覺察遂使盤遊無度玩好非宜日遠之對蔑聞星流之瑞徒應昔乘小馬尚致譏嫌今駕牛車深乖典則所由既不匡正㣥下竟未上聞虧失朝章理須明法重離明兩允屬利貞一日三朝實歸仁厚府官等肅承蘭殿虔奉桂宮識金玦之無歸知玉牀之可惜春誦夏絃之訓先有常儀冬書秋禮之規非無永範何得不遵彞教專事荒淫逐迅羽於長林接輕肥於淺草南皮射雉好樂無厭東門逐兔長驅不已籠山絡野恣盧犬於平原冒雨侵風縱蒼鷹於廣澤一兵一馬皆奉嚴符乍出乍歸皆憑獻表進不能諫退不能言虛曠國班謬尸天祿並宜削黜審擇賢才自然鶴禁長清龍居永肅大祫之禮列聖之攸先吉禘之儀明王之令典莫不尊崇祖考敬事神明既申如在之誠聿起不欽之罰若嚴禋有則赤雁降於祠宮祭謁無虧白鶴翔於清廟則有輕饗薦黷齋明肅承顧廟虔奉閟宮方行盥滌之規有事宗禋之典龍旗是禱鞗革鶬鶬信馬來朝威儀肅肅理須恭敬乃志靜慎其心玉瓚之獻克修金罍之壽斯薦何得散齋之日迓祉之辰周澤之潔無聞荀彧之容先發長驅馬足便過元伯之家頓作驢鳴乃向仲宣之室不恭之罪法有常科失禮之愆宜從明憲官減一等銅坐四斤數外更求未為通允社為土主稷是穀神侑以姬周之祖配以烈山之子納籙受圖之哲乘乾執契之君莫不崇尚其道肅恭其事夏殷履運仍開松柏之禋漢祖登朝復設枌榆之祭分其玉帛建五色之靈壇薦以牲牢具三重之芳酎八音間發六舞交馳社主享而成休明靈歆而降福命三老率百神應瑞雀於青疇掃飛蝗於翠畝則千倉歲積三農之聚有餘萬庾年登九載之儲斯溢馮敬身居典禮職在秩宗應知六祝之詞頗達六祈之訓帶斯凶服輒入禮宮御史奏彈雖言奉法詳刑結罪須按科條廟享誠則有違社稷元來不禁彈無反坐律須執文枉被凝霜理須清雪古之天子制禮以安人昔者明王作樂以崇德移風易俗成孝敬而厚人倫快耳娛心感鬼神而通教化調茲六氣徵主夏而角主春導彼五音宮動脾而商動肺天則不言而信故奏雲門以祭天地則不動而生故奏咸池以祀地道則無象而化神則不怒而威故暢之以鐘鼓娛之以絲竹廉直正誠之響發而人肅恭粗厲猛毅之音生而人剛健哀思為兦國之典其政陵遲怨怒為亂世之音其風轉替故詳其律呂師曠知其盛衰察彼軒懸延陵識其興廢自王澤既竭風雅莫流文侯聽鄭而不寢孔子聞韶而忘味桑間濮上流宕忘歸下里巴人奔波逐遠聖朝均四暢調八風聽鳴鳳以和音命飛龍而度曲上通咸夏式隆殷薦之儀俯定莖英允叶昭容之典歌九敘諷六詩聞其聲而德和省其文而心正盧慶職參樂令匠典倡優履師摯之前軌躡曹褎之舊躅以為質文遞變禮樂殊途輒進嘉名深陳雅稱執大象而天下往其德彌長行大道而海內和其風載遠命伶倫而討韻雅合夔鐘召荀勗以調聲自諧牛鐸千童萬舞共朱雁以齊行八佾九歌將赤蛟而合節尤裨聖化甚益皇明宜下太常先宣美號鳧鐘隱隱隨九變以交馳鼉鼓逢逢和八音而間作或短簫橫引朱鷺鏗鏘或長笛手吹紫騮淒切東宮所設殊非列代之規平閣爰施亦匪先王之制然國家儀注須應禮經既崇鹵簿之班又惠功臣之錫有家有國朝章不可暫虧去食去兵禮樂如何輒廢王乾狀請崔嵩判停爾愛其羊我愛其禮速令鳩集請勿狐疑楓天棗地觀倚伏於無形方智圓神察幽明於未兆百年鼠卜尚辨吉凶五德雞占猶知禍福長安季主不以榮辱存心蜀郡嚴平不以衣冠介慮袁綱雅望四兆妙達二臣榮參九筮之班藝審千蓍之訣東方朔之暗射指掌可知淳于智之精通毫釐無失均趙達之回筯要妙如神比吳泰之求棋縱橫必中有蛇銜筆立定徽祥有蟻開封行看潤澤遺豹冠於獵所逆見繇辭懸馬鞭於樹間預知貧富如斯術數實繁有徒崇儼薄解醫方微知小伎遭費禕之刺客遂隕輕姿遇袁盎之讐人俄頃重至莫知賊首須察真蹤綱為研尋竟無的狀將為隱避爰被奏彈理須直守正途不可偏居小節何也龜稱聖智不能免宋元之鑽龍號神明不能脫夏豢之網郭璞洞林之妙竟被嚴誅京房易傳之微終從大戮知有所不察神有所不通既處重刑恐虧平典五情失候多生心腹之災六氣乖宜必動肌膚之疾絕更生之藥必藉良醫乏返魂之香誠資善療張仲業優三世方極四難非無九折之能實掌萬人之苦郭玉診脈妙識陰陽文摯觀心巧知方寸仙人董奉之靈杏足愈沈疴羽客安期之神棗攻茲美疢華陀削胃妙達古今仲景觀腸譽聞寰宇聖躬述譴謹按名方肅奉龍顏須窮鵲術豈得不遵古法獨任新情棄俞跗之前規失倉公之舊軌若君臣相使情理或通若畏惡相刑科條無捨進劾斷絞亦合甘從處方即依誠為若屈刑獄之重人命所懸宜更裁決毋失權衡粵若顓頊命南正以司天昔在帝堯列東官以賓日履端於始序則不愆舉正於中時乃不忒自秦稱金贙叨五勝之宏綱漢起玉雞叶三微之遠度徵洛下命唐都攷大衍之始終心伏羲夢周旦步太初之盈縮四營因之式序八變所以無差五星叶度於上萬物和平於下杜淹位參羲仲聲振子韋覽沮誦之前規遵史談之舊典星聚東井逆辨休徵月犯少微懸知應變使星已發無違寸景之期劍氣莫關不爽分毫之信宮居太后夙已上聞宋起真人豫為先覺譙周之論蜀滅杜瓊之說曹興此歷代之攸欽邦家之要籍淹之少子雅愛其書習張衡之渾儀討陸績之元象父為太史子學天文堂構無墮家風不墜私家不容輒聚史局何廢流行准法無辜按宜從記挈壺所掌司刻成班銅史分曹金徒啟位陰蟲成魄恍惚如神靈蛇吐津希夷若鬼日不藏往晦明之所莫違月不爽來寒暑由其順序自三苖亂政五霸任權史官喪紀疇人廢業孟陬於焉舛候攝提所以乖方五夜不分六日無辨聖朝修百王之弊政舉千載之頹綱龍首應時雞人合節大小之候共砌莢以凋榮昏旦之期逐宮槐而舒卷二分二至無虧余遂之蹤大餘小餘允叶容成之度何得漏生弛慢吐號乖宜朝官顛倒於衣裳街吏失期於鐘鼓齊君望曉莫聽鐘聲京尹失時空奔馬足漏司乖錯准法論刑上稽乾象列酒旗之星下鑿坤儀制酒泉之郡杜康至妙肇發馨香儀狄精微爰施麴蘖用之於宗廟可以歆享百神用之於冠婚可以諧和百姓杜綱名班釀署官列醞司須明五齊之規頗解三酒之術十釀之法竟未留心九醞之方曾無介意雞鳴下釀取蘭香而桂辛鳩集為徵遂棗酸而梅酢懼貽災譴密縱奸訛頓下生蠅之灰用添浮蟻之味遂使聖人賢者變易常滋從事督郵乖違舊性事窮理盡方啟遁詞觸網掛羅妄稱前例豈得索郎清德橫被侵誣巴鄉實功枉遭塵點既虧竹葉之術宜從棘木之科在祀與戎國之大事祭公不宿人之常禮班賜神惠多少先有成規輕媟鬼餘賢聖非無舊識明眎疏趾具在常經剛鬣柔毛備諸彞典李休位霑主守職綰太官雖無負鼎之功實委操刀之任餘胙肉欠頗有指歸依問款詞具陳萌緒為郎中吳爽強割逾豐博士王筠叨分太廣拔劍割肉媿方朔之能仁詣府退魚謝公休之貞潔匪張華之職分數粒仍多同廉頗之無厭百斤不足非慙非恥與草狗而不殊惟暴惟貪共茅鴟而莫別深虧雅躅實蠧名流宜竄遐荒式清朝列籩豆之事各有司存罇俎之間非無主守陳之郊祀可以接神明用之禮儀可以寧邦國蚳醢雁醢之類百代相因龍醬蟹醬之流千齡不易呂建策名膳府委質庖官既掌兔臡實司蛟鮓鶬寒四獸之腊罔不留心羊血五侯之鯖曾無注意鹿牙之糝馬齒之鹽點以鳳林之酢飲以烏程之茗孟宗遺母猶避嫌疑杜豫餉人惟求免罪忠以奉上酌貪泉而彌清廉以當官置脂膏而不潤朱文季執心強直榮位騰遷黃叔度獨守恬虛聲名藉甚不求於物遂被疾於孤醒不屈於人終見排於衆醜楊回三逐盛德宜收張既十年公平可錄理宜甄拔以勗朝班趙慶佞媚為姿諂諛成性貪殘不軌獸中之有餓狼輕薄無儀人間之有猰鬼江淮果物荔枝龍眼之珍河濟飴糖米蘖馬鞍之妙石蜜百花之蘂味是蜂調甘瓜五色之香美疑鶴集豹胎龍脇鳳腊猩脣越俗鳴蟬之稻安定噎鳩之麥趦趄雉伏謁宰輔之車前踧踖蛇行拜公卿之馬首諂事賈謐阿附董賢徒有事於苞苴不自親於機杼盜家財而餉家長人路難通偷社酒而勸社神冥途未許鼠竄求道小人引之以為能狐媚取容君子得之而不貴宜從斥逐以率㣥僚漢書十志農為有國之基洪範九疇食是生人之命由是古之聖帝躬事三推昔者明王親行萬乘鼉鼓震地鑾輿動天聳鳳葢以來雲建龍旂而拂日青壇岳立翠幙煙平百司於是駿奔三公以之肅事紺轅黛耜克遵應劭之儀綠耦朱紘允備曹襃之禮周宣王之寢廢自有前譏漢文帝之遵崇斯為后則王堯職參廩署位掌甸師欽承北極之尊祇奉東郊之典欲使載芟之詠無替於前修保介之容有崇於古訓潘岳創賦備陳執耒之端曹植為文具述勤耘之美以今之刺史古之諸侯既稱字養之官實曰教人之首若令沮勸必在躬親此雖識於朝三猶未聞於暮四祇若壇飛羽爵便為勸稼之方門列春牛即是趨農之候更施別法於是為煩平土就蠶彰乎曩烈亘山成繭著自前書爰崇黻冕之宜遂展鞠衣之範暨乎姑洗應律甲乙司辰鳴鳩醉椹之朝戴勝降桑之日鴛帷就列一十四位導其前鷩服斯臨百二十官隨其後鑾鑣順動翠葢鬱其參差鳳轄徐飛翟羽紛其容裔懿筐是執柔桑是攀勸以女兒之蠶收其園客之繭三盆事畢可獻之於王公六服功成可陳之於宗廟昔三王季末五霸淩遲禮樂自出於諸侯征伐不由於天子遂令列國命婦竊三宮之禮容連伯嬪嬙僭九重之祕式聖朝八紘同貫四海為家芟往帝之澆風削前王之弊政自我作古何禮之拘化俗調甿斯為折中王堯所請理未通方如愚所裁告記為允務農重穀曠代之彞典稅熟貢新經邦之雅訓金不可食輕瑞銑以投鼃玉不可衣棄和珍而抵鵲一日不作天下受其飢三載斯盈海內霑其潤磨蜃而耨百谷所以繁滋驅象而耕三農以之告稔彩雞屢見非無白壤之儀春鳥不鳴自有黃雲之應姚泰策名列署受委䆃官專司瑞鵲之禾實主鳴蟬之稻赤烏積耨冰粟千倉黃雀隨犁秋苖萬畝五種燕頷之粲粒若流珠六月翟白之租精如散玉豈得安定之麥不進中宮長安之米竊留私室刑名極峻法焉可逃情狀難容死有餘譴但平贓定律必依高估供進所須宜從極價論次縑則狀當絞坐准詳夫元天北列運斗極於璇樞大地東傾鎮江河於玉岊晝夜則晦明無定羲舒為朝夕之資動靜則虧缺有時乾坤非長久之器豈湛然常住大雄包混沌之源寂爾無生正覺出氤氳之表故能使九十六道紀菩提之一門三十三天貫須彌之四頂振嵐飈而吹大塊運僧祇於埏埴之前揚智炬而爍洪鑪置賢刧於陶鈞之上其去也後天而滅故現滅而歸無其來也先地而生故因生而示有青霄帝座降靈氣於中胎白淨王宮孕神姿於右脇蓮乘七步樹下六年薦玉象於祥符啟金人之瑞夢影流中國大地由其震動光入太微星垣為之不見法王之應跡也妙覺常身本無顏色至人垂教遂有形儀開滿月之奇姿韞中天之異相髻銜龍髮頂秀螺文萬印生於瑞手千花發於神足蓮開青目毫光照於四天花豔丹脣頂彩周於十地法王之寶相也具一切智號悉達多通萬物心名希有相往來不窮之謂聖陰陽不測之謂神不化而行不言而信持慧燈而耀長夜揚法舸而救迷津為塵品之醫王作㣥生之慈父法王之至仁也法忍智忍率難忍以皆空無心即心總㣥心而俱攝珊瑚江海一指測於波瀾琉璃日月二手分其晝夜目連持線天地為之頹綱舍利投針山石由其絕紐法王之神力也儒童毓慶闕里生歎鳳之聲摩訶降跡苦縣誕猶龍之彥仲尼禮樂之標首仰至聖於迦維伯陽道德之真宗訪古皇於天竺故知一乘妙旨超然居十翼之先二諦微言邈矣出三清之表法王之威德也率陀天上飛閤神功舍衞城中香臺造化百千妙界生於鳥翅之間十二音聲出於象牙之表金繩百丈下照日宮珠網七重傍臨月殿萍流地上化為池沼之形花散空中變作樓臺之影法王之壯觀也佛中佛日天上天人金口振於西方銀函洎於東夏無能間細寫鼇滶於波流有外談空運迦維於宇宙合掌腹內思聞十善之音聲舒翼殼中遙相四天之說法法王之仁化也高梯直上包括太虛抽針旁綴區分小有貫花之句光如水上之蓮說偈之音皎若星中之月非有相而非無相凡聖莫測其幽微空是色而色是空聖愚不知其要妙法王之教化也法身無像故因像以宣功道本無言亦因言而示教塵俗不可以久處故厭世而歸空真如不可以道標故凝神而降跡吾之去也因辯無常吾之來也因談緣起情有所至河海為之編龍神有所歸叢林為之變鶴從滅至滅能通寂滅之因無生示生永入長生之地法王之變化也由是八方迴向萬國歸依慧日被於三千法雨流於百億周穆王之代聖教方融漢明帝之時慈風漸扇年移晉宋運屬周隋蒼鵞出而天地屯赤龍發而干戈起秦川涌血羅什不歸趙郡僵屍圖澄永去西域䭾經之路荊棘參天東郡畫像之郊風塵撲地我高祖神堯皇帝傍迴地軸蹴崑崙以西傾太宗文武聖皇帝仰握乾符掃欃槍而南滅削平嶽瀆舒卷風雲芟毒樹而建祗園拔邪山而開福地實性寺則貞觀三年奉敕之所建也平原控趙渤海臨齊上衡畢昴之星下瞰衡漳之地浦稱駿瀆馬頰太史之遺蹤地號弓高龍頟將軍之舊業爰於此地迴構乾堂興八會之香臺闢三休之妙觀龔遂解繩之邑寶線爭施曹丕沈李之郊天花競落螺宮映水枕藕關於黃河魚梵吟風接蜃樓於滄海實栖神之祕宅毓慶之神區者哉寺主久依定水早庇禪休功濟有緣業優無學意花不染宏上善於慈心勝果爭攀察中乘於慧眼非色非相凝神究竟之端無我無人高蹈苦空之外上座都維那等並尋鷲嶺訪道雞園歸誠甘露之門自得醍醐之性鵞珠護戒標苦節於堅林龍鏡澄空照真規於靜域以為修身者福福遂則殃銷堅善者功功施則緣發旁求大匠廣召山虞粵以儀鳳二年移寶堂於寺內去舊處三百餘步設奇功於地道神妙無方窮逸思於天關靈機不測魚鱗翠瓦逐層閣而舟移雁齒青階帶崇基而轂轉虹梁曜日煥若神行鯨棟凝煙故非人力寶階星動似忉利之飛來紺殿雲浮同化城之涌出豈非威神自在不可思議者哉於寶堂內敬畫釋迦尊像一鋪鎔金範素寫雘圖青斲象浦之靈珠瑑龍泉之羽璧鮫人水織競送霜縑蛾客抽絲爭投雪線七重交映百寶莊嚴實相端凝粹容圓備蜂王獻蜜紛飛紫紺之樓龍女持花出入珊瑚之殿諸天獻果芙蓉生寶座之前居士焚香柏葉起金鑪之上千軀聖像據六地而揚音八部龍神下三天而奏樂斯乃元功幽贊故無德而稱焉調露之初邊烽屢警七重黑暈萬里黃沙旄頭干太白之精素髮挹中台之翠鄉人等九州令族四海良家提龍劍而星馳撮犀渠而電激為鵬為鶚輕飛雁塞之前如虎如貔迴嘯狼居之表陰山霧廓瀚海波清憑慧力而服魔軍持廟算而摧孺子共申宏願植此豐碑記歷代而長存惟令名之不朽奉為高宗大帝星珠斂耀斗電潛輝御鸞鳳於金輿邃攀龍於鼎嶠媧皇誕裔姬姒降生斷鼇立極之神功乘龍御天之大業凝情三昧早慧六通坐蘭掖而虔誠仰茨山而展慶使持節滄州諸軍事滄州刺史李公闕庭堅之雅操列馬喙之殊姿漢太尉之名家履龜文之異相賈琮出刺下車而肅百城延壽閒居閉閣而綏千里長史北平公晉太尉之寵首有虞陶唐左相之榮實兼平景龎士元之展足終非百里之材王休徵之佩刀實有三台之望朝散大夫行弓高縣令晉君嘉禾獻瑞門傳翠葉之風鬯草襲勳業踐彤弓之錫橫綺琴於膝上翠翟朝馴攬明鏡於懷中青鸞曉集丞太原王愿主簿隴西李灌尉河東衞神暹常山張行昇等並周靈王之太史仙人白鶴之苗裔帝顓頊之儒宗柱史青牛之葉冑羊車映王煥昇氣於淮川鵲印流金鬱靈符於寶軸驥從東道方申逐日之功鵬舉北溟皆戢摩霄之翼鄉望某等並地鄰鄒魯境接燕齊俗富詩書家豐禮樂海隅鷗狎猶存射雉之規河朔鷹揚仍帶爽鳩之氣雋不疑之故里氣調魁梧石仲容之舊墟英靈俊傑德由名顯功以頌宜非筆無以申其功非言無以敘其德旁求翠玉遠播鴻徽刻龍首於銀鉤鑿龜文於玉版蓬萊之水三尺孤摽碣館之前扶桑之日再中獨立金臺之上俾夫天銷刧石瓊文寫而無窮地入微塵寶字書而不滅重宣此意而為頌曰太虛混沌寂寥沈默二儀既判三才允殖地缺東南天傾西北陵遷谷轉山開水塞月滿則虧日盈則昃大哉正覺竟元不測先地而極後天而益不滅不生無聲無色曜魄指掌乾坤胷臆聖人立教用形表則實相端嚴粹容岐嶷銷滅五苦削平六賊水號連河山名檀特六度斯闡三明在即牛口西來馬明東陟玉偈光啟金言允克碣石燕郊平原趙國雀臺西指蜃樓東偪建此神區爰崇淨域龍圖合兆龜書應墨綺綴星浮金鋪電赩地神獻果天廚送食八會雲平三門箭直寶堂移轉神通智力飛檐振羽虹梁動翼閤似雲行樓如鶴息日逐階旋天從橋匿野外塵黃星間暈黑爰憑淨居翦除荊棘雁塞消氛龍樓受職銀書玉版鐫名記德臨雁塔之階基對蜂臺之閫域窮逸思於圖篆放神功於翦刻孤標九流之間獨立金臺之側惟令名之不朽或馳芳於百億
