  - {type: head, offset: 0, content: 疎勒鎮軍大使左驍衞將田慎狀稱安西路遠沙磧極深國家鎮遏甚為勞弊一住十年死兦殆盡欲益反損請停四鎮(左右驍衞二條), id: KR4h0168_NFKB_174-h1, level: 2}
  - {type: head, offset: 254, content: 郎將侯珪使西域巿馬屬磧石乏食遂將齎馬價, id: KR4h0168_NFKB_174-h2, level: 2}
  - {type: head, offset: 429, content: 御史彈東宮每乘牛車微行遊諸寺觀左右清道元不設儀仗殊失禮容所由率丁讓等並請付法(左右衞率府二條), id: KR4h0168_NFKB_174-h3, level: 2}
  - {type: head, offset: 625, content: 東宮無事輒發四府兵獵未經奏許所司不言有, id: KR4h0168_NFKB_174-h4, level: 2}
  - {type: head, offset: 792, content: 太廟令朱景方行大祀乃於散齋而弔喪御史彈付法大理斷官減一等徵銅五斤(太廟郊社二條), id: KR4h0168_NFKB_174-h5, level: 2}
  - {type: head, offset: 993, content: 二月有事於太社太常博士馮敬有大功喪隱而不論遂以行事付法科罪, id: KR4h0168_NFKB_174-h6, level: 2}
  - {type: head, offset: 1208, content: 太樂令盧慶狀稱五帝殊時不相沿樂三王異代不相襲禮請改聖朝樂名大象天下往極為號又應國姓(太樂一條), id: KR4h0168_NFKB_174-h7, level: 2}
  - {type: head, offset: 1599, content: 鼓吹令王乾狀稱鼓吹鹵簿國家儀注器具濫惡請更改脩制禮部員外崔嵩以府庫尚虛以非急務判停(鼓吹一條), id: KR4h0168_NFKB_174-h8, level: 2}
  - {type: head, offset: 1722, content: 太卜袁綱善卜所言立驗有術士崇儼夜無故被殺不知頭首使綱筮之竟不知賊處御史彈綱情有向背而不言付法(太卜一條), id: KR4h0168_NFKB_174-h9, level: 2}
  - {type: head, offset: 2012, content: 大醫令張仲善處方進藥加三味與古方不同斷絞不伏云病狀合加此味仰正處分(太醫一條), id: KR4h0168_NFKB_174-h10, level: 2}
  - {type: head, offset: 2214, content: 太史令杜淹教男私習天文兼有元象器物被劉建告勘當並實(太史一條), id: KR4h0168_NFKB_174-h11, level: 2}
  - {type: head, offset: 2472, content: 漏生夜睡不覺失明天曉已後仍少六刻不盡鐘鼓既晚官司失朝(刻漏一條), id: KR4h0168_NFKB_174-h12, level: 2}
  - {type: head, offset: 2671, content: 會期日酒酸良醞署令杜綱添之以灰御史彈綱綱款好酒例安灰其味加美不伏科(良醞一條), id: KR4h0168_NFKB_174-h13, level: 2}
  - {type: head, offset: 2869, content: 太官丞李休供祭餘胙肉少依問款稱太常博士王筠每分肉取常多郎中吳爽拔劍割肉而去(太官一條), id: KR4h0168_NFKB_174-h14, level: 2}
  - {type: head, offset: 3052, content: 光祿寺卿楊裕狀稱掌醢署令呂建居官清整不邀名譽忠肅奉公未蒙進考(掌醢一條), id: KR4h0168_NFKB_174-h15, level: 2}
  - {type: head, offset: 3266, content: 珍羞令趙慶諸州所進口味割截餉送權門每得好官衆共談薦名實相反深虧國章(珍羞一條), id: KR4h0168_NFKB_174-h16, level: 2}
  - {type: head, offset: 3448, content: 廩犧令王堯上封事准禮諸侯九推今之刺史古之諸侯今刺史無藉田處不可以訓農(藉田一條), id: KR4h0168_NFKB_174-h17, level: 2}
  - {type: head, offset: 3699, content: 皇后親蠶諸侯之小君古者亦有蠶室今廢其事不可以率下(親蠶一條), id: KR4h0168_NFKB_174-h18, level: 2}
  - {type: head, offset: 3930, content: 䆃官署令姚泰盜用進米二十石上米倍四十五價次絹估三十價斷絞不伏(䆃官一條), id: KR4h0168_NFKB_174-h19, level: 2}
  - {type: head, offset: 4144, content: 滄州弓高縣實性寺釋迦像碑, id: KR4h0168_NFKB_174-h20, level: 2}
