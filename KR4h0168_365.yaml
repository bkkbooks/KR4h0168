front:
  text: 全唐文欽定全唐文卷三百六十五方開元中將仕郎守任城尉
  hash: sha256:114c850bf465b36bf3b9d5b824c0971e1095b532cb97cf3abe5b8db5a4bf472d
  markers:
  - {type: head, offset: 14, content: 游方, id: KR4h0168_NFKB_365-h1, level: 1}
body:
  text: 唐再受命能事備於開元乃十有三年告成於岱翠華之往也則北巡濟河玉軑之旋也則南指陳宋故行宮御路次夫任城焉陽門橋者跨泗之別流當魯之要術初隨時以既濟因大駕而改功觀其壅川為池因地設險削金堰於馳道甃石門以飛橋夾以朱欄揭以華表炳若星漢拖如虹霓蓋乘輿乃以陽朝御六龍翊萬騎聲明紀律文物比象回睿覽於洲渚駐天蹕於川梁先時望君之來也則金繩以界之鐵鎖以扃之厥後榮君之顧也則浚池以廣之築館以旌之經始茲宇惠而不費當儲峙之末有芻粟之餘散之則人獲錢鳩之則童力以千計請為亭館以壯橋池故鄉老白於吏邑吏謀於府因人之欲得事之宜鼛鼓不勝工力徒競鬱為層構在水之陽壓鮮原以迥出流古墉而却倚危櫩巘巘反宇峨峨勢搖烟潭岌若飛動南軒虛明以晃朗北室懿濞而清泠自堂徂亭邐迤幽徑上覆藤篠前臨芰荷憑高佇目萬象皆見夫河南之勝有三橋亭得其一梁園有梁王之迹圃田有僕射之陂平池曲榭美則美矣豈與夫島嶼開合林嶂蔽虧旁薄大荒吐納霞景畫橋南度像清洛之規虛館闕一字臨叶滄洲之趣有是夫有是夫任風姓之國也謠俗古遠其太昊氏之遺人富而教之合於魯頌當太平無事而朝野多歡不然此池何以得花縣之名吾僚何以得仙舟之目不其闕一字而時則有若邑大夫滎陽鄭公延華信昭盈缶道契虛舟禮樂之行仁德歸厚丞范陽盧璝主簿平昌孟景尉琅琊王子言尉河東裴迥皆士林英華學府金碧能勤在公之節無廢會友之文嘗授簡於方以為之記會方有公車之召請俟於異時金鄉尉潁川韓邠卿舍於裴氏言於衆曰游子之讓斯文以諸公在此諸公之意也子何辭焉因命秉燭俾方操翰夜而成記翌日遂行開元草六年秋七月旬有四日云興宗字季長與李華同時王者建德是啓苴茅諸侯象賢必異名數器服將施於九命蒲穀攸彰於五等惟甲筮仕當年彈冠上國梓材晉用羔鴈周行方參叔豹之名未就伯禽之典稽諸載策閲以等威元士本視於附庸賜命不同於列國異唐侯之桐葉未翦參墟如鄭武之緇衣尚勤周政提封匪盈萬井旌旗猶闕九斿丞相出關昔聞其語絳侯就國今則未宜請詳訴者之詞無縱有司之糾禪師諱貞茲郡京兆人也俗姓張氏自輪奐規唐貂蟬蔚漢姜宋莫齒袁楊肯倫師泛浪知清依林擇茂將揮聖姓載顧華宗年弱冠秀才登科知名太學以為儒家非正諦文字增妄想故去彼取此而為上乘因亦既闕一字回遂受衡陽止觀門居于洛陽白馬寺口不絶誦習心不離三昧闕一字妙闕一字之慧萌刜賴耶之濁種庶滅裂有我干盤無生焉後隸此郡開元寺又以為喧者起之本靜者定之緣利緣舍起故復居此窟茨廡藥蔬之妙受溪篁甗才山歹之勝塵可略言矣前刺史故丞相齊公崔日用吏部尚書李皓皆頂奉山宇斯豈元道歟然而闕一字熊軾互龍宮紆紫綬稽䊷闕二字以惕凡庶之見聞兆昏蒙之闕一字嚮闕一字以開元十三年九月十八日闕一字滅于開元闕一字舍春秋八十有四物慘烟雲哀廠田坴黑白塗闕一字隕泣人到於今僧弟子宗本覺枝外茂闕一字性內融三晉公侯旋師子夏伯喈墳籍悉付仲宣痛微言之絶聆感星躔之易次遂為銘曰圓凝寂體兮邈彼真如闕二字無明兮倏若蘧廬慈梁過駟兮歲月其除松栗窅冥兮宛此幽居思鼎天寶時官侍御史大道既隱天下為家度土以居人量地而制邑將興版築必俟命一作金槌劃以斷岸長雲負以重城四郭孟軻五畝匪宅是營孔某數仞爰茲仰止生異里仁之美行多嫉惡之辭苟此不從胡施而可棄人用犬雖猛何為且闔門塞竇在明時而難許比周阿黨豈君子之攸宜損乙既謝於當全罪甲庶期於無訟然恐造有妨害兆有吉凶或利晉而闕秦將抑彼而就此各從所便不亦宜乎騫開元時官監察御史養形元豹兮以隱霧而成文振羽飛蛾兮因附火而自焚彼紛然之落隼識昧此而喪㣥誠不知高非小者所處靜為躁者之君苟失度而棲適將受斃而何云且夫長墉崇崇矗若雲峙飛隼羽世羽世倏隨風止曾不料其微陋焉更知其休否故疾惡之夫善射之子操騂角之弓調白羽之矢縱穿楊之妙呈落雁之美量遠近於目端審高下於規裏紛洞胸而達腋果裂嗉而破嘴原夫剛鏃初架徑弦正張引彎彎之月影迸的的之星光鏟毛羽之振迅挫容貌之昂藏審必中而後發固焉用而不臧若乃處身順理投跡知常時決起而無滯或怒飛而有方烟雲足以遐賞翳薈足以來翔必絶捐軀之患豈貽在彀之殃是則素有雋志往無不利藏器者人獲隼者器矢應弦而上激禽應矢而橫墜微隼諒比於小人高墉亦方於重位苟不戒於遊處曾何免於顛躓士有五善斯在載櫜有待麗龜之知未忘貫隼之誠勿改幸文武之不墜希葑菲之必采則知發矢有期獲禽俟時想大易之靈文微言何賾稽高墉之元象壯志空持既是則而是效永念茲而在茲諭開元時官戶部金部員外郎惟古人之衆技必有託而觀智既垂誡以為喻故求能而不纍見小人矜捷之迹識君子安全之義孰謂猶賢在於茲戲觀乎局之為狀也下方廣以法地上圓高以象天起而能伏危而不懸四隅咸舉四達無偏居中謂之豐腹在末謂之緣邊棊之為數也各一十二彙其始布也各以其類乃分其位環合相承櫛比為次其始作也則云其末一作密未之為難乃契謀衆指意或多端欲因先以獲勝恐致危以思安每遇敵其增惕故用之而假歡則有飛迅一擊紛紜既散慮加少以為多實思危而不亂謀而後動審而方按或始否而終亨或先傾而後嘆一作滿若乃臨邊却舞徑一作經天回越必在知機之微騁異而發至如垂空徑往應心得雋雖具美於踰平終易虧於履峻是知冒險者忘於趨進規利者失於戒慎豈與夫所適多方所求惟順因其利不失於得追其遠若歸於信乍從容以周旋時倏忽於一瞬伊衆趣之無極諒所戒以唯貪苟能知其義者無棄學而遐耽諫官永樂丞君立相以道崇相輔仁而協同庶輯多士允釐百工始於其家且有招賢之義刑於四海大啓尚賢之風猗乎哉漢武照臨之秋孫宏輔弻之歲能好善以逮下不恃貴而怙勢子興視夜居賓閣而猶開鶯鳴在春知賢路之不蔽道有行止時有興廢唯盛明則多士乃知人則下事遇風雨而不易將安樂以無替善乎立身誰為之繼夫拔茅者利其彙征開閣者求其友生茅思同茹友貴同榮故秩秩執初筵之禮丁丁諧伐木之聲在貴則勿遺乎賤於舊而孰能無情況閣可以備時之燥濕相可以為君之聽視賢是斯來賓是攸止升降出入溫柔之始脫粟布被雖逢汲黯之嗤下薦上聞竟遇漢皇之美況親仁而又崇此亦存乎下理動不為妄德風遐暢善固有由仁聲允休豈比夫漢臣崇奢後堂空羅夫妓樂齊相為隘纍年不易其狐裘者哉惟其人心酌乎故實德不遐棄敬之終吉然後知掃門者亦孔之醜望塵者未離乎咎當效平津而延賓知可大而可久大蠟之祭兮所以饗田神賞農務陰律窮元冬暮星回於舊列日極於餘度必也介僎謀牲牷具狐裘以黃皮辨以素蓋欲息田夫而裦歲賦夫搜索之謂蠟閉藏之謂冬其索也可以舉㣥祀其藏也可以勞三農欲碩苗而不害則迎貓塈於田鼠俾昆蟲之無作則祭坊與夫水庸以夫月建丑日在戌磔犧牲之體所以尚其腥登水草之菹所以貴其質詠豳詩以合雅擊土鼓以應律瑞穰穰芬苾苾百日之勤一日之薦或酬或酢既騰觚於無算為宮為徵方播樂於六變命清祀兮在殷復嘉平兮處秦繄率仁而終義實革故而迎新樂舉斯陶嗤子貢之來覿禮成而出美仲尼之為賓故聖人之舉事也務於崇勸戒敦否臧樹之瓜華告多藏者必覆致乎女鹿示不德者斯亡豈唯乎其儀抑抑其樂洋洋是以伊耆之禮不易大羅之職有常嗣歲將興或祈穀於上帝人才不匱或觀政於四方則知德厚者必祀功高者必載司嗇之祐維永瑞於我唐先炊之神豈獨見於前代故曰蠟也移萬人登百種可以志陰陽之變動稽上古之貴德考先聖之立言偉圭璋之挺異同君子之不諼是以先王之制斯器也不資於瑌珉而采之於璵璠欲使執之者比德佩之者克念自然威儀式序而有要有倫班秩以明而不濫不僭徒觀夫貂蟬巍峨以耀彩組綬輝映以生文使夫閲信義堅貞以守職感瑕瑜不掩以事君故能靖恭厥位克舉其勳豈不由圭璋與賢哲相成其業曠千古而流芬則聖哲之創物也誠有足而稱云原夫代人莫識荊山之裏藏精淪滓為寶未用多歷年祀笑瓦礫之相和喜蘭蓀之狎士嗟乎道不常屈終收卞子礱錯而真質自然拂拭而夜光特起悲楚君之瞽昧曷碔砆之能似既而玉人攻治圭璋自尊短長有制規矩攸存其聲清越其潤溫溫處掌握而升玉砌隨佩服而列金門暉映增美炯然自持涵瑞日之洞徹凜寒風之凄其然後知至寶之成器允夫天下之不疑亦猶賢人君子遭遇惟時有強學懷書清規皎如以不貪為寶思琢磨自居感圭璋之特達期哲人之吹噓地有四瀆其一也惟淮天有二曜其一也惟月月至明而不阻遐邇淮至清而可鑒毫髮故澄徹而相暉況埃壒而初歇泛灩多象朣朧交映類藏冰之在玉壺如臨水之懸明鏡引清潤而介若自潔和素光而終然不競千里伴孤舟而浮百丈動纎鱗之泳此所謂物至淨而增其淨也如其孕靈納影委照淪精徐而匪濁攬之不盈蟾蜍下沈對蠙珠而增美璿源圓折混金波而更清皓鶴奪彩玉砂迷明如分舟子之望終起漁歌之聲此所謂物無情而感有情者也古人有引類為贈因物傷懷風雲欲別琴酒相乖念居者已賦乎露濕寒草悲行者則想乎月映清淮蓋旨哉月以陰而合德水為坎而處柔或麗天而成象或紀地而引流契仁者之理靜含道門之清幽有二美矣允孚於休將以求古之情多聞是務一則以紀其善一則以垂為裕以灰厭暈不學淮王之方進牘抽毫空作謝莊之賦后非賢不乂魚非水不託賢豈晦以養蒙魚在藻而自樂故比事思理以徵以求如南有嘉魚是網是繳此所謂旌別淑慝愛人治國為鹽梅之器用作生靈之表則不然豈延故老於終南收釣翁於渭北張皇勳業者棄此曾未得我國家憂勞庶績寤寐求賢且束帛戔戔每布之於寰海豈矰笱卓卓獨蒸然於巨川吳坂不遺於騏驥丙穴載詠於鱏鱣詩人格言必將興之於王國老氏遺戒不可脫之於重泉所謂持竿執柄者未容易焉爰有深沈參對純嘏雖臨矰以及繳苟未高於天下徒噞喁於香餌終夷猶於取舍儻鼎味之見珍甘殺身於庖者夫象之大者曰天地理之廣者曰陰陽分八極懸三光不言而化有形而彰雖羲氏代掌初聞乎欽若而疇人離散覆亂其紀綱魏滅晉紹易齊為梁莫革其弊有失其方將以事極則反否泰何常故渾儀之制而新之我皇則天工協謀鳧氏畢至煽洪爐以效役鎔珍金以為器管之應一十二律罔極為期天之列二十八宿各分爾位然仰觀俯察以參以稽森羅乎象緯窮極乎端倪視朔於初時必書於雲物履端於始歲如得乎攝提候月不殊於蓂草測景方異乎土圭侔漢歷之黍纍不失同舜年之風雨不迷且人之常性也重更改貴因循罔知失善是與謀新更苟有利何憚釐革循苟有失何必相因故天垂象聖人以審度歷乖次聖人以創陳亦將利物安下適時補政齊上方之斗極為來代之龜鏡其義既美於斯為盛恐貽誚於不談故形之乎賦詠之宏天寶中官曲阜縣令若昔帝軌覆王綱頽則孔聖挺生而憲章克復故能羞人極酌彞倫聲明有度文武不墜講德泗上橫經淹中闕七字代嗚呼驅儒墨蹈仁義曠志鵬海服膺蟻術瑳琢金玉鑽仰情性者其唯兗公乎公姓顏名回字子淵魯人也闕七字十闕一字惠困而能通休休焉拾塵著德貧而不仕衎衎焉鼓琴自娛雖行藏坐忘黜聰墮體確乎不拔淡乎自持猶以農闕五字談岱嶽辨星精之騎及夫杏壇花白素王哀一臂之交槐市葉青丹史煥四科之首輝光昭晰芝蘭鬱芬年代浸遠久闕三字美哉偉歟美哉偉歟之宏刻鵠見嗤雕龍寡譽昔往神仙之郡未繫想於王喬今來禮樂之鄉猥飛聲於宓賤徒以絃歌叶闕三字翟之朝飛冰鏡澄明希阜鸞之曉舞而都督渤海李公諱闕二字庭誨八命分憂兩歧標慶海澄泓量月灼貞明德之至則膏闕二字軒令惟行則仁風發扇實來茲邑泛覽川原企佇邱墟慨然永歎曰城郭猶是鶴鳴千歲之歌陋巷空存人饗一瓢之樂淥池春盡白露秋生古往今來曷惟其已皇上禮行鄒魯思闡文明則夫子乘通三之尊兗公列惟五之長乃顧而謂之宏曰張令文蔚國章智樹仁策撝光可大譽望克韶宣王既以銘焉兗公豈宜闕爾恭惟嘉命勒茲徽猷俾夫亞聖同之前美由是也故得繚宮牆殖庭宇橑鳳翼瓦魚鱗清泠萃風瞳朧照日緑樹靃靡紅藥鬖髟沙林霽囀鶯階香舞蝶宴於斯餞於斯器用陶匏粢食不糳命曰稱兗公之德歟遂吮墨含毫聆奇瞬美網鳳策獵麟書牽彼朱絲緯茲黃絹其頌曰珠育滄溟鳳飛丹穴況德君子聞諸往說彼美兗公儒林秀栵惠和天授聲聞風烈道成四友德浮十哲魯明御敗衛通哀泄宛爾龍盤颯然鶴髮噫天喪子芳蘭已折其一聖皇有道四隩攸同恩覆天宇令發春風緬懷泗上睿想淹中俯徵魯禮贈此兗公天書戾止儒術昭融辨冕載頍威光自雄皇情有實陋巷何空其二昭昭良牧彬彬文質熊軾轥風隼旟槧日嶽鎮鄒魯道流溟渤神秀疏聳靈鑒朗逸德柔去殺仁深濟物來斯懷古中心一鬱麥秀已謠黍離云述爰命作頌傳諸故實其三瞻彼魯國地固人安龜鳧鬱氣洙泗鳴湍禮經雲委物産星攢伊豫作宰諒匪能官蒲城懷仲河陽謝潘棼絲可理製錦良難儉懷簞笥禮想雩壇塗荒露浥樹古風殘愛而不見慨然永歎棟宇是葺金石斯刊悠悠千載其芳若蘭楚開元中進士春促農黎人務穡用宜穜稑取化原防苟磽確之不滋將彊木之須糞或以今茲齊月言叶上春東作乃興咸持錢鎛南畝斯饁必漬蕡麻時器所以勸氓興鋤由其阜俗我疆我理庶起芃芃之秀或耔或耘思播茫茫之迹九夫取歡于歲稔十千期給于公征貪我上腴陷茲中典且農為理本法在禁弛有利輕爂誠宜重穀何繫之屠犬而謂殺生應稽諸草人將勤浸種縣司麗法詎曰優農或且犯齊期于宥獄恁元宗時人公田有洫私家有封人或不康君孰與足景分茅賜爵剪葉稱孤奪力役於夫家怠政教於公府徒使我疆我理空對汙萊爾宅爾田惟瞻磽確不勤東作但履西成急下民之見糧既同蝥賊務公家之厚斂寧有盜臣豈漢文施令之心乃魯宣救弊之術子行而法則有周公之典我愛其禮請遵尼父之言未可加刑宜從削地愐天寶十載官陳州司法參軍蓋聞文字聿興音韻乃作蒼頡爾雅為首詩頌次之則有字統字林韻集韻略述作頗衆得失互分惟陸生切韻盛行於世然隋珠尚纇虹玉仍瑕注有差錯文復漏誤若無刊正何以討論我國家偃武修文大崇儒術置集賢之院召才學之流自開闢以來未有如今日之盛上行下效比屋可封輒罄謏聞敢補遺闕兼習諸書具為訓解州縣名號亦據今時字體從木從才著彳著人施殳施安爾安禾並悉具言庶無紕繆其有異聞奇怪傳說姓氏原由土地物産山河草木鳥獸蟲魚備載其閒皆引馮據隨韻編紀添彼數家勒成一書名曰唐韻蓋取周易周禮之義也及案三蒼爾雅字統字林說文玉篇石經聲韻聲譜九經諸子史漢三國志晉宋後魏周隋陳宋兩齊書本草姓苑風俗通古今注賈執姓氏英賢傳王僧孺百家譜周何潔集文選諸集孝子傳輿地志及武德已來創置迄開元三十年並列注中等夫輿誦流汗交集愧以上陳天心又有元青子吉成子者則汝陽侯榮之曾孫卓爾好古博通內外遁祿巖嶺吐納自然抗志鈐鍵棲神梵宇淡泊無事希夷絶塵倏忽風雲靈焰怡懌考窮史籍廣覽㣥書欲令清濁昭然學之上有終日而忘食有連宵而不寐案搜神記精怪圖山海經博物志四夷傳大荒經南越志西域記西壑傳漢纂藥論證俗方言御覽字府及九經三史諸子中遺漏要字訓義解釋多有不載必具言之子細研窮究其巢穴澄凝微思鄭重詳思輕重斯分不令慁糅緘之金篋珍之寶之而已哉寧辭阻險敢不躬談一訴愚心克諧雅況依次編記而不別番其一字數訓則執優而尸之劣而副之其有或假不失元本以四聲尋繹冀覽者去疑宿滯者豁如也又紐其脣齒喉舌牙部仵而次之有可紐不可行之及古體有依約之並采以為證庶無壅而昭其馮起終五年精成一部前後總加四萬二千三百八十三言仍篆隸石經勒存正體幸不譏繁於時歲次辛卯天寶十載也休烈河南人開元初進士擢制科纍遷比部郎中出為中部郡太守肅宗朝擢工部侍郎徙國子祭酒代宗立纍進工部尚書封東海郡公加金紫光祿大夫大歷七年卒年八十贈左僕射諡曰元據周禮有命夫命婦夫朝人主婦朝女君自永徽五年以則天為皇后始行此禮其日也命婦又朝光順門朝官命婦並入雜處殊為失禮臣昨因秋饗漢高祖廟見傍無侍臣饗太公廟有張良在側伏以子房生於漢初翊奉高祖坐籌帷幄佐定天下考其年代不接太公自古配饗廟庭陪葬陵寢皆取當時佐命同受哀榮太公人臣不合以張良配饗請移於漢祖廟國史一百六卷開元實録四十七卷起居注并餘書三千六百八十二卷並在興慶宮史館京城陷賊後皆被焚燒且國史實録聖朝大典修撰多時今並無本伏望下御史臺推勘史館所繇令府縣招訪有人別收得國史實録如送官司重加購賞若是官書仍赦其罪得一部超授官得一卷賞絹十匹臣聞戎狄國之寇也經籍國之典也戎之生心不可以無備典有恆制不可以假人傳曰裔不謀夏夷不亂華所以革其非心在於有備無患昔者東平王入朝求史記諸子漢帝不與蓋以史記多兵謀諸子雜詭術夫以東平漢之懿戚尚不欲示征戰之書今西戎國之寇讎豈可貽經典之事且臣聞吐蕃之性慓悍果決敏情特鋭喜學不回若達於書必能知戰深於詩則知武夫有師干之試深於禮則知月令有廢興之兵深於傳則知用師多詭詐之計深於文則知往來有書檄之制何異借寇兵而資盜糧也臣聞魯秉周禮齊不加兵吳獲乘車楚屢奔命一以守典存國一以喪法危邦可取鑒也且公主下嫁從人遠適異國合務夷禮返求良書愚臣料之恐非公主本意也慮有奔北之類勸教於中若陛下慮失蕃情以備國信必不得已請去春秋當周道既衰諸侯強盛禮樂自出戰伐交興情僞於是乎生變詐於是乎起則有以臣召君之事取威定霸之名若與此書國之患也傳曰于奚請曲縣繁纓仲尼云惜也不如多與之邑惟名與器不可假人狄固貪婪貴貨易土正可錫之綿綺厚以玉帛何不率從其求以資其智臣忝列位職刊校祕籍實痛經典棄在夷狄昧死上聞伏惟陛下深察希綜曲阿人夫書匪獨不調端周正先藉其筆力始其作也須急回疾下鷹視鵬游信之自然猶鱗之得水羽之乘風高下恣情流轉無礙每字皆須骨氣雄強爽爽然有飛動之態屈折之狀如銅鐵為鉤牽掣之蹤若徑直針下主客勝負皆須姑息先作者主也後為者客也既搆筋力然後束必須舉措合則起發相承輕濃似雲霧往來舒卷如林花間吐每書一紙或有重字亦須字字意殊豫頃嘗為一體書賦亦略陳梗概今復論之用臻其理夫始下筆須藏鋒轉腕前緩後急字體形勢狀如蟲蛇相鉤連意莫令斷仍須簡略為尚不貴繁冗至如稜側起伏隨勢所立大抵之意員規最妙其有誤發不可再摹恐失其筆勢若字有點處須空中遙擲下其勢如高峯墜石又下筆勢如放箭箭不欲遲遲則中物不入然則施於草跡亦須時時象其篆勢八分章草古隸等體要相合雜發人意思若直取俗字則不能光發於箋豪若非靜思間雅發於中慮則失其妙用也余家歷世皆傳儒素尤尚書法十九代祖東漢左中郎雍有篆籀八體之妙六世祖陳侍中景歷五世伯祖隋蜀王府記室君知咸能楷隸俱為時所重從叔父右衛率府兵曹參軍有鄰繼於八體之蹟第四兄緱氏主簿希逸第七兄洛陽尉希寂並深工草隸頗為當代所稱也周宣王史籀作大篆秦始皇程邈改為隸書東漢上谷王次仲以隸書改為楷法仲又以楷法變為八分其後繼蹟者伯喈得之極元常或其亞草聖始自楚屈原章草興於漢宣帝楷法則曹喜師宜官梁鵠皇象羅景趙嗣邯鄲淳胡昭杜度草法則崔瑗崔實張芝張昶索靖衛瓘衛恆羲獻宋齊之間王僧虔羊欣李鎮東蕭子雲蕭思話陶隱居永禪師唐房喬杜如晦楊師道裴行儉高士廉歐陽詢虞世南及陸柬之褚遂良薛稷其次有琅琊王紹宗潁川鍾紹京范陽張庭圭亦深有意焉父兄子弟相繼其能者東漢崔瑗及實宏農張芝與弟昶河東衛瓘及子恆潁川鍾繇及子會琅琊王羲之及子獻之西河宋令文及子之遜東海徐嶠之及子浩蘭陵蕭誠及弟諒如是數公等並遭盛明之世得從容於筆硯始其學也則師資一同及爾成功乃菁華各擅亦猶緑葉紅花長松翠柏雖占雨露孕育於陰陽而盤錯森梢䒠茸豔逸各入門自媚詎聞相下咸自我而作古或因奇而立度若盛傳於代以為貽家之寶則八體之極是歸乎鍾蔡草隸之雄是歸乎張王此四賢者自數百載來未之逮也
