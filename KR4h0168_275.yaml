front:
  text: 全唐文欽定全唐文卷二百七十五懷慎滑州靈昌人舉進士景龍中累遷黃門侍郎賜爵漁陽伯先天二年同中書門下三品開元中遷黃門監兼吏部尚書卒贈荊州大都督諡曰文成
  hash: sha256:78e4f011ed7f24a2d9c8afb56ea51a44c5343561d186ab22a33ba8bc8e68ba71
  markers:
  - {type: head, offset: 14, content: 盧懷慎, id: KR4h0168_NFKB_275-h1, level: 1}
body:
  text: 臣懷慎言臣聞書曰亶聰明作元后元后作人父母伏惟陛下敬順昊天為人父母人之所行莫大於孝乎故曰夫孝者天之經地之義人之本也是陛下躬率此道為天下先每十日朝西宮式展親親之義故得萬國之歡心者實惟陛下孝理天下也臣竊不揆頗聞於師王者必深居而高視用以表其嚴重也其將動未嘗不清道而後發升車而後引出有警入有蹕用備其周衞也今陛下再立乾坤重安社稷克定中興之業務宏大孝之端率禮因心臣何敢預然陛下臣之君父也夫為臣子者得不欲盡忠孝之事乎忠孝之事臣安敢讓也固知言出必死亦無所辭臣死罪死罪臣聞昔者漢祖受命五日一朝太公於櫟陽宮今日陛下豈不欲為此乎臣度其事業與此有異夫漢祖起布衣登皇極子有天下尊歸於父母故行於此耳今陛下守文繼統嗣武開基奉三聖之休烈當千齡之寶命順天立極葢曰其常不知何為更用此道遠自三五洎乎夏殷聖帝明王臣所覽見未有用此者陛下安所取則哉臣聞事不師古匪說攸聞禮煩則黷抑有其義況應天去提象纔至二里餘騎不得成列車不得方軌於茲屢出假愚人萬有犯屬車之塵者陛下雖罪之何及縱使萬全亦非重慎之道也且唐之寶命繼在陛下雖欲自忽其若社稷何其若宗廟何頃三衞仗中路相失當時驚動聖聽臣等空知待死臣死罪死罪望陛下從今已後遵其內朝一則有暢於溫清二則無煩於出入敬慎之道誰曰不然必以長至在辰元正布歷應天納祜行慶有期則願陛下備法駕周羽儀然後出朝亦天下大禮也居常之日竊惟陛下思之臣本書生叨榮執輒薦芻蕘之議願申犬馬之誠特乞天恩察其愚懇無任悾欵之至謹詣閤奉表以聞臣素無才識叨沐恩榮待罪樞密頗積年序報國之心空知自竭推賢之志終未克申孤負明恩夙夜惶懼臣染疾已久形神欲離雖鳧鴈之飛未為乏少而犬馬之志終祈上聞其鳴也哀乞垂聖察宋璟立性公直執心貞固文學足以經務畧期於佐時動惟直道行不苟合聞諸朝野之說實為社稷之臣李傑勤苦絕倫貞介獨立公家之事知無不為幹時之才衆議推許李朝隱操履堅貞才識通贍守文奉法頗懷鐵石之心事上竭誠實盡人臣之節盧從愿清貞謹慎理識周密始終若一朝野共知要之才不可多得並明時重器聖代良臣比經任使微有愆失所坐者小所棄者大所累者輕所貶者遠日月雖近譴責傷深望垂矜錄漸加進用臣竊聞黃帝所以垂衣裳而天下理者任風力也帝堯所以光宅天下者任稷卨也且朝廷者天下之本賢良者風化之源得人則庶績其凝失士則彞倫攸斁臣每見陛下憂勞庶政勤求理道慎舉㣥司必期稱職使鵷鷺成列草澤無遺故得歲稔時和政平訟理此陛下用賢之明効也臣非木石早識天心瞑目不遙厚恩未報黜殯之義敢不庶幾城郢之言思布愚懇頃者吐蕃以河為界神龍年中降公主吐蕃遂過河築城置獨山九曲兩軍去積石三百里又於河上造橋吐蕃今既叛我此橋即應毀拆橋既見毀城自然拔臣等望與郭知運葢恩貴等計議克寸期翦撲仙童倚恃王親欺奪百姓事狀明白人人共知御史推尋實知枉濫御史若不堪信他人何必可依如更動搖恐招物議望準前狀臣等謹重商量不敢奉詔崔湜位忝大臣身犯惡逆汙宮滅族國有常刑其父挹特承恩渙免其誅戮蒙茲大造得盡餘年若更追榮恐招物議唯刑與賞天下共之發號施令國之所重舉而不法後代何觀望不贈官但厚給葬事臣聞孔子曰為邦百年可以勝殘去殺又曰苟有用我者期月而已三年有成尚書云三載考績校其功也昔子產相鄭更法令布刑書一年而人歌之曰取我田疇而伍之取我衣冠而褚之孰殺子產吾其與之三年而人又歌之曰我有子弟子產教之我有田疇子產殖之子產而死誰其嗣之終有遺愛流芳史策子產賢者也其為政尚累年而化成況其常才乎臣竊見比來州牧上佐及兩畿縣令下車布政罕終四考在任多者一二年少者三五月遽即遷除不論課最或有歷時未改便傾耳而聽企踵而望爭求冒進不顧廉恥亦何暇為陛下宣風布化求瘼恤人哉禮義未能興行風俗未能齊一戶口所以流散倉庫所以虛空百姓凋弊日更滋甚職為此也何則人知吏之不久則不從其教吏知遷之不遙又不盡其力偷安爵祿但養資望陛下雖勤勞之懷宵衣旰食然僥倖路啟上下相蒙共為苟且而已寧盡至公乎此國之病也此賈誼所謂蹠盩之病乃小小者耳此弊久而不革臣恐為膏肓雖和緩不能療豈蹠盩而已哉漢宣帝總覈名實興理至化黃霸良二千石也就增秩賜金以旌其能而不遷於潁川前代之美政也又古之為吏者長子孫倉氏庾氏即其後也書云事不師古以克永代匪說攸聞臣望請諸州都督刺史上佐及兩畿縣令等在任未經四考以上不許遷除察其課効尤異者或錫以車裘或就加祿秩或降使臨問并璽書慰勉若公卿有闕則擢以勸能其政績無聞及犯貪暴者免歸田里以明聖朝賞罰之信則萬方之人一變於道矣致此之美革彼之弊易於反掌陛下何惜而不行哉臣聞尚書云唐虞稽古建官惟百夏商官倍亦克用乂此省官之義也又云官不必備惟其人又云無曠庶官天工人其代之此為官擇人之義也臣竊見京諸司員外官所在委積多者數逾十倍近古以來未之有也官不必備此則有餘人代天工多不釐務廣有除拜無所裨益俸祿之費歲巨億萬空竭府藏而已豈致理之基哉方今倉庫空虛百姓凋弊河渭漕輓西給京師公私損耗不可勝紀況邊隅未靜兵革尤興節用愛人正在今日增官廣費豈曰其時儻水旱成災租稅減入水衡無貫朽之蓄京庾闕流衍之儲或疆場外守兵車遠出或收藏無歲賑救在辰此軍國之急務也陛下將何以濟之乎書云無輕人事惟艱無安厥位惟危又云不見是圖此皆慎微之深旨也臣竊見員外官中或簪裾雅望或臺閣舊人或明習憲章或諳閑政要皆一時之良幹也多不司案牘空尸祿俸滯其才而不申其用尊其位而不盡其力周稱多士漢曰得人豈其然歟必有異於此矣臣望請諸司員外官有才能器識衆共聞知堪為州牧縣宰及上佐者並請遷擢使宣力四方申其智効有老病及不堪理務者咸從廢省使賢不肖較然殊貫此濟時之切務也安可謂行之艱哉臣聞天吏逸德烈於猛火貪人敗類取興大風則知冒於寵賂侮於鰥寡為政之蠹莫先於茲臣竊見內外官人有不率憲章公犯贓汚侵牟萬姓劓割蒸人鞫按非虛刑憲已及者或俄復舊資雖負殘削之名還膺牧宰之任或江淮嶺磧微示懲貶而徇財黷貨罕能悛革委以共理俟河之清臣聞明主之於萬姓也必暢以平分而無偏施若犯罪之吏作牧遐方便是屈法惠姦恤近遺遠矣凡左降之人鮮能省過必懷自廾長惡滋深則小州遠郡蠻陬夷落何負於聖化獨受其弊政乎昔孟嘗廉明方臨合浦隱之清潔乃莅番禺郅都之鎮靜朔方耿恭之輯寧疎勒地則遐僻必擇賢良務以寧濟為懷豈以遐荒見隔況邊徼之地夷夏雜處負險恃遠易擾難安彌藉循良以寄綏撫若委失其任官非其才淩虐黎庶侵剝蕃部小則坐致流亡大則起為盜賊由此言之不可用凡材而況於猾吏乎其內外官人有犯贓賄推勘得實者臣望請削迹簪裾十數年閒不許齒錄書云旌別淑慝黜陟幽明即其義也若不循此道去邪有疑善政能官甄獎或未之徧擔贓負賄僥倖或即蒙升則賞罰無章沮勸安寄浮競之風轉扇廉恥之行漸隤其源不塞為蠹斯甚兵雖不厭多多則費廣降人既納甲仗固亦無虞雖欲縱之其將何往況夏州舊有馬二千匹兵一千三百人苟能用之足堪鎮遏待一二年後更量宜處分稷字嗣通蒲州汾陰人第進士累遷禮部郎中中書舍人景龍末為諫議大夫昭文館學士睿宗立以翊賛功遷太常少卿封晉國公累拜中書侍郎兼黃門侍郎與崔日用數爭事帝前罷為左散騎常侍歷工禮部尚書除太子少保竇懷貞搆逆稷以知其謀賜死萬年獄年六十五問若濟巨川必憑舟楫之勢將興大廈實佇欒櫨之材聖皇提象膺符順天革命變澆風於易濟薄俗於醇醲未明求衣昃旰忘食無遺庖鼎不棄芻蕘聞逆耳之言忻然啟齒聽犯鱗之說假以溫顏緬懷六聖之規勞求五臣之俊至如臨難不顧知無不為獻替帷幄匡過補闕爰洎銜命之流並應搜揚之旨子大夫博古強學見賢思齊一善或同千載相遇肇自魏漢以及梁陳若斯之人者布在方策宜具載年代各敘徽猷無憚米鹽用旌多識對曰后克艱厥后臣克艱厥臣是㣥龍無首虛已明庭之上鼷鼠全身深穴神邱之下故有勞於一饋不輟子高之耕待以二旌無過屠羊之肆懍乎秋駕既識為君之難跼此春冰未見為臣之易然而夢弻降佐風起雲從自天祐之俊乂將至當今制賢以祿制爵以庸設言不違式化厥訓霸王騏驥翼天駟而齊衡社稷元龜升帝寶而負兆猶是幽芳在採雲逸來羈垂倒景之懸光燭重泉之沈隱故遠臣得離山草比獻野芹瞻望天臺數跡對曰帝德廣運六臣參其業天道大明五帝陳其序猶黼黻之章五色鼎鼐之飪五味五靈之効禎祥五音之和雅樂若乃同義變力古人中求則紀信誑項以免君王經刎頸以紓國九卿居府王修從赴難之義二國合圍路中無返言之失漢帝之憚汲黯陳主之畏柳莊社稷之臣於是乎在恪居爾位勤不告勞則蕭公堂堂吳漢糾糾馮豹伏於閣下黃公宿於臺上憂國奉公可以不謂忠乎書誡面從詩詠司直犯顏無隱求福不回周昌之比漢高同乎桀紂劉毅之方晉武類彼桓靈申屠剛之軔車鍾離意之排閤史魚是慕直在其中聖人謨議君子謀道張良之翼漢王郭嘉之協魏主宋武之得穆之齊高之得褚彥定策決勝謀夫孔多蓬矢桑弧有志四海飛旌插羽道好二同膠柱豈調絃之術飲冰實將命之難陸賈南行責蠻夷之失禮陳湯西討誅單于之暴慢終令趙佗貢職郅支傳首竹帛所載斯其庶乎謹對問自周星攢耀漢日通輝象教聿興苾蒭鬱起眷茲和衆因果為先伊此法門棟梁攸屬我皇光膺天授託降閻浮宏八解之要津啟四禪之幽鍵濟含生於彼岸證圓果於中天紺宇巍巍緇徒翼翼莫不譽高澄什聲重安遠振三幡於辨囿悟兩諦於談筵飛錫烟蒸乘杯霧委蘭艾因而或揉玉石由是難甄迹雖選於元關名乃編於白屋若欲令沙汰促以金科將恐乖智海之宏規匪提河之遺範然則經行之所在釋氏而含容朱紫分區談王化而期切弛張之術去就何從對曰竊惟善本無生茲緣常寂捨身捨智槃之行可觀不動不定般若之名已立尊容聖質剖碧玉而恒傳寶相靈模鏤紫金而尚在運二儀而迴掌巍乎寶力極萬物之濡足皇矣能仁是以付受有歸鬱興尊記知來之鑒遠明於萬劫祚聖之符大啟於九部始則江漢廣被終以關河積學由是名僧輩出賢衆肩降道行息於疑顧澄什而服侶戒梵禪結視安遠而俯孩雖葱嶺茄藍涉流沙而西極白木聚落浮漲海而東馳聖教之興為期為感但敬重堅固有悲忍之大權循習護持有煩惱之深淺物情以之勤切俗慕由是懇到苟求利養或滋貪濁濫名竊服行偽學非魚目叨珍遂入摩尼之寶烏鵲借類便假伽藍之翼謂宜宥而勿罰限其自新卷迹緇林之遊反服白衣之役則愍愚受智寬令四飛辨是決嫌浮食一變九色揚翰不謬於楚雞六管流聲豈混於齊士庶人無量在釋典而雖宏出家有限憑國經而必恪維摩之入諸心藏尚為居士之身菩薩之惠其神通由持在家之誡未虧平等何妨慎擇謹對問神農曰金城千里湯池百步而無粟者弗能守也然則師出以律咸資於糗糧兵雖尚奇必藉於流衍皇周八紘有截四海無虞折衝樽俎之閒旅軍袵席之上而吐蕃小醜時擾於沙場默啜遺兇偷生於玉塞由是任以精卒寄以邊陲車徒置騎實賴防禦飛芻輓粟轉饋之弊尤深疆理屯田播植之功難就欲使人無憂於半菽歲有積於如坻強國富甿佇聆良策對曰持人之術地著為本應敵之道糗糧為先故李悝盡地力而創謀本能強魏衞鞅開阡陌而急戰終以霸秦當今三壤既平九稅有職倉庾陳積秷秸充牣山川効祉而咸敘陰陽感化而致和狡戎黠羌不討之日久矣天有星象以分其區地有山河以致其險素野遐曠元國寒凉塞下三春末辨重重之樹河邊九月已落青青之草我后惻隱巖廊之下垂拱袵席之上聖智備天地神武動山岳悠然遠覽白露涼秋建日月朱鳥之旗樹風雨蒼牛之旄將帥良猛謀慮深長猶重息人未修伐鬼而犬羊無檢時驚邊柝定遠侯之功略還出玉門戊校尉之七營更連金郡麻奴小醜敢懷淩斥之心榆鬼殘妖仍延晷刻之命結山豪而嘯聚驅穀馬而陸梁百萬之師糗糧易盡空虛之地轉餉難集良可追蹤墾草取彼大田修充國之舊圖採威明之遠算將軍素勵爰興斷河之術都尉垂強畢盡通溝之利舉農夫而休戰士息轉輸而用耕牛智効其謀勇奮其力資虜金之如粟藉邊馬之如羊賞士犒師選騎館穀或休垣罷障城滅途殫然後坐鳳凰之臺驗麒麟之貢王旅凱入豈不休哉清問徒詶危言每竭短才杼軸景夕貽憂謹對隱士朱君記靈池縣圖經云朱桃槌者隱士也以武德元年於蜀縣白女毛村居焉草服素冠晦名匿位織履自給口無二價後居棟平山白馬溪大磐石山石色如冰素平易如砥可坐十人石側有一樹垂陰布護於其上當暑熾之月茲焉如秋桃槌休偃於是焉有好古之士多於茲遊朱公或斵輪以為資前長史李厚德後長史高士廉或招以弓旌或遺以尺牘並笑傲不荅太子少保河東薛稷為之圖讚云先生知足離居盤桓口無二價日惟一餐築土為室卷葉為冠斵輪之妙齊扁同歡悠悠洛邑眇眇伊土厘屢移寒暑頻經歲年丹壑幾變陵谷俄遷不覩碑碣空悼風煙其一時代攸徙寧窮姓氏匪辯闕二字誰分朱紫翠墳全元扃亦毀久歇火風爰歸地水其二靈跡難訪莫知其狀彷彿穸臺依稀泉帳草積邱壠松高巖嶂乃眷幽途彌增悲愴其三於彼兆域是生荊棘松劍猶存榆錢可識覽物流連闕愴太息欲致禮於靈魂聊寄言於翰墨其四觀夫道周通變青史徽其德庸業濟彞倫丹圖敘其景象所以昭晉長世葳蕤大流而樹聲之闕一字爰存相質之端葢闕使夫觀巨仲之行者勵思齊之高懷隨會之功者識與歸之地著為不朽文在茲乎公諱敞字仲高滎陽開封人灃鎬為都虢鄶獻邑作邦作對策國謀朝之謂才乃公乃侯服冕乘軒之謂貴門高階峻慶積祚流太尉卑躬置屏風而入坐尚書納諫曳革履而升朝思元之憂國恤人平卿之刺邪矯枉百世之盛莫之與京高祖先護後魏雍州刺史尚書左僕射驃騎大將軍儀同三司襄城公行高言象之表道合運期之數曾祖偉後魏龍驤將軍北徐州刺史中軍將軍侍中滎陽守襄城公祖大仕隋上開府儀同三司驃騎將軍渠州刺史襄城公並文藝武節光國贊時方龍舟於巨川得騏驥於大路父仁基隋通事舍人研深機以開務邁宏操以範俗公降巖廟之宏器蹈珠玉之朗節化其羽翼既收四見之奇伐其條枚匪辭一覲之速貞觀七年制策高第授越州都督府參軍事探其洞穴史臣識微禹之功步彼高衢天子得遺風之乘入除左領軍衞兵曹又遷潞州司功參軍事六軍七校戎政孔殷十命三牒闕五字府邑之靈氣流滎波之純液直躬正色清嚴凜乎秋霜抱質懷文英穎彬於夏采挹損以宏已寵辱若驚靖恭以臨人敬慎如祭闕四字宗望推重召為通事舍人留疾不拜轉瀛州清苑令公以為立長以為官也非立官以為長也於是明察以斷忠信以寬奸利息機則俗化醇厚浮末不鬻則人用豐殷正以立身清逾十仞言必顧義寶過盈尺故人有神明之敬有父母之親欣詠終朝石碑在頌又為岐州雍縣令政如清菀亦有德碑又除益州新繁令加朝散大夫入為司禋員外郎增秩小黃歸大夫之顯祿拔奇禮學綜郎官之明祀轉駕部郎中檢校洛陽令俾乂多人掌徭輦政京大師衆禁疎網濶情有萬源道難一貫公綜理殷劇馭煩以高義侔於昇雲明道著於夏日旌發伏隱察銖兩之奸導揚滯美盡銜筴之利化其善教戎人楚言懷其令聲蟹筐蠶績加以勵精聽斷之術側席俊秀之才稜威於七貴五侯滅私於四隱六戚令人除雪既察孝廉行馬療寒即收門士權豪由其斂手雞犬所以䍐音王渙已來政風曠絕稱職之美復存於公朝以為能出除洛陽縣令無何丁太夫人憂服勤過禮執喪惟病罔極之心應於木石天降大慼光覆不追春秋六十九儀鳳三年十一月十七日終於萬年縣之來庭里第嗚呼哀哉粵以大周久視元年龍集庚子六月戊寅朔七日甲申遷窆於洛陽北邙山之平樂原禮也惟公履仁居德韞風懷雅宏達不器包容無方牆隩之深則幽室十扉洞房百牖言行之重則商湯之駟夏后之璜故能參神明以長人順日月以曜物剛直以斷金之精也溫潤以潔玉之符也方弻承帝則運平天機致君唐虞之上書美荊越之竹豈徒校才班伯願試定襄之煩比義野王求領長安之劇而信順闕十三字而逾毀陽烏假道過峻岐而不息崩孺慕於霜露歸精靈於茲辰昔鄭相云亡捨玦悲於東里羊公既歿罷市慟於南州瞻古揆今不之遠也飾終以薄遺令在言時服編書與楸衣而共下含珠連玉同瓦器而不藏長子朝議大夫行果州司功參軍諝第二子越州都督府士曹參軍諲第三子符寶郎諶第四子太子典設郎諤第五子宋州司功參軍訢等罄節勵行彥士高其式模積學儲寶詞人貴其淵洽州里化其邕穆神明通其孝悌思所以揚德來裔垂文永年託之不刊以申罔極我聞有命敢作銘云遷周從虢為公作伯漢台晉袞邦基政本繼期生哲時惟我君猶彼靈鳳翰飛紫氛行高德廣如山如雲曾不助順憖留斯文北山伐石西邙負土撤殯毀宗遷車奠祖㣥子克孝墳塋終古蓼莪長號誰謂荼苦
