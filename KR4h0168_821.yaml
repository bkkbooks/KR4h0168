body:
  text: 讀漢史者多曰曹參守蕭何之規日醉以酒民歌之曰蕭何為法顜若畫一曹參代之守而勿失載其清淨民以寧謐其為漢之二賢相也至矣哉論曰非也暑牛之渴也豎子飲之渟淖之污牛渴已久得渟淖之污寧顧清泠之水乎設使豎子牽之於清泠之水則滌乎腸中之泥也牛然後知渟淖之污不可終日而飲之百姓罹秦之渴已久矣蕭何曰吾所以為法律是權天下之草創也吾不止此將致君為成康之君使民為成康之民是牽民於清泠水也曹參日荒於酒惠帝訊焉參誷於惠帝曰高帝創之陛下承之蕭何造之臣參遵之陛下垂拱臣等守職惠帝以為是也民又歌之也嗚呼漢之民以漢之污愈於秦之渴不知牽於清泠之水滌乎腸中之泥也蕭何之傳曹參也若木工能構材而未果覆而終者必待善覆者成焉何既構矣謂參為覆者參守其構而不能覆徒欺君曰陛下不如高帝臣參不如蕭何善守可也何廢作哉若不可以為廢作即文帝除肉刑不為漢主仁聖之最也參不能孜孜其君於成康之政不知己不能覆何之構而荒於酒幸不同羲和之誅貪位畏勝飾情妄言以惑君也孰名為賢相耶吾病漢史以蕭何為善求繼以曹參為堪其後故為之論匠刀者不必自用割匠弓者不必自用射善為器而已善割者不必善匠刀善射者不必善匠弓善用人之器而已庖丁豈自鍛而後操之耶由基豈自斫而後射之耶然則匠刀者不嫉庖丁之解匠弓者不嫉由基之中業己之為器而懼刃之不利弦之不徑也我器既利既徑稱彼之用是器得其所又何嫉哉蕭張為漢之器既利既徑矣不嫉漢祖之能刃我而解羽弦我而中羽天下是業己之為器也反是者所謂己匠刀不欲人之善割己匠弓不欲人之善射然則器安適乎范增之器也既利既徑矣鴻門之言不用羽非善割善射者終不能用其器也是器豈嫉人也哉痛哭之失其所也是言也不足為儒者道用警乎貪民嫉上之臣也帝見王嬙美召毛延壽責之曰君欺我之甚也延壽曰臣以為宮中美者可以亂人之國臣欲宮中之美者遷於胡庭是臣使亂國之物不逞於漢而移於胡也昔閎夭獻美女於紂而免西伯齊遺女樂於魯而孔子行秦遺女樂於戎而間由余是豈曰選其惡者遺之美者留之邪陛下以為美者是能亂陛下之德也臣欲去之將靜我而亂彼陛下不以為美者是不能亂我之德安能亂彼謀哉臣聞太上無亂其次去亂其次遷亂今國家不能無亂陛下不能去亂臣為陛下遷亂耳惡可以為美為彼得乎帝不能省君子曰良畫工也孰誣其貨哉齊境多寇司寇不理景公召司寇讓之反諍公曰請理君朝廷之寇也公曰君廢其職反責我欲辭其責也曰不然君不聞鼷鼠之牙乎食人與百類雖齧盡而不痛俗謂之甘口鼠也魯國之牛聞食其角矣請以是諷焉牛之寢齕有蚊蚋撓其膚毛必知鼓耳搖尾以揮之及鼷鼠食之即不知痛也鼠之一牙豈不甚於蚊蚋千噆乎以其口甘雖貫心徹骨而不知也况其角乎公誠職臣以司寇請司朝廷之寇然後司封疆之寇也朝廷之寇其鼷鼠乎食君之角矣又將貫骨與心也是患大而君不知也封疆之寇蚊蚋乎但撓君之膚毛耳君將鼓耳搖尾而揮之是患小而不知大也臣所以急其大而不知漫其小而得知也景公不喻竟坐司寇以不事晏子曰司寇死田氏為鼷鼠於齊矣傳曰子産聘晉晉侯有疾夢熊以為厲鬼子産曰鯀之神化為黃熊鯀為夏郊三代祀之晉為盟主未之祀乎遂使祀之而杜預又注曰言周衰晉為盟主得佐天子祀㣥神也曰異乎吾之説也若鯀為夏郊三代祀之即掌周禮者存焉晉為盟主豈天子祀典宜諸侯而僭之邪是不可祀之者一也羽山又非晉望是不可祀之者二也鯀若為天下癘即有天子太癘司其祀矣是不可祀之者三也若為一國之癘即有侯東海者國癘司其祀矣是不可祀之者四也况祀為夏后鯀有歸祀又不為癘是不可祀之者五也子産言祟癘之事有二吾取其一焉言實沈臺駘之祟吾取之矣黃熊之癘吾不敢聞晉侯方疾其或荒邪內作偶夢色象之一物謂之黃熊安可執加鯀厲而為昏越之祀哉君子寧小窮而大達小人寧小達而大窮小者人之役大者人之道也孟子論帝王之道於諸侯諸侯不志我言則去之豈不以小窮而大達歟衛鞅論帝王之道於秦伯秦伯寐於是鞅乃易之以霸強之術而苟容之豈不謂小達而大窮歟君子不患乎無才患乎不知窮達之理也孟子大達遠盜蹊而遵正路者也衛鞅大窮捨正路而趨盜蹊者也秦不知蹊以問鞅鞅指之趨盜蹊而強去也我知盜之蹊而返然之曷若遵正路而遠盜蹊哉四夷之民長有重譯而至慕中華之仁義忠信雖身出異域能馳心於華吾不謂之夷矣中國之民長有倔強王化忘棄仁義忠信雖身出於華反竄心於夷吾不謂之華矣竄心於夷非國家之竄爾也自竄心於惡也豈止華其名謂之華夷其名謂之夷邪華其名有夷其心者夷其名有華其心者是知棄仁義忠信於中國者即為中國之夷矣不待四夷之侵我也有悖命中國專倨不王棄彼仁義忠信則不可與人倫齒豈不為中國之夷乎四夷內嚮樂我仁義忠信願為人倫齒者豈不為四夷之華乎記吾言者夷其名尚不為夷矣華其名反不如夷其名者也綽字肩孟吏部侍郎舒曾孫官膳部郎中賓護尚書河東張公三相盛門四朝雅望博物自同於壯武多聞遠邁於胥臣綽避難圃田寓居佛廟秩有同於錐印迹更甚於酒傭叨遂迎塵每容侍話凡聆徵引必異尋常足廣後生可貽好事遂纂集尤異者兼雜以詼諧十數節作尚書故實云耳夫人道陽教重元妙理考虛無之迹合慌惚之言則有闕周靈王太子駕鶴沖天遺廟之所在也綿祀千百與世瞻依而榱棟傾頽塗塈摧剝肅恭奚展焚醮無歸今河陽行軍懷州刺史僕射清河張公即留守太保相君之令弟遊心衆妙秉志出塵省日費之資出星冠之侶鳩工合力易朽為堅扶曲檻於層巒正飛甍於絶巘睟容可久勝事一新雲路重開庶覩賓天之駕風篁無廢如聞夜月之笙觀主蘇尊師以克就厥功宜刊貞石謂綽執趙升之敬沐穰苴之仁猥命撰詞不敢堅挹時乾寧四年正月三日記贄宰相坦從子第進士擢纍右補闕御史中丞刑部尚書昭宗立拜中書侍郎同中書門下平章事尋兼戶部尚書帝幸鳳翔為大明宮留守進尚書左僕射以司空致仕朱全忠將篡貶青州司戶參軍殺之竊以昭宗皇帝山陵虞祭畢祔太廟合定祧遷下尚書省集議聞奏者伏以廟朝大禮宜循故實今據大常博士李侗柳莊議狀證引不同只請準近朝例祧順宗一室入祔昭宗神主説官汝陽主簿門下十國為連萬夫是長兼文武之寄居方嶽之重握我兵符疇咨人傑而又束神京襟帶扼衡越咽喉疏五畤之封疆跨三湘之土壤節制之重柬求惟難允叶僉諧爰膺並命具官李思敬族著山西神交圯上鼎鐘刻伐帶礪誓盟探義府之根源暢和門之方略雙鞬小戟承家而猿臂推奇叔豹季貍濟美而牛頭入夢具官馬殷夙彰奇節素挺英才究六韜三略之微得十圍五攻之要誅暴救亂戰必勝而攻必取安人和衆近者説而遠者來既有勇而知方善勝殘而去殺並懷仁抱義履信資忠載張四維俱崇七德或二戎車之政令緩不苛或列雄鎮之偏裨動用安重使惸婺懷其惠桀黠畏其威為我寶臣咸彰嘉績有以難兄告老瀝懇以聞俾諧內舉之誠爰頒試守之命有以元戎殞喪軍俗上陳言其以得士心可使為帥姑徇人欲爰假武符或曾未半期或始逾星紀皆聞報效允叶陟明而善守化條克固吾圉綏懷有庶協比其鄰底貢率循於舊章賦事罔愆於彞制不有即真之命曷明勸賞之文是用授以旌旄錫之鈇鉞或升其馭貴啓以邑封洎夫端揆之崇並壯方隅之寄各竭誠節以奉明恩撫字蒸黎尊奬王室無窮九貢須布六條咸思不溢之言以謹有終之戒服我謨訓往惟欽哉蛻會稽人昔晉文公之為盟主也崇大諸侯之館以禮賓客而前史猶或美之而况元帥太師中書令彭城王之為藩翰也尊天子之命廣近臣之署以宣王澤以壯軍威者哉初乾寧單闋歲叛臣芥視生靈鼠竊位號屏王臣于湫隘而毀徹其官署以肆暴焉元帥彭城王以大義為心龔行天討遂平其難帝命兼而鎮之尋詔特進左監門衛上將軍汝南周公以監護之實欲以天子之渥澤而渙汗於三軍也連帥有奇勳殊績忠國利人之大節皆得以上聞以是銘盤盂鏤鍾釜免虛其授受也豈不重歟汝南公馹騎至止軍情大洽彭城王慕其溫雅特加禮焉且曰易有大壯之義詩有斯干之美今奈何以卑庳之棟宇而處天子近臣不營爽塏者乎乃命軍吏揆日經始之去子來之民募宿飽之卒浹旬而材備纍月而功畢重門洞開列楹高峙奔者走者不敢仰視周垣緻密顯敞豐博聞者驚駭見者眙東廂西序窈窕深邃前廡後軒櫛比星連方塘曲沼遊魚浴鳥異竹奇花藍梢粉葩復有大厦之前木蘭特異盤陰袤丈庇于廣庭越城之中稱為一絶當前政不軌之際忽焉雕零逮彭城王之鎮臨也緑葉紫苞載新陽豔雖田家荊樹未足多焉是知忠孝之感通其揆一也彭城王嘗因宴遊形於歌詠題於屋壁聲在管絃其及物之功皆此類也越之曩制府兵十有四旅屬郡邊戍皆出其間前賢蒞臨猶或逗撓今一府之內控弦十萬朱旗絳天長戈雪野揮汗則雨驟吐氣則雲舒而汝南公以溫恭沖淡之德和煦之以貞正廉平之道矯厲之使三軍之士咸得其歡心及考秩向滿連帥惜其去拜表乞留中外美之於戲自兵興以來歲踰二紀唯彭城王以忠孝之節罄翊戴之心連定金陵再清鏡水絶孽牙之本覆祅偽之巢而復以國家經費為憂勤修職貢航深梯險道路相望史不絶書府無虛月當朝廷多事之際天帑充給實有賴焉天子以是奬殊庸超賞典授雙節帥兩藩製衣以頒之鏤金券以錫之復加定亂安國功臣所以昭異數也汝南公嘗從容謂左右曰當今海內竭忠誠著實效於國者其吳越之邦乎抑有由也昔武德初巢國公為佐命功臣逮今二百八十載其裔孫復為定亂安國功臣豈偶然哉在我朝之創業也有巢國公佐焉其中興也有彭城王輔焉所謂世濟其美代不乏賢仲尼曰積善之家必有餘慶此之謂乎汝南公深識而遠慮博古而該今皆此類也夫如是豈止護強軍宣帝命而已是將入輔宸極致君堯舜外有彭城王之糾率㣥后尊奬王室海內欲求不治其可得乎蛻以不才謬塵賓介奉命紀述誠慙陋蕪庶幾勒貞珉永鴻烈用傳於不朽以繼奚斯之頌云時天復元年歲在辛酉八月庚辰朔二十四日癸卯記昭圖僖宗朝左拾遺以論宦寺專政田令孜矯詔謫嘉州司戶參軍使人沉之於蟇頤津君與臣一體相成安則同寧危則共難昔日西幸不告南司故宰相御史中丞京兆尹悉碎於賊唯兩軍中尉以扈乘輿得全今百官之在者率冒重險出百死者也昨昔黃頭亂火照前殿陛下惟與令孜閉城自守不召宰相不謀㣥臣欲入不得求對不許且天下者高祖太宗之天下非北司之天下陛下固九州天子非北司之天子北司豈悉忠於南司廷臣豈無用於敕使文宗時宮中災左右巡使不到皆被顯責安有天子播越而宰相無所豫㣥司百官棄若路人已事誠不足諫而來者冀可追也説天祐時人景忝彼齊人生此王土逐什一之利既富家財服畎畝之勤方編戶籍既而溘先朝露遂卜佳城遠日新封已供葬備昔時餘業可議官收相彼薄言將分厚産且弟惟同氣女有從人鳳兆于飛既歸他族鴈行以序自合保家繼絶請從於叔兮論財難專於女也以茲丕蔽庶叶其宜俱至死辭云錯誤請減議論法司執云君上之前不容有誤議之則可減之則非宸居宅中元輔就列蘭錡襲固必表九重之尊槐位辨官以崇八命之禮旋觀彼乙從事於斯當竭奉上之誠翻畜不祥之器未聞擒敵徒有孟勞之寶踐歷一作既踐榮班遂得呂虔之贈況趨於清切佩以周旋誤作匪宜入閣固當伏罪守之不謹監門自可論辜請從司敗之科以戒事君之旨徒云議貴須正刑名應圖天祐三年國子監生伏覩今年六月五日敕文應國學與諸道等明經一例解送兩人者應圖等早辭耕稼夙慕詩書自拋鄉邑之中便忝國庠之內棲遲守學轗軻於時未闕升進之期卻抱減退之患苟或諸道解送監府同條實謂首尾難分本枝無異伏請聞奏俾遂渥恩璘字華聖宰相從讜子黃巢之亂依泉州剌史王審邽門下天之四序運造化以成功王者萬機仗輔弼而興理豈獨安危斯在實以職任是資所以發于三光凝其庶績則何以迭升崇秩兼陟總臨況夫國用殷煩財力未贍允佇開張之術盡繄通變之方屬我名臣遂行寵渥扶危匡國致理功臣光祿大夫守吏部尚書同中書門下平章事上柱國琅琊開國公食邑二千戶王摶地華簪紱闕盛公台分秀氣於嵩高襲殊祥於淮水秉四科之全德危百行之貞規夷玉在懸能發希聲之妙良金若礪自標大用之能夙振嘉名具揚清貫右坡演如綸之職左戶二版籍之司望實既光夢卜斯得見陳平之知任闕三字識元禮之令稱委持衡朕以運屬多難㣥經欲舉便殿每召前席與言山甫之秉小心見稱風雅陽山之有大體雅重絲綸藹吉上才冠彼前古今以將圖興復克集事功宜付繁難以表優異是用踐黃樞之峻級總青簡之刊修特以貨泉資其良畫於戲蕭何掌挽運之柄在漢為功名夷吾通輕重之權致齊垂霸業繄展匡時之道佇成富國之謀勉膺寵靈服我丕訓可門下侍郎依前兼吏部尚書同中書門下平章事監修國史充諸道鹽鐵轉運等使功勳如故門下登壇命帥俾宣力於四方暢轂戎車付機權於十乘鎮于列土委茲誠臣所以功著者寄崇勞大者賞厚由是兼膺將領迭擁戎旃爰稽至公遂行殊渥某官凌霜徑節溢匣奇鋒功成不居卑以自牧分山西之秀氣將稟威稜讀圯上之偏書洞知韜略名齊飛將績茂冠軍自撫藩條綽聞政理法去滋彰之弊人稱勞來之安蔚然風聲遠陳謠詠昨者董昌輒生狂逆顯負恩榮既署官僚復更正朔自稔貫盈之罪敢憑城社之安謂天網之可逃宜有土之共棄悖慢之狀遠邇咸知鏐于此時獨奮忠節掃欃槍之巨祲清沴氣以無遺爰整干戈竟開城壘捷書上獻殊庸卓然且思勸善之文遂舉疇庸之命是用益其疆土盛彼旌旄增鏡水之名封兼金陵之奧壤合此重寄殷為大藩風煙載嚴控制甚廣允暢萬夫之望彌張列郡之雄我所報功斯謂格寵爾當勿私彼教每務謐寧偃戢兵戎拊循雕弊動體安人之本自成樂土之風奬任益崇鎮臨攸重勉承明訓往惟欽哉門下朕以恭已視朝詳理興化對山河之美必念功臣聽鼙鼓之聲每思良帥況其華陽奧壤黑水上遊提封遠振於三川列郡豈惟於千里爰授勳略往膺撫綏斷自朕懷允符僉屬某官深沉曠度果敢知名秉義向公服於吏事披堅執鋭振彼軍功奉國勵心以身率下暑不張蓋惠若投醪剌隴坻而師必樂隨鎮洋川而人皆自便卓然威重洽乃風聲今以梁漢之間撫理是切允思安乂諒屬智能既習俗以不遷眷寵章而宜舉況爾伯父鎮於是邦舊愛尚留承家益美想彼下車之後必聞草泣政之方爾其蘇靖蒸黎務勸耕織謐寧封境謹奉詔條致我巨藩成其樂土不改三公之貴用光十乘之權厥惟欽哉勉承嘉命可權知河陽節度使觀察留後特進檢校司徒兼御史大夫上柱國隨郡開國子食五百戶門下朕以伯侯之崇列於藩翰旌鉞之寄屬在忠勞況其俾奉詔條佇乃聲效宜洽念功之典用資撫俗之才具官安友權學奧六韜術探三志得子玉理兵之要有少卿養士之心自屬艱難勉勵誠節侍衛之勞既著星霜之志靡渝載陟周行益恭環列校其勳績宜舉寵靈乃眷海隅地聯越俗每思封部尤在撫安往分瑞節之榮更益公台之重爾當奉茲七德睦彼四鄰夙夜以勵武功周旋以修軍政成于樂土副我朝恩勉服訓詞欽承厥命門下昔者明王臨御之理立德於至道茂緒于惟親朕嗣守丕圖祗若鴻訓未嘗不稽古以建于邦家勵精以奉我皇唐之宗祖況洎漢而還封册之重抑有前典煥乎彞章當知子之敢私亦內舉之良愧第八男祕粹和包美謹厚自居踐禮樂之德文備詩書之義府第九男祚生而向善夙賦好謙克明教導之風蔚有端莊之質第十男祺後星表潤甲觀呈祥妙彰岐嶷之姿雅得聰明之性而又並標嘉器皆稟溫文慰沃且多寵數宜舉爰擇重地式崇其名於戲恭乃修持服諸訓順俾成磐石之固允膺典禮之榮勉樹令徽各欽休命祕可封景王祚可封輝王祺可封祁王門下漢之上將或委登壇古之萬夫用期觀政所以典禮素難于方面僉諧遂舉于寵章我有勳勞豈吝恩擢某官某秉節持重抱器謙明既熟戎韜兼通軍志拂青萍之出匣百鍊無前整紫燕之追風干金莫對感激而雷霆助順訓齊而貔武增雄爰自先朝薦逢多難功烈昭著金石無渝且聞宿衛之忠亦著載馳之效每稽功秩盡瘁十年爰用陟明嘉于一志乃眷雍部實為舊藩接服嶺之要衝連駱越之奧壤付茲重寄翳爾雄才爾當清以臨人和而馭衆善施條教動慰蒸黎蘇我疲封佇成樂土爰峻保安之秩式崇鎮撫之名往惟欽哉勿怠丕訓摶字昭逸擢進士第纍遷蘇州剌史入為戶部侍郎乾寧初進同中書門下平章事加檢校尚書右僕射浙東西宣撫使錢鏐兼領二浙留拜門下侍郎同中書門下平章事加司空封魯國公光化三年罷為工部侍郎貶溪州剌史又貶崖州司戶參軍事尋賜死藍田驛敕門下朕惟雷霆霜雪上天降以成物明罰飭法哲王垂以理人是以陽春不可以獨為歲功仁恕不可以專為君德威刑之作其在茲乎朕以渺躬祗膺大寶奉祖宗之丕訓荷天地之洪休八年於茲一日無怠遜於志者既求諸道逆於心者必本於情苟懲戒之不明懼典章之斯廢威勝軍節度使隴西郡王董昌出於行伍屬遇艱難權握兵戎位崇將相器才盈而自覆鼎必折而遂傾因馮生祠輒有狂謀假陳妖異惑亂邪巫鼓譟危樓偽為建國不思理代徒生犬吠之音欲就叢祠妄舉狐鳴之兆賴浙西節度使錢鏐忠誠憤激壯節堅高始以逆順之理飛章諭之而不悟次以攻伐之謀盟約脅之而不回至於率兵直以摩壘雖復假言幻惑止遏凶邪終為閉壁偷安不使束身歸罪是其陰詐猶欲張皇魚戲鼎而雖亦可哀蜋拒轍而終為不率天討有罪魁得而誅其董昌在身官爵並宜削奪仍委爾進兵攻討越州城內士庶且多寧無勇敢之徒喜以功名自許如有梟戮生擒董昌者授三品正員賞錢一萬貫如先有官者超三資酬奬如董昌威制會助妖謀翻然改圖轉禍為福有所自效者並置不問賞則與之於戲惡殺好生君人令德仗順討逆武夫令猷鳴鼓而攻既非獲已奮戈而起亦宜慎諸勿發勿焚無誤無失罔俾觀聽謂我黷武而勤兵也用告遐邇明正其罪運唐末人自稱紫團山叟僕知命之後從宦幽燕值唐祚湮微時歲在辛丑三月中旬契丹大下圍繞燕城原野之中略無虛地盡白壤而已士庶驚駭寮屬惶惑弱子幼婦晨夕不保自是無所控告遂焚香以靈棊經筮得三上二中二下卦辭云土地平安無有艱難大宜種作利用往還翌日勾院博陵公郎中召飲因議茲事博陵曰某昨日亦得斯兆是時契丹攻圍轉逼有僧同族始以當家因相慰問又虔祝而筮之前卦復顯至五月救兵不致僕與同輩在昌平縣令周居隱懷來縣令吳湘都押衙趙宗古同宿于守備之所憂援兵來緩因言是經遂衆請虔禱而筮之得二上一中見卦體不全合坐吅丂一然貽歎覽其辭曰以事託人日望其意乃至於今方獲嘉喜事須淹留終保其志顏曰以其位孤微不能自立吉則終吉但應遲爾至六月危困愈甚僕又請筮之衆曰休休若得好卦猶不敢仗如更凶惡轉加愁思余自心口相謂曰但自擲之好即揚凶則自謀脫命之計由是擲之依前得土地平安無有艱難之卦至七月九日門徒醫術士郭彤雲來相省慰僕不在家與諸子共話靈棊經之事復懇祝之擲而成卦亦得土地平安之卦僕因啓願若免斯難當手書十卷傳於好事者是年八月二十四日大兵解圍乃知至諴感神至誠感靈敬敘其事附於十卷之後云黨紫團山叟韓運序坤天祐中官虔州百勝判官知勾判南京縣事檢校戶部尚書兼御史大夫當縣洞清觀銅鍾一口先平固作孽之時捊虜入洞至天復元年坤統押將士收破卻復前件鍾將歸本縣緣洞清觀頃因亂罹多年荒廢切見可封里晝錦禪院未有銅鍾今將轉捨冀保弟子官榮顯達將卒興隆邑內居人同霑福利鴻音遠布永鎮伽藍
