front:
  text: 全唐文欽定全唐文卷一百九十一楊炯二
  hash: sha256:a8f0d101c69456a833bc3f5c4a18194dc5abbe36d73778eab30fdd74d1218486
body:
  text: 若夫麒麟鳳凰之署三臺四部之經周王㣥玉之山漢帝蓬萊之室觀星文而考南北大象入於璣衡披帝冊而質龍神負圖出於河洛司先王之載籍掌制書之典謨劉向沈研揚雄寂寞之士於茲翰墨馬融該博傅毅文章之才此焉游處莫不出言斯善有道可尊黼黻其德行珪璋其事業心同匪石達人千載之交手握靈珠文士一都之會陶泓寡務油素多閒命蘭芷之君子坐芸香之秘閣徒觀其重欄四絕閣道三休紅梁紫柱金鋪玉磶平看日月唐都之物候可知坐望山川裴秀之輿圖在即虹蜺為之回帶寒暑由其隔豈直崑崙十二瀛海千尋西州有百尺之樓東國有千秋之觀於時五行金王八月秋分風生閶闔之門日在中衡之道煙雲悽慘白露下而四郊空林野蒼茫青天高而九州迥登山臨水無非宋玉之詞高閣連雲有似安仁之興列芳饌命雕觴扼腕抵掌劇談戲笑假使神仙可得自蔑松喬富貴在天終輕許史閒之以博奕申之以詠歌陶陶然樂在其中矣登高而賦㣥公陳力於大夫聞善若驚下走自強於元晏輕為序引綴在辭章天下之器也神立貳者所以經其化聖人之寶也大建儲者所以贊其庸易所謂照於四方禮所謂貞於萬國皇家以中樞北極清都有天子之宮儲后以大火前星蒼震有乾男之位因心也孝常問安於寢門行已也恭每不絕於馳道有父子君臣之道焉有夏干冬羽之事焉於是發德音降明詔封紫泥於璽禁傳墨令於銀書齒於成均所以明其長幼通於博望所以昭其賓客東方曼倩之文史即預禖祠丿冂土角里先生之羽翼仍參獻壽為賓者四友等黃龍之才論奏者八人同赤烏之下士莫不搢紳舊德縫掖名儒衣簪拜高闕之門驂駕陪直城之路琢磨其道玉質而金相黼黻其詞雲蒸而電激琴書暇景風月名辰周旋揖讓觀禮儀之溢目合異離堅聞辨論之盈耳八珍芳饌寒溫取適於四時一獻雕觴賓主交懽於百拜爾其青垣繚繞丹禁逶迤魚鑰則環鎖晨開雀窗則銅樓旦闢周廬綺合廨署星分左輔右弻之宮此焉攸集先馬後車之任於是乎在顧循庸菲濫沐恩榮屬多士之後塵預㣥公之末坐聽笙竽於北里退思齊國之音覿王褱寶於東山自恥燕臺之石千年有屬咸蹈舞於時康四坐勿喧請謳歌於帝力小子狂簡題其弁云永嘉有高陽公山亭者今為李舍人別墅也廊宇重複樓臺左右煙霞棲梁棟之間竹樹在汀洲之外龜山對出背東武而飛來鶴阜相臨向東吳而不進青溪數曲赤巖千丈寥廓兮惚恍似蓬嶺之難行深邃兮眇然若桃源之失路信可謂赤縣幽棲黃圖勝景從來八子闢高陽之邑居今日四郊逢舍人之置驛故知樊家失業遂作庾公之園習氏不游終成濮陰之地其人也凝脂點漆瓊樹瑤林學富文史言成準的葭莩為漢帝之親凡蔣是周公之裔田孟嘗之待客照飯無疑孔文舉之邀懽樽中自溢三冬事隙五日歸休奏金石而滿堂召琳琅而觸目心焉而醉德焉而飽大隱朝巿本無車馬之喧不出戶庭坐得雲霄之致於是乎百年無幾萬事徒勞唯談笑可以遣平生唯文詞可以陳心賞既因良會咸請賦詩雖向之所歡已為陳迹俾千載之下感於斯文徐學士風流蒨蒨容貌堂堂汝南則顏子更生洛陽則神人重出書有萬覽之者實符於鄭元州有九游之者頗類於班固懷岐嶓之舊迹相江漢之遺風粵在於永淳元年孟夏四月始以內率府錄事出攝蒼溪縣主簿同彼漆園之莊周聊居賤職異乎安平之梁竦不憚勞人騑驂而欲行紛紜而戒道是日也鶴鳴於野龍昇於天詩成流火之文易占清風之卦聖主以協時同律義在於省方皇儲以守器承祧任隆於監國留臺務靜博望時閒於是久敬之善交平生之故友臨御溝而帳飲就離亭而出宿居成別易坐覺悲來平原二客追子高而已遠河上諸公餞林宗而有慕兩鄉風月萬里江山修路為下泣之思長天非寄愁之所何以處我戒之必軾何以贈行上路不拜孫子荊傾國之送豈若是乎潘安仁金谷之篇盡於斯矣三元日月不能改弦望之期四序炎涼不能移變通之運况乎人生天地嶽鎮東西良時美景始雲蒸而電激臨水登山忽風流而雨散道之常也復何言哉旻上人天骨多奇神情獨王法門梁棟豈非龍象之雄晉國英靈即是河汾之寶道尊德貴所以名稱並聞盡性窮神所以身心不動徧觀天下暫游城闕劉真長之遠致雅契高風習鑿齒之宏才深期上德芝蘭一面暫悅新知垂棘連城將游舊府雞山法衆餞行於素滻之濱麟閣良朋祖送於青門之外是日也河山雨氣原野秋陰風烟淒而禁籞寒草木落而城隍晚雲中振錫有如鴻鵠之飛水上乘杯更似神仙之別左右為之魂動金石由其色變恒山岱岳看寶鼎於風雲帝里神州對長安於白日兩鄉綿邈何當惠遠之游千里相思空有關山之望㣥賢僉議咸可賦詩題其爵里編之簡牘天下皆知禮之為貴用周旋揖讓之儀天下皆知樂之為盛節金石絲簧之變是則忠信之薄飾容貌於矜莊風俗之微陶性靈於歌舞殊不知達人君子遺形骸於得喪之機心照神交混榮辱於是非之境非若諸公者大夫之相知也以為煙霞可賞歲月難留遂欲極千載之交歡窮百年之樂事莫不如珪如璋令聞令望濟濟鏘鏘同會於文場者也於時丁丑之年孟春之晦歲陰入於星紀斗柄臨於析木衣冠雜沓出城闕而盤游車馬駢闐俯河演而帳飲乃有神州福地上藥中園左太沖所云當衢向術潘安仁以為面郊後巿九莖仙草搖八卦之祥風四照靈葩泫三危之寶露豈直帝神農旋赤鞭而驅毒崔文子擁朱幡以救人山圖採之而得道姮娥竊之而奔月若斯而已哉加以回溪潄石茂林脩竹澹風日之逶迤妙山泉之體勢然後搴杜若藉芝蘭高論參元飛觸舉白凡我良友同聲相應心冥寵辱推富貴於皇天事一窮通任運隨於大命若使適情知足則玉帛子女為伐性之源達變通機則尊官厚祿非保全之地所以列坐羲皇之代安歌帝堯之力陽光稍晚高興未闌請諸文會之游共紀當年之事凡厥衆作列之於後若夫太華千仞長河萬里則吾土之山澤壯於域中西漢十輪東京四代則吾宗之人物盛於天下乃有渾金璞玉鳳戢龍蟠方圓作其輿葢日月為其扃牖天光下燭懸少微之一星地氣上騰發大雲之五色以不貪為寶均珠玉以咳唾以無事為貴比旂常於糞土諸侯不敢以交遊相得三府不敢以辟命相期與夫形在江海心游魏闕跡混朝巿名為大隱可得同年而語哉天子巡於下都望於中嶽軒皇駐蹕將尋大隗之居堯帝省方終全潁陽之節㣥賢以公私有暇休沐多閒忽乎將行指林壑而非遠莞爾而笑覽煙霞而在矚登坱圠踐莓苔阮籍之見蘇門止聞鸞嘯盧敖之逢高士詎識鳶肩憶桑海而無時問桃源之易失寒山四絕煙霧蒼蒼古樹千年藤蘿漠漠誅茅作室掛席為門石隱磷而環階水潺湲而匝砌乃相與亠勹方求勝境遍窺靈跡論其八洞實惟明月之宮相其五山即是交風之地仙臺可望石室猶存極人生之勝踐得林野之奇趣浮杯若聖巳蔑松喬清論凝神坐驚河漢游仙可致無勞郭璞之言招隱成文敢嗣劉安之作皇甫君冠冕於安定李校書羽儀於隴西岑正字明目於漢南石宮坊抵掌於河朔高侯邦之司直下走齊之濫吹若夫風雲龍虎水火陰陽隔千里而應之莫不潛契於同聲矣聖明千載區宇一家掩八紘以得之莫不高會於中京矣是日也河圖適至海鯨初死五嶽四瀆漢皇帝崇其望祀一日三朝周天子展其莊敬君臣慶色朝野歡心元宴先生開甲第而留賓二三君子赴龍門而廣讌陰雲已墨肅氣彌高霜寒萬里之園冰納千金之水面郊後市即為潘岳之居累代通家咸言李膺之客百年何計相知在於我心四海何求為樂止於名教抽毫進牘皆請賦詩日暮途遠聊裁序引東川孫尉文章動俗符彩射人官裁下士宣大夫之三德運偶上皇作東南之一尉庸才擾擾流俗喧喧談遠近為等差敘中外為優劣殊不知三元合朔九州同軌蓬瀛可訪還疑上苑之中日月不占更似靈臺之下彼其之子未為後時凡我友朋無勞疑別徒以士之相見人之相知必欲軒葢逢迎朝游夕處亦常煙波阻絕風流雨散去矣孫侯遠離隔矣但當晨看旅鴈君逢繫帛之書夕望牽牛余候乘槎之客未能免俗何莫賦詩綴集衆篇列之如左僕聞八音繁會合其德者宮商萬壑沸騰殊其流者涇渭方以類聚物以㣥分出言斯應則四海之內可以為兄弟吾道不行則同舟之人可以成胡越夫俗徒擾擾天下喧喧風雲竭而交道衰勢利行而小人長固知深期罕遇所以縱傾葢之談高契難并所以泣相知之晚道之行也獨在茲乎楊八官金木精靈山河粹氣一門九龍之紱冕四代五公之緒秩天資學業口談夫子之文日用溫良身佩先王之德獨遊山水高步煙霞諸侯聞之而願交三公禮之而爭辟暫同流俗薄遊朝市人倫賞鑑同推郭泰之名好事相趨畢詣揚雄之宅爾其年光六合草色三春膏雨零於山原和風滿於城闕遙遙別館花開玉樹之宮望望八川苔發橫溪之水當此時也披雲霧傲松喬坐忘樽酒之間戰勝形骸之外雕蟲壯思則符彩驚人非馬高談則鏗鏘滿聽亹亹然信天下之奇賞陶陶然誠域中之樂事若使陳雷可作攝齊於廊廡之間管鮑再生擁篲於高門之外蓋因文會共記良遊人賦一言同裁四韻大矣哉文之時義也有天文焉察時以觀其變有人文焉立言以重其範歷年滋久遞為文質應運以發其明因人以通其粹仲尼既沒游夏光洙泗之風屈平自沈唐宋宏汨羅之跡文儒於焉異術詞賦所以殊源逮秦氏燔書斯文天喪漢皇改運此道不還賈馬蔚興已虧於雅頌曹王傑起更失於風騷僶俛大猷未忝前載洎乎潘陸奮發孫許相因繼之以顏謝申之以江鮑梁魏㣥材周隋衆制或苟求蟲篆未盡力於邱墳或獨徇波瀾不尋源於禮樂會時沿革循古抑揚多守律以自全罕非常而制物其有飛馳倏忽倜儻紛綸鼓動包四海之名變化成一家之體蹈前賢之未識探先聖之不言經籍為心得王何於逸契風雲入思叶張左於神交故能使六合殊材並推心於意匠八方好事咸受氣於文樞出軌躅而驤首馳光芒而動俗非君之博物孰能致於此乎君諱勃字子安太原祁人也其先出自有周濬啟文明之裔隱乎炎漢宏宣高尚之風晉室南遷家聲布於淮海宋臣北徙門德勝於河汾宏材繼出達人間峙祖父通隋秀才高第蜀郡司戶書佐蜀王侍讀大業末退講藝於龍門其卒也門人諡之曰文中子聞風睹奧起予道唯揣摩三古開闡八風始擯落於鄒韓終激揚於荀孟父福畤歷任太常博士雍州司功交阯六合二縣令為齊州長史抑惟邦彥是曰人宗絕六藝以成能兼百行而為德司馬談之晚歲思宏授史之功揚子雲之暮年遂起參元之歎君之生也舍章是託神何由降星辰奇偉之精明何由出家國賢才之運性非外獎智乃自然孝本乎未名人應乎初識器業之敏先乎就傅九歲讀顏氏漢書撰指瑕十卷十歲包綜六經成乎朞月懸然天得自符音訓時師百年之學旬日兼之昔人千載之機立談可見居難則易在塞咸通於術無所滯於詞無所假幼有鈞衡之略獨負舟航之用年十有四時譽斯歸太常伯劉公巡行風俗見而異之曰此神童也因加表薦對策高第拜為朝散郎沛王之初建國也博選奇士徵為侍讀奉教撰平臺鈔略十篇書就賜帛五十匹先鳴楚館孤峙齊宮乘忌側目應劉失步臨秀不容尋反初服遠遊江漢登降岷峨觀精氣之會昌翫靈奇之肸蠁考文章之跡徵造作之程神機若助日新其業西南洪筆咸出其詞每有一文海內驚瞻所製九隴縣孔子廟堂碑文宏偉絕人稀代為寶正平之作不能奪也咸亨之初乃參時選三府交辟遇疾辭焉友人陸季友時為虢州司法盛稱宏農藥物迺求補虢州參軍坐免歲餘尋復舊職棄官沈跡就養於交阯焉長卿坐廢於時君山不合於朝豈無媒也其惟命乎富貴比於浮雲光陰踰於尺璧著撰之志自此居多觀覽舊章翾翔㣥藝隨方滲漉於何不盡在乎詞翰倍所用心嘗以龍朔初載文場變體爭搆纖微競為雕刻糅之金玉龍鳳亂之朱紫青黃影帶以徇其功假對以稱其美骨氣都盡剛健不聞思革其弊用光志業薛令公朝右文宗託末契而推一變盧照鄰人間才傑覽清規而輟九攻知音與之矣知已從之矣於是鼓舞其心發洩其用八紘馳騁於思緒萬代出沒於毫端契將往而必融防未來而先制動搖文律宮商有奔命之勞沃蕩詞源河海無息肩之地以茲偉鑒取其雄伯壯而不虛剛而能潤雕而不碎按而彌堅大則用之以時小則施之有序徒縱橫以取勢非鼓怒以為資長風一振衆萌自偃遂使繁綜淺術無藩籬之固紛繪小才失金湯之險積年綺碎一朝清廓翰苑豁如詞林增峻反諸宏博君之力焉矯枉過正文之權也後進之士翕然景慕久倦樊籠咸思自釋近則面受而心服遠則言發而響應教之者逾於激電傳之者速於置郵得其片言而忽焉高視假其一氣則邈矣孤騫竊形骸者既昭發於樞機吸精微者亦潛附於聲律雖雅才之變例誠壯思之雄宗也妙異之徒別為縱誕專求怪說爭發大言乾坤日月張其文山河鬼神走其思長句以增其滯客氣以廣其靈已逾江南之風漸成河朔之制謬稱相述罕識其源扣純粹之精機未投足而先逝覽奔放之偏節已滯心而忘返迺相循於跼步豈見習於通方信譎不同非墨翟之過重增其放豈莊周之失唱高罕屬既知之矣以文罪我其可得乎君以為摛藻雕章研幾之餘事知來藏往探賾之所宗隨時以發其唯應便稽古以成其殆察微循紫宮於北門幽求聖律訪元扈於都洛響像天人每覽韋編思宏大易周流窮乎八索變動該乎四營為之發揮以成注解嘗因夜夢有稱孔夫子而謂之曰易有太極子其勉之寤而循環思過半矣於是窮蓍蔡以像告考爻彖以情言既乘理而得元亦研精而徇道虞仲翔之盡思徒見三爻韓康伯之成功僅踰兩繫君之所注見光前古與夫發天地之祕藏知鬼神之情狀者合其心矣君又以幽贊神明非杼軸於人事經營訓導迺優游於聖作於是編次論語各以㣥分窮源造極為之古訓仰貫一以知歸希體二而致遠為言式序大義昭然文中子之居龍門也睹隋室之將散知吾道之未行循歎鳳之遠圖宗獲麟之遺制裁成大典以贊孔門討論漢魏迄於晉代刪其詔命為百篇以續書甄正樂府取其雅奧為三百篇以續詩又自晉太始元年至隋開皇九年平陳之歲褎貶行事述元經以法春秋門人薛收竊慕同為元經之傳未就而歿君思崇祖德光宣奧義續薛氏之遺傳制詩書之衆序包舉藝文克融前烈陳㣥稟太邱之訓時不逮焉孔伋傳司寇之文彼何功矣詩書之序並冠於篇元經之傳未終其業命不與我有涯先謝春秋二十八皇唐上元三年秋八月不改其樂顏氏斯殂養空而浮賈生終逝嗚呼天道何哉所注周易窮乎晉卦又注黃帝八十一難幸就其功撰合論十篇見行於代君平生屬文歲時不倦綴其存者纔數百篇嗟乎促齡材氣未盡歿而不朽君子貴焉兄勔及勮磊落詞韻鏗鍧風骨皆九變之雄律也弟助及勛總括前藻網羅㣥思亦一時之健筆焉友愛之至人倫所及永言存歿何痛如之援翰紀文咸所未忍蓋以投分相期非宏詞說澘然擥涕究而序之分為二十卷具諸篇目三都盛作恨不序於生前七志良書空撰得於身後神其不遠道或存焉昌西郡縣廣漢封疆岐嶓地德參井天光作固作鎮西南一方設官分職鵷鷺成行楊公四代不渝淳則學以自新政惟柔克自君去矣南浮澤國日往月來吏人思德州之端右必得其鄰始皇之裔厥姓惟秦其明察察其政恂恂梧桐生矣君子當仁司馬柱國下成桃李永安之孫高平之子肅肅宗廟巖巖清峙士元之才一日千里大夫李溝振振公族就養承顏閨門雍穆莅官行政人無怨讟貴而不驕能保其祿大辯若訥歷官有聲是司出納我庾如京原承道濟家在高平祖德勳伐受氏因生博陵崔翬文儒代有其德不愆其言不朽發揮談論抑揚琴酒知微知章可大可久思溫吉士地藉東吳功成覆簣業就編蒲愛猶冬日冏若明珠州中煜煜此之謂乎李宏門冑衣冠赫奕氣蘊風霜心如鐵石討論詞翰沈研載籍善與人交歲寒無易宇文周後累代乘軒樂然後笑時然後言用刑勤恤斷獄平反高門可待東海無冤顏氏之子閑閑大智雅善元談尤長奕思不偶流俗坐忘人事同彼少遊能安下位參軍王復真多俗少琴動遊魚詞驚夢鳥仲舉志大夷吾器小德義可尊人之師表懷義倜儻詼諧取容幕天席地何去何從謙謙曼伯不踰規矩節用厚生保家之主恒慶有地參卿述職多士之林不扶自直令賓茂緒凝脂點漆淑慎溫恭始終貞吉猗歟寡悔開國承家當歌對酒屬賓烟霞承慶學稼食惟人天載懷充國遠事屯田尚文儒者優游禮樂萬頃汪汪混之不濁惟彼忠義見賢思齊出言無玷南容白圭竇兢為宰其身自正極深研幾窮理盡性朗如日月清如水鏡化若有神途歌里詠克勤無怠敬慎有儀清談振王妙跡臨池絃歌百里君子攸宜公家之事知無不為警融好禮宣風下邑百姓安居流兦畢集安定梁敬有文有武馬繫青絲弦門白羽澄為主簿操綱振領直而能溫寬以濟猛希嬴負劒久事戎韜功名不立州縣為勞元辯精銳風生筆端片言折獄一尉當官文裕就列明經擢第優哉游哉聊以卒歲思明好學博古知今友朋千里風月招尋吾少也賤信而好古遊宦邊城江山勞苦歲聿云徂小人懷土歸歟歸歟自衞反魯大辰之歲正陽之月有郪縣宰扶風竇競字思月昭宣令德光闡化猷庶政惟和萬民以理閑庭不擾退食自公遠覽形勢虔心淨域乃與禪師釋智海忘言契道寓目於長平之山援飛莖陟峭崿削成千仞壁立萬尋俯觀大地僅如棗葉下望須彌裁同芥子飛流滴瀝而成響喬樹璀璨而垂榮玉堂石室千門相似璧殿珠毫十方皆現慷慨榱桷之未立吁嗟棟宇之莫修不捨有為取諸大壯觀夫左龍角右參旗前太微後營室駢羅列以雜沓瑟蕭條而清泠上磊落以晃朗下泓澄而靉靆參參差差森森纚纚千櫨萬栱乍合乍離蒨蒨粲粲絢絢煥煥六采五章或同或散莽如天覆矗似雲平金火合舍於垂珠日月相望於銜璧璇墀釦砌平接太階玉戶金扉俯臨閶闔曳紅日舒丹霞豐隆為雷砰鏗訇於軒檻列缺為電翕曶霍於庭除寒暑隔閡於牆垣虹霓迴帶於廊廡仰之不極目炫炫而喪精登之無階心皇皇而失度若士翔九垓之表仍不逮於上榮大章窮四海之間猶未離於前墄借如梵天之宅釋帝之宮兩曜城池五雲樓觀輪王所處純金為說法之堂諸佛所遊眾香作經行之地亦未可同年而語也夫黃金鏤牓曾不若四攝之門青石為牆曾不若三空之舍殫百工之力建七寶之樓豈徒然哉良有以也故如來神力且觀嚴淨道師方便化作一城事有古而可以質於今言有大而可以徵於小是則毗耶四會俱發道心險路眾人咸知寳所其銘曰長平山兮建重閣上穹窿兮下磅礡紛被麗兮駢交錯嚴色相兮沖寂寞誰所為兮天匠作搢紳先生牧於東郡繩屬吏有公於獄者某適次於座乘間諮其所以為公之道先生曰吾每窺辭牒意其曲直指而付之彼能立具牘無不了吾意亦可謂盡其公矣某居席之末不敢以非是為決及退而辯其公且傳曰君所謂否臣獻其可君所謂可臣獻其否是欲彌縫其不至也及君可亦可君否亦否故平仲罪邱據踵君之意叔向譏樂王鮒從君者也所以知詢於愚或有得也尺先其寸或有長也皆庸其涓滴將助其廣大也況末世纖狡內荏外剛烏有不盡其辭而能必究其情乎使居上者得其情屬踵而詰之可謂合於理未足言公也若居上者異於見遠於理亦隨而鞫之取協於意所謂明於不法烏可謂公哉且不師古之言非不可為也為之不能遠不由禮之事非不可行也行之不能久故君子盡心法古動必本禮將遠而不泥久而不亂也若乃告諸獄任意以為明其屬徇已以為公是使懷倖者有窺進之路挾邪者有自容之門矣矧藂棘之內辛楚備至何須而不克而況承執政指其所欲哉嗚呼欲人之隨意者吾見亂其曲直矣樂人之附已者吾見汨其善惡矣而猶伐其治譽其公無乃瞽者衒別諸五色乎
