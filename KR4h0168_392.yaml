front:
  text: 全唐文欽定全唐文卷三百九十二獨孤及九
  hash: sha256:a6cc5eea1215030611d014e7ec9179a6bfe053852ffa81b9f3634d4053f92c20
body:
  text: 永泰元年六月四日尚書庫部郎中鄭公卒春秋四十有九知舊茹痛行路嗟悼謂公口無擇言身無擇行得乾之貞固損之元吉坎之常德明夷之正志宜荷福履俾如山阜而秩止於三百石年不及知天命明神豈子欺乎嗣子正藐然始孩孤窮何怙八月四日葬於先塋宗人家老於是乎以果行實錄賁於豐石禮也公諱寵字若驚滎陽開封人也其先建國命氏有鄭世家言之矣大王父某澧州司馬贈衞州刺史衞州生襄陽令某襄陽生臨汾令某臨汾生郎中純懿休祉之所叢也貞亮忠厚仁讓孝敬融明而溫性與道并二十舉明經高第解褐鄴尉太尉房公之由鄴郡而為右扶風也表公茂才擢虢縣令虢土狹而人窳公用教化漬之謂任力不及任人聽訟不及使無訟故以直宏道以信齊政以禮肅墮以讓息競莅止一歲虢人恥格至德二年拜監察御史徙太原戶曹領平遙令真拜太谷其在晉如在虢也詔書勞之錫以命服遷華原令拜尚書工部員外郎而唐人晉人猶歌咏盛德願得公常居其邦莫有由也太原守上其狀詔遷太原少尹未行轉庫部郎中凡歷十官宰四縣一持斧而再起草其政先道德而後刑法內精辨而外若訥戮力事上吐誠率下罔曲物而直已罔咈百姓以干名聲惟畏清之知善之彰飲其教者忻然樂康而不知其惠之所由生也與公遊者靡親靡疎悉飽醇德而莫見其天機之弛張也其學而知者惟濟南之書淹中之禮田何之易胡毋之春秋酌其微言以治其身身之治移於閨門閨門之治移於官官之治可移於國而壽不可踰於域故位量未半良史無述焉自古有死彭殤同途獨有其身歿而其名存乎故老之口此之謂不朽不可以不識其詞曰剛德干時道家所忌抑抑鄭公直溫柔毅衆人缺缺鄭公見朴衆人昭昭鄭公若濁布政四邑四邑和樂雷震風偃物亦允若御史執法郎官草奏鄭公莅止德音是茂於以經術潤色王度宗族敘惇鄉黨歸仁孝謹之風萬石之門兄也弟也夭夭申申善則無報天地不仁抑抑鄭公執德之中生不近其名歿不隤其聲吁嗟乎鄭公郎中諱元魯字㯋叔司農少卿德敏之孫衢州刺史魯縣康公璆之子天寶五載解褐尉邠州新平其後參佐使臣者五入御史府者三一居專城六為尚書郎大歷二年十二月乙酉以吏部郎中終於京師靜恭里之故宅春秋五十有五啟手足之日朋從僚吏親者疎者匍匐雨泣奔之如不及惟郎中寬靜博厚孝友貞儉朴而愿達而好禮氣和以中而博之以文好惡嗜欲發皆中節以誠待人不務智巧雅尚儉慎臨事則虛已應物與道弛張性若疎緩赴急則慘怛之仁形於顛沛誦詩三百不以文自衒在官必聞未嘗近名尤樂閑曠每以邱壑為已任機事嬰之而未遑也則公之歿也跡負其志壽違其德官屈其量君子以是三者思其人而哀其命公無允子以兄子某為嗣大歷三年正月癸酉卜竁於舊塋初執事者議三府高選欲以給事黃門待公既而弗及僉以為恨至是詔贈給事中以褎美之且復其言也嗚呼渭水東注時與之俱音容緬然何嗟及矣公之從父兄曰元甫與公友愛之外有知已之道焉故天倫之戚加於人一等謂及忝仲氏之舅故使為誌云言罕兼德勇不必仁文行忠信獨鍾於身凡厥正人既富方穀闕叶於極命故不淑結志方遠為郎未老孰與若木先秋而槁變化誰宰天地何物目不容瞬盛德如失昨日容徽今如夢焉採君遺塵誌君新阡永泰二年五月七日有唐故衢州刺史魯縣子京兆韋璆第三子范陽郡倉曹參軍諱元誠葬於少陵原先塋夫人范陽盧氏祔焉從周禮也公少時為坊州參軍歷襄州司法試守棗陽縣令真授蒙城令凡五遷至范陽倉曹初安祿山以范陽叛劫脅元元以殺整衆士之因官因居而困窘顛躓墮圍中者數千計凶威所及不死則污公掾吏也在偽署伍中溷跡佯狂冀以病免盜憎之乃加害焉春秋若干夫陽九厄會天地鞠凶燎火炎岡玉石何訴是歲天寶十五年也嗚呼人皆筮仕必以廉平公幹稱於州里人誰無死死則名不辱志不奪不嚥盜哺以易其生生且不苟其事親事君之禮不待史氏而自明矣在官必聞則居家正身與朋友臨財之節可知矣有子曰彤龍鍾崎嶇於險阻之中十年不克返葬哀有何極歲在乙已冬某月始跋涉太行恒山之路以公之喪至自某郡公季弟吏部郎中元曾既得吉卜痛天倫之歡莫之追也願以兄之忠於君恪於官友於家之德之美以播後嗣庶幾陵岸遷而德音不磨謬以及為習於禮者故使之為誌其詞云天地橫隤二象霾兮梟獍擇肉鸑鷟懼兮明夷于飛罹其故兮美玉寧折質不汚兮子子孫孫荷餘裕兮公諱用之遠祖曰文周昭王瑕之後也生而手有文曰閻康王奇之命封閻城文四十五代孫滿仕後魏太祖為諸曹大夫自馬邑家河南其裔孫慶在隋為少司空慶生毘毘生立本立德唐永徽中立本為中書令立德為工部尚書立德生元邃以司空尚書之餘裕也官至澤州刺史邃生巨源常宰射洪有仁政射洪人咏歌之公射洪第二子也溫毅遜直廉恪寬信讀論語老子周易被服其教初仕彭州參軍常攝督郵一日糾案本州夭夭心謬不法數十事太守徐知人以為材後有詔擇舍人以公魁偉爽悟有醞藉乃登其選會戎侵我天子方愛人息戰將以辭讓屈之詔公使西域以王命諭禍福戎人頓首請罪介馬不汗戈鋋不用而虜軍却遷右衞郎將知引駕仗金吾將軍李質上殿不解佩刀公呵下殿陛請按以法左右皆震悚自是環衞加肅先是有司以三衞執扇登殿引蹕公奏曰三衞皆趫悍有材力不當升階陛邇御座請以宦者代上曰可遂為故事天寶二年冊拜公長女為王子義王玭妃加公左驍衞將軍遷榮王傅初元宗懲諸侯王之國任事率多驕蹇不奉法度而人受其害故開元之後皇子皇孫雖荷封建之命未嘗離阿保之手悉無出宮閤任卿大夫者公以為王居深宮則傅相職廢上疏陳古義請諸王申輔導之禮議雖廢格上以為忠公已白首位為將軍諸侯傅太夫人尚無恙以銀印赤紱侍朝夕膳色難無違時人榮之太夫人捐館舍禮五十不毀公泣血死孝既免喪天子復目以端士俾傅壽王加朝散大夫上幸溫泉經時未還宮京師人望屬車咸懷怨思公獻四言詩十二章諷諫優詔裦歎後遷左金吾將軍天寶十五載二京覆沒公為虜所獲明年戎師奔然後以初服歸至德二年十二月終於京師春秋五十九夫人雍州司倉參軍博陵崔眘言之女專靜沖懿慈惠而明用德禮以佐君子有古風烈亦天鍾其仁不遠其算年若干月日歿於私第歿六載而公薨俱權窆少陵原有四子寧寀宰宣以家之不造世故之無寧歲也銜恤茹血不克喪事者九載廣德中寀以監察御史領高陵令明年辭職始卜葬於故原吉乃歲在丙午十一月日遷兆合祔焉嗚呼惟音形事業悉如化往獨陳迹與邱墓存焉非金石則無以示久遠故表而銘之孝子之志也其詞云郁郁金吾洵美且溫事君之忠資於愛親以德資身其祉宜繁彼美輔佐儀刑閨門禮樂是悅孝慈是敦百歲之後合德九原獨以令軌垂諸後昆公諱密字慎微滎陽開封人也初韓哀侯滅鄭㣥公子奔陳宋間始以國為氏惟桓公武公之德盛故國除而其姓彌大歷漢魏晉迄於今冠冕婚姻世莫與京公其裔也齊中書監南兗州刺史諡曰平諱述祖公之六代祖國朝衞州刺史府君諱某公之大王父也博州刺史府君諱某晉州臨汾令贈太常少卿府君諱某公之祖禰也公貞方介直勤而愛人初仕趙州柏鄉尉所涖不過一扃而政行一邑廉使省風俗至趙趙父老率吏人數千遮道稱公之能識者韙公材且得衆滿歲歸洛陽家於鳴皋山南趣深險以避安祿山之亂親故數百家攜老幼往依之公悉發竇窖無親疎皆仰給餓者窘者得公全活先是累歲力耕致粟至千斛至是而盡談者稱公之義二京返正天子選賢守相令長將蘇瘡痍之人殿中侍御史王政以公充賦拜商州洛南令數月訟平賦均監察御史李椅殿中侍御史王延昌御史中丞元公載並表言其狀詔書裦稱加公壽王府戶曹參軍洛南如故無何遷上津令專知轉運水陸漕輓邦都移用賴公而濟徙大理評事商州刺史盧浦以公前後課績條奏遂以本官兼商州錄事參軍御史中丞王延昌表公才任御史奏未下會疾終於位春秋五十是歲廣德元年八月七日也其年權窆於商州夫人清河崔氏某之女生子雅弟幹大歷九年歲次甲寅十一月某日返葬於洛陽北邙山某原禮也公世業尚文伯仲皆才公尤深於詩言合麗則究緣情之美天性孝悌檢身端方居官廉恪其家道足以勸所不至者位止於中士壽不過知天命命矣夫公母弟尚書刑部郎中宣祕書省著作郎寶以其兄之德善授牘於及及跪讀三復敢以實錄刻石其辭曰緇衣之宜敝予改為蔚彼明德蔭此本支乃公乃侯典則是貽藂祉於公實生令儀試吏柏仁嶷然忠規清不奪節剛不干時以道蒙難處險若夷臨財務施依者如歸匪愛千鍾仁為吾師亂已運開乃從縶維先禮後刑以牧㷀嫠商於之人家肥俗移督郵廷評九仞之資曷云不淑命天功虧明畧未申貽痛所知吉凶匪忱今古同悲桐鄉之愛懷縣之詩令聞禺禺子孫承之府君諱令則字某天水人也其先造父實佐周穆有平徐偃王之勳因封命氏至晉而大以成季宣孟之慶故化家為國及武靈而稱王語在太史公趙世家秦滅諸侯使趙王嘉子公輔主西戎戎人懷之子孫因家隴西世為天水著姓其源遠矣曾祖元楷隋殿中監工部尚書淮安公祖崇基國朝岐州郿縣令符璽郎右衞長史烈考慶逸正議大夫許州長史府君長史第二子也好古博學涉獵百家之言善屬文尤注意詩賦外剛毅峭直內溫良而仁率由天性果於行已起家幽州薊縣尉敏給強濟聞於河朔以直道事人忤幽州刺史張守珪貶封州開建縣尉遇赦遷建州建安縣丞稍移湖州安吉縣丞天寶九載選授虢州宏農縣令宏農甸服也地邇賦殷號為難治府君治之如治家刑以肅淫怠德以哀鰥寡為政期年邑民知方三年績成人無不均不安之患虢人頌之解龜後貧無餘資因遊方河朔會天寶十五載幽都為戎薦瘥鍾運明夷垂翼至德二載某月日遇疾終於某州春秋若干嗚呼民莫不穀我獨百罹才如府君胡不朋三壽綏百祿而生世坎土禀歿身喪亂若之何不弔命矣夫夫人河南獨孤氏朝議大夫汝南郡長史府君之孫武功縣丞府君之女明哲柔懿實天生德結帨宜室四十有四載內修法度輔佐君子躬勤慈儉以化閨門趙氏之家肥族睦繄夫人是賴有子若干人訓以義方咸能被服文藝幹父之蠱使有德者必壽夫人宜登期頤奈何不淑遽奪長算天實不信人烏徼福大歷十年五月二日寢疾終於郿縣官舍春秋六十有七嗚呼哀哉長子湖州安吉縣丞琪琪弟某官瓘蘇州嘉興縣丞璒太子舍人兼京兆府郿縣令玗晉州臨汾縣尉珮臨晉縣尉珦珦弟是歲秋八月某日奉府君夫人之喪合祔於京兆某原禮也府君有集若干卷遐邇之志見於詞矣若言行才業官族歲月非銘無以示後裔也故著於石琚字遙憐宏農令府君第五子厥生之初會府君先有封州之役契濶萬里愛而不見故遙以字之太夫人顧之復之訓視加等及長溫厚孝謹文敏好學美姿儀有材藝戊戌歲十月以櫛縰筓總從府君涉河十一月卒於深州嗚呼未壻未祿天夭是絕不見其成六姻所痛大歷五年八月某日葬於洛陽先府君塋之次禮也乃為之銘曰彭氏殤子其壽未易歎子之往死生艱躓末如之何刻石以記公諱直字正仲梁長沙王懿七代孫有唐御史中丞臨汝郡守諒之孟子聰秀英達忠敏孝敬志強體和才方而圓果於從政當斷不惑有妙用明識足以濟衆利物與朋友重然諾見於一貴一賤之際十歲能屬文工書十三遊上庠十七舉明經上第名冠太學二十餘以書記參朔方軍事中丞府君之遇讒謫居也公亦播遷漢東移尉穀熟至德二年乃由廷尉評授監察御史歷河南府戶曹京兆府司錄參軍其後驟升尚書戶部庫部司勳吏部四曹郎自殿中進兼侍御史中丞徐州刺史廣德元年中一歲四遷更七職朝廷難奉使之選謂非公莫可故也永泰元年拜太子左庶子大歷三年授給事中前後居官二十辟書記支使判官副使行軍司馬貳使臣之車者八出入冠柱後惠文冠者六所從之主則朔方元帥張懷欽汴州刺史李彥允揚州刺史李成式戶部尚書李公峘故相國今戶部侍郎第五公琦今相國黃門侍郎王公縉中書侍郎元公載其人也當乾元上元中大憝未靜王室之安危惟方面藩鎮是瞻公所佐之府必以忠力主畫疑謀危事談笑而決刀筆之所加應機成務談者稱其多才初公居先公夫人之喪外除猶毀其後母弟立卒公期不絕哭再期懸不樂食不肉談者高其孝友人有緩急大小之請必儲必副內姻外姻與所知之喪必匍匐而救之賵含加於人一等談者服其仁愛其為庶子一作至是以為庶子給事黃門出入兩宮優游三公間皆得其歡心方謂六卿九伯之位可坐而拾命不我與天孤人望歲在丁酉二月二日終於靜安里正寢春秋四十六談者歎其名與位與才與時四者皆并獨壽不至時輩以為痛三月二十五日詔贈吏部侍郎嗣子策密莒羸然銜哀奉喪來歸冬十月甲午卜葬於洛陽龍門岡先中丞塋之左禮也先其期論譔功烈以墓銘乞其父友孝也余欲塞其孝思之誠故錄其實以志其大節不欲華其文也銘曰天地氣和靈芝吐葩德善下鍾才子承家為言為行是構是荷天子謂公濟美忠文駱馬鐵冠俾佐使臣周爰海隅撫循斯民往踐諸曹亦倅戎車一麾出守言隼其旟乃推大典作擢銅樓復登明廬竹花梧葉棲食茲始曷云不淑今也遄已萬里可到中途而止逝者如斯化往莫留瑤林瓊樹零落山邱匪石之貞曷紀德休皇唐太子左庶子河內縣子馮翊嚴公諱損之故都督洮州諸軍事洮州刺史協之孫贈太常少卿方約季子中書侍郎挺之母弟家之慶天之休鍾於公躬故其德備少仕昌世遇權臣惡直官不登三臺晚值多難安貞不競故位不過郡守宮尹前後佐兩衞參四府領二縣典七州再入石渠三升龍樓凡處任十八享年七十六未嘗以利苟合違道從欲用之則行見機不俟動靜允迪勞謙有光廣德二年六月二十五日終於襄陽是歲八月權窆楚山西原冡子曰式官至江陵少尹不幸道夭仲子曰士元由殿中侍御史為尚書虞部員外郎少子曰士良領祕書著作郎悉能裕父蠱懿文德取公器他日獨立訓所至也大歷三年歲在戊申五月二十九日返葬洛陽先塋禮之至也宗人故太常卿向嘗狀公往行貽諸有司謂公外寬內剛廉正篤敬溫而不厲直而不訐學究原本行有枝葉故其適道求友莅職任事覈其實不居其華初公宰氾水也以莊明慈惠為政氾水人不敢欺而戶口增倍獄訟衰止御史中丞蕭隱之以狀聞公是以有著作郎之拜其後歷太原上谷弋陽餘杭丹陽雖風俗殊異治效如一不曰才乎公在清池會安祿山與當國者交惡公曰難作矣遂移疾請告奸黨惡之是以有弋陽之貶貶之明年河北為戎不曰智乎涉患難不辱身踐祿位不徇名居義處順動罔違吉不曰貞乎嗚呼榮問素業與時皆逝可稱也而不可追也今採其實錄刻石示後蓋欲報罔極者之志也其辭曰君子之道容民畜衆公宰二邑二邑無訟與國共理惟二千石公七剖符七著成績乃師國子司成望苑考藝較德以弻三善中和其心正直是踐道亞羽翼名掩春華忠以事君孝施於家粲粲令子鮮侔晨葩若何不弔盛德既喪音徽永沬士友孤望千載九原遊者悽愴皇唐故潁川郡長史贈祕書監河南獨孤公遷宅兆於壽安縣甘泉鄉之原公第五子丕陪葬於塋之西序第三兄憕墳在右第六弟萬墳在左三穴齊列如平生侍立之序禮也丕字山甫少聰明有志操好學博古年十五能屬文祖述典謨實而不華有古人風采至若探綜圖緯推步六甲昊天歷象太乙之奧悉究其趣尤好黃老之道與脈藏榮衞之數奉之以為衞生之經每餌藥煉氣謂丹砂可學乾元二年從季父峻為御史中丞都督江東軍事盛選僚佐表為剡縣主簿軍書羽檄悉以諮訪觀其志氣遐遠沖然有騁長途致青雲之勢不幸短命臥疾累旬卒於會稽春秋纔二十有三位不過部從事其宏識明畧真氣妙用藏於身而未行世無得而稱之矣嗚呼哀哉是歲乾元三年歲在已亥秋九月也臨歿歎曰孝道以冀全真策名期於顯親未中道二志俱棄命也夫是月也殯於雷門之南先夫人壽宮之傍行已十年反葬此宮無兒可以主祭悲孰甚焉故月而日之以備朽壤灑淚紀德哀罔有極右淮南節度觀察使揚州大都督府長史兼御史大夫張延賞狀得舒州刺史獨孤及狀得僧湛然等狀稱大師遷滅將二百年心法次第天下宗仰秀和尚寂和尚傳其遺言先朝猶特建靈塔且加塔冊諡大師為聖賢衣鉢為法門津梁至今分骨之地未霑易名之禮伏恐尊道敬教盛典猶闕今因肅宗文明武德大聖大宣孝皇帝齋忌伏乞准開元中追裦大照等禪師例特加諡號兼賜塔額諸寺抽大德僧一七人灑掃供養冀以功德追福聖靈中書門下牒淮南觀察使牒奉勅宜賜諡號鏡智禪師其塔餘依牒至准勅故牒大歷七年四月二十二日牒中書侍郎平章事元載門下侍郎平章事王縉兵部尚書平章事李使司徒兼中書令使萬潁川長史府君第六子性專靜內敏有幹局多才藝嗜學好古誦老子莊子之書究其大畧罹於多難未遑筮仕乾元三年夏六月與昆弟同侍板輿將如吳遇疾歿於楚州春秋二十九七月殯於廣陵山光南之西大歷四年五月詔贈潁川府君祕書監是歲七月壬午奉遷神座令祔於壽安縣甘泉鄉之原先是萬之喪至自廣陵是日陪葬於塋西隅禮也夫維夭壽之數雖聖智所無奈何今刻石志美亦以冀其名之悠久也
