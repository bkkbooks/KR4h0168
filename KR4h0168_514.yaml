body:
  text: 京城百司諸軍諸使及諸道應差所由并召人捉本錢前件捉錢人等比緣皆以私錢添雜官本所防耗所裨補官利近日訪聞商販富人投身要司依託官本廣求私利可徵索者自充家產或逋欠者證是官錢非理逼迫為弊非一今請許捉錢戶添放私本不得過官本錢勘責有剩並請設官仍量輕重科處其所放官本并許添私本每舉放數足仰錢戶具所舉人姓名錢數狀報本司仰本司收連入案三官同押排科印記仍各隨錢人牒知如他時因有論競勘案歷不同不在與徵理之限庶官利不失私家獲安少連字夷仲蘇州吳人大歷五年進士官監察御史德宗朝授翰林學士累遷吏部尚書封本縣男徙兵部為東都留守卒年六十二贈尚書右僕射諡曰敬啟迪真乘無相之門寂發揮象教有為之功大非無不可以臻極非有不可以化凡亦由瞻影求形見煙知火通如來誘善之路為㣥暗嚮明之階沿淺詣深其實一也自漢明帝夢金人履殿訊之於庭采傅毅的然之詞得竺乾惟肖之像精廬始構塔廟繼興大抵三教之行各有其屬尊嚴所奉齊壹厥心若遊息不殊則其道閒雜若散漫無守則其風寂寥是以從其先師皆致室處故孔徒有庠序道士有樓居而釋流謂之寺此聖人所以崇其教也少林寺者蓋權輿於太和中廢於承光更名於大象錫田於開皇若乃應天順人擒盜助信摧魔軍於充斥保淨土於昬霾此又昭彰於我唐也其神異之尤若跋陀之經始靈塔劫火不焚指盼泉流使之西注稠公揮杖而二獸解鬬惠可割臂而三業息塵荃蘭藂植於緇林鸞鶴連翔於法界則有惠光曇隱播芳烈於前元素明遵嗣徽音於後戾止者皆同一姓來儀者無復二乘蓋釋氏之淹中西方之別館也况其上圭表正風雨所均嵩高峻極山嶽之秀交艮兌之清氣積靈仙之祕蹤故其志道之人好奇之士繫塵籠者屢至求宴坐者永棲菩薩色身未能忘食苾芻老病斯用依仁而庫舍不營坊廚偪陋每王城信士供施所儲柏谷上田穫斂所入雖真如之性不假多藏而大道之行惡其棄地釋法真聿來從學雅尚住持永言創立志在宏濟乃誓於僧眾陳於上官願因農隙以果營建河南尹杜公黃裳多歷勝因素崇淨業聆風響應如契夙心於是躬主辦之勤假清白之俸復次都人白仙鶴李秀孫光杜珍等共殖嘉苗用滋景福脫鄙吝之韁鎖成智惠之舟航錢刀無翼而自飛寒暑不期而繼至單貧展效富有匱財神龍施珠香象均力加以寺半崖巘路躡凌兢伐松柏於山巔治瓴甓於巖下佛教善誘人忘其勞爰始爰謀是啟是辟平其坎窞相其廣輪梓人作程郢匠施巧積榦如阜運斤成風真公杖錫指麾語言深缺一字先饑以班食伺渴而饋漿酬以壯傭任以老事期不揆日工無廢時為欂為櫨為桴為桷洪纖合度尋尺中規鑿枘靡乖樸斲惟稱板榦既具牆垣以興支橕得其宜締搆取諸壯以周饎爨用固扄鐍風雨攸除塵泥莫侵若乃曲突以舒煙疏竇以流惡陳其鼒鬲扄其釜鬵釋之蒸之惟精惟潔俾其潘汁有所注氣焰有所通香風時來蕩滌煩燠斯乃廚之制也深中以虛受闔扉以制出陳其椽杙施其緘縢取之用之不費不約必使公供無所耗歲計惟其明元關載施成我密固此又庫之宜也乃崇佛宇欄楯孔嚴乃飾僧堂屋壁增煥新亭宏敞閱香積之飯危樓聳擢俯耆闍之山每至華鐘大鳴旭日三舍緇徒總集就食於堂莫不永歎表誠肅容膜拜先推尊像次及有情洎蒲牢之吼餘海潮之音畢五鹽七菜重秬香秔來自中廚列於廣榭咸造勿褻已事而竣勤求者無次第之勞暮齒者有終焉之託不僭於素克壯其猶檢校上座僧淨業寺主靈湊都維那智寰典座道悟維清老宿圓濟僧如空惟陟等虔奉矢謀式昭畢務故得莊嚴寶地豐潔中飧纂紹前規招延後學以是功德侯其禕而夫教不自宏因人而大有以法從中得默契真空有以事假外緣用扶正諦總是二者其惟真公真公俗姓張杭州鹽官人也歷劫勤道髫年出家雖冥心於此山蓋授記於前牒不然者安得宏誓既發㣥心悅隨興立招提如此其盛大歷之季少連嘗吏登封暇日之遊竹園伊邇次宗之依惠遠鑿齒之慕道安塵俗之人幸不遐棄一行入仕二紀於茲前年典選洛師邂逅相遇名山在目道友依然願言從之王事拘我於是得其軌躅作廚庫記云時貞元戊寅歲皇帝纘服之廿載也伏以取士之科以明經為首教人之本則義理為先至於帖書及以對策皆形文字并易考尋試義之時獨令口問對荅之失覆視無憑黜退之中流議遂起伏請准建中二年十二月敕以所問錄於紙上各令直書其義不假文言仍請依經疏對奏昌字洪祚天水人累官國子祭酒拜安南都護憲宗朝遷工部尚書兼大理卿拜太子少保元和九年卒年八十五贈揚州大都督諡曰成蠻王蒙異牟尋積代唐臣徧霑皇化天寶年中其祖閣羅鳳被邊將張乾陁讒搆部落驚懼遂違聖化北向歸投吐蕃贊普以贊普年少信任讒佞欲併其國蒙尋遠懷聖化北向請命故遣和使乞釋前罪願與部落竭誠歸附緣道遐阻伏恐和使不達故三道遣一道出石山從戎州路入一道出牂牁從黔府路入一道出夷獠從安南路入其楊傅盛等今年四月十九日從蠻王蒙異牟尋所理大和城發六月十八日到安南府其和使楊傳盛年老染瘴瘧未得進發臣見醫療候獲稍損即差專使領赴闕庭其使云異牟尋自祖父久背國恩今者願棄豺狼之思歸聖人之德此皆陛下雨露之澤及外夷故蠻徼遐荒願為內屬臣忝領蕃鎮目覩昇平踴躍欣歡倍常萬幸有蠻王與臣書及金鏤合子等謹差十將李茂等隨表奉進謹奏約字存博司徒汧國公勉子官兵部郎中自然之道靜故天地萬物生於其中人為萬物之主故與天地為三才焉老君在西周之日故秉道德以救時俗道者清淨自然之道也德者以法久而失修而得之謂之德也故曰道大天大地大王亦大是謂域中四大焉蓋王者法地法天法道之三自然妙理而理天下也天下得之而安故謂之德凡言人屬者耳故曰人法地地法天天法道道法自然言法上三大之自然理也其義云法地地如地之無私載法天天如天之無私覆法道道如道之無私生成而已矣如君君臣臣父父子子之例也後之學者不得聖人之旨謬妄相傳凡二十家注義皆云人法地地法天天法道道法自然即域中五大矣與經文乖謬而失教之意也豈王者只得法地而不得法天法道乎又况地法天天法道道法自然義理疎遠矣源流既撓支派遂昬或宗之為神仙書或語之以虛無學論者非云先黃老而後六經乃淺俗之談也殊不知六經乃黃老之枝葉爾余少得旨要故辯而釋之蓋清心養氣安家保國之術也梁侍中蕭子雲書祖述鍾王備該眾體始變蔡張二王飛白古法妙絕冠時雖名存傳記而迹絕素惟建鄴古壁餘此蕭字焉韓晉公鑒古擅書聞之嗟異遷之於南徐置於海榴堂座右之壁余後獲之載以入洛書之故實事之本末中書舍人張公崔監察備撰記詳焉余少好圖書耽嗜奇古雖志業不工而性莫能遷非不干求爵祿心懵時事自與名疎非欲乖異時尚養痾守獨所見遂僻僻則僻矣與夫酣湎聲色奔走權利者俱亡羊也亡則孰多余每閱翫古迹而圖書之光如逢古人似得良友加以琴酒靜暢書齋晝閒榮富賤貧是日何在至若尋翰墨輕濃之勢窮點畫分布之能與日彌深隨見愈妙嗟夫昔賢垂不朽之書如傳寶於後世後人覩絕妙之迹見得意於當時名齊日月情契古今傳曰遊於藝藝可已乎知者相賀比獲蘭亭之書世情觀之未若野人之塊不闕於世在世為無用之物苟適於意於余則有用已多乃作贊曰昔創飛白蔡氏所得起於堊帚播於翰墨張王繼作子雲精極壁昏蜃素墨古池色翻飛露白乍輕乍濃翠箔映雪羅衣從風崩雲委地遊霧縈空鱍剌勢動蟉蟠氣雄昆池駭鯨禹門鬬龍攢毫謺札或橫或縱層層陣雲森森古松君子況德高人比蹤抱素自潔含章內融逸擬方外縱在矩中密而不雜疎而有容藝通造化比象無窮子雲臣梁蕭字愈貴點畫均豐姿形端異巧絕蠒素名空傳記明徵裦貶惟此一字亮永寧尉寅子歷給事中終杭州刺史公姓顏名真卿字清臣小名羨門子別號應方京兆長安人也顏氏乃春秋小邾子之苗裔昔帝軒氏生昌意昌意生顓帝顓帝生老童老童生吳回吳回生陸終陸終生六子一曰昆吾其國衞也二曰參胡其國韓也三曰彭祖其國徐也四曰會人其國鄭也五曰曹姓其國邾也六曰季連其國楚也曹姓國於邾春秋邾武公為魯之附庸國武公名儀甫字顏公故公羊傳云顏公有功於齊齊威公命為小邾子子孫以王父字為姓氏以其附庸於魯故代代事魯為卿大夫故先賢傳孔子弟子達者七十二人顏氏有其八則顏氏之儒學可知也若顏無繇字路顏回字子淵顏辛字子柳顏高字子驕顏祖字襄顏噲字子聲顏之僕字叔并顏何字冉是也至公之十六代祖魏青徐二州刺史諱盛字魯國居瑯琊葬臨沂縣西七里十二代祖晉侍中諱含自瑯琊居丹陽五代祖北齊黃門侍郎諱之推自丹陽居京兆長安高祖秦王府記室參軍諱思魯曾祖蔣王文學著作郎諱勤禮祖曹王侍讀諱昭甫父薛王友贈太子少保諱惟貞即祕書監師古之曾姪孫也公以家本清貧少好儒學恭孝自立貧乏紙筆以黃土埽牆習學書字攻楷書絕妙詞翰超倫年弱冠開元二十二年進士及第登甲科二十四年吏部擢判入高等授朝散郎祕書省著作局校書郎天寶元年秋扶風郡太守崔琇舉博學文詞秀逸元宗御勤政樓策試上第以其年授京兆府醴泉縣尉黜陟使戶部侍郎王珙以清白名聞授通直郎長安尉六載遷監察御史制云文學擅於登科器幹彰於適用宜先汗之職俾佇埋輪之效尋充河東朔方軍試覆屯交兵使凡閱舉糺士伍舒慘之情事理無不必當七載又充河西隴右軍試覆屯交兵使五原郡有寃獄不決公理之時方久旱而甘澤立應郡人呼為御史雨八載又充河東朔方軍試覆屯交兵使有滎陽鄭氏兄弟三人或居令長或尉京畿劇任往年母亡殯於太原佛寺空園之內經二十九載未葬公乃劾奏之敕三人放歸田里終身勿齒左金吾將軍李延業素承恩渥曾召蕃客內宴引駕仗不報臺公責之延業憑恃權勢於朝堂喧憤公奏之出為濟南太守朝廷憚焉不敢不肅八月遷殿中侍御史時中丞宋渾以私怨為御史吉溫崔珪所誣告謫賀州公謂珪溫曰奈何以一時之忿而欲危宋璟裔乎由是與二人不平宰相楊國忠初黨於溫亦怒公之不附已令吉溫諷中丞蔣冽奏公為東京畿採訪判官九載十二月轉侍御史百餘日轉武部員外郎判南曹提綱目鋤苛細武調者多感而懷之十二載國忠以前事銜之謬稱精擇乃遂出公為平原太守其實去之也公至郡訪孝義名節之士皆旌其門閭或蠲其戶役安陵處士張鎬多才博識隱居公詣其居與之抗禮因廉使巡察乃薦焉其後鎬官至中書侍郎同平章事安祿山鎮幽州十餘載末年反跡頗著人不敢言公亦陰備之因歲終式修城乃浚濠增堵壞土睘垣立植木內為禦敵之計外託勝遊之資及兵興果賴其固而城得全十四載祿山禍謀將發公遣子至范陽啟祿山以今年冬合當入計祿山猜之不許公既不得離郡乃遣親客前漢中長史蹇昂奏其狀狀留禁中不報十一月祿山反於范陽眾號十五萬長驅自趙定而南趨洛陽散牓諸郡莫敢枝梧祿山乃牓公令以平原博平兵七千人防河以博平太守張獻直為副公登時使平原司兵參軍李平乘駟奏之平至東京見封常清云吾得上旨凡四方奏事者許開函而再封之平聽焉常清遂倚帳操筆寄書於公論國家之事詞意甚切並附募捕逆賊牒數十封至平原令堅相待公從之使親表及門客密送於諸郡因此多有而常清乃尋自敗績焉有敕賜死於陝州竟不接聲平之未至京師也元宗歎曰河北二十四郡無一人向國乎及聞平至遣中使五六輩迎之兼敕平奔馬直至寢殿門然後令下奏事畢元宗大喜顧謂左右曰顏真卿何如人朕兼未曾識而所為乃爾祿山之發范陽也時平原郡有靜塞屯平盧鎮兵三千五百人並已發赴鎮在路未達公悉追迴更追諸縣武舉及獵射人兼召募精勇旬日至萬餘人遣宗子平原郡錄事李擇交統之驍勇之士刁萬歲和琳徐浩馬相如高抗等分押營伍皆千夫之長樂以義舉腹心無阻而為其將帥焉聚兵後數十日公大饗將士於子城四門之外辦吏四人主酒食所約五十萬厮役之流無不飽飫公躬自撫巡舉酒下淚言國家之恩戮力死節無以上報眾皆激憤勇思致命焉時饒陽太守盧全誠與司馬李正舉兵據其城河閒司法參軍李奐殺祿山所置長史王忠於濟南月餘日清河義兵復歸本郡濟南太守李隨下遊奕將訾嗣賢渡河得博平偽太守馬異據其郡各有眾數千或至萬人相次於平原共推公為盟主公三辭後聽焉諸郡諮稟指揮告敗剋日數十至信都郡武邑縣尉李銑來投本縣令龎宣遠拘劉銑母公以私錢十萬募人劫迎之故士眾歎感無不願效者果遂㣥意兼斬龎宣遠首而攜迴十二月祿山陷東京害留守尚書李憕御史中丞盧奕判官鞏縣尉蔣清等因使以三人之首來徇河北且以脅降諸郡逆使者段子光至初拽入門子光大呼曰僕射十三日入東京遠近盡降聞河北諸郡不從故令我告之公若損我悔有日在遂歷指三首各言其人公識其是恐搖人心乃謬謂諸將曰我審此三人皆非也遂命腰斬子光潛令收藏三首誌其處數日稍定取憕奕等首澡潔仍縛蒲為身棺殮發哀致祭城外殯之哭三日舉聲下淚受文武弔慰左右無不出泣涕者自此義合歸者益多矣斬段子光之日滄州清河縣步五千攻常山太原節度使王承業擁兵最近不時出救常山遂陷諸郡頗有貳者元宗乃以公為戶部侍郎依前平原太守充本郡防禦使仍與節度使李光弻計會招討公以景城長史李暉為副李銑賈載前侍御史沈震為判官是月又詔公為河北採訪處置使公又以前咸陽尉王延昌為判官張澹為支使時清河郡寄客李華後因獻封事睿宗有敕改名為郡人來乞師於公曰竊聞公高義首唱河朔歸順之人皆依倚以為聲氣洪贍人心可用若不倦於聽則僕請言之公曰何如華曰國家舊制江淮郡租布貯於清河以備北軍費用為日久矣相傳為天下北庫今所貯者有江東布三百餘萬疋河北租調絹七十餘萬當郡綵綾十餘萬累年稅錢三十餘萬倉糧三十萬時討默啜甲仗藏於庫內五十餘萬編戶七十萬見丁十餘萬計其實足以三平原之富料其卒足以二平原之彊若因撫而有之以兩郡為腹心脣齒其餘乃四支耳安敢有不從者哉彼要僕為行人以造公之壘僕明見其可同心也取命於屏㦸之外惟公圖之公曰所合之眾未曾知戰自死且急安有恤鄰之暇哉雖然諾足下之請則可為乎華對曰清河遣僕致命於公者蓋欲稟義闕一字大賢以濟謀非力不足而借公之師以當強寇也瞻仰高意未有决詞定色與濟清河也安敢言為哉時華纔年二十餘皆沮云必動眾無成惟公奇之迫於眾情未闕一字許耳華乃就館操書以達其意意者畧言清河去逆就順以全實之資上公之軍而承公之命時不納而疑之即僕迴轅之後清河必有所託系與他人與公為西面之難無什日之期耳公及噬臍乎公覽而驚之遂排㣥議獨仗其决借兵六千人兵既出平原次於竟上華將把公手而歸公曰兵既行矣可以言吾子之意否華曰近聞朝廷遣程千里統精兵十萬自太行東下擬詣口助河北諸軍討滅叛逆而口為賊所守千里兵不得東出須先伐魏郡袁知泰泰祿山所署偽太守納舊太守司馬垂使為西南主分開口出千里之軍因令討鄴郡以北直至幽府已來未順城邑平原清河率同盟諸將以十萬人直指河陽分效兵巡河而悉制其奔衝之路計王師東討洛邑必不減二十萬河南諸郡義師西向臨之亦不減十萬公當表請堅壁勿戰不旬月而賊有潰敗相圖之勢矣公然之遂移牒清河等諸郡並遣大將宗子李擇交副將平原縣令范馥偏裨和琳徐浩等十餘人促兵清河合勢以便宜從事華復命於清河因兵合之際修永濟渠引水遶州城上大修守戰之具旬日而畢又以清河四千兵與平原連蹤而西時博平亦義兵千人來合於是三郡之師屯於博平郡堂邑縣西南十里袁知泰遣其麾下將白嗣深乙舒蒙等率二萬人來拒戰三郡之兵盡日苦鬬遂大敗之斬首萬餘級生擒一千餘人馬一千匹軍資器械不可勝數其日魏郡城東南面女牆一百五十步無故而崩去郡邑百里戰日而崩所以為異知泰走投汲郡於是自魏郡以東至堂邑百餘里莫不攜壺漿於道側以候官軍公聲益震境內稍安初平原之師既西合清河時賊將史思明圍饒陽恐平原救之仍遣遊弈兵來拒前鋒去舊縣十里公懼不敵乃遣驍將刁萬歲以三千兵逆之堅壁不戰又以書過河招北海太守賀蘭進明統馬步兵五千來助公陳兵而迎之相揖哭於馬上悽慟三軍宴犒甚厚進明遂屯平原城南息養士馬公每事咨謀之自是兵威之重稍移於進明矣而公不以為嫌進明未有所之李擇交兵入清河尋又破於堂邑而因公以有功禮遜於進明加河北招討使擇交馥各徵進官級其清河博平有功不錄一人時論進明必有後敗未期果失律於信都城下有詔抵罪公縱之使赴行在進明以全乃公護之也君子曰竊人之財猶為之賊况竊人之功乎進明之不死幸也然公亦過於寬厚矣三月河北節度使李光弻以朔方馬軍三千步軍五千初出土門將討定河朔公乃抽兵歸并放博平清河等軍各歸本郡斂戢以待光弻之命俄而光弻拔平山郡敕改常山為平山續有詔遣郭子儀以萬軍助之兩進兵又拔趙郡史思明方守博陵以自固仍將兵來拒於是兩軍與思明三萬人對陣於嘉山大戰思明敗績徒跣走入博陵城兩軍斬首萬餘虜獲不可勝計時平山趙郡已拔劉正臣本名客奴歸順於平原平盧等十七郡公先據之於是橫截賊路人往來幽府皆以精騎偷路又多被官軍殺之其賊將士父母妻子及曳落河種族並質在范陽絕懷震恐時方盛暑公知光弻子儀禁斷侵掠將士少衣服乃送十五萬帛為三萬人以遣人至饒陽屬潼關不守兩軍却入土門遂留不行然河北諸郡公始復指麾征討之事肅宗之在靈武也公前後遣判官李銑及馬步軍張雲子以蠟為彈丸以帛書表實於彈丸之內潛至靈武奏事有詔以公為工部尚書兼御史大夫依前河北招討採訪處置使又於丸內奉敕書及即位改年赦書至平原散下諸郡宣奉焉又令前監察御史鄭昱奉赦書宣布河南江淮所在郡邑風從不疑而王命遂通則公之力也而河北諸郡稟公之命粗為安肅公以兵興半年軍用已竭思所以贍濟之未得其畧先是清河行人李華自堂邑戰勝後又覩公辭權而不有之遂藏於人閒不及見公再三盟約號令諸郡及以文牒求之曰清河郡屬崔審交應賊之後吏不安行人李華乃崇墉浚隍鍛甲矯翦乞師破敵和眾以安人靜言其功須有甄賞仍牒之於路以求焉華於是復詣平原與公相見公因問以足用之計華遂與公數日參議定以錢收景城郡鹽沿河置場令諸郡畧定一價節級相輸而軍用遂贍時北海郡錄事參軍第五琦隨刺史賀蘭進明招討於河北覩其事遂竊其法乃奏肅宗於鳳翔至今用之不絕然猶未得公本策之妙旨焉是年秋祿山遣其將史思明尹子奇等並力攻河北諸郡前後百餘日饒陽河閒景城樂安相次而陷所存平原博平清河三郡而已然人心潰叛不可復制公乃將麾下騎數百棄平原渡河由淮南山南取路朝肅宗於鳳翔行在初公之將過河也乃謂判官穆寧張澹曰賊勢死爾若委命待擒必為其快心辱國之命也今將徑赴行在公以為何如若朝廷必誅敗軍之罪以勵天下則王綱可振死亦何恨如復從事以責後效則業不朽矣寧澹與諸將皆贊之策馬發至朝廷除公為憲部尚書初劉客奴以漁陽歸順時史思明與光弻子儀相持於趙定之閒客奴遣使越海與公計會公使判官賈載將男頗為質信泛海以軍糧及戰士衣服遺之時頗始年十歲餘公更無子息三軍懇請留之不從及載等迴公乃與漁陽聲勢相連尋又使人迎其軍比至公已棄平原歸於行在竟不及事然自肅宗已來河南及諸道立功大將如王元忠田神功董泰侯希逸李正已許杲卿等初皆是公自北海迎致之者終無私謁焉至二年正月又除御史大夫未幾因忤聖旨貶馮翊太守乾元元年三月又改蒲州刺史本郡防禦使封丹陽縣開國子食邑一千戶是年為酷吏唐旻所誣貶饒州刺史二年六月拜昇州刺史充浙江西道節度使兼宋亳都防禦使劉展反狀已露公慮其侵軼江南乃選將訓卒緝器械為水陸戰備都統使李峘以公為太早計因密奏之肅宗詔追未至京拜刑部侍郎及劉展舉兵渡淮峘敗績奔江西淮南遂陷於展議者皆多公而怨峘焉上元元年秋時御史中丞敬羽狙詐險慘班列皆避之公曾與之語及政事遂遭誣貶蓬州長史公樂道自怡不以介懷寶應元年八月代宗有詔除利州刺史十二月拜戶部侍郎加銀青光祿大夫上柱國廣德元年又加金紫光祿大夫充荊南節度使觀察處置使遲留未行為密近所誣遂罷前命代宗幸陝公扈從至行在除尚書右丞宰相元載與公不叶公亦面數之不為之屈及鑾駕還宮公曾建議先謁廟然後即安宮闕事竟不行時載方在於立班更顧公曰所見雖美其如不合事宜公怒而進曰用捨在相公耳言者何罪乎然朝廷紀綱豈堪相公再破除也載自此銜之而不忘二年正月除檢校刑部尚書兼御史大夫朔方行營汾晉等六州宣慰使載又疑公因使奏對必言短尋罷前命惟知刑部尚書事三月晉封魯郡開國公食邑三千戶載自與公有隙常俟公闕公亦獻書直奏其奸狀代宗俱容不罪之也永泰二年春差公攝職謁太廟公以祭器不修言之於朝載譖公以為訕謗時政貶峽州別駕代宗為罰過其罪尋換吉州別駕公與往來詞客詩酒講論為樂甚有所著編為廬陵集十卷於大歷三年遷撫州刺史在州四年以約身減事為政然而接遇才人耽嗜文卷未曾暫廢焉因命在州秀才左輔元編次所賦為臨川集十卷七年九月拜湖州刺史公以時相未忘舊怨乃加勤於政而以杭州富陽丞李㟧為本州防禦副使蘇州寓客校書郎權器遊客前大理司直楊昱為判官委墾草闢田之務於㟧委閱簿檢吏接詞政之務於器昱等而境內宴然公初在平原未有兵革之日著韻海鏡源成一家之作始創條目遂遇祿山之亂寢而不修者二十餘年及至湖州以俸錢為紙筆之費延江東文士蕭存陸士修裴澄陸漸顏祭朱弁李莆清河寺僧智海兼善小篆書吳士湯涉等十餘人筆削舊章該搜㣥籍撰定為三百六十卷大凡據法言切韻次其字按經史及諸子語據音韻次字成句者刊成文裁以類編又按倉雅及說文玉篇等其義各注其下謂之字脚韻海者以牢籠經史之語依韻次之其多如海鏡源者八體之本究形聲之義故曰鏡源綿亘數載其功乃畢表奏上之有詔付所司藏之於書府大抵求經史撰集篇賦利於後學焉此外餞別之文及詞客唱和之作又為吳興集十卷今檢校國子祭酒楊昱自御史中丞京畿採訪使除為漢州刺史轉湖州刺史以舊府之恩乘州人之請紀公遺事刊石立去思碑於州門之外即今都官郎中陸長源之詞也十二載元載伏誅召公為刑部尚書經年公以前後頻典刑憲密啟辭焉乃上選舉利害事宜數十條代宗善之人莫知也遂改吏部尚書今上諒闇之際詔公為禮儀使先自元宗以來此禮儀注廢闕臨事徐創實資博古練達古今之旨所以朝廷篤於訕疾者不乏於班列多是非公之為公不介情惟搜禮經執直道而行已今上察而委之山陵畢授光祿大夫遷太子少師依前為禮儀使前後所制儀注令門生左輔元編為禮儀十卷今存焉三年八月遷太子太師四年淮寧節度使李希烈以十四州叛襲陷汝州執刺史李元平歸蔡州朝廷詔公為淮寧軍宣慰使公乘驛駟至東京河南尹鄭叔則勸公曰反狀已然去必陷禍且須後命不亦善乎公曰君命也焉避之至許州與希烈相見宣傳詔意未畢逆賊使其大將軍王玢周曾詬公以醜詞劫公以白刃又令鄰境同惡所遣使者四人於希烈之前拜舞伏稱誣訴國家之事勃慢凶豪詞所不忍聽也又令親兵五千人號為希烈養子人各持一刀逼脅於公如欲剸食之勢公位不移定色不撓懼希烈覩公辭色不變謬為驚駭以身蔽公兵人既退方揖公就館前後詐為公表奏自說其強盛以請汴州者數十今上知而寢之希烈雖窮凶極惡然亦感公文義大陳設燕會將欲送公於朝廷先為賊所擒汝州刺史李元平時在座公指引叱責之元平羞慙而起書其奸意坐上潛通希烈意變罷宴後遂拘公於官舍令甲卒十人守之仍穿一阬於廳之前以脅公公乃直言指希烈云死生有定何足多端相侮哉但以一劒見與公即必覩快事無多為也希烈慚謝焉自後不敢無禮於公也居數月賊於安州城下破官軍得獲將士以頭連誇示於公公大聲叫呼自牀投地憤絕良久乃蘇從此更不復與人言語及哥舒曜收復汝州擒檢校刺史周晃已下百人希烈乃遣周曾康秀林等領二萬人來襲哥舒於汝州曾秀林行至襄城乃謀翻兵殺希烈奉公為節度使以歸順希烈押衙姚澹亦為內應先期一日事洩希烈乃遣騾子軍三千奄至襄城殺周曾等收其期兵而回因送公於蔡州龍興寺居焉公度不得全自撰墓誌以見其心又就希烈請數人之饌希烈不知而給之自陳設之因為文祭周曾已下為賊所害者無不欷歔其十二月希烈陷汴州僣逆稱號為慘酷之具以逼公意欲其屈禮公憤然而無求生之意賊以止焉貞元元年河南王師復振賊慮蔡州有變乃使其將辛景臻於龍興寺積薪以油灌既縱火乃傳希烈之命若不能屈節自即裁之公應聲投地臻等驚慚扶公而退希烈審不為已用其年八月二十四日又使景臻等害於龍興寺幽辱之所凡享年七十七明年三月希烈為麾下將陳仙奇所殺淮西平仙奇遣軍將營送公神櫬於京師嗣子櫟陽縣尉頵次子祕書省正字碩迎喪至汝州襄城縣乃葬焉攀號屢絕毀裂過不自勝以其年十一月三日祔葬萬年縣鳳棲原之先塋有詔贈司徒諡曰文忠賻錢五十萬粟二百碩中使弔祭儀仗送於墓所朝野莫不哀傷公蹈忠節之苦古今無類焉公平居之日自卑有井介之操而能容眾有潔已之方不以疵物與道合歲寒者終始無渝變况君臣大義名教大節而得造次焉可奪求生而害仁者於戲淮寧之難豈止天不憗遺蓋亦有無良之人以怨報德投之於無存之地也悲夫初遭難後江西節度嗣曹王臯上表曰臣見蔡州歸順脚力張希璨王仕禺等說去年八月二十四日蔡州城中見封有鄰兒不得名字云希烈令偽皇城使辛景臻右軍安華於龍興寺殺顏真卿埋於羅城西道南里并立碑臣聽之未畢涕泗交流三軍對臣亦苦嗚咽且臣死王事子復父讐人倫常經不足裦異所悲去古日遠澆風蕩浮多苟偷生曾不顧節使忠孝寂寞人倫憔悴昨段秀實奮身擊泚首今顏真卿伏縊烈庭皆啟明君臣發揮教訓近冠青史遠紹前賢夫日月麗天幽明向燭忠烈曜世回邪革心伏請陛下降議百寮遐布九有刻石頌德告廟圖形使元壤感恩皇風澤物公之密親懿友動相規用以成其務者即今給事中殷公亮吏部員外郎柳公冕採其謀猷分以休戚者今吉州刺史李公㟧重其器悅其能者今檢校國子祭酒楊公昱故戶部員外郎權公器其餘顧盻曾假吹噓成名布於詞場及內外之列者不可勝紀李公㟧吉州以小子久趨於欄㦸定以使言將存刊刻用防逸墜尚實去飾庶無愧焉其故同事之人先後存亡錄之於左謹狀
