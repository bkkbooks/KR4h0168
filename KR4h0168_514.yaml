  text: 全唐文欽定全唐文卷五百十四從字子乂贈衞州刺史融曾孫第進士憲宗朝累官尚書右丞寶歷初檢校尚書左僕射淮南節度副大使大和六年卒年七十二贈司空諡曰貞
  hash: sha256:2239290ba4238269d328aa00b731948f9285f8a861333becd2b803b244efa9aa
