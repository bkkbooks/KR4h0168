  text: 全唐文欽定全唐文卷五百五十五韓愈九
  hash: sha256:d3f4054b515fcfc0bf8ef584d45c28b8ed83c4ae8fe7b33e7fd213654285aff3
body:
  text: 貞元十八年二月十八日祠部員外郎陸君出刺歙州朝廷夙夜之賢都邑游居之良齎咨涕洟咸以為不當去歙大州也刺史尊官也由郎官而往者前後相望也當今賦出於天下江南居十九宣使之所察歙為富州宰臣之所薦聞天子之所選用其不輕而重也較然矣如是而齎咨涕洟以為不當去者陸君之道行乎朝廷則天下望其賜刺一州則專而不能咸先一州而後天下豈吾君與吾相之心哉於是昌黎韓愈道願留者之心而泄其思作詩曰我衣之華兮我佩之光陸君之去兮誰與翺翔斂此大惠兮施於一州今其去矣胡不為留我作此詩歌於逵道無疾其驅天子有詔大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得已者而後言其謌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎樂也者鬱於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也惟天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推兌攴其必有不得其平者乎其於人也亦然人聲之精者為言文辭之於言又其精也尤擇其善鳴者而假之鳴其在唐虞咎陶禹其善鳴者也而假以鳴夔弗能以文辭鳴又自假於韶以鳴夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而遠傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之辭鳴楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老耼申不害韓非眘到田駢鄒衍尸佼孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絕也就其善者其聲清以浮其節數以急其詞淫以哀其志弛以肆其為言也亂雜而無章將天醜其德莫之顧耶何為乎不鳴其善鳴者也唐之有天下陳子昂蘇源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其高出魏晉不懈而及於古其他浸淫乎漢氏矣從吾游者李翺張籍其尤也三子者之鳴信善矣抑不知天將和其聲而使鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸耶三子者之命則懸乎天矣其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋然者故吾道其命於天者以解之愈嘗以書自通於于公累數百言其大要言先達之士得人而託之則道德彰而名問流後進之士得人而託之則事業顯而爵位通下有矜乎能上有矜乎位雖恒相求而喜不相遇于公不以其言為不可復書曰足下之言是也于公身居方伯之尊蓄不世之材而能與卑鄙庸陋相應答如影響是非忠乎君而樂乎善以國家之務為己任者乎愈雖不敢私其大恩抑不可不謂之知已恒矜而誦之情已至而事不從小人之所不為也故於使君之行道剌史之事以為于公贈凡天下之事成於自同而敗於自異為刺史者恒私於其民不以實應乎府為觀察使者恒急於其賦不以情信乎州繇是刺史不安其官觀察使不得其政財已竭而斂不休人已窮而賦愈急其不去為盜也亦幸矣誠使刺史不私於其民觀察使不急於其賦刺史曰吾州之民天下之民也惠不可以獨厚觀察使亦曰某州之民天下之民也斂不可以獨急如是而政不均令不行者未之有也其前之言者于公既已信而行之矣今之言者其有不信乎縣之於州猶州之於府也有以事乎上有以臨乎下同則成異則敗者皆然也非使君之賢其誰能信之愈於使君非燕游一朝之好也故其贈行不以頌而以規踰甌閩而南皆百越之地於天文其次星紀其星牽牛連山隔其陰鉅海敵其陽是維島居卉服之民風氣之殊著自古昔唐之有天下號令之所加無異於遠近民俗既遷風氣亦隨雪霜時降癘疫不興瀕海之饒固加於初是以人之之南海者若東西州焉皇帝臨天下二十有二年詔工部侍郎趙植為廣州刺史盡牧南海之民署從事扶風竇平平以文辭進於其行也其族人殿中侍御史牟合東都交游之能文者二十有八人賦詩以贈之於是昌黎韓愈嘉趙南海之能得人壯從事之答於知我不憚行之遠也又樂貽周之愛其族叔父能合文辭以寵榮之作送竇從事少府平序古之所謂公無私者其取捨進退無擇於親疎遠邇惟其宜可焉其下之視上也亦惟視其舉黜之當否不以親疎遠邇疑乎其上之人故上之人行志擇誼坦乎其無憂於下也下之人剋己慎行確乎其無惑於上也是故為君不勞而為臣甚易見一善焉可得詳而舉也見一不善焉可得明而去也及道之衰上下交疑於是乎舉讎舉子之事載之傳中而稱美之而謂之忠見一善焉若親與邇不敢舉也見一不善焉若疏與遠不敢去也眾之所同好焉矯而黜之乃公也眾之所同惡焉激而舉之乃忠也於是乎有違心之行有怫志之言有內媿之名若然者俗所謂良有司也膚受之訴不行於君巧言之誣不起於人矣烏虖今之君天下者不亦勞乎為有司者不亦難乎為人嚮道者不亦勤乎是故端居而念焉非君人者之過也則曰有司焉則非有司之過也則曰今舉天下人焉則非今舉天下人之過也蓋其漸有因其本有根生於私其親成於私其身以己之不直而謂人皆然其植之也固久其除之也實難非百年必世不可得而化也非知命不惑不可得而改也已矣乎其終能復古乎若高陽齊生者其起予者乎齊生之兄為時名相出藩於南朝之碩臣皆其舊交齊生舉進士有司用是連枉齊生齊生不以云乃曰我之未至也有司其枉我哉我將利吾器而俟其時耳抱負其業東歸於家吾觀於人有不得志則非其上者眾矣亦莫計其身之短長也若齊生者既至矣而曰我未也不以閔於有司其不亦鮮乎哉吾用是知齊生後日誠良有司也能復古者也公無私者也知命不惑者也太學生陳密請於余曰密承訓於先生今將歸覲其親不得朝夕見願先生賜之言密將以為戒密來太學舉明經累年不獲選是弗利於是科也今將易其業而三禮是習願先生之張之也密將以為鄉榮余愧乎其言遺之言曰子之業信習矣其容信合於禮矣抑吾所見者外也夫外不足以信內子誦其文則思其義習其儀則行其道則將謂子君子也爵祿之來也不可辭矣科寧有利不利耶太行之陽有盤谷盤谷之閒泉甘而土肥草木叢茂居民鮮少或曰謂其環兩山之閒故曰盤或曰是谷也宅幽而勢阻隱者之所盤旋友人李愿居之愿之言曰人之稱大丈夫者我知之矣利澤施於人名聲昭於時坐於廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑才畯滿前道古今而譽盛德入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛綠者列屋而閒居妬寵而負恃爭妍而取憐大丈夫之遇知於天子用力於當世者之所為也吾非惡此而逃之是有命焉不可幸而致也窮居而野處升高而望遠坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適之安與其有譽於前孰若無毀於其後與其有樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趦趄口將言而囁嚅處穢汚而不羞觸刑辟而誅戮徼倖於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌曰盤之中維子之宮盤之土可以稼盤之泉可濯可沿盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無殃虎豹遠跡兮蛟龍遁藏鬼神守護兮呵禁不祥飲且食兮壽而康無不足兮奚所望膏吾車兮秣吾馬從子於盤兮終吾生以徜徉以明經舉者誦數十萬言又約通大義徵辭引類旁出入他經者又誦數十萬言其為業也勤矣登第於有司者去民畝而就吏祿由是進而累為卿相者常常有之其為獲也亦大矣然吾未嘗聞有登第於有司而進謝於其門者豈有司之待之也抑以公不以情舉者之望於有司也亦將然乎其進而謝於其門也則為私乎抑無乃人事之未思或者不能舉其禮乎若牛堪者思慮足以及之材質足以行之而又不聞其往者其將有以哉違眾而求識立奇而取名非堪心之所存也由是而觀之若堪之用心其至於大官也不為幸矣堪太學生也余博士也博士師屬也於其登第而歸將榮於其鄉也能無說乎燕趙古稱多感慨悲歌之士董生舉進士連不得志於有司懷抱利器鬱鬱適茲土吾知其必有合也董生勉乎哉夫以子之不遇時苟慕義彊仁者皆愛惜焉矧燕趙之士出乎其性者哉然吾嘗聞風俗與化移易吾惡知其今不異於古所云耶聊以吾子之行卜之也董生勉乎哉吾因子有所感矣為我弔望諸君之墓而觀於其市復有昔時屠狗者乎為我謝曰明天子在上可以出而仕矣有地數百里趨走之吏自長史司馬以下數十人其祿足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼丈夫官至刺史亦榮矣雖然幽遠之小民其足跡未嘗至城邑苟有不得其所能自直於鄉里之吏者鮮矣况能自辨於縣吏乎能自辨於縣吏者鮮矣况能自辨於刺史之庭乎由是刺史有所不聞小民有所不宣賦有常而民產無恒水旱癘疫之不期民之豐約懸於州縣令不以言連帥不以信民就窮而斂愈急吾見刺史之難為也崔君為復州其連帥則于公崔君之仁足以蘇復人于公之賢足以庸崔君有刺史之榮而無其難為者將在於此乎愈常辱于公之知而舊遊於崔君慶復人之將蒙其休澤也於是乎言天下之以明二經舉於禮部者歲至三千人始自縣考試定其可舉者然後升於州若府其不能中科者不與是數焉州若府總其屬之所升又考試之如縣加察詳焉定其可舉者然後貢於天子而升之有司其不能中科者不與是數焉謂之鄉貢有司者總州府之所升而考試之加察詳焉第其可進者以名上於天子而藏之屬之吏部歲不及二百人謂之出身能在是選者厥惟艱哉二經章句僅數十萬言其傳注在外皆誦之又約知其大說繇是舉者或遠至十餘年然後與乎三千之數而升於禮部矣又或遠至十餘年然後與乎二百之數而進於吏部矣班白之老半焉昏塞不能及者皆不在是限有終身不得與者焉張童子生九年自州縣達禮部一舉而進立於二百之列又二年益通二經有司復上其事繇是拜衞兵曹之命人皆謂童子耳目明達神氣以靈余亦偉童子之獨出於等夷也童子請於其官之長隨父而寧母歲八月自京師道陜南至虢東及洛師北過大河之陽九月始來及鄭自朝之聞人以及五都之伯長㣥吏皆厚其餼賂或作歌詩以嘉童子童子亦榮矣雖然愈當進童子於道使人謂童子求益者非欲速成者夫少之與長也異觀少之時人惟童子之異及其長也將責成人之禮焉成人之禮非盡於童子所能而已也然則童子宜暫息乎其已學者而勤乎其未學者可也愈與童子俱陸公之門人也慕回路二子之相請贈與處也故有以贈童子人固有儒名而墨行者問其名則是校其行則非可以與之游乎如有墨名而儒行者問其名則非校其行而是可以與之游乎揚子雲稱在門牆則揮之在夷狄則進之吾取以為法焉浮屠師文暢喜文章其周游天下凡有行必請於搢紳先生以求詠歌其所志貞元十九年春將行東南柳君宗元為之請解其裝得所得敘詩累百餘篇非至篤好其何能致多如是耶惜其無以聖人之道告之者而徒舉浮屠之說贈焉夫文暢浮屠也如欲聞浮屠之說當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物事為之盛其心有慕焉拘其法而未能入故樂聞其說而請之如吾徒者宜當告之以二帝三王之道日月星辰之行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之說而瀆告之也民之初生固若夷狄禽獸然聖人者立然後知宮居而粒食親親而尊尊生者養而死者藏是故道莫大乎仁義教莫正乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於冊中國之人世守之今浮屠者孰為而孰傳之耶夫鳥俛而啄仰而四顧夫獸深居而出懼物之為己害也猶且不脫焉弱之肉強之食今我與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自耶夫不知者非其人之罪也知而不為者惑也悅乎故不能即乎新者弱也知而不以告人者不仁也告而不以實者不信也余既重柳請又嘉浮屠能喜文辭於是乎言愈在京師時嘗聞當今藩翰之賓客惟宣州為多賢與之游者二人隴西李博清河崔㣥㣥與博之為人吾知之道不行於主人與之處者非其類雖有享之以季氏之富不一日留也以㣥博論之凡在宣州之幕下者雖不盡與之游皆可信而得其為人矣愈未嘗至宣州而樂頌其主人之賢者以其取人信之也今中丞之在朝愈日侍言於門下其來而鎮茲土也有問湖南之賓客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也去年冬奉詔為邑於陽山然後得謁湖南之賓客於幕下於是知前之信之也不失矣及儀之之來也聞其言而見其行則向之所謂㣥與博者吾何先後焉儀之智足以造謀材足以立事忠足以勤上惠足以存下而又侈之以詩書六藝之學先聖賢之德音以成其文以輔其質宜乎從事於是府而流聲實於天朝也夫樂道人之善以勤其歸者乃吾之心也謂我為邑長於斯而媚夫人云者不知言者也工乎詩者歌以繫之何與韓同姓為近堅以進士舉於吾為同業其在太學也吾為博士堅為生生博士為同道其識堅也十年為故人同姓而近也同業也同道也故人也於其不得願而歸其可以無言耶堅道州人道之守陽公賢也道於湖南為屬州湖南楊公又賢也堅為民堅又賢也湖南得道為屬道得堅為民堅歸倡其州之父老子弟服陽公之令道亦倡其縣與其比州服楊公之令吾聞鳥有鳳者恒出於有道之國當漢時黃霸為潁川是鳥實集而鳴焉若史可信堅歸吾將賀其見鳳而聞其鳴也已五岳於中州衡山最遠南方之山巍然高而大者以百數獨衡為宗最遠而獨為宗其神必靈衡之南八九百里地益高山益峻水清而益駛其最高而橫絕南北者嶺郴之為州在嶺之上測其高下得三之二焉中州清淑之氣於是焉窮氣之所窮盛而不過必蜿蟺扶輿磅礡而鬱積衡山之神既靈而郴之為州又當中州清淑之氣蜿蟺扶輿磅礡而鬱積其水土之所生神氣之所感白金水銀丹砂石英鍾乳橘柚之包竹箭之美千尋之名材不能獨當也意必有魁奇忠信材德之民生其閒而吾又未見也其無乃迷惑溺沒於佛老之學而不出耶廖師郴民而學於衡山氣專而容寂多藝而善游豈吾所謂魁奇而迷溺者耶廖師善知人若不在其身必在其所與游訪之而不吾告何也於其別申以問之吾少時讀醉鄉記私怪隱居者無所累於世而猶有是言豈誠旨於味耶及讀阮籍陶潛詩乃知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也若顏氏子操瓢與簞曾參歌聲若出金石彼得聖人而師之汲汲每若不可及其於外也固不暇尚何麴蘖之託而昏冥之逃耶吾又以為悲醉鄉之徒不遇也建中初天子嗣位有意貞觀開元之丕績在廷之臣爭言事當此時醉鄉之後世又以直廢吾既悲醉鄉之文辭而又嘉良臣之烈思識其子孫今子之來見我也無所挾吾猶將張之况文與行不失其世守渾然端且厚惜乎吾力不能振之而其言不見信於世也於其行姑與之飲酒今年秋見孟氏子琯於郴年甚少禮甚度手其文一編甚鉅退披其編以讀之盡其書無有不能吾固心存而目識之矣其十月吾道於衡潭以之荊累累見孟氏子焉其所與偕盡善人長者吾益以奇之今將去是而隨舉於京師雖不有請猶將彊而授之以就其志况其請之煩耶京師之進士以千數其人靡所不有吾常折肱焉其要在詳擇而固交之善雖不吾與吾將彊而附不善雖不吾惡吾將彊而拒苟如是其於高爵猶階而升堂又况其細者耶讀書以為學纘言以為文非以誇多而鬬靡也蓋學所以為道文所以為理耳苟行事得其宜出言適其要雖不吾面吾將信其富於文學也潁川陳彤始吾見之楊湖南門下頎然其長薰然其和吾目其貌耳其言因以得其為人及其久也果若不可及夫湖南之於人不輕以事接爭名者之於藝不可以虛屈吾見湖南之禮有加而同進之士交譽也又以信吾信之不失也如是而又問焉以質其學策焉以考其文則何信之有故吾不徵於陳而陳亦不出於我此豈非古人所謂可為智者道難與俗人言者類耶凡吾從事於斯也久未見舉進士有如陳生而不如志者於其行姑以是贈之吾常以為孔子之道大而能博門弟子不能徧觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以所能授弟子原遠而末益分蓋子夏之學其後有田子方子方之後流而為莊周故周之書喜稱子方之為人荀卿之書語聖人必曰孔子子弓子弓之事業不傳惟太史公書弟子傳有姓名字曰馯臂子弓子弓受易於商瞿孟軻師子思子思之學蓋出曾子自孔子沒㣥弟子莫不有書獨孟軻氏之傳得其宗故吾少而樂觀焉太原王塤示余所為文好舉孟子之所道者與之言信悅孟子而屢贊其文辭夫沿河而下苟不止雖有遲疾必至於海如不得其道也雖疾不止終莫幸而至焉故學者必慎其所道道於楊墨老莊佛之學而欲之聖人之道猶航斷港絕潢以望至於海也故求觀聖人之道必自孟子始今塤之所由既幾於知道如又得其船與檝知沿而不止嗚呼其可量也哉元年今相國李公為吏部員外郎愈嘗與偕朝道語幽州司徒公之賢曰某前年被詔告禮幽州入其地迓勞之使里至每進益恭及郊司徒公紅帓首鞾袴握刀左右雜佩弓革長服矢插房俯立迎道左某禮辭曰公天子之宰禮不可如是及府又以其服即事某又曰公三公不可以將服承命卒不得辭上堂即客階座必東向愈曰國家失太平於今六十年矣夫十日十二子相配數窮六十其將復平平必自幽州始亂之所出也今天子大聖司徒公勤於禮庶幾帥先河南北之將來覲奉職如開元時乎李公曰然今李公既朝夕左右必數數為上言元年之言殆合矣端公歲時來壽其親東都東都之大夫士莫不拜於門其為人佐甚忠意欲司徒公功名流千萬歲請以愈言為使歸之獻陽山天下之窮處也陸有邱陵之險虎豹之虞江流悍急橫波之石廉利侔劒㦸舟上下失勢破碎淪溺者往往有之縣郭無居民官無丞尉夾江荒茅篁竹之閒小吏十餘家皆鳥言夷面始至言語不通畫地為字然後可告以出租賦奉期約是以賓客游從之士無所為而至愈待罪於斯且半歲矣有區生者誓言相好自南海拏舟而來升自賓階儀觀甚偉坐與之語文義卓然莊周云逃空虛者聞人足音跫然而喜矣况如斯人者豈易得哉入吾室聞詩書仁義之說欣然喜若有志於其閒也與之翳嘉林坐石磯投竿而漁陶然以樂若能遺外聲利而不厭乎貧賤也歲之初吉歸拜其親酒壺既傾序以識別張道士嵩高之隱者通古今學有文武長材寄迹老子法中為道士以養其親九年聞朝廷將治東方貢賦之不如法者三獻書不報長揖而去京師士大夫多為詩以贈而屬愈為序苟可以寓其巧智使機應於心不挫於氣則神完而守固雖外物至不膠於心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之於丸秋之於奕伯倫之於酒樂之終身不厭奚暇外慕夫外慕徙業者皆不造其堂不嚌其胾者也往時張旭善草書不治他伎喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動於心必於草書焉發之觀於物見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹靂歌舞戰鬬天地事物之變可喜可吅丂一一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世今閑之於草書有旭之心哉不得其心而逐其跡未見其能旭也為旭有道利害必明無遺錙銖情炎於中利欲鬬進有得有喪勃然不釋然後一决於書而後旭可幾也今閑師浮屠氏一死生解外膠是其為心必泊然無所起其於世必淡然無所嗜泊與淡相遭頹墮委靡潰敗不可收拾則其於書得無象之然乎然吾聞浮屠人善幻多技能閑如通其術則吾不能知矣唐受天命為天子凡四方萬國不問海內外無小大咸臣順於朝時節貢水土百物大者特來小者附集元和睿聖文武皇帝既嗣位悉治方內就法度十二年詔曰四方萬國惟回鶻於唐最親奉職尤謹丞相其選宗室四品一人持節往賜君長告之朕意又選學有經法通知時事者一人與之為貳由是殷侯侑自太常博士遷尚書虞部員外郎兼侍御史朱衣象笏承命以行朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離別可憐之色持被入直三省丁寧顧婢子語剌剌不能休今子使萬里外國獨無幾微出於言面豈不真知輕重大丈夫哉丞相以子應詔真誠知人士不通經果不足用於是相屬為詩以道其行云
