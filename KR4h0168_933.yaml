front:
  text: 全唐文欽定全唐文卷九百三十三杜光庭五
  hash: sha256:665f74dcf16c7e6d348439c4efdef592d0694c0a7b6e053a793cd17f86faf50f
body:
  text: 穆王於崑崙山王屋山嵩山華山泰山衡山恒山終南山會稽山青城山天台山羅浮山崆峒山致王母觀前後度道士五千餘人秦始皇帝併吞六國招方士好長生之術遣使往蓬萊採不死藥造宮觀一百餘所度道士一千七百餘人漢文帝竇太后並好黃老之術造宮觀七十二所勅天下如不通黃老經者不得注官又親訪河上公問道德之要天下大治計度道士一千餘人孝武帝奉道彌篤感王母降於宮中遺帝白銀像五軀曰是太上老君之真形也帝別營三殿而供養之後移像於柏梁臺上後又移於甘泉宮內以一殿而並列之南向設座自茲始也又度公主數人及度道士約五千餘人並造觀三百餘所其嵩嶽萬嵗觀泰山登封觀華山集仙觀終南望靈觀王屋通天觀並不得令庶姓居之以為恒式其萬嵗觀因帝巡幸而聞山呼遂捨行宮而為觀焉至孝宣帝時有上黨郡功曹李惲因入抱犢山採藥於石室內獲天書四十餘卷并玉箱玉杖獻於河東郡太守張純純立遣使上進帝視之大驚不覺流涕乃令宣示內外臣僚時冉癸為主書中郎將見之泣曰此是武帝臨崩時遺制令葬於梓宮之內何由至此及披之卷後所有臣僚校勘姓名於今見有存者帝乃遣使檢校茂陵即又安宛如故帝乃為武帝造觀二所一在長安城內一在茂陵之下以奉先帝也復度道士二十人以奉香火也後赤眉之亂茂陵為賊所發於梓宮之中但見有劍一口方欲取之其劍忽然哮吼騰空而去世祖光武皇帝既平王莽天下大定東封禮畢乃為本朝十一帝追薦及南陽舂陵名山大川長安洛陽計造觀一百二十所度道士一千八百人魏明帝為武帝及先太后造觀於五都計一十三所度道士一百九人仍詔道書同御史裝飾吳主孫權於天台山造桐柏觀命葛元居之於富春造崇福觀以奉親也建業造興國觀茅山造景陽觀都造觀三十九年度道士八百人晉武帝於洛陽造通天洞天靈仙靈寶四觀及諸州共二百所先魏末隴右臨洮郡有神人長三丈著白衣垂素髮戴金冠現於襄武縣告縣人王始曰不久當見太平及武帝授禪果天下一統帝乃令於所現處造告平觀即李宗之故居也別度道士七人并前後所度道士共計四百七十二人時吳郡臨平湖岸崩獲石鼓一枚遣使上進帝問司空張華此物何用曰但以桐木刻作鯨魚形扣之必有聲聞於數里至惠帝時於宮中忽夜鳴不已帝甚惡之乃遷嵩山萬嵗觀擊之集眾自茲始也後魏道武帝於雲中太原及河朔造觀計五十所度道士六百餘人太武勅令天下造太平觀共二百七十五所度道士一千三百人帝受籙改太平真君元年仍令四方內外上書言太平真君皇帝陛下自後嗣帝位並皆受籙後周武帝於長安造通元館以延羽客隋高祖文皇帝遷都於龍首原號大興城乃於都下畿內造觀三十六所名曰元壇度道士二千人煬帝遷都洛陽復於城內及畿甸造觀二十四所度道士一千一百人皇朝高祖神堯大聖大光孝皇帝於隋末大業十三年感霍山神稱奉太上老君命告唐公汝將來必得天下至武德元年晉州浮山縣羊角山著素衣戴金冠乘朱騣白馬令吉善行告神堯汝今得聖理可於長安城東致一安化宮而安道像則社稷延長天下大定善行辭見天子何以為據太上曰但去有獻石龜者可以為信善行乃告晉州刺史賀君孝義孝義遂將善行見秦王具告神人現事㣥臣拜慶遂差左親衞帥杜昂與善行於所現處設祭太上又現一如善行所言以鞭指昂曰汝是何人昂曰是秦王使者太上曰我不飲不食何用祭乎所有委曲令人具知昂還乃言神人復現秦王大悅乃令昂將善行入京上奏至京立未定果有印州治中張達獻石龜上有文曰天下安子孫興千萬嵗千萬葉遂入面奏高祖大悅詔授善行為朝散大夫賜物一百段乃令通事舍人柳憲於羊角山立廟復改浮山縣為神仙縣羊角山為龍角山太上又現為善行曰天子喜歡否對曰大喜又曰疑惑何事復對曰為不知聖者姓名耳太上曰我是無上神仙姓李氏號老君即我也我即帝之祖也史記中有傳亳州谷陽縣本廟有枯檜再生為驗我已令周公旦領神兵助國家打劉黑闥得四月節即破矣孝義又令善行入奏高祖乃勅善行馳驛往洛陽軍所宣勅示諭至時果平黑闥四海大定枯檜亦重生焉乃改廟為慶唐觀內有明皇御製書碑及列聖真容並在武德三年詔晉陽道士王遠知授朝散大夫并賜鏤金冠子紫絲霞帔以預言高祖受命之徵也太宗又加遠知銀青光祿大夫並遠知預言之故也羽衣人賜紫衣自茲始也高宗龍朔二年詔洛州長史譙國公許力士於邙山建上清宮以鎮鬼仙洞掘得古石案即仙人帛仲理之故基也及功畢帝令設醮太上又現百官進表稱賀帝大悅乾封初帝東封禮畢迴鑾亳州親謁太上謹上尊號為混元皇帝聖母為先天太后仍改谷陽縣為真源縣又為太宗及文德皇后造東明觀於京師又勅道士宜隸宗正寺仍立位在親王之次文明元年天后欲王諸武太上乃現於虢州閿鄉縣龍臺鄉方興里皇天原遣鄔元崇令傳言於天后云國家祚永而享太平不宜有所僭也天后遂寢乃捨閿鄉行宮為奉仙觀後慶山湧出於新豐縣界高三百尺上有五色雲氣下有神池數頃中有白鶴鸞鳳四面復有麒麟獅子天后令置慶山縣其諸祥瑞具載天后實錄以表國家土德中興之兆也又捨中嶽奉天宮為嵩陽觀以追薦高宗大帝也竟傳位於中宗孝和皇帝景龍元年勅天下州郡並令置景龍觀二年改為中興觀三年改為龍興觀其度人一依前代故事睿宗捨東京宅為景雲觀又捨太原宅為唐隆觀為資薦天皇天后也明皇開元中勅諸道並令置開元觀又製混元讚帝親書勒之於石又勅五嶽置真君廟又勅上都置太清宮東都置太微宮以太原神堯舊宅為紫微宮潞州潛龍故宅為啟聖宮並給衮冕絳紗帷帳交龍門㦸一如宮闕之制帝又注道德經及製序引詔天下士庶並令家藏一本兩街道眾乃以幢旛伎樂自禁中迎歸於太清宮香花之盛近古未有又勅置道舉一如禮部之制帝親自策之達者甚眾後蒲州奏因修紫極宮掘地獲玉石狀如半月復有仙人杵藥之像扣之有聲頗甚清遠帝令懸於太原元元廟庭號之為偃月磬東都畱守張琦奏汝州魯山縣因修仙居古觀獲玉瑛扣之聲聞數里帝令懸於太清宮聖祖廟庭衢州為建觀宇穿地得魚一頭長三尺其狀似鐵微微帶紫碧之色又如青石光瑩雕鐫殆非人功所成也扣之甚響其魚亦不得名遣使來獻帝令宣示百僚亦不能辨帝乃呼為瑞魚磬仍命懸於太微宮非講經設齋不得擊之由是諸觀競以木石模之以代集眾又詔諸官悉以宰臣及本道節度使領之永為常式帝又製霓裳羽衣曲紫微八卦舞以薦獻於太清宮貴有異於九廟也帝東封獲江淮間三脊茅乃令於所獲之地置靈茅觀及禮畢迴謁聖祖於亳州本宮親札道德經於石作大幢造八角樓覆之於虛無殿之前又幸懷州開元觀及閿鄉奉仙觀為王公萬民所請亦親札二經以大石對峙立之一如太清之製乃詔授鄔元崇為虢州刺史開元十七年夏四月五日益州大都督府長史張敬忠奏大聖祖混元皇帝應現於當管蜀州新津縣興尼寺佛殿柱上自然隱起木文為太上老君聖像當頂上有華葢足下前後各有雲葉天花共一十三處謹差判官益州功曹參軍王大鐄檢覆得狀與本州刺史李忠徇別駕盧昉縣令李韶道士僧尼一百三十人狀同方敢上奏至五月二十四日勅差內侍林昭隱宣取像柱入京於大同殿供養又令兩街宮觀各賜供養七日却令進入大內於今見在前後瑞應極多難以具錄二十九年正月七日陳王府參軍田同秀於丹鳳門外忽見紫雲自西北暎樓又見混元乘白馬侍從二童子二童子謂同秀曰我昔與尹喜將入流沙之日藏一匱靈符在桃林故關尹喜舊宅汝可請帝取之同秀具事聞奏勅差內使李志忠監同秀往陝州桃林縣南十二里故函谷關墟求訪之俄有紫雲白兔現於枯桑之下便乃穿掘下至水際得石函經匱玉版朱書細篆帝聞奏大悅即令京師列十部樂歌舞鼓吹自通化門入其文於寶輿中五色放光洞照天地帝於丹鳳樓上身披龍衮手執金爐六宮嬪婇競於樓上散花焚香遙自作禮帝又令亂撒金錢於樓下縱令士庶分取以為歡樂斯須山呼之聲震動京邑帝令置寶符於靈昌殿是夜樓閣林樹之上皆有神燈乃於正月一日改開元三十年為天寶元年改桃林縣為靈寶縣其後三年帝見靈符有天寶千載之字天寶已應改元之號遂改年為載乃於其地長樂亭置天寶觀御製并書靈符銘立於所獲之處又於大內置靈符殿賜同秀五品正員官宰相請加尊號為開元天寶神武之字制可之大赦天下其年閏四月帝夢混元謂帝曰我在城之西南久矣當與汝於興慶相見可速迎我帝謂宰相李林甫牛仙客曰朕臨御海內向三十年未嘗不五更而起具朝服禮謁真容為蒼生祈福近因假寐見混元具言上事遂差內使與道門威儀蕭元裕於城西南尋訪數日忽於樓觀山谷間見有紫雲現白光屬天於其下穿之果得玉像老君高三尺餘以進其日帝在興慶宮大同殿親自迎謁果符興慶之言置於內殿供養仍令所司寫真容分送天下諸道宮觀遂大赦天下五載帝夢見混元言我有靈應尋當自至遂於太白山獲靈符玉冊及迎到京置於靈符殿親自供養仍封太白山神為靈應公改獲符洞為嘉祥洞於山下置真符縣乃令諸道置真符觀仍編入史其年十二月帝幸華清宮其月四日日未出時忽見驪山頂雲物積異須臾雲散見混元聖祖現於朝元閣上帝與內人瞻謁良久乃隱詔改會昌縣為昭應縣其新豐縣隸入昭應又封會昌山為昭應山封山神為元德公改朝元閣為降聖閣內出圖本頒示天下宣付史官八載帝獲二十七仙玉像於寧州羅川縣勅令迎像入京一如天寶初迎靈寶符儀注故事帝親自製讚尋改羅川縣為真寧縣於所獲處造通聖觀帝製碑文立之於今並在其年六月大同殿產玉芝一莖又造金仙玉芝二觀復度公主二人為道士又太白山人李渾上言見混元言金星洞內有玉版石記聖皇福壽之符勅御史中丞王鉷入遊谷行四百餘里求而得之勅以殊祥頒示中外乃於其地造靈符觀閏六月丙寅帝謁太清宮加五聖尊號作仲尼四子像侍立於混元之前又勅十道大郡置玉芝觀大赦天下九載太白山人王元翼上言混元大帝降現言寶仙洞中有妙寶真符謂帝取之勅刑部尚書張均工部尚書王倕往取獲之乃造真靈觀十三載正月帝謁太清宮又上混元尊號為大聖祖高上大道金闕混元天皇大帝五聖各加諡號帝加開元天地大寶聖文神武證道孝德皇帝大赦天下十五載帝幸蜀混元現於漢中郡中三泉縣黑水之側帝親禮謁遂命刻石像真容於所現之處又於利州益昌縣山嶺上見混元騎白衞而過示收祿山之兆詔封其山為白衞嶺於所見之處置自然觀又於嵩山置興唐觀成都置福唐觀肅宗至德二載三月十八日混元現於通化郡雲龍岩初因郡人為國祈福建大齋會十八日忽煙霧異香氤氳不散至辰時漸漸開霽神光照天因見混元真像立於山前自地接天通身白衣左手垂下右手執五明之扇儀相炳然眾盡瞻禮其山雖高亦不及肘良久乃隱遂具上奏內出圖本太上皇製讚并敘文繁不錄具編史冊仍示天下乾元二年帝夜夢二青童導從至一宮闕謁見混元混元衣雲霞之衣冠九鳳之冠坐方席垂寶葢凭玉几執白拂左右侍衞真人玉女神仙童子五天力士羅列極眾帝著絳衣秉圭立侍於混元之後遊涉山海經歷甚遠帝一一潛記又見混元鬚髮皆黑及明宣下兩街訪諸瑞像於務本坊光天觀聖祖院果獲黑髭老君之像圖寫以進帝見大悅一如夢中所睹乃出帝真容令侍立於混元之後仍頒示於天下暜令供養代宗初於楚州安宜縣獲八寶因改安宜縣為寶應縣勅於所獲之處造寶應觀遂改元為寶應元年大赦天下德宗貞元十年混元潛使金母累降於果州金泉山授鍊㤅之術付女貞謝自然修習功成其年十月十六日白日上昇後三月乃歸謂刺史李堅曰天上有玉堂最高老君居焉壁上皆題神仙之名時注脚下云在人間或為帝王或為宰輔神仙入謁老君皆四拜焉自然言訖遂卻昇天敬宗寶歷二年正月帝有事於南郊朝獻太清宮御駕將至長安縣主簿鄭翦忽見老君衣白衣容狀異常謂翦曰當此路有井可速實之不然禍在不測翦驚惶顧其地已微陷遂并力實之因失老君所在駕至具以上聞百官稱賀詔兵部侍郎韋處厚為碑起居郎柳公權書立於實井之側乃編付史官其年十二月十八日柳公權書碑之際忽有勁風颯然而起旋飇不已乃見混元著紫衣金冠金履立於白蓮花之上右手執五明扇左手垂下空中光明如金色公權與鐫碑人瞻覩良久因以物畫地記形像及畫畢混元忽以扇指空中流光四散乃騰空而去眾皆側身仰視漸遠漸小沒於雲中遂以事上聞詔編事迹入碑之中又勅於兩京造延唐觀文宗開成二年五月中書舍人高元裕為閬州刺史於州北八九里嘉陵江上小山之前忽見崖壁間光彩有異近而觀之石上自然石文成老君真像眉髮衣章巾履服飾無不周備傍有一人寬衣大袖持鑪薦香後一人童子雙髻高束謹若聽命皆非人力圖繪鐫刻所及元裕每有所禱即紫氣上浮又有靈泉自湧士民請福無不立效遂刻石建宇用旌其瑞乃畫圖呈進乞編入史詔從之武宗會昌元年勅以二月十五日大聖祖降誕之日為降聖節仍令兩京及天下諸州府設齋行道作樂賜大酺三日軍期急速亦不在此限永為常式懿宗咸通十年九月十日徐州逆寇龎勳領從黨三千餘人來亳州太清宮其日宮北百姓三百餘人見老君自宮中乘空而南須臾黑霧遍南川中㣥賊迷路自相殺戮龎勳溺水而死㣥兇自此殄滅汴州節度使太清宮使李蔚具事上聞詔曰吾國家系承混元教導清淨苦縣舊里聖祖故鄉宮宇具嚴廟貌斯設昨者餘妖奔突縱火將欲焚燒陰霧覆閉於晴空狂寇顛迷於道路散逸原野遂至誅夷緬惟元功申茲靈貺內出青詞又委李蔚虔申告謝布示中外仍付史官十三年三月台州刺史姚鵠奏於天台山修老君殿於其地穿獲得石函冊文以進乞付史館頒示四方詔從之廣明二年三月河中節度使王重榮奏據晉州申龍角山慶唐觀老君殿側柏樹上瑞葛枯死重生先是武德中混元應現後於二樹間立殿宇逾年之後柏樹上忽自生葛蔓長十餘丈榮茂於常其後齊王奪嫡此蔓枯死旬月之後自其末青翠再生齊王遂敗至中宗復位安史叛逆朱泚謀亂皆忽枯落久而復生廣明元年黃巢犯闕其年秋葛蔓枯死二年冬枝葉重茂又於傍樹上別生一枝旬日之中長五十餘尺相對繁茂有異於常奏詔襃美編付史官其後祥異皆有詔勅蓋美乎葛藟慶其神謀瓜瓞昭其遠祚混元流貺奕葉無窮者也皇帝駐驆西蜀中和二年八月九日進到帝令宣示內外三年三月十一日亳州刺史潘稠差道士馬含章孫棲梧等奏太清宮自乾寧四年已累有逆寇侵犯真源少或逾千多或逾萬皆窺伺是宮欲為焚劫或來攻城邑或旁犯縣城老君皆密垂神化忽起濃雲或驅以陰風或擊以雷雹率皆顛沛尋至敗亡靈貺益彰神功罔測尋詔昇真源縣為畿縣仍內出青詞修崇告謝帝即稽首東拜八月十二日勅亳州太清宮是混元降聖之里名高道祖福廕皇基九宮之瑞井涵空一鹿之仙蹤在樹累代之禎祥可紀近年之感應尢彰所宜嚴盛於福庭安可荒凉於靜宇潘稠能施善政久樂真風廣出俸錢備修宮觀垣墉棟桷無不精新像設丹青彌加煥麗觀圖考事深可慰嘉其住官威儀道士吳重元可賜紫仍號凝元先生道士馬含章孫棲梧竝賜紫潘稠加金紫光祿大夫檢校工部尚書餘竝如故其年八月二十九日夜詔帝房宗室李特立與道士李無為於成都府青羊肆元中觀混元降生舊地設醮祈真忽見虹光如彈丸許漸漸明大出於殿基東南竹林中跳躑入西南梅樹下沒於沒處穿地三尺已來得寶塼一口長一尺一寸五分濶七寸四分一邊厚一寸三分竝有花文一邊厚一寸八分重一十二觔有古篆六字各方二寸深三分鐫刻瑩潔迨非人工文曰太上平中和災九月一日西川節度使侍中陳敬瑄奏曰皇帝陛下稽古順天膺圖撫運凝懷至道屬想大同是用省方以明罪己深仁旁達於下土至德昇聞於上元符讖允臻禎祥間出降太上匡時之命清中和寇孽之災迺示明文爰形古篆足表妖氛即殄聖祚無疆克知收復之期便是清寧之日至十二日帝令宣示百官中書侍郎平章事韋昭度戶部侍郎平章事蕭遘門下侍郎平章事鄭畋御史中丞張瀆宗正卿嗣曹王龜年表賀曰伏以萑蒲嘯聚車馬省方天災流行國家代有陛下降成湯罪已之詔徵王者有征之師顧彼兇妖即當殄滅清平既彰於嘉兆幽贊爰覩其祕文赤雀銜書貺豈同於太上元龜負卦慶難比於平災况因宗室齋醮之辰仍有祥光跳躑之瑞其為感現可謂丁寧樞密使李順融十渾十二衞都指揮使田令孜表賀曰今者又有維城來於仙觀至誠纔發嘉兆俄呈現此時在地之赤光是昔日度關之紫㤅及穿積土果獲古文驗逸勞於龍蛇即知平於梟獍於沖邃理頗甚昭明既太上令與平災知中和永昌厥祚所現全因聖祖掘得又自皇枝捧此靈蹤可明天意且混元聖祖每逢多難皆有殊祥唯彼明徵備書正史昔於丹鳳門上告田同秀以天寶復國之期今又青羊肆中示李特立以陛下還宮之慶莫不天下幸甚乞付史館帝竝俞之十五日李特立授太子校書李無為賜紫仍各賜縑帛三百疋二十一日又詔曰太上元元大帝與弟子文始先生講真經於樓觀之臺約後會於青羊之肆便乘雲駕俱入流沙仙記傳聞地圖標載自周昭至於此日歷數約二千餘年景像寂寥基蹤牢落今因巡幸靈貺昭彰殊光跳躍於庭前靈篆申明於樹下塼合古色字驗休禎中和之災害欲平厚地之禎符乃現足表元穹降祐聖祖垂祥將殲大盜之兵戈永耀中興之事業須傳簡冊兼示寰區已付史官備令編錄仍模勒文字告示諸道及軍前其觀可改號為青羊宮仍置殿堂屋宇側近屬觀田地約有兩頃近來散屬黎甿多植蔥蒜清虛之地難使薰蒸已賜錢二百貫便令收贖仍給公驗永歸靖廬宗子特立已除官道士李無為己賜紫所宜昇奬用荷慶靈敬瑄位冠公台風行郡國効節於延洪之代修心於道德之鄉遂令境內消兵地中呈寶其為休美倍可嘉稱至十月七日勅高品郭遵泰監造青羊宮土木之工竝用內庫宣賜自獲靈瑞之後至是月癸丑近蜀郡寇相次擒戮旬月之內遂至清平駕至青羊宮頒賜有差李特立賜緋授龍州錄事參軍又下詔曰太上垂祥青羊應現禮宜崇飾用答殊休諸道州府紫極宮宜委長吏如法修飾仍選有科儀道士祭醮是月乙卯奏收復京城有以見大道垂休聖祖昭祐洪圖延永唐祚無疆者也又勅翰林學士承旨尚書兵部侍郎知制誥樂朋龜撰碑立之伏乞頒示天下以表皇家承神仙之苗裔感太上之靈貺實萬代之無窮也臣今校會從國初已來所造宮觀約一千九百餘所度道士計一萬五千餘人其親王貴主及公卿士庶或捨宅捨莊為觀竝不在其數則帝王之盛業自古至於我朝莫得而述也中和四年十二月十五日上都太清宮文章應制宏教大師賜紫道士臣杜光庭上進謹記
