front:
  text: 全唐文欽定全唐文卷八百九十七羅隱四
  hash: sha256:56fc8d4fbe4aa0d77b04d2f2891fe7429481d74cd15c4bb3d8d15b6dbe94bff7
body:
  text: 高駢末年惑於神仙之説呂用之張守一諸葛殷等皆言能役使鬼神變化黃白駢酷信之遂委以政事用之等援引朋黨恣為不法其後亦慮多言者有所泄漏因謂駢曰高真上聖要降非難所患者學道之人真氣稍虧靈貺遂絶駢聞之以為信然乃謝絶人事屏棄妾媵賓客將吏無復見者有不得已之故則遣人洗浴齋戒詣紫極宮道士祓除不祥謂之解穢然後見之拜起才終已復引出自此內外壅隔紀綱日紊用之等因大行威福傍若無人嵗月既深根蒂遂固用之自謂磻溪真君張守一是赤松子諸葛殷稱將軍有一蕭勝者謂之秦穆公駙馬皆云上仙遣來為令公道侶其鄙誕不經率皆如此江陽縣前一地祇小廟用之貧賤時常與妻寓止巫舍凡所動靜禱而後行及得志謂為冥助遂修崇之回廊曲室妝樓寢殿百有餘間土木工飾盡江南之選每軍旅大事則以少牢祀之用之守一皆云神遇駢凡有密請即遣二人致意焉中和元年用之以神仙好樓居請於公廨邸北跨河為迎仙樓其斤斧之聲晝夜不絶費數萬緡半嵗方就自成至敗竟不一遊扃鐍儼然以至灰燼是冬又起延和閣於大廳之西凡七間高八丈皆飾以珠玉綺窗繡戶殆非人工每旦焚名香列異寶以祈王母之降及師鐸亂人有登之者於藻井垂蓮之上見二十八字云延和高閣上干雲小語猶疑太乙聞燒盡降真無一事開門迎得畢將軍此近詩妖也用之公然云與上仙來往每對駢或叱咄風雲顧揖空中謂見㣥仙來往過於外駢隨而拜之用之指畫紛紜略無愧色左右稍有異論則死不旋踵矣見者莫測其由但搏膺不敢出口用之忽云后土夫人靈仇遣使就某借兵馬并李筌所撰太白陰經駢遽下兩縣萃百姓葦席數千領畫作甲馬之狀遣用之於廟庭燒之又以五綵箋寫太白陰經十道置於神座之側又於夫人帳中塑一緑衣年少謂之韋郎廟成有人於西廡棟上題一長句詩曰四海干戈尚未寧謾勞淮海寫儀形九天元女猶無信后土夫人豈有靈一帶好雲侵鬢緑兩行巖岫拂眉青韋郎年少耽間事案上修看太白經好事者競相傳誦是嵗詔於廣陵立駢生祠并刻石頌差州人採碑材於宣城及至楊子縣用之一夜遣人密以健牯五十牽至州南鑿垣架濠移入城內及明柵緝如故因令楊子縣申府昨夜碑石不知所在遂懸購之至晚云被神人移至街市駢大驚乃於其傍立一大木柱上以金書云不因人力自然而至即令兩都出兵仗鼓樂迎入碧筠亭至三橋擁鬧之處故埋石以礙之偽云人牛拽不動駢乃硃篆數字貼於碑上須臾去石乃行觀者互相謂曰碑動也識者惡之明日楊子有一村嫗詣知府判官陳牒云夜來里胥借耕牛牽碑誤損其足遠近聞之莫不絶倒比至失守師鐸之衆竟自壞墉而進常與丞相鄭公不協用之知之忽曰適得上仙書宰執之間有陰圖令公者使一俠士來夜當至駢驚悸不已問計於用之用之曰張先生少年時嘗學斯術於井深里聶夫人近日不知更肯為之否若有但請此人當之無不虀粉者駢立召守一語之對曰老夫久不為此戲手足生疏然為令公有何不可及期衣婦人衣匿於別室守一寢於駢臥內至夜分擲一銅鐵於階砌之上鏗然有聲遂出皮囊中彘血灑於庭戶簷宇間如格鬬之狀明日駢泣謝守一曰蒙仙公再生之恩真枯骨重肉矣乃躬輦金玉及通天犀帶以酬其勞又有蕭勝者亦用之黨也納五百金賂於用之用之曰爾何欲曰欲得知鹽城監耳乃見駢為求知鹽城監駢以當任者有績與奪之間頗有難色用之曰用勝為鹽城者不為勝也昨得上仙書云有一寶劍在鹽城井中須一靈官取之以勝上仙左右人欲遣去耳駢俯仰許之勝至監數月遂匣一銅匕首獻於駢用之稽首曰此北帝所佩者也得之則百里之內五兵不敢犯駢甚異之遂飾以寶玉常置座隅時廣陵久雨用之謂駢曰此地當有火災郭邑之間悉合灰燼近日遣金山下毒龍以少雨濡之自此雖無大段燒亦不免小小驚動也於是用之每夜密遣人縱火荒祠壞宇無復存者駢嘗受道家祕法用之守一無增焉因刻一青石如手版狀隱起龍蛇近成文字玉皇授白雲先生高駢潛使左右置安道院香几上駢見之不勝驚喜用之曰玉皇以令公焚修功著特有是命計其鸞鶴不久當降某等此際謫限已滿便應得陪幢節同歸真境也他日瑤池席上亦是人間一故事言畢歡笑不已遂相與登延和閣命酒肴極歡而罷後於道院庭中刻木為鶴大如小駟羈轡中設機木戾人或逼之奮然飛動駢嘗羽服跨之仰視空濶有飄然之思矣自是嚴齋醮煉金丹費耗資財動逾萬計日居月諸竟無其驗呂用之鄱陽安仁里細民也性桀黠略知文字父璜以貨茗為業來往於淮浙間時四方無事廣陵為歌鐘之地富商大賈通逾百數璜明敏善酒律多與㣥商遊用之年十二三其父挈行既惠悟事諸賈皆得歡心時或整履搖箑匿家與奴婢等居數嵗璜卒於家乾符初㣥盜攻剽州里遂他適用之既孤且貧其舅徐魯仁賙急之嵗餘通於魯仁室為魯仁所逐因事九華山道士牛宏徽宏徽自謂得道者也用之降志師之傳其驅役考召之術宏徽既死用之復客於廣陵遂縠巾布褐用符藥以易衣食嵗餘丞相劉公節制淮左有蠱道置法者逮捕甚急用之懼遂南渡時高駢鎮京口召致方伎之士求輕舉不死之道用之以其術通於客次逾月不召詣渤海親人俞公楚公楚奇之過為儒服目之曰江西呂巡官因間薦於渤海及召試公楚與左右附會其術得驗尋署觀察推官仍為制其名因字之曰無可言無可無不可也自是出入無禁初專方藥香火之事明年渤海移鎮用之固請戎服遂署右職用之素負販久客廣陵公私利病無不詳熟鼎竈之暇妄陳時政得失渤海益奇之漸加委仗先是渤海舊將有梁纘陳拱馮綬董僅公楚歸禮日以疏退渤海至是孤立矣用之乃樹置私黨窺伺動息有不可去者則厚以金寶悅之左右㣥小皆市井人見利忘義上下相蒙大逞妖妄仙書神符無日無之更迭唱和罔知愧恥自是賄賂公行條章日紊煩刑重賦率意而為道路嗟怨各懷亂計用之懼有竊發之變因請置巡察使採聽府城密事渤海遂承制授御史大夫充諸軍都巡察使於是召募府縣先負罪停廢胥吏陰狡凶狠者得百許人厚其官傭以備指使各有十餘丁縱橫閭巷間謂之察子至於士庶之家呵妻怒子密言隱語莫不知之自是道路以目有異已者縱謹靜端默亦不免其禍破滅者數百家將校之中纍足屏氣焉高駢嬖吏諸葛殷妖人呂用之之黨也初自鄱陽將詣廣陵用之先謂駢曰玉皇以令公久為人臣機務稍曠獲譴於時君輒遣左右一尊神為令公道中羽翼不久當降令公善遇欲其不去亦可以人間優職縻之明日殷果來遂巾褐見駢於碧筠亭妖形鬼態辨詐蜂起謂可以坐召神仙立變寒暑駢莫測也俾神靈遇之謂之諸葛將軍也每從容酒席間聽其鬼怪之説則盡日忘倦自是纍遷鹽鐵劇職聚財數十萬緡其凶邪陰狡用之蔑如也有大賈周師儒者其居處花木樓榭之奇為廣陵甲第殷欲之而師儒拒焉一日殷謂駢曰府城之內當有妖起使其得志非水旱兵戈之匹也駢曰為之奈何殷曰當就其下建齋壇請靈官鎮之殷即指師儒之第為處駢命軍候驅出其家是日雨雪驟降泥淖方盛執事者鞭撻迫蹙師儒攜挈老幼匐匍道路觀者莫不愕然殷遷其族而家焉殷足先患風疽至是而甚每一躁癢命一青衣交手爬搔血流方止駢性嚴潔甥姪輩皆不能侍坐唯與殷款曲未嘗不廢寢忘餐或促膝密坐同杯共器遇其風疽忽發即恣意搔捫指爪之間膿血沾染駢與之飲啖曾無難色左右或以為言駢曰神仙多以此試人汝輩莫介意也駢前有一犬子每聞殷腥穢之氣則來近之駢怪其馴狎殷笑曰某常在大羅宮玉皇前見之別來數百年猶復相識其虛誕率多如此高虞常謂人曰爭知不是吾滅族冤家也殷性躁虐知揚州院來兩月官吏數百人鞭背殆半光啓二年偽朝授殷兼御史中丞加金紫及城陷竄至灣頭為邏者所擒腰下獲黃金數斤通天犀帶兩條既縛入城百姓聚觀交唾其面尋撮其鬢髮頃刻都盡獄具刑於下馬橋南杖至百餘絞而未絶會師鐸母自子城歸家經過法所遂扶起避之復蘇於橋下執撲者尋以巨木踣之騶殿過決罰如初始殷之遇也驕暴之名尋布於遠近其族人競以謙損戒殷殷曰男子患於不得遂志既得之當須富貴自處人生寧有兩遍死者至是果再行法及棄尸道左為讐人剜其目斷其舌兒童輩以瓦礫投之須臾成峯吳堯卿者家於廣陵初傭保於逆旅善書記因出入府庭遂聞於縉紳始為鹽鐵小吏性敏辨事之利病皆心記口調悅人耳目故丞相李尉以其能首任之高駢因署堯卿知泗州院兼判國監尋奏為刺史制命未行會軍變復歸廣陵頃之知浙西院數月而罷又知揚州院兼榷糴使偽朝授堯卿御史大夫堯卿託附權勢不問貴賤苟有歧路縱厮養輩必斂衽以金玉餌之微似失勢雖素約為死交則相對終日不復與言趨利背義如此權貴無不以賄賂交結之故不離淮泗僭竊朱紫塵汚官省三數年間盜用鹽鐵錢六十萬緡時王棨知兩使務局下堯卿獄將窮其事為諸葛殷所保持獲全及城陷軍人識是堯卿者咸請啖之畢師鐸不許夜令堯卿以他服而遁至楚州遇變為仇人所殺棄尸衢中其妻以紙絮葦棺斂之未及就壙好事者題其上云信物一角附至阿鼻地獄請去斜封送上閻羅大王時人以為笑端黃巢之將叛也天下騷動杭之豪傑舉挺以衛鄉里者八人故立八都之號其間王公節將派有分者一十三都君居其一焉君諱公約字處仁杭之餘杭人以膽略為郡邑推應募西討投西佳鎮遏使其後從董太尉禦巢加御史中丞奏置都額改硤石為郡邑之所於是推鋒破鋭勳業愈盛由冬卿改秋曹民部二尚書為將三十年家無長物出則督勵士卒入則訓闕二字弟斯亦名將之高節也乾寧四年夏六月二十有一日啓手足於硤石之第享年五十八以明年正月十五日卜宅於錢塘之新亭鄉桐扣山之原禮也君嗣子以隱鄉里之舊請銘其墓而復以詩一章文其美於道之隅曰吳山蒼蒼吳水泱泱降生英靈為公為王以嚴師旅以奠封疆派有別者我亦鷹揚取直之功捍巢之績雖從本軍實展良畫踐歷禁旅光揚事迹乃自西佳遷於硤石上君東代諸將西征賈以餘勇資其鋭兵稽山霧廓京口波清再從貂冕始拜冬卿吳會紛紜淮石奔競驅其凍餒犯我疆境躬勵精卒恭承上命雪霽松貞風中草徑元戎承制聖主酬勞大起名重司元望高優遊渥澤出入官曹所謂雞省全資豹韜恭仰府城載崇吾圉惟力是助厥功以舉雲矗千堵土攢萬杵率以資産役以軍旅乃頒異寵乃正華資大國綱紀雄藩羽儀牀間牛鬬杯裏蛇疑天胡可測神亦難知有仁於時有功於物一代殊勳二品清秩不謂不達何獲何失瑞馬神羊金箱玉室公諱讓字德高沖公子即下邳烏程長林公七世孫是為一代祖公雅貌殊衆重瞳美髯語含鐘聲手垂逾膝博學豪邁豁達善謀初從東郡都督及漢察孝廉除歷陽章安二縣長時吳郡薛府君固為執法所枉徵詣廷尉公因歲朝賀大呼稱固之冤順帝命虎賁羽林劍戟夾其兩腋左右彎弓向身問所言枉狀而公直言其由神色不變天子即原固罪公卿大夫莫不歎息太尉趙峻辟公為西掾遷黃門選部侍郎時九江猾寇周生范容作亂蕩覆淮泗徐揚有詔以公忠誠亮直必能盡節拜廣陵太守征東大將軍持節都督江左六州諸軍事公沈謀內張羽翼外舒行陳才接凶徒瓦解斬賊帥徐鳳謝安等於陳范容周生相縛款首於是桓帝旌其成功封富春侯食邑五千戶佩以金紫嘉平元年三月十六日薨春秋六十有三諡曰哀公夫人東海徐氏生三子曰承曰京曰晟後娶夫人安定皇甫氏生一子曰耽葬長興縣平望鄉西北梓山奉朝命繪公遺像於郡祠公諱京字仲恭富春侯第二子也世居長興以富春侯蔭仕漢本宮舍人太子洗馬出守高密郡善政有聲轉越騎都尉右將軍諡闕夫人顧氏合葬長興雉山子五曰徊曰寶曰育曰化曰覺析居於烏程無錫崑山陸安於潛吳興等處號洗馬支下子孫公諱寶字叔珍高密侯第二子也仕吳為前軍司馬以勳升都尉轉樞密尉將軍娶夫人信安鄭氏生二子曰典曰睦公與夫人合葬附高密侯側公諱睦字士信司馬公第二子也勤敏好學思紹世風初領本部五官掾纍遷黃門侍郎改尋陽令能抑強撫困藹為時稱加東郡太守娶夫人會稽魏氏生二子曰秀曰裔公與夫人合葬附高密侯側公諱秀字子宏侍郎公之長子也篤志學問優於禮經仕吳以尚書郎議官歷太常卿娶夫人徐氏生二子曰廣曰恩公與夫人合葬附高密侯側侯諱廣字敬仲太常公之長子也性孝友博通㣥書志氣高邁西晉太安中察孝廉纍遷安遠將軍平逆寇石冰等太尉東海王越表其勳授以軍咨祭酒江州刺史持節征虜將軍都督江東諸軍事時陳敏僭亂割據江表公與顧榮周等謀曰我等受恩朝廷爵位至此安得不以忠義自效即乃歃血而盟結為昆弟協心奮擊不逾月而賊平賞典未至薨於永嘉二年年五十有四後二年賜以丹書追贈永安侯食邑二千戶諡曰莊公娶夫人汝南周氏生四子曰維曰彌曰智紹曰繼公與夫人合葬長城北二十五里湖陵山侯諱彌字德盛永安侯第二子也穎悟過人善屬文襲父蔭仕晉甫十八補主簿纍遷散騎常侍而聲譽四馳調陳州刺吏下車之初以法誅蠧民豪猾而汲汲於撫字民甚德之轉輔國大將軍敕授預寧侯夫人魏氏生四子曰瑋曰基曰纂曰道濟侯與夫人合葬長城戍山之南公諱瑋字瑞英預寧侯之長子好學治書旁貫莊老仕晉纍官至左常侍太子黃門侍郎出為徐州別駕治理清恕撫民如子致以慈父稱之加安遠將軍夫人吳郡陸氏生五子曰元孫曰咨詢曰修道曰興德曰興道公與夫人合葬附預寧侯墓側侯諱興德字文璨安遠公第四子少而明敏曉達時務善書札古作博通天文仕晉為本郡功曹遷揚州主簿員外散騎轉冠軍府記室參軍贈關內侯娶夫人烏程吳氏生三子曰安仁曰伯仁曰法全侯與夫人合葬附預寧侯墓北午酉山王諱伯仁字德靜關內侯之次子也溫厚端方酷孝嗜義賢士大夫咸器重之劉宋泰始中舉孝廉除王府兵曹參軍員外散騎常侍蕭梁革命公遂挂冠歸隱天監三年詔舉世家勳德之士郡守劉渾表稱錢氏為望族自漢以來公侯令使之貴名聯勳册文獻足徵矧其先世富春侯讓圖像郡祠民猶懷之今伯仁年齒雖暮而不怠進修克副勳德之舉由是纍徵辭不獲已授揚州刺史娶夫人吳郡張氏生五子曰肅之曰樂之曰雍之曰敬之曰和之一女曰寶媛適同郡陳文讚即景帝也生子霸先是謂陳高祖武皇帝追贈為臨川王寶媛以永定元年十月薨諡孝烈追尊景皇后王與夫人墓附高密侯墓西二里公諱肅之字子恭臨川王長子以父蔭仕梁歷職常侍天監十三年授員外散騎常侍全威將軍轉給事中十五年除邵陵王府文學娶夫人故鄣王氏繼娶施氏生一子曰道始繼娶萬氏生一子曰道震公與夫人合葬大義村南十五里東侯山公諱道始字元德給事公長子也自幼嗜學經史百家靡不究極其義而氣岸超出倫輩天監中辟除王府法曹參軍歷仕輕車將軍江州刺史在任明練治體剖決如流姦雄畏其威窘乏被其澤雖值荒忙之際而屬邑雍恬當侯景逼臺城時公與西都太守陳霸先應援從上江下敗之於金陵王僧辨欲窘霸先斬其黨杜龕齊將徐嗣徽入寇公據要出奇絶其糧道以破嗣徽其纍立奇勳如此與霸先舅姑昆季也霸先受禪是為陳武帝永定元年上常諭公曰卿有佐命勳勞藩威之良器然以國戚恩賚殊薄於衆今天下將定安忍以繁劇之任浼卿遂授揚威將軍充本郡瑞嘉二陵令兼本部刺史俾旋長興保護陵寢薨年六十二武帝悲悼罷朝三日追贈建寧伯又贈開國伯食邑五百戶諡定公娶夫人同郡王氏合葬東侯山生子六曰纂曰善明曰望達曰吉兒曰智遠曰智昌分為六枝號曰湖頭六宅侯諱智昌字子盛開國伯第六子也幼而聰慧文武兼通陳武帝躍龍之始侯隨父拒杜龕於大義柵一百餘日城壘之地即侯之宅也奇謀果決遂破杜龕天嘉二年奉朝命遷吏部尚書授桂陽王府參計侍郎轉仁威將軍勳封如故年四十有二卒於京師詔贈通直散騎常侍宣毅將軍封綏安侯食邑五百戶詔歸權葬大義村大業二年卜遷戍山舊塋娶夫人吳郡張氏生子二曰瓛曰璡侯與夫人合葬焉公諱瓛字貴章綏安侯之長子公在髫齔間暗誦六經甫學為文有驚人語少失怙哀毀過禮事母以孝聞陳至德中詔徵甲門子弟補本部主簿移長沙王法曹參軍以功加右衛殿中將軍歷晉安縣開國子既而嘆曰道之不行時耶命耶鷦鷯鼴鼠不過一枝與盈腹足耳遂隱林泉隋大業中海寇侵掠郡邑公仗義率衆守禦境賴以安唐貞觀十九年疾終於私第年七十有三娶夫人武康姚氏生三子曰元修曰元裕曰元師公與夫人合葬附先人綏安侯墓側公諱元修字文通開國子之長子性淳謹篤厚甘淡泊以清白自守唐貞觀五年策試通經補長興縣博士七年詔天下貢民氏族源流公録家譜詣郡與沈懷遠等數家連保京師唐永徽二年陳碩真謀逆朝廷詔鄰道討之吳興郡守李杭辟公議事公遂請兵擊寇勦其餘黨郡守奏其功拜高平太守揚威將軍以儀鳳二年疾終葬附祖綏安侯戍山墓側娶夫人高平徐氏生二子曰孝憬曰孝本公諱孝憬字希貞一字定方揚威將軍長子幼聰慧書通八體射穿七札耽玩典籍工於詩歌一觴一詠為縉紳所重年十六以門蔭授富春尉公以奕世勳閥族門鼎盛當大唐創業之後是天下進賢之時公獨忘情簪笏雅志高尚十辟三公府再以五品徵雖羔雁繼來簡書交至而公終懷止足高尚不屈放情巖谷思全真璞以為臨安土厚水清包含正氣石鏡居前光分數里苕溪處後波漾十尋九州之廟貌儼然二月之芳蹤宛在加以金鏞之梵宇禪宮秦王之車轍馬迹羲之獻之之遊處主領猶存郭生銓定之真風喬松尚翠李八百隱居之地唐君房仙去之壇公識達仙機心通物表仰察盡天文之變俯觀知地理之宜乃相縣之東南茅山之下躬遷祖宅自此移家俾子孫大震家聲百代之後以我為宗故號茅山祖時浙帥錢塘郡守表公世德堪佐聖朝詔赴闕庭將加大用委州縣長吏備禮以迎㣥心叶慶共俟寵光如何天違福善之祥奄有壞梁之嘆忽縈疾恙俄以壽終年七十有二附葬綏安侯祖塋戍山之原娶夫人琅琊王氏生七子曰師寶立義立璀立琬師慶師整師道公諱師寶字道圭孝憬公長子童時通孝經論語嘗語親曰用天之道分地之利謹身節用以養父母此聖人之至行也吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎此孔門之高節也惟此二者吾庶幾焉遂高謝徵辟覃精載籍極事親之道得鄉黨之譽優哉遊哉聊以卒嵗年八十有五無疾而終娶吳郡張氏葬臨安縣署村大錢墓生二子曰仁哲仁昉公諱仁昉字德純師寶公次子性格端秀識量宏深少稟清規早懷幹濟舉孝廉高第拜太子司儀郎遷長城令躬勤耕織賓興學校疲瘵蘇息逋逃歸附家興禮樂之風民知謙讓之節任滿階臨耆老顧盼者千戶登車出境童稚攀轅者數程公之仁政感人者如斯歸老家庭躬耕奉養載丁艱疾居喪合禮清風雅望今古垂芳竟以壽終年八十有一娶本郡王氏生三子曰碩崇碩琛碩亶葬臨安縣石鏡鄉錢宅墓次公諱碩亶字文甫司儀公第三子生而俊秀身長七尺眉舒目明好學耽書識洞經史精於天文歷數兼通地理元奧常登石鏡高峯視前後山水形勢嘆曰峯巒擁抱龍虎盤旋氣象深沈必出豪傑鍾其運者其我家子孫乎時海內晏如江左豐阜公以祖德高尚忘其軒冕韜光晦迹堅隱邱園玩水尋山逍遙自適於是江表知公之名山林超俗之士多求訪而交遊焉然而稼穡以躬京坻嵗積賙贍三族給奉燕遊遍及鄉黨人莫不感其德者逮極齒暮厥德彌芳壽七十有九終於正寢娶夫人本郡陳氏生三子曰湛曰滉曰沛公與夫人合葬臨安縣石鏡鄉錢宅墓側梁朝以元孫進封吳越爵追贈尚書檢校司空夫人贈太安太夫人謹按錢氏大宗譜尚有錢沛錢宙錢寬列傳三首考隱卒於梁開平二年不應為乾化已後之文必非隱作皆刪去丁亥年夏咸通八年前晉陽崔縣令死於通政里客舍殍也余雖不識其人且念其官不卑也死亦命也而竟以餓者是必不為貪吏為貪吏則不然因作詞以弔曰南風熱兮雲蒸乾緬飢魂兮愁鬱盤蒞晉陽兮俸薄魂之廉兮無剽削余辭以弔空魂來親兮無西東魂無山兮山之鬼夷叔彼之生兮未嘗足魂無野兮野之鬼陳仲彼非其得兮一介不之共魂邀留兮京師上愈愈兮下怡怡殘敗肉兮乞狗彘捨此兮何之量天地之廣大兮吾不得而知雞則走而鳶則飛鳴蟬瘦而蝤蠐肥何濁也則是清也則非茫昧既不可以問兮盤礡不可得而推恍吾懷以四顧兮孰知夫天地之云為
