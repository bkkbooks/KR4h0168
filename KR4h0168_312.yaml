front:
  text: 全唐文欽定全唐文卷三百十二孫逖五
  hash: sha256:486025fc75bc6a66e410d2a3f34a0451dd97423cd65ef888d0e1ceadf4b2ad5f
body:
  text: 古者天子居青陽服蒼王於是乎和令布德行慶施惠其義遠矣粵若稽古皇帝御天下之十有九載溥暢神化宏宣大明氐羌來享四方無事元凱升朝百揆時序年屢豐而多慶物由庚而自樂乃賜㣥臣十日宴所以畢春氣樂太平也越三日已已會於定昆明池於是秉鈞宗公執事庶尹元衮赤舄黼衣繡裳奉璋峩峩佩玉鏘鏘仰丹闕而拜命俯清川而樂飲大庖孔碩尹京為致餼之司旨酒思柔柱史為佐樽之政既錫之以高會又悅之以備樂修妓羅舞名倡間歌含姑洗於鐘鼓動陽春於羽籥陟則設帟降則具舟榜文鷁以泝洄與飛鷗而狎玩魴鱮甫甫鳧鷖翼翼薰風敷散於草木喜氣宛延於郊甸亦既醉止于胥樂兮夫恩之所覃者深則感之所及者遠引之於大足以助天地之同和伸之於微足以致魚鱉之咸若大君垂裕豈虛也哉詩以展事抑惟舊典我上相裴公中書令蕭公保乂皇極緝熙文教以為正國風美王化者莫近於詩微言浸遠大義將缺乃命革剗浮靡導揚雅頌斫雕為朴取實棄華親題首章以倡在位皇矣上帝式歌文王之德穆如清風方聞吉甫之頌請問其目列之於左書曰寇賊姦宄又曰奪攘矯虔延於平人干國之紀常州刺史王公奉若天命肅清江服德之至也不言而默信令之行也不言而知懼政未期月路不拾遺斯亦隨武子鄭太叔常從事於茲矣歲三月使車行郡輕舟入湖自公及私寓物成趣水照金章春明朱紱倚禹穴於前棹回越城於後屏南國春暮鶯花亂飛東山晝晴林嶺皆出載酒公宴尋幽水嬉班秩以節在宴樂而有禮簪笏斯皇覺雲湖之增價夫皇華乘傳朝寄之重邱壑林藪幽趣之適在此行也兼而有之請賡載歌用旌厥美昔孔門達者言志於夫子曰浴乎沂風乎舞雩咏而歸豈非遊必有方道在則樂貴潔清以象德輔精爽而成趣吾友趙子亦事斯語矣歷選暇日咨謀同心備預芳華有事沃盥炎火電煙洞房燠若探湯以申誡闕一字水知其善清以流其惡則形之汾澮苦而利於病則神之藥石雖雅琴養德惠風析酲曾何喻哉未足多也振衣而退繼酒為樂需食有節誦言無譁所貴酣暢以和湫底夫始於澡身終於養神樂只君子曷嘗違仁左衛騎曹張晉明伸紙染毫俾豫題序今上有天下之十載鑾輅在酆而大夫師長庶士御事分曹成周俾贊居守歲八月詔下東都召水部員外郎李公拜工部郎中崇德也李公主善秉哲敏才慮行葆光能明冥樞自達始以茂才擢第與今中書舍人許公俱補廣陵掾相與沿達淮泗嘯歌雲物雅頌允鑠東南有光官匪慢而趣成道不行而樂在自時厥後蓋四三年或翰飛禁垣或鷹騰仙闕接武軒陛迭耀冠劒夫豈求之歟皆溫良恭儉讓以得之也所謂謙受益德必聞崑崙琅玕南國橘柚無遠不屆彼何言哉傳置具車候亭出餞西皓沆碭北陰肅殺風落崤澠霜飛河濆金羈載馳紫亭何遠夫居四民時地利周所以貴冬官草奏議應列宿漢所以寵郎署之人也之德也必能簡孚乃職克休厥聲天秩虛求明庭仄席矣凡今作者賦詩贈行高陽氏之才子侍御其人焉夏之文求也藝兼而有之矣頃者持斧河朔獨按專城明罰敕法所向風靡是以有黔中之往俾修河朔之政不然者何萬里而南為至如遐荒靡莫之俗置吏羈縻之道則衆賓敘之矣倦談者何得而稱焉余射策於洛城南門者有年數矣補闕張子嘗同彙征逮揮翰於禁庭又聯官於近侍人各有舊所貴於同聲吾愛其才敢忘於久要承明厭直河朔言歸且鄴惟舊都漳有深涉昔聞七子今在一門北州為營當有聚星之會西垣贈別請陳零雨之詩古之使臣必有命介所以謀闕計事類能撰功蔣侯之往佐輶軒蓋其義也夫其敏行精識長才博聞克荷詩禮之訓聿修清白之業故妙年從官已著老成之風卑飛未騁共許垂天之翼是行也必能使田有封洫事著典常儲峙孔殷甲兵不頓愛人許國何以尚茲時中丞公亢寵天朝而子勤役邊鄙豈不以策名委質者義方之大訓出入顧復者常情之小慈不貴垂堂之説還嗤倚門之望懿乎哉又聞君子之遠其子也河隴先秋鷹隼方擊贊成糾慝今也其時㣥公題之賦詩以贈古之王者稅公田虞衡之入給郊廟賜與之用無有遠邇咸率乃職越會稽郡者海之西鎮國之東門都會蕃育膏肆兼倍故女有餘布而農有餘粟以方志之所宜供天府之博斂篚絲紵緍金刀浮江達河命為泛舟之役撰功底績實賴飲冰之使是行也裴子為政焉乃命水工具行器節制費用詳度川陸指洞庭以北上向長安而西矣談笑之外厥有成功樽俎之間見其從事展使能者非子而誰而疇昔交情今茲吏道歎淪落於荒服結殷勤於官次喬木之國子其歸乎篁竹之鄉余何為者肝膽楚越始合終離嗚呼歧路素絲得其幾矣十月冬旱三江晝晴夢故園之黃落見長河之鴻鴈澤國山水天資助人炎方草樹歲寒未入居者愛客行者徇公拜神禹之清祠泛伍員之濤水車馬疊迹傾越人於外郊樓船接艫溢吳歌於寒浦贈君以不拜戒君以登陟攬涕河道賦詩詠曰遂州參軍紀公吾友雲將之令弟也敏於行志於道克修人彞允副兄勗噫周公之允紀為其首天祚明德必將有後不然何棣華之可久也選曹舉善㣥吏須才九霄始構一命而傴穆卜吉日遄征畏途緬躋岷峨遐涉裦漢宿息巖險淩臨湍悍仗信不栗載義必亨方慕忠臣之志固無垂堂之責爾之寡兄克施有政是則是效念茲在茲福利則覦心永隔遠嫌則荒言自絶固雖邛僰之産巴蜀之饒不潤脂膏誰謗薏苡懋厥丕德時維哲人㣥公贈言要僕題序昔太史公涉汶泗登鄒嶧以觀孔氏之遺風康子之吏於是邦有以見古人之心矣況大君出豫將事升中之禮有司擇人俾佐奉高之邑利在求舊急於使能位卑才難亦可宗也夫強學者義之用工文者藝之本明識者智之府令名者德之輿子曰疑士四德以待百事如農之既勤若射之有志行無越思往無不利彼遊刃於理劇固恢恢乎有餘地矣初余以朋友之故謫居荒服憔悴湘濱縉雲不調明時殆將十載是舉也所謂理舊汙續常職信有國之令典知若人之晚成五月鳴蜩載驅翹翹贈之維何折彼柔條餞之維何席彼秀葽炎雲在天景風拂野時燠方熾吾子勉之請各賦詩以無忘平生之好世稱命祠者禹廟之謂矣初少康以一旅之衆復禹之績祀夏配天不失舊物立祠制位茲其始也炳靈不測潛德有孚東南風土罔不祗若故自斑白至於童幼駿奔走執籩豆相望道路歲無虛日郡掾韋公諸侯之良也掄才慮行秉秀騰實清明在躬造次於是夫率人以斂邦賦之重簡才備行郡事之急撰功底績者非韋公而誰詩曰鴻鴈于飛哀鳴嗷嗷維此哲人謂我劬勞韋公有焉練日明發沐芳祠宇邀祝史以陳言宴朋徒而寵行川澤紆餘棼棟轇轕天與澄霽神助幽陰萬象皆清百籟非俗蓄洞澤以東匯亘連岡而南指嵐氣沈沈陽景不入神光爛爛陰堂自明吁其駭人也韋公乃挹瓊芳酹元酒倚余棹兮中洲君不行兮夷猶令洞庭兮無波使江水兮安流要言既招神具斯醉宴樂愷悌初自明而達幽景福興作終出無而入有祭典不黷王事其勤飾羈紲之徒旅想京闕之雲物東園有洛西河惟雍歷金門觀象闕則知聲明之盛也登鄠杜躋崤函則知形勝之美也詩人所以適樂國君子所以操土風及君此行二者備矣則傴僂下土鬱湮外邦者尚有何言哉凡我同人賦詩贈別云吏部尚書在周為太宰之職其建設徒屬敷陳事典則周官備之矣秦滅古法始置尚書漢增其制創立選部故靈帝以梁鵠為選部尚書是矣魏改選部尚書為吏部尚書自晉宋至於北齊皆因之宇文朝依周官置大冡宰卿一人蓋其任也隋革周制復曰吏部尚書皇朝龍朔二年改為司列太常伯咸亨元年復為吏部光宅元年改為天官尚書神龍元年又為吏部尚書綜九流之要為六官之長位尊任重實在於茲自武德已來多以宰相兼領一彼一此更為出入才難不其然乎皇帝在位之二十二年缺其官選於衆乃命武都公自兵部尚書拜焉公地惟宗英才則人傑忠孝自律矜嚴成憲式是軌度諒惟衡石國之利也所及遠哉天監有唐俾多吉士踐此位者四十八人嘉名已著於國史故事宜存於臺閣繫以日月自得春秋之義記其代遷更是公卿之表以備官學列為壁記焉鴻臚漢官掌蠻夷歸義者致其饔餼辨其等威在周為大行人在秦為典客在漢為鴻臚其屬有譯官及郡邸丞長洎後魏太和中九寺各置少卿兩員掌副卿事亦由傳稱亞卿書載三少制位或差於伯仲受任同歸於師長成務贊禮擇賢而居即其義也帝唐亮采立政稽古命官柔服遠人綏厥有衆肅慎來賀渠搜即敘示之以干羽通之以冠帶允諧是職豈易其人非夫野王之政理元成之經術德儒之明識元方之令望則曷由臻茲蘭陵蕭公朝之俊德觸邪秉憲人之雅重草議為郎入掌王言出膺方牧帝咨惟允公實來斯且有皇華之命適表兼人之美乃求舊官守敷陳代遷明授任之有章示名器之無假自嗣聖已後記於壁焉太原元帥黃門侍郎李公國之宗盟朝之俊德以元凱之忠肅兼桓文之節制戊辰歲秋七月公以疆埸之事會幽州長史李公於伯樂川王命也公駕四牡鏘八鸞斾旌悠悠車轞嘽嘽乙未出於北京戊戌次於橫野已亥至於會封人戒備軍吏宿設立會表於高阜闢轅門於大荒漁陽精鋭太原材力駟介八百徒兵三千戈如林羽若月少長有禮賓主不悖蚩尢衄其五兵若敖慙其六卒洸洸乎信可以懾穹廬而震高闕也於是地主致餼以昭饗宴之禮君子有儀以訓上下之則歌蔓草之相遇笑投壺之失辭大庖既盈釃清有藇胥樂周於卒乘屬厭及於輿臺慈惠之德於是乎在夫幽州太原襟帶之地自河以北幽州制之自河以東太原制之在兩軍之交當二境之上厥有棄地皆為曠林守之則表裏之勢全舍之則候望之路隔公料以古今度其川原獻方略而入覲於王議工徒而東為此會爰究爰度匪遊匪追蓐食無再舍之勤扞掫為一夕之衛不愆於素返斾而旋君子謂此會也能用典矣初公之始至太原也酌於人賦於事以為節用者國之善政於是乎減戍卒以寬其征修備者武之善經於是乎致秋集以裒其旅足食者人之所庇於是乎賞屯兵以艾其力近利者姦之所生於是乎禁和糴以懲其弊然後序山澤之險廣亭燧之虞候騎出於長城爟火通於大漠畫田定賦講射訓騶蓄信義為國寶修德行為戰器行之一年軍乃有節邊鄙不聳龔黃之教也雖魏絳有和戎之利卻縠有敦詩之德申伯之式是南邦韓侯之奄受北國曷云比議未足量力公之與幽州李公也義均伯仲芳若蘭茝周諸侯以異姓為後晉大夫以同官為寮入亞六卿共行司馬之法出膺九命俱受元戎之律詩曰維其有之是以似之其二公之謂矣不書所會將何述焉揚厥美於萬斯年俾夫來世知二公相見在此川也昔太公之理齊也尊賢知尚有功泱泱大風千載不泯石慶古之良相也臨淄社焉于公古之良吏曹也東海祠焉裴公今之良太守也濟北頌焉今古一揆謂之齊志苟非其人名不偽立君子是以知裴公之為政有異能矣初公以甲子歲秋八月蒞於是邦祗遹明命宏敷令典教之誨之養之育之俾夫闔境之內靡清風漸膏雨醉純德飽話言若卜筮之是孚如草木之允殖用克畏慕升于大猷其明年也皇帝東巡狩至岱宗自洛及亠兊於皇時邁雷轂萬乘雲旗千里供帳於東道者凡十有六州焉大或數圻次或萬井中産者輕幣膏梁者倍征方事之殷猶懼不給茲郡褊小實難圖也公淵然深識卓然遠謀擇利而行慮善以動西自於陽穀東盡於長清造舟為三橋置騎為萬驛闢野為兩頃除道為九逵或總或秸或薪或槱或饔或餼或糧或糗爨之踖踖積之栗栗其崇如墉其比如櫛皆先之以方略繼之以生聚因吏祿之奇贏雜官用之餘羡通變合度豐省中程編戶之民秋毫勿與繇是邑無征令鄉無斂法賈不利於乘急農不傷於甚賤且狎其野而安其業人所謂勤而不得疑作德施而弗費雖小必濟不亦宜乎抑又聞之居簡則易於德綏處煩則難於柔克大抵皆是其誰不然公始自知供逮於卒業不鞭一卒不貫一吏繩責勿用鐫噍無施禮以生其恭悅以盡其力役不再令事無後期雖子文治兵之舉叔敖城沂之政類能比德曷足稱多洎鑾輿反斾旌別淑慝監頓使劉日政勸農使盧怡並奏公理行第一議者以為當矣其三年秋大水河堤壞決諸郡有聞皆俟詔到莫敢興役害既滋甚功無已時公以為執事諉上者非至公之法也便文自營者非盡忠之計也亦既成奏因而發卒播告厥指率籲於人荷鍤者襁屬負畚者鹿君至從公于邁祁祁如雲公俯臨決河躬自護作雨不張蓋塵不振衣饋不致鮮寢不處館蔬食以同其烹飪野次以同其燥溼板築競勸鼛鼓弗勝克鞏而成匪亟而速以浹辰之役興百倍之利淡災革弊人到於今賴焉古之所謂敏則有功豈虛言矣公之方在河上也有執訊者傳詔命公為宣州刺史公悼其功之不成且懼人之休怠未即宣布周之密之公撫巡如初飭厲不輟及提役既畢國人皆賀公於是解印出次啓籥見書莫不瞿然而駭曰不虞公去之速也嗚呼曷歸乎乃大哭既而幢棨就國干旟首途野有輟耕巷無服馬男女以辨號泣相望或觴於郊或餞於境扶服遮道汍瀾駐車莫肯旋歸殆過信宿夫所居人富所去見思前史以為有德君子之遺風猗嗟裴公蓋有之矣公名耀卿字煥之河東聞喜人祖某皇朝亳州酇縣令父守真皇朝成寧二州刺史贈晉州刺史又贈亠兊州都督皆受祉必大垂裕不朽彰徹簡册布昭政聞其緒業有如此者公之昆友故冀州刺史子餘等六人俱以儒行達天下之人謂之六龍公之自出今屯田員外郎韋述等七人俱以才名進天下之人謂之七子其族姻有如此者公覃訏有聲髫丱克類公侯表於龜筮詩禮成於小學八歲神童擢第則已殊於公路矣辨髦之後尤邃於文長安中則天首命有司考試調集之士而第其詞之高下公以甲科授祕書省正字異其對也睿宗之在藩邸精選寮屬公為典籤兼掌文翰愛其才也其文藝有如此者頃之遷國子主簿試詹事府丞歷河南府士曹參軍拜考功員外郎除右司兵部二郎中自長安令臨此郡自宣城守改授冀州翁歸為政不移於故迹延壽理人亟登於高第入拜戶部侍郎今為左庶子其閥閲有如此者若乃邁德由已全誠自衷出入孝悌周旋禮樂幅利以儉葆光以和仁而有剛直而不倨微妙析理入於無間清明開物周於有象享茲具美可謂大賢其庇身也宏矣其所憑也厚矣詩曰布政優優百祿是遒又曰君子萬年介爾景福夫如是欲辭福祿其可得乎方當彌綸帝績豈徒潤色吏事而已盧縣父老某乙等懷公之惠不可弭忘思欲銘德頌美計功稱伐以豫國之史臣也學於春秋裦貶之義乃因邑子校書郎衛憑假詞不能徵拙於我事則詳實言多遺恨著循吏之傳願守文翁述馬野之詩慙非史克詞曰瞻彼濟矣湜湜其沚有斐君子令聞不已帝省其方和鑾央央務穡布常駿惠于王我隄既溢我民既恤成之不日有始有卒黃髮番番飲公之和矢詩不多維以遂歌有唐開府儀同三司行尚書左丞贈太師燕國文貞公諱説字道濟張氏聖文神武皇帝佐命之臣也開元六祀宅於幽朔及公既歿御撰豐碑以為用公於是邦當革弊之舉訊彼故老徵於前事有以見聖人之情見於辭矣夫渤碣之北有山戎焉乍臣乍驕或息或縱鎮之以大府府有都督威之以大軍軍有節度二者之任萬邦之屏彌縫其闕必有宗臣曩者天册之初王尚書不反命則我天后以納言狄公領之先天之際孫將軍不振旅則我睿宗以太尉宋公為之洎陘口之役嶭公小衄後數稔傷痍未平易置諸將少有稱者則我皇帝注意於文貞公社稷之固生民之傑伊昔徇節未嘗顧身面折二豎辨邪正於君側首謀四凶決安危於天下勇於義力於忠雖有賁育不能奪已自受命處此聲振殊俗終公之代不敢近邊聖人金城其在是矣先是公之未至也軍實耗斁邊儲匱少帑藏乏中人之産革車無百駟之㣥將欲豐之不其難也公問以謠俗因而化之命人採銅於黃山使興鼓鑄之利命杼人斬木於燕嶽使通林麓之財命圉人市駿於兩蕃使頒質馬之政命廩人搜粟於塞下使循平糴之法物有其官官贍其事如川之至以莫不增一年而財用肅給二年而蓄聚饒羡軍聲武備百倍於往時矣猶以為不一勞者不久逸不暫費者不永寧既庶且富人可用也於是塹山澤起亭障塞雞鳴之厄守阜陵之衝遮大夏之路距盧龍之口延袤千里橫絶一方以順天地之心且為華夷之限命下之日修塞之後人到於今賴焉夫戎狄遠却暴禁矣貨食滋至財豐矣封守以固人安矣師徒不勞兵戢矣武有七德我其四焉坐致必勝之道以銷未形之患是公之深計遠慮所致也初公之大用實以詞宗雖亟持國鈞而未執兵柄及台揆中廢荊衡外牧上將復內用因以為將惟幽都克慎厥始惟大原克和厥中惟朔方克成厥終三駕而時靡有爭繇是復踐中樞之任矣文武為憲斯之謂歟喬嶽告成遂登仲虺之相金華念舊仍遵尚父之師高朗令終固其宜也昔周有張仲是稱孝友漢有留侯見推籌畫太守飛聲於朔野司空邁績於西晉及公之貴世德其昌光於祖考則慶州都督刑部尚書追孝於前烈友于兄弟則國子祭酒懷州刺史致美於當代施於祚允則兵部侍郎駙馬都尉纘戎於後葉人臣尊寵舉集其門豈伊朱輪之盛方繼緇衣之好辨其譜系范陽之大族也敘其封略燕國之名都也徵其政理幽州之良牧也美數多矣斯人之德與夫班伯之榮故郡買臣之驚守邸蓋不侔矣薊縣父老某乙等感之所致久而益思遠訴不才追書盛德徽音已隔空悲梁木之歌碑頌獨存應墮峴山之淚仍係辭曰聖出賢覩為師為輔大國宗文殊方畏武帝謂幽朔人思鎮撫受命再瞻聿來茲土謀猷既壯闕漏咸補守固邦寧財豐人聚四牡既駕三邊無侮又何與之元衮及黼范陽宗邑燕垂守宇德被塞翁恩深召父琢彼遺愛傳於終古貞石不騫薊邱之下公諱義寬字某姓杜氏東都濮陽人也其先在周者為侯在漢者為三公在魏者以許昌居守在晉者以荊州作鎮則杜氏之世祿厥惟舊哉若乃其澤雷夏其川河濟顓頊起焉昆吾理焉則濮陽風化所憑厚矣不有純嘏孰生大賢公則魏陳留郡守亮之曾孫北齊膠州刺史竟陵縣開國侯保之孫唐宰相世系表作北齊膠州刺史竟陵公伽隋本郡中正伽之子唐宰相世系表作隋鴈門太守保承邁種之遺訓體清醇之上姿童而典學冠而好古於是東涉汶泗北登鄒嶧講周公之德觀孔氏之藝則易之變詩之風樂之和禮之節書之政春秋之理人一以貫之達其本矣繇是大業九年以孝廉高第授河東郡法曹已而隋氏弗綱王充竊命我太宗文武聖皇帝是以有陝東之師公轉餉如役贏糧從徑軍無後爨士有餘勇鄭是以殞唐是以興帝將策勳公乃辭賞既不獲命請從敘遷因授虞州司倉參軍貞觀二年改授普州安康令稍遷合州治中轉恆州別駕雍州高陵令拜朝散大夫饒州長史遷蘇州司馬兼滕王府咨議凡宰二邑佐六郡大小必誠遠近如一其所在也使者升聞其所去也邦人頌德且有兼官之拜實固大宗之屏宜享三壽以諧百工天難忱斯不可黷已春秋七十有二永徽六年某月日終於蘇州某月日乃葬濮陽疊城之舊原禮也噫公之為人應變當理有慶卿之善畫徵闕考祥有董生之博覽威敵闕附有穰苴之大略摧剛為柔有季布之高義雖運逢板蕩而才偶經綸而或出當騁奇干賞蹈利託風雲之會邀日月之光則萬戶之封不足致也三旌之位曷云貴也而能卷其舌塞其兌實若虛明若昧不貪驟雨之福以遠浮焱之害斯大雅之保身亦君子之向晦也洎天衢開泰皇運清明從官以養人而不為祿謹身以報主而不近名回翔郡邑三十餘載出處之際優遊自得其古之恬勢利者歟初公之裔祖始宅帝邱時更大亂室無遺堵公因謂所親曰吾之世業為郡中正遺愛不泯陰德在人施於子孫必有興者于公高門之事可不務乎用是改卜鮮原大起層構垣墉既蔓棟宇斯飛輪焉奐焉爰笑爰語及公之後斯事果徵一世其昌既開方國再世而大遂為相門論者以為知言矣爾其鄉黨之行閨門之德孝乃天繼仁為已任蒸嘗盡敬宴喜無荒祿利必賙於外姻譙讓不行於私屬故子弟趨教州里嚮風雖有嚴刑峻法不如公之潛導也詩所謂行歸於周萬人所望有令名矣夫令德矣夫有四子長曰儉早世次無忝終於朝散大夫梓州鹽亭令次曰慎行終於益州長史建平縣開國男唐宰相世系表作正平侯贈蜀州刺史次曰惟志終於吏部員外郎贈吏部闕咸以大名克紹前烈豐碑未樹梁木先摧孝孫戶部尚書暹國之故相也儉德為輔正身立朝以伯夷之直清兼張仲之孝友是用秪率理命奉揚祖風作頌稱代刊石表墓留侯大父已傳班固之書陳氏先生何愧蔡雍之述詞曰昔公之先於周為侯及公之允於唐為輔一德貽孫千齡續祖身隔徂謝名存憲矩在濮之陽居河之滸畇畇原隰濟濟榛楛別業年深先塋地古豐碑頌德式是東土
