front:
  text: 全唐文欽定全唐文卷五百八十三柳宗元十五
  hash: sha256:1d7e8175c452c17c3a4964426ad578224bb8042bb9ce300a1b97f454a384a82c
body:
  text: 柳子夜歸自外庭有設祠者餌馨香蔬果交羅插竹垂綏剖瓜犬牙且拜且祈怪而問焉女隸進曰今茲秋孟七夕天女之孫將嬪於河鼓邀而祠者幸而與之巧驅去蹇拙手目開利組紝縫製將無滯於心焉為是禱也柳子曰苟然歟吾亦有所大拙儻可因是以求去之乃纓辨束衽促武縮氣旁趨曲折傴僂將事再拜稽首稱臣而進曰下土之臣竊聞天孫專巧於天轇轕璇璣經緯星辰能成文章黼黻帝躬以臨下民欽聖靈仰光耀之日久矣今聞天孫不樂其獨得貞卜於元龜將蹈石梁款天津儷於神夫於漢之濱兩旗開張中星耀芒靈氣翕欻茲辰之良幸而弭節薄遊民間臨臣之庭曲聽臣言臣有大拙智所不化醫所不攻威不能遷寬不能容乾坤之量包含海嶽臣身甚微無所投足蟻適於垤蝸休於殼龜黿螺蚌皆有所伏臣物之靈進退唯辱仿佯為狂局束為諂吁吁為詐坦坦為忝他人有身動必得宜周旋獲笑顛倒逢嘻已所尊眤人或怒之變情徇勢射利抵巇中心甚憎為彼所奇忍仇佯喜悅譽遷隨胡執臣心常使不移反人是已曾不懼疑貶名絶命不負所知忭嘲似傲貴者啓齒臣旁震驚彼且不恥叩稽匍匐言語譎詭令臣縮恧彼則大喜臣若效之瞋怒叢已彼誠大巧臣拙無比王侯之門狂吠狴犴臣到百步喉喘顛汗睢盱逆走魄遁神叛欣欣巧夫徐入縱誕毛㣥掉尾百怒一散世途昏險擬步如漆左低右昂鬬冒衝突鬼神恐悸聖智危栗泯焉直透所至如一是獨何工縱橫不恤非天所假彼智焉出獨嗇於臣恆使玷黜沓沓騫騫恣口所言迎知喜惡默測憎憐搖脣一發徑中心原膠加鉗夾誓死無遷探心扼膽踊躍拘牽彼雖佯退胡可得旃獨結臣舌喑抑銜冤擘眥流血一辭莫宣胡為賦授有此奇偏眩耀為文瑣碎排偶抽黃對白唵哢飛走駢四儷六錦心繡口宮沈羽振笙簧觸手觀者舞悅誇談雷吼獨溺臣心使甘老醜嚚昏莽鹵朴鈍枯朽不期一時以俟悠久旁羅萬金不鬻弊帚跪呈豪傑投棄不有眉矉頞蹙喙唾胸嘔大赧而歸填恨低首天孫司巧而窮臣若是卒不余畀獨何酷歟敢願聖靈悔禍矜臣獨艱付與姿媚易臣頑顏鑿臣方心規以大圓拔去訥舌納以工言文詞婉軟步武輕便齒牙饒美眉睫增妍突梯卷臠為世所賢公侯卿士五屬十連彼獨何人長享終天言訖又再拜稽首俯伏以俟至夜半不得命疲極而睡見有青袖朱裳手持絳節而來告曰天孫告汝汝詞良苦凡汝之言吾所極知汝擇而行嫉彼不為汝之所欲汝自可期胡不為之而誑我為汝唯知恥諂貌淫辭寧辱不貴自適其宜中心已定胡妄而祈堅汝之心密汝所持得之為大失不汙卑凡吾所有不敢汝施致命而升汝慎勿疑嗚呼天之所命不可中革泣拜欣受初悲後懌抱拙終身以死誰惕有道士言人皆有尸蟲三處腹中伺人隱微失誤輒籍記日庚申幸其人之昏睡出讒於帝以求饗以是人多謫過疾癘夭死柳子特不信曰吾聞聰明正直者為神帝神之尤者其為聰明正直宜大也安有下比陰穢小蟲縱其狙詭延其變詐以害於物而又悅之以饗其為不宜也殊甚吾意斯蟲若果為是則帝必將怒而戮之投于下土以殄其類俾夫人咸得安其性命而苛慝不作然後為帝也余既處卑不得質之于帝而嫉斯蟲之說為文而罵之來尸蟲汝曷不自形其形陰幽詭仄而寓乎人以賊厥靈膏肓是處兮不擇穢卑潛覷默聽兮導人為非冥持札牘兮搖動禍機卑陬拳縮兮宅體險微以曲為形以邪為質以仁為凶以僭為吉以淫諛諂誣為族類以中正和平為罪疾以通行直遂為顛蹶以逆施反鬬為安佚譖下謾上恆其心術妬人之能幸人之失利昏伺睡旁睨竊出走讒於帝遽入自屈羃然無聲其意乃畢求味已口胡人之恤彼修蟲有恙心短蟯穴胃外搜疥癘下索瘻痔侵人肌膚為已得味世皆禍之則惟汝類良醫刮殺聚毒攻餌旋死無餘乃行正氣汝雖巧能未必為利帝之聰明宜好正直寧懸嘉饗答汝讒慝叱付九關貽虎豹食下民舞蹈荷帝之力是則宜然何利之得速收汝之生速滅汝之精蓐收震怒將敕雷霆擊汝酆都糜爛縱橫俟帝之命乃施於刑㣥邪殄夷大道顯明害氣永革厚人之生豈不聖且神歟祝曰尸蟲逐禍無所伏下民百祿惟帝之功以受景福尸蟲誅禍無所廬下民其蘇惟帝之德萬福來符臣拜稽首敢告於元都后皇植物所貴乎直聖主取焉以建家國亘為棟楹齊為閫閾外隅平端中室謹飭度焉以几維量之則君子憑之以輔其德末代淫巧不師古式斷茲楺木以限肘腋欹形詭狀曲程詐力制類奇邪用絶繩墨勾身陋狹危足僻側支不得舒脅不遑息余胡斯蓄以亂人極追咎厥始惟物之殘稟氣失中遭生不完託地墝垤反時燠寒鬱悶結澀癃蹇艱難不可以遂遂虧其端離奇詰屈縮恧巑岏含蝎孕蠧外邪中乾或因先容以售其蟠病夫甘焉制器以安彼風毒敗形陰沴遷魄禍氣侵骨淫神化脈體仄筋倦榮乖衛逆乃喜茲物以為已適器之不祥莫是為敵烏可昵近以招禍癖且人道甚惡惟曲為先在心為賊在口為愆在肩為僂在膝為攣戚施踦跂匍匐拘拳古皆斥遠莫致於前問誰其類惡木盜泉朝歌回車簡牘載焉昭王市骨樂毅歸燕今我斬此以希古賢諂諛宜惕正直宜宣道焉是達法焉是專咨爾君子曷不乾乾既和且平獲祐於天去惡在微慎保其傳家有僮善執蛇晨持一蛇來謁曰是為蝮蛇犯於人死不治又善伺人聞人咳喘步驟輒不勝其毒捷取巧噬肆其害然或慊不得於人則愈怒反齧草木草木立死後人來觸死莖猶墮指攣腕腫足為廢病必殺之是不可留余曰汝惡得之曰得之榛中曰榛中若是者可既乎曰不可其類甚博余謂僮曰彼居榛中汝居宮內彼不汝即而汝即彼犯而鬬死以執而謁者汝實健且險以輕近是物然而殺之汝益暴矣彼耕穫者求薪蘇者皆土其鄉知防而入焉執耒操鞭持芟朴以遠其害汝今非有求於榛者也密汝居易汝庭不凌奧不步暗是惡能得而害汝且彼非樂為此態也造物者賦之形陰與陽命之氣形甚怪僻氣甚禍賊雖欲不為是不可得也是獨可悲憐者又孰能罪而加怒焉汝勿殺也余悲其不得已而所為若是叩其脊諭而宥之其辭曰吾悲乎天形汝軀絶翼去足無以自扶曲膂屈脅惟行之紆目兼蜂蠆色混泥塗其頸蹙恧其腹次且褰鼻鈎牙穴出榛居蓄怒而蟠銜毒而趨志蘄害物陰妬潛狙汝之稟受若是雖欲為蛙為蚓焉可得已凡汝之為惡非樂乎此緣形役性不可自止草搖風動百毒齊起首拳脊努呥舌搖尾不逞其凶若病乎已世皆寒心我獨悲爾吾將剃吾庭葺吾楹窖一作窒吾垣嚴吾扃俾奧草不植而穴隟不萌與汝異途不相交爭雖汝之惡焉得而行嘻造物者胡甚不仁而巧成汝質既稟乎此能無危物賊害無辜惟汝之實陰陽為戾假汝忿疾余胡汝尤是戮是抶宥汝於野自求終吉彼樵豎持芟農夫執耒不幸而遇將除其害餘力一揮應手糜碎我雖汝活其惠實大他人異心誰釋汝罪形既不化中焉能悔嗚呼悲乎汝必死乎毒而不知反訟其內今雖寬焉後則誰賚陰陽爾造化爾道烏乎在可不悲歟猿王孫居異山德異性不能相容猿之德靜以恆類仁讓孝慈居相愛食相先行有列飲有序不幸乖離則其鳴哀有難則內其柔弱者不踐稼蔬木實未熟相與視之謹既熟嘯呼㣥萃然後食衎衎焉山之小草木必環而行遂其植故猿之居山恆鬱然王孫之德躁以囂勃諍號呶唶唶彊彊雖㣥不相善也食相噬齧行無列飲無序乖離而不思有難推其柔弱者以免好踐稼蔬所過狼籍披攘木實未熟輒齕咬投注竊取人食皆知自實其嗛山之小草木必凌挫折挽使之瘁然後已故王孫之居山恆蒿然以是猿㣥衆則逐王孫王孫㣥衆亦齚猿猿棄去終不與抗然則物之甚可憎莫王孫若也余棄山間久見其趣如是作憎王孫云湘水之浟浟兮其上㣥山胡茲鬱而彼瘁兮善惡異居其間惡者王孫兮善者猿環行遂植兮止暴殘王孫兮甚可憎噫山之靈兮胡不賊旃跳踉叫囂兮衝目宣斷外以敗物兮內以爭㣥排鬬善類兮譁駭披紛盜取民食兮私己不分充嗛果腹兮驕傲歡欣嘉華美木兮碩而繁㣥披競齧兮枯株根毀成敗實兮更怒喧居民厭苦兮號穹旻王孫兮甚可憎噫山之靈兮胡獨不聞猿之仁兮受逐不校退優游兮惟德是效廉來同兮聖囚禹稷合兮凶誅㣥小遂兮君子違大人聚兮孽無餘善與惡不同鄉兮否泰既兆其盈虛伊細大之固然兮乃禍福之攸趨王孫兮甚可憎噫山之靈兮胡逸而居永州元和七年夏多火災日夜數十發少尚五六發過三月乃止八年夏又如之人咸無安處老弱燔死晨不爨暝不燭皆列坐屋上左右視罷不得休蓋類物為之者訛言相驚云有怪鳥莫實其狀山海經云章義之山有鳥如鶴一足赤文白喙其名曰畢方見則其邑有言為火若今火者其可謂言為歟而人有以鳥傳者其畢方歟遂邑中狀而圖之禳而磔之為之文而逐之后皇庇人兮敬授㣥材大施棟宇兮小蔽草萊各有攸宅兮時闔而開火炎為用兮化食生財胡今茲之怪戾兮日十爇而窮災朝儲清以聯邃兮夕蕩覆而為灰焚傷羸老兮炭死童孩叫號隳突兮戶駭人哀袒夫狂走兮忽往來鬱攸孽暴兮混合恢台民氣不舒兮僵踣顛頽休炊息燎兮仄伏煨煤門甍晦黑兮啓伺奸回若墜之天兮若生之鬼令行不訛兮國恐盍巳問之禹書畢方是祟嗟爾畢方兮胡肆其志皇亶聰明兮念此下地災皇所愛兮僇死無二幽形扇毒兮陰險詭異汝今不懲兮衆訴咸至皇斯震怒兮殄絶汝類祝融悔禍兮回祿屏氣太陰施威兮元冥行事汝雖赤其文隻其趾逞工衒巧莫救汝死黠知亟去兮愚乃止此高飛兮翺翔遠伏兮無傷海之南兮天之裔汝優游兮可卒歲皇不怒兮永汝世日之良兮今速逝急急如律令余病痞且悸謁醫視之曰唯伏神為宜明日買諸市烹而餌之病加甚召醫而尤其故醫求觀其滓曰吁盡老芋也彼鬻藥者欺子而獲售子之懵也而反尤於余不以過乎余戍然慚愾然憂推是類也以往則世之以芋自售而病乎人者衆矣又誰辨焉申以詞云伏神之神兮惟餌之良愈心舒肝兮魂平志康驅開滯結兮調護柔剛和寧悅懌兮復彼恆常休嘉訴合兮邪怪遁藏君子食之兮其樂揚揚余殆於理兮榮衛蹇極伏杯積塊兮悸不得息有醫道余兮求是以食往沽之市兮欣焉有得滌濯爨烹兮專恃爾力反增余疾兮昏憒憑塞余駭其狀兮往尤於醫徵滓以觀兮既笑而嘻曰子胡昧愚兮茲謂蹲鴟處身猥大兮善植墟卑受氣頑昏兮陰僻欹危纍積星紀兮以老為奇潛苞水土兮混雜蝝蚳不幸充腹兮唯痼之宜野夫忮害兮假是以欺刮肌刻貌兮觀者勿疑中虛以脆兮外澤而夷誤而為餌兮命或殆而今無以追兮後慎觀之嗚呼物固多僞兮知者蓋寡考之不良兮求福得禍書而為詞兮願寤來者零陵城西有螭室於江法曹史唐登浴其涯螭牽以入一夕浮水上吾聞凡山川必有神司之抑有是耶於是作訴螭投之江曰天明地幽孰主之兮壽善夭殤終何為兮堆山釃江司者誰兮突然為人使有知兮畏危慮害趨走祗兮父母孔愛妻子嘻兮出入公門不獲非兮浟浟湘流清且微兮陰幽洞石蓄怪螭兮胡濯茲熱卒無歸兮親戚叫號閭里思兮魂其安遊覲湘纍兮嗟爾怪螭害江湄兮游泳重瀾物莫威兮蟉形決目潛伺窺兮膏血是利私自肥兮歲既大旱澤莫施兮妖猾下民使顛危兮充心飽腹肆敖嬉兮洋洋往復流逶迤兮惟神高明胡縱斯兮蔑棄無辜逞怪姿兮胡不降罰肅川坻兮舟者欣欣遊者熙兮蒲魚浸用吉無疑兮牲牷玉帛人是依兮匪神之訴將安期兮神之有亡於是推兮投之北流心孔悲兮零陵之氓咸善游一日水暴甚有五六氓乘小船絶湘水中濟船破皆游其一氓盡力而不能尋常其侶曰汝善游最也今何後為曰吾腰千錢重是以後曰何不去之不應搖其首有頃益怠已濟者立岸上呼且號曰汝愚之甚蔽之甚身且死何以貨為又搖其首遂溺死吾哀之且若是得不有大貨之溺大氓者乎於是作哀溺吾哀溺者之死貨兮惟大氓之為憂泄濤鼓以風湧兮浩滉蕩而無舟不讓祿以辭富兮又旁窺而詭求手足亂而無如兮負重踰乎崇邱既浮頤而滅膂兮不欲釋利而離尤呼號者之莫救兮愈搖首以沈流髮披鬤以舞瀾兮魂倀倀而焉遊龜黿互進以爭食兮魚鮪族而為羞始貪贏以嗇厚兮終負禍而懷讎前既沒而後不知懲兮更攬取而無時休哀茲氓之蔽愚兮反賊己而從仇不量多以自諫兮姑指幸者而為謀夫人固靈於鳥魚兮胡昧罻而蒙鉤大者死大兮小者死小善游雖最兮卒以道夭與害偕行兮以死自繞推今而鑒古兮鮮克以保其生衣寶焚紂兮專利滅榮豺狼死而猶餓兮牛腹尸而不盈民既貿貿而無知兮故與彼咸諡為氓死者不足哀兮冀中人之為余再更噫咨海賈兮君胡以利易生而卒離其形大海蕩汨兮顛倒日月龍魚傾側兮神怪隳突滄茫無形兮往來遽卒陰陽開闔兮氛霧滃渤君不返兮逝恍惚舟航軒昂兮下上飄鼓騰趠嶢嵲兮萬里一覩崒入泓坳兮視天若畝奔螭出忭兮翔鵬振舞天吳九首兮更笑迭怒垂涎閃舌兮揮霍旁午君不返兮終為虜黑齒棧齴鱗文肌三角駢列耳離披反齗義牙踔嶔崖蛇首狶鬣虎豹皮㣥沒互出歡遨嬉臭腥百里霧雨瀰君不返兮以充饑弱水蓄縮其下不極投之必沈負羽無力鯨鯢疑畏淫淫嶷嶷君不返兮卒自賊怪石森立涵重淵高下迾置滔危顛崩濤搜疏剡戈鋋君不返兮砉沈顛其外大泊泙奫淪終古回薄旋天垠八方易位更錯陳君不返兮亂星辰東極傾海流下屬泯泯超忽紛蕩沃殆而一跌兮沸入湯谷舳艫霏解梢若木君不返兮魂焉薄海若嗇貨號風雷巨鼇頷首邱山頽猖狂震虩翻九垓君不返兮糜以摧咨海賈兮君胡樂出幽險而疾平夷恟駭愁苦而以忘其歸上黨易野恬以舒蹈蹂厚土堅無虞歧路脈布彌九區出無入有百貨俱周游傲睨神自如撞鐘擊鮮恣歡娛君不返兮欲誰須膠鬲得聖捐鹽魚范子去相安陶朱呂氏行賈南面孤宏羊心計登謀謨煮鹽大冶九卿居祿秩山委收國租賢智走諾爭下車逍遙縱傲世所趨君不返兮諡為愚咨海賈兮賈尚不可為而又海是圖死為險魄兮生為貪夫亦獨何樂哉歸來兮寧君軀齊景有嬖曰梁邱子同君不爭古號媚士君悲亦悲君喜亦喜曷賢不贊卒贊於此媚余所仇激贊有以梁邱之媚順心狎耳終不撓厥政不嫉反已晏子躬相梁邱不毀恣其為政政實允理時睹晏子食寡肉缺味愛其不飽告君使賜中心樂焉國用不墜後之嬖君罕或師是導君以諛聞正則忌讒賢協惡民蠧國嗚呼豈惟賢不逮古嬖亦莫類梁邱可思又况晏氏激贊梁邱心焉孔瘁霹靂琴者零陵湘水西震餘枯桐之為也始枯桐生石上說者言有蛟龍伏其窾一夕暴震為火之焚至旦乃已其餘硿然倒臥道上震旁之民稍柴薪之超道人聞之取以為三琴琴莫良於桐桐之良莫良於生石上石上之枯又加良焉火之餘又加良焉震之於火為異是琴也既良且異合為二美天下將不可載焉微道人天下之美幾喪余作贊辭識其越之左與右以著其事又益以序而為他傳辭曰惟湘之涯惟石之危龍伏之靈震焚之奇既良而異爰合其美超實為之贊者柳子以佛之為尊而尊是法嚴之於頂其為最勝宜也既尊而勝矣其為拔濟尤大塵飛而災去影及而福至睦州於是誠焉不疑礱石六觚其長半尋乃篆乃刻立之為福馬孺人之墓孺人之生奉佛道未嘗敢怠今既沒睦州又成其志擇最勝且尊之道文之於石以延其休則其生佛所得佛道宜無疑也贊曰世所尊兮又尊道勝無上兮以為寶拔大苦兮升至真靈合贊兮神而神駕元氣兮濟元津誰為友兮上品人德無已兮石無磷延永世兮奠坤垠靈受福兮公之勤始吾聞明皇帝在位靈昌郡得異馬於河西而莫知其形好事者涿人盧遵以其圖來示余其狀龍鱗虺尾拳毛環目肉鬣馬之靈怪有是耶居帝間為馬幾二十年從封禪郊藉鳴和鑾者數十事遇亂帝西幸馬至咸陽西入渭水化為龍泳去不知所終且其來也宜於時其去也存其神是全德也既睹其形不可以不贊靈和粹異孕至神兮倮尾童鬣疏紫鱗兮巍然特出瑞聖人兮理平和樂百禮陳兮鳴鑾在御大路遵兮世厖道悖還吾真兮哀鳴延首慕水濱兮沛焉潛泳旋奫淪兮淵居海遊靈無鄰兮出處孔時類至仁兮嗟爾衆類孰是倫兮進昏死亂阽厥身兮匪馬之慕吾誰親兮贊之斯圖宜世珍兮伊尹五就桀或疑曰湯之仁聞且見矣桀之不仁聞且見矣夫胡去就之亟也柳子曰惡是吾所以見伊尹之大者也彼伊尹聖人也聖人出於天下不夏商其心心乎生民而已曰孰能由吾言由吾言者為堯舜而吾生人堯舜人矣退而思曰湯誠仁其功遲桀誠不仁朝吾從而暮及於天下可也於是就桀桀果不可得反而從湯既而又思曰尚可十一乎使斯人蚤被其澤也又往就桀桀不可而又從湯以至於百一千一萬一卒不可乃相湯伐桀俾湯為堯舜而人為堯舜之人是吾所以見伊尹之大者也仁至於湯矣四去之不仁至於桀矣五就之大人之欲速其功如此不然湯桀之辨一恆人盡之矣又奚以憧憧聖人之足觀乎吾觀聖人之急生人莫若伊尹伊尹之大莫若於五就桀作伊尹五就桀贊聖有伊尹思德於民往歸湯之仁曰仁則仁矣非久不親退思其速之道宜夏是因就焉不可復反亳殷猶不忍其遲亟往以觀庶狂作聖一日勝殘至千萬冀一卒無其端五往不疲其心乃安遂升自陑黜桀尊湯遺民以完大人無形與道為偶道之為大為人父母大矣伊尹惟聖之首既得其仁猶病其久恆人所疑我之所大嗚呼遠哉志以為誨人不知懼惡可有為知之為美莫若去之非曰童昏昧昧勿思禍至後懼是誠不知君子之懼懼乎未始幾動乎微事遷乎理將言以思將行以止中決道符乃順而起起而獲禍君子不恥非道之愆非中之詭懼而為懼雖懼焉如君子不懼為懼之初憂可無乎無誰以寧子如不憂憂日以生憂不可常常則誰懌子常其憂乃小人戚敢問憂方吾將告子有聞不行有過不徙宜言不言不宜而煩宜退而勇不宜而恐中之誠懇過又不及憂之大方惟是焉急內不自得甚泰為憂省而不疚雖死優游所憂在道不在乎禍吉之先見乃可無過告子如斯守之勿墮今之世為人師者衆笑之舉世不師故道益離為人友者不以道而以利舉世無友故道益棄嗚呼生於是病矣歌以為針既以警己又以誡人不師如之何吾何以成不友如之何吾何以增吾欲從師可從者誰借有可從舉世笑之吾欲取友誰可取者借有可取中道或捨仲尼不生牙也久死二人可作懼吾不似似一作以中焉可師恥焉可友謹是二物用惕爾後道苟在焉傭丏為偶道之反是公侯以走內考諸古外考諸物師乎友乎敬爾不忽側不愧臥勒常患平努過直而力敗躍宜峻而勢生策仰收而暗揭掠左出而鋒輕啄倉皇而疾罨磔走歷走昔以開撐
