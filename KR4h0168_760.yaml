body:
  text: 元和初武陽公廉刺江西和惠多暇歎二林精舍之最佛書闕如以月俸家財經始大藏廬嶽師資坐閲貝教皆懷德於公也昭肅皇帝患僧繁濫詔省其居以嚴其人因是林藏毀經逸先帝即位許勝地復寺東林振焉僧行言立心至勤完集經教走丐歷歲克就無期大中十二年洪廣潭宣四鎮兵擾先帝以中丞韋公英果多知詔馳鎮舊地先德在人詠歌不忘江湖老叟有懷惠泣下者聞公至皆願縛賊出迎故公未至而人巳安才至而賊遂平皆如先帝之策闕涖訪舊事德績盡在獨經藏闕焉因召行言傾俸使復不一歲而藏成經備如初繼先志也受大和中鄉貢進士妙道闕三字難智窮歸心是崇敢闕三字心感而著事因而生有唐義成軍節度使檢校禮部尚書兼御史大夫西平公我尚書性闕二字繼祖風國重闕詔委旄鉞自臨雄鎮事理數行而能習武不威韜光匿耀政模造化信叶大時以闕十二字是以三州有和樂之化五載無造次之刑上下咸安中外悅服天明聰聽聞亦何闕一字押衙田伾等咸以闕一字運契符君臣際會職位皆重寄任匪輕持盈若虛惣無怠謙若居散恭如處間內迫奉公外寬從闕一字茲謂誠性自然風教被焉易獲其全斯所以分也未闕一字以報也遂僉議佛經有尊勝陀羅尼者功德宏廓道義幽元而能普濟生靈博救品物陰影才及莫大罪銷飛塵略沾福履將至欲以命工刻石當道建幢冀得惠風接吹白日回照輕飄遠景長及百靈仰其佛功用答殊造所望節幢等法幢同立比石齊堅仁壽等並長承時偕慶天照諴感人願必從卑誠共陳果遂其志凡曰慶幸無以過焉銖吳人會昌元年進士為蘇州鹺院官大唐咸通庚寅歲廬之佛寺曰明教有禪那僧文珦創轉關經藏成命銖記其事銖常學釋氏因録其義以喻之曰經曰佛滅度後像法存焉夫像似也俾迷者覩其像得其意乃曰經心也藏藏也如心之含藏萬法者也故曰一心生萬法萬法由一心其動靜弛張在我而已寧窮其義略舉其大斯藏也本於一心靈通無礙動用自在靜則萬法空寂動則三界彌綸虛偽唯心所造作其在斯乎周回八角角覺也佛以眼為八邪耳為八患鼻為八苦舌為八難回八邪為八覺回八患為八解脫回八苦為八安樂回八難為八王子指四八為三十二相由此八關返邪歸正成佛之境矣止則寂然無用引則轉而不窮動雖有聲靜乃無迹以此現相俾人歸依知佛之心體道之要使迷徒瞻禮自識根源移於身心可見微密迷者若悟知三乘妙旨未脫輪回一法正宗不離真性性而非性真何所真乃知三界本空十方一相相而無相知何所知如始當語言道斷心行起滅其藏貯修多羅教數千軸募金長者禪那弟子蘄州長史殿中侍御史上柱國王師貞特力營構果獲成就噫己丑歲屬徐方兵亂援軍屯集雖存根本幾失護持今則色相端嚴典教漸備所表法輪常轉心不動搖略諭因緣以示道俗云爾讚曰修多羅教函於藏輪周回八角正道斯陳動用一心為萬法因忘因無法得本歸真鐫於金石用導迷人約官水部員外郎歷滄州天平節度使徙宣武卒王鍔之子故德州刺史王稷在任有善政郡人愛之為李全略所殺家無遺類有男叔泰年五歲郡人宋忠獻潛收養之今巳成長臣察知其事忠獻已補軍職叔泰送歸其宗知古文宗時人伏蒙郎中殊恩賜及前件筆竊以趙國名毫遼東仙管曾進言於石室亦奏議於圓邱經阮籍而飛動稱神得王珣而形製方大妙合景純之讚奇標逸少之經利器莫先豈宜虛授某藝乏鴻彩膺此緑沈降自成麟翻將畫虎空懷得手之趣實多過眼之迷春蚓未成豐狐濫對喜並出圖而授驚逾入夢之徵將欲遺於子孫清白莫比更願藏之篋笥瑞應那同捧戴明恩伏增感激謹狀去疾字文醫侯官人元和十四年進士會昌中官蔡州刺史終雍管副使惟唐十二葉盛德如春雖幽無不被而獷有未臣帝曰苟非我武焉能庇人於是考龜策諧咨詢投干戈於苗扈之地極黎庶於塗炭之辰是師也以勝殘為心以除暴為主得周宣之薄伐非漢皇之黷武爾乃誓六師命吉甫鼓而出兮俯而取始天聲乍發闞若雷霆終聖澤旁流霈如甘雨既殲元惡不問其餘誠與之更始而待之如初簟食壺漿將爭先以邀路緇黃耆艾知弛負以寧居是以足蹈手舞怨釋憤攄洗心靈而沃若類草木之賁如始其聞金鼓之聲疑殺戮之謂及其蒙霑濡之賜衆乃欷歔以相慰曰豈圖汙俗猶軫聖心殷雲雷以作解與枯稿而為陰濟濟蒸徒一以貫乎睿旨禺禺噍類闕一字得滌其煩襟渥恩既溥幽憂爰泄愛離畢之時見覩燎原之焰滅始憑鼓怒信天步之不回終乃發生諒人情之大悅既而新厥政革其謨遂開儒風與文教載櫜越與燕弧正皇綱於寒暑變下國之榮枯夫如是莫不沐仁澤以愈愈詠恩波之侃侃方且觀濠梁之魚樂豈復比農人於歲旱元審開成時人河南府河陽太平鄉臨泉村鄭宏禮適妻以開成四年三月十四日昊天不祐終於長夜夫人祖諱海尊諱士安以元和十五年二月十七日殯於河南府濟源縣清廉鄉官橋村平原禮也其先隴西郡人也嘗觀懷洛之士公門惟積善琴瑟調和天資柔順常能克己以惠於人性自沖和母儀親戚有兄弟兩人兄從簡大和七年九月十日終于長夜弟道士元慶住奉仙觀夫人有四女幼小長女丞登三和娘子皆以形毀絶漿不食日月推移痛盡晝哭之深夫人忽自寢疾而未經旬遂終于開成四年歌變為哭傷嘆不期享年卌至開成四年己未歲四月壬子朔十日辛酉殯於河南府河陽縣太平鄉西沼村北卅五步高岡之前其地阜勢前引後從中之如堂安殯必固誰言有虧猶恐桑田變改年代不同若不標於貞石何可留於千載乃為志云其一曰憶念平生日曾為濟上人芳聲傳海內誰是不知聞其二曰死隔恩憐女悲闕四字空闕一字何處去聲聲堪斷腸其三曰葉落終歸本人生闕二字然泉臺空寂寞來路永無還宏慶開成中檢校太子庶子金州刺史兼御史中丞按吏部李侍郎乂碣文法師以皇唐永淳元年仲冬壬寅日卒於慈恩寺翻譯院有生五十一歲也後十日陪葬於樊川元奘法師塔亦起塔焉塔有院太和二年二月五日異時門人安國寺三教大德賜紫法師義林見先師舊塔摧遂唱其首率東西街僧之右者奏發舊塔起新塔功未半而疾作會其徒千人盡出常所服玩洎向來箕斂金帛命高足僧令檢俾卒其事明年七月十三日令檢奉行師言啓其故塔得全軀依西國法焚而瘞之其上起塔焉又明年十月齎行狀請宏慶撰其銘豫熟聞師之本末不能牢讓師姓尉遲諱基字宏道其先朔州人纍世以功名致爵祿先考宗松州都督伯父鄂國公國初有大勳力宏道身長六尺五寸性敏悟能屬文尢善于句讀凡經史皆一覽無遺三藏法師元奘者多聞第一見宏道頗加竦敬曰若得斯人傳授釋教則流行不竭矣因請於鄂公鄂公感其言奏報天子許之時年一十七既脫儒服披緇衣伏膺奘公未幾而冰寒於水矣以師先有儒學詞藻詔講譯佛經論卅餘部草疏義一百本大行於時謂之慈恩疏其餘崇飾佛像日持經戒瑞光感應者不可勝數嗟乎宏道其家世在朔漠宜以茹毛飲血鬬爭煞戮背義妄信為事今慕浮屠教苦節希聖冞入其奧與夫鄂公佐聖立國功成身退出于其類為一代賢人實稟間氣習俗不能染也明矣退為銘曰佳城之南兮面南山元奘法師兮葬其間基公既歿兮陪其後甲子一百兮四十九碣文移入兮本寺中曇景取信兮田舍翁義林高足兮曰令檢親承師言兮精誠感試具畚鍤兮發元堂全身不朽兮滿異香銘志分明兮是宏道齒白骨鮮兮無銷耗瑞雲甘雨兮晝濛濛神祇悉窣兮羅壽宮依教茶毗兮得舍利金瓶盛之兮埋厚地建塔其上兮高巍巍銘勒貞石兮無愧辭深谷為岸兮田為瀛此道寂然兮感則靈嘏字君錫莆田人開成三年進士纍官刑部郎中我元宗心崇至道化叶無為制神仙之妙曲作歌舞之新規被以衣裳盡法上清之物序其行綴乃從中禁而施原夫采金石之清音象蓬壺之勝溉俾樂工以交泰儼彩童而相對漓灑合節初聞六律之和搖曳動容宛似㣥仙之態爾其絳節回互霞袂飄揚或眄盼以不動或輕盈而欲翔八風韻肅清音思長引洞雲於丹墀之下颯天風於紫殿之旁懿乎樂洽人和曲含仙意雜絃管之繁節淡君臣之元思清淒滿聽無非沖穆之音颯沓盈庭盡是雲霄之事吾君所以凝清慮慕元風無更舊曲用纂成功既心將道合乃樂與仙同悅康平於有截延聖壽於無窮美矣哉調則沖虛音惟雅正於以臻逍遙之境於以暢恬和之性遂使俗以廉平人無紛競見天地之欣合致朝廷之清淨小臣忭而歌曰聖功成兮至樂修大道叶兮皇風流願揣侔於竹帛贊元化於鴻休次宗宰相宏靖子開成初為起居舍人纍遷考功員外郎知制誥出為澧明二州刺史卒右伏以中暑良時沐蘭令節王人乘驛初降於九霄內府頒衣遽霑于千里臣忝膺寄任未展涓埃節候每移尸曠增懼陛下殊私荐及寵賜不忘天書覩經緯之文麗服見裁縫之妙捧其珍玩價重於兼金賜以綵絲恩深於延算况寵周將校問及偏裨爭馳就日之誠益勵酬恩之節右伏以元律戒時祁寒應候王人傳詔御府頒衣伏惟皇帝陛下盛德御天至仁育物每念藩方之任屢加寵錫之恩臣績效未施塵忝茲久捧溫密之詔喜若朝天被輕纖之衣暖同就日况撫寒之問下及師人錫服之榮遍周戎校喜氣乍傳於封部陽和先及於荊衡爭馳戀闕之誠各勵酬恩之志右中使劉泰伸至伏奉敕書手詔宣慰臣及將吏僧道百姓等并賜臣手詔及冬衣兩副大將衣十副者清風戒寒元律將至未及嚴凝之候已霑輕暖之衣承寵命而載慙啓緘封而增感伏惟皇帝陛下至德御時深仁育物光武十行之詔每覩憂勤魏后五時之衣未為寵錫况臣叨榮漸久受賜彌多寒暄之節候驟移新舊之光華相委被服悉頒於御府裁縫僅度於私家挾纊之恩已周於列校維鵜之刺尢愧於微躬右件官明敏多才幹能有用嘗列班行之任亦專繁劇之司廣漢在蜀川之中最為大郡凋瘵之後為理甚難流庸自占者過九千家田業開闢者踰五百頃修兵甲則戎備斯足置什器則公用有餘事無不周去有遺美臣任當廉察備覩政能伏望聖恩特垂甄獎右件官稟性端方臨事果毅有清介之節擅文華之名操心不回居約可久臣去年有狀已具薦論纍月在京未蒙奬擢儻置之諫署或授以憲官視其為人必能稱職輒再具論奏伏望天恩俯賜裁酌謹奏右伏以前件官業尚儒學才通吏事言行無玷終始可觀有古人歲寒之心得君子時中之道所歷五郡去皆見思或在危疑之中能全名節或當徵發之際不擾疲人自理澧陽課績尢異得賦斂變通之法置郵館供待之資創立隄防修繕城洫事必可久政皆有經臣任忝宣風諳其履行若在郡無此實效豈敢輒有薦論伏望聖恩特加奬擢右件官植性謹和草泣事周敏詞賦中第篇什成名應物而精力有餘處煩而變通靡滯所委公事案牘雖多巨細無遺剖斷尢速領刑獄之重人自不寃頒廉察之條法皆可久準敕文使下檢校官凡至五品便得賜緋今陸暢前任祕書丞已是登朝五品即頗與格文相當又職事修舉合當甄奬臣先已有狀未蒙允許今輒敢再具論奏伏望天恩特賜章服右伏以勳著王室者則銘於景鐘功及生人者則刊於樂石故扶風存必拜之地峴山有墮淚之思固有舊章蓋無餘美竊以李某纘慶相門伏膺儒業得郤縠詩書之學兼祭遵儒雅之風自授任坤方鎮安全蜀亭戍多警災旱相仍外有定戎之功則城柵相望內有繕完之備則器甲維新強寇將罷其東漁鄰敵自止其南牧况令行屬郡威肅連營來暮之謠已章於昔歲去思之美無謝於古人今合境同詞諸郡獻狀雖黃霸入用寵方盛於登賢而鄧侯不留情猶深於愛樹臣謬當交代備聞政能願嗟臥轍之情特允紀功之請溫字宏育京兆人年十一舉兩經及第以書判拔萃補校書郎纍遷尚書右丞出為陜虢觀察使武宗立召拜吏部侍郎出為宣歙觀察使卒年五十八贈工部尚書諡曰孝臣伏見今月五日敕將作監等修葺太廟稽遲各已罰俸特命親臣專知繕理有以見陛下奉宗孝思之至也臣聞吏舉其職國家所以治事歸於正朝廷所以尊夫設制度立官司事存典故國有經費而最重者奉宗廟也伏以太廟當修詔下踰月有司弛墮曾不加誡宜黜慢官以懲不恪之罪擇可任者責以繕完之功此則事歸於正吏舉其職也而聖思不勞百職不曠今慢官不恪止於罰俸宗廟所切便委內臣是許百司之官公然廢職以宗廟之重為陛下所私㣥官有司便同委棄此臣竊為聖朝惜此事也事關宗廟皆書史策苟非舊典不可率然伏乞更下詔書得委所司營繕則制度不紊官業交修德如三皇止稱皇功如五帝止稱帝徽號之來乃聖王之末事今歲三川水災江淮旱歉恐非崇飾徽稱之時秬字降之國子監四門助教詹從子開成中進士劉從諫鎮澤潞表佐幕府其子稹拒命上表斥損時政或誣秬為之詔流崖州賜死月日毆陽秬移書郎中閣下夫百女蕩一女貞蕩者紛然為貞者笑脫使貞者始貞而後蕩奈百人之笑一人耶嗚呼一之笑百百者有比恥於一人而已百之笑一一者舉目無比其如恥何伏唯閣下少垂聽覽秬在閩中時聞閣下之名十年矣及來京師又逾一紀嘗期閣下不出則若南陽劉子驥會稽謝慶緒出則如蜀孔明殷傅説不然亦如賈誼朱雲之徒庶幾於直道也今皇帝起閣下為郎閣下俁俁而來秬謂斯來也嚮數年有見必言有聞必論日復一日僅三百日矣豈九牧之民皆治矣無有術耶四夷之患皆平矣無有策耶天下之無賢者不可舉耶天下之無幸者不可黜耶天下之無贓者不可劾耶天下之無寃者不可雪耶天下之無屈者不可伸耶天下之無驕者不可誡耶既無所聞又無所見則樂堯舜之道讀周孔之書劉驎之謝敷斯人也閣下亦斯人也豈徒鼓動以朝廊餐而退是何前倨而後恭若彼始貞而後蕩如此且一之笑百雖有比也正今百人之反笑矣閣下欲何比焉夫名利之心不可卷正直之心亦不可轉秬謂閣下今之為不及昔時不為明矣且逢萌不挂冠孰有萌耶孫楚不潄石孰有楚耶閣下始心為直苟在為郎國家有明經進士史傳諸科孰不郎也後達者雖在閣下之左先達者雖在閣下之右秬所謂為郎不若不為蓋悲閣下身未死而名已滅雖然尚有可復之計何者閣下有所見勿惜其位而言有所聞勿顧其身而論論或不行言或不用則乞骸歸去斯謂可復之計也已矣吳越勝景山川如繡鱸鱠蓴羹放歌長嘯夫如是永為陸司勳庶幾乎不朽伏維念之秬再拜琮字禮玉第進士武宗朝以中書侍郎同中書門下平章事遷門下侍郎兼禮部尚書無功罷為太子賓客分司卒伊圓光之未呈觀列象之繁星忽升輪以委照齊掩縟而韜精天宇無雲意姮娥之可覩金波出海覺婺女之迷明爾其兔影高輝榆光潛靄沖融者寥落或存隱映者蒼茫自昧仰著明而下分融朗驚有爛而全迷光大美矣夫星沈四裔月麗中央以合璧之華彩掃連珠之衆光有北微分於辰極維南屢失於昊蒼奕奕三台既慙容於出沒熒熒五緯亦具體而微茫時則俯燭地隅斜臨海嶠寫碧落以增麗拂金風而引耀使占蜀國當曖昧而何知賢聚㯋川豈低昂而自照的的悠悠蟾孤桂秋離離兮弄影如晦皎皎兮澄明不流萬家盈手之時望女牛而才見千里同心之際美烏鵲而追遊且樂彼無私失乎躔次焜煌河鼓羃歷天駟初朣朧出地似懷德以增輝忽燦爛經天知畏威而有自既而夜久凝徹時無埃氛銀華炫晃以將落珠彩蕭疏而掩㣥且共歎於陰靈因悲鵲化如欲觀其分野豈辨天文儼若咸賓稀然且集知至明之難競故不耀而相襲則水朝宗未足以為喻火就燥孰云其可及吐皓魄以流空掩繁光而載戢月麗天而配陽雪抱陰而體剛輪合太虛類呈祥於往漢尺盈平地亦表瑞於我唐清輝洞照皓質練張配金精而可久稟水德而為常月吐危峯自掩瑤階之迹雪凝平野誰分玉兔之光高卑交映靜動有方一則向晦而引曜一則候明而昭彰同聖人之潔白類君子之行藏俯而察之謂履玉山之玉遠而望也謂覩燭龍之燭影能相扶德且不孤朣朧相映若有若無虧盈足為物鑒朴素可與道俱夜久彌明鵲繞林而就侶室虛生白人味道以自如當其雲卷天高氛銷鏡朗曠碧霄明媚之色失白間鳥飛舞之狀臨北堂而可鑒曳穿履以遐望娟娟若晝高臨舊井之中淅淅驚風疑落孤松之上光臨皓璧氣引凝寒混金波而曜潘室交素彩而鄙齊紈入秦臺且不慙於清鏡彈楚曲寧有愧於幽蘭懿夫夜已深兮月猶在雪未消兮夜將改照耀冰壺之質掩映瓊林之彩月之德也明而升雪之體也白已凝圓虛色徹柔祇氣澄故得二美相貫兩氣含宏謝莊玩而成詠袁安寢而莫興原夫象在於上形成於下德無不施物無不假比同塵之叶美異投珠而見舍倘委照以無私願不遺於微者漢公字用乂虢州宏農人大和八年進士纍拜荊南節度使召為工部尚書宣宗朝同州刺史更宣武天平兩節度使卒太師魯公忠孝全德儀刑古今存道沒身煥乎國史文學之外尢工隸書盡鍾繇之精能極逸少之楷則頃因左宦曾牧茲郡才大事簡居多餘間録干祿字樣鐫於貞石仍許傳本示諸後生一二工人用為衣食業晝夜不息刓缺遂多親姪禺頃牧天台懼將磨滅欲以文字移於他石資用且乏不能克終漢公謬憩棠陰獲覩墨妙得以餘俸成禺之意自看摹勒不差纖毫庶筆蹤傳於永永時開成四年六月草九日千里字鵠舉太和中進士官國子博士終高州刺史古之序班位列爵祿非獨以理萬民總百事也用以別白賢不肖堯為君舜為相其下有共鯀焉成王為君周公為相其下有管蔡焉舜周公之貴非幸也宜也共鯀管蔡之殛放非不幸也宜也故賢者宜進之雖已貴益其祿厚其爵不為幸不肖者宜退之雖已賤奪其廩削其秩不為歉由是人用自勵遷善去惡強奮自篤後代衰微升於上者不必賢沈於下者不必愚得不必功失不必過賢者知其善不足恃恥比肩而趨故賢未嘗進不肖者知其惡不果棄惟奮臂而逞故不肖未嘗退有賢者退人雖心知之卒無奈何且曰非人也命也有不肖者進人雖心知之又無可奈何亦曰非人也命也以是善不勸而惡不悛率曰付諸命而已矣果如是聖人所謂仁義忠信者何足道哉姑徵其有命無命耳悲夫斯後代之不可復古豈不由是也開成三年春豫自海上北徙舟行次洞庭之陽有風甚急繫船野浦下三日遇二三子號進士者以六骰雙雙為戲更投局上以數多少為進身職官之差數豐貴而約賤卒局座客有為尉掾而止者有貴為相臣將臣者有連得美名而後不振者有始甚微而歘升於上位者大凡得失酷似前所謂不繫賢不肖但卜其偶不偶耳達人以生死為勞息萬物為一馬果如是吾今之貴者安知其不果賤哉彼真為貴者乃數年之榮耳吾今貴者亦數刻之樂耳雖久促稍異其歸於偶也同列禦寇敘穆天子夢遊事近者沈拾遺述枕中事彼皆異類微物且猶竊爵位以加人或一瞬為數十歲吾果斯人也又安知數刻之樂果不及數年之榮耶因條所置進身職官遷黜之目為骰子選格序有進士韋滂者自南海邀趙氏而來十九歲為余妾余以鬢髮蒼黃倦於遊從將為天水之別尚有數秋之期縱京洛風塵亦其志也趙屢對余澘然恨恨者未得偕行即泛輕舟暫為南北之夢歌陳所契詩以寄情凡天地之氣煦嫗乎春曦彤乎夏淒乎秋而冽乎冬楚之南當冬而且曦燕之北當夏而且冽是皆不得氣之中正人之百骸上陽而下陰陽戒於焮故膏盲欲寒陰戒於溺故腎脅欲燠人之外好欲軒冕文綵以為榮似若動且陽焉人之內好欲寡慮恬默以為泰似若靜且陰焉其門外欲肥馬大車以為熱者其室內欲虛堂廣厦以為清者果反是必為災且妖且病且亂且窮矣天地之性當夏而洌當冬而曦其歲時惡人之百骸上陽而不能寒下陰而不能煦其神瘵外飾文采不能動且榮而必慊其心參內思恬默不能靜且泰而必汨其志亂外門淒淒而寒者內室彤彤而熱者其士窮豫三年夏待罪於廬陵其環堵所棲者率用竹以結其四周植者為柱楣撑者為榱桷破者為霤削者為障臼者為樞篾者為繩絡而籠土者為級橫而格空者為梁方大暑火烘爆霤坼壤若墜於爐若燎於原舌呀而不能持支墮而不自運赫赫爞爞如列千萬炬於室內視其門即寂寥虛閴若清秋之山焉若寒浦之波焉豫乃知嚮所謂天地之氣人之百骸與其心形之內外居室之寒燠反是果為災且妖且病且亂且窮也今豫方窮不能奮果窮也其處於是亦宜矣天地之氣不能易者也鄒子有吹律之變人之生死不可制者也俞扁有針砭之術是二者尢不可革且有道而得之今豫室之曦豫門之寒豫亦姑思其治之之道將爇其廬而斬其工竹室其能永永以爍豫書其詞於壁世之所以為達者貴爵富祿威刑不勝其用珠玉不勝其計耳熱聲口飫味目厭色斯所謂常情之大欲也世所以為窮者秩不足以庇身祿不足以充用侮不能威辱不能刑聲色不足於耳目滋味不甘於口舌斯所謂常情之大不欲也然而聖人汲汲於祿仕者豈為是耶曰非也聖人為人者也恆人為己者也聖人負其資得其地逢其時有其祿然後因其鎡基流其德澤猶水之居高者決而溉之其浸必廣聖人之所以為榮者導人於仁誼然後使千萬年載其烈光為巍巍之德功以浹於生人者也恆人之為已者期於厚祿貴位位以私尊祿以私富益尊而愈驕益富而愈汰以淫快一日之欲才放肆於氣未絶之間者也聖人有其時有其位行其道以及於人無其時無其位奉其道以自飾故聖人進不為榮退不為戚而常得其道恆人幸其時竊其位恣其所為竭人以自足無其時失其位任其愚以自困故恆人進以為己榮退以為己辱而常失其道孔子曰鳳鳥不至河不出圖吾已矣夫孔子嘆行已之道足以致是而時王不用己之道道無所施非嘆其身食不方丈衣不文繡也恆人之所悲不達者率曰吾妻不能羅襦吾兒不能肉食耳豈常少及於外物哉聖人以德澤流於人雖九命崇錫不以為厚以其所賞果當外其身而公於天下非已幸也恆人無毫毛以裨於人苟幸得祿仕即逸豫以自怡以竊取偷得為大黠其所得幸也孔顏聖賢也豈嘗聞伐樹瓢飲以為已辱哉姬旦亦聖人也豈嘗聞受封攝理以為已幸哉是知聖人之樂也內而恆人之樂也外內故常有餘外故常不足有餘故推於人不足故取於人有道之人雖鹿裘帶索而人不鄙之者取其內而忘其外也豪民俠士紫衣金鈎而人不貴之者文飾於外也若然者富貴文飾於外也彼之所以仁誼者質充於內也西子不華嫫母錦縠是不能易其美惡後之君子窮於時者當思負其內以自篤無以其外而諂人達於時者當思勉其內以自飾無以其外而驕人苟如是庶幾乎知道矣渾字用晦丹陽人故相圉師之後太和六年進士第當塗太平二縣令以病免起潤州司馬大中三年為監察御史歷虞部員外郎睦郢二州刺史余丱歲業詩長不知難雖志有所尚而才無可觀大中三年守監察御史抱疾不任朝謁堅乞東歸明年少間端居多暇因編集新舊五百篇置於几案間聊用自適非求知之志也時庚午歲三月十日於丁卯澗村舍手寫此本
