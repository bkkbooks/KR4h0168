front:
  text: 全唐文欽定全唐文卷七百六十京初為僧令狐楚鎮滑臺勸之學登進士第官御史歷澧撫饒三州刺史咸通中拜嶺南西道節度使以貪婪為下所逐貶死崖州
  hash: sha256:b987f785d9c3649734740c1cf750b6c765b0ef3c89846aea6d7750d8f467fb9a
