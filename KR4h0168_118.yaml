front:
  text: 全唐文欽定全唐文卷一百十八帝諱重貴高祖從子唐天祐十一年生為高祖所愛以為子天福三年授開封尹封鄭王六年授廣晉尹封齊王七年六月即位開運三年契丹遷帝於黃龍府降封負義侯後徙建州居塞北凡十八年在位五年年五十一
  hash: sha256:46091352fb2102927f7ce5fe5b6079f511d0e414a300747c224bf52e7b0a6160
  markers:
  - {type: head, offset: 13, content: 晉少帝, id: KR4h0168_NFKB_118-h1, level: 1}
body:
  text: 非制書忽忘實以朔方重地蕃部窺邊非卿雄名何以彈壓比欲移卿內地受代亦須奇才宣王講武逐獫狁於太原漢帝出師走胸奴於瀚海是知蠻夷猾夏不能絶之於古今戎狄無厭不能拘之以信義先皇帝昔當草昧方在龍潛未登鄗邑之壇始有晉陽之難契丹主徑驅蕃部直抵并郊遂解重圍助成大統我之興也彼有力焉於是邀之以鬼神申之以盟誓載諸冊傳厥子孫爾後常念前因每思厚報減宮闈之服玩罄府藏之珠珍供億無時道塗相望而契丹貪殘滋甚驕縱異常通使命於江淮徵貢輸於郡國包藏既久姦譎漸萌既而輿議喧譁羣情憤激軍民扼腕中外同辭請興貔虎之師以遏豺狼之患先皇帝重其信誓篤以初終降萬乘之尊禮不義之虜耗中原之力奉無巳之求逮於纘受丕圖虔承顧命每欲息民繼好敢忘屈巳從人所以厚禮卑辭以隆其意推心置腹以示其誠其如鴆毒潛深獸心難革乘我歉歲伐豫大喪平視中原竊窺神器朕實不德民罹其殃愧悼增深寤寐興嘆向者躬提黃鉞親指靈旗駐於甘泉自春徂夏賴祖宗垂慶天地儲休猛將如雲謀臣若雨士百其勇人一其心寸鏃不遺狂戎自潰氛霾少息師旅凱旋今則漸入秋深慮為邊患朕以志平寇難不敢荒寧將期親率全師恭行天討庶幾一舉永靜三邊罔辭櫛沐之勞用拯生靈之患得不精求將帥慎柬偏裨冀成破竹之功以殄折膠之寇爰於剛日乃降命書順國軍節度鎮深趙等州觀察處置幽州道行營副招討等使特進檢校太師兼中書令行真定尹駙馬都尉杜重威地居戚里神授戎韜久服金革之勞纍濟艱難之運虎牢晝閉一麾而蟊賊自消河朔未寧再駕而氛妖繼息戡定之業溢於鼎鐘天平軍節度鄆齊棣等州觀察處置兼管內河隄等使光祿大夫檢校太尉平章事張從思清明可鑑忠正無邪夙懷刺虎之謀早列濯龍之籍當襄陽之役克成監護之勳及北虜之來實賴籓籬之固器業之用可謂縱橫西京留守起復檢校太尉兼侍中行河南尹景延廣文武全才雲龍際會指經綸於掌內藏甲馬於胸中久權七萃之師繼委十連之帥軍民畏服畿甸肅清左右之勞書於盟府武寧軍節度徐宿等州觀察處置等使開府儀同三司檢校太師兼侍中趙在禮河嶽鍾靈松筠植性授玉鈐之祕略得金版之沈機輔翼數朝周旋重鎮述職而必先九牧事君而唯盡一心尊奬之功光乎史冊建雄軍節度晉慈隰等州觀察處置等使特進檢校太師平章事安叔干衆推武庫素曉陳圖疾惡如讐見義思勇觴酒豆肉無虧撫士之心尺籍伍符盡得總戎之訣軍旅之任實契僉諧前泰寧軍節度亠兊沂密等州觀察處置等使特進檢校太師平章事安審信久處腹心早攀鱗翼倜儻乃萬夫之長驍雄真六郡之豪燕頷虎頭咸仰將軍之相牙璋犀節纍持方伯之權英特之名播於中外河中護國軍節度管內觀察處置等使開府儀同三司檢校太師平章事安審琦嚴明無翳寬自居善知奇正之謀備熟孤虛之法首赴風雲之會昔同帶礪之盟纍殿藩垣常堅夾輔連帥之重倚若長城河陽三城節度孟懷等州觀察處置管內河隄等使青州行營副都部署特進檢校太師符彥卿惟爾先臣實為名將世襲弓裘之慶門傳忠孝之規西漢三雄徒稱傑出東京七校乃為時生竭盡之心貫於金石義成軍節度滑濮等州觀察處置管內河隄等使北面行營馬步都虞開府儀同三司檢校太師皇甫遇劒敵萬人力摧九虎赤羽若日蒲大夫之英風快馬如龍曹景宗之意氣繼承重寄必竭純誠義烈之稱播於寰海北面行營馬部都排陳使兼馬軍都指揮使特進檢校太保右神武統軍張彥澤猛若關張氣吞荊聶荐膺委寄每著勤勞鳴鏑離弦既得吟猿之妙青萍出匣久彰斷兕之名營陳之閒皆推果毅橫海軍節度滄景德等州觀察處置管內河隄等使幽州道行營右廂排陳使特進檢校太師王延裔鬼谷傳書神龜授印委鎮臨於滄海賴控扼於邊陲繕甲治兵暗蓄摧凶之計深溝高壘不移持重之心捍禦之謀斷於胸臆保義軍節度陝虢等州觀察處置等使特進檢校太尉宋彥筠威惠兼著膽氣無儔纍佐戎權善貞師律千軍萬馬憚陳慶之雄名三令五申得孫武之戰術將帥之選皆謂當仁前懷德軍節度管內觀察處置等使光祿大夫檢校太傅田武早從戎伍備歷艱難安邊展頗牧之才制勝合韓吳之法向者仗其舊德委以邊藩頗資外禦之功實有分憂之績忠貞之節雅叶柬求北面行營步軍都排陳使兼步軍都指揮使特進檢校太保左神武統軍潘環幕府書勳師干著效攻城野戰獨麾鄭國之旗陷陳先登幾獲魚門之胄洎分環衛彌見公忠兵革之時所宜登用而皆位崇侯伯任重土茅俱為社稷之臣悉是棟梁之具或推忠徇義或報國忘家常堅翼戴之心夙蘊澄清之志朕所以告於宗廟質以蓍龜授之以征鼙付之以蕭鈇但以狂戎侵掠生聚虔劉既貽中國之羞抑亦人臣之恥爾等上則承先皇顧託輔豫沖人次則副朝廷倚毗委之重任所宜同德比義勠力齊心各竭乃誠共安國步功業可以不朽富貴可以無窮況今芻粟俱充士卒咸憤旌旗萬隊甲馬千羣呼吸則山嶽蕩搖號令則乾坤震動以此制敵何敵不摧以此攻城何城不克竚期獻俘清廟懸首素旗同集大功永清四海於戲周王任吉甫南仲乃懾戎夷漢帝任去病衛青遂空沙漠今吾命帥皆謂得人勉立異勳速平多難無令數子獨擅前功凡我股肱當體朕意杜重威充都招討使張從思充兵馬都監景延廣充馬步軍都排陳使趙在禮充馬步軍都虞安叔干充馬步軍左排陳使安審信充馬步軍右排陳使安審琦充馬步軍都指揮使符彥卿充馬軍左都指揮使皇甫遇充馬軍右都指揮使張彥澤充馬軍排陳使王延裔充步軍左都指揮使宋彥筠充步軍右都指揮使田武充步軍左廂排陳使潘環充步軍右廂排陳使襄州城內百姓等久經圍閉例各饑貧宜示頒宣用明恩渥大戶各賜粟二石小戶各賜粟一石宜令襄州以見在數充叛逆之臣必行於討伐凋傷之俗宜示於撫綏一昨逆賊安從進不戒滿盈輒謀違背占據城壘虐害人民元凶巳就於嚴誅比屋宜加於霈澤俾令蘇息用示軫傷應在城人戶除巳行賑貸外特放今年秋來年夏城內物業上租稅其城外下營寨處或有砍伐却桑柘及毀拆却屋舍處特與除放今年來年二月合係租稅其管內諸縣人戶等被安從進數年誅剝多是貧寒應天福七年夏稅巳前諸色殘缺及沿徵錢物并公私債負等並與放除朕以恭承先旨尊奉北朝無事不隨有求皆應竭國家之財用務蕃漢之歡和豈謂貪殘終隳信義直驅戎虜深犯封疆如是憑陵安能俯就顧師徒之憤惋念生聚之凋傷頃議親征用平醜類蓋救驚騷之患寧辭跋涉之勞取此月十三日躬御六師北征雜虜指期旦夕悉蕩氛霾凡爾百寮當體朕意楊光遠隨幕賓從等久在樽罍比資參佐當光遠始謀逆節未嘗聞拯救之言及楊承勳決意歸明又不是贊成之數但思朋附悉合誅夷尚示寬恩俾從遠竄麟流威州節度掌書紀任邈流原州觀察支使徐晏流武州縱逢恩赦不在放還之限向者朝廷無事經費尚多今則師旅方興支贍尤廣必資國力以濟軍須近以四海災傷頻年饑饉賦租減少管榷虧懸帑藏不充公私重困今歲三時不害百穀用成所在流民漸聞歸業商旅之人稍衆山澤之利咸通郡邑徵科自然容易務場課額必有增盈較量之閒斷可知矣牧宰之任選擢非輕至於阜俗康民豐財益國乃為本職固合用心苟能一一躬親孜孜臨蒞必絶滯凝之事兼除僥幸之門副我憂勤顯爾政績將求課最須設科條況藩侯郡守等皆是良臣各膺重委盡傾誠款以奉國朝式當倚注之時宜示勸懲之道應天下諸州各以係省錢穀秋夏徵科為帳籍一季一奏一年賦稅及限更委在任一年次年又不稽逋聽三周年為滿三年皆得辦事即與別議陟遷如或才到任所課績不前亦當即時罷替其閒災沴之地須明具敷陳審其虛真別有處分於戲朕纘承大業于茲三年虔奉丕基不敢失墜兢兢業業若履春冰小信未孚咎徵斯降旱蝗相繼連歲為災兵革未寧四方多事下慚黔首仰愧蒼穹所賴將相公卿元戎郡守或先朝宿舊或當代英賢送往事居始終如一分憂共治誠節彌堅倚賴既深傾輸亦至必能為國盡忠臨事公勤不更假於指蹤固自知其陳力凡百有位宜體朕懷明經童子之科前代所設蓋期取士良謂通規爰自近年暫從停廢損益之機未見牢籠之義全虧將闡斯文宜依舊貫庶臻至理用廣旁求其明經童子二科今後復置朕虔承顧命獲嗣丕基常懼顛危不克負荷宵分日昃罔敢怠荒夕惕晨興每懷祗畏但以恩信未著德教未敷理道不明咎徵斯至向者頻年災沴稼穡不登萬姓饑荒道殣相望上天垂譴涼德所招仍屬干戈尚興邊陲多事倉廩不足則輟人之餱食帑庫不足則率人之資財兵士不足則取人之中丁戰騎不足則假人之乘馬雖事不獲已而理將若何訪聞差去使臣殊乖體認不能敦於勉諭而乃臨以威刑自有所聞益深愧悼旋屬守臣叛命戎虜犯邊致使甲兵不暇休息軍旅有戰征之苦人民有飛挽之勞疲瘵未蘇科徭尚急言念於此寢食何安得不省過興懷側身罪巳載深減損思召和平所宜去無用之資罷不急之務棄華取實惜費省功一則符先帝恭儉之規一則慕前王朴素之德向者造作軍器破用稍多但取堅剛不須華靡今後作坊製造器械不得更用金銀裝飾比於遊畋素非所好凡諸服御尤欲去奢應天下州府不得以珍寶玩好及鷹犬為貢在昔聖帝明君無非惡衣菲食況豫薄德所合恭行今後大官常膳減去多品衣服帷帳務去華飾在禦寒溫而巳峻宇雕墻昔人攸誡玉杯象箸前代所非今後凡有營繕之處丹堊雕鏤不得過度宮闈之內有非理費用一切禁止於戲繼聖承祧握樞臨極昧於至道若履春冰屬以天災流行國步多梗因時致懼引咎推誠期於將來庶幾有補更賴王公將相貴戚豪宗各啓乃心率繇茲道共臻富庶以致康寧凡百臣寮宜體朕意朕以蕃寇未平邊陲多事選求將帥徵發師徒北面屯軍汾河守禦即日雖無侵軼亦須廣設隄防朕將親率虎貔躬擐甲胄俟聞南牧即便北征不須先定日辰別有曉諭所有供億支用宜令三司預自指揮令隨從諸司職員並宜照常備行諸侯不得朝覲亦不得以進獻供羣借斂吏民凡百臣寮當體是意理冤申屈勞績可嘉內職外官課最無異苟能雪活何吝甄酬宜先録公文直具奏聞或實官滿到闕投狀無致隔年庶絶濫訛用分真僞宜依卿才略耀奇規模冠俗荀息之忠貞自許翁歸之文武兼全鷹瞵鶚立之姿折衝萬里夏屋春臺之煦化洽一隅而又尊奬誠深貢輸禮備是於剛日乃降明恩宜旌命世之英俾峻真王之秩爰旌亮節仍進崇階可檢校太保持節元菟州都督上柱國充大義軍使仍封高麗國王今命使光祿卿范匡政使副太子洗馬張季凝等往彼宣賜官告敕牒國信物等具如別録敕賜高麗國王竹冊法物等竹冊一副八十紫絲絛聯紅錦裝背冊匣一具黑漆銀含陵金銅鎖鑰二副攀環紅錦托裏襯冊文兩幅黃綾夾帕一條蓋冊匣三副黃綾夾帕一條蓋冊匣三副黃絹油夾帕一條舉冊匣熟紫絲板二條絡冊牀熟紫絲油畫檐牀一張銀裏腳角竿頭金柏木冊案一面紫綾案褥一領夾裙襈全行事紫綾席褥一副襯冊牀紫綾一副興王舊地原廟所存載懷瞻奉之心允屬循良之吏以爾蒞官有政晉人美之假其省銜許留周歲更圖盡瘁以稱陟明可檢校工部員外郎仍量留一年自冬徂春少雨雪掩骼埋胔必契陰靈將召純和宜藏暴露宜令所在長吏依此掩藏仍付所司留守之任委寄非輕凡降絲綸宜同將相起今後除授留守宜降麻制仍付所司朕自居藩邸每務躬親稟先帝之聖謨見萬方之庶政洎登宸極思致時康屬蝗旱為災耕桑失業顧惟寡昧深軫焦勞舉一食思稼穡之艱難行一事期黎民之蘇息為先清朝名士朱邸舊寮深窮蠧政之源備得養民之本況藩侯郡牧察俗觀風必能副沖人委仗之心駐疲俗逋逃之足明行條制俾絶侵漁使稅額無虧戶口獲濟斯為急務要在頒行便可散下諸州嚴誡主者盡令遵守無致因循遍繄惠養之功共致升平之運仍付所司天地宗廟社稷及諸祠祭等訪聞所司承管多不精潔宜令三司預支一年禮料物色於太廟置庫收貯差宗正丞主掌委監察御史監當祭器祭服等未備者修製朕自臨寰宇思致和平以四海為家慮一物失所每念狴牢之內或多枉橈之人屬此炎蒸倍加軫憫冀絶滯淹之嘆用資欽恤之仁應三京鄴都及諸道州府見禁罪人等宜令逐處長吏嚴切指揮本推司及委本所判官疾速結絶斷遣不得淹延及致冤濫仍付所司吏部巳判成選人等訪聞人數絶多闕員甚少頗為淹注例是饑貧宜推振滯之恩用廣進身之路諸州府判掾見有員闕不少其見在黃衣選人等宜令注授前件官除三京鄴都掾曹外其餘並許注擬秩滿無遺闕者五選六選減一選七選八選減兩選九選十選減三選內有超資者再入官日即依本資敘理河東管內及鄜延涇邠秦隴鳳等州管內闕員不少選人以家私不便多不服官宜令所司不拘超折注擬仍俟秩滿無遺闕者五選六選減三選七選八選減四選再入官日却依本資敘理所注前項州縣官等宜令銓司依判成次第注擬切在公當不得阿私仍不許選人通關仍付所司王者約法之義比在防非將致一平所期共守昨以憲司舉職有國舊規宋彥筠尋悔愆尤理可矜恕念茲勳績深軫朕懷特開宥過之恩庶叶匿瑕之道凡百有位宜勵乃誠所犯科條並釋放李鼎方居憲府合稟朝章豈可八月中喪妻十月後供狀欺公冒寵以死為生既彰罔上之愆難處觸邪之地止停見任尚示寬恩宜敕停見任故淄州刺史翟進宗不穀不德營兵叛豫陷爾厲階力屈遇害念茲忠瘁實用衋傷蜀主恕其黃權魯莊誄其卜國皆非罪也吾將贈之用慰貞魂宜頒漏澤可贈左武衛上將軍翰林學士與中書舍人分為兩制各置六員偶自近年權停內署況司詔命必在深嚴將使從宜却仍舊貫宜復置翰林學士院銓總之司提舉是務時臨注擬尤在精詳宜令三銓子細看驗關牒或稍涉差謬即據理科條將澄刈楚之風用誡侮文之吏淹延刑獄實啓幸門稽滯瘞埋尤傷和氣追呼既廣勞擾斯煩檢驗取裁停駐為弊宜令凡有禁繫不得分外追人百姓死亡亦仰及時葬送既無重擾式叶化風仍付所司陳延福位居牧守首被訟論移市肆以創回圖巳彰生事假役夫而科採捕尤驗擾人但以稱贍本州云承纍政雖除姦革弊全昧經心而案罪計贓未明入巳聊從懲罰用顯含洪宜罰征馬十匹放張嗣宗巳招過犯斷處徒刑雖定徵銅更難居任既聞除替便合稟承乃敢拒違益彰狡惡須加竄謫俾省尤宜配流商州
