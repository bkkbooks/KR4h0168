front:
  text: 全唐文欽定全唐文卷四百五十三臯字城武京兆萬年人大歷初以建陵挽郎調補華州參軍纍授殿中侍御史知隴州行營留後事朱泚反遣家僮蘇玉持詔以臯為御史中丞臯斬玉及其部將牛雲光以徇詔以臯為御史大夫隴州刺史置奉義軍節度以旌其功德宗還京徵為左金吾衛將軍遷大將軍貞元元年拜劍南西川節度使以破吐蕃功進檢校右僕射封扶風縣伯加統押近界諸蠻西山八國兼雲南安撫等使十二年加同中書門下平章事十七年以功加檢校司徒兼中書令封南康郡王順宗立加檢校太尉卒年六十一贈太師諡忠武
  hash: sha256:1afde9a63fb5746223fd55b9b4634008f2404b153dbefed64c04da5048b84bfd
