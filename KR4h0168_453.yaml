body:
  text: 辰象在天睿文昭煥體宏述作義著針規發揮刑政之源黻藻皇王之道況理包繫象詞正典謨豈惟炯誡心靈實乃化成天下伏以刑清則功濟化育政治則俗致和平大哉聖言允叶天聽臣職守方鎮宣揚教化仰觀睿藻伏荷時休思欲紀在盤盂周旋佩服不若懸之日月垂範將來是用課率柔翰形於傳寫刊於琬玉之上表於府署之門示文武之楷模為古今之殊觀其碑刊刻已畢見立屋宇謹令修裝三本隨狀奉進臣藝能薄劣筆札無功貴竭臣子之誠式揚君父之德輕塵旒扆伏用兢惶闕言當道監軍使李先壽回奉宣聖旨及伏奉手詔賜臣御製闕華光榮加於望外藻飾皆以典成仰瞻日月之文徒荷乾坤之德拜恩闕無不照德無不容闕物推誠愛人以禮四門載闢百揆時敘加以天闕詞鋒生闕諧於律呂舒詞義正於典謨雖漢稱五魏有三祖挍詞比義何足等夷闕奉成規以柔遠豈敢言功仗神武以清邊才將展效闕臣等闕録微功俯紆睿藻恩光照曜於遐邇文闕倬軼於古今臣闕慶幸闕為言非臣敢望征闕譓闕蹤歸於聖主清闕難陳闕遇於上闕集大績此皆闕仗天威在臣何有又云宣皇風闕布闕率伏南詔夙稟成策得以宣明豈敢貪天之功以為微臣闕力闕眷私又云一心奉國百慮闕公又云永光史策名臣闕一闕特詔皇儲發揮闕妙恩榮昭彰於四海文翰輝闕於闕去造期於盡命以理戎蠻無闕受恩至深闕陳之闕臣聞上承宗廟下鎮黎元永固無疆莫先儲兩伏聞聖躬以山陵未祔哀毀逾制因乖攝衛至今未安若更憂勞萬機伏恐旬月之間未得痊復皇太子睿質已長淑問日彰四海之心實所倚賴伏望權令監撫庶政事無大小一切咨稟候聖躬痊愈即歸春宮如此必冀聖體速就康寧庶政免令壅滯臣位兼將相受恩最深今之所陳是臣職分特望陛下俯從人望克崇萬代之業殿下體重離之明當儲二之重所以克昌九廟式固萬方天下安危繫於殿下臯位崇將相志切公忠先聖察知早承恩顧人臣之分知無不為將以上答眷私罄輸肝鬲伏以聖上嗣膺鴻業睿哲英明攀感先皇志存孝理上追殷宗之德諒暗未嘗發言軍國萬機委於臣佐所宜竭誠翊戴以致雍熙但付託未得其人處理多虧公正今則㣥小得志隳紊紀綱官以勢遷政由情改朋黨交構熒惑宸聰樹置腹心遍於貴位潛結左右難在蕭牆國賦散於權門王稅不入天府褻慢無忌高下在心貨賄流聞遷轉失序先朝屏黜贓犯之類咸擢在省闥府署之間至今忠臣隕淚正士吞聲遐邇痛之謂之不可伏恐奸雄乘便因此謀動干戈危殿下之家邦傾太宗之王業伏惟太宗櫛沐風雨經營四方列聖兢兢年將二百將欲傳於萬代永保無疆豈可以一朝委任王叔文王伾李忠言等三人小藝之臣付以軍國重務恣其黷亂坐致傾危日夜憂危不勝憤激捐軀報國今則其時特望殿下即日奏聞斥逐㣥小天下事務出自殿下之心則四方獲安忠臣得以戮力臯受恩兩朝寄任崇重惟知竭節以效懇誠伏惟殿下掃除之尚書兵部臣韋臯等言臣聞天討有罪兵應者勝義者王夷不亂華師直為壯曲為老多助之至四極爰湊貞觀則同羅擊延陀開元則九姓殄默啜曰商莫不來享犯漢雖遠必誅德風鴹乎河源武節憺乎月率寧人之有旨先元戎之啓行用信威光祖宗不以賊遺君父恭惟皇帝陛下宣昭義問敉寧武功纘八葉之鴻圖奮四征之雄略懷梟鴟銷祲沴稟仰太和翦鯨鯢清郊原掃除㣥穢王猶允塞我武惟揚奇幹善芳各修貢職條支若木咸順旨令邈積石之遐陬有吐蕃之醜類侵敗王略倍奸齊盟乘邊將之弛兵瞰戎亭之虛候為蛇豖食上國盡盜河湟帥蝥賊搖我疆再驚畿甸騎壒敢於深入鑾蹕至於親屯然授兵協以謀我尚納汚而含垢姑通事以結和清水之盟未乾好畤之師已聚指涇靈而繳賂闖鹽夏以搗虛夷德無厭弗悔袵金之禍楚氛甚惡輒興衷甲之謀蠢爾為讎整居匪茹維時南詔慕化中朝先零之質諸雖嘗併力麋人之率百濮罔不離心頓顙於邊受命於吏斷胸奴之右臂羈南粵以長纓燕貉輸致騎之勤晉戎成掎鹿之勢彼既失鐵橋之險我遂克峨和之郛盍竄匿於龍堆復虔劉於鱗塞戕我守將墮我陴隍修戈矛豫與同仇靡室家不遑寧處臣等請奮其旅以殲乃讎鳳翔振武靈武之騎獵其西邠寧太原涇源之兵震其北率山南熊羆之挍暨東川貙虎之師烏蠻撓其腹心回鶻搗其肘腋衆素飽矣一大治之諸將陳洎等統五萬軍出十一道濟師西皓之半策勛北陸之初蕩平七城斬馘萬級獲鎧械五十萬計燔堡壘百七十餘遂賈勇而圍昆明將决勝而定青海僞東境五節度大使論莽熱釋朔方之衆援維州之城九攻九去之計窮七縱七擒之威速連連執訊矯矯獻囚不然我薪而自焚有如破竹之立解爄沸魚潰甌脫兔奔谷靜山空行就馬耆之僇區殫域滅訖聞智盛之降斯皆廟謨淵深神斷天造明見萬里運奇掌上之兵守在四夷制勝目中之虜勒功滇池之柱植表赤嶺之碑一怒安民文之勇也三軍用命克何力焉臣等承帝之明敵王所愾開遠門揭候坐收西極之舊封紫微殿受俘重覩昆兵之茂績臣等無任慶快激切屏營之至謹遣某官奉露布以聞真如常寂色相假名法本無緣誠感必應大慈寺普賢像蓋大照和尚傳教沙門體源之所造也儀合天表制侔神工蓮開慈顏月滿毫相昔普賢以宏誓願於南贍部州贊釋迦文手叐㣥生苦而塵俗昏智莫覩真相雖同諸法究竟寂靜而隨所應為現其身即色即空皆菩薩行自昔鎔範於寺之東像成功巨莫能締構危棟泄雨頽墉生榛狐狸梟鷲號嘯昏晝於戲明可以照幽晦教可以達㣥迷何廢興之變陰隲於冥數昔大歷初有高行僧不知何許人曰斯像後十年而廢二十年而復興我今皇帝神聖纂圖詔四方藍宇修舊起廢斯其明效也臯因降誕慶辰肅㣥寮戒武旅上崇景福齊于斯寺觀象王雄傑天眼慈矚禮足諦視恍如有神而廢故湫漏殆無人跡將何以昭誘沉淪發揮誠敬遂南遷百餘步度宏規開正殿因詔旨諭㣥心千夫唱萬夫和奮贔屭岑穹崇橫絙運巨力手叐始雷殷而地轉歘雲旋以山回面西方而聖教攸歸鎮坤維而蠢類知向於是平坎窞翦蒙籠橫空準繩審曲面勢連廊靄以雲屬三橋揭其虹指廓廣廷之漫漫增重門之巘巘是知至道默存於濁劫元功必啓於康時不然何神像巍巍冠諸有相久而弛廢將有待而興乎觀其左壓華陽之勝中據雄都之盛岷江灌其前趾玉壘秀其西偏足以彰會昌之福地宏一方之善誘安得不大其棟宇規正神居哉夫像設陵夷去聖彌遠言教者必滯於物遺物者亦住於空將求乎中宏我至教乃擇釋子達真源之所歸者于以居之臯受命方鎮十有七年求所以贊皇猷裨大化嘗以萬之心不俟懲誡靡然歸善者釋氏之教宏矣況冥祜昭報大彰于時崇而守之亦同歸之理也是用上承聖意虔奉天心存像存教以勸其善貞元十七年十一月二十日記大覺神用保釐㣥生恍乎其若存皎爾而不昧隨願現量應祈無方苟修之必誠其效之必速寶歷寺者劍南西川節度觀察處置等使檢校司徒中書令南康王臣臯之所創也臣臯以守司西蜀向二十載奉若睿旨緝寧遐夷兵休邊陲人獲富庶天寶為德顧何力焉而位日加崇祿日加厚思宏聖教以答昌運遂以俸錢於府之東南擇勝地建仁祠號曰寶歷章表上聞帝俞錫以銀榜天文煥炳昭誠也因紀其締搆之初述其經始之志用播貞石永貽將來間歲以軍府多暇遵奉朝典行春布命涉江而南相彼原阜磅礡鬱起勢雄坤維阻濬流而人民不居眄近郊而黍稷斯茂惟蜀之土薄水淺居常墊隘將利其俗爰圖爾居乃架雙橋通習險規地勢分直繩人遷如歸一日成市豈不樂我皇道豐其有家崇崇寶剎雄居厥右啓奇致也於是增峻址列高墉規梵天而立制集班倕以騁巧邃殿耽耽以雲蔚危樓蘧蘧以虹指千楹電烻萬栱翬飛錦江澄明而俯檻雪嶺晴開而入座用能崇福廣化網羅㣥生曉鐘清水月之音宵唄警昏沉之耳足以增聞者之惠也刊梵文於貞石炳萬字於雲幢所以導瞻仰之目也禪堂究無生之義廣座喻蓮花之旨所以詮語默之致也夫如是則飛沉動息十有二倫咸以見聞悟於觀聽孰不歸於正而去其邪夫物無邪心則五福自順五福自順諒可以贊皇猷輔神用期寶歷於無疆也有大德神捍者元學海蓄惠辨雲涌智足以守正明足以間邪揚孚德音不在於是爰命統緇張司寶坊俾像法之中復宏正見銘曰元真大覽生滅空宏誓救物悲智中粵有精誠通寂默事隨心願回化功天長寶歷本無窮徒以臣心贊厥庸空門悠遠理難測仁祠誘善表至德俾歸清淨協厥中殊方詭類聞見同永資福惠庶莫極遐慶太平斯萬億真源本於靜習靜者式乎煩情僞生於動制動者存乎簡昔我大聖如來慈救像末肅全儀以軌衆持細行以護機俾外緣不競內蔭皆闕壽我法命留乎濁劫者非毗尼之藏歟是以大士優波離傳教引範攝身端矩面月恆滿意珠常靜自是龍像繼世光乎梵倫雖佛日久沉而昏衢不昧其後三百年中五部分流各從師說猶江河競注終合於滄溟耳目殊用同歸乎一體及乎像法論正餘波東流始以華文傳譯梵字其賾微探奧合異歸同使元關洞開幽鍵莫閉安得不枝羅三藏派引㣥流繁簡之旨與時而用宜矣自飲光淪化六和紊緒卑摩已失於詞費惠遠未適於深微而太原素公獨得真奧旁求證據辨惑稽疑始立四分宗紀猶懼元源未暢妙理或遺引而伸之作開四分宗拾遺抄軸盈草言成百萬足使迷雲開而聖旨明邪網壞而㣥心定然而學者尚以神分於廣用目倦於勤求道將得而心疲理未究而意殆廣文所以存義文繁而義亡簡言可以趣寂言約而真契大歷中故相國元公以大臣秉教授屬宏持慮水雜甘露味亡純正爰命薦福寺大德如淨以為素公之疏傳矣五師之旨明矣意已得而象可忘魚其得而筌奚設將刪彼證諭獨留精真使理契惟一行歸無二法筵清衆匪勞而著功其文彌冥其道彌廣不亦善歟大德乃歸心契冥精啓聖意故繁而必削簡不遺真可以趣元蹤足以端覺行元公由是上聞俾施行乎天下坤隅三府各置律壇斯藍也炳異徵奇著於前昔復建壇宇俟茲宏揚屬精義初傳編録猶少將使函文請益披文究精臯鎮守方隅軍務之暇躬覽聖教允思宏益夫博以冥要世儒猶病簡以鄰道真乘所先故曰苾芻清淨令法久住胡可以繁文而撓其靜正則薦福新疏精而易行信矣臯昔嘗蒞職屯田佐元公於淮右覩公達西方至教尚矣而代遷人謝遺志在茲洎余宏傳同贊聖意遂以俸錢繕寫新疏四十本兼寫法華疏三十本命寶園律大德光翌總而行之爰集緇徒志行純深表儀端素二十一人隨給其疏以成其志庶止作雙就純而不雜彼翌上人者往親學於薦福性聰行貞儀度可則又於莊嚴寺貞操大德院聽授法華同契三昧俾茲講授以發幽蒙其有後學履操精全可傳其道者並刊名貞石以示宗歸為寶園靈壇傳授毗尼新疏記貞元十八年十一月一日建元精以五氣授萬類雖鱗介羽毛必有感清英純粹者矣或炳耀離火或稟奇蒼精皆應乎人文以奉若時政則有革彼禽類習乎能言了空相於不念留真骨於已斃殆非元聖示現感於人心同夫異緣用一真化前歲有獻鸚鵡鳥者曰此鳥聲容可觀音中華夏有河東裴氏者志樂金仙之道聞西方有珍禽㣥嬉和鳴演暢法音以此鳥名載梵經智殊常類意佛身所化常狎而敬之始告以六齊之禁比及辰後非時之食終夕不視固可以矯激流俗端嚴梵倫或教以持佛名號曰當由有念以至無念則仰首奮翼若承若聽其後或俾之念佛則默然而不答或謂之不念即唱言阿彌陀佛歷試如一曾無爽異余謂其以有念為緣生以無念為真際緣生不答為緣起也真際雖言為本空也每虛室戒曙發和雅音穆如笙竽靜鼓天風下上其音念念相續聞之者莫不洗然而嘉善矣於戲生有辰乎緣有盡乎以今年七月猝爾不懌七日而甚馴養者知其將盡乃鳴磬告曰將西歸乎為爾擊磬爾其存念每一擊磬一稱彌陀佛洎十擊磬而十念成斂羽委足不震不仆奄然而絶按釋典十念成往生西方又云得佛慧者歿有舍利知其說者固不隔於殊類哉遂命火以闍維之法焚之餘燼之末果有舍利十餘粒炯爾耀目瑩然在掌識者驚視聞者駭聽咸曰苟可以誘迷利世安往而非菩薩之化歟時有高僧慧觀常詣三學山巡禮聖迹聞說此鳥涕淚悲泣請以舍利於靈山用陶甓建塔旌其異也余謂此禽存而由道沒有明徵古之所以通聖賢階至化者女媧蛇軀以嗣帝中衍鳥身而建侯紀乎策書其誰曰語怪而況此鳥有宏於道流聖證昭昭胡可沒已是用不愧直書於辭貞元十九年八月十四日記上天不弔國家多難逆臣乘間盜據皇宮而楚琳亦扇凶徒傾陷城邑酷虐所加爰及本使既不事主安能恤下臯是用激心憤氣不遑砥寧誓與㣥公竭誠王室凡我同盟一心竭力仗順除凶祖先之靈必當幽贊言誠則志合義感則心齊粉骨糜軀決無所顧有渝此志明神殛之逮於子孫亦罔遺類皇天后土當鑒斯言幵宙宙字次宗河間人國典攸設秩官之常各靖其能無替乃事所以備樂成列編鐘在懸是擊是考有倫有脊則修古訓警其職官將視瞭之所司宜磬師之尚教何所由之黷禮置鐘師於非辜同蠶績與蟹筐比邯圍於魯薄興言循口刑其捨諸或縱詭辭罪難於已未當斯按皆將取焉不伏為言猶拾瀋也渭大歷十四年進士貞元中官度支郎中有攻金之工兮求百鍊之精鋼涉越水之表登楚山之陽目眇眇而有待心遙遙而不遑工曰礦斯得鍊斯力夫何器之不良乃召風胡邀歐冶計日淹速商工衆寡我心天縱我力神假鼓焱士冖䂞以喧豗轟雲鎚而上下金火惟序載離寒暑光融融而焰焰疑雷擊以星流聲有往而有還若唱豫而和汝始於一而終於百鍊既存而鍛乃舉成利器兮為國珍自私家兮獻公所於是礪以越砥淬於江流燦龜文於敻絶射龍藻於清浮將四海而是震豈千金而可求當赤帝之所提常聞逐鹿為庖丁之所得未見全牛金從鍊兮白受采知成形之所在金中選兮史亦書念逢時之不居故鍊金者非錘爐而勿用選士者非考核而何於且金生土土效禎鍊於代代作程豈上決則凜然霜鍔下麾而炯若水精為邦如之何莫大於通變為金如之何必資於鍛鍊雖蹈刃以垂範諒申威而去戰俟袁宏之片言符薛燭之一見天之垂象兮無臭無聲君之立德兮赫赫明明將同符而合矩在璿璣與玉衡故運彼四時寒燠隨其建指齊其七政有道感於無情故使黎民於變萬物由庚神不祕其福地不愛其禎原其天斯覆兮地斯載播㣥方而作主日陽德兮月陰靈俾五星而為輔諒無私於照燭或任晦於烟雨國風可仰守官方贊於羲和人力不侔杖策已疲於夸父夫能文者政乃不乏示寰瀛之大法運天者道在於乾占日月之初足廠田坴既推歷以生律亦鉤深而索元徒觀其如璧之合如珠之連甲子不迷符太初之朔旦精意以享同肆類於旻天七政非差萬邦攸共采石氏之經聽疇人之頌遠而望也粲粲映非雲之雲默而識之昭昭為非用之用歲在木而循度鎮居中而不攜熒惑無犯於奮若太白莫陵於攝提將不盈而不縮豈乍高而乍低故我后所以引唐堯而作式指虞舜而思齊動於天兮德有一麗於天兮曜有七四海以之升平千箱以之充實豈比見暈珥適背之狀語怪變雲氣之質非訓俗以齊人徒廢時而亂日客有從筆硯而未達懷忠信而待命望蒔蓂於朝階知如春之聖政竊昧談天之辨庶裨觀象之詠陶唐氏欽若日出資授人時乃命羲仲往哉汝司紀寅賓而建始旌照燭兮無私暘谷初升退㣥冥於仄陋扶桑適上分萬象於毫釐日之為德也均日之為功也大作朝夕之程準見乾坤之交泰無遠無近幽而必通惟植惟生罔不咸賴出於東兮示發生之所在傾於西兮覩光靈之不改必將表歲以務穡豈獨陵虛而賦彩爾其孟陬叶月太簇和聲農祥正而土膏咸動庶績凝而百度惟貞于以秩東作于以望西成塗足沾體勉穡夫與田畯布和施令樂國泰而君明豈不以五行班序七曜宣精者哉則有三足呈祥重暉降祉瑞聖斯應為光有以遠色杲杲非童子之辨焉浮彩昭昭惟仲尼之揭矣爰考休徵圖牒與能既煦育之無外同寅賓而有恆賓者導也惟人之導陽寅者敬也惟人之敬授諒難踰而可仰參地載而天覆觀其煜熠動川澄明麗天消瀌瀌之殘雪斂藹藹之輕烟謠東君於楚客祀岱嶽於漢年願捧圖稱瑞以相宣綬長慶元年官金紫光祿大夫檢校司空兼太子少保維長慶元年歲次辛丑七月乙未朔十八日壬子金紫光祿大夫檢校司空兼太子少保上柱國公食邑三千戶嚴綬文武官六千六百七十七人等言臣聞天以萬物付聖人聖人本天意而保乂之惟羲農先天而貞惟軒轅奉天而行惟堯舜法天而明絪縕粹精昭建鴻名以至于夏殷周漢謙儉服義仁愛忠利亦著稱謂代濟其美當隋之末我高祖神堯皇帝救拯焚溺應天立極蕩氛昏揚凱澤父教而母育恩德高肌骨肥天寶季歲賊臣紊常塵起幽陵毒流四方纍聖含宏視人如傷餘枿勢滋專土擅強憲宗因天時順人心舉五經明大刑連手叐堅險顛踣同惡冥冥沈沈猶恃榛穢干戈不得息者綿六十七祀逮我后之御歷紹太宗之求賢審官舉直錯枉體元宗之尊師敬道清靜致理法肅宗之循名求實刑賞用中廣德宗之亭毒含容博採虛受而後展嚴于配天夷思於法宮從物無私推誠至公霈矣乎廣受寂然乎感通神武不殺而天下會同昔少康祀夏聿修皇祖之訓周武繼統務廣文王之聲爰洎宣王克服蠻荊勞來安集洎漢光武既平隴蜀聽政忘寐伏惟皇帝陛下以至聖之姿誕啓昌運重明之業紹開中興豈無辟違從風悅化而自革豈無氛翳大明升中而自除皇澤暢於九圍文命敷於萬國則向之數王何足稱哉尚復孜孜庶本不遑疑勞謙日昃講道求賢議獄恤刑去讒進直以利物勤人為政本以檢戒懼惕為化先自誠而明日慎一日是以天道惟新於景命元德亟聞於四方億兆咸曰大哉君心復曰懋哉君功隆延禧之主揚仁壽之風恢帝圖廓皇綱崇鴻名顯無疆不然者何以答上靈之眷命乎何以惠庶氓之懇望乎於是垂白之老緇黃之衆與侯甸藩衛之士守闕稽顙日以上請臣等所以勤勤懇懇敢固以言陛下猶堅秉撝抑至于三四不得已而降前詔於是百辟卿士考天下之意稽典禮之儀進而言曰陛下崇儒問道恭默致化文之明也保大安乂感懷夷夏武之彰也嚴恭寅畏博愛廣敬孝之大也宣慈惠和忠恕利物德之盛也臣等不勝大願謹上玉冊玉寶上尊號曰文武孝德皇帝伏惟陛下敬天之錫昭聖之功高明有嚴慎德無窮赫赫融融與天比崇臣綬等誠歡誠懼稽首頓首信安郡南三十里有峻山幽谷含異蓄靈兩崖屹崒中呀黑巨石橫亘作為洪梁闕八字其內也澒洞嵌豁穹隆圈聯若鵬垂翼隔閡日月其外也嶔崟揭孽鼇踞虬偃如闕八字裏異狀觀視駭慮原夫造物者將有意於其閒不然何詭異之至是昔晉代有樵人王質於石橋下逢二仙奕碁偶閲終局柯爛而返已時移百年斯實神怪惚恍何可詳究暨有梁開國崇尚元陳乃立為梵剎以旌厥異自是之後代為佳境塵世之士得遊造焉聖唐開元中天枝信安郡王再臨斯郡王太宗皇帝子吳王之次子自天分胄惟嶽祚靈蘊禮樂於生知以戡難為已任十年分閫塞馬不嘶羽儀南宮位副端揆其始至也以初封江王發軔於此其再臨也以勳列崇異改封信安遭奸臣貝錦出就歸藩之義前於此也美茲清幽親將藻思雅什在壁八音凄鎗後於斯也根其靈蹤將示托實乃斫木為局雕木為仙對奕森然若峙真侶可謂開張道樞發明蒙晦者矣王之次三子梁國公峴融液元化弼諧羲軒功成身退復臨斯郡今州牧韋公光輔即王之外孫又分符竹似續嘉績紹王繼公甘棠未凋膏雨相接卓絶當世焜煌高門簪纓舉為清論簡策編為典故公次兄光憲貞元二年春拜連山牧將欲之郡道以會于信安交隼旟於虎符之前連雁行於熊軾之上寒景初霽棣華獨春人或有榮鮮若斯之備矣懿茲靈府齊慮同遊山答鳴騶雲隨露冕遍披曩迹備閲真趣想徽容之如在愴年代之闕一字移王先題詩在橋上危樓之東壁風雨所交魯魚將誤恐或隳落堙沉德馨公乃勒於貞石以傳不朽惟英王播芳於昔惟哲孫繼躅於今輝光蟬連前後相燭不發揚於頌述何彰示於將來以子前大理評事嚴綬曾忝文進載筆從實乃命為記以旌盛烈
