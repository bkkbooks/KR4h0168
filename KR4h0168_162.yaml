front:
  text: 全唐文欽定全唐文卷一百六十二祥道字同壽魏州觀城人少襲爵樂平縣男纍遷黃門侍郎進封陽城縣侯刑部尚書龍朔三年拜右相轉司禮太常伯進爵廣平郡公乾封元年致仕卒年七十一贈幽州都督諡曰宣
  hash: sha256:e98046605ae0ae1f1730bfd66e896b64a127b8843c3825f3a20c59b4e7d0c1e7
  markers:
