body:
  text: 准禮封壇舊儀當以奉常卿為亞獻昔三代六卿位重故得佐祠爰至兩漢尚書秩卑亦以九卿行事自魏晉以降事歸臺省九卿皆為常伯屬官今登封大禮不以三公八座行事而用九卿無乃徇虛言而忘故事也今之選司取士傷多且濫每年入流數過一千四百傷多也雜色入流不加銓簡是傷濫也經明行修之士猶或罕有正人多取胥徒之流豈能皆有德行即知共釐務者善人少而惡人多有國以來已四十載尚未刑措豈不由此乎且官人非材者本因用人之源濫濫源之所起復由入流人失簡擇今行署等勞滿唯曹司試判不簡善惡雷同注官但服膺先王之道者奏第然始付選趨走几案之間者不簡便加祿秩稽古之業雖則難知斗筲之材何其易進其雜色應入流人望令曹司試判訖簡為四等奏聞第一等付吏部第二等付兵部次付主爵次付司勳其行署等私犯公坐情狀可責者雖經赦降亦量配三司不經赦降者放還本貫冀入流不濫官無冗雜但令胥徒之輩漸知勸勉其一古之選者為官擇人不聞取人多而官員少今官員有數入流無限以有數供無限遂令九流繁總人隨歲積謹約準所須人量支年別入流者今內外文武官一品已下九品已上一萬三千四百六十五員略舉大數當一萬四千人壯室而仕耳順而退取其中數不過支三十年此則一萬四千人三十年而略盡若年別入流者五百人經三十年便得一萬五千人定須者一萬三千四百六十五人足充所須之數况三十年之外在官者猶多此便有餘不慮其少今年常入流者遂逾一千四百計應須數外其餘兩倍又常選放還者仍停六七千人更復年別新加實非處置之法其二儒為教化之本學者之宗儒教不興風俗將替今庠序遍於四海儒生濫於三學誘掖之方理實為備而奬進之道事或未周但永徽已來於今八載在官者以善政粗聞論事者以一言可採莫不光被綸音超升不次而儒生未聞恩及臣故以為奬進之道未周其三國家富有四海巳四十年百姓官寮未有秀才之舉豈今人之不如昔人將薦賢之道未至寧可方稱多士遂間斯人望六品已下爰及山谷特降綸言更審搜訪仍量為條例稍加優奬不然赫赫之辰斯舉遂絶一代盛事實為朝廷惜之其四唐虞三載考績黜陟幽明兩漢用人亦久居其職所以因官命氏有倉庾之姓魏晉以來事無可紀今之在任四考即遷官人知將秩滿必懷去就百姓見有遷代能無苟且以去就之人臨苟且之輩責以移風易俗其可得乎望經四考就任加階至八考滿然後聽選還淳反朴雖未敢必期送故迎新實稍減勞弊其五尚書省二十四司及門下省中書都事主書主事等比來選補皆取舊任流外有刀筆之人縱欲參用士流皆以儔類為恥前後相承遂成故事且掖省崇峻王言祕密尚書政本人物攸歸而多用胥徒恐未盡銓衡之理望有釐革稍清其選其六竊以朝廷之敘肅敬為先生育之恩色養為重釋老二教今悉反之抗禮於帝王受敬於父母而優容自昔迄乎今代原其深致蓋有以然諒由剔髮有異於冠冕袈裟無取於章服出家之人敬法捨俗豈拘朝廷之禮至於元教清虛道風遐曠高尚其事不屈王侯帝王有所不臣蓋此之謂國家既存其道所以不屈其身望准前章無違舊貫謹議處俊安州安陸人貞觀中進士纍官吏部侍郎總章中拜東臺侍郎同東西臺三品拜中書令兼太子賓客儀鳳四年拜侍中遷太子少保開曜元年薨年七十五贈開府儀同三司荊州大都督顯慶新禮廢感帝為祀祈穀昊天以高祖配舊禮祀感帝以代祖元皇帝配今既依舊復祈穀為感帝以高祖配者何升降紛紛焉虞氏禘黃帝郊嚳夏禘黃帝郊鯀殷禘嚳郊冥周禘嚳郊稷鄭元注云帝者祭天圜丘郊者祭上禘南郊崔靈恩說夏正郊天王者各祭所出帝所謂王者禘祖之所自出以其祖配之則禘須遠祖郊須始祖也今禘郊同祖禮無所歸神州本祭十月以方陰用事也元說三王之郊一用夏正靈恩謂祭神州北郊以正月諸儒所言猥互不明臣願會奉常司成博士普議希微立言資於黼帝釋教虛寂垂法依於國王事如左春坊議中彈是以紫氣真容元猷西被黃金圖相妙旨東流仙侶莘莘藉天基而遂重法徒濟濟憑聖政而彌隆况今德貫陰陽道包真俗恩霑動植尚荷亭育之慈澤被生靈猶懷仁壽之施唯釋老二門由來迂誕事如右金吾衛議中彈既捐真典便虧四大遍信化人不遵三有主上崇孝敬之儀敦跪拜之禮爰發綸誥令拜君皇后太子及父母者非直庶寮允愜彈曰議不拜人殆將大半今云庶寮允愜何其謬歟抑亦垂範將來謹議約絳州聞喜人幼以蔭補宏文生貞觀中舉明經調左屯衛倉曹參軍儀鳳中以才備文武拜禮部尚書兼檢校右衛大將軍調露元年為定襄行軍大總管討伏念以功封聞喜縣公永淳元年卒年六十四贈幽州都督諡曰獻中宗立再贈揚州大都督吐番叛擾干戈未息敬元審理失律喪師安可更為西方生事今波斯王身沒其子泥帥師充質在此差使往波斯冊立即路繇二蕃部落便宜從事必可有功文琮貝州武城人貞觀中為持書侍御史三遷亳州刺史永徽初徵拜戶部侍郎出為建州刺史赫矣神武繼期作聖下括九圍上齊七政業統文武勳邁高光何險不濟何患不攘士女胥悅篚厥元黃斯物之至昭於我皇我皇覆育資生懷造配堯登唐攘周在鎬翕受敷施明徵定保允神厥德方清帝道帝道欽明天下和平三時不害百穀以成我庾斯積如坻如京既富而教訟息刑清春秋二社蓋本為農惟獨此州廢而不立禮典既闕風俗何觀近年以來田多不熟抑不祭先農所致乎神在於敬可以邀福文瓘貝州武城人貞觀初舉明經纍遷水部員外郎出為雲陽令龍朔中纍授東西臺舍人參知政事拜東臺侍郎同東西臺三品遷大理卿上元二年拜侍中兼太子賓客儀鳳二年卒年七十三贈幽州都督諡曰懿竊惟人力不可不惜百姓不可不養養之逸則富以康使之勞則怨以叛秦皇漢武廣事四夷多造宮室使土崩瓦解戶口減半臣聞制理於未亂保邦於未危人罔常懷懷於有仁陛下不制之於未亂之前安能救之於既危之後百姓不堪其弊必搆禍難殷鑒不遠近在隋朝臣願稍安撫之無使生怨臨字本德京兆長安人貞觀中纍轉黃門侍郎高宗立為御史大夫遷刑部尚書加金紫光祿大夫歷兵部度支吏部三尚書顯慶四年坐事貶潮州刺史卒年六十臣聞事君之義盡命弗渝為臣之節歲寒不二苟虧其道罪不容誅德彞操履無聞輕險有素往在隋代恩遇巳深苞藏姦忒密懷梟獍叶同大憝傾覆國經論其悖迹合從遐棄幸逢寬政復蒙收録策名藩邸陳力周行位至鼎司恩隆胙土無心報效乃肆姦謀熒惑儲藩奬成元惡置於常典理合誅夷但包藏之狀死而後發猥加贈諡未正嚴科罪既彰露宜加貶黜豈可仍酬爵邑尚列台槐此而不懲將何勸沮臣聞樹德立功允應高秩之賞干紀逆節必加夷滅之誅苟違斯道實虧政理如晦昔陪藩邸頗效微庸出震惟新參謀帷幄遂得爵分茅社位踐台衡然而機鑒未充周慎多爽昧貽厥之嘉猷闕義方之明訓其子逆賊構荷等並稟氣凶悖早挾邪謀深禹山之同惡甚玁狁之連禍徙邊棄市既伏其辜食采疇邑猶均雨露昔石碏純臣早為子厚之所日殫忠謹先加弄兒之罰皆所以防萌杜漸安國全家如晦識滯生前愆遺身後舊榮昔寵巳忝冒於曩日削土除國宜申法於今辰臣聞國家大典在於賞刑古先聖王惟刑是恤虞書曰罪疑惟輕功疑惟重與其殺弗辜寧失弗經周禮刑平國用中典刑亂國用重典天下太平應用堯舜之典比來有司多行重法敘勳必須刻削論罪務從重科非是憎惡前人止欲自為身計今議蕭齡之事有輕有重重者流死輕者請除名以齡之受委大藩贓罪狼籍原情取事死有餘辜然既遣詳議終須近法竊惟議事㣥官未盡識議刑本意律有八議並依周禮舊文矜其異於衆臣所以特制議法禮王族刑於隱者所以議親刑不上大夫所以議貴明知重其親貴議欲緩刑非為嫉其賢能謀致深法今議官多於刑法之外議令入重正與堯舜相反不可為萬代法臣既處法官敢不以聞義表貞觀十七年官朝散大夫行衛尉寺丞上護軍大唐出震膺圖龍飛光宅率土恩覃四夷化高三五德邁軒羲高懸玉鏡垂拱無為其一道法自然儒宗隨世安上作禮移風樂制發於中土不同葉裔釋教降此運於無際其二神力自在應化無邊或涌於地或降於天百億日月三千大千法雲共扇妙理俱宣其三鬱乎此山奇狀增多上飛香雲下臨澄波靈聖之所降集賢懿之所經過存聖迹於危峯竚遺趾於巖阿其四參差嶺嶂重疊巖廊鏗鏘寶鐸氛氤異香覽華山之神蹤勒貞碑於崇岡馳大唐之淳化齊天地之久長其五太貞河內人貞觀十四年官瓜州司法參軍昔胸奴殄滅竇將軍勒燕山之功閩越泯清馬伏波樹銅柱之迹然則振英風於絶域申壯節於殊方莫不騰茂實於千載播芳猷於萬古者矣闕大唐德合二儀道高五帝握金鏡以朝萬國調玉燭以馭兆民濟濟衣冠煌煌禮樂車書順軌扶桑之表俱同治化所沾濛汜之鄉咸暨苑天山而池瀚海內比戶以靜幽都莫不解辮髮於槀街改左袵於夷陋高昌國者乃是西漢屯田之壁遺兵之所居麴文泰即其苗裔也往因晉室多難㣥雄競馳中原乏主邊隅遂隔問屆我於穴圭射多拔王磨局至吟靡遺啓政自皇威遠被稽顙來庭雖沐仁風情懷首鼠杜遠方之職貢阻重譯之往來肆豺狼之心起蜂蠆之毒若德聚庶賊盛無已聖上慜彼蒼生申茲弔伐乃詔使持節光祿大夫吏部尚書上柱國陳國公侯君集交河道行軍大總管副總管左屯衛大將軍上柱國永安郡開國公薛萬均副總管左屯衛將軍上柱國通川縣開國男姜行本等爰整三軍張行天罰但妖氛未殄將軍逞七縱之威百雉作固英奇申九攻之略以通川公深謀間出妙思縱橫命前軍營造攻具乃統沙州刺史上柱國望都縣開國侯劉德敏右監門中郎將上柱國淮安縣開國公衡智錫左屯衛中郎將上柱國富陽縣開國伯屈昉左武候郎將李海崖前開州刺史時德衡右監門府長史王進威等並率驍雄鼓行而進以貞觀十四年五月十日師次伊吾時羅漫山北登里紺所未盡旬月克寸成奇功伐木則山林殫盡叱咤則川谷蕩薄衝梯暫整百木冰碎機方會一發千石雲飛墨翟之拒無施公輸之妙詎比大總管運籌帷幄繼以中軍鐵騎亘原野金鼓動天地高旗蔽日月長㦸彗雲霓自秦漢出師未有如斯之盛也班定遠之通西域故跡罕存鄭都護之滅車師空聞前史雄圖世著彼獨何人乃勒石紀功傳諸不朽其詞曰於赫大唐受天明命化濟得成功寧山境荒服猶阻夷居不定乃拜將軍殄茲梟獍謀六奇動思㣥雄逞力陳開龍勝營闕庶星光旗明日色揚旌塞表振威西極峩峩峻嶺眇眇平原塞雲暝結朝風晝昏長紀洛雪高樹闕今據銘功讚德宏獻貞觀朝官蜀王司法參軍古者五刑刖居其一及肉刑廢制為死流徒杖笞凡五等以備五刑今復設刖足是為六刑減罪在於寬宏加刑又如繁峻宗裕貞觀時人烏石峯丹泉觀乃何太守諱志遠祖宅故基距宅後數百步來脉山腰右峽處古仙客結有廬菴一所方士之耽幽攬勝者往往棲跡其間名曰黃蜂山居晉永嘉中旌陽令許遜字敬之者去職歸真亦自廬菴居止日遊於何遠公故宅處攬其勝境左有藥水靈泉右有丹崖翠壁前有幽竹森羅後有蒼松挺秀且輕煙散彩薄霧呈祥山鳥朝歌漁燈夜燦詩曰偶來奇絶處倏忽悟元關藥水龍沙近丹崖咫尺間圖分八卦定爐成九轉還遠翁相慨賜逍遙非等閒不數日許君拜候遠翁欲募其故居山圃遠翁慨然允曰僕亦乏嗣日後可付棲神許君遂改遷茇廬於其處燒丹煉汞至寧康二年八月十五日午時許公舉家拔宅仙去南宋永初中徒裔萬太元號石泉者分寧人也復尋故居結廬居之遂開緣募化十方始搆巍殿三重塑繪許公聖像尸位其中首枕岐峯之巔簾捲西山之雨獅沙左抱象曜右纏元徽中石泉年九十零日治其殿廡遺址合其生旺歸垣語人曰吾法嗣後代必有大興於此者翁年百有三歲復隱匡廬傳弟子許上期號中山中山弟子張開先奇才茂著穎悟不凡文生五月臧錦鋪六腑纘述許祖遺傳操煉金丹符祕上能轟雷致雨下能治病驅邪於我朝貞觀中盛夏之時洪州數月不雨高阜者有力無施魃鬼肆殃低窪者掘井莫救蝗蟲損耗當事倣徨人民憔悴各憲臺焦勞無計出示曉諭遍請元流法士期求未效一日張開先唪誦皇經頓然神倦隱几而臥見一道者元冠羽服揮塵而言曰開先開先豫章人民難星將滿爾道當興速宜出救謹聽吾言醒覺是夢曰此許祖指示吾當出救次早負劒往省潔齊登壇書符咒水不三日轟雷掣電驟雨傾盆蝗蝻盡殞苗乃浡興屬官申帝召入對從容便殿語及前事聖皇大喜敕賜紫垣洞天仙侶掌陰陽法教都紀之職敕建許祖旌陽寶殿崇高三丈六尺廣六丈深四丈其後三清殿高四丈廣深俱同前殿規模於貞觀已丑四月己已落成是歲八月庚午塑像閲三載黝堊繪飾咸備題其額曰旌陽寶殿洞青天宮余奉詔督造工成開先請余文以記之彼朴記之也余觀其地奇絶勝幽叢翠羅列巋然偉拔仙蹟非虛太元啓之於前開先繼之於後若非仙蹟綿衍神靈協相其何能復振之於今日以植元教於萬年闡宗風於奕世乎庸書以為記仲謨貞觀十四年官越王府東閣祭酒常州長史山嶽降精川瀆耀靈猗歟史氏世濟其英忠言允塞嘉猷有聲從容燮理散誕飛纓含香青瑣敷奏丹庭有犯無隱唯言是聽王室斯賴諸侯以寧內侍帷幄外典專城為政以德察獄以情化俗草偃溪谷風清金相玉質不隕厥名處溢不驕居勞不憚視險如夷忘身逐叛駉頌美魯青蒲安漢執簡書姦邪逃竄匪君之忠孰能戡亂在昔隆漢姻婭皇家惟帝念功爵命屢加三台五鼎駙馬奉車腰佩兩印綬帶雙緺何彼穠矣常棣之華如圭不玷似玉無瑕節之以禮儉而不奢篤生我侯英略備舉有藝有才能文能武孝以奉親忠惟衛主赤睂始結白波猶侮執鋭破堅斬馘滅虜截彼長蛇殲斯猾豎策賞廟堂書勳王府功成弗居名立不取簡在帝心酬封祚土厥土惟何在溧之滸初食三千卒封萬戶葭菼揭揭麀鹿麌麌禾禾殳斾斾原田膴膴俯營川陸魚鹽所聚蝗飛火滅還珠去虎子民輯悅建茲城宇大廈耽耽聽政之所祠堂石殿生靈攸處凡春秋兮祭祀不阻允貞觀時官台州刺史詳夫寒山子者不知何許人也自古老見之皆謂貧人風狂之士隱居天台唐興縣西七十里號為寒巖每於茲地時還國清寺寺有拾得知食堂尋常收貯餘殘菜滓於竹筒內寒山若來即負而去或長廊徐行叫喚快活獨言獨笑時贈遂促罵打趁乃駐立撫掌呵呵大笑良久而去且狀如貧子形貌枯悴一言一氣理合其意沈而思之隱况道情凡所啓言洞該元默乃以樺皮為冠布裘破弊木屐履地是故至人遁迹同類化物或長廊唱詠唯言咄哉咄哉三界輪回或於村墅與牧牛子而歌笑或逆或順自樂其性非哲者安可識之矣允頃受丹邱薄宦臨途之日乃縈頭痛遂召日者醫治轉重乃遇一禪師名豐千言從天台山國清寺來特此相訪乃命救疾師乃舒容而笑曰身居四大病從幻生若欲除之應須淨水時乃持淨水上師師乃噀之須臾祛殄乃謂允曰台州海島嵐毒到日必須保護允乃問曰未審彼地當有何賢堪為師仰師曰見之不識識之不見若欲見之不得取相乃可見之寒山文殊遁跡國清拾得普賢狀如貧子又似風狂或去或來在國清寺庫院走使廚中著火言訖辭去允乃進途到任台州不忘其事到任三日後親往寺院躬問禪宿果合師言乃令勘唐興縣有寒山拾得是否時縣申稱當縣界西七十里內有一巖巖中古老見有貧士頻往國清寺止宿寺庫中有一行者名曰拾得允乃特往禮拜到國清寺乃問寺衆此寺先有豐干禪師院在何處並拾得寒山子見在何處時僧道翹答曰豐干禪師院在經藏後即今無人住得每有一虎時來此吼寒山拾得二人見在廚中僧引允至豐干禪師院乃開房唯見虎迹乃問僧寶德道翹禪師在日有何行業僧曰豐干在日唯攻舂米供養夜乃唱歌自樂遂至廚中竈前見二人向火大笑允便禮拜二人連聲喝允自相把手呵呵大笑叫喚乃云豐干饒舌饒舌彌陀不識禮我何為僧徒奔集遞相驚訝何故尊官禮二貧士時二人乃把手走出寺乃令逐之急走而去即歸寒巖允乃重問僧曰此二人肯止此寺否乃令覔房喚歸寺安置允乃歸郡遂製淨衣二對香藥等特送供養時二人更不返寺使乃就巖送上而見寒山子乃高聲唱曰賊賊退入巖穴乃云報汝諸人各各努力入穴而去其穴自合莫可追之其拾得迹沈無所乃令僧道翹尋其往日行狀唯於竹木石壁書詩並村墅人家廳壁上所書文句三百餘首及拾得於土地堂壁上書言偈並纂集成卷但允棲心佛理幸逢道人乃為讚曰菩薩遁跡示同貧士獨居寒山自樂其志貌悴形枯布裘弊止出言成章諦實至理凡人不測謂風狂子時來天台入國清寺徐步長廊呵呵撫指或走或立喃喃獨語所食廚中殘飯菜滓吟偈悲哀僧俗咄捶都不動搖時人自恥作用自在凡愚難值即出一言頓祛塵纍是故國清圖寫儀軌永劫供養長為弟子昔居寒山時來茲地稽首文殊寒山之士南無普賢拾得定是聊申讚歎願超生死伊一作若太宗朝官坊州司戶賊出萬端詐僞非一亦有胡著漢帽漢著胡帽亦須漢裏兼求不得胡中直覔請追禁西市胡餘請不問坊州本無杜若天下共知此符忽有此科應由謝朓詩誤華省曹郎如此判豈不畏二十八宿向下笑人文偉滁州全椒人咸亨中歷太子典膳丞以直諫授右史武后時纍遷鳳閣侍郎兼宏文館學士載初元年為內史坐善宗秦客貶珍州刺史會他使者至文偉內悸自經死竊見禮大戴記曰太子既冠成人免於保傅之嚴則有司過之史虧膳之宰史之義不得不司過宰之義不得不徹膳皇帝式稽前典妙簡英俊自庶子以下至司議舍人及學士侍讀等使翼佐殿下以成聖德近者以來未甚延納談議不狎謁見尚稀參朝之後但與內人獨居何以發揮聖智使濬哲文明者乎今史雖闕官宰當奉職忝備所司不敢逃死謹守禮經微申減膳
