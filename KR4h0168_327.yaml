front:
  text: 全唐文欽定全唐文卷三百二十七王維四
  hash: sha256:16ac423d5b8c7dd6673bcdf55244b57edc644ded1811a756caf05f39961ada77
body:
  text: 禪師諱道光本姓李帛丿糸州巴西人其先有特有流若實有蜀蓋子孫為民大父懷節隱峨嵋山行無轍迹其季父榮為道士有文知名禪師幼孤在諸兒其神獨不偶家頗苦乏絶元詣鄉校見周孔書曰世教耳誓苦行求佛道入山林割肉施鳥獸鍊指燒臂入般舟道場百日晝夜經行遇五臺寶鑑禪師曰吾周行天下未有如爾可教遂密授頓教得解脫知見舍空不域即動無眹不觀攝見順有離覺毛端族舉佛剎掌上斷置世界不覩非咎應度方知得其門者寡故道俗之煩而息化城指盡謂窮性海而已上有闕文焉足知恆沙德用法界真有哉春秋五十二凡三十二夏以大唐開元二十七年五月二十三日入般槃於薦福僧坊門人明空等建塔於長安城南畢原人天會葬涕泗如雨禪師之不可得法如此其世行遺教如一切賢聖維十年座下俯伏受教欲以毫末度量虛空無有是處志其舍利所在而已銘曰嗚呼人天尊全身舍利在畢原無有可捨是達有源無空可住是知空本離寂非動乘化用常在百法而無得周萬物而不殆鼓枻海師不知菩提之行散花天女能變聲聞之身則知法本不生因心起見見無可取法則常如世之至人有證於此得無漏不盡漏度有為非無為者其惟我曹溪禪師乎禪師俗姓盧氏某郡某縣人也名是虛假不生族姓之家法無中邊不居華夏之地善習表於兒戲利根發於童心不私其身臭味於耕桑之侶苟適其道羶行於蠻貊之鄉年若干事黃梅忍大師願竭其力即安於井臼素刳其心獲悟於稊稗每大師登座學衆盈庭中有三乘之根共聽一音之法禪師默然受教曾不起豫退省其私回超無我其有猶懷渴鹿之想尚求飛鳥之跡香飯未消弊衣仍覆皆曰升堂入室測海窺天謂得黃帝之珠堪受法王之印大師心知獨得謙而不鳴天何言哉聖與仁豈敢子曰賜也吾與汝弗如臨終遂密授以祖師袈裟而謂之曰物忌獨賢人惡出已吾且死矣汝其行乎禪師遂懷寶迷邦銷聲異域衆生為淨土雜居止於編人世事是度門混農商於勞侶如此積十六載南海有印宗法師講涅槃經禪師聽於座下因問大義質以真乘既不能酬翻從請益乃歎曰化身菩薩在此色身肉眼凡夫願開慧眼遂領其一作徒屬盡詣禪居奉為挂衣親自削髮於是大興法雨普灑客塵乃教人以忍曰忍者無生方得無我始成於初發心以為教首至於定無所入慧無所依大身過於十方本覺超於三世根塵不滅非色滅空行願無成即凡成聖舉足下足長在道場是心是情同歸性海商人告倦自息化城窮子無疑直開寶藏其有不植德本難入頓門妄繫空花之狂曾非慧日之咎常歎曰七寶布施等恆河沙億劫修行盡大地墨不如無為之運無礙之慈宏濟四生大庇三有既而道德遍覆名聲普聞泉館卉服之人去聖歷劫塗身穿耳之國航海窮年皆願拭目於龍象之姿忘身於鯨鯢之口駢立於戶外趺坐於牀前林是栴檀更無雜樹花惟薝葡不嗅餘香皆以實歸多離妄執九重延想萬里馳誠思布髮以奉迎願義手而作禮則天太后孝和皇帝並敕書勸諭徵赴京城禪師子牟之心敢忘鳳闕遠公之足不過虎溪固以此辭竟不奉詔遂送百衲袈裟及錢帛等供養天王厚禮獻玉衣於幻人女后宿因施金錢於化佛尚德貴物異代同符至某載月日忽謂門人曰吾將行矣俄而異香滿室白虹屬地飯食訖而敷坐沐浴畢而更衣彈指不留水流燈焰金身永謝薪盡火滅山崩川竭鳥哭猿啼諸人唱言人無眼目列郡慟哭世且空虛某月日遷神於曹溪安座於某所擇吉祥之地不待青烏變功德之林皆成白鶴嗚呼大師至性淳一天姿貞素百福成相衆妙會心經行宴息皆在正受談笑語言曾無戲論故能五天重跡百越稽首修蛇雄虺毒螫之氣銷跳殳彎弓猜悍之風變畋漁悉罷蠱鴆知非多絶羶腥效桑門之食悉棄罟網襲稻田之衣永惟浮圖之法實助皇王之化弟子曰神會遇師於晚景聞道於中年廣量出於凡心利智踰於宿學雖末後供樂最上乘先師所明有類獻珠之願一作顧世人未識猶多抱玉之悲謂余知道以頌見託偈曰五蘊本空六塵非有衆生倒計不知正受蓮花承足楊枝生肘苟離身心孰為休咎其一至人達觀與佛齊功無心捨有何處依空不著三界徒勞八風以茲利智遂與宗通其二愍彼偏方不聞正法俯同惡類將興善業教忍斷嗔修慈捨獵世界一花祖宗六葉其三大開寶藏明示衣珠本源常在妄轍遂殊過動不動離俱不俱吾道如是道豈在吾其四道遍四生常依六趣有漏聖智無義章句六十二種一百八喻悉無所得應如是住其五光宅真空心王之四履建功無旱法將之萬勝故大塊㣥籟無弦出法化之聲恆沙衆形闕二字為寶嚴之色至如六師兆亂四諦徂征開甘露狹小之門出臭烟朽故之宅踞寶牀而搖白拂徐誘草菴沃金瓶而繫素繒遂登蓮座足使天口雄辨刮語燒書河目大儒掊仁擊義斯為究竟孰不歸依禪師法名淨覺俗姓韋氏孝和皇帝庶人之弟也中宗之時後宮用事女謁寖盛主柄潛移戚里之親同分圭組屬籍之外亦綰銀黃況乎天倫將議封拜促上方令鑄印命尚書使備策詰朝而五土開國信宿而駟馬朝天禪師歎曰昔我大師尚以菩提釋位今我小子欲以恩澤為侯仁遠乎哉行之即是裂裳裹足以宵遁乞食糊口以兼行入太行山削髮受具尋某禪師故蘭若居焉猛虎舐足毒蛇熏體山神獻果天女散花淡爾宴安曾無喜懼先有涸泉枯柏至是布葉跳波東魏神泉應焚香而忽湧北天衆果候飛錫而還生禪枝必復之徵法水再興之象聞東京有頤大師乃脫履戶前摳衣座下天資義性半字敵於多聞宿植聖胎一瞬超於纍劫九次第定乘風雲而不留三解脫門揭日月而常照雪山童子不顧芭蕉之身雲地比邱欲成甘蔗之種大師委運遂廣化緣海澄而龍額珠明雷震而象牙花發外家公主長跪獻衣薦紳先生却行擁篲乞言於無說請益於又損天池杯水遍含秋月之輝草葉樹根皆霑宿雨之潤不窺世典門人與宣父中分不受人爵廩食與封君相比至於律儀細行周密護持經典深宗毫剖析窮其二翼即入佛乘趣得一毛亦成僧寶於是同凡現疾處順將終忽謂衆人有疑皆問我於是夜當入無餘開口萬言音和水鳥踴身七樹光映天人如暫出行泯然趺坐以某載月日歸大寂滅某月日遷神於少陵原赤谷蘭若香油細叒冝毛用以茶毗合璧連珠為之葬具城門至於谷口幡蓋相連法侶之與都人縞素相半叩膺拔髮灑水坌塵升堂入室之徒數踰七十破山澍海之哭聲振三千則有僧某乙尼某乙故惠莊某氏某郡主賢者某乙等各在衆中共為上首或行如白雪或名亞紅蓮或為勝鬘夫人或稱毗邪居士二空法外何處進求七覺分中誰當決釋猶衣舍利冀獲菩提身塔不出虎溪淚碑有同羊峴表心成相相非離於真如敘德以言言豈著於文字乃為銘曰小三千界後五百年空乘玉牒莫覩金仙無量義處如來之禪皆同目論誰契心傳其一弟在人間姊歸鳳闕去日留訓別時翦髮纍賜金錢將加印紱忽爾宵遁終然兩絶其二救頭學道裏足尋師一花寶樹八水香池戒生忍草定長禪枝不疑少父更似嬰兒其三既立勝幡併摧邪網利眼金翅圓身寶掌巧撮死龍能調老象魔種敗壞聖胎長養其四四生滅度五陰虛空無說無意非異非同此身何處彼岸成功當觀水月莫怨松風其五嗚呼謂天未喪斯文宣尼去魯而無祿謂天果輔有德樂毅去燕而不歸夫子處順而終穆伯猶毀以請飾棺置境返葬於周公諱朝宗字某本出昌黎今為京兆人也其先或元袞赤舄介圭覲王朱纓緑縢執訊擒敵周末諸侯相王始啓宜陽漢初功臣定封亦荒岱郡曾祖諱倫左衛率賜爵長山縣男祖某隱居不仕父諱思復御史大夫太子賓客進封長山縣伯遁世者名高善卷黔婁事君者位至倪寬卜式公即長山府君之長子也神言有公侯之徵兒戲陳俎豆之法學成孫叔狀類皋繇年若干應文以經國舉甲科試右拾遺天祿校文獻子雲之賦馬生驟諫稱公高之官拜監察御史兵部員外郎埋輪憲府奏記劾大將軍賜筆禮闈蕫戎從小司馬轉度支郎中除給事中度錢穀之盈虛以均九賦執制詔之可否以辨五書置王令於水源豐國財於天府尋知吏部選事興廢繼絶不遏前人之光選賢授能必當庶尹之任旌平淑慝御以清通除許州刺史荊州大都督府長史山南採訪使坐南陽令貶洪州都督遷蒲州刺史所履之官政皆尢異黜陟使奏課第一徵為京兆尹外家公主敢縱蒼頭廬兒黠吏惡少自擒赭衣偷長恥用鈎距得情好以春秋輔義奏事盡成律令為吏飾以文儒上悅其醇方委以政頃坐營谷口別業貶高平太守又坐長安令有罪貶吳興郡別駕諸葛田園未啓明主華陰傾巧卒敗名儒天寶九載六月二十一日寢疾薨於官舍享年六十有五暨國家推五運之紀接千歲之統開釋天地與之更始宥萬方之未昭蘇敘百官之喪職秩苟有位者咸得與焉而公冥然不及見也虛蒙大賚重以為哀夫人河東柳氏父某某官言妃齊侯實惟宋子人傳夫人之禮家有大家之書以開元五年六月五日先公而卒至是以天寶十載十月二十四日合祔陪於藍田白鹿原長山公先塋禮也長子曰某官居憂而卒次子某前殿中侍御史貶晉陵郡司戶次子某等倚廬野次方銜枕之哀輿櫬歸來尚抱長沙之痛公子之輸力王室公之紀勳太常言於國竭情無私理於家陳信無愧降年不永非命而何志則有由或題季子之墓宅不改卜素有滕公之銘銘曰帝周發之苗裔兮受介圭以建侯中裂土以分晉兮又王韓以闕二字紛吾既有此內美兮闕一字忠信以為乘登麒麟兮剚白虎冠獬豸兮奮蒼鷹朝含香兮禮闈夕青兮黃扉方天公兮密啓建出牧兮高麾俄入守兮京兆賜黃金兮披皂衣捐余佩兮江中隱思君兮不可窮歌泰山兮不返夢濟洹兮遂空素車兮逶遲宛鄉關兮故時望國門兮不入到泰山兮不知瞻舊域兮松楸平原夕兮素滻愁魂兮歸來江南不可以久留天寶二年正月十二日唐故魯郡任城縣尉河東裴府君卒於西京新昌坊私第享年三十九嗚呼哀哉君諱回字玉溫河東聞喜人也曾祖宏泰皇雍州録事參軍贈上黨長史祖思義皇侍御史吏部員外左司郎中戶部吏部侍郎河東郡太守晉城縣開國子父揚珍皇嶭王府騎曹參軍自晉已降世為冠族令德不替不至於君夫其事親孝兄弟順與朋友信其從政公平而壽不中年官才一命慈母在堂諸弟未仕兒未有識女且嬰孩妻夭於前身歿於後天可問邪其若老親何其若季仲諸孤何生人之悲莫甚於是家貧祭以棗脯殮以時服以某月日祔葬於鳳棲原先府君之塋嗚呼有河東裴子之墓志之蓋古有之繼後之知者亦何有哉銘曰一死萬紀終天不復為之奈何哀哀慟哭覆載至廣庶類繁育萬物方春而就於木夫人諱某京兆霸城人也晉出三家公子尊於魏國秦亡六國時人謂之王家河南則分虎臨人華陰則老熊當道高祖德真皇左僕射祖九思京兆府三原縣令父潛河南府告成縣令大名之後重光不替夫人令儀淑德發於天姿間禮明詩傳於世業言成女誡可著於縑緗行為女師詎資於麻枲豈止彈琴吐論誦賦吟詩而已及乎有行嬪於君子事姑至孝旁穆六姻為母深慈均養七子男以無雙令德降帝子於鳳樓女則第一解空歸法王之象教閨門之訓朝野稱多既而家列公侯地連妃主珠翠滿座不御采衣方丈盈前惟甘素食同德大師大照和尚覩如來之奧昭㣥有之源夫人一入空門便蒙法印朱簾紺幰無復餘乘龍藏寶經悉通至義惠用圓滿誡力堅嚴藥藉茹葷雖愈疾而不受心已久淨縱沒齒而常安以某年月日奄歸大寂於長興里之私第厥初寢疾彌曠旬時駙馬上人柴毀骨立揮淚嘗藥身不解衣泣血持經手不釋卷晝夜懺悔非止六時身命供養寧唯七寶御醫繼踵中使重跡魂兮不反空焚外國之香生也有涯非無上天之樂某月日有詔追贈太原郡夫人襄城石窖增寵其其榮名翟茀魚軒空悲於象設以某月日安厝於某原禮也功德之至散花天女不留釋梵之筵勝鬘夫人何在嗚呼哀哉乃為銘曰天生淑德實俾宜家特能柔順深棄驕奢詎離環佩不御其華其一婦道允諧母儀具美每出誡夫停餐訓子賦掩西征書教內史其二門容高幰庭列長筵男乘翠鳳女比紅蓮繁華貴里寂寞安禪其三下闕夫人姓盧氏范陽人也昔堯命伯夷典秩宗號太常為尚父疑桓襄之際公子食盧卯金故人王於大國越石從事官至郎中曾祖士會世系表作士繪隋行臺侍御史祖某皇朝奉禮郎父某濠淄卭等三州刺史持斧衣繡威加不法奠玉瘞帛舉無違禮守臨淄而齊兒不詐去臨卭而蜀物盡留夫人即府君之長女積纍世之德鍾二門之美儀表秀整進止詳間不咨保傅動由詩禮既以士一作七族冠時遂歸齊大之偶入持門戶內事舅姑枕席溫凊於堂上環珮逶迤於堂下不脫簪珥親當浣濯元纁可實於筐篚粢盛可獻於宗廟魚軒或駕翟茀而朝衆婦於是修容夫人專之以禮克贊君子纍至大官雅政清德實多左右潞州早世深秉義方母儀可則庭訓不替女史之學多讚大家之書衆婦之儀盡稟夫人之法天與盛德不降永年以某月日寢疾薨於長安善和里享年若干以某月日合祔某山原禮也子某某官淳孝之性泣血待盡永惟令德固不可泯彰示後人乃刊於石銘曰有姜之後或邑於盧歷代種德示有稱孤從事文府振轡長途其一憲府持法奉常秉禮皇考專城腰章郡邸厚德重跡重仁繼體其二降生哲人其行惟惇儀型衆庶門冠諸姻齊姜宋子敢望清塵其三君子之二實聞高義乃躬浣濯先晨簪珥穆及外親敬是中饋其四母儀既峻庭訓載揚子以才貴煌煌寵章馳暉難駐令聞空長其五壽宮既啓高堂永寂千秋萬古山川松柏紀德志行維茲貞石其六夫人字某某郡人也其先周成王之後古之錫姓命氏或以先父之職官或因始祖之名諡漢魏以降史牒詳焉曾祖休寧某官祖某某官襲封常山公二公執帛調護儲闈九伯剖符典司方嶽父某某官漢雄右輔實拜翁歸周命僕臣惟茲伯冏夫人即太僕府君之第二女也世有明訓家無遺德蕙心紈質豈曰師成螓首蛾睂抑惟天與同雲降雪常聞柳絮之詩獻歲發春即賦椒花之頌言事姑舅宜其家室寢門才闢笄六珈而問安擊鐘未晞具八籩而獻饋染朱與緑不愆公子之衣采藻及蘋有甚季姜之祭魚軒翟茀為諸侯之夫人嗚珮垂環對有國之君子綺疏寓目助選賢人青帳藩身用酬高論善持門戶能睦族姻誡良人之從畋不嘗原獸訓愛子之為政遂返池魚言成大家之書行為衆婦之法至於彈琴製賦纂組攻書具舉百事之能仍居四德之外嗚呼降年不永春秋五十以某載月日薨於長安平康里之私第某月日祔於咸陽洪瀆原之先塋禮也不獲偕老空傷奉倩之神未始有生誰達莊周之理長子濡前某官次子澄某官次曰某某官及女等漣漣泣血煢煢在疚哀廠田坴聖善痛七子之無依文敘塞淵冀九原之可識乃為銘曰齊侯之子兮衛侯之妻膚如凝脂兮手如柔荑奉初之嘉訓兮淑德日躋供養兮姑舅簪珥問安兮先夜漏製三繅兮元纁具五獻兮籩豆翟茀兮錦衣駕魚軒兮來歸從如雲兮滿中闈忽形沈兮影絶夫傷神兮子泣血悲餘澤兮猶在怨回文兮未滅返葬兮咸陽寒天暮兮渭水長嗟梧桐兮半死無雙飛兮鳳凰維大唐開元二十五年歲次丁丑十一月辛未朔四日甲戌左散騎常侍河西節度副大使攝御史中丞崔公致祭於故姜公之靈嗚呼天子命我建旗西門帶甲十萬鐵騎雲屯橫挑強胡飲馬河源嗟爾勇健表為牙門牙門伊何全齊大族四方有事誓死鳴轂前有血刃後有飛鏃其氣益振大呼馳逐翩翩白馬象弧雕服戈舂其喉矢注其目嗚呼天下無事今上好文爾有餘勇莫敢邀勳腰鞬白首蹉跎塞雲死於裨將誰統前軍家本秦人靈車東騖長天積雪邊城欲暮麾下行哭前旌抗路身有寶劒不佩而去轅有代馬悲鳴局顧嗚呼我誡軍吏令送爾歸既素我服亦朱其衣黠虜未滅壯士長辭牢禮以祭太息歔欷尚饗維年月日將軍某等謹以清酌少牢之奠祭於故大將軍武公之靈嗚呼武公命代出㣥氣蓋朔方勇冠六軍生長下國聲聞上天天子壯之命居北門北門伊何國之重寄羽林孤兒旄頭突騎罔不畢勸為之元帥帝在紫微與君為衛身恆披堅手不捨鋭出乘天駟入並東第同官為寮出入五世顧我軍旅凜然遺風一日之長萬夫之雄身雖有極德不可窮嗚呼門館蒼黃風景淒涼櫪馬悲鳴角弓不張弔客接武哭聲滿堂嗚呼凡人有喪匍匐斯救況我武公屨及其霤盥而撫之含玉當受敢不嗣事如公之舊年月日某以茶藥之奠祭於故舍人李公之靈嗚呼見人多矣未有如子生於德門長於貴里名高江夏之童貌奪河陽之美行比顏曾才兼文史含恣輕肥抑偃紈綺惡如涕唾棄如塵滓比布衣以同年甘蔬食而沒齒嗚呼深入度門高居道源獨一靜處寂默無言待草誡之真性歸化光之法尊曠無淨染頓離塵根豈期昨日分首別離未久萬法皆空一生何有無餘槃應無所受無漏智慧斯為不朽豫以凡情哀哀其後世相謂然道心斯醜敢不從俗子其無咎惟公宏量碩德抱義戴仁早離我見常守吾真朝稱端士世謂淳人夏官之職惟賢是寄既節五官兼選騎士宿衛扞城必由茲地速應為敏平分是貴決遣先馳曹無留事嗚呼積善無慶寢疾彌留唐肆求馬夜壑藏舟深悟幻境獨與道遊死而不忘魂兮若休嗚呼某等何幸得備官屬泰然若春溫兮如玉去德何永事生何促五情如喪百身不贖敬獻醴牢哀哀慟哭尚饗惟公宏量碩德寡言敏行直而能婉和而不競闕儒墨為鋒鍔在顏冉之季孟白雲刑官繡衣使者時無寃人路多避馬既踐文昌來司武庫冀翟車之高足為鳳池之先路豈期位薄德崇才遠途窮拜命之時初一朝於北闕移疾於外不再入於南宮嗚呼哀挽悲笳寒天疏木宅不卜地祔於故塋家無餘財斂以時服弟難會葬兒未及哭其營護而奠遣惟甥姪與姻族某嘗同官實喜良友仰德彌高立言不朽居常接膝未忍分手況永訣兮無期向空筵而釃酒尚饗維載月日朔某官某乙謹以酒脯之奠敬祭於故兵部郎中房公之靈嗚呼君子之才周而不器苟求行道未嘗私身沈靜好謀話言必雅往歲穀貴關輔阻饑眷命自天發廩以賑中朝乏使屬之鄙夫不敢自賢請子為介匹夫嫠婦黃口之孤鍾釜之施罔不畢當舉無棄粒野有頌聲國家厭兵革苦徵戍大去浮食以靖國人單車諭旨萬里窮磧西度赤坂館於烏孫形勞者病神勞則夭棄成功於末路未復命而言謝死不廢命忠也尸而加紳寵也我盥而撫子瞑受含求仁得仁其誰不死玉關之下素車倭遲愁雲晝聚白雪春下絳旐從風車徒行哭至上京而不駐將返葬於關東河活活而東注天慘慘而悲風道路猶長子實途窮人世如舊子實成空我有旨酒以歆以餞想像明德歔欷出涕尚饗維載月日朔行尚書司勳郎中賜緋魚袋楊元璋等謹以清酌少牢之奠敬祭於故左司員外郎李公之靈嗚呼大朴難名大辨若訥泊兮無兆泛然隨物直而好學敏以從事行隱於寡言文成於沈醉澡身浴德惟仁與義讀書甚解作賦彌工麗詞秀務疑奧義元通記言西掖起草南宮第五將姪伏波事嫂食先與甘衣必讓好口嘗其糲身席於藳結友一言同官一日殉我朋友忘其身恤豈惟攜手亦將加膝明明天子惟賢是思恨馮唐之已老喜相如之同時罷刊書於虎觀將載筆於鳳池嗚呼病時七啓臥內一訣痛乾坤而忽窮嗟古今而長絶永言北首返葬東周何夫子之適去同衆人之若休歷千門而行哭動九陌而增愁馬悲鳴而笳咽雲寡色而風秋元璋等或結髮舊遊比肩同列悲䪥歌之首路哀柳車之就轍嗟無見而空來痛不知而成列嗚呼哀哉尚饗維年月日朔河西節度使左散騎常侍王公遣總管石抱玉以酒牢之奠致祭於故沙陀鄯國夫人之靈嗚呼惟此淑德降於異域至性不師天姿靡飾禮容詎假於環珮工藝非因於組織行閨訓於穹廬成母儀於蕃國懿此清範夫人之則沙陀令門外家之力嗚呼夫人歸命干戈遂寢子孫扞城國家高枕居之右地革其左衽散辮垂鬟解裘衣錦嗚呼降年不永遠日方臨寂矣高堂飲珠含王哀哉貴女刃面摧心嗚呼聖朝命我護此諸蕃夫人所出天子加恩能守漢制不效夷言馬無北首車必南轅教義所及忠信彌敦實嘉內訓用潔斯樽尚饗
