body:
  text: 臣代居關右周魏以來基迹不墮行成等新營莊宅尚少田園於臣之餘乞申私讓伏惟陛下情篤功臣恩隆右戚以無忌橫遭誣告事並是虛欲戮告人以明賞罰一以絶誣謗之路二以慰勳戚之心又以所犯若是真無忌便有破家之罪今告為妄宏泰即宜戮不待時且真犯之人事當罪逆誣謗之類罪惟及身以罪校量明非惡逆若欲依律合待秋分今時屬陽和萬物生育而特行刑罰此謂有傷春氣竊謂未安左傳聲子曰賞以春夏刑以秋冬順天時也又禮月令曰孟春之月無殺昆蟲省囹圄去桎梏無肆掠止獄訟又漢書董仲舒曰王者欲有所為宜求其端於天天道之大者在陰陽陽為德陰為刑刑主殺而德主生陽常居大夏而以生育長養為事陰常居大冬而積於空虛不用之處以此見天之任德不任刑也伏惟陛下纂聖升祚繼明御極追連胥之絶軌蹈軒頊之良規欲使舉動順於天時刑罰依於律令陰陽為之式序景宿於是無差風雨不愆雩禜輟祀今方太蔟統律青陽應期當生長之辰施肅殺之令伏願暫回聖慮察古之言儻蒙垂納則生靈幸甚臣聞明君馭歷當俟獻替之臣聖主握圖必資鹽梅之佐所以堯詢四嶽景化洽於區中舜任五臣懿德被於無外左有記言之史右立記事之官小大咸書善惡俱載著懲勸於簡牘垂褒貶於人倫為萬古之範圍作千齡於龜鏡伏見衡山公主出降欲就今秋成禮竊按禮記云女十五而筓二十而嫁有故二十三而嫁鄭元云有故謂遭喪也固知須終三年春秋云魯莊公如齊納幣杜預云母喪未再期而圖婚二傳不譏失禮明故也此則史策具載是非歷然斷在聖情不待問於臣下其有議者云準制公除之後須並從吉此漢文創制其儀為天下百姓至於公主服是斬縗縱使服隨例除無宜情隨例改心喪之內方復成婚非唯違於禮經亦是人情不可伏惟陛下嗣膺寶位臨統萬方理宜繼美羲軒齊芳湯禹宏奬仁孝之日敦崇名教之秋此事行之若難猶須抑而守禮况行之甚易何容廢而受譏此理有識之所共知非假愚臣之説也伏願遵高宗之令軌略孝文之權制國家於法無虧公主情禮得畢則天下幸甚臣聞克儉節用實宏道之源崇侈恣情乃敗德之本是以凌雲概日戎人於是致譏峻宇雕牆夏禹以之作誡昔趙盾匡晉呂望師周或勸之以節財或諫之以厚斂莫不盡忠以佐國竭誠以奉君欲使茂實播於無窮英聲被乎物聽咸著簡策以為美談今所居東宮隋日營建覩之者尚驚其侈見之者猶嘆其華何容此中更有修造財帛日費土木不停窮斤斧之工極磨礱之妙且丁匠官奴入內比者曾無監管此等或兄犯國章或弟罹王法往來御苑出入禁闈鉗鑿緣其身槌杵在其手監門本防非慮宿衛以備不虞直長既自不知千牛又復不見爪牙在外厮役在內所司何以自安臣下豈容無懼又鄭衛之樂古謂淫聲昔朝歌之鄉回車者墨翟夾谷之會揮劍者孔子先聖既以為非通賢將以為失頃聞宮內屢有鼓聲太樂伎兒入便不出聞之者股栗言之者心戰往年口敕伏請重尋聖旨殷勤明誡懇切在於殿下不可不思至於微臣不得無懼臣自驅馳宮闕已積歲年犬馬尚解識恩木石猶能知感所有管見敢不盡言如鑒以丹誠則臣有生路若責其忤旨則臣是罪人但悅意取容臧孫方之疾疢犯顏逆耳春秋比之藥石伏望停工匠之作罷久役之人絶鄭衛之音斥㣥小之輩則三善允備萬國作貞矣臣聞上天蓋高日月以光其德明君至聖輔佐以贊其功是以周誦升儲見匡毛畢漢盈居震取資黃綺周公抗法於伯禽賈生陳事於文帝莫不殷勤於端上懇切於正人昔鄧禹名臣方居審諭之任疏受宿望始除輔導之官歷代賢君莫不丁寧於太子者良以地膺上嗣位處儲君善則率土霑其恩惡則海內罹其禍近聞僕寺司馭爰及駕士獸醫始自春初迄於夏晚恆居內役不放分番或家有尊親闕於溫凊或室有幼弱絶於撫養春則廢其耕墾夏又妨其播植事乖存愛人有怨嗟且突厥達哥支等咸是人面獸心豈得以禮義期不可以仁信待心則未識於忠孝言則莫辨其是非近之有損於英聲眤之無益於盛德引之入閣人皆驚駭豈臣庸識獨用不安臣下為殿下之股肱殿下為臣下之君父君父以存撫為務股肱以匡救為心是以苦口之藥以奉身逆耳之言以安位古人樹誹謗之木以求已愆懸敢諫之鼓以思身過由是從諫之主鼎祚克昌愎諫之君洪業隳墜謹按比從舊唐書采録文苑英華貞觀政要所載與此不同附載於後文苑英華人有怨嗟下云願崇儒敬業訪道稽疑則品物增輝懷生欣忭今司經見無學士供奉未有侍讀伏望時因視膳奏請置人所冀講席談筵務盡忠規之道披文摘句方資審諭之勤臣又聞臣之事主必盡誠慤君之進賢務求忠讜伏惟殿下養德儲闈理以端靜為務恭膺守器必以學業為先經所以立行修身史所以諳識成敗雅誥既習忠孝乃成傳記方通安危斯辨知父子君臣之道識古今鑒戒之規經史為先斯乃急務至於工巧造作僚吏直司實為末事無足勞慮臣以庸賤獻替是司臣而不言負譴聖日言而獲罪是所甘心伏願留意經書簡略細事一蒙採納萬殞無辭乞降儲明俯察狂瞽貞觀政要人有怨嗟下云儻聞天聽後悔何及又突厥達哥支等咸要人面獸心豈得以禮義期不可以仁信待心則未識於忠孝言則莫辨其是非近之有損於英聲眤之無益於盛德引之入閣人皆驚駭豈臣庸識獨用不安殿下必須上副至尊聖情下允黎元本望不可輕微惡而不避無容略小善而不為理敦杜漸之方須有防萌之術屏退不肖狎近賢良如此則善道日隆德音自遠臣聞堯稱稽古功著於搜揚舜曰聰明績彰於去惡然開元立極布政辨方莫不旌賁英賢驅除不肖理亂之本咸在於茲况閹宦之徒體非全氣便蕃階闥左右宮闈託親近以立威權假出納以為禍福昔易牙被任變起齊邦張讓執鈞亂生漢室伊戾為詐宋國受其殃趙高作姦秦氏鍾其弊加以宏石用事京賈則連首受誅王曹掌權何竇則踵武被戮遂使搢紳重足宰司屏氣然順其情者則榮逮幼沖忤其意者則災及襁褓爰暨高齊都鄴亦弊閹官鄧長禺位至侍中陳德信爵隆開府外干朝政內預宴私宗枝藉其吹噓重臣仰其鼻息罪積山嶽靡挂於刑書功無涓塵已勒於鐘鼎富踰金穴財甚銅山是以家起怨嗟人懷憤歎骨鯁之士語不見聽謇諤之臣言必被斤齊都顛覆職此之由向使任諒直之臣退佞給之士據趙魏之地擁漳滏之兵修德行仁養政施化何區區周室而敢窺覦者哉然杜漸防萌古人所以遠禍以大喻小先哲於焉取則伏惟殿下道茂重離德光守器憲章古始祖述前修欲使休譽遠聞英聲遐暢臣竊見寺人一色未識上心或輕忽高班或陵轢貴仕便是品命失序綱紀不立取笑通方之人見譏有識之士然典內職掌唯在門外通傳給使主司但緣階闥供奉今乃往來閣內出入宮中行路之人咸以為怪伏望狎近君子屏黜小人上副聖心下允衆望謹啓夫素秋肅煞徑草標於疾風叔世艱虞忠臣彰於赴難銜須授命結纓殉國英聲煥乎記牒徽烈著於旗常豈若釁起蕭牆禍生蕃翰強踰七國勢重三監其有蹈水火而不辭臨鋒刃而莫顧激清風於後葉抗名節於當時者見之宏義明公矣君諱誕字元憲安定朝冉人也昔立效長邱樹績東郡太尉裂壤於槐里司徒胙土於耐門是以車服旌其器能茅社表其勳德銘功衛鼎騰美晉鐘盛族冠於國高華宗邁於欒郤備在史牒可略言焉曾祖重華使持節龍驤將軍梁州刺史潤木暉山方重價於趙璧媚川照闕曜奇彩於隋珠祖和雍州贊治贈使持節散騎常侍車騎大將軍儀同三司膠涇二州刺史高衢將騁遽一友追風之足扶搖始搏早墜垂天之羽父璠使持節驃騎大將軍開府儀同三司隨州刺史長樂恭侯橫劍梐枑威重冠軍析瑞蕃條聲高渤海公量包申伯稟嵩山之秀氣材兼蕭相絳昴緯之淑精據德依仁居貞體道含章表質詎持變於朱藍恭孝為基寧取訓於橋梓鋒剸犀象百鍊挺於昆吾翼掩鴛鴻九萬奮於溟海搏韜骨産文贍卿雲孝窮溫凊之方忠盡匡救之道同何充之器局被重晉君類荀攸之宏圖見知魏主斯故包羅衆藝囊括㣥英者也起家除周畢王府長史榮名蕃牧則位重首僚袨服睢陽則譽光上客既而蒼精委馭炎運啓圖作二邊服實資令望授廣州刺史悅近來遠變輕訬於雕題伐叛懷柔漸淳化於緩耳蜀王地處維城寄深磐石建旟玉壘作鎮銅梁妙擇奇材以為寮佐授公益州總管府司法昔梁孝開國首辟鄒陽燕昭建邦肇徵郭隗故得馳令問於碣館播芳猷於平臺以古方今彼此一也尋除尚書比部侍郎轉刑部侍郎趨步紫庭光映朝列折旋丹地譽重周行俄遷治書侍御史彈違糾慝時絶權豪霜簡直繩俗寢貪競隨文帝求衣待旦志在恤刑呪網泣辜情存緩獄授大理少卿公巨細必察同張季之聽理寬猛相濟比于公之無寃但禮闈務殷樞轄寄重允膺此職實難其人授尚書右丞洞明政術深曉治方臧否自分條目咸理丁母憂去職哀慟里閭鄰人為之罷社悲感衢路行客以之輟歌孝德則師範彞倫精誠則貫徹幽顯雖高曾之至性何以加焉尋詔奪情復其舊任於時山東之地俗阜民澆雖預編民未行聲教詔公持節為河北河南道安撫大使乃賜米五百石絹五百匹公輶軒布政美冠皇華之篇擁節觀風榮甚繡衣之使事訖反命授尚書左丞然並州地處參墟城臨晉水作固同於西蜀設險類於東秦實山河之要衝信蕃服之襟帶授公並州總管府司馬加儀同三司公贊務大邦聲名籍甚精民感化黠吏畏威屬文帝劍璽空留鑾蹕莫反楊諒率太原之甲擁河朔之兵方叔段之作亂京城同州吁之挻禍濮上雖無當璧之兆乃懷奪宗之心公備説安危具陳逆順翻納魏勃之策反被王悍之災仁壽四年九月溘從運往春秋五十有一萬機起殲良之歎百辟興喪豫之悲切孔氏之山頽痛楊君之棟折贈柱國左光祿大夫封宏義郡公食邑五千戶諡曰明公禮也喪事所須隨由資給賜帛五千段粟三千石惟公溫潤成性夙表白虹之珍黼黻為文幼挺雕龍之彩行已窮於六本蘊德包於四科延閣曲臺之奇書鴻都石渠之祕説莫不尋其枝葉踐其隩隅譬越箭達犀飾之以括羽楚金切玉加之以磨闕救乏同於指囷親識待其舉火進賢方於推轂知已俟以彈冠存信捨原黃金賤於然諾忘身殉難性命輕於鴻毛齊大小於沖襟混寵辱於靈府可謂闕四字冠冕時雄者也方當亮采泰階參綜機務豈謂世逢多故運屬道消未展經邦之謀奄鍾非命之酷世子民部尚書上柱國滑國公無逸以為邢闕一字之下闕三字仲之闕三字之東誰知子孟之墓乃雕戈勒石騰實飛聲樹之康衢永表芳烈庶葛亮之隴鍾生禁之以樵蘇賈逵之碑魏君歎之以不朽乃作銘曰上闕九字時翼主膺期佐帝運策經綸執鈞匡濟門承積慶世挺偉人夜光愧寶朝采慙珍雲中比陸日下方荀抑揚元闕申裾朱邱名馳碣石聲高建禮珥筆憲台握蘭文陛分星裂土建侯開國轉藉正人相資懿德中臺輟務晉陽闕桐成師搆難太叔興戎建德效節夷吾盡忠命屯道著身歿名隆牛亭始卜馬鬣初封翠碑刻鳳丹斾圖龍煙下闕闕三十四字之功至如三傑贊泗水之基十臣崇鎬宮之業遂使體元垂拱成俗闕十九字之闕一字股肱屬闕二字之期預闕一字試之謀猷參隨山之經啓位隆政本榮重分符騰芳五牛之旌勒功九龍之鼎闕二字潁川定公矣公諱良字仲良潁川人也昔獻子輔政名重六卿師伯執鈞譽高三事實潁川之望族乃酆邑之華宗者也代有名臣家傳懿德冠冕被乎青史功業著於丹闕一字茂績洪勳可略言矣曾祖演魏征虜將軍恆州刺史受律清廟威震細柳之軍分竹大藩聲冠雲中之守祖褒魏侍中周使持節開府儀同三司原涼二州總管闕二字少保闕二字貞公從政闕二字六官以宏政本贊化闕一字路三孤以闡皇猷父紹周昌樂郡守隨儀同三司驃騎將軍衛尉少卿金崖縣開國公職典五戎闕九字含英聲冠於棘闕一字惟公稟氣闕一字和降神靈嶽含章育德敬業居闕一字立身極於九言追孝盡於三道稽覽握河之異説盡性知微旄頭嵩闕十六字濯清江辨溢談叢若長河之瀉砥柱類子將之甄闕一字俊造俟以彈冠方林宗之題目通賢佇以結綬可謂衣冠之領闕十六字學生仁壽闕一字年被舉授吏部朝散郎習業璧池譽光函丈策名禮閣聲動周行大業元年除河東郡司功書佐九年闕十四字謁闕一字對揚丹陛風範映於簪纓敷奏青蒲韶音振於金玉百寮為之矚闕一字九流於焉傾首十二年丁父憂同高柴之泣血三年類曾參之不食闕一字日對風樹而愈感踐霜露而增哀時屬金鏡潛光望夷有弒酷之禍玉繩掩曜成周致蒙塵之災於是四海混淆九圍板蕩我高祖乘時撫運出震握圖膺五運之寶符定九牧之神鼎元冠紫綬賁帛嘉於琳琅裂土剖符寵命屬於翹楚乃授公銀青光祿大夫馮翊郡丞京師擁叛殷之徒布闕一字野之衆率怨秦之卒拒霸上之師地陳箕張佳兵於是喪律天羅雲布闕一字池所以失險公運制勝之謀當疇庸之賞加左光祿大夫賜物七百段授大理少卿闕一字斯三闕一字罷人絶於嘉石察茲五禁寃氣散於員扉三年奉使入蜀敕便宜從事公傳檄而伏冉駹折簡而降彭濮遂使斯榆稽首庸蜀順化太宗闕一字膺闕三字敷化陜服握兵符以清國步施文德以格遠人公與行臺僕射屈突通禮部尚書溫大雅或竭忠以匡多難或勵行以革頽風或博識該於石渠或縟藻麗於闕二字所以特降詔旨令事府幕尋授陜東大行臺左丞五年判天策府從事其年劉黑闥薦食三魏吞噬兩河爰詔中權以申薄伐以公為元帥府長史公陳擊員破方之略建塞井減竈之謀似白起之拔夷陵如柴闕一字之屠參合策功行賞授上柱國賜闕一字十人物六百段復攝天策府司馬獫狁孔熾背約違盟騎入蕭關兵屯洵邑主上情存綏撫未動干戈令公銜命虜庭示其禍福公曉之以逆順喻之以安危若數項王之十愆似責息侯之五犯遂使尸逐膜拜谷蠡屈膝既立和戎之功遂降殊常之賜又攝吏部侍郎九年復轉陜東大行臺戶部尚書其年又除安州大都督貞觀元年詔授戶部尚書三年改除刑部尚書施七教以闕一字人掌五刺以闕一字獄司會之職尤重常伯之望愈隆秦川大藩天闕二字鎮首席之任本藉英才授公右光祿大夫秦川都督府長史總撿校闕一字府事封潁川縣開國公昔膠西為國相之者仲舒梁孝闕一字藩輔之者長闕五字之業光磐石之宗以公方之彼有慙德庶輔仁無爽調一氣於泰階闕十字豈謂素王入夢忽悲辰已之年豎子為災翻厄膏肓之疾貞觀十一年遘疾薨於安興里第春秋五十七昔柳莊長逝衛喪闕十一字今方古異代同傷詔贈兵部尚書餘官封並如故諡曰定公禮也其年十一月五日遷厝於雍州三原縣宏化鄉永徽五年詔贈太子太保闕五字公雅量汪汪澄波瀾於萬頃宏材鬱鬱挺棟闕一字於千尋以闕一字禮為隄防將仁信為介胄漢考故事首問於伯仁晉訪舊章先請於武子偶潘而稱趙璧闕二字而闕一字仙舟牆仞難踰遠方日月芬芳可習近譬芝蘭家行著於鄉閭美譽滿於簪紱積善餘慶人物邁於三闕一字庭訓有方世德光於萬石闕一字行闕三字重一時闕一字天闕一字地遊塋湮闕一字庫寒來暑往墓入齊宮所以勒徽烈於豐碑樹華表於神道乃為銘曰闕一字精握圖赤闕一字表震翦商功立開闕二字盛若木分枝闕一字原得姓獻子匡國司空輔政門挺台輔世誕英哲三相之昆五侯之葉金聲玉振蘭芬氷潔節固捎雲闕二字員闕一字世逢運否時遇國屯玉闕二字迹金雞失晨黃道積霧絳闕飛塵寶焚崑岫鼎沒泗濱電照興王河清啓聖下截四海上齊七政氛靜地輿雲開闕二字業預鍊石功參佐命擁節劍門闕一字官列棘位亞八柄聲高六職始司天憲爰掌邦則鳴玉趨朝析圭開國駸駸隟駒滔滔逝水寶喪圭璧梁摧梓倏闕五字蒿里魂掩一邱名傳千闕二字墳巳卜滕室初開闕一字馬闕一字步廣柳徘徊舟遷巨壑水淺蓬萊勒茲琬璧長旌夜臺
