front:
  text: 全唐文欽定全唐文卷一百四十四志寧字仲謐京兆高陵人高祖入關迎謁長春宮授銀青光祿大夫太宗朝官中書侍郎加散騎常侍行太子左庶子遷侍中永徽時封燕國公拜尚書左僕射同中書門下三品顯慶四年拜太子太師麟德二年卒年七十八贈幽州都督諡曰定
