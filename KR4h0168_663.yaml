front:
  text: 全唐文欽定全唐文卷六百六十三白居易八
  hash: sha256:15ffec68ebaecfe3c0dc695d67886cf134fa89344917e2d6a5682070653d43b8
body:
  text: 敕李宗河等夫綱一提則㣥目舉源一澄則衆流清故朝廷命官師選寮屬亦得其人矣按內史公綽奏宗河學古修巳練達道理乃乞為甸縣令勵節徇公通詳典故乞為天府掾况渭南封圻之守邑戶曹府籍之要司位雖未高職亦不細宜乎以三語自試以一同自效無俾爾長貽失舉之責焉可依前件敕某官馮宿等凡品秩之制有九自五而上謂之貴階而宿司吾言注持吾憲籍照以降皆著勤由朝議郎一進而及此此之所以為貴者蔭及子命及妻豈惟腰白金服赤茀從大夫之後而已寵數既重思有以稱之並可朝散大夫裏行高諧河東節度參謀兼監察御史崔植並可監察御史三人同制敕某官王申伯學優行茂飾以詞藻執禮定議多得其中某官高諧溫莊潔白不交勢利某官崔植外和內直通知政典在倫輩內而人皆謂之滯淹惟是三子之才吾得於御史中丞僧孺御史吾耳目官也非清明徑正不泥不撓者安可使辨淑慝振紀律廣吾之聰明焉並命同升無忝是舉可依前件敕殿中侍御史溫造嘗糾天府不曠官馳軺車不辱命况為人外和內決以兼濟為心拔居殿中以備時使會吾憂兩河間事求可諭朝旨慰人心者使焉揆效酌能汝中吾選故不待滿歲擢為右史出則銜吾命入則記吾言獎任不輕思有所立可依前件敕故某官高芳㯋等昔文王葬枯骨之無知也但惻隱之心不忍棄也故天下皆歸仁焉况捐軀之魂死節之骨見危授命朕甚憫之深州故小將高某等四人皆從戰陳連歿王事褒贈之數宜其有加並命追榮以光地下可依前件敕度支員外郎崔咸漢以四科辟士求多略不惑強明決斷者任三輔令故今兩京令缺亦擇尚書郎有才理者補之而咸在郎署中推為利用加以詞學緣飾吏能操割洛陽必有餘力然宰大邑如烹小鮮人擾則疲魚擾則餒寬猛吐茹其鑒於茲可洛陽令敕前復州刺史周願等夫勞者之思休息病者之思救療人之本情也今兵戈甫定物力未豐如聞湘衡巴漢之間人猶疲困宜擇良二千石俾休息而救療之而願鋭鯤等前以符竹分領三郡皆有善政達乎朝廷舉課考能無愧是選息勞救病其有望於汝乎河中吾之股肱郡也二尹職而佐府事者亦在得人命鯤處之無荒厥職可依前件軍巡官獨孤涇可監察御史壽州團練副使馬植可試校書郎涇原掌書記程昔範可試正字涇原判官六人同制敕某官楊景復等士子不患無位患已不立苟有所立人必知之惟爾等六人蘊才業文咸士之秀者果為賢侯交辟俾朕得聞其姓名是用各進其秩分授以職若修飾不已籌謀有聞則鴻漸之資當從此始而景復稟訓祗命頗著令稱故因滿歲特假臺郎古者功臣之良入補王職朝獎非遠爾其勉之可依前件敕某官殷祐夫吏寬信則人人不偷吏廉明則人人盡力吾觀祐之為政其近之乎前守盧江能率是道歲會課第甲於他州俾精前功且佇後效宜換符竹移牧鄭人在春秋時鄭為侯國武公善於其職子産遺愛於人人無古今吏有能否聽吾用汝汝其嗣之可鄭州刺史敕尚書郎自奏議彌綸外凡邦之牲豆之品醴膳之數實糾理之今文昌長佐春官卿以朝散大夫守祕書丞上柱國李德循籍訓於台庭業官於書府揆才考第得補為郎司膳缺員爾宜專掌可尚書膳部員外郎餘如故敕馮翊吾左輔也分理浩穰率先風化故其選任次內史一等而冠四方嶽牧之首焉宜求吏課高位望重者分部共理以夾輔京師尚書右丞賜紫金魚袋張正甫自登臺閣為人讜直物論時望敬而重之及領藩部為政寬將吏黎庶信而愛之所謂朝廷正臣郡國良吏常有惠政加於是邦逮茲五年去思猶在故輟臺轄再委郡符宜敬服新命增修舊政俾吏畏如夏日人歸如流水慎於終始典於厥官可持節同州諸軍事守同州刺史充本州防禦使散官勳如故敕近歲以來副相多缺朝綱國紀專委中憲而侍御史一人得總臺事以左右之今御史中丞德裕以中散大夫行尚書吏部員外郎上柱國崔琯守文無害蒞事惟精在郎署中推其才理奏補是職請觀其能因而可之仍加寵秩操執舉措爾無自輕可行尚書職方郎中兼侍御史知雜事散官勳如故敕尚書右丞韋綬等朕在東宮時先皇帝垂慈聖之德念豫沖蒙選端士通儒使講貫今古自禮樂刑政暨君臣父子之道博我約我日就月將俾豫今不至墻面克荷丕訓大揚耿光實綬放公著之力也故朕嗣位未逾時月或自郡邸或自省署徵擢寵用為丞郎給事官雖超拜職亦俱舉師道光而心逾讓人爵貴而心益恭宜更褒升重酬輔導以綬精粹辨博有先儒之風可作秩宗以放端明慎重行君子之道可居憲部以公著檢敬規度得有司之體可二冬官於戲貞百工平五刑典三禮皆重任清秩豫無愛焉蓋欲表二三子道不虛行而明豫一人德無不報也綬可禮部尚書放可刑部侍郎公著可工部侍郎餘並如故敕扼淮壓湖一作湘之列城曰泗與嶽州車會焉軍戎屯焉是二郡守不易為政先是守一作分領者多會有故歲時罷去長吏數易人必重困宜擇良二千石救而養之以諒自澄城長訖尚書郎中間又再為州牧三宰劇縣皆苦心恤隱煦嫗及物操刃決滯砉騞有聲而愈亦學古入仕甚自修飾河西有政次於諒焉故命愈守嶽命諒守泗仍以戎職留事憲章綬一加於諒諒其聽之哉異日吾將以重官劇職處爾爾安得不副吾所急用爾所長更宜以難理之郡自試爾各依前件敕某官裴廙貞觀初張行成為殿中侍御史糾劾巡察時以為能朕思宏貞觀之風故選御史府官亦先其精敏剛正者以爾廙動循道理語必信直勵其志節有類行成因授厥官無忝吾舉可殿中侍御史敕語曰使於四方不辱君命可謂士矣况馳輶軒奉璽書稱天子之使以耀焜絶域者豈容易其選哉少府監裴通溫敬忠實加之謹敏有言語可任以專對有辨識可委以便宜屬北方君長來告代嗣求可以將命展禮申吾哀榮之恩者其任不細頗難其人擇臣者君而通可使命為副丞相而加金貂之貴授冊與節臨軒遣之庶乎遠而有光華且欲使絶俗殊鄰益敬吾使也可依前件敕仲尼曰志有之言以足志文以足言言之無文行而不遠故吾精求雄文達識之士掌密命立內廷甚難其人爾中吾選朝散大夫守尚書祠部郎中知制誥上柱國賜緋魚袋元稹去年夏拔自祠曹員外試知制誥而能芟繁詞剗弊句使吾文章言語與三代同風引之而成綸綍垂之而為典訓凡秉筆者莫敢與汝爭能是用命爾為中書舍人以司詔令嘗因暇日前席與語語及時政甚開朕心是用命爾為翰林學士以備訪問仍以章綬寵榮其身一日之中三加新命爾宜率素履思永圖敬終如初足以報我可守中書舍人充翰林學士仍賜紫金魚袋散官如故敕漢詔丞相歲舉質直忠厚遜讓者蓋所以急賢俊扶政教厚風俗也然則退藏疏賤之士苟有一善尚搜而揚之况任久位崇才全望重而不致於急官要職者將何以紀綱庶政而羽儀朝廷焉正議大夫守右散騎常侍上柱國賜紫金魚袋孔戣自十年來歷中臺左曹國庠卿寺洎藩守近侍之職各於其任皆有可稱矧又貞白端莊淡然自立進無矜滿之色居無墮替之容求之周行不可多得若戣者宜尚扶政教厚風俗之選也尚書丞掌決百事樞轄六曹晉魏已還右卑於左惟有立者可以糾吏惟無瑕者可以律人無以易戣往恭乃位可尚書左丞散官勳賜如故敕試太子司議郎柳傑等古者公府得自選吏屬今仍古制亦命領征鎮者必先禮聘而後升聞矧鄭滑帥承元輸忠仗順炳焉有大節於國奉上蒞下實藉寮寀以左右之而傑等或緣飾詞華或貯蓄才行揣摩思誠以待已知宜展籌謀用光慰薦傑可某官充鄭滑節度推官敕古者帝子下嫁必使王公主焉近代或有未笄年而賜湯沐者亦加公主之號以寵重之第十二妹等先皇帝之子也比朕之子宜加等焉故當幼年各封善地咸命為長公主未及釐降先開邑封所以慰太后慈念之心表先帝肅雍之訓亦欲使吾孝理之道敦睦之風自骨肉間以及天下可依前件敕王者有褒贈之典所以旌往而勸來也其有淑順之德標表母儀者聖善之訓照燭子道者又有名高秩尊祿養之不逮者霜降露濡孝思之罔極者非是典也則何以顯其教而慰其心焉國子祭酒韓愈母某氏等蘊德纍行積中發外歸於華族生此哲人為我藎臣率由茲訓教有所自恩不可忘是用啓郡國之封極哀榮之飾嗚呼歿而無知則已苟有知者則顯揚之孝追寵之榮可以達昊天而貫幽穸矣往者來者監豫心焉可依前件敕某官駱峻桂林守土臣式方言梧為要郡兵後人困乞廉貞吏以撫之又言峻守道抱器可以起用朕方思良吏以活元元適副所求即可其奏宮寮郡印命服嘉名四者與之足為優異峻宜副所舉慎所為無以滋章為聰明無以鹵莽為高勉率中道往安梧人可梧州刺史敕某官劉約等惟爾先人太師濟經武秉哲為國元臣鎮陽之役實歿王事茂勳大節書於旗常惟爾兄司空總象賢纂戎以續名業納忠於王室振耀其家聲而爾約等亦能稟守其風忠恭孝友念義方之訓而不墮居貴介之地而不驕况兼器能皆可任用授郡符而加命服者五升朝序而佐環衛者六朱轓紫綬煥赫相望勳德之家於斯為盛嗚呼昔武子有遺愛晉人憐其子趙季有篤行漢朝寵其弟今以濟之仗順積善宜鍾慶於子孫以總之輸忠立愛可延賞於弟姪多與爵祿豫無惜焉欲使天下知爾父兄忠順之若彼而國家報施之如此可依前件敕國家設十二衛猶漢之有南北軍而左右羽林尤稱親重自諸衛而移鎮者謂之美遷左神武將軍王元輔生勳伐之家通吏理之事佐戎臨郡率著能名可以掌勾陳而護建章備巡警而嚴羽衛大將軍事假而行之宜勵初終副茲寵任可依前件敕古者通守守土刺史按部從宜務今則合之故任日崇而選日重非廉平直兼愷悌之德者曾不足中吾選焉某官丁公著嘗以學行禮法誨豫一人報德圖勞連加寵擢起曹書殿兼而委之二職增修三命益敬朕以浙河之左抵於海隅全越奧區延袤千里宜得良帥俾之澄清往分吾憂無出爾右假左貂而帖中憲操郡印而握兵符勉哉是行佇聞報政可依前件敕天官太宰秩序常尊自昔迄今冠諸卿首非位望崇盛者不可以處之而朕即位以來凡命故相領者三矣逮此而四可不重乎東都留守防禦使檢校刑部尚書兼御史大夫滎陽縣開國公鄭絪有邴吉之寬裕子産之恭惠合而為用藩輔四朝故事遺愛留於官次國之都府半在東周委以保釐人安吏肅重煩耆德入領冡卿昔魏用崔炎毛玠典吏曹一時之士以廉節自勵國朝以宋璟一作景李乂掌選部亦能遏絶訛僞振張紀綱官無古今得人則理吾言及此欲爾繼之可吏部尚書敕李晟昔管仲云升降揖讓進退間習臣不如隰朋今之通事舍人近此選也而晟常中此選善於其職故相導通奏之節宣揚拜起之儀引而贊之不聞失禮既終喪紀宜服官常可使束帶曳裾為吾謁者可通事舍人敕徐登京兆尹言登前為涇陽令清廉直奉法愛人請補醴泉再考其績昔子路理蒲仲尼誨曰愛而恕可以容困溫而斷可以抑姦今醴泉人與蒲相類宜用此道往訓養之歲時之間期於報政可醴泉縣令敕王汶善修其身為時良士善訓其子為國憲臣况以時制之年知終請老不加優秩何厚吾風禮大夫七十而致仕故我以朝散贊善二大夫之爵加乎爾身惟秩與年兩皆得禮以茲退去亦足為榮可依前件敕元公度吾欲理化萬方故自近始前授大宗正䎖印綬使牧華人䎖能副吾此心選吏責課言公度廉明有守乞宰華陰當道東西往來先是為邑者多飾廚傳舍奉賓客以沽名譽而不親吾人爾能革之足為良宰敬長畏法無慢乃官可華陰縣令敕韋彪等善觀人者先考其能然後授以事使輪轅鑿枘各適其用則㣥職庶政得以交修今以彪宦久年高勤於為政俾從優逸入補王官以歸厚文行器能辱在巴峽勵精為理績茂課高區區萬州豈盡所用且移大郡稍展奇才以旻早著戎功通詳吏事西南物土罔不周知習俗從宜宜守嚴道分命以職各用所長庶乎咸修乃官同底於理可依前件敕經曰立身揚名以顯父母孝之終也而絪等學文武之道以飾厥功可謂善立身矣居將相之位以光大其門可謂能揚名矣夫自家所以刑國本立而後道生必待我哀榮之恩方成爾始終之孝是用啓封追號各顯乃親慰後光前孝道備矣可依前件敕劍南西川雲南安撫判官奉議郎殿中侍御史內供奉飛騎尉賜緋魚袋盧商等士之束髮立身為知已用也無遠近無勞逸但問所務者何所從者誰耳今蜀之帥潞之長皆勤於述職妙於揀賢多得其俊材樂告以善道故以參其選焉或從事有勞或即戎奔命輟元黃之著述振銅墨之滯淹以良士而贊賢侯宜乎多成功而鮮敗事矣勉思所立各服乃官敕夫生立勳勤下以忠事上也歿加褒飾上以義答下也忠義臻其分哀榮極其恩而君臣之道全矣故奉天定難功臣開府儀同三司檢校兵部尚書兼左衛上將軍御史大夫李演忠信以為幹義勇以為器器與幹合鬱成將材故出長諸侯入統七萃拊巡警衛朕甚賴之方深倚仗遽此淪謝茲豫所以當寧興念廢朝軫懷聞鼙鼓而長太息者也追崇之命宜有加焉可贈太子少保敕壽州刺史李諒等詩云愷悌君子人之父母朕三復斯言往往興嘆安得循吏俾父母吾人乎吾前命諒為泗守未即路會壽守植卒因改諒守壽命公幹守泗諒之理課前詔詳矣公幹自尚書郎連領二郡政平法一甚便於人加以有理戎之材可付留事故輟軍保一作倅仍憲秩而兼寵之夫壽與泗皆郡之大者也諒與公幹皆二千石之良者也以大都委良吏不亦宜乎噫諒無忘澄城之理公幹無替亳城之政則愷悌之化吾有望於二郡焉諒可壽州刺史公幹可泗州刺史敕某官柳某昔先皇帝知爾有材元和以來應用不暇及領榷管漕運之務屬陵寢郊邱之禮財給事集時乃之功宜有轉移以均勞逸况聞牢籠無遺利課督有常規今詔刑部尚書播代之亦令守而勿失朕將興理化先務根本凡百職事悉歸有司惟茲夏官實掌戎政稽調補今方其時司馬二卿佐平邦國是爾本職無忘增修可守兵部侍郎敕崔元備等禮莫重於復土事莫大於慎終使朕以孝敬之誠獲貢於先帝實賴左右侍從之臣服勤祗事展四體而竭一心誠俾豫無悔賞不敢忘爵不敢愛爾宜疏封服命而揚之可依前件敕前齊州刺史兼御史中丞劉約故太保濟之子太尉總之弟也吾嘗思濟之功總之忠而嘉約之謹厚纍遷至齊州刺史在官無敗事罷秩有去思念舊録能宜當寵用况公侯之後約有通才封域之間棣為要郡委之共理誰曰不然可使持節棣州諸軍事棣州刺史依前御史中丞散官勳如故造可朝散大夫三人同制敕朝請大夫使持節澧州諸軍事澧州刺史上柱國賜紫金魚袋李肇等乃者李景儉使酒獲戾而肇等與之會飲失於檢慎宜有所懲由是左遷分為郡守今首坐者既復班列緣纍者亦當徵還但以長吏數易其弊頗甚况聞三郡皆有政能人方便安不宜遷換故吾以采章階級並命而就加之蓋漢制進爵秩降璽書慰勞良二千石之旨也爾當是命得不勉哉門下鎮寧三邊左右百揆兼茲重任必授全材某鎮節度使某乙天與忠貞日彰名節德溫以肅氣直而和明略足以濟時英姿足以遏寇纍經事任歷著勳庸中權之令風行外鎮之威山立戎夷懾服漢兵無西擊之勞疆場底寧胡馬絶南牧之患禁暴而三軍輯睦除害而百姓阜安千里長城一方內地實嘉乃績爰朕心夫竭力輸誠為臣之大節念功懋賞有國之恆規顧茲忠勤宜進爵秩爾有統戎之略已授旌旄爾有宣贊之猷特加端揆往踐厥職其為有終可尚書左僕射餘如故主者施行
