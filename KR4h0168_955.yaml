body:
  text: 原夫大道沖元皎三徽於祕象真闕一字寂滅窮四諦於宏津故知化闕一字天中證涅槃而闕一字解神遊闕四字劫而闕一字因緣寶介福而無量寄花奉佛功猶未泯福不唐捐是知教自東闕二字雲雷之化闕一字道光南土闕一字極樂之門巍巍乎闕一字將聖之迷路蕩蕩乎扇闕二字之無珍乃使四地不住二景無停推律管以闕一字年轉玉音而同氣有靈之闕一字莫貴於人人倫之重莫先於孝今有清信佛弟子上谷郡闕二字成公曰思闕一字周公之允緒奕葉相承更有志成桑公曰闕一字生闕一字同闕二字一堂生居徐部皆是種植闕二字識苦海之難闕一字知法船之運巳早覺火宅以闕一字焰闕二字之闕二字也不才闕三字之門諸宣考取藉其詞雖聞人闕一字陵雲闕二字童闕一字之闕二字思闕二字賈闕一字於詞林冀闕一字伐之闕一字芳保介福而無量遂去闕一字九載闕一字日闕二字忽蒙寐闕四字境施伽藍地一所號曰神化又建立神碑一闕一字造阿彌陀佛一軀上元闕四字安樂天下廓清師僧父母常保康闕一字見存眷屬闕二字十闕一字七代先闕四字其碑乃直匠刊琢藻繢瑩然立岌乎狀蓮萼而闕一字雨露璀璨乎若闕一字山而控瓊樹其龍也莊嚴煥然暉赫曜闕一字即得闕三字輪復闕一字爛闕一字之眼眩思之意亂其像乃光明赫奕闕一字弊衆星其地也左望連青之闕一字右眺任城前林滕阜却闕一字敬夫其時信仕闕二字咸曰闕三字人傾邦俱稱闕一字大乃為詞曰古照三空闕一字元闐寂智度闕一字普闕五字中貞闕一字孝闕二字聞造像建立闕二字同闕一字其一三界眇芒四大成虛取闕三字貞心未餘闕三字海入清淨廬三乘一合不住闕二字其二下闕一字由闕一字易谷陵無恆匪闕十一字妙法真能天闕一字地闕二字相常存其三違西天之禁戒犯中國之條章不思流水之心輒舉庖丁之刃既集徒侶須務極刑各決三十用示伽藍天開圓月水淨方塘月則桂華初滿水則蘋風不揚徘徊委照瀲灩交光素魄將臨合浦之珠乍吐清漣同映玉壺之冰始藏契禪心之寂寂發郢思之蒼蒼何茲景之逾麗信終夜之難忘況乃萬里澄埃三秋罷霧始朣朧之啓夕巳奫淪之納素前臨不測姮娥下入於河宮永望長空明鏡上騰於天步碎蟾影於龍鱗之浪混瓊華於雪毛之路天泉合而益空毫芒鑒而必具故夫秋以為節氣以宵凝紅蕖落而渚淨白露降而波澄泳之遊之始方舟而取玩今夕何夕若乘槎而上升豈獨發清管滅華燈思淒切於阮戶光漾蕩於玉繩而巳哉觀乎麗天者月習坎者水水以柔而居月月以輝而垂美一鏡合而內外澄鮮雙影分而上下相似驚夜聲於鳧鵠鋪皓彩於蘋芷規沉泉底豈魚目之能倫勢出波中乍洛之可擬異乎纖纖樓上的的雲端未若麟不鬬於天宇魚不驚於釣竿舟蕩漾而煙空轉麗風淅瀝而桂影生寒佇以取鑒適夫情性寂以喻道斯道也逾深色以喻空其空也逾淨故體上善之為德中含光而不競既彰元教之樞用播詩人之詠天地為大不能獨生山川通氣然後化成故雲者氣也感時而先出雨者施也憑雲而後行亦由將有邦家神必生其賢智獲其輔佐化乃洽於文明且觸石爰分陵空可覩雜峯巒而勢逸奇狀掩山川而氣騰雄怒變而可大隨風散以飛揚用而有成從龍作為霖雨因知雲之將出合君臣之道賢之將來為帝王之輔所以神致命於開周嶽降神而生甫者巳天不我欺雲出以時濟旱災而有望播膏澤而無私則臣既在茲君當以維黃彩有豐年之驗青光表舉賢之期豈獨郁郁紛紛合嘉氣以成慶朝朝暮暮向陽臺而有思其為體也且多其為狀也難及舒則杳冥而無際卷則涓液而並入況至帝鄉而散城邑隨蓋狀以徐轉對陳影而遙集君無謂輕虛而不真君無謂悠揚而不親有以通天地而為化有以合陰陽之至神與道興滅隨時屈申為君重陰覆萬人於炎暑為君載雨滌四海之埃塵蔽虧窮巷繞山扉以升降回旋翠幄拂仙家而帛丿糸邈應賢為瑞願浮色於洛川改容非煙冀騰光於崑嶽甲常寄食同韓信之未遇景朝朔望拘孔光之暮年王者優賢仍存几杖之禮主人愛客遂陳觴酌之儀三爵初行未應醉止上樽有闕罪即司存既而鳩鬬社中華他於焉辭去醴酒不設穆生所以言歸非養老之恩有虧乃起訟之徵斯驗害人無兆本非謀殺之條供秩乖儀須遵闕養之律罪歸酒正請送士師誣告主人應科反坐樂章修設國風式備延陵聘魯竟辨興亡之徵魏絳和戎始受歌鐘之賜干舞有序上下於是協和金奏克諧陰陽以之交泰所以考性情之不忒質鬼神之無疑靖俗調人比物適節雖擊石拊石萬物必諧於大雅而不識不知百姓尚迷於古奏然而古今異制沿襲匪常皂蓋朱軒按國章而有著奏籥振萬徵古禮而斯易學操縵於雅曲乃大輅之椎輪感頌漸音行當易俗何必引軒判之制操賓祭之儀非所言焉象刑之典宜及古之制也鹵簿之例徒施去聖久遠微言將絶人用其私各安所見闕文不及大義巳乖非有獨見之明誰解僻儒之患甲總核六藝研精百氏紕繆必考朱紫斯分既祖述於魯儒升我堂矣自光揚於漢策職爾之由竹簡之書且或朽蠧金碑之宇道茲鐫刻魏文典論起列鴻都揚子元經虛傳麟閣觀者如堵且聞紙貴將萬古而不刊於千兩而何有京尹之罰其或病諸既無索於杜季庶息威於寧越蘭之猗猗窅窅其香遁世無悶抱道深藏不以無人而遂廢其芳磅礡冰霜之際虛徐蕭艾之場揭之揚之於古有光不采而佩於蘭無傷豈膏黍之為用也必焚必割珠犀之畢通也必剖必絶雖佩玉而垂紳亦吐哺而握髮杲杲靈烏萃於神都耀彼殊彩呈茲異軀披拂四氣翺翔九衢恥祥鸞之止棘慕儀鳳之棲梧瑞表孝紀名標祕圖將有感而必集豈獨殷周與有虞觀其降自日域戾於天府音諧雅頌動中規矩頡頏其質差池其羽步芳草而三趾徐來遡祥風而六翮微舞珍奇莫測觀者如堵諒茲禽之禎祥告我皇之福祜於是羅者既獲虞人是薦貯以瑤筐登於玉殿凝睿想迓神眄孤飛砌上似於雲際而遊獨立君前疑乎日中而見聖情不極念茲莫黑彼應感而至我有道而得狎以馴擾安其棲息夜啼玉壘聲雖入於舜聰曙喚瑤階心豈知夫帝力不然者曷足以昭我皇之元化表吾君之恭默是知國將昌則降而為祥政或缺則歸彼扶桑天道不昧神心孔彰豈有情在於斯烏固靈應昭乎彼蒼闕二字之旨既集吾君之福祉與天地而終始儻不翦其毛羽願長飛乎帝里問卦分江使圖演天文文籍於是濫觴書契以之抽緒皇墳帝典述紀言以聯鑣五傳六經紵禮樂而齊騖斯並懸諸日月煥乎文章至如諸子相騰小説奔競有慚屑玉之化無異雜鉛之寶請用於火恐招傅奕之譏將扇其風復爽芟夷之義二塗交戰一為解環百兩之篇孰關其善七分之術孰著其能誰求天下之書誰決冢中之籙識二簡者何子觀四轍者何人京兆耆舊之篇起於何代陳留神仙之傳創自何人誰先孝子之圖誰首逸人之記倘無談於雕棘將有薦於拔茅對日月經天星辰助其明耀江河紀地畎澮資其廣深俱麗於乾綱同歸於坤軸況六經既出百子並騖萬卷五車七略四部組織仁義琢磨道德雖非全璧之珍亦是連珠之寶當有求書之官遠探禹穴近聞汲冢之文具修蠧簡或陰陽不謬朱紫自分仲任叢殘之議並非通論稚川翡翠之喻實得大方豈重以芟夷加之翦截敢申直筆以塞異端則有百兩之篇張霸所善七分之術京房獨精陳農訪天下之書荀勗決冢中之策識二簡者束晢觀四轍者穆王京兆耆舊之篇創於光武陳留神仙之傳起自阮蒼劉向修孝子之圖梁鴻首逸人之記謹對自古帝皇莫不以登封告成為盛事陛下封泰山告太平致㣥瑞與三皇五帝比隆矣數年不稔餓殍相望四夷交侵兵甲歲駕宜恭默思道以禳災譴更廣營宮室勞役不休天下莫不失望矣職事以邀名欲科不伏曲洛圭廛交風鼎邑途開九達城控八關積溜澄雲王子吹笙之浦驚湍落日馮夷剖蚌之川衣冠之所往來商賈於焉交集所以亘茲星柱架此虹橋疑海上之浮黿似天津之飛鵲誠合因人啓塞隨事修營豈可使曲岸前崩危梁中絶驚波渺渺却停流水之車急浪悠悠翻擁桃花之騎楊忠蒞斯劇縣輒樹私恩不遵十月之規有損二周之化造舟之義自有公營浮航之機詎宜私雇道橋有闕懦弱可知請依直指之科置以曲從之坐仰乎天文用察昭應辨彼雲物以知休祥矜術數以分官列保章而命職庚以幽微可尚精妙希探躡梓慎之陳迹採劉向之故書補職觀生扣鐘師業銀河宛轉瞻一水而初分玉漏蕭條齊七政而寧察業則未就師何有言且束修自行誨無倦矣六藝有數算其異歟言生合有束修稱算不同伎術始和昭布甲令明懸請從多少之差方定是非之理生之不伏愚亦謂然圓首方足戴天履地稟陰陽生殺之氣有喜怒哀樂之心舞所以節宣禮容歌所以吟詠情性故端木發問豈盡師乙之節薛設談學謳未窮秦青之技才有用捨命有通塞滄浪水清不行南楚白石山爛遂感東齊窮者或歌道固難廢惟景所學應有攸歸微妙之音雖聞是習貞俗之禮亦復懸殊悼彼元宴之辰宜暢清都之奏紫芝仙客揭雅曲於重元丹洞羽人吹真聲於倒景聆彼肉好奇殊骨間既非慶雲韶夏之作又匪白雪陽春之調暌彼嘉會乖茲正聲人告非時雅符通典虹在東方小雪而藏貫日之形莫覩彌天之象難詳居曖昧之中光而不耀入混茫之裏暗然而彰表天時而無失其候順寒暑而不愆於陽眇望遼敻窮覽洲渚邈不察其形容何以知其處所見飛梁之跨水髣佛猶疑望慶雲之在天依稀延佇豈不以晦明有日隱見有期寒節方來斯則潛雖伏矣清明如到終當出而見之閟乎渥彩蓄以雄姿類成文隱霧之日同衣錦褧裳之時眇眇天末悠悠雲路御座之祥不逢美人之號難遇冥蒙向晦徒欲想其爛然杳靄藏輝孰能知其去故宛得啓閉之道以明天地之心憐彎環之挂空猶隔層碧思紆餘而飲井當阻重陰不測之狀難狀無形之形罔尋若夫風雲尚慘我則隱蔽而知藏陽氣未騰我則炫耀而不結亦有霞散成綺雲吐如繒曷若拖軒之名將順時而出沒回館之勢每應候而升陵至哉終取貴於彩章亦何慚於小畜孕明於煙霧之際誰辨輝光混迹於沉埋之間難呈紛郁事同嘉遁道叶攸伏虹兮虹兮何當灑其霢霂何仲尼之仁智雖敝蓋之不棄憫畜犬之將死恐肝腦以塗地豈不以其守禦之功多惻隱之情至況歲年馴養倏忽非命生而效能死不因病分以身首委其陷穽我誠拙於人謀彼何傷於物性雖無衛生之智且有天然之識出其門吠非其主知其愛搖尾求食傳尺書而致遠逐狡兔而盡力信聰慧之兩兼亦忠勇而何極原夫萬物莫不以智遇禍以材喪身象以其齒龜以其神蟬得美蔭而忘已魚貪芳餌而挂綸由此言之莊周達者老氏至人吾將師之養素全真節彼南山宛出人寰天分翼軫地界荊蠻標奇峰於海上置高嶺於雲間千林蓊鬱萬壑幽間蓄霧藏煙信洪爐之造化匪朝伊夕即元猿之往還爾其秉質元造遊心遠峰徹三聲於谷靜藏萬影於山重聯帛丿糸緑竹牢落青松其捷難紀其居易容不衒文章輕霧中之隱豹豈矜變化賤雲裏之非熊但恣乎任情之樂寧知乎有智之凶既而列卒籠山張羅竟野陳影開鶴雲光亂馬迫吳質之檻中驚楚臣之箭下既歎拙謀還傷力寡踰峰越嶂宛辭岑寂之居歷暑離寒欻就喧卑之舍於是屈猛從縶宛安順遊顧步蘭砌因依蕙樓局標影之高下挫人心之去留載馳載驅異追風之整轡或驚或躍同在水之銜鈎日潛餘巧空長孤愁悲夫自貽伊戚信美非珍雖徘徊於厚養終惆悵以勞神夜廡幽陰憶南隴之吟月花朝明媚想喬林之弄春未屬放麑之慜且從飛雀之馴巳矣哉樂鷃以鼓載鼷以車固不如深林之棲息窮谷之虛徐諒物性之同此希達人之鑒諸草堂禪師佩曹溪心印注華嚴法界觀疏圓覺經又恐其理甚深世俗未辨著原人論而學者猶苦其難入蓋唯心之旨非自悟者不能信受也後三百歲白衣弟子李純甫又作睡語題其端云如人初夢一剎那頃根身器界異類衆生一時頓現種種各別一念力頓成就具足無量境界覺人呼覺始知夢中元無我人衆生壽者諸相亦無地水火風等物畢竟虛空唯依第六意識以為根本然則覺人所見山河大地十二類生并自身相唯依第八業識其理曉然無可疑焉有大覺者開説真空始故長夜宛如大夢等無有異儒者道家夢中説夢未知是夢復有既知是夢戀著夢境不知覺寤佛為世人開説人天乘復有既知是夢厭惡夢境不知睡眠佛為是人開説聲聞緣覺二乘復有既知是夢故無戀著亦無厭惡寤寐自如佛為是人開説菩薩最上大乘於大乘中復有未知夢由妄念而有境界佛為是人説法相教復有未知本無妄念夢境亦空佛為是人説破相教復有未知夢中之人即世覺者佛為是人説顯性教故知衆生本來成佛初發心時即登正覺示起於座便入涅槃原人一論即覺者之一呼也繹其首尾大略如此法同寢者應如是觀書稱教胄禮貴來學問一之道式昭在三之儀斯著戊行敦素履行列青襟懼扞格之無誠誡佻達以自制滿籝不顧方欲期於俯拾重席擬登何敢遽云請退然先生在位侍坐有儀自合發問以條使師逸功倍何得請益無節致視日欠伸雖涉進德之端其若伏膺之道鄉大夫之責是謂知言門弟子之禮不應飾説息焉有故邊生且放懶眠懲之勿深寧越豈宜鞭撻請舉坐觥之罰式陳鼓篋之誡禍之將至鬼神奪魄豈有委身府幕塵忝下寮而擅犯威重前後非一中丞審萇豈非知禮之人豈非感恩之人自拜揖馬塵十有三載杯酒歌詠久蒙提攜未省竟有差失中丞因賜賞鑒辟書府及陪接萬里星霜二年正當策名之時豈願固有干觸此蓋命之牽陷一至於此實非常情之所料也豈非十二年間東馳西走肝腦塗地竟無所成鬢髮班白幸逢推薦恩命垂至自貽顛危昏昏薄言罔知攸處豈非命矣豈非命矣且初坐之時每舉一盞酒未嘗不三思其過似覺體中有酒亦哀請矜量既對衆賓復不敢苦訴俄而迷亂乍合若怪魅以憑心神事且不知死亦寧悟哀哉微命有此舛剝中丞縱寬以萬死萇亦無所施其面目不即引決者伏念纍世單緒一身早孤中年未婚晚乏兒息封樹何日先靈靡安痛此纏迫乞哀殘喘今矒翦首髮自為毀責期在粉骨永知此過中丞旋斾之日願隨一卒步走後塵洗節布誠以期他效伏願少垂舊惠戀戀故人無任憂悸感切之至謹投書閣下荒辭無序萬不申一仍憑押衙口哀謝不宣萇再拜學古入官議事以制既敘功而論德將按名以責實眷乃卒史實惟王人爰從推擇以膺明試同馬遷之有論望絶為鄉異朝錯之登科才非一作無掌故進取棄於鳧短擇先得於龜長雖漢制四科先於德行而孔門十哲稱以文學求之者何方倚相之能讀有司奚失俾平津之下第且一言體國圭爵斯分片善不遺草萊靡滯薄言之訟功令式昭舉事之有司彌遠
