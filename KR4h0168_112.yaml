front:
  text: 全唐文欽定全唐文卷一百十二後唐明宗七
  hash: sha256:9345b063e4df63c666da4a67ad4f7e14cb619d7430d649e7863db2f33cbe0f74
body:
  text: 常調之中無媒者衆省員之外有闕常多方隆遠大之規更顯激揚之理兼先赴南郊行事未授新命及一考前丁憂州縣官等起今後到闕者宜付所司旋磨勘施行不得輒有停滯大朝恩命庶事規程該定制者各委所司頒特敕者不拘常例資維新之風教示無黨之寰區叛黨未平難輟轉輸之役流民既復必資安集之謀朕應天順人端居靜治若涉大水如履薄冰翼翼乾乾懼不克荷所賴文武宣力天地降祥雨順風調政寬事雖四夷一主遠殊貞觀之朝而斗粟十錢近比開元之代無何董璋搆亂蜀郡廠田坴災萬方共樂於太平一境獨嗟於多事遂致數年動衆千里勞民奔馳秦鳳之郊委頓岷峨之路蓋彼樂禍非我願為今則逆順分明車書混一陸梁之黨巳歸葅醢之刑渙汗之恩宜及瘡痍之俗示以歸還之路慰其懷戀之誠應秦岐延涇寧慶邠同興元京兆等州府所缺長興元年二年夏秋稅賦諸色錢物及營田戶部莊宅務課利等物並放如聞州使廉察自前每降敕書稍關除放頗淹行遣轉急徵催物巳輸官人方見榜厚利實歸於州縣鴻恩虛及於生靈而況一戶逃移一村騷擾殘缺之物蓋藏於形氣腹中披訴之詞指注於逃亡腳下朝廷比哀貧戶州縣轉啓幸門欲峻條流宜先曉諭今後敕到畫時曉諭所管仍勒要路粉壁曉示如敕未到時巳徵到物色據數附帳不得隱落如有人陳告以枉法贓論敕到並須半月內施行除放訖奏聞枉法贓十五匹絞準格加至二十匹乃自喪亂巳來廉恥者少舉律行令誡人遠財國家常切好生上下頗能知禁犯既漸寡法亦宜輕起今後犯枉法贓者宜準格文處分贓名條內有以準加減及同字者并倍纍贓並宜準律令格式處分凡有告事者除鹽麴條流外宜據輕重依理施行不在格賞之限呂澄命為宰字委以民人不守公廉恣行聚斂贓數甚廣情狀難矜當置重刑仍從遠竄宜決脊杖二十配流嵐州關連人吏依法司所奏方州所尚土貢為先苟有稽遲誠為怠易須加懲罰俾效恭勤其録事參軍孔霸文宜罰一季俸刺史尹暉緣元敕不該宜放本典以下宜令本道觀察使量罪科責訖以聞馮贇有經邦之茂業宜進位於公台但緣平章事字犯其父名不欲斥其家諱可改同平章事為同中書門下二品敕高麗國王省所奏進奉謝恩紅地金銀五色線織成日月龍鳳襖緞二枝紅地金銀五色線織成龍牀褥二面金星皮甲二副罽錦銀皮甲二副罽錦鍊鐵兜四副罽錦紅地金銀五色線織成花鳥罽錦捍胯四副角弓四張紅地金銀五色線織成龍魚罽弓袋裁四具行簳箭二百隻貼金一百隻貼銀木簳箭二百隻紅地金銀五色線織成雲龍箭金義袋四具金銀裝欛鞘細鏤雲天玉劒一十口內二口金銀裝罽錦鞘金錦裝罽錦鞘細鏤雲天長刀一十口金銀裹槍一十根金銀裝罽錦鞘匕首一十口金銀裝鞘匕首一十口細苧布一百匹白㲲二百匹細中麻布三百匹事具悉卿世篤忠貞家傳勳閥爰屬承襲之始遠輸貢奉之儀貝錦成章橦華讓貴咸陳筐篚皆是珍奇而又兵器駢羅戎衣鮮麗莫非精妙可驗傾勤嘉奬所深再三無巳敕高麗國王省所奏進奉金銀裝所㓨六根罽錦鞘金銀裝劒六口金銀裝罽錦鞘長刀一十口紅地金銀五色線織成花鳥罽錦桿胯二腰紅地金銀五色線織成花鳥罽錦倚背二面紅地金銀五色線織成花鳥罽錦裙腰六腰紅地金銀五色線織成罽錦鞘金銀裝匕首一十口鍍金鷹鈴二十顆銀鎖鏇子五色絛銀尾銅金鍍金鷂子鈴二十顆銀鎖尾銅全細白㲲布一百匹細中麻布一百匹人參五十斤頭髮一十斤金銀地䥫文剪刀一十枚金銀細鏤剪刀一十枚金銀細鏤剪髭剪刀一十枚銀花細鏤剪刀二十枚金銀重口大樣刀子三十柄銀重口大樣刀子四十柄金銀重口中樣刀子五十柄銀重口中樣刀子五十柄金銀重口小刀子五十柄銀重口小刀子一百柄金銀細鏤撇火鐮二十枚金銀細鏤鉗子二十枚香油五十斤松子五百斤事具悉卿地控東溟心馳北闕奉九邱而作貢歷萬里以來王戎器堅剛織文靡麗苧麻如雪至藥通神首飾玩具之奇香澤果寶之類名器既衆羅列甚多省閲之時稱尚良切敕高麗國王省所上表賀去年三月一日親幸澶州殺敗契丹事具悉朕以契丹顯違信義輒肆侵陵親御戎車往平桀虜靈旗一舉狂寇四奔卿遠聽捷音頗攄憤氣載馳章表來慶闕庭嘉乃忠誠不忘於意上國兩街僧道自前賜師號不數人而巳至於賜紫並係特恩近日諸道州府因應聖節表薦僧道頗多宜令中書門下此後凡有諸處不係應聖節及橫薦僧道不得等閒申發章表請行命服師號切思正統朕猥承基構實賴祖宗將申報本之儀常切奉先之志爰崇祀典思固遠圖冀上答於劬勞度永資於孝理卿等咸堅輔弼共副咨詢徵兩漢之舊規宏三皇之故事乃飛章而定議請薦號以尊名兼廣園陵仍增兵衛載覽矢謨之意備觀順美之誠感歎良深嘉愧無巳宜依上表施行歷代帝王以時巡狩一則遵行典禮一則按察方區矧彼夷門控茲東夏當先帝戡平之始為眇躬殿守之邦俗尚貞純兵懷忠勇自元臣鎮靖庶事康和兆民咸樂於有年闔境彌堅於望幸事難違衆議在省方朕取十月七日親幸汴州其沿路一行宿食頓遞可下三司排當務從簡儉不得勞擾人戶至於扈從兵師亦巳嚴行誡約兼告諭東北道諸侯不得迎駕朝覲朕聞堯舜有恤刑之典貴務好生禹湯申罪巳之言庶明知過今月七日據巡軍使渾公兒口奏稱有百姓二人以竹竿習戰鬬之事昨朕初聞奏報實所不容率爾傳宣令付石敬瑭處置今旦安重誨敷奏方知悉是幼童為戲載聆讜議方覺失刑循揣再三愧惕非一亦以渾公兒誑誣頗甚石敬瑭詳覆稍乖致人當枉法而殂處朕於有過之地今減常膳十日以謝幽冤其石敬瑭是朕懿親合施規諫既茲錯誤宜示省循可罰一月俸渾公兒決脊杖二十仍削其在身職銜配流登州常知所在其小兒骨肉各賜絹五十匹粟麥各百石便令如法埋葬兼此後在朝及諸道州府凡有極刑並須子細裁遣不得因循王者以六合為家萬機是務動必從於人欲道貴表於君臨矧以大業名都先皇舊地干戈近息井邑初完去春特命親賢出分攸寄一載之化條方闡六州之生聚咸蘇朕又竊念并汾有同豐沛欲和鑾之親撫慮致勞煩移嗣子之總臨冀諧委注今則巳令赴鎮兼報行期而鄴都士庶馳誠表章繼至思朕車御暫到庶彼內外永康曡興徯后之詞何爽省方之便朕今月七日巡幸鄴都踰月之內卻駐粱苑其沿路宿食頓遞並仰三司預專排比不得輒擾人戶付中書門下準此朕每念眇躬嗣承丕構厲憂勤於庶政持兢業於厥心罔敢怠荒冀符裨益去歲以五兵偃息九穀豐登指內外以省方慰羣情之望幸逮於駐蹕允協來蘇乃眷鄴城匪遙梁苑復念興王之地思從徯后之詞將命和鑾指期屆路卿等情深許國道在弼豫旋貢表章罄輸丹赤備閲傾虔之懇深詳啓沃之規巳諭淹延俾從俞允其六軍經費諸道轉輸國計所先兵食斯衆將致贍豐之備難矜運挽之勞既念疲羸粗宜蠲減其百姓般糧至洛京並卻停罷只令近東州府般至汴州朕聞王者握圖御宇應天順人必從億兆之心以副寰瀛之望朕恭承大寶漸致小康當時和歲豐之辰叶海晏河清之道思從望幸爰議省方昨者以全魏名邦興唐霸國當去弊除姦之後是安民撫衆之時思暫議於巡遊庶躬親於勞慰尋頒詔旨巳定行期而聞衛士連營方諧聚族農功務穡始在承春雖無供億之勞寧免差徭之患而又勳賢拱北藩翰勤王儻萬乘之少留煩諸侯之入覲況復大臣抗表多士輸忠睹瀝懇以再三閲封章而數四諒為裨益深可嘆嘉宜罷鳴鸞且謀駐蹕凡在中外當體朕懷先取今月十三日巡幸鄴都權停朕奄有四海于今三年敬事天明敢忘日慎上憑列聖賴祖宗之垂休下設庶官思邦家之共治聞過必服見善則師靜惟省躬動懷畏相每從人欲方布時和不謂仲春巳來繁陰未散雖如膏之澤可待豐年而飛霰其濛恐傷宿麥實關穡務深軫納隍卿等陳力有方直言無避共熙帝載以沃朕心更吐嘉謀庶裨闕政應文武百官奏對恐有隱密之事不敢當庭敷揚即許上章極言時政善惡貴合天道弛張朕紹續鴻圖撫寧諸夏爰從洛邑來幸浚郊屬中山興悖逆之心外寇恣朋連之勢致煩征討方見蕩除皆宗社之威靈盡忠良之裨贊自此遐邇永遠隆平蓋以久別三川嘗懷九廟既克清於氛祲宜便復於京師取今月十三日歸洛都朕以臨御萬邦寵綏四海務恤民以設教期化俗以成風昨自霖雨連綿川瀆泛濫傷數州之苗稼蕩百姓之邱園遘此徵災慙虧至德致農者失力田之望念編氓有艱食之虞每自責躬更思求理欲使人獲其蘇息恨不家至而撫安憂勞所深鑒寐斯切宜布維新之澤式全可大之功今年州府遭水潦處巳下三司各指揮本州府支借麥種及等第賑貸斛食仰逐處長吏切加安存不得輒有差使如戶口流移其戶下田園屋宅仰村鄰節級長須主管不得信令殘毀本戶歸日具元本桑棗根數及什物數目交付不得致有缺少本戶未歸即許鄰保請佃供輸若入務時歸業準例收秋後交付貴示招攜永期康泰速宜宣布稱朕意焉朕祗膺天眷虔荷帝圖敷大信而仰法昊穹秉至公而俯臨億兆彰善疸惡必分涇渭之流崇德報功敢忘山河之誓其有榮聯戚里任重侯藩佐白水而中興為皇家而盡節雖旁緣詿誤而竟保忠貞疏鑿未通朝海之波瀾暫阻氛霾既定拱辰之光耀如初表章皆驗於推誠琛賮遠修於述職得不顯其丹赤懋以旌酬益敦魚水之歡永契君臣之道爰求吉日乃降徽章具官孟某五緯佐天三山鎮地七年乃辨真為梁棟之材十德俱全信是琮璜之器先皇帝經綸八極濟活兆人李通首述其緯書鄧禹常參於霸業同心同德竟扶歸馬之朝不伐不矜罔恃濯龍之寵洎朕纂承鳳紀繄爾鎮守龜城鐵石彌堅菁茅不匱山川險絶每虔向日之心玉帛駿奔能助郊天之禮有臣若此當代何加董璋久作厲階終萌逆節既辜恩於覆載欲嫁禍於勳賢曡以封章疏其鄰道虔劉我生聚離閒我忠良爾外示叶同潛懷憤激罄衷言而誘諭彼既不回伺良便以誅鋤乃期自雪以至敢驅叛黨徑逼仁封吹虺毒以傷人奮豺牙而暴物爾則妙施成算徑出全師鼙鼓才鳴旋聞落爪窠巢自潰巳致噬臍梓川之襖霧風驅涪水之狂波鏡淨解吾宵旰賴爾韜鈐固當銘在景鍾豈止光於信史況復備輸懇款益驗傾虔敘魯館之寅緣述沛中之舊事深心可見亮節斯彰不有疾風焉知徑草倘無異數曷報崇庸由是並築將壇顯升王爵兼兩藩之奧壤啓一字之真封仍循益地之通規別改旌功之懿號賜之旌鉞冊以輅車雖加等之寵光爾皆不忝在睦親之義分豫亦無虧於戲天鑒甚明為善者降之福祉君恩不黨立勳者厚以奬酬惟敬慎以始終可延長於富貴勉承兌澤永鎮坤維可授依前檢校太尉兼中書令行成都尹劒南東西兩川節度使管內營田觀察處置統押近界諸蠻兼西山八國雲南安撫制置等使仍封蜀王加食邑一千五百戶實封二百戶改賜忠貞匡國保大功臣散官勳如故仍令所司擇日備禮冊命主者施行為人之妻能從夫以貴者是謂宜其家矣封邑之制彞典所垂俾增伉儷之光以稱國名之爵大義軍使特進檢校太保使持節元菟州都督上柱國高麗國王妻河東柳氏內言必正同奬固多贊虎幄之嘉謀保魚軒之異數輔臣忠節諒屬柔明爰降殊榮載踰常等勉思勤王之志是謂報國之規可封河東郡夫人天生蒸民樹之司牧立君臣之位定治亂之機撫之則為后王虐之則為讐敵以今況古何代不然先皇帝親總干戈奄宅區夏功既成而稍忘戒懼道未濟而不慎驕矜遂至貪吏藏奸羣小多辟勳舊無名而被禍忠良飲憤而見危比屋由是怨咨連營以之愁歎俄成否運遂至橫流朕昔奉武皇幼承明訓早承締構備歷艱難敢忘作礪之規以奉維城之固一昨趙在禮遽從其郡徑入鄴都一則迫於饑寒從其糧穀一則痛於離析就彼妻孥朕既事於專征亦既成於靖亂豈意羣情見迫衆意相推雖於擾攘之中彌勵扶持之節無奈軍中散卒亂若棼絲闕下禁兵勢如烈火繇是指河流而南渡誓軍旅以西馳志欲救於顛危情冀申於忠赤豈謂兵搖畿甸釁結蕭墻慙赴難以無功徒撫心而掩泣深誠未達羣議同詞以為奉廟社之蒸嘗紹宗祖之基業軍民所繫神器難虛辭避雖至於再三推戴尤形於迫切竟將寡昧獲奉宗祧御朽索而敢載馳涉大川而莫知往夙夜戒懼罔敢底寧所賴中外藎臣弼豫沖眇援今引古爾既以大寶尊豫濟國安民豫亦以忠貞賴爾庶將此道共致太平宜推更始之恩以布維新之化今改同光四年為天成元年鄴都赴難之際定策功臣宜渥特恩以彰豐報其扈從將士及六軍諸衛諸道行營將校等委中書門下次第酬奬夫人不能自理立君以理之豈可殫天下之賦租為宮中之玩好後宮內職量留一百人餘任歸骨肉內官守閽掌扇量留三十人教坊音聲量留一百人鷹犬之事以備搜狩量留二十人御廚膳夫量留五十人其餘任從所適內諸司使務有名無實者並從停廢先皇運關外之資糧供洛中之戎馬遂致百姓困弊不勝餽挽之勞今則須為制置令度支與總管使會定在京兵數據所供饋積貯京師其近畿糧儲可令諸軍就食諸道營田租庸司先專差務無益勸農起今後並委州使管係所納農具斛斗據數申省應納夏秋稅糧先有省耗一升起今後只納正數不得別量省耗其輸芻藳亦不得別徵加耗征賦上供國之常典別申進獻懼削生靈今後節度防禦等使除正至端午降誕四節量事達情自於州府圓融不得輒科百姓其四節刺史不在貢奉諸州使造麴如聞省數之外長吏私更加造價錢多入於私門滯麴常存於省數省司及諸府置稅茶場院自湖南至京六七處納稅以致商旅不通及州使置雜稅務交下煩碎宜定合稅物色名目商旅即許收稅不得邀難百姓諸道監務破腳價極多獲租課極少須有條流以成規制租庸司先將係省錢與人回圖所供課利或爛茶弊物積年之後和本乾沒為弊最深宜令盡底收納以塞幸門巳上五件委三司使條理奏聞力學登第承蔭出身或缺文書侵成踰濫先遭沒毀幾至調選無人州縣多是攝官為弊滋甚宜令銓選別為起請止除僞濫餘復舊規昨自魏汴至京大軍所歷戎馬騰踐麥苗下本州使檢量據所傷殘與蠲地稅自今年四月一日巳前並與放免如巳徵入州縣者即據數納省若取官中回圖錢立契取私債未曾納本利者不在限其餘並不徵理先緣漕運京師租庸司應借私船今既分兵就食停於漕運其諸河渡私船並仰卻付本主如有滯留許本主論告先朝屢降德音所司不與宣行遲留奏改利在虐人赦書所至仰三司諸道丁寧宣布限一月內便須施行不得遺漏條件仍於要路榜壁貴示衆多嗚呼除舊布新雖更於法制承祧繼世敢怠於纂修惟上天之匪忱則下民之康定水能利物有載舟覆舟之文言可立身有興邦喪邦之喻敢不日慎一日業業兢兢庶乃三事大夫百辟卿士共修正道以啓遠圖復先皇帝巳墜之基副億兆人相推之意冀上天之悔禍回下土之沈憂雖唐堯之茅茨土階夏禹之惡衣菲食納隍御朽不憚於憂勤履薄臨深無忘於夙夜必能自勵以慰人情惟爾尊奬之誠興復之志有始有卒是所望於羣公無怠無荒冀不移於薄德凡百有司宜體朕懷王者法天為子長人為君必在於上奉天明下從人欲奉天莫先於孝敬從欲莫先於矜寬則必上下叶和陰陽調序朕顧惟寡德猥紹丕圖祗荷景靈敢不寅畏屬以域中作梗邊上多虞繼除梟獍之妖纍殄豺狼之族阻行大禮于茲五年負芒刺以靡寧積冰湯而為懼今幸五兵偃戢百穀豐登謁清廟以寫心陟泰壇而瀝懇孝敬之道誠益勵於夙宵寬宥之懷固難忘於頃刻上承元祐冀永無疆之休下念黔黎宜覃莫大之慶況天地交泰之始雷雨作解之初布澤益示於滂沱發號重新於渙汗滌瑕蕩穢屈法申恩宜改天成五年為長興元年可大赦天下應諸道見禁囚徒十惡五逆光火劫舍屠牛官典犯贓僞行印信合造毒藥外罪無輕重巳發覺未發覺巳結正未結正咸赦除之其天成四年十二月終巳前諸道州府人戶應有殘缺稅物蠶鹽食鹽乾榷濕榷既係積年之缺俄逢作解之恩並與免放諸州府營田戶部院應缺租課房店利潤逃移人戶死損牛畜或先遭剽劫及水潦處缺負斛斗無所徵填巳收納到家産財物其餘所缺並與蠲除所在倉場積年損壞使臣盤覆缺折尤多其主持專知官等據通收到産業物色外亦與放免應諸道商稅課利撲斷錢額去處除納外年多蹙缺枷禁徵收既無抵當並可放免諸道採造材木缺數定州材木錢及閿鄉船務遺火所司纍行催促無可填納亦與放免先南北兩軍前倉場持主損爛缺折及江河轉運拋失舟船並斛斗茭稈錢諸鎮缺少過軍準備糧草等據主持人見在家業勒收納外餘放所缺天成元年二月諸州般納到上供庫稱盤積缺物色并遭兵火燒劫及耀州前後身死刺史界分缺省庫錢物敕勒州司官吏備填者並特放免天成二年終諸色人於西川省庫內借過錢並省司先差人收買羊馬缺折死損無填還及天成二年終巳前諸道銅銀鐵冶銀錫水錫坑窟應缺課利兼木炭農具等場缺負亦與放免諸州府或經水旱灾沴恐人戶闕缺餱糧方值春時誠宜賑恤宜令逐處取去年納到新好屬省斛斗各加賑貸秋收日徵納完數應天下府州合徵秋夏苗稅土地節氣各有早晚訪聞州縣官於省限前預先徵促致百姓主持送納博買供輸既不利其生民今特議其改革巳令所司更展期限輔相之榮必資德望公侯之貴蓋選賢能欲展徽猷貴在彰顯內外羣臣職位帶平章事兼侍中中書令與改鄉名里號欲通和氣必在申冤將設公方實資奬善州縣官寮能雪冤獄活人性命者許非時選仍加階超資注官與轉服色巳著緋者與轉兼官其朝臣及藩侯郡守等亡父母祖父母在并妻室未霑恩命者並與追贈及敘封應有諸色私債納利巳經一倍者只許徵本年外缺數並放納利巳經兩倍者本利並放昭宗太祖莊宗時或有犯罪籍歿人若有子孫在者並許識認上祖墳塋主祭莊田巳係官及有主承佃不在識認之限河陽管內人戶每畝上舊徵橋道錢五文今後並放不徵諸道州府人戶每畝上元徵麴錢五文今特放二文只徵三文敢以赦文前事告者以其罪罪之赦書有不該者所司各具條例聞奏夫施令覃恩比期及物苟有壅滯曷浣焦勞如聞近年赦書所在不廣宣布為人臣者豈若是乎其在輔弼公卿藩侯郡守各展忠力副朕憂勤共致治平永躋仁壽仍令御史臺嚴加訪察無縱稽留赦書日行五百里告諭天下咸使聞知朕聞為而不有曰天使而不知曰道下覆萬物中含兩儀難以常名加難以常德報是故賢君哲后則而象之雖有唐堯之聰明不伐其善雖有夏禹之勤苦不矜其功朕善愧唐堯功慚夏禹屬六十年亂離之後承億兆人塗炭之餘兒童悉習於戰爭耆艾罕聞於聲教強吞弱吐禮壞樂隳涼德眇躬豈易為治所賴王公卿士勠力一心善無細而不行惡無大而不去革彼積弊成斯小康夫化自心生平其心則化洽令從身出正其身則令行朕御茲九州逮今八載常懷戒懼罔敢怠荒每務推心感人謹身率下刑必有罪豈以喜怒而死生賞必有功豈以親讎而厚薄卻雕鏤之麗目慮淫巧以蕩心罷畋獵之游娛恐逸豫之敗度未能全臻於富庶未能盡偃於干戈誠宜業業以兢兢詎可自尊而自大中外文武不謀同辭謂朕宏清淨之風載之以廣道樹生成之德推之以法天堅讓固辭至於數四遏之不止去而復來雖義乃爾心深可嘉也而名過於實良所惕焉既大舉於徽章宜溥覃於霈澤可大赦天下應八月四日昧爽以前在京天下州府見禁囚徒巳結正未結正巳發覺未發覺罪無輕重常赦所不原者咸赦除之長流人并諸色徒流人不計年月遠近巳到配所並放還或有亡命山澤及為事關連逃避人等並放歸鄉一切不問如過百日不歸首者復罪如初在京諸道將士各與等第優給應貶降官未復資者咸與復資州縣官內有先為事勒停止者並許參選殿犯者免其所殿長興三年正月一日巳前諸道兩稅殘缺物色並宜減放或有先曾經灾沴處逃戶卻歸業者除見徵正稅外不得諸雜科徭切委倍加安撫應係省司場稅倉庫今日巳前諸色敗闕人等據其所有錢物家業盡底收納巳上所缺並敗闕人並放其閒未曾經磨勘點檢者宜令省司便與磨勘點檢準前處分將來永不得任使如是雖稱敗闕省司未見申報文狀及見今勾當人巳後敗闕於中錢穀或涉降赦文年分並不得援此為例山林草澤之人雖頻命搜羅而尚慮沈滯委所在長吏切加採訪的有才氣義行者具以名聞必議量才任使在朝文武臣寮并諸色職員有直言極諫者如上封章盡當開納諸凡無主邱墓自兵革巳來經發掘者宜令觀察使刺史差人量事掩瘞敢以赦前事相告者以罪罪之於戲滌瑕蕩穢宇宙繇是澄清布德推恩遐邇以之胥悅所望藩垣羣后社稷諸臣既尊豫以莫大之名當佐豫以彌高之德日慎一日雖休勿休驅彼疲民置之壽域光爾在位顯我得人蓋聞禍福兩途響應雖從於天道賞罰二柄憲章必在於帝王所以虞殛四凶之徒周誅三監之類為時除害令在必行顯申旄鉞之威以勦豺狼之黨逆賊王都濫承餘緒叨據邊方當朝廷念舊之時冒藩翰賞延之帥曾無績效但抱姦邪國家光有萬邦寵綏諸夏纍頒殊渥官兼右相之榮曡示優恩秩冠三公之貴諒茲眷命果至滿盈況去歲駐蹕夷門弔民梁苑萬乘有省方之念諸侯專述職之勤而乃王都背惠孤恩藏姦積釁不思入覲惟自偷安以至繼歷寒暄逗留川陸朝廷務從寬恕纍降詔書候其悛心冀全理體殊不知凶頑益固抗拒彌堅信折以難招非舞干而可格而又朋連北狄禦捍王師擾我疆場負我盟誓須茲飾怒所冀夷凶乃謀帥於軍中俾恭行於天罰繇是貔貅雲集虎豹風馳咸搗梟巢誓平蟻穴北面招討天平軍節度使王晏球等推心許國挺志忘家皆矜摩壘之雄各騁寢皮之勇遂乃交飛矢石齊舞梯衝指其戲鼎之魚必取膏砧之肉以致徵兵調食結壘連營踰沙軼漠之戎全軍皆戮同惡齊姦之虜匹馬不回而又舉螳臂以求生張蝟毛而自固計窮力盡且無飛走之門萬詐千妖寧免芟夷之禍是以致其醜類無所逃刑既諧飲至之期爰契疇庸之典今月三日定州指揮使馬讓能巳下三人先約歸降是時果於賊城之上自相殺戮王晏球等領兵士直扣曲陽門接勢而攻一合收下其逆賊王都及禿餒趁入子城斬首生擒不可勝計至於徒黨骨肉略無孑遺今則獻俘行闕懸首藳街六師盡敵而凱旋一境復安於生聚王晏球等巳下從上行賞表不踰時或跨鎮分封官居極品或雙旌大斾寵寄十連著銘鐘鏤鼎之榮顯傳子示孫之業於戲違天逆道鬼瞰神誅顧斯蕩定之勳實快華夷之意可期康樂以泰黎元申號令於市朝明征伐之有謂布告天下咸使聞知
