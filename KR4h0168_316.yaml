front:
  text: 全唐文欽定全唐文卷三百十六李華三
  hash: sha256:cd27f52868992e60544930bc08df1536fda1619aa4b3ba70bef651b921c354f0
body:
  text: 政事堂者自武德以來常於門下省議事即以議事之所謂之政事堂故長孫無忌起復授司空房元齡起復授左僕射魏徵授太子太師皆知門下省事至高宗光宅元年裴炎自侍中除中書令執事宰相筆乃遷政事堂於中書省記曰政事堂者君不可以枉道於天反道於地覆道於社稷無道於黎元此堂得以議之臣不可悖道於君逆道於仁黷道於貨亂道於刑克寸一方之命變王者之制此堂得以易之兵不可以擅興權不可以擅與貨不可以擅蓄王澤不可以擅奪君恩不可以擅間私讎不可以擅報公爵不可以擅私此堂得以誅之事不可以輕入重罪不可以生入死法不可以剝害於人財不可以擅加於賦情不可以委之於幸亂不可以啓之於萌法紊不賞爵紊不封聞荒不救見饉不矜逆諫自賢違道變古此堂得以殺之故曰廟堂之上樽俎之前有兵有刑有挺有刃有斧鉞有鴆毒有夷族有破家登此堂者得以行之故伊尹放太甲之不嗣周公逐管蔡之不義霍光廢昌邑之亂梁公正廬陵之位自君弱臣強之後宰相主生殺之柄天子掩九重之耳變理化為權衡論思變成機務傾身禍敗不可勝數列國有傳青史有名可以為終身之誡無罪記云君以文明照臨百官官糾其邪職在邦憲由京師而端下國王化所繫不唯威刑御史大夫其任也用捨決於天心得失震於人聽舉直錯枉果而不撓則公卿屏氣道路生風率其屬以正於朝瞻我衣冠不仁者遠苟異於是為君子羞政之雄雌與德輕重故名公在位天下仰賴焉秦官有御史大夫在漢為三公職副丞相丞相闕則大夫遷或名司空或復舊號史足徵也議大政必下丞相御史其廷署古曰府近曰臺其衣冠章綬品秩所視載於甲令聖朝臣唐虞高尚之賢內周漢不賓之俗登人於五福薦樂於九歌帝德廣運而瑞草生天威震動而神羊至故柱石骨鯁之老更拜焉距義寧至先天登宰相者十二人以本官參政事者十三人故相任者四人藉威聲以稜徼外按戎律者八人官或改稱大司憲臺或分為左右肅政罷置不恆從所宜也開元天寶中刑措不用元元休息由是務簡益重地清彌尊任難其人多舉勳德至宰輔者四人宰輔兼者二人故相任者一人兼節度者九人異姓封王者二人尊號加孝德之明年樂成公自尚書左丞兼文部遷崇德也昭融禮經嗣續文雅張仲孝友山甫明哲風度可以師長人倫動靜可以訓齊天下喬嶽鎮定嘉量平均心為百行之宗體備四時之氣雅有之曰文武吉甫萬邦為憲樂成有焉至若教行於無訟之前慮辨於未萌之始未萌而慮則求煩不獲無訟而教則何用不臧寬細瑕為大體復故事為新政小人畏法君子夷心無隱情於國家無愧辭於神道堂堂乎大雅之素也初廳壁列先政之名記而不敘公以為艱難之選將俟後人謂華嘗備屬僚或知故實授簡之恩至屬詞之藝寡無以允副非常之待所報者直質而少文天寶十四載六月十五日記皇帝受天明命垂五十年大道成俗黎人於變百官設而無事三辟存而不論振古未然也猶以為成歲資於降霜律人本於持憲憲司之拜尢核名實王猷其遠乎夫察風俗平寃滯踣邪佞延俊賢云誰司之職惟御史御史亞長曰中丞二大夫以領其屬士丐為伯遊之佐司馬乃令尹之偏古之制也漢儀大夫副丞相以備其闕參維國綱鮮臨府事故中丞專焉意者殄凶人之豪挾君子之道各行其志無所牽束行止與大臣絶位指顧則周行振聳政體宜之晉宋元魏以還無御史大夫由是中丞威望愈尊禮有加等如火烈烈如霜肅殺不可犯也屬時清無獄朝尚寬政行葦忠厚王化根源周室仁及草木而愷悌流乎頌聲漢文雅好黃老而公卿恥言人過舉盛德而儀刑著矣焉用察察觖觖以恟生人哉欲以此道行於軍旅故東西幕府皆兼大夫餘軍多假憲司之號聖皇之志也天寶中君臣於道德之間又新其化以尚書左丞張公為大夫少府大卿庾公為中丞天下翕然名教知勸大夫睦中丞也羽翮得清風之助中丞奉大夫也律呂本黃鍾之宮耆儒碩老罕云遇此盛矣二公中和備體沈潛經德易直且武溫文而清遵王路以整多方由夫身而貞百度此外盡餘事也古之制記者先諸德而後諸事至若命官之始省復之代名號冠緌之差祿秩位員之數辭尚體要況皆知之今不書省文也華昧學淺藝承命維谷㣥言之首非所克堪然故吏也勉以酬德天寶十四載九月十日記化成天下莫尚乎文文之大司是為國史職在裦貶懲勸區別昏明故駉牧頌於魯侯祈招諷於楚子史官之任有述作蓋王者之元符生人之極教也昔沮誦倉頡為黃帝史臣文字以興其來尚矣若南正北正建於顓頊羲氏和氏命於唐堯更虞夏商代序天地周官宗伯之屬有太史正歲年以序事小史奠系代辨昭穆內史受納訪以詔王聽理外史達書名於四方前志所載有左史記事或針王之闕或司過於朝所典不同其納君於善一也傳曰天子有日官則史逸史伯是也諸侯有日御則裨竈子韋是也倚相在楚南史在齊董狐在晉邦之司直也其事舉則三靈不慝其政息則百度惟危故先王貴之至於漢廷參用周禮太史公既歿其子遷緘金匱石室之文焉降及東京永平中特詔班固著作東觀繼其事者楊彪蔡雍由是太史但掌天文律歷而已小雅寢周聖人生魯道尊而文武將墜德至而天地不通感於獲麟嘆於與蠟爰制國典邱明傳之因歷象以正時元假鬼神而討有罪善人勸焉淫人懼焉百代之英所由用也向若前代闕能文之史曠記事之官雖禹舜之烈無聞焉有國有家何以直道而行也魏太和年肇以著作名官為中書屬晉元康年改隸祕書朝服單衣介幘始親職必選名臣傳歷宋齊梁陳官品第六元魏高齊周隋秩從五品魏則王沈以侍中兼之衛凱以尚書帶之至於有晉若史材之美陳壽自佐郎遷元舅之尊庾亮以中書領宋則徐爰何承天齊則沈約裴子野梁則陸雲公姚察陳則顧野王張正見後魏則崔光高允北齊則邢子才魏收周則蘇亮柳虯隋則虞綽王劭皆一朝名選也貞觀初詔梁國文昭公鄭國文貞公統英儒盛才修五代史天子親垂筆削與春秋合符巍巍乎史氏之光耀也因是開館於內別立史官多以著作郎領帶其職而舊史所掌唯碑志祭祝之文在焉然以其能綜㣥言且居百乘出典下國轉為郎官經緯斯文昭宣有政或上遷祕書少監或擢拜中書舍人固不易其任也天命元聖降而為唐唐之建官罔非俊乂若虞永興德函大雅魏侍中才高王佐鄭吏部絶韻鏘鳴崔司業雄詞飛動皆歷焉今上兼帝王之極功總文武之能事思所以比崇軒皞紹美唐虞潤色乎大猷發明乎皇道問誰獻針則賓客崔氏問誰執簡則恆傳吳公胡諭德遊刃詩騷韋庶子貫珠今古濟濟多士時惟秉文盛矣哉同風乎雅頌也名嶽已遷別封天柱舊章不改尚列周官登陟蓬萊之峯循環藏室之奧從容簡貴信君子保明宏道之司歟今大著作清河崔公名傑天寶三載自祕書郎拜閲天祿之圖書踐人文之苑囿澡身於三德研慮於六經執謙而光好善能澤惠風吟於秀水明月鏡於安流代為元臣家曰茂緒壯宮室者必鄧林之條幹乎以儒雅之姿從班蔡之後揮綽令譽達於清朝則百祿隨之曷其有極矣先是命官之記不列於齋以華職忝末班與聞前志拜命之辱敢敘官之守云時天寶七載二月辛亥記唐虞之代四嶽十二牧分掌諸侯宗周有方伯連帥之職秦有監郡漢魏以還初曰部刺史後曰州牧近代罷州牧復為郡太守太守刺史無恆其稱職同九卿假以符節雖親如魯衛貴若周召任切安人往往除拜天寶中朝廷以尚書郎人物之高選二千石元元之性命始以省郎臨大部若密邇京師或控壓衝會萬商所聚百貨所殖將擇良吏重難之杭州東南名郡後漢分會稽為吳郡錢塘屬隋平陳置此州咽喉吳越勢雄江海國家阜成兆人戶口日益增領九縣所臨蒞者多當時名公宋丞相劉僕射崔尚書之訏謨大政其間劉尚書裴給事之盛德遠業魏左丞節吏部之公望遺愛在人韋太原崔河南劉右丞侯中丞節制方隅有事以來承制權假以相國元公旬朔之間生人受賜由是望甲餘州名士良將遞臨此部況郊海門池浙江三山動搖於掌端靈濤賁攴激於城下水牽卉服陸控山夷駢檣二十里開肆三萬室近歲災沴繁興寇盜連起百戰之後城池獨存王師雷動元惡授首乳哺疲人分命賢哲詔以兵部郎中范陽盧公幼平為之公體仁而清直方簡亮文以輔德武以靜人澄曠有清江之姿巍峩有秋山之狀麾幢戾止未逾三月降者遷忠義歸者喜生育旌次讓利轅門無聲人咸曰休哉以卿佐之才遵王澤敷德政吾見其為公為侯福履宜之未見其極也刺史冠服印綬甲令載之故不書詞尚體要古史之遺也永泰元年七月二十五日記有漢已還州統郡郡或連十城州或部十郡江南多大郡如會稽丹陽鎮領遐濶分置部都尉自富春而南太末一縣抵於建安今此州即古會稽西部之地也雖官明吏修如曠阻何厥後相因損益無恆時更亂離罷置紛糅聖朝字育元元納於大中自衛公纍單于英公滅句麗天下和平戶口繁衍元聖溥行葦蓼蕭之澤於下廷延公卿議割州邑謂疆與府近則易為理人與吏親則易為安以婺州封畛為廣分置衢州領六縣猶為大郡近歲析玉山全邑洎須江南鄉益信州而不為寡去年江湖不登茲境稍穰故浙右流離多就遺秉凡增萬餘室而不為衆吳越地卑而此方高厚居者無疾人斯永年名山大川既麗且清俗尚文學有古遺風國朝不以州領郡郡與州更相為號遷復從宜事之當也置觀察之司而董臨之此州長吏之選甲於他部忠貞之老則武威公李僕射傑親賢之望則信安郡王褘遺政行為故事名位光於屋壁開元天寶中始以尚書郎超拜名郡賀蘭大夫為之李郎中為之自逆胡悖天地之慈犯雷霆之誅賀蘭起北海之師郎中佐浙東之幕有文有武家頌戶歌元惡天討餘凶稔罪皇恩示以鈇鉞之威未即大刑以為不教人戰是謂棄之乃分諸州置節度以鎮之州有防禦軍刺史為之使俾與夫持節某州諸軍事名實副焉以此州密邇山陰爰隸浙東廳事馮高戟戶臨江武文左右麾幢成列千夫長百夫長上寮郡掾屬邑官吏進退無聲趨拜風生仕不登州談不為榮凡為州者儒不毅勇則頓威攻守所由敗也勇不儒和則失人邦國所由困也故二千石之任方今為難至尊垂憂勤於兆人延俊乂於高位以蘇州刺史陳郡殷公文可以成政武可以安人明斷良謀忠在王室其理也寬不容怠嚴不拒情清白貫於神明簡易契於黃老德必有鄰歌聲宜繼由是命公典此邦也至若建置城府之年月升降品第之等差風俗貢賦之宜男女提封之數圖牒備矣老幼傳之今之所書略舉勳德也元年建寅月二十一日左補闕趙郡李華於江州附述晉分丹陽為毗陵後改為晉陵隋置常熟縣創常州理之無何常熟隸蘇州始於晉陵置常州當楚越之襟束居三吳之高爽其地恆穰故有嘉稱領五縣版圖十餘萬望高地劇此關外名邦自狂虜肆亂江湖流毒地荒人亡十里一室天子詔宰政審可以安人者以工部侍郎贊皇公覽允一作充帝俞拜為此邦昔齊人聞石相將至舉國大理贊皇東轅明詔先下吏愈人泰如時之春視之猶身歸者遍野贊皇公以為易簡本乎悠久久於其道而化成封章上請求理三歲詔書寵異進品正議大夫優賢報功於時為盛自吳通上國越盟諸夏秦裂郡國智如伍員才若鴟夷以及我國家賢良臨州者甚衆未有濬河渠引大江漕有餘之波溉不足之川溝延申浦至於城下廢二埭之隘促數州之程海夷浮舶弦發望至出古人創物之智見君子濟衆之心大矣哉一境清淨無為而理此舉大略也漢制刺史部領郡國遷為太守太守課最入為公卿及魏晉以來或稱州牧國朝州刺史郡太守更相為名親賢如寧岐弻諧如狄宋皆拜焉在部視侯伯入朝亞卿尹其車服皂蓋朱轓華蟲七旒進賢兩梁冠玉佩青綬古有銅獸竹使符太守不假節刺史臨兵則持節今雖無事亦稱使持節戒不虞也降銅魚詔書合之代獸符也夫子門人高第者衆唯稱雍也可為諸侯至矣哉古之為理本於德行贊皇公秉心宣猷盡瘁王室愷悌君子民之父母為王者輔宜哉永泰二年二月庚戌贊皇公從子檢校吏部員外郎華述禹貢淮海惟揚州彭蠡三江在焉漢文帝封淮南王長子安為王都壽春即此州也兩漢揚州刺史治於此州墠壇猶在後魏盧潛為揚州亦鎮於茲潛有惠政時人比之羊祐厥後州境或南或北隨人推遷國朝一家天下華夷如一壽春郡在淮南隸揚州其風俗山川可得而知也某年以兼侍御史揚州司馬獨孤問俗為壽州刺史公有德政理外如內易不遺物周不害通忠孝簡於王室廉平聞於天下剛克以順柔謹而肅公理州三年遷御史中丞鎮江夏工部郎中楚州張緯之代公為州牧某部郎中韋延安代張典此州僉有政聞故書其事以慰楚人之心東漢中平以來王室多難元臣統戎括㣥才而不遺徵衆慮而從善故公府置參軍事雖位高八命權重三軍苟好謀而成亦參於幕下迄於魏氏沿漢舊章洎有晉將殄夫全吳石苞責禮於孫楚由是府朝致敬稍用下寮逮南北分於帝郊華夷寢於王澤而此官之選益以衆矣及隋平江嶺唐有天下聖人貴因循而重改作思豫備而戒不虞故因其名而降之秩則殷周之損益可知也至若兩京垂戎於四方府吏同體於郎署非夫公卿盛德之允才望當仁之流不可膺其任今王國多士賢能歲益職員之外猶以命之取類乎律呂起於黃鍾滄浪發於清漢人皆以為美也趙郡李諲碣石峯巒藂臺楨幹嬰年聞禮敬睦傳於家庭綺歲入官名節動於寮友敏以經德清而達和自懷濟衆之心仍有封侯之骨嘉魚在藻良馬食苗知其人有其位千雲萌於甲拆貫革兆於機張且曰清階因之故事則鍾繇李允魏舒王遵事炳於前代韋僕射李大夫陸少保杜尚書功宣於盛朝叔父侍郎發迹於河南黃門顧公漸羽於京兆驥子躡乘黃之皂鵷雛入威鳳之巢榮縻九霄縱遊千里其可必也夫其職諧易簡道在中和高步同於列仙彈冠預於朝會若乃簿書堆案則譽發彀中醪醴蒲壺亦名高方外動靜皆適剛柔兩持是以為從事者所貴師古之事車服盤盂畢聞旌記用垂後代飾布德音況朝之命官闕而不載以華聞於舊史請以直書故略其所知疑殆頗闕云爾文與武邦之大司參以彌綸而果於折中軍以厲禁而闕其暴蔑彌綸之謂文厲禁之謂武居一稱而兼二義參軍有焉漢車騎將軍張溫行司空專征關右始徵幽州刺史陶謙參軍事由是上將之府以為常儀魏驃騎將軍石苞鎮揚州晉文王命孫楚參苞軍事賓主降禮始於孫石時方用武則軍師之謀主天下乂安則府公之屬吏蓋因府郡之長使持節領諸軍故雖列曹悉以參軍為號若以漢晉儔於聖代郡國比於神州則理亂不侔而小大相妨矣參軍自國朝以來躋盛位者數十人遠則僕射韋公師保中朝今則中丞蔣公澄清東夏用賢而衣冠焯敘踵武而聲度相鄰選部所以較卿佐之才舉公侯之胄是以慎署斯職而要其德藝傳所謂仕而優則學學而優則仕處下僚而無咎悔從吏道而獲安間差池鵷鷺之間宴息風雲之外矣京兆韋昱門高器全其文也若英敷華其武也長劍淬鍔朗玉調律鷙禽乘秋服楚傅之訓誡傳漢相之經術每從容府中或有異政雖不吾以必預咨謀如川決防如竹迎刃夫然則貴與壽功與名非斯人而誰獲君子之所貴者名位不失其人聲聞不忘於後故搜録官族第其遷授俾將來俊茂有所觀焉時天寶九載九月十三日記令長之位詳於漢官土地之宜列於禹貢談者備矣而詞人略焉則此官之職守此境之風俗可知也國朝之有天下淇漳之間於京師為近守宰之寄於元元最親故授署此官延至王庭曲蒙睿渥制令裦賜與內官同法清貫往往超拜天寶以來東北隅節度位冠諸侯按數軍鉦鼓兼本道連帥以河北貢篚征稅半乎九州邊於山戎歲備勍寇每置長吏朝廷特難之或操尚虧渝或中塗遷換或流未復或委罪刑書繇是使臣慎簡其人密表陳請鍾恩光於異土萃人物於東州不然何公方振羽青雲胡為而在此堂也公以德行文學為人倫羡慕清而道藝鄰於昔賢自登封主簿撫有茲邑以西門沈巫為不仁仲康解綬為能斷酌古中道為今令圖下車無何休聞四塞他疆之人父母之居尸祝之則境內之歡可以心見君子哉至若由身立政謀近及遠邑人趨拜靜聞堂上之琴軍師往來潛預幕中之畫所利者大豈惟安陽夫然則繁纓曲縣衷甸四牡人所願也於公宜之記事者志盛德而旌善人今特書公何尊王命其春秋之義歟天寶十載記鄧為天下扃闥兩都南蔽秦漢以來多封將相姻戚故其人益豪疆內全邑曰南陽曰穰曰臨湍蓋古新城也穰州府所理吏不暇息南陽領戶既寡姦俠所歸惟臨湍境清人間從仕者所樂開元裂此鄉三千戶為菊潭縣天寶至德之間狂虜南侵南陽為戰地地荒人散千里無煙猶以郵置之衝往復王命權置官吏招集疲人如寒資裘如餒併食聖朝臨下有赫哀撫兆人誅元凶清天下詔方鎮選良吏平昌孟威字承顏自左驍衛兵曹參軍本道節度使表為此縣始至戶不盈百為政七月盡室而歸者千餘家難矣哉古之為政者先諸人後諸身先其人則人不勞後其身則身自逸承顏勤恤老幼而休息之損有餘補不足而煦育之人諭其心則不勞而理矣古之求士者觀諸其家知乃為政承顏奉版輿冒虜塵北越鞏洛歸家於漢上又以清白之祿為甘旨之資臣子之道卓然則其餘可知也令長品秩章綬人皆知之故不書今所書議能也寶應二年七月甲辰左補闕李華記智之深者反照仁之大者無思反照而萬物同明無思而一切咸寂真如住乎無住妙有生乎不生惟禪師至其極也禪師法號常超發定光於大照大師垂惠用於聖善和上證無得於敬受闍黎司徒郭公舉為東京大德御史中丞鄭公表敷教於三吳乃沿漢至黃鶴磯州長候途四輦瞻繞請主大雲寺浩浩㣥醉願霑醒藥於是以梵綱心地還其本源楞伽法門照彼真性荊越之俗五都僑人有度者矣寶應二年暮春季旬之二日證滅於禪居縗杖百千江哀山悴凡入諸佛正位二十九夏存父母遺體五十九年門人寶藏熙怡等號捧香㲲建塔東岡遵象法也禪師滄州人姚姓靈和應於海碣弱歲齒於儒者既而捨孔氏之經為釋門之允聞西河攝護第一乃往從師次諸嵩潁服勤上法理妙詞簡神凝道深蓋六度之龜麟人天之海嶽也嗟夫雨寶之珠伏於泥下燎原之火隱在木中開示有期繼生宗範摩訶達摩以智月開瞽法雷破聾七葉至大照大師門人承囑纍者曰聖善和上環注源流含靈福備乃灌其頂龍像如林及狂虜逆天兩京淪翳諸長老奉持心印散在㣥方大怖之中人獲依怙則不言之教無為之益廣矣大矣覺之正之默茲元照不為深乎弟子司封員外郎趙郡李華泣舉雙林敬表仁旨時廣德二年正月六日鴻鵠遡清風陵皓氣翺翔自得於冥冥之間故虞衡矰矢敫不能為患甘芻豐秣羈縶駿驥首冠鋄鍚身被纓纕力方盛也騁於康逵及其殆也困於鞭策由是智者高鴻鵠而卑駿驥豈妄而論之哉今凶渠假息五兵未偃廟堂有風力之臣征鎮皆方召之老則仁人靜士戢伏自持各其志也尚書左司郎中嗣漁陽公盧振字子厚奉世德而聿修之味道風而遊泳之處於九江南郭荒榛之下不貽害於身不假力於人夷堆墆填窪穽尋尺無遺材草木不移植書堂齊亭成於指顧高松茂篠森於門巷宴然燕居勝自我得君子出則行其志也公以瑚璉之器為郎官以干將之斷宰赤縣君子入則善其身也公就鴻鵠之冥冥捨騏驥之馳騁況大江在下名山當目嘉賓時來攜手長望可以頤神養壽暢其天和浴乎沂風乎舞雩吾與點也尋陽僑舊推仁人焉推智者焉廣德二年四月五日趙郡李華記悅名山大川欲以安身崇德而獨往之士勤勞千里豪家之制殫及百金君子不為也賀遂公衣冠之鴻鵠執憲起草不塵其心夢寐以青山白雲為念庭除有砥礪之材礎礩之璞立而象之衡巫堂下有畚鍤之坳墟塓之凹陂而象之江湖種竹藝藥以佐正性華實相蔽百有餘品鑿井引汲伏源出山聲聞池中尋竇而發泉躍波轉而盈沼支流脈散而滿畦一夫躡輪而三江逼戶十指攢石而㣥山倚蹊智與化侔至人之用也其間有書堂琴軒置酒娛賓卑痺而敞若雲天尋丈而豁如江漢以小觀大則天下之理盡矣心目所自不忘乎賦情遣辭取興茲境當代文士目為詩園道在抑末敦元可以扶教趙郡李華舉其略而記之某嘗目異鳥擊豐狐於中野雙睛耀宿六翮垂雲迅猶電馳厲若霜殺吻決肝腦爪刳腎腸昂藏自雄倏歘而逝問名於耕者對曰此黃金鶚也何其快哉因讓之曰仁人秉心哀矜不暇何樂之有曰是狐也為患大矣震驚我姻族撓亂我閭里善逃徐子之盧不畏申孫之矢皇祗或者以其惡貫盈而以鶚誅之豫非斯禽之快也而誰為悲夫高位疾僨厚味臘毒遵道致盛或罹諸殃況假威為孽能不速禍在位者當灑濯其心祓除凶意惡是務去福其大來不然則有甚於狐之害人庸忸於鶚之能爾
