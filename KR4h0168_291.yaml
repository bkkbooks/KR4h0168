front:
  text: 全唐文欽定全唐文卷二百九十一張九齡九
  hash: sha256:0c72a6065c33add7c7be73da92a8fda177a0159ae4213bda43a084cb5c8a14cd
body:
  text: 先天二載龍集癸丑我皇帝御宇之明年也理內及外窮幽極遠日月普燭舟車運行無不求其所寧易其所弊者也初嶺東廢路人苦峻極行徑夤緣數里重林之表飛梁嶪嶻千丈層崖之半顛躋用惕漸絶其元故以載則曾不容軌以運則負之以背而海外諸國日以通商齒革羽毛之殷魚鹽蜃蛤之利上足以備府庫之用下足以贍江淮之求而越人綿力薄材夫負妻戴勞亦久矣不虞一朝而見恤者也不有聖政其何以臻茲乎開元四載冬十有一月俾使臣左拾遺內供奉張九齡飲冰矢懷執藝是度緣磴道披灌叢相其山谷之宜革其坂險之故歲已農隙人斯子來役匪逾時成者不日則已坦坦而方五軌闐闐而走四通轉輸以之化勞高深為之失險於是乎鐻耳貫胸之類殊琛絶賮之人有宿有息如京如坻寧與夫越裳白雉之時尉他翠鳥之獻語重九譯數上千雙若斯而已哉凡趣徒役者聚而議曰慮始者功百而變常樂成者利十而易業一隅何幸二者盡就況啓而未通通而未有斯事之盛皆我國家元澤寖遠絶垠胥洎古所不載寧可默而無述也盍刊石立紀以貽來裔是以追之琢之樹之不朽臣聞啓聖者天也宜有以覺悟受命者聖也必有以明徵故神不言而可知時將至而先兆當陛下龍潛上黨也或託類於雲物或效靈於卜筮意者天之丁寧垂象唯恐後時又以潞水之泓深山鹿之捷走馳騎是獲厲流不濡非力所能以明或躍乾之上體時在九四神道幽贊聖期密邇自後而占何著明其若此蓋天福海內地降聖跡以瑞非常之后以決如神之策至於再三明必信耳有郡掾崔弻時其從行見龍騎先馳謂河流可涉亦既數步遽己滅頂不沈也安足以驗飛無凡也於何以昭聖事來自久命常維新臣不勝至願謹為聖應圖遂獻贊曰龍之或躍泉有何深神亦成象化為背禽淩厲是獲明命則忱如彼從掾焉能不沈元聖有作大賢將其命良弻有二侍中是其一所從龍虎實感風雲我之裴公道與上合義深體國策在忠主亦既致於堯舜不惟比於管樂至於執人柄振天綱丹青帝圖金玉王度雖古之作合謂之有開未始聞也夫事可法道可度威可畏儀可象赫喧中來精英外發故工繪其事所以見盛德之形容士頌其功所以知和氣之導達五事曰貌一以作恭七聲成文六乃為頌俾凡今之人色斯而覩奧聽之而知理水有方折辨和氏之價焉山為具瞻表師尹之重焉贊曰赫喧人望時為國紀偉量川渟高標嶽峙磊落成節精明入理倬哉輔臣式是多士丹青炳發儼如至止夫形者神明之表而動用之應也察之苟至則珠玉雖蘊光輝必兆於山泉而睂睫可知賢達亦徵於骨象如宋公之天姿森挺人望儼然一覩清揚不俟深鑒是猶雞㣥見鶴象齒非牛居然有差此其殊特者也聲聞如彼風格又爾寧有陳平之美更虞子羽失之耶雖妄庸之目素非知公者偶見斯狀亦已明其瑰異焉初公舉茂才歷長安尉三為御史再入尚書郎色莊以立朝則百僚所憚言揚於伏奏則三臺為表而竟以出守俄復從邊其故何哉由抗直之為患也然公處屯而必行其道居陋而不改其度能貞其節可謂君子哉才為國而生命有時而泰彼宋公修志以俟也其復可立而須焉時其族兄曰之望者亦賈生之謫居有顧君之畫絶偉公之貌作為是圖意得神傳筆精形似因命僕為贊其詞云宋公卓犖體標山嶽匪石不移如玉斯琢被服忠信規模禮樂望之儼然允謂高邈畫天尊像者贈吏部侍郎武功蘇公夫人崔氏為公卒哭之所作也蘇公有重名於時未大用而卒遭命不遂當代所悲況作嬪於公鞠凶在疚援詩以誓其節執禮而哭於晝哀而能感感而能通極希微而不見中恍惚其如在於是欲介景福將祈太清因心寓象命工設色飾金闕圖玉皇元天不遠真官在列飄若靈氣爛其神光彼昭厥誠允速其應斯所謂元鑒無昧當受謁帝之符幽魂有憑必署升仙之籙此固崔氏之至願也有足悲者不其猗歟銘曰至哉天京災劫不及上有靈府聖真所集彼美孟姜聞斯洞彰仙道貴度我君則亡猗歟我君蔚為人傑命屈金鉉神傳玉訣遊魂大素介福上清式圖元象永觀厥成粵若稽古有釋迦如來示滅雙林常在三闕二字能闕七字權多所康濟天水趙氏之七子者若人有闕一字極闕八字先妣作禮導師心不可以即空事不可闕七字慈作為應身生未悟之闕一字夫如此求者可不闕九字鑿巖因禹不必闕一字須達之園攦指非倕安在闕九字摶翠壁而上闕一字攻香龕以洞啓通礱密石見闕九字湛然不動復次隋所圖擬殫其闕一字異寂闕十一字月貞孟陬則闕三字天闕一字之建正是如來闕十一字雖古之介福未始臻于闕二字惟夫人姓牛闕十字寇牛父厥後有晉將軍闕一字金金十一闕十二字即夫人烈考也始闕三字趙闕七字次曰闕六字貞曰頤貞曰彙貞闕九字歷闕一字交汾陰闕五字監察御史未闕一字屬闕三字河闕五字于闕一字吏公之懿親闕三字不調終於檀州録闕二字軍事夫人闕三字直而敏喜慍如一道心闕一字然內訓垂裕初府君之沒也長子方冠少男未髫趙闕五字以禮蘭玉竝秀闕七字在堂已六子從政闕三字而不遠闕二字風樹忽驚闕十字載宏闕八字豈其闕一字爾下闕興佛是闕一字江漢閒州以十數而襄陽為大舊多三輔之豪今則一都之會故在晉稱南雍在楚為北津厥繇哤雜亦云難理而前此領郡鮮能安人或寬或猛或拘或抗跡多弗類俗亦弗寧是以天子念與我之理而公受煩卿之寄矣公名恆字子濟其先某人也祖帥幽州長史父禮庭奉天討監察御史世不苟合義在難進雖無充量之位而有積善之烈矣公性持重有器望即溫而厲居敬而度量可以軌物德義可以服人而先王遺言率由好學君子行道必本忠恕浚源水潔厲翼雲翔故一舉為拾遺已有遠致三入為御史侃然正色當時知音謂且大用而尚書理本郎官選才亟踐諸曹克壓㣥議及再典大郡遂佐益州攝御史丞都督西南軍事原軫超將豈惟上德翁歸中立實兼文武先是兵連蠻徼歲轉軍儲擾我公私費以巨億公乃急其所病思有以易之建大田於雲南罷饋糧於巴蜀向之踰重阻冒毒瘴負擔以踣斃垂耳於剽掠者每十有五六及公底績盡境賴全至於是邦也政實有素今也惟行不違其方以索其極莫不教之誨之優之柔之從者善之否則威之先德後刑端本肇末物知所勸事則有經率訓者衆多變薄為厚感惠者深遠既和且均夫然後人斯恥格庭少諍訟參佐閒拱屬城晏如其始也一年而政成其終也三年而頌興愛之如父母畏之如神明開元十二年以理跡尢異廉使上達天子嘉之稍遷陝州刺史暨解印去郡攀車盈途或願借無緣而人吏遮道或瞻望弗及而老幼啼呼如是者五里已終朝十日乃出界而皆有言曰捨我何之及聞公之喪哀可知矣市為之罷舂以之輟惠愛之結深古今之感一蓋為仁由已而遺德在人者其若是乎郡中士大夫與門生故吏聚族而議撰德是以刻石立紀彼鮦陽之陋墮淚成碑此峴山之績銘曰英英靳公宣哲秉彞為我髦士作人元龜倜儻大節磊落瑰詞人亦有言天實資之御史直繩郎官高選動必兼遂能皆再踐糾遏邦慝彌綸事典遂及我人化流樊沔激厲素風抑揚善政約紀為法急人所病物故推誠事匪忘敬感被於下仁明在詠舉德不鮮涉道載深穆然清風莫其遺音繄公既沒厥跡可尋勒石是圖以慰氓心夫物之所宗也莫善乎德行道之以明也莫先乎文學人倫以具體為難世業以濟美為貴有能兼之者其東海公乎公諱堅字元固其先東海郯人永嘉之後仕業南國因家吳興焉隋氏平陳徙族入雍今為馮翊人也原其伯翳平水土實佐文命偃王行仁義大啓徐方因國保姓克昌厥後逮乎漢魏間出仁賢十二代祖晉江州刺史順德侯寧至五代祖梁直閣將軍慈源侯整整生陳始安太守綜綜生隋延州臨真令方貴方貴生唐果州刺史孝德孝德生唐西臺舍人贈禮部尚書齊聃出入六朝載祀數百文武冠冕存歿光靈訓子克家謀孫必復賢風儒行世有其人公即尚書府君之元子也生而濬發默識經藝粵自童齓則善文言時先府君為沛王侍讀公之岐嶷聲振平臺王聞而延佇與之談議授能賦博奕惟賢門客府寮深所厭服奄遭不造十四而孤祖母金城郡君姜太夫人念其聰異誨以志學公遂刻勉詣心精微磅礡九流激昂三變景倩幼露實賴愍孫令伯大成抑由祖母上元中遭姜太夫人喪哀幾滅性制則從禮有感斯絶無聲常淚服闋州辟秀才其年登科解巾補汾州參軍事部送邊糈至於定襄軍使王本立素重公才署為管記書奏謀算悉以咨之坐耀鋒鋩未嘗肯綮尋而換雲陽尉萬年主簿親纍出為楊府功曹振鱗將摶載躍京轂垂翼遠逝有聲東南俄遷太子文學時祕閣㣥籍大抵訛謬有敕召學士詳定公實在焉為之刊緝卷盈二萬時輩絶倒服其博達尋與李嶠等撰三教珠英書成奏御拜司封員外尋加朝散大夫即拜郎中稍遷給事中以公代及文史詞不失舊雖居瑣闥尚比纏牽遂除中書舍人君子曰舜之官人也二年敕公修則天聖后實録及文集等絶筆中宗嘉之璽書敦慰賜爵慈源縣子賚物五百段旌良史也遷刑部侍郎加秩銀青光祿大夫轉禮部侍郎兼判戶部公久踐朝廷纍登省閣舊章必練即事無疑雅不煩文深得大體雲臺高議以此歸之進封縣伯食邑五百戶兼昭文館學士受詔與天竺僧菩提流志譯寶積經及柳沖等同修姓氏系録三教寶真萬族有倫亟見成矣太平公主內秉國權駙馬武攸暨外收人望命公至第拒而不行惡夫佞也景雲初今上夷亂主鬯東朝宮相四員時難其選二以宰臣兼領一則天子故人任良兩宮實在公矣遂除右庶子兼崇文館學士修史如故進爵東海郡公食邑二千戶遷右散騎常侍以本官兼黃門侍郎尋而即真祿賜同三品爵崇五等道茂兩宮利君謀身舉代皆譽又以刪定格令承恩進爵二等公請回授叔父齊莊帝用懷之遂封齊莊為長城縣子天下義士莫不激昂焉侍中岑羲公之姻婭與其聯事深自危懼求典閒司以遠祗悔遂改太子詹事逮羲禍敗地絶嫌疑先是不交定王及此不眤岑氏見炎莫附思患預防信達人也復以親纍出為絳州歷永蘄棣衢四郡山川分位楚夏異齊公政不易宜教以因俗德化歸厚人共由之開元中會同京師遷祕書監無何轉國子祭酒皇帝稽古崇訓開堂集儒以公才學元長命登首席遂令集賢殿修撰又除右常侍以公為學士副丞相燕公知院事綢繆顧問日月獻納恩渥尢及少有其比上將柴於岱宗詔公草其儀注定禋祀之位廣配類之儀博文約禮或㳂或革言出而人伏事立而天從時議遠矣及禮畢承恩特加光祿大夫時置十銓公在分掌程不愆素且無遺才公既贊相謨猶從容諷議大鍾必諫溫樹不言啓沃盡規實致君於堯舜死生有命空比德於老彭享年若干以開元十七年龍集己巳五月丁酉薨於長安頒政里之私第聖人震悼君子稱嗟翌日有詔褎贈太子少保贈物若干段粟若干石特遣中使內侍伊鳳祥弔祭而別賜布帛若干端匹俾鴻臚少卿元復監護葬事官給鼓吹儀仗太常考行曰文君子曰仁而愛人敏而好學家有榮業紹其弓冶國有大事修其典章諡之曰文不亦宜乎其年冬甲子與夫人故南陽郡夫人合葬於萬年縣之少陵原先塋禮也公寬裕有禮溫良能斷智出於象外樞得其環中行之積也厚名之立也大故起自黃綬纍踐赤墀五省推高連州得最事將時並位與才偕莫之天閼也至於升堂入室探微覩奧動有禮樂之運言有雅頌之聲是惟無作作則萬物和而八音備矣蓋嘗注史記修晉書續文選大隱傳及有文集三十卷皆資於故實博於遺訓古今通變河漢共高或藏名山或升天府亹亹然各得其所嗚呼文仲歿而其言立子産終而遺愛存公則備焉宜受戩穀保艾厥後代代守之有子曰峻嶠嵬等才以雅著孝以特聞學茂高曾之科旨詞雄祖考之風格備歷清貫皆立能名三賢德聲方賈氏無愧纍葉儒訓與班門孰多咸瞿瞿如皇皇如昊天不追終身積痛求舊撰實勒諸墳道僕從述者之後敬而伸之乃為銘曰舜命益虞疇功帝俞偃行文教代集通儒光華鼎閥出入秦吳門多長者君其最乎其一曾是好學果行洵美日就鱗成風積鵬起黃綬覆簣朱門方軌官籍正人朝稱良史其二三入承明五遷外郡道有出處心齊喜慍帝思啓沃國尚師訓屢獻針規偏承顧問其三居常有異博而無惑綿蕝孫通銓衡叔則為龜為鏡立言立德胡不憗遺左右王國其四悼興冕旒哀結衣簪官供羽仗士惜人琴巳矣終古平生德音松枝掛劍碑字生金其五夫道遵常習故蓋人拘於凡也得精亡粗是天縱於聖也方聖上之拔太師也豈藉譽於朝廷哉徑取才於無跡懸收功於未眹而終致大用克成休烈使祖虛名者見西子而憎貌工橫議者聞魯連而杜口乃知古謂則哲惟帝其難今之得人遇聖為易能允明主之鑒不負真賢之實者其在正平忠獻公乎公諱光庭字連城河東聞喜人也伯翳之後與秦同姓始封於裴因邑命氏在魏晉之際為人物之傑與琅琊王氏相敵時人謂之八裴八王自茲厥後奕代更盛大王父定高周大將軍馮翊太守琅琊公大父仁此處基字避元宗諱隋光祿大夫追贈持節原州都督天之既厭隋德矣見危致命不亦難乎諡之曰忠春秋之義也父行儉禮部尚書兼定襄道行軍大總管聞喜縣公贈太尉時或有奸王命矣禁暴安人不謂重乎諡之曰憲尊名之典也公即太尉公次子降神元和含光不耀越在初歲巳有老成雖遠大是圖而近識莫悟學探帝載何事小名業綜人倫豈矜一善弱歲居太尉憲公喪幼以孝聞尋補宏文館學士神龍初明經擢第授家令寺丞轉太常丞加朝散大夫景龍中以親纍外轉尋入為陝王友改右衛郎將丁晉國太夫人憂柴毀骨立殆至滅性服免起為貝州別駕未之就也復除右衛郎居無何遷率府中郎嗟乎有其道而無其用不可行也得其時而不得其志亦不可行也公負經綸之器韜王霸之略自委洎外臺棲遲下位出入從事十數年閒坦然而自若者何哉蓋知才有所必伸命有所必與非苟而巳開元中聖上思光祿之休烈嘉太尉之元勳是必象賢其將大受特拜司門郎中轉兵部仙臺之文始應列宿鴻漸之羽可用為儀遷鴻臚少卿以觀其能也是歲天子有事於岱宗諸侯會朝於行在執籩豆者不限於中外獻琛賮者亦勤於駿奔莫不來享無有遠近而執政者以公代曉邊事職在行人且曰夷狄豺狼黷盟阻德我今有事戎或生心我張吾師有備無患若何公曰不可夫封禪者所以告成功也觀乓者所以威逆命也云亭苗扈非一時之事也受脤執燔非三代之禮也天方佑我光啓舊服憬彼獯鬻能違天乎無庸勦人可以諜告從之秋九月突厥果使其相執失頡利發與其介阿史德暾泥熟來朝公之謀也東封還遷兵部侍郎圻父之職夏卿之亞存而舉者悉以咨之公於是考遺訓補缺典飾搜苗獮狩之禮詳施稅稽之賦頒九畿之政設九伐之刑以練國容以精軍實邊鄙不聳帝用嘉之既而拜中書侍郎同中書門下平章事兼御史大夫王言其出霈乎人有歸也天憲惟明肅乎人知禁也尋加銀青光祿大夫換黃門侍郎俄遷侍中兼吏部尚書宏文館學士總百揆之樞轄酌九流之淵奧叶文軌之殷度人神之和木火象鼎其惟實餗山川出雲用作霖雨時哉之會無得稱焉先是大化之行務以元默遵夫易舊章在而不議吏道雜以多端公於是求革故之實契隨時之義作執秩以平之設循資以定之謹權衡以選之考殿最以參之姦回無所措其邪噂不能介其量多士動色㣥方改瞻仰之者邈乎如山窺之者間不容髮或曰執事無乃惠歟公曰大命敢不敬歟若然方將致六符於泰階驅百姓於仁壽豈直睥睨先世紛綸近古汨而隨流守而勿失云爾哉二十年冬上幸河東祠后土命公兼左軍師禮畢賜爵正平男加光祿大夫抑人有言曰樹德莫如滋積仁莫如重則臧僖之慶有後於魯欒武之德未絶於人宜公侯之子孫必復其始也公嘗讀易至益之屯與升之漸乃喟然嘆曰物惡有滿而不溢高而不危者哉既而居不崇侈動不踰法雖百乘之家萬夫之長沖如也謂日用不知存諸方冊何天年未永瘼此台臣二十有一年春三月癸卯遘疾薨於京師平康里之私第春秋五十八朝廷哀傷冕旒震悼制戶部尚書杜暹即殯弔祭賻物五百段粟五百石喪事優厚官供輟朝三日丁未有詔贈太師諡曰忠獻使左庶子攝鴻臚寺卿李闕一字監護喪事以某月日葬我忠獻公於聞喜之舊塋禮也初知星者言上相有變良臣將歿謂請禳之公曰使禍可禳而去則福可祝而來也論者多之以為知命夫天下之達道有五所以行之者三曰忠孝仁安君忠也榮親孝也周物仁也此三者有一於身鮮矣而公實兼之且媚於人者必好其威福賢於事者必羞其謗政公知其然則以直道匪躬之故忠莫厚矣禮為人子春秋以致享義於人臣夙夜以從命公知其然則以時告如在之敬孝莫重焉夫以衡石之任陶鈞之力莫不責成於下吏求備於一人以故舞文雷同疑獄歲搆恬而不改浸以成風公知其然則以信察御物之惠仁莫加焉其行已奉公皆此類也嘗所著述率於針規以為惇敘九族本枝百代王者之盛也而義不可以無訓作瑤山往記維城前軌以諷之微而彰志而晦聖人之舉也道不可以虛行作續春秋自戰國迄於周隋以統之臣子之義也天人之際備矣非洽聞通理其孰能與於此乎宜其存無幸人歿有遺愛嗣子稹京兆府司録事參軍孝實克家動必中禮丕承後命紆天鑒而增華敢跡前修琢豐碑而不朽銘曰益作舜虞針分晉土慶流八族德盛三祖琅琊象賢懷文佩武光祿忠烈殺身報主尚書出將恢我王略文教內敷武功外鑠緇衣之敝惟公繼作用晦而明處豐思約鴻臚好謀夏卿稱職代天流化佐皇立極納於憲府好是正直乃宅冡司謀猷允塞盡瘁事國夙夜在公居無闕政歿有餘忠天子命我頌德銘功日月有既令聞無窮
