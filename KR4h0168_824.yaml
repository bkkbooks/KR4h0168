front:
  text: 全唐文欽定全唐文卷八百二十四黃滔三
  hash: sha256:9cc4cd49cc6e06556f2b9078c1e218e5e8ae0a753aa1cdf23ff1119d76e9cde5
body:
  text: 某啓戶部鄭郎中伏話鄭隱先輩專傳侍郎尊旨伏蒙於新除永樂侍郎處特賜薦論跪對吉辭拜聆嘉耗感激兢悚罔知所容某詞學疏蕪進取乖拙一叨貢士纍黜名場足間之刖處縱橫額上之點痕重謺今春伏遇侍郎精求俊彥歷選滯遺某又名礙龍頭跡乖豹變都由薄命翻負至公以此怔忪莫寧惶惑無已在良時而自失於異日以何歸謂一生而便可甘心歎二紀而徒勞苦節豈料侍郎堅垂記録確賜恤傷令後人而副取前心指陋質而說為遺恨將使蔡經之骨終繫仙家士燮之魂卻還人世蓋施陰德豈止陽功喜極翻驚感深唯泣明年春色致身雖出於他門今日恩光碎首須歸於舊地相公嶽降宏才神資偉望象外而藹然妙旨人間而凜若清風當以四三傑於漢庭九八元於堯日聖上以南澄鳶水克伏英威西鎮龜城須資妙略所以未歸台輔且據重難巍峩兩地之勳冠絶一時之盛凡在中外孰不具瞻三吳烟水百越山川干戈杳隔於音塵門館久違於趨覲空自明祈日月暗祝神祗相如徵出於上林賈誼召來於宣室不然者隱於商嶺棲向傅巖克俟搜羅直膺夢寐焚香稽首以日繫時滔一滯江鄉六更寒燠都由惡命早失良時迢遞一名進取則大朝有難零丁數口退休則故國無家歸蜀還吳言發涕下侍御麟鳳瑞姿蓬瀛絶境叔度與陂湖比量仲尼將日月齊明自飛翥九霄梯航陸海鄭門若市季諾如金為學囿之芝蘭作詞林之杞梓今則提攜陳檄登陟燕臺冠張豸角以巍峩幄折蓮花而照耀假途如此殊拜寧遙凡在人情孰不傾矚判官先輩萬頃襟神四科文行比鸞鶴而既沖霄漢喻龜龍而須瑞皇王今者賓幕清風士林重價雖欲留歡於五辟其如積望於九遷伏計即有新榮別膺殊命滔蒙知既異感德常深辭違遽變於暄寒禱祝敢忘於朝夕昨於道路纍附狀伏計迤邐上達滔行役近己到潮州伏以一路經過二年飄泊言則涕下靜而魂銷固非繫情於杯酒笙歌留戀於雲山烟水拋擲進趨之道遲回溫凊之期伏計夙鑒如愚必當知不得己又安可遠含丹赤莫寓聽聞且聖代近來時風愈正取舍先資於德行較量次及於文章無論於草澤山林不計於簪裾紱冕少有三舉五舉多聞十年草年而滔自厠跡其中且迷津不暇況乎來則無終軍意氣動則有楊朱路歧將卜一歸僅闕兩試人事如此光陰幾何先輩特賜恩知殊為誘誨時或軫念固應動心然亦否極則通彩來自聖他日而若無好命今辰而焉有良知唯當依倚栽培咨詢可否陳琳箋檄寧容久借於外藩夫子牆門虔俟再趨於上國伏以司雞殷朔建虎堯辰仙人則飲柏延齡詞客則浮椒獻頌伏惟相公膺茲令節納彼嘉祥召伯甘棠蓋地之芳陰更濶亞夫細柳連天之瑞色長新與青陽而同發生揭鴻鈞而普播物永貞國柄堅律師壇伏以青陽變律乃二儀革故之辰獻歲開正是四氣維新之日伏惟僕射與春符契觸物貞亨迎瑞節於鳳銜榮兼四輔建碧幢於甌越永保千年凡於動植之間長受暄和之賜滔今月二十日輒以所業賦一軸陳獻清嚴持腐草之造扶桑鞭段之觸騏驥所宜唾面敢俟回眸伏以起居為八韻之咸韶作九流之溟渤凡言進取須自品題而滔二紀飄零三朝困辱若不仰投門館虔佇發揚則永攜疑玉以汍瀾長伴啞鍾而泯默攀託祈禱倍萬等倫滔獻賦命奇食貧計盡難安桂玉須逐萍蓬伏念灞滻行塵周秦去路平言南北猶悄神魂況今攀託門牆依憑奬顧以坑谷蒼黃之態戴邱山岌嶪之恩得不欲別還留將行復卻丹誠聚血雙淚流珠矧當杏苑烟晴柳溝風暖陌上而㣥英得意塵中而衰髮傷離設令勇若荊軻固亦慟如阮籍伏以右丞宏施陰德濬哲仁心儻或荑枯肉骨之未忘則膠柱刻舟而敢怠寧言今日唯惕將來遲回數仞之牆邊移時忍去愴恨九重之城外舉策何之感戀屏營罔知攸處滔依棲門館感激生成頻年忝極薦之書詞逾一鶚纍榜以未亨之數愧積遷鶯莫不惕息肺肝兢惶顏面既茲負纍合在棄嫌而又薦以羈遊仰干箋翰雖宏容之不改且循省以何安冰炭交懷芒刺在背今則已裝行計即擬出京不唯推戴嶽之誠指於皎日抑且切戀軒之志泣向清風攀感屏營罔知指喻滔近者輒持齊戒虔寓箋毫瀝南山待旦之誠告北陸移暄之律理雖可憫罪或難逃伏惟舍人義路無疆詞源絶岸設鑄顏之爐冶恢薦禰之箋函今則主文侵入院之期哲匠走致書之日儻蒙枉於公道申以私恩念滔夙陷義圍薦臨文陳化鯤海闊乘風水以未知為鯉年深逼雲雷而愈懼特因薦士敢乞編名則獲從金籙以上聞焉有玉皇之不齒立辭坑谷繫在生成攀託禱祠涕淚沾迸滔伏念聚蚊響於出震之音其雖懸越奔羽族於鳴岐之德乃不參差事既同途理宜瀝懇伏惟侍郎韞縑緗之奧學負詞賦之重名相如則逸格掞天孫綽則英聲擲地播於金石流入典謨竊以滔架屋懷慙披沙莫喻固自循揣豈宜贄投但以水合朝宗雲須觸石由是身賫鄙拙首叩門牆實為舉場之中貢士所業律詩古調詞賦歌篇前則貞元元和之風耳聞其事近則咸通乾符之事目覩其風求知己則咸禱於兼功斷否臧則須歸於本面然後人方必信道逮無疑則滔一生辛勤數載攀祝必若題品不出於侍郎金口薦揚不出於侍郎瑤函縱能別契亨通固宜終慙暗昧矧以迷津未己泣刖方深比者先輩陳樵早同硯席曾將姓字虔為啓聞伏知侍郎猥賜奬容異於倫等其後薦自同志嘗聆玉音而侍郎文學蓍龜朝廷領袖滔不敢以後來舉態近日時情僭瀆尊嚴躬陳一二今則久摧鬐鬛又近風波溝隍無必出之門肝鬲在須傾之地免叔向則他日莫議活士燮則神術所能願推恩於留馬埋蛇庶受賜於荑枯翼卵下情無任攀託依投激切惕懼之至滔伏以十一日才除主文旋瀝情懇罪責則可言於躁切憫傷則宜恕於單危非不三省九思沉吟箋管而以途窮日暮恐懼風波亦猶抱沉痾者悉將虔告於神醫懷至痛者無不上呼於穹碧伏以學士舍人軒銅照膽蜀稱懸心仰惟燭臨當極幽奧且夫禮司取士寒進升名若無哲匠以斫成未有良時而自致不然者則安得權懸至鑒代有遺人伏惟學士舍人標表士林梯航陸海凡言進取須自門牆今以文柄有歸至公宏播則精力固同於造化嘉言乃作於蓍龜而滔折角有年交鋒無託羽毛零落鬐鬛摧殘若不自學士舍人推恩極山嶽之隆攘臂到溝隍之底則還慙抱甕難出戴盆兼近者面獲起居親承念録哀滔昔年五隨計吏刖雙足以全空今復三歷貢闈救陸沉而未暇許垂敏手拯上重霄謹以誓向鬼神刻於肌骨中興教化一身免沒於風塵下國兒孫百世敢忘於厮隸下情無任攀投懇悃之至滔伏念薦孟明則子桑所能免叔向匪祁奚莫議推言及是瀝懇為宜上瀆清隆敢希容聽伏惟侍郎中丞頃持文柄大闡至公垂為聖代之準繩懸作貢闈之日月滔為後無私之兩榜遂乖必字於十年伏蒙侍郎中丞曲賜憫傷直加賞録連歲薦論瑣質傾極重言而以弱植難培么絃易斷且驚負纍空費生成既而不罪龍鍾愈隆恩遇昨者面容跪履親俾窺天仍加琢玉之品題更啓如金之然諾便於此日上翥重霄今則已除主文只祈陰德延頸於溝隍之底瞻恩於邱嶽之隆雖龜龍不瑞於匹夫而犬馬合由於本主沾巾墮睫瀝膽披肝不在他門誓於死節下情無任攀託依投懇悃之至伏以羲爻不兆之文何人復演魯史不褒之言曠古誰稱厥理非遙斯言可喻伏以侍郎榮司文柄宏闡至公歷選滯遺精求文行泉下則大臣有感揭起銷沉場中則寒族無差酌平先後所以如滔者曾干衡鏡經定否臧若不蒙指向後人說為遺恨則宰輔之為薦舉帝王之作知音而主且不言人誰肯信由是須作侍郎金口須自侍郎瑤函今則論啓無私恩加瑣質錫生成於此日逈分付於將來早從握內以擠排便是眼前之科第然後念以漸臨風水莫如蓬島之音塵俾拜雲天親吐蘭言而誨諭留心及是自古所希莫不拳局循涯闌干抹泣質向神鬼誓於子孫鶯谷乘春雖託他門而振羽糜軀異日須歸舊地以論恩瀝肝膽以無窮寓箋毫而莫戴下情無任感恩懇悃之至今月二十八日張道古參軍仰傳仁恩伏承舍人學士不以滔幽沉榮賜論薦初疑夢寐旋認生成不知所容兢惶戰悸伏以舍人學士半千膺數全碩負才嘉名冠絶於九流逸步翺翔於四戶頃者重於知己避以文闈隆行望於聖賢蓄基負於台鼎竊惟薦士豈易其人而滔蹤跡蹉跎藝能淺薄敢期宏造遽及茲辰金口開時講貫則處其異等瑤函發處推揚則置彼極言事出殊常榮非所望感深唯泣喜過翻驚不知微生何酬厚遇中興教化餘年獲出於溝隍下國兒孫纍世敢忘於厮隸伏以曦轡流輝己侵窮臘禹門飛浪即到登時莫不禺多士之精誠佇有司之新命竊惟萌朕己見升沉若滔也折角有年爭鋒無主空秉龍鍾之態仰希傷憫之求此亦有類守株其疏若網伏惟員外學士猥隆恩遇克異等倫近者面獲起居親叨然諾自歸旅舍徹坐寒宵歷將往事以思惟洞見今辰之通塞且夫春官取士寒畯升名若無哲匠之斫成未有良時而自致不然者則安得權懸至鑒代有遺人伏以滔別無知音只投門館儻或員外學士止推言於公薦不攘臂於私恩則滔也望絶飛馳甘為簸棄至若白雲巖谷青草汀洲敢辭依舊秉耕踵前沉釣然以來時耆舊別後交親皆謂中興雪先朝之困辱寧期上國看後輩之飛鳴必疑有過於措持無聞於卿士既顏面而斯乏須蠻貊而云行是以瀝膽披肝碎身殞首永將死節不誓他門伏惟員外學士義路連天仁心匪石敢希援拯畢賜生成珠岸盤根始作不枯之草金丹入口能還己逝之魂祈禱依投啓喻罔近下情無任攀託懇悃之至唐設進士科垂三百年有司之取士也喻之明鏡喻之平衡未嘗不以至公為之主而得喪之際或失於明鏡或差於平衡何哉俾其負不羈之才蘊出人之行歿身末路抱恨泉臺者多矣嗚呼豈天之否其至公之道邪抑人之自坎其命邪潁川陳先生實斯人之謂與先生諱黯字希孺父諱贄通經及第娶江夏黃夫人賢而生先生無昆弟姊妹十歲能詩十三袖詩一通謁清源牧其首篇咏歌河陽花向時豆新愈瘡之如豆牧戲之曰藻才而花貌胡不咏歌先生應聲曰玳瑁應難比斑犀定不加天嫌未端正滿面與裝花由是聲名大振於州里十七為詞賦作蘇武謁漢武帝陵廟賦便為作者推伏二十為文先生松姿柳態山屹陂注語默有程進退可法早孤事太夫人彌孝熙熙愈愈承顏侍膳雖隆雲路之望終確綵衣之戀既而及其子蔚冠太夫人勉之曰付蔚於潘嶽之筵俟爾於郤詵之桂方起於鄉薦求試貢闈己過不惑之年矣乃會昌乙丑逮咸通乙酉其間以寧家兼在疚之日斷絶往來吳楚之江山辛勤秦雍之槐蟬歎嗟知已之許與同郡指泉州王肱蕭樞同邑林皓漳浦赫連韜福州陳蔇陳發詹雄同時而名價相上下嗚呼斯八賢皆以不羈之才出人之行懇懇乎進趨恂恂乎鄉黨而無所成豈天之竟否其至公邪抑人之自坎其命邪俾有司失其明鏡差其平衡之如是結寃氣於名路之中銜汞恨於泉臺之下豈不甚與先生之文詞不尚奇切於理也意不偶立重師古也其詩篇詞賦檄皆精而切故於官試尤工滔即先生之內姪也自丱趨隅洎隨計之歲先生下世後二十年而忝登甲第東歸之日求遺藁其季子蘧泣曰兵火也少得其文三十一首賦若干首他處得詩若干首敬俟增而後述天復元年辛酉滔叨閔相之辟旋使錢塘與羅郎中隱遇隱曰咸通初與先生定交於蒲津秋賦之場賦則五老化為流星詩則漢武橫汾先生之作也為試官嚴郎中下都之吟諷秋場五十人之降仰今遺藁可叢願為之序既還不及求增謹以所得之文賦詩箋檄分為五卷收淚搦管為之前序將寓正郎為之後序正郎負宇內之雄名用釋泉臺之永恨時天復二年秋七月十日也詩言簡賦詞飾不可以敘事故若之行也送以序襲明早舉童子舊儒因以小松為之目襲明默而思松之小者干霄之勢則爾搆厦之用則否推是言之齠而一飛不若冠而十上乃退碩乎業果以詞學擅州里譽洎中興之十年寒進亹亹於科第襲明業東而跡不西惜違親也近吾姊以他人之繼翔念襲明之久蟠悄焉如疾吾得以與內外之親輩流之善者日激其行旋振於府帥州牧遂不得留於膝下大哉吾唐之設科第也實本於鄉舉里選鄉舉里選莫不以忠孝先之繇是諸侯之歲貢其觶云忠於國孝於家內則閨門和外則鄉黨附今襲明孝於家也閨門和也鄉黨附也而移孝於忠中興之第吾慶有司之得人非慶襲明得也矧詞學擅譽前輩梗於公道或一倍兩倍孫宏之上今輩利於公道無再獻三獻卞和之泣若其勉諸高堂之違吾知不及荐閏國人之釣也一釣聯六鼇而存者一鼇而已其猶背蓬萊方丈嬉遊神仙偉夫設六者不餌其如何哉洪濤七其洲渚塵世幾其躁妄則以古以今之君皆秦漢也推是言之斯人也不謂無功於有國故追以讚之曰磻溪之釣兮釣更殷周龍伯之釣兮釣減嬴劉腹濬背虛兮一聯月鈎巨骨駢器兮鴻膻謺羞豈惟一時兮表奇東海抑乃萬祀兮垂祉中洲夫山嶽之隆莫隆於嵩華江海之大莫大於溟渤故天之生聖賢於百千年也乃禀其奇秀以為之氣色包其浩蕩以為之胸襟落落汪汪如龍如鳳然後總兵符於掌握懸相印於腰間煦育㣥生扶持邦國大矣哉將如是則命良工持筆之精賫墨之妙寫於儀貌移於繒素不可以不敘不述小從事滔職忝文詞齊戒而獻讚曰嵩華干天氣貌斯然溟渤紀地胸襟靡異謂如龍也至靈謂如鳳也嘉瑞列素在壁良工善移一時丹雘兩面風姿秋月寫彥回之質岸寶山分叔則之表儀松森峭壁日映咸池聖君急麟閣之繪明朝當詔旨之飛索而觀之天有日月民無一旦之薦地有江山歲有四時之禱得非彼之至明烏兔無得而私焉此之至大神龍其或權焉是則尊有天下無不日月其德而億兆之心咸急江山之禱列位於朝無言於君曰輔歟抗跡於野有言於君非輔歟麟鳳龜龍王者之嘉瑞朝其庭乎暮其沼乎武王聖人也周公聖人也召公賢人也天下三分以其二分以火殷辛且致夷齊之扣馬設使盡天下之三分姑至殷辛之自火然若太伯之君吳則百穀合穎於舜耕九鼎同波乎禹圭仲尼之又盡善也寧獨韶乎既而異諸則周之道首陽之餓乃諫死作夷齊輔周吳人之疾不救其屬善醫憫其家竭其術以治之楚人之疾救其屬善醫欲其家逆其術以治之君子痛二醫之行若乎治亂比干知殷之不救而救之仍藥之以九竅李斯目秦之救而不救之卒鴆之二世嗚呼殷之亡也疾之甚矣秦之亡也醫之罪也後之有國有家者得不慎乎醫或謂聾者曰師曠也瞽者曰離婁也無不悖其辭之戲或謂魯儒曰顏閔也蜀儒曰揚馬也無不喜其辭之美是何彼以視聽之亡而茍能自鑒此以耳目之貌而反不自知噫芝蘭草也松桂木也喻於君子而榮之桀紂君也李斯大臣也盜跖華胄也喻於小人而恥之則知蛇克銜珠而奚蛇龍苟醢身而匪龍噫仲尼之道顏閔得之為四科後人得之為顏閔鳥獸得之為麟鳳草木得之為文彩故廟之堂有文柏焉頃為官於國子者刃一枝器有司得而竄諸噫聖人之道未嘗不缺也若天之西北地之東南日之昃月之虧也故聖人窮於陳蔡宋衛顏夭麟傷皆有以也設使不有陳蔡宋衛之事則何以象天地日月之盈虛乎顏不夭則何以感子之慟麟不傷則何以明子之道時君缺之也斯柏也不為其官者刃而竄諸則何以繩後之權者謂必權者是取之器也故天以傾西北而拱列宿地以缺東南而朝百谷日以昃而成早暮月以虧而見盈縮子以陳蔡宋衛而示損顏以慟而益彰麟以憂而示時君斯柏也以刃而後永則知聖人之道不缺則不全於不朽也公孫甲善畫松漢武帝時公卿皆求之或旬或月或季得之如至寶武帝暇顧東方朔曰卿得甲之松乎對曰臣未嘗得之色沮帝怪朔徐而進曰臣見公孫甲之善畫松舉國舉朝之人奇之狂然其所棲鶴其形吟風清韻或森疏澗底或蓊鬱庭際而過者罕不惑之目臣痛其假能奪真故不求之且丹青其筆物至於是枝葉其口人胡以勝臣敢以陳之昔妲已之假奪比千之真靳尚之假奪屈原之真宰嚭之假奪伍員之真是三者皆以至真之誠卒不能制其假矧不逮者乎武帝悄然改容翼日雪司馬史於既刑臺戾太子於不反客有宿唐城之鄙夢一神曰吾幸以神神之道獲司茲土之休戚饗其二仲之馨今值子之有道得以休焉旦北而徂山之曲乃見蒼翠一林其中則楮烟墨宇椒瀝坎地㣥焉胙充飛而不舉入謁廟貌乃夢中之見者也或曰不羞不醪不緡胡跡句斯廟也能倒錯倚伏肹蠁生死雖有道與不善一焉客曰果如是乎思其夢頗憤其神神之言乃詞以讓其略曰風雲其力溪壑其心福善禍淫賈茲反覆其神神之道耶前夕荐夢其神蹙容投拜曰微子吾乃不日為上帝譴矣向者悉吾左右蔽為不之察也幸子之教咸得族而併之矣客逢其里人以廟詢曰近者淫祀而罔應故不祀邱禱而無咎且二仲之馨存焉巫比言妖孽之至於人無不誠而懼士言妖孽之至於國無不逆而怒何哉曰巫能前知妖孽之至不能卻明妖孽之由士能前知妖孽之至乃能卻明妖孽之由故異也巫言可禳則設淫祀指虛應故誠於可為懼於所聞士言可禳則殺妲已活比干故逆於聞怒於不可為嗚呼設直士世用之如邪巫鯁辭國納之如簧言則有國有家者何逮乎患
