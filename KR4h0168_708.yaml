front:
  text: 全唐文欽定全唐文卷七百八李德裕十三
  hash: sha256:2f42b0026cdafefb8421c7555cbe6aafc9f152d9cc2ab7ac77aff76906c69549
body:
  text: 續漢書百官志稱三公及大將軍皆有記室主上表章報書記雖列於上宰之庭然本為從軍之職故楊雄稱軍旅之際飛書馳檄用枚臯非夫天機殊捷學源濬發含思而九流委輸揮毫而萬象駿奔如庖丁提刃為之滿志師文鼓瑟效不可窮則不能稱是職也昔安豐侯竇融徵還京師光武問曰所上表章誰與參之融曰皆從事班彪所為及竇憲貴寵班固傅毅之徒皆置之戎幕以典文章憲邸文章之盛冠於當代魏氏以陳琳阮瑀管記室自東漢以後文才高名之士未有不由於是選其簡才之用亦金馬石渠之亞况河東精甲十萬提封千里半雜胡騂遙制邊朔惟師旅之威容為列藩之儀表典茲羽檄代有英髦間者吳少微富嘉謨王翰孫逖咸有制作存於是邦其所不知蓋闕如也暨太尉臨淮王總節制之師德裕叔父嘗與斯職尋以才識英妙肅宗召拜監察御史厥後僕射高貞公今河陽節度令狐公以人文掌宸翰國子司業鄭公給事河南尹杜公以才華登貴仕繼斯躅者不亦盛歟丙申歲丞相高平公始自樞衡以膺謀帥以右拾遺杜君為主記明主惜其忠規復拜舊職尋參內庭視草之列次用殿中侍御史崔君德裕獲接崔君之後文學空虛才術莫逮繼清塵於吾祖挹芬烈於前賢先是廡廊之下有豐碑紀其名氏而不書職業今再刊斯記於本署西垣以高平公統戎為始元和十四年四月十一日記夫威鳳之炳然非海晏則不至卿雲之藹然非氣和則不出故君子藏器抱璞含忠育德不遭遇其時則光名不日昱是以干木之退也高於千乘君曼容之仕也止於六百石先僕射佩虎符而知足視蟬冕而蔑如由斯志矣先僕射苞文武之道有清直之德良玉美潤徒蓄寶於荊岑喬木幽深不呈材於廊廟知者所以嘆息也丞相鄒平公鍾是餘慶為唐寶臣公天挺奇表角犀特秀居五嶽也稟太華削成之狀方四時也得清秋爽朗之氣森子㦸以耀㯋粲圭璋而洞照蓋人之桀歟憲宗皇帝以神武之姿墾除葘害睿慮淡以泉默英威赫而電斷奇權祕計皆中詔决之參宸算者惟公與二三髦士揣摩潤色繄公稱首既平淮夷蕩齊寇四罪咸服八表晏然雖則武力之拘原亦由謀臣之決策洎今上之宅憂也衮龍未襲嚮明未位召公於東宮含春殿歔欷前席付以大柄公乃請偃武論道與天下休息上若涉水而得舟楫馭馬而有銜轡始拜言以命咎即其時而相說君臣之遇古無儔也公之為政貞以制動平以稱物其志在於識相體宏簡易而已嘗以為用京房之法則煩碎而亂理聽嗇夫之辨則捷給而傷化由是遵坦夷之路窒邪枉之門不勤人以務遠恥竭澤以言利矧夫洞虛明之境應必以誠端不言之蹊孰不歸我故奉聖者稱公為良相焉公之趨丹戺侍紫垣名冠近臣寵加贈典先僕射自珥貂而升左揆先夫人由趙郡而啓大國金印石窖當代榮之建中初先僕射以柱下史參梓潼軍計典昌榮二部益部之內有林居一廛庾氏誅茅始傷於寄寓仲長樹果終見於繁蔚公年才佩觿志拾青紫方覃思於經籍未馳騖於文章游焉息焉必在於是及鍾家難乃入為官暨韋太尉鎮是邦也公釋褐從事在賓幄之間逮茲抗戎旌佩相印曾未一紀繼為三公下車逾月訪於舊館邵伯之樹未翦武侯之廬猶在于公邑里遂見高車龍驤門閎竟容長㦸公瞻構灑泣循陔永思以為徵壞壁者夫子之居尚毀固朽宅者如來之乘斯遠孰若歸於淨土環以香林乃購之於官以為精舍又以桑門之上首者七人居之所以證迷途而資夙植也殿堂層立軒房四柱鎔金作繪髣佛諸天况乎蜀山葱蒨下臨於雉堞錦江明滅近繚於郊坰紅樹倚檻青蕖傍砌海雛乍來靈草長秀彼之聽和音者不惟於寂慮聞異香者自入於禪薰公之孝思永代作則豈止何充之宅獨入檀那將與文公之堂俱為不朽某藐焉孤生流落於代辱公感舊遂不見遺爰自內庭升台司居視草之列二三年間位階先達由是議人倫者歸公之盛德不陪密坐驟變寒暑迂懸榻之念忝授簡之思且嘗典綸綍獲備官寮報德不讓懼斯文之闕焉長慶二年十月二十三日朝議大夫御史中丞上柱國贊皇縣開國男食邑三百戶賜紫金魚袋李德裕撰有唐寶歷二年歲次丙午八月丙申朔十五日庚戌玉清元都大洞三道弟子正議大夫使持節潤州諸軍事守潤州刺史兼御史大夫充浙西道都團練觀察處置等使上柱國贊皇縣開國男食邑三百戶賜紫金魚袋李德裕上為九廟聖主次為七代先靈下為一切含識於茅山崇元觀南敬造老君殿院及造老君孔子尹真人象三軀皆按史籍遺文庶垂不朽謹記益州草堂寺成都記云在府西七里去浣花亭三里列畫前長史一十四人節度職不帶尹則帶長史非今賓佐也代稱絶筆余嘗於數公子孫之家獲見圖狀乃知草堂繢事靡不造真者昔巖野旁求徒聞審像嵇山高遁惟止鎔金孰若記之丹青妙盡神照楚國祠廟魯王宮室洎此邦文翁舊館皆圖歷代卿相粲然可觀雖有慕於前良曾莫究於形似豈與夫年代已遠遺像猶存入虛室而烟霞暫披拂浮埃而瑤林斯覿余以精舍甚古貌像將傾乃選其功德尤盛者五人模於郡之廳所追維二漢臺閣皆有圖寫黃霸于定國之流雖宰相名臣不得在畫像之列卓子康德行君子而在功臣之右今之所取意在斯乎闕既新光靈可想儼若對神吾將與歸因敘其事詔諸來哲太和四年閏十二月十八日西川劍南節度副大使知節度事銀青光祿大夫檢校兵部尚書兼成都尹御史大夫贊皇縣開國伯李德裕記懷嵩思解組也元和庚子歲豫獲在內庭同僚九人丞弼者五數十年間零落將盡今所存者惟三川守李公而已已歿者西川杜公武昌元公中書韋公鎮海路公吏部沈公左丞庾公舍人李公洎太和已丑歲復接舊老同升台階或才嘆止輿已協白雞之夢或未聞稅駕遽有黃犬之悲向之榮華可以悽愴况余憂傷所侵疲薾多病常驚北叟之福豈忘東山之歸此地舊隱曲軒傍施土堄竹樹陰合簷檻晝昏喧雀所依凉飇罕至余盡去危堞敞為虛樓剪榛木而始見前山除密篠而近對嘉樹廳事前有大辛夷樹方為草木所蔽延清輝於月觀留愛景於寒榮晨憩宵遊皆有殊致周視原野永懷嵩峯肇此佳名且符夙尚盡庾公不淺之意寫仲宣極望之心貽於後賢斯乃無愧丙辰歲丙辰月銀青光祿大夫守滁州刺史李德裕記德裕頃在內庭伏覩憲宗皇帝寫真求訪元真子漁歌嘆不能致余世與元真子有舊早聞其名又感明主賞異愛才見思如此每夢想遺跡今乃獲之如遇良寶於戲漁父賢而名隱鴟夷智而功高未若元真隱而名彰顯而無事不窮不達其嚴光之比歟處二子之間誠有裕矣長慶三年甲寅歲夏四月辛未日潤州刺史兼御史大夫李德裕記經始平泉追先志也吾隨侍先太師忠懿公在外十四年上會稽探禹穴歷楚澤登巫山遊沅湘望衡嶠先公每維舟清眺意有所感必凄然遐想屬目伊川嘗賦詩曰龍門南嶽盡伊原草樹人烟目所存正是北州梨棗熟夢魂秋日到郊園吾心感是詩有退居伊洛之志前守金陵於龍門之西得喬處士故居天寶末避地遠遊薉為荒榛首陽微岑尚有薇蕨山陽舊徑唯餘竹木吾乃翦荊棘驅狐狸始立班生之宅漸成應叟之地又得江南珍木奇石列於庭際平生素懷於此足矣吾嘗以為出處者貴得其道進退者貴不失時古來賢達多有遺恨至於元祖潛身於柱史柳惠養德於士師漢代邴曼容官不過六百石終無辱殆邈難及矣越蠡激文牛以肥遁留侯託黃老以辭世亦其次焉范睢感蔡澤一言超然高謝鄧禹見功臣多敗委遠名勢又其次也矧如吾者於葵無衛足之智處鴈有不鳴之患雖有泉石杳無歸期留此林居貽厥後代鬻吾平泉者非吾子孫也以平泉一樹一石與人者非佳子弟也吾百年後為權勢所奪則以先人所命泣而告之此吾志也詩曰維桑與梓必恭敬止言其父所植也昔周人之思召伯愛其所憩之樹近代薛令君於禁省中見先君所據之石必泫然流涕汝曹可不慕之唯岸為谷谷為陵然後已焉可也余嘗覽想石泉公家藏藏書目有園庭草木疏則知先哲所尚必有意焉余二十年間三守吳門一涖淮服嘉樹芳草性之所耽或致自同人或得於樵客始則盈尺今已豐尋因感學詩者多識草木之名為騷者必盡蓀荃之美乃記所出山澤庶資博聞木之奇者有天台之金松琪樹嵇山之海棠棐檜剡溪之紅桂厚朴海嶠之香柳木蘭天目之青神鳳集鍾山之月桂青颼楊梅曲房之山桂溫樹金陵之珠柏欒荊杜鵑茆山之山桃側柏南燭宜春之柳柏紅豆山櫻藍田之栗梨龍柏其水物之美者荷有蘋洲之重臺蓮芙蓉湖之白蓮茅山東溪之芳蓀復有日觀震澤巫嶺羅浮桂水嚴湍廬阜漏澤之石在焉其伊洛名園所有今並不載豈若潘賦閒居稱郁棣之藻麗陶歸衡宇喜松菊之猶存爰列嘉名書之於石已未歲又得番禺之山茶宛陵之紫丁香會稽之百葉木芙蓉百葉薔薇永嘉之紫桂簇蝶天台之海石楠桂林之俱郍衛台嶺八公之怪石巫山嚴湍琅邪臺之水石布於清渠之側仙人跡鹿跡之石列於佛榻之前是歲又得鍾陵之同心木芙蓉剡中之真紅桂嵇山之四時杜鵑相思紫苑貞桐山茗重臺薔薇黃槿東陽之牡桂紫石楠九華山藥樹天蓼青櫪黃心木先子朱杉龍骨闕二字庚申歲復得宜春之筆樹楠稚子金荊紅筆密蒙勾栗木其草藥又得山薑碧百合昔夷齊不食周粟餓于首陽之下仲尼稱其仁孟軻美其德孟子稱伯夷聖人之清者蓋以取其節而激貪也所謂周粟者周王所賦之祿是也諫而不從不食其祿可矣至于聞淑媛之言輟飱薇蕨斯可謂不智矣夫薇蕨者元氣之所發生四時之所順成日月之所燭風雨之所育周焉得而有之哉若以粟者周人之播殖則夷齊得非周人乎反覆其道盡未當理然夷齊之行實誤後人於陵仲子慕夷齊者也乃至不義其兄之祿潔則潔矣仁豈然哉厥後商洛四友畏秦之酷避秦之禍豈止潔其身而已然飧紫芝以為糧飲清泉以為漿終老南山以養其壽斯可謂仁智兼矣秦穆之殺三良詩人刺之矣春秋譏之矣今不復議惟三良許之以死而前代無譏何也且臣道莫顯於咎繇孝友莫盛於周公咎繇尚不殉於舜禹二后周公尚不殉於文武二王三良詎可許之死乎如三良者所謂殉榮樂也非所謂殉仁義也可與梁邱據安陵君同譏矣焉得謂之百夫特哉昔荀息許晉獻一言繼之以死君子猶嘆斯言之玷不可為也豈得以生同榮樂歿共埃塵以為忠乎晏平仲言君為社稷死則死之斯言得之矣自周漢迄于巨唐殺身成仁代有髦傑莫不顯一身之義烈未有繫一國之存亡惟紀信乘黃屋以誑楚赴丹焰而存漢數千年間一人而已漢祚四百繇此而興余謂漢祖建封紀氏宜在蕭曹之上報德未稱良可悲也揚子美辟疆之覺陳平非也若以童子膚敏善揣呂氏之情奇之可也若以為反道合權以安社稷不其悖哉授兵産祿幾危劉氏皆因辟疆啓之向使留侯尚存必執戈逐之將為戮矣觀高祖遺言呂后制其大事可謂謀無遺策矣以王陵有廷諍之節置以為相謂周勃堪寄託之任令本兵柄况外有齊楚淮南磐石之固內有朱虛東牟肺腑之親是時産祿皆匹夫耳呂后雖心不在哀將相何至危懼必當憂傷不食自促其壽豈能為將相之害哉高祖曰非劉氏而王者天下共擊之此慮屬呂宗矣何可背之厥後稱制八年産祿之封殖固矣若平勃二人溘先朝露則劉氏之業必歸呂宗及呂后之沒劫酈商以紿呂祿計亦窘矣周勃雖入北軍尚不敢公言誅諸呂豈不艱哉賴産祿皆徒隸之人非英傑之士倘才出于世豈受其紿說哉嗟乎與其圖之于難豈若制之于易由是而言平勃用辟疆之計斯為謬矣留侯破産以報韓結客以狙秦招四皓以安太子所謂必仗義居正由此知不尚權譎明矣袁盎對文帝曰絳侯所謂功臣非社稷臣夫社稷臣者主在與在主亡與亡盎見勃自德其功有以激之也非至理篤論此言足以惑文帝聰明傷仁厚之政俾其有薄宗臣之意竟使周勃大功皆棄非罪見疑可為長歎息也當呂后之世惠帝已殂少帝非劉氏陳平用辟疆之計權王産祿絳侯若不與之同心而制其兵柄必由此而階亂矣則劉氏安危未可知也盎曰諸呂用事擅相王太尉本兵柄弗能王也然磨而不磷涅而不緇未嘗不心存社稷志在劉氏外雖順遜內守忠貞得不謂之社稷臣乎其後絳侯繫請室盎雖明其無罪所謂陷之死地而後生之徒有救焚之力且非曲突之義楊子稱盎忠不足而談有餘斯言當矣善哉賈生之說喻堂陛之峻高者難攀卑者易凌文帝感悟養臣下有節有以見賢人用心致君精識若袁公者難與並為仁矣盎惟有正慎夫人席塞梁王求嗣此二事守正不撓忠於所奉害錯之罪虐貫于神明安陵之禍知天道不昧矣人君之德莫大於至明明以照奸則百邪不能蔽矣漢昭帝是也年十四而知燕王書詐後有譖霍光者上輒怒曰敢有譖毀者坐之周成王有慙德矣高祖文景俱不如也成王聞管蔡流言觀召公不悅遂使周公狼跋而東鴟梟之詩作矣漢高聞陳平去魏背楚欲捨腹心臣漢文惑季布使酒難近罷歸股肱郡疑賈生擅權紛亂欲疏賢士景帝信讒誅朝錯兵解遂戮三公所謂執狐疑之心來讒賊之口使昭帝得伊呂之佐則成康不足侔矣惜哉霍光不學亡術未稱其德然輕徭薄賦與人休息胸奴和親百姓充實議鹽鐵而罷榷酤亦任忠臣之效也才弱冠而殂功德未盡良可痛矣漢元帝習武帝游宴後庭又性好音樂與宏恭石顯圖議帷幄之中進退天下之士史臣贊曰優游不斷漢宣之業衰焉余以班固之言未盡其癖一作僻蓋懦而不才權移所嬖非不斷也夫帝王者天也天以剛健為氣粹精為體氣剛而健則三光不昏體粹而精則四氣不亂剛也者不息之謂也故權衡獨運四時不忒粹也者不雜之謂也故乖氣消散陰陽不謬若運動不在於權軸一作衡鎔鑄不由于大冶蕩蕩上帝復何為哉書曰天聰明自我民聰明又曰天視自我民視天聽自我民聽豈堯舜之時上下皆公讒說不行人與其聰明哉豈幽厲之君上下盡邪讒言相蔽人不與其聰明哉元帝自稱淫亂之君各賢其臣令皆覺悟天下安得危亡之君元帝蓋自以恭顯為賢而任之不疑也荀悅論略曰高帝天下初定庶事草創文帝躬行元默遂至升平而古典未備制度多闕武帝內修文學外耀武威而不盡其術不克其終宣帝任法審刑綜核名實而不用儒術理化不成歷數三代以及元帝曰崇尚儒業從諫如流引班固贊賓禮故老優游亮直又曰貢薛韋匡迭為宰相其旨以為專用儒術莫盛于此班固荀悅皆文雅之士以元帝好儒徵用儒生故以茲為美而深罪石顯痛心泣血稱詩人投豺虎嫉之甚也異乎余之所聞也任恭顯始于宣帝當先帝之世石顯豈能隳其大業哉則知惡不在于顯矣蕭望之周堪皆廊廟之器有師傅之恩石顯所忌廢而不用朋寵上書遂致於理其後劉向廢錮張猛自殺豈得謂之優游亮直乎賈捐之京房雖不終其身亦皆英特雋才道術奇士于元帝可謂忠矣亦因譖而死惑于讒邪則不斷疑於髦俊則用法亦不得謂之優游亮直矣貢薛雖能忠諫諫止於諷諭恭儉未嘗禦姦觸邪矣韋匡從容守位未嘗犯顏干色矣所以得乘時而進久安其位昔桀紂殺一龍逢比干而天下之惡歸焉桀紂以拒諫而殺其悖已甚元帝以信才而殺抑又甚焉王業既衰至成哀凌替才三世而王莽篡奪宣帝稱亂吾家者太子也知子莫若父信哉是言荀悅論曰夫獨智不用於世獨行不蓄於時昔人所以自退猶不得自免是以離世深藏又曰以六合之大一身之微而匹夫無所容焉豈不哀哉余三復斯論澘然出涕仲尼聖人也猶美顏子之行藏與我同志稱武愚不可及歎蘧瑗卷而懷之則聖人遵養時晦可謂至矣以仲尼之德足以塞叔孫之毀以仲尼之仁足以免陳蔡之困以仲尼之智足以避匡人之辱以仲尼之道足以容魯哀之世而逼迫多懼殆于危亡由是思之無非命也况王商者哉世人皆以貌寢質薄為數奇敦厚碩大為多福樂昌威重真漢相容貌懾單于而遘愍於時遇才而殞豈命之否也龍虎不能免于患及命之泰也蛭蟥皆得保其生余又聞之國之衰也忠賢先去故管仲知隰朋不久而齊國亂范燮令祝宗祈死而晉主憂伍胥戮而夫差亡汲黯出而劉安悖徒歎新都之奪孰救樂昌之禍昔秦繆以三良為殉君子曰秦繆之不為盟主也宜哉棄善人之謂也夫社稷之計安危之機人君不能獨斷者必資于所敬之臣然臣有忠邪時有險易交有淺深義有厚薄范睢山東之匹夫也入虎狼之秦履不測之險可謂交疏義薄矣而能尊昭王去穰侯開秦霸業之基以安固後嗣可謂忠于昭王矣夫能獨斷者英主也古人言謀之欲多而斷之在獨蓋為此矣天有震雷之怒龍有逆鱗之恨所以人君在於能斷耳然親戚之際恩義之重斷之于已不可也張敞所謂明詔以恩不聽㣥臣以義固爭而後許而令明詔自親其文非策之得也漢文帝誅薄昭斷則明矣于義則未安也周宣餞申伯有孔碩之詩秦康送文公興如存之感况太后尚存唯一弟薄昭而斷之不疑非所以慰母氏之心也漢成帝車駕至張禹第辟左右親問禹以天變禹以年老子弱與曲陽有隙乃言新學小生亂道誤人宜無信用帝雅信愛禹由此不疑王氏致漢室之亡成王莽之篡皆因禹而發可謂漢之賊也國之妖也雖蛇鬬于鄭鷁退于宋妖不甚于禹矣朱雲欲以上方斬馬劍斷佞臣頭斯言當矣後代有類于此者其臣可以范睢為師表張禹為鑒戒魏蜀吳三分天下而亡有先後非形勢有輕重積纍有厚薄察其政柄所歸則亡之先後可知也蜀政在于黃皓皓隸人也內不能修武侯之舊典外不能制姜維之黷武紀綱日壞君子不服所以先亡也魏自明帝之後政歸仲達齊王已降惟守空宮亡之淹速繫于師昭之志將移神器之重須服天下之心未立大功亦不敢取所以蜀滅而魏亡也孫皓雖驕奢極欲殘虐用刑而自專生殺之柄不牽帷墻之制運盡天亡而後夷滅由是而知人君不可一日失其柄也如神龍之脫深泉震雷之無烟氣威靈既露人得制之蔣濟覩魏文帝與夏侯尚詔曰作福作威為亡國之言所謂柄者威福是也豈可假于臣下哉後代覩三國之事可不戒懼哉任愷庾尹庾為河南尹名犯廟諱字又非便所以不書以賈充邪僻欲其疏遠勸晉武令西鎮長安惟羊祜密表留之祜豈悅賈充者哉良以愛君體國發于至誠耳晉氏傾奪魏國初有天下其將相大臣非魏之舊臣即其子孫所寄心腹惟賈充而已充亦非忠于君者自以成濟之事與晉室當同休戚此羊祜所以願留也昔漢高不去呂后亦近于此漢高嬖戚姬愛如意思其久安之計至于悲歌不樂豈不知除去呂后必無後禍况呂后年長有過稀復進見漢高棄之如去塵垢實以惠帝暗弱必不能自攬權綱其將相皆平生故人俱起豐沛非呂后剛強不能臨制所以存之為社稷也後世翼載其君者得不念于此哉宋齊以降繼體承祧者君德寢微王道凌替纘緒之初如革大運降宥解網以悅衆心仁義之風薄骨肉之情廢前史評之詳矣然政未得中改之可也如弓之高下者抑舉琴瑟之不調者更張此亦天之道也豈獨人事哉惟用其罪人不可甚矣天下之惡一也古人言一心可以事百君百心不可以事一君豈有不忠於前朝而能忠于後王者哉毀泉臺春秋之所譏先儒之所惡宋齊之君有一于此必為美政泉臺見妖尚不可毀况無妖者乎燕人之思召伯甘棠勿翦楚人之懷叔子望碑墮淚彼人臣也而見思若此雖時移政改莫非舊臣昔伯益贊禹稱大舜之德曹參事惠帝守蕭何之法魏文帝初受漢禪㣥臣皆贊魏德唯衛臻獨稱漢美文帝曰天下之珍當與山陽共之為人臣者罔念於此可謂有百心矣
