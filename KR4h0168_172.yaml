  - {type: head, offset: 2351, content: 洛陽人祁元泰賄司勳令徐整作偽勳插入甲奏大理斷泰為首整為從泰不伏(司勳二條), id: KR4h0168_NFKB_172-h17, level: 2}
  - {type: head, offset: 2490, content: 前屯營將軍游最犯贓解官乃於懷遠軍敘勳至上柱國司勳郎中崔仵奏最犯名教不合加勳左丞批士有百行可以功過相掩, id: KR4h0168_NFKB_172-h18, level: 2}
  - {type: head, offset: 2678, content: 主爵員外郎梁瓚(龍筋鳳髓作璨)奏左僕射魏宰無汗馬勞御史大夫李嘉為佐命功並妄爵也請皆追奪(主爵二條), id: KR4h0168_NFKB_172-h19, level: 2}
  - {type: head, offset: 2841, content: 羽林將軍王暢薨無嫡子取姪男襲爵庶子告不合承, id: KR4h0168_NFKB_172-h20, level: 2}
  - {type: head, offset: 3008, content: 戶部侍郎韋珍奏稱諸州造籍脫落丁口租調破除倍多常歲請取由付法依問諸使皆言春疾疫死實多非故為疎漏(戶部一條), id: KR4h0168_NFKB_172-h21, level: 2}
