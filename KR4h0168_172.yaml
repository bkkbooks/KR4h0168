front:
  text: 全唐文欽定全唐文卷一百七十二鷟字文成深州陸澤人兒時夢紫文大鳥其大父曰紫文鸑鷟也壯殆以文章瑞朝廷乎因以為名調露初登進士第授岐王府參軍凡八應舉皆甲科再授長安尉遷鴻臚丞四參選判策為銓府最開元初為御史李全交所劾貶嶺南刑部尚書李日知訟斥太重得內徙終司門員外郎
  hash: sha256:6b2a1e1b67ad24f852b66f7199ebd86e2af3b32ca355674e922353e108430815
  markers:
  - {type: head, offset: 14, content: 張鷟(一), id: KR4h0168_NFKB_172-h1, level: 1}
body:
  text: 萬死糞土臣鷟言臣忝朝班幸蒙驅策不了一使罪應至死自可鉗口吞聲伏待刑書灰身粉骨甘從斧鉞豈可昆蟲惜命雀鼠貪生區區微心有所未盡臣平生好學頗愛文章雖不逮於詞人濫流傳於視草近來撰集詩賦表記等若干卷編集擬進繕寫未周負譴明時方從極典恐士衡止息華亭之唳不聞嵇康顧影廣陵之音永絶缺零落抱痛幽泉昔司馬遷請就腐刑以終史記漢武帝愍其至懇矜而許之伏願陛下遂臣萬請之心寬臣百日之命集録繕寫奉進闕庭微願獲申就死無恨然則歸罪廷尉肆諸市朝腰領橫分有同仙化肝腦塗地百代如生骸骨埋塵千載不朽無任迫切之至鳳池清切雞樹深嚴敷奏帝俞對揚休命召為內史流雅譽於周年荀作令君振芳塵於魏闕張會掌機右掖務在便蕃王秀負版中書情惟密勿理須克清克慎慕金人以緘口一德一心仰星街而卷舌溫樹之號問且無言惡木之陰過而不息豈得漏秦相之騎乘故犯疏羅盜魏將之兵符自輕刑典張會過言出口駟馬無追王秀轉泄於人三章莫捨若潛謀討襲理實不容漏彼諸蕃情更難恕非密既非大事法許準法勿論待得指歸方可裁決崔暹風神爽俊詞采抑揚雅調疏通清音朗徹裴楷之英姿肅肅朝野羽儀魏舒之容止堂堂㣥寮領袖自可曳裾紫禁伏奏青規助朝廷之光輝贊明時之喉舌芝泥發彩宣鳳藻而騰文蘭檢浮香潤龍縑而動色豈容金馬之對未被譽稱神羊之威俄聞奏劾罰金既罹於疏網辨璧無舍於明珠過誤被彈止當笞罪不失事意自合無辜雖觸凝霜理宜清雪沈沈青瑣肅肅黃樞望重鸞司任光龍作掌壺負璽步頓於是生光左貂右蟬揖讓由其動價楊珍門承積閥榮重搢紳趨左掖之嚴凝奏上臺之清切出納王命職當喉舌之官光闡帝猷佐處腹心之地恪勤之譽未出於丹闈舛繆之愆已塵於清憲馬字點少尚懼亡身人名不同難為逃責準犯既非切害原情理或可容何者寧失不經宥過無大崔牛崔午即欲論辜甲申甲由如何定罪陳邃繆司綸綍忝掌樞機參詳蘭葉之文宣越芝英之字拾遺補闕躡山甫之清塵獻可替否尋晏嬰之勝迹設令魚魯絶繆理合上聞豕亥參差無疑下斷豈容斟酌聖意加減綸言用寸管以窺天持小觚而測海未經上白輒敢雌黃定字雖復無差據罪終須結正八十之杖自作難逃三千之條理宜明罰金機札札靈婺皎潔於雲間銀漢亭亭少女逶遲於巽位故瀟湘帝子乘洞浦而揚波巫峽仙映高堂而散雨公主穠華發彩蕣萼延祥六珈玉步之辰百兩香飛之日三公主婚鵷鸞接羽百枝燈燭光沁水之田園萬轉笙竽雜平陽之歌舞玲瓏玉佩振霞錦於仙衣熠耀花冠點星珠於寶勝飛鸞鏡匣向滿月以開輪仙鳳樓臺映浮雲而寫蓋弄珠分態江姊為之含嚬飛箭成婚天公為之蹙笑肅雍之制蓋異常倫築館之規特優恆典小不加大必上下和平卑不淩尊則親疏順序先帝女之儀注舊有章程長公主之禮容豈容逾越山陽分輝若木派演咸池七襄之駕既嚴萬金之禮斯盛張敖勳舊竊湯沐之微滋竇固名宗霑脂粉之餘潤但任人以器有國之大經官不私親前王之令範拜官牀下時聞丞相之男乞衛宮中惟允左師之息燕王之請身入侍竟不從依館陶之為子求郎終無允許若有言有行胡越可以正除無德無功昆弟豈容濫及宜銓其器識察其廉能待得實才方可詳擇棲烏之府地凜冽而風生避馬之臺氣威稜而霜動懲姦疾惡實藉嚴明肅政彈非誠宜允列王銓位參持斧職在埋輪履暴勝之清徽乘葛豐之雅烈冠施鐵柱貴戚傷心花發繡衣姦豪斂手近辭端右遠屆衡陽聯翩紫蓋之峯迢遞蒼梧之野但御史推核受委非輕有罪必繩無幽不察神羊竦角必觸邪人隼鷙驚飛先驅惡鳥推鍾建之罪特奉繇言舉張泰之辜無虧格式正當直指豈是輒干準犯量科宜從解退田順題輿晉望讓佩汾陽作二分城參榮半刺性非卓茂酷甚常林鞭寧越以振威辱何夔而逞志嚴宣昔為縣尉雌伏喬元之班今踐憲司雄飛杜林之位祁奚舉薦不避親讐鮑永繩愆寧論貴賤許揚大辟詎顧微嫌振白鷺之清塵糾黃魚之濁政貪殘有核贓狀非虛此乃為國鋤凶豈是挾私彈事二百鏹坐法有常科三千獄條刑茲罔捨鏘鏘會府掌北斗之機衡肅肅禮闈握南宮之樞奧是稱仙宇實號文昌虞書典百揆之宗周禮統六卿之職許鑑位膺列宿職綰通班總八座之繁司承萬機之要務端標指影檢局虧違置治和鈞糾繩稽失舉宏綱於烏網則萬目皆張振修領於狐裘則千毛自整兢兢戒慎尚有差違翼翼小心仍憂失墜豈得不存恭肅自縱荒淫放曠鸚鵡之杯淹停鳳凰之制恪居官次異文惠之勤公職務不修同景山之中聖紿云霍亂未可依憑滯失機宜理從明憲王隆忝沾趨吏幸列胥徒祿雖給於斗儲官未階於尺木雞卵之饌雖避嫌疑鵝目之錢若為窺覘每受一狀皆取百文未申疵面之功翻起黑頭之患獵青蚨之小利觸驄馬之嚴威因事受財實非通理枉法科罪頗涉深文宜據六贓式明三典六卿分職百官總已周開冡宰之司漢列尚書之位銓衡萬國不易其人藻鑑九流古難斯任在魏則荀攸鑑識毛玠公方居晉則裴楷清通王戎要故能轅輪莫棄玉石咸收不求備於寰中無滯才於天下宏詞碩學不積功勞淺見狹聞多求等級秪如視肉之輩篌瑟莫分走骨之徒狐狸詎辨食梅衣葛無以暴其寒酸咀蘖餐荼不足方其辛苦鷙鳥纍百不如一鶚之雄羊皮數千不如一狐之腋鏤冰之子萬衆不可濫收畫餅之夫百選猶其堪總自然私謁之門塞公平之路開長聞振鷺之飛無復促牛之謗不應置而置選部為首峴山為從並仰處分峴山素間武略早習戎昭張良千里之謀陳平六出之術觀丁父鄀俘也楚王以為軍帥李左車趙囚也韓信收其兵計求賢為國進善無私壓長敵而振威容安國家而利社稷徵雖要籍準法勿論量事應機據條尤坐更宜審鞫方可裁科同力度德為政之大經明試以功經邦之上策三載考績芳塵振於有虞六府孔修懿範光於大禹故知激揚清濁才行為先黜陟幽明勤勞是務呂訥含香禮閣染翰仙臺覺朱邑之廉明知黃霸之尤異恐貪猥之吏政以賄成黷貨之夫情隨利動贈金蛇於梁冀奔競無厭獻璧馬於虞公驕淫不息遂令濁濫之士卻在上流清慎之徒翻居下等蒼蠅迷其黑白素匠枉其丹青有蠧朝章深驚物聽試可詢其政術察以廉能考殿最於錙銖燭妍媸於冰鏡自然陳㣥考課深明九品之宜嚴助恭勤尤奉三年之最進賢匡國先典攸高求賢審官前王所重或學兼馬鄭蘊萬卷於胸中或業亞班楊包九流於掌內總斯㣥藝乃應賓庭豈得舉不求才惟力是薦貢不求器惟賕是聞徒招畫餅之譏終致舉肥之謗兔絲燕麥竟是虛名草狗泥龍終非實用雞冠比王乍可依稀魚目參珠曾何髣佛貢人不充分數舉目自合徵科法有常刑理難逃責止戈為武靖亂之嘉謀致果為毅安邊之茂軌疇庸命賞將酬犬馬之功書勞策勳用答鷹揚之效祁元泰姦回是務逞狙詐於千端徐整乾沒為懷縱狼心於百變勳隨筆注官逐賄成將此白丁插名黃綬雖復龍蛇共澤善惡斯殊終是雞鶴同㣥是非交錯整行詐業泰授偽勳兩並日拙為非一種雷同獲罪執行故造造者自合流刑囑請貨求求者元無首從遊最素間武略早習戎昭輕述爪牙之功忝當心膂之寄不能恪勤在職慮慎當懷俄擔張武之贓遽罷絳侯之職退從里閈屏迹邱園卻掃長門開閉無事舊時廷尉徒有針於故人昔日將軍終見訶於醉尉因茲結憤展效邊荒申徑節於龍城蕩妖氛於鴈塞蒙輪競進拔距爭先將宣百戰之勳以贖九章之罪郎中以往愆名教功未可收左丞以今振其威勞堪補過曩雖貪財好色未虧吳起之名盜嫂受金不掩陳平之智海浮小芥詎玷洪波玉隱微瑕何妨美寶如愚淺見敘録為宜疏茅建社翦桐開國隆定鼎於昌基茂勤王之令典公侯圭組百代相仍帶礪山河千秋不絶祗如吳鄧四縣東漢之功臣蕭曹萬家西京之佐命莫不甘棠敷化光宣召伯之風大樹辭榮獨擅將軍之氣魏宰智不動俗曾無汗馬之勳李嘉謀不出凡詎展飢鷹之效無功而祿不可勵勳臣無德而官如何獎朝士昔豕突命賞偽新於是覆亡羊爛封侯更始由其喪敗並為爵人失敘錫土無綱宜遵操斧之柯豈踵覆車之轍父昭子穆千齡不易之儀繼祖承祧萬代相承之道若骨肉無爽鳲鳩之美克昌血屬不同螟蛉之子何寄王暢名參驍衛職綰羽林俄纏風燭之災近絶蒸嘗之嗣棄其庶子收彼姪男意既不保其家神必不歆其祀故荀顗令君之子珠玉相輝韋元成丞相之苗芝蘭遞茂枚臯孽子不廢光門裴秀旁生無妨貴族三鱣之寶銀黃所以挺生七貂之門金紫於焉間出側男自須紹允猶子不合承宗詐襲者處以徒刑應續者宜從改正虞書五教實委司徒之官周禮六卿爰開地官之位莫不織成都邑編緝氓黎設九土之綱維成四方之管轄班固申犬牙之制疆場綺分應璩論馬齒之規井田鱗次戶標九等俱陳萬國之圖人有十倫並挂三年之籍豈容丁口脫漏任意疏遺租調破除恣情抽減遂使厫庾頓乏帑藏皆空軍興於是缺支國用由其不足付法科罪仍敢薄言依問款辭咸推遘厲否終則泰造化之常圖福謙害盈幽明之極數魏文帝修書永歎念親故之凋亡劉孔才矯制徵兵促黎元之殘喪薦臻不息僵斃相仍遽利人符多編鬼録生者固宜存附死者難以執留災異不拘案宜從記趙務鳴鶴登朝含雞伏奏轉箸之敏未見稱奇聚米之能無聞播美張蒼之善算國用詎肯留情馮勤之巧計軍儲曾何介意回長作短趙達之精心變近成遙殊顧潭之屈指蒲陝之布卻入漁陽幽易之縑反歸關隴同北轅之適越類東走之望秦人之情乎繄獨無也細絹稱以納庫粗布貯以充軍非直運者苦勞抑亦兵家賈怨宜從削黜以肅愚頑冰霜凜冽白璧不可以禦形水旱災危黃金不可以適口故飢者忘食不從抵雀之珍寒者思衣不貴靈蛇之寶珍臺門館不可以無膳而存金城湯池不可以無粟而守秖如給祿給俸具在朝章準階準官俱編甲令豈容諂佞之輩曲路邀名趨競之徒僻塗生巧窺測人主汲黯由其面折割剝黎元桑宏以之腰斬我國家咸有一德法無二門動必依繩言不逾矩比成王之制度令出惟行則大舜之溫恭朕言不再胡敬識非稽古學未知今作聰明而亂舊章持薄才而隳正法南山之峻寧資覆簣之饒東海之津何藉操觚之潤請仍舊貫無替前規滄瀛等州頻遭水潦泥牛轉盛滂沛成河石燕爭飛霖霪變浦當時奉旨令貸半租此日蠲科仍聞款訴準旨有明年之語據條無三年之文以此狐疑莫能龜決明年復潦乃是折空後歲總徵元無折處菖蒲去蚤蝨而蚰蜓竟來礬石止齲痛而牙根遽折所益全少所損愈多徵一丁之半租招百姓之深怨是則國家之信不及於豚魚王者之仁不流於行葦得原失信文公之所不為獻鼎棄言展季由其未許有家有國乍可去食而去兵大車小車不可無輗而無軏譬如洞庭之嶼彭蠡之湖添隻鴈不為之多去雙鳧不為之少貨藏天下何必前徵而後徵物寄人間終是楚弓而楚得元貸未折許折還徵渙汗發而却收絲綸抽而復返四方取則百姓何憑政在養民理從矜折典朕三禮大舜委於薑夷分敕六卿成王任於宗伯建茲歲首實曰春官敦敘九族之親欽若五常之教祀地郊天之典舉其宏綱朝日夕月之儀撮其機要岐州俯鄰八水斜瞻鸑鷟之峯海部近控三山回瞰鯨鯢之穴陳敬所奏瑞雁翻朱薛泰申文祥麟孕素赩丹霞於日羽晃若朝輪晶白雪於霜毛皎同秋練既無狀驗空有奏章尋鳥迹於雲空察人形於冰鏡刻猿猴於棘刺尚切見欺説蠶繭於天公誰堪輒信語同捕影不可誣神狀等繫風如何薦廟管窺其事案記為宜天地所生人為萬物之貴人倫所重孝為百行之原昔傳曾閔之名今有荀何之譽孝通厚載則白兔呈休孝感圓穹則丹烏結慶于旦巡省風俗敷暢皇猷未聞沮勸之方遽表澆浮之迹舊蒙旌表今請剔除詐濁不逮於詐清慕善猶愈於慕惡豈可以已無仁不信仁者之行仁以已無孝即疑孝者之非孝蠻貊之國尚或難容父母之邦如何自處靡間大體好訐微疵事既不然若為通允國之大事在祀與戎人之所崇惟仙與佛伏自恆星夜隕吉夢宵傳既脫酣象之蹤爰開白馬之寺明須慈悲結慮忍辱凝懷坐鴿珍以勤誠護鵝珠而守戒指法場之門戶豁爾天開導智海之波瀾渙然冰釋如此之行業乃出乎塵囂豈容闡提末品沙彌淺學不精不進曾無羅漢之因行囑行賕翻習檀施之業四分十誦本自面牆六度三明舊來膠柱為雞為鶩玷鶴樹之清風如虺如蛇穢龍宮之妙法銓擇為濫解退為宜泥洹歸靜涅槃入寂法初不滅故現滅以歸空道本無生故因生而不用十大弟子憶妙覺之微言八部龍王禮如來之雙足象牙塔廟刻畫真容牛頭旃檀雕鐫寶相祇如垂儀設教豈以廣大自矜抽道俗之筋髓暗凡庸之耳目論其壯也釋迦文之清液納海吞江語其高也盧舍那之形象包天括地乃法身之自在匪人力之堪為赤熛似彈能燒萬頃之波白日如盤獨耀四天之下大鐘千石藉小木而方鳴高屋萬間待微燈而破暗心方一寸經營宇宙之先目濶數分歷覽虛空之外何必大者則聖小者不神此頑僧之褊情非達士之深見佛在虛廓之上不居空木之中何用聚怨為形斂悲成像大推初意實是不然小人之言宜從案記一人有慶四海無虞萬國於是星馳八方由其霧湊烏孫合種咸雁集於鴻臚犬族振㣥並蜂歸於蠻邸眷彼茅宇開此藳街即崇三揖之儀爰設九賓之禮祇如土蕃使者實曰酋豪沮渠蒙遜之苗禿髮烏孤之族占風入謁越駝嶺而輸誠就日來朝隔驢山而納欵觀鶴綾之絢爛彩映冰霜覩鳳錦之紛葩光含日月彎弧六合犀角麋筋徑箭三同星流電激聽其市取實可威於遠夷任以私收不足損於中國宜其順性勿阻蕃情扶南雜種安西諸國跨險憑危梯山航海飛艎走浪望鼠島而三休大舶參雲指麟洲而一息鳶波象郡萬舳爭先烏滸狼月荒千艘競進遊賊滿山刑人半市督郵從事猶密興於私門賢者聖人尚潛行於暗室飲德何負徒發孔融之譏淫具未除終獲簡雍之誚利存禁酒之法害遠鬻酤之家楚國之猿禍連林木吳宮之燕殃及樓臺所喪全多所存詎幾理貴崇乎梗槩政無伺於禁虛位人之方居斯而已謹按此判自督郵從事以下與前文氣不類疑是錯簡
