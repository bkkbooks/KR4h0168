  - {type: head, offset: 3363, content: 倉部郎中胡敬稱內外官祿准令據階級有費倉儲望請准見任官品級極為裨益未知可否(倉部二條), id: KR4h0168_NFKB_172-h23, level: 2}
  - {type: head, offset: 3575, content: 滄瀛等州申稱神龍元年百姓遭水奉旨貸半租供漁陽軍許折明年又遭澇免無租可折至三年百姓訴州以去年合折不許百姓不伏, id: KR4h0168_NFKB_172-h24, level: 2}
