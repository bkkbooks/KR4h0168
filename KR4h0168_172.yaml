  - {type: head, offset: 4021, content: 于旦奏孝門舊多偽作祥瑞並請破孝門勒從課, id: KR4h0168_NFKB_172-h26, level: 2}
  - {type: head, offset: 4171, content: 祠部郎中孫佺狀稱往年度人多用財賄遞相囑請元無經業望更銓試不任者退還本邑(祠部二條), id: KR4h0168_NFKB_172-h27, level: 2}
