front:
  text: 全唐文欽定全唐文卷一百四十三李百藥二
  hash: sha256:9b237271dea5504d5c68cafdbbbca403ec81635dabcf0920a6a324ef5eb8f4b1
body:
  text: 臣聞經國庇民王者之常制尊主安上人情之本方思闡理定之規以宏長代之業者萬古不易百慮同歸然命歷有賒促之殊邦家有理亂之異遐觀載籍論之詳矣咸云周過其數秦不及期存亡之理在於郡國周氏以鑒夏殷之長久遵黃唐之並建維城磐石深根固本雖王綱弛廢而枝幹相持故使逆節不生宗祀不絶秦氏背師古之訓棄先王之道踐華恃險罷侯置守子弟無尺土之邑兆庶罕共理之憂故一夫號呼七廟隳圯臣以為自古皇王君臨宇內莫不受命上元飛名帝籙締搆遇興王之運殷憂屬啓聖之期雖魏武攜養之資漢高徒役之賤非止意有覬覦推之亦不能去也若其獄訟不歸菁華已竭雖帝堯之光被四表大舜之上齊七政非止情存揖讓守之亦不可固焉以放勳重華之德尚不能克昌厥後是知祚之長短必在天時政或盛衰有關人事宗周卜世三十卜年七百雖淪胥之道斯極而文武之器猶存斯則龜鼎之祚已懸定於杳冥也至使南征不返東遷避逼禋祀如線郊畿不守此乃陵夷之漸有纍於封建焉暴秦運短閏餘數鍾百六受命之主德異禹湯繼世之君才非啓誦借使李斯王綰之輩咸開四履將閭子嬰之徒俱啓千乘豈能逆帝子之勃興抗龍顏之基命者也然則得失成敗各有由焉而著述之家多守常轍莫不情忘今古理蔽澆淳欲以百王之季行三代之法天下五服之內盡封諸侯王畿千乘之間俱為采地是則以結繩之化行虞夏之朝用象刑之典治劉曹之末紀綱弛紊斷可知焉鍥船求劍未見其可膠柱求音彌所多惑徒知問鼎請隧有懼勤王之師白馬素車無復藩籬之援不悟望夷之釁未甚羿浞之災既罹高貴之殃寧異申繒之酷此乃欽明昏亂自革安危固非守宰公侯以成興廢且數世之後王室浸微始自藩屏化為仇敵家殊俗國異政強淩弱衆暴寡疆埸彼此干戈日尋狐駘之役女子盡髽崤陵之師隻輪不返斯蓋略舉一隅其餘不可勝數陸士衡方規規然云嗣王委其九鼎凶族據其大邑天下晏然以治待亂何斯言之謬也而設官分職任賢使能以循良之才膺共治之寄刺郡分竹何代無人至使地或呈祥天不愛寶民稱父母政比神明曹元首方區區然稱與人共其樂者人必憂其憂與人同其安者人必拯其危豈容委以侯伯則同其安危任之牧宰則殊其憂樂何斯言之妄也封君列國藉慶門資忘其先業之艱難輕其自然之崇貴莫不世增淫虐代益驕侈自離宮別館切漢淩雲或形人力而將盡或召諸侯而共落陳靈則君臣悖禮共侮徵舒衛宣則父子聚麀終誅壽朔乃云為已思治豈若是乎內外㣥官選自朝廷擢士庶以任之澄水鏡以鑒之年勞優其階品考績明其黜陟進取事切砥礪情深或俸祿不入私門妻子不之官舍頒條之貴食不舉火剖符之重衣惟補葛南郡太守敝布裹身萊蕪縣長凝塵生甑專云為利圖物何其爽歟總而言之爵非世及用賢之路斯廣民無定主附下之情不固此乃愚智所辨安可惑哉至如滅國殺君亂常干紀春秋二百年間略無寧歲次睢咸秩遂用玉帛之君魯道有蕩每等衣裳之會縱使西漢哀平之際東洛桓靈之時下吏淫暴必不至此為政之道可一言以蔽之伏惟陛下握紀御天膺期啓聖救億兆之焚溺掃氛祲於寰宇創業垂統配二儀以立德發號施令妙萬物以為言獨照宸衷永懷前古將復五等而修舊制建萬國以親諸侯竊以漢魏以還餘風之弊未盡勛華既往至公之道斯革况晉氏失馭宇縣崩離後魏乘時華夷雜處重之以關河分阻吳楚懸隔習文學者尚長短縱橫之術習武藝者盡干戈戰爭之心畢為狙詐之階彌長澆浮之俗開皇在運因籍外家驅御㣥英任雄猜之數坐移時運非克定之功年踰二紀民不見德及大業嗣文世道交喪先王人物掃地將盡雖天縱神武削平寇虐兵威不息勞止未康自陛下仰順聖慈嗣膺寶歷情深致理綜核前王雖至道難名言象所絶略陳梗概實所庶幾愛敬蒸蒸勞而不倦大舜之孝也訪安內豎親嘗御膳文王之德也每憲司讞罪尚書奏獄大小必察枉直咸舉以斷趾之法易大辟之刑情必隱惻貫徹幽顯大禹之泣辜也正色直言虛心受納不簡鄙陋無棄芻蕘帝堯之求諫也宏奬名教敦勸學徒既擢明經於青紫將升碩儒於卿相聖人之善誘也㣥臣以宮中暑濕寢膳或違請徙御高明營一小閣遂惜十家之産竟抑子來之願不陰陽之感以安卑陋之居去歲凶儉普天饑饉喪亂甫爾倉廩虛空聖情矜憫勤加賑恤竟無一人流離道路猶且食啖藜藿樂徹簨簴言必悽動貌成臞瘠公旦喜於重譯文命矜其即序陛下每見四夷款附萬里歸仁必退思進省凝神動慮恐妄勞中國以求遠方不籍萬古之英聲以存一時之茂實心切憂勞跡絶遊幸每旦視朝聽受無倦智周於萬物道濟於天下罷朝之後引進名臣討論是非備盡肝膈惟及政事更無異辭才及日昃必命才學之士賜以清間高談典籍雜以文咏間以元言一夜忘疲中宵不寐此之四道獨邁往初斯實生民以來一人而已宏茲風化昭示四方信可以期月之間彌綸天壤而淳朴尚阻浮詭未移此由習之已久難以卒變請待琢雕成朴以質代文刑措之教一行登封之禮云畢然後定疆理之制議山河之賞未為晚焉易稱天地盈虛與時消息況於人乎美哉斯言也蓋聞人靈之貴天象攸憑稟仁義之和感山川之秀窮理盡性通幽洞微研其慮者百端宗其道者三教殊源異軫類聚㣥分或博而無功勞而寡要文勝則史禮煩斯黷或控鶴乘鸞有繫風之諭餐霞御氣致捕影之譏至於察報應之方窮死生之變大慈闕運宏濟㣥品極衆妙而為言冠元宗以立德其唯真如之設教焉若夫性與天道契協神交貽照靈心澄神禪觀則有化度寺僧雍禪師者矣禪師俗姓郭氏太原介休人昔有周氏積德纍功慶流長世分星判野大啓藩維蔡伯喈云虢者郭也虢叔乃文王所咨郭泰則人倫攸屬聖賢遺烈奕葉其昌祖憲荊州刺史早擅風猷父韶博陵太守深明典禮禪師含靈福地擢秀華宗爰自弱齡神識沈靜率由至道冥符上德因戲成塔發自髫年仁心救蟻始於丱歲世傳儒業門多貴仕時方小學齒胄上庠始自趨庭便觀入室精勤不倦聰敏絶倫博覽㣥書尤明老易然雅有志尚高邁俗情時遊僧寺伏膺釋典風鑑疏朗豁然開悟聞法海之微妙毛髮同喜瞻滿月之圖像身心俱淨於是錙銖軒冕糟粕邱墳年十有三違親入道於鄴西雲門寺依止稠禪師稠公禪慧通闕戒行勤苦道標方外聲溢區中闕覩暗投欣然驚異即授受禪法數日便詣幽深稠公嘗撫禪師而謂諸門徒曰五亭闕念盡在此矣頭陀蘭若畢志忘疲仍來往林慮山中棲託遊處後屬周武平齊像往林慮入白鹿深山避時削跡藏聲戢曜枕石潄流闕巖之下葺茆成室蘿裳薜帶闕唯糞闕之衣餌朮餐松嘗無麻麥之飯三徑斯絶百闕為㣥猛鷙毒螫之徒潛形匿影白鹿青鸞之輩效祉呈祥每梵音瞻禮焚香讀闕二字奇禽異獸攢集庭宇俱絶闕倚畢來俯伏貌如恭敬心疑聽受及開皇之初宏闕釋教於時有魏州信行禪師闕明佛性大轉法輪實命世之異人為元門之益闕以道隱之辰習當根之業知禪師遁世幽居遣人告曰修道立行宜以濟度為先闕善其身非所聞也宜盡宏益之方昭示流俗禪師乃出山與信行禪闕修苦行開皇九年信行禪師被敕徵召乃相隨入京京師道俗莫不遵奉信行禪闕三字之闕二字持徒衆以貞觀五年十一月十六日終於化度寺春秋八十有九聖上崇敬闕二字贈帛追福即以其月廾二日奉送靈塔於終南山下鴟鳴土禪師之遺令也徒衆收其舍利起塔於信行禪師靈塔之左禪師風範凝正行業精勤十二部經嘗甘露而俱盡五百具戒淩嚴霜而未雕雖託跡禪林避心定水涉無為之境絶有待之纍闕寓形巖穴高步京華常卑辭屈已體道藏器未若道安之遊樊沔對鑿齒而自伐彌天慧遠之在廬山折桓元之致敬人主及遷神淨土委質陀林四部奔馳十方號慕豈止寢歌輟相捨佩捐珠而已式昭景行乃述銘云綿邈神理希夷法性自有成空從凡入聖於昭大士遊闕二字正德潤慈雲心懸靈鏡闕蒙悟道捨俗歸真纍明成照積智為津行識非想禪闕三字觀盡三昧情銷六塵結構窮巖留連幽谷靈應無像神行匪速敦彼開導去茲闕三字絶有憑㣥生仰福風火闕妄泡電同奔達人忘已真宅斯存剎那闕二字淨域闕五字樂永謝重昏易稱易之為書也有天道焉有人道焉故君子居則觀其象動則觀其變智以藏往感而遂通是以進退之數有方存亡之幾可闕昔賈生董相懷王佐之才闕五字命世之闕二字屯邅於世故擯闕二字當年軼風電以長鳴絶雲霓而鍛翮而樂天知命順時守道體忠信而夷險阻憑清靜以安悔吝雖闕川寂其浸遠而盛德久而愈新昔之玉質金相求益友於千載蘭闕桂馥想同氣於九原則有闕三字懷庶幾之道詳觀出處之跡可以追蹤勝業繼踵清塵者其惟都督臨淄定公焉公諱彥謙字孝沖清河人也七世祖諶燕太尉掾隨慕容氏闕度寓於齊土宋元嘉中分闕郡之西部置東冀州東清闕二字繹幕縣仍為此郡縣人至於蕑侯又於東廣川郡別立武強縣令子孫居之丹陵誕聖祥發慶靈虞舜受闕光啓侯服導原注壑若瀉河漢之流竦構干雲如仰嵩華之峻闕三字植公之十三世祖也積德固其宗祊純嘏貽其長世公侯之門必復繁衍之祚攸歸高祖法壽宋大明中州主簿武賁中郎將魏郡太守立功歸魏封莊武侯使持節龍驤將軍東冀州刺史薨贈闕三字青州刺史諡蕑侯魏書有列傳重價香名馳聲南北宏材祕略兼姿文武曾祖伯祖州主簿襲爵莊武侯齊郡內史幽州長史闕行州事衣闕訓俗露冕懷戎纍仁義而成基處脂膏而不潤祖翼年十六郡辟功曹州辟主簿襲爵莊武伯宋安太守居繼母憂廬於墓次世承冡嫡之重門貽旌表之貺鄉閭之敬有過知恥宗族所尊不闕而肅闕伯熊年廾辟開府行參軍仍行闕州清河廣川二郡太守闕二字神英邁器量沈遠寢門之內捧檄以慰晨昏山澤之間單車以清寇亂公稟元精之和氣體惇粹之淑靈心運天機性與道合溫良恭儉應言行之闕神采風尚出儀形之表博極圖書闕綜遺逸正經義闕時所留懷絶簡研幾下帷覃思盡探隅隩畢詣精微或致元白之譏非止春秋之僻吉凶禮制今古異同莫不窮核根原詳悉指要內闕親表達之學徒負笈擁帚質疑去惑公凝神闕二字函丈無倦聲闕三字山谷對盈自遷定齊土家已重世班懿十紀旌旗之盛未多陳完八葉鳴鳳之祥斯在况復里稱冠蓋庭茂芝蘭行則結闕連騎居則撞鐘列鼎雖范蠡貨財本闕卿相陰家僕闕舊比封君闕之闕二字公門下心間館以風素自居清虛味道沈冥寡欲恭敬以撙節退讓以明禮潛隱之操始擅於州閭高亮之風日聞於海內於是㣥公仰德邦君致禮物闕斯辨旌闕盈塗郡三辟功曹州闕辟主簿其後闕三字而從命公明天人之際述堯舜之道其處也將委質衆妙之門棲神不死之地其出也將宏奬名教博利生民舟楫可期英靈有屬州郡闕職闕其志焉然公以周隋禪代之交紀綱弛紊亦既從政便以治亂為懷眷言州壤在情彌切乃整齊風俗申明獄訟進善黜惡導德齊禮雖在鄉國若處王朝政教嚴明吏闕悅伏見危拯難臨財潔已利物之闕不自為德不貪之寶必畏人知開皇初頻詔搜揚人物闕王出闕京洛致書辟召州縣並苦相敦逼公辭以痼疾且得遂情偃仰其後隋文帝忌憚英俊不許晦跡邱園公且闕維縶方應薦舉七年始入京省授吏部承奉郎是時齊朝資蔭不復稱敘鼎貴高門俱從九品釋褐朝廷以公望實之重才藝之優故別有此授以明則哲之舉俄遷監察御史每杖節巡省糾逖姦慝心存闕六字轉授秦州總管録事參軍事漢陽重鎮京輔戶門管轄一方允斯盛選尋以朝集入京與左僕射齊公總論考課之法黜陟之方齊公對嶽牧以下大相歎服其後具以公言敷奏仍有十擢之闕二字非知闕二字主竟不能見用闕遷許州長葛縣令公鎮之以清靜文之以禮樂訟以道息災因德弭百姓感悅咸不忍欺愛之如慈親焉敬之如神明焉繈負知歸頌聲載路解代之後吏民追思惠政樹碑頌德在長葛秩未滿以考績闕異遷鄀州司馬此州荊鄧之郊華夷踳雜闕俗殘獷闕情憸詖公化之以仁愛敦之以淳厚期月之間咸知遷革尋以州廢解任言歸夜觀星象晝察人事知天地之將閉望箕潁以載懷乃於闕山之陰結搆巖穴非唯在乎避世固亦潛以相時然大業之初始班新令妙選賢良為司隸刺史公首膺斯舉有詔追赴京洛公以朝綱浸以頽壞此職亦是宏濟之一方便起而就徵攬轡登車即有澄清天下之志於是激濁揚清風馳草偃行能之類望景以聽升遷苛暴之徒承風而解印綬進擢者縻爵不致謝言繩糾者受刑而無怨色自非道在至公信以被物其孰能與於此焉既而闕政陵夷小人道長忠言靡用正士無施大業十一年出為涇陽縣令未幾而遘疾粵以其年歲次乙亥五月壬辰朔十五日景午終於官舍春秋六十有九降生一子光輔帝唐叶贊璇璣參調玉燭皇上情深遺烈闕二字想於夷門眷言才子便有懷於袁煥貞觀三年十有二月乃下詔曰紀功褒德列代通典崇禮飾終著在方策隋故司隸刺史房彥謙世襲簪纓圭璋特秀溫恭好古明間治術爰在隋季時屬卷懷未遂通塗奄從運往以忠訓子義闕過庭佐命朝端業隆功茂宜錫以連率光被九原可贈使持節都督徐泗仁譙沂五州諸軍事徐州刺史四年十一月又發詔追封臨淄公食邑一千戶諡曰定公禮也粵以五年歲次辛卯三月庚申朔越二日辛酉安措於本鄉齊州亭山縣趙山之陽惟公風格凝整神理沈邃內懷溫潤外照光景追思儀範曖似文戌之圖邈想風闕懍若相如之氣時逢戰爭術益從橫或恥問仁用安嘉遁收文武之將墜殊山林而忘反是故銷聲貴里隱異迷邦戢曜高門處非絶俗優柔六藝紛綸百氏采絶代之闕文總前修之博物雖昔闕明實闕三字識疏屬之神辨闕鼠於漢朝彰委蛇於霸業無以尚也雕蟲小技曾未闕懷時有制述將符作者致極宏遠詞窮典麗足以克諧聲律感召風雲豈唯白雪陽春郢中寡和而巳永唯書契之闕六字跡草隸之妙冠絶當時闕二字幼年孝友惇至未離繈褓便遭極罰裁有所識闕訪家人發言號絶不自勝處年十有五出後傍宗深惟鞠養之慈將闕晨昏之禮辭違之辰感切行路及就養闕二字不異所生兩門喪紀並逾制度哀毀之至聲被朝野闕以期功之戚甘旨未嘗朋友之喪遠近畢赴人倫之紀禮法之隆近古以來未之有也且復留連宴賞提攜臭味登山臨水必動咏言清風朗月闕六字滿席且得闕二字之孫門闕二字通時許慈闕之御指囷無倦解闕未已仁義闕厚資産屢空以斯器望窮茲至道謂宜俯拾青紫增曜台階而止類太邱宏道下邑遽同子産空聞遺愛報施之理何其爽歟若夫死生者形骸之勞息夭壽者大化之自然固知命之不憂豈居常而為纍也然行周於物寒暑不能易其心智周於身變通不能窮其數而靈祇多忍幽明永隔散精氣於風煙委容質於泉壤可不哀哉於是四方同志之士百里懷音之客式遵盛烈共勒豐碑百藥爰以疇昔妄遊蘭芷寧謂正始之音一朝長謝師資之德百舍無從義絶賓階哀廠田坴宿草思效薄技覬申萬一仰惟治身之術立德之基固繫辭可以盡言豈言之而無愧也乃為銘粵遐觀方冊歷選人倫名固難假德必有鄰顏閔遺迹曾史芳塵同聲比義允屬通人於鑠通人闕二字膺慶司空規矩民胥攸訓地靈貽福天齊分命世祚有徵重光無競顯允君子丕承寵光靈河擢秀日觀含章元門味道幽谷迷方陸沈通德朝隱康莊儀鳳潛靈雕龍振藻宏之在人一變至道昭章闕訓寂寥元草文質彬彬波瀾浩浩齊物無待隨時吐曜導俗澄原訓民居要州將貽喜邦君長嘯乃眷韜鈐還歸漁釣三徑雖阻八紘方密僶俯末班逶迤下秩司憲邑宰循名責實御衆以寬在刑惟恤履斯異行乘闕丕基才高位下有志無時和光偶俗誕命膺期闕揚投賈唯茲在茲樹德不已蹈仁無斁遺構有憑高門以闢眷言上壽方期永錫載佇太階翻歸厚夕義高表墓道貴揚名式昭文物用紀哀榮抽簪故吏制服諸生一刊圜石闕二字飛聲公之將葬恩旨重謺賵贈優渥闕四字公及夫人並令所司營造馬輿各給四馬從京師洛陽殯所送至本鄉其車輅儀仗出懷洛二州給船載運闕道闕力至於墓所儀從錢闕有闕闕者闕二字又發敕令以官物修補又文官式令例無鼓角亦特給送至於葬所又於常令給墓夫之外別加兵千功役臨葬闕復降敕使馳驛祭以少牢止舟後為供葬事發敕旨行筆十有二條近代以來恩榮褒贈未有若此者也中外姻戚海內名士並故吏門生千里赴會闕及州里道俗二千餘人粵惟上德希世挺生存則道照於人倫沒則名飛於史策宜其計功伐鏤鍾鼎永貽長世昭示後昆君諱鏡民字君倩河東聞喜人也唐虞之盛伯益控其遙原殷周以還仲衍膺其餘慶徽則擅美當塗憲則流芳中夏金張舊業遠謝聲塵江漢英靈多慙光價祖靖慮魏銀青光祿大夫汾州刺史銀章青綬登高能賦揚波流惡政以鎮成父闕一字漢周革路大夫儀同三司晉州刺史雅道儒風聲動當世班條布政恩結去思君上表雲氣遠膺星像虛牝與貞固同歸愛景共嚴凝一致懸河若訥每括智囊止水澄神日開靈鑒及擇師請益遊方問道性與稽古心照神文佩游夏之芳塵為潘張之益友立人之道仁義靡遺事親之德愛敬同盡迹屈衡門聲馳上國莫府交辟公車致禮晉蕩公受博陸之圖處阿衡之寄為其諸子精選府寮辟為談公大將軍記闕一字府中為其語曰令德日新裴鏡民昔馬越為其世子辟王安期取其儀形之美蔣濟崇其府望辟阮嗣宗重其文學之譽我貽羔鴈兼而闕一字之尋以內艱去職幡車方駕金革在辰喪禮未宏多從權奪朝廷以君羸瘵過甚特詔終哀感動風俗皆此類也建德初以君為宋王侍讀尋授記室參軍遷司録宣政一年授吏部上士攝少吏部研幾汲引之方遊刃銓衡之地能官在闕一字咸事無遺大吏部竟陵公即有隨之滕王也亮拔不㣥英姿秀發重君才行深見褒奬每闕一字裴楷清通之望復見斯人開皇受禪其日除尚書在外兵郎尋改為兵部侍郎魏晉以還臺郎顯要官方始革揚歷是膺是非器重望闕一字無以宏斯禮秩華陽地險控御遐長蜀王秀以闕一字子之尊擁旄作鎮寮屬望重妙簡時賢以君為西南道行臺兵部侍郎及行臺廢除闕一字州總管府掾尋改益州總管府司馬蜀王年止勝衣童心未改文武佐吏多非正人君言必盡忠行惟直道省府之內莫不敬而憚之闕一字臺民部尚書陳茂情恃惟舊志多慢下雖處行乖方莫敢違異惟君闕一字理抗直未嘗順旨兵部尚書京兆杜杲每謂人曰不值盤根錯節不表利器裴君匪躬遑盬可謂美矣開皇十六年西南夷闕二字從搆亂君總率士卒應機致討後軍不繫戰危喪律以三月癸丑朔十九日辛未陷於賊庭季路結纓志無苟免溫序銜須義不生辱永懷斯道蓋君之平生風烈焉惟君靈府浚徹神闕一字開敏英略外明沈幾內斷培風自遠背丹穴以來儀闕一字氣不㣥望青霄而孤竦許劭月旦之論韞義生風黃童日下之聲乘虛效響彈冠莫府掌記文房媚韶景以闓華嘯清風而振藻珥筆南宮垂纓西蜀戎事之重必司善政搜狩於是得時風霜以之順序比明月於東曹又典午於南正眷熊掌闕一字重義安馬革以輕生神邁闕三字峯闕一字搆農夫輟闕一字而野祭機婦捐珠而巷歌西蜀父老至于今思之君第五子太僕少卿洛州都督闕一字長充上柱國翼城縣開國公績闕一字雅道於闕二字搆丕基於鴻緒感四序之遞變覩萬物而永言思宏遺範式昭貞石其銘曰靈河遠派大畤流光美哉地德鬱矣闕一字芳高門鍾鼎世闕一字旗常鵷鴻接翼金玉其相惟君載挺道符人俊灼灼外明溫溫內潤瞻之忽後仰之闕一字峻抱朴澄清含風闕一字韻闕二字資闕一字公府馳名永懷喪制易俗申情爰掌書記俄屬銓衡清通之譽遠嗣家聲開皇在辰萬象咸鏡靈開尺闕一字典屬軍政列宿上膺中和俯咏永懷神道斯人斯命層梁毀構靖樹闕一字風雕戈紀闕一字鼐鼎銘功柏庭永閟泉路斯窮九京不作萬古書忠明闕一字重世分茅錫社仰嗣丕基式宏良冶絶雲使翼追風頮赭以闕四字胸下闕維貞觀九年歲次癸未冬十月辛丑朔二日壬寅太穆皇后梓宮啓自壽安陵將祔於獻陵其日至尊親奉奠於太安宮乃使兼太尉某設祖於行宮禮也龍攢夙啓翟輅朝陳方祇靖德圓魄虛神哀子嗣皇帝諱攀弓劒而長號想褘褕之弗御痛異宮之隔禮切分心於窮慮二南風化萬古徽音式昭史冊如玉如金其詞曰元功肸蠁景福氤氳將開樞電且應黃雲曰惟基命於昭德性配天不失復夏無競門德丕承華宗遞興皇家漢氏祥發慶膺冥符世胄並會休徵帝妃北渚聖母東陵祕景陰陵含章嬪則柔順宏範幽間育德率禮無違尊師罔忒言昭圖史聲芳邦國帝録將啓天妹言歸塗山表貺渭汭增暉外求才淑內鑒幾微蘋蘩夕牖絲枲中闈琴瑟匪諧氷霜慙潔道叶離明貞符兌悅潛德勿用內教爰設世罕交泰時虧地節膺期集祉含和履正華渚降祥高禖誕聖潛著軒象未彰靈命奄御雲衣俄飛天鏡嗚呼哀哉受終撫運馭極乘乾物思厚德政闕承天瑤尊委奠金屋虛筵嗟故劒之無託歎房樂之徒懸嗚呼哀哉宸駕上仙玉几垂裕率土遏密同軌畢赴背櫟陽之神宇指原陵之封樹悼虞妃之不從遵周典而遷祔嗚呼哀哉蒼茫昭世冥漠神心松庭幽寂隧路凝深儼龍轀而未進切鳳吹之哀吟水滔滔而不息日黯黯而將沈百神驚而元兆邃萬國慟而寒山陰晦重雲於畢陌結微霜於穀林嗚呼哀哉極寰宇之儀訓播英聲於先后惟皇運之天長配靈昆而地久流凱風於椒掖散白露於陵阜軼任姒之高蹤邁嵩華而不朽嗚呼哀哉
