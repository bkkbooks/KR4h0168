body:
  text: 梁寵王召君史問曰史之記事無有遺乎對曰有之臣楚人也請説楚人之遺事昔聞臣何荒王使釣翁相水相置浮宮之所相用罛釣之處翁曰臣相水多矣不能悉説請説湘江之流有礲有瀧其至險也實回山如鬬佹壁若合陽崖陰壑景氣常雜崩流激聲空響相答則有峮山囷峻束噴濆觸沃衝回瀪漩圮崖開谷故衆聲相喧積氣相昏鼘闐深沈出入千里常如凝陰是以魚經其中皆鬣禿鱗脫目腮嚅煦忽為淵流瀛瀛油油蘊淳無聲島嶼若浮則有厭波濤湍險之苦者必於其間養鱗讓鬣休遊施舒如此之處皆曰魚都君王審之無易此乎荒王眺歎曰釣翁皂父其思隘歟乃欲置吾於湘水一曲釣羅病魚吾自相水洞庭可矣於是命造罛釣於是命造浮宮令罛釣所至淵無藏龍令浮宮所狀與仙府比同宮有天舟兀龍殿當居史端實霝女巫鬼祝女司宮侍何荒王而公族國卿莫得至焉宮有艎臺揭拔類擬天都薰珍鈿塗纓佩垂紆金珠玉爐蕭漻清泠苾馥芬敷臣何荒王於此臺上與妊女嫮姝雙歌間徐娭然自娛宮有艂堂舟岑房䑦館艨廊載戲兒奴妓官諧奴內臣宮姥優倡及玩器不名戙維宮傍宮有聯舟需負土以為舟霝囿囿多夭草媚木淫禽醜獸宮有海之闕仡倔解懸左曰瑞風右曰祥煙宮有四門青氣白雲丹景元寒然後始為鷁城匝宮屯備交戰禁御林山羅攢峙其餘駭鯨之舟良飛龍之舫鳧艋鶴舟臿羅宮上下者千里相望浮宮可御而罛釣無成臣何荒王乃浮浮宮於都龍之漩泠出洞庭之南渶將觀蠻師夷人與漁者試罛釣於沅湘會浘臣何荒王始見積魚之山而喜色未起及見罘猶畜委釣未施已瀠洄淵洑周袤千里罛中之魚皆觸蹙鍛駭投跳委壘可以薦車臣何荒王輦於其上而心始喜是日置魚監拜網尉釣尹司綸各有等次又有類龍學鰉肘釣䏶釰鵬騰鶚躍潛深錯索得怪魚狀龍者皆差授官爵寵王聞之喜曰吾國無有長流激湍平湘大淵而不知有此樂也始知城池宮館為拘我之邸山澤鷹犬為勞我之方當誦記所聞歸學而主君史證曰不然須臣言已或可聽焉臣聞浮宮之成也臣何荒王令㣥臣有後為浮司不為浮茅者族百姓能率為浮家共為浮鄉者復男子能湍遊上下者為王賓女子能淵居移日者為王嬪未及一年遂變楚俗川原有楚室之鄉江湖有駢舟之曲家見湍上之悲戶聞臨淵之哭時野有歎曰嗚呼有國者非喜愛亡國有家者非喜愛亡家當取其亡也如喜愛者耶今君上喜愛浮宮罛釣令臣下喜愛浮司浮鄉吾恐君臣各迷而家國共亡此實楚正士歎臣何荒王臣願君王驚懼為心指此為針寵王聥然復問君史曰更有記乎曰有之甚妖怪也何故不説寵王曰當必為吾説之對曰臣聞天鄙有山山有玉鼓實有天霝鬼扣之歌舞聲媚金石韻便宮羽寵王曰生休矣吾將購之君史證曰不可臣所不欲説者懼君王好之君誠不忘歟臣請備説其可好乎昔臣何惑王用閽嬖之謀肆極荒淫更經年歲鑿險填深轉餽通千里萬金五譯臣妾借喻其心然後云獲非霝女女撫鼓而天霝鬼不舞非霝女女引和而天霝鬼不歌天霝鬼舞一容化一分眄一祥襜一宛袂臣何惑王見之舒舒曳曳若多醇酎而不知所制天霝鬼歌一化顏一主顧一更聲一換氣臣何惑王聽之娭娭懿懿若已酎昏而不知所至天霝鬼歌舞臣何惑王氣如陽春始霽時雨天霝鬼不歌舞臣何惑王心若已喪而頽壞不主嗚呼天霝鬼惑人至此嗚呼天霝鬼媚人至斯如有霝鬼賓頁甡甡輔之使臣何惑王之心無所不欲使臣何惑王之意無所不為獨言選女於餘可知其選女也豈止嫈女嬴媺嫮及霝女未笄將齬將齯將女與將嫕可喜美者母姨負抱姑姊引提詣於王宮字籍王閨然後割楚國廟右為天霝鬼作宮分楚國社陽為霝鬼賓頁作館悉楚國之好奉之已窮於所奉之心其猶未滿楚國之人已悲咨寃怨日苦其毒其臣何惑王尚熙恞敷娛日思未足野有直士觸而證曰大王溺於天霝鬼惑於霝鬼賓頁不顧宗廟遂亡人民如何下命其令且云舞者能變一度歌者能變一聲應霝鬼樂之節數充寡人之性情且能富其親族又能貴其父兄至於母姨姑姊皆能與之封邑以為世榮令行逾月楚俗皆化女忘蠶織男忘耕稼里開學歌之館鄉築教舞之榭遂使黃鐘大呂生溺惑之聲孤竹空桑起怨離之調變風俗於一歡忘正始於一笑大王未覺遂不節損此所謂鑿顛覆之源造亂亡之本今之所好則妖惡之物所為又怪醜之事羲軒之耳必不肯聽堯禹之心必不肯喜臣何惑王悟之於是使嬖臣挾玉鼓與霝鬼樂使閽尹抱天霝女霝鬼賓頁鎖以金索繫於石人沈之深淵飛楫而旋寵王曰殆哉楚國幾為浮宮霝鬼樂所亡君史曰幾亡楚國有甚於是昔臣何惛王極暴極虐使臣下得肆姦肆佞肆凶肆惡臣何惛王不知如此亡可待矣而乃歎曰於戲堯實皂帝禹實隸王殷周君長并夫可方焉有慘然勞苦而為人主焉有隘然九州而裂封諸侯吾必合外荒夷狄海內人民悉奉我為主欲世世臣臣此臣何惛王所云又謀變先王之典禮更萬物之名號列宮官於海外窮天地而遍到而復思稽極變化徵驗怪異盡難得之物充無窮之意荒娛厭怠思計所為度國土之不大料財力之不支乃令人曰吾欲勞汝人民休汝人民汝人民豈知今悉汝丁壯婦人繼之童翁分力負載而隨我已老謀我已名師人民聽我當無二思所舉既甚所資不足乃署官而賈鉗孤而鬻始令國中絶人謗讟贊謀者侯敢諫者族其令朝行其俗暮改有以逃罪正言不發萬口如封諂媚相與千顏一容野有忠臣負符矯謁偽為齊客紿而證曰臣入君王之封域見君王之風化踟蹰路隅不覺泣下或聞哀號或聞悲呼訊於閭里必鰥寡惸孤或見凶侈或見驕奢訊於左右必公侯之家客説未已臣何惛王曰然乎謂何對曰噫君王不知忠正不植姦佞駢生能火肖歹古仁惠冒蓋聰明令巧媚得口為矛戟令姦凶得心為甲兵此皆明迹甚於鬼神發機有若雷霆實畏君王已芻於牢圈實恐君王已暴夫乾枯君王如何不是念乎臣恐楚國化為荒野臣恐君臣不如犬馬臣何惛王於是眄容而慚撫身而哀仰為客曰君幸憐之得無戒哉君為臣化心心化身身化化人嗚呼遞化之道在制於內外外之入也有視聽言聞內之出也有性情嗜欲出入相應必有禍福臣何惛王聞之宴居化心諷誦斯言終身為針遂罷已成之事寢未成之謀廢所賈之官復所鬻之孤敢諫者侯贊謀者誅君史言已王客捧酒為寵王壽起而贊曰君史説楚似欲戒梁敢願君王示鑒不忘天寶十四載安祿山陷洛陽明年陷長安天子幸蜀太子即位於靈武明年皇帝移軍鳳翔其年復兩京上皇還京師於戲前代帝王有盛德大業者必見於歌頌若今歌頌大業刻之金石非老於文學其誰宜為頌曰噫嘻前朝孽臣姦驕為昏為妖邊將騁兵毒亂國經㣥生失寧大駕南巡百僚竄身奉賊稱臣天將昌唐繄曉我皇匹馬北方獨立一呼千麾萬旟戎卒前驅我師其東儲皇撫戎蕩攘㣥凶復服指期曾不踰時有國無之事有至難宗廟再安二聖重歡地闢天開蠲除祅災瑞慶大來凶徒逆儔涵濡天休死生堪羞功勞位尊忠烈名存澤流子孫盛德之興山高日升萬福是膺能令大君聲容沄沄不在斯文湘江東西中直浯溪石崖天齊可磨可鐫刊此頌焉何千萬年猗玗子逃亂在石邑南人云猗玗洞中是王一作三下同虎之宮中石邑之陰是均蛇之林居之三月始知王虎如古君子始知均蛇如古賢士然哉猗玗子奪其宮王虎去而不回猗玗子侵其林均蛇去而不歸借順惠讓可作頌矣猗王虎將何與方方古太王非不方於今今也惠讓不如王虎之心猗均蛇將何與儔儔古延州非不儔於時時也順讓不如均蛇之為問天下興兵今十二年矣殺傷勞辱人似未厭控強兵據要害者外以奉王命為辭內實理車甲招賓客樹爪牙國家亦因其所利大者王而相之亞者公侯尚不滿望今欲散其士卒使歸鄉里收其器械納之王府隨其才分與之祿位欲臨之以威武則力未能制欲責之以辭讓則其心未喻若捨而不問則未覩太平秀才通明古今才識傑異天下之兵須解蒼生須致仁壽其策安出子其昌言問往年天下太平仕者非纍資序積勞考二十許年不離一尉至於入廊廟總樞轄則當時名聲籍甚者得至焉今商賈賤類臺隸下品數月之間大者上汙卿監小者下辱州縣至於廊廟不無雜人如專經以求進主文而望達者若不困頓於林野則必悽惶於道路今日國家行何道得九流鑑清作何法得僥幸路絶施何令使人自知恥設何教使賢愚自分問開元天寶之中耕者益力四海之內高山絶壑耒耜亦滿人家糧儲皆及數歲太倉委積陳腐不可校量忽遇凶年穀猶耗盡當今三河膏壤淮泗沃野皆荊棘已老則耕可知太倉空虛雀鼠猶餓至於百姓朝暮不足而諸道聚兵百有餘萬遭歲不稔將何為謀今欲勸人耕種則喪亡之後人自貧苦寒餒不救豈有生資今欲罷兵息戍則又寇盜猶在尚須防遏使國家用何策得人安俗阜不戰無兵用何謀使縱遇凶年亦無災患問往年粟一斛估錢四百猶貴近年粟一斛估錢五百尚賤往年帛一匹估錢五百猶貴近年帛一匹估錢二千尚賤今耕夫未盡織婦猶在何故往年耕織計時量力勞苦忘倦求免寒餒何故今日甘心寒餒惰遊而已於戲曩時粟帛至賤衣食至易今日粟帛至貴衣食至難而人心勤惰如此其何故也試一商之欲聞其説問古人識貴精通學重兼博不有激發何以相求三禮何篇可刪三傳何者可廢墨氏非樂其禮何以儒家委命此言當乎彼天女天孫不知何物彼日兄月姊弟妹是誰駔儈與傖奴寧分一純將二精何説孤竹之君何姓新城老婦何名棘竹出自何方毒銅産於何國何鄉無水可飲何地臥冰而溫何人恩信過於田橫何人壯勇等於關羽何人鑿坯而遁何人終日掃門無淺近之不為悉説臣某言臣伏奉某月日赦某月日宣示百姓訖伏惟皇帝陛下以慈惠馭兆庶以謙讓化天下凡所赦宥皆允人望凡所敦勸皆合大經生識之類不勝大幸臣方領陛下州縣守陛下符節不得稱慶下位蹈舞闕庭不任歡戀之至謹遣某官奉表陳賀以聞臣某言某月日恩赦到州宣示百姓訖百姓貧弱者多勞苦日久忽蒙惠澤更相喜賀歡呼抃躍不自禁止伏惟皇帝陛下增修典禮宏正紀度勞謙慈惠與人更新此實興王之盛烈明聖之至德戴履天地誰不慶幸臣方鎮守州縣不得蹈舞闕庭無任歡欣之極謹奉表陳賀以聞臣某言臣伏奉某月日敕除臣監察御史裏行依前充山南東道節度參謀忽承天澤不勝慶喜負荷恩任伏增憂懼臣在至德元年舉家逃難生幾於死出自賊庭遠如海濱敢望冠冕陛下過聽疑臣有才謀可用謂臣以忠正可嘉枉以公詔徵臣延問當時之事言未可取榮寵已殊事未可行授任過次其時以康元狡逆陛下憂勞臣亦不辭疲駑奉宣聖旨招集士卒師旅未成又逢張瑾姦凶再驚江漢臣恐陛下憂無制變遂曾表請用兵陛下嘉臣懇愚頻降恩詔聖私殊甚特加超擢至今臣自布衣未踰數月官忝風憲任兼戎旅今不勞兵革凶豎伏辜臣不可終以無能苟安非望自姦臣逆命於今六年愧無寸能苟求祿位分符佩印不知慚羞戮辱及之死將不悔陛下忍而從者其可勝言臣才弱識下非智無謀循涯顧分實自知恥臣老母多病又無弟兄漂流殊鄉孤弱相養伏願陛下矜臣愚鈍不合齒於朝列念臣老母令臣得以奉養則聖朝無辱官之士山澤有純孝之臣不任悃之至謹遣某官奉表以聞謹言臣某言臣自以愚弱無堪遠迹江湖全身之外無所冀望陛下過聽徵臣顧問今臣起家數月之內官忝臺省爾來三歲無益效用愧恥之甚在臣無踰臣竊以荊南是國家安危之地伏願陛下不輕易任人陛下若獨任武臣則州縣不理若獨任文吏則戎事多闕自兵興以來今八年矣使戰爭未息百姓勞弊多因任使不當致使敗亡伏惟陛下審擇重臣即日鎮撫全陛下上遊之地救愚臣不逮之急謹遣某官奉表以聞臣某言臣以為才不稱任位過其量不自知分禍辱皆及臣才不如人量識褊僻踰越秩次忝辱衣冠人亦有慙臣自知愧臣少以愚弱不願為吏書學自業老於儒家今迹在軍中日預戎事此過臣才分近於禍辱者矣臣常恐荒浪失於禮法自逸山澤預於生類今穢汚臺省紊亂時憲此過臣才分近於禍辱者矣伏惟陛下察臣才分不令亂官則貪冒苟進之徒自臣知恥陛下若官不失人則天下自理故曰天下理亂繫之官人臣以為官人之難無敢易者陛下焉可易於臣哉臣無兄弟老母久病所願免官奉養生死願足上不敢汚陛下朝列是臣之忠下不欲貽老母憂懼是臣之孝願全忠孝於今日免禍辱於將來伏惟陛下許臣免官許臣奉養在臣慶幸無以比喻謹遣某官奉表陳請以聞臣結言臣伏奉今月二十二日敕授臣使持節都督容州諸軍事守容州刺史御史中丞充本管經略守捉使四月十六日敕到二十一日發付本道行營臣實愚弱謬當寄任奉詔之日不辭憂懼臣結中謝臣聞孝於家者忠於國以事君者無所隱臣有至切不敢不言臣實一身奉養老母醫藥飲食非臣不喜臣暫違離則憂悸成疾臣又多病近日加劇前在道州黽勉六歲實無政理多是假名頻請停官使司不許今臣所屬之州陷賊歲久頽城古木遠在炎荒管內諸州多未賓伏行營野次向十餘年在臣一身為國展效死當不避敢憚艱危但以老母念臣疾疹日久時方大暑南逾火山舉家漂泊寄在湖上單車將命赴於賊庭臣將就路老母悲泣聞者悽愴臣心可知臣欲扶持版輿南之合浦則老母氣力艱於遠行臣欲奮不顧家則母子之情禽畜猶有臣欲久辭老母則又汚辱名教臣欲便不之官又恐稽違詔命在臣肝腸如煎如灼昔徐庶心亂先主不逼令伯陳情晉武允許君臣國家萬代為規伏惟陛下以孝理萬姓慈育生類在臣情志實堪矜愍臣每讀前史見吳起遊宦噬臂不歸溫嶠奉使絶裾而去常恨不逢斯人使之殊死臣所以冒犯聖旨乞停今授待罪私門長得奉養供給井稅臣之懇願塵黷天威不勝惶恐草土臣結言伏奉四月十三日敕以臣前在容州殊有理政使司乞留以遂人望起復臣守金吾衛將軍員外置同正員兼御史中丞使持節都督容州諸軍事兼容州刺史充本管經略守捉使賜紫金魚袋忽奉恩詔心魂驚悸哀慕悲感不任憂懼臣某中謝臣聞苟傷禮法妄蒙寄任古人所畏臣敢不懼國家近年切惡薄俗文官憂免許終喪制臣素非戰士曾忝臺省墨縗戎旅實傷禮法且容府陷沒十二三年管內諸州多在賊境臣前行營日月甚淺宣布聖澤遠人未知有何政能得在人口使司過聽誤有請留遂令朝廷隳紊法禁至使愚弱穢汚禮教臣實不敢踐古人可畏之迹辱聖朝委任之命敢以死請乞追恩詔前者陛下授臣容州臣正任道州刺史臣身病母老不敢辭謝實為道州地安數年祿養容州破陷不宜辭避臣以為安食其祿蹈危不免此乃人臣之節其時臣便奉表陳乞以母老地遠請解職任陛下察臣懇至追臣入朝臣以為不貽憂歎榮及膝下人子之分不圖恩敕未到臣丁酷罰哀號寃怨無所逮及今陛下又奪臣情禮授容州臣遂行則亡母旅櫬歸葬無日几筵漂寄奠祀無主捧讀詔書不勝悲懼臣舊患風疾近轉增劇荒忽迷忘不自知覺餘生殘喘朝夕殞滅豈堪金革能伏叛人特乞聖慈允臣所請收臣新授官誥令臣終喪制免生死羞愧是臣懇願臣今寄住永州請刺史王庭璬為臣進表陳乞以聞臣某言去年九月勑授道州刺史屬西戎侵軼至十二月臣始於鄂州授勑牒即日赴任臣州先被西原賊屠陷節度使已差官攝刺史兼又聞奏臣在道路待恩命者三月臣以五月二十二日到州上訖耆老見臣俯伏而泣官吏見臣已無菜色城池井邑但生荒草登高極望不見人煙嶺南數州與臣接近餘寇蟻聚尚未歸降臣見招輯流亡率勸貧弱保守城邑畬種山林冀望秋後少可全活臣愚以為今日刺史若無武略以制暴亂若無文才以救疲弊若不清廉以身率下若不變通以救時須一州之人不叛則亂將作矣豈止一州者乎臣料今日州縣堪征稅者無幾已破敗者實多百姓戀墳墓者蓋少思流亡者乃衆則刺史宜精選謹擇以委任之固不可拘限官次得之貨賄出之權門者也凡授刺史特望陛下一年問其流亡歸復幾何田疇墾闢幾何二年問畜養比初年幾倍可稅比初年幾倍三年計其功過必行賞罰則人皆不敢冀望僥幸苟有所求臣實孱弱辱陛下符節陛下必當謹擇臣固宜廢歸山野供給井稅臣不任懇之至謹遣某官奉表陳謝以聞臣某言某伏奉某月日敕再授臣道州刺史以某月日到州上訖臣前日在官雖百姓不至流亡而歸復者十無一二雖寇盜不犯邊鄙而不能兵救鄰州雖賦斂僅能供給而有司不無罪狀雖人吏似從教令而風俗未能移易臣又多病不無假故水旱災沴每歲不免疾疫死傷臣州尤甚以臣自訟合抵刑憲聖朝寬貸猶宜奪官陛下過聽重有授任伏恐守廉讓者以臣為苟安祿位抱公直者以臣為內懷私僻有材識者辱臣於臺隸之下用刑法者罪臣於程式之中臣所以不敢即日辭免待陛下按驗虛實然後歸罪有司今四方兵革未寧賦斂未息百姓流亡轉甚官吏侵剋日多實不合使凶庸貪猥之徒凡弱下愚之類以貨賄權勢而為州縣長官伏望陛下特加察問舉其功過必行賞罰以安蒼生誰不自私臣實不敢所言狂直朝夕待罪不任懇之至謹遣某官奉表陳謝臣某言月日敕使某官某乙至賜臣制書示臣云云者臣伏見詔旨感深驚懼臣豈草木不知天心頃者潼關失守皇輿不安四方之人無所繫命及永王承制出鎮荊南婦人童子欣奉王教意其然者人未離心臣謂此時可奮臣節王初見臣謂臣可任遂授臣江夏郡太守近日王以寇盜侵逼總兵東下傍牒郡縣皆言巡撫今諸道節度以為王不奉詔兵臨郡縣疑王之議聞於朝廷臣則王所授官有兵防禦鄰郡並邑疑臣順王旬日之間置身無地臣本受王之命為王奉詔王所授臣之官為臣許國忠正之分臣實未虧蒼黃之中死幾無所不圖今日得達聖聰臣今年將六十老母在堂縱未能奉義捐生則豈忍兩忘忠孝臣少以文學為諸生所多中年自頤逸在山澤聖明無事甘為外臣無何以鄙僻之故返為人知遂汙官次以至今日臣又頃年貶謫罪未昭洗今所授官復超越班秩罷歸待罪是臣之分今陛下以王室艱難寄臣方面臣亦以忘身許國誓於皇天伏惟陛下念臣懇至謹因敕使臣某官奉表以聞臣某言臣自去秋疾疹以至今日轉加羸弱庶事不理某月日附某官口奏請替某月日又進狀陳情未蒙允許伏增憂懼陛下應以臣久曾驅策未忍替臣臣實憂陛下方隅切須鎮守臣不能起止四十餘日艱虞之際實慮變生今淮西敗散唐鄧危急在臣病廢豈敢偷安伏望天恩即與臣替儻餘生尚在得至闕庭犬馬之心死生願畢不勝懇之至謹遣某官奉表陳乞以聞
