front:
  text: 全唐文欽定全唐文卷三百八十結河南人天寶十三載進士擢右金吾兵曹參軍攝監察御史為山南西道節度參謀以討史思明功遷監察御史裏行進水部員外郎代宗立拜道州刺史進容管經略使加左金吾衛將軍卒年五十贈禮部侍郎
  hash: sha256:db679d29bd5a8f87537ba7d206d029d6e8926f30d1a663e1f1c96211ea9eef94
  markers:
