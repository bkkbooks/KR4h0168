body:
  text: 漢章帝以文教式孚象德崇儒倣石渠徵校文之所配白虎集青襟之徒於是發明詔下皇都宏辨者憤憤悱悱博議者雲萃風趨所以讚揚政理豈惟探討典謨爾其高觀洞開鴻儒四會擅古今之美為皇王之最八索九邱之籍理析異同三墳五典之書義分小大舉兩端而擬議與百代而沙汰既理貫於中亦聲聞於外實鈎深而索隱况致遠而情高信積學而無倦豈待問而有勞談柄乍揮振冠蓋之岌岌詞源忽注瀉江海之滔滔將以演制度之善論威儀之盛撮五經之閫閾為九流之龜鏡連山魯史自此而刊禮義詩書自茲乃正夫如是始可以化人倫施國柄有典有則惟明惟聖上知恭勤下審教令然後代有等威理歸清淨懿哉釋鈐鍵之樞奧賾精微而討論疑之者風散冰釋學之者理順義存可以明乎褒貶從其簡易貢別九州興窮六義豈惟槭之說蓋亦識之智今我后化叶人文莫㣥陋漢日越堯君觀其環林森森璧池浩浩鴻儒碩生旦夕探討曲盡庶彙旁流聖造則知儒者可為帝王之師保國家化協軒后道超帝先敷至德以被物降殊祥而自天祥異宗周下岐山之鳴矣企觀神極放阿閣而巢焉由是載止於甍次蓋將呈瑞於君前臨四榮而肅乎雲委播五彩而煥爾霞鮮且將巢者其義久也美德化乎宇內永棲遲於日下爰居爰處恆依應龍之祥一作梁載飛載鳴寧侶化鴛之瓦道既砥平時亦鏡清厭丹穴而不息鄙高岡而不鳴方為應至仁而來元扈豈徒愛層構而集丹楹彼燕有巢巳聞在幕之厄爾鶴稱德更擅乘軒之名一則兆啓乎顛沛一則僭處乎車蓋曷若我愛育元和來儀昭泰奮美羽於軒楹散清音於埃壒然後知赤烏不曰珍白龍不曰神或生之於苑囿或厄之於海濱四目鳴而不覩萬戶獻而莫臻豈若茲鳳惟閣是因三重其階實惟高矣顯矣一人斯覩誰謂不躬不親向非我后從政不咈惠生於物執德不回遺乎將來鳳亦遠矣誰能巢哉是知反道者高閣徒修悖德者鳴鳳罔萃竊稽瑞牒載覽史記惟黃帝與吾皇能感之而自至上苑之左兮驪山之中天作高岫帝為離宮示宸遊之有所表聖鑒於無窮臨峻路而赫其昈昈標爽塏而屹以崇崇惜翠華之未至闐紫殿而猶空則有望幸其中流睇延慕希天顏而回矚望雲闕而屢顧想恩波之東注俯瞰渭流愛佳氣之西浮空瞻秦樹目盡烟末心馳御路何聖慮之未還獨幽懷而能喻窮轍跡且俟玉山之遊想車音將購長門之賦矧夫閣有朝元之美稱殿有長生之嘉名霞駮丹檻雲攢繡楹可以召通仙之降止安皇祚之永貞是以仰碧落竭丹誠庶日月之回照等葵藿而同傾濯觱沸之泉每想金輿之度踐萋青之草還思玉輦之行雖託質於別館常寄心於穆清戀戀西向悠悠矚望步磴道以寂歷眄廣庭以寥曠竹花雖吐如含待鳳之誠雲氣才升若睹從龍之狀彼玉山既遠金闕仍賒未若浮游近縣如在仙家俄天邑之孔邇自神都而不遐雖館稱五柞殿美九華喻之於此曾何以加惜乎神光未矚曠此佳境徒企想以忡忡復懷慕而耿耿閉玉樹於深谷銷金鋪於秀嶺君乎君子胡不出宸居而來幸瞻彼陂田新苗在地徒施助長之術且異發生之類望斯箱於翼翼爰用心期貪彼黍之芃芃方將力致搖然乃亂興每如抽自貽伊戚職汝之由忽分叢於步武俄裂土於田疇勞而無功焉用拔乎其萃動而愈出縱其生也若浮既不得於和熟宜取傷於躁求相彼老農求之欲速傴僂煩手扶疏自目信相違於淺種不用其良既自露於深根曷云能穀忘枯槁之如彼尚低徊而念茲繞指尚疑於取苧勞身豈並於乘時攬一握之纖莖始如陵草聳千科之細葉終異園葵孰云農事以妨但取高而為貴無思去草之務有若拔茅之彙不從其道雖矻矻以徒勞莫悟其由訝離離而增欷原夫秀而不實愛欲其生覆東臯而歷亂交南畝以縱橫或長或短稍因人而盡起靡瞻靡顧俄麗地以同傾與其違性而早落豈若從宜而晚成時不爽於榮枯事可期於逆順惟躬是瘁寧同於百卉具腓以若所為且異乎孤蓬自振亦由行道者之仁義可依體上聖之知命戒中庸之妄祈賦孟子之言聊將此喻窮宋人之理永鑒其非偉漢文之君臨惟宮室有度以兆庶為心安不忘危豈勞力於纍土用過乎儉亦軫慮於百金懼乎設怨將以激勸若臺之是修唯德之不建是故絶役心於制造宏儉德於億萬乃言曰臺者高峙路者四通不足避燥濕寒暑無以受朝聘會同奚必居高為明四目遠聽為達四聰不重斂何以就役不勞力何以成功由是却匠人之計全王者之德豈嗇於財實肥於國雖百工麕至無所作則庶人子來曷由陳力言之既終人故適從板築之功既絶尋尺之材勿庸柱礎不施寧轉他山之石棟宇罷構匪斫徂徠之松若夫氣候為備順時布化諒惟國之有恆成茲臺之何暇南至以望太史每升以觀臺仲夏而居有司自設其高榭亦何用土木特建丹艧勤修誠無用之作非不朽之謀豈止全十家之中産貽百代之良籌彼晉靈登臨我則絶彈人之戲宋平興作我則無築者之謳式昭莫大之見用保無疆之休不然何以紹祉祖宗垂芳簡冊踰儉約於三五延載祀於二百豈不以肇於露臺播無為之嘉畫彞器之美黃目是尚黃者取黃理而中孚目者象清明而外暢徵戴禮而有謂懿周人之是創將表敬於宗祧必薦馨於鬱鬯爰設嘉名是用飾情彼因外而有制猶自中而立誠酌於心終有假於圭瓚象乎目難取比於兕觥必因尊彞爰佐齊醍以明大享之品物以助諸侯之孝悌故以目而為名因酒而成禮爾其克修祀典遐本淳風將抔飲而體異等犧尊而義同殷薦有恆守籩豆之列備用何所在宗廟之中追述作之深旨諒昭明而有融用當其無物不為薄齊納金而飲酎等用茅以明酌挹而未竭故不慚於金罍執而不揮寧有愧於玉爵立制有經創意圖形潔以新樽冀精誠之可達歆於明德知黍稷之非馨其象也則小取喻也斯大雖斟酌在中必儀形於外嘉其不泛不濫可繼可傳罔施丹艧徒假雕鐫巨同乎卮信乎美而無當豈比乎斗則有象而在天徒虛無以為說非潔芳以告虔甚矣哉前王之創物俾後代之相沿氣之至兮景之長郊之初兮國之陽將有事於新日以無忘乎舊章太史先期而以告天子齊心而有常且曰經紀不忒乃貞明而成象疾徐中度胡躔次而可量俟一人天臨而斯出俾㣥后景從而有光可以冠千古之嘉禮軼三代之盛王然後五輅乃駕六龍是驂迎炎精表著明於君象就陽位乃展禮於國南斯可以人詠明哉且知配虞帝之二工升歌也奚獨美文王之三且天有兩曜兮日無其匹域有四大兮王居其一將報本而郊天因宣明而主日大司徒執圭以表位㣥有司奉璋而有秩羲和御之而有倫疇人則之而無失運行之次望遲遲以就陽寅賓之時見杲杲而巳出始也戒職司明國體卜郊之典無闕迎日之義爰啓受命於祖作龜於禰是皆匪愆於儀未有不謹於禮禮容必呈祀事孔明迎扶桑之初乃實柴而薦敬因吉土之兆同掃地而貴誠信列辟之盛節俾歷代而作程魏則朝於獻嵗夏則置乎小正今則聽封人之善祝採從臣之嘉頌時令空美於風行帝力孰知其日用人悅於下禮行於郊不獨服尚元素器遵陶匏是知禮之設也教之大者彼孔稱從周殷因於夏曾未若我后敬授人時而天錫純嘏惟石之貞惟鏡之清鏡因石以為異石假鏡而為名其在石焉肇自一拳之質其為鏡也非因百鍊之精不資磨瑩而冰淨詎假雕鐫而砥平徒美夫孕清瑩合彩綴粲玉質以皎皛蓄霜華而明媚匪因人力其成也何時倬彼神功其來也奚自凝輝炯炯散彩洋洋既不勞乎鎔範亦無失於圓方輝映空巖恆舞山雞之影色澄清夜寧慚玉兔之光伊鑒物之必審信自然之所稟彼虛受而不遺同至道之無私既不限於遐邇豈有差於毫釐深山之中誰辨藏氷之處幽谷之際寧分抵璧之時况剛直其體清貞自持恆發輝山之色常含韞玉之姿懷寧一之心不可轉也處闐寂之地誰其尸之當六合之清爽澄素輝之潔朗可以坐致於雲霄可以立分於魍魎知遠之邇視山嶽之在目以小觀大覽江湖如指掌且鏡之為物也淨石之為義也堅既守質以固矣亦騰光而皓然朗鑒之前皆願呈其肝膽委照之下終願辨乎媸妍故能無微不燭無物不載彼三光與萬類莫不形乎其內也哉天子崇儒兮闢此虞庠仲秋上丁兮奠我素王既斯禮之畢具伊古樂而遂張於是調律呂備宮商笙鏞嘈而並奏干羽儼其成行進旅退旅爰擊爰拊鳴宮懸起萬舞設崇牙森樹羽斯道渢渢斯人俁俁和聲合氣綴規接武聽其韻可以窒欲覽其儀可以道古濟濟祁祁莫不賁然而來覩有嘆者曰太和之音其樂愔愔作以崇德和而不淫所謂建藻薦之禮革慆堙之心雲英之聲何質韶濩之樂則深見師襄之擊磬聞瓠巴之鼓琴借如發揚蹈厲右秉左執其從純其始翕登歌初彌下管相及朱絃徐泛覺虞舜之風薰玉戚載持想周武之山立懿其五節清九奏成播殷周之頌無鄭衛之聲廉正以作姦邪不生蓋由德音洋溢樂教衆夥誠無象而不傳非有功而不可魏文侯昔著於發問賓牟賈嘗稱於侍坐乃知雅音為邦家之本正樂非耳目之玩可以洽人神可以彰理亂而况八佾成列八音克諧尊儒訓兮國風之始闡樂正兮王政不乖夫如是所謂光揚盛禮和樂孔偕樂者制也所以道天和全人性故作之以崇德審之以知政王者敬其事而闡其道順其時而行其令逮夫季春屆期乃命有司且曰㣥萌達矣播樂安之重以國經不可闕躬理必以時將齊度以節奏被選樂於聲詩撰乃吉日總於樂師是用資於誨爾亦無忝於命夔由是司儀辨等庶工守位備絃管之聲陳匏竹之器柷敔邐迤而就列簨簴嶙峋而居次克展禮容而告樂備天子於是率九卿暨三事必虔心而有待俾陪扈而斯致既親覩於宮懸又何假以庭試若乃曲度是并不可殫名雜以韶濩間以英莖追宣尼之前聞是能忘味念師乙之舊說各辨遺聲考彼廢興存乎清濁安以樂且知治世之音哀以思不雜異方之樂類飛聲於垂仁等潤物於流渥足使魏文侯之臥聽巳悟前非吳季子之備觀難施先覺既盡美矣又何加乎諒從律而罔惑將克諧而不渝必在聽和知其樂也泄泄是其反朴變其風也于于具舉不患乎聲希統同寧貴於和寡奚必饗鈞天之靈貺而有殊焉想洞庭之異音更思古者誠夫天祚我皇恩歷遐昌掩邃古之嘉樂軼三代之聖王竊賀聲明之巨麗敢聯雅頌之遺章物有感者其沙之同流韜至精之未吐俟明鑑以來求披潰沱歷汀洲期往而有覿必專而是謀若不克見何遠不討大無間於洪流細寧忽於潢潦必因目擊信夫川則效珍不假鏡臨所謂地不藏寶於戲未分美惡必在妍媸當有期於慎簡幸無見於忽遺經營乎永昌之日徘徊乎麗水之湄初若決浮雲搖星光之的的又似剖㣥蚌貫珠彩之纍纍充一鎰而有待貫三品而方期出輕漣而沉潛自照別麗景而光炅生姿洎乎沙之汰之既堅既好斷之則同心斯得用之則從革是寶必資作礪自同選衆以求仁曾是滿籯未若勤學而知道伊昔識真者寡罕遇良工遺我於一撮之內混我於衆流之中純固空知夫自守精英不得而外融與沙磧而雜居則如雲積處礦璞而自異詎可雷同寶既有矣况於人乎夫辨之掌握尚辱在泥塗則將排碧沙涉清淺雖有懷於揀金庶不遺於片善今則藻鑒既朗庸將自媒興公雅符於通論士衡猶患於多才不然者則懷寶而退矣曷為體物而來哉惟礪也有克剛之美惟金也有利用之功利久斯剋猶或失其銛鋭剛固不磷是用假於磨礱不然何以興喻殷監譬后之聖金將有缺必假石以磨穎耀芒后若有遺必資賢而礪節砥行使藐鋒無白圭之玷令德有黃軒之盛取譬於攻金之工方期於政罔不正且夫利器久翳銛鋒不全參差冰缺掩冉苔聯價減千金之直文滅七星之躔非夫堅石之煆乃礪乃巧匠之藏焉修焉又安得而昭宣若乃君上初臨德聲未溥令不盡一名不咸五筮微子牙之兆衮闕仲山之補非夫忠臣之扶危持顛英俊之左弼右輔又安得而稽古乃知君與臣兮相符金與礪兮相須離之而道斯遠全之而德不孤故為金也光乎九牧為君也配彼三無是以工必利其器君先擇其佐佐明則有融器鋭則不挫光芒乎擬之必斷恬淡乎立於無過亦何必俾鈍質不可礪俟昏德以將衰如銛刀罔能斂其鍔如朽索無或紐其維然後乃知利重乎磨損之又損為貴君宜乎諫善人不善之資况今聖上欽明英髦迭出恭默思道曷高宗之可侔輔弼納忠豈傅巖之攸匹宜乎哉超羲而越夔勗而自必蒙彼東山山下有泉運未逢於畎澮色空積於澄鮮虛明可鑒淡泊自然宜習坎以為德胡止艮而莫前士有酌而嘆曰惟水之義萬物之利顧導達之或闕將灌注而奚遂朝宗路阻未歸朝夕之池潤下功微空浸尋常之地且夫壅則止理則通能致遠邇任決西東荷四氣之平均潛生麗藻處重陰而蒙蔽尚阻清風亦有舒女化而稱異耿恭感而成功彼皆因人而有託此獨居然而在蒙懿其滿而不盈卑以自處岷山未測且覩濫觴之時滄浪是期終異濯纓之所性則全柔德無與儔能載清而載濁諒可泳而可游將注江湖終有希於上善未分涇渭誠無惡於下流嗟止水之奚匹念發源兮在斯當其一勺而可挹豈待成川而後知儻理水之有便諒餘波而可期他日敢以勝載之力冀裨舟楫之時藍蘊嘉色青出其中諒究本而不異獨入用而靡同渥彩必因乎外發至精不得以內融暨乎時日既臻染人云至備震方之正色遵周官之故事行採之際詎盈時人之䄡俯拾之時亦異炎州之翠非取榮以玩悅將有求於精粹比夫朱研而益丹劍淬而愈利惟英華是揆惟混濁是棄曷舍彼而取此信本同而末異當時所營盡彼精英被以純深之色總乎遷染之名陰隲四時輿服因我而更御彰施五采元黃待我而後成初類含章而潛伏今若開輝而發明豈不以蒼然之迹始分煥爾之英久積研精逾麗昭章可覿謂元之又元符益之又益則明珠之剖巨蚌美玉之出韞石彼皆異狀而竟殊此則一變而不易且夫色無以加孰曰取實而去華光不可昧必惟自中而形外故臻乎極而不失其色發乎深而其用惟新積而成形事等冰寒於水演而為大義同絲出於綸俾夫外則文為藻繢內則體合精純故烟生於火配乎物情根於性本於仁子貢賢於仲尼莫知功倍季孫富於魯國孰謂德均君子思端本而肇末恥後先以超越故取斯而喻斯謂不悱而不發何新月之嬋娟如破鏡之上天微茫而桂樹猶短髣佛而菱花不全皓色減去清光獨懸謂是云非開玉匣而長在自無而有指金波而未圓象則凌虛名何責實伊酷似其素影若同分於麗質莫測潛化空驚回出憐此夕以孤飛念誰家而暗失况夫微明海澨遠掛關山感重輪而易缺思鞶帶而莫攀姮娥掩色嫮女分顏意迢遞而難明半生象外豈別離之可贈餘在人間霽景澄寂泬寥凝碧匪回輝而照膽徒向晦而淪魄洞房未掩過臺上而不歸斜漢欲低入窗中而猶隔亦何辨夫鎔於火化隲彼陰靈比孤光於圭白喻片影之銅青遙空絢練遠色晶熒爽氣共浮豈彩霞之能掩芳塵不到非素手之所經觀夫漸倚上元迫於下土瞻吳牛之罷喘對孤鸞之欲舞徵碎質以委地有方輝而竟戶哉生之後從一氣以裁成埋照之時豈五金而能補正當殘夜偏稱高秋含烟不隱泛水如流茍孕明於真宰非稟質於人謀似逃秦殿聊上庾樓疑熠熠以從革類纖纖以若鈎異彼粧奩掩茲遊燭方應候以戲珠不鑒容以銷玉坐惜雲曙行愁漏促暈猶未合無陳方士之灰點不可磨空負先生之局為章於天惟彼辰極環衆星於庶位標帝座於有北故昭回之設象俾聖哲而取則鈎陳就列等營衛於宸宮閶闔旁連類屏藩於王國煥乎布彩儼若受職念精氣之無親叶天地之輔德仰圓象之炯爾嘉清輝之皎如昭明有融不韜光於隱晦悠久斯在豈隨運以盈虛戒彼不恆其德故能奠厥攸居當其天宇廓清元緯交映若萬物之調玉燭猶聖人之握金鏡守寶位而厚㣥生在璿璣而齊七政麗天之象拱北宸以是依率土之俗亦向化而無違契一人之有慶同萬姓以知歸不然何躔次縈乎黃道周廬匝乎紫微乍合彩以呈質竟同耀而分輝俾夫左之右之莫不具爾無小無大曷惟嘒彼考時變兮是察知天成兮在此仰觀或辨其晦明內附寧阻其遐邇是以纚連清漢點綴蒼旻流彩未停蜀郡猶占二使圓光既聚潁川應會賢人則知居之者安輔之者衆輻共轂不足以喻其周環斗在天孰可以齊其比諷亦猶元聖立極㣥后來庭登三傑而漢道斯盛致多士而文王以寧儻匡聖之有日願在位於恆星邈矣辰極凝光於北以迢迢之遠狀出蒼蒼之正色蔭華蓋作上帝之居擁神休為下土之式厥高可仰其儀不忒觀衆星之附麗如小邦之懷德至於遐瞻五緯回眺九圍湛河漢之秋景滅烟霞之夕霏此則信無大而無小諒知章而知微粲以低昂嗟在空而錯置煥而旋復訝共貫而知歸環紫極而未散流素月而方稀瞻夫攝提引翼鈎陳邐迤或重輝而玉集乍浮爍而波委儲精定位叶天步之廓然有耀遠方振旄頭而嘒彼且沖漠之外或盈或虛宵則觀夫成列晝焉測其所如是知惟辰得中同睿作聖合真宰之至理稟昊天之成命陰滋玉燭徒見冥其六符洞契璇樞惟悟齊其七政當其重城未啓永夜向晨想清防於嚴密披元霄而得真俱熠熠以晶朗乍煌煌而彩新類珠連之可媚儼天行而自陳拱之立言孔氏巳傳乎舊史犯而成象漢帝曾容其友人洎乎晷度環合躔次律中輻輳轂才可比其稠水會瀛未足方其衆蓋所以明上德之攸擬宣下情而通諷客有托身白社翹思青冥當天地交泰山川永寧敢屬辭而體物照庶士之從星工之制器兮雕乎朴人之興藝兮志乎學利用者臃腫無前善扣者舂容乃覺多聞非闕於疑殆成器克資乎雕斫故研精方啓於憤悱用當各施於輪桷且夫材有柔徑工有趣舍於以鑽木後其堅乎於以揮斤先其易者鈎繩定其規矩斧斤飄其上下剞劂罔輟疾徐既工鏟鱗皴於理外托精粹於文中攢節劃以洞解奧義渙乎遂通則知藝或有孚雖至剛而斯剖學乃將習奚異端之可攻方同規於大匠期繼業於良工是以木碎其節學殫於藝殊宰我之難雕匪般倕之易制既飾以文亦麗其質講學所貴乎無方摧堅不可以無術每投虛以措刃故功倍而身逸盡乎精微之理誰謂不然得於心術之間孰云無必藝通元兮堅剛則柔學通微兮指歸可求俾不才而成用化扞格以優游工之成功志之所至信念茲而在茲因比物而醜類之木也破其輪囷之學也究其奧祕礱斫斯成良工有程殫才人之學好刳者之精終朝匪勞於矻矻空谷誰聽乎丁丁既成風於郢匠期大扣於希聲物不可以智識念斯石之何為匪茲梧而不克况乎鼓與魚兮非類吳與蜀兮異域何合應於自然杳勵響而不測刃乃霜落鱗非錦攢擊蘊玉之形鏘鏘屢出裁嶧陽之幹唯唯可觀叩寂寞而大音斯發中鏗訇而餘韻不殫是知同聲者其和易殊器者其應難逢逢之韻且千歡歡之音相萬不擊不考奚呈響亮之功大鳴小鳴豈抱沉濳之怨運之靡終應而不窮覩之者謂聲存視聽之表疑之者謂音在鬐鬣之中練響而洪纖皆答化氣而遠近必通初密如於綿古倏坎然於暗空非誠貫可覽將神交所感孤生之質徒效用於汕汕可轉之資終奮響於坎坎嗟乎石之為鼓也發於異鄉梧之為魚也來彼殊方何終嵗之寂寂忽盈耳以洋洋自得於愜心應手豈待乎玉質金相棲鳳之稱既罷在藻之用何長扣之不止音亦無巳詎徵冥應之言適諧響答之美相須以成事有類塤篪相應以成聲寧限道里則知審音斯發者不可誣懷聲思擊者不可孤諧千古之善應為二物之合符向不遇張司空也知其蓄靈響而巳夫徵鼓鐘於前聞誠修身之善喻始自中出終能外布比夫曠理必彰善惡之由將以審音不失洪纖之度擊之於宮聲無不通乍超越以回出竟周流而四充聞之者足可以自誡聽之者於焉而發聰若然則處暗室者可以慎獨在多言者曷若守中豈徒夾兩欒備九乳運四氣而應律合五音而中矩必將察理亂之變明是非之至播洪音於萬鈞在敏手而一鼓由審音而聽焉鐘之為喻警夫行道之人聲也何從出乎有過之地茍由中而既發諒聞外之難祕夫鐘之所響響而見聽人之所慎慎於未形雖扣之而在寢必聞之而盈庭禮失所譏想杜蕢之揚觶教之以義嘉大禹之勒銘和順積中鏗訇發外可以掩笙鏞之逸響節干羽之繁會究彼所從爰自九重鏘然有聲初疑乎叔之離磬鏗以立號如辨乎倕之和鐘其小也窕而無滅其大也摦而不容原乎其異察乎所以若禮之失惟鐘是比茍因聲而必聞信無良而可恥故能分清濁韻宮徵將有感於動心寧取樂於盈耳故君子之聽鐘非其鏗鏘而巳德動天鑒祥開日華守三光而效祉彰五色而可嘉驗瑞典之所應知淳風之不遐稟以陽精體乾爻於君位昭夫土德表王氣於皇家懿彼日升考茲禮斗因時而出與聖為偶仰瑞景兮燦中天和德輝兮光萬有既分羲和之職自契黃人之守舒明耀符君道之克明麗九華當帝業之嗣九時也寰宇克清景氣澄霽浴咸池於天末拂若木於海裔非烟捧於圓象蔚矣錦章餘霞散於重輪煥然綺麗固知疇人有秩天紀無失必觀象以察變不廢時而亂日合璧方而孰可抱珥比而奚匹泛草際而瑞露相鮮動川上而榮光亂出信比象而可久故成文之不一足使陽烏迷莫黑之容白駒驚受彩之質浩浩天樞洋洋聖謨德之交感瑞必相符五彩彰施於黃道萬姓瞻仰於康衢足以光昭前古照臨下土殊祥著明庶物咸覩名翬矯翼如威鳳兮鳴朝陽時藿傾心狀靈芝兮耀中圃斯乃天有命日躋聖太階平王道正同夫少昊諒感之以呈祥異彼夏王徒指之而比盛今則引耀神州揚光日域設象以啓聖宣精以昭德彰燭遠於皇明乃備彩於方色故曰惟天為大吾君是則自然之器匏也可覩宜標名於曲沃竟入用於樂府將以驗遺聲追淳古聽自分乎雅鄭事有勤於三五俾夫繼咸池而嗣六英越大章而跨大武觀其發徵含宮設商分羽洎清角而雜奏合五色而相輔笙磬愔愔而在聽鳥獸蹌蹌而率舞其為器也尚質其感人也則深類韶樂之和自當忘味恥齊竽之濫詎可同音伊昔哲匠未顧伶官未臨分瓜瓞以為伍將葛藟而是尋空思諧於音律寧望齊於瑟琴願以刳心去苦葉而展用寧無滋蔓懼甘瓠之見侵今則規模有制清濁不惑受天和而乃圓其象生土德而再黃其色不患大而拙用奚能繫而不食道無自滿我則虛受而持盈物有混成我則不宰而為德是知察清音而匪匏孰可含雅韻而匪匏不克矧國家大樂既備萬邦允懷惟異域欽和而內嚮君子勤禮而外諧至哉聽斯匏之音也可以知太平之階喻人守禮如竹有筠俾修己以自守同固本而相因操持彰於嵗暮勤德貴乎日新所以取彼後凋之色戒夫行道之人將以禦冬且見檀欒而守節比於藏器詎可須臾而去身若乃清霜翻元律改彼衆卉之具落同受氣於真宰何蓊茸而自異乃女便娟而有待茍常其性寒竹何患於時移不易其心志士當懷於道在豈不以和澤自潤表裏相質竹無筠不能固其節人舍禮曷以法於時伊先哲之善喻作後代之元龜企於禮者勤而行之苞本之時巳包周身之防疏莖之勢更叶凌雲之期當其冒霰停霜雪披風靡諒青青而斯在何冉冉而居彼是知禮之於己如我有徒筠之於竹如我有膚理無特立義必相須堅剛自持雖貫四時而莫改賞玩不足奚可一日而或無嗟乎皮之不存何以具其體心之不固何以謹其禮所以大戴之記足徵相鼠之詩爰啓君子之道斯其象諸示外以固執中而虛閲寒暑之不變齊榮辱之所如天損不侵地利空積包緑籜而未改交翠葉而不易君子察於此者可學禮而受益君子制服兮損益以時秉衣錦之特麗必尚褧以相資欲曳婁以成飾故威儀而可持異彼佩環有以文為貴者同夫絺綌必特表而出之察其所以亦將有旨願無伐善俾其蘊美衛詩既作且賦於碩人之篇匪服是加則嗤乎彼其之子異狐裘而羔袖比緑衣而黃裏蒙纖縞而不隔籠渥彩之可擬倣佛兮若豹姿之藏霧隱映兮似珠光之透水徒有美於爛然孰可詳其蔚矣故服之無斁終然允臧當斐然而入用懼學製以見傷知我者謂我隱蔽文章不知我者謂我顛倒衣裳曾不念順則之理的然而亡自類韜光不耀孰云欲蓋而彰比乎繪事後素勿矜為寶不有外者何以混其色不有內者何以蓄其藻雅符含章之德不愆盡飾之道服既美矣人亦宜然等誠明之道合同出處之義全亦由潔矩之士窮而不濫蘊貞明體恬淡昔有喻於讒口何以自明今不衣而夜行寧惟逮暗是知大象既分先質後文德為道用靜為躁君不衒昭質退藏於密匪同厖服之奇自契黃中之吉彼無褐空念於卒嵗此成章不俟兮終日未若賦衣錦之褧衣為終身之自律皎兮月出毖彼泉流月燭清夜泉澄素秋其象也合之雙美其氣也同以相求觀夫彼濬者泉彼高者月臨四海而照無私利萬物而功不伐故能流而不竭明而不歇清見底而練色寒凝暉盈輪而桂華秋發則知水者秋之氣月者陰之精月下泉湧泉中月生其始愈出其少徐清度晦明兮共隱共見歷今古兮齊虧齊盈皎皎兮不易其色泠泠兮不改其聲足以洗潁川之耳濯滄浪之纓者歟至若寒露白秋天晴金風始扇銀河未傾卷纖雲而九霄可覩掃薄霧而萬里克明於是泉悠悠以東注月遲遲而西行彼月伊何明之大者彼泉伊何清之至也泉凝釋於春冬月行藏於晝夜既處卑以習坎亦居高而臨下攬不盈也則照之而有餘流無窮焉如逝者之不舍故德莫明匪月莫清匪泉月經天而燭地泉帶地而澄天素波洞出清影孤懸氣涵浪於一色輪照底而雙圓圓如日麗淨若霜凝寶鏡出匣玉壺開冰搖清吹而灔灔淡碧空而澄澄度淺沙則清影遲漫潄幽石則光波沸騰又可樂而瓢飲枕以曲肱者也客有續為泉月之歌歌曰月照泉兮泉涵月泉潺潺兮月皎潔波無魚兮清澄月有蟾兮澄徹觀碎璧於漣漪認明珠於圓折信上善之可方而智者之所悅經使大廈者實先榱棟利涉巨川者必具舟楫在憲宗時淮夷阻命歷選將帥大興師戎始以忠武軍節度使李公首應注意之選終成弭寇之效策勳行賞公實居多故幅員千里盡成內地男女萬戶不為匪人任土之貢嵗入王府誰其致之知所自矣公諱光顏字光遠生於將門早奉成訓忠孝兩大文武全才負劍既成耽書不倦爰自裨將則有盛名早與其兄靈武節度使光進其初同在戎府司徒馬公鎮理河東置之戲下嘗所器異默而志之因間謂公曰爾有氣量終當光大但吾不得見其時耳授以所執劍仗亦呂虔佩刀之義也其後手挈偏師以合㣥帥討楊惠琳於夏臺破劉闢於西蜀由是雄名赫赫冠耀諸軍矣其在許昌也則慎固封略繕完兵甲居安不敢忘戰臨敵未嘗惰農是以農戰交務偶俱無闕有若曹公師次學校是修祭遵軍中俎豆不廢得非刃有餘地才可兼人者乎鄆人不恭命公討叛遂有義成之拜公以所統者許師所處者東郡疏陳利害遂復其舊焉連下諸城而齊寇殲殄旋師未幾移鎮邠土塞邊隟而遏戎隧也會穆宗踐祚寵綏勳賢以本官同中書門下平章事復遷岐下寄重股肱幽鎮挻災輔車為用詢於㣥議非公莫能促詔不俟駕而至再總中武之師兼下博行營節度使浚郊逐帥李㝏背叛朝廷震怒俾公問罪朝受命而暮即戎叛者率其精鋭而來未及成列公乘勢擊敗如火燎原衆授首惡遂納其師進檢校司徒兼侍中策元勳而厲列鎮也其後秉圭入覲請代歸朝上以許人佇望勉諭再三俾公旋止衆庶相賀復歷半紀績用大就司徒為真依前同平章事上以太原公之故里晝錦而往拜河東節度使北都留守太原尹公發跡并部人皆懷之及公之來如渴者得飲寒者挾纊吏不按而姦自息軍不刑而令無犯無小無大各附所安則公之才之量曷可涯也於戲邦國將瘁陰陽遘災享年六十有五寶歷二年九月三日薨於位并人罷市天子撤懸廢朝三日悼宗臣也冊贈太尉葬於太原縣東孝敬原夫人隴西縣太君阿史那氏祔焉禮也嗣子昌元檢校戶部尚書兼御史大夫上柱國次子扶元守左龍武軍大將軍知軍事兼御史中丞次繼元前行太常寺主簿次誠元守朔州司馬兼監察御史次建元國子祭酒兼殿中侍御史次興元前守衢王友兼監察御史次榮元左散騎常侍兼御史大夫次奉元清源縣丞次播元前河東節度使兼監察御史次安元右軍先鋒兵馬使守古驍衛將軍程忝公深知備熟休烈豐碑見託安敢讓辭其辭曰四時運行嵗功聿成㣥雄經營王度乃貞於赫太尉五世間生周之方召漢之韓彭智叶蓍蔡心為權衡揚之不濁澄之益清孝乎其親友於其兄六踐台席八擁戎旌隱若敵國屹如長城蒼生瞻戴天子倚愛發跡并部知名當代危自我安否自我泰罕山蒼蒼汾水湯湯兵符相印佩握還鄉內持吏化外靖戎疆俗既富庶人方樂康神理冥冥天道茫茫不臻期頤孰謂延長泉扃一掩千載傳芳
