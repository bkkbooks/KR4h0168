front:
  text: 全唐文欽定全唐文卷六百三十二程字表臣襄邑恭王神符五世孫貞元十二年進士又登宏詞科元和中纍拜吏部侍郎敬宗立以本官同平章事尋加中書侍郎封彭原郡公罷為河東節度使開成初拜右僕射二年出為山南東道節度使卒年七十七贈太保諡曰繆
  hash: sha256:c421d75bacfea63ee6b573d5322eb8c1e522a1aeed55837e53ffa044981787ab
  markers:
