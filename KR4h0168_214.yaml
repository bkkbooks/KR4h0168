front:
  text: 全唐文欽定全唐文卷二百十四陳子昂六
  hash: sha256:d6de4f9ffb38c02f152f638864d5029bb466342ae481c958e8c85cf3f8453e1b
body:
  text: 月日清邊道大總管建安郡王攸宜致書於遼東州高都督蕃府賢甥某至仰知破逆賊孫萬斬十有餘陳并生獲夷賊一千人三軍慶快萬里同歡都督體英偉之才抱忠義之節遂能身先士卒為國討讎以數百之兵當二萬之寇指麾電掃逆黨雲銷非都督智勇過人威名遠振誰能以少擊衆陷醜摧凶使國家無東顧之憂是都督之力也賢甥俊酷似其舅遂能與某等應機破敵效節立功此已各賞金帶緋袍薄答誠效更自録奏擬加榮官願都督遠知此意也今賊飢餓災舋日滋天降其殃盡滅已死人厭其禍萬斬方誅營州士人及城傍子弟近送密款準待官軍某令將蕃漢精兵四十萬衆剋取某月日百道齊驅分五萬蕃漢精兵令中郎將薛訥取海路東入舟楫已具來月亦發請都督勵兵秣馬以待此期共登丸山看殄凶虜書勛竹帛開國傳家是都督建功之日也中間剋期同會當更別使知聞正屬有軍事未能委曲初春向暖願動靜勝常所是都督官屬及大首領并左右立功人等並申此問相見在近豫以慰懷使至所傳斬首及生擒獲馬等具如來狀仰以欣快三軍共之狡寇逋誅此來擒馘師徒企踵爭望先鋒尚書遠略英謀臨機果斷潛制凶醜梟首伏辜在此諸軍實增募勇既壯尚書之節又美先登之功幽州士人尤以慶快破竹之勢自此為階某方擐甲負戈為尚書後列登高臨陳坐觀俘虜此期在即豫以慰懷初春猶寒願保休勝裨將已下各慰問之云云使至辱書仰知都督率兵馬摧破凶虜遠聞慶快實慰永懷非公等忠勇兼資統率多算同心戮力殉節忘軀以剋翦逋凶揚國威武在此將士聞公等殊戰賊不當鋒莫不西望憤勇欽羡獨剋甚善甚善即日契丹逆醜天降其災盡病水腫命在旦夕營州飢餓人不聊生唯待官軍即擬歸順某此訓勵兵馬襲擊有期六軍長驅此月將發恨不得與諸公等共觀諸將斬馘獻俘旦夕嚴寒願各休勝契丹破了便望回兵平殄默啜與公等相見有日預以慰懷臨使匆匆書不盡意日月清邊道行軍大總管建安郡王攸宜致書安東諸州刺史并諸將部校官屬等初春猶寒公等久統兵馬勤國扞邊不至勞弊也某如常比賊中頻有人出來異口同詞皆云逆賊李盡滅已死營州飢餓人不聊生諸蕃首領百姓等唯望官軍即擬歸順前後繼至非止一人某先使人向營州昨回具得父老密狀云賊勢窮蹙去正月上旬有妖星落孫萬斬營中其聲如雷賊黨離心各以猜二天殃如此人事又然平殄凶渠正在今日大軍即以二月上旬六道並入指期剋翦同立大勛請公等訓勵兵馬共為掎角開國封侯其機在此幸各勉力以圖厥功尋當更使人續往先此不具使至辱書知初出黃龍即擒白鼠凶賊滅兆事乃先徵凡百士衆莫不喜躍鼠者坎精穿竊為盜夜遊晝伏乃是其常今白日投軀素質委命賊降之象理必無疑近再有賊中信來親離衆潰期在旦夕尚書宜訓兵勵士秣馬嚴威因此凶亂之機乘其敗亡之勢事同破竹無待翦茅坐聽凱歌豫用欣慰命之不來也聖人猶無可奈何況於賢者哉僕嘗竊不自量謂以為得失在人欲揭聞見抗衡當代之士不知事有大謬異於此望者乃令人慚愧悔赧不自知大笑顛蹶怪其所以者爾虛已足下何可言邪夫道之將行也命也道之將廢也命也子昂其如命何雄筆雄筆棄爾歸吾東山無汨我思無亂我心從此遁矣屬病不得面談書以述言子昂白某啓某聞子以母貴自古通方禮以親榮在昔恆理豈非奉上之道休泰必同膝下之恩親愛先及伏惟尊舅寵居密戚位列崇班實富貴於當今允尊榮於前代居得言之地據至要之途九族同欣皆憑於奬眄六親咸賴仰沐於恩波莫不拂拭其羽儀增長其光價某自末器忝在甥徒早蒙撫育之恩不殊骨肉之愛自痛無福家禍遂纏爰在孤遺載延慈眷愛同諸子禮越常流遂得教訓成人策名從宦舅又曲垂顧念恩甚庭闈渭陽之情實多荷戴猥以庸薄叨纍周行自委質戎班昭名果毅經今一十三歲矣而竟未一遷仰望儕流莫不皆居顯位旋觀時輩亦以再歷榮班獨某一人空嗟留滯雖命途乖舛良或甘心然親貴盈朝豈忘提奬所以仰瞻恩惠不棄於疏微冀降慈流有憐於孤賤伏願舅大宏收採之眷特垂咳唾之恩矜憫小子使得宦及朋友寵以親榮私門載昌幽冥是賴豈不幸甚豈不幸甚無任企仰之至謹奉啓不宣某再拜某啓一昨恭承顯命垂索拙文祗奉恩榮心魂若厲幸甚幸甚某聞鴻鍾在聽不足論擊缶之音太牢斯烹安可薦羹藜之味然則文章薄伎固棄於高賢刀筆小能不容於先達豈非大人君子以為道德之薄哉某實鄙能未窺作者斐然狂雖有勞人之歌悵爾詠懷曾無阮藉之思徒恨迹荒淫麗名陷俳優長為童子之㣥無望壯夫之列豈圖曲蒙榮奬躬奉德音以小人之淺才承令君之嘉惠豈不幸甚豈不幸甚伏惟君侯星雲誕一作挺秀金玉間成衣冠禮樂範儀朝野致明君於堯舜皇極允諧當重寄於阿衡中階協泰非夫聰明博達體變知機如其仁如其仁方當拔俊賞竒使拾遺補闕坐開黃閣高視赤松然後與稷契夔龍比功並德豈徒蕭曹魏丙屑屑區區而已哉某實細人過蒙知遇顧循微薄何敢祗承謹當畢力竭誠策駑磨鈍期效忠以報德奉知己以周旋文章小能何足觀者不任感荷之至昔者漢朝卿士供帳餞於東都晉國名賢傾城祖於西郊雖時稱盛觀而人非帝族東平紫微英胄朱邸天人蘊岐嶷之王褱姿得山河之寶氣劉君愛士常致禮於幽人曹植論文每交歡於數子屬鑾輿拜日來朝太室之前玉檢停刊言返章華之路㣥公以眷深王粲思邀祖道之歡下走以遇重荀慈謬奉芳筵之醴於時青陽二月黃鳥㣥飛殘霞將落日交暉遠樹與孤煙共色江山萬里眇然荊楚之塗城邑三春去矣伊瀍之地既而朱軒不駐緑蓋行遙琴樽之清宴巳疲珠玉之芳言未贈請各陳志以序離襟子昂少遊白屋未歷朱門聞王孫之遊空懷春草見公子之興每隔青霄弋陽公座辟青軒飾開朱邸金筵玉瑟相邀北里之歡明月琴樽即對西園之賞鄙人幽介酒醴知慚王子愛才文章見許白日巳馳歡娛難恃平生之樂其在茲乎夫貧賤之交而不可忘珠玉滿堂而不足貴閉門無事對黃卷以終年高論不疲逢故人而永夜薛大夫其人也下官昔承顏色早蒙車騎之知晚接恩光不異平津之舊蔡雍書史許以相資張載文章見稱於代爾其華堂別業秀木清泉去朝廷而不遙與江湖而自遠名流不雜既入芙蓉之池君子有鄰還得芝蘭之室披翠微而列坐左對青山俯盤石而開襟右臨澄水斟緑酒弄清絃索皓月而按歌追涼風而解帶談高趣逸體靜心間神眇眇而臨雲思飄飄而遇物林軒寂寞星漢縱橫思欲垂汗漫而㣥遊與真精而合契歡窮興洽樂往悲來悵鸞鶴之不存哀鷞鳩之久沒徘徊永歎慷慨長懷東方明而畢昴升北閣曙而天雲靜悲夫向之所得巳失於無何今之所遊復羈於有物詩言志也可得聞乎夫愛名山歌長往世有之矣放身霄嶺宴景雲林卑俗不可得而聞時士不可得而見則吾欲高視終古一笑昔人嵩山有二仙人自浮邱公王子晉上朝玉帝遺迹金壇鳳簫悠悠千載無響吾每以是臨霞永慨撫膺歎息常謂煙駕不逢羽人長往去囂世走青雲登玉女之峰窺石人之廟見司馬子微馮太和霓裳眇然冥壑獨立真朋羽會金漿玉液則有楊仙翁一作公元默洞天賈上士幽棲牝谷玉笙吟鳳瑤衣駐鶴方且迷軒轅之駕期汗漫之遊吾亦何人躬接茲賞實欲執青節從白霓陪飲崑崙之庭觀化元元之府宿心遂矣冥骨甘焉豈知瓊都命淺金格道微攀倒景而迷途顧中峯而失路塵縈俗纍復汨吾和仙人真侶永幽靈契翳青芝而延佇遙會何期結丹桂而徘徊遠心空絶紫煙去黃庭極仰寥廓而無光視寰區而寡色悠悠何往白頭名利之交咄咄誰嗟元運盛衰之感始知楊朱歧路墨翟素絲尚平辭家而不歸鮑焦抱木而枯死可以慟可以悲古人之心吾今得之也嗟夫德則有鄰才不必貴昔有耕於巖石而名動京師詞感帝王乃位卑武騎夫豈不遭昌運哉蓋時命不齊竒偶有數當用賢之世賈誼竄於長沙居好文之朝崔駰放於遼海況大聖提象㣥臣守規杜司戶炳靈翰林研幾策府有重名於天下而獨秀於朝端徐陳應劉不得劘其壘何王沈謝適足靡其旗而載筆下寮三十餘載秉不羈之操物莫同塵含一作合絶唱之音人皆寡和㣥公愛禰衡之俊留在京師天子以桓談之非謫居外郡蒼龍閹茂扁舟入吳告別千秋之亭回棹五湖之曲朝廷相送駐旌蓋於城隅之子孤遊森風帆於天際白雲自出蒼梧漸遠帝臺半隱坐隔丹霄巴山一望魂斷緑木於是邀白日藉青蘋追瀟湘之遊寄洞庭之樂吳歈楚舞右琴左壺將以緩燕客之心慰越人之思杜君乃挾琴起舞抗首高歌哀皓首而未遇恐青春之蹉跎且欲攜幽蘭結芳桂飲石泉以節味咏商山以卒歲返耕餌术吾將老焉㣥公嘉之賦詩以贈凡四十五人具題爵里下官遊京國久矣接軒裳衆矣池臺鐘鼓雖有會於終朝琴酒管絃未窮歡於永夕豈非殊我親愛異我風謠而使臨堂有懷聞樂增歎者也何功曹舊州耆老迹尚於沈冥李録事吾土賢豪義多於遊俠高軒置酒甲第迎賓絲竹紛於綺窗琅玕盛於雕俎樓臺若畫臨故國之城池軒蓋如雲總名都之車馬於是乘興自此而遊安得不放意留歡遺老忘死金壺漏晚銀燭花微北林之煙月無光南浦之星河向曙赤車使者下官雖謝於古人錦里名家㣥公豈慙於昔彥我之懷矣實在於斯同賦一言俱為四韻日月交分春秋代謝昔歲居單閼適言別於茲都今龍集昭陽復相逢於此地山川未改容貌俱非敘名宦而猶嗟問鄉關而不樂雲天遂解琴酒還開新交與舊識俱歡林壑共煙霞對賞江亭回瞰羅新樹於階基山榭遙臨列㣥峰於戶牖爾其丹藤緑篠俯映長筵翠渚洪瀾交流合座神融興洽望真情高覺清溪之仙洞不遙見蒼海之神山乍出既而行舟有限嗟此會之難留別日無期歎分岐之易遠徘徊北渚惆悵南津江陵之道路方賒巴徼之雲山漸異嗟乎離言可贈所願保於千金別曲何謠各請陳於五際永淳二年四月孟夏東海齊子宦於此州雖黃綬位輕而青雲器重故能委邦君而坐嘯屈刺史而知名屬乎鑾駕巡方諸侯納貢將欲對揚天子命我行人執玉帛而當朝擁騑驂而戒道指途河渭發引岷嵎粵以丙丁之日次於暉公別舍蓋言離也爾其巖泉列坐竹樹交筵吐青藹於軒窗棲白雲於左右參差池榭亂山水之清陰繚繞階庭雜峰崖之異勢入禪林而避暑肅風景於中林開水殿而追涼徹氛埃於戶外瑤琴合奏翠斚時行談窈窕於天人極留連於晷刻既而歡樂極良辰征攀白日而不回唱浮雲而告別山光黯黯凝緑樹之將曛嵐氣沈沈結蒼雲而遂晚雖同交未阻風月可留岐路方乖關山成恨嗟乎朝廷子入期富貴於崇朝林嶺吾棲學神仙而未畢青霞路絶朱紱途遙言此會之何時願相逢而誰代永懷千古豈知仁者之交凡我三人盍崇不朽之迹斯文未喪題之此山同疏六韻云爾蓋北夷不羈之日久矣天子垂元默穆皇風而狼居革心蟻伏請職歲一月上將恤戎乃以金章假麴公為司賓卿載馳錦車諭意雲幕且欲頓單于之膝受呼韓之朝不踰青春復命紫闕其忠臣烈夫之節感激壯矣朝廷以赴此絶國追送近郊登熊山望燕塞黃雲千里亭臯悠然僉曰賦詩絶句以贈豫疲爾永久未嘗解顏正欲登高山望遠壑揮斥幽痗以劘太清薑主簿倏自帛丿糸中至於林下乃飾琴酒之事雜文章之娛將蠲我憂穨靡取樂夫浩浩之白不可獨也青春之詩又誰咎也逢太平之化寄當年之歡同人在焉而我何歎南國橘柚陽月初榮北梁山水良辰復別揮手何贈詩以永言云爾夫歲月易得古人疾沒代不稱功業未成君子以自強不息豈非懷其寶思其用然後以取海內之名以定當年之策展其才力受以驅馳少府叔鳳彩龍章才高位下班超遠慕每言關塞之勳梁竦長懷恥為州縣之職屬胡兵犯塞漢將臨邊商君用耕戰之謀充國起屯田之策皇華出使言收疆埸之功白水開筵遂為雲雨之別爾其蒼龍解角朱鳥司辰溽景薰一作蒸天炎光折地山川漸遠行人動遊子之歌樽酒未空送客起貧交之贈嗟乎楊朱所以泣岐路蘇武所以悲絶國古之來矣盍各言志以敘離歌神功元年龍集丁酉我有周金革道息寶鼎功成朝廷大寧天下無事皇帝受紫陽之道延訪玉京㣥臣從白雲之遊載馳瑤水笙歌入至元鶴飛來時余以銀青光祿大夫忝在中侍擁青旄之節陪翠鸞之旗昔奉車子侯獨隨武帝昌明為御每侍軒遊比之今日未足多幸是時屢從嚴祀遙謁祕封嘗覩衆靈如雲㣥仙蔽日乃仰感王子晉俯接浮邱公行吹洞簫坐弄雲鳳竊欲邀羽袂導鸞輿求不死於金庭保長生於玉册上以尊聖壽下以息微躬因登緱山望少室尋古靈迹擬刻真容得王子晉之遺墟在永水之層曲且欲開石室營壽宮庀徒方興畚鍤攸作乃得古藏焉其藏上無封壝內有甓瓦南北長二丈二尺東西濶八尺中有古劍一長尺餘銅碗一并瓦器二其器文彩怪異非蟲篆雕斫所能擬也又有古五銖錢朱漆片數十枚初開時文彩可見及棖撥之應手灰滅既無年代銘志不知爵里官族參驗其事已曾為人所開於是撫之永懷念昔增密始知有形必弊涉器則毀鍾鼎玉帛非度世之資名位寵章為纍真之府未能獨立物表超世長存與日月齊光天地比壽非天道乎君窅窅冥冥久幽珍藏逮此昭發豈不欲感示元契竒暢靈期昔王喬古墳惟留一劍令威荒冢又歎千年起豫道心在乎此仰惟聖主仁慈恩被草木陽和掩骼既昭國典至德埋胔又在周令今此藏虧露誠感仁惻謹歷吉日協良辰即以其年十月甲子朔具物備容還定舊壙豚雞在奠犧樽若歆哀其銘志磨滅姓位不顯乃錫之名曰窅冥君其銘曰銘入薛稷諸總管部將旗長隊正各聽命夫聖人用兵以伐有罪姦慝竊命戎夷不龔則必肆諸市朝大戮原野我皇周子育萬國寵綏百蠻遐荒戎狄莫不率職聚兵帥衆非欲勞人蓋逆不可縱亂不可長所以屈己推轂垂涕泣辜誠恐蒼生顛墜塗炭今契丹凶羯敢亂天常為封豕長蛇薦食上國玉帛皮幣廾而不貢名器正朔僭而有謀乃將紿神虐人暴殄天物故皇帝命我肅將王誅今大師已集方將問罪公等諸將及士卒已上須各嚴職事肅恭天命契丹凶賊本為中國奴隸昏狂不道勞我師徒今與公等及士卒久勤干戈冒犯霜露夫四郊多壘士大夫之恥蕞爾凶狡一鈕可屠況皇帝義兵剋期誅翦此猶太山壓卵鴻毛在爐今日之伐須如雷霆之震虎豹之擊搴旗斬馘掃孽除凶上以攄至尊之憤下以息邊人之患鼓以作氣旗以應機公等各宜戮力務當其任若能奮不顧命陷堅摧鋒金紫玉帛國有重賞若進退留顧向背失機斧鉞嚴誅軍有大戮各宜勉勵無犯典刑事父盡孝敬事君端忠貞兄弟敦和睦朋友篤信誠從官重恭慎立身貴廉明待士慕謙讓蒞民尚寬平理訟惟正直察獄必審情謗議不足怨寵辱詎須驚處滿常憚盈居高本慮傾詩禮固可學鄭衛不足聽幸能修實操何俟釣虛聲白圭玷可滅黃金諾不輕秦穆飲盜馬楚客報絶纓言行既無擇存歿自揚名龍集丙戌有唐制胸奴五十六載蓋署其君長以郡縣畜之荒服賴寧古所莫記是歲也金微州都督僕固始桀驁惑亂其人天子命左豹韜衛將軍劉敬周發河西騎士自居延海入以討之特敕左補闕喬知之攝侍御史護其軍事夏五月師舍於同城方絶大漠以臨浣海君子曰兵者凶器仁者惡之醜虜猖狂厥自招咎今至尊不得已而順伐嘗聞西方之聖有能仁者凶吉之業各報以直則使元惡授首㣥氓不孤兵無血刃荒戎砥定豈不在於大雄乎諸將部校僉曰允哉將軍乃飭躬率士卒因古祠廟圖畫形容有古之彌勒像也天人備容丹青畢彩蓋以昭乎景福也乃作銘曰耀天兵兮征荒服絶雲漠兮出元極白羽旆兮青雲旗簫鼓鳴兮士馬悲願左右兮浮屠道備丹青兮妙天寶功既畢兮業既成神之來兮福冥冥君諱越字復圭宏農仙掌人也其先帝高辛氏之裔周有天下晉授其封至宣公伯喬早基楊國若乃彤弓旅矢巨鬯赤茀則禮命之樂歌之崇天王之寵光保元侯之休祉其後十六代有楊寶者天錫黃鳥授以白環若曰命君子孫世登三事逮震秉彪賜四代五公烈光昭於漢室盛德充於海內金圭銘鼎至今為宏農世家也高祖椿魏尚書右僕射開府儀同三司司徒公進位太保加侍中給後部鼓吹致仕歸邑賜安車駟馬傳制二人可謂國之元老帝之師臣功成名遂社稷之寶曾祖思善齊通直散騎常侍贈中書侍郎祖敬通鎮遠將軍鄭州治中邛州別駕父君同隨蒲州芮城縣令皆國書舊史烈乎名節公即芮城府君之第二子也少而沖嶷苦節真素禮非玉帛室有琴書聞少連之風而悅之庶乎身中權行中清上以察乎道下以敦乎物不應州郡之命而有金玉之心嘗歎曰以明月珠彈千仞雀吾不能也於是觀寶龜之象心滅朵頤探金虎之爻志存幽履遂去家遁於嵩山經十餘年丹山白雲之志眇然矣屬太宗文武聖皇帝初臨天下物色幽人焚山榜道網羅遺逸君子若曰天下有道可以見矣於是始以角巾應命褐衣詣闕陳大道之宏謨論至言之閫奧帝曰俞爾言乃可砥行若歲大旱用汝作霖雨今南山近塞北漠連胡石州邊烽皇化未謐汝往欽哉輯乃人禦乃敵以息胸奴之患始解褐授石州方山縣令樽俎在堂干旄在階布大信於獯戎示折衝於袵席威名震曜乃升聞也有敕徵授憲臺監察御史繡衣始拜珥筆升朝臺閣以之生風豪貴由其斂手又敕直中書待制未幾又遷祕書郎直中書省如故遊鳳凰之池觀蓬萊之府是天下之榮踐也又轉宗正寺丞居歲餘帝思南史之才將崇東觀之美又遷起居郎加騎都尉龍朔中天子將觀兵於東夷以復先帝之業凡居中者多出守旁郡是歲授公朝散大夫除冀州司馬又轉魏州司馬皆知州事於時天下雌韓而雄魏壯武而柔文公始厭承明初臨外郡探丸堊面犯禁崇姦欲嘗朱博之能以觀龔遂之政公深鈎潛往英機立斷短服赭裾於是乎理麟德初兼梓州長史蓋在華之南區彭之北鄙人豪俗侈政削公朘攢六國之遺氓雜三巴之奧壤公下車問俗觀風立政先之禮讓教以詩書抑浮窳禁蟊食至於堂叩鐘磬家擅山川莫不為之節制行其典禮來暮之頌復起於斯時高宗大帝方接千載之統升中太山玉帛雲趨朝者萬國公預陪金蹕侍拜瑤壇白雲既封皇慶斯洽加朝散一作議大夫餘官如故東山拜命西駕未歸逢太歲之臨辰感殷楹之夢奠遇疾薨於官舍時年六十四嗚呼哀哉遺令薄葬不藏珠玉唯孝經一卷堯典一篇昭示後嗣不忘聖道即以某年月日葬於西嶽習仙鄉登仙里之西麓遵遺命也嗣子嘉賓等哀號泣血柴骨欒心緬惟罔極之恩思崇永錫之道以為吾邱子疑一作于沒無助冥因季由之歎空勤負米於是考㣥聖之典探衆妙之門求所以昭報幽扃贊祉冥籍則云金仙慈救寶手來迎若德崇於此則功濟於彼是用歸誠真諦祈祐能仁箝鐵圍而寫容現金蓮而得像遂於登仙麓塋之側造阿彌陀像一軀坐高三丈并象變菩薩天人畢備全金湧出衆寶裝嚴雲仙鬼神周羅上界珠幡羽蓋圍繞中天所以丕顯尊靈光昭惠業達人之能事畢矣孝子之事親終矣銘曰巖巖大嶽浼浼長河歊雲滃霧含靈佇和楊侯之國宛其中阿子孫瓞軒蓋駢羅四代五公自于伯起蟬聯彪懿令聞不已二千戶侯三十刺史世濟其榮至我君子峩峩君子皎有令光不寵我組而括其囊洗心巖遁抗迹雲翔冥鴻不遠白駒在場解其蘿袂綰我墨職邊朔多虞獫狁孔棘之子之往允威允德干旄在階烽火罷色行行駿馬繡衣之光烈烈董狐司史之良而我君子總其徽章出同嚴助政穆王祥雄魏既康郪蜀猶侈攬轡言邁題輿載理尺兵允戢亂繩攸靡天子登封拜服玉趾大禮既畢歸路遲遲歲亦秋止天不憖遺嗚呼氓吏號泣漣洏曷其往矣來暮歌思煢煢孤子棘心哀疚永號昊天眇泣冥祐蓮花之國金池玉霤崇此香緣生彼穠秀全金既湧衆寶斯莊考墳其左叔塋其旁香花圍繞松柏成行千秋萬歲祚祉無疆
