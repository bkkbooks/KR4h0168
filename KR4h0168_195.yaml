front:
  text: 全唐文欽定全唐文卷一百九十五楊炯六
  hash: sha256:077d7acaafcd0c61186c900695895e22028e280abc07f62d681619aa9542843c
body:
  text: 蓋聞君為元首臣作股肱或論道三槐或折衝千里至有道存俎豆藝總干戈高視翰墨之英獨布爪牙之旅究青編於學府業有多聞受黃石之兵符算無遺策故得九功咸敘七德攸彰文武不墜公實兼美公諱待賓安定臨涇人也竦以英才遠邁知州縣之徒勞鴻以抗節遐征覽帝京而有作由是五噫標興播金石而騰徽七貴承榮綰銀黃而謺茂貞規盛烈映史凝圖粗紀詠歌無俟詳確高祖禦後魏駙馬都尉侍中少保金紫光祿大夫揚州總管贈太尉諡昭公食邑三千戶銀榜增輝玉壺流渥位隆三少化洽五胥既而幽壠埋魂終降槐庭之贈高門納駟式居茅社之封曾祖睿宇文周駙馬都尉鄜秦二州總管光祿大夫兵部尚書隋益州總管蔣國公贈司空食邑三千戶白水時清乳虎之謠行息祿符垂翼叩馬之諫必申加以主西序之㣥英名高八座導文翁之遺訓學富三巴茂先榮級忽光泉壤漢祖寵章永存帶礪祖演隋沙州刺史上柱國公踐仲寧之餘躅姦邪斂手簽孝仁之遠蹤㣥胡革面連州跨郡邁陶氏之隆基開國承家掩張門之纍葉父贊隋左千牛備身驪山府上騎柱國皇朝豐王府咨議雲州司馬冀州長史蔣國公襲良弓於簪笏榮侍紫宮翼雕戟於巖廊肅趨丹地西園坐宴侶明月而飛文北土行康望浮雲而展足公漸潤膏腴發靈川嶽七年可識抱梓而呈才千里見知負騏驥而騁駿靈臺遠鑒與霜月而齊明智府宏深共煙波而等曠踐仁義於區域白璧巳輕許然諾於樞機黃金豈重因心孝友宜於自然率志謙沖得乎所性不脂韋而求達不詭計而自媒被玉軸之文章三冬遽足窮金壇之祕訣百戰不孤譽滿寰中聲蓋天下而學優將仕允屬名家欲升鴻漸之姿終佇鶴鳴之聞以皇朝麟德二年補左親衛從資例也屬金甲出戰玉帳論兵從命文昌問罪遼碣公提戈赴海投筆從燕智者有謀仁者必勇孤鋒直進九種於是克清匹馬橫行三韓由其殄滅疇庸賞最我有力焉俯洽恩波泛承勳級即授上柱國公深慚位薄命舛數奇雖霑勒石之勳未展披堅之效嗟乎揚子雲之才藻空疲執戟馬相如之文詞猶勞武騎今古同貫夫復何言既而從牒隨班牽絲祇務起家拜朝議郎永淳元年正月三十日授伊州伊吾縣丞非所好也路指金河途連玉塞塵沙共起烽火相驚秋草將腓胡笳動吹寒膠欲折虜騎騰雲公佐佑多方掌司攸寄服叛懷遠擒姦擲伏於是寇騎不敢窺邊歌頌因滋溢境曾未期月政令大行特簡帝心超居不次永淳二年二月四日制授昭節校尉守右衛蒲州府佐果毅仍令長上兼上陽洛城等門供奉公洞曉戎章妙詳兵律軍國是賴戎幕允歸由是徼道長巡嚴扃每奉朝求夕警不怠於風霜善牧能防更申於間皂其年十月七日奉敕命於大內祥麟廏檢校馬公識高東野職參西極勵銜策則追風逐日加剪拂則絶電奔星駃騠將駙騄齊衡驥騮共騊駼伏櫪於是龍媒間出麟友挺生伯樂多謝於精微日磾有慚於秣養恩制褒奬又加崇秩文明元年二月二十日遷遊擊將軍仍依舊長上大周革命兩儀開闢爰覃作解之恩式暢惟新之典勤勞夙著休望允歸拜職遷榮實符僉議天授元年九月十六日加威武將軍守左玉鈐衛翊善府折衝都尉依舊長上封安定縣開國男食邑三百戶公祇奉王庭職司兵衛八屯由其增峻五校於是克宣翼翼兢心積劬勞於歲月勤勤忠志懷局蹐於序時憂能傷人竟成沈疾以長壽二年正月六日終於神都旌善里私第春秋五十惟公弱不好弄卓爾不㣥九歲明詩七齡通易月初能對即謝黃童日下相酬還慚夫子經耳不忘歷口不遺性沈深有器度能倜儻無拓落尤重交友雅愛林泉月幌風襟每吟謠於箋綵花新葉早必賞會於琴樽加以啼猿落鴈之奇鸞驚鳳翥之妙瀉水懸河之辨背碑覆局之精標映前哲公實多敏至孝過人雍和絶俗事父母則造次不違友兄弟則溫柔必盡既風樹興感霜露躔悲聿修之德惟新欲報之恩罔極虔誠大象宏誓小乘廣樹慈仁庶憑因果月抽官俸日減私財並入薰修咸資檀施故得雕檀之妙俯對禪龕貝葉之文式盈梵宇粵以大周長壽二年歲次癸巳二月辛酉朔二十四日甲申遷窆於雍州藍田縣驪山原舊塋禮也葬事之屬一皆官給鼓吹儀仗送至墓所墳開白日終留恨於滕城禮被皇家忽霑榮於霍隧嗚乎哀哉嗣子左千牛去疑哀纏泣柏思結飱荼仰庭禮而不追覩楹書而增慕恐元穹倚杵碧海成桑敬勒堅貞乃為銘曰大哉嬴國遠矣少梁與秦同祖今則夏陽爰暨伯翳胙土惟良自茲厥後人物克昌逮乎漢朝令望不巳三世連輝七侯承祉或顯或晦有文有史舄奕圭璋芬芳蘭芷少保名揚司空道泰惟祖惟禰蟬聯軒蓋挺生令則在邦之最丱歲騰芳髫年超靄君號神童晚稱英傑佩仁服義既明且哲七步立成五行不輟家惟萬卷韋實三絶詞高許下學富淹中志惟謹潔心亦沖融溫淳植性朗潤在躬閨門禮洽朋友財通思若雲飛辨同河瀉兼該小説雍容大雅武檀孫吳文標董賈樹下啼猿封中試馬且文且武執戟登位海隅不賓命我偏帥既陪勒石還從飲至輔翊百里褒升佐二既總兵權入司宮掖徼道宵警禁門曉闢式重其駿載懷斯癖我馬既良我軍既雄折衝千里趨奉九重行承芝誥坐啓茅封恨深負米榮暨擊鐘爰持戒律思答慈容將福有徵謂仁必壽如何淑德遭此凶咎孺慕崩心惸嫠縮首夜泉扃閉天長地久古者皇帝軒轅氏沒帝嚳高辛氏作幼而徇齊長而敦敏則天下之人用其教者百年忠肅恭懿宣慈惠和則天下之人謂之才者八子赤烏流而白魚躍有周武之興王彤弓一而盧矢千有晉文之啓霸雖隱公遜位哀侯失國而文之昭也武之穆也司徒為五教之官有社稷焉有黎人焉丞相臨萬幾之職崤函鼎盛赫奕於朱輪河洛台階昭彰於白玉積善餘慶信而有徵國子進士楊去盈字流謙宏農華陰人也曾祖諱初周大將軍隋宗正卿常州刺史順陽公皇朝左光祿大夫華山郡開國公食邑本鄉二千五百戶唐虞之稷契魏晉之裴王晏嬰可以事百君臯陶為之謨九德麾蓋兵馬人知牧伯之尊名山大川地積公侯之氣王考諱安偽鄭王充遙授二十八將封鄫國公尋謀歸順為充所害皇朝贈大將軍旌忠烈也陶謙雅尚祖逖雄心會天子之蒙塵見諸侯之釋位雖陳平去就潛懷仗劒之謀而石勒凶殘遂及推牆之禍父某潤州句容遂州長江二縣令朝散大夫行鄧州司馬文武兼備清明在躬人無間言位不充量四方取則孔宣父之踐中都百里非才龎士元之登別駕若夫庭生玉樹身帶金鐶有衛玠之風神有張良之容貌蔣琬之譏盛允責在司空陳蕃之對薛勤志清天下觀其昏定晨省立身揚名怪草蔚其休徵神魚會其冥感莊公獨歎聞潁叔之純深有道相推見茅容之盡禮則閨門雍穆以孝聞也輔仁會友合志同方晏平仲之善交鮑叔牙之知我張堪死日妻子唯託於朱暉劉惔生平風月每思於元度則朋友之德若蘭芬也朱穆好學終日忘餐譙周研精欣然獨笑張華四海之內若指諸掌班固百家之言無不窮究鈎深致遠悅邱墳也八音繁會五色章明動天地而感鬼神序人倫而成孝敬陽臺並作楚襄王賜雲夢之田上林同時漢武帝給尚書之筆則瓊敷玉藻未足多也自攝齊東序撰杖西膠唯宰我之能言貴顏回之有德成如麟角道尊於璧水之前翼若鴻毛俯拾於金門之下方將咫尺宣室扈從明庭申賈誼之忠讜盡揚雄之規諫豫章七載擢修幹而聳長條有鳥三年搏積風而運滄海豈期數有迍否天無皂白苗而不秀秀而不實蓋有是夫古人有言沒而不朽者此之謂也春秋二十有六以上元三年五月二十二日歿於京師勝業里嗚乎哀哉至儀鳳四年十二月二日歸葬於華陰之某原不忘本也山河鬱鬱松柏蒼蒼骨肉閉兮歸后土魂魄遊兮思故鄉三荊搖落五都悲涼痛門戶之無主悼人琴之兩忘嗚乎哀哉銘曰高掌遠跖濁涇清渭天子諸侯司空太尉星辰鼓舞山澤通氣道在者尊德成為貴賈家三虎偉節最怒荀氏八龍慈明無雙劒光沖斗璧氣浮江據於道德聞於家邦子之承親溫席扇枕子之友悌同輿共寢朝歌不入盜泉不飲垂露崩雲繁紘縟錦明經太學射策鴻都揚名天子高揖司徒鱗翮將運波濤不虞子之喪也良可悲夫瞻望不及佇立以泣唯見黃埃心傷以摧躑躅兮徘徊嗚乎兮哀哉長夜漫漫何時旦魂兮魂兮歸去來處士宏農楊去溢年二十即華山公之曾孫大將軍之孫朝散大夫鄧州司馬之第四子也維嶽有五有華山之金石焉山阜相屬含溪懷谷所以鎮其南也維瀆有四有河宗之玉璧焉波瀾汨起洄洑萬里所以經其北也言其土地則巨靈之高掌遠跖作西漢之城池敘其衣冠則太尉之四代五公為東京之柱國然後積勳纍德枝分葉散大君有命臨夏日之壇場天子動容聽秋風之金鼓是以熊羆入兆羔鴈成㣥黃憲之名聞於海內陳蕃之志掃於天下㣥童忽聚逢苦李而懸知賓客相過問楊梅而即對善父母為孝善兄弟為友居家可移之道也利者義之和貞者事之幹元亨日新之德也若夫羽陵遺策汲冡殘書倚相之八索九邱張華之千門萬戶莫不山藏海納學無所遺至如白雪回光清風度曲崔亭伯真龍之氣揚子雲吐鳳之才莫不玉振金聲筆有餘力遠心天授高興生知盡江海之良圖得煙霞之祕算貞不絶俗從容於名教之場道由人宏坐臥於羲皇之代於時朝廷之上山林之下英儒贍聞之士洪筆麗藻之客希末光而影集聽餘聲而響和者猶藩籬之望天地鱗介之宗龜龍也嗟乎陰陽為道大道無亭毒之心禍福唯人聖人有抑揚之教智焉而斃仁焉而終今也則亡歎顏回之短命死而可作冀隨會之同歸文不在茲乎天之將喪也以某年某月某日終於某所越儀鳳四年十月二日歸葬於華陰之某原林野彌望關山寥廓樵童牧豎孟嘗君之池臺一去千年丁令威之城郭悲纏於魯衛痛深於花萼薑肱沒齒無因共被之歡鍾育生年無復同車之樂嗚乎哀哉銘曰叔虞建國天錫之唐伯僑受氏食采於楊五侯簪黻四代軒裳有德有行如圭如璋乃生男子初寢之牀從公小大辨日炎涼天下之寶邦家之光神鋒太峻旗鼓相當事親以禮左右無方交朋以信芝蘭有芳文犀健筆白鳳雕章鵬鷃齊致江湖兩忘謂天輔德則惟其常殲我吉士於何不傷關山搖落洲渚蒼茫黃塵匝地白露成霜左右刮骨親賓斷腸摧殘玉樹埋沒金鄉交交黃鳥爰集於桑命不可續人之云亡故右衛率府翊衛安定梁錡年二十有八以上元三年秋八月某日終於某所圖其景宿天有大梁之星辨其物土地有大梁之物考其衣冠人有大梁之姓綜乾坤而列位兼水木而成文業耕織而樂琴書有梁鴻之雅尚生封侯而死廟食有梁竦之雄圖西山求白鹿之仙東海受黃蛇之寶曾祖某光祿大夫開府儀同三司驃騎將軍清河太守右衛大將軍同州刺史上柱國郡守旁通於月建儀同上法於太階光祿大夫下大夫之職驃騎將軍大將軍之比祖其河南澠池令鄭州司功參軍事冀州蒲州二府司馬朝散大夫紀王府司馬襄州同州二長史仲由宰邑蕭何主吏桓溫之徵謝奕暫為司馬之官周景之禮陳蕃仍降題輿之命考某國子學生霍王府參軍並州大都督府兵曹揚州大都督府録事參軍仲尼間居曰參不敏天子命我參卿軍事張常山之福應直保金鈎謝太傅之閨門唯生玉樹所以圓光折水真氣衝天孩笑之時見之者知其孝友能言之際聽之者許其聰明審清河管輅之天文對江夏黃童之日蝕揮其徑翮則鳳凰飛鳴於赤山整其蘭筋則駿馬騰驤於緑地若夫龍神負卦瑞雀銜書安釐王汲冡之文穆天子羽陵之籍莫不因條報葉望表知裏鄭元殫見覽萬卷之八千班固洽聞涉五經之四部至如雕弧夜月筋角三材鐵劒秋霜煙雲五色莫不推之以智勇成之以揖讓歷諸侯而説劒直之無前引司馬而操弓觀者如堵可謂多才天縱盛德日新曼倩不讓於詩書翁歸兼強於文武由是交道遂廣聲名益振朱家大俠滕公有然諾之言劇孟過人袁盎有逢迎之禮及其從微至著資父事君藉丹書之勳業參黑衣之行伍神宮海外瞻鏤榜於明山太室雲端聽仙簧於洛水翊駕馳道周廬甲觀方當奉詞出使萬里行封受命忘身三軍拜將豈期年歲朝露浮生過隙漢逸人之雅操命也如何魯司寇之知言苖而不秀嗚乎哀哉望吾子者空懷倚閭之歎嗟豫弟者獨有亡琴之悲從日月於龜謀考圖書於馬鬣越以儀鳳三年春二月某日甲子葬於某所悲夫吾見其進由來孔李之家吾謂之甥實曰何劉之族陽元既歿瞻舊宅而無成康伯不存對元言而誰與銘曰山河帶礪金木精靈磊磊千丈森森五兵騑驂西掖出入東明人壽無幾皇天不平碑留郭泰挽送田橫終寂寥於相宅空嗟歎於佳城公諱嘉字大善隴西成紀人也趙郡太守雍州大中正上開府永康公之孫幽州都督鎮軍大將軍上柱國丹陽公之子重華以文明允塞謨九德於臯陶仲尼以恭儉溫良翻六經於柱史將軍李牧人主願其同時河尹李膺天下思其執御况乎衣冠代美祖考家聲占於日月為宗周之姬姓誓以山河則炎漢之劉氏公門承將相地積英靈望之儼然橫斷山而鬱起聽其言也注懸河而不竭玉則秦王所見天照白虹劒則殷帝所傳星浮紫氣假使蔡中郎之博學郭有道之人倫何嘗不迎王粲而倒屣為茅容而下拜起家為太子左千衛以調升也按河圖於玉版震一索而為長男考天象於銅渾心前星而為太子直城霞繞曲障雲平出入青榜之門周旋黑衣之列稍遷越王府戶曹參軍越之建國也地居南斗之躔王之受封也禮極東門之拜郕霍所以隆懿親共和所以資明德一言而干楚后即從雲夢之畋三見而説趙王仍襲上卿之印又遷隰州令川原爽塏風俗和平晉獻公之嗣夷吾是邑代恭王之子郢容為侯陽泉依六壁之城孟津合三溪之水公以輜車就列墨綬當官有蠶績於郕人用牛刀於魯邑市鄽無競不假鞭絲學校方興唯聞擊石諸侯取其軌則四海瞻其儀表為杜陵之男子誰繼後曹蔑鄉里之小人願辭彭澤於是退歸初服就養私門戲嬰兒於階下扶老生於井上尋丁外艱哀毀踰制加人一等俯就三年服闋襲封丹陽公勳上騎都尉公以安車禮盛賜杖年高被服先王之道優遊太平之化左琴右書謀孫翼子居常飽德不言何氏之萬錢直置當仁豈特于公之駟馬清風可賞必有鸞鳳相期白雪時遊多以神仙見屬義形於金石節貫於松筠西山五日之朝將化羽而生翼北海明年之驗便展辰而至巳以永淳元年八月二十一日終於京師道政里之私第享年七十二嗚乎哀哉長子隨州光化縣令守節等哀纏弔鶴痛結鄰人孝之始也則身體髮膚所以全其性孝之終也則衣裳棺槨所以成其禮天高八萬想京兆而何從地闊三阡對佳城而有恨越宏道二年歲次甲申正月甲申朔二十六日巳酉陪葬於昭陵東南之平原炯樗櫟庸材瓶筲小器仰惟先友叨雅契於金環俯逮嘉姻荷深知於玉潤南容有道僅聞將聖之言東武建塋俄述安仁之賦嗚乎哀哉乃作銘曰爰初帝子堯之大理降及真人國之柱史衣冠百代慶靈千祀吉兆占熊嘉名贈鯉聿修厥德必復其始大孝因心至仁由巳肅成門內章華宮裏父任為郎學優則仕陽山之曲蜀江之涘月旦乘鳧田間狎雉其心若鏡其直如矢亟改炎涼罷歸桑梓象賢舊國安車暮齒忽愴池臺俄悲生死郭門一望郊煙四起夫復何言平生巳矣楊氏之先其來尚矣在皇為皇軒在帝為帝嚳在王為周武在霸為晉文此之謂不朽西京為丞相東漢為司徒魏室為九卿晉朝為八座此之謂世祿公諱德裔宏農華陰人也即常州刺史華山公之元孫左衛將軍武安公之長子生而岐嶷代不乏賢事親以孝聞在鄉黨恂恂如也始以父任為太子左千牛備身轉秀容華亭福昌雒四縣令詔封東平公策勳上柱國是時也天子仄席求賢勵精為化以公屈臨小縣焉用牛刀處治中別駕之任方展其驥足耳擢拜潁州幽州二司馬寬以濟猛嚴而不殘每行縣録囚徒其所平反者十八九詔徵尚書郎御史中丞謇謇諒直有王臣之節尋以公事去官復拜饒州括州越州都督府三州長史在會稽引陂水溉田數千頃人獲其利於今稱之焉遷棣曹恆常四州刺史歷政清白為當時所重於是覽先賢之言知止足之分罷歸初服告老私庭乃率㣥從子弟營別業於宜神鄉之望仙里其制宅也宗廟為先廏庫為次居室為後喟然而言曰古人所謂歌於斯哭於斯聚國族於斯者吾知之矣維文明元年夏四月某日薨於正寢春秋八十有五嗚乎哀哉公簡貴不交流俗非禮不動非禮不行望之儼然聽其言也厲博觀史籍不學書生尋章摘句而巳至於臺閣舊事法令科條莫不成誦在心若指諸掌几為尚書郎二年御史中丞滿歲宰人者四縣上佐及專城者九州盛德形容被於歌詠門生故吏遍於天下永淳二年輿駕幸東都召見公於金城頓訪以得失公採托㣥言悉心以對高宗嗟歎者良久賜几杖粟帛鄉里榮之一子令珍早亡朝夕溫凊者四女公慨然有喪明之痛因不豫彌留遺命以弟之子神毅為後越垂拱元年春二月某日與夫人隴西李氏合葬於某原禮也遠近會葬千餘人操筆而為誄者以百數嗚乎哀哉其銘曰巖巖華山峻及於天上侵神氣下固窮泉夫惟積德生我大賢其一滔滔河水中國之紀派別九都經營萬里夫惟積潤生我君子其二惟欣之城惟華之亭宜陽之地益部之星公為其宰不殞其名其三汝陰之國薊門之北陂水朝黃燕雲夜黑公為其佐日宣其德其四入踐郎官含香握蘭來居白室直繩明筆潘子一除士師三黜其五邑號鄱陽山名括蒼東南之美吳會之鄉展其驥足實賴王祥其六四州之大是稱都會千里之榮即分麾蓋言旋舊國保茲耆艾其七生為貴臣死為貴神陰堂是夜古木非春鄧攸無子天道何親其八公諱某字某京兆杜陵人也高辛之撫教萬方堯帝之平章百姓傳稱聖人之後易曰積善之家在夏為御龍在周為唐杜三王以降百代可知車服出於南陽衣冠襲於京兆曾祖榮業後魏秦州別駕祖良宇文朝復州長史父舉唐易州司兵參軍事事端履道操矢安貞厚於天爵薄於人位闕里之庭學夫詩禮太邱之門執其羔鴈公孝慈而敬威莊而安狎貫義方周覽典籍服其服則文之以君子之容遂其辭則實之以君子之德起家左翊衛選授貝州司倉參軍事出自中禁在於外臺謹其蓋藏實其倉庾尋遷蓬州咸安許州長社洛州洛陽三縣令地方百里官歷三城言非法度不出於口行非公道不萌於心令不肅而威宣教不舒而德洽轉虢州司馬制授朝散大夫婺州司馬又遷蘇州長史加中散大夫鸞鳳不棲於枳燕雀不集於梧桐宜得其材非公莫可我大周誕受萬國寵綏四方建官惟賢垂拱而理乃命公為朝議大夫使持節袁州諸軍事守袁州刺史天王之使列國之君發其德音而勸不用賞正其顏色而禁不用刑德成而位尊名遂而身退乞骸告老謝病言歸以某年月日終於淮海之館春秋七十有七嗚乎哀哉夫人太原王氏魏驃騎大將軍新昌公平之曾孫唐蜀王府典軍上柱國志隆之女也纂承洪烈嗣續徽音中外柔嘉小大懷睦夫人之化國風美於鵲巢寶劒之沈夜氣衝於牛斗享年四十八嗚乎咸亨二年某月日終於長社之官第維天授三年春二月合祔杜陵之平原禮也王人弔祭儀仗官給長子某官等毀形於骨痛貫於心父母哀哀昊天莫報佳城鬱鬱白日何年願述餘風式銘幽壤其銘曰鳳凰鳴矣于彼高岡顯允君子邦家之光猗歟令德秀於閨房歲云暮矣池樹荒涼死則同穴如何彼蒼
