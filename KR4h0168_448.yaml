front:
  text: 全唐文欽定全唐文卷四百四十八涯字廣津太原人貞元八年進士又舉宏詞累擢翰林學士進起居舍人元和中轉工部侍郎封清源縣男拜中書侍郎同中書門下平章事罷相守兵部侍郎文宗朝為左僕射以本官復同平章事封代國公拜司空加開府儀同三司李訓謀誅宦官事敗仇士良鞫涯笞令手書自誣同謀誅昭宗天復初大赦明其寃追復爵位
