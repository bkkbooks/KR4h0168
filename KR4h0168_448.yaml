body:
  text: 素月宵凝寒空逈徹照瓊樹以增麗煥瑤臺而共潔遠而望也浮皎皛之精光近而察焉帶巍峩之積雪美其清熒互映絢練相鮮洞玉砌以周設對金波而正圓層構參差逈出林巒之表光輝照燭還同崑閬之前覩重璧以發地瞻百常之造天乍動乍搖難審詳於眾目若明若滅疑陟降於㣥仙顧兔淒涼崇臺䆗窱惵爾意駭然魂悄駢階級以雲矗粲瓊瑛之霄皎徒引耀之可觀豈懷材之足表若見仙闕如游玉京月映臺而九天共霽臺照月而萬里俱明含氷霰而逾潔軼氛埃而更清斯可以滌鄙夫之幽抱暢達士之高情皎皎寒光悠悠清質凝精以降委照而出玩浮光而神竦炫微輝而皆溢視乎外美清瑩乎瑤華鑒乎中致齋莊於虛室由斯可保亦既有光始激射以內照忽飛騰而外揚璧彩遙分奪氷壺以的的桂華中映同日觀之煌煌於是天地朗然纎埃不翳九成由其直上八表可以旁睨將以象清都朝玉帝豈徒恣遐想窮遠睇徘徊於臺榭之間悵望於蟾蜍之際而已哉吟玩既久規圓已斜嘆將傾於桂魄思復搴於瓊華庶竭精於冊府寧遠慕於仙家苫塊餘生已濱死所絲綸渙號俾復書班敕使薦臨德音下逮呼天號絕撫已驚迷中謝伏念臣早偶家艱專承母訓零丁孤苦邈爾無依鞫育提攜逮夫有立夤緣際遇玷冒高華犬馬之養未伸風木之悲遽至攀號泣血摧踊殞心仰賴聖神之恩甫終窀穸之事几筵是奉墳土未乾痛深陟屺之瞻恨未及泉之見敢謂宸衷念舊優詔奪情蓋三年免懷通喪者乃聖王之制而踰月視事變禮者豈治世之風雖睿眷之殊常豈私情之所忍伏望陛下推孝思而錫類謹宰柄以馭臣念哀苦之方深況衰疲之已甚報親日少願終制以為期事國時長尚捐軀而未晚方寢苫而枕塊於義為安俾服冕而乘軒共知不可哀情薦布宸聽未回再殫罔極之情冀動葢高之聽伏念臣猥蒙天眷誤玷宰司久無補於明時亟自招於大禍慈顏遽隔悲隙駟之難畱厚穸甫成倚苫廬而永慕庶畢哀恫之制少酬顧復之恩忽奉制綸俾還相位私情莫處公議靡容豈可尊故事以蹈前非但當守禮經而據古是臣重罹酷罰屬在衰年既極摧殘浸成疾恙精神徒耗筋力頓衰雖強使之造朝決難堪於應務伏望陛下委大明之詔憫不移之愚追寢渙恩俾終祥禫則聖主得全於禮貌而孤臣獲畢其孝思疾首痛心或偷生於此日銘肝鏤肺期報德於他時當使應管諸州府坑冶伏准建中元年九月七日敕山澤之利今歸於管坑冶所出並委鹽鐵使勾當者今亠兊鄆淄青曹濮等三道并齊州界已收管開冶及訪聞本道私自占採坑冶等臣伏以山川產物泉貨濟時苟有利宜不忘經度亠兊海等道銅鐵甚多或開採未成州府私占物無自效須俟變興國有常征宜歸董屬前件坑冶昨使簡量審見滋饒已令開發其三道觀察使相承收採將備軍須久以為利恐違常典伏請勒還當使准例稅納又以興功動作法貴均勞坑冶州府人難并役其應採鍊人戶伏請准元敕免雜差遣冀其便安伏乞天恩允臣所請臣即於當使差清強官與亠兊海等道勘會已開者便令交領未開者別具條疏准敕詳度諸司制度條件等禮部式親王及三品已上若二王後服色用紫飾以玉五品已上服色用朱飾以金七品已上服色用綠飾以銀九品已上服色用青飾以鍮石應服綠及青人謂經職事官成及食祿者其用勳官及爵直諸司依出身品仍各佩刀礪紛帨流外官及庶人服色用黃飾以銅鐵其諸親朝賀宴會服飾各依所准品諸司一品二品許服玉及通犀三品許服花犀及班犀及玉又服青碧者許通服綠餘請依禮部式諸部曲客女奴婢服通服青碧其命婦客女及婢聽同庶人奴及部曲請許通服黃白皂其命婦准格客女及婢得同庶人其衣服婢及庶人女婦請兼許服夾纈丈夫請通服黃白如屬諸軍使司及屬諸道任依本色目流例其女人不得服黃紫為裙及銀泥罨畫錦繡等餘請依令式其袍襖制度三品已上伏請許服鶻銜瑞草雁銜綬帶及對孔雀綾袍襖四品五品伏請許服地黃花及交枝綾六品已上朝參官許服小團窠綾及無紋綾隔織紗獨織等充除此色外應有奇文異制袍襖綾等並請禁斷其中書門下省尚書省御史臺及諸司三品官並請敕下後一月日改易應諸常參官限敕下後兩月日改革餘非常參官並許五月日改革外州府以敕到日起限其衫布制度內外文武常參官及供奉官外州府四品已上官請許通服絲布仍不得有花紋餘請一切禁斷其花絲布及撩綾除供御外請委所在長吏禁毀訖當日聞奏其不合服絲布者請敕下後限一月日內並須改易丈夫袍襖衫等曳地不得長二寸已上衣袖不得廣濶一尺三寸已上婦人制裙不得濶五幅已上裙條曳地不得長三寸襦袖等不得廣一尺五寸已上婦人高髻險粧去眉開額甚乖風俗頗壞常儀費用金銀過為首飾並請禁斷其粧梳釵篦等伏請勒依貞元中舊制仍請敕下後諸司及州府榜示限一月內改革又吳越之間織造高頭草履纎如綾縠前代所無費日害功頗為奢巧伏請委所在長吏當日切加禁絕其諸綵帛縵或高頭履及平頭小花草履既任依舊餘請依所司條流准儀制令諸軍一品已下五品已上皆通幰六品已下皆不用幰者令非冊拜及婚會並不用幰又准六典及禮部式諸文武赴朝諸府遵從職事一品及開府儀同三司驃騎大將軍聽七騎二品及特進五騎三品及散官三騎四品五品兩騎六品以下一騎其散官及以禮去官五品以上將從不得過兩騎若京城外將從不在此限今約品秩職事官一品職七騎二品及中書門下三品五騎三品及中書門下御史臺五品尚書省四品三騎四品五品兩騎鞍通鍮石裝其散官及以禮去官者五品已上不得過一騎若京城外及勳績顯著職事繁重者不在此限七品已下非常參官並不得馬從未任者聽乘屬馬鞍用烏漆裝右請一品二品九騎三品七騎四品五品兩騎六品一騎其京城應繁重者疑不在此限六品以下非常參官不得以馬從六品已上非常參官周親未任者聽乘馬餘未任聽乘屬馬小馬鞍用烏漆裝其胥吏雜色人不在此限其鞍轡裝飾據所司條流得用銀者四品已下並得許用垂頭押胯其用銀鍮石者並不得用鬧裝其軍容隊伍要資華飾不在此限餘並依所司條流准少府式公主出降犢車兩乘一金銅裝郡主犢車兩乘一銅裝縣主犢車兩乘一銅裝又准鹵簿令外命婦一品厭翟車六乘二品三品白銅飾犢車一從車四乘四品白銅飾犢車一從車二乘者今此附前件令式參酌今時之宜婦人本來乘車近來率用檐子事已成俗教在因人今請外命婦一品二品中書門下三品母妻金銅飾檐子舁不得過八人三品金銅飾犢車金銅飾檐子舁不得過六人非尚書省御史臺即白銅飾檐子舁不得過四人四品五品白銅飾犢車白銅飾檐子舁不得過四人六品已下畫奚車檐子舁不得過四人胥吏及商賈妻子並不乘奚車及檐子其老疾者聽乘葦軬步木反車橫木車及篼籠舁不得過二人庶人准此右伏緣白銅先已禁斷今請應合用銅者通用鍮石胥吏商賈妻女老疾者聽乘座車及葦軬車餘並請准所司條流處分商人乘馬前代所禁近日得以恣其乘騎雕鞍銀鐙裝飾煥爛從以童騎騁以康莊此最為僭越伏請切令禁斷庶人准此師僧道士除綱維及兩街大德餘並不得乘馬請依所司條流處分准營繕令王公以下舍屋不得施重栱藻井三品已上堂舍不得過五間九架仍廳厦兩頭門屋不得過三間五架五品已上堂舍不得過五間七架亦廳厦兩頭門屋不得過三間兩下仍通作鳥頭大門勳官各依本品六品七品已下堂舍不得過三間五架門屋不得過一架兩下非常參官不得造軸心舍及不得施懸魚對鳳瓦獸通伏乳梁裝飾祖父舍宅蔭子孫雖蔭盡仍聽依舊居住天下士庶公私第宅皆不得造樓閣臨視人家近者或有不守敕文因循製造自今已後伏請禁斷庶人所造堂舍不得過三間四架門屋不得過一間兩架下仍不得輙施裝飾准律諸營造舍宅於今有違者杖一百雖會赦皆令改正之其物可賣者聽賣若經赦後百日不改去及賣論如律又准大歷六年十二月十一日敕京城內坊市宅舍輙不得毀拆今若頓令改去恐為倍費其已成者許不毀拆自今已後宜令禁斷應制度衣服車乘器用宮室等其諸軍諸使職掌官等並請約文武官例各委本軍本使以職掌高下約為等第比類聞奏應三省御史臺兩京諸司及諸道在城職掌官等諸不許用本官本品例仍並不得服犀玉及車馬不得飾以金銀應諸色條件伏請委御史臺知彈御史兩巡使京兆尹及東都畱守河南尹畱臺御史外州府長吏准條件月日切加糾察如有違越沒入所犯物仍量加決責其常參官品聞奏其在城諸軍諸司各委本司勾當如本司勾當不及者委臺司覺察聞奏以前臣涯等奉敕令臣等同為詳定酌中奏聞者伏以法惟無作作則必行令貴在寬寬則可久今臣等約所司條件令式舊章從俗酌宜務遵中道臣當道出軍徑入賊腹有兩路一路從龍州清川鎮入蕃界徑抵故松州城是吐蕃舊置節度之所一路從綿州威蕃柵入蕃界徑抵棲雞城皆吐蕃險要之地臣伏見方今天下無犬吠之警海內同覆盂之安每蕃戎一警則中外咸震致陛下有旰食軫懷之憂斯乃臣等居大官受重寄者之深責也雖承詔發卒心馳寇廷期於為國討除使戎人芟翦晝夜思忖何補涓毫所以慺慺愚心願陳萬一臣觀自古長策昭然可徵在於實邊兵選良將明斥廣資儲杜其姦謀險其走集此立朝士大夫皆知不獨微臣知之也祇在舉行之耳然臣愚見所及猶欲布露者誠願陛下不愛金帛之費以釣北虜之心臨遣信臣與之定約曰犬戎悖亂負恩為邊鄙患者數矣能制而服之者惟在北蕃如能發兵深入殺若干人取若干地則受若干之賞開懷以示之厚利以㗖之所以勸聳要約者異於他日則匈奴之銳可得出也一戰之後西戎力衰然後選練驍雄乘便翦滅此誠制戎之一奇也伏以幽鎮兩州悖亂天紀迷亭育之厚德肆豺虎之非心囚縶鼎臣戕賊戎帥毒流列郡舋及賓僚凡在有情孰不扼腕咸欲橫戈荷㦸問罪賊庭伏以國家文德誕敷武功繼立遠無不服邇無不安矧茲二方敢逆天理臣竊料詔書朝下諸鎮夕驅以貔貅問罪之師當猖狂失節之寇傾山壓卵決海灌螢勢之相懸不是過也但以常山薊郡虞虢相依一時興師恐費財力且夫罪有輕重事有先後攻堅宜從易者如聞范陽肇亂出自一時事非宿謀迹亦可驗鎮州構禍殊匪偶然扇動屬城以兵拒境如此則幽薊之眾可示寬刑鎮冀之戎必資先討況廷湊闒茸不席父祖之資成德分離又多迫脅之勢今以魏博思復讐之眾昭義願盡敵之師參之晉陽輔以滄易犄角而進易若建瓴盡屠其城然後北首燕路在朝廷不為失信於軍勢實得機宜臣之愚忠輙在於此又聞用兵若鬬先扼其喉今瀛莫易定兩賊之咽喉也誠宜假之威柄戍以重兵俾其死生不相知間諜無所入而以大軍先迫冀趙次下井陘此一舉萬全之勢也臣受恩深至無以上酬輕冒陳聞不勝戰越元和中政平刑清聖作賢輔盡雍容揄揚之美成緝熙愷樂之化相國趙國公式是古訓毗於大君當八方之樞總萬物之會嘗以聖明臨照思盡物宜每與㣥公拱承顧問將謂經之於思慮不若著之以文辭著之以文辭不若騐之於圖牒昔漢祖所以知郡國豐耗山川險夷以蕭何得秦圖書可披而按之故也大凡邦國之會計可以備應對者著元和國計簿地形之遠近可以知要害者著元和郡邑圖洎百執事所莅之司士大夫所分之族無不窮究其本末申明其憲度今之姓纂即其一也趙公嘗創立綱紀區分異同得之於心假之於手以授博聞強識之士濟南林寶該覽六藝通知百家東漢有紬書之能太常當典禮之職其為述作也去華摭實忘麄得精條貫稟大賢之規網罹盡天下之族雖范宣子稱其世祿司馬遷序其先業若揭日月備於縑緗昭昭然蔑以加此矣以涯嘗學舊史謬官綸閣授簡為序不敢固辭無能發揮承命而已矣元和七年十月中大夫行兵部員外郎知制誥王涯述西岳太華華之首峯有五崖比壑破巖而列自下遠望偶為掌形舊俗土記之傳者皆曰昔河自積石出而東流既越龍門遂南馳者千數百里折波左旋將走東溟連山塞之壅不得去有巨靈於此力擘而剖其中跖而北者為首陽絕而南者為太華河自此洩茫洋下馳故其掌跡猶存巨靈之跡也予聞而惑之乃往觀曰誕哉此說乎夫所謂神者非人也其動無聲其形無跡若形而無象若氣而無色拔山剖澤而不見其作鼓風奔水而不見其力視不可察名不能及故推而謂之神苟有聲可聞有形可見非神之所為則皆人力之能及也烏有神之作力而有人跡乎且夫高天厚地聳山流川者神之所為也所言開山導河亦神也神之所以神者有作而無悖一成而不易烏有始塞之而復達之始連之而復絕之始不知終是不為神矣且此靈之運為何古乎在太初開闢之始乎為陶唐洪水懷山襄陵之際乎以為開闢之始也宜當胚渾之先天地未位萬象茫昧尚無定歸當不止一河之壅抑而一靈與其道疑借有其事自微而著悠悠乎年代之沒其誰也克傳以為陶唐洪水之際乎則禹奠百川宜在禹貢乃曰導河積石至於龍門南至於華陰東至於底柱皆禹貢之所致以達於海豈天地大異之若此而典記不以為文哉天設四瀆宜有以通不當始遏其流滯撓其和氣及其汨亂而後理也且山谷之作此形何則不可嵲屼相薄高深相敵乃有銳而出者為虎牙偶而背者為熊耳角而巘者為牛首冠而峭者為雞頭必以形之類形而必加說則雞牛熊虎之象其亦有作乎予嘗覽張平子之賦西京至巨靈高掌厥跡猶存之辭以為該聞精達常以是惑使不語怪神之旨何所述明暨覩其形而咨之果謬悠而無據也將假文神事以飾其詞歟為思而有闕歟因辯其由而述之以告山下元之大旨可知矣其微顯闡幽觀象察法探吉凶之眹見天地之心同夫易也是故八十一首擬乎卦者也九贊之位類夫爻者也易以八八為數其卦六十有四元以九九為數故其首八十有一易之占也以變而元之筮也以逢是故數有陰陽而時有晝夜首有經緯而占有旦夕參而得之謂之逢考乎其辭騐乎其數則元之情得矣或曰元之辭也有九元之位也有四何謂也曰觀乎四位以辯其性也推以柔剛贊之辭也別以否臧是故四位成列性在其中矣九虛旁通情在其中矣譬諸天道寒暑運焉晦明遷焉合而連之者易也分而著之者元也四位之次曰方曰州曰部曰家最上為方順而數之至於家家一一而轉故有八十一家部三三而轉故有二十七部州九九而轉故有九州一方二十七首而轉故有三方三方之變歸乎一者也一謂一元也是故以一生三以三生九以九生二十七以二十七生八十一三三相生元之數也三長直亮切者七八九得一二三揲法備一為天二為地三為人其數周而復始於八十一首故為二百四十二表也一首九贊故有七百二十九贊其外踦贏二贊以備二儀之月數立天之道有始中終因而三之故有始始始中始終及中始中中中終及終始終中終終立地之道有下中上立人之道有思福禍三三相乘猶終始也以立九贊之位以窮天地之數以配三統之元故元之首也始於中中之始也在乎一一之所配自天元甲子朔旦冬至推一晝一夜終而復始每二贊一日凡七百二十九贊而周為三百六十五日節候鍾律生踵斗指於五行所配成列著焉以應休咎之占配陰陽之數故不觀於元不可以知天不窮渾天之統不可以知人事之紀故善言元者於天人變化之際其昭昭焉故倀倀而行者不避川谷聵聵而聽者不聞雷霆其所不至於顛殞者幸也非正命也夫元深矣廣矣遠矣大矣而師讀不傳者何耶義不明而例不立故也夫言有類而事有宗有宗故可得而舉也有類故可得而推也故不得於文必求於數不得於數必求於象不得於象必求於心夫然故神理不遺而賢哲之情可見矣自揚子雲研幾探數創制元經惟鉅鹿侯芭子常親承雄學然其精微獨得章句不傳當世俗儒拘守所聞迷忽道真莫知其說遂令斯文幽而不光鬱而不宣微言不顯師法殆絕道之難行也若是上下千餘載其間達者不過數人若汝南桓譚君山南陽張衡平子皆名世獨立拔乎㣥倫探其精祕謂其不廢厥後章陵宋衷始作解詁吳郡陸績釋而正之於是後代學徒得聞知其旨而元體散剝難究其詳余因暇時竊所窺覽常廢書而嘆曰將使元經之必行世也在於明其道使不昧夷其途使不囏編之貫之皭若日月則楊雄之學其有不興者乎始於貞元丙子終於元和已丑而發揮注釋其說備矣夫極元微盡元之道在於首贊之義推類取象彰表吉凶是故其言隱其志遠按之有不測之深抽之有無窮之緒引之有極高之旨至於瑩攡錯衡文數圖告此皆互舉以釋經者也則夫首贊之義根本所繫枝葉華藻散為諸元而先儒所釋詳其末畧其本後學觀覽不知其然殫精竭智無自而入故探元進學之多或中道而廢誣往哲以自為切問學淺道缺而賢人志士之業不嗣也故因宋陸所畧推而行之其所詳者則從而不議也所釋止於首贊又并元測而列之庶其象類曉然易知則元學不勞而自悟矣元之贊辭推本五行辯明氣類考陰陽之數定晝夜之占是故觀其施辭而吉凶善否之理見矣苟非其事文不虛行觀其舊注既以闕而述雖時言其義文本其所以然蓋易家大例有得位失位有位無位之說以辯吉凶之由是故元之本數一晝一夜剛柔相推晝辭多休夜辭多咎奇數為陽耦數為陰首有陰陽贊有奇耦同則吉戾則凶自一至九五行之數首之與贊所遇不同相生為體相剋為咎此其大較也至於類變因時制誼至道無體至神無方亦不可以一理推之然則審乎其時察乎其數雖糺紛萬變而立言大本可得而知又吉凶善否必有其例晝休夜咎至有文似非吉而例則不凶深探其源必有微旨此最宜審者至於準繩規矩不同其施舊說以為非吉然此首為戾其辭皆始戾而終同如規矩方圓之相背而終成其用若琴瑟之專一孰聽其聲方圓之共形豈適於器此其以戾而獲吉也其有察辭似美而推例則乖者至如士中其廬設其金輿居士之中乘君之乘吉之大者也而考於其例當夜理則當凶推其所以然則廬者小舍也漢制宿衞者有直廬在殿庭中土中正位也小人而居正位又乘君子之器禍其至焉故下云厥戒渝也凡此之例畧章一事以明之餘則可以三隅反也又如中之上九既陽位又當晝時例所當吉而㣥陽亢極有顛靈之凶與易之亢龍其義同騐如此之類又可以例推所謂元之又元眾所不能知也又一首之中五居正位當為首主宜極大之辭究而觀之又有美辭去六者然則陰首以陰數為主陽首以陽數為主其義可明元之大體貴可進賤已滿七與八九皆居禍中而辭或極美者窮則變極則反也大抵以到遇之首為天時所逢贊為人事居戾之時則以得戾為吉處中之時則以失中為凶消息盈虛可以意得其餘義例分見注中庶將來君子以覽之也經曰凡筮有法不精不筮不軌不筮不以其占不若不筮一當其致精誠厥有所疑然後陰言其事呵策訖乃令蓍曰假太元假太元孚貞爰質所疑于神于靈休則逢陽星時數辭從咎則逢陰星時數辭違此已上並令蓍辭天之策十有八地之策十有八地虛其三以扮三扮配也猶大衍之數五十其用四十有九故元筮以三十三策令筮既畢然後別分一策以掛於左手之小指中分其餘以三揲之并餘於艻比餘數欲盡時餘三及二一也又三數之并艻之後便都數之中不分矣前餘及艻不在數限數欲盡時至十已下七為一畫餘八為二畫餘九為三畫凡四度畫之而一首之位成矣元之有七八九猶易之有四象也易卦有四象之氣元首有三表之象首位既成然後有陰陽晝夜經緯所逢占之欲識首之陰陽從中至養以次數之數奇為陽數耦為陰數晝夜者九贊之位於陽家則一三五七九為晝二四六八為夜於陰家則一三五七九為夜二四六八為晝經者一二五六七也旦筮用焉緯者三四八九也夕筮用焉日中夜中雜用一經一緯凡旦筮者其占用經當九贊之一五七也遇陽家則一五七並為晝是謂一從二從三從始中終皆吉遇陰家則一五七並為夜是謂一違二違三違始中終皆凶旦筮則一五七為所逢之贊而占從焉二六九為日中故經云晝夜散者禍福雜也凡夕筮其占用緯當九贊之三四八也遇陽家始休中終咎若日中夜中筮者二經一緯當九贊之二六九也遇陰家始中休終咎所用贊下為始次為中上為終故經曰觀始中決從終大抵吉凶休咎在晝夜從違若欲消息其文則當觀首名之義及所遇贊辭與所筮之事察其象稽其美惡則元之道備矣或有晝夜既從而首性贊辭遇於違戾則可用也經云星時數辭從星者所配之宿各以其方與本五行不相違克也假如中首所配牽牛北斗水行與首同德是星從也時者所筮之時與所遇節氣相逆順也假如冬至筮遇十月已前首為逆冬至已後首為順也數者陰陽奇耦之數以定所遇之晝夜夜為咎晝為休辭者九贊之辭與所筮之意相違否也凡此四事並當參而驗之從多為休違多為咎昆人元二十七首減唫守翕聚積飾疑視沉內去晦瞢窮割止堅成門致失劇馴將難勤養中者萬物之始且得中辯首之辭具在經主九雖當晝亢極凶者臨也進萬物扶陽而九雖當晝終亦凶也應者應時施宜五七九當晝吉自此後陰生故有戒也太者陽氣盛大象豐卦九為大極雖得晝而微凶唫者陰陽不通象否卦二四六八當晝當唫之時不能無咎極亦凶也窮者萬物窮極思索權謀自濟也九處窮極晝亦凶親者貴以其身下人則親交之道著八雖當晝而極亢不能下人故君子去之也
