front:
  text: 全唐文欽定全唐文卷八百三十三錢珝三
  hash: sha256:0e0ff2bfd9ab8f05837128240acac79d2e7eca74073d11d9598fc064dbff5d69
body:
  text: 敕我思致理不欲滯人復於賦祿之間常有失勞之慮改張之道且就便宜勸善之章必先允當具官高爽周知武經盛著臣節拳勇之力馳騁有成前以新平殄寇之勳移北地頒條之政而茲之牧守且務輯綏元帥請留我所難奪南充善部皆曰可居雖改乘轅將聞叱馭具官安友晟兄友弟恭共圖富貴披堅執鋭惟徇國家當㣥凶效逆之秋激受命忘身之氣比膺賞典亦剖郡符且未登車實同解印或致杜門之歎是忘盟府之書乃寄邊城仍加列爵爾其各宣美化如立前功必使忠臣兼攝循吏可依前件敕漢制郡國有政者皆不易其居就增其秩欲使人安於教化且激勵精本自雕刓皆成富庶具官馮行襲始用忠謀勇力披難立功每推求敵之心必能禁暴為武思齊良將暗合善經而負山面江金實名部燎於兵火毒我編氓爾則保之如家視之如子盡寬井賦恐奪農時耕無惰夫廩有豐食地産修述職之貢市租給備患之師相里所而同欲乃遷興役徒而施勞何怨炳然之績觀而可論保民既重於三公開國仍昭於五等如能知勸當更陟明可依前件敕昔慶父去而魯難寧得臣死而晉憂弭事有所近之類而人有可論之功則用典為以勸來者具官高爽魁傑之材好通經略強禦之力善據邊防激將帥之雄心憤邦家之多事聞吾出狩來扞近郊遂驅有律之師進討不然之黨壓卵既潰衝寇始平忠烈可圖勳勞甚盛進階以數開國有章且觀得衆情無不悅於是賞勵之不已保則永休可依前件敕古者建官取諸垂象故左右執法附於文昌以總六卿以提庶政用人之本邦國繫焉進賢既協於嚮公致理詎宜於虛位具官張濬剛而能斷寬則有容保和而實孕元精索隱而若陳洪範他山攻玉鮮類禹圭九牧貢金自成周鼎先皇帝爰立作相朕小子圖任舊人每親夾輔之才且致勤行之道必將率衆由已化兵為農載胡越以同舟混車書於外戶志所未就我實盡知經營向在於四方親附未遺於百姓雖聚財之任不欲允煩大臣而復國所資安可有稽征賦薦居端右兼陟崇階得名器之所歸在典章而斯重永期宏濟更集前功可依前件敕為國之政在藩有條贊立武於中權屬好謨於副介具官王王褱河汾之氣當萃爾家欒范之宗亦高他族伯仲繼撫封之盛子孫承錫命之功爾能纘彼勳名主於忠信遠取而寧規勇爵深思而但顧良弓列㣥后之上卿處前人之許國尊奬之道造次必論心或益恭諒蕃昌之可保性能召福何富貴之不來朝舉寵章事歸敦勸方布冊勳之澤俾崇馭貴之階善佐永圖以承厚渥可依前件敕具官張漢瑜等漢室勳勞始以進奉朝請而好爵之設五等具焉至於任以專城秩參環衛假之有寵典亦匪輕漢瑜以致勇之誠臨戎罔憚且能抱節而後立功則良將之才挺然可見宗裕恥同兒戲學在師貞過庭有聞刺部甚美則愛子之號昭然可知是以詔我代言俾茲申命亦用垂勸期於徇公可依前件敕命婦之寵數有四而國邑居其首主爵郎舉職敕請必有舊章因以勸焉朕何敢愛具官陸扆妻渤海郡夫人高氏高國族大稱於古者久矣冠冕就列尚想前修閨室有婦令聞令望配君子而相敬承宗事以無違鏘然和鳴信可偕老考祥之應己屬台臣守貴之謨方資內助主爵之請誰云不宜他日中宮受朝則與伯婦俱至佩玉相顧爾家盛哉非獨榮吾相之小君亦以勸天下從夫之道也可依前件敕朕既建中宮將聽內理法度方刑於四德等威宜越於九嬪齊國夫人某氏等柔和有稟間雅自持椒蘭讓薰環珮爭潔近輦見欲辭之色攬衣懷必浣之心用是謙勤保我恩澤重惟漢制遠采周官與名而大國重開錫號而舊章復振勉修懿範俾稱寵休共承陰教之端永輔長秋之盛可依前件敕具官某妻越國夫人某氏等據地圖總兵籍處邦君之位與夫持使節頒化條當牧守之任者理軍為政皆執善經而保寵之謨亦多內助女師稟訓夫族稱賢不違柔順之規且習間和之性或功庸克備風法有承或環珮之音周旋可聽是宜增大名之國開初命之封亦所以榮外臣而勉內助也可依前件敕齊之辟司徒武力之臣也其妻有禮尚獲錫地於君今師長萬夫提封千里內資淑媛助我勳侯國建大名是惟舊典具官錢鏐妻燕國夫人吳氏肅雍之美針戒不忘聞雞鳴而致敬事姑諷鵲巢而思齊有德輔成功烈諒屬柔明爰舉寵章載加常等勉承膏澤以耀閨門可依前件敕隨夫之爵考禮有文冊勳既集於藩維流澤可榮於閨室具官趙匡凝妻豫章郡羅氏肅雍有美柔順不違爰自和鳴克融懿範旁濟中權之盛實資內助之勞致我良臣表於諸夏眷言淑德疏封未稱於宜家越被舊章用典俾光於開國勉修婦式無忽人倫可依前件敕經夫婦之本者莫近於詩故宜爾室家言稱也如鼓瑟琴言和也具官杜洪妻晉國夫人王氏贊洪守土宣力爰致顯爵爾以嘉耦之道遂能居而有之助彼藩條賴茲閨室宜室家而何愧鼓瑟琴以有聞仍命增封用旌柔順因吾肆赦是謂典常可依前件夫人制敕封邑之制當列國者甚貴矣其或舉茲重典進受大名俾增伉儷之光以稱侯王之爵宏之在我宜者則行具官李茂貞妻秦國夫人劉氏能修懿範潛助元勳福雖盛而心益忝封既大而勤不匱內言必正同奬自多贊武幄之忠謀保魚軒之寵數而茂貞宣力守土在岐以是加恩用彰有禮必使事君之節相勉克終則不獨宜爾室家兼明報國可依前件敕某官某母郡太君宋氏古者事親竭力而養樂於負米信有其人今從周秩帶三公貴享千乘實賴嚴明之訓以成忠信之名爾既承顏必盡無違之志吾方敦孝遂加有典之榮可依前件敕為人之婦能從其爵以益貴者是必宜其家矣而階品在三等之設有銀印青綬之崇則從爵之名所增益貴具官盧說妻博陵郡君崔氏族大多聞多聞者風法性成不易不易者柔和勉說代我之言必能恪居其職助於內者足以彰焉是謂宜家可當用典展衣之飾不其盛哉可依前件敕具官葛從周妻清河縣君張氏生自良家配吾戎帥頗能佑助克濟功名柔順睦親內則有聞於宗族溫恭近禮外言不出於閨房既屬推恩是宜用典進之郡邑俾稱藩侯可依前件維年月日某甲子皇帝若曰忠信之於人也並酒醴之有麴蘖也智者厚而愚者薄能者寡而知者衆麴蘖厚而遺味深忠信厚而遺美大存誠所至享福必全生死既分是非乃定咨爾故山南節度使開府儀同三司檢校太傅典侍中興元尹李茂莊懷忠信之實圖闕行其不迷用則不匱得之善始守之克終故金蟬左貂為爾之冕昭其官也彤弓玈矢為爾之器昭其錫也而又帶綬係印曰公曰相位列元帥政在中權馮翊分三輔之豪成紀接右界之險俾爾出號令爾惟有威俾爾施教條爾惟有惠威則鮮犯惠則鮮違吾復以漢中控諸蜀塞耀爾昆弟聯彼封疆易武節以授之實地圖之巨者勸夫忠信是亦庶幾尚其爾當職必修許盟必會更資共奬且勵率無疑使我擇臣心得以示信萬國之川流靡息一朝之山立遽頽嗟復魂以安歸悼降年之非永戎昭所賴天奪良多言念舊臣亦不半在茲以悽惻何必鼓鼙昔人能立武者則太公為師慰爾之行用示追顯是為有卒無為不瞑今遣某官某等持節冊爾為太師嗚呼爾其聞吾茲命維年月日某甲子皇帝若曰生不能用死而誄之為上者且愧於心古君子亦云非禮其或嘗居夾輔兼授中權生也無不用之悲歿也有可追之命展茲異數示彼諸孤我念大臣庶幾得禮咨爾故特進兵部尚書劉崇望氣質之稟直枉自分先哲王於是而觀賢不肖於焉乃定所以樹為吉德彰在令終論若所為信如斯語始於家事勵以躬行處昆弟之歡恥聞優劣視僕隸之役常務寬容避名無取乎白眉掩過每言乎爛手周愛疏屬遍惠故人位高而惟恐驕矜權至而未嘗擊斷剛亦不茹怨乃用希是以誠存則安族大能保天非有私於若惟若有順於天昔者太史秉書沖人嗣訓時乃之任首冠侍臣罔漏代言以光誕告機平旬歲勉應旁求佐理甚勤念功如在比從蜀道入補夏卿方待嘉謀共熙庶績一旦奪我心膂剋爾膏肓夢兩楹而遽罹明徵偃巨室而猶疑假寐永言辨色遂絶履聲且臨將葬之期彌積或虧之痛自朝受策以法登車往慰逝川俾稱空土今遣使左諫議大夫憲王博副使倉部郎中溫緒持節冊爾為司空於戲吾所申命何若於魯侯之誄屬辭於若尚知之哉維年月日皇帝若曰周官八統其一親親漢制皇子為王使得立社於國固本之大哲后皆然咨爾第八男祕當保抱之間有敏惠之性亦既總角遂能勝衣默識天經潛資日就未嘗玩物可以疏封乃告守龜具聞叶吉來受茲典永為東藩今遣某官某乙持節冊爾為景王於戲見不賢而能思賢爾則必賢矣知可逸而能無逸爾則常逸矣是宜廣洪緒永丕休敬而聽之罔失厥度維年月日皇帝若曰古君子篤於其親者使天下皆興於仁也故二王五子之封非獨立愛而已咨爾第九男祚克岐之質見善欲遷稟訓道而必開故戲言而不受一隅已達四術可陳乃申胙土之章俾奉成人之禮今遣某官某乙持節冊爾為輝王於戲為臣為子皆在爾躬有器有名敢私國典錫類則非孝不可遠恥則非恭不能無替聿修以光利建白茅金璽昭物具焉爾其夙夜循思用稱休命維年月日皇帝若曰廟立之重天序可承將茂本枝式遵懸法庸就至公之體諒非吝子之心咨爾第十男祺稟性惟和挺材亦秀飭躬罔念於紈素樂善欲忘於鼓鐘析壤之休自天而啓臨軒之命秉禮則安今遣某官某乙持節冊爾為祁王於戲保在深宮鮮知正範任之作傅我必擇人苟有如韋孟之諷諭安國之輔導者爾當俯聽其言勤行其教使我自家之訓克彰於萬邦而固爾建社之寵不其大哉維年月日皇帝若曰周家之嗣分茅土者十五國漢景之代書簡冊者十三王朕以寡昧之資奉神靈之統每顧諸子實惟天休期訓導之將成諒封建而可享咨爾第十一男禎方當稚齒復在深宮有知憂知懼之心見學禮學詩之性自然而稟最樂不渝遂詔有司往申舊典今遣某官某乙持節冊爾為雅王於戲受冊之命重屬汝躬列聖在天百辟在位在天必聽在位必觀罔怠交修用承多祐維年月日皇帝若曰不廢懿親大封同姓吾嘗觀於經籍矣然而歷代賢君正名用典必擇才行使之光昭其可以子弟之私恩冒先王之成憲朕雖不德必慎有為咨爾第十二男祥於兒戲之間多幼敏之習謂之材也不曰近乎處昆弟之間有推讓之性言其行也不曰類乎是宜疏封且命申誥今遣某官某乙持節冊爾為瓊王噫作德日休爾則逸作僞日拙爾則勞擇利而行令名斯至維乾元五年歲次戊午四月庚子朔二十七日丙寅皇帝若曰惟王法天惟后象地統理之道相須而成秉陽雖繫於昭垂養物必資於厚載處大倫而克正與元化而同光上贊君臨旁資婦道遠徵百代咸本六經而禮曠纍朝位虛中壼嚴禋木惕玉齍無所進之人內令寂寥彤管有不書之史興廢之重作配實難咨爾淑妃何氏柔既可觀儉皆中度外言罔入懿則自成處間房而椒亦蜚聲御衆妾而木能逮下洎邦家多難輔佐克勤每見求衣未嘗安寢先知旰食不視晨羞欲齊京室之賢罔慕長秋之盛勞謙之報降福是宜乃顧皇儲仍因子貴公卿來講龜筮斯從實上帝之所嘉詎朕心之可抑今遣某官某持節冊爾為皇后於戲極位正名居尊齊體典一申而百神聽禮一行而萬國歡恐懼可以保其名齊莊可以守其位往司陰教以永天休
