  text: 全唐文欽定全唐文卷九百五十九
  hash: sha256:ac41b78ed8408b78a6f408c815102576d129ab5ea8b50c0926af25baf8c1a045
  markers:
  - {type: head, offset: 14, content: 斛律齊, id: KR4h0168_NFKB_959-h1, level: 1}
body:
  text: 問朕聞處域中之大據天下之圖莫不設簴以思賢解琴而願化雖君唱臣和而明鮮晦多所任者或非其人所行者儻乖其道歸於浸弊罔弗由茲朕寅畏上元負荷先構靜言為國有若涉川風俗未淳政教猶欝黎元寡遂鸞鳳不臻當宁永懷良深愧歎子大夫講聖人之高誼明王事之大綱蓄憤謀忠歷年載矣何施而反本於古何用而救末於今何術而人物阜安何德而神靈滋液爾其無隱無忽悉之究之通其條貫朕當親覽臣對聖人法天而理察道而行心膂俊賢子惠黎獻吏恭爾位人樂其業朝無粃政俗詠康哉書曰惟天聰明惟聖時憲惟臣欽若惟人從乂此其謂也雖根英異轍火木殊途革去故而鼎就新變咸池而歌大夏然而無易茲典其故何哉葢以因天人之和順陰陽之教不可替也皇上道高西聖德邁南薰黃龍薦圖翠鳳為寶至於膺正歷享靈符朗七曜於銅儀安萬人於寶歷延祥降福陟酌疑登封八表黎元歌皇風而周地絡四夷酋長頌元化而建天樞此皆以刻於玉版載於金匱為帝者之祖宗與乾元而終始至於坐衢室端冕旒寂然不動感而遂通赫赫明明之美無聲無臭之化固以榮鏡宇宙發暢神人振古已來未有如斯之盛矣猶復寅畏上帝憂念下人思返樸於鶉居佇遷訛於鴻古夕惕勤止良以深焉授降綸言俯詢輿議此陛下沖謙之道也愚臣何足以知之然而忝跡明時敢忘披露臣聞帝皇之道藉英彥以張風邦國之圖資謨明以垂化故能庶徵有序美政無虧當今制禮作樂懸章布憲可謂文物大備刑政中和而紫宸宏卷舒之風黔首罕阜安之業者良以官僚虛曠宁宰荒寧不能宣裕皇明洗蒸徒之耳目發揮神化變虛澆薄於閭閻夫遷物化人著誠去偽豈惟君上之道實亦官聯之職故文翁好儒蜀學比於齊魯毛玠崇質魏士素其裘裳是知易俗移風使天下迴心而嚮道者非俗吏之所能為也故董子云黎人未濟皆長吏不明使至於此也賈誼云下之有過吏之罪也夫聞伯夷之風者貪夫以廉見柳下之跡者鄙人能泰故教人莫如垂範垂範必仰良材阜俗莫若興農興農必由循吏且擇賢而處其獘猶濫負乘為政何以克堪今若選英俊而實百僚自朝廷而及州縣咸令法易簡之道順刑德之教賞以春夏慎其濫矣罰以秋冬敬其刑矣夫賞刑中則庶人安庶人安則財用足財用足則百志成百志成則天人和天人和則神靈滋液矣然後垂訓而理勤法而行宣九式以均財修六禮以節性明七教以興德齊八政以興邦道格元亨風還太古時雍之和可致濟俗之義可宏唐虞之美可逾文景之聲可越謹對三農飭力九穀是資田祖報以斯箱蒸民由其粒食乙輟耕壠上擐甲戎行棄帶經肆力之勤務投筆徇身之計遂使經行靡望肇慶委臺笠於中田尺籍移名閉蓬門於故里父耕子播亦足庇身君義臣行如何棄本而乃昧洪範之先食決逐嫖姚黜素王之去兵輕逃力穡徒託詞於凍餒終難逭於刑憲且縣尹之職鄉戶是司觀惠化於字人定否臧於襁負必也稅符大桀詠減易堯坐琴堂以素餐帶墨綬而尸祿自宜褫服寧止免冠待窮兩造之詞聊舉一隅之說臣伏見兵戈以來紊亂法度小有權位即為僭奢殫物竭財務資嗜欲故俗無廉恥政有侵漁自陛下蕩穢滌瑕躬儉節用漸清遠邇靡然從風夫以京邑翼翼四方取則故曰城中好高髻四方高一尺城中好廣眉四方且半額伏願陛下日慎一日使美化行乎萬邦夫先近以及遠自家而及國文王所以造周也臣竊以所造燈樹匠人計料用錢四萬貫道路運致又約一萬貫百姓辛苦將辦實難况揚州到上都三千餘里州縣所過人皆見之未審此物欲將何用若聖意別有所在即非愚臣合知或有因時施設使夷夏共觀愚臣竊謂有力者愛而效之侈心又萌何可復制非抑奢從儉敦本塞未之道也昔漢文罷露臺之役晉武焚夏翟之裘豈徒惜一女之功愛十家之產焚而罷之蓋欲慎所好而使天下如所焚疑矣書之青史千載美談今陛下嚮明之理美事多矣當更昭儉德以示四方不軌不物明主所慎臣叨居重位師長百寮心有所疑敢不聞奏伏惟聖鑒裁擇臣某無任在衆藝兮所尚伊摴蒱兮自久招邯鄲少年命諸葛新友分曹列席促罇舉酒猶賢博弈將取適於解頤乃貴先鳴故決爭於遊手終日莫閑連宵戰酣不拔其旗且背城而借一并兼是視豈分土之惟三瞋目賈勇危冠競貪鑒座中之奔北為席上之司南然用之斯行捨之斯去老氏以訓人立範莊生以亡羊是舉佐歡有則任物有敘既無我以推移每隨之以處所別有膏粱之子縉紳之客時為此物以代支策初一擬而純盧忽連呼而成白相顧則笑泯然無隙請傾耳而側目看後來之一擲昔者天地氤氳洪氣始分穴居野處獸聚鳥㣥逮乎聖人演卦垂文上棟下宇信宮室之取則紫微黃屋表巖廊之在君爰制廣厦克崇景勳崛起黃道孤橫翠氛巋峗穹崇若巨鼇負山出大壑巍峩岌嶪似神龍飛漢矗長雲原其本也蕆事作圖成終慮始命班倕召王爾鏟崱嶷平邐迤斬豫章之楩楠伐雲夢之梓關山百轉水陸萬里江析藏捧明月而時來泉客辭波薦夜光而至止於是規模具工徒庀經之營之載考載擬版築既畢剞劂將巳邈矣層構仡然獨起觀其萬栱交撐千櫨叢倚連甍軒昂以鳳翥飛龍夭矯而虹指鱗次翼張岑立嶽峙綺疏齊列洞戶相似翕赩電烻一作雷電煥爛倚山桅山楶藻梲蟠蛟螭於上楹方井圓泉姹芙蓉於倒水壯而且麗豐不踰軌輪焉奐焉美矣盛矣懿其梁棟之任固非斗筲之子夫成大海者百川所歸構明堂者多材是共亦猶一人出兮百僚從爰建股肱而作輔當其無而有室之用張公獻禱奚子作頌蓋亦美上古之淳樸防後代之驕縱皇矣上帝臨下有秩六合清晏八荒夷謐方將抑末敦本斲雕歸質異茅茨而立宇惡其飾以取卑宮之名削土階而度堂起其厚而崇破觚之實猶且明敭沉隱寢寐英逸燕雀聞而相賀鸞鳳來而應律思與㣥公卿士衆官庶匹議經濟之法度籌安危之得失優哉游哉日慎一日斯乃國家之盛事嗟難得而賦述獨有閒迹林野洗心蓬蓽想芳桂以淹留撫寒松而未出希薦之於大廈保柱石之終吉珍禽生矣於彼南域稟離宮之淳精得金方之正色明而且慧聰而多識雖羽族之殊流與人智而同德懿其霜毛雪毳鮮襟皓臆明眸珠朗修趾赬飾理翮整翰仰雲路而翻飛自邇陟遐託風林以棲息及夫出層嶠集高松刷勁翼端麗容遇天網之四掩獻君門於九重用能辭㣥別類重譯而至閉以雕籠處之丹地夫違忤則傷性常順旨以從人乖背則喪生不貪榮以求媚爰遊上都隻影長孤懷好音而願語每稱名而自呼當其踰山越嶂萬里遐曠常恐微軀毀全無妄豈知承曲成之惠渥奉君子之嘉貺朝食琅玕之實夜宿畫梁之上而已哉顧慕多違自惜容輝夢鄉山而欲戀思恩波而不飛獨有邈乎長想忻然志逸效彼珍寶瑞我帝室坐使素烏惡彩白鷴慙質若炎淵之愁霧嘉長安之聖日信能言之見知接鶯谷而同出遊子行邁登晉山之孤嶽翠谿皛以淪漣紅嶂赫兮崩駮爾其雲崖委溜風壑鳴泉苔彬彪以冒石藻漫莽兮山疑川于以采藻于彼行潦沼沚之毛汙潭之草靃靃靡靡汎汎悠悠乍夤緣於春水或羃䍥於春洲觀其往往縈散離離無畔㛐娟島嶼暐煜江漢碎流月於澄波隱孤雲於斷岸生不擇所長亦無叢不資潤於微露不懼威於勁風纖莖璀璀密葉茸茸宿銀塘之白鷺矯清水之文虹則知乘流則遊遇坻則植柔而能全弱而能直其為隱也不居高而處卑其為謙也常韜光而晦色嗟茂族之無託願貞芳之見移生君之銅沼汎君之瑤池雜青蓮與翠荇偶杜若與江蘺生於水人不知歲歲年年幽澗垂人之巧者與造物同功器之著者與陰陽齊力此邑紫府修建鴻鐘懸重千鈞量逾百石爰有南海賢士陳明羽人一言於邦千里來應祥金自積良冶子來立埏埴而成模制士冖䂞籥而運用大力斯拔高爐正開金火合流雲雷皆至紅光旁照踊躍密移善應長保於歲年仙侶永聞於時夜昔稱北宮之賦三月而成今覩東郭之師不日而就振於無境鳴而當律喜堯年之陶鑄荷聖澤而書名皇闕遠冒於遐方景福顧歸於魏闕銘曰越金既聚鳧氏作則至用出虛宏之克塞既集仙聖永清道德遠及千春方茲一刻蹲熊下峙盤龍上陳剛亦能吐聲實為賓形如天覆響若谷神遠韻無斁用之不勤伏以惠昭太子廟元和七年立悼懷太子廟太和四年立懷懿太子廟開成三年入惠昭太子廟莊恪太子廟開成三年立前件太子四室共置三廟每當修飾其費用極多四時奠享所司未必豐潔三處行事人力實為勞煩將欲求其便宜莫若移就一廟且今太廟九室尚在一處太子各置廟宇禮實非宜伏以莊恪太子廟地實高敞建立又新只添一間可容三室所費益寡其利實繁非止即安可以永逸請待修理畢擇日備禮遷諸太子神主皆祔莊恪廟中列位次居匪失彞倫之敘祀事同享無虧長幼之儀其廢廟瓦木極多諸廟添修計亦合足其廢廟官等未得資者望許非時參選臣官守帛丿糸蕝職忝參詳事關禮文合當舉請夫五氣降於五行五星均於五德助天地而為政體陰陽之有則犧圖八卦之文所以化成禹錫九疇之道由其平直分宗別序正位辨方春青夏赤羽黑宮黃育龜麟之體貌煥鸞鳳之文章物庶幾而盡善然後從革而能剛若夫寅亮陰德發揮秋令帝少昊而為主神蓐收而在正生水克寸木非無父母之儀承土伏火亦有謙卑之性爾其於乾道則使候入青女光垂白陸寒陰作而霜露濃殺氣橫而風雨肅此金之節也爾其於坤道則使麥苗含秀二粒同稃既收成於萬物復搖落於千株此又金之功也爾其於王事則使出軍行師擁旄仗鉞所以征叛逆而敷明伐此又金之威也爾其於人事則使農夫業就商旅懋遷儲蓄邦家之重錢刀布泉之先此又金之利也彼觀其山川含育之祕採掇工取之程鎔鑄陶鈞之術雕鐫磨礪之形非一途而共貫實萬象而殊名用之為鼎天下之至寶用之為劍天下之至精用之為量天下之至信用之為鏡天下之至明亦有金河金瀨金潭金穴金谷金陵金城金埒紫山重夷吾之對光石訝胡人之別渤澥水之仙宮西北荒之神闕魚龍雀馬之玩鐘鼓樓臺之列皆具美於明圖豈能窮於縷說余復何為長貧若斯揚雄之產非廣季布之諾無移嫌衆口之銷鑠嘉同心之見知命舛時泰將通復否徒效拙於淩霄實勞工於畫水無體物之奇策失緣情之妙旨太沖三都分從陸雲之笑孟堅兩京甘受張衡之鄙太極立天地疏嶽瀆所以鎮四維橫九服伊海之為德有王之法象故量納㣥川而導尊百谷功配乾絡運迴坤軸氣蒸混於灝元潮動襄乎山陸示懲惡則鼓怒見夫㣥怪將瑞聖則不波介以景福唐興百三十有四載湛恩溢乎荒外倬五聖之在天奄六合而稱大赫吾君之光贊敷至道而允泰政符純德昭千古而惟新澤體上仁同萬類而咸賴八狄窮陬而盡歡九夷無遠而不會則成周之德未足雙越裳之來今至再是以四海盡鏡九瀛涵影寫合璧之祥光湛連珠之瑞景德侔上善洗物而容潔道本元元澄心而體靜湛兮恒清晏兮砥平泊乎無情蕩乎難名如君之道酌焉而不竭象君之德注焉而不盈所謂皇得一則政能貞海得一則波不驚怳兮惚兮其中有物杳兮冥兮其中有精精罔奇而不育物無大而不成鯤將化鵬欲征蚌且剖珠其明誰能一借扶搖便為君銜之貢王城散幽情於曩昔凝浩思於典墳太初與其太始高下混其未分將視之而不見欲聽之而不聞爰及寥廓其猶士冖䂞籥輕清為天而氤氳重濁為地而盤礡爾其動也風雨如晦雷電共作爾其靜也體象皎鏡是開碧落其色清瑩其狀冥寞雖離婁明目兮未能窮其形其體浩瀚其勢渺漫縱夸父逐日兮不能窮其畔浮滄海兮氣渾映青山兮色亂為萬物之㣥首作衆材之壯觀至妙至極至神至虛莫能測其末莫能定其初五石難補九野環舒星辰麗之而照耀日月憑之而居諸非吾人之所仰實列仙之攸居爾乃遺塵俗務遐躅養空棲無懲忿窒欲陵清高而自遠振羽衣以相屬七日王君永別緱山之上千年丁令暫下遼水之曲別有懷真俗外流念仙家撫龜鶴而增感顧蜉蝣而自嗟乃鍊心清志洗煩蕩邪凝魂於祕術馳妙於餐霞雲梯非遠天路還賒情恒寄於帛丿糸邈願有託於靈槎陰陽作炭兮天地為爐陶甄庶類兮品物昭蘇上法下象兮智者紀圖終宵盡日兮工人製模圖之如何情專思苦模之若何聚沙凝土金堅以為樣度窕槬而成規矩設機關立扉戶憑虛無以蹙凝疑士冖䂞籥之有主尊鳧氏之宏規鑄龍宮之信鼓青蓮妙果兮蒼生所怙檀施如山兮縱觀如堵回祿用事兮烈氣激揚飛廉呈巧兮熾聲赫怒沸沸渭渭奪於日光霍火蒦燐亂青熒蒼黃元穹之星夜落焉可氣適伶人奏樂以先譟法侶焚香而接跡願觀者攢眸以侔象赤城之霞朝起無以比方疑崑崙之飛爍吸晴天之太陽聚徒侶走匠石煎金膏煉鉛液青白之氣畜精粗之氣適伶人奏樂以先譟法侶焚香而接跡願觀者攢眸以奔騰畏焮者連袂以辟易開竇泉注歸模電射固倏忽而成功乃踟躕而方闢攢鍤開長繩曳衆力拔㣥扛制歸禪關之清淨亂埃窞之堙瘞禮含稟說之文旋起熊龍之勢懸於簴鼓於宮氣淩厲聲沖沖清塵濁警昏蒙惟良匠之鎔鑄尚其如此况鴻鈞之陶冶行乎至公大哉乾元神不可測其內也剛其外也直直所以保合太和剛所以運行不息故王者奉之而垂化君子體之而進德者也原夫天者乾之形乾者天之名用九以則得一而清名也者純陽之經形也者太無之精語其動兮孰知其動語其行兮孰知其行得不詳其所由稽其所以歷土圭以窮妙因渾儀而探理左出右沒不行則何以變三辰之度上騰下降不動則何以為萬物之始履柔兮居常配坤兮秉陽笠也誰覆弓也誰張四德雖具未足以擬議十翼雖廣未足以披攘微乎哉得於幽者道盛乎哉得於道者王帛丿糸帛丿糸若存戶樞不蠧較之則火井易滅當之則金柅難固持剛靡失既兼柔克之資用壯罔虧亦取易知之故是以為君為首為金為冰杳冥兮不慮乎盈縮寂寥兮何有於騫崩喻彼成形是顯飛龍之象旌其致遠且推良馬之能且夫天也者陽乾也者健窺之於裏則其象歷歷膽之無表則其容慁慁不言非涉於可名不拔方知乎善建大道非物豈容媧后之功小說惑人何傷秦宓之論皇家恩流品物禮達上元垂文明畫一之令秉神武不殺之權推之蕩蕩守之乾乾儒不知其易一作異信所謂親上而法天者歟天贊厥德惟伯牙與鍾期一則能清師曠之耳一則能調園客之絲愜易象斷金之義應詩人伐木之詞審爾律呂不爾瑕疵何千載之見遇使二妙以同時且琴者所以納正禁邪弄者所以協情和性必藉其手敏亦假其心靜使音無所容於姦聲安得惑於鄭若然者信可謂能彈而復思乎善聽能彈奚若播於往古善聽伊何奏難莽鹵所以協律之六應聲之五故將中感於天地豈惟外合於匏土不爾何貴鍾期之聽何尚伯牙之鼓緬想二子徽音不瑕冥合匪慙於郢匠絕藝方超於瓠巴賴爾能聽知子有嘉苟解揮官以按徵豈勞樹羽與崇牙乃若被褐懷珠當年入賦合絲桐之響希爾促柱有金石之音思君惠顧以聲韻當於清彈以詩書同乎雅琴顧惟小人之述得迴君子之心儻能順聽欲仰訴於知音余少抱甚疾專意修養至於金石服餌亦嘗勤求竊見時之好事者不顧貨財大修鑪鼎謂河車立成可變土石謂金砂立化可壯筋骨然而往往有為藥所誤醫救莫及何哉豈根源不正歟師法不明歟致終始不相副如此之甚也余因覽道書偶見九霄劉泓丹藥要訣乃喻俗徒都未窺至道之毫未而妄自誇衒誑誘時人凡所施為無非自伐之捷逕能無悲乎真仙之言定不誣矣余久懷滯惑方困於是今故抉其要語書之座隅目之曰元解錄冀觀覽之時疑撓盡釋雖未達金液守身之術當必免毒丹傷命之虞亦天年之幸也如有同我斯志者固願攻其未悟耳大中九年乙亥歲五月十七日甲子纂故祭酒崔十八丈綽嘗與寇章賀拔惎皆以賞鑒相尋每稱服膺虞書多歷年所自會昌以來時觀斯帖因致其真隸有加頃年崔丈每送予兄弟下第東歸必云此去獲見汝南帖亦何減於昇第邪所惜者闕其銘文耳咸通二年春於存神室輟獻子凝良足嗇愛也歸耕子者士之不遇所稱也余幼習文武之藝好奇異之術洎乎立身之年過梁適鄭遊嵩少之間憩於大樹下遇一老叟年八十許眉目疎朗神氣閑靜因揖坐石上移時與語多話虛無出世之言謂余曰叟居不遠可一往焉余唯唯同之見所居皆古木修竹門逕閴寂室無人矣余因徵黃帝昇天及戰蚩尤使風后鑄鐵照法叟曰子聞神仙鍊丹點鑄三元天地人寶照否曰未曾聞也遂稽顙再拜願先生指陳幽賾以去塵惑曰觀子骨氣異常人也可以教授乃於囊中出其文皆古篆也曰此非子之身之事乃太平天子之所為也若遇道德淳素合天地心四海晏如民有謳謠之詠可依法鑄之余稟是誡叩首再拜俟來旦叟曰此非子久處宜去也後三紀復相見余告辭再拜之洛祕之肘腋之間未敢輕傳其非人也時唐天復二年仲春月歸耕子述余幼親墳典長慕烟霞比跳龍門欲攀蟾桂著錦衣於世上騎躍馬於人間置立機關開張造化榮沾父子福及子孫體仁義為當代之楷模用禮智作將來之規矩夢未同於傳說釣不遇於姜牙而遂灰心志求仙道詩書陡罷筆硯頓拋見寰區之多少是非覩朝市之無限得失榮如石火貴似浮漚不假高低瞥然聚散尸行鬼步非聖哲莫可知之動肉活塵非賢良莫能分別邇後專尋幽洞遍訪名山歷嶮登危二十年矣自梁貞明歲遊於泰山頂高松之下忽見一人形容異俗言語非常惟稱萬代之師祇道九天之主余遂稽首長跪謂余曰汝有仙相方得遇吾付汝學仙之門汝能受否余又長跪感謝形言又曰吾請汝翦髮插血為盟與汝屈伸吐納鍊形之術又曰兩紀之內輒莫傳人傳之非人彼受譴責余又長跪忽然不見余自後嘗依次第不輟功夫但是微言無不神驗余既承師命合祕天機兩紀將終許傳人世而乃重修舊則翻作新經寫之市朝藏諸山石後來學者得之幸哉一氣未分三才同源清濁既異元精各存天法象我我法象天我命在我不在於天昧用者天善用者延氣和體寂守一神閒靈芝在身不在名山反一守和理合重元精極乃明神極乃靈氣極乃清清氣為神濁氣為形因氣而衰因氣而榮因氣而滅因氣而生喜怒亂氣情氣交爭擁隔成病神形豈寧鍊陽消陰其氣自行其神自靈以正遣邪其患自平乾坤澄靜子後午前閉目平坐握固溟然納息廬中吐息天關入息微微出息綿綿以意引氣腑臟迴旋然後呵之榮衛通宣但有不和遣之踵前呵五六度無疾不蠲凡欲胎息導引為先經脉不擁關節不凡或如射鵰側身彎環或舉腰背如蟾半圓交指腦後左旋右旋脛手足氣出於指端擺掣四肢捉搦三關熟摩尺宅氣海亦然叩齒集神合眸固關冥心放骸任氣往還覺氣調勻擁塞喉關擁塞則咽三咽相連轉舌潄入咽下丹田以意引氣令聲汨然一咽三咽再咽如前三十六咽胎息成焉大道無為而無不為若能無為是名無思若能無思萬物是歸法象無二不假施為不寒不熱不渴不饑妙中之妙微中之微恬然無欲以道自怡懷道君子銘之佩之上闕兼左驍尉大將軍知內侍上柱國虢國闕像銘上闕之師闕三字來亞如來之聖闕莫不心闕二字寂果示人緣闕四字六闕二字除三有窺法門闕三字肇苦海之津梁則虢國公闕三字其人也立身幹蠱英謀駿闕一字橫行邊徼追馬援之功闕二字庭闕一字盡曾參之養自保釐闕五字心揚名顯親忠孝闕一字矣闕二字浮闕一字祿位深鏡真如覺五蘊闕二字空闕二字非實知三世之闕一字法闕一字相何闕一字雖迹混朝倫而心闕三字以為闕一字雘之飾點風塵闕七字涉歲月而先朽闕九字日奉為烈闕八字先闕二字先妣闕二字夫人闕四字鑿石龕造十闕三字世闕四字藏菩薩各一軀闕五字好闕一字就真容儼然闕三字幻闕一字紺闕一字垂瓔珞以嚴身闕三字城聳蓮闕一字以承闕七字神足周於塵闕九字名而闕四字於戲闕七字忽向非抗迹崇高宗闕二字勝曷能成就丕業福佑無窮闕一字以鏤功實以敷德重宣此義而闕一字偈云於帷最勝二菩薩大庇衆生臻解脫妙身無碍本通達闕四字存像闕一字峩峩靈山山幾重一雕一琢現闕二字逶迤石路邇曾峯攝心迴向闕一字相從純孝闕三字竭力殑伽沙闕四字謹案碑在洛陽龍門撰人名已泐銜亦不全惟存慈源縣開國公徐撰八字觀夫三皇五帝氏王夏殷周漢氏作淳源竭而不流澆俗紛其方扇雖孔門將聖老氏谷神猶龍之道德西浮歎鳳之詩書東返竟不能庇交喪拯闕遠驅彼黎俗登茲仁壽徒存紫氣之言終絕素王之筆曷若金身化跡超十地而孤尊寶樹應期乘四輪而廣運大雄有已見闕一字生溺之苦海於是虖橫寶筏而濟之大雄有已見諸子迷之朽宅於是虖駕舟杭而出之視之以五蘊皆空明之以諸漏已盡洎玉毫騰彩挩賢功之象位金儀入門現神通之日月經傳白馬眇闍崛以移來剎起青龍蘊閻浮而錯峙遂令有國有家者得其道而四海以寧元元蠢蠢者得其門而六塵高謝豈與夫向時之二教同日而言焉神寶寺者寶山南面岱宗北陰岡巒隱轔而石壁萬尋林藪蒙蘢而澗壑千仞貔豹躑躅人絕登臨虺蟒縱橫鳥通飛路粵有沙門諱明不知何許人也律師德隆四輩名優六通僧徒興起㣥生宗仰晨遊棘圂四念經行夜宿榛檀六時禮敬貔豹枕月沓禪心寂而不驚虺蟒縈身戒定澄而不亂水瓶朝滿羽仗夜來事跡非凡故非凡測親題節記自敘因由曰明以正光元年象運仲秋於時振錫登臨思同鷲嶺徘徊引望想若雞闕欻彈指發聲此為福地遂表請國主驅策人神立此伽藍以靜然為號自梁齊已來不易題榜屬隋季經綸生人板蕩革鼎推變真俗盈虛今之所存殆將半矣至我大唐御宇重遷九鼎再補二儀四海廓清萬邦一統用光正道建三寶以傳燈化洽垂衣統㣥生於壽域迺格命天下有固廢伽藍先有額者並使申修於時有鄉人王即應荅州縣申聞以此寺北有寶山東有神谷因改為神寶寺爾其寺也望魯開基臨齊作鎮堂宇宏壯樓閣岧嶢砌塈瑤璜階塗金碧法容有睟瑞相無違發妙彩於天金罄奇遺於龍石手輪含字臨珠綴而披網眉宇舒毫鑒璧璫而上月寺內有石浮圖兩所各十級舍利塔一所衆寶莊嚴胡門洞啟石戶交暉返宇鏘鏘飛檐䡾䡾半天鵬起遙遙烟霧之容壹地龍盤宛宛丹青之色挹朝霞之昈昈湛夜月之濯濯風牽則寶鐸鎗鎗日照則花盆皛皛迢迢亭亭鬱鬱青青晧晧旰旰煥煥爛爛遠而望之炳若初日照灼皎扶桑近而察之一似素雲霮䨴闕一字夕陽方之雁塔有似飛來譬以化城還疑湧出實瞻仰之形勝是歸依之福田寺內先代大德僧明幹提智慧燈照無明闇僧彥休護惜浮囊微塵不犯僧元質積行勤苦軌範僧倫僧神解高樹論幢摧諸憍子僧宏哲持經得驗舍利猶存僧惠沖殷念西方期心安養所造功德觸類滋多僧景淳釋戶綱宗元門樞紐僧貞固勵心宏護結念修營僧灋將齠齔出家童顏落彩三齊負笈猛探麟角之先九洛求筌迥出牛毛之外並俱沐聖恩僉成道器忽鸖州風急鹿苑霜飛早謝傳燈空懸錫影現在諸大德寺主僧慧珍戒珠澄月道骨含星堪忍作衣灋空成座六時禮念脇不至床壹食標心口不再飲是慈悲父是良福田廣濟蒼生普心供養大都維那僧惠沼標格千仞崖岸萬里吐妙灋於脣吻納山岳於心胷縱橫道門洞達無礙上座僧塵外戒香紛馥有賓頭之盧之軌儀都維那僧敬祥慧劒如霜繼舍利弗之談說僧敬崇奈苑良材橫愛河而濟㣥溺僧智山祇園梓敞灋宇而庇蒼生並騰麟俊藪矯鳳仙途飾厚柱於春臺撫定輪於秋駕祥烟飛錫來遊歡喜之園宴坐經行實名和合之衆故同鐫寶碣高旌福門大唐開元神武皇帝陛下朝宗萬國整頓八紘金鏡合七曜之輝玉燭和四時之氣慶雲澄彩瑞鳥呈祥仁動上元力侔大造瀚海天山之地盡入提封龍庭闕穴之鄉咸沾教化封金岱嶺刻玉僊閭榮鏡乾坤光華日月刺史盧諱全義門有卿相家襲銀璜強幹則不發私書肅清則遽然官燭矜孤恤隱愛士慕賢故能詠入來蘇謌登至晚山仕縣令梁曰大夏幹局貞敏神情警悟風琴寫韻則瑞雉爭馴冰鏡澄清則祥鸞自舞誠梵王之福地真釋帝之名區爾其澗戶深沈山扉䆗窱玉床霤乳問抱朴而頻疑石壁鏨經訪嚴遵而不識奇卉怪木如窺須達之園瑞藥僊苗似入提伽之境象王獻菓下甘露於珠盤鳳女持花拂靈香於寳帳迦陵頻伽之鳥百囀閒關優曇鉢羅之花九光淩亂漢皋遊女對玉洞以傾心季粱賢臣仰瓊堂而頓首庶使文殊過去憶妙說之清塵彌勒下生見神功於貞石式鐫寶碣而為頌云大雄降跡蔥山本元奄有三界非無二門不生不滅若亡若存遍看㣥有無如我尊其一雁門惠遠罒炎刂賓羅什明公繼茲伽藍此立俗戶易窺真門難入遁闕一字龍象前後相及其二大唐受命當宇握鏡化洽萬邦功齊七政綠圖舒卷紫雲迴暎惠日再暉薰風在詠其三門庭華敞房宇輪奐蓮臺畫閣危樓飛觀竹韻宮商花然灼爛僧衆虔仰士女稱歎其四亭亭妙剎灼灼精廬彫盤瞰野鏤檻淩虛珠懸日淨鐸迥風徐闕一字甍棲鳳倒井銜蕖其五峩峩寶碣落落神軒邪山整岫苦海澄源錦雲震烈縠霧風翻此中何地給孤獨園其六夫圓清上廓方濁下凝幽源叵究邃理難窮天長地久用之不勤矣則有志孝高公者渤海人也承子闕一字之後允者乎有典有則貽厥子孫祖代綿遠貫於任邑者闕一字曾闕一字諱匡祖諱昇考諱騰云公貞信廉讓闕二字克柔幼尚孝悌文武俱全長而慕道不及闕二字門傳闕一字善家瞻三乘常嗟有漏之軀闕四字之果思昊天之罔極感劬勞之難報闕五字心易摧樹闕一字靜而風難止伏恐阿毗闕五字苦海難登於彼岸以助幽冥匪福闕六字鹿苑志慕蓮官即見當村古院闕五字露光容遂乃發心修飾礱像建崇梵闕四字心無捨晝夜裨補裝嚴功纔畢矣遂即闕三字其美石在醜以訪良工雕琢磨礱刻之闕三字龕一佛二菩薩阿難迦葉裝嚴皓相多闕七字願三代先亡俱生淨域見闕八字於吉慶使覩相兮佛教彰呈同闕五字無滅乃為頌曰造化陶甄後植衆軀生休死闕一字萬品一途儼兮其若容渙兮冰將釋使萬古兮歸心惟千秋兮躅迹歎苦海之無邊藉法舟而拯溺瞻隟車之易枉望屺岵而難陟心不悟兮恒沙感緣覺兮瞬息謹案碑在山東濟寧州晉陽山下張家村撰人姓巳泐惟存街名云鄉貢進士闕宏仁撰府君諱昭字昭吳興人也曾祖獻大父言厥考珪皆不徇微祿浪跡自怡善效風規未嘗隕德是以逐勝避地就土築業乃貿遷涇川君之昆季有四而君嗣其嫡頃因天寶喪亂遂羽翼分飛花萼隨風枝葉離散君守道自適而儀範特殊諷闕以和清虛肅慎積財能散義與道合禮不越路信聞於人闕二字尚靜物我如一君夫人潁川汪氏婦德貞操蘭桂同心禮適施君有一子一女男字清河孤標慈孝稟性溫厚亦可比於高孟也竭力侍省嘗無慍容膝下之報纔申溫清之年不待夫人先君而故已五稔焉心喪之憂始平昊天之痛旋迫君以元和四年夏五月遘疾闕二字方術不闕荏苒六旬藥石不救於膏肓灾祟乃沉於骨髓皇天不祐殲於淑人以其年秋七月十九日終於涇之南第春秋七十有三號天叩地泣血無訴嗚呼光陰不駐世情倏忽朝晞薤露夜壑藏舟平生風流一旦已矣然則士庶有制幽明路殊舉厝從時塋兆將備龜筮習吉窀穸乃修絳旐引車哀歌即壙以是年冬十二月一日歲在乙丑朔次壬申祔窆闕一字於故夫人之墳東禮也原墅鄉里巳載夫人之誌焉雖非合葬有若同穴亦恐年代闕二字將來無聞乃刻石為文以昭其墓也銘曰荒墳峩峩邱陵匪他夫妻並穴瘞此南坡颯颯青松帛丿糸帛丿糸女蘿日月其逝恐易山阿誌於貞石以讚哀歌闕姓庠闕四十五字之後代有其人闕十二字曾祖諱豪皇不仕王父諱旭皇仕蘄闕五字府君諱若皇仕左武衛率府長史君實府君第四子也闕三字而上或仕或不與時昇降自晉室東遷衣冠南隨君之闕二字因渡江而家越之山水清秀難偕乃祖乃宗閱是勝概卜居蕭山伯氏仲氏官爵相繼或闕庭班列或郡縣清途門風禮讓鄉里軌儀君承家代之休美稟闕二字之靈異生而好學長而能文尤工於體物舉進士亟敗於垂成獨闕一字名闕一字時闕二字之無何風樹不靜家禍遽鍾萬里奔喪骨立柴毀乃闕三字親闕一字勉之方微進粥食及禮制外除是歲將再就鹿鳴闕一字中闕四字無徵奄隨物化國喪賢良家亡令子嗚呼人之闕一字齡闕一字遐闕一字一友孰主張是而不繫於善惡孝悌也詩歎淑人君子胡不萬年謂是闕一字也以咸通十年歲次己丑四月戊子朔廿二日己酉終於家享年四十九娶河東裴氏先府君諱懿登進士第從事陝郊終使下員外君之內子即員外長女也有男俞九女二人男未及冠長女適於鍾氏次未及笄藐爾諸孤朝不謀夕鴒原對此何痛如之以咸通十一年二月廿四卜於昭元鄉昭元里社頭村之原也庠嘗射策春闈竊在下風熟君德聲及此承乏數月相從一篇一酌每至促膝無不移時歡猶未艾悲又間之嗚呼哀哉天亦茫茫殲我良友邱壠既卜執紼有期願刻樂石以表永別乃為銘曰嗚呼公都碩學鴻儒修身無玷立行不孤今其逝矣可勝歎乎其一幾從鄉薦累敗垂成天耶命耶有德無名歿而不朽永播烈聲其二松兮桂兮風雨摧之文章世業一旦已而銘茲貞石川谷難移其三
