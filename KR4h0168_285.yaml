front:
  text: 全唐文欽定全唐文卷二百八十五張九齡三
  hash: sha256:f58d7f17866439aa728781c118efc06d7145345266200cb375ef8b56ca7dee06
body:
  text: 敕新來投降奚等汝本小蕃不自存立頃年依我稍得安全而常持兩端遽即背叛忘恩負義豈是人心今者聞汝復歸亦應知過仍緣困蹙未免嫌疑汝若誠能洗心永以寄命便令處置汝等當須一一聽從即捨往愆更期來效官賞諸事皆如舊日各宜自勉勿不知恩比嚴寒汝等部落百姓並平安好遣書指不多及敕契丹王據埒及衙官可突于蜀活刺史鬱捷等順道則吉惟智能圖逆節即凶豈愚所覺如卿頃年背誕實養禍胎今而知之亦猶未晚因是轉災為福因敗而成去百死之危保萬全之計則昔者之去何其悖也今茲復來又何智也皆是卿素有籌略本於忠誠率先種人拔於死地自爾之後更有何憂朕於諸蕃未嘗負約況於卿等更有舊恩聞卿此來豁然慰意一則兵革都息二則君臣如初百姓之間不失耕種豐草美水畜牧隨之更無外虞且知上策人生自奉誰不求安保此永年一無他慮在卿所見何假朕言部落初歸應須安置可與守圭審定務依蕃部所欲想其沃饒之所適彼寒暑之便無令下人有所不愜也冬末寒甚卿與衙官軍吏刺史已下及部落百姓並平安好遣書指不多及敕契丹都督泥禮往者屈烈突于凶惡無心憂矜百姓背叛於我終日自防丁壯不得耕耘牛馬不得生養及依附突厥而課稅又多部落吁嗟卿所見也李過折因衆人之忿誅頑凶之徒諸部酋豪相率歸我巳令隨事賞賜亦云且得安寧過折封王豈直賞功而已亦為百姓衆意賴其撫存不知近日巳來若為非理亦聞殺害無罪棒打又多衆情不安遂致非命然卿彼之蕃法多無義於君長自昔如此朕亦知之然是卿蕃王有惡徑殺為此王者不亦難乎但恐卿今為王後人亦常不自保誰願作王卿雖蕃人是當土豪傑亦須防慮後事豈取快志目前過折既亡卿初知都督百姓諸處分復得安寧以否張守圭先擬往彼亦即令便就處置卿應有官賞即有處分夏中甚熱卿及首領百姓並平安好今賜卿錦衣一副並細腰帶七事至宜領取遣書指不多及敕幽州節度副大使兼御史大夫張守圭近有降人云虜騎東下其數稍衆固宜有以待之仍聞兩蕃亦有應接當是妄語終須審觀若保無他便可信任也至於兵馬權略決在一時卿自審量不可懸料然虜騎馳突難與爭鋒會是乘其氣衰然後邀擊一戰取滅或在此舉頃者泥禮自擅雖以義責而未有名位恐其不安卿可宣示朝旨使知無他也並便處置訖奏聞朕當即有處分比秋熱卿及將士已下並平安好今令趙惠琮一一口具遣書指不多及敕李歸國近得守圭表稱奚衙官耨雲輒構異謀攜間部落兼藏突厥仍欲圖卿知卿忠義一心糾逖無隱臨危制變果獲罪人此雖天誘其衷亦是卿誠效克著聞已誅翦是自滅亡朕於諸蕃含養過厚忝預人類亦合知恩但百姓無識易為驚擾安危動靜處之在人以卿才能自應率伏念加威惠勿使猜嫌既去亂㣥當巳寧怗所設官賞惟待有功苟能盡節何憂不賞各宜勉勵以副朕懷秋涼卿及衙官巳下並平安好遣書指不多及敕奚都督右金吾衛大將軍歸誠王李歸國朕比聞突厥欲滅卿兩蕃先敕守圭嚴為防護今聞泥禮巳破凶徒仍慮其收合餘燼復來掩襲卿可與泥禮相為腹背但突厥不盡後患終深卿可伺其歸師乘其喪氣與諸將計會逐要追襲時不可失宜自思之秋深極冷卿及衙官將士已下並平安好遣書指不多及敕烏知義兩蕃既巳歸我突厥仍敢犯邊此其不順誠可殘滅適聞契丹及奚等並力合謀同破凶醜卿亦繼進相與成功此之一捷使其喪氣然鬬防困獸誘備羸師兵家之難慎在終始卿是宿將當自明之若見可則行務須靈敏固在臨事難用速言必圖萬全不可輕舉巳敕守圭與卿計會可須觀釁裁之秋涼卿及將士巳下並平安好遣書指不多及敕松漠都督右金吾衛大將軍泥禮得張守圭表知卿等破賊且突厥此來也其心毒害又甚輕敵人事之與神道可得不有傷殘卿之忠誠加以義勇以順討逆自然必勝朕所懸爵秩惟賞有功況卿赤心復加戎捷然狂賊自遠投於死地今其傷敗必更有謀可須防之重不可失烏知義在彼宜與臨事籌之若須邀截亦與之計會秋氣漸涼卿及衙官首領百姓並平安好遣書指不多及敕幽州節度副大使幽州長史兼御史大夫張守圭北虜猖狂勞師遠襲朕已成料知其破傷得卿上言果如前策然契丹恃我其心不攜以逸待勞取之必也既有克寸捷當更防之困獸猶鬬窮寇勿遏喪敗之餘其氣不振乘此不取後悔難追熟料萬全然後邀擊蕃漢相雜使其莫辨此亦便不可失時不再來臨事指麾在卿審斷也事今若此得算已多勿復匆匆致難於末路卿比疝疾今復何似宜善將療不得自勤秋涼卿將士已下並平安好遣書指不多及敕幽州節度副大使張守圭趙堪至一一具知以國家之威武取敗亡之殘孽泰山壓卵豈其難乎頃者緣卿入朝節制暫闕二虜乘隙相繼叛亡裨將無謀輕兵遣襲遂有輸失挫我鋭氣此故猶細彼禍更深卿可秣馬訓兵候時而動草衰木落其則不遠近者所徵萬人不日即令進發大集之後諸道齊驅蕞爾凶徒何足殲盡平盧信息日夕往來數與籌宜首尾相應令彼醜虜飛走無歸事有預圖臨時合變想卿所悉不煩具言所有奏請並已處分訖夏末極熱卿及將士已下並平安好遣書指不多及敕幽州節度副大使張守圭張奉高下叛奚自取殲滅此等惡積天將絶種故遽誘其衷叛亡相繼及師徒追下皆就誅夷一二年間凶黨必盡亦由卿指揮得所動不失宜明於兵權暗合神道故能致此也安祿山楊景暉湔雪前恥亦云效命鋒鏑之下各致損傷言念忠誠豈妄加獎巳別有處分訖將士陳亡各須弔祭應合贈飾亦巳狀聞聚兵饋糧義不可久秋深木落規略自宜機謀未豫何以除惡永久為患將若之何委卿良圖用息邊甲彼軍少馬巳敕朔方想卿早知之宜差人受領秋氣漸冷卿及將士已下並平安好遣書指不多及敕幽州節度副大使張守圭頃者慰撫降虜每事優給而終不知恩惟圖反噬名雖人類實甚豺狼今所叛亡何苦如此近者聞其家纍多並為我所得惟有丁壯挺身走險樹木既暗弓矢亦全以窮寇失家之心乘深林必死之地若冒此輕進豈云料敵安祿山勇而無謀遂至失利衣甲資盜挫我軍威論其輕敵合加重罪然即初聞勇鬬亦有誅殺又寇戎未滅軍令從權故不以一敗棄之將欲收其後效也不行薄責又無所懲宜且停舊官令白衣將領卿更審量本狀亦任隨事處之所將陳亡之人及戰傷之者並收瘞救療弔死問生寇讐之來豈其獲已言念於此良深嗟悼卿等各秉忠義式遏方隅躬冒險難寧不知此無以小失致奪軍氣數宜激厲以保功名平盧軍儲取能支久若賊口聚食費耗更多早宜處置使得所也今將金瘡藥寄至可分療將士並數令巡問春後漸熱卿及將士並平安好遣書指不多及敕幽州節度副大使張守圭昨史思明往已有處分趙堪適至委曲知之安祿山等輕我兵威曾不審料致今損失宜其就誅卿既行軍於法合爾然此賊初叛勢尚未合乘其虛弱正可追擒直為林暗山深恃不存之地萬一獸駭致損更多以此思之固須且守伺其有隙乘便翦除如此籌宜應是長策且戰者凶事有勝有負無以邂逅遂至蒼黃使我驍雄小有奪氣負罪者既其即戮用命者亦宜升獎彼之小醜何足可除所有奏入即當處分平盧以北動靜須知得其委曲隨事防備委卿在遠一一必由但量宜行之奏未晚也敕平盧使烏知義委卿重鎮安輯兩蕃動靜須知節制斯在而二虜將叛來往有謀曾不是思信其至此又委安祿山輕突挫我軍威不嚴其約是事無豫一朝損失雖悔何追但以卿忠勤復是耆舊雖有過失一切不論實欲盡卿所長收其後效固須易慮以補前闕此賊既叛意其去攻每事須防無失便也一一並趙堪口具夏初漸熱卿及將士並平安好遣書指不多及敕平盧諸軍鎮將士已下兩蕃殘賊餘類僅存朕嘗懷撫柔冀其遷善而數年之內謀叛相仍信是梟鴟固非人也頃者所以列置軍鎮遞為唇齒所虞在此豈欲勞人卿等委身邊疆為國展效遇其反噬得不討除近日安祿山無謀率爾輕敵馳突不顧遂損師徒擇將不良傷人已甚事雖既往義實疚懷凡在平盧其陳亡之人並委張守圭差人弔祭並勘實鄉貫具以狀聞憫彼傷魂當有贈飾興言悼惜久不能忘然此賊比來削弱已甚挼繩繫頸人有其心安祿山之敗緣輕敵太過勿因此畏愞致失後圖立功成名榮貴斯在各宜勉勵共除凶惡夏初漸熱卿等並平安好遣書指不多及敕雞林州大都督新羅王金興光比歲使來朝貢相繼雖隔滄海無異諸華禮樂衣冠亦在此矣皆是卿率心忠義能此恭勤朕每嘉之常優等數想卿在遠應體至懷頃者彼處使來纍有物故水土不習飲食異宜奄忽為災遂至不救言念逝者此其命乎想卿乍聞應以傷悼所以表奏皆依來請夏初漸熱卿及吏人並平安好今有少物並付來使至宜領取遣書指不多及敕雞林州大都督新羅王金興光賀正謝恩兩使續至再省來表深具雅懷卿位總一方道踰萬里託誠見於章奏執禮存乎使臣雖隔滄溟亦如面會卿既能副朕虛巳朕亦保卿一心言念懇誠每以嗟尚況文章禮樂粲焉可觀德義簪裾浸以成俗自非才包時傑志合本朝豈得物土異宜而風流一變乃比卿於魯衛豈復同於蕃服朕之此懷想所知也賀正使金義質及祖榮相次永逝念其遠勞情以傷憫雖有寵贈猶不能忘想卿乍聞當甚軫悼近又得思蘭表稱知卿欲於浿江置戍既當渤海衝要又與祿山相望仍有遠圖固是長策且蕞爾渤海久已逋誅重勞師徒未能撲滅卿每疾惡深用嘉之警寇安邊有何不可處置訖因使以聞今有少物答卿厚意至宜領取春暮已暄卿及首領百姓並安好遣書指不多及敕忽汗州刺史渤海郡王大武藝卿於昆弟之間自相忿鬩門藝窮而歸我安得不容然處之西陲為卿之故亦云不失頗謂得所何則卿地雖海曲常習華風至如兄友弟悌豈待訓習骨肉情深自所不忍門藝縱有過惡亦合容其改修卿遂請取東歸擬肆屠戮朕教天下以孝友豈復忍聞此事誠惜卿名行豈是保護逃亡卿不知國恩遂爾背德卿所恃者遠非能有他朕比年含容優恤中土所未命將事亦有時卿能悔過輸誠轉禍為福言則似順意尚執迷請殺門藝然後歸國是何言也觀卿表狀亦有忠誠可熟思之不容易爾今使內使往宣諭朕意一一並口具述使人李盡彥朕亦親有處分皆所知之秋冷卿及衙官首領百姓平安好並遣崔尋挹同往書指不多及敕渤海郡王忽汗州都督大武藝不識逆順之端不知存之兆而能有國者未之聞也卿往年背德已為禍階近能悔過不失臣節迷復非遠善又何加朕記人之長忘人之短況此歸伏載用嘉歎永祚東土不亦宜乎所令大成慶等入朝並已處分各加官賞想具知之所請替人亦令還彼又近得卿表云突厥遣使求合擬打兩蕃奚及契丹今既內屬而突厥私恨欲讎此蕃卿但不從何妨有使擬行執縛義所不然此是人情況為君道然則知卿忠赤動必以聞永保此誠慶流未已春晚卿及衙官百姓並平安好遣書指不多及敕渤海郡王忽汗州都督大武藝多蒙固所送水手及承前沒落人等來表卿輸誠無所不盡長能保此永作邊捍自求多福無以復加漸冷卿及衙官百姓已下並平安好遣書指不多及敕忽汗州刺史渤海郡王大武藝卿往者誤計幾於禍成而失道未遙聞義能徙何其智也朕棄人之過收物之誠表卿洗心良以慰意計卿既盡誠節永固東藩子孫百代復何憂也近使至具知曲兼請宿衛及替亦已依行大朗雅等先犯國章竄逐南鄙亦皆捨罪仍放歸蕃卿可知之皆朕意也夏初漸熱卿及首領百姓等並平安好遣書指不多及敕平盧節度營州都督烏知義突厥去歲東侵已大不利志在報復復必再來契丹及奚一心歸我不有將護豈云王略頃有沒蕃人出云其見擬東行蕃漢諸軍須有嚴備遠加斥堠動靜須知縱有凶徒亦即無慮委卿在遠實謂得人朕固無憂一任量事渤海黑水近復歸國亦委卿節度想所知之春初尚寒卿將士已下並平安好今令白真陀羅往亦賜卿衣一副至宜領取遣書指不多及敕河東節度副使兼代州都督王忠嗣及諸將士等大叔承慶至知卿遠經賊境晝夜勤勞雖不遇凶徒亦備盡誠效頃屬時暑士馬遠來行李之間固應疲頓諸軍將等各須撫養令其寧息行回之人當有宴勞宜令大同軍即辦宴設及時慰勉夏中極熱卿及將士已下並平安好遣書指不多及敕當州別駕董懲運省所奏王昱及嚴正誨表具知所緣卿父往在當州連年縱酒既加風疢行事乖疏董念封經使具論王昱始奏停廢皆憑實狀不是冤誣後自病亡豈可怨訴所言不直欲信無憑卿久襲冠帶復拘法式寧不知此猶且有詞至於卿身合承刺史比來未授亦則有由聞卿少年未間撫字舉州之衆又藉綏懷若蕃部不安豈虛此位卿若能自勵從此改修父亡子及終不失舊卿表云部落據險幾許無知亦慮惡人因此扇誘幸無他故勿取破亡今故令內使往問部落及百姓等此事虛實還自具名狀聞比極暄卿及部落百姓並平安好遣書指不多及敕當悉柘靜維翼等諸州首領百姓等前者令王承訓往宣問事止當州比其却來云諸州亦有所望州縣一也恩豈不均卿等祖父已來為國守境皆盡忠赤防捍外蕃朝廷嘉之官賞相繼近者處置未當又得卿表所論朕皆依行想皆遂願今聞吐蕃屯結近在安戎比來通和未有深隙計其不合為寇未知何故起兵卿比臨邊各須伺候慮有侵軼損我居人若預圖之保無憂也其董懲運董嘉宗已有處分訖其董念雙羌羌嘉弄等亦即續有處分必須嚴勒蕃部豫備惡人寇讐縱來計無所得我之深策豈不在茲卿等榮貴勿憂不遂今故令王承訓重宣往意比已熱首領百姓等並平安好遣書指不多及敕許齊物近者投降吐蕃云蕃兵已向南取鹽井比已敕達奚守圭蒙歸義訖卿可嚴備勿失事宜應須防守並委量事處分仍遠著斥堠知其有無有則從權無則仍舊慎勿生事騷擾邊人秋中漸涼卿及吏人已下並平安好遣書指不多及敕隴右節度使陰承本使人范正顏至省表具知朕於吐蕃恩信不失彼心有異操持兩端陰結突騎施密相來往事既醜露去以怨尤乃云姚巂用兵取其城堡略觀此意必欲為惡必不得先舉但須嚴備遠加斥堠察其動靜若形兆已見馳狀以聞諸處軍城數加戒敕若不稱職速須改換今年交兵新到隴右未經戎事大須訓習在彼處置委卿裁之雖有邊虞固無憂也秋初尚熱卿及將士並平安好遣書指不多及敕蓋嘉運等安西去年屢有攻戰醜虜肆惡懸軍可憂卿深識事宜以時救援先聲既振後殿載揚凶黨之間卷甲而遁使我邊鎮且得休息然此賊為患勢未必已可數與王斛斯計會每事先防彼將自勞衆則離二我因其隙從此可圖善熟籌之勿失便也春晚卿及將士已下並平安好遣書指不多及敕四鎮節度副大使安西副大都護王斛斯及將士等突騎施輒凶暴侵我西陲卿等懸軍遇此狂賊爰自去夏以迄於今攻戰相仍念甚勤苦近者聞在撥換兵少賊多朕每憂之慮遭吞噬又聞兵勢漸合將士同心父子之軍亦不在衆犬羊之類復何能為屢有殺獲固其宜也卿等各負忠勇為國忘身鋒鏑之間瘡痍未免或致物故深用哀傷朱仁惠竟致淪亡良可悼惜具有褎贈以慰營魂福流子孫良亦在此其有頻當矢石每戰有功義可成名勇能抗敵或能出奇以挫凶威並具狀以聞即有優拔自餘戰士盡力邊荒計其積勞又在絶遠至於行賞豈比尋常勉樹功名即有官爵且北山雲間虜衆又疲歸途既難必有攜二張義之將兵若至河西北庭兵又大集滅胡之舉亦在今時可臨事圖之無失便也一勞永逸豈不在茲所奏縱賓軌魏蹇等官及前年第一立功人官並依所請訖告身即差使頒送初春尚寒卿及將士巳下並平安好遣書指不多及敕四鎮節度副大使安西副大都護王斛斯等狂賊經冬犯邊為梗將士守備不釋戈甲言念勤苦良深嗟歎既負忠義為國盡誠懦夫所難志士所重感激增氣視死如歸古人之言今知之矣又聞此賊尋亦退散攻圍既解且得休息朕雖在九重心懸萬里念慮之至想所知之近既加兵惟憂糧貯諸處屯種今復何如逆賊有謀還慮殘暴必須善守無令損失若諸城有糧兵復足用忿戾之虜行應再來勞衆離心豈能無隙乘此一舉蕩滅有期宜善撫我人以待其弊小捷小獲何用此為春晚極暄卿及將士巳下並平安好今賜卿衣一副至宜領取遣書指不多及敕王斛斯得卿表並大食東面將軍呼邏散訶密表具知卿使張舒耀計會兵馬回此雖遠蕃亦是強國觀其意理似存信義若四月出兵是實卿彼巳合知之還須量意與其相應使知此者計會不是空言且突騎施負恩為天所棄訶密若能助國破此寇讎録其遠勞即合優賞但未知事實不可虛行卿可觀察蕃情頗有定否即須隨事慰接令彼知之若舒耀等虛有報章未得要領豈徒不實當有所懲絶域行人不容易也今秋此賊形候何如善須防之勿使侵軼時暑卿及將士已下並平安好遣書指不多及敕四鎮節度副大使安西副大都護王斛斯及將士巳下朕雖居九重不忘征戍況強寇壓境侵軼是虞言念勤勞良所歎悶卿等各懷忠義不憚荒遐以此彌年足見誠節去歲因有狂賊在彼屢有戰亡昨得表言對之愴惻然卿狀但言都數其中不列姓名巳令勘責可速以實報朕當録其死義贈以官榮使異域之功存亡受賞近日狂虜形候如何屯收是時尢須備預更資一熟亦復何憂兼聞吐蕃與此賊計會應是要路斥堠須明事必預知動即無患耳夏晚毒熱卿及將士己下並平安好遣書指不多及
