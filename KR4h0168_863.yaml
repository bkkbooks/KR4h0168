body:
  text: 伏以歷代至理六綱為首一曰明禮禮不明則彞倫不敘二曰崇樂樂不崇則二儀不和三曰熙政政不熙則㣥務不整四曰正刑刑不正則巨姦不懾五曰勸農農不勸則資澤不流六曰經武武不經則軍功不盛故禮有紀若人之衣冠樂有章若人之喉舌政有統若人之情性刑有制若人之呼吸農為本若人之飲食武為用若人之手足斯六者不可斯須而去身也陛下思服帝猷寤寐獻納亟下方正之詔廓開藝能之路士有一技必得自效學攻百端靡不明至故小臣不揆愚鄙欲有陳導於禮樂刑政之內勸農經武之中相今所宜各具疏列其一曰夫禮者太一之紀品物之崇與天地同其節與陰陽順其道協於分藝行於國家本之以忠孝文之以倫義君臣父子夫婦之制冠婚喪祭射御之容朝聘享宴之宜軍旅田獵之事各有宜稱不相侵越所以講信修睦所以洗心防患上得之尊下得之安定親疏而別同異明是非而彰貴賤執之則致福繆之則招悔憲物成教崇政明本未有不繇於禮者也自五帝之後三王以來有益有損或因或革咸有章憲書於册書浩浩千編不可遽悉越在唐室典章頗盛程軌量昭采物酌中古訓垂法百代則有開元禮在紀先後明得失次其沿變志其楷式則有通典在録一朝之事包五禮之儀義類相從討尋不紊則有會要在此三者聖教經制國之大綜也爰自梁朝之後仍世多故典臺之官皆差使於公務禮直之吏悉昧昏於檢按至今每有戎祀之事朝會之期多於市㕓草議定注前後矛盾卒多粃稗臣竊以保殘守闕因狹就寡乃暗主之事非明君所為豈可以光陛下超世之宏圖為大朝千載之盛美也所宜闡崇令猷以立國典綴敘舊書以為邦紀義在精審理資端要可以範圍五帝楷則萬古彰陛下之聖明禮不虛道者也伏請依唐會要所設門類上自五帝迄於聖朝凡所施為悉令編次凡關禮樂無有闕漏開元禮通典之書包綜於內名之曰六周禮俾禮院掌之太常博士如得其人宜久其職年深則兼官在任勿使旁轉如是則助風教而彌隆升典制於將替隱核前軌聲施無窮者也其二曰夫樂者以德為本以聲傳御中出所以導志外揚所以審政有天地辰宿有軌數形色有陰陽逆順有離合隱見天數五地數六六五相合故十一月至生黃鍾黃鍾者同律之主五音之元宮也元宮之諧於仲呂母子也傳於林鍾夫婦也回於大簇父子也聚於南呂子婦也兩陽必爭二陰必乖故抗衡者多異前五相追而後五相隨蓋繇是也一章之中凡有七閏亥未巳丑酉午寅者七閏之正也日有盈縮之度月有遲速之期故或進於前或退於後陰陽之理也六鍾六間十二節凡二十有四位聲氣之大率也平分為七直而略其餘則子寅卯巳未酉戌謂之羽子寅辰午未酉亥謂之宮子丑卯巳未申戌謂之角子卯辰巳未酉戌謂之商此四者靡靡成章峻而清厲鄭衛之音也與夫推歷生律以律命宮九六之偶旋相為宮三正生天地之美七宗固陰陽之序者於其通人神宜歲功生成範宜之德紀協長大之算則精粗異矣在乎審治亂察盛衰原性情應形兆則殊塗而同歸也三正者一為天二為地三為人七宗者黃鍾為宮大簇為商姑洗為角林鍾為徵南呂為羽應鍾為變宮蕤賓為變徵角為木商為金宮為土變徵為日變宮為月徵為火羽為水龍角元龜天豕井侯主乎角平亢河鼓樓聚輿鬼主乎商天根須女庖俎鳥啄主乎宮辰馬陰虛耗頭天都主乎變徵大火兵封天高鳥翼主乎變宮龍尾元窒四兵天倡主乎徵天津東壁參伐輹車主乎羽角之數六十有四商之數七十有二宮之數八十有一變徵之數五十有六變宮之數四十有二徵之數五十有四羽之數四十有八極商之數九十陽之數一百二十有八陰之數一百一十有二五音之數畢矣神無形而有化處乎聲之門故昭之以音合之以算音以定主算以來象觸於耳而激於心然後可言其樂也其音五其聲十二其調六十雅部之樂也其音四其聲八其調二十有四胡部之樂也隋唐以來樂兼夷夏天寶之世雅部大備寶應之後音律漸衰郊廟殿廷舊事失次洎黃巢蕩覆京兆鐘磬皆毀龍紀返正之歲有司別創樂懸乘風雖存旋宮何在音範寖失至今闕然豈可以一時偶失之事為百代無窮之制何以訓正四方綏和百神軌物垂則示人之極也昔唐虞歷載頌聲方作文武相繼樂教大同陛下布昭聖武彰信天下宗社靈祗聿監明德所宜憲章成式不失舊物原始以要終體本以正未使樂與天地同和禮與天地同節伏請命博通之士上自五帝迄於聖朝凡樂章沿革總次編録凡三絃之通七絃之琴十三絃之箏二十絃之離二十五絃之瑟三漏之籥六漏之簥七漏之笛八漏之箎十三管之和十七管之笙十九管之巢二十三管之簫皆列譜記對而合之類從聲等雖異必通編於歷代樂録之後永為定式名之大周正樂俾樂寺掌之依文教習務在齊肅如是則可以移風俗和上下和順之象著則嘉盛之德備則六變至幽深九奏達高明知樂之為大者也其三曰夫政者正也以正率下下思盡誠則上無闕政人能持政非政持人若失人而務政則雖勤而何益故人道敏政政在擇人擇人之先自相而始登庸廊廟則有經啓措置之權八侍帷幄則有將近承弼之任機事攸綜號令攸發平章於百揆維制於四方不可不重也唐末政出中要輕於爰立才處輔相之任便兼公揆之官卿大夫奔競公行禮讓道息未得之日則以致身富貴為馳騖既得之後則以與國休戚為憂虞乃三緘於統要之司獨善於兼濟之職但思解密勿之務守崇重之官逍遙林亭保安宗族於身之謀甚利於國之效如何方今宰臣實罄忠力燮和元化則歲以之豐稔攸敘彞倫則時以之雍靖上無闕政下無異議固能明舉賢才羅濟經略也伏請令宰臣於南宮三品之中兩省給舍已上有能經營國家寧衛社稷者具名以舉若陛下素諳才業上符定制則輔相公揆之授誠亦得宜陛下嚮不知名或官品未稱則令以本官權知政事若尚書承郎權知政事則兼散騎常侍之官陛下歲年之間察其為作如能興利除害獻可替否進賢才退不肖則遷其官加其秩官高者則受平章事未高者但循資而轉且令權知如其非才即便守本官罷知政事讓其舉主令廷謝知過亦繇子玉敗軍令尹當責之義也書曰試可乃已又曰歷試諸艱今班行之中有員無職者大半可令量才授任臨事制宜出則以公務效試入則以舊位登敘任事者有賞不任事者當黜黜陟既明天下自正此則為政之道畢矣其四曰刑者五行之鞭策五性之權衡下民之隄防有國之紀律自古五刑之設期於無刑仲尼曰民有輕辜必求其善以赦其過民有大罪必原其故以輔其化如有死罪期使之生則其善也刑肅俗弊禮謂疵國勝殘去殺傳稱善人昔漢文斷獄四百殆致刑措唐朝貞觀之世歲決死罪二人今陛下恤刑慎獄義權情恕非不至也而天下冒禁麗法者甚衆殊死大辟者頗多蓋繇未塞其源而理其著者也省刑之要厥有二端一者謹吏二者息盜謹吏在乎責長息盜在乎類取吳姬㣥笑孫武加戮於隊長此責長之明效也襄民不道班伯得賊於首豪此息盜之良術也夫一縣之政總於令長令長正下吏自肅一州之權統於牧守牧守繆僚屬必濫濫之與肅上使然也近代下民之訟多訟令佐敢訴牧守十中或一訟令佐者皆得理察訟牧守者十無一問縱或詰之而歸罪陪隸者衆矣斧鉞不用刀鋸日弊古人恥之典刑不阿貴賤貴猶當罰賤者自戒如是則官吏畏法刑損其半矣而又除其寇盜使無逸越除盜之術大概有三一者使賤人徒侶自相糾告糾告不虛則以所告賊産之半賞其告者或一人能告十賊亦以十賊半産與之親屬之間此許容隱在於用權救弊亦可暫更今後有骨肉為非許令首告然所被告者不可令至極刑傷宗族之情失風教之義只令通指同行徒侶則除惡甚多骨肉所首之人特與疏放如是則同惡自相疑阻爭先於陳告骨肉欲保其親競來於原首此息盜之上策也二者如鄭州新鄭一縣團結鄉社之人名為義營分立將佐一戶為賊則纍其一村一戶被劫則罪其一將大舉鼓聲之所壯丁雲集賊徒至多不過一二十數義營所聚動及百人賊人奔逃無有免者見今鄭州封內唯新鄭獨免敓勷頃歲尉氏強民潛往密縣行劫回入新鄭疆界殺獲苦無漏遺豈止自部之中不留凶慝兼令涉境之寇難出網羅此息盜之中策也三者有賊之後村人報鎮鎮將詣村驗蹤團保限外不能獲賊衆罰鎮戌此息盜之下策也如是則姦盜漸息刑又損其半矣何慮漢文之年貞觀之世不在於今時矣其五曰農者至正之道自然之資為邦大本當今急務欲國家之康濟在府庫之充盈欲府庫之充盈在田疇之修闢人力可以課致地利可以計生若地利有遺人力不勸欲邦寧本固化洽時雍不可得也今宰牧怠職百姓怠業曠土不墾履畝是憂但隨宜以耕耘惟天時而是賴苟有水旱其將奈何危殆之機在乎返掌晉朝開運之歲即其驗歟夫欲富國強兵愛民利物興事任力崇德尊道敷至化恢長御革頺風洽豐澤無不繇家給人足而馴至其道也家給人足始於務農務農之原實有三術一曰廣田二曰已債三曰節費廣田則所獲豐羡已債則儲積可保節費則歲計有餘今民不廣田良有以也蓋慮無盡地之稼括為稅簿則并竭所收輸不滿要誰不懼也晉漢二代纍發德音使民多種廣耕只以舊額供賦既種之後旋以見苗計租以至倉箱匱空鄉井愁歎先皇享御之始赦書節文之中亦勸民勤勞不殊前意至今曠隙之地荒萊不開繇於誠信前失民無固志者也夫為政之先莫若著信商君移木豈禮也哉蓋使人信之則無不治也陛下宜散下明詔使民廣田但輸舊租永不簡案上言宗廟以表至誠令州郡懸法之所刻石示民民必信之而田廣矣田廣則多獲多獲則民足王者藏於天下實一國之富完此廣田之上策也小畝步百周之制也中畝二百四十漢之制也大畝三百六十齊魯之制也今所用者漢之中畝若步以大畝之田輸其中畝之稅或額不敷舊則虛加滿之逮於次年而田自多矣此廣田之中策也前所言已債節費利莫大焉今編戶之氓以債成俗賦稅之外罄不償債收獲才畢率無囷倉官有科折之弊私有酺醵之緡倍稱速息半價速賣則利貸一斗而償四斗矣欲民不困豈可得哉此外鄉閭之中嘗有酒食之耗諂僧佞佛相扇成風且瑞雪甘雨和風所致非為一鄉一里委曲而降小民無知競作齋賽一歲之內數數有之是則債利之劫民也將倍於公賦齋賽之蠧民也又等於王租欲民之饒終不可致莫若已債節費歸利於民起於來年不得通債今歲見償之者但令以本債償之留其利餘為民不債之備則民食資半矣夫陽秋之候豺獺尚祭民祭里社自古而然宜於二社之辰得以祭餘共相飲食其餘祈禱散賽之事嚴禁罷之則民食又資其半矣民食既足則民力普存民力普存則穡事敦業穡事敦業財用益豐因其利而利之則國富刑清天下知禮節矣其六曰兵者所以成武功遏亂略行天討順人心混一區宇昭宣文德三五之代不能去兵故軒戰阪泉堯征丹浦西伯戡黎之誥成王踐奄之誓即其前躅也陛下卜世之數莫知其紀五德所正涖萬方之率從未占而孚契人心不戒而謀同時利惟淮南李景負固不賓陛下神略內融大權潛運整軍經武往忽來戎路一巡則八州降附靈旗再指則四塞蕩平歸命者一一皆存來戰者萬萬無免偏師獻捷逮有百數仁贍交背以請命壽春全城而北遷淮上咽喉古來未有命以衆擊寡以尊伐卑以正破偽以強陵弱鮮不克矣然兵道貴速速則惠民在敵境者免驅掠俘馘之無期處內地者免資糧供億之為役荊湖兩浙並有舟師聞其水戰之利勝於淮寇皆未肯協心齊力犄角成功者蓋慮吞韓併魏滅虞兼虢唇亡齒寒勢之懼也陛下宜分命使臣諭其成策錫之以丹書鐵契質之以左宗右社其三方協同大舉如秣陵淪陷南服懷柔則元功盛勳當崇賞厚報俾百世傳襲保其江山旌旗服章僚屬官秩咸用舊制朝廷弗詢彼既得信誓之文又蒙寬大之詔必能稟大君之神算藉清廟之靈祥親督蒙衝橫江長騖李景必分兵禦拒首尾支離陛下乃躬御六師方軌南進駐驛江北圖惟厥成則濠廬等州可不攻而拔矣臣伏覩名律例疏云死刑者古先哲王則天垂象本欲生之義期止殺絞斬之坐皆刑之極也又準天成三年閏八月二十三日敕行極法日宜不舉樂減常膳又刑部式決重杖一頓處死以代極法斯皆仁君哀矜不捨之道也竊以蚩尤為五虐之科尚行鞭朴漢祖約三章之法止有死刑絞者筋骨相連斬者頭項異處大辟之目不出兩端淫刑所興近聞數等蓋緣外地不守通規肆率情性或以長釘貫篸人手足或以短刀臠割人肌膚乃至纍朝半生半死俾怨聲而上達致和氣以有傷將宏守位之仁在峻惟刑之令欲乞特下明敕嚴加禁斷臣伏覩御札應內外臣寮有所見所聞並許上章議論者臣菲才寡識備位曠官仰承綸綍之言聊貢芻蕘之説其一曰伏以設官分職授政任功欲為政之有倫在命官之無曠今朝廷多士省寺華資無事有員十乃六七止於計月待奉計年待遷其中廉幹之人不無愧恥之意如非歷試何展公才伏請改兩畿諸縣令及外州府五千戶上至縣令為縣大夫升為從五品下畿大夫見府尹亦如令之儀其諸州府縣大夫見本部長官如賓從之禮郎中員外郎起居補闕拾遺侍御史殿中侍御史監察御史光祿少卿以下四品太常丞以下五品等並得衣朱紫為之滿日當在朝一任約舊官遷二等自拾遺監察除授回日即為起居侍御史中行員外郎若前官不是三署即罷後一年方得求事如此則士大夫足以陳力賢不肖無以駕肩各繫否臧明行黜陟利民益國斯實良規其二曰為國為家之方守穀守帛而已二者不出於國而出於民其道在天其利在地得其理者蕃阜增積失其理者耗嗇焦勞民之顓蒙宜有勸教伏請於齊民要術及四時纂要韋氏月録之中采其關於田蠶園圃之事集為一卷下三司雕木版廣印頒下諸州流布民間夫水沴所具厥有二理一曰數二曰政天地有五德一曰潤二曰暵三曰生四曰成五曰動五德者陰陽之使也陰陽者水火之本也陰陽有常德故水火有常分奇耦收半盈虛有準謂之通正羡倍過亢極無不至謂之咎徵二者大期率有常數除之主始於淵獻水之行紀於九六凡千有七百二十有八歲為浩浩之會當是時也陰布固陽澍雨天下百水灌注漲其通川岸不受餘則旁吞原濕科坎平概則漂墊方割雖堯舜在上臯夔佐政亦不能弭其沴也過此以還則係於時政如其后辟狂妄以自率權臣冒昧以下專政不明賢不章則苦雨數至潦水積厚非陰陽之數也貞元壬申之水非數之期乃政之感也德宗之在位也啓導邪政狎昵小人裴延齡專利為心陰潛引納陸贄有其位棄其言由是明明上帝不駿其德乃降常雨害於粢盛百川沸騰壞民廬舍固其宜也王者苟能修五政崇五禮禮不瀆政不紊則五日一霏微十日一霂十五日一滂沱謂之時雨所以正五運之制節占象晷刻無有差爽則神農之世其驗歟穀字秀實邠州新平人本姓唐避晉祖諱改焉起家校書郎纍拜中書舍人仕漢為給事中仕周為右散騎常侍顯德初授戶部侍郎改翰林學士三年遷兵部侍郎加承旨六年加吏部侍郎入宋纍官戶部尚書開寶三年卒朕以汝高謝人寰棲心物外養太浩自然之氣應少微處士之星既不屈於王侯遂甘隱於岩壑樂我中和之化慶乎下武之期而能遠涉山塗暫來城闕浹旬延遇宏益居多白雲暫駐於帝鄉好爵難靡於達士昔唐堯之至聖有巢許為外臣朕雖寡薄庶遵前鑒恐山中所闕已令華州刺史每事供須乍返故山履茲春序緬懷高尚當適所宜故茲撫問想宜知悉陛下嗣位之元年歲次甲寅薄伐太原興六月之師定王業也虎賁振旅兵渡孟津汜水獻紫芝三莖煜煜分化惹度關之氣越三載歲在丙辰親征淮夷破十萬之衆宣武功也戎輅旋軫途次商唐潁川獻白兔一頭皎皎效質凝照社之光謹案瑞應圖曰王者恩霑行葦則紫芝秀五行傳曰國君德及昆蟲則白兔馴上宴息之暇有時臨玩覩禎祥而修德善馴擾之遂性紫者昭萬物肇生之數白者叶太素返朴之義芝為瑞也左盤右屈而自然成形免之異也或白或蒼亦不常其色豈可使曠代嘉瑞來者無聞今聖君儉德罷露臺至仁祝疏羅重林衡不時之禁則草木茂矣崇宗廟礿祭之禮則禽魚樂矣若然則朱草蓂莢將擢秀於庭除丹鳳麒麟豈空遊於郊藪下臣不佞再拜作頌頌曰美哉靈草邈矣明視慶上帝之所臨昭王者之嘉瑞考其詳稽其事芝為草也豈奪朱而效靈兔乃獸焉取守黑而為異徵其薦瑞之日俱在回鸞之次酌物情順天意吾君當垂衣而治臣任監察御史日留臺西京竊見臺司詳斷者至於夫婦之間小小爭訟動引支證淹滯積時乃坊市死亡喪葬又須臺司判狀奴婢病亡又須檢驗人吏貪狡因此邀求動經旬時不遂埋瘞是臣目擊常嫉弊訛者竊以稼穡為生民之天機杼乃豐財之本是以金根在御王者用三推之儀鞠衣載陳后妃有躬桑之禮則知自天子至於庶人不可斯須忽於農桑也又司馬遷著書曰齊魯之間千畝桑安邑千樹棗其人與千戶侯等伏見近年以來所在百姓皆伐桑為柴忘終歲之遠圖趨一日之小利既所司不禁乃積習生常苟桑柘漸稀則繒帛須闕三數年內國用必虧雖設法課人種桑且無及也舊木已伐新木未成不知絲帛丿糸欲憑何出若以下民方困不可禁之儻砍伐一空所在如是歲或不稔衣食盡忘飢凍逼身須為㣥盜圖難於易哲王令猷作事謀始有國常務乞留眷覽詢訪輔臣欲望特下明敕此後不得以桑棗為柴官場亦不許受納州縣城門不令放入及不得囊私置賣犯者請加重罪內外臣寮正衙辭謝內則諸司小吏與宰相差肩外則屬郡末寮共元戎接武欲望宰臣使相依舊押班其郡牧藩侯臺省少監長吏等不得令部內本司卑冗官員同班辭謝前任太常少卿伏見本寺見管教坊二舞本戶州縣尹民若不盡免差徭無緣投名鼓舞況正殿會朝已久停廢其見管人數等每有淪亡皆擬填補既不曾教習但虛免差徭伏乞且議停廢敕樂工宜令教習舞郎權且停廢祭法曰法施於人則祀之洛書曰王者之瑞則圖之世稱白傅文行此造化之功蓋後之學者若㣥鳥之宗鳳凰百川之朝滄海也秉筆之士由斯道而取位卿相者十七人焉得不謂法施於人耶王者之瑞耶饗廟食畫雲臺可矣矧山椒遺像乎陟彼高岡慷慨前事松凋宰樹蕭瑟古埏之上伊注逝川潺湲荒祠之下歲月未積棟宇將壞考其由中和初黎民經之而弗勤詢其制長興末秦王修之而弗至人神元感屬在興運今居守佐相太原武公自許下之撫三川也登鄂坂望太室且曰茲邑也周公測景之地土圭在焉吾當正厥躬臨甸民以報天子既下車闢污萊以實倉廪寬獄市以處豪猾繇是十一之稅均三千之條省暇日巡魏闕過天街又曰茲地也成王定鼎之郊王氣猶屬吾當尋舊地舉墜典以壯皇居遂上法象緯以嚴端門構鴻梁而跨洛水繇是知拱辰之位肅朝天之路通三載陟明我無慚德廣順三祀歲在癸丑暮春之初豫因芟除入洛獲謁拜上公趨魏絳之庭金石在列入亞夫之戶棨戟生風初戢我以升降視之禮也復接我以酒漿觀豫志也始三揖而進終百拜而退既豫旋軫相訪政事對曰河橋破虜之勳有京觀在滹水禦守之略有金湯在雖三尺童子盡能知之豫無可述因以白公影堂為説公曰我武臣也惟干戈是執昧俎豆之事幸為我序白氏政績及修葺之義俾後之聞者足以勤為善而嚮令名是吾志也雖百金不吝矧土木乎豫曰彼白公服則儒士也位則文人也當官隸事烈有丈夫志祗於批逆鱗刺權幸塞左道履平坦鎮陽拒命也指中人為制將救日月之蝕則戰士心悅武相遇盜也責京尹討賊犯雷霆之怒則姦臣股栗杭州救旱因農隙而積湖水龍門通嶮出家財而鑿八灘著策數十篇盡王佐之才有文七十卷導平生之志向使得其位而且久行其道而不疑以憲宗之神武可繼文皇也元和之刑政自同太宗也必當華夏宅心上東封之書蠻夷屈膝納藳街之貢豈直擒吳定蜀平一蔡州而已哉言粗畢公聳身長揖而言曰異乎昔之所聞若此則白公之才美實輔相之英者豈徒丈夫耶子其行矣豫果得修之豫歸朝未再旬邸吏捧公書相授具報訖事穀乏口才加之性懶蟠桃拂漢非尺箠可量直以與公問答疏之如右別刊貞珉上闕輔蜀望帝之洪苗楚倚相之厥裔逮於戰國世為史官周崇江漢之祠已疏王爵漢重金張之族遂寵侯封令望不衰奇才間出長江激浪下嶓冡以方舟寶劍騰晶發闕五字積善所宜於有後享富貴者纍朝大勳不可以中微啓茅土者數世事詳圖牒功備鼎彞大王父諱懷清皇任安慶九府都督王父諱敬思皇任安慶九府都督顯考諱建闕六字兼九府都督贈太保公即太保長子也分太白之精稟洞山之英笑腐儒之老一經拜神姝而學五兵懷鼓篋之心行有餘力蘊飛箝之辨似不能言天祐中王室寖闕六字陸之龍蛇競鬬生郊之戎馬成㣥時闕一字宗已合樂闕一字將圖義舉定玉帳一匡之略提金壇百勝之師戰於兩河決平多壘以公人才地望宜副頒條起家闕六字代州副使以勞加銀青光祿大夫檢校太子賓客兼監察御史改遼州副使兼領九府都督同光初莊皇受命梁祚告終騏驎鬬於東陵熒惑入於南斗負闕六字雖曰一家橫戈而猛士守方未安四鄙將寧邊徼特委警巡以九府都督充嵐憲朔等州都遊奕使解職授天雄軍牢城都指揮使遷檢校刑部尚書兼御史大夫上柱闕六字恩遽降時議為輕遙領首城仍兼九府轉檢校戶部尚書潯州刺史未幾改天雄軍步軍都指揮使刺史如故明年遷侍衛彰聖馬軍都指揮使兼九府都督闕六字也八闕一字大定萬國來朝將竇憲於騎軍已平敵國牧寇恂於河內俾惠一方授檢校司空懷州刺史政成轉控鶴都指揮使加金紫階兼和州刺史駙馬都尉虎賁三百闕六字魏闕九重謹門闌於清禁圃田待理漢殿掄材功臣旌佐國之石出牧奉專城之寄渤海守布解繩之政化洽下車淮陰侯有授鉞之才闕一字膺推轂謀於良帥屬在舊勳闕六字鷹揚之勞軾前熊伏寧淹豹變之期齋壇峻而金鼓嚴麻案宣而油幢出漢壘接平陽之第禹河連沁水之封控梁苑之西郊殷乎威望撫國僑之遺俗綽有政聲當四闕六字命之為伯加食邑通前五百戶方司外禦俄迫內艱居喪爰疚於塊苫有司不避於金革大君有命難違燾土之恩開國承家遂奉墨縗之制授起復冠軍闕五字吾衛大將軍員外置同正員依前充節度使列旌旗於衛幕再勵分憂泣風雨於梁山難勝永慕海運方遠峯摧若何遺封章而不忘戴君對符印而猶思擇帥三陽莫辨闕五字之針六合至寬無處問回生之草管輅慊與才之歎仲尼興有命之言名不遂而功不成生何足貴令其終而善其始歿且奚寃以天福七年三月十六日寢疾薨於鎮享年四十闕五字人罷市年光似箭訝天道於張弓日遞高舂輟時情於相杵有詔贈太保喪葬之儀並從加等越明年太歲在癸卯孟夏四月二十有三日庚午歸葬於北京太原闕五字也銘旌前導鹵簿分行何須陶氏牛眠方為吉地不待滕公馬立自得佳城載惟積慶之家須及莫京之允尚魯國大長公主車服有容實殷帝之歸妹穠華闕五字之王姬半枯旋歎於未亡一慟俄聞於晝哭風飄寶匣翻成別鶴之悲塵暗妝臺永結孤鸞之恨嗣子四人長曰彥容宮苑使湊州刺史次曰彥澄彥琪並西頭供奉官幼闕五字州別駕以于公之陰隲門合容車以鄧氏之舊親家宜藏策寵既隆於奕世榮豈讓於重侯近朝以來莫之比也嘻以公之忠肅恭懿宜慈惠和求福罔回見義有勇秉闕五字達招延無間於後生不積財而闕一字務藏書不憂家而唯思報國求諸時彥我無闕一字焉宜乎享大年躋極品上擊九萬里直聳一千尋而陽報無徵天賦有限極公侯伯子男闕六字生而無成守溫良恭儉讓之言得以謂沒而不朽將傳來裔期播徽音合從魯國之褒方盡延陵之美臣才非日地職在闕二字仰闕五字功聞闕一字家闕一字之闕一字德虔遵睿旨強綴斯文屬詞而徒罄揄揚序事而多慚漏闕一字鞠躬抒思再拜銘勳將招岱嶽之魂輒效楚詞之意銘曰闕五字惠且貞事明君兮信而誠藏策書於周廟闕一字征轂於漢宮年既謝兮時正來河方誓兮山告頽訝陰隲而已矣歎陽報而哀哉闕八字帝鄉丹旐悠兮下山陽隔兩鄉之明月陟千里之宏岡龜告吉兮蓍定臧年惟利兮日其長縈蔓草於原上揭豐碑於路旁闕兆鶴且白兮來翔傳千闕一字兮萬代播蘭杜之芬芳昭儉字仲寶京兆長安人後唐長興中進士歷殿中侍御史仕晉纍遷中書舍人周顯德中為翰林學士改御史中丞出為武勝軍節度行軍司馬入宋纍官禮部尚書太平興國二年卒天子君臨四海日有萬幾懋建諍臣彌縫其闕今則諍臣雖設言路不通藥石之論不達於聖聰而邪佞之徒取容於左右御史臺紀綱之府彈糾之司銜寃者固當昭雪為蠧者難免放流陛下臨御以來寬仁太甚徒置兩司殆如虛器遂令節使慢侮朝章屠害幕吏始訴寃於丹闕反執送於本藩苟安跋扈之心莫恤寃抑之苦願回睿斷誅彥澤以謝軍吏
