front:
  text: 全唐文欽定全唐文卷八百六十三儼字望之晉天福六年進士歷左拾遺仕漢為史館修撰遷金部郎中改中書舍人周顯德中纍拜翰林學士判太常寺入宋終禮部侍郎
  hash: sha256:302ce656ec74ecd33d5221753f6595b594ab2ce59437ea5c67f0a848ff089309
  markers:
