front:
  text: 全唐文欽定全唐文卷九百一閲丹陽人官殿中侍御史
  hash: sha256:668f739ab1898873a7537c95504eba5355d19204329773d123f9d3c922e21507
  markers:
  - {type: head, offset: 12, content: 朱閱, id: KR4h0168_NFKB_901-h1, level: 1}
body:
  text: 古者以死為歸也然則豈死者皆得歸哉故有凶肆之徒壓溺而斃貪暴之輩刑戮以亡謂之不得其死不得其死是不得所歸也父母全而生之子全而歸之不虧其身不辱其親是得所歸矣所歸者猶有數品焉有跛躄而歸者有困窮而歸者有憂鞠而歸者有暇豫而歸者有榮顯而歸者有欣喜而歸者佞媚於生前而得其死者跛躄而歸也愚鄙於生前而得其死者困窮而歸也強暴於生前而得其死者憂鞠而歸也三者皆茀其歸路也正直於生前得其死者暇豫而歸也敏達於生前得其死者榮顯而歸也仁惠於生前得其死者欣喜而歸也三者皆坦其歸路也嗚呼公昔有遺德於其生前矣而今之歸也豈有跛躄困窮憂鞠之苦而無暇豫榮顯欣喜之逸哉公歸之道光矣豫感公之知獨來弔作歸解或曰子不識彭陽公而云知豈誣也哉曰公尹洛禮陳商為鄆薦蔡京蒞京辟李商隱豫偶不識公耳公之知豫如春潦之奔壑夏雲之得龍秋弧之發矢冬爐之納火勢豈後於三子哉是則公亦知豫者也何必識然後知乃曰知之也在道之相望爾昔殷湯與周公不相識孔子與周公不相識孟軻與孔子不相識揚雄與孟軻不相識韓愈與揚雄不相識果不相知哉伊尹與夏桀相識比干與殷紂相識果相知哉今天下大國之侯小國之伯豫常識之矣目且相視言亦相交豈得為豫知也哉豫感嘆碑下歸解於是書之鄴宋史藝文志載有賦三卷詩三卷木臨大壑名曰扶桑厭洪波之萬里在青帝之一方受浩氣以生成那倫衆木挺仙才之秀麗能戴朝陽塵外風吟天涯雨泣山晴而瑞氣初動海晚而潮痕乍濕幾千嵗月標下界之無雙迥拔榮枯倚高空而獨立霧折煙融孤光在東長迎旭日先得春風吾將原太極之意考真宰之功不産奇異安分混同物欲萌焉我則與三才並起田云化矣我則與太朴無窮卓出古今莫逾貞固當乾坤之上位瞰魚龍之要路至若玉漏聲殘銀蟾影度收人間之暝色未遍㣥山聳海底之紅輪先經此樹露戢雲驚珠懸焰生雖淩厥熾寧奪茲榮豈若常材隨大匠之雕刻自如良輔契吾君之聖明巢之者不可得其窺蠧之者不可得其噬陽烏象擇木之狀晴虹作挂弓之勢名大天下身高水際掩彩翠於蟠桃病虧盈於月桂非海也不足以容其大非日也不足以升其高葉茂而雲垂霽景根深而龍撼驚濤卑沃焦於尺土微鄧林以秋毫巨影倒空而漠漠寒聲吹夜以颾颾靈境難尋人寰罕測性欺霜雪心藏正直故能齊衆甫而據滄溟永佐東君之德衆木森沈歲暮秋深日黯黯以斜度風悄悄而亂吟喬枝邈以架迥墜葉槭以辭林眷彼搖落夫何蕭索形宛轉而斷連狀徘徊以斜却枝稍高而飛遠條漸疏而陰薄逗涼空以伴螢繞明月而驚鵲或散漫於原野或搖揚於樓閣爾其下自幽谷高隕山椒葉何樹而不墜樹何葉而不凋擁玉砌以初聚值金風而復搖浮於水中似孤舟之遠泛落於山際若斷雲之已飄悲夫處處園林紛紛相似覺絶漠之寒至聆洞庭之波起何夏茂而秋落何先榮而後死葉之致也既順陰陽之宜葉之趣也誠叶盛衰之理願歸本而猶未嗟微脫而不已別有寂慮臥幽逸氣無儔聊賞心以遐望乃觸目而增愁見一葉之已落感四序之驚秋愧體物之逾拙思軋軋而空抽者也銛官延州刺史垂範作則資政教而為本居上訓下在文法而為先甲非異能職忝專守理人之轡策曾未奉於公家為政之脂粉且聞隳於吏道必也心疑有待道貴無為遠企華胥之朝或使人迷日用久異大庭之俗何不事與時遷况澆風大行淳化已寢宜奉先王之法用革小人之心奚乃不拘自速伊咎縱引古訓亦置今科曙博陵人孝子饗親祭神如在主人肅客式宴以衎籩豆有楚無償西鄰之言餼牽不竭是陳東道之禮觀乙為生聞斯行諸曰殺羔羊尚流詁訓嵗修犬豕何爽大經同燕人之思雖踐血氣與楚氏之業終遠庖廚將食節而事時豈厚味而臘毒或人興訟捨禮何之有孚致辭勿問元吉興工部員外郎天地設位聖賢成能一人垂衣百官承事瞻言京邑實曰帝都必舉忠良是則率土聿求俊乂司牧黎氓猗哉彼甲俾茲從事賓王利用學古入官必誅㣥妖以靜矯慝於是彞倫各序軌物不將採績字人勿使失性終廣術察罪必欲懲非乃取赭汙衣息桴鼓而清盜因問羊知馬為鈎距以得情斯亦多聞攸稱罕測且正色率下類夫韓氏之名勵節執忠同彼李公之譽必欲人安俗理在為法以繩之擲伏擒姦於從政乎何有比諸製錦事且審於操刀語以烹鮮理必明於遊刃恪居爾職無俾我虞念茲鄰人昧於典憲徒為狂狷之説雖尚口以見窮誰聽芻蕘之詞終噬臘而致譴窒其多訟無逞遊詞是非相鼠之尢寧知鷞鳩之罰彼廣漢者吾其與之振中眷裴氏見宰相世系表客有薦雉尾扇要豫作賦豫亦感於心遂命紙筆其詞曰于嗟名翬兮誰喪爾躬于嗟名翬兮我愛其尾何不作於三嗅乃見傷於一矢當遭悅妻於大夫不值仁心於孺子雕骨肉於俎豆翦羽毛於錦綺雖蒙玩於翠翅無復刷其丹觜今屬聖人布命王道克理解羅者之目攦工倕之指我欲請造物復爾之生許虞人追爾之死且王者三驅爾供庖廚王后六衣爾為光輝爾毛既美爾膚既肥為薦廟之用招媒翳之機誠不顧樊籠之習習又安得林麓之飛飛當昔五步一啄十步一飲選地而遊擇木而寢固將保㣥雌以比翼豈知遭鳴髇之碎錦已矣哉彼龜何辜其腹將刳乃願掉於泥塗彼雞何知方論其肥乃自斷於郊犧至如千人操萬人歌不如休於桃林之阿復有青絲絡黃金裝不如放於華山之陽身死命絶魂銷魄亡永別儔侶長辭故鄉雖復氛氳綺席窈窕紅妝間以彩翠盛以筐箱百常之臺刻月九華之扇凝霜獨不及疇年之澤畔昔日之山梁悲夫少微崇文總目著有薛君口訣一卷九洞練真寶經修服丹砂妙訣一卷豫自天元之初從衡嶽遊於黃龍止於賓館忽於巖穴之中遇至真之人授以靈砂要訣告曰吾自得許仙君之後仙君授訣於吳天師天師授於同郡丁真人今本即真人所出也假如丹砂之本訣元理深奧固難卒尋好道之流志慕神仙者若不究其真元沈淪於塵俗自上古仙經文皆祕密隱蔽不言不顯露於世豫常愍然今述為靈砂七返篇及金丹志訣二章並為序論矣公輔官陸澤丞昔左邱明書梁亡嫌其亟城而至溝宮也書莒潰責其恃陋而不重閉也然則懲惡勸善之義信不可遺於後代矣方今生人震越虓虎啖嚼凡為侯大夫者孰得不鑒於梁而悼於莒哉夏邑縣城樓圖經即西漢栗鄉侯之故墟闉闍陂侈不可以禁淫佚臺觀崩弛不可以示軌儀訊諸鄉人云此地有隱慝焉縱其神姦栗若大忌故前後令長皆昵於神而廢禮也去年夏聖人戒師於東方宣武軍守臣劉公慮以軍興勢危賦重人困易置官屬紀綱事法遂假參佐范陽盧士宣字伯通為茲邑長伯通勤勞於民旋即真命錫以朱服示王命也愴夫先賢雖立譙門譙門必能將將雖作爾墉爾墉必能言言繇是正其小以及先王宮隅之制飾其儉用倅諸侯臺門之尊百工告利多福紛萃則嚮時妖異之説無復徵據神不神矣君何神耶苟無馨香曷肯變化是故直拔埃譬一賢之挺生介然堅強同五福之壽考端穆大壯發揚斯干用而不知我則為植其經費也自掄材至卒工不礙匹夫之膏澤必因庶役之餘羡其博施也自賀燕至翔鶤尚貽終世之咸若寧止吾屬之遐覽然後命閽人以守之揭靈鼉以鼓之歲時則懸法於其前災眚則禜祭於其下禦大寇則未足抑小戎而有餘且周文緩而靈臺成漢文約而露臺捨惟彼哲王睿后猶懼若此况人臣乎誾誾伯通可謂知禮至如板築之氣勢磨礲之固護塗塈之滑澤采章之藻麗則存諸咏歌非紀體所載時公輔館於伯通之署願記其善敢私於人乎揆官溫州郡丞惟仙之居既清且虛一泉一石可詩可圖佚戶部郎中志先子建都立邑本大末小苟或假名必將兆亂相彼人也其有意焉既榮朱襮之進旋興白石之行亦欲適彼樂土及於寬政義有涉溱之興業在揚水之章既侵陘庭方崇曲沃姑務修德自感子來悅以忘勞寧科擅去人苟利矣豈同邾子之遷兄其智乎已聞師服之歎既聞命而攸往雖或告而何傷元操官歙州縣尉黃帝八十一難經者斯乃渤海秦越人之所作也越人受桑君之祕術遂洞明醫道至能徹視藏府刳腸剔心以其與軒轅時扁鵲相類乃號之為扁鵲又家於盧國因命之曰盧醫世或以盧扁為二人者斯實謬矣按黃帝有內經二帙帙各九卷而其義幽賾殆難窮覽越人乃採摘英華鈔撮精要二部經內凡八十一章勒成卷軸伸演其首探微索隱傳示後昆名為八十一難以其理趣深遠非卒易了故也既宏暢聖言故首稱黃帝斯乃醫經之心髓救疾之樞機所謂脫牙角於象犀收羽毛於翡翠者矣逮於吳太醫令呂廣為之注解亦會合元宗足可垂訓而所釋未半餘皆見闕余性好醫方問道無倦斯經章句特承師授既而耽研無斁十載於茲雖未達其本源蓋已舉其綱目此教所興多歷年代非惟文句舛錯抑亦事緒參差後人傳覽良難領會今輒條貫編次使類例相從凡為一十三篇仍舊八十一首呂氏未解今並注釋呂氏注不盡因亦伸之並別為音義以彰厥旨昔皇甫元晏總三部為甲乙之科近世華陽陶貞白廣肘後為百一之製皆可以留情極慮濟育㣥生者矣余今所演蓋亦遠慕高仁邇遵盛德但恨庸識有量聖旨無涯綆促汲深元致難盡前歙州歙縣尉楊元操序朔官監察御史伏準遺詔皇帝已聽政合告郊廟所司祭地祇無文合廢又按曾子問天子崩未殯五祀之祭不行既殯而祭所言五祀不行即明天地之祭不合廢又王制喪三年不祭惟祭天地社稷為越紼而行事注云不敢以卑廢尊又按春秋杜預注天王崩未葬而郊者不以為王事廢天事也今禮儀使牒引祠令諸饗廟官有緦麻以上喪不得充饗官此蓋指私祭不足為今日之證請更參詳報禮儀使報來牒稱天子崩五祀之祭不行既殯而祭所言五祀不行即明天地之祭不合廢者謹按曾子問天子崩五祀之祭不行既葬而祭鄭元注云郊社亦然然則五祀之與郊社之祭同也則來牒所言五祀不行則明天地之祭不合廢與鄭元所云郊社亦然之義乖也又按曾子問上文曰天子嘗褅郊社五祀之祭簠簋既陳天子崩后之喪如之何孔子曰廢下文云天子崩未殯五祀之祭不行既殯而祭孔穎達云以初崩哀戚未遑祭祀雖當五祀祭時不得行也既殯哀情殺而後祭也又云自啓至於反哭五祀之祭不行已葬而祭此言無事時則祭有事時則廢未殯以前是有事既殯以後未啓以前為無事故王制云越紼而行事紼者屬於龍輴之轅索也天子攢塗龍輴謂殯時所設也今百官成服準令祀諸祠齋之日平明赴祠所又開元禮云祠前七日受誓戒散齋四日致齋三日散齋之內不得弔死問病致齋之內惟祀事則行其餘悉斷苟或違此則非為祭所以崇嚴潔也今若斂髮赴廟則嚴潔之道於是乎廢也成服而行則祀典之文可得而踰也且哀戚之殺大斂孰與夫自啓凶穢之甚緦麻孰與夫斬縗未殯之時非謂無事扱袵之祭可謂不遑况皇帝即位未告太廟哀戚在疚未許聽政如何告太祖以配北郊乎參詳古今實難議祭也琛始興人徙居韶州曲江范陽盧氏子驤與人交必先熟仁信道德然後旨迹無間始卒之道必全或重之以甘譽固不腴於心或風之以巧言亦不間其舊盧子之性達於元盧子之機忘於言雅好歌詩吟風吸月往往有前輩體調七薦文曹不為時遇病乎其人皇帝十三年以故東觀歸孝則達於鄉里悉得盧子事一旦沈疴醫不去卒於山陽嗚呼天付盧子之至道而時違之天生盧子之節孝而時反之命耶以其欺天之盜跖胡為福以其達天之顏回胡為促時之為其跖耶時之為其回耶胡然子之為固不及跖之時也琛之措意不足以書孤山雕碧寒水澄練子兮已而隨始興人徙居韶州曲江容州司馬鳳初從孫惟先王享國建用皇極制五服而有序御四夷而在德近不貢必先威讓之辭遠不庭則修文物之則所以止干戈而重仁義遏寇虐而茂生植夫潔其流者在於源清成其外者在於內平以德則天下順以力則天下爭故有武不黷有兵不征穆王之功何補謀父之言可明將其修己以推畔曷若殺人以盈城於戲至理之時惟德是貴柔其遠而不襲阜其財而不費以道義為干櫓以禮樂為經緯是以文足昭武可畏借如舜帝在上苗人不懷雖蕆事於伯禹終舞干於兩階然後七旬來格庶績允諧周文既興崇國不道用戡時難以奉天討矧勍敵而未悛爰因壘而自保然後再駕云服四方大造蓋由德所賓信所親豈無五兵且懼於暴物况有七德實在乎安人人勞所以損元氣物傷所以惻至仁乃凶器攸興聖人匪尚車書既其混一牛馬於焉休放兵不戢如火自焚德不修於君曷相所謂圖之大慎之微觀兵何是耀德何非素翟南來而越裳重譯白狼西入而荒服來歸夫欲朝萬國歸四海不可以逞弧矢之威胸奴猖狂犯漢封疆天子赫斯怒而沮南牧咨上將而臨北方惟干戈是揚惟賞罰是將能推誠則功臣必錫之甲第不私己故嫖姚見辭於武皇所謂萬夫之雄特百代之忠良也且將軍英威果決如火烈烈志以形言義以激節乃進而陳曰烽燧之虞未絶豺狼之黨未滅矧師旅而尚勞何棟宇之云設於是崇義立勳飄然不㣥精貫白日氣干青雲胸中吞乎萬里掌內指乎三軍誓將驅我貔虎殲彼醜虜豈惟獻俘而執馘抑亦開疆而拓土苟不能上安社稷外寧寰宇雖欲樂鐘鼎而徒為高閈閎而何補若夫飛甍連屬畫戟旁周地直戚里爵居通侯苟尸素而為纍當輪奐而為尢可不知池臺之娛緹繡之費諒無勳業之重徒冒寵章之貴在人事之攸宜於王臣而則未斯言也托實去華斯志也寧儉匪奢忘身而不謂事主許國而何暇恤家王翦請貽乎子孫與茲難並晏嬰敢煩乎里旅相去不遐夫策在必行功宜可久侈言無驗亦孔之醜彼樊噲之述橫行賈生之論繫首豈如將軍恢壯節辭華第俾功先而身後者也伊漆園之傲吏談元默以和光表人生之自得繄萬化之可量萬靈齊夫一指異術吻乎通莊忘言息躬輒造逍遙之境靜寐成夢旋臻罔象之鄉於以遷神於以化蝶樂彼形之蠢類忘我目之交睫於是飄粉羽揚翠鬣始飛飛而稍進俄栩栩而自愜煙中蕩漾媚春景之殘花林際徘徊舞秋風之一葉於戲變化悠悠人生若浮希微兮其狀方異恍惚兮其神遂收雖蘧蘧而復體尚悄悄以在眸我豈彼類彼寧我儔苟夢非而覺是誠虛往而實留且元蹤莫覿真理難求莊周之夢蝶而蝴蝶之夢周歟乃知元氣混然感通斯衆為生死之異分量寤寐而適中形因靜息符大辨之不言神以化遷異至人之無夢若夫氣為質本夢與道俱以我之有化彼之無固假寐而倏忽越百齡以須臾其在周也不知蝶之於彼矣其在蝶也不知周之於此乎若然者萬物各得其性一體或殊其途有徐徐而龜曳其尾有察察而狼跋其胡智者所以自智愚者所以自愚則孰能間其巨細孰能別其榮枯欲窮莊生夢蝶之理走將一問於洪爐靈海洶洶爰有泉兮其深九重中有明珠上蟠驪龍難犯之物兮不可觸希代之寶兮不可逢矧奫淪之莫究曷揭厲之能從爰有海客賁然來適利實誘衷舉無遺策乃顧而言曰見機而作未索何獲我心苟專而至寶可取我力苟定而洪波可擘既覽川媚之容遂探夜光之魄伊彼勇者吁可駭也俯身於碧沙泉底揮手於驪龍頷下所謂明淺深斷取舍而已觀其發迹潛往澄神默想俄徑寸以盈握倏光輝而在掌初辭磧礫訝潭下星懸稍出漣漪謂川旁月上鄙鮫人之慷慨殊赤水之罔象然則冒險不疑懷貪不思幸竊其寶幸遭其時向使龍目不寐龍心自欺則必奪爾魄啖爾肌救蒼黃之不暇何採掇而得之想夫人不亦危矣驗乎事良亦凄其則知計非爾久利非爾有必以其道亮自至而無脛是忽其生奚獨虞於傷手亦猶貪夫徇財自貽伊咎君子遠害惟儉是守是故車乘見驕於宋客驪珠垂誡於莊叟於戲我躬不保雖寶謂何彼險不陷雖珍則那子産常譏於狎水仲尼昔歎於憑河因政則來格感恩則匪他漢武受報於昆明之岸孟嘗反輝於合浦之波豈與彼而同科哉驪龍之泉物不敢入緯蕭之子一以何急其父乃煆其珠勗其習能往也可及不能往也不可及山川之氣曰雲寂爾虛無倏爾韜映雖無心而既出終有感而協慶鱗蟲之長曰龍道符於神德合於聖時變化而無極在陰陽而應令是知雲為佐龍為主龍無雲不可以陟煙霄雲無龍不可以降時雨始靄靄於山澤俄騤騤於天宇有若魚水相須君臣夾輔而已原夫或躍在泉道契元默未始出岫時有通塞及夫順天地之功贊生成之德吟空山而奮揚其狀觸幽石而蓊渤其色然後蹈乎寥廓自彼南北何往而不濟何施而不得潤萬物豈待崇朝控千里才踰瞬息故曰氣感則應有開必先臣良而聖主垂拱雲起而飛龍在天以類相從罕聞不合惟后作乂孰曰非賢是以殷丁得其傅説吉甫佐於周宣品物咸泰寰海晏然則雲龍之義明矣君臣之道一焉於以辨物理於以通人倫運有智兮事有因如羽翼之相假同股肱之相親則當今得賢共理豈不冠前代之君臣惟彼龍兮潛水府翔天路何葉公之多尚獨神物之是幕假手於繪對蜿蜒以好之其形在堂俄惝恍而反懼初其終朝念茲寤寐求之嗟豢氏之莫遇望雲津之遠而載雕其宇爰寫其姿周屋壁環階墀輝輝之章不離其行坐矯矯之質常在於夢思至於春風啓序自暄而暑則謂仰重陰而可佇雨歇雲收杳不知其處所其求雖阻其志無沮及其寒律方凝自霜而冰則謂窺濬壑而可徵天高日朗空有見於浤澄其覩未能其誠益增既而天縱其欲物應其好龍乃拖其尾而登其堂矯其首而窺其奧垂錦帶張翠鱗光流電轉聲發雷振起雲而棟凝積氣乘水而庭若通津而况於斯人得不撓其性而駭其真觸類而廣可明其徵惟龍也世好之必歸惟士也國招之必依姑務乎辨真去偽寧求乎似是而非故好龍如之何期真假無變好士如之何在賢愚無眩蜿蜒之狀且逢子高之儀堂堂之賢莫失哀公之眷勉矣凡今君子必審之於聞見嵗云秋矣秋亦暮止西堂寂聽之時蟋蟀寒吟之始紛稍稍以驚節洞喓喓以橫耳若夫八月在宇三秋及門清韻晝動哀音夜繁潘生感而增思宋玉傷而斷魂於時招搖北馳河漢西瀉煙澄寥廓露肅原野背暑而出爾草間驚寒而入我牀下或有聲相應氣相於雜蠨蛸於內屏混熠耀於前除羅幌燈寂珠簾月疏掖庭聞而夜久華省聽而秋餘若乃愁雲結陰暮雨流濕拂寒威之密邇當暝色而逾急我堂既在我室既入亦何異㣥鳥養羞昆蟲閉蟄懶婦也惟爾可以促女功羈人也惟爾可以催客泣夜如何其夜未央天晴地白月如霜士有衣絺綌坐藜牀怨空階之稿葉聆暗壁之寒螿乃言曰何彼蛩矣與時行藏火氛鬱蒸迹邁於中野秋氣融朗聲聞於西堂然後屏輕箑卷涼簟時嵗忽以徂謝功名曷其荏苒美豳化之有成陋晉風之太儉夫如是莫不驚白露之蟲躍望青雲之鴻漸陶先生解印彭澤抗迹廬阜不矯性於人代笑遺名於身後適性者以琴怡神者以酒酒兮無量琴也無絃粲星徽於日下陳鳳喙於風前振素手以揮拍循良質而周旋幽蘭無聲媚庭際之芬馥緑水不奏流舍後之潺湲以為心和即樂暢性靜則音全和由中出靜非外傳若窮樂以求和即樂流而和喪扣音以徵靜則音溺而靜捐是以撫空器而意得遺繁絃而道宣豈必誘元鵠以率舞驚赤龍而躍泉者哉於是載指載撫以逸以和因向風以舒嘯聊據梧以按歌曰樂無聲兮情逾倍琴無絃兮意彌在天地同和有真宰形聲何為迭相待客有聞而駭之曰樂之優者惟琴君之聖者惟舜稽八音而見重彈五絃以流韻故長養之風薰而敦和之德順無為而天下自理垂拱而海外求覲伊德音之所感與神化而相參固以極天而蟠地豈惟自北而徂南然則琴備五音不可以闕絃為音而方用音待絃而後發苟在意而遺聲則器空而樂歇先生特執由心之理而昧感人之功俾清濁不聞於大小宮商莫辨夫始終攫之深舍之愈促空軫而奚則角為民徵為事扣無聲而曷通祇反古以自異實詭代而違同孰若動精華以發外合恬和而積中傳雅操於心手播德音乎絲桐俾其審音者悟專一之節奏知變者美更張之道崇先生曰吾野人也所貴在晦而黜聰若夫廣樂以成教安敢與夔而同風昔田單以將亡之國坐必勝之籌伺燕軍於無虞之夜縱燧尾於有力之牛將用突騎徑卒謬以龍文虎彪冀重圍之宵潰復三敗之深讐乃先詐以乞降然後謀而竊發內欲激於怒士外且驕其敵卒遂決策於斯須固無疑於飛突於是建皂蓋選名軍因七尺之殊狀畫五彩之奇文先事以謀鑿垣之門暗啓及期而進束葦之火遂焚已而夜景將迷霄輝潛煥龍章交映虎斾雜半以強服猛肇牽之質前驅從黑忽明無備之師大亂攢萬蹄以躍出譟衆鼓以相從喧聲震乎厚地列炬迸乎崇墉風歊後焰血灑前鋒一戰而強甚周武之驅歸獸衆神皆走劇葉公之懼真龍始其制勝惟神開機必果合如雷電迫如星火飛馳之際先資戰野之威叱吒之間已轉覆巢之禍故得騁照曜恣橫行士卒咸以奔潰山谷為之震驚陷陳摧堅不勞於五千之士而追亡逐北何啻乎七十餘城由是齊人復振燕國大傾襄王曰牛者以強力稱猛兵者以計謀是幸必將盡一時之抵觸為萬代之彪炳豈使飽豐草與清泉望桃林而休影
