front:
  text: 全唐文欽定全唐文卷五百二權德輿二十
  hash: sha256:17e7e0bd9e94b5808abf9f0166f3df8c037bd9811337d0a3194a63bf9706896a
body:
  text: 公諱申字維降東海郯人五代祖周宣州刺史王褱王褱生隋江州司馬宴宴生吉州太和丞仁徹仁徹生皇吏部郎中諫議大夫元之元之生公烈考汾州司戶參軍贈信州刺史乂大凡自偃王而下用仁義世其家諫議之文行信州之廉退及公始大永泰初當著作賈常侍至操柄儀曹搴士林之菁華舉進士上第調補祕書正字四征翹車相屬於途望公舉趾以為重九江而西服嶺而南與朔塞被邊之地聯為命介歷大理評事司直監察御史太子司議郎殿中侍御史錫以章綬冀國路公之誅哥舒晃也公以從事主謀居多嗣曹王之守鍾陵而誅李希烈也公以長史行刺史事調州師以護餉道厥勞茂焉江漢既清拜韶州刺史先是長史不任職官曹弛廢刺史寓於理下邑之令丞與編人雜處比屋庸亡公田為蕪公乃假之耕牛賦與種食人人自占視其力而為之制歲乃善熟積為倉箱於是計徒庸程日力作為城寺大治垣屋廣既置市列道橋器用皆備焉罷去之日夫家名數倍差於始至而不書於籍邑子張棣等五百人獻其理狀得請於觀察府以函奏書請立碑祠公瞿然止之曰此刺史職耳一旦上聞與沽伐者何異所不忍為也府不能奪改合州刺史以先濮陽郡太夫人兆域未祔表求改葬緦麻既除以御史中丞領景州刺史自兵興四十年山東諸侯率強大驕蹇郡二千石多自命於轅門蓋縣官息人含垢而因緣漸漬然也至是朝廷以滄州負海徑兵攸處乃建節將幕庭裂屬城以置支郡會其帥亦請缺守於朝朝論難之二府比推擇未稱因召公入見而面命焉錫命服文馬緡錢五百萬尋加節度副使中朝之條職憲令始被於景人是歲節度使來朝既從父兄為代表公以本官為軍司馬陳情去職徵還京師復以御史中丞出蒞雍州領經略之任開南蠻徼道宣明威信種人黃氏納質請命化條風行獷俗以清明年中貴人持兵符詔書至部以御史大夫督南海二十一州軍事而節制焉前此守臣物故軍吏乘變竊發印符易置部校拔用惡少年百輩軍中幾亂相率亡命公既至捕誅首惡悉原諸詿誤者夷越負險阻白晝攻剽芟夷根株使無遺類然後布以寬大人安作業溟漲之外巨商萬艦通犀南金充牣狎至天子之恩澤賜豫聲明物采皆待焉上應急宣以馳疾傳下無強賈用絶姦利和輯招徠外區懷之則四封之內其理可知也朝典疇庸進階至銀青光祿大夫時庸蜀未靖公密疏請發卒徒五千循伏波故道由僰蠻抵岷峨以會師期誅不恪詔可其奏就加禮部尚書秩正三品疏封東海命書未及至奄捐館舍襚以太子少保印綬弔祠稱焉是歲改元元和公之生七十年矣嗚呼以文發身以智經物惠和直溫忠恪廉清佐賢侯長轂皆有理效在韶也興事功在景也修班制朗寧察風俗南海整師律以八命居六官攸好德考終命其蹈履之全乎夫人渤海高氏早歿繼夫人扶風郡夫人竇氏柔明有賢行嗣子右衛倉曹元弼似續文敏號咷毀慕以某月日寧神於東都偃師縣之某原乃刻堅石以傳永久銘曰噫徐公有質有文有義有仁名聲章明邁㣥倫兮噫徐公不忮不求不緇不磷贊佐四征暢嘉聞兮公之牧人於韶於景於雍於廣朱幡照路利攸往兮公之愛人以清以靜以惠以養流庸集附如景響兮如何不傭奄忽鞠凶蓍龜之同天地之中吁嗟乎徐公君諱子陵字某其先魯獻公仲子曰山甫入輔於周食采於樊其後魯有季路衛有叔圉用儒行政事代為家法曾祖始自彭城徙於蜀都祖襲博究六藝州閭推重考遠清靜寡欲好老嚴之言三代曠僚純白不耀君丱歲好古學與同門生肄業於峨眉山下採托前載可以為文章樞要者紬繹區別凡數十萬言大歷十三年舉進士甲科調補祕書省校書郎歷同官醴泉二縣尉貞元十年舉賢良方正拜太常博士轉主客司門二員外郎十八年六月乙巳寢疾歿於靖恭里第享年五十有九君修身慤固為學精力其初典校有詔百執事詳定冕服炳然上奏得禮之中再仕甸內皆參奉常論撰之務后蒼二戴曲臺石渠之論乖疑難正者咸折中焉有司請正太祖東嚮之位而祧獻懿二主議者云云君議略曰九聖在天二祖在祧國家卜代其年未始有極宜立定制為萬代程請遷二主於德明興聖廟詞甚切正後以異論紛紛又著通難一篇引經據古諸儒不能屈雖留中未下而知禮者直之為郎三歲受詔典黔中選補賦祿清平南人悅焉皇皇者華道於故里里中人以為榮觀復命踰年稍進郎位循性詣理恬於聲榮隤然放懷以馮唐顏駟自況修詞甚博推本六經賦詩類事往往有卓異不羈之韻邃於禮服上下古今儀制著五服圖十卷自為一家之言起庸蜀諸生以文義自達至禮官元士三登於朝講義洽聞不疚不跲與夫憑覆露乘地資而至大僚豐祿者難易殊矣子雲耆老相如多病內外灑掃之日圖書尊酒而已升東榮而復者假他人之室可悲也夫其嫠嗣郢王之藻女宗室公宮稱其賢淑生一子無頗幼學而孤卜七月甲申竁於萬年縣之某原其理命也德輿常忝知君用深怛化遺孤哀請因直其詞銘曰噫仲君直而文心秉彞學軼㣥富宏議暢嘉聞中止水外浮雲理冥冥化沄沄刻圓石識幽墳君墓志銘並序公諱自挹字某天水人其先殷王武丁之支因封命氏楚遷於那處秦徙於汧隴帛丿糸代多才繼有勳力四代祖襲慶周開府儀同三司相定冀青殷五州諸軍事冀州刺史齊郡公曾祖武隋開府儀同三司浙豫桂三州刺史潭府總管始平郡太守右武衛屯衛二大將軍天水縣開國伯考無悔皇朝請大夫晉州趙城縣令公年十四太學明經上第因喟然曰學不足以究古今之變而干祿者非吾志也遂養蒙於終南紫閣之下窮覽載籍號為醇儒非其道不合非其人不自歷南和寶鼎二縣尉天寶中河湟之閒踐更以禦寇平糴以饋軍皆以御史董之聯辟從事既而幽陵兵興二京震蕩搢紳之士多在劫中公艱貞終吉盜不能汚剋復之歲制授醴泉縣尉尋攝監察御史充河西隴右宣慰使崔中丞伯陽判官軺車所履人誦其惠歲中崔復命遷左馮翊表為祠曹且佐州帥朝廷以公文而無害特拜監察御史謙以自牧換大理寺丞學該古今加集賢院待制識通理典遷尚書倉部員外郎大歷五年春感風疾請告十有二月終於布政里私第享年七十惟公得大易之含章中庸之居易知前古之善敗稽六學之義類靈龜恬然天爵自貴夫如是則通籍書殿起草中臺於諸生不為不達而充公之量則未也與故王右丞維今歸尚書崇敬為文雅道素之友其餘或不踐其域故知我者希夫人太原王氏監察御史造之孫鄠縣令侑之女淑行明德輔於公志叢是福履近於期頤公之喪既除二十三年而夫人歿壽九十三時貞元十年十有二月也嗣子某某官次子某某官等皆以舊德蕃祉參居吏員盡厥誠信貞於龜筮以十二年十月祔葬於咸陽縣洪瀆原禮也以德輿諸孫之列習於舊史郯子之學誠慚古人滕公之室敢識幽壤銘曰周隋之閒受封於齊代有武功抑抑倉部德音不回藹然儒風考正圖書彌綸憲章其道昭融黃裳之吉大雅方直位則未充惟此令德與彼內則委和而終咸陽古原祔窆雙魂淑聲無窮公諱鉊字某不書州里尊宗室也初景皇之支啓封於蔡繼別為宗厥後多材皇襲濟北郡公孚公之曾祖也隴西郡公津容公之王父也濟北仕至國子司業贈太僕卿隴西仕至慈衛汝邢青五州刺史終永王傅以至烈考憺歷監察御史殿中侍御史尚書倉部員外郎纍贈職方郎中虢州刺史公即虢州府君之第若干子也憑是積厚叢生福祉少以門子入官聯調兩宮環列之佐次補伊闕丞是歲天寶十四載也虢州捐館幽陵兵起茹毒違難南浮江淮既除喪宣州觀察使鄭炅之表為廣德令時劉展阻命東方愁擾閭里制於萑蒲守臣化為寓公而公之縣鄙連亘山洞盜有陳莊陳五奢者是焉囊橐攻剽相因炅之跳在尋陽牒書密至署為上介俾輯輿師靖綏攘遏人用寧舒後歷揚州太原二紀綱掾府之損益皆所關決執法殿中佐戎北門會罷使至京師獻狀居最拜奉天令有命成城績用居多未踰年遷侍御史充宣武軍節度行軍司馬時師帥以睢陽及譙進律開府韓厥之任朝選為難蓋以彌縫左右非公莫可最凡三為尚書郎四兼御史中丞以銀印青綬歷官相常伯之重府遷大梁職尊統師公皆以師武從之蓄資力以崇威望宣忠勞以宏班制居則持重戰則有功無細無大繄公謀是賴雖羊舌職之聰敏肅給鐸遏寇之恭敬信強無以過也貞元二年真拜右庶子三年復以本官兼御史中丞充入蕃使尋兼御史大夫行次回中察其陰詐奏疏纍陳不可蒞盟之狀時朝議已行謀塞不用既而戎人衷甲急變上聞乘車東轅獨以智免以久次遷衛尉卿秩至金紫乃命大司農為國之泉首公修職惟直是視無所阿附終用蔽傷左遷邵州長史以十三年十一月寢疾終於所蒞之官舍春秋若干惟公開敏毅直信兼仁勇有政事方略長於理煩遠而不泥文而無害始以通邑行師振其名聲交辟元僚翻飛清朝腰金鳴玉法象河海議者謂藩垣京轂公宜居之終以當官有守寧絀不苟不為利疚於回鬱堙下國以至大病斯可歎已夫人范陽郡夫人盧氏某官某之孫新安丞某之女華宗淑問光輔閨門無貽罹無攸遂內姻外戚仰其徽風先於公二年而歿長子元亮以武略至御史中丞不幸早亡次子元道以吏才為大理司直兼監察御史參陳許軍事次曰元規進士及第盩厔縣尉次曰元會前右金吾衛兵曹參軍元江陵府參軍元舉太原府參軍元衡元弻元輔等皆幹蠱知方儼然在疚考於象數先遠得吉以十四年某月日奉公夫人之喪附窆於伊闕縣萬安南原先公之兆域禮也德輿王父公族之出也先人於公為中表昆弟羈貫獲見殆四十年元道等泣以墓石見託雖文之鄙朴而不敢辭也銘曰抑抑司農系於蔡兮三圭再踐直方大兮心廣體胖道將泰兮中立不回官左退兮發書問鵩禍所會兮撰日焞龜紛祖載兮萬安鮮原風雨晦兮鏤此貞珉之內兮公諱條字堅後以字為諱淮安靖王贈司空神通之元孫也鹽州刺史孝鋭司空之昭也宏農太原守璟鹽州之穆也太子太傅贈司徒齊物公之禰也尚書左僕射贈司空復公之兄也代以忠厚而膺爵命勳籍吏部皆冠宗室公秉是慶祉生而朗邁宏毅疏達方廉孝悌學以遜志文而無害始以門廕參調三命官至廷尉平明清閲實適其輕重改宣城令滿歲受代縣人以理狀乞留廉車上聞詔可其奏且加大理司直從人欲也縣鄙之南水泉委匯每暑雨流潦輒傷大田公乃峻為之防悅使其衆人就安利稼皆登成大歷中鄜坊節度使表為上介遷監察御史殿中侍御史中權策畫一以咨之成師足食邊備益固使罷除昭陵臺令貴強沓貪奸冒法禁公職在充奉露章以聞已為巧言所中坐貶建安尉在途纍疏詞理劘切上覽而直之罪人就誅方議率復屬太夫人棄敬養貞元初移蘄州長史尋徵還京師執事者鋭意引重公亦啓心獻納會一人有漢宣共理之嘆拜泉州刺史泉人宜之入為宗正丞時卿長與其二不相能告訐之書紛然交訴詔公平之皆得其中自後屬籍疑讞顓其聽斷兩造以明九族以和九年授果州刺史先是理下無廨署官司無令書節用量功經構講聚百堵乃興九章粲然政用樂易人皆輯附居部明年有女道士謝氏白晝上升優詔嘉異州閭咏歎十一年以課最陟為司農少卿國泉邦用精力區處利病陳聞靡不纖悉十四年宸心憫雨比屋艱食出其陳陳以活元元又百吏之祿廩以粟易幣則輕重相準而便於人皆自公發之也公稽覽故志通練程品嘗獻軍國便宜五章推理道以及人事其他奏議皆附經術有蹇蹇匪躬之操焉渥澤日加方厚其屬任而才命相戾末如之何十五年三月乙巳以疾終於勝業里私第享年五十九夫人滎陽鄭氏某官某之孫某官某之女姿操柔明先於公若干年而歿乃者以公之勤追封滎陽縣君其孤曰昌舉進士甲科淑行至性公族稱其有後以其年五月甲寅龜筮襲吉血涕奉喪祔葬於萬年縣某原先公之兆域以德輿獲詳踐履俾篆斯文其銘曰昔有靖王愍策司空至公父兄亦命三公公族家代車服以庸允矣司農直方懿恭行惟遜悌仕乃廉忠利刃刜鐘輕翰翔風時方大來命則不融柳車遲遲棘人充充如履厦屋歸念舊封圓石篆銘永識於中君諱衆甫字子初清河人曾祖尚皇海州司馬祖宏藝皇亠兊州曲阜縣令考隱皇淄州司戶參軍君早為諸生能以學行自力寬廉而溫朴厚而文居易向晦固窮不變故年過耳順而方脫章甫冠惠文示不苟也初為轉運司所辟解巾太常寺太祝轉河南府壽安縣尉罷秩年僑居雲陽時以緣情比興疏導心術志之所之輒詣絶境閒以羈旅游京師卿大夫聆其風者方以聲韻屬和不暇會淮寧軍帥之始至也慎柬僚佐求士於朝朝賢多以君為才辟書荐至俄拜監察御史且為從事讜言幕畫舉無違者徵軍實於廣陵因涉江省家道病沈痼不克復命以建中三年三月日至家而終享年六十八夫人汝南周氏先於君歿其孤曰實曰宇年並孩齓未勝縗絰遂以某月日權祔焉嗚呼貴仕睂壽或與令德不並此昔賢所以為歎姑以景行茂實賁於重泉銘曰洪範之義享用五福展如之人宜荷百祿嘉言婉婉則罔攸伏既鐵其冠亦朱其服浮休沄沄歸全還真喬木荒墳吁嗟乎張君維貞元五年夏四月容州刺史經略使侍御史譙縣男戴公至部之三月以疾受代回車甌駱六月甲申次於清遠峽而薨春秋五十八明年正月庚申返葬於金壇玉京原之舊封宜敘世德以識幽穸云公諱叔倫字幼公本譙國人其先在宋為公族於漢為儒宗東漢則有司徒涉西晉則有司農彖彖後南渡始居丹徒八葉至宋臨湘侯明寶明寶曾孫梁左丞皓皓元孫皇德州司士好問公之曾王父也王父修譽父眘用皆自縻天爵不顧翹車傳次君之禮文盡通奧旨師安道之晦德尢惡知名故世風純慶及公而發公早以詞藝振嘉聞中以材術商功利終以理行敷教化師履素王之訓周旋君子之儒淑聲休問苾芬四暢初摳衣於蘭陵蕭茂挺以文學政事見稱蕭門文本菁華而長於比興粲為采章鏘如珩璜鼓鐘於宮纍辟大府分命於計相也則為湖南河內留後自祕書正字三遷至監察御史曳裾於賢王也則為湖南江西上介由大理寺司直再轉至尚書祠部郎中其阜人成化也則東陽一同之人沐旬歲之治撫人飫三年之惠容人被踰月之教夔人聞詔而歡承訃而哀不及蒙其澤歷官十一而雲安不書所至之邦必刻金石始在轉運府也董賦於南荊會蜀將楊琳擁徒阻命詔書告諭初無革志宵引鋭卒劫脅使臣曰歸我金幣可以紓死公山立不撓勇生於仁端其詞氣強於師旅暴叛知感乞盟於公黎明率其徒西嚮拜泣指期詣闕冢臣列狀天子召對而推功於府不伐其勞時談翕然勇讓具舉其在臨川也清明仁恕多省費方略蜀郡崇儒之化南陽均水之法精力區處民以便安田壤耕闢獄犴清淨居一年璽書裦異就加金紫未幾而有容州之拜且都督府所治列城十三訓戎撫俗之任招徠式遏之寄非通方明略無以威懷蓋皇慈所軫先於柔遠方將布愷悌於夷落致風俗於休嘉議者以九伯二男可跂而至天則不弔末如之何君直清篤厚博物通理有大學之明誠大雅之疏達靜如淵泉動如鏌干不緇不磷與令聞終始起布衣儒服位視方隅歸全之日才具祭器去國見麾幢之盛返葬備裧輤之儀列松檟於舊封展牲牢於新薦哀榮之禮鄉黨稱焉初公娶京兆韋氏永州刺史采之女繼室以博陵崔氏殿中侍御史殷之女皆淑明柔嘉不幸早世允子曰郅曰邡年甫及齓哀如成人公仲兄新城長伯倫以豫夙承公歡且有遺託既不獲讓是用直書銘曰信都九江文禮章章百代彌光司徒佐漢司農匡晉乃熾而昌世無違德時有通塞或行或藏克生容州貴為諸侯其道直方政成中和播為頌歌化被二邦列爵疏土燦爛龜組鸞聲鏘鏘宜享繁祉以媚天子今也則亡還葬故里仙山之趾德音不忘博陵崔氏為山東右族以政事方直稱者曰饒州刺史諱適字某貞元十四年某月甲子寢疾終於所部之廨舍春秋若干君仁厚信實方嚴清厲詞無枝葉而顧言必踐交不諂瀆而與人必誠深於士行精於吏職蓋其天性然也一命為懷州參軍纍遷至大理評事司直監察御史好畤武功二縣令常絳二州司馬乃理富平遂佐興元貞元十一年春以西諸侯之師轉粟調食特拜倉部郎中兼御史中丞以董其事其年冬徵拜衛尉少卿明年改鄧州刺史麾蓋將行又換鄱陽歷官十五竟未充量其為御史也賈常侍至以才名尹轂下實所慰薦為之賓介蔣常侍沇以公廉幹河運交辟將事宏助居多其宰封畿也縣鄙之地直於西郊禁衛之師勤於左次事為之節官修其方軍興人安闔境謠誦其佐晉陵也晉國韓公當撫封之重署為推官軺傳所至平反審克假守新定新定之人宜之薄於進取未數月引去其領陵邑也充奉肅敬里閭均安黠吏強家望風纍息相率屏匿者十八九其分憂為邦約己惠人樂易而知禁清明而不擾此皆歷職必聞之效也至若章章尢著為士君子之所景行者則奉使西土鄙能言之縣官以乘塞宿兵旌旄相望饋餉之重非君莫可既而經費出納制於中臺剋伐之人順非言利大率以布帛之不中於度不鬻於市者積以窳濫備其名物移用於軍增三倍之價平糶於人無一時之蓄掠是根本命為奇贏既衰邊備實蔽理道時有覆視誨其相蒙徒列簿書之文不登釜鍾之量因緣繆巧觸類而起君受命不苟臨事風生條其積弊盡達聰聽雖狺狺之吠營營之飛置於度外不直不已連章上訴詞旨深切㣥情惴駭處之恬然謝病乞告終無所屈皇明嘉納入亞九卿時搢紳之士多以憑暴為戒怵迫附離而不能自固者多矣如君之特立剛毅不更其守古之儒行何以加焉此德輿所以受其孤之哀請而不敢辭也君之曾祖元基皇朝散大夫會州長史祖紹先皇揚州楊子縣尉父炅皇大理司直兼河南府河陰縣令代名士行裕是遺烈初君娶於某氏某官某之女生子曰包而歿繼室以某氏某官某之女皆有淑行如君之志以十四年某月日叶用吉卜祔窆於河中某縣鄉原之舊封禮也初包以德輿朴而好直且嘗奉行君之命書者四乃列其官簿次第俾識於墓石既而包毀瘠滅性夭於倚廬之中諾其請矣故銘之曰崔君之直兮不枉尺兮崔君之正兮不由徑兮展如之人宜錫蕃祉兮天實奈何一麾遄已兮襜襜帷裳來自鄱之陽兮峩峩邱封葬於河之東兮刻此貞珉識清風兮
