front:
  text: 全唐文欽定全唐文卷二百四十六李嶠五
  hash: sha256:ffc7f0a54d86a4954f93fcfe470ad4a91ea89e7c3ee0d2f036ac34f2c8ad90a4
body:
  text: 臣某言臣母氏齒髮既衰風氣彌積寢興乖豫定省不安陛下降視萬方俯矜一物哀老母虛羸之疾慜愚臣煎迫之私宏以不匱之思布以非常之澤使得暫辭藩嶽別梁郡之襜帷旋赴京都求越人之砭石自班輿首路潘宅來歸承厚蔭於四天接歡言於九族雖名醫上藥研祕術而未嘗而佩德感恩覺沈疴之半愈屬千齡啓旦十號登樞演金石之微言呈玉毫之寶相三千國土俱傳貝葉之文億萬天人並入蓮花之會臣六時空念五起未寧思酬顧復之恩願假招提之福儻獲書名檀供厠影法筵罄歸依回向之心受清淨菩提之果實望三身覆育開梵帝之仙坊十善護持發醫王之祕藏永離災厄長登福壽上以祈龍象之深惠下以申烏鳥之懇誠豈惟區區闔門獨荷於仁覆故亦悠悠法界永覃於孝理不量淺薄敢輕上祈塵黷威嚴伏增戰越臣某誠惶誠恐頓首頓首臣某等言伏見逆人王慈徵等並擢自凡庸纍承恩獎遂得叨榮秩職此禁戎任切爪牙寄同心膂而忠勤之志莫效於鷹鸇悖逆之反同於梟獍向使邪謀不泄陰計遂成將恐變起宮闈禍生肘腋此實靈祇之所切齒臣子之所寒心若但置以恆科委之常憲何以明大憝之愆咎杜元凶之覬覦望請污其宮室轘之都市用遵雷電之象允叶春秋之義則衣冠塞望夷夏甘心無任憤切之誠謹冒死陳請臣某等誠惶誠恐頓首頓首死罪死罪謹言臣聞黎庶之數戶口之衆而條貫不失按此可知者在於各有管統明其簿籍而巳今天下之人流散非一或違背軍鎮或因緣逐糧苟免歲時偷避徭役此等浮衣寓食積歲淹年王役不供簿籍不挂或出入關防或往來山澤非直課調虛蠲闕於恆賦亦自誘動愚俗堪為禍患不可不深慮也或逃亡之戶或有察即轉入他境還行自容所司雖具條科頒其法禁而相看為例莫適遵承縱欲糾設其違加之刑罰則百州千郡庸可盡科前既依違後仍積習獲者無賞停止者獲原浮逃不悛亦由於此今縱更搜而委之州縣則還襲舊蹤卒於無益臣以為宜令御史督察校設禁令以防之垂恩德以撫之施權衡以御之為制限以一之然後逃亡可還浮寓可絶所謂禁令者使閭閻為保遞相覺察前後乖避皆許自新仍有不出輒聽相告每糾一人隨事加賞明為科目使知勸沮所謂恩德者逃亡之徒久離桑梓糧儲空闕田地荒廢即當賑其乏少助其修營雖有欠賦懸徭背軍離鎮亦皆捨而不問寬而勿徵其應還家而貧乏不能致者乃給程糧使達本貫所謂權衡者逃人有絶家去鄉離本失業必樂所住情不願還聽於所在隸名即編為戶夫顧小利者失大計存近務者喪遠圖今之議者或不達於變通以為軍府之地戶不可移關輔之人貫不可改而越關繼踵背府相尋是開其逃亡而禁其割隸也就令逃亡者多不能總計割隸猶當計其戶口等量為節文殷富者令還貧弱者令住責巳定計料巳明戶無失編人無廢業然後按前躅申舊章嚴為防禁與人更始所為限制者逃亡之人應自首者以符到百日為限限滿不出依法科罪遷之邊州如此則戶無所遺人無所匿矣臣某言臣志識無取才藝缺然叨豫葭莩遂升班秩彈冠受檄曳組登朝內府尸榮巳招官謗中臺揆務愈塵政本聖恩無限天造不資仍屈帝難俾參皇極西雍之羽仍所庶幾東郭之毫敢陳誠請九霄徒邈三舍不回嚴命必行靦顏何置方持畫虎且對㣥龍遂以挈瓶謬膺和鼎空焉作礪之命豈庶磨鉛之功祗拜寵臨伏增慚惕無任悚戴屏營之至謹奉表陳謝以聞臣嶠言伏奉恩制加臣通議大夫守成均祭酒兼檢校文昌左丞餘如故榮過望表慶溢身涯荷寵祗恩蹈冰臨谷臣嶠中謝臣燕雀之羽多謝於飛翻蜉蝣之衣久慚於忝竊屬秦人望幸虞帝卜征萬騎時巡不陪遊於渭北四關留鎮獨延欷於周南劬勞異羈靮之臣寵渥均廟堂之士燕豀弱黍分隔於陽和楚塞輕茅遂承於雨露仰平分而載躍撫留滯而成歡惠重邱山徒深於抃舞身輕糞壞豈議於答酬無任喜戴慚惶之至謹附某官奉表陳謝以聞臣嶠言臣植性愚陋稟質庸踈過蒙恩私特垂獎飾擢自泥滓之下升之雲霄之上參豫機密接奉軒墀寵光百僚榮被九族殞身未能以答施灰骨不足以明恩屬日月齊明乾坤交泰弓旌出谷俊乂盈朝非親非賢無藝無識猥將齊竽入吹謬以鄭璞為珍昔綜銓衡有慚要署置過當涇渭莫分致令外削氓黎內傾府藏煩擾之弊既傷於國體謗訕之咎允集於臣躬是用仰慙公朝下積私懼顧循支離犬馬之疾恐玷棫朴鵷鸞之㣥不敢仍勞準繩實願自甘屏黜言布心腹輒以陳祈而愚慮不周違自速有命遄降營魂載飛豈徒絶望邱園故有甘心鼎鑊忽蒙聖恩懸察慈旨曲矜爰集竹替纓諭以絲紱許臣以無衡鏡怪臣以輒謝鹽梅察臣誠款之心知其憂國覽臣狂愚之奏謂合事宜譴讓之中恩多而責少含容之內善詳而過略本將因愆而獲戾翻乃以誚而蒙榮惟大造曲成既蒙再生之惠小人多幸方輸九死之答無任欣喜踴躍之至謹詣明福門奉表陳謝以聞臣嶠誠歡誠喜頓首頓首死罪死罪臣某言伏奉恩制除臣息尚舍直長史某為左監門衛長史榮隨恩集歡與懼并臣攀軫日車附流星漢才無天質藝以地高陛下每降皇情特垂聖蔭先親後踈之澤自葉流根謀孫翼子之慈愛人及息遂復推恩家室假職幼童參九等之班榮掌重門之禁衛賞延之命寧待於勳庸敦敘之風但緣於骨肉雖東平之子能趨拜咸錫印章齊國之地可割分悉侯支庶豈足以方斯嘉惠匹此殊渥奉絲綸而仰德叩木石而論心受生於天但知榮荷曝骨於地何階酬答無任悚戴慚懼之至謹詣朝堂奉表陳謝以聞臣某言臣兄某前某官某月日特蒙恩詔擢授武州司馬未及赴職即八月改除毫州司馬再三榮命叨荷恩私在臣宗門實為慶幸臣兄自歸解巾從仕三十餘年五為縣宰三遷州佐政皆通顯職實蕃勤直道在公有始終之節平心應物無造次之在於周行頗蒙推擇近屬虺寇搆術惑亂豫州詿誤平人自貽梟滅陛下憫荊河之俗遭此無辜弔海濆之人使同昭慶以為奉揚皇化者必藉其才撫御窮人者亦資有德臣兄同濫承天獎遷移武州在於天恩實為超擢今者未及赴任復蒙改授亳州重疊承恩翻同貶降朝廷體例實以為先臣兄弟叨榮濫竊非據臣兄既授不合冒聞但以始者承恩越蒙抽擢今有何過遂同左遷區區懇誠輒敢祈訴伏願皇恩有裕降昭獎之恩兄果竭忠獲展才之地小臣死日猶生之年臣無任云云臣某言昨奉敕令臣撰懿德太子哀册文臣術異懷蛟藝非吞鳥四科函丈多謝於文學七子登筵有慙於詞賦恭聞聖旨輒奏庸音豈足以褎敘重離激揚三善宣睿慈之惻愴述天顧之綢繆曲降絲綸猥垂剪拂諭之以雲間日下方之以陸海潘江飾嫫母之容加其粉澤瑩碔砆之質發其光彩雖宋玉大言見褎於楚國公孫下策蒙賞於漢朝無以比此揄揚方斯恩渥欽戴紫紱伏銘元造仰高天而發悸顧短札而成羞無任慙荷戰懼之誠謹詣閣奉表陳謝以聞臣嶠言伏奉恩敕編撰攀龍臺碑文賜臣物四百段研精不優篆刻無術下帷闕蛟龍之學搦管慙鳳凰之思猥辱隆命俾圖光範戴天知局仰大象而增迷遊聖為言撫營魂而自失寧足以發揮一德揚榷萬分述虞后之孝思談姬文之睿業而天情不匱帝造無涯式推愛敬之心用廣褎崇之惠披文相質本殊黃絹之詞頒賞計勞遂承紫泥之渥荷寵惟懼瞻恩載靦祗奉之日悚汗交馳無任慙戴屏營之至謹附洛州奏事使具官臣某奉表陳謝以聞臣璹等言今月十一日侍宴蒙恩作飛白書題臣等名字垂賜跪承寶貺仰戴瓊文如披七曜之圖似發五神之檢九霄靈澤與垂露而同霑千載嘉祥共回鸞而共集冠六文而首出掩八體而孤騫眇乎若遊霧之拂春林靄乎似輕雲之上秋漢頡皇之始模蟲篆未足多奇劉后之嘗學史書孰云能擬固巳工踰懸帳妙盡刻符鍾繇竭力而難比伯英絶筋而不逮則知乃神乃聖包衆智而同歸多藝多才總㣥方而兼善諒天機之獨運豈凡識之能窺臣等才埒瓶筲任叨衡石器滿之誡每切於愚心棟隆之吉實慙於明代而天慈曲獎聖造不遺厚祿尊官既殫恩而極寵良辰美景又申歡而接宴慶方行而巳及澤未溥而先加殊恩與骨肉等深縟禮共衣冠相絶今復親陪睿賞特流宸翰嬴氏之魂遊天上未比超升闞生之名在月中詎方遐邈昔者韓稜深博肇蒙於署劍田鳳名流僅聞於題柱未有芝英草聖近縟於彩箋合璧連珠俯光於掌握在臣叨忝獨冠古今方且示彼記言傳諸貽訓表一人之殊寵留百代之榮觀手舞足蹈徒申踴躍之心摩頂至踵豈答生成之施無任欣戴之至謹詣闕奉表陳謝以聞臣某言伏奉恩旨加賜臣防閣品子課及全祿並以特進全給身若在京仍朝朔望者臣自叨榮職無補分毫抱疾沈疴有踰年歲蒙賜臣骸骨得守邱園方從麋鹿之遊分隔鵷鴻之侶不謂皇私廣被天造曲成回日月之光更臨幽側降雲霄之澤俯潤凋枯歲時頒廩藏之儲朔望接縉紳之禮無績無效虛忝於恩榮非才非賢謬霑於祿秩仁慈出於分外寵渥生於望表邱山厚澤猥及下流草木輕生何階上答臣苦腰腳軟弱不獲躬詣闕庭拜謝無任慚悚喜荷之至謹因留守奏事奉表陳謝以聞臣某言伏奉恩旨加賜臣防閣品子課及祿并全給身若在京仍朝朔望者臣運偶時來久叨匪服鐘鳴漏盡得保懸車逢舜歷之雍熙遂堯人之耕鑿乾坤含養之德尚貸光陰雨露霑霈之恩不遺枯朽特降綸旨優加祿秩更沐天慈許朝朔望錫大造於平分之外收無能於委棄之餘荷澤蒙榮空深於抃躍殘生餘喘豈期於答效無任慙悚喜荷之至謹附中使某官某奉表陳謝以聞臣某言顯福門宣敕出彩八十段賜臣充軍裝臣才質駑下智能短乏謀非上略識豈中權謬奉殊私猥參大任雖鑿門之志必掃妖凶而受鉞之功未宣戎幕遽延寵命先承優賞懷恩揆拙既懼且慚惟當誓骨銘心永緘天地之施觸鋒突刃常為士卒之先庶邀犬馬之勳遂滅鯨鯢之黨七擒三捷誠所庶幾九死一生豈當還顧無任悚戴歡欣之至謹奉表陳謝以聞臣攸暨言伏奉恩旨以臣昨扈遊上苑執轡還宮特賜臣瑞錦一匹臣某中謝臣承暉日月漸潤雲霄叨符聖慈纍延宸照遂得入陪金殿出捧玉輿瑤水參八駿之遊璿臺翊二龍之舉榮兼侍從寵冠宗枝捧日無以儷其歡登天未足儔其樂昔蟻封啓繇不回參乘之恩駟馬從良寧承附輿之澤在臣叨忝實邁古今徒欣不世之榮豈望非常之賜況臣地兼臣子職奉君親暫尋咫尺之途才捧神仙之馭有何殊效合降隆私陛下恩愛曲成綢繆纍洽俯回珍異猥及庸微跪開緘題伏視文彩爛若朝霞之初起粲如春花之競發成都濯具本自非儔朝鮮製衣則知難擬方且裁而學政希勉勵於天工服以晝遊庶光榮於戚里效微施廣徒益慚惶恩重命輕罔知酬答無任悚佩之至謹詣閣奉表陳謝以聞臣某言中使某至伏奉手詔慰諭并宣口敕賜臣端午衣一副及銀碗百索等兼賜大將衣若干副者天書綢繆聖澤汪濊被服輝煥承恩隕越臣某中謝臣聞日移東井律應南風正陽為納慶之辰長贏表交運之節臣謬膺任使備位守臣撫封而多愧無能望闕而遙思獻壽而陛下恩覃率土寵並勳賢俯因初五之辰遠頒尺一之詔衣垂纖靡之盛器飾雕刻之珍則辟邪寧假於赤符蠲癘詎勞於朱索況賜霑裨將化洽方偶仰荷殊私實慚非據誓將誕敷渥澤保定藩維變淳風於邑里宣戎政於軍旅俾溪洞安靜波濤不驚伏惟皇明俯照丹慊臣無任云云臣某言中使某至伏奉手詔慰諭并奉宣聖旨賜臣端午衣一副銀碗百索等大將衣兩副者王人遠臨天賚下逮承恩捧詔心悸汗流臣伏以正陽屆節初五授時萬國獻珍以稱壽九天垂衣而納慶至如靡麗出於王府頒賜及於方隅蓋所以褎寵有功旌異有德顧臣庸劣未補涓毫沐日月之齊光與勳賢而並命猥將固陋之質獲茲器用之深衣降九天懼興刺於鵜翼縷分五色增長壽於堯年何角黍之足稱豈纖繒之為比況賚及裨將澤被戎行顧茲殊賜實愧非據臣一至湖湘再周星歲扇皇風而蘇息黎庶布聖澤而砥定封疆今井賦不軍旅知訓庶期獷悍之俗獲躋仁壽之域伏惟鴻造俯察丹誠無任云云臣某等言品官劉阿道至奉墨敕賜臣等臘脂口脂等物恩命匆臨喜抃交至手舞足蹈心慚意悚伏以安寧戒序嘉平在節白日臨於陽谷繁霜入於露寒蘅枺始楟疑桂筵豐暇青牛帳裏未輟爐香朱鳥窗前新調鉛粉因三冬之吉慶造六宮之脂澤糅之以辛夷甲煎燃之以桂火蘭蘇氣溢象奩香衝翠幄以光金屋之仙御以賜瑤房之帝嬪南國容華之人從來未識西京妖冶之妾何時可見臣等叨膺天命謬總留臺雖天動星回暫違於侍從而雲行雨施更延於恩渥猥承郵驛曲賜絲綸分八子之膏腴及三臣之瑣賤竊窺明鏡巳覺衣冠之不任旋顧粧奩遂成箕帚之多幸身輕塵露佩德空深貺等邱山殞身何答無任踴躍屏營之至臣某言伏奉恩敕聽臣致仕祗服慈造不勝銘戴臣本無器識素乏材能幸屬時來屢蒙朝獎虛受榮遇迄無成績光陰漸迫衰疾常留二豎頻侵十旬每曠懼忝腹心之寄遂陳骸骨之請天情曲獎聖澤旁流殷鼎調梅雖輟參議漢藩剖竹仍叨臥理百城肇案六疾彌加竟虧露冕之功俄錫懸車之寵方循初服退守故園忘機求漢水之翁擊壤就堯衢之老歌太平而永日飲聖澤而窮年林壑長辭俟卉木而俱稿雲霄坐隔仰闕庭而增慕無任犬馬棲戀之至謹因留守起居使奉表陳謝以聞謹言臣嶠言臣聞明主程才先求於稱職忠臣效用必務於量己然後庶官無廢百度以康若使假鳳登朝真龍不馭將緣鶴之鼎方憂於折足和鸞之駕必誡於傾輈豈徒鍾鼓生祅蠻夷起笑而巳臣瓶筲賤器駑蹇輕姿同鼯鼠之五伎不成異飛鴻之六翮兼備遭逢幸會纍叨階級陛下降非常之澤垂不次之恩升之冢司握九流之銓管委以樞近參萬機之損益傅説作舟之命徒奉針規仲山補衮之談曾微答效致令衡鏡失序紀綱不張官僚日增府庫歲減謬職之謗或譏於畫武續貂敗官之尤有議於喧盧吠鵲下生朝野之蠹上悖陰陽之和水潦為災慮深於昏墊黎氓失稔憂在於溝壑軫皇情於南面墜國庾於西成虧燮理之節失平分之度推其咎戾實在微臣昔者堯逢阻飢而四嶽咨訪漢遇災異而三公策免舉遺才而求俊乂退不肖而清庶官厥有由來著於古昔臣緝熙莫效尸曠無成以擁腫之凡材抱支離之痼疾久懷致寇之祿猶帶妨官之綬靦目而視不遑自安是用啓處慚惶寢興誡惕思解鵜鶘之服願辭鵷鷺之行庶得保愚公之廬避賢者之路以寧衆口之囂謗以答三靈之譴咎則物情朝序誰不謂宜昔干木辭第恆思衛生營平寢瘵不忘憂國當今兵戎未靜費務方多人庶空虛官僚苟且不可不深為防慮妙思政術臣銜恩佩德念咎慙榮雖智效無聞自甘於罷黜而庸短所見猶樂於輸畫不勝區區之意謹昧死陳利害事一封幸當明主不諱之朝敢效愚臣無隱之節倘蒙赦其狂直收其固陋乃冀有益纖芥效添山海無任悚懼懇誠之至謹詣朝堂奉表陳請以聞臣嶠言奉今月十七日口敕令臣等各自述行能進者臣以蒙鄙遭逢休歷陛下降非常之遇垂不次之恩擢處崇班超登近侍上感皇明識遇之厚下憂忝冒負乘之責常願肝腦塗地以報所天魂魄歸泉不忘結草至於欲披誠款曲盡智能竭心本朝輸力明主此臣日夜之所思念胸襟之所蓄積豈敢更為進退苟事廉隅固守撝謙坐飾邊幅臣早遘凶閔素甘賤貧少纏羸疴不任勞苦從仕代飢寒之役徇祿無顯達之心修身懼於辱先履道期於遠害見強禦之為患也故處之以謙卑知刻薄之為尤也故行之以仁恕慕退讓不敢從馳競之流戒貪殘不敢為絲髮之犯若乃溫良誠信之道忠孝友悌之規莫不仰承聖風俯蹈家訓朿太平之名教移中人之志業及其屏私昵忘比周內無術數之機外絶朋附之黨一心奉主介然孤立此臣之所以登朝廷而事明聖全直道而勗身名者也夫臣事君有死無二見危則致其命當事則先其勞有罪不敢辭有能不敢隱是以西戎不靜充國自衒其謀南越未賓終軍思赴其難臣幸蒙採擇得備驅馳若使飾固陋之心竭駑蹇之用勉之以匪懈將之以至公則雖簿領百端樞衡衆務亦淺深而必效何難易之敢辭哉蓋明主程才以建官忠臣量己以受職是故輪轅異適水火殊用當其材則事逸而功倍乖其分則形勞而績虧陛下棄短收長循名責實使得效其簿伎申其末用則臣之淺術可得而言臣曾涉經典篤好文史漸六藝之腴潤馳百家之閫閾至若操觚秉牘紀事屬辭雖竊比老彭誠未擬於先哲而上追班馬敢自強於後進陛下以欽明撫運齊聖握圖冠千齡而首出超百王而高視德澤汪濊典章明密至道共八風俱翔神功與四時並運是以衆庶悅豫符瑞肸蠁九服清夷百蠻職貢而嵩高梁父未修昭報之壇禮官儒林不輯升平之頌使鴻名有時而鬱良史靡得而稱臣竊懼焉昔成康之隆頌聲並作武宣之盛文章間起虞德茂而皋繇作歌魯道興而奚斯有述然後功業顯乎代德音昭乎聲若夫保馭中和憲章大雅通諷諭之旨攄嗟嘆之懷此臣子之舊經國家之前式不可闕也臣幸得沐浴恩造扶侍軒墀目覩雍熙心積憤悶思陳愚瞽庶存萬一徒以牽迫賤事卒卒無須臾之間頓伏尫羸軋軋多沈滯之思常恐犯霧露填溝壑不獲贊揚上德攄布下情生為負義之人死為孤恩之鬼是用終朝三省達夜九回撫心刻意屏營反側倘得參名藝閣假迹蓬山探石室之祕文覽金版之遺籍聽歌探頌以觀四方之風講藝論詩以崇三代之式第其科目載之編大以薦陳郊廟報享成功小以敷布樂章潤色鴻業使宏勳播於金石盛德流乎舞詠光濟於當日洋被於來葉然後退沒草澤下入幽泉猶生之年也冒陳愚懇惟我陛下察焉臣嶠誠惶誠恐頓首頓首
