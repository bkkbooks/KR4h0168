front:
  text: 全唐文欽定全唐文卷四百九十六權德輿十四
  hash: sha256:952139f2c661da241217c9d58802ef9e36b389501f4df4a20ed4b775054147d3
body:
  text: 皇帝在宥天下十九歲覆露元元柬求官師六服㣥辟辨章教化歲九月制詔湖南長帥中執法李公巽為江西申命小宗伯呂公謂為之代於是循其功善迹其故實百城之吏言於郡伍府之長款於軍鄉部僑舊華顛丱角一其音詞奔走理下請鏤金石以為表式呂公以公之馨香可覆視而不可誣也衆之詠歎可論次而不可遏也悉以列上實蒙可報乃類其言而文之云善為理者必因其俗而求所以便之因其便而思所以化之惠澤被而五教行財用足而百志成上下熙熙臻於洽平古之循吏公之報政皆是道也公字令叔趙郡贊皇人曾祖知讓皇河南府長水主簿祖承允皇任朝散大夫江州別駕考嶷皇右武衛録事參軍代名文行為北州冠族公始以典學含章立於清朝詳平憲令間練程品秉直不回得時寖明能抗駮論輒還成命人之所難於公為易惟天愛人惟聖法天欲其善利逮下也故詳試公以政事其初由殿中侍御史為美源令由刑部員外郎為萬年令由左司郎中為常州刺史邦圻和寧京邑肅清居部考課為諸侯表率是皆章章已然之功也貞元八年冬十二月由給事中至於是邦長沙九疑澤國回遠徵令頗繁物力或屈歲杪逋負夫家病之人未安於里落程不給於公上公乃嗇其經用代其賦輸厚施已責過於萬數得以贍助使之均安又以支郡地征有繫軍實量力調穀減輕緡錢經始致用為之倉庾時其發斂而歲無凶荒以封內饋餉道路風波轉漕沿洄僦載煩苦僝功度木為之舟楫程其遠邇而師以足食以邑里湫隘之不宣也則闢其塗巷以利之以室廬苫蓋之不固也則教其陶瓦以易之講功慮事以建長利如此之備也稽先師之教以進儒術庠孰經明歲時計偕出入阡陌噢咻農里無告則加其餼發聞則弛其征鄉無不率教者修司馬之法以宏其事器用犀利賦輿輯睦拊循以誠少長有禮事親者賙其供養被病者恤以醫藥士無不賈勇者精力賦政以之鎮靜如此之至也唯公直而和肅而寬縝密而智溫良而能斷秉心砥平蒞事風生法制定於上奇邪絶於下故下車而安已日而孚期月而政成五年而增秩六年而進律德風下偃協氣旁達丕休乎哉前後與公交代於是邦者皆以密侍右職來施美化裕茲一方其天意乎昔弱翁次公率以郡國理行入當柄用然則三湘九江之地豈得顓受公之賜耶太師陳詩觀風諸侯言時計功皆前志也暨魯大夫請於周而史克有駉駜之什今潭人以德輿再拜奉命書獲知懿績俾章善頌永篆樂石銘曰帝命元侯允釐方州郁郁李公此焉輯柔洞庭南匯熊湘經介下為度制上以藩衛彤襜淑旗四牡有輝授茲介圭輟自黃扉吏絶私回俗無尤違保惠教順樂郊焉依乃倉乃庾克敏農穡乃刳乃剡利涉不息乃端徑術乃導埏埴政成事時節費寬力七郡清靜百嘉蕃殖誠以愛人滋於樹德今則去我鄰邦是式祝公伊何上贊皇極報公伊何惟金石刻載茲聲詩永慰南國事太清宮及度支諸道鹽鐵轉運等使崇文館大學士上柱國岐國公杜公淮南遺愛碑銘并序通天下之志者在大君元臣之感會而已成天下之務者在知人安人之教化而已孝文御宇貞元十九祀統燭㣥生德侔往初建用皇極澤流萬國淮南節度觀察使左僕射相國杜公政成入覲乃三月壬子朔登拜司空秉鈞居中間一歲上皇承末命越八月皇帝受神器弻亮三聖謨明九功當冢宰總已之任護崇陵因山之制盡董經費以頒地貢乃作司徒式和人則進封岐土命賜備厚均齊天下之政茂遂萬物之宜遵道宏化匪躬宣力中外之重必歸於公初公之入輔也制詔副節度使兵部尚書王公為左僕射代居師帥州壤鄉部鰥孤幼艾蒙公之化也久感公之惠也深鬱陶詠歎願刻金石王公纍章上請公輒牢讓中止至是復以邦人不可奪之誠達於聰明且用季孫行父請史克故事故德輿得類其話言而鋪其馨香云公字君卿京兆杜陵人不書名尊大臣也清明廉直溫毅宏重易之道本於健順忠智之謀發為事業慮善以動得時大行其初筮仕州府交辟韋尚書元甫實為已知始自掾吏纍為命介盈庭鬬辨積歲疑留者片言以聽斷含寃自誣具獄論殺者覆視而全活江介吏師以為神明由殿中侍御史轉主客員外郎工部郎中再為撫州刺史以御史中丞領容州刺史經略使入為金部度支二郎中復兼中丞超拜戶部侍郎出為蘇州刺史屬受代者以憂闋換饒州刺史明年以御史大夫領廣州刺史嶺南節度觀察使徵為尚書左丞復以御史大夫領陝府長史陝虢都防禦觀察使歲在庚午以禮部尚書至於是邦禹貢淮海之域職方東南之奧産金三品射利萬室控荊衡以沿泛通夷越之貨賄四會五達此為咽頤初公之至也歲丁驕陽人有菜色於是息浮費以悅之蠲雜征以利之夫家之稅有冒沒者免其罪以購之廢居之豪有委積者盈其直以出之瀕海棄地茭芻填淤一夫之勤百畝可穫終古遺利沛然嘉生成於指顧得以蕃殖先是營部未葺囷倉未完介夫半寓於仁祠公聚或委於支郡公乃慮材用量事期輯中權規大壯百堵皆作三軍寧宇轅門言言夏屋耽耽可以張射侯可以容宴豆爰居爰處而武備修矣巨廩崇構翬飛雲矗縮以板幹積如京坻得蓋藏之宜協出入之制多黍多稌而禮節行矣連營三十二積穀五十萬工以悅使人以樂成又瀦雷陂以溉穡地釃引新渠匯於河流皆省工費而宏利澤俄授左揆竟參大政加徐泗濠等州節度使先皇帝在宥天下推恩彭城顧懷舊勞復命其嗣使得以州師建節而公以二郡進律惟公鎮定一方心平德和言仁必及人言智必及事生聚教訓勤身急病視闔境如棖闑之內撫編人有父母之愛因其習俗而均安之識其慘舒而導利之仕六朝而時推元老踰二紀而再掌邦賦揚美化於方志流淑聲於命書其牧臨川也地參閩蛋人本輕惰化彼遊手敏於農功堅舊防而時其蓄泄當大旱而我有雲雨每歲徵令歸諸有司克變輸將之勤不虧公上之入因獲贏利悉賙困窮其總司計也權重輕以平物力受比要以均財征厚生而不匱量入而有節當一人注意之重盡三接沃心之言宰司沮傷不得久處其鎮南海也服嶺阻深族類猜害塗巷狹陋熛埃接連忿懥相因鬱攸斯作公乃修伍列闢康莊禮俗以阜火災自息南金象齒航海貿遷悍將反覆遠夷愁擾吏困沓貪商久阻絶公乃導其善利推以信誠萬船繼至百貨錯出雍部絶徼裔人自擅誘掖招徠以威以懷朱崖黎氏保險三代種落盤互數犯吏禁公麾偏師一舉而平獷俗率化原人得職其登左轄也紀律修明清萬事之本其理分陝也惠綏浹洽宏二南之化必宿其業而修其方崇庸大績其昭昭如是而又博極書術詳觀古今謀王體斷國論其言有章聽者皆竦作為通典以究理道上下數千百年間損益討論而折衷之佐王之業盡在是矣公之先在漢則建平敬侯有立宣之功在晉則當陽成侯決平吳之策忠力雋賢寖明而昌以至曾祖諱行敏皇銀青光祿大夫荊益二州大都督府長史南陽郡公王父諱慤尚書右司員外郎麗正殿學士烈考諱希望歷鴻臚卿御史中丞再為恆州剌史代鄯二州都督西河郡太守襄陽縣男贈尚書左僕射惟南陽德化茂於列藩惟右司文雅重於中臺惟僕射有文武器任克揚風績其督鄯州總節制留府數與虜確奮其威謀奪鹽泉吞河曲城便地置新軍剖符惠人理行第一以先大夫代德丕烈之若是公能聿修而宏大之憑厚貽慶為不誣矣居鎮十三年願修覲謁拜章十上西向涕淚上難其繼慰勉而已公以述職在於庇人納忠在於薦賢密疏請以王公為代詔為之二暨公之至也由大司寇為大司馬以副車戎伏謁和門禮容渥命寵耀藩服介圭得請丹轂載馳勳籍裨校乞留遮道初諭以溫顏終肅以軍法既告令尹之政卒獲子牟之心詩曰布政優優百祿是遒又曰神之聽之式穀以汝則岐公永享鮐耋如岡如陵不待瞽史而前知矣惟王公師長論道如公之位阜俗撫封如公之心且以斯人嚮慕三歲愈甚大懼公之功德寢而不章初撫人廣人皆鏤堅石以攄盛烈及茲而追琢者三矣古所謂信讓以蒞百姓則人之報禮重其在是乎銘曰惟天惠人惟辟奉天利建元侯於藩於宣文武杜公端誠潔矩化洽陝服聿來茲土闢我舄鹵長我禾黍乃建營部乃新廩庾成師足食比屋安堵里閭熙熙衍沃膴膴十有三年慰安斯人雪泣抗章血誠上陳結戀明庭不私其身樹善交代如公之仁考祥視履宜錫蕃祉寅亮三朝是毗是倚密勿中樞矢其謀謨乃升司空亦作司徒九賦既平五教式敷中外之重惟公是圖彼都人士飲公之德彼土樂康繄公之力永言介福祝我岐國稽合聲詩於胥篆刻彼泉而實彼石而泐公之德耀永永無極維唐十二葉皇帝纂大統建大中始初清明敷佑下土稽四征六服之理閲先正宗臣之籍流慶斯復遺風可懷繇是博陵上谷列侯二千石元僚司武從事亞旅上其故府太師貞武公功德請銘於碑以示厥後乃詔小司徒臣德輿因地域之名物酌軍師之憲令舉而敘之云公諱孝忠字孝忠其先燕人八代祖奇北齊右北平太守封右北平王齊季喪亂實開邊隙代有長技軼於外區曾王父靖乙失活部落節度使王父遜部落刺史父謐早襲先職來朝上京星環北極輸君長之贄幣鵬變南溟發邊關之導譯拜開府儀同三司他日以公之勤纍贈至戶部尚書公雄姿正志沈毅英達傳兵符於百勝襲王爵於九代年未弱冠入侍明庭才為異倫射必命中以日磾之信愛受秦仲之車服自他有耀至是來歸時元宗御天下四十餘載習文事而去武備人不知戰恬於已然幽陵首禍穀洛恇駭公迹染汙俗心堅本朝豈求生以害仁將蹈難以明義史羯繼亂猶居劫中質其所恃無路自奮間道旁午密陳嘉猷俄而成德軍節度李寶臣錫姓撫封同信臣之任就義若渴推心於公綜其都軍以壯支郡乃策崇勳纍居大官凡軍師之禁令攻守之奇正成德之重必咨於公鄰帥猖蹶皇赫問罪公出自上谷覘於貝邱冠徒六萬將犯中冀乘轅外嚮方陳而前公以駟介千數飇馳急擊冞入其阻夾攻其堅敵人力屈昏夜引去遷御史中丞封范陽郡王尋拜易州刺史加太子賓客以軍之輯睦移於郡以郡之班制叶於軍文理武毅交修四暢師貞人和為列郡表儀初公與寶臣感慨於少年之場周旋於多難之際迎導善氣切劘良規若驂有靳如熱斯濯異時自代前定於公且曰輿師之心勳力之冠也俄而寢疾瘖不能言猶以手指北瞪然注目既而惡子阻命陰交匪人因喪以干紀專地而圖禍公驟諫不入飛章上陳請以州兵首遏亂略優詔拜工部尚書兼御史大夫恆州刺史成德軍節度使一人注意四履專征糾合諸侯連收城縣敗之於束鹿走之於常山以至斬首且無遺策轉兵部尚書易州刺史易定滄等州節度觀察使錫軍號曰義武時三分恆陽之地録功有差而㣥帥侈心或懷觖望太行而東疆埸日駭且有從約皆為假王公居其腹心守正持重玉立於磷緇之際雞鳴於風雨之中靜柯徑草在我而已彼朱滔者以燕啖公夸大煽結譸張指斥公乃出和門以蒞衆援皎日以誓心義利之間死生不惑且曰縣官之所以賦軍宿兵下尺一之詔者在排難捍患而已吾徒之所以乘堅驅良佩丈二之組者在畢力致命而已碎首塗地吾無悔焉一心事君四面受敵俄屬京師急變鑾輅時巡時太師西平王以禁兵自魏來援於我於是與公決策赴行在所公素約以伯仲又申之婚姻分鋭師選良將授以赴蹈使居顏行斷金之契匪石不轉定山東為已任坐制㣥疑清轂下為前籌行戡大憝赤誠相照血涕交頤西平繇是建大勳立大烈而公亦靜深以制動貞厲以代謀使其徒散約而無亡矢遺鏃之費者公之功也前此拜尚書左僕射至是同中書門下平章事貞元元年就加司空凡受律行師十有一歲承寧諸侯減黜不端動有節制人斯愛戴贍助其供養賻補其禮喪拊循接禮勞徠安輯輔以正德而不怵於邪濟以守忠而不回於利章灼卓異有初有終其居涼國太夫人憂也手植松檟倚廬於墓感致瑞祉詔旌其門終身之哀加人一等不遺故舊皆以器使戲下多善吏庭中無留事雖古人之威懷無以過焉春秋六十二以七年三月感疾薨於位德宗皇帝不視朝三日册贈太傅詔郎吏弔祠禮賻有加其後纍贈太師易曰貞武追封上谷郡王易之大有曰信以發志禮之中庸曰誠之不可掩惟公推本於是暗然而彰德宇宏大色容厲肅長才經武奇表出倫喬枝戛雲以直上雄劒發匣而耀穎始以天寶十載受詔即戎授范陽郡洪源府右果毅破九姓突厥改上黨郡漳源府折衝乾元初轉左領軍衛翊府左郎將實鎮飛狐之地寶應中拜左武衛大將軍加金印紫綬歷左金吾大將軍兼太僕卿殿中監以至於專席賓護剖符建牙載居六官乃進左揆燮和鼎飪平理水土真食大封異姓而王積功伐以崇厚履信順而光大壯武之後遠繼公台富平之門時推德器豈徒然哉嗣子今司空同中書門下平章事延德郡王茂昭以全才休績保大宣力戴翼天子撫征諸侯常以工部尚書建旟博陵以刑部尚書循方伯之職特詔所理郡為大都督府經歷右僕射司空丞居代官南北軍衛爪牙上將同氣分職寵冒一時侯王則銀黃相映子弟乃金埒對起流光貽訓其信矣乎二十年延德王以介圭四牡來朝京師德宗沃心嘉歎燕喜蕃錫如韓侯申伯故事順宗繼明崇德報功及居台宰進掌邦教敦喻還鎮涕洟就塗今皇帝以道御天下燭明理本間歲再入覲為守臣龜龍乞留京師以奉朝請堅若金石激以肺肝服勤王家丕赫宸眷感念勳節顧懷義方直以鄭武公桓公漢韋平父子古先懿鑠舉集公門二邦幼艾千夫長百夫長沐浴風烈怵惕慕思是儀古式以永光耀斯不朽之事也拜君命之辱而傳信焉銘曰天秉日星亦有風霆君用文德亦資武力太師矯矯生我王國時或艱屯師惟壯直大蹇朋來其心不回好謀而成義路乃開博陵上谷地直析木既夷狡童則理長轂威謀抗勵命賜渥縟回回盜泉皎皎嘉玊凡我所履與之豐福士皆賈餘人以仰足雕戈衮章裕此一方追錫弔祠禮優職喪司徒襲慶道叶仁聖三朝戴君皆受四命覲禮煌煌嘉猷洋洋湛露彤弓威儀有光甘棠蔽芾邵伯所憩緇衣改為鄭國之詩仍代洪烈邦人戴之永言置懷乃刻斯碑貞元十有八年秋九月皇帝以安定節制南川郡王昌之休勳懿績與邦人臺老之詠歎聲頌詔掌文之臣某論次其詞以永金石臣拜手稽首祗若休命於是考侯王之表稽贊命之書採太常景鐘之義而繫辭曰惟元后聰明齊聖以臨於下惟藎臣厲翼莊誠以奉於上上下成和協建皇極此南川所以感會神武發揚碩膚公嶷然持重為國保障理涇人十五年政成事節師以律成人以富教智若蓍蔡動如風霆內總端揆外崇長伯八旒七章元衮赤舄有南仲方城之略有充國劭農之績君使臣臣事君發舒震耀事業光大其理然也公姓劉氏彭城人少沈毅尚氣節得大易之師貞春秋之武經肇自幼學揣摩感概天寶末年未弱冠從河南節度使張介然東討林胡以勞署易州遂城府左果毅其後所奉之府則李太尉光弻劉司徒元佐或盡護車賦率先顏行是為腹心節以金鼓軍之善政無不參焉師之右職無不綜焉遷至開府儀同三司於列卿為太僕太常於御史府為中丞大夫歷太子詹事左散騎常侍工部禮部二尚書異姓而王真食其賦凡三益封至二百室初拒史朝義也宋州郡將委以扞城賊鋒持久力屈引去又皆留其戲下劇虜濟以利兵鈎援臨衝環城傅堞公以淮海屏蔽實繫於斯血誠怒髮士氣旁厲周月堅拒援師實來以愜愜之危走婪婪之狄始佐宣武軍也任當委重往必投艱既定彭城之急旋假濮陽之守主忠信以任患難整偏師以立奇功奮其材謀多所克寸獲抗希烈而壁寧陵也以徒兵三千組甲五萬登陴搏戰且逾四旬激衆扶傷竟申九拒於是救淮揚拔大梁或倍道以赴晨壓其壘或鼓行而進終覆其巢於此二役也擒翟暉虜鄭賁師不留行甲首山積然後窮追急擊至於許昌渠魁窘困終以泯滅凡三與虜確而河汴之間乃平皆公之為而元佐任公之效也故旬歲間纍居大僚貞元三年朝廷以五原盛秋式遏侵軼詔公領宣武駟介北出護邊有逗撓犯令者立斬三百人以徇傳校肅然威讋朔野俄拜本軍京西行營節度使雖拊循行師未有分地而車服恩禮已如守臣明年遷四鎮北庭行軍兼涇原等州節度使度支營田等使涇州刺史是拜居秦之北地漢之回中俗修武備而尚氣敢自馬司徒璘段太尉秀實之以威望德聲懷寧邊部其後禍拏師老疆埸蕭然或依違選愞日闋而已昆夷遊騎時及我郛西門不啓南畝益蹙公曰兵以奇勝亦以嚴終寇不可玩在吾彀中矣於是建長利規遠略程日力興人徒西城平涼開地二百里據彈箏峽之嶮北城保定深入百餘里扞青石嶺之固凡七城二堡有堅甲利刃制彼衝厄絶其驅侵公之封內爟燧滅息昔之甌脫今有市列井樹之間犬雞相聞東諸侯勤王之師得以寧宇而又因士之餘勇求地之遺利荷戈而戰擁耒而耕出聞三捷之績居盡四支之敏闢彼塉磽麥禾蔽野亦既悅使而皆樂從十二年就加尚書右僕射威功既成教化既明里閭有豐年亭鄣有吉語其或四方之旅謁急於公則耀威於長武納將於歸化皆稟睿略而奏成功十五年條軍市之租上獻天府數至十萬以贍東師鋭於為國遠慮數言邊事蓄資力修賦輿思欲大舉衝擊收功絶域之外豈徒使朝那陰密緩帶安枕而已哉惟公王褱姿碩量倜儻英偉文理武毅冠於㣥倫雲蒸風行交感至用志氣申而功業大寵嘉集而名器崇至若勤身惠人勞徠安集遵守條職貫通典彞有行父事君之心有考父益恭之德可以表率發於純誠宜其長保富貴為時元老昔尹吉甫美宣王任賢使能作江漢蒸民之詩惟聖人感人心以和平天下惟賢臣協聖謨以鎮靜方國則皇帝之注意南川之陳力是信是使有嚴有翼敷宣景化浹洽休德不然則被邊戴白之叟披肺肝排閶闔而胡為來哉敘武略所以揚天聲美元侯所以流王澤敢附雅頌式昭德音銘曰天地健順三辰光潤君臣感通一德誠信皇明照燭保合休運亮采有邦登昭傑雋帝曰爾昌碩勳洸洸爰自偏師幹不庭方席勝無前援陳下梁爾戰則克爾謀則臧公拜休命藩宣賦政介圭暢轂撫是安定其猷克壯上協仁聖沛然成功執德之柄乃峻壘垣壘垣崇崇乃藝黍稷黍稷芃芃出有鋭師入為良農保就滋殖時公之功武經輯矣文事亦理十有五年肅清邊鄙宜登介祉永錫遐紀告類納忠以毗天子皤皤涇人俯僂上陳肅肅王命命茲下臣采獲誠詞章明異倫鏤此貞石輝光日新
