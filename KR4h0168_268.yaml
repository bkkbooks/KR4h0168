body:
  text: 東門者前刺史平陽崔公庭玉今長史京兆韋公揚先司馬北平陽公洽郡縣寮佐所創搆也聞乎信所以守物義所以建利因時制事事無其以欲從人人安其業夫如是則有訓有典可象可愛昔惠渠既通時歌樊陵之美學堂爰設俗賴文翁之化徵名校實我固有焉使君名璵字庭玉生稟殊操體含中和性達心敏長材不器故經之以恭儉溫良緯之以貞直忠肅政事文學弱冠有聲解褐授署州參軍秩終恥屑就卑位從刺史辟或出入燕魏周遊關河用晦遏光垂二十載博陵公崔元暐之居冢司也聞而命焉授幽州戶曹參軍都督右僕射唐公大將軍薛公並引置幕府俾司軍事屬北胡憑踐東夷寇虐邊飛羽檄堂施樽俎公戮力悉心剖綜條暢以清幹著稱為巡察使御史張希元所薦奏遷荊州戶曹參軍湘郢凋弊創夷荒阻公疏科籍辨井田黎人時雍頌聲載路前長史尚書左丞元暕後長史吏部尚書崔日用咸加殊禮再以清白升進召至闕下兵部尚書代國公郭元振刑部尚書耿國公趙昭以公有宏算遠圖可以折衝禦侮俱奏參戎旅兼攝監察御史軍還即真自殿中三命至侍御史舉直錯枉蠲苛糾慝不為利回不為義疚除兵部員外郎遷郎中加朝散大夫夏官之任司馬之法公能革之公能折之詰禁制軍於是乎在故為國相梁公深所嗟賞焉天子方急鉛銅之資息役簡賦勦萑蒲之聚通商惠工以弊兼此郡故命公為守也原隰既平天監在下厥繇克紹帝曰休哉南至衡山敕公總察對揚嘉命疇敢不祗乃紆亹夷以煩掃地更作沉潛剛克強固柔順言稽典謨動踐規範懼國賦不給故公為之薄斂於是乎戶忘流迸懼年穀不登故公為之發倉於是乎郡無餒絶懼人之乏困故公為之巳責於是乎境實保寧懼天災流行故公為之禮神於是乎時無淫孽氓之惸獨恤之慈也士之賢行旌之禮也邦之庠孰廣之學也里之喪祭遵之訓也人之稼穡勸之時也吏之敓攘致之辟也訟之疑怨申之理也俗之奢僭約之儉也獄之小大必以情也物之洪纖罔不綜也然後命録事參軍宋重茂宣城令長孫勗務三時保四封濬溝洫修城郭以尉杜烜副焉茂也業尚夷素識資端慤司舉多則臨人以莊勗也正實自躬化能周物忠信之長慈惠之師烜也淳裕敦質貞才粹理兼主簿劉元察尉崔愔等咸欽率訓矩經之營之慮事以度功縮板以載作呈土物計徒庸揣高卑司啓閉審曲面勢上棟下宇築之登登約之閣閣庶高門有閌修衢如砥故鞠躬以從禮擊柝以防暴豈魯國之不時寧吳閶之能擬閹茂歲太衝日公將伏奏洛師郡人前華容令吳元暉無錫尉奚山松等數百人比肩接踵或泣或歌同揚言曰公之鎮也化盈弊壞事謀先達止盜賊張敞之牧冀州舉閉縱賈逵之牧豫州勸種殖李恂之牧亠兊州棄託書趙炎之牧青州躬節儉胡質之牧荊州問疾苦郭細侯之牧并州雨隨車百里嵩之牧徐州公兼茲懿業棄我而歸載馳載驅靡瞻靡依甘棠勿翦高門巍巍刻頌於石紀公之徽頌曰氓既庶吏勿率帝曰俞公是恤君子慰小人栗賢才升凶悍黜徽績亮謨猷秩禁令施恩化溢建城市平街術役以時揆以日材式慮功難逸牆靡茨門距蓽引還旆戒徂驛嘻我公恍而失思厥聲之允嗣庶耿光之可述臣平一言臣緣修起居注太史監每季有牒臣伏見從去歲巳來屢有災異熒惑入羽林太白再經天太陽虧月犯大角臣伏按舊史文志咸非休吉之感或為咎徵之兆臣聞災不妄生變不虛設象見於上人應於下其理昭彰有如影響陛下嗣膺鴻業夤畏上元故皇天不言以災眚譴誡詩曰敬天之怒不敢驅馳又曰惟此文王小心翼翼昭事上帝聿懷多福臣伏見陛下孝愛因心敦崇戚族澤濡后氏恩洽外家位以慈周榮因惠假臣當宗親階越三等家有數侯既忝國姻復叨枝屬朱輪華轂金榜瑤簪過東漢之梁鄧邁西京之許史光耀焜煌古今所絶誠陛下睦於親寵降於慈貸誠未息譏諆深近囂黷恩彌崇而議彌積位逾厚而釁逾擁臣又聞月滿必虧日盈則蝕春秋有交謝之理星律有輪環之次時不再來榮難久藉昔永淳之後藩維搆孽王室多難先聖考運從權時居寶歷臣諸房等地惟宗子爵列扞城竊祿疏封屢回星紀今皇明復辟聖政惟新自合恭守園廬遙承雨露庇影椒房之末階親槐里之餘今乃再假寵靈驟貽獎渥姻從日茂爵封如初但見升崇無聞損降高班厚位遂超涯極以此或陰氣僭陽乾文告變且頃年已來河洛泛溢東都西京俱有水潦蓋以陰氣太盛所致昔王家驕貴梅福上書竇氏專權丁鴻進諫臣伏思古來后妃之始自呂霍上官閻董之氏皆以恩寵過深驕盈僭溢一朝傾覆竟無噍類易曰不遠而復又曰鼎折足覆公餗伏願思抑損之宜運長遠之策或令安車就第使剖符臨州遠之以機權錫之以間逸上恭乾乾之惕下全親親之道則肅彰國圖殷鑒後葉臣釁招酷罰待斃苫壤聖心不棄窮穢備官史册哀緒莫申餘陰無幾精魂屢竭昭恤末流如將有補明時不矜荒殆伏乞假名外郡遂禮私庭冀存識爽少酬靦冒臣瞻光視漏豈復支久既因災眚誠兼宗國俯揆殘骸退深荒越審言譽鬱中朝文高前列是以升榮粉署擢秀蘭臺往以微瑕久從遠謫陛下膺圖玉扆下制金門收賈誼於長沙返蔡雍於左校審言獲登文館預奉屬車未獻長卿之辭遽啓元瑜之悼臣等積薪增愧焚芝盈感伏乞恩加朱紱寵及幽泉假飾終之儀舉哀榮之典庶敝帷莫棄墜履無遺樂天之和禮地之序禮配地樂應天故音動於心聲形於物因心哀樂感物應變樂正則風化正樂邪則政教邪先王所以達廢興也伏見胡樂施於音律本備四夷之數比來日益流宕異曲新聲哀思淫溺始自王公稍及閭巷妖伎胡人街童市子或言妃主情貌或列王公名質詠歌蹈舞號曰合生昔齊衰有行伴侶陳滅有玉樹後庭花趨數驁僻皆亡國之音夫禮慊而不進即銷樂流而不反則放臣願屏流僻崇肅雍凡胡樂備四夷外一皆罷遣况兩儀承慶殿者陛下受朝聽政之所比大饗㣥臣不容以倡優媟狎虧汚邦典若聽政之暇苟玩耳目自當奏之後庭可也病之在四體者迹分而易逐居心腹者候遽而難治刑政乖舛四支疾也親權猜間心腹疾也書曰克明峻德以親九族九族既睦平章百姓詩曰協比其鄰婚姻孔云是知親族以輯睦為義也自頃權貴猜防外和內離怨結姻婭疑生骨肉邀榮之徒跪獻忠款膏脣之伍苟輸讒計脅肩邸第之中噤頤媼宦之側故過從絶猜嫌構親愛乖黨與生積霜成冰禍不可既願悉召近親貴人會宴內殿告以輯睦申以恩勤斥姦人塞讒路若猶未巳則捨近圖遠以抑慈示嚴惟陛下之命易稱河出圖洛出書聖人則之故伏羲氏觀象於天觀法於地近取諸身遠取諸物始作八卦軒轅氏之王也使蒼頡象鳥獸之迹以為文字故銘於鍾鼎列於竹帛至周宣王太史史籀者作大篆十五篇秦始皇之并天下也丞相李斯一文字之制作蒼頡篇其後車府令趙高作爰歷篇太史令胡母敬作博學篇頗有省改謂小篆也周曰六書秦稱八體或云隸書者始皇使下邽人程邈所作漢因行之扶風曹喜善篆隸時人師之光和後左中郎陳留蔡雍於篆隸博究其妙靈帝好書術雜藝置鴻都以招納之則有師宜官梁鵠之徒預焉遇漢末鵠奔劉表魏武破荊獲鵠雅好其書恆懸帳下以玩之鵠弟子毛宏教於祕書今八分楷法是也安平崔瑗父子作草勢宏農張芝轉加其巧即王逸少所言臨池學書池水盡黑韋仲將所謂草聖芝弟黃門郎昶亞焉魏太和中韋誕自武都太守以善書至侍郎宮觀寶器皆誕之迹嘗登淩雲臺題榜下而白首太尉鍾繇一時之妙冠於前垂於後繇子會晉太保衛瓘父子吳人皇象晉征西司馬索靖中書郎李克母衛夫人並得鍾張之楷擅價當時中興後王丞相茂宏父子庾征西稚恭兄弟咸著盛名於江西其窮神極變龍翔天逸今古獨立者見乎晉會稽內史右將軍琅琊王羲之羲之子獻之亦傳其妙而不之逮也先賢所評子敬之比逸少猶士季之比元常言去之遠矣故二王之迹歷代寶之宋文齊高洎梁武父子湘東邵陵咸以為師楷梁大同中武帝敕周興嗣撰千字文使殷鐵石模次羲之之迹以賜八王右軍之書咸歸梁室屬侯景亂兵火之後多從湮闕而西臺諸宮尚積餘寶元帝之死一皆自焚可為悲也歷周至隋初并天下大業之始後主頗求其書往往有獻者及隋之季王師入秦又於洛陽擒二偽主兩京祕閣之寶揚都扈從之書皆為吾有太宗於右軍之書特留睿賞貞觀初下詔購求殆盡遺逸萬機之暇備加執玩蘭亭樂毅尤聞寶重常令拓書人湯普徹等拓蘭亭賜梁公房元齡巳下八人普徹竊拓以出故在外傳之及太宗晏駕本入元宮至高宗又敕馮承素諸葛真拓樂毅論及雜帖數本賜長孫無忌等六人在外方有洎大聖天后御極也尤為寶嗇平一齠齔之歲見育宮中切覩先后閲書法數軸將拓以賜藩邸時見宮人出六十餘函於億歲殿曝之多裝以鏤牙軸紫羅褾云是太宗時裝中有故青綾褾瑁軸者云梁朝舊迹標首各題篇目行字等數草書多於其側帖真字楷書每函可二十餘卷別有一小函可十有餘卷所記憶者是扇書樂毅告誓黃庭當時私訪所主女學問其函盡出以否答曰尚有未知幾許至中宗神龍中貴戚寵甚宮禁不嚴御府之珍多歸私宅先盡金璧次及法書嬪主之家因此而出或有報安樂公主者主於內出二十餘函駙馬武延秀久踐虜庭無功於此徒聞二王之迹強學寶重乃呼薛稷鄭愔及平一評善惡諸人隨事答為上者登時去牙軸紫褾只以漆軸黃麻紙標題云特健藥云是虜語其書合作者時有太宗御筆於後題之嘆其雄逸太平公主聞之遽於內取數函及樂毅等小函以歸延秀之死側聞睿宗命薛稷擇而進之薛竊留佳者十餘軸薛之敗也為簿録官所盜平一任郴州日與太平子薛崇裔堂兄子崇允連官説太平之敗崇裔懷樂毅等七軸請崇允託其叔駙馬璥貽歧王以求免戾此書因歸邸第崇裔弟崇簡娶梁宣王女主家王室之書亦為其所有後獲罪謫五溪書歸御府而朝士王公亦往往觀之夫龜文以來鳥迹之後六書八體時咸寶之而代易百王年移千葉舊文殘闕遺篇湮散非窮微極精博雅好古孰能辨以問之學以聚之豫州刺史東海徐公嶠之懷才蘊藝依仁踐禮自許筆精人稱草聖九邱七略五車百氏未遇仲尼之賢猶繁茂先之室至於魏陵逸策魯室前書字辨陽循疑招束皙師宜削去之版逸少為題之扇莫不煙霏露凝鳥歧魚躍填綵筐溢雕廚貽之後昆永為家寶季子浩並有羲獻之妙待詔金門家多法書見託斯文題其篇目行字列之如後詹事張庭圭之家抑其次也國忠武后朝官萬年縣令以數進祥瑞遷尚方監臣某言伏奉制書以臣為尚方監忽承鴻霈遽辱崇章澤甚漏泉懼深阽谷臣材乖遠大識謝淹通曾微汗馬之勞非有成麟之業欣逢睿歷謬踐清階自邇陟遠從幽至顯題輿外郡多慙展驥之能綰墨中京久乏棲鸞之譽雖韋弦自勗而寬猛猶昧空慙尸素罕聞政績幸以聖德動天而神山發地踴奇峯而概日披秀崿以干雲虔惟造化之靈以告休明之慶帝之力也臣何預焉乾獎曲臨聖恩橫被俄輟一同之務坐遷二府之班秩亞括河榮兼稅滓顧茲疏謏何以克堪伏願七景停輝五潢收潤矜容薄淺更採英髦則上不汨於朝彞下無招於官謗無任控款之至景先常州義興人徙居洛陽舉進士神龍初擢拜左拾遺外補滑州司士參軍連舉手筆俊拔茂才異等纍除殿中侍御史知制誥出歷虢州岐州刺史入拜吏部侍郎近臣以三九之辰頻賜宴射巳著格令猶降綸言但古制雖存禮章多闕官員纍倍帑藏未充水旱相仍繼之師旅既不足以觀德又未足以威邊耗國損人且為不急夫古之天子以射選諸侯以射飾禮樂以射觀容志故有騶虞貍首之奏采蘩采蘋之樂天子則以備官為節諸侯則以時會為節卿大夫以循法為節士以不失職為節皆審志固行德美事成陰陽克和暴亂不作故諸侯貢士亦試於射宮容體有虧則絀其地是以諸侯君臣皆盡志於射射之禮也大矣哉今則不然衆官既多鳴鏑亂下以苟獲為利以偶中為能素無五善之容頗失三侯之禮冗官厚秩禁衛崇班動盈纍千其算無數近河南河北水潦處多林胡小蕃見寇郊壘軍書日至河朔騷然命將除凶未圖克捷興師十萬日費千金去歲豫亳兩州微遭旱損庸賦不辦以致流亡聖人憂勤降使招恤雖經歲月猶未能安人之困窮以至於此今一箭偶中是費一丁庸調用之既無惻隱獲之固無恥慙考古循今則為未可且禁衛武官隨番許射能中的者必有賞焉此則訓武習戎時習不闕待寇寧歲稔率由舊章則愛禮養人幸甚幸甚先萬物者始道德為宗窮言象者以乾坤為大豈若道洽沙界盤古無以化其迹功包鐵圍隸首不能紀其要前後際斷衆妙入於真乘色相皆空定慧生於正覺言之不極其波若之蘊乎聞喜唐興寺者我國家草昧之所置也時櫜弓矢締構龍官懸玉鏡於方丈運寶圖於羅衛將袪八難式護四禪乃於西山建斯精舍布金幽徑樹福琁衡經始險蹊人迹罕到雖三空屢説給園之衆不俱八解常流方廣之途尚阻氓俗常迷於夢幻聚落不聞闕三字遂使十地空有四生無拯爰初搆址數十百年舊令因循不改其制長者居士既渴日於寶坊清信比邱徒潔瓶於諦議時縣令朝議大夫東海于公名光庭即銀青光祿大夫瀛州刺史東海郡公士俊之孫金紫光祿大夫中書侍郎同中書門下三品東海憲公之第五子也承五鼎之葉胄稟三辰之粹精陰德未沫亢宗有後在躬而禮義克舉餘力而文章見稱好學多能以為入官之具清慎寡欲彌見在公之心由也四科參乎一貫理必合於投刃事無遺於下韝故能變蟋蟀之風展蒲盧之化始鄉退而修里我有昌言終里退而修家人無遺善此其操刀有裕彈琴自間亦既砥於王程將又崇於佛事為蒲之所不及理鄴之所未行加以識洞真扃智融覺鍵伏忍於三昧懸解於六通身若明珠淨無瑕穢心猶平地能生衆善且循調御時見宰官精三異之妙術敷六度之津要由是歷請天府將徙梵宮雙樹移堅固之林八座改耆闍之岫金山赫赫與紫殿而飛來紺宇耽耽化青樓而涌出城池故絳井邑新田士女溢於康莊象馬闐於里閈一一香蓋懸寶縷之幢種種天花散金燈之地得未曾有聞所未聞方將洗貪欲之腸腎開盲聾之耳目納須彌於小芥詎是難思置海水於虛空未為希有僉以法雲西蓄佛日有蔀家之昧今智炬東摧迷途昭牽復之象豈非如來滅後將有住持時夏縣威神寺法師俗姓張法名忽硉其先衣冠出南陽精持律儀薰修戒行德超於四果理貫於三伊大道未行同孔子之歷聘衆生有病等醫王之授手遂乘杯涑澨振錫兆亭拔聾俗於愛河誘焚如於火宅示方便品導波若流亡羊於九部之津去馬於三乘之際莫不爭持寶蓋競解闕三字耨池之棟宇為苦海之舟航起豫者商繄我明宰時縣丞清河張佑仁主簿宏農楊浩尉太原王臨尉太原王銑等並瑚璉名器鸞皇徑翮才無滯用政有異聲鄉三老進而言曰今敦禮勸農嘉惠也樹法拯人深慈也我宰君善化前古罕儔豈使浚儀豐碑空銘景行龍宮後偈獨閟徽言載勒堅金永傳沙界銘曰佛言能淨一剎土是謂世間良福田今我莊嚴招提宇度脫功德海無邊猶如法雲覆㣥品亦如佛日在中天皆是宰官惠明德㣥毗安樂離苦緣樹碑紀功永不朽銖衣拂石億萬年若訥中宗朝官右補闕臣聞詩人闡教深懷罔極之思孔氏立言式崇無改之道伏惟應天皇帝陛下孝德純至超越禮經聖感潛通光昭瑞應置聖善報慈之閣義貫於終天存合宮永昌之號敬深於如在伏見天地日月君臣國人授載初慶殿等字皆先朝創制久巳施行陛下纂承丕緒嗣守洪業父子相傳國家仍舊此並則天能事生人積習何所要切登時削除當為賊臣敬暉等秉政包藏逆節前規務從變易所以多有改張今削之無益於淳化存之有光於孝理又神龍元年三月五日制書一事巳上並依貞觀故事者但則天遺訓誠曰母儀太宗舊章是稱祖德其於沿襲應從近遠無容近捨母儀遠尊祖德昔永徽之時不聞依武德舊章今陛下膺期乃欲追尊昔依貞觀故事如其遠依貞觀實恐未益先朝以臣愚識請更詳審則望繼明纂聖之業無替始終奉先成志之道增耀竹帛恆字子濟開元初由拾遺為御史出佐益州攝御史中丞歷襄州陝州刺史臣聞昔漢制反支日亦通奏事又光武在軍躬自覽疏明帝撫運夜必讀書豈以四序炎寒有妨正理况陛下紹登大位初啓中興六合之內莫不延首傾聽威恩未著忠信未孚勤勞者未達沉滯者未舉逋逃者未還浮偽者未息兼之郡國凋弊倉廩空虛訟獄猶繁澆淳尚雜外逼凶寇調發未寧內切飢寒衣食不足人思陛下企望太平久矣陛下固宜兢兢業業居安慮危絶嗜欲之源崇清淨之化宵衣旰食以答蒼生之望簡賢任能以救蒼生之弊使天下翕然變風變俗奈何以其微熱遂闕一日萬機之事六合之內不可家到戶説必謂陛下安其宮室重以宴間忽於黎庶怠於聽政復何以達堯心於天下復何以垂令範於後代臣愚竊為陛下有所歎惜務光字子昂一名烈汾州西河人第進士調洛陽尉遷右衛騎曹參軍以監察御史巡察河南道考最進殿中侍御史遷右臺卒年四十二臣聞有國有家者以恤人為務節用為先故唐堯至化采椽不斫漢文深仁露臺罷構西方之聖道貴融心使下人不寧匹夫竊歎豈菩薩無相布施如來慈悲本旨哉陛下孝思罔極崇建明因土木之功莊嚴斯畢僧房精舍宴坐有餘禪寺道場經行巳足若開拓奪人便利貧者有擠壑之憂富者無安堵之所幸非急切何至於斯况陽和發生播植伊始興役丁匠廢棄農功一夫不耕必有飢者三時之務安可奪焉臣聞失鬼神之心可因巫祝而謝失君長之心可因左右而謝失父母之心可因親戚而謝惟失百姓之心不可解也陛下以萬方為念何用傷一物之心臣雖至愚猶有所惑方今西戎尚梗北虜未羈戰士老於邊亭役車屯於塞下氓戶流散府藏空虛卒然烽堠興一面之虞水旱虐數州之地乘其不意何以禦之伏惟陛下體唐堯父母之用心思菩薩如來之本意傷邊卒艱勤之弊察下人勞怨之聲董逋逃休役力實倉庫急農桑杜邪枉之門止侈尚之路諸不急務一切總停應須拓寺諸俟農隙如此則國用充足黎元幸甚臣聞自昔后王樂聞過罔不興拒忠諫罔不亂何者樂聞過則下情通下情通則政無闕此其所以興也拒忠諫則㣥議壅㣥議壅則主孤立此其所以亂也伏見明敕令文武九品巳上直言極諫大哉德音其堯舜之用心禹湯之責巳也臣謬參朝列浸沐聖恩敢不竭愚以副聖旨狂言抵禁幸陛下寬而宥之臣嘗讀書觀天人相與之際考休咎冥符之兆有感必通其間甚密是以政失於此變生於彼亦猶影之像形響之赴聲動而輒隨各以類應故易曰天垂象見吉凶聖人象之竊見自夏已來水氣悖戾天下郡國多罹其災去月二十七日洛水暴漲漂損百姓謹按五行傳曰簡宗廟廢祭祀則水不潤下夫王者即位必郊祀天地嚴配祖宗是故鬼神歆饗多獲福助自陛下光臨寶極綿歷炎涼郊廟遲留不得殷薦山川寂寞未議懷柔暴水之災殆因此發臣又按水者陰類臣妾之道陰氣盛滿則水泉迸溢加之虹霓紛錯暑雨滯淫雖丁厥時而汨恆度亦陰勝之沴也臣恐後庭近習或有離中饋之職干外朝之政伏願深思天變杜絶其萌又自春及夏牛多病死疫氣浸淫於今未息謹按五行傳曰思之不睿時則有牛禍意者萬機之事陛下或未躬親乎昔太戊有異木生於朝伊陟戒以修德厥妖用殄高宗有飛雉雊於鼎祖巳陳以政事殷道再興此皆視履考祥轉禍為福之明鑑也朝錯曰五帝其臣不及則自親之今朝廷怪異雖則多矣然皆仰知陛下天光伏願勤思德容少凝大化以萬方為念不以聲色為娛以百姓為憂不以犬馬為樂暫勞宵旰用緝明良豈不休哉天下幸甚臣聞三王之朝不能免淫亢太平之時不能無小孽備禦之道存乎其人若細微之災恬而不怪及禍變成象駭而圖之猶水決而繕防疾困而求藥雖復僶俯亦何救哉夫災變應天實繫人事故日蝕修德月蝕修刑若乃雨暘或愆則貌言為咎雩禜之法在於禮典今暫逢霖雨即閉坊門棄先聖之明訓遵後來之淺術時偶中之安足神邪蓋當屏翳收津豐隆戢響之日也豈有一坊一市遂能感召星靈暫閉暫開便欲發揮神道必不然矣何其謬哉至今巷議街言共呼坊門為宰相謂能節宣風雨燮理陰陽夫如是則赫赫師尹便為虛設悠悠蒼生復何所望自數年已來公私俱竭戶口減耗家無接薪之儲國無候荒之蓄陛下不出都邑近觀朝市則以為率土之既康且富及至踐閭陌視鄉亭百姓衣牛馬之衣食犬彘之食十室而九空丁壯盡於邊塞孤孀轉於溝壑猛吏淫威奮其毒暴徵急政破其資馬困斯跌人窮乃詐或起為姦盜或競為流亡從而刑之良可悲也臣觀今之氓俗率多輕佻人貧而奢不息法設而偽不止長吏貪冒選舉私謁樂多繁淫器尚浮巧稼穡之人少商旅之人多誠願坦然更化以身先之端本澄源滌瑕蕩穢接凋殘之後宜緩其力役當久弊之極宜法訓敦龐良牧樹風賢宰垂化十年之外生聚方足三代之美庶幾可及臣聞太子者君之二國之本易有其卦天有其星今古相循率由茲道陛下自登皇極未建元良非所以守器承祧養德贊業離明不可輟曜震位不可久虛伏願早擇賢能以光儲副上安社稷下慰黎元且姻戚之間謗議所集假令漢帝無私於廣國元規切讓於中書天下之人安可戶説稽疑成患馮寵生災所謂愛之適足以害之也至如武三思等誠能輟其機務授以清間厚祿以富其身蕃錫以獎其意家國俱泰豈不優乎夫爵賞者君之重柄傳曰惟名與器不可假人自頃害賞頗亦乖謬大勳未滿於人聽高秩巳越於朝倫貪天之功以為已力祕書監鄭普思國子祭酒葉靜能等或挾小道以登朱紫或因淺術以取銀黃既虧國經實悖天道書曰制理於未亂保邦於未危此誠理亂安危之時也伏願欽祖宗之丕烈惕王業之艱難遠佞人親有德乳保之愛妃主之家以時接見無令媟瀆凡此數者當今急務唯陛下留神採納永保康寧臣聞分圭裂土各有方位通邑大都不以封錫前猷未遠古義亦深自頃命侯稍殊舊式莫居磽塉專擇雄奧徐州貢土方色已乖寢邱辭封讓德不嗣其滑州者國之近甸密邇帝畿地出紋縑人多趨射所以列縣為七分封為五王賦少於侯租入家倍於輸國求諸既往實所未聞每科封丁有甚征役因而失業莫反其居此州土風逃者舊少頃日波散良緣封多百姓嗷嗷不堪其弊伏願稍均封戶散配餘州下息疲氓上遵古制則公侯不失於采地流泛得還於故鄉諸州封戶亦望準此又徵封使者往來相繼既勞傳驛甚擾公私諸附租庸每年送納望停封使以靜下人仍編入新格庶為永利又聞五等崇勞百王盛典自非邢茅懿戚寇鄧鴻勳無以誓彼山河疇其爵土近者封建頗緣恩澤功無橫草人巳分茅遂使沃壤名藩多入侯國邑收家稅平於天府經費不足蓋亦有由竊見武德之初建侯故事於時天寶新定王基創開佐命如雲謀臣如雨然而封者不過十數人今禮樂承平邦家繼代有象賢舊德之裔無野戰攻城之勤至於命封不合全廣論功少於前葉食邑多於往時既減邊儲實虧國用伏惟酌隆姬之前訓咨武德之舊章地非宗盟勳殊社稷不宜加以實邑自可寵以虛名如是庶績其凝彞倫攸敘臣忝當廉問備採風謠灼見不安豈敢自默知必被封家所疾顧嘗以報國為心乞擇愚言訪諸朝宰分毫有益夕死無恨
