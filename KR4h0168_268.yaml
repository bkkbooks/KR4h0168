front:
  text: 全唐文欽定全唐文卷二百六十八平一名甄以字行潁川郡王載德子武后時隱嵩山修浮圖法屢召不應中宗復位平一方居母喪迫召為起居舍人丐終制不許景龍二年兼修文館直學士遷考功員外郎元宗立貶蘇州參軍徙金壇令平一見寵中宗時雖宴豫嘗因詩頌規誡既被謫而名不衰開元末卒
  hash: sha256:ca4a42f044ffb3006f22bd071a4bfd32b00c4ffaa488c426d0b8332f8951a488
