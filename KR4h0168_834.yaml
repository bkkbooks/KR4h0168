front:
  text: 全唐文欽定全唐文卷八百三十四錢珝四
  hash: sha256:6f50dfb556ff19db7bdaa729919329d3884a8ec9268da2d7d8a76225ffd8fb95
body:
  text: 臣某等今月某日京兆府奏降雨分寸者伏以頃屬時雨稍夭夭心聖慮憂軫尋舉祀典用禱元功臣聞廣覆無親明德是輔誠之所動天則不高仲春以來驕陽頗熾宵旰勞念生靈具知部樂空縣常羞盡減遽陳牲玉並走山川况便殿坐朝深形憂色不責輔臣之咎恐貽赤子之心橐籥之間神祗咸聽既有聲聞之實寧無昭報之期是以靉靆忽興蜿蜒遂作固得遠踰關輔匪獨周布郊圻君必動天歲有成於登麥臣雖充位力不足於為霖空喜滂沱敢言燮理甫田皆潤沴氣全消信可待於豐穰更何求於符瑞臣等無任賀聖欣躍抃舞之至臣某言臣聞在心為志發言為詩志通而若啓源流詩作而自合律呂伏惟陛下道惟恭默稟在文思永圖欲漸於無為睿覽且明於多暇因臨丹壑遂躡金繩喜物象之澄清假詠歌而放曠聲傳天籟韻合霜鐘篇殊黃竹之名辭掩白雲之美臣等逢時竊位敢並韋平應詔屬詞文非顏謝徒偶昭融之運獲聞雅正之音傾聽不知愧延陵之季子試吹必濫比南郭之先生但思參列輔臣安敢首違聖旨輒同擊壤仰和貫珠誠懷鄭衛之慚但感宮商之說星辰自轉難參旭日之光鼙鼓空鳴莫續春雷之響其奉和御製五言七言詩二首謹録進上塵黷聖鑒臣無任循省惶越之至臣某等言伏以伐叛興戎國之大事有不得已然後行之而食在兵先兵居謀後餽餉必足經略無遺得必勝之帥臣有可用之徑卒然後更度利害熟計始終以是興戎乃可伐叛昨者陛下以某臣節有虧嘗犯天怒而易其鎮守猶示渥恩遷延未行包藏難測聖慮潛察睿斷勇為爰命宰臣使奉成算臣等雖承嚴旨敢不深思實乃國用方虛軍糧難濟藩垣調發深恐依違兼量於足食足兵二者皆所未備況去秋寇孽犯順鑾輅出居宗廟震驚士庶流落尚賴皇威所被大憝尋平宮闕復清生靈全活今才周歲始得稍安至於畿甸之間尚有瘡痍之疾臣等所以纍因敷奏具寫便宜且乞明聖更詳事理緩謀周慮全體養威必使盡叶事機而後重行討伐愚誠無惑睿志不移旬月之間血誠備瀝事行已定不敢復言昨者仰奉天顏密承聖旨又欲出幸近縣親督戎師仍慮寇盜奔衝且貴城壘堅固特令臣等更共平章祗稟宸嚴敢不傾竭蓋陛下將恐姦凶遽至奔軼遂欲先居高壘免動驚塵備審睿懷切在於此又以為出臨戎事促詔藩臣督集卒徒以速誅翦言於常理固合所宜然臣披抉腹心陳其數事一則伏思朝廷今日之事與建中之難不同當時猛將如雲謀臣如雨國贍九年之蓄兵持百勝之權德宗皇帝出幸奉天以為長策一旦懷光繼叛晷刻難安遽遠宗祧遂奔梁漢陛下視將帥之材與粟帛之積得如當時否天下盡忠之力赴難之心又得如當時否以此度量實恐稍難二則陛下雖處奉天之固不可遽棄京師勿使姦謀馳於間道直趨闕下大縱凶殘陛下隔在孤城衆軍各圖其利謀危救亂欲仗何人三則士庶疑懼之心尚賴宸極安止若使鑾鈴順動禁掖頓空則萬姓之心一時何仰況輕違廟社遽捨生靈自古帝王未嘗至此四則秋序肅殺之氣金在西方昨者冒此用兵犯陰陽大忌今陛下以一朝之怒忽萬乘之尊遠出皇居又衝王氣忝為臣子復列宰衡苟不盡言是負聖德五則凡有天象之變所以警動帝王昨者妖星頗多凌犯陛下深知戒懼且降德音兼有禳祈欲銷災咎而銷災之本全在清靜無為今則伐叛用兵天心不易又欲當災星謫見之後衝王氣以征行訪於匹夫亦知不可惟此五事敢不具言今則實賴陛下英朗疏通且思守位以陛下語臣二者之意評愚臣五事之言裁在宸衷以安大事去此就彼聖慮自深輒貢直言難逃罪戾臣某等無任惶越懇激之至臣某言今月某日伏奉密詔具審聖旨欲以某官鄭浦除京兆尹令臣進擬來者出自宸衷敢言違詔事非允當今具奏聞伏以三輔之雄京兆居首王畿之理專制甚難歷代重官當今急務比者任用多是丞郎給舍有才之人或藩方善政之師宣宗皇帝求理之切常輟翰林學士韋澳授以此官今陛下固合且命中書令其公選苟或未稱即可改張鄭某自守疑周行頗聞靜守當官蒞職亦極恪勤量材則可以序遷進善則無妨奬勸至於關中戶口本貫京師轂下威權莫先尹正畿甸之內諸鎮甚多都城之間萬戶來會責辦則供須極衆整肅則彈壓且殷鄭浦入仕之初曾為鹽州軍事判官幸守章程粗成勞績因茲際會遂列朝班物望固輕揚歷未久倘以此官除授必當不叶㣥情向者嗣薛王知柔以宗室大臣久兼崇秩事功已著總領方宜以浦代之恐失所稱浦既乏公望又匪異材遽達宸聰必因薦導失舉之誤所繫匪輕臣知柔出藩便憂京兆之任蓋二十四縣無不雕殘況屬今秋又罹兵火鄉閭劫殺尚且未安軍鎮侵陵比常多事賦輸之際撫輯尤難頃自黃巢犯闕災患相繼京畿百姓傷死固多今所保全皆由自備凡為兵器無不家藏寇至即設寨依山事己則還鄉力穡可耕可戰自是精兵今近鎮多強不為無事徵召外藩騎卒朝廷又乏軍糧昨者猖狂兼為患禍每宜警戒不可遽忘實任京兆之權兼須武略不惟便於政理亦要防於艱虞臣請便言冀合睿算竊見某官李鋋兩朝宿將久立茂勳頗以威名彰於委寄衆情甚洽公論多推授以尹京必能通濟京畿制置兼以命之有權則可抑豪強用武則可清奸盜圖安之本全在京都備患之先無加軍旅鋋之才略得以總臨畿內戶人纍經賊寇農收之暇訓練不難鄉閭自強侵擾固息無事則各營耕稼有慮則便執干戈不假饋糧又非失業既安必集就便不煩況目下京都未能安堵速須制置安得因循非李鋋不可委任事惟重難尋己參詳外度人情內思機便悉宜如此方敢陳論伏乞聖明靜賜睿覽以京尹難理任事思當今奸弊之初用非材無望之人何以控制於此若他時不濟何以謀安雖欲用典罪之固亦無救於患且李鋋與臣無素分鄭浦與臣無宿嫌與奪之間公當而已切於此事尋欲兼候奏聞便屬忽患瘡痍不離枕席近雖潰穴尚有本根固極虛羸且須將理寢食敢忘於機務敷陳又隔於天顏遂敢直奉箋毫粗達肝膈伏以反正之新調理仍急有犯無隱臣心合罄於此時從善如流聖政宜先於大者甚難甚切不敢不論伏以睿斷精明臣等常切感仰今茲論列實冀允從倘或未察愚衷臣實不敢奉詔干冒宸扆臣某無任惶恐迫切之至臣某等言伏聞禮云男正位乎外女正位乎內乃欲承天休正人紀事宗廟奉蒸嘗是以詩有關睢冠三百篇之首用以佐天下而正夫婦乃政之所由興也伏以聖唐積仁纍德列聖重光莫不師古以訓人宏禮以敦本遂得九垓從化萬國用康曩者彞倫稍夭夭心王道微缺使龍樓曠主鬯之位翟衣闕助祭之規則外和而國安內和而家理安得而致也必將有以待之伏惟陛下纘列聖之洪業恢百王之令圖爰建東宮再振墜典凡居寰海莫不忭歡百辟庶臣所懷尚慊蓋以中壼之位未立六宮之政未崇臣案天極四星一為正妃上天垂象不可虛其應伏聞淑妃某氏以坤厚之性母範有融淑懿之姿光乎內理用能誕生哲嗣克當天心竊願陛下思啓大猷仰宏丕訓淑妃某氏特依故事冊為皇后使六宮之內一以遵承所為王政之所由興而風化天下臣等位叨近密職在絲綸朝廷舊章合有論請上期聖造特賜允從輕冒宸嚴無任恐戰之至臣某言臣聞乾坤相配所以全覆載之功日月相隨所以明照臨之道惟王建后惟后助王若乾坤相配以成功若日月相隨而行道古皇有制歷代皆然伏惟皇帝陛下法天作聖引古為師興邦則啓於聰明為禮必循於先哲然而中宮久曠陰教罔修伏自纍朝遂同廢典四海絶仰觀之表九嬪無所統之尊誰詠國風空垂易象永惟委墜可謂因循漢氏以來舊章不易常先立后始可建儲今元良已視於東朝而柔順未臨於內職既虛正位莫敘大倫臣等每奉清光纍陳彞憲竊詳睿旨俯鑒愚衷請問守龜必當告吉掖庭纍行詎無白燕之徵簡策正名宜受金螭之錫是以敢干旒扆進拜封章伏乞申命有司擇定良日俾行盛禮自叶至公冒黷宸衷臣等無任懇迫惶恐之至臣某等言今月某日伏奉批詔以臣纍陳列宿之間熒惑退舍所宜升臨正殿進復常羞而睿聽彌高㣥誠莫遂顧台星之有位居公府以不遑伏惟陛下道合秉陽事皆師古稟天明於垂象察時變以側身克示允恭未忘戒懼考乎經籍實契規模雖退就卑宮儉惟降食方期應感合舉典彞然而芒角既收運行已順歷懇亦循於故實拜章敢惑於聰明而元鑒未開丹心如燭鋪陳無序裨贊失圖伏以大配乾坤重承宗廟執禮必遺於小者推誠皆可以貫之則行正道以臨萬邦不在乎不居法座也布王澤而滋庶物不在乎不食重味也而陛下未嘗不行正道於遐邇布王澤於細微苟行之有終宏之不已則天惟輔德心實弭災視棟宇而自安御豆籩而自爽敢祈聖鑒必念斯言伏惟俯徇愚誠特允所奏干冒旒扆臣無任臣某等言今月某日伏奉批詔以臣所請復常膳御正殿未賜允許者臣等恭承詔旨竊仰聖謀以為前史所垂正言可取則應天動人之事實哲王致理之先然臣伏思陛下繼體以來推誠必至友愛之道顯教萬方惻隱之心罔遺一物於王師致討司寇用刑率皆毒被蒸人罪興衆怒救殘虐之極弊懲悖亂之元凶而後效順立功報之爵祿勞心焦思痛在瘡痍屢降德音勤行王道得非應天以實而動人以行哉況謫見之後戒懼不遑朝野所知星辰所照則大官進御路寢燕居既舉舊章將踰期月固可以特開睿鑒俯徇㣥心理且叶於至公事兼存於大體臣某等謬居宗緒敢貢飾詞盡布腹心復干宸扆無任仰望兢越屏營之至臣某言昨蒙恩命授臣某官等者今月日已奉表陳讓跪承批詔未賜允從方就日以傾心若履冰而舉足臣某中謝臣立朝守嗣莫繼前修學古入官敢期高位伏遇尊號皇帝陛下道惟樂育志在紹聞待河清而先靜化源致俗阜而深探理窟當乙夜縱觀之後啓輔臣夢得之休而遽以平衡授茲弱質頗乖庶政莫達大經何施作相之才但纍知臣之鑒厭兵而五兵尚在唯恐人殘祈穀而百穀未升仍憂歲旱尋宜待罪已合避賢陛下慎以退人容於竊位兼回睿眷遽正台階進當浴鳳之榮更懼維鵜之刺況增封建俾重弼諧臣且自量則為不稱是以陳辭瀝懇冀動天心拜章而方謂可安捧詔而未嘗得請尚希終收渥澤遂寢典彞苟責實而有聞信假寵之非晚徇之公道寤主所圖受爵既多懼君恩之大盛省躬甚拙知官謗之必興負戴聖慈臣某無任感激兢悸之至臣某言伏奉今月某日制書授臣中書侍郎仍進封開國子加食邑二百戶者寵踰素分憂集微躬臣某中謝臣聞當可舉而後行則彞倫敘見有功而後進則勞臣勸如或行不當舉進不見功是謂謬恩實維虛授臣學非練達質異溫良致身而敢望坐茵措手而寧期補衮嘗塵侍從且昧論思既無酒誥之能莫並食時之敏忽蒙聖造遽委化權佐運行而不應中台論燮理而未周四序何言睿澤曲被微臣才叨正秩之榮兼進疏封之命戴恩無力臨事知非將投盈篋之書寧用濟川之楫願回元鑒俯徇愚衷致公器之無私在國章而克重光昭聖德復戒貪夫仰望皇私臣某無任懇悃激切兢悸之至臣某言伏奉今月某日恩制加臣食邑實封若干者充位代天無名益地祗膺茂寵併集百憂中謝臣聞賞以昭其功典以載其事是為重柄用合大經苟功不足昭事非可載濫承休命實纍皇猷臣謬執化權無裨衮職徒見容於君父每受責於神靈頃者陛下薄狩近藩復興否運寬仁屈已神武去邪敢有惑於㣥謀實無渝於睿斷寰區之內耳目同驚此非臣齷齪之心所能匡贊重圖反國艱若設都仗戎帥以經營寄輔臣而鎮撫秦人載聚周廟克成千門既啓於建章萬騎仍隨於司隸宸居復正懸法更高又非蒙昧之才所能施展荷景貺而寧參天力奉清光而徒和山呼無補艱難方懷慚懼詎謂聖慈忽被異數仍加賞優而欲舉何功典重而將言何事況乎真食尤曰寵榮輕行於富庶之秋皆期必稱尚屬於艱難之日焉可非宜伏冀聖慈必收殊渥臣某無任仰望逼切懇悃屏營之至臣偓言伏奉今月某日制命授臣中書侍郎同中書門下平章事者渥澤自天怔忪無地臣某中謝臣聞佐天子理陰陽撫四夷遂萬物者宰相之職也然而能經國則可以佐天子達化源即可以理陰陽善柔服可以撫四夷適方圓可以遂萬物今臣才非經國智昧化源不知柔服之謀未達方圓之道使之執政必致曠官伏惟皇帝陛下與天同覆與日合明有言必訪於芻蕘有用必搜於林藪今者初當出狩且欲興戎修至德以弭災動神機以伐叛復亨否運昭告元穹是宜慎擇賢良光輔睿哲臣志雖懋學器異混成但為章句之徒莫應權衡之任陛下明恩委照聖鑒洞開拔於駮正之司置在仰成之地越諸彞典授以洪鈞空驚行潦之流忽載大川之楫遭逢獨異寢寐終疑願回非次之榮且降可行之命立朝在野必有其人省己捫心莫知所措臣某無任感恩荷聖兢懼屏營之至臣扆言臣昨蒙恩制除授中書侍郎同中書門下平章事今日面宣聖旨不令更有陳讓者臣聞虞舜成湯之為君也舉臯陶伊尹之賢處補衮宰衡之任不仁自遠大道甚夷上可致君下可遂物相須之用古策具書獲被寵靈再當燮理仰成之重內省至難披肝膈之所藏冀封章之可達煩言無取睿眷莫回親奉清光復傾丹懇讓不容於稽首進何務以沃心臣誠憂誠感蝢首頓首伏惟尊號皇帝陛下濬哲守文高明立極廣好問則裕之美推任賢勿二之誠思舉直以化人待封比屋念偃兵而屈己欲拜昌言是宜慎擇濟川博求在野並稷契之稱前代若姚宋之贊本朝使竭謨猷以光輔弼臣器殊王佐質謝卿才常念立身但希承嗣未曉必聞之政合居不急之官雖臨事秉心如稱敢欺於輕重而自天率性佩弦亦戒於因循頃者徒幸遭逢且乖斟酌既塵公餗果驗素飱旋叨就列之榮每荷匿瑕之道今日忽流霈澤又執洪鈞信夢寢之難期詎蓍龜之可卜頃雖當軸竊類代庖是非誠畏於人言去就敢違於君命中台不耀先慙箕斗之光元首自明何效股肱之力銜恩匪稱揣分彌憂詞不盡於抽毫淚空知於承睫負戴聖造辭莫能殫臣某無任感激榮抃屏營之至謹言臣博言伏奉今月某日制書加授臣門下侍郎監修國史充諸道轉運鹽鐵等使者進當辨色動乏書思寵光忽降於昭回循揣空知於殞越中謝臣聞可衛社稷謂之大臣有利國家是為公輔大臣所以能經濟公輔所以竭訏謨倘昧於斯則同備位臣為儒孤陋守嗣凌遲既無稽古之勤止望易農之仕安敢苟求進達濫冒名聲但任顓愚獲逢濬哲聯叨服冕遽至秉鈞而莫貢昌言多隳庶績復致省方之難皆由失職之愆且合自拘敢期策免陛下克固知臣之鑒每推責己之誠雖罷燮調猶當節制捧彤弓而欲去尚抱憂心指金鉉以復留終回宸眷輔相之委近代所無不才何補於股肱有感徒深於骨髓伏遇陛下勃興景祚丕變公朝掃蔽日之浮雲納投水之堅石應機之急當寧不違從諫之明轉圜未速仰觀奮發實在斯須聖政惟新墜章咸舉宜求耆碩共致承平今臣曲被睿慈仍加霈澤黃樞正秩青史專修兼司運漕之權俾集牢籠之利屏躬承命俯首退思固合避賢惟憂致寇保其終始賜以安全陛下且許乞骸不令覆餗徇公為理擇善任人幸非伯石之情敢待召平之說且移盛寵別授通材顧叶澄清仍資庶富而近臣遽降聖旨重臨難陳固讓之辭唯勵恪居之志雖多言可畏垂黈纊而有所不聞而內省堪憂補元衮而何能自效臣某無任荷恩榮耀兢戴怔忪之至
