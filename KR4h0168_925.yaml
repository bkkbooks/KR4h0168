front:
  text: 全唐文欽定全唐文卷九百二十五筠魯中儒士舉進士不第乃入嵩山依潘師正為道士傳正一之法元宗聞其名遣使徵之令待詔翰林天寶中李林甫楊國忠用事堅求還山不許乃詔於嶽觀別立道院祿山將亂求還茅山許之終於越中
  hash: sha256:e5835d987ccfb800e3c2e6e8c277836892497bd1a68f33e6c10aafc83f141ed6
  markers:
