body:
  text: 伊太素之元風逮羲軒而寖隱雖朴散以成器暨唐虞而未泯淳化日以淪亡及殷周而殆盡唯挺生之尼父覩澆漓而致憫乃修詩書制禮樂以救崩隤將驅末駕以旋軫元元適彼流沙遺道德於關尹信文約而義賾俾浮競以返本固天運之推遷雖聖人亦不能扶其顛隕五霸既沒七雄交馳爰至暴秦儒殘道隳皇漢底定人懷緝熙孝文御宇所向無為刑法幾措歡心秉彞孝武好夫征伐亦兼崇於典儀雖純懿未舉而文章載施元成懦弱政教陵遲彼蒼生息肩之日在世祖中興之時何孝明之匪德為祅夢之所眩創戎神之祠宇遵恍惚之妄見始涓涓於濫觴終浩瀚以流羡歷三國而猶徵更五胡而大建華夏之禮廢邊荒之風扇沴氣悖以興行人心颯以傾變遂侮君親蔑彞憲矒跣貴簪裾賤事竭思以徼福劣含疑而懼譴上發跡於侯王下無勞於獎勸尊贔尸貝之金狄列崢嶸之紫殿伐千畝之竹不足紀荒唐寓言傾九府之財焉能充悃款誠願於是寶樹瓊軒淩雲照日鑑鍠窈窕不可談悉越章華之宏壯羅區宇而比櫛棟宇以來未有儔匹重貝葉訛謬輕先王典籍欽刑殘鄙夫宴廣厦精室使白屋終勞緇門永逸自國至家祈虛喪實虔而是者則紿之以嘉祥沮而非者則欺之以罪疾故中智以下助成其姦宄之術可謂至真隱大僞出所以㜸黨妖徒此焉遊息儲不因耕衣不俟織誘施冒貨鯨吞蠶食若蛟螭之在水猶豺豹之附翼罔不假小善以外慈藏深邪而內賊豈止一時之封豕乃為萬代之蟊賊足使宵人得意而傲睨上士傷心而憫默於戲天道乎人事歟天道遠而難曉人事近而可詳雖孽自天啓亦祅由人彰斯乃鍾劉石之兩羯偶符姚之二羌憑胡書之詼譎資漢筆以闡揚道安討論於河洛惠遠潤色於江湘圖澄挾術以鼓舞羅什聚徒以張皇跡無徵於班馬理唯竊於老莊褒蠻陬為中土貶諸夏為偏方務在乎噬儒吞道抑帝掩王奪真宰之柄操元化之綱自古初以逮今未有若斯之弊逆天暴物干紀亂常爰自晉宋迄於齊梁靡不興之者滅廢之者昌竟流遁而不返終取悔以危亡者其故何哉蓋蓼蟲忘辛習其久玩將助其理反增其亂若運窮數極則君悟臣斷億兆不謀而密移神祇應感而冥贊山川為之澄穆日月為之炳煥自然朝思文明野冀貞觀譬層冰之堅積非陽春不能使之剖泮當是時也太上有命爰徵萬靈敕司姦以糾慝遣執法以詳刑五帝合符三皇同征乃命天將總天丁伐天鼓揚天旌揮金鑲擲火鈴使列缺激迅霆出昭曠入杳冥捕無影搜無聲獲妖師殲氛兵正太階掃欃槍蕩遺祅於千載流惠澤於八紘班師下土功歸上清然後人倫可以順化神道可以永貞變訛僻之俗為雍熙之氓佇淳風之克復吾乃鼓腹擊壤於巖坰吟咏柏皇與驪連大庭而已矣感元聖之垂訓悟已親而名疏言可放而從默身應卷而勿舒愛鷦鷯之巢林在一枝而有餘性所悅而難違託茲山以結廬果棲遲而我愜即逍遙之靈墟觀其繚崇巒橫峻谷激泌泉羅森木後巍峩以縈紆前參差而聳伏追陰壑之夏凉偃陽陽崖之冬燠美徑節於松筠玩幽芳於蘭菊虛籟清耳閒雲瑩目因海鶴以警夜任鵾雞以知旭慮靜於無擾神恬於寡欲於是歌考槃於詩人諷嘉遁於大易遠浮俗之艱險消毀譽之損益蹈方外之坦途信可免於兢惕既即陰以息影由不行而滅跡雖區中之末計實世表之長策人所棄而已收故處約而恆適覽無見以收視聽無聲以黜聰和非專於旨酒樂奚必於絲桐焚清香以鍊氣啓玉檢而擊蒙期遣滯於昭曠庶近真於感通鑒太虛之有象覆妙用之非空朝天甚簡採藥多暇形猶資於吐納意已迸於將迓知道無廢興而物有存謝故挹生本而常生體化宗而不化蕭蕭絶塵誰與為鄰跡遠而朋遊益廣機忘而鳥獸可馴韻靡叶於當時心常依於古人仰由皓之逸軌咏羲農之化淳師黃老之元奧友松喬之道真慚無功之逮物良獨善於吾身祇所幸其自得敢韜精於隱淪悟世促而道永知名疏而體親遂忘機而滅跡方鍊骨而清神道不豫欺兮感通象罔天必我鑒兮保合元真陰滓落而形超陽靈全而羽化惟九仙之奕奕降八景而來迓何霓旌之悠揚吾其整此霄駕持造化之系出存亡之表遠四野之冥冥近三辰之皎皎涉虛寥之浩曠覺宇宙之卑湫龍鸞竦兮升我於元都流玉音於至寂散金光於太無星官後從雲將前驅使八威於六領蕩遺祅於天衢麾百魔以震伏總萬靈以遊娛翠旄紛紛兮拂重霄而淩厲入閶闔之九關過太微而一憩倚華蓋而招真登紫庭而謁帝飲豫以沆瀣樂豫以元鈞左盼夫鬱儀右瞻乎結璘信巍巍以蕩蕩肅肅而振振享宴斯徹遨嬉未已泛匏河之廣流搴析木之芳蕊靈香靄而八衝寶雲沓而四起諒茲境之足悅乃此情之匪留揚玉輪以徑進更冉冉而上浮控三氣而高舉何萬夫之足越覲元始於玉晨謁虛皇於金闕真朋森而無算咸顧豫以致悅於是凝而為有散而為宗見不以察聞不以聰視極於無際聽周於無窮動不因心飛不假翼與浩劫而靈長視萬椿為一息或躋綺合之榭或宴圓華之房躡太漢之清迥弄明霞之焜煌仰瑤嶺之嵯峨俯碧津之湯湯羅絳樹之杳藹激神風之琳琅何至樂之靡極永逍遙以為常嘗甄道以謀己考往哲之所經資忠孝與仁義保存歿之令名伊周功格於皇天孔墨道濟於生靈始崇崇於可久終寂寂而何成唯聞松喬之高流超乎世表以永貞意稟受之使然固修煉之所得奚稽疑以究理庶髣佛乎遺則斯乃御太易之祖先體虛和之宗極出變化之機範離陰陽之動息知成我者神則我者人神符性以契道人應情以喪真彼昭然而獨見乃蕭邈以殊倫故能積精微而顯著乘一氣以日新昔豫感夫前修良反俗於壯齒捐區中之末駕騁方外之逸軌收當世之所遺賤時人之所偉俯滄海以淵淡仰赤霄以聳峙人耽厚味與華飾吾不知其所美也於是遠塵境棲雲岑潔其形清其心方冀覩杳冥之狀聞虛寂之音真人居高以流惠正氣無遠而見尋鑒雙景之皎皎翼萬靈之森森瑩丹宮之神光潄玉池之靈液修五緯以飛奔蹈七元而縱歷陽晶煜以景萃陰滓渙而冰釋體因用而彌和心有存而轉寂味元旨以永日諷靈篇以自怡雖天路之遼敻庶通感而可期何逆虜之干紀集兵戈於洛師畏巢焚以鳥逝聿投迹於江湄憂虞匪遑於專靜吾道於是乎中虧使清虛恬淡乖其致為垢濁喧囂之所欺遂荏苒以忘返將十年而逮茲惜流光之不駐鑒華髮以興悲噫嗟進有馳車升邱之難退有轉規入谷之易縈塵務以汨沒皆近習之所致狥人情之所取必神道之我棄理無往而不復思挺然以釋纍汙可以洗濁可以澄俾疏墮之情廢則精勤之思興代甘芳以淳淡易浮蕩以虛凝合抱生於毫末履霜至於堅冰孰謂希夷之無物吾必知恍惚之可憑也乃復拂衣長林從其夙尚近宗仙經遠稟真匠機已忘而氣正戰復勝而神王庶斯道之有恆喜勿藥於無妄夫造物者結虛而為實致道者反粗而至精所以齊天地之悠遠叶日月之昭明哀衆人淪胥以徂謝吾方獨務於長生筠所居之東嶺其側有泉洪纖如指冬夏若一山少凡石至多雲母其水色白味甘且滑此則雲母滋液所致因名雲液之泉乃結宇其旁引於軒廡之下既飲既潄永玩無斁今茲夏季不雨至於十月江河耗井澗涸此泉泠泠不減平昔懿其若是爰以作賦坤元孕氣潛暢成泉冠五行之首為萬物之先爰有清流出此山側處蒙險而難知猶井泄之不食我搜靈祕載披載登見其地僻至潔源深有恆沍寒不為之損暑雨不為之增乃考室就飲而樂在枕肱甘侔元玉之膏滑乃雲華之液疚可蠲生可益引充狎玩惟意所適懸之則潔素壅之則澄碧晝浮光以悠揚夜含響以浙瀝陰陽為災水旱失節不雨炎夏暨乎元月汪汪洪波久已竭耿耿瀑布今亦絶挫江湖之浩蕩沈澗谷之微劣斯泉秉彞毫纖無虧雖遠不霑惠而近有所滋彼漰霈於疇日豈不慚涓涓於此時夫醴泉無源而易涸丹溜乍見而難挹曷若止以為鑒酌焉取給何異神仙之瀵帝臺之漿涌異域之表湛無人之鄉茲亦標奇於絶境真可謂靈而長者也惟神靈之播育何備物之實繁偉茲竹之標挺得造化之清源契道合虛表貞示節葉森散以翠錯莖鮮修而瓊潔爾其和風流暢萬彙昭陳揚葩煜其密苑荑柳藹於通津不郁馥以啓曜但葳蕤而有筠亦未之為異也至如殺氣淩厲凝霜蕭瑟覽平楚之蒼茫窺衆林其如失冒冰霜之涸沍逾青熒以鬱密則殊可重焉故詩曰如苞書稱厥貢猗茲淇園美彼雲夢昔在軒后肇官陰陽俾伶倫於嶰谷伐修竹之珍篁裁六律以協氣調八風而順常然後成竽籥以備樂其聲濫而彌長笙鏞以間鳥獸蹌蹌諒自然之純粹曷㣥材之可方若乃渭川千畝山陽數林會稽方潤於碧玉羅浮比色於黃金上黕黕以雲翳下泠泠而風吟祛赫曦之燠景納淒清之涼陰王子所以嘯詠嵇生為之幽尋召嘉賓及令友暢醁醞與鳴琴美遊盤之逸趣清寂寞之遠心若乃夾滄江倚丹崿蓄水霧之沈沈搖巖煙之漠漠湘有揮涕之感楚謠興防露之作或挺鼓吹之嶔崟或垂天門之旁薄皆鸞鳳之所翔集孔翠之所棲託豈獨嬋娟於廣漠之壤亦有璀璨於蓬萊之峯結實珠粒敷花紫茸拂皓粉以飛雪摧紺莖以韻鐘固列仙之攸玩匪吾人之所從也亦有化雉吳國成龍葛陂舍人篔簹育蟲桃枝一笋明其允嗣三節獲乎嬰兒榮燈纂以感孝茂窗櫺以表奇篲冡壇以塵滅環石牀以蔭滋皆靈變之譎怪良難得而備知爾其衆彙非一則有篻簩䈥籩耽筒籃箊秋吾箛箠之肅矗龍鍾雲母之扶疏筈箭浮色以縹燠函墮綷文而繡翬攄方志之所遺載山經之所闕書者安可得而詳矣靡不徑堅其性葱蒨厥色不規而圓不揉而直故高皇製冠以守位孝文剖符以表職博望侯傳於大夏之外穆天子樹於元池之側推此類以彌廣匪斯文之可極也前志稱周穆王南征君子變為猿鶴小人變為蟲沙夫神用無方未必不爾筠自入廬嶽則覩斯元猿嘉其雨昏則無聲景霽則長嘯不踐土石超遙於萬木之間春咀其英秋食其實不犯稼穡深棲遠處猶有君子之性異乎狙猱之倫且多難已來庶品凋敗麋鹿殫於網罟遺氓困於誅求此獨蕭然物莫能患豈不以託跡敻絶不才遠禍昔夫子歎山梁雌雉曰時哉時哉豫因感之聊以作賦云耳伊元猿之所育於南國之層岑動不踐地居常在林雖泛泛而無據亦熙熙而有心雲嵐昏而共默風雨霽而爭吟使幽人之思清暢羇客之涕霑襟何必聆嶰谷之管對雍門之琴哉歷千尋之喬木俯萬仞之危嶠弄遊雲之亂飛嬉落日之橫照連肱澗飲命侶煙嘯或聚而閒棲或分而回趠壽同靈鶴性合君子阻重巖之險非虎豹所履蔭交柯之密豈雕鶚能視故逄蒙操弓憚高深而止鄧公折箭含惻隱而已何患纍之罕臻不干物以利已詎若狒狒淩人以就戮猩猩甘酒而遄死夫時珍貂裘世寶狐白彼徒工於隱伏終見陷於機辟麝懷香以賈害狙伐巧而招射小則翡翠殞於羽毛大則犀象殘於齒革孰能去有用之損取無用之益因棄置於常情永逍遙以自適無威刑相臨有族類相親食資諸物衣取諸身不賦不役靡勞靡勤如政教之未施保巢居之淳淳匪虞氏之所及何狙公之能馴吾固知人為萬物之貴又焉測元化之所謂大鈞乎粵真隱先生者體曠容寂神清氣沖迥出塵表深觀化宗偃太和之室詠元古之風收人之所不寶棄人之所必崇以道德為林圃永逍遙於其中有玩世公子思發其蒙乃詣先生之所舍詢出處之異同於是稽首跪而稱曰僕聞士之生也備百行榮九德靜為物軌動為人則可見故不隱可言故無默使上叶唐虞之化下安仁壽之域既兩儀交泰九有不攜然後分人之土執人之圭故伊尹負鼎而去有莘太公釋釣而出磻溪朝淪汙泥夕升丹梯若喬木之集鵷鳳清流之躍鳧鷖何必矯抗斯慕中和見暌躡跡巢許追蹤夷齊膏屯於骨月和勦於氓黎捐坦蕩之修衢履幽廢之荒蹊潄寒泉之泠泠藉青草之萋萋悲林風之夕振厭山鳥之晨啼始支離而餒息終攣卷而寒棲信行藏之足驗唯名實之可稽願一聞其至言俾向方而不迷也先生宇合寥天心凝帝先泯禍福之境杜樞機之權將有言而中止不得已而應焉曰夫洪荒之際物靡艱阻上如崇邱下若平楚高卑定位各暢其所賢愚同條智詐罔舉孰為出孰為處孰為默孰為語逮乎時遷朴散質變淳訛升沈異躅明暗殊科剛柔相軋曲直相摩或貪餌以吞鉤或橫飛以觸羅惟皇王之愍俗爰拯溺於洪波乃自揖讓迄今於干戈雖政教之異宜誠法令之滋多欲遏亂以求理譬招風而靜柯遂飾禮以邀敬修樂以導和雖聖哲之區區卒傾頽而奈何於是上有淫君下彰忠臣龍逢之列萇宏之倫苟徇義以成名竟違天而殺身祗足以增惡聲於暗主竭惠澤於生民故全德之士韜精保真悟歷數之在運知存亡之匪人將扶危而翼顛猶一髮之擢千鈞塊壤之壅長津所以守嘉遁之元吉從少微之隱淪於是洪崖廣成肇其端子州善卷緒其後汾水見傲帝之賓潁陽聞洗耳之叟以鴻名為糟粕以大寶為塵垢情蠲於取舍意適於林藪不刳心而無欲非吐納以永壽眄江河為畎澮謂嵩岱為培塿故天子不可得而臣諸侯安可得而友豈作者之維艱誠歷世之可久莫不道貫通於古今跡無繫於奇偶鎮末代之僞薄使向風而歸厚若乃子高之規夏禹臧叟之誨周文仲連之却秦師干木之藩魏君弦高俯仰以成績四皓從容以立勳初混世以表用竟超然而絶㣥既抗志於青霞聿棲身於白雲茲乃無封滯於萬物時撫俗以解紛者矣若乃顧推讓有泰山之重視富貴若鴻毛之輕則孤竹之子王季之兄甘食薇於首陽之下悅採藥於勾吳之坰柱史歸周而道闡關尹去職而真成晨門藏名於抱關沮溺避世而耦耕漢陰抱甕以忘機漁父乘流而濯纓於陵灌園以逃相萊氏負戴以辭卿南華漆園以寓跡列子鄭圃以消聲楚狂隱晦蜀嚴湛冥丞相推堂於蓋公廷尉結襪於王生故文景尊黃老之術國既富而刑清季主卜筮以訓俗文通訟田以汚名顏闔鑿壞以避聘伯休潛遁以脫榮龎公課妻以耘鉏嚴光拂衣於帝庭啓期三樂以達意梁鴻五噫以抒情尚子平之持操畢婚娶以長往許叔元之守節遺伉儷以遐征聽蘇門之咏嘯若鸞鳳之和鳴見夏統之長歌欻雲飛而雪零至於焦先瞿硎郭文董京天機符於太素淵默會於真精寂爾無悶則子真仲蔚確乎不拔有臺佟管寧或琴書以自娛或淡漠以無營此則同人者體貌異人者神明抱不易之純粹含自然之孤貞道取怡於閒放業故無於屯平曉物理之尚簡知天道之惡盈彼鴻飛寥廓奚弋者之能縈故寵章焉得而見纍悔吝何由而相傾哉爾其陰德密庸元功潛著不戚其所毀不欣其所譽為無為以成性事無事以淡慮洞希夷之可察涉恍惚而斯據托松涓以結友忽駕景而飛去茲乃隱道其誰能測無何鄉之處乎是以朝廷之士一入而不出山林之客宜往而勿還若沽名於白賁衒跡於青山覬蒲輪於谷口希束帛於雲關非巖泉之養正實邱壑之藏姦繄末世之鄙薄曷清流之可攀或因茲以幸達詎不蘊終身之厚顏矣夫徼福之萌禍胎祈昌之結衰根故不韋之識奇貨獻孕妻以密言呂公之辨龍顏謀納女以永尊計克從而事捷排天路以騰翻遽變生而殃搆招釁罰以鍾門霍氏之翼三后謂伊周之復存何赫奕於當時亟殄殲其子孫鑒興亡之體勢實異代而同源已覆敗於前車又傾摧於後轅秦肆坑儒之毒漢流黨錮之冤衆君子欲修名顯著乃貽戚於塋魂仰在居之悠迥誰克叩於帝閽固知祥風依於蓬蓽沴氣襲於華軒吾方將反汗漫師元元黜生死同乾坤當愈幽憂之疾所以秉斯道而彌敦也先生之言既畢公子拜首而謝曰小子久耽淺近之常議幸沐精微之奧論可謂滌除遺滓披拂重昏願澡雪其形神以遊夫子之末藩而已矣道士臣筠言臣聞道資虛契理藉言彰臣曩棲巖穴之時輒撰修行之事伏以重元深而難賾其奧三洞祕而罕窺其門使向風之流浩蕩而無據遂總括樞要謂之元綱冀循流派而可歸其源闡幽微而不泄其旨至於高虛獨化之兆至士登仙之由或前哲未論真經所略用率鄙思列於篇章伏惟開元天寶聖文神武證道孝德皇帝陛下為至道之主宏自然之訓品物咸熙於陶鈞之際黎元輯寧於仁壽之域豈纖塵有裨於崇嶽爝火能助於太陽然芻蕘雖微明聖不棄敢陳菲薄希矚天光所述舊文謹隨表奉進輕瀆宸扆伏增戰越臣筠誠惶誠恐頓首頓首謹言天寶十三載六月十一日中嶽嵩陽觀道士臣筠表上昔穆王南巡自郢徂閩遺我文璧僉曰此津貫緯百紀洊歷十春念茲文璧故問水濱江漢取之自求多益反我名瑞躍此華璧則富有漢川世為江伯如有負穢心迷懷釁情戚藏玉泥中匿圭魚腹使公孫躡波而長吁子羽濟川而怒目佽飛舞劍而東臨菑邱躍馬而南逐打素蛤而為粉碎紫貝其如粥又有川人勇俊處乎閩濮水居百里泥行萬宿右睨而河傾左咤而海覆乃把昆吾之銅純鉤之鐵被魚龍之衣赴螺蛤之穴引澍東隅移燋北島使蓬萊之根鬱而生塵瀛洲之足淨而可掃按驪龍取其頷下之珠搦鯨魚拔其眼中之寶皇恩所被繁枯潤涸威之所布窮河絶漠願子三思反此明玉東方角亢二星列宿之長故曰壽也二星之間則天門也亦曰天闕凡得道朝元皆由此門而入得此道者告元神則感通享壽星則關奏録係於天門矣功滿升天元辰接引入門則無礙豫四十一年方遂一第既知命寡遂慕尋真討究仙經莫得生理因南訪茅君修真之跡登茅巔入石室先得元道真經即太上道君歸根復本號而不嗄之理也乃執其理十餘年惟攻胎息續用既勞嗟乎非眼前之睫也後再遊逢老叟曰汝欲學仙乎學仙者從塵入真如鍊礦而鎔金也何不先求命術以延其生後修陰德登其漸階乎天仙也者功感上天詔授錫命乃遂輕舉而為仙人也雖達仙境猶鍊真氣氣與神并故曰神仙神仙體虛故能跨鸞馭鶴乘雲氣飛騰太虛壽齊天地汝得元道真經求仙之筌蹄也其莽蕩魚兔難尋昔茅君上升留大君命術藏於山巔石室俾吾守之蓋欲傳於夙分者也汝格孤氣清必有仙骨乃出此九章授豫而去囑曰此即所求之魚兔也道非身外寶之寶之乃録其言為序以紀之仍目之曰內丹神訣矣吳筠序太史公稱大荒之內名山五千其在中國有五嶽作鎮羅浮括蒼輩十山為之佐命其餘不可詳載粵天柱之號潛霍及此三峯一稱矣蓋以其下擢地紀上承天維中函洞府之謂豈唯蘊金碧宅靈仙所貴興雲雨潤萬物也自餘杭郭泝溪十里登陸而南弄潺湲入崢嶸幽徑窈窕才越千步忽巖勢却倚襟領環掩而清宮闢焉於是旁訊有識稽諸實録乃知昔高士郭文舉創隱於茲以雲林為家遂長往不復元和貫於異類猛獸為之馴擾晉書逸人傳具紀其事可略而言自先種閟景潛升而遺廟斯立暨我唐宏道元祀因廣仙跡為天柱之觀有五洞相鄰得其名者謂之大滌雖寥邃莫測蓋與林屋華陽密通太帝陰宮耳爰有三泉二軌一濫殊源合流水旱不易擁為曲池縈照軒宇夏寒而辨沙礫冬溫而育萍藻既潄而飲之曲肱而枕之樂在其中矣土無沮洳風木飄厲故棲遲者心暢而壽永盤礡紆燠氣淳境美虎不搏蛇不螫而况於人乎貞觀初有許先生曰邁懷道就閒薦徵不起後有道士張整葉法善朱君緒司馬子微暨齊物夏侯子雲皆為高流繼踵不絶或遊或居窮年忘返寶應中㣥寇蟻聚焚爇城邑蕩然煨燼唯此獨存非神靈扶持曷以臻是州牧相里造縣宰范愔化洽政成不嚴而理遺氓憬附復輯其業筠與逸人李元卿樂土是安捨此奚適恐將來君子靡昭厥由故核而志之表此貞石大歷十三年正月十五日中嶽道士吳筠記
