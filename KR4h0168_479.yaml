front:
  text: 全唐文欽定全唐文卷四百七十九元膺字景夫鄆州東平人建中初策賢良高第貞元朝拜右司員外郎出為蘄州刺史憲宗朝拜吏部侍郎以疾改太子賓客元和十五年卒年七十二贈吏部尚書
  hash: sha256:cf35f2fb6dda3cf48ae738850a9ebf6ad5792da0b58687438202786fc70c6282
  markers:
  - {type: head, offset: 14, content: 呂元膺, id: KR4h0168_NFKB_479-h1, level: 1}
body:
  text: 孔戡以公為盧從史所忌且離職已久李吉甫以宰相出鎮辟請非涉嫌疑推類言之河陽節度行軍司馬楊同慈史官崔國楨或處近職或倅戎府皆為吉甫奏在幕庭從史以嫌忿干黷朝典豈可曲徇其志且孔戡官序雖非黜退但因此改易則長姦邪之心臣恐忠正之士各懷疑慮事不可許公諱惟賢字惟賢其先西土人也高祖諱東贊作相于西戎因官立姓遂為論氏貞觀中威懷四夷翦滅北虜蕃戎欵附萬里獻琛慕嚮華風欲為和親延頸企踵心馳闕下太宗皇帝覽其誠至遂許之公主時戎王遣相東贊為使來迎不忒其儀不愆於素召見顧問進退合旨詔以琅琊公主外孫女妻之東贊自陳以本國有妻又以贊普未謁公主陪臣不敢先受殊寵太宗嘉之又奇其對撫以厚恩遂有歸化之心曾祖陵與祖躬仁同總衆于東至高宗朝拔部落七千餘帳歸國拜特進左玉鈐衛大將軍封歸懷郡王裦忠獎誠寵錫殊厚子孫因家自銀州至于京兆祖躬仁朔方副大總管雲麾將軍行左驍衛大將軍酒泉郡開國公贈撥川郡王諡曰忠自高曾至大父皆有勳烈著于當時父誠節朔方節度副大使開府儀同三司右金吾衛大將軍知階州事武威郡王賜太子太傅天寶季年安祿山作逆塵起山東上皇省方於巴蜀肅宗巡狩于朔陲危亂之時見其臣節帥子弟及家僮以牧馬千駟罄其財用以奉禁旅公少有志尚奮身轅門隨先父統其士馬與元帥哥舒翰掎角扞寇鋒刃既接大小數十戰摧陷堅陳洎王師失御以智信保全所領之軍馳于靈武扈從肅宗與先父洎乎昆弟立勳成效不可備述至德中授壽府典軍次授左衛郎將賜紫金魚袋俄轉左監門率又遷左領軍衛將軍又特進右領軍衛大將軍西平郡開國公食邑三千戶元勳之允受茲光寵先時代宗皇帝為天下元帥求武勇之士公與兄懷義惟真同為先鋒討擊使又領部落數千人鎮岐陽縣披堅執鋭一月三捷洎除凶清亂至上元二年授特進行大光祿兼右領軍衛大將軍充鳳翔節度副使馬軍兵馬使寶應中丁艱茹荼朝廷以金革從權由斯奪禮廣德二年授開府儀同三司殿中監充劍南節度副使大歷中受開府儀同三司太常卿上柱國進封成國食邑三千戶旋受渭川節度都知兵馬使公以從戎歲久雖齒髮未衰而疾疢屢作代宗寵其勳舊詔許還京仍全祿賜同大將軍俾其優間建中末德宗遷幸巴梁公以所疾沉綿不獲扈蹕逆臣朱泚迫以凶威不變其志雖積年之疾纍日而瘳貞元十五年授驃騎大將軍行左武威衛將軍上柱國公斯實朝廷獎舊勳矣止足求退俄以本官致仕中使就問寵秩有光元和四年七月十日寢疾終於靜恭里之私第以某年十月一日葬於萬年縣洪固鄉之古原故夫人太原王氏祔焉詔給鹵簿鼓吹所以裦寵也嗣子輔鼎同州白水縣丞次曰倜常州江陰縣尉次曰俶右領軍衛騎曹參軍泣血茹荼存無改之義公之季弟惟明為時英髦文武備用建中興元之際仗義討逆摧殄凶徒勳彰險艱謀著忠益貞元初以太常伯執金吾授鉞渭北八座互相崇獎忠功元膺獲佐戎幕備閲忠義由是盡知公之世業勳德矣銘曰大忠之允本自西土奕世崇勳既明且武在太宗時有道攸覩洎夫撥川緒業光輝天寶季年塵起幽燕自興其家殄寇功全乃拜公侯寵榮無替用表豐碑昭于東裔雲逵滁州刺史昈子第進士德宗朝擢拜諫議大夫遷禮部侍郎為李晟行軍司馬元和初終京兆尹方逵受性凶悖不知君親衆惡備身教訓莫及結聚惡黨江中劫人臣亡父先臣昈杖至一百終不能斃張延賞任揚州日亦曾犯延賞法決殺復蘇至于嘗言皆呼臣亡父先臣名親戚所知無可教語昨聞於邠寧慶等州干謁節度使及州縣乞丐今見在武功縣南西戎附近恐有異謀若不冒死奏聞必恐覆臣家族夫蹈道而不獲乎上育德而不尊其位有之矣在西漢有東海于公在東漢有闕五字其闕一字也闕一字範闕一字福好德闕二字乃知道者善之闕一字德者福之闕一字茍茂其道豐其德而福不在乎其身必鍾其後嗣稽之行義質諸聖謨闕一字德於闕一字陳者李公其人矣公諱廣業字闕二字隴西成紀人也惟我景皇帝仕魏八柱國唐國公公五代祖也若后稷肇封將嗣八百之運闕一字海州刺史亮惟我神堯皇帝受昊穹靈命行敦敘之典追封鄭王贈司空公高祖也若夫闕一字沒草方受勾闕一字之闕一字皇朝闕三字行臺尚書闕一字州牧淮安王神通公曾祖也若毛畢佐周翦商功參十亂皇朝左驍衛將軍淄川郡王李同公王父也闕一字皇太后臨朝闕一字朱虛闕一字祿闕一字之竊威闕一字平闕一字以定國皇朝雲麾將軍璲公之烈考也原夫至道元氣之化成也融而為川澤結而為山阜崇功大業之闕一字美也散而為英雄聚而為哲賢惟公祖曾盛烈昭配上元儲孕福裕鬱生才彥闕二字中庸闕三字知闕二字服膺一善以闕二字能年踰弱冠闕五字天子有事于郊丘宗室陪位國慶覃恩釋褐授寧州參軍闕一字而就列非闕三字後以序遷左威衛闕二字參軍右金吾衛闕一字曹參軍許州扶溝縣丞右羽林司階陝王府典軍渭州別駕劍州長史闕一字用體道沖讓闕一字聞政闕五字服闕八字抱關之祿故闕三字百轍自退焉圭組貴胄對有慙德本仁為行施之則誠於君為忠在親為孝闕一字歲丁雲麾憂闕三字節力能闕四字滅性甘淡闕二字人無所加洎府就禮經衣裳外釋蒞官居處動思揚名敬慎膚體歸於闕四字鄉里過於刑賞信闕二字朋闕一字非久要公以微言既絶是非莫分春秋經旨仲尼所志三代之禮家分糅雜淹中之説最符孔氏故暢二闕一字旨義成一家師法闕二字情性闕二字樂道以開元十八年八月二日終于劍州官舍春秋五十有一以其年十二月遷祔于京兆府三原縣闕一字原鄉之北原先塋禮也嗚呼以公之成德也宜其臻闕二字登闕一字位而年屈中壽位窮綱佐仲尼有喪豫之歎其在茲乎厥後闕二十七字少卿闕一字州刺史嗚呼生得天爵之貴歿有廟享之尊盛矣哉闕里之闕一字也公之元子闕二字皇戶部尚書河東朔方六道節度都統闕二字間秀風雲育德當莽卓盜國之際總齊晉勤王之師隱如長城克固磐石次子若水皇金吾衛大將軍兼闕二字舍人闕九字巡禁衛玉帳增威宣導王言彤庭讓德公之元孫錡即地官之冡嗣也今任浙江西道都團練觀察處置及諸闕一字鹽鐵轉運等使銀青光祿大夫檢校禮部尚書使持節潤州諸軍事潤州刺史兼御史大夫天挺俊哲才為時生承先王丕搆之闕一字貽燕翼無窮之烈出作藩垣入為柱石總榷管轉輸之任亘吳楚服嶺之封事絶爭承賦皆合徹利澤浹天下衣食贍闕一字歸闕一字蕭闕五字河內闕六字惟皇祖懿德為代師範琬玉未刻光靈不揚謂雲逵嘗學舊史庶聞前修故纂闕一字緒業闕二字銘表其詞曰闕十八字憲憲李公稟氣沖清涉世居厚間邪性情闕一字仁為重撰德無形負之致遠克舉而誠服膺中庸樂闕四字言闕二字忠孝闕一字致書闕五字當味隱霧豹文瑞時麟趾德猷福履翼子謀孫祉流道廣慶兆高門光光前烈顯顯後昆于闕一字定國陳類長闕一字于陳伊何闕二字而盛惟闕二字之奕代流慶後之二葉俱登八命官同曳履職傳戎柄樹官貽遠厥配孔明至德參化蒼穹闕一字禎封表闕二字榮耀佳城刻頌貞石將來作程堪增司空耀卿孫貞元初官萬年尉調太常博士終江西觀察使謹按舊儀嶽瀆以祝版御署訖北面再拜證聖元年有司上言曰伏以王者父天母地兄日姊月於禮應有再拜之儀謹按五嶽視諸侯之禮其日月以上請依舊儀五嶽以下署而不拜制可至開元修理五嶽四瀆皇帝無親祭禮儀其祝文皆云嗣天子某謹遣某官敢昭告於某嶽某瀆之神讀訖皆申再拜祭五龍神但云獻官再拜此則有司行事皆有拜文今臣與禮官等通詳典制整辦所宜伏聞禮擬於時議則求古無文可質正者則推類以明之臣愚以為三才之尊各申所極尊有所統禮亦宜差若無比視何以辨等故禮云五嶽視三公四瀆視諸侯其餘山川視伯子男議者以嶽瀆既比公侯則禮如人臣矣其於祭也則人君不合有拜臣之儀謹按五經通議云星辰日月五嶽四瀆皆天地之別神從官也因郊而祭者緣天地之意亦欲及之也又禮記云非其臣則答拜鄭元注云不臣人之臣也則星辰嶽瀆既是天地從官恐人君不得如公侯之禮而臣下之也何以言之王者父天母地兄日姊月星辰視昆弟嶽瀆視公侯以此明之星辰嶽瀆是天地之臣也秩視人臣也陛下與天地為子遣使申祭恐不合令受天父地母從官之拜宜有以答之故開元禮祭嶽瀆祝文皇帝稱名又云謹遣於義有必拜之文是國家著禮以明神為敬不以臣下為禮以臣等所見並請依證聖元年定制有司行事須申拜禮孟容字公範京兆長安人舉進士甲科又第明經授校書郎纍拜太常少卿憲宗朝遷尚書左丞拜東都留守元和十三年卒年七十六贈太子少保諡曰憲臣伏見今日恩制除衢州刺史齊總臣竊有所慮恐驚物聽不敢關下陛下比者以兵戎之地或有不獲已非次擢授者今衢州無他虞齊總無殊績忽此超授㣥情驚駭又齊總是浙東判官今詔敕稱權知浙東觀察留後攝都團練副使向前未有敕命今便用此下詔猶恐不可齊總若可選拔不假此事若未可選拔假此益使人疑陛下臨御已來凡所選用皆為至公既非聖情所難改移即臣安得不動有論諍若齊總必有可録陛下須要酬勞即明書課最超一兩資與改今四海舉朝之人不知齊總功能衢州浙東大郡總自大理評事兼監察御史授之使遐邇不甘凶惡騰口伏乞聖慈少回覽臣所請陛下若謂臣為不切不懇伏乞陛下試停茲詔密使人於外聽察必賀聖明開納必賀聖明無私禽魚草木亦知感悅歡聲必山呼雷動聖德必一日萬里授官中謝日具以面奏詔敕有不便者伏請封取進止今齊總詔謹隨封進府縣上事不實罪止奪俸停官其於宏宥已是殊澤但陛下使品官覆視後更擇憲官一人再令參驗則察視轉審隱欺益明事可觀聽法歸綱紀臣受官中謝日伏請詔敕有須詳議者則乞停留晷刻得以奏陳此敕既非急宣可以少駐臣伏聞陛下數月已來齋居損膳為兆庶心疲又敕有司走於㣥望牲於百神而密雲不雨首種未入豈觴醪有闕祈祀非誠為陰陽適然豐歉前定何聖意精至甘澤未答也臣歷觀自古天人交感事未有不由百姓利病之急者切者邦家教令之大者遠者京師是萬國所會強幹弱枝自古通規其一年稅錢及地租出入一百萬貫臣伏冀陛下即日下令全放免之其次三分放二且使旱涸之際免更流亡若播種無望徵斂如舊則必愁怨遷徙不顧墳墓矣臣愚以為德音一發膏澤立應變災為福期在斯須戶部所收掌錢非度支歲計本防緩急別用今此炎旱直支一百餘萬貫代京兆百姓一年差科實陛下巍巍睿謀天下鼓舞歌揚者也復更省察庶政之中有流移征防當還而未還者徒役禁錮當釋而未釋者逋懸饋送當免而未免者沉滯鬱抑當伸而未伸者有一於此則特降明命令有司條列三日內聞奏其當還當釋當免當伸者下詔之日所在即時施行臣愚以為如此而神不監歲不稔古未之有皇莫大於羲軒帝莫加於唐虞姒氏商鎬亦續憲度咸紀名諡以揚昭光徵儒臣之議所以本至公也號全德之尊所以節一惠也發揮茂曜如揭日月伏惟大行皇帝文思濬哲天縱神授大明繼聖大孝尊親服道稽古洗心藏密巍巍易簡赫赫功造嚴祖宗而上下昭假仁億兆而飛沉表靈始者薊寇殘魂戎旌未偃方由雍邸出總虞師刷讎恥而戴君父超維城而升少海元良有開歷數誕膺同商宗而心在諒陰泣漢制而禮從權令然後諏咨對越端拱而理時丁祲沴盜起泚烈宸算獨復雲雷駿奔浹旬砥定鯨燎殲洗反已哀痛大猷彌尊阪泉威武止殺弔人之志也金方朔陲獫狁昆夷趦趄獷悍不敢不率丹穴南裔扶桑東極自古未化占風而至鏡照廣及無思不服之德也大本達道是為中和鼓而舞之名我至樂變革繁淫以貞神人奉聖順聖元侯繼獻九成八佾聖作明述垂衣脫劍欣合猗那之奏也觀文化成匠物研精四始六義勤詣風雅洪音巨麗焜耀皎繹立言垂訓丹書元鳥之作也蠲痾保全壽夭之門方疏溥錫目之廣利札瘥不聞長養推仁施齊天地如保赤子之誠也教由德禮人乃恥格古作訓夏我針政刑載宏哀敬用息刀鋸利見大人循本愧心之旨也躬信厚而偷薄以革體清明而貪叨以懲納匪躬之直無毀校防川之誤推輔理之功有輻輳並進之歎泥金方草仙鼎忽成汗漫無從希夷永閟哀同軌之將會仰鴻名之可易鋪衍至迹錫乎無窮謹按經義參諸諡法曰應物無方之謂神保大定功之謂武尊仁安義之謂孝經天緯地之謂文大行皇帝變化無窮樞衡在握神莫過焉金湯善師豺狼擾馴武莫威焉承休繼志永錫不匱孝莫大焉輝焯王度煥乎黼藻文莫逾焉考墳史而徵德實請上尊諡曰神武孝文皇帝廟號曰德宗臣上稽太古皇帝之建尊諡也咸揭盛德以旌至公備禮於郊即天成命易名之典也故堯不稱巍巍成功而以傳聖為盛德禹不稱乃錫元圭而以成功為盛德此五帝三王統天作諡之大範也伏惟大行太上皇天作睿哲生知太和揚九聖之耿光開萬紀之休運雲行雨施不俟終日廣愛博教克成浹旬澤萬物德大乎羲軒公天下道高乎堯舜原夫君人之表教於岐嶷造物之用先乎蓍龜在宮播為善之樂主器流作貞之慶視膳有法文之孝撫軍有戡羿之庸育全德於春闈積大望於覆育垂三十載矣三善方躋乎聖敬六氣遽嬰乎沈痼德宗皇帝慮繼明之重深惟疾之憂積其不懌至乎大漸天崩地坼當瞑眩之辰流沙漸海有震動之懼而大行太上皇明德動天神化無為上虔九廟下恤兆人深冀翌日之瘳大慶即端之作於是建冡嫡以發大號赦天下以壯皇猷聖作明述周流灌注若乃奄巖穴以搜賢才能官則哲之道也黜進獻以藝貢賦籍田任土之利也滌疵瑕而復放竄解網泣辜之仁也蠲逋責而惠困窮寬大易簡之義也用能垂拱而神人交泰元默而動植究安巍巍蕩蕩聖德如風烈雷迅不崇朝而溢乎八紘矣猶為以黎獻之富教未洽陵寢之制度未成深圖甘害於恬頤力政不憚於增劇既而同軌畢至萬邦咸寧奉先之孝克終傳聖之義斯舉釋負寶位栖神玉清追姑射之高蹤樂華胥之妙道大矣哉與天地合其德則不為而成與變化合其神則不疾而速聖造盤薄元風汪洋所謂天授非人力也方陋唐虞之異族樂文武於同時振耀重光永清四海孰謂初陽變候素疾彌留徵祕術而俞扁必臻走㣥望而圭璧斯罄何翠華之不駐乘白雲而上仙攀號刀劍哀震寰區皇帝悼極憂以致養痛大數之不延外遵易月之命內茹終天之酷詞不朽於禮諡旌罔極於受恩敢揚聖德垂鴻惇史謹按易曰天地之大德曰生聖人之大寶曰位諡法曰裕和平曰安敬慎所安曰孝大行太上皇乘運統天端拱造物可謂至德感神翊運光明正位可謂大聖永圖丕搆傳聖保和可謂大安九族安之兆人賴之可謂大孝下採華夷之望上合神祇之心請上尊諡曰至德大聖大安孝皇帝廟曰順宗謹議班孟堅謂有漢文章與三代同風巨唐化成稽古斯文配炎靈之盛浸息淫靡歸於正聲由是業文之士蓄靈含粹光價時獨者往往間出吾友河南穆員字輿直麟蔚鳳采自天而授誦六經得其研深閲百代得其英華屬詞匠意必本於道夫龍圖龜書三統之有述皆文之蘊也自雅頌風騷而下則又粉澤而成黼藻雕鐫而為形象比其音而曲度之緣其情而哀樂之悠遠易直昭明典則本情性而根教化者率漫羡魁壘繁音豔彩習怪誕而尚沉溺者也穆君泝其波流擇其宗師以為文宣王經春秋序詩書繫易象猶日月不可及矣遊夏荀孟李斯賈誼之徒是宜學者十駕百已鑽仰而憲章者也故其文融朗恢健沉深理辨墉閫四會精鋩百練結而為峻極散而為遊衍其工也異今而從古其旨也懲惡而從善迹夫孝於其上慈於其下擇中庸而後蹈推久要而後交則向之詞藝由積衷淳耀發而為身瑞者也顏回黃憲仁而夭促揚雄司馬遷才而不試穆君年逾四十用止幕畫并四賢之德器而祿壽似焉彼洪爐埏埴真宰不直歟為天地無心芻狗萬化歟大凡碑志文册銘贊記序六十五首共成十卷於先府君先夫人元堂志見自身刑家自家刑國父父子子夫夫婦婦之道於祭顏太師張相國文見君仁臣忠捍患成功感憤激烈死輕鴻毛之道向使假其永齡登金馬石渠與獻納論思之臣發揮謨訓潤色王度則聖朝文苑頌甘泉賦羽獵卿雲裦皋㣥子之列加一士也斯楊嗣仁所以賦已友之哀余所莫疑矣宋之問遺草編次授於伯兄舊御史中丞今常州刺史善知音者唯子期乎發篋開卷如升元圃將垂來代敢失其傳地配天而萬有生息賢合聖而百常順序巨唐六葉明皇帝登寶位之草一祀得師文臣侍中文獻公闕二字階益闕一字鏡照孟清陳力推闕一字昭闕六字耀卿字子渙河東聞喜人也伯益裔孫非子周封於秦至桓公少子針去國食采於晉其邑曰遂為氏焉自針至闕一字代祖闕一字四葉昭義振闕一字重闕十一字景仕周舉秀才富平縣令大王父正隋豐州司馬蘇州大總管府贊治王父眘皇朝舉秀才授許州司戶登明經高科遷闕二字郎闕三字考守真闕九字封尉太常博士詳正學士夏官員外成寧二州刺史贈戶部尚書公即尚書府君第三子也初河東夫人之夢熊羆神闕二十一字第聖闕一字中書判入等補麟臺正字未幾丁尚書府君憂荼蓼之毀禮不能節服除調集以太夫人有羸老之疾乞闕官闕十九字翰絫轉國子主簿詹府丞太夫人捐館莫闕一字溢米哀憐滅性制終除河南士曹參軍睿宗闕一字嘗列宮寮加朝散闕二十一字時謂淫雅不雜而繩墨誠陳也亟轉兵部郎中長安縣令轂下塗多事并刓弊相習名迫闕一字誤堅貞鮮遂公更張其闕二十字月政稱神明時宰有銜初醜正者出濟州刺史絫換宣冀二州清明愷悌三郡一政物皆饒阜人不闕一字欺而濟陽信都闕二十一字除左庶子仍領崇文館事疾間復拜戶部侍郎尋遷京兆尹上曰神都地有歸會豈闕一字更宜處風化取則付之於卿公下車而闕十四字革闕一字漁奪兼并者讓田而市義穿窬椎剽遊惰苦窳莫不耿禁令而却走視條經而易業明皇帝嘉器任闕一字適每前席以聽闕十四字糶貴幸活也上徵救人之術公述陳王者損上益下宅土中關內之利因奏鼎新漕運以廣儲廩置河闕一字三門闕一字崖集津倉闕十四字有陘東之積中都有不涸之饋功齊神化利及億兆逋負之徒征徭之氓追琢貞珉諑謠仁智今存於道左明皇帝舉勞旌善擢授闕十四字士天下轉運都使尋遷侍中加銀青光祿大夫又以千畝五推之禮加金紫光祿大夫中書令張九齡奏請和爐金言鈲公以為闕十六字夷州刺史楊闕一字贓汚詔下闕一字寵仍杖六十公以為郡守當父母百城鞭闕一字實闕一字損闕一字敬以流代死聖朝之典也殘毀闕十九字河西隴右兩道節度公密疏曰嘉連長闕一字趫悍徑勇闕於沈深計慮矜功侮敵恐未百全後果喪師失律大起邊患三者皆悉闕十八字藻闕一字衡之動由其極齊闕三字溥博幾闕一字用有藏晦中無磷淄推功與能亶惡闕一字違皆所以載編簡而成乎表式洽闕一字聞而播闕十五字右僕射上嘗命畫工寫貌圖於凌煙閣手制曰所謂傳神國之故事自武德至是宰輔一百八十七人登丞相左右揆其一其闕十六字盈闕一字若虛貴而佳卑衣無華綵食不珍異正考父之益恭晏平仲之矯時蘧瑗之暮夜匪懈孫闕一字之衣衾不飾取類前志我無愧心闕十六字蓍蔡俱與公結金石之契闕三字律之闕一字王闕一字味逝為牙期也濟川中止孰主大爐難老不錫曷云輔善以天寶三載七月十八闕十九字震悼罷朝贈太子太傅諡曰文獻以其年十月歸葬絳州稷山縣姑射山之陽尚書府君塋東四里有子八人遂泛淑綜延闕十九字漢數闕三字豈德祖同歟綜皋最知名綜官至吏部郎中皋官至給事中郎中淑吏部侍郎佶京兆少尹武給事中闕一字諫議闕十九字聞之益於闕一字詞推麗則之雄由不及道嘗踐門閫功德儀刑將垂芳於不朽發揮鑽仰孰授簡之當仁銘曰日月貞明洪鈞造物股肱匡戴宏化陰隲於赫明皇追蹤昔王聿求仁哲俾闡昭光文獻膺時慶霄未闕三字四靈闕十七字世風流慶存翼子貽孫江海華藻圭璋後昆靈源之上姑射之下宰府兆域闕一字曹松檟照燭葳蕤崢嶸豐碑絳闕三字馨稷下闕維貞元十九年歲次癸未四月壬午朔二十二日癸卯給事中許孟容吏部郎中李傭司封郎中韋成季屯田員外郎穆員右補闕張惟素京兆府司録薛丹等潔牢醴庶羞以祭於兵部郎中楊君之靈大鈞生生陰隲者誰殲惡輔善胡顛倒之擬聖草元子雲位卑中庸殆庶回夭不時吾友懋功粹靈天姿文為國華行作人師不至公相不登期頤嗚呼昊穹報施云欺交以利合滔滔其衆直義許心惟君伯仲金石非固韋弦迭用柯葉四時古之所共昔也三虎季奪天縱今也二龍叔聞邱慟甲乙論辨聲聞我求桂枝崑玉郤氏無儔典校蓬山佐賢戎州渚宮峴首人賴嘉猷瑤墀記言方册潤色列宿有耀彌綸皇極鼎臣專征在浚之郊輟我綱轄俾參鞬櫜元侯歸全符節自朝戎有伏莽變生中宵呀呀獲噬廠墨里流血正直之形豺狼不嘻歸來間燕望在清切琴史方娛簪裳靡屑抒懷摛藻致遠詞絶文昌貴郎莫最司戎惟是利器簡於宸衷求賢得人天下至公鴻鵠不翦麒麟在馭九霄咫尺萬里跬步躡影搏風遏之中路天若可問余徵其故先哲嗣仁蕃翰藎臣南國之紀洞庭之濱呌呼在聆淚血在巾擲裂酸楚悽心動神賓階寂寥繐帳參差露濕芳樹風淒曲池劒光塵昏履迹苔滋幽琴戛而無聲玉斚盈而不持惟古今之俱盡悟彭殤之一期留景餐霞兮昔人謂誰隙駒舟壑兮達者不悲齊修短於一致必後先之匪移平生理言造次在茲本懸解之達觀吁坦懷而暫夷哀挽徐出泉臺永閟觴豆匪馨塗芻有位蒼山霧羃素滻波駛紛帷輤之依遲杳精魂之髣佛匍匐友好伶俜孀稚玉樹春凋文星晝墜士歎梁木朝嗟國瑞三月徒來百身無異緘惋痛於胸抱孰哀調之可既尚饗
