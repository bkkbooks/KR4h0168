front:
  text: 全唐文欽定全唐文卷三百二十五王維二
  hash: sha256:c0fc9ccb7cea9120d5cdfa4f1f348a91207b26e4126e6652fd3c5dc9604a8b30
body:
  text: 設險守國金城九重迎賓遠方朱門四闢將以晝通阡陌宵禁姦非眷彼閽人實司是職當使秦王宮裏不失狐白之裘漢后廏中惟通赭馬之迹而乃不施金鍵空下鐵關將謂堯人可封固無狗盜之侶王者無外有輕魚鑰之心過自慢生陷茲詿誤而抱關為事空欲望於侯嬴或犯門有人將何禦於臧紇固當無疑必置嚴科一昨出後伏承令從官將軍車騎至陋巷見命恨不得隨使者詣舍下謁才非張載枉傅元以車相迎德謝侯生辱信陵虛左見待古人有此今也未聞所以竦踊惕息通夕不寢維自結髮即枉眷顧侍郎素風維知之矣宿昔貴公子常下交布衣盡禮髦士絶甘分少致醴以飯汲汲於當世之士常如不及故夙著聞望為孟嘗平原之儔及乎晚歲時危益見臣節草莽之中乘輿播越列郡或棄車走林畏賊顧望貢獻不至莫有鬬心侍郎慨然枕戈泣血奮不顧命捍衛聖主楊奉之以兵奉迎蕭何之運糧致饋曹洪之以良馬濟趙衰之以壺飧從收合亡騎繕治兵甲喻以大義慰而勉之然後以劒率卒執戈前驅浹旬之間六軍響振以成興復之業豈非侍郎忠節蓋世義貫白日垂名竹帛為一代宗臣誠可愛也或曰宗子與國同休不得不爾也夫仁弱自愛者且奔竄伏匿偷延晷刻窮蹙既至即匹夫匹婦自經於溝瀆安能決命爭首慷慨大節死生以之乎而能不邀寵於上不干功於下不怠邦政不受私謁時與風流儒雅之士置酒高會吟咏先王遺風翛然有東山之志善矣維雖老賤沈迹無狀豈不知有忠義之士乎亦常延頸企踵嚮風慕義無窮也然不敢自列於下執事者以為賤貴有倫等威有序以間人持不急之務朝夕倚門窺戶抑亦侍郎之所惡也而猥不見遺思曹公命吳質將何以塞知已之望報厚顧之恩內省空虛流汗而已輒先馳狀候涼時即躬詣門下奉謝王維頓首近臘月下景氣和暢故山殊可過足下方溫經猥不敢相煩輒便往山中憩感配寺與山僧飯訖而去北涉元灞清月映郭夜登華子岡輞水淪漣與月上下寒山遠火明滅林外深巷寒犬吠聲如豹村墟夜舂復與疏鐘相間此時獨坐僮僕靜默多思曩昔攜手賦詩步仄徑臨清流也當待春中草木蔓發春山可望輕鯈出水白鷗矯翼露溼青皋麥隴朝雊斯之不遠儻能從我遊乎非子天機清妙者豈能以此不急之務相邀然是中有深趣矣無忽因馱黃櫱人往不一山中人王維白足下太師之後世有明德宜其四代五公克復舊業而伯仲諸昆頃或早世唯有壽光復遭播越幼生弱姪藐然諸孤布衣徒步降在皂隸足下不忍其親杖策入關降志屈體託於所知身不衣帛而於六親孝慈終日一飯而以百口為纍攻苦食淡流汗霂為之驅馳僕見足下裂裳毀冕二十餘年山棲谷飲高居深視造次不違於仁舉止必由於道高世之德欲蓋而彰又屬聖主搜揚仄陋束帛加璧被於巖穴相國急賢以副旁求朝聞夕拜片善一能垂章拖組況足下崇德茂緒清節冠世風高於黔婁善卷行獨於石門荷蓧朝廷所以超拜右史思其入踐赤墀執牘珥筆羽儀當朝為天子文明且又祿及其室養昆弟免於負薪樵蘇晚爨柴門閉於積雪藜牀穿而未起若有稱職上有致君之盛下有厚俗之化亦何顧影局步行歌採薇是懷寶迷邦愛身賤物也豈謂足下利鍾釜之祿榮數尺之綬雖方丈盈前而蔬食菜羹雖高門甲第而畢竟空寂人莫不相愛而觀身如聚沫人莫不自厚而視財若浮雲於足下實何有哉聖人知身不足有也故曰欲潔其身而亂大倫知名無所著也故曰欲使如來名聲普聞故離身而返屈其身知名空而返不避其名也古之高者曰許由挂瓢於樹風吹瓢惡而去之聞堯讓臨水而洗其耳耳非駐聲之地聲無染耳之迹惡外者垢內病物者自我此尚不能至於曠士豈入道者之門歟降及嵇康亦云頓纓狂顧逾思長林而憶豐草頓纓狂顧豈與俯受維縶有異乎長林豐草豈與官署門闌有異乎異見起而正性隱色事礙而慧用微豈等同虛空無所不遍光明遍照知見獨存之旨邪此又足下之所知也近有陶潛不肯把板屈腰見督郵解印綬棄官去後貧乞食詩云叩門拙言詞是屢乞而多慚也嘗一見督郵安食公田數頃一慙之不忍而終身慙乎此亦人我攻中忘大守小不闕其後之纍也孔宣父云我則異於是無可無不可可者適意不可者不適意也君子以布仁施義活國濟人為適意縱其道不行亦無意為不適意也苟身心相離理事俱如則何往而不適此近於不易願足下思可不可之旨以種類俱生無行作以為大依無守默以為絶塵以不動為出世也僕年且六十足力不強上不能原本理體裨補國朝下不能殖貨聚穀博施窮窘偷祿苟活誠罪人也然才不出衆德在人下存去就如九牛一毛耳實非欲引尸祝以自助求分謗於高賢也略陳起豫惟審圖之維白僕乍脫塵鞅來就泉石左右墳史時自舒卷頗覺思慮斗然一清禺俟揮絃寫我佳況天地之心無不覆載鳥鼠之性自私巢穴國家非徒疆理其地臣妾其人思欲一車書混聲教變毒螫之俗為理義之鄉伏惟皇帝陛下大道先天至德冠古武功則我有七德文教則舞於兩階億兆廣堯封之時郡縣加禹服之外而犬戎小醜蝸角偷安動搖遠邊遮漢使之路脅從小國絶藩臣之禮四鎮節度使高仙芝等虔奉聖策肅將天誅因識匿之且憎尋勃律之舊好暨諸胡國悉會王師萬里風馳六軍電掃氊裘之長思嚮風以無階毳幕之人惟塗地而可獲遂通重譯罔不來庭實賴聖謀曷惟帝力無攻不克百蠻皆歸於計中無遠不賓萬方若在於宇下臣等不勝喜慶之至山有姑射人蓋方外海有蓬瀛地非宇下逍遙谷天都近者王官有之不廢大倫存乎小隱迹崆洞而身拖朱紱朝承明而暮宿青靄故可尚也先天之君俾人在宥歡心格於上帝喜氣降為陽春時則有若太子太師徐國公左丞相稷山公右丞相始興公少師宜陽公少保崔公特進鄧公吏部尚書武都公禮部尚書杜公賓客王公黼衣方領垂璫珥筆詔有不名命無下拜熙天工者坐而論道典邦教者官司其方相與察天地之和人神之泰聽於朝則雅頌矣問於野則賡歌矣乃曰猗哉至理之代也吾徒可以酒合宴樂考擊鐘鼓退於彤庭撰辰擇地右班劒驂六騶畫輪載轂羽幢先路以詣夫逍遙谷焉神皋藉其緑草驪山啓於朱戶渭之美竹魯之嘉樹雲出於棟水環其室灞陵下連乎菜地新豐半入於冢林館層巔檻側徑師古節儉惟新丹堊巖谷先曙羲和不能信其時芳卉一作卉木後春勾芒不能一其令桃一作花徑窈窕蘅皋漣漪一作超忽驂御延佇於叢薄珮玉升降於蒼翠於是外僕告次獸人獻鮮樽以大罍烹用五鼎木器擁腫即天姿以為飾沼毛蘋蘩在山羞而可薦伶人在位曼姬始縠齊瑟慷慨於座右趙舞裴回於白雲衮旒松風珠翠煙露日在濛泛㣥山夕嵐猶且濯纓清歌據梧高詠與松喬為伍是羲皇上人且三代之後而其君帝舜九服之內而其俗華胥上客則冠冕巢由主人則弟兄元愷是四美同乎一時廢而不書罪在司禮竊思一作賢楚傅常詣茅堂之居仰謝右軍忽序蘭亭之事蓋不獲命豈曰能賢惟帝克辟惟股肱克左右庶績允釐有司多暇舉無違德孰獻其可雖列侍丹陛而罕伏青蒲攄懷致館灞陵南望曲江左轉登一級而鄠杜如近盡三休而天地始大凝氣向晦蒼蒼寒木式與汝歌多酌我酒墨客既序親當獸炭膳夫交馳屢奏鮮食夫含德之厚與時偕化拂衣為放則野人於小隱之中束帶而朝則君子於大夫之後何軌轍一境是非外物哉且騎有羈紲一作勒徒有次舍可以永日可以繼夜客非詩人之徒歟奚其默也今上合大道以撫荒外振長策以馭宇內故左言返踵穿胸沸脣膺騰白波驟輸碧砮之貢腹阻赤坂傳致紫琥之琛辮髮名王養馬於下廏魋結去帝獻珠於小臣而犬戎不識蝸角自大偷安九服之外謂天誅罕及自絶所國之後而王祭不供天子按劒謀臣切齒思以赤山為城青海為塹盡平其地悉虜其人而上將有哥舒大夫者名蓋四方身長八尺眼如紫石稜鬚如蝟毛磔指撝而百蠻不守叱吒而萬人俱廢髟不髟而奮髯哮吼如虎裂眥大怒磨牙欲吞不待成師固將身先士卒常思盡敵不以賊遺君父矢集月窟劒斬天驕蹴崑崙使西倒縛呼韓令北面豈直趙人祭其東門胸奴不敢南牧而已開府之日辟書始下以為踴躍用兵健將之事意氣跨馬俠少之能蓋欲謀夫起豫哲士俾我殲黠虜以無類舉外國如拾遺待夷門而不食置廣武於上座始得我高子焉高子讀書五車運籌百勝慷慨謀議折天口之是非指畫山川知地形之要害嘗著七發曹王慕義每奏一篇漢文稱善緣情之製獨步當時主人橫挑而有餘墨客仰攻而不下公卿籍甚遍交歡於五侯孫吳暗合將建功於萬里徵以露版召見甘泉衣短後之衣帶櫑具之劒象弧雕服鞭弭橐鞬目無先零氣射西旅蒼頭宿將持漢節以臨戎白面書生坐胡床而破賊然孤峰遠戍黃雲千里嚴城落日而閉鐵騎升山而出胡笳咽於塞下畫角發於軍中亦可悲也遲子之獻凱雲臺奏事宣室紫綬曳地金印如斗列居東第位為通侯舊友拜塵㣥公書幣祁大夫老矣武安侯問乎漢張右掖以備左袵西遮孔道北護居延然犬戎夜獵於山外胸奴射雕於塞下歲或有之我散騎常侍曰王公勇能盡敵禮可用兵讀黃石書殺白馬將入備顧問載以乘輿副車出命專征賜以內棧文馬將軍幕府請命介於本朝天子瑣闈輟諫官以從事補闕李公家世龍門詞場虎步五經在笥一言蔽詩廣屯田之蓄度長府之羡以贍邊人以弱敵國然後馳檄識匿略地崑崙使麾下騎刃樓蘭之腹發外國兵繫郅支之頸五單于遁逃於漠北雜種羌不近於隴上子之行也不謂是乎拜首漢庭驅傳而出窮塞沙磧以西極黃河混沌而東注胡風動地朔雁成行拔劒登車慷慨而別國自有初以節守西門者得自召吏選客故我常侍崔公以二車迎杜侯於杜陵而咨之矣舍之門下衣儒者之服立於軍門説諸侯之劒猗元帥之理也行有賁育鐵馬成㣥而雄戟罕耀角弓載櫜秉王者師不邀奇功樓庭籍甚高冠長劒拜命雲臺在是行也㣥公自出轅門驂騑滿路置酒欲飲高歌自悽寂寥孤城惆愴朔管飛雪蔽野長河始冰吾子勉之慷慨而別少年明經試出補吏學通大義政習前典本之於德輔之以才大官大邑可也不惟是歟豫昔仕魯蓋嘗之鄆書社萬室帶以魚山濟水旗亭千隧雜以鄭商周客有鄒人之風以厚俗有汶陽之田以富農齊紈在笥河魴登俎一都會也子其不寶貨不耽樂不弄法不慢官無侮老成人無虐孤與幼上官奏課輶軒以聞則繡衣方領垂璫珥筆子所得也誰敢有之豫病且憊歲晚彌獨窮巷衡門落日秋草趙服過我且東其轅促飯中子不可以蔬食送車出郭吾不可以徒行屨以及門拜於宇下猶且抱杖延頸送之以目城回樹轉悲其馬嘶云邠人前京兆右扶風居上谷間與寢園接七月之什蕩無遺風五陵之豪雜居其地故有黠吏惡少犯命干紀政寬則以姦病人操急則以事中吏鄭子為邑也絃歌之化洋溢四封雷霆之威燀赫百里下車按捕盡致法焉繡衣下帷風俗之治苟以文墨抵罪除名為人削迹於野杜陵解印時賣故侯之彭澤無官詎有公田之黍牽衣肘見步雪履穿獲戾由中是貧非病屬聖朝龍旗鑾輅登封告成之事畢蒼玉黃琮郊天祀地之禮備天下無事海內乂安盡登仁壽之域猶下哀憐之詔萬方有罪與之更新百寮失職使復其位降邑宰為輿尉從館墨而解褐龍星始見馬首欲西搢紳先生居多結友諸曹列署且有同時時工部侍郎蕭公詞翰之宗德義之府弱年筮仕一命聯官於奉常幾日左遷六人同罪於外郡籯金盛業克傳丞相文儒萬石高風彌重故人賓客賦詩寵別贈言誡行騎登棧道館於板屋劒門中斷蜀國滿於二川銅梁下臨巴江入於萬井黃鸝欲語夏木成陰悲哉此時相送千里天子若曰咨爾三事百辟寇賊姦宄震驚朕師其舉吏二千石至墨綬豫將大命於朝以撫方夏㣥從曰惟祥舊有令聞克奉成憲往踐乃職無恫於人獄貨非寶農食滋碩浮于淮泗浩然天波海潮噴於乾坤江城入於泱漭彼有美錦爾嘗操刀學古入官倚法為吏上官奏課國將大選爾勞勉哉行乎唱豫和汝心舍於有無眼界於色空皆幻也離亦幻也至人者不捨幻而過於色空有無之際故目可塵也而心未始同心不世也而身未嘗物物方酌我於無垠之域亦已殆矣上人順陰陽之動與勞侶而作在雙樹之道場以衆花為佛事天上海外異卉奇藥齊諧未識伯益未知者地始載於茲人始聞於我瓊蕤滋蔓侵回階而欲上寶庭盡蕪當露井而不合㣥艷耀日衆香同風開敷次第連九冬之月種類若干多四天所雨至用楊枝已開貝葉高閣聞鐘升堂覲佛右繞七匝卻坐一面則流芳忽起雜英亂飛焚香不俟於栴檀散花奚取於優鉢漆園傲吏著書以稊稗為言蓮座大仙説法開藥草之品道無不在物何足忘故歌之詠之者吾愈見其默也會心者行表行者祥故行藏於密而祥發於外欲人不知不可得也夫孝於人為和德其應為陽氣笋陽物也而以陰出斯其效歟重冰閉地密雪滔天而緑籜包生不日盈尺公之家執德庇人仗義藩國忘身於王室不家於朱戶公世載盛德人文冠冕又天姿大賢庭訓括羽之日諸季式亦克用訓我爾身也共被為疏禮庇身焉禦侮無所花萼煜煜爛其盈門兄弟怡怡穆然映女且孝有上和下睦之難尊賢容衆之難厚人薄己之難自家刑國之難加行之以忠信文之以禮樂斯其大者遠者況承順顏色乎況溫凊枕席乎如是故天高聽卑神鑒孔明不然笋曷為出哉視諸故府則昔之人亦以孝致斯瑞也竊以真如妙宰具十方而無成涅般至功滿四生而不度故無邊大照不照得空有之深萬法偕行無行為滿足之地惟茲化佛即具三身不捨凡夫本無五蘊實藉津梁法相脫落塵容始於度門漸於空舍然後金剛道後為三界太師王毫光相得一生補處左散騎常侍攝御史中丞崔公第十五娘子於多劫來植衆德本以般若力生菩提家含哺則外葷羶勝衣而斥珠翠教從半字便會聖言戲則翦花而為佛事常侍公頃以入朝天闕上簡帝心雖功在於生人深辭拜命願賞延於愛女密啓出家白法宿修紫書方降即令某月日敬對三世諸佛十方賢聖稽首合掌奉詔落髮久清三業素成菩薩之心新下雙鬟如見如來之頂綺襦方解樹神獻無價之衣香飯當消天王持衆寶之鉢惟娘子舍諸珍寶塗彼戒香在微塵中見億佛剎如獻珠頃具六神通伏願以度人設齋功德上奉皇帝聖壽無疆記椿樹以為年土宇無垠包蓮花而為界又用莊嚴常侍公出為法將入拜台臣身在百官之中心超十地之上夫人以文殊智本是法王在普賢心長為佛母郎君娘子等住誡性為孝順用闕德為道場將遍衆生之慈回同一子之想又願普同法界盡及有情共此勝因俱登聖果法身無對非東西也淨土無所離空有也若依佛慧既洗滌於六塵未捨法求厭如幻於三有故大雄以不思議力開方便門我心猶疑未認寶藏商人既倦且息化城究境達於無生因地從於有相西方淨土變者左常侍攝御史中丞崔公夫人李氏奉為亡考故某官中祥之所作也夫人門為士族之先道為梵行之首大師繼踵望塵而理印命婦盈朝聞風而素履心王自在萬有皆如頂法真空一乘不立以示見故菩薩為勝鬘夫人同解脫因天女讚維摩長者陟岵何至哀哀縗絰順有漏法泣血以居念罔極恩滅性非報惟茲十力所護豈與百身之贖不寶纓絡資於繪素圖極樂國象無上樂法王安詳聖衆圍繞湛然不動疑過於往來寂爾無聞若離於言説林分寶樹七重繞於香城衣奉天花六時散於金地迦陵欲語曼陀未落衆善普會諸相具美於是竭誠稽首隕涕焚香願立功德以備梯航得彼佛身常以慈悲為女存乎法性還在菩提之家偈曰稽首十方大導師能於一法見多法以種種相導㣥生其心本來無所動稽首無邊法性海功德無量不思議於已不色等無礙不住有無亦不捨我今深達真實空知此色相體清淨願以西方為導首往生極樂性自在寂等於空非心量德如則不動離意識界實無所住常遍㣥生不捨有為懸超萬行法性如是豈可説邪如意輪者觀世音菩薩陀羅尼三昧門現方便於幻眼六臂色身以究竟為佛心一體真相隨念即藏乃無緣之慈應度而來斯不共之力衆生如意菩薩何心崇通寺尼無疑道登等貴族出家梵筵上首久積淨業三世皆空長在道場一乘自立亡兄故河南少尹雖明世典深達實相以不二法處於百一作上官花萼相連恩深女弟栴檀舊繞望絶仁兄雖曰如夢寧喪我煩惱性淨示有同凡之悲菩提路空強為助道之相選伎惟潔底功加敬針鋒線縷日就月將五彩相宣千光欲發金蓮捧足寶珠垂髻原夫審像於淨心成形於纖手珊瑚掌內疑現不動如來頻婆口中同乎無法可説焚香讚歎散花瞻仰有情苦業滅而不生無上法輪轉而恆寂願以此福冥用莊嚴乃為偈曰菩薩神力不思議能以一身遍一切常轉法輪無所轉衆生隨念得解脫色即是空非空有是故以色像觀音願以淨斯六趣福回向過去不可得易曰遊魂為變傳曰魂氣則無不之固知神明更生矣輔之以道則變為妙身之於樂土大覺曰聖離妄曰性克修其業以正其命得無法者即六塵為淨域繫有相者憑十念以往生西方變者給事中竇紹敬為亡弟故駙馬都尉某官之所畫也天倫之愛加人數等悲讓佞而無所痛殞身而莫贖闕傾無長之工不平分於我生將厚貸於泉路尚茲繪事滌彼染業寶樹成列金砂自映迦陵欲語曼陀未落墜此中年登乎上品池蓮寶座將踰棠棣之榮水鳥法音當悟鶺鴒之力讚曰生因妄念沒有遺識憑化而遷轉身不息將免六趣惟茲十力哀此仁兄友于後生不知世界畢意經營傍熏獲悟自性當成孝悌之至通於神明天為之降和地為之嘉植發書占之推理可得何者人心本於元氣元氣被於造物心善者氣應氣應者物美故呈祥於魚鳥或發揮於草木示神明之陰步馬與天地之嘉會今中書侍郎相公先生左丞府君沈潛上德遐尚絶軌江海漭沆嬰孩杏壇高門長軌隱几含素蓋鳳凰之高逝薄龍虎之逶迤積有淳德誕敷餘慶而我相公生而英姿河目海口量與太素而無端倪應會神速動若發括事遣理盡淡然虛空亦猶太清雲無處所重元之旨達而有餘奧太白之明漫而不及理文可以經邦訓俗武可以保大定功故天子咨之以布元化昔者高堂既扇枕無所嘔血長號禮不能制其哭泣之度終身巨痛時無以加其霜露之惕攻苦食淡寢苫枕塊淚少於血骨餘於形風唳起而裂其心鳥悲鳴而感其哭俄而紫芝生棟葉若一作華成仙人之蓋色奪齊侯之衣又有木在林味若楚王之萍大如安期之棗枯木無生物之理而布濩滋蔓時果有常分之形而碩大殊尤鄰里駭之郡縣聞之公泣而不敢言州司遽表以獻或曰因心而致人之祥也或曰率土所生國之瑞也有識君子曰至孝所感物為人之祥大賢佐時人為國之瑞二物者雖感曩時之純至亦符今日之崇高也公尤不敢當歸美於今上以為震位先兆孝德動天至乾元二年乃畫圖以進詔報曰芝草者延壽之徵也木者投報之應也蓋至誠所感有開必先朕與卿道契雲龍義同水石位崇台衮寄重股肱故得嘉瑞薦臻靈物昭格君臣同德區宇克寧覽其進圖可為嘉應請宣付史館者既依史策亦藏書府讚曰紫芝三秀則生於梁木一實其大盈筐嘉應薦至其故何祥哀哀孝思漣漣泣血終身致毀每慟將絶雲為裴回風為慘切依仁據德移孝為忠經目盡理任心便公其道橐籥虛而不窮公位先兆聖人斯覩賜以詔書藏之祕府邦家之光哀榮終古有道者古其神則清雙眸朗暢四氣和平長江月影太華松聲周而不器獨也難名且未婚嫁猶寄簪纓燒丹藥就辟穀將成雲溪之下法本無生淡爾清德居然素風氣和容衆心靜如空智以窮理才包至公大盜振駭㣥臣困蒙忘身徇節歷險能通仁者之勇義無失忠凝情取象惟雅則同粉繪不及清明在躬麟閣之上其誰比崇臣聞大明馭宇天地同符間氣佐時君臣協德故千年聖主唐帝撫其寶圖七德諸侯周公為之元老臣聞有其才者效其職重其任者竭其能故樂播大風乃能調四氣身騎列宿於是運三光臣聞先天不違德合於上事君盡力功濟於下故君臣同體於大道庶人以康億兆宅心於至仁萬邦乃固臣聞形之端者影必隨焉聲之善者響必應焉故偃武修文皇天降之善氣薄賦省役后土報以豐年臣聞宣至理者文懸之於日月表聖言者字動之以煙雲故虞舜作歌徒施於典策伏羲畫卦未類於昭回
