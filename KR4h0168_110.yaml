front:
  text: 全唐文欽定全唐文卷一百十後唐明宗五
  hash: sha256:bb8891ab908f1296d914b6192944d934bc03d2a8dd854e1244ae64d00ebfe67c
body:
  text: 進士帖經本朝舊制蓋欲明先王之旨趣閲才子之文章近代以來此道稍墜今且上從元輔下及庶僚雖負藝者極多能帖經者極少恐此一節或滯羣才既求備以斯難庶觀光而是廣今年凡應進士舉所試文策及格帖經或不及通三與放及第來年秋賦詞人所習一大經許令對義義目多少次第仍委所司件奏應諸道見任州縣官司在任之時若時違犯本道非時衝替宜却勒赴任考滿即罷其本判官當行責罰官爵之班即分高下見謝之位豈有異同宜立通規以為定制今後宰臣使相朝見辭謝并於崇元門外與諸官崇行異位一時列拜假滿橫行即從舊例又入閣之儀其翰林學士前任郡守等今後入閣宜依百官班例不得先出為官未可避事夾判不合申臺既有舉明須行責罰府司官吏巳下等第書罰傳科不精公穀虛有其名禮科未達周儀如何登第兼知前後空聞定制去留皆在終場博通者混雜以進身膚淺者僥求而望事須頒明敕俾叶公途自此後貢院應試三傳三禮宜令準進士九經五經明經例逐場皆須去留不得候終場方定仍具所通否粗一一旋於榜內告示其學究不在念書可特示墨義三十道亦準上指揮如此則人知激勸事有區分主司免致於繁忙舉子不興於僭濫凡是選人皆有資考每至赴調必驗文書或不具全多稱失墜將明本末須示規程其判成諸色選人黃甲下後將歷任文書告敕連粘宜令南曹逐縫使印都於後面粘紙具前後歷任文書都計多少紙數具年月日判成授某官張進等或位分符竹或職倅郡城殊乖警備之方致此敓攘之苦更容虛誑不戢元隨須舉憲章以為懲戒宜勒停見任凡命職官只憑告敕條流雖切謬濫不無況來自羣方固非遍識徐因章露始見罪尤先皇帝臨御之初郭崇韜制置甚切雖加峻法尚有訛風誠由本朝多事巳來偽室偷安之際皆隨往制莫識嚴規秩高者以蔭緒假人廣求財貨吏狡者以貪婪得志不顧憲章遂至傳授身名分張告敕勘初任則多稱失墜論資考則只有公憑前後相蒙真偽莫辨若不特行釐革無由永絶根源宜令自此應除授選授州縣官引驗磨勘須召有官三人保非謬妄則奏擬仍於告身內署出保官姓名據本官所通三代名銜有出身無出身任告敕文書并逐任考數若是本朝及偽朝所授者並只於將來新告身內一一收署其文書納留不再給付如自中興巳來歷任待受新命後都粘連繳尾具道數委吏部使印背縫郎官於狀尾押署給付或有失墜即須於所失處州縣投狀具三代名諱及出身歷任請公憑赴京勘會甲庫同即重與出給如公然拆破印縫不計與人不與人將來事發並令焚毀其人當行極典自茲凡受新命并依此例施行其見任內外文武朝臣及諸司職守諸道州府判官并軍州職員有曾為州縣官及曾改名所受本朝及偽署官告敕牒歷任文書亦並須送納入官只以中興巳來文書敘理其見任州縣官及諸色前資官守選官等所歷任文書亦仰速便送納委所司點勘無違礙則準前收署給與公憑任赴將來求事參選其秦王茂貞墨制官員並須得本道識認具歷任申奏所司簡勘不虛亦給與公憑將來降資受官所貴凡是身名免有混雜仍限一周年內改正了絶其興元巳西應曾受偽蜀官員緣地里遙遠許敕到後一周年為限仍各於本罷任處州府投狀具三代名諱出身歷任一一分析申奏到日點勘準前指揮如出限外縱有申送到文書並不敘理兼諸道亦不得以此身名奏薦如違罪在本判官其本人別行嚴斷庶得新恩迥異舊弊永除表為君一統之基塞入仕多端之幸仍付所司本朝列聖受册徽號多施霑澤蕩滌瑕疵今緣才過南郊不可便行大赦其中有恩未及者宜示優矜其諸色官員中或有經罰殿停替者宜并許以停任時官資理選數赴調其諸徵科不了勒定州縣官等除巳赴南郊行事該恩外慮有在外赴行事不及者宜並準上許理選序貴普沾於恩惠免永滯其身名俾得自新皆期受任盧嵩容易宰邑造次怒人不如法以行刑遂尋時而致死原情則本非故殺據律則當處極刑小不忍而難追內自訟而何及法不可墜義亦須明但究彼根繇似緣公事罪雖甚重理稍可疑峻刑則慮致民驕輕恕則恐滋吏酷永從遠竄特貸餘生聊以慰往者之魂兼可戒為官之屬嵩宜配蔚州長流百姓縱逢恩赦不在放歸之限其出身歷任告敕付所司焚毀李範巳該恩赦特放罪收納文書趙知遠以兄為父未之前聞既過郊禋特從恩宥出身歷任文書付所司焚毀放罪勒歸鄉貫本道長吏與改昭穆奏聞其餘南郊行事合減選人數將來選限滿日宜並不取逐處文解不更經南曹點赴銓注擬今年二月二十一日郊天赦書節文朝臣及藩鎮郡守亡父母祖父母及父母在並妻室未霑恩命並與追封贈及敘封者今赦書頒下巳及半年所行追贈敘封所司尚未奏覆深慮留滯各速指揮朝臣限兩月內齊具録奏外處與限一年仍並據品秩準格列指揮朝臣不得踰越先朝諸王頃因同光末年宮門變起諸王多奔北京沿路為部下所害宜於北京留守尋訪各依品秩禮葬訖奏聞訪聞諸道州縣官自衒虛名不惜人戶皆於省限巳前行帖催驅須令人戶貴買充納且徵科租賦乃是常規所務事集人安不必急徵暴斂況纍降敕命非不丁寧只據規程勿令踰僭此後為徵科事辦亦不酬勞本州不得申奏如違限稽慢即準條流責罰如灼然添得廨署招得流民無害於公私者可具事由申奏固得特行優奬其童子準往例委諸道表薦不得解送兼所司每年所放不得過十人仍所念書並須是部帙正經不得以諸雜零碎文書虛成卷數兼及第後十一選集第一任未得授親人官捧聖都軍使李行德十將張儉等托求虛事誣告重臣奏陳而頗駭聽聞詰驗而乃明讒謗間豫心腹傾我棟梁為巨蠧以異常罪一身而未塞宜誅家族懲彼姦凶仰全家處斬會計之司國朝重務總其使額以委近臣貴便一時寧循往例張延朗可充三司使班位在宣徽使之下楊知萬實曾行事尋巳注官只為父母轉年恩命遂寢外別無違礙自後相次丁憂久住京城誠宜傷愍宜令銓司點歷任文書準非時選人例處分或前資官中有與楊知萬事狀相類者并準此指揮王者興師討伐若行其時雨農夫去草誅鋤務絶其本根具載格言式符戎略而況天垂弧矢盡殪狼星國舉干戈當平賊子得不朝申號令夕議削除安邦守正翊贊功臣劒南東川節度使特進檢校太尉同中書門下平章事梓州刺史董璋受國深恩殿邦重寄但恣貪殘之性莫分宵旰之憂唯務包藏顯彰侮慢朝廷每施含垢具為掩瑕略無悛革之心轉有狂迷之狀伺便而侵漁仁境何名而點發義軍仍於關防輒修堡寨兼傳書檄招寇盜於晉州尋縱賊徒欲窺覦於遂府焚燒民舍驅虜耕牛覽奏報以實繁數愆尤而莫盡豈有武虔裕身為刺史輒敢縻留大程官手執宣頭略無遵稟而又淫刑害物酷法作威鐵籠之炮炙未聞金贖之科罪並發善人知懼惡貫巳盈且擢髮以難窮宜燃臍而不赦今則巳徵師旅將掃妖氛舉烈火以燎毛飛嚴霜而脫葉匪朝伊夕覆狡擒姦於戲無禮於君奮鷹鸇而驅鳥雀有功必賞誓帶礪而保山河殄寇則理在必然興兵則事非獲巳凡在遐邇宜體朕懷其董璋在身官爵並削奪諸道奏薦州縣官前銜內有賜紫金魚袋者若循常例州縣官十六考方得敘緋若巳佩金章固難為令録此後天下州府不得奏薦著紫官員為州縣官敘封之例敕格甚明況在所司備經其事既成差誤蓋是因循顯有糾彈實為允當欺即難恕錯即可矜然欲示戒懲須行責罰本行令史馬仁圭決臀杖七十勒停本部判郎中裴坦罰兩月俸王權等六人妻進封敘封郡縣邑號官誥宜令所司追納毀廢先條流見任州縣官及前資守選官所有歷任文書委所司點勘無違礙則準前收署給與公憑任將來參選者訪聞諸色選人有今年合格者因請公憑久淹京闕若候本道請解即須來歲授官多是甚貧誠為可憫況巳及選限固取本任文解不及前件選人今年合格巳請得公憑者宜令吏部南曹準今冬選人例勘施行如是欠選者候選數足日準格取本任文解赴集朕聞君臣一也善否同之比之於人心安則體逸方之於木枝盛則葉繁朕自父天子民宗文祖武輔弼上憑於廊廟獻替次賴於縉紳四海無波敢自矜於清晏一人有慶思共樂於雍熙近又允副羣情增崇大號雖中外元輔巳議序遷而文武庶僚未聞普及而況咸著恪共之績悉堅欣戴之誠將顯示於奬酬當廣頒於渥澤應在朝文武臣寮並宜加恩其有八月四日巳後遷官者不在此限諸道行軍節度副使兩使判官巳下賓寮及防禦副使判官推官軍事判官等若詢前代固有通規從知咸自於弓旌録奏方頒於綸綍初筵備稱確畫斯陳朝廷近以旌賞勳勞均分員闕稍或便於任使不免須議敕除既當委以裨贊所宜定其考限前件職員等宜令並以三十月為限如是隨府不在此限秋來赴舉備有常程夜後為文曾無舊制王道以明規是設公事須白晝顯行冀盛觀光尤敦勸善每取翰林學士往例皆試五題共觀筆下摛詞不俟燭前搆思其進士並令排門齊入就試至門開時試畢內有先了者上歷畫時旋令先出其入策亦須晝試應諸科對策並依此例餘準前後敕格處分天下兵馬都元帥尚父尚書令吳越國王錢鏐久列王公恆輸愛戴朕方禮加元老恩遇遠方安重誨妄掇瑕疵遽行阻絶使錢傳瓘拜闕上章傾懷請罪言皆激切事且憑虛情不可恕罪不可逭今巳誅之以雪其冤故告朕猥以眇躬薦承鴻業念彼疲瘵勞於寢興或慮官不得人因成紊亂或慮刑非其罪遂致怨嗟王化所興獄訟為本苟無訓勵必有滯淹近日諸道百姓或諸多違犯或小可鬬爭官吏曲縱吏人巧求瑕釁初則滋張節目作法拘囚終則誅剝貨財市恩出拔外憑公道內徇私情無理者轉務遷延有理者却思退縮積成言為弊漸失紀綱自今後切委逐處官吏州牧縣宰等深體豫懷各舉爾職凡關推究速與剸裁如敢苟縱依違遂成枉濫或經臺訴屈或投匭申冤勘問不虛其元推官典并當責罰其逐處觀察使刺史別議朝典宜令諸道州府各依此處分所管屬郡委本道嚴切指揮張延雍中官舊居省署蔭子合補齋郎為優牒稽遲於本司催促苛克寸縱實巳該肆赦之恩引驗無聞自掇兩詞之詰致淹折獄宜示罰金宜罰一季俸餘依法寺詳斷舉選人衆例是艱辛曾因兵火之餘多無敕甲不有特開之路皆為永棄之人其失墜春關冬集者宜令所司取本人狀當及第之時何人知舉同年及第人數幾何如實即更勘本貫得同舉否授官者亦先取狀當授官之時何人判銓與何人同官上任罷任何人交代仍勘歷任處州縣如實則別取有官三人保明施行諸道州府各置病囚院仍委隨處長吏專切經心或有病囚當即差人診療理據所犯輕重決斷如敢固違致本囚負屈身死本官吏並加嚴斷兼每月自夏初至八月末巳來每五日一次差人洗刷枷杻設祿任能立法懲惡苟有違犯須舉憲刑崇遠流外授官監中守職雖官不請於俸祿而職見請於依糧贓罪既彰死刑難貸宜決重杖一頓處死益國利民方為良策越常生事則亂彞章李雲粗讀儒書曾居假宦所進條件既廣徵引仍繁而於職略之間荒唐頗甚且鄉閭之內苦樂不無則可沿古制而檢繩度物宜而均濟豈得請行峻法大撓羣情詳暴斂之品題無稍通之氣味況五兵乍息兆庶小康忽有此陳未測何意便合勘窮踈率申舉科條尚緣言路方開政刑務恤特從寬宥俾自省循國賴賢良雖務搜揚之道官繇請託實開僥幸之門蓋任不當材則民將受弊稍乖掄擇大紊紀綱近聞百執事等或親居內職或貴列廷臣或因宣達君恩或因勾當公事經繇列鎮干擾諸侯指射職員安排親昵或潛申意旨或顯發書題苟徇私情罔循公道爭能峻阻須至強行遂使受命者負勢以臨人得替者銜冤而去職既虧慎舉漸益躁求務要肅清當行釐革自今巳後應內外臣寮不計在朝出使並不得輒發書題及行所屬於諸處亂安排人宜令三司兼諸道節度防禦團練刺史等或更有人不畏新敕猶躡舊蹤者并仰密具姓名奏發薦人貶所在官求薦人配流邊遠州縣常知所在如逐處長吏自徇人情顯違敕命只仰被替本人詣闕上訴勘問不虛長吏罰俸兩月罰薦人比前條更加一等被替人不準是何職掌却令依舊勾當仍從再勾當後三年內除別顯有罪名外不得妄有替移其餘長興二年五月一日巳前所犯不在上訴之限兼敕到後但是州府並於管驛處粉壁具録敕命曉示每令修護永使聞知況國家懸爵待人惟賢是舉稍聞俊乂必令奬升其有端士正人雄文大學言可以經綸王道行可以規矩人倫者但當顯陳表章明具論薦名如得正上不棄材所務絶彼幸人豈可滯諸賢者訪聞諸色官員之中多有此色之事須行釐革以塞弊源應諸色常調選人如有此色文書便須焚毀如是元補正身曾受中興巳來官誥便許以近受文書敘理及諸色蔭補子孫如無虛假不計庶嫡並宜敘録如實無子孫別立人繼嗣巳出補身得者只許續蔭一人凡新關資蔭皆繫恩榮將革弊言為須行憲法自本朝喪亂多士因循貪冒者敘補無常彰敗者未聞嚴斷遂成隳紊莫識規程且一人身名具三代名諱傳於同姓利以私財上則欺罔人君下則貨鬻先祖行之不巳罪莫大焉柳膺顯致訟論合當誅殛偶逢恩赦特減死刑尚念承此弊者年深同此罪者頗衆特矜巳往各許自新別設嚴條免令後犯今日巳前並依前項條理其不合敘使文書仍限一百日焚毀須絶如此後更敢公然將合焚毀文書參選求仕有人糾告及所司點勘彰露所犯之人傳者受者並當極法其告事人如有官序別與超擢任使如是百姓與免戶下差徭兼自此應合得資蔭出身人並須依格令及天成三年十一月二十日禮部起進條件施行如敢故違本司官員并本行人吏別加嚴斷不計去任離司罪無寬恕事從發覺理任澄清不惟正邦國典刑抑亦保縉紳家法有犯無赦斷在的行應見任前資守選官等所有本朝及梁朝出身歷任告身並仰送納委所在磨勘換給公憑只以中興巳來官告及近授文書敘理其諸色蔭補子孫如非虛假不計庶嫡並宜銓録如實無子孫別立人繼嗣巳補得身名者只許敘蔭一人其不合敘使文書限百日內焚毀須絶此後更敢持合焚毀文書參選求仕其所犯之人并傳者並當極法應合得資蔭出身人並須依格令施行有禮於君克勤於國為臣所重自古皆然其或合朝不朝即虧匪懈無病稱病亦屬自欺儻異下冰須資勿藥臥疾非人情所欲歸寧光孝治之朝曹琛所奏文武官請歸寧準式假及實臥病者並許支給本官料錢宜依或有託病不赴朝參故涉曠怠者慢於事君何以食祿如聞糾奏當責尤違伊洛之都皇王所宅乃夷夏歸心之地非農桑取利之田當亂離而曾是荒涼及開泰而競為修葺從來閴寂多巳駢闐永安天邑之居宜廣神州之制宜令御史臺兩街使河南府專切依次第擘畫曉示衆多勿容侵越或有利便亦可臨時詳度奏聞諸道州府推斷刑獄或慮有司因循仍以赦令前事輒有申理紊亂刑罰宜令盡舉中興巳來所降赦書德音釐革恩敕曉示王者應天順人發號施令布絲綸於遠邇示恩信於華夷儻隱而不行則主者有罪須重提舉無致因循宜令御史臺兼三京及諸道州府應受詞狀及推勘詳斷之所須具此令文榜壁各令詳審無致踰違如或公然以赦書德音及恩敕前事輒敢受而為理者應狀案經過之處并當勘責以故違敕命律格科罪兼自此後凡有詳斷刑獄並須依坐律令格式件條及新敕釐革次第施行皇王之業寰海為家民不擾而自安事不紊而易治皆修遠大以固雍熙朕自纂丕圖每勤庶政民有耕耘之樂時無飢饉之災然猶菲食如初宵衣若舊內則仗前後左右外則委侯伯子男共削煩苛同除蠧弊康澄所奏機巧之事遊惰之徒所在不無未能全斷令仰諸道長吏詳此曉示村巡遊惰者勸以歸農機巧者戒其越樣此外或更有不利於民事並可嚴行止絶將使俗無奇技野絶間遊為下有勤力之資在上無蕩心之事廠墨肆人和之際何禁謳謠村間桑隙之時無妨歡樂即須辨認姦惡不得分外騷擾人戶所切者當輕徭薄賦不急斂暴徵民不勸而自勤財不營而自富況諸侯勠力列辟盡忠皆是腹心總如魚水將期混一永致和平無厭之求既虧廉恥不義而富終取悔尤應諸道係省店宅莊園或抵犯刑章納來家業或主持敗闕收致抵當姓名才繫簿書諸利未經收管諸色人等不度勳庸高下不量事分淺深相尚貪叨競謀侵射惟利是視以得為期諸色人稍立微功朝廷必加懋賞通都大邑尚以委人廢宅荒田豈留潤國自有特恩頒賜奚容越分希求遂使畏懼者但處棲遲僭踰者更滋積聚失懲惡勸善之道啓幸災樂禍之門頗汚教風須行止絶王昭誨方念繼絶特授殊恩久別邱園許歸祭奠雖違假限宜示優宏不停見任同官相毆據法當徒大理寺以所犯罪名合該恩敕雖備陳格律而合議矜寬但李照樂鈞等處令佐之資縱屠沽之行既罵且鬬自晝經宵加以抗拒使符執留縣印全乖事體大紊紀綱至於偶在敕前合從赦限豈可遣茲凶輩親我疲民免刑巳是優宏復職實非允當其李照樂鈞並勒停見任餘依所奏周知微官在郎曹職參邦憲慮有亂名之弊舉無破律之規法雖重於一成恩亦存於八議蓋前王之定制固當代以常行今覩敷揚可嘉勤藎投匭上章條流不阻合表進策理例無聞而況七件之中有長有短兩人之內孰否孰臧方當選以公才未可混其言路王鼎陳廷育宜各試以策問兩道定其優劣兼自此應諸色人進策每五道別試策問兩道十道巳下試三道十道巳上約此指揮比校元進策條詞理可否當與等第處分仍令匭院分明榜示此後止絶不得有同表進策所貴人知區別事無泛行庶堅激勸之誠免誤擬倫之道諸道奏薦州縣官各定員數今宜增益以廣搜揚使相先許一年薦三人今許薦五人不帶使相先許薦二人今許薦三人直屬京防禦團練使先許薦一人今許薦二人念應舉之流甚艱難於取事當及第之後尚迢遞於授官小而得簿尉者全稀老不為令録者極衆即不得薦新罷任及過格之人如未曾有官即許奏初官巳有官者當別比擬處分敕州縣官帶侍御史殿中侍御史內供奉監察裏行及省銜者皆非正秩尚出銓曹況曾三度升朝豈可一例守選所宜振發以勵操修應州縣官內有曾在朝行及佐幕罷任後準前資朝官賓從例處分其帶省銜巳上并內供奉裏行及諸巳出選門者或降授令録者罷任日並依出選門例處分不在更赴常調便與除官兼州縣官其間書得十六考者準格敘加朝散階準出選門例處分如不書得十六考雖巳過朝散階不在此例朝臣相次敷陳請搜沈滯簪纓之內甚有美賢山澤之中非無俊彥若令終老乃是遺才鄭雲叟頃自亂離久從隱逸近頒特敕除授拾遺不來赴京自緣抱病非朝廷之不録在遐邇以皆知宜令諸道藩侯專切搜訪如有隱逸之士藝行可稱者當具奏聞必宜量才任使
