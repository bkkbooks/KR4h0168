front:
  text: 全唐文欽定全唐文卷三百十孫逖三
  hash: sha256:aaface2e6d33d5c75ae2f772fa2721358121b51081d2ea1d4774815e6f711ae8
body:
  text: 門下隴右破吐蕃跳蕩功專知節度行軍兵馬使遊擊將軍守右威衛翊府左中郎將賜紫金魚袋王忠嗣出自將門習於軍政智謀足用材藝超倫頃在河隴備彰誠節持兵所向料敵無遺挫其侵軼之師收其要害之地念切斯在議賞攸歸宜復舊官置同正員仍同隴右節度副使依前專知兵馬先有勳封並宜如故敕雲麾將軍右驍衛將軍員外置同正員幽州節度副使上柱國馬元慶名重武臣才優將略有剛勇以制敵能廉幹而成務河湟作鎮戎狄是虞既資攻守之術宜佐軍州之任可充河西節度副使判涼州長史兼赤水軍副使仍都知兵馬使餘如故門下天討有罪未可去兵帝賚良弻自資決勝金紫光祿大夫兵部尚書兼中書令持節經略支度營田大使知節度事集賢院學士修國史上柱國晉國公李林甫高操命代特秀生人公忠為百度之貞文武成萬邦之憲自登上相兼委中權克致時和且聞戎捷踰隴之外已恢帷幄之謀涉河而西更是輔車之勢欲懲猾夏必在夾攻宜以三事之謨遙制兩軍之律可兼充河西節度經略支度營田長行轉運九姓等使節度赤水軍事仍判涼州事餘並如故門下朝散大夫行太原府太谷縣令容城縣開國子盧朔朝請大夫行太原府榆次縣令嶭重輝等咸以班列遷於令長雖恭所職或異其能工則度材人無求備宜從近邑俾佐遠藩朔可行萊州長史重輝可行括州長史散官如故主者施行門下朝散大夫守涼州都督府司馬河西轉運判官柱國楊行審雅推幹術兼有權謀頃在武威克修官政類能而舉宜增郡佐之秩從帥而遷仍統軍城之務可守靈州都督府長史仍充六城水運使散官勳如故門下岐州司馬楊戩修身自久從政亦淹凡所效官皆聞著稱三輔之郡二職為難宜易務於汧岐俾遷榮於河華可華州長史散官如故門下益州蜀縣令韋景遠郫縣令韋履言等各因常調俱在親人雖清白自持而方圓未適使者所奏應非百里之才官政式殊俾佐六條之職景遠可行犍為郡長史履言可行仁壽郡長史門下朝議大夫前使持節房州諸軍事守房州刺史上輕車都尉李踐由朝議大夫行蘄州司馬護軍李惟可等出自士林頻遷官序或方圓異用道有變通或昆友同官法宜回避俾從新命用協舊章踐由可守安州都督府別駕散官如故惟可可鄂州別駕官勳如故門下正議大夫前使持節泗州刺史上柱國闕一字山縣開國子李裕朝議大夫前使持節泗州刺史上柱國開國男魏滉等咸資舊德早踐通班頃坐微瑕因從免職賢哲之後可以勸能邦國之功期於補過裕可行鄧州別駕滉可守德州別駕勳封如故敕朝請大夫南陽郡長史員外置同正員上柱國蕭誠早因才藝久踐榮班頃涉微瑕未為深纍佐郡之職冗員頗多既有命於省官俾稍遷於近服可守宏農郡別駕散官如故敕朝議郎行右領軍長史李廷珍爰以疇人遂居先職不修其任是曠於官歷象之司既非適用海沂之佐俾效所能可行沂州司馬員外置同正員門下行櫟陽縣令李庭芝行能通敏政術優長有士族之令名是王畿之良吏在官既久成效則多宜佐雄藩俾增榮秩可行絳州司馬散官如故敕播州司戶參軍員外置同正員江南西道採訪使判官梁炫才堪應物纍則因人近佐澄清頗彰勤苦以茲補過因可收長宜遷二郡之榮式允連率之薦可郢州司馬員外置同正員門下朝散大夫行司農寺丞攝殿中侍御史專知太倉出納使借緋魚袋嚴正誨頗有吏能纍遷官守況所效職必聞其政出納之吝或未當才邦國之功期於佐理可博州司馬借緋魚袋如故門下朝議大夫守太子中允韋由太常丞長清縣開國男程若水等或業擅鄉族恩延將相咸以人才纍升官敘北京理劇東朝駮議宜膺並命以叶類能由可守太原縣令若水可守太子中允散官如故敕行晉州神山令徐鈞幹以立身果於從政頻更所職頗效其能言念遠人實資良吏既有使臣之薦宜遷宰邑之榮可廣州南海縣令敕益州大都督府倉曹參軍崔綸頃為郡掾兼佐軍麾清幹有聞公勤亦著名當歲調才應時須宜遷宰邑之榮式允使臣之薦可益州郫縣令門下理天下者必宏於在宥厚仁德者莫尚於追遠故廢太子承乾昔在先朝長陷深過因是殛竄至於淪沒雖臣子之罪義則不私而骨肉之親情則無絶況年代浸遠興廢宜闕言念往時巳申公葬將崇後命是錫王章式遵仍舊之封更表易名之諡可贈恆山愍王門下勸賞者國之端既著酬庸之典俾彰為善之制中書令李林甫天實挺生鬱為良佐工部尚書同中書門下三品牛仙客國之名器特表忠臣能協乃心以成大政亟多啓沃聞所未聞導以化源驅之仁壽遂令天下人盡知禁斷獄數十殆至無刑所以比迹於成康高步於文景用人多矣方獲我心況知無不為革庶務損繁取要無往不通古者褎有德賞有功今乃法懸不用德教云洽叶贊之道功則茂焉宜共增封特開井賦林甫可封晉國公仙客可封邠國公主者施行門下正議大夫行尚書兵部侍郎上柱國張均傳籝濟美錫履承榮有構厦之王褱材為刜鐘之利器嗣其先職且歷縉雲之司纘乃舊封更開去社之國可襲封燕國公食邑三千戶主者施行門下朝議大夫守衛尉少卿上柱國清水縣開國伯李岫操清行潔學敏詞優克荷教忠之訓以成資敬之德屬交神有慶布澤無偏賜級之榮既覃於良相推恩之典宜及於名卿俾增錫土之封用表傳籝之業可封長樂縣開國侯食邑一千戶主者施行敕奉議郎行內侍省奚官局令護軍牛仙童修身淑慎從事忠公夙夜惟勤出入無悔不有賞善何以勸能宜進官榮且增章服可內侍省謁者監仍賜緋魚袋門下卿之內子實著於禮經國有舊章亦褎於淑德銀青光祿大夫守工部尚書同中書門下三品持節朔方節度兼支度營田鹽池押諸蕃部落副大使上柱國邠國公知門下省事牛仙客妻琅琊郡夫人王氏道膺圖史言成針誡賢明自遠柔惠兼資作配台臣能修壼教寵其車服已膺命婦之榮錫以山川更表從夫之貴可封邠國夫人主者施行門下古之執大象建皇極者必稽彞訓而受鴻名所以應乎天而順乎人也朕嗣守丕業二十七年受命之初既膺明號尚多祗懼已謂崇高而公卿宗子緇黃耆艾披誠瀝懇詣闕上言僉以為乃聖乃文祖宗大烈恭惟纘服必在欽承願以休名施於薄德抑而不許凡已十年爰逮於今又陳八請上迫奉先之義下稽從衆之言將存至公不可固拒以今日敬依大號曰開元聖文神武皇帝勉從典册良增感懼惟新之號既不私於朕躬非常之澤宜並覃於率土可大赦天下自開元二十七年二月七日昧爽以前大辟以下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之自開元以來諸色逋負疚纍人等咸從洗滌令許自新所司更不須以此為纍其有別敕停官及亡失爵者放歸不齒之類量加收敘左遷官及諸色流人並稍量移近處朕每念黎氓常恐失所救其困乏所貴及時比來諸州或有損處所在賑給例逼春農比及奏報又淹時月既無救於懸絶亦何成於惠養自今以後每年至秋收後即宜遣使分道宣慰仍與採訪使及州縣相知巡檢百姓間或有乏絶不自支濟者應須蠲放及賑給便量事處置訖奏聞天下百姓宜放今年地稅州縣官月料往緣錢有濫惡致損於人或徇私者多得罪亦衆所以改支庸調將便公私聞百姓之間加織造若以此勞弊又非得所自今以後宜各以當道所鑄充其月料古者三載考績黜陟幽明允叶大猷以勸天下比來諸道所通善狀但優仕進之輩與為選調之資責實循名或乖古義自今以後諸道使更不須通善狀每至三年朕當自擇使臣觀察風俗有清白政理著聞者當別擢用宗廟致敬必先於所在神人所依無取於非族深惟至理用切因心其應緣太廟五享宜於宗子及嗣王郡王中揀擇有德望者令攝三公行事其異姓官更不須差攝其草澤間有殊才異行文堪經國為衆所知不求聞達者所在長官以禮徵送皇太子璵男宜並封授官邠工守禮寧王憲各與一子三品官其內外文武三品已上賜爵一級四品以下各加一階長公主及嗣郡王各與一子官郡主縣主各放一子出身二王後及諸方蕃客宜各賜物諸致仕官量與進改依前致仕天下耆老百歲以下版授下州刺史婦人版授郡君賜粟五石綿帛五段九十已上版授上州司馬婦人版授縣君賜粟三石綿帛三段八十已上版授縣令婦人版授縣君賜粟兩石綿帛二段京城父老宜共賜物三千段道僧等賜物一萬匹天下觀寺六齊日宜轉經讀典懲惡勸善以闡文教赦書有所未該所司類例處分率土之內賜酺五日五嶽四瀆名山大川自古帝王忠臣義士並令州縣致祭其有亡命山澤挾藏軍器百日不首復罪如初宣布中外咸使知聞主者施行門下九宮之祀百代莫修豈日給之不暇將明靈之有待朕當扆君臨握圖纘業每聽政中昃疇咨讜言觀書乙夜以求故實勵精為理三紀於茲上荷宗廟延祥克開厥後下賴股肱叶德以致雍熙而麟鳳龜龍近遊郊藪蠻夷戎狄遠輸琛賮乘時來之休運恢皇王之遠圖是以圓丘方澤之儀升中告類之禮靡典不舉靡神不懷恭惟九宮明祀尚闕載深兢惕用建靈壇爰以元辰親執奠獻叶青陽發生之慶祈黔庶吉祐之福今至誠式展大禮云備瑞景和風神心如答則無疆之祉豈獨在豫非常之澤宜覃率土可大赦天下自天寶三載十二月二十五日昧爽已前大辟罪已下罪無輕重咸赦除之其十惡死罪造偽頭首謀殺攻劫及官典犯贓不在免限朕惟善政實在養人作法務從於寬簡任事必量於齒力比者成童之歲即挂輕徭既冠之年便當正役憫其勞苦用軫豫懷自今以後天下百姓以十八已上為中男二十三已上成丁又任土作貢先標程式或非所有不免貿遷事既非宜理難經久並應徵課稅及支遣諸色物或期程之間遲速非便並委所司與朝集使商量取便穩處置奏聞每歲庸調八月徵收農功未畢恐難濟辦自今以後延至九月三十日為限諸軍行人遠為邊捍修短之分雖有定期從役而終良深軫念其有陳亡及在軍亡歿骸骨未還鄉貫者宜令節度使給官櫬遞歸又防邊禦寇實為艱勞貧戶單丁固宜存養更令差遣去住難堪自今以後應差行人家無兼丁不在取限自古聖人皆以孝理五常之本百行莫先移於國而為忠事於長而為順永言要道實在宏人自今以後令天下家藏孝經一本精勤誦習鄉學之中倍增教授郡縣官長明申勸課百姓間有孝勤過人鄉閭欽伏者所由長官具以名薦其有父兄見在別籍異居虧敗名教莫斯為甚特宜禁絶勿使更然並親歿之後亦不得令有分析郡縣切勒令在惟行自今以後如有不友不恭傷財破産者宜配磧西用清風教朕惟熙庶績博訪逸人豈唯振拔滯淹以期於大用亦欲褎崇高尚將敦於薄俗虛佇之懷兼在於此其有高蹈不仕遁迹邱園遠近如聞未經薦舉者委所在長官以禮徵送又崇德追遠式閭封墓用旌前烈以叶大猷自古聖帝明王名臣烈士陵墓有頽毀者宜令所管量事修葺仍明立標記禁止樵採天下耆老百歲已上賜帛五段粟三石八十以上帛三段粟二石仍於郡縣長官存問給付亞獻太子諱宜賜物二千匹終獻慶王琮一千匹正衣夾侍各五百匹親王各三百匹新封建郡王及國公各一百匹賢妃三百匹長公主各三百匹公主各二百匹嗣郡王各一百匹中書門下三品竭心翊戴宏益實多各與一子官如先已授官量與一人轉內外文武官三品已上賜爵一級四品已下各加一階一品賜物七十匹三品已上六十匹五品已上四十匹六品已下二十段諸節度使各賜物一百匹三京留守及二王後各八十匹採訪使各六十匹諸蕃客共賜二千匹其唐隆字避諱元年功臣締構之初竭其忠款録功念舊情所不忘普恩之外更賜一階其身歿者各贈一官皇親五等已上及九廟子孫諸親三等已上未有出身者並放出身其前資者選日稍優與處分見任者更賜勳兩轉應天下賜酺三日赦書有所未該者所司類例聞奏宣布中外咸使知聞主者施行門下大寶曰位實在於丕承萬邦以貞由建於明兩朕嗣守鴻業祗嚴永圖恭惟匕鬯之主豈捨人神之望開府儀同三司兼單于大都護河北河東道行軍元帥朔方軍節度大使兼關內支度營田鹽池押諸蕃部落等大使上柱國忠王璵天假聰明生知仁孝君親一致孝悌三成溫文之德合於古訓敬愛之風聞於天下嘗亦視其所以察其所安考言有章詢事皆中知子者父允叶於元良以長則順且符於舊典宜膺擇嗣之舉俾受升儲之命可立為皇太子仍取來月內擇日册命所司準式主者施行門下肅雍之範以成女德湯沐之賜爰著國章第十一女等生於公宮訓以師氏溫惠之性頗有天姿圖史之學仍聞日就初笄甫及外館將歸宜因待禮之期式備疏封之典可依前件仍各實封一千戶主者施行門下自昔帝女必建封邑典章不易等數猶存第十七女幼而間和長實徽懿引圖史以自鑒用肅雍而成德將擇近日言遵下嫁宜承湯沐之賜以備車服之庸可封永寧公主實食封一千戶主者施行門下詩美肅雍遠著於風雅禮有封建久存於簡策第十九女尚柔成德克順由衷稟於天然自有間和之性訓以師氏備詳圖史之學宜開湯沐俾叶典章可封平昌公主食邑一千戶主者施行門下典謨既作雖曰不刊文字或訛豈必相襲朕聽政之暇乙夜觀書匪徒閲於微言實欲暢於精理每讀尚書洪範至無偏無頗遵王之義三復茲句常有所疑據其下文並皆協韻唯頗一字實則不倫又周易泰卦中無平不陂釋文云陂字亦有頗音陂之與頗訓詁無別為陂則文亦會意為頗則聲不成文應由煨燼之餘編簡墜缺傳受之際差舛相沿原始要終須有刊革朕雖先覺兼訪諸儒僉以為然終非獨斷其尚書洪範無偏無頗字宜改為陂庶使先儒之義去彼膏盲後學之徒正其魚魯仍宣示國學主者施行敕六氣不所以成歲百神咸秩必也正名況風伯雨師濟時育物蕃滋動植溥洽生靈厥有茂功當崇於昭報謂之小祀頗紊於彞倫去載諸星以為中祀永言比義固合同升自今以後其風伯雨師並宜升入中祀仍令諸郡各置一壇因春秋祭祀之時同申享祀用刊前典之謬以致蒼生之福敕銓綜之司名器所屬苟虧審慎必有姦濫及今按詰其數頗多馬有害㣥罪雖在於胥吏龜之毀櫝過亦由於主守其御史中丞楊慎矜所奏前後知銓侍郎及南曹郎官等忝效職司不能舉察合投嚴譴用肅慢官猶以久踐朝班夙昭人譽過而能改必在增修特宜寬宥俾自懲警敕官邪則敗國賞僭則利淫自昔至言政之明誡朕祗膺大寶豈忘兢業臨馭已來且踰二紀期大道之成化冀天下之為公凡百卿士豈不協力而選舉之司委任尤重若名器失序則勸沮何施近者流外銓曹頗多渝濫有塵清議實紊彞章胥吏之徒雖則微賤仕進之路終為厥初必澄源流無雜涇渭不慎於細其傷則多小既不可不懲大亦不可不誡其吏部兵部禮部掌選知舉等官各宜飭勵當盡至公必須杜邪枉之門絶請托之路何止一變仍圖永清且銓綜九流必仗賢俊取諸賞鑒立斷可知何至淹時至稽團奏開聞之後餘甲未終既滯官曹長茲罪過舊選未畢新格復修此乃因循實為煩弊自今以後吏部選人三月三十日已前團奏事畢兵部二月內畢其流外銓及武學專委郎官恐不詳悉共為取捨適表公憑每至留放之時皆就尚書侍郎對定既上下檢察庶在得人而覆車尚在殷鑒非遠法不可廢宜識朕懷敕設官分職將以奉法禁非實在上下叶心中外一德共熙庶績用絶姦源如聞百司頗皆寬縱遂令胥吏得以挾私近者兵部令史因令推鞫或在選曹增減文狀雖小人之過則惟其常永言在官亦為疏略朕今申之寬宥許以自新庶觀將來冀能效節至如兵吏兩司是掌衡鏡進趨者非一揆姦巧者亦百端推而言之或所未免無謂幽昧朕皆察焉各宜盡心靖恭爾位敕遏寇防邊在於有備興師訓卒用戒不虞隴右諸軍地當戎虜尤資振旅以壯邊威宜令隴右節度經略支度營田大使開府儀同三司兼京兆牧上柱國榮王琬自往隴右巡按處置庶宏廟略因達誠懷宜於關內及河東納資飛騎並諸人中間召取健兒三五萬人赴隴右防捍立秋末無事放還仍於當道軍將內銓擇一人與所由簡召應給糧賜所司速作條例處分敕歲之豐儉故係於常數天之感應實在於精誠頃者按以陰陽求之推步至於今歲不合有年朕乃齊心妙聞懇祈元德靈徵不遠丕應用彰果獲西成頗為善熟蓋至道儲祉惠於蒸人亦㣥神叶贊錫以昭假宜令光祿卿嗣鄭王希言祭東嶽太子詹事嗣許王瓘祭北嶽太常卿韋縚祭西嶽衛尉卿嗣吳王祗祭南嶽宗正卿濮陽郡王徹祭北嶽所司即擇日録奏其四瀆及名山大川或遠近不同各委所由郡長官便擇吉日致祭務崇嚴潔以稱朕懷敕朕為人上未嘗自逸每勤於政思致豐年而去冬以來雨雪微少竊恐春事有害農功是用齋心躬自申禱神歆允答甘澤遂流豈朕之微誠敢當丕應蓋天之鑒佑惠及生人詩不云乎無德不報昭賽之義豈可闕如其關內名山大川及有靈祠宜令所由長官擇日致賽務令豐厚各盡誠潔以副朕懷敕道釋二門元通衆妙濟時育物皆有明徵是所依憑豈忘尊奉其天下寺觀並令修功德用齊三聖之教以答百靈之心宜副虛懷各陳至敬敕道釋二教必在護持須置威儀令自整肅徒衆既廣統攝尤難更相是非却成煩弊自今已後京都檢校僧道威儀事宜並停或恐先有猜嫌因此妄相糾訴所由亦不須為理敕天地之德莫大於生成陽和之時先禁於卵殰比來流俗間每至寒食日皆以雞鵝鴨子更相餉遺既行時令固不合然自今以後永宜禁止朕每思儉朴深惡浮華諸色雕鏤等已令變革其公私宴會比者多假果及樓園之類虛為損耗競務矜誇亦宜禁絶有違者準今月八日敕
