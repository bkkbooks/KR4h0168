front:
  text: 全唐文欽定全唐文卷三百八十八獨孤及五
  hash: sha256:809d4055321e4ca9c17d33d94b86cf10db44b611ee6a6181cdd03d3209a66b11
body:
  text: 五言詩之源生於國風廣於離騷著於李蘇盛於曹劉其所自遠矣當漢魏之間雖以朴散為器作者猶質有餘而文不足以今揆昔則有朱絃疏越太羹遺味之歎歷千餘歲至沈詹事宋考功始裁成六律彰施五色使言之而中倫歌之而成聲緣情綺靡之功至是乃備雖去雅寖遠其麗有過於古者亦猶路鼗出於土鼓篆籀生於鳥迹也沈宋既歿而崔司勳皓王右丞維復崛起於開元天寶之間得其門而入者當代不過數人補闕其人也補闕諱冉字茂政元晏先生之後銀青光祿大夫澤州刺史諱敬德之曾孫朝散大夫饒州樂平縣令諱價之孫中散大夫潭州刺史諱顗之子十歲能屬文十五歲而老成右丞相曲江張公深所歎異謂清穎秀拔有江徐之風伯父祕書少監彬尤器之自是令聞休暢舉進士第一歷無錫縣尉左金吾兵曹今相國太原公之推轂河南也辟為書記大歷二年遷左拾遺轉右補闕奉使江表因省家至丹陽朝廷虛三署郎位以待君之復不幸短命年方五十四而歿嗚呼惜哉君忠恕廉恪居官可紀孝友恭讓自內形外言必依仁交不苟合得喪喜慍罕見於容故覩君述作知君所尚以景命不永斯文未臻其極也蓋存於遺札者凡三百有五十篇其詩大略以古之比興就今之聲律涵詠風騷憲章顏謝至若麗曲感動逸思奔發則天機獨得有非師資所獎每舞雩詠歸或金谷文會曲水修褉南浦愴別新聲秀句輒加於常時一等才鍾於情故也君母弟殿中侍御史曾字孝常與君同稟學詩之訓君有誨誘之助焉既而麗藻競爽盛名相亞同乎聲者方之景陽孟陽孝常既除喪懼遺製之墜於地也以及與茂政前後為諫官故銜痛編次以論撰見託遂著其始終以冠於篇足志者言足言者文情動於中而形於聲文之微也粲於歌頌暢於事業文之著也君子修其詞立其誠生以比興宏道歿以述作垂裕此之謂不朽侍御諱立南蘭陵人也御史中丞汝州刺史府君之仲子奕世純嘏及公始大襁褓克岐十五而立神靜氣和才與道并孝悌忠信以為已任行有餘力故幼而學文嘗謂揚馬言大而迂屈宋詞侈而怨沿其流者或文質交喪雅鄭相奪盍為之中道乎故夫子之文章深其致婉其旨直而不野麗而不艷天寶元年詔徵賢良方正以備多士公時年十七射策甲科盛名翕然震喧京邑論者知遠大之迹自此始也既而荏苒宦途遭遇世故歷佐戎幕周旋江海攸徂之邦必聞其政嘉謨成績藏在諸侯之策既言中彞倫亦動與吉會由是自廷尉評拜監察御史轉殿中侍御史觀其逐逐利往冥冥翰飛方將乘驚風以騁騖視青雲如咫尺天道何善而無報與其才而不與其壽成其器而不成其志命矣夫斯才也而有斯年也公之元兄尚書庫部員外郎兼侍御史曰某與公俱以文學政事為臺閣領袖丹穴之雙鳳才舉棠棣之一花先落天倫之慟可勝既邪以公瑰姿瑋度利器淑德與東流皆逝今則已矣可以藏遺芳以示後嗣者其惟夙昔麗藻平生翰墨乎於是茹痛開緘拔血散帙緝其遺札得詩賦贊論表啓序頌銘誄志記凡若干篇編為五卷以為集録庶幾弔賈生者省鵩集之日問相如者知禪草猶存云爾言同者無約束而信心同者未謔浪而樂聲應情至則不俟外獎況遺纍之言造適之笑與杯中物池上月風中絃五者合以貺余歡其可勝既乎於時衆君子棲公翰林如翔鳥之得茂樹也至是登於仙舟泳彼新流掇芳玩奇以永今日日不足故用夜漏以繼之羽觴未及數覆銀河橫而金波上樂作神王百憂如失而絃繁管清悲歡交乎其間則高歌爭進或道舊以泣酒酣意真樂極感至故也當斯時視身後之竹書鼎銘猶稊米芻狗也況細故乎二三子醉猶能賦且酌且咏余屬而和之多故以來干祿者進必欲速大抵悉棄夷道而趨捷徑顏子獨曳儒服非其知已之命不苟合非稽古力所致不妄動今其來斯也不以賄不以名不以遊眺挾策讀書藝成而去君子哉若人邪將以特舟片帆泝洄於大江秋濤之中涉彭蠡歷西塞浮於潛踰於沔吾子安於忠信亦當安於風波況滔滔江漢茫茫禹迹乎於此乘渚反顧齊吳榜以擊汰其聲可想司馬子長浮沅湘窺九疑亦此路也足以覽古乘興窮極視聽行將搜異不暇懼於何有凡今賦詩以抒居者之思且以用勗吾子四方之志云爾今之為邑者祗事趣辦而已矣之子獨以公廉不苛聞於朝廷夫公則能力廉則不苟不苛則無害六合之人飽是三德故家肥人讓而名隨之其黜陟考績之日首冠賢能之選也宜哉夫上方勤恤人隱渴良吏如不及之子令聞將與位偕行將見函洛春物迎馬首於千里之外勿謂蕪城衰草足愴遠別二三子何以持贈其歌詩乎初公由尚書郎出佐蜀郡無何熊軾暢轂專席而坐休績布於巴漢天子器之時人謂公逸足駸駸視公卿猶步武耳既而剖符驅傳出入吳楚專五城佐三府府罷身退復藏於密出處之道歷二十載而未光知公者不堪其歎公未始屑於胸臆貞直廉讓之德內充故也夫貞則專直則固廉則不競讓則後時故其寵不及而名益茂也宜哉今上方勵精熙載用官人安民為急百工以釐不至者知罪故公朝賁然伏軾入闕時然後行動而不格在是役也銷憂者莫若酒酒中樂酣可以道千里之意者莫若文㣥賢詩之以送遠蓋古人雜佩以贈之之流也之子領祕書著作於是邦參我軍事事必肅謀必忠居處必恭三年矣而身無擇行職無粃政政之和非吾子曷賴今茲將東諸侯之命朝於京師稱壽之儀舉專對之才達是行也將為度材者所得豈復顧池中乎正月元日和氣資始大行設九賓於蓬萊前殿皇帝輦出百辟奉賀公將以此時捧章奏於雲陛之下得觀虞舜之九成簫韶塗山之萬國玉帛況惟仲氏典司宸翰棠棣之華交映於朝斯可謂之榮矣懋修乃職尚慎行邁勉從欒伯之戒將復臧孫之烈至如遵大路之歎不足為吾子設矣吾嘗同寮且士龍之執也江樓醉別何用貺遠以其章句當佩玉瓊琚乎初貞元二年進賢星明於是夫子與廣陵馬曾俱以元纁辟焉一命而俯受服赤墀之下子甘節不奪歸耕南陽議者稱馬之利用陋子之獨善及以為不然君子之道舒之則雲蒸雨降以救大旱卷之則天倪道機不盈一握姑務忠信以安聖時則歌國風於犬畝是亦為政有民人焉有社稷焉何必薄遊然後稱德至是夏六月以菰菜之興扁舟而東是行也與夫乘桴揚舲者不同日矣津樓直望江漢在目少別非志士所悲深衷豈短章能見桃源秋至僕當搴其仙實俟子於武陵之南溪曩子之入秦也上方覽子虛之賦喜相如同時由是朝詣公車夕揮宸翰一旦襆被金馬蓬纍而行出入燕宋與白雲為伍然則適來時行也適去時止也彼碌碌者徒見三河之遊倦百鎰之金盡乃議子於得失虧成之間曾不知才全者無虧成志全者無得失進與退於道德乎何有是日也出車桐門將駕於曹仙藥滿囊道書盈篋異乎莊舄之辭越仲尼之去魯矣送子何所平臺之隅短歌薄酒擊築相和大丈夫各乘風波未始有極哀樂且不足纍上士之心況小別乎請偕賦詩以見交態海水不揚波久矣故昆蟲草木得遂本性夔益巢許各安其節天鍾靜於子而博之以文大壑無底虛舟任觸世皆尚白獨守太元顧流俗而不言退將修乎初服吾於是見全人之操矣乃知白雲上下蓋無心自出黃鶴飛去當有時而來他年孤舟冀再會於五湖之口春葉尉吳興姚曠至自洛陽中山劉冉至自長安俱以文博我相與交歡於睢渙之涘始則開青天豁其雲霧亦既窺武庫見其矛戟凡旬有五日而姚適吳劉濟河余歸梁各有四方之事將為千里之別夏四月抗手於盧門議別故也夫別與會悲樂存乎其中故賢智所不能遣然達者遊世隨變所適靜而與陰同德動而與陽同波異乎金柅之有繫匏瓜之莫食子其行矣別何為者北斗在已南風始來藂臺草長京口水濶何以送遠唯當賦伐木以為仁人之贈彼馳騖乎士林者鮮不爭九流之勝負徇三川之聲利而張侯獨以善閉關乃知純白內充天機外朗則塵垢粳粃所不能入癸巳歲六月始以出處之道問仕於余豫灑然曰今四表文明八紘屢頓此志士所當登秀造而取青紫不奮不躍如休明何由是罷琴高臺投竿舊浦單車匹馬是日西上君子以為知幾吾見垂天之雲不復顧北溟矣盍使居者歌吾子乎初史侯至自帝邱僕方釃酒於蔣氏之館揖讓堂下由東階升於是一酌而賓禮舉再酌而交態接三酌而威儀幡幡深衷畢見醉裏投分客中忘形吾固知握手難常嘉會可惜其聚也言不浹日而意氣感其散也興未及盡而離憂至則臨觴徙倚孰能不以之黯然窮陰欲臘漳滏冰厚班馬連嘶歸雲無色非詩何以見離㣥者之志世或謂邦有道穀或謂全於德者不以徇名降志彼於致命猶數數然孰與李侯兩忘而吻合之張其天機與道出處道長則陳力筮仕績成而退藏於密戰勝江海之上然後乘歸流而返舊京乃知淩雲麗天則切玉利器於夫子為鄧林之一葉耳而精微純粹豈中士所能得其門哉然當今堯親九族契敷五教材之美者工將度之子雖忘機機未忘子庸詎知泥蟠沙臥不為雲霄之鑿枘乎但蘭舟桂楫倏忽鳥逝朔風秋草奈離憂何緣情者莫近於詩二三子盍咏歌以為贈每歲孟春冢宰懸象魏之法以官民材天下髦士於是乎雲屯詞鋒角立智刃今子投袂而起將鼓行乎其間其於湛盧發硎批郤如玉繁弱在手捨拔則獲者吾惟子之望當知君子廣其業達其道則榮譽貴仕可得而拾孰云嫋嫋秋風悠悠遠道足為志士之感哉雜佩可以申永懷尊酒可以慰別緒其贈言之分顧謂坐者志之蒼龍居元枵之歲與爾吹塤篪於長安靈臺之下當時爾方青襟余適紈袴各志小學相期大來其後爾以經術薦遂觀光於上國余牢落兩河為病所繫星分雨散十有二載中間暫攜手一笑者及今而三昨日遊寓今成疇昔此會綿邈空成夢想豈不欲申橘柚之性咏和樂之什樂未終也別又繼之然君子修誠則物應克已則名彰爾能圭璋特達甲胄忠信致逸足於千里吾有望焉方務遠圖何嗟少別到秦地有問吾事者為報江湖間心自唐蒙司馬相如開牂牁鑿零山於是西南夷君長始受漢印及國家綏以大道振以長策滇越卭僰世亦皆為外臣蠢茲六蠻獨抗王旅天子方將開外戶掃絶漠故授相國衛公鉞俾出作方叔入為吉甫且募如貔之介士將翦長蛇之速飛由是分命我廷尉評事韋公實佐其任公以止戈諭之采薇歌之使政有典則人知義所故燕齊少年韓魏徑卒召募如景附赴敵如猋馳自春至於是月受命羽檄之下凡萬八千計然後頒賜算級將朝於京師夫勤王集事之謂忠周爰咨詢之謂智復命而不夭夭心於素之謂信姑樹三德載馳六轡行當以柱下之書讚幕中之畫是役也冥冥羽翰非瞻望所及矣請偕賦以知魏風志非言不形言非文不彰是三者相為用亦猶涉川者假舟楫而後濟自典謨缺雅頌寢世道陵夷文亦下衰故作者往往先文字後比興其風流蕩而不返乃至有飾其詞而遺其意者則潤色愈工其實愈喪及其大壞也儷偶章句使枝對葉比以八病四聲為梏拲拳拳守之如奉法令聞皋繇史克之作則呷然笑之天下雷同風驅雲趨文不足言言不足志亦猶木蘭為舟翠羽為楫玩之於陸而無涉川之用痛乎流俗之惑人也舊矣帝唐以文德敷祐於下民被王風俗稍丕變至則天太后時陳子昂以雅易鄭學者浸而嚮方天寶中公與蘭陵蕭茂挺長樂賈幼幾勃焉復起振中古之風以宏文德公之作本乎王道大抵以五經為泉源抒情性以託諷然後有歌咏美教化獻針諫然後有賦頌懸權衡以辨天下公是非然後有論議至若記序編録銘鼎刻石之作必採其行事以正褒貶非夫子之旨不書故風雅之指歸刑政之本根忠孝之大倫皆見於詞於時文士馳騖飇扇波委二十年間學者稍厭折楊皇荂而窺咸池之音者什五六識者謂之文章中興公實啓之公名華字遐叔趙郡人安邑令府君第三子質直而和純固而明曠達而有節中行而能斷孝敬忠廉根於天機執親之喪哀達神明其任職釐績外若坦蕩內持正性諫不犯顏見義乃勇舉善惟懼不及務去惡如復仇與朋友交然諾著於天下其偉詞麗藻則和氣之餘也學博而識有餘才多而體愈迅每述作筆鋒風生聽者耳駭開元二十三年舉進士天寶二年舉博學宏詞皆為科首由南和尉擢祕書省校書郎八年歷伊闕尉當斯時唐興百三十餘年天下一家朝廷尚丈夫羿工乎中微拙於使人無已譽公才與時并故不近名而名彰時輩歸望如鱗羽之於虬龍也十一年拜監察御史會權臣竊柄貪猾當路公入司方書出按二千石持斧所向郡邑為肅為姦黨所嫉不容於御史府除右補闕祿山之難方命圯族者蔽天聰明勇者不得奮明者不得謀公危行正詞獻納以誠纍陳誅凶渠完封疆之策閽犬迎吠故書留不下時繼太夫人在鄴初潼關敗書聞或勸公走蜀詣行在所公曰奈方寸何不若間行問安否然後輦母安輿而逃謀未果為盜所獲二京既復坐謫杭州司功參軍太夫人棄敬養公自傷悼以事君故踐危亂而不能安親既受汙非其疾而貽親之憂及隨牒願終養而遭天不弔由是銜罔極之痛者三故雖除喪抱終身之戚焉謂志已虧息陳力之願焉因屏居江南省躬遺名誓心自絶無何詔復授左補闕又加尚書司封員外郎璽書連徵公卿已下傾首延佇至之日將以司言處公公曰焉有隳節奪志者可以荷君之寵乎遂移疾請告故相國梁公峴之領選江南也表為從事加檢校吏部郎中明年遇風痺徙家於楚州疾痼貧甚課子弟力農圃贍衣食雅好修無生法以冥寂思慮視爵祿形骸與遺土同惟吳楚之士君子撰家傳修墓版及都邑頌賢守宰功德者靡不齎貨幣越江湖求文於公得請者以為子孫榮公遇暇日時復綴録以應其求過是而往不復著書少時所著者多散落人間自志學至校書郎已前八卷并常山公主志文竇將軍神道碑崔河南生祠碑禮部李侍郎碑安定三孝論哀舊遊詩韓幼深避亂詩序祭王員外端沈起居興宗裴員外騰文別元旦詩并楊騎曹集序王常山碑並因亂失之名存而篇亡自監察御史已後所作頌賦詩歌碑表敘論志記讚祭凡一百四十三篇公長子羔字宗緒編為二十卷號中集其中陳王業則無疆頌主文而譎諫則言醫含元殿賦敦禮教則哀節婦賦靈武二孝讚表賢達盛德則崔賓客集序元魯山碣房太尉德政碑平原張公頌梁國李公傳德先生誄權著作墓志李太夫人傳盧夫人頌一死一生之間抒其交情則祭蕭功曹劉評事張評事文吟咏情性達於事變則咏古詩思舊則三賢論辨卿大夫之族姓則盧監察神道碑自敘則別相里造范倫序詮佛教心要而合其異同則南泉真禪師左溪朗禪師碑其餘雖波瀾萬變而未始不根於典謨故覽公之文知公之質不俟覿容貌聽詞氣假令束帶立於史臣之位足以潤色王度天而病之時不幸歟公之病也嘗以斯文見託詒某書曰桓談論揚雄當有身後名華亦謂足下一桓談也及於公才宜播其述作之美明於後人故拜命之辱而不讓今乃著其文德為之冠於篇首焉自監察御史已下文苑英華作自監察御史已後迄至於今所著述者公長男羔字宗緒編而集之斷自監察御史已前十卷號為前集其後二十卷頌賦詩碑表敘論志記讚祭文凡一百四十四篇為中集其中陳王業則無疆頌議世道則卜原論質文論主文而譎諫則言醫含元殿賦敦禮教則哀節婦賦靈武二孝讚與外孫女二孩書表賢達盛德則元魯山碣房太尉頌德銘崔賓客集序平原張公頌梁國李公傳德先生誄權著作墓表李夫人傳盧夫人頌一死一生之間抒其交情則祭蕭功曹劉評事張博士文吟咏情性達於事變則咏古詩辨卿大夫族姓則盧監察神道碑思舊則三賢論自敘則別相里造范倫序詮佛教心要而會其異同則南泉真禪師左溪朗禪師碑其餘雖比興萬變而未始不根於道德故覽公之文知公之質不俟覿容貌聽詞氣而後覩其行若使束帶立於史臣之位其備獻替足以潤色王度正一代之訓典天而病之國不幸也然遐叔身甚病而心甚壯文益贍而才不竭則前路逸氣詎可度矣他日繼於此而作者當為後集及常遊公之藩也久故録其述作之所以然著於篇孟子以鄉舉秀才射策甲科二十年矣同時中楊葉者今或蔚為六官亞卿或彤襜虎符秩二千石而孟子猶羸馬青袍客江潭間遇與不遇何其寥敻也然君子不患貧患業不修不患位下患道不行孟子言忠信行篤敬好學工文令名藹然今茲入關有司之喜也諸公展相遇之禮其肯不以推之挽之為巳任見三月四月之交灃灞之間王睢飛鳴草木暢茂是吾子彈冠之時也二三子不可以不賦初弱用之拜也吏者隱者相見皆賀曰朝廷搜賢不遺邱壑中人則搢紳之賢者日至矣未有賢人至而太平不興者而弱用獨以衰疾行邁為憂諫議大夫昌黎韓幼深貽弱用書曰君子之命知已之遇其可易乎由是不敢言病即日戒路夫君子之道進不苟容退不懷安不以欲咈人不以私棄公時止則止時行則行弱用之心也仁矣哉與夫捨龜觀頤自盛以士冖柘者異矣方今主上用文思柔遠魏邴謀謨惟賢是渴想見厖眉大冠俯僂於朝廷與公卿大夫言三代故事出入金馬石渠之署國人孰不宜之今之史臣樂安蔣鎮博陵崔儒頃與弱用同以德進倘與夫二君子道舊必話鄙夫疲於郡齋之狀勿使不知我者謂我不思若夫抒今日秦吳之別斗酒之外詩而已矣員外曳朱組擁使節將鄂州牧御史中丞吳公之命方舟如吳祗役蕆事肆覲伯姊展歡申悲浹辰而還飲水恪慎夙夜匪懈孝悌友恭形於容止追攀者觀禮於公見公之仁繄公之先德與位偕由大王父已下一門三太子保傅二御史大夫一宰相四二千石家之範可刑於國今則兄掌冬官弟列郎署閨門怡怡花萼相鮮欲辭必復之榮朝廷其肯捨諸永言夙昔將繼舊好惠而顧我其敢不以久要為答雖嘉肴充圓方旨酒盈樽罍祗攪別緒不足慰噡望不及之歎故可以於此乎言詩子以才茂經明鄉黨稱仁起褐衣四五年超參夏口軍事同時諸生有未登賢能之書者公以惠文冠出入殿中蘭臺其以文章干祿何啻如拾芥吳中賢士大夫由是益勸今復戒鞅而西言赴所從昔陸士衡入洛張華如舊相識之子之文章粲然有昔賢風采彼茂先之徒其肯捨吾子乎將子獻詩著論特備風雅以宣上德抒下情為已任勿獨誇吳趨閶門之廢興辨蓴羹羊酪之優劣而已急賢之日何患人不已知凡今贈別皆吳士也或問上人曰文者所以足言也言説將忘文字性離示入此徒無乃纍一相乎答曰稱示入者過矣以習氣未之泯也率性修道庶幾因言遣言故欲罷之而未能耳時人謂上人為知言知道歲次乙卯自京持鉢而來給事中天水趙公涓賦詩抒別卿大夫已下屬而和者二十七章既而飛錫濟江休於晉陵又東至於姑蘇將涉震澤踰會稽上天台至國清上方而止趣靜境者不料遠近登漸門者不計歲月則上人還斯詎可知也上人之文章可得而聞也諸公將議遠別得不以斯文為贈乎初公讀梁竦傳始慨然薄遊恥揭其公器退而耕於楚縣知言者以為子真吳都禦寇圃田卜商西河與公道雖不同其操一也羿工於中微拙於使人無已譽固知大名之下天爵難讓十二載冬十月果以公才徵龍泉自惜暫隱牛斗之次美玉無脛竟為秦人所得且晉以梁山召伯宗漢以明堂延申公尊德問禮於斯為盛況朝廷頓八紘久矣頃來儒服立於魯人之門者公祗命台鉉將濯纓而孤矣當貞女不字十年反常及大翼怒飛知一日幾萬問離㣥何贈請賓賦車乘主人賦南有嘉魚以代零雨之什去年春公自京兆北部尉謫掾陳留議者或歎公大才未光直道而黜君子則曰否患德不立不患遇坎始用舉至是雖速謗何傷有才與時不遠而復其明年春肆大眚冢宰量殿最厚薄以令聞遷公於華陰然後知朝廷之祿用也華陰者左崤函右雍州潼津鐘池綴於分野長河太華為之襟帶甸近所以難其選地雄所以寵其秩公將以利器刃物清機臨人吾見岑公孝不得專美於南陽大火初落昊天欲高遠山雲開歸路秋色請各抒別操使行者得歌而咏之
