front:
  text: 全唐文欽定全唐文卷一百九十六楊炯七
  hash: sha256:80b1a8e556fc34825089654a1bd42900e11603dbcb238cdd10532d1210202805
body:
  text: 公諱沖寂字廣德隴西狄道人也左衛大將軍西平王之孫荊州大都督漢陽王之子今上之族兄也原夫帝堯之緒運期授於天漢顓頊之胄大命集於皇家光耀則若木十枝波瀾則長河九派或中軍桉部金鼓所以節其聲或刺史班條冕旒所以彰其德信可謂玉林多寶天族多奇以御家邦以藩王室者也公山河誕慶辰昴發祥金多木少孔文舉之天骨玉潔氷清華子魚之神彩南陽季恭偉懸識宰臣沛國趙元儒竊知公望編漢皇之兄弟列周室之邢茅天下稱其八才吾家號為千里初任尚舍直長稍遷城門郎仍奉敕於宏文館讀書掌舍諸宮城門列校詔詣東觀有黃香之博聞賜其制書有班遊之廣學尋授駕部員外郎轉金部郎中又敕公為戎州道支度軍糧使天府充牣軍儲委積振南宮之紱冕譽表三臺歷西蜀之江山榮高駟馬遷太府鴻臚二少卿丁艱去職楊播之登太府初聞纍遷之命鄭默之拜鴻臚遽見終喪之禮卜子夏既祥五日彈不成聲孟獻子加人一等縣而不樂服闋歷青德齊徐四州刺史東臨巨海西至長原或全齊歷下之軍或大禹徐方之地任隆荊部陶侃八州寄重潯陽桓伊十部遷宣州刺史吳王舊邑楚國先封江回鵲尾之城山枕梅根之冶蜀郡無此計吏則惟薦張堪潁川尤多璽書則但稱黃霸巡察使以尤異聞遷陝州刺史觀其井邑虢仲上陽之故墟度其川原周公分陝之遺迹唇齒通其列國咽喉壯其天險善人為政無待於百年童子行謠先符於兩日於斯時也天以順動帝以會昌修封禪於岱嶽作明堂於汶上望山川而遍㣥神執玉帛而朝萬國制公檢校司理常伯文昌之省遙接太階建禮之門旁連復道萬幾匡贊八座謀猷既陪軒帝之巡乃覿漢家之事屬阿孫南走憑斗骨而為城居衛滿東亡界朝鮮而為役屬乘輿乃誅後至討不庭申命六事之人以問三韓之罪制曰師出遼左卿可為北道主人檢校營州都督石門山險銅鼎河流天文則營室辨方地象則神臺鎮野供其行李鄭國有東道之名為我主人常山當北州之寄遼東平以功遷蒲州刺史堯都蒲坂舜耕歷山昭襄王始作河橋穆天子至於雷首汝南朕之心腹遂拜韓崇河東吾之股肱時徵季布遷少府監忠信為主楊阜齊衡清白在官常林比德又除蒲州刺史諸童之逢迎郭伋再牧並州百姓之願得耿純復臨東郡孝敬皇帝國之儲嗣乾之長男四極奏於重光二年賓於上帝崇其諡號用黃屋於羽儀卜其園塋象元宮之制度山陵之建也以公檢校將作大匠遊衣漢寢之外抱劍橋山之下百工畢力陳琳於是乎躬親諸吏懷恩魏霸於是乎無謫遷銀青光祿大夫行少府監若夫協時月乘天正秦人往事遊別館而祈年漢宮舊儀下明庭而避暑上幸九成宮以公檢校右領軍將軍本官如故董司戎政以戒不虞七校陳其甲兵五營桉其車服領軍之職用文武於紀瞻右軍之官敘勤勞於常惠尋以公事免左授歸州司馬楚之舊也始得子男之田夔之先也裁為附庸之國人同賈傅路似長岑伯鶱有聲於鄉里仲任見知於筆札制遷中大夫行亠兊州都督府長史大庭之庫少昊之墟上直降婁金精吐宿旁瞻日觀木德題山別乘初迎將宣萬邦之化佩刀終爽徒見三公之服以永淳元年某月日行次唐州方城縣遇疾薨朝廷聞而傷之贈懷州刺史公嚴而有禮直而能和行孝立身移忠事主生知者上重之以八索九邱道在斯尊加之以文昭武穆故能入登常伯出踐方州為六卿之儀表發三軍之號令列長戟於門前羅曲旃於堂下子孫朝夕玉樹相輝賓客送迎玳簪交映悲夫展禽三黜安仁再免奚辭棘署俯集桐華慘舒則不繫陰陽喜慍則不形顏色何嗟及矣竟遊東岱之山無所不知旋閉南陽之墓二年夏五月日葬於萬年縣龜川鄉之平原長子某官某次子某官某箕裘必復花萼生光鄰人泣其悲慟明主憂其毀瘠觀其弔客不無雙鶴之徵察其成墳自有百烏之感森森隴樹漠漠郊煙右元灞而浩蕩左驪山而起伏杜陵萬家之邑非復城池滕公駟馬之銘不知年代其銘曰高陽積德武昭餘慶宅鎬開基封唐啓聖協和萬國平章百姓天敘諸侯禮樂宗正其一周之曲阜漢之平陸地則葭莩祥惟嶽瀆鄉黨稱善閨庭雍穆始拜城門即遊天祿其二太微之位益部之星卿則有六四至丹青州則有九八牧專城既踐臺閣仍司甲兵其三倚伏無兆遭隨有運賈誼從王桓談佐郡自忘寵辱曾無喜慍人去何歸天高不問其四東都門外長樂宮邊白馬旒旐青烏墓田楸梓夾路碑石書年百代之後南陽之阡其五永昌元年春二月甲申朔酅國公薨公諱柔字懷順宏農人也縣犯太原王廟諱改為仙掌焉公即隋煬帝之元孫元德太子之曾孫恭帝之孫酅國公行基之子粵若稽古崇德象賢統承先王修其禮物惟丞相保寧西漢惟太尉亮弻東朝功書王家澤流後嗣亦猶司徒之敬敷五教殷德日新后稷之播時百穀周有大賚隋高祖昧旦丕顯齊聖廣淵皇天眷佑誕受顧命恭皇帝遜位明揚能讓天下作賓皇室與國咸休系承百代之宗國稱二王之後公山河積氣清白餘基孝友著於閨門信義行於邦國縱心妙用不出戶庭覃思典墳不窺園圃及其上公傳位命服居前有怵惕之心無驕矜之色漢之平帝猶敬劉歆魯之戴公尚聞商頌大唐貴為辰極富有寰瀛用三王之禮以同天地奏八代之樂以答神祗郊上元定泰時金繩玉匣日觀登封左個西偏明堂布政未嘗不虞賓在列周客來庭禮秩尊於百寮贊拜絶於㣥后猶能小心畏懼恪慎肅恭上帝時歆下人祇協以為藩屏以訓子孫稟命不融享年五十有五嗚乎哀哉越某月葬於某原嗣子某官生盡其孝死盡其哀學不替於為喪禮有踰於鑽燧卜其宅兆俾無後艱述其家風謂之不朽其銘曰有客有客乘殷之馬建於上公尹茲東夏有客有客乘殷之輅作賓王家率由典故天之蒼蒼人之云亡柏檟成行魂歸故鄉夫人爾朱氏河南洛陽人也若夫陰山表裏衝北斗之璣衡瀚海彌綸直西街之畢昴四時銜火燭龍開照地之光六月摶風大鵬運垂天之翼由是奄有京縣遂荒中土車書禮樂三王之損益可知將相公侯百代之山河不殞祖敞隋儀同三司金紫光祿大夫岐同金申信臨徐七州總管兵部尚書金城郡開國公天列尚書之星地標光祿之塞出身萬里知呂岱之元勳專命一方識劉宏之重寄父休最隋左千牛備身朝散大夫齊王府司馬襲封爵金城公大夫稱伐諸侯胙土淮仙致雨仍攀桂樹之山楚客臨風更入芙蓉之水夫人玉臺貞氣金河仙液蔡中郎之女子早聽色絲謝太傅之閨門先揚麗則彭城公發源殷伯承家漢相山川氣候彰白虎於皋陶象緯休徵下蒼龍於曼倩三星照夜佇稽鳴鴈之期七日秉秋坐薦飛皇之兆夫人年甫十八遂歸於我巫山南眺逢暮雨於瑤姬華嶽西臨降明星於玉女動合詩禮言成軌則晨昏展敬事極於移天蘋藻挈誠義申於中饋女郎砧石響明月而思秋風織婦機牀聽寒蛩而催絡緯用曹大家之明訓執宋伯姬之貞節加以心依八覺理會三空遊智刃於檀林泛仙舟於法海幾神獨照默言象而無施空有兼忘束筌蹄而不用人生天地壽非金石銀臺竊藥想奔月而何年金殿煎香思反魂而無日以某年月終於平原里之私第越上元三年十月二十日合葬於城南之畢原禮也齊侯寢側杜氏階前對文王之畢原用周公之合葬偃松千古長無寡鶴之悲文梓百尋還見雙鴛之集銘曰合葬非古周公所存死生千載棺槨雙魂野曠風急天寒日昏煙霾杳嶂霧失遙村紀黃絹之碑表對青松之墓門夫人姓李氏隴西狄道人也自涼武昭王以後一門三公為四海著族國史家牒詳之矣祖充穎後周大將軍滑州刺史流江郡公考元明皇朝上儀同闕濟三州刺史成紀縣男出入三朝剖符分竹秦隴河濟之地人到於今稱之天下士大夫知與不知莫不想望其風采夫人生而純深幼而恭敬長而敦睦成而和惠年初及笄甫歸於我執箕帚奉舅姑人不間於其娣姒妾媵之言閨門之內穆如也故宗黨推其令問鄉閭以為美談東平公守清白之基逢太平之日辟命交至聲聞於天詔徵尚書郎遷御史中丞出為棣曹恆常四州刺史夫人輔佐君子聿修內政平旦纚笄則有君臣之嚴沃盥饋食則有父子之敬報反而行則有兄弟之道受期必誡則有朋友之信其婦德也如此歷職中外聲名藉甚和其琴瑟正其邦家者夫人與有力焉蓋常喟然而言曰古者卿之內子為大帶命婦成祭服社而獻功可不勗哉可不勗哉由是服浣濯之衣躬紡織之事筐筥錡釜之器所以執其勞蘋蘩蕰藻之菜所以明其德非夫博文達禮貞婉聽從者孰能與於此乎及公乞骸告老退歸初服夫人年踰耳順視聽不衰每獻歲發春日南長至㣥從子弟稱觴上壽者動至數十百未嘗不歡言善誘借以溫顏侃侃焉誾誾焉有孟母之風焉有敬薑之誨焉維永淳元年秋八月旁死魄寢疾彌留終於華陰之望仙里享年八十有一冬十一月一日丙辰遷窆於永豐鄉之平原從先兆也東平公撫存懷舊用痛悼於厥心遠近咸集宗親畢會生榮死哀其此之謂矣是日也皇太子監守長安炯忝為詹事司直不獲展哀喪次陪奉靈輀敢薦李禺之文庶同潘嶽之誄嗚乎哀哉銘曰高嶽之上浮雲翔兮函谷之外真氣揚兮建功北狄討西羌兮受封南鄭家素昌兮於赫祖考為龍光兮牧州典郡佩銀璜兮降生淑質秉禎祥兮苕華菊茂蘭若芳兮我有懿德如圭璋兮求之卜筮鳴鳳凰兮君子至止玉環鏘兮室家好合琴瑟張兮執其麻枲供衣裳兮羞其饋食澄酒漿兮諸姑伯娣穆溫良兮姨姒叔妹歡未央兮公之出牧守四方兮夫人之化德洋洋兮公之告老返維桑兮閨門之內道彌彰兮正月上日南至長兮子孫歡慶各稱觴兮宋云孟母魯季薑兮匪怒伊教由舊章兮方期高舉登紫房兮誰謂冥默掩元堂兮肅肅松檟鬱成行兮沈沈厚穸終不暘兮高祖德魏給事中黃門侍郎御史中尉散騎常侍直閣輔國二將軍齊州刺史贈車騎將軍儀同三司華州刺史諡曰簡懿曾祖孝通魏中書黃門二侍郎銀青光祿大夫散騎常侍關西道大行臺右丞常山太守汾陰侯贈車騎將軍儀同三司齊鄭二州刺史祖道衡齊中書黃門二侍郎隋吏部內史二侍郎上開府儀同三司陵卭潘襄四州刺史襄州總管司隸大夫皇朝贈上開府臨河縣開國公父收皇朝上開府兼陜東道大行臺金部郎中天策上將軍府記室參軍文學館學士上柱國汾陰縣開國男贈定州刺史太常寺卿諡曰獻河東郡汾陰縣薛振年六十二字元超狀昔者唐堯之協和萬邦也有若四嶽之敬順昊天歷象日月虞舜之慎徽五典也有若八元之忠肅恭懿宣慈惠和夏禹之分別九州也有若咎繇之謨明弻諧允迪厥德殷湯之南征北怨也有若伊尹之格於皇天姬文之受命作周也有若虢叔之聞於上帝自唐虞而列考及秦漢而無譏元首必藉於股肱方隆太平之化賢者必待於明主克致崇高之業若夫驂駕六龍驅馳七聖斟酌元氣財成天道者其惟聖人乎宏闡大猷發揮神化匡正八極阜成兆人其惟良宰乎我大唐之建國也粵若神堯明揚側陋文王叶於朕卜迎太公於渭水高宗求於朕夢得良弻於傅巖若歲大旱以為霖雨若濟巨川以為舟楫者也公含天地之間氣依日月之末光能備九德兼資百行探賾索隱極深研幾齠齔之際羞言霸道詞賦之間巳成王佐年六歲襲爵汾陰男十一太宗召見敕宏文館讀書十六為神堯皇帝挽郎十九尚和靜縣主高宗升儲之日也敕公為太子通事舍人二十二除太子舍人高宗踐位詔遷朝散大夫守給事中年二十六尋拜中書舍人宏文館學士三十二丁太夫人憂去職起為黃門侍郎固辭不許修東殿新書畢進爵為侯公毀瘠過禮多不視事出為饒州刺史上夢公徵為右成務四十復為東臺侍郎是歲也放李義府於卭笮舊制流人禁乘馬公為之言左遷簡州刺史歲餘上官儀伏誅坐詞翰往來徙居越巂五十三赦還拜正諫大夫五十四遷中書侍郎尋同中書門下三品兼檢校太子左庶子五十九遷中書令車駕幸洛陽詔公兼戶部尚書與皇太子居守俄以風疾不視事高宗崩輿疾往成都抗表辭位至於再至於三詔加金紫光祿大夫仍聽致仕以光宅元年季冬旁死魄薨於洛陽豐財里之私第嗚乎哀哉公地藉膏腴姻連戚里鼎湖長往拜卿子而為郎金榜洞開徵列侯而尚主遂乃彈冠筮仕策名委質叩天門於畫闕攀鳳翼於紫宸凡升右轄者一年居外臺者兩郡四遷門下二入中書用能燮理我陰陽經緯我天地鹽梅我寶鼎梁棟我宸極理百官而察萬人平邦國而和上下借如風后天老左右軒皇蕭何曹參謀猷漢室未有一心事主四十餘年參兩宮而出入歷三臺而陟降合其道也大壑縱其鯤鵬遇其時也名山出其雲雨功成輔弻德邁幾深星象不方踐中台之位山川並走竟遊東岱之魂天不憗遺民將安仰越翼日詔贈光祿大夫使持節都督秦成武渭四州諸軍事秦州刺史餘如故賜物四百段米粟四百石東園祕器凶事給儀仗至墓所往還司賓卿監護璽書弔祭別降中使賜斂衣一襲雜物百段又詔陪葬乾陵依故事也公襲封之年也受左傳於同郡韓文汪至天王狩河陽乃廢書而歎曰周朝豈無良相何得以臣召君文汪異焉神堯皇帝婕妤河東郡夫人公之姑也每侍高祖詞翰高祖嘗顧曰不見婕妤姪數日便謂社稷不安其見重如此上幸溫泉射猛獸公奏疏極諫上深納焉後因間居謂公曰我昔在春宮與卿俱少壯光陰倏忽已三十年往日賢臣良將索然俱盡我與卿白首相見卿歷觀書傳君臣共終白首者幾人我觀卿大憐我我亦記卿深公嗚咽稽首謝曰先臣早參麾蓋文皇委之以心膂臣又多幸天皇任之以股肱誓期殺身報國致一人於堯舜伏願天皇遵黃老之術養生衛壽則天下幸甚賜金二百鎰公有事君之節也不亦忠乎每讀孝子忠臣傳未嘗不慷慨流涕以為帝舜非孝子朱雲非忠臣客有譏之者公曰寧有揚君父之過而稱忠孝哉太夫人薨公每哭嘔血杖而後起上見公柴毀泣曰朕遂不識卿卿事朕君父一致遂至於滅性可謂孝乎中書省有一磐石隋內史府君常踞而草詔及公揮翰躍鱗每見此石未嘗不泫然流涕公有至性之道也不亦孝乎其年修晉史筆削之美為當時最孝敬崩詔公為哀册上幸九成宮敕皇太子赴行在所置酒別殿享王公以下時太子英王侍皇帝酒酒酣公獻壽曰天皇合易象乾將三男震坎艮今日是也上大悅百官舞蹈稱萬歲賜雜物百段銀鏤鍾一枚吐蕃不庭詔英王為元帥總戎西討公賦西征詩一首上稱善嗟歎者久之因代英王屬和御筆繕寫朝以為榮公有屬詞之美也不亦文乎黃門侍郎上疏薦高智周任希古郭正一王義方顧徹孟利貞等後皆有重名歷登清貫及兼左庶子又表鄭祖元沈伯儀賀覬鄧元捷顏強學崔融等十人為學士天下服其知人公為右成務獻封禪書及平夷策上深納焉或有抵罪者同類數百經赦令獄官評經年不決竟以死論公上疏陳其濫詔百寮廷議獄官及諸宰臣未有所決公酬對如響衆咸服焉上歎息曰幾令我殺無辜之人百寮莫不震懼又上疏陳請備塞垣未幾而胸奴背誕公有神通之鑒也不亦明乎儀表魁傑鬢眉若畫身長七尺四寸望之儼然喜慍不形於色雖至於近習左右胥徒僕妾莫不待之以禮公有行已之方也不亦恭乎在饒州六年以仁明馭下鄱陽北岡上忽生芝草一株郡人以為善政所感共起一舍號曰芝亭因立碑頌德公有馭人之術也不亦惠乎在卭都十餘載沈研易象韋編三絶賦詩縱酒以樂當年有醉後集三卷行於世公有安和之德也不亦康乎上初覽萬幾公上疏論社稷安危君臣得失上大驚即日召見不覺膝之前席歎曰覽卿疏若暗室而照天光臨明鏡而覩萬象此後寵遇日隆每軍國大事必參謀帷幄在中書獨掌機務者五年出納帝命口占數百上曰使卿長在中書一夔足矣大駕東巡詔公驂乘上曰朕之留卿若去一目若斷一臂關西事重一以委卿因賜物百段公有社稷之勳也不亦重乎若夫有官功者賜其官族有大行者受其大名公叔列國之陪臣猶安社稷黔婁匹夫之介節不忘仁義古今以為通訓書籍以為美談況乎輔佐明主寧濟天下生死無二始終若一業高於六相道貫於五臣其生也榮同心比於周召其死也哀陪葬均於衛霍豈使易名之典不及於會同賜諡之文不傳於終古門生故吏願述德音博士禮官佇聞清議是則鍾繇之策降於皇魏之年王導之疏寢於中興之日謹狀垂拱元年四月四日故中書令汾陽公府功曹姓名謹狀文昌臺考功竊聞生為貴臣車服昭其令德死而不朽諡號光其大名今謹桉故府主中書令汾陰公贈秦州都督薛元超以王佐之才逢太平之會撫綏萬國康濟兆人力牧輔軒皇未為盡善皋陶佐大禹猶有慚德名遂身退生榮死哀羽父之請魯君抑惟舊典衛侯之諡文子庶幾前列謹上祖宏壽隋獲嘉縣開國侯父萬善皇朝左監門將軍持節隆州諸軍事守隆州刺史上護軍成安縣開國男諡曰信某郡某縣崔獻年六十七夫推其天命南端上將之文考其地靈北極崆洞之武厭次有東方曼倩卓達於孫吳琅琊有諸葛孔明深期於管樂貞觀九年起家太穆皇后挽郎十六年授營州都督府參軍事燕齊遼遠所以分置營州天子命我以參卿軍事太宗文武聖皇帝把斧金戊動璇璣發西土之人爰整其旅問東夷之罪恭行天罰公自家刑國資父事君樂王粲之神武棄班超之筆硯一鼓作氣方輕肉食之謀七旬舞干始受昌言之拜二十三年遷除王府西閣祭酒梁孝王武者漢皇之少子廣東苑屬平臺則司馬相如所以騁其詞賦陳思王植者魏國之天人遊西園擁飛蓋則邯鄲子淑所以為其賓友永徽六年授晉州司士龍朔三年遷岐州司戶翦桐垂棘圭璧相輝紫鳳寶雞休祥狎至從乾值巽之風土被山帶河之國邑邦君坐嘯方推太守之名鄰國從遊始屈陪臣之禮尋丁外憂三年泣血一慟能使禽獸莫觸其松柏神仙每留其玉石春秋忽變有君子之終身金革不辭達賢人之俯就麟德元年有詔起公為左威衛修仁府左果毅都尉仍命羽林軍長上乘輿歷日月步山川詳益地之圖書聽干雲之律呂長城十角盡入提封高闕三襲並為州縣於是九姓抗表請築安北府城詔公馳驛許以便宜從事則榮奉中旨計日期還親降鑾輿待於故都樓上雖復東西萬里張博望之尋河裝士冖柘千金陸大夫之使越猶未聞降星蹕迥帝車擬於陶侃扣天門之八襲方於魯陽留白日於三舍若夫類上帝遍㣥神則孔宣父之所刊者五年一狩登泰山禪梁甫則管夷吾之所識者十有二君秦皇致風雨之迷魏后積貂羊之恥夫名山之所望非我后而誰哉是以馭蒼龍控玉鳳陰陽不測發揮於作樂之文天地無私揖讓於升中之禮公受命陪祠汶上扈蹕梁陰列藩衛於環星受嘉名於捧日與夫茂陵之下獨留符命之書河洛之間不覩漢家之事豈同年而語也朝鮮舊壤歌箕子之風謠斗骨危城屬烏孫之背誕地惟孤竹不聞謙讓之名親則同株曾無急難之意特進泉男生以蕭牆搆孽蔓草方滋欲去危而就安思轉禍而為福請歸有道使者相望天皇慜一物之推溝詔公於國城內迎接先之以造化之大示之以雷霆之威受其璧焚其櫬更徵侍子來朝京闕亦猶酈生憑軾入齊國而下其城賈誼上書伏胸奴而笞其背乾封元年詔遷遊騎將軍左威衛義陽府折衝都尉仍加上柱國右羽林軍長上如故是歲也太子太師英國公登壇而拜鑿門而出紫泥明詔不入於三軍之中黃石奇兵自行於九天之外山林為室不能有籓籬之險魚鱉成橋不能有逃亡之路詔公出使預參帷幄進奇策納嘉謀攘無臂而執無兵戰必勝而攻必取斬大風之翼霧卷青邱臥長鯨之鱗煙銷碧海二年以平夷功詔除定遠將軍右武衛中郎將檢校左羽林軍總章二年詔遷宣威將軍守左武衛將軍檢校右羽林襲封成安男咸亨二年進爵為子尋奉別敕檢校右羽林軍餘如故太夫人以桑榆晚節霧露沈疴感年歲之扶危受皇天之賜藥屢陳表疏方請告歸頻降絲綸未蒙優許則知忠臣奉上多從孝子之門受命臨戎始見忘家之事潘安仁之豈弟始奉輕軒張景允之純深終悲畫扇儀鳳三年以內憂解職尋降詔起復本官四年加雲麾將軍正除左武衛將軍檢校右羽林軍如故王人奪服才聞趙熹之喪明主相憂獨訝何曾之毀且割哀而從禮將以義而斷恩受軍麾命服之數掌期門佽飛之職以漢宮清署忽照邊烽秦塞長城遂聞胡馬胸奴未滅霍去病所以辭家天子動容周亞夫於焉不拜調露元年詔公龍門鎮守兼於夏州防捍飲氷受命倍道兼行鞍甲成勞晦明為疾璽書降問即日追還中使接迹於家庭尚藥綢繆於錫賚人生詎幾神道何知仰觀於天值三軍之星落俯察於地逢五將之山崩詔書來北斗之門圖像在南宮之壁以三年秋七月薨於紫桂宮右羽林軍之官第詔賜御食並錦被一張常服一襲雜采百五十段賜物一百段粟一百石敕書弔贈禮越常班喪葬所資數優恆典琳琅觸目日月在懷陶謙則戲引幡旗賈逵則常陳部伍閨門有德歡若友朋事君無隱心如鐵石至如出車授鉞東征西討孤虛向背則雖女子之衆可以當於丈夫前後折旋則雖婦人之兵可以蹈於湯火兔起而鳧舉龍騰而鳳飛無戰不平無城不剋有如馮異羞言大樹之功宛似魯連不受黃金之賞太平之事業行矣人主之恩榮備矣山河之寵久預同盟社稷之臣俄悲輟祭聖君興悼列辟相趨覩高屋而歎良弓聞鼓鼙而思將帥宏圖祕略實無得而稱焉追遠飾終請有易其名者謹狀永隆二年正月十一日故左武衛將軍成安子府功曹某上尚書省考功名也者功之表也諡也者行之迹也公叔文子曾辱四鄰之交黔婁先生有餘天下之貴謹桉故府主左武衛將軍上柱國成安子崔獻誕靈辰昴降德山河漢陽閻忠許有良平之策潁川徐庶知其管樂之才生覩太平仕逢明主秋風金鼓有司馬之論兵吉日壇場有將軍之拜職任重而道遠功成而身退奄息百夫之特彼蒼者天相如千載之人猶有生氣珠襦玉匣禮備於喪終筮短龜長事從於先見易名之道蓋取之於舊儀纍德之文敢希之於執事謹狀中書令河東薛某謹以清酌中牢之奠謹祭故少監劉公之靈惟彼陶唐有此冀方上天祚漢人神攸贊開國承家枝分葉散三貂赫赫於臺省駟馬諼諼於里閈德之有鄰吐符兮降神家之積慶受祿兮宜君星躔可以衝南越都邑可以質西秦言鄭公之不死謂張衡之後身雍州為積高之地初登吏部尚書即喉舌之端始拜郎官見天子而題柱侍明光而握蘭入麒麟之閣圖書掌於河洛測璇玉之機造化窮於制作大風積也方絶於雲天有力負之生悲於溝壑嗚乎哀哉言念平生求其友聲適我願兮共得朋從之道又吾姨也俱承下嫁之榮良辰美景必躬於樂事茂林修竹每叶於高情援茝蘭而無愧指金石以當行誰言倏忽遽隔幽明人非兮地是心折兮骨驚卜日兮先遠陰雲凝兮歲將晚臨平原兮望行幰君一去兮何時返石室兮沈沈蓬萊山兮寂又陰蒼煙漫兮紫苔深陳絮酒兮涕沾襟嗚乎哀哉少詹事鄧元機永昌令令狐恩府司直王思善楊炯主簿鄭行該等謹以清酌庶羞之奠敬祭太子少保郝公之靈若夫星象降質山川受氣以道為尊以和為貴軒后夢之於大澤文王卜之於清渭實憑舟楫之功必藉鹽梅之味昭昭北斗宮號文昌隱隱西掖池名鳳凰增萬機而參政本定五字而對休光珥豐貂之奕奕識遺佩之鏘鏘懸車之歲方稱國老步輦之榮遂居師保劉蕃以光祿緝熙和嶠以尚書贊道百年方享於期頤五福冀徵於壽考西山訪藥北壁尋經金丹不化玉藥何成梁木斯壞曲池坐平府庭颯而色變寮寀慘而相驚嗚乎哀哉元機等親聞教義夙承提奬懷德音之不忘痛丹壑之長往門館閴寂簾帷仿像奠行潦之蘋蘩庶明靈之降饗嗚乎哀哉維垂拱二年太歲丙戌正月壬寅朔二十二日癸亥長史劉某謹以清酌庶羞之奠敬祭陸明府之靈夫萬里之別猶使飲淚成血思德音之斷絶况百年之分能不憂心如薰想公子兮氛氳惟彼積德挺生夫君天垂白氣地發黃雲江則有汜為國之紀君傳其政愛人如子山則有梁鎮茲一方君宏其道視人如傷久勞於外路阻且長曾未期月人之云亡嗚乎哀哉哀哀弱嗣朝暮一溢皎皎孀妻頽乎下室蜀門如劍長安如日歸路何從我心如疾嗚乎哀哉凡我在位羈官邊城共戮力兮誰言死生思其人兮造其戶庭恍無見兮寂無聲稱觴兮酹酒心折兮骨驚嗚乎哀哉維大唐光宅之元祀太歲甲申冬十有二月戊寅朔丁亥御辰楊炯以柔毛清酒之奠敢昭告於故中書令汾陰公之貴神惟公含純德而載誕兮稟元精而秀出備百行而立身兮半千年而委質屬天地之貞觀兮逢聖人之得一若夔龍稷卨之寅亮舜朝兮若蕭曹魏邴之謀猷漢室懸大名於宇宙兮立大勳於輔弻如何斯人而有斯疾曾未遐壽中年殞卒嗚乎哀哉若夫家傳寶鼎地闢金溝文則屬詞而比事兮學則八索而九邱入則東藩之上相兮出則南面之諸侯唯盡善兮未善固雖休而勿休既知退而知進兮亦能剛而能柔大才則九功惟敘兮大知則萬物潛周崇德廣業兮樂天知命而不憂嗚乎哀哉門館虛兮寂寞歲窮陰兮搖落備物儼兮如存光靈眇兮焉託垂繐帷與祖帳兮罷歌臺與舞閣天子惜其毗余兮㣥臣思其可作嗚乎哀哉拊循兮弱齡叨襲兮簪纓公夕拜之時也既齒迹於渠閣公春華之日也又陪遊於層城參兩宮而承顧盼兮歷二紀而洽恩榮郭有道之青目兮蔡中郎之下迎倏焉今古非復平生無德不報兮願摩頂而至足有生必死兮空飲恨而吞聲天慘慘兮氣冥冥月窮紀兮日上丁藉白茅兮無咎和黍稷兮非馨嗚乎哀哉
