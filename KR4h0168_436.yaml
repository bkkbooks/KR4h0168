  - {type: head, offset: 2521, content: 甲通梢溝三十里主者按興役不申甲云水潄之不合申, id: KR4h0168_NFKB_436-h28, level: 2}
  - {type: head, offset: 2696, content: 對河卒判, id: KR4h0168_NFKB_436-h29, level: 2}
  - {type: head, offset: 2696, content: 甲充河卒官給平價又被差外徭訴有兼丁不合倍賦, id: KR4h0168_NFKB_436-h30, level: 2}
  - {type: head, offset: 2852, content: 對大比判, id: KR4h0168_NFKB_436-h31, level: 2}
  - {type: head, offset: 2852, content: 乙因大比有橘奴不書於版三老罪之用賦不闕, id: KR4h0168_NFKB_436-h32, level: 2}
