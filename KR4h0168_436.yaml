front:
  text: 全唐文欽定全唐文卷四百三十六信肅宗朝擢書判拔萃科
  hash: sha256:a41fb7754afbe041296576f04f00a37644ec25048aa555a1a068bf949f88c77d
  markers:
  - {type: head, offset: 14, content: 杜信, id: KR4h0168_NFKB_436-h1, level: 1}
body:
  text: 列爵疇庸承家繼體析薪負荷堂構纂修彼侯運偶千齡秩惟五等謀孫不朽傳錫土之榮嗣子云亡失克家之慶殊孟縶之在衛異微子之居殷檀弓免焉有符周典仲子行古實紊彞倫人或見非識明大體廢嫡立庶宜正刑書吾蔑從之無載爾偽倚肅宗時擢書判拔萃科胙土報功分茅錫瑞爰加九命是寵三接將崇繼代之美以展象賢之慶顧彼擇嗣捨乎嫡孫實亂大倫攸乖先典將著其代非尚其德亦猶行古未息仲子之詞苟非從權緣懼宣尼之對若也克紹前烈無貽後羞龜告其猷神歆其類居喪而情忘佩玉臨代而智則藏符雖則嫡庶有殊足使賢愚自別侯之所擇人或敢非在禮則乖於賢固可棲梧肅宗時擢書判拔萃科王者之制著乎禮經五等已陳千古不替爾侯所擇以為後者蓋重仁賢詎論嫡庶故捨孫而立子將繼代以承家壓紐可尊佩玉非嗣近思靖郭傳諸孟嘗遠學周文廢其伯邑侯則可矣人妄非之密肅宗朝官考功郎中遷諫議大夫進賢受賞求善以類苟有徇於廉能固無嫌於讎黨夫不惡汝疑柳朔方為於柏人孰可代之伯華旋佐於軍尉事不為諂舉乃斯得以成三物奚獨一官且王命使臣匪躬之故位多君子何限之拘方勵時而激俗寧守文以牽制能舉善也惟其似之大夫之中則聞於祁氏御史之糾無為於魯人宜加爵地之榮勿蹈功賢之議澤國之政川衡是恤止以瀦防均之溝遂畜彼雨施錯其水物將廢業之不修豈分地之為利雖輿人之訟中則可毀而兩鵠之謠處聞當復候天時而潤澤成我濯龍灌秋水於涘涯誰其辨馬與人為利其利則深仍舊為功其功蓋寡勞雖是憚訟則有孚何者伍其田疇初結怨於東里遵彼溉濯終見美於西門乃謀始而獲尤方樂成而久次此而為罪夫何勸能宇字紹宗河間人肅宗朝官戶部員外郎握槊今人謂之長行斯博奕之徒與觀其進退遲速雖存於大體因時適變必務於權輿施之於人可以義存賦曰夫何一枰之內兮而取之多端六藝之外兮其為功乎實難張四維則地理攸載背兩目則天文可觀不可飾於丹漆寧假貴於琅玕物以㣥分故元黃而不雜鬬必遇敵惟蚌鷸其何歡彼千變之奚準任雙頭之所安遂使象牙在手駿骨登盤為無竅之須鑿故非龜而見鑽且其廣凡幾分數不過六參差宛轉循環反覆不能者敗而成患故能者養之取福則犄角相持首尾俱蹙形同楚漢氣陵賁育收七縱之奇功在一擲於餘掬或撫䏶而驚盼或聳身而助速似臨敵之旗鼓同在師之耳目率成是而敗非類吉凶之倚伏多回君子之慮以實小人之腹爾乃啓行前指要然自能經彼策之無算謂我謀之足徵豈知夫否終則傾道非假易持不競之微力乘驟勝之遺纍閉六關而不通因一子而為質乃欲速而賈害翻後時而獲利無以憑陵而憔悴無以往蹇而自棄實反掌而變生亦隨手而時異至若幽人欲寡智士謀深不蕩其志以平其心非獨巧於往遂移情於今是知行必有恆事思不久亹亹經略循循善誘或欲退而徑前或謀疾而居後雖有敵而必應固無險而不走或用壯而可攻或示羸而難扣不幸災以矜伐每終吉而何咎雖小道而可觀彼多詐而焉有其故柔非及懦勇必兼斷聚或一旅分為數段始霧委而雲集忽風解以冰泮皆應物以卷舒亦從宜而合散雖觸類而則長維吾道之攸貫足明夫正而不譎取又非貪全同坐隱斯為手談必由理勝豈非言甘雖小失其奚爽亦大來而莫慚然則終多喪志吁嗟士兮不耽爵祿馭賢在乎典禮侯伯之秩厥有成命惟彼王季紀名太常對茲王人拜命堂下心則隕越若天威之不違躬行俯僂信魯史之無替禮實宜之德用稱者為臣不易時觀布武之儀事君盡節寧及簡書之政言以得中季其信然刑乃正邪法固難捨覲壽州刺史規之弟君生人者在乎寶位守寶位者在乎靈符鎮四海而攸重臨萬方而作孚時或遘迍暫淪精於甸邑道將昭泰旋應德於皇衢日者師犯順賊臣附進隨黃鉞以外遷與翠華而西幸苟遇運之云否將隨時而匿影忽影脫於金繩遂沈埋於土梗既而寇盡天府駕旋京師衣冠再朝於紫殿文物重布於丹墀聖上愍茲符之闕遺恆寤寐以求之結精誠而仰望契幽昧以思惟皇心退修已聞於其政神器大集又叶於其期其形欲呈其氣先覿何五色之可愛與三光而相射光凝渭濱之苑宜玉樹之青青媚貫王都之川狀銀河之奕奕載求載索甸人斯獲捧之而片月下來懷處而長虹上格臨宸扆同舜德之文明照階墀叶堯心之光宅玉鈕惟舊芝埿尚新螭文外發鳥篆中陳題為天子之寶實撫遠方之人彼之近縣俯接城闉我唐既斬虜將於橋上漢氏亦拜單于於渭濱不然者曷不呈於異境而見於他辰者也當其大君出令布蠻夷之政匪我無以重其成命遠人砥寧執玉帛於庭匪我無以闡其威靈足知寶符之復光我昭代唐雖舊邦其命惟再頌聲作於外喜氣溢於內藏之王府將神鼎以俱崇列彼帝庭與寶圭而相對盛矣哉我唐之景祚信三皇之作配地有百瑞美者惟金其見寡其應深故因神而呈足表至誠之道從物以化更彰肅祭之心其祭惟何首山之祀其祭則那我皇所致始馨香以享德終潔敬而展意向清漢以式瞻庶嘉祥於一至於是乎神報以福帝受以昆田之上金化於茲考出地之形時則亡也觀從革之狀維其有之原其始也未辨厥名莫知其價紛雜乎珍異昭彰乎晝夜呈祥於代雖得神而生入息於時亦待神而化及其變也倏忽而成爛然而明初比粟而散點竟如螢以亂呈昔混丹砂南面之虔誠始答今輝瑤草四方之正色遂生山下熒煌田間昭晰向曙而野花齊媚入暝而天星共列祥風拂而逾麗瑞露濡而更潔至若隨車表舜還雨來秦或因初以出或從本而陳未有遷移以禮變化從神以彼瑞為茲瑞易前珍為後珍則知寶非神而不見其祥神非寶而莫臨其祭訪古而昆田宛在閲史而清風不替別有泥沙久沈光影常翳顧茲神之所開亦化形而表帝南山之陽何珍不藏昭皇家之至德發紫玉之禎祥熒熒兮千巖動色炯炯兮萬壑生光映於林謂㣥鳳之集上據於石辨衆珉之居旁固已聞於往牒遂薦臻於我皇稽夫所自無脛而至每隱曜而不欺曷招攜之可致所以瑞於有道將委質而式孚出非其時則韜光而自棄南眺穹崇玉見於中貞姿豈琢徑質非礱遠而望焉與彩雲而搖曳即而察也雜嘉氣之蔥蘢對白璧而即異配元圭而攸同故瑞無應而不至事有感而遂通通人莫測孰知其色由是王者憑之而致理君子觀之而比德明琬玉之在茲豈瑕瑜之有匿原乎玉之處幽儉德是修德表玉而應瑞玉用德而降休蓋真宰之潛運知神功之所由不然安得挹至寶於潛谷闡皇風於大猷而已哉若乃外徹中朗泠然如響珮服之處雖貴乎山元抵鵲之時罔懷於土壤大矣哉瑞無常居因化所如惟德是依彼自彰於符契不貪為寶我何待而沽諸故客有觀光而歌曰歸太素兮遠蠻屏有瑞玉兮見霄嶺浮紫色於雲際混清輝於水影庶南山之不騫期我皇之惟永覿隴西人官刑部郎中給受有數田畝則差何患不均是亦為政顧惟彼乙親物為務則三壤之典平四人之利以為用貧求富猶或慕於工商化有遷無詎均勞於藨蓘聿修稼政式贍農人罔愆五口之商俾齊三倍之賈冀使通財易有資殖貨以藩身寒耕熱耘望豐年而潤屋不均致訟且曰未孚罪欲加之今有辭矣昭肅宗朝官侍御史先王之制廬井有伍爰自澮畎達以溝洫拯下人之墊溺變彼汾之沮洳故河渠式修煥馬遷之典衡漳既導美夏禹之績今甲之所施用酌前訓不資穿鑿坐看通引顧源流之所觸望平疇之有藝況承茲水潄罔殫衆庸同史起之利人類王尊之濟物遂使苞蕭發詠無浸彼之虞汾澮興言多流惡之美既稱裨益聞此損費自可旌其殊效勸彼異能豈宜按以不申加之砥戾但刑期不僭令著明文役且不滿千夫法難從於五罪既不合上請即宜原宥徒駭既導誠禹貢之宏規宣防式歌亦漢國之盛業莫不功勤釃決績著疏開既輸閩越之賝行漕海陵之粟河渠既設控引是資青翰晨移背吳江而電騖艅艎夕至仰天府以雲趍眷彼泛舟良資鼓栧瞻言河卒實繫水官平價允叶於酬庸輕役雅符於悅使報者倦矣在彞典而無乖施者未厭論外徭而有訴羔羊起詠節儉寧聞碩鼠興謠貪婪何甚論古既聞此役設法不合輒蠲無端之詞請從告記貢賦有差彰乎昔典貧贍斯別煥彼前書故地之居人因俗而理制以廬舍為之井田考市籍而有倫工商式敘稽版圖而作範衆寡必登斯道或彞倫攸斁乙産均猗頓術得計然忝列編氓有虞常賦雖貞筠十頃稍異渭濱之饒而木奴千頭自擅江陵之富爰因大比用奉舊章隱而不言國有彞憲籍為大信命出維行三老論辜宜察鄉人之惡五刑必審是詰所由之科庶書橘有差自甘於屈法坐棠流惠克念於旬時士幹肅宗時擢書判拔萃科三壤異宜四人差給用懲末作示禁淫利乙任當撫字能率典禮以為播植務農實粢盛之備貿遷變業非禮節之本遂用均其利役別以等差類農家之一夫視工商之五口詳夫周禮則異井田之制稽諸漢制是同平土之法冀以無而易有期彼竭而我盈各適所宜足見人而無黨不相僭奪可謂政之有經誠往訴之有孚將議刑而奚據肱屯田員外郎敦實子氣改東風日在西陸魚稱祭獺人用獻羔乙為冰司預聞政事朝之祿位尚合班行祭之彤繹俄聞悔吝誠應鑑室初啓以享司寒何得羽籥載闡仍虧如在既蘋藻而有闕仰哀敬而難逃青龍御辰二月行及驄馬問罪三尺須加自得噬臍那應騰口天聖嗣文明時偃武弧矢之利可以訓戎禮容之規於焉觀德將因舍奠是用求賢甲為主司素非違吏澤官之制何昧周官相圃之儀旋乖魯典既而工歌九夏庭列三侯決拾既似於雕弓并夾則陳於揚矢標名鹿兕或有國之前聞皮稱熊豹蓋王者之恆制語而有訴雖以執禮為詞闕而不供終當毀櫝之責請以中典以勸無良準肅宗朝擢書判拔萃科射以觀德禮先擇士是明五善之義豈從六藝之卑況聖敬日躋王假有廟將期預祭之事是知必爭之道甲學乎相圃司彼澤宮并夾既陳決拾斯佽思備物以致用奚曠官以速尤竟不具於鹿中乃空歌於貍首末學茲甚不敏則多天子之儀用或兼下諸侯之禮事乃舉中使揚觶而有言闕發的而足獻遂合會稽之美每抽厨子之房肅慎之貢仍韜夏后之服繄謂朝肅宗時擢書判拔萃科五等之儀必從軌物六禮之數非無令典或表著而失節固憲章而在斯惟彼國公責稱列土慎爾侯度見錫命之有常覩於承家知禮容之必盛謁者久聞從事云在司存儀式且虧於職官論刑未免於離次法有常制從徵於五品義而能伏實佇於三緘必也位居襲封時在散職將申直筆應候正名滔肅宗時擢書判拔萃科時康官備所籍為理戶減務煩則害於政有司縻我王爵思立國體知師旅之後版籍徒懸念閭里之空州縣宜省誠有可尚議未得中雖在濟物之規實亦勤人於遠請依百姓之訴用減庶寮之員省事省官晉朝高其論從人從欲魯史異其文自古以然孰謂非允聳涇陽人官太常博士用行舍藏宣尼所誡難進易退老氏格言伊丁效官先甲入用曾未浹辰見代而解乎印綬已在後時參選而趨乎衡鏡雖牽絲失位情有可矜而如綸與能材或無取誠宜委命而去何至滕口與爭但使如圭如璋不僭不濫弓旌自辟仁遠乎哉今則天鑒孔明星郎守法進退不遇斯害也已吏曹引乎周禮前言是徵丁意昧於隨時厚顏何格告令知分用止躁求藻肅宗時擢書判拔萃科許曰非新命未敢自安請受其衣未知合否列爵有等自稱分地厥功惟茂爰加命服惟庚廓茲疆宇却彼戎夷若置朔方如通西域同秦襄之績寧徵舊有美晉文之勳實茲新命以斯而請誰曰不然方今文教式敷武功載闡將趨衛霍屢飲月氐之頭謨蓋賈終幾繫單于之頸絶漠無驚緣邊罷候無聞茅土之封寧正衣裳之錫所由不許胡以自安豈曰無衣受其六而或可顧茲拓境聽彼伯而為宜祿以馭賢矧茲賓客將不速而是敬豈乾餱而以眷彼丁也給茲親屬未聞輟已之仁且有害公之負於焉獲譴何以為辭然獄貴原情事資愜衆必若行高曾史才茂鄒枚簞食屢空未改顏生之樂樵蘇不爨能師范子之廉乃謂國賢豈惟家食以之恤乏何必正名昉滎陽人建中元年登第爵無及惡必在賞功服以旌禮豈忘裦德苟忠誠之不匱則禮命之可嘉惟庚五等受封九命作伯懷贊國之義無忘盡忠申拓境之謀是為罄節既而敢忘錫命以循已榮功則成焉賞宜及矣雖名器所慎不欲假人而車服以庸是宜勸善所為將為賞僭難議書勞彼庚自為功能敢為固請榮之不報善欲何歸宜裦晉武之六衣佇美吉甫之三捷必也爵無踰等道在守官未可新加請從舊制臧否之理其在茲乎憲河南洛陽人官屯田郎中德州刺史拜有九命光錫之道長人有十等尊卑之位殊今者王人斯來王季拜命固宜鞠躬以進安得布武而行天威咫尺異齊桓之盡敬綸命渙汗無考父之益恭實以乖儀奈何文過簡書既正噬臘空勤博考終古厥惟敦龎大智未萌尚質巢窟後聖有作乃教炮燔爾來欽哉孰謂為利乙或工者舉而修之以火化物豈特鎔金之利若泥在鈞斯從合土之法既埏埴以為用非陶甄而謂何苟學非乖方篤在守業得高曾之規矩無窳濫之悔尤則彼有虞以協還淳之化紹於上古寧云反古之道從朔者稱其有典薄言者則謂無稽厦乾元時人郭知運承恩詔葬向五十年今請易名竊恐非禮謹按禮經云禮時為大又曰過時不為禮也昔衛公叔文子卒將葬其子戍請諡於君曰日月有時將葬矣請易其名者蓋時不可踰也節度既名不浮行數紀之前門生故吏已合謀諡今乃申請竊將有為而作節度嗣子英乂頃屬多故屢制方隅朝廷策勳位表端揆附從者竊不中之禮會無妄之求況節度當開元初賵贈特加碑志並建皆出恩命追悼之遇亦已當矣今又鹵莽外於典章追送往之闕遺啓將來之冒昧況今列土者接畛專政者百輩若率而行之誰曰無請不惟有司疲於簡牘抑恐名器等於草芥雖欲曲全竊將不可又禮經云已孤暴貴不為父作諡若節度合諡而不以其時則嗣子廢先君之德若不合諡而苟遂其志則先君因嗣子而見尊以僕射而言之恐貽越禮之議以國家而言之又殊旌善之體請下太常重議謹議摯肅宗時擢書判拔萃科稽彼寵章資乎禮物以明貴賤諒有等差顧諟國公幸分茅土爵夸五等位冠諸侯爰擇良辰用展嘉事相夫儀式合有司存謁者之行法乃為允報非五品更引兩端宜更諭知使仍舊貫璠丹陽人處士梁昭明太子撰文選後相效著述者十餘家咸自稱盡善高聽之士或未全許且大同至於天寶把筆者近千人除勢要及賄賂者中間灼然可尚者五分無二豈得逢詩輒贊往往盈帙蓋身後立節當無詭隨其應詮揀不精玉石相混致令衆口銷鑠為知音所痛夫文友神情體雅編紀者能審鑒諸體安詳所來方可定其優劣論其取捨至如曹劉詩多直致語少切對或五字並側或十字俱平而逸價終存然挈瓶膚受之流責古人不辨宮商詞句質素恥相師範於是攻乎異端妄為穿鑿理則不足言常有餘都無比興但貴輕豔雖滿篋笥將何用之自蕭氏以還尤增矯飾武德初微波尚在貞觀末標格漸高景雲中頗通遠調開元十五年聲律風骨始備矣實由主上惡華好朴去偽從真使海內詞人翕然遵古有周風雅再闡今日璠雖不佞竊嘗好事常願刪略㣥才贊聖朝之美爰因退迹得遂宿心粵若王維王昌齡儲光羲等三十五人皆河嶽英靈也此集即以河嶽英靈為稱詩一百七十首分為上下卷起甲寅終乙酉論次於序以品藻各冠於篇額如名不副實才不合道縱壓梁竇終無取焉著肅宗朝官侍御史令出惟行人知所向苟不執一將何適從景為行人得被聲教言附邊土而成樂郊聖上哀矜萍流是用安輯厚以富業期乎固心所司為何不廣天澤再有騷動其誰克堪將使戍葵而得年若及瓜而有待五年之復謂盡殊私三徙之人難可奪志俾不滕口庶無怨言徹乾元中任隴州吳山令伊君有燕國隘朔邊當昭王旁求致理遇郭隗自舉推賢乃曰人思爾得禮由我先既築高臺所損者寧辭百鎰斯為下士效死者何啻三千苟柱石之來助冀土宇之獲全原夫纍土足階披沙何損勢迢迢而迥出價洋洋而彌遠寧同戲馬興誘勸以立基有異思仙得富強而為本爾乃經營是設積思方成欹危既差於九仞委棄自多於一籝潛思潤屋之謀寶不足貴遠得利國之術賢豈能輕所以士因臺而取重臺因金而播名振一時之德美傳萬古而風清是則厥狀足徵斯義可考孤峻上符於臣節崔嵬下瞰於王道將昭千乘繼文侯忠良為心未敢一言得季布誠信為寶所謂南金置而非重北方倚而自強來側陋以畢至歷磴道而可常乍激天風還如擲地之響斜臨都邑更同懸市之光想夫典刑有準聲教可則若周室之稱靈似殷鼎而在德穹崇可仰權謀實自於一夫綱紀更張威刑遂加於四國豈比夫銅雀美於魏日章華侈於秦時顧凌雲之小者何積瑤而方之今與燕非匹惟唐接踵康衢絶扣角之詠仄席無築臺之寵顧斯賦之至微安敢為前賢之重叔政肅宗時人農政之先戎事之大乙也業惟田畯流匪兵家固當不見異物豈伊敢有二事屬裔夷壓境殘賊犯邊誰謂百夫之雄且懼二吾之稅退惟憂於餒在進或望於名成秦楊之蓋一州非其事也定遠之遊萬里竊有慕焉誓捐中野之軀寧顧西成之業縣令名當墨綬志在繭絲惟求化洽之方奚必禁人之犯況北虜解辮西戎屈膝聖朝偃伯之日賢相富人之時已見小康孰虞多難是知且耕且戰荷戈非黷武之夫足食足兵釋耒豈惰農之士欲令科罪必使正名
