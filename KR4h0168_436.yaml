  - {type: head, offset: 3788, content: 對被替請選判, id: KR4h0168_NFKB_436-h51, level: 2}
  - {type: head, offset: 3788, content: 甲授官累日被奏替請非時選廢置不許云準敕旨冬已過旬限丁訴云今正在冬當替只在下牒之日且辨論官材不合拘以限約廢置又執賢能以歲時入其書豈可無限, id: KR4h0168_NFKB_436-h52, level: 2}
