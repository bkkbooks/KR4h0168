front:
  text: 全唐文欽定全唐文卷五百二十八况字逋翁蘇州人至德二年進士以校書郎徵遷著作郎貶饒州司戶參軍
  hash: sha256:1171ae53605b4c5dce4d4b7da9fac2f82825b5a859910d3bf6bd0bab46469848
  markers:
  - {type: head, offset: 14, content: 顧况(一), id: KR4h0168_NFKB_528-h1, level: 1}
body:
  text: 隋文帝滅陳蕩定海內煬昏多罪墜失先業身滅國替幼恭以神人非聖莫可乃命太保蕭造奉皇帝璽綬歸我高祖高祖固讓謠歌獄訟已歸唐矣而薛舉王充竇建德等陳勝倡禍為漢祚階夫鹿臺之積非無財也閭左之戍非無卒也湯以七十里文王以百里而臣諸侯非有土也隋地遍天下二帝之業一朝掃盡可不謂大悲乎吳公子札古之達天命者其歌唐思深哉其有陶唐氏之遺風乎氣蒸芒碭龍躍太原天命也昔司馬相如賦子虛諸侯之事非天子之事漢武聞之猶曰朕獨不得與此人同時班固張衡左太沖所賦兩京三都各務誇大而王者受命則闕而不書蓋賦者古詩之流古者採詩言之無罪今王澤不竭斯文未喪翰墨間作其誰曰不然先王建國始以文經上行下效終以武定強本弱枝四方翕然無凶人矣故明德慎罰文王所以造周也應天順人武王所以克商也書云帝堯聰明文思帝舜濬哲文明斷自唐虞洎乎周漢帝王美稱以文為首我唐文德宜在三代之上微臣賦頌恥居數子之下初論隋氏顛覆次論皇家開統末論告厥成功於上帝鋪乎下土播乎無窮固非常才淺慮之所能及意者實以祖宗光靈引耀鼓動之所致也其辭曰在桓靈之道曀兮本小而末大下陵而上替君臣相失南北歷帝天醜隋而命唐纂周漢之鴻裔大哉文王王季其父武王其子父作子述叶天命以應期煬為不道庶官攜二魚爛土崩荒沈所致雖曰匹夫之勇有盜中原之意凶貫既盈果不保於神器江都之禍酷甚望夷之事亡國之君雖帛丿糸古而必類王者父天母地非所以苟其身而貪厥位豈有男女疾痛而父母不為之歔欷乎此真主所以乘時而建義也曾不一戰而得行其志湯武應天也其實誓師高祖受禪也其實揖讓猶感思以慟哭乃立代而尊煬仗順而升蓋前經之所曠承土德以播業兮與炎靈而更王維李其根降居真源洎武昭之隴胄揚太祖之周勳典則明融是將貽乎子孫高皇生而豁達大度徇齊弱而能言神光佳氣兮爛以氤氳兆白雀兮戴紫雲隱隱曈曈兮始乎太原君子得時有如追奔岷峨導江兮河出崑崙雷砰電掣浩浩渾渾厥波雖雄為海所吞乾健而坤順兮利配乾而法坤有何姦豪恃險偷存乃建皇極鍾乎歷數革舊鼎新兮式閭封墓百神以咸秩兮包五嶽而作固過蒲津而川后增流兮次霍邑而山靈告路彼上磣下黷兮我寬刑以薄賦陋茅屋兮土階遵朱干與大輅乃有嚴更之署環衛鈎陳文昌武庫玉册韜府兮內八景之真文金盤粲霞兮承九天之清露元聖有作恢法度也厥祖草昧諸夏宗臣蠻夷酋長從德如歸若王固讓而天下可違乎有社稷焉不可闕祀有蒸人焉不可無主是以木曰威仰火曰熛怒辰戌丑未王我唐土天實若曰四海橫波虔劉札瘥若王盤桓奈天下何義寧二年五月甲子高祖即位木宮曰甲水宮曰子干支相生成字為李雖子卯不舉而以是為戒此臣子所以服泰階也神祗叶從龜筮攸同乃更正朔以刀文為開通告於上下豫昧乃德嘉乃丕績若將殞於厥躬草艾渠魁兮罔駕英雄拔萬姓於湯火兮散三光於昊穹此皇王所以職教化也非天不應非聖不作造我巨唐在夏之興弻成九服經啓九道荒厥迹之茫茫在周之興西至流沙東至樂浪重九譯乎越裳在漢之盛大夏身毒月支夜郎辰韓之國畫革傍行未若我唐歌其聲舞其容十有二部鏡立乎中央唐既有土德樂亦有臣妾易曰殷薦上帝又曰行地無疆提封所經聲教所被窮天下之琛怪截海外之梯航逾蟠桃而跨弱水兮蓋四十萬里鳥飛驥騄兮鱗萃乎艅艎不以三代為境土七雄為富強乎何則漢高提劒學校興於文景周武載戈頌聲作於成康卜代三十延祚四百亦謂之享國久長與夫青牛紺憲白馬朱鬃報千祀於元君兮呼萬年於太行林邑貢能言之鳥大宛奉汗血之馬孰與四白鹿四白狼乎擒建德於武庫兮格魏公於敖倉耕有三十年之蓄以備凶荒戰有百萬衆之師以讋戎羌胡驕則馬銜塞草寇虐則龍決天潢又孰與周漢之廣建康莊在歲九天之下九地之上兮合二九為一方凝碧樹於洞房送白雲於帝鄉舞破陳於清廟兮準文始於西廂迎氣於東郊兮養老於上庠禘祫之禮秬鬯圭瓚兮辟雍明堂襲蛟爐之馥馥謺鼉鼓之鏜鏜羽林孤兒青矜胄子森琳琅以鏘鏘河山巨防百二盤岡渭水貫都兮來天漢之湯湯浞龍宮而捎鬼國延苑囿而峻墉隍馬畐駝騊駼犀象乘黃附翼之馬骨騰肉飛滅沒陸梁鷟出女牀鶤雞白鷴孔翠翺翔縮沙磧與江湘休徵四塞兮花萼連芳大容揮絃兮子晉吹簧飛廉馳道兮河鼓服箱雍門韓娥流徵叩商徹歌鐘於未央校羽獵於長楊升平既久兵設不防虜自燕垂陷乎洛陽雲雷遘難金火耀芒上帝之哀下人兮生魂魄而起膏肓肅宗龍飛日出鳳翔兮肆誅犬羊代宗赫怒兮草被嚴霜復九廟之郊禋三辰忽乎煜煌扶已撓之厚棟維既絶之頽綱然一胡作亂四海奔亡父習乎勇母抱其子乘城看戰電掃八荒天下大定朝廷無事帝端拱於穆清呀溟渤以為池兮拓宇宙以為城務子來之經營乃有棟宇之盛碔砆石肅石刻桷雕楹甲乙於方中兮勢夭矯而上征東西兩京嶽立雲峙宮室相望八百餘里雖千數萬名猶未盡也翼翼峨峨重關四塞抵昆明而瞰太液象蓬壺之廣大踐太華而節終南抱周秦之襟帶於是偃師偶人郢匠圬墁之輩工發藻繪情生眄睞式瞻魄駭爰處體忲乃有輿服之飾縷轂錯衡霓旌羽蓋紋窗繡戶窅玲瓏以相對明月夜光煥合影乎其內青琴素女間木難之首飾響結緑之腰佩嗟神人之叶和感雨露之雱霈職貢隘入舟車溢載馮夷陽侯既降於英靈木魅山鬼不勞乎祈賽於時太府太倉粟腐繒敗荔枝橘柚魚鹽惟錯之蓊隘幽明黜陟輕重約法之殿最垂二百年天下九百餘萬戶六千三百萬口徭輕斂寡國富家肥砢硪嶻岌硠硠礚礚兮沸渭馺沓訇訇噦噦兮亘地罄天來朝會兮天子於是乎班瑞等威卑其君長降為牧守宸襟恢張以天地之無外一萬二千年為一紀三萬六千年為一代古者登泰山七十二君兩漢踵武亭亭云云八百餘年寂寥無聞我唐傳祚以來革隋一封岱二克復三除凶四五將發三門備南正司天北正司地勾測影於北至建相風於南寺太微太一金版玉笥逮夫淹中闕里之類蓋三十萬卷傾古今之文字振古以來未之有也其事始於武德成於貞觀興乎開元天寶之間唐虞夏殷之世不足多也然則天子四海為家六合為都方明參乘昌宇為御三代考績五載一巡狩觀萬國之有無禹會會稽舜遊蒼梧曰徯子后后來其蘇天子於是命有司興農圃廢土木放女謁斥讒夫臣拜手稽首載陳厥謨康哉良哉恥其君不及唐虞稽天地之不平兮蘭何為兮早秀菊何為兮遲榮皇天既孕此靈物兮厚地復糅之而萌惜下國之偏多嗟上林之不生至如羅玳筵展瑤席凝藻思開靈液賜名臣留上客谷鶯囀宮女嚬泛濃華潄芳津出恆品先衆珍君門九重聖壽萬春此茶上達於天子也滋飯蔬之精素攻肉食之羶膩發當暑之清吟滌通宵之昏寐杏樹桃花之深洞竹林草堂之古寺乘槎海上來飛錫雲中至此茶下被於幽人也雅曰不知我者謂我何求可憐翠澗陰中有碧泉流舒鐵如金之鼎越泥似玉之甌輕煙細沫靄然浮爽氣淡煙風雨秋夢裏還錢懷中贈橘雖神祕而焉求大歷迷者至莽然之墟也前山極高猶在其下聚首峨峨去天無多中有靈草洞泉澆沙倒壁挂松靈蒔接波乳竇滴瀝芝房駢羅野火不鑽枯木戛摩陰岑膠加流響滅華陽岡豁寥上景澄霞何意萬里之荒谷兮有此數百家此家何代圖記不載為當去殷為當避秦商山老人不為漢臣豈知人情之險鄙征稅之愁辛迷叟歸到家持辭不可陳兒征防丁女事東漚神龍吟兮鳳舞莽墟之所超逍遙以容與臣况言臣聞上古滅迹以恢至道其次立名以扶大化臣山谷之人頃為韓滉參謀滉性嫉惡臣性孤直滉先朝露臣復故山陛下拔臣臣况口噤汗出不敢論天下事然自開元天寶以來耳目所接精經茂德略有百人不霑一命非不欲出無益所以不出豈大國無人而黨與之徒未詳菽麥驟居清貴此由權臣上負明主下負蒼生中遏賢路耳是非邪正勢不兩立唐有天下賦斂甚薄刑罰甚寬神人保和鳥獸咸若然而時有反側逋逃之誅得無因乎惟天啓聖無有一物不得其所書曰遠人不服來以文德德猶土也廣厚載物文猶火也光明麗天剋金之象生土之義蓋聞朝出㣥龍多士如海出夜光明月所以別好惡而扇華夷未有影不從表聲不從聽聖德惟新頌聲不作臣下之闕也謹進高祖受命造唐賦一篇論皇家大慶歷祚延久恍若光靈促臣上獻伏惟陛下赫赫巍巍與天同功鳳凰巢於阿閣麒麟乳於郊藪臣之願也無任冰谷之怖謹奉表以聞臣况誠惶頓首頓首謹言議曰韓滉天然風操自建名實馭下威重允凝績用頃天下兵興務給財食月計億費王府一空中歲滉領小司徒實專出納平準齒革之材貿遷虞衡之賦邸無斂貨巿均靡物加以嗇用殆復充盈洎擁旄吳楚封略數千里盛名大烈望而斯畏嚴令山鎮不可輕沮諭意維揚則張瑗之謀戢矣飛書斬將則沈清之亂平矣采衛邦伯文武陪寮怙勢之徒負阻之族莫不軋軋如也且天寶以來江左無事物産資贍文法浸寬貪夫徇財小人趨利求茲官者十恆八九滉柅能制動絲克理棼過之所至刑必糾之非能之不知方矯時而為理興元初姦宄偷變震驚我師滉首獻方物奔貢漢中慶賜遂行邦用由濟貞元初歲不有秋秦將歉食上憂乏用人心大搖滉發廩救災不俟終日萬鍾繼至三輔斯給昔蕭何轉漕關中寇恂資用河內皆以勤王幹蠱推功第一若敵而言則滉之功非細也爰命作相咨以財計用統邦賦漢粟誠多超古之才高謝主臣而已會登用日淺其道未光然纍行疇庸可得而擬諡法曰慮國忘家曰忠安君不念己危曰忠滉安國荒饉濟君艱難屬時多虞立權修賦危已從怨忘家在公得非忠乎諡法曰剛德克就曰肅執心決斷曰肅滉剛而得位師克以貞令出惟行刑其必犯得非肅乎臣聞舉善不必求備易名是其大者昔謝炎定諡特以忠肅裦榮何曾議諡詔以忠肅追美稽滉勳勞無忝前烈伏請諡曰忠肅謹議樂殷上帝上帝臨下俾夫文星驚動民心二南六義在乎章句安樂哀思在乎音響君子入其國觀其樂知其教制氏徒備乎鏗鏘此立言之大傳稱不朽易曰尚詞唐詞臣姓陶氏諱翰冀方思深之裔前漢青後漢謙東晉侃至靖節貞白二先生生人表秀間朝育才方守省署慶鍾於君開元十八年進士上第天寶文明載登宏詞拔萃兩科纍陟太常博士禮部員外郎喉舌密勿壇場破的無發不中行在六經志在五言尤精賦序朝出暮遍殷如奮鐸聲塞海隅化諸溺音蔚公之容風山籟靜然華實光於苑圃綦毋著作潛王龍標昌齡則其勍敵登公之門李膺之門也鮑馬二京兆中書謝舍人良弻良輔侍御史李封殿中劉全誠名自公出名著公器神人所怪寧貴不名詳矣大抵文體十年一更有體病而才贍有言紆而事直有文勝而理乖雅豔殊致雲和之源杳以無窮折為萬派嗣子問儒為法官捧先人之集霜露之疾將訴於吾綦母通問之世友撫事編次咨於彞訓稽於故實是有冠篇之述乎哉上天文明以配我朝光照四海麗於百穀主文之臣如太皡之於勾芒先甲之士也公姓劉氏名太真天寶中與兄太沖登秀才之科蘭陵蕭茂挺目以孔門遊夏官踐御史左史尚書紫微郎祕書監工刑部二侍郎時謂得人翕然慕義恐在其後君既聳善心親人色與人行加人言勝人在位者見君之如此物惡其上自然不容君既施政春煦物雨濡物風動物惠歸物在位者又聞君之如此主恩人望斯未之替竟免其官亮彼褊人不徵細故必獲他咎竊名之黨自此而堅然則於是清響不奮哮嘵有聲或以其言黷朝典賤子西嚮泣拜曰不然日月有蝕五星有孛故能成天之紀唐堯之時亦有讒豎故能成堯之大夫國有蠧如樹之有蝎不敢竹罒冖伐焉役文之士懼禍之不暇朝夕虔惕苟無深疵不敢言瑕春秋暮矣溫溫生疾竟終餘水之上君門深而不得覲舊山邇而不得歸明主方覺而君已沒有文集三十卷遊名山而窺洞壑者略舉奇峰紀勝境至於鬼怪不可紀焉臨終賦詩意不忘本凡古人所詠山水遊仙田家之什脫罻羅走思以自適其可得乎奄忽之辰以况從表兄弟平生相愛手運遺札心存顧託冢子諷構厥德不忘前好得而敘之因都國出麟角鳳喙為續斷之膠與本無異朱君能以煙霞風景補綴藻繡符於自然山深月清中有猿嘯復如新安江水文魚彩石歷歷可數其杳敻翛颯若有人衣薜荔而隱女蘿立意皆新可創離聲樂友之什情思最切雖有諫職心遊江湖謝病而來慕出塵之侶精好涅槃維摩經愛人為善有志未就終於廣陵舟中識與不識聆風嚮義相與興歎我主人延陵包君兵部李侍郎禮部劉侍郎皆有託孤之舊子郁襲其先行敬事父友泣捧遺文祈余冠序聖人賢人皆鍾運而生述聖賢之意亦鍾運盛衰矣開元十四年嚴黃門知考功以魯國儲公進士高第與崔國輔員外綦母潛著作同時其明年擢第常建少府王龍標昌齡此數人皆當時之秀而侍御聲價隱隱轥轢諸子其文篇賦論凡七十卷雖無雲雷之會意氣相感而扶危拯病綽有賢達之風拔身虜庭竟陷危邦士生不融可以言命然窺其鴻黃窈窕之學金石管磬之聲如登瑤臺而進玉府靈扃邃宇景物寥映緑流翠草佳木好鳥不足稱珍嗣息曰溶亦鳳毛駿骨恐墜先志泝洄千里泣拜告余曰我先人與王右丞伯仲之歡也相國縉雲嘗以序冠編次會縉雲之謫亡焉後輩據文之士風流不接故小子獲忝操伏恐魂遊無方嗤責造次茫茫古道不見來者豈以龍戰害乎鹿鳴齊竽競吹燕石爭寶嗚呼薄遊之士未躋一峯己伐其峻登閬風者乃知其迤邐昏明掩豁將盡復通之者其若是乎豫欲觀天人之際察變化之兆吉凶之源聖有不知神有不測其有干元氣汨五行聖人所以示怪力亂神禮樂行政著明聖道以糾之故許氏之説天文垂象蓋以示人也古文示字如今文不字儒者不本其意云子不語此大破格言非觀象設教之本也大鈞播氣不滯一方檮杌為黃熊彭生為大豕萇宏為碧舒女為泉牛哀為虎黃母為黿君子為猿鶴小人為蟲沙武都女子化為男成都男子化為女周娥殉墓十載却活嬴諜暴巿六日而蘇蜀帝之魂曰杜鵑炎帝之女曰精衛洪荒窈窕莫可紀極古者青烏之相冢墓白澤之窮神姦舜之命夔以和神湯之問革以語怪音聞魯壁形鏤夏鼎玉諜石記五圖九籥説者紛然故漢文帝召賈誼問鬼神之事夜半前席志怪之士劉子政之列仙葛稚川之神仙王子年之拾遺東方朔之神異張茂先之博物郭子潢之洞冥顏黃門之稽聖侯君素之旌異其中神奧陶君之真誥周氏之冥通而異苑搜神山海之經幽冥之録襄陽之耆舊楚國之先賢風俗所通歲時所記吳興陽羡南越西京注引古今辭標淮海裴松之盛宏之陸道瞻等諸家之説蔓延無窮國朝燕公梁四公傳唐臨冥報記王度古鏡記孔慎言神怪志趙自勤定命録至如李庾成張孝舉之徒互相傳説譙郡戴君孚幽賾最深安道之允若思之後邈為晉僕射逵為吳隱士世濟文雅不隕其名至德初天下肇亂况始與同登一科君自校書終饒州録事參軍時年五十七有文集二十卷此書二十卷用紙一千幅蓋十餘萬言雖景命不融而鏗鏘之韻固可以輔於神明矣二子鉞雍陳其先志泣諸父友况得而敘之
