front:
  text: 全唐文欽定全唐文卷七百二李德裕七
  hash: sha256:a147195d0f87f57f8c2e229a724bba2aaea28da0d285f3f33287c71959b30e96
body:
  text: 右緣王茂元雖是將家久習吏事深入攻討非其所長訪聞東畿自聞狂寇侵軼尚未安定茂元縱得痊復且要留鎮河陽行營諸軍須便有所委茂元疾雖加重朝廷亦免他虞前月二十九日延英面奉聖旨亦以兩道節度同在一處非便臣等商量望授王宰兼行營諸軍攻討使如蒙允許望加劉沔張仲武招撫使例降黃敕處分未審可否右訪聞冀氏去潞州最近才二百里已下於此進兵最當要害翼城亦是大路須備賊奔衝石雄雖兵數已多終是分張處廣闕須初允所請方可責其成功今緣西備蕃戎邊鎮不可抽減向東抽發又不及幾訪聞奏事軍將張宏慶云陳許徐泗兵初到行營軍外子弟有一萬人已上緣未有戰陳聞不得已稍卻歸本道今猶有少壯堪充戰卒五六千人皆是父子兄弟人心齊一臨時使用絶勝諸軍冀氏去賊最近石雄又至驍勇假其兵力事必速成陛下方集大勳不可更惜小費臣等商量望賜石雄義逸詔令與陳許徐泗軍外子弟各召二千人並須揀少壯有武藝堪入戰陳者充仍望約陳許長行制度支權給衣糧徐泗緣有醬菜望以兩處兵馬皆在行營事體須同不可獨給如蒙允許望速賜詔示右臣等昨於延英奏請降中使問薄仲榮生口四十人內幾人是赤頭郎聖意以元逵之故不欲更問臣等商量緣薄仲榮是賊之心腹必盡知謀計終要遣使出城勘問賊中兵馬多少諸界布置防備何處今欲入兵何處最當要害兼問賊中人情還思歸順否直對鎮州押衙軍將仔細勘問不要回避必得事情因此不妨便知生口赤頭郎數元逵知勘赤頭郎賊中事宜必不疑慮因此兼勘河陽魏博生口以此參驗必知未審可否右伏以殘寇未平須廣求良計臣等苟有所見則合上聞遠則韓信近則李靖皆臨刑免死後立殊勛忽有其人亦不可料望令勘事中使宣問如有奇計祕能必取劉稹或可以反間令自相梟戮及能設計取彼州縣兼招得都頭者並仰速具事由聞奏如計畫明切便堪施行即貸其死命令於諸軍敕命不妨有可採録或助戎功可否之間在於宸斷右緣王宰兵已深入須取澤州又恐賊於萬善向東衝突須更克寸期齊進正月六日並是良辰一日雖是歲首亦合軍機緣軍在行營歲日與常日無異賊中有州縣村閭隨分必須作歲乘其無備必易成功其兩日伏在聖明裁定戎事尚密所降中使望計行程令取事前兩日到行營即待又恐賊中困蹙即自有變望密詔王宰石雄義忠等聞彼有變便須星夜兼進先差專使與彼大將書具云初經變革須得王師應接以安人心兵馬並不入潞州只在三數十里內下營並不驚擾村閭即當秋毫不犯直須待立功軍出潞州新節度使入後處置大段公事了方得抽軍其元逵宏敬緣隔山東又恐漏泄此意並望不賜詔示如蒙允許望付翰林各賜詔處分右臣等得李石狀報劉稹潛有款誠伏以王師壓境已是六月賊軍纍經侵軼頗肆猖狂今事勢窮困人心思變因此請命冀逭靈誅望詔李石且與李恬書不得云已與奏聞但遣將兵屬直界首方敢上聞以此邀之更觀旬月仍望詔元逵宏敬王宰石雄便令齊入切料旬朔之內必有變生今饋運之費計至春末並足如二月以來尚未殄滅然後議納其款事亦不遲如蒙允許望付翰林各賜詔處分右臣德裕得忠順狀請自至界上親臨賊營專看事機首為撲滅緣當道軍馬數少請軍馬一二千騎臣等商量緣可汗移營已近振武忠順勇於戰鬬必可指蹤河中地間馬軍有朔方舊法都虞候闕川防戎臣素所諳知望發馬軍五百騎令王縱部赴振武取忠順指揮今當回鶻衰殘亦要及時驅逐事有應變不可憚煩仍望賜絹一千八百匹內三百匹充職掌人優賞以戶部物充度支差綱發遣兼望令中使送如蒙允許望付翰林賜詔處分兼詔示忠順守志其賜忠順狀謹遵連封未審可否右臣等近訪聞賊中之計只待林木陰合以老王師如此遷延必恐過夏伏見元和中憲宗緣淮西久未成功遣尚書右丞許孟容至行營宣慰令面詰責光顏重允纍取光顏等及大將以下狀皆請一個月內併賊自後不敢逗留纍破大城柵憲宗又令梁守謙往遂破郾城續令裴度去竟破淮蔡去秋李回唯至魏鎮兩道王宰石雄並未有制使宣慰臣等商量望令李回至天井冀氏宣慰兼取王宰石雄及諸軍都頭兩道大將等狀令具破賊期限聞奏如蒙允許望令乘遞早發未審可否右緣安義節管沙陀兵馬三十餘年蕃人之心最尚讐怨戰陳之際固難隄防李丕既不主兵無以自衛且令在州綏緝應接石雄行營每欲進兵與其謀度不妨理郡兼得坐籌如蒙允許望各賜詔處分未審可否右奉宣令臣等商量奏來者臣等喚得王逢細問王逢云自領行營兵馬便在榆社並不到儀州其涉縣道路遠近山川險阻先不曾諳委又恐李克勤所通涉縣多少未得諳實今請於儀州置軍糧迤邐下塞兼側近捉生勘問委知涉縣無賊大兵鎮守方可進軍又云榆社河東怯弱終不堪用代山向北軍馬王逢曾經使用郎校精強今來是防秋時請委節度使除蔚州飛狐靈邱與幽州接界外代諸州軍量抽二千人即得此二千人已敵榆社五千人又向北烽子約有一千人敵已來極徑耐辛苦一人敵十人量抽五百人將赴行營每隊與十人五人令陰入賊城非常得力又云李克勤與一千二百人無闕三百人已來堪用臣等商量且差中使押領李克勤赴榆社至晉州過日先召取李丕與李克勤面議機計審定入兵處所録取兩本狀一本封進一本將與義忠其所要兵馬多少及進軍時日並委義忠與行營大將及克勤審細商量奏聞如可決行須便應機速去不要更待進止即事得神速免漏軍機如蒙允許望賜義忠李丕詔處分未審可否右伏以饋運支計本約至五月今若五月未平小寇即須便過盛暑臣等夙夜思慮切要改張石雄西面險阻須得王宰義忠深入方可進軍榆社兵甲未足天井固難獨入以此故遂成因循訪聞魏城絶當要害向南十二里至狗脊嶺雖有小山並無險阻二十五里便至武鄉縣直抵潞州便是平川臣等訪問王逢須得一萬精兵方可前進今側近更無徵兵處遠處又不及事望降中使與石雄商量便將義武步兵萬人就義武馬軍兼沙陀馬軍五百就榆社沙陀此外於中武部兵及河中衙隊共揀七千人通約似僅一萬人并榆社宣武亠兊海義武馬軍都是一萬五千精兵足得濟事取魏武路直入旬月必見成功冀氏翼城猶有一萬八千人但令保險又守城寨權差供奉一人監領待石雄得武鄉後即令冀氏翼城諸寨兵馬齊進與石雄合軍仍委石雄與李丕同商量如此穩便即須排比今月中旬末赴魏城事貴神速不得漏泄右昨者初夏頻請進軍所冀未熱之時便見次第今炎毒已甚迫促稍難殷宗伐鬼方周公東征皆三年乃克寸淮蔡滄景亦經四年王者之師以全取勝急攻則狂賊得計稍緩則賊勢日窮况出內庫貨財以資軍食計量饋運必及冬間緣兩道皆有供奉官非惟節將心不敢安難於擇便亦恐營柵甚暑不易祇供望賜詔各令且回兼詔示王宰石雄亦不可稍緩之意但云時方炎暑恐供奉在彼有妨戎事任卿自擇便利不得安間開元格臨陳對寇矢石未交先鋒挺入陷堅突衆賊徒因而破敗者為跳蕩右開元中酬跳蕩功止於武官及勳比今日流例即事校簿其立跳蕩功與格文相當者不問軍將官健白身便望授監察御史如已是御史者超兩資授憲官已至常侍大夫者臨時別望優與處分其先鋒第一功如有官者便授檢校將軍卿監纍官至賓客者即授御史其第二功無官者授一作擢檢校少卿監及中郎將纍官至賓客者即與御史開元格跳蕩功破賊陳不滿萬人所敘不得過十人若萬人以上每一千人聽加一人其先鋒第一功所敘不得過二十人第二功所敘不得過四十人右三等立功人數請依開元格收敘如過此數並望落下開元格招得一萬人已上其頭首一人準跳蕩功例一千人已上準第一等例賊數不滿千人量差等處分右若依舊格難有此例今望招得一千人便準跳蕩例五百人準第一等例五百人以下節級處分開元格每獲一生酬獲人絹十匹右緣並無軍將官健等第稍似不備今請獲賊都頭賞絹三百匹獲正兵馬使賞絹一百五十匹獲副兵馬使都虞候賞絹一百匹都虞候以上仍並別酬官爵如是官健仍優與職名獲賊十將賞絹七十匹獲賊副將賞絹三十匹獲賊赤頭郎及劉稹新召宅內突將賞絹十匹獲賊長行賞絹三匹如是土團練鄉夫之類不在此例每獲生口便望令所獲人對中使點勘上歷不得令有虛妄其賞給時亦望令中使自對面分付以前件開元格如前臣等商量緣比來大陳酬賞只是十將以上得官其副將已上至長行並無甄録今但與格文相當即便酬官所冀盡沾渥澤又緣每陳獲生並有優賞今據開元舊格等級加恩如此則頒賞有名人心知勸如蒙允許望各賜詔仍封賞格令榜示三軍未審可否右臣等商量賀意比因楊辨作亂之時已涉賊中言語究其蹤迹必非循良深知王宰不知為其詿誤若不尋問旬月後王宰的自知見朝廷隱忍必懷憂負又不一度明辨石雄轉有所疑望付封晉絳所進賊中文書詔示王宰及守度對王宰追賀意勘問如審有潛報蹤由便就行營按軍令如涉曖昧即令王宰差使押領送上都其遊奕差替聞奏仍望詔示石雄未審可否右健兒等敢同元惡久抗王師比屋皆誅未足塞責然以此軍忠義未嘗失節艱難已後頻立戰功赤頭赤心皆是賊妄立此名以張聲勢未必人皆敢勇生死一心所慮玉石俱焚善惡同棄詔王宰石雄義逸國亮許其自相糾出如是鄆州父兄子弟及從諫處招到凶惡將健等乘用兵後為劉稹出死力戰鬬先犯官軍毀罵行營節度使者任自推出即免纍及平人伏料如此號令必不敢容蔽凶黨其合誅戮者亦自甘心昭示四方稱朝廷弔人伐罪之意如蒙允許望付翰林約此意詔示未審可否右臣等見鎮州奏事官梁居簡稱城內並無禮於元逵凶惡頭首推出二十餘人並梟戮訖其餘皆懼殺戮卻閉城門伏以寇孽既平盡是國家城鎮控制河朔須存壘垣豈可更令元逵窮兵攻取望中使賜城內將士敕書招携各令安堵仍賜元逵詔便令抽兵歸本道并賜盧鈞詔亦令自遣使安存未審可否右件州縣兵馬並準江淮諸道例割屬本州收管所有解補並委刺史自處置訖闕二字如鎮遏十將以上是軍中舊將兼有憲官不願屬刺史者並委盧鈞追上驅使右緣地貧俸薄無人情願多是假攝破害疲氓望委吏部於今年選人中揀幹濟曾有績效人稍優一兩任注擬其俸料待勘數到續請商量聞奏以前並是積久之弊且要改張所冀刺史得主兵權免受牽制官人皆由選擇可委緝綏既無軍頭干侵自然得施教化臣等商量如前未審可否右邢州城門盧宏指稱劉從諫安置昭義軍額龍罡縣安置邢州額刺史李行循見在縣中安置伏以朝廷制置必在正名劉從諫曾不聞奏擅自移改臣等商量邢州額望依前於城安置刺史便勒移入州內如亭臺有僭侈處並勒毀拆訖聞奏龍罡縣依前充縣令理所右緣李回等稱黠戛斯使云今冬必欲就黑車子收回紇可汗餘燼切望國家兵馬應接黠戛斯使回日已賜敕書許令幽州太原天德振武各於路邀截出兵伏以控馭蕃戎最在誠信既有期約不可參差須遣使臣早為布置其劉濛便望靈武至天德振武取太原路赴京兵力素全番人至衆只要令先事揀練兼修整器械緣纍年用兵計所闕者最是兵仗早須為備擬仍令代北諸軍鎮添補逃亡官健及點檢退渾沙陀等部落樅樅排比至防秋時且各令於把頭烽內要害城鎮屯集待知回鶻指的消息即於山外邀截其天德自西受降城至振武穿陰山賊路如有要路削及添木石填塞處早令下手修繕仍於要路深掘壕塹多置陷馬坑須防黠戛斯向北蹙逐回鶻入塞唐突緣天德振武兩處兵力寡少恐須臨時接借望委劉濛與節度防禦使仔細商量據下切要聞不得妄令申請其幽州兵馬至多不得先令排比待冬至初續降中使賜詔如蒙允許望付翰林約此意各賜詔處分未審可否右今日見石雄報狀盧鈞因出城至斐村送兵馬步軍遂回旗劫掠以此知盧鈞都不曉戎事從前發遣兵馬節度使不合出子城諸城門亦合先布腹心把捉聞昭義軍中畏懼石雄稍甚如軍亂未定且要石雄提挈精卒自至澤州移牒索亂軍頭首如送出首惡其餘不問計必當無事如指揮未定且要分五百人兼揀好將鎮守端氏城其端氏城是劉從諫近年修築非常牢固去年劉稹阻命安全慶軍元在端氏所以敢擾西界今若分兵鎮守端氏即翼城盡無可虞又恐亂軍潰散於諸處劫殺河陰兵馬切不可抽亦須稍加警備石雄忠勇思慮恐未周至伏望賜密詔處分謹録奏聞右伏以前代伐叛皆須先諭文誥倘未柔服則當臨以兵威古人云明其有罪敵乃可服緣黨項自麟府鄜坊至於太原遍居河曲種落實蕃其間皆有善良豈敢盡為暴害况北有殘虜西有犬戎使其二心終成邊隙切要存以大信示以優恩撫納不悛然加顯戮便須擒盡首惡永絶禍根如此則朝廷誅之有名彼亦無怨臣等商量望差給舍一人令邊鎮出兵護送且至叱利鎮城下密召酋長喻以國恩問其屯兵事由有何冤屈既命親王為帥又有巡院監察只合詣闕伸冤豈可便興師旅殘毀城戍焚村閭百姓何辜受此塗炭其首謀逆叛及打破邠寧鹽州界城堡罪人並須分別送出仍須自本族酋長不特是族內平人善惡既分邊境寧靜即且為容忍待之如初若不送罪人猶敢嘯聚必當大兵誅討他日不得有詞如蒙允許臣等續揀擇使臣聞奏仍望付翰林約此意撰敕書未審可否右黨項久為劫盜須示嚴刑比者且務含容猶可待之恩信今者自知惡稔朝廷將欲剪除必恐轉不自安更懷姦計出師則鳥散山谷抽兵則蟻聚塞垣日往月來漸成邊患望賜王釗士幹詔及其屯集未散速令攻討如已退散則須乘此兵力驅出南山其打破城堡及於叱利鎮屯集者即且驅出令於平夏放牧不得更過山險切須分別詳審不得枉及無辜務令邊塞永清商旅無滯冀因此舉盡獲叛徒未審可否右臣頻奉聖旨緣回鶻漸逼把頭烽早須討襲兼如何取得公主者臣久經思慮非不精詳回鶻皆騎兵長於野戰若在磧鹵難與交鋒雖良將徑卒無以制勝臣比聞戎虜不解攻城則知除馬上馳突其他並不慣習臣料必無遊奕伏道又未會斫營倘令石雄以義武馬軍一千騎兼揀退渾一千騎精選步卒以為羽翼銜枚夜襲必易成功臣夙夜籌度無出此計如以為允伏望各賜密詔處分臣伏望留中不出右臣伏見報狀見幽州雄武軍使張仲武已將兵馬赴幽州雄武軍使今日奏事官吳仲舒到臣宅臣扶疾與之相見細問雄武只有兵士八百人在此外更有土團子弟五百人臣問兵馬至少如何去得仲舒答臣云只繫人心歸向若人心不從三萬人去亦無益據此説即是仲武得幽州人心又云張絳初處置陳行泰之時已曾喚仲武欲讓與留務是衙門內一二百人未肯仲武行至昌平縣去幽州九十里卻令歸鎮臣又問萬一入不得即有何計仲舒云幽州軍糧並貯在媯州及向北七鎮若萬一入未得郤於居庸關守險絶其糧道幽州自存立不得伏以陳行泰張絳皆是邀求符節固不可比仲武先布款誠候朝廷指揮因此拔用必能盡節加之恩寵亦似有名緣在假未獲面奏謹先密奏伏望留中不出右臣數日來竊聞外議云田肇緣田㣥抵法不食而終義動人倫無不傷嘆伏見後漢時河間尹入潁川人史玉皆坐殺人當死尹次兄初史玉母渾皆詣官曹求代其命因縊而物故漢帝哀之並赦其死既有故事敢不密陳臣若於中書公論必外為人傳説臣對諸宰臣不敢議及此事今手狀陳奏實願發自天慈必冀中外人心無不感説臣與田肇兄弟唯識其面未嘗交言班行具知非敢謬妄况臣年近六十位忝上公唯願竭肺肝上裨聖德豈敢稍涉情故罔惑聖聰此伏願留中不出狀右臣適見度支報狀王宰已似納其情款發使之時不以先聞便受表章欲自擅招撫之功昔韓信破田榮李靖擒頡利皆是納降之後潛兵掩襲只可令王宰失信豈可損朝廷武威建立奇功實在今日必不可以太原小擾失此事機緣內養尋常充使恐節將未便承稟伏望降供奉官今日便赴行營自首進軍掩其無備兼許三軍倘立殊勳必比諸軍倍加賞賜如劉稹已出潞府須令全家面縛兼郭誼劉公直張谷陳揚庭李仲京等面縛即受領如劉稹自來卻令送回輒不敢受兼要降供奉官至晉絳行營密諭石雄若王宰已納劉稹即石雄無功可紀纍經大陳自當矢石垂成之際須自取奇功便看齊入勿失此便右太原只自貧虛犒賞不足從前人心忠順况一千五百人豈足為事必不可姑息寬縱况兵事未罷深慮所在動心望賜李石詔且令身赴行營於側近徵兵討亂兼遣義忠卻赴太原許罪其首惡其餘一切不問若兵力可及便須翦戮頃年張延賞在西川因張朏作亂走至漢州卻得入成都今令李石且依有兵處卻入則不損朝廷威命兼不妨榆社有兵望降使處分以前件臣緣假日兵機切速不暇與李紳等參議謹密狀奏聞如蒙允許便望今日右高迪稱賊中更無他計只是潛抽兵併向一處排陳引官軍索戰官軍即須探知若攻城寨來即要與戰如不來並不要將兵逼逐緣偷兵併來停住三日不得即須卻歸本處但三四數度不與戰即賊知官軍覺其情計自然喪氣如此不得便宜後必軍人別有變故每度出軍排陳官軍便逼逐與鬬皆是落賊姦計一度小得便宜後知官軍三個月瘡痍未復即撤兵又向別處切要王宰石雄義忠常密遣細作探知偵知諸處抽兵來即不要戰知抽兵卻兵虛處即入兵攻討但常如此支敵萬萬不落便宜右高迪稱鎮州魏博兵馬至多並未分得賊勢緣不離舊處下營一兩個月一度將兵深入燒掠村閭驅討牛馬與乞火相類賊中並固守城邑外有村閭牛馬賊亦不惜今須令鎮州兵馬移軍下寨扼其要害每移三二十里即得魏博即須令早過漳河若且如今日下營處賊中都未忙忽灼然分賊勢未得又云河北節度使朝廷若會其情甚易驅使每賜詔切要好言語優獎彼此不要令知與元逵詔即須云一切委任元逵與宏敬詔即云一切委任宏敬但稍示親信必自盡心以前謹具如前高迪雖是河北軍將臣每度與言頗似忠信盡望付翰林約此意賜元逵宏敬王宰石雄義忠詔所冀速平殘寇謹録奏聞
