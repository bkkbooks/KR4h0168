body:
  text: 臣聞鏤鼎書旗必歸於勳德分茅建秩允屬於賢良明朝無濫賞之文聖代絶且侯之論其有功標峴首業著燕然殊恩尋降於虎符睿渥己頒於龍節旋遇蛇蟠劍棧棘植銅梁遮日月之回光阻山河而倒浪今則初開九折漸涸長鯨宜宣既往之恩合舉己行之命臣熟稽通論方敢上聞儻無棄於瞽言庶有裨於元鑒臣伏見東川節度使顧彥暉門傳將略代襲軍功佩董卓之雙鞬撚繇基之一鏃南金鍊質經大冶而彌堅東箭推心遇繁霜而轉徑伏自頃歲蚊雷聚響螳斧稱威風搖而海嶽將傾火烘而薰蘭不辨顧彥暉與亡兄彥朗提戈鴈塞奮臂龍沙同驅韅靷之師入奉紀綱之僕青黃杵下辛勤果建於勳庸赤白囊中動靜罔違於禁制伏以先皇帝鑾輿反正鳳輦初安爰置酒以論功遂圖儀而表德顧彥暉亡兄彥朗繇是榮頒劍履顯誓山河飾金之象猶新垂露之文未滅豈謂夏時積疹奉國勞神三秋而大樹忽雕半夜而將星潛殞是致人皆罷市里為輟春淚碑雖沒於蒿萊畫象但喧於簫鼓顧彥暉以三軍擁路百姓排關感羊祐之遺心請馮君之繼踵伏自暫持紀律權總貔貅謝元用才雖履屐而有任句踐撫士從觴豆而皆均伏蒙皇帝陛下俯念㣥情仍憐異政降旌幢而示寵宣雨露以酬功風行而天下皆聞日照而人間並見不謂帛丿糸州刺史楊守寬鴟張要路蟻聚通津擅抑芝泥強留瑞節召兵戈於武定阻琛賮於裦梁大肆虔劉將營統制臣與邠州節度使王行瑜同興義旅共伐姦謀一揮而梟鵬離巢再戰而猿猱失木既通劍路尋達刀州顧彥暉屢捧詔書曾頒旌鉞非是翦桐之戲已承裂地之封濡涵而難滯舊恩錫賚而願加新節猶希進秩用表優賢臣謬竊臨戎嘗思舉善敢覷先茅之賞庶遵連茹之文臣聞有勳不廢前代格言無美不稱先王令典是垂休於國牒將衍示於孫謀其有漢閣元勳岐山茂政霜露己雕於大樹蓬蒿將沒於豐碑歎泉扃而縟禮未加顧藩翰而清風盡在是敢敷陳往事啓迪前功庶雅頌而重興冀徽猷而復舉臣伏見故鳳翔尹同中書門下平章事鄭畋瑞應星精祥開日角建洪爐於聖代成庶類於明時鳳毛方浴於春池龍節忽移於右輔旋以㣥鴟聚噪萬蝟鋒攢蒼黃而玉輦省方次第而金門撤鑰九州相望初猶豫以從風百辟無歸半狐疑而委質而畋峩冠豎髮褒袖運籌羅劍戟於樽前列貔貅於麾下乃言曰封豕肆凶長鯨噴毒置生靈於塗燼委神器於腥羶我國家時運雖艱天歷方遠豈可以大朝簪紱當屈節於豺狼近甸藩籬欲輸誠於虺蜥繇是埋牲誓衆釁鼓出師飛羽檄於四方會諸侯於萬里擎回地軸決驚波而盡入東溟抽轉天關驅列宿而咸尊北帝雷喧鼙鼓山矗旌旗五兵才入犬牙一陳盡塗龍尾值大憝建瓴之勢在元臣反掌之間不意天柱朝摧將星夜殞竹帛徒懸於皎日衣冠已隔於佳城臣始舉義師爰從指顧稟三令五申之訓職囊沙減竈之謀今則謬以微功叨居重鎮仰高蹤而如在念遺烈而未書伏乞皇帝陛下顯舉舊勳榮加盛禮俯盡裦酬之典遐追鎔範之功俾四海有聞致九泉無恨宰相之職外撫四夷內安百姓陰陽不順猶資燮理之功宇宙將傾須假扶持之力即萬靈舒慘四海安危盡繫朝綱咸由廟算既為重任方屬元臣況今國步猶艱皇居未壯曩日九衢三市草擁荒墟當時萬戶千門霜凝白骨大厦傾欹而未已沉疴綿息以無餘皆云非賢后無以拯社稷之危非真宰無以革寰區之弊令明公捨築入夢投竿為師踐履中台制臨外閫不究興亡之理罕聞沉斷之機蓋意有所不平心有所未悟輒思上問願審臧謀竊見楊守亮擅舉干戈阻艱西道將圖割據吞併東川居巴賓為一窟豺狼在梁漢致十年荊棘果聞敗衄尋挫凶狂既前去而不諧思卻歸而無地當道與邠州見為隔絶綱運方舉問罪兵師忽聞朝廷授武定之雙旌割果閬之兩郡未審是何名目酬何功勞紊大國之紀綱蠹天子之州縣非惟取笑於童稚抑亦包羞於馬牛自謂奇謀信為獨見伏慮是明公賞凶黨無君之輩挫忠臣奉國之心要助姦邪須摧正直又聞公切於保位利在安家商量不自於中書剸割全通於內地雖知深奧罕測津涯亦聞駭異㣥情頗是喧騰衆口頲貝州青陽人僖宗時舉進士不第去為羅紹威掌書記後入梁為太府少卿尋解官往依天雄軍節度使賀德倫張彥之亂彥脅德倫降于唐遣頲草奏奉狀太原莊宗署為天雄判官權軍府事以忤郭崇韜見殺臣纍拜封章上聞天聽在軍衆無非共切何朝廷皆以為間半月三軍切切而戈矛未息一城生聚皇皇而控告無門惟希俯鑒丹衷苟從衆欲須垂聖允斷在不疑如或四向取謀但慮六州俱失言非意外事在目前德休字表逸趙郡贊皇人舉進士歷鹽鐵官渭南尉右補闕侍御史天祐初河朔定州節度使王處直辟為從事後唐莊宗即位徵為御史中丞轉兵部吏部侍郎權知左丞以禮部尚書致仕卒年七十四贈太子少保當司刑部大理寺本朝法書自朱溫僭逆刪改事條或重貨財輕人生命或自徇枉過濫加刑罰今見在三司收貯刑書并是偽廷刪改者兼偽廷先下諸道追取本朝法書焚毀或經兵火所遺皆無舊本節目只定州敕庫有本朝法書具在請敕定州節度使速寫副本進納庶刑法並合本朝式令文寶昭宗朝諫議大夫顗子初依河中朱友謙為從事後唐莊宗即位擢知制誥歷中書舍人刑部侍郎左散騎常侍知貢舉遷吏部侍郎巡狩省方唐虞之舊典弔民伐罪湯武之前功陛下親統貔貅盡除梟獍刷蕩瑕穢殄息氛埃天威已震於華夷濡澤又沾於幽顯動植蘇泰遐邇歡康所宜旋軫神都凝旒紫禁居中土而表正來萬國以均輸允叶億兆之心共樂雍熙之化鎔其先回鶻部人父景崇世襲鎮州節度使鎔年十歲襲父位昭宗朝賜號敦睦保定久大功臣位至成德軍節度使守太師中書令封趙王梁祖稱帝奉梁正朔同光中復臣附後唐後為親軍所殺臣聞推亡固存古有明義興滅繼絶書著前文蓋聖王宏延賞之恩哲后開勸能之道故吳君録舊育凌統之孤兒漢帝追功舉張良之愛子臣伏見故淄青節度使檢校司空同中書門下平章事王敬武將星發彩金匱傳符推心皆務於政經戮力每勤於王室自艱難變運鑾輅省方海嶽一隅不驚刁斗關畿數路嘗走梯航加以淪落衣冠流亡民庶皆能賑恤盡致昭蘇可謂輔國藎臣佐時良牧而不幸秋蘭敗葉朝露晞光俄成就木之悲不盡登壇之寄其男檢校工部尚書權知留後事師範親為嫡長才實王褱奇早綰父兵夙知軍志張飛之敵每説無前魏萬之名咸言必大頃以元戎物故外府事殷體人情懷騷動之虞俟朝奏有關河之隔以是連營義旅比屋蒸黎追欒社以增哀思召棠而瀝懇爰從苫塊抑主兵戎分少拊寒盡同赤子望雲就日頗罄丹誠今則戈戟罷尋光陰已變險夷一致首尾二年雄稜真是其將門造次不渝於臣節雖皇華紫誥慰安相繼於道途而舊斾油幢承寵未聞其擬議將何以寬諸衆望塞彼㣥情光成季之高勳表臧孫之後嗣伏望皇帝陛下信敷九有仁覆萬方當惟新革故之時思就俗理人之道克全修偃早委節旄俾其戶戶披雲皆瞻白日人人棄管盡覩青天覃四時不宰之功救五郡倒懸之苦則豈獨自夷及夏咸知煦嫗之恩誠亦在存與亡俱荷生成之施臣準幽州狀報當道以李全忠權知節度兵馬留後事伏以天步初回神京乍復凡諸藩鎮咸務謐寧況幽州地控北番界臨東海土俗素稱其雄勇人情須自於綏懷留後李全忠夙習武經頗彰公器軍郡既聞其愛戴轅營必議於叶和苟將付以元戎誠謂雅符衆望臣纍令偵探靡不端詳事繫安危理難緘默伏惟皇帝陛下早回天鑒速注陽光便委兵權俯徇人欲則豈獨遐陬士卒便獲其慰安實亦鄰壤生靈免虞其騷動關於久遠合具奏陳近承新使復覩羽書側聆計國之規實激懦夫之志竊自運貽百六禍遍寰區㣥盜薦興生靈無庇朝章國典誰為稟命之人黷武窮兵孰是勤王之旅咸以乘虛窺伺觀釁憑陵以掠奪為功以殺傷為務皇威所不能制天道所未能誅或徑越大河或竊居方鎮縱狼貪而未己畜虺性以難馴內雖以效順為名外皆以亂常無懼遂跨州連郡十室九空良繇諸侯各固一方不思同力自致喪牛之悔久虧刑馬之盟近則布露腹心冀完虞虢今明公諭之以長策示之以壯圖結五鎮以齊明俾一家而不異竊惟高義實邁前修顧魯衛以同歡誠敦夙契在江黃而列會願接下風況當道處河朔之中最為脣齒據親舊之分寧異金蘭固當禺俟捧盤無渝匪石然以事關久遠議非一方必決定否臧審其同異待鄰藩符會則決別相從洽王鎔辟佐幕物亦有用人莫能捐惟茲鐵筯既直且堅挺剛姿以執熱揮徑質以凌煙安國罷悲於灰死莊生坐得於火傳交莖璀璨並影聯翩動而必隨殊叔出而季處持則偕至豈彼後而我先有協不孤之德無愧同心之賢至如元冬方沍寒夜未央獸炭初熱朱火未光必資之以夾輔終俟我而擊揚焚如焰發赫爾威張解嚴凝於寒室播溫暖於高堂奪功帛丿糸纊挫氣雪霜夫如是則筯之為用也至矣如何不臧鋭其末而去其利端其本而秉其剛信執箠之莫儔何支策之足重專權有故我獨任而無成雙美可嘉故我兩莖以為用抱素冰潔含光雪新同舟楫之共濟並輔車之相因差池其道徑挺其質止則謺雙用無廢一雖炎赫之難持終歲寒之可必嗟象筯之宜舍始階亂而傾社鄙囊錐之孤挺卒矜名於露穎伊瑣瑣之自恃獨錚錚而在茲佐紅爐而罔忒煩素手而何辭因依獲所用舍隨時儻提握之不棄甘銷鑠以為期邈文宣王四十一代孫乾寧五年舉進士除校書郎崔遠在中書奏為萬年尉充集賢校理遷諫議大夫後唐同光中以年老致仕近見選人或以志在循陔難違色養或以家同懸罄不辨裂裳致違調選之期遂遇廢沉之例臣愚伏請自天成元年已前有出身分明者悉許注擬況三蜀之內員闕極多俾出自於朝恩免使希於假攝臣聞賞延於世實皇王體國之規立身揚名為人子承家之道苟推誠於忠孝必懷慶於子孫存歿共瞻君親是望伏自陛下中興大業念舊録勳賞賜無時渥恩咸遍尚慮有奮身為國迹殞魂孤姓名不達於乾坤骨肉飢寒於道路不因詔書博訪所在不與申聞伏乞特下外藩如有身歿王事忠節顯彰軍伍備聞恩澤未及者必令具録聞奏如有子孫便委所司齒録使父母有可依之地妻孥免無告之心如祇有孤遺亦便令救恤即已往者知皇恩不棄將來者罄臣節何疑楚師忘寒空憑念問周文葬骨唯示深仁冀於有道之朝不漏無垠之澤昭文後唐同光二年官諫議大夫臣聞夏德方衰未顯中興之運漢儀重覩果成反正之功稽其上代帝王前朝基業未有不中罹屯否間有凶災是資明聖之謨更廓靈長之祚伏惟昭文睿武至德光孝皇帝陛下繼漢大寶纘禹鴻名興牧野之師功如破竹拔朝歌之壘疾若建瓴俄平國家之讎大刷神祇之憤皇威遠振睿德遐敷自陛下應天順人奄有諸夏九州欣戴萬國樂推既混一於車書方大定於區宇藩服靡不入貢夷狄靡不來庭鋭旅雄師無敵於當代謀臣勇將有備於中原然而尚有凶悖之徒竊據於屏翰愚迷之輩憑恃於江山雖聞向化歸朝猶敢改元僭號在陛下武功天縱百越不得不臣在陛下文德日新三苗不慮不格夫人乃邦之本兵者國之器要在安其人而固其本訓其兵而利其器國富兵強家給人足臣有管窺十條謹録奏聞伏乞俯回聖覽其一曰陛下復居聖唐之運祚雪先帝之讎仇戎狄尚解懷柔藩服豈敢拒命而數處僭偽之地尚未悛心料此凶狂必自覆滅臣請陛下明宣睿算大振天威秣馬耀兵亦不指名何處且為討逆伐叛之計而狡妄之輩叨餮之徒聞我大國萬旅雲屯六軍雷動如此昏迷之黨不俟赫斯之怒經略之謀彼必斂袵而朝望風而潰自願納歸國矣斯必有征無戰之道也其二曰臣伏見隨駕兵士久經戰戈咸著勤勞皆忠勇以難儔尚貧乏而未濟雖陛下告成郊丘之後大行賞給之恩然而或未優豐尚多覬望非不知國力尚闕天府未充臣又聞自古王皇建基業撫軍戎未有不損玉帛輕財寶以餌於戰陳之士是故先代撥亂之軍以此皆留意也今以諸道上供錢物進納不時遂致朝廷薄於犒散稍為經度以濟急需近者藩臣供奉慶賀財帛及南郊或有經費羡餘物色等伏請且據帑藏更加頒賚先隨駕兵師宴犒代潞州將健也其三曰臣竊見河南兵不少亦是先在偽廷備經訓練頗聞精鋭皆堪征伐自陛下平定汴州已來尋曾選揀或聞諸道分臂之時未甚精細或有勇悍者放歸田里或有懦弱者留在軍都當差發征行則逃避諸處以此散失其數實繁請宣示租庸司先管兵帳所司子細磨勘向來所係數額多少兼取近年諸道所申逃背名帳較量比舊額少剩即知元數減耗臣聞夫軍伍者以豐財為務以重賞為先其河南道先管兵士伏慮三數處僭號不臣之地以厚利誘之歲月滋深耗蠹必甚請陛下詔敕令在京及諸道常加點捉安撫兼勤給其衣糧務令得所仍乞嚴敕邊界要害津鎮寅夜鈴轄無令透漏兼先有放歸農畝者亦諸指揮州縣鎮浦點檢姓名嘗知所在或緩急追呼稍有前卻者請罪本處軍吏節級等庶耕耨不隳征伐有備倘陛下納臣所奏則不臣之人知國家訓戎講武繕甲治兵彼之凶徒必懷懾懼則旦夕相率有臣事本朝之計脫使賞給不充撫養不至非惟士卒生劫掠之心抑以步伍有逃遁之患必慮夫多投逆臣之境更資悖慢之性也其四曰臣竊見諸道百姓皆陛下赤子爰自比年以偽廷徭役頻仍租賦繁重餽挽不已疲敝益深既不聊生率多逋竄雖有德音軫恤未聞時降招攜亦請宣取租庸司應河南先在偽廷戶口文帳磨勘從前多少數目兼勘諸道所申近年見管及流亡戶口即知人數增減此則慮僭偽之處多方招誘伏乞特降優詔委所在觀察使刺史官吏己下設法撫綏事件無損於官有益於人者仰二縣條貫申奏仍請下中書量其利便並許施行本分稅租稍令假借諸雜科徭特豫減等以表撫俗安民興邦固本之道也其五曰本朝至德年祿山之後復京雒之初兵革之餘生聚雕瘵屢降恩詔撫恤生靈仍遣使臣詔問閭里今陛下嗣守鴻業光啓雄圖故事前規可得敬而行之伏請每年準舊事出郎官御史忠良廉潔明幹堪充使者令散往諸道採訪賢良撫問疾苦務安兆庶以拯弊氓也其六曰竊以偽廷僭號俄逾一紀連年征剝繁日科徭士不聊生人不堪命生聚塗炭戶口流亡河南之民皆企踵側身日望陛下復我唐之鴻基慰兆民之疾痛今陛下弔民伐罪新有中原所宜減省斧斤未欲增修宮室昔漢文帝將起露臺計百金之費且曰百金中人十室之産吾有先人宮室何事臺為遂罷天下聞之萬古稱漢文之儉德也臣竊以陛下以慈愛為心以孝理為念聖德日新又何讓於漢文矣伏惟陛下慕唐堯土階之事善夏禹卑宮之規停土木之工止營搆之役斯則區夏欣悅億兆歌謠自然平揖唐堯漢文之至化也其七曰臣聞漢祖初入咸陽令蕭何收秦之圖籍及高祖神堯皇帝平定關中亦允收隋室㣥書仍聞歲降賜天下搜訪其後盈溢於石渠東觀充滿於祕閣蘭臺以是兩漢之詩書之盛與三代同風也自貞觀開元之後文物煥然何止同風可謂超冠於三代也今陛下嗣周景祚紹禹靈圖睿藻日新聖文天授崇文允武咸五登三將恢偃戢之規在廣訪搜之道伏請降使采訪天下圖書以示武王偃武虞舜舞干致太平之永遠也其八曰臣聞惟王建國辨方正位況河雒之名都帝王之二宅為萬國輻湊之地乃四方表則之邦若不廣闢康莊何以壯觀輦轂自喪亂以來兵火之後九衢荒廢但長荊榛廣陌蕭條惟滋蔓草今陛下富有四海作宅神都當六龍遊豫之時是萬方朝聘之日雒陽大道所宜法於前規鼎邑長衢豈可隳於舊制其都城六街請下河南府及左右金吾仰仍舊依古制分擘廣狹步數不得縱任居人侵占俾朝會之地免有湫隘之弊也其九曰臣伏見諸司行事官或歷任分明選限尚遠或出身欠少入任無門聞陛下應千年之運建一統之功謂聖日照臨幽顯仄陋皆辭親裹足迢遞而來冀郊禋之時希求恩澤今所司磨勘駮放十分去其九分訪問駐京日多客舍窮悴其現在未出京者伏乞降宣旨稍賜慰安或有粗堪任使者即乞委銓司量才注擬不堪收擢者亦聊賜資財以濟歸路所以憫職勞而示君德也其十曰諸戎牧馬務履踐京畿百姓苖稼請於隙地置牧場伏惟陛下察臣愚衷納臣短見俾令遐邇知大君撥亂之功是使黔黎荷聖王無私之德也繼業後唐同光時人弟繼孫本姓郝有母尚在父全義養為假子令管衙內兵士自皇帝到京繼孫私藏兵甲招置部曲欲圖不軌兼私家縱無別無義臣若不自陳恐纍家族寶後唐莊宗時知制誥皇帝若曰王者惠濟黎元輯寧方夏重名器任股肱忠而能力則禮崇賞不失勞則人勸所以啓周公之土宇裂漢祖之膏腴者録彼茂勳置之異數登進賢哲焜耀事功也咨爾天下兵馬都元帥尚父守尚書令吳越國王錢鏐潮海靈源承天峻嶽以英風彰德望以勇氣贊忠貞往因義舉之徒盛推韜略遂著襲封之績高步藩維挺魚鯤鳥鳳之姿擁岸虎水龍之衆居方面任將五十年宣導休聲攘除凶醜擁堅奮鋭鄙許東固圉之謀阜俗頒條廣冀北安居之頌環塹浙江之要雲滋星紀之墟聞禮敦詩位崇元帥前茅後徑名重中原守畫一之規奉在三之節信立靡移於風雨義行曷倦於津塗效珍則那顧險難薦幣則常歸宰府振英謨而端右弼鍾懿號而異列藩可謂職貢不乏梯航時至翼戴天子加之以恭也載念尊奬爰示徽章今遣正議大夫守尚書令吏部侍郎上柱國贊皇縣開國男食邑三百戶賜紫金魚袋李德林副使朝議郎守起居郎充史館修撰賜緋魚袋聶璵持節備禮胙土苴茅册爾為吳越國王於戲地奄數圻賦過千乘墨守闔閭之境範圍勾踐之封子弟量才敘進多分於棨戟土疆漸海方輸豈限於魚鹽貴盛富強雖古之封建諸侯禮優夾輔不加於此慎厥終始無以位期驕無以欲敗度欽承賜履協於一人汝嘉可檢校太師守中書令
