front:
  text: 全唐文欽定全唐文卷八百四十三茂貞本姓宋名文通深州博野人唐乾符中黃巢犯闕以功為神策軍指揮使朱玫之亂以功遷檢校太保同平章事賜姓名僖宗親為製字曰正臣光啓二年討平李昌符還為鳳翔節度使加檢校太尉兼侍中隴西郡王大順二年討平楊復恭遂恃勳恣橫乾寧二年稱兵入覲會李克用請討三鎮茂貞懼歸命待罪授東川節度使光化中加尚書令封岐王天復元年矯詔討梁祖梁祖引四鎮之兵屯岐下圍守三年乃求和及梁祖建號與王建志圖興復竟無成功後唐莊宗平梁上表稱臣詔仍舊官進封秦王同光二年卒年六十九諡忠敬
  hash: sha256:12e5fdae9a2308e82f0a6741a3ecd0b208b358727581767b72140184c2ecd60d
