front:
  text: 全唐文欽定全唐文卷三百五十三道周開元十九年承議郎行益都縣令
  hash: sha256:d59bbe5a1a74afa92222bf032d6c33938948ba1bc3bf93c90e48ff4ed834177f
  markers:
  - {type: head, offset: 14, content: 唐道周, id: KR4h0168_NFKB_353-h1, level: 1}
body:
  text: 夫代上役役人間蚩蚩茫是非之環溺死生之海者久矣六代祖後魏使持節青州諸軍事青州刺史諱輪作牧慈仁道被東夏逮從祖諱季卿剖符闕二字太庇闕一字人暨級闕二字貞休闕二字是邦纂闕一字丕烈闕二字以冥應闕六字嗟嗟闕六字淨業闕六字㣥生闕三字屬介闕一字大千之徒蠲闕一字於闕一字初翹勤最尊闕三字嵯峨崨嶪統闕四字涌沈漾闕六字罔測惟像闕二字能不闕二字慎矜戶部尚書隆禮子初為汝陽令遷侍御史天寶二年授諫議大夫擢御史中丞遷戶部侍郎李林甫惡之作飛牒告慎矜謀反搒掠服之詔賜死寶應初復官爵天育萬類人含五情行藏殊途語默分緒故有晏安榮利入朝廷而風趨脫落塵紛遁精白以雲臥丁以情忘寵辱迹尚真間陶潛屈身繫在彭澤安石有志終憶東山厭吏隱之喧卑倚劍不樂出都門之慷慨挂幘長辭得五倫之遺風掩逢萌之往迹清聲可以激貪鄙美事足以光圖書于何不臧反以為罪昔漢皇御宇且高疏廣之才今唐堯握圖宜遂許由之性邊候時警聞列將之授師戎車啓行有僕夫之執御白刃交下望軍麾而且前紅塵四飛聞戰鼓而俄駭甚朽索之為御因交綏而小却疇昔為政雖異羊斟不仁今時敗績還同卜國無勇結纓而盡復矢空非請易其名蓋難霑於下士將置於理焉可罪於亡魂雖聞舊經非辜當失不誄不罪斯焉取斯非法貿遷不倦人且知往奔亡或生政亦嚴禁是以變而惟適時政任於磽肥行必有由誠取驗於旌節惟甲素非地著身同梗泛喬木渺在忽辭違於舊居斷蓬孤飛方行邁於他國行則無驗動而見疑津途已驗寧遇長沮之問獄戶旋開行逢士師之鞫且夫為政以貴清澆訛職司其居務取懲察雖率土之內莫非王臣而遷人之中或有姦者旌節雖且云復關山如何得踰詰其所由方盡于理致之獄吏夫何有違竊惟至公之道難加津吏之罰翰開元二十三年朝請郎行六合縣令昔者迦維誕聖兜率降靈雞足巖門以一音成佛象頭山上以三事教人舒慧日之光無幽不燭灑甘露之法隨器皆盈談法界之虛空演妙門之真實及夫涅槃示滅舍利傳靈金人見於漢宮白馬來於西國由是綿花奧旨貝葉真文流行域中遍滿天下國城聚落多葺禪宮山水園林散開精舍黃金布地則龜甲成文紫玉為階則龍鱗謺彩希向者六根俱淨住持者五蘊皆空或有漏之良因得無生之法忍則知佛之教也其大矣哉夫揚州六合縣冶山祇洹寺者創自吳朝初為像塔洎乎梁代更立道場以地若祇洹故寺標美號宋國公鎮吳州之日紺殿初營隋皇帝為晉王之辰白樓方立其後隋室板蕩玉石俱焚唐運中興土木重建鐘應霜而復響爐含煙而更芬時有比邱僧智口惠哲等望攀澄什德冠卿雲精修六通妙達三昧想千花之帳懷四極之臺乃復營為便成結闕一字座飛萬鶴門結千龍僧坊若須達所營佛剎如匿王所造香臺窈窕影殿陰岑鳳跂雕甍龍盤繡柱三百間之邃宇頳堊昭明十八變之雲圖丹青炳煥大乘法藏飭以七珍廣座真容以百寶靈仙掣曳於梁棟若往若來神鬼闕一字䫜於戶窗或俯或仰入海功就豈惟舍衛國人動山力成何必商那長者能使毒龍作禮屢集法筵乳鳥來馴每遊禪窟忍辱之草垂曉露以翻光歡喜之花搖春風而散彩其地則棠邑東嶺廣陵西巖背淮面江倚山枕壑鐵冶騰光而赫赫上燭霞空石梁激溜而洄洄旁亘煙野澗溪豁險巖岫纚連豐草羅生闕一字林闕解脫塔闕大師經行之地二上人並勤修淨行高視法朋踐無垢之清塵談不闕一字之勝躅識我相非相知色空是空乘慈惠力解煩惱縳其時闕一字人八百因立村名世界三千俱傳法號或悲薪盡山門為之洞開或歎芝焚庭樹為之雕落真儀滅已圖像儼然可以導利迷途可以發明覺路者矣復有門人曇影心內珠融法侶多文掌中印發實道門之龍象為法海之舟航並結念四禪澄襟八解幽靈已度盛德仍傳今上座懷亮寺主惠勗都師德本道裕元逸惠瑳等揚袍淨域鼓栧法流發四諦之良音辨百非之妙旨遊遨寂境乘紺馬而濟時出入真門駕白牛而拯俗菩提樹下脫落囂塵般若路旁修持行果蹈如來之閫域度菩薩之津梁雖佛在虛空固難聞見而人瞻影像或易依憑乃修飭殿臺灑掃院宇擎法鼓以警俗聲雜雷霆然慈燈以著明光耀日月以為雪山童子妙贊神功阿斯仙人能宣佛教於是求翠錦之石既已琢磨假黃絹之詞方希筆削翰學慙初日才愧凌雲舅氏能詩無因酷似家庭聞禮有恨闕如空調單父之弦彌乏河陽之藻辭不獲已敢作銘云天大地大乃聖乃神感生諸佛覺悟黎人三千世界八萬由旬咸闕一字性相俱超至真龍宮西祕象譯東闡貝葉假言貫花妙典四禪備習三藏俱衍闕勤誠闕善棠邑之甸冶山之旁宏開佛剎大啓僧坊徘徊廣院窈窕修廊日暖冬屋風清夏堂莊嚴成就相好具足體色開金毫光散玉十地部衆四大眷屬仰瞻尊顏護持芳躅闕一字石聳闕一字香泉流砌竹林煙積庵果雲洗狂象來馴毒龍作禮青蓮夜開赤蓮晝啓闕二字上德持律名僧行超惠遠道冠闕朝遊錫杖闕一字坐闕虔奉真教規模法朋蠢蠢氓闕一字明明惠智一心向佛五體投地悔過罪銷闕福至闕寧非我利守泰莫州人大唐開元十八年金仙長公主為奏聖上賜大唐新舊譯經四千餘卷充幽州范陽縣為石經本又奏范陽縣東南五十里上土伐村趙襄子淀中麥田莊并果園一所及環山林麓東接房南嶺南逼他山西止白帶山口北限大山分水界並永充供給山門所用又委禪師元法歲歲通轉一切經上延寶歷永福慈王下引懷生同攀覺樹粵開元草八年庚辰歲朱明八日前莫州吏部常選王守泰記送經京崇福寺沙門智升檢校送經臨壇大德沙門秀璋都檢校禪師沙門元法浣字洗心定州義豐人聖歷初進士以拔萃補州司法參軍景雲初官監察御史開元中纍擢祕書少監出歷濠常潤三州刺史徙汴州充兩道採訪使以老放歸田里天寶初召為太子少詹事留司東都卒年七十二贈禮部尚書伏以至道沖虛生人宗仰未免鞭撻孰瞻儀型其道士僧尼女冠等有犯望準道格處分所由州縣官不得擅行決罰如有違越請依法科罪仍書中下考潤州北界隔江為限每船繞瓜步江沙尾迂回六十里多為風濤所損臣請於京口埭下直截渡江二十里開伊婁河一十五里即達楊子縣無風水之災歲收利有億並立伊婁埭自是免漂損之災晉卿字元輔潞州壺關人第進士纍進中書舍人天寶中封高平縣男纍遷憲部尚書兼左丞肅宗即位拜左相封韓國公改侍中册為太保罷政事永泰元年薨年八十一贈太師諡曰懿獻元載入相以舊恩諷有司改諡文貞大歷七年配享肅宗廟廷臣聞古者殷高宗在諒暗之中百官聽於冢宰更無事迹但存文字且一時之事禮不相沿今殘寇猶虞日殷萬務皆緣兵馬屯守討襲善算良謀立勝擒敵陛下若行古之道居喪不言蒼生何依百事皆廢伏讀國家起居注亦於禮部檢見舊敕恭惟太宗高宗大行皇帝在位之日皆有國哀視事不輟以為君臨天下難徇常情今遺詔有處分皇帝宜三日而聽政陛下遵太宗故事則無冢宰遵大行皇帝遺詔便合聽朝萬姓禺禺不勝大願伏惟陛下知理國之重順人心之切以義斷恩從宜無改今朝臣一命己上皆言臣心昏貌朽加以疾病事有急速斷在須臾凡聖不同豈合受詔陛下發哀己五日矣願準遺詔聽政則四夷萬國無任悲幸臣以昔者天子居喪之時百官聽於冢宰者蓋君幼小御極事殷情理當然沿革不一今古異同而周武漢文合於通變垂範作則可舉而行又士或墨縗時遇金革豈非銜恤謂義在斷恩且百善之至無加於孝也其有容瘁心絶指景悼生此匹夫守節之常情殊王者嗣續之大計昨二十日陛下於大行皇帝柩前即位是承先帝遺顧之言亦前代不易之典則知所略不為害所存是適權防微滅端所利者大陛下因心純至天地明察伏以報劬勞之恩申罔極之思終身之痛豈計朝夕但以一日之內萬務在中須達宸聰始成國政百寮萬姓及僧道耆壽等相顧聚言以臣老且無能愚豈測聖況久無居攝臣不敢奉詔特乞陛下遵遺命三日而聽政臣博聽衆情不勝懇願伏望割痛抑哀則天下悲幸伏見工部侍郎李遵及殿中監李輔國言皇帝於望賢宮奉迎上皇望樓趨馳捧足嗚咽問安既退侍膳皆親及出宮之時親選龍媒侍從歸闕孝敬之至傍感人神四海歸心恩深錫類㣥臣何幸得覩盛美陛下武功冠於千古孝德踰於百王昔夏之有窮少康復其業漢之新莽光武纘其緒雖復崇名茂績輝映當時而皆曠日持久動數十載致使宗社郡邑蕩無復遺未有如陛下神武奮發睿謀獨斷曾不再稔掃清㣥凶奉迎聖皇不失舊物蒸蒸翼翼榮輝區宇考之傳記振古木聞天地人神孰不慶幸臣請編諸史册傳之不朽問朕聞至道雖微不言而化皇天陰隲相叶其彞信寒暑而生成施雲雨而沐潤垂範作訓樹君育人時有澆淳教垂繁略成湯既聖禹道云亡桑扈谷風屢動詩人之刺塞門反坫時遺宣父之嫌我國家拯彼頽綱開茲盛業朕以不德襲號乘時而皇極之道未敷謨明之軌尚闕思宏厥理其義安從至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要又四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋余疑對陛下頃與三事大夫議于朝以計天下有奇才異行含光而不揚其輝詔諸侯咸舉之臣實至愚不通大識循才審行不副高求臣聞論語曰天何言哉四時行焉百物生焉孝經曰王者則天之明因地之利以理天下是以其教不肅而成其政不嚴而理所謂天地設位聖人成能而保大定功勳業蓋時也逮金石斯緬步驟不同時有澆淳教隨繁略桑扈谷風之刺三歸八佾之嫌人用僭忒一至於此孔子曰上失其道人散久矣傳曰國家之弊恆必由之陛下嗣守丕緒茂昭大德能使百家承式萬邦作乂所謂孕虞育夏甄殷陶周革弊移風自前代未有也陛下乃賜臣策曰皇極之道未敷謨明之軌尚闕者豈不以采芻蕘之義誠考試之端不宰其功俯垂下問實陛下謙德也微臣何足以知之制策曰至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者臣聞劉歆以為伏羲氏繼天而王受河圖則而畫之八卦是也禹理洪水天賜洛書法而陳之洪範是也故河圖洛書相為經緯八卦九疇相為表裏聖人行道各保其真若人有乖方數必徵於錯逆政惟協雅理必應於調和考之咎徵粲然著矣陛下隨陽澤以著恩慎嚴霜以肅威鷹隼未擊罻羅不施草木未零山林不伐足可使垂景星而降甘露騰休氣而漏醴泉臣以為一以貫之其道久矣制策曰禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要者臣聞六經之道同歸禮樂之用為急孔子曰安上理人莫善於禮移風易俗莫善於樂董仲舒對策曰王者欲有所為宜求其端於天天道大者在於陰陽陽之為德陰之為刑王者承天意以從事故務德教而省刑罰陛下修先王之好生存大易之緩死頃者省囹圄去桎梏此則省刑罰之謂也臣聞樂以理內為同禮以修外為異同則和親異則畏敬和親則無怨畏敬則不爭二者並行合為一體揖讓而理天下者禮樂之謂也適時之要斯並存焉制策曰四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋余疑者臣以為斯並漢主之樂載於班氏之書必先究其明徵考其敏博既勞更僕何易盡言雖敢略而陳之尚未臻其極也臣聞易曰先王以作樂崇德殷薦上帝以配祖考古者制宗廟太祝迎神於廟門其義也四時武德者漢文所作以示天下之安和也而武德奏于高廟焉五行舞者本之周武也秦始皇二十五年更為五行也漢高祖六年更名曰文始以示不相襲也昭德盛德孝景孝宣之所以尊宗廟昭容禮容者出武德文始五行之舞也謹對文以經邦武以禦寇開石渠而設教整金鼓以宣威爰施上下之庠式奉孤虛之術語茲國序相彼軍容槐市立談未展先王之禮柳營作法但見將軍之令摳衣不聞守道擐甲已見伐功靡好成麟之名且許貪狼之意入室雖無鼓篋出塞終有解鞍既虧來學之能當令誘進未識出師之律誰為否臧縱暴虎馮河猶期三省豈拔距投石方禽二毛夫子之道未行齊侯之失斯在自可因其雩詠令爾志之各言豈得承彼凱歌遂責人之不法投諸僰寄稍均束濕之嚴劾以干城恐挫橫行之氣矜乎愚戾何異宰子勸此苦辛宜哀去病握蘭稱過正合清明執彈違稍乖深識欲存疏網寧失不經公諱敬之字敬之昔王季之列乎周虢叔之允或謂郭建國命氏百代可知則有燕昭築臺尊賢師隗漢祖分邑行賞封亭曾祖廣意光祿大夫生益儒為馮翊之表也雞犬之聲相聞公先祖後徙宅於華山之下今為華州鄭縣人也烈祖履球金州司倉大父昶涼州司法並丕緒齊美不殞其名端操履正有恆其德故鄉黨交友以為法度嘗謂人曰吾居間而不悶其寂望榮而不貴其厚有道則仕豈牽乎祿則居之所以從好利貞亦其自然所以不至大官大邑也各尚其志夫復何言皇考通美原主簿器大孤特識兼精照明究㣥書英聲誇邁於遠近矣初履畿甸縉紳歸高將升臺閣雲霄自遠惜乎才仰餘地命嗟促齡公受天正性承家高範致用成於私室可試進於公門望形而高深莫窺聽言而是非不惑所蒞造適不可得其詳也凡歷州掾至別駕者三轉府僚遷郎將者五兼團練監牧使各一除吉渭綏壽刺史共四州纍勳上柱國進階中大夫其牧守之理皆政聞一方化行千里變俗思義酌物從宜而節費尚儉用鎮靜清可率下寬能安衆舉事皆當察情必盡所謂愷悌君子人之父母何異乎仁風甘雨被於萬物也故天子璽書慰勉以彰分憂休迹之聞焉未盡百祿可延三壽享年七十八以天寶三年正月十日遘疾終於京師常樂里之私第聞者永懷咨嗟揮涕夫人平原郡君河內向氏配哲生才夫賢子令德高佐美慈加訓深嗚呼哀哉慶可延而靈不祐先窮泉而別華堂天寶十三載四月二十日合祔於京兆少陵原禮也頃羯虜犯順王師討逆公之子子儀任總元戎誓清大盜常山擒敵之後靈武翊聖之初成我六軍前驅效死於是掃秦里之寇復開奉天繫陝郊之俘更收洛邑加以蒲坂之下淇水之上摧暴廓地二城無虞況師不遷延功皆戰伐豈敢言病必先啓行此由許國捐軀輸忠奮勇或謂公曰書勳疇賞莫與為二公曰我國家將去否復必反正仗聖威而誰敢不雄奉睿謀而舉無遺策非為己力所謂天功帝曰朕嘉爾竭誠稟命平凶除惡遂自御史大夫拜兵部尚書同中書門下平章事俄而改司空換僕射又除司徒兼中書令列爵代國實賦千戶蓋武定聲偉若茲巍巍者也他日又追贈公亡祖兵部尚書亡考太保亡妣魏國夫人弟姪子孫皆進祿位紆金紫此又殊常之恩也太保公禮畢封樹悲深歲月今慶延身後仰雨露而無涯德發生前比金石而不朽永言淑懿實在昭宣無窮之聞光乎刊刻銘曰北州望崇左輔源同代無違德慶延我公仁能濟衆信必由衷邑裏疑支持凜凜清風知周才美君子不器掾州佐藩戎秩軍使砥開直道筆遣流事騏驥長途可遣百轡四郡循良政一人康道之軌度終焉允臧於惟聖善輔訓義方何怙何恃痛極悲長少陵原上盡為幽宅何代邱隴誰家松柏司徒所天太保追策哀榮超冠千秋聖澤行由已全名自人傳勒茲銘記表於墓田繼代者未知先德行路者過想遺賢紀實昭懿俾奮億年助字叔佐趙州人後徙關中天寶末調臨海尉丹陽主簿秩滿屏居年四十七卒孔子修春秋意以為夏政忠忠之敝野商人承之以敬敬之敝鬼周人承之以文文之敝僿救僿莫若忠夫文者忠之末也設教於本其敝且末設教於末敝將奈何武王周公承商之敝不得已用之周公沒莫知所以改故其敝甚於二代孔子傷之曰虞夏之道寡怨於民商周之道不勝其敝故曰後代雖有作者虞帝不可及已蓋言唐虞之化難行於季世而夏之忠當變而致焉故春秋以權輔用以誠斷禮而以忠道原情云不拘空名不尚狷介從宜救亂因時黜陟古語云商變夏周變商春秋變周而公羊子亦言樂道堯舜之道以擬後聖是知春秋用二帝三王法以夏為本不一守周典明矣又言幽厲雖衰雅未為風逮平王之東人習餘化苟有善惡當以周法正之故斷自平王之季以隱公為始所以拯薄勉善救周之敝革禮之失也三傳分流其源則同擇善而從且過半矣豫考核三傳舍短取長又集前賢注釋亦以愚意裨補闕漏商榷得失研精宣暢期於浹洽尼父之志庶幾可見疑殆則闕以俟君子謂之春秋集傳集注又撮其綱目撰為統例三卷以輔集傳通經意焉嶽靈開元中進士天寶中纍官監察御史長者與行登高向視古之用典決事原心越則謂昏逞而生害是夫鞠稚從陟邱陵已實處卑執奚有黷拾足于後固合益恭肆目以遊無乃長傲遠有所望問而莫知使曳練吳門宣尼尚惑徹蕃晉壁楚子徒觀苟由禮以防非則記過而及杖況尊能制幼刑期就均所罰則可豈宜有訴嗟州議之非當招省司之是詰萬物之貴者人也人惟秀介蟲之智者龜也龜惟神隱括無形神之謂也窮通有極秀之道也況天之與人其道甚遠不有以也將何遠焉則吉凶之祥假子以告變化之象因子以明欲爰謀稽疑必先蔽昆命宜蠲割誘慕展布心腹子無欺於人人有望於子成天下之亹亹豈不率道與何諸呂弄權昭大橫於漢帝帝辛毒痡匪告繇於周武揆惡之輕重也呂之惡不浮於辛量德之休明也昌之德靡及於發子二其行誰不解體矣夫義禮之輿也信身之幹也何陳氏之母不疾而稱疾魯孫之臣卜僭而告義喪於禮失其徒實繁吾不殫悉考夫演卦繇者蓍也蓍之靈而不如子之長定妍媸者鏡也鏡之明而不如子之知銘乎竹帛萬代不泯奚起矛楯俾吾反惑於古人孰謂子原天地之美達五行之理徒使疏瀹澡雪仰止蒙求曾莫之校何異乎曹邱生遇拒季布羊舌肸已虞國僑哉必以剝桂刻漆非材木所願拔鶡裂冠非禽鳥所欲當潛伏奫灣違禍會罟九江錫命其可得乎豈不免氓之蚩蚩熒惑於耳目也
