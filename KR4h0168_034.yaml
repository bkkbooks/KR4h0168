front:
  text: 全唐文欽定全唐文卷三十四元宗十五
  hash: sha256:5d4391cc32502ebc99b41134d5c04f790ba611d43f812338fe980f46fe4c38f4
body:
  text: 魏知古去年七月巳前屢申啓沃每竭忠誠姦臣有謀先奏其兆事君之忠良可嘉歎可更賜實封一百戶王公文武百官等邇者事出不虞凶邪搆逆賴天地叶德宗社降靈應時誅翦朝野寧謐慶慰之至與卿等同懷太上皇志尚無為捐茲俗務軍國庶政委成朕躬祗奉聖謨膺斯負重顧惟菲薄何以克堪若臨大川罔知攸濟冀王公卿士百辟庶寮勠力同心輔相休命各盡誠節共洽維新邊境為患莫甚於林胡朝廷是虞幾煩於將帥車徒屢出芻粟載勞使燕趙黎氓略無寧歲而山戎種落常為匪人近有野心窮而歸我曾是懷附每所綏柔而不變梟聲輒為獸搏幽州節度副大使張守圭等乘間電發表裏奮討積年逋誅一朝翦滅則東北之祲便以廓清河朔之人差寬征戍皆上憑九廟之略下仗㣥帥之功今其凱旋敢不以獻宜擇吉日告九廟所司準式如聞三輔近地豳隴之間頃緣水旱素不儲蓄嗷嗷百姓巳有飢者方春陽和物皆遂性豈可為之君上而令有窮愁靜言思之遂忘寢食宜令兵部員外郎李懷讓主爵員外郎慕容珣分道即馳驛往岐華同豳隴等州指宣朕意灼然乏絶者速以當處義倉量事賑給如不足兼以正倉及永豐倉米充仍令節減務救懸絶者還日奏聞徐惀父有功昔為理官時密刑網遂能堅守忠直每抗回邪海內稱其不冤朝廷賴其惟恤永言種德必歸餘慶宜甄嗣子俾勸㣥臣大漠南守長河北介地險可憑天兵有警夏潦方壯冬冰未合料敵安邊存乎備預靈武道行軍副大總管右領軍衛大將軍張知運神氣雄傑兵謀果斷持軍出塞可使單于喪膽抗敵臨邊足令勇夫增氣宜令先持節赴軍行處置并緣邊州軍兵馬等亦委知運量事均融仍與幽州刺史攝御史中丞強修計議便宜支備事訖聽暫入京奏事姚崇職兼樞劇未要即行副既掌同一依軍令淮海惟揚是稱溪險山川重復水陸殷湊去歲田收稍乖豐稔今茲人庶頗致飢乏朕為之父母深用惕然近聞雨澤應節粳稻有望目前之困糊口猶切思從蠲省用救荒弊宜令給事中楊虛受往江東道安撫存問觀察疾苦詳理冤滯百姓間有偉才異行藏鱗戢羽隱淪屠博栖遲閻閭官人內有貪冒苟得背公徇私或潔己自修養望充位者還日各以名聞所至之州具令宣布求瘼恤隱稱朕意焉蘇乂父往處台衡實為柱石直言正色挫彼凶邪頃者念功錫以真賦兄頲又遵先誡固辭令賞泣血披誠不忍移奪自家刑國父忠子孝宜有褒崇寵及兄弟諫官之任允屬象賢可右補闕棄瑕録用有國通典捨罪責功先王舊式薛訥蘊韜鈐之略總文武之任委以分閫冀靜邊塵遽聞喪律實負朝寄準其所犯合置嚴刑言念老臣寬其小衄即捨孟明之罪佇收馮異之功可隴右道防禦軍大使戎狄憑陵每勞征戍比興師旅猶未掃除緣邊之人頗有其患朕為父母實用憂勤今欲親按邊疆躬行弔伐宜令朝廷召募勇夫壯士拔萃逸㣥者稱為屯衛飛騎且各量與賜帛行回之日入羽林自餘之人取為長行仍令兵部侍郎韋抗紫微舍人王珽即於朝堂募十日內具所得人姓名奏聞天下諸州今年稍熟穀價全賤或慮傷農常平之法行之自古宜令諸州加時價三兩錢糴不得抑斂仍交相付領勿許懸欠蠶麥時熟穀米必貴即令減價出糶豆穀等堪貯者熟亦準此以時出入務在利人其常平所須錢物宜令所司支料奏聞犬戎背恩豕荐為孽犯塞侵牧乘洮涉渭朕託王公之上居司牧之尊憫彼蒼生情勤整旅戒嚴有日先命偏師前驅進討扼喉拊背拉朽摧枯今諸將追奔相望獻捷遁逃巳來邊鄙方寧夫出師天上觀兵塞下所以用威武也念人勞弊與人休息所以暢恩惠也彼戎狄之為患必在誅夷苟黎元之獲安寧資順動況去有徒費追無所及兼懷供帳之勞宜輟共行之典前取今月十二日親征者宜停惟此新豐湯泉是出古之順豫義兼巡省頃者觀風數臨茲地以察冤滯詢於故老閭里歡康田疇墾闢況冬降積雪春期有年且諺王遊果符時邁雖千乘萬騎咸給於主司而纍月再來頗勤於除掃宜下復蠲之令慰其望幸之心新豐縣百姓免其一年雜差科縣官及溫泉監官經兩度祗承者與一中上考二王後每年四時饗廟牲及祭服祭器並官給其帷帳几案有闕亦官給主客司四時省問子孫準同正三品蔭隋後每年給絹三百匹米粟二百石並春秋支給仍準見承襲人親兄無分襲者與三分餘各一分兄弟有得職事官者其物即還見襲人好生之德雖叶於天意止殺之義用勸於先靈仁者因而不犯殺者豈以為暴前廓州刺史左感意頃居塞上拔自行間薄效未輸率情狂鄙輕侮彞憲侵擾公司贓數既多割剝滋甚曾飢狼之不若固害馬之宜除比令按問咸自承伏且緣邊人徭役辛苦朕嘗思惠養特所哀憐寧有作牧宣條恣行非法儻不悛於常典何以塞彼深愆宜其處置以謝百姓夫國學者立教之本故觀文之道可以成化庠序爰作皆分澤於神靈車書是同乃範圍於天下近戎狄納款日歸夕朝慕我華風孰先儒禮由是執於干羽常不討而來賓事於俎豆庶幾知而往學彼蓬麻之自直在桑椹之懷音則仁豈遠哉習相近也自今以後蕃客入朝並引向國子監令觀禮教留侯多病漢皇許其頤養呂蒙未瘳吳王因而憯戚此則古之義也銀青光祿大夫檢校黃門監兼上柱國漁陽郡開國伯盧懷慎大才宏識資忠履信學窮墳典文緯邦國朕之倚賴人實具瞻頃者忘身徇公積勞為癘竭誠抗表固辭在職方欲省其謀慮專於導引且憑針艾之術副朕鹽梅之期宜聽去官許其養病驪山特秀峯巒俯臨郊甸上分艮位每泄雲而作雨下出蒙泉亦蕩邪而蠲瘵乃靈仙之攸宅惟邦國之所瞻可以列於㣥望紀在咸秩自今以後宜禁樵採量為封域稱朕意焉西漢諸將多以權貴不全南陽故人並以優間自保觀夫先後之迹吉凶之數較然可知良有以也太常卿上柱國楚國公監修國史薑皎衣纓奕代忠讜立誠精識比於橋元密私方於朱祐朕昔在藩邸早申款洽當謂我以不遺亦起豫以自愛及膺大位屢錫崇班茅土列爵山河傳誓備蒙光寵特冠等夷朕每欲其戒盈用克終吉未若避榮公府守靖私第自宏高尚之風不涉囂塵之境沐我恩貸庇爾子孫宜放歸田園以恣娛樂散官勳封並如故今在遏密又逼忌辰起今日後至來年正月上旬以來並進蔬食所司準式此限內仍令都城禁屠殺蒲州童子吳豸之薄綴小篇兼記古事不稍優異無申獎勸宜賜其父絹十匹令更習學便有成就古者聚萬方之貨設九府之法以通天下以便生人若輕重得中則利可和義若真偽相雜則官失其守頃者用錢不倫此後深恐貧窶日困姦豪歲滋所以申明舊章懸設諸樣欲其人安俗阜禁止令行觀其文理是崇道法至於時用不切事情宜各從所好並罷官度為道士親百姓之官莫先於邑宰成一年之事特要於春時卿等列在三畿各知人務宜用心處置以副朕懷農功不可奪蠶事須勿擾市獄在典正宜肅徭賦須平豪強勿恣凡著賢能必無曠職即宜好去諸投匭獻書上策人其中或有懷才抱器者不能自達宜令理匭使料隨事探賾仍加考試如有可採具狀奏聞五月是齋舊有常式六月緣忌特令斷屠宜令所司進蔬食府縣捉搦勿令屠宰唐元之際逆黨搆凶崔日用當時潛論其事及於戡翦實預元謀而所食之封後以例減功既居多特宜準初食之封與二百戶懷照訛言信無憑據量其情狀終合微懲宜遣播州安置到彼勿許東西馮待徵等事巳經恩赦特從釋放惟周公制禮當歷代不刊況子夏為傳乃孔門所受格條之內有父在為母齊衰三年此有為而為非尊厭之義與其改作不如師古諸服紀宜一依喪服文嘉爾蕃酋慕我朝化相率歸附載變炎涼而忠懇不渝明誠勤勵深宜輯乃戎落捍彼方隅使烽火無驚障塞咸謐必厚賞崇班當取富貴朕比加恩貸爾實安堵恐衣服未盡充災患且未恤永言於此良用憮然其今春不入朝都督衙官并箭頭將軍在蕃者巳令王晙張説楊敬述等取軍中庫物各賜爾等衣一副部落有疾苦量給藥物無令田隴廢業含養失所遞相勉諭以悉朕懷頃歲未登水旱不節今春事方起農桑是憂祈於上元福茲下土式展郊禋之禮以申誠請之心宜令左常侍元行沖攝侍中祠南郊太常長官分祭華嶽溫湯刺史古之通侯公卿國之重臣百揆時敘必在得賢萬邦咸寧期於共理郎官出宰仰於前事方伯登台聞之往躅頃來朝士出牧例非情願緣沙汰之色或受此官縱使超資尚多懷恥亦朝廷勳舊暫鎮外臺却任京都無辭降屈且希得入衆以為榮為官擇人豈合如此自今巳後諸司清望宮闕先於牧守內精擇都督刺史等要人兼向京官中授其臺郎巳下除改亦於上佐縣令中通取俾中外迭用賢良靡遺庶績其凝九功惟允即令銓擇以副朕懷卿等兼承朝委分職外臺陳國之法制為人之師長將何宏宣政要阜安氓俗熙我淳德以臻太和頃年以來戶口逃逸波逝而往井邑虛弊州縣不以為事逋亡乃是其常言念下人豈無懷土之戀思皇多士未有移風之術緝寧政教仁遠乎哉提振公方道存於爾宜加招撫咸使安服又去年諸州申有旱潦流亡雖聞蠲族莫能平允多非清正守法或以暗慢順情在於公私俱不折衷自今巳後務從於實卿等職在親人稍存意於此宜躬問疾苦務從惠勸以桑穡敦其學校利而勿害靜則自安卿等每還之時朕亦嘗有具誡及聞至彼多不遵行咸以為朝廷常務會同常禮因循既久罔以為意卿宜敷宏朕意宣慰人心勉思政途以奉朝獎如仍舊相習當別有處置事有不便於人者各與按察使商量奏聞戶口安存在於撫育移風易俗莫先令長知人不易此選良難專委吏曹或未精審宜令在京五品以上清官及諸州刺史及四府上佐各舉縣令一人並限敕到十日內京官封狀進外官附狀奏所舉人得官以來一任之中能有善政及不稱所舉其舉主應須褒貶卿等知蘊韜略學綜古今喬木將遷虛鍾待扣既膺旁求之辟佇聞明試之言各整爾能對揚所問古有三道朕今減其二策近無甲科朕將存其上第務收賢雋用寧軍國並宜即存緩詳思之興化立理急於雋賢呈才效用屬在文武朕恭默思道寤寐勞求長想幽仄屢申徵賁今邊隅未靜師旅時興屬聽鼓鼙載懷屠釣廣求百夫之特以作四方之守總夫戎政爰詔武臣宏我風教諒惟儒林卿等或謀慮深遠或學藝該通來應旌招深副虛佇並宜朝堂坐食訖且歸私第即當有試期也朕臨御寰極思養黎元一物不安則推溝軫慮萬方未乂則分閫興憂近者蘭池叛胡無端搆孽蠢爾凶醜敢忘恩化再令招諭仍未歸正理絶矜容事資撲滅既從斯而背德不獲巳而用兵朕今發隴右諸軍馬騎掩其南徵河東九姓馬騎襲其北三城士卒截其後六郡驍雄擊其前四面齊驅萬全直進飛走無路糜爛待斃其蕃漢軍將以下戰士以上若生擒及斬獲康待賓等一人白身授五品先是五品以上授三品如臨陳先鋒能破北胡部落所獲資財口馬牛羊並便入立功人等一切不須官收仍別加官賞其叛人內有能自殺獲送者應酬官賞亂常之罪一切並原正是忠臣憤激之時壯士立功之日恭行天罰允叶人謀摧枯拉朽匪朝伊夕布告軍州咸知朕意如聞天下諸州送租庸行綱發州之日依數收領至京都不合有欠或自為停滯因此耗損兼擅將貨易交折遂多妄稱舉債陪填至州重徵百姓或假託貴要肆行逼迫江淮之間此事尤甚所由既下文牒州縣遞相稟承戶口艱辛莫不由此自今以後所有損欠應須陪填一事巳上並勒行綱及元受領所由人知其受納司不須為行下文牒州縣亦不得徵打仍委按察使採訪如有此色所由官停却具狀奏朕以菲德恭承大寶執天下之政奉宗廟之靈於今十載矣何嘗不日慎一日雖休勿休夙夜憂勞無忘鑒寐永惟萬事之統恐纍三光之明幸天地休和㣥生樂業尚且內惟輔弼外咨牧宰徵諫納善舉才任賢佇求瘼以利人思進道以益化宇宙至大軍國事殷慮一物之失所當萬方之重責故設匭鼓以通諫許士庶之進言而政教未孚澆訛日甚獻言者苟求自達論事者多涉於妄國子進士常州人蔣寵學不師古識未知今或離間君臣或非毀骨肉固是異端阿僻之説甚乖輸忠效直之意若寖以成風則姦險道長人而無禮法所宜誅朕志在好生情求進善恐求者未悟儻默而不言思存大猷務設寬典宜決杖一頓移貫藤州為百姓自今巳後貢舉及陳奏上封者必須景行循謹無使僥幸成名若制令有虧禮刑致紊失於政理責在朕躬則敬佇昌言法當無隱百辟兆庶識朕意焉所置職田本非古法爰自近制是以因循事有變通應須刪改其內外所給職田從今年九月以後並宜停給有善必賞所以勸能有罪必誅所以懲惡代天理物勤憂萬姓求瘼恤人寄之牧宰共理天下實在於茲裴景仙幸以緒餘素無名恣行貪冒不憚典刑聚斂之賦向五千匹肆其威虐剝我黎元自作何逃仍更亡命此而將捨罪孰可誅雖法有常科合置投竄而情在難恕用申懲肅宜令集衆決殺仍宣告遐邇禕總戎朔陲經略萬里賦軍籍馬精卒鋭兵自其有虞莫不素練而醜虜背誕偏師致誅謀若有神取如俯拾雖廟略之云遠亦將士之力焉威武載揚頑凶且懾窮寇覆巢以奔北㣥師掉鞅而來歸因其凱旋聊加宴樂各宜坐飲相與盡歡出震奮豫本乎觀風省方展義期於利物朕志惟忘己情在順人爰採謠歌式事巡幸自轉蹕西鎬即宮東周景暖風恬無凜冽之慘煙和氣舒佳晏溫之色俾夫軍衛衆庶靡有郊寒之虞豈非龜筮允臧堪獻卜征之吉天人叶應徯豫之誠感是休和良以有慰思覃慶澤沃於行所親王賜物八十匹嗣郡王六十匹一品五十匹三品四十匹四品三十匹六品二十五匹七品二十匹八品九品十匹三衛引駕細引飛騎各四段彍弩手募士主膳供飯及諸色白身人等各三段知頓使知營幕使各六十匹知頓御史三十匹知驛御史及知頓判官知營幕官賜各加一等入仗突厥吐蕃共賜物五百匹令鴻臚據蕃望高下節級分付供頓州百姓所據緣頓差科及充夫匠雜役供應等人宜放今年地稅餘戶等免今年地稅之半應定名供頓縣官各與一中上考獻歲肇春陽和感氣且是發生之日實惟布德之辰朕將幸秦京言離雒邑既省方以觀俗思宏恩以濟人載念狴牢又惻襟抱宜敷寬大之典用敦祝泣之意其都城內見禁囚徒除身犯十惡及造偽頭首餘雜犯死流等各減一等徒以下並放河南府遭水百姓前令量事賑濟如聞未能存活春作方興恐乏糧用宜令王怡檢問不支濟者更量賑給務使安存朕躬承寶位十有餘年荷纍聖之昌圖膺三靈之眷命日慎一日雖休勿休今省俗觀風肆覲㣥后陳詩納賈親問百年雖念勞人事資展禮太原舊國王業所興乃眷成周西巡豐鎬因惟嗣漢東至沛鄉皆會彼舊都眷茲枌社況興王始封之地鴻圖創業之初含育生靈大造區宇永惟丕搆顧慙貽厥且稱用武戎役是殷宜錫懷舊之恩以順發生之澤太原府境內見禁囚徒除十惡及造偽頭首餘並放免預宴官共賜物二千匹父老及吏人等共賜物一萬匹百姓宜給復一年九等戶給復三年元從家給復五年其家籍見在終身免征役侍老年八十巳上賜物五段版授上縣令仍賜緋婦人版授上縣君九十巳上賜物七段版授上州長吏仍賜緋婦人版授郡君百歲巳上賜物十段版授上州刺史仍賜紫婦人版授郡夫人孝子順孫義夫節婦旌表門閭終身勿事其有沈淪草澤抱德栖遲及武德功臣子孫并元從子孫才堪文武並委府縣搜揚具以名薦河東冀方其鎮惟霍神為天吏山有嶽靈在昔皇業初興肇蒙嘉祉今者省方旋軫重獲休徵同受三神之貺獨忘百邑之禮其霍山宜崇飭祠神廟秩視諸侯蠲山下十戶以為灑掃晉州刺史春秋致祠王者之師有征無戰將以懷柔服叛非欲黷武窮兵犯令淩政則杜之賊賢害人則伐之維其封疆辨其旗物此皆夏官之政也咨爾兵部尚書同中書門下三品朔方軍節度大使上柱國中山郡開國公王晙寅亮天地弼豫一人頻總元戎克清河朔師徒效力武威遠振遺氓懷仁以思順殊類望聲而款服勳載王室朕甚嘉焉蓋六月出車周美仲甫古訓是式俾修我戎宜以來月巡朔方兼往河西隴右河東河北等諸軍較兵馬點閲器械各與所管節度處置務令得所備預之道其在茲乎諸州府馬闕數稍多既合官填復須私備貧兵力致實以為難宜令所司即勘會闕數與間廄使計會取監牧馬充朕問俗觀人務存節儉先有處分不許煩勞王同慶違法擾人借斂無紀望鄉科被率戶出鞋屏風花盤計盈數百徵求既廣般運又勞以此字人豈我良宰宜書刑典以誡具寮
