front:
  text: 全唐文欽定全唐文卷九百六十四闕名五
  hash: sha256:60919d4faa07a60d8fde8730e40d2711f0ffa1c095ae01af3bfb5eb507828171
body:
  text: 伏見李淳風表稱古歷分日起於子半勘得今歲十一月當甲子合朔冬至故太史令傅仁均欲苟異張冑元法減餘稍多子初為朔遂差三刻用乖天正又南宮子明薛頤等並云子初及半日月未離淳風子午之法推校春秋以來晷度薄蝕事皆符合奉勅付所司及公卿詳加考定謹與國子祭酒孔穎達等一十一人尚書八座參議得失惟仁均定朔事有微差淳風推校理尤精密請從淳風議禮云君子有終身之憂而無一朝之樂此所為星迴改歲親沒同辰思其居處不可為樂自大駕南轅晉徒東徙或增名似之節而出典彞之外既乖俯就流若不歸疑襄公擊殽陵而墨縗伯禽赴徐戎而變闕金革之事無所不通伏惟陛下親御六軍已登寇境戎務繁擁伏待剖斷不可以遵先聖之常經畧近代之公議請今月六日所有軍機要切百司依式奏聞依禮祀郊廟皆奏宮懸比停數習恐致廢忘伏尋故實兩漢升祔之後庶事如故國之大禮祀典為先今既踰年禮宜從吉若不肄習實慮不調誠敬有虧致招罪責伏以天子父天而母地兄日而姊月於禮應敬故有再拜之儀謹按五嶽視三公四瀆視諸侯天子無拜公侯之禮臣愚以為失尊卑之序其日月以下請依舊儀五嶽以下署而不拜劉子元奏註孝經請廢鄭依孔註老子請停河上公行王易傳非子夏所造者子元博識誠則純儒全非衆家亦則未可且孝經鄭義行已多時老子河註用亦云久并子夏易傳文不折於片言望並付所司令諸儒與子元對質定必須理勝義成不得飾詞爭辨論定聞奏臣等議稱今文孝經是漢河間王所得顏芝本劉向以本參較古文省煩除惑定為此一十八章其註相承云是鄭元所作而鄭志及目錄等不載故往賢共疑焉惟荀昶范煜以為鄭註故昶集解孝經具載此註而其序云以鄭為主是先達博選以此註為優且其註縱非鄭氏所作而義亦敷暢頗將為得雖數處小有隱實亦未爽經通其古文二十二章元出孔壁先是安國作傳後遭巫蠱代未之行荀昶集註之時尚有孔傳中國遂亡其本近儒欲崇古學妄作此傳假稱孔氏輒穿鑿改更偽作閨門一章劉炫詭隨妄稱其善且閨門之義近俗之語必非仲尼正說按其章云閨門之內具禮矣乎嚴親嚴兄妻子臣妾繇百姓徒役之句凡鄙不合經典又分庶人章從故自天子以下別為章乃加子曰二字然故者連上之詞既為章首不合言故是古文既亡後人妄開此等數章以應二十二章之數非但經文不真抑亦傳文淺偽又註云因天之時就地之利暴其肌體朝暮從事露髮塗足少而習之其心安焉此語雖旁出諸子引之為註何言之鄙俚乎與鄭元所云分別五土視其高下高田宜黍稷下田宜稻麥優劣懸殊曾何等級今議者欲取近儒詭說殘經缺傳而廢鄭註理實未可望請准令式孝經鄭註與孔傳依舊俱行又得議稱老子道德者是謂元言註家雖多罕窮厥旨河上蓋愚虛之號漢史實無其人然其註以養神為宗以無為為體其詞近其理宏小足以修身潔誠大可以寧人安國故顧歡曰河上公雖曰註書即史立教皆沒畧遠體指明近用斯可謂知言矣王輔嗣雅善元談頗採道要窮神明乎士冖䂞籥守靜默於元牝其理暢其旨微在於元學頗謂所長至若近人立教修身宏道則河上為得今望請王河二註令學者俱行又得議稱謹按劉向七畧有子夏傳但此書不行已久今所存者多失真本又荀勗中經簿子夏傳四卷或云丁寬所作是先達疑非子夏矣又隋書經籍志云子夏傳殘缺梁氏六卷今兩卷是其書錯謬多矣王儉七志引劉向七畧云易傳子夏韓氏而載薛虞記又今祕庫有子夏傳薛虞記其傳文質畧指輒非遠無益後學不可將帖正經伏奉今年三月十日勅曰孝經者德教所先自則天以來獨宗鄭氏遺旨今則無文又子夏易傳近無習者輔嗣註者亦甚甄明諸家所傳元有得失獨據人說能無短長令儒官詳定所長令明經者依習若將理等亦可兼行其作易者兼帖子夏易傳詳其可否奏聞者又奉四月九日勅曰太子左庶子劉子元奏孝經註請廢鄭依孔老子註請停河上公行王輔嗣易傳非子夏所造者付臣所司令諸儒與子元對質定詳必須理勝義成不得飾詞爭辨者臣等與國子博士司馬貞大學博士郄嘗通等十人對如前伏以下十四日冬至一陽初生萬物潛動所以自古聖帝明王皆以此日朝萬國觀雲物禮之大者莫逾是時其日亦祀圜丘令攝官行事質明既畢日出視朝國家以來更無改易緣新修條格將畢其日祀圜丘遂改用立冬日受朝若親拜南郊受賀須改既令攝祭理不可移伏請改正平明陰雲祁寒及其日出有雲迎日又有祥風至須臾日出有黃白冠及日南有珥臣謹按黃帝占云冬至之日陰雲祁寒來歲大稔人安五穀豐熟又曰風不及地和緩而來謂之祥風王者德至於天則祥風起日冠且珥人主有嘉並太平之嘉應臣請宣付所司昔齊桓公九合諸侯一正天下將欲封禪問於夷吾夷吾對曰江淮間三脊茅生用以縮酒乃可封禪其時無茅桓公大慙而罷自歷千古今始一生昔宣王南征責楚包茅不入王祭不供則是其地生茅今高一尺至七八月長足方堪縮酒特望聖恩至時令采用祭泰山并根掘取苑內植之管夷吾為桓公是諸侯不合封禪故稱茅拒之及伐楚之日尊周室行霸道乃責楚云包茅不入王祭不供若以茅為瑞是不知經義臣等歷任荊楚博訪貢茅沅江最勝臣已牒岳州取訖令稱撫州有茅請移根入苑且貉不踰汶橘不過江移根苑中信是虛語望勅撫州且進六束與沅江相比用之臣謹按春秋文曜鉤云王者安靜則老人星臨其國主壽昌萬人安常以秋分節候之南郊今應期而見請付所司臣謹按春秋文曜鉤王者安靜則老人星見孫氏瑞應圖云王者承天則老人星見臨其國又黃帝占云老人一名壽星色黃明大則主壽昌天下多賢士伏惟陛下以千秋節日祀於星壇而祭期將臨美應先至知歷數之方永嘉萬壽之昌期請付史官以光典策頻奉墨制重令詳議臣等淺陋不達不敢措詞聖旨深微特垂開曉陛下體至仁之德廣推恩之道將宏引進以示睦親再發德音更令詳議謹按大唐新禮親舅加至小功與從母同服此蓋當時特命不以輕重遞增今聖制親姨舅小功更制舅母緦麻堂舅袒免等服取類新禮垂示將來通於物情自我作古㣥儒凡議徒有稽留並望准制施行今日卯時有祥雲出東方及其樂作非烟燭於西北巳午之時日有抱戴伏以陛下聖歷方永福履無疆洊臻嘉瑞之符載洽繞樞之日臣等不勝抃躍請宣付史館今日陛下虔報豐稔昭祭神祇臣謹候天地清謐星辰明朗初祭則樽俎適陳祥風拂地既奠之後瑞氣縈壇其風則暢和緩之候其氣乃蓄龍鳳之色臣謹按王者德至於天則祥風起又堯沈璧於河休氣四塞伏惟陛下一德馭物而天祥薦祉盡皇王之靈貺躋蒼生於仁壽請宣付所司編入史冊今旦卯時日有紅碧黃氣數見及紫赤雲氣潤澤鮮明在日上謹按瑞應圖名曰慶雲太平之應請編入史冊莊子既號南華真人文子請號通元真人列子號沖虛真人庚桑子號洞靈真人其數子並望隨號稱經兩京及諸郡崇元學生等准開元二十九年正月制前件人合習道德及南華通元沖虛等四經又准天寶元年二月制改庚桑子為洞靈真經准諸條補崇元學亦令習讀伏准後制合通五經其洞靈真經人間少本臣近令諸觀尋訪道士全無習者本既無廣業實難成并通元沖虛二經亦恐文字不定元教方闡學者宜精其洞靈等三經望付所司各寫十本較定訖付諸道採訪使頒行其貢舉司及兩京崇元學生亦望各付一本今冬崇元學人望且准開元二十九年正月諸條考試其洞靈真經請待業成後准式櫟陽縣人董思寵五代同居子孫凡八十餘人友愛敦睦鄉里稱之天寶末寇盜剽掠村閭此家獨全年遭水旱此家獨免至於征稅每先於人伏望旌表門閭編諸史冊諸色錢物及鹽井利等伏緣財賦新有釐革支計闕供在臣職司夙夜憂負今後望指揮諸州若不承度支文牒輒有借使及擅租賃迴換本州府錄事參軍本縣令專知官並請同入已枉法贓科罪庶物無乾隱事有條流其應合徵收諸色錢物所由官有違程限致闕軍須請停給祿料李晟巡邊欲至涇州田希鑒潛伏兵馬謀害統帥李晟察其奸計今已伏辜原其情狀合坐宗族頃以朱泚窮蹙奔竄涇原希鑒去逆歸順閉門不納恐須錄其前効特全後嗣其妻王氏并男太子通事舍人華左金吾倉曹參軍葦折衝芮折衝萱等并請免死差綱遞送嶺南分付杜佑令配諸州太皇太后沈氏厭代登真於今二十有七年大行皇帝至孝惟深哀思罔極建中初已發明詔舟車所至靡不週遍歲月滋深迎訪理絕謹按晉庾蔚之議云尋求三年之外又俟中壽而服之今參詳禮經博稽故事伏請以大行皇帝啟攢宮日百官舉哀於肅章門內之正殿先令有司造禕衣一副發哀日令內官以禕衣置於幄座自後令宮人朝夕上食先告元陵次告宗廟上太皇太后諡冊次造神主擇日祔代宗廟其禕衣備法駕奉遷於元陵祠殿置於代宗皇帝衮衣之右便以今年十一月二日發哀為忌追冊曰睿真皇后准今年二月十三日勅除臺省常參官餘六品以下並准舊例都付本司處分者其六品以下選人中有人材書判無闕相當承前准格皆送中書門下又立功狀奏請要有襃揚等令並委本司注擬即不同常格選人若無闕相當一一令待續闕事即停滯必招喧訴應緣功狀及非時與官合授正員額內并選限內無闕注擬者伏請量事計日用成三考闕如臨時人數稍多注擬不足灼然須處置發遣即請兼用兩考以上得資闕并量人材資敘注擬訖准勅送中書門下詳定可否其六品以下有官資稍高合入五品縱非五品亦請依前送名浙江東西節度使韓滉自建中年已後供軍資費賞設等每年續加當錢六十一萬六千貫准今年五月五日勅近日甲兵止息無別徵求此是常稅先有成例宜令浙西觀察使白志貞浙東觀察使皇甫政各據道本元額依舊每年兩稅徵收發遣其錢物到別庫收貯每有給用皆先奏取進止其錢舊例每年六月舉徵如秋限送納今京西師旅頗衆經用尤多望令依稅限納市輕貨送上都伏以艱難以來年月積久兩都士庶散在遠方三庫勅甲又經失墜因此人多罔冒吏或詐欺混見官者謂之擘名承已死者謂之接脚乃至制勅旨甲皆被改張毀裂如此之色其類頗多比來因循遂使滋長所以選集加衆真偽混然實資簡責用澄涇渭謹具由歷狀樣如前伏望委諸州縣府界內應有出身以上便令依樣通狀限勅牒到一月內畢務令盡出不得遺漏其勅請令度支悉付州府州司待納狀畢以州印印狀尾末縫相連星夜送觀察使司定判官一人專使勾當都封印差官給驛遞驢送至省上都五百里內十二月上旬到千里外中旬到每遠較一千里外即加一旬雖五千里外一切正月下旬到盡黔中嶺南應不合北選人不納文狀限其狀直送吏部曹不用都司發人到日所司勘會即姦偽必露寃抑可明如須盤問即下所在州縣責狀其隱漏未盡及在遠不及期限者亦任續通依前觀察使興送所在勘責必有灼然踰濫事跡著明者據輕重作條件商量聞奏庶稍澄流品永息踰濫准禮諸侯絕周大夫絕緦所以殺旁親之喪不敢廢大宗之祭士則緦不祭者謂同宮未葬欲人之吉凶不相瀆也魏晉以降變禮從權緦已上喪假內衣縗謂之喪服假滿即吉謂之公除凡既葬公除則無事不可故江右潭殷仲堪並云既葬公除廢祭者非也故其時公除者則行公祭蓋大夫不敢以家事辭王事春秋之義也今國家行公除之令既已即吉於祭無嫌私家之祭則無廢者公家之祭則猶禁之是有司限文進退維谷若以服為禁則懼虧祭禮若以例奏差則懼違令文先王立禮所以進人為善也立法所以禁人為非也彼公除者人各思君親莫不欲祭使子得祭其父孝莫大焉臣得祭其君義莫重焉苟祭而不許是禁人為善也苟私祭不禁則公祭無嫌是則垂之空文不若行其變禮今請申明舊令使行之可守凡有慘服既葬公除及聞哀假滿者許吉服赴宗廟之祭其同宮未葬雖公除者請依前禁之庶輕重有倫以一王法伏以周漢故事有功即加地有罪即奪國既明賞罰方申沮勸其犯除名以上罪有實封准法合除比來因循兼不申舉自今以後應實封人或緣罪犯其堂省及本軍本使本貫奏狀請令並標實封戶數本犯州名同奏勅下戶部以為憑據其犯法罪三分望奪一分流罪奪一半除名以上罪即准法悉除並以本犯條論不在減贖之限其奉特勅貶謫驗制詞內所犯無正條者伏請准流罪奪一半伏以臺司推事多是制獄其中或有准勅便須處分要知法理又緣大理刑部斷獄亦皆申報臺司儻或差錯事須詳定比來皆却令刑部大理法直簡勘必恐自相扶會縱有錯失無由辨明伏請置法直一員冀斷結之際事無闕遺其糧料請取臺中諸色錢物量事支給其功優等請准刑部大理處分准貞元七年三月二十日勅節文比來食實封人多不依令式皆身歿之後子孫自申請傳襲伏請自今以後并今日以前應食實封人並一年內准式具合襲子孫官品年名并母氏嫡庶於本貫陳牒如無本貫即於食封人本任本使申牒如合襲人有罪疾及身死者亦限一周年內申牒請立以次合襲人仍俱家口陳牒請附籍帳本貫勘責當家及近親如實是嫡長即與責保准式附貫然後申省到後即取文武職事三品正員一人充保准建中元年正月十七日勅諸州府五品以上正員及額內上佐宜四考停其左降官不在此限者五品左降官既不許停祿料六品以下未復資已經四考未量移間其祿料伏望亦許准給諸州府送納內外文武官職田及公廨田四至白簿等前件簿書准天寶十四年八月十二日勅每年六月十三日勘造申省如建本判官牒吏部先用闕本典准法科處者伏以地段佃戶並無改移隨年造簿實有勞費今請令諸州府及畿內縣三年一送違限者准勅科處伏准㣥官所議鑄錢或請收市人間銅物令州郡鑄錢當開元以前未置鹽鐵使亦令州郡勾當鑄造令若兩稅納匹段或慮兼要通用見錢欲令諸道公私銅器各納所在節度團練防禦經畧使便據元勅給與價直并折兩稅仍令本處軍人鎔鑄其鑄本請以留州留使年支未用物充所鑄錢便充軍府州縣公用當處軍人自有糧賜亦校省本所資衆力并收衆銅天下併功速濟時用待一年後鑄器物盡則停其州府有出銅鉛可以開鑄處具申有司便令同諸監冶例每年與本充鑄其收市銅器期限并禁鑄造買賣銅物等待議定便令有司條疏聞奏其上都鑄錢及收銅器續處分將欲頒行尚資周慮請令中書門下兩省御史臺并諸司長官商量重議聞奏勅釐革京百司息利本錢應徵近親及重攤保并遠年逃亡等今年四月十七日勅本利并放訖其本事須借錢添填都計二萬五千九百四十三貫六百九十九文伏以百司本錢久無疎理年歲深遠亡失頗多食料既虧公務則廢事須添借令可支持伏望聖恩許令准數支給仍請以在藏庫度支除陌錢充伏以聖政惟新事必歸本近又疎理五坊戶邑令府縣却收萬情欣欣喜出望外臣等敢不釐革舊弊率先有司上副聖情用宏至理其兩省納課陪厨戶及捉錢人總一百二十四人臣當司並不收管望各歸府縣准勅今月二十四日諸州府鄉貢明經進士見訪宜令就國學官講論質定疑義仍令百僚觀禮者伏恐學官職位稍卑未足飾揚盛事伏請選擇常參官有儒學者三兩人與學官有儒學者庶聖朝盛典輝映古今文武常參官准乾元元年三月十四日勅如有朝堂相吊慰及跪拜待漏行立失序語笑諠譁入衙入閣執笏不端行立遲慢立班不正趨拜失儀言語微諠穿班穿仗出入閣門無故離位廊下飲食行坐失儀諠閙入朝及退朝不從正衙出入非公事入中書等每犯奪一月俸班列不肅所由指撝猶或飾非即具聞奏貶責臣等商量於舊條每罰各減一半所貴有犯必舉太廟時享及告廟朔望薦食同日謹按禮經祭不欲數伏以太廟禘祫祭禮重於時享准禮時享與禘祫同月即其月但行禘祫不行時享蓋不欲煩是禮先重者今時享重於朔望薦食詳求禮情參酌輕重於時享之月其朔望薦食亦合便停若兩禮兼行即祭恐煩黷伏請每至時享及臘享但行享禮其月朔望薦食請停餘月一准舊制如告廟日與朔望薦食日同伏請先行告廟禮然後薦食所冀疎數有節合於禮中諸州府應上供受稅匹段及留使留州錢物等每年匹段估價稍貴其留使留州錢即聞多是徵納見錢及賤價折納匹段既非齊一有損疲人伏望起元和四年已後據州縣官正料錢數內一半任依京官例徵納見錢支給仍先以都下兩稅戶合納見錢充如不足即於當州兩稅內據貫均配支給其餘留使州雜給用錢即請各委州府並依送省輕貨中估折納匹段充如本戶稅錢較少不成端匹者並任折納絲帛丿糸如舊例徵納雜物斛㪷支用者即任准舊例處分其折納匹段定中估仍委州縣精加揀擇如有濫惡所由官并請准今年正月十五日旨條處分應帶節度觀察使州府合送上都兩稅錢既須差綱發遣其留使錢又配管內諸州供送事頗重謺其諸道留使錢伏請各委節度觀察使先以本州舊額留使及送上都兩稅錢充如不足即於管內諸州兩稅錢內據貫均配其諸州舊額供使錢即請隨夏稅旨限收送上都度支收入次年旨符便為定制伏以諸道兩稅徵斂不常閭井之間頗聞困弊臣今類會如前准建中三年三月勅節文當府界內捉獲強盜不論有贓無贓及竊盜贓滿三匹以上者並准勅集衆決殺不滿匹者量事科決補充所由犯盜人雖有官及屬軍等一切並依此例處分准天寶十四年正月勅府縣務煩事須疏決若一一皆待勘覆即必有稽留伏准今年正月勅自今以後諸司應有決殺囚若不承正勅並不在行決之限如跡涉兇險須速決遣并特勅處分者亦宜一度覆奏者伏以京邑浩穰庶務煩劇擒姦戮盜事實尋常若一罪一刑動須覆奏不惟懼於留獄實亦煩於聖覽況畿甸之內尤須肅清其強盜竊盜并犯徒以下罪情准建中三年及天寶十四載勅處分其餘罪犯經有司准按者請准今年正月勅處分准舊例監察御史從下六人各察尚書省一司又准興元元年十月勅令監察從上第一人察吏部禮部第一人察兵部工部第三人察戶部刑部者伏以監察第一第二人已充監察及館驛等使新人除出使外並無職掌無以觀其能否今請守舊制新人分察諸州府見錢准勅宜於管內州據都徵錢數逐貫均配其先不徵見錢州郡不在分配限都配定一州見錢數任刺史著百姓隱便處置其勅文不加減者即准州府所申為定額如於勅額見錢外輒擅配一錢及納物不依送省中估刺史縣令錄事參軍請與節級科貶百官避皇太子名諱詳禮經公卿大夫與太子同名無嫌蓋尊統於上太子同在臣子之列國朝故事東宮官號并東宮殿及門名與太子名同皆改然無百官避東宮名者德宗在春宮處州舊名不改并御史院同姓名者亦不改伏以宮臣名及宮殿門名并百官宗姓中有與皇太子名同者即干儀制禮合迴避臺官及王公爵土名號推義比例並無改文御史出使及却迴所在館驛逢中使等舊制御史到館驛已於上廳下了有中使後到即就別廳如有中使先到上廳御史亦就別廳因循歲年積為故實訪聞近日多不遵守中使若未諳往例責欲逾越御史若不守故事懼失憲章喧競道途深乖事體伏請各令遵奉舊例冀其守分
