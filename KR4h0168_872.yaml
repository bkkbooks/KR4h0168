  text: 全唐文欽定全唐文卷八百七十二文美南唐保大時官寧國軍節度推官知録鎮事朝議郎檢校尚書主客郎中
  hash: sha256:e285904fb58d0bea4becf235a91199e445c1414cb346c9b200104e342cb56a96
  markers:
  - {type: head, offset: 14, content: 薛文美, id: KR4h0168_NFKB_872-h1, level: 1}
body:
  text: 余自出周行來治斯邑竊觀圖籍亦覩風土歷代屢為郡復改縣隸豫章焉爾後割龍門鄉為太平縣沙城鄉為旌德縣石埭鄉為石埭縣可知古封疆遠近爾太和中裴明府銲惜其山勢雄峭溪帶奔傾翠鎖居人煙和公舍聞奏依萬年縣廨宇制置縣署之後池塘迂折半里有餘雖水涸草侵波瀾不見而斜灣曲岸景致宛然別有亭基五所古木修篁交蔭若蓋覩斯遺址甚鬱於懷然則民病未除官方到任不可追往有害於今終伺豐穰以續故事庚戌歲中秋始創高亭一間兩厦風來入面目達四方危擬鼇頭靜同天籟乃命曰齊雲亭小廳者乃縣之古廳也不記年代屢曾增修柱木傾斜風雨不蔽頽毀既甚坐立非安議始重興量功採斫先有洪水漂出巨材久在溪壖謂其蠧朽試請少府邢公楷監工人往視得直木數條沿泝而來如神所惠爰運斤斧遄就公廳榱桷端堅棟梁宏壯威儀百里花煥一方復於廳後蓋廊屋三間水閣三間重梁續柱架嶮飛空簷影照波荷香入檻曰來風閣東北隅茅亭一所花卉藂雜果實枝繁翠色長在嵐光不散亦重修飾別是幽奇曰煙鎖亭因記小廳乃得總述非衒功積要載歲時大唐保大十一年歲次癸丑七月二十六日寧國軍節度推官知録鎮事朝議郎檢校尚書主客郎中賜紫金魚袋薛文美記洎字師黯改字偕仁滁州全椒人南唐進士纍遷中書舍人清輝殿學士入宋歷官參知政事卒年六十四贈刑部尚書司業諱籍字文昌蘇州吳人也一作和州烏江人貞元十五年丞相渤海公下及第歷官太祝祕書郎國子博士水部員外郎國子司業公為古風最善自李杜之後風雅道喪繼其美者惟公一人故白太傅讀公集曰張公何為者業文三十春尤工樂府詞舉代少其倫又姚祕監嘗贈公詩云妙絶江南曲凄涼怨女詩古風無手敵新語是人知其為當時文士推服也如此元和中公及元丞相白樂天孟東野歌詞天下宗匠謂之元和體又長於今體律詩貞元已前作者間出大抵互相祖尚拘於常態逮公一變而章句之妙冠於流品矣自唐末多故洊經離亂公之遺集十不存一豫自丙午歲逮至乙丑歲相次緝綴僅得四百餘篇藏諸篋笥餘則更俟博訪以廣其遺闕云耳光南唐乾德四年進士第一任將仕郎縣尉夫真覺了然離諸名相橫大千而非有等虛無以非空譬夫色映琉璃覩之則元黃斯在月涵止水為之則遊泳徒勞自四大相摩六根競熾認賊作子以幻為真情塵逾於峻極愛流深乎浩杳然後因病而須藥以渡而假筏故我竺乾先生唱以無緣之慈不盡有無之法化分萬行教立三乘隨彼性根次第啓迪則造幢造像施力施財皆福報之大端回向之廣途也地藏普安禪院者邑人右軍牙將充昭武軍客司引客虞候鄧進與弟亮弟逵等之所建置也地居爽塏境占幽奇法宇禪堂洞然虛白金容寶像煥若莊嚴清溪經其前崇林映其後入座而風傳爽籟開軒而雲吐凝嵐蓋禪那宴寂之場大士棲真之所也初邑中無禪剎或毳侶經遊則投足無地往往止於白衣之家甲子年中有守勳和尚者法門之柱石也振衣而來覩斯衋然謂鄧生曰聞君豪富特達好事然諾老僧欲構一禪齋以待南北乃此方未曾有之勝事也吾子其可為乎鄧生聞之欣然炷香禮拜曰若和尚能此駐錫則弟子敢不發心遂於縣西南巴水之陰得此福地創是道場故曰地藏者因廢額也普安者表新意也自誅茅翦棘從基作構咸咨其規度無有限量一物已上靡不完整凡有緡數百萬焉彼優填作像須達布金比諸信施可謂至矣土木既畢會勳公從鄱陽法眷造先師亭之請且曰功成不居古人之道也矧往畢吾師之遺懿乎固留不諾而去監院僧惠崇理心淳熟練行精明識中之智慧熒煌塵外之空花零落隨緣利物有感必通勳公既去鄧生眷其德業懇請而來以為欲闡真宗慮食輪之將柅或難周給雖海會以疇依盍置田園用計悠久鄧生曰然即捨附郭田三千把入常住俾夫金繩既耀香積彌芬二時既獲於坐豐四衆攸加於景附夫飯一僧圖一像猶獲大利益况斯邑之地前瞻何玉旁即曹山寺達疏山諸祖道場多由此出或摩尼在握或窮子垂歸使至是者皆洗足而居開盂以食於此津涉自我權輿可謂未嘗有之勝事也蓋有以知鄧氏之善因信無量矣鄧氏之福報信無量矣豫比佐是邑屬時和歲豐居多暇日與明府扶風公每遊斯院而崇公以豫早因薄伎嘗竊高科繕録所因以碑見請適苦多病辭之未能秋九月承詔命歸京師即路有期前請愈確勉書事實有愧斐然銘曰至哉空王妙道無方失在揀擇得非思量風寂水定塵銷鏡光本來無物是謂真常真常甚夷金言不欺愛見所縛衆生莫知三乘引拔六度針醫不有權變疇將救之良田如金不種何穫巨福如海不勸何作惟彼上人能先斧鑿惟此信士能應雕斫巴水之陰肇興禪室壯若神運巧同化出永茂空林長光佛日巍巍福田與道相畢徵古袁州宜春人南唐升元末第進士事齊王景達為宮官改樞密副使後坐宋齊邱黨削奪官爵置洪州賜死江南山水天下無與爭也匡廬落星江南無與爭也奇峯秀壑穹嵓邃室簡素極辭華之贍不能紀其一二圖畫盡丹青之妙何常狀其髣佛乾貞己酉歲豫旅遊及此得國朝四門博士庭筠書堂故基背五乳之峯帶遷鶯之谷瀑布在右分一派以走白彭蠡在前凝萬頃以含虛斯又匡廬間無與爭也豫方肄業乃結廬而止俄而長樂從弟兄洎親友十餘人繼至明年豫倚金印峯復營小堂以自居遊焉息焉無復四方之志當是時烈祖皇帝猶秉吳政築大防以壅才俊張宏網以罟英賢近悅遠來雲附影從豫雖不佞中於一目繇是歷祕閣登郎署曳裾齊邸記室在闥領樞近之任拒此已二十年矣今春以疾免職獲自銓曹郎中出典宜春之任南去稅駕言歸駐旌斾於江上攜賓僚於林下剃蓁莽以俯仰濃陰認手植之木登嶙峋以嘯傲清音識舊流之泉谷鳥山鐘江雲潭月稱心豁耳一如曩昔追懷同志或在或亡金章之身徒皆貴仕霜華入鬢已失少年聖上睿武英文康濟南服重湖略定曾參帷幄之謀五嶺未通方荷折衝之寄王事靡盬受命忘家支頽補隳繕治舊室因磨翠琬聊記斯來巨唐保大十稔太歲壬子三月十日銀青光祿大夫檢校司徒使持節袁州諸軍事守袁州刺史兼御史大夫柱國李徵古記居詠仕吳纍官至門下侍郎入南唐升元元年為中書侍郎同平章事表請先主復姓進左僕射兼門下侍郎嗣主立罷為鎮海軍節度使卒賜號順天翼運功臣特贈守太子太傅上柱國清河郡開國公諡曰懿孔子云郊祀后稷以配天宗祀文王於明堂以配上帝此萬世不易之法也昔長孫無忌請祀高祖於圜丘以配昊天上帝祀太宗於明堂以配上帝義為得之今國家嗣興唐祚追尊孝德而以堯舜為肇祀之祖宜以神堯配天於圜丘孝德皇帝配上帝於明堂禮也其服物制度古有常儀願罷一切偽飾彬字子文洪州高安人唐末應進士不第仕南唐為祕書郎尋以吏部郎中致仕年八十餘古者伏羲氏之王天下也始畫八卦造書契由是文籍生焉而以三墳五典載其前以鳥官雲紀紀其後則周文王於羑里而演易孔宣父於東魯以刪詩以明古今國家之所為顯君臣父子之所作由是吾道逐世而盛斯文得口而行則四夷慕中夏禮教而來聖典緣中土敬信而到始則周昭王知佛生於中國後則漢明帝夢佛見於寢時由緒於今史册斯在具司馬遷録古老之語入於正史郭景純采謠俗之志而以為書尚勤萬代博古之賢討尋懿行忙六合闕三字餘之學探賾異聞而又周柱史以道德為經本無為而自化以清淨而自正體虛無而通元言杳冥中而有精以無欲而觀妙上助皇王之大化次歸純朴於輿人其中華之教有斯史籍備之載矣而後以西方釋氏之教爰到同化人僅二千餘年以諸佛之大説因緣救衆生之漸深苦惱以方便之言譬喻以化度之力慈悲若非調御丈夫出廣長舌相或在給孤園內或於耆闍崛山集大衆則此界他地俱來説大乘則小法邪見頓悟名為法寶志於佛言以五百四函總三乘十二分教兼此經文讚誦付諸國王大臣約僧以齋戒精勤化俗無驕奢放逸復以先朝白馬嘗負真詮梵本既來翻譯相繼求諸聞見異代同歸有土皆行無君不敬於以傳真偈於神州海島啓金文於朝磬暮香萬方生死之徒動念者報應堪驗六道輪回之類歸心者超拔無疑感空王之化誘多門使㣥生之歸向有路遂大和五年六月則有管內都監長講律大德宏機尊宿律大德延壽與都勸首韋廣安羅環等共為議焉乃曰塵世大空浮生一夢論古人則傷心墳冢看浮俗則彈指風燈以為言有四夷難生中國上以天人福盡暫來作富貴英豪奚知凡世罪多又去入畜生餓鬼驗諸佛而既無誑語修諸善而忍不同心乃召居縣邑之信仁住寺院之上德散請化緣之士遐招書寫之人一境共緣十年告畢喜經論入衆函而俱滿念工匠裝寶藏以共成以金仙居於中心以風鐸鳴諸四角言勝絶則如地湧出觀元妙則自天降來若使共為護持則牢度大神現寶珠於頭上更以同為讚歎則信相菩薩鳴金鼓於夢中功德此圓僧俗相賀莫不松門白晝竹牖良宵梵音引讀於金文燈焰延開於寶帙遂使開禪毳客入探貝葉之元停口輪師來味蓮花之妙是以一句一偈聞之者涕淚堪垂若女若男信受者歡喜皆大狀渴鹿而口臨福海如窮子而手入寶山使剛強者不煩王法而和柔令罪業者不經地獄而解脫噫人生須臾歲月忽死生既貪身衒聰明共好心先警悟慳貪作而貧窮是報人我起而嗔恚復生手來而空手俱來身去而空身共去是人眼見舉世心迷預修此日橋梁何止一生福利覩斯勝作善莫大焉彬八十餘生三教在念今幸覩闕家再造禮教重新先唐允聖於江南上帝儲休於域內崇君臣忠敬之道修寢廟配享之嚴覩虛空之吉祥雲報清泰之再中瑞以遠到者人自蠻船虜帳以求貨者物乃蚌寶蛟綃化被八方慶流萬福寰區有是士庶幸焉時乃秋掃陳雲波澄鯨海蓮清淨而朝涵玉露松偃蹇而夜喝金風雁有翼以辭寒僧無心而入妙幸於是日聊以述焉時唐保大二年八月十五日記賓于字國儀連州人晉天福中進士楚文昭王馬希範辟為零陵從事及恭孝王希萼入金陵賓于歸南唐纍遷滏陽令致仕隱玉笥山自號㣥玉峯叟復起為水部員外郎歸老連州年八十七卒昔者仲尼刪三百篇梁太子選十九首厥後沿朝垂名者不少苦志者彌多入室升堂有其數矣然六藝之旨二南之風後來未甚窮目沈淪者怨刺傷多取事者雅頌一貫亂後江南鄭都官王貞白用情創志不共轍不同塗俱不及矣今覩淦陽宰隴西李中字有中緣情入妙麗則可知出示金編備多奇句祗如乾坤一夕雨草木萬方春此乃王澤所均春風廣扇姑蘇懷古云歌舞一場夢煙波千古愁因想繁華之日引成興歎之詞書王秀才壁句貧來賣書劍病起憶江湖詩人興歎時政如何聽鄭道士琴秋月空山寂淳風一夜生乃景清虛真風回返徐司徒池亭句扶疏皆竹樹冷淡似瀟湘心匠所到景致尤疏落花句酷恨西園雨生憎南陌風阻公子歡動旅人感寒江莫泊寄左偃云煙火人家遠汀州莫雨寒詩人之作客況淒然秋雨句秋聲在梧葉潤氣逼書幃廬山句谷春攢錦繡石潤疊瓊琳比興之言搜羅尤異江行夜泊句半夜風雷過一天星斗寒恐怖一場虛明徹曉寄劉鈞云間花半落處幽客未來時得故人消息句夢歸殘月曉信到落花時肺腸難述懷想可知訪龍光謙上人云相留看山雪盡日論風騷見請道之相於望寒山之不舍又七言宿廬山白雲峯重道者院句雲開碧落星河近月出滄溟世界秋又海上從事秋日書懷句千里夢隨殘月斷一聲蟬送早秋來又夜泊寄友詩魚龍不動澄江遠煙霧皆收皎月高東林寺遠大師句杉檜已依靈塔老煙霞空鎖影堂深登毗陵青山樓有感句千里吳山青不斷一邊遼海浸無窮訪洞仙宮不遇邵道者句羽客不知何處去洞前花落立多時憶溪居句杜若菰蒲煙雨歇一溪春色屬何人又六言句半落銅臺月曉亂飄金谷風多客中春思云又聽黃鳥綿蠻目斷家鄉未還春水引將客夢悠悠繞遍關山賦泉句誰當秋霽後獨聽月明中柴司徒亭前假山句螢影夜攢疑燒起茶煙朝出認雲歸衆目所觀他心不到春莫懷故人句池館寂寥三月莫落花重疊蓋莓菭惜春眷戀不忍掃感物心情無計開贈王道士云槎流海上波濤濶酒滿壺中天地春論元酒太羹常徒肯愛述神龍真虎賢者則知負勤苦值干戈從軍之後受命以來上表中朝乞歸故國以同氣沒世二親在堂棄一宰於淮西獲安家於都邑公之忠孝彰矣賢彥稱之載被朱衣猶思丹桂乃為言曰且名隨榜上者衆藝逐雲高者稀今之人祗儔方干處士賈島長江何須第一者哉公理淦民飲淦水清白著矣歌詠興焉況今賢為寶以禮示人必當閨籍將書清庭即踐愚生於邂逅得遂披承時也素月流天澄江如練對滄州而援筆乏麗藻以當仁以公五七言兼六言二百篇目曰碧雲集癸酉年八月五日序紹南唐人夫鴻濛未兆凝一氣於幽原混沌無形接萬靈於空洞逮夫二儀開闢六合權輿清濁分流元黃異色乾綱既紐麗乎上者日月星辰坤軸斯維鎮乎下者川瀆山嶽士冖柘籥宇宙陶冶陰陽調四氣以運五行育三才而生萬物當其九皇御宇五紀乘時真璞無瑕元珠絶纇輦鳳驂龍之主鶉居鷇食之人性與道俱心將神會惟清惟靜齊含太上之真無慮無營盡類華胥之俗洎乎大道既隱上德寖衰嗜欲之源開知覺之路闢禮樂弛而忠信薄智慧出而詐偽生澆俗滔天元風掃地是以聖人塵籠下土芻狗蒸民千里麒麟慙同跛鱉九霄鴻鵠愧雜壤蟲指異境以飄纓望靈區而稅駕安期東去高步蓬邱老氏西遊遐趨崑頂周家子晉乘獨鶴以凌霄漢室劉安隨八公而度世其如十洲三島四極八荒七靈既駐於鶱林五老亦棲於方丈商徼流精之闕金母攸居滄湄暘谷之宮童君是宅青田紫蓋玉溜丹霞三十六洞天並號神仙之府七十二福地俱為靈異之鄉武夷山者按葛洪傳即第十六升化真元之洞天也又陸鴻漸記昔有神人自稱武夷君曰吾為此境地官因以名焉下有仙祠其來久矣盤根地表積翠天中狀維嶽峻拔之形聳太華削成之勢紅巖紫壁接雲漢以流輝邃宇幽房映松蘿而逗影靈源下發南施化劒之津聖迹傍臨北望遺弓之野筠貞嶰谷木鬱鄧林芝秀五明光搖絶頂草芳十結香滿回溪其間人去瓊樓骨藏金鎖望佳城於碧岫指夏屋於丹崖王子喬之玉棺乃從天降桓司馬之石槨詎假人營陵遷無欲墮之虞劫盡靡不修之歎至於秋中好景物外真遊會靈族於山椒列雕盤於天際金鳳花絞之屋高敞雲亭銀龍彩蔓之幡輕搖日觀瓊精泛雪石髓凝霜調素瑟之和音風雲動色吐清商之妙唱鸞鶴沈聲乃神人化理之區實仙子盤遊之地曩以皇靈中否神器屢遷九野飛塵四郊多壘元都紫府與胡越以同乖玉樹芝田將黍禾而並秀我國家鴻基再造景命惟新受河洛之圖書法唐虞之揖讓會塗山之玉帛莫有後期興牧野之干戈諒多慚德聖上運膺下武聖紹先天應千載之休期執萬年之神契齊乾坤而覆載配日月以照臨庶彙咸亨萬方胥悅向以閩荒未乂蠻徼多虞爰徵不戰之言順彼來蘇之望漢將未踰於五嶺百越從風舜干才舞於兩階三湘獻款九州畏伏八表懷歸南暨龍編北踰雁塞東極扶桑之野西窮弱水之鄉架險船深稽首而請命馳煙驛霧蹶角而來賓可謂威震華戎功格天地而猶日慎一日雖休勿休宵旰忘勞雍熙在念洞山駐想軒皇之問道猶賒金闕凝情周穆之省方未遂乃眷東顧況屬多艱永念靈區鞠為茂草特命出內庫中金宣付建州觀察使王崇文俾乃舊址更創新居再擬丹邱重換絳闕胥臣十除疑剃氏芟除命王爾以行繩令解飛而操斧分月中之仙桂以作宏材並海上之神山將為巨鎮虬堂對峙鷃閣連翹聳勾曲之石樓狀天台之玉室梁橫螮蝀對霽景以增輝瓦疊鴛鴦望晨風而欲遡霜凝皓壁霞彩文楹懸素魄於蕙櫋植紅葩於藻井金鋪月照門闈流熠耀之光珠箔風搖軒楹蹙漪漣之影壇高砌玉樹密攢瓊邃室斯崇真容載穆仙官在列羽客來庭樓殿玲瓏髣佛天中之物境岡巒掩映依稀洞裏之山川爰精集聖之區別錫會仙之嶺神功聖力無得而稱臣識類夏蟲學疏喻馬嵇中散常悲俗骨魯司寇但愧醯雞色絲黃絹之文聲華素乏玉闕丹臺之事紀述何能恭稟宸嚴勉旌福地雖六天成燒與皇極以長存八極飛塵將斯文而不墜頌曰大始未形混沌無際上元開運乾坤定位日月麗天山川鎮地萬彙猶屯三才始備肇有一作肇開神化初生蒸民上惟立德下無私親皇風蕩蕩黔首淳淳天下有道誰非聖人嗜欲源開澆漓俗盛賢者避世真人革命八極神鄉十洲異境翠阜丹邱潛靈宅聖惟彼武夷實曰洞天峯巒黛染巖岫霞鮮金房玉室羽蓋雲軿葬因風雨會有神仙國步多艱一作聖道湮微皇綱中絶四海九州分幅裂稔禍陬隅阻兵甌越寂寞元風荒涼綘闕赫赫烈祖再造丕基拱揖高讓神人樂推明明我后允協昌基功崇下武德茂重熙睿哲英斷雄略神智拓土開疆經天緯地五嶺來庭三湘請吏四海震威一作澄瀾㣥生懷惠猶勞宵旰猶混車書貪狼俟靜害馬方除淹留駿馭想像鶉居一作仙居心懸空同夢到華胥乃眷名山追惟聖迹內庫頒金元侯奉職三境求規五靈一作九靈取則跨谷彌岡張霄架極珠宮寶殿璇臺玉堂鳳翔高甍龍轉回廊錯落金碧玲瓏璧璫雲生柱礎電繞藩牆七聖斯嚴三君如在八景靈輿九華神蓋清霄莫匹明霜匪對倣佛壺中依稀物外一作象外衆真之宇擬之無倫會仙之觀名之維新高峯為壑區谷成坰一作高岸為谷巨壑成塵皇猷頌聲永絶緇磷泌事南唐官句容縣尉我大唐之有天下也造功自高祖重熙於太宗聖子神孫歷載三百丕祚中否烈祖紹興大勳未集肆我大行嗣之德則休明降年不永襲唐祚者非陛下而誰臣聞昔漢文帝承高祖之後天下一家已三十年德教被於物也久矣而又封建子弟委用將相合朱虛東牟之力陳平周勃之謀宋昌之忠諸侯之助由中子而入立可謂正矣及即位戒慎謙讓服勤政事躬行節約思治平舉賢良賑鰥寡除收孥相坐之法去誹謗妖言之令不貴難得之貨不作無益之費其屈已愛人也如此朝錯賈誼賈山馮唐之徒猶上書進諫言必激切至於痛哭流涕者蓋懼靡不有初鮮克有終也而文帝優容不咈聖德充塞幾至刑措今陛下當數歲大兵之後鄰封襲利之日國用匱竭民力罷勞而野無劉章興居之人朝無綘侯曲逆之佐可謂危矣試使漢文帝之才處今日之勢何止於寒心消志而已也臣惟國家今日之急務一曰舉簡大以行君道二曰略繁小以責臣職三曰明賞罰以彰勸善懲惡四曰慎名器以杜作威擅權五曰詢言行以擇忠良六曰均賦役以恤黎庶七曰納諫諍以容正直八曰究毀譽以遠讒佞九曰節用以行克儉十曰克已以固舊好亦在審先代之治亂考前載之褒貶纎芥之惡必去毫釐之善必為密取與之機濟寬猛之政進經學之士退掊克之吏察邇言以廣視聽好下問以開閉塞斥無用之物罷不急之務此而不治臣不信矣詩曰敬之敬之天維顯思書曰警戒無虞罔失法度易曰其亡其亡繫于苞桑言君人者必懼天之明威遵古之令典作事謀始居安慮危也臣觀今日下民期陛下之致治如百穀之仰膏雨願陛下勉強行之無俾文帝專美於漢臣死罪死罪謹言
