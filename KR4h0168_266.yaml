front:
  text: 全唐文欽定全唐文卷二百六十六處元潤州人長安中徵為左拾遺神龍初功臣桓彥範等用事處元遺彥範書言時事得失不納乃去官還鄉里
  hash: sha256:ff51e7554342c109a1e20855fe720940ca77091463931e9540b01806fc71ae33
  markers:
  - {type: head, offset: 14, content: 孫處元, id: KR4h0168_NFKB_266-h1, level: 1}
body:
  text: 夫視之不見聽之不聞理邃杳冥事歸寥廓神之體也陰陽授質天地表形妙萬物而見情滋百寶而見性神之用也有用有體然後鏡窮達而通吉凶惟深惟幾然後繫幽明而極變化潤州城內荊王神廟者漢高帝之從父兄也帝唐之裔豐谷之靈鍾三才而秀出應五運而挺生夫其文足化成武堪靜難慷慨奮發伺風俟時兆示玉雞災成金闕一字泣三靈之罷眷悲九服之無依波震塵飛亂海嶽而騰氣龍興虎嘯乘風雲而扇威於是九四猶疑三千未附代謀於應響之地垂命於容髮之間王洞曉龍韜宏開鳥翼星流電激鶚視鷹揚一麾而獲馬欣三捷而強彭越圍壽春舉周殷之衆會垓下收項籍之功取臨江若拾遺分舊楚猶摧朽深謀出於不代異績崇於一時周邵未之方桓文安足比致君堯舜拯俗阽危大啓荊宇爰藩漢室富陵之釁蟬蛻道窮變通古今之迹是非茫昧之理遺靈宅此歷代攸欽自昔二千石臨郡未嘗不先致饗而後蒞職前刺史東平畢構親為祭文今刺史京兆韋銑手薦酺醢司馬上谷成敬荷高明下濟稟乎剛克之威俊乂稱賢當彼在官之譽抑揚治道含吐藝文溫恭儉遜總其樞正直廉清充其用聿從烏府來佐鳳江萬里表最三台虛佇而尚澄襟靜室攬轡中逵藏往知來誠為易道窮高極遠不昧周經言鍾化牝之符克信懷珠之術慨祠堂之褫落悲厥迹之堙訛乃命衆工精求班匠旋加刻削廣事雕鎪同有子之追寫仲尼等左徹之共朝軒帝精誠通於至理髣佛見於仙祇烟雲氣色似獲嚴凝之助日月照臨如增降鑒之象延㣥峯於戶牖繞浚壑於階墀衆聖盡臻百靈咸暨豈止一蛇為異雙鯉見祥袁真託夢於太元鄧艾通幽於司馬不俟四天之位寧尸八部之榮威儀悉整簫管皆徹由是人無天札歲靡災異風雨調順穀稼熟成一邦之氓僉荷其慶長吏顏元孫舊德名家鴻才碩學性等玉壺之潔心同金奏之諧端右一州羽儀當代録事參軍魏晰司功參軍裴侑李眺等策名來仕清德蒞官不虧基創之餘彌篤敬恭之操盡申明薦咸勗至誠未窮倏忽之遊終保清澄之氣安歌兮緩節緪瑟兮鳴箎始沐藻而祈恩便奠椒而降祉清光滿室瑞氣盈庭粵以大唐先天二年太歲癸丑三月戊寅甫功畢夫寂然不動感而遂通極乎幽贊之情招乎福謙之佑無方無體至變至精顯道而列晬容興物而崇清廟事通元妙光麗自然屏翰千載舟航萬古式揚粹烈爰作銘云帝王興起必有藩捍非獨也周亦聞於漢於穆懿戚挺茲楨幹拯溺救焚夷凶靜難功成不處德盛無鄰威同夏日德侔陽春德盛伊何輔主惠民功成伊何沒代留神神道設教聖人所服得一永符樂天招福不行而至不疾而速利用靡窮聰明難瀆欲達吾信詞陳史祝元之睿宗時人夫魁北藏樞秉三奇於紫掖崑西運軸森萬族於黃輿方領圓冠棹九流而宗學海霓裳羽服乘六甲而下仙巖雖辰像微茫不能味甘陳之識陬維窅邈不能探章亥之功仁義與禮樂可遵未出死生之境昏默與清虛可尚才居天地之先且造化以六合為功聖人以二門分教豈夫百千萬劫量其遠近三十七品語其功業者哉況性相之微不可以名言得虛有之妙不可以智力知三千之淨土無邊八萬之法門虛受能住不思義解脫者也維摩詰者華言淨名居士也沒於妙喜之國生於毗邪之域大仙那提之子常修梵行世號白衣居士焉故總妙圓明現身方丈無起無住不去不來空色空而取真空滅生滅而求寂滅或歸之於無物或得之於默然邪正於是路殊語言由其道斷居士之真宗也若乃家室不離而教傳緇服天子回向而身為白衣讓金粟之尊未即如來之位晦玉毫之相空留長者之名亦猶百谷之王以下莫能大六虛之相居高而自卑居士之洪謙也若乃移外方之諸佛一室規乎四天對樂世之衆生一劫成乎七日毛孔之內鼓大海之波濤芥子之中鬱須彌之巘崿擲世界於恆沙之外不覺不知攝高堂於大會之前同瞻同仰嵐風動地口吸莫以為難猛火燃天腹貯但聞其一居士之神通也若乃㣥邪作梗諸惡延災衆生茹焚溺之悲含識迫傷夷之患由是騁自在之力縱無礙之威破煩惱而擊慳貪斬毒蛇而擒醉象朦幢暫建面縛四魔智劒才揮心降六賊故使波旬振讋不能變帝釋之容外道摧殘不能竊真如之業居士之威力也若乃非相成光乎是相故見於威儀無言假道於有言方形於問答宏乞食之理須菩提但覺茫然聞宴坐之談舍利佛不能加報摩訶迦葉息言於二乘大目揵連吞聲於四衆亦由明鏡內鑒照之而不疲洪鐘外發扣之而必應是以五百弟子同稱我不堪任二千門人盡得無生法忍居士之靈辨也若乃智總大雄心行菩薩雖人我無相以拯救為懷憂本無憂憂凡俗之憂病本無病病衆生之病富室貧里等資其福田酒肆淫房廣談其善誘則知去重昏之小翳朗惠日而無私闕一字中根之大莖霑法雨而同潤居士之慈悲也若乃前際後際無昧於因緣成時化時不違於本願光嚴悟矣行念其道場新學豁然坐知其宿命晨持乳鉢未息粗言中設飯盂普均香氣有疾菩薩憂惱於是併除犯律比邱疑悔由其傾蓋居士之利益也若乃恭承父訓事方便以崇嚴瞻望母儀奉智度而資受結齊肩於法喜坐詠宜家期上足於塵勞行同入室因風起對共賞慈悲他日趨庭獨推誠實知識慕善道品所有居先伴侶求真度法由其見託居士之宗黨也若乃上棟下宇空寂為輪奐之資淨服名衣慙愧入裁縫之用開八正之路則衆馬交馳坐四禪之牀則身心不動智惠之果秋垂無漏之林淨妙之花春發總持之苑禪悅為味詎假珍羞解脫充漿寧思玉液奏法音之樂則絲竹藏聲燒異品之香則旃檀罷郁居士之遊處也於是隨意所轉覺路遐通應緣而攝梁津克寸濟恢勇猛之志則火闕一字生蓮廣闕一字虛之因則水中現月法本希有若都優曇之花道之將行大備貝多之葉舉閻浮之國土禮敬忘疲想毗耶之人天聲塵不朽居士之遺跡也得其道者則三乘弟子羞稱多聞行其法者則七種學人莫不愛樂是致四天讚仰而無暇十地攀接而無階王者資而九有清㣥生聞而六念作雖驪龍改地共尊金粟之儀水土遷行長奉寶臺之供我國家神明造物聖政調時滌瑕穢而玉鏡清剗澆訛而撝大朴牢籠七十七代鬱映萬八千年率土之濱罔有弗韙普天之下共惟帝臣京坻積而銅爵鳴鐘鼓和而玉羊現將益四生之福爰開十善之因精舍廣祇陀之園列郡揚淨名之教萬姓資其分別八方暢其休明天地平成於是乎汲引在江寧縣瓦棺寺變相者晉虎頭將軍顧愷之所畫也爾其上纏珠斗下控金陵六代為天子之都三分入王孫之國禮讓流行之地英靈誕秀之鄉鷲巖分虎踞之山鴈塔枕龍盤之水總幽閒與形勝則瓦棺之寺焉昔有晉莊嚴淨域時梵侶以規模雖廣雕飾未周永念粹華每疚懷於須達共成圓滿而假力於檀那凡厥施財莫匪鳴剎顧君乃連扣資數百竹卞逾千萬大衆眙愕不知其然君習氣精微洗心間雅雖纓辨混俗而繢素通神乃白緇徒令其粉壁於是登月殿掩雲扉考東漢之圖採西域之變妙思運則冥會能事畢則功成神光謝而晝夜明聖容開而道俗覩振動世界謂彌勒菩薩下兜率之天照耀虛空若多寶如來踊耆闍之地由是士女駢比擁路爭趨車馬軒轟傾都盛集玉貝交獻須臾而寶藏忽盈青鳬亂飛俄爾而銅山崛起納繒帛者繼踵施衣布者架肩當鳴剎而雖則可驚不崇朝而過其本數非夫精義入神者孰能與於此乎雖江山寂寥居處緬邈年移代改留侯歎過隙之駒郭是人非丁令化遼城之鶴由是觀其道場妙矣謂應供而來儀牀枕儼然疑有懷於問疾目若將視睂如忽嚬口無言而似言鬢不動而疑動豈丹青之所歎詠相好之有靈哉頂禮者肅如在之心瞻仰者發歸依之念信受演說之旨大布於人天住持負荷之規實存於牧宰刺史楊令琛懷軌物之量韞不伐之才五服當列土之榮千里負專城之寄移風易俗頻垂董相之帷揖道歸真再擁文侯之篲長史薛宏以仁賢雅望迂德於仲舉之輿司馬成景賀以卿相高才屈跡於士元之驥俱遊六藝貯籯金而常滿共逢三朋攬衣珠而永悟縣令陸彥恭風神俊邁境宇恬虛雖馴雉巳彰實割雞焉用風亭月牖還開見寶之詞石冷泉清頗恣分襟之賞修菩薩之行則仰之彌高現宰官之身則威而不猛相門出相茲焉在茲佇聞摶擊鵬衢栖遲鳳沼豈徒播茲風化奏彼絃歌而已哉丞鄭孝義逸氣飛騰英懷倜儻擢命世之標幹揮舍人之符彩我之自出鳳樓鳴五色之雛家之積善牛渚降九派之族宏才博學再閲康成之門愛客好賢重覩當時之驛朋友推其令譽人吏偃其高風歷州縣而暫勞獻鹽梅而詎遠主簿于植才藝早著水鏡長懸將騁驥於高門先漸鴻於下位尉史惟清以雍容儒雅門專秉直之風以磊落才雄巖引乘箕之宿則知龍駒千里非黃綬之所羈鶴鳴九皋惟青天之是矚家裘不墜望台鉉而相輝堂構克隆見公侯而必復寺主曇影及徒衆并諸寺大德等並法身挺秀覺意圓明屈拔提之尊號懷盛明之忍辱四十二之賢聖接踵比肩一十八之闕一字虛心持目想勇猛精進將億耳而齊驅博達多聞與阿難而並騖言論辨了有類鵬蓍體性利根更嘉鴦掘故能經行不倦拯濟忘疲模楷四流笙簧二諦邑人左補闕馮宗右拾遺孫處元等並資忠履孝抱義懷仁凝大江之精靈鬱高山之景行莫不衡門育德華省馳聲或長揖九徵或光膺八命所以東南蓄寶江左有人焉既而道俗披誠賓僚託款濫見推於相質遠不讓於當仁弟子謬忝詞場頻擢桂林之秀言瞻法宇早從祗樹之遊覩泡影之皆虛悟聲色之非實雖心為形役而志與道俱思惟必在於佛乘夢想無忘於梵行觀居士之跡不可思議閲居士之言得未曾有恨不親承聖旨捧袂於不二之門躬奉尊顏跪履於大千之界託菩薩之下位共拂天花接比邱之末行同窺聖果昔讚舞鸞之化每有願於揄揚今從問鵬之遊豈得默而無述爾時欲重宣此義是以敢作銘云其詞曰元氣浩浩大匠存存鎚鞴精粹折託乾坤四生有劫六趣無門愛流夕漲塵飛晝昏其一巍哉世雄應期來現妙矣居士隨緣利見大庇生靈遂荒臺殿劫塵遐邈恆沙法遍其二空牀寂寂虛室間間文殊奄至波旬遽還拔毛沃海剖芥藏山地分珠柱天潤玉顏其三智惠無邊威靈具足廣延寶座高蹈金粟振動人天津梁道俗火宅垂蔭幽徒炳燭其四於赫有晉像教斯傳繢事闕一字矣靈儀在焉神光夕照瑞相朝圓赩如電掣皎若星懸其五我皇垂拱誕膺寶位控引四流陶鈞萬類法闡妙有靈通夢寐政事以和物無不利其六天陰南斗地擁東吳江山作固臺壘稱都俗富英俊人多給孤莊嚴結構炳煥規模其七瞻彼邦邑媚茲寮寀化偃一同聲馳四海冰王常瑩松筠不改乃眷道場肅焉如在其八薄遊淨域永念毗耶香如致飯衣似持花嚬容示疾啓齒降邪室懷方丈會想無遮其九杳杳三界茫茫九有瞻仰睟容思惟受手式刊貞石僉圖不朽盛烈鴻名天長地久其十乂字尚真趙州房子人第進士舉茂才異等纍調萬年尉景龍中纍遷中書舍人修文館學士景雲初封中山郡公開元中為紫微侍郎拜刑部尚書卒年六十八贈黃門監諡曰貞江南水鄉採捕為業魚鱉之利黎元所資土地使然有自來矣伏以聖慈含育恩周動植布天下之大德及鱗介之微品雖雲雨之私有霑於末類而生成之惠未洽於平人何則江湖之饒生育無限府庫之用供支易殫費之若少則所濟何成用之儻多則常支有闕在於拯物豈若憂人且鬻生之徒惟利斯視錢刀日至網年滋施之一朝營之百倍未若回救贖之錢物減困貧之徭賦活國愛人其福勝彼郎官上應列星惟帝稱難邑宰下宣風化得人斯委江延材膺訓俗功寄臨人拜職周京銅章之秩六百隨班蜀國劒門之路五千冀行鄒魯之風思變彭岷之俗上琴臺而馴翟依石鏡而翔鸞將宏富教之宜用廣文儒之業爰調子弟是蠲徭賦環刀密布聚糧求任土之資裂裳負笈函席就橫經之道惜乎英靈莫嗣曾靡尚於摳衣剛悍猶傳遂有歌於剚刃不漸文翁之化有逾原壤之愆擅賦之條在江延之何負謀殺之狀顧諸生而已彰上藩之斷頗乖録事之批為得維景雲元年十月朔日節愍太子梓宮啓自鄠杜粵某日將陪窆於定陵禮也蜃衛初列鳳仙將遠閲少海而不留赴窮泉而莫返皇帝懷副君之大義降猶子之深慈飾忠烈於逝者備哀榮以送之漢幄虛侍周牆肅事思臺空築幽埏永閟金相兮玉裕揆行兮旌能峻節兮無泯芳聲兮有恆其詞曰素雲流祉白水貞祥祀及百代威加萬方勃焉家國赫矣皇王帝子攸降乾男以將邁德誕靈懷文抱質漢臺占雨秦宮近日敏對不㣥能言罕匹藝該百變詞含六律朝霞自舉夜月嘗遊醴薦推穆書成重鄒典戎仙衛作牧神州是謂元子光膺孟侯少陽正位太學知道春誦夏絃尊師敬老榮承玉匕寵殷瑜珮三善不忘四章旋逮過闕則下入廟斯趨曰仁與孝終始不渝聖敬日躋溫文歲廣望高周副才優魏兩周事有倫出言無黨政成中外聲溢天壤邪臣作蠱匹夫知惋不顧身尤將夷國難忠義斯仗謀猷是斷獲戾宮朝歸魂霄漢白駒過隙蒼蠅止藩水逝西沼霜雕北園鶴闕誰馭鳩里徒冤瞑目於此傷心詎論嗚呼哀哉去日淪暉前星墜彩形神溘謝德音如在物是人非年移運改聖朝延鑒徽章有待有待伊何慶逢開闢延鑒伊何恩隆典冊即鳴鳳之岡嶺啓占烏之隧宅人辭中壘之桑鳥思平陵之柏地如伊水山連紀市嗟委化於仙期欲問安於神理五營成列萬國咸酸挽鐸朝喝旌麾曉寒指牽牛以南渡乘飲龍而北傃顧青舍兮非春掩元扉兮大暮昔之來矣銀榜銅樓今之往兮曠野荒邱冉冉兮辰促蒼蒼兮道悠惟聲華與純懿比金石而恆留嗚呼哀哉均長安中官雍州富平縣丞原夫六塵不染五蘊皆空將導㣥迷爰登正覺大雄見世既開方便之門真諦乘時更顯因緣之路是以耆山廣演火宅斯分給園宏誓樊籠自釋聖人之德不可思議弟子通直郎行雍州富平縣丞韋均比為慈親不豫敬發菩提之心今者所苦巳瘳須表證明之力遐徵琬王近備雕鐫謹造像一鋪敬為銘曰大哉至聖妙矣能仁濟世無德歸功有因潛開覺路暗引迷津願回光於孝道永錫壽於慈親孝倫武后時守記室參軍事若夫銀枝育祉締靈影於金園劒雨銷氛飛惠液於沙界自鶴林祕彩雞山蘊迹甄睿像於貞金刊瑞容於芳琬風猷不墜繄此賴焉紀國太妃韋氏京兆人也苕姿含綺霏華椒掖蘭儀湛秀緝美蘋隈而思惕紅沙浪真輝於五劒神棲縞霧延妙業於三珠爰擇勝畿聿修靈像質融虬彩影襲鸞騫月逗仙河分紫眉而汰色星流天菀翊紺瞳而飛照懇誠巳罄茂績其凝化鳥旌越海之功藏龜彰拔塵之果昭昭峻業難可名言者哉加闕一字凝石疏基均霜表地川潔桐園之翠風送杏巖之香雖淨鏡開金慮睽闕一字於桑海宏規籀石諒終期於芥城其銘曰二靈已散一體未融動植滋夥物象相蒙情氛委嶽識浪隨風終淪闕一字住孰亮三空大雄降迹元津斯演瑞浦澄流祥山闢巘雪童戰勝檀林翼善了義西宣妙輪東轉葉潤攸在震區有庇望影咸圖尋光必萃粵惟德範夙探微祕詣道雖忘瞻容乃喟珠瓔褫玩銀藏傾財林中寫塔雲外崇臺臨豪月滿映臉蓮開香烟起霧梵響驚埃南控鸞川北馳春路萬室回曬四依輟步撫因共植披文同悟比日長懸隨山永固善思名撰同州朝邑人以字行消聲幽藪科擢第武后時為監察御史稍遷太史令景龍中纍遷禮部侍郎善思精天文卜相之術睿宗在藩善思言必登帝位既踐阼拜右散騎常侍唐隆元年鄭愔謀冊譙王重福為帝僞制除善思禮部尚書事覺配流靜州赦還開元十七年卒年八十五臣謹按天元房録葬法云尊者先葬卑者不合於後開入臣聞葬則天太后卑於天皇大帝今欲開乾陵合葬即是以卑動尊事既不經恐不安穩臣又聞乾陵元闕其門以石閉塞其石縫隙鑄鐵以固其中今若開陵必須鐫鑿以神明之道體尚幽元今乃動衆加功誠恐多所驚黷又若別開門道以入元宮即往者葬時神位先定今更改作為害益深又以修築乾陵之後國頻有難遂至則天太后權總萬機二十餘年其難始定今乃更加營作伏恐還有難生但合葬非古著在禮經緣情為用固無定準况今事有不安豈可復循斯制伏見漢時諸陵皇后多不合葬魏晉已降始有合者然以兩漢積年向餘四百魏晉之後祚皆不長雖受命應期有因天假然以循機享德亦在天時但陵墓所安必須勝地後之允嗣用託靈根或有不安後嗣固難長享伏望依漢朝之故事改魏晉之頽綱於乾陵之傍更擇吉地取生墓之法別起一陵既得從葬之儀又成固本之業臣伏以合葬者人緣私情不合者前循故事若以神道有知幽途自得通會若以死者無知合之復有何益然以山川精氣上為星象若葬得其所則神安後昌若葬失其儀則神危後損所以先哲垂範具之葬經欲使生人之道必安死者之神永泰伏望少回天眷俯鑒臣言行古昔之明規制私情之愛欲使社稷長享天下乂安凡在懷生孰不慶幸臣伏見太常奏公除後請習樂以供郊廟享祀奉敕不允臣與衆官詳審以為樂音氣化所以感天地動鬼神調五行均四序故哲王垂制被之樂章六變而神祇降饗九成而祖考來格今陛下以服未一周久停六律稽象德於太廟寢祈福於近郊何以昭永歷於上元助成功於先聖考之典禮恐或未安臣以漢魏喪禮以日易月者蓋為三年不為禮禮必壞三年不為樂樂必崩是也以樂因陽來禮由陰作樂崩則陽伏禮廢則陰愆風雨或違粢盛遂闕豐潔之祠有謬兆庶於是不安所以變諒暗之舊儀遵適時之新禮斯實存至公於天下割巨痛於私情祈社稷之永安庶宗廟之長享孝道之大何以加之使漢魏之禮未然則當自我作古况其得禮之變詎可越而不從伏請依太常所請許其教習
