front:
  text: 全唐文欽定全唐文卷六十七穆宗四
  hash: sha256:bb06bd57a4704b722e3d5b743eb2cd3136314b7cdb83352788d0c5f3309f9b63
body:
  text: 敕朕聞昭德示威先王所以用武禁暴夷難後代安能去兵故文德誕敷武備宣耀外以環禦四海內以砥靖中原則軍旅之制有經師律之能必表朕纂承鴻業虔奉丕圖宵分永懷何以康濟豈獨鼓鞞有感方思將帥之臣征伐為心乃寵干戈之士況文武並用古之格言勳舊不酬勞者何勸惟我高祖太宗以晉陽之旅平一海內肅宗以靈武之衆收復二京代宗有郟郊元從之臣德宗有奉天戡難之士每念勳伐無忘寢懷如聞近日武班之中淹滯頗久雖負材略無由自明又有諸道薦送大將或隨節度歸朝自今以後宜令神策大將軍軍使及南衙常參武官各具由歷授官年月前後功績牒送中書門下若勳伐素高人才特異者有相當用處即具名聞奏量加獎擢其常參武官資考深久未得遷轉者準具員年月與改轉不得令有淹滯其先授文官者亦宜準此使幕賓寮皆有年限改轉軍府大將豈可獨不序遷自今巳後諸道節度都團練經略等使下各隨本處是大將名目巳曾授監察巳上官者並限三周年量與改轉如有功效合非時與改轉者不在此限其職名是兵馬使都虞押衙巳上前後並未曾奏官者亦仰量績效奏官轅門委質營壘分師有役干戈無由耕稼況自天寶巳後屯兵七十餘年皆成父子之軍不習農桑之業一朝罷歸壠畝頓絶衣糧言念饑寒深用嗟憫應天下節度都團練防禦經略等軍所置軍數各委本道據守舊額以度定數不得輒有減省其有逃亡病死及過犯解退當時揀擇有武力藝能者添補奮於行陳決命捐軀不顧危亡每嘉忠烈官健有死王事者三周年不得停本分衣糧如有父兄子弟試其武藝堪在軍中承名請衣糧者先須收補孝本安親深惟養老用敷恩惠以慰耆年應軍將及官健有父母年及九十巳上委本道本州每至節歲量與酒麥丏優養定塞備邊固不可廢煙塵既靖亭障無虞諸道舊有防秋兵馬巳在邊上者自依年限替代近者師旅屯集饋餉頗多不免於諸道留州留使錢內每貫量抽二百文以充國用幽鎮既巳洗雪供費亦漸有常其河北諸道及山東亠兊鄆淄青汴宋陳許徐泗澤潞河陽鄭滑等道并邊上諸鎮並不用抽刁斗晨嚴烽煙夜警勤勞沙塞寒苦邊陲其沿邊鎮戍烽子等並委所管節度及城鎮使量與優賞仍與交番上下使其勞逸得均使命往來本於傳達軍期緊急遂至繁多非唯郵傳不供抑亦號令難一自今巳後應緣山東行營兵馬未歸本道巳來進退事機並宜專委節度使仍仰條疏舊弊一一奏聞除事關迫切須遣專使外其餘書詔文牒一切分付度支入遞發遣制使中使到諸道行營不得輒受人事錢帛及行非理鞭撲當加檢察義不優容榷管之設誠為救弊隨方適變所貴便人其河南河北鹽法宜委鹽鐵使與本道節度使審度會計商量務以便人為法閲習土宜則通吏理既因試效可驗政能應河北諸道宜委觀察使訪察管內見攝官中或清強有才能課績者具前後所攝年月并事跡聞奏當與正授從政之方必原風俗視人相土乃合所宜弛張在達於無私法令所期於不擾應河北諸道並兗鄆青等州道應有新舊科條有不便於俗者委宣慰使與所在長吏商量廢置務從人欲於戲朕戴天子人操執重器不以四海之富而恃其力每以百姓為念而兢於心慮文教之未敷思武略之多闕所以輟食當寧求衣未明揣摩萬機寧止三省頃以馭宇之歲藩方乂安委於廟謀以輯軍政而有司不達茍以惜費為心致滋停減之名無裨毫釐之用使軍中老幼悉歎無歸朕博聽羣言用革前弊舉其指要冀叶羣情庶乎侯伯列城典我師旅勵精撫士用副憂勤中外布宣明知朕意門下仲尼有言詩云執轡如組審此言可以為天下也蓋為聖人組修其身而成文於彼故伯益贊禹則曰滿招損謙受益所以服有苗夏后啓亦云吾德未至教未善故能克有扈苟齊俗有禮化人以躬尚可感於神明柔於蠻貊況纍聖遺教升平舊風堅金在鎔惟人之所鑄猛獸在柙由人之所馴因而撫之敢忘前訓朕以菲德纂承鴻緒屬先皇掃刷中㝢康濟兆人八表晏然五兵咸息常兢懷於繼述思致理於和平豈以樂戰為心佳兵在念而鎮州以承宗云亡自歸誠款幽州以劉總懇志願釋兵符相繼來同無思不服非朕勤於遠略力以致之亦既綏柔咸加霈澤不愛金帛以惠我戎士不吝爵賞以寵其偏裨復以一二台臣常推謹願庶將朕志以靖方隅而佚於既安莫能思患曾未纍月旋聞叛離朕亦欲因其人心命將擇帥顧念宏正盡忠先朝身嬰陷害家受屠戮為之元首能不痛心是用下制先申告諭求其凶惡冀釋幽冤仍令四面節制各守封境不欲遽加誅討所望自效忠誠而將士等懼罪以相保王庭湊為衆之所逼固其封壤捍以兵鋒每聞戰爭永念黎庶為之君父又何忍乎是用輟食忘寢晝夜萬慮恭惟烈祖之訓必用兼愛之心務以安人為國本不以窮武為威力顧豫寡昧敢忘遵承為追念而興師巳極君臣之分為軫憂而捨罪豈非帝王之道況王庭湊倉卒之際固非始謀接之以恩榮自當展其志義委之以戎鎮必冀效於勳庸禍福無門行之則是弛張在我用亦何常苟推信誠便保忠順苟得其衆孰非吾人擢而任之式示光寵宜特舍雪仍授檢校右散騎常侍兼鎮州大都督府長史御史大夫充成德軍節度鎮冀深趙等州觀察處置等使應成德軍將士官吏一切依舊待之如初仍令兵部侍郎韓愈充宣慰使於戲朕於彼三軍惠非不至於彼闔境恩非不周今宏寬大之典以應陽和之令使離散者見親愛之樂暴露者歸室家之安各宜感悅以就寧泰布告中外體朕意焉主者施行理天下者務於安遐邇致康濟者資於懷兆人朕統馭萬邦式敷王度任藩方以俾乂冀干戈之載戢虔恭惕厲未始暫忘推豫是心布及中外昨乃夷門逐帥逆將興師蒼黃變生士庶無告逆賊李㝏驅掠忍害流離毒痡在浚之郊若鼎將爨逼脅我軍士盜竊我戈鋋驅馳外坰敢肆蜂萬䖵朕所以不降明命未行天誅容其革心以示迷復蓋以一方軫念三面開羅將宏愛物之私用表好生之德而梟音恣醜狼顧憑凶危巢巳焚禽息猶若光顏韓充曹華智興等感激忠勇揮戈誓師雷奮鼓旗所向風靡逆黨殲殄郊原霧清熊羆之師漸及摩壘夫疾風斯來而徑草方辨熾火將燎而良金益明果聞義烈之臣奮起轅門之內一揮斬首三令無喧嚴城洞開以來帥永言忠效是錫寵章其梟斬逆賊李㝏宣武軍都知兵馬使李質巳從別敕處分忠武亠兊海武寧鄭滑等軍將士等感主帥之忠誠忘身赴敵視寇仇而忿嫉決命爭登高承以睢陽一郡之師當蛇豕奔衝之勢咸能勦其醜類如刈草菅各振軍聲用宣威略其忠武亠兊海武寧鄭滑應赴行營及宋州將士等並節級各有賞物巳別處分支給委本軍據功勞額例給散歸還之時仍加宴勞朕念彼無辜墜此塗炭橫為凶狡驅脅傷痍其汴州管內州縣官吏軍鎮將健及諸色職掌人等頃罹脅汙自拔無由撫事量情亦可矜恕除同惡巨蠹者其餘一切不問仍加榜示如或妄有恐嚇言告者科其反告之罪干戈暫興里閭必害眷言農畝是廢耕桑其汴宋鄭三州罹此凶逆士馬屯集供億併繁雖事乃徇時而人亦勞止豫懷軫念豈忘優矜其三州管內有兵馬所到州縣百姓或被驚擾處且於今年秋稅三分內量放免一分仍委州縣長吏切加綏撫其賊中雜差點子弟夫役放還鄉里俾安生業其中有不能自存者量事優恤應百姓中有被分外無名賦斂者並當時勒停義士忠臣見危死節賞功褒美冀及殤魂惠恤其孤庶明報效軍有陳亡將士等并李㝏為亂以來有潛謀效順誠節可嘉并因此遇害者並委本軍審勘具名銜事跡申奏當與甄獎及加褒贈仍令本軍優給其家三年不停衣糧并委所在州縣速為收葬量事致祭其將士有因戰陳傷損尤甚以致殘廢者各委本軍厚加優恤仍勿停解掩骼埋胔國之令典迫於凶醜深可傷嗟念其本亦吾人蓋由事非獲巳其經戰陳處所有賊中遺骸宜令所在州縣隨事收瘞勿令暴露鳴呼弔伐之道豫遵格言靖寇安人豈忘終日朕載橐弓矢思保黎首而雨露所均動植所繫一夫竊歎朕每興懷況茲浚郊都邑之會所以慎擇將帥期於乂安今寇孽已清封壤寧息師之所處用軫於中將申宥恤之恩庶息瘡痍之後布告中外咸使聞知朕上奉宗祧下臨邦國承烈祖垂鴻之慶當纍聖奕葉之尊祗膺寶圖敬守丕業體明離立象之重表青宮建嗣之崇元良以貞國本斯固皇太子湛恭孝溫文生知夙稟日者春闈尚曠東序未興朕嘗訓以義方舉明嚴敬匪資調護巳達詩書克保承休爰當主鬯膺茲典禮慶感良深踐位少陽允孚明命用宏惠澤庶洽兆人自長慶二年十二月二十日昧爽巳前天下應罪合死除犯贓降從流流罪巳下遞減一等左降官及流人並與量移亡歿者任歸葬文武常參官及諸州府長官子為父後者賜勳兩轉緣冊太子攝太尉稱賀攝侍中承旨宣制進中嚴外辦攝中書令讀冊授冊各賜爵一級其行事職掌官及書寶宣冊舁舉冊寶禮儀使禮官等三品巳上賜爵一級四品巳下加一階撰冊文官特加一階仍並賜物有差導引官各加一階鐫造冊文及禮生等賜勳有差文武常參及陪位官并宗子諸親賜勳一轉景王府官量與進秩夫師賢友善庶發清明習近性遷必資宏道所以慎師傳用保賢良其太子侍讀宜委中書門下精選二人具名聞奏朕遐思三古旁考百王邁德彰仁在於兢慎故詩稱翼翼易美乾乾惟此之格言豈忘於終日況天地之仁莫先於利物朕乃者膳飲非適興居不時風霜所侵遘癘虐疾賴上元降鑒列聖垂祐尋克有瘳至於安節深慙慎德重切貽憂爰因康復之初式表精勤之至況江淮旱歉滑鄆水灾方念恤人寧忘約己應緣御服及器用在淮南浙西宣歙等道各供進者并端午降誕常例進獻等一切權停其諸道每年準旨條合貢者委度支商量疏理如非切要涉於冗費者一切停進夫適情悅目肆巧雕文玩好雖充農桑實蠹朕將齊服應用每念黎元應諸道除常貢外不得別進玩好之物近日諸道多奏祥瑞且休徵所感靈跡所昭必驗祥經應孚元化自今巳後除合準式申奏外餘一切不得妄有進獻虛為煩費卑宮菲食常遵大禹之心馳騁畋遊每奉元元之誡朕勞思惜費恭念好生將欲濟人期於克寸己每日供御及供宮內食料等一物巳上各委本司商量節減仍具所收費用數速分晰聞奏當付度支管計以添充經用五坊鷹狗之類量留充備搜狩之外一切盡放其淮南等道當臨遣使臣別有處分於戲天鑒在上敢不嚴恭人視在下敢不兢畏既驗有喜之兆永懷無逸之規凡在中外宜表朕意朕以寡昧獲守重器兢厲畏惕於茲五年皇王之事罔不修備而大典有闕舉而行之粵以元正朝於正殿百辟咸序萬方來庭思欲推至仁以布和奉天時而施令況上蒼貽慶列聖垂休輔於豫躬以致寧復思與臣庶同被慶靈俾茲囚隸亦洽流澤自今年正月一日巳前犯死罪者並降從流流罪以下遞減一等其故殺官典犯贓犯十惡者並不在降等之列左降官未曾經量移者與量移近處流人各據本年限與減一年如本限只一年者放還朝賀之禮國之盛事肅恭班位敷贊威儀俾申慶賀以示宏普其應元日緣朝賀行事官三品以上賜爵一級四品以下加一階文武常參官并六品以下及宗子應陪位者并諸道賀正使各賜勳一轉先巳至上柱國者任回與周親諸藩陪位賜物有差今兵革甫寧典常粗舉雖慙至理可謂小康惟水旱猶虞黎元重困公私蓄積頗有未豐宜令諸道觀察使刺史各具當處利害其有弊事可革有便於人者并言何術可以漸致富庶附驛以聞亦不用專使詣闕以致煩費其封畿之內百姓利病委京兆河南尹具以條奏於戲束帶立朝必咨忠讜濟時利物式佇謨猷其文武百僚各上封事極言得失無有所隱如有事可施行者便委中書門下量加獎用朕以執契馭時任賢興化孜孜王道期致太和凡在官寮宜悉此意伏以正坤元母天下符至德以升大號因景運而飾鴻猷煥乎前聞焯彼古訓以極尊尊親親之義明因天事地之經有自來矣伏惟大行皇帝貴妃大虹育慶霽月披祥導靈派於昭回洽殊仁於氣母範圍百行表式六宮粵在中闈流宣陰教輔佐先聖勤勞庶功顧以沖眇遭罹閔凶荷成命於守器之時奉寶圖於鑄鼎之日哀纏易月痛巨終天而四海無虞萬邦有截仰惟顧復之德敢揚聖善之風謹上尊號曰皇太后維長慶二年歲次壬寅十二月丁亥朔越二十日景午皇帝若曰於戲惟辟奉天必建儲位率命上嗣以立人極所以大一統而貞萬邦也粵我祖宗乃聖乃神繼體垂休奄宅四海洎於寡昧祗荷丕緒夙夜兢勵深惟永圖用稽古命嗣以承無疆之慶咨爾元子景王湛粹哲自天溫文在躬夙成厚德弗形幼志爰謀表社克彰孝恭敏事居敬日新其度是用命爾為皇太子爾其欽哉主善勿懈由禮勿違勉以入德勤以聚業修志罔怠自誠而明則可以刑於邦家對於上下用光我烈祖之休命可不慎歟維長慶四年歲次甲辰正月辛亥朔二十六日景子皇帝若曰惟天輔唐德我祖宗克答天意邁德勤道紹休大業洎豫一人嗣守四海祗事天地愛育萬物罔或怠惰於茲五年今寢疾彌留不興不寤獲以重器付之元良咨爾皇太子湛列祖儲慶自天生德孝友慈惠溫良肅恭必能輯寧邦家輝光緒業是用命爾陟於元后宜令中書侍郎平章事牛僧孺奉冊即皇帝位爾有孝敬之志可以奉宗廟爾有廣厚之量可以奉神祇和惠可以撫萬邦仁愛可以親九族任賢尚德遠佞去邪爾惟欽承無忝我祖宗之休烈古者聖人莫不研七精之數以察天道設四時之官以授人事在顓頊之代雖汗漫靡察制度未備然巳有重黎二官故可得而述是以欽昊天協時月必首於堯舜之典敘九章用五紀亦冠於周宗之書則知履端受命斯為本也我國家侔天地以制法統陰陽以立極恭惟烈祖嘗所盡心載誕神人協成律象太史究洛閎之術大慧極容成之妙而體聖創制賾隱窮神順時氣之發斂考星度之疏密故亦窮變化洞窈冥矣然後陰陽和刑罰清八風之敘立萬物之序成纍聖纘序必更紀歷推體元居正之道彰敬授惟新之法斯舊典也曷敢廢乎朕以菲薄未明至理荷祖宗之耿光守聖人之大寶深懼不德獲戾於上元感易象之隨時懷禮經之聽朔又嘗覽漢丞相魏弱翁之奏以為帝王法天地順四時以理國家奉宗廟安天下之大禮也爰命太史洎乎疇人望於清臺論思於別殿究以微妙考其禎祥觀渾儀以見天心視圭景而知日至則八卦之氣不雜百工之職允釐豈必於記威鳳之晨晦明無爽候仙蓂之莢弦望不今勒成三十四卷命之曰長慶宣明歷承唐堯授人之規庶於是矣效軒后合符之驗非所企焉因敘制作之由在乎篇首代有覺人為如來使龍鬼歸降天人奉事聲飛五天辭驚萬里金烏西沈佛日東舉稽首歸依肇律宗主
