front:
  text: 全唐文欽定全唐文卷四百八十五權德輿三
  hash: sha256:806fb3abaf364be6dc217fb07c423108737bb6f67f884e42d93467c0eda981ea
body:
  text: 臣某言伏奉今日恩制授臣中書侍郎同中書門下平章事詔書自天受命惶悸俯伏循省不知所容中謝臣聞宰理中樞從古所重貞教化之本導陰陽之和外撫四夷內循百職或乖於是則謂曠官臣志在服儒才非經遠爰自筮仕期於代耕而遭時踰量踐歷朝序自奉禁中之職纍叨望外之恩超二冬官兼司選部流品未序銓綜乖方以榮為憂伏待譴責豈謂特延睿渥參列廟謀以瓶筲之資當柱石之重況臣自去夏尚守臺郎周月之間遂懸相印承陛下勵精之切副陛下則哲之明循量省躬必知不可伏乞俯回詔命別選公才敢瀝血誠上黷天鑒無任惶懼懇迫之至謹奉表陳讓以聞臣宗儒言臣伏奉今日恩制除臣為同中書門下平章事祗奉承命捧讀詔書心魂震驚拜忭失所中謝臣聞燮贊化源參和鼎實上合一德以平六符苟非其人所繫斯重臣本虛薄素無器能徒以文藝獲承代業比肩多士陳力清時纍叨渥恩踐履官序頃歲奉職中禁草議南宮遂忝左曹列於近侍顧常內訟已慮曠官豈謂宸眷特加擢任非據伏自循省不知所安且臣去冬尚守郎吏今才一歲遂備台司苟非全才難塞公議雖鞠躬匪懈必盡事君之誠而宣化賦政恐纍知臣之舉生成難報覆餗是憂伏以面奉德音不敢更有陳讓拜章感涕上答何階無任荷戴惶懼之至謹奉表陳謝以聞臣損言審已無庸謬膺寵授昨所陳讓迫於懇誠冀全至公豈敢外飾黃閣重務非才實難墨詔復臨捧讀增懼臣聞惟君知臣任之以器惟臣事君量而後入生逢昌運自比可封之人職在台司難逃竊位之責三年待罪無補盛明再命逾涯轉速官謗天威咫尺愚慮屏營伏以令斷表章不敢纍瀆宸扆雖誓心畢命以竭微衷而折足覆餗其如公議無任感恩惶懼之至謹奉表陳謝以聞臣某言臣頃待罪中樞特蒙睿渥既切維鵜之剌又叨錫馬之榮憂在忝曠積成疾瘵聖慈全貸尚列師賓見矜福過之災猶積喜中之懼況茲天驥輟自御間實有代勞之功且期致遠之用特優賜與以寵宰司臣自改官即合進納而心力衰耗晦明纒綿筋骸自便惟在床袵視聽所知不過湯藥沉疴餘息有異常人平居故事皆所廢忘頃年愧懼已切於負乘今日稽留自疑於奪魄因緣尸素積纍罪辜疏愚昧瞀殞越無地謹隨表奉進無任惶恐震懼之至臣某頓首頓首謹言臣某言臣去九日於延英對陛下勤求理本語及史官遂命崔損承旨令臣兼修國史臣省已無取受恩殊常倉皇震驚未及陳露今日中使某乙奉宣進止授臣此職竊自思忖非所克堪感戴屏營不知所據伏以裦貶善否裁成義類直辭是繫往哲攸難臣謬踐台司無補皇化每憂覆敗上負聰明豈足以再紆宸慈纍忝榮渥稽前古之彞訓昭聖朝之法誡立言載筆豈易其人量力循涯自知不可又自貞元四年李泌後宰臣遂不兼此職蓋以論著慎重留於聖心自非時謂全才何以遠循故事用此內省以榮為憂況君舉必書時同堯舜之理任人以器顧無遷固之能所覬殊私特寢成命無任感恩惶懼之至臣某言伏奉今日恩制除臣太子賓客睿慈曲被宏貸特加捧承命書感抃交集中謝臣以庸劣纍叨鴻私無補廟謀徒速官謗妨賢歲久嬰疾日深纍陳愚衷上黷宸鑒敢言知止誠以乞身陛下亭毒之恩不遺微細載紆詔旨尚列賓師全度終始於臣為厚局天蹐地空荷生成無任感戴欣懼之至謹奉表陳謝以聞臣邁言伏奉今日恩制授臣中書侍郎同中書門下平章事祗奉詔命循省妄庸感恩量力不知所措中謝臣聞宰相者敘四時之化順萬物之宜用贊裁成使之茂遂而中樞密勿庶政本源以奉大猷是為右弼臣實凡輩本無他能家尚儒風獲承緒業因緣忝幸踐履班榮誠不自意忽焉過量台司待罪已涉三年妨賢既久內訟彌切蓋廉謹戒懼人之常分而訏謨教化宜擇全才陛下在宥萬方躬勤百度豈虞賤質再沐睿慈特遷紫微實玷皇極臣面所陳讓推於至公天鑒未回進退惶灼且使人以器知臣者君猶冀鴻私俯察愚懇害盈之禍敢愛微軀覆餗之憂難抑公議無任感恩怖懼之至謹奉表陳謝以聞臣邁言臣自染偏風今已彌月將息未減渥澤轉深伏蒙特令供奉僧智昌醫療并每日令中使存問及賜柳湯煎驢頭方仍便令服餌者顧以庸賤昧於攝理久茲竊位常懼害盈陰陽之和無補時化風毒生疾上煩聖慈靈方御醫稠謺備至雖受恩服藥誠合漸瘳而福過災生慮難自保況中貴將命寵臨私門犬馬之微日塵黈纊或有加減自合上聞非常之恩伏乞停罷且台司要重庶政泉源以臣平居素積官謗今右邊手足動用不隨自滯枕席已淹弦晦伏乞以時免職使得養疾家居博求上才用塞人望則公朝無覆餗之責陋質荷生成之仁今攝衣拜章力且未足口占代署貴達愚衷無任感恩迫切之至謹奉表陳請以聞臣某言臣以疾病所嬰在假既久自審不逮遂有上陳詔旨優答懇誠未允屏營慚懼不知所安臣聞為官擇人各司其局條責實效共致理平凡在庶僚猶不可曠況宰臣之任鼎足承君調和陰陽左右教化能否之下利害繫焉苟有所壅其傷必大以臣虛薄備位四年奉勵精之勤但樂昌運當具瞻之地莫副㣥心書曰百僚師師百工維時言得其人也語曰陳力就列不能者止言審其分也況沉頓逾月冠帶未任風毒所侵難望速差彼已之刺倍切於今以被病之微臣尸台司之厚祿自知不可如公議何伏枕披誠再黷宸扆冀回天鑒俯遂愚衷所謂曲成豈惟平施無任悃欵迫切之至謹奉表陳請以聞臣某言臣逼於疾瘵纍有陳奏再奉詔旨私願末從感恩則深量力難濟況偏風狀候與諸疾不同雖時似少減終慮成沉痼中樞務重不可闕人自臣在假已四十餘日曠廢斯甚兢惶益深一夫不獲一吏不職則繫聖慮以之憂勞今臣手足未平心緒未復臥受豐祿胡顏自安伏惟陛下順天理物躬勤庶政事無細大咸遂其宜豈可獨私微臣久玷時化是以直疏誠懇不敢苟飾煩詞冒黷宸嚴期於照鑒無任惶怖震越之至謹奉表陳請以聞臣某言臣素以庸虛又嬰疾病半年在假未任出入四表上陳備盡誠懇過蒙渥澤特賜優容聖慈則深私願猶阻俯仰袵席兢惶靡寧臣本謂至春和得漸平復今方藥遍用根本未除雖簪帶假人得以被體而趨步無力難於拜恩輔臣之任百辟是仰遵守法度誠所宜先豈有踰歲家居尚塵鼎飪況所受厚祿出於疲人竊位公朝尚知不可沉疴私室何以自安易象害盈實在今日伏惟陛下宏覆萬物曲成不遺凡在懷生各得其所以臣沉痗久曠官司前後陳聞披瀝肝膽期切之至謹奉表陳請以聞臣某言臣待罪非據歲時已深寵秩逾涯災患自至一從移病忽及周月五獻章表未遂血誠沉痼之身滯於床枕職守之效絶於官曹虛費祿廪不安夙夜遂於去年五月二十五日進狀乞停俸錢自後不敢更有請受竊冀素餐之責少息輿議丹懇之至上回聖心邇來又經九十餘日成命未下憂惶無措蓋聞祿以詔功又以養賢以臣之愚而無功績久此尸曠俯仰內訟迫於公私臣之情理實為難處臣之言詞不能自達使得終獲退免曲遂微誠亭育深恩實在於此無任猥迫懇欵之至謹奉表陳乞以聞臣耽言今日中使某乙奉宣進止以臣所進關內隴右并圖録十卷特賜馬一匹并銀瓶盤等若干事錦彩等若干匹者承命抃舞震驚失圖伏以聖朝覆幬無私聲教遠被雖夏書禹貢周制職方重譯所通未若今日臣以末學獲奉昌期常好地理之書頗知河湟之事明徵舊史博考傳聞夙夜以思歲時遂久紀諸文字繢以丹青上塵聖聰庶備方志豈謂睿慈宏獎寵賚特深出珍華於內府下駔駿於天廣既恩榮所及煥麗相輝循顧虛庸曲承蕃錫負乘匪服併切於今無任感恩荷戴之至謹奉表陳謝以聞臣耽言臣以庸愚謬尸寵祿位居師長職重台司徒叨渥恩無補時化局蹐荏苒六年于茲去秋以來多病相繼每自策勉以奉休明而筋骸內衰官謗外積近染痢疾綿歷旬時進退之狀不恆寢食之理皆耗伏枕循省無所克堪凡在常情皆願貴仕況臣纍蒙任使實越等夷從容廟堂沐浴天澤恩私歲久誠每切於匪躬疲薾日侵事有迫於量力伏惟陛下覆育臨照曲成不遺俯矜愚衷移授散秩則樞軸不曠輪轅適宜拳拳之誠所望斯足無任懇欵惶懼之至謹奉表陳請以聞臣耽言伏奉今日制條除臣檢校司空兼左僕射依前同中書門下平章事祗荷成命捧戴恩私心魂震驚慙怖失次臣以庸薄無他才能先朝過聽謬賜驅策叨居鼎飪十有三年猥承雨露之恩終闕涓埃之效纍經陳乞未允懇誠復以餘年再承休命自陛下紹膺寶歷澤被㣥生亭育所加飛沉遂性而臣齒髮頺暮疾恙嬰侵筋體日衰心力皆耗況宰相之職用調陰陽司空之官實平水土從古授受重難其人以臣平居猶知不可今中既眩耄外亦支離寢興不安言語失次豈可苟貪貴仕上玷清時省躬則然況在公議古者君有致政之惠臣感得謝之恩鐘鳴漏盡前哲所誡年衰疾劇在臣為甚逼於情理敢黷天威慺慺血誠期在鑒聽無任懇欵恐懼之至謹奉表陳讓以聞臣耽誠惶誠恐頓首頓首謹言臣耽言臣以疾病所迫氣力不任輒露懇誠上祈退免聖慈備至私願未從詔旨便蕃慰勉纖悉自宜策勵以奉休明螻蟻之誠敢忘夙夜犬馬之疾日益纒綿視聽昏煩舉措乖誤心不記事口不逮心神理害盈正謂今日昔韋賢致仕著在漢庭韓厥請老書於魯史豈可以茲沉廢苟汙班榮迫於公私非敢撝挹自聖明馭宇動植覃恩豈於庸愚獨阻誠志乞回天鑒俯遂殘生伏紙上陳感涕嗚咽無任惶懼懇切之至謹再奉表陳乞以聞臣耽誠惶誠恐頓首頓首謹言臣耽言臣殘年沉瘵漸不支持再表上陳未蒙允許顧茲朽質徒感鴻私而枕席纏綿形神消耗上台之任歲月積深大病之期晦明難保自叨升論道扶疾拜恩邇來狀候日以羸瘠災因福過足驗於今伏乞賜臣骸骨收臣印綬期於必遂不敢煩辭無任量力懇迫之至謹奉表陳乞以聞臣耽言臣聞生人所欲豈過富貴仕進之榮無踰公相臣受祿過厚叨恩且深疾瘵所侵日月以甚表章三上宸眷未回苶然私室溘盡是慮臣頃歲齒及懸車疾經百日輒援禮令乞遂休間先聖優容未蒙允許今則桑榆轉迫沉頓寖深比於往年遠不相及前後陳請備竭肺肝特希聖慈俯鑒愚懇羸骸假息所望退身瀝血披誠伏待明命無任屏營懇迫之至謹奉表陳乞以聞臣耽言臣以庸愚纍叨爵命大行皇帝拔擢非次列於宰輔歲時寖深塵露無補太上皇踐祚聽政寵登三公而臣寢疾所嬰已在牀枕沉疴日劇氣力漸微自春涉秋四表陳乞伏遇陛下繼明纂統臨照萬方澄清化源朝野相慶但臣百疾所湊四支不任豈使將盡之人猶處具瞻之地私誠所迫上黷宸嚴既非飾讓期在聽納無任懇欵迫切之至謹奉表陳乞以聞臣耽言臣犬馬之疾福過災生前日以來轉就危困自量氣力的不支持自陛下嗣纂睿圖臣以寢疾綿亟竟不得一趨雲陛上謁龍顏幽壤之中以此為恨臣備位宰相歲時最深永歸泉下無補明代伏惟陛下為萬姓自愛則幽明蒙福無任感恩哀戀之至謹奉遺表以聞臣憬言伏奉恩敕賜臣金石凌并方及服法并金花銀合一又賜臣蘇膏方及眼赤有瘡方其方皇太子書者鴻私榮貺特發天心受恩拜賜慚怖交集中謝臣聞台司之任茂遂㣥生而攝衛乖宜自貽病疾理身未暇賦政何堪豈謂上簡宸衷下矜賤質御方靈藥稠謺寵光劑和至精減聖躬所服翰墨元妙降皇儲之書仰光輝而陋目增明承渥澤而沉疴自愈致金石之固通性命之和保持誨諭曲盡慈旨蠲其煩滯授以康寧省已何功害盈知懼伏惟陛下宣布大和則時無疵癘懋建大中則物以阜安生及昌期自登壽域況臣劣薄待罪樞衡感平施而已深荷殊榮而難報雖陰陽不測犬馬之疾頓瘳而日月無私螢燭之光何補生成覆載皆稟睿慈竭力致命豈申愚效無任感恩惶懼之至謹奉表陳謝以聞右宰臣奉宣進止令臣進舊詩者伏惟陛下以聖德文明化成天下徵詩之旨本在樞衡念舊之仁因及簪屨臣頃尸重任久曠官常今列大僚猶叨寵渥於孔門非賜也言詩之目在漢庭異匡氏説詩之工徒積繁蕪豈近聲律自承休命伏用兢惶待罪之時無補公餗免退之後猶獻雕蟲既乖法言有黷宸聽震悚怵惕不知所安謹録前件詩五十首奉進無任慚愳隕越之至謹奏右臣奉恩命權知門下省過官者伏以過官至重事在黃樞閲郡吏之否臧布百職於中外苟或非當其傷實多臣自玷台司忽及半載一昨陳乞天眷未回當憂惕之中而寵榮薦至摩頂至踵豈酬鴻私無任感恩荷戴之至謹奉狀陳謝以聞謹奏右今月十日中使張少禺至長樂驛奉宣進止借臣前件馬送出府界者臣以庸薄謬叨恩私寵榮沓至感戴難處以今月十五日至東驛出京兆府界天闕儲胥仰瞻日遠御間蹀躞假借恩深仰元澤以難酬顧微生而何幸況代勞比君子之德負乘積小人之憂感戀明庭涕泗橫積當君陳之寄必竭肺肝羡騕裊之回恨無羽翼無任感荷戀慕之至謹奉狀陳謝以聞謹奏右中使王敬親至奉宣恩旨賜臣等前件詩者伏以聖人之言律度天下特降睿藻發於深誠極三代之質文致萬方於仁壽時當令節慶屬豐年同在鎬之和樂異橫汾之靡曼臣等謬居樞近每沐鴻私空瞻日月之光難酬雨露之施無任感恩抃躍之至謹奉狀陳謝以聞右今月九日中使王敬親至奉宣恩旨賜臣等前件詩者日月麗天萬物皆覩韶咸度曲八音克諧伏惟陛下有堯之文思舜之恭已每睿詞下降皆以人為心故宴樂以示慈惠詠歌以昭教化歡令節慶有年順時賦政之祥也敦九族安萬邦自中發外之澤也然後以太平之化躬行於今知之非難是謂至德豈比夫漢武魏文屬詞類事而已臣等叨居近侍首沐湛恩空仰昭回難酬覆露謹各獻奉和聖製詩一首輒以蕪鄙上黷宸聰庶達封人之心敢比賡歌之義無任感恩戰懼之至謹詣延英門隨狀封進以聞右中使劉希昂至奉宣進止賜臣等上件詩者伏以陛下順用二儀曲成萬物王道正直天文昭回因令節以宴樂發睿慈於歌詠煥然麗藻丕變時風慶屬有秋化覃無外凡百臣庶一其歡心臣等忝備台司首承渥澤無任感戴欣躍之至謹奉狀陳謝以聞右今月九日中使劉希昂至奉宣進止賜臣等前件詩者臣聞惟天聰明惟聖時憲故三辰為章六義成文伏惟陛下端拱穆清慮必周於皇極錫宴重九恩每覃於百寮煥發睿詞化成天下書於右史實邁前王臣等才異賡歌職叨近侍在宥之化皆獲可封聞韶之時忽焉竊抃謹各獻奉和聖製詩一首輒以荒鄙輕黷天威無任感恩戰愳之至謹詣延英門隨狀封進以聞右中使楊光瑤至奉宣恩旨賜臣等前件詩者睿詞炳煥降自九霄天澤昭臨榮加百辟既晞湛露又沐卿雲感金石之和聲助林塘之霽色況錫宴之際極其寵光求理之深播其雅頌樂以發德文以化成由其歡心盡躋壽域跪捧三復備見皇慈臣忝迹樞密親承聖渥無任感恩抃躍之至謹奉狀以聞臣比年以三令節賜百僚宴賞昨者時及重九陰雲未收特延聖慈又改良日中宴之際俯降睿詞猶元氣之涵煦比慶霄之紛郁裁有六義昭示萬方湛恩自天具物知感況陛下以誠信施教以慈愛緣情形於詠歌繫在風化伏以唱和之重合綴庸音而動植之微何酬元造臣等忝居樞近首沐鴻私竊忭率舞不能自抑謹獻奉和聖製詩一首詞理鄙淺輕冒宸嚴無任感恩喜躍之至謹詣延英門隨狀奉進以聞右中書門下奏今月七日伏蒙聖恩賜臣麟德殿宴會觀上件新樂臣聞先王作樂必本人情所以崇德所以辨政伏惟陛下以大中設教以大和育物肇創嘉節於今十年年皆順成俗以仁壽今則睿謀廣運度曲惟新三才位序邁韶咸之美八卦成象見天地之心制氏未覩其鏗鏘伶官甫披其行綴聲歌所感遐邇同歡臣等職忝台司時逢交泰昨已面有奏陳請付有司頒示四方永光樂府仍請編入史册伏望天恩允臣所奏右今月七日伏奉聖恩賜百僚麟德殿宴會㣥臣觀新樂并賜臣等聖製詩序者伏惟陛下法天授人順時布政中和制樂以協六律之音元首作歌以廣百工之業感於順氣諧此正聲春臺煦然生物資始洽慈惠於臣庶播易良於國風照燭乾坤輝動金石臣等獲叨近侍曲被湛恩既在藻以遂性亦聞韶而忘味敢附典謨之末顧慙賡載之詞謹各獻奉和聖製詩一首謹詣延英門隨狀封進以聞右今日中使薛盈珍至奉宣進止賜臣等前件詩者臣聞天以雲漢為章昭回於上人以文義為紀化成於下伏惟陛下勤慮理本合於中和月當中春日乃初吉特降藻思助其發生由勾萌以至於暢茂推誠信以均其化育捧戴殊觀如登春臺慶霄天籟耳目清越凡在百辟一其歡心臣等謬列台司首承慈渥無任慶抃踴躍之至謹附狀陳賀以聞謹狀右今月一日中使薛盈珍至曲江會所奉宣恩旨賜臣等前件詩者上齊二曜旁合八音闡文教於休明叶昌期於亭育況茲令節克順人心延仲月以違晦撰良辰而得一亦既逾紀必聞有年生植阜蕃休嘉交感而又言志以導德作樂以同和示湛恩於宏覆俾庶類於咸若臣等職叨近侍仰戴元功華封祝堯徒有其志虞臣歌舜豈易其才謹各獻奉和聖製詩一首輒奏庸音上塵聰聽無任感恩喜愳之至謹奉狀陳奏以聞右中使劉希昂至奉宣進止賜臣等重陽日詩并賜茶酒音樂令臣等樂飲者伏惟陛下以睿聖之姿廣文明之運每因嘉節必布鴻私錫宴同和凝旒振藻八音合發六義相宣降於雲霄粲若神象然後宴樂慈惠霈然寵光衢酒薰絃承九天之慶賜秋光霽景見百穀之順成合德不違實若符節小大臣庶鼓舞相歡臣等忝列台司倍萬欣賀無任喜抃踴躍之至謹奉狀陳謝以聞右今月九日高品劉希昂至曲江宴會所奉宣進止賜臣等前件詩者伏惟陛下覆露亭毒以人為心文明法象與天地準緣聖情以稽四始酌時令以休百工法言麗藻盈耳溢目臣聞日之出也照先及於扶桑雲之興也潤亦應於柱礎臣等既叨近侍首沐鴻休輒罄庸音以申攀和蹄涔越海誠亦無因埸藿向陽猶思自效謹各獻奉和聖製詩一首輕黷宸嚴心神戰越無任惶怖悚栗之至謹奉狀陳奏以聞
