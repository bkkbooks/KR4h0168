front:
  text: 全唐文欽定全唐文卷二百八十九張九齡七
  hash: sha256:37cb637c14f3da431aa8106b1fa95d2443ae38c5f7249ebb338f5c95d1b28e4c
body:
  text: 右蓋嘉運奏北庭解圍仍有殺獲蘇祿背德敢此讐天盡驅犬羊來犯軍鎮雖肆凶毒欲逞其心而邊兵無遺鏃之費狂賊有輿尸之禍此皆陛下聖武將士龔行遠必叶謀動無遺策能令氛祲坐自廓清臣等忝奉密謀屢承獻捷踴躍稱慶倍百恆情謹奉狀陳賀以聞謹奏右適高力士宣示臣等張守圭奏契丹及奚並自離二兼安祿山復有殺獲賊數將盡觸緒猜攜邊鎮勒兵伺隙而動誅翦有日廓清可期此皆天威遠臨逋逃自滅臣等不勝慶躍之至右高力士宣示張守圭所上逆賊契丹屈烈及可突于等首級此等惡稔喪敗將及故天誘其衷既降又二而感義之士惡其翻覆背恩之賊已就誅鋤幽障廓清華夷俱靜計其餘噍永無動搖陛下邊任先擇聖謀獨斷克稟成命樹此戎功且知河朔無轉輸之勞林胡為賦稅之地臣等忝在樞近預聞遠績捷書之至喜倍恆情謹奉狀陳賀以聞謹奏右張守圭表奏突厥四萬騎前月二十五日至能訖離山契丹泥禮等前後斬獲俘馘數逾十萬突厥可汗棄甲逃奚王李歸國及平盧軍將等追奔逐北計日殲滅更聞奏者伏以突厥新立輕事用兵彼之威衆在於一舉又兩蕃與其結隙文搆未深在於邊隅猶軫天算陛下料其終始指授規模知其舉種盡來本自無策勞師襲遠必合成擒使蕃騎先鋒漢軍堅壁坐觀成敗自戰蠻夷今契丹才交突厥已破計其奔北必至喪亡脫身獲全亦舉衆皆棄北虜震懾從此氣衰東胡保邊永不攜二寬徭罷柝自此可期斯皆聖德遠覃皇威遐振事無遺策舉不失圖臣忝跡樞近親承睿略忭躍之至倍百恆情謹奉狀陳賀以聞謹奏右今日劉思賢至奉宣聖旨垂示臣等破賊所由兼見守圭表奏具承契丹纍捷伏以聖武所加制勝者無失天威不抗犯順者自亡突厥負衆背恩窮凶遠襲兩蕃懷德誓死如歸三軍奉國從命如指遂使一戰便剋已聞殺傷無算慟哭而奔則知主將必死且蠻夷相伐我則不勞疆埸有虞義亦奚失固知無愆信於漠北有大造於燕垂此實獨斷神謀事皆有預萬全之策永靜邊隅薄伐之師匪勞中夏凡在黎庶孰不欣躍臣等忝預樞近倍百恆情無任慶悅之至右先得前件牒云九月三日奚探見賊無數前三日臣等面奉聖旨料此必安祿山所將之兵奚疑是賊便有此牒也臣等當時又奏突厥舉國大來微有輸失便去竊料此意恐其有謀陛下又云必應彼有要重人死所以即去今日幽州節度判官監察御史張曉至云今月十一日從幽州發來赤山元自無賊奚所見者正是安祿山下兵馬又云契丹有蕃落人走來云突厥之兵馬平章事第一人死所以狼狽即去在路每日於帳衙前哭此並聖心懸照有如目擊臣等親奉睿算及此符同萬里無差不勝驚喜無任踴躍之至仍望宣付史館右牛仙童宣敕送前件契丹令問委曲者臣等借問突厥退散所由其伊吐于被擒將隨五日因夜却走回每日實見突厥諸將皆於衙帳前哭及剺正面是實處此必是小可汗傷死若其不然不合如此審觀伊吐于情狀亦即不敢妄言必其不虛乃是天敗比其歸至本處固應更有餘殃醜虜破必自此始也陛下聖德無遠妖沴自銷不勞師徒已清朔漠臣等獲奉廟算不勝忭躍之至右林招隱宣敕示臣等張守圭云契丹婦女屈將從突厥出來知可汗死是實又云黃頭突厥與默啜突厥爭言氣兵馬欲鬬驚軍屈將然得走來者參驗前後從突厥來者說事多同況此婦人尢為指實死既非謬天實誅之且諸蕃之中北虜為桀不待征戰而自取殲夷此誠天助有道坐清妖祲陛下嘗有聖料者知其必有亡徵今云兵馬自爭其兆已見佇聽其敗但只納降亭障息兵將自此始不勝欣慶之至右高力士宣奉敕示臣等王尚客奏狀知蓋嘉運至突厥施店密城逢賊便鬬多有殺獲且凶黨大衆見在邊城方擬經春圖為邊患忽聞嘉運此入復有破傷必其驚忙當有攜散皆是聖略先定萬里懸同尚客所言合符前者臣等不勝慶躍之至右高力士宣敕示臣等曹待宣奏狀知蘇祿遁走入山出界者四鎮懸遠比被侵逼將士用命雖有誅鋤凶黨尚多時有抄掠兵疲矢盡為弊亦深今日奔亡誠是震懼聖威及遠氛沴坐銷又北庭救兵當時回斾不費軍廩事且無憂吐蕃縱實西行蘇祿不得相應其敗可必又無可憂邊事且寧不勝慶慰謹奉狀陳賀以聞謹奏右伏以至德惟勤親躬以勸大禮云畢勞酒加歡聖感天從豐年雪應始降澤於千畝將有盈於萬箱臣等忝陪近侍載深慶躍無任悅豫之至謹奉狀陳賀以聞謹奏右高力士宣稱陛下親講讀毛詩遍賜侍講陳希烈三品兼賜衣物等伏以睿思元通超然物表俯臨天下必樹風化既宏儒教考核詩人爰託師資親行講讀章句初畢賞錫有加明主深恩孰不知勸臣等謬承任遇實愧經通聖業彌深微誠何補方思斆學以助明時無任悅豫之至右今月十日高力士宣聖旨以霖雨方滯有害稼穡之憂將親禱上陽三日內不坐精意朝發而重陰夕霽乃數日已來遂致開朗誰謂天遠其應甚速遂得麥秋有望蠶事且登則知至人無心與天地合契神功潛運豈陰陽不測伏惟陛下明德自廣兢業載懷所致休徵必加謙慎天聖相合福施㣥生日用不知年和在此臣等無能翊佐徒忝近密每有大猷承奉不暇無任欣戴慶躍之至右畿輔之間秋來少雨聖心有軫稼穡惟憂德至于天慶自嘉節實有神應旋降甘雨使將枯之苗有同於再熟已息之望不意於萬人臣有限不獲當時稱慶無任悚踴之至右伏以自冬少雪粟麥未滋歲律向終農候方近陛下黎庶在念憂濟常深聖心精誠天意昭感孰云元遠不日有應遂得盈尺告祥動植霑洽豐年有望即事可期即表非常之祥實倍不任之喜不勝忭躍之至右臣一昨面奉恩旨緣秋稼有望時雨暫愆念及黎元見於顏色方躬自祈請誠勤夙夜上靈昭鑒嘉瑞必臻昨日申酉之閒雲物果應初含五色正覆於壇場未及終宵更灑於城闕遂使炎埃宿潤虐暑暫消實冀膚寸之資畢致普天之澤臣等多昧徒仰於成造蒼生何幸每及於聖私無任欣戴忭躍之至謹奉狀陳賀以聞既有殊應仍望宣付史館右今月朔太史奏太陽不虧據諸家歷皆蝕十分已上仍帶蝕出者今日日出百司瞻仰光景無虧臣伏以日月之行值交必蝕算數先定理無推移今朔之辰應蝕不蝕陛下聞日有變齊戒精誠外寬刑政內廣仁惠聖德日慎災祥自弭若無表應何謂大明臣等不勝感慶之至謹奉狀陳賀以聞仍望宣付史官以垂來裔右臣等伏見道門威儀司馬秀表稱今月十日夜陛下親臨同明殿道場為宗廟蒼生祈福有祥雲見伏惟聖德以精至動天天意以肸蠁符聖其感甚速其應豈遠陛下聖敬之深勤恤所至靈心如答神道何言自表休期以介景福生人大賴天下幸甚臣等忝居近侍倍百恆情謹奉狀陳賀以聞伏望宣示史館右今日高力士宣示臣等皇太子表以嘉麥有成陛下躬執勞事率先兆庶皇太子以下繼美聖功臣聞勤於稼穡必有來牟之慶著在春秋則非他穀之比伏惟陛下致敬宗廟屬念黎元春郊順時則千畝在御禁園測候則萬㝢皆豐況云立訓天人降尊農務上靈昭德已聞瑞日增輝當暑不疲則有祥雲自覆是彰敦本之化式精造物之功人謠在茲天意可鑒且禹之盡力堯實用心史策美談帝王成範未有休徵神應若斯之盛者也以今況古千載未聞請付史官天下幸甚臣等叨榮近侍倍百恆情無任感戴忭躍之至右伏見衢州所進瑞魚銘等神物王褱奇形製純古魚為龍象既彰受命之元銘作龜文更表錫年之永河圖舊事無以加之臣叶贊休明屢承福應忝惟拜慶倍百恆情伏望宣付史官傳之不朽無任喜躍之至右今月日尹鳳祥宣敕旨示臣等聖製開元文字音義三十卷義微旨遠文省理該表隸以訓今存篆以徵古衆釋大備取證於前修片言旁通去嫌於翻字信文思之精一學術之明準非聖心之善誘焉降情於豪素臣等忝居近侍再忭發蒙捧戴之誠實百恆品望令集賢院更寫一本付外流行謹奉狀陳賀以聞謹進右伏奉今日墨制召諸學士及道僧講論三教同異臣聞好尚之論事躓於偏方至極之宗理歸於一貫非夫上聖孰探要旨伏惟陛下道契無為思該元妙考六經之同異詮三教之幽賾將以降照㣥疑敷化率土屏浮詞於玉殿輯精義於金門一變儒風再揚道要凡百士庶罔不知歸臣等幸侍軒墀親承至訓忭躍之極實倍常情望宣付史館謹奉狀陳賀以聞謹奏右內侍尹鳳祥宣敕垂示臣等御注金剛經但佛法宗旨撮在此經人閒傳習多所未悟陛下曲垂聖意敷演微言幽關妙鍵豁然洞達雖臣等愚昧本自難曉伏覽睿旨亦即發明是知日月既出天下普照誠在此也陛下至德法天平分儒術道已廣度其宗僧又不違其願三教並列萬姓知歸伏望降出御文內外傳授右尹鳳祥宣聖旨示臣等皇太子所製王尊師碑文並壽王書臣等伏以天姿自高更深聖訓文藝英拔理絶人境臣等周章省覽欣忭載懷兼皇太子文義高深壽王毫翰灑落朝臣不見竊懼蔽善臣等專輒宜留碑本望明日將示百官了訖續進不勝忭躍之至右臣等伏承今月八日上仙公主靈座有祥風瑞虹之應爰至啓殯乃知尸解又承特稟清虛薄於滋味素含真氣自不食鹽洎於遷神更標奇跡伏惟聖系本於道源妙有所鍾靈異必降不然者何得幼而能悟性與非常適來以時且契於元運超然而蛻復升於丹籙杳冥雖遠髣像如存則知仙路有歸慈念已釋理絶今古事昭聞見況臣等親侍軒墀幸聞仙解無任感慰之至伏望宣付史官以昭靈異仍望宣示百官右御史中丞徐惲從京使還向臣等說妖賊劉志誠四日從咸陽北原向南見昭陵山上有黑雲忽起志誠謂其凶徒云此雲將有暴風若衝頭立恐有破敗志誠久從軍伍頗解雜占其言未畢飄風果至直衝行首莫不昏迷衆心驚惶不知所出及至便橋之際並即走散又見父老云往年權梁山之徒將逞不軌當時亦有烈風暴雨發自昭陵彼比至京城賊還破滅謹參往事與今同符者伏以閭閻賊類竊敢猖狂而祖宗威靈亦已元鑒昔年感召若命蚩尢今者驅除更徵風伯所以妖氛自殄狡計莫施晷刻之閒逃形無路此皆神功潛運昌歷無窮將俾孫謀用昭聖德事堪懲惡可以垂後無任慶悅之至仍望宣付史館並示朝列謹録奏聞謹奏右伏奉去月三十日敕以臣先領荊州都督佩紫金魚袋前緣改官遂停今更蒙恩特賜任使無效寵服再加臣雖叨榮伏用戰懼不任悚躍之至謹奉狀陳謝以聞謹奏右伏奉今月三日制除臣工部侍郎兼集賢院學士臣本單族過蒙獎拔入升省閣纍登清資出牧南州且無成績陛下殊私俯及擢任集賢遠自炎荒忽至霄漢祕文副掌淺陋無堪遽蒙聖恩反遷華省邱山施重報效何階不勝悚懼之至右臣忝跡集賢久無成效幸免咎責伏用兢惶忽蒙特恩令知制誥臣學業既淺識理非長述宣聖旨誠恐不逮跪受嚴命伏增悚惕無任戴荷之至右臣兩弟蒙恩移官就養老母感戴殊澤戰荷兼深臣山藪陋材豈堪國用日月私照謬掌綸言犬馬以地近見矜烏鳥以情至蒙福曲承孝理之賜莫知報效之所無任悚懼荷恩之至右臣謬跡書府兼司綸翰思力淺近無所發明聖恩不以不才却賜榮獎拔擢非次荷躍惟深但中書近密參掌不易豈臣微賤所堪忝竊拜命之日伏用慙惶不勝戰荷之至右林招隱宣敕賜臣等招隱說云薦新之外禁中所出皆是降至尊親耕稼穡之所成也伏以周人之禮惟有藉田漢氏之薦但聞時果則未有如陛下嚴祗於宗廟勤儉於生人事必躬親動合天德臣亦何幸近奉徽音又蒙聖恩猥垂珍錫已飽於聞義況霑此時羞繆承渥澤未知報效死罪死罪仍望宣牒史館以示將來臣等不勝感荷之至右臣等面奉進止令就集賢院與諸學士等觀聖注道德經尋又賜臣等食竊味道腴兼承珍饌聞義飽德虛往實歸臣等何人叨承渥澤不勝惶悚感戴之至右高力士宣奉恩旨賜臣等鹿角膠丸及駐年面脂有命自天感戴兼至臣等涓滴無補渥澤日深多謝股肱之良每慙智力之效徒承聖恩同體之義更霑御藥駐年之錫事絶希幸禮優常遇微軀賤貌因大造而載延捧日承天荷曲成而無極臣等無任悚戴之至右今日高力士宣敕賜臣等御製詩並寶尺伏以尺者紀度之數宜麗天文詩者律呂之和是生節物聖恩下逮天旨旁流因物寓言以言垂象臣雖瞽陋伏見宸衷竊謝良工徒秉刀尺終期死力取配鈞衡而未副所圖退省知罪臣等不勝負荷感懼之至右昨者高力士宣恩旨垂示皇太子書紀功德頌恭覽睿跡實天人之表幼傳楷則訓叶文明春秋典學時惟多藝鸞鳳變態入神妙而難明俾臣庸者憑篆刻而不朽微臣之幸倍百常情無任悚戴之至右伏奉昨二十日恩命授臣弟九皋殿中丞九章太子司議郎臣私門積釁殃罰如昨日月逾邁禮及外除弟九皋等加以常才比服哀疚瞻望未遠縞練猶存非常之恩一朝總集慙惶哽咽罔識言次不知微命餘生何以上報大造載悲載懼五情飛越不勝感戴戰栗之至右高力士宣敕賜臣衣及器物等臣九齡不孝苟存企及禮制天恩以忝樞近賜問再臨衣服珍器殊常寵錫臣有何力可以叨濫渥澤至深誠效已竭惟有微命不知所圖無任感戴惶悚之至右高力士宣聖恩賜臣等蕃口執自邊軍釋囚為隸誠宜供國次及賞功臣等無庸何以受賜殊恩俯降循涯自失伏望俯停渥澤存以至公矜遂懇誠許歸官寺則上有無偏之道下有無苟之責無任悃款之至右臣等適見工部侍郎侍講學士陳希烈所蒙恩賜聖製雪篇伏以聖惟無作作則應天地和陰陽斯之謂矣言微利溥旨遠思深於彼蒼生焉知帝力臣聞食者萬姓之命雪為五穀之精兆且見於祈年律既和於言志聖心昭感天瑞合符豈比夫漢咏白雲但嗟歡樂周歌黃竹徒事巡游而已哉臣等仰望昭回莫知遠近幸均生植同是霑濡況臣忝在樞衡無能翼亮聞罪巳之義若置冰谷循忘軀之節冀益涓塵伏誦聖文無任喜懼臣等誠歡誠恐謹言右臣前伏見聖製喜雪篇奉狀稱慶已特蒙賜本今日高力士又宣賜臣林甫臣某各一本麗天之文或冀傳誦垂露之聖難有偏霑則不知元造曲成宸豪俯逮鸞鳳斯降雲雨載均愚臣何幸叨此殊賜是知君臣之深義感不一子孫之後傳寶無窮而未知此生何以上答臣等不勝感戴伏望許臣等進食以申微誠雖萐每搖而野芹徒獻豈云堯禹之膳冀達臣子之情幸甚幸甚謹奉狀以聞謹奏右去正月二十六日中使李仁智宣口敕賜臣前件宅仍令官修及什物一事已上自奉恩命夙夜憂惕既慙虛受載懼滿盈臣生身蓬蓽所居賤陋釁屬苴麻豈圖宏敞宸私曲被寵賜猥臨加以殃罰之餘參議樞掖草土之末庇形棟宇器用資於官備禮數異於喪紀兢惶失圖啓處無地況涓滴未效霈澤先盈非據之責誰任其咎又臣見在家纍僅十餘人臣之俸祿實為豐厚以此貿遷足辦私室今崇其甲第更使增修或恐因緣多有費損上則虧耗國用下則招集身尢縱陛下時垂寬容而臣苟為貪冒其如物議何其如公道何伏乞賜寢前命俯垂矜察納臣誠請免臣罪戾其宅及什物望並却令官收無任惶懼之至右臣昨以兩弟身官狀涉隱冒家且未正焉能正人所以陳露奏聞誠欲自律今日高力士宣敕令與兩弟京官慈旨優柔感深骨髓微臣何有叨此殊恩但臣自罹殃罰才踰年序忝承重任不敢顧私而鞠育之恩終懷罔極几筵在遠奠酹不親惟有兩弟在家獲申情紀今若恭承恩命盡在墨縗何心何顏可以偷此陛下每宏教義必先名節豈於愚臣無少矜憫若使九皋等獲免罪戾幸無削除在臣閣門已霑殊澤更令授職俱遠哀次於臣私情實所不忍然於朝議必有喧黷乞寢成命俯亮愚衷冀無玷大猷豈敢自遂而已不勝哀荷戰懼之至右殃釁殘生謬承天澤無能報效徒廢情禮而日月迅速祥制有期在臣私情哀懼莫主几筵在遠追慕不親一違外除終身何託伏望察臣罔極俯遂哀懇假以傳乘暫赴來月道路往復不出數旬孝理之恩冀知死所無任悲迫戰懼之至右先奉敕令臣撰文伏以天將啓聖地乃出符歷考圖籙曠古未有臣學術膚淺且靈命難言雖已極於愚思曾未徵於萬一猥承恩獎虛污磨礱以此慚惶無寧啓處謹隨狀封進以聞塵黷宸嚴伏增戰越臣伏以聖恩非常拔臣以無能受任歲月漸久涓涘無益取招毀議有纍聖明臣前面陳誠以請罪陛下不以賜責又加過恩特以殊榮猥霑臣弟彌速曠官之謗且重非才之責纍延公器寵及私門顛覆是憂隕越無措不勝悚懼荷戴之至謹奉狀陳謝以聞右中使某至特蒙恩曲賜遠別之什又中使某宣口敕賜衣一副並絹一百匹者但柱礎雖下感致於青雲陽燧則微昭應於白日在臣孤賤亦荷寵光伏惟陛下御札龍躍八體比之未雄天文鳳章五色對之猶淺況束帛荐至衣服仍臻施重邱山恩深江海實為九族遍有光華匪唯賤陋獨稱榮慶右今日高力士奉宣聖旨賜臣紫騮馬一匹伏以恩覃不次寵遇非常有忝股肱之臣頻奉渥窪之賜況郊壇展禮尚未奠於九宮而雨露深恩反有叨於三接雖鳴珂噴玉朝天永代於臣勞而任重才微久歲寧酬於聖造荷負無力答效何階
