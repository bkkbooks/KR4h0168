front:
  text: 全唐文欽定全唐文卷九百七十二闕名十三
  hash: sha256:f441fa5c5ccdb6ae239bfd3f374ffb41c70c65dfa109c3334a4308a022cebaa6
body:
  text: 准天成二年十二月詔曰長定格應文學出身人一任三考許入下縣令下州縣録事參軍亦入中下州録事參軍兩任四考許入中下縣令中州録事參軍兩任五考許入中縣令上州録事參軍兩任六考許入上縣令及繁州録事參軍凡為進取皆有因依或少年便授好官或暮齒不離卑任況孤貧舉士才年四十始得經學及第八年合選方受一官於初任之中多不成三考第二選漸向蹉跎有一生終不至令録者若無改革何以發揚自此經學出身請一任兩考許入中下縣令下州録事參軍准敕書修創凌煙閣尋奉詔問閣高下等級謹按凌煙閣都長安時在西內三清殿側畫像皆北面閣有中隔隔內北面寫功高宰輔南面寫功高諸侯王隔外面次第圖畫功臣題贊自西京板蕩四十餘年舊日主掌官吏及畫像工人並已淪喪集賢院所管寫真官畫真官人數不少都洛後廢職今將起閣望先定佐命功臣人數請下翰林院豫令寫真本及下將作監興功次序間架修建大行山陵四月二十七日掩元宮以御札皇帝親奉靈駕至園陵有司量事供備臣等伏見纍朝故事人君無親送葬之儀蓋承繼事大非薄於送終自今年二月後諸州奏軍州判官九人行之擬新詳定敕文慮在外未知詔軍事判官宜令本州刺史自選擇舉奏初且除本職未得與官或與刺史連任相隨顯有勞能許本刺史以聞量與獎賞仍不許橫有奏薦其三月後九人且與施行御史臺轉報百司各抄六典令式內本司事舉行職典宗廟陵園列聖陵寢多在關西梁季為賊臣盜發同光初曾差供奉官李說工部郎中李途往關西巡陵祭告屬朝廷有故不行明宗天成初差丞李郁檢較又長興四年詔掩閉無主墳墓况列聖陵寢伏遇中興雖有修奉之言而無掩閉之實乞差官檢討修奉置陵令一員應屬陵之四封各乞寺司管係天寶十載正月封吳山為成德公與沂山會稽醫無閭同制封公至德二年十二月改吳山為嶽祠享官屬視五嶽今國家以靈應告祥宜示殊等翰林學士程遜學士和凝張礪等上十三事其一前代帝王親觀風俗訊民利病其後不暇親行亦遣使巡行風俗唐朝於十道置採訪使一員請如舊制亦冀民病蘇舒其二天成已來久不括田自水旱纍年民戶疾苦不均今歲夏秋或稔於常歲請行檢括庶獲均輸其三中原邊上率多閒田可令近下軍都興起屯田舊時銅冶鐵冶亦令軍人興置不費於民其四人君求理欲廣視聽須㣥臣上言然則人才有短長智略有能否其於聽用之間乞留睿鑒伏恐失人其五朝野官吏人數衆多若不行黜陟之科何以察其能否望准考課令凡中外官歲終較考以行進退其六古人得位相讓所冀不掩賢能得其髦俊請依建中故事㣥官受命後舉人自代其七治道既知損益務實去華伏見自中興以來或於邊境權立州縣名目戶口不多虛張吏員枉費祿食其權置名目望一切停省以賑邊軍臣伏見徐宿州管內有泗濱院徐山院市邱院白土務所管人戶共數千家請罷廢名額其戶稅請還州縣其八請止游惰勸農桑減冗食之員停不急之務其九君上置諫諍之官此期聞過況聞官給諫紙虛佇讜言時政有所不便請諫官陳論詔書有所依違請給事中封駁其十國朝承平時諸監鑄錢不輟尚不能給今國家所鑄絶少而市人銷錢貴賣銅器纍行止絶尚未知禁伏乞嚴下條法其銅除鏡鞍轡腰帶外不許市賣銅器犯者以贓論其十一沿邊鎮戍請明斥堠習戰陳謹烽候令夷狄知懼戰必有功其十二每年給散蠶鹽不敷斤兩雜之以硝土請給散之時命清強官止絶其十三伏聞關西河東人民饑饉殍殕者多其城市鄉村積粟之家望令官司通指姓名俾令出糶以濟飢民中書門下覆奏程遜等十三事其置採訪使難擇公清之吏去生僥幸之門問疾苦則未能勞供須則轉費况刺史廉使自合訪求不勞別置其纍年水旱欲與檢田以均勞逸今年夏苗已多災旱秋稼今未及時諸下三司可否聞奏其屯田治務興造之初所費不少今國力未辦可俟他時其受官舉代劉鼎近已上聞其餘九件並可施行擇良善為心腹㣥官書考併省州縣止游惰勸耕桑諫官論事給事封奏斷用銅器邊城習武備差官散蠶鹽均糶以濟飢民等事准天成元年正月十六日敕本朝列聖及四廟諱近日中外表疏偏旁文字皆闕點畫凡當出諱止避正呼儻回避於偏旁則虧闕於文字宜從朴素庶便公私凡廟諱但回避正文其偏旁文字不在減少點畫今定州節度使楊壇檀州金壇縣等名酌情制義並請改之刺史位列公侯縣令為人父母祇合倍加乳哺豈合自致瘡痍一昨張宗裔胥吏訟論合當極典法司據律罪止徒流向來此法極嚴才可存其軀命即一二十年不復還鄉却緣近日赦宥稍頻遷易頗數致其凶物不顧嚴刑臣竊惟立法稍嚴則人不敢犯其見行法律望下所司再加詳酌前大卿監五品升朝官西班將軍皆在任許滿二十五月如衝替已經二十月即別任用少卿監舊例三任四任方入大卿監五品三任四任方入少卿監今後並祇三任逐任須月限滿無殿責者便入此官西班將軍罷任一年許求官舊例三任四任方入大將軍今祇無殿責或曾任金吾將街使藩鎮刺史特敕並不拘此例諸道除兩使判官外書記以下任自辟請應朝官除外任罷任後一年方許陳乞諸道賓席未曾升朝者若官兼三院御史即除中下縣令兼大夫中丞祕書少監郎中員外郎與清資初任升朝官檢校官至尚書常侍祕書監庶子升朝便與少卿監諸州防禦團練判推官並請本州奏辟中書不更除授應出選門官帶三院御史供奉裏行及省銜罷任後周年許陳乞諸州別駕不除令録仍守本官月限得替後一年許陳乞長史司馬因攝奏正未有官者送名奉長興二年四月五日敕朝臣居喪終制委御史臺具名申奏諸道幕府職事除喪後宜行恩命州縣官才授官及到任一考前丁憂服闋並與除授依長定格自有節文應州縣官新授及到任一考前丁憂服闋准格取文解南曹磨勘申中書門下當與除授不得經堂陳狀今月二日班入遇雨移班廊下知班臺吏董瑾引僕射在中丞三院御史以下僕射誥問董瑾稱准常例臺司刺都省請簡討舊儀都省稱國朝以端揆之重師長百僚雖在列司皆為統屬且左右僕射常朝不在中丞之下赴宴廊飧並在中丞之上况中丞有公參之理避路之儀詳其道理自有等降臺司又堅稱李琪盧質任僕射日班亦如此又引通事舍人在一品班上尋申中書門下奉宰臣判令廊下使重定班位廊下使言今後遇雨移班廊下欲請依殿前磚位次第二品在三品前一品後若中丞大夫俱置即大夫在中丞前其西班准此謹聞內外官吏對見例應諸州差判官軍將貢奉到闕無例朝見以名銜奏放門見賜酒食得回詔進榜子放門辭臣今後欲祇令朝見餘依舊規應諸道兩使判官推官巡官無例中謝奏過放謝辭如得替歸京無例朝見臣欲今後除兩使判官許中謝門辭其書記已下新除授及得替並依舊規應文武朝官除授文五品武四品以上並中謝以下無例對謝以天成四年正月敕凡升朝官新授並中謝欲准此例應諸道節度使差判官軍將進奉到闕朝見得回詔下榜子奏過令門辭應諸道都押衙馬步都虞侯鎮將得替到京無例見或在京授任無例中謝進榜子放謝辭應諸道商稅鹽麴諸色務官在京差補亦放謝辭得替歸京亦無例見在京商稅鹽麴兩軍巡使即許中謝應新除令録並中謝次日放門辭兼有只宣誡勵應文武兩班差弔祭使及告廟祠祭祇於正衙辭見不赴內殿諸道差進奏官到闕得見後請假得替進榜子放門辭已前六件望准舊例施行臣等今月十三日再於尚書省集百官詳議夫王者祖武宗文郊天祀地故有追崇之典以申配饗之儀竊詳太常禮院議狀准立七廟四廟即並通其理其他所論並皆勿取七廟者按禮記王制云天子七廟三昭三穆與太祖之廟而七鄭元注云此周制也詳其禮經即是周家七廟之定數四廟者謂高曾祖禰四世也按周本紀及禮記大傳皆云武王即位追王太王王季文王以后稷為堯稷官故追尊為太祖此即周武王初有天下追尊四廟之明文也故自漢魏以降迄於周隋創業之君追諡不過四世約周制也此禮行之已久事在不疑今參詳都省前議狀請立四廟外別引始祖取裁未為定議續准敕據御史中丞張昭遠奏請創立四廟之外無別封始祖之文備引古今細詳沿革合前王之茂典是歷代之通規况國家禮樂刑名皆約唐典宗廟之制須據舊章請依唐朝追尊獻祖宣皇帝懿祖光皇帝太祖景皇帝代祖元皇帝故事追尊四廟為定臣等考詳典禮上奉聖明雖共竭於懇誠實倍慙於淺近唐朝令式南衙常參官文武百寮每日朝退於廊下賜食謂之堂食自唐末亂離堂食漸廢仍於入閣起居日賜食每入閣禮畢閣門宣放仗㣥臣俱拜謂之謝食至僞主清泰元年中入閣禮畢更差中使至正衙門口宣賜食百官立班重謝此則交失唐朝賜食之意於禮實為太煩臣恐因循漸失根本起今後入閣賜食望不差中使口宣准唐明宗朝事例處分文武百寮每五日一度內殿起居在京城時百官於朝堂幕次自文明殿門入穿文明殿庭入東上閣門至天福殿序班今隨駕百官自到行朝每遇起居日於幕次東出升龍門與諸色人排肩雜進自外繚繞方入內門臣竊見升龍門外庭宇不寬人徒大集或是諸司掌事或是諸道使臣方集貢輸不可止約若令與衣冠雜進朝士並趨則恐有壞天官見輕朝序權時之義事理難安起今後每遇百官赴內殿起居日請依在京事體百官於幕次自正衙門入東出橫門既協京國常儀兼在行朝便穩文武百寮每月朔望入閣禮畢賜廊下食在京時祇於朝堂幕次兩廊下今在行朝於正衙門外權為幕次房廊湫隘間架絶少伏恐五月一日朝會禮畢准例賜食即於幕次難為排比伏見唐明宗時兩省官於文明殿前廊下賜食今未審每遇入閣日權於正衙門兩廊下排比賜食為復別有處分者前洺州雞澤縣主簿苑恕進策五件可行者有二其一云伏見諸道行遣公事皆有前後通規定知後所繇置遞符腳力每遇緩急嘗遣往來既有嚴程孰敢慢事近日州使多差牽攏散從承符步探官等下縣追督公事始發一替專人又致續催使者事則一件兩件使乃五人七人非唯剝削蒸黎實為撓煩縣邑及官吏無暇區分庶事唯當祇奉專人如此弊訛特望條貫若令佐稍虧職分或後公期顯有憲章請行法典其二曰自前兩稅徵賦已立三限條流官員懼殿罰之威節級畏科懲之罪苟非水旱敢怠區分未嘗有不了之州何處是不前之縣臣今覩諸道省限未滿州使先追仍勒官員部領胥徒云與倉庫會探務行誅剝因作瘡痍全無軫恤之心但恣貪求之意外邑所繇等不免牽費非理盤纏例總破家皆聞逃役自今之後伏乞只憑倉庫納數點算便即委知仍取縣司申聞勘會以明同異若實違省司期限請依常典指揮會探之名特乞停寢者臣等參詳苑恕所陳事件要絶煩苛當務息民以裨求理誠為允當望賜施行前隰州蒲縣令竇溫顏進策一十一件可行者有二其一曰伏見所在縣令有差配百姓紙筆及課錢戶者朝廷付以宰字貴要撫綏支給料錢合專慎守逐日紙筆之用所費不多隨處等力之名皆有定數多是擅放甚為貪汚特望降以嚴條除其宿弊伏慮州縣官逐月所給正俸皆無見錢使府給配之時皆是虛頭計算伏請州縣官所給料錢雜物准折一依逐處時估者臣等參詳凡關課戶皆是強名縣宰將治凋疲不合別生差配據茲條件請賜改更所給料錢難議條理准唐貞元二年九月五日敕文官充翰林學士及皇太子諸王侍讀武官充禁軍職事並不常朝參其在三館等諸職事者並朝參訖各歸所務者自纍朝以來文武在內廷充職兼判三司或帶職額及六軍判官等例不赴常朝元無正敕准近敕文武職事官未升朝者按舊制並赴朔望朝參其翰林學士侍讀三館諸職事望准元敕處分其在內廷諸司使等每受正官之時來赴正衙謝後不赴常朝大朝會不離禁廷位次三次職官免常朝唯赴大朝會其京司未升朝官員祇赴朔望朝參帶諸司職事者不在此例文官除端明殿翰林學士樞密院學士中書省知制誥外有兼官兼職者仍各發遣本司供事漏刻經云漏刻之制起自軒轅所以上揆天時下著人事是故日行有南北晷漏有長短以黃道去極之度而求漏刻日移之變夫中星晝夜一百刻分為十二時每時有八刻三分之一假令符天以六十分為一刻一時有八刻二十分四刻十分為正前四刻十分為正後二十分中必為時正上古以來皆依此法自唐室將季黃巢犯京既失舊經漏刻無准伏以見行漏刻自午初四刻元稱已時已入未時猶打午正若不改更終成錯誤今欲每時初打一刻至四刻後正時正牌打八刻終一時後一時却從初起即上同往古下驗將來臣等據諸家歷數及太霄論漏刻等經皆以晝夜百刻分為十二時每時有八刻三分之一凡一時以打一刻起於時初八刻終於時正近取到水稱較驗方知見行漏刻差誤假令以午時為例從午時五刻上行作午時一刻侵至未時四刻始滿八刻方終午時此則午未兩時中各取半合為一時也自日出後至日入以來時刻皆如此例相侵伏乞改正從時初打一刻至四刻後進正牌八刻終為一時後時却從初起時辰自正晷漏無差前守洪洞縣主簿盧燦進策云伏以刑獄至重朝廷所難尚書省分職六司天下謂之會府且諸道決獄若關人命即刑部不合不知欲請州府凡決大辟罪人請逐季具有無申報刑部仍具録案款事節并本判官馬部都虞候司法參軍法直官馬部司判官名銜申聞所貴或有案內情繇不圓刑部可行覆勘如此則天下遵守法律不敢輕議刑書非唯免有銜寃抑亦勸其立政者臣等參詳伏以人命至重而國法須精雖載舊章更宜條理誠為允當望賜施行李祥才光鳳閣志奉龍圖聰明有作誥之方名器無假人之理以茲留意爰具上章乃是大綱且非小善既叶聖人之教可嘉君子之言所奏節度刺史州衙前職員等事望賜施行太常博士段禺進封事云臣竊見雒京四面所有祠祭諸壇等自近年以來相次官員祭告不住芟剃掃除漸似低平久虧增飾今乞下太常寺牒河南雒陽兩縣應有管係壇所方以農務未興之時各勒逐近量差三十人功添補修泥須及元格尺丈高其齊宮慮有經費據難修營稍候秋登亦望條理自然百靈允集萬福攸歸臣等參詳大凡祀祭事在敬恭惟於齊壇最宜崇飾伏覩天福元年十月敕節文唐明宗朝敕命法制仰所在遵行不得更易今諸司每有公事見執清泰元年十月十四日編敕施行稱唐明宗朝敕除編集外盡已封鎖不行臣等商量望差官將編集及封鎖前後敕文並再詳定其經文可行條件別録聞奏施行陛下應天順人握圖御宇電繞虹流之地既煥禎符出潛離隱之鄉宜光稱謂其太原潛龍莊望建為慶昌宮使相望鄉改為龍飛鄉都尉里望改為神光里按六典侍御史掌糾舉百僚推鞫獄訟居上者判臺知公廨雜事次知西推贓贖三司受事次知東推理匭伏乞今後准故事施行七月一日太陽有虧缺於北極於東復於南未盈而沒太常禮官詳舊制日有變天子素服避殿太史以所司救日於社陳五兵五鼓麾東㦸南矛西弩北盾中央置鼓服從其位百職廢務素服守司重列於庭每等異位向日而立明復而罷今所司法物咸不能具去歲正旦日有食之唯謹藏兵仗皇帝避正殿尚素食百官守司而已太常禮院定來歲長安公主出降儀太僕寺供厭翟二馬車殿中省備圓方偏扇各十六行障三坐障二繖一大扇一團大扇二今車障傘扇是同光年皇后法物欲雅飾牙使厭翟之車后以四馬權去二馬用之唐廟制度請以至德宮正殿隔為五室室三分之南去地四尺以石為坎中容二主廟之南一屋三門門㦸二十四東西一屋一門門無棨㦸四仲之祭一羊一豕如其中祠幣帛牲牢之類光祿主之祠祝之文不進不署神厨之具鴻臚督之五帝五后凡十主未遷者六未立者四未諡者三高祖太宗與其后暨莊宗凡六主在清化里之寢宮祭前一日以殿中繖扇二十迎置新廟以行饗禮閔帝莊宗明宗二后及魯國孔夫人神主四座請修製祔廟及三后請定諡法有司檢尋長興四年八月二十一日敕準官品令侍中中書令正三品按會要太歷二年十一月升為正二品左右常侍從三品按會要廣德二年五月升為正三品門下中書侍郎正四品大歷二年十一月升為正三品諫議大夫正五品按續會要會昌二年十二月升為正四品以備中書門下四品之闕御史大夫從三品會昌二年十二月升為正三品御史中丞正五品亦與大夫同時升為正四品時屬炎蒸事宜簡省應五日百官起居即令押班宰臣一員押百官班其轉對官兩員封事付閣門使引進本官起居後隨百寮退不用別出謝恩其文武內外官寮乞假寧親搬家及婚葬病損並門見門辭諸道進奉物等不用殿前排列引進使引至殿前奏云某等進奉奏訖其進奉物便出其進奉專使朝見日班首一人致詞都附起居州刺史并行軍副使諸道馬步軍都指揮使以下差人到闕並門見門辭州縣官謝恩日甲頭一人都致詞不用逐人告官其供奉官殿直等如是當直及於合殿前排列者即入起居如不當直排列者不用每日起居委宣徽院專切點檢常須整齊據郎山招收指揮使孫方簡狀當山有僧院地居山谷道扼鄉閭自蕃戎騷動以來邊界驚移之後多聚強壯自辦戈矛每遇賊軍皆獲勝捷其郎山為易州之中路滿縣之鄰封通此往來最為要害乞賜院額者宰相和凝新除右僕射入朝就列儀注責得臺吏喬得威狀稱新除僕射正衙朝謝後次日中丞率三院御史到僕射廳公參相次文武百官公參趨朝時不序班入在中丞之前兼舊例除拜御史大夫趨朝退出在兩省之前僕射出在大夫之前近年以來入朝祇在中丞之前朝退僕射出却在兩省之後銀臺司遂檢唐朝舊儀伏見元和七年二月七日敕所定僕射趨朝出入儀注甚重今後欲請常朝序班候御史中丞㣥官先入以次東宮保傅入次兩省入次僕射入及朝退僕射先出以次兩省官出東宮保傅出次御史中丞百官出
