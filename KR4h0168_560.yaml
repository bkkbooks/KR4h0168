front:
  text: 全唐文欽定全唐文卷五百六十韓愈十四
  hash: sha256:0ac27a9a658c77e1fbd775d94112717e29f1cba0874cebc19972b3350e4a7d71
body:
  text: 順宗至德大聖大安孝皇帝諱誦德宗長子母曰昭德皇后王氏上元二年正月十二日生大歷十四年封為宣王建中元年立為皇太子慈孝寬大仁而善斷留心藝學亦微信尚浮屠法禮重師傅引見輒先拜善隸書德宗之為詩并他文賜大臣者率皆令上書之德宗之幸奉天倉卒閒上常親執弓矢率軍後先導衞備嘗辛苦上之為太子於父子閒慈孝交洽無嫌每以天下為憂德宗在位久稍不假宰相權而左右得因緣用事外則裴延齡李齊運韋渠牟等以奸佞相次進用延齡尤狡險判度支務刻剝聚斂以自為功天下皆怨怒上每進見候顏色輒言其不可至陸贄張滂李充等以毀譴朝臣雙懼諫議大夫陽城等伏閤極論德宗怒甚將加城等罪內外無敢救者上獨開解之城等賴以免德宗卒不相延齡渠牟上有力焉貞元二十一年癸巳德宗崩景申上即位太極殿冊曰維貞元二十一年歲次乙酉正月辛未朔二十三日癸巳皇帝若曰於戲天下之大實惟重器祖宗之業允屬元良咨爾皇太子誦睿哲溫恭寬仁慈惠文武之道秉自生知孝友之誠發於天性自膺上嗣毓德春闈恪慎於厥躬祗勤於大訓必能誕敷至化安勸庶邦朕寢疾彌留弗興弗寤是用命爾繼統俾紹前烈宜陟元后永綏兆人其令中書侍郎平章事高郢奉冊即皇帝位爾惟奉若天道以康四海懋建皇極以熙庶功無忝我高祖太宗之休命上自二十年九月得風疾因不能言使四面求醫藥天下皆聞知德宗憂慼形於顏色數自臨視二十一年正月朔含元殿受朝還至別殿諸王親屬進賀獨皇太子疾不能朝德宗為之涕泣悲傷歎息因感疾恍惚日益甚二十餘日中外不通兩宮安否朝臣咸憂懼莫知所為雖翰林內臣亦無知者二十三日上知內外憂疑紫衣麻鞋不俟正冠出九僊門召見諸軍使京師稍安二十四日宣遺詔上縗服見百寮二十六日即位上學書於王伾頗有寵王叔文以碁進俱待詔翰林數侍太子碁叔文詭譎多計上在東宮嘗與諸侍讀并叔文論政至宮市事上曰寡人方欲極言之眾皆稱贊獨叔文無言既退上獨留叔文謂曰向者君奚獨無言豈有意邪叔文曰叔文蒙幸太子有所見敢不以聞太子職當侍膳問安不宜言外事陛下在位久如疑太子收人心何以自解上大驚因泣曰非先生寡人無以知此遂大愛幸與王伾兩人相依附俱出入東宮聞德宗大漸上疾不能言伾即入以詔召叔文入坐翰林中使決事伾以叔文意入言於宦者李忠言稱詔行下外初無知者以檢校司空平章事杜佑攝冢宰兼山陵使中丞武元衡為副使宗正卿李紓為按行山陵地使刑部侍郎鄭雲逵為鹵簿使又命中書侍郎平章事高郢撰哀冊文禮部侍郎權德輿撰諡冊文太常卿許孟容撰議文庚子百寮請聽政曰自漢以來喪期之數以日易月而皆三日而聽政我國家列聖亦克修奉罔或有違况大行皇帝酌於故實重下遺詔今日至期而陛下未親政事㣥臣不敢安宜存大孝以寧萬國天下之幸不許是月昇泗州為上州二月辛丑朔中書侍郎平章事臣郢門下侍郎平章事臣珣瑜檢校司空平章事臣佑奉疏曰大行皇帝知陛下仁孝慮陛下悲哀不即人心聽政事故發遺詔令一行漢氏之制今陛下安得守曾閔匹夫之小行忘皇王繼親之大孝以虧臣子承順之義猶不許壬寅宰臣又上言曰陛下以聖德至孝繼受寶命宜奉先帝約束以時聽斷不可以久從之癸卯朝百寮於紫宸門杜佑前跪進曰陛下居憂過禮㣥臣懼焉願一覩聖顏因再拜而起左右乃為皇帝舉帽百寮皆再拜佑復奏曰陛下至性殊常哀毀之甚臣等不勝惶灼伏望為宗廟社稷割哀強食景午罷翰林陰陽星卜醫相覆碁諸待詔三十二人初王叔文以碁待詔既用事惡其與已儕類相亂罷之己酉易定節度使張茂昭可同中書門下平章事餘如故河北節度自至德已來不常朝覲前年冬茂昭來朝未還故寵之辛亥詔吏部侍郎韋執誼守左丞同中書門下平章事賜紫初執誼為翰林學士知叔文幸於東宮傾心附之叔文亦欲自廣朋黨密與交好至是遂特用為相乙卯太常奏禮云喪三年不祭惟祭天地社稷周禮圜鍾之均六變天神皆降林鍾之均八變地示咸出不廢天地之祭不敢以卑廢尊也樂者所以降神也不以樂則祭不成今遵遺詔行易月之制請制內遇祭輟樂終制用樂從之又奏禮三年祭宗廟今請竢祔廟畢復常從之辛酉貶京兆尹李實為通州長史詔曰實素以宗屬累更任使驟升班列遂極寵榮而政乖惠和務在苛厲比年旱歉先聖憂人特詔逋租悉皆蠲免而實敢肆誣罔復令徵剝頗紊朝廷之法實惟聚斂之臣自國哀已來增毒彌甚無辜斃踣深所興嗟朕嗣守洪業敷宏理道寧容蠧政以害齊人宜加貶黜用申邦憲尚從優貸俾佐遠藩實諂事李齊運驟遷至京兆尹恃寵強愎不顧文法是時春夏旱京畿乏食實一不以介意方務聚斂徵求以給進奉每奏對輒曰今年雖旱而穀甚好由是租稅皆不免人窮至壞屋賣一九冫木貸麥苗以應官優人成輔端為謠嘲之實聞之奏輔端誹謗朝政杖殺之實遇侍御史王播於道故事尹與御史相遇尹下道避實不肯避導騎如故播詰讓導騎者實怒遂奏播為三原令廷詬之陵轢公卿已下隨喜怒誣奏遷黜朝廷畏忌之嘗有詔免畿內逋租實不行用詔書徵之如初勇於殺害人吏不聊生至譴巿里讙呼皆袖一九冫礫遮道伺之實由閒道獲免壬戌制殿中丞皇太子侍書翰林待詔王伾可守左常侍依前翰林待詔蘇州司功王叔文可起居舍人翰林學士又以司勳員外郎翰林學士知制誥鄭絪為中書舍人學士如故又以給事中馮伉為兵部侍郎以兵部員外郎史館修撰歸登為給事中修撰如故登伉皆上在東宮時侍讀以師傅恩拜二月甲子上御丹鳳門大赦天下自貞元二十一年二月二十四日昧爽已前大辟已下罪無輕重常赦所不原者咸赦原之諸色人中有材行兼茂明於理體者經術精深可為師法者達於吏理可使從政者宜委常參官各舉所知其在外者長吏精加訪擇具名聞奏仍優禮發遣舊事宮中有要市外物令官吏主之與人為市隨給其直貞元末以宦者為使抑買人物稍不如本估末年不復行文書置白望數百人於兩市并要閙坊閱人所賣物但稱宮市即斂手付與真偽不復可辨無敢問所從來其論價之高下者率用百錢物買人直數千錢物仍索進奉門戶并脚價錢將物詣市至有空手而歸者名為宮市而實奪之嘗有農夫以驢負柴至城賣遇宦者稱宮市取之纔與絹數尺又就索門戶仍邀以驢送至內農夫涕泣以所得絹付之不肯受曰須汝驢送柴至內農夫曰我有父母妻子待此然後食今以柴與汝不取直而歸汝尚不肯我有死而已遂毆宦者街吏擒以聞詔黜此宦者而賜農夫絹十匹然宮市亦不為之改易諫官御史數奏疏諫不聽上初登位禁之至大赦又明禁又貞元中要乳母皆令選寺觀婢以充之而給與其直例多不中選寺觀次當出者賣產業割與地買之貴有姿貌者以進其徒苦之至是亦禁焉貞元末五坊小兒張捕鳥雀於閭里皆為暴橫以取錢物至有張羅網於門不許人出入者或有張井上者使不得汲水近之輒曰汝驚供奉鳥雀痛毆之出錢物求謝乃去或相聚飲食於肆醉飽而去賣者或不知就索其直多被毆罵或時留蛇一囊為質曰此蛇所以致鳥雀而捕之者今留付汝幸善飼之勿令饑渴賣者愧謝求哀乃攜而去上在春宮時則知其弊常欲奏禁之至即位遂推而行之人情大悅乙丑停鹽鐵使進獻舊鹽鐵錢物悉入正庫一助經費其後主此務者稍以時市珍翫時新物充進獻以求恩澤其後益甚歲進錢物謂之羨餘而經入益少至貞元末遂月有獻焉謂之月進至是乃罷命右金吾將軍兼中丞田景度持節告哀於吐蕃以庫部員外熊執易為副兵部郎中兼中丞元季方告哀於新羅且冊立新羅嗣王主客員外郎兼殿中監馬于為副三月庚午朔出後宮三百人辛未以翰林待詔王伾為翰林學士壬申以故相撫州別駕姜公輔為吉州刺史前戶部侍郎判度支汀州別駕蘇弁為忠州刺史追故相忠州刺史陸贄郴州別駕鄭餘慶前京兆尹杭州刺史韓臯前諫議大夫道州刺史陽城赴京師德宗自貞元十年已後不復有赦令左降官雖有名德才望以微過忤旨譴逐者一去皆不復敘用至是人情大悅而陸贄陽城皆未聞追詔而卒於遷所士君子惜之癸酉出後宮并教坊女妓六百人聽其親戚迎於九仙門百姓相聚讙呼大喜景戌詔曰檢校司空平章事杜佑可檢校司徒平章事充度支并鹽鐵使以浙西觀察李錡為浙西節度檢校刑部尚書賜徐州軍額曰武寧制曰朕新委元臣綜釐重務爰求貳職固在能臣起居舍人王叔文精識王褱材寡徒少欲質直無隱沈深有謀其忠也盡致君之大方其言也達為政之要道凡所詢訪皆合大猷宜繼前勞佇光新命可度支鹽鐵副使依前翰林學士本官賜如故初叔文既專內外之政與其黨謀曰判度支則國賦在手可以厚結諸用事人取兵士心以固其權驟使重職人心不服藉杜佑雅有會計之名位重而務自全易可制故先令佑主其名而除之為副以專之以戶部尚書判度支王紹為兵部尚書以吏部郎中李鄘為御史中丞武元衡為左庶子初叔文黨數人貞元末已為御史在臺至元衡為中丞薄其人待之鹵莽皆有所憾而叔文又以元衡在風憲欲使附己使其黨誘以權利元衡不為之動叔文怒故有所授庚寅制門下侍郎守吏部尚書平章事賈耽可檢校司空兼左僕射守門下侍郎平章事鄭珣瑜可守吏部尚書守中書侍郎平章事高郢可守刑部尚書守尚書左丞平章事韋執誼可守中書侍郎並依前平章事癸巳詔曰萬國之本屬在元良主器之重歸於長子所以基社稷而固邦統古之制也廣陵王某孝友溫恭慈仁忠恕博厚以容物寬明而愛人祗服訓詞言皆合雅講求典學禮必從師居有令聞動無違德朕獲纘丕緒祗若大猷惟懷永圖用建儲貳以承宗廟以奉粢盛爰舉舊章俾膺茂典宜冊為皇太子改名某仍令所司擇日備禮冊命初廣陵王名從水傍享至冊為皇太子始改從今名丁酉吏部尚書平章事鄭珣瑜稱疾去位其日珣瑜方與諸相會食於中書故事丞相方食百寮無敢謁見者叔文是日至中書欲與執誼計事令直省通執誼直省以舊事告叔文叱直省直省懼入白執誼執誼逡巡慙赧竟起迎叔文就其閤語良久宰相杜佑高郢珣瑜皆停筯以待有報者云叔文索飯韋相已與之同飡閤中矣佑郢等心知其不可畏懼叔文執誼莫敢出言珣瑜獨歎曰吾豈可復居此位顧左右取馬徑歸遂不起前是左僕射賈耽以疾歸第未起珣瑜又繼去二相皆天下重望相次歸臥叔文執誼等益無所顧忌遠近大懼焉夏四月乙巳上御宣政殿冊皇太子冊曰建儲貳者必歸於冢嗣固邦本者允屬於元良咨爾元子廣陵王某幼挺岐嶷長標徇淑佩詩禮之明訓宣忠孝之宏規居維保和動必循道識達刑政器合溫文愛敬奉於君親仁德聞於士庶神祇龜筮罔不協從是用命爾為皇太子於戲惟我烈祖之有天下也功格上帝祚流無窮光纘洪業逮予十葉虔恭寅畏日慎一日付爾以承祧之重勵爾以主鬯之勤以貞萬國之心以揚三善之德爾其尊師重傅親賢遠佞非禮勿踐非義勿行對越天地之耿光丕承祖宗之休烈可不慎歟時上即位已久而臣下未有親奏對者內外盛言王伾王叔文專行斷決日有異說又屬頻雨皆以為㣥小用事之應至將冊禮之夕雨乃止迨行事之時天氣清朗有慶雲見識者以為天意所歸及覩皇太子儀表班行既退無不相賀至有感泣者戊申詔曰惟先王光有天下必正我邦本以立人極建儲貳以承宗祧所以啟迪大猷安固洪業斯前代之令典也皇太子某體仁秉哲恭敬溫文德協元良禮當上嗣朕奉若丕訓憲章前式惟承社稷之重載考春秋之義授之匕鬯以奉粢盛爰以令辰俾膺茂典今冊禮云畢感慶交懷思與萬方同其惠澤自貞元二十一年二月二十四日已後至四月九日昧爽已前天下應犯死罪者特降從流流已下遞減一等文武常參并州府縣官子為父後者賜勳兩轉古之所以教太子必茂選師傅以翼輔之法於訓詞而行其典禮左右前後罔非正人是以教諭而成德也給事中陸質中書舍人崔樞積學懿文守經據古夙夜講習庶協於中並充皇太子侍讀天下孝子順孫先旌表門閭者委所管州縣各加存恤庚戌封皇太子長子寧等六人為郡王癸酉當作丑贈吐蕃弔祭使工部侍郎兼御史大夫史館修撰張薦禮部尚書薦字孝舉代居深州之陸澤祖文成博學工文詞性好詼諧七登文學科薦聰明強記歷代史傳無不貫通為太師顏真卿所稱賞遂知名大歷中江東觀察表薦之授左司禦率府兵曹參軍兼史館修撰貞元初為太常博士四年回紇求和親使送咸安公主入回紇以薦為判官改授殿中侍御史累遷諫議大夫十一年冊回紇子薦以祕書少監持節為使還久之遷祕書監二十年吐蕃贊普死以薦為工部侍郎兼御史大夫持節弔贈卒於赤嶺東回紇辟吐蕃傳歸其柩前後三使異國自始命至卒常兼史職在史館二十年著宰輔傳畧五服圖記寓居錄靈怪集等景寅罷閩中萬安監先是福建觀察柳冕久不遷欲立事迹以求恩寵乃奏云閩中南朝放牧之地畜羊馬可使孳息請置監許之收境中畜產令吏牧其中羊大者不過十斤馬之良者估不過數千不經時輒死又斂百姓苦之遠近以為笑至是觀察閻濟美奏罷之丁卯命焚容州所進毒藥可殺人者五月己巳以杭州刺史韓臯為尚書左丞辛未以右金吾大將軍范希朝為檢校右僕射兼右神策京西諸城鎮行營兵馬節度使叔文欲專兵柄藉希朝年老舊將故用為將帥使主其名而尋以其黨韓泰為行軍司馬專其事甲戌以度支郎中韓泰守兵部郎中兼中丞充左右神策京西都柵行營兵馬節度行軍司馬賜紫乙亥追改為檢校兵部郎中職如故甲申以萬年令房啟為容州刺史兼御史中丞初啟善於叔文之黨因相推致遂獲寵於叔文求進用叔文以為容管經畧使使行約至荊南授之云脫不得荊南即與湖南故啟宿留於江陵久之方行至湖南又久之而叔文與執誼爭權數有異同故不果尋聞皇太子監國啟惶駭奔馳而往是日以郴州員外司馬鄭餘慶為尚書左丞乙酉以尚書左丞韓臯為鄂岳觀察武昌軍節度使初臯自以前輩舊人累更重任頗以倨自高嫉叔文之黨謂人曰吾不能事新貴人臯從弟華幸於叔文以告叔文故出之辛卯以王叔文為戶部侍郎職如故賜紫初叔文欲依前帶翰林學士宦者俱文珍等惡其專權削去翰林之職叔文見制書大驚謂人曰叔文日時至此商量公事若不得此院職事即無因而至矣王伾曰諾即疏請不從再疏乃許三五日一入翰林去學士名又與歸登同日賜紫內出衫笏賜登而叔文不霑文珍等所惡獨不得賜由此始懼以衢州別駕令狐峘為祕書少監峘國子祭酒德棻元孫進士登第司徒楊綰未達時遇之以為賢為禮部修史引峘入史館自華原尉拜拾遺累遷起居舍人大歷八年劉晏為吏部尚書奏峘為刑部員外判南曹累遷至禮部侍郎峘之判南曹晏為尚書楊炎為侍郎峘得晏之舉分闕必擇其善者與晏而以惡者與炎炎固已不平至峘為禮部而炎為相有杜封者故相鴻漸之子求補宏文生炎嘗出杜氏門下託峘以封峘謂使者曰相公欲封成其名乞署封名下一字峘因得以記焉炎不意峘賣之署名屬峘峘明日疏言宰相炎迫臣以威臣從之則負陛下不從即炎當害臣德宗以問炎炎具道所以德宗怒曰此姦人不可奈欲杖而流之炎救解乃黜為衡州別駕貞元初李泌為相以左庶子史館修撰徵至則與同職孔述睿爭競細碎數侵述睿述睿長告以讓不欲爭泌卒竇參為相惡其為人貶吉州別駕改吉州刺史齊映除江西觀察過吉州峘自以前輩懷怏怏不以刺史禮見入謁從容步進不袜首屬戎器映以為恨去至府奏峘舉前刺史過失鞫不得真無政事不宜臨郡貶衢州別駕上即位以祕書少監徵未至卒峘在史館修元宗實錄一百卷撰代宗實錄三十卷雖頗勤苦然多遺漏不稱良史初德宗將厚奉元陵事峘時為中書舍人兼史職奏疏諫請薄其葬有答詔優獎元和三年以修實錄功追贈工部尚書是月以襄州為襄府徙臨漢縣於古城曰鄧城縣六月乙亥貶宣州巡官羊士諤為汀州寧化縣尉士諤性傾躁時以公事至京遇叔文用事朋黨相煽頗不能平公言其非叔文聞之怒欲下詔斬之執誼不可則令杖殺之執誼又以為不可遂貶焉由是叔文始大惡執誼往來二人門下者皆懼先時劉闢以劒南節度副使將韋臯之意於叔文求都領劒南三川謂叔文曰太尉使某致微誠於公若與其三川當以死相助若不用某亦當有以相酬叔文怒亦將斬之而執誼固執不可闢尚遊京師未去至聞士諤遂逃歸左散騎常侍致仕張萬福卒萬福魏州元城人也自曾祖至父皆明經官止縣令州佐萬福以祖父業儒皆不達不喜書學騎射年十七八從軍遼東有功為將而還累遷至壽州刺史州送租賦詣京師至潁川界為盜所奪萬福使輕兵馳入潁川界討之賊不意萬福至忙迫不得戰萬福悉聚而誅之盡得其所亡物并得前後所掠人妻子財物牛馬萬計悉還其家為淮南節度崔圓所忌失刺史改鴻臚卿以節度副使將兵千人鎮壽州萬福不以為恨許杲以平盧行軍司馬將卒三千人駐濠州不去有窺淮南意圓令萬福攝濠州刺史杲聞即提卒去止當塗陳莊賊陷舒州圓又以萬福為舒州刺史督淮南岸盜賊連破其黨大歷三年召赴京師代宗謂曰聞卿名久欲一識卿且將累卿以許杲萬福拜謝因前曰陛下以許杲召臣如河北賊諸將叛以屬何人代宗笑曰且欲議許杲事方當大用卿即以為和州刺史行營防禦使督淮南岸盜賊至州杲懼移軍上元杲至楚州大掠節度使韋元甫命萬福討之未至淮陰杲為其將康自勤所逐自勤擁兵繼掠循淮而東萬福倍道追而殺之免者十二三盡得其所虜掠金銀婦女等皆獲致其家代宗詔以本州兵千五百人防秋京西遂帶和州刺史鎮咸陽因留宿衞李正已反將斷江淮路令兵守埇橋渦口江淮進奉船千餘隻泊渦口不敢進德宗以萬福為濠州刺史萬福馳至渦口立馬岸上發進奉船淄青將士停岸睥睨不敢動諸道繼進改泗州刺史為杜亞所忌徵拜左金吾衞將軍召見德宗驚曰杜亞言卿昏耄卿乃如是健耶圖形凌煙閣數賜酒饌衣服并勅度支籍口畜給其費至賀陽城等於延英門外天下益重其名二十一年以左散騎常侍致仕元和元年卒年九十萬福自始從軍至卒祿食七十年未嘗病一日典九郡皆有惠愛癸丑韋臯上表請皇太子監國又上皇太子牋尋而裴垍嚴綬表繼至悉與臯同贈故忠州別駕陸贄兵部尚書故道州刺史陽城左常侍贄字敬輿吳郡人也年十八進士及第又以博學宏詞授鄭縣尉書判拔萃授渭南尉遷監察御史未幾選為翰林學士遷祠部員外郎德宗幸奉天贄隨行在天下騷擾遠近徵發書詔一日數十下皆出於贄贄操筆持紙成於須臾不復起草同職皆拱手嗟歎不能有所助常啟德宗言方今書詔宜痛自引過罪己以感人心昔成湯以罪己致興後代推以為聖人楚王失國亡走一言善而復其國至今稱為賢者陛下誠能不恡改過以言謝天下臣雖愚陋為詔詞無所忌諱庶能令天下叛逆者迴心喻旨德宗從之故行在制詔始下聞者雖武人悍卒無不揮涕感激議者咸以為德宗剋平寇難旋復天位不惟神武成功爪牙宣力蓋以文德廣被腹心有助焉累遷考功郎中諫議大夫中書舍人兼翰林學士丁母憂免喪權知兵部侍郎復入翰林中外屬意旦夕竢其為相竇參深忌之贄亦短參之所為且言其黷貨於是與參不能平尋真拜兵部侍郎知禮部貢舉於進士中得人為多八年春遷中書侍郎平章事始令吏部每年集選人舊事吏部每年集人其後遂三年一置選選人猥至文書多不了尋勘真偽紛雜吏因得大為奸巧選士一蹉跌或至十年不得官而官之闕者或累歲無人贄令吏部分內外官員為三分計闕集人以為常其弊十去七八天下稱之初竇參出李巽為常州刺史且迫其行巽常銜之至參貶為郴州別駕巽適遷湖南觀察德宗常與參言故相姜公輔罪參漏其語參敗公輔因上疏自陳其事非臣之過德宗詰之知參洩其語怒未有所發會巽奏汴州節度劉士寧遺參金帛若干士寧得汴州參處其議士寧常德之故致厚貺德宗以參得罪而以武將交結發怒竟致參於死而議者多言參死由贄焉裴延齡判度支天下皆嫉怨而獨幸於天子朝廷無敢言其短者贄獨身當之日陳其不可用延齡固欲去贄而代之又知贄之不與已多阻其奏請也謗毀百端翰林學士吳通元故與贄同職奸巧佻薄與贄不相能知贄與延齡相持有閒因盛言贄短宰相趙璟本贄所引同對嫉贄之權密以贄所戢彈延齡事告延齡延齡益得以為計由是天子益信延齡而不直贄竟罷贄相以為太子賓客而黜張滂李充等權言事者皆言其屈贄因畏懼至為賓客拒門不納交親士友春旱德宗數獵苑中延齡疏言贄等失權怨望言於眾曰天下旱百姓且流亡度支愛惜不肯給諸軍軍中人無所食其事奈何以搖動㣥心其意非止欲中傷臣而已後數日又獵苑中會神策軍人跪馬前云度支不給馬草德宗意延齡前言即迴馬而歸由是貶贄為忠州別駕滂充皆斥逐德宗怒未解贄不可測賴陽城等救乃止贄之為相常以少年入翰林得幸於天子長養成就之不敢自愛事之不可者皆爭之德宗在位久益自攬持機柄親治細事失君人大體宰相益不得行其事職而議者乃云由贄而然贄居忠州十餘年常閉門不出入人無識面者避謗不著書習醫方集古今名方為陸氏集驗方五十卷卒於忠州年五十二上初即位與鄭餘慶陽城同徵詔始下而城贄皆卒城字亢宗北平人代為官族好學貧不能得書乃求入集賢為書寫吏竊官書讀之晝夜不出經六年遂無所不通乃去滄州中條山下遠近慕其德行來學者相繼於道閭里有爭者不詣官府詣城以決之李泌為相舉為諫議大夫拜官不辭未至京師人皆想望風采云城山人能自苦刻不樂名利必諫諍死職下咸畏憚之既至諸諫官紛紛言事細碎無不聞達天子益厭苦之而城方與其二弟牟容連夜痛飲人莫能窺其意有懷刺譏之者將造城而問者城揣知其意輒彊與酒客或時先醉仆席上或時先醉臥客懷中不能聽客語約其二弟云吾所得月俸汝可度我家有幾口月食米當幾何買薪菜鹽米凡用幾錢先具之其餘悉以送酒媼無留也未嘗有所貯積雖其所服用切急不可缺者客稱其物可愛城輒喜舉而授之陳萇者候其始請月俸常往稱其錢帛之美月有獲焉至裴延齡讒毀陸贄等坐貶黜德宗怒不解在朝無救者城聞而起曰吾諫官也不可令天子殺無罪之人而信用奸臣即率拾遺王仲舒數人守延英門上疏論延齡奸佞贄等無罪狀德宗大怒召宰相入語將加城等罪良久乃解令宰相諭遣之於是金吾將軍張萬福聞諫官伏閤諫趨往至延英門大言賀曰朝廷有直臣天下必太平矣遂徧拜城與仲舒等曰諸諫議能如此言事天下安得不太平也已而連呼太平萬歲太平萬歲萬福武人時年八十餘自此名重天下時朝夕相延齡城曰脫以延齡為相當取白麻壞之慟哭於庭竟坐延齡事改國子司業至引諸生告之曰凡學者所以學為忠與孝也諸生寧有久不省其親乎明日謁城歸養者二十餘人有薛約者嘗學於城狂躁以言事得罪將徙連州客寄有根蔕吏縱求得城家坐吏於門與約飲決別涕泣送之郊外德宗聞之以城為黨罪人出為道州刺史太學王魯卿李儻等二百七十人詣闕乞留住數日吏遮止之疏不得上在州以家人禮待吏人宜罰者罰之宜賞者賞之一不以簿書介意賦稅不登觀察使數誚讓上考功第城自署第曰撫字心勞徵科政拙考下下觀察使嘗使判官督其賦至州怪城不出迎以問州吏吏曰刺史聞判官來以為己有罪自囚於獄不敢出判官大驚馳入謁城於獄曰使君何罪某奉命來候安否耳留一兩日未去城固不復歸館門外有故門扇橫地城晝夜坐臥其上判官不自安辭去其後又遣他判官崔某往按之崔承命不辭載妻子一行中道而逃城孝友不忍與其弟異處皆不娶給侍終身有寡妹依城以居有生年四十餘癡不能如人常與弟負之以遊初城之妹夫亡在他處家貧不能葬城親與其弟舁尸以歸葬於其居之側往返千餘里卒時年六十餘戊午以戶部侍郎潘孟陽為度支鹽鐵轉運副使其日王伾詐稱疾自免自叔文歸第伾日詣中人并杜佑請起叔文為相且總北軍既不得請以威遠軍使平章事又不得其黨皆憂悸不自保伾至其日坐翰林中疏三上不報知事不濟行且臥至夜忽叫曰伾中風矣明日遂輿歸不出戊子以禮部侍郎權德輿為戶部侍郎以倉部郎中判度支陳諫為河中少尹王伾叔文之黨於是始去乙未詔軍國政事宜權令皇太子某勾當百辟㣥后中外庶僚悉心輔翼以底於理宣布朕意咸使知聞上自初即位則疾患不能言至四月益甚時扶坐殿㣥臣望拜而已未嘗有進見者天下事皆專斷於叔文而李忠言王伾為之內主執誼行之於外朋黨喧譁榮辱進退生於造次惟其所欲不拘程度既知內外厭毒慮見摧敗即謀兵權欲以自固而人情益疑懼不測其所為朝夕伺候會其與執誼交惡心腹內離外有韋臯裴垍嚴綬等牋表而中官劉光奇俱文珍薛盈珍尚解玉等皆先朝任使舊人同心怨猜屢以啟上上固已厭倦萬機惡叔文等至是遂詔翰林學士鄭絪衞次公王涯等入至德殿撰制詔而發命焉又下制以太常卿杜黃裳為門下侍郎左金吾衞大將軍袁滋為中書侍郎並平章事又下制吏部尚書平章事鄭珣瑜刑部尚書平章事高郢並守本官罷相皇太子見百寮於東朝百寮拜賀皇太子涕泣不答拜景申詔宰臣告天地社稷皇太子見四方使於麟德殿西亭八月庚子詔曰惟皇天祐命烈祖誕受方國九聖儲祉萬方咸休肆予一人獲纘丕業嚴恭守位不遑暇逸而天祐匪降疾恙無瘳將何以奉宗廟之靈展郊禋之禮疇咨庶尹對越上元內愧於朕心上畏於天命夙夜祗慄惟懷永圖一日萬機不可以久曠天工人代不可以久違皇太子某睿哲溫文寬和慈惠孝友之德愛敬之誠通於神明格於上下是用推皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方宜令皇太子即皇帝位朕稱太上皇居興慶宮制勅稱誥所司擇日行冊禮永貞元年八月辛丑太上皇居興慶宮誥曰有天下者傳歸於子前王之制也欽若大典斯為至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代予守邦爰以令辰光膺冊禮宜以今月九日冊皇帝於宣政殿仍命檢校司徒杜佑充冊使門下侍郎杜黃裳充副使國有大命恩俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年自貞元二十一年八月五日昧爽已前天下應犯死罪特降從流流已下遞減一等又下誥曰人倫之本王化之先爰舉令圖允資內輔式表后妃之德俾形邦國之風茲禮經之大典也良娣王氏家承茂族德冠中宮雅修彤管之規克佩姆師之訓自服勤蘋藻祗奉宗祧令範益彰母儀斯著宜正長秋之位以明繼體之尊良媛董氏備位後庭素稱淑慎進升號位禮亦宜之良娣可冊為太上皇后良媛宜冊為太上皇德妃仍令所司備禮擇日冊命宣示中外咸使知聞壬寅制王伾開州司馬王叔文渝州司戶並員外置馳驛發遣叔文越州人以碁入東宮頗自言讀書知理道乘閒嘗言人閒疾苦上將大論宮市事叔文說中上意遂有寵因為上言某可為將某可為相幸異日用之密結韋執誼并有當時名欲僥倖而速進者陸質呂溫李景儉韓華韓泰陳諫劉禹錫柳宗元等十數人定為死交而凌準程异等又因其黨而進交遊蹤跡詭祕莫有知其端者貞元十九年補闕張正買疏諫他事得召見正買與王仲舒劉伯芻裴茝常仲儒呂洞相善數遊止正買得召見諸往來者皆往賀之有與之不善者告叔文執誼云正買疏似論君朋黨事宜少誡執誼叔文信之執誼嘗為翰林學士父死罷官此時雖為散郎以恩時時召入問外事執誼因言成季等朋讌聚游無度皆譴斥之人莫知其由叔文既得志與王伾李忠言等專斷外事遂首用韋執誼為相其常所交結相次拔擢至一日除數人日夜㣥聚伾以侍書幸寢陋吳語上所褻狎而叔文頗任事自許微知文義好言事上以故稍敬之不得如伾出入無阻叔文入至翰林而伾入至柿林院見李忠言牛昭容等故各有所主伾主往來傳授劉禹錫陳諫韓華韓泰柳宗元房啟凌準等主謀議唱和採聽外事上疾久不瘳內外皆欲上早定太子位叔文默不發議已立太子天下喜而叔文獨有憂色嘗吟杜甫題諸葛亮廟詩末句云出師未用身先死長使英雄淚滿襟因歔欷流涕聞者咸竊笑之雖判兩使事未嘗以簿書為意日引其黨屏人切切細語謀奪宦者兵以制四海之命既令范希朝韓泰總統京西諸城鎮行營兵馬中人尚未悟會邊上諸將各以狀辭中尉且言方屬希朝中人始悟兵柄為叔文所奪乃大怒曰從其謀吾屬必死其手密令其使歸告諸將曰無以兵屬人希朝至奉天諸將無至者韓泰白叔文計無所出唯曰奈何奈何無幾而母死執誼益不用其語叔文怒與其黨日夜謀起復起復必先斬執誼而盡誅不附已者聞者皆恟懼皇太子既監國遂逐之明年乃殺之伾杭州人病死遷所其黨皆斥逐叔文最所賢重者李景儉而最所謂奇才者呂溫叔文用事時景儉持母喪在東都而呂溫使吐蕃半歲至叔文敗方歸故二人皆不得用叔文敗後數月乃貶執誼為崖州司馬後二年病死海上執誼杜黃裳子壻與黃裳同在相位故最在後貶執誼進士對策高等驟遷拾遺年二十餘入翰林巧慧便辟媚幸於德宗而性貪婪詭賊其從祖兄夏卿為吏部侍郎執誼為翰林學士受財為人求科第夏卿不應乃探出懷中金以內夏卿袖夏卿驚曰吾與卿賴先人德致名位幸各已達豈可如此自毀壞擺袖引身而去執誼大慚恨既而為叔文所引用初不敢負叔文迫公議時時有異同輒令人謝叔文云非敢負約為異同蓋欲曲成兄弟爾叔文不之信遂成仇怨然叔文敗執誼亦自失形勢知禍且至雖尚為相常不自得長奄奄無氣聞人行聲輒惶悸失色以至敗死時纔四十餘執誼自卑嘗諱不言嶺南州縣名為郎官時嘗與同舍郎詣職方觀圖每至嶺南圖執誼皆命去之閉目不視至拜相還所坐堂北壁有圖不就省七八日試就觀之乃崖州圖也以為不祥甚惡之憚不能出口至貶果得崖州焉永貞二年正月景戌朔太上皇於興慶宮受朝賀皇帝率百寮奉上尊號曰應乾聖壽太上皇冊文曰維永貞二年歲次景戌正月景戌朔皇帝臣某稽首再拜奉冊言臣聞上聖元邈獨超乎希夷彊名之極猶存乎罔象豈足以表無為之德光不宰之功然稱謂所施冊攸著涵泳道德感於精誠仰奉洪徽有以自竭伏惟太上皇帝陛下道繼元元業纘皇極膺千載之休歷承九聖之耿光昭宣化源發揚大號政有敦本示儉慶裕格天恩翔春風仁育㣥品而功成不處褰裳去之付神器於冲人想汾陽以高蹈體堯之德與神同符其動也天其靜也地巍巍事表無得而言顧茲寡昧屬膺大寶懼忝傳歸之業莫申繼述之志夙夜兢畏惟懷永圖今天下幸安皆睿訓所被而未極徽號孰報君親是以台臣庶官文武之列抗疏於內方伯藩守億兆之眾同詞於外請因壽歷以播鴻名臣不勝大願謹上尊號曰應乾聖壽太上皇當三朝獻壽之辰應五紀啟元之始光膺徽稱允協神休斯天下之慶也元和元年正月甲申太上皇崩於興慶宮咸寧殿年四十六遺誥曰朕聞死生者物之大歸修短者人之常分古先哲王明於至道莫不知其終以存義順其變以節哀故存者不至於傷生逝者不至於甚痛謂之達理以貫通喪朕自弱齡即敦清靜逮乎近歲又嬰沈痼常亦親政益倦於勤以皇帝天資仁孝日躋聖敬爰釋重負委之康濟而能內睦於九族外勤於萬機問寢益嚴侍膳無曠推此至德以安庶邦朕之知子無媿天下今厥疾大漸不寤不興付託得人顧復何恨四海兆庶亦奚所哀但聖人大孝在乎善繼樞務之重軍國之殷纘而承之不可蹔闕以日易月抑惟舊章皇帝宜三日而聽政十三日小祥二十五日大祥二十七日釋服方鎮岳牧不可離任赴哀天下吏人誥至後出臨三日皆釋服無禁㛰嫁祠祀飲酒食肉宮中當臨者朝晡各十五舉音非朝晡臨時禁無得哭釋服之後勿禁樂他不在誥中者皆以類從事伏以崇陵僊寢復土纔終甸邑疲人休功未幾今又重勞營奉朕所哀矜况漢魏二文皆著遺令永言景行常志夙心其山陵制度務從儉約並不用以金銀錦綵為飾百辟卿士同力盡忠克申送往之哀宜展事居之禮布告天下明知朕懷七月壬申葬豐陵諡曰至德大聖大安孝皇帝廟曰順宗
