front:
  text: 全唐文欽定全唐文卷七百六十二貫字總之會昌三年進士
  hash: sha256:f5f916d88f5d47ce6476f11105a3c38a17212ce45b39c9884522a5feb62b8d0d
  markers:
  - {type: head, offset: 14, content: 石貫, id: KR4h0168_NFKB_762-h1, level: 1}
body:
  text: 大皡御辰勾芒定位天子率躬耕之禮有司謹親載之事以為帝籍斯闕皇猷久墜不修耒耜之功是墮粢盛之義於是擇元日戒農期本千畝而敬矣齋三日以告之然後內外清謐上下肅祇文物之儀備列戈鋋之衞在茲猶窺紫禁共仰丹墀儼南面凝旒之所當東方欲曉之時漏水聲盡爐香上遲俄而閶闔開羽儀展揚青旗以肅事備朱紘而戒典上乃望靈壇御玉輦蒼龍整駕以前導蔥犗遵途而右轉六轡齊舉八鸞啟行向綠野公田之所至青郊展禮之方紺轅塞路青輅巡場叶農經而授事指農正而告祥由是別土宜分彊理入滌場而肆目撫御耦而舉趾遂乃執紅紖親黛耜四顧而溝塍砥平三推而土膏脈起發生有在播殖茲始諸公諸侯而次進或五或九而皆止見京坻之流衍可期覩稼穡之艱難有以禮樂既備人神告休事雖兆於東作稔以見其秋收豈獨親耕於甸內實亦種德於道周㣥臣乃伏輦而進曰臣聞歷代務農百王重穀陛下興古典之巳墜紹前修之不復故得人勤稼穡天降景福帝曰予上事天地次奉祖宗惟舊章是率惟古典是恭今將返鑾輅而宴於太寢又欲展禮而勞農國重農事帝遵時令惟千畝之可親望三推而闡盛田畯方勤於稟法甸師巳切於承命陽和初布庶平東作以勸人逕術既端終俟南郊而見聖當其融風式協韶景方遲金根為順動之馭菖葉表親耕之期度以地狹難容足列公車之數顧其土膏潛動可陳農器於茲修隴惟直遐阡甚夷是宜率諸侯大夫以行乎周禮不可使四年正月獨稱於晉時言瞻耒耜志惜墳衍謂畇畇而足得天臨想澤澤而正宜春淺空為散地尚鬱新典載芟未及勾萌之出何因一墢為期螻蟻之誠願展翠幕猶閟朱紘未至當人力可借而成功使農祥失正而奚利染場之屨期剡剡以輕移撫籍之衣想襜襜而如墜且夫事尊禮動法貴聖興顧井田之君是可出而偕作懿初耕之帝宜其德以相成不然則無以知土宜慰人欲使其穜稑克備粢盛乃足庶見其耘之耦一一具陳必報乃求之倉纍纍交屬况以近甸堪樂元辰以良借百步之疇冀停雲䍐修三班之令期在月將如此則樹德咸滋訓農惟允畢力克符於地事致誠不昧於畦畛儻禮備而必行實以表乎仁之至義之盡歲起於東丁壯就功則知富民必資於廪實彊國亦在於年豐是時也杏花疏樹蒲葉抽叢曉出鳳城疲道路之攸徃迴瞻鶉野知耕鑿之斯崇美夫原隰底績溝塍刻鏤耒耜交橫煙雲輻凑人沮溺而為伴水鄭白以分溜一稃二米禾同北里之禾苗盛草稀豆異南山之豆觀夫田畯至喜室家相歡揮鎡去莠築堰澆蘭野餉曉持於斜徑畚插暮荷於層巒鄰近山之樹密悅臨流之地寬葵腰鐮而乍采黍策杖而時看且人生在勤勤則不匱欲抑末以敦本在用天而分地思文后稷濟時敷播殖之功惟彼陶唐申命掌嵎夷之事八政之中食居一四人之裏農為二倬彼甫田習無不利故土爰稼穡含靈是資歲稔則家知禮讓食足則國贊邕熙無辭艱難服先疇之畎畝皆當儲峙救黎人之阻飢九年殷憂於堯日萬箱發詠於周詩迹忝門人得承規於孔父心將請學恐貽責於樊遲言字表文初名嶽屢舉不售改今名大中十二年及第彼子胥兮亡命江湄賴漁父兮停橈在茲既橫流而濟矣因解劍以酬之厚意殷勤何惜千金之器高情特達竟陳三讓之辭稽其去國無途迷津獨立前臨積水之阻後有追兵之急躊蹰而鶴髮相哀顧盼而漁舟可入憂心盡展憑刳木以何虞渡口雖遙挂輕帆而巳及繇是拂拭青萍披陳素誠念險難以知我顧提攜而賜卿拔三尺之熒熒波間電落橫七星之凜凜掌上風生叟乃莞爾興言搘頤話志本期浩淼以排難詎可愴惶而徇利酬仁報惠誠多公子之心害義傷廉且異老夫之意况乎楚令方急嚴刑且陳盡索奔亡之黨先誅隱匿之人若以爵祿為念榮華是親則械爾躬而赴國持爾劍以防身整棹西歸自受執珪之賞論功北面寧亡切玉之珍蓋由惻隱為心艱危是濟方圖散髮之樂豈假吹毛之銳情高而俗慮難量語罷而鳴桹忽逝連環吐月空臨玉匣之間一葉乘風漸入寒煙之際豈不以識達精微言窮是非棄霜刃以長徃弄雲濤而不歸寂寞巖煙沉東流之渺渺凄凉浦樹含落日以依依異乎義立一朝名超萬古决雲之異狀徒逞皎日之深誠不取則知美范蠡而述魯連信斯人之可伍雞司晨而風雨不渝人懷詐而關防可圖效長鳴於頃刻排大難於斯須近取諸身俾㣥情而莫測出於余口將五德以無殊昔者田文久為秦質東歸齊國之日夜及函關之際顧追騎以將臨念國門之尚閉君臣相視方懷累卵之危豪俠同謀未有脫身之計下客無名潛來獻誠君禍方垂於虎口臣愚請斆於雞鳴於是鷹揚負氣鶚立含情迥夜遙天未變沈沈之色攢眉鼓臂因為喔喔之聲審聽真如遙聞酷似高穿紫塞之上深入黃河之裏一鳴而守吏先驚三唱而行人盡起迴瞻滿座皆默默以無言散入荒村漸膠膠而不巳想夫計即成欺人皆不疑重門似洞以俱闢駟馬如龍而莫追雖師曠之聰誠難辨矣縱冶長之慧未必知之於是考智謀察能否君於士兮誠重士於君兮亦厚念秦關之百二難逞狼心笑齊客之三千不如雞口既而美播彊隣名聞上賓暫解咽喉之急永為心膂之臣想季路之危冠相侔未可任秦皇之利觜欲斆無因豈非志在酬恩居然造響清濁如一高低不爽迷翰音之類應若同聲闢反拒之門易於覆掌始知戰國之多才是招賢之道廣昔丁令威登仙紫微念故鄉之久別化靈禽之一歸翻瑤臺而遂下見華表而堪依凄凉而舊跡猶存徘徊有戀寂寞而故人誰在悵望難飛原夫託玉羽以潛遊歷丹霄而暫憩閟聞天之逸響駐凌雲之遠勢凝思慮於木末俯閭閻於煙際光陰可惜歡娛肯誤於當年邱壟相望凋落徒悲於晚歲既而人事難尋俄成古今野逕榛亂烟墟草深歧路之黃埃不巳桑榆之白日空沈眷戀無窮誰識孤高之貌悲傷莫測空聞嘹唳之音至若似帶烟霞情深恨賒遲迴而脩趾不動眄睞而圓吭暫斜松檟蕭蕭徧是幽魂之宅蓬茅歷歷今為誰氏之家少別層城長思故里似有求而不見若將飛而未起住仙界之長日痛人寰之逝水念當時之親識安問存亡窮累代之子孫莫言終始極目晴煙凝思悄然別離而塵事不一倏忽而芳春且千那求飲啄自惡腥膻歸處而雲空慘澹望中而封樹連延笑彼乘軒不離乎金闕喜茲警露迥降於遼天巳而卓爾無㣥超然將翥思杳杳之空際戀亭亭之高處迴朱頂以長望疊霜毛而永慮蓄恨無窮忽矯身而飛去牢字惪膠會昌三年進士物之化兮則多蟬之類兮惟一棄捐無用之甲振奮有聲之質彼則曲拳擎巳心附麗脩條此則遠害全身飛鳴永日當其閒園向久輕吹無聞衝孔之異狀初出寓物之雙形欲分暗入幽叢上纎莖而繚繞時搖殘萼散芳氣之氤氳於以警素秋於以戒炎酷進退如懼攀援欲速兢兢而恐墜微躬步步而竟升高木來能應候禍豈避於刳膓去乃乘時智終期於剖腹烟月思寡懸垂勢孤以抱膏肓之疾待成胡越之區拳跼而投足既定蹙縮而脫身是圖漸呀然而甲折俄豁爾而形殊前程而遠寄園林如矜得路下視而若遺枯朽孰肯守株由是乍舉輕躬初留具體薄翼而朝陽始照元緌而宿露新洗纔發響於林下巳傳聲於澗底騐形有二責實無雙啾啾而送恨蓬戶嘒嘒而添愁瑣窗吟遠樹於荒郊思盈秋野噪寒花於別浦韻繞晴江則知造化之旨難窮其理何末異而本同何一生而一死其死信不自以為辱其生信不自以為美能彼我而兩忘則榮枯而相似別有甘穴居於聖代期羽化於天庭久羡出身之術多慙負贅之形高枝尚遠短景難停儻遭逢於此夜冀音響之堪聽疇會昌六年官太常博士去月十七日饗德明興聖廟德廟直候論狀稱懿祖室在獻祖室之上當時雖以為然便依行事猶牒報監察使及宗正寺請過察詳窺玉牒如有不同即相知聞奏爾後伏檢高祖神堯皇帝本紀伏審獻祖為懿祖之昭懿祖為獻祖之穆昭穆之位天地極殊今廟室奪倫不即陳奏然尚為苟且罪不容誅仍勅修撰朱儔檢討王皡研精詳覆得報稱天寶二年制追尊咎繇為德明皇帝涼武昭王為興聖皇帝十載立廟至貞元十九年制從給事中陳京右僕射姚南仲等一百五十人之議以為禘祫是祖宗以序之祭凡有國者必尊太祖今國家以景皇帝為太祖太祖之上施於禘祫不可為位請按德明興聖廟共成四室祔遷獻懿二祖謹尋儔等所報即當時表奏並獻居懿上伏以德尊諡為孝君臣嚴敬有司慎恪是歲以還不當失序四十餘載理難尋詰伏祈聖鑒即垂詔勅具禮遷正伏聞今月十三日勅以臣所奏獻懿祖二室倒置事宜令禮官集議聞奏者臣去月十七日緣遇太廟祫饗太祖景皇帝巳下㣥主準貞元十九年所祔獻懿祖於德明廟共為四室準元勅各於本室行享禮審知獻祖合居懿祖之上昭穆方正其時親見獻祖之室倒居懿祖之下於後遍校圖籍實見差殊遂敢聞奏今奉勅宜令禮官集議聞奏者臣得奉禮郎李岡太祝柳仲年協律郎諸葛畋李潼檢討官王皡修撰朱儔博士閔慶之等七人狀稱謹按高祖神堯皇帝本紀及皇室圖譜并武德貞觀永徽開元巳來諸禮著在甲令者並云獻祖宣皇帝是神堯之高祖懿祖光皇帝是神堯皇帝之曾祖以高曾辨之則獻祖是懿祖之父懿祖是獻祖之子即博士任疇所奏倒祀不虛臣等伏乞即垂詔勅具禮遷正玉汝會昌四年進士官御史咸通中出為衢州剌史聖人患人情多遷物象不一爰指道樞之要因明金柅之質蓋以金則持堅而有常柅則制動而無匹當全模於大冶曾因鼓鑄之功及入用於生民克保安貞之吉原易道之所施得器度之攸宜任重而難勝者非剛莫能致其定利轉而不息者非一無以止其隨所以適其所適斯焉取斯在如輊如軒之時自能勁挺處無輗無軏之地物莫稱推美其叶範選而見辭取鍛鍊而興制雖成形於橐籥不假飾於磨礪常無銷鑠懷可以明確禀安排之理端居退止之旌首於萬化之內而乃百度惟貞然以上經之旨難分先儒之見無果一以節驅馳而為事一以當徑路而待我苟在鎔而備物固察其所由如持重以知名則用無不可是則寓質之時惟工所資將永平於軌轍亦致理於麻絲不為事遷可類仁之方也終然靜勝固知道豈遠而夫如是觀六爻之所總皆遵乎不動驗一德之可稱莫與彼爭能我皇由是立心堅固引義依憑躁競者息之於靜域回邪者制之於直繩然則金柅之為器也於今而其道益宏厚載字光化會昌三年進士劍者金之利器玉者寶之至堅韜百鍊之形迥倚天而入用斷十德之質信如泥而莫全蓋以淬礪呈彩磨礱發鮮開寶匣之炯爾切連城而爛然原其周穆西征戎王獻至刃決雲以增價鍔開蓮以逾利明星耀色固巳直於千金白玉雖堅纔可當於一試於是搜韞匵示精鋼謀剸割輝鋒鋩舉連環而動月掌盈尺以凝霜投刃皆虛無騞然之異響應機立斷俄凜若以分光暎日惟明搖容轉潔乍毀方以旁達忽離堅而中絕仰鋒亂起初每謂如花飛應手全開終有疑於冰裂固可以鄙牛斗之氣衝陋蛟螭之精截應用無敵清貞莫儔銷白虹以影碎耀青蛇而色秋黯黯文開獨庭中而電轉熒熒屑落類掌下以星流素彩交光清文耀質既衞身之可保豈化龍而無必色離溫潤光開縝密形錯落以膚寒彩璘玢而皆溢是知器有異而神符物至精而用殊向若鍛非良冶質匪昆吾則安能充遠戎之獻斷抵鵲之徒儻遇英雄必提攜而可以時逢琬玉固翦截之如無嘉乎資礪乃之功剖溫其之潤剸犀莫比其銛鍔斬馬難齊於利刃夫如是知鍛鍊之至精切璠璵而可信彼修竿兮迥立天中有都盧兮身輕若風始發地以直上漸陵煙而轉崇敏捷無儔恣飛翻於白日孤高可尚任迴環於碧空初其委質員來當塲獻藝耀百戲於君所仰千尋於天際干霄迥出將為悅目之娛舉步俄升自有翻雲之勢孤標上聳兆庶同嬉信超騰而自若罔危懼以凝思質勁挺以無倫人皆見也衣簾襜而不定風以動之挺影難儔乘高罔墜臨廣街以堪望騁趫材而自異拂雲端之縹緲似欲升天跨橦末之敧危若有餘地徒觀其遠望翩翩輕如列仙形翻碧落足動晴煙杳杳難分宛在長天之外亭亭迥映全高衆木之顛其態可喜其功不測既穹崇以獨立每緣循而至極將以騁輕趫恣登陟旁臨既分乎遠近上達必資乎孤直仰而望也始似出於煙霄逼而察焉又若生乎翅翼事契鴻漸情非教猱既翻身而自下漸託質以彌高迥匝花場見干夫而共憙間臨紫陌瞰萬井以無逃故得衆目咸窺㣥心是仰若丹梯之巳踐類遷喬之可上每所以恣攀援助觀賞誠哉平子之言先賢之勿罔良器會昌中擢進士第希夷乎人皇居明堂闢陰開陽冠通天兮蔭華蓋發大號兮流耿光將樂瑤池之宴集由喜玉京於壽昌降清問於宣室討真經於柏梁乃因高為臺順時謀築披翳薈翦林麓鏟重岡移峻谷量其遠近以議夫土功命彼般倕再度乎山木使人以悅無告於勞均力取材不遠而復屹九重以初超馮一簣而始覆其為勢也峨峨皚皚粉壁光兮朱門開若方丈與蓬萊其為麗也崢嶸郁煜星柱浮兮雲楣肅狀靈光與景福有時鳴猿告曉貞松歛靄千峯轉日迎秀色於瓊樓萬歲傳聲和幽音於地籟磅礡壓乎人境赩屴聳乎天外王喬飛舄見鳬影之翩翩神女窺牕聽鸞歌之噦噦俯衆山兮如束縈八川兮如帶上方向晦宴息齋心防戒乘金根肆玉夸父秉鉞蚩尤揚斾鐵衣沸渭以焜煌寶馬騰驤而沛艾環鈎陳而列武士震砰訇兮軼埃壒登夫集靈之臺謂天帝而為會奏無聲之樂寂寞而難分展無體之禮質素而無文晬容綽約元化氤氳聖主湛恩散作八方之雨清都喜氣凝為五色之雲彼昇龍鑄鼎之後捧盤承露之君徒髣象於前載孰能成乎此勳然大造之德曰生大君之位曰寶未有離於兆庶而復謂之至道願獻華封之壽上祝唐堯之盛股肱為良元首作聖用壯辟雍之美乃經靈臺之政豈必沐咸池陵倒景脫屣乎㝢縣棲真乎絕嶺屆中天之峻極從化人兮習靜然後居無何之鄉去有為之境者也於是情冥其欲德貴惟恒可大可久不騫不崩動植風靡雍熙日宏宜其四溟式宴而人和年登羽雖白賁然而輕玉雖白堅然而貞未若素絲之為用以轉化而為名匪剛克以居禮實柔立而有成其正也可以如繩之直其順也可以繞指而縈故能紛以隨時浩然養素揮流水則轉增其妍染繪色則不吝其汚動必隨人寸無恒度其來也何所自園客而出茲厥賦也何地由岱畎而貢之俯乎列井將稽㡛氏之練實乎澤器徒為墨子之悲信干旄之望美非庶士之可持不願充嫠婦之緯不願託寒女之絲因弄杼以成績庶補衮而為期代若好五采我則大白以受質代若厭㣥居我則衆縷以為匹非異俗而招累將矯世而摭實夫其公孫命駕長倩趨風贈以生芻之束勗以素絲之緫蓋取諸自微之著積小成功君無謂我微君無謂我細若綦之可織則假手以成勞如裳之可縫則因緣而善繫功無不給物無不濟彼服卉佩蘭衣荷帶蕙念牽絲之無日傷考槃之失計今將侔潔白以修身詠羔羊而取媲儻黃絹之可比希菅蒯而無替圓嶠之人兮迴踴遐壤旁臨窮海嘉氷蠶之底貢彰遠人之無怠原其禀氣斯異含靈有特鱗角是帶育七寸之殊形雪霜載加發五彩之異色資纎縷以成績弄杼攸勤美重錦之可持女工能即施勞且異於三盆為用寧同於五緎致美之厚罔差其妍不入獻之先必資於善良驚楫云邁懿一作承筐是將涉三山之重阻辭萬里之遐荒越溟漲屆帝鄉昇玉殿薦明堂示彼有誠則申屈膝之贄樂我無事願充垂拱之裳蓋威靈之有及故珍物之不藏懿乎生乃因地育乃非時四氣平分屆嚴冬而成止五方異俗在中國之莫為自堯年而效美暨今日而來思足以彰德風之普洽表王道之清夷不然則修路崎嶇洪漣濧濞較道里而累億罹寒暑而數四匪化理而無虞曷員來之可致彼躬桑載育獻繭為均浴濯龍之水漲川館之春而後羅紈是緝筐筥攸陳固在常而可悅殊自遠而為珍是知化之所被物無不臻德之所加人無或阻託茲賦以極思臻皇猷之焯敘士有利於鴻漸者觀乎憲臺降太液邇蓬萊風威四警霜氣旁催地疏曹而獨秀居對禁而分開提綱必理舉職惟才門凌晨而豸出樹夕陽而烏來旌良表正癉惡繩回乍以飛騫凄其嶷矣時為搏擊吁可畏哉嚴城岑寂靈臺蹇嵼直狀臨而逾明偽迹投而遽剗故座有彝法門無濫板理從擾而庭幽事雖繁而人簡及夫貪吏無厭豪宗不戒酷奮黔俗洪威桎械致中典之淪否令下人之凋瘵百城相師而自若五兵乂安而不恠是司也故以矜遠聲哇長喟苦恠切奉絲綸以遐察騰錦車而遙屆則跋扈顏沮強梁志憊望驄馬而跼蹐仰繡衣而下拜是知上能贊聖下足安凡顧眄而朝班巳肅推彈而邦度增嚴庶究厥能請循其始官則秦置臺從漢起或掌方書或稱柱史朱何以忠雅標懿桓陳以剛直著美上封則起於鄭均埋輪則遠聞張紀虞詡之人方側目暴勝之名兼直指皆玉秀珠明鷹瞵鶚視既斡時而助化亦圖國而遠恥莫不才挾主以成功主因才而共理唐纘玉葉藎臣惟哲法省嬴劉臺兼貢薛昂凉階宇奮迅霜雪耿獨坐而情雄邈㣥司而位絕稠人廣衆望影而魂褫暴黨奸雄覩形而膽折豈徒以聳動僚寀逡巡朝列儻吾道之將行庶從茲而振節嵩著有賦三卷見藝文志赫爾陽精當朱仲兮厥狀難明杲杲而威棱四序炎炎而火烈㣥生九野飛塵破氛昏而下燭六龍銜耀亘天地而橫行其初也陰魄落彼大明生矣踆烏洶洶以飛來蒼龍黯黯而光死輾煙霞而炎駕旁轉洞寰海而紅輪徐起煙勃乎扶桑之津鼎沸乎咸池之水八紘疑火井之內六合若炎邱之裏路歧難處傷哉行役之人稼穡堪憂嗟爾耕耘之子始驚出地漸見摩天曈曨逾盛翕赩彌宣赫曦而光碎波濤血殷江海蓬勃而氣蒸林麓燄起山川然則居上克明當中益熾想羲氏於執熱當亢龍之用事照邱陵而恐是焦原蒸壟畝而皆成赤地仰之者目眩精眊處之者神昏體悸草木為之生煙峯巒以之減翠千里無雲炎風不聞木而棲者翕其翼泉而躍者伏其㣥不黨黎甿有異恩覃之士無私蠻貊終同炎德之君可流金而爍石可焦頭而爛額浩浩兮坌紅埃融融兮過虛碧遂使無生禪子愛其孤鶴片雲休影逸人戀此幽松古柏斯則晉卿執法於前代魯史立言於徃昔於戲猛以濟威剛以馭下牧於外而寇亂咸戢升於朝而謟諛斯寡如夏日之赫焉孰云不足畏也或曰貞白先生在梁書高士傳今而為傳何謂曰梁書之傳先生猶史記之述老氏也其敘事頗刪畧俾仙聖行業不得昭著而紛綸其間夫先生識洞古今事炳山世神棲寂泊精騖元樞定三品以黜浮偽分五域以鏡區貫著隱訣以析綱目述真誥以旌降口受激揚隱微之外馳騁清虛之際乃元中之董狐道家之尼父也况發揮墳典游泳百家窮天地星辰之文究陰陽龜筮之術至於鯨死彗出麟鬬月蝕銅山崩而鐘鐸響蠶珥絲而商絃絕龍吟雲起虎嘯風生此性理冥濛僉謂之感先生商宀隹其微非感非應夫然將叔向子產京房郭璞擬先生以為博乎齊永明十年謝詹事瀹自吳興聞先生棄官隱華陽乃於道中作傳傳疎畧不用陶翊乃作本起錄至齊末遂巳亦事多遺闕其後潘泉文復踵其作始天監元年至七年夏四月於時先生改名氏潛訪遐嶽旁無知覺於是泉文又絕筆於此於戲前二傳既太簡門人編錄復無條貫俾君子辟世之道清真養翮之跡其幾乎磨滅歟乃於登真隱訣及真誥泰清經先生文集揣摩事迹作三卷焉還古號谷神子會昌時人謹按博異記晁公武讀書志以為馮廓撰胡應麟二酉綴遺以為詩人鄭還古撰今据舊本博異記原題谷神子還古撰還古所著殷七七傳又與此記相類當即博異記之逸篇故定從應麟說夫習纎譚妖其來久矣非博聞強識何以知之然須抄錄且知雌黃事類語其虛則源流具在定其實則姓氏罔差既悟英彥之討論亦是賓朋之節奏若纂集克備即應對如流余放志西齋從宦北闕因尋徃事輙議編題類成一卷非徒但資笑語抑亦粗顯箴規或冀逆耳之辭稍獲周身之誡祇求同巳何必標名是稱谷神子
