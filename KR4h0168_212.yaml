front:
  text: 全唐文欽定全唐文卷二百十二陳子昂四
  hash: sha256:f0e81edc3abb9cddf75d2802664193848790f9ccb4343f08fe7daf4cc6df860d
body:
  text: 臣今月十九日蒙恩敕召見令臣論當今政要行何道可以適時不須遠引上古具狀進者微臣智識淺短實昧政源然嘗洗心精意靜觀人理竊見國之政要興廢在人能知人機順而施化趨時適變靜而勿動政要之賢可得而行今陛下以應天命而受寶圖建立明堂施布大化勤恤人隱存問高年報功樹德順時興務至公至仁垂訓天人可謂典章大備制度宏遠五帝三王所不及也愚臣何敢有知政要然天恩降問貴採芻蕘謹竭愚直悉心以奏凡用賢之道未廣仰成之化尚勞然則取士之方任賢之事故陛下素所深知應亦倦談亦倦聽不待臣更一二煩説也臣聞言有順君意而害天下者有逆君意而利天下者唯忠臣能逆意惟聖君能從利恩敕不以臣愚微降問當今政要臣伏惟當今之政大體已備矣但刑獄尚急法網未寬恐非當今聖政之要者臣觀聖人用刑貴適時變有用有捨不專任之且聖人初制天下必有凶亂之賊叛逆之臣而為驅除以顯聖德聖人誅凶殄逆濟人寧亂必資刑殺以清天下故所以務用刑也凶亂既滅聖道既昌則必順人施化赦過宥罪所以致措刑也然則聖人用刑本以禁亂亂靜刑息不為升平所設何者太平之人悅樂於德不悅樂於刑以刑窮於人人必慘怛故聖人貴措刑不貴煩刑今神皇應運受圖臨御天下逆臣賊子頓伏嚴誅所以虺貞㣥黨同惡就戮此蓋天意將顯神皇威靈豈此凶徒所能自亂今魁首已滅朋黨已屠聖政惟昌天下咸服神皇又降文昌鴻恩滌蕩㣥罪天下昭慶企望日新措刑崇德正在今日實聖政之至要者也臣伏見近來詔獄推窮稍復滋長追捕支黨頗及遠方天下士庶未敢安止臣伏惟神皇聖意務在措刑安恤天下不務察法以損升平然今刑獄未息者應是獄吏未識天意所以至於此也伏願神皇垂愷悌之德務仁壽之恩敕法慎罰以省刑典臣伏見當今天下士庶思願安寧途謠巷歌皆稱萬歲此其懷樂聖化願保永年欲與子孫同此仁壽今神皇不以此時崇德務仁使刑措不用乃任有司明察專務威刑臣竊恐非神皇措刑之道且臣聞殺一人則千人恐濫一罪則百夫愁人情大端畏懼於此今天下至廣萬國至繁神皇雖妙察獄囚不可門告戶説令一一知者若使有一不知以神皇好任刑法則非太平安人之務當今聖政之要者也此是臣赤心至誠敢言其實冒死犯奏所冀天鑒務求措刑察臣所言非敢苟順臣伏惟刑措之政在能官人官人惟賢政所以理此故神皇深知倦問不假臣一二煩説今臣所更重説者實以天下之政非賢不理天下之業非賢不成固願神皇務在任賢誠得衆賢而任之則天下之務自化理也則賢人既任須信既信須終既終須賞夫任而不信其才無由展信而不終其業無由成終而不賞其功無由別必神皇如此任賢則天下之賢雲集矣何以知其然君子小人各尚其類者也若神皇徒務好賢而不能任能任而不能信能信而不能終能終而不能賞雖有賢人終不可用矣神皇降問小臣當今政理之要者臣竊以此為政要之至極何以言之神皇大業已成天下已平尊名已顯大禮已備所未足者在於忠賢若得忠賢相與而守之太平之功可以於此而就斯實天地神靈贊助神皇而致此時也當此時不成千歲之業立萬代之規小臣誠愚竊為神皇所惜臣伏惟刑措之道政在任賢議者皆云賢不可知人不可識臣獨以為賢固可易知人固可易識但是議者不精思之耳夫尚德行者必無凶險之類務公正者必無邪佞之朋保廉節者必憎貪冒之黨有信義者必疾苟且之徒智者不為愚者謀勇者不為怯者死猶梟鸞不接翼薰蕕不同氣此天地之性物類之情其理自然不可改易何者以德事凶兩不相入以正接佞兩不相利以信質偽兩不相從以廉説貪兩不相和智者尚謀愚者不聽勇者徇死怯者貪生皆事業不同趨向各異賢人之道固可豫知誠能尚賢賢可至矣然則賢人之業須賢人達之賢人之才須賢人用之公正廉節信義勇謀皆待其人然後獲展苟非其類道不虛行凡賢人君子未嘗不思效用但無其類獲進所以沒於時今神皇誠能信任賢良旌納忠正如左右之臣灼然有賢行者賜之尊爵厚祿以榮寵之使其以類相舉責成其政合度者進失度者貶神皇但垂拱明堂保神和志天下之事臣必見日就無為不言而理也今神皇憂恤萬機日不暇給昧旦丕顯中夜以思誠是㣥臣未稱聖任伏願神皇審察賢能垂恩信任夫忠賢事君必諫君失姦佞事主必順主情直道曲事惟聖鑒所察臣伏惟神皇聖明具知得賢須任既任須信既信須終既終須賞悉備知也然今未多信任者應以經信任無效所以致疑如裴炎劉禕之蹇味道周思茂固蒙神皇信任之矣然竟背德辜恩神皇以此有疑於信任賢也以臣愚識則謂不然何者聖必藉賢以明國必待賢以昌人必待賢以理物必待賢以寧若神皇疑於信賢欲以聖謀自斷臣恐勤勞聖躬而天下不可獨理況聖躬不可勞弊神心不可細用此最須任賢者也臣聞鄙人云有人以食噎而得病者欲絶食以去病乃不知食絶而身斃此言近小可以喻遠臣竊謂賢人於國亦猶食之在人固不為一噎而絶餱糧亦不可以謬賢而遠正士此實神皇聖鑒可明知也不待愚臣一二言之伏願任賢無疑求士不倦以此為務天下誠不足理也若外有信賢之名而內實有疑賢之心臣竊謂神皇雖日得百賢終是無益適足以損賢傷政也伏惟熟察可信者信之臣伏惟聖人制天下貴能至公能至公者當務直道臣伏見神皇至公應物直道容賢然朝廷尚未見敢諫之臣骨鯁之士天下直道未得公行臣聞聖人大德在能聽諫古典所説蓋不足陳臣伏見太宗文武聖皇帝德冠三王名高五帝實由能容魏徵愚直獲盡忠誠國史書之明若日月直言之路啓從諫之道開貞觀已來此實為美今神皇坐明堂布大政神功聖業能事備矣夫骨鯁之士能美聖功伏惟神皇廣延直臣旌賞諫士使大聖之德引納日新書之金板萬代有述非神皇卓犖仁聖臣不可獻此言也臣聞勞臣不賞不可勸功死士不賞不可勵勇當今或有勤勞之臣死難之卒策功命賞未蒙優異臣伏惟人臣徇節在爵與名死節勤公名爵不及偷榮尸祿寵秩或加故不可以進賢顯能旌功勵行伏願神皇廣求此色勸勵百寮以及將士此最當今聖政之所宜先也古人云賞一人而千萬人悅者蓋言其功當也夫賞而不知賢者不務也伏願神皇陛下特垂省察臣伏以當今國家事最大者在兵甲歲興賦役不省神皇欲安人思化理不可得何者兵之所聚必有所資千里運糧萬里應敵十萬兵在境則百萬家不得安業以此徭役人何敢安臣伏見國家自有事北狄於今十有餘年兵甲歲興竟不聞其利豈中國無制勝之策朝廷無竒畫之臣哉臣竊謂不然是未計之廟算爾臣伏惟神皇聖武天威若神突厥小醜何足誅滅然今未滅者臣恐庸將無智未審廟算之機故使兵甲日多徭役日廣今國家又命將出師臣願神皇審圖廟算量其損益計其利害若事必不可請兵不虛行兵不虛行賦役自省以此安人得賢可理若失之於此而救之於彼臣恐人日以疲勞不得安息伏願熟察臣言審圖廟算則夷狄不足滅中國可永寧臣伏惟陛下以至仁為政以至公應物天下士庶莫不咸知虺貞等干紀亂常自取屠滅陛下惟罪其搆逆者更無他坐宗室子弟獲以安寧自非陛下恩念慈仁敦睦九族豈得宗室蒙此寧慶實大聖之德崇重宗枝然臣更願陛下務安慰之惠以恩信使其顯然明知陛下慈念之至上感聖德下得自安臣聞人情不能自明則必疑慮疑慮則必不安不安則必危懼危懼積則過生伏願陛下明恩賜垂愷悌之德使天下居無過之地萬姓知陛下必信任賢是天下有慶然賢人之業皆務直道於姦邪不利姦邪不利必有讒譖此賢人之災厄如是也一人之行十人謗之未有不遭禍患者自古忠良賢達罹此患者不可勝言臣子昂言臣本草茅微陋才無可取陛下乃越次假以恩光將同近臣延問政要臣實愚昧何堪此寵頓首死罪然臣之誠直實自愚衷與君子言猶且不妄況蒙天子之問敢不悉螻蟻之誠真實罄盡然臣所奏前件狀者固是陛下所悉見知然臣復重言者貴以微誠披露肝膽不知忌諱實戰實惶梓州射洪縣草莽愚臣陳子昂謹頓首冒死獻書闕下臣聞明主不惡切直之言以納忠烈士不憚死亡之誅以極諫故有非常之策者必待非常之時有非常之時者必待非常之主然後危言正色抗議直辭赴湯鑊而不回至誅夷而無悔豈徒欲詭世誇俗厭生樂死者哉實以為殺身之害小存國之利大故審計定議而甘心焉況乎得非常之時遇非常之主言必獲用死亦何驚千載之迹將不朽於今日矣伏惟大行皇帝遺天下棄㣥臣萬國震驚百姓屠裂陛下以徇齊之聖承宗廟之重天下之望喁喁如也莫不冀蒙聖化以保餘年太平之主將復在於今日矣況皇太后又以文母之賢協軒宮之耀軍國大事遺詔決之唐虞之際於斯盛矣臣伏見詔書梓宮將遷坐京師鑾輿亦欲陪幸計非上策智者失圖廟堂未聞有骨鯁之謀朝廷多見有順從之議愚臣竊惑以為過矣伏自思之生聖日沐皇風摩頂至踵莫非亭育不能歷丹鳳抵濯龍北面玉階東望金屋抗音而正諫者聖王之罪人也所以不顧萬死乞獻一言願蒙聽覽甘就鼎鑊伏惟陛下察之臣聞秦據咸陽之時漢都長安之日山河為固天下服矣然猶北假胡宛之利南資巴蜀之饒自渭入河轉關東之粟踰沙絶漠致山西之寶然後能削平天下彈壓諸侯長轡利策橫制宇宙今則不然燕代迫胸奴之侵巴隴嬰吐蕃之患西蜀疲老千里贏糧北國丁男十五乘塞歲月奔命其弊不堪秦之首尾今為闕矣即所餘者獨三輔之間爾頃遭荒饉人被薦飢自河而西無非赤地循隴以北罕逢青草莫不父兄轉徙妻子流離委家喪業膏原潤莽此朝廷之所備知也賴以宗廟神靈皇天悔禍去歲薄稔前秋稍登使羸餓之餘得保沈命天下幸甚可謂厚矣然而流人未返田野尚蕪白骨縱橫阡陌無主至於蓄積猶可哀傷陛下不料其難貴從先意遂欲長驅大駕按節秦京千乘萬騎何方取給況山陵初制穿復未央土木工匠必資徒役今欲率疲弊之衆興數萬之軍徵發近畿鞭朴羸老鑿山採石驅以就功但恐春作無時秋成絶望凋瘵遺噍再罹飢苦倘不堪弊必有逋逃子來之頌其將何詞以述此亦宗廟之大機不可不深圖也況國無兼歲之儲家鮮匝時之蓄一旬不雨猶可深憂忽加水旱人何以濟陛下不深察始終獨違㣥議臣恐三輔之弊不止如前日矣且天子以四海為家聖人包六合為宇歷觀邃古以至於今何嘗不以三王為仁五帝為聖故雖周公制作夫子著名莫不祖述堯舜憲章文武為百王之鴻烈作千載之雄圖然而舜死陟方葬蒼梧而不返禹會㣥后歿稽山而永終豈其愛蠻夷之鄉而鄙中國哉實將欲示聖人之無外也故能使墳籍以為美談帝王以為高範況我巍巍大聖轢帝登皇日月所臨莫不率俾何獨秦豐之地可置山陵河洛之都不堪園寢陛下豈可不察之愚臣竊為陛下惜也且景山崇麗秀冠㣥峯北對嵩邙西望汝海居祝融之故地連太昊之遺墟帝王圖迹縱橫左右園陵之美復何加焉陛下曾未察之謂其不可愚臣鄙見良足尚矣況瀍澗之中天地交會北有太行之險南有宛葉之饒東壓江淮食湖海之利西馳崤澠據關河之寶以聰明之主養淳粹之人天下和平恭己正南面而巳陛下不思瀍洛之壯觀關隴之荒蕪遂欲棄太山之安履焦原之險忘神器之大寶徇曾閔之小節愚臣暗昧以為甚也陛下何不覽諍臣之策採行路之謠咨謀太后平章宰輔使蒼生之望知有所安天下豈不幸甚昔者平王遷周光武都洛山陵寢廟不在東京宗社墳塋並居西土然而春秋美為始王漢書載為代祖豈其不願孝哉何聖賢褒貶於斯濫矣實以時有不可事有必然蓋欲遺小存大去禍歸福聖人所以為貴也夫小不忍則亂大謀仲尼之至誡願陛下察之若以臣愚不用朝議遂行臣恐關隴之憂無時休息臣又聞太原蓄巨萬之倉洛口積天下之粟國家之寶一作資斯為大矣今欲捨而不顧背以長驅使有識驚嗟天下失望倘鼠竊狗盜萬一不圖西入陜州之郊東犯武牢之鎮盜敖倉一抔之粟陛下何以遏之此天下之至機不可不深懼也雖則盜未旋踵誅刑已及滅其九族焚其妻子泣辜雖恨將何及焉故曰先謀後事者逸先事後圖者失國之利器不可以示人斯言不徒設也願陛下念之臣西蜀野人本在林藪幸屬交泰得遊王國故知不在其位者不謀其政亦欲退身巖谷滅迹朝廷竊感婁敬委輅干非其議圖漢策於萬全取鴻名於千古臣何獨怯而不及之哉所以敢觸龍鱗死而無恨庶萬有一中或垂察焉臣子昂誠惶誠恐頓首頓首死罪死罪將仕郎守麟臺正字臣陳子昂昧死上言竊聞道路云國家欲開蜀山自雅州道入討生羌因以襲擊吐蕃執事者不審圖其利害遂發梁鳳巴蜒兵以徇之臣愚以為西蜀之禍自此結矣臣聞亂生必由怨起雅之邊羌自國初已來未嘗一日為盜今一旦無罪受戮其怨必甚怨甚懼誅必蜂駭西山西山盜起則蜀之邊邑不得不連兵備守兵久不解則蜀之禍搆矣昔後漢末西京喪敗蓋由此諸羌此一事也且臣聞吐蕃桀黠之虜君長相信而多姦謀自敢抗天誅邇來向二十餘載大戰則大勝小戰則小勝未嘗敗一隊亡一矢國家往以薛仁貴郭待封為虓武之將屠十萬衆於大非之川一甲不歸又以李敬元劉審禮為廊廟之宰辱十八萬衆於青海之澤身為囚虜是時精甲勇士勢如雲雷然竟不能擒一戎馘一醜至今而關隴為空今乃欲以李處一為將驅憔悴之兵將襲吐蕃臣竊憂之而為此虜所笑此二事也且夫事有求利而得害者則蜀昔時不通中國秦惠王欲帝天下而并諸侯以為不兼賨不取蜀勢未可舉乃用張儀計飾美女譎金牛因間以啖蜀侯蜀侯果貪其利使五丁力士鑿山通谷棧褒斜置道於秦自是險阻不關山谷不閉張儀躡踵乘便縱兵大破之蜀侯誅賨邑滅至今蜀為中州是貪利而亡此三事也且臣聞吐蕃羯虜愛蜀之珍富欲盜之久有日矣然其勢不能舉者徒以山川阻絶障隘不通此其所以頓餓狼之喙而不得竊食也今國家乃撤邊羌開隘道使其收奔亡之種為嚮導以攻邊是乃借寇兵而為賊除道舉全蜀以遺之此四事也臣竊觀蜀為西南一都會國家之寶庫天下珍貨聚出其中又人富粟多順江而下可以兼濟中國今執事者乃圖僥幸之利悉以委事西羌得西羌地不足以稼穡財不足以富國徒殺無辜之衆以傷陛下之仁糜費隨之無益聖德又況僥幸之利未可圖哉此五事也夫蜀之所寶恃險者也人之所安無役者也今國家乃開其險役其人險開則便寇人役則傷財臣恐未及見羌戎而已有姦盜在其中矣往年益州長史李崇真將圖此姦利傳檄稱吐蕃欲寇松州遂使國家盛軍以待之轉餉以備之未二三年巴蜀二十餘州騷然大弊竟不見吐蕃之面而崇真贓錢已計巨萬矣蜀人殘破幾不堪命此乃近事猶在人口陛下所親知臣愚意者得非有姦臣欲圖此利復以生羌為計者哉此六事也且蜀人尫孱一作劣不習兵戰一虜持矛百人莫敢當又山川阻曠去中夏精兵處遠今國家若擊西羌掩吐蕃遂能破滅其國奴虜其人使其君長係首北闕計亦可矣若不到如此臣方見蜀之邊陲不守而為羌夷所橫暴昔辛有見被髮而祭伊川者以為不出百年此其為戎乎臣恐不及百年而蜀為戎此七事也且國家近者廢安北拔單于棄龜茲放疏勒天下翕然謂之盛德所以者何蓋以陛下務在仁不在廣務在養不在殺將以此息邊鄙休甲兵行乎三皇五帝之事者也今又徇貪夫之議謀動兵戈將誅無罪之戎而遺全蜀之患將何以令天下乎此愚臣所甚不悟者也況當今山東飢關隴弊歷歲枯旱人有流亡誠是聖人寧靜思和天人之時不可動甲兵興大役以自生亂臣又流聞西軍失守北軍不利邊人忙動情有不安今者復驅此兵投之不測臣聞自古國亡家敗未嘗不由黷兵今小人議夷狄之利非帝王之至德也又況弊中夏哉臣聞古人善為天下者計大而不計小務德而不務刑圖其安則思其危謀其利則慮其害然後能享福祿伏願陛下熟計之
