front:
  text: 全唐文欽定全唐文卷七百十八獻貞元和時官衛尉卿
  hash: sha256:49d61d6520715c3236b26d6e1ace18d3195d8ee47dd6cce8832c3605121b8363
  markers:
  - {type: head, offset: 13, content: 金獻貞, id: KR4h0168_NFKB_718-h1, level: 1}
body:
  text: 夫法之體也非名非相則盲聾智者莫能觀其趣心之性也若存若亡則童蒙理者焉可測其源故有學無學才嘗香鉢之飯二乘三乘寧得藥樹之果言禪冉者即末還本之妙門因心階道之元路歸之者銷沙劫之罪念之者獲塵剎之德况乎經年纍代積行成功深之又深其極致歟粵若位登五七聲亘三千紹佛種傳法燈即我神行禪師受其記焉禪師俗姓金氏東京御里人也級干常勤之子先師安宏之兄曾孫積善薰心曩因感性年方壯室趣於非家奉事運精律師五綴一網苦練二年更聞法朗禪師在胡踞山傳智慧燈則詣其所頓受奧旨未經七日試問之曲直微言冥應以即心無心和上歎曰善哉心燈之法盡在於汝矣勤求三歲禪伯登真慟哭粉身戀慕冉極遂以知生風燭解滅水泡遠涉大陽專求佛慧乘危碧浪不動安心之念對險滄州逾策護戒之情誓願堅固承佛神威孤帆直指得到彼岸時屬凶荒盜賊亂邊敕諸州府切令捉搦吏人遇而詰之禪師怡然而對曰貧道生緣海東因求法而至耳吏不得自放撿繫其身草有四旬矣於是同侶俟其無人時說桎梏而息焉僉語之曰汝盍如此耶答言吁我於往昔造罪業故今見罹苦甘心受之竟不脫休斯則忍辱納汙之迹和光匿耀之事也事解遂就于志空和上和上即大照禪師之入室朝夕鑽仰已過三年始開靈府授以元珠不壞微塵便撮大千經卷非舒方寸遍遊百億佛剎常游泳於性海之深源恆翺翔乎真空之幽際洎於和上欲滅度時灌頂授記曰往欽哉汝今歸本曉悟迷津激揚覺海闕已歸寂應時豁爾得未曾有挑慧燈於虛室凝定水於禪河故遠近見聞尊重瞻仰不可殫載矣然後還到雞林倡導㣥蒙為道根者誨以看心一言為熟器者示以方便多門通一代之祕典傳三昧之明燈實可謂佛日再杲自暘谷法雲更起率扶桑設欲括三達罩十方書其迹寫其功庸詎能記一分之德耳所冀道身地久慧命天長於戲能感已盡所應方移此則導師隱顯理必然故生平七十有六大歷十四年十月草一日終於南嶽斷俗之寺是日也圓穹黯黲三光為之晦冥方祇振動萬物因茲零落甘泉忽竭魚龍驚躍其中直木先摧猿鳥悲鳴其下於時素緇飲化遐邇同聲或聞異香飛錫空而電奔或觀瑞雲乘杯流而雨驟泣血焚身盡心葬骨殆三紀矣其處則懸崖萬丈流水千尋逃名洗耳之隱居拋世遁迹之幽棲定沼泓澄深藏慧日之光空林蕭索長引禪風之響北倚獨立之高岡西鄰三藏之逈谷挂煙月於山頭捐金玉於淵底豈惟地理之崔崒復乃靈神之洞窟也記云雞足石室摩訶迦葉守法衣待慈氏豈非是歟世世稱巖今見在茲成蹤自爾其狀如門門闢之期未知幾許如是聖跡其數孔多難可詳悉耳今我三輪禪師者宿殖衆妙本有三身心無自性悟不由他同修道業互作師資於時安禪餘暇熟慮寰中謂言無形之理不建像而莫覩離言之法非著文以靡傳悲夫慈父懷玉而歸窮子得寶幾日是以招名匠畫神影造浮圖存舍利燒戒香灑定水致懇惻於先聖將龜鏡於季葉焉有若大隱明朝之賢棲心道境之士策念韋提之貴亞迹圓寂之徒相顧誓言我等數人共承沙佛齊念塵僧由是稟紫氣於桂菀挺玉葉於金枝分鸞鑣驅鳳駕休沐清河之上泛舟楫於巨川蹈舞黃屋之下作棟梁乎大厦世上可觀於斯為盛盛必有衰古人所傳哀哉人世生也獨自以來死亦共誰而去欻爾未知過隟俯仰無有是非若欲出火宅而登露地截三有以歸一如者教網多端不如三覺助道非一隨喜為最故命忠直之吏勸潔淨之僧將茲有限之財造彼無窮之福於是取石名山伐木幽谷刊翠炎搆紺宇庶幾標萬古之景跡歷千秋而不雕所謂人能宏道豈虛言哉善逝遺法付囑國家良有以也僕以狂簡無材忸怩有愧欲贊元化輒録短懷未淨一心之地詎升三學之堂冀將螢火之爝竊助明景之暉前識早計焉可以攦指求月剖卵責晨也哉惟願天池有涸願海無涯水旱燋浸碑銘固存然後汒汒有識蠢蠢含靈灌法水於神器長道牙於心田永出愛欲之泥齊登涅盤之岸云爾其詞曰深哉覺海量等虛空無名無相寂寂融融就中最勝三學為宗心心傳祖言語難通初因佛起來詣溟東誰能神解則我禪公辭親捨室超出樊籠入山求道踰海尋蹤韜光被苦策念成功師資每遇目擊相逢凝神壁觀獨步唐中還歸日域引導㣥蒙逗機應物授藥無窮茲緣已畢化彼天宮遺形空谷脫影雲峯同聲輻凑劈踊摧胸慈光已滅追戀何終有一真僧親承法要神會一如心藏衆妙非言非默即寂即照出定暫憶偏哀淺識彩畫神影容儀不忒更造浮圖再修功德萬古千年傳燈軌則金城鼎族紫府親皇一心若海百谷為王前修激發結願平章齊沾法雨同遇佛光清河舟楫黃屋棟梁寰中所望以此為昌儻來若夢榮落無常涅槃迢遰何不貯糧勸僧潔行選士忠良刻銘雕石卜地成堂山崩海竭此欲無央日居月諸茲文久彰上從有闕二字至金剛四生蠢蠢三界汒汒飧禪悅食飲解脫漿咸臻覺道速詣真場武陵信州人元和初進士官太學博士出為韶州刺史以贓貶播州司戶參軍朝廷命將自數十百年未有此重然始命之重而終責之固重矣今丞相主也刑部以宣慰為名乘生殺之機制善敗之略獨在閣下閣下可使諸侯盡附餘寇必誅以快天子之心哉若曰我獨主降者與其縣邑耳則是一王官之事又非相國與朝之大賢所宜降也若曰吾將以法令齊之則是韓宏之法令嚴肅已過不可加也若曰吾以闕庭之威劫之俾諸將懼而前鬬則在下數行之語决行之耳又不必躡踵而推捽項而驅也若曰吾親視其師有不用命者則奪其符而易置幕府則宜有素定不可臨事而待聞也若曰吾將將彼三將督進六萬以誅寇則其軍各從其帥帥之命也吾未嘗撫循其人又將何以結其心而求其死哉獨曰賊重吾德義必來降此蓋萬一也脫不如旨其將何圖嗚呼國之理亂在此行矣得其畫則兩河不足平河湟不足復失其策則天下之事自此繁矣豈不惜哉丞相尊重素狎武陵之言輕而不能盡行時益恐不盡願梗概其旨於閣下夫兵機若神應事立斷千里之外必待奏聞而後行事亦變矣誠願丞相宜密請敕旨事無巨細行而後聞又宜奏取中人嘗所不快者為監軍以一之即歸素所快者於內為吾地則用陰符五賊之術以傾諸侯即復出絹八九十萬以賞結士大夫誠然矣則孰不為丞相之人既獲腰領則以朝命命三將為三陳既定則明斥候擊牛高會潛授緣邊諸將以實期又公以三期紿賊令辨士持一函書賜元濟及其將士以全活彼必降矣適不如料則一日快進必次於城下此大略也夫臨機制變又何可數昔司馬宣王征孟達則八道急攻征公孫文懿則捨其鋭而趨其虛緩以撓各從其利也夫禽之制在氣顧吾之法令何如耳昔蕭王以千人劉牢之以八百人高隆以三千五百人謝元以五千人劉裕以二千五百人是皆立鴻勳成大業矣夫就世務者在結人心結人心者在吾所以張其形勢也方聞紀綱之僕者三百人軍令苟行亦足以塞諸侯之望奪㣥寇之心歸六萬人之志矣使賊不為則已為則必决死於一戰以延其命願閣下無事迫速慎出令拔奇士而已昔先主所以分蜀而帝者獨以長短之權傾曹公耳誠使諸侯以嚴暴吾以厚收之諸侯以殺戮吾以禮義懷之彼有所短吾見其長彼有所乏吾施其餘則事何不濟功何不成書不可盡尋當面策月日謹白書相公閣下昔者獲侍坐於東掖竊聞餘論吾之行已略無遺事獨未能舉賢士大夫於朝為恨耳武陵誠愚不覺竊抃以為明哲之達必將與人同然猶恨爾時相公未得行其志今者鎔鑄生人鼓簧㣥物九牧之士傾耳而聽拭目而視以為舉善黜惡大堯之功相公亦塞其望乎昔者管夷吾致隰朋寧戚東郭牙賓胥無王子成於桓公分職其務且曰欲理國者則五子存焉如將霸王則夷吾在焉蓋不欲專其能也先相國居位旬朔而所舉者亦數十百人今不知相公所舉阿誰所黜阿誰自秋徂春非特旬朔豈天地無其人邪將相公有所待邪或則曰明主春秋鼎盛方有所好升平之畫未可為也此又常人之論無足徵者夫人君病無所好苟有所好何為不可假若主好畋獵則正人其無畋獵者乎主好晏遊正人其無蹙踘拔河者乎因好而致事將潛化或以歌謠進或以烹飪來相公詎謂不然乎今兩河餘寇條貫未得北虜踞慢西戎猖獗三關可收五城可理河壖可田運漕可罷相公豈獨遺此而優遊廊廟更以歲月取賢相之位然後旄鉞而出鎮乎生人可憐勳業可惜伏惟相公越㣥士之胸臆姑為躊躇天下幸甚始從北來得邊隅之事謹條別狀輕瀆嚴重武陵再拜夫勢有不必得事有不必疑徒取暴逆之名而殄物敗俗不可謂智一日破亡平生親愛連頭就戮不可謂仁支屬繁衍因緣磨滅先魂傷餒不可謂孝數百里之內拘若檻穽常疑死於左右手低回姑息不可謂明且三皇以來數千萬載何有悖理亂常而能自畢者哉貞元時德宗以函容御天下河北諸鎮專地不臣朝廷資以爵號桀黠者自謂得計以反為利於是楊惠琳劉闢李錡盧從史等又亂皇帝即位赫然命偏師討之盡伏其辜所謂時也日者張太尉厭垣捍之勤謝易定為國老田尚書知慮絶俗又以魏博來歸幽檀滄景皆為信臣然而與足下者獨齊趙耳夫齊安可為恃哉徐壓其首梁薄其翼魏斫其脛滑針其腹淮南承其衝分兵不足相救全舉則曹魯東平非其有也彼何苦而自棄哉若趙則固子耳前王主上以澤潞為之導既斥從史姑赦罪復爵祿之天下之人欲討者十八無何殘丞相御史朝廷以足下故未加斧鉞也然則中山薄藳城之險太原乘井陘之隘燕狥樂壽邢扼臨城清河絶其南弓高斷其北孤雛腐鼠求責不暇又曷以救人哉二鎮不敢動亦明矣足下何待而窮處耶昔僕之師裴道明嘗言唐家二百載有中興主當其時佷傲者盡滅河湟之地復矣今天子英武任賢同符太宗仁厚物有元宗之度罰無貸罪賞無遺功諸侯豢齊趙以稔其釁㣥帥築室厲兵進窺房蔡屯田繼漕前鋒扼喉後陳撫背左排右掖其幾何而不踣邪足下勿謂部曲勿我欺人心與足下一也足下反天子人亦欲反足下易地而論則嬰凶橫之命不若奉大君官守矣枕戈持矛死不得地不若坐兼爵命而保允嗣也足下苟能挺知巳之烈莫若發一介籍士馬土疆歸之有司上以覆載之仁必保納足下滌垢洗瑕以倡四海將校官屬不失寵且貴何哉為國者不以纎惡蓋大善也且二而伐服而捨寵辱可厚骨肉可保何獨不為哉三州至狹也萬國至廣也力不相侔判然可知假使官軍百敗而行陳未嘗乏足下一敗則成禽矣夫一壯士不能當十夫者以其左右前後咸敵也矧以一卒欲當百人哉昏迷不返諸侯之師集城下環壘刳塹灌以流潦主將怨攜士卒崩離田儋呂興發於肘腋尸不得裹宗不得祀臣僕以為誡子孫所不祖生為暗愎之人沒為憂幽之鬼何其痛哉古稱一世三十年子厚之斥十二年殆半世矣霆砰電射天怒也不能終朝聖人在上安有畢世而怒人臣邪且程劉二韓皆已拔拭或處大州劇職獨子厚與猿鳥為伍誠恐霧露所嬰則柳氏無後矣今緣邊膏壤鞠為榛父母妻子不相活前在朔方度支米價四十而無踰月積皆先取商人而後求牒還都受錢脫有寇薄城不三旬便當餓死何所取財而云和糴哉天下不治病權不歸有司也鹽鐵度支一戶部郎事今三分其務吏萬員財賦日蹙西北邊院官皆御史員外郎為之始命若責可信今又加使權其務是御史員外久於事返不可信也今更旬月又將以郎中之為不可信即更時歲明公之為亦又不可信上下相阻一國交疑誰為可信者况一使之建胥役走卒殆百輩督責騰呼數千里為不寧誠欲邊隅完實獨募浮民徙罪人發沃土何必加使而增吏也入則維化出則寧物物寧而後志適乃有西坰之賞始一日命騎西出出門里餘得小山山下得伏流顧曰石秀水清葱葱乎其韜怪物耶乃釋騎蹈履北上四十步得石門左右劍立矍然若神物特之自石門西行二十步得北峒坦平如室室內清縹若繪積乳旁溜凝如壯士上負橫石奮怒若活乘高西上有石窗凌窗下望千山如指自石室東回三步得石巖巖下有水泓然疑虬螭之所宅水色墨淥其濬三丈載舟千石舟上坐數十人羅絲竹歌舞飄然若乘仙巖之南壁有石磴可列樂工十六人其東若畎澮石流去不知所止北壁半穴如懸門枚育外容小舟出門有潭袤三十步潭有芰荷潭北十步得溪溪橫五里徑二百步可以走方舟可以泛畫鷁渺然有江海趣魚龍瀺灂鷗鷺如養溪潭之間有地丈餘其色正赤歷石門東南越小嶺石林危嶠夾聳左右自嶺下十步得東巖自巖口直下二十步有水濶三尺許淺沙若畫細草如織南望有結乳如薰籠其白擁雪自巖西南上陟飛梯四十級有碧石盆二乳竇滴下可以酌飲又梯九級得白石盆盆色如玉盆間有水無源香甘自然可以飲數十人不竭還自石盆東北上又陟飛梯十二級得石堂足坐三十人乳穗駢垂擊之鏗然金玉聲堂間有石方如棊局即界之以奕翛然不知柯之爛矣自堂北出四步直西二筵南入小峽過峽得內峒東有石室妙如刻畫頂上方井弱翠輕淥便如藻繡自峒南下仰矚東崖有凝乳如樓如閣如人形如獸狀暗然不知造物者之所變化也自樓閣斗下七步次石渠渠深七十尺渠上為梁曲折繚繞三百步遠日月所不能燭矣左右列炬而後敢進自渠直南抵絶壁斗下為飛梯飛梯九盤而後及水水北涯有石閣峭甚資以欄檻適可宴息水通魚船東出朝陽西隅黝墨方谷如鑿以石下投波聲響應山寒氣薄人往往畏恐自石閣還上絶壁西去十步又得小峒俯行三十步左右壁有鍾乳或垂或滴其極有石室正如禪庵多白蝙蝠出小峒北上二十步又得列石色猶西峒東西壁下有石數十枚其面砥平間有凹鐏琴薦厥狀甚怪游人列坐肅若冰霰其東有便房桁櫨栱梲枝撐環合猶國工之椎琢也峒北七步臨西石門石門西去三十九步得西峒峒深九十尺北崖有道可容一軌崖南有水水容若鏡纎鱗微甲悉可數識東過小石門門東俯行三十步詰屈幽邃道絶窮崖崖之右明爽閡渾成水閣崖下閣勝九人閣下水濶三十尺伏流崖南亦達朝陽自西峒口南去一矢得南峒峒西壁可宴數十人其東有水輕風徐來微波蕩漾琴高遇之當不返矣北上山頂盤曲五百步石狀如牛如馬如熊如羆劍者鼓者笙竽者塤箎者不可名狀石路四周而松蘿萃於西北公曰茲山之始與天地並而無能知者揭于人寰淪夫翳薈又將與天地終豈不以其內妍而外朴耶君子所以進夫心達也吾又捨去是竟不得知於人矣乃伐棘導泉目山曰隱山泉曰蒙泉溪曰蒙溪潭曰金龜峒曰北牖曰朝陽曰南華曰夕陽曰雲戶曰白蝙蝠嘉蓮生曰嘉蓮白雀來曰白雀石渠寒深若蟠蛟蜃特曰蛟渠或取其方或因其瑞幾焯乎一圖諜也於是節稍稟儲羡積度材育功為亭於山頂不采不雘倏然而成馮軒四望目極千里高禽鷙獸蚊翔蟻走恍然令人心欲狂又作亭於比牖之北夾溪潭之間軒然鵬飛矯若虹據左右翼為為廊為歌臺為舞榭環植竹樹敻脫囂滓邦人士女咸取宴適或景晴氣和蕭然獨往聽詞於其下嗟乎我俗既同我風既調茲亭茲山又與人物共之則不知古之甘棠其類是耶其差是耶他日會新亭之下辱命紀事奉筆遽題於北榮曰成紀公字濬之不名重也內則為伊周外則為方召疏山發隱也決泉啓蒙也作亭子來也三者其異乎四賢之志乎不異也故書寶歷元年八月三日記㣥山發海嶠頓伏騰走數千里而北又發衡巫千餘里而南咸會於陽朔朔經四百里孤崖絶巘森聳駢植類三峰九疑析成天柱者凡數百里如樓通天如闕凌霄如修竿如高旗如人而怒如馬而歡如陳將合如戰將散難乎其狀也而又灕江荔水羅織其下蛇龜猿鶴焯耀萬怪縣界山間其土壤方百里其勢險其形蹙千人守之十萬不能攻東制雍容交廣之衝南挹賓巒巖象之隘一日有盜則吾扼其吭而制其變皆由善命理者常選於地縣治西七步有石渠其浚十仞渠之下有洞洞有水水深百尺上有亭可以宴樂遊處肆在亭西廩在肆西士宦胥吏黎民商賈夾川而宅基置山足山多大木可以堂可以室其花四時紅紫望之森然猶珊瑚瓊玖豫又不知夫崑崙崆峒其名安取而勝茲籍戶五千其稅緍錢千萬於桂為大俗獷人狡尤難於正寶歷元年正大夫有事罷渤海李湜以能賢補其闕浹時而俗咸變斯又以見吾宰之官人也明年春豫使番禺湜因謁於亭豫視其吏肅然視其亭修然無喧譁之異惟城無隍豫勉之鑿曰諾惟門無臺豫勉之修曰諾惟廨宇之傾圯豫勉之葺曰諾其應響然如轉圜是其材不啻為是縣邑矣思薦天下士以補其大小之任可為滕薛舍是何稱遂書其垣曰陽朔攝令廳壁記以旌湜勤縣在吳為始安在隋而易之更二百年以前名氏豫不得聞彼奇偉倜儻之難有若人也如此故記後之從政者可不倣哉蠡字越卿元和五年進士文宗朝拜禮部侍郎轉戶部出為華州刺史鎮國軍等使歷平盧軍節度使終尚書左丞臣伏以國忌行香事不師古聖心求治動法典章臣頃於延英奏陳願有釐革陛下令史官尋討起置無文昨日閣中再求顧問雖因循未變亦無損于盛朝而除去不經冀流芳於異日臣聞賞罰不立無以示天下是非一貫莫能建大中竊見義成軍節度使李聽昨者資其承藉委以統戎俾代憲誠付之雄鎮揔二萬虎貔之旅位極寵榮兼兩藩節制之權心無報效况陛下授以神算假以天威入魏之期剋日先定而聽擁旄觀望按甲遷延熒惑人心逗撓軍政遂使憲誠陷於屠戮亂衆肆其奸凶失六郡於垂成固危巢於已覆委貝州而不守燒劫無遺望淺口而疾驅狼狽就道自圖苟免不吝包羞蔑棄朝章有同兒戲魏州之亂職聽之由論其負恩萬死猶幸伏以封常清河南失律斬於關門高霞寓唐鄧破傷投諸遐裔渾縞節制易定將戰而兵力不支袁滋逗留西川欲進而凶渠尚在或親當矢石或躬歷艱危勢屈賊鋒竟申朝典未曾貸法必震皇威今李聽罪狀夙聞中外憤惋比之常清等輩萬萬過之若陛下猶示含宏不置極法臣等恐憲章墜地天下寒心伏請付法長安里中多空舍有婦人傭以居者始來主人問其姓則曰生三歲長於人及長聞父母逢歲饑不能育棄之塗故姓不自知視其貌常人也視其服又常人也歸主人居傭無有闕亦常傭居之婦人也旦暮多閉關雖居如無人居且久又無有稱宗族故舊來訊問者故未自道終莫有知其實者焉凡為左右前後鄰者皆疑其為他且窺見其飲食動息又與里中無有異唯是織絍緘繲婦人當工者皆不為罕有得與言語者其色莊其氣顓莊顓之聲四馳雖里中男子狂而少壯者無敢侮居一歲懼人之大我異也遂歸於同里人其夫問所自其云如對主人之詞觀其付夫之意似沒身不敢二者其夫自謂得妻也所付亦如婦人付之之意既生一子謂婦人所付愈固而不萌異慮是後則忽有所如往宵漏半而去未辨色來歸於再於三其夫疑有以動其心者怒願去之以有其子子又乳也尚依違焉婦人前志不衰他夜既歸色甚喜若有得者及詰之乃舉先置人首於囊者撤其囊面如生其夫大恐恚且走婦人即卑下辭氣和貌怡色言且前曰我生於蜀長於蜀父為蜀小吏有罪非死罪也法當笞遇在位而酷者陰以非法繩之卒棄市當幼力不任其心未果殺今長矣果殺之力符其心者也願無駭又執其子曰爾漸長人心漸賤爾曰其母殺人其子必無狀既生之使其賤之非勇也不如殺而絶遂殺其子而謝其夫曰勉仁與義也無先已而後人也異時子遇難必有以報者辭已與其夫決既出戶望其疾如翼而飛云按蜀婦人求復父仇有年矣卒如心又殺其子捐其夫子不得為恩夫不得為纍推之於孝斯孝已推之於義斯義已孝且義已孝婦人也自國初到於今僅二百年忠義孝烈婦人女子其事能使千萬歲無以過孝有高愍女庚義婦揚烈婦今蜀婦人宜與三婦人齒前以隴西李端言始異之作傳傳備博陵崔蠡又作文目其題曰義激將與端言共激諸義而感激者蜀婦人在長安凡三年來於貞元二十年嫁於二十一年去於元和初慶復蘇州刺史應物子十月成樓記時也自聖人觀象立制則重門擊柝以待暴客故天下都邑大崇建之凡千乘之君其外者郛其內者城郛之門所以苞納州聚城之門所以嚴護師長故諸侯國多以內城門於中軍為最近率皆樓於斯飾於斯建鼓角於斯先是此府無內城無重門廳事之階才隱內屏旌門之次迫於通道大將軍鼓角置於郛宴然而安積有歲矣今我江夏公七月下車首乎謀八月慮事鳩乎材九月恩洽得乎衆十月勞農興乎役然後下令葺簣相土命毀削舊宇坦平新途回環翼張絢潔冰靜既而版幹具畚築興山虞納材梓人準繩雕琢切磨丁丁登登重楹疊戶霞起雲蒸如翬斯升勢將騫騰如山斯層崔嵬凌兢君子曰大哉斯樓之作上可以陳列鼙鼓下可以禁限中外近可以張皇斯衆遠可以戒勵大軍稽晷度不失於方中審山川乃得其面勢衆心多樂成之助工徒有悅使之勸非大君子淵慮宏謀則茲樓何從而興也或者以為前之闕政公能補之愚則不然夫舉一事建一功不量其小大苟能逈拔人表獨得殊見則無非天假之才得之縱有賢方伯比肩於前欲責其人表之見無乃過歟然則斯樓曠之於前宜也成之於今亦宜也奚所謂稱補其闕哉樓成二日我公與護軍中貴人洎賓僚偕登而閲之慶復仰而歎曰公之政教見於斯樓盡矣且棟之梁之小大攸宜材不遺也壁壘完堅圬塗縝密人不偷也繩墨修整苦窳不用法至行也丹雘鋪彩光輝燭人照至明也舉是署以福我境內之人德澤甚厚豈土木云乎哉元和二年十二月十七日記
