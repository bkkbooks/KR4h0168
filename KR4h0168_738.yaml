front:
  text: 全唐文欽定全唐文卷七百三十八沈亞之五
  hash: sha256:c566d9c4cf8e34c02650ce416efe35c794d9c016476dafdcd8043692b64942a6
body:
  text: 府君諱某其先關西鄭人也大父汾陽王始以戎勳著績為朔方軍副使天寶末元宗南巡巴蜀肅宗勞兵於靈武乃率其義虜順夷合兵逐叛得為朔方軍節度既而二駕還都拜為中書令統兵於外代宗初犬戎飲馬昆明至於御溝天子在陜又以擊逐之功益拜尚書令封汾陽王尊稱尚父乃詔子曖尚昇平公主都尉主客皆賢故長安中名人文士自李端司空曙之徒咸遊其門賦詩席酒更日而主生子男三人女二人長今為皇太后府君即其少子初憲宗居邸時親臨主家納迎如禮及今上即位皇太后昆弟皆寵錫尊官而府君最少益蒙隆念自邠州刺史入為殿中監尚西河公主歲餘改宮苑閑广既使府君寬柔和易不守剛決長慶二年七月五日暴疾卒於主家享年三十七太后聞之驚悼悲哀使者自中宮出按問發疾之狀月餘乃解以其年十二月十九日葬於京兆某原之上初西河主前降吳興沈氏生子男一人及郭氏之喪無後而以沈氏之嗣為之主辦卜葬有期主喪者使其家吏牽馬操幣至於櫟陽即尉家曰尉之文記事有聞矣願得為之銘以誌其壙於是與序勳典之事表於墟中銘曰河族崑崙命源惟長跋於神華其來泱泱影響邁會披華吐章靈烟氣交鼓而興祥陶以精神涵為濃光保我國步乃生汾陽在戶作扃橫天為梁息災破難以藥痍瘡帝子入室固如維綱孫為國母沙麓以昌少為姻臣謙寬汪汪祿而不壽哀彼中霜惟其流慶與唐無疆府君諱彙太尉武穆公光弼之少子也為人儉毅意氣祖楷洛自匈奴提其屬來入始為唐臣累遷至將軍贈司徒武穆既壯當天寶末以平燕寇有功故公於提襁之間得賜校書郎武穆薨公少無所倚薛兼訓憐之奏試殿中丞後從朔方軍事汾陽王於邠又從東平軍事李正已於淄青正已悖公說之以善語雖不從然得重賜與馳歸即從宣武軍司徒勉公使於京而賊希烈攻勉城拔公不得赴乃從淮汝軍事哥舒曜於東都興元中行營為先軍得試將作少監兼侍御史後從義成軍再事賈耽於滑得兼御史中丞貞元九年入為左神策左將加都將元和初加御史大夫二年出鎮同官四年加右散騎常侍遷宿州刺史七年改安州刺史九年入為右羽林將軍十年春加左散騎常侍拜節帥涇原既至聞士卒前以食不賑而鬻子者皆與贖歸之夏六月公疾發視政不能勤七月十二日薨行年五十九贈工部尚書發御府粟帛命官即其家弔勞生子男三人女七人長女適焦氏娶竇氏夫人生嗣子罕夫人卒娶潭氏潭氏亦早卒公將葬使卜兆兆言合葬不宜罕從卜竟祔先將軍太尉之墓於華原某原乃用亞之為誌以銘其所詞曰惟漢都尉肇自其源居彼北方繼世不還乃公之祖始為唐臣武穆嗣毅即我家勳帝念不忘公亦為藩乃葬王畿北指華原嗚呼哀哉惟功與魂千古不泯長慶元年故太平令李寰之喪其妻沈氏挈其稚嗣哭丐於姻黨之門以事其殯事將具命其族亞之為銘以誌其壙府君唐之裔也其先奉高祖入關定隋封定州刺史曾祖承昕為鴻臚丞丞生少連為殷水令令生牟為梁縣尉尉生府君世以宗蔭調官卒無達顯貞元中沈氏始以外戚隆貴而冑得為列卿掌太府乃以子女歸之府君府君貧負其屈而家仰給為生元和中調為太平令卒於官舍親黨語為善人多痛之銘曰廓乎圓穹覆乎萬古之中賢者或塞而大弓者或隆唯達識不窮善人有終哀哉夫人姓王祖曰楚天寶中為吳王府司馬父曰新貞元中為杭州文學卒母河南姚氏永貞初歸夫人於京兆韋氏夫人之歸年始十四已能成婦道年十八暴疾亡亞之姊乃夫人諸父之兄嫂也或謂姻家之喪必有賻亞之貧無貨請以文易之故韋氏妻之喪沈氏得為銘誌夫人之邦曰瑯琊夫人質多於容行多于和豈天不命於壽不多耶實既命短可奈何已矣蓮湖之西靈山東趾南極於江近十五里元和三年四月庚子而瑯琊氏之骨歸於是漢孝武時匈奴累犯塞夫人之先為都尉出居延力戰且陷遂與其部居胡中為貴落其後入唐為功臣世世以武績顯至大父臨淮王光弼父尚書彙皆為帥長及父歿門下客沈亞之請其屬以夫人歸於從祖之子曰稱師從祖諱房當代宗時取良家配帝其姑以妃受選入官生雍王沈氏之先繼列組冕顯於籍牒者皆由文學及德宗即位追尊皇太后太后昆弟父祖既追封矣其子姪皆蒙寵蔭遂以房為將軍執金吾冕為卿掌太府羽為駙馬都尉尚長林主夫人既嫁三年而卒生子男未能視在元和十四年正月六日具葬城南次於沈氏之隴作銘其詞曰冗葉雖榮逮霜霰兮勞飇罹災延而眉兮韶妖之葩笄刻晷兮觸烟寤露條委衰兮元金蒼礫安靜鎔兮紅瓊海碧包脆危兮嗚呼夫人曷而得支姑啼夫哀叢咽吚兮姊弟酸屑垂涎洟兮悽風送魄罇生漪兮黃壙圓隆緘若帷兮明能之魄來而安兮無越違兮盧金蘭字昭華本亦良家子家長安中無昆弟有姊四人其母以昭華父歿而生私憐之獨得縱所欲欲學伎即令從師舍歲餘為綠腰玉樹之舞故衣製大袂長裾作新眉愁嚬頂鬢為娥叢小鬟自是而歸諸姊不為列矣因恚泣謂其母曰今不等我不若從所當耳年自十五歸於沈居二年從沈東南浮水行吳越之間從七年乃還都又二年沈復東南而昭華畱止京師不得隨病且逝從沈凡十一年年二十六生男一人女一人葬於城南尹村原之下作銘其詞曰野遼㓨兮眾草羅生颼欝蓊兮孰先殞零綺顏奄忽兮辭金楹去何止兮歸無程芳霍紅荃兮昔所遲今銷亡兮不可再馨魂魄歸來兮復此園塋釋家之法以弟子嗣師由子其事死送葬禮如父母由是籍書贊記之常名而不姓今通氏言釋者必祖自佛派分諸系於七祖各承其師之傳以為重望而律師光範者始為童子時事師曰靈佑且滿歲師與其曹為狀喻之語而律師侍側輒達其至既學五年而通經紀年及冠遂去髮被褐言語應引則老緇不能對矣大歷中詔度始成僧儀初居吳之嘉興空王寺其後緇衣男女相與誦其能於是俱使授學更居靈光寺遂與其徒講贊微言百流會歸之說自吳南北郡邑緇衣咸果受人人自得若濡露然又著會釋章句十五卷貞元十六年十月某日滅于其寺之居僧年四十五壽年七十四遺言令其子弟曰當殯我寺之居西園中其後四年門弟子相與成塔於其所元和中余遊吳弟子明辨來求銘焉律師字楷其家本吳人其鄉里在吳之崑山縣曾祖師利開府儀同三司食邑三百戶祖元亮於潛令父君卿彭澤丞母河東裴氏其子與明辨之列凡六人皆童子受學是哀氏之儀由子也作銘其詞曰唯寂之門嗚呼已矣匪媾匪育孰後爾已能傳其心即繼乃嗣以圖我銘以紀萬祀唐故銀青光祿大夫檢校戶部尚書左金吾大將軍兼御史大夫上柱國河南縣開國公食邑二千戶賜紫金魚袋贈太子少保柳公行狀狀公諱晟其先河東人肅宗時詔取儒賢配主其父以門葉中選拜太僕卿尚和政公主主及太僕繼喪而公年始十二孝聞宮姻既去喪代宗憐之召養宮中令與皇子諸王俱受學故公得通籍中禁詔以吳大瓘為之師又以大瓘子通元通微為助教令十日考學績勸所進乾元初除尚舍奉御得歸故邸又詔吳大瓘通微通元令就舍授學廣德中加檢校太常卿賜佩金魚及德宗即位以公故奉銅輦將欲加賜遷官未幾而屬車駕西狩矣公徒走會難奉天因泣奏曰臣願得尺詔持而東入都購其豪人以為効德宗奇其忠賜詔如奏公於是傭裝入賊軍中見賊偽右將軍郭常左將軍張光晟公說曰陰潦之災魚鼈游其墀壇即揚光赫明是輩不知枯挂之地者公等寧能從其挂哉乃出詔示常等皆捧詔伏與誓約所歸未及期會樞籍宦臣朱既昌陰以公之狀飛告泚遂為泚捕繫定死矣泚詰二將詞不伏即徙於外獄稍寬之有頃賊兵累敗守吏益怠公因其共繫者十餘人謀相與脫其錮矒而走之奉天德宗為之撫背流涕明日宸輿幸漢中公奉轡至南梁還拜原王府長史貞元六年改嘉王府長史歲餘翰林舍人吳通元謫死公為疏陳雪再進不得命公之季止公曰上方怒寧可為也公不聽公章卒三貢於是德宗寤之謂公見義不回賜書寵勞竟雪通元改澧州別駕十一年入為少將作永貞初遷大將作加朝請大夫起崇陵功以檢校左常侍居使內作封河東縣開國子食邑五百戶又加銀青光祿大夫起澧陵功賜上柱國元和初西蜀叛發岐隴邠涇朔方太原及山東六郡之卒皆屬長武軍詔以高崇文討之既誅三蜀大困而漢中最險狹益不能賑輸所奉中朝以器用當濟遂拜工部尚書兼御史大夫持節帥漢中始詔諸征蜀卒各還故部而獨以漢中卒三千人移戍梓州其卒以為始去父母鄉里既勞而歸及境乃不得見其閭亦以功自賴今則徙之謂若謫耳皆鋒奮食所引刃援弓迫中貴人時公行未及郡聞之遂疾驅倍走往其所先勞其苦心勞已乃問曰君等何以而成功乎俱曰某等伐闢耳又問闢何以而得伐俱曰驕不受指於天子公曰君等既知闢以不受指而得伐又親滅之而得功反不受指耶今即不受指即受滅矣于是卒皆免冑匍匐遂從所徙歲餘入為大將作使匈奴先是戎相出視國使必自據偃以相辱傲公知之乃先謂曰聞若等皆以去信為強亡禮自大禮信不為誠不仁也何足奉吾國乎于是單于諸王貴人聞之愕然失恃皆莫能詞見則改容跪伏遂致天子之命約信成禮而歸拜金吾右將軍始得居公爵益封千五百戶加為大金吾九年加戶部尚書以大金吾為左將軍元和十三年三月九日歿享年六十九上聞之一日廢聽奏詔命從官臨弔之賜賻粟帛贈太子少保公強辯多學謙下好問因危而致其節見義不顧其私輸公之急某從僚其門備得前行謹以所聞所見實錄於斯謹狀元和十四年七月十七日狀喜子者饑年女子小字也且困時蒙活於估人劉承家女使喜子為人惠口而柔顏承載與往來襄閩楚越之間常之閩納貨於息客崔氏閩市中有韋生者居比屋與承喜子旦夕交候言韋動悅喜子而承顧頗喜酒多亡故韋生得縱語靡曼喜子既拒韋益欲淫之會承欲北舟向利韋思得與偕及圖假載於承承曰諾且承因匿貨坐抵禁繫公室獨得與喜子在舟因賂傍者教以語云承得死罪事其財妾奴婢當輸入度終不能脫矣不如以財亡韋語達喜子喜子立謀自殺即夜就溺人相與出之幾死及蘇復與言然知其妄乃已自是各去其後不復相聞事在元和四年衛人程生為之說贊曰吾聞程生云喜子之事至死不變亦可謂烈嗚呼狐死正邱首而喜子之仁也李紳者本趙人徙家吳中元和元年節度使宗臣錡在吳紳以進士及第還過謁錡錡舍之與宴遊晝夜錡能其材畱執書記明年錡以驕聞有詔召稱疾不欲行賓客莫敢言紳堅為言不入又不得去會畱後使王澹專職為錡具行錡蓄怒始發於澹陰教士食之初士卒當勞賜者皆會府中受賜與中貴人臨視次至中軍士得賜者俱不散齊呼曰澹逆可食既盡即執中貴人脇曰爾寧遂眾欲寧飽眾腹曰請所欲曰為我眾書報天子幸得復錡位貴人懼偽諾之召書記以疏聞紳聞之亡入錡內匿眾索不得及中貴人至促錡行錡益怒急召紳授紙筆令操書上牘紳坐錡前佯惴怖戰管搖紙下札皆不能字輒塗去累數十行又如是幾盡紙錡怒罵曰是何敢如是汝欲下從而先人耶對曰紳不敢惡生直以少養長儒家未嘗聞金革鳴今暴及此且不知精神在所誠得死在畏苦前幸耳錡復制以兵刃令易紙復然傍一人為錡言曰聞有許侍御縱者尤能軍中書紳不足與等請召縱縱至錡銳意自舉授詞操書無不可錡意遂幽紳於潤之外獄兵散乃出縱竟逆死贊曰李錡之賊江東也其抗節者有李雲李紳雲則山中劉騰為書以大之而紳之蹟未及稱且紳職錡肘腋下舉動顧盼有一不誠則支體立盡眾手而紳亦不顧而曉然自効如此可謂臨大節而不可奪者耶馮燕者魏豪人祖父無聞名燕少以意氣任專為擊毬鬬雞戲魏市有爭財鬬者燕聞之往搏殺不平遂沈匿田間官捕急遂亡滑益與滑軍中少年雞毬相得時相國賈公躭在滑能燕才畱屬中軍他日出行里中見戶傍婦人翳袖而望者色甚冶使人熟其意遂室之其夫滑將張嬰者也嬰聞其故累毆妻妻黨皆怨望嬰會嬰從其類飲燕伺得間復偃寢中拒寢戶嬰還妻開戶納嬰以裾蔽燕燕卑脊步就蔽轉匿戶扇後而巾墮枕下與佩刀近嬰醉且暝燕指巾令其妻取妻取刀授燕燕熟視斷其妻頸遂持巾去明旦嬰起見妻毀死愕然欲出自白嬰鄰以為真嬰殺畱縛之走耳乚告妻黨皆來曰常嫉毆吾女乃誣以過失今復賊殺之矣安得他殺事即其他殺而安得獨存耶共持嬰且百餘笞遂不能言官家收繫殺人罪莫有辨者強伏其辜司法官小吏持朴者數十人將嬰就市看者圍面千餘人有一人排看者來呼曰且無令不辜者死吾竊其妻而又殺之當繫我吏執自言人乃燕也司法官與俱見賈公盡以狀對賈公以狀聞請歸其印以贖燕死上誼之下詔凡滑城死罪皆免亞之曰予尚太史言而又好敘誼事其賓黨耳目之所聞見而為予道元和中外郎劉元鼎語予貞元中有馮燕事得傳焉嗚呼淫惑之心有甚水火可不畏哉然而燕殺不誼白不辜真古豪矣郭常者饒人業醫居饒中以直德信饒江其南導自閩頗通商外夷波斯安息之貨國人有轉估於饒者病且亟歷請他醫莫能治請常為診曰病可去也估曰誠能生我我酬錢五十萬常因舍之先以針火雜治導其血關然後輔以奇藥誡曰第橐慮塊居月餘估稱愈欲歸常所許財常不聽估曰先生以為寡歟常曰不也吾直吾之藥計吾之功不能損千錢而一作令所受非任反禍耳卒不內人以常為詐而責常常曰夫販賈之人細度而狹見終日希售榷買計量於毫銖之間所入不能補其望今暴奪之息錢五十萬則必追恡鬱惋寧能離其心且藥加於人病新去而六腑方憊復有悒然之氣自內而伐即不可救奈何彼方有疾時知我能治而告我我幸免之因利其財又使其死是獨不畏為不仁而神可欺者吾何敢欺沈亞之曰仲尼蓋言我未見好仁者惡不仁者而後學之徒未聞明好惡也豈其言之憤不足畏耶今世或有邦有土之臣專心聚斂殘割饑民之食以資所欲忍其死而不愧受刑辱而無恥是亦不仁甚矣終無有惡者若郭常之賤而行之又焉得不稱於當時哉劉薰蘭者洛陽中女子也字嫣蓀故居家時名鄭兒元和九年年十六房叔豹來求彈絃者其母以鄭兒入焉後以善笑得大悅因更名薰蘭叔豹為人喜酒多廢薰蘭勉之曰某以孫稚蒙君曲娛之愛使得奉巾饌誠不足以正非是然而君之齒方壯且又足給幸疴恙無有乃終日碌碌自墮如即至力闕旦暮將何以拔之若終不更則親戚友朋視君若某皆貊之乎於是房叔豹蹶然自咎遂取古籍詩書併學之是歲余罷隴西軍來舍房氏始聞其語因嘉之遂為著篇以繼勸且古語有云女為悅己者容亦見其志也如薰蘭之能引媚其志歸於至理豈不知賢女之為容維長慶三年正月己巳櫟陽尉沈亞之承命於大京兆以歲旱用乾肉清醪恭祀於漢武皇帝神之祠下因巫人以達其祝語嗚呼陰陽水旱其司惟神五行六氣神得而均如愆且災神何為仁惟神昔帝漢日何祥不臻雍熙滂洋甘露麒麟人荷其澤亦仰如春氣配高明沒而為神居滿必誅居抑必申今者獻陽始歲亢而為屯草木蔽萌塞脉沈津不蒸不洩逾於十旬雨師慢傲尸違不賓潛深驕高枯此下人風伯囂戯陶濃塵潰為凝霾坌若頺雲鴻混突渤上蒙無垠掩蔽光明以垢春晨彼風伯雨師皆神所司處位不職荒役不祇神假之權使之用為上帝如怒其殃孰罹神明胡不督其稽察其欺壞法者戮後期者笞然後泰陽蒸雲雨膏以時發生有涯農力有施今官庶併誠虔虔於祠集於宮室鼓舞彈吹神其聽之無敢苟祈謫掾秋病偃於漢之陽怳而夢鬼其形甚穢長股短胸薄頂無尸禿眉獰吻嗜痔而饕瞪視睒睒嚵氣羊星臊指人生寒粟肌揵毛及寤怪歎以告筆吏王扃扃曰斯癘鬼也亞之曰癘鬼何端而侵我乎扃曰癘之為情惡儻儻而狎睢同邱為仇同惡扶依依邪傅影倒步側趍託舌附語以調淫巫今掾之為人體曠情虛樂能惡汙內曠外竦翺翔自儀舉止無虞不機不扃為所啁也無乃異乎亞之曰何以去斯患也吏曰扃聞之樠木之神其司郢土之陰可以酬而訴也願召巫用酒肴以寄詞為祝使其有愧必榜且戮掾無鬱也於是乃與譔為祝言一闋以道所惡其詞曰傾江漢之長瀾兮淘晨雲於宿靄惟附巘之橫峯兮寫甘灣之清泚聞樠木之畱古神兮宅同麓之荒邸茹清明之靈英含瑞光而為體與午節及皎峭兮惡晴明之闇靄粵客子之何羇兮啁吾血於癘鬼癘鬼之狀草刱樸梀蹴折兮蜍背棚橫兮蠆腹板聱兮薄頂而蛇顙颭掞兮赤臉而鼠目伺差池於隟情兮投怪言以禍福拒良藥於煩痰兮謗嘉肴而謂之毒衣戾氣以為介兮避神丹之利鏃彼怪魅之朽險兮非神君兮孰能以族洗苦身而為詞兮望皇靈於樠木秀才劉巖夫父歿不勝喪余弔而作詞以哀之其詞曰號呼窒懣喑嗚呼兮一溢不入百體痡兮醴泉渴竭白髮枯兮脆黃摧亂如霜蕪兮形若龍蛻骸骨瘏兮悲占六腑神無居兮魂魄惝惝客四隅兮去依風雲將君疎兮待待一作得得地之赴幽都兮生成一作誠果克志意舒兮厚姻薄養世有諸兮俗浸且廣無誰誅兮清魂佳宇赫來圖兮鼎設海陸備肴俎兮吳梅狄酪浹濃腴兮逢果錯實態味殊兮酣顏若頰視若珠兮香津桂醑蟻沈浮兮綠盎既發有罇盂兮醪醴百味君安須兮惟君之嘗恣所如兮三爵與洗祝延呼兮為君澆奠一饗余兮維長慶四年五月十七日福建等州都團練副使沈亞之謹遣郡吏李權奉酒肴之奠敬祭於故河南少尹李公之尊靈夫哲智之達塞兮繫其時之艱通故孔子厄而周公通管遇齊而卒業賈遭漢而不終嗚呼哀哉古昔何思所思維時謨不我進綱不我維民不得濟道不得施雖富且貴何大用為夫子之道歿矣今將遺誰卷清明之特達歸壤厦而藏之哀哉尚饗維長慶元年十一月二十六日同年韓復張正謨龎嚴沈亞之饌庶羞清酌之奠祭於故安定胡君之靈惟溫毅之龍顏兮含朴謙而苞野工時言之便詩兮鬬風識於遠雅同遭恩於昔年蒙擢身於長者念嘉歡之平生君何先而捐捨痛彫華之誰疾兮聞號號之稚寡省余奠之不遒兮促將征於前馬何決邁而無顧兮豈樂居乎壤厦既啟全而無尤君子美其終也哀哉尚饗澤梁宋之戎郊涵雄渾於雲水陶沈毅與濃剛作咣咣之巨士綿將流於洪光鼓神濤之在已昔丞相之東征統梁城之千雉命賓余以掌檄蹤枚馬之遺美見公佩之橫腰冠衙旗於宋壘及夷門之節臥余奉歸於故里寧後者之無當顧狂埃以渤起司馬啖而賓徒烹血肉肆而為市何繼師之無作始公之功由是伏豺豹於神猊遂清寧乎千里聞君書於天閽帝嘉悅而忘恥嘗敘族以姪予謂同原於康子言康樂於一方竟綿歷乎再紀廩蓄粟以億計積有餘而流委櫪甲馬之萬銜惟君王之所指撲淮童與齊蠆猶烹冰以燎葦視燕趙之強侯若負垤之㣥蟻彼承風其如何聞當飯之遺匕及柱天而轍日信愽壯之可倚逢諒闇之初晨遂踐阼而為治推轂兮昇壇河橋兮鄜畤恩光被以湛稠仍分疆以及嗣遵往年之來覲見差班於父子復何殃之不造遽相追而沒齒榮華之不遒兮倏云乎已矣悼皇情以注想每凝旒而撫扆錫秘物之必周予得命為臨視還壤厦之將駕導清笳於哀徵鑒卑志之潔恭願降歆而省此嗚呼哀哉尚饗噫佳惠之淑敏承嚴明以信修既笄佩之有儀俟嘉人以為仇豈位者以無當顧采贄以納予惟鄙夫之蓬塵牽阻離以為尤始仕筆而關塞俄自夏而涉秋誰來歸之須臾遂省拜於東陬潔幼弱之室處奉板輿於修途值凝冰之泝川乃築居以捨舟念姻嫁之以時負重鈞於薄軀何困蹇之多淹汨歲序之忽周誤聞恙於中閨言迅轡於皇都及鄭洛之外郊承凶言於來書悼追悲之莫及聲失慟以咽呼目虛疑而直想容髣髴之在眸舉椒桂之觴奠感百年之永乖纜繐帷之撫臆非彷徨於故居惟靈魂之昭昭省余心之勞劬念昔媵者容華不常喜顏如春酣葩之芳㸌乎將然煜乎為光偏然去步如烟洋洋萃然來居如鸞下翔佳言如酒和人中腸情如繭絲繚不可央繄云其御惟我所當遂棲余牀為余馨香自始于今六謝冰霜纔云就木言歸隴首道既已隔淹不可久嗚呼哀哉尚饗
