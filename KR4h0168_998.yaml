front:
  text: 全唐文欽定全唐文卷九百九十八輔國本名靜忠以閹奴事高力士後以王鉷薦侍東宮肅宗即位靈武輔國豫其謀擢家令判元帥府行軍司馬改名護國又改今名進拜少府殿中二監封成國公首謀遷元宗西內以功擢兵部尚書代宗立進司空兼中書令加尚父後帝遣使刺殺之
  hash: sha256:2d90bf75099e5e3534a8e0929068bc2ae628101b3e69d5f38c4ca060e2c41a15
  markers:
