body:
  text: 臣聞古今大寶皇王受命成功創業皆始艱難繇是足高光武之功漢圖斯永滅澆豷之患夏嗣以興豈比孝以感通德以成化光膺聖歷協契天時開闢已來未有如陛下者也頃巨猾間舋中夏不康陛下赫然發憤奉命專征曾不踰旬兩京剋復掃清宮闕奉迎鑾輿警蹕鳴笳舊儀逾盛行軍便幕故事無闕陛下整法駕擁㣥臣遠自望賢拜迎路次引旌斾而祥風不散拂鑾輿而瑞雪時飄承順天顏無違就養君父之禮億兆同歡猶乃不自為功至崇謙德過周文侍膳之典邁漢高獻壽之儀虔奉至尊敬恭受命伏惟陛下以孝理天下也如彼以德化天下也又如此盛德大業其至矣哉臣幸參締構職在禁戎得覩盛明無任抃躍伏請編諸史冊以示將來朝正元和朝官昭義軍監軍使守內侍省奚官局令此碑文布傳於天下久矣未詳其所立處頃日得之闕二字其文迺知梁武帝深達元旨若非留心此宗則罕測其涯際或者云梁武帝崩後菩提達摩猶行化人間蓋或者自惑耳考諸史籍則梁大同二年歲在乙卯至太清二年歲在戊辰相去一十四年矣武帝廢於侯景自大同單閼之歲至我唐元和閹茂之歲凡三百四十三年矣朝正嘗願於熊耳吳坂再立此碑屬以戎事多故遂乖本志今迺就二祖可大師塔前建之用表真宗之所由也菩提達摩自西域至中國為禪宗第一祖內傳心印以為宗謂意出文字外外傳袈裟以為信信表師資其袈裟授可大師可授粲粲授信信授忍忍授能達摩遺言云我法至第六代後傳我法者命如懸絲故能受付囑後猶隱遁人間事在本傳祖師知當來學徒必注意謂法在衣上不知法本無為得之者永超三界了斯元旨是達真宗所以誡絕傳衣令學人得意者廣通流布化及無窮拯溺俗於沉沙擢迷途於苦海者矣曹溪能弟子南嶽惠讓讓弟子龔公山洪州道一洪州弟子信州鵝湖山大義大義貞元中內道場供奉大德每敷演妙理萬法一如得無所得證無所證開合不二是非雙泯夫無像之像像遍十方無言之言言充八極可謂真證直得湼槃宗源乎至十九年四月十九日德宗皇帝迺度中貴王士則命捨官賜法名惠通充弟子又度官生童子惠真充侍者惠通由是親承教旨妙達真宗自祖師歷六代後名流大德學徒得意者在行天下敷演妙理不可殫紀朝正但據所稟本教來處敘之將來幸辯由戶不謬矣今恐年代久遠故重刊石紀之承和穆宗時為內樞密使天竺有聖人焉名之為佛三身互相應化無所從來百億同名不知其誰之子德包塵界道冠萬靈有感必通酬念如響心操慧炬永燭於大千手運慈航泛流於沙劫晦明不二淨穢兩同正智如如我無所得雖後天地而有質先天地而亡形莫不究清濁之未然識方圓之始卒大矣哉若非天下之至精孰能如此夫大德小德優劣不同賢人聖人取捨各異乃引眾星之表月立萬象以尊天因喻發揚憑茲外飾有言子貢賢於仲尼者不知仲尼之聖加於子貢有言阿難相同諸佛者不知諸佛非相以攝阿難見尺鷃之至微知大鵬之至廣覩秋毫之至短知大椿之至長擬於物即尺鷃秋毫擬於人即阿難子貢雖然近如來之門戶識夫子之堦墻瑚璉寶瓶異諸凡器金楹玉棟不是常材故佛之侍從者即迦毗令人拘那貴族皆辨搖金剎名振鐵圍驅六賊如衆鳥之避鷹鸇懾四魔若百獸之畏豺武而性海無底惠峰穿霄善入一乘橫通三輩被精進所縛不捨用心嘗修之於身去住未決或執如或斷如是故生己之法隨滅滅已之法隨生常生之所不生常滅之所不滅能詮二義其唯覺乎覺不自明方明覺也夫有生滅者是覺之用無生滅者是覺之體即如覺逐滅生生隨覺滅生滅俱寂其覺亦亡乃指素月於澄溪祛外緣於現性解出人表堪為代師儔諸法王則吾豈敢何者孔子登東山而小魯登泰山而小天下今亦然也如來觀溺山而小聲聞觀枕山而小菩薩我佛也同彼虛空不染於幻強立真假曾未牢固是故說行而無所說行說而無所行非行非不行非說非不說非法非非法非性非非性本不生無所滅元不覺無所寂於一不一中悟諸未悟者於起不起中導諸未導者大矣哉若非天下之至神又孰能如彼而夜景呈輝化行西土神光啟夢象教東來思玉毫而遠挹鷲峰仰金偈而虔瞻貝葉身已逝矣空傳結集之書性本存焉如聞在代之說且法以辯志言以辯心非法無以悟其心非言無以成其志即言說文字皆解脫相有是經處即見如來今有右街功德使驃騎大將軍行右武衞上將軍知內侍省事上柱國邠國公食邑三千戶充右神策軍護軍中尉安定梁公曰守謙職是禁營邦家重器居繁不亂兼總緇黃讀佛言親釋氏其貞元中公以溫惠為甲冑清慎為戈矛跡尚彤闈名高紫闥至元和初授銀璋佐密命鼓翼高岫躍鱗洪波飛鳴近天得志江海五年加金紫掌樞機渙汗流心散為膏雨如絲入耳開展成綸捧白日以揚光戴青天而翼化處事之極動而可觀至十二年遇蔡人逆戎事興天討未平干戈在野天心恐師老矣而誅剪未就乃命公撫衆觀敵審度遲速乃奉辭伐罪踴躍而行走四牡以宣暢鴻休利萬物以車塵相屬參整戎事董護諸軍與將帥同其進也一其議也或縱六奇之辯即濤生巨浦雲出深谿或察五間之情即趙楛穿楊楚金伐木若有神助不謀成心我旟既張我車亦列均勞逸而義夫爭死齊賞罰而奮臂爭驅蓄銳候時果申長策於是選精卒張詭道雜旌旃而不嚴部伍差進退而曲敵之心疑實為鋒鋩詐餌武口賊果輕襲利吾大軍遂使書掩沙河葛伯之賊夜遯合流宵渡邵陵之寇全平駭若奔雷勢同激電似霜霑寒草風卷餘花縱烈火於平蕪走飛泉於大壑摧枯易折墜瓦難全滅蔡之功十有其七餘賊保洄曲官軍圍郾城我鼓音方厲武旅方雄操利柄而目無全牛執其吭如芻豢悅口摩壘問罪登陴不降梯樓滿空矢石相接經四十日爟火失繼人無鬬心畏夏日之赫光懼春冰之易泮乃降仍邀公匹馬視師撫納疑懼公悅以犯難投誠若歸遂令啟關按轡而入醜類或鼓或罷相視失色公曰來余與爾言爾本吉人也何不徇國家之急成其名而託身於武豹之穴求其噬輿尸覆族誰與咎耶皇情極念之故令守謙布澤潤心宣化清耳能悅生避禍者當聽之曰明明天子清問下人不能勤王爾失遠畧為寇盜所制而臣節難全犯弧矢之威當剿絕之斃圓百方足莫匪精靈念其瘡疣實可憫惻然違予戮汝而不赦恭命活汝而無害能遷其不祥而為祥吉莫大也變其不幸而為幸令莫窮也賊將卒等色轉慙禮愈謹公曰皇上聖文紹統神武膺期惟德動天無遠不格被堯舜之法服行堯舜之法言所以大文教而九有小康小武功而天下大理嘗欲戢矛楯親稼穡使人居安各得其壽爾一方不能安時處順守衞中國而罪自結厲階彌崇即不得已而興師非樂殺人也況天德好生容長萬物是以曲開洗汙旁設自新招示頑夫以明廣大將士等久遭苛暴翻跡令圖亦謂朽燼重燃枯條再葉國刑當宥咸賜無辜豁爾憂心以承慶賞降人皆投戈卷斾匣刃弛弦觸地血流向闕蹈舞於是五千叛卒不戮一人十萬王師皆服其德從此鯨鯢失浪烹餁方因惡鳥巢傾折翼於此恩波大澍封賜有差乃授公右監門衞將軍飛詔追還密職如故又掌天地之戶牖捧造化之關鍵勳隨日厚望逐時深公之美也不滅直以沽名不愆義以犯物動靜無隱發言有章至十三年天睠凝嗟賞重知勞不自伐功不自德遂與戎印授兵符司禁旅之右也公積仁成器積器成名卑牧難踰高光可仰定止足之分動必師心辯榮辱之機道樞不撓薄嗜慾以守一鄙浮華而處中匡護元流酌之不竭伏以元和長慶釋教大興雅叶所歸轉得親近謹於大興唐寺華嚴院為國寫古今翻譯大小乘經論戒律合五千三百廿七卷公私祿利不入其門凡是難得無所愛惜嘗求善書者令絕外塵不飲茹浴身至於精剎焚香而就筆硯擇其力多者以多價酬之少者去之人不約而自勸也於是染素流光含丹縱彩雲生墨沼之上花開方絮之中衞索分鑣王羊並騖各行軌轍跡不相讓又立經堂一所三間徘徊安住法輪必資豐敞作制惟永壯我皇都豈得為工者不極其妙為材者不極其美殊形異狀生於斤斧之中曲直方圓豈逃繩墨之下於是彩棟霞張雕楹雲布朱扉洞啟縹壁含光羽族棲於綺窗鱗介遊於藻井修羅率下爭提夭矯之梁藥义命徒競戴岌峩之拱衆靈翼衞諸天護持恍惚莫辯其形來往不留其跡又於堂內造轉輪經藏一所刻石為雲鑿地而出方生結構遞闕二字緣立無數花幢竊比兜率造百千樓閣同彼化城狀物類本擬容奪真鵷鵠若飛而不飛虹螭似走而不走欒櫨櫛比雜之以琳琅榱桷駢羅飾之以珠翠淩雲五級方開四門璀錯相輝煥麗交映離婁覘之眩目公輸閱之奇闕二字歲古人多有慚色不知來者孰能繼歟於是方表含輪虛中不滯㣥經之府所好必從遊藝者任其卷舒杖德者恣其探討或超諸垢穢蓮花隨手而開敷或等彼清涼甘露應心而滴瀝乘之所妙者不論其小大法之所尚者不闕一字其淺深譬諸江河所汲隨淺從流自得不礙疎數其外或圖寫龍神鬼物之狀以為嚴飾或造菩薩天仙之類周匝其旁白璧成容玉眸高視黃英作相金口如言設無體之禮實不佞於屈伸獻無聲之樂終不煩於音律五色闕二字亂其目八風無以吹其心守靜樸以自持執堅中而不磷或虔恭默如或侍坐儼如又於堂北別立鏡燈朱燄揚輝紅光滿室常生縱巧有符丁緩之奇蘭膏自芳不假海人之贈幸斯破暗永繼其明於是㣥藝畢衆工歸八龍闕一字軒四王護闥雨霑香砌何塵垢之蒙潤風搖寶鐸流美響之不已公頓首奏曰臣聞法象莫大乎天地變通莫大乎四時所以萬物生中不擇於覆載榮枯美惡必備於寒暑雖古先哲王宏天若德豈同聖代則而行之伏惟長慶文武孝德皇帝陛下英冠四維氣含八極齊日月之至耀光燭無窮等天地之至仁寰瀛受賜坐超湯禹立並羲軒驅岳瀆之精靈馳道德之車馬有典有則無怠無荒法上元以生成體陰陽以御物動合靈契事膺神符永綏兆人克顯休命臣猥承委擢如荷邱山蕭艾空竊於春陽螻蟻每慚於雲雨修持闕二字允奉穹蒼上黷冕旒伏增驚越臣亦知螢光助於兩曜畎澮宗於四溟實不足以添輝亦不足以濟廣然纖美見容知大明之及遠涓流必納識渤澥之宏深臣早悟多藏勇於施捨聞斯必舉所作成集誓嚴持闕一字燄上續於恩光啟導法涯永資於德澤帝曰俞卿以檀波羅福保於朕躬朕以官惟其人任卿勿貳實千載之一會何魚水之見稱想卿逢時宏道多慶公荷寵之極涕零如雨又奏曰如來奧旨必藉開張若不言宣何以廣福臣請得無染沙門貞實等二七人御斯信馬駕彼白牛直出四關掃諸五翳偕持正念調伏其心為國傳經乃至無算陛下得佛祕印行最上乘於多劫中為人父母遂令釋子遵有漏法傳無盡燈滋寶雨而潤及四海布香雲而蔭乎千界光天之下孰不蒙益受益之利上集一人伏願寶歷天齊金輪嶽固永居億兆之上克承無疆之休帝悅依奏公曰克樹有為期於不朽畧須題述以告將來遂命戎副右監門衞將軍楊承和文而書之辭曰小子蓬茨劣人跡度卑淺無當時應用之效有僻陋至愚之累靈波曲潤幸得充乏幾歷星歲繆厠下風聞可道之言觀可行之行書紳不暇何以襃稱至如走光塵俟嘉命愚人不敢拒若使陳葺繕具德美愚人不敢當公不聽又辭曰抑短羽齊九皋之響殊不驚人使弊足追萬里之跡豈宜及遠雖沖霄有路且力小未任況逐日無功而敢煩羈靮公又不聽是以磨鉛赴罇俎之割策鈍當天衢之駟流汗如沃愧顏若丹輒盡野辭書於琬炎銘曰香山之東雪山之北善勝道場迦維之國飯王聖子有大威德菩薩伏膺龍天仰則總彼十名高談四諦能拔一毛普現一切阿僧祇劫瞬目所睇微塵剎土凝心所計無說非默有說非語汲引未終豈厭寒暑八正齊列三乘並舉惘悵逝多歲不我與舉足下足㣥魔愁謗歸歟歸歟飭彼迷忘優曇忽折摩尼驟喪海會無言靈山多曠猗歟大雄情靈藩翰上下四維吾道一貫藏諸不理顯諸不亂託跡光周遺宗炳漢操之則存捨之即亡如來寶印付囑我唐必正墜典克續頹綱法雨一潤佛日重光真諦所歸域中之大無為所及宇宙之外幽宗默識元機暗會千劫飛輪萬方永賴既崇其化邠國欽承久積吉行發言相膺意馬早縶心猿不升出彼夢宅如上岡陵不捨有相無相所依不離有作無作所歸焚舟得濟到岸應稀達人是是塵人非非雲赴壽山澤歸福海層峰永固波瀾不改衆善斯立舒光耀彩樹彼勝因憑茲爽塏順生攝生從俗出俗因機立化賢愚共欲精廬大敞材力豐足購地闕一字金開堦累王大匠誨人必先規矩大巧垂美亦先棟宇墨請操繩般求執斧樸斲未已師者如堵千仞之桂良工所度十圍之松備於制作細飾土木海物交錯藻井舒蓮含芳吐萼裝嚴寶藏水陸窮珍王褱姿競麗華樸爭新馳光耀谷浮彩榮濱既美且良悉得其真寶樹成行寶堦上聳善安不拔善高不恐欄楯曲周簷楹抱擁葢若天垂花如地涌實以方外四門不扃虛以圓內萬法有經金石絲竹風來可聽玉釜旃檀日照彌馨鏡開八面燈傳一光夜浮素魄晝助紅芒齊明隱顯等鑒行藏膏平潤久心直燃長忍鎧常穿四魔不脅智劍常拔三災不怯何以奉佛剎那散業何以奉國演日成劫重約大中時中大夫奚官局令宣歙池等州監軍使夫山川邱陵能出雲為風雨見怪物皆曰神故先王之制祭也法施於民則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之莫不咸享今之府君在宣宛牧伯所封之內保護國人實謂昭晰若歲大旱年穀不登虔奉祈雲罔不克聖觀民悅敬如日之暘宣歙池等州監軍使中大夫奚官局令上柱國賜緋魚袋劉重約自大中七年癸酉歲六月朔受命監撫抵郡涉旬祇肅祀事皆賴其祐報謝之禮煥乎廟室命工人塑馬二所飾神八人整砌繪壁丹雘欒楹事逾周星尤蒙影響無何去秋瘥瘵背發其瘍日益疲羸浹辰不間遂扶危登樓遙享奠酬神之克念翌日乃瘳蓋府君之威力也復以秋七月戊申朔十七日甲子謹遣押衙兼監察御史錢儉楊貫等虔誠啟祀以求吉祥咸獲休徵至九月丁未朔二日戊申躬自報賽大具牢醴鼓吹節奏絃匏笙簧俯伏廟墀再覩儀像泫然流涕禮及三爵油油而退又以受用塗金銀杯盤二事獻於座右復捨鏡二面周環各一尺五寸裝飾寶帳以覆府君之首兼出俸金米物等資助工糧計緡百千既美所羞益彰幽贊於戲天地之道能陰能陽神祇之道有柔有剛故知天則不言而信神則不怒而威福善禍淫式穀與汝矣重約今監戎向滿赴闕是期聊紀幽微刻於貞石永為不朽大中十年四月一日建順融僖宗朝內樞密使今者爰有維城來於仙觀至誠纔發嘉兆俄呈現此時在地之赤光是昔日度關之紫氣及穿積土果獲古文驗逸勢於龍蛇知即平於梟獍來於沖邃理頗昭明既太上今與平災知中和永昌厥祚所現全因聖祖掘得又自皇枝捧此靈蹤可明天意且混元聖祖每逢多難皆有殊祥唯彼明徵備書正史昔於丹鳳門上告田同秀以天寶復國之期今又青羊肆中示李特立以陛下還宮之慶莫不天下幸甚乞付史館復光閩人本喬氏少養於內常侍楊元价家為小黃門監乾符中賊渠黃巢犯江西復光為排陣使招討使宋威戰敗復光總其兵王鐸代為招討使詔復光監忠武軍中和元年充天下兵馬都監總諸軍入定關輔定議遣使以墨詔召李克用於太原收京師以功加開府儀同三司同華制置使封宏農郡公賜號資忠輝武匡國平難功臣卒年四十二贈觀軍容使諡曰忠肅頃者妖興霧市盜嘯叢祠而岳牧藩侯備盜不謹謂大同之運常可容奸謂無事之秋縱其長惡賊首黃巢因得充盈窟穴蔓延萑蒲驅我蒸黎徇其兇逆展鋤鶴以成鋒刃殺耕牛以恣燔炮魑魅晝行虺蜴夜噬自南海失守湖外喪師飬虎災深馴梟逆大物無不害惡靡不為豺狼貽朝市之憂瘡痏及腹心之痛遂至毒流萬姓盜汚兩京衣冠銜塗炭之悲郡邑起邱墟之嘆萬方共怒十道齊攻仗九廟之威靈殄積年之兇醜河中節度使王重榮神資壯烈天賦機謀誓立功名志安家國至於屯田待敵率士當衝收百姓十餘萬家降賊黨三萬餘衆法能持重功遂晚成久稽原野之刑未決雷霆之怒自收同華進逼京師夕烽高照於國門遊騎頻臨於灞岸既知四隅斷絕百計奔衝如窮鳥觸籠似飛蛾赴焰雁門節度使李克用神傳將畧天賦忠貞機謀與武藝皆優臣節共本心相稱殺賊無非手刃入陣率以身先可謂雄才得名飛將統領本軍南下與臣同力前驅雖在寢興不忘寇孽今月八日遣牙隊將前鋒楊守宗河中騎將白志遷橫野軍使滿存躡雲都將丁行存朝邑鎮將康思貞忠武黃頭軍使龎從等三十二都隨李克用自光泰門先入京師力摧兇逆又遣河中將劉讓王王褱冀君武孫珙忠武大將喬從遇鄭滑將韓從威荊南大將申屠悰滄州大將賈滔易定大將張仲慶壽州大將張行方天德大將顧彥明左神策弩手甄君楚公孫勝左橫衝軍使楊守亮躡雲都將高周彞忠順都將胡貞絳州監軍毛宣伯聶宏裕等七十都繼進賊尚為堅陣來抗官軍李克用率勵驍雄整齊金革叫譟而聲將動瓦喑咽而氣欲吞沙列戈矛密張羅網於是麾軍背擊分騎橫衝日明而劍曜飛輪風急而旗開走電使賊如浪便可塞流使賊如山亦須折角蹂踐則橫屍入地奔騰則積血成川楊守宗等齊驅直入合勢夾攻從卯至申㣥兇大潰自望春宮前䠞殺至昇陽殿下攻圍戈不濫揮矢無虛發其賊一時奔遁南入商山徒延漏刃之生佇作飲頭之器伏自收平京闕三面皆立大功若破敵摧兇雁門實居其首其餘將佐同效驅馳兼臣所部二萬餘人數歲櫛風沐雨既茲平盪並錄以聞光葆光嗣從弟以宦者事蜀先主王建為給事黃門官宣徽北院使累遷東川節度使嘗請誅唐使李嚴後主王衍不從國亡後居閬州後唐明宗時為團練使安重誨所殺晉王攻滅朱梁紹唐稱制冒李氏之苗裔以鄭王為遠祖遣使西來侮慢尤甚輕蔑我國必將交惡宜勵兵選將執戈待寇請於秦州屯兵萬人鳳州三千人控扼要害命大將帥兵萬人戍武威城應援秦鳳萬人戍興元應援金州及駱谷萬人屯利州應援文州及安遠城二千戍扶州為秦鳳犄角命渠果州管下蠻酋各聚兵裹糧專聽師期昔成汭據山陵養兵五萬皆仰給雲安請擇安州刺史充峽路招討副使改榷鹽法以廣財用嘉眉二州增治戰艦募舟師五千下峽出江陵步騎出襄陽大兵急攻秦雍東據河潼北以厚利啗湖廣利則進師退則分據峽口及散關以固吾國可以伐敵之心
