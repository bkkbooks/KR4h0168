front:
  text: 全唐文欽定全唐文卷六百二十四虛舟隰州刺史聿之子中宏詞科
  hash: sha256:9fb3bfcaa0a1cf9c7ee27dffbf9fab3591f0913f8285e5b17c7f79207d47daa5
  markers:
  - {type: head, offset: 14, content: 浩虛舟, id: KR4h0168_NFKB_624-h1, level: 1}
body:
  text: 王子猷之延賓暇時偶切磋於經史遂交戰於言詞出奇而彼力方壯向敵而吾矛莫持阻辨口而不通去來都絶閉赤城之深固中外生疑既而謝婦側聆翠帷潛至察攻討之餘勢知勝敗之有自情甲遂闢縱堂上之奇兵靈府忽開出身中之利器是用自伐期乎不爭因漁獵之近習得籌謀之至精縱吟嘯為鼓鼙之雄倍增其勇察顏色為風雲之候暗識其情然後以德而攻當無向背迎心石以奔北望詞鋒而亂潰一來一往環回於文苑之間或否或臧蹂躪於儒林之內巳而容勢相懸抵摧莫前擊觸而剛腸已折交侵而鋭氣難全去不可逃顧咽喉之絶矣敗無相救覺脣齒之茫然觀夫忠甲不免德藩何益望風而堅徑不保挫氣而秉持盡釋俄執訊於折角將犒師於重席驗運輸而經笥不窮察包裹而智囊猶積是以扞格斯闢書文必同逆無不服滯無不通義櫓罷持倒載於德車之上仁寶悉獲橫行於王道之中故得學海長清言讎不起百家咸湊其軌轍六籍各分其疆理是使孤陋寡聞之徒永願服膺而已二儀覆載德之廣者唯天三光照臨明之大者唯日故王者於天也父事無怠於日也弟恭靡失布和施令將成不宰之功明目達聰欲亞無私之質當其萬邦作貢四海為家仰元氣而晨昏靡隔指陽精而伯仲非賒草色難窮屢軫南陔之戀棠陰易匿常思棣萼之華所以化洽中原祥臻上國法寒暑觀從政之道無薄蝕見相容之德登封泰嶽猶疑陟岵之時展禮東郊似望在原之力愛敬無斁恪恭盡虔窺一氣異歷山之泣攀六龍為荀氏之賢覆燾成功且異靡瞻之義古今垂象難窮以長之年且夫致敬唯精傾心仰止誰嬰同席之亂誰效攘羊之旨曾聞有闕遠懷幾諫之心每懼曰明寧有遠遊之理所以法前哲規後嗣播洪猷恢至美教天下之為人子者矣又若卑已謙恭端心愷悌同明無終鮮之歎可愛有既和之體桑榆未及魯衛之道咸興葵藿皆傾管蔡之讎不啓所謂扶枝葉固根蒂播仁風匡大禮教天下之為人弟者矣範人倫者莫先於元首遵孝理者在致乎精誠必有尊也天其父必有先也日其兄九服洽和若嗣高於廣大萬機洞照契承照於貞明故得孝道日彰休聲風靡指圓蓋兮欽若仰紅輪兮翼爾由是海內無賊子姦臣吾君如此淡臺滅明幽棲武城感朴直之風散惡姦邪之徑生苟正其身寧偏僻而是履不以其道故斯須而不行想乎塵滿荊扉草迷荒野追遊不慎其經歷咫尺固難於出處鍾山石上杖藜之意殊乖蔣氏庭中攜手之期頓阻牢落幽居交從日疏顧履危之若是將苟且其焉如訪野徑以閒遊恐穿松竹出衡門而獨步不繞園廬嘉夫礪志草茅規行畎畝避幽隱以不到視崎嶇而何有蕪城獨賞寧遊舊井之間山館時歸肯逐樵人之後至若草樹沈沈幽芳阻尋絡野之茅陰自合緣溪之苔色空深以遨以遊見徇公滅私之志一動一息有去邪崇正之心是以蕭索鄉閭虛閒襟抱優游多轍之窮巷來往疏槐之古道花間絶跡念蹊樹之徒芳原上無人惜皋蘭之暗老且遵道如砥持心若絃信無私以白首將抱直以窮年顏生負郭之田有時窺矣謝氏登山之屐無所用焉既而披蔓草之荒涼見遊人之邐迤方檢身於邪正寧繫懷於遠邇楊朱悲道喪事亦如斯阮籍哭途窮意殊若此當舉直以錯枉冀風行而草靡苟非賢智之為心孰能如是陶家客至兮方此居貧母氏心恥兮思無饌賓斷鬢髮以將貿庶珍饈而具陳欲明理內之心不求盡飾庶使趨庭之子得以親仁原夫蘭客方來蕙心斯至顧巾橐而無取俯杯盤而內愧啜菽飲水念雞黍而何求舍巳從人雖髮膚而可棄於是搔首心亂低眉恨生畏東閭之恩薄歸北堂而計成拂撮凝睇抽簪注情解髮而鳳髻花折發匣而金刀刃鳴喜乃有餘慙無所極窺在握而錯落撫垂領而綢直鋒鋩不礙翻似雪之孤光倭墮徐分散如雲之翠色已而展轉增思徘徊向隅元鬢垂顱而散亂青絲委簟而盤紆象櫛重理蘭膏舊濡傷翠鳳之全棄駭盤龍之半無觀夫擢乃無遺斂之斯積凝光而粉黛難染盈握而腥羶是易將成特達之意欲厚非常之客賓筵既備空思一飯以無慙匣鏡重窺豈念同心而可惜及乎宴罷空館間成曉妝纚換新髻叉迷舊行誠伐木之可親疏而是愧苟如圭之足慕斷亦何傷重義者情莫違厚慈者身可毀語其決同勉虞之一戰思其仁逾訓孟之三徙昔咸曰陶氏所以成大名母賢如此達士無羈居閒創奇陷彼陶器疏為曲池小有可觀本自挈瓶之注滿而不溢寧逾鑿地之規原夫深淺隨心方圓任器分玉甃之餘潤寫蓮塘之遠思空庭欲曙通宵之瑞露盈盤幽徑無風一片之春冰在地觀夫影照高壁光涵遠虛潛窺而舊井無別就飲而汙樽不如雲鳥低臨誤鏡鸞之縹眇庭槐俯映迷月桂之扶疏是則涯涘非遙漪瀾酷似霑濡才及於寸土盈縮不過乎瓢水蘭燈委照以珠動紈扇搖風而浪起沈蛛絲為羡魚之網深抵百尋浮芥葉為解纜之舟遠同千里想乎泥滓無染泉源本清盛之而細流不泄鼓之而圓折長生蛙穿而別派潛通想漏巵之難滿雨落而古痕全沒知小器之易盈及夫岸灩灩以初平水汪汪而罷漲韜雲分白璧之色映竹寫圓荷之狀光翻曉日誰謂覆而不臨底露青天孰假戴之而望至若煙靄沈沈莓苔四侵方行潦而不濁比坳堂而則深遂使好勇之徒暗起馮河之想無厭之士潛懷測海之心故得汲引無勞泓澄斯積環纖草以彌徹泛流萍而更碧沙洲連一畝之地山翠接如拳之石悠哉智者之為心聊覩之而自適漂水之上蓋山之前昔有處女化為澄泉瞻風而豔色如在責實而寒流宛然原夫曠別幽室暗悲韶年顧容華之莫守望世人而都捐儼弱質以徐來顏猶灼灼委貞姿而色動聲已涓涓眷戀無心淒涼故地念嬋娟之可惜驚變化而殊異俯視清流託誠幽意陳玩習而斯在庶精魂之能記素鱗赬尾渾非舊日之容急管繁絃徒盡生平之志既而水府潛處幽冥既分凝情而漵斂寒色冶態而波生細文泛浮影於中流遙疑嫋嫋逗鳴湍於別派遠若沄沄由是鱗甲與遊綺羅長阻迷緑沼之回復忘紅樓之處所源通湘渚寫幽恨於靈流達漢皋導春心於游女淨色含虛清輝皎如煙凝淚以香起苔斕斑而錦舒浦水光搖似動橫波之末岸莎風靡如存鬒髮之餘想夫紈質已消陰靈未謝濯衣彩於花晝洗鏡光於月夜泠泠不濁殊畫地以俄成潏潏無窮類拜井而潛化且靜而清者水之宜柔而順者女之為憶朱顏之婉娩尋碧溜之逶迤浮沫粉聚懸流淚垂泛蘋藻而翠翹零落動菰蒲而緑帶參差及夫亂草丰茸古墟荒毀雜泥沙之汨沒蔽音容之妖靡至今閭里之人空傳其名氏昔賈氏子其容似鄙伊室家兮中心莫喜將非匹以為念懼無能而是恥自初笄之歲終日低眉因獲雉之辰有時見齒原夫他室是託芳華正春謂妖容之可恃顧陋質以難親自西自東每栖栖而反目不言不笑常脈脈以凝神爾乃釋恨無方從權有計因如皋以肆望逞若神之絶藝執弓挾矢期應手以無遺果志愜心冀回眸之一睇已而健馬蹄疾中原草平想媞媞之未悅聆鷕鷕之初鳴花顏惝恍以徐駭錦翼翩翻而忽驚遲回而滿月將發盼睞而橫波以清由是執轡情專馳神望極星走白羽綺張丹臆陋容蹙縮以興憤慢臉女便娟而改色彩光迸落初莞爾以難持飛鏃洞穿遂嫣然而不息及夫廣陌將暮征途既還鳴弰徑挺以風響澡翰毰毸而血殷盼么麼之凡姿於焉改貌散低回之鬱志由是開顏向使恨蓄兩心功虧一箭終悄兮而莫釋寧嘻其之可見委絲蘿之弱性沒齒而難忘慘桃李之穠華終天而不變是知陋不足恥藝誠可優嘉五善之殊妙解三年之積愁然後知一笑之難得豈止千金而是酬惟昔有人心至術精得雞之情情可馴而無小無大術既盡而不飛不鳴對徑敵以自持堅如挺植登廣場而莫顧混若削成初其教以自然誘之不懼希漸染而能化將枯槁而是喻質殊朴斫用明不競之由狀匪雕鎪蓋取無情之故然則飲啄必異嬉遊每殊竚棲心而自若期顧敵而如無日就月將功盡而稍同顛枿不震不悚性成而漸若朽株已而芥羽詎設雕籠莫閉卓然之志全變兀若之姿已致首圓脛直輪桷之狀俱呈觜利距銛枳枸之鋩並利是以縱逸情絶端良氣全臆離披而踵附眸眩曜而節穿驚被文而錦翼蔚矣迷搴木而花冠爛然虛憍者懷不才之虞安能自恃賈勇者有攻堅之懼莫敢爭先故能進異激昂處同虛寂郢工誤起乎心匠郈氏徒驚乎目擊淡然無撓子綦之質方儔確爾不回周勃之強未敵其喻斯在其由可徵馴致已忘乎力制積習漸通乎性能是則語南國者未足與議鬬東郊者無德而稱士有特立自持端然不倚塊其形而與木無二灰其心而顧雞若是彼靜勝之深誠冀一鳴而在此臣某言伏見關內河東副元帥朔方節度使司徒兼中書令汾陽郡王郭子儀八月日奏狀今月日先軍李懷光於鹽州界大破吐蕃及吐谷渾賊一萬餘衆獲馬六千七百五十匹牛羊器械未知定數者臣聞戎狄無厭厚將自斃凶殘不革舉必生擒惟此犬羊屢侵疆埸陛下頃雖遣將猶命緩追冀承含育之恩以變貪婪之性今乃先時入塞乘間犯邊鬼得而誅人皆自戰偏師暫出舉衆大奔係彼牛馬獲其生級數逾萬計威懾四夷陛下神化無方聖功潛被資於祕略成此殊勳臣承恩入朝次行分陝雖捷書傳慶已竊抃於途中而賀表陳誠願先馳於闕下無任之至宿字拱之婺州東陽人貞元中進士長慶中纍轉太常少卿敬宗立改左散騎常侍兼集賢殿學士大和中歷工刑兵三部侍郎拜東川節度使封長樂公開成元年卒年七十贈吏部尚書諡曰懿彼巨海兮鮫人是居作輕綃兮厥狀紛如不日而成固可卷而懷也候時將見期善價而沽諸出波心而月彩相絢映泉室而雲陰乍虛其來不測其麗何極行市道而莫知訪人寰而未識非運思於文繡詎用功於紡織足使大賈慙容衆珍掩色豈重錦之云比諒千金而求直夫鮫者水府之所生綃者鮫人之所成奇貨聿來寧假手於蠶績變形斯至非挂籍於王征方霧縠而猶薄擬冰紈而更輕苟未知而不售恆固執而潛行皓如凝露紛若遊霧爰潔爾容不愆於素質初階於蜃蛤名不登於貢賦知慢藏誨盜哂泉客之遺珠悟冶容誨淫恥風人之抱布偉夫遊洞穴媚清瀾趨市人遠淩波路難貴朴全真詎關乎日浴出潛離隱豈效於泥蟠且深不可測赤水之珠求得往莫可追漢臯之佩且欺是綃也成於無眹動若隨時辭海底之潛處赴日中之會期屬吾皇斥無用之寶賤難得之貨徒待價而稱珍庶轉身而遠播日生東方冰滿池塘以涸沍之寒質承亭曈之曉光其象斯潔其容可閲炳爾昭煥朗然澄徹可愛之德巳聞左氏之經如履之心更憶詩人之說即合體而光輝且負暄而昭晰全嗤嶺北之梅詎比牆陰之雪美其林煙早晴寰宇淒清池有水兮冰合天無雲兮日明凝陰尚積暖氣潛盈淋漓兮向陽和而未泮皎潔兮覩津潤之將生所謂當此嚴景昭茲陽彩上下相融貞明共在斯乃元化所結元功不宰日有曜而必臨冰無心而有待不然何大明兮方懸凝質惟堅斜景自高而來照素耀相向而俱妍曲岸增媚平沙更鮮豈西陸之中候朝覿而方出東海之上泮陰火之潛然是知清興攸集氛埃不入隨陽而孤雁初飛向暖而㣥鷗乍立且日者分乎兩曜冰者生於沍寒既清貞而可賞信溫煦之咸歡足使勵志求鑒探幽就觀何必挹瓊漿於丹竈思夕露於金盤曷若色映朝戶光陵曉座冰生池上豈羡玉壺之明日下池中全遇隙駒之過聊賦之以體物庶同白雪之難和天其運乎歲聿云莫彼星回而斗建實維新而去故攝提克正無聞黍纍之差懸象著明不忒陰陽之數仰觀蒼蒼悠久且長一十二分終而復始二十八宿巡而有常各安其位各正其方每披雲而見質恆耿漢而流光淩霜晣晣燭夜煌煌瞻彼星之回復知改歲之方將豈不以式遵晷度無失綱紀縱橫其狀逐青陽而左旋璀璨其容候招搖而東指匝四氣而為度臨萬戶而可視聖人所以參象於躬考正極中天蓋高而道遠星且回於歲終悠悠積氣奕奕長空潛應歷以相授若循環之不窮且運故無窮時亦有替三光垂其極四序成其歲必當觀大象以立規驗周星而取制方今時惟行夏令無苟且帝感於天而克保休祥星回於天而不乖次舍故得律應時貞昭回上清星歸其本歲亦將更遵舊紀而無謬反初元而作程則有博古之士學於太史觀歲杪而星窮知有卒而有始於是徵月令以揮翰談天經而賦美臣度言伏奉去年七月二十五日制書除臣門下侍郎同中書門下平章事充淮西節度觀察處置等使蔡州刺史并淮西宣慰處置等使緣逆賊吳元濟尚拒王師遂於郾城縣權為理所臣篤勵㣥帥潛設多方傾其重兵頓在洄曲今月十七日唐鄧節度使李訴承虛直進生致元凶臣與賈柵三營諸軍便降洄曲三萬餘衆積年逋寇翌日殄除淮右千里通行無礙臣以二十五日領所部兵馬及歸順將士至蔡州上訖豺豕舊穴迎風而汛掃鴟梟故林應節而黃落瞀瞀者咸觀堯日皤皤者重識漢儀臣以不才猥當重寄力排苟且之議上贊聖明之心不敢偷安廟堂遂乞親臨疆埸陛下初猶未一作不許微臣亟請是行睿旨丁寧寵光照耀臣中心自警畢命無憾若不成事必當死綏伏賴神道惡盈罪人斯得而今而後方保餘生就天地削平之功貽策書不朽之美足使懦夫增氣獷俗刳心方偃武以修文故暫勞而永逸臣謹敷揚帝澤宣布國章滌其瑕疵衣以襦袴俾斯汙俗咸若新邦底寧但以才乏折衝任兼中外摩頂至踵諒無非其渥恩知臣者君庶不辱於元鑒無任感激欣喜之至其承薦人自代具於別狀臣某言臣今月某日中使某至伏奉九日制書除臣工部尚書兼御史大夫充彰義軍節度觀察處置等使并賜官告一通旌節一副及手詔等雨露恩覃霑霈易及邱山施重負乘難勝臣某中謝伏惟睿聖文武皇帝陛下文教暢三台武功加四海蕞爾淮寇久稽靈誅蓋懷捨服之心不以虔劉為事既以統之上將撫以中台臣實妄庸獲充二職誠無裨補亦備阽危頃來面辭密奉天旨以為此道必付微臣蒼黃受恩黽勉從事幸擒元惡曾未踰時果復聖言遽承寵命彩章五色虔奉璽書賞罰二權猥操兵柄鴻私薦及蚊力何堪即以今月上訖臣伏聞師之所處荊棘生焉今管內數州凋殘極矣遍郊骸胔比屋瘡痍謹當扇以皇風施之帝澤俾汙俗遷善頑人嚮方知無不為敢竭微志事有未便即當上聞徒以跡遠闕庭戀深皂棧鑿門授鉞空愧於茲執贄奉璋未知何日準敕禁斷印歷日版劍南兩川及淮南道皆以版印歷日鬻於市每歲司天臺未奏頒下新歷其印歷巳滿天下有乖敬授之道張公與君為兄弟欲同力驅兩河歸天子衆所知也今張公沒幼子為亂兵所脅內則誠款隔絶於朝廷外則境土侵逼於強寇孤危若此公安得坐視哉誠能奏天子念先僕射之忠勳捨其子之迫脅使得束身歸闕則公於朝廷有靖亂之功於張氏有繼絶之德矣東陽實會稽西部之郡蘭溪實東陽西鄙之邑歲在戊寅天官署洪君少卿以為之宰君之始至則用信待物用勤集事信故人洽勤故人阜未期月而其政成後三年夏六月豫過其邑洪君導豫以邑之勝賞於是有東峰亭之遊背城之闉半里而近初屆佛剎剎之上方而亭在焉松門蓋空石道如帶足倦纍息然後造夫極焉向之池隍館宇之多旗亭闤闠之喧途道往來之衆簿書鞅掌之繁顧步之際忽焉如失但山風風劉風劉嶺雲峩峩飛軒憑空洞壑在下向背殊狀昏明異色指遙青而點黛者問之則曰某山某巖某林某墅指遠白而曳練者問之則曰某洲某渚某湫某塘高深互呈心目相競飄若象外意其幻成豫既諧其私爰究其本先是邑微登攀遊觀之所洪君曾是挈俸錢二萬經斯營斯因地於山因材於林因工於子來因時於農隙一何易也崇山峻谷佳境勝概帛丿糸亘伏匿一時發朗又何能也君在建中興元之間為江南西道節度使曹王所知時方軍興賊寇壓境供億倉卒賦平人和王實賴之故御史大夫鄭滑節度盧公㣥與君嘗同僚每號之曰精金百鍊良驥千里誠矣然則是邑之理茲亭之勝於君之分不為難能夫播芳塵而鼓餘波者非文莫可遂攬筆為記刊於石而附諸地志焉后不可以獨臨必誕生嶽靈扶既傾繫將絶茲梁國狄公是已興於天授之朝蘊深謀奮奇節也物不可以終否必繼起邦傑欽往績懋來功茲沂國田公是巳挺乎河朔之郊創新祠修舊典也初梁公出牧於魏實宜斯人罔遂乞留則深遺愛闔境同力生祠其神畏威懷仁如在乎上祈恩徼福亦若有答洎胡起幽陵毒痡中邦腥羶遺餘漸漬氓俗十六年於茲矣戰血滿野忠魂歸天階戺之容隱嶙猶在元和壬辰歲我天子恢拓千古之不庭凡在率土罔不來服維元侯保和一心之有衆舉茲列城表正多方歸職貢而奉官司尊漢儀而秉周禮鳳鳴而梟音革蘭芳而棘刺死甘醴涌而盜泉竭慶雲飛而濁祲消四郊廓清萬方丕變然後辨正封疆咨謀耋老得是舊址作為新祠鳩材僝功蕆事頒役上下有度東西惟序披圖以立儀像據品以昭命數不僭不逼經之營之越十月五日厥功成沂國公於是乎請護軍逮賓僚將校虎貔之㣥撰吉而致饗焉先一日執事設次於門西設柔毛翰音腯肥鮮薧之具以俟詰朝公至則改命服於次率護軍等升拜將校以下敘拜於堂下公親酌以奠揚觶而言曰昔者皇風中微陰沴勃興六宮弄其神器萬乘遜於羅川生人之耳目盡回元老之肺肝彌固蹈履虎尾攘奪鯨口剃除蔓草扶持忠賢元良克正萬國居貞祕策潛授五王奮起包復夏之大業於心術貽安劉之永圖於身後再造唐室時維梁公顧不腆之是羞獲守斯土實㣥帥與三軍之衆逮封內之黎老勤請於天王天王重韙斯人而鑒厥誠未及浹辰而璽書金印命服瑞節一日駢至於是又頒非常之清問下莫大之洪澤馬逐逐車闐闐野接跡空駕肩彼感心與喜氣固已翔九天而滲九泉今所靡遑寧居思有上報竊慕神之志義景神之忠功薦神於此堂吉辰良日以微懇陳告至於修廢繼絶興仁樹善乃守臣之職烏敢為名再拜而退由是六州之人士知狄公之崇德可享而田公斯言可復也詩云維其有之是以似之乃作銘曰奕奕新祠於魏之疆巖巖梁公惠此一方其惠伊何其人則亡在昔通天戎虜猖狂衝陷連城勢莫與亢山東繹騷駘藉犬羊顧是都會孰能保障天后召公飛傳靡遑至自彭澤屹為金湯以逸待勞以柔摧剛緩賦寬役勉農勸桑外示無虞內為之防虜則引歸歲獲大穰人荷公來踊躍歡康人惜公遷泣涕倣徨援刀割膚守闕上章終然不克詎可弭忘衆心欲成經始斯堂立公儀形薦此馨香於此祝之萬壽無疆於以歌之久久垂芳追惟我公實邦之良岐嶷有聞金玉其相學以時習暗然日彰文武是經謨謀允臧測圭知正涵鼎難量碩大博厚靖和端莊逮使絶域義聲孔揚居憂致感有鳥呈祥氓於天理決獄平當亟觸龍鱗驟探虎狼西門沈巫汲直開倉蜀守興學晉臣撫牀公兼有之謇謇在旁宣威中權論道上庠慰薦幽仄懷來暴強天授以還燎火無光藹藹本枝困於斧斨下適人願上回天綱拜洛受圖非劉而王后實當扆唐遷於房時維正色中激剛腸婪伊侈謀將易儲皇公陳不可校短推長血瀝太階心祈彼蒼長戈倒日徑草橫霜一柱嶷然四維重張帝拜元老春歸少陽潛安爪牙密布棟梁七日變疾五月興唐道優三仁力茂一匡始終無愧夷夏所望維此魏邦實維樂康燕寇之後中為戰場何人不鰥靡室不喪祠宇煨燼階除虛荒故老懷思遺氓慨慷猶依封畛時奠壺觴否道既傾聖歷會昌元和御宸天子垂裳九夷八蠻山梯海航禮備樂陳執贄奉璋思我懷人置彼周行是生沂公忠順激昂劍久埋獄錐能處囊道言愔愔武烈洸洸業尚管蕭化臻龔黃掃除氛祲弔恤災傷尾斷蜂蠆苗鋤莠稂萬夫歸誠有死無將天子嘉之霈澤瀼瀼龍節虎旗玉佩金鐺班其慶賜覃其潛翔沂公滋恭俯伏兢惶愧負山嶽誓酬毫芒乃建新祠媲彼甘棠航其廈屋繚以周墻吉蠲羞容羽衛兩廂仰止何遠中心是藏地回沙麓河抱衡漳刻勒豐碑揭乎中央能樹休勳著茂功豐人爵列天秩焜耀當代恢張其門者幾何人哉不有營繕乎先宗廟而後宮室不有禋祀乎愴春秋而感霜露大和甲寅歲天平軍節度使檢校尚書右僕射陳郡殷公侑建家廟於京師永平里之東北隅禮也前此表陳其情詔報曰俞勿亟成功度思來格於是乎討獻尸奠盎之茂典徵以繭栗浴蘭之通制冬十有一月卒亥奉工部衛尉騎省三府君李氏周氏劉氏三太夫人神主克祔於其室自西徂東靡陋靡豐守經據古處約為恭追惟我氏之權輿二十一代祖封在東漢桓靈間為諫議大夫出冀州刺史避黨錮棄官挈家屬南渡江棲於曲阿邁德流芳或隱或顯粲於家牒播於人聞十九代至工部府君諱楷字文絢高宗朝四嶽舉高第釋褐拜雍州新豐尉纍遷大理丞天授中以議獄平反為酷吏所陷貶台州永寧丞今上大和八年七月詔追贈工部侍郎衛尉府君諱元覺字元明十八明經出身以工部府君處明夷之時持法不撓謫居而歿未歸舊阡茹荼調選求為寧海尉既克營護祔於先兆遂大布之衣終身不言祿與工部府君同日追贈衛尉少卿騎省府君諱懌字易從少負志氣博學善屬文弱冠遊太學籍甚於公卿間天寶末知天下將亂乃促裝東歸侍太夫人版輿徙居吳郡吳中士大夫得從府君遊者鄉黨以為榮本道采訪使李希言辟為從事奏授試崑山尉浙東節度使薛兼訓請為謀奏授試右衛兵曹參軍並不就事具今東川節度禮部尚書楊嗣復府君神道碑元和至寶歷中纍追贈左散騎常侍於戲三君皆位不充量道屯於時贈典纍錫覃恩逮及天其或者將厥後必有達人疇庸纘服在於茲者不然何陳郡公之龎鴻魁梧磊砢昭彰若此陳郡公大度宏略自誠而明垂髫而早聞立志負笈而見賞先達佐軺軒不辱於絶域升禮闈有聲於奉常爾其起草彌綸剖符愷悌五諫之宏益十連之勞徠徵拜名卿出乘元戎奮餓夫為齊氓化亂邦為善部襁負始至壺漿遽迎錫命就加璽書亟降時以為賀公以為憂桂人洪人滄人鄆人既尸祝之又謳歌之異日鄭伯來朝韓侯入覲執圭有委蛇之狀捧俎申洞屬之容揚名立身養親繼孝賢臣之懿圖彰矣君子之能事畢矣夫碑之於神道者懸窆所用碑之於廟門者麗牲所資先祖無美而稱之之為近誣先祖有美而不稱之之謂不明古之人銘其功烈於鼎今人銘其德善於碑若然則轉石他山搜詞直筆垂悠久於刊刻託堅剛以居諸鼓音無窮鍾慶不匱盡在是巳其銘曰帝里西偏天街右方三室兩廂克建斯堂於惟浸昌云誰經之鄆侯殷君云誰處之祖烈宗文藹然清芬揚名顯親教孝申敬是為率德可以觀政莫之與盛比時備物追遠復始無違享嘗茲用受祉固在元祀祝嘏言具粢盛既飭罔絶敬齊如聞歎息有典有則順考前典聿修明禋事死猶生為能饗親爰奉爰尊於惟皇祖持法不回酷吏所擠竟孤其才僉曰哀哉穆穆王父天鍾孝德啜泣封樹歸全兆域報曰罔極猗那先子超度名輩遠圖中輟貽慶後代元鑒不昧否道既傾復迷非遠奉承如在欽若報本飛章瀝懇秉鉞有虔干城嶷然永懷悽愴長薦吉蠲於斯萬年維皇王能自得師以臻至理維道德克輔於代且非常名天啓聖唐運興我李於赫肇祖實惟元元高宗振其風於前明皇張其教於後十有三葉天子曰敬宗文武大聖廣孝皇帝宏清靜之旨以浸天下闡無為之宗以凝海內寶歷二紀秋八月甲子躬法服御內殿北面執弟子之禮受道於升元先生大矣哉斯所以貫三才籠八極澤及中外仁加動植播中和贊恭默昌聖緒垂帝則而已翌日下明詔加先生之號檢校光祿少卿自內道場送歸於元真之觀居命兩街之緇黃前馬夾路以引以翼萬衆榮觀以為崆峒之請瑤池之宴曾莫我若先生姓劉氏諱從政生於河南緱氏家世奉道彰於前朝而先生超然韙如角立秀出志學之歲辭親就師視冠冕如桎梏顧聲名猶涕唾夫其洞達元解知來藏往體於虛而觀其妙守其朴而反於機由是采氣於三清吸精於兩曜和光於萬有委蛻於重元始事河內張君通元次師中嶽邢君歸一二君之傳授真筌祕訣色授神與而上至於東晉楊君凡十四世其實皆關鍵之固鉤鎖之密莫得而窺至是而悉歸我焉宜其當元門之尊以師道自處先生棲於王屋不啻一紀其後受請遷居都下又承詔至於京師化隨躬行名出心隱故傳法紫宸之後竟遂東還今上端穆清之居緬汾水之想將召舊德而咨要道吾師知之私於門人韓貞漼曰吾將解去先告之期蓋大和四年某月林鍾其日癸亥其春秋七十有八焉嗚呼蘭薰膏明以自迫鶴駕霓旌而難駐貞漼與東夏弟子若干人及關中弟子葉守中等若干人以為吾師之不可攀援者真氣粹容至如章施紀述追琢翠琬使將來瞻之仰之而不怠宜在乎文憑文以導心因心以成志謂宿嘗奉几杖熟遊牆藩俾為銘而揭焉且慰夫餐霞遁俗者之懷煌煌二都各樹其一其辭曰內天外人保和嗇神道之宗兮乘飇駕欻無象有物元之功兮我后敬皇灼其耿光慕崆峒兮吾師升元法於自然繫橋松兮洪惟武文懿此正真紹光風兮金關玉堂靈符寶章闢中宮兮出自幽谷賓於黃屋翊九重兮開陽闔陰忘形守心沃宸聰兮出日入月騰淩滅沒靡不通兮脫俗遁代并包覆載皆可容兮控鶴轡龍倘佯高空躡前蹤兮捐巧棄智挈誠去僞順至公兮戴君奉親後巳先人福乃鍾兮洛都應召京邑承詔隨西東兮泊然泉渟油然雲行恣所從兮從之在勤道將自親滋益恭兮為而不殆績用斯倍吉以逢兮法施經流通明達幽播無窮兮功滿行圓解形默然示有終兮谷神不死蟬脫而巳何哀恫兮鳩血誠而圖石刻者伊貞漼與守中兮
