seq: 911
front:
  text: 全唐文欽定全唐文卷九百十一道宣三
  hash: sha256:61d852f4e284b2b5eda4798398d0081ffa25951d5369f1b376eb2e276a206ffa
body:
  text: 原夫至道絕言非言何以範世言惟引行即行而乃極言是以布五位以擢聖賢表四依以承人法龍圖成大易之漸龜章啟彞倫之用逮於素王繼轍前修舉其四科班生著詞後進宏其九等皆所謂化導之恒規言行之權致者也惟夫大覺之照臨也化敷西壤迹紹東川踰中古而彌新歷諸華而轉盛雖復應移存沒法被澆淳斯乃利見之康莊闕有之宏畧故使體道欽風之士激揚影響之賓會正解而樹言扣元機而即號竝德充宇宙神冠幽明像設煥乎丹青智則光乎緇素固以詳諸經部議未纘其科條竊以䓤河界於剡州風俗分於唐梵華胥撰列非聖不據其篇則二十四依付法之傳是也神州所紀賢愚雜其題引則六代所詳㣥錄是也然則統斯大抵精會所歸莫不振發蒙心網羅正理俾夫駘足九達遺踪望而可尋徇目四馳高山委而仰止昔梁沙門金陵釋寶唱撰名僧傳會稽釋慧皎撰高僧傳創發異部品藻恒流詳覆可觀華質有據而緝裒吳越敘畧魏燕良以博觀未周故得隨聞成彩加以有梁之盛明德云繁薄傳三五數非通敏斯則同世相侮事積由來中原隱括未傳簡錄時無雅贍誰為補之致使歷代高風颯焉終古余青襟之嵗有顧斯文祖習乃存經綸攸闕是用憑諸名器竚對殺青而情計棲遑各師偏競逖聽成簡載紀相尋而物忌先鳴藏舟遽往徒懸積抱終擲光陰敢以不才輒陳筆記引疎聞見即事編韋諒得歷代因之更為冠冕自漢明夢日之後梁武光有以前代別釋門咸流傳史考酌資其故實刪定節其先聞遂得類續前驅昌言大寶季世情縶量重聲華至於鳩聚風猷畧無繼緒惟隋初沙門魏郡釋靈裕儀表綴述有意宏方撰十德記一卷偏敘昭元師保未粵廣嗣通宗餘則孤起支文薄言行狀終亦未馳高觀可為長太息矣故使霑預染毫之客莫不望崖而戾止固其然乎今余所撰恐墜接前緒故不獲己而陳或博諮先達或取訊行人或即目舒之或討讐集傳南北國史附見徽音郊郭碑碣旌其懿德皆撮其志行舉其器畧言約繁簡事通野素足使紹允前良允師後聽始距梁之初運終唐貞觀十有九年一百四十四載包括嶽瀆歷訪華夷正傳三百三十一人附見一百六十人序而申之大為十例一曰譯經二曰解義三曰習禪四曰明律五曰護法六曰感通七曰遺身八曰讀誦九曰興福十曰雜科凡此十條世罕兼美今就其尢最者隨篇擬倫自前傳所敘通例已頒迴互抑揚實遵宏檢且夫經導兩術掩映於嘉苗護法一科綱維於正網必附諸傳述知何續而非功取其拔滯開元固可標於等級餘則隨善立目不競時須布教攝於物情為要解紛靜節總歸於未第區別世務者也至於韜光崇嶽朝宗百靈秀氣逸於山河貞概銷於林薄致有聲喧元谷神凝紫煙高謝於松喬俯眄於窮轍斯皆具諸別紀抑可言乎或復匿迹城闉陸沈浮俗盛業可列而吹噓罕遇故集見勣風素且樹十科結成三袠號曰續高僧傳若夫搜擢源派剖析憲章粗識詞令琢磨行業則備於後論更議而引之必事接恒篇終成詞費則削同前傳猶恨逮於末法世挺知名之僧未覿嘉猷有淪典籍庶將來同好又塵斯意焉觀夫翻繹之功誠遠大矣前錄所載無得稱焉斯何故耶諒以言傳理詣惑遣道清有由寄也所以列代賢聖祖述宏導之風奉信賢明憲章翻譯之意宗師舊轍頗見詞人埏埴既圓稍工其趣至如梵文天語元開大夏之鄉鳥迹方韻出自神州之俗具如別傳曲盡規猷遂有僥倖時譽叨臨傳述逐囀鋪詞返音列喻繁畧科斷比事擬倫語迹雖同校理誠異自非明逾前聖德邁往賢方能隱括殊方用通宏致道安著論五失易窺彥琮屬文八例難涉斯並古今通敘豈妄登臨若夫九代所傳見存簡錄漢魏守本本固去華晉宋傳揚時開義舉文質恢恢諷味餘逸厥斯以降輕扇一期騰實未聞講悟蓋寡皆由詞逐情轉義寫情心共激波瀾永成通式充車溢藏法寶住持得在福流失在訛競故勇猛陳請詞同世華制本受行不惟文綺至聖殷鑒深有其由詳籍所傳滅法故也即事可委况宏識乎然而習俗生常知過難改雖欲徙轍終陷前蹤粵自漢明終於唐運翻傳梵本多信譯人事語易明義求罕見厝情獨斷惟任筆功縱有覆疎還遵舊緒梵僧執葉相等情乖音語莫通是非俱濫至如三學盛典惟詮行旨八藏微言宗開詞義前翻後出靡墜風猷古哲今賢德殊恒律豈非方言重阻臆斷是投世轉澆波奄同浮俗昔聞淳風雅暢既在皇唐綺飾訛雜實鍾季葉不思本實妄接詞鋒競掇芻蕘鄭聲難偃原夫大覺希言絕世特立八音四辯演暢無垠安得凡懷虛參聖慮用為標擬誠非立言雖復樂說不窮隨類各解理開情外詞逸寰中固當斧藻標奇文高金玉方可聲通天樂韻過恒致近者晉宋顏謝之文世尚企而無比况乖於此安可言乎必踵斯蹤時俗變矣其中蕪亂安足涉言往者西涼法讖世號通人後秦童壽時稱僧傑善披文意妙顯精心會達言方風骨流便宏衍於世不虧傳述宋有開士慧嚴寶雲世系賢明勃興前作傳度廣部聯輝絕蹤將非面奉華胥親承詁訓得使聲流千載故其然哉餘則事義相傳足開神府寧得如瓶寫水不妄叨流薄乳之喻復存今日終虧受誦足定澆淳世有奘公獨高聯類往還震動備盡觀方百有餘國君臣謁敬言義接對不待譯人披析幽旨華戎胥悅唐朝後譯不屑古人執本陳勘頻開前失既闕今乖未遑釐正輒畧陳此夫復何言威衞司列等狀詞則美矣其如理何咸不惟故實昧於大義苟以屈膝為敬不悟亡脣之禍內經稱沙門拜俗損君父功德以及壽命而抑令俯伏者胡言之不忍輕發樞機哉雖復各言其志亦何傷之太甚而威衞等狀通塞兩兼司列等狀一途冰執或訪二議優劣余以為楚則失矣齊亦未為得也然兩兼則膚腠冰執乃膏肓故升威衞於乙科退司列於景第至若範公質議旨贍文華隴西執奏言約理舉既而人庶斯穆龜筮叶從故得天渙下覃載隆高尚之美慈育之地更宏拜伏之仁時法侶名僧都鄙耆耋僉曰叶私志矣違教如何於是具顯經文廣陳表啟匪朝伊夕連訴庭闕但天門邃遠伸請靡由奉詔求宗難為去取易曰羝羊觸藩羸其角方之釋侶豈不然歟讚曰威衞之流議雖通塞以人廢道誠未為得司列等狀抑釋從儒拜傷君父詎曰忠謀質議遒華敷陳簡要天人叶允爰垂璽詔恭承明命式抃且歌顧瞻元籍有累如何法俗疇咨咸申啟表披瀝丹款未紆黃道進退惟谷投措靡由仰希神禹疏茲法流維唐乾封二年仲春八日京師西明寺沙門釋道宣乃與㝢內嶽瀆諸州沙門商較律議討擊機務敢於京南遠郊灃福二水之陰鄉曰清官里稱遵善持律眾所建立戒壇原夫戒定慧法眾聖之良筌攝律善生三佛之津導是知戒為入聖之本為出俗之基皇覺寄此而開權正法由之而久住所以四依御㝢必祖戒而啟蒙泉五乘方駕亦因戒而張化首自法流東漸居七百年戒場之壇名實所爽律論所顯場壇兩馳各備機緣隨事便舉有晉陽輦南林戒壇德鎧聖士厥初基搆中原正偽蔑爾無聞有以大界為戒場有以平場為壇上斯由法被三廢後興在於羈縻或由師心獨斷討論絕於經教若夫創置戒壇專宏戒本良由律儀所攝用統有空約情充牣於大千論法合通於六位陰入界處莫非戒緣上聖下凡咸資戒護遂使小戒大戒開行業之始終有願無願顯因心之漸頓經敘菩薩戒聚非白四而不生律明聲聞正禁因千僧而克果若欲行斯羯磨要假壇場故以戒法為名全是淨行之本大界初興僧法兩設至論作業戒壇則多此則僧住法住各有其致今立戒壇之場備依教旨豎三標而分兩界圍空地而絕錯疑先結小界為場壇之本依自然而集僧曉同別之殊致三述戒場之外相白二約而結之故使三階肅而峙列委登降之接足四維晏而在隅識辰晷之斜正後結大界僧出戒場隨相各集別唱別結因使四處僧事無乖別之蹤六和顯德有乘權之務作業成遂七萬之嵗不亡德僧自在三災之變無沒由斯以言戒場之舉不徒設也成則佛法常住壞則正教淪亡此言匪妄又彌慎也是知受隨二戒寄斯地而克隆持犯兩儀亦因茲而還淨故經云若無此戒諸善不生諒是定慧之本基誠即業惑之良藥也比人行事輕斯者多不築壇基隨宜授受或妄結小界曾非難緣或輒居佛殿僧皆背像或在空迥或在村坊迷昏別眾誦文徒結斯塗紛糅無足敘之故僧傳云中國僧來欲受戒者揚都行事並在江舟別結而受有問其故答曰結界法本同別難知故於舟中相絕非難說戒等法不成乍可夫欲住持正法宏護聖儀斷絕煩惱非戒不得脫非界地戒業無依虛承剃染心無聖法徒喪一生終淪萬劫豈不累於自他虛為釋尊之種也故彼梵僧勤勤若此此生死人平平若此彌天所誡可不思哉有人聞結驚而私誚余告之曰非敢立異斯乃一同經教具周人不行爾竊以淨教所詮依法為本文明四說之印遺誥三藏之功順則揚三寶之初秋違則滅四僧之後轍文云戒場極小容二十一人明壇上之廣量也應至舒手及處明壇非覆障之內也應畱中間明二界非相接也先結場已天界繞之明初後之軌儀也但置佛殿明僧寶之所依也若有僧住有慚剔除明有善僧宏崇戒護易成就也文有臨壇師壇上僧則非場地之恒度也此壇惟存戒住今則多有僧住固可詳諸誠教若斯義難隱忍所以狀白敘構業業兢兢晨夕讐校仰遵遺寄輒備通引永垂無昧云爾原夫戒壇之興其來久矣肇於祗樹之始流漸淮海之陰開佛化之羽儀扇仁風於寰㝢遂得定慧攸託非戒壇無以成基業行是依必律儀方能戡濟其德既廣非恒地之所任持其績既高豈常務而能構克故使於僧院內別置戒場又於場中增基列陛階除四布壇塔高嚴幽明之所監護凡聖於焉景仰集僧作業經三災而莫虧登降受行歷萬古而長騖是則慈化宏遠誠資戒德之功煩惑廓消咸假場壇之力統其績也豈不盛哉若不式樹旌銘將何啟其津徑畧述所緣其辭曰幽關末啟妙茲宏導匪藉能仁誰其覆燾覆燾伊何諒惟戒力三聖位隆四生仰極昏俗作梗煩勞晨息綿茲長往於何取則在昔給園皇覺顧命創築場壇開敷嘉令金河既竭玉門高映道流淮海南林一盛周發靈臺漢徹明堂事遵往帝締構餘皇戒壇式緒時惟法王用隆化本永永無疆爰有英達厥稱僧傑德懋時雄智包髦烈齊梁作範緇素垂節廣樹法場挂張像設是號文國山夷海截有惑斯宗人坑法滅中原失緒三犯凶咽仁祠奄室法侶興悲考定斯咎明壇靡基敢遵往則式表離辭永鎮終古茲文在茲惟大唐乾封二年嵗在丁卯孟夏朔日京師西明寺沙門釋道宣與諸嶽瀆沙門會於前鄉之道場平章法律仰惟三聖垂教以戒為先四生歸德遵塗莫絕遂使住法六萬之壽作化在於律儀時經三變之秋啟務資於定慧所以敢承餘烈克構場壇陳瘞靈軀鎮茲福地冀願皇覺慈照景業統宇宙而無疆垂裕含光神功諒戡濟而逾遠序之不足畧為短銘其辭曰皇矣正覺作化在三戒為良導萬善攸談冰凉於水青更逾藍非斯組織餘則誰甘嶽瀆法儔乘時蔚峙板築福壇猶登岵屺戒護是昇幽明咸履悠哉後人則為高軌敢述時緣徧流芳紀余以乾封二年二月八日創築戒壇四方嶽瀆沙門尋聲遠集者二十餘人至於夏初眾侶更集載受具戒多是遠人京寺同學咸來觀化余以法利希行恐有乖忤和悅上下務成為先有京師西明寺真懿律師今之律匠也彭亨勇銳最所忌情恐東迴左繞傷俗之行事也余諭之曰律師勿見東迴左繞以為非法耶此天常之大理也人惑左右習俗罕分深願體之勿慮非咎便答余云此不敢怪也吾昔見大莊嚴寺大德恭禪師若行道時必東迴北轉此為右繞彼告吾云子不見俗中城門耶東入西出咸言左出右入也如是云云行事之家觀時制度餘方不為清淨則不行之余七十暮年腳疾摧朽顧求法者不遠關山今秋氣已清客心飛舉將事終天之別必爽載面之期力疾集之用為送終之贈也言此飲淚窮獨可悲乾封二年二月十四日
