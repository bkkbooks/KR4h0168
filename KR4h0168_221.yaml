front:
  text: 全唐文欽定全唐文卷二百二十一說字道濟又字說之其先范陽人徙家河南之洛陽弱冠應詔舉對策乙第授太子校書中宗朝歷工部兵部侍郎加宏文館學士睿宗景雲二年同中書門下平章事轉尚書左丞罷知政事徵拜中書令出為相州刺史開元九年拜兵部尚書同中書門下三品為朔方軍節度大使十三年授集賢院學士知院事將東封授右丞相兼中書令致仕在家修史十七年復拜尚書左丞相加開府儀同三司十八年卒年六十四追贈太師諡曰文貞
