body:
  text: 愚臣啟先王之冊府校絕瑞於祥經樂雲雨之平施齊品物之流形帝王爭重而為寶麟鳳自輕而讓靈況愆時而渴望歘意達而神聽是月也朱明漸半紫榴未吐恐降災兮此下人罄虔祈兮我仁主退象龍之禮禱斥持鷺之貌舞屏翳慙其廢職祝融悔其遷怒山泱漭而出雲天霶雨氵它而下雨速一言而感應剋三日而周溥氣滃靄以黭黮聲颯灑以蕭條漼如雲漢之屑落散似珠泉之歕澆街廛漫其潢潦臯壤萋其綠苗舒四溟之清潤卷六合之煩囂咸澡骨於神液共歡心於聖朝借如五月有梅雨之名三春有穀雨之氣越人以泥牛代沃胡土以賣龍求費出員嶠而石香入成都而酒味彼偏方與小節非大人之所貴復有送山祇於鬱島迎海后於葛川疾雷碎其山裂走電煜其海然天子作愁霖之賦詞人綴苦雨之篇牆屋壞於倒井黍稷沈於下田乃凶祲之不令曷休徵之有焉請言瑞雨之可喜也協氣交泰嘉生是賴湛覃而不溺衍溢而無害東漸出日之表西被無雷之外南窮火鼠之譯北盡燭龍之會天文則雲漢昭回天澤則江河霶霈雖欲談天而窺管孰知堯德之為大咨大鈞之播氣在品物而流形有莫黑之凡族亦變白而效靈感上仁於孝道合中瑞於祥經若夫事出神妙理包舒卷貺集王屋飛隨帝輦捧日高翥迎風細轉識句句於招呼每啞啞於啄吮以其雪羽霜毛冰精玉狀拔奇綠林之下賞異紫臺之上瞰鳷鵲之紗窗抱鳳凰之衣桁恐同類之見嫉畏不才之速謗期委命於渥恩豈願思於閑放惟聖君之靈囿物何遠而不臻有能言而可重或善舞而取珍羞陋軀而入獻與寶羽而為鄰采朝噪之聲樂眷夜啼之曲新無芒距以耀武不鈎觜以懷仁謝先容而特達却假飾以全真鑒深心於反哺終報德於君親明月窗前古樹檐邊無北堂之樽酒絕南鄰之管絃理涉虛趣心階靜緣室惟生白人則思元厭百慮之勞止歸一途之兀然嗟乎巧智首亂禮樂增矯名起異端利成貪兆役二見之交戰驅五神而雜擾形何費而不衰性何煩而不夭每竭源而追末必亡多而獲少玉帳瓊宮圖奢務豐朱門金穴恃滿矜隆榮與辱而俱盛事隨憂而不窮陷營為之桎梏留健羨之池籠心元是幻法本皆空莫不因無證實假異生同魚何知而樂水蛇何意而憐風大哉默識守此元通顧瞻天下還如夢中江上之峻山兮鬱崎嶬而不極雲為峯兮煙為色歘變態兮心不識江上之深林兮杳冥濛而不已鳥為花兮猿為子紛盪瀁兮言莫擬夏雲陰兮若山秋水平兮若天冬沙飛兮淅淅春草靡兮芊芊感四節之默運知萬化之潛遷伴衆鳥兮寒渚望孤帆兮日邊雖欲貫愁腸於巧筆紡離夢於哀絃是心也非模放之所逮將有言兮是然將無言兮是然青泥路白馬關雲足躡霞手攀忠臣往兮孝子還陟羊腸臨鳥道搏絕岸援蔓草懸梁孌娜以樹接虛閣穹崇而烟抱風雨櫛汨兮崩泉而險湍圖畫詭屈兮紅峯而碧巒林黝黝而人靜山嵾嵾而地寒客有夢兮在城闕背芳萱兮心不歇憫秋草之墜露弔窮崖之飛月聞哀猿之一鳴憂人宿昔兮生白髮太古厥初遺文闕矣書祖二典聿陳五教唐虞之訓歷代宗焉孰同理而不休奚同亂而克韙皇唐之興也道積四聖時將百年澤浸生人自根流葉孝和晏駕嗣子幼沖凶臣嬖女蹙弱王室人甚崩角之危朝深綴旒之歎賴天奬忠勇大戮鯨鯢尊文廟而安神清帝宮而待聖少主奉天命以至禪皇上拒天命以固違㣥公卿士胥進曰陛下孝弟之至歷數在躬處儲闈有讓元子之德居藩邸有辭太弟之高六合欣戴三靈允協為天下君其誰與讓皇帝義不得巳曰吁所憂之長也乃被帝服陟元后延㣥臣見兆人是日也景雲至茲歲也戎狄來其尤祥極瑞雜沓異類葢翫狎而不記矣上方謹庶務覽衆則履乾乾懷翼翼游道德之靈囿從鸞鷺之珍㣥視天下之所不見聽天下之所不聞帝典皇綱於斯備矣宜定郊報之禮革封禪之則荅神貺揚元德不然者則二宗無類帝之壇五岳無省方之館矣若夫湯頌傳於考父文什著於周公臣子之志不可闕也敢作頌曰天祚聖唐啟我明主大哉皇帝與天同矩天乎葢之地乎載之陽和化育懷生賴之孝乎惟孝告成於天靈壇神岳思皇嘏焉皇哉皇哉胡可捨旃大君受命景雲來翔流天汎日爛漫成章稽諸瑞典昔祚軒皇而今表聖土德以昌西戎遠國畏君之靈古稱即序今乃來庭帝女是降其從如星天人偃革以迄太寧北胡狙獷狃於征伐帝初歷試護彼窮髮懷我好音稽顙天闕遐哉大同天子之功日抱戴皇帝初臨潞州景龍元年四月二十有七日其日日抱戴頌曰日告帝符王起乘土重光五色四方之主或抱或戴氣華暉嫵大明經天豈忘忠輔皇帝臨潞州景龍元年七月十有四日夜月重輪頌曰維帝潛德受天眷命月之重輪示我金鏡璧彩內澈環規外映君心用明神道協慶皇帝臨潞州景龍二年四月二十五日廳事據案假寐百姓白鶴觀道士宋大辯等三十餘人同見赤龍在案頌曰聖寐無體神融氣渙蜿然赤龍垂首據案昔有王媼預覩興漢今此潞人亦兆靈觀皇帝景龍二年二月二十有八日巡屬縣至潞河有鹿奔走渡河水深三丈帝馳鞭逐鹿水不及馬韉應時獲鹿司戶叅軍崔弼隨帝而涉纔入數步馬溺焉頌曰王者之畋必有天佐逐鹿深水乘躍而過不失其馳舍矢如破後騎沒溺乃驗靈迹皇帝臨潞州景龍二年八月二十有五日長子縣界內有嘉禾合穗頌曰靈氣滋液嘉禾族生或分九穗有合雙莖昔効唐叔歸功太平今於歷試抽此德萌皇帝臨潞州景龍二年九月五日黃龍見於州城東五里伏牛山南岡遲留久之觀者如堵頌曰黃龍土精五方之長在田而見文明厥象軒圖瑞來夏匱妖往惟德可應恃神難誷皇帝臨潞州景龍二年九月巳後嘗有童謠云羊頭山北作朝堂其州南六十里有羊頭山頌曰熒惑降精是為天使會合齠齔謳謠街市通賢妙識採斷來事山北朝堂此明天位皇帝臨潞州襄垣縣北有仙洞忽然自開十數里仙乳靈液凝膏注玉頌曰憑乘仙穴應吳建號襄垣洞開神亦我報玉膏滴瀝石巷幽奧天將佑之陰靈啟道上黨記禹治水而登此山因名焉魏書云望氣者言其山有天子氣故太武壘石為三封欲以厭之頌曰昔望茲山當出天子太武心忌壓以軍壘地氣雖廢河清有俟三百餘年聖人方起上黨記後魏太和末孝文帝自代幸洛見此山有伏龍疑而不進遂斷山東麓以厭之其斷處猶存因名疑山頌曰王命必有厭勝多無不徵綠錯虛役丹徒舊山伏氣今聖靈符魏雖穿鑿能違天乎皇帝景龍三年三月巡屬縣至襄垣南漳水上有赤鯉魚騰躍頌曰龍或魚服鯉同國姓躍泉將飛告我天命麟昭武德翼贊興慶昔去隨仙今來迓聖皇帝臨潞州景龍三年六月十五日黃龍再見於伏牛山頌曰蜿蜿黃龍既見將躍氣動雲繞精流電鑠文明剛健嫵媚纎弱萬物覩焉聖人其作皇帝臨潞州景龍三年九月九日與㣥臣壺口山界坐其時東北有紫雲翩翩而來光彩照日明日上黨縣丞王敬賓等白刺史劉懷一并啟皇帝請上狀奉教不許頌曰天臨壺口露座山眉紫雲來覆如葢如帷畢景不滅含風自持一人有慶兆人賴之皇帝臨潞州延唐寺有李樹連理皇帝親如驗見今御書額焉頌曰李興帝族寺榜延唐異枝同幹雙名合祥花轉瑤萼子綴珠光本支百代永永蕃昌皇帝臨潞州景龍三年九月十有五日召百姓韓擬禮蓍筮卦未成而一蓍翹立擬禮曰此天人之瑞洎帝踐祚授擬禮遊擊將軍長上折衝頌曰纎纎靈蓍下有伏龜天生神物以決狐疑一蓍特起自天立之無卦之卦告帝之期金橋在潞南二里常有童謠云聖人執節度金橋皇帝景龍三年十月二十有五日由此橋朝京師頌曰出郡二里橫路金橋聖人南渡駟馬西朝運及誅呂時當煥堯去尋後事一合童謠皇帝臨潞州景龍三年十月二十有五日還京後州內所居寢堂上有紫氣七日不散頌曰王往京國傾城戀惋紫氣浮空七日不散斐亹牕戶輪囷臺觀都人係心瞻仰雲漢皇帝從臨潞州還京後其宅內及州街並有大人跡長二尺五寸自東而西布武相繼頌曰百神從王一舉西適衆觀空廨連步雲跡躡似郊媒痕同雷澤曠古奇事存乎帝籍皇帝唐隆元年六月二十日夜除妖孽後其明日州佐吏索崇嗣于州南門外聞空中有人云臨淄王誅韋氏相王得天下其崇嗣告長史裴思裴思以妖惑罪之禁錮累日逢其月二十一日赦到獲免案牘猶存頌曰天帝下席承韋干命王赫斯興撥亂反正擊凶尊主一麾大定神人相歡肸蠁傳慶皇矣上帝臨下有赫降監四海求人之瘼吁彼隋煬其政不獲眷我高祖此惟其宅天輔臯陶明刑弼教道尊老氏同元體妙仁表四乳明融獨照隨父託心史良辯貌高祖誕靈神光夜耀天妹作合日兄夢紹祚生文帝膺運會昌首唱高祖騫飛晉陽萬夫一心元戎啟行火旗炎炎雲鳥洋洋五星迓帝萬國謳唐天網恢疎王師節制威惟連戮老生摧斃山祇引軍河龍渡帝渭倉散積離宮弛閉關輔來蘇遠方咸惠長安宮室上法太微隋遷寶鼎唐在璿璣仗入雙闕詔出九圍三靈協載百祿同歸帝謂太宗表正封略濤蕩飈掃霆馳電鑠劒不摧鋒弩無再彍西平隴東取河洛杲密德充頭懸面縛北走獯鬻南達蠻荊遼碣作乂梁岐厎平風動神行海隅蒼生莫不來庭於昭義堂誓衆資始天命所起于胥頌美維予小子夙夜敬止於戲皇王緒思不忘惟開元十有一祀正月皇帝展義於河東挾右太行留宴上黨整兵耀武入於太原設都建頌以崇王業南轅汾脽祈穀后土天清日朗神歆如荅三月庚午飲至長安六軍解嚴四方和會邇觀法象遐詠德澤大虞巡之典修美漢祠之禮舉人心翕而一變神物效而無方於是邠王臣守禮寧王臣憲申王臣撝岐王臣範薛王臣業獻書於內開府儀同三司臣璟尚書臣晙臣象先臣頲御史大夫臣漼抗疏於外僉曰陛下受天歷數稽聖典謨道貫三靈仁育萬類掃陰沴而覩日開闢之功也尊文考而御天帝王之孝也天以陛下為子人奉陛下為君萬殊之福斯應畢臻三代之風頌聲咸作今潞人懷代邸詠泗亭採聖崖延元石將表潛龍之館勒啟聖之圖勤亦至矣陛下推而不報其何以下塞衆望上對神庥哉臣聞天之所啟人之所戴必憑睿聖元懿之德元命貞符之紀功業見乎變德施加乎時德厚者施溥功元者應速或階晦以彰或由難而昌葢生其德之謂天授其時之謂命天有成命其可沒乎陛下昔居是州也紫雲在天神光照室白鹿來擾黃龍上昇隴出仙洞而神魚躍山開禪穴而靈鐘韻謠言合讖巨迹引途嘉李傍連神蓍自起當此時也金石豫變獄頌先歸政殷六府人重五教陶無窳器漁有讓泉神而化之人不知力昔龍負圖而大舜登狼銜鈎而后殷昌元圭錫於夏禹赤伏歸於漢光應運協符希代稱寶未有窮祥極瑞俶儻王褱異如今之至者矣若元貺集而不彰則神心不悅鴻業成而不贊則祝告無聞是掩天庥而葢聖德也臣子之罪將何解焉願聽潞人以揚丕烈帝曰往者中宗違代國步維艱天祚我唐大命集於睿宗大聖真皇帝朕畏天將命不敢怠遑其乾符坤珍皆先聖之餘福朕何力之有焉然重違昆弟公卿之請抑心敬從無為虛美重朕不德也㣥臣游聖蕩莫能名約乎舊史敢頌成績辭曰帝德廣運乃聖乃神天祚聖兮唐雖舊邦其命維新再受命兮帝初正人降居上黨天下往兮黃龍晝見攀天而上九五象兮帝適於野紫雲之下求必在兮帝寢於堂變龍有光觀者駭兮天迹星謠木連蓍立總神異兮靈鐘化穴縞鹿赤魚何詭異兮上天無聲託類附形覺悟人兮聖皇齋栗在得戒失昭事神兮皤皤潞老樂我王道愛舊宮兮赫赫頌功與天比崇攄無窮兮皇帝六葉開元神武皇帝再受命致太平乃封岱宗禪社首鑿石紀號天文煥發儒臣志美立碣祠壇曰厥初生人俶有君臣其道茫昧其風朴略因時而欻起與運而紛落泯泯沒沒無聞焉爾後代聖人取法象立名位衣裳以等之甲兵以怛之於是禮樂出而書記存焉反其源致敬乎天地報其本致美乎鬼神則封禪者帝王受天命告成功之為也閱曩聖之奧訓考列辟之通術疇若天而不成曷背道而靡失由此推之封禪之義有三帝王之略有七七者何傳不云乎道德仁義禮智信乎順之稱聖哲逆之號狂悖三者何一位當五行圖籙之序二時會四海昇平之運三德具欽明文思之美是謂與天合符名不死矣有一不足而云封禪人且未許其如天何言舊史者君莫道於陶唐虞舜臣莫德於臯陶稷离三臣備德皆有天下仲尼敘帝王之書繫魯秦之誓明魯祀周公用王禮秦承伯益接周統孔聖微旨不其效與然秦定天下之功高享天祿之日淺天而未忘庭堅之德也故大命復集於皇家天之贊唐不惟舊矣其興之也元靈啟迪黃祇顧懷應歸運以義舉撫來蘇以利見濩也無放夏之慚武也無伐殷之戰高祖創業四宗重光有德格天漏泉蒸雲濡露菌蠢滋育氤氳涵煦若天地之覆載日月之照臨溥有形而希景罄無外而宅心百有八年於茲矣皇帝攘內難而啟新命戴睿宗而纘舊服宇宙更闢朝廷始位葢羲軒氏之造皇圖也九族敦敘百姓昭明萬邦咸和黎人於變立土圭以步歷革銅渾以正天葢唐虞氏之張帝道也天地四時六宮著禮井田三壤五圻成賦廣九廟以尊祖定六律以和神葢三代之設王制也武緯之文經之聖謩之神化之然猶戰戰兢兢日慎一日納規誨以進德遂忠良以代工講習乎無為之書討論乎集賢之殿寵勇爵貴經明翼乎鵷鸞之列在庭毅乎貔貅之師居鄙人和旁感神寶沓至乾符坤珍千品萬類超圖溢牒未始聞記我后以人瑞為心不以物瑞為意王公卿士儼然進曰休哉陛下孝至於天政合乎道前年祈后土人獲大穰閒歲祀圓丘日不奄朔感祥以祈聖因事以觀天天人交合其則不遠意者喬岳掃路望翠華之來上帝儲恩俟蒼璧之禮久矣焉可專讓而廢舊勛㣥臣固言勤帝知罪至於再至於三帝乃挹之曰欽崇天道俯率嘉話恐德不類敢憚於勤其撰巡狩之儀求封禪之故既而禮官不戒而備軍政不謀而輯天姥練日雨師灑道六甲按隊八陣警蹕孟冬仲旬乘輿乃出千旗雲引萬㦸林行霍濩燐爛飛焰揚精原野為之震動草木為之風生歷郡縣省謠俗問百年舉百祀興墜典葺闕政攸徂之人室家相慶萬方縱觀千里如堵城邑連歡邱陵聚舞其中垂白之老樂過以泣不圖蒿里之魂復見乾封之事堯雲往舜日還神華靈鬱爛漫乎穹壤之閒是月來至於岱宗祗祓齋宮滌濯靜室凝神元覽將款太乙議夫泰山者聖帝受天官之宮天孫總人靈之府自昔立國莫知萬數克升中而建號惟七十而有五我高宗六之而今七矣非夫尊位盛時明德曠代遼濶難并之甚哉先時將臻夫大封也累封疆於高岡築泰壇於陽趾夫其天壇三襲辰陛十二咸秩衆靈列坐有次崇牙樹羽管磬鏞鼓宮懸於重壝之內干戚金义殳鈎㦸戣瞿戈周位於四門之外伐國重器傳代絕瑞旅之於中庭玉輦金轂翠冒黃屋夾之於端路庶官百辟羌夷蠻貊襃成之後讓王之客序立於禮神之場旄頭弩牙鐵馬金鏃介冑如雪旗幟如火遠匝於清禁之野於是乎以天正上元法駕徐進屯千乘於平路留㣥臣於谷口皇帝御六龍陟萬仞獨與一二元老執事之人出天門臨日觀次沆瀣宿巉巖赤霄可接白雲在下庚寅祀高祖於上封以配上帝命衆官於下位以享衆神皇帝冕裘登壇奠獻俯僂叶金奏佾羽舞撞黃鐘歌大呂開閶闔與天語清將信公奉斗布度懋建皇極勤恤蒼生昭假乎未兆禳災乎未萌上下傳節而禮成樂遍福壽同歸而帝賜神策乃檢玉牒於中頂揚柴燎於高天庶忠誠之上達若憑焰而駕煙日轡方旋神心餘眷五色雲起拂馬以隨人萬歲山呼從天而至地越翼日尊睿宗侑地祇而禮社首遂張大樂覲東后國風惟舊無黜幽削爵之誅王澤惟新有眚灾大賚之慶不浹日至化洽於人心不崇朝景福遍於天下然後藏金匱於祏室迴玉鸞於上都煌煌乎真聖朝之能事而高代之盛節者也於斯之時華戎殊俗異音同歎曰兵合多雨山峻多雲豈有大舉百萬之師剋期千里之外及行事之日則天無點翳地無纎塵嚴冬變為韶熹寒谷鬱為和氣非至德其孰能動天如此其順者乎昔人云自西自東自南自北無思不服今信知聖人作而萬物覩其心服之之謂矣或曰祭泰折主先后非禮與曰是禮也非宜也王者父事天母事地侑神崇孝無嫌可也且夫柴瘞外事帝王主之烝嘗內事后助之是開元正人倫革弊禮起百王之法也故令千載睋末光聆絕韻咀甘實潄芳潤爍元妙之至精流不巳之淑聲臣說作頌告於神明四皇墳而六帝典雖吉甫亦莫能名徒採彼輿人之詩曰大矣哉維天為大惟皇則之率我萬國受天之祺子孫百代人神共保綏之云爾而已矣
