front:
  text: 全唐文欽定全唐文卷一百六十四公彥洺州永平人永徽中官太學博士
  hash: sha256:397ac53a2e623282838ecf85fd30fc3a232998d6f4d143db2f83120182863891
  markers:
  - {type: head, offset: 14, content: 賈公彥, id: KR4h0168_NFKB_164-h1, level: 1}
body:
  text: 夫天育蒸民無主則亂立君治亂事資賢輔但天皇地皇之日無事安民降自燧皇方有臣矣是以易通卦驗云天地成位君臣道生君有五期輔有三名注云三名公卿大夫又云燧皇始出握機矩表計置其刻日蒼牙通靈昌之成孔演命明道經注云拒燧皇謂人皇在伏羲前風姓始王天下者斗機云所謂人皇九頭兄弟九人別長九州者也是政教君臣起自人皇之世至伏羲因之故文耀鉤云伏羲作易名官者也又案論語撰考云黃帝受地形象天文以制官伏羲以前雖有三名未必具立官位至黃帝名位乃具是以春秋緯命歷序云有九頭紀時有臣無官位尊卑之別燧皇伏羲既有官則其間九皇六十四民有官明矣但無文字以知其官號也按左傳昭十七年云秋郯子來朝公與之宴昭子問焉曰少皡氏以鳥名官何故也杜氏注云少皡金天氏黃帝之子已姓之祖也郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名注云黃帝軒轅氏姬姓之祖也黃帝受命有雲瑞故以雲紀事百官師長皆以雲為名號縉雲氏蓋其一官也炎帝氏以火紀故為火師而火名注云炎帝神農氏姜姓之祖也亦有火瑞以火紀事名百官也共工氏以水紀故為水師而水名注云共工以諸侯霸有九州者在神農前太皡後亦受水瑞以水名官也太皞氏以龍紀故為龍師而龍名注云太皞伏羲氏風姓之祖也有龍瑞故以龍命官也我高祖少皡摯之立也鳳鳥適至故紀於鳥故為鳥師而鳥名又云鳳鳥氏歷正之類又以五鳥五鳩九扈五雉並為官長亦皆有屬官但無文以言之若然則自上以來所云官者皆是官長故皆云師以目之又云自顓頊以來不能紀遠乃紀於近是以少皡以前天下之號象其德百官之號象其徵顓頊以來天下之號因其地百官之號因其事事即司徒司馬之類是也若然前少皞氏言祝鳩氏為司徒者本名祝鳩言司徒者以後代官况之自少皡以上官數略如上說顓頊及堯官數雖無明說可略而言之矣按昭二十九年魏獻子曰社稷五祀誰氏之五官蔡墨對曰少皡氏有四叔曰重曰該曰修曰熙實能金木及水使重為勾芒該為蓐收修及熙為元冥世不失職遂濟窮桑此其三祀也注云窮桑帝少皡之號也顓頊氏有子曰犂為祝融共工氏有子曰勾龍為后土此其二祀也后土為社稷田正也有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之故外傳犂為高辛氏之火正此皆顓頊時之官也按鄭語云重犂為高辛氏火正故堯典注高辛氏之世命重為南正司天犂為火正司地以高辛與顓頊相繼無隔故重犂事顓頊又事高辛若稷契與禹事堯又事舜是以昭十七年服注顓頊之下云春官為木正夏官為火正秋官為金正冬官為水正中官為土正高辛氏因之故傳云遂濟窮桑窮桑顓頊所居是度顓頊至高辛也若然高辛氏之官唯有重犂及春之木正之等不見更有餘官也至於堯舜官號稍改楚語云堯復育重犂之後重犂之後即羲和也是以堯典云乃命羲和注云高辛之世命重為南正司天犂為火正司地堯育重犂之後羲氏和氏之子賢者使掌舊職天地之官亦紀於近命以民事其時官名蓋曰稷司徒是天官稷也地官司徒也又云分命羲仲申命羲叔分命和仲申命和叔使分主四方注仲叔亦羲和之子堯既分陰陽四時又命四子為之官掌四時者字曰仲叔則掌天地者其曰伯乎是有六官案下歡兜曰共工注共工水官也至下舜求百揆禹讓稷契暨咎繇帝曰棄黎民阻饑汝后稷播時百穀注稷棄也初堯天官為稷又云帝曰契百姓不親汝作司徒又云帝曰咎繇汝作士此三官是堯時事舜因禹讓述其前功下文云舜命伯夷為秩宗舜時官也以先後參之唯無夏官之名以餘官約之夏傳云司馬在前又後代况之則羲叔為夏官是司馬也故分命仲叔注云官名蓋春為秩宗夏為司馬秋為士冬為共工通稷與司徒是六官之名見也鄭元分陰陽為四時者非謂時無四時官始分陰陽為四時但分高辛時重犂之天地官使兼主四時耳而云仲叔故云掌天地者其曰伯乎若然堯典云伯禹作司空四時官不數之者鄭云初堯冬官為共工舜舉禹治水堯知其有聖德必成功故改命司空以官名寵異之非常官也至禹登百秩之任捨司空之職為共工與虞故曰垂作共工益作朕虞是也按堯典又云帝曰疇咨若時登庸鄭注云堯末時羲和之子皆死庶績多闕而官廢當此之時歡兜共工更相薦舉下又云帝曰四嶽湯湯洪水有能俾乂鄭云四嶽四時之官主四嶽之事始羲和之時主四嶽者謂之四伯至其死分嶽事置八伯皆王官其八伯唯歡兜共工放齊骨玄四人而已其餘四人無文可知按周官云唐虞稽古建官惟百內有百揆四嶽則四嶽之外更有百揆之官者但堯初天官為稷至堯試舜天官之任謂之百揆舜即真之後命禹為之即天官也按尚書傳云惟元祀巡狩四嶽八伯注云舜格文祖之年堯始以羲和為六卿春夏秋冬者並掌方嶽之事是為四嶽出則為伯其後稍死歡兜共工求代乃置八伯元祀者除堯喪舜即真之年九州言八伯者據畿外八州鄭云畿內不置伯鄉遂之吏主之按明堂位云有虞氏官五十夏后氏官百殷二百周三百鄭注云有虞氏官蓋六十夏百二十殷二百四十周三百六十不得如此記也昏義云三公九卿二十七大夫八十一元士鄭云蓋夏制依此差限故不從記文但虞官六十唐則未聞堯舜道同或皆六十並屬官言之則皆有百故成王周官云唐虞建官惟百也若然自高陽以前官名略言於上至於帝嚳官號略依高陽不可具悉其唐虞之官惟四嶽百揆與六卿又堯典有典樂納言之職至於餘官未聞其號夏官百有二十公卿大夫元士具列其數殷官二百四十雖未具顯案下曲禮云六大五官六府六工之等鄭皆云殷法至於屬官之號亦薎云焉案昏義云三公九卿者六卿並三孤而言九其三公又下兼六卿故書傳云司徒公司馬公司空公各兼二卿按顧命太保領冡宰畢公領司馬毛公領司空別有芮伯為司徒丹伯為宗伯衛侯為司寇則周時三公各兼一卿之職與古異矣但周監二代郁郁乎文所以象天立官而官益備此則官號㳂革粗而言也竊聞道本沖虛非言無以表其疏言有微妙非釋無以悟其理是知聖人言曲事資注釋而成至於周禮儀禮發源是一理有終始分為二部並是周公攝政太平之書周禮為末儀禮為本本則難明末便易曉是以周禮注者則有多門儀禮所注後鄭而已其為章疏則有二家信都黃慶者齊之盛德李孟哲者隋曰碩儒慶則舉大略小經注稍周猶登山遠望而近不知哲則舉小略大經注稍周似入室近觀而遠不察二家之疏互有修短時之所尚李則為先案士冠三家有緇布冠皮辨爵辨既冠又著元冠見於君有此四種之冠故記人下陳緇布冠委貌周辨以釋經之四種經之與記都無天子冠法而李云委貌與辨皆天子始冠之冠李之謬也喪服一篇凶禮之要是以南北二家章疏甚多時之所以皆資黃氏按鄭注喪服引禮記檀弓云絰之言實也明孝子有忠實之心故為制此服焉則絰之所作表心明矣而黃氏妄云哀以表心絰以表首以黃氏公違鄭注黃之謬也黃李之訓略言其一餘足見矣今以先儒失路後宜易塗故悉鄙情聊裁此疏未敢專欲以諸家為本擇善而從兼增已義仍取四門助教李元植詳論可否僉謀已定庶可施矣函丈之儒青襟之俊幸以去瑕取玖得無譏焉元光字廷炬光州人高宗朝以左玉鈐衛翊府左郎將戌閩遷嶺南行軍總管泉潮守戌左玉鈐衛翊府左郎將臣陳元光言伏承永淳二年八月一日制臣進階正議大夫嶺南行軍總管者受命戰兢抵官彌懼臣以沖幼出自書生逮及童年濫膺首選未及干戈守至懦至弱之質惟知飽暖無曰區曰處之能幸賴先臣緒業叨蒙今日國恩寄身都閫任事專征爰從視職以來不敢少有寧處况茲鎮地極七閩境連百粵左袵居椎髻之半可耕乃火田之餘原始要終流移本出於二州窮凶極暴積弊遂踰於十稔元惡既誅餘凶復起法隨出而奸隨生功愈勞而效愈寡撫綏未易子育誠難竊惟兵革徒威於外禮讓乃格其心揆諸陋俗良由職方久廢學校不興所事者搜狩為生所習者暴橫為尚誅之則不可勝誅徙之則難以屢徙倘欲生全幾致刑措其本則在創州縣其要則在興庠序蓋倫理謹則風俗自爾漸孚治理彰則民心自知感激竊以臣鎮地曰安仁誠為治教之邦江臨漳水實乃建名之本如蒙乞勑定名號而復入職方建治所而注頒官吏治循往古之良規誠為救時之急務秦越百家愈無罅隙畿荒一德更有何殊臣謬居外鎮忝在封疆所得事宜合奏謹具厥由伏候敕旨左玉鈐衛翊府左郎將進階前正議大夫嶺南行軍總管臣陳元光言伏奉垂拱四年六月二十九日制除臣中郎將右鷹揚衛率府懷化大將軍輕車大都尉兼朝散大夫持節漳州諸軍事守漳州刺史贊治尹營田長春宮使者伏以社稷初開首有官僚之建皇天眷命重茲樗櫟之材山川頓改人物更生竊念臣州背山面海舊有蛇豕之區椎髻卉裳盡是妖氛之黨治理誠難撫綏未易恭惟陛下威振百靈氣消六沴自東自西不違於指顧我疆我理咸得其區分民心有繫土俗轉淳覺昨非而今是必舊去而新更竊惟治巨室者不用乎條枚蓋明堂者不參於瓦礫茲遇陛下日月其明乾坤其量知臣朴忠有素寒松不改乎凋年膂力猶剛老馬或諳於故道申命曲加因郵傳賜寵之以二政之隆之以一州之重雖則殊鄉還同晝錦光華奚止於一身爵祿許推於後裔人皆為榮臣獨知懼粉身未足報深恩萬死實難酬厚德已從此日望闕謝恩繼當恪守詔條徵庸俊乂平均徭賦示以義方持清淨以臨民重修前志守無私以奉國再礪於衷展駑駘之力申鷹犬之勞庶荒陬蠻獠盡沐皇風率土生靈備聞斯慶臣無任感恩隕越之至嗣真字承胄趙州柏人人中明經纍調許州司功參軍直宏文館永昌初以御史中丞出為潞州刺史來俊臣誣以謀反流藤州卒贈濟州刺史諡曰昭神龍初追贈御史大夫古者獄成公卿參聽王必三宥然後行刑比日獄官單車奉使臨時專決不復聞奏倘有寃濫何由可知况以九品之官專命推覆操殺生之柄竊人主之威案覆既不在秋官省審復不由門下國之利器輕以假人恐為社稷之禍臣聞陳平事漢祖謀疏楚君臣乃用黃金五萬斤行反間之術項王果疑臣下陳平反間果行今告事紛紜虛多實少如當有凶慝焉知必無陳平先謀疏陛下君臣後謀除國家良善恐為社稷之禍伏乞陛下特回天慮察臣狂瞽然後退就鼎鑊實無所恨臣得歿為忠鬼孰與存為諂人如羅織之徒即是疏間之漸陳平反間其遠乎哉昔蒼頡造書天雨粟鬼夜哭亦有感矣蓋德成而上謂仁義禮智信也藝成而下謂禮樂射御書數也吾作詩品猶希聞偶合神交自然冥契者是才難也及其作書評而登逸品數者四人故知藝之為末信也雖然若超吾逸品之才者亦當敻絶終古無復繼作也故斐然有感而作書評雖不足以對揚王休宏闡神化亦名流之美事耳與夫飽食終日博奕猶賢不其遠乎項籍云書足以記姓名此狂夫之言也嗟爾後生既乏經國之才又無干城之略庶幾勉夫斯道近代虞祕監歐陽銀青房褚二僕射陸學士王家令高司衛等亦並由此術無所間然其中亦有更無他技而俯拾朱紱如此則雖慙君子之盛烈苟非莘野之器箕山之英亦何能作誡凌雲之臺拂衣碑石之際耶今之馳騖去聖愈遠徒識方圓而迷點畫亦猶莊生之歎盲者易象之談日中終不見矣太宗與漢王元昌褚僕射遂良等皆授之於史陵褚首師虞後又學史乃謂陵曰此法更不可教人是其妙處也陸學士柬之受於虞祕監虞祕監受於永禪師皆有體法今人都不聞師範又自無鑒局雖古跡昭然永不覺悟而執燕緹以為寶玩楚鳳而稱珍不亦謬哉其議論品藻自王愔以下王僧虔袁庾諸公皆已言之矣而或理有未周今采諸家之善聊指同異以貽諸好事其前品已定則不復銓列素未曾入有可措者亦復云爾太宗高宗皆稱神札吾所伏事何敢寓言今始於秦氏終於唐世凡八十一人分為十等蒼頡造書鬼哭天廩史籀湮滅陳倉藉甚秦相刻銘爛若舒錦鍾張羲獻超然逸品程邈隸體崔公篆勢梁李蔡索郗皇韋衛羊習獻規褚傳羲制邈乎天壤光厥來裔西嶽張昶江東阮研銀鷹貞白鐵馬桓元衛杜花散安康綺鮮元昌陸柬名後身先蚌質懷珠銀王褱蘊礫陸謝參蹤蕭王繼跡思話仙才張融賞擊如彼枯秀衆多㣥石利貞雍州長安人高宗朝為太常博士周王侍讀遷祠部員外郎卒中宗立以侍讀舊恩追贈祕書少監臣以為前殿正寢非命婦宴會之地象闕路門非倡優進御之所望詔命婦會於別殿九部伎自東西門入散樂一色伏望停省若於三殿別所自可備極思和微臣庸蔽不間典則參預禮司輕陳狂瞽允濟洛州鞏人弱冠舉本州進士纍除著作佐郎遷左史兼直宏文館長安中拜鳳閣舍人中興初坐與張易之款狎左授青州刺史大哉乾象紫微疏上帝之宮邈矣坤輿丹闕披聖人之宇聿觀文而聽政宜配天而宗祖體神化以成規應靈圖而立矩度七筵以垂憲分四室而通輔合宮之典鬱乎軒邱重屋之儀崇於夏禹因殷成於五帝繼周道於千古統正朔之相循起皇王之踵武大禮興而三靈洽至道融而萬物覩其在國乎惟聖踐極配永登樞浹生成於大冶銷品彙於洪爐貫星象而調七政列山川而宅五都開洛陽之寶籍受河闕之禎圖總夔龍於國序集鵷鷺於天衢包壯業於元頊籠景化於黃虞功既成矣道既貞矣答后土之嘉祥藹上元之殊祉望仙閣之秀出瞻月觀之宏峙鏤紅玉以圖芳肅龜壇而薦祀道不言而有洽物無為而自致嚮明南面高居北辰屬天下之同軌率海內以嚴禋想雲臺以應物考明堂以臨人協和萬㝢懷柔百神降虔心啓靈術采舊典詢故實表至德於吹萬起宏規於太一欣作之於有範佇成之於不日工以奔競人皆樂康訪子輿於前跡揆公玉之遺芳順春秋之左右法天地之圓方成八風而統刑德觀四序而候炎涼跨東西而作甸掩二七以疏疆下臨星雨傍控烟霜翔鶤墜於層極宛虹拖於遊梁崑山之玉樓偃蹇曾何髣佛滄海之銀宮煥爛安足翺翔於是覽時則徵月令觀百王綏萬姓肆類之典攸集郊禋之禮爰盛衣冠肅於虔誠禮樂崇於景令三陽再啓百辟來朝元纁霧集旌斾雲搖湛恩畢被元氣斯調羅九賓之玉帛舞六代之咸韶澤被翔泳慶溢烟霄穆穆焉皇皇焉粵自開闢未有若斯之壯觀者矣煥乎王道昭賁三才遠乎聖懷周流九垓鴻名齊於太昊茂實光乎帝魁浹㣥山於雨露通庶品以風雷盛矣美矣皇哉唐哉臣聞混成發粹大道含元興於物祖首自胚渾分泰階而立極光耀魄以司尊懸兩明而必照列五緯而無言驅馭陰陽裁成風雨叶乾位而凝化建坤儀而作輔錯落九垓岧嶢八柱燦黃道而開域闢紫宮而為宇橫斗樞以旋運廓星漢之昭回總三統之遷易乘五運之遞來察文明而降祥瑞觀草昧而動雲雷託璇樞之妙術應玉管之浮灰柔克斯高聽卑逾廣覆燾千容包含萬象載光道德聿符刑賞既霆震而霜威亦春生而夏長其功不測其變惟神大哉其施曠乎其仁周八紘而化育籠四海而陶鈞雖感通而下濟終輔翼而無親登大寶於上皇發神圖於下帝憑理亂而倚伏候昏明而開閉遘堯舜以降禎休遇辛癸而呈祲沴歷成敗而無爽在興亡而必契深機不測神化靈長雖覃恩於列聖必歸功於有唐發星辰而效祉雜烟雲以降祥大猷載洽景貺斯彰浹庶品以光被樂㣥生於會昌軼大庭而包太昊孕元頊而掩朱襄見乾心之祚聖即靈運之無方造化惟遠生成不極沾廣惠於禽魚預湛恩於動植非測管以能喻豈戴盆之可識欣大賚於天成激長歌於帝力元氣攸分太極斯判建三才以可久開二儀以貞觀偉坤德之無疆恢地道之幽贊叶高明而資始孕沈潛而剛斷空徵王母之圖竟勞豎亥之算用能載九嶽振百川蕩雲霧泄風烟㣥物畢發衆象森然飛沈咸遂動植斯甄五億十選二萬八千含靈應節蓄聖懷仙元命之所包矣彞倫之所繫焉周易以為理契於牝墨翟以為仁深於天由是開階立隧提衡建極置羲和之官列司徒之職審其遠近辨其紆直廣輪之數不夷險之精不匿用能峻市朝明甸侯既布井而陳邑亦列郡而分州窪盈沃瘠之品原野墳衍之流斂跨萬俗兼該六幽隔蠻壤限夷陬珍卉奇木之他族鱗介羽毛之異儔詭怪畢備璀璨咸周銀臺瑤檻元闕丹邱鄒衍之所不議方朔之所難紬禎符應於河象災異紀於春秋爾乃禮備玉衣葉隆金屋彌北渚而應慶邁東陵而誕福辭珠璫屏綃縠配飛龍以凝順詠關睢以薦淑契明理於東南想賢才於薖軸化漸蘋藻教敷穜稑詠麟趾而合符比螽斯而繁育功宜右轉道叶上升遵四時以生殺順六氣以陶蒸珍符顯見寶歷相仍我疆我理如坻如陵徽猷潛暢禮節鬱興大爐交泰庶績其凝用能祀列黃琮禮配蒼璧揚義聲於農步飛仁風於禹跡服耒耜於田疇偃戈矛於邊埸諒賓則之廣被信輿圖之遠闢濬哲惟唐受天之明究皇王之鴻休包宇宙之純精恢天祿以作乂攄元命之振英鼓黔黎以播氣運蒼昊而時成括闓陽於泰階襲三聖以光亨禮樂交通典謨洋溢天以洛視而龜書至地以河觀而馬圖出擁神庥尊明號激清流揚茂實將大報於元天享神祗以稱秩願卑宮而自處惟禋宗而是恤思致美於總章覽娵訾而法營室訪夏后之軌儀云廣四而修一彼宗周之有制聞或九而或七錯綜乎舊典經始乎丕律紹先志以高興匪務功而首出乃延公侯卿士藝人表臣而審其議焉咸以為明堂者明乎天道者也所以明有功褒有德崇大教發大政登假嚴禋敘修宗祀非夫為已者也安可已乎粵正月庚午始創明堂之制焉考經緯之長策應黃鍾之旋宮穆穆四門坐納四氣明明八窗均調八風靡金靡王匪磨匪礱卻隋侯之夜光明素質以為工思承天以接神故峻極乎皇穹颯乎懿濞盡乎豐融雷承乾以震耀靈大壯乎其中非至聖之精誠孰能克勤乎此功大哉乾元神不可測其內也剛其外也直直所以保合太和剛所以運行不息故王者奉之而垂化君子體之而進德者也原夫天者乾之形乾者天之名用九以則得一而清名也者純陽之經形也者大無之精語其動兮孰知其動語其行兮孰見其行得不詳所由稽所以歷土圭以窮妙因渾儀而探理左出右沒不行則何以變三辰之度上騰下降不動則何以為萬物之始履柔兮居常配坤兮秉陽笠也誰覆弓也誰張四德雖具未足以擬議十翼雖廣未足以披攘微乎哉得於幽者道盛乎哉得於道者王帛丿糸帛丿糸若存戶樞不蠧較之則火井易滅當之則金柅難固持剛靡失既兼柔克之資用壯罔虧亦取易知之故是以為君為首為金為冰杳冥兮不慮乎盈縮寂寥兮何有於騫崩諭彼成形是顯飛龍之象旌其致遠因推良馬之能且夫天也者陽乾也者健窺之於裏則其象歷歷瞻之於表則其容慁慁不言非涉於可名不拔方知乎善建大道非物豈容媧后之功小說惑人豈容秦宓之論皇家恩流品物禮達上元垂文明畫一之令秉神武不殺之權推之蕩蕩守之虔虔信所謂神道設教剛健而法天者歟
