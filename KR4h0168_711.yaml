front:
  text: 全唐文欽定全唐文卷七百十一李德裕十六
  hash: sha256:a9fbdc6048d414e5bf1ea7f7ab4e08f117957aeec3845951273f10bc0e710230
body:
  text: 有美浮石淒若銅音笙竽合奏鸞旅鳥在林清越盈耳和愉感心懸之玉宇永託僊岑不動者山不死者仙山在仙存真訣不傳猗歟先生耽道體元騰駕素鹿遨遊紫烟時憇蓬壺下視桑田一往茲山於今幾年茲山岑寂先生是宅清泉綠蘿獨與世隔我居洞宮人見崖壁空畱鹿跡永存幽石㣥山西來波積雲屯地險所會斯為蜀門層岑峻壁森若戈㦸萬壑奔東雙飛高闕翠嶺中橫黵然黛色樹茲雄屏以衞王國原註劒門當中有一峯峻嶺橫峙望若列屏此一峯為最奇而說者未嘗及之也拔井幹溪回溝洫嚴守重扃隱如臨敵運有隆替地無險阨閉於昏頑開於有德馬錯西伐蜀侯敗績艾出陰平禪亦來格粵在憲祖英威四克始剪蜀妖遂靖卭僰蠻夷軌道諸侯述職武臣銘之金石乃刻宸極正位運四時者璇樞太微啟扉分兩垣者上將其或道兼文武勳著旂常稟嶽立之神姿蘊泉渟之深識存也出忠入孝愛敬同歸歿也灑澤漏泉始終一貫求之前古不亦難哉公諱宏規前京兆雲陽人也派流甚遠珪組相承炳焯周邦光揚史牒曾祖恩官止同州白水縣令祖信終於漢中郡折衝都尉父英皇左武衞中郎將歷階勳至游擊將軍上柱國皆纘前緒踐履夷途或明恕而行俾人歸厚或強毅以立顧敵必摧不顯當時宜生達者公十有五乃應選用沖和之美暢茂於四肢喜慍之來不塵於絕境亦猶崑岫片玉嶧陽孤桐生稟異姿終成重器始署雲騎尉賜緋累遷內侍省內僕寺丞密侍赤墀飛聲紫禁植操不逾於規矩抗志已在於丹霄無何丁郎將憂苴枲服喪杖而後起不辭王事是謂從權俄授徵事郎內侍省府局令屬劉闢逆命禁旅徂征護汧隴梟騎之鋒平井絡鴟張之虜始以義擊俄焉凱歸由是有輕車都尉之授旋又將命撫循自靈州以屆於邊犒軍五城勤役萬里懋乃休績簡於天心加銀印赤紱之賜充天威軍使奉詔蠻方再安憬俗俶儻扶義有叱馭之風感激捐軀忘跕鳶之苦恩禮浹洽要荒宴如尋自奚官局丞擢翰林院使仙署重深天顏咫尺導才臣之啟沃廣睿哲之聰明公學富邱墳智參神化叶機贊命發揮王猷故事藹然內廷繄賴爰加內侍伯貳副軍中尉副左街功德之任紫艾龜印之寵以昭其庸武旅鳧藻之師實為之佐檢校司空王公諤之授鉞河東也改內給事為之護軍以金蘭之契睦於元帥以泉海之量接於賓僚三軍煦愛日之和列郡靡清風之惪洎振武失守主將遁逃朝廷軫憂慮為邊患因命尚書張煦節制是邦詔公領步騎五千為之聲援公內運祕計外示閒安詭以巡邊掩其無備長驅猛銳深入壘門乃以宣勞之名俾其少長皆會然後擒執魁首置之典刑戮三百餘人闔城股慄昔武安之阬趙卒莫辯幽冤韓信之下井陘徒聞疾鬬未若公德刑具舉威惠皆宣乘馹上聞班師舊鎮司徒既歿承乏總戎而高平公奕葉相門一時盛惪與公虛舟相待朱瑟諧音淡然而成去如始至尋又奉詔巡邊以觀軍實北至鉤注東達飛狐道里曲折不遺於掌握兵機奇正盡在於襟靈士懷挾纊之恩人感投醪之醉壺漿塞路幼艾爭先爰寫山河存於繪事憲宗悅而嘉嘆嘗置坐隅得李恂之圖書乃知聚落觀千秋之畫地盡見山川加朝議大夫內侍省內常侍復歸舊鎮報忠勞也上以公器能可以居重任機權可以參密勿遂發中詔俾還京師改內飛龍使換右神策軍副使飛龍掌天驥之閑古太僕之職也禁旅總蘭錡之兵古上卿之寄也公或為長或為副蓋選眾而舉惟才是擇翌日命知樞密公揣摩心術練達國章謀無不成楃重有餘裕當神武經緯之際王師戡定之初一日萬機晝常三接忠猷隱於聞聽嘉謀祕於宮闈畧而不書蓋溫樹不言之義也真拜內常侍知內侍省事旌其忠力賜名宏規宏者光大之稱規者規範之謂合此二義表茲一心俄而淄青干紀兵集淮海以公累護戎事尤邃武經出為淮南監軍委以攻討鳴鐘鼓以問罪運籌策以出奇方厲志於戈矛遽厂田坴哀於風樹抱終身之痛自達神明當赴難之辰敢避金革起復寧遠將軍依前充監軍使元惡既殲復掌樞密憲宗憑几大漸召公受遺穆宗膺圖御宇翳公定策捧日而昇黃道翼龍而上赤霄名節功勛光昭圖史遷忠武將軍內侍省少監賜上柱國進雲麾將軍服闋授銀青光祿大夫監門衞將軍知內侍省事封彭城縣開國子累封沛國公食邑三千戶賜以長㦸列之朱門守約鳴謙不有其貴屬幽鎮首禍趙魏挻災公內謁謀猷定指縱之計外緝機務當政賦之源慮不及私居嘗慎獨懸水鏡而情無隱伏持天衡而心靡重輕嶷然如山以鎮㣥動逮長慶季歲穆皇疾已彌畱公志仗神明心存王室請立先后以為副君雪涕抗詞首陳大計舉觴瀝眾議皆從延年離席而社稷已安趙喜橫堦而尊卑乃定惟公方之諒無慚德公以名遂身退舉能進善人之高躅也乃推同志固繁機遷左監門衞上將軍知省事復為河東監軍使拜泣玉墀寵錫金帶雖魏后深恩授劉稹之部落吳君密渥賜陸遜之金環煥赫輝榮莫逾於此穆宗厭代先后嚮明公懇請會朝旋奉俞詔拜特進行右武衞上將軍公以子牟之戀常懷魏闕汲黯之志惟在漢廷懇辭北轅上不能奪尋除內宅使鴻臚禮賓等使前代特進位次三公居驃騎儀同之上非茂勛俊惪曷以處之遷左神策軍中尉兼左街功德使漢氏京師有南北軍之屯武帝既平百粵內增七校今之中尉實司其任公說禮敦詩深知將帥之體安人和眾實有經武之材以清淨禮緇黃以慈惠親戎旅西方之教不肅而成北落之衞隱然難犯吐論必援於經史耽玩惟志於圖書遇物而涇渭自分立誠而風雨如晦權雖侔於衞霍主意益親寵雖盛於金張人心咸悅非全才曠度豈能臻於此歟公志氣方強春秋甚富將欲揚威瀚海耀武龍廷展報國之壯圖恢致君之遠畧勞而生疾懇請辭榮天子憂呂蒙之未瘳委景丹之臥鎮近臣挾醫而駢至中使賜藥以交馳心徒傾於太陽命已迫於朝露洒血懷感啟手歸全以十一月二十八日薨於長安來遲里第享年五十二遺表獻名馬雕鞍寶器犀帶臣子之戀不其至乎敬宗當宁流襟廢朝三日贈開府儀同三司贈絹一千疋布四百端錢三千貫上擬三台之耀下管九泉之榮禮命所加冠於當代朝廷碩臣聞必興嘆和壘故校相視澘然昔李將軍之殂人皆流涕以其信結於士大夫公近之矣况公瞑目之後曾未經旬變起林光災厂田坴霄極則知日磾已歿何羅之釁遂成許褚既終徐地之妖莫遏惟公峯巒聳拔挺秀色於晴霞律呂含和流清音於大厦志必存於經濟量莫挹其沖深思若涌泉智如炙輠決勝千里通知四夷察情偽之端達幾微之際故天子虛已以聽詢謀允諧道不取於苟容言必歸於中正居平而博厚泛愛臨事而感慨立名體征虜之奉公得亞夫之守節公之掌樞也屬穆皇寢疾逾年公之總戎也屬敬宗朝廷多事公協和將相安靖邦家勁草不搖喬松自直傳稱公家之利知無不為忠也送往事居俱無怍色貞也惟公有之矣惜乎未及中壽俄歸杳冥景已戢於虞泉名空畱於簡冊可不悲哉夫人密國夫人李氏懿行蘭薰貞風玉瑩榮封石窌寵章全德直體茂於宗姻洵美光於內則悲聲晝哭痛結泉扉有子五人長曰行立朝散大夫內侍省宮闈局令上柱國彭城郡開國伯賜緋魚袋次曰行深中散大夫內侍省給事賜紫金魚袋次曰行元闕四字賜綠次曰行宣朝散大夫內府局丞上柱國闕四字次曰行闕四字咸以珪壁之姿藻身文囿鴻鵠之志矯翼禁林朱紫連華閨門雍睦忠出於孝負五龍之俊才喪過乎哀有二連之深戚粵以太和元年十一月十四日即幽窆於滻川之西禮也青鳥啟兆悲壟樹之長陰白鶴淩風嗟弔賓之遽返永圖丕績乃篆貞珉銘曰皇王聖化仰法星樞始自絲忽風行八區誰參其任公實帝俞出吐君命入贊臣謨其一惟后建邦外分蕃岳奧則淮壤雄惟朔漠誰護其軍公多智畧恒瀚既寧王猷允若其二漢家宮室上應太微布列環衞恢張武威誰司其柄公達戎機英王流眄忠賢是依其三內外之寄安危所注惟公全德乃暢機務美璧良珪瑞質凝素霜㦸寶刀森然輝庫其四天挺奇志貞若渾金出入三紀賢明一心寒松在巘霜霰寧侵皇澤之厚川流比深其五趙孟愒景光音遂遠長卿病痟藥石皆晚靈芝難駐奇香莫返光碎珠泉芳消蘭畹其六鹵薄詔葬城闕之東列旌旗於素滻凝簫挽於朔風落槭槭之霜葉呌離離之晚鴻時一徃兮舟壑逝魂歸來兮松栢中其七夫壠坻長松必備明堂之制荊岑璞玉終為大國之寶士或起漁釣而遭時會亦有披荊榛而贊王業求之古昔何代無賢太和六年開府儀同三司右領軍衞上將軍致仕上柱國岐山公實封三百戶扶風馬公以侯印罷歸至開成六年九月四日薨於永嘉里第享年六十三詔贈揚州大都督明年二月八日以鹵簿鼓吹葬於京兆灞陵之原馬公即國之盡忠衞主之臣也公諱存亮字季明大父瑾皇銀青光祿大夫考操皇朝議郎房州長史公之先族趙奢嘗以百萬勁兵號為馬服制秦吞魏因而氏馬厥後文武派分英華不絕武則伸威百蠻鑄銅而表海文則研道六經施帳而授業公繼前業蔚為茂器終始一貫貞明六朝德宗時弱冠筮仕風儀夙成帝欲分綺季之勞翼皇儲之重於是暫離武帳出侍龍樓贊蘭英結珮之馨規桐葉剪圭之戲此則史冊之保護也帝欲秩出納之司糾梯航之貢於是副宏羊而實天庫佐安國而裨水衡此又孔僅之方畧也帝欲具飾車旗宣明衣服公于是典其寮寀重立規模疊烟霞以散王侯卷虹霓而給后卿靄施彰於五輅日華搖裔於九斿此又叔孫通之文物也帝欲順時巡以察風俗先品實以奉園陵公於是廣靈囿以樹農功采頖宮以列珍饌法后稷播種之道遏嗇夫捷給之詞此又卜式之理上林也帝欲昆夷即序士馬無譁公于是秩視玉鈐榮加金鈕以奇謀而協上將以忠懇而暢皇猷尺籍伍符之勤訓馬簡士之要雖程功於衞霍終歸美於程李此又許歷之副趙奢也元和十三年公自神策軍副使詔受雲麾將軍左監門衞將軍知內侍省事兼左街功德使公於是金湯天壘雷電皇威斥遊惰於五營取材能於七萃備牙爪則數逾十萬竭心膂則酬必九遷貔貅虎豹之師鵞鸛魚麗之訓文茵貝冑之盛羽葆靈旂之飾奉元會則雪霜委積於殿廷侍郊邱則錦綉施張於原野公珪璋挺器禮樂資身輦下無睚眦之徒轅門多溫恭之士知呂蒙於行陣重卻縠於詩書晉代名卿咸授趙衰之舉漢朝武畧多由去病之門此又方召之佐宣王也敬宗時宮掖無虞蜂蠆暴起塵驚玉座熊突彤闈良媛以羅袂當衝侍臣以藥囊捍患宸慮未經於細柳天行俄及於窒皇何羅之釁始萌日磾之心已動公於是覽羲皇之轡駐豐隆之馭關闕璧而納闕日闢獸落而畱六龍指揮殄寇之兵調停太官之膳㣥兇既成於京觀庶官方及於乘輿公乃率元甲而清紫微奉翠華而入黃道此又耿弇安君父清妖孽也於是真食井賦紀功旂常文錦玉帶綢繆蕃錫公辭榮畏滿名遂身退坐樽爼而監淮海衞瓘之忠勤也馳軺車而款天闕子牟之誠戀也捐寵綏而授松檟楊王孫之達命也歸鄉里而散金帛蘇季子之行義也慶忌嫉邪之心萬石周慎之志保貞廉而碎首惡讒慝而亡身思患覩漏河之初知機見履霜之漸士君子所以推公之明識也公始罷淮南監軍使詔除內飛龍使荏苒一紀劬勞六閑朝習華騮暮巡棧皂無竊轡詭銜之患遂翹足交頸之安瘁精爽於北辰播芳烈於來代旋以股肱近地河關要津爰輟信臣再監戎旅繡衣晝行於阡陌金爼暮奠於松楸為子為臣忠孝備矣既而以疾告老乞還京師累表抗辭畱中未下天子眷懷耆舊注意貞良久而乃從不奪其志此又終始之大節古今之至人長慶初某忝職內廷獲覩公之儀表玉山峻嶺瓊樹高柯霍子孟資性端莊進有常處張子孺小心畏忌每遠權勢御札盈几天香滿衣驂八駿而幸元洲捧六鈞而殪青兕勛名光焯當代莫儔夫人岐國夫人王氏寶劒早沈於清渭珠光先閟於黃泉嗣子瓊林使朝議大夫行內侍省奚官局令上柱國扶風郡開國公食邑二千戶襲重封一百五十戶賜紫金魚袋元某夙稟英才早聞詩禮守公法度以紹家風次子幽州監軍使朝議大夫行內侍省內僕局令上柱國賜緋魚袋元貫朝議大夫奚官局令上柱國賜緋魚袋元償儒林郎守內侍省內府局丞上柱國元真等金貂相映朱紫交輝鳳毛歸美於一門驥足皆期於萬里以某知公故事見託斯文刻石路隅庶紀佳績俾後代知天子聞鼓鼙而憶名將鑒丹青而思老臣乃為銘曰明堂巍巍天駟前施木帝乘馬是能星馳鳴噣闕二字車馬是司趙秦同出後有闕二字馬服生趙闕四字戰國更霸迭相盛衰趙困長平秦始開基劉累遠孫剪秦無遺劉即范氏累乃龍師厥派綿綿尋源乃知貞元年中公侍丹墀一善及物知無不為進退諤諤行無越思明明六聖信任不疑赫赫貞臣顛危必持理身清淨成國雍熙實本兵柄左右皇威內訓七萃七萃如貔外遏百蠻百蠻以綏冬有愛日人心所歸疾風勁草輿論欽之始去禁衞萬夫涕洟逮總天广既六閑允釐盡瘁事國形神久疲監視諸侯琴書自怡金印組綬去之若遺陶徑潘園優游在斯長慶六年詔樹豐碑上將刻字文以好辭後十六年藎臣其萎原阡松檟兮霜露已滋苑池臺榭兮榛蕪可悲覩塵根兮空嗟蔓草篆貞珉兮攸媿色絲幽州盧龍軍帥檢校尚書右僕射張公仲武往年修獻捷之禮今歲有銘勳之請二者君子韙之豈不以諸侯有四夷之功獻其戎捷春秋舊典也宗周納肅慎之貢銘於楛矢天子令德也斯可以為元侯表可以為後世法聖上嘉其動而中禮乃命宰臣採其元功傳於惇史臣德裕乃敢颺言曰夫兵者所以除暴害也愛人則惡其為害禁暴則惡其為亂雖睿智不殺化之以神至德允懷招之以禮然書有猾夏之戒傳有修刑之訓虞舜四罪乃成大功文王一怒以至無侮非德教之助歟仁聖文武章天成功神德明道大孝皇帝熙我文典煥乎光明極象外之微臻於至道鼓天下之動致於中和慮必鈎深退而藏密故能神機獨照伐未兆之謀威光遠震制不覊之虜當其時也烽燧迭警羽書狎至人心大搖㣥師沮氣皇帝以軒后之威神漢高之大畧光武之雄斷魏祖之機權合而用之以定王業此議臣所以不敢望於清光也倬哉天地應而品物生君臣應而功業成故龍躍而雲從鶴鳴而子和方叔伐獫狁蠻荊來威安遠擊車師西域振服宜有良將殿於朔邊張公禮閱戰器書成傳癖張仲孝友子孺塞泉流落不偶光景未耀明主雅聞奇志持印而拜將軍遙推赤心築壇而命元帥拔自雄武授之薊門果能精誠奮發策慮偪臆千里獻籌一心憂國則知龍顏善將任人傑而不疑日角好謀嘆敵國而強意回鶻者本北狄之裔也或曰獯狁或曰山戎五帝所不能臣三王所不能制前史載之詳矣暨薛延陁之敗也酋帥吐迷度率衆款塞太宗幸靈武納降立回鶻部落置瀚海都督因我封殖遂雄北方代宗之戡內難也葉護以射雕之士親護戎旌亦由羌髳率師以翼周北貊梟騎以助漢既殄大憝乃疇厥庸特拜葉護司空歲賜繒二萬疋厥後飾宗女以配之立宮室以居之其在京師也瑤祠雲構甲第碁布棟宇輪煥衣冠縞素交利者風偃挾邪者景附其翎侯貴種則被我文繪帶我金犀悅和音厭珍膳蝎蠧上國百有餘年既而桀驁無親天命不佑僭侈極欲神道惡盈本國薦饑畜產耗半黠戛斯蹙因利乘便遂焚龍庭區落蕭條陰燐青熒今之烏介可汗亡逃失國竊號沙漠非我冊命自為假王其來也羨漫陰山睥睨高闕元塞之下氛霧蔽天質貴主以前驅依大國而求援或丐我米糒救其饑人或邀我甲兵復其故地外雖柔服內有桀心因行人致辭徵呼韓故事願居光祿塞急保受降城其下有二部曰赤心宰相那頡啜特勒赤心者天性忿鷙戎馬尤盛初與名王嗢沒斯首謀內附俄而負力怙氣潛圖厲階為嗢沒斯所紿誘以俱謁可汗戮於帳下其眾大潰東逼漁陽上乃賜公璽書授以方畧公以室韋悍亟之兵近我邊鄙俾其偵邏且禦內侵尋以徵役不供為虜所敗由是介馬數萬連亘幽陵伏精甲於松樠布穹廬於磧鹵散若飛鳥止如長雲火燎於原不可嚮邇公激義氣以虹貫發精誠而石開奇計兵權密授髦俊乃命介弟仲至與裨將游奉寰王如清左敵萬李君慶張自榮高守素李志操率銳兵三萬建斾而前介冑雪照戈矛林植命以義殉壯由師直聲隆隆而未洩欲逐逐而不食戢以聽命嚴而有威公曰險道傾仄且馳且射胡兵所以無敵也致之平原勒以方陳我師可以逞志也於是據於莽平環以武剛首尾蛇伸左右翼張輕騎既合奇鋒橫騖如摧枯株如搏畜兔攝讋者弗取陸梁者皆仆虜王侯貴人計以千數然後盡眾服聽悉數係纍谷靜山空靡有孑遺士冖䂞駞駃騠風澤而散旃墻罽幕布野畢收馬牛幾至於谷量虜血殆同於川決徑路寶刀祭天金人奇貨珍器不可殫論乃命從事李周瞳馳傳上奏又命牙門將周從繼獻戎俘皇帝受而勞之㣥臣畢賀昔長平七征驃騎六舉竇憲合氐羌之眾陳湯㩜城郭之兵或生靈減耗士馬物故或邀功捄罪矯命專征然猶告類上帝薦功清廟顧視二漢不其恧歟以公威動蠻貊功在漏刻因命為東面招撫回鶻使先是奚契丹皆有虜使監護其國責以歲遺且為漢諜自回鶻嘯聚靡不鴟張公命裨將石公緒等諭意兩部戮回鶻八百人雖介子討罪於龜茲班超行誅於鄯部未足儔也回鶻又遣宣門將軍等四十七人詭辭結歡潛伺邊隙公密賂其下盡得陰謀且欲馳入五原盡敺雜虜公逗畱其使緩彼師期竟得人病馬瘏縮衂而退挫銳解紛繄公善計今鳥介自絕皇澤莫敢近邊幷丁令以圖安依康居而求活盡徙餘種屈意黑車寄託遠遁流離饑凍黑車亦倚其威重迫脅諸戎造謀藉兵解仇交質自謂約齎深入漢將取而未期渡幕輕畱王師往而不利公以壯猷遠馭長計覊縻不媮避嫌之便終盡致敵之術將時動而得雋豈歲數而勝微矧乎明主仗將帥為爪牙視戎狄為鼠彘方獵猛敵不翫細娛非周宣無以成召虎之勳非漢宣無以聽營平之計勗哉上將光我中興公前後受降三萬人特勒二人可汗姊一人都督外宰相四人其他侯王騎將不可備載王襃以日逐歸德稱為人瑞班固以稽落盪寇大振天聲孰若天子神武百蠻振慴乘其蹙困臨以兵鋒刈單于之旗納休屠之附非萬里之伐無三年之勤巍乎成功輝焯後代宜刻金石以揚鴻休銘曰太和之初赤氣宵興開成之末彤雲暮凝異鳥南來胡滅之徵北夷飇掃厥國土崩逼迫遷徙震我邊鄙長蛇去穴奔鯨失水上都薊門兵連千里曾不畏天猶為驕子丐我邊穀邀我王師假我一城建彼幡旗歸計強漢郅支嫚詞狼顧朔野伏莽見羸雁門之北羌戎雜處濈濈㣥羊茫茫大鹵縱其梟騎驚我牧圉暴若豺狼疾如風雨皇赫斯怒羽檄徵兵謀而泉默斷乃雷聲沉機變化動若神明沙漠之外虜無隱情漁陽突騎燕歌壯氣赳赳元戎耽耽虎視金鼓誓眾干旄蔽地爰命介弟屬之大事翩翩飛將董我三軍稟兄之制代帥之勤威畧火烈胡馬星分戈回白日劍薄浮雲天街之北旄頭已落絕轡之野蚩尤未縛俾我元侯恢宏遠畧取彼單于係之徽索陰山寢烽亭徼櫜弓萬里昆夷九譯而通蠻夷既同天子之功儒臣篆美刊石垂鴻臣纘承丕緒勵翼七年不敢怠荒以思無逸北制強虜東翦叛徒享此鴻名實由元造嘗欲述帝堯之典欽若昊天修周武之法建用皇極成於王道以黜異端釋氏之教興於戎狄悖君臣之禮廢父子之親耗蠧蒸人殫竭物命宣尼垂訓不語怪神因而漸除咸一於正襲前聖之業燦而光明臣之本心諒在於此伏以書載五行當被水土名有五義不以山川後之稱名稍違古典今則循漢宣之故事稟皇祖之貽謀採用離明以符一德又臣近因微恙已及二時感此陽和物皆暢茂未逢勿藥之喜獨有向隅之憂如臣政教不明宜有陰譴刑罰不中未合天心伏願舍臣咎許臣改悔永保宗廟以安邦家所疾日瘳平復如舊五星度理百福來臻敢不克已厲精祗事上帝洗心齋戒嚴奉神祇懇陳至誠仰望照鑒惟神作鎮中土據於西陲積高炳靈宅神明之奧少陰協德成天地之功恭聞烈祖元宗御歷永年祭必受福秘䃭昭賽金刻猶存近者陰澤稍愆宿種未茂精意纔達甘液驟零既紓播種之勤巳獲流根之潤今因報德再竭至誠某纘奉丕圖勤勞七載恭已思道豈敢怠荒屬黠虜南侵震驚朔野兵烽一舉毳幕皆焚潞子嬰兒梟首魏闕參墟叛將面縛壘門成此武功無非幽贊又以釋氏之教出于西夷棄五常之典絕三綱之常殫竭財力耗蠧生人黜其異端以正王度庶可復古諒非近名屬以忽於所慎寒暑成疾曠時且乖於勿藥昧旦徒切於求衣如某政教不明宜有陰譴刑罰不中未合天心實希明神許其改悔永保宗廟以安邦家所疾日瘳平復如舊昔成湯自咎者六霖雨消灾宋景善言者三法星退舍至誠所感前史昭然誠信不欺恃神正直敢不誓於丹腑嚴奉明靈敬陳忠懇伏望靈鑒維元和十二年歲次丁酉六月已未朔二十一日已卯河東節度使檢校吏部尚書平章事張宏靖敢昭告於晉唐叔之靈惟神娠母發祥手文為信殪徒林之兕以啟夏墟受密須之鼓以疆戎索豈止削桐無戲歸禾有典宜在晉蕃育與周盛衰况式瞻西山神靈是宅每廷煙夜簇嵐氣朝隮必膚寸而合油然以遍蓄泄在我神宜主之屬淮雨為災粢盛將廢是用率茲祀典以榮閟官伏願降福蒸人撤茲陰沴俾三農有望萬庾斯豐永儲犧牲以答神貺尚享余元和中掌記戎幕時因晉祠止雨太保高平公命余為此文嘗對諸從事稱賞以為徵唐叔故事迨無遺漏今遇尚書博陵公移鎮北都輒敢寄題廟宇會昌四年三月十五日司徒兼門下侍郎平章事李德裕維大中四年月日趙郡李德裕謹以蔬醴之奠敬祭于故相韋公僕射之靈嗚呼皇道咸寧藉於賢相德邁皋陶功宣呂尚文學世雄智謀神貺一遘讒疾投身荒瘴地雖厚兮不察天雖高兮難諒野掇澗蘋晨薦秬鬯信成禍深業崇身喪某亦竄跡南陬從公舊邱永泯軒裳之顧長為猿鶴之愁嘻吁絕域寤寐西周倘知公者測公無罪不知我者謂我何求其心若水其死若休臨風敬弔願與神遊嗚呼尚饗
