front:
  text: 全唐文欽定全唐文卷六百七十九白居易二十四
  hash: sha256:af8e29c131c1984aa9e78826635fbc9eca39124b011575b9039d78df10b14c77
body:
  text: 唐元和五年冬十一月四日會王寢疾薨於內邸大小斂之日上皆不舉樂不坐朝恩也越十二月十八日詔京兆尹王播監視葬事窆於萬年縣崇道鄉西趙原禮也是日又詔翰林學士白居易為之銘志故事也王諱纁字某德宗之孫順宗之子陛下之弟幼有令德早承寵章未冠而王受封於會夫以祖功宗德之慶父天兄日之貴胙土列藩之寵好德樂善之賢宜乎壽考福延為王室輔嗚呼降年不永二十一而終哀哉皇帝厚惇睦之恩深友悌之愛故王之薨也軫悼之念有加於常情王之葬也遣奠之儀有加於常數哀榮兼備斯其謂乎銘曰歲在寅月窮紀萬年縣崇道里會王薨葬於此周宣王封母弟桓公於鄭厥後因封命氏為滎陽人鄭自桓公而下平簡公而上世家婚嗣咸詳於史牒故不書公諱某字某五代祖諱某北齊尚書令是為平簡公曾祖諱某下邳郡太守王父諱某衛州刺史王考諱某祕書郎贈鄭州刺史公即祕書第三子好學攻詞賦進士中第判入高等始授郾城尉無何本郡守移他鄉州民有暴悖者相率遮道麾訶不去公忿其犯上立斃六七人採訪使奇之奏署支使改浚儀主簿轉大理評事兼佐漕務彭果領五府奏公為節度判官會果坐贓連纍僚佐貶光化尉移向城尉歷北海時安祿山始亂傳檄郡邑邑民孫俊鄧犀伽驅巿人劫廩藏以應公時已去秩因奮呼率僚吏子弟急擊之殺俊犀伽盡殲其黨繇是一邑用寧朝廷美之擢授登州司馬尋轉長史纍加朝散大夫入為太子左贊善大夫尚書屯田員外郎太子中允出攝淄州刺史俄換萊州連有善最詔授檢校司勳郎中兼侍御史充青萊登海密五州租庸使太尉李公光弼鎮徐州奏公為徐州刺史充海登沂三州招討使加正議大夫賜紫金魚袋公威惠舊著比至部而蒼山賊帥李浩與其徒五千來降繇是三郡底定復入為衛尉少卿相國王公縉統河南奏公為副元帥判官未幾除祕書少監兼滁州刺史本州團練使居八載政績大成大歷十二年二月十五日薨於揚州權窆於某所享年七十有八公凡七佐軍四領郡祿俸不積滯衣食無常主常嘆曰以飽暖活孀幼以清白貽子孫是吾心也逮啓手足卒如其志先是太夫人常寢疾公衣不解髮不櫛者彌年侍疾執喪憂毀過禮公尤善五言詩與王昌齡王之渙崔國輔輩聯唱迭和名動一時逮今著樂詞播人口非一晚賦思舊遊詩百篇亦傳於代前夫人清河崔氏贈清河郡太君後夫人博陵崔氏贈博陵郡君生子七人女七人長子雲逵有才名官至刑部侍郎京兆尹公由京兆纍贈至散騎常侍刑部尚書次子微終潤州司馬次子公逵有至行初公年高就養不仕及居憂廬墓泣血三年淮南節度使本道黜陟使泉朝賢袁高高參等纍以孝悌稱薦嚮名教者慕之今為侍御史上柱國滄景節度參謀次子方逵衡州司士參軍次子震當陽丞次子文弻幽州參軍次子安逵率府倉曹參軍公自捐館舍殆逾三紀家國多故未克反葬至元和二年月日始遷兆於鄭州新鄭縣某原祔先祕書塋二夫人從焉時京兆已即世諸弟在下位獨侍御史銜恤襄事孝備始終見託述撰銘於墓石銘曰世祿德門斯謂之可久懿文茂績斯謂之不朽二千石之祿七十八之年斯謂之貴壽內史之顯揚柱史之孝行斯謂之有後嗚呼鄭公榮如是哀如是又何不足之有公諱某字士其先出自周靈王太子晉凡二十一代而生翦翦為秦將軍又三世而生珣珣居太原故今為太原人又十九代而生瓊瓊為後魏僕射諡孝簡公又二代而生曾祖諱滿官為河南府王屋縣令王父諱大璡為嘉州司馬父諱升為京兆府咸陽令河南府伊闕令有文行學術應制舉對沈謀祕略策登科詩入正聲集公即伊闕第三子好學善屬文天寶中應明經舉及第選授婺州義烏縣尉以清幹稱刺史韋之晉知之署本州防禦判官無何租庸轉運使元載又知之假本州司倉專掌運務歲終課績居多遂奏聞真授永泰中敕遷越府戶曹屬邑有不理者公假領之所至必理大歷中本道觀察使薛兼訓以公清白尤異表奏之有詔權知餘姚縣令時海寇初殄邑焚田荒公乃營邑室創器用復流庸闢災畬凡江南列邑之政公冠其首其制邑闢田增戶之績則會稽之牒地官之籍載焉建中初選授揚州倉曹參軍至五年七月二十六日疾歿於江都縣之私第春秋六十二夫人清河崔氏鳳閣舍人融之姪孫鄭州司戶法昂之女婦順母訓中外師之貞元二十年十一月十三日疾終於三原縣之官舍享年六十二有子曰播曰炎曰起咸以進士舉及第播應制舉對直言極諫策授集賢殿校書郎纍遷監察殿中侍御史三原令炎既第未仕起應博學宏詞科選授集賢殿校書郎昆弟三人不十年而五登甲第時論者榮之一女適范陽盧仲通播等號護靈輿以永貞元年十月二十五日遷祔於京兆府富平縣淳化鄉之某原從吉兆也嗚呼夫懋言行蓄事業俾道積於躬者在人也踐大官贊元化俾功加於民者由命也有其人無其命雖聖與賢無可奈何維公受天地之和積為行發為文宣為用故在家以孝友聞行已以清廉聞涖事以幹蠱聞如金玉在珮動而有聲其大者又常以經德秉哲致君濟人為已任有識者深知之宜乎作王者心膂耳目之官以經緯其邦家而才為時生道為命屈名雖聞於天子位不過於陪臣鬱鬱然歿而不展其用者命矣夫古人云有明德大智者若不當世其後必有餘慶今其將在後嗣乎不然何乃德行政事文學之具美聚乎公之三子乎天其或者殆將肥王氏之家大王氏之門以甚明報施之道者也某不佞頃對策於王廷也與炎同升諸科焉祗命於憲府也與播聯執其簡焉及為考文之官也又起在選中焉辱與公之三子遊而聆公之遺風甚熟故作斯文無隱情無愧辭焉銘曰緱山道光淮水靈長繩繩子孫代有賢良將軍輔秦武功抑揚孝簡翊魏文德暗彰降及於公實生於唐大智全才應用無方作掾於郡三語有章承乏於邑一同載康展如之人何用不臧宜登大位俾紹前芳嗚呼百鍊之金不鑄干將十圍之材不作棟梁公亦如之與世不當道不虛行後嗣其昌白氏下殤曰幼美小字金剛奴其先太原人高祖諱志善尚衣奉御曾祖諱溫都官郎中王父諱鍠河南府鞏縣令先府君諱季庚大理少卿山東別駕先太夫人潁川陳氏封潁川縣君幼美即第四子也既生而惠既孩而敏七歲能誦詩賦八歲能讀書鼓琴九歲不幸遇疾夭徐州符離縣私第貞元八年九月權窆於縣南原元和九年春二月二十五日改葬於華州下邽縣義津鄉北岡祔於先府君宅兆之東三十步其兄居易行簡藐然已孤撫哀臨穴斷手足之痛其心如初且號且銘志於墓曰嗚呼剛奴痛矣哉念爾九歲逝不回埋魂閟骨長夜臺二十年後復一開昔葬苻離今下邽魂兮魂兮隨骨來先生姓白名居易字樂天其先太原人也秦將武安君起之後高祖諱志善尚衣奉御曾祖諱溫檢校都官郎中王父諱鍠侍御史河南府鞏縣令先大父諱季庚朝奉大夫襄州別駕大理少卿纍贈刑部尚書右僕射先大父夫人陳氏贈潁川郡太夫人妻楊氏宏農郡君兄幼文皇浮梁縣主簿弟行簡皇尚書膳部郎中一女適監察御史談宏謨三姪長曰味道盧州巢縣丞次曰景回淄州司兵參軍次曰晦之纍進士樂天無子以姪孫阿新為之後樂天幼好學長工文纍進士拔萃制策三科始自校書郎終以少傅致仕前後歷官二十任食祿四十年外以儒行修其身中以釋教治其心旁以山水風月歌詩琴酒樂其志前後著文集七十卷合三千七百二十首傳於家又著事類集要三十部合一千一百三十門時人目為白氏六帖行於世凡平生所慕所感所得所喪所經所逼所通一事一物已上布在文集中開卷而盡可知也故不備書大歷六年正月二十日生於鄭州新鄭縣東郭宅以會昌六年月日終於東都履道里私第春秋七十有五以某年月日葬於華州下邽縣臨津里北原祔侍御僕射二先塋也啓手足之夕語其妻與姪曰吾之幸也壽過七十官至二品有名於世無益於人褒優之禮宜自貶損我歿當斂以衣一襲以車一乘無用鹵薄葬無以血食祭無請太常諡無建神道碑但於墓前立一石刻吾醉吟先生傳一本可矣語訖命筆自銘其墓云樂天樂天生天地中七十有五年其生也浮雲然其死也委蛻然來何因去何緣吾性不動吾行屢遷已焉已焉吾安往而不可又何足厭戀乎其間公姓皇甫諱鏞字和卿始封祖微子也周克殷封於宋九代至戴公戴公之子曰皇父因字命族為皇父氏至秦徙茂林改父為甫及漢遷安定朝那其後為朝那人五代祖珍義資建二州刺史曾祖文房高陵令祖鄰幾賜汝州刺史考愈纍贈尚書左僕射太子太保妣洛陽賈氏贈姑臧郡太夫人公由進士出身補夏陽主簿試左武衛兵曹充宣歙觀察推官轉大理評事詔徵授監察御史改祕書郎殿中侍御史內供奉始賜朱紱銀印充鳳翔節度判官營田副使旋又徵還真拜殿中改比部員外郎河南令都官郎中河南少尹歷太子左右庶子并分司東都俄又徵拜國子祭酒未幾謝疾改太子賓客轉祕書監分司又就拜檢校左散騎常侍兼太子賓客轉祕書監分司始加命服正三品又遷太子少保分司封安定縣開國男食邑三百戶始立家廟享三世公先娶博陵崔氏後娶范陽盧氏二夫人皆有淑德先公而歿有二子曰璥曰珧一女適太原王諲以開成元年七月十日寢疾薨於東都宣教里第享年七十七皇帝廢朝一日是歲十月三日用大葬之禮歸全於河陰縣廣武原從太保府君先塋以盧夫人合祔焉公自將仕郎纍階至銀青光祿大夫自武騎尉纍勳至上柱國自布衣而佩服金紫自旅食而廟饗祖考封爵被乎身褒贈及乎先官品蔭乎後大其門肥其家儒者之榮無闕焉皆求巳稽古之力自致耳公為人器宇甚宏衣冠甚偉寡言正色人望而敬之至於燕遊觴詠之間則其貌溫然如春其心油然如雲也初元和中公始因郎官分司東洛由是得伊嵩趣愜吏隱心故前後歷官八九凡二十有五年優遊洛中無西笑意忘懷窮達與道始終淡然不動其心以至於考終命聞者慕之謂為達人當憲宗朝公之仲弟居相位操利權也從而附麗者有之公獨超然雖貴介之勢不能及及仲之失寵得罪也從而緣坐者有之公獨皎然雖骨月之親不能纍識者心伏號為偉人公好學善屬文尤工五言七言詩有集十八卷又著性言十四篇居易辱與公遊逮二紀矣自左右庶子歷賓客訖於少保傅皆同官東朝分務東周在寮友間聞之最熟故得以實録志而銘曰賢哉少保令聞令儀金璧其操鸞鳳其姿德如斯壽如斯位如斯嗚呼人爵天爵實兼有之廣武之原大河之湄龜告筮從吉土良時封於茲樹於茲嗚呼少保之墓百代可知公諱仲方字靖之其先范陽人晉司空茂先之後永嘉南遷始徙居於韶之曲江縣後嗣因家焉唐朝贈太常卿諱宏愈公之曾祖也嶺南節度使廣州刺史殿中監諱九臯公之王父也贈尚書右僕射諱抗公之皇考也贈潁川郡太夫人陳氏公之皇妣也都昌令仲端以下四人公之兄也監察御史仲孚以下二人公之弟也博陵郡夫人崔氏公之夫人也右清道率府胄曹景宣進士茂元明經智周公之子也監察御史裏行楊澥校書郎陸賓虞公之壻也公即僕射府君第五子貞元中進士舉及第博學選登科初補集賢院校書郎丁內憂喪除復補正字選授咸陽縣尉鄜坊節度使辟為判官奏授監察御史裏行俄而真拜歷殿中轉侍御史倉部員外郎金州刺史度支郎中駮宰相事議出為遂州司馬移復州司馬俄遷刺史改曹州刺史河南少尹鄭州刺史入為諫議大夫福建觀察使兼御史中丞徵還為太子賓客再為左散騎常侍京兆尹華州刺史兼御史大夫祕書監勳至上柱國階至銀青光祿大夫封至曲江縣開國伯食邑七百戶開成二年四月某日薨於上都新昌里第詔贈禮部尚書以某年八月某日歸葬於河南府某縣某鄉某原祔僕射府君之封域焉公幼好學長善屬文俯取科第如拾地芥著文集三十卷藏於家纂制詔一百卷行於代尤工五言章句詩家流稱之嘗撰先僕射府君神道碑及丞相文獻始興公廟碑由文得禮秉筆者許之文獻始興公九齡即公之伯祖開元中以儒學詩賦獨步一時及輔弼明皇帝號為賢相餘慶濟美宜在於公公沿其業襲其文而不嗣其位惜哉矧公為人溫良沖淡恬然有君子德立朝直清貞諒肅然有正人風在官重易簡綽然有長吏體為子弟孝敬為伯父慈和與朋友信寵辱不驚其心喜慍不形於色入仕四十載歷官二十五享年七十二才如是祿如是壽如是宜哉居易與公少同官老同遊結交慕德久而彌篤故景宣等以論撰先德見託為文式序且銘勒於墓石銘曰在唐張氏世為儒宗文獻既歿鬱生我公我公渢渢學奧詞雄緣情體物有文獻風慶襲於家道積厥躬駿足逸翮天驥冥鴻始自筮仕迄於達官六刺藩部再珥貂蟬大諫選重尹京才難賓於望苑寵在蓬山凡所踐歷皆有可觀終然允臧巳矣歸全嗚呼洛郊北阡邙阜西原佳城一閉陵谷推遷所不泯者令名藹然公諱稹字微之河南人六代祖巖隋兵部尚書封平昌公五代祖宏隋北平太守高祖義端魏州刺史曾祖延景岐州參軍祖諱悱南頓縣丞贈兵部員外郎考諱比部郎中舒王府長史贈尚書右僕射妣滎陽鄭氏追封陳留郡太夫人公即僕射府君第四子後魏昭成皇帝十五代孫也公受天地粹靈生而岐然孩而嶷然九歲能屬文十五明經及第二十四試判入四等署祕省校書二十八應制策入三等拜左拾遺即日獻教本書數月間上封事六七憲宗召對言及時政執政者疑忌出公為河南尉丁陳留太夫人憂哀毀過禮杖不能起服除之明日授監察御史使於蜀按任敬仲獄得情又劾奏東川帥違詔條過籍稅又奏平塗山甫等八十八家寃事名動三川三川人慕之其後多以公姓字名其子朝廷病東諸侯不奉法東御史府不治事命公分臺而董之時有河南尉離局從軍職尹不能止監察使死其柩乘傳入郵郵吏不敢詰內園司械繫人踰年臺府不得知飛龍使匿趙氏亡命奴為養子主不敢言浙右帥封杖決安吉令至死子不敢訴凡此數十事或奏或劾或移歲餘皆舉正之內外權寵臣無奈何咸不快意會河南尹有不如法事公引故事奏而攝之甚急先是不快者乘其便相噪嗾坐公專逞作威黜為江陵士曹掾居四年徙通州司馬又四年移虢州長史長慶初穆宗嗣位舊聞公名以膳部員外郎徵用既至轉祠部郎中賜緋魚袋知制誥制誥王言也近代相沿多失於巧俗自公下筆俗一變至於雅三變至於典謨時謂得人上嘉之數召與語知其有輔弼才擢授中書舍人賜紫金魚袋翰林學士承旨尋拜工部侍郎旋守本官同中書門下平章事公既得位方將行巳志答君知無何有僉人以飛語構同位詔下按驗無狀上知其誣全大體與同位兩罷之出為同州刺史始至急吏緩民省事節用歲收羡財千萬以補亡戶逋租其餘因弊制事贍上利下者甚多二年改御史大夫浙東觀察使將去同同之耆幼鰥獨泣戀如別慈父母遮道不可通詔使導呵揮鞭有見血者路闢而後得行先是明州歲進海物其淡蚶非禮之味尤速壞課其程日馳數百里公至越未下車趨奏罷自越抵京師郵夫獲息肩者萬計道路歌舞之明年辨沃瘠察貧富均勞逸以定稅籍越人便之無流庸無逋賦又明年命吏課七郡人各築陂塘春貯雨水夏溉旱苗農人賴之無凶年無餓殍在越八載政成課高上知之就加禮部尚書降璽書慰諭以示旌寵又以尚書左丞徵還旋改戶部尚書鄂嶽節度使在鄂三載其政如越太和五年七月二十二日遇暴疾一日薨於位春秋五十三上聞之軫悼不視朝贈尚書右僕射加賻贈焉前夫人京兆韋氏懿淑有聞無祿早世生一女曰保子適校書郎韋絢今夫人河東裴氏賢明知禮有輔佐君子之勞封河東郡君生三女曰小迎未筓道衛道扶齠齓子曰道護三歲仲兄司農少卿積姪御史臺主簿某等銜哀襄事裴夫人韋氏長女暨諸孤幼等號護牆翣以六年七月十二日祔葬於咸陽縣奉賢鄉洪瀆原從先宅兆也公著文一百卷題為元氏長慶集又集古今刑政之書三百卷號類集并行於代公凡為文無不臻極尤工詩在翰林時穆宗前後索詩數百篇命左右諷詠宮中呼為元才子自六宮兩都八方至南蠻東夷國皆寫傳之每一章一句出無脛而走疾於珠玉又觀其述作編纂之旨豈止於文章刀筆哉實有心在於安人治國致君堯舜致身伊臯耳抑天不與耶將人不幸耶豫嘗悲公始以直躬律人勤而行之則坎壈而不偶謫瘴鄉凡十年髮斑白而來歸次以權道濟世變而通之又齟齬而不安居相位僅三月席不暖而罷去通介進退卒不獲心是以法理之用止於修一職不布於庶官仁義之澤止於惠一方不周於四海故公之心不足也逢時與不逢時同得位與不得位同富貴與浮雲同何者時行而道未行身遇而心不遇也執友居易獨知其心以泣濡翰書銘於墓曰嗚呼微之年過知命不謂之夭位兼將相不謂之少然未康吾民未盡吾道在公之心則為不了嗟哉惜哉道廣而俗隘時矣夫心長而運短命矣夫嗚呼微之巳矣夫唐有通四科達三教者曰惟崔公公諱元亮字晦叔其先出於炎帝至裔孫穆伯受封於崔因而命氏漢初始分為清河博陵二祖故其後稱博陵人曾祖悅洛州司戶參軍贈太子少保祖光迪贈贊善大夫考抗揚州司馬兼通事舍人贈太子少師妣太原王氏贈晉陽郡太夫人公即少師季子解褐補祕書省校書郎從事宣越二府奏授協律郎大理評事朝廷知其才徵授監察轉殿中歷侍御史膳部駕部員外郎洛陽令密州刺史公既至密密民之凍餒者賑恤之疾疫者救療之胔骼未殯者命葬藏之男女過時者趨嫁娶之三月而政立二年而化行密人悅之發於謠詠換歙州刺史其政如密先是歙民畜馬牛而生駒犢者官書其數吏緣為姦公既下車盡焚其籍孳息貿易一無所問先是歙民居山險而輸稅米者擔負跋涉勤苦不支公許其計斛納緍賤入貴出官且獲利人皆忘勞農人便之歸如流水朝廷聞其政徵拜刑部郎中謝病不就俄改湖州刺史政如密歙加之以聚羡財而代逋租則人不困謹茶法以防黠吏則人不苦修堤塘以防旱歲則人不飢罷氓賴之如依父母入為祕書少監改曹州刺史兼御史中丞謝病不就拜太常少卿遷諫議大夫屢上封章言行職舉上召對加金紫以獎之假貂蟬以寵之未幾朝有大獄人心惴駭勢連中外衆以為寃百辟在廷無敢言者公獨進及霤危言觸鱗天威赫然連叱不去遂置笏伏陛極言是非血淚盈襟詞竟不屈上意稍悟容而聽之卒使罪疑惟輕實公之力既而真拜因旌忠臣繇是正氣直聲震耀朝右搢紳者賀皆曰國有人焉國有人焉公以為名不可多取退不必待年決就長告徑遵歸路朝廷不得已在途拜太子賓客分司東都公濟源有田洛下有宅勸誨子弟招邀賓朋以山水琴酒自娛有終焉之志無何又除虢州刺史蓋執政者惜其去將欲馴致而復用之太和七年七月十一日遇疾薨於虢州廨舍天子廢朝一日贈禮部尚書周行士林聞者相弔宗族交友靡不出涕遺直遺愛公兼有焉嗚呼公之將終也遺誡諸子其書大略云吾年六十六不為無壽官至三品不為不達死生定分何足過哀自天寶以還山東士人皆改葬兩京利於便近唯吾一族至今不遷我歿宜歸全於滏陽先塋正首邱之義也送終之事務從儉薄保家之道無忘孝悌吾玉磬琴留別樂天請為墓志云爾夫人范陽盧氏先公而歿有子九人長曰熅通事舍人次曰芻言罕言舉進士次曰緩中牟尉其下皆幼稚熅等哀毀孝敬號護轜翣以九年四月二十八日用大葬之禮歸窆於磁州昭義縣磁邑鄉北原遷盧夫人而合祔焉遵理命也公之丁少師憂也退居高郵其地卑濕泣血臥苫者三載因病痺其兩股焉逮於終身竟不能趨拜從祖弟仁亮竄謫巴南歿而無後公先命長男熅護喪歸葬後命幼子聽繼絶承祧自宗族及朋執間有死無所歸孤無所依者公或葬之祭之或衣之食之或婚之嫁之侯齊二家之類是也故閨門稱其孝㣥從仰其仁交遊服其義可不謂德行乎公幼嗜學長善屬文以辭賦舉進士登甲科以書判調天官入上等前後著文集凡若干卷尤工五言七言詩警策之篇多在人口其餘著述作者許之可不謂文學乎公之典密歙湖也理化如彼可不謂政事乎居大諫騎省也忠讜如此可不謂言語乎公夙慕黃老之術齋心受籙服氣鍊形暑不流汗冬不挾纊膚體顏色冰清玉溫未識者望之如神仙中人也在湖三歲歲修三元道齋輒有彩雲靈鶴回翔壇上久之而去前後置齋七八而鶴來儀者凡三百六十其內修外感也如此可不謂通於大道乎公之晚年又師六祖以無相為心地以不二為法門每遇僧徒輒論真諦雖耆年宿德皆心伏之及易簀之夕大怖將至如入三昧恬然自安仍於遺疏之末手筆題云暫榮暫悴敲石火即空即色眼生花許時為客今歸去大歷元年是我家其解空得證也又如此可不謂達於佛性乎總而言之故曰通四科達三教者也居易不佞辱與公遊者三十餘年年老分深定為執友况奉遺札託為斯文且慚鄙陋不敢辭讓銘曰滏水之陽鼓山之下吉日吉土載封載樹嗚呼博陵崔君之墓
