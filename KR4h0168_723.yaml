front:
  text: 全唐文欽定全唐文卷七百二十三俞元和中進士
  hash: sha256:5e11423bc6d36ef5be999f16a9fe51a03ea90265e80ecba99b72b052636b2a37
  markers:
  - {type: head, offset: 14, content: 紇干俞, id: KR4h0168_NFKB_723-h1, level: 1}
body:
  text: 眷理心之至者有明鏡而比諸皎然可鑒泊然其虛舍將迎之載勤無情是得存好惡之不辨何狀不儲彼誠之明惟道斯守居中自執於精一待物豈殊乎先後云誰鑒矣則用當其無匪我功焉乃為而不有淵兮內照曠若虛受伊默慮其智愚儼分形於美醜稽至理也其性命哉瑩爾蒙蔽滌乎氛埃引曜宏納清明洞開自外爰依叶彼生而有象由衷必應體夫神以知來故得稱有別於宏規等無私於衆類苟觀過之能審爰見疵而不愧始求義於昭昭卒窮微於至至和平自保非險乎山川容貌既呈必肖乎天地美夫鑒乃不藏勝而無傷恆其德匪明而匪晦狀於物或圓而或方仰周文之翼翼同叔度之汪汪是知宏量資乎日宣儲精本於明證鏡將心而共理影與形而合應思負局之克修並懸心而有稱感物攸在立誠取斯彼範金之遺制信靈府以相隨吾道方存庶一觀而無替其明固久亦屢照而忘疲想夫朗若爰啓靜而無悶比申鑒於盈尺願修容於進寸樂廣播披雲之詞莊生諧止水之論冀因照以元鑒豈逢時而在困列子占風之自履道而至淡皭若以體輕每泠然而意遂感時之候臨大塊以棲真與化為徒諒成形之分類美夫應彼飄舉隨乎屈伸如假羽翼回離埃塵必俟乎轉緑蕙搖青蘋穆以絶俗清乎便人摩九霄以騁望遵一氣而遊神是知本於無營且曰何思何慮超然獨往疇為我御瞻徐疾之匪差杳徜徉之有助誠之所待因嘯武以孤騫為用不疲偶化鵬而並翥欽若扇物資乎在躬此焉靜騖於以元同宜其經隱坌遭鴻濛肅以潛暢高而不窮期則罔虞皇載美於解慍德之為貴軒后必聞乎順風其或倒影虧蔽振衣容裔莫逞乎遠孰睹其際方出谷於來穴縹形騰以神契善行無迹顧綏策以何施乘化而遊信道途之不繫伊在御之有則曷躡虛而可尋明上士以離代啓至言以修心斯氣也激濁常全接虛固然初習習以遐邁卒諄諄以思元候不奸兮節之八音而咸應福能致矣旬有五日而方旋想乎上下無間乘淩有託既冲天而輕舉亦觀徼而惟寞鄙簫史蘭臺之鳳軼王子緱山之鶴道之云遠將自保於逍遙時不再來因以翔於寥廓日云暮矣月出之光始如鉤而可辨亦方蛾而乍揚太陰表精知就盈之所漸司歷紀候見哉生之有常原乎內職既修陰事允叶故得啓臨照於品類彰運行於紀牒尚迷山桂之叢稍應階蓂之莢沈碧水以輝動挂珠簾而影接孤懸亳野狼銜虛貴於殷年回燭汾陰鼎見方慙於漢葉高疑雪映朗若冰淨懷遠戍於虛弓望征人於破鏡將以洞纎芒而並深鑑符陰德而昭聖政豈比夫空驚思婦之心載發詩人之詠彼鏘珮鳴環之似瑤階玉砌之庭徘徊瞻乎爽朗晼晚俟其清熒披霧才升綃幕誤傳於盈手流天未滿窗徒訝其分形奚必效重輪之慶表三珥之靈然後可以光帝典而耀祥經者哉是知淪精蟾兔亦此之故比質瑾瑜其美何無所以澄清景於天杪蕩浮埃於物表倏周流於皓璧漸泛濫於靈沼千門始麗以涓涓午夜俄分而皎皎禮有讓遂成其魄政以齊勿謂之朓昔也示冲於朏謫見乎朒諒無徵於次舍斯有斁乎遲速今聖后垂統纎阿為僕本其位於西方正其居於北陸明大易致遠之義合升歌向中之目夫然則罔差於常度所以集帝臺之祉福配乎地者惟山麗乎天者為日登岧嶢之峻極見曈曨之初出廓靈海百川之宗孕金烏千里之質浮圓光於沆漾煥鮮耀而灔溢雖騰輝於碧浪之中詎侔色於紅萍之實觀夫烈霾曀赫炎精擘洪波歊太清馮夷駭躍罔象奔驚照灼兮驪珠潛吐曭朗兮龍燭忽生愕㣥仙於金鏡驚天雞於玉京巨浸半涵猶韜普天之美人寰尚暝孰識未融之明懿其千仞可躋四目斯在危岫陵乎碧落日域遼乎滄海既登陟以遐觀知濛汜之浴彩晨光乍分夜色未呚升黃道而將始臨下土而有待晝明夕晦徒觀其躔次之常出有入無孰測夫陰陽之宰氣澄霧卷月落星殘流暉電曜散彗虹攢將煥爛以下燭出浩渺而上干挂扶桑而杲杲升暘谷而團團敷九華而赩奕燦三山之峰巒且幾升天無憂於見沫已能烜物寧患乎祁寒順寅賓而不忒爍溟漲之無端乘變化而復往得沐浴乎波瀾於是游太極辭殘夜羲和敬導運行有舍得天能久克彰乎真明委照無私不間於夷夏嘗傾藿而久俟冀餘光之一借海日飛光神山之陽流一氣於天表自三峰而景彰龍車回馳麗於高而特異金闕互映混其彩以交相原夫出巨浸以貞明次崇岡而久照當峻極之離立滅塵氛而引曜遂使授人之歷分乎命以正其方涉海之倫駭乎目以觀其徼遲隱見於危壁藹晶熒於遠嶠披道接靈之府含華蘊粹之仙秉至陽而不極體元氣於自然駭景克存訝魯陽揮戈於在側騰精獨往疑羲和弭節於其巔於以繫時於焉絶俗幽莫可辨明之所燭異景暫凝乎地首奇峰載列於鼎足影搖林樹漸升桑野之躔色動鯨波尚想甘泉之浴且霞標建其南服日觀揭其東隅雖照臨之等類亦重深之道殊豈若丹極赫以戒晨仙宮朗而增煥方運行而不息乃曈曨而未旰森瓊樹之離離曳羽衣之燦燦此日而御惟山有輝諒難徵於紀牒思載瞻乎海沂彼或棲真方丈必期乎悠久如將處代崦嵫且懼於浸微是以養志忘形馳暉以寧福地無阻元門寢扃誓將越渤澥陵杳冥仰無私之照窮不死之庭願參光而有待庶㣥仙兮是聽惟彼戚兮既貧且窶跡未出於樵夫身尚同於牧豎劬勞日夕頓冒風雨苟直道而退讓不非義而進取執以綆索積諸歲年飯以露草飲之靈泉處東臯之田同無得而乃得居南山之石常思賢以薦賢高節彌堅潔操無改扣角之音雖倦立身之志恆在遊乎緑野息以青疇雲霞掩曖山川阻修異董生之乘馬同巢父之飲牛棲息歧路蹉跎壟畝衣褐不足蔽其骭糠粃不足充其口心常想於青雲貌恐遲於皓首彊於學也以待問藏其器焉以俟時獨商歌而奚謂思齊君而聽之君乃問旃知其在野君臣從此而道合理化以之而相假才足堪於輔佐位寧卑於庸下昔伏波資越銅之具皇漢得天馬之度蓋以張戎容程國步允稱其德懷致遠之無疆既授於師必命工而新鑄象物惟肖利人則深研精以範酌憲於心始察形而視骨遂修火以鎔金煥若中起昂然四臨望丹闕以就日俯元墀而擇陰俾夫司僕載馳別於㣥而自仰倌人匪懈御於王而審象疑顧影以權奇乍含輝而爛朗由茲而明式遐布觀我而逸材利往即山為類且尚其功存齕草無施敢勞於惠養徒想其屹以沛艾爛兮晶熒狀赤文而呈瑞方候日於堯庭超乎獨立的爾殊形訝騏驥之變態聿登歌於彼駉叶以陰德稟於地靈列君軒之粹異咸此駿之儀形是知法與人共思衆才而膺國用王惟智周寫宏範而俾營求矧乎揉其物於精剛制其器於質良克絶奔踶邈無元黃雖齊力齊毫用每虧於典禮逮如龍如鹿形既造而昭彰美成式之不替信改鑄之有常奚絶塵之足比庶出水而同方者哉銅為寶兮固越俗之所擯馬之神也仰漢庭而未進猗善相以來歸豈康衢之增駿乎鳴鶴元和中進士流月半庭兮頽光初夕金釭坐明兮凝輝的的蛾繚繞而未息意沈潛而自溺逝者既往存者可哀伊戚戚之未畢俄栩栩而復來覩前軌之已覆因委命而不回彼尚無恨哉殊化難窮神理斯昧物情無傷亦或貽害每捐慮於進止恆忘懷於否泰任逍遙以無營將何負而顛沛如膏之明豈怪前死比薰之馥所惜同燬儔二美而多慚痛一生之虛委明不可投投之必斃膏不可赴赴之必泥彼優游之萬端奚於斯乎失計始來也吾故知其必凶及死也吾未識於所從何生微而智劣苟不若於自空爾愛候明何不候日光陰不留尚存爾質爾愛候明何不候月素華將移爾猶不滅何相繼以焚軀竟不知謀之為拙元豹深隱終不效幾是蟲以欲卒與命違豈若不死之仙鼠得昏夕而後飛道幹始根陽圓成象同律審候紀物書雲各守其官備創厥事考同律於巡禮先閲虞書資首歷於張生方尋漢志恭惟所典實曰司存職此之由須聞不怠影度從候物精昭芒既未曉於談天徒效誠於窺管遂使牛車轉水顛倒烟灰之色雞卵色黃混淆氣火之象損三生一紛糾無憑居陰布陽舛錯奚甚史也胥品誠迷厥官縱欲陳力就列未知不能者止黍細厥粒徒寡其人先無告辭後有推過此而獲宥何以用刑季友元和五年進士閏之所起自歷而推得餘日於終歲爰稽候於正時其始也日之行而疾月之行而遲躔次周流運將窮矣毫奸度失是遠而不歸餘何以定一歲之歷不小正何以序四時之紀於是太史授事羲和敬理以日繫月積三年而成原始要終豈周月而已天時由之而式叙國令於焉而合軌春生夏長不失其常東作西成孰知所以雪應冬而絮落雲識夏而峰起秋之夕湛露為霜春之朝堅冰為水豈不以律之克中閏之匪虛以風以雨兮各得其序曰寒曰燠兮無悖於初國家握乾符正律書契洛下之言算定乎一日之設考容成之律閏生乎卒歲之餘故得氣正於今律移於昔履端於始節乃差而匪差歸餘於終日雖積而不積昊天之歷象咸若重黎之職司有辟候月盈缺豈資蓂莢而知推日短長不假土圭而測且夫夏有伏冬有臘匪閏則其氣不順月有縮日有盈匪閏則其氣不成故有慢時廢朔則曰不常無藝闔扉聽政則曰假時來歲歷前古之所重帛丿糸後王之取制矧可昭翼翼扇巍巍百王之理是倚庶績之廣焉依丕赫哉我后之正時定歷堯典而同歸謨宜春人元和七年進士金為鏡兮其鑑則明人為鏡兮其象則精彼有取其照燭我方致乎和平廣霽而磨礱既至酌獻而邦家以貞懸於心則四聽一作聰常朗置於握而萬方不傾惟賢任賢自聖傳聖守之則通幽洞冥執之乃窮理盡性致和樂功逾止水之平徵古今道光仁壽之鏡比璿樞以潛運挂靈臺而韜映是委照以無疲每含光而不競無鑒於水自視於人曷容華之自飾惟道德之所親功匪勤於鎔範義將協於君臣斯乃至寶載光皇道辨物數之紛紛洞晦冥之杲杲放之可包乎海嶽卷之可盈乎懷抱煥乎發蒙皎若晴空光甚鑑兮塵不能翳德若容兮物莫能充以是為臣則獻可替否以是為鏡則進思盡忠斯為理兮化洽斯為鏡兮照窮惟賢聖之光贊含英華而不散執一法而不回仰干齡而殊觀貞明而翹楚角逐皎潔而㣥邪冰泮茲鏡也克念則聖罔念則荒播無疆以垂範披六幽而散光燭明明而洞洞歷久久而煌煌聖作物覩鏡清寰宇驗成敗之原知榮辱之主我鏡在德曾無盤龍之雕我鏡在心自有山雞之舞若然則皇唐邁德於陶唐吾君齊聖於文祖表微元和十四年官蜀王府參軍士有遊藝據德斧藻言行不形喜慍不誤是非者則聞之於府君焉府君諱載字載其先齊太公之後食采于崔而因氏焉洪源茂根世有名士至於貂蟬映時金紫奕代竹帛繁盛不復書矣王父謙皇易州修政府折衝列考季試恆王府司馬府君則司馬之第二子也伯仲五人皆美鬚鬣麗容貌各身長六尺二寸俱懷文武之用鬱為豪盛之家長曰戩隴州陽縣尉令弟鉷長武城使兼御史大夫令弟晟文林郎太子通事舍人令弟成大理寺主簿府君植性廉潔執心沖和遷善罔遺見惡必止豈謂德優齡促奄隨尺波享年五十有九以元和十四年五月二十三日遘疾終於幽州薊縣招聖里之私第也夫人彭城劉氏㷀㷀蹙容悄悄閨壼齊潔喪事敬逾古昔有子五人男二人女三人長曰公聿試左武衛兵曹參軍侍疾有黃香之譽居喪繼柴也之哀次曰公淑善諷詩禮名美戎郎昆弟等皆善居喪絶漿茹荼泣血羸瘵鄰里哀之女子等皆以孩提生知孺慕可哀也哉粵以其年十一月十六日窆於幽州幽都縣保大鄉杜村北一里之原祔于先塋禮也表微嘗接府君之餘論沐府君之清風學淺詞荒叙事有闕緘之心府有愧幽默銘曰保大之鄉桑乾之湄泉扄長夜潛翳英姿逝于中齡孰不悽其崔氏之先世有英賢既盛簪筆亦耀貂蟬太公之封千古昭然孀妻茹荼令子泣血鄰無相舂親有嗚噎志諸貞石用旌賢哲汝士字慕巢元和四年進士又登宏詞科長慶中纍擢工部侍郎出為同州刺史開成時由兵部侍郎為東川節度使入為吏部侍郎進刑部尚書卒柳棠者凶悖囂豎識者惡之狡過仲容才非夫子且膺門之貴豈宜有此生乎昔周公撻伯禽以戒成王也昌邑殺王式式昌邑之師也而怨霍光乎豈不由師傅之情爾興亡之道孔子先推德行然後文學焉吾師垂訓千古不易前書云不敢蔽才何必一柳棠矣若以篇章取之寧失於何植王條也邁元和中進士官郎中歷吉州刺史一氣絪縕宛成形而擎跽相向儼守日而昭彰可分其色惟黃雖配位乎下土其形有二如輔明於大君原夫左之右之以引以翼雖髣佛而異體乃焜煌以同色理殊執熱寧濯增泉之隅事近負暄杳在離宮之側兩分夾臨下之照偕出契不孤之德爾其從炎漢以賦象能環衛以成功白駒乍留守之而無荒無怠踆烏不駐隨之而自西自東屆赤霄而煙雲靡雜循黃道而光彩混同容裔斯呈交相可名幸因時以融結得託質於昭明契同心之言是為氣合潤通理之飾吾非染成其或杲杲初晨悠悠云晚曾不斯須而離何虞運行將遠鄙魏臣捧而在夢笑夸父追而莫返嘉夫儀形似是想像歸真離立環乎兩珥聯影繞於重輪遂使慕有道之風歸我一德奉無私之照惟豫二人受其采豈無異色呈乎瑞不待他辰所以稟中央正氣當四夷咸賓誠宜陽景廓開翼戴徘徊升扶桑孰云孑立厠羲和乍若朋來觀其輝煥瑞牒昭晰雲路委疾徐而不更其守循躔次而罔於度信可以端拱道泰遐荒悅附今所以賦守日之祥表稱君之裕太陽之升兮鑠景氣而澄氤氳聖人之德兮上蔚結而生慶雲外浮相煥中映成文郁郁昱昱繽繽紛紛粲兮若組繡之縈寶鏡翊兮若申甫之相明君無心而生應德而出不曜青以干呂能叶慶以扶日縹眇蜿蜒游龍相逐而不如斐亹葳蕤彩霓舒狀而難匹始流形於孤嶽終垂象於九圍麗碧霄以增媚捧金烏而徐飛感覆幬之仁效靈表瑞憑元黃之氣耀影含輝夫天道無言以物應聖聖功不宰物自效命故有非煙非雲為祥為慶付我元吉彰我元盛豈徒衆彩錯出重輪交映者哉且日者實也象君而貞明雲者運也應時而發生就日而浮若就君之朝聘五色成象告五方之和平騰乎天假其陰隲見乎晝資厥炎精懿乎煌煌燭空煜煜呈彩域中之目無不仰觀天下之心若有所待何必蒼梧稱美橫汾是載者乎夫變化翕忽希夷混茫理至則無幽不感德盛則化妖為祥煥厥霄極亘於天光彼丹甑玉燭蓂莢芝房孰若此感化而見五彩其相者焉是知聖與冥通理由感召故我后之盛德不求彰而自耀狐出潛穴冰膠廣川俯皛皛而是聽慮峩峩之未堅於是臨渚曲傍河壖疑涓溜之在中龎茸不動審凝沍之徹底睢盱欲前足縮縮而心感貌綏綏而聽專積素之姿逾淨莫赤之容潛映逼嚴凝以屬耳寧憚苦寒思涸沍以投軀必資餘徑若乃煙橫古岸月照空坻寂無人而久聽紛觸物以多疑聆遠吹之颼飀謂波搖岸曲聞殘錚之淅瀝驚溜斷河湄郤曲載移於短步忙懷屢變於妖姿望寒墟之在前庶斯遠矣惑夏頒之不至俯而聽之遠近陰凝淺深風壯念茲道里在此冰上試之以耳猶回耳之可圖試之以身將退身而何望况復窮陰慘凜川長難審徵春魚之欲上驗時不同比夏蟲之有疑執心彌甚及夫虛盈以測厚薄斯分颯為裘之毛知不可陷低正邱之首惟恐有聞既勃窣而投趾乃凌兢而慎履尋聲不離於聽表處薄恐成於禍始奮自擾之迹一去一前曳有芃之軀時行時止是知事欲審於未萌心無妨於若驚儻躡虛以輕進必履險而忘傾則濡尾之憂至溺身之害并異哉一獸之智可以偕善必聽而配規行者也雷動而息地卑而深當嚴凝之戒節向博厚以潛音順靜於時乃退藏而默處反本乎土乍響絶而聲沉豈獨斂震驚於坤德抑亦彰休復於天心原其辭滿盈止奮肆混然無眹寂兮深閟解威鄰於蟄戶銷聲處夫陰位足可以善列缺之歸功見元冥之內事以是細觀其所廣徵其類初疑罷轉石遠積南山之陽又若駐奔車深掩長門之地象則存矣理難求焉冲融將凝沍暗息隱轔與涇洛潛連道尚處幽奚爽下安於土功存作解終期上奮於天足使至人將齊其默默楚客絶想夫填填苟有託其厚載亦無辭於小畜駭氣結乎土囊迅音止夫坤軸斯可以驗啓閉分寒燠不失動靜乃順之於時將體行藏故受之以復未萌響像詎可求思勿以潛思伏矣是當薄言振之一陽之氣始生孰能輕動百里之音未發吾非後時自然居善閉之中因積風所扇且窅冥以在斯豈迅烈而遽變覩秋毫之末者無慙聽而不聞寫鼓鐘之音者空嘆視而不見若夫元律云暮衆彙淒其苟未離乎坎窞且自理於希夷不然先王何以取象大易於焉立辭至矣哉法雷而行教也弛張之義在茲審其賢必鄉之耆德納其獻惟國之哲王爰進牘以舉善希命官之必良修身既浹於閭里纍行宜應乎搜揚垂鶴頭之書來自衡門之下俯鮐背而獻發乎丹闕之旁書曰能蘊於藝文賢彰其德行文可以贊謀猷光教命德可以鎮邦慝備匡諍今則潛獲其人可施於政咸能藏器以自持秉心而無競處乎野興在軸之歌遇其時仰干旄之詠矧臣察之而甚熟交之而益敬逼桑榆暮景敢罔於天聰當梓良材將裨於國慶若夫博通之藝可稱虧汚之德難升臣不敢書其德而罔舉賢能若乃閨門之風雖浹鄉黨之言未洽臣不敢請於王而遠離荷鍤凡所稱無黨所覆有經録其功能策勳於盟府采其義能掞藻於天庭豈以臣之職所言莫可昔明王問政於耆耋聖后取人於農帝乃啓書而相視賢不佻聽讜言而其容穆穆納嘉猷而厥德昭昭由是道冠百王風馳四裔使居鄉者潔其已在家者修其藝以黃髮薦士之書為式欲庶官推賢之路無蔽彼周詢鄉老漢延㣥儒未足量功而並利越石潁州人初名黃石元和十五年進士官藍田令會昌三年卒殷甲不惠於天下其臣放之後能改過亦為臣之所立或曰社稷之臣必當如是淺於國者之為論也至若承湯之教全殷之統立臣之節豈如是耶君上之不肖與賢智豈臣下之有不知耶擇其嗣當求賢而立之不知其非賢以為不明因而放之令其自新如日蝕不吐河清難俟中原之鹿將軼時乘之龍待駕於臣之業何如哉况乎體非金石而冒霧露如懷失國之詬以損其身則弒君之謗消無日矣陳子曰臣之忠有幸而忠者也君之立有幸而立者也如殷之君臣皆幸而成者噫浞浞接踵羿羿比肩君可放乎哉其後新取於西魏成於東司馬氏之有天下其始也未嘗不伊不周其終也未嘗不羿不浞皆取伊周以為嚆矢也孟子曰無伊尹之心則篡也有旨哉處元穆宗朝官知制誥朕祇荷大構屬當沖九廟之嚴因豫以輕重四海之大由我以慘舒每懷推誠不敢自用大布利澤嘉聞讜言庶無尤少享重負豈虞信不及於物德不動於人以懷宴安遽此致寇張韶蘇元明等驅率工徒劫攜兵刃白晝竊發暴犯宮闈震驚朕躬近幸禁壘即時勒五營騎士七萃熊羆少命偏師才分左廣皆憑忠奮發賈勇爭先自申及酉撲滅皆盡斯實上元降鑒宗社垂休愍豫冲人俾無顛覆其兩軍立功將士已節級優賞諸將校其日部領軍士者委有司條流甄獎具名聞奏其逆賊親屬同居知情之外一切不用追擾尚恐因緣仇隟告訐平人自今已後縱為妖黨有小詿誤者並許自新亦不須勘問嗚呼秦皇車碎於博浪漢祖心動於柏人或不悟而終亡或自新而流祚齊晉多難而啓國衛邢無難而喪邦蓋謂憂勤則福興安肆則禍稔天其意者警于豫乎而今而後知元貺可以德歸神器難於力恃咨爾股肱輔臣庶寮百辟洎方郡侯伯有位之士無或棄豫謂不可教其有違道傷理徇欲懷安面刺庭攻無有隱諱成王之紹文統武帝之開高業皆蒞祚日永享國日深夫豈他哉蓋大臣維之而不跌也使朕無羞于二王者繄爾多士乎淑桂管觀察使渤弟救災恤鄰古之令典有備無患邦之善謀甲宣彼六條克念勤恤施其五教務彼樂輸而天災流行實害嘉穀井稅不給職司其憂告糴於鄰庶擬泛舟之役有年而蘊曷資祿廩之用况今寰宇初泰黔黎再寧惟彼萊田尚多荒隴畎畝之獲每憂於家給什一之稅咸資於國儲或委積之闕然乃凶歉而無備觀察援今習古恐謬是非郡守通變隨時何妨損益捨而勿讓咸謂合宜安人之本為政是先法令克修紀綱不忒乙授茲六命職彼一同實曰子男作人父母綏之以德化糾之以典刑自可禮義從心回邪革面何乃慢其銜策紊彼彞倫使氓之蚩蚩已懷奸慝之計而政罔察察徒云久遠之方廉使以糾繆為心當繩漢律州將以飾詞為喻有昧周官百姓合此從刑縣宰宜從通計先王教人必資農本諸侯振旅實因事隙苟法度之不率豈黔黎之克安彼丁以阜俗為心類夷吾之寓政節度以疲兵是恤爽充國之嘉謀昔楚宋理戎尚反築耕之士魏蜀堅壁猶分上下之軍方今九服賓王四夷即序宜修文以化俗豈黷武而屯師既車書之大同何緩急之爭用兩端之要片言可知
