front:
  text: 全唐文欽定全唐文卷五百四十四貽孫貞元時官夔州刺史纍擢至諫議大夫充宏文館學士出為福建都團練觀察處置使兼御史中丞
  hash: sha256:85b7a732d5c315b1fb11b88017e4017d5a710e28f56339edbc9fe2cdfe919758
