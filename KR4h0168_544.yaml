  - {type: head, offset: 14, content: 李貽孫, id: KR4h0168_NFKB_544-h1, level: 1}
body:
  text: 歐陽君生於閩之里幼為兒孩時即不與衆童親狎行止多自處年十許歲里中無愛者每見河濱山畔有片景可採心獨娛之常執卷一編忘歸於其間逮風月清暉或暮而尚留窅不能釋不自知所由蓋其性所多也未甚識文字隨人而問章句忽有一言契於心移日自得長吟高嘯不知其所止也父母不識其志每嘗謂里人曰此男子未知其指何如要恐不為汨沒之飢氓也未知其為吉耶凶耶鄉人有覽事多而熟於聞見者皆賀之曰此若家之寶也奈何慮之過歟自此遂日知書服聖人之教慕愷悌之化達君臣父子之節忠孝之際惟恐不及操筆屬詞其言秀而多思率人所未言者君道之甚易由是振發於鄉里之間建中貞元時文詞崛興遂大振耀甌閩之鄉不知有他人也會故相常衮來為福之觀察使有文章高名又性頗嗜誘進後生推拔於寒素中惟恐不及至之日比君為芝英每有一作屢加賞進遊娛燕饗必召同席君加以謙德動不踰節常公之知日又加深矣君之聲漸騰於江淮且達於京師矣時人謂常公能識真尋而陸相贄知貢舉搜羅天下文章得士之盛前無倫比故君名在榜中常與君同道而相上下者有韓侍郎愈李校書觀洎君並數百歲傑出人到於今伏之君之文新無所襲才未嘗困精於理故言多周詳切於情故敘事重復宜其司當代文柄以變風雅一命而卒天其絶耶君於貽孫言故舊之分於外氏為一家故其屬文之內多為豫伯舅所著者有南陽孝子傳有韓城縣尉廳壁記有與鄭居方書皆可徵於集故豫沖幼之歲即拜君於外家之門大和中豫為福建團練副使日其子價自南安抵福州進君之舊文共十編首尾凡若干首泣拜請序已諾其命矣而詞竟未就價微有文又早死大中六年豫又為觀察使令訪其裔因獲其孫曰澥不可使歐陽氏之文遂絶其所傳也為題其序亦以卒後嗣之願云峽中之郡夔為大當春秋為楚之國在秦曰魚復在漢稱古陵在蜀號巴東皆郡也梁為信州逮我武德復夔之號州始都督黔巫上下之地十九城是後或總七城或為雲安郡或統峽中五郡尋復為夔州都督之號或加或去今稱夔州都督府州初在瀼西之平上宇文氏建德中王述徙白帝城今衙是也東南斗上二百七十步得白帝廟白帝公孫述自名也後人因其廟時享焉艧宇飾偶煥如神功怪樹峯笋疏羅後前罅山險濤望者驚眙又有越公堂在廟南而少西隋越公素所為也奇構隆敞內無橕柱敻視中脊邈不可度五逾甲子無土木之隙靜而思之以見其人之王褱傑也直南城一里得巨石為灩澦地載之險此其淵壑獨峰兀頂萬仞崒拔高濤坳洑嶽躍坑轉獰龍護堆沸泳瀄浪窮年縋綆不究其次瞿塘暗導勢列根屬水魅施怪陰來潛往城之左五里得鹽泉十四居民煮而利焉又西而稍南三四里得八陳圖在沙州之壖此諸葛所以示人於行兵者也分其列陳隱在石壘春而潦大則沒秋而波減則露造化之力不能推移所以見作者之能瞿塘驛西有蜀先主宮瀼西有諸葛武侯廟皆占顯勝城東北約三百步有孔子廟赤甲山之半廟本源乾曜廨常為郡參軍著圖經焉其後為宰相今其地又為孔子廟傳者稱為盛事矣東水行一百七里得縣曰巫山神女之廟楚王之祠高唐陽臺之觀朝雲暮雨之府形勢在焉西水行二百里得縣曰雲安商賈之種魚鹽之利蜀都之奇貨南國之金錫而雜聚焉其人豪其俗信鬼神其稅易征即知其民不偷長吏得其道者涖之猶反掌云會昌五年十一月十三日建坦字保衡河南洛陽人宣宗朝纍官刑部侍郎鹽鐵轉運使改戶部出為東川節度使十二年卒年六十九贈禮部尚書河中兩池課鹽敕文只許於京圻鳳翔陜虢河中澤潞河南許汝等二十五州界內糴貨比來因循兼越入興元府及洋興鳳文成等六州臣移牒勘責得山南西道觀察使報其果閬兩川鹽本土戶人及邑南諸郡巿入又供當軍士馬尚有懸欠若兼數州自然闕絶又得興元諸府耆老狀申訴臣今商量河中鹽請放入六州界糴貨今年冬諸州和糴貯備粟澤潞四十萬石鄭滑易定一十五萬石河陽一十萬石太原二十萬石靈武七萬石夏州八萬石振武豐州鹽州各五萬石凡一百六十萬石以今秋豐稔必資蓄備其澤潞易定鄭滑河陽委本道差判官和糴各於時價每斗加十文所冀人知勸農國有常備淮安王神通有功於草昧且古之父子兄弟罪不相及以錡叛可纍五代祖乎八月三日坦頓首奉書拾遺公足下抱濟世之資抗出塵之迹德全道備雲臥谷飲遺名而聲飛晦耀而光發天子所以聞風下詔命作諫臣朝野聳瞻煙蘿動色足下懷寶樂山竟未為蒼生起實一代之孤風千年之曠躅不可得而纍也坦器凡材薄猥踐班榮鎮守宣池路出瀍洛眺嵩峯之峻極仰景行之彌高吟想徽猷寤寐飢渴幸甚幸甚坦雖未獲拜面而舍弟嘗師習於左右矣飽聞足下之高義竊承足下詠堯舜之言志周孔之道以致君惠人為意非特熊經鳥伸長往而不返者也甚善甚善然則孔氏之道不隘小官不榮大位於是宰中都而魯國化作相而天下服世衰運微其道中阻猶且歷國應聘窮塞而後止今天下歡康異衰周之代也萬方一統非列國之時也而足下猶獨超然高舉不答天子之命豈孔氏之徒歟愚竊惑焉大凡今之人奔分寸之祿走絲毫之利如㣥蟻之附腥膻聚蛾之投爝火取不為醜貪不避死得以為榮失以為辱不由道以進退不量能以授受如此者多有識知病足下豈不欲矯棄流俗獨為君子哉誠志士之端操賢人之大業也敢不愛慕之乎或聞足下又以蒲輪元纁郡府之禮不到遂徘徊山門未果輕去難進之道三揖為宜在足下俟駕而行斯可矣餘復何可道哉少許茶果謹具別紙公程迫速不獲拜詣馳誠而已不具盧坦白公綽字寬小字起之京兆華原人舉賢良方正直言極諫再登賢良方正科纍拜御史中丞元和中遷兵部侍郎兼御史大夫長慶三年改尚書左丞檢校戶部尚書山南東道節度使敬宗朝歷刑部尚書大和四年為河東節度使徵為兵部尚書卒年六十八贈太子太保諡曰成請諸司諸使應有捉利錢戶其本司本使給戶人牒身稱準放免雜差遣夫役等如有過犯請牒送本司本使科責府縣不得擅有決罰仍永為常式者臣昨因奉進止追勘間廄使下利錢戶割耳進狀劉嘉和訴被所繇分外科配等事由因勘責劉嘉和所執牒身所引敕文敕不獲牒間廄使勘敕下年月日又稱遠年文案失落今據間廄使利錢案一使之下已有利錢戶八百餘人訪聞諸使並同此例戶免失役者通計數千家况犯罪之人又常僥幸所稱捉利錢戶亦不得本錢百姓利其牒身情願虛立保契文牒一定子孫相承至如劉嘉和情願充利錢戶事繇緣與人毆鬬打人頭破時便於間廄使情願納利錢得牒身免府縣科決實亦不得本錢已具推問奏聞訖伏奉進止令臣具條流奏聞者今請諸司諸使所管官錢戶並依臺省舉本納利人例諸司諸使更不得妄有準敕給牒身免差遣夫役及有過犯詐作府縣處分如官典有違請必科處使及長官奏聽進止其先給牒者並仰本司使收毀入後在人戶處收毀不盡其官典必有科責其捉錢戶元不得本錢者亦任便不納利庶得州府不失丁夫姦人免有僥幸當使監院場官及專知納給并吏人等有負犯合結罪者比依推問聞奏只罪本犯所由其監臨主守都無科處伏請從今舉名例律每有官吏犯贓監臨主守同罪及不能覺察者並請準條科處所冀刑章具舉貪吏革心自幽鎮用兵使命繁併館遞匱乏鞍馬多闕又敕使行李人數都無限約其衣緋紫乘馬者二十三十匹衣黃緑者不下十匹五匹驛吏不得視券牒隨口即供驛馬既盡遂奪路人鞍馬衣冠士庶驚擾怨嗟遠近喧騰行李將絶伏望聖慈聊為定限惟天布寒暑不私於人品類既一高卑以均惟人謹好愛能保其身清淨無瑕輝光以新寒暑滿天地之間浹肌膚於外好愛溢耳目之前誘心知於內清潔為隄奔射猶敗氣行無間隙不在大睿聖之姿清明絶俗心正無邪志高寡欲謂天高矣氛蒙晦之謂地厚矣橫流潰之聖德超邁萬方賴之飲食所以資身也過則生患衣服所以稱德也侈則生慢惟過與侈心必隨之氣與心流疾亦伺之聖心不惑孰能移之畋遊恣樂流情蕩志馳騁勞形吒叱傷氣惟天之重從禽為纍不養其外前修所忌聖心非之孰敢違之人乘氣生嗜欲以萌氣離有患氣凝則成巧必喪真智必誘情去彼煩慮在此誠明醫之上者理於未然患居慮後防處事先心靜樂行體和道全然後能德施萬物以享億年聖人在上各有攸處庶政有官㣥藝有署臣司太醫敢告諸御宏靖字元理宰相延賞子以蔭補河南參軍纍遷河中節度使元和中拜刑部尚書同中書門下平章事封高平縣侯罷政歷河東宣武盧龍三節度使檢校司空貶太子賓客分司東都再貶吉州刺史改撫州稍遷太子少師卒年六十五贈太子太保維永貞二年歲次庚戌正月庚寅朔皇帝臣某稽首再拜奉册言臣聞上聖元邈超乎希夷強名之極猶存乎言象豈足以表無為之化光不宰之功然稱謂所施册攸著涵泳德澤感於精誠願奉鴻徽有以自竭伏惟太上皇陛下道侔元元業纂皇極膺千載之休歷承九聖之耿光宣昭化元發揚大號政有敦本示儉慶有格天漏泉恩翔春風仁育㣥品而成功不處褰裳去之付神器於沖人想汾陽之高蹈體堯之德與神同符其動也天其靜也地巍巍事表無德而言焉顧茲寡昧屬歷大寶懼忝傳歸之業莫申繼述之志夙夜兢畏惟懷永圖今天下幸安皆睿訓所被而未極徽號孰報君親是以台臣庶官文武之列抗疏於內方伯藩守億兆之衆同詞於外請因壽歷以播鴻名臣不勝大願謹上尊號曰應乾聖壽太上皇當三朝獻壽之辰應五紀啓元之始光膺徽稱允叶神休斯天下之慶也臣稽首再拜正元貞元五年進士昔者南風和醇明德維新創五法而配夏感萬物之如春不然者夔何以得為典樂舜何以尊為聖人者哉其風乃周流遐裔蕩滌庶物廓宇宙以澄清屏腐餘之伊鬱故表太平之至理俾寰宇之無咈也且順而隨時曰巽氣之相感曰咸合之寧間於幽林曠野散之何啻乎萬壑千巖當其南正司辰朱明應節我風在德何以驗乎枯桑我風在仁何必候於空穴物既斯悅薰不在乎器人奚以欽物莫能同葉不在乎蘭人何以結知執德不回嘉祥有開始斯人之解慍倏儀鳳以員來有孚容若至德休哉足以成天下之務畜天下之財今國家以義為利知風之自實皇猷之穆穆因王道之易易竹帛之功斯在絲桐之音不墜夫如是未有靈瑞之不臻生成之不遂者也寧與夫蓬振塵驚颼飀淒清或敗物者有墜或中人而喪精未若我皇內協正德外和厚生在乎野而草自偃入乎林而條不鳴是則良哉元首克洽九有仰南薰兮何翕爾而純和幸得詠時康與俗阜頔字允元河南人德宗朝纍拜襄州刺史充山南東道節度使奏升襄州為大都督府纍遷左僕射同中書門下平章事封燕國公憲宗立入朝拜司空因事貶恩王傅改太子賓客卒贈太保諡曰厲其子季友訴於穆宗賜諡曰思劉元佐倪士榮以佐之功先朝為太常丞時臣與士榮同登朝列見其凡劣實鄙之今臣功名不如元佐某之凡劣不若士榮若授此爵更為叨忝詩自風雅道息二百餘年而騷人作其旨愁思其文婉麗亡楚之變風歟至西漢李陵蘇武始全為五言詩體源於風流於騷故多憂傷離遠之情梁昭明所撰文選録古詩十九首亡其名氏觀其辭蓋東漢之世亦蘇李之流也自建安中王仲宣曹子建鼓其風晉世陸士衡潘安仁揚其波王曹以氣勝潘陸以文尚氣勝者魏祖興武功於二京已覆文尚者晉武圖帝業於五胡肇亂觀其人文興亡之迹人焉廋哉人焉廋哉宋高祖平桓元定江表文帝繼業五十年間江左寧謐魏晉文章鬱然復興康樂侯謝靈運獨步江南俯視潘陸其文炳而麗其氣逸而暢驅風雷於江山變晴昏於洲渚煙雲以之慘淡景氣為其澄霽信江表之文英五言之麗則者也逮於齊世宣城守謝元暉亦得其詞調涵於氣格不侔康樂矣梁陳已降雖作者不絶而五言之道不勝其情矣有唐吳興開士釋皎然字清晝即康樂之十世孫得詩人之奧旨傳乃祖之菁華江南詞人莫不楷範極於緣情綺靡故辭多芳澤師古興制故律尚清壯其或發明元理則深契真如又不可得而思議也貞元壬申歲余分刺吳興之明年集賢殿御書院有命徵其文集余遂採而編之得詩五百四十六首分為十卷納於延閣書府上人以余嘗著詩述論前代之詩遂託余以集序辭不獲已略志其變上人之植性清和稟質端懿中祕空寂外開方便妙言説於文字了心境於定惠又釋門之慈航智炬也余遊方之內者何足以叩元關謝氏世為詩人豈佛書所為習氣云爾長沙郡之安國寺寺之北偏法華院結構始畢光明宏敞依之者其有旨乎即我湖南伯御史中丞楊公竭孝思追大福報罔極於所恃也於戲萬法性離也言説非法也然捨言説無以辨了義詮實相繇是經教生焉佛説九部法華為最其逗機也韜靈珠於髻上指衆實於藏內藥草沐莖葉之雨諸子悅羊鹿之車其會真也以開示誤入誘㣥迷令得佛知見以會三歸一為上乘令知法真際至於如是性如是相了緣起叩寂滅億劫諸佛乃能知之其餘聲聞辟支如稻麻竹葦不得其微密也若有受持讀誦勇猛堅固我為勝因果亦隨之即揚州龍興寺阿闍黎靈祐鑽研歲久深解義趣常為寶函以授信心仍大署其背曰功滿三千其道乃圓百福萬善充塞沙界中丞先太夫人滎陽鄭氏以閨門尊重之德奉西方清淨之教歸命道士且業是經時有明晦我無間斷居無幾實盈其數焉常願極精慮罄泉貝大依佛事共揚光烈嗚呼風樹之感霜露之悲入肺肝者可勝道哉今位登方伯輕千乘之貴捐萬鍾之祿隳心裂膽虔紹前志此所謂不敢一日而忘其親也先是此地松竹蔥蒨含絶世之異觀者百輩曾無頌聲公乘時多暇高步廊廡密獲勝勢其心快然因心計手指付於匠吏經時而成之堂殿崔嵬以切雲軒廊䆗窱而疏風皎嚴淨而無塵若釋梵之天宮大德僧懷遠秀掩圭璧操陵霜雪是故啓請為其主張加之以田産因之以臧獲受用具足無遺乏相嘗聞於經曰造塔廟建形像旃檀沈水彩畫裝鉸如是功德福不唐捐伏知必有以資窈冥闢往路揮斥萬有騰陵三界巍巍尊識補賢聖處信決定矣其或否者我教其誣乎恭惟先太夫人誠敬齋莊高明惠和道可以裨補陰教禮可以綢繆婦則早居穆伯之器有賢子三人始在童孺則自教誨非雅言正味不道不食使中和淳粹之氣飽飫其腑臟焉故中司洎令弟兵部郎中凝大理評事凌皆擢進士高第以清風纍德文學政事振休聲於宇內議者謂玉昆金友如三山峙立三川橫流焉後之君子非但寶地覩此志可以知上有聖謨之美下有大孝之嗣矣公永懷慟絶不忍握管濡墨以文字自導其意見託序述乃惕然而書之備建中二年進士辟四川節度使判官終工部郎中謹案諡法敬字之義與馬暢始終名迹不同考行之義尚乖易名之典未正事須再牒禮院請重議者且以暢墳土猶濕物議尚存皆可徵言盡堪覆視在春秋隱惡之義可也加史册虛美之命難乎况尚書責實當究是非易名宜存裦貶夫國之禮法懸在不刊而文士多病於愧詞史臣或許其使傳舊章既失後代何觀雖以禮之愛久無而亂名之責豈絶幸稽前士用示後人其馬暢所諡為敬請更參議壁書蕭字者梁侍中蕭子雲之書也韓晉公領浙西之歲得於建業佛寺置之南徐官舍函以屋壁俯瞰座隅及晉公入贊廟謨啓於私第朱方官吏候其代者完葺舊府圬墁故堂吏人以壁字昏蒙方以堊帚塗上時故殿中李侍御士舉為部從事以晉公翰墨代無等儔自獲壁書施榻於下耽玩研味略無已時士舉重焉紿而方得及士舉府除職停寓壁字於小吏之舍至甲申歲士舉為江西從事通好江淮時李評事約盛閲圖書以示寮友士舉方以壁字言於座中李君因而求之士舉云得卿皇象羊欣蕭綸真草各一帖大鄭畫屏一扇即輟與之不爾當自持去李君富於圖書酷好遐異遂以所求三帖并法士畫屏一扇易焉後十餘日壁書自吳負來士舉於道病卒向若李君不閲雅迹士舉不言此書即壁字為朽壤於小吏之家逸品絶前賢之迹固知興亡繼絶後不乏人工極藝精中必有物加以子雲與國同姓所書蕭字圜卷側掠體法備焉信曩賢之妙門實後代之茂範其飛白書起於蔡中郎蔡雍待詔門下見役者以堊帚成字心有悅焉歸而為飛白書漢末魏初皆以題署宮闕其後張敬禮王逸少子敬並稱妙絶子雲曲盡其法歐陽率更云蕭侍中飛白輕濃得中如蟬翼掩素其為前賢所重如此嗟乎景喬此書今訪天下絶矣惟此蕭字在乎舊都三百年間竟無頽俾後人傳授似陰有保持余與李君寓家南徐鄰而友善獲覩妙迹感其將壞晉公出之方絶之迹李君維之用徵其事故以蕭字志之
