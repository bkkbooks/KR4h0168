front:
  text: 全唐文欽定全唐文卷七百三李德裕八
  hash: sha256:8ce7099c49fbc05e0d2a07f8379a4364dff18ef66b0098d562d28d5008021fdc
body:
  text: 右臣緣小寇未殄前月末與河中留後任畹委曲令轉問李丕有何方略一一條疏報今得任畹書并封送李丕狀兩道並謹封進其李丕狀一道論請依前取黃澤嶺路斷賊要害臣近訪知魏城路又狗脊嶺東西經五月十四日陳破賊掘坑塹至深必恐進兵不得古人云戰不勝則易地而處伏望密詔義忠朝清潛移兵取黃澤路掩其不備得否令子細籌度如可去便候進止事貴神速須務至密機計倘漏還備隄防其一狀請令諸軍各齎十日乾糧深入過險此亦是用奇之計伏望約此意賜石雄王逢詔令如此排比石雄就河府王逢就絳州各曬乾糧緣日色猶烈數日可致兼各賜度支側近軍糧米一二千石尤冀集事臣緣寇孽未翦每得四遠文狀皆願一一上聞頻瀆宸嚴不任惶惕伏望留中不出高文端稱直下打澤州城恐損官軍兵馬緣賊兵原有一萬五千人常出一半已上於四面山谷埋伏待官軍打城困乏即四面齊來救援恐落賊奸計其陳許軍請過乾河北逼澤州更下一寨城寨連接更築鹿項夾城但從一面起手圍繞澤州每日常須大兵排陳四面抵敵賊救兵賊心危急恐被圍合必有大戰待賊軍退敗乘勢便收澤州如此則不損官軍免落奸計伏望依此詔示王宰請令王逢進軍取賊固鎮兩寨但兩嶺上排陳直抵賊固鎮寨當川亦須著兵亦抵賊寨緣固鎮兩寨四面懸崖官軍便打必恐損人難收其賊寨更無井水盡吃泉水在寨東南澗內約一里已來但逼賊寨三兩日絶其取水路賊軍無水可吃即須拔寨退走官軍便可進固鎮東十五里是青龍寨在嶺北側上四面並是懸崖取水亦在寨外還依固鎮寨絶其取水路即是青龍寨東去沁州十五里城寨至牢固賊兵約一千五百人內五百人土軍團練全安慶自領伏望依此詔示王逢長橋賊都頭王釗約將一萬兵今在洺州城內緣劉稹處置卻失天井關都頭薛茂卿一門又處置卻邢洺兩州救援兵馬使談朝清兄弟三人王釗自此疑懼劉稹差親器仗官賈少遇追王釗入潞州並不伏追官健一時叫闞王釗已持兩端必不肯為劉稹用命本是潞州子弟見有兄弟數人在軍材能最出於衆若招降至多必恐顧惜家口又官健投降後為諸軍所殺亦恐非願惟密將意與王釗令將一萬人卻入潞州處置得劉稹別與一道節度使兼與檢校高官更別賜錢物高文端云官健受苦日久朝夕難過家屬盡在潞州若遣回軍必皆情願臣恐宏敬不知王釗不伏劉稹追呼伏望專降中使密賜詔示令依此速致意與王釗取其回意聞奏河朔多冀邑人若遣傳意計合必達臣問高文端賊中誰人作急高文端云潞州城內即有郭誼王協張谷向外即劉公直臣先得元龜狀稱劉公直曾事王晏平常依倚於王宰伏望詔王宰令百方將意與劉公直若肯回戈卻取劉稹亦許別與重官酬仍別賜錢物以前謹具如前昨日高文端到宅辭臣因子細問得賊中事宜兼共商量計策皆似可謹録奏聞謹奏右臣昨日晚見鎮州奏事官高迪云向前已曾向臣言軍中密事今更有切事要言於臣請不令王助知今山東三州歸降已平了天井冀氏卻須令堅守城寨不得與戰不二十日內必自生變緣賊已窮蹙不可更逼著恐其計窮必為濟河焚舟之計一人敵十人之命官軍與戰必恐不利若萬一小衄卻恐延賊旬月之命緣臨洺已投魏博當道兵馬過來不得請召宏敬速撥兵取臨洺路便扼武安潞府知山東兵來必梟擒劉稹向闕臣伏見高迪之言至忠至切伏望速賜宏敬王宰石雄詔處分謹密狀奏聞伏望留中不出右適徐乃文將宏敬委曲呈臣似憂朝廷處置洺州亦未得所臣細問其故徐乃文云安王已送啓狀與王釗高元武又歸投王釗即日有二萬六千人甚得軍心都頭盡皆畏伏取郭誼未得已前且要令在洺州勾當緣歸降人皆未甚安忽恐惜留王釗未肯放出萬一有此終不如無伏望速降使賜宏敬詔看彼事宜如王釗出彼未得且令勾當待盧鈞到後令赴闕不遲崔叔度是王釗下都頭甚有膽略昨來首謀歸國盡是叔度王釗未出已前宏敬意且欲留叔度今在闕下伏望於安省安置其宏敬委曲謹封進上委曲中所云中丞是李回謹録奏聞右自劉稹平後臣久欲奏聞請降識事情中使宣諭仲武令早滅卻殘虜兼探仲武見劉稹平後有何言說兩度緣延英論事校多未及陳奏昨日奏事官論博言到傳仲武語與臣近稍得回鶻消息人心頗有離異緣可汗欲得投安西其部落百姓皆云骨肉盡在向南願投國家又云與室韋已不得所據此時勢即合歸降不然自相破滅伏望因此機便特降供奉官有才識者充使兼賜仲武詔諭以劉稹已平天下無事惟殘虜未滅常繫聖心仲武猶帶北面詔討使合為國家了卻殘虜成此功業令超於鎮魏朝廷酬報必極優崇料仲武企羡兩道立功皆加寵位又知朝廷內無寇孽足得捍邊仲武是見機之人必思自效令取歲內百計招降兼示以優待可汗必令得所緣國家與回鶻久為敵國結怨已深雖近方戢兵終須早有經略且令招誘最為得宜臣謹密狀聞奏此狀望留中不出右今日振武奏事官閭邱宏到云卻收到河東沒落官健楊惟清等二人稱回鶻可汗在天德北三百里已下臣昨日已見李思忠下軍將閻禺說思忠意緣朝廷冊命黠戛斯恐回鶻可汗必懷嫉妬與諸小番合勢遮截漢使請令漢兵且於天德住待計會黠戛斯兵馬迎接方可進發今忽近天德已似有驗其邊界事宜李思順皆自有表進訖李思順別有狀一道稱回鶻合祿哈等一人投降齎得款云可汗見在兵只有一千五百人衣甲約六七十領角有三隻鼓有四面每度與諸番打得羊馬數亦至少旋自分卻據此通款事皆詣實李忠順疑蕃人詐妄未敢奏聞其別狀謹封進上伏望聖慈早加警備以戒不虞臣此狀請留中不出右臣伏見報兵馬不肯發赴振武閉城叫反古人云敗軍之氣沒世不復今潞府乘破敗之後又失天險只是憚於征役豈敢更為逆命亦恐是盧鈞姑息太過軍人知其畏懦因此生心然亦須及其事初預為之備臣比見叛亂之地皆是制置太遲及朝廷徵發賊已處處設備兵法云疾雷不及掩耳又云用兵只聞拙速不聞巧遲去春楊辨便是速討之力旬日而平望賜王宰密詔令府城下揀四千人樅樅排比如已聞作亂不要更待詔旨令一千人守石會關令三千人取儀州路把斷武安緣軍糧兵馬多在山東但遣邢州不通自然駐旬月不得邢洺之心未可保亦望密詔王縱溫士闕各令自守不得出兵惟要於武安路太原兵馬遙為聲援最切在令山東斷絶即立可誅翦縱萬一無事不妨且賜密詔王宰先知石雄勇於赴敵計亦知警急必便澤州亦要賜澤州詔守並須用河陽兵馬不得用昭義舊人亦要賜恭甫詔知有警急發馬步一千人赴晉州屯集以防越軼臣思慮所及不敢不便奏聞伏望留中不出右適魏博奏事徐乃文見臣云昨日聞三道使出城一道往魏博恐令宏敬出軍卻慮三州不安實非穩便臣當時說向聖意只令石雄至潞州界首搜索惡人恐三州未諭朝旨知宏敬忠藎故令中使先往遣宏敬安存三州並不徵發乃文稱若如此處置至為切當緣涉縣正當山東系口絶是要地有鎮兵五百人已下去潞府一百六十里軍糧至多潞州官健月糧皆在此請受恐潞府叛兵急則投竄涉縣搖動三州切要國家先遣兵把捉此鎮有昭義舊都押衙焦長楚是本軍舊人劉從諫降黜令往山東今在邯鄲若朝廷特賜一詔令鎮守涉縣兼把捉潞河徽子口至為穩便如焦長楚不可委信朝廷專揀一武將速去亦得古人云耕當問奴織當問婢蓋以其雖是下賤能識耕織之故臣不諳澤潞界內山川見乃文所說稍似有理不敢不便密狀聞奏望賜留中不出今月二十一日奉宣令臣撰文者臣聞王充云古之帝王建德者須鴻筆之臣褒述紀德又楊雄云廊廟之上高文典冊用相如臣本以門蔭入仕不由俊造之選獨學無友未嘗琢磨然心好藝文老而不倦近加衰病久廢含毫祗奉渥恩實懷榮懼謹以撰訖謹連封進不任兢惶隕越之至謹録奏聞伏候敕旨奉宣令臣撰文者伏以陛下聰明神武高視百王伐罪成功清和六合雖有鴻筆猶難措詞况臣從吏多年文業久廢克勵疲病莫副殊知祗荷明恩倍懷兢惕謹以撰訖謹連進上不任榮忭惶越之至謹録奏聞伏聽敕旨奉宣令臣撰者臣幼習儒風莫能勵已長從吏役無所成名雖嘗忝禁林獲掌綸命學既慚於刻鵠文有愧於雕蟲陛下假以恩光常加寵飾賜令撰述益荷殊榮但以談天者豈測其高酌海者莫知其廣聖功神武睿德文思雖欲贊揚實慚不逮今已撰訖謹連封上塵黷嚴扆無地自容不任兢惶榮抃之至奉宣令臣撰述者伏以北狄強悍勇於四夷前代聖王莫能制服昨者回鶻雖乘危蹙勢已內侵豺狼之師尚餘十萬陛下神武雄斷智出無方震天威以霆聲碎獯戎而瓦解武功盛烈高視百王豈比周穆犬戎之征荒服不至漢武馬邑之詐㣥帥無功將垂耿光宜著鴻筆臣學藝荒淺久病衰殘紀軒后之功徒知竭思叙唐堯之德終愧難名採其功狀稍似托實今已撰訖謹連進上輕黷宸扆一作嚴不任惶越謹録奏聞臣二十一日於延英面奏呂述等准敕訪頡戛斯國邑風俗編為一傳今修撰已成稍似詳備臣伏見貞觀初因四夷來朝太宗令閻立本各寫其衣服形貌為職貢圖臣謹令畫工注一作潛寫注吾合素等形狀列於傳前兼臣不揆淺陋輒撰傳序所冀聖明柔遠之德高於百王絶域慕義之心傳於千古輕瀆宸嚴伏增兢懼謹封上進伏以六合清和四夷慕義芳春令節錫宴㣥臣見膏露之晞陽喜薰風之解慍萬心歡樂纍日忘疲伏惟陛下睿德日新文章天縱詞高黃竹思縟白雲含毫而瑞景揚光摛藻而非煙動色臣早司綸綍嘗忝內庭雕蟲薄技實感憲宗穆宗文宗知獎不揆淺薄輒進詩一首輕瀆宸嚴伏增惶惕謹隨狀奉進四月二十三日奉宣令狀臣進來者伏以楊雄云童子雕蟲篆刻壯夫不為臣往在弱齡即好詞賦性情一作情性所得衰老不忘屬吏職歲深文業多廢意之所感時乃成章豈謂擊壤庸音謬入帝堯之聽巴渝末曲猥蒙漢祖之知局脊慙惶神魂飛越謹録新舊文十卷進上輕瀆宸嚴無任兢惕今月十九日聖恩賜臣朱橘三顆者伏以遠自湘山移根清籞蒙雨露之渥澤庇日月之休光始發素榮俄成丹實誠宜奉金華之宴助玉食之甘豈謂恩及賤微獲觀嘉瑞臣久參綸命常效雕蟲仰荷皇慈輒獻小賦輕黷宸扆倍積兢惶臣又伏見元宗朝種柑結實宣付史館祖宗故事敢不奏聞其賦謹隨狀上進臣不任感恩踴躍之至謹奉狀以聞伏以犬戎歷代為患國之仇讐南蠻自經負恩常懷反側西蜀兩路實繫安危臣頃在西川講求利病頗收要害之地實盡經遠之圖因著西南備邊録十三卷臣所創立城鎮兼畫小圖米鹽器甲無不該備昔蕭何收秦圖書具知厄塞軍國之政莫切於斯謹封進上庶裨聖覽第四卷叙維州本末尤似精詳所冀聖慈知臣竭力奉公盡心立事所至之地不敢苟安輕黷宸嚴伏增戰越右臣竊見近日陛下畋遊稍遠還宮近夜伏以人君動法於日故日出而視朝日入而宴息古人云將旦清風發㣥陰伏君以臨朝不牽於色日將入傳曰侍君就房有常節伏望陛下深察古人之言向後遊幸不至侵夜古以人君天之所豫常宜奉順天道亦猶人臣之事陛下常須戒慎臣雖暗昧不知天道近頻見中朝人說自秋已來五星所行稍失常度此皆天意殷勤警戒陛下毛詩云敬天之渝無敢馳驅又古人云動人以行不以言應天以實不以文伏惟陛下稍節馳驅以順天意以前臣伏蒙陛下自遠鎮授之鈞衡若畏避不言實負恩德不敢對諸宰臣論奏謹具密狀以聞不任惶懼迫切之至右緣嗢沒斯等本國殘破未有所歸逗留塞上今已歲周雖近有恩賜喻其歸還然本蕃未寧時屬寒沍馬畜羸乏必難首途回鶻和好多年忠效久著雖在邊境之內計無侵軼之虞臣等所慮吐蕃變詐多端不可測度或謂朝廷方備北虜未暇西防或云嗢沒斯招米點汗回鶻乘此機勢謀陷豐州緣元和十三年已曾此來不可無備太原兵額雖存皆被軍將放卻散諸處緩急點集至難臣等商量請發陳許步軍三千人鄭滑步軍三千人令至太原屯集如北邊有警則大同軍正當賊路足應事機如河西有虞便令取嵐石路過河至亦近便况兩道人心忠義徵發不難只如一年防秋無所損費臣等詢於物議皆願有此隄防伏惟聖明特賜允納右伏以元和中回鶻纍請和親憲宗不許至長慶初穆宗以北虜代結姻好中國無虞邊境晏然生人受福所以割慈下嫁用示懷柔今回鶻國已破亡公主未知所在若不遣使訪問慰其艱危戎狄必謂國家降主虜廷本非愛惜便懷輕易之意永無敬重之心非止甚傷虜情實亦負於公主臣等商量望令苖鎮將一二十輕騎齎詔書先至嗢沒斯處令其轉差人送入至公主所在若嗢沒斯便受朝旨固表恭順之心若辭拒此行足彰背叛之跡因此偵察無所隱情伏希聖旨特賜省察右臣等今月五日於紫宸陛下訪問劉約事宜今臣等亦與君賞一書諭以此意臣等將謂君賞久在河朔諳練戎機遠授規模必副聖意君賞只合自出已意潛道款誠事從乖張泯然無跡豈有將朝廷密旨顯示亂軍激其悖心致此章表兼見君賞與張絳手疏詞甚卑遜非惟失將帥之體實亦失忠藎之誠近者何重順未得節制初遣茂復諭旨又遣執方致書臣等兩度令元蹇申意料重順豈不知是朝廷密諭然竟無大將軍表終守恭順之詞所以授之有名不紊朝典幽州一方自朱克融留連中使不受賜衣繼以楊志誠纍遣將吏上表邀求官爵自此悖亂之氣與鎮魏不同今若便與闕二字實為朝廷之恥伏望且逗留旬月更候事宜克恭傔回日伏望不賜詔書庶全事體右儀鳳元年八月高宗將傳位於天后處俊對曰天下者高祖太宗之天下也非天皇之天下也天皇只合謹守宗廟傳之子孫誠不可持國與人有私於天后其事遂止處俊後子孫為酷吏所害右天授初鳳閣舍人張嘉福與王慶之等率數百人連名上表請立武承嗣為皇太子長倩與地官尚書格輔元竟不署名以中宗在東宮不可更立武承嗣言詞切直仍責上書者遣散為承嗣所害右張嘉福請立武承嗣為皇太子天后問輔元輔元固稱不可為武承嗣所害右天授年王公百寮皆勸革命安靖獨義形於色及被收下獄來俊臣詰其反狀安靖謂曰以我是唐家老臣須殺任殺若問其謀反實無可對為俊臣所害右當天后革命之初宗室英賢將相舊老忠於國者相繼受誅徐有功自司刑丞纍遷至司刑少卿數議大獄務在平恕凡所濟活者數百家前後奏雪枉破家者三經斷死而執志不渝兼明元宗外祖母龎氏之寃開元中贈越州都督就第弔祭贈物三百段一子官以前臣等伏見元和以來褚遂良狄仁傑張柬之等子孫纍有恩制授惟此數家未蒙甄録望各訪求子孫承嫡者特授一官如先未有諡者各令有司定諡如無子孫特與追贈所貴百代之下再振清風海內忠良無不感厲未審可否右臣等商量杜元穎雖失於馭遠致蠻寇內侵然握節嬰城舍生取義圍解之後懲貶不輕但以蠻夷之情不可開縱若為之報怨以快其心則是不貴王臣取笑戎狄漢景所以聞鄧公之說恨鼂錯之誅元穎長慶之初首居宰弼潔廉畏法忠藎小心雖無光赫之名頗著直清之稱既逢昌運合與申冤望乞還舊官階等仍追贈右僕射未審可否右臣等商量比聞外議皆以元穎不能綏撫南蠻又無備禦責此二事以為愆尤臣等究其情由實有本末緣韋臯久在西蜀自固兵權邀結南蠻為其外援親昵信任事同一家此時亭障不修邊防罷警若後人加置一卒繕理一城必有異詞便乖鄰好自武元衡以後三十餘年戎備落然不可獨責元穎蠻退後京城傳說驅掠五萬餘人音樂伎巧無不蕩盡緣郭釗無政都不勘尋臣德裕到鎮後差官於蠻經歷州縣一一勘尋皆得來名具在案牘蠻共掠九千人成都郭下成都華陽兩縣只有八千人其中一人是子女錦錦雜劇丈夫兩人醫眼大秦僧一人餘並是尋常百姓並非工巧其八千九百餘人皆是黎雅州百姓半雜獦獠臣德裕到鎮後移牒索得三千三百人兩番送得與監軍使於龍興大慈寺點閲並是南界蠻獠緣朝廷寵待如舊從此蠻心益驕今西川節將惟務姑息臣等所以薄元穎之過謂合追榮頻承顧問不敢不縷悉聞奏况元穎歿後五經大赦下位卑官皆得追復官爵倘聖旨以贈與為優望只准赦文卻還舊爵其贈官落下未審可否右臣頃蒙先朝授劒南西川節度使其悉怛謀雖是吐蕃酋長久樂皇風將彼堅城降臣當道臣差行維州刺史虞藏儉便領兵馬入據其城飛章以聞先帝驚喜其時與臣仇者望風疾臣遽興疑言上罔宸聽以為與吐蕃盟約不可背之必恐將此為詞侵犯郊境遂詔臣卻還此城兼執送悉怛謀等令彼自僇復降中使迫促送還昔白起殺降終於杜郵致禍陳湯見按是為郅支報仇感嘆前事愧心終日今者幸逢英主忝被台司輒敢追論伏希省察且維州據高山絶頂三面臨江在戎虜平州之衝是漢地入邊之路初河隴盡歿惟此州獨存吐蕃潛將婦人嫁與此州門者二十年後兩男長成竊開壘門引兵而入遂為所滅號曰無憂城從此得併力於西邊更無虞於南路憑陵近甸旰食纍朝貞元中韋臯以經略河湟此城為始盡鋭萬旅急攻數年吐蕃愛惜既甚遣其舅論莽熱來救雉堞高峻臨衝難及於層霄鳥徑屈蟠猛士多糜於石莫展公輸之巧空擒莽熱而還及南蠻負恩掃地驅劫臣初到西蜀衆心未安外揚國威中緝邊備其維州熟臣信令乃送款與臣臣告之以須俟奏報冀探情僞其悉怛謀等尋帥城兵并州印甲仗塞途相繼空壘來降臣即大出牙兵受其降禮南蠻在列莫敢仰視况西山八國隔在此州比帶使名都成虛語諸久苦蕃中徵役願作王人自維州降後皆云但得臣信牒帽子便相率內屬其蕃界合水棲雞等城既失險阻自須抽歸可減八處鎮兵坐收千餘里舊地臣見此有莫大之利為恢復之機所以面許奏聞各加酬賞臣自與錦袍金帶禺俟朝旨且吐蕃維州未降以前一年猶圍逼魯州以此言之豈守盟約况臣未嘗用兵攻取彼自感化來降又沮議之人豈思事實犬戎遲鈍土曠人稀每欲乘秋犯邊皆須數歲聚食臣得維州逾月未有一使入疆自此之後方應破膽豈有慮其復怨鼓此浮詞臣受降之初指天為誓寧忍將三百餘人性命棄信偷安纍表陳論乞垂矜舍答詔嚴切竟令執還加以體被三木輿於竹畚及將即路寃叫呼天將吏對臣無不隕涕其部送者更遭蕃帥譏誚云既以降彼何須送來乃卻將此降人戮於漢界之上恣行殘忍用固攜離至乃擲其嬰孩承以槍臣聞楚靈誘殺蠻子春秋明譏周文收送鄧叔簡冊深鄙况乎大國負此異族塞忠之路快凶虐之情從古以來未有此事伏惟仁聖文武至誠大孝皇帝陛下振睿聖之宏圖得懷徠之上策故南蠻申請朝之願北虜效款塞之誠臣實痛惜悉怛謀等舉城向化解辮歸義而未加昆邪之爵不賞庶其之功翻以忠愛受屠為仇讐所快身遭此酷名又不彰職由愚臣陷此非罪雖時更一紀而運屬千年所以具陳根本不憚繁細冀蒙睿鑒追獎忠魂伏乞宣付中書各加褒贈冀華夷感德幽顯伸冤警既往之幸心激將來之峻節臣無任懇願之至右臣等聞向外傳說紛然陛下皆遣中使未測其由臣等相顧憂惶不知死所嗣復等所涉議論實負聖明臣等所以顯書其罪不為末減只望止於竄逐用戒㣥邪古人稱刑人於市與衆共棄陛下若以嗣復等罪狀必不可容伏望且降使臣就彼鞫問待得其罪顯戮不遲如便遣使必遺後悔文宗只緣貶宋申錫更不按問至今人以為冤臣等於嗣復等實無情故所利者宗廟所惜者聖明不欲令一事駭聽失天下之望若使四方將相或以此為詞臣等避罪不言無以塞責伏望陛下特回宸慮下納愚忠臣等餘年方敢自保陛下若以臣等事君不盡情涉容奸先罪臣等實所甘分輒陳肝血不避嚴誅不任懇切兢惶之至謹俯伏待罪望速降敕旨右臣等適以有狀論奏未奉聖旨今向外之心驚駭不知所為臣等若苟務偷安不更冒死陳奏必恐旬月之後人情皆以為冤陛下此時追悔無及臣等昨者商量之初只以嗣復等所涉議論不可令在藩鎮止於貶責足以塞辜如更過於此實搖動天下之心必損聖明之德如以臣等情涉顧望伏望先罪責臣實所甘分臣等專在中書伏望特開延英賜對得面陳肝血死無所恨右臣等適再已陳奏未奉聖旨伏見貞元初宰臣劉晏緣德宗在東宮時涉動搖之論竟以此坐死旋則朝廷中外皆以為冤兩河不臣之地悉恐亡懼德宗尋亦追悔官其子孫近則宋申錫涉交通藩邸貶官文宗尋又追悔至於流涕如嗣復等螻蟻之命至細至微特賜矜全必彰聖德天下臣子孰不上感天慈不爾恐四海人情自此憂懼臣等亦兢危不暇無以裨助聖明伏望特開延英賜臣等面陳血誠以安中外如蒙聖慈納臣等愚懇伏望更重貶官所冀人心允愜
