front:
  text: 全唐文欽定全唐文卷六百四十六李絳二
  hash: sha256:ff022d3acc1c2a2ad1176b93390d5b6c1b58fac6dc1118cd407941f81012cdb7
body:
  text: 陛下布惟新之政剗積習之獘行前王所不能行革歷代所不能革四海延頸日望德音今忽自立聖政碑示天下以不廣彰滿假之漸招矜炫之譏易稱大人者與天地合德與日月合明執契垂拱勵精求理化成天下高視百王豈可以文字而盡聖德又安以碑表而贊皇猷若可敘述是有分限乃反虧損盛德豈謂敷揚至道哉故自堯舜禹湯文武並無建碑之事至秦始皇荒逸之君煩酷之政然後有罘嶧之碑揚誅伐之功紀巡幸之跡適足為百王所笑萬代所譏至今稱為失道亡國之主豈可擬議於此哉陛下嗣高祖太宗之基舉貞觀開元之政思理不遑食從諫如順流固可與堯舜禹湯文武方駕而行又安得追秦皇暴虐不經之事而自損聖德近者閻巨源請立紀聖功碑陛下詳盡事宜皆不允許今忽令立此碑與前事頗乖可否相違是非殊異况此碑既在安國寺中不得不敘載遊觀崇飾之事述遊觀且乖理要敘崇飾又匪政經固非哲王所宜行也伏乞聖慈特賜寢罷臣職忝近密理合獻陳庶申葵藿之誠冀增海岳之大謹奏臣昨巳具狀陳烏重允不可便授以澤潞請與河陽却除孟元陽澤潞臣進狀後至日晚方見承璀文狀奏行營事宜其烏重允承璀巳會與文牒令勾當留後詳覽驚嘆實所痛心且澤潞五州據山東要害河北連結惟此制之磁邢洺三州入其腹內國紀所在實繫安危比者磁道為從史所據兇狡情狀昭然可知比年與劉濟王士真相結又奏其男充都知兵馬使如此奸狀聖情具知今地降靈陛下神畧坐致兇豎却收一道奈何欲與重允却棄此鎮陛下昨追從史者庶於利害須以計擒然於國家巳失大體今澤潞重鎮承璀輒以文牒便差人為留後遽請旌節無君之心孰甚於此陛下昨收澤潞人神同慶國柄再立制度重顯今忽與本軍將物情頓沮朝經大紊自削形勢却恐不如從史向者從史雖懷蓄姦蠧巳受朝命方鎮今重允一時素無功策承璀一牒便居重位河南河北諸侯聞知憤怒之心必生言語蓋以專權日久莫不各有將校且懼且恨必謗朝廷皆謂重允與承璀交通作計遂却從史代其使主便與節度豈唯事同致怒實亦人情難堪儻劉濟茂昭季安執恭韓宏師道恥有名位與重允同列繼有表章陳其情狀并承璀專授重允之罪不知陛下何以處之若總不答即方鎮之心大阻若別處分即朝廷之體頓虧是令承璀取怨天下從史以澤潞不容遂至狼狽若承璀為天下不容何以自保或恐因此遂亂今重允便除河陽亦是望外之福况新有從史事豈慮重允遲迴重允所得方隅巳是承璀之力元陽若與澤潞又是事望所推不唯忠義堪為腹心兼有才畧實可委任兩河方鎮亦必忻懽朝廷制度又再修舉利害懸遠事在不疑况重允須為從史結託劉濟士真搆間虛辭為國生事至使聖恩特遣朝官委曲宣諭僅得寧止如是則事跡固無遠大臣豈與重允嫌隙豈與元陽有親故蓋為社稷之計朝廷之勢可惜爾伏望聖恩斷在不疑與重允河陽足以賞逐從史効與元陽澤潞足以壓河北諸侯之勢朝廷收得威柄承璀免有負憂責機便易失時事難遇伏望定於神慮遂此至公臣等懇切上陳不避忌諱者伏以獲居近密特授恩光若緘不言上負陛下伏惟聖慈俯鑒愚款速降制命以副人心㣥臣見陛下西取蜀東取吳易於反掌故諂諛躁競之人爭獻策畫勸開河北不為國家深謀遠慮陛下亦以前日成功之易而信其言臣等夙夜思之河北之勢與二方異何則西川浙西皆非反側之地其四隣皆國家臂指之臣劉闢李錡獨生狂謀其徒皆莫之與闢錡徒以貨財啗之大軍一臨則渙然離耳故臣等當時亦勸陛下誅之以其萬全故也成德則不然內則膠固歲深外則蔓連勢廣其將士百姓懷其累代煦嫗之恩不知君臣逆順之理諭之不從威之不服將為朝廷羞又隣道平居或相猜恨及聞代易必合為一心蓋各為子孫之謀亦慮他日及此故也萬一餘道或相表裏兵連禍結財盡力竭西戎北狄乘間窺窬其為憂患可勝道哉濟季安與承宗事體不殊若物故之際有間可乘當臨事圖之於今用兵則恐未可太平之業非朝夕可致願陛下審處之且以吳少誠病必不起淮西四旁皆國家州縣不與賊通朝廷命帥今正其時萬一不從可議征討故臣願捨恒冀難致之策就申蔡易成之謀脫或恒冀連兵事未如意蔡州有釁勢可興師復以財力不贍而赦承宗則恩威兩廢不如早賜處分臣等再三思度敢不詳審伏以鎮州人心固結難即改移隣境事同必相扶會當其無事則相疑沮見有改易則却同心意者以子弟為謀他日還慮及此情狀可見事理昭然今若欲除大臣守鎮臣愚必知未可不如且示懷撫以收其心所以頻有奏陳伏冀俯存含忍實慮別除人後制命不行即須興師且事征討蓋以江淮水旱人力困窮陛下每切憂勞尚加賑卹財賦所入經用不充今若鎮州用兵須令諸處進計用兵數供費已多萬一四隣之中同類潛相扶結相為影援延引嵗時則為患益深所費轉廣縱陛下悉出府庫以給軍須若更淹延將何及計兵連之後勢不得休北狄西戎素多姦狡忽乘間隙侵犯邊疆又須興兵以事防遏首尾應敵則內外憂危臣等必知興師未可自陛下臨御天下諸州連帥頻建軍功言事者不計始終喜功者輕議討伐今鎮州事勢與劉闢李錡不同何者劒南淛西本非反側之地劉闢李錡暴生狂逆之心唯以財貨誘人人心本無結固又四面皆是國家兵鎮事與河北不同所以懇請誅討料其事勢舉必萬全今鎮州事宜與此有異外則結連勢廣內則膠固歲深以此用兵必為不可其劉濟季安雖有疾患至於事體與鎮州畧同若亡沒之後或別有其便即相其便可否臨時裁制伏以崇勳盛烈底定四方必有其時可以斷致自鎮州有故臣夙夜思量誠願因其此時收得一道事有未可不敢因循瀝竭肺肝備陳愚款貴得萬全之計上酬不次之恩事之安危伏冀聖慮所切惟望不納浮議斷在宸衷臣不勝懇切之至李錡兇狡叛戾僭侈誅求刻剝六州之人積成一道之苦陛下哀憫無告為之弔伐變愁怨之氣為發生之和歌舞聖時負戴恩德其李錡家所積錢帛皆斂於人或有酷發冤濫之徒斃其身取其貨或有枉法徵剝之吏加其罪納其財前後事狀布聞遠邇聖恩本以叛亂誅討蘇息一方今輦運錢帛播聞四海非所以式遏亂畧惠綏困窮也伏望天慈下痛哀之詔降雨露之澤將逆人財物並以賜本道代浙西百姓今年租賦則萬姓忻戴四海歌詠矣奉宣密旨以臣所論奏事頗切時要特賜慰勞者臣伏蒙獎擢致於近密苟有所見即合啟陳敢望聖明照臨皆賜俯察載降宣諭曲示恩私榮感交深兢跼無地臣所陳之事非止一端實政理之源繫安危之切冀望重於所忽防於至微則億兆生靈同慶仁壽臣絳等今日伏蒙聖恩召對特賜延納過有獎諭又奉宣聖旨卿守職盡忠常如今日朕何憂天下不理又復見襄陽進奉出付所司安國寺鑄聖容處又罷臨幸者親奉德音旋蒙宣諭目覩盛事心感皇明喜戴交并抃舞失次伏以陛下憂勤庶政推以至公容納直言事惟求當臣等恭守職分自合罄竭愚衷豈望天眷綢繆特加獎諭感恩激切倍百常情至於慎守德音出外方之獻嚴重清蹕罷近寺之游此皆發自宸衷卓然光大足以動四方之聽感萬國之心臣等職在禁闈時逢昌運以欣以忭意不能宣今日中使某乙奉宣聖旨恩私俯降抃躍難勝伏以恩澤所覃積獘盡去事關聖政感極人心臣等職忝禁闈喜倍常分奉章陳賀未盡懇誠曲蒙聖慈更賜宣勞感恩承命榮幸實深今日中使某至奉宣聖旨以陰陽荖序時雨期朕每事增修冀感和氣卿等悉心奉上副朕憂勤今有甘澤與卿等同慰者臣伏以時雨既降百姓歡欣聖念猥加特使宣諭喜戴交集忭舞失圖臣聞惟天無私去人不遠與聖合德有感必通福應之際其猶影響陛下以自春以來陽候稍亢慮成旱暵妨此農功憂勤之誠既形造次惕厲之志不忘寢興爰降德音大修政本過此克責勤求闕遺絕貢獻以字黎元務減省以崇簡易去當今之甚獘行歷代之所難發自宸衷曉示天下人心既感和氣自通曾未浹旬遂降膏雨公私和暢動植生榮麰麥可望於豐盈耕耒不於節候康衢士庶鼓闕無地歡呼感荷皇恩致此甘澤則知憂先於事故能無憂事至而憂事故罕救此雖古先哲后修已備災引六事以責躬念一物之失所感應遄速豈過於斯臣等職忝禁闈親承密命無裨萬一喜遇聖明理之當者無不行政之失者無不革累積盛美將致昇平感抃欣榮實倍常品今日奉宣聖旨以立皇太子制下特賜宣示臣者祇奉詔命歡抃失容伏以時屬昇平運逢交泰陛下思固大本以承鴻休爰命元良式昭茂典無疆之祚惟永至德之光日宣億兆生靈鼓舞欣戴臣猥惟淺陋獲奉軒墀特降睿慈俯賜宣示以榮為荷倍百常情陛下聖明之德超邁百王英特之姿跨越千古察百役之繁猥愍萬姓之愁苦念杼軸之積獘知姦臣之徇私外以進入為名內以賄遺為計厚斂於下半入其家所以特降鴻恩大拯頹俗罷方鎮不時之貢禁天下無藝之費蘇息下民革除宿獘頒宣之日遐邇必臻感恩涕泣仰聽歌舞更相謂曰不圖今日復覩聖時利澤布於四海德施周於萬類家吟戶詠氣舒目明纔及數月今自廢罷受納裴均所進銀器天下之人皆謂詔書不信必謂陛下以財貨為先此人非益於聖德也且裴均行不繇道姦以事君固違制書敢進銀器此是試陛下之意若不容納必知英主不可以利啗則須恭守典憲尊朝廷若為受領則知聖懷必可以財動因此厚斂於下此不忠不誠之大罪也倘陛下以裴均位當藩鎮官極崇顯未能行法以懲姦人伏望准制書令度支收納既不違勅文又免入內庫無虧聖政以示外方從史比來事跡彰露頗多意不自安務欲生事所以曲陳利害頻獻計謀冀許用兵求姑息今親領士馬欲往邢洺假以就糧實為動眾去就之際情狀可知伏願聖德備詳端緒用絕其情不許此行事臣愚竊料從史必更密陳利害求動師旅為輸忠誠苟私於身非利於國更有奏請伏望以此隄防伏以茂昭舉家朝覲河北都無此例雖本情自任不得在外體殊可嘉稱須降恩榮以存激勸今迪簡除易定節度茂昭便是前衡行理之間恐非穩便又所隨將健悉屬定州茂昭寂寞於體非宜伏望聖恩速除茂昭一官并專使宣諭從將校悉令取茂昭處分到京別有進止如此處置實協事情謹具奏聞伏候聖旨伏以楊憑犯贓憲司推勘舉正朝典肅清人心此蓋理之宜然法度之當爾臣但不知楊憑所犯輕重若所坐祇緣贓汚法令且有明文合待推勘事終後徵贓定罪今所與宗儒詔令一物巳上具數聞奏即宗儒受詔之日便合勘責家資遠近流傳有似簿錄凡簿錄家產皆是逆人至犯贓不合同例伏以聖恩再三立法度必歸至公事體之間貴於允當臣苟有所見不敢不陳今日奉宣聖旨如前臣等伏以時旱稍久聖慮時深思降德音除人疾苦比來方鎮過有進奉因此聚斂恣為剝害遂使百姓積怨愁之氣陛下有納進之名臣雖頻奏已蒙納今特有處分使載在德音實王政之大猷為時事之切務上符天意下感人心和氣既通甘澤必應其合進奉外尚慮方鎮私有聚斂者但德音嚴加約束如有違越令在必行仍令御史臺及出使郎官御史察訪聞奏比來制勅雖下多至因循不守患在賞罰不立不患朝廷不知聖心不移下誰敢犯其嶺南風俗百姓多賣買不得驅掠百姓為口禁止條約犯者依前令有司糾察聞奏橫賊擾亂皆由於此今有明勅處分足以感動其心伏以聖恩緣時稍旱特發德音誠意憂勤每事節儉停罷進奉降免囚徒廄馬宮人既從減省私率公債又悉蠲除戒長吏之貪求禁遠人之驅掠大革時獘特出聖懷下感人心上符天意實帝王之盛事為史策之輝光斯則唐堯虞舜之明未過於此貞觀開元之盛復覩於今鼓舞億兆之歡心丕降至誠之德意澤以周地陰陽之候自和德既動天雲雨之施何遠臣等叨居近地獲奉聖時感忭忻勸實倍常品伏以本置館驛祇緣使命有司所支食料減刻已恐不充今若進奉貨財悉令館驛遞送豈唯館驛不濟實慮州縣難堪且財貨數多差夫遞送便須防援轉益勞煩伏恐人力凋殘物議喧謗况館驛所破並是官錢虛有省腳之名實致擾人之獘儻若有利無害承前久合行之脫若諸道悉然即是制度紊亂事傷聖政不敢不言伏望與遂振詔中處分且依舊例庶望公私通濟事體合宜其詔草未撰伏望聖旨延州所管皆新蕃人比來部落擾動多因官吏貪克寸失於恩信務於誅求致控制無方威惠不及塞門要地切在鎮安自朝廷初除延勞領延州眾情即以為未當其選今沙陀等果有不安撫馭之間必有所失恐日久轉獘須務遠圖伏望聖恩令別擇才識相當者充刺史辭對之日賜其誡勅冀種落懷附皇風宣暢俯接京畿使知典法謹具奏聞伏惟聖旨臣訪聞易定事宜今實蹙迫人情惶駭迪簡憂危蓋緣府庫空虛村鄉匱竭賞給將士徒設空言密近強隣勢有反變况易定地當要害深在河北腹中此鎮不可不存此急不可不救又聞迪簡以衣糧闕絕解還軍徒至多以臣愚慮便恐致亂何者易定舉軍歸國將謂從此保安今乃困迫於前時退散於今日懼怨恨之輩潛蓄姦謀隣道誘扇便生變故事若一失豈可復收欲令諸道可以効順以此之故不可不憂今所賜綾絹五萬匹臣竊恐太少賞給用度未濟事機伏望聖恩更賜五萬匹通前十萬匹即冀救其急切副彼憂危稍悅人心永便國計安危所繫不敢不陳元和九年冬十一月晦銀青光祿大夫兵部尚書判戶部事上柱國太原郡公食邑二千戶王公歿於位君失所重人懷其舊大事在戎以寧禍亂公實居兵部聚人曰財以遷有無公實領地官天子以兵賦之柄俾於公公以忠勞之力事於上垂玉佩累金印錫珪錫劒書社開國鬱積公望綢繆主恩出入三朝始終二紀非重而何非舊而何公諱紹字德素其先秦將翦之後翦孫離楚漢之際以秦圍趙死於師子孫家於太原世為令族曾祖威衡州耒陽令祖思獻襄州襄陽令父瑞工部員外郎及公貴累贈禮部尚書咸以盛時沉於下位積有惇德宜生達人公尚書第三子也少以厚實為士友所重太師顏魯公守吳興特器之表授武康尉相國蕭徐公察守馮翊並隨府授檄丁繼太夫人憂服除累授殿中侍御史江西觀察推官遂踐臺閣自倉部員外郎遷戶部兵部郎中專判戶部事未半嵗超拜戶部侍郎寵賜金紫復加朝散大夫即舊官判度支特遷戶部尚書所領仍舊順宗諒闇姦竪竊柄拜工部尚書以錢穀自闕俾去異已誠私計也上即位天下文明彞倫攸敘檢校吏部尚書東都畱守判都省事兼御史大夫充東都畿汝州都防禦使保東郊鎮衛舊都風令既行姦盜出奔遷檢校尚書右僕射徐州刺史兼御史大夫充武寧軍節度支度營田兼徐泗宿濠等州觀察處置等使居鎮六年復徵拜兵部尚書明年春詔兼判戶部事在位三嵗享齡七十有二徹席於長安永樂里之私第優詔追贈尚書右僕射長子前門下省典儀元泰次子劍南東川節度掌書記大理評事攝監察御史元質幼子前右威衛倉曹參軍元弼等克禀詩禮備著文行以十年秋八月四日奉窀穸於萬年縣之洪固鄉以夫人贈西河郡夫人相李氏祔焉夫人故河南少尹知府事贈工部侍郎造之長女茂於懿範歸於令人先公而歿距茲十九年矣異時同穴周公之制也夫君子之行已事上也必執心而端其始立事而保其中踐道而要其終當建中末盜起轂下乘輿南狩巴梁阨區廥藏空虛武旅氣下德宗色動公時為御史大夫包佶水陸運鹽鐵判官懷章表披荊棘懸束車馬陵踐山谷達本府之誠懇策書獻當使金綵縑帛爛若波濤積如邱陵上於是敷大號以布天地之施士由是濡厚澤以奮雷霆之用將加寵授以獎忠勞公方以國難疚懷求以詔書復命致遠之度當時所稱豈不曰有其始乎貞元中公以材智任職忠懃注意不疑可以進退海內之士可以綰攝天下之柄人心所傾台位如寄公理財以義下不厭其取處權以道上不惡其專內守持盈之誡外宏推美之度及門而進與公同升布於顯列由乎陰隲誠無二事績著一心豈不曰有其中乎元和初徐方喪師帥人怙亂樂於禍以幸其利鼓其變以成其私氛沴巳凝氣燄方作公授鉞以出投袂而馳倍道而乘其未備輕騎而出其不意先迷得主大眾歸心於是安進達以三百騎叛於河城械繫而行乎軍令唐重靖以一千人奔於埇橋檄召而收其武力散私積以勞賞發義徒以袪獘推以誠信滌其疵瑕頑固革心疆內如春武經戎畧存為故事豈不曰有其終乎是三者忠存於國政在於人遺績未映美化猶新况乎顯持世權陰行相事造膝承顧沃心獻議注百辟之耳目奔九流之車騎入司國賦之重出膺邦閫之寄考終厥命歸全於位非夫貞固幹事明哲保身曷以臻於是乎然則篆貞珉表陵谷庶乎實德宜無愧辭其洪纎之跡顯晦之用應機之速奮才以光赫其位得君以薰灼於時備用於隴西之狀精覈於宏農之誌今所書大者遠者而巳文有詳畧蓋春秋之義焉銘曰天賦才兮遇有期臣擇君兮審厥時公之達兮世所資道之行兮人罕窺筦國榷兮家以肥庭邦賦兮物不欺人意傾兮主念隨陰德及兮顯命施龍上空兮盜乘機位陽尊兮姦用奇聖運啟兮大人造王氣蕩兮英風掃用邦鎮兮徐方道洛邑思兮彭城禱順者化兮叛者討肅如霜兮偃如草中外便兮恩寵殊遷司馬兮領司徒趨丹墀兮伏青蒲杜私門兮闢公途期方遠兮帝命俞運何屈兮吾道孤松楸列兮龜筮符琬玉琢兮陵谷虞往矣巳焉兮噫嚱嗚呼
