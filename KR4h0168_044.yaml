seq: 44
front:
  text: 全唐文欽定全唐文卷四十四肅宗三
  hash: sha256:a48e1fea6ea9dce7ac26a63aa67717a0bc59cf740975660112627bd2aca9c15c
body:
  text: 敕西京緇黃耆壽百姓頃者逆兵暴至侵逼長安王事西巡修集兵馬遂使卿等陷於賊手不得奔逃或骨肉之閒枉罹屠害子女之輩多遭虜掠朕每念此流涕痛心又比來米鹽匱竭人多餓死道殣相望或賊徒逼脅驅使事窮力屈盡是脅從朕甚憫焉今巳京城再復賊寇殲滅豈獨宗廟之福社稷之靈京師等兆民懇誠感達天地之所致也方與卿等雪辱布維新大棄疵瑕宏宥罪戾恐未達意或惶恐焉各宜寧居勿懷反側各令宣諭與卿等不久相見敕西京官吏等逆胡搆禍暴犯京邑我國家圖必勝之勞取萬全之功是以避狄而西外飭師旅遂使卿等奔竄無所力屈狂寇既閉之以師旅又臨之以兵戈或強逼驅馳或僞署官爵事不獲巳皆是脅從朕深悉焉無懷反側今天既悔禍宗廟垂靈王師東征雷擊電掃逆徒剿絶關輔載清卿等代承國恩家傳祿位乃祖乃父為我純臣雖陷賊中固深憂憤是用惻隱矜憫於懷宜各自安更勿惶懼朕與人更始豈求録微瑕哉旬日之閒與卿等相見為政之本期於節用今農功在務廩食未優如聞京城之中酒價尤貴但以麴糵之費有損國儲游惰之徒益資廢業其京城內酤酒即宜禁斷麥熟之後任依常式建邦設都必稽元象分列曹局皆應物宜靈臺三星主觀察雲物天文正位在太微西南今興慶宮上帝庭也考符之所合置靈臺宜取永寧坊張守圭宅以充司天臺所司量事修理仍置五官正五人司天臺內別置一院曰通元院應有術藝之士徵辟至京於崇元院安置寇孽未平務懷撝挹自今巳後朕常膳及服御等物並從節減諸作坊造坊並停比緣軍國務殷或宣口敕處分今後非正宣並不得行用中外諸務各歸有司英武軍及六軍諸使比因論竟便行追攝今後須經臺府如處斷不平具狀聞奏自文武五品巳上正官各舉賢良方正直言極諫一人任自封進兩省官十日一上封事御史臺欲彈事不須進狀仍服豸冠殘妖未殄國步猶難共體至公以康庶政朕推誠御物與衆共之思與蒼生臻夫至道宣示中外知朕意焉九府陳規百王不易或以輕為重蓋取適時以重為輕用為救弊則有形分龍馬勢寫刀龜子母相權變通斯在今國步猶阻帑藏未充重斂乃人困不堪薄征則軍賦未足是以頃令改鑄務於濟時自開元行用巳來頗亦公私宏益今可於絳州諸爐加樣起鑄更增新郭不變舊文每以一錢用當五十利豐費約實允事宜其錢以二十斤成貫自餘錢監並聽依舊享茲厚利足以富國人安俗阜朕復何憂仍令鑄錢使即勾當起鑄新錢或有奸濫所由奉法勿至寬容仰州縣明示錢樣切須捉搦勿使違越在京官寮比無俸料桂玉之費將何以堪宜取絳州新錢給冬季俸料即仰所由申請計會支給且艱難之際家國當同頃者急在軍戎所以久虧祿俸眷言優恤恆愧於懷今甫及授衣略為賙給庶資時要宜悉朕懷因時立制頃議新錢且是從權知非經久如聞官爐之外私鑄頗多吞併小錢踰濫成弊抵罪雖衆禁奸未絶況物價益起人心不安事藉變通期於折衷其重稜五十價錢宜減作三十文行用其開元舊時錢宜一當十文行用其乾元當十錢宜依前行用仍令中京及畿縣內依此處分諸州待進止京官職田準式並合佃人輸送至京中閒楊國忠奏去城五十里外貯納縣倉本官自差人請受緣是暫時寄貯所繇觸途乾沒中間司尤被抑屈公私不便因循纍年自今巳後京兆河南府諸縣並令依舊送京輸納本官如邀詰停留并輒受加耗請準所費及剩數計贓以枉法論至死者加役流供祠祭上元舞前令大祠享皆將陳設自今巳後圓丘方澤太廟祠享然後用此舞餘祭並停敕五代則遷以尊祖禰三族之別以辨親踈故禮曰祖遷於上宗易於下六代而親屬竭矣先王所以敘昭穆明等夷不可得而變革也應追赴山陵及先在城於西宮陪位同五等親宗子等系自本枝分於天派繫之以姓而無別約之以禮而有差朕天禍所鍾哀纏罔極嗟我公族儼然來斯遠倍七月之期俯就三年之制降殺以等存乎典彞名位不同禮亦異數有司定儀將從籍屬之條天下為家用廣孝慈之道惇睦九族其在茲乎應追到及在城同五等親宗子等五品巳上各加一階六品巳下前資常選并散官至日稍優與處分未出身者量才授文武散官其中有才學行藝為衆所推及嗣郡王嘗經任使灼然著聲績者宜委宗正卿琬漢中王瑀光祿卿涵録其名實具狀聞薦自天寶以來闕造宗籍宜令宗正等重申舊制昭辨等序即宜勘造圖籍宣示中外知朕意焉敕國儲為天下之本師導乃元良之教將以本固必由教先非求忠賢何以審諭光祿大夫行吏部尚書充禮儀使上柱國魯郡開國公顏真卿立德踐行當四科之首懿文碩學為百氏之宗忠讜罄於臣節貞規存乎上範述職中外服勞社稷靜專由其直方動用謂之懸解山公啓事清彼品流叔孫制禮光我王度惟是一有實貞萬國力乃稽古則思其人況太后崇徽外家聯屬顧先勳舊方睦親賢俾其調護以全羽翼一王之制咨爾兼之可太子少師依前充禮儀使散官勳封如故瑞李繁滋國之興兆生在伽藍之內足知覺樹之榮感此殊祥與師同慶國之用刑兼在於慎恤王者布澤亦貴於乘時所以大易陳規必議緩獄周官設教遵於中典朕躬臨寶位憂念黎元乾乾之心日慎一日況兵戎未息征役尤繁哀此下人無忘夕惕如聞州縣之內多有纍囚囹圄之閒動淹時序每軫納隍之慮常懷解網之仁屬陽春布和品彙咸達宜覃在宥之澤俾叶生成之化其天下見禁囚徒死罪降流流巳下一切放免其十惡反逆及僞造頭首強盜劫殺官吏犯贓枉法等害政既甚在法難容不在此限其諸供司及作曹非切要外並宜減省京畿諸色和糴一切並停其天下百姓灼然單貧交不存者緣租庸先立限長行每鄉量降十丁猶恐編戶之中懸磬者衆限數既少或未優矜其實不支濟者宜令每鄉量更矜放待資産稍成任依常式以天下未寧頻申赦令公私庶務優恤蓋多載覃宥過之恩庶及措刑之美宣示中外知朕意焉深通道妙久著名聞昔茅君之山今洞真之奧以師德行良景慕之朕頃總干戈掃除凶慝保全萬姓克定兩京上皇聖駕迎還宮闕得此定省慶慰自天仰荷元元之祐再成宗社之業亦師精修願力有以助之必須加意壇場潔清香火廣上皇之福壽俾六合之康寧靜正道門當在師也所謝知久契真要深通元微游逍遙之境得朝徹之道上皇疇日順風見知今乃鍊質名山良多景慕也況茅君洞穴仙經所稱靈化往來神藥斯祕師當閲金籙之祕訣祈元宮以清修驗消災之方效長年之術尤宜精勵庶表齊功夏熱師得平安好遣書指不多及卿才推翰苑望重朝廷昆弟成名俱效忠節頃蠆縱毒郡邑多虞卿能審事宜捍禦凶盜雖平原不守而功效殊高自遠歸朝深副朕望允膺曳履之命無至免冠之請卿德重才博久而益彰深竭忠貞克著名節乃今再造區夏藉卿以振朝綱曳履之榮允膺其象弄印之寵無以易卿既朕心不至謙讓所謝知卿夙負名器列在朝廷委弄印之傳兼曳履之寵而乃事乖執法情未滅私朕念以舊勳遂從寬宥今左輔之郡凋敝之餘宜加撫存以申來效所謝知卿簪紱之端名節素重出鎮藩翰克效忠勤況自同及蒲襟帶相接宣風布化實佇於卿特委股肱尤當勉勵防虞恤隱必應事宜所謝知卿學行有聞謀猷克壯屢經寒歲不改松筠且江寧古之帝都實為巨防自非宿德其可濫居委卿忠誠俾當連帥宜宏籌略為朕緝綏所謝知卿之乃祖當為碩儒既高倚相之能遂有臧孫之後不墜其業在卿之門式覃追遠之恩俾蒙貽厥之慶加贈方嶽以表哀榮所謝知朕以中孚及物亭育為心凡在覆載之中畢登仁壽之域四靈是畜一氣同和江漢為池魚鱉咸若卿慎徽盛典潤色大猷能以懿文用刊樂石體含飛動韻合鏗鏘成不朽之立言紀好生之上德唱而必和自古有之情發於中豫嘉乃意所請者依守器為重擇賢而立萬國繇其永貞百王以之垂範蓋以重社稷而奉粢盛也朕纘承洪緒惟懷永圖丕膺皇極既符域中之大茂建元儲用崇天下之本皇太子俶植性恭懿因心孝友文武之德克聞於日躋君親之誠實原於天性往以時屬艱阻義扶宗社故能外清元祲內復皇圖繇是肇啓承華懋昭嘉緒今撰辰斯及冊命攸行宜承繼明之慶俾廣洊雷之澤可大赦天下頃者頻興大典纍洽殊私率土之閒屢經蕩滌猶慮近有冒法或滯狴牢其天下見禁囚徒巳下罪一切放免內外文武官三品巳上者賜爵一級四品巳上各加一階五品巳上官子為父後者賜勳兩轉頃因國用不足頒賜未周今所鑄新錢數盈於萬其京官文武五品巳上及常參官六軍將士東北京留守及諸道節度將士等各賜有差其唐元功臣成都元從及朕元從功臣等普恩之外更賜一爵四品巳下更加兩階其在靈州及寧州至鳳翔者仰所司類例更遞加一等皇親及諸色陪位人等各賜勳兩轉其鴻臚蕃客賜絹一千匹天下義夫節婦孝子順孫旌表門閭終身不事京官五品巳上各舉忠正孝友文儒周慎堪任東宮官者務取實才不得虛薦今餘寇未殄有脅在賊中未歸順者一切不以為罪其有受賊節制能以兵降者酬其封爵且為政之要求賢是急比令中外薦舉多非實才所以詢事考言登科蓋寡猶慮巖穴之內尚有沈淪宜令所在州縣更加搜擇其懷才抱器隱遁邱園以禮徵送如或不赴具以名聞凡與前詔科目相當一切委內外文武五品巳上官有所知者不限人數任各薦聞如自舉者亦聽於所在投狀有堪任用不限常資其行人家及羸老單貧鰥寡惸獨巳頻有處分宜令州縣長官倍加優恤應緣冊禮職掌要重者及撰冊書舁寶官禮官等普恩之外賜勳兩轉其禮儀使特賜一階副使普恩之外賜爵一級敕文有不該者所司類例奏聞乘時布澤有國之彞訓議獄緩刑前王之茂典繇是洽其麛卵殷湯宏解網之仁順彼陽和漢后有録囚之詔育物施惠抑惟舊章朕纘服鴻業祗膺寶位何嘗不日旰忘食中夜求衣慮一物之失所憂四方之未乂雖身居黃屋而志在蒼生今寇孽為虞征輸未息猶恐提戈釋耒未有厚於人時置埋梧或慮盈於幽圄屬三陽啓萬物遂生宜覃在宥之澤庶叶維新之令其天下見禁囚徒死罪降從流以下並釋放京城宜令中書門下即分往府縣御史臺大理寺即親自按問疏決訖具狀聞奏諸府州各委所繇長官準此處分諸色流人及左降官等所繇類例並與量移仍委中書門下議覆奏取處分其先緣安祿山僞署三司有名應在流貶者原情議罪負國誠深朕巳捨其殊死竄於荒徼固當與衆共棄長為匪人然皆邦家舊臣嘗挂纓冕使其終沒裔土永匿慙魂孰若貸以殊私俾令效節亦準例處分兼委中書門下量輕重類例奏取處分比緣寇盜之內干戈脅從白刃臨頸胡寧忍決所以陷於凶黨苟免者多從前詔書頻巳該及其史思明將士及僞署官屬等有束身歸順并率衆來降官爵如初一無所問以城邑降者仍別加封爵餘凶黨之流亦同此例天實臨照朕無食言王者設教務農為首今土膏方起田事將興敦本勸人實為政要宜令天下刺史縣令各於所部親勸農桑百姓中有勤勞耕耘積其菽粟或贍於閭里或能益軍儲委所繇長吏具狀奏聞當特與甄賞仍令有司第其高下量酬五品以下官員其百司及州縣興工力役不急之務一切並停諸軍兵健應在行營有羸老疾病不任戰陳者各委節度使速揀擇放還路次州縣量加濟恤諸色番役各令所司減省放其營農且寇孽未平軍戎當備氓庶之內征賦猶繁朕所以親帥公卿躬行節儉而詔書屢下蠲免蓋多國計軍儲取給而巳猶欲纍加損益以惠黔黎宜委中書門下勾當令度支使與諸供司一切減省應可蠲免每司各條件聞奏當使施行元首之義以人為心外有凋傷內懷慘怛罪歸於己清見乎辭伯禹深泣辜之仁漢皇下哀痛之詔與理同道惟刑是恤朕志宏覆載運屬艱難思措大刑俾登壽域風以解慍時當發生國有舊章巳懸書於象魏恩成在宥宜釋繫於狴牢其天下見禁囚徒罪無輕重一切放免其官典犯贓情雖難恕特從寬典許以自新並宜納贓放所犯罪左降官等即與量移近處諸色流人及效力罰鎮人等並即放還其有亡官失爵亦與收敘比來兵革不息年穀未登百姓流離至於困弊戰士暴露頗聞闕乏或先有結聚及有違軍令但宜改過自效前事捨而不論艱虞以來多冒刑辟道存善貸屢有德音庶其最靈咸自改勵宣示中外知朕意焉朕聞聖人畏天命帝者奉天時知皇靈眷命不敢違而去之知歷數有歸不獲巳而當之在昔帝王靡不繇斯而有天下者也乃者羯胡亂常京闕失守天未悔禍羣凶尚扇聖皇久厭天位思傳眇身軍興之初巳有成命豫恐不德罔敢祗承今羣公卿士僉曰孝莫大於繼德功莫大於中興朕所以理兵朔方將殄寇逆務以大者本其孝乎須安兆庶之心敬順羣臣之請乃以七月癸丑朔十二日甲子即皇帝位於靈州敬崇徽號上尊聖皇曰上皇天帝所司擇日昭告於上帝朕以薄德謬當重任既展承天之禮宜覃率土之澤可大赦天下改元曰至德大辟罪巳下常赦所不免者咸赦除之其逆賊李林甫王鉷楊國忠近親合纍者不在免限百姓官吏能率親屬去逆歸順者有官加其優獎斬得逆賊父子不問首從當錫爵土別有褒崇其直言極諫才堪牧宰文詞博達武藝絶倫孝悌力田沈淪草澤委所在長官聞薦詣闕自陳者亦聽東宮官屬既會昌期合承寵命量加改轉諸色勾徵逋租懸調及官錢在百姓腹內並宜放免靈州改為靈武郡大都督府上縣為望中縣為上官寮等一切便授天下耆壽各賜物五段侍老版授太守縣令有差各賜物五段諸道百姓委本道採訪使差郡縣官存問四方將士各賜馬一匹六品巳下賜物十段天下寺觀各度七人太守並限三考然後轉御史取曾任郡縣理人官者後可薦用所有彈奏一依貞觀故事官吏犯枉法贓終身勿齒自古聖帝明王忠臣烈士五嶽四瀆名山大川並令所在致祭孝子順孫義夫節婦旌表門閭內外文武官九品巳上各賜兩階賜勳兩轉三品巳上賜爵一級軒轅有版泉之戰堯帝有丹水之師湯有葛伯不祀周有獫狁孔熾古之王者奉若天命違道不敢不正干紀不得不誅日者逆胡猖狂敢行稱亂朕嗣守鴻業欽承睿圖枕戈嘗膽撫劒泣血罔不夙夜若涉春冰賴天地疾威社稷憑怒上皇丕烈萬國永懷因時致討為人請命由是義夫奮發回紇籍兵邦圻關輔之士汧隴河湟之衆沙朔羌戎之騎微盧蠻貊之人萬里雲趨四方霧合既張我伐咸乃一心蠢茲蠆之餘尚負螳蜋之力自京南合戰雒北追奔百萬摧鋒一戎而定昔夏以有窮之亂克之者四十年漢以新莽之篡復之者六千日今環周未載氛祲廓清風振海而波蕩雷破山而石裂區宇重闢日月增輝此皆三靈叶贊纍聖垂祉豈豫小子能集大勳頃以先掃宮室奉迎鑾駕紫宸初正黃屋未歸耆老之望則深庭闈之戀猶積所以自天之澤必奉於承顏作解之恩尚稽於命今六飛屆止萬姓昭蘇義奉君親慶深家國不失舊物與俗惟新宜宏肆眚之典共喜以康之福可大赦天下常赦所不免者咸赦除之其逆人能自投降率衆欵附及殺獲逆人以所部郡縣軍城降者並加超賞應與安祿山同謀反逆支黨及李林甫王鉷楊國忠等一房並不在免限武德開元及蜀郡靈武元從功臣有先巳歿死王事者並加優贈各與子孫一人官乘輿幸蜀天步多難人心且搖臣節斯見太子太師豳國公韋見素開府儀同三司內侍監齊國公高力士開府儀同三司右龍武大將軍潁川郡公陳元禮開府儀同三司左龍武大將軍田長文開府儀同三司右龍武大將軍張崇俊右龍武大將軍特進杜休祥等勇不顧死危能致命或竭誠羽翼仰北辰而環拱或叶契心膂聚東井以全歸疇茲錫社之封永以誓河之義見素加開府儀同三司食實封三百戶力士加實封三百戶元禮進封蔡國公實封三百戶長文進封鴈門郡公崇俊進封南陽郡公休祥進封馮翊郡公各實封二百戶朕龔行天罰誓兵朔野幸以一旅之衆遂成九有之師言念經綸豈忘締搆銀青光祿大夫尚書右僕射裴冕識宇沖深體局貞固輸忠佐命肇啓興王加開府儀同三司封冀國公食實封三百戶光祿大夫殿中監同正員判行軍事李輔國志除奸惡忠誠濟危加開府儀同三司殿中監依前判行軍事封成國公實封五百戶銀青光祿大夫宗正卿兼工部侍郎李遵義切維城勳參定國加特進封鄭國公實封二百戶開府儀同三司兼鴻臚卿同正員中軍都知兵馬副大使管崇嗣能訓戎律以佐兵權進封巨鹿郡公實封二百戶中軍都虞侯特進鴻臚卿同正員李鼎加開府儀同三司進封保定郡公雲麾將軍右武衛大將軍左羽林軍宿衛內供養王兟加特進太原縣侯仍各實封一百戶自寇賊姦宄王師未振瞻言京國尚聚犬羊廣平王俶循學好古令德孝恭志存邦家誓雪讎爰鞠其旅元戎啓行可封為楚王實封二千戶銀青光祿大夫尚書左僕射兼武部尚書同中書門下平章事兼靈武大都督府長史單于安北副都護持節充朔方節度使關內支度營田鹽池押諸番部落副大使知節度事六城水運朔方管內採訪處置使郭子儀才光三傑功格十臣克焯皇威載昌大業加司徒兼尚書左僕射進封代國公食實封二千戶平章事巳下並如故開府儀同三司兼鴻臚卿同正朔方左廂兵馬使同節度副使姑臧縣伯僕固懷恩進封豐國公實封二百戶開府儀同三司兼右金吾衛大將軍同正仍充四鎮伊西北庭行軍兵馬使李嗣業履險忘軀破敵定難可兼衛尉卿同正封虢國公食實封二千戶銀青光祿大夫守司徒戶部尚書同中書門下平章事兼御史大夫鴻臚卿太原尹北京留守河東節度副大使薊國公李光弼全德挺生英才閒出干城禦侮坐甲安邊可司空兼兵部尚書同中書門下平章事進封魏國公食實封八百戶開府儀同三司御史大夫兼工部尚書持節充招討西京并定武威武興平等軍兼關內節度河西隴右伊西四郡行營兵馬使王思禮養鋭先鳴蓄奇後殿可開府儀同三司行工部尚書兼御史大夫封霍國公實封六百戶光祿大夫太常卿同正兼御史大夫淮南西道節度採訪使潁川太守來瑱可開府儀同三司兼御史大夫封潁國公餘如故特進太僕卿南陽太守兼御史大夫權知襄陽事金鄉縣公魯炅蘊是韜略副茲節制可開府儀同三司兼御史大夫封岐國公仍各食實封二百戶兼京兆尹持節充京畿採訪計會招討宣慰處置事崔光遠毀家成國致命前茅可特進行禮部尚書封鄴國公食實封三百戶開府儀同三司李光進慎固封守克獻殊勳封范陽郡公食實封三百戶賢非后不享后非賢罔乂社稷之固必在良臣左相苗晉卿忠不忘君才惟濟代弼成大業保乂王家可特進行侍中封韓國公食實封五百戶憲部尚書同中書門下平章事李麟蘊德成務含貞軌物發揮帝業潤色皇猷可金紫光祿大夫刑部尚書同中書門下三品封褒國公銀青光祿大夫中書侍郎同中書門下平章事崔圓允釐庶績康濟多難一正天下大庇生人可特進行中書令封趙國公食實封五百戶朝散大夫守中書侍郎同中書門下平章事河南節度採訪處置使賜紫金魚袋張鎬謀猷惟允綱紀立程總茲戎律懿是謀府封南陽縣公餘並如故銀青光祿大夫太子少師房琯嘗以經術輔導朕躬加金紫光祿大夫少保嗣虢王巨頃以宗枝居守京邑加光祿大夫御史大夫越國公峘總兼元戎克寧全蜀可金紫光祿大夫戶部尚書郇國公韋陟持衡流品式序百工可金紫光祿大夫吏部尚書銀青光祿大夫守禮部尚書李峴饋運周給開物成務可光祿大夫行御史大夫兼京兆尹封梁國公太中大夫吏部侍郎賜紫金魚袋蘇震供億蒸徒臨事益辦可銀青光祿大夫行吏部侍郎其赴蜀郡靈武元從官及在路扈從官三品巳上與一子官四品巳下與一子出身六品巳下量與進改功臣將士勳業高者別有處分應見任五品巳上當別與一品階其陳亡人令所在郡縣收骸骨瘞埋具酒食致祭各與追贈其家給復二載諸郡縣牧或隔絶賊境則困於幽殘或犒宴官軍則弊於賦斂其來載租庸三分放一其天下百姓應諸色人勾徵及缺負官物一切放免宜令中書門下使即分道宣慰所至郡縣審問百姓閒利害有須釐革處置者一一聞奏其園苑內有間廣既使總監各據所管地界耕種所牧草粟以備國馬其宮女及狗豽雞鷹鷂之類宜即停減屋宇車輿衣服器用並宜準式珠玉寶鈿平脫金泥織成刺繡之類一切禁斷學官即宜精選務令講習擇郎官有堪任太守縣令者委京清資五品巳上及郎官御史聞薦其郡縣官有灼然清白理行尤異百姓中孝悌力田不求聞達者委採訪使聞奏其有文經邦國學究天人博於經史工於詞賦善於著述精於法理軍謀制勝武藝絶倫並任於所在自舉委郡守銓擇奏聞不限人數其律令格式未折中者委中書門下擇通明識事官兩三人並法官兩三人刪定近日所改百司額及郡名官名一切依故事頃以上皇在蜀朕亦居岐蜀郡宜改為南京鳳翔宜改為西京西京為中京蜀郡改為成都府鳳翔府尹以下官寮並依三京名號吳山為吳嶽其祠享官屬並準五嶽故事天柱山老君廟改為啓聖宮五品巳上清資官及三品巳上官上郡太守父見在無官及官卑並與五品官父母先亡歿者贈一人官祖母亡歿亦賜邑號忠臣事君有死無二烈士徇義雖滅猶存其李憕盧奕顏杲卿袁履謙許遠張巡張介然蔣清龐堅等即與追贈訪其子孫厚其官爵家口深加優賞其內外文武官有枉遭逆賊殺害及身赴朝廷并逃難山谷其父子兄弟伯叔等為賊捕捉損害及謀反城人言語泄漏因遭殺戮並勘實聞奏當以追贈天下侍老八十巳上版授有差並贈緋魚袋太原久遭逼圍給復三載上黨三度被攻給復五載其南陽潁州靈昌雎陽雍邱等郡縣堅壁多時力窮方下絶食尚守情亦可矜各給復三載其好畤奉仙兩縣進退禦寇徵求復多各給復三載蜀郡上皇親幸萬乘久居明年租賦宜依常式起後載給復三載良娣張氏既望氣知歸亦當熊見節可冊為淑妃進封南陽王係為趙王新城王僅為彭王潁川王僩為亠兊王東陽王侹為涇王第九男僙為襄王第十男倕為王第十一男偲為邵王第十二男紹為興王第十三男侗為定王淑妃以下所司擇日即行冊命雖知人之明慙於則哲而睦親之義蓋所隨時持盈尊師儀王巳下各賜五百匹諸長公主各與一子官嗣王及郡縣主各與一子六品官皇五等巳下及九廟子孫及親等人見在者並與轉改內外文武官三品巳下各加一階應敘三品五品量加減兩考蜀郡鳳翔扈從從官九品巳上賜勳兩轉溥天下賜酺五日維乾元元年歲次戊戌十月庚子朔五日甲辰皇帝若曰於戲自昔聖王咸建儲二蓋將嗣守神器虔奉宗禋是以禮經著元貞之德易象載重明之義朕纘服鴻緒丕承前烈爰升主鬯之賢實符當璧之命咨爾太尉唐書作元帥成王俶道備文武生資睿哲溫文彰於日就孝友稟於天成往以凶醜亂華干戈集事是能出陪戎駕入奉廟謀克符丹水之師實翦緑林之盜所謂功定社稷義寧君親今萬邦以貞三善斯屬宜膺上嗣之典俾踐少陽之位是用命爾為皇太子以副朕躬爾其思王業之艱難遵聖人之炯戒非尊賢無以成德非廣孝無以承親遠斥便佞詢謀正直兢兢業業庶保於大猷然後無忝爾祖宗克寧我邦家往欽哉丕膺景命可不慎歟
