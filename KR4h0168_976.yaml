front:
  text: 全唐文欽定全唐文卷九百七十六闕名十七
  hash: sha256:3a71a43a2a4bce60fa1a8ab599994e127ac1d197a044f717f2925a550254cb92
body:
  text: 惟甲馮相稱氏陰陽具司登臺窺天庶無乖於經紀觀景致日方不越於躔次自可式旌典法克審璇衡或禳災於未彰亦表瑞於先覺而乃曠我后之要列效羲和之廢時愛陽南臨既暌於宿偶畏暑北至又闕於瞻度倘冬夏失度分至乖道則六氣不節五行混施爾職不恭天位斯紊所司科處誠謂合宜徒事薄言終資按法率以大儺是驅㣥厲斯逐闕夏官之所掌在東堂而成法飾其金目視方隅而皆知壯乎丹首闕綵章而必備有司奉職無競惟人既尸百隸之位當順四時之節值此日月初晦星辰已周欽奉國儀必聞堂贈須因周以成法將始逐茲赤疫罔被清泠上以破除惡夢下以司執遺鬼宣尼之禮更立阼階張衡作賦是清京室此時廢執孰以逃刑撫狀誠合科繩執文或當推問何者所稱晦日乍涉陽春儻作元律在時不可朱裳有事理茲伏念然正嚴科必當建日之辰請置先庚之罰冰以禦炭祭而后用東風初至啓陰室以祓除西陸既躔命凌人而蕆事朝覿而出必有事於司寒肜繹之儀固可徵於舊典眷言一職實忝司存進而不知類羲和之廢職退而隳禮異申豐之善對獻羔斯闕須置嚴科神豸觸邪豈其所過建官惟賢臨下以簡爰合大中之道可還淳古之風甲委質清時分符列郡崇簡易之道化洽百城削文法之苛人安千里如汲黯之為守臥理淮陽若龔遂之能官行歌渤海無為而理不肅而成固良吏之可嘉何深文而見劾且政有經矣豈必拘之守常人可化焉自當變而至道欲科厥罪不見其宜學古入官議事以制正其德以率下下不忍欺厚其生以養人人樂其業既而教化之本禮讓為先量力而行省嗇其用懷恩者增資就賦慕義者減年從役可為銅墨之標長不在金科之擬議若必情由抑遣事與願違欲求異政之聞殊失養人之道此亦深心莫測逖聽攸疑百慮未孚兩端須叩經邦致理化人成俗率由廣學可以移風或美政之聿修則善誘而為訓眷言官長頗謂循良精敏其才使乎計吏減少府之用度鬻賨渝之貨物無賫刀布行備束修詣秦京而訪道遺魯儒而請益就賢體遠既虛往而實來閲禮敦書果日將而月就類朱藍而易染非檟楚以收威自成洙泗之風以變廬江之俗百年講學諒崇化於文翁三月舞雩寧慙詠於宣父巡使致詰胡乃不經計偕有詞足以明道髦俊之侶鄉曲有聲閲五車之墳籍光三道之詞翰是得咸充歲賦各騁翹材喧鶯谷以載飛歌鹿鳴而入薦既臻華省方得甲科但以進秀異名考試殊例不應本舉誠恐非宜考功不聽良為允當訴求不已何大乖疏漢辟賢良堯徵側陋庶見拔茅之彙方資刈楚之才故選彼鄉閭貢之天府始策名於進士誠合明揚終求試於秀才一何乖謬既離局以干事方越樽而代庖薄訴雖多厚顏奚甚國章攸著甲令斯存考功不聽誠則無爽講信明義修詞立誠豈惟潤身且以干祿德成而上充歲賦於司徒道在則遷嘉名聞於會府叩兩端而入仕博之以文論二舉之殊條奪之於理尋擇賢之意無遺十室之才詳歷試之規寧歸四科之秀循名責實雖在司存改業惟人何求物議世道交喪文質平易朴略之緒眇焉不逮混沌之萌去之彌久眷言持斧庀我王職將鎮風化是旌漢陰孑孑干旄雖得詩人之詠悠悠抱甕仍昭孔父之責或者之告不其宜乎假修之名於是驗矣然刑克以當遁真成肥寧越尚不致科巢父如何詰罪免夫度外竊以為得甲何人斯惟曰舉善士異其行光乎薦能如祁大夫則仇讎不避若隨武子乃管庫先登才膺明試雖公車之是辟事匪專征豈彤弓以為請名器不假車服以庸信有德之可嘉終無功而何錫致廷尉之詰雖三適稱勞異諸侯之勳而百矢奚用典禮不易事義斯存讓賢雖仁廢長非順徒聞建善則理其如亂嗣不祥甲著老於朝立子為後雖急難自舉必有可觀者焉長幼以倫無所苟而已矣况欲正其爵位豈宜越以雁行于弟克恭厥兄徒有好仁之請知子莫若於父盍從立長之言無忌雖欲傳家季札終當棄室諒可致詰罔聽不能孝通神明誠感天地烏馴兔擾聲高曩傳芝秀堇榮事藹前史嘗聞其語豈獨古人王懷俊性實由衷行非外獎風樹不靜遽軫攀柏之哀陟屺無望終纏負土之感豈唯坐帳警鶴故已祥霄集雁遂使金英孕彩奪神葉於芝田玉毳含輝接仙毫於麗魄斯固仁聖有道至德潛通兆庶沐化以自效動植乘休而相感非借瑞於閭里不乞靈於郡縣而利濟仁明不問喬卿之德察使風績未見王褒之頌掠美竊譽在濟雖是有心假應移禎於使無宜妄察昔聞讓善今見爭功貪天之誠頗同於往責無伐之願亦隳於前事但論孝則義歸光國於師則不許讓仁與其抑俊而揚濟未若捨貴而褒下任雖通廣孝實因心許與一介之人豈纍六條之政既經録奏須更申聞勸獎之規竊將合序仁者曾輿孝哉閔子感彼天道通乎神明乙以顏色為難溫凊是切顧罔極而何報當永錫以攸居致愛敬之歡盡哀切之性宣父為政足可連芳潁叔稱純行堪施及志義沖潔精誠洞昭故得赤烏巢門白兔遊墓霞明丹翼赩日彩以揚光霜映素毛皓月華而皎質匪徒衒美寧用報官人也無良訐之非直乙兮推孝善則可嘉宜表陳遺之感用旌吳順之行風化所行德義為本煥彼經籍形諸典謨君林行著循良道存甥舅比韓君之不別若劉生之酷似秦渭之際寧止康公贈璜晉河之陰非無子犯投璧故使薄冰必履微軀不吝乘遊水而長往詠龍君而久辭兄倫志切鴒原情敦雁序散彼棣萼恨盈東注之流投於箋牒泣下西門之恨疑惟德降美至誠感神芳聲列於緗帙雅譽標於今古執箋而出自可矜於至仁鄉人告妖恐或紊於常典天鑒昭著神心正直苟精誠而聿敷何貺施而靡應顏甲族承先哲行不違仁寧見倨於下機每防嫌於通問榮摧棣萼痛違愛於仁兄諷起伯梁遂虔心於寡嫂衣冠肅敬方禮國而躬勤衾枕嬰纏忽霜閨而寢疾四時有厲始見攻裏五藥無資爰將瞑眩至誠攸感異兆旋臻豈童子之何知有神人之叶契香囊遽委俄瞻見於靈蛇斂衽方回宛遷形於翥鳥聯翩彩翮欵徵入夢之祥坱圠元功即降痊疴之慶勿藥有喜道則雖殊無言不讐義終可尚鄉黨稱孝固足當仁鄰伍生誣何誠蔽善殷賢所親云喪罔極纏哀集荒蓼以崩心攀寒松而泣血既流悲而繞墓遽結欷以成墳所以白鶴青鸞靈芝甘露翔集墳塋之際降生廬樹之間善應類彰禎符洊至所感雖因孝致論孝亦感皇風旌以門閭實將無愧告以祥瑞良亦有疑廬青鸞鎮集白鶴翺翔縣令張德以為孝感刺史欲旌表鄉人梁靜告國家祥瑞殷賢名編澤國業預封人荷聖皇東戶之期感孝子南陔之詠仰攀風樹俯蹈寒泉同王裒之手藝松柏比平原之躬修墳墓哀哀之性切切逾悲孝徹幽明祥聞動息故得春芝列秀曉露凝甘青鸞回入鏡之容素鶴舉聞琴之翼縣寀檢巡非謬州端勘亦不虛靜是鄉人親來投告以為盛瑞咸屬國家但以子輿之冠前詢烏集休徵之屋復見魚遊則殊貺之來誠關於至化而楚州申狀亦符於孝感事緣獎勸理合申明眷彼門閭固須旌表百揆分曹六官咸事由來區別各有司存旋降絲綸遽覃簪紱令首正長實繁有徒衆務條流須施孔目憑之以提綱紀藉之以恤璣衡爰洎有時彰乎無替所由自宜遵奉所闕須有科繩散官非受納之人小吏是施行之輩苟乖其事盍置於辜恭視事端方取誚於周客敬尋失狀欲何黜於堯封據律不見本條論情有虧通典請歸司敗以正刑書建官分職揆務班司是稱會府實宏邦教緑墀黃閣棘寺蘭臺廨署星分胥徒雲集瞻言管轄必先卿尹案牘填委簿領殷繁剖析是憑準繩斯在事資孔目以備闕遺而小吏寬疏下寮弛慢不恭爾事擅付他人因而致失誰任其咎散官闕送自合科繩請更推尋方置刑典番官名書小吏位列㣥胥自宜恪守邦程動從吏道何得叨祈稍食苟徇私儲瞻彼有司出納惟吝間而不給雅合良規何所未厭仍勞上訴將求達吏雖且覬覦考以通章恐成抵牾何則國之甲令懸諸日月如或番程式序歲考茲深昔年自有常規今日何煩妄請十等分賢九流殊致異漢儀之命史若周官之爾胥頗供操牘之役寧有策勳之義具聞姦命復欲冒官未輸自貽之辜仍引無稽之訴縱已榮參朱紱其如匪是清流鮑魚不可登庖笄冠豈宜雙履抑而未許實謂有司國章攸著人命是懸莫匪黎氓咸憑版籍設令齒貌則長其如名數不踰二十朝之大夫既不登於雁序十五府之小吏亦何賤於羊車徒有訴於高年終無補於茲日理宜小冠趨事短服駿奔陪晉后之行宮爰紆御女從衛君之過市長觀玉人語事不闕於奉公論職豈卑於陳力過為辭費殊謂不然景與小吏歡而且言不勤無傲之心旋得有皮之刺恭匪近禮信則承羞黜而未甘或難奪志若使才不足美怠而可尤必也德有可甄倨而何責徵諸故事折有其倫酈生見重於抗詞元淑無嫌於長揖與其詰過寧取優賢大易立象以畋以漁明君順人有典有則用能遵彼搜狩奉於蒸嘗景何人斯祇若王命弧矢之利未聞貫於兩會籩豆之宜遽見論於三品斷暴天物幾於深文張皇已功何逭自汰且因二而濟刑可小懲欲一以窮理云奚獲徒為薄訴豈不多慙惟聖開物以仁興化無麛無卵覃率土而知方以畋以漁在王畿而逾禁所以申綸式降野揭恆書雖鷹隼之已飛猶罻羅之不入且政惟通變豈傷財以害人作為網罟蓋備物而致用况今庶類蕃殖搜田有時祝遵殷后之辭俗卜文王之囿必也專司牝牡晉臣有誡於虞針如或不施林逵蜀土何妨於釀具俱焚見及罝罘若在於崑岡弊政攸加縣法誠傷於鄠杜伊府之責允得其中國有振旅畋且順時將利武人之貞是明司馬之法惟彼茇舍掌夜於軍器械儼陳防困獸於奔北名號明立與衆人為司南指事既取於隨時應命亦同於影響金吾不辨舉劾謂何自為警夜之司寧分驅獸之命周亞夫營細柳制敵宜遵李將軍過灞亭宵行何禁左巡使糾非其罪難以抵尤草止者職司無他孰為不慎請從夏卿之教無舉秋官之典設彼大畋陳其盛禮車徒畢備鐃鼓皆作三發三刺無差於進退大獸小獸爰及於公私既而獲耳之校未施驅逆之儀方罷所司蒞職舊典攸著何饁祭之云廢乃頒禽而是先宗伯守官實虧於古制主吏問罪雅符於通識以茲見詰理合無辭乙為澤虞掌於原獸司其牝牡職在畋漁逢有司之夏苗而猶秉於周禮至於萊田表地事屬農休驅豕迎恐為害稼何得迷夏令之事行冬狩之儀翻罪守官之人奚勸在公之吏或者有告訟則未孚虞人所陳辭皆可據請從審克寧使厚誣林麓藪澤以畋以漁農牧衡虞是糾是禁禮無變俗政在守官甲獨於何不臧厥訓雖弦弧或進足以表微而皮冠不懸無聞受令法司順諛成德舉以為非君子正直於人韙之無怒可否之理居然易知呵止云違敕出畋牟云今既斷酒豈宜帶酒忿競詣金吾高牟早承亭育夙效款誠背牛加之絶壤奉鷹揚之峻秩屬以葉下黃山草腓丹浦歷飛熊之舊徑徇逐兔之荒遊既而獲已多乎言指灞陵之路日云暮矣果逢醉尉之呵類寬饒之發狂焉知去就同季布之飲酒豈辨尊卑既蚌鷸而相持乃齊楚之俱失則獵雖有禁文不繫於蕃官酒乃停沽限未拘於自飲若其因酒入罪豈非釀具招刑以獵為違則是移轅獲戾彼此俱無本罪論告皆失正途既詣金吾之司須置玉條之典但告雖不當狀匪構虛不可從敕反科宜以不應置罪待知官蔭方定刑名網罟之設有自來矣犄角之用其可廢乎苟利人阜俗亦違令何咎廉範榮參建隼職列褰帷將布政以頒條故違經而合道當仲夏之月畋以為苗居專城之尊德惟除害不麛不卵合取則於禮經以畋以漁蓋規承於易象且獸之暴物人何以堪俾肅肅兔罝不忘於詩義芒芒禹迹克疆我甫田雖黎庶勞四體之勤而畎畝取十千之歲則原田膴膴不逢走險之遊稼穡芃芃豈雜食蘋之地刺史為政諒在隨時觀察所繩奚將勸善置之於理恐未通途眷彼獵徒情多禽獸之獲語茲農者心惟稼穡之勤鳴鏑彎弧適騁麗龜之妙晨耕夕耒殊異非熊之師坐毀重邱之瓶行取閉門之詬苟敗其器宜徵陪償之資言詈彼尊有虧耆耋之敬野人不敏於義何誅考賢論材審藝觀德爰設三侯之禮以崇五善之儀貍首登歌是求於合雅采蘋斯奏何先於主皮惟彼武賓齒於其位宜揖讓中節允諧於觀善何穿洞非儀坐彰於伐德綱則未下射何速加自貽監者之尤遂干司馬之政不奠於坐誠叶周人之式袒決而還亦符相圃之事雖君子之爭戒所苟得而士師之律未可深文宜從肆緩謂叶平典大獸小禽各有攸處敦弓潔矢隨利而行爰俾迹人職斯厲禁用捨必由其令左右無乃失宜苟封毒而重傷雖省括而何狩况今物遂蕃茂政和鐘律四靈雜襲百瑞同休彼何人斯虧我王化禁之可也多訴奚為制國之用必歲之杪量大小而用地審豐耗以視年鳩化為鷹見草木之搖落豺既祭獸設罻羅而以畋然後順時出遊因隙校獵俾虞人以入澤閲車徒而展事昆蟲未蟄無以火田麛卵不傷動必討叛金吾申上田矢不供職司其憂冬狩慮闕然寬則得衆敏則有功合供雖則不供恐闕固應未闕若官曹立限送者違程於理難容請從嚴斷
