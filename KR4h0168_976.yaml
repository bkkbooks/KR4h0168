  - {type: head, offset: 126, content: 月晦所司闕堂贈之禮, id: KR4h0168_NFKB_976-h4, level: 2}
  - {type: head, offset: 312, content: 對西陸朝覿判, id: KR4h0168_NFKB_976-h5, level: 2}
  - {type: head, offset: 312, content: 西陸朝覿闕肜繹之儀御史劾之非其時不合禮, id: KR4h0168_NFKB_976-h6, level: 2}
  - {type: head, offset: 404, content: 對不拘文法判, id: KR4h0168_NFKB_976-h7, level: 2}
  - {type: head, offset: 404, content: 甲為守不拘文法科其罪曰無為而已, id: KR4h0168_NFKB_976-h8, level: 2}
  - {type: head, offset: 520, content: 對增貲就賦判, id: KR4h0168_NFKB_976-h9, level: 2}
  - {type: head, offset: 520, content: 劉乙為邑道百里增貲就賦減年從役, id: KR4h0168_NFKB_976-h10, level: 2}
  - {type: head, offset: 634, content: 對蜀物至京判, id: KR4h0168_NFKB_976-h11, level: 2}
  - {type: head, offset: 634, content: 得廬江人使計吏多賫蜀物至京分遺博士巡使問其故云官長勸人非為過也, id: KR4h0168_NFKB_976-h12, level: 2}
  - {type: head, offset: 790, content: 對鄉貢進士判, id: KR4h0168_NFKB_976-h13, level: 2}
  - {type: head, offset: 790, content: 鄉舉進士至省求試秀才考功不聽求訴不已, id: KR4h0168_NFKB_976-h14, level: 2}
  - {type: head, offset: 874, content: 對鄉貢進士判, id: KR4h0168_NFKB_976-h15, level: 2}
  - {type: head, offset: 874, content: 鄉舉進士至省求試秀才考功不聽求訴不已, id: KR4h0168_NFKB_976-h16, level: 2}
  - {type: head, offset: 959, content: 對鄉貢進士判, id: KR4h0168_NFKB_976-h17, level: 2}
  - {type: head, offset: 959, content: 鄉舉進士至省求試秀才考功不聽求訴不已, id: KR4h0168_NFKB_976-h18, level: 2}
  - {type: head, offset: 1053, content: 對舉抱甕生判, id: KR4h0168_NFKB_976-h19, level: 2}
  - {type: head, offset: 1053, content: 河南東持斧舉抱甕生或告云矯州科生妄罪不伏, id: KR4h0168_NFKB_976-h20, level: 2}
  - {type: head, offset: 1158, content: 對薦賢能判, id: KR4h0168_NFKB_976-h21, level: 2}
  - {type: head, offset: 1158, content: 甲薦賢能之士三詣公車試皆高第表請錫彤弓矢廷尉致詰辭云三適有功, id: KR4h0168_NFKB_976-h22, level: 2}
  - {type: head, offset: 1260, content: 對請立長子為嗣判, id: KR4h0168_NFKB_976-h23, level: 2}
  - {type: head, offset: 1260, content: 得甲告老請立長子為嗣長辭云不能請讓其弟或詰之云弟好仁, id: KR4h0168_NFKB_976-h24, level: 2}
  - {type: head, offset: 1366, content: 對芝草白兔由刺史善政判, id: KR4h0168_NFKB_976-h25, level: 2}
  - {type: head, offset: 1366, content: 岳州人王懷俊幼喪二親廬於墓側負土成墳至孝潛通屢呈祥瑞其地內生芝草兼白兔刺史元利濟仁明訓俗善績著聞廉察使以為由刺史錄奏懷俊不伏, id: KR4h0168_NFKB_976-h26, level: 2}
  - {type: head, offset: 1631, content: 對赤烏巢門判, id: KR4h0168_NFKB_976-h27, level: 2}
  - {type: head, offset: 1631, content: 乙喪親之後家有赤烏巢門白兔遊墓人告不報官司, id: KR4h0168_NFKB_976-h28, level: 2}
  - {type: head, offset: 1769, content: 對投牋獲弟判, id: KR4h0168_NFKB_976-h29, level: 2}
  - {type: head, offset: 1769, content: 河內縣荀君林乘冰省舅冰陷而逝兄倫求屍不獲遂作牋與河伯經宿冰開獲君林執牋出鄉人告稱妖惑, id: KR4h0168_NFKB_976-h30, level: 2}
  - {type: head, offset: 1920, content: 對嫂疾得藥判, id: KR4h0168_NFKB_976-h31, level: 2}
  - {type: head, offset: 1920, content: 顏甲養寡嫂疾求藥無出有童子授之化鳥而去鄰告妖異甲不伏, id: KR4h0168_NFKB_976-h32, level: 2}
  - {type: head, offset: 2110, content: 對墳樹有甘露判, id: KR4h0168_NFKB_976-h33, level: 2}
  - {type: head, offset: 2110, content: 楚州申殷賢喪親負土成墳甘露降樹芝草生廬青鸞鎮集白鶴翺翔縣令張德以為孝感刺史欲旌表鄉人梁靜告國家祥瑞, id: KR4h0168_NFKB_976-h34, level: 2}
  - {type: head, offset: 2202, content: 對墳樹有甘露判, id: KR4h0168_NFKB_976-h35, level: 2}
  - {type: head, offset: 2202, content: 楚州申殷賢喪親負土成墳甘露降樹芝草生, id: KR4h0168_NFKB_976-h36, level: 2}
  - {type: head, offset: 2403, content: 對孔目判, id: KR4h0168_NFKB_976-h37, level: 2}
  - {type: head, offset: 2403, content: 得諸司長官初上皆孔目所由不送依問已付散官遂被遺失, id: KR4h0168_NFKB_976-h38, level: 2}
  - {type: head, offset: 2537, content: 對孔目判, id: KR4h0168_NFKB_976-h39, level: 2}
  - {type: head, offset: 2537, content: 得諸司長官初上皆孔目所由不送依問已付散官遂被遺失, id: KR4h0168_NFKB_976-h40, level: 2}
  - {type: head, offset: 2642, content: 對番官判, id: KR4h0168_NFKB_976-h41, level: 2}
  - {type: head, offset: 2642, content: 番官請稍食不給訴求達吏, id: KR4h0168_NFKB_976-h42, level: 2}
  - {type: head, offset: 2744, content: 對流外判, id: KR4h0168_NFKB_976-h43, level: 2}
  - {type: head, offset: 2744, content: 流外解請兵部勞所由不許訴五品以上, id: KR4h0168_NFKB_976-h44, level: 2}
  - {type: head, offset: 2828, content: 對差羊車判, id: KR4h0168_NFKB_976-h45, level: 2}
  - {type: head, offset: 2828, content: 丁被差羊車小吏辭曰籍小年高, id: KR4h0168_NFKB_976-h46, level: 2}
  - {type: head, offset: 2944, content: 對小吏歡言判, id: KR4h0168_NFKB_976-h47, level: 2}
  - {type: head, offset: 2944, content: 景與小吏歡言倨見功曹將黜不伏, id: KR4h0168_NFKB_976-h48, level: 2}
  - {type: head, offset: 3030, content: 對畋獵三品判, id: KR4h0168_NFKB_976-h49, level: 2}
  - {type: head, offset: 3030, content: 景畋獵三品自稱有功所統斷為強暴天物且違時禁景詣三司訴持法不平, id: KR4h0168_NFKB_976-h50, level: 2}
  - {type: head, offset: 3125, content: 對覆車罝罘判, id: KR4h0168_NFKB_976-h51, level: 2}
  - {type: head, offset: 3125, content: 京兆申鄠杜間有覆車罝罘縣悉焚之百姓訴財失業府責縣以貧人弊政縣訴云此並犯禁之具若不毀除是誘人於陷阱也, id: KR4h0168_NFKB_976-h52, level: 2}
  - {type: head, offset: 3274, content: 對金吾不辨夜判, id: KR4h0168_NFKB_976-h53, level: 2}
  - {type: head, offset: 3274, content: 金吾不辨夜草止者不慎左巡使舉劾訴云五月教茇舍自有所由不伏, id: KR4h0168_NFKB_976-h54, level: 2}
  - {type: head, offset: 3410, content: 對不饁獸於郊判, id: KR4h0168_NFKB_976-h55, level: 2}
  - {type: head, offset: 3410, content: 得大畋所司不饁獸於郊御史詰之甲云將頒禽也, id: KR4h0168_NFKB_976-h56, level: 2}
  - {type: head, offset: 3504, content: 對澤虞傷田苗判, id: KR4h0168_NFKB_976-h57, level: 2}
  - {type: head, offset: 3504, content: 乙為虞所司夏苗乙萊田表地或告有闕訴稱恐傷夏苗仰正斷, id: KR4h0168_NFKB_976-h58, level: 2}
  - {type: head, offset: 3597, content: 對招虞人以弓不進判, id: KR4h0168_NFKB_976-h59, level: 2}
  - {type: head, offset: 3597, content: 甲畋於郊招虞人以弓不進法司劾辭以守官, id: KR4h0168_NFKB_976-h60, level: 2}
  - {type: head, offset: 3675, content: 對中郎率家僮出畋判, id: KR4h0168_NFKB_976-h61, level: 2}
  - {type: head, offset: 3675, content: 中郎高牟率家僮出畋晚歸滋水長因醉使酒, id: KR4h0168_NFKB_976-h62, level: 2}
  - {type: head, offset: 3891, content: 對仲夏百姓弋獵判, id: KR4h0168_NFKB_976-h63, level: 2}
  - {type: head, offset: 3891, content: 得鄭州刺史廉範以仲夏月令百姓弋獵觀察使糾其違令云為苗除害, id: KR4h0168_NFKB_976-h64, level: 2}
  - {type: head, offset: 4066, content: 對出畋毀耕者之瓶判, id: KR4h0168_NFKB_976-h65, level: 2}
  - {type: head, offset: 4066, content: 丁畋於渭表毀耕者之瓶詬丁及父為厲事, id: KR4h0168_NFKB_976-h66, level: 2}
  - {type: head, offset: 4146, content: 對張侯下綱判, id: KR4h0168_NFKB_976-h67, level: 2}
  - {type: head, offset: 4146, content: 景張侯下綱不及地武賓遂貫之監者謂無揖讓之禮不坐奠豐上賓袒決而退, id: KR4h0168_NFKB_976-h68, level: 2}
  - {type: head, offset: 4278, content: 對用毒矢而射判, id: KR4h0168_NFKB_976-h69, level: 2}
  - {type: head, offset: 4278, content: 乙用毒矢而射迹人禁之云貴其必獲, id: KR4h0168_NFKB_976-h70, level: 2}
  - {type: head, offset: 4360, content: 對金吾不供畋矢判, id: KR4h0168_NFKB_976-h71, level: 2}
  - {type: head, offset: 4360, content: 金吾申不供畋矢冬狩有闕, id: KR4h0168_NFKB_976-h72, level: 2}
