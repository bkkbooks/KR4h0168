front:
  text: 全唐文欽定全唐文卷八百六十五敏淄州鄒平人梁貞明中登科仕後唐歷國子司業晉天福四年授祭酒檢校工部尚書兼戶部侍郎開運初遷兵部侍郎充宏文館學士改檢校右僕射乾祐中拜尚書右丞周顯德初拜太常卿檢校左僕射加司空顯德五年遷工部尚書改太子少保致仕入宋卒
  hash: sha256:db4a4d36f65ec02bc1ef9fc576a4059405a3ee1d44fa5090437ef76e4143de48
  markers:
  - {type: head, offset: 14, content: 田敏, id: KR4h0168_NFKB_865-h1, level: 1}
body:
  text: 禮有五經祭在其首國之大事祀亦居先則知祭祀者有國是遵百王所重是以肅雍清廟禋祀元天立四時則大駕親臨將置齋則仲尼所慎莫不嚴崇宮室潔滌樽罍陳其肅肅之儀報以穰穰之福臣竊見四郊祠祭並無齋室行事官吏旅寓鄉村有瀆至誠恐非清潔伏乞特下有司俾於四郊量起屋宇臣等自長興三年較勘雕印九經書籍經注繁多年代殊邈傳寫紕繆漸失根源臣守官膠庠職司較定旁求援據上備雕鐫幸遇聖朝克終盛事播文德於有截傳世教以無窮謹具陳進臣奉聖旨為祠祭用犢事今大僕寺供犢一年四季都用犢二十二頭唐會要武德九年十月九日詔祭祀之意本以為民窮民祀神有乖正直殺牛不如禴祭明德即是馨香望古推今民神一揆其祭圓丘方澤宗廟已外並可止用少牢用少牢者用特代時和年豐然後克修常禮又按會要天寶六載正月十六日赦文祭祀之典犧牲所備將有達於虔誠蓋不資於廣殺自今後每大祭祀應用騂犢宜令所司量減其數永為常式其年起請以舊科每年用犢二百一十二頭今請減一百七十三頭止用三十九頭餘祠饗宜並停用犢至上元二年九月二十一日赦文國之大事郊祀為先貴其至誠不美多品黍稷雖設猶或非馨牲牢空多未為能饗圓丘方澤仍依常式宗廟諸祠臨時獻熱用懷明德之馨庶合西鄰之祭其年起請昊天上帝太廟各太牢一餘祭並隨事市供若據天寶六載自二百一十二頭減用三十九頭武德九年每年用犢十頭圓丘方澤一宗廟五據上元二年起請祇昊天上帝太廟又無方澤則九頭矣今國家用牛比開元天寶則不多比武德上元則過其大半矣按會要太僕寺有牧監掌孳課之事乞今後太僕寺養孳課半其犢遇祭昊天太廟前三月養之滌宮取其蕩滌清潔餘祭則不養滌宮若臨時買牛恐非典故謹具奏聞質字文素宗城人後唐進士晉天福中官監察御史直史館知制誥漢初加中書舍人戶部侍郎周廣順初拜平章右僕射監修國史入宋兼侍中封魯國公孫臣某言今月十七日寅時相州節度使張彥澤都監富珠哩部領大軍入京齎到翁皇帝賜太后書示於滹沱河下杜威一行馬步兵士見領蕃漢部騎來幸汴州者往者唐運告終中原失馭數窮否極天闕地傾先人有田一成有衆一旅兵連禍結力屈勢孤翁皇帝救患摧鋒興利除害躬環甲胄深入寇場犯露蒙霜度雁門之險驅風掣電行中冀之誅黃鉞一麾天下大定勢凌宇宙義感神明功成不居遂興晉祚則翁皇帝有大造於石氏也旋屬天降厥凶先君即世臣遵承遺旨纘紹前基諒暗之初荒迷失次凡有軍國重事皆委將相大臣至於擅繼宗祧既非稟命輕發文字輒敢抗尊自啓釁端果貽赫怒禍至神惑運盡天亡十萬師徒皆望風而束手億兆黎庶悉延頸以歸心臣負義包羞貪生忍恥自貽顛覆上纍祖宗偷度晨昏苟存食息翁皇帝若惠顧疇昔稍霽雷霆未賜靈誅不絶先祀則百口荷更生之德一門銜罔報之恩雖所願焉非敢望也臣與太后并妻馮氏及舉家戚屬見於郊野面縛俟罪次所有國寶一面金印三面今遣長子陜府節度使延煦次子曹州節度使延寶管押進納并奉表請罪陳謝以聞頃以偽主王從珂於洛京大內自焚之後其真傳國寶不知所在必是當時焚之先帝受命旋製此寶在位臣寮備知其事臣至今日敢有隱藏濤字德潤徐州彭城人後唐天成中進士纍遷起居舍人晉天福中歷度支職方二郎中漢初為中書舍人周廣順中左遷少府少監分司西京顯德初就改太常少卿拜右諫議大夫四年以知貢舉責授太子右贊善大夫恭帝即位遷右詹事入宋終祕書監方鎮之內土俗不同山澤川原租賦各異任土作貢蓋便黎民臣恐天下稅賦上供土産各異恐於調度或未便安請敕諸道州府於所部之內貢賦供輸有未便特許上書論列以協物宜貞固字體仁同州白水人後唐同光中進士補萬全主簿授河東節度推官晉天福中纍擢中書舍人改御史中丞歷刑部門下二侍郎少帝即位拜工部尚書遷禮部刑部尚書漢祖入汴遷吏部尚書拜司空門下侍郎平章事隱帝即位加司徒周祖登極加兼侍中罷相守司徒封沂國公入宋開寶二年卒臣伏見先降御札令文武百僚各進封事臣聞舉善為明知人則哲聖君在位藪澤豈有隱淪昭代用材政理固無紊亂求賢若渴從善如流鄭所以譽子皮魯所以譏文仲為國之要進賢是先庶遵理治之風宜舉仁人之器臣欲請乞降敕命指揮文武百僚每一司之內共集議商擢其一士奏薦述其人有某能改為某官某職便請朝廷據奏薦任用若能符薦引果為當才所奏之官即請量加獎賞如乖其舉或涉徇私所奏之官亦請量加殿罰所貴官由德序位以才升三人同行尚聞擇善十目所視必不濫知臣職在論思位參近侍每謝匪躬之節嘗慙濡翼之譏將贖貪叨敢陳狂狷國忌日宰臣跪爐焚香僧人表讚孝思述祖先違世之事而文武百辟儼然列坐竊惟禮非天降酌在人情今古通規君親至敬對佛像行香之日實帝王不樂之辰豈有聽烈祖之舊勳悉安所坐聞明君之至德曾不暫興考經雖謂其相承度禮深疑其有失欲請跪爐仍舊餘依常位立班進士考試雜文及與諸科舉人八策歷代已來皆以三條燭盡為限長興二年改令晝試伏以懸科取士有國常規沿革之道雖殊公共之情難失若使就試兩廊之下揮毫短景之中視晷刻而惟畏稽遲演詞藻而難求妍麗未見觀光之美但同款答之由既非師古之規恐失取人之道今於考試之時準舊例以三條燭為限其進士并諸色舉貢人等有懷藏書策入院者舊例扶出不令就試近年以來雖見懷藏多是容縱今欲振舉弛紊明辨臧否冀在必行庶為定式臣伏覩上自軒昊下及隋唐歷代帝王享國年月莫不裁成信史載在明文或編修祇自於本朝或追補亦從於來者曾無漏略咸有排聯蹤迹相尋源流可別五運生成之道於是乎彰明一時褒貶之書因茲而昭著古既若此今乃宜然輒敢上言庶裨有作伏以晉高祖洎少帝兩朝臨御一紀光陰雖金德告衰蓋歸歷數而炎靈復盛固有階緣先皇昔在初潛曾經所事舜有歷試之迹禹陳俾乂之功載尋發漸之由實謂開基之本近見史臣修高祖實録神功聖德靡不詳明述漢之興由晉而起安可遺落朝代廢缺編修更若日月滋深耳目不接恐成湮沒莫究端由伏惟皇帝陛下德洽守文功宣下武化家為國備觀王業之源續聖繼明益表帝圖之美舊章畢舉墜典聿修伏乞睿慈敕史官纂集晉朝實録臣監修國史時奉詔修晉朝實録伏以皇帝陛下武功定業文德化民河圖雒書將薦聖明之瑞商俗夏諺無輕典誥之資厚言貽誡以宏心彰往考來而在念臣等任叨南董才愧班荀屬辭虧朗暢之功總論寡精微之識秩無文於昭代浪塞闕如收遺韻於傳聞冀開來者奉茲鉛槧賞以油緗同傾獻狀之心上副成書之命所撰晉高祖實録三十卷少帝實録二十卷謹詣東山閣門呈進按王制天子七廟諸侯五大夫三士一正義曰周之制七廟者太祖及文王武王之祧與親廟四也又曰七廟者據周也有其人則七無其人則五至光武中興及魏晉宋齊隋唐或立六廟或立四廟蓋建國之始未盈其數也禮曰德厚者流光此天子可以事六世之義也今陛下大定寰區重興漢祚旁求典禮用正宗祧伏請立高曾祖禰四親廟又自古聖王祖有功宗有德更立始祖在四廟之外不拘定數所以或五廟或七廟今請尊高皇帝光武皇帝為始祖法文王武王不遷之制用歷代六廟之規庶合典禮陛下方祇見於祖宗展孝思於迎奉酌人情而制禮迎廟主以為宜臣等未見舊章止依情理以車駕出城為是其迎奉之儀請下禮儀使酌量草定拙潁州汝陰人梁貞明五年舉三史攝本鎮館驛巡官仕後唐纍遷御史大夫檢校虞部郎中晉天福四年入為右補闕八年遷左司員外郎漢初召為司馬郎中宏文館直學士周顯德初拜檢校右散騎常侍國子祭酒入宋終祕書監準敕較勘經典釋文三十卷雕造印板伏以陸氏釋文唐初撰集綿歷歲月傳寫失真非多聞博識之人通幽洞微之士重其商確必致乖訛況今朝廷富有鴻碩如兵部尚書張昭太常卿田敏皆文儒之領袖也或家藏萬卷或手較六經實後學之宗師為當今之雄尚伏乞察以事繼垂教情非屬私時賜敷揚俾同讎校崇義河南洛陽人少舉三禮漢乾祐中纍官至國子禮記博士周顯德中纍遷國子司業太常博士入宋終學官魏明帝以景初三年正月上仙至五年二月祫祭明年又禘自茲後以五年為禘且魏以武帝為太祖至明帝始三帝而已未有毀主而行禘祫其證一也宋文帝元嘉六年祠部定十月三日大祠其太學博士議云按禘祫之禮三年一五年再宋自高祖至文帝裁亦三帝未有毀主而行禘祫其證二也梁武帝用謝廣議三年一禘五年一祫謂之大祭禘祭於夏祫祭於冬且梁武乃受命之君僅追尊四朝而行禘祫則知祭者是追養之道以時移節變孝子感而思親故薦以首時祭以仲月間以禘祫序以昭穆乃禮之經也非關宗廟備與未備其證三也奉敕為大行皇帝山陵有期神主祔廟恐殿室間數少合重添修今詣廟中相度若是添修廟殿一間至兩間並須移動諸神門及角樓宮牆仗舍及堂殿正面簷栿階道亦須東省牲立班位直至齋宮漸近迫窄今重拆廟殿續更添修不唯重勞兼恐未便竊見廟殿見虛東西二夾室況未有祧遷之主欲請不拆廟殿更添間數即便將夾室重安排六室位次所有動移神主若準舊禮於殿庭權設行廟幕殿即恐雨水猶多難於陳設伏請權於太廟齋宮內奉安神主至修奉畢日庶為宜稱又按禮記云廟成則於中屋刲羊以釁之夾室則用雞又大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通理伏請遞遷諸室奉安大行皇帝神主以符禮意玕華州鄭人邊蔚子晉開運二年官祕書省著作郎入宋終金部郎中臣聞從諫如流人君之令範極言無隱臣子之常規蓋欲表大國之任人致萬邦之無事前文備載可舉而行伏以皇帝陛下德合上元運膺下武旰食宵衣而軫念好生惡殺以推仁幾措典刑固無寃枉然以照臨之內州郡尤多若不再具舉明伏恐漸成姦弊臣竊見諸道刑獄前朝曾降敕文凡是禁繫罪人五日一度録問但以年月稍遠漸致因循或長吏事煩不躬親點檢或胥徒啓幸妄要追領證明慮有涉於淫刑即恐傷於和氣伏乞特降詔敕自今後諸道并委長吏五日一度當面同共録問所冀處法者無恨銜寃者獲伸俾令四海九州咸歌聖德五風十雨永致昌期贊澶州觀城人少為小吏纍遷本州馬步軍都虞候周世宗即位補東頭供奉官纍遷右驍衛將軍三司副使及征關南以為客省使領河北諸州討度使還復為三司副使入宋知揚州溺死風雅不主於今之詩而其流涉賦今之詩蓋起於漢魏南齊五代文愈深詩愈麗陳隋之際其君自好之而浮靡惉懘流於淫樂故曰音能亡國信哉唐興其音復振陳子昂始以骨氣為主而寖拘四聲五七字律建中之後其詩彌善錢起為最杜甫雄鳴於至德大歷間而詩人或不尚之嗚呼子美之詩可謂無聲無臭者矣吳越故多詩人未有新定方干擅名於杭越流聲於京洛夫干之為詩鋟肌滌骨冰瑩霞絢嘉肴自將不吮餘雋麗不葩紛苦不棘癯當其得志與神會詞若未至意已獨往豫為兒時得生詩數十篇心獨好之生時尚存地遠莫克相見其後生名愈藉為詩者多能諷之而生歿矣今年遇樂安孫邰於荊早與生善出示所作元英先生傳且曰與其甥楊弇洎門僧居遠收掇其遺詩得三百七十餘篇析為十卷欲豫為之序冀偕之不朽先是丹陽有南陽張祐差前於生其詩發言橫肆皆吳越之遺逸豫嘗較之張祐升杜甫之堂方干入錢起之室矣干之出處行事邰傳實備之不復互出直嘉邰能懷人之遇成人之不泯而又愛我之厚故集詩之之廢興題於干集之首超長興時人官著作郎祕書監空有省名而無廨署藏書之府無屋一間無書一卷非人文化成之道請依六典創修之
