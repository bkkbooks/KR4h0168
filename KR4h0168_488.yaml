front:
  text: 全唐文欽定全唐文卷四百八十八權德輿六
  hash: sha256:a0664f1cf380fc21d106ebfc0712d1212c77b2a7113e6a72fd2fbb2dea61a1b7
body:
  text: 右張愔狂愚敢阻朝命但慮強鄰潛導故使之然或聞移牒出軍屯於境上外示攻脅其實衛之倘諸軍進攻事至危迫度其不能濟也則必執以為功既居將相之崇又有討伐之績不待朝廷加地進律而徐方去矣雖萬萬無之亦不可不慮誠在率勵整訓合力急攻但一方底平則四方知懼倘向淹時月未就誅夷則不如委以州師俾其傳達苟安反側以為後圖但運路通流師律精徑更命文武兼材之臣徙為三州節度且揚徐乖遠控攝異宜移鎮則兵力難分遙制則威重不足愚夫武校積習常情欲其復制旌旄不隸鄰道但得人以授必易為理又防間暴慢皆在其初實由藩鎮歲深沒於其位將校竊報恩之義子弟蓄樂禍之心陛下務人之安含垢屈法因以授仕其風寖然臣以為三載考績先王之制或惜其為理就加爵秩者不過五年則必交代不幸物故雖其子亦可繼之者麾下有可代之者則必授於諸鎮而命其帥於朝不得已則命於鄰壤又其次也擢其介又其次也設有齟齬者則以嚴師臨之以大順責之人各有心固思自效凡舉事固計其當否而不計其濟否易曰師出以律否臧凶正謂此也位與望未至而驟居之其敗必速又使人人有覬幸之心此四方所以多故也酌理道之源尊朝廷之柄柄歸於上則事理於下但修之近者則遠者自至矣制於易者則難者自化矣如此則綱維畢舉利澤潛流自古霸王之道也易曰聖人感人心而天下和平伏惟陛下留念以前淮右未平徐方猶梗師徒淹久率土同憂臣自十數年間叨禮官記言司言之任愚陋無補忝冒掖垣又思漢朝梅福以南昌尉之微猶遠陳時政敢以血誠管見博採㣥情輒竭肝肺因陳本末理有似迂而實近言有過直而不誣干黷宸嚴莫識忌諱心魂震越伏待刑書無任懇欵惶悸之至謹奉狀陳奏以聞謹奏右自去嵗出師今已周月軍威未振寇孽猶虞中外臣庶實同憤切臣伏思之以王命討不庭以平天下師臨區區淮西之地況申光褊小惟有蔡州以宗社威靈睿謀上略所宜朝出令而夕獻捷乘城授首指顧可期今勝負之間猶未相直師老財廢勞而無功者何哉蓋有以也以寇之乘亂專地已十五年財征不至於有司杼軸難資於軍實而又峻威令同豐約獸窮則摶人自為戰此皆必死之衆也以全義之忠朴果決固思報恩而馭衆代謀力或不足況山東士旅驕悍且久苟非威望素重者豈能制之又諸侯之師頭會烏合或幸灾養寇或綿力薄材勝既衆分其勞敗又無所歸罪其心不一姑務自安此非成功之人也臣以為徵師太廣命將太輕輕則無功廣則難制議者或曰統師之名不重則策勳之時其賞易足偏師之任不一則勞旋之際其功自分且以希烈襄陽為之懲創此乃知其一而不知其二也成功之後在法制鈐鍵之而已豈可早計過慮使陷於必不成功哉自古以兵多而敗者非一以近事則乾元鄴城之圍大歷魏州之討非師不衆也今因其數道會師可以精擇將帥武略威重為聖心所知㣥情所伏者其餘方面二千石與汝鄧之地環寇四境度其不能者速易之兩河遠地之師未能制其死命者悉罷去之但以便地徑兵練其可用者誓以賞罰使之犄角設備於要害同心以進取程其力用如臂使指此決勝之道也其次則嚴戒慎固勿與爭鋒來則遏其驅侵去則保茲經界使士勇皆賈終不妄動有虜獲者悉釋而歸之耀以武力浹之恩信既無饋運之費又無殺伐之傷彼竭我盈可以歲月待其斃也倘以其未有出境之暴且開請罪之詞下詔班師曠然全宥雖根本未靖且罷戰息人又其次也若止如今者二十餘軍禁令不一以懷歸之衆無效命之心望其成功亦已難矣伏惟陛下留念臣德輿言伏見自春三月不雨連夏涉秋田里嗷嗷農收無望陛下齊心減膳憫惻元元告於宗廟禱於天地一物可祈者必致其禮一介有請者必誠其言憂人閔雨可謂至矣而甘澤未降衆情如焚公私窘迫日月以甚臣聞水旱之沴陰陽之變前哲王之所不免但有備之之術而已銷天災者莫若修政事感人心者莫若流惠澤人和浹洽則天地之和應矣昔堯舜在上天下無窮人今陛下愛人之心遠過堯舜而猶有窮困未濟者此臣所未喻也敢以朴愚條陳管見伏惟聖慮裁擇一頃年縱旱亦皆有苗但時雨或愆不秀不實今則甸畿之內多有不下種而不生出者才出短苗旋即焦乾者大率皆赤地而無所望流庸轉徙之人或趍近輔或抵京西斃踣雕耗於道途者又居其外但慮至種麥時無種可下頃者夏麥所收蓋寡旋屬旱歉性命是虞迫於目前苟利糊口蚩蚩愚夫須與支計伏望以今年夏稅麥中各於本縣量留充臨時賑貸麥種今年秋稅除水利地據分數外餘一切放免遠年逋負悉皆蠲除發德音下明詔沛然及物使皆聞知則人心重遷喜氣交感假使不放亦決無可徵不若先事圖之則恩歸於上此乃今之至切也去貞元十四年夏旱不甚於今官吏多督責取辦以為心不副陛下視人如傷之旨至有縣令為部內百姓毆擊者前事不遠伏惟陛下留念一漕運之事以濟關中有司量入固以支計以臣愚所見且自東都以來緣路倉所貯米隨水陸節給倍程般運應給腳價皆與實錢務令速到京師不計在途省費續計料江淮米入運以備恆數又以太倉粟約一歲費之外出糶於人則時價必減而蓄藏者自出矣一書曰罪疑惟輕又曰宥過無大陛下已命省寺疏理繫囚各從減等務使原免此誠睿慈恤隱莫大之澤臣愚以為不如特降成命敷宣於朝使轂下萬人渙然受賜又比來有經黜放者自謂永無録用之期坐為匪人感動和氣冬薦官踰三年未受命者不敢出城相顧以乞食溘然而就斃此亦窮人之一端也近有超擢黜放者或起為二千石其徒必互相慰勉上荷聖恩雖未命者知牽復可望冬薦官皆叙已用適其輪轅此誠睿慈勤慮獎人於祿也伏惟因而宏之使人人自效昔顏子不二過蘧伯玉知非則明古之賢人皆不能無過在知而改之而已棄瑕獎善用其所長則無廢人此理道之至切也一天下理在百姓安百姓安在賦稅減賦稅減在經費省天下未有不由此塗出也生之者少靡之者多物力既屈人命必蹶大歷中絹一匹價近四千今止八百九百設使稅入之數如其舊出於人者已五倍其多又四方守臣鋭於上獻為國斂怨為身市恩或廣軍實之求而兵有虛籍或倍地征之數而取以多方固非家財皆出於人力者也雖有心計巧歷能商功利者其於困人均也割股啖口莫甚於斯在陛下慮之而已行之而已大易節之說曰天地節而四時成節以制度不傷財不害人伏望俾有司審量入之數節輕用之源無冗食無浮費百事省嗇以俟豐年此一救災恤患之切務也一前史云一時不雨人且狼顧今歷三時矣農之望歲以食為天京師比屋惶惶靡措詩曰先人有言詢於芻蕘古語云愚者千慮時有一得況含齒戴髮斯人最靈伏望俾百執事之人皆得上言利病可者酌而行之否者容而恕之此亦惻隱含宏之大要也以前臣伏以今年饑旱京師艱食聖心憂軫臣下何安臣謂救之者不在於禱求乃在於事實有備者不止於公廩亦在於編人苟懷愚管不敢緘默上煩宸扆事或非宜慺慺血誠所貴無隱不任惶灼隕越之至謹藳手疏以聞臣某誠恐誠懼頓首頓首謹言右山東節將有沃壤利兵三十年間寖以強大或父歿子繼起復臨戎名器雖出於中朝爵地實專於外閫澤潞素為雄鎮礠邢洺與數道犬牙故欲變山東之俗先在擇昭義之帥可以練兵賦循法制鎮以威重扼其咽喉化彼譸張納諸軌度此為樞鍵不可不慎盧從史拔自軍校列於藩垣以先朝含煦之恩積臣以寵祿之重且自建中貞元以來每命一方鎮遂綿歷歲時就加爵秩以至於沒身弔贈自陛下聖澤亭育天威震曜吳蜀底定人神洽和三四年間易置節將出入中外者凡數十輩執介圭不俟駕者相望於道塗而從史宴安自居未著勳績頃來㣥情猶望除代今則因其憂服可以慎選守臣況盧虔以文學至大官歿於闕下以從史之賢自可全儒家喪紀之儀宏聖朝孝理之道以從史非賢則連彳魚亍非人煽結為患貽朝廷憂恐自此始且成德事體與昭義不同衆情以為許成德之請則可許昭義之請則不可以恆冀習俗頗久倘類相因含垢推恩制之以漸故上黨內地未嘗因循失之毫釐利害相萬或者慮苟未受命則勞王師誘劫武人阻拒旬朔臣愚以為凡朝廷計之甚遠大者以來至當倘成命既下不時率道鄰道戒嚴備於境上人各有心必思自效前祕書省校書郎薛貽謀比充從史掌書記去歲懇求罷免歸里京師臣比任禮部侍郎日貽謀進士及第數與相見訪其人情澤潞山東事體貽謀一二詳悉言其恩信不及於下若命將以伐萬無所虞或召貽謀陳奏亦冀少廣聰聽事更淹緩轉失機宜臣備位班行稟性愚魯苟有所見輒披肺肝得於衆多事甚明白不敢緘默上疏上陳無任惶懼懇迫隕越之至謹録奏聞謹奏右臣伏見詔旨以王承宗未稟朝命薛昌朝未赴德州大興師徒以務攻討中外臣庶不任憤激臣伏計數日已來朝官論用兵害者已多臣不敢更引煩詞徒惑聖聽臣今直舉管見二事冒昧上陳一則神策等兵在城中多是市井屠沽庇身軍籍未經戰陳難以成功經途既遠所虞非細或中路潰擾結為萑蒲未至交鋒別有此慮況恆冀馬軍素徑兵數頗多倘淹時月則損威重又西戎淮右闕凶狡多端或乘間犯邊或干紀出境禁衛武備不可頓虛山東猶疥癬也京師猶心腹也不可不深以此為念一則恐須便除成德及德棣兩道節度使則六州之人知有所奉兵交之際各圖自手叐不然則以壤界所接而盡分其地如樂壽博野可以却還瀛州之類使其四鄰各務攻取則人人自戰而恩歸於朝不勞師費則坐翦妖孽此亦必然之理也伏惟陛下憂勞之際臣忝備班行苟有所知不敢緘默無任惶懼懇悃之至謹録奏聞謹奏元和四年十月十七日太常卿權某上奏一自去年十月興師討罪今已半歲未見成功時漸入夏水潦疾病衆心不一主客相懸若更因循必慮潰撓竊聞自出師以來已費用五百餘萬貫物力既屈人心則搖不可不深以此為念一山東諸侯未朝覲者各有息男為副大使其心不相遠孰肯為陛下盡力者耶以陛下神武睿圖掃定吳蜀凡勸陛下討王承宗者雖跡似忠藎其意在於必不成功朝廷懲創遂不問山東之事此其計也一凡舉衆行師須因衆心喜怒王武俊實有破朱滔之勞而地廣兵徑若更淹延挫損轉甚今日中朝公卿大夫之論莫若愛人息衆含垢忍恥沛然下哀痛之詔宥其罪辜若更敗傷則無所及也一若以直赦承宗誠人心所便而師出半歲無功而旋則不若因有制置使衆情有所觀聽如盧從史者誘設陳璀每事逗遛貴出草粟賤收縑帛倚寇為援以邀寵利其間情僞非止一途比於承宗其過實甚今若於在近命行營節度令其倍道兼程度其行至半途授以澤潞然後別命從史京西已來一鎮既離本處巢穴即姦計不行新授朝命寵榮必不慮不至況聞其貪虐人心厭苦有所改更必求悅隨若從史除官及除替并恩宥承宗三道制書同時渙發則衆情感浹成命伏惟試以此為念一軍儲國計仰給江淮江淮旱歉人心日急若連兵不解則憂患非細頃者衆情以淮西三州之地四面勞師費財謂必命帥於朝以正王度昨者已除吳少陽充留後使伏計聖慈必以愛人為心含宏覆育淮西既猶如是即承宗理固不疑但在速耳以前臣自去年四月十五日上奏以欲變山東之俗先在擇昭義帥恐從史煽結為患貽朝廷憂又去年十月十七日上奏以禁軍多市井屠沽未經戰陳倘淹時月則損威重令物情憂駭思竭肺肝以陛下聖德聖姿虛受宏納敢以疏賤上干聰明無任惶懼懇悃迫切之至謹録奏聞元和五年三月二十七日通議大夫守太常卿臣權德輿奏狀古伏準今月十六日敕禘祫之祭禮之大者先有衆議猶未精詳宜更令百僚議限至二十六日內聞奏者臣聞禮有五經莫重於祭祭稱百順實受其福故曰萬物本乎天人本乎祖以太祖始封之重當殷祭東向之尊百代不遷下統昭穆此孝享嚴禋之極制也周自后稷十六代至武王毀廟遷主皆太祖之後故序列昭穆合食無嫌漢之太上皇主瘞於園寢尋置別廟是為屬尊故周漢皆太祖之位正自魏至隋則虛其位魏明帝初以太皇別廟未成故權設對祫後有司定七廟之制太祖以下為昭穆二祧旋至三少帝運移於晉晉不以兄弟為代數故元帝上繼武帝簡文上繼元帝至安帝時然後征西至京兆四府君遷盡未及殷祭運移於宋初永和中疑四府君主所藏之禮詔公卿博議范宣請築一室韋泓請屋朽乃止蔡謨亦請改築別室若未展者當入就太廟以征西府君東嚮議竟不行宋齊梁陳北齊周隋悉虛其位以待太祖皆以短祚其禮不申則自魏以降太祖列昭穆之位非通例也武德中親廟四自宣簡公而下貞觀中立七廟六室自宏農府君而下開元中始制九廟追尊獻祖懿祖故自武德至於開元太祖在四廟七廟九廟之數則東向之虛又非例也廣德二年將及殷祭有司以二祖親盡當遷太祖九室既備其年冬祫於是正太祖於東向藏二主於夾室凡十八年矣建中二年冬祫有司誤引蔡謨征西之議以獻祖居東向懿祖為昭太祖為穆此誠乖疑倒置之大者也議者或引春秋禹不先鯀湯不先契文武不先不窋以為證且湯與文武皆太祖之後理無所疑至於禹不先鯀安知說者非啓於太康之代而左邱明因而記之耶向者有司以二主藏夾室非宜則可闕殷祭非敬則可處東向之位則不可是以貞元七年冬太常上奏請下百僚僉議詔可其奏八年春有于頎等一十六狀至十一年又詔尚書省集議有陸淳宇文炫二狀前後異同有七家之說至於藏夾室虛東向遠遷園寢分饗禘祫加幣玉虞一作虛主而枚卜瘞埋援引滋多皆失禮意臣等細審討論惟置別廟及祔于德明興聖二說最為可據德明興聖之廟猶別廟也等於創立此又易行伏以德明皇帝於舜禹之際與稷契同功契後為殷向五百年稷後為周逾八百年德明流光無窮啓皇運於後景福靈長與天地準又獻懿二祖於興聖皇帝為曾為元猶周人祔於先公之祧也此亦亡於禮之禮者也明尊祖之道正大祭之儀禮文祀典莫重於是凡議同者七狀百有餘人其中名儒禮官講貫詳熟臣於貞元八年蒙聖恩以博士徵至京師屬當會議時與崔警劉執經同狀十一年臣官備近侍不在議中乃今纍叨睿獎獲二宗伯職業所守典禮是司研考古今罄竭愚管豈敢以疑文虛說黷陛下嚴敬重難之心其夾室等五家不安之說謹具條上伏惟聖慮裁擇謹議右太祖已下毀廟主之所藏也今若以二祖之主同在夾室當禘祫之祭代祖元皇帝以遷主合食而二主留在夾室神靈何所依耶或主有禱則祭無禱則止如殷祭何如或云每禘祫時就饗於夾室如合食何此其不可也右自魏晉方有太祖已上府君以備親廟自太祖以下昭穆既列太祖之上親盡皆遷然後正東向之位明不遷之重自魏至隋皆以短歷或遭離多故其禮未行故虛東向自武德後貞觀開元加廟數太祖尊位厭而未申故虛東向今九廟已備代祖已遷而議虛東向則無其例此其不可也右漢魏太上皇處士君園寢之制近在京師故於遷主無有異議今二祖園寢皆在趙州法駕撰儀經途遐遠此其不可也右尊祖敬宗至當無二審禘合饗王者所先議者請常以獻祖受祫太祖受禘五年之間迭居東向就如其說則當祫之時太祖固序昭穆矣當禘之禮獻祖何所依也從古已來無此義例此其不可也右議者引古者貴祖命斂幣玉藏諸兩階之間又埋虞主於廟門外之道左以為比類彼主命幣玉者既反告無所用矣彼虞主用桑者既練祭則無所用矣不忍褻瀆故斂而藏之徹而埋之豈如栗主依神雖廟毀而常存之制哉此其不可也況兩階之間與門外道左皆祖廟也今則下瘞於子孫之廟於理安乎此其又不可也以前謹具周漢太祖居東向魏晉以下虛東向并貞元八年十一月兩度會議一十八狀內夾室等五家不安之說如前謹録奏聞朝議郎守尚書司勳郎中知制誥雲騎尉賜緋魚袋臣權德輿議曰臣聞古宗廟之制前有廟廟列昭穆後有寢寢陳衣冠自秦漢已來始因陵立廟有寢宮便殿雖廟居陵旁而無必在山上不在山下之定制且禮文所貴宜也稱也祀事所資敬也潔也伏以昭陵因山太宗所建宮在山上以便當時自野火延燒行宮山下亦已久矣今若伐木縮板程功就險神道貴靜或非所宜則與置陵之初事體為異況舊制既毀新宮是修考於便地可以經久所謂宜稱也又井泉在下汲引為易享獻之禮是資嚴恭本於明德惟馨亦在吉蠲為饎故禮之言祭也水曰清滌言其潔清滌濯也又曰不敢用常褻味所以交於神明也因茲列井以備薦羞所謂潔而敬也凡舉事必以制度當否為大而以人力勞逸為細若於事為當又無所勞不亦順昭陵愛人之心乎不亦叶陛下從宜之禮乎今列聖寢宮有在山下者矣然則致敬來格之義豈以山上山下為遠近耶臣愚以為但在柏城之內則不云遠陛下精誠慎重詢及庶僚徒獻所聞伏增戰越謹議詩美仲山甫曰剛亦不吐柔亦不茹故體備健順是為全德不然則直已循性能秉一方事舉於中皆理道也得柔之道者為循吏失剛之理者為酷吏司馬氏修史記始作二傳以誡世爾而後以郅都為酷吏傳首愚有惑焉都之為中郎將上欲摶野彘活賈姬從容奏議引宗廟太后之重其為濟南守誅豪猾首惡道不拾遺其為中尉宗室貴臣斂手仄目其為鴈門守胸奴不敢近邊至為偶人像之騎射莫能中然其勇敢氣節根於公廉不發私書不受請寄具此數者為漢名臣入居命卿出總列郡堅剛忠純終始若一坐臨江之嫌當太后之怒身死漢庭首足異處有以見漢氏之不綱王澤之弛絶也蓋在史氏發而明之以旌事君以勵使臣俾百代之下有所懲勸子長既首冠酷吏班氏又因而從之善善惡惡之義於此缺矣夫椎埋沉命舞文巧詆之徒自為等夷雜列篇次至於述贊雖云引是非爭大體又何補焉噫嚱洪範之沉潛大易之直方皆臣道也都雖未蹈之斯近之矣不隱忠以避死不枉道以蒞官無處父之華異申棖之欲所至之邦必以稱職聞其古之剛而無害怒而中節者歟剛似酷弱似仁在辨之不惑而已天下似是之為失多矣豈獨是哉開卷之際恍然有感且以司馬氏班氏皆良史也猶不能辨故為論之豫讀東漢史至彭寵舉兵手叐薊城自為燕王蒼頭子密等因寵獨在便室臥寢遂共殺之以其首詣闕封為不義侯愚以為非先哲王封賞之本旨也遂作議云先師曰惟器與名不可以假人又曰必也正名乎又曰惟則定國於戲有國者可不務乎當東漢世祖之初天命再集宜於此時貞百度正三綱纂修德教允答天意時彭寵以南陽舊恩位列上將有舉漁陽之功饋邯鄲之忠意以讒謗獲罪反側怨望遂攻朱浮於薊自稱燕王其時師旅孔熾元元苦甚時君宜以息人紓難為心則當録念功用昭洗瑕穢次則布之威懷革其非心必不得已則仗大順以討之出王師以征之以明君君臣臣之義此三者皆不能用或用之而不能盡及夫蒼頭子密有便室之逆運其狙忍同其臥寢遂使命懸僕隸倉卒授首及詣闕也封為不義侯愚以為伯通之叛命子密之戕君同歸於亂罪不相蔽各宜致於法昭示王度反乃爵於五等又以不義為名且舉以不義則莫可侯也此而可侯漢爵為不足勸矣春秋書齊豹盜三叛人名之義無乃異於是乎且如欒布之哭彭越孔車之葬主父使於東漢議罪罪孰甚焉況四方甫定傷痍未復不稽古訓以喜怒為刑賞使天下陪臺厮養各幸其君之亂而徼侯印授諸侯危疑之勢鼓臣下叛渙之源棄名器而汨彞倫且以憲令為戲時風浩浩蕩而不復至使桓靈不君山陽脅奪本其所自庸詎知非封不義侯之效歟南門之外禮月與四瀆於北門之外禮山川邱陵於西門之外注云變拜言禮容祀也疏云拜無祀言禮則兼拜也恐減至於銷失進之義以前奉進止令常參官商量合拜不拜直書其事者臣謹按儀禮禮記等議條例如前伏惟開元禮嶽鎮海瀆每年以五郊迎氣日祭之時旱則祈於北郊及有所祈之禮獻官皆再拜祭以接神拜以成禮稽考今古並無不拜之文風伯雨師本皆小祠天寶中始升為中祠貞元初陛下又以事切蒼生屈已再拜況嶽鎮海瀆能出雲為雨故祝文有贊養萬品阜成百穀之言國朝舊章諸儒損益伏請以開元禮祭官再拜為定其諸神龍毗沙門神等在禮無文今則咸秩遣使致祭推類相從諸神龍準五龍壇例毗沙門神準四鎮山例並主祭官再拜請依太常寺狀為定謹議議曰獨孤及剛方直清根於性術其修身蒞官確然處中立言遣辭有古風格辨論裁正昭德塞違濬波瀾而去流蕩得菁華而芟枝葉其摳衣入室之徒皆足以掌贊書而秉方冊則及之為文可以徵矣其為博士時有上議景皇帝不宜為太祖者詔下庶官及舉夏殷周漢之故事尊祖配天之大旨以為景皇始封於唐天所命也於是定議為一代典法新平長公主之子裴倣尚永清公主欲以他族主婚及時相禮上陳不可竟得以裴僕射遵慶為主當時稱之定呂諲盧奕郭知運之諡用禮文憲度得褒貶之正凡所往復詞旨堅明其理舒州屬歲饑旱鄰郡庸亡什四已上而舒人生聚悅安不知凶年優詔褒異就錫金紫其初在濠其後在常皆因俗為理人用愛戴雖不得居公卿長帥之任然其奉常議論三郡績用亦足以列於文苑附於循吏按諡法曰博聞多能曰憲獻可替否曰憲及酌三王四代之典訓作為文章以輔教化是為博聞位參中外必以稱職聞是為多能定宗廟之饗為獻可正婚姻之主為替否有司稽美行而易其名者請諡及曰憲謹議議曰李揆端莊粹溫潔廉淑慎用文章術學資適逄時奮其英華以取貴達如良庖投刃無復肯綮歷諫曹左史司王言二春官以至於平章大政在帝左右必以文誼藩身奉法遵職官曹無秕政姻族無幸人束帶山立敷陳前志儼然而溫有碩儒大臣之度或起或廢其道甚夷昔觀射父能作訓詞以行事於諸侯左史倚相能道訓典以叙百物揆實有之建中中西戎乞盟以舊齒宿望將命殊俗結華夷之信董衣裳之會已事回車歲當興元匪躬靡盬至河池而歿追錫司空恩禮有加按諡法曰率事以信曰恭不懈於位曰恭揆果行求已致位台司歷官陟降十有八次周旅敬慎以揚職業不曰率事以信乎及逾懸車之年奉絶域之使受命即路視險若夷貞厲盡瘁復於左轂不曰不懈於位乎昔韋元成翟方進以經明為漢相而皆諡曰恭迹揆所履節以一惠勤官死事炳然昭明有司易名請以恭諡謹議
