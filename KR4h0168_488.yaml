  - {type: head, offset: 6779, content: 儀禮覲禮曰天子出拜日於東門之外禮日於, id: KR4h0168_NFKB_488-h19, level: 2}
  - {type: head, offset: 6823, content: 右明祭四瀆山川邱陵皆有拜, id: KR4h0168_NFKB_488-h20, level: 2}
  - {type: head, offset: 6823, content: 禮記王制曰五岳視三公四瀆視諸侯注大視其牲器之數疏云牲幣粢盛籩豆爵獻之數非謂尊卑也, id: KR4h0168_NFKB_488-h21, level: 2}
  - {type: head, offset: 6823, content: 右明五岳四瀆下與公侯同尊卑, id: KR4h0168_NFKB_488-h22, level: 2}
  - {type: head, offset: 6823, content: 禮記禮器曰一獻質三獻文五獻察七獻神注云質㣥小祀也文社稷五祀也察四望山川也神先公也, id: KR4h0168_NFKB_488-h23, level: 2}
  - {type: head, offset: 6823, content: 右明山川之獻重於社稷今太社先農皆拜, id: KR4h0168_NFKB_488-h24, level: 2}
  - {type: head, offset: 6823, content: 禮記樂記云禮主於減樂主於盈禮減而進以進為文樂盈而反以反為文禮減而不進則銷樂盈而不及則放注云減人所倦也進謂勉強文也, id: KR4h0168_NFKB_488-h25, level: 2}
