  - {type: head, offset: 5490, content: 右奉進止寢宮在山上置來多年曾野火燒爇摧毀畧盡其宮尋移在瑤臺寺左側今屬通年欲議修置緣舊宮本在山上元無井泉每緣供水稍遠百姓非常勞弊今欲於見住行宮處修造所冀久遠便人又為改移舊制恐所見未周宜令中書門下及百寮同商量可否聞奏, id: KR4h0168_NFKB_488-h15, level: 2}
