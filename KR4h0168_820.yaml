front:
  text: 全唐文欽定全唐文卷八百二十安節太常少卿成式子乾寧中為國子司業
  hash: sha256:14ae43c696d77ba4a5be66961bbee016107682a3e9b29f795dab340ba242a16e
  markers:
  - {type: head, offset: 13, content: 段安節, id: KR4h0168_NFKB_820-h1, level: 1}
body:
  text: 爰自國朝初修郊禮刊定樂懸約三代之歌鐘均九成之律度莫不韶音盡美雅奏克諧上可以籲天降神下可以移風變俗也以至桑間舊樂濮上新聲金絲慎選於精能本領皆傳於古老重翻曲調全袪淫綺之音復採優伶尢盡滑稽之妙洎從離亂禮寺隳頹簨簴既移警鼓莫辨梨園弟子半已奔亡樂府歌章咸皆喪墜安節以幼少即好音律故得粗曉宮商亦以聞見數多稍能記憶嘗見教坊記亦未周詳以耳目所接編成樂府雜錄一卷自念淺拙且直書以俟博聞者之補茲漏焉邰字希韓明州奉化人乾寧中進士累遷左拾遺朱溫篡虐隱遯奉化山著書但紀甲子以示不臣之義越中山水名於天下山寺雲門法華又名焉嘗憶北海遊越越帥日率從事樂妓酒饌訪北海北海不樂因曰某久住此蓋為雲門法華二寺今日攜酒樂大似方便發遣越帥乃己此出孫相公譜書譜書是顏魯公作又見朱訪詩曰長憶雲門寺門前千萬峯邰嘗居越中每吟此詩未遊二寺嘗以為過上人名僧也又遊名寺前欲遊天台今遊雲門法華二寺乃知靈鵲不之蓬島則在青田有異凡禽遊不擇地別上人怏怏因為序送之春秋列國周之諸侯受周之封分為五等五等之下臣為陪臣陪臣於諸侯君父也諸侯於周王亦君父也陪臣於周義猶大父也夫為人子之道孝於父者必欲父孝於祖陪臣忠於諸侯者必欲諸侯忠於天子則上下有序康乂四方今春秋陪臣張公室侵王室弱周以強諸侯是弱祖而強父佐諸侯而敵周是佐父而敵祖遺祖之怨成父之逆惡莫大焉言之於臣則非忠語之於子則非孝論之於道則傷義推之於情則辜恩遂使姬周削弱祀號而已桓文雖以為霸何能正之反有封禪請隧之僭管晏雖有其功何能諫之而有反玷毀孔之惡於時風教大壞海內焚如天不能陰隲下民降大聖以為木鐸歷國七十餘說而不遇奔走齊魯宋衞之郊反若喪家之狗知不可訓慮後世不知懼乃修春秋明向背其有甚者或夷之或狄之弒君三十六亡國五十二奔走失社稷者不可勝紀書曰帝乃震怒致令海內無一嘉祥但有妖怪謂春秋亂世豈不誠然于時人不堪命何耶無賢臣也予謂此論警眾士大夫多稱之遂聞鬷嘏鬷嘏徵而奇之或謂可刊金石訓乎今後既而喧傳則有難僕曰春秋豈乏賢者子謂之無激之耶鮮之耶柰乎孔門何曰孔門仕者鮮又家臣耳子不讀聖賢書乎易云屯其膏小貞吉大貞凶春秋之大夫小貞耳盍以大貞取之以王道取五霸猶罪人周成王定鼎於郟鄏卜世三十卜年七百夫帝王括囊宇宙位重優崇天生利民非樂兆民之上故君民者遇夫聖則禪之不遇則以子繼之堯之於舜舜之於禹禹之於子是以周都天地之中欲便四方之會不恃山河務從德化原其意也在乎利民豈異唐虞之道而反卜年卜世耶必也欲永其祚莫先德義貽厥後世天人祐之豈非無窮也哉何三十七百年世之有若右其卜而左其德俾乎厥後恃年世之永久必輕乎德義若此之謀非君子之道也昔太戊懼烖而盛帝辛恃瑞而亡在此不在彼豈不知之而卜年卜世者乎先生新安人字雄飛章八元即先生外王父也廣明中和間為律詩江之南未有及者始謁錢塘守姚公合公視其貌陋初甚侮之坐定覽卷駭目變容而歎之先生一舉不得志遂遯於會稽漁於鑑湖與鄭仁規李頻陶詳為三益友弟子宏農楊弇釋子居遠及卒弇編其詩請舍人王贊之為序贊序云張祐升杜甫之堂方干入錢起之室云融字子華越州山陰人龍紀初及進士第累遷侍御史坐累去官召為左補闕以禮部郎中為翰林學士拜中書舍人進戶部侍郎鳳翔劫遷融不克從去客闅鄉俄召還翰林遷承旨勿謂乎柔而無剛土埏而為瓦勿謂乎廢而不用瓦斷而為硯藏器蠖屈逢時豹變陶甄已往含古色之幾年磨瑩俄新貯秋光之一片厥初在冶成象毀方效姿論堅等甓鬬縹勝瓷人莫我知是冬穴夏巢之日形為才役乃上棟下宇之時扶同梓迴避茅茨若乃臺號姑蘇殿稱枍栺樓標十二之聳閣起三重之麗莫不瓴甋凝輝鴛鴦謺勢縫密如繅行疎若綴銜來而月影重重漏出而爐香細細觚稜金爵競託岧嶢玉女胡人爭來睥睨陵谷難定松薪忽焉朝歌有巳秀之麥咸陽有不滅之煙是以縱橫舊址散亂荒阡風飄早落雨滴仍穿藏瀰迤之春蕪耕牛脚下照青熒之鬼火戰骨堆邊誰能識處亦莫知年何斯邂逅見寵雕鑴資乎有作備我沈研磬在水以羞浮鐘因霜而謝響玉滴一墮松煙四上山雞誤舞澄明之石鏡當頭織女疑來清淺之銀河在掌異哉昔之藏歌蓋舞比日干霄繁華幾代零落一朝委地而合隨塵土依人而却伍瓊瑤天祿石渠和鉛即石風臺雪苑落筆爭邀依依舊物歷歷前朝沈家令坐上回看能無淚下江中書歸來偶見得不魂銷有以見古今推移牢籠渺漫成敗皆分短長一貫何樹春秋各千年何花開落惟一旦星隕地以為石盡滅光輝雞升天而上仙別生羽翰異類猶然浮生莫算域中公子問於方外先生曰蓋聞水之大也下環乎地上浮於空無象無邊夷猶洪濛百派千流皆歸於東何巨溟之深也萬古能容何九州之高也不淪其中先生曰渾沌死乾坤始東西傾川澤委帝乃慮海旁溢俾山中峙復孕以火用銷其水此沃焦之為義真帝之元旨者也請言其狀也巉乎崪乎赫曦乎翕赩乎陰陽熾炭天地開鑪景風鼓吹赤帝規模成於妙有拔彼虛無處冷能熱雖燔且濡於律則黃鐘取法在易則既濟相符岥山㐌兮壓海萬里鴻洞兮烘天一隅液馮夷軋天吳鱗介既難以潛伏草木安得其芬敷巨靈不能擘畏其爛手愚公不能移憚其焚軀靈漲疑竭大室若枯爾其水之來也浩浩爭奔滔滔不住蹴嶽堆阜跳天沃霧暘谷無地扶桑失樹雷奔潮走雪飛洙聚吞吐造化浮沈朝暮一歸墟之積積既久而還盈一尾閭之洩洩不供而旋注苟彼不為煎熬何物當其委輸公子曰夫萬物之是非也當務所見無矜所傳不見五嶽各司一邊蟠地極天吐雲含烟玉石產其下豫章森其巔高高下下綿綿聯聯方面是傳祀典是先故無事則備王者之巡遊焉有事則為國家之關防焉彼沃焦者存耶亡耶不知夫去中國幾千其說何邇其功豈然先生曰古不可以今論遠不可以近識至於先賢先聖有功有德或始火化或始粒食或衣裳兆民或棟宇萬國其人豈見其道何極但日用而不知固神化之難測抑又人之為意見頻則不怪聞數則不驚只如踆烏元兔迭代虧盈迅雷烈風無形有聲北冰不泮南雨無晴方諸向月而水出陽燧映日而火生鶴知半夜雞辨五更螟蛉化而蜾蠃負洛鐘鳴而蜀山傾譚如詭妄騐乃彰明儻非目擊皆必力爭如沃焦者茫茫靄靄存於物外屹溟漲以獨立無邱陵之相帶何地能勝帷夭粗葢堯災是弭禹功是賴但以遠而不見貴以近而不見大何異乎曾參冠百行之首出四科而不載姬旦有再造之功為三監之相害有以見深藏若虛明道若昧只如高稱日觀靈號天孫魯瞻所重亠兊鎮攸尊能攻善惡業召精魂何盜跖壽而幸何顏回夭而寃何富慶何貧原靈獸出何遭羇縻之困海鳥來何獲鐘鼓之喧觀其倒置孰為司存又如太華隱嶙上五千仞碧蓮若鍤高掌如奮然而設關太束為城太峻苟一夫可守四塞可鎮終使險易恃而固易憑而令驕易生而荒易徇懼則能安逸則成釁又如嵐浮紫葢秀擢朱陵北渚下壓南箕上承然而聚鬱蒸限嚴凝鴈不可度人何以登其禍聖賢也則帝舜之遊不返昭王之死無憑其殃忠讜也靈均有葬魚之痛賈誼有占鵩之徵是非不辨正直何稱徒聞金簡玉書以為貺九向九背而自矜又如幽并之墟畢昴之位岧嶢之上磊落相次然而藏趙符於上成無恤之不義產燕璧於中假慕容之神器大蛇蜿蜿兩頭何異嘉穀薿薿五穫何利旁扶跋扈之黨坐索彤弓之賜胡不懲革而令馴致又如據天地之中央潤河洛之流光岧亭壁立壓謺屏張而能降神表瑞呼歲呈祥控臨諸夏標準四方若乃陳蕃竇武一時忠良為國除害其謀乃臧不獲天助翻為賊戕劉聰劉曜恣意焚傷衣冠草莽宮闕犬羊俯折地軸仰絕乾綱漢陽九以遽畢晉南渡而尋亡曾何固護自倚青蒼月裏開宮但容童子雲中捻管惟引鳳凰吁其拙哉彼五嶽者長未一分短以盈尺論名則大責實何益封公封王用珪用璧邃宇崇館朱殷粉白然識者視之何異沐猴而冠牽牛負軛者耶其次則有非方非嶽亦怪亦神崑崙則樹珠田芝蓬萊則闕金臺銀周王迷之於轍迹漢帝感之於禮禋荊山美玉獻不遇君隴山鸚鵡語或陷人嶰谷有竹慘舒不均嶧陽有桐清濁難分姑射何靈如冰如雪巫山何感為雨為雲怪山何怪飛來至越慶山何慶湧出於秦若然則遠者近者大者小者如沃焦之功實冠於天下何以名耶至於南面巍巍安尊定卑建邦設都來蠻走夷其為武也有干戚鈇鉞其為文也有俎豆罇彞齊紈越絮暖必如斯周禾溫麥飽必以時胎化卵育手捉足馳其奉生也有歌鐘管籥其事死也有棺槨幌帷詒子詒孫固本崇基苟懷襄之不止皆墊溺以何之若然者不惟九土潰而全墮抑亦三光蕩而崩離則堯舜禹湯之道沒不傳矣周孔揚孟之文又安存斯况又上無灌木誘良工之斤鑿下無靈鼇招巨人之釣索不栖翠羽飾綺被之彩錯不孕明珠供魏車之照灼不滋金鐵起兵交惡不穴鱷鯨吞舟恣虐吉凶莫知威福寧作誰衒肸蠁誰藏冥寞所以貞珉翠炎却絕罔錄桂湯蘭肴何嘗約畧固不復邀物以白犬白雞媚人以靈草靈藥但超世以崔嵬為普天之銷鑠於是公子吅丂一然如失起而謝曰儵忽之神能鑿人耳目俞盧之術善治人膏肓向者聞眾人之論浩然若涉津之無梁今也聞吾子之論㸌然若披雲霧而覩太陽恨不能凌風雲乘混茫快意極觀勒銘其旁噫有名之祀所在感彰至於山魅射影水弩為創鴟夷鼓怒耕父激揚皆霑沃酹不乏馨香何茲山也橫絕於萬代不遇於百王將無時如孔子豈獨行於務光近者泰階未平四郊多壘貳負尚活三苗未死水仙則多陷齊人米賊則半驅妖鬼室散機杼田拋耒耜郎官困採橡於野將卒貧鬻薪於市霧足妖興雲多陣起既走㣥望猶懸帝祉豈褒崇之漏彼致災害之如此方今封有功而爵有德小不遺而大寧弛蓋九重之深執事者未聞於天子海之大也吞乎百川百川不停也海將溢焉伊元化之相制屹崇山之暗然不知乎何代凝結沈潛積熱廣陂陁高截嵲燄止不死煙生莫絕曈曨兮想二氣之爐中烈沸涌兮疑九州之鼎下爇當長鯨之鼓跳此歘爾以潛銷雖巨鼇之噴躍亦倏然而盡鑠滲若一空呀如四涸得非火井通其腹且孰問其穿鑿當是燭龍蟠其根又誰覩其照灼但耗溟渤自橫寥廓莫不屹屹崇崇燖虛燥空向曙而晴霞助赫連宵而陰火相烘如欲以煆鮫室災龍宮雨露既難以澤草木安得而豐遂使乘槎之人莫敢沿洄其側銜石之鳥無因栖息於中是知陰陽之變也本自相形動靜之用也歸於相養苟喬岫之無作則柔祇而必蕩若然者堯之水不止於九年之多禹之功難均乎四海之廣彼稱神稱仙者有十洲之繁封公封王者有五嶽之尊縹緲而雲霓自爍崢嶸而日月爭翻徒充覆載莫補乾坤曾未如千仞獨高眾流皆委非煎熬之不怠則墊溺而何弭所在雖遠厥功難弛有能光祀典於吾唐宜褒崇於此志或可奪道則難堅嘉碎琴之志操見伊人之道全稟正固以不㣥德無踰也表行藏而自若理亦宜然武陵王好彼正聲戴安道臻於是藝王雖欲見其搏拊戴且無忘於砥礪苟為伶者稽素履以全隳爰對使乎抱明誠而立誓乃曰鏗爾奇韻泠然雅音自得以宣情理性非為彼養氣怡心不同乎鄒忌干齊將希高位又異乎鍾儀懷楚歎寫幽襟於是發忿譸張興言激切脫徇爾志寧彰我節可恥於朱門紫闥俛首趦趄因投其玉軫金徽當階迸裂嗟乎宮商倏絕道德彌高此終身而不辱彼側席以徒勞異季倫之擊珊瑚自矜驕逸狀亞父之撞玉斗威振英髦得不金石推誠風霜勵志冀禮餘而有守顧陽柯而忽棄豈可荒涼吾道捨行歌自逸者餘芳趨競王門與鏗吹偷安者同位則知微世遺榮居然獨清秉大節以難屈操壯心而不傾匪擅一時之譽終流千載之名伯牙絕絃但證知音之道子猷擲地惟傷同氣之情人貴在秉時忘乎所履爭附勢以求媚豈韜光而叶美愚嘗慕彼操持嘉其行止恐孤風之不振因賦茲而有以門下朕聞王茂宏官在治中己恭佐命謝安石身為相掾常切憂時後果俱秉國鈞克諧人望忠誠懿烈焜燿冊書孰謂我朝鍾茲丕運厥有佳士龍興壯圖植勁草於衷腸繫苞桑於宗社特立當代何慚古人將表至公爰申異渥具官王搏霜高一鶚玉拔孤峯孕和煦於情田自華而實道縱橫於義路無往不通蘊是淑聲居然上品縶駒塲裏早颯清塵振鷺行中難究逸翰踐揚三署橫絕一時實名教之丹青乃縉紳之領袖昨者朕失遵王度致降天災釁起蕭墻幽加洊而賴能謀於上相說彼中權反正乘輿肅清輦轂疇其中節雖已擢於禁林惜此奇才難久畱於誥命豈在凝神軒夢問兆周畋用之不疑命以爰立既調金鉉仍總版圖必務豐財以資經費於戲爾前未達則能有奮於時此後所行不宜苟安於位獻可替否滅私徇公慎保初心勿孤大任門下夫天有星辰為之綱所以保乎乾健地有山嶽為之鎮所以定乎坤柔故王者托夾輔之臣資股肱之任安危所係動靜是憑其在周也則姬公盡心於經營其在漢也則絳侯竭力於匡贊惟天所相何代無才厥生英賢為我柱石拯茲艱運樹彼洪勳欲示褒旌爰加徽數具官某三光結粹一氣融精合鸞鳳之正音動諧律呂有麒麟之逸足超出塵埃抱鐵石於寸心棲雪霜於勁節倜儻恢廓深沈溫雅允為王國之珍實稟人生之秀自岐陽振節隴右成功虬騰周翰之間鶚立漢壇之上弓鳴霹靂劒躍蜿蜒指揮而川陸可回叱咤而風雲立變一居右輔累復皇都殊庸已煥於旗常嘉頌早傳於金石昨妖興肘腋釁起宮闈而能憤激衷腸密施籌畫致禁軍之貔武戮當路之豺狼安宗社於綴旒復乘輿如反掌人祇共慶華夏同歡既而仗瑞節以來朝秉桓圭而展敬靜與之語簡而有常動叶生知克符中道披肝露膽皆本於至誠言發涕零必期於盡瘁感通天地激動人臣得不嘉乃奇功申茲異渥表爾優崇南省統率六宗尊大西郊封超五等在常時而難舉非盛烈而莫當傑立㣥倫光流萬代勉行朝奬敬答天休可守尚書令兼侍中仍封岐王餘官勳並如故門下夫捍大患者必見危致命立奇功者乃知幾其神苟非憤激於衷義形於色則安能彰明大節果斷一時正垂象以迴天決浮雲而出日惟人所至何代無才既得忠賢卓然超異宜加寵數用激人倫具官孫德昭河右英才山西勁氣通白猿之劍術得元女之兵符振跡和門登名勇爵非義不服惟忠是圖克揚羽衞之事功罔墜先人之職業朕一昨釁生不測禍起非常儲皇因逆黨脅從大寶為渠魁搖動萬乘幽辱兆民震驚爾能首唱義師力扶王室率貔武於重城之內戮鯨鮑於兩觀之前出予榛之前復我當陽之位今則皇綱反正天性如初議臣誠則冠彼㣥倫語將畧則高於一代是用授之旄鉞帖以鈞衡既兼保傅之崇仍益井田之廣階升一品職重六都誠謂殊榮未酬忠力勉圖終始用保休光門下古之命將也推轂以示其優恩設壇以彰其異禮蓋付以生殺之柄授其制臨之權用為翰藩以固疆土北馳柳塞南控金河欲淨烟塵必資心膂既俞公議爰命誠臣某官隴右良家山西茂族稟風雷之勁氣挺鵰鶚之雄姿自名冠伍符身登勇爵孔明八陣列於胸中呂望六韜懸於掌內况早專畱務甚洽政聲帝澤皇風嘗聞其導達殊方異域悉致其懷來耕農不廢於三時凋瘵盡蘇於一境夫賞功所以華國貴不踰時旌善所以勸人務將致理是用委之玉節寵以牙璋仍加五等之封更厚一成之賜於戲爰自多難常思勳臣期於倚注之間能濟艱難之運然則未富土地者我富之以土地未貴節旄者我貴之以節旄苟懷報上之心宜顯為臣之道勉膺重寄善立奇功山河在前終始無替門下武惟靖亂文以守成蓋自昔之通規亦當今之令典况地連隴蜀城控邊陲久息戰爭近經惠養思繼前政用安一方爰屬僉諧得茲人傑某人學富縑緗文輝組繡有經濟安時之術負恢張出世之才加以立性端方操心勁直臨事罔思於擇利當官每切於推公以是淑齊居為理具將重其選孰與之先昨以邠土奧區逾時闕帥俾專旗鼓用息烽烟而屬十郡未臨三軍獻狀既聞陳請須議改移今復以成紀巨藩仇池善地將圖靜鎮乃易麾幢不離空土之崇增以列侯之貴仍加食采更重登壇於戲制獷悍者須用其至公撫疲羸者無先於不擾非仗忠誠兼資廉潔則何以副吾乃睠之憂慰彼倒懸之急勉圖終始無忽重難敬之戒之服我休命門下武惟靖亂文以守成二者相須百王不易眷彼左蜀實惟奧區分襟帶於銅梁束咽喉於劍閣久厂田坴兵革今靜烟塵當疲瘵息肩之初是循良為理之日不推舊德何撫新邦式副僉諧爰申寵數具官劉崇望文舍大雅道茂中庸藹玉燭以舒和挺金相而稟秀閨門密行每垂範於縉紳朋友推誠自可期於風雨蘊是休稱居為令人洎踐歷清華敷揚典誥迫於公議委以國鈞而能上宣三光下遂萬物臨事而曾無辭遜操心而惟務和平尋於東土多虞徐方擇帥乃兼金鉉付以牙璋爰自罷歸累更寒暑既經多難彌振居聲今以庸蜀休兵梓潼無事俾銜專命往慰蒸黎而中外㣥情朝廷所屬皆言重寄可委當仁是用寵以麾幢授之方面進升揆路仍假台司且彰倚注之深更示統臨之重於戲汝當為吾輔相吾固熟爾訏謨舉必推公動能克已今欲推公則莫若無黨克己則在乎不貪勉副前言更彰後効無忘敬戒以保厥圖臣某言臣伏見今月九日中書門下宣示百官西內池中嘉蓮圖其蓮一本兩花者臣聞明聖有作天人合應既彰化本必降祥符即事而推昭昭可見伏惟陛下儲精要道憂濟㣥方致理大同猶懼不至所以恢宏聖教資福生靈元造感通嘉瑞屢降况茲菡萏儒釋同稱經文但喻乎淤泥詩人待歌於彼澤豈比夫耀銅池誇玉井傳芳丹禁濯影清流特聳孤莖以表清淨之源一致對敷雙萼是明內外之教齊興天雖不言假物明意臣仰披圖牒逖覽古先豈無禎祥莫此昭著望雲就日徒深忭躍之誠舞德歌功何報恩私之重無任忭賀慶躍之至前件人俱無顯遇皆有奇才麗句清辭徧在時人之口銜冤抱恨竟為冥路之塵但恐憤氣未銷上冲穹昊伏乞宣賜中書門下追贈進士及第各贈補闕拾遺見存明代惟羅隱一人亦乞特賜科名錄升三級便以特勅顯示恩優俾使已升冤人皆沾聖澤後來學者更厲文風夫詩之作者善善則詠頌之惡惡則風刺之茍不能本此二者韻雖甚切猶土木偶不生於氣血何所尚哉自風雅之道息為五言七言詩者皆率拘以句度屬對焉既有所拘則演情敘事不盡矣且歌與詩其道一也然詩之所拘悉無之足得於意取非常語語非常意意又盡則為善矣國朝為能歌詩者不少獨李太白為稱首蓋氣骨高舉不失頌詠風刺之道厥後白樂天為諷諫五十篇亦一時之奇逸極言昔張為作詩圖五層以白氏為廣大教化主不錯矣至於李長吉以降皆以刻削峭拔飛動文彩為第一流而下筆不在洞房蛾眉神仙詭怪之間則擲之不顧邇來相斆學者靡漫浸淫困不知變嗚呼亦風俗使然君子萌一心發一言亦當有益於事矧極思屬詞得不動關於教化沙門貫休本江南人幼得苦空理落髮於東陽金華山機神穎秀止於荊門龍興寺余謫官南行因造其室每談論未嘗不了於理性自是而往日入忘歸邈然浩然使我不知放逐之感此外商搉二雅酬唱循環越三日不得往來恨疎矣如此者凡朞有半上人之作多以理勝復能創新意其語往往得景物於混茫之際然其旨歸必合於道太白樂天既歿可嗣其美者非上人而誰丙辰歲余蒙恩詔歸與上人別袖出歌詩草本一曰西岳集以為盡矣竊慮將來作者或未深知故題於卷之首時己未歲嘉平月之三日維光化四年歲次辛酉正月乙酉朔十五日己亥皇帝臣稽首大聖祖高上大道金闕元元天皇大帝伏以時當獻歲節及上元爰命香火道人煙霞志士按科儀於金闕陳齋醮於道塲伏願大鼓真風潛垂道蔭俾從反正永保無虞四海九州干戈偃戢東臯南畝皆獲豐登冀與兆人同臻介福謹詞大風吹海海波淪漣涵為子文無隅無邊長松倚雪枯枝半折挺為子文直上巔絕風下霜晴寒鐘自聲發為子文鏗鏘杳清武陵深川長晝白間為子文渺茫岑寂豕突禽狂其來莫當雲沈鳥沒其去倏忽膩若凝脂軟於無骨霏漠漠澹涓涓春融冶秋鮮妍觸即碎潭下月拭不滅玉上煙賀祕監東歸會稽霧隱霞棲派鏡湖水作沼鑿石簣峰為梯歎非雌雉畏其雄雞東臯子無鄉不醉漆園吏有物皆齊孔子悠哉顧龜印以尋解翟公何爾羅雀門而更題一日害欠口層軒幔素壁攘袂高下飛文絡繹風雨隨生魚龍互擲濤奔浪走中秋逢犯斗之槎月上雲開半夜見隕天之石狂兕無㣥離鴻一隻橫魯陽揮去之戈樹呂布射來之㦸援毫既罷悅目忘疲滿堂生金石之寶出世掩鬼神之奇日落簾捲山掩枕欹雲情自遠鶴態難羈但將徤筆以為適豈待閑人之見知邈矣清風茲焉仰止今觀上士之殊萟可繼伊人之逸軌當時芸閣猶於富貴浮雲此日桑門得不塵埃脫屣敬瑄田令孜兄少賤為餅師得隸左神策軍令孜為護軍中尉敬瑄緣藉擢左金吾衞將軍檢校尚書右僕射西川節度使黃巢亂僖宗西幸敬瑄迎謁綿州進檢校左僕射同中書門下平章事加檢校司徒兼侍中封梁國公再進兼中書令封潁川郡王賜鐵券恕十死巢平進潁川王檢校太師俄令孜得罪敬瑄被流端州不奉命會昭宗立召為左龍武統軍以宰相韋昭度代領節度敬瑄募軍自守時王建盜據閬利令孜召之敬瑄不納建自請討敬瑄贖罪詔暴敬瑄罪削官爵授建節度使以昭度為行營招討使討之成都破建囚敬瑄累表請誅不報陰令左右告其謀反斬之皇帝陛下稽古順天應圖撫運凝懷至道屬相大同是用省方以明罪己深仁旁達於下土至德昇聞於上元符讖永臻禎祥間出降太上匡扶之命靖中和寇孽之災迺示明文爰形古篆足表妖氛即殄聖壽無疆克知攸復之期便是清寧之日伏以上聖誕膺寶命丕纂鴻樞自出震以來至御乾之後何嘗不納隍在慮馭朽勞思惠布寰區恩覃動植雖志期清凈而運偶艱難旋屬盜據宮闈毒流士庶震驚宗廟沸蕩山川是用勞天步以禳災幸蜀都而罪己伏賴元祖垂祐靈符降祥垂六字之明文表千年之聖祚今則果潰元惡爰收九重指鳳闕以非遙返鑾旂而有日臣虔奉綸旨精按科儀投玉版以陳詞潔金壇而備醮伏冀㣥真効祉大道垂休蕩邪㤅於六天掃妖氛於九有保安社稷永息兵戈即仰荷大道覆育之恩愚番禺人咸通初官監察御史商州刺史桂管觀察使召為禮部侍郎掌嶺南西道節度使終尚書左僕射天下之言道術者多矣各用所宗為是而五常教化人事不外於性命精神之際史氏以為道家之言故老莊之類是也其書具存然至於盪情累外生死出於有無之間煚然獨得言象不可以擬議勝妙不可以意况則浮屠氏之言禪者庶幾乎盡也有口無所用其辯巧歷無所用其數愈得者愈失愈是者愈非我則我矣不知我者誰氏知則知矣不知知者何以無其無不能盡空其空不能了是者無所不是得者無所不得山林不必寂城市不必喧無春夏秋冬四時之行無得失是非去來之蹟非盡無也冥於順也遇所即而安故不介於時當其處無必故不跼於物其大旨如此其徒雖千百得者無一二近代言之者必有宗宗必有師師必有傳然非聰明瑰宏傑達之器不能得其傳當其傳皆是時之鴻龎偉絕之度也今長沙郡西北有山名大溈蟠林穹谷不知其嵐幾千百重為熊豹虎兕之封虺蜮蚺蟒之宅雖夷人射獵虞迹樵甿不敢田從也師始僧號靈祐福州人笠首屩足背閩來游菴於翳薈非食時不出凄凄風雨默坐而已恬然晝夕物不能害非夫外生死忘憂患冥順天和者孰能與於是哉昔孔門殆庶之士以簞瓢樂陋巷夫子猶稱詠之不足言人不堪其憂以其有生之厚也且死生於人得喪之大者也既無得於生必無得於死既無得於得必無得於失故於其間得失是非所不容措委化而已其為道術天下之能事畢矣皆涉語是非之端辯之益惑無補於學者今不論也師既以茲為事其徒稍稍從之則與之結搆廬室與之伐去陰黑以至於千有餘人自為飲食綱紀而於師言無所是非其有問者隨語而答不強所不能也數十年言佛者天下以為稱首武宗毀寺逐僧遂空其所師遽裹首為民惟恐出蚩蚩之輩有職者益貴重之矣後湖南觀察使故相國裴公休酷好佛事值宣宗釋武宗之禁固請迎而出之乘之以己輿親為其徒列又議重削其鬚髮師始不欲戲其徒曰爾以鬚髮為佛耶其徒愈強之不得已又笑而從之復到其所居為同慶寺而歸之諸徒復來其事如初師皆幻視無所為意忽一二日笑報其徒示若有疾以大中七年正月九日終於同慶精廬年八十三僧臘五十五即窆於大溈之南阜其徒言將終之日水泉旱竭禽鳥號鳴草樹皆白雖有其事語且不經又非師所得之意故不書師始聞法於江西百丈懷海禪師諡曰大智其傳付宗系僧牒甚明此不復出師亡後十一年其徒有以師之道上聞始詔加諡號及墳塔以厚其終豈達者所為耶噫人生萬類之最靈者而以精神為本自童孺至老白首始於飲食漸於功名利養是非嫉妬得失憂喜晝夜厂田坴縛又其念慮未嘗時餉歷息煎熬形器起如寃讐行坐則思想偃臥則魂夢以耽沈之利欲投老朽之筋骸餐飯既耗齒髮已弊又拔白餌藥以從其事外以夸人內以欺已曾不知息形休影捐慮安神自求須臾之暇以至溘然而盡親交不啻如行路利養悉委之他人愧負積於神明辱殆流於後嗣淫渝汗漫不能自止斯皆自心而發不可不制以道術道術之妙莫有及此佛經之說益以神性然其歸趣悉臻無有僧事千百不可梗概各言宗教自號矛盾故褐衣矒首未必皆是若予者少抱幽憂之疾長多羇旅之役形彫氣乏嘗不逮人行年五十已極遲暮既無妻子之戀思近田閭之樂非敢強也恨不能也况洗心於是踰三十載適師之徒有審虔者以師之圖形自大溈來知子學佛求為讚說觀其圖狀果前所謂鴻龎偉絕之度者也則報之曰師之形實無可贊心或可言心又無體自忘吾說審虔不信益欲贊之云云既與其贊則又曰吾從居大溈者尚多感師之開悟者不一相與伐石欲碑師之道於精廬之前欲其文辭近吾師之側謂予又不得不為也予笑不應後十來予門益堅其說且思文字之空與碑之妄空妄既等則又何虞咸通六年歲在乙酉草創其事會予有疾明年二月始迄其銘又因其說以自警觸故立其意不專以褒大溈之事云爾銘曰湖之南湘之西山大溈深無蹊虎日嘯猿又啼雨槭槭風凄凄高入雲不可梯雖欲去誰與攜彼上人忘其身一晏坐千餘旬去無疎來無親夷積阻構嶙峋棟宇成供養陳我不知徒自勤物之生孰無情識好惡知寵驚真物藏百慮陳隨婉轉任崢嶸雲糊天月不明金在鑛火收熒我不知天地先無首尾功用全六度備萬行圓常自隨在畔邊要即用長目前非艱難不幽元哀世徒苦馳驅覓作佛何其愚算海沙登迷廬眼喘喘心區區見得失繫榮枯棄知覺求形模近似遠易復難但無事心即安少思慮簡悲歡凈蕩蕩圓團團更無物不勞看聽他語被人謾生必死理之常榮必悴非改張造眾罪欺心王作少福須天堂善惡報正身當自結裹無人將心作惡口說空欺木石嚇盲聾牛阿房鬼五通專覷捕見西東禁定住陽朦朧與作為事不同最上乘有想基無結淨本無為人不見自心知動便是莫狐疑其下說沒文詞識此意見吾師
