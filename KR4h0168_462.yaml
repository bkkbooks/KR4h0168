seq: 462
front:
  text: 全唐文欽定全唐文卷四百六十二陸贄三
  hash: sha256:6ba4684450dae7d2079a4793f962cb853fbc47bded8306a17fcbc372fef382b1
body:
  text: 寅亮天工宏宣理本俾豫從乂時乃輔臣扈蹕載驅以勞定國懋官遷列式是彞章銀青光祿大夫行尚書兵部侍郎同中書門下平章事范陽縣開國公盧翰嚴重不撓貞方自持養恬鎮俗居簡濟衆言思無隱事必有恆守刑部侍郎同中書門下平章事賜紫金魚袋劉從一質厚氣深識精體遠沖用無竭貞規不渝從容以和出納惟允自鸞車載駕薄狩於梁執羈有從我之勤及霤勵匪躬之節交修不逮庶績其凝俾承命於掖垣仍參掌於樞務今百度伊始六府載張論駁是非不可以不審宣揚憲令不可以不明爾其欽承無墜我休命翰可門下侍郎同中書門下平章事散官勳封如故從一可中書侍郎同中書門下平章事餘如故朕嗣位君臨精求理道小大之務靡不經心日慎一日于今八載教化未洽蒸黎未康因之以甲兵繼之以災沴斯固鑒有所不至慮有所不周豫深浩然若涉深水思所以匡我致理助我官人宣其澤而四方以寧執其要而百工式敘允是大任其惟輔臣夢想勞懷敷求俊乂察言而觀行因事以考能周行之中乃得良弼權知吏部侍郎劉滋操履貞清介然自守居能慎獨動不違仁析理究其精微勵學探於奧旨守給事中賜緋魚袋崔造性合道要誠通化源適時有成務之才事上懷匪躬之節蘊蓄器業居為名臣中書舍人賜紫金魚袋齊映修巳以立自明而誠體賢人可大之規用君子時中之道虛受能擇清通不流惟滋之直方可以激風俗惟造之體度可以振條綱惟映之精深可以該物理我有大典爾其參之懋昭厥猷勿替休聞滋可充散騎常侍同平章事造闕仍賜金魚袋其有散官封賜並如故忠所貴乎竭誠善莫大於改過況茂勳有舊崇德日新翼戴勵勤王之節經綸申盡敵之略敦獎之道時惟國章平盧淄青節度管內度支營田處置等使開府儀同三司檢校工部尚書使持節鄆州諸軍事兼鄆州刺史隴西郡王李納稟性端厚執心寬簡通變適用和順積中服勞王家夙有成績乘秋備塞克著威聲纍歲專城載揚理行間者心懷險阻誠義鬱堙旋能歸欵上聞期於率德自效忠節純固久而益彰爰整鋭師式遏亂略保障宋服填壓浚郊嶷如長城作固東土嘉乃率服之美懋乃輸力之勤擢升衮司載董戎翰元成嗣台輔之業亞夫繼社稷之勳俾爾兼榮無替厥服檢校右僕射平章事餘如故周召由輔弼之臣兼方伯之任蓋以理化根本在於親人通兆庶之情以佐天子秉家邦之慶以臨諸侯故能中外允釐上下無壅今我有命意其在茲金紫光祿大夫檢校尚書左僕射兼潤州刺史御史大夫充鎮海軍浙江東西節度觀察處置等使上柱國南陽郡開國公韓滉文行忠信備修身之道勤儉貞固有成務之才纍更委遇多處繁重一心奉職終始不渝內告謀猷以匡時化外持憲法以一人心理尚廉平事皆釐飭姦盜衰息禮義興行惠茲一方時乃之德陳師旅以遏寇讎納餽糧以修職貢張我威武實我資儲令必應期謀無愆素濟於多難時乃之功宜其參務中樞翼宣大化仍兼漕運兼領蕃維樹南國之風猷贍中都之廩實豫則有望爾其懋哉繼於前人無替厥服可檢校左僕射同平章事依前鎮海軍浙江東西節度觀察處置等使兼充江淮轉運使餘如故立國之本所繫於元良宏教之方必由於端士非精識前典德冠當時恭敬溫文其將安倣吾是以輟台階之老選宗室之賢輔翼春闈是資教諭檢校司徒同平章事充太清宮使崇文館大學士上柱國汧國公李勉忠信孝友直方簡儉達君臣父子之際知禮樂教化之端虛淡保和貞明寡欲求舊則德懋敘親則屬尊師範國儲無易其選可檢校司徒兼太子太師散官封勳如故君之任臣有優賢賜告之義臣之事君有量力知止之道故能進退以禮終始可勝此朕三事大夫濟理圖全之意也守諫議大夫同平章事賜紫金魚袋薑公輔首舉高第擢居諫曹爰資美才參掌密命居易勵修身之操見危著從我之勤自處台司纍疏陳乞忌滿思退持盈守謙留中久之重難其請式光撝抑俾尹宮坊可太子左庶子勳賜如故宰相之職允釐百工時惟仰成不可廢闕中散大夫行給事中同平章事上柱國安平縣開國男賜紫金魚袋崔造頃居掖垣參掌樞密總領繁重積勞疹深亦既優賢賜之長告歲聿云暮有加無瘳披誠自陳章疏三上知止之道守之甚堅處以休間俾遂頤養可太子右庶子勳賜如故求賢審官以康庶績就間優秩以處舊臣蓋欲敦終始之恩全進退之禮金紫光祿大夫行門下平章事范陽郡公盧翰頃因多難從我於征以其年及老成任推先進方將求舊擢處台衡荏苒迄今亟淹星歲勤勞既久衰疢有加宜徙職於春闈用優賢於暮齒可太子賓客勳賜如故河洛舊都時巡久曠命以居守俾之保綏間者淮甸不寧汝墳屢警增置軍府作蕃王畿職任既分威望非重思有總制一其典刑爰資信臣往乂東夏銀青光祿大夫守工部尚書魏國公賈耽豁達貞方識通大體明九域山川之要究五方風俗之宜恆因物情以施教化所蒞之郡藹其休聲悅李廣之風人皆自便懷羊祜之德敵不敢侵自誠而明在久彌著分我憂寄實惟其人董制軍師安集疲瘵統禦都邑握持紀綱懋昭厥猷無替朕命可守本官兼御史大夫充東都留守東都畿汝州都防禦觀察等使判東都尚書省事散官勳封如故居守之重固難其人近歲以來益又繁綜領廉察之任專禦備之權地廣務殷一皆咨稟非利用罔以通濟非純德不能保綏周爰咨詢公論有屬銀青光祿大夫行尚書吏部侍郎上柱國安平縣公崔縱素風自遠代濟忠貞慶之所鍾繼有才哲氣質淳茂識度淹通蘊經遠之沉謀宣適時之利用寬而不弛簡則能周以茲公方多歷要重小大之務必聞休聲輟於周行式是東夏擢居春官之長且兼副相之雄懋昭厥庸期復先構可檢校禮部尚書兼御史大夫充東都留守判東都尚書省充東都畿汝唐鄧等州都防禦觀察處置使散官勳封如故君人立極所務於勝殘秉律成師實先於謀帥申明號令總制紀綱宏九合之功決百勝之略非慎簡不可以濟事非僉屬不可以臨人集大勳者必振其宏綱體至公者無避於內舉爰擇蕃翰俾掌元戎開府儀同三司舒王謨性稟忠厚訓知禮樂居常樂善動不違仁察其內恕外溫必能安人和衆體方識敏諒可成功庶乎知子之明授以貞師之律可揚州大都督持節充荊襄江西沔鄂等道節度使及諸軍行營兵馬都元帥餘如故仍賜名誼改封普王鳴呼小子誼其敬聽朕命我國家之有天下百七十載於茲矣祖宗垂化紹統一作祖宗垂統功德繼茂威加殊俗惠洽普天海隅蒼生代受亭育躋之於福壽煦之以仁和源廣流長慶深祚遠歷數有嗣纘於朕躬兢兢業業懼不負荷虔恭寅畏歲五周星循列聖之耿光稽上古之謨訓一物失所是用疚心萬方有罪每懷咎巳懸法皆考於天則一作意舉事必酌於人謀期合大中罔循私欲而涉道猶淺燭理未明文闕於化成武乏於定亂刑賞失中授任乖方厚澤未均大信未著致使凶慝熾禍干紀亂常悖違君親蔑棄天地盜據我都邑毒痡我士庶驅脅丁壯暴骸於原野攘奪羸老轉死於溝壑忠良隕命義烈銜寃迫以凶殘莫由自奮憤深骨髓怨結蒼旻朕所以中宵屢興終食三歎哀蒼生之無告閔赤子之非辜為人父母寧忘愧悼賴三事大夫竭誠於內㣥帥爪牙宣力於外交修不逮一作怠日冀康寧江漢上遊建瓴制寇亘千里之地連十萬之師保大定功宜有統一允副茲選往哉汝諧無以貴驕人無以善自伐無縱巳之欲無咈衆之謨從諫如流改過勿吝卑躬降志以奉賓傅絶甘分少以撫軍師布誠信以歸人心明賞罰以盡士力詰姦誅暴懋昭乃勳敬事恤人無替朕命膺茲重任可不勉歟建中四年九月二十六日天地殊位君臣異制苟不率道茲謂亂常退而增修於是有舞干之義諭以遷善於是有文告之辭若猶不悛乃用致討興戎動衆豈得已哉李懷光擢自軍侯委之節制亟有勤績纍加寵榮總衆駿奔自遠赴難解圍逐寇朕甚德之位極上台寄崇總帥親之若同體信之無間言朕於斯人亦已厚矣而器小任重固貽顛覆有功自棄無罪自疑崇信讒邪脅逐將帥養寇資亂蓄姦幸災朕素所推誠猶謂非實優容任遇坦然如初凶迹既盈醜蹤彌露謀危社稷通結渠魁公相往來無復忌畏窮極凶悖所不忍言朕播遷巴梁違遠陵寢大懼失墜為列聖羞賴先澤在人兆庶知感朔方將士忠節不渝懷光既沮姦謀詭稱效順纍陳欵疏請詣闕庭朕深惟舊勳務欲全貸授以師保之任疇其井賦之食璽書勞問誓以終始懷光遂殺辱使臣完聚守保將以悖慢之罪加於忠義之軍因茲脅從冀與同惡謂衆可罔謂天可欺覆載所不容人臣所共棄討除大憝招輯非辜爰咨輔臣以董戎寄銀青光祿大夫檢校司空同中書門下平章事兼太原尹北都留守充河東保寧軍節度使北平郡王馬燧操業端亮器宇宏達秉難奪之節負不羈之才常持至公深識大體感激而三軍有勇彌綸而庶績允諧威聲所臨郡邑皆復殿于北土隱若長城元從奉天定難功臣開府儀同三司行侍中兼靈州大都督靈鹽豐夏等州節度使管內度支營田觀察處置押蕃部落等使充朔方邠寧振武等道奉天永平等軍行營節度兵馬副元帥上柱國樓煩郡王渾瑊淳粹積中仁厚成性布寬大以容衆著誠信以撫人事必沉詳臨危益辦節惟貞固在險逾彰宏濟艱難懋昭勳閥出納朕命光膺具瞻並文武全材安危注意副我憂屬時惟二臣比德協謀往清多難燧可兼充奉誠軍及晉絳隰磁等州節度管內諸軍行營兵馬副元帥餘並如故瑊可兼河中尹充河中絳州節度觀察處置等使仍充河中絳州同陝虢等管內諸軍行營兵馬副元帥功臣開府本官勳封並如故嗚呼朕不敏不明失於君道連禍未息勞師靡居中心自咎鬱若焚灼又以朔土之衆代著忠勞橫遭汚脅深所憫惜爾其敬敷朕命明諭朕懷務於招綏非黷威武惟輸誠歸順罔有不赦惟執逆拒命罰止元凶寧失不經無濫無罪列爵懸賞用俟勳賢布告遠邇咸令知悉周之元老以分陝為重漢之丞相以憂邊見稱故方嶽克寧疆場不聳安人保大致理之端今所以重煩上台作鎮西土奉天定難功臣司徒兼中書令充神策軍節度鄜坊丹延等州觀察處置等使仍充京畿渭北一作南鄜州華州一作商州華州又作商華等州兵馬副元帥上柱國合川郡王李晟勵精剛之操體博大之德適時變通而大節不奪虛受廣納而獨斷自明奉法以身推功以下衆無犯命人用樂從懷德畏威令行禁止誓㣥帥於危疑之際駐孤軍於板蕩之中氣凌風雲誠動天地一鼓而凶徒折北再駕而都邑廓清師皆如歸人不知戰再安社稷功格皇天而明識秉彞清風激俗雅尚恬曠撝謙有光朕以汧隴近郊扶風右地川阜連亘抵於回中限界諸夷藩屏王室所屬誠重允付元臣兼二將之甲兵崇十連之元帥宣威耀武罷警息兵俾豫仰成時乃丕烈可兼鳳翔尹充鳳翔隴右節度度支營田觀察處置等使仍充鳳翔隴右涇原節度管內諸軍及四鎮北庭行營兵馬副元帥改封西平郡王功臣本官兼官勳並如故論道經邦允歸碩望建牙統衆必藉雄才中外具瞻安危注意今以二柄付之元臣開府儀同三司檢校尚書左僕射同中書門下平章事持節宋州諸軍事兼宋州刺史充宣武軍節度使度支營田宋亳潁等州觀察處置等使仍權知汴滑宋亳等州都統兵馬事懷德郡王劉洽秉志端亮飭躬簡儉博厚足以容衆和易足以長人純孝榮親盡忠事國分我閫寄殿於大藩扼制淮夷保障楚甸戎捷繼至軍聲再揚殪㣥凶於宛邱驅大憝於梁野控引漕挽委輸京師豫嘉乃勳懋乃貞節用錫丕命俾揚洪休燮贊三台紀綱㣥帥式是大任爾惟欽哉可檢校司空同中書門下平章事依前宣武軍節度使度支營田宋亳等州觀察處置等使仍充宋亳潁等州管內諸軍兵馬都統散官勳封如故王者之制安不忘危宏其道則文武齊致教其人則農戰兼務故雖縣內不可去兵況密邇寇虞干紀稔慝都邑郊甸騷然靡寧聿求信臣特建戎號濟人夷難允屬勳賢京畿渭北節度使兵部尚書行在左都虞侯渾瑊忠貞博厚溫恭簡肅持重不撓好謀而成居業克敦其詩書受賜每陳於廊廡能推誠而撫下不伐巳以拒人委任中外咸著聲績夷險一貫隱然殿邦朕越在郊坰逼於凶醜授之師律式是戎昭侍衛增嚴斥候無爽檢身齊衆同士伍之勞苦敦陳整旅壯行列之威容靜以代謀動而制勝臨危勵節豫有賴焉王圻之內沃壤千里帛丿糸亘商嶺屏於南門觀風靖人詰禁誅暴俾爾兼領用孚於休可京畿渭北渭南金商節度觀察處置等使餘並如故淮海奧區一方都會兼水陸漕挽之利有澤漁山伐之饒俗具五方地綿千里聿求良牧豈易其才今又革車方興軍賦屢調體於寬大則事缺務於辦集則人殘自非剛柔適中文武兼備其何以副我憂屬惠綏南方正議大夫行尚書刑部侍郎上柱國扶風縣開國男杜亞識精體要學究宗源妙於用而有常通其變而能久為理敦教化之本立言參禮法之中道無緇磷行有枝葉回翔省闥表彌綸獻納之勤踐歷方州著清靜循良之稱其嚴重可以鎮俗其才術可以匡時休有令聞輝映朝列朕以東南思乂注意求賢爰輟名臣俾寧藩服往率厥職時惟欽哉可揚州大都督府長史兼御史大夫充淮南節度觀察處置等使門下自昔哲王疆理天下必選其明德樹之宗親參制藩維夾輔王室賢戚並建時惟休哉長淮之西厥壤千里人靡寧息於茲有年朕其永懷慘若焚灼思得良帥代豫安人釋其危疑彰我信惠以親而授其在於茲開府儀同三司虔王諒性本溫恭生知忠孝祇服訓導躬行不渝言皆副誠事必求當端慎可以鎮俗寬厚可以長人砥綏一方庶允憂屬可申光隨蔡等州節度副大使管內觀察處置等使餘如故分命使臣統臨方嶽弛張之道蓋亦從宜近甸無虞則但廉風俗邊陲式遏則兼假旌旄名制雖殊委任俱重膺是選命莫非勳賢開府儀同三司檢校兵部尚書兼鄜州刺史御史大夫充鄜坊丹延等州節度觀察處置等使平樂郡王唐朝臣嘗總偏師遘於多難仗義率衆臨危不回保全關衝抗絶凶逆守而能固出則有功每急病而讓夷嘗以寡而敵衆竟殲大憝克集茂勳炳然貞心堅若金石洎息師歸鎮按俗頒條軍旅慰安流庸悅附奉天定難功臣開府儀同三司檢校工部尚書兼左金吾衛大將軍充右街使上柱國建康郡王論惟明釋位勤王有赴難之節扞城禦寇有持危之功奉主忘身棄家從國越自郊甸再踰巴梁險阻艱難靡不陪扈忠義所在死生以之久司禁戎益茂勳績器質敦實識度寬敏通明吏職練達武經本之以純良輔之以才術俾居藩翰僉謂汝諧朕以北控單于國之巨鎮彼方戎帥沉痼是嬰臥護邊軍已淹寒暑憫其盡瘁難以重煩爰咨信臣更踐厥職朝臣可依前檢校兵部尚書兼單于大都護御史大夫充振武綏銀麟勝等州節度營田觀察處置押蕃落等使惟明可依前檢校工部尚書兼鄜州刺史御史大夫充鄜坊丹延等都防禦觀察處置等使餘並如故度土分疆設官蒞事因時設制期在理安必順物宜且從人欲版圖既溢則疏邑以制州統攝或乖則分部而建長沿革之道亦何常哉滄海之隅地饒俗阜隱然北土實曰雄藩鎮撫之宜是資懿戚開府儀同三司嘉王運氣本元淳重承先訓忠肅孝友寬仁惠和勤於服儒樂在為善施於事任必有可觀舉不失親至公斯在欽率厥職永孚於休可橫海軍節度使滄景等州觀察處置等使勳封如故周制以輔翼之臣出作方伯漢官以牧守之最擢拜公卿其在匡時中外同體朕以大勞未乂勤恤於黎元多難荐興注意於藩嶽就加命服式寵能賢則增秩進律亦古之道也金紫光祿大夫檢校吏部尚書使持節潤州諸軍使兼潤州刺史御史大夫充鎮江軍浙江東西節度觀察等使韓滉忠肅剛直清公簡儉持至公以檢下強禦必繩秉大節以事君險艱無易惠能恤衆明足照姦歲發勤王之師日增贍國之賦軍無撓敗俗以阜康殿於大邦理平訟息朝有勸典昭升乃庸胙土以報勤懋官以旌德底乂江甸永孚於休可檢校尚書右僕射進封昌黎縣開國公餘如故列爵以旌德胙土以報功國有彞章是用裦勸朕以不德間逢多虞蒲坂有叛亂之臣淮沂有僭逆之帥萬姓罹害四方靡寧奉誠軍節度兵馬元帥檢校司徒兼侍中馬燧聞難之初忠誠奮發躬帥士旅討茲不庭略地如歸攻城必克晉絳磁隰靡然向風元凶勢窮竟就梟戮清我甸服時惟茂勳荊南節度觀察處置等使檢校戶部尚書嗣曹王皋親率全軍抗於強虜晝夜不息逮於三年謀成必臧師出皆捷復蘄黃之地拔安陸之城隱其威名保乂江漢並著節於國存功於人迹效炳然僉議攸屬雖懋官已序而食賦未加疇庸之科無乃有闕宜其寵錫以答殊休燧可賜實封五百戶通前七百戶皋可賜實封三百戶食貨所資邦家大本總領之重必推元臣故周以冢宰制國用漢以丞相調軍食官給人足謂之善經今戶口凋傷財産衰耗邊疆未靖役費尚多思欲均厚薄之征權重輕之制國無匱乏人不怨咨運籌佐時其在良輔金紫光祿大夫檢校尚書左僕射同中書門下平章事充鎮海軍浙江東西節度兼江淮轉運等使晉國公韓滉昔事先朝常掌邦賦貞心獨立一志在公吏無姦欺財以饒羡自臨江甸事舉風行職貢有加轉餉相繼成功允集艱食用康介於方隅未極材術宜其宏濟式副具瞻可充度支及諸道鹽鐵轉運等使餘如故行止兩全必惟明哲致其用以匡國敦乎道以保身周旋令名始終不替斯賢者之極致而行之實難金紫光祿大夫守太子少傅檢校尚書右僕射持節梓州諸軍事兼梓州刺史御史大夫充劍南東川節度副大使知節度事管內度支觀察處置等使蘇國公李叔明稟粹挺生鬱為邦傑虛懷朗暢達識周通早以器能纍更任遇中外所踐必聞休聲嘗尹京師姦豪屏息洎臨方嶽風俗澄清吏服嚴明人懷德惠憂公奉職勵節存誠服勞王家行及三紀以茲盡瘁沉恙所嬰扶疾趨朝披誠告老固陳衰瘵深戒滿盈情皆發衷語且形泣視其激切良所軫懷敦勸既頻辭乞彌固繼獻章疏期於必從省之憮然用增感歎雖惜其舊德往涖遐藩而憫以高年難違懇志猶資碩望俾長庶寮罷方鎮之煩總中臺之重式彰尚德且示優賢可依前守太子少傅兼尚書右僕射既明且哲以保其身求之昔賢鮮克全備良以謀始匪易慎終尤難其有志奉公家力輔王室見危而立節將沒而陳誠操尚堅明謀猷深遠憂國無忘於顛沛周身不離於令名有臣如斯可以旌勸故義成軍節度滑鄭等州觀察處置等使開府儀同三司檢校尚書右僕射兼滑州刺史御史大夫上柱國武威郡王李澄天授將材勇而多智臨危不懼見義必為崎嶇險艱勳節兼著勤於廣業曾未遑安帶甲臨戎連年野處積勞成瘁霜露所侵痟疾攻中癰疽發外逮茲病亟不替忠誠憂國疚懷戀闕流涕懼軍戎之乏帥念方鎮以為虞上表披陳懇求代免辭情激切備慮精深視之感傷當寧興歎雖史魚之陳尸納諫吳漢之在疚獻謀比方於此不足多尚天胡不容奪我良帥惻然嗟悼用切深衷始終存義澄實有之裦美飾終是宜加等可贈司空賜物五百段米粟三百石以左散騎常侍歸崇敬充使弔祭所緣喪葬並準式官供仍以澄讓表宣付史館以彰忠節迫以凶威陷於寇境義不受汚忠能奮誠履重險而不回處疾風而逾徑忘軀殉義獻欵投誠足以勵彼勤王激其汚俗去逆效順固先典之攸嘉懋賞勸功驗彞章而不昧咸從序用俾服官常可依前件鄭武公父子繼為周司徒內居股肱外作藩翰詩美緇衣之德傳稱夾輔之勳我懷斯人今得良弼開府儀同三司檢校尚書右僕射同中書門下平章事充平盧淄青節度管內度支營田觀察處置陸運海運押新羅渤海兩蕃等使隴西郡王李納宇量宏博質性沉毅體仁能斷見善必遷蘊非常之才守以純一秉難奪之節著於艱危昭升令聞茂建勳績屬淮夷構亂東夏震騷奮旅徂征坐籌制勝解商邱之難攘彼凶殘釋陳城之危俘厥渠帥德功克懋官賞宜崇庸建上台宜賜真食慎乃先服勤勞王家以殿邦之勳參論道之職俾爾嗣績光於前人荷國之寵章承家之丕構敬慎厥德永孚於休可檢校司空同中書門下平章事仍賜實封五百戶餘並如故
