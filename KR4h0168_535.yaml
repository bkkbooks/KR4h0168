front:
  text: 全唐文欽定全唐文卷五百三十五李觀四
  hash: sha256:d36c2826fbdf274a8191b6c3660e8b4ea3e3f3b8a5ea9c32faf447618fc1f155
body:
  text: 交之難兮久矣且苟合兮為恥昔人病於無友嗟友不可以巳矣絶壑萬丈咸欠咸欠龍吟元雲遂興六合為陰碧山嵌空虎嘯其中百獸悍栗歘然長風夫物以類感何感不致交以心契何契不祕然執可久之契先古稱利言求於斯不可易易二氣陶甄曰人是先足矩地首規天大朴摧頽六情入焉一與一奪失其自然積有億年人增險艱使我行無所之居無所安末流濺濺潰我素源源無清流棄沈逐浮詐色自伐偽心相求睢盱竭歡未竟成讐一日銷落速如凜秋朝榮無遺俗態豈留獨見神嶽寒柏千尋無儔直天而生高於斗牛下睨㣥植匪堪與侔可者為交窮達不偷樂亦同樂憂亦同憂生死循環其道率由破産作惠不相為酬如斯之謂也昔夷吾九合之策知者不孤巨卿千里之哭今也則無石父解縛於齊相智罃負慙於賈夫賈夫信微其可及乎知我則友何微之居古人奉交多不獲全耳餘之初刎頸慨然隱憫就辱激昂自堅及其據兵而坐勢必相危白刃可吹赤心乃憑怒相殺氣干虹霓嗚呼噫戲交之難兮以利苟合忿深咆哮余常誡之不妄語交矧今之人兮實蒙虺蜥是故獨處兮而悲蠨蛸若歿者可振豫願言與鄰驂吾祖之駕捧仲尼之輪義者友其義仁者師其仁不其善歟何滯於斯憂辛古今儒家多棄黃老豈必乎天德未必者道上聖存於中而外施訓凡仁信禮義四者流於道道外而流於道以四化外俱復於天下為羲農不道而上德則堯舜並知至德則不列於聖教決無四數矣凡駢行之為仁為信為禮為義并行之為德愈德臻靜為道故二為儒之臂四為德之指若忘源而決派剃莖而掩其本樹難矣則沖虛利害於本末然老氏標本孔氏回末不能尤過者自中而息豈前無路哉及列氏莊氏展而針之空清泊中非典經與家風鄙而窺外俱達誼也雨不戾止距冬迄春下土嗷嗷怨歸青旻天視能審哀民之甚民號上訴憂穀不稔天初不言民益凜凜歲四月中旱焱爞爞飛土奪日遊氛溢空或車或徒心務不同為害痛者不惟在農居無幾何天乃憑怒察民無慝下洗其訴陰祗告露陽曜當措騰龍汨浪其寐初寤排六合而上飛倒百川而下注懸流浩浩靈怪相刺迅雷竊發兮狂電交聲馬喜輞軸兮氣懾日月惠於魯而巫尫止焚溢於河而夸父不蹶雨始未作大人貶食乃雨既垂謂君何力君茲事帝帝報之德雨既油油兆民不識大田藝藝溉渠脈分關中之人負鍤成雲伊農趨時如項伐秦天澤汪濊與人不仁穆穆天子綴旒高視旱天方霽王國如綺南山峩峩橫碧千里八元挺立相與而議昔湯之旱堯之水一則九年一則七祀力何不勠禱何不至浮天赤地罔不畏死今純陽微升膏澤洪被於我后之德與堯湯百倍斷可知矣時有不肖泣玉於象魏之下而竊聞之敢不志爾噫聖人之所能而賢人所難曰德德不愧則修立之事著矣觀每究聖人旨顯而微隱而著義讓以表其外德行以明其內恩信以昭其賢寬惠以廣其物剛毅以將其志溫柔以制其勇去義讓則父子之道乖捨德行則君臣之志缺廢恩信則朋友之道墜亡寬惠則刑法之政弊用剛毅則勇果之心遂斥溫柔則和弱之旨怠六者聖人之尊賢人之難也所以堯舜而治丹病而廢禹湯得堯舜之道桀紂蕪禹湯之化是則德行義讓恩信剛柔偕隨時而晦明也吁以偶為巳任以利為巳友夫如是雖冠帶儼然事虛美於寰宇下具年足之一氣爾烏異沐猴而冠者耶德行可置乎哉古之帝天下者七德震曜四夷威懷有漢孝武焉祖作之父述之而巳因其資皇哉鑠乎猶可以頌其餘昔孔子云無憂者其惟文王乎然孝武亦庶而儔之始乎高皇勤功功階乎天纍聖重光光燭乎泉解殷之羅要民以輕刑沃秦之焚以起民於焦原故國無困民民無異心孝武即既安之朝而得安其安馭無為之民而得為其為遊心大中而陋八區旁目不庭而叱九軍詔大司馬曰王師有征其禮若何大司馬歷級而言王師無校謂莫敵也征乃可服柔服以德所謂善政不戰善戰不陳聖人不易之道也帝曰吁周之衰秦之亡皆不由之故龜鼎用遷乃出元宮登皇車騖六龍建九旒人馬駢駟戎車擊輈非六月之師異瑤池之遊雲撓雷厲風行川浮震震耀耀而入於苦寒之陬胡有高臺登臺而觀兵兵不血鋒築城而受降閫絶垠而為墉徑空磧而作防然後回鳴鳶飾中權飲至廟庭勒功於鼎銘以遺子孫以恢紀經壯乎哉而難斷之嘗聞天子有道守在四夷知守者非殫師遠征窮徼成城害元元之生黷明明之靈蓋在義以討仁以擾虞舜以之歸有苗姬發以之合孟津秦乃反之民共愁辛孝武何哉復踵是焉重難蓄之民城無用之夷脫內不勤而外安足保之不其危歟夫四極之裔日月所薄獲其土不可以豐財俘其人不可以化遷而王者必綏之欲其知所尊而不思亂華何必征而降之降而城之若然者三方之夷皆可降而城何獨一陲此所謂反無外傷無私不可為後王之規愚黍學古敢陳銘云天長匪民蒼蒼有北窮兵之弊播德之克武皇以兵而不以德聚師萬甲懸磬四國男悲遠征女泣夜織死生其苦木石其力古無降城顧乃重傷城不可轉夷居無常前有濁河濁河自流後有黑山黑山自高堙塹尸委崩榛烏號居者匪居勞者薦勞我思古人疾首用搔七年冬十一月觀自京師適高陵經東渭橋窺渭之清駭橋之雄故作東渭橋銘因以識之曰天地不有大孰見其小聖人不有作孰見其妙惟渭之廣洪流浩渺惟橋之永赤龍夭矯車者如戶舟者如徼石成五色天可補闕木從繩直地可梁絶天地之險舟梁之説乃曰因人興不因人輟鞭石既勞架黿更危去危背勞人莫之知塗擁近郊棟準絶涯功成不爭道合其離我去京矣六府四維不見釣璜不遭墜履牽牛獨在飛鶴雙起表其千年塗歸一指故物有時行功有時止琢珉川上日月終始於戲種知吳之可以取知越之可以強而不知身之進退存亡沈吟躊蹰以至於非辜哀哉斯繇淳德離披衰世難維故獨正者不足以鎮邪獨信者不足以塞疑夫周公孔子聖人也尚有彼婦之歌鴟梟之詩矧乎其下人乎然齊桓公終任管夷吾晉文公不疑五臣數子者竟能挈五霸之器加二君之身臣無所反側君無所短長下冠列國上尊時王惟齊晉之區區行何道而臻斯偉歟殆非二君能推心於數子俾數子得不失進退存亡者乎使非句踐既舉全吳乃授伯國建國之雄付種之能必將南略海垠而率百蠻北合諸侯而朝中原提控吳越之邦接踵桓文之勳則句踐為伯君種為伯臣必矣何尚乎浮洞庭去故國為天下之旅人哉嘗用種之謀若有之思越人之力尚剋之苟天不永越年越亦不愛種賢越不能恤其允種是以誅其身噫范生之書未釋於手越王之劍已承其咽哀哉且會稽之羞非越復惟大夫之復大夫之死誠長頸背義亦大夫之非智哀哉詢種之名不登於三仁求種之墳不在於九原勒石以備脫終古以慰枉魂銘曰姑蘇之讐敵國既亡大夫何哉不知其去只知其來子胥至忠不信於吳鴟夷知幾浩然乘桴君胡役役謀國遺軀或曰不然吉凶相賓不有覆車孰懲為臣不有泛舟孰為濟人道無全功用有屈伸冥然陳力得於開卷神能感我髣佛如面往者之悔來者之憲志於元石將懋將唁鋪周秦之顛亡粲乎册吁可駭也惟秦失在暴惟周失在弱上慢下黷政無紀綱若然者神靈不得不哀世教不得不張且天地不可以無主故帝必誕眷命不可以坐得故有心者經綸於是漢祖起於豐沛公起於會稽陳吳之徒自稱乎假王其餘揭竿而呼爭先刺秦者如林如藪於時亂浩浩兵憧憧風從虎雲從龍三靈昏而四海空公乃仗撥亂之劍希當世之功浮江而西有壯士八千枹鼓於舟中吁嗟乎無人誰禦乎㣥凶所以謀大業拯萬靈而爭雌雄者獨漢祖與公遂號百勝之師走耳隱纍卵之危活趙歇擒王離十壁吅丂一眙一麾靡餘然後飄鋭氣聳利鋒扼秦關怒漢公因語曰損約則違人固信則自違惡取乎乃軍鴻門屠咸陽鼎峙於神州幅裂於四方始退與漢祖東西而王天下是知量不足謀不長矣然雖兵衆於漢戰捷於漢其後則有靈壁之敗太公虜滎陽之圍紀信焚廣武之守傷其胸固陵之役撓其師與漢祖龍虎相逐干戈合離五年之後勝敗乃知是知兵之不可窮物之不可終天地否而開雲雷屯而通故有三將潰圍孤軍曷歸良馬在御美人在帷楚歌夜聞哀泣垂緌遂飲帳中申令麾下鏡分美人飇舉良馬曉漫漫雲茫茫失道於陰陵問津於烏江其猶魚遭網而遊鳥嬰羅而翔終不免矣尚能合從亡之人禦追逃之兵旗鼓指掌鵝鸛邱陵足罔不蹶首胡不橫然始解馬於舟子結纓於死地痛矣夫何自慷慨斯焉之甚邪而曰天實亡我非戰之罪何執而不寤哉公實勇而無謀剛而無親忌而信讒暴而殘人是以人得蹈其資兵得害其身真自亡也豈天亡乎使公勇而能謀關中可據矣剛而能親諸將不矣明以察讒奇計得施矣恕而愛人百姓樂推矣若然則舉天下如轉圜何漢氏與二臣能計之哉至如謀於漢者昔其臣也公實棄之兵於漢者亦其將也公不庸之故曰得人者昌失人者亡噫從始而言之蓋天理有素乎故生項以靜難生漢以牧人靜難者授勇牧人者授仁不然何鴻門阽而復持成臯跳而復振入關而緩來王楚而驟歸者哉釋名曰碑悲也觀嘗尋楚漢春秋見公帳中之歌取而詠之輒泫然而悲爰刻石為文多不究其終始銘曰姬孱而絶嬴虐而滅九陽鬱結九州卼臲必生聖哲以起滅絶維漢自豐維楚自東偕伐寇戎反相戰攻戰攻不罷洎乎垓下彼衆我寡龍死於野昔天喪水德未有受命者而劉項之戰方苦殘毒軋於生民御史大夫周苛世籍於沛始漢祖起而隨焉時漢祖以新厄濉水之圍而遽保滎陽楚人四面攻之內無完備憂難持久用將軍紀信計而漢祖免命周苛守後事以禦外敵敵知其危併力蕩搖哀哀遺軍創痛如積雖授之以利兵朿之以堅甲而莫能起非愛死也力不堪也故城覆於項氏項氏毅然鷹瞬爨大鼎於宇下謂苛曰請封三萬戶為上將軍軍之政自不穀而下及卒乘皆聽其所為不從則烹決無疑焉公怒甚色作視羽而咳之曰吾聞不善者善人之資今天將錫漢故泯天下以亂救亂者師是用汝資之不即倒戈請命兵絶若傾汝死無日矣且秦政反道殲滅六國天人含怒噍類不留今汝之業不足侔秦而罪侈於秦曾不知天以陰步馬興喪與奪而猶與漢爭鋒且若戰數勝攻數剋非若能也天厚其惡惡厚將崩何得長哉項氏恚公之不屈而恥其詭巳怒聲如乳虎指左右捽公於沸鼎公奮身不顧蹈鼎而卒嗚呼糜軀冀於不朽不朽者在乎立節立節者在乎處死處死者在乎顯主主顯節立獨苛有之與夫由余授戈宏演內肝不殊也初苛殺魏豹可謂無人薄我及拒項氏豈非臨難不苟免邪觀感公之雄果而史無傳記敢鏤幽石以承闕文其辭曰龍戰未分崩雷泄雲雷崩雲泄其下流血滎陽攻急介士涕泣赤帝徘徊惟公在哉秉心慷慨處死不改沈沈積寃千古奚言紀公光烈系史之闕漢陽趙一字元叔出漢靈帝之世慨然卓異士之傑者負才不檢細行為州里所擯陷刑將置其死幸友為脫遂作窮鳥賦以方巳欲傷哉元叔之志與世齟齬蓋天厚其善不厚其命然天不有曰常與善人元叔之善其與安在天之不惠自回憲及一三矣當日頽風凋理道盛德殞衰俗始振二祖之業未偕三代之季雖藎臣瀝泣億庶呻痛而貪宦詭進拏攫王度殆非天欲眷先亂之兆也元叔以故數有哀刺之作酌其所走耳隱亦猶詩人有采苓甫田之作也憂心不偶而沒無所譽乃衣褐應郡計上書闕下見司徒袁逢長揖而言音形琅琅袁深器之操袪延升指謂座人曰漢陽趙元叔由是名聞於時有羊涉者尹河南能掇四方之英元叔乃去袁司徒訪涉以為主人將出所懷以動之會涉猶寢於堂內元叔直言而伏曰僕高君之義故遊君之門將藏窮達之誠君豈當然涉乃眷而禮之特奇其賢明日盛騎造元叔坐涉於柴車高談極曛因曰良寶不剖必泣血以相豫於是羊與袁唱聲薦元叔於王庭雖名烜於京師而祿竟不登尋復漢陽道經宏農太守皇甫規時之大賢元叔候之閽不即通乃怒不留規追謝責巳長逝不顧深居篤靜纍辟不赴沈亦快疾乃終吁有不世之器有三公之遇不能奮振寥廓騰陵清浮元叔之命不易問也觀飲元叔之德聲而怨其運不并乃序而銘曰吁嗟元叔兮出處轗軻鄉人無良兮惡我賤我我不辰兮棄置罹禍天何授我兮於我獨頗嫉時之敗兮憂道不可褰衣悢悢兮以遊大人秀而不實兮空莠此身覆覽前載兮恨君遺塵乃銘於石兮希名不泯觀有倍年之交朱巨源以某時疾終於舊鄉之居昨得鄰之書云君子亡言於茲息焉高風陵夷弱子童昏有殯在阼無子及門去矣不還惟君之思其子産乎其神農乎昔子産友子皮子皮死子産慟哭曰吾無為善矣神農初少也學於老龍吉龍吉死神農擁襟而前無哀於懷曰夫生之處形形必極必生而傾未若反其極而全其真而生不形而形不生其真隱以彰其道運而行今若是夫蒙何疚焉吁余嘗異之古人有言上聖忘情下不及情而中得之聖人動與天回靜與地寧不死不生死生者蹈道之紀率性之始不及者止禮文其外樂質其理大欲節而中庸立小人反而君子至若子也下則過之中則庶幾乎乃用情為噓嘻巨源之先亡吳之遺民十餘代而臻其身其節貞其行敦始未患時仁人器之復無良謀得謗在縲豫嘗衣其寒食其飢及明其非巨源由是相得而豫未敢尸之終謂足食者晚進志薄者後合頽顏不相五十當貴若何倏忽而與物皆化出處之失安溫濕之搆患巫不蘄醫不痊不爾者巨源何然是幽無神高無天故前壽莊跖而後殲巨源按禮經哭友於寢門外豫旅西土不知所哭素軒助紼時慮弗及遂託東人之歸者以志銘一篇令置於棺右詞曰君加我以義我求子以心學不愧古人不侔今周旋二人久用欽欽素書東來告君之亡不屨而步不言而傷琴不破劒不懸非不能之顧無贖焉松為薪壟為田而此數字不更於淵古之道窮者接輿則歌吾邱子則哭哭者年志俱謝怨不容於世歌者聲迹可晦不欲趨當世之機也然吾邱子古之窮人也哀莫至焉仲尼方適於營邱遇於途衣無裾冠無緌不言於人人亦不自言吐梗茹酸號於莽蒼之間涕交於頤墮而成泉聲薄於巍巍一斷一連鳥為之相鳴雲為之不飛負者息遊者感仲尼亦停蓋為之心惻顧門人之辨者往訊而唁之吾邱子撇涕而言曰太古之先又有宰者聚五行之秀氣以為人鏤五常之大端以為心人者所謂靈於萬物者也其生必有依心者所謂履於百行者也其立必有從生必有依者親立必有從者君君親之間必有交遊非其親孝無所宣非其君忠無所稱非有交遊不能成其身三者人皆遂之則魯曾參衛史魚齊管夷吾皆其遂者也豫獨負之天年復衰是故哭而哀然哭之中有三殺焉始者志於四方希有一朝之榮以為父母昆弟之歡遊罷乃還而父母之墳巳乾今思而哭之與不養之子同中仕諸侯之朝君無德而兵侵今思而哭之與亡國之臣同後忠孝之間天下不聞其臣子豫恥而後交今思而哭之與言無所信同夫忠本孝而生信載義而行三者既虧而生非生行何行也汨然自沈與波而東東流不窮至今淒風言於黔婁柳下惠必為之感激言於伯陽齧缺必謂之不通觀所以作哀吾邱子之文務勗人之中庸維唐貞元元年胸奴上款乞盟天子以其言誠乃命上將往墠於陰山而聽其誓言監察御史韓君載筆而隨焉我上將仗九廟之信而首盟其間以戎人心為心戎乘我不虞而有詭謀我計無素成而姦以宿萌故勇者死奔者追而韓君為之擒矣嗚呼有備無患軍志也戎人安所暴其詐千慮一失聖人也韓君是以為之虜天其或者將用警我非福戎也韓君之為擒其繫命歟五年於茲生死不尋謂之生豈復還期謂之死永永湮沈或曰死矣切傷我心絶國浩浩窮西極濱強胡居之犬視狺狺流沙無波陰山無春邊草不緑塞鴻不賓秦有長城漢有遺人死者虜鬼生者虜臣哀哀韓君生死窮辛鬼能靈人能語君生其所君死其所今兩寂然必由中阻君初奉使意氣西道白圭之貺唾掌可保激魯陽之勇歎典屬之老乃即於事不能畫奇從軍之籌君固職之可疑不疑固用阽危羌戎髬髟而坐刃我師擒卒揕胸血殷朔陲實死者痛非擒者悲夾谷之會不聞仲尼秦中九月黃葉始下長風西來烈烈飄野望君申弔亦雙來者巳乎一魂時也命也閲太史氏書見漢武之御極雖非求仁蹈道之主亦英雄之君也然觀其內傳有學神仙與築三山焉飲露餐霞希升汗漫激流延石用擬林泉嗚呼履其位而不知所以守好其事而不知所以從夫一物各異道萬彙不同致帝王之與神仙林泉之與朝市猶鱗㣥毛族川陸分之日居月諸晝夜常之麒麟不可又處泉蛟龍不可更居藪玉兔莫延於旦金烏莫瞻於宵附其翼者兩其足與其角者一其齒不兼之兼又理昭然帝者宜本於觀人仙者宜先於遠世以林泉為意者可居於藪澤以天下為念者可謹於朝廷是以唐堯虞舜無野心子晉許由辭寶祚誠以帝王於神仙有隔林泉將朝市難并也今據唐堯虞舜之地而求子晉許由之志不亦迂而可痛哉况君子所以歡心屈體為僕御元元所以刲膏割血為飽暖又非圖林泉而學仙也傷心久之戊辰歲秋八月周覽秦原次茂陵之下既覩永歸之地彌懷所行之事且夫承天統物豈無足稱之德歟蓋觀日月高明有時虧昃珠玉貞潔不免瑕疵徘徊路隅興言而弔曰赫赫兮炎靈降神造漢秦楚四葉重茂翹英薦新首出㣥龍卓為世祖秋風揚文夏日昭武柔不化之人闢未名之土雖殊仁聖之后是異凡庸之主伊何才有不周事非所事求非所求惟此帝謨相夫仙道魚處重淵獸居茂草辨乎朝市別以林泉日由旦陸月麗宵天迹既兩分理難齊剋若死將生猶南與北貪臣王公鞅掌者可以勤萬幾欲升汙漫逍遙者可以為匹夫愛深宮祕殿者可以垂旒纊好青山緑水者可以棲江湖飲露乘景激流貫都苟從同致實曰殊途堯舜曰聖巢由匪愚確乎守一亦以難俱况夫小人唯唯罔圖山水君子乾乾孰為神仙嗚呼哀哉前鑒孔彰高臺深池夫差以伐尋山越海嬴政其亡有一於此未或無殃胡為乃辰於窮厥方舟全虎臂車出羊腸巳臨燧炭幾絶苞桑反覆前聞痛心疾首藥石無人瑾瑜有垢暑來寒往時移代久吉壟將頽惡聲不朽日臨宇宙有時而虧目覩毫釐或不見眥將為而不知復知而故為嗚呼噫嘻嗚呼伏波之生好兵自喜幼有壯節騰聲出仕定册歸漢謨俞帝旨算無失畫功伐可紀破斬徵側實平交趾來征蠻溪未卒而死小人赤口曷本於理薏苡南還明珠謗起乃收侯印爵不及子唯德不忘愛留社里築廟以祭人敬其鬼久而若新千載不毀詁詁嗤嗤易白成緇孔子義失勛華不慈曾氏殺人母投於機居竊厥嫂陳平不疑申生置毒晉有驪姬是以無極巧舌伍奢族夷孟子傷讒淒兮作詩公失其所梁松實為何獨將軍自昔如斯故士有歷百代而不滅者嘗被訕於當時苟窺心而不怍雖棄置其奚悲赫赫聖帝嘉賢命祠酒斚既列神乎降思尚享
