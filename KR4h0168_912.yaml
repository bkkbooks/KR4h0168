front:
  text: 全唐文欽定全唐文卷九百十二無行乾封中荊州等界寺沙門
  hash: sha256:b138a2f86ff5f8a971f8f023f615a212ecc18b8cd3ac19c290432dd3e3ada260
  markers:
  - {type: head, offset: 13, content: 無行, id: KR4h0168_NFKB_912-h1, level: 1}
body:
  text: 余等登趾荊岑搜元秦嶺承律謨於上德聞所未聞稟清範於靈壇日新日損是以皇覺慈訓宏之在人祇樹高風幽心祥感幸逢嘉會瘞靈骨於福壇元綱載維想德愷之未遠不勝手舞景仰神光敢述元猷乃為贊曰覺智圓明應物唯靈非滅示滅無生現生為人演法三學開津場壇肅穆戒德氤氳金河晦影鶴樹澄神能仁散體多寶全身奇光昭晰嘉瑞攸陳二端尚在八斛猶均厥後無憂爰初啓信近護分光靈墳是鎮靈墳現奇震嶺標基扶風散彩淮海騰輝粵自荊岫尋真太一希世之風載揚茲日壇模山像登頓有秩鎮以遺身幽誠云畢願言遐曠克念崇尚識鏡澄明心河靜浪庶劫名之方消覿神珠於妙相道世字元惲避太宗偏諱以字行俗姓韓氏其先伊闕人祖代因官為京兆人年十二出家青龍寺顯慶中詔住慈恩寺復詔總持西明寺編法苑珠林至總章元年畢功竊聞白馬東遊三藏創茲而起青牛西逝二篇自此而興或闡元元以化民或明空空而救物檢之圖牒指掌可知所以發唱顯宗終乎此世釋教翻譯時代炳然文史備彰黎民不惑至如道家元籍斯則不然唯老子二篇李聃親闡自餘經制皆雜凡情何者前漢王褒造洞元經後漢張陵造靈寶經及章醮等二十四卷吳葛孝先造上清經晉世王浮造化胡經又鮑靖造三皇經齊朝陳顯明造六十四真步虛經梁陶宏景造太清經及衆醮儀十卷周武張賓之焦子順馬翼李運挑攬佛經一千餘卷隋輔惠祥改涅槃經為長安經笑道論曰道家妄注諸子三百五十卷為道經又按漢明帝時褚善信等總將道經諸子書等三十七部七百四十四卷晉葛洪神仙傳云老教所有度世消災之法凡九百三十卷符書等七十卷宋太始七年陸修靜答明帝云道家經書并藥方符圖等一千二百二十八卷云一千九十卷已行於世一百三十八卷猶在天宮又檢元都目録妄取藝文志書名矯注八百八十四卷為道經今元都經目云依中陸氏所上之目乃有六千三百六十三卷云二千四十卷見有其本四千三百二十三卷竝未見據此前數目有無不同虛妄明矣增加卷目添足篇章依傍佛經改頭換尾或言名山唱出或云仙洞飛來何乃黃領獨知英賢不覩書史無聞典籍不記請問道士後世之經為是老子別陳為是天尊更說縱其說也應有時方師資說處代年那月復是如何如其有據容可流行若也妄言理須焚翦伏願當今明朝云云原夫法身一相瞻仰異容正教無偏說聽殊旨故師有等兩之况弟子有異聞之說良以隨機授與逐器淺深至至如十二分教之大綱八萬法門之廣網龍宮西蓄未盡怒林之知象駕東馳豈窮手葉之誨是以不遊大海未覩沃日之奇不仰泰山靡覿干霄之狀得驪龍之珍乃驗魚目之非寶聽黃鐘之節方知擊缶之為細故知釋典幽宗聖凡所尚實人天之祕寶越儒墨之希聲威振大千光超巨億益覃沙界功逾塵劫宏濟之術其大矣哉但時緣未會感通有殊暨晨林變彩宵夢啓徵創開白馬之基漸被赤烏之嵗聖迹遐感年逾六百道俗蒙益等同一子慨正像侵移沿流末代凡情暗短器識昏迷日有澆醨教沈道喪所以彞章訛替教迹淪胥文句浩汗卒難尋覽故於顯慶年中讀一切經隨情逐要人堪行者善惡業報條出一千述篇三十勒成兩帙冀道俗流行傳燈有據敬尋釋典深奧非淺識之所知出俗幽微豈滯惑而能辨良由海大舟輕山高塵眇操刀易割製錦難成不揆庸識妄談祕典輒樹題目更增愧恧矣洪滿咸亨中潞州法興寺沙門王諱某字某隴西狄道人也曾祖太祖景皇帝祖元皇帝父高祖太武皇帝王即太武皇帝之第十三子往任潞州日於此山奉為先聖敬造石舍利塔一所下并有敕賜舍利骨叁漆粒造藏經三千卷觀夫大造遠契洪猷永貞庶績咸熙彞倫式敘莫不分茅土建諸侯延帝子於維藩降天孫於伯牧者矣伏惟大王通源聖澤寵位皇華松姿孤堅玉氣柔潤鎮靜方嶽聲政洽聞都督荊安惟德是順出守絳潞非賢勿居即何暮海沂之謠不足儔其匹也而乃洗心覺路虔誠妙門慈林山中雕礱寶塔智乘寺所裝飾真容藻繪具周慶讚將畢洪滿親承教旨躬奉綸言以拙補勤猥當檢校恐河海傾竭陵谷變移謹件先皇子孫勒諸貞石懷素俗姓范氏其先南陽人父強為左武衛長史遂為京兆人貞觀十九年從元奘出家居宏濟寺上元三年詔住西太原寺尋歸西京卒年七十四原夫鹿苑龍城啓尸羅之妙躅象巖鷲嶺開解脫之元宗於是三千大千受清凉而出火宅天上天下乘戒筏而越迷津內衆於是敷榮外徒由斯安樂其後韜真細㲲多聞折軸之憂掩正微言罕見浮囊之固即有飲光秀出維絶紐而虛求波離聿興振隤網而幽贊慧炬於焉重朗戒海由是再清其律教也宏深固難得而遍舉此羯磨者則紹隆之正術匡護之宏規宗緒歸於五篇濫觴起於四分實菩提之機要誠涅槃之津涉者也素以鋭思弱齡留情斯旨眇觀至教式考義途亟歷炎涼庶無大過誤耳然自古諸德取解不同各述異端總有五本一本一卷曹魏鎧律師於許都集一本一卷曹魏曇諦於雒陽集一本一卷元魏光律師於鄴下集一本兩卷隋願律師於并州撰一本一卷唐宣律師於京兆撰素於諸家撰集莫不研尋校理求文抑多乖舛遂以不敏輒述幽深分為三卷勒成一部庶無增減以適時機祇取成文非敢穿鑿唯願戒珠增照叶日月而齊明繫草傳芳與天地而同朽後之覽者知斯志焉夫戒者乃是定慧之宏基聖賢之妙趾窮八正之道盡七覺之源然既樹五制之良規傳須獲實揚六和之清訓覺者知詮竊尋流行總有四本據其理雖復同會其文則有異致使宏揚失於宗敘修奉乖於行儀虧鹿野之微言紊龍城之要旨故今詳檢律本參驗戒心依於正文録之如左庶使順菩提之妙道成實相之嘉謀作六趣之舟航為三乘之軌躅者也老僧在長沙食魚及來長安城中多食肉又為常流所笑深為不便故久病不能多書實愧豫報諸公興善之會當得扶羸也即日懷素藏真白法才儀鳳中法性寺沙門佛祖興世信非偶然昔宋朝求那跋他三藏建茲戒壇豫識曰後當有肉身菩薩受戒於此梁天監元年又有梵僧智藥三藏航海而至自西竺持來菩提樹一株植於戒壇前立碑云吾過後一百六十年當有肉身菩薩來此樹下開演上乘度無量衆真儒佛心印之法王也今能禪師正月八日抵此因論風幡語而與宗法師說無上道宗踴躍欣慶昔所未聞遂詰得法端由於十五日暜會四衆為師祝髮二月八日集諸名德受具足戒既而於菩提樹下開單傳宗旨一如昔讖法才遂募衆緣建茲浮屠瘞樿師髮一旦落成八面嚴潔騰空七層端如湧出偉歟禪師法力之厚彈指即遂萬古嘉猷巍然不磨聊敘梗概以紀嵗月云儀鳳元年嵗次丙子吾佛生日法性寺住持法才謹識復禮俗姓皇甫氏出家住興善寺永隆二年詔問釋典稽疑十條復禮撰十門辨惑論三卷上進權文學聲冠應行地參園綺縉紳嘉其令望緇素挹其芳猷而頃著十疑干我二諦公孫生之聰辨自昔難酬含利子之雄才嗟今莫擬豈當仁而抗議試言志以成文必也正名乎稱之曰十門辨惑雖詩云勸誡蔽之可幾乎一言而法唯祕密述之敢忘乎三轉遂取類觀象載盈卷軸煩而無當有愧知音者焉圓測永隆末京師西明寺沙門夫塔者梵之稱譯者謂之墳或方或圓厥製多緒乍琢乍璞文質異宜并以封樹遺靈扃鈴法藏冀表河沙之德庶酬塵劫之勞豈伊弓劍衣冠言申永慕禹陵孔壁用顯緘藏而已哉將有量等大千覆三界而高梵世取均菴果偶棗葉而譬針鋒洪纖兩途福應無二大小千計淨心終一何只黃金白玉架迥爭暉火齊水精浮空競彩夕震祥飇之響入鏤鐸以流清晨霏仙露之甘上雕盤以凝泫至乃位隆三果勳重四禪高升有頂之宮行屆無災之地斯教之宏旨也此經以永隆元年冬十一月十五日請天竺法師地婆訶羅與西明寺沙門圓測等五人於宏福道場奉詔宣譯至其年十二月八日終其文義庶斯法寶周給大千俾彼慧燈照融三界云爾靈廓永昌時沙門碑前闕兩行半計一百十六字高躅者惟闕一字明明闕五十六字周闕六字尚闕一字輔闕二字茂闕七字摛祥金車闕四字祖闕三字任闕七字垂仁位居闕三十二字州刺史闕一字陵郡開國公食邑七百戶祖諱昱梁衡山郡太守闕十九字上儀同三司闕三字三州刺史闕二十三字湛叔度之闕一字陂闕一字雲千里搏風九萬闕二字珠之闕一字器宏略闕十九字崇班闕二字仁闕一字方膺厚秩闕三字武異代同榮父諱瓚梁著作隨西闕一字司功闕三字朝闕一字州清池縣令介州司馬上柱國丹陽縣開國公月宇干峙闕六字山闕十三字兩儀之闕一字氣黃中玉潤應九德之淳和林林服武庫之鋒灼灼闕一字翰林之闕一字曩者伏闕一字宏贍方闕一字著作之榮闕三字高言從展驥之職而芳徽懿範闕十字通闕四字州刺史安西都護上柱國燕容縣開國公局度端凝幹能強濟量包江海氣蘊風雲孕彼人英闕一字茲天爵委質從政踐丹地而光緝帝猷露冕頒條闢彤帷而宏闕五字闢房之故事則闕一字冠當時嗣伯舉之高蹤乃榮超望表馮野王之兄弟璧合珠聯潘安仁之闕一字德花明錦繢豈與夫八龍騰藹照灼前書兩鳳飛英鏘洋後葉而已公積慶藍田耿長虹之闕二字分枝闕一字菀挺闕一字日之闕六字天姿韶亮儼乎風骨闕一字川三篋洞曉神機洛陽萬卷暗符靈府言泉瀉態接翰海以疏瀾闕一字圃含葩擁詞條而振縟玉帳金壇之妙回鸞返鵲之奇緑沈明月之闕五字之刃闕二字懷抱囊括古今闕一字萬善於心臺問㣥言於玉吻晉司空之博物才敷辨劍之言魯司寇之多聞猶述對日之說含章闕二字豈曰同年既而漸陸遷鶯即撫翔鵷之化登闕七字之闕一字至總章元年特授使持節廓州諸軍事守廓州刺史散官如故總章二年授使持節渭州諸軍事渭州刺史散官如故至咸亨元年闕一字使持節都督十五州諸軍事守池州刺史闕十一字演雅克劭幹略兼優歷職闕二字才挺仁明之譽攝官方鎮載彰撫馭之材即試為真允光朝命六年轉授闕二字都督七州諸軍事守都州刺史散官如故詔云體質闕十字克播威闕九字其年轉授使持節許州諸軍事守許州刺史散官如故至咸亨五年授中散大夫使持節都督四州諸軍事守秦州都督詔云器識沈敏理懷開闕十四字孤闕七字崇朝闕二字秩奧藩至上元二年授使持節始州諸軍事守始州刺史散官如故既而綬結闕五字花之院印回龜紐光浮蓮葉之津闕一字仁則闕二字春風闕一字教則闕七字寄闕四字至儀鳳四年授中大夫使持節都督四州諸軍事守梁州刺史散官如故至調露元年授使持節恆州諸軍事守恆州刺史散官如故詔云闕一字質端闕二字用強闕十七字審官求材實資僉議至宏道元年轉授使持節宣州諸軍事守宣州刺史闕四字如故公乃闕二字馳傳應八命以遐臨建節飛驂綜七闕一字而闕二十二字私書闕二字每杏花春縟勤黛耜於龍鱗階蟀秋吟整鵷紋於錦室鯉庭聞訓闕五字之闕一字圜土闕二字怪氣息長闕一字之坂三辰既朗笑祖逖之闕二十七字左雄之廉儉六條備舉化軼兩岐百城仰德恩隆五袴倉廩闕一字實闕二字行四闕三字父之歡千里浹神明之訓家殷俗阜闕三十字千㣥闕一字馬闕三字之陳闕一字沙萬計霜戈騰照日之鋒自謂闕二字九闕七字兩柄雄據一方品彙嗷然側足無地公以闕五字奉詔闕六字風闕一字草闕六字振羽字遙飛低闕一字回塗指日闕一字屆遂乃躬率子弟架御氓黎示以禍福之門闕一字以短長之闕一字溫闕一字一灑人思挾纊之恩美喻才霑士積投醪之闕一字斷闕一字飛灰之闕九字之闕三字四馬公乃運不測之深智縱無窮之遠圖或左犄而扼其喉或右粗以燃其腹提戈擐甲接闕三字一鼓騰威九嬰俄戮斯實天波廣運廟略闕二十二字之績既覃飲至之歌方永若乃忠為令德孝實天經非忠無以奉帝圖非孝何以通幽顯豈與王闕一字淚柏宏演納肝總而為言公實闕一字矣况闕十二字規挹清瀾而結戀雙桐車蘭景曳履之響由存五柳低陰納駟之聲尚在而懷章舊邸遽踐通德之門闕二字旋鄉還履貴遊之路往者相如入蜀珂喧濯錦之津買臣闕二字磬駭藏符之闕二字若蓬山羽客振手長辭桂陽仙鶴留歌永逝至垂拱四年轉授使持節相州諸軍事相州刺史勳封如故詔云襟情敏裕器局恬和早分符瑞之職歷授方隅之任其年十月闕三字州刺史加兼闕五字封闕二字縣開國侯詔云志識沉敏格器端和早升榮祿頻參重寄論功比德何其謬歟乃有野徑樵夫江皋逸客闕三字子服冕王孫相與抗聲各揚言曰夫立功闕四字寄於闕九字播闕二字乎闕一字素豈使歸軿儼蓋攀轅無可逮之悲去鷁騰漪挽軸有傷心之痛道士陶闕一字僧道元僧曇紹僧惠闕一字僧宏闕一字僧智矩僧元濟僧惠幹周元允陶紹真陸闕十九字及州縣吏人等六萬餘戶惜棠陰之易遠徒留勿翦之詩闕一字日御闕一字難羈空切銷魂之賦若不闕一字茲紺闕一字無以絢彼清猷庶使寰海揚塵而德聲無絶銘曰闕三字胄伊祁命族派演瓊闕一字枝分若木迹膺星象靈摛嶽瀆左貂右蟬丹輪朱轂其一龍生渥水玉産藍田誕茲人傑孕此英賢匡周翼漢裂壤開㙻蛇蟠結組龜紐乘蓮其二天縱挺生黃中通理闕二字九棘功闕一字四履珥筆龍扃含香帝扆基仁踐孝淵渟嶽峙其三藝殫元圃學富蓬臺花箋闕五字開碧雞雄辨雕虬逸才吞應納謝含鄒孕枚其四建節班條褰䄡問俗恩歸五袴闕一字存闕四字如闕一字捐闕一字似粟青梧鳳丹黃沙草緑其五愛洽惸嫠信霑童馬懷忠據德矜孤恤寡蝗移獸去錦開鵷下雊麥分岐吟蟬被野其六馳驂故里懷章舊館喧盧靜夜鳴雞警旦榮慶兩歸簪紱雙闕八字岸其七來暮悽歌去思纏想勳銘鼐鼎恩留葦杖日新月故風歸雲往俾令範與嘉聲永鏤績於窮壤其八志靜永昌中定覺寺沙門佛頂尊勝陀羅尼經者婆羅門僧佛陀波利儀鳳元年從西國來至此土到五臺山次遂五體投地向山頂禮曰如來滅後衆聖潛靈唯有大士文殊師利於此山中汲引蒼生教諸菩薩波利所恨生逢八難不覩聖容遠涉流沙故來敬謁伏乞大慈大悲暜覆令見尊儀言已悲泣兩淚向山頂禮禮已舉頭忽見一老人從山中出來遂作婆羅門語謂僧曰法師情存慕道追訪聖蹤不憚劬勞遠尋遺跡然漢地衆生多造罪業出家之輩亦多犯戒律唯有佛頂尊勝陀羅尼經能滅除惡業未知法師頗將此經來不僧曰貧道直來禮謁不將經來老人曰既不將經空來何益縱見文殊亦何必識師可却向西國取此經來流傳漢土即是遍奉衆聖廣利㣥生拯濟幽明報諸佛恩也師取經來至此弟子當示師文殊師利菩薩所在僧聞此語不勝喜躍遂裁抑悲淚至心敬禮舉頭之頃忽不見老人其僧驚愕倍更虔心繫念傾城回還西國取佛頂尊勝陀羅尼經至永淳二年回至西京具以上事聞奏大帝大帝遂將其本入內請日照三藏法師及敕司賓寺典客令杜行顗等共譯此經敕施僧絹三十匹其經本禁在內不出其僧悲泣奏曰貧道捐軀委命遠取經來情望暜濟㣥生救拔苦難不以財寶為念不以名利關懷請還經本流行庶望含靈同益帝遂留翻得之經還僧梵本其僧得梵本將向西明寺訪得解善梵語漢僧順貞奏共翻譯帝隨其請僧遂對諸大德共順貞翻譯譯訖僧將梵本向五臺山入山於今不出今前後翻兩本竝流行於世小小語有不同者幸勿怪焉至垂拱三年定覺寺主僧志靜因停在神都魏國東寺親見日照三藏法師問其逗留一如上說志靜遂就三藏法師咨受神呪法師於是口宣梵旨經二七日句句委授具足梵音一無差失仍更取舊翻梵本勘校所有脫錯悉皆改定其呪初注云最後別翻者是也其呪句稍異於杜令所翻者其新呪改定不錯并注其音訖後有學者幸詳此焉至永昌元年八月於大敬愛寺見西明寺上座澄法師問其逗留亦如前說其翻經僧順貞見在西明寺此經救拔幽顯最不可思議恐學者不知故具録委曲以傳未悟
