front:
  text: 全唐文欽定全唐文卷八百七十七崇義文圭子事南唐嗣主官至學士歷樞密使嗣主遷南都輔太子留守金陵進右僕射同平章事開寶二年罷為潤州節度使仍同平章事及貶制度以司空知左右內史事入宋避宣祖廟諱易姓曰湯
  hash: sha256:600f865e46d8773706ecac6e6a56965103a36e05a4c6aaedf45ea6a1fbe27bea
  markers:
  - {type: head, offset: 14, content: 殷崇義, id: KR4h0168_NFKB_877-h1, level: 1}
body:
  text: 高安祈仙觀者黃真君之舊居也據西安之兌宮鎮洪都之坤位前瞻緱嶺行聞子晉之笙後倚華林坐挹浮邱之袂原滋丹草率白雉以相從谷秀蒼筤競紅鸞而下翥境異則龜常見石物靈則泉或浮金紺宇相望轇轕神居之表琳房互映連延陰洞之間自為小有之東窗宛是童初之學府真君紫邱精粹玉版飛英宗派流長叱石遠懷於仙祖元門天合結褵因慶於法妻自振翼毗陵曳裾海岱屯期方遘降身參政事之官宿命俄通褒德備尚書之位若乃窮神不測示現無方乘龍初夜之歸常游萬里鳴鳳中霄之際密贊諸方寶節乘空大使授元圖之命玉函應召上公宣入室之人悟草鹿以趨火庭瞻錦帷而佩丹訣陰功潛運已積德於三千貞品俄升遂登名於十二念雁行之莫接密契宜留相鵠篆以時歸人心自注即於舊里尋建嚴祠其或牛野風高兔輪秋半仙登接晝齊莊虔億萬之詞羽蓋浮空朝會奉姻親之禮始乎東晉垂及皇唐金義紀遺洲將陵遷而不改毬存墜石必久地以恆堅既而九鼎載移山嶽之驚塵散起五龍爰作干戈之積數常存法壞浮屠寧獨金剛下淚教頽象罔旋悲玉碗飛天乃觀恬寞之鄉遽變寂寥之境垝垣接野或認鹿場復屋騫甍久穿雀角事必符於有待時特鬱於重興國家味三五之道腴開東南之帝籙赤符應運纘承爰立於漢基金德更王揖讓乃由於吳禪西母之白環入貢不假祈禳元元之玉像降神自嚴樽俎聖上配乾坤而居六合揭日月以步三階屈已臨人動懷慈寶雖凝旒南面傳夏嗣以承祧而納麓東郊舉堯元而作相每隆大義追奉故君緬勝果以興思察茲宮於已圯况像嚴十聖一方之異氣遐連觀號三皇百里之慶雲何在因宸心之有屬流明詔以亟行鸞鶴靈遊共白雲而不返珠琛遺貺與烏號而並存重開大壯之模俾就僝工之費營室仰稽於中候豫章俯擇於宏材削墨公輸爰恢崇構範金段氏即運洪爐肖人散璧王之元繪事發晴霞之色健栭岪鬱寫祕殿以翬飛鏤楶紆徐儼回軒而櫛比中建巖巖之石九級星壇外森落落之松千尋雲路周阿玉樹合輝霍以長春重闥金鋪泛曈曨而鎮曉自可包藏靈囿昭晰華宮林薦葳蕤戶內廣肆筵之所唱高窈窕廡間宏按節之儀固足以十絶靈幅邀帝君而戾止九貞逸駕延夏禹以時遊寧惟崇大道之津梁實以感㣥生之耳目者也熙載字叔言濰州北海人後唐同光中擢進士第奔吳補校書郎出為滁和常三州從事南唐代吳召為校書郎嗣主襲位纍除中書舍人拜戶部侍郎後主襲位改吏部侍郎拜兵部尚書坐托疾不朝謫授太子右庶子分司南都復為兵部尚書拜中書侍郎充光政殿學士承旨開寶二年卒年六十九贈右僕射同平章事諡文靖粵自結繩初代爰申弧矢之威執玉已旋遞設金湯之險逮至七雄闢土二霸專征其或盟約未敷則崇百雉而以尊王室仇讎尚熾復嚴入襲而用保邦家由是九服畏威諸侯述職式閭懋德仍垂裕於後昆定鼎洪基固重光於奕世及其素靈有國炎政披圖未嘗不廣樹藩防久司方面帶河阻險將制敵以平堅高壘深溝遂取威而定霸邇後五方分鼎六代乘龍咸皆高跖前規重席故範雖復寢扄靜柝已無伺隙之虞然而列郡通都常有盤石之固則知百王遺式歷代所因利用建侯率由斯道者也我唐中興三葉聖歷再周貞觀不違飛沉自若義聲騰於九有靈光施于八埏國步已康而關防益謹用張下武大展雄圖載習五兵克殲勍敵重營堅壁以制不庭乃詔寧國軍節度使檢校太尉同中書門下平章事都督宣州諸軍事宣州刺史濟南公築此新城者矣公擢陰陽之秀氣含川嶽之上靈才為時生榮不世出心堅鐵石氣激風雲森武庫之戈矛壯私門之營壘負沉舟之勇竟折鋭以摧堅沉背水之機必追奔而逐北義征不譓方圖煙閣之形功濟多堅更鏤昆吾之鼎所以謺縻天爵頻擁隼旟政理洽旬仁風載路牙帳荷絶甘之惠編閭興來暮之謠況寧國重藩宣城粵壤星分牛斗地控荊吳扼天下之咽喉作關東之襟帶雄加侯甸必須良將之籌謀勢壓江山實假崇垣之壯麗於是特飛鳳詔命展金墉公乃選五稼豐登三農閒隙遂敷心計因著土功是以將校呈規工徒獻藝士皆樂往民以悅來荷長鍤以成雲陳豐畚而翳日因高就遠以日繼時萬堞方成堅同石堡四門始畢儼若玉關爰自壬戍歲二月興役至癸亥年三月畢工所築新城自金光門西北轉至舊城崇德門東北角長五里三百三十三步從崇德門以南轉至金光門東長四里三百三十步新舊城共長一十里一百九十三步新開濠塹亦從金光門繞新城轉透出大溪長八百九十四丈深三丈有餘造成大樓八所其諸敵樓橋道等不可殫書公前在京口日浚溝池崇壁壘洎移鎮撫復繕城隍凡標準地形督責功力委蛇延袤必躬必親日久而休曾無倦意牛酒犒士絲綸賞功士卒塗塈月日相望公又釀醪醴豢犧牲三日一餉軍夫五日一享將校由是萬民負畚咸悅豫以忘勞列校褰裳稟威嚴而盡力其動也山回地轉勢若奔雷其靜也雨息風恬齊如翦紙數年之役朞月而成觀其千雉豐餘重門超忽飛閣神行而聳漢旋題月照以羅空層簷翼舒雕楹虬躍高陴矗而山屹方櫳豁以洞開排畫桷以星攢下臨無地走長廊而雲布橫射遙天而又列一帶之寒山自為天塹環千尋之深洫宛是湯池固可藩屏王宮折衝萬里者也懿乎哉城之為役也暫勞永逸既不騫而不崩有備無虞信可大而可久銘工勒石以播無窮其詞曰於赫有命洪惟我唐中興奕葉三聖垂光王猷允塞靈貺孔章賢士在位猛士守方王公設險以守其國重門擊柝以待暴客況此宣城國之閫閾不有金湯何為控扼烈烈虎臣爰茲鎮收廉問方期仁風載沐寅承廟算允因玉燭遂度土功乃陳畚鍤經之營之壘堞疏流萬尋淵引千雉雲浮石堡玉關鐵瓮金甌雄加九服麗絶方州飛簷鳳舉畫拱龍攄謺碧鴛兮霧合亘長雲兮翼舒何巨防之可比視方城其蔑如勒勳績於貞石作藩屏於皇居癸亥歲十月五日建諸佛慈悲常容悔過宣尼聖哲亦許自新臣無橫草之功可補於國有滔天之罪自纍其身羸形雖在壯節全消滿船稚子嬰兒盡室行啼坐哭狂風孤燭病身那得長存萬水千山回首不堪永訣熙載本貫齊州隱居嵩嶽雖叨科第且晦姓名今則慕義來朝假身為賈既及疆境合貢行藏愚聞釣巨鼇者不投取魚之餌斷長鯨者非用割雞之刀是故有經邦治亂之才可以踐股肱輔弼之位得之則佐時成績救萬姓之焦熬失之則遁世藏名臥一山之蒼翠某妄思幼稚便異諸童竹馬蒿弓固罔親於好弄杏壇槐里寧不倦於修身但厲志以為文每棲身而學武得麟經於泗水寧怪異圖授豹略於邳圯方酣勇戰占惟奇骨夢以生松敢期墜印之文上愧擔簦之路於是攖龍頷編虎鬚繕獻捷之師徒築受降之城壘爭雄筆陳決勝詞鋒運陳平之六奇飛魯連之一箭場中勍敵不攻而自立降旗天下鴻儒遙望而盡摧堅壘橫行四海高步出㣥姓名遽列於煙霄行止遂離於塵俗且口有舌而手有筆腰有劍而袖有鎚時方亂離迹猶飄泛徒以術精韜略氣激雲霓箕口張而陰電搖怒吻發而暑雷動神驅鬼殿天蓋地車鬬霹靂於雲中未為蹻捷喝樗蒲於筵上不是口豪蘊機權而自有英雄仗徑節而豈甘貧賤但攘袂叱咤拔劍長嗟不偶良時孰能言志既逢昭代合展壯圖伏聞大吳肇基聿修文教聯顯懿於中土走明恩于外方萬邦咸貞四海如砥燮和天地巖廊有禹稷皋陶灑掃煙塵藩翰有韓彭衛霍豈獨漢稱三傑周舉十人凝王氣於神都吐祥光於丹闕急賢共理侔漢氏之懸科待旦旁求類周人之設學而又鄰邦接畛敵境連封一條雞犬相聞兩岸馬牛相望彼則待之以力數年而頗見傾亡此則禮之以賢一坐而更無騷動由是見盛衰之勢審吉凶之機得不上順天心次量人事且向陽背暗捨短從長聖賢所圖古今一致然而出青山而裹足渡長淮而棄繻派遙終赴於天池星遠須環於帝座是攜長策來詣大朝伏惟司空楚劍倚天秦松發地言雄武則平窺綘灌語兵機則高掩孫吳經受素王書傳元女莫不鞭撻宇宙驅役風雷勞愁積而髀肉生憤氣激而臂臠起一怒而豺狼竄攝再呼而神鬼愁驚捶蠻鼓而簸朱旗雷奔電走掉燕鎚而揮白刃斗落星飛命將拉龍使兵合虎可以力平鯨海可以拳擊鼇山破堅每自於先登敵無不克策馬常時於後殿功乃非矜國家賴如股肱邊境用為保陳勳藏盟府名鏤景鐘今則化舉六條地方千里示之以寬猛化之以溫恭繕甲兵而耀武威綏戶口而恤農事漫灑隨車之雨洗活嘉田輕搖逐扇之風吹消沴氣可謂仁而有斷謙而逾光賢豪向義以歸心奸宄望風而屏迹佇見秉旄仗鉞列土分茅修我貢以勤王控臨四海率諸侯而定霸彈壓八方遐邇具瞻威名洽著況復設庭燎以待士開雪宮以禮賢前席請論其韜鈐危坐願聞於興廢古今英傑孰可比方某才越通流已觀至化及陳上謁罔棄謏才是敢輒述行藏鋪盡毫幅況聞鳥有鳳魚有龍草有芝泉有醴斯皆嘉瑞出應昌期某處士倫謬知人理是以副明君之獎善恢聖代之樂賢昔婁敬布衣上言於漢祖曹劌草澤陳謀於魯公失范增而項氏不興得呂望而周朝遂霸使遠人之來格實至德之克昭謹具行止如前伏請准式順義六年七月歸闕一字進士韓熙載狀道生一一氣剖是為二儀二儀分是為萬象故天得以覆地得以載日月得以晦明川嶽得以融結四時迭運五才以序於是乎俶有生人樹之司牧當茲時也天下為公大道未隱故不言而化無為而治逮夫裁道以成德先仁而後義禮樂既設巧僞遂生聖人猶是著元言開妙鍵蓋將拯其弊而反其源也道也者其大矣哉用之私則可以駕景躡虛拔一身於塵滓用之公則可以還淳反素驅蒼生於仁壽噫天下奉其教尊其像宮館相望者豈徒然哉我國家墜業復興澆風漸革皇上受天明命纘帝丕基思致時雍精求化本故能序百揆敦九族五音克諧㣥望用秩人和既感天瑞亦臻允所謂孝格乎上元而政符於大道矣以為崇清淨之教則務在於化人飾元元之祠則義存於尊祖於是乎名山福地勝境靈蹤壞室頽垣荒壇廢址咸期完葺式表興隆廬山之陽有女真觀曰崇善松門蘚磴蘿蔦交陰層巒浚流嵐靄相接怪石古木峭壁懸崖怪狀奇姿望欲騰擲千尋落水飛靜練於林端萬仞危峯聳寒青於天半晝夜若風雨盛夏如素秋高岡密林豁達蓊鬱信洞府之絶境神仙之勝遊也而庭廡荒涼殿堂傾側醮壇丹井但有榛無古像隳簷略存香火是觀有女道士楊保宗者浮虛早悟清淨自持卻粒鍊形幽棲巖谷勤行之績達於九重雲暫出於碧山鶴少留於丹禁乃訴其頽軒未葺真侶奚依欲就良因實資帝力上俞其請賜以金錢六宮之中競施服玩珠珍綵繡璀錯輝煌載之旋歸計逾千萬於是廠徒度費即舊創新經之營之厥功遄就爾其為狀也則坱圠低昂紛敷粲章間以金碧飾以銀黃層櫨次第以鱗集廠宇參差而翼張鏤盤虬於密石圖悍獸於飛梁下窈窕以宏麗上嵳峩兮煒煌寶鐸玲琅鏗宮韻商望之者愕眙聽之者淒涼何蓬萊與方丈忽山峙而鸞翔夫其架飛觀以千霄豁丹扉而瞰野回廊夭矯以岡屬正殿崔嵬而雲竦墉垣繚繞鈎楯連延礱翠炎以為壇範真金而作像道場嚴肅繪塑精明聖祖靈官儼然如在軒甍互映丹漆相鮮層殿初成但有窺窗之女還丹儻就寧無奔月之人靈草奇花千名萬品間以芳樹洗其密篠導以清流濬為渟沼扶疏葱蒨演漾泓澄年年有異木含春疑遊閬苑夜夜而寒泉浸月似到瑤池若乃環珮珊珊笙磬寥寥陟星壇於月夕會真侶於霜朝唱步虛於縹眇動霞帔之飄颻朝禮將終起彤雲於丹井靈仙若下盤皓鶴於煙霄顯敞幽陰奇特王褱美雖鬼功神運亦無以加足以增氣象於江山誇壯麗於宮觀也卓矣乎清淨之門既闢元元之像又嚴固將扇以真風惇其孝治皇王能事孰與為先乃錫號曰真風賜女真楊保宗紫衣旌其幹也下臣承詔作為是詩美其功也道未形時無有一物形既有矣萬象紛出一動一靜一出一沒運轉無窮到於今日中有大道則之者誰明明我后亦公亦私百官承式品物其宜端拱而坐融融怡怡洪惟我祖實道之主闡教利人與天同溥吾君奉之為棟為宇欲化頽風重為邃古廬山之高兮高莫窮隱映萬壑岧嶢數峰如削如畫凌摩碧空上有懸流之百丈恆噴雪而號風下瞰長江之九派時吐霧而隱虹白雲兮翠靄密竹兮高松清猿之與幽鳥恣吟嘯乎其中修鍊之徒或釋或老亦有㣥儒是論是討簡寂之前崇善為號女真居焉研味其道制作之野同乎草樓荒涼古迹寂寞靈游久而未葺抑有其由良緣所屬非聖而疇㣥材既集哲匠有程攢櫨簇栱結棟飛甍銀鋪飾戶玉礎承楹傅以朱緑垂之璧瑛殿儼尊相旁羅衆真如聞大道似演長生修廊環布以曼衍危樓對峙而崢嶸矗如山立赩若霞明望之則煥爛晶熒若經天台兮睹赤城就之則想像威靈若登丹邱兮趨福庭天子聞之而動色於是乎錫真風以為名保大五年歲次丁未八月壬午朔二十八日巳酉虞部郎中韓熙載記嘗試論之總兩儀二曜八卦五行而播為四時成乎萬化者惟陰與陽相蕩相摩而已矣然則剛柔靡殊奇偶相待故火數二而成七坎為男而本陰由斯以推則火得其寒水得其熱亦理之常也又意其泉脈通乎暘谷每天輪激轉則太陽煎其下及炎精迅發又積壤鎮於上會其迸泄泉猶沸然是以方輿之間往往而出此又得之於意表也或曰有湯之處下積流黃厥論紛然未知孰是烏江縣有湯泉古院在縣北七十五里大路之西江流其東滁汛於後龍洞在其前連山注其右藂林隱藹岡嶺縈回金地寶階纚連遺址天佑甲子年有江都開元寺惠鏡上人者道廣行堅貌淳心古倦捧帙於講肄將持榼而遠遊經此靈泉喟然駐錫且曰受佛付囑行佛慈悲是則祛幻身疾苦之資施衆生安穩之所欲宏利益捨此何之乃有鄉人秦岌秦璩為檀信之首上人手剗荊躬捨一九冰礫茅簷始葺蔽病士之風霜桂殿徐營備游人之瞻禮從甲子距壬戌住持凡六十載於茲矣當其間也龍爭虎鬬山昏海沸控洪河之阻詎免侵凌越青泥之巔亦聞塗炭唯長淮之表大江之南萬里封疆兩朝清謐人和歲稔君明臣賢外戶不關到於今日所以上人安住於此得行其心焉凡供養來往緇流萬有餘衆造聖賢形像四十餘身建三門房廊鐘樓堂殿屋宇大小總六十間粉壁丹楹霞明月皎香厨豐潔佛事精嚴法侶從之如泉赴壑又敕賜湯院逾七十間揮鍤運斤為土為水既宏且壯不飾不雕其東西二湯相去百步源清流潔味美香和澡身而漸失瘡痍飲腹而都忘熱惱雖涼泉灑窮子之面甘露沃餓鬼之心若論其利濟無窮曾何足比故男女緇素道路纍纍呻吟而來笑語而去前後蠲除疾疹二萬其徒允所謂心有所便而施無求報矣今上嘉其苦節錫以華鐘舂容在懸洪纎斯應聞而悟道信可度人上人布褐長齊自幼及老護戒無缺勤心不渝鄉閭耆年敬若諸佛又雅好賓客謹於接對遊人旅客憔悴輕肥其來如歸待必平等門人同學各盡所長和汝唱豫其徒有九慧登師進典常住慧深營供施承規主功德承矩承儼省真承晦承義應門戶肘臂相運不為胡成下官左宦歷陽寓居佛廟鏡公一日忽然而來聽談厥由諷我刊石敘事之竟為辭美之曰天地造化孰云難測陰陽變通人或可識晝夜不定水火相激鼎沸雲蒸無窮無息教亦有說斯為靈湯探之則熱赴且無傷惡疾能愈微疴可量或飲或浴心寧體康基構已平源流空在風雨雪霜人焉攸賴蓬蒿埋沒多歷年載高僧聿來崇茲勝概若樓若殿若房若廊若廩之贍若厨之香若來若去若緇若黃萬有餘衆曾棲此堂甄土導泉上棟下宇捷獵高簷環旋峻堵四達纍纍呻吟傴僂二萬其徒沉疴獲愈鏡也惟仁心真貌淳麻衣粒食苦思勞身本願云畢斯文以陳永永金石傳諸後人闕三字婆以清淨妙心伏迦葉波迦葉而下以心闕二字二十八傳珠聯印度一花五葉香散支那降及曹溪得法者衆然則以一念攝於多法以一塵統於沙界此念此塵彼界彼法二俱不有空亦非斷明是法者於大悲海運普濟舟開無相門演不二法化有情於一旨獲當果於上乘是之謂大善知識者元寂禪師其人也師名隱微豫章新淦人也夫其珠生媚澤玉蘊良山留潤入纒必歸族姓故有楊氏之託焉異人之生闕二字奇應既闕三字亦表厥靈故有光明鑒室之祥焉軒冕為纍身之資鼎鐘乃爽口之具孔翠彬蔚網罟隨之鴻鶴清素霄漢自得故有棄俗之誓焉開無師智歸不二門夫為在家則有師闕一字七歲詣闕四字院道闕一字禪師闕一字弟子二十依洪州闕一字元寺智稱律師受具戒既還而歎曰沙門者達本識心之謂也且戒惠之學未足明心闕一字滅之宗方為了義清山有路白雲無心我之闕一字行豈復他日遂遍尋名嶽歷抵禪林順義中卷衣南行遐趨五嶺羅山法寶大師巖頭真子德嶺桂孫智鏡當臺共仰不疲之鑑鴻鐘在簴咸聆應扣之音師既解士冖䂞雲堂端襟下榻玉處石而光華尚隱虎在山而清嘯難藏扣我機緣自知時節先是羅山有師子在窟出窟之句海內風傳一日法座高登海徒雲萃師遽前而禮峻發問端羅山道眼素明偉師崷崒抗聲酬詰衆莫之知俄於欲諾之間豁然大悟自是朝昏隨衆語默全真放曠四儀盤桓數稔異日羅山以師大緣將至苦諷還鄉太和中杖策離㣥擔簦度嶺漸回江介涂次龍泉邑宰李孟俊一覩道姿深加凝注邑有十善蘭若經廢時多願言葺興強師駐錫冀揚大法用福蒸民師具順隨之心盡檀那之請元徒輻湊淨供山儲應接隨宜了無滯礙有問如何是十善橋云險過者如何云喪參乎祖道一以貫之問而數窮答有餘力達深德妙斯之謂歟時先朝端拱萬機穆清大寶遠懷道德思結深因保大九年始自龍泉詔歸鳳闕命住龍光梵剎賜號覺寂禪師高闡一音將逾數歲改賜奉先禪院用邇皇居辛酉歲將有事於省方利建邦於洪井千乘萬騎咸從於和鑾奇士高人必先於行在師首預清列簡自宸衷既抵新都復住大寧禪院誨人無斁學者有歸逮於鼎成之期難豫因山之會言念三世諸佛皆入涅槃吾獨何人自甘遲莫其歲十月見病者相臥方丈中是月二十七日剃髮浴身升堂別衆勤宣祖意勉勗後流語訖安然形留氣盡俗壽七十六僧臘五十六諡元寂禪師塔名常寂歲在壬戍二月六日歸葬於吉州吉水縣仁壽鄉太平里之原遵遺誡也今元帥鄭王備嘗道味時任保釐巨捨信財俾營塔廟惟師夙宏道願應生像年道峻德充名符實備貌孤神王語淡氣幽情高而月冷闕一字空格峭而雲生碧嶠以慈音而演法用實智以化人故得分契王臣心歸緇素俄昏慧炬永絶微言贍道貌以長乖覽清徽而徒在龍泉廣福十善禪院嗣法弟子契任行常相續住持小師自明自滿七十三人懼歲時之浸遠恐陵谷之貿遷願紀金碑以旌元壤其辭曰三界茫然兮四生蠢爾背覺合塵兮死此生彼有鑠開士兮乘悲應世端坐寶牀兮片言析理道價既高兮回心天子慈風又扇兮服膺多士遠近瞻渴兮慕羶以至白黑合禮兮得坻皆止大緣告終兮魔雲忽起覺日云沉兮法幢遂靡傳心羅山兮訓徒帝里韜真豫章兮歸歟吉水金骨藏山兮德音無已寶塔鎮地兮來者斯企
