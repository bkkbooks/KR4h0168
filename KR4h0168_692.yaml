  text: 全唐文欽定全唐文卷六百九十二行簡字知退太子太傅居易弟貞元末進士元和中纍遷司門員外郎主客郎中寶歷二年卒
  hash: sha256:8c69d49abb3e1c2140119ff97f85f2dd4575844b5ac0df62f8ab1f8dd72abf32
  markers:
  - {type: head, offset: 14, content: 白行簡, id: KR4h0168_NFKB_692-h1, level: 1}
body:
  text: 骨雖無知葬以表德展厚禮於九原樂深仁於萬國惠加於鬼則遊岱之魂有依義感於人故歸周之心不忒原夫靈臺肇建璧池是穿宛彼枯骨委茲窮泉既靡覩其銘志曾莫知夫歲年西伯乃色變衋爾涕流泫然爰命從者將收瘞焉俾夫惻隱之心因形骸而下至於地升聞之德隨精魄而上動於天徒觀其年代超忽英靈淪沒土變豐肌苔封朽骨於是惠霑生死澤及榮枯遣奠有加於蘋藻備物無闕於芻塗幽壤始開見佳城於白日靈邱是啓旋卜宅於青烏既而遷彼古埏葬之中野推誠於重泉之內昭德於普天之下念此窮塵之骨尚或墐之欲使行路之人不得見也且夫聖人哀死君子表微用之於國而上下欣戴書之於史而載籍光輝諸侯感而思服百姓從而知歸以之理人而人自化以之奉天而天不違故能掩骼教行送終義立澤靡不浸仁無不及恩加師旅而同德數千慶延子孫而卜代三十且封比干之墓惟德是欽護信陵之冢其仁未深曷若我罔辨名氏莫知古今招亡散之魂復於棺槨收無主之骨斂以衣衾蓋所以感鬼神而動天地豈止夫三分天下而二者歸心天眷唐帝恭承永命守無事為至德彰不言為大令當寧而百蠻是賓垂衣而八極居正當書軌以混合系祖宗而作聖始契無外人羞有為戴北極以定位比南山而不移皇皇焉儼六服以御宇燭燭焉虛四聰而聽卑備其文火龍回帶以如動藏乎用天地成功而不知與區夏再造俾古今同道靜以虛襟固其大寶儲精而雲鬱冠蓋恭己而耀生黼藻故能追軒皇躡陶唐文物周衛邦家有光颯祥雲乎五彩蟠瑞氣於六章豈徒具飾乎領袖亦已權量乎圓方是知垂拱者古之難委裘者聖之旨蓋與神合寧將智使不然何以配天心安地紀一家之大無煩車馬以巡遊九重雖深盡見山川之疆理所尚者形神不拘清淨為徒體安以一襲道洽於三無俟時不在於顛倒致美何傷於曳婁於時天淨泰階城開外戶應星精以列將動嶽神而生輔楚製者分閫而守封縫掖者坐帷而論古纊未周而如挾袞有闕而咸補德既昌焉不亦宜然蓂出豈勞於問歷山呼無待於卜年凝旒而惠澤潛布斂衽而皇風靡前與三五爭步驟微臣亦迷其後先曰若稽古巨唐纍聖重光盛烈貫於千古英聲超於百王爾乃㣥瑞呈祥衆靈叶慶神降休祉天垂寶命鳳籙於是薦臻龜書以之疊映萬姓欣東戶之日一人奏南風之詠至矣哉媺無德而稱焉臣聞非常之主必有非常之臣是以元凱升而唐德茂稷禹用而虞化淳武丁夢徵兮求版築之士文王卜兆兮得垂釣之賓豈直星精之誕方朔維嶽之降甫申故能殷周歎其多士皇漢歌其得人亦有九合稱齊三分號蜀猶傳善政尚留芳躅方鴻翼以濟時比魚水而敦俗誠小國之邊鄙亦順時而自足豈若我聖明之有天下也總六合以為家籠八荒而建國既垂拱而敷化諒偃兵而興德為百代之規模立萬邦之軌則於是大君端冕而多暇㣥臣奉職而有方巍巍蕩蕩濟濟鏘鏘咸有一德視人如傷夔龍在位鵷鷺成行君臣同德而均美聖母臨人而永昌豈徒超五臣而逾十亂固將六五帝而四三皇小臣微淺才智疏越濫吹紫庭獻賦絳闕敢同輿頌竊為歌曰元首明哉股肱良哉盛德至矣大業廣矣我一人兮化無窮臨萬國兮道既融同心同德君聖臣忠子子孫孫永代克隆倬彼皇道大哉聖君窮厚載於宇內俾咸駕於海濆故得遙遙之形周八埏而匪間彭彭之響經萬國而俱聞所以義在知方理資從式見軫轉而不阻諒輻輳而有則宏濟之利既均美於三無順動之端方齊功於一德是故達於疆場踐彼幽遐表合縱而道廣知轍迹而路賒亦由誡於險去其邪推善御於有截被至治於無譁殊途同歸方見域中之大引重致遠是睹天下為家然則將利於時必徵所措既同轍而異履爰發軔而循度周流勿越誠轉蓬之足施轥轢非逾將挂轊而可布至若偈兮無外隱爾如斯念徵至而必繼嘉大同而在茲固將混區宇會華夷始曳輪而寧虧遠邇終推轂而不失毫釐觀其政之大者道亦斯假苟憑軾而知風矧擊轅而合雅顧踐履之奚到豈獨不東信應用之無疆寧惟諸夏原夫建皇極開帝功三才既美九有攸同可使循環如貫運動不窮四會五達之莊悠然盡屆島夷卉服之俗逖矣皆通爾乃庶政聿修遐方可討俾守位者將順其理利轉者必會於道故車書而混同誠鴻業之斯保國家古典修時令順命遒人之職執木鐸以徇本其教在每歲之發生聽其音如㣥物之始振於是官師傾聽道路咸聞採謳謠於多士延諷刺於大君外振金聲將發號而施令中含木德貴偃武而修文所以應之如響從以如雲道達天和契宮商而成韻揄揚帝命獻詩頌而為㣥懿夫一氣維則萬人是效警於有位佇從善而如流慎乃攸司固匪怒而伊教百官奉職而奔走萬族尋聲而騰趠觀乎四會五達舉而搖之溥天率土孰云遠而期赫赫於永代每鏘鏘於此時響不聞空能同誹謗之木聽猶在耳將陳誦諫之詩莫不獻其詞而諤諤帥其屬而師師靡其荒怠曷不肅祇士傳言而戾止工執藝而疇咨足以播祥風於地末闡皇明於天垂故夫聖之欣合詢芻蕘而聽納動而悅隨謀卿士之針規乃知我武不施司馬之執奚為斯文未喪封人之喻攸宜徒云擊石拊石曷若恩斯勤斯與德音而共暢載仁聲而遠馳則六變通神九成感物不足擅美而標奇也故我后振鐸以聳善喜人之敢諫俾夫下不瀆上不慢由和鈴之昭其聲致朝野之清宴至堅者石最靈者人何精誠之所感忽變化而如神離思無窮已極傷春之目貞心彌固俄成可轉之身原夫念遠增懷憑高流盼心搖搖而有待目眇眇而不見絲蘿雖托難立節以自持金石比堅故推誠而遂變徒觀夫其形未泐其怨則深介然而凝類夫啓母之狀確乎不拔堅於王霸之心口也不言腹兮則實形落落以孤立勢亭亭而迥出化輕裙於五色獨認羅衣變纎手於一拳已迷紈質矧乎石以表其貞變以彰其異結千里之怨望含萬里之幽思緑雲朝觸拂峩峩之髻鬟微雨暮霑灑漣漣之珠淚雜霜華於臉粉脫苔點於眉翠昔居人代雖云賦命在天今化山椒可謂成形於地於是感其事察其宜採蘼蕪之芳生不相見化芙蓉之質死不相隨冀同穴於冥漠成終天之別離則知行高者其感深迹異者其致遠委碧峯之窈窕辭紅樓之婉娩下山有路初期擕手同歸窺戶無人終歎往而不返嗟乎貞志可嘉高節惟亮同胚渾之凝結異追琢而成狀孤煙不散若襲香於爐峯之前圓月斜臨似對鏡於廬山之上形委化而已久目凝睇而猶望悲夫思婦於行人莫不覩之而惆悵先王之御天下也與物為公知文不足以獨理故資武以為雄弧矢之利以征不服劍戟之用以威遠戎俾梯山而入貢故率土而向風懿夫歐冶實曰良工鑄龍泉之劍鍊耶溪之銅於是制良模啓洪爐炎炭赫以震爇大冶屹而山孤其始作也煙氣成陳士冖柘聲若雷三光動色六氣飛灰蛟龍捧爐雷公擊節龍勢初成玉匣新發利可吹毛光能瑩雪此劍之德百夫稱傑此劍之用千里流血豈比乎解牛之刃自謂良庖倒載之干虎皮以包蒙莊説之以喻道周處憑之以斬蛟荊軻一拔以擊秦柱漢高三尺以定天下士庶得以安身王侯得以闢土是知劍也藉以防虞豈比樂云不在鐘鼓既而切玉期用剸犀是逢常聞靜亂舊説為龍佩服是宜則聖哲攸重棄捐不可故牛斗是衝馮諼再彈而見於下客季札一返空挂於長松逮夫邊塵欲飛邦人斯恐猛士揮戈謀臣賈勇是殲是滅再持再捧四夷懾之以寧居一人得之以垂拱是劍也古今之重是劍也荷君之寵金有利用躍而呈祥騰沸渭之炎彩耀赫奕之雄光始則沈潛將委形於鍛鑄終能踊躍求效用於鋒鋩於是挺奇姿奪良冶歎凡目之莫辨懼名工之或舍既翕赩之在鎔尚淵淪之未寫迸紫光而旁射期遊刃以剸犀烘赤氣而上衝願成形於斬馬徒觀其扇巨橐鑠利金聲激射勢浮沈鳧氏傾耳以駭意歐冶拭目以窺臨既而赫矣不常爛然有待紅霞聚蓄於穹谷滄波跳出於溟海風雷於是借威日月為之揚彩自殊美玉豈韞櫝以沽諸願比雕戈庶因茲而礪乃若夫流精表異變態無私象君子有剛柔之性同聖人不凝滯於時蓮鍔尚融若踊決雲之刃雲鋒未鑄如呈切玉之姿矧夫騰躍在中發揚於外君若銷形製器我則保其堅貞君若應用衛身我則期於遠大懿其鑠為金而不離效其祥而自殊幸托迹於鎔範希效質於規模彼號巨闕出昆吾龍藻龜文既已稱其昔有指晉揮鄭孰可使其今無嗟乎光彩陸離輝華彰灼疑狂電之乍發狀長星之不落異十日之俱流殊衆口之相鑠精靈有感不憚豐城之沈神化無方願繼延平之躍哂備物之鈎戟恥分形於錢鎛客有仰祥金以立誠庶堅貞之有託羅之名兮惟一羅之用兮不同彼以獲禽為利此以救物為功象夫天而圓其外體乎道而虛其中執拯溺之心忘乎雲鳥表好生之德及其水蟲觀其膺用之初裁成之始利物提挈順時行止夕挂於壁若滿月之在天曉用於人狀圓荷之在水爾乃匪虛實如有無心寧勞於凝滯體非憚於沾濡伊紗燈之護蟲則理齊而功倍彼綸巾之漉酒乃迹同而用殊若夫氣爽秋曉景光春晝臨桐井之銀牀近蓮塘之玉甃於是銅瓶傾寫金盆俯就迸千點之珠光垂一帶之冰溜初疑散絲之雨灑緑雲而亂飛又似瀑布之泉穿碧煙而下透且夫環之徑鐵取其堅而不朽冪以輕紗取其疏而無漏彰妙用於不凡表深仁而善救濾顏生之瓢水欲飲而徐清漉范令之釜魚將烹而獲宥然則開三面者其仁未如張一目者其害有餘曷若篩麼蟲而必礙投勺水而皆虛縱醯雞為解羅之鳥捨井鮒為漏網之魚斯則用資於生不資於殺仁在乎密不在乎疏夫以道存仁恕水何大而不濾物莫隱欺蟲何微而見遺雖焦螟之生必全有以小為貴者江漢之流雖大盡可一以貫之功且知其至矣用寧憂於已而客有撫而歌曰玉卮無當兮安可擬風瓢有聲兮不足比惟濾羅之用也大哉故去此而取彼卦惟體德舞以象功分其節於乾坤之位列其畫於綴兆之中相彼六爻爰配數於六律侔茲八體俾叶義於八風原夫乍合乍離進旅退旅參於繇而九變無撓辨於位而五方有序作既自於天心用必在夫君所剛柔斯別皆取象於負圖俯仰可觀各分行於曳緒爾其舞既備位亦陳贊陽和之啓蟄助雷雨之解屯卦始畫於庖犧當皇唐貞元之歲易咸列於宣父在聖祖中和之辰度曲未終變態無極震艮以節其動止離坎以分其南北聞之者正性命而深和覩之者守精微而不賊繼虞韶之盡美哂夏樂之慙德徵其本察其儀成於巽而德風備矣變為兌而聖澤在斯近取諸身且表乎是則是效大合乎樂孰為乎不識不知矧夫作者既取諸身演者必因於聖諒曠代而莫覩實於斯而為盛其始也取於卦而施諸人其終也觀其妙而通乎政是以契茲穆穆異彼傞傞象在於中將致天地交泰德形於外以明保合太和且夫周八佾而非美漢五行而徒製雖冠華秉翟於干戚之間起索隱鈎深於天人之際曷若容止合於彖象幽賾殊乎卜筮客有欣千載之一時歌聖功而獻藝高山穹崇山有石兮玉在其中物不能自珍帛丿糸千載而抵飛鵲寶所以為異貫四時而見白虹積苔文而外翳涵冰形而內融煥乎有文既自抱其堅白敦兮在璞將有俟於磨礱嗟夫委質含章藏暉晦迹閟奇文於特達韜善價於今昔棄他山之下未得輝乎滿堂泛渭水之中誰復知其盈尺混清潤以潛潁託層崖而委積愛而不見雖類懷寶迷邦和而不同終辨我心匪石懿夫石惟縝密玉乃堅貞孕明含粹養素挺英包其蒙詎覩蕊兮之色藏於密誰識詘然之聲徒觀夫明其內晦其外諒可久而可大見其素隱其華若去泰而去奢形委順而可轉心抱忠而無瑕暗然而彰同夫珠媚於水光而不耀異乎金在於沙爾其玉方蘊藏石未磨磷氣中潛以育德色旁達而示信處於鑿鑿則水折而方流依彼巖巖亦山輝而未潤照廡之光尚戢截肪之色空存昧識者但見其落落精鑒者方辨其溫溫石不能言莫遇琢磨之力玉未成器難逢拂拭之恩則知至寶在乎藏真至德惡乎自伐刳其心而白不受采實其腹而間不容髮客有愛此堅貞想其清越歎時俗之莫顧惜輝華之潛發儻見采於一拳庶無虞於再刖美矣哉有玉於茲不磷不緇韜而藏則傷乎祕寶懷而匿又慮乎失時是以露瑤華之炯爾就朝市而沽之且以辨玉璞之名且以見至珍之道耀盈尺之燦燦彰合拱之皓皓使思之者覩於貞清仰之者知乎堅好首六瑞以為瑞排衆寶而稱寶然後厥聲載路厥價載聞蘊十德以光代先駟馬以薦君亦何必隱映其華韜藏其美行於魯謂迷邦之士入於宋比越鄉之子豈獨用為薦神亦自以為厲己且時見玉而既重玉待時而以諧獻楚之忠誠必賞求秦之價直非乖自可覆之於櫝鬻之於懷間彼琅玕照追師之笥離於衣褐裨天子之階寧令善價不再良辰無幾且遠於簪裾永疏於筐篚夫然則玉工貽誚君子不韙韞藏之則爾能求沽之則吾豈如垂棘之璧不琢之圭亦當出彼巖石鬻此規是以百爾之行一與之齊未有玉逢價而更惜士於時而自迷然則事有可而必行辭有為而焉説道既危而思隱善求顧而無伐故沽玉者遵於賜言待價者存乎子曰沽哉於斯文而蓋闕璧之為寶也至珍龍之為物也至神蘊彼堅貞由是見希於代神其變化胡不可畏於人苟以力奪我寶則必害及爾身原夫被褐而來艤舟以濟懷白璧為利涉佩青蛇而自衛光連曉日若明鏡之高懸影落深潭狀白虹之初霽孤棹才移於渡口二龍歘見於波際將至寶因此可求謂匹夫於焉易制徒觀其迅雷鏗狂電翕赩轉清輝而陽景滅曜噴風雨而晴空變色拖尾乃無所遁逃矯首則方將薦食朱萍焉能施其術佽飛莫得用其力滅明乃挺利劍整扁舟驅天吳北陽侯壯志奮而髮植冠聳瞋目張而眥裂血流白刃下耀於淵室紫氣上衝於斗牛左絶其脰右摏其喉擢錦繢之鱗觸驚波而乍聚乍散灑元黃之血隨奔流而或沈或浮既風恬而雨絶俄霧廓而煙收龍實最靈孰可以威而讋璧惟重寶豈得不義而求既而弭波瀾濟江干璧非人願保全而莫可人非劍思耀武而誠難然後韞神邱即長路持拱璧而歎息盼中流而回顧豈不以懷寶者為物所求恃力者為人所惡且龍實恃力人惟懷璧爾實我欺我非爾惜雖在時之攸重諒於人而何益聞老氏之誡莫守乎滿堂考聖人之清不貴於盈尺遂投之河而神罔敢受毀於岸而人莫敢有紛然電散謂齊后之碎連環騞爾星分同亞父之撞玉斗則知動不可妄求不可苟始則將害於人終乃自貽伊咎胡不伏水府而藏珠於頷照崑山而銜耀於口故貪而斃也誠罹有悔之凶毀以棄之安能無脛而走嗟乎仁必有勇信千古而不朽纎纎之月兮濯影清流卑卑之鱗兮妄意懸鈎乍見之而深入復瀺焉而誤遊尋落餌遲來舟遊泳不安頗似縱而方引噞喁自失疑已懸而未收當其照溪篁興舟子駭垂竿而亂動訝半規而特起諒不知夫月來徒有虞於夕死或跳躍無所每健羡於脫泉周旋不能乍蹉跎於失水且復走菱荇觸洲沚斂鬐鬣以曲全高首目而圜視引耀方丈形儀更真挂影西南盡迷元兔與波上下難晦紫鱗雖類吳牛之喘月獨喻文鰩之觸綸轉蕩其心似迎其手恐牽復於未濟懼鈎深於善誘同畏景惡迹之士視於無形異貪餌慕羶之徒求之何有夕惕未已宵迷不舒每流浪而遷逝願息陰以躊躇豈將畏首與畏尾亦將慎終而慎初靄靄孤光隔千里而共此鰥鰥下視雖擘波其焉如既而魄盡中流光沈西海猶眙於故處尚怵惕其安在豈鵬化之質不能奮飛方魚服之時每嗟危殆悲夫似是之疑何莫由斯况文竿晝引緒繭宵垂苟人謀之不輟何天道之可窺安得遠猜機漾修迥笑明月而弄淪漣與狎鷗而相並帷斗之列在天之中象其車之為用明乎運而不窮爛然有光隨月建而不忒循環靡定轉天道而潛通爾其自彼元功彰乎真宰輻輳而衆星有次環回而周天可待將臨無極同樂御之在君隨轉無窮異月輪之生海故得四時式序九有皆臨順乎軌而克陰陽之分比於轂而正天地之心宛轉潛移循環微至周行不失於紀綱順動罔差於躔次何有象而著天何無迹而行地是使星辰日月之度光不失三春夏秋冬之期時不愆四懿夫拱極昭彰垂精耀芒將侔功於引重在載德以知方莫測車行式瞻其上象遙觀帝座宛在彼中央是動不過位止無其常作解疑夫轞轞有耀想乎煌煌然則七星所臨下土之分度數必循於厚載經行用昭其廣運是以義將德比動與化俱廣覆之恩既博致遠之道斯殊輪不推兮展雲鋒而罔懼駕非馬也歷天險而無虞所以取轅轂喻璿樞見維北之運矣豈指南而已乎猶一人之在上而萬國之是制規圓而輪轉罔差鱗次而運行無替遵不已之道豈念窮塗駕自然之車寧愁輿曳是則天衢可陟雲路有勢幸見殊於輪扁之徒不可使其功而效藝人之蘊德兮唯車可同載諸身兮運轉無窮苟規模之不紊在夷險以皆通遊必有方靡假顏生之御成之在我寧煩奚仲之功原夫雕斫何勞周旋不礙得亨衢古道以方駕將璞玉渾金而共載廓情田而作路終自東自西調意馬以服箱任或進或退且見其制非假手用不由人馳懿範而深疑軋軋聽嘉聲而乍認轔轔如榮晝錦之衣便同華轂儻被懸鶉之服豈異椎輪是何輗軏無施脂膏莫有學海深而濡軌堪虞詞林秀而養材自久誨人不倦初訝其役車不休見賢思齊豈憚乎挾輈而走莫不乍行乍止載疾載徐究其理而大矣較其功而忽諸程君之夢捧陽精還同照乘黃霸之惠如時雨宛是隨車乃知德以飾身為規車將載物是致苟執德之不惑故憑車而取類善行而所去無迹遵道而雖遠必至功能救旱喻流水以寧慚美播惟馨媲七香而何異大矣哉妙才難問良工在茲曝腹而那殊炙輠書紳而乍認執綏此車也價雖擅於五行應難比矣數徒多於百兩未足方之士有軌轍無踰威儀靡忒逢時期牽駕之用抱素乏丹青之飾儻題品之未遺願為車而比德狐者微物死乃可珍想彼邱而結戀正茲首以歸仁生也有涯且不忘其本死而無二亦不喪其真可比德於先哲實聞言於古人原夫委化將終微情有托面淇梁之窟穴目武都之林壑顧慕而首尾不差向背而東西必度死生契濶知歸骨之莫從視瞻無回念舊鄉之可樂矧茲異質蘊彼仁心寧九尾之足尚實三德而可欽豈不以懷舊誠切戀主志深等太公之於齊終聞返葬比莊舄之去越尚發哀吟想夫溘爾數窮隱然存盼歎青邱之永訣想南山之不見其心懷土望故處以增悲惟首正邱聊向隅而表戀知其戀本者合於禮戀舊者繼乎情何綏綏之陋質叶仁人之美名觀物化感平生頤指而千羊讓德頭會而百獸慙獰徒觀其首也不回心乎惟懇殊聽冰而表智異含沙而招損正有芃之質志在慎終委莫赤之容仁無棄本想其美也合於禮者鄙羵首之牂羊符戀主之良馬觀跂行喙息之類其數則多察樂生念本之徒斯情蓋寡繄茲獸之可奇諒古今而稱之死不擇音嗟逐鹿於往日生而隱霧歎元豹於昔時曷若懷念遠之感軫去故之悲異哉首邱之仁也非衆類之等夷惟上天之陰隲至誠感通靈液肇吉能分五色之異以候一時之出祥風爍乎茂草瑞景晞乎朝日元黃雜錯綴玉樹以相鮮丹紺交輝映金盤而乍失既能偶聖以呈貺寧有普天之不率飛液花塢流光蕙圃青熒玉綴燦爛珠吐靈藥訝仙童捧來潤石疑女媧欲補花禽拂著宛如陳寶之雞平野染成煥若徐方之土當其金烏戢耀玉兔騰光夜寂空知警鶴寒輕猶未為霜徒想狀天酒類神漿豈辨彰施而披棘尤分雜錯以沾裳滿林嶺而霞駮遍莓苔而錦章自然鬱為天祚慶我皇唐何必徵勒畢之言以為國泰驗吉雲之説乃辨時康嘉其風中煜爚空際浮爍綴瑤草以紛敷泫庭柯而照灼彼瀼瀼刺其感歎此湛湛歡其宴樂徒用興其詠歌曾何覩其交錯未若含瑞表德耀彩逢時乍綺分於彼或星合於茲為陰陽之淳粹作花木之葳蕤喜氣度關徒虛語耳榮光出水曷足方之是知天降休祥聖為明證淡汪濊之仁澤得文質之善稱天何言哉國有感而善應人之夢異於常者有之或彼夢有所往而此遇之者或此有所為而彼夢之者或兩相通夢者天后時劉幽求為朝邑丞嘗奉使歸未及家十餘里適有佛堂院路出其側聞寺中歌笑歡洽寺垣短缺盡得睹其中劉俯身窺之見十數人兒女雜坐羅列盤饌環繞之而共食之見其妻在坐中語笑劉初愕然不測其故久之且思其不當至此復不能捨之又熟視容止言笑無異將就察之寺門閉不得入劉擲瓦擊之中其壘洗波迸走散因忽不見劉踰垣直入與從者同視殿廡皆無人寺扃如故劉訝益甚遂馳歸比至其家妻方寢聞劉至乃敘寒暄訖妻笑曰向夢中與數十人同遊一寺皆不相識會食於殿庭有人自外以瓦礫投之杯盤狼籍因而驚覺劉亦具陳其見蓋所謂彼夢有所往而此遇之者矣元和四年河南元微之為監察御史奉使劍外去踰旬豫與仲兄樂天隴西李杓直同遊曲江詣慈恩佛舍遍歷僧院淹留移時日已晚同詣杓直修行理第命酒對酬甚歡暢兄停杯久之曰微之當達梁矣命題一篇於屋壁其詞曰春來無計破春愁醉折花枝作酒籌忽憶故人天際去計程今日到梁州實二月二十一日也十許日會梁州使適至獲微之書一函後寄紀夢詩一篇其詞曰夢君兄弟曲江頭也入慈恩院裏遊屬吏換人排馬去覺來身在古梁州日月與遊寺題詩日月率同蓋所謂此有所為而彼夢之者矣貞元中扶風竇質為京兆韋荀同自亳入秦宿潼關逆旅竇夢至華嶽祠下見一女巫黑而長青裙素襦迎路拜揖請為之祝神竇不獲已遂聽之問其姓自稱趙二姊及覺具言於韋明日至祠下有巫迎客容質服皆所夢也顧謂韋曰夢有徵也而命從者視囊中得錢二環與之巫撫掌大笑謂同輩曰如所夢矣韋驚問之對曰昨夢二人從東來一髯而短者祝酹獲錢二環焉及旦乃遍述於同輩今則驗矣竇因問巫之姓氏同輩曰趙二姊也自始及末合若符契蓋所謂兩相通夢者矣行簡曰春秋及子史言夢者多然未有載此三夢者也世人之夢亦衆矣亦未有此三夢豈偶然耶抑亦必前定耶豫不能知今備紀其事以存録焉長安西市帛肆有販粥求利而為之平者姓張不得名家富於財居光德里其女國色也嘗因晝寢夢至一處朱門大戶棨戟森然由而入望其中堂如欲燕集張樂之為左右廊皆施幃幄有紫衣吏引張氏於西廊幕見少女如張等輩十許人皆花容綽約金義鈿照耀既至吏促張飾諸女迭助之理澤傅粉有頃自外傳呼侍郎來競隙間窺之見一紫綬大官張氏之兄嘗為其小吏識之乃言曰吏部沈公也俄更呼曰尚書來又有識者並帥王公也逡巡復連呼曰某來某來皆郎官以上六七箇坐定前紫衣吏曰可出矣㣥女旋進金石絲竹鏗鍧震響中署酒酣並州見張也而視之尢屬意謂之曰汝能習何技對曰未嘗學聲音使與之琴辭不能曰草操之乃撫之而成曲豫之箏亦然琵琶亦然皆平生所不習也王公曰可矣因命采箋為詩一絶以與之張受之置之衣中王公曰恐汝或遺今乃口授吟還梳閙掃學宮妝獨立間亭納夜涼手把玉簪敲砌竹清歌一曲月如霜張曰且歸辭父母異日復來忽驚啼而寤手捫衣帶曰尚書遺詩矣索筆録之問其故泣對所夢且曰殆將死乎母怒曰汝乍魘爾何以為嬖乃出不祥言如是因臥病纍日外視有持酒肴者又有將食來者女曰且須膏沐澡瀹母聽良久靘妝盛飾而至食畢乃遍拜父母及坐客曰時不留某今往矣因援衾而寢父母環伺之俄爾遂絶時會昌二年六月十五日也立言宣州人貞元末進士太和末由廬州刺史召為司農少卿為京兆少尹知府事以附李訓鄭注誅上方繼統大寶發號初年俾木鐸是徇彰皇恩而宣清韻乍分庶道乎無遠不浹長聲始振將表乎有開必先蓋欲由舊章布新令使有聞而必戒如審樂以知政德音爰降義符招諫之君大典允敷道契多能之聖洪纎手運斷續風移始條貫以遐遠終激揚而廣施發千門以瀏亮警三條而逶迤將警乎㣥心斯乃有倫有要言提乎衆耳孰可不識不知且夫洞然諧音鏘爾立號豈比官師之職無勞有司之告則知君立教非鐸而不宣金有聲非木而奚道所以酌彞古典稽法前王範乎金蓋取乎剛德示利振以木期在乎直言有章罔非舌而是出信有聲而必揚鄙伐鼓之坎坎小和鈴之央央節奏中規周旋有序合椌楬諧律呂侈弇之制自異陶匏之音不舉動而逾出擊且殊於錞于虛以和鳴懸匪勞於簨簴帶未央晨漏時與俱來混南山殷雷乍迷其所於以明盛禮於以揚王猷日聞四方聽思聰而廣被教覃萬國澤咸霈而周流或乃妙響清越帛丿糸帛丿糸將歇敢煩手於再振冀駭耳於一發客有觀光以成文願刊象魏之闕人之化兮從政之所向草之偃兮隨風之所仰大小覃及道均乎廣敷高下必加義存乎溥暢將咸被於榮悴非有阻於遐曠感之化靡自符於順柔動而悅隨豈因乎用壯如雲起於龍召若臣和於君唱豈蕭條衆芳之間翺翔激水之上而已美其抗威有制應物無私播生成於萬族順炎涼於四時彌岡坂以盡仆歷原隰而無遺颼飀其音時自南而自北扶疏其狀隨左之而右之泛蘭叢而影分丹穎轉蕙圃而光搖碧滋有感而施不獨芃芃其麥觸類皆長寧遺楚楚者茨則知草之偃風威之所藉人之理上政之所化不然則何以喻德君子比訓小人佐天地之化育助雷雨於陶鈞當稿葉辭條我則激淒清於霜夕及晴川解凍我則散煦嫗其陽春豈直落餘花於黃菊翻碎浪於青蘋至哉凝韻松桂傳香蘭茝不行而疾合帝德之無方不厲而威若神功之有宰茲君令所以為此聖人於焉嘉乃觀其匪疾匪徐或吹或噓俾夫曲者必直勾者必舒庭葉晚飛墜丹梧於颯爾池荷夜轉瀉珠露以連如是則草非風不靡人非化不被故取鑒者用於斯觀政者必於是况王者致理與物化遷敬授人時乃何風不順式孚惠澤則何草不元既殊拔木之日斯鄙偃禾之年賦風行之義可以知其教焉師聖貞元時人夫人字芳太原人也先伊耆氏之胄封爵列位皆附舊史故隱顯不言因遠祖居毗陵今為毗陵人也祖觀父升並高尚雲林獨立不懼積慶儲祉是生夫人夫人即升之長女也年始初笄歸於許氏輔佐君子協和中外其儀可範其德可大貞順模於九族婉娩美於當代嗚呼上天而假其德不假其永世之壽是足可悲以貞元草年七月三日寢疾卒於闕孝鄉唐昌里之私第春秋五十有五以貞元草一年孟春月三日安厝於震澤里之原禮也夫人生二子長仲宣次仲康並哀疚悚心窮號泣血懼山谷之遷變乃刻石而為銘礪字元明少為浮屠法從兄震薦為興州刺史檢校尚書左僕射領山南西道節度使元和四年卒贈司空得昌潤狀量移官通州別駕崔河圖使奴詆百姓妻抑壓於家中驅使又訴稱疾病請於果州尋醫審令驗問並無疾患者崔河圖自量移通州已逾三載不遵法度故犯典章恃其曾踐周行歷官省闥恣為纍橫侵擾黎元使奴詆抑良人訴疾妄求出界交通豪俠迫脅村閭伏以巴南諸州去使遼遠山川重阻道路踦危若縱姦人必慮扇結况河圖怨望日久情狀難原下闕升德宗朝官鳳翔節度使至人御時大禮爰設資亭育以為德立隄防以垂範三千之儀畢備九歌之序載揚承規理人開物成化習齒以青陽肇發落韶夏之風景薑肱以朱明始臨欣畏日之卉木俱尊函丈之業共仰摳衣之軌爰茲餧獸未叶於順時復此迎有虧於通典事不師古如何兩昧學而不修此焉雙缺適吳蜀以俱廢比臧穀以同年雖聖主寬刑唯留一面而愚人懵學自挂三章咎也已招法將焉設請從泣辜之筆以徵紊禮之至子溫京兆華原人太子太保公綽之父官丹州刺史磽肥異宜給受殊制苟夫田之可易在公道而奚爽惟甲奉其所主念此為農無怠無荒將陳耕鑿之力是藨是蔉以期國家之利雖在勤不匱而處塉則勞風雨每調莫覩如雲之稼收穫斯至空嗟懸磬之室徒逢時於樂土終歎乏於良田懷不足而是憂思鼓腹而何及觀其所給察其所由在周典而無辜論漢史而何著惟農是恤於法何乖寧易地以豐財豈守株而喪本更耕之訴據百而何傷過數之科在三章而宜捨宏正本名興字安道平州人田季安時為衙內兵馬使季安死衆請宏正為帥與將吏約請歸六州版籍於朝然後視事憲宗嘉之加銀青光祿大夫檢校工部尚書魏州大都督府長史兼御史大夫上柱國沂國公充魏博節度觀察處置度支營田等使乃賜今名元和十四年加檢校司徒同中書門下平章事進侍中穆宗立王承元以成德軍請帥詔宏正兼中書令為節度使長慶元年為王庭湊所害年五十八册贈太尉諡忠愍臣聞君臣父子是謂大倫爰立紀綱以正上下其或子為不子臣為不臣覆載莫可得容幽明所宜共殛者也臣家本邊塞纍代唐人從乃祖乃父以來沐文子文孫之化臣幸因宗族早列偏裨空馳戎馬之鄉不覩朝廷之禮惟忠與孝天與臣心常思奮不顧生以身殉國無由上達私自感傷豈意命偶昌時事緣難故白刃之下謬見推崇天慈遽臨免書罪戾朝章洊及仍委旗旄錫封壞於全藩列班榮於八座君父之恩已極絲毫之效未伸但以靦冒知羞低徊自愧是知功榮所著必俟危亂之時徼幸之來去在清平之日循涯揣分以寵為憂伏自天寶以還幽陵肇禍山東奧壤悉化戎墟雖外一車書而內懷梟獍官封代襲刑賞自專國家含垢匿瑕垂六十載臣每思此事當食忘餐若稍假天年得奉宸算兼弱攻昧批亢搗虛竭鷹犬之資展獲禽之用導揚和氣洗滌偽風然後退歸田園以避賢路臣懷此志陛下察之又臣每在軍中多居偏鎮每遇奇計心實親之有布衣崔歡結茅王屋但茹松柏不雜風塵與臣周旋頗有年歲自臣受命惠然肯來臣遂請攝節度參謀俾之奏事臣胸襟所蓄書不盡言實冀因人紓其積憤臣不勝感恩戴荷懇苦之至謹差攝節度參謀王屋山人臣崔歡謹奉表陳奏以聞宏正珍重執事之心積二十餘年竟不獲自道於執事者徒懇懇終日常恐空老而無所歸誠固內不自安矣自前年朝謁得展拜執事於道路之間時苦牽事復略不得伸前時所蓄之意彌有不足於心矣執事以古今仁義發為懲惡勸善之心豈惟當世士君子所賴抑亦姬公孔子之心待執事而明白之矣每覽前後史策紀其所為古之賢者有出無愧矣宏正近奉制書去魏就鎮自念榮寵已極能無憂惕之甚哉且自二寇亂常以來六十餘載矣河北之地教化之所不行冀趙魏常山又河北之尤者日月積習遂為匪人誠可悲矣寢食常念之以為負經濟不羈之才者執事可以將朝廷之化移獷俗之心矣宏正庸虛輒不自意思君子降重為邑人啓茅塞之心仰執事坐師氏之筵使鄙夫修擁篲之禮則向之羞姑可掩矣不審執事當俯而就之乎復恥而不就乎今輒虛上倅之位俟君子光臨古人有功成不居退得所詣者鄙人咏之久矣儻終不拒至誠之情幸甚布字敦禮魏博節度使宏正之子授御史中丞入為左金吾衛將軍拜河陽節度使長慶初徙涇原牙將史憲誠叛逼布行河朔舊事布度衆且亂為書謝帝引刀自刺年三十八贈尚書右僕射諡曰孝臣觀衆意終負國恩臣既無功敢忘即死伏願陛下速救光顏元翼不然者義士忠臣皆為河朔屠害
