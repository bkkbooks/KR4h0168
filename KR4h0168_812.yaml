front:
  text: 全唐文欽定全唐文卷八百十二崇望字希徒河南人邢國公政會七世孫咸通十五年登第纍遷司勳吏部二員外郎僖宗時擢翰林學士遷戶部侍郎承旨轉兵部昭宗即位進中書侍郎同中書門下平章事大順初為門下侍郎加尚書左僕射代時溥為武寧軍節度使溥拒命還為太常卿王行瑜入誅執政貶昭州司馬行瑜誅召為吏部尚書徙兵部光化二年卒贈司空
  hash: sha256:7cd551766167ca9445e1004f6ec6dd941adbfc19b07354192d4e45fe384bb108
  markers:
