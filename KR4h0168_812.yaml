body:
  text: 敕以爾彯纓著稱夢筆為文富以美才披其禁闥典由中之詔成布下之言方謂得人雅當入侍蓋聞羊祜謀議是草皆焚周仁重厚其言不泄親近之地慎密為先爾既不能何爽居外西省亦吾教誥之地戒之可矣可依前件敕具官崔凝等凡帝王有應制侍從之人蓋思其朝夕匡益也下詔先視質疑如流茲所以潤色出言交修發號大漢氏設玉堂內署開金馬外門得人甚多斯道大振顧是末敢忘師虞職思其流以備左右俄聞家遺清風人懷恭德能濟其美者伊凝有之三代絲綸一門冠蓋不墜其業者伊文偉有之而皆以墨妙詞芬策名試第謙無矜物敏以適時周旋鳴玉之儀頡頏攀雲之路訪於執事亦進厥良真我雍容之列所宜者也敬承密命允叶同時可依前件敕具官鄭紹業族掩五侯家多萬石盈數大名之後高門陰德之餘茲實生賢聿來佐國而勵精士節炳煥人文韻宇宏深智度恢廓比博能於武庫方俊德於神鋒終始令圖出入大任丹墀絳闕自風體而宏多起草掌綸由天才之足用洎揚我休命出守荊門頗聞理聲急於徵請入則思邦家之久計出則擁旄節之上游良佇忠貞乃期康濟爰從分務曠已歷時如聞舒不疚之懷安無怨之地雖有簞瓢之樂寧無憔悴之容能用善人我實所慕是命進爾於冬官八座乃庶績彞倫之所由焉祇若朕言克邁乃訓敕近出天屬富有吏能進士以來恪勵無替覽宗正列狀念夷陵當官公舉何多獎用宜及仍聞罷退曠有歲時誠曰任能亦既振滯光祿古官也而比朝於今兼掌尢重是命爾司少其事勉幹吉蠲之職無忽禋祀之官可依前件敕某官謝曈等欽惟漢宣帝以英主御無事之朝尚思良二千石以之共理伊豫冲昧適丁艱難每以一麾假人既重且慎每聞謝曈以勇誅暴而去害以義利物而移風儻願得之於一年宜用試之於千里聞爾倪徽久從進宦皆著任能委以方州冀為良牧吁含哺鼓腹是安人之謀留犢懸魚乃潔已之操惟一二之事皆古之賢刺史所行以為爾資庶洽豫意有以憲丞寵官攝之任貂璫遷刺史之班子於疲黎無所愛惜吁往哉可依前件敕王搏名以文舉祥以履光敬以交人善為知已鐵鉞開幕台鉉奉藩方虛婉婉之籌乃顧翹翹之乘能不輟我周衮之任樂爾漢相之徒建禮部郎官惠文御史敬思寵數勉罄嘉猷可依前件敕張道蔚等糧餉其軍防虞所理况自邊徼必資強能是命擢以校文寵茲佐略宜思績效無忝從戎可依前件敕高鋭等既以勤心定賓主之分宜頒嘉命為官屬之榮同參執法之司勉副知人之地期將盡力共贊成功可依前件敕具官某等或游徼罷居堙鬱彈冠之望或指揮效用周旋免胄之行幹以奉公恭而事上允當選舊亦既賞勞禁旅親營實在將軍之令雄藩武帳宜增列校之威各命寵遷勉成茂績驟升郎佐無忝官勞可依前件敕某官某等或以忠勤彰於侯正或以奏獻著彼勞能况侯蘊李仁誨親奉禁營始陪輦路不有遷命將何勸人可依前件敕昔魏郡十五城獨繁陽有異政漢史書之以其為縣之才未易得也今我擇官憂人之際一朝以難得之才待鎰等四子其何如哉將責試功亦宜申命為政如御不可改轍而行為政如農惟在勤思其事無或窮人使為盜也書稱以庸本朝旌賞遽以印綬光命之球蓋延餘師溥之所舉乃為之酬當務其實可依前件敕楊宏範能以下位伸於上聞諒屬驅馳不避繁劇郿大邑也有民人焉勉揚仁風無辱公舉可依前件敕薛璫等我聞焦贑之伺奸邪虞詡之推盤錯皆屏盜之迹為治縣之先盜既不興縣是用保今其時也勉思齊之其於政之善惡人之理亂賞罰甚明足以自擇璫得銀章無忘兢惕敕楊彥等主簿之官大要在其勾稽一同百里不亦難乎無言小官而忘幹事黜陟勸沮勉自為謀可依前件敕具官張嗣復性推端慎才任公方居為勵已之能動有逸㣥之度爰當職局備覩通明諒此精修諧於擢用是命伸其寵獎延以上司俟典幹之繼聞顧優崇之何遠敬思勉勵跂乃騰翔可依前件敕孫可讓才質相高謙和特立秉端正恭敬之禮備起居左右之勤入用甚優前途更遠實諧獎進俾列官司勉副寵榮無忘夙夜可依前件敕廷暉出入禁門周旋地恭敬之心無失公忠之節愈明必有才能可當委用勉荷特遷之命宜思與進之途可依前件敕具官楊復隨資於周敏濟以器能居廣衆而和光列禁司而幹務播於公議實曰上流諒檢操之不渝顧津途而莫測允承嘉命勉副寵遷無違恪恭以就光大可依前件敕具官苗深等母琅琊郡太夫人王氏等本於仁原於禮保於和處於順故圖史素學風法不衰立我彥臣率由貞訓而識者服儒之道不使忿言加巳以羞其親深與文蔚有之矣乃子弟謹身之行履危懼辱之思以承其志渙等有之矣且皆賦祿於朝相戒以養俾榮報德當貴疏封慶集而家教行吾國古之孝理不在茲乎可依前件敕具官某母崔氏夫為人者能以忠勇之謨勞於國戎旅之權既重上公之秩乃高而母氏之封寵章未稱則於王化有所不宏方屬推恩是以用典以光孝養且厚勳臣可依前件處靜居天台山自號天台耕人會昌中與葉藏質應夷節為林泉友道之體也至靜而無為道之用也通生而赴感始乎無始先乎無先起於妙無而生妙有至真之教由茲而立焉我元始天尊啓重元歷五太握元化運真精總括妙門以為法印付於大道君道君纘統以光大之敷暢以宣布之凡十二印包舉幽賾窮達元妙以授於老君老君奉而行之上極三清旁周無外綿亘億載開導未聞帝帝為師方方立教幽明巨細靡不宗焉自是奕葉紹承師師授度上自元始下逮茲辰故受道尊奉其為度師乎度師之師曰籍師籍者嗣也嗣籍真乘離凡契道籍師之師曰經師經者由也由師開悟捨凡登仙三師之重於祖宗祖宗能傳之而不能使兆致道父母能生之而不能使兆升仙奉師之道無以過矣儒家在三之義莫能及焉欽惟三君煥有明德追仰尊禀瞻慕無階粵自上未列圖紀雖貞猷茂範刊勒於名山而後學門人難披於真奧敢條實録昭示將來輒陳小序仍為頌述道弟吳興陸甚夷已敘道元先生休烈但繼裁短讚以紀德風庶劫歷有終而清規不泯有唐龍集庚辰中元日甲辰序余源承大漢派衍東甌家於縉郡之遂昌鄉居樓得里住溫恭世奉儒宗不求聞達心存犬畝性好林泉知數知斗讀易問禮將期升粟以養甘脆因澤畔持竿有傷於吞餌林間設網乃誤於罝羅况才匪經邦術無清世知艱而退自保逍遙乃滌去紛拏歸心淡泊宅身雲岫遊神窅冥經諷五千籙遵三洞陟天台而躡華頂望滄海而睇神州眺暘谷而對扶桑吸雲霞而吞紫氣因還故里息爾仙都探安期之舊蹤封軒皇之故跡鍊金溪畔足以濯纓縉雲山中尢宜養志因斯考室宕漾養真性甚疏慵修習不至樂天知命一任自然年踰從心安得長久不敢比歌於梁木輒思記過於明夷升騰何期歸土有日預築元墟將為永室時唐咸通十四年歲在癸巳六月甲午二十八日辛酉寅時遭疾卒於前齊當日歸封元墟春秋七十有三其銘曰虛皇降氣大化凝真自合長久胡乃沉淪修習不至存思不勤三魂高邁七魄下湮此必然之期有始有卒生無益人死何勞神預備磚木以掩形質臭莫薰天尸無露日人皆好生誰不惡死賢愚悉然高卑盡爾日月長焉陰陽定矣物有興亡余今休止隱真東臯卓元孤墳高峰映漢聳木干雲烟霞杳靄猿鶴繽紛慮川移而谷變乃自作於斯文澞駢之從子官左驍騎大將軍呂用之誑惑尊德塗炭生靈奸僞之名遠近喧沸內則以神仙之事苟媚一時外則行節制之權取怨百姓大將則畏死不說從事則尸祿求容荏苒數年寢成大蠧則凶邪以露羽翼將成若不誅之恐高氏勳庸一旦為此所纍仁表字休範宰相肅孫登第後從杜審權趙隲為華州河中掌書記加殿中侍御史內供奉與劉鄴有隙鄴為相貶死嶺外咸通十五年三月侍講學士右僕射太常孔公以疾辭內署職其元子左拾遺養疾亦病逾二旬太常公疾少間拾遺疾亦間又旬日太常公薨拾遺哭無時後七十六日亦終嗚乎求諸古未聞也仁表與拾遺同歲為東府鄉薦策第不中等再罷去明年偕宴於東堂宴之日博陵崔公蕘出紫微直觀風甘棠下表為支使校藝閣書拾遺始及第乞假拜慶新進士得意歸去多不伏拘束假限往往關試不悉集貢曹久未畢公事故地遠逮二千里例不給告時僕射太常公節制天平軍以是勤不得請拾遺曰人之多言必以我為宴安訖春不宴年少乘喜氣赤春頭竟不對狎客持一杯酒人以為難關試日都堂中揖別同年徑出青門外經所為從事州入院判案十日東去府適罷賢諸侯爭走羔雁馳弓旌竟不能致徵為渭南尉直宏文館久之會大學士出將竟不就僕射太常公罷鎮居洛中拾遺伏安定省不嘗言仕宦旋以萬年尉復怗文職無西笑意僕射徵拜司戎二卿拾遺由侍行乃赴職越一月今許昌太傅相國襄陽公為河中奏署觀察判官假監察御史故事赤尉從相府得朱紱公昆仲間有未至者求裏行官不改服色人人美談之俄轉節度判官從知之道皎然明白和而不柔守而能通內盡匡補而外若不知相君待之異禮俄拜左拾遺內供奉嗚乎止於是何也春秋始卅三矣惜哉公至性自生知雖欲全其禮傳於後開強忍抑不能俯就始得疾不言於人因晡哭若絶左右始知有病句甚矣句臥堊室中不復進饘餌疾益亟方肯歸常所居舍悉召骨肉逮僕使唯言僕射公葬時事指揮制度必以古禮戒誨約束委曲備悉左右皆泣公曰吾平生無纎小不是事天報我甚厚使亟得歸侍地下爾盍賀而返以泣耶吾自遂性不能無傷生全大孝送終設祀宜益儉削無以金鉛纖華為殉無以不時之服為殮吾幼苦學尢嗜左氏傳所習本多自讎理宜置吾左右友人鄭休範多知我所執守相視若親弟兄我亦常以所為悉道之請以志我彼不能文必盡其實言竟撫弟妹若將千百里為別者視妻子若將一兩夕不面者而恰然其容如有失而復得巳而終嗚乎其善歸侍乎公謝世之月餘日前與二季處暗室中忽援毫書草八字於室內東扆之上若隱語而加韻焉曰許下無言奪少年震而不雨月當弦風濤渭逆艅艎沒從此無舟濟大川初玉季載考其義莫究指歸既痛絶手足若洗然而悟曰許無言是午字今歲在午也震不雨是辰字其哀瘵至甚移歸院就醫是辰日及奄然之日驗於官歷是上弦日又應月當弦之讖也吁似有所潛受於冥昧間何懸知之若是也憶於洛陽里第始相與定交公曰何以契我余曰死患難先祿位託孤寄命同休共戚此義交也見善相勉也見利相遠也言之而必行守之而必固一旦離此則攻而絶之使處世為匪人歿身無怨言斯益友也余將與吾子契之自是過必相攻善必相激相成如恐失相畏若臨敵雖朝夕共行止人不以為朋比亦君子之能賢善誘也嗚呼公之文之學之精明道行如雷聲日光無耳目者則不知也公之訃始聞人人如有亡碩生巨賢心死氣脫道之不行也天何心焉公諱紓字持卿魯司寇四十代孫繼繼承承世濟不墜閒生傑出磊落相望曾祖岑父皇任祕書省著作佐郎贈司空祖戣皇任禮部尚書致仕贈司徒父溫裕皇任檢校右僕射兼太常卿充翰林侍講學士冊贈司空皇妣河東薛氏族大而顯先司空草八年即世公娶京兆韋氏山東清甲家也有二子男曰鐵婢始十歲甚肖似憶與公約生子命名必如兄弟愚之子曰後魯他日鐵婢當以還魯字之易云積善之家必有餘慶善之教必闡於道儒釋釋固無嗣皇家公家道儒之餘慶也公又賢而無祿其後益大以昌女少於男銘曰嗟嗟夫君嗟嗟夫君孔聖遺允顏回後身高高者天幽幽者神幽幽不見高高不聞不見不聞又何足以云云樞字紀聖絳州聞喜人咸通十二年進士再遷藍田尉直宏文館從僖宗入蜀擢殿中侍御史龍紀初進給事中改京兆尹出為歙州刺史遷右散騎常侍以戶部侍郎同中書門下平章事罷為工部尚書出為清海節度再知政事纍進右僕射諸道鹽鐵轉運使哀帝時忤朱全忠意罷政事拜右僕射貶登州刺史又貶隴州司戶參軍至滑州全忠遣人殺之白馬驛投尸於河年六十五禮之必立宗子者蓋為收是族人東嚮之主亦由是也若祔於遠廟無乃中有一間等上不倫西位常虛則太祖永厭於昭穆異廟別祭則祫享何主乎合食永閟比於姜嫄則推祥禖而無事於禮夫親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷由是言之太祖之上復有追尊之祖則親親尊祖之義無乃乖乎太廟之外輕制別祭之廟則宗廟無乃不嚴社稷無乃不重乎且漢丞相韋元成請瘞於園晉徵士虞喜請瘞於廟兩階之間喜又引左氏說古者先王日祭於祖考月祀於曾高時享及二祧歲祫及壇墠終褅及郊宗石室是為郊宗之上復有石室之祖斯最近矣但當時議所處石室未有準的喜請於夾室中愚以為石室可據所以處之之道未安何者夾室謂居太祖之下毀主非是安太祖之上藏主也未有卑處正位尊在旁居考理即心恐非允叶今若建石室於園寢遷神主以永安採漢晉之舊章依禘祫之一祭修古禮之殘缺為國朝之典故庶乎春秋變之正禮動之中者焉棠字文化咸通末進士府君諱昭字德輝姓戴氏其先杜陵人也裔出周卿佚之後業勳承家軒冕繼嗣祖諱非字名章志秉松筠迹疏名利高尚之德聰明之資父諱宏字仲廣學宗儒術德越前修惟府君罄誠節以奉公負溫和而治衆婚隴西鄭氏備集閨儀包含淑德府君爰自咸通元年逢黨裘甫叛自富陽竊持朱斾都督王式遣團練押衙雲公思益統領鋭師誅夷蜂蠆趨於概水陟彼高岡府君以奮節雄之括於私第啓帑藏之資發倉廩之糧獻以奇謀饋以營壘而元凶投戈㣥黨請命雲公感府君以精才懋略德誼加人遂為上陳請甄前功然承寵渥旅列轅門後時草寇周了髻剽劫武義浸聚㣥凶王郢悖亂狼山深乘巨艦當其征戍獲息妖氛况又頃歲黃巢之衆鼓譟驚天雲旗蔽野巨魁既攻鄰郡輕騎復剽茲邦宣歙觀察使崔玹知府君負三略之材蘊六韜之術遂遣簡練精旅防虞浣溪才展征車俄奔困獸粵奉察兼八政纍承寵錫一同擢以班榮制於鎮轄而元勛益著妙略潛施後有順節者團練押衙文堂久逭刑章一朝面縛雖從惠化尚叶姦回去載中春搆逆於府垣之下脅從於營壁之間遽率凶狂欲趨陶嶺而躍臨境感於畏威竊危忘軀遂由間道府君親持矢石赴隴泉大呼而山樾掃清匪日而妖禽薄滅洎於秋八月台嶺劉文之暴奔趨鏡水之濱府君挺南面之戈矛輔雄藩之籌略始張貔虎之斾已懾萑蒲之㣥顧勛業之無儔實古今之可冠遂鎮概水統以雄師境內莫不澄清汰除姦蠧者也凡挺節驍雄之士咸觖望其趾焉自歷踐崇列詔榮故邦當欣孝養之隆深限幽明之阻嗚乎享年五十有八中和二年八月二十日寢疾終於陶朱鄉里之私第以其年十二月十六日葬於當縣靈泉鄉溫泉里斗泉之源也有子四人長曰惠材益懋華志用踰倫弱冠征戎㣥心企踵次曰堂去載劉文蟻聚亦跳戰於鏡濱恩渥荐臨轄於茲嶺嘗飲水以厲已無遺蘗以留後慷慨為時操持自遠婚於平陽霍氏次曰忠曰闕皆素業前傳清規是守時方幼歲器用踰倫有女三人長適高陽左氏肅雍婦道敬戒閨儀次方問名於盧氏次即閨室未違淑德咸備其餘親親勳統不復一一繁紀也今則卜此重岡松蘿擁藹伏慮年代寢遠陵谷改更命於斯文刊於貞石以紀志之銘曰太華磅礡將積陰陽七政無息百齡有常英雄峻節令譽彌芳挺身報國奮劍安邦繼臨寵渥以起輝光元勛特立妙略尢彰豈期微疾俄歸墓鄉闔營悽慘里巷悲傷卜兆靈野扃仗泉鄉素月皎皎寒松蒼蒼一窆元戶永祚遐昌贄金城人纂類之書多矣其間所載世人用於文字者亦不下數十輩則今未免為陳言也豫事科舉三十年蔑然無效天祐元年退歸故里築選書室以居取九世所蓄典籍經史子集二十萬八千一百二十卷六千九百餘帙撮其膏髓別為一書其門目未暇派別也成於四年之秋由急於應文房之用乃不能詳又數歲復得終篇者四部英華筆頭飛文壇戈㦸應題録皆傳記集異之說若見於尋常之書者此必略之庶兵火煨燼之後或者不至束手豈小補歟同志者幸為珍祕之天復元年十二月馮贄序彥禎魏州人少為本州軍尉歷博州刺史遷澶州魏博節度韓簡死以檢校工部尚書領留後進節度使中和四年纍加尚書左僕射同中書門下平章事僖宗自蜀還加開府儀同三司再拜司徒子從訓之亂為亂軍所殺光啓三年正月五日魏博陵節度使開府儀同三司檢校司空同中書門下平章事樂彥禎謹齊戒三日致書於二鎮足下蓋聞天生蒸民而樹之君以司牧百姓主握二柄禮樂征伐之所興勍寇奸雄之所懼是以大君有率臨之典㣥后承專制之權內守憲章外憑教命其或大盜移國黎民墜塗身居戎閫之榮手綰兵符之重傍觀喪亂坐俟危亡既虧社稷之謀又失子孫之計此亦義夫之所慷慨烈士之所咄嗟敢以狂愚伏陳英悟伏以我國家啓運開國承家創基三百春秋億兆臣妾自㣥凶蟻聚中㝢土分乘輿奔走於道途宗廟荒凉於草莽今者監國雖立朝綱已頺皇祚莫知其所安蒼生莫知其所訴天子之威不能加四海諸侯之力不能保一方弱者危而強者吞雄則飛而雌則伏竟亦身殞名滅國家破離咸有其繇取鑒非遠大約以諸藩捨本就末忘義背盟謀不相從言不相信國是以間敵繇此興與其俱亡曷若共霸論桓文之事則人未敢先為魯衛之邦則誰為不可是以研詳典故揆度事機輒敢指陳庶裨權略今者秦宗權起於纖蠧漸恣狂鋒南苞荊襄北跨河雒屠城拔邑暴物害人使父子不得相全夫妻不得相保血肉塗地荊榛蔽天不織而衣人之衣不耕而食人之食凶酷之甚古今所無竊據要津下視諸鎮而又河東軍擁旄重地受國深恩稔宴安以未移縱貪婪而不息奄有上黨又吞覃懷張皇威聲凌脅蕃屏皆蓄併吞之志盡懷僭大之謀非謂未萌己觀成釁况孟津之衆尋驗保姦汝水之戎果明濟惡仍且海內皆困河南盡饑切料凶狂倍生窺顧若不早為之計必慮悔不可追非宜坐以俟危拱而受制或一隅失所則諸鎮可虞唇既亡而齒必寒皮不存而毛安附而從事始先度禍胎將去本根要傾巢窟况大河之內常山之陽東極海隅北亘蕃部奧壤如砥列城似林億萬衆之甲兵百千㣥之鐵馬建牙樹屏仗鉞分麾周封者盡是賢侯漢拜者莫非名將彼唱此和連衡合從豈能西不如太原南不如蔡賊非惟可恥誠亦堪悲蓋繇久屬升平素無交結慮為姦人鬬謀或置鄰道猜嫌思我同心共為永計今請常山太尉幽州司空荊州司空滄州留守常侍各命至親兒姪或弟兄二人擇地築壇卜日赴會嚴修齊戒虔告神祇歃血誓詞藏之盟府然後以茲五鎮共為一家有事則同謀有征則同舉扶持王室掃蕩賊臣收陷失之土疆開朝貢之道路其為大義莫尚於斯謹請當道李山甫判官奉書陳請呼天告盟指日為誓虔聽明命以行壯圖社稷幸甚生靈幸甚昌嗣乾符時人昭然大唐明聖文物之代符堯舜垂衣之治者蓋我后以天下為一家西涉流沙南盡北戶東有東海北過大夏人跡所至無不臣者行禹湯罪巳之道荷聲明之大業不拓土不開疆烽燧弭徹干戈載戢海外有截中夏晏然無繁賦無勞人慰弱省刑鰥寡孤獨各得其所生物遂其性者蓋闕二字敷布德被遐邇所及也然後顯佛禮崇釋門無賢無愚咸知虔信遂使水不為沴旱不為災歲不至大祲寇不嘗小起我之帝德也我之佛力也時之感致也斯邑也有邑人劉初升等敬善彌堅雖匹夫不可奪志私願首舉響應其言中無難色者是向道不回矣遂立佛頂尊勝陀羅尼經幢并座高叁拾尺幢之建也力非富工非抑饋給者不以疲為辭負販者不以利為吝大哉神通有是化也力既就矣功既成矣永願淨除妄想超越一切聲聞緣覺觀如來不可思議就精進及心慧智離陰界入解脫識相求漸淨非頓之門受安樂具足之福曉四禪逾九地得無生之妙法决大乘之深教祿壽霑霑精進不怠冀瞻部之苦共登羅之因聊紀歲時用彰不朽讚曰有漢興教有唐彌遵厥典昭彰化萬代人惡不染著善證果因蠢蠢㣥生同霑影塵其一解脫煩惱有陀羅尼咸生淨土受大慈悲桑田可變陵谷可移惟茲立石鎮古巍巍繇字為憲池州人咸通十三年進士調建德令辟襄陽徐商幕府檢校御史中丞皇躬抱疾佳夢通神見幡綽兮上言丹陛引鍾馗兮來舞華茵寢酣方悅於宸扆不知為異覺後全銷於美疚始訝非真開元中撫念齊民憂勤大國萬機親决於宸斷微瘧遂沾於聖德金丹術士殊乖九轉之功桐籙醫師又寡十全之力爰感神物來康哲王於時漏滴長樂鐘敲建章扃禁闥兮閉羽衛虛寢殿兮門具嬪嬙虎魄枕欹象榻透熒熒之影蝦鬚簾捲魚燈搖閃閃之光聖魂惝恍以方寐怪狀朦朧而遽至硉矹標衆䫜顤特異奮長髯於闊臆斜領全開搔短髮於圓顱危冠欲墜顧視才定趨蹌忽前不待乎調鳳管揆鸞弦曳藍衫而颯纚揮竹簡以蹁躚頓趾而虎跳幽谷昂頭而龍躍深淵或呀口而揚音或蹲身而節拍震雕栱以將落躍瑤階而欲折萬靈沮氣以慞惶一鬼傍隨而奮躑烟雲忽起難留舞罷之姿雨雹交馳旋失去來之跡睿想才悟清宵巳闌袪沉痾而頓愈幸御體以猶寒對真妃言寤寐之祥六宮皆賀詔道子寫婆娑之狀百辟咸觀彼號伊祁亦名鬱壘儺祅於凝沍之末驅厲於發生之始豈如呈妙舞兮薦夢明君康寧兮福履
