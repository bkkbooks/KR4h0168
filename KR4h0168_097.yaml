front:
  text: 全唐文欽定全唐文卷九十七高宗武皇后三
  hash: sha256:a78ce7fd40c41da64cd0b18d20dcbf133c55bd25a29360d3fe2a08c25b40e3aa
body:
  text: 伏尋登封之禮遠邁古先而降禪之儀竊為未允其祭地祇之日以太后昭配至於行事皆以公卿以妾愚誠恐未周備何者乾坤定位剛柔之義巳殊經義載陳中外之儀斯別瑤壇作配既合於方祇玉豆薦芳實歸於內職況推尊先后親饗瓊筵豈有外命宰臣內參禋祭詳於至理有紊徽章但禮節之源雖興於昔典而升降之制尚缺於遙圖且往代封嶽雖云顯號或因時省俗意在尋仙或以情覬名事深為己豈如化被乎四表推美於神宗道冠乎二儀歸功於先德寧可仍遵舊軌靡創彞章妾謬處椒闈叨居蘭掖但以職惟中饋道屬於烝嘗義切奉先理光於蘋藻罔極之思載結於因心祗肅之懷實深於明祀但妾早乖定省巳闕侍於晨昏今屬崇禋豈敢安於帷帟是故馳情夕寢睠嬴里而翹魂謺慮宵興仰梁郊而聳念伏望展禮之日總率六宮內外命婦以親奉奠冀申如在之敬式展虔拜之儀積此微忱巳淹氣序既屬鑾輿將警奠璧非賒輒效丹心庶裨大禮冀聖朝垂則永播於芳規螢燭末光增輝於日月夫禮緣人情而立制因時事而為範變古者未必是循舊者不足多也至如父在為母服止一朞雖心喪三年服由尊降竊謂子之於母慈愛特深非母不生非母不育推燥居濕咽苦吐甘生養勞瘁恩斯極矣所以禽獸之情猶知其母三年在懷理宜崇報若父在為母服止一朞尊父之敬雖周報母之慈有闕且齊衰之制足為差減更令周以一朞恐傷人子之志今請父在為母終三年之服夫嚴霜之下識貞松之擅奇疾風之前知勁草之為貴物既有此人亦宜哉卿早荷朝恩委任斯重居中作相宏益巳多防邊訓兵心力俱盡歲寒無改終始不渝迺眷蜀中甿俗殷雜久缺良守敝於侵漁政以賄成人無厝足是用命卿出鎮寄茲存養果能攬轡澄清下車整肅吏不敢犯姦無所容前後糾擿蓋非一緒貪殘之伍屏跡於列城剽奪之儔遁形於外境詎勞朞月康此黎元言念德聲良深嘉尚宜布瑯邪之化當以豫州為法今以皇帝諒闇不言眇身且代親政遠勞勸誡復表辭衰疾惓望既衰徊徨失據又云呂后見嗤於後代祿產貽禍於漢朝引喻良深愧慰交集公忠貞之操終始不渝勁直之風古今罕比初聞此語能不惘然靜而思之是為龜鏡且端揆之任儀刑百辟況公先朝舊德遐邇具瞻願以匡救為懷無以暮年致請卿素積忠勤兼懷武略朕所以寄之襟要授以甲兵自卿受委北陲總司軍任往還靈夏檢校屯田收率既多京坻遽積不煩和糴之費無復轉輸之艱兩軍及北鎮兵數年咸得支給勤勞之誠久而彌著覽以嘉尚欣悅良深暑將闌炎序彌溽山林靜寂梵宇清虛宴坐經行想當休愈弟子前隨鳳駕過謁鷲巖觀寶塔以徘徊覩先妃之淨業薰修之所猶未畢功一見悲驚萬感兼集攀光寶樹載深風樹之哀弔影珠泉更積寒泉之思弟子自惟薄祜鎮切煢懷每屆秋期倍軫摧心之痛炎涼遞運逾添切骨之哀未極三旬頻鍾二忌恨乘時而更恨悲踐露而逾悲惟託福田少申荒思今欲續成先志重置莊嚴故遣三思賫金絹等物往彼就師平章幸識斯意即務修營望及諱辰終此功德所冀罄斯誠懇以奉津梁稍宣資助之懷微慰煢迷之緒略書示意指不多云先生道位高尚早出塵俗如軒歷之廣成漢朝之河上遂能不遠千里來赴三川日御先開望霓裳之漸遠天津後渡瞻鶴蓋以方遙空睇風雲惆悵無巳儻蒙九轉之餘希遺一丸之藥朕聞真空無象非象教無以譯其真實際無言非言緒無以詮其實是以龍宮法鏡圓照匝於三千鷲嶺元門方廣周於百億師無師之智必藉修多學無學之宗終資祗夜自金人感夢寶偈方傳貝葉靈文北天之訓逾遠貫華微旨西秦之譯更新大乘小乘逗根機而演教半字滿字逐權實而相曉叡唐御㝢載叶昌期代傳三聖年將七十舜河與定水俱清堯燭與慈燈並照緇衣西上寧惟法顯之流白馬東來豈直摩騰之輩大宏釋教諒屬茲辰朕爰自幼齡歸心彼岸務廣三明之路思崇八正之門往者夙搆閔凶遽違嚴蔭近以孝誠無感復背慈顏露草之恨日深風樹之悲鎮切凡是二親之所蓄用兩京之所舊居莫不總結招提之宇咸充無盡之藏仍集京城大德等凡有十人共中天竺國三藏法師地婆訶羅於西太原寺同譯經論法師等並業隣初地道駕彌天為佛法之棟梁乃慧海之舟檝前後翻譯凡有十部以垂拱元年歲次大梁月旅夷則汗青方就裝縹畢功甘露之旨既深大雲之喻方遠庶永垂沙劫廣濟塵區傳火之義自明瀉瓶之辯逾潤朕以虛昧欽承顧託常願紹隆三寶安大寶之鴻基發揮八聖固先聖之丕業所以四句微言極提河之深致一音妙義盡庵園之奧旨擊大法鼓響振於無閒吹大法螺聲通於有頂為闇室之明炬實昏衢之慧月菩提了義其在茲乎部帙條流列之於後蓋聞造化權輿之首天道未分龜龍繫象之初人文始著雖萬八千歲同臨有截之區七十二君詎識無邊之義由是人迷四忍輪迴於六趣之中家纏五蓋沒溺於三途之下及夫鷲巖西峙象駕東驅慧日法王超四大而高視中天調御越十地以居尊包括鐵圍延促沙劫其為體也則不生不滅其為相也則無去無來念處正勤三十七品為其行慈悲喜捨四無量法運其心方便之力難思圓對之機多緒混太空而為量豈算數之能窮入纖芥之微區匪名言之可述無得而稱者其唯大覺歟朕曩劫植因叨承佛記金山降旨大雲之偈先彰玉扆披祥寶雨之文後及加以積善餘慶俯集微躬遂得地平天成河清海晏殊祥絕瑞既日至而月書貝牒靈文亦時臻而歲洽踰海越漠獻賝之禮備焉架險航深重譯之詞罄矣大方廣佛華嚴經者斯乃諸佛之密藏如來之性海視之者莫識其指歸挹之者罕測其涯際有學無學志絕窺覦二乘三乘寧希聽受最勝種智莊嚴之跡既隆普賢文殊願行之因斯滿一句之內包法界之無邊一毫之中置剎土而非隘摩竭陀國肇興妙會之緣普光法堂爰敷寂滅之理緬惟奧義譯在晉朝時踰六代年將四百然一部之典纔獲三萬餘言唯啟半珠未窺全寶朕聞其梵本先在于闐國中遣使奉迎近方至此既覩百千之妙頌乃披十萬之正文粵以證聖元年歲次乙未月旅姑洗朔惟戊申以其十四日辛酉於大徧空寺親受筆削敬譯斯經遂得甘露流津預夢庚申之夕膏雨灑潤後覃壬戌之辰式開實相之門還符一味之澤以聖歷二年歲次己亥十月壬午朔八日己丑繕寫畢功添性海之波瀾廓法界之疆域大乘頓教普被於無窮方廣真詮遐該於有識豈謂後五百歲忽奉金口之言娑婆界中俄啟珠函之秘所冀闡揚沙界宣暢塵區並兩曜而長懸彌十方而永布一窺寶偈慶溢心靈三復幽宗喜盈身意雖則無說無示理符不二之門然因言顯言方闡大千之意輒申鄙作爰題序云蓋聞大乘奧典光祕賾於瓊編三藏元樞著靈文於寶偈斯乃牢籠繫象演暢幽深雖第一義空名言之路雙絕諸法無相聽說之理兼忘然則發啟善根實資開導宏宣妙旨終寄顯揚至若鹿野初開儼尊容於常住龍宮載闢緘舍利於將來所以地涌全身為證說經之兆空懸寶殿爰標闡法之徵八萬四千分布閻浮之境三十六億莊嚴平等之居敷演一音則隨類而解廣陳三句則劫壽難窮自夜掩周星宵通漢夢玉毫流彩式彰東漸之風金口傳芳遂覩後秦之譯修多祗夜之祕躅因緣譬喻之要宗授記之與本生方廣之與論議雖立名差別而究理不殊同歸實相之源並湊涅槃之會朕幼崇釋教夙慕歸依思欲運六道於慈舟迥超苦海驅四生於彼岸永離蓋纏窮貝牒之遺文集蜂臺之祕籙今於大福先寺翻譯院所更譯斯經所言入定不定印經者此明退不退之心前二後三雖有遲速如來設教同趣菩提既顯神咒之功莊嚴最上爰述下生之記說法度人三藏法師義淨等並緇俗之綱維紺坊之龍象德包初地道轥彌天光我紹隆之基更峻住持之業以久視元年歲次庚子五月五日繕寫畢功重開甘露之門方布大雲之蔭所冀芥城數極鳥筆猶傳拂石年窮樹經無泯宏濟覃於百億遷拔被於恒沙部帙條流列之於左若夫圓嶠方壺涉滄波而靡際金臺玉闕陟縣圃而無階唯聞山海之經空覽神仙之記爰有石淙者即平樂㵎也爾其近接嵩嶺俯屆箕峰瞻少室兮若蓮睇潁川兮如帶既而躡崎嶇之山徑蔭蒙密之藤蘿洶湧洪湍落虛潭而送響高低翠壁列幽㵎而開筵密葉舒帷屏梅氛而蕩燠䟽松引吹清麥以含涼就林藪而王心神對煙霞而滌塵累森沈邱壑即是桃源淼漫平流還浮竹箭紉薜荔而成帳聳蓮石而如樓洞口全開溜千年之芳髓山腰半坼吐十里之香粳無煩崑閬之游自然形勝之所當使人題綵翰各寫瓊篇庶無滯於幽栖冀不孤於泉石各題四韻咸賦七言蓋聞摩羅山頂既最崇而最嚴楞伽城中實難往而難入先佛宏宣之地曩聖修行之所爰有城主號羅婆那乘宮殿以謁尊顏奏樂音而祈妙法因鬘峯以表興指藏海以明宗所言入楞伽經者斯乃諸佛心量之元樞羣經理窟之妙鍵廣喻幽旨洞明深意不生不滅非有非無絕去來之二途離斷常之雙執以第一義諦得最上妙珍體諸法之皆虛知前境之如幻混假名之分別等生死於涅槃大慧之問初承法王之旨斯發一百八義應實相而離世閒三十九門破邪見而宣正法曉名相之並假袪妄想之迷衿依正智以會如如悟緣起而歸妙理境風既息識浪方澄三自性皆空二無我俱泯入如來之藏遊解脫之門原此經文來自西國至若元嘉建號跋陀之譯未宏延昌紀年流支之義多舛朕虔思付囑情切紹隆以久視元年歲次庚子林鐘紀律炎帝司辰於時避暑箕峯觀風潁水三陽宮內重出斯經討三本之要詮成七卷之了教三藏沙門于闐國僧實又難陀大德大福先寺僧復禮等並名追安遠德契騰蘭襲龍樹之芳猷探馬鳴之祕府戒香與覺花齊馥意珠共性月同圓故能了達沖微發揮奧賾以長安四年正月十五日繕寫云畢自惟菲薄言謝珪璋顧四辯而多慙瞻一乘而罔測難違緇俗之請強申翰墨之文詞拙理乖彌增愧恧伏以此經微妙最為希有所冀破重昏之暗傳燈之句不窮演流注之功湧泉之義無盡題目品次列於後云蓋聞惟天著象庶品同於照臨惟地含章羣生等於亭育朕以庸昧忝位坤元思齊厚載之仁式罄普覃之惠迺中迺外思養之志靡殊惟子惟臣慈誘之情無隔願申殫懇上翊紫機爰洎衆僚聿匡元化伏以天皇明逾則哲志切旁求簪裾總川岳之靈珩珮聚星辰之秀羣英莅職衆彥分司足以廣扇淳風長隆寶祚但母之於子慈愛特深雖復巳積忠良猶且思垂勸勵昔文伯既達仍加喻軸之言孟軻巳賢更益斷機之誨良以情隆撫字心欲助成比者太子及王巳撰修身之訓羣公列辟未敷忠告之規近以暇辰遊心文府聊因煒管用寫虛襟故綴敘所聞以為臣軌一部想周朝之十亂爰著十章思殷室之兩臣分為兩卷所以發揮德行鎔範身心為事上之軌模作臣下之繩準若乃遐想帛丿糸載眇鑒前修莫不元首居尊股肱宣力資棟梁而成大厦憑舟楫而濟巨川唱和相依同功共體然則君親既立忠孝形焉奉國奉家率由之道寧二事君事父資敬之途斯一臣主之義其至矣乎休戚是均可不深鑒夫麗容雖麗猶待鏡以端形明德雖明終假言而榮行今故以茲所撰普錫具僚誠非筆削之工貴申裨道之益何則正言斯重元珠比而尚輕巽語為珍蒼璧喻而非寶是知贈人以財者唯申即目之歡贈人以言者能致終身之福若使佩茲箴戒同彼韋弦修己必顧其規立行每觀其則自然榮隨歲積慶與時新家將國而共安下與上而俱泰察微之士所宜三思庶照鄙誠敬終高德凡諸章目列於後云朕聞陽耀陰凝混元所以闕二字天覆地闕十一字高宗見之矣粵若稽古帝唐神闕俱為薙草之場口木口木齊萌同變亂麻之域高祖神堯皇帝晦電凝禎流虹降祉鍾昊穹之眷命闕三字之闕二字太宗文武聖皇帝資靈寶緯挺睿金英稟赤帝於南宮闕地而殪封狶殲蝟結而殄鴟張疇野裂而阪泉震白波靜而闕扆臨明臺而養正坐衢室以居尊宵衣兢若厲之懷旰食闕三字之闕高宗大帝焉爰初在孕及乎載誕見龍登寢其宵有夢象之符休闕大帝之懷紫翼錦鱗與常有異排黼帷而莫懼依繡闕一字而無闕二字聖后曰烏為慈孝之鳥復是太陽之精天意若曰此兒其以愛闕化方流初涉藝門生知自遠若砥金之含彩同瑩玉之開闕不充行莫能正履衣未嘗解帶暨陰明落照柔範韜儀闕埋璽於相思殿前因告天地明祇及山川羣望曰當璽而立闕在庭分陝聿諧其望執金按道闕一字宛闕一字慕其榮於是式降闕之計不謀同發一旦闕一字收是知殷憂以啟聖明多難以闕試之功文武斯極又嘗監和御藥手持入進屬太闕以惰職廢農基以觸圍驚仗天威震怒立命斬之闕戈戰闕一字戎夏克清獨有浿水虧風丸山阻順皇赫斯怒闕戰之氣闕一字居百步之中大帝莫能自安魂膽飛闕而以遠涉之勞時有不豫令大帝總知軍國閒日闕太宗命大帝承旨玉階即令敷暢闕太宗撫大帝頰而言曰吾聞闕流闕集紫庭地含梧野之哀山起祚宮闕之物豈余闕二字而闕二字哉侍臣銜涕敦勸扶而闕先忌則潛泣累晨澤奉遺圈則凝哀永日因闕之鏡歟好生惡煞之闕一字財成有截雨施雲行之惠沐浴闕其源而春賞秋罰闕二字攀檻思聞逆耳之言瞽說狂詞闕煥乎天文架丹闕一字而首出矣闕一字材兼運杖仁義以明威闕官貽後昆而作範劉臺罷構姬沼弗營寶駟咸歸闕畜而闕二字皇之神務焉想空谷以載懷望中林而式闕刑不怒而威不言而信去罰寔由於一德勝殘無闕凝甘闕三字而湛夜瑞萐薦搖風之影祥闕萬騎闕二字披月於云山山轉星闉闕謀臣若雨猛將如雲競獻九攻之能爭闕九天偏將暫動戎麾俄清十角闕逍遙而訪道思窅眇以尋真或轉斾蕭關或闕巳崩闕三字貞闕二字抱闕一字舄而凝哀捧遺弓而闕仁況又神聖文武並闕一字諡今故因仍舊闕文闕一字之詞英豈能闕一字聖海之遙源敘闕始闕一字敬養允副因心近者闕一字遠之初塋兆闕自古聖皇咸遵菲葬穀林稽嶺唯聞簡素闕因天造無待人功微將所習之書以示不忘闕而闕一字符隱翠柏而成象石呈永固闕將歸上京崩訴穹旻志期攀闕易闕一字茹荼之恨闕一字盡唯思賛述少慰抽摧但闕前秦苻堅時秦州刺史扶風竇滔妻蘇氏陳留令武功道質第三女也名蕙字若蘭識知精明儀容秀麗謙默自守不求顯揚行年十六歸於竇氏滔甚敬之然蘇性近於急頗傷嫉妬滔字連波右將軍子真之孫朗之第二子也風神秀偉該通經史允文允武時論高之苻堅委以心膂之任備歷顯職皆有政聞遷秦州刺史以忤旨謫戍燉煌會堅寇晉襄陽慮有危逼藉滔才略乃拜安南將軍留鎮襄陽焉初滔有寵姬趙陽臺歌舞之妙無出其右滔置之別所蘇氏知之求而獲焉苦加捶辱滔深以為憾陽臺又專形蘇氏之短諂毀交至滔益忿焉蘇氏時年二十一及滔將鎮襄陽邀其同往蘇氏忿之不與偕行滔遂攜陽臺之任斷其音問蘇氏悔恨自傷因織錦迴文五綵相宣瑩心耀目其錦縱橫八寸題詩二百餘首計八百餘言縱橫反覆皆成章句其文點畫無缺才情之妙超今邁古名曰璇璣圖然讀者不能盡通蘇氏笑而謂人曰徘徊宛轉自成文章非我佳人莫之能解遂發蒼頭齎致襄陽焉滔省覽錦字感其妙絕因送陽臺之關中而具車徒盛禮邀迎蘇氏歸於漢南恩好愈重蘇氏著文詞五千餘言屬隋季喪亂文字散落追求不獲而錦字迴文盛見傳寫是近代閨怨之宗旨屬文士咸龜鏡焉朕聽政之暇留心墳典散帙之次偶見斯圖因述若蘭之才復美連波之悔過遂製此記聊以示將來也如意元年五月一日大周天冊金輪皇帝御製
