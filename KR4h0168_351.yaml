front:
  text: 全唐文欽定全唐文卷三百五十一子元越州會稽人開元中舉能治易老莊者擢侍讀遷祕書少監兼集賢侍講學士徙宗正少卿以疾授祕書監卒贈汴州刺史
  hash: sha256:778dd6ece214a62d75553db7bc178cabed4fe562a51e2372fab7b2b9de2f0124
  markers:
  - {type: head, offset: 14, content: 康子元, id: KR4h0168_NFKB_351-h1, level: 1}
body:
  text: 議曰臣等謹桉顯慶年修禮官長孫無忌等奏改燔柴在祭前狀稱祭祀之禮必先降神周人尚臭祭天則燔柴者臣等桉禮迎神之義樂六變而天神降八變而地祇出九變則鬼神可得而禮矣則降神以樂周禮正文非謂燔柴以降神也桉尚臭之義不為燔之先後假如周人尚臭祭天則燔柴容或燔臭先以迎神然則殷人尚聲祭天亦燔柴何聲可燔先迎神乎又桉顯慶中無忌等奏稱晉氏之前猶遵古禮周魏以降妄為損益者今桉郭璞晉南郊賦及注爾雅祭後方燔又桉宋志所論亦祭後方燔又檢南齊北齊及梁郊祀亦先飲福酒訖燔燎一作後方燔又桉後周及隋郊祀亦先祭後燔據此即周遵後燔晉不先燔無忌之奏事乃相乖又桉周禮大宗伯職以玉作六器以禮天地四方注云禮為始告神時薦於神坐也又云以蒼璧禮天以黃琮禮地皆有牲幣各放其器之色又禮器云有以少為貴者祭天特牲是知蒼璧之與蒼牲俱合奠之神坐理即一作節不惑又云四圭有邸以祀天旅上帝即明祀昊天上帝之時以旅五方天帝明矣其青圭赤璋白琥元璜自是立春立夏立秋立冬之日各於其方迎氣所用自分別矣今桉顯慶所改新禮以蒼璧與蒼牲蒼幣俱用先燔蒼璧既已燔矣所以遂加四圭有邸奠之神坐牲既已燔矣所以更加騂牲充其寶一作實俎混昊天於五帝同用四圭失特牲之明文加為二犢深乖禮制事乃無憑請依貞觀舊禮先祭後燔庶允經義謹議趙達餘苗惟丁及乙並測玉衡之度俱間瓦兆之占二十未能成童己邁謀龜謀筮補丁以卜史之曹六日六旬任乙於保章之署雖咸用其術而未愜所懷論長幼於弟兄徒稱易就訴六八之年載頗亦難從假有讓詞庸無他計既言並解方見同收所司差擇寧乖允當各參爾位無或浮言域中有道天下無外雖在戎落亦挂周行鶻子運偶南薰地濱西域久沐唐虞之化獲參州郡之班萬里牽絲俄畢子荊之任九流懸鏡行披彥輔之雲未果登龍旋驚退鷁金微絶徼將還敬梓之鄉玉塞遙途尚轉飄蓬之陌風霜之疾忽遘於蛇杯寒暑之期亟環於鳳律瞻彼故里歸路仍懸載撫身名銓衡復及本州文解難以希求往往官曹易為憑託遂蒙申送但事奔波不就京邑仙臺直指神都覽觀辭官歷稔不可妄託田收明敕垂文無宜越來此選二途咸爽百慮空馳請責詭隨之人無黷清通之鑒無文咸秩既重於肅雍有功則祭或防於跛倚甲以棘七方載式預監牲茅縮以陳遂聞歸胙餕食煙達應非尊者之餘胙致日嚴自入先生之饌用此而祭頗乖經禮之儀未及於刑須黜平典之議義在斯合借容猶重於將軍道或可存縫掖未輕於太守景歡言小吏將疑十五之詩倨見功曹無近三千之律耕耘禮義儒行已申於仲尼嘯傲風雲高節未屈於光逸雖闕循牆之敬豈干銘鼎之科將加譴黜恐乖寬裕希從理遣無重斯愆鄭景學邁八千自高天爵郡牧賢求五百式賁人文而磊磈無拘忽醉廚中之酒崩騰有作便題几上之文使者操觚寫而旋去法司執憲訊以剛來雖疾惡之誠初疑可爾而優賢之道良或未然邑宰政尚儒風事符茅茹以為詞同宿構無慙孫綽之金德應敷揚堪薦郤詵之玉眷茲兩議須遵一理昔嗣宗酩酊曾不置以科條今鄭景含毫何遽繩於傲慢請輟埋桐之事微申樹李之風俶半千孫開元十六年以能言佛道孔子者召入禁中相答難屈其坐人聖人體道雖旁行而不流君子為儒亦博覽而多識甲誠不敏嘗窺祕文傳妙術於青猿得精符於翠鳳管公明之好事不寐每踰於夜分劉子政之多能觀星或至於明發固當率由古道仰止先賢既非日御之官當晦風占之迹況門庭之內賓友相趨遂乃別構青樓回披丹檻當牖異紅粧之女寓宿乃蒼頭之僕董舒災異主父猶且致尤雕語怪神秦帝尚令下獄既私庭竊候罪已良多公憲正詞刑其無捨但以考陳生之國志嘗有其人徵葛公之蜀科未聞斯罪古今異政夫何足疑待更細推方從公議績元宗時人神理茫昧幽明肸蠁揆之於有演象渙於周經核之於無持論標於晉史甲也持離堅之辨乙也遘無妄之災人謀鬼謀殊與能之迹一生一死等交情之見雖在原有急難之忿而徙壑無可返之魂不降錫齡之神忽怨淫昏之鬼且當其變起倉卒事兼夭枉苟寧我之是圖豈恤人之有責況泛詳昭典靡及幽途讓以偷生方期恥格抑之謀殺稍涉淫刑菲見所窺事宜從記映元宗時人對臣聞天矜於人人必所從臣謬黷吹萬僻生草莽幸陶無為之風得守忠蹇之迹常願拜手宸極敷獻乃誠危言匪躬少答亭育昔仲尼稱鳳鳥不至河不出圖蓋傷衰周之運不見聖明之代也臣今輿頌芻言肅祗眷命陪聖蹕於神嶽奉金策於玉宸賡歌泰清咫尺旒扆是天縱聰明而超於孔某不圖幸之至於斯也況周頒禹膳列坐堯衢此優賢之至也愚臣何足以充塞敢不布其腹心竭盡聞見臣伏惟皇穹有成命聖唐受之崇高配天廣大配地天地合德而陛下大明於其中有以覲高祖之耿光有以恢太宗之鴻烈樂成於郊祀而昭升上帝禮備於脽上而敷聞后祇於是柴于岱宗望于秩首三光全而五行序八荒協而萬國諧皇靈丕應象物昭格無疆惟休能事畢矣況陰陽燮理則賢相盡規風俗敦龎則良牧宣政百揆時序庶物咸亨誠已鬱映華胥邁績堯舜豈夷吾所記七十二之涼德而望清光哉而猶恭默思道勵精圖政帝闕崢嶸而下臨天問昭回而盡覩乃賜臣策曰延想無為之理聿修太和之化匪曰能致將與圖之所以謀廣聰明詢於大陋使君子道長俊乂用彰陛下執謙之至也天下幸甚天下幸甚愚臣無得而稱焉制策曰夫原疾而授藥者良醫也因時而救弊者權政也今塞垣猶守府兵云耗間人輕去冗食難歸者臣聞先王之理布在方策乘時司契其道深乎陛下窺覽萬化之源獨運安危之兆執大象鼓洪爐知微其神惟睿作聖九門嘗藥致蒼生於福壽七政齊衡得元珠於利見雖講信修睦寰區大同而安不忘危故塞垣仍守雖道德齊禮黔庶康濟而寬以厚載故間人或浮臣又聞之兵戈者威不軌而昭文德也兆庶者忘帝功而畏苛政也邊鄙豫備誰能去軍參決違方時聞失業總寰瀛而觀偃伯則三邊之戍役不足多也據天下而覽兆人則萬一之逋逃不足怪也況國家皇極作乂七政有倫增新軍以保革浮惰而綏輯何憂乎府兵之耗何有乎冗食不歸雖休勿休惟陛下之聖慮也制策曰膏粱無恥於僥幸蓬蓽未致於退讓選舉殷湊官員不給效職者或祿仕而養資試言者多浮華而背實當今士食舊德農服先疇結綬登朝咸遵揖讓被褐在野盡歸廉潔臣實覩還淳反素之風不知無恥未敦之事尊謙俯問臣何敢奉欽若帝唐之有天下也久於其德人文化成敦詩書悅禮樂濟濟多士開元以寧日者十銓分鏡㣥材焯敘觀行考言責名徵實克黜浮薄登延俊秀大革前弊其命維新則推讓之風行尸素之源滅其肯養資祿仕以速官謗若使會府持衡守而勿失將恐詠彼空谷歎此才難豈有員不給官殷煩乎選士言而背實浮華於舉才臣雖庸愚有以知其不然也制策曰豈風之不臧何草之難偃也澄源正本厥路何由聞乎古者井田有助公私取給諸侯貢士賞罰存焉改轍欲從迷津尚佇者臣聞人無恆德實從上教草順風而靡偃水隨器而方圓陛下神謀元行德如天覆驅今之代歸於壽域深源固本政事惟醇俗既分於土宜人亦同於上好又何取乎井田古制力助前規賞罰於歲貢之士增削於諸侯之地若斯而已哉夫五帝不沿樂三皇不襲禮非固相反蓋取隨時泥以從鈞車難改轍臣誠愚妄不識大體竊願陛下神而化之使人宜之正如當今之代也策曰文質再復忠敬何適於時齊魯一變親賢何近於道也大哉聖問臣敢揚之臣聞之文質再而復正朔三而改殷因於夏周因於殷人德齊莊夏尚忠厚殷人質也周人文也文質雖變忠敬咸宜不敬則禮節遂乖不忠則弻諧斯替匡朝闡化適時惟一然則敬自外飾忠由內淳必也奚先請同去食若乃親親而尊尊者其有周公之餘化乎舉賢而尚忠者其有太公之遺風乎孔子曰齊一變至於魯魯一變至於道魯由舊章斯焉殆庶制策曰擇何典而淳俗乘何法而安人何功而天地和平何德而黎元富壽者臣聞諸元元皇帝曰我無欲而人朴大哉至道不可多言伏願陛下克修聖祖恢維化綱崇帝象之風反皇人之始俗已淳矣人斯安矣三事允理六府孔修則地平天成矣輕徭薄賦慎罰措刑則既富且壽矣豈臣庸鯫克堪預焉伏以垂政立範因時變通布陳前載在帝聰今乃下問愚鄙徵其辨述豈不欲觀其末學收其微才臣狂妄斐然非相如子雲之流也幸屬千齡大慶五載修封遂得獻頌皇衢參陪鑾扆慙考言之無取念天獎而何階忠比魏臣空思捧日夢非秦后謬至鈞天局影天庭若臨冰谷謹對日新元宗時人鶴鳴山據九老仙經云黃帝時有天真皇人駕鶴來此山上棲息數日有鶴悲鳴化而為石因號鶴鳴山又言隋開皇三年蜀主秀夢一神人紫衣金冠侍從千人居此山下令使者訪焉古老曰先有此神在此山前闕水之側漢和帝封為鶴鳴山君即此神也彥璿元宗時人君諱無慮字忠眷隴西人也昔月貫於昴咎繇誕而邁德氣感流星伯陽生而啓聖惟彼降瑞因茲命氏曾祖貴隋太中大夫延州刺史涼國公皇朝封隴西公任切分憂寵加芳理朱旗映日皂蓋生風屬隋室道喪我唐天啓疇庸錫壤俾崇舊勳封以隴西昭其業也祖斌皇朝銀青光祿大夫隰吉二州刺史襲封隴西公闕高闕御下以寬洗幘清心不言而理襲封本郡昭其祚也父闕道皇金紫光祿大夫汾州刺史股肱之郡公輔之材克著政闕尤闕人望遷鎮軍大將軍左驍衛大將軍上柱國襲封隴西郡公武庫森森縱橫矛戟智囊闕風雲煥乎鉤陳設在蘭錡乃祖乃父自公自侯昭其貴也君衣冠奕世禮樂闕賢慶靄炳靈光昭茂大君有命人衛天和階闕呈祥仲由負三軍之勇燕頷標異班超封萬里之侯弱冠於清邊軍立功授遊擊將軍左衛長上明略經濟雄心英果剋清妖孽飲至天庭師出以臧功宜上賞朱紱斯曜可不偉歟無何轉授鄜州章州府右果毅時關內按察使強闕以君幹蠱奏攝會州司馬又改授同州洪泉府左果毅仍令長上一貴一賤喜慍不形於色或出或處寵辱無介於懷位闕題輿闕申龎統名參都尉闕屈曾洪有敕差充闕野軍副使舉不失德勤不告勞展充國之務農輟揚雄之執戟軍儲是給闕馬賴焉尋為太原節度使李皓奏授薛王府典軍蔽扞雄城趨侍闕每入招賢之觀時陪樂闕之遊習習雄風和而扇物粲粲闕寵而益闕青春始華元夜祕景歲不我與天奪其運以開元十七年五月七日終於靜恭私第春秋六十有二以其年六月十一日歸葬於萬年縣神禾舊原陪光塋禮也嗚呼哀哉賢王端憂故人啜泣垂天之翼必鎩於紫霄經國之材俄辭於白日遂使瑤林瓊樹瘞草木於佳城龍章鳳姿沒風煙於闕嗣子闕庭等孝履增感攀號無訴恭陳遺事俾刊豐石銘曰公侯之子兮纍代其昌河嶽之秀兮為龍為光克岐克嶷兮發言有章立功立事兮厥政其芳天何為兮速罹其殃哲人痿兮為代所傷飛旐翩翻兮出帝鄉素車逶遲兮西龍岡閉以大隧墐於便房勒勳鐘鼎畫像旗常日黯黯兮愁欲暮風蕭蕭兮悲白楊曜南昌人開元中進士為貝州參軍秦築東門於海岸曰琅琊臺高可望遠而東之人悉以宵分之後觀日於海底者壯其觀而為賦云秦門之東天地一空直見曉日生於海中赤光浮浪如沸如鑠驚濤連山前拒後却圜規上下隱見寥廓焜煌天垂若吞巨壑當其扶桑洶湧於雲光陽德出麗於乾剛汗漫翕納將吞六合沖融青冥遙浸大明羲和首馭夸父上征眩轉心目蒼黃性情傾地輿而通水府吸天蓋而駭長鯨彼秦伊何崇此為門委絶人力其誰敢論失萬邦者雖設門而必圮表東海者諒無門而亦存步秦亭而在此傷魏闕而何言千載之後石梁斯在時無鬼功豈越滄海念無道而肆志將不亡而何待我國家踰溟渤而布聲教窮地理而立郊坰略秦皇於帝典參漢武於天經顧荒臺而寂寞取殷鑒於生靈爾其秋景超忽晴光渙發蜃氛干雲蚌胎候月長波沃蕩超百谷以深沈唳鶴徘徊想三山而滅沒齊魯郡邑霜天泬寥凌虛無而倒景臨沆瀣而乘朝日向濛汜雲橫麗譙追魯連之達節行將蹈海仰田橫之行義若在雲霄驪龍之珠㣥玉之府想望帛丿糸邈依稀處所有海客之無心託扶搖之輕舉太亨元宗時人夫丈人山者本青城山周回二千七百里高五千一百丈即道家第五寶仙九室之天矣黃帝拜為五嶽丈人因以為稱服朱光之袍戴蓋天之冠佩三庭之印乘科車主五嶽上司六時降水仙唱泠泠而霄轉神燈爛爛而夕照仙都衆妙之奧福地會昌之域張天師羽化之處焉其為狀重山謺嶂巨壑幽溪藏金而崎岸穹崇蘊玉而林篁潤澤紅巖爭出絳岑攢秀上巍峩而勢斷於空下㟏岈而不見於底紫氛曉靄黛色晴濃欹嵓嶷谷而中豁穹石隱嶙而回跨削成超華峻極逾嵩錦峯懸烏兔之輝赤水截虹霓之影則有靈芝擢秀芳桂叢生龍篠嬋娟而駢峙塵松森梢而重列水因祈而愈疾山至感而登仙龜鶴於是乎栖遊鸞鳳於是乎翔集露光懸白即盈隱士之杯霞氣飛紅遂映仙家之酒至夫恍惚幽象窅冥霝鬼迹怪異休徵鬼神情狀則宣尼所不談矣我開元神武皇帝執持大象恢宏祕籙天宇廓清人寰交泰蚩尤害盡訪道於崆洞華封喜來尋真於姑射郊禋天地大禮也望秩山川巡狩也封勒岱宗報成也巡謁五陵至孝也講習二言崇道也飾禮神之館增類帝之壇禋於六宗遍於五嶽尊明號擁神休河洛獻圖書山川出車馬將以下咸五上登三與日月以齊明並乾坤而合德南山獻壽巍巍而永固西母進圖明明而本列則夏殷周漢將何以儔議哉奉開元十八年閏六月十八日敕於青城丈人山置祠室又奉今年八月二十一日敕青城丈人山宜令所管州縣揀本山幽靜處與立祠廟其圖分付道士將往建立銀青光祿大夫使持節蜀州諸軍事蜀州刺史上柱國昌平縣開國侯臣楊勵本忠孝是資公清在職惠以綏物刑以平邪三刀之州縣克寧五符之功勳獨效奉遵宸旨恭惟靈廟親畫規模改興版築亟勤冰節採構雲林計日而成工徒不擾至若輪奐光華崇蔚晶麗倚碧巖而遐構面洚潭而宏峙栱櫨沓出棼橑謺施虹梁數重虬簷四起丹楹霞赩紫壁冰淨豐雄而曉挂斷雲皎皛而夜懸明月棟宇成矣彰聖主之崇恩堂室巋然想神靈之是愛足可殷薦芳果尊奠馨稷又奉八月二十五日敕青城丈人廟準五嶽真君廟例抽德行道士五人焚香供養聖恩覃溢天澤洪沛神姿麗美遠降於九天麗像昭輝長存於三蜀固當保持薦祉扶護聖躬鳳歷千秋龍居萬歲豈蓬萊方丈久視長生哉縣令薛椅錦製臨人絃鳴作宰惠存惸獨威息姦豪道揚三教政兼五縣僉為揚洪徽騰茂烈大功必歆於刊勒大仙必期於福應微臣弱翰職慰斯勞黃卷雖勤元經已老庶夫紀功銘石地久天長山嶽之靈迹載揚江漢之豐碑獨立其詞曰聖人大造澤及山川秩宗望祭通幽洞元惟此靈嶽代出神仙丹邱紫府逗月乘煙虔奉宸渙創營靈室峻宇干星回軒抱日虹梁載構虬簷突出燦爛孤雄巍峩罕匹天降神像飾以丹青真空日昱日昱仙壁瑩瑩蘋蘩入奠黍稷陳馨光深岷曲色照江汀英英仙使奉宣明旨勤勤良牧至公而理式建華堂長開靈祀福庭幽寂齋壇迥起神功可紀聖德長存勒此銘石傳諸後昆景福肸蠁神報國恩宗枝百代子子孫孫徐太亨記納開元朝陳留採訪使國有燕饗使存聘覲苟趨步失容豈外臣倨禮王季秩班王爵位參朝會拜命之辱則崇布武之儀肅恭之容旋被書之正故知取禮則非爽謂失則深文肆無稽之薄言責有恆之大典眷言彼季頗習禮經得中之儀固無乖於揖讓同惡之恤爰匪臧於訟詞誰謂王人不如林放公諱嘉泰字元亨其先魯展氏自司空無駭至於展禽食邑柳下遂因采錫姓魯為楚滅遷於晉之解縣今為河東解人也洎衛之莊漢之祉裦之講論六義琮之黃金一笥赫奕勳業代有其人夫乾之垂象也上將躔於五緯坤之導河也中條控於一曲闕一字以育粹應德嶽以降神生賢賢可以為王爪牙德可以為國禦侮孰任其所事則公庶幾焉曾祖則隋左衛騎曹參軍皇贈蒲州長史堙厄卑位有才無時季葉蕩而困於先號聖人作而光於後命祖奭皇中書令河東公厚德載庶物直心尹天下齊七政於璣衡致一人於仁壽雖子孺之周密方進之通明不是過也父爽皇贈朝散大夫鄜州司馬遜而守中敏以承德故有臺之樂未寵於王庭而斯皇之榮遂飾於泉壤三代繼業盛達公承纍行之慶靈稟中和之粹氣粵自羈貫逮乎成人矗其隄防森是矛戟直節以成果勇溫德而著令儀其行已也恭其親師也謹其從政也恪其取友也義奉長者之深誘不越中庸讀夫子之微言取其大略公幼丁太夫人艱襁褓之內若有所失景雲元年先帝在藩以公女兄為妃則申王之舅以外戚解褐授左金吾衛中候則知傅昭儀之淑德載誕恭王李夫人之麗容是榮協律公循道執一體正無二不以怙寵而倨貴不以苟榮而屑禮無何丁鄜州府君艱一粥之食杖而能起無時之號泣以繼血先帝龍飛公猶在疚制令起復為左領軍衛左郎將賜緋魚袋腰絰外除心喪內毀朝廷韙之開元二年申王以伯舅重奏公為本府左帳內典軍九年又遷右衛率府郎將十年又轉剡王府咨議十三年加遊騎將軍守左衛中郎十八年定遠將軍守左清道率或參桂巖之文雅或握蘭錡之兵權肅宮道則荀理之清和翊周廬則衛綰之醇謹二十七年又加明威將軍守右武衛將軍上柱國賜紫金魚袋任同許褚職惟萬歲戎旅孔循禁衛斯整煥彼章綬崇其寵榮故一心事君凡遷徙官位不矯訐以沽譽不介獨以轢㣥所蒞必聞所適必當來有其惠去有其恩無潘嶽之一除免子文之三黜縉紳之士以為美談以其年七月遇疾彌留有加無間御醫驛路中使在門猶能正不溷邪故巫覡莫進歿必合度故手足全歸以八月四日終於長安開化里之私第春秋六十有一遺誡薄葬明主驚悼久之詔使就第贈物三百段粟一石葬者量借手力縵幕威儀簫鼓飾終之典斯為盛矣以十二月二日歸窆於萬洪固之原禮也羽儀道路觀霍葬之紛紛龍虎岡原見勝城之鬱鬱公萬頃旁汪千尋直上碩量瑰材敏識甘節家人莫見其喜慍時輩但美其風流其存也子罕之不貪其歿也國僑之遺愛故欒棘斬焉謂之善居也金革不避謂之從權也貴而不滿謂之鳴謙也仕而守節謂之公器也疾而得正謂之知禮也終而薄殮謂之達道也詩曰人之云亡邦國殄瘁其此之謂乎夫人王氏琅琊郡君晝哭之外庀喪字孤嗣子祐良等遑遑焉過禮之孝也哀哉碑篆盡假於余柔翰徒施實慙於墨妙貞石既刻有愧於色絲其詞曰將軍本胄出自周後羽父諸族展禽食柳自茲保姓才與時偶涉河居東賢哲代有鼎氣潛育河精陰受降生將軍百夫之首明鑒思瑩洪鐘待扣三紀典兵一心事后賢妃之季名王之舅梁苑寵崇漢家恩厚朱軒繡軸金印紫綬渥窪籋雲青萍衝斗位才上將年未中壽遇疾徹懸全歸啓手杜陵東陌秦原北阜旌轉城隅煙凝谷口屬屬孤允哀哀孀婦松檟淺深岡巒左右通溝刻石天長地久嗚呼將軍歿而不朽
