front:
  text: 全唐文欽定全唐文卷四百九十四權德輿十二
  hash: sha256:f36d4b7564474c92414f77bb8a1a964625e9d3d70c270d6051839ab4229defc2
body:
  text: 聖人南面以理天下在崇起教化緝熙於光明太宗文皇帝敷文德建皇極始於宏文殿側創宏文館藏書以實之思與大雅閎達之倫切劘理道金玉王度盛選重名虞世南褚亮而下為之學士更直密侍於其中其論思應對或至夜艾誕章遠猷講議啓迪武德貞觀之澤洽於元元厥有助焉其後徙於門下省景龍初始置大學士名命益重多以宰司處之所以登閎古先腴潤大政則漢廷之金馬石渠蘭臺延閣方斯陋矣按六典常令給事中一人判館事每二府爰立則統於黃樞而或置或否不為恆制後二十年閒斯職闕焉前年秋八月今河中司空公居之今年夏五月相國蕭公居之公粹清莊重山立泉塞苞孔門之四教蘊洪範之三德靜若彞器扣如黃鐘由小司徒升左輔乃蒞斯職於是戒官師稽憲令貴游青襟辨志樂㣥皆循其方而遜其業且以左戶之羡財百萬附益而修飾之公署書府靜深華敞清禁之內輔臣攸居宜乎舒六藝而調四氣於此室也初公之王父考功府君在中宗朝為直學士懿文含章休有厥聲至公則聿修之宏大貽厥之昌阜盡在是矣至若命館之名再為修文終為昭文改復歲月傳諸故志前賢名氏宜列屋壁公以德輿交代於中臺之任踊躍於大冶之中惠然授使得論次自景龍二年李趙公嶠始受命為大學士至公凡若干人楬而書之所以備文館之故實廣台臣之年表抑公之命也不敢辭焉元和二年秋九月記漢廷尚書郎辨章制度主文章起草之任東漢方冠以曹名用諸曹功次超卓者轉遷選部魏晉已還其任寖劇國家紀律昭明官修其方凡薦紳之倫未命為大夫者滿歲皆調於轂下啓事賦録必先有司初上元中天官趙郡李敬元號為稱職以覆視官簿差次裁成端本肇末不得不重乃請外郎一人顓南曹之任其後或詔同曹郎分主之或詔他曹郎權居之皆難其才而慎斯舉也大抵膺是命者多士必屬耳目焉以其公私能否之聞不可遏也以事之委會吏之奇邪因緣詭故中若市道居之者通則闊略守或深刻苟成績於是則翰飛不暇登二掖贊六職得之夷易疾若傳置太原王仲舒字宏中溫毅廉直清方敦實風概資才邁乎㣥倫貞元十年冬繇諸侯部從事賢良對策歷左右諫列儀曹考功郎十八年實受斯命類能故也於是用心堅明忠恕循理官業程品具舉尢違自絶然後以狀之成質於冢宰小宰罷遣者不讟受祿者不誣恢恢然投其虛而芒刃不頓君子以宏中之道為折中矣昔春秋書士縠曰堪其事也魯語曰署所以朝夕虔君命也今因官署而舉事任春秋邱明之志也至若龍朔咸亨改復之說此皆不書周官司門為司徒之屬今為司寇之屬員外郎於周為上士後數更其名至隋為承務郎武德初方定為今制秩從六品上大凡自漢魏以還典曹理事雖時有汙崇官有輕重或百職耗廢雜而多端而郎位皎然未嘗有鹵莽進越非其任者蓋宗公貴仕多由此塗出所以儲明才練官業必於是焉方今車書尉候通道旁午而斯任尤劇彭城仲子陵修詞而筮仕說經有師道自博士祠部郎稍遷於茲且以南轅銓藻之勤久次而後至循一作修性自牧暗然君子之道也况大雅之匪懈孔門之政事古誼家法久於講貫遵修砥礪其可量耶至若門關出入之籍設險間邪之義譏而不征守而不紊列在令典端如貫珠故可略於此仲侯以故志屋壁之隙壞磨滅使鄙夫書而補之貞元辛巳歲夏六月記按六典祕書郎四人從六品上分掌四部書以甲乙丙丁為之目昔漢武帝聚天下文籍於廣內謂之中祕書魏晉之際祕書與中書或分或合故云職近日月宜居三臺之上丞郎之位與南宮相亞歷代辨論與時輕重國初思漢廷延閣之制薄江左貴游之選始以岑江陵虞永興褚河南迭為之厥後彬彬多文學之士然則先王之法制官師之訓典九流百氏如貫珠然學與仕皆優而旋相為用者其在茲乎今年春滎陽鄭君具瞻自涇陽尉承詔授任鄭君質重而有敏行坦夷而含明識且今中書相君之令弟也方以結綬滿歲調於選部言吏資者積三遷而後至今超居之有以見擇賢審官與怡怡綽綽之道為盡美矣在晉鄭默領中外三閣始刪煩文而朱紫不雜開元初君之王考潁川府君叔祖刑部府君皆繇禮官博士繼登其任諸父諸兄或解巾以司讐校或功次而奉朝請含章筮仕多在於斯猶桓公武公之代為卿士蓋善於其職而宜之之義也謂鄙人嘗學舊史能知書府官業之所繇是俾編次郎位彰施屋壁時貞元庚辰秋七月記漢制三輔丞秩六百石至東漢秩千石魏晉為京兆郡則曰治中至隋則曰司馬又曰贊治國家沿前代之故再更其名至開元初命為少尹其員二其品四綱紀衆務而分二之上助官師表則之重而佐其慈惠下董掾史屬城之理而推其功善大積而不撓中行而有倫和協輯睦宣明教令非文行政事之全者不得居之貞元十六年春二月詔宏農楊於陵字達夫自吏部郎中蒞其職先是達夫之佐元侯也四入御史府登天臺也五為劇曹郎懿文菁華履行直溫折中憲令克勤細大是宜典司名命列侍左右而猶以吏理揚歷於浩穰之府抑天之愛人俾覆露於轂下耶或姑閲其能而將大授之耶初西廳少尹視事之堂大歷中其長黎氏以勝勢之近取為亭沼故移創於是自後厥官罕備居之者不推本所代而斯宇寖廢及達夫之拜未浹旬其僚繼之於是達夫徵缺員以循舊常宏必葺以辦攸處用宿其業而修其方凡所顓督武備廏置刑書糾禁工徒啓塞三右曹之事大凡天子縣內之理無不贊也無不抗也稱職者或退其品而選於近侍或進其材而擢為大吏佐六官分十聯皆其遷次然也以舊記湮落慮失其傳今斷自太極元年而下列其名氏歲月俾風采相屬且為故志云古者諸侯路寢成則考之今刺史頒詔條而都府兼支郡辨章命令必有攸處署者位之表也一方之所屬目焉黔中為楚西南徼道在漢為武陵莊蹻循江以略地唐蒙浮船以制越五溪襟束為一都會長人者急之則愁擾以走險緩之則橫猾而犯禁故分命者得持節按部而輯綏之視他邦授律之不若也元和二年夏六月制詔商州刺史隴西李君以中執法剖符茲土凡四使十五郡五十餘城裔夷巖險以州部修貢職者又數倍焉察廉經理招徠教化以柔遠人以布王澤先是兵火焚如之後公堂庳陋饗士接賓禮容不稱君乃規崇構開華軒西廂東序靚深宏敞廣厦翼張長梁翬飛修廊股引麗譙對起自堂徂庭陟降攸寧耀勿目爽乎光明宣慈和以洽平君子謂福黔人於此堂也信矣李君敏肅而才代為宗室吏師先尚書嘗繇大農賦政於此凡七易守臣而君嗣其職老壯感泣猶鄭人宜桓武之世焉君之長壽安也則泉曰噴玉在湖也則亭曰白蘋在商也則館曰丹水皆得勝概流為詠歌及茲則興事任力休嘉宏大此物此志惠於斯人其他可知也其陟明可前知也書事以志美其古史記之遺乎三年冬十月兵部侍郎權德輿記記曰目巧之室則有奧阼况吏者人之師宅者章之次君子之所寧體諸侯之所賦事宜以車服視其等威漢中支郡曰盛山所理厄狹乾元上元之閒歲比凶災萑蒲相聚戕害燒夷州壤蕭然後之長人者始葺蓬茨僅蔽風雨而已貞元八年夏四月北海唐侯文編承詔為郡既至則敷宣化條易廉平居者胥悅流者自復朞月有成三年大穰獄有茂草野無棄地既均而安既阜而蕃官修其方物有其容乃喟然顧其屋曰是之不修政將安寄度農功之隙因悅使之衆合於古常得其時制殖殖廣庭渠渠中堂堂下布武席閒函丈工徒不勞里旅不煩攸介攸止為仁為義君子多之邦人宜之其潔而中禮儉以成德與夫臧文之山藻趙武之輪奐異矣先是地無井泉人汲江流挈瓶懸綆力憊用寡乃並北山之下習坎疏蒙股而引之於闤闠之東順其性而流不竭通其變而人不倦廕以新亭漻然而清州閭幼艾得以齊飲食而蠲疵癘矣便安之政觸類而長始於郡齊洽於封內初文編以文行馨香為左史儀曹郎記事而為春秋含章而陳奏議及是則推誠以愛人條鬯而休嘉連帥丞相以為表率裕於才者其無方乎蓋陟明翰飛將激而遠之於是邦也古之成室主人落之賓亦發焉德輿與文編游久聆其功善寓此直書用代發禮且以釃泉之智因而廣之時十三年冬十月文編居部之六歲也元和二年冬十月宣城長帥中執法襄陽郡王路公作新亭新營凡周月而厥功成書時且便於人故也先是郡城之南厄狹磽確山木不翦譙門不開公因暇日觀視原野直南一里所得響山焉兩崖聳峙蒼翠對起其南得響潭焉清泚可鑑縈回淡淡又其南則博敞平夷澶漫逶迤從古之隟地是邦之休利目與心會暗然自得悉以條陳實蒙可報乃量日力計徒庸闢於弇中成是夷道揭東西二亭於雙峯之上相距二百步華軒峻宇皆據勝勢廣厦疏寮可棲皓氣碧山亘目清流在下跨以虹梁抵茲近郊因其爽塏乃列營署度野以步度堂以筵上棟下宇各有區處規地之廣袤分左右營部隸焉牙門親軍而下左至八右至七既而左次莽平採石之師與宴設堂又在焉廣場閒館䆗窱縈帶可以閲軍實可以容宴豆度羡財則不費因悅使則不勞巽之申命師之畜衆楚莊之匏居衛文之楚邱得其時制而不煩官業盡在是矣初輿師所處在郡之北偏地泐墊下水泉沮洳積弊不遷介夫病焉至是則修武備建長利寢興得安其室處坐起以觀其習變而公又饗士於斯娛賓於斯公之心泰則神王神王則中和旁達士之體寧則氣全氣全則餘勇可賈夫然則不出楹階俎豆之閒而威惠交修上下浹洽在此物也以公之平粹淑均天資吏師昔嘗四剖符一司武皆有利澤施於州壤及是則貴為元侯疏以大封推心術而行於理所繇屬城而流於支郡程功砥績觀發知智亭與營之制宜乎哉前賢之以循政聞者有矣而遺美於是豈徯公之為而裕斯人耶凡由此塗出者東南抵於歙西北抵於涇肩摩轂擊往復自便絶東溪有浮橋過西亭則蓮池觸類滋長皆為絶境公以鄙夫春秋之徒也繪而傳焉使實録於石時三年夏五月記山林川谷能出雲為風雨皆曰神諸侯在其地則祭之鍾陵風雨池在西山洪井之北發源山椒派分脈散清淺數里匯歸於茲石壁峭絶泉流其下信乎精氣之所回復風雨之所蓄泄邦人敬享相傳名之並山北下二十餘里有望祀之地祠宇以神之蘋蘩以薦之祈農望歲於是乎在祀之豐約在德之輕重報之遲速視誠之薄厚大夫李公理江西三年寬仁清淨正德利用以黃韓篤厚之化易吳楚剽輕之俗里閭之閒歌頌相聞歲在丁卯六月大旱公勤身焦思所以救之之道撰日潔誠有事於神齊心夕往艤舳宵濟厥明至於山下達於祠宇精誠旁魄靈貺交感通山澤之氣致陰陽之和和氣薰然蒸為時雨未徹奠而繁陰起不崇朝而甘液遍蕩灑疵癘布之休和自時厥後庶徵咸若茂遂生物登成甫田而所治七諸侯如公之誠各修其封內之祀化彼災沴為釐為福其或散為祥風結為卿雲紛綸葳蕤奔走來告繇是九江之西歲用大穰昔董仲舒推陰陽啓閉之數相區區江都之地用無饑年前史書之况我公察廉八郡政成化洽人有頑薄之俗以誠革歲有水旱之沴以德勝庶富斯民如此之盛也春秋時國有史氏君舉必書德輿從事於公記事之徒也以公之仁池之神明德參會若合符節是用追琢巖石俾邦人識之時貞元三年八月庚子記太宗文皇帝飛白書十二句五十五字者貞觀十六年答右散騎常侍劉洎之詔也吾觀古之令主未嘗不虛已以納諫古之良臣未嘗不匪躬以盡直然後百度貞九有清繇此物也初太宗與公卿大臣往復古義以聰明示㣥下洎退而上書其大旨以為動神機縱天辨不若凝旒虛襟以至公慎取捨而已故沃心以納優詔以答嘉其忠故以誠詞渥其禮故以手翰史臣實録具載其事有都官郎中竇臮者博古尚藝貞元初得其書於人閒太清宮道士盧元卿又得之於竇氏元卿工為篆隸八分諸書具其家法保而藏之久矣元和五年夏四月豫以太常齊薦於宮師因出而示豫豫乃整衣冠離次捧視且以見聖唐建巍巍無窮之基在此編也至若縹眇鴻飛之勢輕濃蟬翼之狀子敬白而不飛子雲飛而不白稽合衆美裁成絶藝又以見哲王之餘裕書圃之逸品云信州南巖有清淨宴坐之地而禪師在焉師所由來莫得而詳初州人析薪者遇之於中野其形塊然與草木俱咨於州長乃延就茲地三十年矣州人不知其所以然也遂以草衣號焉足不踏地口不嘗味日無晝夜時無寒暑寂然之境一繩牀而已萬有囂然此心不動其內則以三世五蘊皆從妄作然後以無有法諦觀十二因緣於正智中得真常真我方寸之地湛然虛無身及智慧二俱清淨微言軟語有時而聞涉其境之遠近隨其根之上下如雨潤萬物風行空中履其門閾皆獲趣入若非斡元機於無際窮實相之源底則四時攻於外百疾生於內矣古所謂遺物離人而立於獨者禪師得之嗚呼世人感物以游心心遷於物則利害生焉吉凶形焉牽攣羈鎖蕩而不復至人則返靜於動復性於情夭壽仁鄙之殊由此作也斯蓋出諦之一說耳於禪師之道其猶稊稗耶建中二年豫以使役道於上饒時左司郎崔公出為郡佐探禪師之味也熟為豫詳言之拂拭纓塵攜手接足洗我以善得於儀形且以為楞嚴之妙旨毗耶之密用皆在是矣又焉知此地之宴坐不為他方之說法乎粗書聞見以志於石溪亭者何在吳興東部主人許氏所由作也亭製約而雅溪流安以清是二者相為用而主人盡有之其智可知也夸目奓心者或大其閈閎文其節梲儉士恥之絶世離俗者或梯構巖巘紉結蘿薜世教鄙之曷若此亭與人寰不相遠而勝境自至青蒼在目潺湲激砌晴煙陰嵐明晦萬狀鷗飛魚游不驚不喁時時歸雲來冒茅棟許氏方岸鶡冠支卭竹目送溪鳥口吟招隱則神機自王利欲自薄百骸六藏之內纍無自而入焉有田二頃傅於亭下鎡基之功出於僮指每露蟬一聲秋稼成實倚杖眺遠不覺日暮歲實之羡則以給樽中方其引滿陶然心與境冥則是非得喪相與奔北之不暇又何可滑於胸中嚱夫舉世徇物以失性而不能自適且繆戾於動靜之理君之動也代耕筮仕必於山水之鄉故尉義興贊武康皆有嘉聞而無粃政其靜也則偃曝於斯亭循分食力不矯不躁庸詎知今日善閉不為異時之大來耶豫知之深故因斯亭以廣其詞云靈泉北塢之主人曰大苾芻虛公於諸佛微言義味之中深入圓淨以辨才實智離於二邊嘗經行於邪溪稽山之下初石帆山侶有潁川陳公表久挂法冠抗迹塵外既以自適為適且悅虛公之風乃捨其北塢為公禪誦之地公既至則疏蘙薈刳擁腫隨其汙崇作為勝勢先是此山無泉遠汲溪流人既勞止而水之為用不足公乃默以心感恍若有通崖隒之下微得泉脈及剃草轉石渠潺沮洳畚之鍤之決之濬之噴若玉竇泄為瑤池淨如醍醐瑩若琉璃疑青蓮可植金沙在下惠風天籟相為虛寂然後殖碧鮮以相接引清流而備用以盥以潄以糜以茗或以助火化或以袪熱惱日用無窮不知其功使夫後學趨道之徒至於此者則浣濯纓塵漸漬法味還源復性以聲榮為纍不其至哉貞元初州牧左常侍王君行春訪道因以泉名塢又前代隱賢多游踐於茲自東晉而下謝敷王子敬支遁帛道猷洪偃皆有遺跡留於巖中今茲公宗本之外又互以勝概標品徐會稽公李渤海則命其溪曰五雲諫大夫齊君遐舉則命其山曰玉笥其餘冠柱後惠文者有王氏張氏陸氏率用仁智樂茲清輝嘉名競爽以傲軒轂日至泉下為公宗雷雖匡山之社錫杖所叩不是過也每元關道機演暢微妙聞其一音皆攝妄緣以趨靜性居常淡然與靈泉為侶蓋戒本其潔定因其止惠取其用然後觀身及泉二俱無礙清淨洄澓無入而不自得焉問法者又因泉以見虛公之道斯為至矣三年春獲與公遇俾豫傳信故不敢沒其美又不敢蔓其辭時歲在丁卯二月甲子日司徒岐國公以盛德相三朝以大中敷五教帝載協和泰階躋平既致用於方內亦宅心於事外神京善地啓夏南出凡十有六里而仁智之居在焉縈回巖巘左右勝勢徑術逶迤於木杪亭臺山蹇嵼於山腹下崇岡冒青蒼步履平夷以至於堂皇四敞賓榻中容宴豆孤齊閒館幽概隨之乃開洞穴以通泉脈其流泠泠或決或渟激而杯行瀑為玉聲初蒙於山下終匯於池際白波淪漣繚以方塘輕艫緩棹沿洄上下見煙霞澄霽之狀魚鳥飛沈之適濯於潺湲風於碧鮮紅葩火然素英雪翻芊眠葱倩杳窱回合含虛籟以四達遡清輝而交映故其休沐燕息盍簪投轄則有鳴佩拖紳宗工雋人金閨玉堂之賓淑姿修態流光含睇回風遏雲之藝中飲笑抃交歡擊節不知公相之為貴適其適故也易坤之說曰君子以厚德載物詩曰愷悌君子求福不回惟公以德受福故光明昌大每溫室宴見一人尊禮而不名故其代天工斷國論卓爾以冠㣥后暨夫暇日之戾止於斯也則暢天理棲皓氣翛然以遺萬物其無方與其不器與昔子房赤松之游且非代教安石東山之賞僻在下國豈若公密贊化育內諧恬曠如春之仁如樂之和以君臣之交感兼動靜之極摯從古以還無公比焉公之華宗自漢建平侯徙杜陵三守本封幾乎千祀故城南墟里多以杜為名逮今郊居不忘厥初又以見積厚流澤此焉往復且公之心無町畦壽若岡陵昭融煊赫未始有極德輿謬陪衆君子升公之堂嘉招盛集靡閒弦晦以衆美之不可以不紀也承命遽書刻於巖石云
