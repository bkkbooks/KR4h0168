front:
  text: 全唐文欽定全唐文卷一百六十八炎字子隆絳州聞喜人第明經纍遷黃門侍郎調露二年同中書門下三品進侍中中書令封永清縣男進爵河東縣侯徐敬業興兵后議討之炎請太后歸政后捕炎送獄斬於都亭驛睿宗立贈太尉益州大都督諡曰忠
