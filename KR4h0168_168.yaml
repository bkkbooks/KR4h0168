body:
  text: 酈元長水經注云武平封溪縣有獸曰猩猩猿形人面顏容端正學人語若與交言聞者無不欷歔其肉食之窮年無厭可以辟穀淮南子曰猩猩知往而不知來謂知人家往事及祖父名位阮汧云曾使封溪見邑人云猩猩在山谷行常有數百為㣥里人以酒並糟設於路側又愛著屐里人織草為屐更相連結猩猩見酒及屐知里人設張則知張者祖先姓字及呼名罵云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及飲其味逮乎醉因取屐而著之乃為人之所擒皆獲輒無遺者遂置檻中隨其所欲而飲之將烹里人索其肥者乃自推託泣而遣之左太沖吳都賦曰猩猩啼而就烹里人以餉封溪令曰何物曰猩猩惟與酒兼之以屐可以就擒爾西國胡人取其血染毳罽色鮮不黯或曰若刺其血問之爾與我幾許猩猩曰二升果足其數若加之鞭捶而問之則隨所加而得至於一斗弗如此未肯頓輸張薦孝廉好古之士於笥中出此圖相示賓客客覽之曰悲哉此獸何其愚也有僧去塵在座謂諸賓客曰彼獸獸也夫何足云竊見人而似之曾無悟矣四座引而問之曰夫財色名利溺人也曷若猩猩好酒乎爵賞祿位羈人也曷若猩猩愛屐乎叨餮致禍飾辭覬免者曷若猩猩推肥乎蘊利生孽死而無悔者曷若猩猩含血乎子奚獨悲此諸賓矍然改容而歎曰大哉高人之言也豈趨世利汨沒名務者之所聞乎敬篆斯言以為座右銘其銘曰爾形惟猿爾面惟人言不忝面智不踰身淮陰佐漢李斯相秦曷若箕山以全吾真元同字和初定州鼓城人第進士上元初纍拜吏部侍郎永淳元年詔與中書門下同承受進止平章事封巨鹿男宏道初拜文昌左丞鸞臺侍郎同鳳閣鸞臺三品遷地官尚書撿挍納言河陽令周興誣元同言太后老宜復皇嗣后怒賜死於家年七十三臣聞制器者必擇匠以材為國者必求賢以草泣官匠之不良無以成其工官之非賢無以致其理君者所以牧人也臣者所以佐君也君不養人失君道矣臣不輔君失臣任矣任人者誠國家之基本百姓之安危也方今人不加富盜賊不衰訟獄未清禮義猶闕者何也下吏不稱職庶官非其才也官之不得其材者取人之道有所未盡也臣又聞傅說曰明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以理人昔之都國今之州縣土有常君人有定主自求臣佐各選英賢其大臣乃命於王朝自秦並天下罷侯置守漢氏因之有沿有革諸侯得自置吏四百石以下其傅相大官則漢為置之州郡掾吏督郵從事悉任之於牧守爰自魏晉始歸吏部遞相祖襲以迄於今用刀筆以量才案簿書而察行命官之弊其來日久蓋君子重因循而憚改作其有不得已者亦當運獨見之明定卓然之議如今選司所行者非上皇之令典乃近代之權道所宜遷革實為至要何以言之夫尺寸之量所及者蓋短鍾庾之器所積者寧多非其所及焉能度之非其所受何以容之况天下之大士人之衆而可委之數人之手乎假使平如權衡明如水鏡力有所極照有所窮銓綜既多紊失斯廣又以比居此任時有非人豈直愧彼清通昧於甄察亦將竭其庸妄糅彼棼絲情故既行何所不至贓私一啓以及萬端至乃為人擇官為身擇利顧親疏而下筆看勢要以措情悠悠風塵此焉奔競擾擾宦遊同乎市井加以厚貌深衷險如溪壑擇言觀行猶懼不周今使百行九能折之於一面具寮庶品專斷於一司不亦難矣且魏人應運所據者乃三分晉氏播遷所臨者非一統逮乎齊宋以及周隋戰爭之日多安泰之時少瓜分瓦裂各在一方隋氏平陳十餘年耳接以兵禍繼以饑饉既德業之不逮或時事所未遑非謂是今而非古也武德貞觀與今亦異皇運之初庶事草創豈惟日不暇給亦乃人物尚稀天祚大聖享國永年比屋可封異人間出咸以為有道恥賤得時無怠諸色入流歲以千計㣥司列位無復新加官有常員人無定限選集之始霧積雲屯擢敘於終十不收一淄澠混雜玉石難分用捨去留得失相半撫即事之為弊知及後之滋甚夫夏殷以前制度多闕周監二代煥乎可觀蓋諸侯之臣不皆命於天子王朝庶官亦不專於一職故周穆王以伯冏為太僕正命之曰慎乃僚無以巧言令色便辟側媚其惟吉士此則令其自擇下吏之文也太僕正中大夫耳尚以僚屬委之則三公九卿亦必然矣周禮太宰內使並掌爵祿廢置司徒司馬別掌興賢詔事當時分任於㣥司而統之以數職各自求其小者而王命其大者焉夫委命責成君之體也所委者當所用者精故能得濟濟之多士盛芃芃之棫朴裴子野有言曰官人之難先正言之尚矣居家觀其孝友鄉黨服其誠信出入觀其志義憂難取其智謀煩之以事以觀其能臨之以利以察其廉周禮始於學校論之州里告諸六事而後貢之王庭其在漢家尚猶然矣州郡積其功能然後為五府所辟五府舉其掾屬而升於朝三公參得除署尚書奏之天子一人之身所關者衆一士之進所課也詳故能官得其人鮮有敗事魏晉反是所失宏多子野所論蓋區區之宋朝耳猶謂不勝其弊而况於當今乎又夫從政蒞官不可以無學故書曰學古入官議事以制傳曰我聞學以從政不聞以政入學故貴戚子弟例早取官或齠齔之年已腰銀艾或童丱之歲已襲朱紫宏文崇賢之生羽林期門之類課試既淺藝能亦薄而門閥有素資望自高夫象賢繼父古之道也所謂胄子必裁諸學修六禮以節其性明七教以興其德齊八政以防其淫舉上賢以崇其德不肖以黜其惡少則受業長而出仕並由德進必以才升然後可以利用賓王移家事國少仕則廢學輕試則無才於此一流良足惜也又勳官三衛流外之徒不待州縣之舉直取之於書判恐非先德而後言才之義也臣又以為國之用人有似人之用財貧者厭糟糠思短褐富者餘粱肉衣輕裘然則當衰弊乏賢之時則可磨策朽鈍而乘馭之在太平多士之日亦宜妙選髦俊而任使之詩云翹翹錯薪言刈其楚楚荊也在薪之翹翹者方之用才禮亦當爾選人幸多尤宜練臣竊見制書每令三品五品薦士下至九品亦令舉人此聖朝側席旁求之意也但以褒貶不甚明得失無大隔故人上不憂黜責下不盡搜揚苟以應命莫慎所舉且惟賢知賢聖人篤論伊臯既舉不仁咸遠復患階秩雖同人才異等身且濫進鑒豈知人今欲務得實才兼宜擇其舉主清流以源潔影端由表正不詳舉主之行能而責舉人之庸濫不可得已漢書云張耳陳餘之賓客厮役皆天下俊傑彼之蕞爾猶能若斯况以神皇之聖明國家之德業而不建長久之策為無窮之基盡得賢取士之術而但顧望魏晉之遺風留意周隋之末事臣竊惑之伏願稍回聖慮特採芻言略依周漢之規以分吏部之選即望所用精詳鮮有差失萬頃洛陽人起家通事舍人拜著作郎武后諷高宗召諸儒論撰萬頃與其選朝廷疑議及百司表疏皆密令參決以分宰相之權時人謂之北門學士武后臨朝遷鳳閣舍人尋擢侍郎永昌元年為酷吏所陷流嶺南死伏惟高祖神堯皇帝鑿乾構象闢宇開基太宗文武聖皇帝紹統披元循機闡極高宗天皇大帝宏祖宗之大業廓文武之宏規三聖重光千年接旦神功睿德罄圖牒而難稱盛烈鴻猷超古今而莫擬豈徒錙銖堯舜糠粃殷周而已哉謹按見行禮昊天上帝等祠五所咸奉高祖神堯皇帝太宗文武聖皇帝兼配今議者引祭法周易孝經之文雖近稽古之辭殊失因心之旨但子之事父臣之事君孝以承志忠而順美竊惟兼配之禮特稟先聖之懷爰取訓於通規遂申情於大孝詩云昊天有成命二后受之易曰殷薦之上帝以配祖考敬尋厥旨本合斯義今若遠托遺文近乖成典拘常不變守滯莫通便是臣黜於君遽易郊丘之位下非於上靡遵弓劒之心豈所以申太后哀感之誠徇皇帝孝思之德慎終追遠良謂非宜嚴父配天寧當若是伏據見行禮高祖神堯皇帝太宗文武聖皇帝今既先配五祠理當依舊無改高宗天皇大帝齊尊耀魄等邃含樞闡三葉之宏謨開萬代之鴻業重規疊矩在功烈而無差享地郊天豈祀配之有別請奉高宗天皇大帝歷配五祠以申典禮謹議謹按明堂大饗惟祀五方帝故月令季秋令云是月也大饗帝則典禮所云大饗不問卜鄭元注云謂遍祭五帝於明堂莫適卜是也又按祭法云祖文王而宗武王鄭元注云祭五帝五神於明堂曰祖宗故孝經曰宗祀文王於明堂以配上帝據此諸文明堂正禮唯祀五帝配以祖宗及五帝五官神等自外餘神並不合預伏惟陛下追遠情深崇禋志切故於明堂饗祀加昊天上帝皇地祇重之以先帝先后配饗此乃補前王之闕典宏嚴配之虔誠往以神都郊壇未建乃於明堂之下廣祭衆神蓋義出權時非不刊之禮也謹按禮經其內官中官等五嶽四瀆諸神並合從祀於二至明堂總奠事乃不經然則宗祀配天之親雜與小神同薦於嚴配之壇理有不安望請每歲元旦唯祀天地大神配以帝后其五嶽以下請依禮於冬夏二至從祀方丘圜丘庶不煩黷謹議正一定州彭城人貞觀中進士纍轉中書舍人宏文館學士永隆二年遷祕書少監中書侍郎同中書門下平章事武后臨朝轉國子祭酒罷知政事歷麟臺監永昌元年為酷吏所陷流死嶺南對鄽肆之興用存交易山澤之利事屬貿遷是以先王因井而制居往聖觀爻而立義將以致茲百族通彼萬商羅肆巨千廣充上積之貨旗亭五里俯映星繁之珍是使蹀馬回轅歷闤闠而流溢往商來賈候朝夕以盈途豈唯灼蓍蔡以觀貞旁臨季主之肆泛萍蟻而開宴近對文君之壚詎比夫齊宮七市女閭連閉殷室九君姬屋成列但負販之徒異業趣競刺繡謝其倚門多財歸其善賈由此聶政屠養無辭屈辱平仲有求終甘湫隘故知析毫之子不可責以亡機狥利之夫難以徵其重義况墆翳之侶本異夷齊貨殖之徒率同猗白若通其小利諒無擁於四人限以淳心恐有乖於一物誠可除茲濫賄禁彼邪贏則姦黨自銷不待曹參之令市無二價詎止黃軒之風謹對守真絳州稷山人舉進士應八科舉永淳初授太常博士天授中為司府丞武后令推詔獄以仁恕不合旨出為汴州司録新書作司馬纍轉成州刺史徙寧州長安中卒贈戶部尚書夫穀帛者非造化不育非人力不成一夫之耕才兼數口一婦之織不贍一家賦調所資軍國之急煩徭細役並出其中黠吏因公以貪求豪強恃私而逼掠以此取濟民無以堪又以征戍闊遠土木興作丁匠疲於往來餉饋勞於轉運微有水旱道路遑遑豈不以課稅殷繁素無儲積故也夫太府積天下之財而國用有缺少府聚天下之伎而造作不息司農治天下之粟而倉庾不充太僕掌天下之馬而中廏不足此數司者役人有萬數費捐無限極調廣人竭用多獻少奸僞由此而生黎庶緣斯而苦此有國之大患也據周禮及國語郊祀天地天子自射其牲漢武惟封泰山令侍中謁者射牛行事至於餘祀亦無射牲之文但親舂射牲雖是古禮久從廢省難以施行據封禪禮祀日未明十五刻宰人以鑾刀割牲質明而行事比鑾駕至祠所牢牲總畢天皇一作陛下惟奠玉獻酌而已若今祀前一日射牲事即傷早祀日方始射牲事又傷晚若依漢武故事即非親射之儀事貴隨時不可行用請從減罷謹議竊惟二舞肇興謳吟攸屬贊九功之茂烈叶萬國之歡心義均韶夏用兼賓祭皆祖宗盛德而子孫享之詳覽傳記未有皇王立觀之禮况升中大事華夷畢集九服仰垂拱之安百蠻懷率舞之慶甄陶化育莫匪神功豈於樂舞別申嚴敬臣等詳議每奏二舞時天皇不合起立謹議齊聃湖州長城人高宗時纍遷蘭臺舍人以漏言左授蘇州司馬又坐事流欽州咸亨中卒睿宗立追録舊恩纍贈禮部尚書齊獻公即陛下外氏雖子孫有犯不合上延於祖今周忠孝公廟甚修崇而齊獻公廟毀壞不審陛下將何以垂示海內以彰孝理之風昔姬誦與伯禽同業晉儲以師曠為友匪唯專賴師資固亦詳觀近習皇太子自可招集園綺寤寐應劉階闥小臣必採於端士驅馳所任並歸於正人方流好善之風永播崇賢之美今乃使氈裘之子解辮而侍春闈冒頓之苗削袵而陪望苑在於道義臣竊有疑詩云敬慎威儀以近有德書曰任官惟賢才左右惟其人蓋殷勤於此防微之至也宣永徽時太常博士昔能仁示現王宮假歿雙樹微言既暢至理亦宏剎土蒙攝受之恩懷生霑昭蘇之惠自佛樹西蔭塔影東臨漢魏實為濫觴符姚盛其風采自是名僧間出賢達連鑣慧日長懸法輪恆馭開鑿之功始自騰顯宏闡之力仍資什安別有單開遠適羅浮圖澄近視趙魏粗言圭角未可縷陳莫不談空有於一乘論苦集於四諦假銓明有終未離於有為息言明道方契證於凝寂猶執元以求元是元非元理因元以忘元或是元義雖冥會幽途事理絶於言象然攝生歸寂終藉筌諦亦既立言是非鋒起如彼戰爭干戈競發負者屏氣勝者先鳴故尚降魔制諸外道自非辨才無畏答難有方則物輩喧張我等恥辱是故專心適道一意總持建立法幢祇植法鼓旗鼓既正則敵者殘摧法輪既轉能威不伏若使望風旗靡對難含膠而能闡宏三寶無有是處尚藥呂奉御入空有之門馳正見之路聞持擬於昔賢洞微侔於往哲其辭辨其義明其德真其行著已沐八解之流又悟七覺之分影響成教若淨名之詣菴園聞道必求猶波崘之歸無竭意在宏宣佛教立破因明之疏若其是也必須然其所長如其非也理合指其所短今見僧徒雲集並是採石他山朝野俱聞呂君請益莫不測聽瀉水皆望蕩滌悼悔之源銷屏疑忿之聚有太史令李淳風者聞而進曰僕心懷正路行屬歸依以實慧為大覺元軀無為是調御法體然皎日麗天實助上元運用賢僧闡法實裨天師妙道是所信受是所安心但不敢以黃葉為金山雞成鳳南郭濫吹淄澠混流耳或有異議豈僕心哉豈僕心哉然鶴林已後歲將二千正法既萎末法初踐元理鬱而不彰覺道浸將湮落元奘法師頭陀法界遠達迦維目擊道樹金流仍覩七處八會毗城鷲嶺身入彼邦娑羅寶階仍驗虛實至於歷覽王舍檀特恆河如斯等輩未易具言也加之西域名僧莫不面論波若東國疑義悉皆質之彼師毗尼之藏既奉持而不捨毗曇明義亦洞觀而為常蘇柘路既得之於聲明耨多羅亦剖斷於疑滯法無大小莫不韞之胸懷理無深淺悉能決之敏慮故三藏之名在震旦之所推定摩訶之號乃羅衛之所共稱名實之際何可稱道然呂君學識該博義理精通言行樞機是所詳悉至於陀羅佛法稟自生知無礙辨才寧由伏習但以因明義隱所說不同觸象各得其形共器飯有異色呂君既已執情道俗企望指定秋霜已降側聽鍾鳴法雲既敷雷震希發但龍象蹴踏非驢所堪猶緇服壼奧白衣不踐脫如龍種抗設無垢釋疑則苾芻悉曇亦優婆能盡輒附微志請不為煩若有滯疑望咨三藏裁決以所承稟傳示四衆則正道克昌覆障永絶紹隆三寶其在茲乎過此已往非復所悉弟子柳宣白景宣永徽時雍州參軍漢惠帝城長安後尋即殂落今者營築必有災咎又楊正道有隋之孽流竄北蕃隨突屈歸化便即詐死今日猶存有人隱藏猶未彰露靈芝顯慶時人居士諱公字孝寬太原晉陽人也英宗穎邁遠胄隆周茂緒遐昌鬱冠後魏樂府歌其載德天下挹其家聲具詳圖牒豈煩覼縷居士早標先覺本遺名利遍覽典墳備窮義窟觀老莊如糟粕視孔墨猶灰塵得給園之說罄求彼岸之路勵精七覺仰十地而克勤旰食一麻欣六年之憔悴方期拔除煩惱永離蓋纏何悟積善始基處悲生滅以顯慶元年十一月草九日寢疾終於京第春秋七十有三即以三年十月十二日收骸起靈塔於終南山楩梓谷風吟邃潤寶鐸和鳴雲散危峯金盤吐曜道長運短迹往名留不刊介石孰播徽猷吁其嗟焉乃為銘曰懿矣居士明哉悟真幽鑒彼岸妙道問津苦節無撓貞心剋勤顧邈三有超修十輪俄隨怛化遽此遷神巋然靈塔長欽後人處約始名道茂汝州郟城人貞觀朝為齊王祐記室祐多過失上書切諫帝嘉之擢中書舍人高宗立遷司禮少常伯麟德元年以西臺侍郎同東西臺三品為少司成致仕卒准令諸臣九章服君臣冕服章數雖殊飾龍名袞尊卑相亂望請諸臣九章衣以雲及麟代龍升山為上改名為冕又依舊令六品七品著緑八品九品著青青深亂紫非卑品所服望請依舊六品七品著緑八品九品著碧朝參之處並依此制非常朝參處聽兼服黃德裔龍朔時司憲大夫臣聞師出以律煥乎青史殺降不祥紀諸彞訓是以分閫作將杖鉞專征苟或乖違明法斯在謹按鐵勒道大總管右武衛大將軍鄭仁泰等猥以非才謬荷拔擢或名參列位或職典禁戎屬北狄孤恩皇威遠振遂得擁旄瀚海問罪天山理應虔奉廟算恭行天罰而褊心無謀短懷愎諫不肅將帥靡愛戎士無心體國有意徇私鐵勒思結歹臘葛等雖鹿走趨險蓋緣懼死鳥窮思入虛懷可張仁泰等情冀勳庸志希貨賄不聞存慰必置誅夷乃肆凶殘恣行殺戮向若大軍初到明喻天旨撫納前降招來後伏則鐵勒反善不日斯平仁泰素闕遠圖莫曉機事師徒無紀軍令不明遂使稽顙屈膝者先被塗原之誅懼死懷生者因成絶漠之計鐵勒逃散猶未梟懸屢擾干戈實由於此加以沙塞綿邈風霜嚴凝不量士馬疲疴不計糧食多少乃令班師凍餒征夫殞斃骼胔委積刳剔縱橫暴骨交衢下實泉壤可悼成規不守乃明典刑所誅况且士卒殲亡戈甲拋棄彌山遍野並資戎狄自聖朝削平天下廓清㝢縣東征西怨後舞前歌未有如仁泰此行損威挫鋭之甚又仁貴動戎遠征不捷貪殘有素平允乖方既曰監臨豈宜交涉存沒枉濫從此而生娶妾雖作逗留准法便須離正雖或事有從赦然而敗纍過多縱矜所得不補所喪豈可並恣誣罔不置準繩撫悼存亡理宜懲肅其仁泰等及諸軍故殺降人飢殺兵士並軍中罪大失應須勘當及改正者並請付法推科以申典憲惟忠宋州宋城人第進士補井陘尉轉湯陰尉天授中以制舉召見擢左司禦胄曹參軍纍遷水部員外郎武后還長安召為待制遷鳳閣舍人中宗立擢黃門侍郎進大理卿拜御史大夫加銀青光祿大夫封滎陽縣男開元初為禮部尚書轉太子賓客十年卒贈太子少保博望侯周流天下歷覽山川尋長河於異域得美石而獻焉漢武帝未之奇也東方朔見而喟然曰此石英輝潤密秀色明爛舊枕昆吾之溪曾臨歸美之岸玉雉飛而激矢金雞鳴而縱彈至如天台始裂地乳初分丹青孕彩隱起成文盈尺則內含明月膚寸則外吐浮雲別有兩楹分竦雙闕相向依依識啓母之形亭亭表望夫之狀鼓迎桴而若動帆映舟而似揚此並流膏曲澗滴髓危峯據谷成虎臨池作龍鋪英九節連葉千重若乃泗水之上岐山之側撫之則磬動奇音被之則錦開新色匠石見而驚駭師涓聞而歎息於是琢磨成狀雕瑩生輝似龜則負圖盤峙如鵲則緘印騫飛在地者佳人搗練登天者織女支機及其火烈崑墟星流宋國被隕形碎遭焚影黑碑沈郢路之東柱折陽關之北昔之開壇竹聳抱劒松抽礎應山雲之潤橋通海水之流柳谷岸崩之馬鬱林泥落之牛莫不歲月雕訛邱陵蕪沒顛墜坑穽枕倚巖窟據洞口而嵯峨出泉心而硉矹徒見新排理坼舊蹙文回圓分者雹散方裂者冰開既藏瑕而被蘚又抱穴以侵苔豈如寫鏡能明磨鋒可利擊拊充帝庭之樂關和覩王府之器總五色而補天含九光而鎮地者矣辭未畢帝乃顧而言曰楚王見璞棄之山阿不有卞氏其如玉何抽琴命操為古石之歌歌曰江東藏瑞簡濟北蘊兵書若非平固湖中雁定是昆明池裏魚歌響既終神儀有懌左右驚視符彩傍射使玉人而攻之果得連城之璧語曰等級懸隔有似雲泥然雲高則高矣如其不義猶為夫子所輕故曰於我如浮雲泥卑則卑矣苟不可棄且見莊生所重故曰曳尾於塗中吾少也嘗覽左太沖詩云賤者雖自賤重之若千鈞感斯言之有徵故為泥賦嘉洪爐之造化物無象而不甄惟茲泥之為質諒稟之於自然雖體潤性柔而名卑質賤不同塵以苟出必感澤而斯見信厚地之所生匪膏雨而不變同賢良之韞櫝候聖明而方薦若乃花水行落莢雨將餘交衢蓄潦曲浦含淤望之疑實即之也虛動而為有靜而為無苟具形之所跖必觸類而圖諸託龜文而成印寫鳥跡以為書蹤發追風之馬轍閉流水之車於是陶鈞賦象刻削成器因應用之無方任良工之所肄順規矩而畫一循制度而無二裁無不成擬無不類以土為質以水為位位去質沈復歸乎地彼木偶之漂泊萍流之自恣推移兮莫識其始終泛濫兮莫知其所至若乃蘊雕草於閒館含芳樹於禁闈不緇白玉之彩徒混明珠之輝帶晴牛而暫落逐春燕而還飛何茲物之無識亦應命以知機本乎形而入用乃委質以合所塗城則疏勒解圍封關則崤函致阻及其見棄形晦跡淪無勞切玉之劒自落成風之斤體伊泥之應變時可同乎人志類明鏡之受物若洪鐘之虛已既懸絶於白雲徒隱淪於緑水伊吾人之菲賤竊亦有感於斯矣王褱字昌容京兆武功人弱冠舉進士補恆州參軍纍遷揚州大都督府長史徙同州刺史神龍初入為尚書右丞再遷戶部尚書加侍中充西京留守遷吏部尚書景龍三年拜右僕射同中書門下三品進封許國公監修國史景雲元年轉太子少傅卒年七十二贈司空荊州大都督諡曰文貞開元四年加贈司徒陛下頻降德音勤恤人影令徒以下刑盡責保准放流死等色則情不可寬此古人所以慎赦也恐言事者直以月蝕修刑日蝕修德或云分野應災祥冀合上旨臣以為君子道長小人道消女謁不行讒夫漸遠此所謂修德囹圄不擾甲兵不黷理官不以深苛將軍不以輕進此所謂修刑也若陛下常以此留念縱日月盈虧將因此而致福又何患乎且君子恥言浮於行故曰豫欲無言又曰天何言哉四時行焉百物生焉要以至誠動天不在制書頻下宰相者上佐天子下理陰陽萬物之司命也居司命之位苟不以道應命翺翔自處上則阻天地之交泰中則絶性命之至理下則阻生物之阜植苟安一日是稽陰誅况久之乎臨大事斷大議正道以當之若不能即速退中樞之地非偷安之所平心以應物無生妄慮似覺非正則速回之使久而不失正也敷奏宜直勿婉應對無常速機可以回小事沈機可以成大計同列之間隨器以應之則彼自容矣容則自峻其道以示之無令庸者其來浼我也賢者親而狎之無過狎而失敬則事無不舉矣舉一官一職一將一帥須其材德者聽衆議以命之公是非即無爽矣人不可盡賢盡愚汝惟器之與正人言則其道堅實而不渝材人可以責成辦事辦事不可與議與之議則失根本歸權道也常貢外妄進獻者小人也抑之審姦吏辭煩而忘親者去之崇儒則篤敬侈靡之風不作不作則平和平和則自臻理道矣刺史縣令久次以居之不能者立除之無奸柄施恩交馳道路既失為官之意受弊者隨之矣欲庶而富在乎久安不教而戰是謂棄之佐理在乎謹守制度俾邊將嚴兵修斥堠使封疆不侵不必務廣徒費中國事無益也古者用刑輕中重之三典各有攸處方今為政之道在乎中典謹而守之無為人之所二無請數赦以開幸門勿畏強禦而損制度教令少而確守之則民情膠固矣勿大剛以臨人事慮不盡臣不密則失身非所議者勿與之言勤思慮不以小事而忽機管財無多蓄計有三年之用外散之親族多蓄甚害義令人心不寧不寧則理事不當矣清身檢下無使邪隙微開而貨流於外矣遠妻族無使揚私於外仍須先自戒謹檢子弟無令開戶牖毋以親屬撓有司一挾私則無以提綱在上矣子弟壻居官隨器自任調之勿過其器而居人之右子弟車馬服用無令越衆則保家則能治國居第在乎潔不在華無令稍過以荒厥心寬京兆萬年人高宗朝為太常卿封隴西公夫出家之徒名曰離俗教戒之法謙下是先既達苦空理捐人我彈曰不敬之來自持真教豈緣在我而不拜乎况君父尊重敬比於天拜伏之儀事無疑惑但以因循往代敬其衣戒使然事同司宰寺議中彈止可君父不受其拜何得自為尊重且像法末教委以國王事如內府監議中彈國王示以尊卑未爽一乘之道謹議
