front:
  text: 全唐文欽定全唐文卷六百七十四白居易十九
  hash: sha256:7c86c460afc67b5392c26ba6275bdf1354a5cdc919d6e53cbe3ad8259b3272f8
body:
  text: 大唐朔方靈鹽豐等州節度使檢校戶部尚書寧塞郡王王佖致書大蕃河西北道節度使論公麾下遠辱來書兼蒙厚貺慰悚之至難述所懷國家與彼蕃代為舅甥日洽恩信雖云兩國實若一家遂令疆場之臣得以書信相問况麾下以公忠之節雄勇之才翊佐大邦經略北道佖近蒙制命守在邊陲慰望之情一一難盡皇帝以贊普頻遣和使懇求通好凡此邊鎮皆奉朝章但令慎守封陲不許輒令侵軼至于事理彼此宜然且如党項久居漢界曾無征稅既感恩德未嘗動搖然雖懷此撫循亦聞窺彼財貨亡命而去獲利而歸但恐彼蕃不知大為党項所賣其中亦聞誘致事甚分明不能縷陳計已深悉今請去而勿誘來而勿容不失兩境之歡不傷二國之好在此誠為小事于彼即是遠謀幸履坦途勿遵邪徑今聖上德柔四海威及萬方雖外國蠻夷尚皆率伏况中華臣妾敢有不恭豈假彼蕃欲相借助誠愧厚意終訝過言承去年出師討逐回紇其間勝負此亦備知不勞來書遠相示及所蒙寄贈並已檢到佖為邊須守常規馬及胡瓶依命已受其回紇生口緣比無此例未奉進止不敢便留今却分付來人至彼望垂檢領有少答信具如別數幸恕寡薄也初秋尚熱惟所履珍和謹因譯語官馬屈林恭回不具佖白大唐四鎮北庭行軍涇原等州節度使檢校工部尚書兼御史大夫丹陽郡王朱忠亮致書大藩東道節度使論公都監軍使論公麾下專使辱問悚慰良深國家與吐蕃代為舅甥日修鄰好雖曰兩國有同一家至於封疆尢貴和叶忽枉來問稍乖素誠雖有過言敢以衷告來書云頻見燒草何使如然者至如時警邊防歲焚宿草蓋是每年常事何忽今日形言况牛馬因風猶出疆以相及草木延火縱近境而何傷遽懷異端未敢聞命又云去年忽生異見近界築城者且國雖通好軍不撤警近邊修緝彼此尋常况城是漢城地非蕃地豈乖通理何致深疑靜言思之誰生異見頃當報牒彼已息訟今又再言寧無慙德又云皇天無親有德即輔者皇帝君臨萬方逮及四載道光日月德動乾坤南北東西化無不及若非皇天輔德明神福仁北虜何為歸明南蠻何為慕化風雨何因大順歲時何因屢豐則神助天親可明驗矣彼若無故生疑無端結怨但思小利不務遠圖則咎孽之生恐不在此永言取笑却請三思又云漢之臣下頻有叛逆者近以吳蜀小寇暫肆猖狂未及討除尋以殄滅皇威不露妖沴自清豈假彼蕃遠思旁助忠亮謬蒙恩渥叨在藩垣恭守邊隅幸鄰封壤縱未能為漢名將亦不可謂秦無人輒獻直言以袪深惑願推誠信同保始終各勉令圖以求多福歲暮嚴寒惟所履安勝遠垂惠貺愧佩殊深今因押衙回亦有少答信具如別紙恕輕鮮也不具忠亮謹白四月十日夜樂天白微之微之不見足下面已三年矣不得足下書欲二年矣人生幾何離闊如此况以膠漆之心置於胡越之身進不得相合退不得相忘牽攣乖隔各欲白首微之微之如何如何天實為之謂之奈何僕初到潯陽時有熊孺登來得足下前年病甚時一札上報疾狀次序病心終論平生交分且云危惙之際不暇他及唯收數帙文章封題其上曰他日送達白二十二郎便請以代書悲哉微之於我也其若是乎又睹所寄聞僕左降詩云殘燈無焰影幢幢此夕聞君謫九江垂死病中驚起坐暗風吹雨入寒窗此句他人尚不可聞况僕心哉至今每吟猶惻惻耳且置是事略序近懷僕自到九江已涉三載形骸且健方寸甚安下至家人幸皆無恙長兄去夏自徐州至又有諸院孤小弟妹六七人提挈同來頃所牽念者今悉置在目前得同寒暖饑飽此一泰也江州風候稍涼地少瘴癘乃至蛇虺蚊蚋雖有甚稀湓魚頗肥江酒極美其餘食物多類北地僕門內之口雖不少司馬之俸雖不多量入儉用亦可自給身衣口食且免求人此二泰也僕去年秋始遊廬山到東西二林間香爐峯下見雲水泉石勝絶第一愛不能捨因置草堂前有喬松十餘株修竹千餘竿青蘿為墻垣白石為橋道流水周於舍下飛泉落於簷間紅榴白蓮羅生池砌大抵若是不能殫記每一獨往動彌旬日平生所好者盡在其中不唯忘歸可以終老此三泰也計足下久不得僕書必加憂望今故録三泰以先奉報其餘事况條寫如後云云微之微之作此書夜正在草堂中山窗下信手把筆隨意亂書封題之時不覺欲曙舉頭但見山僧一兩人或坐或睡又聞山猿谷鳥哀鳴啾啾平生故人去我萬里瞥然塵念此際暫生餘習所牽便成三韻云憶昔封書與君夜金鑾殿後欲明天今夜封書在何處廬山庵裏曉燈前籠鳥檻猿俱未死人間相見是何年微之微之此夕此心君知之乎樂天頓首夢得閣下前者枉手札數幅兼惠答憶春草報白君已下五六章發函披文而後喜可知也又覆視書中有攘臂痛拳之戲笑與抃會甚樂甚樂誰復知之因有所云續前言之戲耳試為留聽與閣下在長安時合所著詩數百首題為劉白唱和集卷上下去年冬夢得由禮部郎中集賢學士遷蘇州刺史冰雪塞路自秦徂吳僕方守三川得為東道主閣下為僕稅駕十五日朝觴夕詠頗極平生之歡各賦數篇視草而別歲月易邁行復周星一往一來忽又盈篋誠知老醜冗長為少年者所口某蟲然吳苑洛城相去二三千里捨此何以啓齒而解頤哉嗟乎微之先我去矣詩敵之勍者非夢得而誰前後相答彼此非一彼雖無虛可擊此亦非利不行但止交綏未嘗失律然得雋之句警策之篇多因彼唱此和中得之他人未嘗能發也所以輒自愛重今復編而次焉以附前集合成三卷題此卷為下遷前下為中命曰劉白吳洛寄和卷自太和六年冬送夢得之任之作始居易頓首師臯足下自僕再來京師足下守官鄠縣吏職拘絆相見甚稀凡半年餘與足下開口而笑者不過三四及僕左降詔下明日而東足下從城西來抵昭國坊已不及矣走馬至滻水才及一執手憫然而訣言不及他邇來雖手札三往來亦不過問道途報健否而已鬱結之志曠然未舒思欲一陳左右者久矣去年六月盜殺右丞相於通衢中迸血髓磔髮肉所不忍道合朝震栗不知所云僕以為書籍以來未有此事國辱臣死此其時耶苟有所見雖畎畝皂隸之臣不當默默况在班列而能勝其痛憤耶故武相之氣平明絶僕之書奏日午入兩日之內滿城知之其不與者或誣以僞言或搆以非語且浩浩者不酌時事大小與僕言當否皆曰丞郎給舍諫官御史尚未論請而贊善大夫何反憂國之甚也僕聞此語退而思之贊善大夫誠賤冗耳朝廷有非常事即日獨進封章謂之忠謂之憤亦無愧矣謂之妄謂之狂又敢逃乎且以此獲辜顧何如耳况又不以此為罪名乎此足下與崔李元庾輩十餘人為我悒悒鬱鬱長太息者也然僕始得罪於人也竊自知矣當其在近職時自惟賤陋非次寵擢夙夜腆愧思有以稱之性又愚昧不識時之忌諱凡直奏密啓外有合方便聞於上者稍以歌詩導之意者欲其易入而深戒也不我同者得以為計媒孽之辭一發又安可君臣之道間自明白其心乎加以握兵於外者以僕潔慎不受賂而憎秉權於內者以僕介獨不附己而忌其餘附麗之者惡僕獨異又信狺狺吠聲唯恐中傷之不獲以此得罪可不悲乎然而寮友益相重交游益相信信於近而不信於遠亦何恨哉近者少遠者多多者勝少者不勝又其宜矣師臯僕之是言不發於他人獨發於師臯師臯知我者豈有愧於其間哉苟有愧於師臯固是言不發矣且與師臯始於宣城相識逮於今十七八年可謂故矣又僕之妻即足下從父妹可謂親矣親如是故如是人之情又何加焉然僕與足下相知則不在此何者夫士大夫家閨門之內朋友不能知也閨門之外姻族不能知也必待友且姻者然後周知之足下視僕蒞官事擇交友接賓客何如哉又視僕撫骨肉待妻子馭僮僕又何如哉小者近者尚不敢不盡其心况大者遠者乎所謂斯言無愧而後發矣亦猶僕之知師臯也師臯孝敬友愛之外可略而言足下未應舉時嘗充賢良直言之賦其所對問志磊磊而詞諤諤雖不得第僕始愛之及與獨孤補闕書讓不論事與盧侍郎書請不就職與高相書諷成致仕之志志益大而言益遠而僕愛重之心繇是加焉近者足下與李宏慶友善宏慶客長安中貧甚而病亟足下為逆致其母安慰其心自損衣食以續其醫藥甘旨之費有年歲矣又足下與崔行儉游行儉非罪下獄足下意其不幸及於流竄敕下之日躬俟於御史府門而行李之具養活之物崔生顧其旁一無闕者其餘奉寡姊親護其夫喪撫孤甥誓畢其婚嫁取貴人子為婦而禮法行於家由甲乙科入官而吏聲聞於邑凡此者皆可以激揚頽俗表正士林斯僕所以嚮慕勤勤豈敢以骨肉之姻形骸之舊為意哉然足下之美如此而僕側聞蚩蚩之徒不悅足下者已不少矣但恐道日長而毀日至位益顯而謗益多此伯寮所以訴仲由季孫所以毀夫子者也昔衛玠有云人之不逮可以情恕非意相加可以理遣故至終身無喜慍色僕雖不敏常佩此言師臯人生未死見千變萬化若不情恕於外理遣於中欲何為哉欲何為哉僕之是行也知之久矣自度命數亦其宜然凡人情通達則謂由人窮塞而後信命僕則不然十年前以固陋之姿瑣屑之藝與敏手利足者齊驅豈合有所獲哉然而求名而得名求祿而得祿人皆以為能僕獨以為命命通則事偶事偶則幸來幸之來尚歸之於命不幸之來也捨命復何歸哉所以上不怨天下不尢人者實如此也又常照鏡或觀寫真自相形骨非富貴者必矣以此自決益不復疑故寵辱之來不至驚怪亦足下素所知也今且安時順命用遣歲月或免罷之後得以自由浩然江湖從此長往死則葬魚鱉之腹生則同鳥獸之㣥必不能與掊聲攫利者榷量其分寸矣足下輩無復見僕之光塵於人寰間也多謝故人勉樹令德粗寫鄙志兼以為別居易頓首正月日鄉貢進士白居易謹遣家僮奉書獻於給事閣下伏以給事門屏閒請謁者如林獻書者如雲多則多矣然聽其辭一辭也觀其意一意也何者率不過有望於吹噓剪拂耳居易則不然今所以不請謁而奉書者但欲貢所誠質所疑而已非如衆士有求於吹噓剪拂者給事獨不得為之少留意乎大凡自號為進士者無賢不肖皆欲求一第成一名非居易之獨慕耳既慕之所以切不自揆嘗勤苦學文逮今十年始獲一貢每見進士之中有一舉而中第者則欲勉狂簡而進焉又見有十舉而不第者則欲引駑鈍而退焉進退之宜固昭昭矣而遇者自惑於趣舍何哉夫蘊奇挺之才亦不自保其必勝而一上得第者非他也是主司之明也抱瑣細之才亦不自知其妄動而十上下第者亦非他也是主司之明也豈非知人易而自知難耶伏以給事天下文宗當代精鑒故不揆淺陋敢布腹心居易鄙人也上無朝廷附麗之援次無鄉曲吹噓之譽然則孰為而來哉蓋所仗者文章耳所望者主司至公耳今禮部高侍郎為主司則至公矣而居易之文章可進也可退也竊不自知之欲以進退之疑取決於給事給事其能捨之乎居易聞神蓍靈龜者無常心苟叩之者不以誠則已若以誠叩之必以信告之無貴賤無大小而不之應也今給事鑒如水鏡言為蓍龜邦家大事咸取決於給事豈獨遺其微小乎謹獻雜文二十首詩一百首伏願俯察悃誠不遺賤小退公之暇賜精鑒之一加焉可與進也乞諸一言小子則磨鉛策蹇騁力於進取矣不可進也亦乞諸一言小子則息機斂迹甘心於退藏矣進退之心交爭於胸中者有日矣幸一言以蔽之旬日之間敢佇報命塵穢聽覽若奪氣禠魄之為者不宣居易謹再拜二月十九日某官某乙謹拜手奉書獻於相公執事書曰古人云以水投石至難也某以為未甚難也以卑千尊以賤合貴斯為難矣何者夫尊貴人之心堅也強也不轉也甚於石焉卑賤人之心柔也弱也自下也甚於水焉則合之難也豈不甚於水投石哉然則自古及今往往有合者又何哉此蓋以心遇心以道濟道故也苟心相見道相通則水反為石石反為水則其合之易也又甚乎以石投水焉何者石之投水也猶觸之有聲受之有波心道之相得也則貴者不知其貴也賤者不知其賤也當其冥同欣合之際但吻然而已矣其合之易也豈不甚於石投水哉噫厥道廢墜不行於代久矣故貴者自貴耳賤者自賤耳維同心同道不求相合也今某之心與相公之心愚智不侔也今某之道與相公之道小大不倫也矧又尊卑貴賤之勢相懸如石焉如水焉而欲強至難為至易無乃不可乎然則知其不可而為之者抑有由也伏以相公方今佐裁成之道當具瞻之初竊希變天下水石之心自相公始也通天下貴賤之道自某始也不然者夫豈不自知其狂進妄動哉伏望少留聽而畢辭焉幸甚幸甚某伏觀先皇帝之知遇相公也雖古君臣道合者無以加也然竟不與大位不授大權不盡行相公之道者何哉識者以為先皇父子孝慈之間亦古未有也蓋先皇所以輒以知人之明用賢之功致理之德以留賜今上也亦猶太宗黜李績而使高宗寵用之也故今上在諒陰而特用也相公自郎官而特拜也推此二者有以見識者之言信矣斯則先皇知遇之恩貽燕之念今上速用之旨倚賴之誠相公寵擢之榮託寄之重自國朝以來三者兼之甚鮮矣故某竊惟相公自拜命以來八九日得食不暇飽得寢不暇安行則雙然居則惕然思所以答先皇之知副今上之用允天下之望哉某竊以為必然矣况今主上肇撫蒼生初嗣洪業雖物不改舊而令宜布新是以百辟傾心慺慺然以待主上之政也萬姓注目專專然以望主上之令也四夷側耳禺禺然以聽主上之風也豈直若此而已哉蓋待其政者勤惰邪正繫其中焉望其令者憂喜親疏生其中焉聽其風者畏侮動靜出其中焉而將來理亂之根安危之源盡在於三者之中矣如此則相公得不匡輔其政緝熙其令宣和其風乎然則匡輔緝熙宣和之道某雖不敏嘗聞於師焉曰天子之耳待宰相之耳而後聰也天子之目待宰相之目而後明也天子之心識待宰相之心識而後聖神也宰相之耳待天下之耳而後聰也宰相之目待天下之目而後明也宰相之心識待天下之心識而後能啓發聖神也然則下取天下耳目心識上以為天子聰明神聖者此宰相之本職也而為匡輔緝熙宣和之道也若宰相唯以兩耳聽之兩目視之一心思之則朝廷之得失豈盡知見乎必不盡也而况於天下之得失乎宰相之耳目得聰明乎必未也而况於上以為天子聰明聖神乎然則天下聰明心識取之豈無其道耶必有也在乎知與不知行與不行耳噫自開元以來斯道寖衰鮮能行者自貞元以來斯道寖微鮮能知者豈惟不知乎不行乎又將背古道而馳者也何也古者宰相以危言危行扶危持顛為心今則敏行遜言全身遠害而已矣古者宰相以接士為務今則不接賓客而已矣古者宰相以開閣為名今則鎖其第門而已矣致使天下之聰明盡委棄於草木中焉天下之心識盡沈沒於泥土間焉則天下聰明心識萬分之中宰相何嘗取得其一分哉是故寵益崇而謗益厚歲彌久而愧彌深至乃上負主恩下斂人怨行止寢食自有慙色者夫豈非不得天下聰明心識之所致耶然則為宰相者得不思易其轍乎是以聰明損於上則正直銷於下畏忌慎默之道長公議忠讜之路塞朝無敢言之士庭無執咎之臣自國及家寖以成弊故父訓其子曰無介直以立仇敵兄教其弟曰無方正以賈悔尤先達者用以養身後進者資而取仕日引月長熾然成風識者腹非而不言愚者心競而是效至使天下有目者如瞽也有耳者如聾也有口者如含鋒刃也如此則上之得失下之利病雖欲匡救何由知之嗟乎自古以來斯道之弊恐未甚於今日也然則為宰相者得不思變其風乎是以慎忌積於中則政事廢於表因循苟且之心作強毅久大之性虧反謂率職而舉者不達於時宜當官而行者不通於事變故殿最之書雖具而不實黜陟之法雖備而不行欲望惡者懲善者勸或恐難矣古之善為宰相者豈盡得賢而用之乎豈盡知不肖而去之乎蓋在於秉鈞軸之樞握刀尺之要剗邪為正削觚為圓能使善之必遷不謂善之盡有能使惡之必改不謂惡之盡無成此功者無他懲勸之所致耳然則為宰相者得不思提其綱使㣥目皆自張乎是以懲勸息於此則賢能乏於彼故嶽鎮闕而不知所取臺省空而不知所求今則尚書六司之官暨於百執事者大凡要劇者多虛其位閒散者咸備其官或曰所以難其人重其祿也嗟呼徒知難其人而闕之不知邦政日歸於下吏也徒知重其祿而愛之不知稍食日費於冗員也損益利害豈不明哉古之善為宰相者虛其懷直其氣苟有舉一言者必從而索之苟有薦一善者必隨而用之然後明察否臧精考真僞得人者行進賢之賞謬舉者坐不當之辜自然審輪轅以相求謹關梁以相保故才無乏用國無廢官豈可疑所舉之未精而反失其善重所仕而不苟而反廢其官與其廢官寧其虛授與其失善寧其謬升但在乎明核是非必行賞罰則謬升虛授當自辨焉然則為宰相者得不思振其領使衆髦皆舉乎是以庶政闕於內則庶事斁於外至使天下之戶口日耗天下之士馬日滋游手於道途市井者不知歸託足於軍籍釋流者不知反計數之吏日進聚斂之法日興田疇不闢而麥禾之賦日增桑麻不加而布帛之價日賤吏部則士人多而官員少姦濫日生諸使則課利少而羡餘多侵削日甚舉一知十可勝言哉况今方域未甚安邊陲未甚靜水旱之災不戒兵戎之動無期然則為宰相者得不圖將來之安補既往之敗乎若相公用天下之目觀而救之夫豈無最遠之見乎用天下之心圖而濟之夫豈無最長之策乎策之最長者見之最遠者在相公鑒而取之誠而行之而已取之也行之也今其時乎時之為用大矣哉古者聖賢有其才無其位不能行其道也有其才有其位無其時亦不能行其道也必待有其才有其位有其時然後能行其道焉某竊見相公曩時制策對中論風化澆淳之源明天人交感之道陳兵災救療之術可謂有其才矣又伏見今月十一日制詞云其代豫言允屬良弼必能形四方之風成天下之務可謂有其時矣今相公有其才有其位有其時則行道由已而由道乎哉某又聞一往而不可追者時也故聖賢甚惜焉方今拭天下之目以觀主上之作為也側天下之耳以聽相公之舉措也如此則相公出一言不終日而必聞於朝野主上發一令不浹辰而必達於華夷蓋主上輯百辟和萬姓服四夷之時在於此時矣相公充人望代天工報國之恩正在於今日矣或者曰君臣之道至大也可以漸合不可以速合也天下之化至大也可以漸行不可以速行也賢人之事業至大也行之可以枉尺而直尋也某以為殆不然矣夫時之變事之宜其間不容息也先之則太過後之則不及故時未至聖賢不進而求時既來聖賢不退而讓蓋得之則不啻乎事半而功倍也失之則不啻乎事倍而功半也嗟乎或者徒知漸合其道而不知啓沃之時失於漸中矣徒知漸行其化而不知燮理之時失於漸中矣徒知枉尺而直尋而不知易失於時則難生於漸中雖枉尋不能直尺矣近者宰相道不行化不成事業不光明率由乎有志於漸中矣請以前事明之某嘗聞太宗顧謂㣥臣曰善人為邦百年然後能勝殘去殺當今大亂之後將求致理寧可造次而望乎魏文貞曰不然夫亂後易理猶饑人易食也若聖哲施化人應如響期月而可信不為難三年成功猶謂其晚太宗深納其言時封德彞輩共非之曰不可三代以後人漸澆訛皆欲理而不能豈能理而不欲魏徵書生不識時務信其虛說必亂國家於是太宗卒從文貞之言力行不倦三數年間天下大安戎狄內附太宗曰惜哉不得使封德彞見之斯則得其時行其道不取於漸之明效也况今日之天下豈弊於武德之天下乎相公之事業豈後於文貞之事業乎在於疾行而已矣所以主上踐阼未及十日而寵命加於相公者惜國家之時也相公受命未及十日而某獻於執事者惜相公之時也夫欲行大道樹大功貴其速也蓋明年不如今年明日不如今日矣故孔子曰日月逝矣歲不我與此言時之難得而易失也伏惟相公惜其時之易也而不失焉慮其漸之難也而不取焉抑又聞濟時者道也行道者權也扶權者寵也故得其位不可一日無其權得其權不可一日無其寵然則取權有術也求寵有方也蓋竭其力以舉職而權必自歸忘其身以徇公而寵必自至權歸寵至然後能行其道焉伏惟相公詳之而不忽也抑又聞不棄死馬之骨者然後良驥可得也不棄狂夫之言者然後嘉謨可聞也苟某管見之中有可取者俯而取之苟芻言之中有可採者俯而採之則知之者必曰如某之見猶且不棄况愈於某之徒歟則天下通情達識之士得不比肩而至乎聞之者必曰如某之言猶且不棄况愈於某之徒歟則天下謇諤敢言之士得不繼踵而來乎伏惟相公試垂意焉則天下之士幸甚某遊長安僅十年矣足不踐相公之門目不識相公之面名不聞相公之耳相公視某何為者哉豈非介者耶狷者耶今一旦卒然以數千言塵瀆執事者又何為哉實不自揆欲以區區之聞見裨相公聰明萬分之一分也又欲以濟天下憔悴之人死命萬分之一分也相公以為何如何如
