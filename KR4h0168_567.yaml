front:
  text: 全唐文欽定全唐文卷五百六十七韓愈二十一
  hash: sha256:404912e48d81ccb16d6541d975baf473eaf94f5c8cfe3ad41aeb53e8c4475e6e
body:
  text: 公諱晉字混成河中虞鄉萬歲里人少以明經上第宣皇帝居原州公在原州宰相以公善為文任翰林之選聞召見拜祕書省校書郎入翰林為學士三年出入左右天子以為謹愿賜緋魚袋累陞為衞尉寺丞出翰林以疾辤拜汾州司馬崔圓為揚州詔以公為圓節度判官攝殿中侍御史以軍事如京師朝天子識之拜殿中侍御史內供奉由殿中為侍御史入尚書省為主客員外郎由主客為祠部郎中先皇帝時兵部侍郎李涵如回紇立可敦詔公兼侍御史賜紫金魚袋為涵判官回紇之人來曰唐之復土疆取回紇力焉約我為市馬既入而歸我賄不足我於使人乎取之涵懼不敢對視公公與之言曰我之復土疆爾信有力焉吾非無馬而與爾為市為賜不既多乎爾之馬歲至吾數皮而歸資邊吏請致詰也天子念爾有勞故下詔禁侵犯諸戎畏我大國之爾與也莫敢校焉爾之父子寧而畜馬蕃者非我誰使之於是其眾皆環公拜既又相率南面序拜皆兩舉手曰不敢復有意大國自回紇歸拜司勳郎中未嘗言回紇之事遷祕書少監歷太府太常二寺亞卿為左金吾衞將軍今上即位以大行皇帝山陵出財賦拜太府卿由太府為左散騎常侍兼御史中丞知臺事三司使選擢才俊有威風始公為金吾未盡一月拜太府九日又為中丞朝夕入議事於是宰相請以公為華州刺史拜華州刺史潼關防禦鎮國軍使朱泚之亂加御史大夫詔至於上所又拜國子祭酒兼御史大夫宣慰恒州於是朱滔自范陽以回紇之師助亂人大恐公既至恒州恒州即日奉詔出兵與滔戰大破走之還至河中李懷光反上如梁州懷光所率皆朔方兵公知其謀與朱泚合也患之造懷光言曰公之功天下無與敵公之過未有聞於人某至上所言公之情上寬明將無不赦宥焉乃能為朱泚臣乎彼為臣而背其君苟得志於公何有且公既為太尉矣彼雖寵公何以加此彼不能事君能以臣事公乎公能事彼而有不能事君乎彼知天下之怒朝夕戮死者也故求其同罪而與之比公何所利焉公之敵彼有餘力不如明告之絕而起兵襲取之清宮而迎天子庶人服而請罪有司雖有大過猶將揜焉如公則誰敢議語已懷光拜曰天賜公活懷光之命喜且泣公亦泣則又語其將卒如語懷光者將卒呼曰天賜公活吾三軍之命拜且泣公亦泣故懷光卒不與朱泚當是時懷光幾不反公氣仁語若不能出口及當事乃更疏亮捷給其詞忠其容貌溫然故有言於人無不信明年上復京師拜左金吾衞大將軍由大金吾為尚書左丞又為太常卿由太常拜門下侍郎平章事在宰相位凡五年所奏於上前者皆二帝三王之道由秦漢以降未嘗言退歸未嘗言所言於上者於人子弟有私問者公曰宰相所職係天下天下安危宰相之能與否可見欲知宰相之能與否如此視之其可凡所謀議於上前者不足道也故其事卒不聞以疾病辤於上前者不記退以表辤者八方許之拜禮部尚書制曰事上盡大臣之節又曰一心奉公於是天下知公之有言於上也初公為宰相時五月朔會朝天子在位公卿百執事在廷侍中贊百寮賀中書侍郎平章事竇參攝中書令當傳詔疾作不能事凡將大朝會當事者既受命皆先日習儀於時未有詔公卿相顧公逡巡進北面言曰攝中書令臣某病不能事臣請代某事於是南面宣致詔詞事已復位進退甚詳為禮部四年拜兵部尚書入謝上語問日晏復有入謝者上喜曰董某疾且損矣出語人曰董公且復相既二日拜東都畱守判東都尚書省事充東都畿汝州都防禦使兼御史大夫仍為兵部尚書由畱守未盡五月拜檢校尚書左僕射同中書門下平章事汴州刺史宣武軍節度副大使知節度事管內支度營田汴宋亳潁等州觀察處置等使汴州自大歷來多兵事劉元佐益其師至十萬元佐死子士寧代之畋遊無度其將李萬榮乘其畋也逐之萬榮為節度一年其將韓惟清張彥林作亂求殺萬榮不克三年萬榮病風昏不知事其子乃復欲為士寧之故監軍使俱文珍與其將鄧惟恭執之歸京師而萬榮死詔未至惟恭權軍事公既受命遂行劉宗經韋宏景韓愈實從不以兵衞及鄭州逆者不至鄭州人為公懼或勸公止以待有自汴州出者言於公曰不可入公不對遂行宿圃田明日食中牟逆者至宿八角明日惟恭及諸將至遂逆以入及郛三軍緣道讙聲庶人壯者呼老者泣婦人啼遂入以居初元佐死吳湊代之及鞏聞亂歸士寧萬榮皆自為而後命軍士將以為常故惟恭亦有志以公之速也不及謀遂出逆既而私其人觀公之所為以告曰公無為惟恭喜知公之無害已也委心焉進見公者退皆曰公仁人也聞公言者皆曰公仁人也環以相告故大和初元佐遇軍士厚士寧懼復加厚焉至萬榮如士寧志及韓張亂又加厚以懷之至於惟恭每加厚焉故士卒驕不能禦則置腹心之士幕於公庭廡下挾弓執劒以須日出而入前者去日入而出後者至寒暑時至則加勞賜酒肉公至之明日皆罷之貞元十二年七月也八月上命汝州刺史陸長源為御史大夫行軍司馬楊凝自左司郎中為檢校吏部郎中觀察判官杜倫自前殿中侍御史為檢校工部員外郎節度判官孟叔度自殿中侍御史為檢校金部員外郎支度營田判官職事修人俗化嘉禾生白鵲集蒼烏來巢嘉瓜同蔕聯實四方至者歸以告其帥小大威懷有所疑輒使來問有交惡者公與平之累請朝不許及有疾又請之且曰人心易動軍旅多虞及臣之生計不先定至於他日事或難期猶不許十五年二月三日薨於位上三日罷朝贈太傅使吏部員外郎楊於陵來祭弔其子贈布帛米有加公之將薨也命其子三日斂既斂而行於行之四日汴州亂故君子以公為知人公之薨也汴州人歌之曰濁流洋洋有闢其郛闐道讙呼公來之初今公之歸公在喪車又歌曰公既來止東人以完今公沒矣人誰與安始公為華州亦有惠愛人思之公居處恭無妾媵不飲酒不諂笑好惡無所偏與人交泊如也未嘗言兵有問之者曰吾志於教化享年七十六階累陞為金紫光祿大夫勳累陞為上柱國爵累陞為隴西郡開國公娶南陽張氏夫人後娶京兆韋氏夫人皆先公終四子全道溪全素澥全道全素皆上所賜名全道為祕書省著作郎溪為祕書省祕書郎全素為大理評事澥為太常寺太祝皆善士有學行謹具歷官行事狀伏請牒考功并牒太常議所諡牒史館請垂編錄謹狀君諱某字某其先為嬴姓當周之衰處晉為趙氏晉亡而趙氏為諸侯其後益大與齊楚韓魏燕為六國俱稱王其別子趙奢當趙時破秦軍閼與有功號馬服君子孫由是以馬為氏梁有安州刺史侍中贈太尉岫岫生喬卿任襄州主簿國亂去官不仕喬卿生君才隋末為薊令燕王藝師之以有幽都之眾武德初朝京師拜武侯大將軍封南陽郡公卒葬大梁新里趙郡李華刻碑頌之君才生珉為玉鈐衞倉曹參軍事贈尚書左僕射生季龍為嵐州刺史贈司空清河崔元翰銘其德於碑在新里司空生燧為司徒侍中北平王贈太傅諡莊武莊武之勳勞在策書君其長子也少舉明經司徒公作藩太原授河南府參軍建中四年司徒公使將武人子弟才力之士三百人朝行在扞衞獻御服用物弓甲煮器幄幕奔走危難上嘉其勤超拜太常丞賜章服遷少府少監太僕少卿司徒公之薨也刺臂出血書佛經千餘言期以報德廬墓側植松柏終喪又拜太僕少卿疾病一年貞元十八年七月二十五日終於家凡年四十有五其弟少府監暢上印綬求追贈贈絳州刺史布帛百匹君在家行孝友待賓客朋友有信義其守官恭慎舉職其朝獻奉父命不避難其居喪有過人行初司徒公娶河南元氏封潁川郡夫人贈許國夫人許國薨少府始孩顧託以其姪為繼室是為陳國夫人陳國無子愛君與少府如己生其薨也君與少府喪之猶實生己親負土封其墓夫人滎陽鄭氏王屋縣令况之女有賢行侍君疾逾年不下堂食菜飲水藥物必自擇將進輒先嘗方書本草恒置左右子男二人赦前左衞倉曹參軍敭右清道率府冑曹參軍女子二人在室雖皆幼侍疾居喪如成人愈既世通家詳聞其世系事業今葬有期日從少府請掇其大者為行狀託立言之君子而圖其不朽焉太學生何蕃入太學者卄餘年矣歲舉進士學成行尊自太學諸生推頌不敢與蕃齒相與言於助教博士助教博士以狀申於司業祭酒司業祭酒撰次蕃之㣥行焯焯者數十餘事以之升於禮部而以聞於天子京師諸生以薦蕃名文說者不可選紀公卿大夫知蕃者比肩立莫為禮部為禮部者率蕃所不合者以是無成功蕃淮南人父母具全初入太學歲率一歸父母止之其後閒一二歲乃一歸又止之不歸者五歲矣蕃純孝人也閔親之老不自克一日揖諸生歸養於和州諸生不能止乃閉蕃空舍中於是太學六館之士百餘人又以蕃之義行言於司業陽先生城請諭畱蕃於是太學闕祭酒會陽先生出道州不果畱歐陽詹生言曰蕃仁勇人也或者曰蕃居太學諸生不為非義葬死者之無歸哀其孤而字焉惠之大小必以力復斯其所謂仁歟蕃之力不任其體其貌不任其心吾不知其勇也歐陽詹生曰朱泚之亂太學諸生舉將從之來請起蕃蕃正色叱之六館之士不從亂茲非其勇歟惜乎蕃之居下其可以施於人者不流也譬之水其為澤不為川乎川者高澤者卑高者流卑者止是故蕃之仁義充諸心行諸太學積者多施者不遐也天將雨水氣上無擇於川澤㵎谿之高下然則澤之道其亦有施乎抑有待於彼者歟故凡貧賤之士必有待然後能有所立獨何蕃歟吾是以言之無亦使其無傳焉圬之為技賤且勞者也有業之其色若自得者聽其言約而盡問之王其姓承福其名世為京兆長安農夫天寶之亂發人為兵持弓矢十三年有官勳棄之來歸喪其土田手鏝衣食餘三十年舍於市之主人而歸其屋食之當焉視時屋食之貴賤而上下其圬之傭以償之有餘則以與道路之癈疾餓者焉又曰粟稼而生者也若布與帛必蠶織而後成者也其他所以養生之具皆待人力而後完也吾皆賴之然人不可徧為宜乎各致其能以相生也故君者理我所以生者也而百官者承君之化者也任有小大惟其所能若器皿焉食焉而怠其事必有天殃故吾不敢一日捨鏝以嬉夫鏝易能可力焉又誠有功取其直雖勞無愧吾心安焉夫力易強而有功也心難強而有智也用力者使於人用心者使人亦其宜也吾特擇其易為而無愧者取焉嘻吾操鏝以入富貴之家有年矣有一至者焉又往過之則為墟矣有再至三至者焉而往過之則為墟矣問之其鄰或曰噫刑戮也或曰身既死而其子孫不能有也或曰死而歸之官也吾以是觀之非所謂食焉怠其事而得天殃者耶非強心以智而不足不擇其才之稱否而冒之者耶非多行可愧知其不可而強為之者耶將貴富難守薄功而厚享之者耶抑豐悴有時一去一來而不可常者耶吾之心憫焉是故擇其力之可能者行焉樂富貴而悲貧賤我豈異於人哉又曰功大者其所以自奉也博妻與子皆養於我者也吾能薄而功小不有之可也又吾所謂勞力者若立吾家而力不足則心又勞也一身而二任焉雖聖者不可能也愈始聞而惑之又從而思之蓋賢者也蓋所謂獨善其身者也然吾有譏焉謂其自為也過多其為人也過少其學楊朱之道者耶楊之道不肯拔我一毛而利天下而夫人以有家為勞心不肯一動其心以畜其妻子其肯勞其心以為人乎哉雖然其賢於世之患不得之而患失之者以濟其生之欲貪邪而亡道以喪其身者其亦遠矣又其言有可以警予者故予為之傳而自鑒焉毛穎者中山人也其先明眎佐禹治東方土養萬物有功因封於卯地死為十二神嘗曰吾子孫神明之後不可與物同當吐而生已而果然明眎八世孫需免世傳當殷時居中山得神仙之術能匿光使物竊姮娥騎蟾蜍入月其後代遂隱不仕云居東郭者曰夋兔狡而善走與韓盧爭能盧不及盧怒與宋鵲謀而殺之醢其家秦始皇時蒙將軍恬南伐楚次中山將大獵以懼楚召左右庶長與軍尉以連山筮之得天與人文之兆筮者賀曰今日之獲不角不牙衣褐之徒闕口而長鬚八竅而趺居獨取其髦牘是資天下其同書秦其遂兼諸侯乎遂獵圍毛氏之族拔其豪載穎而歸獻俘於章臺宮聚其族而加束縛焉秦皇帝使恬賜之湯沐而封諸管城號曰管城子日見親寵任事穎為人強記而便敏自結繩之代以及秦事無不纂錄陰陽卜筮占相醫方族氏山經地志字書圖畫九流百家天人之書及至浮圖老子外國之說皆所詳悉又通於當代之務官府簿書市井貨錢注記惟上所使自秦皇帝及太子扶蘇胡亥丞相斯中車府令高下及國人無不愛重又善隨人意正直邪曲巧拙一隨其人雖見廢棄終默不洩惟不喜武士然見請亦時往累拜中書令與上益狎上嘗呼為中書君上親決事以衡石自程雖宮人不得立左右獨穎與執燭者常侍上休方罷穎與絳人陳元宏農陶泓及會稽褚先生友善相推致其出處必偕上召穎三人者不待詔輒俱往上未嘗怪焉後因進見上將有任使拂拭之因免冠謝上見其髮禿又所摹畫不能稱上意上嘻笑曰中書君老而禿不任吾用吾嘗謂君中書君今不中書耶對曰臣所謂盡心者也因不復召歸封邑終於管城其子孫甚多散處中國夷狄皆冒管城惟居中山者能繼父祖業太史公曰毛氏有兩族其一姬姓文王之子封於毛所謂魯衞毛耼者也戰國時有毛公毛遂獨中山之族不知其本所出子孫最為蕃昌春秋之成見絕於孔子而非其罪及蒙將軍拔中山之豪始皇封諸管城世遂有名而姬姓之毛無聞穎始以俘見卒見任使秦之滅諸侯穎與有功賞不酬勞以老見疏秦真少恩哉下邳侯革華者其先隴西人也三十六代祖守犍為黃帝時以力見召拜大司農以其闢土有功又知稼穡艱難遷輕車都尉子孫相繼至周武王時徙居桃林冠冕遂絕其後人思其濟世之才因復其位而加任使焉華父犨生五年襲先祖爵祿仕至上輕車都尉華母世居長樂有乳哺之恩越王勾踐時嘗侍宴姑蘇臺詩所謂有覺德行者也犨因引重至太行山力不任事遂死於轘轅下上嗟悼命太宰申屠公執刀而解之其支派分離散在他處革華長子也上念其父劬勞而死於王事封華為下邳侯詔將作大匠治之華為性堅勁屈強難以直禦匠以其膏潤之然後去其豪族而加裁割焉會太原人金十奴與新鄭人斛斯生相逢薦華於五木大夫是後稍稍得成其名上嘉之遂釋褐賜墨綬焉華嘗曰吾辛勤久今方成名得處上左右足矣及獻之果然華為人善履道別威儀進止趨蹌一隨人意上將駕出遊畋獵馳騁毬擊射御及禮神祭祀交賓接賢未嘗不召華偕往伏事上久之因病忽開口論議泄露密旨上繇是疏之詔將作大匠治之又命其友金十奴等令補過之尋獻於上上雖納之然亦不甚見重有泥塗賤處方召使之餘並不得預焉頃之上見其顏色顦顇又衰憊失度上咨嗟曰下邳侯老而憊不任吾事今棄於市不復召子矣遂棄之而終華無息其繼者族人矣贊曰華之先皮姓軒轅時蒼頡觀鳥跡制文字以其始於皮而聲於華故從革焉初華自胡而來趙武靈王時見重是後子孫盛於中國漢書功臣表有煮棗侯革朱者即其後也歐陽詹世居閩越自詹已上皆為閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上初故宰相常衮為福建諸州觀察使治其地衮以文辭進有名於時又作大官臨莅其民鄉縣小民有能誦書作文辭者衮親與之為客主之禮觀游宴饗必召與之時未幾皆化翕然詹於時獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元閒予就食江南未接人事往往聞詹名閭巷閒詹之稱於江南也久貞元三年予始至京師舉進士聞詹名尤甚八年春遂與詹文辭同考試登第始相識自後詹歸閩中予或在京師他處不見詹久者惟詹歸閩中時為然其他時與詹離率不歷歲移時則必合合必兩忘其所趨久然後去故予與詹相知為深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貌嶷嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬予以徐州從事朝正於京師詹為國子監四門助教將率其徒伏闕下舉予為博士會監有獄不果上觀其心有益於予將忘其身之賤而為之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸為父母榮也雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其名聲流於人人其德行信於朋友雖詹與其父母皆可無憾也詹之事業文章李翺既為之傳故作哀辭以舒予哀以傳於後以遺其父母而解其悲哀以卒詹志云求仕與友兮遠違其鄉父母之命兮子奉以行友則既獲兮祿實不豐以志為養兮何有牛羊事實既修兮名譽又光父母忻忻兮常若在旁命雖云短兮其存者長終要必死兮願不永傷朋友親視兮藥物甚良飲食孔時兮所欲無妨壽命不齊兮人道之常在側與遠兮非有不同山川阻深兮魂魄流行祭祀則及兮勿謂不通哭泣無益兮抑哀自彊推生知死兮以慰孝誠嗚呼哀哉兮是亦難忘愈性不喜書自為此文惟自書兩通其一通遺清河崔㣥㣥與予皆歐陽生友也哀生之不得位而死哭之過時而悲其一通今書以遺彭城劉君伉君喜古文以吾所為合於古詣吾廬而來請者八九至而其色不怨志益堅凡愈之為此文蓋哀歐陽生之不顯榮於前又懼其泯滅於後也今劉君之請未必知歐陽生其志在古文耳雖然愈之為古文豈獨取其句讀不類於今者耶思古人而不得見學古道則欲兼通其辭通其辭者本志乎古道者也古之道不苟譽毀於人劉君好其辭則其知歐陽生也無惑焉眾萬之生誰非天耶明昭昏蒙誰使然耶行何為而怒居何故而憐耶胡喜厚其所可薄而恒不足於賢耶將下民之好惡與彼蒼懸耶抑蒼茫無端而暫寓其閒耶死者無知吾為子痛而已矣如有知也子其自知之矣濯濯其英煜煜其光如聞其聲如見其容烏虖遠矣何日而忘
