front:
  text: 全唐文欽定全唐文卷六百十劉禹錫十二
  hash: sha256:2e99fdb67a78562eceaad3815ef5a9d1562ecb19287bf590be6e58799f9c9c43
body:
  text: 太師諱陲字平仲清河東武城人太公望既封於營邱子伋嗣侯伋之孫曰穆伯食邑於崔遂以為氏後十四世至秦末東萊侯意如東萊之子伯基始居清河又十五葉生炎為魏名臣又九葉生休仕後魏為七兵尚書七兵之弟曰寅為樂安太守公即樂安八代孫始以閥閱授鄭州參軍力行好學於子道以孝聞處伯仲間以友聞讀易至編絕以精易聞至德中時有邊警從師出征公少有奇志思越拘攣以自奮乃作伐鯨鯢賦以獻既上聞果器之會第五丞相以善言利得幸盡付利權始有鹽鐵使之官慎選寮屬表公為介轉臨晉縣丞處煩應卒鋩刃不頓再遷至大理評事府罷歷河中府司隸參軍太子司議郎韓晉公時為戶部侍郎掌邦賦急於用才薦公為監察御史主河東租庸之務尋轉殿中侍御史復遷侍御史充京東和糴使建中初德宗始親萬幾儲精治本有漢宣與我共此之歎謂史臣求可當二千石良者遂以公帶本官權知袁州刺史期月有成詔書顯揚就加真秩益以金紫居無何韓晉公為丞相制國用思公前績乃傳召之抵京師授檢校戶部郎中輯池鹽於蒲修牢盆謹衡石煎和既精飴散乃盈商通而洊至吏懼而循法民不絓網而國用益饒歲杪會其所入贏羨什伯詔下襃其能轉吏部侍郎兼御史中丞且加五等之爵方倚以重任天富其才而不遐其福享齡六十有五貞元七年二月二日遘疾卒於官上聞悼之即降愍策贈鄭州刺史齎錢五百萬以備飾終之禮明年八月二日返葬於成周之偃師從世墓也夫人隴西李氏汾州司戶參軍咸一之女生才子六人長曰邠及公終時已為左拾遺後至太常卿次曰酆至太府卿次曰郾至外臺尚書次曰郇今為廷尉次曰鄯至執金吾季曰鄲自太常卿加同中書門下平章事今為尚書侍郎平章事如故惟夫人為姑臧冠族以蘋蘩組紃輔佐君子為令妻積三十餘年以慈儉忠厚訓誡諸子為賢母二十有三年當永貞之初順宗踐阼澤流百葉長子邠時為詞臣草冊書以文當晉階遂上疏乞移榮於親上俞之特封清河郡太君士林聳慕皆自痛其不及邠為太常酆為大農咸白髮貴綬以奉膳羞諸季皆翩翩人傑各以簪裾給事左右愉愉然承順無違鼎鐘致養居然一室雍熙太和言世榮者舉無以比以子貴累封贈至涼國太夫人元和八年三月十六日捐館舍壽七十有九是歲十月十八日合祔惟太常及尚書暨今相國皆自中書舍人為禮部侍郎凡五貢賢能書得士百四十有八人言兄弟者許為人瑞崔氏之門六人皆入南宮賜金紫其間三人歷入侍郎統而論四卿一相兩連率二翰林學士一執金吾言冠冕者許為世雄與姑臧李范楊盧世為婚媾入於婚黨無第二流言門閥者許為時表太常二子亦以才能同入尚書璜為吏部郎瓘為司勳郎其他支孫未登金閨籍者詵詵然魚貫而進文業甚富而孝謹不衰猗歟君子之澤其所從來遠而有光已開成已未歲七月甲辰相君受詔於朝廷始操國柄冬仲月奉常事於家禮成起慕悄然永懷曰古者卿大夫廟有鼎墓有碑皆銘之以紀先德也今備位宰相敢不敭前人之耿光乃俾家老條白事功資於學古者徵其詞尚信也又命宗祝卜柔日告於廟盡誠也儀甚備而敬有餘斯所謂達禮之君子遂刊勒如式揭於道周銘曰奕奕四姓崔為之冠瞻其門牆倬若雲漢善積家肥子孫多才如彼榱棟必生徂徠太公之後彌二千祀纍如貫珠倬見圖史顯允太師丕承德基構於其堂亦既塈茨生逢艱虞中外交師獻賦伐叛忠存乎詞兵興事叢飛輓四馳歷踐劇職視險如夷乃主平糴乃分符使治粟為邦其道一致蒲實近地鹽為利浤使車來思剗弊立程吏廉商通歲倍其贏奏課連最德音張明就加執法好爵兼榮天付之才不與壽并生樹德本歿揚淑聲里巷罷舂音樂為停贈襚之禮冠於公卿萬石貽訓根於孝友太公種德乃稔身後家有令子妻為壽母二十餘年人倫之首六子來侍如龍如虎眾婦來饋維筐及筥佩玉鳴環交響庭戶申申秩秩歡不踰矩昔為望族今為興門天爵人爵蔚然兩尊先德陰步馬黕如垂雲孕和合粹濯潤本根景亳之原圖書之川湯陵之壇磅礡迴環世安其神世嗣其賢聆德音者拜於碑前元和十一年某月日詔書追褒曹溪第六祖能公諡曰大鑒實廣州牧馬總以疏聞繇是可其奏尚道以尊名同歸善善不隔異教一字之襃華夷孔懷得其所故也馬公敬其事且謹始以垂後遂咨於文雄今柳州刺史河東柳君為前碑後三年有僧道琳率其徒由曹溪來且曰願立第二碑學者志也惟如來滅後中五百歲而摩騰竺法蘭以經來華人始聞其言猶夫重昏之見曶爽復五百歲而達摩以法來華人始傳其心猶夫昧旦之覩白日自達摩六傳至大鑒如貫意珠有先後而無異同世之言真宗者所謂頓門初達摩與佛衣俱來得道傳付以為真印至大鑒置而不傳豈以是為筌蹄耶芻狗耶將人人之莫已若而不若置之耶吾不得而知也桉大鑒生新州三十出家四十七年而歿既歿百有六年而諡始自蘄州東山從弟五師得授記以歸高宗使中貴人再徵不奉詔第以言為貢上敬行之銘曰至人之生無有種類同人者形出人者智蠢蠢南裔降生傑異父乾母坤獨肖元氣一言頓悟不踐初地五師相承授以寶器宴坐曹溪世號南宗學徒爰來如水之東飲以妙藥瘥其瘖聾詔不能致許為法雄去佛日遠㣥言積億著空執有各走其域我立真筌揭起南國無修而修無得而得能使學者還其天識如黑而迷仰見斗極得之自然竟不可傳口傳手付則礙於有留衣空堂得者天授天生人而不能使情欲有節君牧人而不能去威勢以理至有乘天工之隙以補其化釋王者之位以遷其人則素王立中樞之教懋建大中慈氏起西方之教習登正覺至哉乾坤定位而聖人之道參行乎其中亦猶水火異氣成味也同德轅輪異象至遠也同功然則儒以中道御㣥生罕言性命故世衰而寖息佛以大慈救諸苦廣起因業故劫濁而益尊自白馬東來而人知像教佛衣始傳而人知心法宏以權實示其攝修味真實者即清淨以觀空存相好者佈威神而遷善厚於求者植因以覬福罹於苦者證業以銷冤革盜心於冥昧之間泯愛緣於死生之際陰助教化總持人天所謂生成之外別有陶冶刑政不及曲為調柔其方可言其旨不可得而言也惟四海之大㣥倫之富必有以得其門而會其宗者為世導師焉禪師諱乘廣其生容州姓張氏七歲尚儒以俎豆為戲十三慕道遵懷削之儀至衡陽依天柱想公以啟初地至洛陽依荷澤會公以契真乘洪鐘蘊聲扣之斯應陽燧含焰晞之乃明始由見性終得自在常謂機有淺深法無高下分二宗者眾生存頓漸之見說三乘者如來開方便之門名自外得故生分別道由內證則無異同遂以攝化為心經行不倦愍彼南裔不聞佛經由是結廬此山心與境寂應念以起教隨方而立因居涉旬而善根者知歸逮周月而帶縛者慚悟以月倍日以年倍時瘖矇洞開荒憬潛革邑中長者十方善眾咸發信願大其藩垣法堂四阿復引僧舍身心恆寂象馬交馳隨其去來皆得利益踰嶺之北涉湘而南仰茲高山知道有所在此地緣盡翛然化俱神歸佛境悲結人世自趺坐而滅至於茶毗三百有六旬矣爪髮加長容澤差衰真子號呼圍繞薪火得舍利如珠璣者數十百焉於戲肖圓方之形故寂滅以示盡入菩提之位故殊相以現靈亦猶鳳毛成字麟角生肉必有以異不知其然於是服勤聞法之上首曰甄升乃率其徒圓寂道宏如亮如海等相與抆淚具役建塔於禪室之右端從眾也初廣公始生之辰歲在丁巳當元宗之中元也生三十而受具更臘五十二而終終之夕歲直戊寅當德宗之後元三月既望之又十日也後九年其門人還源以為崇塔以存神與建銘以垂休皆憑像寄懷不可以闕一繆謂予為習於文者故繭足千里以誠相投大懼其先師德音與時寖遠且曰白月中黑東川無還颺於金石傳信百劫彼墮淚之感豈儒者流專之敬酬斯言銘示真俗文曰如來說法遍滿大千得勝義者強名為禪至道不二至言無辯心法東行㣥迷丕變七葉無嗣四魔潛扇佛衣生塵佛法如線吾師覺者冥極道樞承受密印端如貫珠一室寥然高山之隅為法來者千百人俱裔民嗤嗤戶有犀渠攝以方便家藏佛書願力既普度門斯盛合為一乘散為萬行即動求靜故能常定絕緣離覺乃得究竟生非我樂死非我病現滅者身常圓者性本無言說付屬其誰等空無礙後覺得之像閟靈塔迹留仁祠十方四輩瞻禮於斯佛法在九州間隨其方而化中夏之人汨於榮利破榮莫若妙覺故言禪寂者宗嵩山北方之人銳以武力攝武莫若示現故言神通者宗清涼山南方之人剽而輕制輕莫若威儀故言律藏者宗衡山是三名山為莊嚴國必有達者與山比崇南嶽律門以津公為上首津之後雲峰證公承之證公之後湘潭儼公承之星月麗天珠璣同貫由其門者為正法焉公號智儼曹氏子世為柳之右姓兆形在孕母不嗜葷成童在侶獨不嗜戲其夙植固厚者歟生九年樂為僧父不能奪其志抱經笥入岣嶁山從名師執業凡進品受具聞經傳印皆當時大長老我入名門不住諸乘我得覺路逕入智地居室方丈名聞大千護法大臣多所賓禮嗣曹王皋之鎮湖南請為人師自是登壇莅事三十有八載由我得度者萬有餘人人持寶衣解瓔珞為禮公色受之謂門弟子曰彼以有相求我我以有為應之凡建寶幢修廢寺飾大像皆極其工應物故也元和十三年九月二十七日中夜具湯沐剃頤頂與門人告別既即寂而視身與色無有壞相嗚呼豈生能全吾真故死不速朽將有願力耶予不得而知也問年八十二問臘六十一葬於寺東北隅傳律弟子中巽道準傳經弟子圓皎貞璨與其徒圓靜文外惠榮明素存政等欲其師之道光且遠故咨予乞辭乃作長句以偈銘之曰祝融靈山禹所治非夫有道不可止中有毗尼出塵士以津視儼猶孫子登壇人師四十紀南方學徒宗奧旨幼無童心至兒齒識滅形全異凡死長沙潭西逾五里陶侃故居石頭寺門前一帶湘江水吁嗟律席之名兮與湘流而不已元和七年夏四月某日前荊州部從事董府君以疾終於故府私第年若干其孤泣書前人之爵里耿光求我以銘於幽且先志也故重為之董姓出於豢龍氏至辛有而分在晉為良史在趙佐簡子為能臣項羽主盟為翟王高皇帝舉兵漢中劫其兵眾不克其土後裔遂為隴西人凡稱字不稱名不待事而彰也始予謫於武陵人多中之賢有董生為守令客既而以士相見之禮成與之言能言墳典數旁捃百氏之學弱年嗜屬詩工奕棊用是索合於貴游多所慰薦中年奉浮圖說三乘用是貢誠於清賢多被辟書脫巾為宏文館校書郎再選至大理評事咸視真秩而不纍其章職繫於外是也晚節尚道故投劾於幕府治扁舟浮江沱泛洞庭登熊耳訪浮邱以探異賦枉渚以寄傲居數歲投老於南荊迷邦縱性委和從化逮夫寢巨室也自含襚至於卜竁皆仁人之賻焉是歲五月十二日卜葬於龍山之某岡外姻至矣君名侹字庶中大父曰思簡位至汝南太守父承祖歿於試守太子舍人始為君求婦於鄭之里生嗣子夏卿殷卿既立而夭今未之從其後又娶於閻氏生二子曰周卿雲卿嫠也繐裳髽首有正家之道嗚呼道愈富而室愈貧志甚修而知甚寡士以隴西為貴將在令名與銘曰學待問而文藻身藝不試兮名孰聞大道甚夷兮非我辰何生不茂兮非我春修門之達兮連岡膴膴蔓草如茵兮新墳若斧吁嗟董生兮於焉終古顧彖吳郡人食力於武陵沅水上以讀易聞病且死飭其子曰吾年十有五而受易於師積六十三年於茲未嘗一日不吟乎繫象里中兒從吾讀其文多矣死則必葬吾於黨庠之側尚其有知且聞吾書君子曰若彖者可謂志篤於學矣因以絕編生諡之且表其墓後之讀功令者或采焉予既謫居是邦始至之日問能道古語可與言者邑子以生為對既而執贄請見之生危冠大袂濶視雅拜及門知讓候肅而後入又肅而躋階心存聖言潤徹眉睫有埜態而亡苟容問其所執曰幼學易老而尤嗜問安學曰始聞於師晚熟於心自尼父兼三才絀八索繫辭焉以通微言與伏羲文王並行猶天三辰同麗太極秦脫大患完文顯行漢之田丁京劉而東京有馬鄭魏之何荀兩王而吳有韋陸前者導源後者洒之渢融混合百派犇湊唐興沙門一行方洩天機以探古人神友造物智斟人事制動也有柅變道也亡方曏之支流委輸於我其它紬繹祖述三十有餘家朱藍之樸斲之為羽翼為鼓吹疇咨天人之際旁魄上下騖精於攟摭匱巧於穿鑿猶制氏之於樂鏗鏘而已徐氏之於禮善容而已然而前修之盡心也得以味腴搴芳焉手胝於運管目胝於臨燭而氣耗於咏呻家居亡訾不能與計偕地偏且遠亡有能晤語者心愈苦而跡愈卑寒膚嗛腹以至於耋老微夫子之問持是安施乎它日予造其室廬瓢簞在左汙尊在右有龜枵然有筴甚澤予擫蓍指骨而訊之曰是亹亹者曾不予欺乎生攸爾而對云古先聖人知道之妙不可搏而得也故設象以致意梯有以取亡取當其麤用當其精夫權衡所以揣輕重不為捶鈎者設也尋尺所以商遠邇不為運斤者設也龜筴所以決㣥疑不為知幾者設也幾存乎人是則以天時為卦體以地理為爻位外附人事以象焉內取諸身以彖焉得樞於寰中迎數於象外自然之理不知其然雖欲強名措說亡地彼枯莖朽殼安能與於此乎今夫揲之以至刓灼之以殆盡徒與夫蚩蚩者問歉穰占熊虺起訟需食亡羊喪牛之間耳資其握粟以餬予口烏足為夫子道哉予以斯言邃於易故書噫國有大學學有館以延顓門若生者苦形役志如是其顓也茹經於腹湮滅糞壤壁水湯湯不聞其聲摧藏樸遫與山木同朽豈地遠然耶彼文甲綷毛剽筋壽革嶺嶠之華實炎溟之蜃蝦飛苞驛篚所至而貴夫豈貴邇也哉悅者眾故也生之死在元和七年秋七月由死之日推而上求直治生之辰得四百有七十甲子葬在征渚西右磯上其墳可隱東望里塾尚行其志云子劉子名禹錫字夢得其先漢景帝賈夫人子勝封中山王諡曰靖子孫因封為中山人也七代祖亮事北朝為冀州刺史散騎常侍遇遷都洛陽為北部都昌里人世為儒而仕墳墓在洛陽北山其後地陿不可依乃葬滎陽之檀山原由大王父已還一昭一穆如平生曾祖凱官至博州刺史祖鍠由洛陽主簿察視行馬外事歲滿轉殿中丞侍御史贈尚書祠部郎中父諱緒亦以儒學天寶末應進士遂及大亂舉族東遷以違患難因為東諸侯所用後為浙西從事本府就加鹽鐵副使遂轉殿中主務於埇橋其後罷歸浙右至揚州遇疾不諱小子承夙訓稟遺教眇然一身奉尊夫人不敢殞滅後忝登朝或領郡蒙恩澤先府君累贈至吏部尚書先太君盧氏由彭城縣大君贈至范陽郡太夫人初禹錫既冠舉進士一幸而中試間歲又以文登吏部取士科授太子校書官司閒曠得以請告奉溫凊是時年少名浮於實士林榮之及丁先尚書憂迫禮不死因成痼疾既免喪相國揚州節度使杜公領徐泗素相知遂請為掌書記捧檄入告太夫人曰吾不樂江淮間汝宜謀之於始因白丞相以請曰諾居數月而罷徐泗而河路猶艱難遂改為揚州掌書記涉二年而道無虞前約乃行調補京兆渭南主簿明年冬擢為監察御史貞元二十一年春德宗新棄天下東宮即位時有寒雋王叔文以善奕棊得通籍博望因閒隙得言及時事上大奇之如是者積久眾未知之至是起蘇州掾超拜起居舍人充翰林學士遂陰薦丞相杜公為度支鹽鐵等使翊日叔文以本官及內職兼充副使未幾特遷戶部侍郎賜紫貴振一時予前已為杜丞相奏署崇陵使判官居月餘日至是改屯田員外郎判度支鹽鐵等桉初叔文北海人自言猛之後有遠祖風唯東平呂溫隴西李景儉河東柳宗元以為言然三子者皆與予厚善日夕過言其能叔文實工言治道能以口辯移人既得用自春至秋其所施為人不以為當非時上素被疾至是尤劇詔下內禪自為太上皇後諡曰順宗東宮即皇帝位是時太上久寢疾宰臣及用事者都不得召對宮掖事祕而建桓立順功歸貴臣於是叔文首貶渝州後命終死宰相貶崖州予出為連州途至荊南又貶朗州司馬居九年詔徵復授連州自連歷夔和二郡又除主客郎中分司東都明年追入充集賢殿學士轉蘇州刺史賜金紫移汝州兼御史中丞又遷同州充本州防禦長春宮使後被足疾改太子賓客分司東都又改秘書監分司一年加檢校禮部尚書兼太子賓客行年七十有一身病之日自為銘曰不夭不賤天之祺兮重屯累厄數之奇兮天與所長不使施兮人或加訕心無疵兮寢於北牖盡所期兮葬近大墓如生時兮魂無不之庸詎知兮維元和十五年歲次庚子正月戊戌朔日孤子劉禹錫銜哀扶力謹遣所使黃孟萇具清酌庶羞之奠敬祭於亡友柳君之靈嗚呼子厚我有一言君其聞否惟君平昔聰明絕人今雖化去夫豈無物意君所死乃形質耳魂氣何托聽予哀辭嗚呼痛哉嗟予不天甫遭閔凶未離所部三使來弔憂我衰病諭以苦言情深禮至款密重複期以中路更申願言途次衡陽云有柳使謂復前約忽承訃書驚號大叫如得狂病良久問故百哀攻中涕洟迸落魂魄震越伸紙窮竟得君遺書絕絃之音悽愴徹骨初托遺嗣知其不孤末言歸輤從祔先域凡此數事職在吾徒永言素交索居多遠鄂渚差近表臣分深想其聞訃必勇於義巳命所使持書徑行友道尚終當必加厚退之承命改牧宜陽亦馳一函候於便道勒石垂後屬於伊人安平宣英會有還使悉已如禮形於其書嗚呼子厚此是何事朋友凋落從古所悲不圖此言乃為君發自君失意沈伏遠郡近遇國士方伸眉頭亦見遺草恭辤舊府志氣相感必踰常倫顧予負釁營奉方重猶冀前路望君銘旌古之達人朋友則服今有所厭其禮莫申朝晡臨後出就別次南望桂水哭我故人孰云宿草此慟何極嗚呼子厚卿真死矣終我此生無相見矣何人不達使君終否何人不老使君夭死皇天后土胡寧忍此知悲無益奈恨無已君之不聞予心不理含酸執筆輒復中止誓使周六同於己子魂兮來思知我深旨嗚呼哀哉尚饗嗚呼自君之沒行已八月每一念至忽忽猶疑今以喪來使我臨哭安知世上真有此事既不可贖翻哀獨生嗚呼出人之才竟無施為炯炯之氣戢於一木形與人等今既如斯識與人殊今復何託生有高名沒為眾悲異服同志異音同歡唯我之哭非弔非傷來與君言不成言哭千哀萬恨寄以一聲唯識真者乃相知耳庶幾儻言君儻聞乎嗚呼哀哉君有遺美其事多梗桂林舊府感激生持俾君內弟得以義勝平昔所念今則無違旅魂克歸崔生實主幼稺甬上故人撫之敦詩退之各展其分安平來賵禮成而歸其他赴告咸復於素一以誠告君儻聞乎嗚呼痛哉君為已矣予為苟生何以言別長號數聲冀乎異日展我哀誠嗚呼痛哉尚饗嗚呼至人以在生為傳舍以軒冕為儻來達於理者未嘗惑此昔予與君論之詳熟孔氏四科罕能相備惟公特立秀出幾於全器才之何豐運之何否大川未濟乃失巨艦長途始半而喪良驥縉紳之倫孰不墮淚昔者與君交臂相得一言一笑未始有極馳聲日下騖名天衢射策差池高科齊驅攜手書殿分曹藍曲心志諧同追歡相續或秋月銜觴或春日馳轂甸服載朞同升憲府察視之烈斯焉接武君遷外郎予侍內闈出處雖閒音塵不虧勢變時移遭罹多故中復賜環上京良遇曾不踰月君又即路遠持郡符柳江之壖居陋行道疲人歌焉予來夏口忽復三年離索則久音貺屢傳篋盈草隸架滿文篇鍾索繼美班揚差肩賈誼賦鵩屈原問天自古有死奚論後先痛君未老美志莫宣邅回世路奄忽下泉嗚呼哀哉令妻早謝稺子四歲天喪斯文而君永逝翩翩丹旐來自遐裔聞君旅櫬既及岳陽寢門一慟貫裂衷腸執紼禮乖出疆路阻故人奠觴莫克親舉馳神假夢冀獲寤語平生密懷願君遣吐遺孤之才與不才敢同己子之相許嗚呼哀哉尚饗高山無窮太華削成人文無窮夫子挺生典訓為徒百家抗行當時勍者皆出其下古人中求為敵蓋寡貞元之中帝鼓薰琴奕奕金馬文章如林君自幽谷升於高岑鸞鳳一鳴蜩螗革音手持文柄高視寰海權衡低昂瞻我所在三十餘年聲名塞天公鼎侯碑志隧表阡一字之價輦金如山權豪來侮人虎我鼠然諾洞開人金我土親親尚舊宜其壽考天人之學可與論道二者不至至者其誰豈天與人好惡背馳昔遇夫子聰明勇奮常操利刃開我混沌子長在筆予長在論持矛舉楯卒不能困時惟子厚竄言其間贊詞愉愉固非顏顏磅礡上下羲農以還會於有極服之無言闕岐山威鳳不復鳴華亭別鶴中夜驚畏簡書兮拘印綬思臨慟兮志莫就生芻一束酒一杯故人故人歆此來維大和四年月日禮部郎中集賢殿直學士劉禹錫謹以清酌之奠敬祭於故相國山南西道節度使贈司空李公之靈嗚呼龜靈而刳龍知而屠古今同之天不可呼公之挺生德與位并如瞻日月豈贊其明何以致之姑話平生追懷周旋彌四十年射策校文接武聯翩甸服同邑明庭比肩公乘迅飆凌厲非烟愚觸駭機迸落深泉一持化權一謫海壖本同末異如矢別弦雲龍井蛙勢不相見二紀迴泊一朝會面公為故相愚似悲翁契濶相遇淒涼萬重復以郎吏交歡上公披襟道舊劇談小酒清洛泛舟鑿龍攜手公入西關愚亦徵還削去苛禮招邀清閒廣陌聯鑣高臺看山尋春適野醉舞花閒忽復登壇總戎於外子午危棧巴梁古岸夷風傖儜獽俗惶害陰謀密備兇黨千輩如嗾㣥犬以逼騶虞如縱炎火以焚瑾瑜時耶命耶不慮不圖物理神道安知有無嗚呼痛哉元天甚高上訴何時長夜無曉斯焉永歸風凄日昏鼓咽簫悲沈埋玉樹誰不霑衣平生故人零落已稀委化而盡然猶怨咨如何國禎有此遭罹挺災賦命孰主張之有肴在筵有酒盈巵神其來歆已矣長辭尚饗維大和四年月日某官等敬祭於故相國贈太尉太原王公之靈嗚呼天以和氣鍾於貴人含光不曜煦物如春發自貢士驟為廷臣鴻鴈聯行其淩青雲既操利權兼秉國鈞食祿甚厚奉身如貧井絡之隅益部為大斗牛之下揚州繁會受社臨戎油幢曲葢印綬重謺恩華滂霈簿領如山處之若閒搉筦之權往而復還炎炎暐暐出入二紀未曾傷神屢有薦士急難友弟謹厚訓子顏間熙熙不形慍喜處己無咎得君如此若木方高商飆歘起三台之氣變現在時五福之來盛衰有期曉下黃閤車騎威遲夕歸華堂言笑嘻怡詰朝愀然有志求醫未撤琴瑟俄懸素旂宸衷震悼朝右悽悲詔下襃崇恩殊等夷靈輀既駕真宅將歸笳簫咽而復揚風日慘而無輝元亮等或早挹清塵或晚承泛愛昔修禮於門閫今纏悲於祖載幽顯雖異音徽未昧神之格思歆此誠酹尚饗四年月日特進守司空兼門下侍郎平章事裴度謹以清酌少牢之奠敬祭於故相國魏郡公之靈嗚呼玉貞而折不能瓦合鸞鍛而萎不同雞㣥生兮若浮守道不屈惟公之生福自維嵩金石高韻珪璋德容元和之初左右憲宗以才視草以望登庸振起直聲激揚清風實有正氣號為名公名成身退猶係人望入為羽儀出領藩方既師百辟又副丞相道冠搢紳事參翼亮某與公遊四十餘年風期合契祿位相先某忝司言公持化權應同宮徵馥若蘭荃猥以姓名稱於上前發迹從微芳闕獲宣某為免相待罪梁山公拜右揆來從東川極其歡娛著在詩篇某忝三入公東亦還里門相邇賓閤常閒退朝休澣道舊開顏嗟呼山川間之忽在旦夕豈意倉卒遂成今昔衣冠喪氣風物含戚強魂訴天冤血成碧嗚呼哀哉某在病中訃書始至無力以哭不言垂淚今聞裧輤首路而歸隱几臨風其心孔悲嘉肴百籩旨酒一巵寄此情素神其來思嗚呼哀哉維大和六年月日蘇州刺史劉禹錫謹以清酌之奠敬祭於故福建團練使桂公之靈鵾化鵬征擘波沖天士逢其時捨笈乘軒始識尚書貞元季年詣我南省褎文一編便坐接語其容溫然星歲未幾鄙夫南遷滯留江湘魚鳥周旋尚書遇知變化如蟬秉憲朝右剖符江壖交趾化行容州績宣凡曰循吏莫居我先大和之初再遂良覿分務東洛門里同陌予復郎位公為賓客蔚然貴臣綬紫鬚白俄俱西還列於清班來訪書殿登樓看山見領八屯循街九關賀遷閩越紅旆雙殷克有淑聲搢紳之間惸嫠鼓舞強悍低跧延平古津峭壁孱顏豈意龍劍沈晶不還復魄侯堂歸舟建浦雙表何在虎邱之下恭承嘉命來牧吾土言念昔遊忽成千古哀哉孝嗣率禮無違言奉几席歸乎洛師敬陳奠筵泣對靈帷平生不忘歆此一巵嗚呼哀哉維大和六年月日蘇州刺史劉禹錫謹遣軍吏某乙具少牢清酌之奠敬祭於故虢州楊公之靈嗚呼利劍多缺真玉喜折俊人不壽為氣所齧子之少孤率性自然早有名字結交世賢席勢馳聲龍秋鳥仚試文再售毛翮愈鮮歷佐侯藩拾遺君前伏閤論事侵及內權克揚直聲不慍左遷一斥於外君門邈然五剖竹符皆有聲績南湘潛化巴人啞啞比陽布和戰地盡闢壽春武斷姦吏奪魄榮波砥平士庶同適朝典陟明俾臨本州錫以貴綬腰金晝遊輿疾而來風烟為愁靜治三載臥分主憂直氣潛銷頹几不留九天難問萬國同休嗚呼惜哉與君交歡已過三紀維私之愛與眾無比乃命長嗣為君半子誰無外姻君實知已昔與君遊俱為壯年怒人言命笑人言天閱事未多信書太堅方階尺木已墜九泉誦年易深潛病難痊不見南楚方知北軒嗚呼嗟哉見幾不早追悔已晚猶希苟老容或宣展以閑相期以晦相勉一邱可樂萬累皆遣翫圖散秩婆娑京輦天命不長願言莫展嗚呼痛哉君臥宏農予來姑蘇飛書相約言念鼎湖我車載脂為子疾驅入境閴寂唯逢素書發函驚視翰不自濡相去一舍豈無肩輿君為病嬰我為吏拘兩不如意嗟哉命夫君今往矣無復可道我今泛然一委元造平生親友零落太早無望拔茅盡悲宿草到郡浹辰君不起聞寢門一慟我哀如焚彭彭輤車來葬洛濱敬修賻禮泣送行人萬夫之羞薦君明魂三赤之板寫予哀文淒涼山河慘淡風雲已矣長別嗟我楊君
