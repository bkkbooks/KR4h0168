front:
  text: 全唐文欽定全唐文卷八百九司空圖三
  hash: sha256:fd4b515ec592228a794d0ab6a53d518a04712afc78cf65103f83a8afd0a93148
body:
  text: 經曰天王使來求金又曰求車豈天王之使私有求於魯耶不然傳聞之誤耳若諸侯之使來求金則謂求可矣若致天子之命徵於諸侯其可謂之求耶且率土之人與其貨殖皆一人之所有父之材守於其子則用否莫不恭命其可謂之求乎春秋之旨尊君卑臣豈聖人為魯不為周耶書云天王狩於河陽尚為晉侯諱召天子豈可不為周諱其過哉縱天子制用失節多取於諸侯而欲垂誡即書於周史可矣若書於諸侯之史是吝吝其貨而侮王命也王祭亦不供矣必非聖人之文也必若王人責其稽命曷不書曰天王使某責貢金儻以取金為不文曷不曰天王使某來徵貢金亦譏在其中矣以是愚疑仲尼書天王使來求金是使私自求而懲之也不然求與責文或相近傳寫之誤焉不爾何子夏之徒不能措一言哉捨此而譏訶皆小小者耳愚為詩為文一也所務得諸己而已未嘗托拾前賢之謬誤然為儒證道又不可皆無也嘗得柳子厚封建論以為三王樹置蓋勢使之然又有是萇宏之辨意其多於救時今夏縣穀郤自淮南緘所著新文而至愚雅以孫文不尚辭待之頗易及見其卜年論又聳然加敬鍾陵秀士陳用拙出其宗人嶽所作春秋折衷論數十篇贍博精緻足以下視兩漢迂儒矣因激剛腸有詆經之說亦疑經文誤耳蓋亟於時病言或不得其中亦欲鼓陳君之鋭氣當有以復於我耳時光化中興二年駕在石門年秋八月愚自關畿竄浙上所著歌詩纍年首題於屋壁且入前集壬戌春復自亶山至此目敗痁作火土二曜叶力攻凌可知矣冒沒已多幸無大愧固非賫恨而有作也尚慮道魁釋酋見之慊然於我者蓋自此集雜言實病於負氣亦猶小星將墜則芒焰驟作且有聲曳其後而可駭者撐霆裂月挾之而共肆其憤固不能自戢耳今之云云况恃白首無復顧藉然後知賢英能客出肺肝以示千載亦當不免斯纍豈遽咄咄耶知非子述自昔貞期不爽逸軌難留堯天大而必容豈獨追往漢道亨而必至終亦超然未足濟時且資激俗宜經商略乃稱搜揚若某者孤立多虞衰年謝病因耕巖而自給非欲販山知在木而無堪便當為社莫敢張皇邱壑擬議巢由且自詔求賢多因肆眚蓋乘運泰莫顧才難今上哲御臨元勳振服英衮贊翹勤之旨幽人荷旌賁之恩雖云例追亦謂優禮但巳伸拜闕况畢懸車冀修知難之規免冒饞榮之誚昔江表則賦詩而褒孔令漢廷則出餞而寵疏翁特振孤芳實標勝事今也龍門回望鶴蓋交馳落日琴尊前朝圖畫想家山之醉石認客處之漁舟白首歸心黃花緣路來時不下漂零海上之鷗去兮自憐放曠人間之世斯乃僅能忘怨庶可息機敢慕高風猥煩衆作詩家此會誰邀清夜之遊仙裝不回別有白雲之集徒攀逸唱益愧餒才名利之機古今相軋混惟一致宏則兩忘或高視于掞天或雄張于擊水捨麟作鳳孰降等夷捐璧握珠自能輝映遇則以身行道窮則見志于言各擅英靈寧甘頓挫自昭明妙選振起斯文榮雖著于方將恨皆廠田坴于既往當西施之玩鏡不賞娥眉豈伯樂之停車空收駿骨乃使盛時才子翻銜泣玉之寃異代沈魂祇擲凌雲之譽九原誰詫千載徒懸思格前規用伸來者至若金犀照灼紈綺追攀裕之則管樂通期峻之則彭韓絶倒人人驥路雲臺之此日豪華處處鸞叢仙館則當時寥落各銘鐘鼎競煥緹油恥發譽于雕蟲肯爭英于墨客世上之九霄梯級縱阻爭先機中之五色烟霞無妨倍價知音默已作者誰尢思慰窮津用徵逸藻想其黎黃洞奏錦繡畢陳涵經天緯地之源胸襟萬象驕晤月吟風之態嵩華一毫固當觸興牢籠忘情蒂芥况牙絃入契郢握稱珍欣傳賞奏之徵免茹投光之嘆固已翹心不朽撫掌浮雲操奇而角富驪泉炫采而誇勍魚域夫著言紀事在演致于全篇賦象緣情或標工于偶句雖豹文必備方成隱霧之姿而翠羽已零猶稱凌波之玩誠欲兼搜于筆海亦當間掇于蘭叢人不陋今才惟振滯韻笙簧于騷雅資粉澤于風流事竊推公蓋止交游之內僭將罪我益知褒採之難題以擢英庶能聳聽有唐儀曹外吏司空圖夫垂象著文炳靈叶爽亶流宗于筆海則時仰龜龍駭掞藻于天庭則國資雲雨至若金羈角勢錦字爭妍兼吞漢魏之雄迥跨風騷之域宏材獨振何代無奇愍征則會昌中進士盧獻卿著明所作華胄間生冠五百年高視靈璣在握照十二乘非珍馭縱壑以濤驚竦驅崦而電軼懇超言象特映古今而妬阻揚娥妖輕笑鳳惜歲華之易晚嗟桂魄之期舊國蟬催縈盈別怨芳時鴈度浩蕩羈愁想去郢以抽毫悵征秦而寓旨鏘洋在聽梗概可陳觀其才情之旖旎也有若霞陳鮮金縷晴天鴛塘匣碧天容曙拆濃艷思芳瓊樓詫粧煙霏晚媚鮫鮹拂翠其雅調之清越也有若縹眇鸞鴻翩翻媚空瑤簧凄戾羽謦玲瓏幽人嘯月雜佩敲風其遒逸之壯麗也則若雲鵬回舉勢陷天宇鰲抃滄溟蓬瀛倒舞百戰交鋒雄稜一鼓其寓詞之哀怨也復若血凝蜀魄猿斷巫峯咽水警夜寃鬱靄空日魂慘淡鬼哭荒叢其變態之無窮也則若月弔邊秋旅恨悠悠湘南地古清輝處處花映秦人玉洞扃春澄流練直渺然自極斯蓋緣情紛狀觸興冥搜回景物之盛衰制人臣之哀樂窮微盡美闕古排今自體變江南氣凌鄴下莫分工拙詎可仰揚競耘寂以搜奇則恩榮飛動徒牽庸而綴學則格滯沈埋唯彼邀能是稱入巧泛鋪輕綺弄縱闕雅律之未裁八音叶暢類非煙之不染五色相鮮闕絶于長華淮芳鎮留于千古況愚通家著分總角忘年衆中則韻仰神仙席上則價饒鸚鵡破琴傷逝無復知音夢筆摛祥頻驚借彩佇談交之可作嘆寶鍔之徒懸猶幸斯文備存遺跡闕符增感涕下何從昔兩漢辨騷方聞注釋三都待引即扣賢豪寄測妙以騰褒屬當仁于命世豈伊孤陋合遽討論將研旨遠之機已盡汲深之力附修名而不朽量璅慧以多慙粗折指歸難酬顧遇衒微明于合璧敢議爭英洞節奏于璇宮竊期攀嚮武宣之間籍顯地者雖無如梁韓數公以雅實自任而能振拔後進然士大夫宴遊之倦猶或時道文學以佽助執事者而盧君尚以攙擯致憤於纍千百言亦猶虎之餌毒蛟之飲鏃其作也雖震邱林鼓溟漲不能決其咆怒之氣且科爵之設是多得於彼而少喪於此侈其虛而歉其實彼或充然自喜而又以拱默相持曾不知日月沒於晷刻之間蠅翔而螢腐耳然則著明幸於廾默而能以愍征爭勍於千載之下吾知彼之作者有嘔血不能逮之者矣其所得何如於彼哉且上至聖哲下至豪特之士得於文學者多矣豈以一靈運之狂而可沮辱天下之奇偉哉况面牆而悖謬者何翅於此耶愚前述雖巳恣道其遒壯悽豔矣而終不能掩其方外之致以是擲筆狂呌寄之他生又嘗著濯纓引以雪詞人之憤其旨亦屬於盧君且凡稟精爽之氣是或有智謀超出㣥輩一旦憤抑肆其筆舌亦猶武人逞怒於鋒刃也俾其無所控告驅於讐敵必貽國家之患矣然則據權而蔽善者得不常以此危慮哉蓋聞變可揣機明難辨勢金石之懸已叩孰謂識微風雲之候未形罕知能制是以連兵百萬雖稱蓋代之雄間道三千誰悟入神之義蓋聞中和所賦植性自馴孰為之而曰鳳孰為之而曰麟翔必以時肯爭名而作怪動惟中矩寧受嗾以噬人蓋聞濟世者材存神者道各繫遭逢之運並著抑揚之效是以英豪未生虛傾市駿之金文雅已衰徒有游仙之棹苟慙白首而待聘不若滄洲而寄傲蓋聞達識難窺神明有眹或推之而猶拒或仰之而必進是以釣川釣國入兆則亨從虎從龍乘時自振蓋聞忠可制權則誠能洞感謀推體正則生濟奇功是以輔星連耀於將星則妖星自殞天陳克和於人陳則厚陳皆空蓋聞識資匡欲智必寵愚苟貪榮而入險雖結黨而自孤是以川上不歸皆顧羡魚之網林間已碎難追彈雀之珠蓋聞愧於心者或毀人而掩謗足於己者必獎善而推公是以炫飾求容不悅端居之操優游待聘乃宏交讓之風蓋聞霽日才升於拂曙則蟻穴自開澄川或激於驚波則龍舟莫進何則明於誠而物皆競勸制于彼而我難示信是以至誠未著見非感而不通橫俗無猜知有孚而必順蓋聞紳河礪嶽之盟雖酬戮力翼子貽孫之祚本自推心是以陰德常施忘報而或能濟患危機潛患希時而無救禍淫蓋聞角立爭雄必中乾而自殆乘權逞怨或遁喪而無歸將射鼷而發弩是忿風而焚衣所以傲吏格言先忘情於物我能仁妙旨當遣滯於是非道制治之大器也儒守其器者耳故聖哲之生受任於天不可斫之以就其時仲尼不用於戰國致其道於孟荀而傳焉得於漢成四百之祚五胡繼亂極於周齊天其或者生文中子以致聖人之用得衆賢而廓之以俟我唐亦天命也故房衛數公皆為其徒恢文武之道以濟貞觀治平之盛今三百年矣宜其碑聖恢之柄授必有施臣底之績濟亦厥時子惟善守賦而不私克輔於我貞觀休明之期夫披圖著象即亘長垣裂壤奠居必扃峻閥雖四鄰之可恃在百雉之難窺然而事有弛張得時而後顯功無巨細得人而後施今見之于解城矣我皇帝之御宇也纍聖勤求登賢致乂鑿乾締搆允歸睿作之功壽國陶融必有挺生之佐式扶昌運對越上元皇帝體睿哲之機延統和之祚高視無外旁羅不遺洪水安瀾格茲穹壤明廷委瑞分映古今肅清廟之威靈竭大臣之忠力雖鍾災會益振英圖係在知人念茲活國內則臯夔叶贊外則方召專征克著廟謨且貞師律其有兼膺注意宜屬宏材正柱石于洪基感風雲於冥數蓋祥發神授佑我昌期斯人見之于蒲帥司徒王公矣西爽炳靈中條會秀致用則牢籠三傑圖功則擬議一匡受寄股肱僉諧夢卜遇帝車出狩天邑廠田坴兵鄧禹則封拜關中方之未重寇恂則撫綏河內比此寧艱輟外師之稔謀導鄰藩之叶舉于是使星遠降詔命始通瞻日月而惟新覺山河之自固人祇洞感軍旅益雄但既逼寇仇且當津要車徒遝至竟赴齊盟戎夏駿驅共匡京室慮風回于原燎竭日費于雲屯輯睦允諧克贍棟闕持廣厦鼎鎮厚坤始以一城之危抗移國之盜竟以數郡之力壯勤王之師勳復舊都慶延殊渥盛矣哉傳曰德刑具舉武之經也農戰交修政之本也總是數者方為全美此府自大歷貞元之隆郭公渾公繼臨雖博厚粹和本朝實賴而儉德異政舊史闕然公洞識古今兼資文武宏以濟物而恕必探情明以照奸而殺惟制亂人皆知恥道不拾遺視禮法之率由信恩威之並濟猶以為備則無患志在格言安則懷生命于善教是資蔽惡有待必攻晉人之固護河南齊將之經營汾北雖謀非善守難嬰戰角之晨而利有必爭宜保馬頭之險由是公之初蒞鎮也即以此地北綿汾晉西逼界秦造隴而雖貫復關壓境而匪憑高壘時當無事則雞犬混并運屬有戎則豺狼密邇浮罌或渡縈帶是虞遂創新規驟成堅壘挾洪荒而作固屹斷岸以高臨事等振喉勢同捍首豈比平原伐隴自標威寇之名斛律侵周別建定夷之號及城陷馮翊西面益孤烽舉隰州北軍方至遷延未測偵諜相搖日有風傳士無人色賴我關防夾峙津戍旁通杜兩岸之金湯堅衆心之鐵石共增聲勢得以枝梧既納款于帥臣仍撫安其新附交獲利濟並致成功不然所恃長川亦當奪險矣而又以解因沃饒之潤置榷貨之司官帑委輸商徒繁會雲連里閈山峙資財絃歌詎稱于武城錦繡慙誇于襄邑貫天錢而下積已應星文認寶氣而旁瞻非惟劍氣所患者素無城守難固人心微有警于烟氛遽深藏于林鸛孰懲誨盜克讓周防振古所遺非公莫集既總兩河之務值多事之秋檢吏通商機能制用矯時阜俗儉以率先凡立科條皆能刻勵五使雖優于兼俸一毫不潤于私家用給工徒遂興板築精擇主將得張郁時官聚軍讐市搖物估欲因賦役亦以賑饑夫事貴研深所以見于未兆人難慮始所以樂于視成初公密計地宜且稽農隙裁其經緯授以規繩吏既克勤期不素自中和二年冬十月奏請興役至明年夏六月凡計工五十萬城高三丈周繞九里一百六十步隍刳濬洫堞冠層樓外創犒軍之營內修禦敵之具觀其地縈壯址雲鬱平川擁形勢而增嚴屏要衝而莫犯歸師遠跡忘自意于窺覦匝境罷扃亦寧虞于奔竄其他緝飾悉叶機宜公旋陟上台懇辭劇務咸欣庇賴益著詠歌遂乞飛章願刊殊績以圖同庥樂土見託蕪詞榷鹽使韋雍檢律在公巡官王慤琢磨效用與植將及商人等聯狀同詣所居瀝懇至于垂涕竊惟自古恢揚盛業激贊宏圖朝則帶礪傳盟家則盤盂著誓必資麟筆共振鯨鐘雖代積崢嶸而聲稜悠久滄溟鼇抃日觀可危片石螭銜雲臺永峙將貽終古實在斯文雅非振藻之工敢狥披丹之款榷鹽使崔贊溫恭奉上感勵知催勘使王能遵妙簡宸衷喜成王事並以磨礱已久結搆仍崇靡知局地之誠遽有聞天之請名微墨客短才本謝于徼能事僭詞臣牢讓豈申於恭命且禁暴曰治濟衆曰仁以此視其為誠足以知其為政衆惟同仰暴莫可凌彼或蔽捍邊荒繕修保障猶誇溢美顯示將來况數仞聳威近函陜右一方增氣旁帶關河儲國用于無虞息人勞于永逸寵傳褒詔喜動鄰封方屬沈帛丿糸難辭紀述與崇墉而並揭豈深谷之我遷式備昭功靡慚托實銘云蒲乃國樞僉惟天作挾魏控秦佩河冠嶽蒲屏是雄勳賢是託孰膺帝俞克振王略上哲倚注元臣激揚干霄作鎮跨海為梁令無不肅謀無不臧擢彼新壘屹然巨防川廣可踰山高可轢曷以善閉必資全策城隍增嚴晨驚夕惕利害斯覩天懸壤隔解寶近鹽貨則兼贏車喧咽軋戶侈連甍財雄擅響鼎食提衡三河競湊六輔皆傾內貫通莊外無固圉易戒致戎書警納侮或駭一呼難施九拒雖有棟榱誰庇風雨傳褒命日詩美維翰長空嶽聳厚地雲蟠俸能兼濟衆得懷安聖衷乃眷茂跡宜刊兆叶人謀機先神授虞於不虞守其必守峻亦不夷堅亦不朽唯此殊功翊之克久臣聞天示武而太白不滅地育材而雄金自生高臨鑠彗孛之妖並用蓄干戈之鋭雖域中治定元功載洽于人祇而閫外抗棱睿略必當于弔伐是以荊蠻作戾周稱克捷之謀越貊稽誅漢用討平之策馳雷霆而飾怒義在勝殘命貔虎以濯征吾非樂戰皇上之御宇也知幾作聖抱道凝神蕩千古而獨駕雄圖掩八紘而宏開壽域撫百年之昌運數屬延洪欽下武之耿光德膺丕顯心貽元極道契衢樽金椎震有截之威玉鏡洞無私之照蒸雲涵潤決天閫以滂流擊壤登歌嬉春臺而自樂故得氤氳叶慶動植駢休丹蕖則寶露凝芳瑤闕則霏煙泛彩方欲停旒高視仰至道於華胥輯瑞標虔著成功于日觀綿㝢隸必封之俗窮荒輸稟朔之心鳳樂方陳翾企競先于率舞鯨潭不讓潢污自絶于朝宗逖矣荒陬蠢茲夷孽拒昆池而塹境縈瘴海以疏鄰巂穴前瞻地勢乃遙分八角孱陵却阻星躔則下燭五溪競蠆毒于蜂宗扇梟音于鳥俗頃亦瞻雲薦祉幕重譯以朝周削衽移珍諷三章而頌漢金印示殊藩之寵銀簪增服冕之榮方育德以羈縻竟憑驕而背誕窺華飾僭吠喧槃瓠之鄉負險挺妖舋結沈黎之黨琅川大擾洞界橫侵妖徒之勇氣干霄都護之窮兵竄谷干艘蹙浪蘭津之戍火宵明萬里驚塵梅嶺之人烟晝斷舉旄何暇猶申扣馬之忠曳踵誰觀莫救跕鳶之沴既而城夷交址纍陷功門飛馹駟以聞天決神機而起劍腐儒橫議請罷守于珠崖賢相拔奇命啓行于黑水於是鑿門受律仗鉞忘家宸衷輟旰食之憂壯士德橫行之志豈獨英籌獨運猶咨平越之庸妙略遐宣乃逮伏波之號聲光載路勢激疾雷下五嶺而震金鉦沿三江而飛鐵軸中權令峻按虎節以風生上將策奇指龍編而天落賊將朱道古等傾巢奔命負固偷安塞合浦以連奇亘同勞而結祲雕題誓衆猶疑黑穴之神鑿齒窮凶豈直青邱之暴尚以哲王濟治先德後刑大聖兢懷好生惡殺韜戈制勝舞舜戚于兩階弭節昭宣縱湯仁之一面諭其歸首霈以鴻私姑停斃獸之機顯誓輸龍之信守迷崇亂更宣蚊蚋之㣥觸禍乘危猶幕蛛蝥之網元戎然後抑揚英武嘯咤風雲援旗而激憤衝星狥國而抽誠駕日幾神洞妙熊韜豹略之權舞電威稜越騎燕犀之象于是營開戇石陳壓糜泠前軍則浴鐵爭登後拒則跳刀鼓勇宣聲駭宇怯鰲柱之傾維壞氣橫堤晦鴻雲之寢耀我旅力振凶徒大崩動必冰摧疾如彗掃驚濤沓鼓喧豗而獸檻爭奔烈焰掀天埃鬱而虹梁忽斷駭修鱗之決網軋纍卵于排山七擒攄必勝之能九變逞無前之鋭伏尸百萬未窮追北之師廓地三千豈獨安南之境始者以朝廷專征重寄騁績遐方慮切均勞謀當易帥軍符未契猶懷稔寇之慙詔命將臨俄有麾城之捷遽收宸渙仍降優恩重委緝綏更恢經略傷夷盡復爰申借寇之誠旅拒頻梟寧止登嘉之獻朱鳶再緝彩雉還嬰宣聖澤以懷柔道和風而煦育誅榛剃梗肆望樂郊撲魅驅狸潛銷沴氣農商並勸食力兼儲軍雄而蹀駿嘶風劍褫而蟠蛟吼匣凶渠假息屢驚喪膽之魂王旅騰裝更俟指期之舉投機扼險委徑待時幸席卷之可乘永清丹徼匪鞭長之可及焉用石田昔下瀨徂征寧踰象坂渡瀘掩紀才息蛉川豈同指授長馳披攘右弔沃騰瀾于爝火蕩危葉于衝飈利盡海隅聲稜蜀表中規克運振日捷于丹冥吉語旋聞慶山呼于綺殿匪徒封離授首三十六之種落迎降槃木歸仁六百萬之賨夷向化威懷益著典秩遽加茂績英姿別贊畫麟之寵帶河礪嶽重申白馬之盟自將禮冠于朝倫豈特榮高于策府盛矣哉且四夷華夏千古勞師折衝實在于謀謨委寄惟艱于授受昔之命將繼得其人莫如材為時生祥資世烈感狼星而兆壯煥驪穴以騰英玉帳金壇神授六韜之訣雕戈寶鼎門傳八命之基故能業嗣良方名高異俗撫士樂同于鳬藻伐謀動契于龜蓍麾下從容每投壺而講禮帳中談笑亦披卷以研精必當躍馬橫矛恨征南之不武詞宗學海輕鎮北之無文式是全能允膺注意故得勍吞敵國勢峙長城廟算遐敷家聲克裕三川底定粲青史于元和九郡肅齊著洪勳于盛際元和中杜公黃裳舉僕射崇文平蜀今相國夏侯公用安南公駢遂復交址故地恭惟燕翼之謀自契君臣之美幽陰雪憤竦七廟之靈誅氛雺廓清彰一人之聖武中外禔福飛沈載揚韋帶諸生鋌鎔賤質早負徼能之志曾無騁力之期有慚于鬻衒明廷欲希橫革非所以煥揚休烈未始抽毫竊抃神功猶增懦氣鹿鳴登薦小臣無補于頌歌龍德飛榮大國必資于雲雨昔牢夷勦定漢紀崇勳林邑克平隋刊盛績將欲耀聲明之遠暢詫轍跡以無窮輕叨言剪材仰騰茂實庶雕豐麗德卓穹厚而長存瑩儉圖功示威靈之無外載惟荒燝遂揭穹碑銘曰珠躔映運鼎業鑿乾麟銜瑞紀鳳舞昌年層瀾浩注景祚遐延光凝寶篋慶藹祥編上哲繼文皇圖增煥得一踐羲登三轢漢懿網牢籠大爐貞觀宗社還資徽明接旦雲腴洞潤月窟皆傾鉤山就日截海來庭琛羅翠羽賮委香瓊旁魄萬有駿奔百靈乃眷荒夷獨迷元造虺毒潛萌狼心益驁祲激焦煙塵埋瘴嶠敷命講材式資窮討袀服將授暢轂斯臻肅拜清廟時維寶臣熊旗日浴貝胄星陳機懸玉弩彗迸金鱗申命長驅指麾橫厲崿崿鷹瞬稜稜虎視懿峩山連師禺裔視險必夷屠堅若脆元戈增耀赤憤憑凶鋒攢睥睨火迸艨艟天聲下震神將沈雄高牙爰指厚陳皆空吒咤虹攄騰凌電掃動若摧枯勢踰穿縞血浪噴溟顱山亘島沴卷一隅霞披四表我武既張我威載揚克剪違命乃恢舊疆上帝寵錫元戎休光允茲壯烈有耀㣥芳遺孽偷魂數將盡滅魚窮爨鼎蟻懼搜穴用警殊倫斯為還轍勒頌海垠式昭天伐公諱渥字子章范陽人盧氏出于齊齊之始祖以姬周克享于仁乃佐文武定天下弛刑之後其裔孫又能以大義匡奉且救諸侯之患宜其百代昌盛矣及拓跋陷幽冀之域士人之整飭官姻不失其舊者推于周黨所為甲門高齊恩通公為黃門遠公八世祖曾祖某官祖某官皆以德義顯本朝先公諱某兼以儒術吏治歷仕終某州刺史娶清河夫人生公公植德秉仁而識致遠大濟之強學發為文章故未就鄉學舉則時輩後生皆以為傑出雖文場迂滯然時者亦歷指要顯不敢徒以負地待之會府方重首薦公為主試者所強舉子未效其業於主師則踵門投贄者已數百輩時宣宗鋭意文治白衣稍出流類亦往往上門故公中選甲科籍則待制名臣亦以得人為賀皆為儒風隆替當係于公纍辟諸侯府亦以公去就為輕重御史丞將選僚屬遞相告約才及升班之限臺命已行太夫人在洛乞以散秩就養拜國子博士分務殆十年公議所迫遷侍御史專領東臺之務徵起居轉司封員外知雜事正色讜言舉劾不撓遷司勳郎中時宰所忌出倅宣武軍以緩之未更歲入為某曹郎遷拜萬年令大京兆每引見必優禮言則規稟諸曹請事若奉嚴師其政可知也誥命極選所以內訓百辟外訓四方元和中若韓李二文公裴晉公令狐相國元白李淮南聯處內外之制任征伐約束佽助大朝其後取人多以時望望勝則人以地優用輕則才以勢軋兼而不怍乃屬于公拜某官知制誥每涉委廉則堂列聳眙宰相詳議大政亦俟入直乃行前後六年編録盈笥實一時之典則也丁內憂哀毀逾禮士大夫莫不感傷免喪拜陝虢觀察使兼御史中丞前涖是邦或出禁侶恇畏內臣護軍劉重美黨類豪侈傲視廉使士冖䂞奸黷貨得以自專及公至鎮待之有制重美雖漸斂束故態未鋤公舉其壞政之甚者面數以挫其鋒氣卒俯首受教權不外奪教人自蘇息矣遇江嶺宿兵邊戍乏食滑州軍奮臂標回開折天侶及驟至墻下吏士縮栗皆請閉關拒守公曰彼凍餒所迫未聞肆毒吾因而撫之冀其返善若首唱其惡彼畏彰聞則懷疑蜂潰矣廷議力未能制且當遏其所歸奈何反開門具餼勞召主將親諭之果遽感悟而東逮出境人無罹其患噫古所謂仁勇難哉其他惠愛廉平猶可徵諸故老初公報政當陟且懸文柄之命權幸所沮事未克行及此傳聞中外推敬故宰職得伸其所志冬十月拜禮部侍郎㣥輩之躁聚勢門欲以浮論籠駕主司者迎自咎其牙角洎入貢署才引明經則美稱已譁于外議遇大駕南幸乃中輟人至今惜之明年春自都潛出二月至中條舍于幕吏司空圖被疾浹旬方至洛由漢陰詣蜀舟行迂滯尚以後至授國子祭酒公論逾鬱拜御史丞兼左丞柬拔端良風威益振駕回未幾又徒步扈從于寶雞至褒中歧蜀阻兵食俱困主相深念計無所施乃拜公戶部尚書領興元留事知節度使事焚剽之後百姓逃竄公躬自招撫且徵賦食山氓相勉貢輸軍聲大振時議以為蕭何大勳實非公不濟上每斂容優異許以入輔者數矣公堅讓乞退至京尚以檢校司空太常卿疇庸遷尚書右僕射自古澄汰稍厲多礙于時苟訾失實則受制㣥黨驅之仇敵反為國病矣公謂軌律在已足以正人未嘗惑愛憎之言遽出升黜而尢者自去明恕以彰又古所謂得大臣之體者乎仁哉纍授保傅尋以檢校司徒致仕從堅請也大駕移幸公自華至洛天祐二年九月十日寢疾薨于長壽佛宇享年八十六嗣王輟朝贈某官諡曰某噫古之碩賢或享高位上壽蓋尸其柄者時顯至公以警于昭幽俾為善者不悔耳公孝于家勤于國宜于人既于是而報應又如此果使後之追企者唯恐不逮以邀福於神明然則善人之化于人雖沒世而彌彰矣且家邦將盛必有所繄蓋感致之效當究其源耳初公既屬文太夫人知其友愛諸弟且命相敦誘故諸弟子亦能相師稟就其所業及公中第即又孜孜指導進取果歲繼捷皆籍於顯地祿養之榮孝敬之美一時罕及也推是而言則詩所謂施于兄弟至于家邦公宜與聖人之徒亘百代而合契美哉公介弟尚書公紹尢檢剋亦能率其子弟俾幼無違者仲弟治考功郎中季弟沈右補闕從事洛都留守府蓋雅族積祐有以保持公以其年十月某日附葬于緱氏某鄉某里禮也夫人姑臧君李氏柔順明淑叶公慈恤內外孤婺賴之獲濟先公而終孤刑部侍郎膺實惟冡嗣敏材慎行而囂競不能入弟賡左補闕整整唯謹目為令人有以見綿祚無窮也自昔負大名擁大望苟無其實必若負重而趨雖非有力者擠之亦當自蹶矣宣懿之際士類方競其間與公別著親友之分者崱崱當世止有數賢皆退可革天下之澆風進可效荷天下之大任歿則金石之綴史氏之筆端豈容易而品級哉千載之下必得其人蓋知始無愧耳今年秋八月愚詔追洛拜公牀下明日繼謁蒙手授以詩且有釋氏多言宿分深之句瞪視不言若屬意於紀述默至感悟誓竭菲才况業履謨庸三紀備熟雖有文酋之工亦莫能詳悉然則刊爾信實門人焉得為讓銘曰姜佐宗姬仁移于誼馳及厥裔亦恢四履紉絶扶微益延世祀戰國橫潰獨整士風漢氏之東植顯大宗黃門魁偉州黨所宗逮我太師教義足維出入允宜萬方廷萃珍貺委待公為瑞秉文慎擇列曹驟歷乃訓百辟國事洞疑王旅阻饑惟公是咨冠裳奕奕禮義是則公庸乃陟或道之亨孰喜孰戚華崇之趾吾老如此克躋壽祉皆極報德照彼日星摩地載扃鑱石張銘濟我淑貞勗爾後生
