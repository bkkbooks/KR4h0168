body:
  text: 貞元十一年五月戊辰愈東歸癸酉自潼關出息於河之陰時始去京師有不遇時之歎見行有籠白烏白鸜鵒而西者號於道曰某土之守某官使使者進於天子東西行者皆避路莫敢正目焉因竊自悲幸生天下無事時承先人之遺業不識干戈耒耜攻守耕穫之勤讀書著文自七歲至今凡二十二年其行已不敢有愧於道其間居思念前古當今之故亦僅志其一二大者焉選舉於有司與百十人偕進退曾不得名薦書齒下士於朝以仰望天子之光明今是鳥也惟以羽毛之異非有道德智謀承顧問贊教化者乃反得蒙採擢薦進光耀如此故為賦以自悼且明夫遭時者雖小善必達不遭時者纍善無所容焉其辭曰吾何歸乎吾將既行而後思誠不足以自存苟有食其從之出國門而東騖觸白日之隆景時返顧以流涕念西路之羌永過潼關而坐息窺黃流之奔猛感二鳥之無知方蒙恩而入幸惟進退之殊異增余懷之耿耿彼中心之何嘉徒外飾焉是逞余生命之湮厄曾二鳥之不如汨東西與南北恆十年而不居辱飽食其有數况策名於薦書時所好之為賢庸有謂余之非愚昔殷之高宗得良弻於宵寐孰左右者為之先信天同而神比及時運之未來或兩求而莫致雖家到而戶説祗以招尤而速纍蓋上天之生余亦有期於下地盍求配於古人獨怊悵於無位惟得之而不能乃鬼神之所戲幸年歲之未暮庶無羡於斯類愈既從隴西公平汴州其明年七月有負薪之疾退休於居作復志賦其辭曰居悒悒之無解兮獨長思而永歎豈朝食之不飽兮寧冬裘之不完昔余之既有知兮誠坎軻而艱難當歲行之未復兮從伯氏以南遷凌大江之驚波兮過洞庭之漫漫至曲江而乃息兮逾南紀之連山嗟日月其幾何兮攜孤嫠而北旋值中原之有事兮將就食於江之南始專專於講習兮非古訓為無所用其心窺前靈之逸迹兮超孤舉而幽尋既識路又疾驅兮孰知余力之不任考古人之所佩兮閲時俗之所服忽忘身之不肖兮謂青紫其可拾自知者為明兮故吾之所以為惑擇吉日余西征兮亦既造夫京師君之門不可徑而入兮遂從試於有司惟名利之都府兮羌衆人之所馳競乘時而附勢兮紛變化其難推全純愚以靖處兮將與彼而異宜欲奔走以及事兮顧初心而自非朝騁騖乎書林兮夕翺翔乎藝苑諒却步以圖前兮不浸近而逾遠哀白日之不與吾謀兮至今十年其猶初豈不登名於一科兮曾不補其遺餘進既不獲其志願兮退將遁而窮居排國門而東出兮慨余行之舒舒時憑高以回顧兮涕泣下之交如戾洛師而悵望兮聊浮遊以躊蹰假大龜以視兆兮求幽貞之所廬甘潛伏以老死兮不顯著其名譽非夫子之洵美兮吾何為乎浚之都小人之懷惠兮猶知獻其至愚固余異於牛馬兮寧止乎飲水而求芻伏門下而默默兮竟歲年以康娛時乘間以獲進兮顏垂歡而愈愈仰盛德以安窮兮又何忠之能輸昔余之約吾心兮誰無施而有獲疾貪佞之汙濁兮曰吾其既勞而後食懲此志之不修兮愛此言之不可忘情怊悵以自失兮心無歸之茫茫苟不內得其如斯兮孰與不食而高翔抱關之厄陋兮有肆志之揚揚伊尹之樂於犬畝兮焉富貴之能當恐誓言之不固兮斯自訟以成章往者不可復兮冀來今之可望余悲不及古之人兮伊時勢而則然獨閔閔其曷已兮憑文章以自宣昔顏氏之庶幾兮在隱約而平寬固哲人之細事兮夫子乃嗟歎其賢惡飲食乎陋巷兮亦足以頤神而保年有至聖而為之依歸兮又何不自得於艱難曰余昏昏其無類兮望夫人其已遠行舟楫而不識四方兮涉大水之漫漫勤祖先之所貽兮勉汲汲於前修之言雖舉足以蹈道兮哀與我者為誰衆皆捨而已用兮忽自惑其是非下土茫茫其廣大兮余一不知其可懷就水草以休息兮恆未安而既危久拳拳其何故兮亦天命之本宜惟否泰之相極兮咸一得而一違君子有失其所兮小人有得其時聊固守以靜俟兮誠不及古之人兮其焉悲余取友於天下將歲行之兩周下何深之不即上何高之不求紛擾擾其既多咸喜能而好修寧安顯而獨裕顧厄窮而共愁惟知心之難得斯百一而為收歲癸未而遷逐侶蟲蛇於海陬遇夫人之來使闢公館而羅羞索微言於亂志發孤笑於㣥憂物何深而不鏡理何隱而不抽始參差以異序卒爛漫而同流何此歡之不可恃遂駕馬而回輈山磝磝其相軋樹蓊蓊其相摎雨浪浪其不止雲浩浩其常浮知來者之不可以數哀去此而無由倚郭郛而掩涕空盡日以遲留古者聖人之制祭祀也必主忠敬崇吉蠲不貴其豐乃或薦之以水不可以黷斯用致之於天其事信美其義惟元月實水精故求其本也明為君德因取以名焉於是命烜氏候清夜或將祀圓丘於元冬或將祭方澤於朱夏持鑑而精氣旁射照月而陰靈潛下視而不見謂合道於希夷挹之則盈方同功於造化應於有生於無形象未分徒騁離婁之目光華暗至如還合浦之珠既齊芳於酒醴詎比賤於潢汚明德惟馨元功不宰於以表誠潔於以戒荒怠苟失其道殺牛之祭何為如得其宜明水之薦斯在不引而自致不行而善至雖辭麴糵之名實處樽罍之器降於圓魄殊匪金莖之露出自方諸乍似鮫人之淚將以贊於陰德配夫陽燧夜寂天清煙消氣明桂華吐耀兔影騰精聊設監以取水伊不注而能盈霏然而象的爾而呈始漠漠而霜積漸微微而浪生豈不以德協於坎同類則感形藏在空氣應則通鶴鳴在陰之理不謬武嘯於谷之義可崇足以驗聖賢之無黨知天地之至公竊比太羹之遺味幸希薦於廟中士之特立獨行適於義而已不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者寡矣至於一國一州非之力行而不惑者蓋天下一人而已矣若至於舉世非之力行而不惑者則千百年乃一人而已耳若伯夷者窮天地亘萬世而不顧者也昭乎日月不足為明崒乎泰山不足為高巍乎天地不足為容也當殷之亡周之興微子賢也抱祭器而去之武王周公聖也從天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也彼伯夷叔齊者乃獨以為不可殷既滅矣天下宗周彼二子乃獨恥食其粟餓死而不顧繇是而言夫豈有求而為哉信道篤而自知明也今世之所謂士者一凡人譽之則自以為有餘一凡人沮之則自以為不足彼獨非聖人而自是如此夫聖人乃萬世之標準也余故曰若伯夷者特立獨行窮天地亘萬世而不顧者也雖然微二子亂臣賊子接迹於後世矣我思古人伊鄭之僑以禮相國人未安其教遊於鄉之校衆口囂囂或謂子産毀鄉校則止曰何患焉可以成美夫豈多言亦各其志善也吾行不善吾避維善維否我於此視川不可防言不可弭下塞上聾邦其傾矣既鄉校不毀而鄭國以理在周之興養老乞言及其已衰謗者使監成敗之迹昭哉可觀維是子産執政之式維其不遇化止一國誠率是道相天下君交暢旁達施及無垠於呼四海所以不理有君無臣誰其嗣之我思古人司空咸寧王尹蒲之七年木連理生於河之東邑野夫來告且曰吾不知古殆氣之交暢也維吾王之德交暢者有五是其應乎訓戎奮威蕩戮凶回舉政宣和人則寧嘉入踐台階庶尹克司來帥熊羆四方作儀閔仁鰥寡不寧燕息人樂王德祝年萬億府有㣥吏王有從事異體同心歸民於理天子是嘉俾錫勞王王拜稽首天子之光庶德昭融神斯降祥殊本連理之柯同榮異壟之禾吾徯之産茲土也久矣今欲明於大君紀於策書王抑余也冶金伐石垂耀無極王余抑也奮肆姁偷不知所如願托頌詞長言之於康衢頌曰木何為兮此祥洵厥美兮在吾王願封植兮永固俾斯人兮不忘敕地官之職邦教是先必選國華以從人望具官崔㣥體道履仁外和內敏清而容物善不近名從容禮樂之間特達圭璋之表比參密命宏益既多及二儀曹升擢惟允邁茲令德藹然休聲選賢與能於今雖重擇才均賦自古尤難往慎乃司以服嘉命問書稱汝則有大疑謀及乃心謀及卿士以至於庶人龜筮考其從違以審吉凶則是聖人之舉事興為無不與人共之者也於易則又曰君不密則失臣臣不密則失身幾事不密則害成而春秋亦有譏漏言之詞如是則又似不與人共之而獨運者書與易春秋經也聖人於是乎盡其心焉耳矣今其文相戾悖如此欲人之無疑不可得已是二説者其信有是非乎抑所指各殊而學者不之能察也諒非深考古訓讀聖人之書者其何能辨之此固吾子之所宜無讓者願承教焉問古之人有云夏之政尚忠殷之政尚敬而周之政尚文是三者相循環終始若五行之與四時焉原其所以為心皆非故立殊而求異也各適於時救其弊而已矣夏殷之書存者可見矣至周之典籍咸在考其文章其所尚若不相遠然焉所謂三者之異云乎抑其道深微不可究歟將其詞隱而難知也不然則是説為謬矣周之後秦漢蜀吳魏晉之興與霸亦有尚乎無也觀其所為其亦有意云爾循環之説安在吾子其無所隱焉問夫子之序帝王之書而繫以秦魯及次列國之風而宋魯獨稱頌焉秦穆之德不踰於二霸宋魯之君不賢乎齊晉其位等其德同升黜取舍如是之相遠亦將有由乎願聞所以辨之之説問夫子既沒聖人之道不明蓋有楊墨者始侵而亂之其時天下咸化而從焉孟子辭而闢之則既廓如也今其書尚有存者其道可推而知不可乎其所守者何事其不合於道者幾何孟子之所以辭而闢之者何説今之學者有學於彼者乎有近於彼者乎其已無傳乎其無乃化而不自知乎其無傳也則善矣如其尚在將何以救之乎諸生學聖人之道必有能言是者其無所為讓問所貴乎道者不以其便於人而得於己乎當周之衰管夷吾以其君霸九合諸侯一匡天下戎狄以微京師以尊四海之內無不受其賜者天下諸侯奔走其政令之不暇而誰與為敵此豈非便於人而得於已乎秦用商君之法人以富國以強諸侯不敢抗及七君而天下為秦使天下為秦者商君也而後代之稱道者咸羞言管商氏何哉庸非求其名而不責其實歟願與諸生論之無惑於舊説問夫子之言盍各言爾志又曰居則曰不吾知也如或知爾則何以哉今之舉者不本於鄉不序於庠一朝而㣥至乎有司有司之不之知也宜矣今將自州縣始請各誦所懷聊以觀諸生之志死者可作其誰與歸事其大夫之賢者友其士之仁者敢問諸生之所事而友者為誰乎所謂賢而仁者其事如何哉言及之而不言亦君子之所不為也問春秋之時百有餘國皆有大夫士詳於傳者無國無賢人焉其餘皆足以充其位不聞有無其人而闕其官者春秋之後其書尤詳以至於吳蜀魏下及晉氏之亂國分如錙銖讀其書亦皆有人焉今天下九州四海其為土地大矣國家之舉士內有明經進士外有方維大臣之薦其餘以門地勳力進者又有倍於是其為門戶多矣而自御史臺尚書省以至於中書門下省咸不足其官豈今之人不及於古之人邪何求而不得也夫子之言曰十室之邑必有忠信如某者焉誠得忠信如聖人者而委之以大臣宰相之事有不可乎况於百執事之微者哉古之十室必有任宰相大臣者今之天下而不足士大夫於朝其亦有説乎問夫子曰潔淨精微易教也今習其書不識四者之所謂盍舉其義而陳其數焉問易之説曰乾健也今考乾之爻在初者曰潛龍勿用在三者曰夕惕若厲無咎在四者亦曰無咎在上曰有悔卦六位一勿用二苟得無咎一有悔安在其為健乎又曰乾以易知坤以能乾之四位既不為易矣坤之爻又曰龍戰於野戰之於事其足為乎易六經也學者之所宜用心願施其詞陳其義焉問人之仰而生者穀帛穀帛豐無飢寒之患然後可以行之於仁義之途措之於安平之地此愚智所同識也今天下穀愈多而帛愈賤人愈困者何也耕者不多而穀有餘蠶者不多而帛有餘有餘宜足而反不足此其故又何也將以救之其説如何問夫子言堯舜垂衣裳而天下理又曰無為而理者其舜也歟書之説堯曰親九族又曰平章百姓又曰協和萬邦又曰歷象日月星辰敬授人時又曰洪水懷山襄陵下人其咨夫親九族平百姓和萬邦則天道授人時愁水禍非無事也而其言曰垂衣裳而天下理者何也於舜則曰慎五典又曰敘百揆又曰賓四門又曰齊七政又曰類上帝禋六宗望山川遍㣥神又曰協時月正日同律度量衡五載一巡狩又曰分十二州封山濬川恤五刑典三禮彰施五色出納五言於呼其何勤且煩如是而其言曰無為而理者何也將亦有深辭隱義不可曉邪抑其年代已遠失其傳邪二三子其辨焉問古之學者必有師所以通其業成就其道德者也由漢氏已來師道日微然猶時有授經傳業者及於今則無聞矣德行若顏回言語若子貢政事若子路文學若子遊猶且有師非獨如此雖孔子亦有師問禮於老聃問樂於萇宏是也今之人不及孔子顏回遠矣而且無師然其不聞有業不通而道德不成者何也問食粟衣帛服仁行義以俟死者二帝三王之所守聖人未之有改焉者也今之説者有神仙不死之道不食粟不衣帛薄仁義以為不足為是誠何道邪聖人之於人猶父母之於子有其道而不以教之不仁其道雖有而未之知不智仁與智且不能又烏足為聖人乎不然則説神仙者妄矣臣某言伏奉今日制命以臣為尚書右丞同中書門下平章事非常之寵忽降於上天不次之恩遽屬於庸品承命震駭心神靡寧顧已慚靦手足失措臣某誠惶誠恐頓首頓首臣本非長才又乏敏識學不能通達經訓文不足緣飾吏事徒知立志廉謹絶朋勢之交處官恪恭免請託之纍因緣資序驟歷臺閣蒙生成於天地無裨補於涓塵忝冒以居涯分遂極常以盈滿自誡方思退處里閭何意恩澤益深猥令超參鼎鉉竊自惟度實不堪任臣某誠惶誠恐頓首頓首臣聞宰相者上熙陛下覆幬之恩下遂㣥生性命之理以正百度以和四時澄其源而清其流統於一而應於萬毫釐之差或致弊於寰海晷刻之誤或遺患於歷年固宜旁求隱士必得能者然後授之不可輕以付臣使人失望上纍聖主知人之哲下乖微臣量已之義無補於理有妨於賢况今俊乂至多耆碩咸在苟以登用皆踰於臣伏乞特回所授以示至公之道天下幸甚臣某言臣伏以去歲冬間雨雪頗少今年春首宿麥未滋陛下深念黎氓屢形詞旨神監昭達皇情感通春雲始繁時雪遂降實豐穰之嘉瑞銷癘疫於新年東作可期南畝有望此皆陛下與天合德視人如傷每發聖言則獲靈貺見天人之相應知朝野之同歡臣等職在燮和慚無效用覩斯慶澤實荷鴻休臣愈言今之所以知古後之所以知今不可口傳必憑諸史自雖二帝三王之盛若不存紀録則名氏年代不聞於茲功德事業無可稱道焉順宗皇帝以上聖之姿早處儲副晨昏進見必有所陳二十餘年未嘗懈倦陰功隱德利及四海及嗣守大位行其所聞順天從人傳授聖嗣陛下欽承先志紹致太平原大推功實資撰次去八年十一月臣在史職監修李吉甫授臣以前史官韋處厚所撰先帝實録三卷云未周悉令臣重修臣與修撰左拾遺沈傳師直館京兆府咸陽縣尉宇文籍等共加採訪并尋檢詔敕修成順宗皇帝實録五卷削去常事著其繫於政者比之舊録十益六七忠良姦佞莫不備書苟關於時無所不録吉甫慎重其事欲更研討比及身沒尚未加功臣於吉甫宅取得舊本自冬及夏刊正方畢文字鄙陋實懼塵玷謹隨表獻上臣愈誠惶誠恐頓首頓首謹言右臣去月二十九日進前件實録今月四日宰臣宣進止其間有錯誤令臣改畢却進舊本者臣當修撰之時史官沈傳師等採事得於傳聞詮次不精致有差誤聖明所鑒毫髮無遺恕臣不逮重令刊正今並添改訖其奉天功烈更加尋訪已據所聞載於首卷儻所論著尚未周詳臣所未知乞賜宣示庶獲編録永傳無窮謹録奏聞謹奏
