front:
  text: 全唐文欽定全唐文卷四百七十八縱以蔭補協律郎累拜御史大夫貞元元年加吏部侍郎檢校禮部尚書授河南尹徵拜太常卿封常山縣公七年卒年六十二贈吏部尚書諡曰忠
  hash: sha256:a5240d7fc72d6f7c28af7273fe23841a540a9d683540cc4e6b54833bbe3a3173
  markers:
  - {type: head, offset: 14, content: 崔縱, id: KR4h0168_NFKB_478-h1, level: 1}
body:
  text: 謹按司封令及六典王母為太妃高祖宇文昭儀生韓王元嘉後為韓國太妃太宗燕妃生越王貞後為越國太妃今諸王母未有封號請遵典故伏以兵戎未息仕進頗多在官者既合序遷有功者又頒裦賞比來每至選集不免據闕留人嘗歎遺才仍招怨望況有恩詔甄錄功勞諸道敘優人數甚廣見須處置不可稽留今若停減吏員實恐未便於事非但承優者無官可授抑又敘進者無路可容本冀便人飜成斂怨事仍舊貫以適時宜更待事平然後輕度黃裳字遵素京兆萬年人第進士又中宏詞科累遷侍御史貞元末拜太常卿憲宗為皇太子監國拜門下侍郎同中書門下平章事元和二年以檢校司空為河中晉絳節度使封邠國公三年卒年七十一贈司徒諡曰宣禮云喪三年不祭唯天地社稷周禮黃鐘之均六變天神皆降林鐘之均八變地祇咸出不廢天地之祭不敢以卑廢尊禮也樂者所以降神也不以樂則祭不成今遵遺詔行易月之制請制內遇祭輟樂制外用樂自漢魏已降沿革不同古者祖有功宗有德皆不毀之名也自東漢魏晉迄於陳隋漸違經意子孫以推美為先光武已下皆有祖宗之號故至於迭毀親盡禮亦迭遷國家九廟之尊皆法周制伏以太祖景皇帝受命於天始封元本德同周之后稷也高祖神堯皇帝國朝首祚萬葉所承德同周之文王也太宗文皇帝應天靖亂垂統立極德同周之武王也周人郊后稷而祖文王宗武王聖唐郊景皇帝祖高祖而宗太宗皆在不遷之典高宗皇帝今在三昭三穆之外謂之親盡新主入廟禮合迭遷藏於從西第一夾室每至禘祫之月合食如常昔康王以成周之眾命畢公保釐東郊承二后之業周禮以天官卿為冢宰漢以大司馬為將相國朝以尚書僕射師長百揆此四者人臣之極公盡更之有不至追而命之公之德盛矣公諱少連字夷仲吳郡人也夏后少康以禹葬會稽次子為越王以主祀漢封其裔孫為顧侯纘禹之緒厥後蘞蔓世居河南中原戰爭復徙吳會自晉司空和洎梁給事中耀至公十三代矣衣冠禮樂為江左著族曾王父諱君卿晉朝柳州司馬大父諱克忠縉雲郡司倉參軍贈邠州刺史烈考諱望贈祕書監祕書府君慕梁伯鸞於陵仲子安貞履道不辱其身該通六經旁貫百代究天人之際盡性命之端公蘊山岳粹靈承祖考休慶王褱姿偉度識達行方志存遠大道契先覺每躬率耕稼厲精墳典齒列上庠升堂覩奧時小宗伯薛公邕深所歎異以為東南之美盡在廊廟之器不孤擢進士甲科猶謝詩人錯薪之義丁祕書府君憂居喪柴毀殆至滅性既祥而哀未忘也久之以書判高第典校祕文秩滿授登封主簿時議以皇居在鎬砥名之士登近甸者俗不為東畿殊不知樂嵩少之遊奮鴻鵠之翼先是邑有暴虎公以為天道可以誠感猛鷙可以仁服乃堙塞陷穽移檄靈岳於是人安其居獸不為害其通理遂性也如是及休告東洛居守鄭公叔則辟為從事非其所好終以疾辭其明年書判超絕登第亞相于公頎推義行詔拜監察御史京師內亂鑾輅時巡公節見艱危步至行在陳少康滅澆之計墨翟設拒之宜帝納其忠拜水部員外郎翰林學士隨難南梁遷禮部郎中加朱紱銀綬學士如故贊絲綸之密命參帷幄之謀猷屢獻嘉言克昌大業乘輿反正酬勞計功退保謙沖口不言祿以東吳播越叶於方墓表求遷奉辭志哀懇德宗以公職在近署重違其請乃命長男主喪中使監護水陸縣道斂禭之飾悉令仰給葬於偃師縣高邑鄉邙山之趾澤漏泉壤哀榮莫儔尋以本官知制誥賜金印紫綬遷中書舍人公在翰林僅將一紀富平以周密自制萬石以謹審見稱故造辟而言詭辭而出讜言碩畫人莫得聞帝深嘉之方將大任以文昌理本歷試其能凡三踐列曹再登八座一為散騎常侍一為左丞雖分職各殊領者數矣公之在地官也辨土地之名物稽夫家之眾寡四人不瀆五教允敷斂施以時貴賤以節所以法通制而濟經費也公在秩宗明典禮以正威儀變樂府而和上下錯綜經術辨論俊造黜浮偽而尚敦素所以觀人文而化天下也公在天官綜六典以佐邦理糾八柄以馭㣥司登降庸勳權衡流品抑貪冒而進賢能所以代天工而立人極也珥貂騎省以直方備顧問以謇諤處朋儕時有權臣怙寵人多附麗公面折其短數而絕之㣥臣為危正色不撓旋持左轄旁總機曹之事凡三典賓貢三掌銓衡藻鑑表於知人清通播於令問萬邦輻輳五都浩穰命公尹京兆以為設鈎距塗赭衣前人之所為不足以為四海式於是布和平尚簡易始務仁人之惠無取赫赫之名政宏大體去有餘慕遷吏部尚書復行太宰之職轉兵部尚書兼御史大夫東都留守處納言之位儀亞相之府行二南之化申九伐之威以洛苑間田汝墳曠土乞田積粟務穡勸分貞我律師載清東夏孟元陽有激水之功為當時所揜公密薦於先帝言雖不成識者美之嗚呼昭假其功馨香其德宜升玉鉉而厎太階天不憗遺梁木斯壞以貞元癸未年十月四日薨於洛陽崇讓里之私第春秋六十三都人罷市而洒泣皇上廢朝以興悼乃命有司葬日給鹵簿簫鼓追贈尚書右僕射飾終之義備矣太常考行諡曰敬夫人同郡陸氏常州司馬綺之女也蘊中饋內弼之美女儀之德宜配君子光我閨門石窌未封先公而謝有子曰師閔克家光烈早歲繼明以拔萃甲科歷咸陽尉次曰師安太常寺太祝次曰宗彧宗憲志文好學不墜先業凱風之思有感人聲師閔等考卜先遠以明年二月十五日奉公洎夫人之裳帷合葬於亳邑附先塋禮也以黃裳陪南宮之班列接西掖之周行忝於史官頗知系錄敘事詢于故老銘德存于碩儒追琢豐碑永播徽烈徵范陽人歷殿中侍御史度支員外郎信州長史遷給事中出為同州刺史徙華州內外官應直京百司及禁軍并因親勒留官等若敕出便帶職事及勒留京官即合以敕出為上日外官以敕到為上日如今司未經奏聞即合同赴任者例準貞元六年二月二十四日敕待甲出後省符到任日支給俸料者若甲出未帶勒留官簽符先下州府支替理例未免喧爭伏請起今以後並須挾名勒留敕到任方為上日支給課錢其附甲官有給脚依前勒留直諸司者待附甲後簽符到州為上日支給課料冀塞僥求庶絕論訴憑字虛受一字嗣仁虢州宏農人第進士累官太常少卿湖南江西觀察使入為左散騎常侍遷刑部侍郎京兆尹貶臨賀縣尉臣某言伏奉太史奏昨八月十五日夜壽星見奉敕宜付所司者伏以三光在天垂象以昭德一人御宇應運以發祥將後天而奉時遂瞻星而稱壽九星納慶萬福同歡中賀臣聞聖人握乾以繼統輔德以垂休則必焜燿耿光昭宣景福歷考圖牒皦然明徵謹按孫氏瑞應圖云老人星見人主壽昌陛下丕承寶歷光宅天下恢宏聖烈允執大中化成而天道不遠感至而星精介祉是以去歲已出今秋又見光靜而明當井絡之端色黃而潤叶中方之位降茲靈貺實契福庭帝圖表無疆之休史冊傳萬祀之慶臣生逢聖代幸覩昌期限以藩鎮守土不獲奔詣闕庭稱賀北望宸極倍萬恒情王者法天地之治贊其化育者其惟循吏乎羅公牧廬江七年政洽化淳遷領壽陽州之耋老韋挺等永惟州尊鞠我覆我之德若非搢紳先生之言刊他山之石令一郡之人入則瞻之出則望之則何以塞戀慕之思邪於是同心上請遂降中詔謂憑嘗載筆右史請述徽烈公珪璋秀特奕葉蟬冕曾祖彥榮皇朝同州長史王父思崇韶睦常三州刺史烈考懷操桂州興安縣令世以文學政事揚歷清貫淮海之郡廬為大封畧濶而土田瘠人產寒薄井賦尤重公由奉先令而牧是邦性嚴而不殘和而不流仁可以育物得眾智可以豐財成務勇可以蕩邪去暴寢處冉季之政馳騁游夏之藝廬江之俗不好學而酷信淫祀豪家廣占田而不耕人稀而病於吏眾藝桑鮮而布帛疎濫有札瘥夭傷則損敗生業捨藥物而乞靈於鬼神公則禁其聽神頒以良藥為求十全之術以救活之令春無瘧寒夏無痟首之疾又命鄉塾黨庠緝其牆室鄉先生總童冠子弟以淹中之禮田何之易上代帝王遺書與魯春秋及百王之言以教之圓冠方屨者不補吏不及數歲俊造之秀升於宗伯者僅四十人又命有不耕之田有能興耒耜者聽耕之所耕之田因為之主墾田滋多歲以大穰每里置里胥一人而止餘悉罷之至定賦之際集人正坐眾議其重輕里胥書于籍而無得措一辭焉是以賦均而無銖兩之差勸之藝桑以行賞罰數年之後環廬映陌如雲翳日易其機杼教令縝密精麄中數廣狹中量鬻之闤闠而得善價人以不困郡至每歲四時呈課屬邑之聯事定其遲速美惡而殿最之務繁勞人無寧止權寵之黨因而強丐公命縣大夫守清靜之化四時無得離邑唯歲終一至郡計事人樂易簡之理咸思自言澤國沮洳水澇不時郡城崩剝勞於版築百堵興役則竭作齊人公命州兵食公之糗糧者度其力役多少加給僦功緡錢尋尺摧闕隨補隙壞不聞鼛鼓而百雉常峻三代盛王曾不遺年聖朝立制高年者給侍丁以遵前古養老之道長吏不能遵行令典以垂空文公因班春行部宣明詔旨當侍白髮者捨其百役齯齒知感荷其生成軍興以來賦役差重錢貴貨賤罷甿不堪悉輸緡帛黔首重困公命一郡所出之貨人皆得而輸之其上者貢于王府其中者入于方帥其下者以充郡守㣥吏之稍食焉人人自便吏無侵害其厚風俗去疵癘勤力愛人興利除害不至於嚴而人從化故有生說於其下和氣應於其上則有靈芝瑞雀無情而產重葩三秀煌煌可愛丹喙皓質其儀可喜宜其超賜金增秩之寵以備公卿之闕所以擢階品第五書考課第一徽章命服之美恩錫叢至天子以壽春右郡淮海內屏地雄人富東南樞轄有介馬數百徒兵萬人詔公為壽州刺史本州團練使轅門洞開貔虎洸洸朱綅貝冑金龜紫艾銀鐺寵荷恩視方伯壽春抵廬江三百里公嘗牧茲郡壽人望而愛之赤幃即露壽人自理俄有詔曰壽州刺史羅珦前為廬江政事居最惠養贍助一邦阜安中司執法外督州部可兼御史中丞其宰奉先也封畿千里斯邑為大墾田之數二萬頃每歲引芻粟之車九千兩公布政有條事皆肅給邑有園寢多充奉之勞中貴人率常旁午有怙勢憑寵之吏侮慢公法公箠殺之強家惡子散落他邑政成四稔去而見思邑人姚芝等相與詣闕請刊金石公之佐嗣曹王臯也荊門漢上之理和門之政軍司馬馬彞主之郡邑之政而公主之征南日登峴首命賓友有成坐嘯之逸言理行者甲于他邦其後屬帥歿兵亂人胥大恐公從容指揮熸其同惡軍壘和靜不知有兵在奉先日天子聞公樊漢丕績理邑殊化召入明廷咫尺慰勉其任理官吏京縣尉甸服也咸有勤績稱於官司可謂終始不回宜享榮號者矣頌曰公未至止郡無典刑賦集役煩人豈樂生有里不居有田不畊法禁廢弛游人縱橫鄉有疾癘乞靈捨藥邑有黨庠不學將落貧人稅重豪家賦薄田稀翳桑猛虎為虐自公來思經教大開墾彼荊榛化為莓苔隘關溢廛萬商俱來罷吏息人老安少懷提封之內邑無曠土游手滅跡藝桑犬畝青衿圓冠宛若鄒魯貧均富斂祛其疾苦時或札瘥害及于人頒以良藥絕其聽神網寬禁疎有制有倫出入阡陌心勞體勤有獸不搏由公服馴皇奪良牧彼肥之曲遷臨壽春朱英暢轂撫我何儉舍我何速願公壽考享有百祿瞻是豐碑慰彼惸獨餘慶字居業鄭州滎陽人大歷中進士貞元中拜中書侍郎同中書門下平章事貶郴州司馬順宗立以尚書左丞召憲宗朝復以本官知政事罷為太子賓客累除太子少師封滎陽郡公穆宗立進位檢校司徒卒年七十五贈太保諡曰貞請京見任文官一品以下九品以上及外使兼京正員官者每月所請料錢請率計每貫抽一十文以充國子監修造先師廟及諸室宇繕壁經公廨雜用之餘益充本錢諸色隨便宜處置臣以為歷事文吏無非孔徒所取至微足以資學教化之根本人倫之綱紀陛下文德武功勘亂除暴事超歷代道貫百王國學毀壞荒蕪蓋以兵戎日久而修葺未暇也今寇難滌蕩天下砥平爰俾耆臣叨領儒職臣兢於受命敢不肅恭伏念旬時莫過於此伏望天恩便賜允許仍令戶部每月據數並以實錢付國子監其東都留司京官亦準數率錢便充東都國子監修理內外官服朝服入祭服者其中五品多有疑悞約執事宜自今已後其執事官是五品者雖帶六品已下散官即有劒珮綬其六品以下職事官縱有五品已下散官並不得服劒珮綬公諱耽字敦詩其先長樂人也七代祖元楷因葛榮之亂避地始徙家於浮陽隋開皇中改浮陽為清池今為清池人也烈祖遠則皇德州長河尉祖知義皇沁州沁源主簿贈揚州大都督考炎之贈尚書左僕射皆才光道溢器位非偶積善有遂鍾於魏公公天寶十載明經高第乾元中授貝州臨清尉州縣之職與公非宜兵戈甫興時不韜才公詣闕獻書授絳州太平尉太原節度王思禮察公器重識高涵泳萬頃署度支判官轉試左驍衞兵曹試大理司直監察殿中侍御史職並如故遂遷檢校繕部員外郎兼太原少尹侍御史北都副留守仍賜金章紫綬就加檢校禮部郎中凡歷數使賓待益重奇才愈茂宏器日彰天下士君子推公為棟梁遷汾州刺史在郡七年憯怛之愛忠利之教序四器導五常百姓日用而不知熙然致於仁壽烏足語其瑣細歟徵拜鴻臚卿兼左右威遠營使通夷狄之情序賓客之位其有素矣是歲拜梁州刺史兼御史中丞山南西道節度觀察度支營田等使加朝議大夫封廣川男時守臣梁崇義恃漢水峴山之險負固倔強公受詔領麾下沿江東討降均州屯穀城所向皆捷以功加銀青光祿大夫上以慎理軍旅以信夷夏邊封謐清而百姓宴安是時故山南西道節度使相國鄖公震洎邠寧節度使張僕射獻甫或為部刺史或為都將皆雄毅宏達常流不及忌能飛語危疑是懼軍帥之例罕有全度公前推信誠中發坦蕩咸以事曉加之慰薦竟垂忠勳兼佩將相引張推轂受脤微公之恢朗洞識二人曷能臻歟在鎮三年遷檢校工部尚書襄州刺史御史大夫山南東道節度觀察使會李希烈亂常朝廷致誅詔公為司徒梁公勉招討副使以公懿德王褱姿不宜為副寇難未平徵拜工部尚書職崇喉舌望允台鼎俄以本官兼御史大夫東都留守判東都尚書省事充東都畿汝州都防禦使又加東都畿唐汝鄧州都防禦觀察使舊例居守不出王城公以射藝絕倫氣橫秋霜德宗知公信在言前優詔特許薄狩郊甸允所謂珪璋特達之德也遷檢校尚書右僕射充義成軍節度鄭滑等州觀察處置等使屬有鄰師戍兵護邊魚服鶡冠異軍三千公弛柝罷警門闥洞開慮其未安重延廊廡坦易信誠挺出今古海渟山峙茫茫屹屹培塿畎澮安得不服其洪濤峻嶠歟凡更四鎮踐履如一尋以風疾懇形封章御札名方與十全之醫馳賜不允陳讓俄而獲瘳貞元九年入覲拜尚書右僕射同中書門下平章事朝廷為之寶巖廊為之重天下以之信向蠻夷以之懷來加金紫光祿大夫轉左僕射依前平章事遷檢校司空依前左僕射平章事遂嬰風疾四表陳讓不俞朝旨御醫盈門中使填路嗚呼有盛衰也有晝夜也聚散之理常也死生之變大也愚智同塵賢不肖共轍孰能究之哉公為御史先府君追贈太子中允先夫人鞠氏贈東萊縣太君歸本郡遷葬鄉邦榮之先府君累贈尚書左僕射鞠太君贈齊國太夫人祖贈揚州大都督祖妣崔氏累贈博陵郡太夫人廟貌觀德豐碑紀烈奉君親而載劬啟手足而免夫始卒之道侯其韙而以永貞元年十月一日薨于長安光福里之私第享年七十六輟朝四日再贈太傅詔鴻臚卿渾鍊持節備賻絹一千匹米粟一千石詔葬長安高陽原夫人贈扶風郡夫人武功蘇氏駕部郎中守忠之孫處士珣之女先公二十五年而歿至是而合葬焉秉周禮也長子疇太常寺協律郎凋于青春次子疄太子議郎少子㽥京兆府參軍公好古在汾州時於戒行尼寺家童院得晉西河王司馬斌碑太康中尚書郎索靖八分書翳薈蕪薉之下字可辨者猶存大半有割太原四縣以為邦邑之語公再建於寺殿之前為尚書時魏懷鄭汴軍聲未輯詔公宣遏而兩家之難解抑推君命且曰服寬信也公翫習經籍老而不倦九流百氏靡不該覽通夷裔之風俗盡山川之險易歷代沿革之自百王廢置之由關塞通塞之因牧圉盛衰之異道程疎密之準要荒享獻之數聚米畫沙成於指掌矧夫丹青神化縑緗纂述數十年來西戎陷我河湟其圖籍志錄泯絕散落非公強力精專蹂足蘭貫穿靡書不探雖賤必訪則自汧龍而西傳疑唱謬紛紛不已已化為草昧天意若曰降公之聰達精博拯厥將墜歟興元元年詔公譔國圖貞元十四年先獻關中隴右及山南九州等圖又譔別錄六卷吐蕃黃河錄共四卷優詔裦異賜馬一匹銀器數事錦綵三百匹十四年冬撰海內華夷圖成并撰古今郡國縣道四夷述四十卷貞元十道錄四卷賜馬兩匹銀器數事錦綵五百匹又內出銀榼二蓋殊渥也於戲渤海左涌洪河前激泱漭其地氣必將有以孕育哲聖謨明盛時為紀為綱為棟為梁體貳為仁萬夫之望豈特河海地理云乎哉亦將上動昭回下降星精為忠為孝為聰為明為君子為宏器公有大度容物也浩無津涯而恪慎競畏不有怠也有明哲保身也孰云肯綮而端方肅祗未嘗離也公奉親以孝事主以忠待天下以信博識以強力廉隅以砥礪居台座十三年秉戎律四鎮垂十五年產不過中人日給有不暇之意非夫脫落塵機翺翔青冥孰能然哉夫郤縠之說禮樂敦詩書祭遵雖在軍旅不忘俎豆邴吉之不過汙丞相車茵劉寬之無爛汝手叔度之涯涘元陽之不伐衞玠之理遣情恕公咸頡頏恢博得其兼備者已公考求六藝張弓挾矢允謂殊倫連墮冥冥之羽雙貫五采之翬殪豶豖之獸圖畫歌詠噫嘻君子多乎哉文章之製博達而清約盛矣著述有未就者歿有遺恨疄等知公與餘慶有忘年之眷見託紀徽烈俾鴻伐芬芳不歇表唐得賢臣之目焉銘曰圓方既明淪渾粹精辰耀騰溢降為賢英郁郁魏公薰然淑清脫落瑣細胷吞長鯨天寶之季北塵薦起懷策上謁言塵可止少年下位事不行矣命官絳臺渥澤伊始車騎開府司空晉陽萃賢揚幕優游抑揚惟公聳然落落堂堂㣥議乃曰允膺巖廊剖竹西河眾蘇情結風俗丕變載欣載悅六鈞服猛雙鴻一發式是威武洸洸烈烈入掌九賓羽儀清都四夷荒職貢畫地圖帝曰漢中實惟爾區廷授龍節雙旌碩儒推轂漢南乃司冬官保釐成周白馬登壇更踐數鎮撫人以寬或三四年遂成勝殘徵弼中樞朝廷為實謀不外揚功宣造膝與物宥過意工言質天下日用曷由窺室知命兮死生齊松楸列兮埏成蹊海胷兮渾渾浩浩一指兮天和倪謬知言之重顧銘樂石兮悽悽萬物或幾乎息兮惟公德兮竟隮維元和八年歲次癸巳四月癸未朔九日辛卯銀青光祿大夫守太子太保兼判太常寺事鄭餘慶銀青光祿大夫守兵部尚書王昭銀青光祿大夫吏部侍郎楊於陵中大夫守戶部侍郎判度支盧坦朝議大夫守刑部侍郎充諸道鹽鐵轉運使王播朝議大夫權知禮部侍郎韋貫之等謹以清酌之奠敬祭于故太保贈太傅杜公之靈伏惟嶽峙毓德台符炳靈實啟邦傑佐時文明厚仁保和待物推誠夷道不隔直心無營允釐㣥官參歷庶務周旋四朝出入三署顧言慎行道在忠恕絓組外身江河比度始從郎位職典邦賦重人惜費惠恕周布建中之初受命分符報政長川擁節番禺越俗蠻陬是訓是濡既撫淮楚遂荒隋都時當徐方俶優為虞截河鏁流擁滯邦輸統以威重簡于帝俞鎮寧二境並建雙旟十萬貙虎指揮風趨任兼文武志尚詩書兵賦著典郡政來蘇學該地理識究元機天寵載加時問逾積聿來登庸作弼邦國邦計攸掌國機畢畫永貞之際宮闈秘隔順皇沉疾奸臣竊職公聽㣥位總已夕惕躬宣詔旨捧授金冊一人出震㣥邪蕩滌崇秩屢增湛恩備錫朝登劒履樂侔金石沐澣良辰宴慰親客朱輪紫綬富盛赫奕戒足思退居高不危國有大計猶將來咨才實不器用皆適時位極元老守逾謙卑靈壽方賜懸車忽辭冀期頤以遐保遽樂往而哀隨餘慶等早忝班行嘗承顧盼仰台庭以增欷臨素車而申奠嗚呼哀哉伏惟尚饗
