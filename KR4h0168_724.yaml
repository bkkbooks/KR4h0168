front:
  text: 全唐文欽定全唐文卷七百二十四郾字廣畧清河武城人舉進士書判入等授集賢殿校書郎累遷吏部員外再遷左司郎中元和十三年為吏部郎中遷諫議大夫
  hash: sha256:e7e578f4344152df66c924146579f3df2b5cb9d4514a1b8926f12a6c487c9416
  markers:
  - {type: head, offset: 14, content: 崔郾, id: KR4h0168_NFKB_724-h1, level: 1}
body:
  text: 維天之高仰懸象以辨其方維地之廣資崇山以鎮其域申甫當列岳之位允文應上將之星合德配功古今攸重巨唐二百廿載穆宗皇帝握符御圖思勳烈之臣重藩維之寄詔工部尚書高公承簡建節義成軍佩金魚印洎督郡而遷鎮於滑臺粵二旬教化成號令行軍旅知訓黎人安業咸懼公報政之晚乃明進律移理乎他邦則三軍將安於拊循闔境遽叨於惠養於是部將試祕書監兼殿中侍御史李忠義等三州耆老緇黃等五百人瀝懇披誠遣監軍使宋守義以聞於天子願紀羊公於峴首復借黃君於潁川惟聖知賢特可其奏乃詔翰林侍講學士中書舍人臣郾俾纂述其績刻於貞珉式昭我公之殊勳昭示來裔曰公渤海人也曾祖夔皇朝涼州司馬贈涼州刺史大父行暉試懷州別駕贈戶部尚書烈考崇文邠寧慶節度使京西諸路都統檢校司空同中書門下平章事南平郡王贈太師在憲宗朝劉闢恃西州之險阻兵自固卒被誅戮時則司空解梓潼之師覆其巢穴殲大憝以靖乎庸蜀鴻功煥爛刻於旂常在穆宗朝李㝏乘大梁之驚擁眾構奸以稽王命時則僕射公率眾之郡兵遂奔潰戮兇徒以固其譙潁豐功赫奕鏤於景鍾先皇嘉欒趙之勳用韓彭之畧俾總旄鉞殿於是邦濟代成家乃享其福宜茲懿美豕韋故國白馬通津處東夏之衝要襟西城之捍蔽綿地千里提封三郡利兵勁卒雄武實首乎天下盡忠死難勳績常冠乎藩方故節制澄清之權皆以賢侯良帥精鍊勳庸董其職所以重劇部而獎勞臣也自元和末歲東土艱勤調發徵求曷嘗底寧陰沴繼災蒸人重困田畝棄耒耜里門空杼軸邑有瘡瘠路有餒殍徵稅徒限於編戶行賞不及於連營公始下車勞以安之來以康之政以悅之廣敦勸之方以道之浹辰而教行朞月而俗化於是起凋瘵復流庸野歸其耕家舉其織咸被膏澤而無殘人然後條舉前弊拜章列聞乞免逋責以寬征徭殊恩俯降特遂其請於是鰥惸蒙其生惠游隋勸其力穡咸適樂土且無廢時此龔遂所以播嘉聲也奸豪飢歉之餘奸盜萌起小則私竊於里閈大則推剽於康莊抵法禁及留獄犴者布列於郡境夫以居人宥密之地孰不愛身思安全而避刑辟者率性之常道孰能保生憐其濫以宥其死者公獨推好生之德察小大之獄盡哀敬之心貸其科條咸使全活故謳謠於封部釋寃滯於比寧此安隆所以成茂化也高旗長轂精甲銳師勤王之役比歲而舉竭廩廥以給兵食殫府庫以奉軍裝弊耗以空物力未復及公戾止則禁彼浮靡修其潔廉由身以率人自家以形外鍾鼓之樂不注於心耳采華之飾不被於閨闈節其宴游絕其玩好無私積以厚於已必多方以贍於軍由是寒者溫餒者飫資用是給戎行臻寧此祭征虜之奉公也自頃師徒荐興節將屢換咸有紀綱之僕用資肘腋之親因隸是獘且非吾土方俗之異董率攸難公威令訓齊惠綏周洽感義戴德洽為一心若凝寒之被陽和如嬰兒之蒙顧復皆願畢力以奉轅門此馮征西之得眾也至若罷不急之務黜冗食之徒戎器未備則造器者加意而戎器精焉戰馬或闕則有馬者增職而馬政修焉繕城池以固其金湯飾廨署以避其燥濕是皆賈彼餘力因其羨財人樂就役故無煩功不逾時故無害此又蹔勞永逸之嘉績也美化之所燻灼深仁之所浸漬發於天和達於人心割股以致養廬墓以盡孝非懿行昭感變其澆俗歟功利及於人慈愛布於下戎士愛戴編甿樂康則有潔祀以薦誠虔禱以資福非厚德濡煦激其深衷歟雖漁陽之詠兩歧蜀郡之歌五袴比功類善此無愧焉當吳元濟拒命淮西公領相國晉公牙門之任累以長策贊乎兵機及上蔡削平㣥師旅斾詔以郾城之地析置殷州非寬能愛人無以康疲俗非威可馭眾無以定新邦晉國乃表公之材請受符命於是掩骼埋胔以導其和氣拯饑救患以濟其凶年治屯營以劭農功補壞隄以平水害廨宇之卑也則遷諸爽塏而高其閈閎傳置之闕也則剏以道周而豐其儲峙故有甘泉芝草之瑞焉詔嘉其功移守鉅鹿先是州封綿廣人力凋耗兵革之後田萊多荒公乃計其戶版悉以配給比盡地利且廣賦輸疏漳州潰溢之源開龍崗廢塞之窒俾以善課嘉績如殷政焉復以高第遂遷於宋淮海衝要舟車會同洎公來思甿俗嚮化屬浚郊之變連封俶擾宋為屬城之近且居下流兵力未任物情疑駭公乃蒐索補卒以張其氣燄借貨斂粟以備其困乏密表以布誠飛檄以請援賊㝏遣同惡曹簡使於宋悉索官私之財公斬之以徇自是兇徒奪氣矣竟能奮義旅陳款誠勵支郡抗敵之心絕㣥盜乘隙之勢公之功也策勳楙賞鎮于魯邦當憲宗皇帝掃盪青齊分裂疆宇合亠兊海沂密四郡之地為東南藩雖屢更翦惡而俗未丕變公於是詳究利病備陳綱條復闕里之風化修淹中之禮樂寒暑一換報功義寧旌政進秩乃之茲土凡三剖郡符再陟齋壇冠左貉儀大憲以至於冬官長皇上嗣位嘉守土之臣大布德澤叙升品列改受尚書右僕射所以寵新績而褒舊勳也惟公端肅莊明溫仁惠和戴君則竭其忠臨難則致其命至於字疲人撫三軍若治身疾如理家事公用不足則舍私財以繼之飢人無告則散清俸以賑之故能使部校服義蒸黎飲化若熙陽春若饗太牢此所以建休勳彰茂節處貴位樹雄名諧大君之倚注鋪冊府之光耀者矣昔鄭武繼威桓之德而嗣為藩宣條侯纘絳侯之功而復為將帥惟公克荷先訓顯揚休聲疇庸自列乎方隅延代繼分乎茅社君子為積善之祉鍾於高氏也宜哉夫播美在詞貽惠在公爰書盛德永勒豐碑俾後之人知甘棠之陰留此地也詞曰上標星辰下建藩方分彼土宇授茲忠良烈烈高公家聲載揚應運宣力合於我皇東郡奧區豕韋舊疆化用浹洽俗臻阜康昔在元和坤維構亂南平奉詔提師翦按乃執渠魁乃清巴漢遂陟文治爰登邦翰逮於長慶夷門不龔公復仗義首是奔衝活全支郡屢挫㣥兇錫以齊斧藩於魯封惟帝念功時當進律俾臨東夏用屏王室元侯重寄拔卿顯秩以布甿隸以討軍實公之牧人以本於身若灑和風如熙上春緩其逋逃賙其窶貧嘉惠樂施善誘循循室有紝績野有稼穡俗知禮讓吏無掊克寸于以詠歌公之令德公之理兵以推其誠撫馭用信將和用平俎陳廊廡惠遍羊羹同彼休戚均其寵榮百城秉命十連從令姦慝不作封疆底靖于以詠歌公之善政爰升右揆式殿名藩禮竣師長勳高翰垣惟公之忠惟帝之恩人瞻邵父家識臧孫乃勒豐碑昭示後昆陵谷有變德馨常存乾度元和中官吏部郎中守江州刺史長慶二年拜國子祭酒當館學生每年有及第闕員其四方有請補學生人並不曾先於監司陳狀便自投名禮部計會補署監司因循日久官吏都簡舉但准禮部開牒收管有乖太學引進之路臣既忝守官請起今已後應四館有闕其每年請補學生者須先經監司陳狀稱請替某人闕監司則先考試通畢然後具姓名申禮部仍稱堪充學生如無監司解申請不在收管之限舊例每給付廚房動多喧競請起今以後當監進士明經等待補署畢關牒到監司則重考試其進士等若重試及格當日便給廚房其明經等考試及格後待經監司解送則給廚房庶息喧爭當監四館學生有及第出監者便將本住房轉與親故其合得房學生則無房可給請起今以後學生有及第出監者仰館子先通狀納房待有新補學生公試畢後便給令居住當監承並無專知館博士請起今以後每館眾定一人知館事如生徒無故喧競者仰館子與業長通狀領過知館博士則准監司條流處分其中事有過誤眾可容恕監司自議科決如有悖慢師長彊暴鬬打請牒府縣錮身遞送鄉貫詳觀貞元之末西蜀之事逆豎劉闢構難之初兇邪叶謀噭嘯相聚年深事遠十不記一然而磈磊不平鋒刺舋深者藏在骨髓請舉其梗概一二焉式自忠州刺史故太師奏授劍南西川度支副使後兼御史中丞又剖符蜀州是時貞元十八年也式因晝日昏睡如醉經宿乃寤詢其左右僮僕不知其所從來後逾年郤復使職會故使太師薨歿劉闢潛扇逆謀禍亂始胎式遂倖姦人之意為譎恠之語謂闢曰乃者蜀州昏病之中見公為上相盧文若為侍郎儀衛甚盛富貴極矣他日無相忘賊聞大喜布滿軍縣自以為神授非人力也賊每接賓客肆談論撫㣥邪申號令未嘗不以是為先聲自以為祥兆也豈不因式作異言鼓妖孽惑亂平人堅壯兇險不然何區區之蜀之寇王師討伐經費萬計崎嶇阻險留年乃拔何哉盖以式深為浹洽之辭激切嚚固不然何盤柢固根之甚也故使太師永貞元年八月薨其時乾度任殿中侍御史前使度支判官劉闢自攝行軍司馬節度留後九月初乾度被逐攝簡州刺史名雖守郡其實囚之明年四月追廻勒攝成都縣令其時授闢西川節度詔命初下東川之圍未解乃召募亡命兼收管內鎮兵張皇虛聲熒惑郡縣發兵七千馬畜三萬號為十五萬人轉牒盩厔以來縣道郵次酒肉畢具芻茭無匿署牒首曰闢副曰式參謀曰符載令下之日妖氣坌興下愚沸騰貪冒姦賞奔走叛命肩摩轂擊爭死恐後當此之時卭蜀震驚田野廢業竄伏山谷邑居人吏分散道路如此之時非得之於人皆親所聞覩時賊圍逼梓州之日又王師諸軍稍稍繼至猖狂兇寇不復張矣然嘗察式為人柔而善侫不顧不義不然何劉闢文若喬規符載皆咨諏執禮拳拳以事之以斯而言可以知其所止矣伏以聖上法維天之度崇納汙之宏雖元澤滂流鼓盪昭洗然易名之典在正根源苟非其人不可加美如式西蜀之事大節己虧缺矣何面目以求諡焉頃之為諡頗乖前狀請下太常重定謹議大唐元和十二祀睿聖文武皇帝御宇之十有四載戡定淮蔡之前年余出為銅陵郡守之去歲也江壤穠秀草木繁翠深流有沅湘七澤黿鼉息焉巨獸有犀虎貙象金碧生焉余嘗嘿眙由有所自盖以密邇靈囿仙源在中驗方志秦人獲天爵之所稽近聖元宗皇帝樹火棗之鄉風流好尚事見方俗觀有道流姓陳氏字通微夙稟命範師資於是師沒道存復嗣守焉耽虛樂靜志願斯畢時因暇日儼然造余曰靈山瑞相莫可勝載觀有祠壇土級三成每凍雨霖洒常多圯缺修建齋籙展敬無所今有微願欲改剏石壇竊惟少假餘光冀遂成立余即時回嚮謹奉仁敬乘流者眾而果有所成遂徙鍾簴於元宮奏鴻音於象帝洞壑皆滿靈風肅然陳君道友曰志言姓王氏研精守一叶力贊功志同之人樂此榮觀乃為謠曰靈壇肇址兮何代留秦人唱道兮因避仇我唐六葉兮天子聖金虬三檢兮遙申敬封山表地兮持彩旄真官陪雲兮五帝遊山藏瑞靄兮非所求偶見桃花兮隨水流猛簴嘷風兮棲洞樓停酸苦兮暢六幽中有道士兮飛金液泉澄日照兮抱虛寂化坤壇兮斷珉石齊夭壤兮煥琳碧我唐聖祚兮千億載隨師控駕兮方諸會步馬開成時為荊南判官咸通中擢太常少卿宏文館學士出為江南西道都團練觀察處置等使檢校左散騎常侍兼洪州刺史御史中丞某早拜光塵叨承眷與深蒙異分屢接清言幸曾顧於厚恩俯見循於末契去載分麾南楚拜節西秦思賢方詠於嘉魚棲止實慙於威鳳賓筵初啟曾陪罇俎之歡將幕未移已在陶鎔之下光生鄰部喜溢轅門豈惟九闕一字獲安斯亦一方多幸太和五年四月予自江東將西歸涔陽路出錫邑因肄業於惠山寺居三歲其所諷念左氏春秋詩易及司馬遷班固史屈原離騷莊周韓非書記及著歌詩數百篇其詩凡言山中事者悉記之於屋壁文則不載其寺會昌末經廢毀屋室殆無存者去年蒙恩自禁職出鎮鍾陵鍾陵與毗陵地不相遠而惠山居其屬邑間其寺復置會錫邑宰去年過此留宴數日今於予為故人因寓書請再題焉嗚呼自太和癸丑至咸通己丑三紀餘矣念邑中居人與僧居在惠山興寧兩寺者今無人焉染翰增悲復何言耳咸通十年二月一日江南西道都團練觀察處置等使中散大夫檢校左散騎常侍使持節都督洪州諸軍事兼洪州刺史御史中丞上柱國賜紫金魚袋李步馬題記大中十年春今丞相東海公自蒲移鎮於襄四十年詔徵赴闕今天子咸通五年公為御史大夫自始去襄於茲六年矣而襄之卒校民吏自七州之幼艾追思公之養育教訓相與上言京師狀公之事績請於天子刻之碑石用昭示於無窮於是天子嘉公之勤詔可其奏明年二月襄之父老請詞於公之舊軍副使太常少卿宏文館學士李步馬曰凡紀公盛德丕績文於碑石將傳乎百千萬年宜用聞見詳熟者則得其實步馬固淺陋今適當職而為之非以文用其敢於是承命退而敘之公名商字秋卿家世儒門修源長波流芳積潤自十五代祖諱欽十四代祖諱某兩世繼為中書侍郎十三代祖諱湛十一代祖諱孝嗣間代繼為太尉南朝之盛具在南史本傳生公七世祖諱文遠隋朝為國子祭酒皇朝為國子博士儒學尊顯名冠國史儒學篇高祖幸國學召博士講論春秋諸儒莫能對本朝司刑卿追諡忠公諱有功即公五世祖也自中書至司刑十葉服冕乘軒重榮疊慶光隆赫顯無與為比司刑當天后時累為法官用法平恕常以潛德陰功論出枉陷力排酷吏之勢盡忠竭節以保護皇室公能嗣之炳為元臣初公少時工學暇豫不為嬉戲嘗以生民休戚為已之任凡所經涉郡國土俗四民之業必皆詢訪而究詳之於其利病無所不通曉常曰使得一縣治當必為良吏矣始舉進士文宗五年春考登上第陞朝為御史會昌二年以文學選入禁署宣宗以北邊將帥懦弱不武戎狄侵叛公時為尚書左丞詔以公往制置安撫之歸奏稱旨尋授河中帥節又移襄陽公自初仕以至丞相華貫清級踐歷居多而未嘗履趨競之迹含光蘊德容貌若虛人皆汲汲我獨委順嘗任殿中侍御史丞入中書白事執政因問徐殿中果何如人丞曰今之賢人也執政曰然禮部員外郎缺諸公見言其人所言者或再來詣某有三至者徐殿中亦在薦中足未嘗及其門殆真賢人與子言是也卒以禮部與公始為內職不治民及受重藩使絕塞則用前所蘊蓄道以寬恕為本本於誠明吏民畏公之詳達而不敢欺戎虜感公之德惠皆願向服其來鎮襄陽也亦率是道故期年而仁信敷再朞而刑政省三年而帑廩實四年而禮義興風教備問民之所病及願欲而不得者必盡去而皆行之所行之政存而不朽者有八今具襄民之狀庶得傳其顯實云其一曰漢南數郡常患江水為災每至暑雨漂流則邑居危墊築土環郡大為之防繞城堤四十三里非獨築溺是懼抑亦工役無時歲多艱憂人倦追集公乃詳究本末尋訪源流遂加高沙堤擁扼散流之地於是豁其穴口不使增修合入蜀江瀦成雲夢是則江漢終古不得與襄人為患矣其二曰襄陽荊鄂十道之要路公私來往充給實繁是必率配行供假借辦賄求利歲月不堪公乃悉用官儲創置什器富供給費不擾齊人往來徒所憧憧邑人信皆不知矣其三曰軍人百姓窮困者多投狀陳論苦於從前債利蓋以數十邑公私債負不許停至於補累攤徵有加無減遂使家傳積欠戶率催足延及子孫例無放免飛走無路怨憤難伸官中曾無所收私室常被攪擾公乃縷悉上奏放免獲依債戶既除寃聲永息其四曰承前役納所由在田在城居側近者近百頃統謂之馬禾比每年配諸將官健出力營種率歲出功錢人不下六七百例入屯將所由官田元無所獲徒遺虛將額添市耕牛破費甚多收獲無幾公乃廢郤其地判租與人每歲所收郤耕種之利租人皆獲利使將徤永免工傭其五曰襄土疆濶遠連接江山每至秋時常多寇盜張旂結黨夜出晝藏謂之山柵擾害頗甚燒劫閭井驅率平人至於道塗皆須警備公乃選擇少壯官徤三百人別造營各為捕盜將常令教習不雜抽差訓練無時以為備禦每聞屬縣寇劫當時據數抽行晨往夕歸夜發晨至皆是并贓捉獲更無孑遺頓挫賊心鄉閭遂泰因創造捕盜將營屋四百間分為左右中間開報點集列垛置標別創一亭以為教試之所奏立將額門當通衢過客行旅莫不興嘆大中十一年諸郡搆亂起於湖南準詔徵兵同力剪滅漢南軍徵五百人克寸日成功實自捕盜威強之力又江西叛將毛鶴構亂比諸道最甚收復倍難成功當時韋宙僕射乘遞先至襄州奉詔令差兵助發遣所差五百人於數內全取捕盜將并差捕盜都將韓季友惣領兵士小路進發仍先揀擇通引官衙虞候史慶中與韋宙僕射為元從押衙齎榜帖先至江西安存百姓遂收劫亂兵器甲及韋僕射舟船至江州其韓季友請捕盜將官徤三百人開道分六路先去平明齊到人皆不知機計既行遂半日內面縛賊將授首者一十三人當日行刑傳首赴闕韋宙遂奏請且留捕盜將二百人在江西并奏請權差韓季友為都虞候二年之中重修置廨署城市皆捕盜將功力其六曰荊南中路有蠻水驛地當卑下泥淖常多暑雨之時不通車馬皆是結栰牽挽以濟公私行人力出編甿妨害農業繚繞甚遠兩縣勞辛遂徑捷就高別一路度宜造驛永無差儆之虞又近於當路十二里其七曰襄州兩稅每差綱官送納并有直進膠臘其數甚多例屬新官豈免敗闕陪備差遣擾害頗深每吏部注官多不敢受因訪問資綱大數可以資陪人遂請度支陸運月八人口搬䭾到京遣進奏院所由勾當輸納既免損汚疋帛又免上供失時襄州新官永無差役之弊其八曰漢陰驛西舊有江亭一所迎候皆於此前後窄隘不便筵宴所要鋪陳須至漢陰驛上廳內遂使前後虛豁難置門牕重客居停全無牀幅結束非便寢止難安遂別搆設廳以備迎送長廊虛檻連接大廳怪石脩篁羅列其所江波入戶畫舸臨軒信可謂勝遊之地也又重脩闥改制上廳夏凊冬溫憇息宜便別開過路繚繞江亭主客邀迎咸遂得禮因命新亭曰漢廣亭桂江所謂不朽之制凡公之為民於除害興利若屈到之芰子反之飲文王昌之蒲葅雖勞支體勤思慮含辛茹苦必行之未嘗一日而懈也故制貧民侵刻之負罷疲卒奸濫之政公之仁也訓驍勇以擒盜繕甲兵以備武公之義也具候館之器用豐饋勞之餼牽公之禮也決高沙之壅徙蠻谿之傳公之智也免屬官之綱致及時之貢利必舉害必除公之信也夫總五常以在躬之謂德德及於民之謂政功之被於物也淺則其澤易竭政之被於物也深則其久愈彰公之去襄六年矣民始懷公之德政而追思詠歌之得不謂之被物久而逾彰公之德乎與夫在治而民之謂疑者異矣公前治蒲亦由是德突厥居特峨山者千二百人相率自外塞渡河歸附於公朝廷以虜眾持疑兩端未即信納公乃召其酋長以恩信諭之虜皆泣下釋兵解甲伏以聽命因請從齊魯之間隙地以居之編籍為耕民奏置備征軍千人日令督習無有他役凡盜有新發無不立赴者又教其軍積紙為戰衣千五百領矢不能陷歲飢乏食民流徙不止於是告廩發稌豆麰賤出以救之完治城廨列樹表道用民之力而厚其酬傭濟活以萬數逾朞乃罷有禽俱巢於屬邑之樹其一巢者為鷙鳥所攫日暮㣥鷇哀鳴聞者異之憫其孤遽往食之愛均已子鷇鳥能飛而後去人咸以為至德之感及禽鳥焉故公前之治蒲其仁澤被於物也既如彼今之治襄其德政及其物也又如此庸詎知異日蒲人之不有相率聞於天子而請公之德刻於金石以傳乎無窮哉亦將必有采者矣謹繼銘曰公德之容宏深粹元公仁之豐沈積穠穠內愉外懌溥暢昭宣政以之和民以之安在昔羊公惟德之理有碑於峴實表厥美烈烈顯德蹈之者誰曠祀六百惟公繼之繼之者何愛民若子苞寒餔饑其急逾己日者大江淫至於民萬門之命將盪而覆是究是度惟公之規乃決巨壅大沴以移公之來朝民泣牽衣公進就路攀車從公專鹹鹺利無歸於私公長御史朝綱以釐帝曰汝賢汝可承弻公遜不答退惟讓卑帝心益嘉會襄人來請祀公德刻之於石帝曰賢哉汝真吏師政苟不惠人誰汝思嘉乃懿績遂命起之告示襄人謂爾咸宜帝德明聖爾言適時勿謂天高其神可欺勿謂室暗而公不知善不善報惟其所施爾不吾信視公之為蒲民之生實公是營襄民之富實公是覆漢波滔滔其注維東公思在人與彼無窮公澤惟川公壽惟山是禱是祝期千萬年崇碑峩峩揭於峴巔民望而思永昭後昆肅貞元中進士官坊州刺史擢司封員外郎清明廣大之謂樂度曲節奏由乎器既克諧於五聲諒同歸乎一致汶陽之孤篠斯有泗濱之浮磬云備吹噓爰發搏拊遄至等輔車之相依契歌詩之必類同夫影響常動靜而俱隨象彼壎箎每應感而不匱聯綿並奏聲音相和用不殊途方予唱而汝和動而相觸固無偏而無頗列其容異薰蕕之共器會其理若涇渭之通波載清載濁貫三才之合樂若浮若沉叶六律而揚音將九成而備曲比二人之同心如言行之相顧成乎慥慥冠鐘鼓之迭奏樂彼欽欽雅韻復興時則若舞鸞鳳和聲互應斯乃如鼓瑟琴音之作也曲無誤者爾合度鏘爾中雅寧有顧於周郎自不惑於子野訢合皇王之化跡混同車書於天下遠而聞也謂㣥鶴和鳴於碧空近而聽之如廣樂調韻於春風鏗鏘間發要妙無窮類金蘭之堅芳美而取媲配文質之彬郁和而且同何異夫相應在於同聲相資在於同志譬權衡之並用謂相待而成等韋絃之自節則以同而異原夫律呂咸在吹擊惟時異周旋而樂只可終始而從之兩器元通鳴簧與幽石相感二者冥合竹聲與石聲相追審至樂之盡美伊茲器之可持師素元和時人夫人姓周氏其族望本乎汝南今為陽羡中江里人也祖莊父俊皆不尚名宦抗跡邱園孝弟謙恭仁行昭著夫人淑慎貞賢溫柔令範自禮歸臧氏之室而琴瑟叶和遵孟氏之風規有班家之令譽嗚呼元穹降禍大夢忽臻未偕知命之年奄促泉臺之痛以元和十三年歲在戊戌三月四日終於義興平西里之私第享齡四十有四亦以其月甲申廿六日己酉安厝於中江血瀆東北之平原周氏祖業之園地蓋從龜筮也有子曰奉言始童丱有女二人長未及笄俱號訴之無依憾慈容之永隔恐桑田變易陵谷傾頹故勒記貞石乃為銘曰雙劍光芒兮嗟一沉鳳歸杳冥兮鸞孤吟撫稚子兮淚盈襟悲隴樹兮愁雲深元穎宰相如晦裔孫貞元末進士又擢宏詞元和中累遷司勛員外郎知制誥穆宗立超拜中書舍人戶部侍郎承旨長慶元年同中書門下平章事加上柱國封建安縣男罷為劍南西川節度使再貶循州司馬卒年六十四贈湖州刺史門下眷求輔弻期在濟時必惟才臣乃克成務况端潔剛毅可以肅具寮敏裕周通可以熙庶績外無飾虛之體中有效實之誠簡於朕心乃命以位朝散大夫守中書舍人翰林學士武騎尉賜紫魚袋段文昌門襲忠勳器包才傑廣而不雜峻而能溫脩詞每掇其菁英所尚者風格發言必探於指要所貴者變通識古今理亂之原知遐邇利病之本自掌文翰苑列籍金門出入五年恭勤一致屬朕初承寶命屢進嘉猷諒我憂惕之懷竭其公忠之力昨因召見更用咨詢造膝之言注意斯得必能奉將明之大任申獻替於虛襟爰升鼎鉉之司冀展舟檝之用於戲萬務之始九有所瞻將致治平可不兢勵爾其夙夜惟慮輔道朕躬使四夷咸賓百度惟乂阜俗必蘇其疲瘵審官無鬱其賢能理當詳於幾深道當固於久大惟自誠可以化物惟克已可以律人勉哉戒哉無忝我首命之重可守中書侍郎同中書門下平章事臣自去年奉詔命各據見在史官分修憲宗實錄今緣沈傅師改官若更求人選擇非易其沈傅師當分雖搜羅未周條目紀綱已粗有緒竊以班固居鄉里而繼成漢書陳壽處私家而專精國志元宗國史張說在本鎮兼修代宗編年令狐峘自外郡奏上遠考前代近參本朝皆可明徵實有成例其沈傅師一分伏望勅就湖南修畢先送史館與諸史官參詳然後聞奏庶使官業責成有終始之效傳聞摭實無同異之差問大禹求賢而夏德長茂文王多士而周道緝熙然則為政在人人存政舉朕德薄化淺嗣膺寶業夙興寅畏若涉大川求思至謨庶答天誡子大夫志行修潔學術通贍儲思於天人之際研精於大道之極儼然就辟良用嘉焉廼者夷夏多虞烽鞞屢警因之以荒饉生人蕩析比屋榛蕪今八表甫清萬兵未戢朕恭承丕緒實濟橫流期致和平惟新制度而成湯受夏周武定殷劉矯嬴弊魏乘漢俗以亂為理以安易危必有至政存乎令典同符今日可舉而行精辨所長著之於策禹謨之六府三事周法之八政五紀有守有為是彞是訓經綸遠古用彰得失國志詳載天官必書成務濟時莫斯為急並宜明勅功利別白條流較聖王之損益揆今代之用捨沿革之要茂對所宜今欲廢關市之征輕什一之法一作賦歸踰年之戍罷無事之官則國用靡資軍食尚歉人多胥怨邊有侵軼匠無良畫明示謀謨其法令或不便於時吏人將未適其任賢士見沈於負俗遺綱有補於化源可以均沃瘠於原田便工商於市肆改制徵物釐創見正復務官曹澄清流品使朝有濟理之仕邊有死難之臣而返俗廉隅還風樸略必書效實指陳利害授簡之外尚有令圖各罄所聞備申讜議虛懷固久勿隱予違對臣元㯋案周易君道下濟臣志上通謂之泰其繇曰小往大來臣歷觀書契以還君德定位未有遺斯道而能達聰明目光極鴻業者也伏惟陛下誕膺明命克敷文德親降大問詢於微臣愚臣智識庸鄙經術短淺不足以充明詔之言而隱罪大矣敢不俯罄愚衷仰謝萬一制策曰朕躬承丕緒實濟橫流期致和平惟新制度且成湯受夏周武定殷劉矯嬴弊魏乘漢俗必有至政存乎令典者臣聞湯革夏政野以質武革殷政鬼以文秦暴以亡漢寬以矯此皆古王之令典也比東漢既衰皇綱幅裂曹操挾天子以令諸侯用漢法以取威權中原粗平遂偷神器其政刑典禮踳駮前世固非蕭曹畫一文景更令之比也雖曰革命固無足采陛下承匕鬯以取大器赫雷電以掃㣥兇功高一戎業定再造欲維新制度以救生靈幽明動植罔不稱慶實天下幸甚然臣之私心有願獻替不憚斧鉞以干龍鱗伏惟陛下少留意焉臣聞自古王者易姓受氏告成於天則維新制度以改人視聽所以示亡王之驕僻也所以揚造邦之耿光也其餘少康復夏武丁興殷武王興周光武紹漢則皆舉用舊典以昭其先朝之休德淳茂也以辨其兇逆之滔天干紀也以志其昭前之光而纂修其德也我高祖勤恤人隱始除暴亂而建王業我太宗叶贊經綸增輝先聖皇天眷祐祚以名臣於是酌之人心參之典禮立我王度為萬代業陛下誠宜恭以守之勤以行之克配彼天立我人極矧乎周秦漢魏造邦之事非臣之所宜言也臣又伏見去歲徵臣等詔書聖旨殷勤憂天謫見今制書首章則曰求思至謨以答天誡次曰期至和平維新制度下曰改制徵物釐創建正臣伏念聖上豈不以彗有布新之道明欲承順天意旌於國章乎臣愚以為自古災眚多矣大者天地震裂次者日月薄蝕小者星辰變謫皆或應或否繫於其君之德也夫嚴風不能凋翠葉凝寒不能冰醇酎何則不當凋者風則何有不當冰者寒亦胡為然則災眚者天道之常無德者當之不為有道者害亦已明矣陛下若欲寅畏上天大為恭禦則德為之實而禳為之華居其實不居其華此社稷之景福也制策曰禹謨之六府三事周法之八政五紀有守有為是彞是訓經綸邃古用彰得失國誌詳載天官必書成務濟時莫斯為急宜明勅功利別白條流者臣聞夏禹之弻成五服也肇謨六府三事周武之誕敷明命也實陳八政五紀語其功利其六府者人仰以生三事者德據以成八政為經國之用五紀為歲天之道別其條流則曲直木也從革金也水以潤下育物火以炎上同天土順則五稼阜滋穀登則烝人乃粒直已以正德理財以利用務本以厚生此九功所以惟敘也八政食所以生人也貨所以聚人也祀所以仁鬼神也司空實平水土司寇實詰姦慝司徒實敷五教賓以叶多方師以具七德此先王保乂萬有也周星者歲之紀合朔者月之紀信旬者日之紀星辰以察乾象歷數以授人時此先王所以合德二儀也得其道者王失其道者亡古今雖殊其致一也陛下執古之道馭今之有降此彞訓以及於臣但稟師說難副睿問制策曰較前王之損益揆今代之用捨沿革之要茂對所宜者臣聞貫古今蔽天壤而不可易者道與德也時損益而皆便於理者名與物也所以無體之禮無聲之樂倚道之主莫不襲行其餘正朔服色聲名文物則三代已降逮乎陳隋各從其所尚爾伏惟陛下視其善者用之其不善者舍之此沿革之要也制策曰廢關市之征輕什一之賦者臣以征關市稅什一者古今通典苟不踰轍無害於人誠宜取之以資國用陛下明欲廢之輕之以息黔首甚大惠也然臣以為百姓之患者不生於此生於法令不一賦斂迭興名目滋彰杼柚皆盡爾今王畿之內外地州縣亦不當賦穟者何有鎮守團練等使數州又置節度度支使皆多聚強兵增置部伍車禾斗米皆出於人計其誅求十倍王府至於睚眦之際不戢自焚殺長吏夷城郭者又亦多矣卒然邊陲有難羽檄交馳必不得一人尺鐵以資天討伏望陛下下曠然之詔使內地州縣悉依平時舊帥故老盡罷以息疲人則天下賦稅十減七八矣制策曰歸踰年之戍罷無事之官者臣聞王卒以舊楚子所以敗也將驕卒惰項梁所以亡也今緣邊將士功已高位已重進不求賞退不畏刑伏望申命將帥言於軍中有思歸者內以新卒代之願充軍者復以師律整之夫如是則軍政必行則邊無侵軼矣臣又聞賞功以貴任能以職古之道也伏見比歲詔旨諸員外兼試等官才者能者改授正員其餘並依本資數進陛下已得八柄馭功之道矣微臣又何間焉制策曰法有或不便於時吏有或不適其任賢士見沈於負俗遺綱有補於化源者此皆經國大體則當與朝之衆君子議焉臣位卑識寡何足裨補然臣以為令合於經而人悅之者可存也令為救弊而作行已久而猶未安之者可省也若乃申黜幽陟明之典則吏人砥節矣遵棄瑕錄能之義則俊乂効職矣若王綱者布於方冊顧在陛下行與不行何謂之遺矣制策曰均沃塉於原田便工商於市肆者臣聞度土功因地利所以惠衆人也禁末作絕竒貨所以惠工商也其要在於申明田令與不擾市人耳制策曰改制徵物釐創建正者伏以國家受命向二百年憲章典禮并吞千古今陛下嗣聖御極孝理君臨華夏既平思欲改制此皆先聖舊典臣竊惜之臣又聞夏以木德王而正以人統殷以金德王而正以地統周以火德王而正以天統孔子曰夏正為得天此不易之道也制策曰復務官曹澄清流品者臣聞設官分職以蕆王事猶列宿定位同拱北辰也伏見艱虞以來增制使額類官有二事人無底從銷錢銷食十場十擾今陛下欲使復務於官人志所底此為政之本也臣聞政以賄成則廉者貪匪直其道則貪者廉此仕進之情也今聖慮及此孰不潔其源而浚其流乎制策曰朝有濟理之士邊有死難之臣者臣聞舜舉臯陶湯舉伊尹則仁者至矣今賢才夾輔俊乂揚庭猶滄海之富珠璣崑山之積瓊玉但恐未察耳伏望聽政之暇引備顧問則十六相不專美於堯代矣臣又聞子驕者不志孝臣驕者不志忠伏望陛下訓將帥以禮示師徒以義則仗節犯難者孰變其功乎制策曰致俗廉隅還風樸略者臣以為非理也其化也於朝廷公卿大夫孰不尚退讓崇節儉而率土之士疇不從風而靡乎制策曰授簡之外儻有令圖者臣以為當今所務者在於興禮樂務耕稼禁游食抑奢侈其餘則詔書所以問臣纎悉矣謹對聖明以文明敷於四海詳擇文學之士置於禁署實掌詔命且備顧問又於內廷選端肅敏裕邁乎等倫者為之使有二員進則承睿旨而宣於下退則受嘉謨而達於上軍國之重事古今之大體庶政之損益衆情之異同悉以關攬因而啟發若非有達識有精材一心守公百志根正則曷能保維密勿之際傳導吁俞之間哉故嘗由是職必極其位有若今之右軍梁特進樞密劉監焉當先聖躬勤萬務志清九有築壇互登持柄驟移贊命於是乎出號令於是乎發急宣密付波至飇去二使之任尢所重難乃以今內給事李常暉內謁者監王士政繼領其職既而掃殄淮蔡廓平海岱有魏以六州底貢常山以二郡獻地北逐犬戎南剪溪蠻凡兵事之所會符檄之所至籌畧之所授告諭之所加決於一言歘以萬里得失以之而定安危以之而分降自九天之上行乎四海之外無不面奉宸斷兢兢跼蹐喘汗之中揣切必究毫芒靡失不有絕人之神用其孰能處於此乎勤勞夙夜亦云至矣我皇初纘寶祚特加寵獎榮以金印紫紱玉帶之賜尋又就遷命秩勳階兼崇蓋舉勞以行賞也爾其聳善嚮義愛才好直周旋蚤暮率履無越每聞激忠之詞及有所論必加慰勉欣喜外形此又列內庭者所共幸也至於增葺院署使㣥英有游處之安栽培松筠使多士有吟翫之適表裏融暢始終堅全固不易得也若無題敘則將來者何以景行之因移學士舊記遂徵前院使之官族斷自元和已後列於屋壁焉
