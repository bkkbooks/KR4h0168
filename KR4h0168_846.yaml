  text: 全唐文欽定全唐文卷八百四十六牛希濟二
  hash: sha256:e7ba8ea938f2e22f040c08a677780bc67521d76975c9993f7e815253c6bf616c
body:
  text: 漢室中葉戎狄侵軼之患邊郡略無寧歲兵連禍積歷世不己天下以困國用不足榷酤租算之外方許民間竭産助國出金贖罪貨鏹以為郎以為經世之術救弊之務逮至桓靈之世天子要之百萬然後用為三公崔烈常以賄求備位於公輔問其子外以我為何如對以銅臭之説垂於前史然近之人主無桓靈之僻自咸通之後上自宰輔以及方鎮下至牧伯縣令皆以賄取故中官以宰相為時貨宰輔以牧守為時貨銓注以縣令為時貨宰相若干萬繩刺史若干千繩令若干百繩皆聲言於市井之人更相借貸以成其求持權居任之日若有所求足其欲信又倍於科矣爭圖之者仍以多為愈彼以十萬我以二十萬彼以二十萬我以三十萬自宰邑用賄之法爭相上下復結駟連騎而往觀其堆積之所然後命官權幸之門明如交易夫三公宰相坐而論道平治四海調燮陰陽為造化之主方鎮牧伯天子藩屏以固宗廟社稷之重刺史縣令為生民教化之首率皆如是不亡何待度其心而聞其謀即皆販婦之行一錢之出希十錢之入十萬者望二十萬之獲三十萬者圖六十萬之報盡生民髮膚骨髓尚未足以厭其求漢之亡也人主為之國家之禍也權幸為之或曰兆其釁者崔氏之子為不朽之罪人乎武帝開之於前桓靈成之於後以至今日踵而行之而己且烈之世不聞教子以義方不能遺子孫以清白多藏若是俸祿之所獲乎不及於昆弟親戚矣不施於鄰里鄉黨矣其賄賂得之乎今日用之以遠不亦是乎且桓靈之世國家既危喪亂日臻烈能盡用以榮其身他日之家牒且曰烈為相矣不如是亦㣥盜之所奪乃積之者過非用之者罪也被髮而祭於野者辛有知其必戎作俑者其無後乎仲尼懼其徇葬蓋知防其漸之日也明明天子許而行之何罪之有崔子素無異聞貪榮固利者小人之常也不施於親戚自圖於爵位者亦小人之常也何足加其罪有國家者不以仁義而務財利之道許而行之斯不可矣不許而自行之而不能知之又不可矣是亦覆國家者不亦過乎或曰治亂者天之常也是以十年一小變三十年一大變至於蟲蝗疫癘水旱兵革皆時之數也若其聖人亦不能免是不然也何者天之於人也至仁而信其資長百穀草木觸類之物皆所以仁於人也故懼物之不生也春以發之物之不成也夏以長之物之不齊也秋以肅之物之不實也冬以堅之物在陽畏其暵也故夜長以雨露潤之在陰畏其終也故伏陽以蓄之人之不知止也故晦明以息之人之不知時也故馳疑時以警之日月星辰雷電風雨霜露之作無不私於人也焉有為蟲蝗之時以害其禾稼為水旱之時以蕩其生物為疫癘之時以毒其性命為兵革之時以流其脂膏者上天垂象昭鑑萬物之情始兆高明之象已著未嘗不丁寧先示之於人俾知者通其變而修其德以為之防知而不修夫何言哉聖人所以觀乎天文以察其變又曰先天而天不違後天而奉天時又曰則天之明斯其旨也故天子有日官諸侯有日御皆所以達變於其君若聞祥而逸福必為禍見禍而懼祲益為善物無必定之災桑穀乃中興之道數無可保之福烏雀為滅亡之運其或有戰爭水旱災沴之世皆生民之所感曾無時日之限而及之也且民之所為也繫時君之教化若以忠孝恭儉為治皆可封也暴亂聲色為好皆可誅也居時之和為可誅之教上帝之仁且不能祐膺時之亂為求治之具神明之力必可以恕或者曰三皇之世不能無戰爭堯湯之君不能無水旱豈聖德有闕歟蓋時使之然也夫戰之大者孰踰於版泉不周之役人謀之可與乎兵力之可支乎卒滅於有德水旱之數豈過於堯湯之代人無飢色國有常歲若今之世一年之水一年之旱豈惟人不粒食國無儲矣焉能感治水之命有疏鑿之功為桑林之牲契禱祈之願若時數之必然即當數足而後已豈復有中救之道是知天時不能違於聖德明矣至於長吏為一郡一邑之政飛蝗尚不入其境醫門以藥劑之和可以拒時之疾又若時數之一概寧有擇其地而遺其人哉況宋景一言之善罰星退舍漢之盛德日馭再中其餘感應之迹布在方册是以知天道甚遠人事至近又易衍履之説曰素履貞吉幽人之貞所履若吉幽人尚且不懼況聖人乎希濟以為治亂無時惟人君所行求治則治忘理則亂雖復求治積年一日違之禍不旋踵國亦如之皆非拘忌之家所能執必矣晉獻公子九人聽驪姬之譖也太子申生縊於新城重耳奔蒲夷吾奔屈盡逐㣥公子唯驪姬之子奚齊及其娣之子卓子留於宮公疾病召荀息將使立奚齊荀息曰臣竭盡股肱之力加之以忠貞不濟則以死繼之公曰何為忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也公薨荀息立奚齊里克使人殺之喪次荀息將死之人曰無益也不如立卓子荀息又立之里克曰三怨將作秦晉輔之子將如何荀息曰吾與先君言矣我欲復言然謂人己乎里克殺卓子於朝荀息死之邱明褒之曰詩人有言曰白圭之玷尚可磨也斯言之玷不可為也以荀息有復言重諾之義夫荀息晉國之大夫為執政之臣顧命以立其君人能殺之己不能討之是闕於國再立卓子以偷其安里克之告又不得誅以害其主雖曰復言何歎之有且獻公以荀息為執政也以荀息為能賢也而屬之二子令二子無辜而死是荀息之不賢所致其無乃辜先君之托孤之寄乎且己以大夫也不宜從君於昏而立幼稚知諸子之賢不能立之以利於晉為國家長世之計乎比周於姬氏之黨乃嬖寵之黨也立二君而不能定其位縱其賊以致亂於其國若亡之黨不可以立乎非己智力之能全也其輕許之乎是輕之言而許之是貪其位而固其權復言以死之子其不死人闕以誅之於子矣大國之人不能保其身知賊不討不可謂之忠縱其為虐不可謂之貞事嬖寵幼弱之子遠伯王賢哲之君耦俱無猜其若是乎若㣥盜力爭不能計勝而死猶將賢之若不能討賊無謀自殞將何以尚之哉匹夫匹婦死於溝壑者無以異之凡顧命受遺之日擇長輔少之道非伊周之才智且將不濟豈荀息所能也是以憲宗彌留之日內外疑恐姦邪之人畏憲之明復誅其黨有來中書與裴晉公語及大政者公勃然曰當問大臣此非殿中事告者遽退杜黃裳時為庶子亦以玉佩繫上陽周問太子安否及臨慰勸之曰冡宰大臣前揭喪巾覩天顏哀毀之狀莫不相顧而泣又喜萬國之得主也即深謀遠慮於防微之道如是之備及後國家以副君之命必有社稷之難遺詔擇立以為之常蓋不由大臣之謀始也皆左右近密建議奉迎位既及定乃命百辟以行大禮始謀之臣即新君受賜之地遷之重權委以大政南北二軍歸其肘腋九城之禁由其管鑰若明然公議者尚可知其諫主及後誅戮嗣王之英武者或擇幼沖之可教其議立之父輪告不實之狀循環署其名民間謂之車轂狀宦者謂之金輪圖常有請趙公同署名者公歔欷流涕不忍執筆其子曰事既行矣禍不可變一家三百口在於今日大人何疑之有請筆代署時宦官畏大臣不從必興誅戮當動搖天下及見其名莫不喜悅由是驟命其子以居清列終致權闕閹豎傾覆宗社皆趙公之所為也或曰趙公之生也由不如荀息之能盡其生也生之與死皆亂國者何升降之有二子者可謂異代而同罪邱明之褒不其謬歟衛莊公寵州吁也且又縱之石碏諫曰臣聞愛子教以義方弗納於邪驕奢淫佚所自邪也四者之來寵祿過也君若與之即將定若猶未也後將悔公不聽州吁竟殺其君而自立石碏之子厚與州吁遊禁之不可春秋之世有弒君之子或朝於王預諸侯之盟不復加討是以厚問定君於石子曰王覲為可曰何以得覲曰陳桓公方寵於王若朝陳使請必可得也厚從州吁如陳石碏使告於陳曰衛國褊小老夫耄矣此二人者實弒寡君敢即圖之陳人執州吁於濮石碏使其宰獳羊肩蒞殺石厚於陳君子曰石碏純臣也愛其君而厚與焉大義滅親其是之謂乎父子之道天性也君臣之道人義也石子諫莊公也以義方教子厚之為也無義方之訓哉且厚非弒君之謀為亂之首州吁既立仍從之遊州吁之為君也命石子遊必將從之況於厚乎已為大臣國有亂賊而不能討之忘其君也父子相欺以成殘忍之計是忘其親也為臣不忠為父不慈將使衛國之人父子相爭屠矣是以先見之明知州吁之必能為亂也當戮力以誅之豈止一諫而已哉知石厚必從惡也當嚴毅以討之無使必陷於戮不能救亂以安其國不能謀君以全其子莊公之亡也州吁之戮也石厚之死也皆石子忍闕況其君乎或曰周公之誅二叔聖人之教也石碏之棄愛子賢人之事也若不如是將何以止於亂乎夫周公知二叔之心不利於成王必危於宗廟故先除之以保天子之尊以安大本豈若石子弒莊公而後欺而誅之日磾怒其子與宮人戲蓋防淫亂之本以靜於國石子成其亂而誅之必不使從篡之黨而後誅之也然周公聖人也日磾賢人也知其必至於亂皆不得已而行之且周公日磾防其亂而先誅之以靜於國石子成其亂而誅之無益於理反為相欺之計殘忍之行無父子之慈滅天屬之道且厚能問其父以定君之計是知是非理亂之理也是尊父子之道無疑父之心也疑父之心逆天之道也今乃欺之令朝於陳以行誅討斯人心之熟忍之矣不若告其子以理且曰州吁為子弒其父為臣弒其君也天地所不容者人之子不可與之為伍也是以吾禁子之遊且吾為大臣欲誅弒君之賊以報其國不討其賊是吾有殺君罪也能使州吁朝陳且勿往我將報之石厚尚能求計於其父豈必陷父於惡若然者可以保其子全父子君臣之道矣今石碏以殘忍之性亂君臣父子之理以安其身以求其名而曰大義滅親為罪莫大於亂國不孝莫大於絶嗣今石子亂其國而殺其子矣及後樂羊為魏將伐中山中山殺其子而遺之一杯羹樂羊坐於幕下食之以盡乃拔中山文侯賞其功而疑其心貪其功忘骨肉之痛蓋石子之流也屈突通當隋室之亂未從王師太宗使其子召之通反弓射之曰昔與汝為父子今與汝為仇讐既而捨弓矢於地再拜號泣以別隋后曰臣智力俱困非敢負陛下也然後來歸此又能全君臣父子之道也且能殘其子為仁義之人者未之有也為仁義之人能殘害其子者亦未之有也邱明修千載王化之文欲開父子相疑之心親親相滅之理大非聖人之心乎朝廷求賢之道備於往古以經學文藝之流凡設十有二科以待之郡國每歲貢士盡應其科其外諸侯各舉所知以為裨補聖世奏章不絶於明廷爵賞實煩於王命當承平之時卿大夫家召傭書者給之紙筆之資日就中書録其所命每昏暮親朋子弟相與候望以其升沉以備於慶賀除書小者五六幅大者十有二三幅每日斷長補短以文以武不啻三十餘人一歲之內萬有餘衆或考秩遷滿或方伯慰薦或伐閲功勞或升奬舊勳詔制之辭必嘉其官業賞其才藝褒其行實敘其勞績無一日不為之未嘗得一賢士與天子共治於四海未嘗得一賢將與天子鎮靜於二邊非求之不廣薦之不至也豈五百年一賢生世哉夫畫餅不可以充飢誦藥不可以愈疾蓋無其實而有其名使之然也自朝廷及郡國諸侯之所舉皆無其實將如之何嘗試論之自文藝之流假手於人投擲於公卿之門者率不能知其偽公試之地尚復乞貸經學之子考帖之時預有歌括問義之日一席之內對者六七皆誦本疏別無新意更相救助發起義端有司但記其屬求之也以為之去留即經學文藝之謬也如是況漢世公卿大夫皆以通經對策名動天下然後登用或居諫諍之列或處燮理之任朝廷每有水旱災沴彗孛陵犯日月薄蝕必引所通經義證據以為之救殆與今日之經學者異矣若文學侍從之臣必選於切問近對之才必本於諷諫理辭之要故其文章傳之至今又與今日之辭賦者異矣郡國所送㣥衆千萬孟冬之月集於京師麻衣如雪紛然滿於九衢是非相難固不可知矣諸侯所薦率皆應權幸之旨承交遊之命取其虛名奏署謂之借聽取其謬舉之説謂之橫薦凡四方表函達於中書者必可指期於清貫美秩名邦劇邑諸侯之薦士宰執之命官豈唯平生未交於一言蓋見其姓氏而己豈能托實哉官達幸門易如秋草能復貴賤之別闕冠裳之重矣朝廷委輔相之權衡覽諸侯之章疏視其文信其人以為薦公孫宏董仲舒之學也相如枚臯之才也冉季政事之能也孫吳將帥之略也時君既不問其實安可不信大臣之言從而與之上下相蒙其何以濟且姬周之世薦賢者多受賞魯史有之矣魏晉之日門生故吏有罪必連坐舉主史有之矣今薦賢之賞久己廢矣連坐之典又不行矣況今之所舉非徒古者知之審取其必達取其必富貴闕如一死生不變之為誠明也薦其為將也覆軍擒帥伐國獲地然後以為得薦其為相也富國安人來諸侯之朝成霸王之業然後以為得今之舉士為筮仕結綬之漸一命一官而己他日之功過皆莫知也薦人用人之道何以得其賢矣昔孔文舉薦禰正平以為堪任大臣有臯陶稷契之才漢后委而棄之竟不能知其道之否臧狄仁傑薦張柬之有宰相業武后用之為相果能克正唐祚有中興之功文舉之薦禰衡也委而棄之仁傑之薦柬之也舉而用之豈繫吾道之廢興豈繫歷數之理亂乎然用之則如此不用之則如彼騏驥伏櫪安能千里之步龍泉在匣孰知截玉之利悲夫用與不用耳士之於世不可期於一人之知己者苟有知者甘心死節尚且不疑況復升榮顯之中行心胸之事安人之安而存隨之利人之利而亡有之利天下者以利己之厚者也利百姓者乃利其身之遠者也君子之人豈不利其身哉為國家得人則理失人則亂古今不易之常理安可不以求士為急詩曰濟濟多士文王以寧以四海所歸之聖尚假多士之力況中庸之主哉易曰君子不家食吉仲尼以天縱之德猶思賢者與之共食況尋常人哉又曰皎皎白駒在彼空谷蓋遺賢之歎也又曰束帛戔戔賁於邱園蓋求之於野也賢人君子何代無之哉上之人其求之以道既不廢於朝夕於所薦不公所用非賢將難以至於理當在申明上賞連坐之典以正之姦邪攀援之路漸將息矣一舉之妄後當自獲其辜知有畏矣在位者斯有賢者矣有道之士爭趨之矣禹畫九州列貢輕重舉賢用才咸在其中故周官司馬得俊造之名乃進於天子謂之進士又天子於射宮以擇諸侯所貢之士若善者乃受上賞不善者黜爵其次削地得預於射宮以射諸侯之義而為諸侯所舉者重所用者大漢法每州若干戶歲貢若干人更以籍上聞計州里之大小材之多少謂之計籍人主親試所通經業策問理優深者乃中高第有行著鄉里辟選自古而然漢世得人於斯為盛國家武德初令天下冬季集貢士於京師天子制策考其功業辭藝謂之進士己廢於行實矣其後以郎官權輕移之於禮部大率以三場為試初以詞賦謂之雜文復對所通經義終以時務為策目雖行此擢第又不由於文藝矣唯王公子弟器貌奇偉無才無藝者亦冠於多士之首然相士之道備嘗聞之有門閥清貴者有狀骨卿相者有容質秀麗者有才藻可尚者有權勢抑取者有朋友力盛者機權沉密詞辨雄壯臧否由己升沉在心㣥衆必集其門若見公相來交請友識面為難動必有應遊必有從密處隱會深誠重約朱門甲第之間鬼神不能知者盡知之雖名臣碩德高位重權可以開闔之可以搖動之可以傾覆之有司畏之不敢不與之者言泉疾於波浪舌端利若鋒鋩所排歿九泉所引升霄漢默默無言衆必謂之長者發中心病時皆目之凶人秋風八月鞍馬九衢神氣揚揚行者避路取富貴若咳唾視州縣如奴僕亦不獨高於貴胄亦不賤彼孤介得其術者捨耒耜而取公卿乖其道者抱文章而成痼疾朝廷取士之門於斯為最衰世以來多非其人明廷無策問之科有司亡至公之道登第之人其辭賦皆取能者之作以玉易石羊質虎皮闕抱憤之人汨沒塵土天九重高不可以叫加以浮薄之子遞相唱和名第之中以隻數為上賤其雙數以甲乙為貴輕彼兩科題目之間增其異名至於傅粉熏香服飾鞍馬之費多致匪人成於牧宰取資貨以利輕肥朋黨比周交遊酒食亂其國政於斯為盛竊願明君賢臣悉力同心大革其弊復以經明行修為急所謂斥彼浮華敦其茂實儒風免墜不失取士之道堯舜興於犬畝之中以仁義而得天下曾顏非諸侯之祚以德行而居儒道之首以曾顏比之於天子天子喜之以桀紂比之於匹夫匹夫怒之豈在其貴賤之位哉為仁義一日則為君子不為仁義一日則為小人豈在世載相襲冠裳相承吁哉蒲輪不往諸侯之家束帛不在闕庭之下皆巖穴隱逸之人行仁抱義之子化之於鄉里聞之於郡國達之於朝廷然後求之豈在卿大夫之子哉諸侯鄉飲之禮敬年尚齒使少年知禮老者獲養修長幼之道也天子太學父事三老兄事五更教人以孝教人以悌興教化之本也文不以爵祿為差也況布素對策名聞於天下者有之矣徒走以取公卿者有之矣鄭康成捨胥吏之役歸為儒者黃叔度牛醫之子以德行聞今服冕之家流品之人視寒素之子輕若僕隸易如草芥曾不以為之伍寒賤之子能以道德自尊文藝自將見之若敬大臣避之若逢摰獸又不自審之所致也堯舜何人也猶將比肩其道流品何人也余何人也曾不自敬其身故且朝為匹夫暮為卿相者有之矣朝為諸侯暮為餒鬼者有之矣道之用捨在於我而已是玉之美者不産於廊廟之下為瑚璉之器材之美者不出於里閈之內為棟梁之用士之美者非貴胄之子而登卿相之位況投竿而為王者師挽車而為王者相豈白屋之士可自遺之哉王者列官分職以成庶政材不可失官不可曠故銓者以慎擇為目衡者以公平無私或失於是豈稱其本自周室以司馬宗伯選士漢魏晉宋降及國朝委吏部擇官上自郎吏下至丞簿皆稟之銓注科名入選品秩所蔭勳伐授任四方奏薦加黜伸書易名取姓其為猥詐不可勝紀以天下之大九州之衆職官將萬餘員令長簿尉官秩至卑理民與下最親朝廷輕之委有司而已今吏部自尚書至郎吏五人抱案者向百餘輩桀黠詭譎必出於是視其官屬如弄嬰兒若啖之以利即左右手之不如皆舐筆署名且未之暇焉能得其過者掄材為官久廢其事為人擇官殆無虛日其稍留心者止於詰其廕緒循其資歷黜其升遷求其殿犯豈有問其為政之本為理之道至若試以章判拘以棘圍鬻文之徒偏得其便乞憐之子略無愧容大為笑端不可以取亦有居清官苦罷無資財考秩既深然後送堂時宰視之不成芻狗區區風塵殍死者衆胥吏賄賂之交填咽街巷聒於耳目清資劇邑必有主者朝列之中以樂為之某官若干萬錢某邑若干束帛公然大言曾無畏懼憧憧政路指期而取某之官也納賄償債且未之能豈復為政為理是以生民致困歲月雕弊逋逃林藪竄伏萑苻小者掠行旅大者破井邑天下九州蜂飛蝟起以至於阽危宗社夫衆庶非樂於遠父母棄妻子而為盜賊甘心於白刃之下生業既亡飢寒是逼遂陷於此皆為政之驅也持衡者得不以銓擇為急史記以衛青為大將軍門下賓客蘇建常責其不招士青言自魏其武安招至賓客天子常切齒夫選賢任能乃天子之柄豈臣下之所為哉太史公亦美其慎重豫竊未然之夫諸侯貢士載在禮經一與再不貢有黜爵削地之制則當位者其可默默乎且魏其武安之厚賓客非有賢智士也皆任俠之徒以力折公侯為能以權傾州縣為重如是則天子安得不切齒哉蕭何薦韓信王陵舉張蒼鮑叔舉夷吾子皮任子産如有益於國濟於時豈天子之能罪哉其後武帝詔於青問選士青但欲以富賈金多者皆應命賴賢大夫趙禹知其事召問其故皆聶聶然罔審是非與土偶無別遂悉命其徒於末流中得田仁任安武帝與語大悅皆擢用之若武帝常切齒不當於青之門下選士也得田仁任安協於上意亦不當罪青之門有人也武既不然而青以為切齒無乃誣上之言歟抑唯欲聚富金多財者歟抑吝其金帛或招致賢彥有所費耗歟若然則出塞之功無乃幸而成者歟小功不稅制於古行於今然古儒今儒終以為不可何也由不為辨後所以惑也古人不可者曾子曾子曰小功不稅則是遠兄弟終無服也而可乎説者云以為依禮小功之喪日月已過不更稅而追服則是遠處之親聞喪恆晚終無追服言不可也今之不可者韓文公以為小功之親多而未疏又不比古圖國分境狹今之遠者或數千里之外是愈無追小功者矣亦不可也夫禮始於文武制於周公定於孔子此聖人貫萬行極人情其為五服之説宜己謹矣彼曾子仁厚純篤之行以禮為薄而私怪之爾禮所以文制云定者正為此也恐厚者過焉而止之謂也恐薄者不及焉而限之謂也昔子路有姊之喪可以除之弗除也曰弗忍孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之子路弗忍獲正於聖人而後無惑曾子欲稅小功亦弗忍不幸不獲正於聖人使惑者至於今弗解也韓文公可謂與曾子同志而未思於周公孔子者
