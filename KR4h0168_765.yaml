front:
  text: 全唐文欽定全唐文卷七百六十五遠會昌九年官尚書司門員外郎
  hash: sha256:5c9374aef6994ec6a1a82fad6a6243ccdac46a3b99980cb7ebfa6886f99f0390
  markers:
  - {type: head, offset: 14, content: 李遠, id: KR4h0168_NFKB_765-h1, level: 1}
body:
  text: 勿謂乎蟬之至微能變化以知機因挺質以竦拔遂脫身而奮飛餘殼連拳抱緑葉而猶在新聲響亮噪清風而不歸原夫深穴初開空庭始夜步凌兢而微進形磊磈而將化託身而去上風篁投迹而來緣月榭履險微駐愁危却下纎枝不定懼裊裊以頻移弱蔓難窮騰搖搖而盡亞於是輕軀暫息一足才容時驚鬥鼠乍怯鳴蛩局促而初安利爪逡巡而欲改前蹤想黃雀之飢腸先憂見捕念螳蜋之怒臂預恐相逢已而踧踖拳形穹隆奮質既罅發而微斷若苞開而漸出擘肌分理有謝於昔時露膽披肝請從於今日騰超稍異竦擢如驚新緌薄嫩舊翼羅輕觀腋分之拆裂訝脈散之縱橫嗟纍卵之勢危方求上達歎含風之力寡未敢先鳴及夫據嶮形柔拏空股戰方疑乎蠖屈終類於龍變洞胸達腋玲瓏而素甲皆虛潔已全身輝赫而元光已遍俄分曙色似遇良時便有凌空之意還生去故之悲嘒嘒而頻遷碧樹凄凄而若紡寒絲響繞晴雲傳楚岸之風遠聲催晚景怨陶家之柳衰至若委蛻難留沖虛已久體將泰而是望皮不存而何有儻假一枝願飛聲而不朽昔蜀郡之司馬相如指長安兮將離所居意氣而登橋有感沉吟而命筆爰書儻並遷鶯將欲誇其名姓非乘駟馬誓不還於里閭原夫別騎留連鄉心顧望銅梁杳杳以橫翠錦水翩翩而迸浪徘徊浮柱之側睥睨長虹之上神催下筆俄聞風雨之聲影落中流已動龍蛇之狀觀者紛紛嗟其不㣥染翰而含情自負揮毫而縱意成文渥澤尚遙滴瀝空瞻於垂露翻飛未及離披且覩其崩雲意以立誓無疑傳芳不朽人才既許其獨出富貴應知其自有潛生肸蠁之心暗契縱橫之手於是名垂要路價重仙橋離離迥出一一高標參差鳥迹之文旁臨綵檻踴躍鵬摶之勢下視丹霄既而玉壘經過金門寵異方陪侍從之列忽奉西南之使乘軺電逝於遐方建節風生於舊地結搆如故高低可記追尋往迹先知今日之榮拂拭輕塵宛是昔時之字想夫危梁蘚剝漬墨蟲穿長含氣象久滯風煙幾遭凡目之見嗤徒云率爾終俟王褱姿之後至覺始昭然所謂題記數行寂寥千載何搦管而無感如合符而中在警後進而慕前賢亦丁寧而有待曜靈正中交易必萃諒農皇之善制著噬嗑之明志蓋取諸酌中以畫一用取夫定準於列肆遂得販繒之子候當午以員來抱布之徒恐移㕓以忽至於是旗亭滅影賈旅協時睹稠人之並湊測端景以交期雜錯相酬而豈畏日之將夕貿遷以退寧憂其室信遠而是前王之所則實後代之攸資當夫相高以夸美言為市競駕肩以求進爭掉舌而明旨貨聚於未央之標州處於已逾之紀咸寸陰而時惜望兼贏以畫履衆寶麕至族蟻同風當大明之方盛求善價以不窮葵藿未傾而靡僭其候有無交鬻而久執厥中物各以時貨遷乃日瞻陽烏之未旰索青蚨以競出質劑由是與行權廥於焉積實則知日以中為政市以利為名不求端以取表奚立法而作程俾居物致富之流心之有待方不盈不縮之際時即可明景既惟恆人得其敘何遠珍之不至曷近利之為阻賈用不售者當此之歸求之不得者於焉獲所此乃時不差利同射亘五都之所共歷百王而不易是以知日中為市之義豈空書於往籍會稽賀憑以著作郎出宰永新其行也其色似若有不懌者一時學省憲府之友咸共語之舉杜甫詩云樽前失詩流塞上得國寶乃相與賦詩送別秦東亭隴西李遠獨後至舉杯而前曰子毋以邑小去國萬里而難治古者公侯之地方百里自秦以來大縣且倍而過之小縣亦不下十室而有餘漢晉以士為之宰俾教其鑿井耕田養生送死而無憾歲賦其租以供軍士且以償士之直非以榮祿之也特養其廉以教民爾士既得民社之寄則早作夜止盡心以理之使訟平賦均老弱無懷詐暴憎斯無愧於取直而不負其所寄矣今永新之為邑也僻在江南西道吾聞牛僧孺之言與荊楚為鄰其地有崇山疊嶂平田沃野又有寒泉清流以灌溉之其君子好義而尚文其小人力耕而喜鬬而其俗信巫鬼悲歌激烈嗚嗚鳴鼓角雞卜以祈年有屈宋之遺風焉今子往而宰之勿以險遠難治而自貽伊戚也以樂易近之均其賦息其爭因其利而役之則無怨明文王之政以教之使知禮讓則尊君親上養老慈幼悉知而勸於為善自無懷詐暴憎之習矣然後手揮五絃於堂上樂其志高山流水間一動一靜居仁由義皡皡熙熙同登壽域矣吾屬在憲府與考績黜陟之事待子三載而來歸報政也勉之行無忘夫靈棋經者不知其所起或云漢武帝命東方朔使之占兆無不中者朔之術用此書也或云黃石公以此書授張子房又有客述淮南王神祕之書亦此書也蓋好事者倚聲借價以重其術豈盡數公為之乎雖然余聞之久矣以其非經史之書不以留意及開成末豫將適閩中聞其有建溪者石鬬而湍激舟子猱立嵲屼雖有賁育皆汗而栗况豫之懦者乎以其懦不自解及至泗上遇宗兄安遂以懦狀告安曰豫聞建溪不應至此蓋談者之過也安有卜書能決其惑遂請而卜之其詞云上下俱安心不生姦挺然無憂勿信流言乃笑曰果流言不足信也安即授豫遂擕之閩怡然無事固信其書又取決他疑無不若目見嗟乎世所特輕者未必不為至寶也世之所重者未足為美一編之書後顯前疑而况他乎以是知士之顯達窮餓各有命數不可以一途辨也豫觀其書似若有道者之為以十二棋子三分之上中下各四一擲而成卦即考書批詞盡得其理意者上為天中為人下為地三才之象也十二棋子皆有文其辭猶周易之辭也棋布而成卦遂目之曰靈棋後豫福州從事居多暇日凡集數十本參而校之去謬存真備集於此後賢觀之可以無疑豫在閩時以其遐邈鄉國萬里水陸綿遠心常不安一日卜之得坦坦天衢之卦其言甚美意中以為信然離閩數日忽宸書降召為御史則卦之前定不其神乎時唐會昌九年秋九月尚書司門員外郎李遠序宣猷開成時官監察御史咸通中為宣歙觀察使兼御史大夫議曰臣聞慶都誕堯唐風稱盛塗山育啓夏道克昌坤德既刑於邦家帝籙方傳於悠久况母儀夙著壼教自高夢日昭其休祥俔天表其鴻慶晦耀未兆逢時乃彰殊榮不在於生前縟禮必行於身後詳觀國史逖聽皇王步驟以來其道一貫伏惟先太后應二儀而作合齊兩曜而降祥派流弄印之榮道叶握圖之聖柔明初進慈儉用光蘋蘩遵助祭之儀絃綖展親蠶之禮四德之姿始耀六宮之望攸歸服浣濯而自修抑華侈而不御大行皇帝道資內助禮冠中闈越辭輦之遵聞體降之盛則二何之族難並五鹿之慶方遙進賢才而益恭辭進封而奪志子一人而不享其福母四海而不居其尊行成楷模言著針誡名器尚虛於椒掖輝華俄缺於桂輪全德則崇備物猶爽當海晏河清之日屬賓天上漢之朝故劍軫皇情之深新阡赴丹禁之慟於是痛環珮之絶響感詩禮之無聞爰詔近臣俾詠明淑神筆添句用寫悲情豈八字之能倫與三光而齊朗歎廠田坴綿悽愴之痛陋撫存悼亡之詞天文照臨哀榮兼極其後必大倚伏有徵皇上繼明之初遽思顧復遂發宮女副以內臣恭告薦之誠度陵寢之制實遵近禮即兆為山改馬鬣之形就鮒隅之式璇宮對立蘭殿煥開想像如覆於玉衣肹蠁疑遊於金屋上仙之日都人不簪於奈花追榮之辰國風空賦於荇菜昔處虞嬪之列今當文毋之崇體內範而素深因子貴而昭慶秦原松檟佳氣久凝漢后褘褕盛禮俄及道光前古德冠後宮發睿感於賜衣軫孝思於遺鏡遂揚翟黻之禮以慰昭靈之慈謹按易曰元者善之長諡法曰宣慈惠和曰元又曰明德有功曰昭伏以先太后待年之初已標仁懿之則儷極之後益彰柔煦之風得不謂宣慈惠和乎輔佐昌期聿修陰教克生聖嗣光啓中興得不謂明德有功乎請上尊諡曰元昭皇太后謹議伏準開元二十三年正月二十四日敕自今後有大祠宜差丞相特進少保少傅尚書賓客御史大夫攝祭行事者伏以郊祀蒸嘗國家大典肅將明命合差重官苟異於斯則為瀆祭臣伏見近日大祠差王府官攝太尉行事人輕位散不足交神昧陛下恭潔之誠阻百靈正直之福事有不便實資改更臣請起今春季以後祠祀南郊薦獻太清宮宰臣行事外其餘大祠攝太尉司徒司空伏請差六尚書左右丞列曹侍郎諸三品以上清望官充其中祠小祠官員不足即任差王府官充臣職監祠事不敢因循今左丞鄭公之廉宣城也視人如子潔已奉公為政指歸則以抑強扶弱為意操斷之下邪正別白懷姦之徒有李惟真康全參者平地起戎迫脅賢帥避難歸闕恓惶草間此時前潮郡押衙汪玗秀才薛復百姓姚元貞前當郡衙前虞候胡政繼來救護食膳楫棹霈然大備况江神指途歸風送帆信宿之間遂達江都惟真輩不知兵已在頸釃酒高會恣行攻劫凶勢甚張朝廷命今廷尉溫公自睢陽守杖劍來討以順伐逆無敢礙刃軍令明肅曾無寃人築二京觀於西郛門外宣猷故與鄭公遊詳熟理行仁誼廉白是其佩服文章學藝乃其緣飾自闕王傅改太常少卿揚歷數四備極華顯今鳳翔司徒相公頃在台庭仰公材術俾司邦計方且傳印公確乎固執乞守六曹又擬轉為刑部帖以臺丞公堅讓如初今僕射相公登庸之初舉公自代約以同升公亦撝挹逡巡自牧聞其名則氣焰光赫覩其貌則貞素和裕則知曩時罹難適丁厄運今茲遷擢方見道勝為善者雖否必通為惡者暫通終否禮云君子居易以俟命小人行險以徼幸不其信歟宣猷去歲三月到官擇日謁梓華府君見公奠文紀當時之事板於梁間恐久遠隳落遂移於貞石刻而立之咸通七年七月十一日宣歙觀察使兼御史大夫杜宣猷記夫人諱瓊字瓊本京兆杜陵人後因家邢州遂為邢之堯山人焉曾祖知慎皇將仕郎守冀州南宮縣尉祖昌運皇守欣州定襄府左果毅上柱國父西岩皇朝散大夫試左武衛長史夫人長史之叔女也笄年歸於李君明正清劭輔以材能落落焉有賢傑之操門闕李君隨牒襄州夫人亦來漢上宣猷與夫人別業接連得敘宗族日漸月深情同密親始豫隨進士貢路出漢濱時寓夫人里第稅駕之後徒馭如歸開顏拂闕主禮甚渥李君賢厚少事以儒書自適門之治實夫人主之者其奉夫也以敬其訓子也以義其睦親也以誠其接下也以德吹惠布明家政煥然舉如是言雖賢大夫何以過也嗚呼材智方遠光景不借以太和五年十二月三十日薨於襄州旌孝里之私第春秋六十五明年十月十一日安厝於襄陽縣習池鄉之西把里夫人生二女二男長女適太原王儀次女適扶風馬寧長男德元次男德章德元幼奉擇鄰之訓明經擢第釋褐隨縣尉德章休休然亦以詩禮充業今則泣血崩心若無所容先遠有期託豫志德濡毫寫悲不羞不能銘曰杜氏之先陶唐同源遠派搖漾為傑為賢夫人奉之令範昭然身同朝露門閉幽泉俞會昌時人大凡在變化象數之中者莫逃乎易唯人之情偽最曰難知繫稱卜筮尚占憂患興慮彼山上有火明入地中周孔之情繇是觀變自三古以降雜説歧分矧卜筮多門亡羊殆盡雖京房竒中然皆不免其身夫自知知人乃曰明哲則隗照易數於龔使焦贛發誡於明君照既沒不顯其占贛明且哲乃留其術俞巖耕東鄙自前困蒙客有枉駕蓬廬以焦辭數軸相示俞嘗讀班史列傳及歷代名儒系譜諸家雜説之文咸稱自夫子授易於商瞿僅逾十輩延壽傳經於孟喜固是同時當西漢元成之間凌夷厥政先生乃或出或處外比包蒙輒以易道上干梁王遂為郡察舉詔補小黃令而邑中隱伏之事皆預知其情得以尤異當遷尋亦卒於官次所著大易通變其卦總四千九十六題事本彌綸同歸簡易其辭假出於經史其意雅合於神祇但率潔精專事無不中而言近意遠易識難詳不可瀆蒙以為辭費後之好事如君山者則子雲之書為不朽矣以聖唐會昌景寅歲周正五日敘德章會昌六年官太常博士伏見八月六日敕欲修東都太廟令會議事此時已有議狀準禮不合更修尚書丞郎已下三十八人皆同署狀德章官在禮寺實忝司存當聖上嚴禋敬事之時會相公尚古黜華之日脫國之祀典有乖禮文豈唯受責於曠官竊懼貽恥於明代所以勤勤懇懇將不言而又言也昨者異同之意盡可指陳一則以有都之名更合立廟次則欲崇修廟宇以候時巡殊不知廟不合虛主惟載一也謹按貞觀九年詔曰太原之地肇基王業事均豐沛義等宛譙約禮而言須議立廟時祕書監顏師古議曰臣旁觀祭典遍考禮經宗廟皆在京師不於下土別置昔周之豐鎬實為遷都乃是因事便營非云一時別立太宗許其奏即日而停由是而言太原豈無都號太原爾時猶廢東都不立可知且廟室惟新即須有主主既藏瘞非虛而何是有都立廟之言不攻而自破矣又按曾子問曰古者師行必以遷廟主行乎孔子曰天子巡狩必以遷廟主行載于齋車言必有尊也今也取七廟之主以行則失矣皇氏云遷廟主者惟載新遷一室之主也未祧之主無載行之文假使候時巡自可修營一室議構九室有可依憑夫宗廟尊事也重事也至尊至重安得以疑文定論言苟不經則為擅議近者敕旨凡以議事皆須一一據經若無經文任以史證如或經史皆無據者不得率意而言則立廟東都正經史無據果從臆説無乃前後相違也書曰三人占則從二人之言會議者四十八人所同者六七人耳比夫二三之喻又何其多也夫堯舜之為帝迄今稱詠之者非有他術異智者也以其有賢臣輔翼能順考古道也故堯之書曰若稽古帝堯孔氏傳曰傅説佐殷之君亦曰事不師古匪説攸聞考之古道既如前驗以國章又如此將求典實無以易諸伏希必本正經稍抑浮議踵臯夔之古道法周孔之遺文則天下守貞之儒實所幸甚其餘已具前議夫宗廟之設主于誠敬旋觀典禮二則非誠是以匪因遷都則不別立廟宇記曰天無二日土無二王嘗禘郊社尊無二上又曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也則東都太廟已廢多時若議增修稍違前志何者聖歷神龍之際武后始復明辟中宗取其廟易置太廟焉本欲權固人心非經久之制也伏以所存神主既請祧藏今廟室維新即須有主神主非時不造廟寢又無虛議如修復以俟時巡惟載一主備在方册可得而詳又引經中義有數等或是弟子之語或是他人之言今廟不可虛尊無二上非時不造主合載一主行皆大聖祖及宣尼親所發明者比之常據不可同塗又邱明修春秋悉以君子定褒貶至陳泄以忠獲罪晉文以臣召君於此數條復稱君子將評得失特以宣尼斷之傳曰危疑之理須聖言以明也或以東都不同他都地有壇社宮闕欲議權葺似是無妨此則酌於意懷非曰經據也但以遍討今古無有壇社立廟之證用以為説實所未安謹上自殷周旁稽故實除因遷都之外無別立廟之文夫禮雖緣情將命厥要實在得中必過禮而求多則反虧於誠敬伏以神龍之際天命有歸移武氏廟於長安即其地而置太廟以至天寶初復不為建都而設議曰中宗立廟於東都無乖舊典徵其意不亦謬乎又曰東都太廟至於睿宗元宗猶奉而不易者蓋緣嘗所尊奉不敢輒廢也今則廢已多時猶循莫舉之典也又曰雖貞觀之始草創未暇豈可謂此事非開元之法者謹按定開元六典敕曰聽政之暇錯綜古今法以周官作為唐典覽其本末千載一朝春秋謂考古之法也行之可久不曰然歟此時東都太廟見在六典序兩都宮闕西都具太廟之位東都則存而不論足明事出一時又安得曰開元之法也又三代禮樂莫盛於周昨者論議之時便宜細大取法于周遷而立廟今立廟不因遷何美之而不能師之也又曰建國神位右社稷而左宗廟君子將營宮室宗廟為先者謹按六典永昌中則天以東都為神都邇後漸加搆宮室百官於是備矣今之宮室百司乃武氏改命所備也上都巳建國立宗廟不合引言又曰東都洛陽祭孝宣等五帝長安祭孝成平三帝以此為置廟之例則大非也當漢兩處有廟所祭之帝各別今東都建廟作主與上都同概而論之失之甚者又曰今或東洛復太廟有司同日侍祭以此為數實所未解者謹按天寶三載詔曰頃四時有事於太廟兩京同日自今已後兩京各宜別擇日載在祀典可得而詳且立廟造主所以祭神而曰存而勿祀出自何經當七廟五廟無虛主而欲立虛廟法於何典前稱廟貌如故者即指建中之中就有而言以為國之先也前以非時不造主者謂見有神主不得以非時而造也若江左至德之際主並散亡不可拘以例也或曰廢主之瘞請在太微宮者謹按天寶二年敕曰古之制禮祭用質明義兼取於尚幽情實緣於既沒我聖祖淡然常在為道之宗既殊有盡之期宜展事生之禮自今已後每至聖祖宮有昭告宜改用卯時者今欲以主瘞於宮所即與此敕全乖又曰主不合瘞請藏夾室者謹按前代藏主頗有異同至如夾室儀用以序昭穆也今廟主俱不中禮則無禘祫之文又曰君子將營宮室以宗廟為先則建國營宮室而宗廟必設東都既有宮室而太廟不合不營凡以論之其義斯勝而西周東漢並曰兩都其各有宗廟之證經史昭然又得以極思於揚榷詩曰其繩則直縮版以載作廟翼翼大雅瓜瓞言豐廟之作也又曰於穆清廟肅雍顯相洛邑既成以率文王之祀此詩言洛之廟也書曰成王既至洛蒸歲祭文王騂牛一武王騂牛一又曰裸于太室康王又居豐命畢公保東郊豈有無廟而可蒸祭非都而設保則書東西之廟也逮于後漢卜洛西京之廟亦存建武二年於洛陽立廟而成哀平三帝祭於西京一十八年親幸長安行禘禮當時五室列於洛都三帝留於京廟行幸之歲與合食之期相會不奉齋車又安可以成此禮則知兩廟周人成法載主以行漢家通制或以當虛一都之廟為不可而引七廟無虛主之文禮言一都之廟室不虛主非為兩都各廟而不可虛也聯出征之辭更明載主之意因事而言理實相統非如詩人更可斷章以取義也古人求神之所非一奉神之意無二故廢桑主重作栗主既事埋之已明其一也或又引左氏傳築郿凡例謂有宗廟先君之主曰都而立建主之論按魯莊公二十八年冬築郿左傳為築發凡例穀梁譏因藪澤之例公羊稱避凶年造邑之嫌三傳異同左氏為短何則當春秋二百年間魯凡城二十四邑唯郿一邑稱築城其二十二邑豈皆宗廟先君之主乎執此為建主之端又非通論或又曰廢主之瘞何以在於太微宮所藏之所宜舍故依新前已列矣按瘞主之位有三或於北牖之下或在西階之間廟之事也其不當立之主但隨其所以瘞之夫主瘞乎當立之廟斯不然矣以在所而言則太微宮所藏之所與漢之寢園無異歷代以降建一都者多兩都者少今國家崇東西之宅極嚴奉之典而以各廟為疑合以建都故事以相質正即周漢是也今詳議所徵究其年代率皆一都之時豈可以擬議亦孰敢獻酬於其間詳考經旨古人謀寢必極於廟未有設寢而不立廟者國家承隋氏之弊草創未暇後雖建於垂拱而事有所合其後當干戈寧戢之歲文物大備之朝歷于十一聖不議廢之豈不以事雖出于一時廟有合立之理而不可一一革也今洛都之制上自宮殿樓觀下及百辟之司與西京無異鑾輿之至也雖厮役之賤必歸其所理也豈先帝之主獨無其所安乎時也虞主尚瘞廢主宜然或以馬融李舟二人稱寢無傷於偕立廟不妨於暫虛則是馬融李舟可法於宣尼矣以此擬議乖當則深或稱凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城者謹按春秋二百四十年間惟郿一邑稱築如城郎費之類各有所因或以他防或以自固謂之盡有宗廟理則極非或稱聖主有復古之功簡册有考文之美五帝不同樂三王不同禮遭時為法因事制宜此則改作有為非有司之事也如有司之職但合一一據經變禮從時則須俟明詔也凡不修之證略有七條廟主應遷一也巳廢不舉二也廟不可虛三也非時不造主四也合載遷主行五也尊無二上六也六典不書七也謹按文王遷酆立廟武王遷鎬立廟成王遷洛立廟今東都不因遷而欲立廟是違因遷立廟也謹按禮記曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也今東都太廟廢已八朝莫果立之是違已廢不舉也謹按禮記曰當七廟五廟無虛主今欲立虛廟是違廟不可虛也謹按左傳丁丑作僖公主書不時也記又曰過時不祭禮也合禮之祭過時猶廢非禮之主可以作乎今欲非時作主是違非時不作主也謹按曾子問古者師行以遷廟主行乎孔子曰天子巡狩必以遷廟主行載於齋車言必有尊也今也取七廟之主以行則失之矣皇氏云遷廟主者載遷一室之主也今欲載㣥廟之主以行是違載遷之主也謹按禮記曰天無二日土無二王嘗禘郊社尊無二上也今欲兩都建廟作主是違尊無二上也謹按六典序兩都宮闕及廟宇此時東都有廟不載是違六典不書也遍考書傳並不合修寖以武德貞觀之中作法垂範之日文物大備儒彥畢臻若可修營不應議不及矣記曰樂由天作禮以地制天之體動也地之體止也此明樂可作禮難變也伏惟陛下誠明載物莊敬御天孝方切於祖宗事乃求於根本再令集議俾定所長臣實職司敢不條白路會昌六年官太常博士後為吏部員外郎司封郎中東都太微宮神主二十座去年二月二十九日禮院分析聞奏訖伏奉今月七日敕此禮至重須遵典故宜令禮官學官同議聞奏者臣今與學官等詳議訖謹具分析如後獻祖宣皇帝宣莊皇后懿祖光皇帝光懿皇后文德皇后高宗天皇大帝則天皇后中宗大聖大昭孝皇帝和思皇后昭成皇后孝敬皇帝孝敬哀皇后巳前十二座親盡迭毀宜遷諸太廟祔於興聖廟禘祫之歲乃一祭之東都無興聖廟可祔伏請且權藏於太廟夾室未題神主十四座前件神主既無題號之文難伸祝告之禮今與禮官等商量伏請告遷之日但瘞於舊太微宮內空間之地恭酌事理庶協從宜陶會昌四年進士大中時官校書郎在昔樂官采詩而陳於國者以察風俗之邪正以審王化之興廢得芻蕘而上達萌治亂而先覺詩之義也大矣遠矣肇自宗周降及漢魏莫不由政治以諷諭繫國家之盛衰作之者有犯而無諱聞之者傷懼而鑒誡寧同嘲戲風月取歡流俗而已哉晉宋詩人不失雅正直言無避頗遵漢魏之風逮齊梁陳隋德祚淺薄無能激切於事皆以浮艷相誇風雅大變不隨流俗者無幾所謂亡國之音哀以思王澤竭而詩不作吳公子聽五音知國之興廢匪虛謬也國朝以來人多反古德澤廣被詩之作者繼出則有杜李挺生於時㣥才莫得而並其亞則昌齡伯玉雲卿千運應物益適建况鵠當光羲郊愈籍合十數子挺然頽波間得蘇李劉謝之風骨多為清德之所諷覽乃能抑退浮偽流艷之辭宜矣爰有律體祖尚清巧以切語對為工以絶聲病為能則有沈宋燕公九齡嚴劉錢孟司空曙李端二皇甫之流實繁其數皆妙於新韻播名當時亦可謂守章句之範不失其正者矣然物無全工而欲篇詠盈千盡為絶唱其可得乎雖前賢纂録不少殊途同歸英靈間氣正聲南薰之類朗照之下罕有孑遺而取捨之時能無少誤未有遊諸門而英菁畢萃成篇卷而玷纇全無詩家之流語多及此豈識者寡擇者多實以體詞不一憎愛有殊苟非通而鑒之焉可盡其善者由是諸集悉閲且無情勢相託以雅直尤異成章而已或聲流樂府或句在人口雖靡所紀録而關切時病者此乃究其姓家無所失之或風韻標特譏興深遠雖已在他集而汨沒於未至者亦復掇而取焉或詞多鄭衛或音涉巴歈苟不虧六義之要安能間之也既歷稔盈篋搜奇略罄終恨見之不遍無慮選之不公始自有唐迄於近歿凡一千二百三十二首分為二十卷命曰唐詩類選篇題屬興類之為伍而條貫不以名位卑崇年代遠近為意騷雅綺麗區別有可觀寧辭披揀之勞貴及文明之代時大中景子之歲也余為類選三十年神思耗竭不覺老之將至今大綱已定勒成一家庶及生存免負平昔若元相國稹白尚書居易擅名一時天下稱為元白學者翕然號元和詩其家集浩大不可雕摘今共無所取蓋微志存焉所不足於此者以刪定之初如相國令狐楚李涼公逢吉李淮海紳劉賓客禹錫楊茂卿盧同沈亞之劉猛李涉李璆陸暢章孝標陳罕等十數公詩猶在世及稍淪謝即文集未行縱有一篇一詠得於人者亦未稱所録僻遠孤儒有志難就粗隨所見不可殫論終愧力不及心庶非耳目之過也近則杜舍人牧許鄂州渾洎張祐趙嘏顧非熊數公並有詩句播在人口身沒才二三年亦正集未得絶筆之文若有所得別為卷軸附於二十卷之外冀無見恨若須待見全本則撰集必無成功若但泛取傳聞則篇章不得其美已上並無採托蓋前序所謂終恨見之不遍者矣唯歙州敬方才力周備興比之間獨與前輩相近亡歿雖近家集已成三百首中間録律韻八篇而已雖前後敻接或畏多言而典型具存非敢遐棄又前所謂無慮選之不公者矣嗟乎行年七十有四一名已成一官已棄不懼勢逼不為利遷知我以類選起序者天也取捨之法二十通在故題之於後云爾收字藏之同州馮翊人開成末進士懿宗朝拜中書侍郎同平章事遷門下侍郎刑部尚書進右僕射封晉陽縣男咸通八年罷為宣歙觀察使貶端州司馬尋削官流歡州賜死後三年詔雪其辜樂亡久矣上古祀天地宗廟皆不用商周人歌大呂舞雲門以俟天神歌太蔟舞咸池以俟地祇大呂黃鍾之合陽聲之首而雲門黃帝樂也咸池堯樂也不敢用黃鍾而以太蔟次之然則祭天者圜鍾為宮黃鍾為角太蔟為徵姑洗為羽祭地者函鍾為宮太蔟為角姑洗為徵南呂為羽訖不用商及二少蓋商聲剛而二少聲下所以取其正裁其繁也漢祭天則用商而宗廟不用謂鬼神畏商之剛西京諸儒惑圜鍾函鍾之説故其自受命郊祀宗廟樂唯用黃鍾一均章帝時太常丞鮑業始旋十二宮夫旋宮以七聲為均均言韻也古無韻字猶言一韻聲也始以某律為宮某律為商某律為角某律為徵某律為羽某律少宮某律少徵亦曰變曰比一均成則五聲為之節族此旋宮也臣犬畝下才謬當委任心乖報國罪積彌天特舉朝章賜之顯戮臣誠悲誠感頓首死罪臣自出寒門旁無勢援幸逢休運纍汚清資聖奬曲流遂叨重任上不能罄輸臣節以答寵光下不能回避禍胎以延俊乂苟利尸素頻歷歲時果至聖朝難寬大典誠知一死未塞深愆固不合將泉壤之詞上塵天聽伏乞陛下哀臣愚蠢稍緩雷霆臣頃蒙擢在台衡不敢令弟嚴守官闕下旋蒙聖造令剌浙東所有罪愆是臣自負伏乞聖慈貸嚴微命臣血屬皆幼更無近親只有弟嚴才力尫悴家族所恃在嚴一人俾存歿曲全在陛下宏覆臣無任魂魄望恩之至
