front:
  text: 全唐文欽定全唐文卷四百四用之天寶朝官金部員外郎考功郎中
  hash: sha256:23f5126353c671fa7bc68494e5da07a9d2e1834f3274fbf6b03512e18e28d17d
  markers:
  - {type: head, offset: 12, content: 馮用之, id: KR4h0168_NFKB_404-h1, level: 1}
body:
  text: 機者機也經緯天下織綜人事而已矣機者微也發之至微用之至廣大人行之則合於道細人竊之則階於亂合道所以濟世階亂所以滅身濟世機之利者也滅身機之害者也知利而不知害雖去其害害必悅之知害而不知利雖就其利利必違之知利而知害知去而知就其惟聖人乎文王武王知機之君也箕子周公知機之臣也夫三才設位而機行乎其中矣得之者昌失之者亡善用則集乎百祥昧用則來乎百殃故天之一發龍蛇為之起陸人之一發天地為之反覆范蠡善用也勾踐以之克霸無極昧用也楚國於焉殄瘁至哉斯術也莫不以合義為本趣時為用茍悖於義則悅隨者寡未逢其時則虛其事稽其取與離合之際可謂神矣雖離婁之目不可視烏獲之力不可制南金之利不可斷迅雷之聲不可及夫神器至重也堯不與子而禪於舜蓋取聖之機也舜不讓丹朱而復禪禹蓋取時之機也兄弟至親周公離於管蔡取賢之機也秦越之疏嬴氏合於由余取霸之機也設令堯與丹朱而棄舜億兆之心竟歸於虞則不謂之聖帝矣舜忘大義而顧小節不承堯而禪禹則不謂之明君矣周公昵管蔡而不戮必墜文武之業則不謂之賢臣矣秦伯鄙由余而不用必失四方之士則不謂之霸主矣天下雖聞之而不可知雖見之而不可測善為國者如偃師焉民如幻也欲之動欲之靜機在於我豈當不悅乎善為君者猶造父焉人猶馬也欲之東欲之西策在於我豈有能違乎經曰不獨親其親則天下皆親不獨子其子則天下皆子富哉是機也我以天下為親為子天下孰不以我為親為子乎夫然故災害不生禍亂不作此聖人之旨也則知欲安者必先安於人欲利者必先利於人能安人而人不安之能利人而人不利之者未之有也漢祖入關不行殺戮善安人也秦室寶貨悉分士卒善利人也卒收天下之心享天下之福此聖人之作也項籍反是而亡不亦宜乎善為臣者不厚於身而厚於君不潤於室而潤於國厚於君忠也潤於國公也既忠且公君其薄之哉民其怨之哉祿位其去之哉雖不厚於身而身自厚矣不潤於室而室自潤矣此君子之為也酇侯處位而舉淮陰厚君者也入秦不取金璧而取圖籍潤國者也故能位冠三傑聲流萬古韓信忌剋酈生殛逐田橫欲有功而自厚貪賞而自潤終貽伊戚雲夢生擒夫域中至大之謂道天下至賾之謂機有道無機守死而一身獨善有機無道好謀而彞倫攸斁伯夷叔齊守死也豈謂億兆塗炭俟周武哉李斯趙高好謀也豈知刑政酷毒失民心哉機道相須盡善盡美然而發機之要實資於時故進而得時亦機也退而得時亦機也取而得時亦機也捨而得時亦機也語而得時亦機也默而得時亦機也進得其時則有利伊尹干湯是也退得其時則無悶二疏辭祿是也取得其時則必獲甘羅陟相是也捨得其時則元吉泰伯去吳是也語得其時則見信傅說是也默得其時則保身微子是也故進不相時則凶朝錯所以見誅也退不相時則禍白起所以伏劒也取不相時則招吝許伐鄭也捨不相時則有悔虞棄虢也語不相時則殆辱薛冶諫其君也默不相時則受謗子家從其賊也所以失之毫釐差之千里故君子得其機則仇讐變為心腹况其恩者乎失其機則親昵反為勍敵况其疏者乎齊桓用讐能盡管仲之謀九合諸侯一匡天下衛懿好鶴失於臣下之望國之有難士卒不戰夫如是則一得一失易如反掌一興一亡疾如旋踵為國家者可不務乎或曰老氏云以智治國國之賊不以智治國國之福然則智非機邪機非智邪答曰機者生於智者也智者隨其性者也大人君子得其遠者大者為而不有功成不居使天下熙熙然若登春臺如享太牢不知帝力故為國之福非謂其無慮無思兀兀然如草木鳥獸而能治國者也細人曲士得其小者近者嗜欲繫焉矜伐在焉是非生焉爭鬬興焉故為國之賊聖人慮百世之後善人少而不善人多垂此元言蓋抑揚之旨也且聖人不仁以百姓為芻狗不仁之仁豈非機邪國不用機以克永世匪我攸聞夫茫茫六經萬機之圃昭昭前史萬機之鑑仲尼云知幾其神乎有旨哉有旨哉大哉鼓天下之動成天下之務反於常而致治違於道而合利非權其孰能與於此乎夫權者適一時之變非悠久之用然則適變於一時利在於悠久者也聖人知道德有不可為之時禮義有不可施之時刑名有不可威之時由是濟之以權也其或不可為而為則禮義如畫餅充饑矣不可施而施則禮義如說河濟渴矣不可威而威則刑名如治絲而棼矣豈惟乖理實足資亂故用權之際道德可乘禮義可置刑名可弛及乎發號施令如風偃草衆知嚮方莫敢不服與夫道德禮義刑名之功又何異哉雖日棄之置之弛之蓋殊途而同歸也故權者國家之利器也輜重可離而權不可失兵食可去而權不可無迅雷發則㣥物驚大風起則萬彙振嚴霜冽則衆木落遲日升則百卉秀孰為此者曰天地也天地尚或用之而况於人乎夫休祥不見則中庸之君不能力行而躋於聖咎徵不作則殘暴之主不能革心而至於道福其善君子所以知勸禍其淫小人所以知戒夫天之德至仁也地之道無私也至仁則不傷於物何乃行肅殺之令乎蓋秋不殺則春無以生矣無私則不黨於人何乃垂災沴之變乎蓋惡不疸則善無以彰矣一弛一張天道乃長一懲一勸天道乃遠觀天之道執天之行盡矣是以君子則而象之體而行之故當不合用而用不合棄而棄不合賞而賞不合誅而誅者皆從權而制宜也聖人以神道設教俾民日用而不知權之時義大矣哉高宗知傅說之賢欲委之代天取於皂隸之徒儀於百辟之上慮㣥情弗協事難以濟故稱夢得賢相乃刻像而求之商之中興賴善權之主也文王知太公之賢欲擢居輔弻搜於屠釣之間致於三公之上庶士靡靡恐未適從故稱天遺我師乃出畋而獲之周之永年賴善權之君也此二君苟懼設詐之損德固執信而循常則傅巖虛老而莫伸渭濱沒齒而不用棟梁斯壞其何以興夫權之大端在於利害而已矣利萬而害一害之何傷害百而利十利之必亡苟害於事雖鄙俚之義君子懼之苟利於後雖先王興教達人抗行也子雖至親西伯食其肉不然則死於羑里也父雖至尊沛公索其羹不然則臣於項籍也西伯非不慈蓋子已死不食則巳身亦斃沛公非不孝蓋其父為虜奔赴則巳身亦降又何益乎能捨無益之慈孝成莫大之基業大人之權變不可得而聞也夫是非未明向背未定成敗未測取與未決當此之時行權之時也故權可以明是非定向背測成敗決取與穰苴布衣見景公景公委之以兵權斬一寵臣三軍畏懾克成其功也孫武被褐謁吳王吳王試以教戰戮三嬖妾衆女整齊卒顯其能也易曰巽以行權巽風也風行也無不可動之物無不可往之所權之用無不可治之時無不可成之事昔晉文公見天王於河陽譎則譎矣而夾輔之勳垂於史冊鬻拳諫楚子以兵刃悖則悖矣而盡忠之節著於春秋夫事有先奪而後與先順而後取太甲不治伊尹放之俟其改過而反其政公子光謀亂伍胥避之乃進專諸以成其志然後盡事君之節雪殺父之冤不其偉歟夫乾坤之道易簡也而猶窮則變變則通通則能久故王公設權以固其國知變以馭其民善馭者視人如嬰孩悟之誘之莫不胥悅不善馭者以民為規矩謂方圓定矣不能苟合善權變者如奕棊焉或取或捨或進或退無固無必皆任其勢也捨非資敵蓋捨小而取大退非怯彼蓋進損而退益孔子曰可與共學未可與立可與立未可與適道可與適道未可與權得非權之難耶觀其相魯君於夾谷挫齊鋭於樽俎當是時齊侯強而不強魯國弱而不弱聖人之智不亦多乎夫獸廢爪牙則充㣥獸之腸矣禽鎩羽翮則供衆禽之羞矣人失權變則為英雄之資矣三十輻之車制之者柅萬乘之國統之者權五賊在心神至聰而莫測三盜既興物雖衆而皆覩至哉始離而終合始逆而終順始非而終是始失而終得權之旨也或曰機之與權同乎異乎對曰異也設於事先之謂機應於事變之謂權機之先設猶張羅待鳥來則獲矣權之應變猶荷戈禦獸審其勢也知機而不知權者得於豫謀失於臨事知權而不知機者巧於臨事拙於豫謀知機而知權者帝霸之君也王佐之臣也自五帝既降捨機權而能治天下者未之有也丹字叔南天寶朝官侍御史出為虔州刺史捨爵策勳必由舉德撫封胙土皆以報功苟薄厚之失宜在短長而何據乙之所賞是曰通侯皆受名田享其生祿權立四夷之制不殊五等之差經界本出於有司賦稅不闕於主國未知所過徒肆薄言寧虧采地之名以益王官之邑宰之所理事或不然臣某言以今月某日於所部宣城縣謝亭鄉百姓姚德家獲白鼠一素毛毿然淨若冰雪體貌間暇異於其倫臣聞白者少陰之色也鼠者陰姦人之象也夫以晝伏夜動之質穴社穿墉之姿而乃稟金方之正色投籠檻以馴擾此蓋小人革性之瑞西戎授首之符臣某中謝臣又聞白虎白鼠皆金行之祥也且獸之大者莫勇於虎獸之小者莫怯於鼠前志有之曰用之則如虎不用則如鼠則虎之與鼠其類之極乎臣愚以為天之意者又以鼠警陛下耳夫犬戎猾夏者乘金方沴氣也陛下若臨之以律防之以時則雖強如虎將弱如鼠矣陛下若臨之失律防之後時則雖弱如鼠將強如虎矣今犬戎未滅秋律始行伏願陛下鑒上天之炯誡納微臣之芻詞考金行從革之義徵虎鼠強弱之勢則當西極月窟率來王矣况復蠢爾犬戎乎瑗天寶朝官主客左司員外郎出為明州刺史乾元元年徙括州建極惟皇昭爍於光出豫考卜乘時省方西自豐鄗東巡洛陽順天遊而有度協日晷之云長徵賢宣室布政明堂風雨時序黎庶其康盡物稱瑞窮靈委祥明含日月則階蓂恆秀澤及草木而隴麥登芳於是闢離宮通禁苑覩茲瑞之所應實皇恩之燭遠朝任得人時惟賢相九流分職三旗協亮稱堯舜之允敷同益贊而為唱曰珍瑞麥生我皇國凌寒而秀彰聖之德願載東觀之書以歌南薰之則既而帝曰欽哉天符聿來俾豫光於四表惟爾翼於中台念幽芳之遂性知棫朴之當材且夫麥之為瑞其德至矣居寒自生當暑薦美含實珠淨耀芒鋒起既標詠於詩人亦稱奇於縑史賞其芃芃於野漸漸其秀將嗣穀以登年豈凌霜而不茂在昔唐叔嘉禾伊育昭彼周王天人斯穆今惟聖帝此焉攸淑涵之如春也及晝而繁榮就之如日也來牟而紛郁則有小儒怡然鼓腹照水鏡之光鑒參歷選之題目未登高而賦成庶陳美於金竹者也庭玉天寶時擢書判拔萃科惟天生人罔不克乂所以陳玉帛奉粢盛啓蟄而郊方祈歲稔獻羔而祀用叶時和甲也有司名參主祭肅恆厥德明恕而行既沃盥以告虔爰執燭而祗事簫韶始奏謂丹鳳之來儀奠獻乖方實鷞鳩之是問禮虧陳玉祭則徹懸雖以歲美為辭其如失禮貽譴在祀之禮誰其舍諸滑天寶時擢書判拔萃科天生蒸人樹君以牧國有理體得賢其昌丙人伊何縻我好爵發揮王化對揚天休整日馭以觀風駕星軺而問俗方欲庶績其凝伊又九功式序搜遺逸於巖藪訪才能於草澤舉不失德推皆似已既無替於拔茅亦何慚於擢一作折桂且鯀則廢命禹乃嗣興奚其歸老午也膺職內不子避外惟讎舉建茲一官成彼三物自叶彙征之吉寧失鶴鳴之義憲司所糾誠為妄作不能沮勸忽肆淫刑參則不敏未敢從命湒天寶時擢書判拔萃科道達溝瀆濬利川源允符禮經克茂邦政啓塞茍失艱荒薦臻惟彼濯龍稱善利物不貴離畢之澤惟俟決渠之降奚其毀敗詎潤溝塍遂使彼黍離離竟無成於東作我稷翼翼豈有收於南畝而上膺帝澤下虧氓業伊輿人之是除同漢相之斯廢楊氏以量彼地勢度茲土宜興繼絶業如何不可既月長而日引亦暫勞而永逸邑人之訴稍乖常典此而不罰誰謂其宜賁元宗朝擢書判拔萃科分畫郊圻敬慎封守必正其經界均其牧井故上行其理而下得其和雖分制之有常蓋貴賤之異等夫畝不稅所以備公私圭田無征所以潔禋祀理其昭著禮有明文豈有伐冰之家同於擊壤之伍甲之不受誠謂其宜驥元宗朝擢書判拔萃科仰觀俯察通幽洞微明分野之災祥知廢興之休咎故漢皇應籙瑞日揚光宋景推誠妖星退舍所以標之甲令著自前經茍非主司習者多罪甲官非馮氏名在平人詩書為席上之珍無聞教子圖緯豈門庭之事輒訓家僮公然有違法在無赦難專候業定欲窺天措之罪刑應須搶地乙告非法既叶公途請置條章無容詞訴賁天寶時擢書判拔萃科土惟三分爵有五等懋勳庸而賜祿加道德以受封故鄭伯虢公旌於周家酇侯曲逆表乎漢代咸以胥寧帝道宣翼王室上殿而劒履不脫立朝而贊拜不名貴之與尊粲然明矣景也元朝上壽百辟齊列敷奏昌言對揚休命遠叶蕭何之軌復同子孟之躅若三台是職雅符周典如一命才登須遵漢律國有大會式敷燕禮大樂允釐萬舞斯列或陳干戚或執羽旄與天地而同和在神人以咸若惟彼國子師于膠庠將諧搏拊之節遂列弓矢之制實遵古典豈紊彞章樂師所巡奚妄加撻祭用蕤姑徵羽乃遺其一聲饗以空桑孤竹或全於九變春秋興廢蓋宗伯之常禮尊卑抑揚實伶官之本職何懵大體忽置深尤審樂不愆子焉斯得惟刑是恤師也則忘眂瞭稱過於師曠知音曷同於季札濫罰之咎明以刑書潤之元宗時擢書判拔萃科斗建於戌知立冬之景星火勝於金故至庚而氣伏徵歷忌之故事因稟陰陽按方志之所宜或殊寒暑廣漢四郡蜀門九折通濯錦之流入青衣之徼徒以溫暑異於中夏畜馭同於夷狄許令自擇伏日所以遂其土風當令齊七政之明垂四方之則百蠻由其奉朔九譯於是同文况茲巴蜀之人素陶齊魯之教自當變而至道率乃舊儀苟亂人時奚同文軌風俗通之小說未足憲章中和樂之雅音須崇舞詠清下四郡俾依三伏四井為邑先王所以致理九賦斂財太宰由其懸法劉乙返風遺緒震雷成化不下堂以任人入其境而稱善無違時以立教終悅使以忘勞故增資以請征方減年而願役鶉衣本敝已聞杼柚之空鶴髮將衰尚勞筋力之事當令升域中之福致天下之肥高三代之養老遵九式而節用何必增資減年然後計弊論績道紀成於咸暢理儀守其恆典彥國天寶時擢書判拔萃科國有祀典以和神人思不出位是主蠲潔苟越率履不承權輿難乎守官直以窒惕所司實掌其祭或承之羞備物不頒於職人戒嚴有乖於先甲遂使奉牲之告不及於肆師降神之典無聞於六變闕而為罪宜灼薰心過而必聞自貽噬臘詳諸秩典俾罰鬼薪服以命賢喪則觀禮用存升降不易紀律故朝會之序必布常於典命死喪之儀亦辨等於司服指彼甲也復冕其誰必也德亞元良位光衮職隨會有紱冕受命叔孫以車服表庸自可飭虞人以設階命元士而即次取茲鷩衮載展申降之禮登彼毳辨或同秦佚之號道則庶乎禮無違者如或秩殊稍食家匪伐冰以陪臺之隸人遂滅裂於喪紀置之於理誰謂不然憲司所劾既不書其祿位宗伯之義亦孰知其用捨且曰獻狀必也正名大球天寶時擢書判拔萃科祀以追孝祭以馭神厥儀孔昭執事有恪欲使粢盛豐備祖考歆黍稷之馨圭璧允植川嶽享沈浮之薦所司不供其職俾人用迷鐘鼓或闕於鏗鏘籩豆恆乖於踐楚法既將紊神其舍諸且無翼翼之容曷降穰穰之福自底不類嘖有煩言固乃曠我之官告曰轉爾於恤斷從徒罪斯乃鋭乎翻事言焉其何補也儉德之恭侈惡之大書分品命禮著等威苟違嚴律曾是抵禁稽諸甲也彼何人斯天不憗遺遄嬰六極服以招魂見諸九章至如受服統戎建節將命或聞以矢亦曰以綏固傷逝者之魂或載先王之典且甲兮云歿亦孔之哀莫知王爵之班胡僭辨師之冕必若位應受則邑錫建侯功有良夫之崇德參士會之賜亦奚妨升轂合禮發榮倘或生罔嘉聞死微可作須易大夫之簀豈復諸侯之冕嗟夫鐵冠所糾請審毳衣是用升卿元宗時擢書判拔萃科制邑居民務農肥國均大家之閭井永保士房徵載師之遠近將安地著惟丙職登牧伯位列諸侯茂穡勸分須聞露冕之化霑體塗足當務曝髮之勞而乃不問公私無論沃塉取其翼翼之稼擇彼芃芃之田同魯公之無恩穀梁是議類季孫之苟賦尼父有言將刺大東何殊小桀嗟狐裘之非當宜豸冠之是糾何者倉惟國廩食則人天雖欲國實於倉其若人勤於食務知遠者不亦悅乎令問天寶時擢書判拔萃科濯龍之奧泉源交屬楊氏因形以利物輿人捨舊以謀新且河渠列於八方溝洫陳於十志類百工之居肆同五行之廢一提封既設潤下是資宜命水工鳩諸藪澤以文無害雖訟何傷邑中之黔實興我役汝南之鵠亦著人謠物之常情難與適變同源異口史起尊其前刊石表界信臣旌於後苟利於物何恤於言既無稽於簡孚終有慚於割斷待資閲實方定刑名重暉元宗朝擢書判拔萃科款云天文志所載不伏藝術多端陰陽不測吉凶潛運倚伏難明豫曉災祥子産稱博通之首逆窮否泰裨竈為廣學之宗是知羽駕奔星初平言七日之會乘槎上漢嚴君定八月之期習學之規技無妨於紀歷屢會之禮法禁言於吉凶有司嫉惡居心繩愆軫慮恐惑彞憲劾以為妖冀必靜於金科庶不刑於玉律眷言執旨雖款載於天文審事語情實恐迷於至理即定刑罰恐失平反庶誥有司方期後斷希莊元宗朝擢書判拔萃科革物訓時觀人設教欲風之以正樂必采之以雅章苟操縵之見淫誠布政之為辟如或上下乖序雅節亂常匪所以易俗宣風適足以貽刑立辟且禮資成化樂貴移風諸侯軒懸自有感緣之節州將鹵薄豈係賓社之容若以大夫之懸俾人觀習是棄先師之禮云誰降殺齊參孔子三十六代孫官寶鼎令賦政任人取之有節體天立制惟變能通猗歟主司厥初稅畝稽諸魯策用採漢章雖怨咨之談實多橫議而損益之政或在權宜然則擇利而行何常之有舉以非法斯其病諸較其短長於是乎在暕元宗時擢書判拔萃科惟農望歲勤穡則稔彼夫失時不畜何獲苟無備於器用實謂惰於作勞甲之務分實亦敦本同我婦子歸田畯是司聞於仲尼善樊遲學稼祈養苗之狀將盡地之力惟先疇克服何後期有差雖畢達餘萌行春巳膏乎陰雨而不穡招刺有秋胡取夫斯箱小懲其宜往訴誰聽况犢惟不佩則爾牛足餘人有耦耕則我農可理竟不趨乎時澤固難免乎罪戾棻元宗時擢書判拔萃科古人得象兮創經營肇彼㣥橐兮疏厥名瞻茲瓮之為質乃陶人之所成非耳目之華侈留器用之深情若乃虛以為量滿而戒溢內容乃體外堅其質在埏埴之厥初諒邀奇於斯日濟家人之攸務故陳力乎虛室藏用所資詎可談悉至如原憲貧病蓬戶攸居以甕為牖含風自虛知道而樂其神晏如及夫漢陰抱甕高情悠邈絶乎澆風敦其至朴同夫天道於焉卓犖若夫吏部既醉乘興來眠漏傳永夕酒泛如泉酣飲無度其人在旃考異宏圖徵奇遐紀條支之鳥卵猶類園人之繭形可擬非心虛之可測徒耳聞而是矣厥品之為用自禮經以疏跡固有順於時需乃全之而不易含虛而稱從宜所適粵若稽古兮聖唐銀甕常滿兮珍光靈液滋兮寶物用呈絶瑞兮永太康小子同螢爝之微火耿光凝於斯章囟一火所用三壤克辨兆民允殖必廣地財式崇土訓載芟載柞爰盡力乎汙萊既方既皂俾恪勤乎稼穡伊趙爾鎛有略其耜荒度厥功實函斯活是以粢粱嘉積曾孫作庾于斯箱犬畝歌豐嫠婦栖糧於滯穗率由茲道萬邦乃粒眷彼草人兼修稼政無忝厥職分厚塉之規靖恭爾司省高卑之制雖陽和布始亟聞乎禁殺嗣歲將興必觀其行令苟能成憲犬則是屠將周禮之彞章功均物土資漢臣之舊業事取糞田叶緹赤以陳宜相囟一火彊而有旨雖云齊月法欲緩加且八政食乃為先五牲犬實居後以牲廢食其傷孔多棄猶務農斯利則博縣道書罰誠為昧禮或者張皇宜其窒惕
