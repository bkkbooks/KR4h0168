front:
  text: 全唐文欽定全唐文卷七百五十一杜牧四
  hash: sha256:32222c13f11d9794bd392d374d4688f849a16ab636990ce6d7e055223312bff9
body:
  text: 某再拜閣下以德行文章有位於明時如望江漢見其去之沓天洸汪澶漫不知其所為終始也復自開幕府已來辟取當時之名士禮接待遇各盡其意後進潔潔以節義自持者無不願受閣下回首一顧舒氣快意自以滿足今藩鎮之貴土地兵甲及生殺與奪在一出口終日矜高與門下後進之士榷得失去就於分寸銖黍間多是其人也獨閣下不自矜高不設塹壘曲垂情意以盡待士之禮然後知後進潔潔以節義自持者無不願受閣下回首一顧舒氣快意自以滿足此固然也非敢苟佞其辭以取媚也不知閣下俯仰延遇之去就幣帛筐篚之多少飲食獻酬之和樂各用何道間夜永日三五相聚危言峻論知與不知莫不願盡心於閣下壽考福祿祝之無窮某雖不肖則亦千百間其一人數也鹿鳴宴㣥臣詩曰既飲食之復實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心矣吉日詩曰宣王能慎微接下無不盡心以奉其上焉自古雖尊為天子未有不用此而能得多士盡心也未有不得多士之盡心而得樹功立業流於歌詩也况於諸侯哉夫子曰君子疾沒世而名不稱司馬遷曰自古富貴其名磨滅不可勝紀靜言思之令人感動激發當寐而寤在飢而飽伏希閣下濬之益深築之益高緘鐍之益固使天下之人異日捧閣下之德不替今日則為宰相長育人材興起教化國朝房杜姚宋不足過也某也於流輩無所知識承風望光徒有輸心效節之志今謹録雜詩一卷獻上非敢用此求知蓋欲導其志無以為先也往年應進士舉曾投獻筆語亦蒙亟稱於時今十五年矣於頑懵中為之不已矣於其事能不稍工不敢再録新述恐煩尊重無任惶懼謹再拜景業足下僕與足下齒同而道不同足下性俊達堅明心正而氣和飾以溫慎故處世顯明無罪悔僕之所稟闊略疏易輕微而忽小然其天與其心知邪柔利已偷苟讒諂可以進取知之而不能行之非不能行之抑復見惡之不能忍一同坐與之交語故有知之者有怒之者怒不附已者怒不恬言柔舌道其盛美者怒守直道而違已者知之者皆齒少氣鋭讀書以賢才自許但見古人行事直當如此未得官職不覩形勢潔潔少輩之徒也怒僕者足以裂僕之腸折僕之脛知僕者不能持一飯與僕僕之不死已幸况為刺史聚骨肉妻子衣食有餘乃大幸也敢望其他然與足下之所受性固不得伍列齊立亦抵足下疆隴畦畔間耳故足下憐僕之厚僕仰足下之多在京城間家事人事終日促束不得日出所懷以自曉自然不敢以輩流間期足下也去歲乞假自江漢間歸京乃知足下出官之由勇於為義向者僕之期足下之心果為不繆私自喜賀足下果不負天所付與僕所期向二者所以為喜且自賀也幸甚幸甚夫子曰吾少也賤故多能鄙事復曰不試故藝聖人尚以少賤不試乃能多能有藝况他人哉僕與足下年未三十為諸侯幕府吏未四十為天子廷臣不為甚賤不為不試矣今者齒各甚壯為刺史各得小郡俱處僻左幸天下無事人安穀熟無兵期軍須逋負諍訴之勤足以為學自強自勉於未聞未見之間僕不足道雖能為學亦無所益如足下之才之時真可惜也向者所謂俊達堅明心正而氣和飾以溫慎此才之可惜也年四十為刺史得僻左小郡有衣食無為吏之苦此時之可惜也僕以為天資足下有異日名聲績業光於前後正在今日可不勉之僕常念生百代之下未必為不幸何者以其書具而事多也今之言者必曰使聖人微旨不傳乃鄭元輩為注解之罪僕觀其所解釋明白完具雖聖人復生必挈置數豫坐於遊夏之位若使元輩解釋不足為師安得聖人復生如周公夫子親授微旨然後為學是則聖人不生終不為學假使聖人復生即亦隨而汨之矣此則不學之徒好出大言欺亂常人耳自漢已降其有國者成敗興廢事業蹤迹一二億萬青黃白黑據實空有皆可圖畫考其來由裁其短長十得四五足以應當時之務矣不似古人窮天鑿元躡於無蹤算於忽微然後能為學也故曰生百代之下未必為不幸也夫子曰三人行必有我師焉此乃隨所見聞能不亡失而思念至也楚王問萍實對曰吾往年聞童謠而知之此乃以童子為師耳既參之於上古復酌之於見聞乃能為聖人也諸葛孔明曰諸公讀書乃欲為博士耳此蓋滯於所見不知適變名為腐儒亦學者之一病僕自元和已來以至今日其所見聞名公才人之所論討典刑制度征伐叛亂考其當時參於前古能不忘失而思念亦可以為一家事業矣但隨見隨忘隨聞隨廢輕目重耳之過此亦學者之一病也如足下天與之性萬萬與僕相遠僕自知頑滯不能苦心為學假使能學之亦不能出而施之懇懇欲成足下之美異日既受足下之教於一官一局而無過失而已自古未有不學而能垂名於後代者足下勉之大江之南夏候鬱溼易生百疾足下氣俊胸臆間不以悁忿是非貯之邪氣不能侵慎防是晚多食大醉繼飲其他無所道某再拜夫子曰不怨天不尤人下學而上達知我者其天乎復曰知我者以春秋罪我者亦以春秋此聖人操心不顧世人之是非也柱厲叔事莒敖公莒敖公不知及莒敖公有難柱厲叔死之不知我則己反以死報之蓋怨不知之深也豫讓謂趙襄子曰智伯以國士待我我以國士報之此乃烈士義夫有才感其知不顧其生也行無堅明之異才無尺寸之用泛泛然求知於人知則不能有所報不知則怒此乃衆人之心也聖賢義烈之士既不可到小生有異於衆人者審已切也審已之行審已之才皆不出衆人亦不求知於人已或有知之者則藏縮退避唯恐知之深蓋自度無可以為報效也或有因緣他事不得已求知於人者苟不知未嘗退有懟言怨色形於妻子之前此乃比於衆人唯審已求知也太和二年小生應進士舉當其時先進之士以小生行可與進業可與修喧而譽之爭為知己者不啻二十人小生邇來十年江湖間時時以家事一抵京師事已即返嘗所謂喧而譽之為知已者多已顯貴未嘗一到其門何者自十年來行不益進業不益修中夜忖量自愧於心欲持何説復於知已之前為進拜之資乎默默藏縮苟免寒飢為幸耳昨李巡官至忽傳閣下旨意似知姓名或欲異日必録在門下閣下為世之偉人巨德小生一獲進謁一陪宴享則亦榮矣况欲異日終置之於榻席之上齒於數子之列乎無攀緣絲髮之因出特達倜儻之知小生自度宜為何才可以塞閣下之求宜為何道可以報閣下之德是以自承命以來審己愈切撫心獨驚忽忽思之而不自知其然也若蒙待之以衆人之地求之以衆人之才責之以衆人之報亦庶幾異日受約束指顧於簿書之間知無不為為不及私亦或能提筆伸紙作詠歌以發盛德止此而已其他望於古人責以不及非小生之所堪任伏恐閣下聽聞之過求取之異敢不特自發明導説其衷一開閣下視聽其他感激發憤懷愧恩德臨紙汗發不知所裁某恐懼再拜某白莊先輩足下凡為文以意為主以氣為輔以辭彩章句為之兵衛未有主強盛而輔不飄逸者兵衛不華赫而莊整者四者高下圓折步驟隨主所指如鳥隨鳳魚隨龍師衆隨湯武騰天潛泉橫裂天下無不如意苟意不先立止以文彩辭句繞前捧後是言愈多而理愈亂如入闤闠紛然莫知其誰暮散而已是以意全勝者辭愈朴而文愈高意不勝者辭愈華而文愈鄙是意能遣辭辭不能成意大抵為文之旨如此觀足下所為文百餘篇實先意氣而後辭句慕古而尚仁義者苟為之不已資以學問則古作者不為難到今以某無可取欲命以為序承當厚意惕息不安復觀自古序其文者皆後世宗師其人而為之詩書春秋左氏以降百家之説皆是也古者其身不遇於世寄志於言求言遇於後世也自兩漢以來富貴者千百自今觀之聲勢光明孰若馬遷相如賈誼劉向揚雄之徒斯人也豈求知於當世哉故親見揚子雲著書欲取覆醬瓿雄當其時亦未嘗自有誇目况今與足下並生今世欲序足下未巳之文此固不可也苟有志古人不難到勉之而已某再拜伏以三城所治兵精地要北鎖太行東塞黎陽左京河南指為重輕自艱難已來儒生成名立功者蓋寡於前代是以壯健不學之徒不知儒術不識大體取求微效終敗大事不可一二悉數伏以尚書有才名德望知經義儒術加以儉克好立功名今橫據要津重兵在手朝廷縉紳之士屈指延頸佇觀德政况聖主掀擢豪俊考校古今退朝之後急於觀書已築七關取隴城緝為郡縣今親誅虜收其土田取其良馬為耕戰之具西復涼州東取河朔平一天下不使不貢不覲之徒敢自專擅此實聖主之心事業已彰臣下明明無不知之伏自尚書樹立鍛鍊教訓揀拔法術尺寸取於古人若受指顧必立大功使天下後學之徒知成功立事非大儒知今古成敗者不能為之復使儒生舒展胸臆得以誨導壯健不學之徒指蹤而使之令其心服正在今日某多病早衰志在耕釣得一二郡資其退休以活骨肉亦能作為歌詩以稱道盛德其餘息心亦已久矣下情日增瞻仰戀德之切某恐懼再拜伏以鹽鐵重務根本在於江淮今諸監院頗不得人皆以權勢干求固難悉議停替其於利病豈無中策某自池州睦州實見其弊蓋以江淮自廢留後以來凡有寃人無處告訴每州皆有土豪百姓情願把鹽每年納利名曰土鹽商如此之流兩稅之外州縣不敢差役自罷江淮留後以來破散將盡以監院多是誅求一年之中追呼無已至有身行不在須得父母妻兒錮身驅將得錢即放不二年內盡恐逃亡今譬於常州百姓有屈身在蘇州歸家未得便可以蘇州下狀論理披訴至如睦州百姓食臨平監鹽其土鹽商被臨平監追呼求取直是睦州刺史亦與作主不得非裹四千里糧直入城役使即須破散奔走更無他圖其間搜求胥徒針抽縷取千計百校唯恐不多除非吞聲別無赴訴今有明長吏在上旁縣百里尚敢公為不法况諸監院皆是以貨得之恣為姦欺人無語路况土鹽商皆是州縣大戶言其根本實可痛心比初停罷留後衆皆以為除煩去冗不知其弊及於疲羸即是所利者至微所害者至大今若蒙侍郎改革前非於南省郎吏中擇一清慎依前使為江淮留後減其胥吏不必一如向前多置人數即自嶺南至於汴宋凡有寃人有可控告姦贓之輩動而有畏數十州土鹽商免至破滅除江淮之大殘為侍郎之陰德以某愚見莫過於斯若問於鹽鐵吏即不欲江淮別有留後若有留後其間百事自能申狀咨呈安得貨財表裏計會分其權力言之可知伏惟俯察愚衷不賜罪責某再拜汴州境內最弊最苦是牽船夫大寒虐暑窮人奔走斃踣不少某數年前赴官入京至襄邑縣見縣令李式甚年少有吏才條疏牽夫甚有道理云某當縣萬戶已來都置一板簿每年輸檢自差欲有使來先行文帖克寸期令至不揀貧富職掌一切均同計一年之中一縣人戶不著兩度夫役如有遠戶不能來者即任納錢與於近河雇夫對面分付價直不令所有欺隱一縣之內稍似蘇息蓋以承前但有使來即出帖差夫所由得帖富豪者終年間坐貧下者終日牽船今即自以板簿在手輪流差遣雖有黠吏不能用情某每任刺史應是役夫及竹木瓦磚工巧之類並自置板簿若要使役即自檢自差不下文帖付縣若下縣後縣令付案按司出帖分付里正一鄉只要兩夫事在一鄉遍著赤帖懷中藏卻巡門掠斂一遍貧者即被差來若籍在手中巡次差遣不由里胥典正無因更能用情以此知襄邑李式之能可以惠及夫役更有良術即不敢知以某愚見且可救急因襄邑李生之績效知先輩思報幕府之深誠不覺亦及拙政以為證明豈敢自述今為治患於差役不平詩云或栖遲偃仰或王事鞅掌此蓋不平之故長史不置簿籍一一自檢即姦胥貪冒求取此最為甚某恐懼再拜伏覩明詔誅山東不受命者廟堂之上事在相公雖樽俎之謀算畫已定而賤末之士芻蕘敢陳伏希捨其狂愚一賜聽覽某大和二年為校書郎曾詣淮西將軍董重質詰其以三州之衆四歲不破之由重質自誇勇敢多算之外復言其不破之由是徵兵太雜耳遍徵諸道兵士上不過五千人下不至千人既不能自成一軍事須帖附地主名為客軍每有戰陳客軍居前主人在後勢羸力弱心志不一既居前列多致敗亡如戰似勝則主人引救以為已功小不勝則主人先退至有殲焉初戰二年已來戰則必勝是多殺客軍及二年已後客軍殫少止與陳許河陽全軍相搏縱使唐州軍不能因雪取城蔡州兵力亦不支矣其時朝廷若使鄂州壽州唐州祇令保境不用進戰但用陳許鄭滑兩道全軍帖以宣潤弩手令其守隘即不出一歲無蔡州矣今者上黨之叛復與淮西不同淮西為寇僅五十歲破汴州襄州襄城盡得其財貨輸之懸瓠復敗韓全義於殷上多殺官軍四萬餘人輸輦財穀數月不盡是以其人味為寇之腴見為寇之利風俗益固氣焰已成自以為天下之兵莫我與敵父子相勉僅於兩世根深源闊取之固難夫上黨則不然自安史南下不甚附隸建中之後每奮忠義是以郳公抱真能窘田悅走朱滔常以孤窮寒苦之軍橫折河朔強梁之衆貞元中節度使李長策卒中使提詔授與本軍大將但軍士附者即授之其時大將來希皓為衆所服中使將以手詔付之希皓言於衆曰此軍取人合是希皓但作節度使不得若朝廷以一束草來希皓亦必敬事中使言面奉進旨只令此軍取大將授與節金戊朝廷不別除人希皓固辭押衙盧從史其位居四下因潛與監軍相結超出伍曰若來大夫不肯受詔某請且勾當此軍監軍曰盧中丞若肯如此此亦固合聖旨中使因探懷取詔以授之從史捧詔再拜舞蹈希皓回揮同列使北面稱賀軍士畢集更無一言從史爾後漸畜姦謀養義兒三千人日夕煦沫及父虔死軍士留之表請起復亦只義兒與之唱和其餘大將王翼元烏重允第五釗等及長行兵士並不同心及至被擒烏重允坐於軍門喻以禍福義兒三千一取約束及河陽取孟元陽為之統帥一軍無主僅一月日曾無犬吠况於他謀以此證驗人心忠赤習尚專一可以盡見及元和十五年授與劉悟時當幽鎮入覲天下無事柄廟算者議必銷兵雄健敢勇之士百戰千攻之勞坐食租賦其來已久一旦黜去使同編戶紛紛諸鎮停解至多是以天下兵士聞之無不忿恨至長慶元年七月幽鎮乘此首唱為亂昭義一軍初亦鬱咈及詔下誅叛使溫起居造宣慰澤潞便令發兵其時九月天氣已寒四方全師未頒中冬衣服聚之授詔或伍或離垂手強項往往誶語及溫起居立於重榻大布恩旨并疏昭義一軍自七十餘年忠義戰伐之功勞安史已還叛逆滅亡之明效辭語既畢無不歡呼人衣裋褐爭出效命其時用兵處處敗北唯昭義一軍於臨城縣北同果堡下大戰殺賊五千餘人所殺皆樓下步射搏天飛者賊之精勇無不殲焉賊中大震更一月日田布不死賊亦自潰後一月其軍大亂殺大將磁州刺史張汶因劫監軍劉承階盡殺其下小使此實承階侮媟一軍侵取不已張汶隨王承元出於鎮州久與昭義相攻軍人惡之汶既因依承階謀欲殺悟自取軍人忌怒遂至大亂非悟獨能使其如此劉悟卒從諫求繼與扶同者只鄆州隨來中軍二千耳其副倅賈直言入責從諫曰爾父提十二州地歸之朝廷其功非細祇以張汶之故自謂不潔淋頭竟至羞死爾一孺子安敢如此從諫恐悚不敢出言一軍聞之皆陰然直言之説值寶歷多故因以授之今才二十餘歲風俗未改故老尚存雖欲劫之必不用命伏以河陽西北去天井關強一百里關隘多山井不可鑿雖有兵力必恐無功若以萬人為壘下窒其口高壁深塹勿與之戰忽有敗負勢驚洛師蓋河陽軍士素非精勇戰則不足守則有餘成德一軍自六十年來世與昭義為敵訪聞無事之日村落鄰里不相往來今王司徒代居反側思一自雪况聯姻戚願奮可知六十年相讐之兵仗朝廷委任之重必宜盡節以答殊私魏博承風亦當效順然亦止於圍一城攻一堡刊木堙井係纍稚老而已必不能背二十城長驅上山徑搗上黨其用武之地必取之策在於西面今者嚴紫塞之守備謹白馬之隄防祇以忠武武寧兩軍以青州五千精甲宣潤二千弩手由絳州路直東徑入不過數日必覆其巢何者昭義軍糧盡在山東澤潞兩州全居山內土瘠地狹積穀全無是以節度使多在邢州名為就糧山東糧穀既不可輸山西兵士亦必單鮮搗虛之地正在於此後周武帝大舉伐齊路由河陽吏部宇文弼曰夫河陽要衝精兵所聚盡力攻圍恐難得志如臣所見彼汾之曲戌小山平用武之地莫過於此帝不納無功而還後復大舉竟用弼計遂以滅齊前秦苻堅遣將王猛伐後燕慕容偉大破偉將慕容評於潞州因遂滅之路亦由此北齊高歡再攻後周路亦由此而後周名將韋孝寬齊王攸常鎮勳州玉璧城故東西相伐每由此路以古為證得之者多以某愚見不言劉稹終不能取貴欲速擒免生他患昨者北虜才畢復生上黨賴相公廟算深遠北虜即日敗亡儻使北虜至今尚存沿邊猶須轉戰回顧上黨豈能討除天下雖言無事若上黨久不能解別生患難此亦非細自古皆因攻伐未解旁有他變故孫子曰兵聞拙速未覩巧之久也伏聞聖主全以兵事付於相公某受恩最深竊敢干冒威嚴遠陳愚見無任戰汗某頓首再拜伏以太尉持柄在上當軸處中未及五年一齊四海德振法束貪廉懦立有司各敬其事在位莫匪其任雖九官事舜十人佐周校於太尉未可為比伏以江淮賦稅國用根本今有大患是劫江賊耳某到任才九月日尋窮詢訪實知端倪夫劫賊徒上至三船兩船百人五十人下不減三二十人始肯行劫劫殺商旅嬰孩不留所劫商人皆得異色財物盡將南渡入山博茶蓋以異色財物不敢貨於城市唯有茶山可以銷受蓋以茶熟之際四遠商人皆將錦繡繒纈金金義銀釧入山交易婦人稚子盡衣華服吏見不問人見不驚是以賊徒得異色財物亦來其間便有店肆為其囊橐得茶之後出為平人三二十人挾持兵仗凡是鎮戌例皆單弱止可供億漿茗呼召指使而已鎮戌所由皆云賒死易就死難縱賊不捉事敗抵法謂之賒死與賊相拒立見殺害謂之就死若或人少被捉罪抵止於私茶故賊云以茶壓身始能行得凡千萬輩盡販私茶亦有已聚徒黨水劫不便逢遇草市泊舟津口便行陸劫白晝入市殺人取財多亦縱火唱棹徐去去年十月十九日劫池州青陽縣市凡殺六人內取一人屠刳心腹仰天祭拜自邇以來頻於鄰州大有劫殺沉舟滅迹者即莫知其數凡江淮草市盡近水際富室大戶多居其間自十五年來江南江北凡名草市劫殺皆遍只有三年再劫者無有五年獲安者一劫之後州縣糜費所由尋捉烽火四出凡是平人多被恐脅求取之外恩讐並行追逮證驗窮根尋葉狼虎滿路狴牢充塞四五月後炎鬱蒸濕一夫有疾染習多死免之則蹤迹未白殺之則贓狀不明一獄之中凡五十人中二十人悉是此輩至於真賊十人不得一濠亳徐泗汴宋州賊多劫江南淮南宣潤等道許蔡申光州賊多劫荊襄鄂嶽等道劫得財物皆是博茶北歸本州貨賣循環往來終而復始更有江南土人相為表裏校其多少十居其半蓋以倚淮介江兵戈之地為郡守者罕得文吏村鄉聚落皆有兵仗公然作賊十家九親江淮所由屹不敢入其間所能捉獲又是沿江架船之徒村落負擔之類臨時脅去分得涓毫雄健聚嘯之徒盡不能獲為江湖之公害作鄉閭之大殘未有革實可痛恨今若令宣潤洪鄂各一百人淮南四百人每船以三十人為率一千二百人分為四十船擇少健者為之主將仍於本界江岸創立營壁置本判官專判其事揀擇精鋭牢為舟棹晝夜上下分番巡檢明立殿最必行賞罰江南北岸添置官渡百里率一盡絶私載每一宗船上下交送是桴鼓之聲千里相接私渡盡絶江中有兵安有烏合蟻聚之輩敢議攻劫或曰制置太大不假如此答曰今西北邊禦未來之寇備向化之戎長傾東南物産供百萬口况長江五千里來往百萬人日殺不辜水滿寃骨至於嬰稚曾不肯留葛伯殺餉童子湯征滅之蓋以童子無知而殺之王者不捨其罪今長江連海㣥盜如麻驟雨絶絃不可尋逐無關可閉無要可防今者自出五道兵士不要朝廷添兵活江湖賦稅之鄉絶寇盜劫殺之本政理之急莫過於斯若此制置凡去三害而有三利人不寃死去一害也鄉閭獲安無追逮證驗之苦去二害也每擒一私茶賊皆稱買賣停泊恣口點染鹽鐵監院追擾平人搜求財貨今私茶盡黜去三害也商旅通流萬貨不乏獲一利也鄉閭安堵狴犴空虛獲二利也擷茶之饒盡入公室獲三利也三害盡去三利必滋窮根尋源在劫賊耳故江西觀察使裴誼召得賊帥陳璠署以軍中職名委以江湖之任陳璠健勇分毫不私自後廉察悉皆委任至今陳璠每出彭蠡湖口領徒東下商船百數隨璠行止璠去之後惘然相弔安有清朝盛時太尉在位反使萬里行旅依一陳璠某詳觀格律敕條百二十卷其間制置無不該備至於微細亦或再三唯有江寇未嘗言及今四夷九州文化武伏奉貢走職罔不如法言其功德皆歸太尉敢率愚衷上干明慮冀裨億萬之一無任戰汗惶懼之至某謹再拜天生相公輔仁聖天子外齊武事內治文教被權衡稱量者不失銖黍受威烈懾怛者蚓縮魚藏百職率治中外平一伏惟相公功德無與為比往者彭城驕強頑卒數萬聯三齊舊風振天下餉道重弓束矢大刀長矛不受指揮自有信誓王侍中生於其間稱為健黠奔馬潛出不敢回顧高僕射寬厚聞名能治軍事舉動汗流拜於堂下及乎不受李司徒臠食其使者風波不回氣勢已去自淮北渡由洛東下漕挽行役出泗上者稚長相賀藩鎮欲生事樹功者橫激旁構廟堂謀議不知所出相公殿一家僮馳入萬衆無不手垂目瞪露刃弦弓偶語腹非或離或伍相公氣壓其驕文誘其順指示叛臣賊子覆滅之蹤鋪陳忠臣義士榮顯之效皇威坌湧於言下狼心頓革於目前然後剔刮根節銷磨頑礦日教月化水順雪釋吐飯飽之解衣暖之威驅恩收禮訓法束一年人畏二年人愛三年化成裁成一邦俗同三輔當此之時遲回之間有勇力者一唱而起徵兵數十萬大小且百戰然後傅其壘鉤其垣得其罪人天下固已困矣而天下議者必曰某名將也某善用兵也雖疏爵上公裂土千里其酬尚薄此必然之説也故曰見勝不過衆人之所知非善之善者也戰勝而天下曰善非善者也百戰百勝非善之善者也能不戰而屈人之兵乃善之善者也是相公手攜暴虎貪狼化為耕牛乘馬退數十萬兵解天下之縛祇於談笑俯仰燕享筆硯之間耳以此校之斯過古人萬萬遠矣復自持統大相開張教化外制四夷內循百度長育人材興起頽弛心迎志釋罔有怨嗟是以天下帖泰蝗死災去飢人復飽流人復安內外遠近率職奉法不聞其他如周有召穆公仲山甫漢有魏相邴吉國朝姚宋二公文事武事居中處外罔不是倚國家有天下二百三十餘年盛溢兩漢功侔三代今復生相公輔佐仁聖天子天時人事即自將來福祿昌熾卜之無窮天下孰不幸甚某僻守荒郡亦被陶鈞齒髮甚壯志尚未衰敢不自強冀得天造無任感激悃懇之至某恐懼再拜今日輕重望於幾人相位將權長材厚德與輕則輕與重則重將軍豈能讓焉昔者齊盜坐父兄之舊將七十年來海北河南泰山課賦三千里料甲一百縣獨據一面橫挑天下利則伸鈍則滿鏃而不發約在子與孫血絶而已此雖使鐵偶人為六軍取不孔易况席征蔡之弊天下消耗燕蟠趙伏用齊卜我當此之時一年不能勝則百姓半流二年不能勝則關東之國孰知其變化也將軍一心仗忠半夜興義昧旦而齊族矣疆土籍口探出僭物重寶仰關輦上是以趙一搖燕一呼爭來汗走一日四海廓廓然無事矣伏惟將軍之功德今誰比哉是以初守滑臺為尚書守潞為僕射乃作司空乃作司徒爰開丞相府平章天下越録躐等驟得富貴古今之人亦以為將軍止此而已矣將軍德於國家甚信大國家復之於將軍雅亦無與為大矣今者上黨足馬足甲馬極良甲極精後負燕前觸魏側肘趙彼三虜屠囚天子耆老劫良民使叛銜尾交頸各蟠千里不貢不覲私贍妻子王者在上此輩何也今者上黨馳其精良不三四日與魏決於漳水西不五六日與趙合於泜水東縈太原排飛狐緩不二十日與燕遇於易水南此天下之郡國足以事區區於忠烈無如上黨者明智武健忠寬信義知機便多算畫攻必巧戰不負能使萬人樂死赴敵足以事區區於忠烈天下之人無如將軍者爵號祿位富貴休顯宜驅三族上校恩澤宜出萬死以副倚注天下之人亦無如將軍者是將軍負天下三無如之望也始者將軍賴齊然後得祿仕入臥內等子弟一身聯齊纍世之逆卒境上爭首其恩甚厚其勢甚不便將軍以為大仁可以殺身大忠不顧細謹終探懷而取之今者將軍負三無如之望上戴天子四海之大以為緩急所宜日夜具申喧請今默而處者四五歲矣負天下之三無如者宜如是邪不宜如是耶是以天下之小人以為將軍始者取齊見利而動今者安潞見義而止若是則天下利無窮義有限走無窮背有限則安可識之哉其有識者則曰不然夫桓文之霸也先修刑政然後事事近有山東士人來者咸道上黨之政軍士兵吏之詳男子畝婦人桑老者養孤者庇上下一切罔有紕事暨乎政庭則將軍不知尊布衣不知卑諸侯之驕久矣是以高才之人不忍及門仁政不施久矣是以暴亂不止若此者將軍是行仁政來高才苟行仁政來高才若非止暴亂尊九廟峻中興復何汲汲如是邪在漢伯通在晉牢之二人功力不寡一旦誅死人豈寃之苻秦相猛將終戒視後禍大唐太尉房公忍死表止伐遼此二賢當時德業不左諸人尚死而不已蓋以輔君活人為事非在矜伐邀引為心也伏惟將軍思伯通牢之所以不終仰相猛房公之所以垂休則天下之人口祝將軍之福壽目睹將軍盛德之形容手足必不敢加不肖於將軍之草木此乃上下萬世烈丈夫口念心禱而求者今將軍盡能有之豈可容易而棄哉大唐二百年自外叛者三十餘種大者三得其二小者亦包裹千里燕趙魏潞齊蔡吳蜀同歡共悲手足相急陳刺死帳下死圍悉死伏劍死斬死絞死大者三歲小或一日已至於盡死曰忠曰義則有父子同壇兄弟繼踵論罪則曰有某功論功則曰捨某罪伏惟十二聖之仁一何汪汪焉天之校惡滅逆復何切切焉比乃盡將軍所識復何云云小人無位而謀當死罪某恐懼再拜伏以睦州治所在萬山之中終日昏氛侵染衰病自量忝官已過不敢率然請告唯念滿歲得保生還不意相公拔自汙泥升於霄漢卻收斥錮令厠班行仍授名曹帖以重職當受震駭神魂飛揚撫已自驚喜過成泣藥肉白骨香返遊魂言於重恩無以過此
