front:
  text: 全唐文欽定全唐文卷六百八十三藝貞元時人
  hash: sha256:c92e21747ec637c9186aeb57293d83b2e5aa81e7ced8d8292e9293a993e76278
  markers:
  - {type: head, offset: 14, content: 李藝, id: KR4h0168_NFKB_683-h1, level: 1}
body:
  text: 天為淳源支流一派後楫先軌者蓋紐宗子相襲焉由士闕時望扃扇和風昔附闕獨於前聞也公諱宗卿字同係臨汝郡人曾祖蘭州刺史日闕州龍遊縣闕瑱考朝議郎泗州虹縣尉援本以敦序闕時衣冠及位公道亮取時宏性測初勵躬祇廙克事闕難濟國操節侔搢拖義為紳常以顯闕隱闕進會於道並泰則何宦而闕自董武崇階總兵闕門闕宗族處朝襄交在位隟伺內薦冀乎闕公植其風忽遺其命也時貞元十三年歲次闕夏口官舍嗚呼春秋六十有二夫人汲郡康氏毀躬闕長子德方次子直方宏方季子幼方等主奠號天哀闕河南元氏先公之淪次女十六娘已許於天水趙氏幼女十闕茹泣貫心闕於闕月十一日權闕禮也於戲修幹挺空而見摧君子不幸於闕生誠藝通忝殊眷孟伯之子恭命為詞杳杳邃氣闕顧巖作度闕其一噫云夢奠倏歎頽闕代闕馳闕彰其二曙興神輦告赴原塋却負闕哀闕至情其三寂貞元時人我皇道叶神化功高睿算萬國之光斯臨八聖之業是纂遐哉辮髮之俗既竭赤誠逖爾椎髻之人亦輸丹欵豈不以陰陽煥乎金鏡律呂諧乎玉琯德該動植而以信以寬仁及飛走而不麛不卵故得殊方述職異俗來庭歸我元造沐我皇靈曉逾赤坂以向日夕過白登以占星磧路誠遙委毳幕氊裘之質山梯雖險致穿胸儋耳之形然則自南自北或馳或渡俱為九譯之鄉各涉萬里之路同臻禁地事且叶於不期並列盛時禮若符於有素是以坦王道恢帝圖蕩然與龍山非隔廓爾將鳳穴靡殊集六蠻而輝赫九域萃五狄而光耀八區邇無不賓鄙周宣勤乎薄伐遠無不服笑諸葛矜於渡瀘遂能革至性於方外柔獷俗於面內大行人明其近遠懷方氏導其進退靡僭晷刻既從荔浦之源罔復斯須爰自榆林之塞有以見化溢舍宏恩覃覆燾膳豐館給禮洽郊勞孰云胡越之異來若同心且殊虞芮之爭會如兩造以其逾絶漠逗懸巖蓋由君邁軒轅顓頊臣掩伊陟巫咸不然則焉能抵秦川來魏闕皆展遐方之貢獻共備同日之朝謁者哉同范陽人隱居少室山自號玉川子以諫議徵不起甘露之變因宿王涯第被害貪殘姦酗狡佞訐愎身之八殺背惠恃己狎不肖妒賢才命之四孽有是有此余敢辭無是無此余之師一日不見余心思其人懼其人其交其難敢告於門人之有髮兮旦旦思理有身兮有心兮胡不如是蛇毒毒有形藥毒毒有名人毒毒在心對面如弟兄美言不可聽深於千丈坑不如掩關坐幽鳥時一聲龜汝靈於人不靈於身致網於津吾靈於身不靈於人致走於塵龜吾與汝鄰孝標桐廬人元和十四年進士除祕書省正字太和中試大理評事念黎庶兮罹於毒痡我興師以翦屠如旱歲之稼穡得膏雨之霑濡豈不以垂渥澤潤涸枯草木之心寧慮暵其乾矣天人之意將使衛討邢乎至乃鋭戈矛齊卒伍誠告虔於上帝祈發生於下土龍旗電掣疑驅蔚矣之雲鼉鼓雷奔似送沛然之雨匪六師之是侵實百姓以為心所謂謀臣如雨猛將如林馳之驟之似得時而將降六伐七伐謂決渠而就深既踴躍而成列象沈陰之欲泄青萍刜而破塊將分白羽麾而散絲不絶奚潤草之芳茂信洗兵之是閲異苞茅之貢矣爾職不恭同陰雨以膏之我心則悅不疾不徐箕張翼舒向兵革而自弭喻雱雨水它之有餘多鼓鈞聲知上善之不若密雲不雨想西郊之未如且宣王六月兮非旱之備高宗三年兮適足為費惟鬼方之是懼何人倫之足慰豈比指緑林於一戎養蒼生於百卉知我者信號令如春不知我者疑甘澤隨輪一鼓而風雲作氣再麾而寰宇清塵以此出征為活國不能無戰乃愛人故得戎羯來王淮夷納款嗟螻蟻之猶聚將刑戮而尚緩今挾泰山壓危卵不得已而用師如救嵗之大旱郁字古風常州刺史及子貞元十四年進士元和初舉制科高等纍官祕書監卒年四十贈絳州刺史問皇帝若曰朕觀古之王者受命君人兢兢業業承天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徵極諫而文學稍進匡時濟俗罔不率繇厥後相循有名無實而又設以科條增求茂異捨斥已之至論進無用之虛文指切著明罕稱於代茲朕所以嘆息鬱悼思索其真是用發懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間歡然相與子大夫得不勉思朕言而茂明之我國家光宅四海年將二百十聖宏化萬方懷仁三王之禮靡不講六代之樂罔不舉漏澤於下升中於天周漢已還莫斯為盛自禍階漏壞兵宿中原生人困竭耗其大半農戰非古衣食罕儲念茲疲氓未遂富庶督耕殖之業而人無戀本之心峻榷酤之科而下有重斂之困舉何方而可以復其盛用何道而可以濟其艱既往之失何者宜懲將來之虞何者當戒昔主父懲患於朝錯而用推恩夷吾致霸於齊桓而行寓令精求古人之意啓迪來哲之懷眷茲洽聞固所詳究又執契之道垂衣不言委之於下則人用其私專之於上則下無其功漢元優游於儒術盛業竟衰光武責課於公卿峻政非美二途取捨未獲所從余心浩然蓋所疑惑子大夫熟究其言旨屬之於篇興自朕躬毋悼後害對臣聞天發生以雷雨聖人發生以號令天道帝道並行於上㣥僚庶物感遂於下伏惟陛下與天為仁與雷作解臣則蠢動之一物也氣下乃出安知其由比於金石草木物之無心者也和之或大鳴小鳴終始相生清濁雜作變而成文者以聖人擊考之不得藏其聲也若臣者朴直蠢愚陛下考之而無聲是不如金石草木之無心矣敢不極聞以對伏以陛下發德音訪巖藪招賢士求直言詢可行之謀垂不倦之聽欲使上獲其益下輸其情君臣之間歡然相遇此禹所以稱大漢所以稱盛者用此道也臣何足以仰承之臣以為有國不患無賢患不能用賢不患無直言患不能容直言今夫朝廷之大百官之衆非無賢也然陛下黈纊凝旒或未之察㣥臣各默默來朝而退雖有賢才孰能辨之觀易卦乾上坤下否坤上乾下泰乾為君坤為臣君意下降臣誠上達則是天地交泰之時也君意不下降臣誠不上達則是天地不交否之時也若太宗文皇帝每一視朝未嘗不從容問㣥臣政之得失下有一毫之善上無不獎上有一毫之失下無不諫或有引入禁內或周旋禁中疾則幸其第沒則臨其喪君臣之道可謂至矣是以無遺才無闕政巍巍蕩蕩與天無窮者上下交泰也秦帝胡亥信用左右左右欲專秦柄乃教胡亥曰陛下富有春秋初即位奈何與公卿廷決事事即有誤示㣥臣短也於是胡亥常居禁中㣥臣希見者不聞其過天下所以亂者上下不交也伏惟陛下上法天下法地中法太宗每坐朝宣旨使㣥臣各有所陳陛下賜之溫顏盡其啓沃言語侍從之臣得以奉其職左右有所書以貽來代諫諍之官與聞其政而獻替之使此輩無有所補黜之可也使其稍識大體陛下與之論道講政豈不可裨於萬一也孰敢不輸其情乎苟居位者不與之言獻直言者不與之用又何必搜羅巖穴遠訪不用之人勤求不信之言乎賢者又何來也來者又何言也此體用之要求賢濟理之術盡於是矣惟陛下行之若生人之困於衣食而無戀本之心但兵宿中原如此實由方面大臣之罪也夫方面大臣宜直播天子之休風保撫其人如赤子而乃傾其脂血剝其生財聚其技慧淫巧以蕩上心天子誠以為物力有餘而不知其情也執事者又未嘗聞以生人艱苦為言而得罪者豈其盡直而不用乎夫王者居於九天之上非臣下痛激肝血指明而言亦何由而達也若臣下者草木孤賤宜周旋其所以能而言之也今天下困於商稅不均可謂甚矣百姓之忘本十而九矣昔嘗有人有良田千柔桑千本居室百堵牛羊千蹄奴婢千指其稅不下七萬錢矣然而不下三四年桑田為墟居室崩壞羊犬奴婢十不餘一而公家之稅曾不稍蠲督責鞭笞死亡而後已於是州伯邑長方以人安賦集攘臂於其間趂辦朝廷用升考績取彼逋責均其所存展轉奔逃又升戶口是以賦益重而人益貧不均之甚一也是故欲人之財賦均一而無自蹙之患宜視通邑之盈虛使鄉戶坐於田迭相隱核其上下不使貪官贓吏紛動其間則有無輕重可得而均也夫古有四人今轉加七計口而十分之其所以盡悴出賦而衣食其九者農夫蠶婦而已絳衣淺帶以代農者人十之一縵胡之纓短後之服仰衣食縣官者人十之一矒頭壞衣不耕不蠶坐而供養者人十之三審曲面勢以飭五材鬻工而衣食者人十之二乘時射利貿遷有無取倍稱之息而衣食者人十之二游手倚市以庇妻孥以給衣食者人十之一其餘為農桑之藪焉農夫糠核不足而十人者畜馬厭梁粟蠶婦衣不蔽形而十人者咸襲羅紈是以性近儒則入仕近武則從軍善計則貿遷避事則矒削技巧則為工師拙奸則為駔儈非戇愚專一無他腸者孰肯勤體效力為稼穡之苦乎且以田廢而衣食罕者戶口所在減而背本之利多不均之甚二也陛下誠能寬農人之徵而優樂之杜衆邪之門而困辱之則農桑益而衣食有餘也自兵革以來人多流散版籍廢絶戶口蕩析加以憂懼越於異鄉末以僥幸利其苟且寬之則偷於朝夕勤之則挺而陷於邪又訛言焉屋室聚為瓦礫田野俱為榛蕪賦稅不均居者日困又為此也伏望陛下敕百姓所在編為土著不即歸之舊鄉繕黃籍生則書之死則去之庶男女之所生戶口之多少可得而知也無田者給與公田假種食因其井泉制為民居藝桑麻種蒲蔬育狗彘三年不輸官自初即於三年人猶有之他者所至得以重罪罪之然後人安其生樂其業而無奔亡之患矣安土則敦本敦本則人庶矣稅均則斂輕斂輕則人富矣以此阜俗不盛何為以此濟人何難之有若夫鹽榷者經國之所資財用之大寶也然而當今之務若修其業除其弊亦可以無重斂之困也夫鹽榷之重弊失於商徒操利權州縣不奉法賈太重而吏太煩布帛精粗不中數矣夫以商徒操利權則其利有時而廢州郡不敢誰何是勸農人以逐末也州郡不奉法則各私其人而盜煮者行矣賈太重則貧者不堪矣吏太煩則糜費之者衆矣布帛精粗不中數則女工徒損風俗偷薄而上困矣即如此宜罷鹽鐵之官以省費停郡府之政令以一其門禁人為商以反其耕損其厚賈以利其人速其售而布帛必精以齊其俗以厚其利如此亦可大裨於國大賴於人矣酒酤之人罷之可也夫既往之失不能久於其道將來之虞中道盡也自古帝王未有不勤儉於其初天下歸焉滿假於其終天下離焉陛下以勤儉為恆滿假為戒勤而不已損之又損慎終如初守而勿失天地所以能長且久者以其運行不息也陛下其可息乎可懈乎朝錯所以急繩七國者欲尊天子恐削弱遲而禍大矣主父所以推恩子弟者因其欲而分裂諸侯之易矣今天下一家盡為郡縣無諸侯強大之患無宗室葭莩之親而以推恩為言臣恐未可以令天下也齊桓之時列國相傾管夷吾欲輔霸業恐諸侯先謀而為之備是以修其寓令而兵食足焉使戰者必耕耕者必戰無事則散之壠有事則授之甲兵此古人之意可行之驗也夫舜之所以為聖人以其選賢任能也五教契也五穀棄也五刑臯陶也八音夔也虞伯益也水土禹也喉舌龍也共工垂也舜無事焉是以執左契垂衣裳而天下理豈以必躬必親侵於百職然後以為聖乎必也信而顯之作而行之任之而績用不立則有竄三苗於三危流共工於幽州放歡兜於崇山殛鯀於羽山刑罰有可必加矣孰敢用其私乎儒家者流示人以中而為之節訪其所至而導其不至使夫君臣父子各得其正此其所長也然迂者為之則執古以非今凝滯而不變夫責課者所以俯仰百官也然光武用之而非美者責人之效重也伏惟陛下取漢光武之求實勿務速成用漢元帝之崇儒知其凝滯任人而示之所為端拱而不失其勇闕取捨之間於此乎判矣陛下不能用臣言不當問也謂臣不能言其事不當來也既來矣陛下問狀宜直其辭既問矣微臣盡忠宜採其策盡忠者不易持也直者誰欲為也忠未見盡直必有吝吝構而直不悔不信而忠不追者蓋有之矣由未見其為人也非天之與其剛健地之與其直方內不疑其身外不疑於人憂君而不顧其己濟物而不求其利者孰肯悃悃欵欵出於骨髓發於肝膈如此其切於天下乎夫天下者天下之天下也天子安微臣得保其生不安微臣不保其死是以懷其效以天下為憂不懷其身以天下為念知所以責難於君者所以懷其身所以懷其身者宜及天下如此况陛下宗廟之重其可忽乎屬之於篇勉之於上是在陛下酌之而已矣謹對貞元十三年八月日獨孤郁謹上書於舍人三兄閣下郁以世舊遂獲謁見敘故大賢之遇郁也亦不以常交言之眷意甚露郁鬱堙三年無聞摧頽折羽而不喜者非失意之謂非尤人之謂蓋將因事自罪而不喜也借如豫章生於擁腫小木之中樵蘇見之亦以嗟矣一有不嗟則必自與擁腫者亦不多遠也珠璣混於礫石之中童子弄之亦以驚矣一有不驚則必自與礫石者亦不多遠也鏌鎁臥於鉛鈍之下下工覩之固亦知矣一有不知則必自與鉛鈍者亦不多遠也毛嬙後於宿瘤而行有目者覩之固即分矣一有不分則必自與宿瘤者亦不多遠也苟與乎擁腫礫石鉛鈍宿瘤輩果殊異則不能移凡眼所擇况逃乎良工巧冶有識者之目哉今禮部侍郎之目固亦國之良工巧冶有識者之目也於中再擇再不中是真已為擁腫礫石鉛鈍宿瘤矣何止與斯不遠哉此所以因事自罪而不喜也或諭之曰今之道尚光子之所以不振者晦遏也子之道豐蔀也子且真有崒天之材而隱植之有照乘之珍而密櫝之有切玉之利而謹橈之有傾都之艷而深帷之雖使離婁左執光而右拭眥迫而索之固亦不能知子矣子何不移植露光披鋒示貌使識者覩而駭之彼之所誨固亦郁所不能焉已必不材也必不寶也必不利也必不姝也且遍過於有識者之目是自揚其短也已必材也必寶也必利也必姝也雖小示其光鋒幹貌於一人驚我亦已多矣所不驚者是豫四事果不足異於族凡也郁病直拙獨大賢於郁分殊尚不能以亟况悠悠者與郁常行乎時輩之間多酌其言語善者鄙者而自減盈消息其旨稍有可驚不敢不於許言者言之今之後學者或歎曰吁後學何所歸哉此且非宜長者所當聞也亦非宜長者所不當聞也今朝廷先達病在不能公也或能公而不能為力也覽其文則贊美稱嗟無不至也其間善惡輕重進退則心以別矣此其所以為不能公也鮮有知其必善而風鼓之不啻若自其口出此其所以為公不能為力致使遑遑之倫其下才者亦曰今夫在位者其無公歟其無心歟有一善未嘗肯稱也意曰非我事也又慮與之談者不與我符愛也是使諸子竊竊然自以無聞為不辱遂相與擇捷趨邪紛屯於主司之跡親者苟能致譽則不詰其所以致譽者之賢不肖而曹趨之矣此實今之躁進苟得之風也在朝廷大賢主而名之驅而正之於其善者扶之持之有善而未具者決之導之使四方學士知嚮方焉何如其曰非我事也若使一人曰非我事也十人曰非我事也舉朝廷皆曰非我事也苟非我事則無所不非我事無所不非我事則天地之間無乃已寂寥乎昔孔子飭詩書禮樂以化齊弟子而至天下使孔子亦曰非我事也則今者安盡聞夫七十子之賢詩書禮樂之盛七十子亦曰非我事也又孰為播孔子之聖如此其大乎今文亦如是朝廷先達亦如是後之達者亦如是若不相播則人文禮義知己復往之道不幾乎息乎郁不肖辱承大賢之心深矣非又敢以假喻自薦也意欲以大賢擇衆賢如七十子之徒是亦方孔子於大賢也何如不宣郁再拜某還白天下病不言久矣吾子猥貺嘉言以篤鄙人之志是勗天下之心也幸何獨乎鄙人也利何獨乎是文耶夫言豈一端而已矣知惡而不言是使天下之為惡者不思其懼也知善而不言是使天下之為善者不勸其慕也此二者天下之達道也僕嘗論之安敢不爭斯語直以厄蒙摧頽吾子之所聞見雖欲激昂以是非天下其誰一從僕之所云耶吾子知僕將宦遊訪僕曰是役也為身之役歟為人之役歟意甚善古人曰仕非為貧也又曰君子之仕行其義也僕雖不肖寧獨以衣服飲食犬馬聲色屋室使僕之屑屑歟僕將沈棄蹇連乎則撫循吾之軀何為也其將奮飛騰淩乎則君之建官行封豈私吾饑而寒也又曰親戚處乎大位力主人也足下之所謂親戚者曷若僕之有身耶足下所待僕者寧以曲私從義乎天下之君子固當有以自力也粵其果有茂異僕幸側聞其風曷敢不踴躍話道於彼不識况親戚之無間乎苟不能藉此第僕能富貴之且猶莫許而况又妄於他人耶又曰不待位而言之大道之言也信哉古人有庶人謗於道商旅議於市芻蕘者得進其狂妄焉足下念僕孱性而欲輔僕愚心共至公於天下是直諒多聞之益也某則何幸其將責僕以必聞以至公之道為市價於天下也某何人哉昔張安世為大司馬車騎將軍録尚書事常有所薦其人來謝安世大恨以舉賢進能豈有私耶謝絶之有郎功高不調而自言安世應曰君之功高明主所知人臣執事何短長而自言乎絶不許己而郎遷幕府長史郎辭去之官安世問以過失長史曰將為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知士而薦之其匿名迹遠權勢如此彼推揚賢哲乃公卿大夫四嶽十二牧之職也而富平陰用陽不敢當如僕瑣瑣方困奈何以上官他人之任反以許乎人哉東野用心冀有以相照幸無以僭越之道深望於鄙人也某頓首天子賞將軍之勳自裨校領十萬軍率給麾幢節符佩黃金印者數四廟祖於京開東第駟門號公侯家子弟姻族以將軍故皆為好官將軍之勳名可謂盛矣美矣然某聞古人曰成功不久難處且物禁太盛昔者周公以至聖之德致太平之功以成王幼小不忍而去召公有不悅色何者勢逼不能無嫌故也夫以聖處猶難况非聖哉故范蠡留侯知其然去之而遠害昔者李斯為秦破山東從擒諸侯尊秦為天子秦王以為丞相任事秦廷之貴惟斯耳斯知盛滿不行卒為秦擒韓信為漢誅趙魏破齊楚尊漢為天子漢裂土封王於荊漢將之貴惟信耳信不知降挹一旦蜚言被疑卒受呂后之誅彼二子可謂巧於為人拙於為身故二子始有周呂勳卒受參夷誅何則日務進而不知退故今上封足下為公為王為十萬戶侯傳子襲孫居為夔為龍出為桓為文且令召公無不悅色足下豈不賢於周公哉夫今之遊宦者辛勤數千萬言得一官俸不過三二萬數僕不過一二人滿當罷戀戀不欲去豈非顧其利耶况夫遭時變即據千里土權殺生柄不覺炎燠更變歌僮侍兒俳優不離前為樂萬方以娛情惟恐其不歡無纎憂能鑽其胸豈不願留之耶顧其勢不可是以取古堯讓天下而長有天下孫叔敖不悔去者三願將軍無受吳張元之說納馬援鄒陽之策思留侯陶朱之舉悟韓信李斯之惑立竇融河西之績覽郭馬李高數賢之事稽叔敖三去之美昔蔡澤之說范雎也引鞅起踵以擊奪其位睢受說而歸相讓澤非不知澤情而受市也蓋審理必然今某來非縱橫時豈澤之徒歟既非奪位而來又豈欲騁口衒世直以惜賢人之業耳惟將軍無猜焉或曰文所以指陳是非有以多為貴也其要在乎彩飾其字而慎其所為體也又曰文章乃一藝耳是皆不知上流之文而文之所由作也夫天之文位乎上地之文位乎下人之文位乎中不可得而增損者自然之文也故伏羲作八卦以象天地窮極終始萬化無有差忒故易與天地準此聖人之文至也但合其德而三才之道盡後聖有作不能使之為五或七而九洎曲折者是其文之至也文字既生治亂既形仲尼作春秋以繩萬世而褒貶在一字是亦文之至者乎然則易卦之一畫春秋之一字豈所謂崇飾之道而尚多之意耶夫文者考言之具也可以革則不足以畢天地矣故聖人當使將來無得以筆削果可以包舉其義雖一畫一字其可已矣病不能然而曰必以彩飾之能援引之富為作文之祕訣是何言之末歟夫天豈有意於文彩耶而日月星辰不可踰地豈有意於文彩耶而山川邱陵不可加八卦春秋豈有意於文彩耶而極與天地侔其何故得以不可越自然也夫自然者不得不然之謂也不得不然又何體之慎耶夫天地八卦春秋惟止於此者也吾得定其所云其不至於此者惟吾何學焉吾安能以天下之心也是則其心卓然絶於俗者其文不求而至也無得子為教苟於聖達之門無所入則雖劬勞憔悴於黼黻其何數哉是故在心曰志宣於口曰言垂於書曰文其實一也若聖與賢則其書文皆教化之至言也徒見其纎靡而無根者多紿曰文與藝嗚呼岠官泗州徐城令余宰邑秩滿暫寓居於重光寺空院塊然無以遣日緬想人生在世如白駒之過隙有美事高烈猶可稱述如碌碌凡愚河魚草木隨時凋落蔑爾無聞因思朝廷古今耳目相接名賢碩德遺芳餘躅是非共五十餘條載為一卷不敢傳諸好事但自抒於鄙懷時貞元十四年夏六月記真德宗朝官漢州刺史充威勝軍使臣真言臣聞昔者庖犧氏作承天地理萬物猶以為皇道不足故寂然思化精義感通然則天既不言而生地既不言而育故河出龍圖洛出龜書所以示其文也由是得以畫卦象制文字焉逮夫智慧萌生真朴潛消則文字之理又不足故載誕我元元皇帝以代天地而言將善救其弊者也是以諄諄然五千之文殷勤懇惻斯亦至矣可謂啓道德之根源絶言語之枝葉比之文章則三辰昭回於天也擬乎動植則萬物充盈於地也論其教戒則百行全備於人也何為禮者亂之首亂猶理也亂矣非禮則無以理之故曰亂之首也夫文者武之君也武者文之備也斯蓋二柄兼行兩者同出常居左右孰可廢墜故曰忘戰則危好戰則亡是知兵者可用也不可好也可戰也不可忘也自軒轅皇帝以兵遏亂少昊以降無代無之暨於三王之興雖有聖德咸以兵定天下則三王之兵皆因時而動動畢而後戢戢即不復用也及至嗣君或驕或僻或暴或淫或怒或貪或矜或忌乃為我師我旅我國我家動必取強用必求勝載窮載黷且戰且前或不戢而自焚或無厭而取滅塗萬姓之肝腦快一人之忿欲毒痡海內災流天下是以道君哀其若此又不可得而廢去遂不得已而用之夫聖人用兵之道不以其慍怒也不以其爭奪也不以其貪愛也不以其報怨也蓋整而理之蓄而藏之以謹無良以威不譓非用之於戰陳非用之於殺伐非用之於田獵非用之於強梁此聖人用兵之深旨也又怒者逆德也兵者凶器也爭者人之所甚惡也若以逆德用凶器行人之所甚惡豈容易哉故曰上德者天下歸之上仁者海內歸之上義者一國歸之上禮者一鄉歸之無此四德者人不歸也人不歸則用兵用兵即危之道也故謂不祥之器又曰死地所以王者必先務於道德而重用兵也抑臣又聞之創業之主亡亡以成其功繼體之君存存以保其位故聖人以必不必則兵戎可得而戢衆人以不必必之則戰伐益興故道君非獨諷其當時侯王蓋亦防其後代人君輕用其兵也由是特建五千之言故先舉大道至德修身理國之要無為之事不言之教皆數十章之後方始正言其兵原夫深衷微旨未嘗有一章不屬意於兵也何者伏惟道君降於殷之末代征伐出於諸侯當其時王已失衆正之道也久矣且不得指斥而言故極論沖虛不爭之道柔弱自卑之德以戒之夫爭者兵戰之源禍亂之本也聖人先欲堙其源絶其本故經中首尾重唯以不爭為要也夫唯不爭則兵革何由而興戰陳何因而列故道君叮嚀深誡其有旨哉其有旨哉夫天地何言陰陽不測是以道君強為之名而立文字欲人知之使其行之非難知也非難行也况我國家祖有道而宗有德源聖裔而派仙源乎唐哉皇哉不可得而稱也伏惟睿聖文武皇帝陛下聰明文思濬哲溫恭纘十葉之鴻輝傳千億之命緒闡皇道而育萬物宏帝德而貞百度寂然不動神而化之戢干戈於方興之時却行陳於已列之地無為無事上德上仁貴五千之至言賤百二之重險結繩而理大化克被於生靈擊壤之歌至德亟聞於野老天下幸甚天下幸甚臣少習儒業長無武功覩升平於明盛之時賴亭育於仁壽之域是以不揆庸陋敢侮聖人之言甘心從鼎鑊之誅僥幸納芻蕘之志臣伏以道德經文遠有河公訓釋中存嚴氏指歸近經開元注解微臣狂簡豈敢措詞今之所言獨以兵戰之要採托元微輒録道德經中章首為題序列如左各於題後粗述元元皇帝聖旨或先經以始其事或後經以終其義謬將臆度用達管窺既無百中之能庶均萬分之一因號曰道德論兵要義述詞理荒鄙塵瀆宸嚴無任惶懼戰越之至謹言右臣伏以君之至明貴能下聽臣之至誠貴有上聞微臣性識庸愚知慮寡薄久從戎府不到朝廷特蒙陛下曲貸殊私擢居重任四年之內再領方州無分聖主憂勤不救生靈罷弊胡顏尸素久冒寵榮夙夜兢慚啓處無地臣每伏念筋力駑鈍無可以驅馳身命輕微不足以報效退難補過進實思忠願獻芻蕘庶裨萬一至於上明天道中酌人情下稽地理莫不竭盡臣子之誠冀報君父之德惟詩也三百義必在於無邪惟經也五千理必歸於至正伏惟皇帝陛下體至道為人君以無事理天下一自臨馭萬國康寧日月不照之鄉聲教猶暨霜露表均之地恩信仍加刑罰措而得謂無寃干戈戢而必不復用無為無事雖休勿休海內歡娛天下幸甚是以微臣狂簡輒敢竊疏前件論兵要義述上下兩卷令離為四卷並敘表等不揆荒蕪用申懇欵伏乞聖慈昭鑒俯賜優容布問公卿式明穿鑿然後退死溝壑臣所甘心瀝血吐誠伏待罪責不勝悃迫戰越之至謹差子將尚瓘謹具別封進上謹奏元和四年七月日太穆官金州刺史閣下為南溟之大鵬作中天之一柱騫騰則日月暗搖動則山嶽頽真天子之爪牙諸侯之龜鑑也太穆幼孤二百餘口饑凍兩京小郡俸薄尚為衣食之憂溝壑之期斯須至矣伏惟賢公息雷霆之威垂特達之節賜錢一千貫絹一千匹器物一千事米一千石奴婢各十人分千樹一葉之影即是濃陰減四海數滴之泉便為膏澤喬貞元時人闕一字象至高六位表陰陽之度佛乘最妙四諦斷生滅之疑猶患愛水亂流耶山蔽日用拯㣥溺於習坎殖智牙於大闕十二字之以闕一字律不求髻寶自得衣珠至若了義滿字之元宮真空妙有之大道為三藏百法之長其惟華嚴道場者歟此萬封山門闕五字山闕一字則闕二字河東節度觀察支度營田等處置使北都留守銀青光祿大夫檢校禮部尚書兼御史大夫太原尹上柱國隴西縣開國闕八字李公說之所營建也我尚書捧日天枝干霄帝緒勳逾稷卨德邁蕭曹明鏡懸臺何秋毫之闕八字割闕三字況復詞鋒冠陽春之華仁德同愛日之煦是則九層峻柱萬里長城聲政聞乎王庭謳歌溢於塞下至若興土宇之闕五字之梯航旃陀闕二字童子童孫家至聽法增上慢之匹夫匹婦比屋談元鳳苑龍城多新戶牖豐宮沛寢倍薦華香故得邵政感闕四字闢新施祿俸闕一字因人天證知存沒沾被上棟下宇搆輪奐之福庭或丹或青赫莊嚴於梵域自然膺舟楫之望入鳳凰之池壽日冉彭封闕一字帶礪闕三字靈翼衛千福闕二字八座之應戩穀也粵若內政保於宜家中堂合於進饋佐君子以仁惠慈愛光啓尚書以盛闕一字信能闕二字夫人闕一字樂安任氏疏通妙性黼藻智牙桃李光於肅雍芝蘭茂其靜慎贊成我尚書集此造殿功德者其惟闕二字夫人之謂歟自然順坤儀闕三字出世之道如月之亘森菌桂以馨香如山之容冥大椿之壽考以宏鵲巢之美式佐甘棠之功斯蓋夫人之功德也普光明殿者即毗盧闕四字演三處再會之法堂也觀夫七處九會之樓臺六峯六天之塔廟如瓶沙之苑囿類須達之園林何必瞻烏豈煩偃草彤霄赩闕一字詎減天台緑樹闕二字忽疑靈鷲南瞻花縣則櫛比閈閎北睨晉山乃合沓松石此皆禪師恣心目之所精選也我尚書聞微妙之迹在菡欿之峯闕一字秉鉞事殷乖於飛蓋巡闕乃驟回鸞之札慰沃禪林緘龍藏之經殷勤正法初禪師之肇朕華嚴道場也濫闕一字一剎一堂闕一字設於七處九會闕二字於善財也則衆塔星攢乎絶頂妙拯於慈氏也乃諸天雲靄乎㣥峯蜃氣成樓于上方月輪作殿於下界尊經寶闕一字寫闕一字繒緗闕二字分身衆多塔廟闕二字明實沈之分野廣大鹵之有情而已哉禪師俗姓元氏法字道融鳳翔天興人也力微皇帝之遠條後魏闕一字宗皇帝之華緒外徑竹楨內闕三字談元乃香象威儀傳法則師子奮迅心學龍樹德邁天親操自在之戒珠揭無畏之法印貌正滿月目凝明星闕三字裳闕一字寒輟餔救餒士無放於闕二字路闕一字禁於下山轉龍藏則惟精惟勤禮華嚴則一句一拜其安禪也情無散亂其得定也身不動搖幽明降心闕三字福地祇叢闕一字而護法山靈闕一字以安人至若神光瑞井之休祥梵僧童子之應瑞貓虎曳練以表素文字隱石以呈奇異跡孔多此不具載於是闕一字殿闕二字因山搆成始審曲面勢而工闕一字不瞻星揆日而事集將施夏屋之力果符大壯之規諒杍人僝功侔造化以暗會其蕆事也庀畚鍤以鳧趨鶴躍駢闕一字木而電耀雷奔叢楹戢孖曰以齊闕二字梁偃蹇以橫亘仰藻井以反照乘鸞鈴而嚮風五色比象於其間衆聖列坐儼其內陽闥澒洞以互曜陰窗玲瓏而焜煌金石之所嚴措絡珠之所分別香泥淨鴛鴦之瓦雨起青煙寶網散琉璃之文風搖佩影寒暑隔閡於峻宇日月回薄於雕甍目麗譙之崢嶸上干碧落寫高閣之窕窱下戛闕三字井可以傍窺烟霞可以俯闞寧知非覩史他之移至乾闥婆之幻遊遲想像於萬卦第登陟於三休豈羡夫崑崙山之九重闕二字陟降已哉我尚書成茲紺殿必有豐碑且地有靈蹤山稀巨石禪師至懷憂念寢處無遑乃杖策諦尋隨意墾劚忽逢闕三字中碑材礱之斫之唯除分寸豈非禪師之所心致抑尚書德感之所致也喬智慙測海識陋窺天敢罄芻蕘之詞用深功德之海乃闕一字銘曰闕二字靈山疏峯挾障六天九會併在其上陰陽助巧造化資匠如有龍鬼岑崟肸蠁若存聖賢夕護朝降其一恍闕三字岧蕘化城闕一字有方廣闕一字來此京闕五字岫崢嶸長驅五蔭俯就三明彤梯寶階普濟㣥生其二廣殿崇墉迥出烟外繡楹日逼紺瓦雲靄寶山真闕六字傳法者樹別天籟闕一字剎垂闕五字其三聖師高渺岧然勝輪嵌空彩閣繚繞卿雲梵響難到天聲易聞誰其建之八座當闕一字豐碑永傳闕四字其四
