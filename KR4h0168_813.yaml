front:
  text: 全唐文欽定全唐文卷八百十三希聲蘇州吳人商州刺史鄭愚表為屬召為右拾遺擢纍歙州刺史昭宗時入為給事中拜戶部侍郎同中書門下平章事以太子少師罷卒贈尚書左僕射諡曰文
  hash: sha256:36d60924afd10e9c4de50463a9a8b2b01835a8c61c06cc94b0b6e676ff8af4d9
  markers:
