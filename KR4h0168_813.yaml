body:
  text: 貞元中天子以文化天下天下翕然興於文文之尢高者李元賓觀韓退之愈始元賓舉進士其文稱居退之之右及元賓死退之之文日益高今之言文章元賓反出退之之下論者以元賓早世其文未極退之窮老不休故能卒亶其名豫以為不然要之所得不同不可以相上下者文以理為本而辭質在所尚元賓尚於辭故辭勝其理退之尚於質故理勝其辭退之雖窮老不休終不能為元賓之辭假使元賓後退之之死亦不能及退之之質此所以不相見也夫文興於唐虞而隆於周漢自明帝後文體寖弱以至於魏晉宋齊梁隋嫣然華媚無復筋骨唐興猶襲隋故態至天后朝陳伯玉始復古制當世高之雖博雅典實猶未能全去諧靡至退之乃大革流弊落落有老成之風而元賓則不古不今卓然自作一體激揚發越若絲竹中有金石聲每篇得意處如健馬在御蹀蹀不能止其所長如此得不謂之雄文哉自廣明喪亂天下文集略盡豫得元賓文於漢上惜其恐復磨滅因條次為三編論其意以冠於首大順元年十月日給事中陸希聲序大道隱世教衰天下方大亂當是時天必生聖人聖人憂斯民之不底於治而扶衰救亂之術作周之末世其幾矣於是仲尼闡三代之文以扶其衰老氏據三皇之質以救其亂其揆一也蓋仲尼之術興於文文以治情老氏之術本於質質以復性性情之極聖人所不能異文質之變萬世所不能一也易曰顯諸仁以文為教之謂也文之為教其事彰故坦然明白坦然明白則雅言者詳矣易曰藏諸用以質為教之謂也質之為教其理微故深不可識深不可識則妄作者衆矣夫惟老氏之術道以為體名以為用無為無不為而格於皇極者也楊朱宗老氏之體失於不及以至於貴身賤物莊周述老氏之用失於太過故務欲絶聖棄智申韓失老氏之名而弊於苛繳刻急王何失老氏之道而流於虛無放誕此六子者皆老氏之罪人也而世因謂老氏之指其歸不合於仲尼故訾其名則曰捶提仁義絶滅禮樂病其道則曰獨任清虛何以為治於戲世之迷其來遠矣是使老氏受誣於千載道德不行於當世良有以也且老氏本原天地之始歷陳古今之變先明道德次説仁義下陳禮樂之失刑政之煩語其馴致而然耳其秉要執本在乎情性之極故其道始於身心刑於家國以施於天下如此其備也而惑者尚多云云豈不謂厚誣哉昔伏羲氏畫八卦象萬物窮性命之理順道德之和老氏亦先天地本陰陽推性命之極原道德之奧此與伏羲同其原也文王觀大易九六之動貴剛尚變而要之以中老氏亦察大易七八之正致柔守靜而統之以大此與文王通其宗也孔子祖述堯舜憲章文武導斯民以仁義之教老氏亦擬議伏羲彌綸黃帝冒天下以道德之化此與孔子合其權也此三君子者聖人之極也老氏皆變而通之反而合之研至變之機探至精之賾斯可謂至神者矣而王弼以為聖人以道合體老氏未能體道故阮籍謂之上賢亞聖之人蓋同於輔嗣豈以老氏經世之迹未足充其所言耶斯不然也於戲聖人之在世也有有迹有無迹故道之不行也或危身歷聘以天下為其憂或藏名飛遁示世故不能纍有迹無迹殊途同歸斯實道義之門非徒相反而已然則仲尼之所以出老氏之所以處老氏之所以默仲尼之所以語蓋屈伸隱顯之極也二子安能識之哉司馬遷統序衆家以道德為首可謂知本末矣班固作古今人表乃詘老氏於第三品雖其名可詘而道可貶乎哉於戲老氏之術見棄於當代久矣斯數子者之由也且仲尼親見老氏歎其道曰猶龍乎從之問禮誠無間然著在記傳後世不能通其意是以異端之説紛然蓋述之者不窮其源故非之者不盡其致噫斯傳之不作則老氏之指或幾乎息矣今故極其致顯其微使昭昭然與㣥聖人意相合有能體其道用其名執古以御今致治如反掌耳自言老氏術者獨太史公近之為治少得其道帷漢文耳其他皮傳詭説皆不足取吳郡陸希聲序詩人之作本於風俗大抵以物類比興達乎情性之源自非觀化察時周知民俗之事博聞多見曲盡萬物之理者則安足以蘊為六義之奧流為絃歌之美哉由是言之則古之學者固不厭博博而且信君子難之東牟段君公路鄒平公之孫也自未能把筆愛以指畫地如文字及六七歲受學果能強力不罷其學尢長仄僻人所不能知者薅乎㣥籍之中仡仡然有餘力間者以事南遊五嶺間常采其民風土俗飲食衣製歌謠哀樂有異於中夏者録而志之至於草木果蔬蟲魚羽毛之類有瑰形詭狀者亦莫不畢載非徒止於所聞見而已又能連類引證與奇書異説相參驗真所謂博而且信者矣噫近日著小説者多矣大率皆鬼神變怪荒唐誕妄之事不然則滑稽詼諧以為笑樂之資離此二者或強言故事則皆詆訾前賢使悠悠者以為口實此近世之通病也如君所言皆無有是其著於録者悉可考驗此蓋博物之一助豈徒為談端而已乎君以豫往從事嶺南備核其實請豫序以為證豫嘗觀圖於書府君狀貌一似鄒平公而又能以文學世其家於乎鄒平公為有後矣因為之序而不辭右拾遺內供奉陸希聲撰子乾符初任右拾遺歲莫端居夢在大河之陽曠野數百里有三人偃臥東首長各數十丈有告者曰上伏羲中文王下孔子也三聖皆無言意中甚吅丂一寤而震悸伏而思之河與天通圖之自出三聖衡列乾之象也天道無言示人以象天將以易道豫乎由是考核少小以來所集諸家注説貫以自得之理著易傳十篇傳上經為第一下經為第二所以列彖象之微辭測卦爻之奧義第三篇演文言之純粹以顯聖人之賾第四篇伸繫辭之微意以彰易道之神第五篇原作易之始述列卦之序第六篇釋説卦之義辨反對之相資第七篇窮畫卦象之由生蓍奇耦之極第八篇明權輿律呂之末制作禮樂之原第九通天下之理第十成天下之務別撰作易圖一卷指説一卷釋變一卷微旨一卷又以易經文字古今謬誤又撰證一卷遁叟以斯世方亂遺榮於朝築室陽羡之南而遁迹焉地當君山之陽東溪之上古謂之湖洑渚遁叟既以名自命又名其山曰頤山溪曰蒙溪將以頤養蒙昧也在易頤之象艮為山山下有震震為雷為龍頤山之下東走震澤震雷魚龍之所萃育有頤象焉蒙之象亦艮為山山下有坎坎為水為險頤山之下泉流於險而達於大溪有蒙象焉一旦遁叟觴溪山之神於庭酌而飲頤山曰吾之所以命夫山之為頤者勗子以養也子其養雲雨以潤物養霧露以生物養風霆以長物養雪霜以肅物養巨材以充棟宇養小材以為蒸薪養茅菅以為茨籍養竹箭以為器用養百果以充口腹養百藥以蠲札瘥養昆蟲使咸樂其生養鳥獸使各遂其性噫無或養妖雲悖雨以傷良稼養苦霧淫露以澤惡植養疾風迅霆以摧稿朽養慘霜虐雪以殺根荄養擁腫之朴不為幹材養鈎棘之蘖不中樵爨養蔓延之藟以困條柯養蟠梗之根以固膏土養弗食之實以蕃庶生養雜毒之藥以中函氣養蟒虺蜂蜴以護巢窟養豺狼梟獍以害㣥類維山有神子其飲之無虧爾名而窾爾實又酌而飲蒙溪曰吾所以命夫溪之為蒙者勗子以決也子其決於夷壤以發其源決於塞埴以通其流決於腴畝以施其潤決於涸澤以溥其惠決於廣陂使介鱗蕃育決於巨浸使虯龍變化噫無或決於險阻以資其悍激決於林藪以縱其墊溺決於舄鹵以嗇其施決於池籞以專其利決於甽竇使龜蟹為災決於沮洳使蛙黽得志維溪有神子其飲之無喪爾名而浮爾實於是酌而自飲之吾之所以命是山也必將有所養也命是溪也亦將有所決也吾將養吾志於道而不希於世養吾行於德而不眩於俗養吾浩然之氣以合自然之英養吾誠明之意以入清明之賾又將決吾心於仁義使不違決吾志於中正使不過決吾身於天命使不憂決吾迹於遁世使無悶如此而已遂與山溪揖讓竭吾歡而罷辨且歌曰山乎溪乎吾之心乎醒乎醉乎吾與汝參乎自文宗朝有大溈山大圓禪師居士養道以曹溪心地直指示學人使入元理天下雲從霧集常數千人然承其宗旨者三人而已一曰仰山二曰大安三曰香嚴希聲頃因從事嶺南遇仰山大師於洪州石亭觀音院洗心求道言下契悟元旨大師嘗論門人以希聲為稱首及大師自石亭入東平會希聲府罷冒暑躡屩禮辭於巖下違師僅三十年師歸圓寂今者門人光昧專自東山來請豫以文銘和尚塔豫頃在襄州有香嚴門人請豫為香嚴碑己論三人同體異用之意其辭曰仰山龍從於江西大安雨聚於閩越香嚴霰雨覞於南陽皆尋流得源同出異名之謂也達道者皆以為確論按西域祕記自達摩入中國當有七葉草除其首是也仰山韶州人俗姓葉氏仰承六祖是為七葉然曹溪心地撥去文字不使染著而大師即以曹溪元旨印於大教莫不元符即曹溪所云湛然常寂妙用恆沙圓明變化不可揆測此所謂一體異用者豫以香嚴碑內巳曾論三師之旨故不得重言以俟知者今略解釋以為塔銘大師法名慧寂居仰山日法道大行故今多以仰山為號享年七十七僧臘五十四從國師忠和尚得元機境智以曹溪心地用之千變萬化欲以直截指示學人無能及者而學者往往失旨揚眉動目敲木指境遞相效斆近於戲笑非師之過也然師得曹溪元旨傳付學人雖與經教符同了然自顯一道合離變化所謂龍從者也大師元和二年六月二十一日生中和三年二月十三日入滅大順二年三月十日敕號通智大師妙光之塔云爾乾寧二年三月一日力病撰銘曰六用如如合於太虛四大無主當歸享土以家為塔終古永樂千載之後靈光照灼濬乾符時人天高地厚覆載之道成君聖臣賢教化之功普帝唐以文德走殊俗以武經齊諸夏訏謨下闕張之全才兼將相之重位藝通神化氣肅風雷建曠代之勳庸為一時之標表者則魏帥丞相韓公其為人下闕萬食采於韓因以定氏在春秋時有韓厥事晉獻公能全趙氏之孤不忝上卿之位左氏書之在嬴秦時有韓仰為太傅下闕一朝信生頽當封弓高侯在東漢時有韓稜為尚書令清名直節獨立不黨在東晉時有韓康伯幼闕一字聰悟早遇殷浩見知長負下闕皇室下闕無人是知源深則派長根大則枝茂蟬聯冠冕世享厥位曾王父朝皇魏博臨清鎮都知兵馬使闕一字度奇表嶷然闕一字殊不器之下闕雲下闕夫檢校太子賓客使持節相州諸軍事守相州刺史充本州防禦使御史中丞且習鈐經通知政術桓石虔名能斷闕一字許仲闕一字力可闕一字奔尋闕一字軍下闕相州府下闕以公追孝贈工部尚闕三字祖妣張氏追封清河郡太君皇考闕一字銀青光祿大夫檢校國子祭酒使持節闕一字州闕一字軍事守闕一字州刺闕四字防禦使下闕質徑百鍊下闕克肖門風飛一箭以下城彀虛弓而墜鳥洞曉邊事不後郭公又好讀兵書寧慙奉世初從將幕遂拜魚符頒六條以闕一字城駕闕一字而闕四字行足以軌物闕一字厲足以範人位不下闕公貴纍贈下闕部尚書妣吳氏追封涼國太夫人公則貝州府君之元子也才惟命世生實為時天縱多能人推懿範孔子聖者似闕一字能下闕公學窮三豕箭下闕以自強蓄鋒鋩而不下闕終軍童子便請長纓李牧少年樂從絶塞始辭外傅遽列和門竭力奉公所至必理蔣琬占夢之日已定封公謝安未仕之辰終期作相承闕三字邦闕一字之餘祉闕一字文明之闕一字代下闕德下闕壯圖下闕乎武幕位崇連營任顯入軍旅必以謀略資其長行鄉黨必以教義諭其幼諸葛亮有管仲之器趙真卿多白起之風立於尉庭不雜流輩闕三字行太尉范闕一字公愛公堂堂之下闕聞謂公曰下闕韓與何本同族氏我欲投忘年之分申一姓之歡可乎公再拜牢讓不從其意謙之至也闕三字武宗四年潞帥死其子稹闕二字一方積闕三字長闕六字天子赫下闕廟堂陳帷幄亟下詔書大徵師旅不日而戈鋋四合浹旬而貔武爭先歲序俄周堡障未下蓋以前據壺關之固後倚太行之險王師下關士庶闕一字夷於鋒下關防密壃鴟鳶雜金鼓之聲雲物慘山川之色徒拗其怒且無所施乃召耆將計事皆曰衆寡不敵利病相懸公獨忿勇出㣥請借前籌下闕作虐西境下闕照大闕二字有下闕方地居屏捍當閫外之寄分天子之憂苟或不能整一旅之師問滔天之罪是倒持而授柄焉可恣其暴也遂請楚公上表闕一字師躬行天伐楚公持重下闕公又曰雖下闕衆兵家所慎而杖順討逆神道必從况豸不觸邪與羊無別較然之理又何疑哉楚公雖聽機謀尚懷猶豫闕二字御史中丞李公闕一字乘闕三字銜命宣下闕西嚮下闕恩始議伐叛顧謂公曰前日之言若合符契非公智識精遠孰能懸解天意乎由是練日選闕三字出纛下闕公素甫廣順下闕陳孤虛傅宏之氣冠三軍公孫瓚聲聞步奮身於行伍之衆泣誓於義勇之徒且曰帝命不可稽鄰寇不可玩闕三字慮事今下闕戈闕一字山立闕二字雲屯闕一字霧忽下闕壘先驚公不顧危亡親承矢石介胄蟣蝨手足胼胝趙充淑名動寰區共推烈士張文遠身先士卒果立殊功闕一字威無闕二字之闕一字戰陳忘闕二字之闕三字朝渡一闕二字壘於闕二字夕起長風闕一字浪下闕將席下闕山頽或倒戟自殘或輿尸請命然後化狼顧鴟張之輩為鳳儀麟趾之祥蕩穢滌瑕冰消燼滅捷書西上褒詔東來下闕公上報明主次下闕旋獲下闕壯志嗚呼楚國公用公籌略卒建大功天子酬勞就加外相御史中丞李公復因楚公之下闕寵光亦拜台闕一字惟公止換憲秩稍遷下闕有下闕突徙薪之歎而我無矜功利巳之心坦然胸襟益見夷曠公挹江海之偉量挺倜儻之奇姿文次騫智敵萬闕一字顧彥闕一字名齊下闕下闕二字問望藉藉動人視聽下闕廬江公紀綱失守時今上在東宮為晉王即宣詔遙領魏博節度使授公銀青光祿大夫檢校闕一字節度觀察留闕三字慰諭下闕道路公瞻天頓首瀝懇堅讓紫泥重降莫得而辭踰月拜檢校工部尚書魏州大都督府長史充魏闕一字節度觀察闕二字等闕五字復拜闕三字內使以旋下闕雷動五營義武六郡疲民稚舞艾歌相與賀曰邵父杜母復出於今日則人人皆得為赤子矣公寵踐將壇榮分朝下闕丕變教令載新近下闕皇風普扇惠澤遐敷熙熙怡怡不嚴而理逮期月報政特加尚書右僕射餘如故師長南宮儀刑會府酬庸旌德賞典有光闕四字檢校司空下闕諱臨軒遣使與司空之命同賜渥澤薦加恩榮特異比於㣥后孰可擬倫今上即位敕覃恩中外下闕維舊土朕闕一字居下闕契君臣之分加同中書門下平章事檢校司空如故公位尊鼎鼐寄重方隅周勃社稷之臣漢朝禮厚桓楷棟梁之闕一字蜀國名高感孚人心闕五字使闕三字鳥闕三字修下闕保其安賦有常期官無橫役而又立鄉校以勸學敦儒術而獎善完器甲以彰有備訓卒伍以示有嚴解闕一字迎賓分甘饗士茂綏懷之下闕泰下闕之是非不出於闕一字心之喜慍不形於色肅恭之貌若待嚴師信厚之誠不欺暗室矧復地隆千乘日食萬錢而素儉之規無所增益雖下闕常閲詩書吉甫之不墜文武太叔之美秀子産之博物石奮之謹厚充國之雄敏皆不學而成得自生性亦猶張瑟於庭風至而韻自下闕納萬機下闕乾符元年十一月草二日遘疾薨於鎮享年六十一傾都罷市闔境興哀孫文度之喪神仙赴弔王子敬之歿人琴俱亡皇帝下闕郎中曹鄴太子下闕議大夫李景莊庫部員外郎陳翰備鼓吹升輅車由宣政正衙及公之靈座册贈司徒諡曰闕一字明年以我僕射下闕因心之孝感應下闕公前娶夫人劉氏追封彭城郡太君文伯之妻君子為知禮孟軻之母良史述其賢淑行無徵華年早世後娶夫人靳氏封清河郡君闕一字先公而歿下有子下闕軍守左金吾衛大將軍員外置同正員檢校尚書右僕射兼魏州大都督府長史御史大夫上柱國賜紫金魚袋天上麒麟人間鸞鳳夙闕三字孝闕一字純深下闕列於二車推誠而六郡闕二字修巳而萬人有賴及朝廷聞公薨謝星使遽臨慰於苫之前勉以金革之事遂授僕射起復魏闕一字節度闕一字察留後檢下闕之權恩洽宸襟使來天闕碧幢照耀紅斾逶迤禮莫重於奪情榮莫大於緒嗣僕射叩闕三字洫血陳乞敢忘移孝之下闕僕射去經捧詔易闕一字從政恭臨舊地敬奉先勳紹遺愛於師壇襲垂闕一字於揆路禮闕一字可以肅物清儉可以律人無綺紈矜闕一字之心闕一字鉦鼓下闕河永傳帶礪次子記前魏州都督府文學幼子諫親事將闕一字早奉義方夙承家誨粵以明年二月草五日卜兆於魏州莘縣修善鄉平原闕先塋之側啓下闕公懿行崇勳為世軌範苟闕一字紀述何慰孝思遂命門吏紇干濬刻石為碑以示來裔濬伏念昔者延陵季氏仲尼署其表曰嗚呼有吳季子之墓則知碑者古史之流下闕銘合屬曳裾之吏濬叨蒙原顧獲忝初筵胡伯始之前修無慚許訓郭有道之遺烈徒感蔡雍寧愧蕪詞敢書貞礎銘曰元聖乘運英賢膺期生為邦傑出作帝師赫赫韓子徽猷早振得姓於周筮仕於晉既開土宇亦佩侯印闕一字漢承闕一字淮陰封信洪源茂緒派遠下闕克紹祖宗量寬溟漲威定山東爰自壯年誓志從戎鈐經政術靡有不通凌雲直幹襲物清風紫髯短下黑闕一字雕弓闕二字挺衆闕四字貍穴下闕若刃自戕若火自燎太行天井恃險設奧逆浪晝翻旄頭夜耀天子問罪楚公奉詔公實為副順行天討下闕㣥校闕二字齊䘪飇馳雷掃下闕執鋭披堅屠城擒將所向無全探雛撲卵流血成川妖孽既平功成凱旋勳高名顯時望赫然鸞鶴騰闕一字蛟龍擘闕二字天萬里一日可上齋壇使節下闕位重廊廟任尊師長化洽令行人歌惠養天垂將星公實稟之神有兵符公實受之元凶巨猾公實定之帝闕一字王闕一字公實佐之闕一字家許國濟難匡時下闕晉侯言命兩楹夢奠夫子殆病皇天匪信倚伏無定梁壞舟藏孰為龜鏡史氏書歿禮官考行終始哀榮下闕松楸已列體魄宜安西眺崇山崇山言言南臨大河大河渾渾山河永固基業長存億字壽仙咸通末進士上闕左衽之心庶無虞於魏闕足以談元想播洪休使恩波之不絶令瑞色以長浮帳下美人醉舞胡筵之夜天邊戍客行歌隴月之秋况在秦則秦之無策在漢則漢之莫克恨旄頭而夜夜長懸怨羽檄而年年不息爰及我后混成區域自然與三代同風百王作式若臣者則何足以論功而贊德蓋聞妙諦惟元不可以一理測真筌至奧不可以諸相求隨萬物而泯色空而不生不滅超三界而越塵垢故無去無來此乃不思議者其惟西方釋迦牟尼佛之謂乎伏自教傳西域化被中原漢明推入夢之祥梁武顯施身之願語其大也外不見須彌之廣言其小也內不知芥子之微斯乃梵璽裒然代代相付肇自摩訶迦葉迄於帥子尊者統為二十三代而後達摩多羅降於漢土至能秀分之為七而後苞披葉附派別脈分其真宗不泯不滅者則我大覺大師固有系焉和尚姓孔字存獎家本鄒魯即闕里之裔孫也乃祖乃父因官隸於薊門歷祀既深籍同編人和尚以無量劫中修菩薩行及茲降世豈同凡倫當衣采之妙齡蓄披緇之大志未踰七歲即悟三乘啓白所親懇求剃落遂於薊三河縣盤山甘泉院依止禪大德曉方乃親承杖履就侍瓶盂啓顧全身惟思半偈大中五年伏遇盧龍軍節度使張公奏置壇場和尚是時戒相方具而後大中九年再遇侍中張公重起戒壇於涿郡衆請和尚以六踰星紀三統講筵宣金石之微言示玉毫之真相三千大千之世界靡不瞻依十一十二之因緣竟無凝滯禪大德元公者即臨濟之大師也和尚一申禮謁得奉指歸傳黃蘗之真筌授白雲之祕訣所為醍醐味爽乍灌頂以皆醒薝蔔花香才經手而分馥一旦旋辭舊剎願歷諸方西自京華南經水國至於攀蘿冒險蹈石眠雲經吳會興廢之都盡梁武莊嚴之地無不追窮聖迹探討朝宗後過鍾陵伏遇仰山大師方開法宇大啓禪扃赴地主之邀迎會天人之供施面陳奧義衆莫能分和尚立以剖之如刀解物仰山目眙擊指稱歎再三遽聞臨濟大師巳受滿相蔣公之請才凝省侍飛錫而遽及中條尋獲參隨置杯而將渡白馬當道先太尉中令何公專發使人迎請臨濟大師和尚翼從一行不信宿而至於府下而乃止於觀音寺江西禪院而得簪裾繼踵道俗連肩曾未期年是至遷化斯蓋和尚服勤道至展敬情深無乖靈堵之儀克盡荼毗之禮云乾符二年有幽州節度押兩蕃副使檢校祕書兼御史中丞賜紫金魚袋董廓及幽州臨壇律大德沙門僧惟信并涿州石經寺監寺律大德宏嶼等咸欲指陳盤嶺祈請北歸和尚欲徇㣥情將之薊部晨詣衙庭啓述行邁先時中丞韓公之叔曰贊中遽聞告云撫掌大敬乃曰南北兩地有何異也魏人何薄燕人何厚如來之敬豈如是耶和尚辭不獲巳許立精舍韓公之叔常侍及諸檀信鳩集財貨卜得勝概在於南甎門外通衢之左成是院也有如化成松楠將梓俱來文石與碔砆洊至重廊復道竹翠松青四戶八窗風輕月朗和尚樂茲幽致用化㣥迷開解脫門演無量法能使天花散地水月澄空常與四衆天人皆臻法要六州士庶盡結勝因豈謂一念俱尸奄從物化斯乃文德元年七月十二日也享齡五十九僧臘四十一有親信弟子藏暉行簡一以主喪一以傳法大德奉先師之遺命於龍紀元年八月二十二日於本院焚我真身用觀法相闔城禪律繼踵爭來四達簪裾連肩悉至於是幡花蔽日螺唄喧天火才發而雲自愁薪不加而風助勢三日三夜號禮如斯於香燼之中得舍利一千餘粒諸寺大德各各作禮請分供養焉於戲雪叒冝毛如故其儀宛然捧一履以徒悲仰雙林而莫見遂建塔於府南貴鄉縣薰風里附於先師之塔志也億到職之初曾獲瞻禮法主大德藏暉不以億才業庸淺具聞於我公相請撰斯文億秉筆惕然得盡蕪鄙銘曰傳如來教厥惟大雄百千劫外方丈室中慈悲是念色相皆空端然不動豈染塵蒙矯迹三界安心四禪身雖是假道本無邊璞內有玉火中生蓮傳法何處隨其有緣越絶支遁匡廬遠公高情遠致迹異心同既離邪縛肯處凡籠松軒竹徑空悲夜風我性不動我心就然果得舍利粒粒珠圓幡花豔閃螺唄交連唱偈作禮聲徹梵天寶剎新建招提舊蹤蓮芳不見蔥嶺誰逢響亮朝磬清泠夜鐘歷千萬祀傳我禪宗上闕公父下闕刺史下闕山闕一字都知兵闕二字兼御史大夫烈考諱珍魏博節度押衙親事廂虞候公少立奇節倜儻不㣥交結時豪輕死重義雖雞鳴狗盜靡間於交遊馬圉牛醫不忘於禮敬自此鄉閭畏愛遐邇來投伏自何中令時以公正直致於肘腋洎韓太尉日以公謹願委之心腹雖處上不驕臨下不暴凡平昔交契未嘗暫忘有卻氏分財之仁有汜育字孤之義屢移星琯一致如斯嗚呼乾符三年六月十一日遘疾薨於寬仁坊之私第享齡六十九遂使白日藏耀重雲結陰里巷停舂行路增歎當年十一月二十四日遷宅兆於貴鄉縣迎濟鄉蔡林禮也蒙恩賜工部尚書光乂乾符初官集賢院學士在昔隋氏喪君齊人乏主代厄淪胥我大將運匡救之謀先州里之義存乎蔽捍用伺昭蘇初志未躋良圖奄墜災生福始遺恨如何公諱果仁字世威誕受丕祉其昌來裔有媯之後人莫與京洪惟發靈乃降時傑鼎角匿犀之異雄深魁武之姿貫藝造奇無所不至立能事於艱虞之際建殊蹤於混亂之秋韞義生風鼓動流俗全吳之地幸賴以安招定鄰邦輯寧徒旅江湖嚮應懷赴如歸沈法興率衆而來假我鼻息初規景附末肆傾夷因何匪仁暴戾斯甚自遺覆敗竟取淪亡至於敘官遊歷系業事咸不朽迹著無方名與日月輪回功隨載籍舒卷已詳於宣法師所製寺碑若乃生志未盡餘勇仍存息氣沴於疵癘降精靈於巫覡物靜災異時無夭昏人到於今罔不懷德每以公之諱日爰伸仲夏之中展祀建齋所在充遍雖掃地以祭且貴慤誠而廟宇未崇寧昭節敬邑老慶州都督府永清府左果毅都尉上柱國賜緋魚袋張智景與福業寺長老義先等聚族而謀發言同人不召而萃邑中之衆實慰我心疇其經營委以財物始則運思而斫之丁丁終於用成而新廟奕奕座盈神氣侍列鬼雄威深沈以肅然狀煜爚而疑動有以底明祇之位有以昭介祉之儀及夫沐蘭湯奠椒醑揚枹拊鼓緩節安歌華彩服與瓊芳會陳巫與楚舞求非曲禱祀必正辭無紛若之言致馨香之信由是上感宸心旁追祀典降中使被懷濡聖澤覃溥天光照爛豈秦祠漢享之類可得同乎浹逮下之祈演無疆之助或飲食有訟或契文不明凡百無良深衷莫辨微見誠請立彰其效負者乃凶竟貽潛慝攘諍掩息望境自清比夏積陽秋淫霪雨捨我穡事妨於農收至於三至於四時其賢守李公行穆民勤恤之意傍偟匪寧率領官屬長史李公昌岠司馬邱公從心晉陵縣令岑公况武進縣令何公據等果至虔誠景刻俱應澤及千里無所不周使君涵道德之尊豐惠和之厚艱難之辰晏然無事豈不以忠信於物而昭明於神乎本宰何公學以入政優于豫人深撫育之恩流清白之稱咸思善貺冀答宏慈神之聽之庶同景福今餘寇未寧尚煩翦滅神而助順靈其運乎昔者聖王之制禮能禦大災能捍大患以勞定國以死勤人則所必祀而明德報功大將生為司徒足以主世地歿為貴神足以鎮邪惡閭閈綏祐存亡以之斯所以榮尊故鄉廟食舊國宜矣勒懿迹篆豐珉延光表美寧可闕歟光乂策名清時亞位書府宦遊日久遲暮言歸竊井邑之譽忝文章之目魯無君子斯焉取斯以為傳芳金石不可妄也郡司録裴公導翰林之寶辭推典麗請以頌記其銘此君為之導乾符初官常州司録烈烈司徒為王爪士勇冠諸軍義先州里三綱砥節百行推美所謂伊人南國之紀天厭火德運歸黃祚肇闢乾關未康國步鯨鯢振海猰窳交路偃草江干惟夫子故矛鎚挺擊萬里長城旌旄血灑劍鍔風生夸者貨首同焉盜明雄心不竭終古英靈依然甲第尚想陳迹庭變金地祠開瑤席曰雨曰霽推誠邦伯師立僖宗朝為東川節度使初隸神策軍纍遷檢校司空同中書門下平章事陳敬瑄欲以楊仁厚代諷帝召之師立怒移檄言敬瑄十罪遣兵攻綿州帝下詔討之戰敗為其下鄭君雄所殺伏聞庖丁解牛鑒骨節於形外伏波聚米察山谷於目前若匪通人奚臻妙理師立材非馬援智乏庖丁見率土之銜寃為大朝之雪恥今國家以黃巢肆逆宇縣罹災鑾輿播越而未安宗廟凌夷而失守凡在臣子孰不痛傷而西川節度使陳敬瑄因守藩維坐觀成敗伏自大駕駐蹕縱令㣥盜害人不能行政理以安時但欲示軍功而駭衆只要威權在已冀令朝野歸心惡既貫盈人皆憤惋聊書十罪用去一凶實望此時共垂詳悉且功高者祿重德厚者位尊敬瑄本自凡庸素無智略事因際會位極人臣乃至稚女孩童皆霑寵祿閨房皂隸並受渥恩使功勳者切齒而不言勞舊者扼腕而懷恨其罪一也獻可替否必在忠言指佞觸邪須憑直士張侍御正朝廷綱紀暗被誅夷孟拾遺疏姦惡是非遂遭陷害或隕命於滄江之下或亡軀於幽室之間想其強死之孤魂必得申寃於上帝自此中外結憤愚智吞聲其罪二也妄議公主亶許和親挫大國之威風長南夷之僥幸蓋緣陳敬瑄受賂遂令海內興譏其罪三也恭顯兄弟總非勳校皆食厚祿並陟崇階蓋陳敬瑄罔顧刑章黷亂朝憲外姻內族冒貴貪榮其罪四也全無懼謗豈識廉隅但興苟且之心惟恣淫佚之行升徐賡為公座因令奪安鄴之妻致光庭登科甲只為聘敬瑄之女聞之者寧無慙恥見之者皆有歎嗟其罪五也鄭相公運籌於岐隴率衆於邠涇橫控梁洋遂安劒蜀敬瑄深懷嫉妬互起讒言其罪六也王蘊賤隸之徒姚坤凶狀未具皆被殺戮可鑒幽寃賞罰之權自敬瑄出其罪七也恣行威福紊亂規繩除移不自於天書擢用只憑於使牒元隨諸校偏受官榮扈從六軍曾無優渥其罪八也搜羅富戶借彼資財抑奪鹽商取其金帛三倍折納稅米兩川綰斷度支妄指贍軍多將潤屋其罪九也東西二蜀節制徇意誣君云討韓秀升峽路回戈請擊高仁厚當川歇馬不甘下視可驗平欺如此用心自為得計其罪十也且為臣之義有一於此未或不亡况皆具之何以能久師立今則感人神之怨怒奮貔虎以平除已點驍鋭精兵及八州壇寨共五萬人騎舉義長驅問罪西府志在扶持天子誅滅亂臣止欲生致敬瑄面奏聖上請行國典以正朝綱應檄諸道公侯諸州牧伯共期嫉惡同為除姦或義士忠臣或川府將校但能梟敬瑄首級送師立軍前即便卷甲韜弓歸朝謝罪皇天后土實聞此言凡在人臣幸鑒忠懇鶚字德祥京兆武功人光啓二年進士子髻年好學長而忘倦嘗覽王嘉拾遺記郭子橫洞冥記及諸家怪異録謂之虛誕而復訪問博文強記之士或潛夫輩頗得國朝故實始知天地之內無所不有或限諸夷貊隔於年代洎貢藝闕下十不中所司掄選屢接朝事同人語事必三復其言然後題於簡册藏諸篋笥暇日閲所紀之事逾數百紙中僅繁鄙者並棄而弗録精實者編成上中下三卷自代宗廣德元年癸卯訖懿宗咸通癸巳合一百一十載蓋耳目相接庶可傳焉知我者謂稍以補東觀緹油之遺闕也今武功縣有杜陽城杜陽水豫武功人故以為名覬厠於談藪之下者時乾符三年秋八月編次焉
