front:
  text: 全唐文欽定全唐文卷四百七景暉天寶時人
  hash: sha256:51ec3eb8046302d5af8f121ec82919ea72f83817995e539dcc698300f4ee4f86
  markers:
  - {type: head, offset: 12, content: 徐景暉, id: KR4h0168_NFKB_407-h1, level: 1}
body:
  text: 昔在后稷躬稼宣王命籍用天之道因地之利率先以勸敦本斯在是候春鶊初飛饁彼南畝秋蟬已噪穫乎東臯順月令以迎貓佇星迴而合蜡八政罔忒九職攸序搜粟多乎敖廩典農蓄於京坻以備荒札將禦凶饉而穰田滿篝豈用淳于之哂載餚入野常聞王丹之勞惟彼大酋是稱司醞徒學杜康之藝有夭夭心儀狄之職陶器必良工善其事火齊式序職司其憂和羹既用於鹽梅合禮必資於麴糵六物未備胡不及言三農既休忽此闕禮使上農空迷於帝力大酋合寘於國章仲甫天寶時人粵若稽古太始之初陰陽和而為炭天地張而為爐鎔鑄品類陶汰清虛名之四海謂之八區陰陽相盪感成雷乎號曰天地之鼓事載河圖之書藏冰以時則響出而不震仲秋之月必聲隱而無餘或震怒百里雨潤同沾法威刑於牧宰察醜惡於毫纎或殷轔而鼓作或滅沒而韜潛吼若天開闢如地裂動靜必以其時喜怒於焉有節是以樊重入室王裒遶墓終不苟於瑕疵冀中平於朗寤蠻夷於是膽懾賢豪於是心懼惡不戒而潛至善乃全而焉措無貴無賤敬天之怒五星不逆六氣合度發陽和啟蟄戶農事興作秋成斯覩以日繫時有倫有序歘焉而來倏焉而去鼓勇莫測其蹤安息莫知其所搜獲山川洗滌寰宇爾其為狀也則乃聯鼓畾畾力士雄雄雲飛電耀起自震宮其為聲也磊磊落落砰砰訇訇龍潛魚躍海湧山傾星宿為之霾翳日月為之昏暝夫其赩赫震燿紛紜煽作臨峻崖投深壑終不騁於雄豪將勸善而懲惡布雲雨於潛龍銜丹書於白雀若乃王綱如繩籠羅有情是謂小人無禮君子無刑守容貌而無恒豈耳目之不明終冀貞廉於衆口法令未若於雷霆涉天寶朝官司勳員外郎伊酺醵之可觀有格澤之修竿勢百常以莖擢文五彩而花攢可負以致遠又行之匪艱故得一人之慶而為萬國之歡獨步華場偏臨廣術當太階以影正對重樓而首出岌岌兮高柱承天亭亭兮若木拂日有美人兮來從紫闈為都盧兮衣錦褧衣凝靚妝以如玉聳輕身兮若飛倏龍盤而婉轉遂花落而霏微朝雲乍興神女之初降曉月將落姮娥之未歸於是伐鼓雷響鳴金星合從正殿以獨步巡廣場而未匝勢欲傾掉力將彈壓天地為之振動樓臺為之岌嶪臨人自正兮有異從繩處險而安兮匪同履冰豈有象於鴻漸終無教於猱升聞北風其涼我則懷將恐將懼見南山之壽我則喜不騫不崩則知蹲會稽者其言矯在浚郊者其利少曷若揚王庭越木杪為域中之大見天下之小哂伏波之銅柱遙居海裔陵漢武之金莖揭出雲表惟我皇而念茲遂角觝而存之非為作奇技庶堯之謗木可為非為作無益庶舜之舞干可持使遷喬者仰止守直者方斯臨下則正而不譎在上則高而不危夫是跨越古今標格寰宇聞之者鳧趨雀躍見之者足蹈手舞非測日之表可傳非淩雲之梯足數將揭焉以山立或拊之而林聚故知斯竿無親惟力是鄰雖盛德之在木必先容而假人欲為柱兮承彼大廈願為檝兮當彼要津既呈材以效質樂我王於萬春赤羽相向魯載乘邱之役紅塵交飛國驂賁父之御事匹蒙馬力均投牛變非銜橛驚為流矢殊郤克之不止因潰齊軍成魯師之小却便亡卜氏汙朱輪豈敢言病驗白肉乃知非罪逝者既往吾誰與歸死而可哀士始有誄此焉寘理孰曰監軍雖欲必也正名是故惡夫佞者夏序殷膠建國尊務養老齒冑先王大猷所以長幼分規道業差序咸殊誦習將明告教射御書數分制則於樂章中和祗庸遵規儀於性府即大成以方就爰小舞而首陳必在準繩無或差忒以言國子辨慧斯聞系彼勳華金張錫慶遵其禮樂游夏申歡學畢幼儀言辭外傅年昇舞勺乃踐上庠春誦夏弦深期順節尊師重道寧願踰閑佩觿之成童未及摳衣之舞象何先雖欲速於有知終見陷於無度儻聞一知二亦何守於彞倫必也非禮勿言固可拘之年限制於未亂詳茲雅得紀綱扑作教刑撫事難從捶楚綠琴高張觸物易操朱弦促調緣心應聲既峩峩以在山亦蕩蕩而著水甲逢有道每歌詠於南薰景屬無為亦歡娛於北里彈絲靜聽無聞獨鶴之吟外物生情忽作捕蟬之思平生雅意妙曲先知邂逅商音有鄰便覺鏡懸於樹疑桂魄之澄空水止於盤若冰壺之在鑑隱微必察善惡斯彰纔聞蔡氏之絃遽作淮南之術迹或多於猜忌罪無抵於章程事則可憑訟乃無咎鎮天寶十年進士昔帝軒出震用率大戛三才以貞萬人以察戰蚩尤於涿鹿之墟登飛龍九五張咸池於洞庭之野舞元鶴二八遂使素女緘瑟昭文輟琴壎箎協韻笙磬同音始鏗鏘以拊石終訇隱而摐金雷出地中以成奮豫之象風行水上油生子諒之心包混茫之廣大含元氣之高深不知不識順帝之則無視無聽至道之極三月忘味思在齊而攸聞七旬格苗非得雋而為克所以事與時並名與功偕㣥方既睦庶尹允諧且如碩人褎然萬舞在前秉翟奕奕象九奏於鈞天后夔爰至三步既次夾振躚躚率百獸於厚地諒人神之在和何匏竹之足備况乎皇上降衷以符德充理七音於周雅歌五絃於舜風仁親是務車軌攸同信敷草木澤被昆蟲在坑谷而何有與幬載而齊功故得萬屬宅心四夷修款音無惉懘義取觀盥聞正始之頌聲足誡盈以持滿空歌詩以獻賦若窺天之以管粵若窮理盡性在宗載考觀窮元元訏謨天造憫鷦鷯之為得處一枝而屬厭詞罔兩而格言詳萬籟於至道道之為體也無思無慮惟靜惟默皇帝得之而升於雲天維斗得之而運於宸極下崆峒之路理必諧於襄野登隱坌之邱義無虧於建德爾其問影責實稽謀惟微審行止之常分固怨葘而用希陰與夜兮吾所隱火與日兮吾所依若有待而持操誠不協於天機且夫步日者足憐蚿者夔雖鳧鵠而異稟將斷續而則悲苟安時以處順惟我心之則夷如莫耶之或躍必歐冶之見遺客有感而歎曰大塊勞我聖人不仁天地無私於覆載陰陽脗合於陶鈞動之則矯冥之則親汎然無跡瞠然絕塵時既來而不再物亦煦而知春夫如是則何患無位不作守道安貧而已哉於是罔兩卑陬改容逡巡徐避養淡泊懷簡易鄙白龍之遇制嗤文豹之有累寓百骸於神理休四海之光被在埏埴於洪鑪得修身之明義至天寶十年進士聆黃帝之遺音澹乎至察天非私覆稱其德以無三國有元風應其方以宣八所以合德樞之幽鍵率至人之大戛當其存乎象用酌彼鈎深將合之於萬籟故稽之於八音非剽之以耳寧聽之以心風師拊石雲將摐金棄園客之絲彈為鶴舞辭羌人之竹擫以龍吟雖不擊而不考或習習而愔愔坐忘斯得旋歸靜默其始也懼其終也惑迴日月之運行會鬼神之柔克淒清廣莫之野曼衍華胥之國奔夷貊於蟠木之東聳鱗翰於幽陵之北和容遠被休氣充塞邦用榮懷人之克諧何以鼓靈鼗之坎坎撞猛簴之喈喈至乃起於無眹調之自然張洞庭兮聽咸池同嶰谷兮合鈞天昭炎氏之作頌寓莊生之外篇是則成象者樂之餘希聲者樂之器舞妙有為八佾懸至和為二肆觀其妙叩以元關動無方覃於厚地貫陰陽而不測庸詎識其純粹吾君纘戎始酌遺風集端虛於黃屋攘靡曼於元宮理代之音兮蹈而不厲不言而化兮美以能充今以視昔實由元同受靈命之誕敷窅希夷之自滿考徵音於天樂謝能賦於窺管揖傲吏以逍遙啟真經於探討則知辨彫萬物富有三寶假影外之微陰喻域中之大道惟彼罔兩同夫糾纆貇兮難名混兮不測離婁目眩而方見桑宏心計而寧識其出也與影俱遊其入也與陰俱息乃謂影曰子於我兮何力我與子兮何德將詰之於心請對之於臆殊途兮同歸孰是兮孰非進豈苟得退殊所希繫我有待俾爾相依在波瀾而比目升雲漢而聯飛胡乃折責其持操而欲論乎等威者哉且夫出入隨日行藏任時儀形長短取象毫釐雖曩華而今槁豈變態而殊姿語默無滯類達人之舒卷視聽無及符至道之希夷原夫以陰託影以影輔人行則無跡居必同塵不樂葆大寧悲賤貧茹藜被褐非所恥腰金鳴玉非所珍誰泣楊朱之路誰迷宣父之津誠滑疑於至理不夭閼於天真則知於物有憑處身如寄和光遠害是其道先人後已是其義鑒之者雖臨水而罕窺畏之者將奔走而奚避欲明有象於無象有愧知音之意翊仁天寶十年進士神之本也以朝為大乾之德也以元為高合二美以制閣俾萬人兮不勞何哉彼朝元之為狀厥高因於巖嶂岌嶪兮初謂湧於山巔崔巍兮又謂居於天上崇崇之勢博敞宏壯斜窺渭北笑玉樹而徒空俯對終南與金闕而相抗迥出象外信非人間陽烏乍轉以迴翼翔鵾不逮而空還七聖同遊罷還襄野萬國以會自是塗山既而元冬啟景六合清迥法駕行幸於溫泉羽斾駢羅於高頂帝乃躋稜層考休徵天之動日之升馳繚垣以望䆗窱開閶闔而越凌兢視遠如邇臨高可憑於以旁眺於以迴覽窗前桃實在方朔之深知閣上鳳巢表帝軒之聖感昔秦皇學道漢主長生祈年既築望仙復營人既勞止事卒無成豈比夫向背山澤密邇皇城池八水而下臨無地階重巖兮上摩太清至若早霜啟色積雪初晴壯泰山之日觀比天台之赤城信我后之攸處與神仙之混并嗟乎登高作賦十上何晚題陸雲之閣吾道應行薦揚子之文其事不遠寬天寶十年進士天垂象其徒實繁聖作則克叶元元故六符之效祉同五星之可言匪侵名於傅說不奪彩於軒轅有道則見熲然以明示萬物之咸若表三階之砥平歷歷珠貫煌煌弁橫高以視卑八荒仰其不忒低而能觸四海悅其光榮昔昧者謂前王之淫縱今明者彰我后之元亨既歸仁於垂拱亦叶政於阿衡寧不以燮理詣極耿耿莫京麴糵以之作醴鹽梅於是調羹近取諸身長乎庶類率土雖廣至德遐備救旱則霖雨為先濟川則舟楫是利不然者奚得與南極而齊出拱北辰而為次跂彼無報既織女之多慚晥爾服箱知牽牛之增愧繼東井之應福何潁川之足懿事契其誠萬邦以貞亦既啟瑞終然永清且逢時而不隱猶牧謙而作程每避日以照曜孰與月而爭晶順秋冬以迴斡隨河漢以低傾寧直降龍駟之特稟應仙郎之美名信可久而可大等無臭而無聲謬管窺以體物幸芻蕘之見并仲天寶時進士佩服之設惟德是瞻夫子之服素而博夫子之德稱而廉式制象以表諸儉豈無玉兮體乎謙謙而伊何服用有則舍寶佩庶以彰其無位制象環實亦明其讓德匪玉兮匪金是雕兮是刻取其焚身之齒奪其截肪之色磨而不磷涅而不黑相彼玦兮謂其玦之有離制此環兮體其環之不極因良工以表器奉聖人以聘國苟炯戒之斯存曷威儀之有忒於是不師爾制爰始我謀錯落增色晶明克舒寫金規於顧兔掩素彩之隨珠崇其五寸之範輝彼十圍之軀貴其文兮我則文而能潔謂其曲也我則曲而不踰既圓體以就滿亦虛中而應無服為身表環為佩器若禮義之相須豈周旋之暫墜將以體象其法理亦以循環乎志意雜章甫以為飾騰組綬而生輝蔚禮經以畱規掩水蒼之故事明夫素王立範象豈因循必使動容有則箴規合倫得禮容之不選著盛德之日新環之質兮取其終始罔遺象之齒也取其堅白可珍體夫子之歷聘周流似夫子之從時屈伸象環之制兮其義不淺謙撝之旨兮因斯而闡道崇受物用能寬而有容理貴適時體如丸而任轉忝明試以效拙敢獻賦而旌善液天寶時進士千載之下凜然清風才生於代道積厥躬洎六十而達為百夫之雄時然後遇否極斯通賤不憂貧牧豕之心在貴而好我招賢之道崇招賢伊何東閣不閉常虛懷以應物每趨風以接袂屈已於士德必不孤應以同聲冥而合契爰符禮以為食不倨賢而恃勢故門多長者之轍奄有輝光座必非常之人亘以年歲豈惟開閣於暇日之中抑亦畱心於接應之際道不虛行有聞有聲方積善以志其大匪飾非以外其情故人得盛大之譽館得招賢之名欣其託身之先美其投足之始名以才著高因下起槐市居尊柏臺是履多士拭目㣥英傾耳猶尚德以尊賢將興化以致治豈比夫鄭驛迎而為賢陳榻解而稱美然以匪階而遷任道而暢自家刑國封侯作相不出十年之中獨立㣥賢之上欽若前哲惟德之休其儀棣棣其政優優知足則止辭榮而歸侯好賢不倦垂範而空畱且資以時須賢為代出得之者則政舉失之者則政逸安得不開閣以崇敬袪繁華而摭實誰其嗣之代何不有惟秉鈞與當軸宜欽風而善誘庶斯道之不虧信昭彰之可久縝天寶時進士昔成王纂位周公輔理命爾康叔尹茲殷士既因命以申勸欲善終而令始述文武之所修陳藝術之攸起播英聲於典訓揚芬烈於國史則知上之化下如梓之材遵繩墨以運思受鎔模於簡能其度木也佇林衡之畢選其取制也仰倕和之所開於是既勤樸斵惟所云為奚茲服用靡尚精奇信其有益取於無私工必止其淫巧物欲稱其事宜去雕鏤所以昭代俗之反素塗丹雘所以知禮義之攸施擬古呈功觀象制器或因事以立法亦憑質而託類臨時通軌開物以利乃作誥於聖人俾流戒於在位凡教在始而法在初莫不念乎梓匠慎爾攸居苟方圓之失理是風化之蔑如故王者削殷迹述周令汲汲賢良孜孜善政招延俊造以輔明盛偉夫立德垂訓名言在茲凡百斧藻各共乃司勿謂幽昧神其聽之自然片善無遺㣥材靡失輪桷兼採棟梁並出實有補於大廈方見用於王室擅高曾之規矩騰雅頌之洋溢闡無疆之淑懿成不朽之政術履冰天寶時擢書判拔萃科甲義恤葘畬志殷溝洫懼襄陵之荐及梢齧攸通稽濬川之前聞源流遂遠當以崇朝其雨高岸為谷無勞役之事濟稼穡之艱里則斯遙功則其倍涇泥是沃俄分數斗之謠韓工已成良開萬代之利歲自便稔邦由是臧異東西之見分寧嗟別思殊劉項之有割是悅昌期潄而不徭足以嘉尚決而非役奚用申為粉署將繩恐涉察泉之義白圭思復宜從因水之詞仲宣元宗時對策擢第問朕聞武以保大定功刑以禁邪止殺軒轅三皇之聖莫能去兵陶唐五帝之聰時猶振旅故知體國經野宜有弔伐居安慮危可無豫備朕纂承丕業虔守大寶因祖宗之既康恐文武之將墜兢兢戒慎翼翼憂勤而德教誕敷烽燧尚警三邊每勞於征伐百姓不歌於耕鑿言念于役深軫於懷所以日旰忘飡中宵輟寐思謀臣以制敵折衝於樽俎索名將以守邊降伏其戎寇行何法也得致斯人哉子等藏器待時呈才應命盡陳古今之事備詳攻守之策至時賢著述往彥勳庸兵法有五十三家宜分其四種漢臣有二十八將自比夫幾人景略可逮於孔明張遼得齊於關羽斛律光賀若弻近代之用誰優我李勣與李靖先朝之光誰最又卭南一方之地磧西萬里之域將棄之以促境寧守之以勞人鎮梁州至於流沙軍隴坂至於積石險阻要害予疑汝明秦中歲役於防水若為釐革代北年疲於禦塞奚所變通薊門屯田何術以休其弊柳城梗澀何籌以繫其虜凡此邊廷今為重鎮何經何見何履何歷若兵不獲巳用何奇謀貞我師旅使有征無戰必文可來之施何異政柔彼夷狄使懷惠畏威咸述爾能直言其事當有昇壇之拜佇伸推轂之寵對臣聞玉弩垂芒耀明威於紫緯金方戒序凝殺氣於丹霄然則負扆登樞規七衡而立辟垂旒御辨法四選以詳刑是故黃運披圖靜妖氛於涿鹿丹陵啟業耀佳兵於洞庭伏惟陛下陟上帝之耿命順下人之樂推總不測之謂神包混成而為道然後運天地日月以臨之洩雷雨水火以育之宣道德仁義以綏之張禮樂刑政以肅之然則宿離無忒天清也海外無波地平也左學上庠文明也保大定功武威也由是東西沈潛朔南浹洽草木咸若昆蟲無夭猶且日慎一日雖休勿休俯徇謙光循易象之明義降詢得失追漢策之高蹤所以廣訪芻蕘旁求道路臣戎旃賤伍樗散陋容策蹇以忘疲勵弱而知倦猥茲庸菲充賦闕庭奉詔慚惶啟處無地所冀齊庭設炬九九之術先收燕館初開先尊郭隗而已敢緣斯議庶竭丹誠制策曰思謀臣以制敵折衝於樽俎索名將以守邊降伏其戎寇行何法也得致斯人哉臣聞晉謀元帥漢召材官必資悅禮之英咸選良家之子誠請秋風授律吉日拜將收不疑之十計問子明之五策賞必以功罰必以信則良將斯至矣大功可舉矣制策曰兵法有五十三家且分其四種臣聞習手足便器械積虞關具攻守伎巧之兵也權德刑隨斗繫因五勝解鬼神陰陽之兵也雷動風舉後發先至離合向背而應變無常形會之兵也守正而用奇詳形而計戰兼伎巧包陰陽權宜之兵也然後憤之以仁義信之以賞罰以我直而權其曲以我智而薄其愚以我和而制其離以我治而乘其亂故雖孫吳再生亦不知為敵人計矣制策曰漢臣有二十八將自比夫幾人臣聞漢有二十八將者上應二十八宿也或以文雅光國鄧禹有決勝之奇或以武能威人吳漢有綏邊之略功論樹下馮異之績彌彰冰結河中王霸之誠尤著臣以卑賤夙無器業竊循運合聖恩不次得參賢俊之末安敢自強而比哉清問猥及臣當萬死制策曰景略可逮於孔明張遼得齊於關羽斛律光賀若弻近代之用誰優臣聞景略之功也孔明之績也張遼之謀也關羽之烈也斛律光之勇也賀若弻之略也廣論之則耀靈不駐略談之又書不盡言景略之佐秦堅纔騁如熊之捷孔明之匡蜀主克著臥龍之名張遼運籌之方可以歸之於先軌關羽搴旗之効可以論之於後塵賀若弻之破陳軍功先諸將斛律光之扶齊國名劣衆人以次而言斷可知矣制策曰我李勣與李靖之功誰最者臣聞李勣者智也仁也勇也嚴也躬教可以圖始心教可以保衆自伐三韓克清九族所以東夷之人不敢西向也至於李靖者安可同年而語哉大征北狄詎見絕其餘氛授鉞南蠻寧見殄其遺寇所以蠻胡猾夏邊鄙亟聳者良由此也制策曰卭南一方之地磧西萬里之域將棄之以促境寧守之以勞人鎮涼州至於流沙軍隴坂至於積石險阻要害予疑汝明秦中歲役於防水若為釐革代北年疲於禦塞奚所變通薊門屯田何術以休其弊柳城梗澀何籌以繫其虜凡此邊庭今為重鎮何經何見何履何歷臣聞膜拜憬裔既崇於弔代昧谷遐方實資於鎮撫薇亦柔止猶聞遣戌之詩瓜時在期尚起踐更之役今欲明守邊之術開斥地之制緬惟經算俯訪芻蕘謏聞鄙術何足以觀之夫先王馭道也必專其邊守疆以戎索恃吾有以備懷其所以來招攜以禮懷遠以德今丸山在境猶發度遼之師葱河卷祲仍開拜井之屯勞人遠役其何以哉若乃務廣其土以疲其人宿兵於無用之地勞師於不禦之俗聖王之道未之前聞制策曰若兵不獲已用何良謀貞我師旅使有征無戰必文可來之施何異政柔彼夷狄使懷惠畏威臣聞季梁在隨楚朝罷議仲尼居衞晉國折謀語曰死諸葛走生仲達陛下誠然德音發於帷幄清風翔於無外大啟爵命以示四方拔將選才各盡其用急善同於饑渴用人疾於應響杜奸佞之門廢鄭衞之樂混清六合實由乎此雖西有不羈之寇北有不賓之虜征之則勞師待之則無益故班固曰有其田不可耕而食得其人不可臣而藩來則懲而禦之去則備而守之蓋懷惠畏威也但以日暮途遠汲深綆短文不逮意書何盡言謹對
