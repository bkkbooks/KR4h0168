front:
  text: 全唐文欽定全唐文卷二百三十六嗣立字延構贈祕書監承慶異母弟第進士累補雙流令累官鳳閣侍郎同鳳閣鸞臺平章事會李嶠唐休璟請臺閣分典大州乃以嗣立帶本官檢校汴州刺史景龍三年轉兵部尚書同中書門下三品嗣立與韋庶人宗屬䟽遠特詔編入屬籍封逍遙公睿宗立拜中書令開元初為太子賓客坐宗楚客等削遺制事不能執正貶岳州別駕再徙陳州刺史七年卒年六十六贈兵部尚書諡曰孝
  hash: sha256:72beb7bef5acdee8945b348d729409a0466c769532bbbd747d252c19442e97c2
