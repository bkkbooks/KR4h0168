body:
  text: 臣竊嘗聞之在堯舜之日畫其衣冠當文景之時幾致刑措歷茲千載以為美談臣伏惟陛下濬哲欽明窮神知化自軒昊以降莫之與京獨有往之論法或未盡善皆由主司姦兇惑亂視聽尋而陛下聖察具詳之矣然竟未能明其本源察其前事令天下萬姓識陛下本心尚使四海多銜冤之人九泉有抱痛之鬼臣誠愚昧不識大綱請為陛下始末而言其事揚豫之後刑獄漸興用法之伍務於窮竟連坐相牽數年不絕遂使巨姦大猾伺隙乘閒內包豺狼之心外示鷹鸇之跡陰圖潛結共相影會構似是之言成不赦之罪皆深為巧詆恣行楚毒人不勝痛便乞自誣公卿士庶連頸受戮道路藉藉雖知非辜而鍛鍊巳成辯占皆合縱皐陶為理于公定刑則謂汙宮毀柩猶未塞責雖陛下仁慈哀念恤獄緩死及覽辭狀便巳周密皆謂勘鞫得情是其實犯雖欲寬捨其如法何於是小乃身誅大則族滅相緣共坐者不可勝言此豈宿搆讎嫌將申報復皆圖苟成功效自求官賞當時稱傳謂為羅織其中陷刑得罪者雖有敏識通才被告言者便遭枉抑心徒痛其冤酷口莫能以自明或受誅夷或遭殛竄並甘心引分赴之如歸故知弄法侮文傷人實甚賴陛下特迴聖察昭然詳究周興邱勣之類宏義俊臣之徒皆相次伏誅事暴遐邇而朝野慶泰若再覩陽和且如仁傑元忠俱罹枉陷被勘鞫之際亦皆巳自誣向非陛下至明垂心省察則葅醢之戮巳及其身欲望輸忠聖代安可復得陛下擢而升之各為良輔國之棟幹稱此二人何乃前非而後是哉誠由枉陷與甄明耳臣但恐往之得罪者多並皆此流則向時之冤者其數甚衆昔殺一孝婦尚或降災而濫者葢多寧無怨氣怨氣上達則水旱所興欲望歲登不可得也陛下儻宏天地之大德施雷雨之深仁歸罪於削刻之徒降恩於枉濫之伍自垂拱巳來大辟罪巳下常赦所不原者罪無輕重一皆原洗被以昭蘇伏法之輩追還官爵緣累之徒普沾恩造如此則天下皆知比所陷罪元非陛下之意咸是虐吏之辜幽明歡欣則感通和氣和氣下降則風雨以時風雨以時則五穀豐稔歲既稔矣人亦安矣太平之美亦何遠哉伏願陛下深察臣伏聞古先哲王立學官所以掌教國子以六德六行六藝三教備而人道畢矣禮記曰化民成俗必由學乎學之於人其用蓋博故立太學以教於國設小學以化於邑王之諸子卿大夫士之子及國之俊選皆造焉八歲入小學十五入大學春秋教以禮樂冬夏教以詩書是以教洽而化流行成而不悖故自天子至於庶人未有不須學而成者也國家自永淳巳來二十餘載國學廢散冑子衰缺時輕儒學之官莫存章句之選貴門後進競以僥倖昇班寒族常流復因陵替弛業考試之際秀茂䍐登驅之臨人何以從政又垂拱之後文明在辰盛典鴻休日書月至因籍際會入仕尤多加以讒邪兇黨來俊臣之屬妄執威權恣行枉陷正直之伍死亡為憂道路以目人無固志䍐有執不撓之懷徇至公之節偷安苟免聊以卒歲遂使綱領不振請託公行選舉之曹彌長踰濫隨班少經術之士攝職多庸瑣之才徒以猛暴相誇䍐能清惠自勗使海內黔首騷然不安賴陛下憂勞頻有處分然革弊斯近此風尚餘州縣官寮貪鄙未息而望事必循理俗致康寧求之於今不可得也陛下誠能下明制發德音廣開庠序大敦學校三館生徒即令追集王公巳下子弟不容別求仕進皆入國學服膺訓典崇飾館廟尊尚儒師盛陳奠菜之儀宏敷講說之會使士庶觀聽有所發揚宏弊道德於是乎在則四海之內靡然向風延頸舉足咸知所向然後審持衡鏡妙擇良能以之臨人寄之調俗則官無侵暴之政人有安樂之心居人則相與樂業百姓則皆戀桑梓豈復憂其逃散而貧窶哉今天下戶口亡逃過半租調減耗國用不足理人之急尤切於茲故知務學之源豈惟潤身進德而巳將以安人利國安可不務之哉臣聞設官分職量才擇吏此本於理人而務安之也故書曰在知人在安民知人則哲能官人安民則惠黎甿懷之能哲而惠何憂乎驩兜何畏乎有苗者也是明官得其人而天下自理矣古者取人必先採鄉曲之譽然後辟於州郡州郡有聲然後辟於五府才著五府然後昇之天朝此則用一人所擇者甚悉擢一士所歷者甚深孔子曰譬有美錦不可使人學製此明用人不可不審擇也用得其才則理非其才則亂理亂所繫焉可不深擇之哉今之取人有異此道多未甚試效即頓至遷擢夫趨競者人之常情僥倖者人之所趣而今務進不避僥倖者接踵比肩布於文武之列有文者用理內外則有回邪贓汚上下敗亂之憂有武者用將軍戎則有庸懦怯弱師旅喪亡之患補授無限員闕不供遂至員外置官數倍正闕曹署典吏困於祗承府庫倉儲竭於資奉國家大事豈甚於此古者懸爵待士惟有才者得之若任以無才則有才之路塞賢人君子所以遁跡銷聲常懷歎恨者也且賢人君子守於正直之道遠於僥倖之門若僥倖開則賢者不可復出矣賢者遂退若欲求人安俗化復不可得也人若不安國將危矣陛下安可不深慮乎又刺史縣令理人之首近年巳來不存擇京官有犯及聲望下者方遣牧州吏部選人暮年無手筆者方擬縣令此風久扇上下同知將此理人何以率化今歲非豐稔戶口流亡國用空虛租調減削陛下不以此留念將何以理國乎臣望下明制具論前事使有司改換擇天下刺史縣令皆取才能有稱望者充自今以往應有遷除諸曹侍郎兩省兩臺及五品巳上清望官先於刺史內取刺史無人然後餘官中求其御史員外郎等諸清要六品巳上官先於縣令中取制中明言如是則人爭就刺史縣令矣得令天下大理萬姓欣然豈非太平樂事哉唯陛下詳擇臣聞國無九年之儲家無三年之蓄家非其家國非其國也故知立國立家皆資於儲蓄矣夫水旱之災關之陰陽運數非人智力所能及也堯遭大水湯遭大旱則知仁聖之君亦所不免當此時百姓不至於困弊者有積也今陛下倉庫之內比稍空竭尋常用度不支一年倘有水旱人須賑給徵發時動兵要資裝則將何以備之其緣倉庫不實妨於政化者觸類而是臣竊見比者營造寺觀其數極多皆務取宏博競崇王褱麗大則費耗百十萬小則尚用三五萬餘略計都用資財動至千萬巳上轉運木石人牛不停廢人功害農務事既非急時多怨咨故書曰不作無益害有益功乃成不貴異物賤用物民乃足誠哉此言非虛設也且元旨祕妙歸於空寂苟非修心定慧諸法皆涉有為至如土木雕刻等功唯是殫竭人力但學相誇壯麗豈關降伏身心且凡所興工皆須掘鑿蟄蟲在土種類實多每日殺傷動盈萬計連年如此損害可知聖人慈悲為心豈有須行此事不然之理皎在目前世俗衆僧未通其旨不慮府庫空竭不思聖人憂勞謂廣樹福田即是增修法教儻水旱為災人至饑餒夷狄作梗兵無資糧陛下雖有龍象如雲伽藍概日豈能裨萬分之一救元元之苦哉於道法既有乖在生人極為損陛下豈可不深思之臣竊見食封之家其數甚衆昨略問戶部云用六十餘萬丁一丁兩匹即是一百二十萬巳上匹臣頃在太府知每年庸調絹數多不過百萬少則七八十萬巳來比諸封家所入全少倘有蟲霜旱潦曾不半在國家支供何以取給臣聞自古封茅土裂山河皆須業著經綸功申草昧然後配宗廟之享承帶礪之恩皇運之初功臣共定天下當時食封纔祗三二十家今以尋常特恩遂至百家巳上國家租賦大半私門私門則資用有餘國家則支計不足有餘則或致奢僭不足則坐致憂危制國之方豈謂為得封戶之物諸家自徵或是官典或是奴僕多挾勢逞威陵突州縣凡是封戶不勝侵漁或輸物多索裹頭或相知要取中物百姓怨歎遠近共知復有因將貨易轉更生釁徵打紛紛曾不寧息貧乏百姓何以克堪若必限丁物送太府封家但於左藏請受不得輒自徵催則必免侵漁人冀蘇息晞贈岷州都督謩曾孫永隆元年進士官工部侍郎襲封郕國公上闕望闕二字規規之流闕一字閒閒之智亦衆矣咸欲闕一字英攀景躡賢飛光則負鼎者絕臏闕子之薄於德而厚於位闕一字里閭之美其貌而空其腹復何取焉其闕一字王元之一日千里闕於魯闕一字公之有焉公諱遐字柔遠代為天水著姓惟先肇於炎農氏大闕一字配於闕之芳聲闕一字國命於晉年四徵君之稱首天祚休祉代不虛賢曾祖景周使持節驃騎闕元闕一字緒闕一字克象山岳繼代二千石賢期五百年祖謩唐起義相國府員外賓曹參軍闕父行本唐起義闕一字部兵部郎中闕一字為將作少匠殿中監左屯衞大將軍贈左闕旗鼓闕三字壁公殷盛德雍熙之風稟靈岳逍遙之氣闕一字五秀以會質闕一字六行以崇心闕之以孝友闕一字之以仁賢時謂闕一字室顏回張家曾子矣故伯父太子僕嘗指公而謂人闕第宗黨闕一字其闕二字邦國以為闕一字談又奉制授東宮通事舍人時春闈肇建妙選寮寀闕通事舍人公賦形瑰偉明晤如神彥輔雲天披覩瑩目太初日月懷袖闕矣闕三字象方闕一字俯仰之容闕一字韶九成闕二字鏗鏘之韻夷夏以為殊觀朝廷莫不駭矚昔闕授闕一字任闕一字公闕一字無以易故久於其職頃之遷左衞翊府郎將肅鉤陳以警衞奉閶闔闕古難其選闕三字網以取俊採時秀以旌奇雖則荏苒有年闕一字無以上膺成命尋又制闕來儀喻鹿眼闕一字解箭矣尋檢校光祿少卿明試以功滿歲為正四至九列有美昔人七侍闕左衞將軍此後十年不進轉後來者多昇上位時論殊以為屈公處之怡然未始以細闕權考洛州及諸縣官屬公神無滯識明有餘鑒正之以黜陟飾之以文理自午及未考闕地官侍郎餘如故修六禮以節人性明七教以興人德天工人代公實崇之至若囂競闕以無聲自是雲闕三字豈直風生臺閣時恩勅賜絹百匹以彰才用之効也又奉闕故授斯任以國慶累封闕三字俄丁內憂去職哀貶柴毀莫能俯就尋奪禮起為左豹闕典憲每勅公與執事參議焉或降中使頻延厚錫公雖祗奉恩奬而毀疚彌侵闕十有二遺命務令薄葬歸於舊塋冕旒興悼斂日賜朝服一襲賵贈有加哀榮以備闕史即以天授二年十月十日同合葬於昭陵神迹鄉之舊塋禮也惟闕生以道潤身恥名浮行詣微索隱搴枝葉於闕一字經原始要終求聖賢於黃卷性堅正以靜闕檢訓子姪不交異類闕一字無操行不入闕字殷之門人闕一字通家豈造李膺之室自喪妻後不復再闕於窮蹙每有闕一字濟則終始闕一字之加以博聞強識備殫諸藝尤善草隷超冠一時雅好山水闕白之良會雖家尚清素恒戒滿盈至於奉親也則罄無方之養故闕一字女伎歌舞之娛加洞精闕通率有逾焉爾闕二字之闕一字未嘗不操翰紀闕一字文詠翩翩諒以繼闕一字風雅矣時中書令薛元闕抱創巨於泉壤瘞明闕一字於闕一字邱長子銀青光祿大夫太常卿楚國公皎次子兵部侍郎晦闕贈公吏部尚書贈太夫人為闕一字國夫人永昭闕一字靈以闕一字罔極痛百身兮無闕一字思萬古闕以親奉風規闕一字假闕四字意將申而氣闕一字言欲敘而心摧遂為銘曰闕標奇倜儻闕一字冰內潔瓊峯外朗心醉逢咸雲披遇廣行必可則言歸於讜括囊衆藝該闕敷天憲光闕一字帝宇北闕一字重寄西闕一字掌武珪闕一字赫奕謙恭傴僂神理昧昧天道茫下闕顗武后時人夫以陰魄陽魂如風似燭歎浮泡之易盡闕三字之難闕一字預啟津梁不憂生滅高託蓮花之上遙歸柰苑之中美矣哉不可得而言也況乎鷄鳴遠系郎署遙基門德早通時英不絕曾祖諱忠祖諱推父瓊琳玉俱抽撲漢之陰驥子龍文並蹀追風之影父諱敬夫人沈氏或碎珠驪頷貽誡將來或斷織蛟梭遐吞故事既侵蒲柳早歸松柏孤子善廓等哀纏露蓼痛軫風林追念二親願從三寶所冀先靈納祐遊定水之津梁後嗣承恩入慈門之戶牖以大周萬歲通天二年歲次景申肆月景寅朔拾肆日已卯遂造浮圖一所石像闕一字區爾其元石謺重雜烟雲之氣色紫金圓滿含日月之光輝對喬木之隱天即為龍樹俯通波之括地聊當猴池雖則事畢功成然恐山移海變須垂不朽敢作銘云前代後代非一代兮前身後身非一身兮精進禮拜得超界兮歸依念因能出塵兮迴向功德生淨域心緒清勤離苦津長遊滿月之地永挹飛天之人知古朝議郎行麟臺郎原夫大德曰生體二儀而合道至德曰孝備百行以成功故跡發歷山媯泉標其茂實業闕一字泗水闕里播其嘉名闕二字承驩聞偉行於聘楚躍魚繼美兆峻節於臨沂斯蓋丈夫餘事自淩軼於前古未有婦人蹤迹獨闕一字暎於當今屬茹蓼銜哀餐荼側息虞風難靜傷屺岵之無依滕日易沈懼陵谷之將改而復翹襟淨域銳想福林瞻鷲山而仰止顧龍池而利涉誕敷聖教其在茲乎青州壽光縣寧義寺經藏者有唐至孝此寺比邱奉孝之所立也法師俗姓任氏樂安苗裔壽光舊隷樂安郡郡廢縣名猶存法師即樂安壽光人也昔祚啟陞陑匡殷隆其左相源分命薛朝魯讓其宗盟開國惟敖肅丹毫於御殿承家曰隗敞黃第於司空翼翼昭先標魏朝之淑慎昂昂元裔掌晉代之銓衡迄乎江左大小雙名既淩南而守郡亦翔西而尹京莫不蘭芬桂戫玉潤金貞用能駿發緒餘丕膺復始書云克諧以孝易云不事王侯總二美在躬萃一門而高視者其惟吾宗達人乎法師父惻昔在隋季遭家不造周烏爰止則白騎彌山秦鹿尚驚則黃巾蔽野將恐將懼泛蓱水而無歸自西自東寓蓬阡而靡託與弟軌安乎膝下就養無方勁笋含青巳抽冬曖崇蘭孕紫將被春除及國步初康言旋舊里樂簞瓢而日用肆耕鑿而年徂貞觀初太夫人奄隨風過闕一字榆闕二字斷機之訓以乖淚柏全枯倚廬之望奚設至若去瑟送終之禮承衾追遠之情則通人故屯田郎中京兆韋山甫製其碑從伯左右武衞長史處權為之頌清芬懿迹可得而詳也法師稟訓母儀承規女憲旌淩霜之苦行表犯雪之貞心松操不虧冒歲寒而轉勁蕙苗自遠乘獻春而逾馥年十九出家於是練識歸真儲精詣道赴三歸之勝轍泳波若津排六趣之迷塗踐菩提境釋鉛粉御緇衣不以婉淑擾其懷唯以貞靜凝其慮龍朔之歲丁乎內憂無幾父又遷化號天靡愬擗地何追水漿絕於口者遽經七日負土而成墳者奄至三年爰捨伽籃結廬垗域青烏啟隧環削杖而輸哀白鶴䟽塋撫惡笄而瀝欷鄰里潸而罷相市㙻黯以同悲服屏繒綺味資蔬菽日居月諸迄今廿有七年矣前後州將皇叔祖贈司徒虢土王鳳司空舒王無名明德茂親建旟作牧武陵公北平陽文瓘通儒碩學海內具瞻並歲時致問親詣其所先是父於墓左別建精舍筆精墨妙廣事招延寫一切經厥功垂畢法師聿遵前志草創後圖經之營之復廿有三年矣遂於寺院設經藏以貯焉玉字霄開因毫發相金聲曉振自口流音婉婉乘龍似覿淩雲之藻亭亭顧鵲疑觀垂露之書爾其飛檐四注順陰陽以開闔曾軒八襲積寒暑而來往前縈德水宛如舍衞之中却枕香山即是山耆闍之外朱柰為苑其實也玲瓏青蓮作池其花兮菡卄欿地則川原謺暎煥淄壤以成都人則忠孝連蹤肅任童而濟美千里可照杜魏乘以無辭萬卷可師揖馬樓而有歎所謂英靈閒出震耀邦家者焉於時歲在泉獻大唐之握寶圖七十餘祀皇太后紹隆景化發揮洪烈練石光其元極韜金清其赤縣神嶽披蓮暵龍鱗而動色靈阿孤竹澡馬頰以浮光總衆妙於情機仙猋迅發導㣥迷於意網闕一字景飛昇廣命宗枝屏藩王室使持節青州諸軍事青州刺史司徒雍王亦今上之叔祖也粹府沖曠英姿爽澈凝神獻易潔靜洞其靈關澡慮元詩溫柔甄其思匠光流佛若竹園將日館相暉吹動生蘋蘭坂與風臺交暎長史司馬聲孚展闕二字賛彤襜壽光縣令譽浹翔翬俯臨墨綬咸能翼宣調御光輔時省法師以舊譯諸經繕寫云備新翻衆論流傳未遠故躡屩西遊言過洛邑曾不旬日復得一千餘卷豈非天經懇至地義聿修之所致哉余素奉闕二字實居茲壤有懷敬梓微願莫從儻血食未淪闕二字族闕一字則盛德必祀非其効歟法師又欲余為文礭乎闕十二字裁之其詞云爾闕二字太始肇有闕二字蟾光啟夕鷄唱移晨時遷否泰運革澆淳心猨匪寂意馬闕二字其闕八一字赫矣能仁誕敷慧力遽撤疑綱旋超淨域色即是空空即是色其二亭亭鴈塔翼翼蜂臺香匳熛上寶鐸風來杏壇左列松畎斜開闕二字顯異彼美良材其三朝魯讓滕匡周胙艹辛廣阿敻祉信都曾烈地稟賢蹤門承孝轍結廬墓在餘芬靡竭其四挺生媛淑實惟貞固翥想十口土騫容六度亦既鍾罰循還孺慕吹警揚風光晞韰露其五欲報之德哀哀我思歸誠梵宇罄節仁祠爰創經室繡栭雲楣鸞迴聳態鵲顧凝姿其六日閱寶函手披仙軸衣則麻枲食惟蔬菽露液春滋霜明冬肅何以取喻寄之松竹其七河楚藩屏海岱奧區建旟闕一字鑒周禮是敷道光辭玉化穆還珠式閭標敬清徽不渝其八屯田彥緒武陵英允德音孔碩風流坐鎮或振詞藻或彰恩信詎測波瀾孰窺牆仞其九帛丿糸帛丿糸瓞系自吾宗孝乎惟孝必敬必恭貞猷矩謺茂績規重勒茲琬玉永播笙鏞其十晉武后光宅元年登第問朕聞北辰端扆佇衆彥以經邦南面居尊俟㣥材而偉俗是知九官分職薰風之詠載敷八元匡朝就日之規方遠歷選列辟遐考前修並建明敭之躅式廣旁求之義故康衢扣角授相越於齊班海上牧羊封侯超於漢秩洎乎淳風陵替雅道湮沈仕必因基官非材進官雖備職位匪得人遂使七輔之材銷聲於巖穴六佐之彥晦跡於邱園寤寐以之載勞虛佇今欲革因循之弊躡稽古之蹤此志雖勤其途未遂為是旌賁爽於前代英傑寡於今晨佇爾昌言朕將親覽對惟德動天文雲開其五色惟賢濟俗大運符其半千是知廣厦將崇必佇㣥材之用巨川方濟良資舟楫之功俾作股肱方之羽翼自風姜御辯之始樹以后王君公雲鳥分司之初承以大夫師長莫不投竿入相捨築稱師五臣光就日之朝八凱翊薰風之代陰陽由其燮理百姓用以平康善俗必藉於賢臣輔國或佇於良佐國家旁求俊乂束帛之禮荐陳物色異人邱園之彥咸萃登壇對楚連城之寶不足稱置館求燕照乘之珍無以貴多士邁隆周之日得人光炎漢之朝猶以為官匪材升仕因基進顯革因循之弊用追稽古之風誠願察彼山苗之詞求夫縱壑之論材或可紀超升於槐棘之班德或可襃擢任於公卿之位開其上賞之路頌以中和之詩則淳于矒之進賢一朝而見七士許子將之舉德少選而收二俊自然詞人闊步才子長鳴公理息昌言之篇節信罷潛夫之作謹對朝隱字光國京兆三原人明法中第開元時累官大理卿封金城伯拜御史大夫進太常卿出為嶺南採訪處置使兼判廣州二十八年卒年七十贈吏部尚書諡曰貞臣某言伏見武強縣令裴景仙犯乞取贓至五千匹事發逃走奉勅令集衆決殺伏以景仙緣乞取犯贓罪不至死又其曾祖故司空寂往屬締構首預元勳載初年中家陷非罪凡有兄弟皆被誅夷惟景仙獨存今見承嗣據贓未當死坐準犯猶入請條十代宥賢功實宜錄一門絕祀情或可哀願寬暴市之刑俾就投荒之役則舊勳不棄平典斯允臣某言臣伏以有斷自天處之極法生殺之柄人主合專輕重有條臣下當守枉法者枉理而取十五匹便抵死刑乞取者因乞為贓數千匹止當流坐今若乞取得罪便處斬刑後有枉法當科欲加何辟所以為國惜法期守律文非敢以法隨人曲矜仙命射兔魏苑驚馬漢橋初震皇赫竟從廷議豈威不能制而法貴有恒又仙曾祖寂草昧忠節定為元勳位至台司恩倍常數載初之際枉被破家諸子各陷非辜惟仙孑然猶在且又承嫡繼封主祀若寂勳都棄仙罪特加則叔向之賢何足稱者若敖之鬼不其餒而捨罪念功乞垂天聽況應勅決杖及有犯配流近發德音普標殊澤杖者既聽減數流者仍許給程天下容容孰不幸甚瞻彼四海巳被深思豈於一人獨峻恒典伏乞採臣之議致仙於法則國典有常率土幸甚幸甚草土臣某言奉親無狀禍降私門窮衰殘喘不自殞滅朝夕苫塊纔經半年伏奉四月十八日勅書俯臨奪情制授臣揚州長史荒情震怖悼心失圖臣某中謝臣險釁不滅才術無紀往因叨遇頻升榮秩猥忝青紫䍐裨塵露今乃寄以維揚位超列岳非常睿渥忽霑朽瘵尚敢冒哀陳款實以私志未終且臣亡母在日猶蒙曲澤憫其羸老抱疾不任隨臣之官有命自天數令歸覲受恩未幾此禍俄鍾上既不盡天慈下則末由就養今復號哭無位奠酧莫親有倍哀情重增摧苦況臣之在疚尚未小祥遽此復官殆無其例臣今扶力自曳哀惶詣闕伏乞賜停權奪許以終哀則微命偷生終期報國倚廬過隙少荅允懷無任窮懇之至草土臣某言臣在艱疚遽蒙榮奬曳體陳款冀遂荒誠天貺綢繆未蒙哀許進退狼狽悲惶殞絕臣某中謝今臣窮噎豈暇多喻所不殫言敢以陳冒臣自少不幸先臣早逝亡母養訓謹能成立昔處微秩甘旨不充及忝大官臣親巳老從官或遠不任扶輿十數年來每違左右以臣長子常恨不見積此憂憶遂成沈痼是臣不孝莫慰母心追惟及此五月臧隳裂且母尚憶臣以成病臣豈可變縗以就榮新穀未升便起如故則臣何力以負斯咎何心以忍此痛何庸以承孝理何面以對吏人又臣先患風緩頃加心疾觸事迷錯鮮能行步臣平日無釁猶不如人今尫疾轉侵朝不保夕仍令處事恐辱所委徒紊藩條必不勝任以是冒昧不測仰天重請望輟前恩以全餘息忽不聽臣血淚俱盡死亡無日無任荒迫之至草土臣某言昨再犯宸嚴亟陳哀懇荒辭謬理不足感天恩貺如初又令斷表臣知萬死豈合觸冒誓畢窮命更披肝血匍匐下迷悚懼失據逼迫碎首不知所陳中謝臣既自傷早孤墳塋未立母因臣成疾以至於亡殺身何瘳昊天罔極母終日近遷祔猶闕成病危殘懼不克葬故欲偷生忍死冀遂本情服勤墓側以畢封樹不謂殊私忽降委臣藩岳累有懇誠天恩未許事君違命罪在殊刑喪親靡終期不覆載去就無屆幽明受責雖大和所容而莫知所擇且臣先患風緩今巳積年往年任大理卿於朝堂悶倒困殆良久朝臣共見自爾巳來數數發動又丁艱酷此疹彌加每常一發累日不起心緒煩迷若喪若失更令處劇形必不支窀穸闕營葬則倍苦心形俱極死可立至若不具陳實理便成欺罔聖恩送終莫從郡務不舉無益於國兩罪何逃殘氣泯焉誰執其咎特望哀其巨痛救其將死知臣無他直以衰病惜臣微喘使延晷刻嚴命少輟情理得終非臣蕞爾所能上荅臣今哀辭窮極莫可告訴皇天后土實鑒臣心前後所上無非至切敢有片言假託詭露虛妄天地鬼神當共夷滅臣身以謝陛下恩遇之重魂爽震越不知所忌無任懇苦之至
