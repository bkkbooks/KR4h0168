front:
  text: 全唐文欽定全唐文卷二百四十八李嶠七
  hash: sha256:4714708f572ac9ea90b3eaff761f65493249374446cc902854cf2a5abc4742f2
body:
  text: 愚臣觀象銅衡紬文金版變化莫神於開闢崇高莫大於富貴陰陽密運帝王操輔相之機歷數潛迴穹壤授陶甄之業故謂上下同德幽明合契靈祗有命既錫造於雍熙人主推功必申虔乎報謁奉符而勒成展宇修祀而益厚增高有道存焉其來尚矣自旦昏交謝文質遞遷朴畧洪荒上行於萬八千歲陵夷因革下傳於七十二家披圖而考其樹風按軌而詳其陳迹莫不祗肅其事神明其道龍駕帝服疆塲於鄒魯之坰犧樽象彞藳秸於云亭之上咸就發生之宇以為禮神之宅未有迴輿按驛覲中土之神靈刻石泥金崇外方之禋祀名臣於是乎斷其去就良史於是乎題其失得然則置表測日陽城當六氣之交祭林奠山太室為九封之長神翰降生於廊廡王畿仰矚於峯岫風雷所蓄俯鎮於三河辰緯所躔旁臨於四岳立崇乾事坤之兆疏就下因高之位捨此地也疇其尚焉歷千載而撰徽音䍐聞先覺超百王而崇軌躅允資元聖我大周之有天下也鼓道德之林藪恢聖神之事業始於閫閾成於家邦輝光燭於兩朝德澤流於八裔登庸納麓則舜有大功錫範陳謨則禹躋元后謳歌而鼎新革故揖讓而改物承天由牝馬而御飛龍自穨沙而臻練石葢千帝所不能及六籍所不能談若夫兆眹鴻源絪縕寶系戴千嗣於改律窮桑連乎夢梓皇天睠命積大寶而為家聖道會昌擁洪鑪而作極神基將偃伏齊搆僊派與昭回同遠太祖無上孝明高帝含幾察道盡睿窮神屈帝象而龍潛座台庭而虎變黃星造魏而文握漢圖赤羽興姬而武遷商鼎天冊金輪聖神皇帝遂荒三極奄有萬方御六辯而高馳憑九霄而下濟若乃元通不測之智神用無方之業超因越果名流於貝葉之書應物隨緣迹滿於蓮花之會祕恍忽於言象徵希微於讖籙亦猶寶應慈物推心坐雄帝之朝吉祥哀時屈己登女皇之位此之謂神力張寰立㝢蕩海夷山正八柱之低昂理三光之盈縮乾坤關鑰於廡下品物鑪錘於堂內春生夏長循環奉亭毒之仁暑往寒來奔走赴財成之節此之謂天造左規右制俯察仰觀揆朱鳥於南宮契元龜於東洛天威四臨而有截王道一家而無外均霜調露正六合之樞機叶軌同文立三川之朝市此之謂建國臨戶牖之法座垂星辰之采章嚮明而居端默以聽號今存於寬大規畫出於易循名責實而苟且之弊銷極深研幾而變通之理得此之謂立政焰煙灰之墜典寫溪谷之遺音無體無容與天地同節有法有象共陰陽通氣引之而被乎百代橫之而充乎四海此之謂禮樂雷電皆至先王以折獄致刑歲月履端君子以懸書立法殊井疆而知禁畫衣冠而不犯疏械破杻掩方載而勝殘解網取罘閉圓扉而靜讞此之謂刑典操盾秉翳立於賓主之階縫掖摳衣聚之東西之學辨尊卑之章服觀禮容於俎豆委裘多暇合九德之成歌垂拱無為援五絃而度曲此之謂文教因農隙而講事順天時而鞠旅定功在於歸馬保大由乎止戈然後干苞虎皮箭射貍首鞞鼓不作廟堂懸百勝之威尉候無虞征戍罷三邊之役此之謂武德耤乎千畝所以備粢盛齊於九疑所以嚴禋享苞茅潔乎楚入樽俎隆乎殷奠於穆顯相而公侯駿奔肅雍和鳴而祖考來格此之謂孝理金玉是賤委於嶄巖之山輿馬不珍捐其騕褭之服御高辛之黃黼垂孝友之皁綈栝柱茅茨未能埒其卑損藜羹糗飯無以儔其菲薄此之謂沖挹任皐夔衡旦之輔酌虞夏商周之書網羅并包商搉擬議衆目張而彞倫敘㣥才用而庶績康野無遺賢朝無闕典猶且昧旦懃懇方宵厲惕虛心解顏博愛兼聽防六事察五聲檢身有常視準繩而為度祗德罔倦刻盤盂而自警遺身主於徇物勞已存乎逸人是以恩澤流通教化洽著龍荒鼠徼覃㝢外之雍熙鳳穴麟州奉寰中之度律遠安邇肅地平天成玉律調年珠囊叶紀棲京坻於隴畝逸馬牛於衢路丨旬兮嫠蒙餼班白不提閭閻無犬吠之驚風俗有鶉居之暇原隰驅軺之使採詩聽歌菑畬植杖之翁擊壤鼓腹和氣旁薄禎符肸蠁招一角五蹄之仁獸儀九苞六象之僊禽亳墠出其祥麟昆田化其珍物日烏素毛而丹喙天龜元甲而青純雲蒸霧涌拜九洛之璿圖電激雷奔受三清之寶冊若乃山鶼海鯨石銘巖篆之符候月搖風連葉駢柯之祉神靈之所酬酢廣大之所薦成紛綸葳蕤紹至疊見董狐之窮墨罄書而未周夷吾之傾辯畢辭談而不盡昇平之浹洽也如彼符命之昭彰也若此固可以循類帝之事奉丕天之律聖上方固懷讓德虔守謙光升中之儀推而不莅也於是王公庶尹牧伯㣥寮粵耆艾惇龐之儒洎蠻夷戎狄之長咸進而稱曰陛下欽承元命對越上元廓天地之宏圖張祖宗之丕業臣妾四極驅馭百靈鼓舞發育經緯彌綸之績宣滲漉沈潛懷柔容保之恩備是以人祗順德遐邇宅心元符畢臻黃瑞盡出幽贊乎祖考之茂烈發明乎施尊之盛儀意者三塗滅氛二室儲貺以望屬車之塵久矣帝者雖倦焉得距而已乎伏願坦至公之懷捐獨善之意欽若大典疇咨故實上以光七廟之休德下以納㣥生之福祐長為稱首豈不美歟帝曰俞哉乃包含藝文考練風俗採儒術徵禮官窺五歲之典章覈四朝之制度叔孫掌事容成諏日以天冊萬歲二年臘月乙亥闢丹掖開紫微撫元虬按黃道叶紀先路靈威並轂五戎促節旗常畫垂象之文六甲分營壁壘曖太陰之氣雷動海運天迴星轉踰鼎觀而南下望圭臺而左薄陸離方攘煥炳聿皇以屆夫嵩陽萬乘停鑣百司就列文物隱地遺光滿於竹宮輿徒沸川輕壒埋於石柱天子乃幸齊寢披僊幄靡薜荔之席陟蟺蜎之臺惟夫蠲意澄心所以至誠盡敬於是乎山祇護野風伯清塵玉醴潛滋金沙闇涌神鐘驚曙峯巖傳九乳之音寒律移暄草樹動三陽之色徵祥之報影響不違壬午柴燎祀昊天上帝於岳南顯祖立極文穆皇帝太祖無上孝明高皇帝侑神作主天子戴圓冕披大裘登三垓植四邸藉陳蒩秸器用陶匏高炎四施耀流沙而燭滄海廣樂六變來象物而降天神感霏煙瑞一作潏露之徵延薰風景星之祉大禮既畢嘉應既臻思欲契精爽於高明剖靈符於峻極甲申御金蹕登玉輿環拱百神導從㣥后遂陵桂萼攀松磴跨崢嶸而出煙道排列缺而羾天門羽節高揮上干鳥星之次龜壇下映俯瞰鵬雲之色瓊文祕檢絡之以銀繩寶算休期探之於金策交大靈於咫尺受洪釐於億萬然後徜徉煙霄怊悵古昔凝神於九天之上遊目於八紘之表睠觸石之雷雨爰覃作解之恩仰斗杓之運行仍布維新之令是日大赦改元為萬歲登封元年歡浹幽明慶霑動植千齡之統由聖代而連九皇萬歲之音自神山而周四海休氣低而翔輦神光起而屬天抃舞相趨以降於行殿丁亥禪祭后土於少室下趾東南顯祖妣立極文穆皇后太祖妣無上孝明高皇后侑神作主戈矛山立玉帛星陳登㵎沼之毛輯江淮之物禹會之殊方異俗俱執豆籩漢祠之偉獸珍禽悉加壇墠撫空桑之琴瑟斟鬱鬯之樽罍咸秩衆靈遍祀㣥望席以黃琮為鎮書以青石為緘元封之謁款方邱儀因東峙建武之推功太折禮視北郊陽烏珥而僊鶴飛紫雲騰而黃霧起靈之來兮如雨瑞之委兮如山於是事畢功宏禮周慶洽方欲輯圭璧陳未任鋪六代之禮文受萬邦之朝賀宏規大業其盛矣哉葢淳源侵衰叔葉多故神器不還於至道尊名或假於涼德秦嬴極暴企踵於無為之朝漢徹窮奢厚顏於盛德之事人不見義其來自久我后首出帝先遂康天步登封降禪拉宇宙之樞衡立顯崇功定皇王之軌式鴻勳上格於穹昊厚福旁浸於黎元煒煒煌煌亘寰區而宣壯麗巍巍蕩蕩橫山邱而殷聲名固已轥前賢之規模開含靈之耳目方使炎農抱愧愕睨於梁甫之阿姚舜欽風延佇於崇高之路天下之大功成矣域中之能事畢矣昔者鳥獸率舞一人賦元首之篇戎夷來賓四子詠中和之樂時僅平而頌作俗未泰而歌興況乎咸五登三遠承文武之裂襲六為七近叶春秋之義神功與二儀並運顯號將七曜俱懸豈可使時邁無詩於皇不作臣嶠謬忝司牧躬陪錯事末光幸煦長傾捧日之心僊石徒攀終愧淩雲之筆敢承明制而為頌云天命上君君臨下土靈祇允懷品物咸覩翕受三六時乘九五於昭文明粵若稽古關鏁六氣庭衢八荒殊鄰筐篚絕黨梯航河海晏謐閭閻阜昌琴橫帝扆鼓臥邊場齊衡鈞度制禮作樂武戢五戎文興四學法宮布政靈臺視朔化偃中和人還太朴湛恩布濩協氣氛氳嘉庾歲積休符日聞祥開草樹慶動煙雲乾冊丹篆河圖紫文欽若元命率由前典道洽升中功成丕顯神筴演卦名山除墠翠鳳銜蕤元龍御辯迴鑾左屆弭節中樞萬騎雷動㣥方電趨層壇殷薦闕八字登鑾山符駐輦星躔交神漢曲雷雨下濟輝光仰燭地戶開扉天牢罷獄萬歲重熙三辰改旭迎陰廣澤報地方畦庭合六舞筵陳兩圭神靈第瑞巨象天犀牒貫銀縷函封金泥禮具德明神歡瑞浹儲算玉斗賜齡金篋知崇高之可封悟梁甫之虛躡敷帝道於一藝振天聲於萬葉或稱唐虞神祇之奧主也其在孔墨道術之明師也然其經畧所制僅行於冠帶之鄉名教所談不出於乾坤之位徒齷齪於步武葢搶攘於禮法語方外之靈躅窺天中之妙寶則知夫力有遺而途有窮矣察動用於神機推朕迹於冥數則知夫識有畔而功有闕矣悠悠百代蠢蠢四流蒙埃塵於夢幻之境隔視聽於神明之域任忠信之薄徒喪淳源救質文之弊無階聖道沒世不聞至極之理終身不覩元門之法奔嗜騁欲壓五濁而輪迴躡穽投機入三途而鼎沸大運不可以終否橫流不可以遂溺五精延貺披鳳籙而告休期七覺垂仁闢龍宮而開寶命慈氏越古金輪聖神皇帝體兼具相心冥衆善超十方四諦之門總三明六通之業諸天翼戴上昇於兜率之宮萬㝢慕思下莅於閻浮之俗哀末法之衰弊悵夷途之榛梗載紆金屣由紺殿而起西方廼睠瑤圖臨紫宸而正南面大矣靈覺深哉妙果去來無象曠萬劫而潛神起滅有緣應千齡而啟聖粵若屈跡宏道乘機濟物馭之以神通知惠行之以方便善功感或異理故應無常身化本隨方故居無定位襲五運於元壇之上降三尊於黃屋之下稱緣而動宰官共商主同歸虛已而遊廟堂與山林一致天人之善權也提宏綱之落紐廓大象之權構遂荒百億窮有頂而君臨奄有三千罄無邊而光宅闢海縣而清囂滓開天庭而掃氛祲四魔六賊盡為征賦之民萬邑千閭悉成道塲之宇爾乃御寶極而元覽撫璿衡以貞觀茫茫淨界宛如忉利之天眇眇大紘化為莊嚴之國宇宙之嘉惠也制巨籥而動出張洪鑪而造化不為不宰鼓舞而㣥品隨何慮何思氤氳而百寶湧然後蕩之以香風甘露薰之以福田惠業大根小葉咸受施而蒙榮蠕動翾飛盡飡和而飲澤協氣煙曼休徵雲聚乾符坤寶載於龍馬之圖歲德年祥調於鳳凰之歷陰陽之太和也立最上之乘不棄於聲聞小道用無為之理猶存夫禮樂常教闢四果之門闈訓三雍之典業然後遠心近行俱得所聞傾樽酌蠡各滿其量憲章乎法寶而度律既周經緯乎時文而網羅畢備登一世於解脫躋㣥生於仁壽軌躅謐靜頓屣於元亨之衢品物康寧高枕於會昌之宅道德之神化也合樂而埋瘞焚燎陳詩而嚴配昭格禮於上下不失於金木五官享於宗祊遂及於山川百祀旁求六趣之府下建四冥之室莫不于食有福奔走而來蘇用晦而明攀援而出苦鬼神之福寧也元門䍐測法象難窺雖金口微言時傳於貝多之葉而玉毫靈相莫覩於優曇之花屬大事之因緣逢遠期之旦暮稽首禮足親瞻五梵之容滌慮清心俱奉一音之偈洗貪慾之腸腎開盲聾之耳目置須彌於掌握詎是難思擎海水於靈空未為希有氓黎之誠感也惣人祇幽顯之微資鬼神變化之妙兼育萬物而莫見其生成遍履十方而不窺其轍跡巧諭善說而䍐測其靈祕點墨數塵而未量其終始故能慈以救物寬而容衆罷黜刑憲而天下勝殘屏撤牲牢而蒸人以粒豈與夫慘痛傷骨象魏懸桎梏之書剖卵殈胎山澤厭冖八且罘之酷可同年而語也觀握鏡之緣起得獻書之本事藏象祕籙禎符鬱乎大雲發跡乘時靈應開於寶雨受先佛之付囑荷遺黎之負擔頒其瑞紀所以旌識善緣樹其階梯所以津梁法俗天授二年乃下制令天下諸州各置大雲寺一所宣州大雲寺者本名永安寺晉義熙二年之所立也龍飛在運既易龍興之名天歷惟新即改天安之號積暄寒而驟風雨所以制毀圓方法爻象而應星辰所以基帛丿糸載祀若乃地橫瑤阜壤帶金陵廓巨鎮於三吳走通莊於百越山川磊落郊畿枕端委之鄉島嶼憑隆烟霧合朝宗之浦上帝於是乎垂象先王於是乎高會衣冠俊傑滿舊國之風謠物產珍奇傾神州之韞櫝東南之巨麗也因福地之形勝即靈模之兆迹拓其趾而峻其墉擇其材而增其構星榆月桂汎河鼓之天津露柏霜松出巴陵之地道山祇則讓夫美境海若則輸其珍藏精衞銜石遇神營而中留靈蛇吐珠屬良緣而改獻爾乃授矩司臬乘巒架巘迴廊曲榭亘迢遞而掩高深峻閣崇臺陟崢嶸而望寥廓複道共星階連步雙闕與天門對象內則香殿崛起若朱烏舒翼冠南海之鵬雲前則涌塔化成若皇媧振麟立東維之鰲柱翕赫璀璨帶璧而垂珠窈窕深沈藏烟而吐霧瓊林幽其妙境珍衞嚴其象設五通羅剎夾奉金山八部龍王分司玉砌窮壯麗於天巧擬威神於帝室故能使外道摧服異方歸向四倒八謬瞻柰苑而心迴五葢六纏經竹園而累盡若乃雲除雨霽闢牖當軒眺八極之山川臨萬家之井邑輜軿綉軸前通舍衞之城桂檝蘭橈下泛蓮尼一作尼蓮之水賞心極目遣累忘機處士於是乎傲其江海詞人於是乎驕其翰墨至如毘耶聚落眷屬俱來摩竭道塲君臣惣集攀瑁之欄檻入琉璃之塔廟一一香葢懸於寶縷之幢種種天花散於金繩之地贊嘆圍繞歸依薰習洗心於八解之池拭目於三明之藏名衣上服資貝樹之經行重溢全裝襯蓮花之法會自非大心宏益圓智曲成為天上天下之師護人閒世閒之法豈能使恒沙國土並登常樂之門億界生靈俱出無明之路刺史曲陽男鉅鹿魏正見大名開宇復南史之公侯懋賞承家奏西河之金石隆簪組之舊德壯朝廷之厚寄朱軒皂葢辭折坂而赴長洲來晚去思喜昌門而怨彭闕長史隴西李延慶黃裳具美白賁全真文學則東魯之四科鍾鼎則西朝之七貴司馬南陽男張安宏才碩量經文緯武策勳光刑馬之封服冕榮珥貂之業機明足用政理多方承縟禮於襜帷有成勳於邦國諸曹參佐錄事參軍李文遠等或文房學府吐鳳而懷蛟或劍室珠泉衝星而襲月水火錯居而致用青藍糅色而成彩㣥務允輯諠北汝之謳謠庶事無留閴南陽之府寺縣令丹陽儲孝任大江播氣長離發藻未踐廊廟之班猶屈絃歌之事卓子康之莅政不任刑書虞承卿之到官唯開講席縣丞鄭公覽等並刀筆英選琳瑯奇姿高才未展聊從枳棘之遊俊翮方昇豈滯榆枋之集凡我聯事莫匪同心攀十地之宏因奉四天之大號經營樸斵克成輪奐之功修習住持願假招提之福上座寺主等並通達無礙惠解多聞勤求於八清淨心成就於五菩提法昇大悲之座俯慰迷津轉無上之輪高懸勝躅用能經始梵域規模神造淩雲起構雖憑於太極之靈匪日成功實俟於彌天之力鄉望前杭州鹽官縣尉吳寶度等雲澤奇寶水鄉遺俊或隱鱗求志蓄美價於瑤琨或撫翼俟時貢珍名於箘簵咸能厭離塵垢修持行業具足三施豈直黃金買田積累衆功皆自白衣成道咸以為六種震動法王之利見金身十善護持大士之莊嚴淨闕一字吐無算數之良果有不思議之妙力豈可使車轍馬跡獨銘於西弇之山佛影龍龕不紀於東林之石是用伐彼貞珉詢其藻繢下官負薪多恙驅傳不遑欽白黑之勤誠偉丹青之壯觀客自南鄙王壽之雅嘆靈光言於東吳左思之高談建鄴聊扣寥寞而為頌云正法中否淳風載邈道隱三明時昏五濁聲利外染驕淫內斵識淺易淪蔽深難覺其一至人乃睠屈已乘時諸佛付囑㣥仙護持遂荒法寶奄頓乾維露洒天澤雲含帝慈其二是撲燎原爰清闞水翦截奔競滌除囂滓九道合符十方同軌區宇一變陰陽更始其三大康雅俗廣濟含生六寶神御三才化成慶延動植德至幽明魔識正觀神呼太平其四至道雖洽迷方未悟樹以妙梯登之覺路寶坊邑啟銀函壤布大矣能仁深哉善護其五勝境吳俗名都楚封海潮翔鷺山氣盤龍物產殷阜閭閻錯重津途擊轊里閈鳴鐘其六良牧帝難俊僚人望負荷深委規模大壯長者法財沙門異匠共表靈剎同開寶相其七觀閣雲心階基洞口飛月棲棟宛虹入牖闕對蜃樓幢侵牛斗跨峙靈域津梁妙有其八落落開宇沈沈絕機池開梵樂樹下天衣高座宏道深經暢微虎馴十戒龍學三歸其九天啟聖期神扶淨域萌祗斯遠徵祥難測粹業已安高碑乃植沙數有盡金堅無極其十葢聞法體凝寂離形相之區道心元微同虛空之德不可以名言說不可以去來取洎矣無繫修焉似存潛輝匿端而迹漏三界滅識掩智而行該萬法契存於希夷之表機動於忽恍之中談其空則不盡有為索其朕則復歸無物非天下之至妙其孰能與於此乎夫權智無方說三應物真乘寂住抱一湛然同天等人寧累於我淨見病示慘未虧於常樂故能蒙塵於八邦疑之路含垢於五濁之津入其輪迴爾乃度脫生死共其迷復然後舟航顛倒撫神機而獨化攜弱喪而同歸大悲所薰其利博矣元德所被可勝言哉及道隨盈虛教遷正象猶囑累於句偈尚隄防於修習是以四依弟子深演護持之功十行法師大宏供養之事爪甲儻盡悉成菩提心口能存俱離煩惱法雲上際於兜率慧日傍臨於震旦魯人將聖神契闇託於西方漢主聖明靈儀夜飛於東國屈伸變化其不可思議之致歟皇帝以六龍乘時三獸演法窺道品於掌握接聖期於旦暮彈壓海際彌綸沙境赤縣為休祥之宅蒼生沐仁壽之賜瑤函玉檢荅宇宙之隆平寶網珠幢迎天人之勝福丕業以不宰成務深慈以無緣致功固已合上帝之元符開中天之寶藏豈徒窮數盡妙越契踰繩而已哉太子左衞率上柱國相王八卦乾男五行帝子金相玉質鳳毛龍翰幼承寵異列俎豆於南郊長懋徽音奉粢盛於東陸孝友隆其三善溫良登其四行貴而思降體易象之流謙沖而不盈懷道家之日損每推大宗之重深讓元良之德攀紫庭而抗疏懼隔照臨仰元昊而申虔庶通誠感冀因十善之力遂迴九皐之聽跪辭銀版蹇裳下天地之宮拜受玉璜備物坐侯王之國裂山河於大郡黑社生光屬匕鬯於元昆黃離遐阻欣跗萼之有序慶宗社之彌隆載荷今恩永垂曩誓乃發願造釋迦牟尼佛尊像一軀大菩薩弟子神王各二身方撤東山之府且模西竺之容皇嘉廼誠用錫休命制度廣輪之法咸順私心琢磨鎔範之資盡令官給於是乎百工獻技九牧輸琛瑞雀棲鑪仙人練火觀祕影於龍窟得真形於鷲山一輪千輻之偉姿七滿八圓之殊相青毛紺髮蓮目睟容珠纓大士登護法之筵金杵神王夾降魔之座罄崑岑之瑤碧窮蜀道之丹青黼繢周施莊嚴具足煜兮似金山之出海疑毗首天近慙其琱刻靈儀始畢寶飾纔終眉宇之間忽呈異彩圓同植璧炯若懸珠合身相之千光連面門之五色官司駭視而愕立遠近爭途而交赴迴兩宮之軒騎動七貴之輿輪稍積旬時愈益朗明神變無象真筌隱乎密微感通有途妙契存乎咫尺自非聖靈合德忠孝因心何以發金鞍之殊祉玉毫之祕相者哉西域金身既遷於勝妙之塔南宮畫像亦送於清源之臺揆卜因安有自來矣聿求勝壤用遷斯剎有司制禮具音樂洛州供車乘內出神幡香轝送至道塲於是士女雲趨衣冠翕集二龍灑道千馬隨軒幡花經鐵鏁之橋讚口具下金繩之路前後遵從梧宮竹苑之球琳左右奉持柰圃蔗園之龍象煙霞將囂塵混色鼓鍾與蠡貝齊音圍繞周旋達於淨境既安象設仍建齋筵親屈萬乘之尊俯從八關之會日月天子來侍威儀星辰大夫預陪文物攜麒麟之貴戚入鸚鵡之仙臺嘉樹低陰祥蓮接步以犧帝龍顏之相謁象王螺髻之容對奉二尊忽疑釋迦之讓座詳觀兩聖更似多寶之分臺於時人天盡室法俗傾都衆有稻葉之多地無針鋒之隟並睎玉鏡咸仰珠輪莫不注目虔心稽首禮足慶薝蔔之還嗅悅優曇之更開咸訝難思得未曾有爾乃寶坊四敞銀關雙闢地如龜甲山似龍鱗羽騎銜枚列萬隊而清警天龍按部總八神而環衛威容儼其既肅中外寂而無譁然後借座燈王請飯香士大乘法匠開不住之宗耆儒禮官獻無遮之式傾中藏之寶貨移太官之玉廚衣鉢分行簪裾聯事流三川之水未足方油渠酪池興二室之榮不能媲香煙花雨大樂驚於寶剎高幢入於梵宮誦經則上界遙聞彈指則下方俱動用慈悲而行喜捨以清淨而為功德初中之布施寧比其多南北之虛空未量其果方見如來種智化成大寶之基菩薩慧明利建維成之業寧止百千聞法咸蒙離垢億萬同會俱證無生惟抱義含仁顧言慎德文章冠代禮樂在躬以旦奭之周親踐曹史之名行詩書探四學之奧篆籀殫六文之功資寬和之性不伐不矜秉夷澹之心無榮無欲用能體道悟法遣榮去羨讓其天下高名動於萬方得其環中妙果深於大度解末俗之常愛蹈真空之遠跡勝上之業所以崇奉君親謙撝之風所以率先黎獻行可以激貪止競誠可以運神感靈即事論功因今揆昔則南吳去國心未階於紹隆東海稱藩福不登於資敬豈足以梗概風範參差軌轍昔栒邑以塵勞樹績猶勤琱戈衞臣以陪隷收功尚銘彞鼎矧乃調御輪闕之功亦君王去就之事津涯共滄溟將廣名節與嵩岱齊高形舞詠而被笙鏞固其宜矣書版圖而鏤金石夫何愧焉爰命下臣式旌高躅庶山飛海竭將地軸而無傾火劫風災共金堅而不朽重宣此義敢作銘曰心行之表虛空之際有物混成是名真諦非生非滅不巨不細去失其方來無所繫潛通鑒揆闔發機神大慜流俗權開應身非邪作正導法為輪蟄戶逢煦迷途得津天籥含聲衢樽稱物酌焉不匱動而愈出說果明因談因證實波旬迴首尼楗頓膝應變開鑿隨方汲引德洞幽深化帛丿糸區畛洽恩洎緣停報斯盡石室韜光金河輟軫慈舟已謝慧炬俄沈色相俱覩希夷莫尋蒸哉睿聖皇矣君臨更維象法還開佛音有美親賢于嗟檀捨讓踰斷髮誠均捧馬脫屣青宮分茅黑社道軼方外義高天下將追宿契且樹良緣乃隆皇造爰抽國泉觀形兜率取法優填大冶神化靈儀自然異相紛紜殊姿掩藹黼繢丹雘莊嚴金貝面似月輪頂如天葢十位傍拱四神來會真契何遠心誠則通毫文玉潔額理金融色動天印輝含帝弓不資睿德孰顯神功象設既安齋塲乃闢玉輿迴軫瓊柯侍席仗擁曲鈎筵羅飛錫海引千供霞張萬帟人天鼓舞龍象徘徊雲散華葢烟為寶臺闕十六字嘉願克誠洪因無乏百靈衞善千祥護法眇眇三思悠悠萬劫永固彞器長隆寶葉
