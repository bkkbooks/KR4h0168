front:
  text: 全唐文欽定全唐文卷一百三十六無忌字輔機河南洛陽人高祖兵渡河授渭北道行軍典籤太宗朝累官吏部尚書以功第一封齊國公授開府儀同三司冊拜司空改封趙徙拜司徒圖像淩烟閣加太子太師受遺令輔政高宗即位進拜太尉檢校中書令知門下尚書二省事顯慶四年許敬宗誣其謀反詔流黔州自縊死上元元年追復官爵
  hash: sha256:485524569957ab92c97ea1d17b889c97ce2467476bfbcb3b568eb171b3345221
