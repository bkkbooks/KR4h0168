body:
  text: 臣等夙奉明詔授臣刺史子孫繼襲事等建侯承恩以來進退唯谷公私迫切益深危懼竊以無勞而貴自開逐禍之原仰累明時虛行變古之道形影相弔若履春冰宗戚憂危如寘湯火臣無忌等誠惶誠恐頓首頓首死罪死罪臣聞質文迭變皇王之迹有殊今古相沿致理之方乃革緬惟三代習俗靡常爰制五等隨時作教蓋由力不能制因而利之禮樂節文多非巳出逮於兩漢用矯前違置守頒條蠲除曩弊為無益之文覃及四方建不易之理有逾千載今曲為臣等復此奄荒欲其優隆錫之茅社施於子孫永貽宗嗣斯乃大鈞播物秋毫並施其生小人踰分後葉必嬰其禍何者違時易務曲樹私恩謀及庶僚義非僉允方招史冊之誚有紊聖代之綱此其不可一也又臣等智效罕施器識庸陋或情緣后戚遂陟台階或顧想披荊便蒙夜拜直當今日猶愧非才重裂山河愈彰濫賞此其不可二也又且孩童嗣職義乖師儉之方任以褰帷寧無傷錦之弊上干天憲彞典既有常科下擾生民必致餘殃於後一挂刑網自取誅夷陛下深仁務延其嗣翻令勦絕誠有可哀此其不可三也當今聖歷休明求賢分政古稱良守寄在共理此道之行為日滋久因緣臣等或有改張封植兒曹失於求瘼百姓不幸將焉用之此其不可四也在茲一舉為損實多曉夕深思憂貫心髓所以披丹上訴指事明心不敢浮辭同於矯飾伏願天澤諒其愚款特停渙汗之旨賜其性命之恩臣聞崑崙戴極道元液以周天積石䟽源委滄波而括地俯作神州之紀仰膺上帝之宮水德靈長斯其謂矣故能道符千載位長百川瑞馬開圖發榮光於遠代應龍闢壤致宅土於遐年自此不追寂寥難俟天之祚聖復在於茲伏惟皇帝陛下則哲承基窮神闡化功綿㝢外德耀瀛表文教蔚乎三五至道格乎地天是以禎凝藪澤慶溢風烟丹井輝奇青邱表異嘉苗合穎入豐膳以鳴鐘天駟籋雲播頌聲於綴兆西鶼南雉之賮日至月書連珠湧醴之徵雲霏霧集宜其展事嬴里仰告成功出豫介邱方騰茂實猶且宵衣旰食若有追而不逮對越嘉祉乃固辭而弗居遂使萬玉韜華三神觖望西星佇照申以德水之祥東岳希封勗以清河之貺伏見陜州刺史房仁裕狀稱所管界內二百餘里正月元日黃河載清謹按易乾鑿度曰聖人受命河水清京房飛候曰河水清天下太平繇是納渭含涇混流同潔淩門泑澤別派俱清馬頰馳波詳觀若鏡龍門激箭迥眺飛空滔天之曲煥然冰夷之都可見千尋朗澈俯映元珠一曲澄鮮遙觀紫貝盡河宗之奧祕洞水府之仙靈豈非天鑒詳明不愛其道神心昭著在感斯通何幽顯合符人祇交際理均形契若斯之效歟臣等沐道醉心觀洋駭目按圖逖聽曠古無聞實慶生涯親承旦暮伏願陛下上承天意下諭人心昭告寰瀛編列國史臣聞陰陽不測陶冶生靈之謂神道德元通仁育黎元之謂聖聖也者自天之攸縱也神也者代天之理物也是以惟天稱辟靈心作其會昌惟辟奉天至誠表其封禪升中之道抑斯之謂歟繇是先王急焉當仁不讓景中必熭時至則行務在告於成功故無俟於終日伏見綸旨辭遠役之初寧緩此嘉期託俟人之逸豫豈容前歌拔拒戢武之後辭勞拓境開疆太平之秋有勌誠如睿慮未昭百姓之心假此空言實乖千里之應臣等伏膺麟閣縱觀太始之初沉研鳥文歷選橧巢之上悠悠栗陸未辨犧牲淼淼大庭孰知罇俎袞衣為飾尚報大帝之功茹毛充薦輕展介邱之禮西敘窮乎積石東漸迫乎滄江化未覃於九夷貢有闕於三脊猶且範圍天地斡運羲舒揚翠旌於奉高撫朱絃於岱嶽迓百神而賓上帝契三靈而謁大壇玉牘靈文飛英華於萬古金繩祕檢騰清輝於八埏是知紀號垂名崇高莫加於肆類推功輯瑞廣厚莫大於登封若乃靈貺所集人謀允洽雖固執於撝謙諒無得而辭也伏惟皇帝陛下研精探賾神無不照唯幾所鑒洞出象帝之初先天成則超貫混元之際繇是大明揚彩麗雕軒以再中景宿騰輝藻璇題以霄映奔山車而疊軫促日馭之鳴鑾躍澤馬而相趨徵天駟之徐軔烟川清野蓄洩於奕奕之阿薰風警途扇蕩於云云之嶠其冥兆也如彼其顯應也若斯而陛下因事逡巡方稽大典使尊名顯號韜光於豐碑絕異殊尤沮絢於瓊孰謂畏天之命順人之欲者歟率土悽悽深所未喻臣又聞之游海若者馮夷之宮為陋登泰山者魯侯之邦蓋小是知絳霄不極九垓網絡於胸中赤縣無涯四海囊括於度內何者升山巢睫竊比所以懸殊朝菌靈椿長短自然相度也若夫大樂云替封豨盜鍾大禮既湮長鯨裂冕酌撫石於無體均天之響鬱興採掃地於無形禋宗之道逾劭則女希慙其創制軒后歸其正名矣至若比屋見誅農夫化為京觀稟噍無類芻牧窮於染鍔重興粒食頌栖畝之餘糧首建驂騵詠徒行之兼乘則農皇貶於推轂羲氏退以扶輪矣既而凝旒闡化中外禔福負扆勝殘飛沉遂性亭育侔於宇宙就望體於雲日荷其德以難名用其功而無謝故乃邈高辛之順義孕顓頊之䟽通矣加以刑清政肅委金科而罔施毀犴空囹設畫衣而莫犯通關梁於敻服共苑囿於黎蒸擊壤而謠傳清音於戎狄耕田而食建可封於皁隷外戶設而不扃神獸馴而靡觸故以光融伊帝景煥虞庭至於卑宮菲膳孝享通於鬼神大路越席致敬極於嚴配黃屋建三辰之旂垂範裕於千祀元冔垂九旒之藻設法懸於萬代小正調其玉燭應祥蓂而不虧中天朗其金鏡與真明而同晷則文命以是伏膺元王於茲負笈矣洎乎翦商除害夷項墾災戮冀野而復皇猷誅疇華而清帝道提倚天之長劒拯塗炭於游魂揮駐日之雕戈暢懷生於仁壽則駭文武之仍代吞高光之累葉矣詮彼數君時聞一善能兼之者實歸仁聖若乃提封海外總一寰中日域窮芳華之津月竁跨濛波之表欣欣面內並為冠帶之倫飄飄駕風總萃王庭之會賮北荒之明月牣天府以摛光筐南州之火毛鬻旗亭而吐曜龍伯釣鼇之旅咸編列於武臣鳳洲君子之渠各委質於文吏斯乃書契之所未覩超古先而絕類矣竊惟域中三大義均一體感通繇乎影響彌綸切乎交際是知德逾厚者貺逾深功尤高者祥尤著當今皞穹儲祉浹天紘以宅心后土錫符總坤維而服化繇是百官累息萬國聳神僉發叩閽之請佇副上靈之望伏願時紆睿紱遠振天聲徵鴻儒聘鯢齒考逸義緝遺編摭秦煨之逸文採魯壁之餘蠧酌雲經而定議憲河圖而繕儀然後玉路乘春金鑣肅景五牛翻其析羽六龍輝其鏤鍚鼓豐隆而警翠微振列缺而清綠野凝笳發岫合萬歲於山言飛蓋登巒錯五松於林秀登圜壇而接武降曜魄而齊尊俾夫一代衣冠寘其名於冊府四方夷狄鑿其竅於靈宮則普天欣賴懷生再造朝聞夕死抃若登仙臣等深荷玉成不勝至願重竭愚瞽昧死以聞臣無忌等言臣聞混元初闢三極之道分焉醇德既醨六籍之文著矣於是龜書浮於溫洛爰演九疇龍圖出於榮河以彰八卦故能範圍天地埏埴陰陽道濟四溟知周萬物所以七教八政垂炯誡於百王五始六虛貽徽範於千古詠歌明得失之跡雅頌表興廢之由實刑政之紀綱乃人倫之隱括昔雲官司契之后火紀建極之君雖步驟不同質文有異莫不開茲膠序樂以典墳敦稽古以宏風闡儒雅以立訓啟含靈之耳目賛神化之丹青姬孔發揮於前荀孟抑揚於後馬鄭迭進成均之望鬱興蕭戴同升石渠之業愈峻歷夷險其教不墜經隆替其道彌尊斯乃邦家之基王化之本者也伏惟皇帝陛下得一繼明通三撫運乘天地之正齊日月之暉敷四術而緯俗經邦蘊九德而辨方軌物御紫宸而訪道坐元扈以裁仁化被丹澤政洽幽陵三秀六穗之祥府無虛月集囿巢閣之瑞史不絕書照金鏡而泰階平運玉衡而景宿麗可謂鴻名軼於軒昊茂績冠於勳華而垂拱無為游心經典以為聖教幽賾妙理深元訓詁紛綸文䟽蹖駮先儒競生別見後進爭出異端未辨三豕之疑莫祛五日之惑故祭酒上護軍曲阜縣開國子孔穎達宏才碩學名振當時貞觀年中奉勅修撰雖加討覈尚有未周爰降絲綸更令刊定勅太尉揚州都督監修國史上柱國趙國公臣無忌司空上柱國英國公臣勣尚書左僕射兼太子少師監修國史上柱國燕國公臣志寧尚書右僕射兼太子少傅監修國史上護軍曲阜縣開國公臣行成光祿大夫侍中兼太子少保監修國史上護軍艹修縣開國公臣季輔光祿大夫吏部尚書監修國史上柱國河南郡開國公臣褚遂良銀青光祿大夫守中書令監修國史上騎都尉臣柳奭前諫議大夫宏文館學士臣谷那律國子博士宏文館學士臣劉伯莊朝議大夫國子博士臣王德韶朝散大夫行太學博士臣賈公彥朝散大夫行太學博士宏文館直學士臣范義頵朝散大夫行太常博士臣柳宣通直郎太學博士臣齊威宣德郎守國子助教臣史士宏宣德郎守太學博士臣孔志約右內率府長史宏文館直學士臣薛伯珍太學助教臣鄭祖元徵事郎守太學助教臣隨德素徵事郎守四門博士臣趙君賛承務郎守太學助教臣周元達承務郎守四門助教臣李元植儒林郎守四門助教臣王真儒等上稟宸旨傍摭㣥書釋左氏之膏肓翦古文之煩亂探曲臺之奧趣索連山之元言囊括百家森羅萬有比之天象與七政而長懸方之地軸將五嶽而永久筆削巳了繕寫如前臣等學謝伏恭業慙張禹雖罄庸淺懼乖典正謹以上聞伏增戰越謹言永徽四年二月二十四日太尉揚州都督上柱國公臣無忌等上臣無忌等言臣聞三才既分法星著於元象六位斯列習坎彰於易經故知出震乘時開物成務莫不作訓以臨函夏垂教以牧黎元昔周后登極呂侯闡其茂範虞帝納麓臯陶創其彞章大夫之述三言金篆騰其高軌安衆之陳九法玉牒播其宏規前哲比之以隄防往賢譬之以銜勒輕重失序則繫之以存亡寬猛乖方則階之以得喪泣辜慎罰文命所以會昌斮脛剖心獨夫於是盪覆三族之刑設禍起於望夷五虐之制興師亡於涿鹿齊景網峻時英有踊貴之談周幽獄繁詩人致菀柳之刺所以當塗撫運樂平除慘酷之刑金行提象鎮南削煩苛之法而體國經野御辨登樞莫不崇寬以宏風樹仁惠以裁化景冑以之碩茂寶祚於是克崇徽猷列於緗圖鴻名勒於青史暨炎靈委御人物道銷霧翳三光塵驚九服秋卿司於邦典高下在心獄吏傳於爰書出沒由巳內史溺灰然而被辱丞相見牘背而行賕戮逮棄灰誅及偶語長平痛積冤之氣司敗切瘐死之魂遂使五樓之㣥爭迴地軸十角之旅競入天田國步於是艱難刑政於焉弛紊殷憂俟來蘇之后多難佇撥亂之君大唐握乾符以應期得天統而御歷誅阪泉之巨猾勦丹浦之凶渠掃旬始而靜天綱廓妖氛而清地紀朱旗乃舉東城高滅楚之功黃鉞裁麾西土建翦商之業總六合而光宅包四大以凝旒異域於是來庭殊方所以受職航少海以朝絳闕梯崑山以謁紫宸椎髻之酋加之以文冕窮髮之長寵之以徽章王會之所不書塗山之所莫紀歌九功以協金奏運七政以齊玉衡律增甲乙之科以正澆俗禮崇升降之制以拯頹風蕩蕩巍巍信無德而稱也伏惟皇帝陛下體元纂業則大臨人覆載並於乾坤照臨運於日月坐青蒲而化光四表負丹扆而德被九圍日旰忘餐心存於哀矜宵分不寐志在於明威一夫向隅而責躬萬方有犯而罪巳仍慮三辟攸斁八刑尚密平反之吏從寬而失情次骨之人舞智而陷網刑靡定法律無正條徽纆妄施手足安措乃制太尉揚州都督監修國史上柱國趙國公長孫無忌司空上柱國英國公李勣尚書左僕射兼太子少師監修國史上柱國燕國公于志寧尚書右僕射監修國史上柱國開國公褚遂良銀青光祿大夫守中書令監修國史上騎都尉柳奭銀青光祿大夫守刑部尚書上輕車都尉唐臨太中大夫守大理卿輕車都尉段寶元太中大夫守黃門侍郎護軍潁川縣開國公韓瑗太中大夫守中書侍郎監修國史驍騎尉來濟朝議大夫守中書侍郎辛茂將朝議大夫守尚書右丞輕車都尉劉燕客朝請大夫使持節潁州諸軍事守潁州刺史輕車都尉裴宏獻朝議大夫守御史中丞上柱國賈敏行朝議郎守刑部郎中輕車都尉王懷恪前雍州盩厔縣令雲騎尉董雄朝議郎行大理丞護軍路立承奉郎守雍州始平縣丞驍騎尉石士逵大理評事雲騎尉曹惠果儒林郎守律學博士飛騎尉司馬銳等撫金匱之故事採石室之逸書捐彼凝脂敦茲要網羅訓誥研覈邱墳撰律䟽三十卷筆削巳了實三典之隱括信百代之準繩銘之景鍾將二儀而並久布之象魏與七曜而長懸庶一面之祝遠超於殷十失之歎永彌於漢圖謹詣朝堂奏表以聞臣無忌等誠惶誠恐頓首頓首永徽四年十一月十九日進臣聞佛教沖元天人莫測言本則甚深語門則難入伏惟陛下至道昭明飛光昱日澤霑遐界化溢中區擁護五乘建立三寶故得法師當叔葉而秀質閒千載而挺生陟重阻以求經履危途而訪道見珍殊俗具獲真文歸國翻宣若庵園之始說精文奧義如金口之新開皆是陛下聖德所感臣等愚瞽預此見聞若海波瀾舟航有寄況天慈廣遠使布之九州蠢蠢黔黎俱飡妙法臣等億劫希逢不勝慶幸伏見祀令以高祖大武皇帝配五天帝於明堂太宗文皇帝配五人帝亦在明堂之側座臣等謹尋方冊歷考前規宗祀明堂必配上帝而伏羲五代本配五郊參之明堂自緣從祀今以太宗作配理有未安伏見永徽二年七月制建明堂伏惟陛下天縱孝德追奉太宗巳尊嚴配當時高祖先在明堂禮司致惑竟未遷祀率意定儀遂便著令乃以太宗文皇帝降配五人帝雖復亦在明堂不得對越天帝深乖明詔之意又與先典不同謹按孝經曰孝莫大於嚴父嚴父莫大於配天昔者周公宗祀文王於明堂以配上帝伏尋詔意義在於斯今所司行令殊為失旨又尋漢魏晉宋歷代禮儀並無父子同配明堂之儀唯祭法云周人禘嚳而郊稷祖文王而宗武王鄭元注曰禘郊祖宗謂祭祀以配食也禘謂祭昊天於圓丘郊謂祭上帝於南郊祖宗謂祭五帝五神於明堂也尋鄭此注乃以祖宗合為一祭又以文武共在明堂連袵配祀良為謬矣故王肅駮曰古者祖有功而宗有德祖宗自是不毀之名非謂配食於明堂者也審如鄭義則孝經當言祖祀文王於明堂不得言宗祀也凡宗者尊也周人既祖其廟又尊其祀孰謂祖於明堂者乎鄭引孝經以解祭法而不曉周公本意殊非仲尼之義旨也又解宗祀武王云配勾芒之類是謂五神位在堂下武王降位失君敘矣又按六韜云武王伐紂雪深丈餘五車二馬行無轍跡詣營求謁武王恠而問焉太公對曰此必五方之神來受事耳遂以其名召入各以其職令焉既而克殷風調雨順豈有生來受職歿則配之降尊敵卑理不然矣故春秋外傳曰禘郊祖宗報五者國之典祀也傳言五者故知各是一事非謂祖宗合祀於明堂也臣謹上考殷周下洎貞觀並無一代兩帝同配於明堂唯南齊蕭氏以武明昆季並於明堂配食事乃不經不足援據又檢武德時令以元皇帝配於明堂兼配感生帝至貞觀初緣情革禮奉祀高祖配於明堂奉遷代祖專配感帝此則聖朝故事巳有遞遷之典取法宗廟古之制焉伏惟太祖景皇帝締構有周建絕代之丕業啟祚汾晉創歷聖之洪基德邁發生道符立極又代祖元皇帝潛鱗韜慶屈道事周導濬發之靈源肇光宅之垂裕稱祖清廟萬代不遷請停配祀以符古義伏惟高祖大武皇帝躬受天命奄有神州創制改物體元居正為國始祖抑有舊章昔者炎漢高帝當塗太祖皆以受命例並配天請遵故實奉祀高祖於圓丘以配昊天上帝伏惟太宗文皇帝道格上蒼功清下黷拯率土之塗炭布大造於生靈請準詔書宗祀於明堂以配上帝又請依武德故事並配感帝作主斯乃二祖德隆永不遷廟兩聖功大各得配天遠協孝經近申詔意臣等叨濫職定彞章敢執禮經昧死陳情謹議準舊唐志通典會要有武德初撰四字衣服令乘輿祀天地服大裘冕無旒臣無忌志寧敬宗等勘前件令是武德初撰雖憑周禮理極未安謹按郊特牲云周之始郊日南至被袞以象天戴冕藻十有二旒則天數也而此二禮俱說周郊袞與大裘事乃有異按月令孟冬天子始裘明以禦寒理非當暑若啟蟄祈穀冬至報天行事服裘義歸通允至於季夏迎氣龍見而雩炎熾方隆如何可服謹尋歷代唯服袞章與郊特牲義旨相協按周遷輿服志云漢明帝永平二年詔採周官禮記始制祀天地服天子備十二章沈約宋書志云魏晉郊天亦皆服袞又王智深宋紀曰明帝詔云朕以大冕純玉藻元衣黃裳郊祀天地後魏周齊迄於隋氏勘其禮令祭服悉同斯則百王通典炎涼無妨復與禮經事無乖殊今請憲章故實郊祭天地皆服袞冕其大裘請停仍改禮令又準新禮皇帝祭社稷服絺冕四旒三章祭日月服元冕三旒衣無章謹按令文是四品五品之服此即三公亞獻皆服袞衣孤卿助祭服毳及鷩斯乃乘輿章數同於大夫君少臣多殊為不可據周禮云祀昊天上帝則服大裘而冕五帝亦如之享先王則袞冕享先公則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕諸小祠則元冕又云公侯伯子男孤卿大夫之服袞冕巳下皆如王之服所以三禮義宗遂有二釋一云公卿大夫助祭之日所著之服降王一等又云悉與王同求其折衷俱未通允但名位不同禮亦異數天子以十有二為節義在法天豈有四旒三章翻為御服若諸臣助祭冕與王同便是貴賤無分君臣不別如其降王一等則又王著元冕之時㣥臣並著爵弁既屈天子又貶公卿周禮此文久不施用亦猶祭祀之立尸侑君親之拜臣子覆巢設硩蔟之官去鼃置蟈氏之職雖曰古禮事不可行是故漢魏巳來下迄隋代相承舊事皆服袞冕今新禮親祭日月乃服五品之衣臨事施行實不穩便請遵歷代故實諸祭並用袞冕謹議謹按禮記祭法云聖王之制禮也法施於人則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之又云堯舜禹湯文武皆有勳烈於人及日月星辰人所瞻仰非此族也不在祀典準此帝王合與日月同例恒加祭饗義在報功爰及隋代並遵斯典其漢高祖祭法無文但以前代迄今多行秦漢故事始皇無道所以棄之漢祖典章法垂於後自隋巳上亦在祀例伏惟大唐稽古垂化網羅前典唯此一祀咸秩未申今新禮及令無祭先代帝王之文今請聿遵故實修附禮令依舊三年一祭仍以仲春之月祭唐堯於平陽以契配祭虞舜於河東以咎繇配祭夏禹於安邑以伯益配祭殷湯於偃師以伊尹配祭周文王於酆以太公配祭周武王於鎬以周公召公配祭高祖於長陵以蕭何配又按新禮孔子為先聖顏回為先師又準貞觀二十一年詔亦以孔子為先聖更以左邱明等二十二人與顏回俱配尼父於太學並為先師今據永徽令文改用周公為先聖遂黜孔子為先師顏回邱明並為從祀謹按禮記云凡學春官釋奠於其先師鄭元注云官謂詩書禮樂之官也先師者若漢禮有高堂生樂有制氏詩有毛公書有伏生可以為師者又禮記云始立學釋奠於先聖鄭元注云若周公孔子也據禮為定昭然自別聖則因天合德師則偏善一經漢魏巳來取舍各異顏回夫子互作先師宣父周公迭為先聖求其節文遞有得失所以貞觀之末親降綸言依禮記之明文酌康成之奧說正夫子為先聖加衆儒為先師永垂制於後昆革往代之紕謬而今新令不詳制旨輒事刊改遂違明詔但成王幼年周公踐極制禮作樂功比帝王所以禹湯文武成王周公為六君子又說明王孝道乃述周公嚴配此即姬旦鴻業合同王者祀之儒官就享實貶其功仲尼生衰周之末拯文喪之弊祖述堯舜憲章文武宏聖教於六經闡儒風於千代故孟軻稱生靈巳來一人而巳自漢巳來奕葉封侯崇奉其聖迄於今日胡可降茲上哲俯入先師又且邱明之徒見行其學貶為從祀亦無故事今請改令從詔於義為允其周公仍依別禮配享武王謹議依祠令及新禮並用鄭元六天之議圓丘祀昊天上帝南郊祭太微感帝明堂祭太微五天帝臣等謹按鄭元此義唯據緯書所說六天皆謂星象而昊天上帝不屬穹蒼故注月令及周官皆謂圓丘所祭昊天上帝為北辰星曜魄寶又說孝經郊祀后稷以配天及明堂嚴父以配天皆為太微五帝考其所說殊乖謬特深按周易云日月麗乎天百穀草木麗乎地又云在天成象在地成形足明辰象非天草木非地毛詩傳云元氣廣大則稱昊天據遠視之蒼然則稱蒼天此則天以蒼昊為體不入星辰之例且天地各一是曰兩儀天尚無二焉得有六是以王肅㣥儒咸駮此義又檢太史圓丘圖昊天上帝外別有北辰座與鄭義不同得太史令李淳風等狀稱昊天上帝圖位自在壇上北辰自在第三等與北斗並列為星官內座之首不同鄭元據緯書所說此乃羲和所掌觀象制圖推步有徵相沿不謬又按史記天官書等太微宮有五帝者自是五精之神五星所奉以其是人主之象故況之曰帝亦如房心為天皇之例豈是天乎周禮云兆五帝於四郊又云祀五帝則掌百官之誓戒唯稱五帝皆不言天此自太微之神本非昊天之祭又孝經惟云郊祀后稷別無圓丘之文王肅等皆以為郊即圓丘圓丘即郊猶王城京師異名同實符合經典其義甚明而今從鄭說分為兩祭圓丘之外別有南郊違棄正經理深未允且檢吏部式惟有南郊陪位更不別載圓丘式文既遵王肅祠令仍行鄭義令式相乖理宜改革又孝經云嚴父莫大於配天下文即云周公宗祀文王於明堂以配上帝則是明堂所祠正在配天而以為但祭星官文違明義又按月令孟春之月祈穀於上帝左傳亦云凡祀啟蟄而郊郊而後耕故郊祀后稷以祈農事然則啟蟄郊天自以祈穀謂為感帝之祭事甚不經今請憲章姬孔取王去鄭四郊迎氣存太微五帝之祀南郊明堂廢緯書六天之義其方丘祭地之外別有神州謂之北郊分地為二既無典據理又不通亦請合為一祀以符古義仍並請循附式令永垂後則謹議皇帝為諸臣及五服親舉哀依禮著素服今令乃云白帢禮令乖舛須歸一途且白帢出自近代事非稽古雖著令文不可行用請改從素服以會禮文依古喪服甥為舅緦麻舅報甥亦同此制貞觀年中八座議奏曰舅服同姨小功五月而今律䟽舅報於甥服猶三月謹按旁尊之服禮無不報巳非正尊不敢降也故甥為從母五月從母報甥小功甥為舅緦麻舅亦報甥三月是其義矣今甥為舅使同從母之喪則舅宜進甥以同從母之報修律䟽人不知禮意舅報甥服尚止緦麻例既不通禮須刊正今請修改律䟽舅服甥亦小功庶母古禮緦麻新禮無服謹按庶母之子即是巳之昆季為之杖齊而巳與之無服同氣之內吉凶頓殊求之禮情深非至理請依典故為服緦麻夫三才肇位萬象斯分稟氣含靈人為稱首莫不憑黎元而樹司宰因政教而施刑法其有情恣庸愚識沉戾大則亂其區宇小則暌其品式不立制度則未之前聞故曰以刑止刑以殺止殺刑罰不可弛於國笞箠不得廢於家時遇澆淳用有衆寡於是結繩啟路盈坎䟽源輕刑明威大禮崇敬易曰天垂象聖人則之觀雷電而制威刑覩秋霜而有肅殺懲其巳犯而防其未然平其徽纆而存乎博愛蓋聖王不獲巳而用之古者大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽笮薄刑用鞭扑其所由來亦巳尚矣昔白龍白雲則伏羲軒轅之代西火西水則炎帝共工之年鷞鳩筮賓於少皡金正策名於顓頊咸有天秩典司刑憲大道之化擊壤無違迨乎唐虞化行事議刑以定其罪畫象以愧其心所有條貫良多略年代浸遠不可得而詳焉堯舜時理官則謂之為士而臯陶為之其法略存而往往概見則風俗通所云臯陶謨虞造律是也律者訓銓訓法也易曰理財正辭禁人為非曰義故銓量輕重依義制律尚書大傳曰丕天之大律注云奉天之大法法亦律也故謂之為律昔者聖人制作謂之為經傳師所說則謂之為傳此則邱明子夏於春秋禮經作傳是也近代巳來兼經注而明之則謂之為義䟽䟽之為字本以䟽濶䟽遠立名又廣雅云䟽者識也案䟽訓識則書䟽記識之道存焉史記云後主所是䟽為令前主所是著為律漢書云削牘為䟽故云䟽也昔者三王始用肉刑赭衣難嗣皇風更遠朴散淳離傷肌犯骨尚書大傳曰夏刑三千條周禮司刑掌五刑其屬二千五百穆王度時制法五刑之屬三千周衰刑重戰國異制魏文侯師於李悝集諸國刑典造法經六篇一盜法二賊法三囚法四捕法五雜法六具法商鞅傳授改法為律漢相蕭何更加悝所造戶興廄三篇謂九章之律魏因漢律為一十八篇改漢具律為刑名第一晉命賈充等增損漢魏律為二十篇於魏刑名律中分為法例律宋齊梁及後魏因而不改爰至北齊併刑名法例為名例後周復為刑名隋因北齊更為名例唐由於隋相承不改名者五刑之罪名例者五刑之體例名訓為命例訓為比命諸篇之刑名比諸篇之法例但名因罪立事由犯生命名即刑應比例即事表故以名例為首篇第者訓居訓次則次第之義可得言矣一者太極之氣函三為一黃鐘之一數所生焉名例冠十二篇之首故云名例第一大唐皇帝以上聖凝圖英聲嗣武潤春雲於品物緩秋官於黎庶今之憲典前聖規模章程靡失鴻纖備舉而刑憲之司報行殊異大理當其死坐刑部處以流刑一州斷以徒年一縣將為杖罰不有解釋觸塗睽誤皇帝彞憲在懷納隍興軫德禮為政教之本刑罰為政教之用猶昏曉陽秋相須而成者也是以降綸言於台鉉揮折於髦彥爰造律䟽大明典式遠則皇王妙旨近則蕭賈遺文沿波討源自枝窮葉甄表寬大裁成久譬權衡之知輕重若規矩之得方圓邁彼三章同符畫一者矣
