front:
  text: 全唐文欽定全唐文卷九十九博乂高祖兄蜀王湛子武德元年封隴西王高宗時歷宗正卿禮部尚書加特進咸亨二年薨贈開府儀同三司荊州都督諡曰恭
  hash: sha256:83b3b9575b42a26126fb45b8c28eab4c0560a30876b4f844ee02e56ba743ce26
  markers:
  - {type: head, offset: 12, content: 隴西王博乂, id: KR4h0168_NFKB_099-h1, level: 1}
body:
  text: 緬尋喪服母名斯定嫡繼慈養皆在其中惟出母之制特言出妻之子明非生巳則皆無服是以令著母嫁之夫又云出妻之子出言其子以著所生嫁則言母通包養嫡俱當解任並合心喪其不解者惟有繼母之嫁繼母為名正據前妻之子嫡於諸孽禮無繼母之文甲令今既見行嗣業理申心制然奉敕議定方垂永則今有不安亦須釐正竊以嫡繼慈養皆非所生出之與嫁並同行路嫁雖比出稍輕於父終為義絶繼母之嫁既殊親母慈嫡義絶豈合心喪望請凡非所生父卒而嫁為父後者無服非承重者杖朞並不心喪一同繼母有符情禮無玷舊章又心喪之制惟施厭降杖朞之服不悉解官而令文三年齊斬亦入心喪之例杖朞解官又有妻喪之舛又依禮庶子為朞母緦麻三月既是所生母服準例亦合解官令文漏而不言於事終須修附既與嫡母等嫁同一條總議請改理為允愜元景高祖第六子武德三年封趙王八年授安州都督貞觀初歷雍州牧右驍衛大將軍十年徙封荊授荊州都督轉鄜州刺史永徽初進位司徒坐與房遺愛謀反賜死國除後追封沉黎王神龍初追復爵土夫功成道合古今以為隆平登封降禪聖賢謂之大典是以出震則天之后革夏變商之君繼韶夏而施尊名崇號諡而廣符瑞顧遲遲焉羣臣區區誠為此也原夫大始云構生靈厥萌黎庶布乎穹壤皇王司其右契遐哉上古以迄於茲歷選休徵未有如今日之盛也所以敢罄窺管無懼觸鱗瀝膽披肝言亦備矣援天引聖辭亦殫矣幸蒙亭育之澤降以聽覽之恩大賚雖敷猶申後命未便渙汗方事逡巡懷生之徒不遑寧處伏乞皇帝陛下則天成務應物為心協三才之會昌乃沛然而動色遂萬姓之延首俯凝旒而改容雖復龍圖告徵龜書襲吉尚咨諏於四嶽建明謨於兆人欲使六合之中沃心通於朝野八紘之內下問浹於華戎凡在人靈疇無抃躍今茲百辟咸集九有攸同並執玉以來庭俱式歌而且舞遠則重譯僉議近則端笏參謀欣覩增天之高願逢加地之厚絶域忘生而越險華髮忍死而爭趨中外之心克諧愚智之情允睦掌故事者草登封而待期執羈勒者儼車徒而俟命庶官率職三事夙興遠邇昌言明靈幽贊莫不傾視俯聽希陪肆覲之禮效祉呈祥欽承告成之慶山稱萬歲企和鑾而發奇雲浮五彩佇華蓋而交蔭兩儀之情轉迫萬國之望愈深臣又聞之屈己從衆至人所以稱仁絲言顯發哲王所以敷信昨奉明詔許以試之實降皇情俯同人欲寬人之利斯博示信之道宜宏即日庶尹馳心咸奉章而守闕列藩翹足各伏地以祈恩所冀天慈深加昭察制可羣僚之奏剋以發軫之期頒示普天申明絶典使夫一時之士欣獨高於萬代八荒之酋荷周露於再造則臣等死日猶生之年不任誠懇之至謹與連率方牧等奉表詣闕固請以聞承乾字高明太宗長子武德三年封恆山王七年徙封中山太宗即位為皇太子甫八歲特敏惠太宗使裁決庶政有大體每行幸令監國及長好聲色慢遊過惡寖聞時魏王泰有美名謀奪嫡而承乾病足不良行懼廢與泰交惡陰召左衛副率封師進及刺客張師政紇干承基謀殺泰不克遂與漢王元昌及侯君集等喢臂血盟謀以兵入西宮貞觀十七年齊王祐反事連承基繫獄當死因上變治之事皆明驗廢為庶人徙黔州十九年死開元中贈還爵土辱師所示妙法四科循覽周環用深銘佩法師早袪塵纍遊神物表闡鷲嶺之微言探龍宮之祕藏洞開靈府凝照元門固以高步彌天鄰幾初地遂能留情博施開導蒙心理實義周詞華致遠包括今古網羅內外訓誘之至審諭之方縱聖達立言師傳宏道亦未足髣佛要津擬議高論但行慈減殺順氣奉齊斯乃仁人之心以成大慈之行謹當緘諸心府奉以周旋永藉勝因用期冥祐泰字惠褒太宗第四子武德三年封宜都王四年進封衛繼懷王霸後貞觀二年改封越授揚州大都督再遷雍州牧左武大將軍轉鄜州大都督十年徙封魏遙領相州都督時太子承乾病蹇泰潛圖奪嫡承乾懼陰使人上書言泰罪狀既而承乾敗太宗詢知其繇詔廢之幽泰將作監尋改王順陽徙居均州之鄖鄉縣二十一年進封濮高宗立為泰開府置僚屬永徽三年薨年三十五贈太尉雍州牧諡曰恭昔道安晦迹襄陽聲馳秦闕慧遠棲心廬嶽名振晉京故知善言之應非徒千里明月所照不隔九重法師笠澤上仁震維高德律行淨於青眼威儀整於赤髭傳燈之智不窮法施之財無盡弟子攝此心馬每渴仰於調御墾此身田常戴懷於法雨若得師資有託冀以袪此六塵善導啓行庶無迷於八正謹遣咨祈佇承慈誘惲太宗第七子始王剡徙王蔣拜安州都督永徽三年徙梁州上元中遷箕州刺史録事參軍張君徹誣以反懼自殺高宗知其枉贈司空荊州大都督惟皇建極兮憲章前古於穆文明兮保乂寰宇御時得一兮臨人以五法天無私兮承天之祜至矣哉衆兆融朗山川出雲叶千年之休裕垂五色之氤氳蕭索離披狀虹輝之貫日徘徊搖曳疑鼎氣之歊汾散作霞彩聚成錦文匪騰華於觸石信呈瑞於明君其靜也專其動也直既無散漫亦無消息遠而可視高未能逼乘輕吹之霏微映朝陽而翕赩稟造化之元氣挺自然之奇色英倏倏也祗可以理求紛溶溶兮固難乎智測若霧非霧有始有極轉空不待於扶搖動日豈資於羽翼有道斯見無德匪呈庶物皆覩應天之卿體鵠振而超越龍吟而化成則需為大矣可謂乎元亨利貞宏高宗第五子永徽六年封代王顯慶元年立為皇太子咸亨二年高宗幸東都令監國宏仁孝未嘗有過武后將騁志宏奏請數怫旨上元二年從幸合璧宮遇鴆薨年二十四諡曰孝敬皇帝中宗踐祚祔於太廟號義宗開元六年建廟東都停義宗號以諡名廟竊聞所司以背軍之人身久不出家口皆擬沒官亦有限外出首未經斷罪諸州囚禁人數至多或臨時遇病不及軍伍緣茲怖懼遂即逃亡或因樵採被賊抄掠或渡海來去漂沒滄波或深入賊庭有被傷殺軍法嚴重皆須相傔若不給傔及不因戰亡即同隊之人兼合有罪遂有無故死失多注為逃軍旅之中不暇勘當直據隊司通狀將作真逃家口今總沒官論情實可哀愍書曰與其殺不辜寧失不經伏願逃亡之家免其配沒臣聞周師東邁商閭延降軾之榮漢蹕西旋夷門致抱關之想況泣麟曾躅歌鳳遙芬被縟禮於昌辰飾殊榮於窮壤者哉伏惟皇帝陛下資靈統極稟粹登樞乃聖乃神體陰陽而不宰無為無事均雨露之莫私六符薦而泰階平百寶臻而天祚永靈臺所以偃伯延閣由其增絢尚齒尊賢邁鴻名於萬古興亡繼絶騰峻軌於千齡大矣哉茂實英聲固無得而稱矣日者封金岱畎會玉梁陰路指沂川途經闕里回鑾駐罕式鑑堯禹之姿闢纊凝旒載想溫良之德於是特紆宸渙贈以太師爰命重臣申其奠醊廟堂卑陋重遣修營褒聖侯德倫子孫咸蠲賦役臣恩均扈從迹濫撫軍舊烈遺塵躬陪瞻眺雩壇相圃欣覿前聞又昔歲承恩齒胄膠孰歷觀軒屏具列門徒想仁孝於顏曾彌深景慕採風猷於竹帛冀啓顓蒙所以輕敢陳聞庶加褒贈天慈下濟無隔異時咸登師保式光泉夜敢以前恩重茲干請竊謂宣尼之廟重闡規模桂奠蘭羞永傳終古崇班峻禮式賁幽埏而翠玉莫題言猷靡暢詢諸故實有所未周且將聖自天惟幾應物拯人倫於已墜甄禮樂於既傾祖述勳華三千勵其鑽仰憲章文武億兆遵其藏用豈可使汾川遺碣獨擅於無慚峴岫餘文孤標於墮淚伏見前件孔廟營構畢功峻業增徽事資刊勒敢希鴻澤令樹一碑且遼海清夷久無徵發山東豐稔時踰恆歲況鄒魯舊邦儒教所起刊勒之費未足為多許其子來不日便就乞特矜照遂此愚誠臣識昧常規言慚通理塵瀆聽覽追增竦戰賢字明允高宗第六子永徽六年封潞王授岐州刺史加雍州牧龍朔元年徙封沛纍進揚州大都督右衛大將軍更名德徙封雍授涼州大都督上元元年復名賢立為皇太子監國時明崇儼以左道為武后所信密稱英王類太宗又言相王相最貴宮人潛議賢乃后姊韓國夫人生賢聞之疑懼后數以書讓愈不自安調露中崇儼為盜所殺后疑出賢謀遣人發其陰事詔薛元超等雜治之獲甲首數百於東宮乃廢為庶人遷於巴州武后得政詔左金吾將軍邱神績檢衛賢第迫令自殺年三十二后貶神績曡州刺史復爵雍王神龍初贈司徒睿宗立追贈皇太子諡曰章懷維大唐麟德二年歲足廠田坴星紀月次降婁二月癸酉朔八日庚辰皇太子奉為二聖於西明寺造銅鐘一口可一萬斤發漢水之奇珍採蜀山之祕寶虞倕練火晉曠飛爐帶龍虡而騰規應鯨桴而寫製聲流九地遐宣厚載之恩韻徹三天遠播曾旻之德寤羣生於覺路警庶類於迷塗業擅香垣功齊塵劫式旌高躅敢勒貞金頌其銘曰青祇薦祉黃離降精渦川育德瑤嶺飛英吹銅表性問寢登情興言淨業載啓香城七珍交鑄九乳圖形翔龍若動偃獸疑驚制陵周室規踰漢庭風飄旦響霜傳夜鳴仰延皇祚俯導蒼生聲騰億劫慶溢千齡重福中宗第二子初封唐昌王聖歷三年徙封平恩長安四年進封譙神龍初韋庶人譖與張易之兄弟陷太子重潤貶濮州員外刺史徙合均二州不領事睿宗立徙集州未行用張靈均謀潛募勇敢士詐乘驛趨東都欲襲殺留守劫左右屯營兵為亂事敗投漕渠死年三十一詔以三品禮葬臣聞功同賞異則勞臣疑罪均刑殊則百姓惑伏惟陛下德侔造化明齊日月恩及飛鳥惠加走獸近者焚柴展禮郊祀上元萬物霑愷悌之仁六合承曠蕩之澤事無輕重咸赦除之蒼生並得赦除赤子偏加擯棄皇天平分之道固若此乎天下之人聞者為臣流涕況陛下慈念豈不愍臣恓惶伏望捨臣罪愆許臣朝謁儻得一仰雲陛再覩聖顏雖沒九泉實為萬足重投荒徼亦所甘心重茂中宗第四子聖歷三年封北海王神龍初進封溫王授右衛大將軍兼遙領并州大都督未出閣景龍四年韋庶人臨朝稱制立王為帝韋氏敗遜位於睿宗景雲二年改封襄王遷於集州開元二年轉房州刺史薨年十七諡曰殤帝天未悔禍王室多難大行皇帝升遐之際事起倉卒朕以沖藐嗣守丕圖銜恤問故遂窮凶黨逆賊馬秦客等潛通宮禁敢行鴆毒而宗楚客紀處訥武延秀趙履溫韋播高嵩韋挺葉靜能韋建楊均王哲等遂扇太后干朕家事凡有處分政繇韋氏楚客又妄說妖言務欲勸進連結中外將危宗社又頃者王慶之李㻀張嘉福前麟遊縣令杜無二越州長史宋之問潛行表狀請立武承嗣為皇太子則天皇后斬慶之一人之問以附託三思獲免今之問李㻀又託楚客晉卿與將作少匠李守質日夜潛圖令延秀起事朕之微眇危若綴旒安國相王鎮國太平公主朕之親叔親姑同憂共戚楚客韋溫等又附會安樂公主妄欲翦除相王第三子臨淄郡王隆基家國情深君親義切乃與太平公主第二子薛崇及總監鍾紹京前同州朝邑縣尉劉幽求利仁府折衝麻嗣宗太平公主府典籤王師虔尚衣奉御王崇煜東明觀道士馮處澄寶昌寺僧普潤前商州司馬崔諤之山人劉承祖等僉符人望考以時宜叶契建謀重安李氏兵戈不動氛祲廓清瞬息之閒還自屠滅朕以山陵未畢變故相仍情緒荒迷益深摧憤士庶等代承景化纍荷國恩今得宗社乂安人祇交泰當同茲感悅各效忠貞如更朋黨比周輒生異議朕當加嚴憲必所不容即宜宣示令知朕意大盜移國朝有賊臣見危授命家多義士朕以凶閔觸諸糜潰姦豎搆扇傾陷宗社潛圖竊發機兆未萌相王第三子臨淄郡王隆基糾合同盟忠勇奮怒志除凶黨保護邦家逆賊韋溫馬秦客葉靜能宗楚客紀處訥武延秀趙履溫楊均等密行鴆毒先聖暴終朕志不圖全枕戈泣血風雲元感情計陰通太平公主男衛尉卿薛崇與前同州朝邑縣尉劉幽求總監鍾紹京日夜共謀誓誅逆黨凶徒驚恧投竄無所今天衢交泰氛祲廓清宜申作解之恩以洽升平之化自唐隆元年六月二十一日昧爽巳前大辟罪巳下常赦所不免者咸赦除之其逆賊頭首咸巳斬決自餘支黨一無所問內外官三品巳上賜爵一等四品巳下加一階隆基可封平王食實封一千戶賜物五千段薛崇封立節郡王食實封五百戶賜物三千段鍾紹京可銀青光祿大夫守中書侍郎潁川郡開國公食實封二百戶賜物一千段前同州朝邑縣尉劉幽求可朝議大夫守中書舍人仍參知機務中山郡開國男食實封二百戶利仁府折衝麻嗣宗可雲麾將軍行左金吾衛中郎將賜物一千段追貶皇后韋氏為庶人安樂公主為悖逆庶人自古帝王必有符命兄弟相及存諸典禮朕以孤藐遭家艱難顧茲蒙識未洽理途茫茫四海將何所屬纍聖丕基若墜於地王室多難宜擇長君思與羣公推崇明聖叔父相王高宗之子昔以天下讓於先帝孝友寬彰信兆人神龍之初巳有明旨將立太弟以為副君為王懇辭未行冊命所以東宮虛位於今歷年徹綴在辰禍變倉卒後掖稱制計立沖人欽奉前懷願遵理命上申天聖之旨下遂蒼生之心俯稽圖緯之文仰跂祖宗之烈擇今日請叔父相王即皇帝位朕退守本藩歸於舊邸凡百卿士敬承朕言克贊我天人之休期以光我有唐之勳業布告遐邇咸使聞知皇極大寶天下至公王者臨之蓋非獲巳王先聖舊意蒼生推仰龍光紫宸貴允係望請遵前旨勿或推讓憲睿宗長子本名成器避昭成皇后尊號改焉初封永平郡王文明元年立為皇太子及睿宗降為皇嗣更冊授皇孫出閣開府置官屬長壽二年改封壽春郡王復詔入閣長安中纍轉左贊善大夫加銀青光祿大夫中宗立改封蔡固辭唐隆元年進封宋睿宗踐祚拜左衛大將軍時帝將建儲以憲嫡長而元宗有大功意久不定憲涕泣固辭帝嘉其讓以為雍州牧揚州大都督太子太師進尚書右僕射兼司徒改太子賓客以司徒兼蒲州刺史進司空拜太尉開府儀同三司歷岐州刺史開元四年徙封寧又歷澤涇等刺史兼太常卿復為太尉二十九年薨年六十三帝以憲實推天下有高世之行非大號不稱乃追諡讓皇帝臣聞選賢任職量能授官苟非其才坐貽厥咎臣本愚劣纍忝榮任叨居禮樂之司實乖河海之任吹庭鐘鼓克諧謝於昔人踈署威儀為政慚於往哲僶俯從事於茲六年詩稱素餐於是乎在伏惟開元神武皇帝陛下繼業昭暢仁化清和乘暇奏薰風之琴追賞聚雲和之曲典章斯備雅量攸歸遠美咸英獨冠區宇臣幸膺國戚久亞台陛兼管寺卿實黷朝憲惡盈之戒列在前經過寵之談復開斯日願矜其庸昧授以良能人無異言官無曠位伏使晨趨北闕奉漢幄之龍顏夕赴西園飛魏庭之華蓋則臣之念畢矣聖主之恩深矣不任悚望翹勤之至謹詣朝堂奉表陳謝以聞守禮章懷太子次子始名光仁垂拱初改今名授太子洗馬嗣爵雍王武后革命畏疾宗室守禮以父得罪與睿宗諸子閉處宮中十餘年聖歷元年睿宗自皇嗣封相王許出外邸守禮等始居外改司議郎中中宗立復故封拜光祿卿唐隆元年進封邠王睿宗立檢校左金吾衛大將軍出為幽州刺史遙兼單于大都護遷司空開元初纍為州刺史皆擇僚首持綱紀惟弋獵酣樂未嘗領事後還京師二十九年薨年七十餘贈太尉臣謹按舊典雌來者霸雄來者王又聖誕酉年雞主於酉斯蓋王道遐祚天命休禎請宣付史官以彰靈貺
