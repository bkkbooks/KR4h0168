front:
  text: 全唐文欽定全唐文卷一百十一後唐明宗六
  hash: sha256:8eafee073361366db8fef4097a2b692a1627cd69211fbcb47cccbc73381ea8b5
body:
  text: 朕聞教化之本禮讓為先欲設規程在循典故蓋以中興之始兆庶初安將使知方所以漸誘準儀制令道路街巷賤避貴少避長重避輕去避來有此四事承前每於道途立碑刻字令路人皆得聞見宜令三京諸道州府各遍下管內縣鎮準舊例於道路明置碑雕刻四件事文字兼於要會坊門及諸橋柱刻碑曉諭路人委本縣所繇官司共切巡察有敢犯者科違敕之罪貴在所為易所化宏多既禮教興行則風俗淳厚庶皆順序益致和平凡為食祿無不盡忠既以懸車永期樂道若妨養性豈是優賢況非繫滯之名宜遂逍遙之便宜依諸道奏薦州縣官前銜內有賜紫金魚袋先於長興元年敕州縣官若循常例十六考方得敘緋儻或巳佩金章固難却為令録必若藉其才器則可別任職資文資官結銜內巳有金紫尚不許薦為州縣官其武職銀青階亦宜條理諸道詳文資賜紫例不得奏為州縣官刑法之司朝廷重委是以前王應運必繇獄訟所歸庶物無冤然後陰陽式序豈獨繫於彼相實亦賴於有司冀致和平共期仁壽宜示優崇之道以明奬激之方此後大理寺官員宜同臺省官吏升進其法直官比禮直官任使庶皆知勸咸切奉公如有能雪冤疑則別議超擢苟舞弄文法必舉憲章明懸黜陟之科貴益公忠之懇御史臺每月支錢三百貫充曹司人力紙筆糧課其大理寺先支錢二十貫文與臺中比類全少刑部一司則未曾支給宜於兩班罰錢及三京諸道贓罰錢內每月支錢一百貫文賜兩司其刑部官吏人力不多兼使紙筆較少宜於所賜一貫內三分支與一分大理寺每有詳斷刑獄案牘準律須具引律令格式正文又稱準格詳獄一切取最後敕為定後敕合破前格今後凡有刑獄先引律令格式有無正文然後詳檢後敕須是名目條件同即以後敕定罪敕內無正條即以格文定罪格外又無正條即比附定刑先自後敕為比事實無疑方得定罪或慮律令難明録奏取裁仍當比事平情取法直官不隱法文狀在案本斷官祗據僭狀書法定罪不得輒使文章及有徵引刑部詳覆官法直官亦準此兼自此御史臺大理寺準推斷刑獄之際刑法官及諸朝臣不得以見所推斷人罪名合使條格奏請改易刑法中或有不便於事者任其奏聞餘依李延範所奏凡置營田比召浮客若取編戶實紊常規如有係稅之人宜令却還本縣應諸州府營田務只許耕無主荒田及召浮客此後若敢違越官吏并投名稅戶重加懲斷馳騁畋獵聖人每抑其心奇獸珍禽明王不畜於國朕猥將寡薄虔奉宗祧覽前代之興亡思昔人之取捨所以尋頒明詔遍諭遐方推好生惡殺之仁罷雕鶚鷹鸇之貢一則杜盤遊之漸一則遂飛走之情近日諸色人不稟詔條頻獻鷹隼既不能守茲近敕則何以示彼後人頗為踰違須行止絶其五坊見在鷹隼之類並宜就山林解放此後諸色人等並不得輒將進獻仰閣門使凡有此色貢奉表章不得引進王者以孝理萬邦化敷兆庶每勳賢而按部專行賞以宣風其在懲勸知方統臨得術比屋有可安之俗六親無不和之人劉虔膺曾州縣為官見鄉閭弊事宜加條理免亂彞章宜令諸道長吏嚴行誡約如有違者準法加刑耄年為政蒞事或有昏蒙老成之人安知不可師範宜令銓司此後有全不任待者即別以優散官資注擬凡曰士流州縣盡應饒假詐稱門族長吏豈肯延容應是戶人皆編部籍如或為其家富邀坐公廳顯從賓主之儀頗辱朝廷之任所在必無此事其中或有如斯須重衣冠以敦風俗州縣官或與富百姓同坐交通者隨處糾察使知事若不虛當行嚴斷其妄稱士族者亦議科罪以納言路廣進策人多別出試題蓋防假手韓滔獨隳衆例輒出已懷敢以間詞有違明敕而又情惟自衒事匪合宜朝堂干祿之時尚猶倔強州縣親人之處可任作為便合舉違敕之科加不恭之罪緣當誕月刑法務寬宜殿一選皇王御宇切在推恩臣下盡忠皆思勵節顯祖宗於奕世耀妻子以榮家位有高低事無偏黨方當景運務洽羣心將宏莫大之規宜定維新之制自此在朝臣寮及藩侯郡守據理例合得追贈者新授命後便於所司投狀旋與施行封妻蔭子準格合得者亦施行兼自中興巳來外官曾任朝班據在朝時品秩格例合得封贈敘封未霑恩命者並與施行其敘封妻室品蔭子孫等仍命所司一一具格式申奏其或應得而不與之者罪在所司官吏其餘進為齋郎遇有員闕據資蔭合得先受官者先與收補後受官者據月日依次第施行如或徇私公然越次本人本司官吏當行責罰仍令御史臺常加訪察不得輒有違越庶激為臣為子盡孝盡忠各守公方共裨皇化闕員有限人數常多須以高低定其等級起今後兩使判官罷任後宜一年外與比擬書記支使防禦團練判官二年外與比擬兩使推巡防禦團練推官軍事判官等三年後與比擬仍每遇除授量與改轉官資或職次其有殊常勤績者與議優升若有文學智術超邁羣倫或為衆所稱或良知迥舉察驗的實者不拘年月之限其才器卑低階緣得事者宜量事於州縣中比擬若州縣官中有文學雄奧識量優深亦量才於班行及諸道判官比擬任使況諸選人之內多是勤苦立身每於調集之時皆有等差選限準茲幕吏難使雷同所貴皆免湮沈遞承驅策禮院所奏內外臣僚所衣朱紫服飾不越時宜將健衣裝各立軍號一切仍舊其經商百姓不得著色樣綾羅及紫皂雜色衣服金色帶等宜依守選之輩例是艱貧合格之時漸多衰老更添雜犯轉見憂嗟方當開泰之期宜軫單寒之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏兼貢舉之人辛勤頗甚每年隨計終日食貧須寬奬勸之門俾釋羈棲之歎今年落第舉人所司巳納家狀者次年便赴所司就試並免再取文解兼下納文解之時不在拘以三旬但十月內到者並與收受比置關防津鋪為要禁察姦凶如或縱捨賊徒透漏商稅既虧職分難逭刑章若敢阻滯行人僥求潤已但有發覺並以枉法贓論宜令諸道常切指揮無使違犯教導之本經籍為宗兵革以來庠序多廢縱能傳授罕克精研由是豕亥有差魯魚為弊苟一言致誤則大義全乖儻不討詳漸當紕繆宜令國學集博士儒徒將西京石經本各以所業本經句度抄寫注出子細勘讀然後召雇能雕字匠人各隨部帙刻印板廣頒天下如諸色人要寫經書並須依所印敕本不得更使雜本交錯所貴經書廣布儒教大行前資朝官及諸道節度觀察判官近敕罷任一周年後方許求官其出選門官雖準格例送名未定除官年限自此應出選門官亦宜罷任後周年方許擬議仍本官自於所司投狀磨勘申送中書門下近日纍據御史臺奏陳狀訴屈人據狀內皆是勘責多時却曉示陳狀人送本道依次第論對及州府追到支證本人又不到彼處恐紊規繩須行條理宜令御史臺今後諸色人論訟稱已經州府斷遣後抑屈更不再牒本道勘逐便可據狀施行若未經州府論訴驀越陳狀即須留本人據事理詰勘如實未經本處訴論便可具事由勒本道進奏官差人齎牒監送本處就關連人勘斷後申奏仍不得虛有禁繫諸道節度都護防禦團練等使及刺史到朝廷未有班位定規起今後不帶使相節度使班位可取使相班為例據檢校官高者為上如檢校同即以先授者為上其諸州防禦團練使刺史亦準此仍前資居見任之下李咸雍既是書生合知禮範凡關事理祗可披論尚書省前豈是喧呼之所主司在內何興詬罵之言雖妄指陳實為凶惡苟無懲誡難例輩流宜令御史臺監送本貫重處色役近以遍注石經雕刻印板委國學每經差專知業博士儒徒五六人勘讀并注今更於朝官內別差五人充詳勘官太子賓客馬縞太常丞陳觀祠部員外郎兼太常博士段容太常博士路航屯田員外郎田敏等朕以正經事大不同諸書雖巳委國學差官勘注蓋緣文字極多尚恐偶有差誤馬縞巳下皆是碩儒各專經業更令詳勘貴必精研兼宜委國子監於諸色選人中召能書人謹楷寫出續付匠人雕刻每五百紙與減一選所減等第優與選轉官資凡興舍宇務廣人煙既聞完葺之期式叶綏安之道況京城之內巳有條流縣邑之中可援事例應諸縣有臨街店舍田地宜準敕許人收買依限修蓋其佐官宅基舊屬縣廨宇并寺院伽藍地如人戶巳蓋造屋舍居止不在起移之限便任永遠為主如更別占據空地作園圃及種蒔苗稼仍仰縣司與寺家決定辦得修蓋即許識認春夏之交長育是務眷彼含靈之類方資亭育之功先有條流解放彈鷹隼自此凡羅網射生並諸弋獵之具比至春初並宜止絶如有違犯仰隨處官吏便科違詔之罪起今後每年至於二月初便依此敕曉示中外蓋循舊制重布新規宣諭萬邦永為常式宜令諸道州府據所管州縣先各進圖經一本並須點勘文字無令差誤所有裝寫工價並以州縣雜罰錢充不得配率人戶其間或有古今事迹地里山川地土所宜風俗所尚皆須備載不得漏略限至年終進納其畫圖紙到圖經別敕處分朕大啓四門無遺片善冀有智能之士來陳利害之言是命擢量貴行酬奬須論條件以定等差應進策人等若是選人所進策內一件可行與減兩選兩件減四選三件巳上便依資與官如無選可減及所欠選數則少可行事件則多據等級更優與處分如是諸色舉人貢院自考試本業格式不在進策之限如有智謀宏遠文藝優長或一言可以興邦一事可以濟國是為奇傑難預品量待有獻投旋令擬議龍步馬毛璋陶曹廷隱成景宏等或子或弟本無相及之刑尋示寬恩各免連坐止令州府別係職官而聞收管巳來縻繫之後頗極窮困宜放營生仰逐處開落姓名仍給公憑放逐穩便國計之重軍食為先比防主守之隱欺遂致監臨之鈐轄丁延徽選從禁職委以倉儲蓋藉忠勤特添俸給所宜廉慎以副指揮而敢與專知官田繼勳杜延德副知官趙德遵楊仁祚等相徇私情擅出官物腳夫論告贓狀分明及遣推窮即稱貸借按正律則罪加於凡盜準後敕則名犯於極刑況兩司詳再經議讞定法既當於不濫懲姦斷在於必行又據宰臣所問五條康澄繼陳兩表雖為滯獄且貴盡心但丁延徽所出軍須巳離當處本無文紀豈是公官宜同入已而論難逭滅身之罪宜依兩司詳議斷遣處分其丁延徽田繼勳贓滿二十匹並決重杖一頓處死杜延德巳下各依本罪決杖配流賞元告人絹二十匹諸科舉人常年薦送先令行鄉飲酒之禮凡預舉人列從鄉賦遂奏鹿鳴之什俾騰龍化之津雅音既動於笙簧厚禮復陳於筐筥行茲盛事克振儒風宜令復行鄉飲酒之禮太常草定儀注頒下諸州預前肄習解送舉人之時便行此禮其儀速具聞奏
