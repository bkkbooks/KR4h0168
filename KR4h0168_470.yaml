front:
  text: 全唐文欽定全唐文卷四百七十陸贄十一
  hash: sha256:f578fd9051d9603a716448ba3c85715a9bc6f301935c9c6c74a6364d4c581b4d
body:
  text: 右欽漵奉宣聖旨緣唐安公主喪亡不可向此間遷厝權令造一塔安置待收復京城即擬將歸以禮葬送所造塔役功費用亦甚微小都不合是宰相所論之事姜公輔忽有表奏都無道理但欲指朕過失擬自取名朕本拔擢將為腹心今却如此豈不負朕至深卿宜商量如何穩便者公輔頃在翰林與臣久同職任臣今據理辨直則涉於私黨之嫌希旨順承則違於匡輔之義涉嫌止貽於身患違義實玷於君恩徇身忘君臣之恥也別嫌獎義主之明也臣今不敢冒行所恥亦賴陛下明聖而鑒焉古語有之順旨者愛所由來逆意者惡所從至故人臣皆爭順旨而避逆意非忘家為國捐身成君者誰能犯顏色觸忌諱建一言開一說哉是以哲后興王知其若此求諫如不及納善如轉圜諒直者嘉之訐犯者義之愚淺者恕之狂誕者容之仍慮驕汰之易滋而忠實之不聞也於是置敢諫之鼓植告善之旌懸戒慎之鞀立司過之士猶懼其未也又設官制以言為常由是有史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗尚恐其怠也每歲孟春遒人以木鐸徇於路而振警之官師相規工執藝事以諫其或不恭邦有常刑然非明智不能招直言非聖德不能求過行招直則其智彌大求過則其德彌光唯衰亂之朝暗惑之主則必諱其過行忿其直言以阿諛為納忠以諫爭為揚惡怨讟溢於下國而耳不欲聞腥德達於上天而心不求寤逮乎顛覆猶未知非情之昏迷乃至於是故明者廣納以成德暗者獨用而敗身成敗之途千古相襲與敗同轍者罔不覆與成同軌者罔不昌以陛下日月之明江海之量自當矯夏癸殷辛拒諫飾非之慝協大禹成湯拜言改過之誠矧又時運方屯物情猶鬱乃是陛下握髮吐哺之日宵衣旰食之辰士無賢愚咸宜録用言無大小皆務招延固不可復有忤逆之嫌甘辛之忌也夫君人者以衆智為智以衆心為心恆恐一夫不盡其情一事不得其理孜孜訪納唯善是求豈但從諫不咈而已哉乃至求謗言聽輿誦葑菲不以下體而不採故英華靡遺芻蕘不以賤品而不詢故幽隱必達今公輔官在諫議任居宰衡獻替彌綸乃其職分比於芻蕘葑菲豈不優而且重哉此理之常奚足怪也縱使引喻非當不猶愈於輿誦乎矯激過深不猶愈於謗言乎晉文聽輿人之誦而霸業興虞舜設誹謗之木而帝德廣斯實聖賢之高躅陛下何疾焉聖旨又以造塔役費微小非宰臣所論之事下臣愚戅竊謂不然當問理之是非豈論事之大小若造塔為是役雖大而作之何傷若造塔為非費雖小而言者何罪夫小者大之漸微者著之萌故君子慎初聖人存戒知幾者所貴乎不遠而復制理者必在於未亂之前本立輔臣置之左右朝夕納誨意在防微微而弼之乃其職也涓涓不遏終變桑田焰焰靡除卒燎原野流煽已甚禍災已成雖欲救之固無及矣書曰不矜細行終纍大德易曰小人以小善為無益而不為也以小惡為無傷而不去也故惡積而不可掩罪大而不可解然則小之不可不慎也如此陛下安得使之勿論乎虞書載咎繇之言曰兢兢業業一日二日萬幾兢兢慎也業業危也幾者動之微也唐虞之際主聖臣賢庶績咸熙萬邦已協而猶上下相戒既慎且危慮事之微日至萬數然則微之不可不重也如此陛下又安可忽而勿念乎舜之為君始作漆器㣥臣固爭咸謂非宜漆器之為用也甚堅其為費也蓋寡然猶相繼諷諫者豈不欲杜其漸而慎其初歟是知君臣之間義同一體事罔大小相須而成故舜命其臣曰作朕股肱耳目夫股肱之奉元首不以煩細而闕於運行耳目之助心靈不以么微而廢於視聽是以臣子之於君父也盡其敬而敬焉盡其愛而愛焉敬則願及於尊榮愛則懼陷於過惡萬邦黎獻莫不皆然而況位列朝廷任當輔弼主辱與辱主安與安此而不言誰復言者禮曰近而不諫則尸利也若宰相者可謂近矣事或乖誤得無諫乎武丁賢君也傅說賢相也而武丁引金作礪以命其相說諭木從繩以戒其君是則輔弼之任匡救攸屬巨細之事悉宜盡規陛下所言役費微小非宰相所論之事又謂指朕過失擬自取名此誠異乎愚臣之所聞是以願披肺腸而不敢自默者也若以諫爭為指過則剖心之主不宜見罪於哲王若以諫爭為取名則匪躬之臣不應垂訓于聖典獻替列職竟使奚為左右有人復將焉用臣竊謂指過以示直固不如改過以見稱進諫以取名固不如納諫之為美假有意將指過諫以取名但能聞善而遷見諫不逆則所指者適足以彰陛下莫大之善所取者適足以資陛下無疆之休因而利焉所獲多矣儻或怒其指過而不改則陛下招惡直之譏黜其取名而不容則陛下被違諫之謗是乃掩已過而過彌著損彼名二名益彰果而行之所失大矣一獲一失可不慎乎伏願嘉忤旨之忠袪逆耳之吝平積憤之氣彌逆詐之情然後試以愚言反覆參校庶臻至理且亮微誠謹奏右欽漵奉宣聖旨省卿所奏公輔事宜雖甚知卿盡忠然似未會朕意朕意以公輔才行共宰相都不相當在奉天時早欲停罷後因公輔辭退朕已對面許訖尋屬懷光背叛遂且因循容到山南公輔知朕必擬移改所以固論造塔事賣直取名據此用心豈是良善朕所以惆悵者秪緣如此卿今疑朕不能納諫殊乖本意者臣以戅執務在朴忠推理而言有懷必盡睿意元妙非凡所窺如臣懵昧之材且無希伺之志奏報失旨宜其固然所冀録微欵而矜至愚實天下幸甚古人有言曰明主者可以理奪又曰主聖則臣直今陛下稟天縱之才備聖明之資臣若抱理莫伸守直不固上虧至化罪莫大焉輒復據直道而理其前言惟陛下留意幸察臣竊以領覽萬幾必先虛其心鑑鏡㣥情必先誠其意蓋以心不虛則物或見阻意不誠則人皆可疑阻於物者物亦阻焉疑於人者人亦疑焉萬物阻之兆人疑之將欲感人心致於和平盡物理使無紕繆是猶却行而求及前人也無乃愈疏乎孔子曰不遷怒不億不信豈非懼於肆情逞憾以至于失中違道者哉臣之區區志欲匡輔是以前者奏疏願陛下平積憤之氣彌逆詐之情然後試以愚言反覆參校庶臻至理且亮微誠今陛下以素欲廢罷公輔之心而謂其所行皆非良善則是遷怒而積憤之氣未平也陛下揣公輔知必移改之意而謂其所言皆欲取名則是億不信而逆詐之情未彌也逆詐未彌積憤未平固宜公輔獲戾於蓄疑下臣見尤於乖意謂之至當則或不然夫臣之獻言以助理也君之求諫以弼違也言苟助理何必以人而廢言諫苟弼違何必責意而拒諫若彼言無足用意雖善而奚為諫有可從人雖咎而寧捨古先聖王所以採葑菲詢芻蕘傳謗言用仇怨急於聽納乃至於斯其意無他惟義所在願陛下不以憎嫌而遺其片善不務精察而謂之大明忠言者利於行而咈於情唯計慮至熟乃能無忤幸紆宸鑑更審所宜謹奏右曲環所領一軍悉是朱泚部曲或頃在鳳翔所管或本從河朔同來後因汴宋用兵權抽赴彼應援所以行營將士猶舉幽隴為名今之元凶乃其舊帥岐下則楚琳助亂薊門則朱滔黨姦獨此偏師漂然河上其營幕則寄于他土其家屬則陷于匪人又屬汴路艱虞浚城陷覆糧餉屢絶資裝久殫士卒常情固難安處是宜潰歸舊管否則散適樂郊而曲環撫之悉無離叛孤軍自守亦不苟從處危能安聞難輒赴甚推齊肅纍著功勳近日將帥之中罕有如環之比考其才節絶有過人但緣羇寓多時窮匱轉甚繼陳章奏言及酸辛告急朝廷則力未能救求哀郡府則人莫見憂覽其辭情可為流涕若失於應接則終以危亡良將義徒實在深惜願陛下不以常人遇之不以常事遣之方今勢可相資唯有江左完實恐須密敕韓滉切令贍恤此軍器甲衣糧咸使周足因賜劉洽手詔亦委加意保持若得自存必有成績非艱難無以表特操非英聖不能全異才有功見知人必悅勸臣不勝區區為國獎善拯危之意謹啓事以聞謹奏右欽漵齎蕭復表示臣兼奉宣聖旨朕比緣李懷光凶狂權且就此回避山南既與京畿接近指麾兵馬日望收城今蕭復勸朕令幸江陵表狀之中張皇頗甚朕不會其意昨問從一從一亦甚驚怪不知事由蕭復奏事官李充朕適喚對共語亦似不是純良此人莫是李承昭家子弟否卿宜審看蕭復表中意趣斟酌奏來者臣伏覩其表兼揣其情蓋以遠路傳聞事多失實大臣獻納務且竭誠雖有過當之虞失中之策但宜勿用不足為尤何則駐蹕奉天屯難已甚況又不駐艱危可知蕭復備位樞衡奉使宣慰忽聞變故寧免驚憂梁岷之間窮隘特甚輦挽攸止資奉實難凡在戀主之誠各懷徯后之志是以延賞奉迎於西蜀韓滉望幸於東吳此乃臣子之常情古今之通理蕭復所請亦類於斯事雖非宜意則可恕李充頃任御史臣嘗與之同寮其人是故福建觀察使李椅之男共承昭房從已遠才頗通敏性亦溫恭宗族之中足稱佳器伏願更廣詢訪方驗臣言不誣謹奏右欽漵奉宣聖旨卿所奏蕭復事朕已具悉假使更無別意終是不識事宜今巡行諸道轉恐事多乖失緣孟皡年老今欲除蕭復為福建觀察使便令赴任去就亦應得所卿意以為何如者伏以將相之任所委皆崇中外迭居亦是常理然君臣有禮進退不可以不全理體有宜本末不可以不稱頃盜興都邑駕適郊畿陛下悔征賦之殷繁念黎元之困悴誕降慈旨深示憫傷特遣大臣普詢疾苦本期還報將議優蠲衆情禺禺日望上達今若未終前命遽授遠藩則是膏澤將布而復收渙汗已發而中廢事既失望人何以觀斯乃進退之禮不全本末之宜不稱謂為得所臣實疑之儻慮處事乖方不欲淹留在外則當諭以詔旨促其歸程遠郡巡歷未周但令副介分往待其復命親訪物情革弊垂恩用符德號使務既畢能否益彰徐擇所宜以圖進退庶於事體允得厥中謹奏右欽漵奉宣聖旨近日往往有卑官從山北來皆稱自京城偷路奔赴行在大都此輩多非良善有一邢建論說賊中體勢語最張皇察其事情頗是窺覘今且令留在一處安置如此之類更有數人若不根尋恐有姦計卿宜商量如何穩便者臣伏以任總百揆者與一職之守不同富有萬國者與百揆之體復異蓋尊領其要卑主其詳尊尚恢宏卑務近細是以練核小事糾察微姦此有司之守也維御萬樞選建庶長總綱而衆目咸舉明邇而㣥方自通此大臣之任也愚智兼納洪纖靡遺蓋之如天容之如地垂旒黈纊而黜其聰察匿瑕藏疾而務於包含不示威而人畏之如雷霆不用明而人仰之如日月此天子之德也以卑而僭用尊道則職廢于下以尊而降代卑職則德喪于上職廢則事不舉德喪則人不歸事不舉者弊雖切而患輕人不歸者釁似微而禍重茲道得失所關興亡聖王知宇宙之大不可以耳目周故清其無為之心而觀物之自為也知億兆之多不可以智力勝故一其至誠之意而感人之不誠也異於是者乃以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之姦欺役智彌精失道彌遠故宣尼述陶唐之盛曰惟天為大惟堯則之周詩美文王之德曰不識不知順帝之則是皆覆育萬物渾然大同無好無惡不忌不克之謂也項籍納秦降卒二十萬慮其懷詐復叛一舉而盡坑之其於防虞亦已甚矣漢高豁達大度天下之士至者納用不疑其於備慮可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴衛雄猜而荊軻奮其陰計光武容博厚而馬援輸其欵誠豈不以虛懷待人人亦思附任數御物物終不親情思附則感而悅之雖寇讎化為心膂有矣意不親則懼而阻之雖骨肉結為仇慝有矣臣故曰茲道得失所關興亡伏惟陛下睿哲文思光被四表孝友勤儉行高百王然猶化未大同俗未至理者良以智出庶物有輕待人臣之心思周萬幾有獨馭區㝢之意謀吞衆略有過慎之防明照㣥情有先事之察嚴束百辟有任刑致理之規威制四方有以力勝殘之志由是才能者怨於不任忠藎者憂於見疑著勳業者懼於不容懷反側者迫於攻討馴致離叛搆成禍災兵連於外變起於內歲律未半乘輿再遷國家艱屯古未嘗有以陛下至聖之德而遘茲殷憂之期天其或者欲大啓睿心警小失而崇丕業耳臣謂陛下當奉若天意追咎已然凡所致寇之由悉已詳知其故將革前弊以消㣥疑今承德音尚襲流誤若未悔禍何由彌災臣獲蒙過知又辱下問若務順旨是為欺天庸敢指陳庶裨闕漏往歲初奮師旅四征不庭義烈之徒人思自效捨逆歸欵者繼獻于闕下陳謀諫失者爭詣于禁門陛下能於此時乘軍氣之方雄因人心之願盡輟沐吐哺虛襟坦懷海納風行不疑不滯功者報之義者旌之直者獎之才者任之其或有志而無補於時敢言而不當其理亦必恕其妄作録其善心率皆優容以禮進退如此則海內風靡翕然歸心賢愚咸懷小大畢力蕞爾凶醜曾何足平臣固知久已理安必無奉天之幸矣其所以孕禍胎而索義氣者在乎獨斷宸慮專任睿明降附者意其窺覦輸誠者謂其遊說論官軍撓敗者猜其挾姦毀沮陳凶黨強狡者疑其為賊張皇獻計者防其漏言進諫者憚其宣謗凡此之類悉貽聖憂咸使拘留謂之安置或詰責而置於客省或勞慰而延於紫庭雖呵獎頗異其辭然於圈間一也既杜出入勢同狴牢解釋無期死生莫測守護且峻家私不通一遭縶維動歷年歲想其痛憤何可勝言由是歸化漸稀而上封殆絶矣徇義之心既阻脅從之黨彌堅而貴近之臣往來之使希望風旨詭辭取容唯揣樂聞不憂失實咸言聖謀深遠策略如神小寇孤危滅亡無日陛下急於誅惡皆謂其事信然窮兵竭財坐待乎一人心轉潰寇亂愈滋遂至轂下生戎宮闈不守儻陛下能於此際遽敷大號謝過萬方敘忠良見忌之冤而舉其尤鯁亮者加之厚秩糾阿諛不實之罪而數其極姦妄者處之大刑賞罰既明忠邪畢辨以此臨下誰敢不誠以此懷人何有不服過而能改亂亦遄安臣固知尋復京師必無梁岷之遊矣陛下既闕慎于始又失圖于中收之西隅唯在茲日豈可復使一事紕繆一言過差哉今賊泚未平懷光繼叛都邑城闕猰㺄迭居關輔郊畿豺狼雜處朝廷僻介于遠郡道路緣歷於連山杖策從君其能有幾推心降接猶恐未多稍不禮焉固不來矣若又就加猜刻且復囚拘使反者得辭來者懷懼則天下有心之士安敢復言忠義哉卵胎不傷麟鳳方至魚鱉咸若龜龍乃遊蓋悅近者來遠之資懷小者致大之術也竊料邢建等輩必非助逆之徒假如過有張皇跡涉疑似亦望矜愚惜體屈法裕人並量器能隨事甄貸武者措之於戎伍文者付之於宰司大則授以職員次但優其選序必有須離行在難處親軍則或除諸道一官或委諸使録用就其常分各稍加恩古人有言撫我則后虐我則讎惠澤所及謳歌乃歸流聞四方孰不欣戴昔趙殺鳴犢聖人輟行燕尊郭隗賢士繼往況乎天子所作天下式瞻一言阻物則天下莫不自疑一事恤人則天下莫不同悅固不可以小失為無損而不悔亦不可以小善為無益而不行小猶慎之矧又非小願陛下惟事無大小皆以覆車之轍為戒實宗社無疆之休謹奏右欽漵奉宣聖旨適得渾瑊奏比日尚結贊頻使人計會擬自領兵馬克寸期同收京城緣春來蕃軍多有疾疫近得探報尚結贊等並抽兵退歸不知遠近朕意緣吐蕃士馬強盛又以和好之義自請將兵助國討賊朝夕望其成功今忽抽軍退歸甚失準擬渾瑊李晟等諸軍兵馬並不至絶多若無蕃軍應援深慮被賊衝突卿試料量事勢如何者臣質性孱昧不習兵機但以人情揆之時亦偶有所得自承此旨欣賀實深竊謂蕃戎退歸乃是社稷遐福昨日已附欽漵口奏訖伏恐未盡愚欵尚勞聖憂謹附披陳庶解疑結彼吐蕃者犬羊同類狐鼠為心貪而多防狡而無恥威之不格撫之不懷雖或時有盛衰大抵常為邊患陰詐難御特甚諸夷陛下但舉建中已來近事準之則戎心難知固可明矣頃者方靖中夏未遑外虞因其乞盟遂許結好加恩降禮有欲無違而乃邀求寖多翻覆靡定託因細事嘖有煩言首尾凡歷四年要約竟未堅決立碑才畢復請改移猜矯多端於斯可驗逮至盜驚都邑駕幸郊畿結贊總戎在邊因請將兵赴難陛下推誠允納厚賂招徠逗留持疑竟不時進無濟討除之用但攜將帥之心懷光遽至猖狂頗亦由茲促禍及皇輿再駕移蹕漢中陛下猶望蕃兵以寧內難親倚之情彌厚屈就之事亦多豺狼野心曾不知感翻受朱泚信使意在觀變推移頻與諸軍克寸期至時皆不赴會致令㣥帥進退憂虞欲捨之獨前則慮其懷怨乘躡欲待之合勢則苦其失信稽延既姦且驕曷望成績非唯變態難測且又妨擾實深戎若未歸寇終不滅臣請復為陛下根本其說則人情物理昭然皆可得而察焉向者謀誘蕃兵本是使臣失策陛下急於戡亂嘉彼效誠唯恐後時不暇詳議遽降優詔促令進軍遠近聞之莫不危駭將帥意陛下不見信任且患蕃戎之奪其功士卒恐陛下不恤舊勞而畏蕃戎之專其利賊黨懼蕃戎之勝不死則悉遺之擒百姓畏蕃戎之來有財必盡為所掠是以順於王化者其心不得不怠陷於寇境者其勢不得不堅怠我之師堅寇之衆戎心變詐復未可量以此益兵但招其損耳以此靖國適資其亂耳抑昨蕃戎未退臣又竊有過憂流聞結贊好謀恐其潛蓄姦計儻或幸朝廷播越之際乘賊泚窮蹙之時輕犯近郊若升虛邑耀兵牧馬不却不前外奉國家內通凶逆兩持誘脅之勢俱納贈遺之資旁觀戰爭坐乘衰弊如此則王師不得伐叛蒸黎不得寧居賊必耗亡我亦困竭京甸所有勢無孑遺千里邱墟得將安用是乃戎有萬全之利我有不測之危臣所以痛心傷神晝驚夕惕者慮其意及於此也所賴天奪其魄神降之災覩機若暝遘厲自遁實昊穹悔禍之應列聖垂祐之期廓清妖氛慶必非遠何以知其然也自賊泚之亂始於暴兵因徵役之繁興乘衛禁之闕備誘扇㣥慝遂謀大姦逆天僭君躬肆攻逼凡有血氣皆知惋嗟矧伊忠良孰不痛憤獨惡無與何能久存加以聖德日新改過不吝布革弊之詔宏恤隱之懷天下黎元翕然遷善易心改觀厭亂思安和風既揚昏祲自斂蠢茲狂悖久合殲夷頃屬懷光昏迷緩師養寇吐蕃干撓生事惑人故使義士無施厲階猶梗今懷光別保蒲絳吐蕃遠避封疆形勢既分腹背無患瑊晟諸帥才力得伸又各士馬非多資糧向竭若不降賊即須建功此輩寵任已崇貴位已極建功則寵增而位固降賊則名辱而身危況賊之凶愚滅亡可必賊之孤劣翦撲非難孰肯捨固而就危違寵而從辱棄垂成之業臣將滅之虜哉既牽於利害之情理不同惡又迫於單乏之急勢難久居勢理相驅安能無戰渾瑊統戴休顏韓遊王褱乘其西北李晟率駱元光尚可孤攻其東南同病相資自當合力但願陛下慎於撫接以奮起忠勇之心勤於砥礪以昭蘇遠近之望中興大業旬月可期不宜尚眷眷於犬羊之㣥以失將士之情也臣愚不任懇悃之至輒以私懷忖度謹冒昧以聞謹奏
