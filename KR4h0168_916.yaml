front:
  text: 全唐文欽定全唐文卷九百十六覃素天寶中宣化寺沙門
  hash: sha256:fd9594f014b1a35fa8180f04e248c39eacf15fd04f3d14d7c4fa0db43c867568
  markers:
  - {type: head, offset: 13, content: 覃素, id: KR4h0168_NFKB_916-h1, level: 1}
body:
  text: 上闕之寶幢者粵若故尼大德諱元真俗本姓李長安人也闕改四分毗尼每至朗月長宵闕二字大悲之祕旨洎永泰元年闕自一居花宮闕一字餘載精究闕四字住持遐邇欽風士庶闕月十一日示滅於宣化寺之精闕三字六十二僧夏册二即闕寂早嵗聯師情深水乳結菩提勝侶嗟存歿而俄乖弟子闕曰上闕子燈不絶兮傳祕旨悲法舟兮沈逝水建茲幢兮播芳美思莊天寶中大溫國寺主昔吾師因地求真衆魔紛嬈果到成佛龍天捧圍自作鎮靈山法躬靡易告滅雙樹示迹倫凡微言不傳慧燭潛照屆夫嵗邁千秋時淹五濁欲海騰沸邪山紛糾於是釋防東逝爰稱兆應漢夢西通方崇像法或青眸接軫競扇元風或白足相趨爭開佛日至欲繼前賢之令軌為後進之康衢燭照重昏慈舟苦派人能宏道斯之謂歟法師諱懷惲俗張姓南陽人也遠祖因宦播遷京兆草一代祖安晉丞相襲爵鴻臚公高祖融守黃門郎遷太子庶子祖英唐解褐太常太祝襲爵天平公尋轉吳王祭酒握蘭奏位清陪雅列法師聰敏為其性相慈善資其風骨母常山夫人樂姓降胎之月不味羶腥載誕之辰情欣禁戒暨年登丱嵗特異諸童或焚葉為香或聚沙為塔雖飛軒繡轂未嘗留步月宇香樓怡然忘返高宗天皇大帝乘乾撫運出震披圖虛己求賢明揚待士總章元載夢覩法師倏降綸言遠令虔辟於是臨丹檻邇青蒲廣獻真誠特蒙褒讚帝乃親授朱紱令處鳳池之榮師乃固請緇衣願託鸚林之地奉敕於西明剃落善來忽唱惡業疑銷既挂三衣俄陪四衆翹勤遽積思五分而非遙精苦逾深想三祗而未遠時有親證三昧大德善導闍梨慈樹森疏悲花照灼情袪多漏擁藤井於蓮臺睿化無涯驅鐵圍於寶國既聞盛烈雅締師資祈解脫規發菩提願一承妙旨十有餘齡祕偈真乘親蒙付屬自惟薄祐師資早喪想遺烈而崩心顧餘恩而雨面爰思宅兆式建墳塋遂於鳳城南神和原崇靈塔禮也其地前終峯之南鎮後帝城之北里歌鐘沸出移上界於陰門泉流激灑背連河於陽面仍於塔側廣搆伽藍莫不堂殿崢嶸遠模忉利樓臺岌嶪直寫祇園神木靈草淩嵗寒而獨秀葉暗花明逾嚴霜而靡悴豈直風高氣爽聲聞進道之場故亦臨水面山菩薩全真之地又於寺院造大窣堵坡塔周回二百步直上一十三級或瞻星揆務或候日裁規得天帝之芳蹤有龍王之祕迹重重佛事窮鷲嶺之分身種種莊嚴盡崑邱之異寶但以至誠多感能事冥資故能遠降宸衷令賫舍利計千餘粒加以七珍函笥隨此勝緣百寶幡花令興供養則天大聖皇后承九元之眷命躡三聖之休期猶尚志想金園情欣勝躅或頻臨淨剎傾海國之名珍或屢訪炎涼捨河宮之祕寶法師誡盈而散並入擅航法師業行高遠利益繁多故得名振九重芳盈四部奉永昌元年敕徵法師為寺主於是綱紀僧徒規模釋族緇門濟濟戒德峻而彌堅紺宇詵詵常住豐而更實猶是才稱物寶道為時尊知與不知仰醍醐於句偈識與不識詢法乳於波瀾法師以慈誘內懷敷揚外積冀傳聖旨用酬來望每講觀經賢護彌陀等經每數十遍夫我域者扇激風火嬰抱結漏系諸生滅止無常之短期研乎事真攀不亟之虛眹若不乘佛願力託質淨方則恐淪溺長往清升永隔於是言論之際懇勸時衆四儀之中一心專念阿彌陀佛願乘此勝因祈生淨域又以般若神呪能令速證菩提彌陀佛名亦望橫超惡趣諸餘妙典雖並積心臺於此勝緣頗遍遊智府嘗誦大般若呪向盈四萬又誦彌陀真偈十萬餘遍理復使精真厥想念雖微而必就二三於行功唐捐而靡得豈直諸佛現前神人捧錫而已矣師為諸重擔攝爾㣥生舉洪灼於耶山掉寶航於見海悲夫娑婆國中人多弊惡雖復珍臺寶界因勝侶而歸心至欲逸翥遐征藉良緣而克進敢憑此義爰發誠心於是廣勸有緣奉為九重萬乘四生六趣造淨土堂一所莫不虬棟淩虛虹梁架迥丹楹赩日青瑣延風無春而返井舒花不暝而重簷積霧於是神螭戾止遠鎮瓊階寶鳳來儀還陪桂戶雕甍畫栱之異窮造化之規模圓璫方鏡之奇極人天之巧妙又於堂內造阿彌陀佛及觀音勢至又造織成像並餘功德相好奇特顏容湛粹山豪演妙若照三千海目摛華如觀百億或因繒命采有慈氏之全身或散札馳芳得憂填之逸思何獨如來自在疑降上界之魔故亦菩薩熙怡似救下方之苦夫以宅生者心心榮則生喪栖神者志志擾則神亡然菩薩以濟物捐軀上善以遺形徇節法師情存拯救式奉殷繁汲引雖曰忘懷形質焉能靡纍於是忽嬰風瘵病與時侵靈藥勿痊器俄逝豈夫八林齊白我佛稱於寂滅梁木其壞吾師等於死生以大足元年十月草二日神遷春秋六十有二臨終之際正念無虧顏色怡悅似有瞻矚北首面西奄然而化悲夫烈烈嵗陰蒼蒼天色乾兮何負殲我惟良業也何孤喪茲賢哲豈直悲盈四部嗟鹿苑之荒涼抑亦哀悼兩宮痛蜂臺之間寂猶是俯回天眷載紆仙豪遠降恩波爰加制贈奉神龍元年敕實際寺主懷惲示居三界遠離六塵等心境於虛空混榮枯於物我棟梁紺宇領袖緇徒包杖錫之規模躡乘柸之懿躅雖已歸寂滅無待於褒揚然寵洽友于無忘於縟禮可贈隆闡大法師主者施行上人以至德聿修良因纍著故得天降成烈用讚芳規追遠慎終生榮死贈足可光輝淨剎歷塵芥而長存旌賁元門共河山而永久弟子大溫國寺主思莊等並攀號積慮哀慕居懷嗟覆護而無時仰音顏而靡日猶恐居諸易遠淑善湮沈敬想清山微勒茲元琬詞曰娑婆種覺賢劫能人三祇殄妄五分祈真即相離相非身是身猶施慧筏廣濟迷津其一十方化備雙林滅度三界空虛四生哀慕正教既隱微言遽斁式啓先哲用資後悟其二芳猷廣被至烈彌殷青眸演聖白足成真遠導芻芥遐宣墨塵元門不絶代有其人其三猗歟令德遠嗣前英聲高四部譽重三明慈周有識智契無生法雲葉落道樹滋榮其四豈圖宿殃師資遽亡乾兮何負殲我惟良徒嗟授几空念傳香非夫勝緣孰答恩光其五邈矣坰野慈顏壙側敬發誠心爰憑淨域真容湛粹樓臺巋嶷希此善根遠酬明德其六吉藏族姓安氏其先安息人祖世避仇移居南海後遷金陵七嵗出家隋開皇末詔住慧日寺唐初敕住延興寺武德六年卒年七十五藏年高病積德薄人微曲蒙神散尋得除愈但風氣暴增命在旦夕悲戀之至遺表奉辭伏願久住世間緝寧家國慈濟四生興隆三寶神會俗姓高氏襄陽人幼投本郡國昌寺依皓元禪師出家開元八年敕住南陽龍興寺天寶二年敕住荊州開元寺肅宗朝敕入內供養又敕住西京河澤寺上元元年卒年九十二無念為宗無作為本真空為體妙有為用夫真如無念非想念而能知實實相無生豈色心而能見無念念者即念真如無生生者即生實相無住而住常住涅槃無行而行即超彼岸如如不動動用無窮念念無求求本無念菩提無得淨五眼而了三身般若無知運六通而宏四智是知即定無定即慧無慧即行無行性等虛空體同法界六度自茲圓滿道品於是無虧是知我法體空有無雙泯心本無作道常無念無念無思無求無得不彼不此不去不來體悟三明心通八戒功成十力富有七珍入不二門獲一乘理妙中之妙即妙法身天中之天乃金剛慧湛然常寂應用無方用而常空空而常用用而不有即是真空空而不無便成妙有妙有即摩訶般若真空即清淨涅槃般若是涅槃之因涅槃是般若之果般若無見能見涅槃無生能生般若涅槃若名異體同隨義立名故云法無定相涅槃能生般若即名真佛法身般若能建涅槃故號如來知見知即知心空寂見即見性無生知見分明不一不異故能動寂常妙理事皆如如即處處能通達即理事無礙六根不染即定慧之功六識不生即如如之力心如境謝境滅心空心境雙亡體用不異真如性淨慧鑒無窮如水分千月能見聞覺知見聞覺知而常空寂空即無相寂即無生不被善惡所拘不被靜亂所攝不厭生死不樂涅槃無不能無有不能有行住坐臥心不動搖一切時中獲無所得三世諸佛教旨如斯即菩薩慈悲遞相傳受自世尊滅後西天二十八祖共傳無住之心同説如來知見至於達摩屆此為初遞代相承於今不絶所傳祕教要藉得人如王髻珠終不妄與福德智慧二種莊嚴行解相應方能建立衣為法信法是衣宗唯指衣法相傳更無別法內傳心印印契本心外傳袈裟將表宗旨非衣不傳於法非法不受於衣衣是法信之衣法是無生之法無生即無虛妄乃是空寂之心知空寂而了法身了法身而真解脫不空梵名阿目佉跋折羅北天竺婆羅門族幼隨季父至東土年十五師事金剛智三藏後附崑崙舶至師子國天寶五載齎密藏還京師賜號智藏歷元宗肅宗代宗三朝皆為灌頂國師永泰元年詔特進鴻臚卿加號大廣智三藏九年敕加開府儀同三司封肅國公是年卒敕贈司空諡大辨正廣智三藏和尚爰自幼年承事先師大宏三教和尚二十有四載稟授瑜伽法門後遊五天尋求所未授者外諸經論更重學習凡得梵本瑜伽真言經論五百餘部奉為國家詳譯聖言廣崇福祐天寶五載却至上都奉元宗皇帝恩命於宮內建立灌頂道場所齎梵經盡許翻譯及肅宗皇帝配天繼聖特奉綸音於內道場建立護摩及灌頂法又為國譯經助宣皇化其所譯金剛灌頂瑜伽法門是成佛速邪之路其修行者必能頓超凡境達於彼岸餘部真言諸佛方便其徒不一所譯諸大乘經典皆是上資邦國息滅災厄星辰不愆風雨順序仰恃佛力輔成國家謹纘集前後所翻譯自開元至今凡一百一卷七部以聞皇帝以深仁馭宇大明燭物暜灑甘露沃蕩黎元不空叨沐聖慈濫當翻譯當奉恩命令集上都義學沙門良賁等一十六人於內道場翻仁王護國般若及大乘密嚴等經畢願讚揚於至覺冀介福於聖躬竊見大聖文殊師利菩薩讚佛法身經據真梵本有四十禮先道所行但惟有十禮於文不備歡德未圓恐聖者懇誠又闕㣥生勝利不空先有所持梵本並皆具足今譯流傳庶裨宏益其餘懺悔儀軌等並如舊本此不復云於時唐永泰元年維夏四月也大唐開元二十一年嵗次癸酉正月一日辰時於薦福寺道場內金剛三藏與僧慧超授大乘瑜伽金剛五頂五智尊千臂千手千鉢千佛釋迦曼殊室利菩薩祕密菩提三摩地法教遂於過後受持法已不離三藏奉事經於八載後至開元二十八年嵗次庚辰四月十五日聞奏開元聖上皇於薦福寺御道場內至五月五日奉詔譯經卯時焚燒香火起首翻譯三藏演梵本慧超筆授大乘瑜伽千臂千鉢曼殊室利經法教後到十二月十五日翻譯將訖至天寶一年二月十九日金剛三藏將此經梵本及五天竺阿闍黎書並總分付與梵僧目叉難陀娑伽令送此經梵本並書將與五印度南天竺師子國本師寶覺阿闍黎經今不回後於唐大歷九年十月於大興善寺大師大廣智三藏和尚邊更重咨啓決擇大教瑜伽心地祕密法門後則將千鉢曼殊經本至唐建中元年四月十五日到五臺山乾元菩提寺遂將舊翻譯唐言漢音經本在寺至五月五日沙門慧超起首再録寫出一切如來大教王經瑜伽祕密金剛三摩地三密聖教法門述經祕義諸佛出世應物隨形志求者智鏡元通念之者無幽不入根緣感赴必藉此經登菩提山除去邪執契傳二密得究瑜伽祕要法門窮理微妙身口意業用智修持戒定慧學顯現通達證如來地以信為首乘般若舟速超彼岸今述曼殊之德靈迹殑伽聖覺無方神力潛運以多塵劫悲願不住菩提一主無二尊見為菩薩自茲金色世界來其忍土之中於清涼之山導引㣥品而即現燈現雲及萬菩薩信生奇特現光現相人身皆發正智為因利益三世蒼生有趣願到菩提次略舉經都題序目大乘瑜伽金剛性海總攝一切法金剛五頂五智尊現大聖曼殊室利菩薩顯千臂千手千鉢化千釋迦灌頂曼荼羅一切諸佛修證如來金剛菩提具足一切法入毗盧遮那五金剛界聖智圓通入如來佛心三密三十支金剛智鏡聖道性海故飛錫天寶初遊京師住終南紫閣峯草堂寺復住大聖千福寺永泰元年詔於大明宮內道場同義學沙門良賁等十六人譯經充證義潭碧千丈無隱月容松青萬嶺莫靜風響夫德充於內而聲聞於天者有以見之於禪師矣禪師法諱楚金程氏之子本廣平郡今為京兆之盩厔人焉祖宗閥閲存而不論母渤海高氏夜夢諸佛是生禪師真可謂法王之子者也行素顏玉神和氣清七嵗諷花經十八講花義三十構多寶於千福四十入帝夢於九重上覩法名下見金字詰朝使問罔不有孚聲沸江海豈惟京轂於是傾玉帛引金繩千梁攢空一塔聳漢回廊飛閣無不創焉風起而鈴鳴半天珠懸而月生絶頂清淨眼耳駿奔香花度如恆沙而無所度者有之矣嘗於翠微悟真捫蘿露趾乃曰此吾棲遁之所遂奏兩寺各建一塔咸以多寶為名度緇衣在白雲昭其靜也矧夫心同琉璃思出常境工人梓匠僉訝生知毗首所未悟班輸所吅丂一視若然則浮圖之化髻珠之教風靡千界皆禪師之力豈止金丹五天而已哉禪師雲雷發空谷之響金石吐鏗鏘之音吟詠妙經六千餘篇寶樹之下髣佛見於分身靈山之上依稀覿於三變心無所得舌流甘露瑞鳥金碧棲於手中天樂清泠奏於空際凡諸休應皆不有之乃曰法本無名焉用彼相長而不宰其在茲焉若非法華三昧稟自衡陽止觀一門傳乎台嶺安能迂象王之法駕回聖主之宸眷承明三入宏道六宮后長跪於御筵天花每散而不著元宗題額肅宗賜幡鵲返雲中住香樓而不下龍蟠天上挂金剎而常飛玉衣盈箱璽書滿篋寫千經滴瀝而垂露答萬乘渙汗之渥澤夔龍貂冕下黃道而整襟隱逸高僧入青蓮而扣寂微塵知識如從百城而至無邊勝士若自千華而來豈榮冠於一時亦庶幾於佛在也雖林茂鳥歸人高物向澄渟天地之境委曲虛空之姿無來乃來不往而往所作巳訖吾將去乎有夢綵座前迎諸天獻果粵以乾元二年七月七日子時右脅薪盡火滅雪顏如在昭乎上生於安養之國矣享齡六十二法臘三十七天子憫焉中使弔焉尋敕驃騎大將軍朱光暉監護即以其年八月十二日法葬於長安城西龍道原法華蘭若塔之闕禮也於戲禪師齡年詔度初配龍興中嵗觀心閉關千福罷玉柄葆天光悟炎宅清涼駕一乘獨運乃夢塔從地涌因用模焉今之所製抑有由矣至若神光熠耀於其顛聖燈明滅於其下畫暜賢則舍利飛筆繪㣥釋乃卿雲淡空頂中之血刺寫經王衣裏之珠指呈醉士當其無有其用不立心境同乎大通彼五色之相宣我摩尼之何有豁如也縑纊皮革多由損生屬徒衣布寒加艾納慈至也若乃降龍之鉢解虎之杖蓮花之衣甘露之飯凡諸法物率多敕賜不住於相咸將施焉室不貯於金錢堂每流乎香積淡然間住為天人師允所謂利見於大雄釋門之亞聖者也又曰吾自知終於六十有二矣爾曹志之以其言驗其實宛如也噫八部增怛萬國同哀有詔令茶毗遵天竺故事於是金棺閉香木燒玉兔馴白鶴唳霧咽松檟風凄郊坰月飛青天無照元夜法花弟子當院比邱慧空法岸浩然等表妹萬善寺上座契元萬善寺建多寶塔比邱尼正覺資敬寺建法華塔比邱尼奔叱利等真白凡數萬人悲化城之不住痛寶所而長往貝葉翻手孰指宗通金磬發林誰宣了義以豫分座御榻同習天台爰託斯文鏤之真石式揚真古敢不銘云天上雲飄海中日出如何落照大明奄失蓮花之外別有蓮花寥廓之表又逢寥廓法離去來道無今昨松門一塔兮誰為寂寞寂而常照死而不亡其響彌高兮其德彌彰白鶴雙雙飛香郁郁明月既出更無星宿大歷十年嵗次乙卯五月草九日律師薨於長安真化寺之本院律師法諱如願俗姓李氏隴西人也申公之裔簪裾之盛真豈寶乎律師天生道牙自然神秀十一詔度二十具圓彌沙塞律其所務也分㲲之義不殊折金之理斯在律師僅登十臘聲實兩高邀臨香壇辭不見允望之儼然即之溫然其慧也月照千潭其操也松寒萬嶺乃曰威儀三千吾鏡之矣度門八萬復焉在哉遂習以羅浮雙峯無生之觀位居元匠矣我皇帝纂聖君臨千佛付囑貴獨孤氏葛覃蘊德十亂匡時受道紫宸登壇黃屋因賜律師紫袈裟一副前後所錫錦綺繒帛凡數千匹以旌其高璨乎盈庭了無是相道何深也由此敕書壘篋人使相望御馬每下於雲霄天花屢點於玉砌締構多寶塔繕寫蓮華經環廊繚絙金剎熠耀額題御札光赫宇宙皆吾君之特建亦貴之為國宏哉噫律師擲鉢他方應遽還於靜室散花上境何便住於香天顏貌如生若在深定曲肱右脅湛然已滅春秋七十六法夏五十六具以上聞皇情憫焉中使臨弔賻贈之禮有加常等律師纍聖欽若三都取則意淡江海心間虛空而今而後恐難繼美於戲六宮誰授其髻寶八部孰示於衣珠覺路醒而却迷人花茂而還落哀哉弟子長樂公主與當院嗣法門人登壇十大德尼常真敕賜弟子證道政定證果寺大德凝照惠照凝寂悟真資敬寺上座洪演寺主孝因律師真一遠塵法雲寺律師遍照等凡數千人則懿戚相門愛道花色而為上首忽喪宗匠如覩鶴林即以其年七月十八日奉敕法葬於長安城南畢原塔之闕一字禮也素幡悽於道路丹旐慘於郊扃式揚國師敢為銘曰紫袈裟者彼何人已了如來清淨身登壇不向明光殿去去應超生死津慧靈莊嚴寺沙門大中七年賜紫敕補新寺上座後預代宗永泰中參談證義年百餘嵗我皇帝聖德廣運仁育㣥品亦既纂歷吹大法螺利梵言之輕重警迷途之耳目偉矣哉乃大興善寺大廣智三藏不空與義學沙門良賁等一十四人開府魚朝恩翰林學士常袞等去嵗夏四月於南桃園再譯斯經至秋九月詔資聖西明兩寺各五十人百座敷闡下紫微而千官作禮經出內而萬姓觀瞻遂感慶雲呈瑞嘉氣浮空左右兩階威儀整肅幡華前引音樂後隨內外咸歡京城共喜阡郭充滿猶墻堵焉稽緇衣覽青史自摩騰入漢僧會遊吳瑞法西來莫茲並矣經云若未來世有諸國王建立正法護三寶者我令五方菩薩往護其國令無災難又云五菩薩自於佛前發宏誓言我有陀羅尼能加持擁護是一切佛本所修行速疾之門若人得聞一經於耳所有罪障悉皆消滅况復誦習而令通利佛即讚言若有誦時此陀羅尼者我乃十方諸佛悉常擁護諸惡鬼神敬之如佛不久當得阿耨菩提則知此陀羅尼諸字母之根底衆瑜伽之藪澤茲實祕藏真詮者矣是以菩薩演之王者建之黎人念之諸佛讚之俾其福而廣俾其利而大於斯傳者可以見聖人之心也其功既妙利益隆深克念應時殊祥必降我三藏譯貝多之文命良賁法師受從素觀行印持其道場念誦儀修為五門第以位次一一昭著庶無懵焉凡我道俗將保厥躬同崇出世之因共踐菩提之路登仁壽域者何莫由斯之道矣良賁俗姓郭氏河中虞鄉人京師安國寺沙門永泰中敕令撰仁王護國經疏大歷十二年卒學孤先哲有玷清流叨接翻傳謬膺筆受幸揚天闢親奉德音令於大明宮南桃園修疏贊演宸光曲照不容避席窮元珠於貝葉俱益慚惶捧白璧於丹墀寧勝報斆仰酬皇澤俯課忠勤既竭愚誠庶昭元造賁勤勤筆削三卷克成奏乞流行復上箋疏今年二月二十一日恩命令在內園修撰經疏微僧寡學懼不稱旨洗心滌慮扣寂求音發明起自於天言加被仰憑於佛力咸約經論演暢真宗亦猶集㣥玉於崑山納大川於溟海火生於木與兩曜而俱明識轉於如體一相而等照成道者法也載法者經也釋經者疏也廣度㣥有同於大通是菩提心如陛下意所撰經疏繕寫畢功文過萬言部有三卷施行竊慚於愚見裁成冀答於聖恩並念誦儀軌一卷承明殿講密嚴經對御記一卷同進上輕塵元覽祇畏無任辨才俗姓李氏襄陽人七嵗依峴山寂禪師受經法年十六出家本郡寺復就荊州玉泉寺納具就長安安國寺懷威律師報恩寺義頒律師請業至德初宰臣杜鴻漸奏住龍興寺加朔方管內教授大德大歷三年詔充章信寺大歷十三年卒年五十六諡能覺仍賜紫咄哉此身爾生何為資之以食覆之以衣處身以室病之以醫百事將養一時不虧殊不知恩反生怨違四大互惱五臟相欺此身無常一息別離此身不淨九孔常垂百千癰疽一片薄皮此身可惡無貪惜之當使此身依法修持三種淨觀十六思維一行不退安養西歸咸無上智是為心師昔真大歷中林野沙門粵惟尊勝者佛也陀羅尼者法也敬知佛法高妙最勝最尊四生不測其源三天罔觀其相勝妙無極將喻佛頂也如來為善住天主所説滅七返之深殃朽骨蒙霑息三塗之苦壽自我法王韜逝滅迹金河後有天竺梵僧佛陀波利是應真菩薩傳教東來至永淳二年重屆唐國聞奏大帝天下流傳標幢相於長衢操銀鈎於金偈拂塵影者滅罪恆沙况乎受持鐫題書寫大矣哉衆法之王妙矣哉人天敬仰厥有信士黎城縣尉曹公委佛法不思議焉遂刻記妙幢茲亡女之靈矣惟亡尼惠寂宿承靜命童真出家學戒闕乂未蒙進具稟靈梵網從政法王持誦維摩法華以為遊神之菀也後廣德二年十一月忽為北狄浸淩南奔雲騎朱旗闕電玉劍如霜揮霍目前潛身無暇惠寂因恐墜井歿焉臻嘗收焚灰散諸寺嗚呼喪我法寶落我眼光痛割吾心傷汝非命至大歷六年十月十四日招魂想念建幢於縣西北堯山鄉遷座於六井古社壇之東左臨大路敬崇畢矣其狀也玉柱楞層聳湧青蓮之上金鈴晃曜璨垂化塔之傍內雕寶像之容外刻陀羅之呪平座鎮勢雄之地峯珠輝大梵之天嗟乎逝川有舟夫何往而不敏其詞曰妙哉佛頂雄乎大聖夜壑明燈昏途寶鏡逝者乘兮靈光所壽生兮清淨入佛剎歸真境黯玉質兮無形悲寶幢兮有詠乘如大歷中河南登封縣安國寺沙門伏奉十月十三日恩命於河南府登封縣嵩嶽闕三字常建戒壇兼抽闕一字律七僧灑掃謹律者湛恩自天袒荷無地沙門乘如誠歡誠喜載欣載躍嵩者闕二字之闕一字戒者萬行之首非闕二字岑闕二字詣茲希闕一字會善戒壇闕四字登其封闕一字遺塵闕二字其受必闕三字比為碩德闕五字毀觀者興黍離之歎闕二字者增涕殞之悲陛下駐佛日之傾布堯雲之澤抽僧灑掃設壇講律雷音永震更呼萬嵗之闕一字聖壽無疆彌極九天之峻不任載荷之至謹詣右銀臺門奉表陳謝以聞沙門乘如誠歡誠喜謹言景淨建中時大秦寺沙門奧若常然真寂先先而無元窅然靈虛後後而妙有總元樞而造化妙衆聖以元尊者其唯我三一妙身元元真主阿羅訶歟判十字以定四方鼓元風而生二氣暗空易而天地開日月運而晝夜作匠成萬物然立初人別賜良和令鎮化海渾元之性虛而不盈素蕩之心本無希嗜洎乎娑殫施妄鈿鉓純精間平大於此是之中隟冥同於彼非之內是以三百六十五種肩隨結轍競織法羅或指物以託宗或空有以淪二或禱祀以邀福或伐善以矯人智慮營營思情役役茫然無得煎迫轉燒積昧亡途久迷休復於是我三一分身景尊彌陀訶戢隱真威同人出代神天宣慶室女誕聖於大秦景宿告祥波斯覩耀以來貢圓草四聖有説之舊法理家國於大猷設三一淨風無言之新教陶良用於正信制八境之度鍊塵成真啓三常之門開生滅死懸景日以破暗府魔妄於是乎悉摧棹慈航以登明宮含靈於是乎既濟能事斯畢亭午升真經留草七部張元化以發靈關法浴水風滌浮華而潔虛白印持闕一字字融四照以合無抅擊木震仁惠之音東禮趣生榮之路存鬚所以有外行削頂所以無內情不畜臧獲均貴賤於人不聚貨財亦罄遺於我齋以伏識而成戒以靜慎為固七時禮讚大庇存亡七日一薦洗心反素真常之道妙而難名功用昭彰強稱景教惟道非聖不宏聖非道不大道聖符契天下文明太宗文皇帝光華啓運明聖臨人大秦國有上德曰阿羅本占青雲而載真經望風律以馳艱險貞觀九祀至於長安帝使宰臣房公元齡總仗西郊賓迎入內翻經書殿問道禁闈深知正真特令傳授貞觀十有二年秋七月詔曰道無常名聖無常體隨方設教密濟㣥生大秦國大德阿羅本遠將經像來獻上京詳其教旨元妙無為觀其元宗生成立委詞無繁説理有忘筌濟物利人宜行天下所司即於京義寧坊造大秦寺一所度僧草一人宗周德喪青駕西升巨唐道光景風東扇旋令有司將帝寫真轉模寺壁天姿汛彩英朗景門聖迹騰祥永輝法界案西域圖記及漢魏史策大秦國南統珊瑚之海北極衆寶之山西望仙境花林東接長風弱水其土出火浣布返魂香明月珠夜光璧俗無寇盜人有樂康法非景不行主非德不立土宇廣濶文物昌明高宗皇帝克恭纘祖潤色真宗而於諸州各置景寺仍崇阿羅本為鎮國大法主法流十道國富元休寺滿百城家殷景福聖歷年釋子用壯騰口於東周先天末下士大笑訕謗於西鎬有若僧首羅含大德及烈並金方貴緒物外高僧共振元綱俱維絶紐元宗至道皇帝令寧國等五王親臨福宇建立壇場法棟暫橈而更崇道石時傾而復正天寶初令大將軍高力士送五聖寫真寺內安置賜絹百匹奉慶睿圖龍髯雖遠弓劍可攀日角舒光天顏咫尺三載大秦國有僧佶和瞻星向化望日朝尊詔僧羅含僧暜論等一七人與大德佶和於興慶宮修功德於是天題寺榜額載龍書寶裝璀翠灼爍丹霞睿札宏空騰淩皎日寵賚比南山峻極沛澤與東海齊深道無不可所可可名聖無不作所作可述肅宗文明皇帝於靈武等五郡重立景寺元善資而福祚開大慶臨而皇業建代宗文武皇帝恢張聖運從事無為每於降誕之辰錫天香以告成功頌御饌以光景衆且乾以美利故能廣生聖以體元故能亭毒我我建中聖神文武皇帝披八政以黜陟幽明闡九疇以維新景命化通元理祝無愧心至於方大而虛專靜而恕廣慈救衆苦善貸被㣥生者我修行之大猷汲引之階漸也若使風雨順天下靜人能理物能清存能昌歿能樂念生響應情發目誠者我景力能事之功用也大施主金紫光祿大夫同朔方節度副使試殿中監賜紫袈裟僧伊斯和而好惠聞道勤行遠自王舍之城聿來中夏術高三代藝博十全始效節於丹庭乃策名於玉帳中書令汾陽郡王郭公子儀初總戎於朔方也肅宗俾之從邁雖見親於臥內不自異於行間為公爪牙作軍耳目能散祿賜不積於家獻臨恩之頗黎布辭憩之金罒炎刀或仍其舊寺或重廣法堂崇飾廊宇如翬斯飛更效景門依仁施利每嵗集四寺僧徒虔事精供備諸五旬餧者來而飯之寒者來而衣之病者療而起之死者葬而安之清節達娑未聞斯美白衣景士今見其人願列洪碑以揚休烈詞曰真主元元湛寂常然權輿匠化起地立天分身出代救度無邊日升暗滅咸證真元赫赫文皇道冠前王乘時撥亂乾廓坤張明明景教言歸我唐翻經建寺存歿舟航百福偕作萬邦之康高宗纂祖更築精宇和宮敞朗遍滿中土真道宣明式封法主人有樂康物無災苦元宗啓聖克修真正御榜揚輝天書蔚映皇圖璀璨率土高敬庶績咸熙人賴其慶肅宗來復天威引駕聖日舒晶祥風掃夜祚歸王室袚氛永謝止沸定塵造我區夏代宗孝義德合天地開貸生成物資美利香以報功仁以作施暘谷來威月窟畢萃建中統極聿修明德武肅四溟文清皇域燭臨人隱鏡觀物色六合昭蘇百蠻取則道惟廣兮運惟密強名言兮演三一主能作兮臣能述建豐碑兮頌元吉至咸貞元中大聖善寺沙門代之所重曰名人之所寶曰位休禎奕葉昭德延祥其惟張氏乎公諱銑隴右天水人也曾祖元植皇朝盧龍府折衝祖定遠甘州司馬父崇正潭州長沙縣尉公即長沙之允子也幼而貞敏長而嚴毅歷職清貫皆著能綰兵權於湖南總務於河府才當幹蠱京牧爪牙天不憗遺溘先朝露以貞元十年八月草日終於洛陽永泰里之私第春秋六十九夫人樊氏曹州南華縣丞彥府君之息女蘊德柔明言行端淑習禮笄總而從好逑鳳凰於飛和鳴霄漢彼蒼不祐所天先逝撫訓孤幼孀回廠田坴哀妄疾遽嬰闕一字然怛化以貞元草年四月十日終於家第享年五十有子三人長曰叔重次曰叔威皆幼而敏惠年未弱冠相次夭喪季子叔齊泣血叩局弔影長號惟家之艱克紹先烈有女五人長女出家寧剎寺大德法號義性戒律貞明操行高潔弟妹幼稚主家而嚴二女適京兆杜氏及禮而亡三女適天水趙詡四女適安定梁祕五女在室而殞今孤子孤女等哀號失容劈踴屠烈先遠有日龜筮協宜以永貞元年十月草日合而窆之雙棺同穴葬於平樂鄉朱陽原禮也栽植松檟以標不朽爰託斯文旌乎厥美詞曰於戲宦達兮英武雄名遂身歿兮弓劍空夫人淑慎兮相次終哀哀嗣子兮泣蒼穹良辰宅兆兮安壽宮青山黯黯兮何人在白楊蕭蕭兮多悲風真言貞元初沙門有唐相國寺大德曰景融建金剛般若石經於大梁當唐氏帝天下百六十有八祀貞元元年龍集乙丑皇帝拜南郊之來月壬戌立於寺奉國報慈從昔願也夫先佛者法法空則鏡證後佛者教教離則言亡雖至德而無形亦假名而有後繇是脫靈之源流重華於漢土慧命之縣解載頌於魯文融公宣之與慧命是矣公性惟明敏量秉淳固生而好學幼則老成孝傳鄉黨名冠緇宿心堅不玷之玉行滿上弦之月為儒之龜鏡則在三之義全紹佛之弓冶則第一之道立加以才高利用迹著通方掌僧有火光之烈待客有泉水之稱不求虛飾外以浮榮異世同流聯芳並美公以出塵而不為宗之嗣毀服而不為邦之史常追昊天之報每蓄維桑之敬遭逢世故蕩溺兵間定亂之術非孫吳不可問安之禮非荀趙不大君親之效我復何有遂乃恭已懇志建言有謀以為至聖無私會感必通正智無情在幾必兆因疇遺訓歷考故實願欲寫誦章句潛融觀照持三輪空成萬象印禍不却而自抑福不招而自剋本無為以寧家體淳化以建國則知刑賞之內權衡制之刑賞之外我法綏之事無績而有忠功不伐而多義斷其今古度以優劣苟折骨刺血於皮紙則節暜而難就欲垂露懸針於竹素則工費而易朽所以徵藍田之美璞擬繁昌之麗刻庶暫勞而永固與天長以地久於是月殿西次雕楹南嚮四序光景六時香煙模可以廣千萬經觀可以更億兆衆公與真言十年之長三紀之故假詞抒意難讓課虛謝命含毫感事題記者也潛真字義璋俗姓王氏太原人後徙為夏縣朔方崇道鄉人開元二十六年住靈覺寺代宗朝預翻譯新經貞元四年卒於興善寺年七十一此經凡有三譯一西晉太熙中法護翻名佛土嚴淨經文勢多古語理幽二天后久視中實叉難陀於清禪寺翻名文殊受記經三即今大歷六年所譯也伏惟寶應元聖文武皇帝陛下天垂帝籙人歸寶圖德厚乾坤明侔日月仁恕滋物夷狄仰德而輸誠慈惠利生正教承風而演化頃者鄜坊節度使兼御史中丞杜冕奏為國請諸大乘經明詔下於祇園梵旨開於貝葉因請三藏不空譯此經等數十部續有敕下天下梵宇各置文殊菩薩像以旌聖功也又詔以文殊菩薩為上座皆三藏所請三藏學究瑜伽解窮法印身口意業祕密修持戒定慧學顯通宣暢唐梵文字聲韻具知傳譯此經善符聖旨文質相兼燦然可觀潛真識智愚昧學藝庸淺幸陪清衆謬在翻傳虛空藏經課虛潤色猥蒙驅策述疏讚揚雖文義荒蕪已傳京邑今之所作蓋有由焉有金閣寺大德道超禪師學盡法源行契心本親覩靈境密承聖慈故久在清涼屬興淨業仍於現處建窣堵波尋覲法緣來詣京國以此經為大事以大聖為本師顯揚聖德無過此者乃稽首三藏誓傳大聖法門不以潛真庸虛轉祈和尚邀令述作和尚不念有前之鄙陋又令讚釋此經竊難契真詮敢不盡其愚訥良秀俗姓郭氏蒲津人幼出家中條山柏梯寺貞元四年詔與罽賓國般若三藏譯經去年十一月二十八日右街功德使王希遷奉宣令良秀等修撰新翻大乘理趣六波羅蜜經疏者伏聞至道同源聖人一貫大雄示相演妙音於獨園實位分身霈湛恩於雙闕開佛日於聖日降絲綸於法輪所以揚化慈航致人壽域不然豈得握真符而契合應休運以感通况以此經如來之密印㣥生之度門得白馬之寶函啓青龍之祕藏是第一義理去筌蹄於最後乘説無分別加以天文煥發睿思昭回真如契心巳闡微於釋氏般若製序諒纘文於太宗慈雲溥潤於太根湛露垂滋於貝葉良秀等材惟末學性異生知謬寄討論伏增殞越上承嚴旨徒側管以窺天虔奉本師懼升堂而鼓瑟所修撰疏一部謹附王希遷隨表奉進伏乞聖慈許令同修疏沙門談筵於當寺讚演及流布中外所冀落落真言示丹青於新學明明像教流粉釋於將來
