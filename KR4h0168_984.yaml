  text: 全唐文欽定全唐文卷九百八十四闕名二十五
  hash: sha256:77956367230c0498b68fffe7e604e34f0775ec8ed422647d4a47ab7528f6276c
body:
  text: 變古易俗因物造器稽六爻之文蓋取諸益司百工之事無或不良惟彼村人幸參比屋既借罐而攸要非抱甕而為勞出門未覯於同人繘井先驚於敝漏雖罔離厥所而譴自已招異管寧之深仁愧林宗之妙賞且官之議事貴在量情忝曰村鄰得來得往詳其故誤有重有輕向若狹肆通闤修街隘路咽綺城之歌舞暗紫陌之煙塵物雖見蕩夫何足咎况屬荊扉寂寞蓬徑蕭疏破由彼已孰當毀櫝事匪因人爰煩投杼勒酬半價良謂合宜蕩物容據減條損器何援比例輒云不伏深覺詞遊書功旗常然後克類分命彞器則惟其賢知三賜之有恆故百代之令典瞻言彼乙齒我封君開國承家方列土之貴元袞赤舄見諸侯之禮嘉孔生之居衛三命益恭韙鍾氏之仕曹五熟云錫車服必班乎國命釜銘何恤於人言出話不然覺善鄰之滕口有孚勿問驗所賜之徵人必也正名此焉無咎天子建德是班宗彞諸侯立家爰受分器業盛鼎鼐功昭篆刻若使世濟不泯長子承主宗之規胙土云亡耳孫何克復之有况光涵一作滔沒泗氣溢歊汾煥彼龍文昭其象物何速戾於懷璧盍歸休於國寶是賢所告謂得其宜服玩垂則歲時交進韞狐白以禦冬裂紈素而清暑由是五明開製道在思賢七華擅奇思歸錫寵委方圓以呈質順行藏以適時登用有期著號無算乙行均山仰時聞景慕執殊方竹非承漢帝之私即好蒲葵式徇謝安之義事符懷舊迹逐移風類折巾於林宗寧俟題於逸少將以妖衆孰謂欽賢宜從三宥之書無陷五詞之罰車服以庸辨冕有等必章彩而象位具文物以昭德丁丙各從王事端委清時遵儒師以奉職率饔人以敬理至於玉膳將進躬視丹墀之側縹囊一作裘方展危坐青襟之前雖非官聯乃同其服進賢遂戴有類於漢臣委貌未得且謬於殷道以兩梁之製觸鐵柱之威巧詞俱飾文過斯在請詳典式以議科條衣裳楚楚須辨於采章雨雪瀌瀌以虞其燥溼瞻言乙也所習伊何異子臧之不衷載時人之將誡同陳咸之所衣為大國之榮觀製豈變常事仍師古魯之縫掖君子嘉疑其蔑儒楚之復陶當時不以為罪庶窮閲實之典爰置不辜之刑景職此權衡性諧鍾律八音由茲遂播五聲從此克諧掌類羲和主同尹氏錙銖無失於毫末斤兩匪差於黍纍顓頊火正虞典銅衡苟有罪一作非宜誠合科結况三兩為一大兩未爽於通規百黍以為一銖頗合於古制將科違令事乃近於深文訴以非辜理亦宜從告免七曜成文二儀不測聖人造理璿衡有用為魯侯之金鐻吻合鬼神窺漢史之銅渾有探造化圭撮不謬玉節斯調晝夜必盡其規天地莫逃其算登臺視朔覩雲物之必書拂琯移灰識權衡之有度惟甲名當典刻職在挈壺望朱雁之在時見金龍之吐水雨露時降波結霜盤之中晷刻相仍流泄衡渠之下在金徒之昧職徵玉典而可刑不應為而匪為甲無過也不應告而輒告乙有罪焉請從罰杖之科以明抱箭之士車書混同聖德汪濊朝無刻印路不拾遺謫夫主司遂敢亡失靈龜回顧疑曳尾於途中神鵲無依遽韜形於私室丙也行用實為亂常須置霜科以懲日拙君子效官豈輕舉措下民編戶須任指揮甲於維嵩得之古鏡宛轉盤龍自多符彩翩翻鳷鵲是懷納用先呈銅印宜照舞鸞旋臨玉掌坐如半月昔年挂竹應寵全形今日翻菱惟看碎影裂非因墜是則難誣破不緣擊欲尤誰過但空桑之里尚且移人歷陽之都猶聞化鱉况時經歷代固不可量物罕保常能無自損難為照膽理可緘心仍敢浮詞尚論闕進事同慙豕纍匪厚顏何得牽迷公為嫁禍令科其妄終非慎罰通衢四會奇樹衆鬱布夏葉以成帷聳雲柯而似蓋日來月往鳥剝蟲穿或擁腫而不材未施功於匠石或輪囷而載癭疑見題於杜預相彼木奇心規草竊揮雪鋒而斯就扺霜簡而何逃事有可通情或宜恕按以刑典恐多違於獻芹原其情志夫何妨於進枕枕雖未造誠即可嘉伊此木奇造進生於意表欲申芻議賞罰懵於愚衷請更斫根庶寬抑曲聖人豐功明著能事作程無資於苦窳為度必禁於回邪俾夫越鎛燕函人能為也宋斤魯削器得良焉丙隸百工人居肆業爐開夜火已流朱雀之輝竈發晨煙將視赤龍之術所以洗削之妙精奇於土風遷徙之殊理暌於分野鄭刀豈同於魯削難以厚誣周令將入於漢刑實乖中典觀乎獨斷未息㣥疑請寬書牘之辭謂審懸衡之要精鋼既鍊器用爰備或賦斯一鼓或徵乎九金俾人興行其利則博瞻彼甲也居無異聞四人各業夙承於良冶百工居肆更列於周官而運思無窮成能有則光如濯雪豈徒陽劍之奇思逸言泉遂入青編之用雖用之日久若新發於硎妙符鉛錫之宜不假磨礱之助或人相糾深謂無稽而我有辭當從不濫齊顗承榮梓闕作鎮桐廬化洽循良行聞棄戟情惟奇古方欲好鈎未宣邵伯之風且效吳王之躅錢本雕鐫擅美冶鑄標能盡思侔於宋弓窮神等於越劍纎形孕玉疑懸秦女之樓曲影分鈎不若任公之釣於斯殺子何謝燔妻既極巧工言邀重賞彼則識非辨物怪遼豕之從來此乃道涉幽通惜吳鴻之枉逝鍾心之痛才結著背之應斯彰雖頻會於前聞終取驚於即事刺史學殊該博情懼妖訛莫酬呂相之金先寡陶公之璧初聞或疑孟浪當察理合推繩何者舐犢恩深將雛調切自可慕茲攜劍聊追五月之歡豈得同彼釁鈎遽夭百年之命既虧天性須置霜科請歸叢棘之曹速按鞭桐之罪周禮是視鮑人為韋樹之列司成乎致用劍革則武豹斯別為鞹乃犬羊不分眷也云時載理其職將以察其所以觀其所由引之而伸厚薄斯在信之而枉緩急自明或令雀辨之儀其服奚設鳥澗之政取佩寧堪非為合度之資招其不任之責將議其失猶或有辭稱使枉者能平當亦化惡為善更請閲實然定攸宜惡盈好謙天人同道備物致用器象攸明作必有孚服以為度有而不珍越人何臧於章甫貴而見薄楚國誰信於方暉人之無良巧言斯構殊魏瓠之奇質何生濩落之嫌異班扇之恩情徒假棄捐之阻且言行之表信德之符或人紿之行可知矣竊物為譽信其謂何愚以見疑施氏有誚於矇瞽取為已有告人當坐於詐欺雖謂可珍得而送縣賞則及爾刑其捨諸廢賞則無勸將來置刑則有懲同惡名器不假斯之謂與車服以庸衣裳在笥豈宜鷸冠好聚不可繁纓以朝司服為官制章程而有數司儀辨等顧禮命而無違陳之公朝則斯皇可賦作之私室將有害而家既越人常且非君命妄從重等敢此輕然工歌遄死之詩士置不應之罰合於至當誰曰不宜詢於國章經綸有序思我王度軌物無愆苟不率常職司是舉翼翼京邑作式四方固當棄華敦素亦以提綱正物欲使錐刀之末濟人不競精粗之制周經是法蓋以事屬公家使之無爽杜其不軌理亦何乖然市胥以妨商薄言御史以擾人致劾隨時之義抑即有之經邦大體宜從府見閩甌地隔粵嶠天嶮五鄰為里辨方言之異華三品稱金徵土物之惟錯禮不變俗市貴從宜貿遷海壖集朝夕於泉寶交易嶺徼得關石於他山義在隨時更法於易幣各得其所和均於類銀既來謀於我人有殊抱布俄必事於彼衆暫似遺錢打戾為嫌窒惕興訟軺軒按罪瞻繡服之增華邑宰移風聽琴堂而未靜置之於理孰謂非宜緡鏹爰設銷鑄是司九府匠之以圓方三官因之以文質雖五銖異制半兩分形龍馬之造化不窮權衡之輕重有數實惟泉貨校在水衡人之無良公為不道微漢臣之賜蜀鎔範成姦非魏帝之夢陳錯磨抵禁立辟自貽於錢府舉法須密於金科欲無王衍之害曷云非隱將劾劉陶之議刑其捨諸且取鋊不定其少多致獄孰究其高下欲加之罪其無詞乎待窮揚可之告緡方誶五倫之督鑄易象定位尊卑之禮聿修人倫有序貴賤之容斯立布諸方策聲塵藹然至若爵列子男恩垂帶礪有謀謁帝方承萬戶之榮無種封侯亦受千金之賜陸子囊中之寶已惠私門張氏無名之錢且留公庫東門韜家聲不墜祖德彌光想昔日之恩輝恃曩時之寵寄負天絶海槍榆知其不逮刳舟剡楫瘣木愧其無施仰堂構而未微思必復而何已薄言公府方論赤仄之資爰詣主司更訴青鳧之鏹亦冀雲油露湛先人承元始之恩自葉流根後允奉永平之賜迹有符於故事理無紊於今時既於古而無虧豈在今而可抑謂宜從允以叶彞章失得者在乎幾悔吝者生乎動苟或之昧其何以行乙乃妄人不慎厥德既俯拾而仰取亦虛往而實歸路有遺錢且效漢臣之鄙室而藏鏹庶同猗氏之富在國經而斯濫寧家約之可遵且揭而書之縣未徵於古制貪以敗類乙見誚於詩人貽厥孫謀無聞以燕之訓恆有子禍將貽自掇之刑請糾其違用懲於悔貨以通商財以利俗圜法施於九府鑄作行於四方輕重隨時子母由其遞用積流有象泉布所以得名國家立制經邦稽古為理用天分地成其阜安之業聖作物覩有其通變之勞使乎伊何曾不是識專命非據亂常有誅人焉廋哉斯害也已請被刑鼎無擾監司辨方制位大明治國之典立教富人必先因地之利設泉府列鍾官將欲布金刀之饒盡銅山之積庚以伎能從職鎔鑄為勞獸炭炎爐非煙上出鳧工動扇驟吹傍飛無名歸張氏之封因寵入鄧通之室自合預圖歲計先備年支不見請於文符空有辭於鉛錫撫周書而太息有愧川流披漢史而長懷無聞嶽峙仙臺按罪實為通規主局致詞憑何逃責調以玉燭天運和於四時用以金幣寶貨叶於三品是以榆花落影荇葉分形有母子之相權見大小之為利歲用不足將救眚災秋其以登孰為鎔鑄眷茲方郡年在順成稱彼兕觥則叶飲蒸之義在其龜貝未詳豐有之期家蓄三年自流衍於紅粟圜資九府實抵冒於丹毫守以規模猶違正典渝其好肉彌阻大同知無不為何見妄從申請罪人斯得誠宜置以科條龜浪披圖地演金夫之卦鵲橋構象天垂織女之星故能陰陽克諧琴瑟斯和其道且合莊敬表於齊眉其情或乖忿怨形於反目樊貴飛鳴聖代飲啄昌期預詳結媛之談早契伐柯之義皇皇受業初未見於拾青軋軋弄機遽有聞於裂素蜘蛛網戶朝續斷絲蟋蟀鳴階夜催殘織光明似雪未慙董永之妻皎潔如霜翻學王陽之婦兄莫能忍是歸妹之無家女既不良何立身於有地閨門險詖醜行已彰州將科繩罪人斯得有虧於禮善是責之難逃不足與行何藉跛而能履以郭賀為州牧用刑而尚寬既不疑為臺郎所訴之何益惟彼組練濟斯軍國或易象賁其戔戔或詩人歌其皎皎理宜夜懸諸井晝暴於陽何得不務吳門之光坐乖魏闕之禮所司詰罪雅叶彞章丁則薄言何其厚貌請依司敗以肅爰書財以工化物以商通既名奇而可稱於寶異而為玩或有韜筒比細光越象簟沉藻侔華色逾龍輔貨且難得稱珍於外土寵無不利取悅於中閨皎皎當窗已生紅粉之艷卿卿在室復觀黃潤之奇上客驚燒殊裴楷之未識相鼠斯齧惡蒼舒之啓智緘鐍不固誠毀櫝而亡龜詭異難求豈登山而採蚌依酬元價無徵本物既非吾土所有請絶詩人薄言萬宇宅心四人各業不寶遠物載沐元風南榮之暄猶思上獻東流之水必願朝宗所貴者忠誠孰非臣子所畜者珍物仍在私家况龍輔稱奇鳥篆攸載潛匿不送彰聞有司雖馬駕鼓車天心廣被而人迷日用物議猶多律有明文刑故無捨星帶燕郊雲迷代郡地稱即山之利人擅燒銅之業有敕頒行無令採鑄頃以胡兵候月或度盧龍之水漢守宣風載撫飛狐之塞救兵屢發帑藏云空方興計日之師遂有隨時之義取銅以給在敕誠違應機而行於事有恕馮諼市義在昔未以為非汲黯開倉於今不言其失斷從違敕理或可矜
