  - {type: head, offset: 837, content: 得甲引漏水於衡渠之下乙告違法甲云是金龍口吐轉注入渠法司以為虛妄科不應為不伏, id: KR4h0168_NFKB_984-h16, level: 2}
  - {type: head, offset: 999, content: 對得亡印判, id: KR4h0168_NFKB_984-h17, level: 2}
  - {type: head, offset: 999, content: 丙拾得亡印而用科罪不伏, id: KR4h0168_NFKB_984-h18, level: 2}
  - {type: head, offset: 1059, content: 對獲古鏡判, id: KR4h0168_NFKB_984-h19, level: 2}
  - {type: head, offset: 1059, content: 甲遊嵩山獲古鏡文彩極異陳於縣縣宰因窺拏忽破甲訴闕進令科誣罔, id: KR4h0168_NFKB_984-h20, level: 2}
  - {type: head, offset: 1221, content: 對斫街樹癭造枕判, id: KR4h0168_NFKB_984-h21, level: 2}
  - {type: head, offset: 1221, content: 人有告木奇斫街樹癭云擬將造枕進金吾劾之, id: KR4h0168_NFKB_984-h22, level: 2}
  - {type: head, offset: 1357, content: 對造削判, id: KR4h0168_NFKB_984-h23, level: 2}
  - {type: head, offset: 1357, content: 丙居魯造削遷鄭而不良所由科罪訴云非地氣, id: KR4h0168_NFKB_984-h24, level: 2}
  - {type: head, offset: 1487, content: 對削金判, id: KR4h0168_NFKB_984-h25, level: 2}
  - {type: head, offset: 1487, content: 甲為削金居其二或糾之曰欲新而無窮也不伏斷罪, id: KR4h0168_NFKB_984-h26, level: 2}
  - {type: head, offset: 1606, content: 對好鈎判, id: KR4h0168_NFKB_984-h27, level: 2}
  - {type: head, offset: 1606, content: 睦州刺史齊顗好鈎廣召巧工有能為鈎者賈金五鎰新安縣主簿錢本造鈎殺其二子釁之以致於顗從顗索賞顗不與云蓋是常鈎憑何索賞本乃抱鈎泣呼其子名鈎遂飛著父背刺史科妖妄罪不伏云有節(疑作前)聞, id: KR4h0168_NFKB_984-h28, level: 2}
  - {type: head, offset: 1838, content: 對皮判, id: KR4h0168_NFKB_984-h29, level: 2}
  - {type: head, offset: 1838, content: 鮑人恃財信之而枉一方急有司繩其不任人云舉直錯諸枉者平急者正何患乎不任, id: KR4h0168_NFKB_984-h30, level: 2}
  - {type: head, offset: 1960, content: 對戒豐判, id: KR4h0168_NFKB_984-h31, level: 2}
  - {type: head, offset: 1960, content: 施道安有戒豐人紿之是不祥物遂命棄之因取以告縣, id: KR4h0168_NFKB_984-h32, level: 2}
  - {type: head, offset: 2123, content: 對私制九章判, id: KR4h0168_NFKB_984-h33, level: 2}
  - {type: head, offset: 2123, content: 乙私制九章重等, id: KR4h0168_NFKB_984-h34, level: 2}
  - {type: head, offset: 2217, content: 對斷錦繡判, id: KR4h0168_NFKB_984-h35, level: 2}
  - {type: head, offset: 2217, content: 河南府準勅斷錦繡違式之物遂並斷布帛精麤之異者市胥訴云妨商旅御史劾府擾人, id: KR4h0168_NFKB_984-h36, level: 2}
  - {type: head, offset: 2328, content: 對水石類銀判, id: KR4h0168_NFKB_984-h37, level: 2}
  - {type: head, offset: 2328, content: 嶺南村洞間百姓水石大小類銀因忿爭打戾按察使科由縣令罪訴云因市易不伏, id: KR4h0168_NFKB_984-h38, level: 2}
  - {type: head, offset: 2458, content: 對磨錢判, id: KR4h0168_NFKB_984-h39, level: 2}
  - {type: head, offset: 2458, content: 甲磨錢質而取鋊乙告之訴不更鑄, id: KR4h0168_NFKB_984-h40, level: 2}
  - {type: head, offset: 2610, content: 對無名錢判, id: KR4h0168_NFKB_984-h41, level: 2}
  - {type: head, offset: 2610, content: 東門韜訴主司負物吏詰之韜云祖有無名錢, id: KR4h0168_NFKB_984-h42, level: 2}
  - {type: head, offset: 2819, content: 對拾遺錢判, id: KR4h0168_NFKB_984-h43, level: 2}
  - {type: head, offset: 2819, content: 乙拾遺錢於路縣科罪云家約俛有拾仰有取不敢失業, id: KR4h0168_NFKB_984-h44, level: 2}
  - {type: head, offset: 2940, content: 對鑄錢數倍判, id: KR4h0168_NFKB_984-h45, level: 2}
  - {type: head, offset: 2940, content: 江東諸監鑄錢數倍費使牒令停監司云恐棄山澤之利而工匠私鑄犯法, id: KR4h0168_NFKB_984-h46, level: 2}
  - {type: head, offset: 3042, content: 對鍾官所鑄判, id: KR4h0168_NFKB_984-h47, level: 2}
  - {type: head, offset: 3042, content: 庚為鍾官所鑄不充歲計工部按其罪訴稱鉛錫未足, id: KR4h0168_NFKB_984-h48, level: 2}
  - {type: head, offset: 3178, content: 對母子權判, id: KR4h0168_NFKB_984-h49, level: 2}
  - {type: head, offset: 3178, content: 順成方請為母子權渝其好肉所司下科違法, id: KR4h0168_NFKB_984-h50, level: 2}
  - {type: head, offset: 3320, content: 對織素判, id: KR4h0168_NFKB_984-h51, level: 2}
  - {type: head, offset: 3320, content: 樊貴使妻織素先示其式而告之曰必如此妻織遂善於式乃出妻兄訴州特(一作將)判合仍笞貴六十因損一脚履地不得貴不伏訴臺, id: KR4h0168_NFKB_984-h52, level: 2}
  - {type: head, offset: 3526, content: 對練不宿井判, id: KR4h0168_NFKB_984-h53, level: 2}
  - {type: head, offset: 3526, content: 丁為水練不宿井七日夜所司科罪訴云晝暴, id: KR4h0168_NFKB_984-h54, level: 2}
  - {type: head, offset: 3596, content: 對黃潤判, id: KR4h0168_NFKB_984-h55, level: 2}
  - {type: head, offset: 3596, content: 乙借甲黃潤示幽閨因被鼠齧甲索比筒乙以當土無請酬價甲不伏, id: KR4h0168_NFKB_984-h56, level: 2}
  - {type: head, offset: 3732, content: 對龍輔判, id: KR4h0168_NFKB_984-h57, level: 2}
  - {type: head, offset: 3732, content: 張魯私家畜龍輔不獻, id: KR4h0168_NFKB_984-h58, level: 2}
  - {type: head, offset: 3825, content: 對開銅坑判, id: KR4h0168_NFKB_984-h59, level: 2}
  - {type: head, offset: 3825, content: 蔚州申管內銅坑先禁採昨為檀州警發遣兵州庫無物可裝束刺史判令開銅坑以市物給兵幕(一作募)不闕軍機廉察使科違勅, id: KR4h0168_NFKB_984-h60, level: 2}
