front:
  text: 全唐文欽定全唐文卷五百五十韓愈四
  hash: sha256:eac029d28f1107f07170e0b9afbbe992ddd6c1378629711ddc066c4521dda077
body:
  text: 右謹按符瑞圖王者德至於地則嘉禾生伏惟皇帝陛下道合天地恩霑動植邇無不協遠無不賓神人以和風雨咸若前件嘉禾等或兩根並植一穗連房或延蔓敷榮異實共蔕既叶和同之慶又標豐稔之祥感自皇恩微莖何極於造化親逢嘉瑞小臣喜遇於休明無任右臣伏以淮西三州之地自少陽疾病去年春夏以來圖為今日之事有職位者勞於計慮撫循奉所役者修其器械防守金帛糧畜耗於賞給執兵之卒四向侵掠農夫織婦攜持幼弱餉於其後雖時侵掠小有所得力盡筋疲不償其費又聞畜馬甚多自半年已來皆上槽櫪譬如有人雖有十夫之力自朝及夕常自大呼跳躍初雖可畏其勢不久必自委頓乘其力衰三尺童子可使制其死命况以三小州殘獘困劇之餘而當天下之全力其破敗可立而待也然所未可知者在陛下斷與不斷耳夫兵不多不足以必勝必勝之師必在速戰兵多而戰不速則所費必廣兩界之閒疆場之上日相攻劫必有殺傷近賊州縣徵役百端農夫織婦不得安業或時小遇水旱百姓愁苦當此之時則人人異議以惑陛下之聽陛下持之不堅半塗而罷傷威損費為獘必深所以要先決於心詳度本末事至不惑然可圖功為統帥者盡力行之於前而參謀議者盡心奉之於後內外相應其功乃成昔者殷高宗大聖之主也以天子之威伐背叛之國三年乃剋不以為遲志在立功不計所費傳曰斷而後行鬼神避之遲疑不斷未有能成其事者也臣謬承恩寵獲掌綸誥地親職重不同庶寮輒竭愚誠以效裨補謹條次平賊事宜一一如後一諸道發兵或三二千人勢力單弱羈旅異鄉與賊不相諳委望風懾懼難便前進所在將帥以其客兵難處使先不存優恤待之既薄使之又苦或被分割隊伍隸屬諸頭士卒本將一朝相失心孤意怯難以有功又其本軍各須資遣道路遼遠勞費倍多士卒有征行之艱閭里懷離別之思今聞陳許安唐汝壽等州與賊界連接處村落百姓悉有兵器小小俘劫皆能自防習於戰鬬識賊深淺既是土人護惜鄉里比來未有處分猶願自備衣糧共相保聚以備寇賊若令召募立可成軍若要添兵自可取足賊平之後易使歸農伏請諸道先所追到行營者悉令却牒歸本道據行營所追人額器械弓矢一物已上悉送行營充給所召募人兵數既足加之教練三數月後諸道客軍一切可罷比之徵發遠人利害懸隔一繞逆賊州縣堡柵等各置兵馬都數雖多每處則至少又相去闊遠難相應接所以數被攻劫致有損傷今若分為四道每道各置三萬人擇要害地屯聚一處使有隱然之望審量事勢乘時逐利可入則四道一時俱發使其狼狽驚惶首尾不相救濟若未可入則深壁高壘以逸待勞自然不要諸處多置防備臨賊小縣可收百姓於便地作行縣以主領之使免散失一蔡州士卒為元濟迫脅勢不得已遂與王師交戰原其本根皆是國家百姓進退皆死誠可閔傷宜明勅諸軍使深知此意當戰鬬之際固當以盡敵為心若形勢已窮不能為惡者不須過有殺戮喻以聖德放之使歸銷其凶悖之心貸以生全之幸自然相率棄逆歸順一論語曰欲速則不達見小利則大事不成比來征討無功皆由欲其速捷有司計算所費苟務因循小不如意即求休罷河北淮西等見承前事勢知國家必不與之持久併力苦戰幸其一勝即希冀恩赦朝廷無至忠憂國之人不惜傷損威重因其有請便議罷兵往日之事患皆然也臣愚以為淮西三小州之地元濟又甚庸愚而陛下以聖明英武之姿用四海九州之力除此小寇難易可知泰山壓卵未足為喻一兵之勝負實在賞罰賞厚可令廉士動心罰重可令凶人喪魄然可集事不可愛惜所費憚於行刑一淄青恒冀兩道與蔡州氣類畧同今聞討伐元濟人情必有救助之意然皆闇弱自保無暇虛張聲勢則必有之至於分兵出界公然為惡亦必不敢宜特下詔云蔡州自吳少誠已來相承為節度使亦微有功効少陽之歿朕亦本擬與元濟恐其年少未能理事所以未便處置待其稍能緝綏然擬許其承繼今忽自為狂勃侵掠不受朝命事不得已所以有此討伐至如淄青恒州范陽等道祖父各有功業相承命節年歲已久朕必不利其土地輕有改易各宜自安如妄自疑懼敢相扇動朕即赦元濟不問迴軍討之自然破膽不敢妄有異說以前件謹錄奏聞伏乞天恩特賜裁擇謹奏右奉勅將變鹽法事貴精詳宜令臣等各陳利害可否聞奏者平叔所上變法條件臣終始詳度恐不可施行各隨本條分析利害如後一件平叔請令州府差人自糶官鹽收實估匹段省司準舊例支用自然獲利一倍已上者臣今通計所在百姓貧多富少除城郭外有見錢糴鹽者十無二三多用雜物及米穀博易鹽商利歸於已無物不取或從賒貸升斗約以時熟填還用此取濟兩得利便今令州縣人吏坐鋪自糶利不關已罪則加身不得見錢及頭段物恐失官利必不敢糶變法之後百姓貧者無從得鹽而食矣求利未得斂怨已多自然坐失鹽利常數所云獲利一倍臣所未見一件平叔又請鄉村去州縣遠處令所由將鹽就村糶易不得令百姓闕鹽者臣以為鄉村遠處或三家五家山谷居住不可令人吏將鹽家至戶到多將則糶貨不盡少將則得錢無多計其往來自充糧食不足比來商人或自負擔斗石往與百姓博易所冀平價之上利得三錢兩錢不比所由為官所使到村之後必索百姓供應所利至少為弊則多此又不可行者也一件平叔云所務至重須令廟堂宰相充使臣以為若法可行不假令宰相充使若不可行雖宰相為使無益也又宰相者所以臨察百司考其殿最若自為使縱有敗闕遣誰舉之此又不可者也一件平叔又云法行之後停減鹽司所由糧課年可收錢十萬貫臣以為變法之後弊隨事生尚恐不登常數安得更望贏利一件平叔欲令府縣糶鹽每月更加京兆尹料錢百千司錄及兩縣令每月各加五十千其餘觀察及諸州刺史縣令錄事參軍多至每月五十千少至五千三千者臣今計此用錢已多其餘官典及巡察手力所由等糧課仍不在此數通計所給每歲不下十萬貫未見其利所費已廣平叔又云停鹽司諸色所由糧課約每歲合減得十萬貫錢今臣計其新法亦用十萬不啻減得十萬却用十萬所亡所得一無贏餘也平叔又請以糶鹽多少為刺史縣令殿最多者遷轉不拘常例如闕課利依條科責者刺史縣令職在分憂今惟以鹽利多少為之升黜不復考其治行非唐虞三載考績黜陟幽明之義也一件平叔請定鹽價每斤三十文又每二百里每斤價加收二文以充腳價量地遠近險易加至六文腳價不足官與出名為每斤三十文其實已三十六文也今鹽價京師每斤四十諸州則不登此變法之後祗校數文於百姓未有厚利也腳價用五文者官與出二文用十文者官與出四文是鹽一斤官糶得錢名為三十其實斤多得二十八少得二十六文折長補短每斤收錢不過二十六七百姓折長補短每斤用錢三十四則是公私之閒每斤常失七八文也下不及百姓上不歸官家積數至多不可遽算以此言之不為有益平叔又請令所在及農隙時併召車牛盤鹽送納都倉不得令有闕絕者州縣和雇車牛百姓必無情愿事須差配然付腳錢百姓將車載鹽所由先皆無檢齊集之後始得載鹽及至院監請受又須待其輪次不用門戶皆被停留輸納之時人事又別凡是和雇無不皆然百姓寧為私家載物取錢五文不為官家載物取十文錢也不和雇則無可載鹽和雇則害及百姓此又不可也一件平叔稱停減鹽務所由收其糧課一歲尚得十萬貫文今又稱既有巡院請量閑劇留官吏於倉場勾當要害守捉少置人數優恤糧料嚴加把捉如有漏失私糶等並準條處分者平叔所管鹽務所由人數有幾量留之外收其糧課一歲尚得十萬貫此又不近理也比來要害守捉人數至多尚有漏失私糶之弊今又減置人數謂能私鹽斷絕此又於理不可也一件平叔云變法之後歲計必有所餘日用還恐不足謂一年已來且未責以課利後必數倍校多者此又不可方今國用常言不足若一歲頓闕課利為害已深雖云明年校多豈可懸保此又非公私蓄積尚少之時可行者也一件平叔又云浮寄奸猾者轉富土著守業者日貧若官自糶鹽不問貴賤貧富士農工商道士僧尼并兼游惰因其所食盡輸官錢并諸道軍諸使家口親族遞相影占不曾輸稅若官自糶鹽此輩無一人遺漏者臣以此數色人等官未自糶鹽之時從來糴鹽而食不待官自糶然後食鹽也若官不自糶鹽此色人等不糴鹽而食官自糶鹽即糴而食之則信如平叔所言矣若官自糶與不自糶皆常糴鹽而食則今官自糶亦無利也所謂知其一而不知其二見其近而不見其遠也國家榷鹽糶與商人商人納榷糶與百姓則是天下百姓無貧富貴賤皆已輸錢於官矣不必與國家交手付錢然後為輸錢於官也一件平叔云初定兩稅時絹一匹直錢三千今絹一匹直錢八百百姓貧虛或先取粟麥價及至收穫悉以還債又充官稅顆粒不殘若官中糶鹽一家五口所食鹽價不過十錢隨日而輸不勞驅遣則必無舉債逃亡之患者臣以為百姓困弊不皆為鹽價貴也今官自糶鹽與依舊令商人糶其價貴賤所校無多通計一家五口所食之鹽平叔所計一日以十錢為率一月當用錢三百是則三日食鹽一斤一月率當十斤新法實價與舊每斤不校三四錢以下通計五口之家以平叔所約之法計之賤於舊價日校一錢月校三十不滿五口之家所校更少然則改用新法百姓亦未免窮困流散也初定稅時一匹絹三千今只八百假如特變鹽法絹價亦未肯貴五口之家因變鹽法日得一錢之利豈能便免作債收穫之時不被徵索輸官稅後有贏餘也以臣所見百姓困弊日久不以事擾之自然漸校不在變鹽法也今絹一匹八百百姓尚多寒無衣者若使匹直三千則無衣者必更眾多况絹之貴賤皆不緣鹽法以此言之鹽法未要變也一件平叔云每州糶鹽不少長吏或有不親公事所由浮詞云當界無人糴鹽臣即請差清強巡官檢責所在實戶據口團保給一年鹽使其四季輸納鹽價口多糶少及鹽價遲違請停觀察使見任改散慢官其刺史已下貶與上佐其餘官貶遠處者平叔本請官自糶鹽以寬百姓令其蘇息免更流亡今令責實戶口團保給鹽令其隨季輸納鹽價所謂擾而困之非前意也百姓貧家食鹽至少或有淡食動經旬月若據口給鹽依時徵價辦與不辦並須納錢遲違及違條件觀察使已下各加罪譴苟官吏畏罪必用威刑臣恐因此所在不安百姓轉致流散此又不可之大者也一件平叔請限商人鹽納官後不得輒於諸軍諸使覓職掌把錢捉店看守莊磑以求影庇請令所在官吏嚴加防察如有違犯應有資財並令納官仍牒送府縣充所由者臣以為鹽商納榷為官糶鹽子父相承坐受厚利比之百姓實則校優今既奪其業又禁不得求覓職事及為人把錢捉店看守莊磑不知何罪一朝窮蹙之也若必行此則富商大賈必生怨恨或收市重寶逃入反側之地以資寇盜此又不可不慮也一件平叔云行此策後兩巿軍人富商大賈或行財賄邀截喧訴請令所由切加收捉如獲頭首所在決斬連狀聚眾人等各決脊杖二十檢責軍司軍戶鹽如有隱漏並準府縣例科決并賞所由告人者此一件若果行之不惟大失人心兼亦驚動遠近不知糶鹽所獲幾何而害人蠧政其弊實甚以前件狀奉九月九日勅令臣等各陳利害者謹錄奏聞伏聽勅旨伏見勅命皇帝以閏正月三日嗣臨寶位海內惟新凡在臣庶不勝慶幸惟俯同下情末由拜賀但增馳戀謹奉狀不宣某再拜二月五日恩赦今月二十四日卯時到州當時集百官僧道百姓宣示訖聖上以繼明之初垂維新之澤曲成不遺於萬物大賚遂延於四海寰宇斯泰品類皆蘇渥恩普霑遠近同慶愈以藩條有制拜賀無由不勝欣抃之至謹差萍鄉縣丞李某奉狀陳賀伏奉七月二十七日牒以愈貶授刺史特加優禮以州小俸薄慮有闕乏每月別給錢五十千以送使錢充者開緘捧讀驚榮交至顧巳量分慚懼益深欲致辭為讓則乖伏屬之禮承命苟貪又非循省之道進退反側無以自寧其妻子男女并孤遺孫姪奴婢等尚未到官窮州使賓罕至身衣口食絹米足充過此以往實無所用積之於室非廉者所為受之於官名且不正恃蒙眷待輒此披陳經曰改葬緦春秋穀梁傳亦曰改葬之禮緦舉下緬也此皆謂子之於父母其他則皆無服何以識其必然經次五等之服小功之下然後著改葬之制更無輕重之差以此知惟記其最親者其他無服則不記也若主人當服斬衰其餘親各服其服則經亦言之不當惟云緦也傳稱舉下緬者緬猶遠也下謂服之最輕者也以其遠故其服輕也江熙曰禮天子諸侯易服而葬以為交於神明者不可以純凶况其緬者乎是故改葬之禮其服惟輕以此而言則亦明矣衞司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦既葬而除之不忍無服送至親也非父母無服無服則弔服而加麻此又其著者也文子又曰喪服既除然後乃葬則其服何服子思曰三年之喪未葬服不變除何有焉然則改葬與未葬者有異矣古者諸侯五月而葬大夫三月而葬士逾月無故未有過時而不葬者也過時而不葬謂之不能葬春秋譏之若有故而未葬雖出三年子之服不變此孝子之所以著其情先王之所以必其時之道也雖有其文未有著其人者以是知其至少也改葬者為山崩水涌毀其墓及葬而禮不備者若文王之葬王季以水齧其墓魯隱公之葬惠公以有宋師太子少葬故有闕之類是也喪事有進而無退有易以輕服無加以重服殯於堂則謂之殯瘞於野則謂之葬近代已來事與古異或遊或仕在千里之外或子幼妻稚而不能自還甚者拘以陰陽畏忌遂葬於其土及其反葬也遠者或至數十年近者亦出三年其吉服而從於事也久矣又安可取未葬不變服之例而反為之重服歟在喪當葬猶宜易以輕服况既遠而反純凶以葬乎若果重服是所謂未可除而除不當重而更重也或曰喪與其易也寧戚雖重服不亦可乎曰不然易之與戚則易固不如戚矣雖然未若合禮之為懿也儉之與奢則儉固愈於奢矣雖然未若合禮之為懿也過猶不及其此類之謂乎或曰經稱改葬緦而不著其月數則似三月而後除也子思之對文子則曰既葬而除之今宜如何曰自啟殯至於既葬而三月則除之未三月則服以終三月也曰妻為夫何如曰如子無弔服而加麻則何如曰今之弔服猶古之弔服也齋郎職奉宗廟社稷之小事蓋士之賤者也執豆籩駿奔走以役於其官之長不以德進不以言揚蓋取其人力以備其事而已矣奉宗廟社稷之小事執豆籩駿奔走亦不可以不敬也於是選大夫士之子弟未爵命者以塞員填闕而教之行事其勤雖小其使之不可以不報也必書其歲歲既久矣於是乎命之以官而授之以事其亦微矣哉學生或以通經舉或以能文稱其微者至於習法律知字書皆有以贊於教化可以使令於上者也自非天姿茂異曠日經久以所進業發聞於鄉閭稱道於朋友薦於州府而升之司業則不可得而齒乎國學矣然則奉宗廟社稷之小事任力之小者也贊於教化可以使令於上者德藝之大者也其亦不可移易明矣今議者謂學生之無所事謂齋郎之幸而進不本其意因謂可以代任其事而罷之蓋亦不得其理矣今夫齋郎之所事者力也學生之所事者德與藝也以德藝舉之而以力役之是使君子而服小人之事且非國家崇儒勸學誘人為善之道也此一說不可者也抑又有大不可者焉宗廟社稷之事雖小不可以不專敬之至也古之道也今若以學生兼其事及其歲時日月然後授其宗彞罍洗其周旋必不合度其進退必不得宜其思慮必不固其容貌必不莊此無他其事不習而其志不專故也非近於不敬者歟又有大不可者其是之謂歟若知此不可將令學生恒掌其事而隳壞其本業則是學生之教加少學生之道益貶而齋郎之實猶在齋郎之名苟無也大凡制度之改政令之變利於其舊不什則不可為已又况不如其舊哉考之於古則非訓稽之於今則非利尋其名而求其實則失其宜故曰議罷齋郎而以學生薦享蓋亦不得其理矣右今月十六日勅旨宜令百寮議限五日內聞奏者將仕郎守國子監四門博士臣韓愈謹獻議曰伏以陛下追孝祖宗肅敬祀事凡在擬議不敢自專聿求厥中延訪㣥下然而禮文繁漫所執各殊自建中之初迄至今歲屢經禘祫未合適從臣生遭聖明涵泳恩澤雖賤不及議而志切効忠今輒先舉眾議之非然後申明其說一曰獻懿廟主宜永藏之夾室臣以為不可夫祫者合也毀廟之主皆當合食於太祖獻懿二祖即毀廟主也今雖藏於夾室至禘祫之時豈得不食於太廟乎名曰合祭而二祖不得祭焉不可謂之合矣二曰獻懿廟主宜毀之瘞之臣又以為不可謹按禮記天子立七廟一壇一墠其毀廟之主皆藏於祧廟雖百代不毀祫則陳於太廟而饗焉自魏晉已降始有毀瘞之議事非經據竟不可施行今國家德厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位况於毀瘞而不禘祫乎三曰獻懿廟主宜各遷於其陵所臣又以為不可二祖之祭於京師列於太廟也二百年矣今一朝遷之豈惟人聽疑惑抑恐二祖之靈眷顧依遲不即饗於下國也四曰獻懿廟主宜附於興聖廟而不禘祫臣又以為不可傳曰祭如在景皇帝雖太祖其於屬乃獻懿之子孫也今欲正其子東向之位廢其父之大祭固不可為典矣五曰獻懿二祖宜別立廟於京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為墠去墠為鬼漸而之遠其祭益稀昔者魯立煬宮春秋非之以為不當取已毀之廟既藏之主而復築宮以祭今之所議與此正同又雖違禮立廟至於禘祫也合食則禘無其所廢祭則於義不通此五說者皆所不可故臣博採前聞求其折中以為殷祖元王周祖后稷太祖之上皆自為帝又其代數已遠不復祭之故太祖得正東向之位子孫從昭穆之列禮所稱者蓋以紀一時之宜非傳於後代之法也傳曰子雖齊聖不先父食蓋言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東向之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈遠人情又常祭甚衆合祭甚寡則是太祖所屈之祭至少所伸之祭至多比於伸孫之尊廢祖之祭不亦順乎事異殷周禮從而變非所失禮也臣伏以制禮作樂者天子之職也陛下以臣議有可采粗合天心斷而行之是則為禮如以為猶或可疑乞召臣對面陳得失庶有發明謹議右禮儀使奏謹按周禮天子七廟三昭三穆與太祖之廟而七尚書咸有一德亦曰七世之廟可以觀德荀卿子曰有天下者祭七代有一國者祭五代則知天子上祭七廟典籍通規祖功宗德不在其數國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷高祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王其下三昭三穆謂之親廟與太祖而七四時常享自如禮文伏以今年宗廟遞遷元宗明皇帝在三昭三穆之外是親盡之祖雖有功德新主入廟禮合祧藏太廟中第一夾室每至禘祫之歲合食如常謹議蠡既辭越到齊乃移書文種亦令亡去以逃其長頸之難遂使種假疾不朝竟承賜劒之誅悲夫為人謀而不忠者范蠡其近之矣夫君存與存君亡與亡備三才之道未有不顯然而自知矣勾踐奮鳥棲之勢申鼠竄之息竟能焚姑蘇虜夫差方行淮泗之上以受東諸侯之盟者范蠡文種有其力也既有其力則宜閉雷霆藏風雲截斷三江叱開四方高提霸王之器大宏夏禹之烈使天下徘徊知越有人矣奈何反未及國則背君而去既行之於身又移之於人人臣之節合如是耶且臣之於君其道在於全大義宏休烈生死之際又何足道哉况君者天也天可逃乎君以長頸之狀難以同樂則舉吳之後還越之日汎輕身遊五湖者豈惟范子乎靜而言之則知范子有匡君之智而無事君之義明矣其所以移文種之書亦猶投勾踐之劒也勾踐何過哉予所謂為人謀而不忠者其在於此也
