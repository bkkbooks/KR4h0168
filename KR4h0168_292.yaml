front:
  text: 全唐文欽定全唐文卷二百九十二張九齡十
  hash: sha256:725eb2a3313a8971bb7d369a8a78109773eb5dcb0364804624122f15cc419a70
body:
  text: 并序夫志道莫先於無欲福善莫大於有後始而晦跡終不近名非道德之合歟生我勞臣立於遠績非善慶所致歟所謂伊人其在牛公者矣公諱意字某其先子姓實始殷後有牛父者則宋之大夫允裔蕃衍人物更盛邯為護羌校尉崇為隴西主簿遂家隴上是稱冠族其後因官安定爰處鶉觚今為郡人亦既重代矣公之族祖有奇章公者隋室宗臣風流篤厚典章損益百代可知天下稱之地靈斯在大父通秉志高尚守道不攜當時交辟辭疾不起父會弱齡早代有才無祿公夙遘閔凶終鮮兄弟性具純至孝思罔極幼以孑立志不違邦與道為徒求仁自我不屑軒冕考槃邱園雖云屢空晏如也六郡自古五方雜錯負力怙利上氣好武人庶相放風俗不純及公沖和其返真朴外以義行格物內以默致頤神不飾智以驚愚不棄同而即異有恆其德無斁於人鄰落為之變風狼戾以之率化公既浮雲不義介石惟一或勸之仕但笑而不言飛鴻冥冥胡可量也開元六年隨子西征以就色養春秋高矣道茂年衰魂氣其歸賢達共盡越五月寢疾終於伏羌之官舍時年七十有六冬十一月歸葬於北原夫人同郡王氏不享偕老先是即代母儀婦德宋子齊姜自歸於我宜爾家室不有配德曷生此子有子仙客為國之良用商君耕戰之圖修充國羌胡之具出言可復所計而然邊扞長城主恩前席且以子貴之義有加父存之禮元澤下逮素風激揚陰德所流大福斯至十八年有詔贈涇州長史二十二年冬且有後命贈使持節涇州諸軍事涇州刺史夫人追封太原郡夫人於戲存而纍仁沒有餘烈福自昭於元體道非冀於異時及其影響同符寵光如答雖松楸巳拱而章紱載華死如可作無異會稽之節生苟為恥安用雁門之肉貴與不貴可不然乎嗣子銀青光祿大夫太僕卿判涼州持節河西節度使兼隴西㣥牧都使支度營田使隴右採訪處置使攝御史大夫隴西縣開國子仙客叩心追遠號天莫逮以為先美蓋闕後嗣有愧且澤漏幽壤得不銘恩名典本州豈徒錫羡而巳銘曰隴上多豪山西好武使君貞獨幼不斯取惟道為徒與代立矩善有餘慶風亦變古不學而知不行而至跡有相混名無自異出入百年終始一意福流於後神明其事行止於身用存元體厥子嘉績中朝縟禮邙回壠隧門重旌棨逸人之墓今同郡邸夫官雖序賢志道者不常有位才雖屈命福善者未必無後子夏文學之達以為富貴在天于公決曹之平則云子孫由我蓋不享當代生數猶奇流慶後人互體乃用亨之會也蓋有原焉公諱處貞字虔求東平人曾祖北齊幽州長史府君諱贇祖隋貫州中正府君諱伽考渝州清池令府君諱師昔伯夷佐唐實典三禮四嶽佐禹用平九州虞夏以功而見封申呂因邑而命氏惟時厥後奕代丕承公正性之有自來直道之不充詘嘉勇退之乂德避近名之未然越在弱齡棲遲事外用光本於藏曜履行期於滅迹不遠於仁行之斯至不苟於義方之自正佐一郡而即安居九夷而匪陋始不然者公何掾於東裔哉起家授元州司戶參軍晏如也言旋初服遂從所好外物之概不離於風塵遠子之言惟聞於詩禮所謂溫良淑慎無競伊人者歟天冊二年夏四月遇疾終於家春秋五十有二開元十四年冬十一月葬於邑城西南四里原夫人北地傅氏祔焉夫果於立誠靜以俟命力不足者則不疚運不至者則不憂物情之難及我而易是以名利衆之所欲也公則淡泊之德義人之所鮮也亦克蹈籍之如此而神不勞福不流未之有也有四子長曰元知今左威衛司戈次曰元悟中散大夫使持節鄜州諸軍事守鄜州刺史次曰元智左威衛執㦸次曰元爽左衛長上惟元悟至大官此其教忠有舊服義無斁好爵是與餘慶所貽入為王門之長出居邦伯之列屬恩推子貴名彰身後事有光於冥漠德乃發於馨香三命為大夫百代稱先子孝理所賜邦族為榮開元十七年有制贈公慶王友夫人贈河間郡君異人之符至是斯驗惟神之鑒謂之不欺公之女孫曰東平郡夫人冠軍大將軍右監門衛大將軍渤海高公之夫人鄜州刺史之女也冰玉相輝椒蘭同馥由福履於君子與嘉會於善人齊姜于歸魚軒華以照路鄜畤之往熊㦸殷其若雷有車服而始大履霜露而追遠於戲食于舊德無忝爾之奉先樹之休聲有以見其歸美銘曰赫赫我祖惟師尚父泱泱大風悠悠終古施于礽裔憲是文武我美其濟我則斯取雖匪高位亦惟碩德我王之友彼夫之特既貞且亮宜語而默投足皆安終身不忒峩峩積善以福後人肸蠁家慶煒煌宗姻瞻彼松檟錫之絲綸今也追飾實為先臣先臣伊何宜其有後志之所尚義無所苟身雖既沒名豈虛受立德在茲亦云不朽公諱仁瞻字某趙郡房子人其先自段干木至柏仁侯皆以醇德茂功奮於上世始於藩魏終而將趙其名不殞遂濟於今五代祖後魏中書侍郎始豐懿侯璨璨生徐州刺史始豐順侯元茂元茂生趙郡太守府君諱子雲子雲生駙馬都尉直閣將軍府君諱道宗道宗生齊尚書兵部郎中府君諱山壽公即郎中府君之子仍世濟美在邦攸宜故我公稟靈中和履道元吉以學則探其奧旨見聖人之心以行則踐其嘉言合君子之度以故動為人譽名乃日宣義府孔修德輿云遠固未可量也隋大業中舉孝廉洎唐興調棣州司戶參軍凡遷磁相二州總管府戶曹參軍宜州録事參軍莫不事人以直反身於誠處卑能安敬長則順故光輔郡將周爰咨度自州徂州或嘯或諾既而遷金鄉晉陵二縣令精誠以庀事善教以長人四封用孚三英以粲彼蒲與密獨何有焉以課最遷歸州治中郢州司馬加朝散大夫行果州長史盤桓參佐未復公侯道非吾行德無必貴遂以沒代豈命也夫某年月卒於官舍享年若干及喪至自蜀而葬不歸趙乃卜宅於許封樹汝墳子孫遂家亦既重代至開元中公之孫曰察以古諸侯之祿奉先大夫之祀晝遊本郡輝光前烈非清白以遺善慶之餘保艾爾後人亦何以臻此於是履霜為感恭惟春秋之事刻石是圖俾揚祖宗之業斯善繼者也敘而志之銘曰長史英英作為世程動合雅度綽有令名以之入官從事而升以之佐郡為政孔明悠悠上天曷不貴德終於參佐孰云邦國孝孫其昌餘慶乃彰宰樹蒼蒼徽音不忘君諱元祐字某趙郡房子人祖山壽齊尚書右丞兵部郎中父仁瞻朝散大夫果州長史系德所載見於先碑公懿烈無忝雅有風度體和而韻緡之以絲性婉而文受之以采故好學不倦而墳典必精慮善以動而規矩皆中悉心存乎道義餘力見於文章人以美談日聞休譽弱冠舉進士調補同州參軍換瀛州司戶參軍以素所履以施有政居獲乎上往得其中無不嚴祗長吏之所嘉歎無不崇讓同官之所厭服宜爾戩穀光昭令圖如顏子之不幸豈卜商之云命某年卒於官舍春秋若干公家代尚儉子孫是式初先大夫之喪也清白以遺而果無私積高燥是營而庶有餘慶豈所謂不戀本達也無懷土以重遷不傷生仁也無困財以乏祀夫然趙之北際何必故鄉許之東偏亦云樂國故喪之歸也遂窆於斯及嗣子察受教義方能纂德業服事華髮潔身清朝天子方差擇其良惠恤於下由是解印少府剖符本州衣繡而歸雖榮之在晝重茵以坐而養不逮親結諸心形諸色孝子之志國人所稱於是乎歸美以揚先撰德以示後蓋蒸夷之義也得無述焉銘曰倬李侯代載德行時範言士則三英粲百夫特肥而家華而國美無度命不融足方騁途斯窮子餘慶享次嵩我丕訓藹遺風後漢高士徐君諱稚字孺子南昌人也先生受天元休含道傑出生知而上貫之以一體資清純動適元妙知道之將廢乃窮而獨善躬耕取資非力不食鄰落所處率化無訟在漢之季遭時溷濁不抗迹以庇物故退棲山林不苟利以辱身故進無祿位五辟宰府四察孝廉又舉有道就拜太原太守皆辭疾不起延嘉二年尚書令汝南陳蕃僕射南郡胡廣相與上疏極言先生宜為輔弻協和人神漢桓帝猶能安車元纁備禮徵聘而竟不屈志知時之不可支也然而諸公嘉招雖不之屑就及聞薨卒徒步弔祭禮有所尚隻雞不薄意有所加生芻為貴士之感義實衰世之有補人而見德俾後生之可尋其廢中權行中慮皆此之類也昔者夷齊介潔而遠去沮溺野逸而離㣥顏闔鑿壞以遁逃接輿狂歌而詭激此誠作者或類沽名夫有所不為志則偏也無適不可用之極也先生則貶絶在心而經修於世純儉以存戒博愛以體仁應物以會通全巳以歸正漢庭所以宗其德天下所以服其行豈與彼數子直徑庭而巳哉靈帝初欲蒲輪聘會先生以疾終時年七十二有子曰季登篤行孝悌亦高尚不仕皇唐開元十五年豫忝牧茲郡風流是仰在懸榻之後想見其人有表墓之儀豈孤此地則先生之德其可沒乎銘曰靈芝無根醴泉無源角立傑出先生斯存英英先生德不可名麟出無應鴻飛入冥道高事遠跡陳名劭勒石舊邦以觀其妙有唐瀘溪令晉國趙君諱某字某終於其位嗚呼魯史既沒稱行者不在茲乎荀孟以來論命者亦何謂也放其言而無苟作合乃遷行其志而不回與權必遂故道每屈於位身必後於時而猶守真不奪固窮自若立誠者既獨其所善尚德者徒隨而為名名非欲彰以美實而自著位非欲下以屬守而遂卑此由命而然歟為自我而然歟無代無之而今實續之矣公太祖旴北齊河間太守因家於饒陽亦既重代今為饒陽人也曾祖北齊幽州大總管大父隋巨鹿大中正府君烈考范陽令府君皆纍行積慶以貽於後正性直道遂鍾於公公剛潔不㣥精明獨斷非義所在不以利污名非禮所安不以跡傷教有立卓爾童丱而然既學大成紛綸博綜將求祿養也而俯就鄉舉尋而明經登科補太子正字又改射洪尉皆以逮親自乞執政哀之遂屈換定襄尉公欣然而捧檄矣秩滿轉洪洞主簿永城丞時縣宰敗類公止之不可雖盡同官之心且急下人之病義形於色彼用我讎此貪而無親難與心競公剛亦不吐乃邁力爭迄用上聞因而坐免邑中黔庶莫不咨嗟求而得仁退則無慍矣乃返初服遨遊墳索精義致用清風被物或太守咨訪偃息自若或諸儒稽疑廢疾皆起是時中書侍郎河東辥元超人倫之表也將命河朔實舉廢滯企我休風延以殊禮立談體要大見嗟稱以故表聞其庶乎在帝心會有陰忌之譖實為無妄之禍矣進既曾母致疑退而賈生投弔不無故也以此左遷瀘溪丞公竟不自列窮則體命雖在幽暗鬼神不欺苟推忠誠蠻貊何陋時縣無長史政則我由未歲月而已成無溪谷而不悅互鄉自專之子左言難曉之民翕然同辭乞為父母於是詣闕投疏至于再三朝廷允之則授瀘溪令公聿副誠請增修德化乃鄒魯設教而夷楚變風逮公遷殂闔境號慕古人遺愛何以加也遺令戒子留葬洛陽斯又不戀本達也有子曰瑝歷官侍御史尚書郎洪州都督霜露既變則感念以時陵谷有遷而音徽何代君子所懼于斯撰德銘曰洛趙侯之德好是正直令儀令則不回不忒實邦之選彼夫之特玉堅而折膏明自煎辰陽于遠漵浦回邅下邑巳矣君子殲旃遺令桐鄉歸魂崇芒瞻彼有洛維水泱泱德音不已于是揚揚序曰正其身君子所以慎德敏于行吉人所以寡辭或道之或處之是亦正命命之將行利有攸往則行不家至而人勸言不面命而事濟不為跡而實以阜蕃不沽名而聲以遹駿夫如是者存乎其人故河南少尹竇公蓋有之矣公諱某扶風平陵人自後魏大將軍侍中永富公至烈考瀛州刺史贈刑部尚書莘國公六葉矣皆增華卿族見重公朝四國于藩四方于宣龍旗承祀六轡耳耳公所謂盛德必祀承子之始大積善餘慶是哀伯之有後故生則靈知長而純固既白而受采亦黃以通中天假不器之性人服自然之理而況於文雅緣飾志業孔修引伸足以長人動用足以利物既學從政其歸易形有方殊道以一貫人致一意而巳我乃萬目盡張故其始也以明經上第授彭州參軍事詢謀郡將器異甚厚所遇森然其言固矣如山之為始於覆簣如江之導終以方舟於是纍遷至於辥王友贊善大夫燕王築館以待士漢儲立苑以招賓當其推擇莫匪賢俊議者惟允而公在焉然由韞櫝隋和十城空其價踡局驥騄千里未之騁及其用也再入尚書郎遂為洛陽令三臺雅望一時精選舊章資以彌綸利器呈於盤錯出宰百里實推三河其賦政則必反於其身亦既誠信被之於物是為惠懷故雖二州餘弊憸巧而難理五郡尤劇權傾而多姦莫不可使由之令自求之善處中於下韝能合契於游刀丶至於釐舉風俗之謬裁正人倫之經務勸衣食之原調均徭賦之事本為巳任無間人言故視事踰四年通而不倦遺德在百姓久而益彰非夫明允宣和優柔博約自我之不忒為人之攸暨亦曷由臻茲厥有洛陽所謂賢令者則周紆王渙孔翊祝良公實續之誰其似之屬天子建中都營新邑資爾亞尹伊其董司朝選其人公首斯舉以故稍遷河中少尹且有後命廢府而復遷河南焉以公之歸從人之望官則改次政無易方以佐理王都以表則天下而年不克祚位不光寵遇暴疾而卒悲夫是歲有唐開元之九年春秋五十有六公以孝友為體一變而迪忠信以明恕為用再變而致循良故所行無擇所事無巧有恆其德終且溫溫不伐其功昭然赫赫所以遺愛固結必在何武之去稱誦斯深惟恐子産之死巳而神道欺而不福物情喪其所賴人之不幸今也云亡及喪之西歸則人吏致哀道路相屬得人心如此其旨可知冬十一月葬於北原後之人或者將遊於斯歎於斯彼其與歸我乃不朽矣其子八人長曰某次曰某家有太邱之德里以高陽之名夙構閔凶能哀傷以殆滅匪革其道懼功伐之不傳俾豫為文以敘孝子之志銘曰帛丿糸帛丿糸瓞少康遺烈靈則長兮莫莫葛藟王孫承祀世其昌兮而我實續如金如玉載錫光兮咨亞尹之德柔嘉維則揚令聞兮惟別駕之功邦國不空氓胥詠兮不競不絿不剛不柔以成政兮德之攸好神之所勞實降祥兮有美有度曷不允祚今則亡兮我著名節俾無泯滅惠無疆兮大唐有天下一百十三年開元十有八載龍集庚午冬十二月戊申開府儀同三司行尚書左丞相燕國公薨于位享年六十四嗚呼哀哉皇帝悼焉素服舉哀廢朝三日乃下制贈太師蓋師傅之舊恩禮有加也詔葬先遠喪事有日又特賜御詞表章琬炎公義有忘身之勇忠為社稷之衛文武可憲之政公侯作扞之勳皆巳昭昭於天文雖與日月爭光可矣公諱說字道濟范陽方城人晉司空壯武公之裔孫周通道館學士諱弋府君之曾孫慶州都督諱恪府君之孫贈丹州刺史刑部尚書諱騭府君之季子自上世積慶及公而祥發神明所府道德為樞生以寧濟幼而休祥鷹揚虎視英偉磊落越在諸生之中已有絶雲霓之望矣初天后稱制舉郡國賢良公時大知名拔乎其萃者也起家太子校書迄於左丞相官政四十有一而人臣之位極矣尚書國之理本公悉更之中書朝之樞密公亟掌之休聲與偕升降數四守正而見逐者一遇坎而左遷者二其餘總戎于外為國作藩所平除者惟幽并秉節鉞而巳至若三登左右丞相三作中書令唐興巳來朝佐莫比蓋聖賢之運有會師臣之道欲行人雖求多我每餘地馨香之發敷聞自久宜其翊戴聖后師範百寮功烈過於如神德聲出於咸一此固與版築崛起屠釣作合之類亦云異也公志元遠而性高亮未嘗自異會節乃有立何所不可體道以為宗既定國於一言亦保身之大雅其於經理代務雜以軍國決事如流應物如響紛綸輻輳其猶指掌及夫先聖微旨稽古未傳缺文必補墜禮咸甄與經籍為笙簧於朝廷為粉澤固不可詳而載也始公之從事實以懿文而風雅陵夷巳數百年矣時多吏議擯落文人庸引雕蟲沮我勝氣邱明有恥子雲不為乃未知宗匠所作王霸盡在及公大用激昂後來天將以公為木鐸矣斯文豈喪而今也則亡嗚呼克生以輔時而臣道不究致用以利物而人將安仰上撫牀以念往下輟相而哀至復見之於公焉太常議行諡曰文貞二十年秋八月甲申遷窆於萬安山之陽燕國夫人元氏祔焉夫人故尚書右司員外郎武陵公贈幽州都督諱懷景之女也動為柔範皆可師訓及公之貴連姻帝室雖處榮盛若非在已內執謙下外睦親踈古之賢明未始兼有開元十九年三月壬戌薨於東都康俗里第享年六十四長子均中書舍人次曰垍駙馬都尉衛尉卿季曰椒符寶郎泣血在疚皆我之有後也嗚呼元堂永閟何事春秋幽篆斯在亦云不朽而巳銘曰天有密命滋液百寶時無大賢誰與明道我公允叶我德孔昭翰飛戾天羽儀清朝功遂身謝名由實美言而有立古無不死南山之下詔葬於茲後之與歸惟我太師公諱慎交字某宏農華陰人也其先食采於楊因邑為氏始大於兩漢更盛於周隋司空觀德王士雄公之高祖也台階論道盟府書勳利建維城澤流後嗣洎右衛將軍贈兵部尚書府君諱嘉本纍葉炳靈六轡承祀而皆千里一舉逸翰所推五侯同拜貴戚莫比公即尚書之子也誕保中和克紹前烈幼以美秀兼大叔之文長而嘉聞增季友之業孝弟忠信蘊乎生知禮樂詩書成於時習弱冠以門子調補晉州參軍中宗之在春宮也妙才地將降天孫兼之實難而公惟允以選尚長寧郡主加朝散大夫拜通事舍人纍遷右衛郎將神龍元祀中興在運預聞大策克樹休勳而貴主宜家既增湯沐列侯傳國復錫山川至是始襲觀國公拜駙馬都尉左千牛衛將軍加上柱國纍遷祕書監兼太子賓客增秩金紫光祿大夫又特進散騎常侍右千牛將軍陝王傅坐事左出巴州刺史入為光祿卿復出為亳襄陳鄧四州刺史左轉鄜亳許絳四州別駕公性明敏有器韻不求虛譽而百行允修不矜小善而九能咸事至於入官從政東文西武才既兩可事亦百中且不恃貴以傷義不怙寵而廢公奉以周旋加之撝挹雖在降出無他悔吝此亦公之善自為謀以道終始者也開元十二年四月癸卯遘疾薨於絳郡之官舍春秋五十天子悼焉有制贈使持節都督亠兊州諸軍事亠兊州刺史仍遣使弔問令返葬京師率禮有加哀榮異數其年秋九月甲申葬於北原其孤曰某等㷀㷀在疚願圖遺烈後之人亦知范宣之世祿豈獨臧孫之立言銘曰巖巖太華作鎮西土祚我諸楊降生厥祖四代而立為漢元輔爰及礽裔克復先古猗嗟觀公不忝前人荷天休寵為國嘉姻王孫作儷帝子來嬪瓊敷玉潤輝映紛綸乃登王朝乃尊爵秩祿盈萬鍾賦食千室亦克畏滿亦以戒逸物更盛衰時有得失稟命不融斯人則亡天歸京兆地返連岡吁嗟此室徽音不忘
