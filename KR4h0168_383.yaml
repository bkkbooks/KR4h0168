front:
  text: 全唐文欽定全唐文卷三百八十三元結四
  hash: sha256:1d8dbf102cfe641a0b832fc6056e3b7b8b0c54aab198bfe614a99ba57e88ce39
body:
  text: 元子於山中尤所耽愛者有水樂水樂是南磳之懸水淙淙然聞之多久於耳尤便不至南磳即懸庭前之水取欹曲竇缺之石高下承之水聲少似聽之亦便銘曰烟纔通寒淙淙隔山風老鼓鐘議者多惑朱公叔第五興先所為故引之作辯惑二篇以喻惑者其意亦欲將辯惑與時人為勸懼之方昔南陽朱公叔為冀州刺史百城長吏多懼罪自去公叔不舉法彈理之聽其去官而已惑者曰公叔才達者也苟能威畏苟能逃罪當下自新之令不問前時之過公叔之為也是哉辯者曰嗚呼先王作法令蓋欲禁貪邪絕凶暴使人不得苟免是以惡蒙異世之誅善及子孫之賞若法令不行則無以沮勸苟失沮勸則賞罰何為嗚呼先王懼人民自相侵害故官人以理之加其爵祿使其富貴蓋為其能理養人民者也彼乃絕理養之心以殺奪為務去而不理而曰是乎豈有冠冕軒車佩符持節取先王典禮以為盜具將天下法令而為盜資乎致使金寶千囊財貨百車令彼盜類各為富家公叔不理奈何咨嗟昔第五興先為詔使舉奏刺史二千石蒙削免者甚眾興先以奉使稱職獲遷官焉惑者曰興先能糾劾過惡直哉使臣遷秩次也宜乎辯者曰夫理人貴久其法明其禁使人知常且長也漢家法不常耶禁不長耶何得興先暴將威令急操刑獄使蒙戮辱者如斯多乎若漢家天下法禁皆如冀州四方詔使皆如興先則亂生於令出禍作於遣使誰為惑者聽我商之嗚呼畏陷人於法故先於禁制有抵犯者理而刑之示其必常也人始知懼先王欲人自新故為善者賞之俾人勸而無懼然後乃理所以施賞罰於人民令似衣冠不可脫去如此慇懃乃能措刑殺致太平耳故曰賞善而不罰惡則亂罰惡而不賞善亦亂賞罰不行與過差必止若如此漢家之法在乎興先之為是也乎眾人之惑喻乎天寶丁亥中詔徵天下士人有一藝者皆得詣京師就選相國晉公林甫以草野之士猥多恐洩漏當時之機議於朝廷曰舉人多卑賤愚聵不識禮度恐有言里言汙濁聖聽於是奏待制者悉令尚書長官考試御史中丞監之試如常吏如吏部試詩賦論策已而布衣之士無有第者遂表賀人主以為野無遺賢元子時在舉中將東歸鄉人有苦貧賤者欲留長安依託時權徘徊相謀因諭之曰昔世已來共尚邱園潔白之士蓋為其能外獨自全不和不就饑寒切之不為勞苦自守窮賤甘心不辭忽天子有命聘之元纁束帛以先意薦論擁篲以導道欲有所問如咨師傅聽其言則可為規戒考其行則可為師範用其材則可為經濟與之權位乃社稷之臣君能忘此而欲隨逐駑駘入棧櫪中食下廏賢麧為人後騎負皁隸受鞭策耶人生不方正忠信以顯榮則介潔靜和以終老鄉人於是與元子偕歸於戲貴不專權罔惑上下賤能守分不苟求取始為君子因喻鄉人得及林甫言意可存編為喻友元子門人叔將出遊三年及還元子問之曰爾去我久矣何以異乎諾曰叔將始自山中及長安見權貴之盛心憤然切悔比年於空山窮谷與夫子甘饑寒愛水木而已不數月自王公大人卿相近臣之門無不至者及一年有向與歡宴過之可弔有始賀拜侯已聞就誅豈不裂封疆土未識豈無印綬懷之未暖其客得祿位者隨死得金玉者皆孥參遊讌者或刑或免叔將之身如犬逃者五六似鼠藏者八九當其時環望天地如置在杯斗之中元子聞之歎曰叔將汝何思而為乎汝若思為社稷之臣則非正直不進非忠讜不言雖手足斧鉞口能出聲猶極忠言與氣偕絕汝若思為祿位之臣猶當避赫赫之路晦顯顯之機如下廏粟馬齒食而已汝忽然望權勢而往自致身於刑禍之方得筋骨載肉而歸幸也大矣二三子以叔將為戒乎州舒吾問元子曰吾聞子多矣意將何為對曰雲山幸不求吾是林泉又不責吾非熙然能自全順時而老可矣復安為哉舒吾曰元子其過誤乎其太矯也吾厭世人飾言以由道藏智以全璞退身以顯行設機以樹名吾子由之使我何信元子俛而謝之滕許大夫友元子聞不應舒吾之說乃曰嗟嗟元子少辭者邪何不曰使吾得所處但如山林不見吾是非吾將娭而往也以子為飾言藏智退身設機何不曰如此豈不多於盜權竊位蒙汙萬物富貴始及而刑禍促之者乎元子謝不及季川問曰兄終不復二論兄有意乎於戲季川吾有言則自是言達則人非吾安能使吾身之有是而令他人之有非至於聞聞也哉元子友倚於雲邱之巔戲牧兒曰爾為牧歌當不責爾暴牧兒歌去乃暴他田田主鞭之啼而冤元子啼不止召其父而止之元子友真卿聞之書過於元子曰嗟嗟次山苟戲小兒俾陷鞭焉而蒙冤之彼牧兒望次山猶儓隸不敢干其主及苟戲乃或與次山猶仇讐斯豈慎德也歟吾聞君子不苟戲無似非如何惑一兒使不知所以蒙過此非苟戲似非之非者邪惡不必易此元子報真卿曰於戲吾獨立於空山之上戲歌牧兒得過幾不可免彼行於世上有愛憎相忌是非相反名利相奪禍福相從至於有蒙戮辱者焉得不因苟戲似非世兒惑之以及者乎真卿吾當以戲為規元子病遊世歸於商餘之中以酒自肆有醉歌里夫公聞之酉多元子之酒請歌之歌曰元子樂矣俾和者曰何樂亦然何樂亦然我曰我雲我山我林我泉又曰元子樂矣俾和者曰何樂然爾何樂然爾我曰我鼻我目我口我耳歌已矣夫公曰自樂山林可也自樂耳目何哉人誰無此元子引酒當夫公曰勸君此杯酒緩飲之聽我說子行於世間目不隨人視耳不隨人聽口不隨人語鼻不隨人氣其甚也則須封苞裹塞不爾有滅身亡家之禍傷汙毀辱之患生焉雖王公大人亦不能自主口鼻耳目夫公何思之不熟耶乾元己亥漫叟待詔在長安時中行公掌制在中書中書有醇酒時得一醉醉中叟誕曰願窮天下鳥獸蟲魚以充殺者之心願窮天下醇酎美色以充欲者之心中行公聞之歎曰子何思不盡耶何不曰願得如九州之地者億萬分封君臣父子兄弟之爭國者使人民免賊虐殘酷者乎何不曰願得布帛錢貨珍寶之物溢於王者府藏滿將相權勢之家使人民免饑寒勞苦者乎叟聞公言退而書之授於學者用為時規元子家有乳母為圓轉之器以悅嬰兒嬰兒喜之母使為之聚孩孺助嬰兒之樂友人公植者聞有戲兒之器請見之及見之趨焚之責元子曰吾聞古之惡圓之士歌曰寧方為皁不圓為卿寧方為汙辱不圓為顯榮其甚者則終身不仰視曰吾惡天圓或有喻之以天大無窮人不能極遠視四垂因謂之圓天不圓也對曰天縱不圓為人稱之我亦惡焉次山奈何任造圓轉之器恣令悅媚嬰兒小喜之長必好之教兒學圓且陷不義躬自戲圓又失方正嗟嗟次山入門愛嬰兒之樂圓出門當愛小人之趨圓吾安知次山異日不言圓行圓動圓靜圓以終身乎吾豈次山之友也元子召季川謂曰吾自嬰兒戲圓公植尚辱我言絕忽乎吾與汝圓以應物圓以趨時非圓不預非圓不為公植其操矛㦸刑我乎元子時與鄰里會曲全當時之歡以順長老之意歸泉上叔盈問曰向夫子曲全其歡道然也苟為爾乎元子曰叔盈視吾曲其心以徇財利曲其行以希名位當過吾吾苟全一歡於鄰里無惡然可也東邑有全直之士聞元子對叔盈恐曰吾聞元次山約其門人曰無惡我之小曲真惛鄙惡辭也吾輩全直三十年未嘗曲氣以轉聲曲辭以達意曲步以便往曲視以回目猶患於古人古人有惡曲者不曲臂以取物不曲膝以便坐見天下有曲於君曲於民曲於鬼神者往劫而死之今元次山苟曲言貌強全一歡以為不褻其直慁哉若能苟曲於鄰里強全一歡豈不能苟曲於鄉縣以全言行能苟曲於鄉縣豈不能苟曲於邦國以彰名譽能苟曲於邦國豈不能苟曲於天下以揚德義若言行名譽德義偕顯豈有鍾鼎不入門權位不在已乎嗚呼曲為之小為大之漸曲為之也有何不可姦邪凶惡其繇乎元子聞之頌曰吾以顏貌曲全一歡全直君子之惡我如此由有過於此者何以自免或有將元子水樂說於司樂氏樂官聞之謂元子曰能和分五音韻諧水聲可傳之來請觀學元子辭之使門人以南磳及庭前懸水指之樂氏醜惡慢罵曰韻聵多矣焉有聽而云樂乎此言聞元子元子謝曰次山病餘惛固自順於空山窮谷偶有懸水淙石泠然便耳醉甚或與酒徒戲言呼為水樂不防君子過聞而來實汙辱君子之車僕樂官去季川問曰向先生謝樂官不亦過甚曰然吾為汝訂之汝豈不知彼為司樂之官老矣八音教其心五聲傳其耳不得異聞則以為錯亂紛惑甚不可聽況懸水淙石宮商不能合律呂不能主變之不可會之無由此全聲也司樂氏非全士安得不甚謝之嗟乎司樂氏欲以金石之順和絲竹之流妙宮商角羽豐然迭生以化全士之耳猶以懸水淙石激淺注深清瀛㴩溶不變司樂氏之心嗚呼天下誰為全士能愛夫全聲也浪翁山野浪老也聞元子亦浪然在山谷病中能記水石草木蟲豸之化亦來說常所化凡四說浪翁曰陰陽之氣化為四時四時之行化為萬物萬物形全是無化有萬物形盡是有化無此有無相化之說浪翁曰人或云我立於東西望萬里目極則無人我兩忘終世相無此有無有無相化之說浪翁曰人或云我來於南北行萬里至無不有人我兩求終世相有此無有無有相化之說浪翁曰吾觀化於無也何無不有吾觀化於有也何有不無有無更化日以相化化言何極化言何窮元子聞浪翁說化化無窮極因論諭曰翁亦未知時之化也多於此乎曰時焉何化我未之記元子曰於戲時之化也道德為嗜慾化為險薄仁義為貪暴化為凶亂禮樂為耽淫化為侈靡政教為煩急化為苛酷翁能記於此乎時之化也夫婦為溺惑所化化為犬豕父子為惛慾所化化為禽獸兄弟為猜忌所化化為讐敵宗戚為財利所化化為行路朋友為世利所化化為市兒翁能記於此乎時之化也大臣為威權所恣忠信化為奸謀庶官為禁忌所拘公正化為邪佞公族為猜忌所限賢哲化為庸愚人民為征賦所傷州里化為禍邸姦凶為恩幸所迫廝皁化為將相翁能記於此乎時之化也山澤化為井陌或曰盡於草木原野化為狴犴或曰殫於鳥獸江湖化為鼎鑊或曰暴於魚鼈祠廟化為宮寢或曰數於祀禱翁能記於此乎時之化也情性為風俗所化無不作狙狡詐誑之心聲呼為風俗所化無不作諂媚僻淫之辭顏容為風俗所化無不作奸邪蹙促之色翁能記於此乎浪翁聞元子說時化歎曰吾昔聞世化可說又異於此昔世之化也天地化為斧鑕日月化為豺虎山澤化為州里草木化為宗族風雨化為邸舍雪霜化為衣裘呻吟化為常聲糞汚化為梁肉一息化為千歲烏犬化為君子元子惑之浪翁曰子不聞往昔世之化也四海之內巷戰門鬬斷骨腐肉萬里相藉天地非斧鑕也邪人民暗夜盜起求食晝游則死傷相及日月非豺虎也邪人民相與寄身命於絕崖深谷之底始能聲呼動息山澤非州里也邪人民奔走非深林薈叢不能藏蔽草木非宗族也邪人民去鄉國入山海千里一息力盡暫休風雨非邸舍也邪人民相持於死傷之中裸露而行霜雪非衣裘也邪人民勞苦相冤瘡痍相痛老弱孤獨相苦死亡不相救呻吟非常聲也邪人民多饑餓溝瀆痛傷道路糞汚非梁肉也邪人民奔亡潛伏戈矛相拂前傷後死免而存者一息非千歲也邪僵主腐卿相枕路隅鳥獸讓其骨肉烏犬非君子也邪古者純公以惛愚聞或曰公知聖人之道天子聞之咨而問焉公謝曰臣生自山野順時而老心如草木身若鳥獸主君所問臣安能知請說所聞惟主君聽之臣曾記有說風化頹弊或以之興或以之亡者不知何代君臣其臣曰上古之君用真而恥聖故大道清粹滋於至德至德蘊淪而人自純其次用聖而恥明故乘道施教修教設化教化和順而人從信其次用明而恥殺故沿化興法因教置令法令簡要而人順教此頹弊以昌之道也迨乎衰世之君先嚴而後殺乃引法樹刑援令立罰刑罰積重其下畏恐繼者先殺而後淫乃深刑長暴酷罰恣虐暴虐日肆其下須繼者先淫而後亂乃乘暴至亡因虐及滅亡滅兆鍾其下憤凶此頹弊以亡之道也其君歎曰嗚呼真聖之風沒無象耶明順之道誰為嗣耶嚴正之源開已竭耶殺淫之流日深大耶吾其頌昌人之道為戒心之寶天子聞之丨弱然不娭冥然深思乃曰昌人之道豈無故歟公其演之其故何如公曰嗚呼頹弊以昌之道其由上古強毀純樸強生道德使興云云使亡惛惛始開禮樂始鼓仁義乃有善惡乃生真偽然後勤儉之風發而逾扇嚴急之教起而逾變須智謀以引喻須信讓以敦護是故必垂清淨必保公正所謂聖賢相逢瀛瀛溶溶不放不封乃見禁而無殺順而無訛猗恞優游尚致平和嗚呼頹弊以亡之故其由中古轉生澆眩轉起邪詐變其娭娭驅令嗤嗤則聞溺惑則見凶侈遂長淫靡然後忿爭之源流而日廣慘毒之根植而彌長用苛酷以威服用諂諛以順欲是故皆恣昏虐必生亂惡所謂庸愚相遭諠諠囂囂以悲以號乃見苦而彌怨逆而彌悖撣援玄挻轉扇不歇天子感之欸然歎曰噫聖賢孤獨生不駢世蒼蒼四海生類誰濟公曰嗚呼不可遂已聖人須極道於常臣賢人須滋德於庸君使道德優優不豐不紛乃須殺而不淫罰而不重戒其虐惑制其昏縱天子聞之惘然思而歎曰太皇之道於今已亡衰季之德吾不忍當將學殺而不淫罰而不重戒其虐惑制其昏縱行之之道惟公教之公曰於明主君斯道未易猗明主君斯道良難敢為主君商較其端夫王者其道德在清純元粹惠和溶油不可慁會盪爌衰傷元休其風教在仁慈諭勸禮信道達不可沿以澆浮溺之淫末其衣服在禦於四時勿加敗弊不可積以綺繡奢侈過制其飲食在備於五味示無便耽不可煎熬珍怪尚惑所甘其器用在絕於文彩敦尚素朴不可駢鈿珠貝肆極侈削其宮室在省費財力以免隘陋不可殫窮土木叢羅聯構其苑囿在合當制度使人無厭不可牆塹肥饒極地封占其賦役在簡薄均當使各勝供不可橫酷繁聚損人傷農其刑法在大小必當理察平審不可煩苛暴急殺戮過甚其兵甲在防制戎夷鎮服暴變不可怙恃威武窮黷爭戰其畋獵在順時教校不追以驅不可騁於殺害肆極荒娛其聲樂在節諧八音聽聆金石不可耽喜靡慢宴安淫溺其嬪嬙在備禮供侍以正後宮不可寵貴妖豔惛好無窮其任用在校掄材能察視邪正不可授付非人甘順姦佞其郊祀在敦本廣敬展誠重禮不可淫慢禱祈僻有所係其思慮在慎於安危誡其溢滿不可沈溺近習肆任談誕如此順之為明聖逆之為凶虐可以觀乎興廢可以見乎善惡純公言已天子謝曰公之所述真王者之謨必當篆刻置之座隅元子常自愧不如孩孺不如宵寐又不如病又不如醉有思慮不如靜而閑有喜愛不如忘其情及其甚也不如草木此意多顯於元子者或曰訂如是不如則不如也不如如者止於此乎元子於是系之於人事縯之於此喻始為七不如不如之義始極也元子以為人之毒也毒於鄉毒於國毒於鳥獸毒於草木不如毒其形毒其命毒其姻戚毒其家族者爾於戲毒可頌也乎哉毒有甚焉何如元子以為人之媚也媚於時媚於君媚於朋友媚於鄉縣不如媚於廏媚於室媚於市肆媚於道路者爾於戲媚可頌也乎哉媚有甚焉何如元子以為人之詐也詐於忠詐於信詐於仁義詐於正直不如詐於愚詐於弱詐於貧賤詐於退讓者爾於戲詐可頌也乎哉詐有甚焉何如元子以為人之惑也惑於邪惑於佞惑於姦惡惑於兇暴不如惑於狂惑於誕惑於翫弄惑於諧戲者爾於戲惑可頌也乎哉惑有甚焉何如元子以為人之貪也貪於權貪於位貪於取求貪於聚積不如貪於德貪於道貪於閑和貪於靜順者爾於戲貪可頌也乎哉貪有甚焉何如元子以為人之溺也溺於聲溺於色溺於圓曲溺於妖妄不如溺於仁溺於讓溺於方直溺於忠信者爾於戲溺可頌也乎哉溺有甚焉何如元子以為人之忍也忍於毒忍於媚忍於詐惑忍於貪溺不如忍於貧忍於苦忍於棄汚忍於病廢者爾於戲忍可頌也乎哉忍有甚焉何如天寶癸巳元子作訂古訂古前世君臣父子兄弟夫婦朋友之道於戲上古失之中古亂之至於近世有窮極凶惡者矣或曰欲如之何對曰將如之何吾且聞之訂之嗟之傷之泣而恨之而已也吾觀君臣之間且有猜忌而聞疑懼其由禪讓革代之道誤也故後世有劫篡廢放之惡興焉嗚呼即有孤弱將安託哉即有功業將安保哉吾觀父子之際且有悲感而聞痛恨其由聽讒受亂之意惑也故後世有幽毒囚殺之患起焉嗚呼即有深慈將安興哉即有至孝將安訴哉吾觀兄弟之中且有鬬爭而聞殘忍其由分國異家之教薄也故後世有陰謀誅戮之害生焉嗚呼即有友悌將安用哉即有恭順將安全哉吾觀夫婦之道且有冤怨而聞嫌妬其由耽淫惑亂之情多也故後世有滅身忘家之禍發焉嗚呼即有信義將安及哉即有柔順將安守哉吾觀朋友之義且有邪詐而聞忌患其由趨勢近利之心甚也故後世有窮凶極害之刑生焉嗚呼即有節分將安與哉即有方正將安容哉天寶庚寅元子初習靜於商餘人聞之非非曰此狂者也見則茫然無幾人聞之是是曰此學者也見則猗然及三年人聞之參參曰此隱者也見則崖然有惑而問曰子其隱乎曰吾豈隱者邪愚者也窮而然爾或者不喻遂為述時命以辯之先曾為述居一篇因刊而次之總命曰自述昔隋氏逆天地之道絕生人之命使怨痛之聲滿於四海四海之內隋人未老隋社未安而隋國已亡何哉奢淫暴虐昏惑而已烝人苦之上訴皇天皇天有命於我國家六葉於茲高皇至勤文皇至明身鑒隋室不敢滿溢清儉之深聽察之至仁惠之極泱泱洋洋為萬代則聖皇承之不言而化四十餘年天下太平禮樂化於戎夷慈惠及於草木雖奴隸齒類亦能誦周公孔父之書說陶唐虞夏之道至於歌頌謳吟婦人童子皆紓性情美辭韻指詠時物與絲竹諧會綺羅當稱况世貴之士博學君子其文學聲望安得不顯聞於當時也哉故冠冕之士傾當時大利軒車之士富當時大農由此知官不勝人逸於司領使秩次不能損又休罷以抑之尚駢肩累趾受任不暇予愚愚者亦嘗預焉日覺抵塞厭於無用乃以因慕古人清和蘊純周周仲仲瘱然全真上全忠孝下盡仁信內順元化外娭太和足矣如戚促蚩諸封蒙遏滅暮為朝貴心所不喜亦由金可鎔不可使為汚腐水可濁不可使為塵糞然已鄙語曰愚者似直弱者似仁子殆有之夫復何疑元子嘗問命於清惠先生先生曰子欲知命不如平心平心不如忘情喏曰幸先生教之先生曰夫平心能正是非忘情能滅有無子何先焉曰請先忘情先生曰子見草木乎子見天地乎草木無心也天地無情也而四時自化雨露自均根柢自深枝幹自茂如是天地豈醜授而成哉草木豈憂求而生哉人之命也亦由是矣若夭若壽若貴若賤烏可強哉不可強也不可強也不如忘情忘情當學草木嗚呼上皇強化天下天下化之養之以道德道德偽薄天下亦從而偽薄嗚呼後王急濟天下天下從之救之以權宜權宜侈惡天下亦從而侈惡故赴貪徇紛急之風以至於今聖賢者兢兢然猶傷命性愚惑者慁慁然遂忘家國其由不審不通醜授憂求而已子不喻乎天寶庚寅元子得商餘之山山東有谷曰餘中谷東有山曰少餘山谷中有田可耕藝者三數夫一夫百畝有泉停浸可畦稻者數十畝泉東南合肥溪溪源在少餘山下溪流出谷與潀水合匯於滍將成所居故人李才聞而來會乃歎曰吾未始知夫子之所至焉今知之矣吾聞在貧思富在賤思貴人之常情也聖賢所有然而知貧賤不可苟免富貴不可苟取上順時命乘道御和下守虛澹修已推分稱君子者始不忝乎乃相與占山泉闢榛莽依山腹近泉源始為亭廡始作堂宇因而習靜適自保閑夫人生於世如行長道所行有極而道無窮奔走不停夫然何適予當乘時和望年豐耕藝山田兼備藥石與兄弟承歡於膝下與朋友和樂於琴酒寥然順命不為物累亦自得之分在於此也天寶十三年元子從兄前魯縣大夫德秀卒元子哭之哀門人叔盈問曰夫子哭從兄也哀不亦過乎禮歟對曰汝知禮之過而不知情之至叔盈退謂其徒曰夫子之哭元大夫也兼師友之分亦過矣元子聞之召叔盈謂曰吾誠哀過汝所云也元大夫弱無所固壯無所專老無所存死無所餘此非人情人情所耽溺喜愛似可惡者大夫無之如戒如懼如憎如惡此其無情此非有心士君子知焉不知也吾今之哀汝知之焉而不知也嗚呼元大夫生六十餘年而卒未嘗識婦人而視錦繡不頌之何以誡荒淫侈靡之徒也哉未嘗求足而言利苟辭而便色不頌之何以誡貪猥佞媚之徒也哉未嘗主十畝之地十尺之舍十歲之童不頌之何以誡占田千夫室宇千柱家童百指之徒也哉未嘗皁布帛而衣具五味而食不頌之何以誡綺紈梁肉之徒也哉於戲吾以元大夫德行遺來世清獨君子方直之士也歟乾元已亥贊善大夫左振出為黃州刺史下車黃人歌曰我欲逃鄉里我欲去墳墓左公今既來誰忍棄之去於戲天下兵興今七年矣淮河之北千里荒草自關已東海濱之南屯兵百萬不勝征稅豈獨黃人能使其人忍不去者誰曰不可頌乎後一歲黃人又歌曰吾鄉有鬼巫惑人人不知天子正尊信左公能殺之於戲近年以來以陰陽變怪將鬼神之道罔上惑下得尊重於當時者日見斯人黃之巫女亦以妖妄得蒙恩澤朝廷不問州縣惟其意公忿而殺之則彼可誅戮豈獨巫女如左公者誰曰不可頌乎三拜遷侍御史判金州刺史將去黃人多去思故為黃人作表如左氏世系左公歷官及黃之門生故吏與巫女事則南陽左公能悉記之乾元庚子元子理兵於有泌之南泌南至德丁酉為陷邑乾元已亥為境上殺傷勞苦言可極耶街郭亂骨如古屠肆於是收而藏之命曰哀邱或曰次山之命哀邱也哀生人將盡而亂骨不藏者乎哀壯勇已死而名跡不顯者乎對曰非也吾哀凡人不能絕貪爭毒亂之心守正和仁讓之分至令吾有哀邱之怨歟上元二年置南都於荊州為江陵府使舊相東平呂公為江陵尹兼御史大夫分峽中湖南及武陵澧陽巴陵凡一十七州為荊南節度觀察使公理荊南三年年五十一薨於官嗚呼使公年壽之不將也天其未厭兵革不愛蒼生歟公明不盡人之私惠不取人之愛威不致人之懼令不求人之犯正不形人之僻直不指人之恥故名不異俗跡不矯時內含端明外與常規其大雅君子全於終始者邪公所以進退其身人不知其道公所以再在台衡人不知其德頌元化者誰與頌乎於戲公將用於人而不見其用人將得於公而公忘其所得乎結等跡參名業嘗在幕下將紀盛德示於來世故刻金石留於此邦泝樊水二百餘里有湧溪入溪八九里有蛇山之陽是惠公禪居禪師以無情待人之有情以有為全已之無欲各因其性分莫不與善知人困窮喻使耕織因人災患勸守仁信故閭里相化恥為弋釣日勤種植不五六年沮澤有溝塍荒皋有阡陌桑果竹園如伊洛間所以愛禪師者無全行無全道豈能及此鄉人欲增修塔廟託禪師以求福禪師亦隨人之意而制造焉直門臨溪廣堂背山庭列雙臺修廓夏寒松竹蒼蒼周流清泉岑嶺複抱眾山回旋斯亦曠絕之殊境矣吾以所疑咨於禪師禪師曰我恐人忘善以事誘人及人將善固不以事為累吾以所惑咨於禪師禪師曰公若以惑相問我亦惑於問焉公若無惑我亦何對於戲吾漫浪者也焉能盡禪師之意乎縣大夫孟彥深王文淵識名顯當世必能盡禪師之意故命之作贊贊曰聖者忘跡達人化心惠公之妙無得而尋如山出雲如水涵月惠公得之演用不竭無情之化可洽㣥黎將引天下同於湧溪癸卯歲岳州刺史夏侯公沒於私家門人弟子愛思不忘願旌遺德將顯來世會予詔許優閑家於樊上故為公作表庚子中公鎮岳州予時為尚書郎在荊南幕府嘗因廉問到公之州其時天下兵興已六七年矣人疲州小比太平時力役百倍公能清正恕靜以理之故其人安和而服悅為當時法則及公罷歸州里公家與吾相鄰見公在州里與山野童孺與當道辭色均若語是非得喪語夭壽哀樂戀意澹然吾是以知道勝於內者物莫能撓德充於外者事不能誘公之所至其獨有乎於戲公既壽而貴保家全歸於今之世誰不榮羨至於公之世嗣與公官則本縣大夫李公狀著之矣有唐乙巳歲使持節道州諸軍事守道州刺史元結以虞舜葬於蒼梧九疑之山在我封內是故申明前詔立祠於州西之山南已而刻石為表於戲孔氏作虞書明大舜德及生人之至則大舜於生人宜以類乎天地生人奉大舜宜萬世而不厭考大舜南巡之年時已一百一十二歲矣自中國至蒼梧亦幾有萬里蒼梧山谷深險可懼帝竟入而不回至今山下之人不知帝居之宮帝葬之陵嗚呼在有虞氏之世人民可奪其君耶人民於大舜能忘而不思耶何為來而不歸何故死於其山吾實惑而作表來者遊於此邦登乎九疑誰能不惑也歟乙已歲潭州刺史崔瓘去官州人衡州司功參軍鄭浰為鄉人某等請余為崔公作表公前在澧州謠頌之聲達於朝廷裦異之詔與人為程及領此州在今日能使孤寡老弱無悲憂單貧困窮安其鄉富豪強家無利害賈人就食之類各得其業職役供給不匱人而當於有司若非清廉而信正直而仁則不能至於觀察御史中丞孟公奏課又第一會國家以犬戎為虞未即徵拜使蒼生正暍而去其庥廕使蒼生正渴而敝其清源時艱道遠州人等不得詣闕冤訴且欲刻石立表以彰盛德嗚呼刺史有土官也千里之內品形之屬不亦多乎豈可令凶豎暴類貪夫奸黨以貨權家而至此官如崔公者豈獨真刺史耶鄭浰之為豈苟媚其君而私於州里耶蓋懼清廉正直之道溺於時俗君子遺愛之心不顯來世故采其意而已矣永泰丙午中處士張秀卒於戲吾嘗驗古人將老死巖谷遠跡時世者不必其心皆好山林若非介直方正與時世不合必識高行獨與時世不合不然則剛褊傲逸與時世不合彼若遭逢不容則身不足以為禍將家族以隨之至於傷汚毀辱何足說者故使之矯然絕世逃其不容直為逸民竟為退士枕石飲水終身而已當時之君欲以祿位招之有土之官欲以厚禮處之彼驚懼抗絕而去時之見能如此所以尤高尚焉嗚呼處士與時不合者耶而未能矯然絕世遭以禮法相檢不見容悲夫
