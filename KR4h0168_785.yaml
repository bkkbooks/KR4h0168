front:
  text: 全唐文欽定全唐文卷七百八十五穆員三
  hash: sha256:85ab7fb063a16b8d18bbe9944139917b553596434e200022a315fbc260c681f5
body:
  text: 公姓梁氏諱慎初字智周其先安定烏氏人高祖曰宜春郡公諱某當隋末喪亂豪傑並興其宗人師都雄據朔方自號梁王置百官以宜春為宗正有唐貞觀初梁亡梁宜春首謀率其黨來降拜金紫光祿大夫右金吾衛大將軍贈涼州牧涼州生左千牛衛諱叔裕千牛生太子司議郎諱穆之議郎生頓邱令名犯肅宗廟諱頓邱生公少孤家貧落魄不得就經學既冠有勇力以弧矢為事性嚴直方不苟合於時博物涉史書一覽歷代成就山川地形攻守奇正之術巳而天寶末函夏寇亂西平王哥舒翰之守潼關也公上書論兵勢且勸深壁不戰以挫賊鋒西平異之命居戲下表授左武衛胄曹四遷至左衛郎將時賊臣當國而與幕府不協公曰難將至矣遂間行而南無何西平潰敗公嘗善岐國公魯炅炅方守襄鄧乃往從之表遷右羽林中郎將屢以果鋭為軍前鋒而搴旗陷堅者四五敷奏岐下帝甚嘉之録前後功超拜左衛軍加號冠軍封鶉觚縣開國公既拜命而告人曰徒以蠢爾材力遭亂乘勢以獲爵位傳曰無德而祿殃也吾懼及焉遂移疾請告解印綬退耕於野春秋若干以寶應二年秋八月寢疾於河內薨於私館沒顧命嗣子賁曰始愛夫太行山之陽將營而老焉又常懼蹈白刃不獲墓墳今幸以天年終宜從吾志薄葬於此縱汝不忍為元晏故事當斂以時服有棺而無槨可也是歲卜筮不吉至大歷九年冬十二月賁始奉先公之裳帷以安宅焉夫陳力就列之謂忠見機不仕之謂智名遂身退之謂達全而歸之之謂孝夫如是宜刻貞石遺於後嗣是吾宗也實能言之銘曰肅肅鶉觚敬義直方履柔履剛出處行藏與時弛張弧矢之利以從王事乃行其志允焯厥位帝命將軍受茲蒲璧鞗革金革厄乃蔚乃赫人鮮克終獨守謙沖繒繳不及冥冥高鴻於嗟鶉觚生也有涯令聞無窮唐貞元五年秋七月汝州防禦使汝州刺史兼御史大夫東都畿汝州都防禦左軍兵馬靜戎郡王陳公疽發首已酉命牙門將鮮于侍進奉書告辭元戎尚書安平公以受恩忘死非其死為恨又命嘗同百戰之將王進達等十餘人以忠藎王事為別又命嗣子少英以孝敬繼夫人為誡庚戌歸於私第辛亥薨八月孤少英與家老故吏及龜筮謀得宅兆於州東石樓山之陽辛酉葬公諱利貞范陽人祿山之亂始自平盧越海歸國纍建戎效從太尉臨淮王光弼軍於河南寇攻雎陽垂陷太尉常遣心腹爪牙之師郝廷玉合諸侯之衆趨之公輒以輕騎赴如林之旅入其腹出其背如飇如星庭玉奇公之才謂已不逮拔於行間以其子妻之繩於臨淮列為重將其後庭玉入備宿衛出鎮河隴公實從之凡十遷大將軍太常卿太子賓客特進開府靜戎郡王至御史中丞隴右都知兵馬使其所置者皆如釋宋之事希烈之亂詔以哥舒曜為汝洛節制俾公之前隊佐之軍次汝墳不終日城拔又以次襄郟寇軍大至公以馬步五百當強寇萬人立為奇兵橫擊其右凶黨退卻數月不前襄城守拒有備由此效也希烈自統豺狼之衆至而圍合矢石雨下晝夜不息外築甬道與城相屬公登陴捍敵身均士卒勞則先之逸則後之凡不櫛不沐非以我事當見戎帥不下城者七十餘日戎帥蒼皇自拔亂不能遏叛將庭芝謀害之者數四陰為之制使不得發俄而朱泚以關中僭逆凡幽薊河隴之卒嘗隸於泚千里之外應之公與庭芝所統皆泚之舊也庭芝果以其衆作亂公之麾下亦帶甲而從之中宵難作公仗劒當轅門而立呼曰如有過此門者當殺我而後過由是其衆定而庭芝逸故有專城之拜其為州也奉上以不違撫下以不擾是以廉使盡其政疲人安其理春秋五十有八前後歷官二十二封爵四從戎許國垂四十年不須臾忘忠敬之心不一日蹈汙染之迹起鼓鞞之下登諸侯亞相與茂勳寵祿相與終始可不謂之大丈夫之致乎安平公出涕之外復有餘慟將吏等遑遑相弔往往如在前夫人早夭後夫人隴西辛氏實大原節度相國金城王之女髽首類血以庀喪具長子少英幼子壬癸永懷陵谷見託為銘其詞曰蒼蒼平原鬱鬱高墳下有泉戶永閉虎臣豈伊虎臣亦曰賢守勒銘貞石示千古後有唐循吏故舒州刺史滎陽鄭府君諱甫字某享年五十有四歷官一十有二以貞元六年冬十月辛丑卒於東都崇讓里第十一月諸孤家老得請於元龜奉府君之喪歸祔於祖實鄭州滎澤縣廣武原庚寅下其先史足徵也十代祖煜元魏建威將軍南陽公魏氏定五姓冠百族煜以官婚人物甲於時選厥後歷周隋洎皇朝凡六葉至於曾祖仁愷密亳二州刺史祖慈明銀青光祿大夫濠州刺史考令璡銀青光祿大夫國子祭酒重名貴仕照燭相續府君少以門資奉俎豆於太廟調習書判超等擢祕書省校書郎歷京兆府藍田尉大理評事二宗山陵詔求多士以集大務攝京兆府戶曹參軍畢事改授大理司直遷監察御史實佐時宰充營田使判官轉殿中侍御史罷授尚書祠部員外郎兼侍御史充宣歙青苗稅戶使朝於京師拜和州刺史廉使今居守公奏課第一錫命屢降凡兩加特階一賜金印紫綬且以借留之典副之後遷舒州刺史而歷陽之績纍載之美布於下車之初乃至訟不煩於聽令不費於言賦調事理吏勸人逸初祭酒府君殞於鎬惟王事世故洎龜筮之不叶未遑還葬至是纍疏陳乞優詔曰俞解印遄歸遘癘於道哀哉夫人清河崔氏故中書令趙國公圓之子也以地之貴天之淑致善乎府君之家不幸早世殯於所次俟夫異日遷而合焉有子九人長男曰適左衛率府倉曹參軍次曰奉方志於學未齔有女二曰闕長適范陽盧士深妻未笄者四其執喪致毀長過於禮幼如成人兄子前鄉貢進士權遵諸孤之請見訪為志嗚呼今方夏之內靡攻伐之患蒸嘗所匱在於富而教之府君之生蓋明主歎息之所求也其歿也豈獨舒人和人之相弔歟迹其二府巳然之理可使太史公班孟堅之徒從而紀之以及於後今也遺愛故事結於人之深者止於輟舂墮淚日月至而逝焉然則銘之於墓亦其次也銘曰生貴行道道貴及物苟有可稱其誰不沒猗歟府君政乃生人自我煦育二邦如春不知者命溘至孔殛託體山河與之終極公諱盛字某河南洛陽人魏昭成帝之十二代孫皇朝金紫光祿大夫司膳卿汝陽公善應之曾孫集州司馬崇敏之孫處士履清之季子生五十有五年官歷憲府法寺宰邑掾京者十政以貞元十一年六月十五日卒於東都綏福里第十月四日孀妻孤女奉喪歸葬於偃師首陽山之北原嗚呼哀哉公忠竭於事上孝終於報親許與然諾著於氣類其草泣官也剛決堅利致用如金易人之所難敢人之所畏纍佐戎府獨步神州肅肅羽儀方漸於陸何年官偕半而不知者命迫焉初處士府君之逝也公二兄孟幼仲嬰公方孕太夫人則我伯姑來歸於我惟是內外同氣兄無常弟弟無常兄入學過庭雁行三紀既而從官方始異門孟仲早落公終養焉嗚呼我伯姑深仁如天高行鄰古昔有三子今無一孫悠悠彼蒼與善焉在仁人之祀奄焉忽諸夫人河東柳氏從公致養奉公歸祔存沒成公之志賢乎哉女子藐爾未笄煢然主奠聞者悲之公方大漸以埏之銘見託何以為報哀而不文銘曰歸全舊邱列侍先人有知當樂無知返真公諱某字某其先事具梁史蓋宣武皇帝七代孫也曾祖文憬皇朝朝散大夫湖州司馬祖元禮湘州刺史贈太子詹事父詮大理評事昭穆相遺者曰清白孝友人稱之君幼以明經登第洎天下多事投家遠迹而所至聞焉或吏或賓報之如一歷任曹州冤句杭州富陽二邑轉都水監主簿左金吾衛兵曹調大理評事地官司國計使臣督王賦迭咨公以分其重公受命事集而輿頌隨之劒南節度使表公成都功曹掾兼佐蜀州戎事錫以章紱不幸遇疾退間於荊楚之間貞元八年歸故國於洛汭秋九月十四日終於康裕里第春秋五十八其冬十月二日遷祔於某縣某鄉從先公居公之志也公之生也和其發也清其行也晦其用也明其文也餘力其學也存誠其從事也口不言祿其為善也心不近名是故歷仕無報勞之寵終身無充量之榮汨沒下位摧頽壯齡傳曰天下有道貧且賤焉恥也若乃道富而家貧德貴而身賤才合而奇迹高位下恥在夫天焉如蕭公者處退而退求仁得仁焉恥焉既非所恥則又何怨夫人某郡暢氏故尚書左丞某之子昔佐公義今成公家生男四人三子早夭一子曰範方齠而嗣毀如成人姪纂遵世母幼孤之請見託為志其詞曰吁嗟古人不貴貴仕義猶重生德豈輕位猗歟蕭公其道不匱何以表墓唐之君子鄭君諱約字某元魏中書令周小司空金鄉文公穆之七代孫皇朝東都留守京兆河南尹福建觀察使御史大夫懿公叔則之冡子擢明經調大原府參軍歷興平尉洛陽主簿娶范陽盧氏生二男未齠二女未笄春秋四十六貞元十年四月八日卒於東都尊賢里第十有一月某日從先君於萬安山陽哀哉君事先大夫以聞禮為業奉繼太夫人以無違為志孝也地貴門高蓋㣥從外姻歸之者如市身為冡嫡率以和氣煦其歡心行也不籍世資自求於古立也餘力學文會友藝也前者先大夫出入貴仕羽儀中朝君仲父季父皆以令名列於清貫赫奕高明之盛莫之與京既而季父陷於國讎先大夫薨於遐裔仲氏繼歿於位二夫人次夭於家君與諸父兄弟斬焉相從藐爾相弔曰昊天之不我恤也逮三年矣奈何聲未絶口而君又往焉於戲積善餘慶之道信乎何其於始也信未及其終而欺繼之季弟納柔明而文次迫當室孔懷加等之外似有怨且懼焉謂員先公下賓仲季之執疏君景行俾勒泉扃銘曰人生盛衰如朝夕可歎繁華與凋落高門冠蓋者如雲一旦弔賓何寂寞盛德之後仁所歸嗟嗟之子何福違我從先君終此山讓厥嘉祥貽後昆崔君名泳字君易清河東武城人皇朝刑部尚書贈太傅忠公隱甫之孫河東少尹微之子進士擢第調同州參軍陸渾尉生四十有三年以貞元四年冬十月景子卒於洛陽育德里之第丁酉從先尚書少尹於此邱禮也崔族著明洎忠公德如其諡焯乎代之聞見其所憑者厚矣惟先王之樂實祖考之世及君子之所以為構為穫者加生知之力行之故其事親也以無間言無違志無失色無過行其執喪也視禮經有加等而惡用吾情之歎異夫古焉其草泣官也才無不器事至以鋒致理者以備㣥司陟明者以充首賦其會友也以晏平仲久敬子路無宿諾植之為本而遊夏之藝文嚮使錫厥永年被之資仕俾自家刑國以及生人未始涯也嗚呼才長命短古有之矣君之所以墮諸公之淚使有餘恨者方兄弟燕言之次無分陰之疾如寐如息而不反焉夫人范陽盧氏令族美行宜為君之伉儷四子男曰某女孟仲季未笄未辨初河南府君祥踰月夫人范陽縣君違養又祥踰月君繼夭君長兄河南府司録參軍溉不勝其哀乃至謂其身之存不若君之沒而無知也當無窮之苦如有知也先人在焉託我友生銘其埏詞曰有生有死彭殤同致德義為宗嵩高匪貴雲收於山曷為時雨嗟我哲人修邙之土穆若愚唐祕書監新安公之孫前御史中丞公之第五子貌宜貴壽神宜才藝氣宜淑哲生七年而夭痛莫如之時諸父不天方集荼蓼一慟之外且相諭曰老氏謂身為大患然則人之生也適與患並男子既齔以往患於是始此子也生無有生之患沒有無患之樂歘然與大化潛契曠然與太古為鄰齊彼彭聃為歸坯土命也如何偃師首陽山之北原吾祖宗之所宅翌日遷祔於先府君之後又翌日窆焉貞元十一年六月二十五日叔父員記唐貞元四年春正月員太夫人惟杜氏西階之事命長子贊咨於家君習於卜筮展孝思於罔極抒孔懷於同氣躬備如新之庶物洎一日二人之具授從父之弟湊浮舟於河啓殯於淇二月癸已舅氏奉我外王父朝城府君王母豐縣君劉氏洎伯舅之喪至自衛先是卜兆於偃師首陽山之北原壬寅遷朝城豐君歸於貞宅伯舅祔焉伯舅諱浩字某皇朝并州石艾縣丞文行曾孫絳縣令元度孫魏州朝城令翔之第二子也孝弟篤實可移於事君肅恭信順可施於有政行成於進而名未之歸學優於用而祿未之及天寶末天下亂藏於衛州之別墅昏氛四塞豺虎狺狺行無所從退迫嘻噬殷憂不壽發疾而終時至德三年二月二日春秋三十有五夫人京兆韋氏挈未童之孤孫是逃鋒刃保朝夕之不遑而踰月之禮蓋闕乃於其所殯焉我慈親念羇魂之靡託者心不忘痛永言改葬與大事俱世道多故坎壈未集嗣子佐餘力能學含章而文仕潤州參軍杭州司田越在東南計之靡及夫人後元年棄養於潤州官舍將謀同穴蓋時趨道遠如佐之不至且俟佐焉然則夫人之家聲美行請讓於來者之志銘曰嗚呼沒而無知也盡我慈親之情成爾孝子之志而已矣如有知也父母與子相見泉隧其樂融融其樂泄泄彼美家室昔如琴瑟他年令嗣祔元堂使我長夜覩白日大唐貞元景寅歲秋七月己酉荊南節度觀察使戶部尚書御史大夫江陵尹嗣曹王臯奉先太滎陽鄭氏之喪歸於先王贈尚書左僕射諱職之居實洛陽邙山之原先是皇帝使中謁者詔東京有司備鹵簿鼓吹洎祖載儀衛之物且監視之事之前日嗣王有虞乎山壤泉隧不常陵穴乃以百世之後貽厥來者之義屬於小生太諱仲字正和恆州司兵文恪之孫郴州司戶休璿之子鄭之於百族也如㣥嶽之聳衆山焉溢於世間事不待紀太以禮之節為質以樂之和為性以詩之鵲巢采蘩小星殷雷易之坤蠱家人為德小大由之且以其餘施之於外夫是以賢子是以貴以利於家邦年十有四歸於公族又十四歲而先嗣王即世王屋天壇之下有別墅焉太挈今之嗣王與女子子洎夫族之叔妹未冠笄者與本族凋喪之遺無告者合而家之居無生資勤儉自力仁以恤智以圖使夫飢待我粒寒待我纊婚姻宦學蒸嘗之禮待我以時嗣王年甫及笄其所以導成慈訓者則以父嚴師教之道兼而濟之於時天下晏然而事有將亂之兆太念嗣王之壯必及經綸不患不貞患不更踐不患不聞先王之訓患不知下人之生率以仲尼鄙事為教及其長也見其為龔黃見其為方召享其孝敬勳榮祿位三者日躋之報焉嗚呼月望而虧天之道也以建中三年冬十月九日遘疾薨於潭州官舍之寢壽七十有二嗣王奉喪歸葬達於南荊國難方興天下否塞朝廷倚宗周維城之固加於郡帥一等乃用魯公伯禽有為之變俾復其位且使即其次而窆焉嗣王銜恤奉詔以戰克以攻拔統江西援江陵其事墓也如生平之養其哀號也執干戈者悲之今茲龜筮叶謀優詔惟允議者或曰東南之鎮荊州為大降寇僅滅多虞未忘遺羊杜之重徇曾閔之節越三千里執喪釋位謂安危何員以為嗣王之於朝廷也曩竭之以忠朝廷之於嗣王也今遂之以孝君臣家國之際於是乎古無以踰况其奉先之志不可以奪臨下之政必可以保且用崇厥孝理始於本枝使為子者悅事君者勸以感人心以順天下不然何卒葬弔贈天王之錫命視於同盟有加等焉初湖南部將有王國良者嘗危疑負固歷年不下嗣王為帥恭太之教以子召之國良捧檄如歸撫之以信其後入衛中禁錫名維新乃曰爾來之生今日之寵罔極之德也哀請赴葬上嘉而許之其執禮致慕視於苫凷是以係之於篇銘曰抑抑母儀稟訓德門來嬪王族慶集宗臣如彼崇山應時出雲霈然作雨澤潤生人裕我之蠱啓茲寵勛匡戴中興為唐晉文宜爾百祿享茲萬春運奪其養天胡匪仁清洛之陽修邙之阜我歸我居我徒我友維邙與洛將安宅之相久員不夭不死先公棄背迫先王制禮免喪五月太夫人河東郡太夫人以貞元十三年六月二十四日違養又不孝不滅以及龜筮遠期十月二十一日孤子贊洎質員賞奉遷靈座自東都歸義里私第正寢歸於偃師首陽山北原先公之居第三子員伏念常稟慈訓撰述前志當時實聞不忍聞之命俾繼斯文不敢不茹血吐迷粗舉大略裴氏自漢魏以還蓋為天下著姓外族之於本宗也若泉有源山有峯披圖按牒可明徵矣五代祖諱鴻琳周易郡太守高祖諱客兒隋長平丞曾祖諱文行官皇朝并州石芝縣丞祖諱元度絳州絳縣令父諱翔魏州朝城縣令世以懿德令名清風和氣昭穆授受宜於家邦太夫人則朝城府君之季女也淳仁如天博厚如地精識如神中節如時少喪怙恃長於季母諸姑以孝友誠明俾見懿慈有天性之答所至家政輒聞於未成人之年洎有行君子作配盛德移內則之美盡家人之義居上齊下視人以身主祭祀以心為馨香事賓客以手集中饋先公厄於未濟困於屢空太夫人以樂道為貴肥家為富先公初仕河朔蹈難平原太夫人以勤儉成清白誠義佐名節先公出入崇貴間逢遷黜太夫人居常以天不假易自警處否以泰道自安先公直道高義不容於時剝落當年優遊晚暮太夫人始則以不磷不緇何憂何懼為韋弦焉中則以不容何病然後見君子為塤箎焉終則以施於有政是亦為政為琴瑟焉先公孝以立家仁以合族太夫人輔佐之德達於神明員伯姑元夫人高明純至不幸早孀太夫人就養於堂服勤以力視色先意主於無違伯姑嘗顧小子同氣曰自吾歸爾家安爾母也自忘孤寡自忘長老嘻嘻然如未笄之初承歡於父母之前夜夢吾先君則為爾父夜夢吾先夫人則為爾母豈爾父母乃吾宿世之父母乎不然何迷我心靈發於夢寢者三十年如此中外孤幼以先公之祿為待哺待絮者其來如歸太夫人所以衣服飲食之蓋有竭無倦有不足無不均有孤惸老幼之先無親疏厚薄之別若乃甥姓㣥從之衆賢愚恭狠之差太夫人用不慍不校不欺不伐積為至德以嫗煦之不違直心而曲順其理不越中制而各厚其宜是故寢我無私有常之化者歸我懷我如服天地豈無忮戾之性多言之口不忍以造次幽昧遷焉員三從叔寂感太夫人少長子愛之慈以為生成罔極之重及壯納室則先請於女氏之介曰吾嫂吾母也苟能服事如姑則為某妻不者則否女氏許諾然後贄幣行焉太夫人自痛早孤終鮮兄弟惟周公蓋祔仲尼合葬之事咨於先公曰絳雖故鄉世乏喬木洛汭中土首陽家山今將奉先人於北原卜鄰舅姑吾與公存沒之志也命長子行之本族凋落蒸嘗殆曠鞠孤兄子以涕泣教之使學古入官承家主祭乃至宗從之祀興廢繼絶繄太夫人是賴者非一先公享懸車之榮太夫人受偕老之福河洛安宅京師就養板輿所至宴喜相從旬朔獻壽子孫成列歲時稱慶冠蓋盈門當時士族以為榮羡晚年學道於聖善寺法疑大師所受方便平等則家政也忍辱慈悲則素行也真如正覺則天性也皆異積舊習彼於德施盡大師之法吾無得焉贊等從事守官世道多故太夫人以為苟不虧先王先公之訓則義在不辱是為無忝未始見責而姑勉之祿俸供養不給於家之經費太夫人每顧念有一飢一寒者則為之不飫不暖其遇窮獨無告不獲其所輒心體以之不康是以甘旨輕鮮之獻未嘗以尊高自異常有汲汲不足之患而不患焉初太夫人之從先公也公方褐衣家無數口太夫人以繁祉元福阜興德門男女為人父母為人大父母為人師者七內外孫洎曾孫四十有三食先公洎諸子之祿者五十一政主家主祀者五十一年壽七十四封河東縣君先公故也河東郡太夫人贊故也列郡啓封為妻為母論者以兼命斯貴同時難之然天下公議稱先公位不稱德雅知贊者亦謂贊等命不偶時而太夫人五福百祿之徵蓋上有所不充下有所未極贊質員賞皆自痛欲養欲報各孤其分號天訴天天不我聞伏念昔罹荼毒備承至誡以為殺身無逮揚名有補忍死為重徇情則輕煢獨苟至不敢自滅謹哀纂生德密行之可傳者勒之貞石以永厚地嗚呼蒼天嗚呼有唐河南少尹清河崔府君諱徵從先大夫於北邙山平樂原卜年惟三而泉戶啓夫人歸歸而復閉閉而終此山矣禮也哀哉夫人諱某字某姓盧氏以府君為大夫封范陽縣君其先自東漢中郎植十有三葉至於烈考皇朝大理司直孝孫代以禮樂婚姻相遺為氏族冠冕縣君泉源發清峻極憑厚孕和縕粹吐芳如春其在弱笄雅有君子之度諸姑從母有若韋太師見素裴尚書寬二夫人稱之曰吾見此女使人思齊不自知其所為長開元季年先舅尚書忠公尊顯於代高明克家思配子之賢慎承我之重縣君以姬薑之盛發聞之美誕集嘉命既而有行先姑隴西夫人才之傳之以政於是資顧復之報以孝舅姑推友于之愛以睦娣姒和琴瑟之樂以諧所從閲詩易之義以修所職婦儀母訓垂五十年不一日違仁不須臾忘禮溫顏和氣物莫之侵朗識清機道與之接雅好黃老且精禪慧嘗謂要本無二教焉有三吾將貫之以一守之以一蓋生知免習而寤寐以之是以寢疾恬然臨危不亂謂生為旅舍歿為歸次而我行邁之得息焉壽六十有一終於洛陽育德里之私第時貞元二年五月二十九日二孤溉泳殿中侍御史陸渾尉恭合祔之禮即命於蓍龜曰仲秋甲申吉先是溉泳執河南府君之喪一號三年既踰月而縣君繼酷雅知溉者以今之宰政與中朝賢卿大夫多溉之遊其顯有時其養可待何昊天壓之之甚而縣君棄之之早蓋以不可知者曰天與命相弔焉員則溉等瀆交之執也見託銘石其銘曰北邙古原起新阡仁賢同穴閉下泉哀哀孝子不終養蒼蒼正色誰問天物之常久有貞石我以德音志神宅千年邱隴不可期白日佳城俟來覿崔氏長女名某先笄之某年不幸遘癘未幾丁烈考太常卿贈吏部尚書常山公難至哀乘之共迫正氣以貞元七年秋八月已酉夭於東郡冬十月乙巳兄元方哀奉尚書從先相國於北邙山以長女祔於尚書之側嗚呼女之生也乘高祖博陵王之殊勳曾祖禮部府君之令望先相國之盛業先尚書之重德何四葉垂裕合為禎祥與夫惡疾至性摧之不勝豈天所助不能移定命乎不然者烈祖顯考之德之純假以溢我我其收之宜施之有年移之他族宜乎起家而居有公卿之位雅人之所歌韓姞者疇離之哉夫內則之美不傳於外禮也辱命於其兄者志卒葬焉銘曰崔之九原實維邙阜孝女祔先與天地久維年月日某官謹遣某乙敢用少牢之奠致祭於故尚書左僕射彭城公之靈巨唐中否八葉嗣興天為生公為公啓運公受天所授事與時并實為酇侯立我王國於時方夏之內痍傷未平兵餘於人賦倍於産公施以損益權其重輕自我竭心為國強力歲歉靡瘠師興忘勞㣥帥不處怙兵自擅典章靡及職貢莫修律我清明徵令如響凡所辟選府傾時賢若金我礪若玉我琢爾材我器爾用我功至今會計之司食貨之政法公之法其事集吏公之吏其利興守公之成揚公之盛孰云公歿吾謂公存嗚呼何日不夕何榮不落何亢不悔何高不危終沒裔夷凡百稱嘆皇明昭滌丹旐言旋澤及九原魂歸萬里大名備禮返葬故邱哀哀遺孤銜恤靡至毀鄰於滅必復是徵某昔官南宮嘗參末吏玉音如在哀挽長違祇命禁省不敢離局禮闋執事悲儲永懷敢以精誠寄於祖奠神遠聽邇庶乎降歆嗚呼哀哉尚饗維年月日某使某官某奉敕以清酌庶羞之奠致祭於故顏太師贈司徒魯公之靈嗚呼天有晦明人有理亂當其厄運則有盜臣至乃憑寵肆凶竊權搆逆蛇吞虎噬擇肉中州天子思所以解將燎之焚拯方割之墊道開景命銷遏亂源惟公道冠四朝位先百辟望安社稷名動神祇期以日照天臨風清雨滌受命以出視途如歸嗚呼肇有君父孰如堯舜臣惟共鯀子亦朱均稟沴而生雖聖勿化父不能得之於子君不能得之於臣矧夫禍亂之興蓋乘中否天之方稔公若之何獨立虜庭卒致君命激昂大義潛革寇心全道為全天年非夭期頤非壽得死為終惟彼凶殘殲我明哲罪均僭逆怒發天人否閉未通鬱翳茲久上帝厭亂忠臣應期坐使鯨鯢化為葅醢庸非精爽達於明神幽贊元勳昭蘇宿憤詔旌大節追册上公寵以飾終禮惟加等某肅將密命敷播皇猷慰拊痍傷勞勉忠義拜手天闕躬承德音命以觴牢備茲俎豆發於聖旨斯謂馨香公其降靈歆我明德尚饗維年月日某官某謹以清酌少牢之奠敢昭告於故太師贈司徒顏公之靈天寶季年幽都首亂生人流血中夏為夷公守在一麾援絶千里居鯨之腹而刳其腸履虎之尾而拊其背率先大義以集中興歷事四君匪躬一致全德邁俗正詞興邦堯朝孔門兩造其極羿浞間釁東南不開帝謂師臣豫厭征伐往以至化勝其凶殘於時公請老未獲蓋三年矣曾不俟駕豈公安車惟物之生善惡有性豺狼犬馬罔克相遷天能生之而不能化況彼元惡逆成膏肓針藥靡攻仁智何及奉命所在顧身如遺奈何明神孤我積善帝念忠烈國恩典刑棟折將壓哲萎安放嗚呼哀哉昔者仰挹重名遐跂明德邈焉當代如望古今敬慕高風感歎大節卓爾不朽凜然如生巨猾殲夷幽魂昭奉靈車歸路千里同悲永惟忠勳宜在祀典況臨紼紖敢廢蘋蘩嗚呼哀哉尚饗維年月日某官某謹遣某官某以清酌少牢之奠敬祭於故給事中汝南公袁三丈之靈昔我烈祖洎公先哲同力王室惟歡世家俾為塤箎且秩昭穆殆茲小子恭事丈人於惟丈人義切師友間氣全德稟之自然資元精之餘和邁生人之宏致遵周孔之軌躅行天下之直道是用萃厥孝友發於文儒播乎循良峙以謇諤出納帝命時惟掖垣政之或虧期不奉詔義之所激挺不顧身寤天聽於未聞反大號於已出吐㣥公之所茹垂聖朝之直聲雖霖雨舟楫之用未躋於位而股肱耳目之任獨冠於時其生也公相讓德有臧文竊位之歎其歿也縉紳相弔有國僑將壓之懼惟昔遘癘萬心禱天天之愛人宜有所錫如何大運不即我謀君子於是乎始疑神明而信定命輤車何所從先公居前有伊川萬古流美某離次是懼臨穴莫從百身靡追一慟何及哀填意竭式寄蘋蘩嗚呼哀哉尚饗維年月日某遣某官某敢以豭牢之奠昭告於故相國贈太子太傅張公之靈嗚呼天之不可問也信矣災不避聖禍不擇賢在昔禹湯實逢水旱今我堯舜厥有羿浞公如季路終以結纓蓋君以避狄為仁臣以死難為義不朽是貴全生曷榮嗚呼哀哉公性本生知學成全德迹踐教極心遊聖源始以耕雍終以咎稷取其餘事猶為龔黃用其末學亦謂方召若昊天之將喪斯民也則不當生德於公錫公於主既執其柄載行其道方俾我后格於皇天一夫不獲引以為咎而奪我靈府移於四支使魚爛自中原燎斯及主辱臣死誠不在公守位以終是為不沒明明元首始喪股肱凡百縉紳靡所冠冕伏念平昔交如弟兄同則塤箎相和異則韋弦迭佩公頃自郎署往蒞東南秦楚相望音容不隔逮於晚歲又忝倅戎時迫登賢事止中道恩加前好名在舊賓今寵贈表榮詔葬旌烈官司是縶弔哭無從泣遣行人哀將菲薄孰云觴豆可盡平生嗚呼哀哉尚饗維年月日某官某謹遣某官某以酒酌少牢之奠敢昭告於故相國尚書左僕射贈司空李公之靈惟靈天鍾地資生備五福昔者元宗之代天下治平時重文儒禮侔齒爵公始之鴻漸蔚為羽儀從容主文在帝左右既而皇家中否寶歷嗣興明明肅宗康難致理天地交泰聖賢相逢其所以濟川救旱和羹作醴稽視説命事符古文嗚呼才之用捨繫乎時道之行否存乎命圭組遺纍江湖為家興協騷人我無其怨詠歌堯舜二紀忘年皇唐建中天子纘服維新庶績先禮舊臣授公成均以舉政本爰降徵命典司春官先是昆夷不庭歲為邊患亦既款塞願歸聖理帝曰春秋之義許之不一而足和之五利斯在歷選列辟繄公簡心資王商之盛容將魏絳之故事公感恩自奮暮齒方剛寵茲肩舁遵彼絶域俄屬賊臣間釁罕畢在邦公昭格外夷俾為內援嗚呼風沙勤瘁共薄頺齡王事畢矣我勞盡矣僅履吾土亦終天命原夫始終實盡善美湛恩縟禮論者宜之至若史氏立言訓辭作誥祕在天府式為國經世有五姓冠於百族有如姬薑取貴春秋擢秀天人惟公而已有司備物返葬故邱觀者哀榮況承眷舊敢憑奠酌以降明靈尚饗維年月日故吏某官某敢薦薄奠於故福建都團練觀察處置使福州刺史兼御史大夫鄭公之靈伏惟自天降靈為國之楨溥博閎達昭融粹精中和植本體禮敷榮應物以順逢時中清爰自筮仕之初及乎懸車之期惟天命是信惟聖言是思德合明神心為元龜動享黃裳之吉不稽洪範之疑論交審其始其結也不解用才要其終其報也不欺仲山吐茹吉甫文武四國羽儀蒸乂父母憶昔高門照灼寰宇榮冠一時名列三虎我公南遷返旐東土仲也壯齡相從萬古季兮不幸昔陷於虜忽如嚴霜殞落繁柯倏爾成空天乎謂何某常以斯文忝膺辟吏載筆如昨攀車何自我有甘棠東城桃李悠悠清溪永代流美願託遺孤以奉恩紀黍稷非馨微誠所至嗚呼哀哉尚饗維年月日某官某乙謹遣某官某以清酌少牢之奠敬祭於荊南節度觀察使戶部尚書兼御史大夫嗣曹王故太之靈名山大川列於祀典以其所育能利於人恭惟太享用元福乘運之啓受天之終間生親賢為國藩屏人賴德施祀之攸宜樂貴自生禮宗其本維厥分閫資於卜鄰報我以榮則公侯其位養我以志則嬰孩其心如何風樹之悲遽奪晨葩之慶哀哀嗣王泣血終制既及先遠疚焉如新中貴護喪有司備物詔臨祖奠弔集同盟風物含悽簫笳啓路泉扉一閉松月千秋黍稷非馨精誠所至尚饗
