front:
  text: 全唐文欽定全唐文卷六百八劉禹錫十
  hash: sha256:092d8f98277e08e3b50eb394eec4074561cec7da011b66fa2992c18448059758
body:
  text: 劉子間居作因論或問其旨曷歸歟對曰因之為言有所自也夫造端乎無形垂訓於至當其立言之徒放詞乎無方措旨於至當其寓言之徒蒙之智不逮於是造形而有感因感而有詞匪立匪寓以因為目因論之旨也云爾劉子間居有負薪之憂食精良弗知其旨血氣交沴煬然焚如客有謂豫子病病積日矣乃今我里有方士淪迹於醫厲者造焉而美肥蹶者造焉而善馳矧常病也將子詣諸豫然之之醫所切脈觀色聆聲參合而後言曰子之病其興居之節舛衣食之齊去聲乖所由致也今夫藏鮮能安穀府鮮能母氣徒為美疹之囊士冖柘耳我能功之乃出藥一丸可兼方寸以授豫曰服是足以瀹昏煩而鉏蘊結消蠱慝而歸耗氣然中有毒須其疾瘳而止過當則傷和是以微其齊也豫受藥以餌過信而腿能輕痺能和涉旬而疴養絶焉抑搔罷焉踰月而視分纖聽察微蹈危如平嗜糲如精或聞而慶豫且閧言曰子之獲是藥幾神乎誠難遭已顧醫之態多嗇術以自貴遺患以要財盍重求之所至益深矣豫昧者也泥通方而狃既效猜至誠而惑勦説卒行其言逮再餌半旬厥毒果肆岑岑周體如痁作焉悟而走諸醫醫大吒曰吾固知夫子未達也促和蠲毒者投之濱於殆而有喜異日進和藥乃復初劉子慨然曰善哉醫乎用毒以攻疹用和以安神易則兩躓明矣苟循往以御變昧於節宣奚獨吾儕小人理身之弊而已劉子如京師過徐之右鄙其道旁午有氓增增扶班白潔羈角齎生器荷農用摩肩而西僕夫告豫曰斯宋人梁人亳人潁人之逋者今復矣豫愕而訊云豫聞隴西公暢轂之止方踰月矣今爾曹之來也欣欣然似恐後者其間有勞來之簿歟蠲復之條歟賑贍之恩歟碩鼠亡歟瘈狗逐歟曰皆未聞也且夫浚都吾政之上遊也自巨盜間釁而武臣顓焉牧守由將校以授皆虎而冠子男由胥徒以出皆鶴而軒故其上也子視卒而芥視民其下也鷙其理而蛑其賦民弗堪命是軼於他土然咸重遷也非阽危擠壑不能違之曩者雖歸歟成謠而故態相沿莫我敢復今聞吾帥故為丞相也能清靜畫一必能以仁蘇我矣其佐嘗宰京邑也能誅鋤豪右必能以法衛我矣奉斯二必而來歸惡待事實之及也豫因浩嘆曰行積於彼而化行於此實未至而聲先馳聲之感人若是之速歟然而民知至至矣政在終終也試嘗論聲實之先後曰民黠政煩須理而後勸斯實先聲後也民離政亂須感而後化斯聲先實後也立實以致聲則難在經始由聲以循實則難在克終操其柄者能審是理俾先後始終之不失斯誘民孔易也劉子行其野有叟牽跛牛於蹊偶問焉何形之瑰歟何足之病歟今觳觫然將安之歟叟攬縻而對云瑰其形飯之至也病其足役之過也請為君畢詞焉我僦車以自給常驅是牛引千鈞北登太行南並商嶺掣以回之叱以聳之雖涉淖躋高轂如蓬而輈不僨及今廢矣顧其足雖傷而膚尚腯以畜豢之則無用以庖視之則有贏伊禁焉莫敢尸也甫聞邦君饗士卜剛日矣是往也將要售於宰夫豫尸之曰以叟言之則利以牛言之則悲若之何豫方窶且無長物願解裘以贖將置諸豐草之鄉可乎叟囅然咍曰我之沽是屈指計其直可以持醪而囓肥飴子而衣妻若是之逸也奚事裘為且昔之厚其生非愛之也利其力今之致其死非惡之也利其財子烏乎落吾事劉子度是叟不可用辭屈乃以杖叩牛角而嘆曰所求盡矣所利移矣是以員能霸吳屬鏤賜斯既帝秦五刑具長平威震杜郵死陔下敵擒鍾室誅皆用盡身殘功成禍歸可不悲哉可不悲哉嗚呼執不匱之用而應夫無方使時宜之莫吾害也苟拘於形器用極則憂明矣劉子浮於汴涉淮而東亦既釋紼纚榜人告豫曰方今湍悍而舟盬宜謹其具以虞焉豫聞言若厲繇是袽以窒之灰以墐之以乾之僕怠而躬行夕惕而晝勤景霾晶而莫進風異響而遄止兢兢然纍辰是用獲濟偃檣弭棹次於淮陰於是舟之工咸霈然自暇自逸或遊肆而觴矣或拊橋而歌矣隸也休役以尚寢矣吾曹無虞以宴息矣逮夜分而窾隙潛澍渙然陰潰至乎淹簀濡薦方卒愕傳呼跣跳登墟僅以身脫目未及瞬而樓傾軸墊抵於泥沙力莫能支也劉子缺然自視而言曰鄉豫兢惕也汨洪波而無害今豫宴安也蹈常流而致危畏之途果無常所哉不生於所畏而生於所易也是以越子膝行吳君忽晉宣尸居魏臣怠白公厲劒子西哂李園養士春申易至於覆國夷族可不警哉嗚呼禍福之胚胎也其動甚微倚伏之矛楯也其理甚明困而後警斯弗及已劉子於邁舟次泗濱維乍邇之於傳傳吏適傳呼曰乘驛者方來誰何之則曰力人也雅以力聞於吳楚間中貴人器之謂宜為爪士獻言於上有旨趣如京師頃其至則仡焉五輩咸碩其體毅其容動睛煜如曳趾岌如顧瞻遲回飲啜有聲泗濱守伾由將授也説而勞之饗以太牢飲以百壺酒酣氣振求試自矜傍如無人中若有憑有蕩舟如沿者抉鼎如飛者綯鍵如麻者開兩弧而脈不僨者屣巨石而齊如流者異哉果以力駭世而聞於上也異日話於儒家者流有客悱然自奮曰斯誠力矣上之不過夸胡人而戲角抵次之不過倅期門而振袀服我之力異然以道用之可以格三苗而賓左衽以威用之可以繫六吂月馬凡而斷右臂由是而言彼力也長雄於匹夫然由驛其騑餼其食我力也無敵於天下亦當蒲其輪鶴其書矣豫詰之曰彼之力用於形者也子之力用於心者也形近而易見心遠而難明理乎而言則子之力大矣時乎而言則彼之力大矣且夫小大迭用曷常哉彼固有小矣子固有大矣豫所不能齊也客於邑垂涕洟劉子解之曰屠羊於肆適味於衆口也攻玉於山俟知於獨見也貪日得則鼓刀利要歲計而韞櫝多客聞之破涕曰吾方俟多於歲計也歲歟歲歟其吾與歟伯氏佐戎於朔陲獲良馬以遺豫豫不知其良也秣之稊秕飲之污池廄櫪也上痺而下蒸羈絡也綴索而續韋其易之如此豫方病且窶求沽於肆肆之駔亦不知其良也評其價六十緍將劑矣有裴氏子贏其二以求之謂善價也卒與裴氏裴所善李生雅挾相術於馬也尤工覩之周體眙然視聽然笑既而抃隨之且曰久矣吾不覩於是也是何柔心徑骨奇精妍態宛如鏘如煜如翔如之備耶今夫馬之德也全然矣顧其為駒藏鋭於內且秣之乖方是用不説於常目須其齒備而氣振則衆美灼見上可以獻帝間次可以鬻千金裴也聞言竦焉遂警其僕蠲其皂筐其惡蜃其溲禾崔以美薦秣以薌粒起之居之澡之挋之無分陰之怠斯以馬養養馬之至分也居無何果以驥德聞客有唁豫以喪其寶且譏其所貿也微豫灑然曰始豫有是馬也豫常馬畜之今豫鬻是馬也彼寶馬畜之寶與常在所遇耳且夫昔之翹陸也謂將蹄將囓抵以撾策不知其籋雲也昔之噓吸也謂為疵為厲投以藥石不知其噴玉也夫如是則雖曠日歷月將至頓踣曾何寶之有焉繇是而言方之於士則八十其緍也不猶愈於五羖皮乎客謖而竦豫遂言馬之德也存乎形者也可以目取然猶違之若此矧德蘊於心者乎斯從古之嘆豫不敢歎劉子嘗涉暑而征熱攻於腠以致病其僕也告痡亦莫能興逮浹日豫有瘳醫診之曰疾幸間矣顧熱沴而未平有遺類焉宜謹於攝衛衛之乖方則病復矣所苦既微而怠其説倦眠於衾而興焉倦隱於几而步焉面不能罷頮髮不能捐櫛口不能忘味心不能無思如是未移日而疾也參如復癏於躬進藥求汗凡三渙然後目能視視既分則嚮時之僕已睨然執杯圈侍豫於前矣豫訝而曰曩吾與若也病偕呻也呼也若酷而吾微藥也餌也吾殷而若薄何患之同而痊之異哉僕諄諄而答云已之被病也兀然而無知有問也亦兀然而無知髮蓬如而忘乎亂面黔如而忘乎垢洎疾之殺也雖飲食是念無滑甘之思日致復初亦不知也豫喟然歎曰始豫有是僕也命之理畦則蔬荒主庖則味乖顓廄則馬瘠常謂其無適能適乃今以兀然而賢我遠甚利與鈍果相長哉僕更矣劉子遂言曰樂於用則豫章貴厚其生則社櫟賢唯理所之曾何膠於域哉馬龍類蓋健而善馳君子之所宜求為也故法求於力或逸而喜駭法求於和或乾而易仆由德稱者鮮焉曩豫知善馬之難遭也不求於肆而於其鄉一旦果得陰山之阿蠖略其形蕭蕭其鳴長顧遠視順而能力顧其軀非鶱然而偉也雖士得以乘之始豫被皂衣於朝朝之人多四三其牡以迭馭豫無兼焉水轍之淋漓淖途之汪洋結為確犖融為坳堂前有僨輈後有濡裳我策垂空我鑣方揚振鬣軒昂矯如飛翔翹翹其雄也非力而何烈火之具舉鉤膺之謺舞一蹊千趾駢比齟齬痑者斯擠悍者斯怒我鞍如山我轡如組弭毛容與宛若孤處靡靡其柔也非慧而何日豫之獲譴於闕下背商顏趣昭邱日中而踰舍修門之南非騎所宜夷則沮洳高則嶔巇虎咆空林鬬荒馗風雨孤征簡書之威俾豫弗顛我馬焉依屑屑其勞也非德而何豫至武陵居沅水傍或踰月未嘗跨焉以故莫得伸其所長局蹐顧望兮頓其鎖韁飲齕日削兮精耗神傷寒櫪騷騷兮瘁毛蒼涼路聞躞蹀兮逸氣騰驤朔雲深分邊草遠意欲往兮聲不揚隤然自不得其所而死故其嗟也兼常初元宗羈大宛而盡有其名馬命典牧以時起居洎西幸蜀往往民間得其種而蕃焉故良毛色者率非中土類也稽是毛物豈祖於宛歟漢之歌曰龍為友武陵有水曰龍泉遂歸骨於是川且弔之曰生於磧礰善馳走萬里南來困邱阜青菰寒菽非適口病聞北風猶舉首金臺已平骨空朽投之龍淵從爾友由命士以上不入於市周禮有焉由今觀之蓋有因也元和二年沅南不雨自季春至於六月毛澤將盡郡守有志於民誠信而雩遂遍山川方社又不雨遂遷市於城門之逵豫得自麗譙而俯焉肇下令之日布市籍者咸至夾軌道而分次焉其左右前後班間錯跱如在闤闠之制其列題區別榜揭價名物參外夷之貨馬牛有牽私屬有間在巾笥者織文及素焉在几閣者雕彤及質焉在筐筥者白黑巨細焉業於饔者列饔饎陳麥并餌而苾然業於酒者舉酒旗滌杯盂而澤然鼓刀之人設膏俎解豕羊而赫然華實之毛畋魚之生交蜚走錯水陸㣥狀夥名人隧而分韞藏而待價者負潔而求沽者乘射其時者奇贏以遊者坐賈禺禺行賈遑遑利心中驚貪目不瞬於是質劑之曹較固之倫合彼此而騰躍之易良苦於巧言斁量衡於險手杪忽之差鼓舌傖儜詆欺相高詭態橫出鼓囂譁坌煙埃奮羶腥謺巾履囓而合之異致同歸雞鳴而爭赴日午而駢闐萬足一心恐人我先交易而退陽光西徂幅員不移徑術如初中無求隟地俱唯守犬鳥烏樂得腐餘是日倚衡而閲之三感其盈虛之相尋也速故著於篇云客有以博戲自任者速余觀焉初主人執握槊之器置於廡下曰主進者要約之既揖讓即次有博齒二異乎古之齒其制用骨觚稜四均鏤以朱墨耦而合數取應期月視其轉止依以爭道是制也通行之久矣莫詳所祖以其用必投擲故以博投詔之是日客抵骨於局且祝之曰其來如趣其去如脫事先趦趄命中無蹉跌無從彼呼無俾我怛分曹遒迫自朝至於日中昃而與所祝異焉客視骨如有情焉如或憑焉悉詈之不泄又從而齕囓蹂躪之莫顧其十目之咍讓也乃曰非余術之不工是朽骨者不余也請刷恥於奕棋主人促命燭以續之騖神默計巧竭智匱主進者書勝負之數於牘視其所喪又倍前籍焉觀者曰以夫人之褊心亦將詬棋而抵枰矣既乃恬而不恤赧然有失鵠求身之色人咸異之子劉子曰先人者制人博投是已從人者制於人枯棋是已二者豈有數存乎其間哉但處之勢異耳是知當軸者易生嫌而退身者易為譽易生之嫌不足貶也易為之譽不足多也在辨其所處而已佛説華嚴經直入妙覺不由諸乘非大圓智不能信解德宗朝有龍象觀公能於是經了第一義居上都雲華寺名聞十方沙門嗣肇是其上足以經中九會纂成華藏圖俾人瞻禮即色生敬因請余讚之即説讚曰清淨不染花中蓮捧持世界百億千踊出香海浩無邊風輪負之晝夜旋大雄九會化諸天釋梵八部來森然從昏至覺不依緣初初極極性自圓寫之綃素色相全是色非色言非言余讀蒙莊書曰兵莫慘於志莫邪為下缺然知志一作智士之傷夫生也他日讀遠祖中壘校尉書曰口者兵也衋然知言之為兵又慘乎志因博考前載極其兩端夫志兵之薄人激烈抗憤不過無從容於世耳口兵之起其形渥焉繇是知吾祖之言為急作誡以書於盤盂五刃之傷藥之可平一言成疴智不能明人或罹兵道途奔救投方效技思恐其後人或罹譖比肩狐疑借有紛解毀輒隨之故曰舌端之孽慘乎楚鐵夷竈誠謀執戈以驅掩人誠智折笄以一作之詈賢者誨子信其有旨發言之難往古猶爾辨為詐媒默為德基玉櫝不啓焉能瑕疵犫麋深居孰謂可嗤我誡於口惟心之門無為我兵當為我藩以慎為鍵以忍為閽可以多食勿以多言猶子蔚晨跪於席端曰臣幼承叔父訓始勾萌至於扶疏前日不自意有司以名汙賢能書又不自意被丞相府召為從事重兢纍愧懼貽叔父羞今當行乞辭以為戒余曰若知彞器乎始乎斫輪因入規矩刳中廉外枵然而有容者理膩質堅然後加密石焉風戾日晞不剖一作副不聱然後青黃之鳥獸之飾乎瑤金貴在清廟其用也羃以養潔其藏也櫝以養光苟措非其所一有毫髮之傷儡然與破甑為伍矣汝之始成人猶器之作朴是宜力學為礱斫親賢為青黃睦僚友為瑤金忠所奉為清廟盡敬以為羃慎微以為櫝去怠以護傷在勤而行之耳設有人思披重霄而挹皓氣病無階而升有力者揭層梯而倚泰山然而一舉足而一高非獨揭梯者所能也凡大位未嘗曠故世多貴人唯天爵并者乃可偉耳夫偉人之一顧踰乎華章而一非亦慘乎黥刖行矣慎諸吾見垂天之雲在爾肩腋間矣昔吾友柳儀曹嘗謂吾文雋而膏味無窮而炙愈出也遲汝到丞相府居一二日袖吾文入謁以取質焉丞相吾友也汝事所從如事諸父借有不如意推起敬之心以奉焉無忽吾既為僧琳撰曹溪第二碑且思所以辨六祖置衣不傳之旨作佛衣銘曰佛言不行佛衣乃爭忽近貴遠古今常情尼父之生土無一里夢奠之後履存千祀惟昔有梁如象之狂達摩救世來為醫王以言不痊因物乃遷如執符節行乎復關民不知官望車而畏俗不知佛得衣為貴壞色之衣道不在茲由之信道所以為寶六祖未彰其出也微既還狼月荒憬俗蚩蚩不有信器衆生曷歸是開便門非止傳衣初必有終傳豈無已物必歸盡衣胡久恃先終知終用乃不窮我道無朽衣於何有其用已陳孰非芻狗山不在高有仙則名水不在深有龍則靈斯是陋室惟吾德馨苔痕上階緑草色入簾青談笑有鴻儒往來無白丁可以調素琴閲金經無絲竹之亂耳無桉牘之勞形南陽諸葛廬西蜀子雲亭孔子云何陋之有歲在丙辰元日開成許州牧尚書杜公作文宣王廟暨學舍於兌隅革故而鼎新也前年公受社與鉞且董淮揚汝南之師八月上丁釋菜於宣父之室陋宇荒階不足回旋已事而歎乃詢黃髮有鄉先生前致辭曰自盜起幽陵許為兵衝連戰交捽率無寧歲耳悅鉦鼓不聞絃歌目不知書不害為智邇來生聚教養起居祖習一出於軍容今幸天子憐許民為擇賢侯此人人思治之時也公曰諾吾當先後之於是元年修戎律以通衆志次年成郡政以蠲民瘼季年崇教本以厚民風我言既從乃卜新宮瀷水之瀕城池在東登登其杵坎坎其斧繩之墨之鑿枘枝梧載塗載奐黑亢焉陵虛寢廟宏敞齋宮嚴閟軒墀廂廡儼雅清潔門庭牆仞望之生敬外飾觚稜中設黼幄嚮明當寧用王禮也堯頭禹身華冠象佩之容取之自鄒魯及門覩奧偶形畫像之儀取之自太學尊彞籩豆青黃規矩之器秉周禮也犧牲制幣薦獻升降之節遵國章也藏經於重簷斂器於庋櫝講筵有位鼓篋有室授經有博士督課有助教指蹤有役夫灑掃有廟幹公又割隙地為廣圃蒔其柔蔬而常菹旨蓄之御備捨已俸為子錢榷其孳贏而鹽酪釭膏之用給濟濟莘莘化行風驅家慕恭儉戶知敬讓父誨其子兄規其弟不遊學堂與撻市同繇是縻勇爵戴鶡冠者往往弭雄姿而觀習禮義矜甲胄者知根於忠信服縵胡者不敢侮縫掖教化之移人也如置郵焉冬十一月許人以新儒宮成來告且乞辭欲行乎遠也公名悰字永裕故丞相岐國公之孫岐公弻諧三帝碩學冠天下嘗著書二百餘篇言禮樂刑政古今損益統名曰通典藏在石室副行人間今孝孫聿修之形乎事業播於聲詩懿哉能世其家也禹錫昔年忝岐公門下生四參公府近年牧汝州道許昌躬閲其政故不得讓遂銘於麗牲之碑銘曰許介韓魏四征之地兵興已還其鬬口顏口顏亦有儒宮軋於兵間賢族戾止思樂泮水俾人嚮學王化之始便地爰相新規鬱起廟貌斯嚴堂皇有煒秩秩禮物祁祁胄子入於門牆如造闕里春誦夏絃載揚淑聲風於閭閻浹於郊坰途讓斑白家尊父兄與化而遷其猶性成昔之委巷相詬交侮今逢親戚不道媟語昔之連營誇力使酒今遇賓客斂容拱手魯有泮林鳥革其音許崇學斆民悅其教鐫於圭石以志新廟今上元年七月十三日汴州刺史宣武軍節度副大使知節度事汴宋亳等州觀察處置使銀青光祿大夫檢校禮部尚書兼御史大夫上柱國彭陽縣開國伯令狐公西嚮拜章上言守臣楚蒙被恩澤列為元侯得立家廟以奉常祀制書下其奏於有司於是善相考祥得地於京師通濟里居無何新廟成公以守藩故申命季弟監察御史定卜牲練日越八月丁亥祔享三室塪墉以尚幽設幄以迎精禮無尤違神用寧謐第一室曰秦州上邽縣尉諱濬以妣太原王氏配第二室曰綿州昌明縣令贈吏部尚書諱崇亮以妣贈太原郡夫人河東柳氏配第三室曰太原府功曹參軍贈太子太保諱丞簡以妣贈魏國太夫人富春孫氏配明年十月公由浚郊以介圭入覲真拜戶部尚書進爵為魯侯既辭戎旃得以列侯謁三廟是歲南至上不視朝又得以時展祭先期致齋栗然以敬既齋盡志歆然永思奉其百順陳以具物始躋而虔恭終獻而汍瀾既卒事顧麗牲之石宜有刊紀乃俾家老授其牒於所知云令狐晉邑也晉大夫魏顆以輔氏之功始封焉其易名曰文國語所謂令狐文子是也其先周文王之昭畢公高之裔畢萬為晉卿始封於魏自萬至顆蓋四世其後三十七世藍田侯虬仕拓跋魏為燉煌郡太守子孫因家遂占數為郡人藍田之孫熙在隋為納言惟上邽府君納言之元孫道克肖而位不至惟尚書府君西州之右族光未耀而德已基惟太保府君志為君子儒以明經居上第調補陽安縣主簿歷正平縣尉汾州司法參軍陜西大都督府兵曹終於太原府首掾始以顓經進既仕旁通百家愛穀梁子清而婉左邱明國語辨而工司馬遷史記文而不華咸手筆朱墨究其微旨愷悌以肥家信誼以急人德充齒耋獨享天爵故休祐集於身後徽章流乎佳城凡以子貴承澤降命書告第者始贈尚書祠部郎中再贈禮部尚書三加右僕射四進太保五為上公先夫人亦四徙封密印纍纍邦族聳慕生三子皆才彭陽公為嗣次子從端實肅給今為檢校膳部郎中參河東軍事季子前所謂監察御史今主柱下方書溫敏而有文綽綽然真令兄弟惟彭陽公以詞筆取科名纍參侍從由博士主尚書箋奏典內外書命遂登樞衡言文章者以為冠擁節總戎率身和衆留惠於盟津變風於浚都言方略者以為能夫浚師嚄唶難治乘釁竊發寖成習俗蒞政五載飲和革心束馬來朝熊羆隕涕問公還期觴必祝之留為常伯旋命居守汴人聞公之東近而愈懷翹翹瞿瞿盡西其首言遺愛者可紀焉貴而率禮老而能慕怵惕乎霜露齋莊乎廟祧睦其仲季施其鄉黨言孝悌者歸厚焉勒銘於碑以代彞鼎銘曰已孤之孝莫如備物顯彼新廟四阿三室時維仲月卜用柔日盞醴苾芬牲牷博腯籩甒在堂蕭膋在庭孝孫蒸蒸躬若捧盈低簪委紳薦俎登鉶肹蠁交感流涕緣纓禮以備儀誠以致美祖考來格錫之休祉工祝告訖退循軒戺乃授風人作詩以紀猗歟彭陽之寵光佐憲皇穆穆皇皇西省東臺迭為侍郎國之大柄咨爾平章敬宗凝旒俾鎮雍邱入為地官令守東州彭陽之忠厚宜介福以壽東郊既釐可復朝右帛丿糸帛丿糸其胄系於周舊由我顯起必昌其後大和紀元作廟之首刻碑廟門龍集己酉唐制五等有爵服而無山川登於三事得立四廟備物崇祀以交神明敬先報本以輔孝治有國之令典也惟長慶三年前相國王公始卜廟於西京崇業里公時鎮劍南東川上章曰臣涯官秩印綬品俱第三請如式以奉宗廟制曰可是歲仲冬申命長男孟堅祔其主於三室明年公入為御史大夫復以十二月躬行蒸祭間歲公出梁州就拜司空禮崇異數廟加祀室大和二年增新室既成祔顯考於尊位告饗由禮觀之者以為世程第一室曰上儀同幽州別駕府君諱元政以妣博陵崔氏配第二室曰湖州安吉縣令贈尚書刑部員外郎府君諱實以妣贈扶風縣太君馬氏配第三室曰朝散大夫青州司馬贈戶部侍郎府君諱祚以妣贈武威郡太夫人賈氏配第四室曰溫州刺史贈太尉府君諱晃以妣贈魯國太夫人博陵崔氏配初周王太子晉遇浮邱公化為神仙時人號曰王家其後遂以命氏顯於秦者曰翦三世將秦師子孫分居晉代間東漢有徵君霸霸孫甲亦號徵君徙居祁縣為著姓故至於今為太原人自漢涉魏益以熾昌凡十葉至後魏度支尚書廣陽侯冏廣陽有二子神念神感神念南奔梁神感北仕齊惟儀同府君廣陽侯五代孫也唐興於太原實從義旗佐成王業故有開府儀同之寵惟刑部府君以功臣子理二邑不躋貴仕故有錫羡後大之祥惟戶部府君幼孤以孝聞於鄉曲未冠以文售於有司由前進士補延州臨安縣主簿會詔徵賢良策在甲科授瀛州饒陽尉歲滿遷渭南天后在神都而東畿差重遂由渭南轉河陽適逢建萬象神宮甸內吏分董其役因上書切諫繇是名益聞開元初以大理司直馳軺車聯讞大獄閩禺朔漠所至決平早以欒棘傷生晚成劇恙樂就夷曠故不至大官惟太尉府君生於治平時以文學自奮年十有五賁然從秋賦明年春升名於司徒又一年元宗御層樓發德音懸文辭政術科以置髦士府君策最高授太常寺太祝未幾復以能通道德南華沖虛三真經進盩厔尉天寶中歷右拾遺左補闕禮部司駕二員外郎屬幽陵亂華遣兵南服因佐閩粵改檢校比部郎中行軍司馬時中原甫寧江南為吉地二千石多用名德乃以府君牧溫州朝廷虛公卿以俟高第及聞訃永嘉人輟舂罷社薦紳間以不淑相弔焉雖位負於道而邁德垂矩後之人得以纘承丕揚之其儲休啓祐有自云爾生三子皆聰明絶人長曰沼以神童仕至檢校禮部郎中次曰潔以奇文仕至國子司業今代郡公實季子也早在文士籍射策連中咸世其家貞元中德宗聞其名自藍田尉召入禁中視草厥後三典書命再參內庭憲宗器之付以國柄翊贊有道雖策免常居大僚今年自梁州請覲上思用舊臣為羽儀遂領太常其公府如故以一心事六君顯官重務靡不揚歷且夫起諸生至三公而心愈卑道益廣出授黃鉞以臨諸侯入服華章以謁家廟追崇極大位血食備多室享全榮而奉昭薦嗚呼公侯之孝歟宜書廟器以視喬公之三鼎其詞曰閟宇神庭邃清而嚴上公之儀四室耽耽犧以潔牲粢以大糦交神尚敬合魂尚氣子姓宗工駿奔奉事副笄侈袂儼恪居次孝孫兢兢執爵而升以祼以濯以伏以興水陸具來羶薌畢登列於圜方其器增增乃禴乃嘗敬而追遠二昭二穆孝以尊本瞻瞻几幄蹜蹜堂閫禮成起慕涕落元衮濡露踐霜誰無永懷不如達者哀與榮偕逢時奮庸誰不得位不如仁人以道為貴惟公之達兮名以顯親惟公之仁兮德以澡身六朝之清臣一代之全人宜其世家翼翼振振罔不肅祗於廟之門
