front:
  text: 全唐文欽定全唐文卷七十五文宗七
  hash: sha256:6bec01e98c32fb7b63bcdff7d150c6ec9d98475849358ae41787becbfa2c0ffa
body:
  text: 門下朕祗若天命纉承睿圖正統紀以清庶方序彞倫以貞百度慄慄寅畏於茲九年雖儉己飭躬推誠育物懼有未至不遑宴寧屬節氣交時疾恙嬰體列聖垂佑涉旬復初既上慶於兩宮宜覃恩於兆姓庶與寰宇同茲福祥自太和八年二月九日昧爽巳前天下應犯死罪降從流流徒等巳下罪遞減一等惟官典犯贓及諸色所由破用官物故殺人十惡等罪不在此限左降官流人緣近有去年八月九日勅宜即與處分為政之要必在去煩厚下之恩莫先巳責應度支戶部鹽鐵積欠錢物或囚繫多年資產巳盡或本身淪沒展轉難徵簿書之中虛有名數囹圄之下常積滯冤言念於斯所當矜恤其度支戶部鹽鐵應有懸欠各委本司具其可徵可放數條流聞奏不得容有姦濫在京諸司諸使食利錢其元舉人巳納利計數五倍巳上者本利並放其有人戶逃死攤徵保人其保人納利計兩倍巳上者其本利亦並放免其納利未滿此數者待納利數足徵本停利其諸色私債止於一倍不得利上生利仍委本縣各為詳理處分京邑之中本無榷酤屬貞元用兵巳後費用積廣始定店戶等第令其納榷況萬方所聚私釀至多禁令既不可施榷利自無所入徒立課額殊非惠人其長安萬年兩縣見徵納榷錢一萬五千一十貫八百文若先欠者並宜放免其榷酒錢起今日巳後亦宜並停比者滄寇干紀稽誅數年諸道興師屢獻戎捷時方討叛難議釋縲免死戍邊巳為恩貸今滄州一道久被朝章念其懷土之心必有向隅之歎俾之遂性用洽優恩其諸道所送滄州將健配流及邊鎮營田役使者共一千三百五十九人並委諸道節度觀察使據現在人放歸本管如有巳效軍職及自有生業不願去者亦任便住董昌齡自至邕州累平溪洞兵威所向首惡皆擒然每念蒼生無非赤子況在荒徼尤當撫循其溪洞如有未歸附者向後非因侵擾更不用進討仍加存撫使各懷安其所獲黃洞百姓並分配側近州縣令自營生不得沒為奴婢將充賞給如元是奴婢者即任充賞南海蕃舶本以慕化而來固在接以恩仁使其感悅如聞比年長吏多務徵求嗟怨之聲達於殊俗況朕方寶勤儉豈愛遐琛深慮遠人未安率稅猶重思有矜恤以示綏懷其嶺南福建及揚州蕃客宜委節度觀察使常加存問除舶腳收市進奉外任其來往通流自為交易不得重加率稅天下諸州府如有冤滯未伸宜委御史臺及出使郎官察訪聞奏於戲朕百靈所祐獲遂痊和虔奉神休敢忘昭報其五岳四瀆天下名山大川各委所在長吏致祭仍加豐潔以副精誠朕以寡德上奉丕構宗社流慶元穹叶靈微恙愆和旋就康復渥澤思及於人瘼儆戒先自於朕躬俾我華夷共歡富壽中外臣庶宜體予懷主者施行王者愛人如身推己及物恤其寒燠之苦適其舒慘之宜俾協太和用臻至理朕恭默思道憂勤在懷時屬嚴沴念深徽纆當霜雪之滯囹圄之中饋餉為勞逮捕斯擾沍寒所迫愁歎必多惻然疚心思有矜降宜布在寬之令使無留獄之嗟應京百司及畿內諸縣見禁囚徒應犯死罪特降從流流巳下者遞減一等如欠官錢情非巨蠹責保填納不要禁繫惟故殺人者及官典犯贓不在此限仍委京兆府及諸司官長制下日當速䟽決聞奏朕司牧黎元存誠寰宇況封甸殷廣京師浩穰憫觸法以罹辜式加恩而宥罪庶亡無告寧失不經宣示中外令知朕意朕以寡德託於兆人之上雖兢兢業業思理不怠而政道多闕和氣用傷仍歲水旱黎人艱食為之父母斯心鬱陶如聞魏博六州阻饑尤甚野無青草道殣相望及山南東道陳許鄆曹濮淮南浙西等道皆困於饑疫慮乏糧餉其魏博宜賜粟五萬石山南東道陳許鄆曹濮等三道各賜糙米三萬石充賑給委度支逐便支遣仍各令本道據饑乏之處賑給淮南浙西兩道委長吏以常平義倉粟賑賜應諸道有饑疫處除出軍糧積蓄之外其屬度支戶部斛斗並令減價出糶以濟貧人其有牧宰非才貪殘為害及承前積弊須有條流或冤獄留滯速宜䟽決者並委觀察使糾察詳訪具狀聞奏用弭天眚以副朕焦勞之慮焉門下王者之御天下也推至誠以格物委大信以任人故能邦家用寧上下交感所以詔爵祿而不恡待臣下而無疑豈謂變起股肱患生毗倚寤寐興歎難弭於懷且負德背恩干紀悖戾古今未有能濟者蓋人神之所不容逆賊鄭注氣本兇狂志懷奸逆害時蠹政卜射張皇行詐而徑術多端黷貨而谿壑難滿情惟點白口可鑠金罔冒包藏為惡滋甚朕九重之內不得備聞擢於妄庸驟列華貫入司喉舌出總爪牙惟務廢忘不思報國棄生成之恩義亂君臣之紀綱稔慝興祆前古未有罪同梟獍法在必誅況詔旨既追巳離城堞險謀且敗中路遽迴又迤邐使人迎接逆賊李訓稽之國法豈逭常刑其鄭注在身所有官爵並宜削奪將士如有能奮揚義勇執戮渠魁者先是六品巳下官者便授三品正員官其先是五品巳上官者節級超獎仍賜莊田各一區錢二萬貫如有能率所管兵馬以州郡來降者超三資與官便正授岳牧仍賜錢帛諸道將士雖各守疆土非為進攻如被侵掩因事立效者亦準前例節級處分賊如能知義悔過束身歸朝並與洗雪仍加寵獎幽明可鑑朕不食言但有款誠自通即委諸道與奏若不能悛改自取誅夷罪止一身其餘脅汙一切不問其有迫於凶威曾著失節顧存家族事出權時待其平寧並從寬宥將士如有潛謀立功效順被其屠戮並優加追贈并賜錢帛仍與一子官應州縣百姓陷在暴虐莫保性命誠可哀矜諸軍環境不得妄加殺戮并焚毀廬舍掠奪資產及有拘執以為俘囚如有歸投者委諸道據丁壯老弱量加優卹仍給與空閒田地使就生業事平之後願歸本貫者亦聽鳳翔一軍素著忠義每臨霜雪之際實見松筠之心凜然義風在朕志其大將及軍士並宜坦懷自處勿以為憂兵革既平寵待如故鄭注初到鎮日聞有優賞軍將常事不足為疑州縣百姓亦當優給復勉於自效以保令圖於戲佳兵者聖祖之所戒文德者前哲之所崇肆予寡昧敢忘丕教然以齊四方者號令立人紀者君臣斯言苟違大倫安設今則絕其奔軼示以申嚴懷柔誠貴於止戈執惡何慚於用武布告中外咸知朕意朕以翼翼之心孜孜求理十年之內庶政未凝極其焦勞志在博採聿觀奇士冀獲長才取其節焉不顧發迹故李訓鄭注咸得進言望其沃心每許造膝邪人奸色順非而澤信行聽言深心厚貌包藏不怍偽辨無疑梟獍為心禍亂忽作意欲翦除中外悉去大臣志願非常自謀安泰賴上天垂祐宗社降靈同惡雖多姦謀竟敗忠臣輸力保護朕躬是日弭寧巳嘗布告尚聞閭里未悉予心猶有浮言謬相誑惑朕君臣之際疑閒不行致此妖妄慚非哲惠前月二十一日王涯賈餗舒元輿李訓鄭注李孝本韓約羅立言王璠郭行餘魏逢等親率金吾兵仗又郭行餘王璠領所部將健持兵上殿叶謀不軌傾覆社稷謀害中外凡此凶徒悉巳梟戮絕其遺類以謝忠良內外庶臣卿士百辟體予前志宜即自安無惑浮言尚相恐怖式布維新之慶宜申在宥之恩京百司見禁囚徒死流罪遞減一等未結正者推問畢日準此處分諸色所繇官吏陷於脅從雖有名籍涉於詿誤者一切不用更問仍付左右神策兩金吾京兆府御史臺並準恩赦處分休便追捕其有潛藏迴避限令出三日各歸本司逆人親族巳處置外其餘周親巳上一切不問所在更不用繫留聞報其先有定名捕捉者所在尋追獲日奏聞不得漏網昨者有擅入逆人之家盜掠財物擁無故之利生怙亂之心尚有縱酒聚徒妖言惑衆志於掠盜恐嚇居人假託軍司輒持兵器及以前月二十一日事妄相告訐者委御史臺京兆府嚴加伺察擒捉奏聞所在集衆決殺不在恩赦之限於戲齊晉之難桓文是興注訓之妖朕志先定識邪正之路辨消長之端覩衆臣宣力於急難見禁旅摧凶於頃刻當危急之際識臣節之勤藏於予心何日可忘宣示中外宜體朕懷嗣皇帝臣昂言古先哲王之有天下也必以孝敬奉於上慈惠浹於下極誠意以厚人倫思由近以及遠故自家而刑國以臣奉嚴慈之訓承教撫之仁而長樂尚鬱其鴻名內朝未崇於正位則率土臣子懃懃懇懇延頸企踵曷以塞其心乎是用特舉彞章式遵舊典稽首再拜謹上穆宗睿聖文惠孝皇帝妃尊號曰皇太后伏惟與天合德義申錫慶允釐陰教祗修內則廣六宮之教參十亂之功頤神保和宏覆萬有維太和四年歲次庚戌二月景午朔十二日丁巳皇帝若曰咨爾元子其敬聽朕命我國家累葉重光詒休昌運奄有區宇垂二百年良以親親無私建立子弟克固磐石作藩王家洎予踐位敢忘丕訓是用酌於舊典謀及台臣撰茲吉日錫以青社惟爾道扶正性天假令儀巳彰岐嶷之名載嘉信厚之器持大公之道且不愧於知子舉守藩之命亦將教於事君爰擇樂郊俾王曲阜環以沂水遂荒海邦今用命使兵部尚書平章事牛僧孺副使左散騎常侍吳士矩持節冊命為魯王於戲爾宜守正閑邪去奢昭儉害於德者不作逆於耳者必聽無昵宵人無違端士纂東平之樂善師河閒之好古日慎一日行之為難敬爾有國無墜我休命信可汗文維太和七年歲次癸丑某月日皇帝若曰王者運神功以清九有敷至德以柔四夷雖萬國建邦皆有君長而一時縟禮特厚親隣用昭絕漠之榮式示徽章之貴克膺盛典允屬雄材咨爾九姓迴鶻愛登里羅汨沒密施合句祿毗伽彰信可汗代濟公忠時推英毅剛明有守信實不渝總北方勁悍之師慕中華清淨之化克昭前訓實懷遠圖慶叶承家願申永好彼無侵軼此務綏安兩國咸歡六姻彌重事大之義而合志春秋相嚮之誠而皎如日月使臣旁午贄幣交馳詞意綢繆禮貌恭恪是嘉誠款宜錫寵光必能虔受新恩纂乃舊服今遣使寧遠將軍右金吾衞將軍兼御史大夫上柱國賜紫金魚袋唐宏實副使中大夫將作少監兼御史中丞賜紫金魚袋嗣澤王容等持節備禮冊為九姓迴鶻愛登里羅汨沒密施合句祿毗伽彰信可汗於戲海內四極惟唐舊封天下一家與我同軌舉茲典冊布於神明爾其慎固封疆祗守名器罔墜先烈載揚令猷欽承禮文以作來範維太和七年歲次癸丑八月甲申朔七日庚寅皇帝若曰王者欽若天道君臨萬方必崇上嗣以固邦本所以尊守器而重承祧也我祖宗受天明命光宅區夏元光被於生靈利澤霈於遐荒逮予寡昧繼纉鴻緒虔畏寅懼不克負荷思崇大典用建元良俾膺主鬯之重式叶奉先之慶咨爾元子魯王永惟哲淑聰明溫文粹和夙表岐嶷生知孝敬洎苴茅分社磐石啟藩蘊東平樂善之心慕河閒大雅之操天縱宏量日新令猷人神協志蓍龜獻兆是用命爾為皇太子往惟欽哉修己有度敬事無違居必思義動必率禮講道勵學親師尚賢則可以正曜於前星配德於重海以承列祖以奉粢盛恢宏懿圖無忝丕命可不慎歟維年月日甲子皇帝若曰三台羅列以承斗極皇王取象以建三公將以調陰陽乂萬國論道興化與天地參故職官物采不足以昭彰物數於是有明庭冊拜清廟謁見之禮以尊異之咨爾金紫光祿大夫守中書侍郎同中書門下平章事兼淮南節度副大使知節度事晉國公裴度有文理有武功有直聲有忠節宏深如大浸峭拔如喬岳愛人如慈母宰物如權衡師儒術於素王授兵符於黃石百行九德謺於其躬先王以上聖之資啟中興之運咸有一德時惟汝諧召雲命呂翕受交感翌助神算厎綏四方大斾東搖淮夷蕩定長策獨運全齊以平解紛消慝無小無大去權樹善或顯或晦非可以造次詳非可以一二計肆予小子昔當守器休功令問充溢聽聞逮此纉承委重藩鎮達經國之大體有事君之小心知無不為功多不伐可謂社稷之元老經濟之宏材者也予嘉乃勳懿乃德庸建爾于上公爾惟省厥初念厥終任天下之安危為夷夏之表式俾先帝之鴻業休德不墜於地俾予一人實受其福於戲敬哉朕聞古先哲王之為理也修己以安百姓恤刑而矜庶獄端立政以謹始宏厚澤以體仁推其心以及於物誠其中而化於外和氣斯洽休徵以臻故兵革不試而四海寧疵癘不作而三靈泰我有唐祖武宗文光宅天下列聖承統遂康區中漸濡丕冒掩軼前載宏茲道以騰英聲煥其文以耀終古惟此鴻業屬予沖人荷無疆之丕構託於兆人之上晝惕宵儆惄焉如疚仰惟宗社儲休神祇協力克靖內難恢復王綱思布和以立極爰正風於更始因體元紀號之典舉肆眚覃恩之命昭我恤隱與人維新可大赦天下改寶歷三年為太和元年正月十三日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正見繫囚徒常赦所不免者咸赦除之惟十惡五逆及故殺人官典犯入己贓不在於免限左降官量移近處巳經量移者更與量移其合復資者五品巳上中書門下速與處分六品巳下任從常例選丁憂去任在憂未赴貶所者服闋日亦與量移如有親故在上都任經本司陳狀不必更待州府申請流貶之中縱勅不許量移者及言終身勿齒者亦與依例處分亡官失爵各與收敘痕累禁錮並從洗滌其緣去年十二月八日坐累流隷者不在此限應緣山陵制度及喪儀禮物宜委中書門下及諸司長官博詢故實務遵禮度必誠必信副朕哀懷所緣山陵造作及橋道置頓所資並以內庫錢物充用如不足以度支戶部錢充京兆府今年夏稅青苗量放一半太皇太后第二等巳上親大行皇帝皇太后第一等親委中書門下量才敘用九廟子孫陪位者各加兩階仍據始封每王後與一人出身委宗正卿檢尋圖譜取一房最沈翳者充數具名聞奏內外文武官及諸色人任上封事極言得失無有隱諱天下諸色人中有賢良方正能直言極諫者及經學優深可為師法詳閑吏理達於教化軍謀宏遠堪任將帥者常參官及方牧郡守各舉所知無人舉者亦聽自舉并限來年正月到上都今年正月十四日上皇太后尊號及朕受冊進寶撰即位冊文承旨宣制等官各與一子正員七品官江王府官去年十二月巳前在任者並與改進其去年十二月九日立功將士普恩之外三品巳上更賜爵一級四品巳下更加一階其赴難軍使兵馬使都虞將士等仍各與改轉名銜聞奏門下王者祗見宗廟情極於孝思肅事郊丘義崇於嚴配諸侯駿奔以助祭百靈肹蠁而降祥感達神明斯為茂範朕以沖昧獲嗣丕圖奉累聖之耿光承上天之眷命以簡易宏宣政本以勤儉調順化源宵旰勵心思臻至道兢業寅畏於今四年屬興伐叛之師未暇燔柴之禮賴祖宗保佑上帝監臨氛慝澄清弓戈櫜戢今因南至有事圓丘薦誠敬於二儀申感慕於九廟羣祀來享至誠必通既陳信以告虔宜覃恩而廣澤可大赦天下自太和三年十一月十八日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正見繫囚徒常赦所不原者咸赦除之惟犯惡逆巳上及故殺人官典犯正入己贓不在免限左降官量移近處巳經量移者更與量移如復資者五品巳上中書門下速與處分六品巳下即任依常調選丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州府申請別勅因責授降資正員官未經改轉者量與進改亡官失爵放歸不齒者量加收敘縱元勅云終身不齒者亦量與收敘流人未到所在及巳到者並放還惟降死從流者並與移近地如巳收敘者量才錄用并僧尼道士移隷者亦與改還得罪人巳亡歿家口未許歸者一切放歸如有情願留者亦任諸色得罪人中如先勅云縱逢恩赦不在免限者并別勅安置者亦並委中書門下量事狀輕重節級處分左降官及流人先有官者如巳亡歿各還本官流貶人及諸色得罪人所在身亡任其親故收以歸葬仍仰州縣量給棺櫬優當發遣諸色人中有痕累禁錮及逃匿者一切並與洗滌常參官及諸州刺史有先因停替及以病解免并終制未授官者委中書門下量才進擬勿令稽遲選才命士所貴任賢黷貨鬻官深為貶法縱思寬宥亦慮惠姦其有偽官出身人近巳從流者與移近處未處分者減等處分未發覺者賣官買官人並仰赦書到後一月內於所在納官告陳首得免其罪如不陳首者巳後事覺不在免罪限封畿之內供億常殷既渥恩施宜加霑給其京兆府明年夏青苗錢宜放一半財貨之司姦屈皆有切資政理以遏倖門應度支鹽鐵戶部三司所管諸色官吏所由人戶等欠負太和元年巳前諸色錢物斛斗等各委本州盡理勘實如是貿易招狀入己隱欺即準條處分如緣收貯年深盤覆欠折水火漂爇事實有憑如此之類除檢責家產及攤徵元保外如實無可納空挂簿書連年囚禁者宜各具色目聞奏河南諸鎮仍歲兵荒百姓困窮宜有蠲免其鄆曹濮淄青兗海及滄德管內齊州明年夏稅錢每貫放二百文其稅子每畝十分放二分諸道方鎮自兵興以來或緣進奉助軍或緣本道徵發務求濟辦多是權宜今寇賊既平中外無事宜申典法以救傷殘天下除二稅外不得輒有科配其擅加雜榷率一切宜停仍令御史臺及出使郎官御史并所在巡院嚴加訪察自滄景用兵所在逐急須借諸州常平義倉斛斗權充軍糧宜令度支勘計速遣收糴填數聞奏邊防至重悉宜有素器械倉廩尤須精實比歲有司屢以營屯奏報約計諸鎮儲蓄合支數年尚恐生主吏欺罔未加約束宜委度支與本道節度及營田使子細勘會自營田巳來所貯糧見在倉者多少支得幾年軍糧具實聞奏又緣邊諸鎮兵額虛實器械色目亦仰聞奏如涉虛謬本判官必加懲責有欠闕當議添置務令摭實無挂空文纂組文采貴貨勞人奇技淫巧蕩心喪志將欲導其儉樸必在抑其華飾率化天下先自朕躬應緣乘輿服御宮禁供須一事巳上當從儉約自今巳後四方並不得輒以新樣難得非常之物為獻其機杼織作有纖麗尤甚若花絲布繚綾之類及幅尺廣狹不中常度者並宜禁斷仍仰天下州府勅到後一月日內所有此色機杼一切焚棄訖聞奏并委觀察判官嚴加檢察犯者以故違勅論縣令政切親人糾曹職當舉轄命於選部非不擇才比者令常參官得各舉縣令所舉不當雖有明文法既因循遂開僥濫自今後宜令諸州剌史及本道觀察使各舉管內堪任縣令錄事參軍者仍須資考相近并據闕申奏所舉官如才職不稱刺史書下考如至贓犯闕剌史停見任觀察使據事輕重臨時處分如政事修舉課第殊尤亦當明賞以勸能者立法之意使人不移苟私用之有名在公費而何害天下州府兩稅占留錢每年支用各有定額其迴殘羨餘準前後赦文許充諸色公用長慶四年二月三日制亦具言緣無分明條件可使執守刺史每被舉按即以坐贓論須為立程俾無甚弊其州府應合公用羨餘物并因循舊例與格令不同者並令尚書省御史臺明立條件散下州府使知所守永可遵行緇黃之衆蠶食生人規避王徭凋耗物力應諸州府度僧尼道士及創造寺觀累有禁令尚或因循自今巳後非別勅處分妄有奏請者委憲司彈奏量加罰責其百姓中有苟避徭役冒為僧道所在長吏量為科禁古者理戎皆舉成法將卒有制閱有時所以籍無虛名軍無宂食至於符守各奉詔條諸道先發轄屬支郡將士如聞衣糧解補猶繫使司詳其事理頗非便宜委本使差官檢元轄名額及賜糧等第文案與剌史勘會除續準詔勅抽停外據所合給錢米並以當州合送使錢米依虛實糙熟分數折計割入留州錢米數勘會訖州使各具分數聞奏應緣解補支給并委本州其使司更不緣得收管諸道諸州所置將吏如非原額周事之外更隨閒劇務從省方鎮刺史在京除官所須收補隨從人數有司即為節限他時替罷仍令隨使停解其方鎮交代之時及知留後官不得輒有補置如違委巡院官具事目申臺司錄奏其違犯官重加科貶所補人并本職停解剌史職在分憂得以專達事有違法觀察使寧不糾繩如聞遠地多未遵守州司常務巨細取裁至使官吏移攝將士解補占留支用刑獄斷結動須稟奉不得自專雖有政能無所施設選置長吏將何責成宜委御史臺及出使郎官御史嚴加察訪觀察奏聽進止本判官不能匡正及刺史不守朝章並量加貶降若所管州郡控接蕃夷軍戎之閒事資節制須得使司共為條理即不在此限邦畿之內物役殷繁事苟不均人何以濟如聞近年以來京城坊市及畿甸百姓等多屬諸軍諸使諸司占補之時都無旨勅差科之際頓異編氓或一丁有名則一戶合免往年制勅無復遵行宜委本軍本使及京兆府切加提舉準元和二年八月京兆府所奏勅及長慶元年制度節文處分自先朝以來累有赦令防姦除弊條目甚詳至如閉糴禁錢橫徵暴賦兩稅物估之虛實四方進獻之豐省再三處分非不丁寧出令不行名實自爽從元和二年巳後所有勅令宜委中書門下及內外百司按事施行勿踵前弊仍令御史臺嚴加糾察諸色出身三衞最濫假冒官蔭妄用優勞補既過多亦失實既參選敘命此理人積歲倖門誠宜杜塞其三衞三二年且不得補待先補人數盡無如更要補委有司條䟽嚴為限制每所補注挾名替闕如便可停廢亦詣實奏聞禮著從人詩稱下嫁義當選尚俾各有行其六宅十宅諸王女縣主宜令每年於選人中擇其情願者配尚授官之日量加優賞罷秩之後仍減兩選其初婚者更有賜與使備行禮如非士類不在選限其該載未盡處委中書門下別條䟽聞奏量能授用允屬於羣材舉善推賢是先乎公族經學可以宏教本高尚可以觀時風宗子中有才行著明文學優異者委宗正寺具名聞薦比類加獎諸色人中有精究經術洞該今古求志不期聞達委所在長吏具以名聞國家與吐蕃甥舅之好彼此無虞自今巳後邊上不得受納投降人并擒獲生口締構興運翼賛昌期勳鏤鼎彞名光冊載懷夙烈何日忘之武德巳來配享功臣及將相名跡尤著節義顯聞而子孫陵替官閥廢墜未經甄錄者委中書門下搜訪允嗣特加優異故尚父汾陽王贈太師晟贈太尉秀實子孫中未經甄獎者每家與一人正員官磐石之親義資敦敘穠華之慶道備肅雍文武庶僚中外執事或敬恭厥位或祗奉嚴禋爰考舊章用申慶澤亞獻循王遹終獻恭王通等各賜物一百匹夾侍正衣進珪捧珪各賜物五十匹亞獻終獻正衣各賜物四十匹大長公主長公主嗣王郡主縣主各賜物有差內外文武見任及致仕官三品巳上賜爵一級四品巳下加一階合入三品五品欠考未合敘者待考足日聽敘素王設教崇儒配於斯文虞賓在庭想遺風於先烈微言不墜令德攸彰文宣王之後及二王三恪各與一子官其祠廟委所在量加修飾禮重睦親化先合族慈訓克承於椒掖寵光宜首於觀津太皇太后皇太后二等巳上親皇后三等巳上親委中書門下各擇有才行者量與改官無官者各與出身皇五等巳上親三品巳上賜爵一級五品巳上加一階六品巳下及前資常選散官選日優與處分未有出身陪位者每家放一人出身應陪位皇五等巳上親及太皇太后皇太后三等巳上親三品巳上賜爵一級四品巳上加一階諸親四等五等并諸色陪位官五品巳上加一階六品巳下及白身人並賜勳兩轉其前資及有出身者各減一選推恩之令所以申孝愛襃贈之典所以極哀華爰加寵章用舉徽數常參官及諸道州府長官父母見存有官封者並量與五品致仕官及階并邑號如巳有者量與進改如官巳至五品巳上者即與五品階父母亡歿未經追贈者量與贈官及邑號輔弼之臣鈞衡是屬既當大慶爰錫殊恩中書門下及節度使帶平章事者宜特加一階如本階巳至正三品巳上者與一子正員八品官祖父母先亡歿各與追贈巳追贈者更與改贈節度使與一子正員九品官東都留守度支鹽鐵使觀察處置都團練都防禦經略招討使及神策金吾六軍將軍上軍統軍威遠鎮國軍等使皇城留守各與一子出身父母先亡歿未經追贈者各與追贈禮儀使大禮使京兆尹各與一子正員九品官大祀有嚴殷薦尤重凡在厥職宜特加恩應郊廟升殿行事官普恩之外宜更加一階如合入三品者量減三考入五品者量減兩考仍待考足日聽敘其合選人與減一選禮奉郊禋任親殿省忠勞既竭甄錄宜優內行事官三品巳上更賜爵一級四品巳下更加一階內侍省及內坊官四品巳上各賜勳五轉五品巳下各賜勳三轉應從駕至郊廟者普恩之外三品巳上賜爵一級四品巳下各加一階白身賜勳兩轉陳列威容肅清警衞載加寵錫用示恩私神策六軍威遠營左右金吾及皇城將士應緣大禮儀仗宿衞御樓立仗等普恩之外三品巳上賜爵一級四品巳下加一階仍依舊例賜物有差其神策將士應在京畿諸縣者亦各有賜物應緣大禮職掌行事官并修撰儀注及留守副留守倉庫卿等普恩之外三品巳上賜爵一級四品巳下各加一階要荒地遠職貢方來既覩郊禮之盛儀須覃慶賜之殊澤鴻臚禮賓院應在城內蕃客等各有賜物諸道知上都進奏院在城各賜勳三轉應緣大禮四方進奏䟽及賀官各賜勳三轉藝術所資優假宜及況因大賚當給新恩翰林待詔供奉并諸色直見任及前資并員外試官三品巳上賜爵一級四品巳下各加一階無官者賜勳兩轉爰執豆籩克恭薦饗或賛引叶於義矩或祗飾奉其事功心畢幹勤理當襃獎郊廟行事齋郎減二年勞室長掌座禮生賛者減一年勞無勞可減者便放出身崇元館行事學生及齋郎禮生番考巳滿所司緣大禮部卻追入行事各減一選國子監學生陪位者賜勳一轉中書門下儀制官各加一階應緣祗供作官直司長上諸州行綱考典兩縣耆壽諸色番役當上在城并量留十月番者各賜勳兩轉飛龍閑广既宮苑典引掌扇內園總監栽接少府將作內作中尚武德軍器內外弓箭庫等諸司諸使下白身人及無品直司定額長上雜匠巧兒黃衣長上監門直長雜仗三衞七色引駕細引執扇角手弩手彍騎武士天文觀生歷生漏生典鼓典鐘工人樂人主衣主膳主酪典食胡食手宰手掌閑幕士御士醫工獸醫門僕藥僮御書手楷書手典書流外行署等各賜勳兩轉夫務仁壽莫若敬耆老厚風俗莫若勸名節天下百姓婦人年九十巳上各賜米五石絹兩匹綿一屯羊酒有差版授下州刺史郡君八十巳上各賜米三石絹兩匹版授上佐縣君孝子順孫義夫節婦旌表門閭終身勿事先巳旌表者量加優卹並委令長賚米帛就家宣賜訖具名申本道一時聞奏極天而峻既多鎮定之功赴海不窮且有朝宗之義五岳四瀆宜令本州刺史備禮致祭大報之德咸秩當行常祀雖定於歲時徧祭因宜乎柴燎載慕前王之令德復想古人之義風名山大川自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行朕以寡昧祗奉昌圖兢業為心不敢自怠庶乎播祖宗之光烈致區宇之康平推誠不疑惟才是用豈謂凶姦背德宗社將危中外叶謀咸加顯戮知人則哲實在帝而猶難罪已興懷誠為君之不易緬慚古理良用惕然是用因元正御正殿先明首罪仍布鴻恩王守澄累朝獎任久掌禁軍忠力雖多愆誤難掩交通雜類延進奸邪專弄威權蠹害時政鄭注李訓因緣引見忝竊恩榮二三舊臣誣陷非罪成予寡昧抑有其由遂使姦惡搆連竊起前殿王涯賈餗舒元輿李訓宰輔股肱叶謀不軌王璠郭行餘節將在京率兵上殿羅立言李孝本紀綱臺府深入領徒韓約誘金吾衞兵立成嚮背魏逢驛騎來往鄭注自出成師將相通謀情狀咸具上天降祐氛祲巳清討其本因巳正刑辟王守澄既巳云亡難議深責自特進巳下官爵及實封並宜削奪禍巳終於既往恩宜覃於有截可大赦天下宜改太和十年為開成元年自正月一日昧爽巳前大辟罪巳下罪無輕重常赦所不原咸赦除之其左降官量移復資及才用有足稱者中書門下處分貶流人中元勅不許量移及終身勿齒者並與量移其去年應緣朋黨連累並十一月二十一日坐罪流貶者不在此限其身亡伏法者委所在州府量給棺殮任所親收葬制服其戶部度支鹽鐵應有諸色欠負太和五年巳前者並放免諸道賀正端午降誕賀冬進奉起今權停三年其錢充紐放百姓兩稅所在除藥物口味茶果外不得輒有進獻百司及諸道應宣索制造一物巳上者並停三年京畿百姓兩稅巳下凡一歲之內徵取者并百官職田並全放一年其京兆府一年所支用錢物斛斗草等並勒鹽鐵使以開成元年直進綾絹充還同州河中絳州去年旱歉賦斂不登宜放開成元年夏青苗錢同州賜雜穀六萬石河中絳州共賜十萬石委度支戶部以見貯粟麥充賜三省九列御史臺選黜陟使十人視問風俗進賢退不肖興行新制務令通流天下戎鎮文武帶憲官者解補進退並須奏聞其邊州令制譯語學官常令教習以達異意內外文武官及諸色人任上封事極言得失有裨時政者必加升擢待以不次其有藏器時隱身岩穴奇節獨行可激風俗者委常參官及所在長吏各以名聞文武之道合而兼濟勳臣子弟有能修詞務學應進士明經及通諸科者委有司先加獎引河朔節將以州縣歸國者有張茂昭田宏正程權各與一子官子弟堪任使者委中書門下量加引用應內外文武官進階加爵有差朕觀法界曠閴無垠應緣成事允用虛根清涼國師體象啟門奄有法界我祖聿尊教融海嶽恩廓乾坤首相二䟽拔擢幽昏閒氣斯來拱承佛日四海光凝九州慶溢敞今仙門奪古賢席大手名曹橫經請益仍師巨休保余遐歷爰抒穎毫式揚茂實真空罔盡機就而駕白月虛秋清風適夏妙有不遷緣息而化邈爾羽儀煥乎精舍
