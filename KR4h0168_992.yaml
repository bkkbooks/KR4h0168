front:
  text: 全唐文欽定全唐文卷九百九十二闕名三十三闕十六字文州總管光祿卿闕二字公陸使君碑闕十八字黃而哲德闕二字胙土聯周邵而啟封功葢天地煥乎油素洎齊宣分邑是曰陸侯避地闕五十字江闕十三字仕九載六闕二字職平闕二字之利在於二陸晉世以為美談傳之闕一字策六世祖載闕一字功典午人倫領袖宋闕十三字長史闕一字鎮闕二字既沒赫連因即事魏累加冊命位闕一字三台一心百君股肱攸屬家居京兆名貫涇陽闕一字宦四闕一字年餘六百曾祖闕一字魏冠軍將軍營州刺史行闕二字物闕二字威邊求闕一字有寄得人斯在祖政周驃騎大將軍儀同三司恒涇二州刺史闕一字都獻公幼遭不造居貧致養孝泉之感達闕一字幽明雖累葉掩闕二字不忘其本俯拾青紫家風無墜闕一字鍾儀楚奏莊舄越吟事止其人未聞世載以今況古闕一字有慙焉父通闕一字八柱闕一字左光祿大夫侍中大司馬大司寇大司徒秦襄陜三州總管綏德定公器宇宏亮神闕一字俊傑闕一字理所寄總握兵戎使君即定公之第五子也幼挺岐嶷之姿早標令問之譽機神穎敏識闕一字宏深以保定五年釋褐左侍上闕一字從班例也爰始弱冠時人以宿望闕一字之能闕十六字天爵斯闕七字御闕一字少納言闕一字侍帷幄獻替之道有聞升降丹墀闕二字之闕一字斯闕一字僉議惟允嘉聲載穆闕三字古信闕一字股肱闕一字年以從周武皇帝平普陽之功又遷使持節儀同大將軍安澤縣開國侯邑八百戶闕二字一駟闕三字百匹執干戈以定闕一字亂警屯衞而肅鈎陳位列三槐爵隆茅土祿兼萬石名冠八龍將相闕二字榮名闕一字襲宣政元年詔闕二字陽闕一字特進封安澤縣開國公增邑二百戶名高五等位闕一字千邑宏才懋實榮顯一時昔闕一字臣之在會稽事闕三十六字大納言鼎實方闕一字寄於鹽梅闕一字言闕一字無爽闕八字望有闕二字隋革命禪代伊始闕二字萬類任切共闕一字綏邊之寄非公莫可乃下詔曰開府儀同三司大納言陸讓器闕三字識闕六字久闕一字實攸歸宜加榮命用申優擢闕一字廣州諸軍事廣州刺史散官如故七年又遷文州諸軍事文州總管褰帷導德政肅刑清闕一字以秋闕二字以夏闕一字十三年又以顯州之地風俗未淳川洞阻深雄豪為梗乃以公為顯州諸軍事顯州刺史公下車布政闕一字服其闕一字字彼萌黎抑茲闕一字禦導之以德齊之以刑易俗移風政成期月聲馳百里化周萬物大業五年詔闕一字光祿卿封闕一字惟公器量宏闕十三字入侍帷扆既曰腹心出宰名藩實宣王化故能為政以成德立德以濟時厥志不迴其儀匪忒汪汪焉澄闕一字不能闕一字其志肅肅焉風霜不能改其節喜慍不形於色在貴不以淩人容止可觀行為世則所謂珠生合浦玉產藍田闕二字琳闕一字家承餘慶者矣不幸闕一字疾春秋六十有二以大業六年正月闕一字日薨於河南郡雒陽縣之私第即以其年二月還京權瘞於長安縣之高陵原夫人隴西李氏闕二字魏公椿之闕一字大將軍趙郡公晏之女也齊眉為禮相待如賓閨門雍穆人闕一字益敬書曰刑于寡妻至于兄弟以御于家邦在公之謂矣隋之云闕五字因闕一字邅闕一字未闕二字厝以大唐貞觀十七年歲次癸卯十闕一字月丁未闕二字六日壬寅闕一字葬於雍州三闕一字縣闕二字原禮也第闕一字子闕三字政縣令闕一字叡幼闕一字荼蓼毀瘠過禮趨庭之訓闕一字世無期反哺之心終天闕六字宅兆斯安式紀芳猷乃為銘曰舜闕一字干嚳媯育于姜本枝派別百世其昌闕五字相名揚允文允武為龍為光闕三字躍闕三字秦闕三字屬闕二字其人闕一字沈闕一字亂闕一字事莫闕一字徒聞闕三字為魏臣闕二字安闕一字禀德高門爵隆位顯名揚闕一字尊仁闕五字斯敦闕九字德教闕一字降靈川岳智闕二字齒才闕一字幼學繼此庶闕一字挺茲先覺趙璧闕二字隋珠在握為闕八字宏獻替乃肅鉤陳趨奏丹陛使繁紫宸偉矣令德猗歟闕一字人三方闕二字九闕三字運籌闕一字廟樹功王室氣烈秋霜闕二字冬日懋德懋官且文且質闕二字周德有隋革命知人則哲闕三十六字雍穆自如闕十字家風馳景迴軒逝川闕三字此闕二字言歸闕八字化闕五字炎涼闕五字子闕一字煢孤闕二字兆有隆闕十字寒隰芳猷使遠音徽永闕一字
