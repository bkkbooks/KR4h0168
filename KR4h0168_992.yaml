body:
  text: 上闕州刺史闕三字司徒公闕六字華藩分銅虎闕四字羽闕二十六字拔闕一字大都闕一字志隆闕三字備闕一字端懷厚闕一字於九功闕一字留情於七德汪汪有闕二字之量仡仡有勇夫之質父嵩稟性虛凝不闕一字榮闕九字一混是非窮柱下之深趣雙舉鵬鷃得濠上之幽情公家承禮教籍慶膏腴闕二字不㣥英姿闕二字皎皎若霜潯之暎秋桂肅肅似風嶺之茂寒松聞詩禮而遊方觀儒墨而覩奧每登高憤歎投筆長懷企梁竦之忠謀追班超之義勇闕三字西山之闕四字之戎冠六郡之良家雄五陵之俠少屬火運挻災乾綱紊緒焚原靡救闕一字類毋遺大唐標闕一字帝之靈文兆蒼精之祕籙起闕二字之積甲建參野之連旗經綸大夏之墟締構潛邱之壤指麾日月負閶闔以闕一字移闕二字山川闕三字而闕一字轉於是薦名相府委質戎場揮霜劍而斬老生奮長㦸而摧霍邑殊勳克著授公上儀同三司於時絳州逆命不順皇猷公扼椀齊心徵冠目裂布魚麗之陣擬却月之城瞬息之間俄然殄滅獲勳居最授朝請大夫於時武周作梗同黑山之未平建德亂階類黃巾之猶熾太原北望無復人煙之墟絳川南指咸為戎馬之地危闕一字孤立是曰浩州四面受敵千里絕援關山杳杳望長安如日邊歲月遙遙疑京兆於天上田單之固即墨窘若懸巢郝昭之守陳倉危同累卵於是總管真鄉公李仲文乘連率之華當廟畧之委以公茂族盤根任之心膂親御矢石展効立功授上輕車都尉闕一字貞觀三年頡利雄視龍庭控弦百萬虔劉都鄙擾亂邊垂太宗文皇帝坐黃屋以永懷臨紫宸以太息傷彼殘賊哀此氓黎爰命英公董戎薄伐公闕三字之劍持冉有之矛執角爭先中權後勁獲勳第一授上大將軍賞物四百段遂乃八表乂安四海清晏公乃韜戈息騎琴酒怡神咀嚼六經漁獵百氏臨池入木之技逸少見以多慙獻賦制檄之才相如謝其清俊上聞宸扆爰降絲綸召公為金門關闕一字將公辭兩疏之闕一字冠掛東門謝司農之官傳芳北海至七年又辟公滕王府司馬公志性林泉賞心風月悟有情為速朽識多財為累愚悲景燭之不闕一字哀霜闕一字之逾遠深憑實相宏立勝因雖陸生散千金之資實朱公棄五闕一字之產儔斯樹闕一字未可同年以此固辭確乎不受太宗文皇帝崩遺詔起義元從班例加勳詔授上柱國皇帝駕幸并州公策駟遠迎蒙恩闕五字段公勳庸克著英聲美於五臣榮寵既章功名顯於四佐如何與善徒欺輔仁多爽滔滔閱水既一逝而無歸冉冉生靈亦百年而有竭闕六字遘疾薨於私第靈座空而遊塵滿闕一字簷廓而暝禽哀追闕一字德於猶生想音徽而以謝農夫輟耕而永歎機婦罷織而長嗟豈直巷絕歌聲鄰闕五字以乾封二年歲次丁卯十一月丁巳二十八日甲申遷窆於大夏鄉隱泉之原禮也前臨梓澤俯眺九京却背隱岑岧嶢萬仞西瞻翠嶺峻峙闕五字汾杳然如帶夫人王氏令望江東派流并部姻連三輔婚闕一字五闕一字內睦六親外諧九族痛長城之永別淚染湘川悲隴水之分流更成嗚咽闕五字子宏道並左親衞立性廉讓虛己接人孝乃天性忠為令德亞劉宗之兩驥埒韋氏之雙珠攀靜樹以長號闕一字寒泉闕一字永慕以為鐫金闕二十三字銘闕二字其詞銘詞全泐聞夫上圖列緯樞星分帝座之尊下奠兼山太岳峙天孫之鎮欽惟昌運憲兩儀以相成聿闕一字本枝闕一字三才闕四字坤之業闕一字峻闕二字之闕十八字清廟武光列將警重析於巖廊寵懋親賢在於淄川公矣公諱孝同高祖太武皇帝之從子太宗文皇帝之從祖弟也竊惟流雲降祉種德兆於勳華御氣騰真至道光於天地元功潛運貽寶祚於千齡睿德昭昇撫貞符於三大十九皇而統極一六合以為家是以璿闕一字鬱雲臨扶若而交蔚珠源蕩日掩河漢以分流比夫黃神握圖得姓止乎任姞丹書受命錫允啟乎應韓固不可同年而語矣曾祖太祖景皇帝沈迹栖神韞龍田以雲覆飛英演化應贙谷以飈騰八柱之業載宣萬㝢之心闕一字係同夫后稷垂景命於岐昌取譬舞陽迨尊名於始闕二字聖之徵闕一字兆配天之典逾峻祖寧州趙興郡守海州刺史鄭孝王粹表霞軒雄圖岳立軼東平而振響架北海以翔英父光祿大夫宗正卿左領都督右衞大將軍山東道行臺尚書左僕射右衞大將軍元武軍將開府儀同三司上柱國贈司空淮安靖王屬締構之初材高八子會經綸之肇寄重二南負寥廓而上征淩姑餘而獨運擬諸漢室楚元推轂以並驅方彼魏朝任城望塵而後殿故能入光上鉉出總元戎㣥辟服其羽儀列藩題其標準公宅慶朱邸憑光紫漢羊車在馭先攄拔萃之姿獸艦登闕一字獨擅生知之敏闕一字諸帝闕一字自開明月之珍類彼天河闕一字毓浮雲之駿屬隋綱弛而㣥凶競逐五鎮驚塵四郊多壘高祖佇清坤軸載握乾符電發參墟則六軍西引風驅秦甸則五緯東足厂墨靖王夙購精兵潛居鄠杜義旗甫屆首應睿圖公親奉旄麾聿參霸畧太宗時為秦公總兵長安之右及進圍京邑公即隸焉公嘗承間啟靖王曰秦公瞻視非常功業又大雖非儲貳必膺寶歷靖王心然之因令委贄秦府初為庫真疑特蒙寵渥高祖踐祚授柱國武鄉縣開國公邑二千戶於時甫戢干戈廣置庠塾乃於延閣別開學館賢戚子弟擇秀異者升之公以夙成特膺俊選蒙泉已導臨石渠而載遠覆簣初基踐蓬山以增峻武德五載封淄川郡王邑五千戶啟胙荊燕初襲中陽之命降班齊趙旋遵建武之封九年徙爵為公從朝典也太宗御極授左千牛備身執㦸匪疲是託寸苗之地處錐方挺聊因尺木之階亦由瑞鶠行騫起丹山而儀紫閣化鯤將運擊元海而負蒼垠然而靖王無祿嚴庭輟訓公孝情冥至哀毀逾禮雖縓服告終而琴聲不作既而承顏聖善弛情宦路侍鮑輦於西園奉潘軒於東閣蒸蒸不匱僅將一闕一字朝廷嘉之不奪其志就拜游擊將軍旌厥美也而風枝難靜茹荼再集抑其滅性之規永結終身之痛服闋授右衞交川府右果毅都尉尋除右衞親衞府左郎將未幾遷中郎將皇上纂圖加寧遠將軍累遷左千牛中郎將兼檢校左衞將軍尋拜左驍衞將軍巡警千廬累叨司階之任抑揚六校克著聞鼙之想蘭錡式清闕一字將之聲允穆竹符載剖循良之寄是歸顯慶二年授使持節普州諸軍事普州刺史宣風玉壘叱馭而越危梁恤隱銅陵坐嘯而清獷俗俄以他事坐為士伍尋授播州刺史舉計入朝詔復本官原其非罪旋加明威將軍仍統右羽林軍事屬南薰之期典北軍之重密勿軒禁時論榮之有事介邱親陪鑾駕總金啟路清鳳蹕於離宮會玉升壇肅龍麾於帳殿夤承千祀之慶載紆七命之寵闕一字壯武將軍乾封二年遷右衞將軍仍舊北門供奉鈎陳効職庶長奉於紫宸劍折貽妖遽歸全於元夜以總章二年十二月薨於京師永安之里第春秋六十有二宸襟軫悼乃降詔曰飾終加等義在於念勞悼往由恩理存於顯懿故右衞將軍淄川縣公李孝同地分枝戚望重簪裾幹藝優游風鑒開爽剖符方鎮仁明之化載彰肅旅中軍爪牙之寄斯允闕二字奉蹕闕一字効趾於行珪夜壑遷舟闕一字貽災於瘞玉奄從物化實愴於懷宜被寵章式旌幽穸可贈左武衞大將軍使持節都督代忻朔蔚四州諸軍事代州刺史又賜物一百五十段米粟副焉喪事所須闕一字命官給仍遣梨園樂人闕六字之日特降中使賫錦被及衣一襲以送終惟公承累聖之闕一字基資樂善之餘慶闕二字英勇髮闕一字初髫靖王嘗謂妃曰昔闕二字方闕二字空善觀闕一字子何闕三字以其小名錫之闕一字字雖復顧雍早秀先憲伯喈之名桓溫夙敏爰採太真之性比跡傳事固無慙德洎乎成立卓焉俊邁直節闕二字風之韻韶姿開朗月之華識闕一字藝闕一字廣闕一字踵闕四字躅蘭陔竭地義之範荊庭睦天倫之愛故能武帳升班戎軒締倖實惟肺腑之重委以腹心之寄門羅棨㦸躋一代之殊榮室滿歌闕一字章百年之至要所謂風流不替德音可闕一字者乎零落蹊桃徒結無言之痛摧殘營柳終虧長揖之期於戲哀哉粵以咸亨元年歲次庚午五月廿四日歸窆於靖王之舊塋禮也有子朝散大夫行闕二字司馬闕十九字參軍事瑱等並幼彰翹楚式光枝屬銜恤苴庭泣英規之永謝延襟柏隧痛貞猷之莫紀爰勒豐碑敬揚徽烈其銘曰天地交泰日月騰光啟聖龍躍膺圖鳳翔牢籠千古業契升唐掃清六合功包翦商兆分帝系式振皇綱九族既睦四維是張惟孝惟靖實光闕一字屏如珪如璋元穆闕二字勳高寄重身歿名揚累仁垂裕樂善隤祥英華粹發岐嶷先彰毓彩藩閈崇貞志堂峻圖負日遠概淩霜時鍾毀冕道迫褰裳嬴氏駭鹿項暴儀闕一字五都板蕩九服闕二字奄屬歸闕五字金闕一字効祉玉闕一字栖芳跡參披棘慶襲留棠承顏不匱就養無方聿歡定省薦革炎涼帝疇純德爰加寵章孝實忠本乘柔蹈剛鷹闕一字武帳鶚視戎場闕三字部憬闕二字康北軍典要禁闕一字曾闕一字中外闕一字緯闕一字實允臧行期燮化遽愴殲良趙墳樓起薛邑池荒載刊石籀永播金相闕二十七字少女之迴風闕一字啟靈泉覩常儀之浴月蓄淳精於洛館則仙媛呈姿浮淑氣於巫臺則神妃降彩識昭天祚乘馬闢桑珪闕二十七字蘋蘩闕二字中饋靈液手歇固韞異於遐年神道會昌復摛英於聖代妃諱闕字闕河南洛陽人也自大電流樞有闕二十八字軒闕二字始錫命於中陽國與地分人隨代起晉人失御鐘鼎墜於金陵魏氏乘期衣冠遷於鼎邑天保未定閎散為疏闕二十五字兵部使持節洛州諸軍事洛州刺史上柱國定陵懷公懷岳降神自天生德受黃書而筮仕杖青萍而應務漢開八校金鉞總闕三十二字於書社祖立素益州大都督府長史太子闕一字庶子材膺半古道亞隣幾更生九流之藝惠施五車之學緝容闕二十五字多榮袟闕二字井闕一字實允官賢之寄護駕銅闈深諧正人之舉父爽尚書庫部兵部二曹郎中渾金在器華璋表質齊臣守境非照乘闕二十一字伏奏丹墀闕一字動闕一字楹之眷含香闕一字署旋承覆被之榮東道未申西崦驟落妃闕一字精月媛擢秀川娥體柔順以宅躬資閒婉而居性德行高闕二十二字崇令範佩闕一字候曉事親之道逾恭執燧垂宵端已之情彌厲父母由是特所寵異常稱之曰此女年雖幼小至於女則婦道母儀三者闕二十字圅祕闕三字即究精微石室藏書一覽便探奧賾察姜任之往行雅叶貞心想樊衞之餘風懸符夙志女圖斯鑒恥飾於鉛華姆教可遵欣闕二十字河間之闕一字神聰穎徹敏藝該通縱八體於銀鈎垂六文於繡篆闕二字玉霰先裁柳絮之詞歲啟銅渾獨綴椒花之頌然以神虬沐雨良非躍闕二十三字宸紫泥降合姓之闕一字元闕二字問名之禮年十有三出歸於紀國曰惟大王高祖神堯皇帝之孫闕十九字八闕一字分區下應天孫之岳綠車命秩盛德光於建侯闕一字玉闕二字鴻勳表於維翰貞觀十七年有詔冊命為紀王妃禮闕十七字妻闕一字和鳴之兆三星始照符結帨之嘉期闕一字月初開合闕一字笄之令節鏘八鑾於桂邸聲振歸韓驅百兩於香街禮均迎渭來朝闕七字入闕九字心闕一字上闕一字誠闕四字式序無闕二字地之儀尊卑有常克盡移天之敬暨隼旟出牧翟羽隨軒幾馭韓城之闕一字洊撫漢地之闕一字耕夫執耜瞻杏路以闕五字機闕一字桑郊闕十二字雖被大闕一字之風亦乃先妃之闕二字以闕一字羃酒醴供潔闕一字修怡顏候色朝夕無怠此妃之孝德一也沃盥饋食備服紘綖代終無成理內從教此妃之順德二也粉澤圖史尊敬師傅毀譽靡涉於言喜慍不形於色此妃之淑德三也閑邪闕一字偽避嫌遠引匪車迎而未從無符召而弗至此妃之正德四也食無重味衣絕輕鮮襲澣服之闕五字之闕二字此妃之儉德五也鳲鳩均養蓼莪深闕一字始鞠之於乳哺終闕一字之於襁褓此妃之慈德六也持盈守道蘊智韜光悟託賢之去禍知淩人之及難此妃之明德七也以斯七德闕六字較闕二字或聯芳彤管疇賢罕能齊躅名馳楚甸道邁梁藩舉族闕一字其徽音闕一字壺傾其懿範皇姑降念方愛子而為一睿后流恩闕一字密親而莫二既而祥通隕䴏慶動闕三字玉樹之闕一字庭闕一字金芝之照室妃所生東平郡王續等六男江陵縣主等八女帛丿糸紳在歲咸承教紝之慈髫髮登辰俱闕一字斷機之訓是使貞姿夙茂輝光日新令德彰於遠邇休聲顯於家闕五字播闕一字梓之芬芳膏壤分圻煜棠棣之芳萼實謂浮觴九獻永保長筵之驩積粟萬鍾方慶闕一字堂之壽而福謙愆應遘疾彌留金液闕一字痾去三山而海絕玉橫延歲瞻五城而地遠風闕六字吾之闕三字易流俄啜仲由之泣以麟德二年六月廿六日薨於澤州之館舍春秋三十有五其日即考之諱辰妃久嬰沉疾屬斯增慕情不勝哀因而隕絕闕十二字帷扆悽愴空盈禭衣之念歎結行路哀闕一字搢紳紀國太妃時在洛下初聞凶訃頗極哀痛之情旋遣悼書備竭辛酸之旨自非德行昭著操履堅貞何以見重闕二字始終不易者也先妃神情闕一字敏天性純闕二字纊之際先勗供伺闕一字家易簀之初特闕三字慈母送終之禮纔使具於楸衣居喪之制不許越於苫寢追往慎終咸從遺命有闕四字節闕一字祭闕二字布五百段米粟三百石陪葬於昭陵喪葬所須隨闕一字官給又令京闕一字五品監護靈轝還京又遣司衞少卿楊知正監護儀仗送至墓所往還粵以乾封元年景寅十二月壬辰朔九日庚子葬於陵南二十三里惟妃太陰之靈仙兌之英乘絳河以秀出體黃坤而挺生履道循規闕三字粹闕一字犀學圃習詩書以立身礪蜃情田樹闕八字始闕四字華闕一字頌七篇深窮於旨趣榮辱一致偏崇柱下之言得喪兩忘殊好給園之說由是動無悔居靡憂虞嚴以訓家敬以直內至於四時享宴三朝起居或稱闕六字言闕九字塗山之歌悅彩摛詞雅會娥臺之曲聲參夏籥韻入虞韶金石由其克諧人祇以之有悅故得教孚帛丿糸㝢德冠前修雲籀奮其英蕤河緯騰其茂烈而闕十五字中天奄闕一字於戲哀哉闕二字從闕一字禮備於飾終鸞輅戒徒榮頒於詔葬川分清渭路轉黃山拒畢陌而疏塋控橋陰而列隧峯橫偃葢爰標錫允闕十字之闕三字銀青光祿大夫行司屬少卿東平郡王續等茹荼嬰慕集蓼厂田坴哀擗厚地而無追攀穹蒼而罔逮日月遄謝愈傷望屺之懷霜露亟濡尤切循陔之痛以為闕十七字而可闕一字式鐫金碣以樹山門銘曰闕二十三字繁門闕一字黃閣路闕一字朱闕一字錫類有徵象賢無墜上庸登鉉闕一字陵傳瑞大父忠良儲端表器顯考英偉郎官啟位允緒克昌賢才挺闕十九字兼四行迺專一稟教母儀闕一字規師氏藝殫闕一字帨學該圖史擁燧貽則佩觿成軌潔盛羞蘋陳甘薦祉譽洽彤扆恩延綠綈施闕二十三字五潢垂耀十枝分景翦桐開國疏茅樹屏駟馬爰駕龍旂載整葉藹闕一字丹功崇鏤鼎合酳貞吉諧琴作配方咸娶女比兌歸妹闕二十二字遄征翊化千里宣條闕一字城曹園月朗楚觀風清春椒獻頌秋菊裁銘永言孝思因心則友訓子折葼承姑奉箒匪莪恩洽吹薪德闕二十三字貞烈謂神祐仁先喪明哲悲逾輟相悼深捐玦卜遷夏屋詔葬蛩陰地乳西距天闕一字北臨楚挽宵唱哀笳曉吟峯高霧闕二十六字留歎藏舟之難固庶貽範於穹壤敬刊石於泉路公諱晦字闕二字隴西成紀人也闕十五字祖闕三字王安父河間元王孝恭豐功闕一字烈國史闕九字妙氣闕四字淑靈闕二字彰於闕八字貞闕一字精粹之性清明潔白之美闕十五字邈闕二字崇闕八字機士之百行罔不該矣貞觀末授通事舍人轉尚太常卿闕六字左衞率闕一字府事闕四字河朔邊要之闕二字選為難以本官檢校幽營二州都督崔林作牧朝廷闕八字功闕五字之闕一字兼之者闕一字也累遷闕二字衞將軍右金吾將軍加忠武將軍檢校雍州長史望闕一字而清風流闕二字而闕二字洽咸亨之始關中阻飢盜賊公行所在闕二字公鎮之以清靜綏之以惠和政得烹鮮時無吠犬治闕二字拱家乏闕一字鱗闕五字雨之沾草木加雲麾將軍右金吾將軍尋檢校洛州長史兼知東都留守三州都闕五字為政以德惠下以闕一字豪右闕一字氣百僚祗服車駕闕一字巡闕一字賜繒帛以襃美之高宗嘗從容曰卿父元王克清江漢朕今於卿闕一字同魚水一日不見滿座無歡其君臣相得也如此及高宗晏駕水漿不入口者數日號咷擗踊志不闕四字之初優以詔命授戶部尚書公喟然歎曰出身事主在三如一生當効命死當結草乃輟泣而起詔闕六字公闕一字於朝闕一字理寃屈平以理物簡以御繁訟息刑清於是乎在屬揚楚橫逆淮海稱兵渚宮地實上流闕四字乃持節鎮荊州兼檢校長史闕一字鄖衞要控帶闕一字長嚴而不殘人是以息豺狼虵蝮不入枝江之境黼黻冕旒闕一字致南陽之闕一字加金紫光祿大夫詔賜衣服表能官也以公器光廊廟道暎搢紳可以彌綸政本參贊皇極遂徵闕一字拜左武威衞大將軍闕一字時闕一字姓鳥驚闕二字獸聚擁旌推轂公實當之詔授燕然道行軍大總管兼安北道安撫大使東自碣石西極流沙闕一字道俱闕三字節闕二字旗拂霓霜戈彗雲蕭條萬里野無遺闕一字詔都督恒州兼燕水軍經畧大使闕一字鄣塞以闕四字倉庫以闕一字虜闕三字絕烽候之虞河右沐仁明之化居無何追赴闕一字都檢校右金吾大將軍尋拜秋官尚書闕二字沉毅清素周密署龍泉而特達委珠璣而不拜故以斟酌元氣平運闕二字方當闕一字融皇風弼諧景化論道於上闕一字扈蹕闕一字中闕三字散黃金以長揖追赤松而高蹈而天不憗遺梁摧奄及永昌元年二月廿七日薨於位春秋六十有三聖情憫悼闕一字寮掩涕罷朝撤樂有加恒數自闕一字疾彌留迄於大斂賜藥及衣中使相望於道賻物四百段闕一字粟四百石葬事官給闕一字官五品一人監護葬事贈幽州都督惟公幼而岐嶷長而惇敏探賾索隱闕一字微究奧闕一字策名委質闕二字為闕二字吐剛茹柔常情之所易撓尚人矜已執政之所難闕一字公闕一字坦勞謙少私寡慾當代之所難者闕一字於公而易闕三字六入闕二字七臨闕二字既稱獨闕一字復號神君盛德被於闕二字功名垂於竹帛者也夫人隴西郡夫人闕一字鄧氏河南闕七字公之孫衞尉卿駙馬都尉之女也闕一字賢明闕三字敷令悊於家邦幽閒婉順闕二十一字國風之窈窕嗣大雅之徽音闕二字光輔兩朝闕一字靈彌邵夫人闕二字中饋闕二十字斯闕三字所冀闕一字母儀之闕三字上悊闕一字遠闕一字享年不永闕二十一字十一月十一日合葬於三闕一字原禮也嗣子尚柔奉御知言等闕三十字故吏等仰攀盛德遐想徽光闕一字立闕一字而闕二十九字其辭曰河闕一字降闕三十七字出鎮方位入奉闕四十三字石銘勳垂光闕二字
