front:
  text: 全唐文欽定全唐文卷四十八代宗三
  hash: sha256:179a3bf59dc1c5742476f6cd7e3a9a95a840b8b11c6187865297263887fefc12
body:
  text: 法師智炬高明辭峯迥秀親憑梵夾宣闡微言幽賾真宗演成章䟽開如來之祕藏示羣有之迷津貫玉聯珠鉤深致遠再三披閱頗謂精詳傳之招提永為法寶也師等道著依經功超自覺承雪宮之旨奧為火宅之涼颸四分律儀三乘扃鍵須歸總會永息多門一國三公誰執其咎初機眩曜迷復孔多爰命有司俾供資費所煩筆削竚見裁成所謝知悉中衞社稷外修疆事合於一體以靖庶邦其在有終謂之不朽觀前代文武通賢有匡時戡難迫於大化不忘時君未嘗不嘉尚而流歎也今有忠烈之臣彰剛直形外純和積中本於孝敬輔以才略統制藩閫服勞王家往以母老躬於孝養豈不戀闕以茲曠年及苴麻在艱優諭權奪踴絕傷足淚盡喪明入覲之期良願莫遂想其風彩久軫顧懷遽見淪沒用深追悼嗟乎方疾之時以情自䟽無所有隱見之於詞復節守常條上軍簿請擇良帥命於中朝乃令遺允爰歸東洛教忠以報國約禮以居喪古人所謂生不交利死不屬其子夫豈遠哉節㮣誠亮高絕無隣喟然感傷鑒寐增慟有以見東州士大夫勤王尊主之志用嘉其休可以垂範宣付史館式昭名臣今荊南都會粵在澧陽俾人歸厚惟賢是牧以泌文可以化成風俗政可以全活惸嫠爰命頒條期乎共理無薄淮陽之守勉思渤海之功可檢校御史中丞充澧朗硤團練使納忠引過人臣之大節錄用念功帝王之彞典雖藩鎮之守秉律或虧而股肱之良懋勳斯在不忘求舊特用優賢淮西節度觀察處置使開府儀同三司檢校司空同中書門下平章事汴州刺史上柱國西平郡王李忠臣純性直方深衷厚實自然文武之器雅有將帥之才勇則本仁謀常制勝頃者王室多故戎事方殷奮不顧私義形於色遠自遼海首拔全軍擁義勇之師徇邦家之急出入百戰勤勞兩河委以旌麾寄在淮右不俟駕而赴命每先期而即戎俾鎮大梁實參元輔倚賴之重中外式瞻戎部之閒政刑或撓雖在危難能竭公忠戀闕勤誠載馳道路降服請罪至於再三言念勞臣良深憫歎酌於軍志失政有懲舉以朝經議勳可恕罷其方面之務省其臺閣之煩論道之司仍處三公之列分土之爵尚居五等之封用示優崇服我嘉命可檢校司空同中書門下平章事散官勳封如故朕與功臣本同休戚其於任遇豈易始終庶將傳慶子孫寧止保其祿秩凡百卿士宜悉朕懷朕以眇身祗奉鴻業不能光宣大訓嘉靖萬邦奉祖宗重熙之德答公卿寅亮之勤旰食宵衣痛心疾首嗚呼天地之理死生常數疾既大漸彌留日增惟懷永圖嗣守丕業皇太子元良繼明睿哲齊聖宜陟元后保守宗祧宜令所司當日具禮於柩前即皇帝位仍以司徒兼中書令汾陽郡王子儀攝冢宰其喪儀及山陵制度務從儉約並不得以金銀錦綵為飾天下節度觀察團練等使刺史等並不須赴哀祭祀之禮亦從節儉其三宮內人並宜量事減省諸王院亦宜準此其天下人吏勅到後出臨三日皆釋服無禁婚娶祠祀肉酒其宮殿中當臨者朝夕各十五舉音禮固從宜喪不可久皇帝宜三日而聽政十三日小祥二十五日大祥二十七日而釋服獲奉宗廟之靈永終天祿所痛不得與佐命勳賢庶尹卿士顧命永訣以託萬方內外腹心之臣文武忠良之士敬保元子以安家邦嗚呼其聽朕命百姓田地比者多被殷富之家官吏吞併所以逃散莫不繇茲宜委縣令切加禁止若界內自有違法當倍科責浙江東西去歲旱損所出租賦頗甚艱辛今秋以來復聞遭水百姓重困何以克堪朕所以未明求衣日旰忘食思宏理道良用疚懷今所徵收惟正租庸而巳其餘差役咸使矜量頗亦申明冀稍安緝如聞諸道節度使不承正勅妄有徵科州縣望風便行文牒務為逼迫自應誅求事宜因循轉用生弊不有懲革何以息人自今巳後宜令本道觀察及租庸使嚴加訪察其州縣除正勅支遣外不得轉承諸使文牒徵率一物巳上如或有犯便仰停務具名彈奏又聞杭越閒疾疫頗甚戶有死絕未削版圖至於稅賦或無舊業田宅延及親隣言念疲人豈堪兼役致令逃散誠可哀矜亦委租庸使與本州審細勘責據實戶差遣處置訖具狀聞奏仍委刺史縣令設法招攜課最之閒襃貶斯在其有死絕家無人收葬仍令州縣埋瘞朕臨御寰瀛為人父母一物失所每勤罪己之心四方未寧彌軫納隍之慮庶尹卿士友邦冢君宜悉朕懷共敷至理諸州府及縣令今後每有闕官宜委本州府當日牒報本道觀察節度及租庸使使司具闕由附便使牒中書門下送吏部依闕準式處分其所闕官有職務重者委本府長官於見任及比司官中擇權令勾當正官到日停不得更差前資及白身等攝吏部及制勅所授官委中書門下及吏部甲制勅出後三日內下本州準令式計程外一月不到任本州報中書門下吏部用闕如灼然事故準勅勒留不在此限其違程人六品以下本色內殿一兩選同會闕不成例五品以上停一二年其殿選人諸州諸使不得奏用三代之初皆有神降監其德也天實啟之恭惟王業之初師及霍邑堅城未下大將阻兵連雨積旬糧儲不給有白衣老父忽詣軍門稱霍山之神謁大唐皇帝云東南取路八日雨止助帝破敵盡如其言巖巖霍山九州之鎮興雲致雨功巳洽於生人親道輔德力更宣於王室朕纉承大寶膺受鴻休肸蠁之閒誠明可接永言幽賛茲謂有孚惟天命神據我斯意宜令禮儀使判官司封員外郎薛頎即往霍山致祭正詞以薦稱朕意焉國中有事海內不康殲厥渠魁人自為戰其死亡者可勝紀乎非其父兄即其子弟責實繇朕禍非自天念茲恟恟痛入骨髓明神散亂元惡就誅四胡既平罔不相賀遂欲衣裳為會天下偃兵備七德之武同五星之色成朕之志實惟良臣關內河東副元帥朔方河東節度使兼侍中中書令汾陽郡王子儀邁德濟時盡忠憂國切勤王之義急偃伯之期思拯生人免其湯火善陳利害屢進封章以艱阻厎寧務於清靜地非要害不可猶開幕府事無防遏不可更置轅門請停河中節度并耀德軍宜依罷茲凶器姑欲息人離散可要瘡痍可復率是道也仁遠乎哉朕心所嘉期於至理宜示中外明政體焉古者設太學教冑子所以延俊造揚王庭雖年穀不登兵甲或動而俎豆之事未嘗廢焉頃年巳來戎車屢駕天下轉輸公私匱竭帶甲之士所務贏糧鼓篋之徒未能仰給由是諸生輟講經誦蔑聞宣父有言是吾憂也投戈息馬論道尊師用宏庠序之風俾有簞瓢之樂宜令所司量追集賢學士精加選擇使在館習業仍委度支準給廚米敦茲儒術庶有大成甲科高懸好學者中敷求茂異稱朕意焉惟政之難非賢勿乂必稽於衆允執其中實使羣材用宏庶績朕以國步未康朝經或闕思與文武藎臣咨謀善道尚書左僕射裴冕右僕射郭英乂太子少傅裴遵慶太子少保兼御史大夫白志貞太子詹事兼御史大夫臧希讓左散騎常侍暢瓘檢校刑部尚書王昂高昂檢校工部尚書崔渙吏部侍郎李季卿王延昌禮部侍郎賈至涇王傅吳令瑤等並集賢待制朕夢感禪師請傳法袈裟却歸曹溪今遣鎮國大將軍劉崇景頂戴而送朕謂之國寶卿可於本寺如法安置專令僧衆親承宗旨者嚴加守護勿令遺墜古者設官分土所以崇德報功總內署之綱事密於清禁宏上庠之教德潤於鴻業賦開千乘禮序九賓必資兼濟之能用協至公之選開府儀同三司兼右監門衞大將軍仍知觀軍容宣慰處置使知內侍省事內飛龍閑广既使內弓箭庫使知神策軍兵馬使上柱國馮翊郡開國公魚朝恩溫良恭儉寬柔廉長才博達敏識高妙學究儒元之祕謀窮遁甲之精百行資身一心奉上自王室多故雲雷經始五原之北宏先啟行三河之表爰整其旅成師必勝每合於韜鈐料敵無遺可徵於蓍蔡關洛既定幽燕復開海外有截厥功惟茂歷事三聖始終竭力頃東都扈蹕釋位勤王時當綴旒節見披棘下江助我甲令先書社稷之衞邦家是賴及邊陲罷警戎務解嚴方獎勵於易象才兼文武所謂勳賢亦既任能斯焉命賞宜膺朝典式副公議可行內侍監判國子監事充鴻臚禮賓等使封鄭國公食邑三千戶大逆不道抵夷族之誅同惡相濟當棄市之法以懲干紀式按彞章周元幹賊臣之子兇慝成性與父階亂厥罪惟均邵賁敢有包藏恣其悖虐怙侈滅義寇攘矯虔戮及無辜罪浮於帥宜並處極法其周元耀蔣羅漢尹元經毛崇彬李尚林等共肆醜圖同惡相濟猶捨斧鑕俾全要領其劉憲周封崔勸等同附姦邪俱行扇惑以私情蠧國議法從寬周元清年在幼沖法當配沒並準法處分朕自臨萬國思措五刑不虞兇殘有此冒犯寘以明憲期於止殺凡百卿士知朕意焉朕聞江左有蘊道禪人德性冰霜淨行林野朕虛心瞻企渴仰懸懸有感必通國亦大慶願和尚遠降中天盡朕皈向不違願力應物現形今遣內侍黃鳳宣旨特到詔迎速副朕心春暄師得安否遣此不多及勅令本州供送凡到州縣開淨院安置官吏不許謁見疲師心力弟子不算多少聽其隨侍唐虞之際內有百揆庶政惟和至於宗周六卿分職以倡九牧書曰龍作納言帝命惟允詩云維仲山甫王之喉舌皆尚書之任也雖西漢以二府分理東京以三公總務至於領錄天下之綱綜覈萬事之要邦國善否出納之由莫不處正於會府也令僕以綜詳朝政丞郎以彌綸國典法天地而分四序配星辰而統五行元本於是乎在九卿之職亦中臺之輔助小大之政多所關決自王室多難一紀於茲東征西伐略無寧歲內外荐費徵求調發皆迫於國計切於軍期率於權便裁之新書從事且救當時之急殊非致理之道今外虞既平罔不率俾天時人事表裏相符將明畫一之法大布維新之命陶甄化原去末歸本魏晉有度支尚書校計軍國之用國朝但以郎官署領辦集有餘時艱之後方立使額參佐既衆簿書轉煩終無宏益又失事體其度支使及關內河東山南西道劒南西川轉運常平鹽鐵等使宜停禮儀之本職在奉常往年置使因循未改有乖舊制實曠司存委太常卿自舉本職其使宜停漢朝丞相與公卿巳下三日一決事帝親斷可否且國之安危不獨注於將相政之理亂固亦在於庶官尚書侍郎左右丞及九卿參領要重朕所親倚固當朝夕進見以之匡益也並宜詳校所掌具陳損益如非時宜須有奏議亦聽詣閤請對當親覽其意擇善而從朕受昊天之成命承累聖之鴻業齊心滌慮夙夜憂勞顧以不敏不明薄於德化致使舊章多廢至理未宏其心愧恥終食三嘆雖詔書屢下以申振卹且朝典未舉猶深鬱悼思與百辟卿士勵精於理俾國經王道可舉而行各宜承式以恭爾位諸州置屯亦宜停比屬秋霖頗傷苗稼百姓種麥其數非多如聞村閭不免流散來年稅麥須有優矜其大歷五年夏麥所稅特宜與減常年稅其地總分為兩等上等每畝稅一斗下等每畝稅五升其荒田如能開佃者一切每畝稅二升令在必行用明大信仍委令長宣示百姓并錄勅牓示村坊要路令知朕意頃以蕃寇猶虞王師未戢所資軍費皆出邦畿征調薦興日加煩重念流亡之役減歲入之租務於惠養冀有蘇息尚聞告病終未安居深用愧悼更思愛卹今關輔諸州墾田漸廣江淮轉漕常數又加計一年之儲有大半之助其餘他稅固可從輕其京兆來年秋稅宜分作兩等上下各半上等每畝稅一斗下等每畝稅六升其荒田如能佃者宜準今年十月二十九日勅一切每畝稅二升仍委京兆尹及令長一一存撫令知朕意弛張刑政興化阜俗使吏無貪汙之跡下無愁恨之聲不惟良二千石亦在郡主簿縣大夫親其教訓舉其綱目條察善惡惠養困窮方伯得以考求殿最故漢置刺史臨課郡國周制官刑糾繩邦理其義明矣朕思舉舊典以清時俗頻詔長吏精擇此官如聞近日猶有姦濫或未習政事素無令問因依請託尸曠祿位邪枉附法懦弱廢官人弊於下怨歸於上閭井減耗賄賂日聞豈所謂建明職守共副憂勤者也又別駕秩位頗崇若郡守廢闕掌同其任舊例補署或匪其才既不稱職則多傷害自今後別駕縣令錄事參軍有犯贓私並暗弱老耄疾患不稱其職戶口流散者並委觀察節度等使與本州刺史計會訪察聞奏與替其犯贓私者並禁身推問具狀聞奏其疾患者準式解所職老耄暗弱及無贓私才不稱職者量資考改與員外官餘官準前後勅處分其刺史不能覺察觀察節度使具刺史名品聞奏如觀察節度管內不能勾當郎官御史出入訪察聞奏李少良韋頌等兇險悖戾反常逆理恣其讒說將搆禍階離閒君臣矯誣中外醜圖姦狀按驗皆明殿中侍御史陸珽幸忝清憲之職仍參儒館之侍交結非類包藏不測豈有周行之列容此二兇跡既同惡法當均罪並宜付京兆府各決重杖一頓朕每以君子小人貌同心異必先觀行然後察言豈茲譖讟能迴聽斷夫招賢納諫君之體也獻直盡規臣之節也朕仄席思理佇聞政道豈謂姦邪兇慝紊我彞倫須別是非用分涇渭再加詳鞫能正刑典凡百在位宜悉朕懷葬祭之儀古有彞範頃來或踰法度侈費尤多自今以後宜儉約悉依令不得於街衢致祭及假造花果禽獸並金銀平脫寶鈿等物並宜禁斷古者緣情立禮著慈母之制蓋聖人示德無不報之禮而漢宣帝亦追錄掖庭郡邸嘗有阿保之勤以功深淺並授封賞記於前典歷代是之故嬭婆元氏朕在襁褓受其撫育推乾就濕慈愛特深可謂仁人厚惠茂德者矣可贈潁川郡太夫人自古聖帝明王之臨御也莫不法乾坤之覆載體山川之受納立德於太上還淳於至道清淨無事保合太和濟於羣生洽於四海豈垂意兵革勞心戰爭也蓋有德化之所不綏招懷之所未諭不式王命毒流生人故有除暴禁淫之師安人止戈之武則神農黃帝堯舜禹湯之所不免也朕君臨萬邦十有三載薄德內愧中夜再興至如易寬仁恭默元淡素懷所慕終食豈忘然自承統巳來屬當多難伊川有盜國之孽朔野有叛君之將江湖海島伏戎數輩其在右武安能解嚴所以請於宗廟親授經略誅詰姦宄摧殄暴強三年之閒方內厎定此皆皇天佑我烈祖羣后戴予一人是用集大勳於國家保萬姓於區夏豈伊寡薄能及此邪每思偃兵姑務柔遠將息馬以論道期舞干而修德而西戎負約閒歲犯邊朕嘗棄細過庶宏大體疆臣兵吏亟請長驅屢有誡勅不令掩襲兼約游騎不許擒生或誤得之亦使還遣固以亭育之義豈隔華戎綏撫之恩寧殊遠邇故布文告以訓之敘舅甥以睦之彼亦嘗遣聘臣來修舊好玉帛之禮纔至於上國烽燧之巳及於近郊長其無厭昧於事大去冬踰我關隴入我郇邠驅人之馬牛掠人之士女朕許其通好本在安人乘此不虞飜貽我詐每一興念悼於厥心豈朕不叶於親鄰豈朕有負於恩信猶期懲艾未忍討除今大閱甲兵以增扞禦且宏不戰之道用舉備邊之常所以然者念其載勤䟽求繼嘉姻事或由衷義從割愛因之寧遠豈復顧私當罷四方之師永全二國之好儻更侵冒必示威刑宜令子儀以上郡北地四塞五原義渠稽胡鮮卑雜種馬步五萬衆嚴會栒邑克壯舊軍抱玉以晉之高都韓之上黨河湟義從汧隴少年凡三萬衆橫絕高壁斜界連營馬璘以西域前庭車師後部兼廣武之戎下蔡之徭凡三萬衆據於朝那遏當路之塞忠臣以盧龍柳城洎右北平漢東諸鎮江黃申息之師凡三萬衆屯於回中張大軍之援忠誠以武落別校右地寄鋒凡三萬衆出岐陽而北會希讓以三輔大常之徒六郡良家之子自渭上而西合汴宋淄青河陽幽薊總四萬衆分列前後魏博成德昭義永平總六萬衆大舒左右朕內整禁旅親誓諸將資以千金之費錫以六牧之馬戎裝戰器軍用邊儲各有司存素皆精辦咨爾將相文武宣力之臣夫師克在和善戰不陣各宜保據經界屯處要衝斥堠惟明首尾相應若能悔過何必勞人如或不然自當伐罪然後眷求統一以制諸部進取之宜俟於後命各敬爾守無黷武經賞罰之科國有明典宣示中外知朕意焉任直去邪懸於帝典獎善懲惡急於時政和鼎之寄匪易其人中書侍郎同中書門下平章事元載性頗姦回跡非正直寵待踰分早踐鈞衡亮弼之功未能經邦成務挾邪之志常以罔上面欺陰託妖巫夜行解禱用圖非望庶逭典章納受贓私貿鬻官秩兇妻忍害暴子侵牟曾不隄防恣其淩虐行僻辭矯心狠貌恭使沈抑之流無因自達賞罰差謬罔不由茲頃以君臣之閒重於去就冀其遷善掩而不言曾無悔非彌益兇戾年序滋遠釁惡貫盈將肅政於朝班俾申明於憲網宜賜自盡朕涉道猶淺知人不明理績未彰遺闕斯衆致茲刑辟憫媿良深僶勉行之務申沮勸凡在中外悉朕懷焉頃屬煩暑差陽積旬處於高明之中猶有鬱蒸之歎而況幽閉獄戶辨對官曹俯臨秋期將正時憲重修欽恤之道載宏全宥之仁其京城見禁囚犯流巳下罪並宜釋放自古制刑殺人者死法不可緩斷之則行裴昕頃在軍幕遂知留務內懷私忿敢蓄兇謀曾無罪名專殺良將憲司鞫問占明白密邇京師擅行威戮宜付京兆府集衆決殺戒分律儀釋門宏範用申獎導俾廣勝因允在嚴持煩於申謝
