front:
  text: 全唐文欽定全唐文卷四百二十二楊炎二
  hash: sha256:cb117aaee3936c71a96c752cd81575ca249133f3d407b0fb61ad57dba1951ee6
body:
  text: 受正性者德之元纂重侯者業之盛君子體仁以合德積厚以感通著于神明光於祚允者其惟杜公乎公諱鵬舉字某其先京兆人也七代祖諱模後魏為濮陽守衞人宜之子孫世居東郡故今為濮陽人夏有豢龍之官周封唐杜之國世載侯伯勳藏晉魯周公錫命元旗火龍拯三代之衰參五霸之業斯保姓之始也漢有建平侯策定中興晉有當陽侯克并南夏其食酆鄗盛西郊之黻冕其分荊濮胙東國之山河斯不朽之宗也濮陽生陳畱太守諱亮陳畱生高祖北齊膠州刺史竟陵公諱伽竟陵生曾祖隋鴈門太守諱保鴈門生大父唐蘇州司馬諱義寬蘇州生皇建平侯荊益二州大都督府長史諱慎行洎貞孝公秉哲以輔先朝今黃門戴天以成大業自魏七代以方岳登聞在唐兩朝以台衡致理斯邁種之仁也公貞孝之兄黃門之考天修其爵地富其才神抱虛廓智藏蓍蔡口目河海儀刑嵩華學可以掌邦教詞可以宣國風少與范陽盧藏用隱於白鹿山以太夫人有疾與清河崔沔同授醫于蘭陵蕭亮聲色以微以誠達疵癘之祥以氣變屬先府君作鎮荊楚有詔門子親侍禁闈起家修武縣尉歲滿以書判超等授濟源尉以正議登朝拜右拾遺昇玉堂以謁聖君陳格言以利天下黃門侍郎張廷珪國之髦碩洛州長史皇甫知常人之標準美公志行嘗與請交公精義入神洞究奧賾初睿宗踐祚冥感祥符覩元期於化元啟成命於幽教人所以佇非常之運天所以歸億兆之心元宗時在東宮表公所言請編史冊時應令賦詩御札批云畢公之任諒籍伊人思入風雅靈通神鬼後以親累出為岐州司倉轉同州司士開元初上以中都稍食省河漕之徭大農器用賦晉山之鐵牧馬于歸獸之野考室于迎春之宮關中始置疎決鹽鐵長春宮三使詔以公為判官明年天子東行河隄阹格獸之場開濯龍之沼停鑾上苑留宴天泉酒酣樂過公獻賦以諷於是有采章之錫遷著作佐郎太子左贊善大夫都水使者邠王府司馬豐王府長史中散大夫安州刺史公為政在上位畏于上貞一以守之齋莊以莅之其始也居右正詞王侯嚮慕其終也疎通易禮化興行方將坐周召之堂陳歌訓之典法象魏登天庭而明德壽於中年壯圖悲於下國命矣以某年月日終於官舍明年二月葬于壽安之南原遵遺命也夫人河南郡君尉遲鄂國公之孫卭州刺史王褱之女也抱含一之德友于君子受降神之祥克生元輔天寶四載終於山陽別業其終祔焉從周禮也長子靈瓊陳州太康主簿紹家祚而命奪其祿次子奉遙有異學而天喪其文荀陳同德顏閔齊化季子山南劍南道副元帥特進黃門侍郎同中書門下平章事衞國公鴻漸身負蒼旻氣和鼎飪以符合斯運以道佐唐虞文繫訓謨化齊混象大勳格於皇極厚寵揚于祖考某府君先贈太常再榮師保夫人舊封宜陽增號某郡三錫桓公之命是尊孟母之賢惟公主忠孝根仁義事親有極致之道執喪有寧戚之哀威廢鞭笞慍忘誚讓其立身也冥觀天理合含幽鑒強志通於眾藝敏行求于古人考聲教觀歷象動合靈祇之贊居順陰陽之和其達誠也憂喜極中權利交喪歷官十二遠悔吝之形春秋七十抱純精之氣其保終也君子謂探命歷誠也專藥膳孝也補衮職仲山之志也頌王風吉甫之才也濟美欒武之德也有後臧孫之慶也宜乎正訓百代垂鴻千古存被先公之冕服沒為天子之元老勒鐘鼎建廟堂金石以頌聲邱陵以表隧乃假詞末學觀德將來銘曰於赫太師德音孔遐道之氣象物之精華文學鄒魯羽儀邦家選於帝庭帝庭有儀聞于宮府宮府允明晦光耀際含天機識真紫極建方與青蒲熊負金印虵蟠朱組時哉功名海變今古精魂歸復宜陽之下我有冡嗣為王寶臣德延沒世功被生人岸谷磅礡邱陵故新蒼蒼頌石萬世遺塵山之西出將地之右主兵故前有辛李之雄後稱周郭之盛四族者貔武其人風雲其氣出入千載戎狄憂之皇唐一宇宙之初數蠻夷之罪太白上而天兵利陰精盛而神將出於是郭氏之室世並五侯丹華轂者三十人分采地者三千戶劍騎鼎食氣蓋關山開閣而珠履成行宴享而山元滿座中興之俊鴻臚閒出始以一劍而震清海年未三十名冠雲臺位為國之長城身主人之大命銘旗羽葆小韓侯之故事龍斾青社增召伯之舊封則祖宗之盛未始聞也鴻臚即世關隴不震天其永思戡定之代故盛業集於金吾金吾名千里即鴻臚之孫出於荊藍之中長於松栢之下虎頭駢脅曲踊雷聲猿臂過挾輈之材鷹揚表下韝之志始以將門子往還隴上開元中西討石國負羽先登特拜遊擊將軍折衝都尉駕龍媒於殷路舞雙劍於前席二十六載詔公與中使劉元復開葱嶺以功勝虜不能軍班師授左武衞將軍特賜衣甲一副超才也後五載有苑門之役走射鵰之㣥拜左衞將軍嶺巖人陣既成列而破石城天險不待戰而降累遷左金吾衞大將軍驟兼玉門軍使未行而遇疾嗟乎病生刮骨志屈噉肝累喉白刃之中垂翅青雲之上以天寶十一載二月薨于武威之地春秋若干夫人宏農郡君楊氏絳郡長史之孫臨洮軍使雲之女河華茂氣齊姜盛族和于鳴鳳而外姻致駕宜爾幹母而君子好逑始於龍劍雙飛中而雲虹獨感春秋若干有子一人曰某果毅都尉山西將種塞下雄兒周郎之豪勇冠軍終子之精魂先返年二十一先公而夭郭氏本自周王之穆其在昔也漢有司徒司空魏有車騎驃騎或竹馬垂信或金玉稱豪世后佐漢以補天賢王築館而為道其在今也一門三㦸六葉七侯伊吾反昭于前鴻臚特坐于後長河萬里敵國四方每賓祭往來蒐除大閱望帶裳者知宗廟之盛執金鼓者成父子之軍世德後來公其濟美則勳配祀典中乏主祭之名哀及路人內無朝哭之位此窈窕之數孰可問哉猶子子鸞善達禮以繼門族樂主辨以濟險艱荀令君為不亡趙將軍其有子以十三載某月葬我公于武威東原非緩也實卜年龍蟠天井岡伏山形閟星象于元宮起風煙于松闕將軍鼓吹迴過細柳之營天子輅車出祖茂陵之道銘曰壯哉強魂凜然風雨一劍刳鯨空拳搏虎錫以翿鼓觼角內鞗瑲騂騎佩組華彼莊姜揄狄珩璜言念君子乃心無忘精返太白魂歸故鄉雙墳巍然流水湯湯秦雲如牛磵石如羊二龍於此父子同岡昔我乃祖世族關西左華右河前虢後晉食唐虞之地首韓魏之封大輅鞶瑲彤弓之錫此之謂保姓在帝為高辛氏在周為司徒在秦為上卿在漢為太尉此之謂世祿太尉之道齊宣父大夫之文似相如此之謂世德內史之採金虎赤泉之斷江龍亠兊州佐命於齊驃騎重侯于晉建公能官其業此之謂武功公名和字惟恭河東人也為高祖驃騎之曾孫大父諱言隋朝散大夫國士經術之奧高論上庠洎河海風塵吳輿敗露出補棣州蒲臺令考諱楷河州大夏縣令以神明之化出綰桐鄉驥跼于轅蛇蟠于沼公賢明本乎祖德精勁因乎地氣好兵有秦韓之俗受學得孫吳之書發跡洮隴成功西極仗劍出萬人單車入絕域則㣥兇下拜室胡隧則漠地空疑所以利建侯成輅之賞凡三破石國再征蘇祿開勃者三誅達覓者一始自弱水府別將至執金吾十五攻常冠軍鋒大小百餘戰竟終牖下初開元中㣥胡方盛南寇于闐公以中軍副鼓行而前雲火照于王庭雷霆起於帳下故羸師破竹後騎建瓴灌夫之勇也二十七年有詔四鎮諸軍大出漢南壘問罪蘇祿洗兵滇河旌甲數萬人城池五十國公以麾下為前四罪之名有百牢之饋酈生之奇也後五載有累姓之後來朝京師金甲善馬織文大貝告于廟之室旅于大庫之庭公覽傅常遺風烏孫故事井泉可數談笑成功上壯之賜弓甲一副广既馬二疋伏波之美也明年元帥封常清署公行軍司馬都虞侯西討石國觀兵海隅歷莎車臨大夏見條支之卵飲郅支之頭烜兮赫兮雲捲萬里博望之畧也自武衞將軍四鎮經畧副使加雲麾將軍兼于闐軍大使其地兵甲之富寶玉之林公鎮以清靜同其習俗如鼓簧琴政用大康又遷金吾大將軍四鎮節度副使金紫之貴樊纓羽旄雄風凜然壯圖未極方將戴衣冠於地表會風雨於天庭夢厲成灾明淫生戾以十四載五月薨於鎮西之官舍春秋若干夫人晉陽賈氏彼美孟姜顏如桃李靈劍始合泛于碧海之潯鵷鶵漸冲坐于金蓮之界嗣子預有霸王之畧好倜儻之奇初以右武衞郎將見於行在天子美其談說問以中興遂西聚鐵關之兵北稅堅昆之馬起日城開天郎特拜左衞將軍兼瓜州都督關西兵馬使又遷伊西北庭都護策茂勳也誅門人以息㣥盜設勇爵以酬諸戎鍾鼓再考騂旄既備可以答明君告宗廟揚于祖考有銘篆之功問於蓍龜無松榆之舊以月日輿次于某葬我公子某所禮也於戲昔齊方草昧而亠兊州降隋室始創而驃騎興當今受命而武作豈公侯之美必復將輔佐之跡有歸歟中丞以炎聽于親宗服于祖業捧持牘見託斯文邱陵蒼蒼歸于萬世地連汾水之舊基望虞鄉之古祠遠蒼龍松寒石馬晉人墮淚如看峴首之碑漢將焚舟遙識祁連之冡銘曰偉哉忠壯萬夫之冠熊視三軍鷹揚霄漢星殞月窟魄沈海畔寥落英風功名相半我有令子王之寶臣勛參十亂名畫麒麟光華玉帳出入朱輪祠于上蔡奉我先人反葬何鄉言歸晉土蒲阪之北汾陰東滸雲雨千峰山河萬古蟠青虵兮負騰虎埋金劍兮何時覩斗極之下曰幽都其氣骨立其風精悍常山之下曰野其鎮碣石其神蚩尤海岳迴抱府君出焉雲龍感召府君感焉惟天永保唐運故府君來朝克生保臣輔寧大業坐中台者二子銘鼎鼐者六朝當國宣九合之勳昇堂有八元之族府君諱楷洛先族漢校尉之裔也世居其北遂食堅昆之地實主崆峒之人大為王公小為侯伯其精薄日月其動破山川厥後東遷復為鮮卑之右府君英明淳渾神踴天飛威嚴生介冑之容魁岸本山河之狀雙舞長劍左盤琱戈虎嘯于窮溟雲從于大澤有沈謀以忠中國有長技以服諸戎天子聞而思之密命奇士要之信誓君子曰井谷不可以遊龜龍蟻垤不可以栽松柏淮陰去楚百里絕虞尚父從周樂生歸燕此必精合於王霸魄見於祥符宜乎萬方而趨一言而感矣是年冬府君與帳下騎士言曰吾乃祖本漢將辱于單于之庭而今千年大恥壯士當建功大國上駕真龍曷有遇風雨而泥蟠無卷舒以蜿變由是奮躍遼海翻飛上京其來也戎羯生憂其至也幽燕罷警上御前殿庭列千官鍾石畢陳君臣相賀始問其姓因賜以家族特拜玉鈐衞將軍先賜以大弓文馬又拜左奉宸內供奉升玉堂飡沆瀣矣帝曰余欲成幽都殪死市乃命府君為朔方討擊大總管於是雲麾鐵騎川動地踊左飲青海北登狼山帝曰余欲宅嵎夷破鴨綠擊靺鞨俘林胡乃命府君兼幽州經畧使於是間榆關橫障塞三以奇伏五以勝歸帝曰余欲軍北方之野乃命府君為清軍於是敵也無氣燄之作士也無踴躍之勞帝曰余欲護坰牧之使於是憑列走隊法掩亭院神螭水瑞孔阜充碩帝曰余欲書日月之常教熊羆之旅咨爾職典彼朔方復命府君為節度副使於是鎮之以德宣之以威師和年豐罔或不若帝曰余欲配勾陳之位養死事之孤乃命府君為左羽林將軍於是蓬頭射聲上貫牛斗帝曰余欲屠石堡疇其代謀僉曰府君乃命佐中權發大號於是元黃灑血玉石俱摧載初中兩蕃不庭有詔府君尋盟舊國單車從漢二憾來同戎狄變心懼我為患乘主客之勢合豺狼之兇甲興于門車結其外府君復為死地甘為國羞仰而騰駒若與神遇橫跳出於虎口伏念歎於龍顏的盧之師惡可喻也吐蕃之寇河源衝下憑突矢石交作府君以精騎一旅濟河之南萬火燎于他山三軍出其閒道驚寇四潰重圍自解加竈之奇孰云多也初府君將赴征西謂所親曰余往必克敵殆不能歸及班師獻捷歿於中路明達人之委順君子之終鄧公之勇曷其智也至若秉季布之然諾法穰苴之政教動於軍誌舉合吏能奇謀絕於揣摩故事畱於風俗神對歷象精合晦明勤道不形進而人莫見也為政以德寵而久彌尊也始自天后之末至於聖皇之朝前後錄功凡二十四命食邑二千七百戶封薊郡開國公又加雲麾將軍參定國者兩朝拖侯服者四紀會兵車者百勝出帳下者千人國有事未嘗不勤勞無私可謂知禮故得大命三錫重侯累封輅車山元藏於太室壯圖未極沉疾生勞臨合浦之秋伏波將老望河源之道征虜不歸其年某月日薨于靈州懷定縣之師次享年六十有七追贈營州都督賻物三百疋米粟三百石以明年某月日詔葬於富平縣檀山原禮也夫人某郡都鴻臚卿某之女異氣祥合高門鬱興卜鄰也鍾鼎再懸受祿也夔龍在席元子太尉臨淮郡王兼侍中光弻河圖鉤合上感神精磅礡於陰陽之和同符於元命之紀次子將作監光彥氣含精勁仁服孝慈列侯於千石之家從事於四方之志少子太保光進命世忠義縱橫知畧天之辰象物之粹靈乾元中太尉以東諸侯三會于河再以駹髳濟於淮海天子美齊桓之志系凡蔣之盟以府君炳德丕赫積流仁慶追考功績發於書諡曰忠累有裦贈號韓國夫人於是建廟堂命宗祝室有山龍之服饗有金石之和昭宣令圖煥然銘篆以炎掌史之官也奉命為詞徘徊大名頌耿弇有終有慶慷慨觀德美張仲為子為臣銘曰茫茫上天下降狼星崆峒之野焜燿其形於赫巨唐風雨是經矧伊本邦曷不來庭煌煌府君為國之翰從順干戎威讎勦亂陰剛萃靈渤碣精悍闕四字志不可翫綿綿塞草天地之下北拒狼山野無胡馬殊勳大績玉劍元社天空武庫海折崑崙在昔遺慶魯之臧孫曰聖在天勤於至道既命太尉亦崇太保一門四龍三作元老赫赫元老氣合清貞白髮垂冕高堂有親帝命韓國胙於夫人亦詔薊邱下寵明神左鑿貞石垂於將來矧我洪勳上懸雲臺彼邱之頹此澤之堆悠悠令惪萬古不回秦霸也張祿去魏漢興也淮陰離楚龍鳴風雨之會蛇變泥蟠之中逶迤感通精氣相合斯冥契也豈人力也皇唐贈司空范陽大都督李公諱楷其本出於隴西八代祖節後魏鴈門太守燕齊之亂族沒鮮卑東遷號良將之家北部實大人之種其生渤碣其居戴斗海塞迴抱興公之氣天星下直為國之祥英氣混茫熊據龍驤望其形得山河之狀覩其容見金鼓之威神明為徒義勇為器久視中以驍騎歲入于遼西臨太原南震燕趙雲火照于河上天兵宿于北門朝庭憂之有命招諭合以信誓際于天人話言感寤撫劍歎息是歲以控弦之士七百騎垂櫜入塞解甲來朝以其本枝復賜李氏授玉鈐衞將軍左奉宸內供奉圖形雲閣之中置酒蓬萊之上君臣相賀羽衞生光君子曰井谷不可以游龜龍蟻垤不可以戴松柏漢於是始靖虜於是始憂是後殪靺鞨於鴨綠之野覆林胡於榆關之外北出障塞懷其王庭南救河源復其死地石壑之役以一旅定三軍冷陪之師以虛聲破精勁東封之歲外將天軍河湟未寧西護監收雲麾鐵騎山動地踴右據青海北登狼山冰泮則會師風高則出塞皇威振於四海王化敷於無外故得大命三錫天馬輅驂定國難者兩朝拖侯服者四紀會兵車者百勝出帳下者千人國有事未嘗不勤勞無私可謂知禮於戲天道曖昧胡星未殞以營平之年不終大用以伏波之病再出窮荒天寶元年五月二十日自河源薨于懷遠縣之師次春秋六十七贈營府都督明年詔葬于富平縣壇山原維公智之大竇神之異門心和體剛慮遠精徹思乎耳目之外行乎變化之中震呼戎獯嘯叱風雲貔虎之悍以禮成百萬之強以謀勝故鮮卑因之以疲中國天后取之以空大漠於中宗開朔方之地四百里於睿宗食佐命之邑三千戶於元宗則主禁衞吞諸戎東西南北動罔不剋禦戎安邊凡十命焉祚於後也元子太尉中書令東都河南江淮等道副元帥臨海郡王光弻少子太保御史大夫渭北鄜坊等州節度使武威郡王光進負河圖以列四星遇英主而當三傑肅宗之功復區宇更為桓文今上之道訓華夷並為召畢乾元中天子以公炳德丕赫積仁流慶大福再成沒而不朽乃命太常追考功績諡曰忠烈贈司空范陽大都督夫人贈號韓國夫人於是建廟堂命宗紀室有山龍之服樂有鍾石之和昭宣令圖是有銘篆銘曰茫茫上象降精於北是生純臣其在異國矯矯府君蔚其英靈蛇蟠北極鵬化南溟來于本邦會此天庭風驅虎旅晝食狼星綿綿塞草天隔華夏北拒陰山野無胡馬殊勳大績玉劍元社天摧武庫海折崑崙在昔遺慶惟魯臧孫曰聖在天勤于至道既命太尉又崇太保一門四龍二作元老赫赫元老氣含清真白髮重冠高堂有親帝命韓國胙于夫人亦詔薊邱下寵明神彼邱之榛此石之磷悠悠令德萬古清塵維大歷三年歲次景午四月乙未朔五日庚子故齊王諡曰承天皇帝妃張氏諡曰恭順皇后天寶末賊臣搆難王從二聖南幸成都自武功定策禁中扈先帝於靈武以是年八月薨於行在今上錄功追遠詔諡鴻名以大歷三年六月遷座於咸陽禮也雲翿宿懸天雞空響建翠鳳以雙引度蒼龍而長往皇帝慟極天倫齋於閒館望桂嶼之蕭颯撫蘭臺之傷斷爰詔近臣遺音是纂其詞曰皇圖氛氳麗于天文本枝百代連華千載維王斯會其祥則大祖武之烈宗文之配令德純粹溫恭慈愛和必有節動而無悔持盈以沖明道若昧金玉是式鼓鐘於外伊昔慶衍維皇握圖天孫載弄甲觀晨趨善問居講嚴師服儒瓊林秋實寶萼晴敷皇用錫土苴茅剖符大邦之翰滄海之隅遙分朱邸近植青梧愛鍾嘉會寵被宸渥從侍寢門觀風太學禮聞齒讓聽辨聲樂歷運中否災鯨構昏初避夷狄聖有昌言王叶㣥議天迴乘轅適於硭碭之野進于閶闔之門雲趨河北電掃中原方從廟告言守藩垣忽川逝于東海怨夜長于西園嗚呼哀哉志業見於屯蒙勳名留于天壤成宗禋之有聖悲歡愛之易喪獨精聚而魂游奉君親以長往展我邦媛德容可仰魯館而家齊風是長翟拜三月軿歸百兩豈鳳吹之有行而虹銷之無像嗚呼哀哉帝念伊始晬容生憂傷桂絆之幽蠧望山河之林邱解劍龍而追慟燭鴻徽以冥搜駕之輅旗服以冕裘儼千官於天衞將合祔而從周嗚呼哀哉笳鼓宵陳河山曉發地坱軋兮聲遠天空同兮影沒入幽隧之穹林伏盤原之宮闕嗚呼哀哉考至公與至性見為子兮為臣臨難不忘其社稷感時思致於君親短而非病逝豈同塵惟芳名與盛德可觀法以求仁嗚呼哀哉
