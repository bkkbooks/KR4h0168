  text: 全唐文欽定全唐文卷三百七十二璀天寶閒進士
  hash: sha256:41aa0e6448ed25720be683101b0fbbec34301ec0cbe1175fd4cc861c746aeb97
  markers:
  - {type: head, offset: 14, content: 魏璀, id: KR4h0168_NFKB_372-h1, level: 1}
body:
  text: 細腰杵兮木一枝女郎砧兮石五彩聞後響而已續聽前聲而猶在夜如何其秋未半於是拽魯縞攘皓腕始於搖揚終於凌亂四振五振驚飛雁之兩行六舉七舉遏彩雲而一斷隱高閣而如動度遙城而如散夜有露兮秋有風杵有聲兮衣有縫佳人聽兮意何窮步逍遙於涼景暢容與於晴空黃金金義兮碧雲髮白素巾兮青女月佳人聽兮良未歇擘長虹而乍開凌倒景而將越是時也餘響未畢微影方流逶迤洞房半入宵夢窈窕閒館方增客愁李都尉以胡笳動泣向子期以鄰笛增憂古人獨感於聽今者況兼乎秋屬南昌舊福東魯前邱升黃綬之堂論文謝賈入素王之廟捧瑟齊由願君無按龍泉色誰道明珠不可投良輔天寶十一年進士德宗時官商州刺史有物混成陰陽之精騰而為質晦而為名遊塵未足方其細纎縠不能揣其輕度水凌亂從風半散表銀山之美素色增鮮沐元豹之姿奇文獨煥若乃暑退朱方時惟白藏空濛大澤鬱郁崇岡始經夫少昊之野終遍於無何之鄉含草木而功大混山川而氣長浮我極浦靄我層穹如雨如霰自西自東倏而來比君子之道廣忽而逝侔至人之性空奚水土之同致俾陰陽之異觀秋何霧而不起霧何秋而不寒至德發祥雜非烟於北極皇居瑞聖伴佳氣於南端及夫丙火方馳騰蛇欲飛三辰被汨五星霏微道不虛行來集黃公之咒神其有感去解白登之圍則知因時舒卷與物動靜資於坱圠變態俄頃興非塞望雄鳴之路不迷冒且有聞彥輔之天自迥露遊兮月之下霞斂兮風之假俟一揚於飛塵同秋空於迥野昔者皇帝度六律和五音率伶倫之士總鈞石之金將合樂以教令俾洪鐘以平心當其形器作坯工進太房既列風橐伊震奉明謀以立象窕槬不夭夭心出良冶而成聲函圜得儶空以受氣動以發生尚羽大擊逢霜小鳴穢浮為之疏曠沈伏由其震驚如戢韻以待扣每登懸而惡盈若乃長鯨似小猛簴為狘崇巒蚴糾練響潛越九乳形矣信垂範於九州兩欒存焉更分儀於日月虛而不屈應而無窮廣樂之器為音之雄欲其能鳴幸舂容以大扣冀乎聞外必鍧厲之有中不誇乎窮髮之墟實美乎亭臺之宮儻擊考之無厭敢昭宣於國風惟茲舄兮稱珍受異質而彬彬其文也合變於君子其用也見美於詩人伊昔大匠未知含章可久棲山隱霧或㣥或友且申威以肅殺寧畏險而鋌走豈知獻狀於獠者之身入用於屨人之手敏手既至光華增媚兩美必合一朝成器信常功之嘉猷為盡飾之美利苟賞善之在我甘殺身而不懟曲直裁成威儀可覿若向也獸而今也舄諸侯所重楚子之翠被有光王者攸宜周官之赤繶無斁左之右之乍合乍離每唯命以進退將有翼於威儀擇地而行豈慮泥塗之辱有道則至尚懷文彩之奇故尚書之曳履聲則有音中郎之倒屣義亦為美雖措足以同方豈能文而可紀則知隨時應物順人合度克通夫莫往莫來實怪於規行矩步滯阜鄉之自惜飛鄴縣之可慕願賓上國之階墀冀吾君之一顧夫材俟時而進用時俟材以求索彼微獸之有章亦飾躬而制作慕公孫之几几恥滑稽以交錯幸參鵷鸞之行無雜犬羊之鞹若然者則荷夫天衢之亨對斯文而不怍暐開元時官殿中侍御史天寶中遷吏部郎中出為景城司馬瀛州長史大唐天寶某載月日瀛州長史李暐河閒司法李奐攝東光縣尉穆寧鹽山尉賈載等盟曰逆賊安祿山棄恩負德敢於稱兵天綱妄肆逆亂煽范陽幽薊之衆騁胡奚犬羊之㣥違叛朝廷恣逞凶禍瀛州近與賊接在腹腋閒賊意欲取之以絶牽掣僞署守長岸然直來思據城郭盜其府庫用其民人有其土地以豐賊資暐等身為唐臣義為唐守安有從逆賊而背天子汚僞命以辱名教所遣僞景城守劉道元已縛斬之凡我諸僚逮佐吏等咸共同心為國堅守移檄遠近上告方伯苟可滅賊殞躬不辭有渝此盟神殛毋貰芳字仲敷蒲州河東人開元末擢進士第由永寧尉直史館上元中坐事徙黔中歷左金吾衛騎曹參軍史館修撰終右司郎中集賢殿學士孝自天經禮為人紀事有動於神理迹無昧於生成乙則大夫位登右職庶極四時之享以符三命之貴飲食宴樂特牲備舉圭璧嚴奠少牢是加用誠信以敷心資豐潔而致薦是實其訓何糾其違徵之於前固不可罰昔開元初宇文融首以稅客戶籍外剩田戶口色役之策行於天下其後天寶閒韋堅又以穿廣運潭興漕之利楊慎矜王鉷楊國忠等議財貨之政君子曰融等之敗也豈不哀哉詩云人之多僻無自立辟融等之謂也初元宗以雄武之才再開唐統賢臣左右威至在已姚崇宋璟蘇頲等皆以骨鯁大臣鎮以清靜朝有著定下無覬覦四夷來寇驅之而已百姓富饒稅之而已繼以張嘉貞張說守而勿失自後賦役頓重豪猾兼并強者以才力相君弱者以侵漁失業人逃役者多浮寄於閭里縣收其名謂之客戶雜於居人者十一二矣蓋漢魏以來浮戶流人之類也是時也天子方欲因士馬之衆賈將帥之勇高視六合慨然有制御夷狄之心然懼師旅之不供流庸之未復思覩奇畫之士以發皇明蓋有日矣而宇文融揣摩上旨款關謁見天子前席而見之恨得之晚言發融口策合主心不出數年之中獨立㣥臣之上無德而祿卒以敗亡既而天子方事四夷國用不足多融之能追而悔焉於是楊崇禮又以善計財帛見幸然廉謹自守與人無害故能獲終融死且十餘年始用韋堅及崇禮慎矜皆以計利興功中人主脅權相滅為天下笑而王鉷楊國忠威震海內尤為暴橫人反思融矣大凡數子少者帶數使多者帶二十使判官佐使遍於天下客戶倍於往時主司守以取決備員而已四十年閒覆族者五棄人賈害豈天道與夫先王牧人之制既富而聚之以興利也儉則散之以除害也所以裒多益寡稱物平施降及後代亦克用乂禮記曰倉廩實而知榮辱人苟不足而可理者自古及今未之有也觀數子之意欲竭人財乘主之欲殫天下之力以供國竊王者之柄以徇已奮其長觜以鼓天下於是權歸掌握利出胸臆呼吸指顧車舟沸渭於萬里之外矣狙詐既騁拱袂而取公卿竊富國安人以為名紆青拖紫以為實名實不其爽歟且君以安人為憂而融輩擾之矣人以豐財為利而融輩竭之矣向之所利者豈不反歟而數子方自以為功無讓坐受富貴斧鉞已在其後而謂身安於泰山及其死之葅醢不足以謝天下豈不愚哉於戲以元宗之才業為中興君奸臣一說利動明主堅等窺其餘烈不顧萬死者貪爵祿也蓋國之利器不可以示人氏族者古史官所記也昔周小史定系世辨昭穆故古有世本録黃帝以來至春秋時諸侯卿大夫名號繼統左邱明傳春秋亦言天子建德因生以賜姓胙之土命之氏諸侯以字為氏以諡為族昔堯賜伯禹姓曰姒氏曰有夏伯姓曰姜氏曰有呂下及三代官有世功則有官族邑亦如之後世或氏於國則齊魯秦吳氏於諡則文武成宣氏於官則司馬司徒氏於爵則王孫公孫氏於字則盂孫叔孫氏於居則東門北郭氏於地則三烏五鹿氏於事則巫乙匠陶於是受姓命氏粲然衆矣秦既滅學公侯子孫失其本系漢興司馬遷父子乃約世本修史記因周譜明世家乃知姓氏之所由出虞夏商周昆吾大彭豕韋齊桓晉文皆同祖也更王迭霸多者千祀少者數十代先王之封既絶後嗣蒙其福猶為彊家漢高帝興徒步有天下命官以賢詔爵以功誓曰非劉氏王無功侯者天下共誅之先王公卿之胄才則用不才棄之不辨士與庶族然則始尚官矣然猶徙山東豪傑以實京師齊諸田楚屈景皆右姓也其後進拔豪英論而録之蓋七相五公之所由興也魏氏立九品置中正尊世胄卑寒士權歸右姓已其州大中正主簿郡中正功曹皆取著姓士族為之以定門胄品藻人物晉宋因之始尚姓已然則別貴賤分士庶不可易也於時有司遷舉必稽譜籍而考其真僞故官有世胄譜有世官賈氏王氏譜學出焉由是有譜局令史職皆具過江則為僑姓王謝袁蕭為大東南則為吳姓朱張顧陸為大山東則為郡姓王崔盧李鄭為大關中亦號郡姓韋裴柳薛楊杜首之代北則為虜姓元長孫宇文于陸源竇首之虜姓者魏孝文帝遷洛有八氏十姓三十六族九十二姓八氏十姓出於帝宗屬或諸國從魏者三十六族九十二姓世為部落大人並號河南洛陽人郡姓者以中國士人差第閥閲為之制凡三世有三公者曰膏梁有令僕者曰華腴尚書領護而上者為甲姓九卿若方伯者為乙姓散騎常侍大中大夫者為丙姓吏部正員郎為丁姓凡得入者謂之四姓又詔代人諸胄初無族姓其穆陸奚于下吏部勿充猥官得視四姓北齊因仍舉秀才州主簿郡功曹非四姓不在選故江左定氏族凡郡上姓第一則為右姓太和以郡四姓為右姓齊浮屠曇剛類例凡甲門為右姓周建德氏族以四海通望為右姓隋開皇氏族以上品茂姓則為右姓唐貞觀氏族志凡第一等則為右姓路氏著姓略以盛門為右姓柳沖姓族系録凡四海望族則為右姓不通歷代之說不可與言譜也今流俗獨以崔盧李鄭為四姓加太原王氏號五姓蓋不經也夫文之弊至於尚官官之弊至於尚姓姓之弊至於尚詐隋承其弊不知其所以弊乃反古道罷鄉舉離地著尊執事之吏於是乎士無鄉里里無衣冠人無廉恥士族亂而庶人僭矣故善言譜者繫之地望而不惑質之姓氏而無疑綴之婚姻而有別山東之人質故尚婚婭其信可與也江左之人文故尚人物其智可與也關中之人雄故尚冠冕其達可與也代北之人武故尚貴戚其泰可與也及其弊則尚婚婭者先外族後本宗尚人物者進庶孽退嫡長尚冠冕者略伉儷慕榮華尚貴戚者徇勢利亡禮教四者俱弊則失其所尚矣人無所守則士族削士族削則國從而衰管仲曰為國之道利出一孔者王二孔者彊三孔者弱四孔者亡故冠婚者人道大倫周漢之官人齊其政一其門使下知禁此出一孔也故王魏晉官人尊中正立九品鄉有異政家有競心此出二孔也故彊江左代北諸姓紛亂不一其要無歸此出三孔也故弱隋氏官人以吏道治天下人之行不本鄉黨政煩於上人亂於下此出四孔也故亡唐承隋亂宜救之以忠忠厚則鄉黨之行修鄉黨之行修則人物之道長人物之道長則冠冕之緒崇冠冕之緒崇則教化之風美乃可與古參矣晉太元中散騎常侍河東賈弻撰姓氏譜狀十八州百十六郡合七百一十二篇甄析士庶無所遺宋王宏劉湛好其書宏每曰對千客可不犯一人諱湛為選曹撰百家譜以助銓序文傷寡省王儉又廣之王僧孺演益為十八篇東南諸族自為一篇不入百家數弻傳子匪之匪之傳子希鏡希鏡撰姓氏要狀十五篇尤所諳究希鏡傳子執執更作姓氏英賢一百篇又著百家譜廣兩王所記執傳其孫冠冠撰梁國親皇太子序親簿四篇王氏之學本於賈氏唐興言譜者以路敬淳為宗柳沖韋述次之李守素亦明姓氏時謂肉譜者後有李公淹蕭㯋士殷寅孔至為世所稱初漢有鄧氏官譜應劭有氏族一篇王符潛夫論亦有姓氏一篇宋何承天有姓苑二篇譜學大抵具此魏太和時詔諸郡中正各列本土姓族次第為舉選格名曰方司格人到於今稱之并字伯存大歷中辟河東府掌書記遷殿中侍御史喪明終於家子書起於鬻熊六韜盛於春秋六國時莊老道宗起覆載之功擴日月之照高視六經為天下式故絶於稱言矣墨翟大賢其旨精儉教闕三字名亞孔聖至矣闕三字管晏文闕十二字可謂庶矣而部帙繁廣尋覓頗難梁朝庾仲容鈔成三帙汰其沙石簸其粃糠而猶蘭蓀雜於蕭艾璠璵隱於璞石扶風馬總精好前志務於要又因庾仲容之鈔略存為六卷題曰意林聖賢則糟粕靡遺流略則精華盡在可謂妙矣隋代博林李文博攓掇諸子編成理道集十卷唐永興公虞世南亦採前史著帝王略論五卷天后朝宰臣朱翼祖則又述十代興亡論一帙洎扶風意林究子史大略者蓋四人意矣子扁舟途水留滯廬陵扶風為余語其本尚且曰編録所取先務於經濟次存作者之意罔失篇目如面古人豫懿馬氏之作文約趣深誠可謂懷袖百家掌握千卷之子用心也遠乎哉旌其可美述於篇首俾傳好事貞元丁卯歲夏之晦文廢瞍河東柳伯存重述維某年月日駙馬都尉郭曖父關內河東副元帥司徒兼中書令汾陽郡王臣子儀謹遣上都進奏院官傅濤敢昭告於貞懿皇后行宮伏惟德曜坤靈明齊月魄母儀萬國化洽六宮光輔聖人贊成陰教載榮史策式播謳謠奄違聖日上仙靈界遐邇痛憤宮闈哀慕臣幸忝諸親男尚貴主天人之美鞠育所鍾姻戚光榮宗族咸戴今園陵禮備祖載及期臣限守方鎮不獲陪侍行宮瞻望靈駕不勝摧慕伏荷皇恩眷以國戚許申祭禮超越等夷古今所絶獨開聖造無任惶恐銘戴之至謹獻牲牢庶羞之奠尚饗郢字叔敖華州華陰人第進士補太常協律郎代宗初為監察御史纍拜河南尹大歷末進拜京兆尹罷為大理卿遷御史大夫出為費州刺史案舊屯沃饒之地今十不耕一若力可墾闢不俟浚渠其諸屯水利可種之田甚廣蓋功力不及因致荒廢今若發兩京關輔人於豐州浚渠營田徒擾兆庶必無其利臣不敢遠引他事請以內園植稻明之上秦地膏腴田稱第一其內園丁皆京兆人於當處營田月一替其易可見然每人月給錢八千糧食在外內園丁猶僦募不占奏令府司集事計一丁歲當錢九百六十米七斛二斗計所僦丁三百每歲合給錢二萬八千八百貫米二千一百六十斛不知歲終收獲幾何臣計所得不補所費況二千餘里發人出塞屯田一歲方替其糧穀從太原轉餉運直至多又每人須給錢六百三十米七斛二斗私出資費數又倍之據所收必不登本而關輔之人不免流散是虛畿甸而無益軍儲天寶已前屯田事殊臣至愚不敢不熟計惟當審察伏以五城舊屯其數至廣臣前已揭名聞奏訖其五城軍士若以今日所運開渠之糧貸諸城官田至冬輸之又以所送開渠功直布帛先給田者至冬令據時估輸穀如此即關輔免於徵發五城豐厚力農闢田比之浚渠十倍之利也伏以故相國江陵尹兼御史大夫贈吏部尚書呂公諲昔事先朝纍當大任至德之初天步艱難公首披荊棘扈蹕靈武忘軀進忠一日三接先朝察匪躬之節納沃心之議爰立作相弻諧神人其嘉謀嘉猷獻可替否之跡入則造膝出則詭辭溫樹不言難可得而知也至有爛焉明白欲蓋而彰者請區而載之乾元收復之際兩都衣冠多繫於三司詔獄御史中丞崔良器議事失入時宰苗太師崔趙公等雖廷諍之然未堅決公有犯無隱引經正辭上是其言刑為之省所全活者蓋數百人明主收雷電之威聖朝行寬大之典者繄公之力也古者進賢受上賞書不云乎咎繇曰都在知人公踐台衡專以推賢任人為務故相國房公琯故吏部尚書韋公陟入登左職皆公之由今相國黃門侍郎杜公之蒞江陵也公薦在方面之任今相國中書侍郎元公之在度支也公咨以幕府之政曾未數歲而二相接武於上台天地交泰聖賢相得庶績咸熙五典克從者資公之舉善也則子皮之舉子産鮑叔之舉管仲蕭何之舉曹參武侯之舉蔣琬方之前人我有餘地其在荊南也戢兵和衆令行禁止理績為天下最雖古之羊杜無得而踰今太常議荊南之政詳矣而曰在台司齪齪無匪躬之能者乃抉瑕掩德之論非中適之言也國家故事宰臣之諡皆有二字以彰善旌德焉夫以呂公文能無害武能禁暴貞則幹事忠則利人盛烈宏規不可備舉傳敘八元之德曰忠肅恭懿若以美諡擬於形容請諡呂公曰忠肅謹議臣伏以徙置邊州者流之異名流罪者有三等一例移配或恐未當其死罪除殺人之外有十惡重罪造僞刻印並主典僞印及強盜光火等若一切免死徙邊即於法太輕不足懲戒其徒罪條目至多或鬬毆爭競小有傷損或夫妻離異不犯義絶或養男別姓或立嫡違式或私行度關或相冒合戶如此之類不可悉數令一切徙邊與十惡造僞同等即輕重懸殊又准刑部格京城縣雜愆犯百端觸網陷刑徒罪偏廣若皆送覆繫滯實多其徒已下罪非除免官當及敕杖者宜准外州例州縣量事處分今若天下徒罪悉申所司皆從讞報法司斷結准式有程州縣禁囚動盈千百計天下每月徒配必不啻五六千人此則百姓動搖刑章紊撓又邊州及近邊犯死及徒流者復何以處之伏請下刪定使詳覆然後施行和尚諱不空西域人也氏族不聞於中夏故不書元宗燭知至道特見高仰訖肅宗代宗三朝皆為灌頂國師以元言德祥開右至尊代宗初以特進大鴻臚裦表之及示疾不起又就臥內加開府儀同三司肅國公皆牢讓不允特錫法號曰大廣智三藏大歷九年夏六月癸未滅度於京師大興善寺代宗為之廢朝三日贈司空追諡大辨正廣智三藏和尚荼毗之時復遣中謁者齎祝文祖祭申如在之敬睿詞深切嘉薦令芳禮冠㣥倫舉無與比明年九月以舍利起塔於舊居寺院和尚性聰朗博貫前佛萬法要指緇門獨立邈蕩蕩其無雙稽夫真言字義之憲度灌頂升壇之軌迹即時成佛之速應聲儲祉之妙天麗且彌地普而深固非末學所能詳也敢以概見序其大歸昔金剛薩埵親於毗盧遮那佛前受瑜伽最上乘義後數百歲傳於龍猛菩薩龍猛又數百歲傳於龍智阿闍黎龍智傳金剛智阿闍黎金剛智東來傳於和尚和尚又西遊天竺師子等國詣龍智阿闍黎揚攉十八會法法化相承自毗盧遮那如來貤於和尚凡六葉矣每齊戒留中導迎善氣登禮皆答福應較然溫樹不言莫可記已西域隘巷狂象奔突以慈眼視之不旋踵而象伏不起南海半渡天吳鼓駭以定力對之未移晷而海靜無浪其生也母氏有毫光照燭之瑞其歿也精舍有池水竭涸之異凡僧夏五十享年七十自成童至於晚暮常飾供具坐道場浴蘭焚香入佛知見五十餘年晨夜寒暑未曾須臾有傾欹懈倦之色過人絶遠乃如是者後學升堂誦說有法者非一而沙門惠朗受次補之記得傳燈之旨繼明佛日紹六為七至矣哉於戲法子永懷梁木將紀本行託余勒崇昔承微言今見几杖光容渺漠壇宇清愴纂書昭銘小子何讓銘曰嗚呼大士右我三宗道為帝師秩為儀同昔在廣成軒后順風歲逾三千復有肅公瑜伽上乘真語密契六葉授受傳燈相繼述者牒之爛然有第陸伏狂象水息天吳慈心制暴慧力降愚寂然感通其可測乎兩楹夢奠雙樹變色司空寵終辨正旌德天使祖祭宸衷悽惻詔起寶塔舊庭之隅下藏舍利上飾浮屠跡殊生滅法離有無刻石為偈傳之大都建中二年歲次辛酉十一月乙卯朔十五日已已建秩字祚卿贈工部尚書子元子開元末由憲部員外郎除隴西司馬至德初遷給事中出為閬州剌史貶撫州長史卒臣伏奉今月二十一日敕欲不禁鑄錢更令百僚詳議可否者夫錢之興其來尚矣將以平輕重而權本末齊桓得其術而國以霸周景失其道而人用弊考諸載籍國之興衰實繫於是陛下思變古以濟今欲反經以合道而不即改作詢之芻蕘臣雖憃愚敢不薦其聞見古者以珠玉為上幣黃金為中幣刀布為下幣管仲曰夫三幣握之則非有補於暖也捨之則非有損於飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一高一下不得有常故與之在君奪之在君富之在君貧之在君是以人戴君如日月親君如父母用此術也是為人主之權今之錢即古之下幣也陛下若捨之任人則上無以御下下無以事上其不可一也夫物賤則傷農錢輕則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕由乎物多多則作法收之使少少則重重則作法布之使多多則輕輕重之本必由乎是奈何而假於人其不可二也夫鑄錢不雜以鉛鐵則無利雜以鉛鐵則惡惡不重禁之不足以懲息且方今塞其私鑄之路人猶冒死以犯之況啓其源而欲人之從令乎是設陷穽而誘之入其不可三也夫許人鑄錢無利則人不鑄有利則人去南畝者衆去南畝者衆則草不墾草不墾又鄰於寒餒其不可四也夫人富溢則不可以賞勸貧餒則不可以威禁故法令不行人之不理皆由貧富之不齊也若許其鑄錢則貧者必不能為臣恐貧者彌貧而服役於富室富室乘之而益恣昔漢文帝之時吳濞諸侯也富埒天子鄧通大夫也財侔王者此皆鑄錢之所致也必欲許其私鑄是與人利權而捨其柄其不可五也陛下必以錢重而傷本工費而利寡則臣願言其失以效愚計夫錢重者由人日滋於前而爐不加於舊又公錢重與銅之賈頗等故盜鑄者破重錢以為輕錢錢輕禁寬則行錢重禁嚴則止止則棄矣此錢之所以少也夫鑄錢用不贍者在乎銅貴銅貴在於採用者衆夫銅以為兵則不如鐵以為器則不如漆禁之無害陛下何不禁於人禁於人則銅無所用銅無所用則銅益賤賤則錢之用給矣夫銅不布下則盜銅者無因而鑄無因而鑄則公錢不破人不犯死刑錢又日增必復利矣是一舉而四美兼也惟陛下熟察之謹議王者官人必視國之要杜諸戶一其門安平則尊經術之士有難則貴介胄之臣夏殷周選士必於庠序非其道者莫得仕進是以誘人也無二其應之者亦一及周之末諸侯異政取人多方故商鞅患之說秦孝公曰利出一孔者王利出二孔者強利出三孔者弱於是下令非戰非農不得爵位秦卒以是并吞六國漢室干戈以定禍亂貴尚淳質高后舉孝悌力田文景守而不變故下有常業而朝稱多士及孝武察孝廉置五經博士弟子雖門閥二三而未失道德也逮至晚歲務立功名鋭意四夷故權譎之謀設荊楚之士進軍旅相繼官用不足是以聚斂計料之政生設險興利之臣起番系嚴熊羆等經營作渠以通漕運東郭偃孔僅建鹽鐵諸利策富者冒爵射官免刑除罪公用彌多而為官者徇私上下並求百姓不堪刓弊故巧法慘急之臣進而見知廢格之法作杜周減宣之屬以峻文決理貴而王溫舒之徒以鷹擊敢殺彰而法先王之術習俎豆之容者無所任用由是精通秀㯋之士不游於學游於學者率章句之儒也是以昭帝之時霍光問人疾苦不本之於太常諸生徵天下賢良文學以訪之是常道不足以取人也至於東漢光武好學不能施之於政乃躬自講經肅宗以後時或祖效尊重儒術不達其意而酌其文三公尚書雖用經術之士而不行經術之道是以元成以降迄於東漢慷慨通方之士寡廉隅立節之徒衆無何漢氏失馭曹魏僭竊中正取士權歸著姓雖可以鎮伏氓庶非尚賢之術蓋尊尊之道於時聖人不出賢哲無位詩道大作怨曠之端也洎乎晉宋齊梁遞相祖習其風彌盛舍學問尚文章小仁義大放誕談莊周老聃之說誦楚詞文選之言六經九流時曾閲目百家三史罕聞於耳撮㣥抄以為學總衆詩以為資謂善賦者廊廟之人雕蟲者台鼎之器下以此自負上以此選材上下相蒙持此為業雖名重於當時而不達於從政故曰取人之道可以敦化周書曰以言取人人竭其言以行取人人竭其行取人之道不可不慎也原夫詩賦之意所以達下情所以諷君上上下情通而天下亂者未之有也近之作者先文後理詞冶不雅既不關於諷刺又不足以見情蓋失其本又何為乎隋氏罷中正舉選不本鄉曲故里閭無豪族井邑無衣冠人不土著萃處京畿士不飾行人弱而愚夫古者以勳賞功以才蒞職以才蒞職是以職與人宜近則以職賞功是以官與人乖古者計人而貢士計吏而用人故士無不官官無乏吏近則官倍於古士十於官求官者又十於士故士無官後魏羽林士今萬騎軍功是也官乏祿吏擾人古者王畿千里千里之外封建諸侯諸侯之吏自卿以降各自舉任當乎漢室除保傅將相餘盡專之州縣佐史則皆牧守選辟夫公卿者主相之所任也甸外之官吏者又諸侯牧守之事也然則主司之所選者獨甸內之吏公卿府之屬耳豈不寡哉所選既寡則焉得不精近則有封建而無國邑五服之內政決王朝一命免拜必歸吏部按名授職猶不能遣何暇採訪賢良搜核行能耶時皆共嗤其失而不知失之所以故備詳之又曰夫官有大小材有短長長者任之以大官短者任之以小職職與人相宜而功與事並理是以孟公綽為趙魏老則優不可以為滕薛大夫近之任官其選之也略其使之也備一人之身職無不蒞若委游夏以政事責冉季以文學也何其謬歟故人失其長官失其理是以三代之制家有代業國有代官孔子曰醫不三世不服其藥史墨曰古之為官代守其業朝夕思之一朝失業死則及焉是知業不代習則其事不精此周之所以得人也昔羲氏和氏掌天地劉氏代擾龍籍氏代司史庾氏庫氏代司出納制氏代司鑄鐘即其事也後代以代卿執柄益私門卑公室齊奪於田氏魯弱於三家革代卿之失而不復代業之制醫工筮數其道浸微蓋為此也故老子曰聖人常善救人故無棄人常善救物故無棄物不善用人者譬若使驥捕鼠令鷹守肉驥之捕鼠終不可獲而千里之功廢矣鷹之守肉死有餘罪而攫撮之效沒矣夫裁徑尺之帛刻方寸之木不任左右必求良工者裁帛刻木非左右之所能故也徑尺之帛方寸之木薄物也非良工不能裁之況帝王之佐經國之任可不審擇其人乎故構大廈者先擇木然後揀材理國家者先擇佐然後守人大匠構屋必以大材為棟梁小材為榱桷苟有所中尺寸之木無棄此善理木者也昔周公使伯禽理魯三年而後報政周公曰何遲伯禽曰變其理易其俗難所以遲太公理於齊三月而後報政周公曰何疾曰因其俗其禮易所以速故孔子論之曰齊一變至於魯魯一變至於道由是而言勞不甚者理不極功不積者澤不深故堯舜三年而考三考而黜陟所以能盡其智術也近古人情敦厖未淳乎堯舜禮正樂和未愈於虞夏官賢吏能未稱於殷周或一年而考或四考黜陟或比年而巡狩或歲時便遷或旬月升擢令長今日既上明日部內有犯名義者即坐之不其速歟峴吳王恪孫以門蔭入仕纍遷京兆尹至德初封梁國公乾元二年以中書侍郎同中書門下平章事出為蜀州刺史代宗即位入為禮部尚書兼宗正卿拜黃門侍郎同中書門下平章事罷為太子詹事尋遷吏部尚書出為衢州刺史永泰二年卒年五十八夫法有首有從情有重有輕若一概處死恐非陛下含宏之義又失國家惟新之典且羯胡亂常狂寇凌據二京全陷萬乘南巡各顧其生衣冠蕩覆或陛下親戚勳舊子孫責之以死恐乖仁恕昔者明王用刑殲厥渠魁脅從罔治況河北殘寇今尚未平苟容漏網適開自新之路若盡行誅是堅叛逆之心誰人更肯歸順困獸猶鬥況數萬人乎崔器呂諲皆守文之吏不識大體殊無變通
