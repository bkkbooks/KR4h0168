  text: 全唐文欽定全唐文卷五百九十二柳宗元二十四
  hash: sha256:58abd7141591855618e08b2f389058ce087299675db52a87a1d397ab7e0a7e99
body:
  text: 魯有劉叟者嘗以御龍術進於魯公云云劉叟曰歲不雨無以出終無以入民枯然視天卿士大夫絶智謀山川禱神祇以祈咸不應臣投是龍於尺池之內不踰晷雷孚上下電孚東西於是先之以風騰之以雲從之以雨如君之意欲一邑足之欲一國足之欲天下足之魯公曰斯龍也其神乎是則寡人之國非敢用劉叟曰臣聞避風雨禦寒暑當在未寒暑乎是故事至而後求曷若未至而先備於是魯公止劉叟而內龍明年果大旱命劉叟出龍果大雨宋清長安西部藥市人也居善藥有自山澤來者必歸宋清氏清優主之長安醫工得清藥輔其方輒易讎咸譽清疾病疕瘍者亦皆樂就清求藥冀速已清皆樂然響應雖不持錢者皆與善藥積券如山未嘗詣取直或不識遙與券清不為辭歲終度不能報輒焚券終不復言市人以其異皆笑之曰清蚩妄人也或曰清其有道者歟清聞之曰清逐利以活妻子耳非有道也然謂我蚩妄者亦謬清居藥四十年所焚券者百數十人或至大官或連數州受俸博其餽遺清者相屬於戶雖不能立報而以賒死者千百不害清之為富也清之取利遠遠故大豈若小市人哉一不得直則怫然怒再則罵而仇耳彼之為利不亦翦翦乎吾見蚩之有在也清誠以是得大利又不為妄執其道不廢卒以富求者益衆其應益廣或斥棄沈廢親與交視之落然者清不以怠遇其人必與善藥如故一旦復柄用益厚報清其遠取利皆類此吾觀今之交乎人者炎而附寒而棄鮮有能類清之為者世之言徒曰市道交嗚呼清市人也今之交有能望報如清之遠者乎幸而庶幾則天下之窮困廢辱得不死亡者衆矣市道交豈可以少耶或曰清非市道人也柳先生曰清居市不為市之道然而居朝廷居官府居庠孰鄉黨以士大夫自名者反爭為之不已悲夫然則清非獨異於市人也郭士冖柘駝不知始自何名病僂癃然伏行有類士冖柘駝者故鄉人號之駝駝聞之曰甚善名我固當因捨其名亦自謂士冖柘駝云其鄉曰豐樂鄉在長安西駝業種樹凡長安豪富人為觀遊及賣果者皆爭迎取養視駝所種樹或移徙無不活且碩茂蚤實以蕃他植者雖窺伺效慕莫能如也有問之對曰士冖柘駝非能使木之壽且孳也以能順木之天以致其性焉耳凡植木之性其本欲舒其培欲平其土欲故其築欲密既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩而茂之也不抑耗其實而已非有能蚤而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及苟有能反是者則又愛之太恩憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯搖其本以觀其疏密而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讎之故不我若也吾又何能為矣哉問者曰以子之道移之官理可乎駝曰我知種樹而已理非吾業也然吾居鄉見長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕勗爾植督爾穫蚤繅而緒蚤織而縷字而幼孩遂而雞豚鳴鼓而聚之擊木而召之吾小人具飱餐以勞吏且不得暇又何以蕃吾生安吾性耶故病且怠若是則與吾業者其亦有類乎問者曰嘻不亦善夫吾問養樹得養人術傳其事以為官戒也柳先生曰越人少恩生男女以貨視之自毀齒以上父兄鬻賣以覬其利不足則盜取他室束縛鉗梏之至有鬚鬣者力不勝皆屈為僮當道相賊殺以為俗幸得壯大則縛取么弱者漢官因以為己利苟得僮恣所為不問以是越中戶口滋耗少得自脫惟童區寄以十一歲勝斯亦奇矣桂部從事杜周士為余言之童區寄者郴州蕘牧兒也行牧且蕘二豪賊劫持反接布囊其口去逾四十里之虛所賣之寄偽兒啼恐栗為兒恆狀賊易之對飲酒醉一人去為市一人臥植刃道上童微伺其睡以縛背刃力下上得絶因取刃殺之逃未及遠市者還得童大駭將殺之童遽曰為兩郎僮孰若為一郎僮耶彼不我恩也郎誠見完與恩無所不可市者良久計曰與其殺是童孰若賣之與其賣而分孰若吾得專焉幸而殺彼甚善即藏其尸持童抵主人所愈束縛牢甚夜半童自轉以縛即爐火燒絶之雖瘡手勿憚復取刃殺市者因大號一虛皆驚童曰我區氏兒也不當為僮賊二人得我我幸皆殺之矣願以聞於官虛吏白州州白大府大府召視兒幼願耳刺史顏證奇之留為小吏不肯與衣裳吏護還之鄉鄉之行劫縛者側目莫敢過其門皆曰是兒少秦武陽二歲而計殺二豪豈可近耶裴封叔之第在光德里有梓人款其門願傭隟宇而處焉所職尋引規矩繩墨家不居礱斫之器問其能曰吾善度材視棟宇之制高深圓方短長之宜吾指使而㣥工役焉捨我衆莫能就一宇故食於官府吾受祿三倍作於私家吾收其直大半焉他日入其室其牀闕足而不能理曰將求他工余甚笑之謂其無能而貪祿嗜貨者其後京兆尹將飾官署余往過焉委㣥材會衆工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斫刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢慍焉畫宮於堵盈尺而曲盡其制計其毫釐而構大廈無進退焉既成書於上棟曰某年某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而嘆曰彼將捨其手藝專其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒隸為鄉師里胥其上為下士又其上為中士為上士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連率郡有守邑有宰皆有佐政其下有胥吏又其下皆有嗇夫版尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其遠邇細大可手據其圖而究焉猶梓人畫宮於堵而績於成也能者進而由之使無所德不能者退而休之亦莫敢慍不衒能不矜名不親小勞不侵衆官日與天下之英才討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循迹而慕曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勞勤而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣其不知體要者反此以恪勤為功以簿書為尊衒能矜名親小勞侵衆官竊取六職百役之事聽聽於府庭而遺其大者遠者焉所謂不通是道者也猶梓人而不知繩墨之曲直規矩之方圓尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟或曰彼主為室者儻或發其私智牽制梓人之慮奪其世守而道謀是用雖不能成功豈其罪耶亦在任之而已余曰不然夫繩墨誠陳規矩誠設高者不可抑而下也狹者不可張而廣也由我則固不由我則圮彼將樂去固而就圮也則卷其術默其智悠爾而去不屈吾道是誠良梓人耳其或嗜其貨利忍而不能捨也喪其制量屈而不能守也棟橈屋壞則曰非我罪也可乎哉可乎哉余謂梓人之道類於相故書而藏之梓人蓋古之審曲面勢者今謂之都料匠云余所遇者楊氏潛其名李赤江湖浪人也嘗曰吾善為歌詩詩類李白故自號曰李赤遊宣州州人館之其友與俱遊者有姻焉間纍日乃從之館赤方與婦人言其友戲之赤曰是媒我也吾將娶乎是友大駭曰足下妻固無恙太夫人在堂安得有是豈狂易病惑耶取絳雪餌之赤不肯有間婦人至又與赤言即取巾經其脰赤兩手助之舌盡出其友號而救之婦人解其巾走去赤怒曰汝無道吾將從吾妻汝何為者赤乃就牖間為書輾而圓封之又為書博而封之訖如廁久其友從之見赤軒廁抱甕詭笑而側視勢且下入乃倒曳得之又大怒曰吾已升堂面吾妻吾妻之容世固無有堂宇之飾宏大富麗椒蘭之氣油然而起顧視汝之世猶溷廁也而吾妻之居與帝居鈞天清都無以異若何苦余至此哉然後其友知赤之所遭乃廁鬼也聚僕謀曰亟去是廁遂行宿三十里夜赤又如廁久從之且復入矣持出洗其汙衆環之以至旦去抵他縣縣之吏方宴赤拜揖跪起無異者酒行友未及言飲已而顧赤則已去矣走從之赤入廁舉其牀捍門門堅不可入其友叫且言之衆發墻以入赤之面陷不潔者半矣又出洗之縣之吏更召巫師善呪術者守赤赤自若也夜半守者怠皆睡及覺更呼而求之見其足於廁外赤死久矣獨得尸歸其家取其所封書讀之蓋與其母妻訣其言辭猶人也柳先生曰李赤之傳不誣矣是其病心而為是耶抑故有廁鬼也赤之名聞江湖間其始為士無以異於人也一惑於怪而所為若是乃反以世為溷溷為帝居清都其屬意明白今世皆知笑赤之惑也及至是非取與向背決不為赤者幾何人耶反修而身無以欲利好惡遷其神而不返則幸耳又何暇赤之笑哉蝜蝂者善負小蟲也行遇物輒持取卬其首負之背愈重雖困劇不止也其背甚澀物積因不散卒躓仆不能起人或憐之為去其負苟能行又持取如故又好上高極其力不已至墜地死今世之嗜取者遇貨不避以厚其室不知為己纍也唯恐其不積及其怠而躓也黜棄之遷徙之亦已病矣苟能起又不艾日思高其位大其祿而貪取滋甚以近於危墜觀前之死亡不知戒雖其形魁然大者也其名人也而智則小蟲也亦足哀夫維某年月日前進士虞九皋字鳴鶴終於長安親仁里既克葬於高陽原二三友生皆至於墓哀其行之不昭於世追列遺懿求諸后土申薦嘉名實曰恭甫乃作誄曰吳虞之分爰宅大陽其後優遊在越為鄉延詡輔漢恢定封疆東徙之賢時惟仲翔曰預曰喜在晉克彰義篤斯文有苾其芳祕書多能垂耀於唐洎於漢陽世德以昌毗贊尚父休徽用揚惟我先君並時翺翔洽主記室蔚其耀光實契伯仲永永不忘漢陽元子實紹其美傳襲儒風彪炳文史克恭以孝惟禮是履譽洽於鄉論為秀士百郡之選叢於京師昧沒騰藉乘淩蔽欺生之始至則奮其儀退默以謙人悅而隨名卿是挈先進咸推方出㣥類振耀於時禍丁舅氏漂淪海沂捧訃號呼匍匐增悲喪有幼主禮或多遺孰徇於名而不是思投袂就道乘艱若夷竭誠喪具申敬裳帷萬里來復祗祔於墓遽不淩節儉而有度由其溫恭守以貞固行道咨嗟觀禮興慕復從鄉賦煥發其華克不再舉聞於邦家倚閭千里歡咏斯多姻族盈門載笑且歌君之不淑名立志阻慶歸其鄉身終逆旅生死已間壽觴方舉賀書在途委骨歸土哀歡易地弔慶交戶神胡不仁降比大苦嗚呼哀哉惟昔夏首羈貫相親通家修好講道為鄰既冠於阼思致其身升於司徒及爾繼年交歡二紀莫間斯言愈乎其和確爾其堅更為砥礪咸去韋弦今則遽已吾其缺然嗚呼哀哉誄行謀諡惟古之道生而無位沒有其號惟是友生徘徊顧悼爰用一惠幽明是告溫溫其恭惟德之經先民有作今也是旌嗚呼恭甫欽此嘉名維唐元和六年八月日衡州刺史東平呂君卒爰用十月二十四日藳葬於江陵之野嗚呼君有智勇孝仁惟其能可用康天下惟其志可用經百世不克而死世亦無由知焉君由道州以陟為衡州君之卒二州之人哭者逾月湖南人重社鄉飲酒是月上戊不酒去樂會哭於神所而歸余居永州在二州中聞其哀聲交於南北舟船之下上必呱呱然蓋嘗聞於古而觀於今也君之志與能不施於生人知之者又不過十人世徒讀君之文章歌君之理行不知二者之於君其末也嗚呼君之文章宜傳於百世今其存者非君之極言也獨其詞耳君之理行宜及於天下今其聞者非君之盡力也獨其迹耳萬不試而一出焉猶為當世甚重若使幸得出其什二三巍然為偉人與世無窮其可涯也君所居官為第三品宜得諡於太常余懼州吏之逸其辭也私為之誄以志其行其詞曰麟死魯郊其靈不施濯濯夫子故潔其儀冠仁服義干櫓書詩忠貞繼佩智勇承綦跨騰商周堯舜是師道不勝禍天固余欺鬼神齊怒妖孽咸疑何付之德而奪其時嗚呼哀哉命姓為呂勤唐以力輔寧萬邦受胙爾國維師元聖周以降德世征五侯伊祖之則嗣濟厥武前書是式至於化光爰耀其特春秋之元儒者咸惑君達其道卓焉孔直聖人有心由我而得敷施變化動無不克推理惟公舒文以翼宣於事業與古同極道不苟用資仕乃揚進於禮司奮藻含章決科聯中休問用張署讎百氏錯綜逾光超都諫列屢皂其囊帝殊爾能人服其智戎悔厥禍款邊求侍盛選邦良難乎始使君登御史贊命承事風動海壖皇威以致來總徵賦甲茲郎吏制用經邦時推重器諸臣之復周官匪易漢課箋奏鮮云能備君自他曹載出其技筆削自任㣥儒革議正郎司刑邦憲為二糾佞肅邪諂諛具畏遷理於道民服休嘉恩疏若昵惕邇如遐實閉其閣而撫於家載其愈樂申以舞歌賦無吏迫威不刑加浩然順風從令無譁絲蠶外邑我繭盈車雜耕鄰邦我黍之華既字其畜亦藝其麻鼛鼓斯屏人喜則多始富中教興良廢邪考績既成王用興嗟陟於嶽濱言進其律號呼南竭謳謠北溢欺吏悍民先聲如失逋租匿役歸誠自出兼并既息罷羸乃逸惟昔舉善盜奔於鄰今我興仁化為齊人惟昔富人或賑之粟今我厚生不竭而足邦思其弻人戴惟父善胡召災仁胡罹咎俾民伊祜而君不壽矯矯貪淩乃康乃茂嗚呼哀哉廩不餘食藏無積帛內厚族姻外賙賓客恆是懸磬逮茲易簀僮無凶服葬非舊陌嗚呼哀哉君昔與余講德討儒時中之奧希聖為徒志存致君笑詠唐虞揭茲日月以耀㣥愚疑生所怪怒起特殊齒舌嗷嗷雷動風驅良辰不偶卒與禍俱直道莫試嘉言罔敷王佐之器窮以郡符秩在三品宜諡王都諸生㣥吏尚擁良圖故友咨懷纍行陳謨是旌是告永永不渝嗚呼哀哉有周之羸兮邦國異圖臣乘君則兮王易為侯威強逆制兮鬱命轉幽疹蠱膠密兮肝膽為尤姦權蒙貨兮忠勇以劉伊時云幸兮大夫之羞嗚呼危哉河渭潰溢兮橫軀以抑嵩高坼陊兮舉手排直壓溺之不慮兮堅剛以為式知死不可撓兮明章人極夫何大夫之炳烈兮王不寤夫讒賊卒施快於剽狡兮怛就制乎強國松柏之斬刈兮蓊茸欣植盜驪折足兮罷駑抗臆鷙鳥之高翔兮孽狐惴而不食竊畏忌以㣥朋兮夫孰病百而伸一挺寡以校衆兮古聖人之所難矧援羸以威慠兮茲固蹈殆而違安殺身之匪豫戚兮閔宗周之不完豈成城以夸功兮哀清廟之將殘嫉彪子之肆誕兮彌皇覽以為謾姑舍道以從世兮焉用夫考古而登賢指白日以致憤兮卒頽幽而不烈版上帝以飛精兮黮寥廓而殄絶朅馮雲以羾訴兮終冥冥以鬱結欲登山以號辭兮愈洋洋以超忽心沍涸其不化兮形凝氷而自栗圖始而慮末兮非大夫之操陷瑕委厄兮固衰世之道知不可而愈進兮誓不偷以自好陳誠以定命兮侔貞臣以為友比干之以仁義類兮緬遼絶以不㣥伯夷殉潔以莫怨兮孰克軌其遺塵苟端誠之內虧兮雖耆老其誰珍古固有一死兮賢者樂得其所大夫死忠兮君子所與嗚呼哀哉敬弔忠甫後先生蓋千祀兮余再逐而浮湘求先生之汨羅兮攬蘅若以薦芳願荒忽之顧懷兮冀陳辭而有光先生之不從世兮惟道是就支離搶攘兮遭世孔疚華蟲薦壤兮進御羔袖牝雞咿嚘兮孤雄束咮哇咬環觀兮蒙耳大呂堇喙以為羞兮焚棄稷黍岸獄之不知避兮宮庭之不處陷塗藉穢兮榮若繡黼榱折火烈兮娛娛笑舞讒巧之嘵嘵兮惑以為咸池便媚鞠恧兮美逾西施謂謨言之怪誕兮反置瑱而遠違匿重痼以諱避兮進俞緩之不可為何先生之凜凜兮厲針石而從之但仲尼之去魯兮曰吾行之遲遲柳下惠之直道兮又焉往而可施今夫世之議夫子兮曰胡隱忍而懷斯惟達人之卓軌兮固僻陋之所疑委故都以從利兮吾知先生之不忍立而視其覆墜兮又非先生之所志窮與達固不渝兮夫惟服道以守義矧先生之悃愊兮蹈大故而不二沈璜瘞佩兮孰幽而不光荃蕙蔽匿兮胡久而不芳先生之貌不可得兮猶髣佛其文章託遺編而歎喟兮渙余涕之盈眶呵星辰而驅詭怪兮夫孰救於崩亡何揮霍夫雷電兮苟為是之荒茫耀姱辭之矘朗兮世果以是之為狂哀余衷之坎坎兮獨蘊憤而增傷諒先生之不言兮後之人又何望忠誠之既內激兮抑銜忍而不長芊為屈之幾何兮胡獨焚其中腸吾哀今之為仕兮庸有慮時之否臧食君之祿畏不厚兮悼爾位之不昌退自服以默默兮曰吾言之不行既偷風之不可去兮懷先生之可忘許縱自燕來曰燕之南有墓焉其志曰樂生之墓余聞而哀之其返也與之文使弔焉大廈之騫兮風雨萃之車亡其軸兮乘者棄之嗚呼夫子兮不幸類之尚何為哉昭不可留兮道不可常畏死疾走兮狂顧倣徨燕復為齊兮東海洋洋嗟夫子之專直兮不慮後而為防胡去規而就矩兮卒陷滯以流亡惜功美之不就兮俾愚昧之周章豈夫子之不能兮無亦惡是之遑遑仁夫對趙之悃款兮誠不忍其故邦君子之容與兮彌億載而愈光諒遭時之不然兮匪謀慮之不長跽陳辭以隕涕兮仰視天之茫茫苟偷世之謂何兮言余心之不臧
