front:
  text: 全唐文欽定全唐文卷六百四十二王起二
  hash: sha256:1ad28e76688b98bb6e7c9e0beb641e95ba6c256d177a14b39d30bf9fad5e21cf
body:
  text: 瞽惟審聲風實應候候至而厥風肇扇聲和而有瞽斯奏知夫天道則清泠必聞揚於王庭亦威儀可究所以贊欽若明敬授先五日而可傳信三推而不繆於時凜冽方謝溫仁始宣雜蔥蘢之佳氣和郁靄之祥烟樂師乃告平野臨大田其視則惟昧其聽則惟專寧體於舞松之間得其煦嫗傾耳於偃草之際宣彼暄妍曰此融風將聞於天既而進退匪徐周旋可則逶迤於紫殿之下俯僂於丹墀之側豈無相於倀倀方鞠躬而翼翼迺進而言曰陛下以美利利四海以仁宥宥萬國調玉燭而設邦教法銅渾而立人極所以八風不姦六律無忒臣以樂吏之賤謬知君子之德先王所竇惟穀所大惟食必俟協風以候力穡順時而教導蓋國之章有聲而薦聞乃臣之職今者起幽谷拂平林蕭條注耳寂寞拂襟有薰兮動地之氣無颯然鳴條之音達勾萌其和以布庤錢鎛其儀可尋且兢兢懍懍是微臣音之審習習飀飀彰陛下德之修固宜答休徵乘麗景躬千畝率萬井諒神倉之委積則齋宮之清淨表聖時之咸若昭國典之思永皇上垂拱無為居高聽卑察邇言悅矇瞍之告咨故實敦稼穡之宜謀盛禮度宏規豈虢公之言是則是效而周王之代不識不知國有休徵天作零雨不為霖以破塊自呈祥而潤土既霑既足克成五稼之豐不疾不徐詎作三農之苦惟雨也映於遙天惟塊也列於大田彼以泛灑為利此以生植為先元雲不開色霏微而方密黑壤相映形磊落以皆全詎為暴於終日自成功於有年觀其散漫初來空濛如振不遺一撮之小不爽一旬之信滋螻螘之穴何患沾濡帶蚯蚓之形亦懷膏潤其色如晦其飄甚微纚連異質優渥同歸如原野之霧合似隴畝之塵飛色潤方圓形沾大小東作之耕斯著西成之功必表青黎不散佇秀麥之芃芃白壤常存宜散絲之皎皎是知妖魃見也則枯旱為憂商羊舞也則泥塗見修孰若霢霂微清滂沱不流所以見太平之美所以彰至聖之休故宜美土疆資播種宣老圃之志作曾孫之頌祁祁美瑞九土之澤克施每每有形三日之霖勿用是知雨無破塊年必屢豐積而不載感之則通何沃土之不浹何瘠壤之不同夫如是則受塊之人共欣其天賜擊壤之老將明其帝功露表嘉瑞國昭元吉發五色以斯呈掩百祥而非匹輝光駭目知泛灩之惟新變化殊姿覺淒清之有失若非澤無不被化無不率則何以感之於旻天榮之於聖日爾其寂歷地表希微天宇無聲而零有色斯覩始曖空而雜糅俄泫草而周普霑於衣也皆成黼黻之衣潤於土焉更謂苴茅之土且其白能受采朱則孔陽青映苔而轉麗元點漆而有光既炫燿於衆彩終錯雜於中黃儻在琉璃味無忝於甘醴如浮葭菼色詎變於凝霜何湑兮之膏潤有煥乎之文章固可以扶壽而愈疾俗泰而時康徒觀夫泥泥未晞瀼瀼既落珠華點綴日華昭灼無煩勒畢之求方成曼倩之樂散東陵之上乍混其瓜灑西山之中更迷其藥其凝厭浥其布葳蕤鶴將警而未測蟬欲飲而猶疑何紺霧而喻矣何卿雲而比之則知墜露成文休祥有證實我后之冥感掩前王之嘉應王者崇北辰之位正南面之威赫朱燎以具舉列彤庭而有輝助彼皇明可燭於夜色叶茲睿哲引曜於宵衣信乎令典有作舊章不違當其冠劍鏗鏘環珮昭晰峩峩爭赴肅肅就列聽玉漏而未央仰紫宸而初爇珠旒將出方熠熠以星懸綵仗徐來巳煌煌而電設九儀稍布六樂爰分代星光之照曜雜佳氣之絪縕騰輝於鴛鷺之行若離若合委照於熊羆之旅或友或㣥昭昭彰彰紫氣紅光聲明煜煒百物熒煌覩炎上之有赫知臨下之無荒遠而瞻之謂焚裘之烟昭儉於晉帝迫而察之似流屋之火呈瑞於周王金釭莫齊銀燭非競長風乍拂高燄彌盛華衮燦爛以相鮮猛虡攫拏而交映其容烈烈其明杲杲附寒者覺其春深假寐者疑其曙早則知統四海朝百辟勵夙興勤夕惕佐盛儀而有待惜流光而無斁昭其明也叶天鑒之穆清望而畏之契天威之咫尺彼爟火秦舉神光漢覿何足示來儀之容呈入覲之績則知我皇立人之程為國之經旂淠淠而咸造鸞鏘鏘而可聆萬宇乂多士寧豈徒美君子之至在宣王之庭帝堯以化成於萬國歌宣於九德出汾水之陽經姑射之側峯巒交映若覩神人之形冰霜相鮮皆呈處子之色若非感而遂應靈而不測何以見不死之庭當至人之域始其厭宮室出茅茨駕鸞輅建羽旗若光若滅乍合乍離寓目於巉巖之頂駐蹕於沮洳之湄爰按節而至矣乃傾蓋而望之倏而五雲繚繞㣥仙縹緲出碧嶺之崇崇臨丹邱之窅窅瞻童顏之麗綽約則多觀羽服之鮮襳襹非少集其侶乍謂崑崙之巔狀其居不異蓬萊之表由是睋山岊矚天潯既元覽而旨遠亦高蹈而思深乃曰我以萬姓臣服八荒君臨蓋天下之至貴亦域中之所欽安知阻茲崖巘隔彼岑崟有吸風之人遐不可見仰承雲之客高不可尋既而儼珠旒端玉藻增肅穆之敬念希夷之道見仙人之岳岳徒仰高山望鸞鶴之翩翩且輕大寶既而求之不得瞻之在前念四子而莫來莫徃思一人而無黨無偏乘白雲而何及引黃屋而來旋故能戒以無怠防於未然向使忘鶉居之性徇龍駕之盛則光宅之德徒聞乎以遨以遊比屋之聽詎見乎乃神乃聖我皇明四目達四聰惟神也愛而見惟聖也感其通不窺仙於飲露不問道於順風則姑射之神未為盡善陶唐之主未足比崇漢武帝出咸京遊昆明覿潛魚之躍吐靈珠之英珍不藏川是獲媚川之色仁苟及物必能動物之誠先是撥刺巨鱗傍畔水裔或詹何所中或任公所制利鈎貫鰓而錯落長絲縈岸而掣曳殘瘁不振沉浮未濟是用脫其鋒解其綴索於枯肆初同患於波臣銜以圖書終乃小於軒帝他日擇良辰鏡清流舍鑾輅登龍舟不徐不疾以遨以遊於是傍臨桂棹遠映珠旒或銜或戲似驪龍之頷將吐若明若滅比瓊蚌之胎未收光芒稍逼輝赫難儔實有意於豐報固無情於暗投含幽育明轉煌煌於畫鷁振鬐掉尾時熠熠於牽牛既而千官動色百辟咸覩且曰修其文耀其武澤之廣恩之溥雖彼池中之物亦懷天下之主報德而入於隋掌此類蛇銜感音而失於晉庭彼慚鶴舞况乎燭龍奪艷石鯨獨吐泣鮫人之目固不可倫綴神女之軀曾何足數由是儼天儀俯洪池映噞喁而未出炫的皪而方施然後得廉寸之彩失圓折之規則皎皎駒來自掩白狼之美翩翩鵻至徒稱赤雀之竒是知人能博施物亦幽贊無煩罔象之索詎假闌干之貫向若安其忍棄其難俾頒首長逝刼灰未散安得此樂於江湖見託於河漢則玉殿之側誰綴其玲瓏金輿之傍莫矜其照爛以言於魚也厥道斯存以言於人也如何勿敦則受嘉惠蒙渥恩得不效節於當代而垂名於後昆玉琯絕倫受之於神希夷感化皎潔含真既比德而為美亦諧音而可珍肇自敻絕發茲璘玢匪剖石於和氏乃成器於羽人伊昔帝鄉所傳王室未獻虹彩潛射蜺旌並建鸞鶴映之以生光烟霞奏之以適願同鈞天之樂靈境獨聞在層城之宮人寰共遠既而舜德有感王母來過獻之皎皎捧之峩峩重華遂得其符瑞百靈永謝其琢磨儻比以為笙知鳳吹之不遠如秉之為笛曷龍吟之足多豈徒嘒嘒於茲竹碌碌於隨和若乃觀其戾止察其所以質非竽籟韻含宮徵圓其表而合規虛其中而通理光連素手雖提握之不忘色映丹唇在吹噓而成美其舍也無聲之樂其獲也無疆之祉虛而不屈老氏之籥乍同磨而不磷戎人之環孰比况乎知白自守無瑕可猜色迷瓊樹影雜瑤臺懷清越之音不求於扣感馨香之德不召而來固仙侶之所執非玉人之取材則知素琯之祥元理可察將使律合於六音諧於八傳真人之逸韻資聖主之大戛宜乎藏九重之深為百代之欽騰輝爛爛和俗愔愔使伶倫之筩自漸叶律俾女史之管空愧垂箴無以窺天之心而忘至德之音墨之為用也以觀其妙池之為翫也不傷其清苟變池而為墨知功積而藝成伊昔伯英務茲小學棲遲每親乎上善勤苦方資乎先覺俾夜作晝日居月諸挹彼一水精其六書或流離於崩雲之際乍滴瀝於垂露之餘由是變黛色涵碧虛浴玉羽之翩翩忽殊白鳥濯錦鱗之潎潎稍見元魚則知自強不息允臻其極何健筆之成文變方塘而設色映揚鬐之鯉自謂奪朱沾曳尾之龜還同食墨沮洳斯久杳冥不測愛涅者必染其緇知白者咸守其黑蘋風巳歇桂月初臨元渚彌淨元流更深所以恢宏學海輝映儒林將援毫而悅目豈泛舟而賞心其外可察其中可見同君子之用晦比至人之不炫冰開而淳漆重重石映而元圭片片儻北流而浸稻自成黑黍之形如東門之漚麻更學素絲之變究其義也如蟲篆之所為悅其風也想鳥迹之多竒將與能而可傳可繼豈謀樂而泳之游之恥魏國之沉沉徒開墨井笑崑山之浩浩空設瑤池專其業者全其名久其道者盡其美譬彼濡翰成茲色水則知游藝之人盡以墨池而為比懿彼元獺生於水鄉始殺身於河涘卒成器於書囊仍彼殘文不假乎雕刻裁以新製自合乎圓方既出納而斯取亦扃鐍而有常想夫下泉委質上天致祭紫府咸萃丹誠若契宜介福以全生奚徼禍而致斃苟利人以獲助甘成器於此際則有攻皮之工嘗巧於中遺文不剪輕縷潛通圓其蓋則合而能固柔其質則用之不窮謝水府之至樂入書林而見崇外也蒙茸毛有所傅中也駢坒書有所聚韜蔚矣之文章秘煥乎之詞賦彌縫則密豈亡三篋之書周旋必復且涉九衢之路若乃青簡疊至尺牘交馳藏筐篋而不可置懷袖以攸宜必資之以善閉克守之而不遺雖納以魚牋乍似噬魴之日臨乎墨沼寧同赴汨之時動必依人靜而掛壁滿貯攸戒緘縢受益其來也江海至深其潔也波瀾所滌掩青囊之貯卷異豹文之成舄既翰墨之居珍幸提攜而無斁伊昔漢武將吞遠戎鑿昆明之澹澹習水戰之雄雄池則無涯寫滇河之象戰思拓土合水國之風將以規遠畧恢聖功遐方不擁獷俗來同豈徒列萬艘之邐迤翫一沼之沖融乃命搜舳艫徵卒伍剡楫櫂備金鼓得佽飛於荊江獲文身於越土榜人來萃水客斯覩介夫仡仡將牽牛以交映畫鶂呀呀與石鯨而對吐奚去陸以習坎方整衆而耀武武之耀兮昭彰衆之整兮張皇攬繁弱拔千將可以摧南方之銳可以挫北方之強列萬夫之貔豹雜五兩之雪霜躍彼漣漪見魚麗之出遊乎洲渚知雁翼之張觀乎作軍政臨武事進退有節沿洄趨利或連兵而鳥逝或應鼓而麋至令肅而必平戎虜教成而不可奪帥四遐縱觀士德增修森森兮烈於武庫赫赫兮敞以層樓文物驚乎海若聲名震乎陽侯河漢為之震蕩刼灰為之沉浮則知水陸之謀無闕則遐荒可伐舟車之利克全則珍寶爭先故能立功於窮裔垂盛於當年國家以四海波清九夷草偃感彼洪沼猶連漢苑餘波尚在空發藻以潛魚水戰不修恥勞師以襲遠實我皇之清淨宜福祿之來反矯矯呂公凜千載之英風立轅門而耀武百夫之特射㦸枝而騁技一矢稱雄所以解紛為智和難成功豈徒用壯於六鈞之妙務能於百步之中當其劉氏興戎袁公結陣既禍拏而莫解亦兵纏而屢振鬬貔豹而不寧若蚌鷸而相徇是用假我手弓救其血刃則萬夫駭目不在於和容二憾革心必資乎中俊闕力未疲徵會於茲排其患難成彼宴私離坐離立左之右之森森兩軍比晉楚衷甲之日桓桓二帥同劉項舞劍之時是用出雄㦸射小枝既從容而諭旨亦慷慨而興辭乃曰射者所以明其志忠其質今欲轉禍為福反凶致吉若嗤同失鵠我藝自忝其疊雙儻妙等麗龜爾心固宜乎如一乃展容耀示英威決拾既佽分銖不違洸洸赳赳如翰如飛莫不竚其密彀釋此重圍彼㦸在門揭然獨見立亭亭之直影引耽耽之英眄刃孤標而霜白末斜指而目眩彎弧弨弓之際勢若月圓鳴鏑於矢之端光如電炫觀之者心惕聞之者膽戰固當靖難於五兵豈獨解顏於一箭彼容色沮我師氣振咸曰將軍勇絕衆藝如神蹲甲非敵措杯不倫今在座隅徒欲釁勇而嗇禍儻居戰陣誰當左馬而右人請懲忿於昔日願釋憾於茲辰盛矣哉斯會也當軍門而人無不協中㦸枝而戰無不舍既威加於域中亦藝絕於天下則毀其璧二人之訟息弄其丸兩家之難解比將軍之功實為小者墨子慮厥居慎所如轉華轂遊殷墟疾朝歌為名知非良邑惟時邁有度用迴德車將以擇樂國垂盛則舉足為龜鏡立身乎繩墨每自西而自東咸作範而作式始其命駕徘徊發軫員來豈半途而有廢將由逕而無猜雜彼行人初儦儦而同造問於及境終檻檻而獨迴乃曰歌樂者人必有度朝夕者天之所賦苟名而不臧曷邑之足顧由是反征輪遵大路比危邦之不入同覆轍之足懼載脂載土巛冖牟却新逕而不疑如輊如軒乃舊蹊而是遡諒無阻於寸進實自懲於跬步借如不戒乎謠不恒乎朝自然哀樂失節威儀莫昭何足以枉君子之車瞻夫翼翼來長者之轍美以翹翹是用居身於克正示衆以不佻雖大道甚夷崪如九州之險大都孔邇邈成千里之遙足以戒居人警行子革詠歌之俗作道途之紀改轅不爽於歸歟反路自忘於勞止亦將趨樂土走仁里彼邑之士莫得式其軒彼邑之塵莫得及其軌宜乎非禮勿動惟貞是履與孔門而齊教將宋國而專美莫不始於迴輪而彰乎勵巳嗟乎車之攸避也尚戒乎歌身之攸措也矧至於頗則懼栢人之不宿恥勝毋而不過比車之旨也未足居多雄雄雍畤兮神州之壤赫赫爟火兮橋衡之象所以郊祀克明所以照臨是仰成形中度知有要而有倫燭幽以時表來顧而來享肇秦帝而有制洎漢皇而不爽伊昔克修㣥祀大合百神聲明雲集文物星陳仰珠旒則嚴其待曙聽玉漏則闇然未晨晦威儀之秩秩迷俎豆之莘莘張華燈而其光不遠秉神燭而其明不均則雍畤之舉爟火也莫之與倫既而亭亭有揭燄燄方爇於以觀百里之備於以昭五夜之節拂瑞雲之表乍疑乎燭龍方來入靈壇之中又似乎神光不絕由是皚皚炳映盞斚鐏彞咸若光而若滅罔顛之而倒之熠爚無替熒煌自持在質明而有讓當委照而無私殊太叔之于田盤遊是舉異齊侯之設燎朝會為期薦嘉者於焉仰止執熱者難乎嚮邇電延而自西自東星繁而一彼一此比王屋之火空際不流似陳寶之光祠中乍委則雍畤之義斯焉取斯爟火之作為於有為照苾苾與芬芬自明無黷燭蹌蹌與濟濟方表有儀故將崇其明祀立我洪規豈徒散孤光於地表煽丹燄於天垂而巳哉國家祀典式崇舊章必授思宅中而圖大雍畤方宏法居上而克明爟火斯候足以掩前王之純懿諒介福而何究王者稽祀典竭至誠禋六宗而欽若致四海之和平宗者以尊為稱禋者以敬為名爰是崇而是畏必惟一而惟精則四序三光運有常度水旱寒燠災無所萌上乃擇元辰留睿想萬物備百禮徃圭璧陳俎豆敞靈壇嶽立擁千官而式瞻天仗星陳覩一人之可象玉食皓皓而方積珠旒穆穆而斯仰觀乎薦在有翼而有嚴貴其誠故來格而來享原夫禋於三辰也天宗必降嘉薦是列歆之以虔恭奠之以豐潔使兩曜合璧不為薄蝕之虧五星連珠詎有欃槍之孽其禋於四時也將以恤蒸人感明神使還周克序鱗次相循攷之於葭灰不愆於候調之以玉燭無奪其倫其祭寒暑也將以周萬類均二氣時當元律無墮指以成災節變朱明曷流金之足畏其祭水旱也則天無作孽人獲大和祅魃不生乎災熾商羊自屏於滂沱相彼六宗皇聖是接戩穀降而肸蠁文物紛其暐煜聆夫管磬知律呂之克諧列彼苾芬信幽明之允叶然後一德不二三皇可四地發嘉生天呈上瑞致百神之職興兆人之利君子謂大舜之克禋惟我皇之能備祝有典兮惟敬天垂象兮在崇奉靈星之德祈戩穀是豐乃命宗伯詔樂工徵舊典於祝史答嘉貺於元穹以夫靈者降休祐星者燭宇宙况出應天田見彰農候足使野夫致享祠官敬授禮而有異豈雩禜之同登樂則必倫乃絲簧之並奏於是驗星紀稽帝文覩農祥之晨正彰土膏之脈分奠玉盃於青帝用潔牲於白雲乃啟雲壇爰登玉瓚拜天貺之昭彰見星光之照爛列黍稷而馨感明靈奏和樂而聲聞霄漢瞻彼太極載乎紫微神之至兮雲映曖靈之降兮日揚飛列綴兆於峻舞徵歌頌於絲衣禮成文兮樂終變神胥樂兮儼將歸雕豆玉觴自殊器於宗祀青圭紺席乃叶禮於禳祈懿夫高祖建始福祿奚委禮用太牢名存漢氏皇家復位樂器是備異晉皇之配饗因南郊而道弛禮容盛兮在今時祀豐兮邁彼且夫與衆祈禱曷不稱嗟溥天之惠罔不休嘉豈比夫賈生弔屈空祀三閭之水漢皇幸蜀虛禱萬里之沙者哉是知我禮有肅苾祀不黷告農可以勸躬耕祀聖可以厲浮俗固宜不害三時方成九穀然後覩觀澤之禮承屆天之福庶憑之而多祜覩秋成於西陸循修隴樹兮掛劍於茲所以表徐君之所欲明季子之不欺予取予求昔藏心而可測一生一死終棄寶而如遺蓋烈士孤標之節而神明幽感之時當其昔結歡娛從容不阻孤鋒乍拔密坐之所彼眷眷於目擊此默默而心許諒他日而來思非伊人而誰與及夫歷聘上國言旋東吳訪舊友遵舊途亦當開寶匣獻鹿盧何閱水兮不待弔荒埏兮巳蕪由是執龍泉而慷慨望馬鬣而踟躕想間歲之披雲忽然而在撫今辰之切玉視之若無且曰器可謀新室寧欺暗解腰間之善結仰樹杪而延瞰乃脫白刃推赤心耀宿草之煌煌懸拱木之森森錯落金鐶疑夜月而生隴晶瑩霜鍔謂春冰之在林龍形蜿蜿而未化蛟枝亭亭而欲尋解佩義廣脫驂感深英聲遂騰於萬國善價不顧其千金嗚呼劍之擲也無前人之行也必果誠去彼而取此非祈君之祐我無宿諾匹之以庸庸不食言方之以璅璅向若蔑元壤恡青萍重提攜於掌握輕耿介於心靈則三尺之中空騰雲而漫漫重泉之下將愧色於冥冥無言者道之宏不約者信之大峻節卓以特立義風紛而繁會盛矣哉掛劍之名將萬古而不昧彼玉斗兮列乎太清此寶劍兮埋於豐城遙天式瞻諒闌干以成象厚地斯秘遂熠爚而騰精若非五山錯秀六合含英則何以下藏鋒於穎脫上作氣於貞明昔伊雷氏未占張公莫訪秘龍淵之奇彩射斗牛之異狀或雄雄於曲柄之末或冉冉於斗杓之上金陵之王氣莫齊函谷之紫氣應讓可大可久乃聖乃神嗟日月之逾邁怨土石之湮淪劍也氤氳連白榆與紫貝星焉昭晰應龜甲與龍鱗下埋照以煌煌上和光於歷歷何寶鍔兮斯隱在璇璣而必覿鋒惟切玉處玉匣以逾深氣則決雲每雲路而相射匪舍之則藏實闇然而章仰九霄而遊目知百鍊之雄鋩乍滅乍明有扶於佳氣若離若合更類於神光靈氣則浮利用猶鬱當繚繞而熒斗自表至珍儻陸離而佩身寧逢異物可以察三尺之滯淹可以見七星之沈潛石韞玉而騰輝未專其美鼎居汾而見氣徒有其占固宜仰層穹求外野延瞰於寰城之裏冥搜於古獄之下則可以論國都驅駿馬是知劍氣之在斗間所以求伸於知者彼神劍兮出昆吾之溪既成形而若水遂切玉以如泥玉則貞堅誠齟齬而難入劍惟銛利將脫穎而莫齊是以從心剖判應手提攜入水蒼之文乍同夫淬水破雞冠之赤且異乎割雞當其瑾瑜外來球琳畢萃磨而不磷用之不匱以藏乎密地出匣而宣利遊恢恢之刃瑕不掩瑜剖碌碌之形刃有餘地是知不貪其寶不愛其資苟作礪而斯驗將匿瑕而可遺異匵之毀焉斯為過矣同斗之撞也於以碎之璨彼瓊華煥如縷切匪流血以為害將凝肪而必截觸可磨之玷片片冰開縱不鈍之鋒重重瓦裂應機則斷投刃皆虛可以斷珪瓚可以判瓊琚雄雄兮化龍之後璨璨兮抵鵲之餘苟在鎔之金不慙於歐冶則指瑕之璧何愛於相如溫潤乍分陸離交燭於以慰良冶之志於以窒貪夫之慾耀鋩而赫奕六金律刃而熒煌五玉是知斯劍之用也按之無下直之無前以刜鐘之聲乍移水碧以擊柱之勢時入山元星文每臨夫韞石虹氣若斷於晴天然則干將所營風胡所徇或剸犀稱利或截鴻所進未若周王切玉之刃先賢鍊金鏡之英照懷寶之精寶之產兮逾秘鏡之瑩兮至明藏諸土中雖沈埋而可恨引於地表終錯落而皆呈將竭工巧灼爍堅貞以通幽為用以利物為情豈惟雕盤龍而耀彩鏤飛鵲而增榮若乃金玉方潛珠璣未出或山藪而埋照或土石而混質連城之價蔑聞照乘之光遂失雖卞和之欲獻我色猶深雖隋侯之見求我藏猶密然後玉匣啟銀華溢用物而不將不迎隨人而無固無必乃夜入榛蕪旁求瑾瑜冰彩前射月華正孤將善價而無隱與佳氣而相符在樓臺之中我用無展當藍田之下厥道斯殊遂使的皪珠色朗然合契皎潔瓊華洞然無翳時映山元之氣乍透菱花之際璞由是而成琢金因之而作礪是知鏡能融朗寶莫沈潛彼照膽而必徹此藏器而莫淹集璀璨之光鸞形乍合騰磨礱之色虹氣斯占固其涵清明之質體虛無之道滿堂由是而獲珍厚地詎聞乎藏寶豈比夫魏宮之所施秦臺之所持鑒鉛華之小者曷懷異而求之况有處幽沈戢光耀愧無不琢之質復仰無私之照王者崇招隱之禮作徵賢之車既斲輪而合度亦安蒲而用諸將使邱園共賁巖穴皆虛則必旌其重貺建此大輿輪合大規取邁而行陸蒲兼柔質取坐以安居罔覆其軌轍可歷於邱墟載以歸朝盡是漸鴻之翼駕而出野方隨繫鶴之書恒翹翹而隱隱諒求士之本歟若乃山騁異人林棲隱者鳥獸之㣥方雜薜蘿之衣未舍或屠釣而忘名或版築而在野恥戔戔之帛厥禮未崇笑孑孑之旌好善猶寡然後時主側席哲匠精研載脂載土巛冖牟既攻既堅蒲也採陂澤之叢有車之用輪也斲陰陽之木如日之圜檻檻兮出中朝之禮盛轔轔兮入外野而光宣於是經營草澤轥轢雲烟瞻其儀無虧乎翼翼聆其響且異乎闐闐可以出嘉遁之碩德可以載傲俗之遺賢空谷有駒自爾而方縶鳴臯者鶴假我而聞天豈猶邀申公於是日徵釣叟於昔年則知輪之設蒲巖扃是啟將毗王者之政先保賢人之體致萬里之安安成百僚之濟濟豈比夫織而為席表臧孫之不仁緝以成宮昭令尹之非禮方今雋巳在官輪猶未安旁搜叢桂遠綴幽蘭士不病於邁種賢盡出於峯巒是蒲輪之禮也乃王化之端而巳哉瑟彼乘石履於聖王每寒水而濯色俾堅容而有常當宸駕之未嚴貞姿或翳及天步而將踐麗質斯彰於是五輅載轄六龍齊首森天仗而既列嚴翠華而巳久隸僕乃言故實是諮舊章克守正取彼流惡滌茲含垢兢兢乎映金車而鞠躬翼翼兮汲銀瓶而運手發璀錯之色莓苔染之而不能注清泠之聲埃集之而何有皎爾鏡徹爛然冰鮮承玉趾而增麗拂衮衣而更妍磷磷於清淺之波自慚奪彩鑿鑿於激揚之水莫敢爭先匪琢匪磨不涅不磷求韞玉之色彰候和鸞之聲振成吾皇獻替之義我則如水之投叶吾皇啟沃之心我則如流之順四海是奉百禮所總茲石既潔一人由是而日輝茲石未晞萬騎不戒而雷動君惟展義官則庀司將滌瑕而蕩穢在挹彼而注茲於以昭卜征之候於以明望幸之期潺湲既臨似石磴瀉泉之狀流離欲散有山雲潤礎之姿有翼有嚴既敬既戒去淟涊之色由是砥平吐新鮮之輝用光時邁乘石之洗也列周經乘石之履也合周雅內可以訪道海內外可以觀風天下故曰有扁斯石見於王者魯恭王益宮於孔氏壞宅於闕里聞金石絲竹之聲有六律五音之美清泠始奏異洞庭之載張寂寞而來非鈞天之可視或管或磬以禋以祀徒在廟而見聽豈升堂而足擬當其攝齊而進拾級而前遠近猶惑鏗鏘始傳式感王心聘國無勞乎七十克諧聖域摳衣始化乎三千信不擊而不考實元之而又元惟金也振春容而無闕惟竹也象吹噓而未歇愔愔擊石如荷蕢之初聞杳杳揮絲疑孺悲之來謁所以表正聲之感所以同古樂之發遐想乎返魯之年追思乎在齊之月迴環棟宇繚繞庭除惟恍惟惚皦如繹如心方啟乃樂可依於固將極天而蟠地豈徒舞獸而躍魚徐疾有則清濁不忒非審以知政非作以崇德藏書之壁時繹繹而難分夢奠之楹乍洋洋而未測響雜乎鴻鵠韻調乎宮羽絲管不形簨簴無覩固可掩歌鐘於二四配莖英於三五及夫鏗爾樂闋油然思深覩奧且驚夫盈耳廣居由是而革心豈不以感上聖之旨聞至德之音哉皇家始崇儒禮莫先褒聖尊素王之號廣舊宅之敬儻逸韻之再聞播乎樂府之盛懿北極之寒勁有珍蠶之處冰非柔桑之是食非幽室之是憑託彼峩峩且不資於春煦抽其曳曳自有樂於陰凝既違燥而就濕知同類而殊能爾其元律窮芳歲暮百谷風壯㣥川冰固遊片片之凝光映重重之積素十畝之間兮洩洩何勞六尺之內兮涓涓正冱既苦寒而不倦將載績而是務觀夫如臨如履經之營之隔皚皚之積冰吐漠漠之輕絲朱綠曳而愈出黼黻成而是資煥乎有章豈寒女之能得超然獨處信夏蟲之所疑淋漓未泮組織方成非繰於盆非懸於井蠶事登矣必因之而剖冰繭稅求焉將取之而越境豈比夫風戾之所生歲單之所成蠶月而方育蠶器而見營安能苦其節履其貞窺之有戰戰之色取之有沖沖之聲匪依樹而遊奚感仙而化不筐而績奚假蠏為名宜乎海人見采堯帝斯呈伊蠢蠢之繁委實生生之殊詭鼠遊冰下我亦來思龜生火中吾乃異彼况乎雪霜是履鱗角多奇若解以東風或泉魚而共躍藏諸北陸幸凌人之見知宜乎含章勿改牽絲有待儻來獻於九重必相宣於五彩冽彼寒井契於聖王不因鑿以成質每自浪而呈祥涌呀呷鼓靈長比醴泉之自出異海水之不揚吾君是時清八區肅諸夏寶出於地符呈於野伊井有浪焉乃瑞之大者爾其呀豁百尋之表洶涌重泉之下狀靈濤之潛洩匪冽風之是假淪漣不盈觸搏恒驚窺坎穴臼之底有江湖之情積而有潤於下混而不傷其清窺則澄澄乍玉甃而同色汲之浩浩激銀瓶而有聲鮒飛鱗而不定羊在缶而皆傾洎夫列宿參差曉月韜映搖珠彩而增潔涌金波而轉淨湯湯下激不施屏翳之功洶洶潛驚詎假陽侯之詠然後駭四海之目垂兆人之慶伊厚地之發祥實大君之作聖彼青桐素綆之飾玉檻銀牀之盛皆人力之所成固神造之不競宜乎光瑞典苞坎德不藏於冰不蓄於墨惟波獨涌惟渫可食奉我皇之飲俾上善以為心戒我皇之窺必臨深以取則知井非浪不貴乎成質浪非井不彰乎聖日比井而王化其清比浪而王心不溢稽休明而合應將汲引而無失彼堯人鑿而飲漢將拜而出未足以彰其帝功而較其靈術者也網則結緒魚方躍泉其結也疎而不失其躍也瞻之在前一縱一橫既克張於萬目無小無大亦何逃於百川是以揚鬐振鬣噴沫飛涎初同求於發笱終取義於忘筌於是當巧孜孜杬精屑屑細緝絲枲解紛結絕想江湖之相忘遂綱維之備設搖赬尾以游泳爾不厭深運素手以繽紛我思善結俾晝作夜日居月諸成茲密網念彼嘉魚庖犧之舊制無改良之新規有餘獻鮮薧之時茲為謀始烹釜鬵之日此乃厥初且夫注目劬勞甘心健羡於結網兮何有徒噞喁而可見金盤既設無靃靃以霏霏錦質乍窺徒赫赫而戰戰孰若氣奪九罭網殊一面始結繩而援設終在藻而咸薦疎密由巳卷舒從心此紛紛而不紊彼潑潑而方禽亦何必不綱而為子釣斷而諫君臨其動則紛其力不費事有類於組織志未殊於經緯薦尾安在提綱尚未想飛鴻而則罹曷游魚兮不畏向若臨河廣恣心賞隨揭厲之淺深當鱗甲之來徃出彼嚇鰓亦同反掌營鱣鮪方同濊濊之施罛禁鯤鮞豈比恢恢之漏網則知無其備者其功畧有其具者其利博此不其經營彼無逃於潛躍夫然觸類斯長緣情可託結詩書而為網網則有條驅爵祿而為魚魚兮咸若吾所以考先賢之微言悟臨川之妄作有冽者泉生乎小鮮將成登俎之美必求爨鼎之妍惟烹也在於不撓惟魚也貴於克全苟司味之有術諒為政而則然若乃海曲蘆人江潭舟子厭頒首於蒲藻得纖鱗於沼沚常窺潎潎漏於密網之中今則炎炎烹於沸鼎之裏是以激之有度爛而足恥先明水火之濟用契鹽梅之理然後合沓有聲沸騰以烹碎文弱質萬品千名以剉脆之易壞當洶湧之方驚觸之則土崩可喻安之則錦質皆成蓋以小為貴在中和且平乃加以薑桂雜以薪燎同露鑊之白遊束前箸而不擾雖湯騰其內火烈其表惟自然於衆味終不亂於㣥小既薦尾而獲珍皆駢首而可曉向若爛之不恤撓之是刺急舒無節乎中躁靜不放乎外自然成魚餒而不食比水煩而不大空摧鱗而莫分寧去乙而知害則知國喻乎鼎人喻乎魚魚之亂則烹以靜人之繁則制以徐鼎中之咸若天下之晏如鮮之烹也不撓人之理兮作則將申老氏之戒用假庖人之職既不爽於和羹幸有光於為國
