front:
  text: 全唐文欽定全唐文卷九百九十闕名三十一
  hash: sha256:7b11fbda62ad4ccf8e89f47b2a23163ce0f3c18c84562407f40e9d26d8cfb9d5
body:
  text: 闕聖母心俞至言無闕疾冰釋遂奉上清之教旋登列聖之位仙階崇者靈感遠豐功邁者祥應速乃有真人劉君擁節乘麟降於庭內劉君名剛貴真也以聖母道應寶籙才合上仙授之祕符餌以珍藥遂神儀爽變膚骼纎妍脫異俗流鄙遠塵愛杜願初忿責我婦禮聖母翛然不經聽慮久之生訟至於幽圄拘同羑里倏闕霓裳仙駕降空卿雲臨戶顧召二女躡虛同升旭日初照聳身直上旌幢彩煥輝耀莫倫異樂殊香沒空方息康帝以為中興之瑞詔於其所置仙宮觀慶殊祥也因號曰東陵聖母家本廣陵仙於東土曰東陵焉二女俱升曰聖母焉邃宇既崇真儀麗設遠近歸赴傾匝江淮水旱札瘥無不禱請神貺昭茲人用大康姦盜之徒或未引咎則有青禽翔其廬上靈徵既降罪必斯獲閭井之間無隱慝焉自晉暨隋年將三百都鄙精奉車徒奔屬及煬帝東遷運終多忌苛禁道侶闕元元九聖丕承慕揚至道真宮祕府罔不旌建況靈蹤可訊道化在人雖蕪翳荒郊而奠禱雲集棟宇未復耆艾銜悲誰其興之具因碩德從叔父淮南節度觀察使禮部尚書闕監軍使太原郭公道冠方隅勳崇南服淮河既闕蒸氓作而不朽孛乎頌聲晉杜氏集解春秋其有關於魯史者附為後序今建莊之始即居士徐君導之置也以徐君有善亦剞之於石也君世居寺之後石橋橋路多墊溺乃議於鄰之左立君曰榮謂開通道路儒釋共緒欲展其利必無其跡況為鄉邑往返之大利哉太和六年春自前石橋趣後石橋達於所亡疑凡一百四十五步琢淩雲之石鎮積虛之土條堅質以界道較繩墨為地面功成也有若梅天澍雨落闕澗而驟傾臘雪凝冰等高岡而益固則智起二人跡垂永躅闕二字子闕十八字寶王如來有圓覺之闕十字無減而修以自性而闕二字神遇之闕十九字晉門寂住有感則通洛闕五字斯闕一字是以瑠璃正受闕一字色身而不闕一字如幻等闕一字無盡闕十二字者闕一字弟子右監門衞將軍闕四字事上闕一字國渤海郡開國公內供奉高力士闕六字將軍上柱國闕八字光祿大夫行內侍省內侍上柱國宏農郡開國公內供奉楊思勗中散大夫守闕五字上柱國內供奉闕八字內侍省內常侍內供奉闕一字思闕一字朝請大夫守內侍省內常侍內供奉趙闕三字仁闕七字李善闕四字夫行內侍省內給事內供奉闕二字岌馮闕一字翼蘇闕二字杜懷敬闕三字趙元闕四字夫行內侍闕四字監內供奉馬闕二字夏敬忠曹元德莫順之胡普寂范闕五字晏思忠闕二字賞內侍省內侍闕五字局令內供奉王闕一字歸馮闕二字劉義闕一字毛懷景徐仁闕一字陳闕四字溫孫仁闕七字王順景闕一字乾裕王承恩王惟闕四字吳明簡湛滿闕三字璧闕三字朱闕十一字董崇順李元亮郎武闕一字高承闕二字思敬梁思莊內侍省內闕二十一字隱闕一字崇闕一字駱思闕二字光憲王闕五字王義超劉頭兒闕十六字高闕二字輔仙通李齊珪闕一字文喜闕四字嘉泰內侍省內闕三字內闕十四字張闕二字張遺福陳崇息田鳳仙闕三字內侍省宮闈局給闕一字內供奉闕一字元會闕一字惠闕八字崇詡闕三字王庭隱劉令法張元滿趙處信鄭元光劉令仙高元光闕七字承闕六字慶呂元表楊思雅李惠訓李仁信闕二字靜等一百闕三字為大唐開元神武皇帝闕十三字同茲末法普賢神力尚遇全經思崇闕二字之闕一字冀闡仁王之化香巖寂想唯聞瞻闕一字之薰雪岫闕一字誠但為醍醐之味以為闕三字掩法壽賴而猶傳四塔雖幽靜根覩而非遠斯固剋雕成闕五字綵闕三字靈歸中道況崇山闕三字石方闕一字經火劫而闕二字歷風災而不至則無闕二字豈有動哉闕一字敢闕二字深心闕六字來闕四字衆闕二字善根敬造西方闕二字壽佛一鋪闕三字事以今敦牂之闕三字林鍾勝緣剋闕二字功闕一字畢十身潛暎百闕十八字天資始長膺北極之尊智地無疆永奉南山之壽聖胎闕二十八字寶闕二字方遇髻闕一字之賜廬峰遠契指安養而為闕一字靈山舊闕七字乃重宣闕一字義闕六字解脫之色如來之相法本無起闕八字誰為闕一字鄣道闕十九字圖茲寶王依佛闕一字而成國用無對而闕一字光庶齊闕九字光闕二字歸唐闕一字右散騎常侍英髦驤闕五字皆以稽古徵言留心儒素或登華第更高拔闕一字之名又戰闕一字堂每中甲科之的雖云流陝居戎而不墜箕裘暫闕五字猶次將軍之列子既承恩鳳闕父乃擢處貂蟬朱門不媿於五侯樹㦸崇隆於貴族至於源分特秀門繼簪裾家承九錫之枝流派祥雲之允時遭西陲汨沒闕二字至德年中十郡土崩殄絕玉關之路闕十字凡二甲子運偶大中之初中興啟運闕十一字是金星耀芒之歲皇化溥洽通乎八紘遐占雪山帛丿糸邈萬里府君春秋纔方弱冠文藝卓犖進止規常迥然獨秀時則妻父河西隴右一十一州節度管內觀察處置營田支度等使金紫光祿大夫特進食邑二千戶實封三百戶賜紫金魚袋南陽張公諱義潮慕公之高望藉公之文武於是乃為秦晉遂申伉儷之儀將奉承祧世祚潘楊之美公其時也始蒙表薦因依獻捷親拜彤庭宣宗臨軒闕二字所以公具家諜面奏玉階上亦沖融破顏㣥公愕視乃從別勅授涼州司馬檢校國子祭酒兼御史中丞賜紫金魚袋錫金銀寶貝詔命陪臣乃歸戎幕闕二字餘載河右麾戈拔幟抉囊龍韜盡展克復神鳥而一戎衣殄勍寇於河蘭馘獯戎於瀚海加以隴頭霧卷金河泯湍瀨之波蒲海水鯨流沙㢮列烽之患復天家闕二字孫致唐堯之壽域晏如也百城闕四字無拜井之虞十郡豐登吏士賀來蘇之政此乃三槐神異百辟稀功英雄半千名流萬古公又累蒙朝獎恩渥日深方佩隼闕一字用堅磐石勳猷未闕一字俄已云七享齡五十有二終於燉煌之私第亡叔僧妙弁在蕃以行高才峻遠邇瞻依名達戎王贊普追召特留在內兼假臨壇供奉闕七字持談柄海辯吞流恩洽燉煌庇庥家井高僧寶月取以為儔僧叡餘蹤扇於河隴亡妣汜氏太夫人龍沙鼎鼐盛族孤標庭訓而保子謀孫軌範而承家建業清資不闕一字薦累代而揚名閥閱聯帛丿糸闕六字今乃逝矣佳譽存焉故府君贈右散騎常侍生前遇三邊無警四人有暇於東皋命駕闕九字傾誠謁先人之寶剎迴顧粉壁念疇昔之遺蹤瞻禮玉豪歎紅樓之半側豈使林風透闥埃塵寶座之前峗嶺陽烏曝露荼毗之所嶝道之南復有當家三窟今亦重修巨金華石闕一字籀存焉於是乃募良工訪其梓貿材運斧百堵俄成魯國班輸親臨勝境雲霞大谿寶砌崇墉未及星環斯構矗立雕簷化闕一字巍峩不讓於龍宮懸閣重軒闕四字於日際其功大矣筆何宣哉亡兄河西節度衙推兼監察御史明達天與孤貞松筠比節懷文挾武有張賓之策謀破敵擒奸得玉堂之闕一字術曾朝絳闕敷奏金鑾指畫山川盡縱橫於天險闕十字兄明德任沙州錄事參軍操持吏理六曹無阿黨之言深避四知闕七字切慕乘鷗之咏闕六字兄明詮燉煌處士今古滿懷灑落卿雲之闕二字先効義光騰矞露之文五柳閒居慕逍遙於莊老闕十字夫人南陽郡君張氏即河西萬戶侯太保張公第十四之女溫和雅暢淑德令聞深遵陶母之仁至切齊眉之操先君歸覲不得同赴於京華外族流連闕一字各分飛於南北於是兄亡弟喪社稷傾淪假手託孤幾辛勤於苟免闕十字所賴太保神靈奪恩勦斃重光嗣子再整遺闕一字雖手剏大功而心全棄致見機取勝不以為懷乃義立姪男秉持旄鉞總兵戎於舊府樹勳績於新墀內外肅清秋毫屏迹慶豐山踴呈瑞色於朱軒陳霸動容歎闕三字壯室四方嚮義信結鄰羌運籌不愧於梓橦貞烈豈慚於世婦間生神異成太保之徽猷雖處閨門實丈夫之闕二字然心悟道闕一字併棄樊籠巡禮仙巖願圖闕二字於是闕十字頓捨青鳧市紫金於上國解瓔珞棄珠珍銷金鈿於廊廡運虛士冖䂞於庭際乃得玉豪朗耀光衝有頂之峯寶相發輝直抵大羅之所長男使持節沙州諸軍闕二字沙州刺史兼節度副使檢校右散騎常侍御史大夫上柱國宏愿輔唐憂國政立祥風忠孝頗懇於君親禮讓靡忘於伯闕一字六條布化千里隨車人歌來暮之闕二字紹龔黃之績次男使持節州刺史墨離軍押蕃落等使兼御史大夫宏定文武全材英雄賈勇晉昌要險能布頗牧之威巨野大荒屏盪匈奴之迹挾纊闕三字士卒泯燧不愧於襄陽闕十字都河自注神知有道之君積貯萬廂東郡著雕金之好闕十一字次男使持節甘州刺史兼御史中丞上柱國宏諫飛馳拔拒唯慶忌而難儔闕三字楊非由基而莫比洎分符於張掖亡恤惸孤布皇化於專城懸魚發詠次男朝議郎前守左神武軍長史兼侍御史宏益三端俱備六藝精通工書有闕五字札連芳於射㦸闕二字特達文雅闕二字於是豐年大稔星使西臨親抵燉煌頒宣聖旨內常侍闕六字玉裕闕二字克珣副師大夫稱齊闕四字大夫闕一字忠回偕闕五字密梓材遐耀天威呈祥塞表因鑿樂石共紀太平余所不闕二字然狂簡旃檀瑞像者梵能仁之相也泊乎夏昇忉利示初生七日之儀優聖至因病目連攝彼匠工以紫旃檀詣善法堂雕寫金容而歸下土聖王誠篤固多嘉應通感傳云如來韜隱四百年有羅漢號優樓質那於此應土大間鑿五龕室置金玉瑠璃白銀旃檀等五從下止上如次安之其下四像光明爍目人所不覩旃檀像隨緣致敬世或多見自爾復三百年有羅漢名柰遮以目上生龜茲國出家為泥尊者於第五龕取旃檀像運神足力馳奉先母報恩供養母後命盡復生揚州於長樂出家尊者復馳彼像送闕一字樂迦藍闕一字有揚州旃檀像焉由是神州盛仰華夏咸崇傾竭家緣雕鐫繼闕大同中殷氏捨第之所建也帛丿糸歷星紀寧無廢興及乾符初復再飾構烟嵐闕於崗巒麋鹿盈於林谷晨警闕梵喧空掌合登臨信生遊憩僧多古貌衆闕耆年具薝蔔林實苾蒭草通德圓潔像闕周嚴所闕歸依唯闕瑞像矣有當院彥威大德戒闕芳聲性出諠譁情孤物表願雕聖像竊契沖襟當庚子歲十一月乃運素誠將興妙闕曩箱之有次聞共好之人即安闕指揮闕尚書首創助緣召其郢手鐫刻聖像百闕莊嚴闕辛丑中夏裝繪畢手因法姪紹興員話及殊緣尚虧闕殿遂同竭資金經營粹宇善闕應契闕扶旋有檀那亦吳郡陸敬詢捨錢十萬以助棟梁福崇母親潘氏冀增椿算奇闕書不七八年像殿俱畢約其費用逾百萬金殿矗神功像嚴天相鯨梁暉煥闕貌花同闕一字奉獻有似寶偕迎禮頂手親摩導利茲方終古不朽不銘時闕功威闕以故交面命斯作匪言著述但錄端倪闕盡鄙詞仍勒為頌云爾闕之興優填剏首無學報恩東夏爰有化洽天人雕鐫繼重分布靈儀神州欣踊既陽之右光瑛梵宮唯茲巨事信所未崇厥有盛德傾竭資緣掄選梓命匠雕鐫然募有力吳郡諸陸共罄精誠同營斯福或保休和或延壽域勳績既隆功庸靡極殿矗烟嵐簷凝翠靄銅山百萬無作恒在闕一字有傾缺此善無朽勒之真珉天長地久界曰娑婆劫名賢善釋闕十七字晉儒風大扇文動闤中之闕十六字紫文皆戛玉武盡闕一字金為闕十六字書堂師之高闕一字也師有弟諱道闕十四字投師龍興巾瓶執事苦心幹節諷誦闕十二字爾後住寺法雲緇徒覺觀名揚上國位極闕十字當其第一補以科名闕一字錄奏聞闕三字崇闕九字衣盂好行惠施甲辰光啟闕二字饑民闕四字屢闕七字之功師捨壹伯伍拾萬金於寺西南隅主公莊闕一字國闕六字作窀窆之所朝昏夜月春來而松檟颼飀闕五字起闕五字晨鐘夜角課誦無閒漏永更闌心闕一字十利闕三字濟闕四字月比高墻塹緇門笙篁柱礎師孫五人義闕一字義修義澄義闕一字義闕一字節操冰霜終而復始師之法宏也化無有盡穢境潛拋俗年九十有闕一字不寧迴入禪扉凭於几案止於申後淨土果圓俄爾緣終闕二字異闕二字於茲山淚掩門人心摧徒衆同悲增信共泣人神是以表旌方闕二字師之終也方陳劫石用記紀綱奉命直書闕一字為銘曰出俗愛厂田坴永拋業緣不住闕一字宅便廾連帛丿糸旋歸舊址請住法雲院號大悲止今有文吳祖建寺選名秤平奏聞金闕請在大明性便布施不顧衣盂未省愛憎豐盈四衢有為不住逡速何苦故立往生園留今古浮圖巧妙地久天長稜層顯煥崢嶸難量矧夫地水火風不能壞有為之迹胎卵溼化盡能成無漏之因是知業力大而須彌靡堅蓮花生而淤泥本穢三災互起寄他界以難留十地未圓作飛狸而不暇若非自無量劫悟無明源依佛修行承佛付囑者孰能證三乘而超六道者也梓州牛頭山瑞聖寺者即棲真導俗之福地也勢連獸角形聳牛頭江上遙窺雲葉捧蓬萊之島天邊乍見日輪光兜率之宮殿堂庨豁以干霄林麓森羅而蔽陸清波下瞰鳴桹皆般若之舟古木傍生擢幹盡菩提之樹土暖而春光預到山高而月色先來講闢虛堂則龍王聽法供陳廣殿則天女獻花人間之士庶喧闐願瞻寶相物外之烟霞噴薄別是仙都洎乎金人告滅於西郊白馬騰裝於東道爰於勝地漸起良緣菩薩出家掩禪關於樹下羅漢住世憩虎錫於巖間焚修而齋戒益精示現而祺祥甚衆禪定之外住持是勤所以化十善之人歸四方之衆金從地布何須長者之園飯自天來不假維摩之室香花飲食既無其闕行住坐臥各得其宜星歲屢遷軌範彌峻於戲刀州作鎮劍棧分壇諸葛亮龍起以聿來止開二世公孫述蛙藏而自困何蔽一身鼈靈將帝而屍浮杜宇已王而鳥化過關興歎李特空謂其下材布野請降譙周猶稱其上策覆車相繼屈指可談蓋以僻陋不足振宏綱高深不足成遠馭既車可懸而馬可策則江可越而山可逾苟驗斯言足徵終古爾來封圻或梗戈㦸仍災縣道塵飛縱橫猛士邑居星散狼籍僵屍惟斯鷲嶺之僧不爽龍華之會豈不謂善惡趣異聖凡境殊者哉今我后以清淨撫四夷以富壽期百姓配天合德見上帝於泰壇者三括地守圖獻偽君於藳街者二別九州而既分風土疏五等而用進才能恒命庶官未聞輕受今知府左屯衞將軍武昌郡史公福兵馬都監閤門舍人瑯琊郡王公睿闢公侯之門負將相之器褰帷教俗共贊國風弭節訓戎各傳家法通判太子洗馬太原郡王公延範搉鹽太子洗馬清河郡張公守則以禮樂詩書為已任以致君治國為身謀玉壘公方暫勞利刀丶瑤階步武自有亨途寺衆朗義大師賜紫僧知遠等皆能拔煩惱根修清淨果十二時內六和既契於威儀三千界中八部咸思於衞助靈也捧天子詔乘使者車題柱相如聊攄夙志銘關張載願寫壯心偷閑曾謁於蕭齋摭實粗編其梵行用刊貞石俾永萬年庶幾乎大厦連甍豈讓頭陀之寺郡峯對麓寧慚峴首之山濡筆一揮復為銘曰峩峩牛頭蟠據而起拂漢萬劫結根千里聖賢所宅棟宇斯備傳彼永年稱為福地林蘿掩映兮煙靄飛山峯曲屈兮薇蕨肥土靈木魅兮願為衞冰心玉行兮憺以歸寂寂苔徑侁侁毳衣何早夜以無懈俾香花而弗違堯舜御圖龔黃作鎮次命端士各宣餘刀丶美化斯洽慈風益振曷道德以交舉冀乾坤兮共盡西蜀分命東山是登降龍舊像放鶴新僧念險固以難恃知慈悲之可憑勒銘於斯巖庶終古以作徵昔漢魏君臨窮兵用武興師十萬日費千金猶尚北勒闐顏東村不到大唐牢籠六合道冠百王文德所加溥天同附是故身毒諸國道俗歸誠皇帝愍其忠款遐軫聖慮乃命使人朝散大夫行衞尉寺丞上護軍李義表副使前融州黃水縣令王元榮等二十二人巡撫其國遂至摩訶菩提寺其寺所菩提樹下金剛之座賢劫千佛並於中成道觀嚴飾相好具若真容靈塔淨地巧窮天外此乃曠代所未見史籍所未詳皇帝遠振鴻風光華道樹爰命使人屆斯瞻仰此絕代之盛事不朽之神功如何寢默詠歌不傳金石者也乃為銘曰大唐撫運膺圖壽昌化行六合威稜八荒身毒稽顙道俗來王爰發明使瞻斯道場金剛之座千佛代居尊容相好彌勒規模靈塔壯麗道樹扶疎歷劫不朽神力焉如蓋聞龍躍天衢必藉風雲之力聖人膺運亦待將帥之功闕一字萬石闕二字於闕三字霍馳聲於強闕一字其能繼闕三字者惟在劉將軍乎君名仁願字士元雕陰大斌人也闕一字土開家闕二字建旟於東國分茅錫壤王孫投節於北疆三楚盛其衣簪六郡稱其軒冕本枝奕葉可畧而言高祖闕三字常侍闕二字遠將軍闕一字州大中正彭城穆公屬魏室不綱爾朱陵虐東京闕一字喪闕二字西遷陪奉鑾輿從居關內尋除鎮北大將軍持節都督河北諸軍事綏州刺史因官食闕一字仍闕一字居闕七字北州之望曾祖平鎮北大將軍朔方郡守綏州刺史上開府儀同三司襲爵彭城郡開國公祖懿周驃騎大將軍儀同三司隨使持節綏州諸軍事綏州總管闕一字州刺史雕陰郡開國公父大俱皇朝使持節因綏二州總管廿四州諸軍事綏州刺史尋遷都督左武衞將軍右驍衞大將軍勝夏二州道行軍總管冠軍大將軍鎮軍大將軍上柱國別封闕一字城郡開國公並桂馥蘭芬金貞玉潤名高大樹譽闕一字詞林珪璋閥閱見於斯矣君稟慶河闕一字資靈嶽瀆牆宇凝峻孝敬日躋命偶昌期逢時遇主欽明啟運光宇普天太宗文皇帝乃聖乃神乃文乃武并吞六合席卷八荒博訪㣥材用康大夏英髦特達幽顯必臻君以地蔭膏腴門承勳業令問之舉僉議攸歸起家為宏文館學士闕四字衞闕八字旅力闕一字健膽氣過人嘗從出遊手格猛獸太宗深歎異之特加賞賜即降恩詔入仗內供奉貞觀十九年太宗親馭六軍省方遼碣千乘雷動萬馬雲屯闕五字邇闕一字集下高麗賊臣蓋蘇文獨生攜貳鳩聚亡命招納姦回囚其君長舉兵稱亂闕二字蟻闕一字敢抗王師皇赫斯怒龔行弔伐兵鋒所到若火闕三字其闕一字東蓋牟闕三字一城闕二字匡闕一字新城安地等三陣虜其大將延壽惠真俘其甲卒一十六萬君身預戎旃日奉覊靮前茅後殿每陣先登摧強陷堅同於拉朽戰勝攻取揮闕四字賜物乘馬一匹銀闕六字弓二張大箭三百隻並是供奉御仗特加褎異遼東還累前後戰勳超拜上柱國別闕一字黎陽縣開國公擢授右武衞鳳鳴府左果毅都尉壓領闕四字門長上廿一年任行軍子總管隨英國公李勣經畧延陀并迎接車鼻安撫九姓鐵勒行還改授右闕二字郎將依舊闕一字朝供奉廿二年又任子總管向遼東經畧闕二字事除名其年更授右武衞闕一字通府左果毅都尉廿三年太宗宮車晏駕宗廟社稷不可一日無闕一字儲皇諒闇纂戎繼極周邦雖舊厥政惟新凡百庶寮勉修其職君以勇畧見知材明被用未踰闕二字又蒙今上驅使永徽二年更入䥫勒撫闕一字行闕三字勅簡折衝果毅強明堪統領者隨機處分君受闕一字經畧頻度遼東五年授蔥山道行軍子總管隨盧國公程知節討闕一字賀魯行還從幸洛陽顯慶元年遷左驍衞郎將二年應詔闕一字文武高第升進三階復命䥫勒安撫四年入吐谷渾及吐茠宣勞五年授嵎夷道行軍子總管隨邢國公蘇定方破百濟執其王扶餘義慈并太子隆及佐闕二字率以下七百餘人自外首領古魯都大秦武進扶餘生受延爾普羅等並見機而作立功歸順或入走闕一字闕或闕四字合境遺黎安堵如舊設官分職各有司存即以君為都護兼知留鎮新羅王金春秋亦遣少子闕一字泰同域固守雖夷夏有殊長幼懸隔君綏和接待恩若弟兄功業克就蓋由於闕一字然闕一字周武平殷商奄闕一字叛漢定西域疏勒被圍餘風未殄人懷草竊蠻陌之俗易動難安況北方逋寇元來未附既見雕戈東邁錦纜西浮妖孽侏張仍圖反逆即有偽僧道琛偽將率鬼室福信出自閭巷為其魁首招集狂狡堡據任存蜂屯蝟起彌山滿谷假名闕二字並號將軍隳城破邑漸入中部堙井刊木壞宅焚廬所過殘滅畧無遺噍凶威既闕一字人皆脅從布柵連營攻圍留鎮雲梯俯瞰闕十一字落闕二字連戰朝夕闕十三字然高枕不與爭鋒堅甲利兵闕二字其弊賊等曠日持久力竭氣衰君乃陰行間諜際其卒墮搆下闕若夫三空凝寂至道之理難窮四諦沖元真如之宗莫測闕解猶述闕一字喪之津千葉高尻未靜輪迴之闕一字至若毒風闕或究有象自闕一字乍闕無生法忍闕一字非理心闕三字慧闕一字於闕慈福巳辜於既往是以花臺珤塔孰有想於知歸舟闕迷復使靈功永著者其孰能尚於津梁乎闕一字割牛溝壞石闕以要盟之代南北為爭長之途市義之闕二字西作送迎之闕人馬駢闐驛傳闕一字郵停驂駐軾斯橋所主蓋始於茲代序闕以闕一字邱移壑變刊創莫知義跡元功徽音不嗣我大唐闕太平乘龍地輔駕象闕二字道闕二字元仁流下闕一字五神入侍闕檢玉云亭鏘金岱嶽乾封元年二月南巡龍輿戒此以闕直東津棧木為梁既聖迹神行不敢湮廢以證聖元年闕葺爾闕一字地闕一字前臨廣闕一字炎精曜魄之場去負蕃郊維周卜闕磬闕二字湍闕二字而流音左帶闕一字巖石暎霞而照錦實聖賢闕之闕二字者焉有清信士王寶詮朱元英韓宏澤朱元獎闕之莫報知罔極之難追爰發菩提共崇斯果恐高岸為谷闕地闕一字人闕一字敬刊貞石冀騰名於萬古庶千齡而不易迺為銘曰闕昧三空妙闕一字鶴林隱駕龍宮祕識閱此輪迴孰知其極闕有闕四字劬三途日墜肇建闕一字梁闕一字崇遐慤恐波遷闕維大唐開元二十一年歲次壬申舅甥修其舊好同為一家往日貞觀十年初通和好遠降文成公主入蕃巳後景龍二年重為婚媾金城公主因茲降蕃自此以來萬事休帖間者邊吏不謹互有侵軼越在遐荒因之隔閡今遵永舊咸與維新帝式藏用不違厥旨因以示赤嶺之外其所定邊界一依舊定為封守為羅斥候通關梁大矣哉皇天無私惟聖作乂故違聖者逆也所以降雷霆之威率聖者順也所以漸雲雨之施休咎之理順逆之繇若斯之明矣昔先帝含宏愛主從聘所以一內外之禮等華夷之觀通朝覲之往來成舅甥之宴好則我先帝之德不可忘也頃者州之役宥而不討者蓋捨之先迷而歸之畜復夫恃安則逸逸則棄禮棄禮則忘信忘信者暴蔑之心生也故春秋時人忘盟誓之典有如日有如河我之今日罔不稽古幽蕃臣魁渠實曰警戒無或背淳德習凶梗侵擾我河湟窺視我亭障無或恣業驚馳咆哮剽掠我牛馬蹂踐我農穡漢家軍領亦不得兵馬相侵我家用不掩襲爾城守覆墜爾師徒壅塞爾道路烟滅爾部落不以兵強而害義不以為利而棄言則我無爾詐爾無我虞信也司慎盟㣥祀莫不聽命然後定正朔宜百福偕爾命祚泱泱乎仁壽之風矣休哉法尚一正無二正之極爾惟修代好彌永年忠於人則信於神俾我唐受無疆之福爾亦荷有永之謀用懷爾遠人不寶爾遠物至聖之仁也銘曰言念舊好義不忒兮道路無壅烽燧息兮指河為誓子孫億兮有渝其誠神明殛兮闕十三字德乃昭闕二字而闕三十字上公用之漢帝降而闕十七字而闕四字丹臺而遊紫府闕十九字神仙闕四字能修苟能修之何遠之有師闕十一字曰闕一字原縣縣西闕一字一十五里闕二字曰永寧鄉闕十字尤殊仙才特異闕一字歲闕二字尊師學道方通衆妙之門卅闕七字盡十闕四字四闕二字中宗大和大聖大昭孝皇帝初闕九字於闕一字名永仙闕五字紀星月以登壇步乾坤而入闕一字金丹易闕一字將闕二字世之津木闕二字魂巳得養生闕十二字不墜闕二字猶闕一字雖江闕一字海濶無闕四字智能地久天長有盡却先於闕三字邑舊俗多闕五字至道悟闕十四字之有闕二字此此生無滅徒竭精念闕三字知逍遙不闕一字於谷神寂寞永闕一字於山鬼吁闕一字悲哉尊師愍之曰豈有思其闕三字忘其闕二字將闕九字氣象遂闕一字於仁里闕一字開祕訣闕一字演元言舉手一招迷途知復曩之大笑者莫不勤而行之闕四字何其盛也則知陽闕三字寒谷得闕十八字天寶二載五月廿三日從人之願鬱起仙宮審曲面勢左陵右邑自卯而闕三字發及酉而百堵齊闕三字山積良不闕七字旅闕二字候時而作不日而成元宗至道大聖大明孝皇帝賜額曰永仙觀崇闕一字去望隔簷而青翠盈襟太華斜看出戶而闕四字則闕二字廣殿涌出修闕二字門闕八字虹梁雲楣綺疏蹲熊伏兔蟠螭躍魚自尊師厥初既而桂闕二字山闕三字谷槐移儒市杏擿仙林闕七字請真君之宅海闕一字湘闕一字朱闕一字紫闕一字異藥千品名花萬類庶春華之可採豈秋實之無望雖固在生成亦爰資樹植穿畦種子汲井澆根昔闕七字七寶閒闕一字三珠闕二字覆院垂闕三字列背緇成帷翠成蓋當畏景赩赫而清陰霮䨴繄尊師是賴夫人者滋味闕三字之所養也闕一字則害身故闕九字淫而生疾若宮商失節甘闕一字逾度始雖慆心堙耳終乃腐腸伐性至於風飄雨溼明思晦惑闕一字未傷腹為闕一字為瘵而脈分三部意闕一字多方有闕六字而愈之者有宜以言辭解釋而愈之者有宜以消息導引而愈之者有宜以針灸湯藥而愈之者皆闕六字之則沉痼既已除膏肓無所闕八字劣五藏六府四支百節均令不寒調令不熱此尊師妙絕亦有時朝拜或終日閒安開太上闕五字華之奧旨四時闕二字知無為而闕七字物可齊了非馬以喻已馬之非馬有無雙遣彼我俱忘欲使尚薄浮華業敦清淨則釋闕六字稽首請益伏膺待告分剖凝滯發闕七字不到實尊師善導粵有道門使檢校殿中監沖虛申先生志高詎抑道邃難名偏闕十一字奏尊師為四方妙選領兩縣闕五字聲自宮聞扃闕一字而詔從天落闕一字於闕三字以光榮乃抑與之也豈求之也初上元歲大兵闕三字蠶失事五穀不登天降凶災人受凍餒尊師乃闕三字食以待闕一字者凡所蒙活數逾千計於是縉紳處士孝廉秀才先後闕二字左衞胃曹參軍金闕四字府兵曹參軍田視等卅八人皆鄉邑髦彥河山孕闕七字曹闕一字僉曰尊師德行可稱將傳不朽頃國家多難遂因循累歲闕一字未遑刊勒而常有闕一字焉闕一字我寶應元聖文武皇帝闕四字立功中書令汾陽王子儀平章事兵部尚書闕四字中書侍郎元公載黃門侍郎王公縉光闕五字京兆尹于公闕一字兩闕一字尹闕二字公闕一字于公闕四字府邑宰闕一字公闕一字主簿陸公闕四字公平陳公審闕一字洽闕四字以道化令行闕四字古干戈載戢闕一字㝢攸寧夫然故㣥英賴闕二十字式建豐碑於昭闕一字行闕三字南陽三絕有闕九字無媿林宗闕一字為頌曰大闕一字太上三清闕九字宮闕二字往闕一字鶴馭來沖闕二字有盡壽命無窮修以闕十六字適性全生盡理代識闕四字甲士闕一字名乎哉闕一字名闕一字矣闕六字放兮闕一字渭北闕八字滅法罕闕二字術闕九字青天闕二字白日指引迷途闕四字乃闕十五字植闕一字木珍闕五字結實闕九字大闕四字救有方闕二字無玷俞扁思齊施周闕十九字徽猷播闕四字金陵之南惟宣州其地吳楚其星分牛宿繚以㣥山帶以洪流薛公光華使臣藩屏諸侯揚君之美分帝之憂日往月來於茲九秋大歷十有四年今上纂先聖敷新命任賢為政得人尤盛帝曰汝邕秉心不回予嘉厥才擢汝委汝糾正於仙臺秋七月拜命迺發於是官僚緇黃之倫介冑市井之人如霧斯集如山斯立或捧觴而進或瞻途而泣豈非惠加於物物感於惠者乎公字沖味殷相仲虺之洪族唐相元超之曾孫陳留太守兼採訪使江童之仲子地列鐘鼎門傳冠葢文藻暐煜於一時名聲震動乎千載穆考之位公能嗣焉列祖之職公當陟焉傳所謂公侯之子孫必復其始者此也且岑君為魏郡輿人歌之則薛公為宣城吏人頌之不亦宜乎其詞云星之煌煌山之崇崇茲惟宣城實賴薛公拔賢任能如鵷如鴻整師訓兵如羆如熊勸農殖穀百穀年豐通商鬻貨萬貨雲叢闡道都會敦儒泮宮遏絕寇賊賑䘏孤窮乃新廨署肅然清風乃復津橋赫然長虹乃立水門川路其通乃建林亭賓筵其充日緝庶務歲成衆功況我薛公清襟湜湜雅操翼翼支郡承式鄰邦取則明明天子降鑒㣥方詔謂薛公茂學雕章孝悌忠良累踐柱史累登臺郎司言中書掌禮太常四典歲舉擷其衆芳三執邦憲振其宏綱銓綜九流九流既臧鎮撫三州三州既康遷爾管轄於此文昌公拜稽首歸於咸陽邦人有言大川茫茫福浸我疆我願薛公公階翱翔我思薛公永世滂洋爰來作歌以配甘棠闕三字郎行闕二字都督府功曹參軍闕王之經始萬國平章闕岳之闕及闕三字之刺永闕一字又闕之闕一字姓闕二字間闕三字乎佩玉釦金闕一字代闕西遷濟州萊闕三字背闕一字不顧淮南之師闕同闕開國公食邑五百戶闕二字忠武曾祖陵幼負雄闕三字祖闕公闕雍容闕一字文雅闕二字道入朝闕一字欲闕一字以文闕一字之任闕平壽公闕二字達闕三字從闕三字舍人華州華陰縣令長岑住闕夜闕尚書虞部員外郎出為州長史器闕一字中闕一字神用闕主闕致醇醴邦族榮之公則簡州長史之第二子也闕一字骨不闕四字異俗闕三字度闕之座暗闕一字通家過蔡邕之門遙聞倒屣聲華藉甚朝野闕州司功參軍事州廢改授華州司倉參軍事戶役闕三字甲茲鴻漸闕而闕鑾輿順動將幸離宮乃先授公岐州扶風縣令公闕四字顏下矜闕異政聞恩勅加公朝散大夫雍州奉天縣令屬大聖皇后闕拜安國相王府諮議參軍事俄遷尚書比部郎中朝辭蘭苑夕趣芸閣闕州洛陽縣令闕一字滿親勳里徧豪貴萬方都會之邑百賈駢羅之所公冰鏡照人闕之未直坐堂無訟近巷有歌久之下制曰洛陽縣令唐闕二字理闕一字精密幹能闕持節萊州諸軍事萊州刺史公拜受王命長驅海服亦既下車即敷惠理訓闕學行務農桑闕一字四壁之孤貧資其食業變一出之闕二字勸以淳和設法而惡子革心闕數多徵剝尤切公審知難辦表請延期遂得物免流離人銳耕闕一字風雨調順禾闕一字盈闕四字之惠也加闕從於私門闕一字紛爭於公室不然官燭但飲吳水文翁之臨蜀郡曷足可稱闕二字之牧闕一字川闕國家妙擇人英樹之司牧貪官黠吏闕一字以澄清特制加公通議大夫使持節闕三品所管州刺史有犯停務奏聞長史以下便令解任仍令馳驛赴職合闕臥途不遂吳郡之牽留伯道擁舳何追乃相與言闕三字易闕四字久頌下闕唐之闕一字姓物難稱者國自堯封家分周社世戴英彥同傳闕貽厥闕睢園夕遊璅問海岱難理委之闕一字未下車敷化威動神行闕城俗闕歲遽聞闕一字牧念彼何親奪我何速闕一字子懷戀臥途興哭翠琬下闕
