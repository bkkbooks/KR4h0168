front:
  text: 全唐文欽定全唐文卷二百四十四李嶠三
  hash: sha256:c29c74cf5a8cfab9fd61f6d1623d567bc90dc202b982868ede028a782d3c7348
body:
  text: 臣某言伏奉恩制以臣為鳳閣侍郎同鳳閣鸞臺平章事恩寵光臨獎飾踰分虔荷明命營魂失守臣某中謝臣學非儒墨術異商韓文乏斧藻藝慚刀筆屬乾坤貞觀日月光輝飛龍在天而庶物咸覩仙兔離畢而㣥萌皆潤遂得封植樗散謬齒於翹薪翦拂駑駘濫陪於逸驥驟荷私遇頻階榮擢入參丹閣出擁彤騶爰自海邦遂升河輦佩若若之綬騖轔轔之轂叨恩竊幸空變星霜尸祿妨官曾微報效宜受素餐之責翻成黃閣之榮夕拜瑣闈朝陪禁省敢希任先淑睿之美每憂王歆謬誤之失而天慈逾渥聖澤無涯爰回斗極之暉更寵掖垣之授下神畿而入仙禁未變葭灰自鸞渚而遊鳳池僅雕蓂葉荀侯之十旬纍命未可為儔車公之同日九遷曾無足比既超倫而邁等實負愧而承羞臣亦何人敢叨非據況樞祕之重絲綸是職言參元化步入紫微臣蒲柳既秋桑榆漸迫耄期云及衰疾徂侵以日昳之歌當夜行之罪招愆獲謗非為身謀敗駕傾餗將貽國負蓋力周於用則輕重咸宜任過其材知巨細同躓伏願察臣知止之分矜臣自量之情杲乎出日回三舍之光油然作雲垂九霄之澤曲收過謬改命才賢則維鵜之譏不起於輿誦振鷺之詠復聞於朝序無任悚懼之至謹詣朝堂奉表以聞所讓人別狀封進臣某誠惶誠恐頓首頓首死罪死罪謹言臣某言臣由衷之祈巳具前奏而不次之澤仍垂後恩俯仰慚懼莫知啓處臣某誠惶誠恐頓首頓首死罪死罪臣爰從壯齒不逮儕流況在耄期曾何志力嗟負鼎之無術患挈瓶而屢空徒以慶雲垂津枯稿蒙澤杲日流煦嚴霜不凋貪及聖明之辰願從簪屨之列僶俯榮祿推遷歲時豈忘陳力之言方致乞骸之請不謂聖慈回眷天造曲成東膠尚賢未始澄汰西伯養老更垂優渥拔迹囂滓之曹假寵神仙之署二離齊景八舍連芳款段涉千里之途輪囷為萬乘之器龍池沐髮始暢前榮鳳沼躍鱗旋叨後命顧茲疲朽理絶琢磨在方圓而罕施顧長短而無取豈可以仍塵帝載纍紊國經使身貽鼎覆之憂朝失棟隆之舉是用內慙外懼夕惕晨興輕薦本誠敢謝非飾伏乞矜臣難奪之志體臣不移之愚特停過恩改命賢哲則濟濟之詠復聞於聖朝洋洋之美不專於曩載無任慚懼之至謹重詣朝堂奉表以聞臣某言伏奉恩制命臣同鳳閣鸞臺平章事受命祗懼載驚魂爽臣執柔誠惶誠恐頓首頓首死罪死罪臣聞任官擇人哲王之所不易陳力審分忠臣之所宜守固當使寵私路絶公直道行然後能謗讟不興緝熙有寄臣材非上達地則外姻攀日月之末光承雨露之餘渥遂得持衡天闕攝職斗樞塵八座之政本忝三軍之戎務高秩厚位徒辱於庸虛弱霧輕埃竟微於答效盤桓寵祿僶俯歲時甘受維鵜之刺寧懷振鷺之舉而聖慈無巳天造彌隆復使參掌國鈞預聞執政撫已慚悸捫心震越夫以衡石萬機鹽梅三鉉參翕闢之元造輔丹青之景化自非媵莘占渭出昴乘箕安可寅亮帝圖弼諧邦教臣之蒙蔽久塵聽覽豈足以傍允物情上回天鑒承舟楫之遠託當股肱之重寄伏願暫停旒纊俯擇芻蕘搜訪才良用平分之道屏絶私昵收曲成之惠則域中多幸天下至公豈惟匪服免譏臣無器滿之懼固亦得賢斯在朝有棟隆之吉無任慚悚之至謹詣朝堂奉表以聞臣某言伏奉恩旨令臣同鳳閣鸞臺平章事有命自天光寵踰量如集於木啓處失圖臣嶠誠惶誠恐頓首頓首死罪死罪臣聞賢任能百揆所以時敘謬官失職九流於是咸曠隆替所寄義不可輕臣才實凡庸志無遠大叨預竹替履遂升臺閣踐金門而遊石室掌狐史而參鳳綸被蜉蝣之衣徒竊榮寵接鴛鷺之羽久慙尸曠甘受妨賢之責忽承非次之恩仍使參預機衡獻替帷幄持濟巨之舟楫味和羹之醯醢以挈瓶之智陪負鼎之遊將何以祗奉帝難弼亮皇極況丹青所運鼓舞通於四時爐錘所裁綱紀行於萬俗動關政體豈易其人臣才闕行踈藝殫術淺同子房之多病異吳漢之強力策支離之杖未振其軀資擁腫之材豈勝其任將恐貽災傾餗取辱敗軍喪實虧名夫豈足惜害公撓法茲焉是懼敢緣陳力之義輕布由衷之請伏冀九霄垂澤三舍回光體臣不移之愚矜臣難奪之志特停過謬改命才賢則器滿之凶不纍於凡鄙棟隆之吉永光於聖代無任慚懼屏營之至謹詣朝堂奉表陳讓以聞臣某言伏奉恩制以臣為鸞臺侍郎依舊同鸞臺鳳閣平章事兼修國史仰祗聖澤退揆愚衷周章失圖怵惕惟厲臣某誠惶誠恐頓首頓首死罪死罪臣聞疇德而援則尸曠之譏絶推恩而舉則緝熙之道廢臣志狹量淺業空理踈揆才異言行之科入仕非廉高之選邀屬時幸纍叨榮級石渠麟閣司典籍之林金門鳳池參廟堂之議以小才而居大任用近智而恢遠略緣鶴之鼎既失於鹽梅濡鵜之衣實慚於紱冕甘待素餐之責忽承非次之恩夫以瑣闥崇嚴玉堂祕近職參持蓋位亞掌壺子雲以善屬文詞始應夕拜李真以妙通經術方陪旦講臣之愚陋實畏友朋豈足以奉帷幄之昌言聯名賢之逸軌且短才不齒未減雙鳬之數豐秩妄加必喪㣥龍之績陛下經緯品物搜揚管庫方使道風德範遠出帝先豈令敗政妨官近自臣始伏願俯收人望顧惜朝班特回寵光改命賢俊則百工寅亮長無鼎覆之憂二階砥平自有棟隆之吉無任感戴屏營之至謹詣朝堂奉表陳請以聞其所讓人具如別狀臣某誠惶誠恐頓首頓首死罪死罪謹言臣某言臣短辭易窮愚意難達雖由衷之訴纍黷於清規而臨下之明未照於丹懇伏奉還旨更優前命心魂交悸啓處失圖臣某誠惶誠恐頓首頓首死罪死罪竊惟服勤致用事主之名節推誠納忠為臣之職分凡列衣冠之序忝升教義之筵立身揚名孰不由此況臣沐浴盛化被服隆恩陪萬乘之旌旃列四臣之禦侮犬馬立效雖未堪申防代勞鷹鸇有情豈敢忘除凶弭慝論削蒲之釁逆舉觸瑟之祅變蓋惟恆事豈足言功陛下録臣謏才收臣薄藝以某纓組舊業頗聞於義方山林遠情粗間於道術訪其隱仙之訣求其詩禮之對不行而至坐辭麋鹿之㣥無翼而飛遂接鴛鴻之侶久慙粉米之飾欲辭稻粱之惠日來月往猶戀於軒墀雨施雲行亟回於印綬今復更申殊獎追敘微庸以臣子之恆情辱公卿之顯位等威齊乎四履名器光於五臺縟禮崇徽頓榮於非據深憂巨惕更切於如臨夫不失賞刑先王所以撫中外大明黜陟前典所以正邦家中麋豹之侯僅堪封爵乏羔羊之節無階流品乃賢哲之所慎豈庸微之敢安是用仰辭渥恩俯誓肌骨寧甘於犯違朝憲不可以虧損帝難固守不移之愚庶全難奪之志伏冀南離回耀微察於傾心北斗垂芒稍矜於走魄特停過謬曲賜優容使官謗不喧工歌有序則無私之覆彌大於九元至公之途永隆於萬國無任忝竊慙懼屏營之至謹重詣朝堂奉表固請以聞臣某言伏奉恩制以臣為江州刺史寵命載臨憂惕若厲臣某誠惶誠恐頓首頓首死罪死罪臣行踈道缺學淺藝空百里絃歌鮮蒲密之化六條贊二乏海沂之績幸屬乾坤改旦堯舜為君下邑多淳朴之氓太平無峻切之政遂得逾安高秩未抵直繩尚且叨價藩庭竊譽人口挂二星之光彩達九皋於霄漢畫餅虛名孰云可録素餐厚責猶懼未弭不謂聖恩旁暢天造曲成錫大官之印綬剖專城之符竹飲冰懷炭內慙外悚況夏首西浮水陸交湊荊門東會舳艫相接是謂九江之府實殷三楚之郊旋顧庸虛本慙斡理將何以階浮獸之政術奉錫龜之職貢負乘之纍豈但於身災敗駕之憂慮虧於國重臣雖貪冒苟且進趨至於上負帝難下速官謗猶知恐懼不敢寢默伏願回光三舍收霈九天徵漢濱之翹楚罷燕宮之緹襲則共理之寄無蹇於外臺得賢之什復聞於中扆無任悚慙之至謹詣朝堂奉表以聞謹言臣某言臣謬延殊獎改牧大藩由中之訴已薦於宸扆恤下之鑒未回於霄極祗奉還命啓處失圖臣某誠惶誠恐頓首頓首死罪死罪臣地則葭莩質惟樗散實慙淮南好古之意有謝東平為善之樂徒以攀光日月藉慶雲霄遂得升降玉除珮服金璽四科取士本異賢良五等建侯自緣恩澤常懼貽纍宗室取笑衣冠上缺麟趾之風下招鵜翼之刺不謂聖慈愈厚天造彌隆收其十舍之才委以六條之任雖臻榮益觀竊抃於如絲而謬職妨賢顧慙於匪服況神皋名嶽天府上腴是殷帝畿實始王化東則二南作頌有周召之餘風西則三輔式歌望趙張之遺迹顧循庸昧本慙政理將何以肅應殊典崇藩屏之位繼踵前良致京師之福不能者止竊銘於夙心非據必危敢忘於大誡伏願暫紆聖鑒俯收愚款永懷至公之道特寢曲私之澤則符竹有寄長無尸素之譏槱薪得才不失朝廷之序無任慙懼之至謹重詣朝堂奉表陳請以聞臣某言伏奉恩制以臣為潤州刺史祗奉寵榮俯仰慙惕臣某誠惶誠恐頓首頓首死罪死罪臣尺澤輕生斗筲淺品行非三德藝乏四科屬雲雨曲成山川廣納遂得差肩冕笏簉羽鴛鷺自兼司天地副象河海空陪九卿之末詎達三禮之源柏梁賦詩徒述鍾磬槐市講藝更慙几杖當曰妨賢獲罪豈以稱職為功而皇矣高臨霈然降澤乃為棘寺還剖竹符入奉千乘之尊出當六條之寄叨恩竊幸自初洎末夫以下邑樹風是惟政本外臺驅傳實總人極薛宣以理劇有才滿歲加授龔遂以撥繁無效數月召還歷選前猷實資共理安可使赤紱虛忝素餐高詠伏願敦名器之實絶過謬之私更良才言刈其楚則山谷耆老方懷樹李之觀江湖吏人不起伐檀之刺無任悚懼之至謹詣朝堂奉表以聞臣所讓人具如別狀臣某誠惶誠恐頓首頓首死罪死罪謹言臣景諶言伏奉恩制以臣為天官尚書寵命載臨震悸交集鞠躬自靦屏營無措臣景諶誠惶誠恐頓首頓首死罪死罪臣聞俊乂在官百揆所以時敘名器妄假九流於是咸曠事關隆替義難忝越臣才踈行缺學淺智空十舍無千里之資一經乏三冬之敏徒以遭逢昌運因藉時來幸雨露之曲成遇山川之廣納遂得差肩冕笏比迹流品出入臺省周旋階闥鏘金鳴王坐榮枯朽擊水摶風顧慙腹背自忝司衡鏡亟易星灰雖智力巳窮而清通未效朱紫多紊涇渭莫辨宜其抵罪觸網稍清官謗翻乃假寵增服更垂天獎是用荷恩內訟以榮為憂且夫八座位隆五曹望重典南宮之喉舌象北斗之樞機式資藻鑑奚綜賓實自非孝先亮直彥輔公忠山濤之靜篤素顧談之心精體密何以對揚天哲厭塞人望顧斯政本實總國彞豈臣庸愚所堪尸忝伏願回光寢照返汗收恩察臣由衷之請矜臣陳力之議則朝端允穆天下至公四始輟在梁之譏六爻無負乘之纍矣無任慙懼之至謹詣朝堂奉表以聞其所讓人具如別狀臣景諶誠惶誠恐頓首頓首死罪死罪謹言臣某言伏奉制旨以臣為地官尚書無涯之恩忽降霄極非據之惕坐驚魂宇臣某誠惶誠恐頓首頓首死罪死罪臣少無奇志長乏異能短步非疾於驊騮翾飛自同於燕雀逢聖神之再造屬天地之兼容鄭璞齊竽竊混聲價秦冠漢綬叨踐名級步鴛池之清切陟鸞渚之便蕃出入五臺周旋三閣行膺負璽之任遂服專車之寵萬機損益蔽於庸陋之心百揆謨猷滯於膏肓之疾爰發皇揆特留宸眷假優間之秩雖入杏壇參翊亮之謀尚和梅鼎徒延舟楫之舉竟微股肱之效挈瓶之智患在於空虛瞰室之災懼深於盈滿方陳骸骨之情遽荷雲霄之命負乘之責前謗未除忝越之譏後恩仍及還振蜉蝣之羽欲參龍鳳之行赤紱妨賢物知不可素食得位臣亦胡顏況八座樞機五曹要劇上儀七星之象旁理萬邦之教自非元凱之明允忠肅陳韓之敦朴淳深將何以釐正版圖擾安邦國臣之淺狹誠則貪叨朝有典章敢叨疑非望伏乞回乾坤之曲澤收雨露之殊私廣訪訏謨詳求棫朴更引食場之彥俾臨均土之司則受任得才無愆振鷺之美官方有序不失貫魚之次無任慙悚之至謹詣朝堂奉表陳請以聞臣所讓人別狀封進臣某誠惶誠恐頓首頓首謹言臣通言伏奉恩制以臣為夏官尚書非常之恩忽萃庸朽顧匪服而增靦奉如絲而自失臣通中謝臣聞思皇多士必求於俊乂惟帝念功不寄於庸保臣識量凡淺志業空廢乏刀筆之吏能無俎豆之經術徒以積勞為忝久宦成資承日月之末光霑雨露之宏貸丈二之組每慙於假竊尺一之制更獎於庸微俯仰慙惶屏營反側夫以天臺峻密帝猷殷曠端揆隆於八座樞衡總於萬機非夫賢才孰能綜理況周官司馬有甲兵之職漢服珥貂兼喉舌之任歷觀前載此選尤難安可以樗櫟散才瓶筲小器比德陳劍差蹤鄭履豈無慙於謬寵實有懼於妨官今聖歷惟新王化資始天工其代帝難所急伏願特寢過恩旁求實用塞多幸之路開至公之道則巨鱗縱壑朝有得賢之頌惟鵜在梁臣無濫官之責無任慙懼之至謹詣朝闕奉表陳請以聞臣執柔言伏奉恩制以臣為夏官尚書光寵載臨震悸交集臣某誠惶誠恐頓首頓首死罪死罪臣學無所成志不及遠徒以憑託霄漢接南陽之近親感會風雲附西京之外戚遂得叨恩藉幸服冕乘軒將燕雀而同化共鸞鳳而並翼自升榮軒闥接武卿士徒參河海之象竟乏涓塵之效竊位妨賢自甘屏黜循涯揣分敢希超獎而聖造不資天波纍洽仍降非常之澤更申踰等之命豈非連芳八座上比七星固亦分職五曹專司九法昔虞登百揆命喉舌之官晉庶僚崇元凱之秩自時厥後此選尤難自非宿望通才高賢舊德何以別邦國之大典膺腹心之重寄臣尸忝無成實彰於既往朽劣不逮難冀於將來雖輸報有心而勉勵無術寧敢自安時謗屢玷國猷陛下綜理機衡搜擇才俊而至公之道未廣於翹薪則哲之明近謬於庸菲恐人物解體衣冠失望伏乞暫回沖鑒俯絶過恩更宏尚德之舉不失能官之授則濟濟庶寮自有悅於多士區區庸鄙儻無譏於人不任慙懼之至謹詣朝堂奉表以聞謹言臣通言臣受恩怖懼巳薦款誠而還旨綢繆未垂矜亮俯仰局蹐心魂震蕩臣通誠惶誠恐頓首頓首死罪死罪臣學藝雙缺心迹兩蕪顧常接言友朋而信未盈缶陳力官守而智罕挈瓶徒以沐道康衢餐和休歷四方無事逢聖后之垂衣百度已貞得庸夫之高枕幸承寬大遂安忝竊本將榮利求達不以廉隅自修厚祿尊官雅是所溺陳辭抗疏豈敢為高誠以理苟未安義則不可何者器有劑限物有局量當其才則事或能濟踰其分則力所不堪是以枯木朽株不荷棟梁之任謏聞曲學不為廊廟之資臣妨賢自久竊位非今然自承乏具寮叨榮散職雖云尸忝未甚隳廢至於典司邦禮出納王言徒飭躬而自強終絶臏而無力汝作霖雨既非庸妄所堪臣為股肱必致陰陽之失虧名損實匪顧身疵蠹政傷風將辱朝鑒誠為貪冒豈敢自安伏願回日月之明收雲霄之澤察臣由衷之請矜臣知止之分則周廟之器無懼於盈滿曹人之衣或免於譏刺無任慙懼屏營之至謹詣朝堂奉表以聞臣通誠惶誠恐頓首頓首死罪死罪臣重規言伏奉今月十五日制書加臣中大夫兼司禮卿寵命光臨心靈隕越臣重規中謝臣聞量能而官往聖垂範無德而祿昔賢有誡陛下施物之平不私毫髮知人之鑒獨謬庸虛但禮秩之職歷選所難苟非得賢於何求化西京置一十二列首貫金吾東漢有三十九人多遷玉鉉妙擇時望將以洽神祇博採列侯所謂重宗廟桓榮之經學始展今恩孫通之禮儀方膺此命在臣無取遠謝古人將何以載元冕之七旒驅素車之十乘臣之慊慊非欲自保其身臣之慺慺深慮上塵於國伏乞聖恩容納皇澤霑濡深惟得人傍授能者則天官無曠庶績其凝謹封所讓人狀如前不任慙懼屏營之至臣神基言伏奉恩制以臣為司賓卿芝渙曲臨獎飾踰分蓬心回蕩冰炭交集臣神基誠惶誠恐頓首頓首死罪死罪臣才實凡庸志無遠大徒以命偶時來餐和飲澤纍叨恩遇浸成榮顯遂得出擁朱軒入陪紫蓋被服圭組周旋階闥自謬司六尚承乏九賓星琯驟移塵露無紀每懷忌滿之誡實負曠官之責寧可以更奉殊徽重叨非據當象河之顯列處惟月之崇班陛下刻象雕金焚山榜道維駒在詠異人並出無容使芳蕙為草舀疑康瓠成寶伏乞天哲改擇人望則尚德之舉無纍於翹薪匪服之譏不塵於列棘無任慙悚之至謹詣朝堂奉表以聞臣某言臣叨承睿澤冒陳愚懇而九重再達三舍不回鞠躬慙惶莫知啓處臣誠惶誠恐頓首頓首死罪死罪臣自惟寡薄何階榮遇徒以山林舊籍有感聖慈葭莩末戚特延宸獎遂得升朝列位服冕乘軒平視公卿奄同七貴坐登霄漢非因六翮自兼司喉舌副掌樞衡百姓不親徒承在寬之訓萬機都曠終替責成之舉期獲戾於妨官敢邀榮於賜秩而甘露時雨不遺於溥泛尊官厚祿更集於庸虛仍令入總巨卿出毗藩牧顧匪材於樗櫟空愧梓人方假職於襜帷多慚竹使夫以渚宮作鎮旁兼水陸營室致功上儀星象自非馬延年之勤苦羊叔子之恩惠何以撫茲千里按彼百工陛下義不斷恩遂忘濯龍之誡微臣寵深增懼敢冒濡鵜之譏況今天地開元聖神改物四方拭目而觀化九流褰裳而願仕而則哲之鑒未獎於翹薪至公之心近謬於凡菲將恐開親昵之多幸失衣冠之雅望小人淺見偶識自量匹夫雖微敢守難奪伏乞俯停過謬更擇良能則出門同人更釋于宗之吝側席思彥不乏登壇之寶無任慙懼之至謹重詣朝堂奉表以聞謹言臣遺恕言伏奉恩制以臣為殿中少監奉命荒越不知啓處臣某中謝臣行忤神祇身積釁咎偷延苫枲自甘隕越陛下忘其尪陋牽以縶維仰號上昊俯蹐下土精誠無感三舍不回志節莫修九泉未即遂復肅膺紫紱權就墨縗俯首官寺靦顏朝序自攝職天臺慙要之目徙秩京輦乏仁明之政銓管無滯多謝昔賢枹鼓不鳴實愧前烈空尸厚祿坐積時謗不謂天光下濟聖慈曲覽重延殊獎更超顯位司六尚之嚴凝望九重之清切懷恩揆拙既懼且慚但臣下棄情禮上虧答效孝不足稱忠無可紀永惟家國實負君親將何以安其尸忝暴之視聽伏乞暫回沖戀少察懇誠不虧聖朝之鑒無重愚臣之罪則涵育有方官序無替無任哀悚之至謹詣朝堂奉表以聞臣某言伏奉恩制以臣為殿中監兼檢校仗內諸間廏逾涯之恩忽降霄極非據之惕坐驚魂宇臣某誠惶誠恐頓首頓首死罪死罪臣本乏才藝素無操植徒因緒業獲齒簪裾屬兩曜重光三靈再造登山捧日始會於風雲涉海窺天遂攀於星漢位非德進榮以恩升出捧鸞鑣驂玉輿之式道入陪鳳扆預金門之通籍扈清切之嚴衛接綢繆之宴私邱山之恩徒謝成貸絲髮之效竟知無補加以兼烏竊幸假鳳連棲兄弟分侍於閫闈甥舅齊迹於樞祕光榮被於九族寵遇傾於百寮是以常誡滿盈亟慚尸素叔寶之遇武子雖願輸忠正禮之對公山惟憂曠職常思高明之瞰室無懼平路之傾輈豈謂天道不資聖慈逾厚仍降非常之澤重紆加等之命妨賢受任多慚於鴛鷺之㣥匪服叨榮實愧於蜉蝣之羽竊惟先王慎擇不進於凡庸明主虛求務延於才俊伏乞傍羅杞梓更詢棫朴必取九能秀傑方為御府之臣無使五技輕姿謬處七間之任自然六尚增價七騶無忝納於百揆終無廢事之譏賓於四門必有得人之頌無任慙懼屏營之至謹詣朝堂奉表陳謝以聞謹言臣嶠言伏奉制書以臣為麟臺少監依舊兼修國史仍知鳳閣舍人制閣事仰戴私恩退揆愚陋手足知舞心魂載惕臣嶠誠惶誠恐頓首頓首死罪死罪臣一經莫守五技不成宮牆易窺俎豆無術陽和布德枯朽同榮雷霆發音閉蟄俱起用叨時幸遂歷清階含香握蘭惟塵於兩鳬之署切問近對匪服於雙鸞之沼西垣載筆五字非工東觀屬詞兩班難嗣空抱支離之疾坐招尸素之譏惟此挈瓶有同畫餅豈足以比肩良史參領祕文猶陪二子之行尚忝四郎之末網羅帝籍既佇英才出納王言寧容妄處陛下搜賢擇善責實循名程才畢入於準繩適用不差於輪桷伏願特回鑒揆俯察愚蒙深惟帝難妙人才則尚德之舉寧謬於鴛池妨賢之談不起於麟閣無任忝竊慚悚之至謹詣朝堂奉表陳請以聞臣所讓人別狀封進臣嶠誠惶誠恐頓首頓首死罪死罪謹言臣嶠言伏奉恩制以臣為成均祭酒對揚鴻休揣摩褊量獎飾踰分周惶增惕臣誠惶誠恐頓首頓首死罪死罪臣才不應務命實偶時非親非賢奉帷幄之侍無藝無術備鹽梅之臣排金門而上玉堂步鴛閣而遊鸞沼抱支離之沈涸曠密勿之繁機六翮不任但慚於腹背四支巳頓空請於骸體分辭榮於瑣闥仍藉寵於環林顧非席上之珍敢辱淹中之賞況東序蟻學稱為教化之宮西膠虎門實應文章之宿論姬孔之制度談夏商之損益方期遺典墜業有可發明豈伊曲學謏聞所堪尸忝伏望俯停庸瘵改命耆儒則授几肆筵還知入廟之禮褒衣博帶不濡在梁之翼無任忝竊慚惶之至謹詣朝堂奉表陳讓以聞臣所讓人具如別狀臣嶠誠惶誠恐頓首頓首死罪死罪謹言臣嶠言伏奉今月二十四日制書除臣成均祭酒同鳳閣鸞臺三品餘並如故列星皎日曲垂鑒揆膏雨油雲傍灑渥澤承命如失負恩不勝臣嶠中謝臣本諸生階緣常調幼趨詩禮才學修身長習文章罕能經國徒以淹年曠日積勤纍勞無翼而偶摩霄不材而參構厦往逢人乏濫荷天聽預聞政事莫近主益尋而犬馬私疾頗至虛羸螻蟻殘生俯蒙含育矜其不逮備以間司臣獲從容稍似強健復屬皇慈不巳聖獎彌勤始接貂蟬更追龍鳳機務填委昏情戰兢風勞霧氣曉迫宵煎因此疲羸慮成廢曠所以每求清間輒事陳乞竊望優遊散輩沐浴淳源豈晤大造弗遺殊榮纍及玷代天之列躡教胄之行且祭酒之榮有道之選往年巳知不可今者何宜重遊伏乞特寢嚴汗改命長才非敢欲逃身責深恐有紊國經由衷精誠惟聖矜納無任懇迫慙荷之至謹詣朝堂奉表陳讓以聞其所讓人別狀封進臣某言臣頻布款誠庶蒙矜遂而由衷之請空竭於肝膽臨下之鑒未察於庸愚集木非兢臨泉罔懼臣某誠惶誠恐頓首頓首死罪死罪臣歷窺前志詳考舊聞莫不以有道興邦家不才替社稷漢武帝網羅㣥士惟佇俊賢周成王訓迪庶官不求庸保臣行能近淺識性凡陋難化之質非八音所陶不移之愚豈六藝能飾往緣戚屬叨奉恩私遂得地列齊封門開魯館承敦敘於九族被徽章於五等今光華始旦品物維新三代典章理遵於舊式二京恩澤宜革於權制方就散秩之輩幸沾朝請之流寧可以冒踐槐庭更增茅土況班彞錫瑞執揆提衡法垂象於三台視隆班於四瀆實司邦教是曰藩維豈臣餘喘殘生所合尸忝非臣荒情菲質所宜叨據陛下懸旌訪逸刻象求才朝有白駒之賢野無黃犢之彥方使思皇多士必明於至公豈令棫朴能官近廢於親昵臣自審量實所不堪蔀屋之災豈惟於身咎折鼎之責方貽於國患伏冀回光斂靄寢紱收綸察臣不移之心矜臣非飾之請特停過誤改命才良則白馬丹書不慚於異姓和羹作礪不逮於凡庸無任慚懼屏營之至謹重詣朝堂奉表陳請以聞臣攸暨言伏奉恩制命臣兼知司禮寺事臣本無操履素乏藝能憑藉葭莩遂叨冕笏畫龍刻鵠非有天才簪犀紐龜但因地勢鑒空虛微眇之質驗庸暗不逮之姿素神衷豈勞銓敘幸得攀光日月藉寵侯王祿比萬鍾爵窮五等備梁園之車服司周室之典經朝夕起居出入陪奉在生多幸於臣巳足豈可重叨非據更竊隆班上虧國章下速身謗昔漢疇稷嗣將冠九響虞升伯夷實掌三禮奉蒸嘗祈祀之典有匏土笙鏞之節匪徒移風易俗兼且尊天事神豈於凡庸所可參議況此司禮分職見有二卿並在官聯事且無缺更參駑蹇之足徒亂鴛鴻之序伏乞聖慈回鑒天造曲成矜其慊切之心念其尸曠之責怡然俯察霈乎垂許則至公之道實宏於聖朝多幸之災不纍於凡識無任慚懼屏營之至謹詣朝堂奉表以聞
