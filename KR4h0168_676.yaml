front:
  text: 全唐文欽定全唐文卷六百七十六白居易二十一
  hash: sha256:9beae8f7a16b912ca2248ce48200810f77ab2f1077a525546d215b16ee5c722a
body:
  text: 自武德以來庶官以便宜制事大攝小重侵輕郡守之職總於諸侯帥郡佐之職移於部從事故自五大都督府至於上中下郡司馬之事盡去唯員與俸在凡內外文武官左遷右移者遞居之凡執役事上與給事於省寺軍府者遙署之凡仕久資高耄昏軟弱不任事而時不忍棄者實蒞之蒞之者進不課其能退不殿其不能才不才一也若有人蓄器貯用急於兼濟者居之雖一日不樂若有人養志忘名安於獨善者處之雖終身無悶官不官繫乎時也適不適在乎人也江州左匡廬右江湖土高氣清富有佳境刺史守土臣不可遠觀遊㣥吏執事官不敢自暇佚惟司馬綽綽可以從容於山水詩酒間由是郡南樓山北樓水湓亭百花亭風篁石巖瀑布廬宮源潭洞東西二林寺泉石松雪司馬盡有之矣苟有志於吏隱者捨此官何求焉案唐典上州司馬秩五品歲廩數百石月俸六七萬官足以庇身食足以給家州民康非司馬功郡政壞非司馬罪無言責無事憂噫為國謀則尸素之尤蠧者為身謀則祿仕之優穩者豫佐是郡行四年矣其心休休如一日二日何哉識時知命而已又安知後之司馬不有與吾同志者乎因書所得以告來者時元和十三年七月八日記匡廬奇秀甲天下山山北峯曰香爐峯北寺曰遺愛寺介峯寺間其境勝絶又甲廬山元和十一年秋太原人白樂天見而愛之若遠行客過故鄉戀戀不能去因面峯腋寺作為草堂明年春草堂成三間兩柱二室四牖廣袤豐殺一稱心力洞北戶來陰風防徂暑也敞南甍納陽日虞祁寒也木斫而已不加丹墻圬而已不加白墄階用石冪窗用紙竹簾紵幃率稱是焉堂中設木榻四素屏二漆琴一張儒道佛書各三兩卷樂天既來為主仰觀山俯聽泉傍睨竹樹雲石自辰及酉應接不暇俄而物誘氣隨外適內和一宿體寧再宿心恬三宿後頽然嗒然不知其然而然自問其故答曰是居也前有平地輪廣十丈中有平臺半平地臺南有方池倍平臺環池多山竹野卉池中生白蓮白魚又南抵石澗夾澗有古松老杉大僅十人圍高不知幾百尺修柯戛雲低枝拂潭如幢豎如蓋張如龍蛇走松下多灌叢蘿蔦葉蔓駢織承翳日月光不到地盛夏風氣如八九月時下鋪白石為出入道堂北五步據層崖積石嵌空垤塊雜木異草蓋覆其上緑陰蒙蒙朱實離離不識其名四時一色又有飛泉植茗就以烹燀好事者見可以永日堂東有瀑布水懸三尺瀉階隅落石渠昏曉如練色夜中如環珮琴築聲堂西倚北崖右趾以剖竹架空引崖上泉脈分線懸自簷注砌纍纍如貫珠霏微如雨露滴瀝飄灑隨風遠去其四傍耳目杖屨可及者春有錦繡谷花夏有石門澗雲秋有虎溪月冬有爐峯雪陰晴顯晦昏旦含吐千變萬狀不可殫紀覼縷而言故云甲廬山者噫凡人豐一屋華一簣而起居其間尚不免有驕矜之態今我為是物主物至致知各以類至又安得不外適內和體寧心恬哉昔永遠宗雷輩十八人同入此山老死不反去我千載我知其心以是哉矧豫自思從幼逮老若白屋若朱門凡所止雖一日二日輒覆簣土為臺聚拳石為山環斗水為池其喜山水病癖如此一旦蹇剝來佐江郡郡守以優容撫我廬山以靈勝待我是天與我時地與我所卒獲所好又何以求焉尚以冗員所羈餘纍未盡或往或來未遑寧處待豫異日弟妹婚嫁畢司馬歲秩滿出處行止得以自遂則必左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言時三月二十七日始居新堂四月九日與河南元集虛范陽張允中南陽張深之東西二林寺長老湊公朗滿晦堅等凡二十有二人具齋施茶果以落之因為草堂記民非政不乂政非官不舉官非署不立是三者相為用故古君子有雖一日必葺其墻屋者以是哉許昌縣居梁鄭陳蔡間要路由於斯當建中貞元之際大軍聚於斯兵殘其民火焚其邑大田生荊棘官舍為煨燼乘其弊而為政作事者其難乎去年春叔父自徐州士曹掾選署厥邑令於是約己以清白納人以簡直立事以強毅以清白故官吏不敢侵於民以簡直故獄訟不得留於庭以強毅故軍鎮不能干於縣由是居二年民用康政用暇乃曰儲蓄邦之本命先營囷倉又曰公署吏所寧命次圖廳事取材於土物取工於子來取時於農隙然後豐約量其力廣狹稱其位儉不至陋壯不至驕庇身無燥濕之憂視事有朝夕之利官由是而立政由是而舉民由是而乂建一物而三事成其孰不韙之哉嗚呼吾家世以清簡垂為貽燕之訓叔父奉而行之不敢失墜小子舉而書之亦無愧辭若其官邑之省置風物之有亡田賦之上下蓋存乎圖諜此略而不書今但記新廳之時制與叔父作為之所由也先是邑居不修屋壁無紀前賢姓字湮泯無聞而今而後請居厥位者編其年月名氏自叔父始時貞元十九年冬十一月一日記竹似賢何哉竹本固固以樹德君子見其本則思善建不拔者竹性直直以立身君子見其性則思中立不倚者竹心空空以體道君子見其心則思應用虛受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者夫如是故君子人多樹之為庭實焉貞元十九年春居易以拔萃選及第授校書郎始於長安求假居處得常樂里故關相國私第之東亭而處之明日履及於亭之東南隅見叢竹於斯枝葉殄瘁無聲無色詢於關氏之老則曰此相國之手植者自相國捐館他人假居繇是筐篚者斬焉篲帚者刈焉刑餘之材長無尋焉數無百焉又有凡草木雜生其中菶茸薈鬱有無竹之心焉居易惜其嘗經長者之手而見賤俗人之目翦棄若是本性猶存乃芟蘙薈除糞壤疏其間封其下不終日而畢於是日出有清陰風來有清聲依依然欣欣然若有情於感遇也嗟乎竹植物也於人何有哉以其有似於賢而人愛惜之封植之况其真賢者乎然則竹之於草木猶賢之於衆庶嗚呼竹不能自異惟人異之賢不能自異惟用賢者異之故作養竹記書於亭之壁以貽其後之居斯者亦欲以聞於今之用賢者云元和初江西觀察使韋君丹於廬山東林寺神運殿左甘露壇右建修多羅藏一所土木丹漆之外飾以多寶相好嚴麗鄰諸鬼功雖兩都四方或未前見一切經典盡在於內蓋釋宮之天祿石渠也初藏既成南東北廊亦具獨西未作而韋君薨逮今十餘年風日所飄燥雪雨所霑濕西南一隅壞有日矣僧坊衆惜之豫亦惜之非不是圖財力不足暨十三年豫作景雲律師塔碑成景雲弟子饋絹百匹豫以法施淨財義不已有即日移用作藏西廊因請寺長老演公滿公琳公等經之寺綱維令杲靈達等成之蓋欲護前功償始願非任於布施相功德心也其集經名數與創藏由緣詳於李肇碑文此但書新作西廊而已十四年月日忠州刺史白居易記浮圖教有茶毗威儀事具涅盤經陀羅尼門有佛頂呪功德事具尊勝經經文甚詳此記不載今但載大師僧行佛事與建幢義趣而已大師姓吉號智如絳郡正平人自孩及童不飲酒不茹葷不食肉不兒戲年十二授經於僧皎二十二受具戒於僧晤學四分律於曇濬律師通楞伽思益心要於法凝大師貞元中寺舉省選纍補昭成敬愛等五寺開法臨壇大德繇是行寖高名寖重僧尼輩請以聖善寺敕置法寶嚴持院處之居十年而法供無虛日律講無虛月使疑者信惰者勤增上慢者退僧風驟變佛事勃興實我師傳授誘誨之力也太和八年十二月二十三日終於本院報年八十六僧夏六十五明年正月十五日合都城道俗萬數具涅槃儀移窆於龍門祖師塔陂又明年某月某日用闍維法遷祔於奉先寺祖師塔西而建幢焉噫大師自出家至即世前後講毗尼三十會度苾芻百千人乘律登壇施法行化者五十五載而身相長大面相端嚴心不放逸口無戲論四部瞻仰敬而畏之矧又以直心坐道場以密行傳法藏為東王城十大德首為南贍部八關戒師名冠萬僧利及百衆所謂提智慧劍破煩惱賊撾無畏鼓降內外魔凜乎佛庭之直臣鬱乎僧壇之大將者也初師之將遷化也無病無惱宴坐齋心領一童詣諸寺遇像致敬逢僧與遊口雖不言心若默別後數日而化識者異之及臨盡滅也告弟子言我歿後當依本院先師遺法勿塔勿墳唯造佛頂尊勝陀羅尼經一幢置吾茶毗之所吾形雖化吾願常在願依幢之塵之影利益一切衆生吾願足矣今院主上首弟子振公洎傳法受道侍者弟子某等若干人合力建幢以畢師志振輩以居易辱為是院門徒者有年矣又十年以還蒙師授八關齋戒見託為記附於真言蓋欲以奉本教而滿先願尋往因而集來果也欲重宣此義以一偈贊之偈云幢功德甚大師行願甚深孰見如是幢不發菩提心我本師釋迦如來説言從是西方過十萬億佛土有世界號極樂以無八苦四惡道故也其國號淨土以無三毒五濁業故也其佛號阿彌陀以壽無量願無量功德相好光明無量故也諦觀此婆娑世界微塵衆生無賢愚無貴賤無幼艾有起心歸佛者舉手合掌必先嚮西方有怖厄苦惱者開口發聲必先念阿彌陀佛又笵金合土刻石織文乃至印水聚沙童子戲者莫不率以阿彌陀佛為上首不知其然而然由是而觀是彼如來有大誓願於此衆生此衆生有大因緣於彼國土明矣不然者東南北方過去現在未來佛多矣何獨如是哉唐中大夫太子少傅上柱國馮翊縣開國侯賜紫金魚袋白居易當衰暮之歲中風痺之疾乃捨俸錢三萬命工人杜宗敬按阿彌陀無量壽二經畫西方世界一部高九尺廣丈有三尺阿彌陀佛坐中央觀音勢至二大士侍左右天人瞻仰眷屬圍繞樓臺妓樂水樹花鳥七寶嚴飾五彩彰施爛爛煌煌功德成就弟子居易焚香稽首跪於佛前起慈悲心發宏誓願願此功德回施一切衆生一切衆生有如我老者如我病者願皆離苦得樂斷惡修善不越南部便覩西方白毫大光應念來感青蓮上品隨願往生從見在身盡未來際常得親近而供養也欲重宣此願而偈讚云極樂世界清淨土無諸惡道及諸苦願如我身老病者同生無量壽佛所南贍部州大唐國東都香山寺居士太原人白樂天年老病風因身有苦遍念一切惡趣衆生願同我身離苦得樂由是命繪事按經文仰兜率天宮想彌勒內衆以丹素金碧形容之以香火花果供養之一禮一贊所生功德若我老病苦者皆得如本願焉本願云何先是樂天歸三寶持十齋受八戒者有年歲矣常日日焚香佛前稽首發願願當來世與一切衆生同彌勒上生隨慈氏下降生生劫劫與慈氏俱永離生死流終成無上道今因老病重此證明所以表不忘初心而必果本願也慈氏在上實聞斯言言訖作禮自為此記時開成五年三月日記先是樂天發願修香山寺既就原注事具前記逮今七八年寺有佛像有僧徒而無經典寂寥精舍不聞法音三寶闕一我願未滿乃於諸寺藏外雜散經中得遺編墜軸者數百卷帙以開元經録按而校之於是絶者續之亡者補之稽諸藏目名數乃足合是新舊大小乘經律論集凡五千二百七十卷乃作六藏分而護焉寺西北隅有隙屋三間土木將壞乃增修改飾為經藏堂堂東西間闢四窗置六藏藏二門啓閉有時出納有籍堂中間置高廣佛座一座上列金色像五百像後設西方極樂世界圖一菩薩影二環座懸大幡二十有四榻席巾几洎供養之器咸具焉合為道場簡儉嚴淨開成五年九月二十五日堂成藏成道場成以香火釁之以飲食樂之以管磬歌舞供養之與間振源濟釗操洲暢八長老及比邱衆百二十人圍繞讚嘆之又別募清淨七人日日供齋粥給香燭十二部經次第諷讀俾夫經梵之音晝夜相續洋洋乎盈耳哉欣欣乎滿願哉爾時道場主佛弟子香山居士樂天欲使浮圖之徒遊者歸依居者護持故刻石以記之白氏洛中集者樂天在洛所著書也太和三年春樂天始以太子賓客分司東都及茲十有二年矣其間賦格律詩凡八百首合為十卷今納於龍門香山寺經藏堂夫以狂簡斐然之文而歸依支提法寶藏者於意云何我有本願願以今生世俗文字之業狂言綺語之過轉為將來世世讚佛乘之因轉法輪之緣也十方三世諸佛應知噫經堂未滅記石未泯之間乘此願力安知我他生不復遊是寺復覩斯文得宿命通省今日事如智大師記靈山於前會羊叔子識金環於後身者歟於戲垂老之年絶筆於此有知我者亦無隱焉大唐開成五年十一月二日中大夫守太子少傅馮翊縣開國侯上柱國賜紫金魚袋白居易樂天記昔余為江州司馬時常與廬山長老於東林寺經藏中披閲遠大師與諸文士唱和集卷時諸長老請余文集亦置經藏唯然心許他日致之逮茲餘二十年矣今余前後所著文大小合二千九百六十四首勒成六十卷編次既畢納於藏中且欲與二林結他生之緣復曩歲之志也故自忘其鄙拙焉仍請本寺長老及主藏僧依遠公文集例不借外客不出寺門幸甚太和九年夏太子賓客晉陽縣開國男太原白居易樂天記中大夫守太子少傅馮翊縣開國侯上柱國賜紫金魚袋太原白居易字樂天與東都聖善寺鉢塔院故長老如滿大師有齋戒之因與今長老振大士為香火之社樂天曰吾老矣將尋前好且結後緣故以斯文置於是院其集也帙六十五卷凡三千二百五十五首題為白氏文集納於律疏庫樓仍請不出院門不借官客有好事者仍就觀之開成元年五月十三日樂天記沃洲山在剡縣南三十里禪院在沃洲山之陽天姥岑之陰南對天台而華頂赤城列焉北對四明而金庭石鼓介焉西北有支遁嶺而養馬坡放鶴峯次焉東南有石橋溪溪出天台石橋因名焉其餘卑巖小泉如子孫之從父祖者不可勝數東南山水越為首剡為面沃洲天姥為眉目夫有非常之境然後有非常之人棲焉晉宋以來因山洞開厥初有羅漢僧西天竺人白道猷居焉次有高僧竺法潛支道林居焉次又有乾興淵支遁開威蘊崇實光識裴藏濟度逞印凡十八僧居焉高士名人有戴逵王洽劉恢許元度殷融郗超孫綽桓彥表王敬仁何次道王文度謝長霞袁彥伯王蒙衛玠謝萬石蔡叔子王羲之凡十八人或遊焉或止焉故道猷詩云連峯數千里修林帶平津茅茨隱不見雞鳴知有人謝靈運詩云暝投剡中宿明登天姥岑高高入雲霓還期安可尋蓋人與山相得於一時也自齊至唐茲山寖荒靈境寂寥罕有人遊故詞人朱放詩云月在沃洲山上人歸剡縣江邊劉長卿詩云何人住沃洲此皆愛而不到者也太和二年春有頭陀僧白寂然來遊茲山見道猷支竺遺迹泉石盡在依依然如歸故鄉戀不能去時浙東廉使元相國聞之始為卜築次廉使陸中丞知一作和之助其繕完三年而禪院成五年而佛事立正殿若干間齋堂若干間僧舍若干間夏臘之僧歲不下八九十安居遊觀之外日與寂然討論心要振起禪風白黑之徒附而化者甚衆嗟乎支竺歿而佛聲寢靈山廢而法不作後數百歲而寂然繼之豈非時有待而化有緣耶六年夏寂然遣門徒僧常贄自剡抵洛持書與圖詣從叔樂天乞為禪院記云昔道猷肇開茲山後寂然嗣興茲山今日樂天又垂文茲山異乎哉沃洲山與白氏其世有緣乎洛都四野山水之勝龍門首焉龍門十寺觀遊之勝香山首焉香山之壞久矣樓亭騫崩佛僧暴露士君子惜之豫亦惜之佛弟子恥之豫亦恥之頃豫為庶子賓客分司東都時性好間遊靈迹勝概靡不周覽每至茲寺慨然有葺完之願焉逮今七八年幸為山水主是償初心復始願之秋也似有緣會果成就之噫豫早與故元相國微之定交於生死之間冥心於因果之際去年秋微之將薨以墓志文見託既而元氏之老狀其臧獲輿馬綾帛洎銀鞍玉帶之物價當六七十萬為謝文之贄來致於豫豫念平生分文不當辭贄不當納自秦抵洛往返再三訖不得已回施茲寺因請悲知僧清間主張之命謹幹將士復掌治之始自寺前亭一所登寺橋一所連橋廊七間次至石樓一所連廊六間次東佛龕大屋十一間次南賓院堂一所大小屋共七間凡支壞補缺壘隤覆漏杇墁之功必精赭堊之飾必良雖一日必葺越三月而就譬如長者壞宅鬱為導師化城於是龕像無燥濕陊泐之危寺僧有經行宴坐之安遊者得息肩觀者得寓目關塞之氣色龍潭之景象香山之泉石石樓之風月與往來者耳目一時而新士君子佛弟子豁然如釋憾刷恥之為清間上人與豫及微之皆夙舊也交情願力盡得知之憾往念來歡且贊曰凡此利益皆名功德而是功德應歸微之必有以滅宿殃薦冥福也豫應曰嗚呼乘此功德安知他劫不與微之結後緣於茲土乎因此行願安知他生不與微之復同遊於茲寺乎言及於斯漣而涕下唐太和六年八月一日河南尹太原白居易記有唐東都臨壇開法大師長慶四年二月十三日終於聖善寺華嚴院春秋七十有五夏臘五十二是月二十二日移窆於龍門山之南岡寶歷元年某月某日遷葬於奉先寺祔其先師塔廟穴之上不封不樹不廟不碑不勞人不傷財唯立佛頂尊勝陀羅尼一幢幢高若干尺圜若干尺六隅七層上覆下承佛儀在上經咒在中記讚在下皆師所屬繫門人奉遺志也師姓康號如信襄城人始成童授蓮花經於釋巖既則戒學四分律於釋晤後傳六祖心要於本院先師淨名楞伽俱舍百法經根論枝罔不通焉繇是禪與律交修定與慧相養蓄為通粹揭為僧豪自建中訖長慶凡九遷大寺居十補大德位蒞法會主僧盟者二十二年勤宣佛令卒復祖業若貴賤若賢愚若小大中乘人遊我門繞我座禮我足如羽附鳳如水會海於戲非夫動為儀言為法心為道場則安能使化緣法衆悅隨欣戴一至於是耶同學大德繼居本院者曰智如弟子上首者曰嚴隱暨歸靖藏周常賁懷嵩圓恕圓昭貞操等若干人聚謀幢事瑑刻既成將師理命請蘇州刺史白居易為記記既訖因書二四句偈以讚云師之度世以定以慧為醫藥師救療一切師之闍維不塔不祠作功德幢與衆共之有杭州龍興寺僧南操當長慶二年請靈隱寺僧道峯講大方廣佛華嚴經至華藏世界品聞廣博嚴淨事操歡喜發願願於白黑衆中勸十萬人人轉華嚴經一部十萬人又勸千萬人人諷華嚴經一卷每歲四季月其衆大聚會於是攝之以社齊之以齋自二年夏至今年秋凡十有四齋每齋操捧香跪啓於佛曰願我來世生華藏世界大香水海上寶蓮金輪中毗盧遮那如來前與十萬人俱斯足矣又於衆中募財置良田十頃歲取其利永給齋用豫前牧杭州時聞操發是願今牧蘇州時見操成是功操自杭詣蘇凡三請於豫曰操八十一矣朝夕待盡恐社與齋來者不能繼其志乞為記誡俾無廢墜豫即十萬人中一人也宜乎志而贊之噫吾聞一毛之施一飯之供終不壞滅况田千畝齋四時用不竭之征備無窮之供乎噫吾聞一願之力一偈之功終不壞滅况十二部經常出於千人口乎况十萬部經常入於百千人耳乎吾知操徒必果是願若經之句義若經之功神則存乎本傳若社人之姓名若財施之名數則列於別碑斯石之文但敘見願集來緣而已寶歷二年九月二十五日前蘇州刺史白居易記貞元初韋應物為蘇州牧房孺復為杭州牧皆豪人也韋嗜詩房嗜酒每與賓友一醉一詠其風流雅韻多播於吳中或目韋房為詩酒仙時豫始年十四五旅二郡以幼賤不得與遊宴尤覺其才調高而郡守尊以當時心言異日蘇杭苟獲一郡足矣及今自中書舍人間領二州去年脫杭印今年佩蘇印既醉於彼又吟於此酣歌狂什亦往往在人口中則蘇杭之風景韋房之詩酒兼有之矣豈始願及此哉然二郡之物狀人情與曩時不異前後相去三十七年江山是而齒髮非又可嗟矣韋在此州歌詩甚多有郡宴詩云兵衛森畫戟燕寢凝清香最為警策今刻此篇於石傳貽將來因以子旬宴一章亦附於後雖雅俗不類各詠一時之志偶書石背且償其初心焉寶歷元年七月二十日蘇州刺史白居易題千佛堂轉輪經藏者先是郡太守居易發心蜀沙門清間矢謨吳僧常敬宏正神益等僝功檀主鄧子成梁華等施財院僧法宏惠滿契元惠雅等蕆事太和三年秋作開成元年春成堂之費計緡萬藏與經之費計緡三千六百堂之中上蓋下藏蓋之間輪九層佛千龕彩繪金碧以為飾環蓋懸鏡六十有二藏八面面二門丹漆銅鍇以為固環藏敷座六十有四藏之內轉以輪止以柅經函二百五十有六經卷五千五十有八藏成經具之明年蘇之緇白徒聚謀曰今功德如是誰其尸之宜請有福智僧越之妙喜寺長老元遂禪師為之主宜請初發心人前本郡守白少傅為之記僉曰然師既來教行如流僧至如歸供施達襯隨日而集堂有羡食路無飢僧遊者學者得以安給惠利饒益不可思量師又日與苾芻衆升堂焚香合十指禮千佛然後啓藏發函鳴犍椎唱伽陀授持讀諷十二部經經聲洋洋充滿虛空上下近遠有情識者法音所及無不蒙福法力所攝鮮不歸心佻然巽風一變至道所得功德不自覺知繇是而言是堂是藏是經之用信有以表旌覺路也脂轄法輪也示火宅長者子之便門也開毛道凡夫生之大竇也亶其然乎又明年院之僧徒三詣雒都請豫為記夫記者不唯記年月述作為亦在乎辨興廢示勸戒也我釋迦如來有言一切佛及一切法皆從經出然則法依於經經依於藏藏依於堂若堂壞則藏廢藏廢則經墜經墜則法隱法隱則無上之道幾乎息矣嗚呼凡我國土宰官支提上首暨摩摩帝輩得不虔奉而護念之乎得不維持而增修之乎經有缺必補藏有隙必葺堂有壞必支若然者真佛弟子得福無量反是者非佛弟子得罪如律開成四年二月一日記唐馮翊縣開國侯太原白居易字樂天有文集七帙合六十七卷凡三千四百八十七首其間根源五常枝派六義恢王教而宏佛道者多矣然寓興放言緣情綺語者亦往往有之樂天佛弟子也備聞聖教深信因果懼結來業悟知前非故其集家藏之外別録三本一本置於東都聖善寺鉢塔院律庫中一本置於廬山東林寺經藏中一本置於蘇州南禪院千佛堂內夫惟悉索弊文歸依三藏者其意云何且有本願願以今生世俗文字放言綺語之因轉為將來世世讚佛乘轉法輪之緣也三寶在上實聞斯言開成四年二月二日樂天記古之達人皆有所嗜元晏先生嗜書嵇中散嗜琴靖節先生嗜酒今丞相奇章公嗜石石無文無聲無臭無味與三物不同而公嗜之何也衆皆怪之走獨知之昔故友李生名約有云苟適吾意其用則多誠哉是言適意而已公之所嗜可知之矣公以司徒保河雒治家無珍産奉身無長物惟東城置一第南郭營一墅精葺宮宇慎擇賓客性不苟合居常寡徒遊息之時與石為伍石有族聚太湖為甲羅浮天竺之徒次焉今公之所嗜者甲也先是公之僚吏多鎮守江湖知公之心惟石是好乃鈎深致遠獻瑰納奇四五年間纍纍而至公於此物獨不廉讓東第南墅列而置之富哉石乎厥狀非一有盤拗秀出如靈邱鮮雲者有端嚴挺立如真官神人者有縝潤削成如圭瓚者有廉稜鋭劌如劍戟者又有如虬如鳳若跧若動將翔將踴如鬼如獸若行若驟將攫將鬬風烈雨晦之夕洞穴開皚若欱雲噴雷嶷嶷然有可望而畏之者煙霽景麗之旦巖崿霮䨴若拂嵐撲黛靄靄然有可狎而玩之者昏曉之交名狀不可撮要而言則三山五嶽百洞千壑覼縷蔟縮盡在其中百仞一拳千里一瞬坐而得之此所以為公適意之用也嘗與公近觀熟察相顧而言豈造物者有意於其間乎將胚月軍凝結偶然成功乎然而自一成不變已來不知幾千萬年或委海隅或淪湖底高者僅數仞重者殆千鈞一旦不鞭而來無脛而至爭奇騁怪為公眼中之物公又待之如賓友親之如賢哲重之如寶玉愛之如兒孫不知精意有所召邪將尤物有所歸邪孰不為而來邪一作何為而來必有以也石有大小其數四等以甲乙景丁品之每品有上中下各刻於石陰曰牛氏石甲之上景之中乙之下噫是石也百千載後散在天壤之內轉徙隱見誰復知之欲使將來與我同好者覩斯石覽斯文知公之嗜石之自會昌三年五月丁丑記東南山水餘杭郡為最就郡言靈隱寺為尤由寺觀言冷泉亭為甲亭在山下水中央寺西南隅高不倍尋廣不纍丈而撮奇得要地搜勝概物無遁形春之日吾愛其草薰薰木欣欣可以導和納粹暢人血氣夏之夜吾愛其泉渟渟風泠泠可以蠲煩析酲起人心情山樹為蓋巖石為屏雲從棟生水與階平坐而玩之者可濯足於牀下臥而狎之者可垂釣於枕上矧又潺湲潔徹粹冷柔滑若俗士若道人眼耳之塵心舌之垢不待盥滌見輒除去潛利陰益可勝言哉斯所以最餘杭而甲靈隱也杭自郡城抵四封叢山復湖易為形勝先是領郡者有相里君造虛白亭有韓僕射臯作候仙亭有裴庶子棠棣作觀風亭有盧給事元輔作見山亭及右司郎中河南元藇最後作此亭於是五亭相望如指之列可謂佳境殫矣能事畢矣後來者雖有敏心巧目無所加焉故吾繼之述而不作長慶三年八月十三日記錢塘湖事刺史要知者四條具列如左錢塘湖一名上湖周回三十里北有石函南有筧凡放水溉田每減一寸可溉十五餘頃每一復時可溉五十餘頃先須別選公勤軍吏二人立於田次與本所由田戶據頃畝定日時量尺寸節限而放之若歲旱百姓請水須令經州陳狀刺史自便押帖所由即日與水若待狀入司符下縣縣帖鄉鄉差所由動經旬日雖得水而旱田苗無所及也大抵此州春多雨秋多旱若隄防如法蓄泄及時即瀕湖千餘頃田無凶年矣原注州圖經云湖水溉田五百頃謂係田也今按水利所及其公私田不啻千餘頃自錢塘至鹽官界應溉夾官河田放湖入河從河入田淮鹽鐵使舊法又須先量河水淺深待溉田畢去還本水尺寸往往旱甚即湖水不充今年修築湖堤高加數尺水亦隨加即不啻足矣晚或不足即更決臨平湖添注官河又有餘矣原注雖非澆田時若官河乾淺但放湖水添注可以立通舟船俗云決放湖水不利錢塘縣官縣官多假他詞以惑刺史云魚龍無所託或云菱茭失其利且魚龍與生民之命孰急菱茭與稻梁之利孰多斷可知矣又云放湖即郭內六井無水亦妄也且湖底高井管低湖中又有泉數十眼湖耗則泉湧雖盡竭湖水而泉用有餘况前後放湖終不至竭而云井無水謬矣其郭中六井李泌相公典郡日所作甚利於人與湖相通中有陰竇往往堙塞亦宜數察而通理之則雖大旱而井水常足湖中有無稅田約十數頃湖淺則田出湖深則田沒田戶多與所由計會盜泄湖水以利私田其石函南筧並諸小筧闥非澆田時並須封閉築塞數令巡檢小有漏泄罪責所由即無盜泄之弊矣又若霖雨三日已上即往往堤決須所由巡守預為之防其筧之南舊有缺岸若水暴漲即於缺岸泄之又不減兼於石函南筧泄之防堤潰也原注大約水去石函口一尺為限過此須泄之豫在郡三年仍歲逢旱湖之利害盡究其由恐來者要知故書於石欲讀者易曉故不文其言長慶四年三月十日杭州刺史白居易記湖州城東南二百步抵霅溪溪連汀洲洲一名白蘋梁吳興守柳惲於此賦詩云汀洲採白蘋因以為名也前不知幾千萬年後又數百年有名無亭鞠為荒澤至大歷十一年顏魯公真卿為刺史始翦榛導流作八角亭以遊息焉旋屬災潦薦至沼堙臺圮後又數十載萎蕪隙地至開成三年宏農楊君為刺史乃疏四渠濬二池樹三園構五亭卉木荷竹舟橋廊室洎遊宴息宿之具靡不備焉觀其架大溪跨長汀者謂之白蘋亭介三園閲百卉者謂之集芳亭面廣池目列岫者謂之山光亭玩晨曦者謂之朝霞亭狎清漣者謂之碧波亭五亭間開萬象迭入嚮背俯仰勝無遁形每至汀風春溪月秋花繁鳥啼之旦蓮開水香之夕賓友集歌吹作舟棹徐動觴詠半酣飄然恍然遊者相顧咸曰此不知方外也人間也又不知蓬瀛崑閬復何如哉時豫守官在洛陽楊君緘書賫圖請豫為記豫按圖握筆心存目想覼縷梗概十不得其二三大凡地有勝境得人而後發人有心匠得物而後開境心相遇固有時耶蓋是境也實柳守濫觴之顏公椎輪之楊君繪素之三賢始終能事畢矣楊君前牧舒舒人治今牧湖湖人康康之由革弊興利若改茶法變稅書之類是也利興故府有羡財政成故居多暇日繇是以餘力濟高情成勝概三者旋相為用豈偶然哉昔謝柳為郡樂山水多高情不聞善政龔黃為郡憂黎庶有善政不聞勝概兼而有者其吾友楊君乎君名漢公字用乂恐年祀寢久遠來者不知故名而字之時開成四年十月十五日記張氏子得天之和心之術積為行發為藝藝尤者其畫歟畫無常工以似為工學無常師以真為師故其措一意狀一物往往運思中與神會髣佛焉若驅和役靈於其間者時豫在長安中居甚間聞甚熟乃請觀於張張為豫盡出之厥有山水松石雲霓鳥獸暨四夷六畜妓樂華蟲咸在焉凡十餘軸無動植無大小皆曲盡其能莫不向背無遺勢洪纖無遁形迫而視之有似乎水中了然分其影者然後知學在骨髓者自心術得工侔造化者由天和來張但得於心傳於手亦不自知其然而然也至若筆精之英華指趣之律度豫非畫之流也不可得而知之今所得者但覺其形真而圓神和而全炳然儼然如出於圖之前而已耳張始年二十餘致功甚近豫意其生知之藝與年而長則畫必為希代寶人必為後學師恐將來者失其傳故以年月名氏記於圖軸之末云時貞元十九年清河張敦簡畫六月十日太原白居易記華州下邽縣東南三十餘里曰延平里里西南有故蘭若而無僧居元和八年秋七月豫從祖兄曰皡自華州來訪豫途出於蘭若前及門見婦女十許人服黃緑衣少長雜坐會語於佛屋下聲聞於門兄熱行方渴將就憩且求飲望其從者蕭士清未至因下馬自縶韁於門柱舉首忽不見意其退藏於窗闥之間從之不見又意其退藏於屋壁之後從之又不見周視其四旁則墻堵環然無隟缺覆視其族談之所則塵埃冪然無足迹繇是知其非人悸然大異之不敢留上馬疾驅來告豫豫亦異之因訊其所聞兄曰云云甚多不能殫記大抵多云王允老於此觀其辭意若相與數其過者厥所去豫舍八九里因同往訪焉果有王允者年老即其里人也方徙居於蘭若東百餘步葺墻屋築場藝樹僅畢明日而入既入不浹辰而允死不越月而妻死不逾時而允之二子與二婦一孫死餘一子曰明進大恐懼不知所為意新居不祥乃撤屋拔樹夜徙去遂獲全焉噫推而徵之則衆君子謀於社以亡曹婦人來焚糜竺之室信不虛矣明年秋豫與兄出遊因復至是視允之居則井湮竈夷閴然唯環墻在里人無敢居者異乎哉若然者命數耶偶然耶將所徙之居非吉土耶抑王氏有隱慝鬼得謀而誅之耶茫乎不識其由且志於佛室之壁以俟辨惑者九月七日太原白樂天云
