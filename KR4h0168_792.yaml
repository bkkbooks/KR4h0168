body:
  text: 敘曰天業光昭寶臣間出雲臺重沓旗常紛綸吾巨唐乎鎮寧社稷纘揚忠烈勳居第一代代不絶其渾氏乎能遵祖法不失家聲立朝守土所居可紀其康公乎公諱侃字復貴其先薑姓之後漢郡渾邪王之裔始居於崤北後遷於河南今為代人為山西右族七代祖潭仕隋玉鈐衛大將軍生回貴以兵從我高祖神堯皇帝佐平暴亂拜豹韜衛大將軍生元慶為右玉鈐將軍靈邱伯生大壽為太子僕贈廣府大都督生釋之為開府儀同三司太常卿寧朔郡王廣德中拒扞西戎身歿王事贈司空公大父諱瑊朔方副元帥河中節度檢校司空中書令咸寧王贈太師有大勳績其秩録封賞埒汾陽西平皇家中興此三人力也父諱鎬義武軍節度易定觀察使檢校工部尚書贈太子少保取隴西李氏女實生公公為兒時則柔敬敦厚篤志於學九歲由宏文生擢孝廉第釋褐參同州軍事既冠益以通敏密靜稱於人因從先少師於藩方不忍去庭闈諸侯有以幣以馬取者一無所就元和十二年先少師奉詔以中山兵伐叛而卒與寇遇以數千當數萬力戰而歸坐黜循州公憂蹙內結晨夜在側從容道否泰之理以解發於至誠少師為之灑然少師薨屏勺飲壞容貌幾不全者數矣嚴護踰大江長號動神明親友見者莫不悽惻憂其困絶往往罷弔既而外除大戚不衰遂退不肯仕居處飲食若執喪者是時朝廷詢勳臣後或言曰咸寧功纍代不可及其子身當聖朝以譴終未復無以示天下執政立言之天子感其事趣詔盡還少師爵土由是勳閥之家皆喜長慶中又有言公之材行不宜在閭巷者上亦以追顯咸寧功德未足遂授公右龍武軍倉曹參軍歷太常寺主簿太府寺丞由是以吏事自喜明習文法咸寧王股肱王室卑體下士召置幕府得一時之人少師仕官早成不廢法度有譽於士大夫間公又修潔謙遜辭禮間雅由是仁人與之遊長者訪其廬矣稱述日甚聞於廷中擢為左贊善大夫轉太子僕能勤其官改太府少卿始用利器貨泉事聚不頓鋒鋩益為試可一日昭獻皇帝讀國史至咸寧王卒嘆渾氏時無大官者欲用公未有緣即日以銀魚朱袍賜之俄拜金吾衛將軍寵以金紫公愈益小心俯僂不暇武宗時至太僕卿以謹良選宣宗即位改少府監以繕理稱又拜左金吾衛大將軍肅環衛明年遷司農卿練經制每以處逸樂悖勤勞非忠也求出補吏不憚劇郡久之壽陽歲數飢有盜賊上選能理者丞相舉公可用公至則猛糾緩化曉告慰養先是有貨茶盜鬬變難制至是皆解散走匿又勺陂之水溉田數百頃為力勢者幸其肥美決去其流以耕公隄防約束水復盛溢沃野之利歲歲增多徵為殿中監服用如法頃之為昭王傅多稱惜之再為少府監遷檢校工部尚書金吾大將軍日在彤庭宣宗器其能遂賜高牙暢轂鎮於回中公門有將帥風習知四夷事以故綏邊之績不日而成西戎別種王蒙數為邊害公曰胡夷剽劫亦常事不煩兵鏖可以信取諭以咫尺之書果相率遁去居無何又遣其舍人董英粲歸誠且貪錦繡物公必其善意乃許互市竟不敢負約反覆初有戌卒子為族長所掠奴畜之至是董英粲輒搆而歸之曰用報德關城無警早開晏閉矣邊兵之衣輦自京師吏緣為姦纊帛悉濫公始周察變法犯必收按至乎聚給親往觀之舊調軍食倉廩庾回遠不克往取率為空名又度其途以便之自是寒無皸瘃戌益伉健既衣又食之撫士至矣萃戰馬凡五百二十匹牛騾稱是修革器五萬具備丁壯卒三千人聚新粟五萬斛邊備完富戎心震悚天子使使者齎詔即軍中加公檢校刑部尚書以報之居歲餘復召為大金吾升三品階三領緹騎日益親貴今天子即位謀滄海帥視公曰無以易爾咸通二年遂授義昌軍節度使其理如在涇始至則表蠲水旱逋甚衆先是井為海染人不可飲遂閼河以汲舟行則決決又輒塞公視而計之派鑿扃蓄舟來不留緶垂不息厥功亟就於今賴之有田千頃遊惰者不顧公乃勸闢悉為膏腴既飲之又食之養人至矣窮民有鬻子者為之贖歸故校有孤女者時其配偶喪不辦葬骨暴於野皆為調棺柩具粟帛郵亭相遠道里患苦作室其間以庇來往歲比不稔給軍未贍峙糧十六萬石以為儲蓄大抵能推誠於下辛苦率先民愁未解公費未足孜孜為之雖人之求去已疾謀致家溫不如也以故感神貺來瑞鷙百姓洎文武吏謳歌借留護戎者奏其狀天子嘉焉詔曰幸卒教化之許留旬歲五年秋受代朝廷方圖其功會其冬以疾聞明年三月二日薨於大寧里私第享年六十九其年十二月某日葬於京兆府萬年縣洪固鄉胄貴里於戲豹韜以義兵顯寧朔以邊患死咸寧以殊勳著少師以威名用洎公以材能選陳力無曠廢渾氏之風類是自穆宗後天下少事由是公未嘗有鬬戰功始則以至行好學恂恂若儒者中則以精力辨疑為循吏終則以和衆靜邊名之良帥不矜輿馬之飾不嗜梁肉之味家産稍贍則以振昆弟賓客士有賢者雖貧賤必與之均敵名以修飭光位以功效進自解褐數十年歷九卿為二千石繼父位臨方面榮當代焉保身守道一無塗汙於戲渾氏陰德代封之慶則大於于公虞詡戰勳忘家之迹則優於平陽去病子孫支屬之榮則高於萬石耿氏然若公之材未大施設不繼乎台鼎不邇於期頤斯慊慊於五福也薨之日天子軫悼不朝贈大司馬葬之日給太常儀仗博士定諡曰康斯可以自見於後代矣長子曰術詹事府司直早終次子徵特徽普卓皆幼父病篤召從父弟右威衛上將軍佶泣告曰先少師以後事託吾季父爾必繼之佶涕泗遵用禮儀備具他日持故吏行狀託余斯文是以敘而銘之曰命氏自薑有後于唐咸寧達人實護玉璜功德愈甚其緒乃昌少師宜之龍節煌煌尚書有繼卓然丱歲執喪之日厥生幾逝渾氏有子天子下制擢為大官如翼高戾帝前謹恭俾牧於東盜走年豐後為元戎篲煙息波兩有顯庸厥庸惟富施之無窮宜久饗樂神報何薄厥德有本頌之靡涸實銘於斯不銷不落景儉憲宗朝官侍御史大中時纍遷御史大夫鄭光是陛下親舅外族之愛誠軫聖心况皇太后哀切之時理合加等而賜之粟帛隆其第宅自家刑國允謂合宜今以輟朝之數比於親王公主則前例所無縱有亦不可施用何者先王制禮所以防微大凡人情於外族則深於宗廟則薄所以先王制禮割愛厚親士庶猶然况當萬乘親王公主宗屬也舅氏外族也今朝廷公卿以至庶人據開元禮外祖父母及親舅喪服小功五月若親伯叔親兄弟即服齊縗周年所以疏其外而密於內也有天下者尢不可使外戚強盛故西漢有呂氏之侈幾滅劉氏國朝有則天之篡殆革唐命豈非一朝一夕其所由來漸也今鄭光輟朝日數與親王公主同設使陛下速改詔命輟朝一日或兩日示其升降有差恩禮無僭使四方見陛下欽明之德青史傳陛下制度之文垂之百王播之芳烈臣愚不肖謬竊恩私實願陛下處於堯舜之上羲軒之列所以甘心鼎鑊伏進危言函大中時人琅邪王讜字達夫探至聖之元言得祕密之妙理以大佛頂及尊勝為衆福之王懇立二幢祈報所怙攀號不及創巨痛深衰麻在躬茹荼吞蓼若不憑其教迹何以泄此哀懷徵其志誠起自純孝既而候聽戒遣式遵理命令將在日衣物造此功德始乎因想形於心匠有工應召巧與意合將期經久須擇勝處繇若扳種必求厚地闕一字得其所為益多乃謀於老宿得在精舍同諷於闕一字門護其基趾鑿去黑沙築以黃壤土脈相闕二字力強闕一字若非願力宏持闕一字得人心叶贊以大中十一年歲在丁丑四月二十七日立於開元尊像殿前繄其地也每幢高三十五尺各有二十五重重重狀名窮侈極麗唐言梵語備載二經此之不書削其繁也昔者曾子嘗謂人曰諭父母於道方始得為孝也參者直養者爾闕七字諭父母於道孝闕二字必如讜之闕二字可謂闕二字父母於道矣闕二字光有闕四字斯幢闕二字人闕五十五字也且闕一字一石闕一字樹一字補闕一字教徒闕一字嵌空峻峭積翠凝青尚蒙移植列在廣庭但能與人娛目不能使其闕五字界闕十四字械我闕一字對峙闕四字稜層怪尸奔妭闕三字乃闕一字陽高映圓魄斜臨同一解脫不二光陰闕一字灑闕一字滴煙籠霧羃雱闕二字離闕一字漫霏微聖澤流布闕一字雲在衣忽而銷歇罪垢闕五字清福裕闕三字飈飄瞥闕三字塵四發毛峯闕一字彼即是加被何必張喉闕一字後為闕二字哉有以見陀羅尼闕二字不思議也二幢既立就工闕一字訖功闕一字我釋門光闕四字不闕四字何闕二十三字行孝闕十字悼闕十字聖闕四十四字祕印密各鐫在石闕一字之者誰我知其人曰讜曰諲衆威及闕一字咸遵父言同村廣闕一字巍巍二幢不泐不泯資汝來世千崇萬信承此福源曷有窮盡岫字伯起宰相宙弟盧攜舉進士陋甚岫獨謂必大用攜執政岫自泗州刺史擢福建觀察使質付坤元形分地類有持帶山川之力有長養稼穡之利結為大塊中含萬物之根充彼方輿外定九州之位於是黃帝后土怒而交爭曰天有兩曜日為最明地有五行土為至精人無我而不立豫無我而不成故禮得之而以壇以墠君得之而以社以城子言各執其一端子智不出乎四生向者夸競交肩紛紜未息殊不知皆在五土何自德色木之始叢榮本茂葉秀枝繁不依於土何因託根火之重赫奕華夏照耀乾坤無吾為土雖猛不存金生於山山吾所育水出於地地吾之族若藏礦朴於峰巒化江湖之原陸子何有哉吾為五方之主為萬聖之雄造邦本立大中布而為金木水火分而為南北西東使百王之傳授若四氣之始終皆德非博厚故號不統同國家保大定功體元立正法土德受天命陵無一抔之盜貢有五色之盛合為應鼓擊六氣以還淳纍作春臺熙萬人之遂性子盍鳩合異類率賓殊方歸有極贊無疆帝乃約束遠近神乃糾合要荒咸鞠躬離位厥角來王自是盡四夷之君長皆朝我唐山育良金世名重寶當用事於素節實稟靈於元造由是司歲之士敘秋之道其神曰蓐收其帝曰少昊相與搜瑰異發鏗鏘取我於麗水淬我以輕霜用爾之寒可以革溽暑之候用爾之徑可以摧烈火之剛遂重其珍遂宣其利披沙之狀咸出從革之形悉至含宇宙則範之以景名壓寰區則鑄之以神器其難得也黍纍不棄分銖是爭約人以懸市遺子以滿籝國用築臺之禮賦揚擲地之聲或三緘而永保或一諾而必行斷以同心斯為盡善鑠以衆口喻彼相傾是以王者之時令修彞倫序泥封是用職貢有所垂衣守滿堂之誡命相興作礪之語則金為世出雨示天與乃懷貪以恣攫重諾而不捐鑽山丰刀石石斷朴攻堅大有鎔範小有雕鐫玩物既奢其器用窮兵又縱於戈鋋則地將愛矣君胡得焉又克寸木之意深輔火之功寡傷水之閲世疾土之處下以徑挺司一方以滅裂視四者曰吾常卓爾子不知也况有百鍊之秀三品之殊藏之則潤屋可恃煆之則切玉如無子豈能馳善價入巨冶隨我躍於洪爐用勑代榜由官入名仰溫樹之煙何人折桂泝甘泉之水獨我登龍禁門而便是龍門聖主而永為座主三十浮名每年皆有九重知已曠代所無貫試太常寺奉禮郎攝衛州司法參軍鄭之先自周皇封舅之地因而氏焉別派五流深源一至是以滎陽之望得為首冠其下公侯接武台衡繼迹雕軒繡軸之榮羽蓋朱轓之盛由魯史記迄於唐春秋實鄭氏為衣冠之泉藪也高祖世斌皇左司郎中磁隰二州刺史新鄭縣開國男食邑三百戶曾祖元嘉皇新都長水縣令襲封新鄭縣開國男祖有常皇吏部常選襲爵新鄭縣開國男烈考探賢皇衛州昌樂朝城莘縣令府君諱遇一作恆字行甫皇試太常寺協律郎文業著於當時禮義飾於儒行少有倜儻之志長負瓖奇之名不苟譽以求容每親仁以竭愛為中外模範為一作成友朋宗師樂善孜孜不慍知鮮量函一作苞江瀆氣合風雲今之古人人雖上士一作出神不優德配壽胡羞疑先夫人之亡蓋州一霜也享年六十夫人博陵崔氏令門清族慶餘承善四德兼備六親雍和仁讓得於天真慈惠立於素尚母儀內則動靜可師禮行詩風進止成法雖婕妤女史大家經教承之於諷習推之於行源者亦異代殊人其歸一也一作旨未亡之歎孀齡杳然玉沒何先蘭凋遽一作繼至以大中九年正月十七日病終於淇澳之私第享年七十有六以大中十二年二月草七日合祔於先塋之側其鄉里原隰之號載於舊記此闕而不書女一人適范陽盧損之嗣子六人長曰頊攝汲縣丞知縣事早亡次曰珮早亡次曰瑾次曰次曰璿次曰琬咸繼遺芳克修至行銜哀茹毒追攀罔極將營護窆泣告於業文者為之銘云仕門雙美兮令德咸芳甲族齊盛兮英華克彰允文武兮書劒名揚蘊儀度兮閨門譽長珠沈玉沒兮人誰靡傷桂殞蘭凋兮共泣摧香垂修名兮允謂不亡傳盛事兮多載彌光聽悲風兮松韻連岡刻貞石兮永志元堂攜字子升郡守求子大中九年登第授集賢校理咸通中纍拜諫議大夫乾符中以戶部侍郎進同中書門下平章事加門下侍郎兼兵部尚書罷為太子賓客分司東都舉高駢可為統帥復召輔政及黃巢陷潼關乃罷為太子賓客是夜仰藥死陛下初臨大寶宜深念黎元國家之有百姓如草木之有根柢若秋冬培溉則春夏滋榮臣竊見關東去年旱災自虢至海麥才半收秋稼幾無冬菜至少貧者磑蓬實為麵蓄槐葉為虀或更衰羸亦難收拾常年不稔則散之鄉境今所在皆飢無所依投坐守鄉閭待盡溝壑其蠲免餘稅實無可徵而州縣以有上供及三司錢督走耳隱甚急動加捶撻雖撤屋伐木雇妻鬻子止可供所由酒食之費未得至於府庫也或租稅之外更有他徭朝廷儻不撫存百姓實無生計乞敕州縣應所欠錢稅並一切停徵以俟蠶麥仍發所在義倉亟加賑給至春深之後有菜葉木牙繼以桑椹漸有可食在今數月之間尢為窘急行之不可稽緩第一用紙筆第二用認勢第三褁束第四真如立行如行第五草如走第六上稀第七中勻第八下密用筆之法拓大指擫中指斂第二指拒名指令掌心虛如握卵此大要也凡用筆以大指節外置筆令轉動自在勿令大緊名指拒中指小指拒名指此細要也皆不過雙苞自然虛掌實指永字論云以大指拓頭指鉤中指拒此言單苞者然必順氣脈均勻拳心須虛虛則轉側圓順腕須挺起粘紙則輕重失準把筆淺深在去紙遠近遠則浮泛虛薄近則搵鋒體重用水墨之法水散而墨在迹浮而稜斂有若自然紙剛則用軟筆策掠按拂制在一鋒紙柔則用硬筆衮努鈎磔順成五指純剛如以錐畫石純柔如以泥洗沙既不圓暢神格亡矣書石及壁同紙剛例蓋相得也潘文宗朝官戶部員外郎大中時出為新安太守徙廬州刺史凡作事必法古名地者必求於古地而不古失其地矣秦一天下破國為郡名地者唯求於禹貢與山海經故始皇二十六年以揚州之地為九江鄣郡會稽九江會稽出禹貢鄣出山海經按海內南經云三天子鄣山在閩西注云在歙縣東浙江出焉海內東海云廬江出三天子都入江彭澤西注云即彭蠡今彭澤縣西是也經又曰一名天子鄣江南之鄣由此名也廬江在彭蠡西涯因廬江以立名項羽封英布為九江王盡有揚州之地漢高改九江為淮南即封布為淮南王十一年布誅立皇子長為淮南王孝文八年長死徙封長子安為淮南王賜為廬江王勃為衡山王應劭曰廬江故廬子國也考尋載籍古無廬國之名是劭以廬江為廬戎之地也按左氏傳盧戎亦曰廬在宣城西山中劭誤以中廬之廬為廬江之廬後人因迷而不悟按漢書諸侯王年表北界淮瀕略廬衡為淮南顏注云廬衡二山名也衡即今霍山按東漢地理志建武十年省六安國以縣屬廬江郡郡十四城有舒潯陽襄安郡南有九江東合為大江大江之南與彭澤相接既得潯陽潯陽有廬山廬山因廬江而名古矣廬江之地包江南北而有之周景武廬山記云匡俗周威王時生而神靈居於此山上世稱廬君則是俗因山為號不因俗為廬而名山為西域法者曰惠遠作廬山記不知所始乃曰匡俗出殷周之際結廬山上因名曰廬其謬甚矣按豫章舊志俗父與番陽令吳芮佐漢定天下而亡漢封俗於潯陽武帝南巡封俗為明公是山不因俗而名愈明矣余故曰事必法古名地者必求於古廬江自山海經所謂出三天子都者是也今山在彭蠡之上亡其所謂廬江者事移事古名與地改故也又按經云浙江出三天子都在其東地理志云浙江出黟縣南率山東入海率則歙今浙江是也今率山在歙州南連延而西曰浙嶺浙水實出其陰又西走彭澤凡三百里并水出山陽者皆西流匯於彭蠡廬江遠乎哉是必一水也又按今潯陽在江州大江之南古潯陽在大江之北名地為國者豈限江之南北哉求於古而已矣廬江之國自山海經而名者為是同食館不知名於何時或謂自廬以往振廩同食因以為名按左氏桓十三年傳楚屈瑕伐羅羅與廬戎兩軍之杜注云廬戎南蠻也音義云盧本或作廬也文十六年經楚人秦人巴人滅庸注云庸今上庸也今房州上庸即其地傳曰楚人出師自廬以往振廩同食注云今襄陽中廬縣也振發倉廩也同食上下無異饌也次於勾澨楚境也使廬戢黎侵庸戢黎廬大夫也又按漢書地理志當陽之中廬在襄陽縣南今猶有次廬村顏注云隋室諱忠故改為次又按楚莊王時都郢即今之江陵由郢而伐西北密邇之庸安有發東北數千里之廩上下同食哉此非廬江之廬明矣噫夫命名者不詳國地之本末俾後世地因名而生惑余今以廬江所治故六地也六與蓼皆滅於楚臧孫辰嘆曰臯陶庭堅不祀忽諸德之不建民之無援哀哉足以為後代鑒因更是館名曰建德漢書淮南王殺開章葬之肥陵肥陵肥水之上也在壽春應劭云夏水出父城東南至此與肥合故曰合肥今按肥水出雞鳴山北流二十里許分而為二其一東南流經合肥縣南又東南入巢湖其一西北流二百里出壽春西投去聲於淮二水皆曰肥余按爾雅歸異出同曰肥言所出同而所歸異也是山也高不過百尋所出唯一水分流而已其源實同而所流實異也故皆曰肥今二州圖記皆不見夏水與父城惡睹所謂夏與肥合者乎合於一源分而為肥合亦同也故曰合肥而云夏與肥合者亦應氏之失也按圖記今冶父山在廬江東北即左氏所謂莫敖縊於荒谷㣥帥囚於冶父茲山是也余按杜注及地理志荊州記皆云冶父城在荊州荒谷西北小城即冶父城莫敖縊於荒谷㣥帥囚於冶父是也廬非廬戎之地同食異振廩之所安得復有冶父哉後人妄加之明矣矧囚於城豈囚於山乎余按今冶父山實有鐵冶乃作此告縣更名曰冶山不疑當州合肥縣揚名鄉桃子村百姓萬敬儒自大中九年荒儉其年四月父母併亡至五月五日送葬後廬墓不歸今已五年先截下兩手指并甲各長半寸已來今見刺指血寫恩重經三百六十卷者差衙前子將胡師玗將茶藥就廬所弔問并勘驗得胡師玗狀謹具如後據州申勘孝子萬敬儒年二十七叔祖瑛見在廬去宅一里餘每日一食齋王時時禮念從大中九年五年葬父母後跣足披髮至今於兩手十指更互刺血寫恩重經三百六十卷先於大中九年五月及十一年五月兩度截下兩手指并甲各半寸已來今再生長復舊訖勘縣先有申報處問得經二百七十卷已抄寫訖內三卷州司今送到便是金剛經九十卷見刺血抄寫次州司又勘得萬敬儒叔祖瑛及繼曾祖母年八十見在兼有親兄弟五人親叔祖等並同居其萬敬儒在墳所嘗有一狗在側要水火等物即書帖子繫狗項下令歸家其家人解看隨所須供至今見在右淮南觀察使檢校司空同中書門下平章事兼揚州大都督府兵部侍郎平章事蔣伸工部尚書平章事夏侯孜中書侍郎兼禮部尚書平章事蕭鄴右僕射兼門下侍郎平章事陶檢校司空平章事崔闕使檢校司徒平章事白闕使檢校司空兼太傅平章事使疑闕大中十三年十月十五日朝議郎使持節廬州諸軍守廬州刺史柱國賜紫金魚袋盧潘立孟諸大中時人夫舉族稱官蓋製作之常意况王氏承帝王之後派分貴仕代亦衆矣斯皆增輝圖牒稱望天下若乃復序述祖宗之盛德謂悠悠繁詞故略而不書也夫人襄陽人也性稟專貞早貪詩禮間柔淑慎叶窈窕之風規纂組女工得家人之深旨軍器常侍先娶穎川祿氏數奇不耦夫人祿氏早亡軍器常侍時護漢南鼓盆歌罷曰粢祀之職禮不可虧潔以蘋蘩必資中饋由是思鵲巢之共理詠雞鳴以求賢慕王氏奕世之宗以夫人繼室夫人承訓結褵移天配德克崇婦道懿績可嘉閨門之美實光彤管軍器常侍自漢南更命荊門歲滿入覲復領軍器使奈何天不福善階老願乖軍器常侍尋臥疾薨於私第夫人居喪晝哭髟冗髮誓志動循法則不尚繁華言必洽於族姻喜怒不形於色棲心象外宏譽宜家其仁賢體度蓋為外戚之表儀矣將及魚軒荷寵昭示懿圖麟角功高隙駒難駐嗚呼徽音潛翳閲水興悲賦命有涯奄隨川逝以大中十四年春正月十二日終於長安縣修德里享年卅有五以其年四月五日窆於萬年縣灞陵之原鄰軍器常侍之塋禮也嗣子五人或腰金備寵近侍丹墀或朱紱青袍皆宣翊贊德門之盛世莫能儔而復泣銜哀俾述遺範言必實録託而用文志而銘曰青門道兮國之旁素滻北兮龍之鄉紛旟旐兮引靈襄泉路永兮歌白楊生何促兮死何長音容寂兮雲泱泱唯有松楸樹悲風起夕陽瑊吳興人院在市西北隅其地阜勢極秀有二大長者朝議郎前試左金吾衛長史上柱國吾仁約及兄瑛弟緒并諸子姪處士楊仲欽及男敬琮仁敬敬璿發心相謂曰此市信人極衆僧徒頗多可以買此地為瞻禮之所尋請堅修上士二僧詣於京洛請其院名不旬月而返果遂其志廣慕信心便築基址貿他山之棟材召彼郡之良工不逾二載大中十三年春建至十四年冬成月殿巍峩屹如涌出門廊盍匝可謂化城工費之間不足者悉二家之自備豈止於一二乃各數百緡焉非我二家之志虔造次而不可及也續奉祠部牒改院名為寺訖奉命紀其年月以俟未來
