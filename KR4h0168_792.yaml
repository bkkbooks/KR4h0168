front:
  text: 全唐文欽定全唐文卷七百九十二巖字魯瞻陽平冠氏人大中中登第纍遷中書舍人戶部侍郎咸通三年以本官同平章事進左僕射罷為劍南西川節度使兼中書令封魏國公貶新州刺史至江陵免官流儋州賜死
  hash: sha256:bec393afe25c334522e845a9f58e10179fe56d196111d6c0a0f04556b988aaee
