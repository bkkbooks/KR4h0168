front:
  text: 全唐文欽定全唐文卷三百二十六王維三
  hash: sha256:a269910e809234683a15faeabd27f1c6f138066053306deeee8d929011d083a2
body:
  text: 君諱某字某其先奚仲之後於商為上卿世有功烈於諸侯氏則任鬱為著族後有官於京兆者子孫因家焉今為萬年縣人也遠祖某漢河東太守曾祖某周清河太守光復舊職異世而同符祖某隋梁州南鄭縣令父某皇石州離石縣令不墜象賢一門而二鳬舄皆為政以德遺愛在人能高其門必有興者雖不當代果生達人君離石府君之第某子也膺一賢之期鍾纍葉之善忠孝自得稟乎天姿詩禮輔成潤以庭訓文含四始雕蟲之技附庸武有七德啼猿之術居外明經者皓首弱歲成儒達法者腐辰肉端居曉吏以鄉貢明經擢第解褐益州新都尉居無何丁母憂廬以長號淚少於血杖而後起骨餘於形彈琴不成從先王之禮捧筐便慟有終身之哀服闋授左金吾衛兵曹參軍轉左衛録事參軍又遷右豹韜衛長史王樂為用率武夫以扞城人愛其才稱君子之為衛方將冠章甫之冠衣逢掖之衣奏議雲臺論政赤墀一見天子必為之前席三説大臣必為之解印若端委以相六合盡宅心於帝庭授鉞以董八蠻可傳首於魏闕然後挂冠東郡拂衣五湖高蹈煙虹笑謝圭組天命不祐沮我良策春秋若干以某年月日寢疾卒於永興里第某年月日葬於京兆神禾原禮也嗣子曰某善繼先志克成厥家多藝多才安英實選匪闕實寶十城之價不以力聞萬夫之敵命同御座漢帝以恩待故人超將中軍先軫以才登元帥以某年月日從駕謁五陵天子若曰自古明王因心以孝待人由已以施物故休戚共憂樂同也其贈羽林將軍任某父使持節丹州諸軍事丹州刺史敬其事則命以始寵其身以及其親明主所以盡心忠臣所以盡力故羊舌職悅是賞也陳力異代官成聖朝修文下泉名在天爵前賢陰德雖貽慶於後昆嗣子揚名乃大顯於先父養則致樂沒而有稱昔也為士享唯將軍之食今則典邦葬亦諸侯之禮皇帝命之太史書之報昊天之恩曾舉世未有豈與夫手樹行檟躬廬長松負土成墳傭身以葬匹夫之孝同年而語哉君少有大略長而能賢安於仁樂於善厚生以儉守智以愚視事所及筆研盈庭其力文也容膝之外圖書滿屋其嗜學也八體之能右軍曾未知翰五弦之妙中散何擅於琴以禮庇身以清守官惟邦之彥惟國之翰夫人河東裴氏始以某為光祿也封河東郡君及是又贈河東郡太君子之忠由母之教母以子貴不亦宜乎司文者執簡以往刊石旌德其詞曰嶭侯之裔兮代濟其美不隕其名是生碩德兮為世作程忠不祐孝不福兮早謝休名身為士兮子為卿大將羽林兮統天兵天子寵兮為崇榮贈我武符兮賜我專城青松寂寂兮晝無人聲狗不吠兮雞不鳴蒼茫千古兮孰云旌賴孝子兮揚音英坑七族而不顧赴五鼎而如歸徇千載之名輕一朝之命烈士之勇也隱身流涕獄急不見南冠而縶遜詞以免北風忽起刎頸送君智士之勇也種族其家則廢先君之嗣戮辱及室則纍天子之姻非苟免以全其生思得當有以報漢棄身為餌俯首入士冖柘偽就以亂其謀佯愚以折其僭謝安伺桓溫之亟蔡雍制董卓之邪然後吞藥自裁嘔血而死仁者之勇夫子為之公諱斌字某京兆杜陵人也昔豕韋氏主盟於商後扶陽侯重世相漢高祖孝寬周大司空鄖國公曾祖津陵州刺史壽光縣男祖琬成州刺史父安石左僕射郇國公諡文貞並勳德茂著史牒詳焉公即文貞公之仲子也初以宰相子辨髦署吏抱拜授封加朝散大夫封平樂郡公纍拜某官丁文貞公憂又丁某國夫人憂無容顧禮殆不勝喪終身之痛歷稔猶毀幼無童心長積純氣抱其天素立於人紀先聖微言宿儒未辨貫穿精義總括旁説文言蔚於輿表筆態奼於力外子虛上林敢云雄似黃庭團扇方議雁行鶴氅乏姿羊車奪映會選公壻詔婚王室天家焜耀獨任素風時論騰踴宜在右職乃拜中書舍人動翔鳳之詠啓迪古詩下流水之書敦崇雅誥轉太常少卿六宗九奏悉具其儀天神地祇可得而禮俄入覲纍貶巴陵太守稍遷壽春太守又遷臨汝太守其理務教訓其政尚寬簡謂其敘在六官又踐三事疇咨帝載必歌九功之德式和人則必復三代之英天子避其用親姦臣惡其異己馮衍竟廢揚雄不遷抑古人而有之何夫子之命也逆賊安祿山吠堯之犬驅彼六騾憑武之狐猶威百獸藉天子之寵稱天子之官徵天子之兵逆天子之命始反幽薊稍逼溫洛云誅君側尚惑人心列郡無備百司安堵變折衝為賊矣兼法令而盜之將逃者已落彀中謝病者先之死地密布羅網遙施陷穽舉足便跌奮飛即挂智不能自謀勇無所致力賊使其騎劫之以兵署之以職以孥為質遣吏挾行公潰其腹心候其間隙義覆元惡以雪大恥嗚呼上京既駭法駕大遷天地不仁穀洛方鬬鑿齒入骨磨牙食人君子為投檻之猿小臣若喪家之狗偽疾將遁以猜見囚勺飲不入者一旬穢溺不離者十月白刃臨者四至赤棒守者五人刀環築口戟枝義頸縛送賊庭實賴天幸上帝不降罪疾逆賊恫瘝在身無暇戮人自憂為厲公哀豫微節私豫以誠推食飯我致館休我畢今日歡泣數行下示豫佩玦斫手長吁座客更衣附耳而語指其心曰積憤攻中流痛成疾猥不見戮專車之骨梟枕鼓之頭焚骸四衢然臍三日見子而死知豫此心言之明日而卒某年月日絶於洛陽某之私第以某月日返葬於某原禮也皇帝中興悲憐其意下詔裦美贈祕書監天下之人謂之賞不失德矣公敦穆孝友明允篤誠高居化源濡迹物軌元昆曰陟伯與仲居愛之欲無方視之若不足薄其私而厚其室抑謙已而讓其名故有靈芝聳蓋嘉木連理時人以為孝悌之祥而公昆季謙而不以聞維稚弱之契晚年彌篤吾實知之能言者乃為銘曰銘亡夫為政以德必世而後仁齊人以刑苟免而無恥則刑禁者難久百年安可勝殘德化者效遲三載如何考績刑以助德猛以濟寬期月政成成而不朽者惟公能之公名耀卿字渙之河東聞喜人也益為帝虞實相帝舜非子其胄而邑諸裴在漢者為水衡在魏者守代郡十三代祖徽魏益豫雍亠兊徐五州刺史蘭陵武公源於大賢派以俊德世濟其美不隕其名矣曾祖正隋散騎常侍長平郡贊理祖眘皇朝洛南南鄭二縣令著族斯茂衣冠未敢爭雄繼世皆賢英彥無出其右故有常侍縣君遞輝迭映父守真太常博士判駕部夏官員外今上楚王府咨議參軍邠寧二州刺史贈晉亠兊沂三州刺史文儒之宗伯禮樂之本源藉業雖曰承家復始由乎種德再典大郡二為仙郎舉十大夫是則是斆且年不及壽而位未稱德朝多其能歿而獨贈公則晉州之第三子也語而能文有識便知為兒則量過黃髮未仕而心在蒼生伯達試經子炎應詔古之人也我不後之八歲神童舉試毛詩尚書論語及第解褐補祕書省校書郎歷睿宗安國相王府典籤東觀載筆班固名香西園賦詠劉楨氣逸轉國子主簿檢校詹事府丞學識宜在儒林風度雅膺儲寀河南府士曹參軍考功員外郎公府屈廊廟之才曹無留事仙郎明黜陟之法野無遺賢右司兵部二郎中長安縣令其在含香一臺推妙以之製錦四海是儀公之斷獄也必原情以定罪不阿意以侮法是以小失天旨出為此州刺史公推善於國不稱無罪思利於人志其屈已戮豪右以懲惡一至無刑旌孝弟以勸善洪惟見德然後務材訓農通商惠工敬教勸學授方任能行之一年郡乃大理襁負而至何憂乎蕩析之人路不拾遺何畏乎穿窬之盜既富之矣汲黯奚取於開倉使無訟乎仲由何施其折獄居無何詔封東嶽關東列郡頗當馳道至於犧牲玉帛資糧屝屢其或不供為有司所劾因而厚斂非天子之意豐省之度多不得中故二千石有不能受事於宰旅者矣季孫請魯視邾滕濤塗恐師出陳鄭抑為是也公盡事君之心且曰從人之欲萬斯箱之粟茲乃如京百執事之人於我乎館四封之境二為帝庭一郡之賦再粒天下士卒林會馬牛谷量皆投足獲安端拱取給無虞燥溼不畏寇盜草莽之中用能便其體羇絏之外無所勞其力天朝中貴持權用事厚為之禮則生我羽毛小不如意則成是貝錦公享有常牢覿無私幣冒貨賄者我以為仇淫芻蕘者吾所能禦至於急宣中旨暴征庶物或命嘉蔬先春當薦錫貢珍果非土所生舉是一隅其徒千計皆曾不旋踵若取諸懷又不知其備預之所以然也謂餼牢竭矣而家有餘糧謂疲勞甚矣而人有餘力豈非積年之儲用之有度終身之逸使之有時不然班貢藝事輕重以列我視子男之國而倍公侯之征今日之事我為上也大駕還都分遣中丞蔣欽緒御史劉日政宋珣等巡按皆嘉公之能奏課第一公未受賞朝而歸藩天災流行河水決溢蝗蟲避境雖馬稜之化能然洪水滔天固帝堯之時且爾高岸萃以雲斷平郊豁其地裂噴薄雷吼沖融天回百姓巢居主客有其家室五稼波殄沼毛荒於犬畝公急人之虞分帝之憂御衣假寐對案輟食不候駕而星邁不入門而雨行議隄防也至則平板幹具餱糧揆形略趾量功命日而赤岸成谷白濤亘山雖有呂梁之人盡下淇園之竹無能為也乃有壞防之餘衝波且盡僅在而危同纍卵將墜而間不容髮公暴露其上為人請命風伯屏氣以遷迹陽侯整波而退舍又王尊至誠未足加也然後下密楗搴長茭土簣雲積金鎚電散公親巡而撫之慰而勉之千夫畢飯始就飲食一人未息不歸蘧廬惰者發憤以躒勤懦者自強以齊壯成之不日金隄峨峨下截重泉上可方軌北河回其竹箭東郡鬱為桑田先是朝廷除公宣州刺史公惜九仞之垂成恐衆心之或怠懷絲綸之詔密金玉之音率負薪而益勤親執撲而彌勵既成乃發書示之皆捨畚攀轅廢歌成泣淚洏濟袂澤陰魯郊哀哀號呼不崇朝而達四境噫公之視人也如子人之去公也如父宜其升聞於天司我五教公之富人也以簡簡則不擾而人得肄其業非富歟公之愛吏也以嚴嚴則畏威而吏不陷於罪非愛歟是其大旨也至若沛郡謂為神明淮陽謝其清淨尊經於學校魯風載儒加信於兒童齊人不詐明間視聽其察姦也無全曉習文法於決事乎何有六義之製文在於斯五車之書學半於我其為身計保乎忠貞將為孫謀貽以清白熊軾之貴子弟夷於平人龍門則高賓客不遺下士非禮不動出言有章語曰愷悌君子人之父母其是之謂乎維也不才嘗備官屬公之行事豈不然乎維實知之維能言之況夫婦男女思我遺愛者吟詠成風耆艾人吏願頌清德者道路如市則王裦所講奚斯之頌美政盛德綴詞之士固未嘗闕如也維敢拒之哉頌曰童子何知兮公邁成人大不必佳兮公德日新天生德於公兮遺此下民天子命我兮守茲東郡人調公以謫去兮不能致訓公曾不私已兮政聲益振惟歲十月兮帝封岱宗千乘萬騎兮行幸山東小郡之賦兮再粒萬邦豐不盈儉不陋兮公之舉也得中河為不道兮離常流以痡毒不用一牲兮不沈一王身當中流兮馮夷感而避賢敕陽侯兮使却走夫洪漣板築既具兮薪又屬庶人欣以就役兮高岸崛起於深谷人降邱宅土兮桑田鬱以載緑行無五馬兮食不載味惠恤鰥寡兮威讋黠吏公之德兮曾無與二人思遺愛兮淚淫淫歲久不衰兮至今性與天道吾不得聞兮志其小者近者兮已是過人之德音雲從龍風從虎氣應也聖人作賢人輔德同也君臣同德天地通氣以康九有以遂萬類惟皇御極二十載光格四表至於海隅日出越小大邦蠻貊師長罔不欽於成憲以承天休然天子猶日省三揖一作接列辟日聽萬方輿頌懼人有未化賢有未登故揚仄陋兼乎十等選宗室及乎九族任事以觀材積時以觀行乃得我賢京兆焉夫京兆號為難理清淨病於不給刀筆拘於守文或以軟弱廢或以賊殺劾把宿負淺為丈夫用鉤距蓋非長者我則異於是大道難名大理無法閉關於任數巧算不能知堅壁於畫一善政不能下摧宿豪如剃草無慍色視大權如歷塊無傲容百司之務一作吏總以奇而得正一作總一德以咸服五方之人雜異教而同理受命之始先聲已振黠吏惡少聞風改行及乎鳴騶詣府登堂坐定縣尹掾史以次上謁守正之人其氣高含章之人其詞大見容色而聞號令小人戚而君子泰日者櫟陽男子閭里為豪借客報仇聚人為盜或白日手刃或黃塵袖椎政寬則以身先諸偷操急則以事中長吏二過不已萬計自脫公命吏縛之立死鈴下於是人入暗室若遇大賓焉前年不登人悴太甚野無遺秉路有委骨天子不忍征於不粒賦於無衣六軍從衛以臨東諸侯息關中也帝曰咨天其降威人罔畏罪台恐寇盜乃邑矧曰蕩析離居惟爾克濟撫茲方夏一作西土公拜稽首思塞休命布慈惠之政不以利淫振雷霆之威其或宥過饔人減雙雞之膳圉人省五馬之秣陶不獻服圬不塓館自身已往振廩同食雖人煙不動道殣相望不思濫以苟生咸守教以就死是不可能也先是王公或專南山之利司農涸昆明之池收赤岸澤將為田以便官至是悉奏罷之舟鮫衡麓之守廢蒲荷薪蒸之産入自郊徂邑室有魚飧斬陰伐陽市多山木人得以贍唯涇有防比歲多決近縣疲於力役他山匱於度林公命刮朽壤填巨石辦大木去編菅其始告勞乃終有慶匠石日減功萬藏史日省錢億農始竟耒女始安織於是台背黃髮之老曰我有田疇鍾秉其畝我有子弟顏閔其行鄉黨以睦惸失其獨道路有禮汰無與爭酒先養老賄不問吏既無犬吠亦無姦人臨年餘資幸蒙惠化其曷以臻茲君子曰此天子至公內舉不避親錫汝明尹張公之力也夫公於國為外戚於帝為外弟重組纍印珥香貂者七葉奉車駙馬乘朱輪者十人勝衣則綺襦紈袴通籍則玉墀青瑣動則兩驂如舞坐則五鼎成列文軒楚製素女趙舞而公儼兮其若客淡兮其無味心在四教語稱七德目視六籍口誦九歌懷君子令德之忠保詩人錫類之孝悌有過於共被慈有踰於含食惡衣以居公服不敢降也屈體下士王網不敢替也協二姓之好以正人倫旁無嬖御分一人之憂以審官政下多英傑若夫皇帝敬問之詔御札自書天王命賜之衣上宮所製勞勤則中使接武計議則走馬來朝豈惟衆臣重其經術為吏雜以儒雅而已且公之一有德字升聞於天非一朝一夕之漸也亦以稱職於纍官著聲於所在其丞祕書也闕文遺簡多在大家深為子孫之藏密有緘滕之固公不憚權貴或抵或誘盡歸天閣官書備焉其牧郢也人有不若德戮之不為暴人有不保居撫之不為諂存者考其事壯其食以畜之行者緝其宮藝其樹以待之此邦之人既優他邦之人又重一作至焉未盈一歲遂增萬戶其守汾也仍歲大旱郡祠介推雖屢舞仙仙而靈應未若公命束縕取火伐樹置薪釃酒而祝曰有功於人祀為明神無德而祿禍亦覆餗自絳以來人實祀子純犧大璧不敢愛必以薦也童男季女不敢黷必以敬也神既靡答人將安仰若亭午而雨則樹其鷺羽執此騂毛不然者火燎將至焮天鑠地靈衣且為煨燼豐屋將為茂草爾其圖之言未畢而雲興拜未起而雨降周於闔境不入他郡雖封疆咫尺而彼竭我盈嘻若記能事載盛德渭川之竹不足簡終南之木不足軸夫訓人至於禮義曰德安人免於阽危曰功功德者上賞於上下頌於下長老孜孜願刊於石以豫學於舊史來即我謀且維與人編戶與人為伍與人出入與人言語知風俗之淳斃識政化之源本屬詞愧文書事蓋實詞曰五代相韓七葉侍漢及我聖朝亦生邦翰大道無形貞蠱以幹含章不耀在割能斷情偽萬端吾道一貫帝選賢尹無以易張金印紫綬京兆之良佩我鳴玉冠我兩梁天子休命拜手以將寬而愛人立滅暴強明明天子哀此南畝將息西人遂覲東后我教我訓我鎮我守茫茫三秦則罔糊口守死以義徇生不苟王曰外弟視人不佻何以寵之手書以詔何以問之賜衣而朝俾人華胥致君帝堯刻石作頌永世彌昭五方殊俗魏風婉而其人舒九土異宜冀田壤而其賦錯前政有寬猛之異時令有班藝之差非夫酌舊典於可行啓新圖於必當多方而不失正一貫而或從權曲成便人大抵厚俗選衆而舉非公而誰公先自吏部侍郎出為安康郡太守某載月日詔以公為魏郡太守河北道採訪處置使公諱晉卿字元輔潞州壺關人也其出處本末奕世冠冕國史家牒詳焉凡邦伯到官詔使按部或閉閣思政或下車作威或劾吏為明或移書示禁公異於是可略而言公素號賢一作鮮明積有治行宿訟不決之務餘地割分疑獄自誣之枉容光立照故陋其思政也安全長吏不逐老丞成就諸生先教小吏道德齊禮有恥且格故鄙其作威也謝亭長之問勞野次之賢吏悉謂為神明人不隱其毫髮故無事劾吏也列郡共職清節銷其過求諸曹報薄直筆破其汚詆故不待移書也山東古之七雄河北有其四國地方數千里人蓋億萬計獻子三歎之饋滋無舊德平原十日之飲顧有遺風朱亥袖椎豪雄扼腕曹王拂局輕薄為心奢泰擬都護之堂遲緩學邯鄲之步公抑末計一作技而敦本斥浮食以歸業督課八政擇良吏以遣行講求六籍置學官於便坐於是橫經左孰力穡先疇盡業農桑大興庠序家知禮義更式段子之廬戶有京坻增修史起之廟叢臺歌舞成市鄴郡帝王舊都袨服靚妝挾築跕屣淇上留客河間數錢公課其組紝之庸開其婚嫁之節冶容絶四方之袖織室致五匹之工刑於上官訓及處子鄭聲衛樂共棄師襄趙帶燕裾思齊漆室漁陽騎客奏報本朝鯷海樓船連漕絶域郊迎館給不敢淫其芻蕘水路陸衢盡若安於枕席某載月日詔賜紫袍玉帶金魚袋衣若干副方伯十聯賴其澄清之轡天子七命賜以安吉之衣緹油屏車璽書增秩未是過也勝殘之化既成觀俗之風允穆優遊無事學宦思歸況乎父母之邦近在嬰兒之國表請拜掃有詔許焉預約守宰幸無偵候至郡則投刺上謁至邑則舍車而徒展禮先塋椎心泣血回趨長老稽顙緒言宗人族姻姑黨姪行覿以重幣筐篚遍於里閭享有加牢牛酒溢於衢陌朱軒駟馬耀於衡門紫綬雙龜出入編戶蘇公佩印始歸鄉里盡歡疏傅散金不與子孫為計逮乎將去仍以餘資一里置社備養生送死之具一鄉置校開説禮敦詩之本相如衣錦且飛大漢檄書買臣懷綬不德長安廏吏故使巴蜀太守負弩前驅會稽守丞引章下拜此蓋恨不禮於他日思釋憾於故鄉是輕桑梓之人適騁斗筲之志豈若公自心而至率禮無違來悅去思推才降體平陽傳舍不許望塵山陰吏卒詎聞治道富貴還鄉榮之至也揚名顯親孝之終也凡百君子無一至焉公當九伯之官兼八使之任深總之體不求於無虞闕六字於草竊政成德舉風動神行頃有勳臣旁典屬郡曩者風雲際會攀附騰驤貪天之功以為已力謂國不忘尚嘉乃勳宋父宣驕條侯倨貴當關常從橫恣不法帷帳狗馬僭侈踰制公劾之則重傷國恩置之則大廢邦典於是喻以禍福告之話言昔有不愛趙城將蹈滄海既尊漢室願遂赤松功成不居道家所韙至於析圭分組跨壤連州懷四術而自疑見九重而失望或寃家上變司敗受辭朝享膏粱寧知獄吏暮成葅醢遍賜諸侯難恃白馬之盟徒思黃犬之樂雕牆峻宇萬乘猶憚十愆紫衣狐裘一朝而數三罪雖嫌絳灌等列不逾梁楚為墟於是翕肩振驚折節受教杜門謝絶賓客終身不紊紀綱以寬服人實在有德厥有挾左道飛訛言南國青珠之符東海赤刀之術分風送客割水飲人偽辨而納之於邪善誘而濟之以惡戶外多保汝之屨恐為亂階門前無長者之車知其惑衆公奉誅首惡悉宥面從丕蔽要囚惟良折獄議事以制不徵於書副至仁之納隍用輕典於平國刑期不濫人乃大安奏課計功天下小察責吏以實則舉其不矜欲人自新則貰其宿負官以德舉政以禮成至於賞善勸能正源端本齊風變魯蓋以悉禮名儒晉盜奔秦豈俟多誅惡少納貢獻賦則惟恐居後酬庸命賞則義不敢先布以聖恩奉宣明主之詔問其理狀對用議曹之言邦家之光其斯謂矣年若干秀才擢第應制舉第若干等授某官歷某官若夫明眸白皙玉潤珠耀美秀備於儀形風流發於言笑行之方也留如守司智之圓也速若發括量包㣥有思入無間壞壁古文曲臺遺禮淮王九師之易漢氏三家之詩傳癖書淫鷹揚學府比文園入室之武同丞相登科之策奏甚平讞詩窮綺靡研燔紙貴虎視詞林嘗奉和聖製雨中春望詩云雨後山川光正發雲端花柳意無窮又奉和行幸詩云接仗風雲動迎軍鳥獸舞時人以為鮑參軍謝吏部為更生云某年月日詔除公河東太守兼採訪使官吏百姓等或守闕乞留或遮道更借淚增時雨思結仁風親愛之深諱名而號為父歌詠不足取姓以命其兒公既去官多歷年所人思愈甚共立生祠異邑居而瓦合無契約而鹿君至恐不預於聚財懼不任乎輸力棠樹勿翦何如審像圖形桐鄉置祠豈比耳聞身及以此觀德何德之深仍建豐碑立於祠宇匍匐千里前後百輩求綴詞之客為頌德之文維也竊比老農不知舊史衆心所至難抑與於輿人豫病未能不獲已於求我乃為頌曰禹別九州漢分八使實惟方伯且曰連帥建節乘軺觀風察吏山東河北全趙大魏授方任能惟名與器蓋非其才孰享斯位天子命我導揚皇風敬教勸學通商惠工法去太甚政貴得中守丞老病小吏童蒙督郵不遂博士成功遂安賢者大啓儒宮四國之餘一都之會平原舊俗信陵遺態博塞以遊椎埋為害叢臺淇水燕裾趙帶淳化旁屬貞風俶載劈纊卷綃橫經秉耒清節峻邈碩量宏深投書置水酹酒捐金樹德滋蔓持刑不淫訛言免坐倨貴懷音繡衣罷斧墨綬停琴既此時雨當聞作霖申哀松柏展敬桑梓伏謁公門徒行故里椎心馬鬣啓顙鯢齒身紆紫綬禮及童稚帝賜黃金盡於筐篚社養宗人學招邑子能事具舉令問允穆璽書改印緹油轉轂壁挂胡床舍留官犢人吏老幼涕泗號哭頌德豐碑圖形華屋閲實數美移晷更僕
