front:
  text: 全唐文欽定全唐文卷八百九十五羅隱二
  hash: sha256:2ac093e55015ae6f151187f9e323beecae59168f96281d6f767ee299c2422b9b
body:
  text: 某啓某前月某日輒以所為讒書一通貢於客次尚書俯憐羇旅遽賜霑濡既受厚恩則宜前去然而疆境有牽於感慨風烟或軫於追思所以公子亭邊重噓懦氣侯嬴關畔再轉危腸何昔時有殉義之人而今日無死恩之士輒復更彈馮鋏上指膺門某也江左孤根關中滯氣強學早亡其皮骨趨時久困於風塵福星不照於命宮旅火但焚其生計徘徊末路惆悵危途覽八行之詔書空仰聖人在上詠五言之章句未知遊子何之興言而幾至銷魂反袂而自然流涕尚書蘊稷契皋夔之事業負卿軻遷固之文章入則藻鏡冰壺品量人物出則油幢瑞節控御山河固已藏雷於伺蟄之時待夢於驅羊之際苟有一物未登其所一夫不遂其懷亦宜上下聰明旁徨憫惻儻或王衍之雌黃借潤仲尼之日月回光則其人也三千里之別離免為虛滯十五年之勤苦永有所歸發自門闌百生知感謹啓某啓某伏以內揣荒蕪早乖投獻近者某官曲傳尊旨伏蒙郎中賜及卷紙令寫近詩捧對優榮莫知所處某利非楚鐵鈍甚燕錐濩落危根低摧壯節藏豹之功夫不至屠龍之事業愈疏爰自南國辭耕東堂奉貢劍迷船畔膠在柱間靡旗而何啻再奔繞樹而豈惟三匝所以騷人避熱不忘吹虀元客求聞長憂蓋醬姑息於輿臺之類殷勤於閽侍之徒而猶往往拒關時時毀櫝豈謂郎中俯敦吾道欲堰頽波不憚客嘲先從隗始寓剡藤而下授指巴句以旁徵榮異當年事殊近俗而况風流漸泯翰墨難言別路萬般中堂千里雖欲壞虞卿之屩詎肯動心哭羊陟之門何嘗留意復安有對紛華而輟玩叩寂寞以搜遺因使斯文亦歸清鑒揣厚旨而時猶可待荷殊私而力欲不任寧惟元晏吟時空增紙價兼冀武卿窺後免逐灰寒謹啓某啓某揣摩不至蹇剝無圖爰自畫虎貽譏掇蜩逞傴轗軻於風塵之際流離於灰琯之間雖瀝膽隳肝竟將誰訴而煎皮熬髮終不自醫已甘與物浮沈隨波上下今月某日見某官伏知郎中玉壺委鑑金口開談謳雲於道士梁間校籍於真官筆下欲使餘杭美酒必醉蔡經崑嶠仙桃先霑曼倩承吉兆而心神駭越對嘉音而涕泗縱橫某散拙非才牽纏失計通衢十二惟敝黑貂故里三千但勞黃耳欲索身而莫可將問路而愈迷若非郎中暖律旁吹和風外扇擢之於枯荄之側致之於芳英之中則蝶舞鶯啼空緘永恨春來秋去便過此生謹啓某啓某聞鄭司農之東去絳紗感深吾道謝記室之西辭朱邸戀切所知雖定名之分則殊而懷德之心不異其有棲羸樂廄養病醫門海燕辭巢即摧萍影林烏繞樹忽軫蓬心又安得下棄席於詩人感崩波於行客某也風塵下物天地中材光逸門寒無因自進揚雄口吃徒欲解嘲屬者尚書置驛恩寬敦風志大孔文舉之干元禮既忝登門徐孺子之謁陳蕃俄蒙下榻淹延館宇荏苒春秋稻粱有異於他人觴豆時陪於上客那言此際遽愴離聲背重德於邱山揖紅塵於道路緬懷今日杳不勝情加以貢部傷心名場落羽獸因鬬困羊以多亡前瞻既倦於吹韲內顧徒悲於求劍昔也來慚賦雪謬稱梁苑之游今則去類乞師己抱秦庭之哭倚征輪而悵望指斷鞭以夷猶尚書儻或仙客壺中旁均日月山公啓裏別借篇題無令一葉先秋遂對滿堂垂泣捨此丹須九轉桃指千年天也何如時乎不再謹啓某啓某今月十九日已至界首回望旌棨涕泣不任某莊櫟粗疏庾膏昏鈍不能量力嘗欲干名隨貢部以悽惶將鄰十上看時人之顏色豈止一朝進則刺滅許都退則歌終漢壘地雖至廣人莫相容憑執爨以無由假鄰光而不得常侍獨於此際降以深仁奏仇覽之官資近陳遵之尺牘福由無妄榮亦何酬近者以江表嵗饑吳中力困旨甘既闕晨夕縈懷常侍不顧人言將逾事例給使府留州之物代衡陽計嵗之資俾以東歸救其栖旅蔡澤北遊之日瓶甑不存陸生南返之年士冖䂞裝皆滿聊將自衒粗可諱窮但以感切違梁情深去魯辭畫㦸而心猶似醉上孤舟而淚始如流蓋以非故舊之由緣無強近之慰薦只因獎善便與致身如某之孤賤者則多似某之遭逢者則少以茲自誓安可暫忘今則尚有回期猶寬旅思石尢風定橋口浪衰展片席以高飛指重湖而直過地名北渚長牽楚客之心水到東吳敢忘湘江一作波之色謹啓長官鏤筆才清探驪價重因循世態放蕩宦游劇談以雞肋况時偶對以馬曹當職而自黃塵北望翠輦南巡張掾投一作抽簪雖離齊邸陶公染翰本慟晉朝於半郊半郭之中有一咏一觴之趣為謀甚逸所得何多芳草遠山才供掇拾晴陽媚景別受指撝登臨則光祿寒山悲歎則雍邱明月憑何徑隧達此津涯某海曲迷聲壽陵忘步蛇虛畫足鵠不中心將風霜委地之姿值兵革滔天之日正平剌滅屢窘輿臺叔夜燈殘頻逢鬼魅梁苑之舊游永已鄴都之作者寂然豈謂長官獨好斯文仍流散地牙絃久絶秦缶增慙那言吾道陵遲猶見騷人風骨牽牛不暇希驥莫從輒敢效彼蠅頭騰於魚網保持所切已高黃絹之名傳寫可知旋長烏絲之價謹啓余窮棄長安中二三年時時於游騁間面人未嘗決胸臆事真自謂是非顛倒不復得見其人一年遇生於靖安里中相其吐氣出詞落落有正人風骨余既急於近已而生亦以節概見多自是出處游息不復狎他人矣雖患難厄窮毀譽進退得喪未嘗不同之有時因事慷慨發涕泣相感以為讀書不逢韓吏部作人不識陽先生信吾徒之弊也宜矣後一年俱以所為道請於有司既不能以偷妄相梯又不能挾附相進果於數百人中不得吏部侍郎意由是知余者弔余以色不知者嘻余以聲愧負倣徨撲浣無所既三月生以故東出鄒魯間雖下第之緒與將別之緒相煎然鄒魯聖人之鄉亦足以暖生之憔悴夫聖人羈旅七十國也以君臣父子道未昭塞天地間獨栖栖耳是聖人患乎教不立而不患乎名不彰設使其早率一城嘯一旅則周之一諸侯材具復安有今日功業乎生聖人徒也不當以聖人道為利家染後狹其所歸且為余整衣冠拜朝堂下酌其車服禮樂之數升降揖遜之儀思量侯伯卿士中復有夫子罪人否還日以言極之去矣青門曉開無一器酒以澆恨明天子在上不敢哭以致懷勉之哉行與不行也在生道耳第與不第也其如生何讒書者何江東羅生所著之書也生少時自道有言語及來京師七年寒饑相接殆不似尋常人丁亥年春正月取其所為書詆之曰他人用是以為榮而豫用是以為辱他人用是以富貴而豫用是以困窮苟如是豫之書乃自讒耳目曰讒書卷軸無多少編次無前後有可以讒者則讒之亦多言之一派也而今而後有誚豫以譁自矜者則對曰不能學揚子雲寂寞以誑人隱次讒書之明年以所試不如人有司用公道落去其夏調膳於江東不隨嵗貢又一年朝廷以彭門就辟刀機猶溼詔吾輩不宜求試然文章之興不為舉場也明矣蓋君子有其位則執大柄以定是非無其位則著私書而疏善惡斯所以警當世而誡將來也自揚孟以下何嘗以名為而又念文皇帝致理之初法制悠久必不以蟣蝨癢痛遂偃斯文今年諫官有言果動天聽所以不廢讒書也不亦宜乎潁川陳先生諱黯字希孺曩者與豫聲跡相接於京師各獲譽於進取咸通庚寅嵗膠其道於蒲津秋試之場自後俱為小宗伯所困不一至甲申春告豫以婚嫁之牽制東歸青門操執之後余亦東遊逮大梁時故杭州盧員外潯在幕齎其文軸謂余曰陳君罷而東豈其斯文之終窒乎豫東及之為我歸其文而激其來余至維揚及歸其文遵其言相歡月而後別為我謝范陽公龍門之役不復顧矣由是音塵杜絶天復元年四門博士江夏君通家相好於吳越面余論及場中曩之名士及希孺之表也余不覺愴然懷舊明年黃君以其文章德業為之序以寄俾豫繫述遂得申斯言嗚呼大唐設進士科三百年矣得之者或非常之人失之者或非常之人若陳希孺之才美則非常之人失之者矣德行莫若敦於親戚文章莫若大於流傳今已備於江夏之筆矣余不克再敘止書交道於是噫隱大中末即在貢籍中命薄地卑自己卯至於庚寅一十二年看人變化去年冬河南公按察長沙郡隱因請事筆硯以資甘旨明年隱得衡陽縣主簿時硤州盧侍御自龍城至右司張員外遊曲江回皆謂隱不宜佐屬邑於戲隱自卜也審江表一白丁耳安有空將卷軸與公相子弟爭名幸而知非得以減過冬十月乞假歸覲阻風於洞庭青草間因思湘南文書十不一二蓋以失落於馬上軍前故也今分為三卷而舉牒祠祭者亦與焉某月二十四日序惟天子建國必維九牧九牧既序區分局署兩漢三公府有掾屬魏晉而降則置行臺若魏以秦王儀鎮中都一作山高齊以辛術監治東徐州事皆行臺之任也其官屬則令僕以至於尚書丞郎唐制由行臺而置採訪使殆今節制之始也鎮海軍舊治京口大丞相以錢塘之衆東戡漢宏西殲逆朗天子不欲易其土故自符竹四命然後移軍於錢塘生物以宜租賦以便斥去舊址廣以新規廓開閈閎拔起階級俾幢節之氣色貔武之出入得以周旋焉庚申年加闢大廳之西南隅以為賓從晏息之所左界飛樓右劘嚴城地聳勢峻面約背敞肥楹巨棟間架相稱雕奐之下朱紫苒苒非若越之今而潤之舊也疆埸之事則議之於斯聘好之禮則接之於斯生民之疾痛則啓之於斯軍旅之賞罰則參之於斯非徒以酒食駢羅而語言嘲謔者也其府屬以下或八都舊將或從公於征或稟之於朝廷或拔之於鄉里故天子用清宮傳道之選以佐之輟教民論道之任以副之其餘省秩卿曹職領相次自我朝藩服官屬之盛無加也噫大丞相之勳德既藏之天府而攀鱗附翼者非鐫刻樂石其可久乎是年冬十月始命觀察判官羅隱為記天下自懿考僖皇之後綱領不振龎勛王郢抵觸於前仙芝君長踐踏於後尋乃黃巢大掠於京城所以齊寇攘臂一噪四海瓦解自爾枝牽蔓引耳聞口吠其或一壘之不謹一版之不嚴則刳剔之不暇雖十室之邑三戶之鄉必壁塹以備之籬落以抗之况大藩之襟帶吾土之翳倚者乎杭之別部舊有八都之目其始以破山偷旌八將之功所致也而東安主領太師杜公尋以擒逆賊薛朗於京口破丁從實於毗陵天子寵之拜常州刺史遂屬其兵於子弟焉撫於內者曰建思禦於外而弭寇摧凶者曰建徽經度於季孟之間者曰建威洎太師解印而歸淮叛淝偷連壓封部元帥大丞相彭城王始授君以板築之要濠塹之廣袤地里之橫亙皆取則於丞相一之日鳩其人民相其險易惟帥有令衆克從之二之日度其資費卜其力用經之營之厥畫惟稟三之日命其將李可球胡瑾等曰汝常從役於杭必能識大丞相意善匠事勿令不如丞相指揮曰侔汝工曰溫汝率鐸令等二十一將翼侔以進曰曰受洎儼汝督防遏備禦二都之士卒以介於侔之左右曰勛汝司吾儲廩謹吾出入城者若有墜惟汝之咎起大順辛亥年秋七月壬戌訖於明年夏四月庚寅蟠東矗西離連坎接隆者就之漥者盈之民不弛擔時不妨農夏五月太師犒㣥帥於城下若杵若畚者皆與焉不三四年淮南節度楊氏行密以稱盜豕突猘衝擾我疆境而東安尢為其所忌行密減安仁義之精鋭分田頵陶雅金威之敢勇以攻東安城樓櫓翔空矢石交迸翊日我軍憑其城斃賊將於城下者其數盈千濠塞塹自是㣥寇不復有圖南之意是知人非城則無以為捍城非人則無以自固不有城也人何以安不有將也城何以堅於時紫溪竄堡火口建寧下守靜江無將奔我而活者四鎮之生聚焉噫天下之無事也吾鄉則有河間凌準宗一濮陽吳降下已汝南袁不納還朴以文學進天下之有事也吾鄉則有太師建徽伯仲及諸將佐以武藝稱豈文武之柄倚伏而然也抑江山稟受與時消息者乎隱亦常以先師之道干名貢府進取未半九鼎羹沸文既不用武非所習今則老矣高謝三軍太師以鐫金勒石見徵不敢堅遜乾寧五年六月二十一日記大凡藩籬之設者所以規其內溝洫之限者所以虞其外華夏之制其揆一焉故魯之祝邱齊之小穀猶以多事不時而城况在州郡之內乎自大寇犯闕天下兵革而江左尢所繁併余始以郡之子城嵗月滋久基址老爛狹而且卑每至點閲士馬不足回轉遂與諸郡聚議崇建雉堞夾以南北矗然而峙帑藏得以牢固軍士得以帳幕是所謂固吾圉以是年上奏天子嘉以出政優詔獎飾以為牧人之道其盡此乎俄而孫儒叛蔡渡江侵我西鄙以翦以逐蹶於苑陵徑弩之次泛舟之助我有力焉後始念子城之謀未足以為百姓計東眄巨浸輳閩粵之舟櫓北倚郭邑通商旅之寶貨苟或侮劫之不意攘偷之無狀則向者吾皇優詔適足以自榮由是復與十三都經緯羅郭上上下下如響而應爰自秋七月丁巳訖於冬十有一月某日由北郭以分其勢左右而翌合於冷水源綿亙若干里其高若干丈其厚得之半民庶之負販童髦之緩急燕越之車蓋及吾境者俾無他慮千百年後知我者以此城罪我者亦以此城苟得之於人而損之己者吾無愧與某年月日記沛后既得秦蕭何改秦之法故闕三章之約焉而何竟自汙者豈非欲刑其德於萬代乎不然奚繫之在人先也且漢之功臣何居第一何不首行其法則後之立功為相者雖貪黷規弄而法必不加則亂臣賊子於是幸矣何之法不救當時而豈救後代乎於維此井渟育坎靈有莘有邰實此儲英時有長虹上貫青冥是惟王氣宅相先徵爰啓霸主奠綏蒼氓沛膏漸澤配德東溟風雨雪霜天地之所權也山川藪澤鬼神之所伏也故風雨不時則嵗有饑饉雪霜不時則人有疾病然後禱山川藪澤以致之則風雨雪霜果為鬼神所有也明矣得非天之高不可以自理而寄之山川地之厚不可以自運而憑之鬼神苟祭祀不時則饑饉作報應不至則疾病生是鬼神用天地之權也而風雨雪霜為牛羊之本矣復何嵗時為復何人民為是以大道不旁出懼其弄也大政不問下懼其偷也夫欲何言上帝既剖混沌氏以支節為山嶽以腸胃為江河一旦慮其掀然而興則下無生類矣於是孕銅鐵於山嶽滓魚鹽於江河俾後人攻取之且將以苦混沌之靈而致其必不起也嗚呼混沌氏則不起而人力殫焉堯之時民朴不可語故堯捨其子而教之澤未周而堯落舜嗣堯理跡堯以化之澤既周而南狩丹與均果位於民間是化存於外者也夏后氏得帝位而百姓已偷遂教其子是由內而及外者也然化於外者以土階之卑茅茨之淺而聲響相接焉化於內者有宮室焉溝洫焉而威則日嚴矣是以土階之際萬民親宮室之後萬民畏商之道削也武丁嗣之且懼祖宗所傳壞於我祈於人則無以為質禱於家則不知天之歷數厥有左右民心不歸然後念胥靡之可升且欲致於非常而出於不測也乃用假夢徵象以活商命嗚呼歷數將去也人心將解也說復安能維之者哉武丁以下民之畏天命也故設權以復之唯聖能神何夢之有夏之癸商之辛雖童子婦人皆知其為理矣然不知皆當其時則受其弊居其後則賴其名夫能極善惡之名皆教化之一端也善者俾人慕之惡者俾人懼之慕之者必俟其力有餘懼之者雖寢食不忘之也癸與辛所謂死其身以穴過者也極其名以橫惡者也故千載之後百王有聞其名者必縮項掩耳聞堯舜者必氣躍心跳慕之名與懼之名顯然矣而慕之者未必能及懼之者庶幾至焉是故堯舜以仁聖法天而桀紂以殘暴為助堯之庭有神羊以觸不正者後人圖形像必使頭角怪異以表神聖物噫堯之羊亦由今之羊也但以上世淳朴未去故雖人與獸皆得相指令及淳朴銷壞則羊有貪很性人有刲割心有貪很性則崇軒大厦不能駐其足矣有刲割心則雖邪與佞不能舉其角矣是以堯之羊亦猶今之羊也貪很搖其正性刀匕刲其初心故不能觸阿諛矣唐虞氏以傳授得天下而猶用和仲稷坰人坰以醞釀風俗堙洪水服四罪然後垂衣裳而已百姓飲食而已亦時之未漓非天獨生唐虞之能理也及商湯氏以鳴條誓放桀於南巢揖遜既異渾朴亦壞伊尹放太甲立太甲則臣下有權始於是矣而曰恥君之不及堯舜鳴呼商湯氏之取非唐虞氏之取也商湯氏之時非唐虞氏之時也商湯氏之百姓非唐虞氏之百姓也商湯氏之臣非唐虞氏之和仲稷坰人坰也伊尹不恥其身不及和仲稷坰人坰而恥君之不及堯舜在致君之誠則極矣而勵己之事何如耳惜哉禰正平阮嗣宗生於漢晉間其為當時禮法家惋者多矣然二子豈天使為之哉夫漢之衰也君若客旅臣若豹虎晉之弊也風流蘊藉雍容閒暇苟二子氣下於物則謂之非才氣高於人則謂之陵我是人難事也張口掉舌則謂之訕謗俯首避事則謂之詭隨是時難事也夫如是則漢之祚殲於外晉之祚縮於中故天必降變以應之二子應天變者也或號咷焉或慟哭焉斯甚於風雨雪霜已故泣軍門者謂皇皇而無主歎廣武者思沛上之英雄越心未平而夫差有憂色一旦復築臺於姑蘇之左俾參政事者以聽百姓之疾苦焉以察四方之兵革焉一之日視之以伍員未三四級且奏曰王之民饑矣王之兵疲矣王之國危矣夫差不悅俾嚭以代焉畢九層而不奏且倡曰四國畏王百姓歌王彼員者欺王員曰彼徒欲其身之亟高固不暇為王之視也亦不為百姓謀也豈臣之欺乎王賜員死而嚭用事明年越入吳有覆於上者如天載於下者如地而百姓不之知有恩信及一物教化及一夫民則歸之其猶旱嵗與豐年也豐年之民不知甘雨柔風之力不知生育長養之仁而曰我耕作以時倉廩以實旱嵗之民則野枯苗縮然後決川以灌之是一川之仁深於四時也明矣所以鄭國哭子産三月而魯人不敬仲尼理天下者必曰陶唐氏必曰有虞氏嗣天下者必曰無若丹朱無若商均是唐虞為聖君丹商為不肖矣天下知丹商之不肖而不知丹商之為不肖不在於丹商也不知陶虞用丹商於不肖也夫陶虞之理大無不周幽無不照遠無不被苟不能肖其子而天下可以肖乎自家而國者又如是乎蓋陶虞欲推大器於公共故先以不肖之名廢之然後俾家不自我而家而子不自我而子不在丹商之肖與不肖矣不欲丹商之蒙不肖之名於後也其肖也我既廢之矣其不肖也不淩逼於人是陶虞之心示後代以公共仲尼不泄其旨者將以正陶虞之教耳而猶湯放桀武王伐紂焉
