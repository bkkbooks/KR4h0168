front:
  text: 全唐文欽定全唐文卷五百三十八裴度二
  hash: sha256:2dd1382255da6adb0416a963b658edf2d9bf0da1fe825f8e1de7f03e3364f2a5
body:
  text: 前懷州武德縣令王賞以失縣庫子賞乃盡償所欠緡錢庫子莫可得獄固難竟河陽節度使溫造嚴刻禁賞三年母老不得侍疾母亡不得服喪大理寺執文斷疏疑似之間寃滯深久下缺冢宰是殷周六官之首既掌邦理實統百司故王者諒暗百官有權聽之制後代設官既無此號不可虛設且國朝故事或置或否古今異制不必因循其諸司公事望請中書門下處分前者唐生至自滑猥辱致書札兼獲所貺新作二十篇度俗流也不盡窺見若愍女碑烈婦傳可以激清教義煥於史氏鐘銘謂以功伐名於器為銘與弟正辭書謂文非一藝斯皆可謂救文之失廣文之用之文也甚善甚善然僕之知弟也未知其他直以弟敏於學而好於文也就六經而正焉故每遇名輩稱弟不容於口自謂彌久益無愧詞竊料弟亦以直諒見待不以悅媚相容故不惟嗟悒亦欲商度其萬一耳若弟擯落今古脫遺經籍斯則如獻白豕何足採取若猶有祖述則願陳其梗槩以相參會耳愚謂三五之代上垂拱而無為下不知其帝力其道漸被於天地萬物不可得而傳也夏殷之際聖賢相遇其文在於盛德大業又鮮可得而傳也厥後周公遭變仲尼不當世其文遺於册府故可得而傳也於是作周孔之文荀孟之文左右周孔之文也理身理家理國理天下一日失之敗亂至矣騷人之文發憤之文也雅多自賢頗有狂態相如子雲之文譎諫之文也別為一家不是正氣賈誼之文化成之文也鋪陳帝王之道昭昭在目司馬遷之文財成之文也馳騁數千載若有餘力董仲舒劉向之文通儒之文也發明經術究極天人其實擅美一時流譽千載者多矣不足為弟道焉然皆不詭其詞而詞自麗不異其理而理自新若夫典謨訓誥文言繫辭國風雅頌經聖人之筆削者則又至易也至直也雖大彌天地細入無間而奇言怪語未之或有意隨文而可見事隨意而可行此所謂文可文非常文也其可文而文之何常之有俾後之作者有所裁準而請問於弟謂之何哉謂之不可非僕敢言謂之可也則大學之道在明明德在止至善矣能止於止乎若遂過之猶不及也觀弟近日製作大旨常以時世之文多偶對儷句屬綴風雲羈朿聲韻為文之病甚矣故以雄詞遠志一以矯之則是以文字為意也且文者聖人假之以達其心達則巳理窮則巳非故高之下之詳之略之也愚欲去彼取此則安步而不可及平居而不可踰又何必遠關經術然後騁其材力哉昔人有見小人之違道者恥與之同形貌共衣服遂思倒置眉目反易冠帶以異也不知其倒之反之之非也雖非於小人亦異於君子矣故文人之異在氣格之高下思致之淺深不在其磔裂章句隳廢聲韻也人之異在風神之清濁心志之通塞不在於倒置眉目反易冠帶也試用高明少納庸妄若以為未幸不以苦言見革其惑唯僕心慮荒散百事罷息然意之所在敢隱於故人耶昌黎韓愈僕識之舊矣中心愛之不覺驚賞然其人信美材也近或聞諸儕類云恃其絶足往往奔放不以文立制而以文為戲可矣乎可矣乎今之作者不及則巳及之者當大為防焉耳弟素居多年勞想深至窮陰凝沍動息如何入奉晨昏之歡出參帷幄之畫固多適耳昨弟來字欲度及時干進度昔歲取名不敢自高今孤焭丶若此遊宦謂何是不復能從故人之所勗耳但置力田園省過朝夕而巳然待春氣微和農事未動或當策蹇謁賢大夫兼與弟道舊未爾間猶希尺牘珍重珍重力書無餘從表兄裴度奉大唐開元二十三年三藏無畏卒春秋九十有九詔鴻臚丞李現監護喪事塔於龍門之西山廣化寺藏其全身畏本釋種甘露飯王之後以讓國出家道德名稱為天竺之冠所至講法必有異相初在烏茶國演遮那經須臾衆會咸見空中有昆盧遮那四金字各尋丈排列久之而沒又嘗過龍河一托駝負經沒水畏懼失經遽隨之入水於是龍王邀之入宮講法不許彼請堅至為留三宿而出所載梵夾不濕一字其神異多類此爾才不長爾貌不揚胡為將胡為相一點靈臺丹青莫狀爰自荊州鼎成黃金道息封固真粹教不流傳代歷秦漢言者怪濶先儒以為繫風捕影誰抵其實琅琊論衡詳之矣豫嘗以為斯言之未盡其臧否也及見仙翁勃違前聞且嗇神胎元抱和含真穆然道風煦然如春追駐稚色將數百歲光陰自駛寒暑不易爐鎚間之物無不化養之在我得之自然加以熊經鳥伸元藏城府閉合默識孰窺崇墉當今勢位壓山河器業橫覆載北面嚮傾就誠屆乎辭度不知先儒誰談其無得食馬肝者豈為知味耶圖鬼神者易為工耶不復知總總化胎而巳仙翁將去追遺雲蹤苟非造物者不能以識度嘗讀舊史詳求往哲或秉事君之節無開國之才得立身之道無治人之術四者備矣兼而行之則蜀丞相諸葛公其人也公本系在策大名蓋天地不復以云當漢祚衰陵人心競逐取威定霸者求賢如不及藏器在身者擇主而後動公是時也躬耕南陽自比管樂我未從虎時稱臥龍詩曰潛雖伏矣亦孔之照故州平心與元直神交洎乎三顧而許以驅馳一言而定其機勢繇是翼扶劉氏纘承舊服結吳抗魏擁蜀稱漢刑政達於荒外道化行乎域中誰謂阻深殷為強國誰謂遳脆勵為徑兵則知地無常形人無常性自我而作若金在鎔故九州之地魏有其七我無其一由僻陋而啓雄圖出封疆以延大敵財用足而不曰浚我以生干戈動而不曰殘人以逞其砥定南方也不以力制而取其心服震謺諸夏也不敢角其勝負而止候其存亡法加於人也雖死徙而無怨德及於人也雖奕葉而見思此所謂精義入神自誠而明者矣若其人存其政舉則四海可平五服可傾而陳壽之評未極其能事崔浩之説又詰其成功此皆以變詐之略論節制之師以進取之方語化成之道不其謬歟夫委棄荊州不能遂有三郡此乃務增德以吞宇宙不黷武以爭尋常及出斜谷據武功分兵屯田為久駐之計與敵對壘待可勝之期雜乎居人如適虛邑彼則喪氣我方養威若天假之年則繼大漢之祀成先主之志不難矣且權傾一國聲震八紘而上下無異詞始終無愧色苟非運膺五百道冠生知曷以臻於此乎故元德知人之明者倚杖曰魚之有水仲達姦人之雄者嗟稱曰天下奇才度每迹其行事度其遠心願奮短札以排㣥議而文字山蟲鄙志願未果元和二年冬十月聖上以西南奧區寇亂餘孽罷氓未息汙俗未清輟我股肱為之父母乃詔相國臨淮公由秉鈞之重乘推轂之寄戎軒乃降藩服乃理將明帝道陬落綏懷溥暢仁風閭閻滋殖府中無留事宇下無棄才人知嚮方我有餘地則諸葛公在昔之治與相國當今之政異代而同塵矣度謬以庸薄獲參管記隨旌旄而爰止望祠宇而修謁有儀可象以赫厥靈雖徽烈不忘而碑表未立古者或拳拳一善或師長一城尚流斯文以示來裔况如仁之歎終古不絶其可闕乎乃刻貞石庶此都之人存必拜之感云爾銘曰昔在先主思啓疆宇擾攘靡依英雄無輔爰得武侯先定蜀土道德城池禮義干櫓煦物如春化人如神勞而不怨用之有倫柔服蠻落鋪敦渭濱攝迹畏威雜居懷仁中原旰食不測不克以待可勝允臻其極天未悔禍公命不果漢祚其亡將星中墮反旗鳴鼓猶走司馬死而可作當小天下尚父作周阿衡佐商兼齊管晏總漢蕭張易代而生易地而理遭遇豐約亦皆然矣嗚呼奇謀奮發美志夭遏吁嗟嚴立咸受謫罰聞之痛之或泣或絶甘棠勿翦駢邑斯奪繇是而言殊途共轍本於忠恕孰不感悅苟非誠慤徒云固結古柏森森遺廟沈沈不殄禋祀以迄於今靡不駿奔若有照臨蜀國之風蜀人之心錦江清波玉壘峻岑入海際天如公德音惟天錫成命於我唐保茲國祚生此人傑則西平王李公其是乎不然何覆暴如風振稿葉戴君若鼇冠靈山橫流之中一匡而定公諱晟字良器其先隴西人也後徙京兆曾祖嵩皇岷州刺史贈洮州刺史祖思恭皇洮州刺史贈幽州大都督考欽皇左金吾衛大將軍隴右節度經略副使贈太子太保代有名迹雄於西土公幼好學學不為人及讀呂張孫吳之書慨然有經邦濟物之志未弱冠遊秦涼間元侯宿將見者咸器異之乾元初嘗客武都值酋豪以缺守遘亂殺掠平人公與所從十數騎馳而射之殪其為魁者餘黨遂遁寇所虜獲積如邱山公一無所取惟椎牛釃酒享士而去邦人感服具以狀聞特拜左清道率飾以金紫將朝京師自獻方略屬裔夷紛擾有土急賢河隴將帥相繼表用歷二府右職所至常以才謀為其委重纍遷至光祿太常卿階爵在第一品涇原四鎮北庭節度都知兵馬使四面都遊奕使懸識虜態周知地形應變不窮有奪有待驥驟庭而莫展雲出岫而斯飛代宗徵之以左金吾衛將軍為神策軍兵馬使屬蠻犯蜀朝廷濟師命公督禁旅絶棧道而往救焉公銜枚過險出賊不意連下堅壁遂誅首惡還授檢校太子賓客且復舊職建中二年田悅以魏叛德宗極意致討悉起徂征以公為神策先鋒都知兵馬使加御史中丞與河東河南等道諸軍合擊公濟河而行能以衆正及破洹水陳解臨洺圍轢魏屬城抵燕通邑其摧鋒衄鋭皆先㣥帥而置力焉遙拜左散騎常侍兼御史大夫厥功未成聞賊泚肆逆皇居失守西嚮慟哭載馳載驅行及代北授檢校工部尚書充神策行營節度公提孤軍募散卒拊循訓勵以達行在值懷光中叛大駕再遷加檢校右僕射餘如故尋轉左僕射同平章事兼京兆尹神策軍京畿鄜坊節度觀察等使管內及商華等州副元帥公固守渭城決平秦壘調食制用先發我私捐甘攻苦皆自我始每一言一誓聲淚俱發勇夫義士感而使之蔑不濟矣時自雍而東延於汝洛震於河汴所在征鎮亂略相從公介巨盜之間使聲援斷絶立成師之法致號令嚴肅搜捕十旬指揮一舉乘墉壑以通軌道磔梟獍以清宮禁俾九市三條無輟肆之驚無秋毫之犯羽書速告鑾輅爰歸廓氛祲為祥光攄憂憤為喜氣詩曰允矣君子展也大成斯之謂歟考古視今論功稱忠者多矣若至危而安至難而易卓犖跨邁如公莫儔拜司徒兼中書令俄以凶孽甫寧邊防猶警岐下任重乃以本官兼鳳翔尹鳳翔隴右節度觀察等使及四鎮北庭涇原等州副元帥改封西平郡王加食邑實封至一千五百戶公名懾戎王政和藩部始至而生植少安而訓齊逮四載賦輿十倍其初會課入輔拜太尉中樞如故人或謂公勳望巳高寵渥已極宜從容頤養稍稍遜避公曰不然人臣外則盡力內則盡心若止偷榮孰為且哲故每承帷幄之問則言咈無隱理奪不回大指以東夏可平西陲可復或巳行而事終不顯或未用而身遽不遺以貞元九年八月四日薨於位春秋六十有七德宗撫几哭於別次自都邑達關畿無士庶無老幼皆發哀相弔則曩時戢兵安人之德可謂浹於元元之骨髓矣册贈太師賻賵加等以其年十二月十六日葬於高陵縣奉正原鄭國夫人杜氏祔焉自捐寢至安宅皆所司辦護中貴反覆萬情所奉如不及焉嗚呼以公之靜難扶傾不言所利雖存歿極位始終殊禮而天意若曰其福享未至故迤延於後有子曰願故檢校司空河中節度等使贈司徒五列雄鎮三為上公曰聰故光祿寺主簿曰總故太子中允贈兵部郎中曰遜左神武軍大將軍兼御史大夫曰憑故右威衛大將軍兼御史中丞贈洪州都督曰恕故光祿卿贈右散騎常侍曰憲檢校左散騎常侍嶺南節度觀察等使兼御史大夫進因貴胄達以善政曰訴故檢校左僕射同中書門下平章事贈太尉克廣前修仍執醜虜曰懿故渭南縣尉曰聽檢校司徒義成軍節度觀察等使統戎按俗是以似之曰惎右羽林軍將軍曰殷嵐州刺史並地勢吏用兼而有焉粵太和元年秋七月聽拜疏上言以公之徽烈則御製碑文於渭川矣以公之風度則詔命圖形於雲臺矣唯大其邱隴鬱彼松檟望有祁山之象拜無峴首之碑將刊貞石式表幽隧乃命臣度稱伐言詩其詞曰建中季年大盜忽焉皇輿避狄狩於梁川顧謂太師汝才汝略將威致討必殄寇虐太師泣奉捐軀誓衆度其成城可以利用赫矣鋪敦傅於墻垣手搏足踦如衝如援一鼓而破一麾而奔掃清宮闈刷蕩妖昏我師蒞止我令行矣都人不知巳事方喜飛章告慶飭駕言旋鴻烈耀古歡聲動天車服之錫河山之誓九命而俯一心若厲俾侯於岐阜安邊陲藩政既成衮職攸宜嶽降帝賚矢言詭詞我后嘉猷我躬何為道直氣和勞謙終吉福履所綏未享萬一上天不惠厚穸遄歸垂裕流光用延恩暉翼子肥家將壇台席繼立奇功代傳休績聽與伯仲永懷高蹤請於朝廷表是邱封帝曰孝哉胡可不從宣我祖之丕業繄爾父之嘉庸乃詔作銘以觀億齡公諱太真字仲適族彭城晉永嘉末衣冠南渡遂為金陵人一代祖悱隋伏波將軍桂陽太守高祖關皇襄州別駕曾祖軫皇沂州刺史祖際皇洪州録事參軍考若筠皇贈諫議大夫蹈道輕世為儒澡身慶流後昆追榮幽壤公十有五而志於學弱冠以行義修潔詞藻瑰異名聲藉甚於諸公間當時文士蘭陵蕭茂挺才高意廣誘接甚寡一見公便延之座右以孔門高第不在茲乎天寶中與伯氏太沖迭升太常第議者榮之屬被虐虜包禍中原俶擾潛心墳素退迹村廬樂以忘貧安乎終養至廣德二年江淮宣慰使御史大夫李公季卿薦授左衛兵曹永泰二年河內副元帥太尉李公弻聞風加禮致望參贊除大理評事辟書詔命謺至里門初感招弓之遇猶懷捧檄之惠及泝淮而北稍遠家庭以干戈未弭亂離斯瘼倘貽憂於一夕又焉用乎三牲乃飛咫尺之書布方寸之心而理歸棹李公初甚遲之迄用嗟悼諫議府君嘗被熱疾而為疽醫者之言手不可觸公乃自吮至於良巳則劉瓛之藥漬指傷胡可比也後因與元兄營甘鮮之膳自城邑而歸未至所舍而遇曛黑則有偷者引弓遮道公遽告之名居且曰身惟所取無害吾兄盜者乃吅丂一然自失曰不謂是劉家兄弟乃慚而退則趙孝之爭死讓生不是過也故宗族稱孝焉鄉黨稱悌焉浙西觀察使御史大夫李公栖筠聞之表為常熟令公以為入則安親出則養人斯可矣既到官不逾歲而一邑自化未幾再罹家禍烏鳥之歎若此齊斬之哀何極除服浙東觀察使陳少遊虛右職而勤請焉公以陳之鎮宣城也實厚於諫議府君歲時禮遺不絶於道乃從之奏授監察御史及陳之移鎮揚州又為節度判官再遷至侍御史正違理煩不負知者德宗皇帝即位徵拜起居郎載筆丹陛休風藹然改尚書司勳員外郎尋轉吏部員外郎綜核流品練達程式藏姦立見析滯如流名著南宮望歸西掖遷駕部郎中知制誥煥發人文昭宣帝命典謨載暉於紫闥諷議獨立於清朝以稱職賜緋魚袋建中四年夏正授中書舍人是冬狂寇竊發乘輿薄狩奔走陪扈遑恤其家興元反正拜工部侍郎屬兩河兵旱徭費騷然慎選名臣往勞來之乃召入內殿親承中旨德宗嘉之遂賜金紫充河東澤潞恆冀易定等道賑給宣慰使是行也將之明之陰雨膏之與山甫召伯同具歌詩矣貞元元年轉刑部侍郎詳刑議獄無復煩纍改祕書監遺編脫有以刊正三年拜禮部侍郎天下賓王之士尚實遠名者竊相賀矣秉公心而排㣥議履正道而杜私門以為聳善興能試言考藝若求虛譽護小嫌是全身之計非取士之方也乃貶抑浮偽仍歲不回適值時棟變更朝柄奪移怒不在公而及於公矣遂因囂囂之口成是貝錦出為信州刺史求仁得仁不以屑意則下惠焉往而不黜子文三巳而無慍者於是信焉亦既按部風行化洽勞罷者息離散者來易政成剽輕俗革官刑不用闔境熙熙嗚呼黃霸未徵於潁川賈誼不聞於宣室移疾去郡以貞元八年三月八日薨於餘干縣之旅館春秋六十八朝廷遂亡其宿重士子俄失於津塗故哭於寢喪於心者寄聲相弔其慟也極嗣子諷祇服嚴訓可謂成人銜哀致毀幾於越禮以言歸兆域未叶蓍龜權窆於丹陽縣之別墅至貞元十八年十月十九日方從理命克葬於宣城郡溧水縣方墟之古原夫人趙郡郡君李氏皇許州刺史崇儉之孫皇申州羅山縣令遐之女昔之嬪則今也母儀以諷從事於浙東連帥府授試金吾衛倉曹參軍學由斷織祿可供贍不幸又夭謂之何哉孤孫曰祐僅毀齒矣夫人撫視而哭無時非不知短長之命也其所哭者公之譖訴巳消於晛見公之徽烈將示於來裔而高碑未刻良允繼沒於是門生之在朝廷者諫議大夫杜羔中書舍人裴度起居舍人盧士玫殿中侍御史李修光祿少卿盧長卿右司郎中韋乾度工部員外郎李君何在藩牧者浙東觀察都團練使御史中丞李遜黔中觀察經略使御史中丞李道古澤州刺史御史中丞盧頊嘉州刺史王良士復州刺史鄭㣥沔州刺史嚴公弻慈州刺史劉元鼎其在幕府者侍御史田伯殿中侍御史盧璠馬逢監察御史馮魯楊巨源其在畿者櫟陽令麻仲容藍田丞崔立之盩厔尉麴淡等咸懷賞鑒自悼遺闕以為沂川表德魯闕一字生徒峴首銘闕一字荊州僚吏况公忘家體國正心誠意歷位崇顯而惟欲下人應事該明而未嘗矜巳虛和善守廉儉好施至於開誘後學旌別㣥才時皆見其獎之之過也而莫知其辨之之精也故始異論終共稱其為實乎觀於今可知矣其為名乎傳於後可必矣若不升台座不及期頤將時邪命邪豈道至人不至邪如羔輩被蒙拔附麗墻宇樹之貞石賁此元扄匪報也永以為泣拜之所焉爾銘曰行高世兮才經國學以聚兮文以飾奉絲綸兮詒楷則宰賓貢兮宏鑒識人醜正兮我好直時風謬兮天聽側隼為方與兮鵬對臆不俾屏兮長太息門下諸生憤何極惟有修業為報德德之馨兮間讒慝石之貞兮垂萬億
