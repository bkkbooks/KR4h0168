  text: 全唐文欽定全唐文卷七百七十王棨二
  hash: sha256:dbf912ca27fcb2585115b3e3c9d1581dbb7db7f25a78ce30ea60e4b81de68289
body:
  text: 醜虜侵塞將軍耀威弓一彎而天山未定箭三發而鐵勒知歸驍騎來時疊利鏃以連中宮人祭處收黃塵而不飛始夫寇犯朔方檄傳邊壤高宗乃將鉞斯授仁貴而君恩是仗初持漢節鷹揚貔虎之威爰臂燕弧肉視豺狼之黨軍壓亭障營臨塞垣九姓猶憑其桀驁六鈞亦昧於戎蕃既而胡兵鳥集賊騎雲屯將軍於是勇氣潛發雄心自論拈白羽以初抽手中雪耀攀雕鞍而乍逐磧裏星奔由是控彼烏號伸茲猿臂軍前而弦開邊月空際而骨孝鳴朔吹聲穿徑甲俄駭膽於千夫血染平沙已僵尸於一騎斯一箭之中也尚猖狂而背義是用再調弓矢重出麾幢曜英武於非類昭雄稜於異邦赤羽遠開騁神機而未已胡雛又斃驚絶藝以無雙斯二箭之中也猶憑陵而未降且曰志以安邊誓將去害苟犬羊之衆斯舍則衛霍之功不大又流鏑以虻飛復應弦而狼狽斯三箭之中也遂定七戎之外昔在秦漢嘗開土疆或勞師於征伐徒耀武於張皇未若彎弧手妙於主皮大降虜衆騁伎心同於偃月遂靜沙場故得元化覃幽皇風被遠鳥嶺之烽已息靈臺之伯斯偃然知魯連雖下於聊城豈定窮荒之絶巘離思難任長宵且深坐感夫君之別誰憐此夜之心念雲雨以初分何時促膝俯衾裯而起怨幾度沾襟始其歌罷東門袂揮南浦征車去兮塵漸遠匹馬歸兮情自苦間庭已暝對一點之銀釭別酒初醒聞滿簷之寒雨且夕也悄悄何長悠悠未央向銀屏而寡趣撫角枕以增傷蓋以緬行役兮路千里邈音塵兮天一方我展轉以空牀固難成夢君盤桓於旅館豈易為腸由是觸目生悲回身弔影雲積陰而月暗鳥深棲而樹靜凝情漸久訝古寺之鐘遲會面猶賒奈嚴城之漏永於時階滴飄冷窗風送寒徒抱分襟之恨全忘秉燭之歡遠林而未有烏啼偏嫌耿耿幽壁而徒聞蛩響頓覺漫漫嗟夫昔每同袍今成兩地既覩物以遐想復支頤而不寐鄰機尚織重增蘇氏之懷詞客猶吟更動江生之思况乎燕宋程遠關山道遙怨復怨兮斯別長莫長乎此宵使人元髮潛變紅顏暗凋杳嚮晨而若歲嗟達旦以無聊且夫名利猶存津梁未絶苟四方之志斯在則五夜之情徒切然哉吾生既異於匏瓜又安得不傷乎離別七里灘急三秋夜清泊桂棹於遙一作南岸聞漁歌之數聲臨風斷續隔水分明初擊楫以興詞人人駭耳既艤舟而度曲處處含情衆籟微收濃煙乍歇屏開兩面之鏡璧碎中流之月逃名浪迹始蕩槳以徐來咀徵含商俄扣舷而迥發一水喧豗旁連釣臺㣥鳥皆息孤猿罷哀激浪不停高唱而時時過去涼飇暗起清音而一一吹來潺潺兮跳波激射歷歷兮新聲不隔初聞而彌覺神清再聽而惟憂鬢白遠而察也調且異於吳歌近以觀之人又非其郢客杳裊悠揚深山夜長殊採菱於鏡水同鼓枻於滄浪泛濫扁舟逸興無慚於范蠡沈浮芳餌高情不減於嚴光况其岸簇千艘巖森萬樹湍奔如雪之浪衣裛如珠之露寂凝思以側聆悄無言而相顧此時遊子只添歧路之愁何處逸人頓起江湖之趣由是寥亮清潯良宵漸深引鄉淚於天末動離魂於水陰究彼囀喉似感無為之化察其鼓腹因知樂業之心既而暗卷纖綸潛收密網灘頭而猶唱殘曲水際而尚聞餘響漁人歌罷兮天已明挂輕帆而俱往有宏節先生棲遲上京每入樵蘇之給長甘藜藿之羹或載渴以載飢未嘗挫念雖無衣而無褐終自怡情其居也滿榻凝塵侵階碧草衡門度日以常掩環堵終年而不掃荒涼三徑重開蔣詡之蹤寂寞一瓢深味顏回之道則有溫足公子繁華少年共造繩樞之所相延甕牖之前但見其縕袍露肘曲突沈煙僮不粒以愁坐馬無芻而困眠俱曰先生迹似萍泛家如罄懸且何道而自若復何心而宴然先生曰子不聞蜀郡長卿漢朝東郭器雖滌以無愧履任穿而自樂蓋以順理居常冥心處約當年雖則騎旅終歲曾無隕穫又不聞前惟曾子後有袁安或蒸梨而取飽或臥雪以忘寒斯亦性善居易情無怨難不汲汲以苟進豈孜孜而妄干盡能一榮枯齊得失顧終窶以非病縱屢空而何恤是以原憲匡坐而不憂啓期行歌而自逸况乎否窮則泰屈久則伸負薪者榮於漢鬻畚者相於秦更聞楊素之言未能圖富苟有陳平之美安得長貧矍然二子相顧而起乃曰幸承達者之論深見賢哉之旨而今而後方知君子固窮小人窮斯濫矣隴山下汧水中有石類魚龍之狀成形匪追琢之功半隱奫淪若噞喁而斯在餘依磧礫將蟠蟄以攸同嘉夫地出貞姿天成詭質雖騎鯨之勢可類而跳獸之規莫匹厥象有二其堅惟一水清見處如欣得水之秋雲起觸時稍叶召雲之日豈非自從凝結有此規模既異織女還非望夫或似罷江湖之遊泳又如收雲雨之虛無徒使漁人川上而幾回顧盼仍令豢氏路旁而終日踟蹰蓋以磊磊漸分磷磷酷似溜穿而煦沫無別苔駮而成章可擬曾經飲羽若銜索以斯存或用紀功疑負圖而載止由是密聚鱗次孤標介然設赬尾於五色認胡髯於一拳初驚獺祭於地復謂劒化於川覩岸草以旁生不殊在藻遇春流而乍沒又若潛淵既將轉以揚鬐亦因泐而無首比岫居而苟可於泥蟠兮曷不中猶蘊王尚含呂望之璜誰取支機巳在葉公之牖造化難知雕鐫者誰何莓苔之古色有鱗鬛之奇姿謂湘水之燕且殊寧俟飛也與金華之羊自別何勞叱之既表元功永存靈迹映一水之晴緑對㣥峯之暮碧彼結網垂綸之士與攀髯採珠之客或命駕而西遊試回眸於此石丹海之濱青珠似塵蓋輕細以無滯遂飛揚而有因或喣或吹自得霏微之象乍明乍滅誰分圓潔之真稽夫始自水涯俄從風起縈空而耀耀奚匹散彩而冥冥相似又云來或鳥銜積如邱峙半穿圓隟影寒於雲母屏中或委空林一作牀光亂於水晶簾裏徒觀夫的皪晶熒星流雪輕集素衣而不垢侵曉鏡以逾明落淵客之盤驚炫耀以同色撲江之佩訝依微而有聲至如琪樹春歸玉樓景霽揉瓊蕊以光碎浮瑣窗而影細闌干輕舉同羅之生時璀錯斜飛有歌梁之下勢由是散亂清景光芒碧空昔隱耀於泥沙之地今揚輝乎堀堁之風不逐軒車之後不在京洛之中雨過而光騰鮫室扇回而影動龍宮如是則可用增山難將彈雀惹晴葉以垂樹間遊絲而綴箔自南自北低瑤席以紛然匪疾匪徐拂璇題而炯若况海日方盡陰飇乍回與白駒而競起將野馬以俱來魏國飛時頓失照車之體陳王望處全無凝榭之猜懿夫朗潔難逾飛騰自遂非罔象之見索異無脛而斯至或曰泰山猶不讓微塵况是珠璣之類器假人舉名因燭彰顧虛薄以中朗亦輝華而外揚銀焰始然俟提攜而就列香塵久暗希拂拭以增光懿夫煥爛潛融周旋宥密含明而每讓清晝處晦而寧欺暗室由是常患影孤終期勢出儻明時而不用在手何年或薄質以見知升堂有日觀乎表裏無隱方圓可分亦猶春晝而花藏縠霧秋宵而月在羅雲照環堵之中雖孤潔以由己置瓊筵之上實高低而在君矧其稟量既宏為功亦倍韜光之義可見內熱之情斯在今則抱影求真虛心有待若此許設於高明亦願發其光彩碧雲初合兮金烏巳藏深宮欲暝兮歡娛未央因綴明珠之彩將為列燭之光出寶篋以規圓呈姿璀璨入雕籠而豔發香照熒煌當其竹箭迎昏蘭林向夕司烜氏卻朱火之耀守藏吏進驪龍之魄然後縈縷花抱籠紗霧隔亦猶燎紅蠟而爇靈麻可得燒椒房而煥瑤席風來不動凝四座之清輝夜久逾明貯一堂之虛白由是價掩聯璐形疑列錢誠非其人火曰火可謂乎自然而然本出一作自蚌胎翻為龍銜於玉宇從離蛇口幾驚蛾拂於瓊筵觀其布質闌干含輝晃朗分持而清夜星列回舉而寒軒月上纍纍交映曾無見跋之嫌爛爛相鮮誰起偷光之想莫不揚彩金屋增華桂宮幕以煙緑布而焰紅欄檻如曉杯盤若融孕美於琉璃窗裏淪精於雲母屏中是以名擅夜光功參庭燎妍醜無隱毫芒必照故得結緑懸黎之寶不敢稱珍龍膏豹髓之燈於焉寢耀且飾履者於義尤侈為簾者其功未深曷如倣此圓潔資乎照臨遂使或怨長宵得縱秉遊之樂有居幽室不生欺暗之心雖則魚目難儔金釭非偶終罹好寶之誚不免窮奢之詬燭兮燭兮儒執智以為之視隨侯而何有彼窗牖之麗者有琉璃之製焉洞徹而光凝秋水虛明而色混晴煙皓月斜臨陸機之毛髮寒矣鮮飇如透滿奮之神容凜然始夫創奇寶之新規易疏寮之舊作龍鱗不足專其瑩蟬翼安能擬其簿若乃孕美澄凝淪精灼爍棟宇廓以冰耀房櫳炯其電落深窺公子中眠雲母之屏洞見佳人外捲水精之箔表裏玲瓏霜殘露融列遠岫以秋緑入輕霞而晚紅滿榻琴書杳若冰壺之內盈庭花木依然瑤鏡之中故得繡戶增光綺堂生白覩懸蝨之舊所疑素蟾之新魄碧雞毛羽微微而霧縠旁籠玉女容華隱隱而銀河中隔幾誤梁燕遙分隙駒比曲櫺而頓別想圭竇以終殊迥以視之雖皎潔兮斯在遠而望也則依微而若無由是蠅泊如懸蟲飛無礙光寒而珠燭相連影動而瓊英俯對不羡石崇之館樹列珊瑚豈慚韓嫣之家牀施玳瑁如是價重瑣闥名珍綺疏徹紗帷而晃朗連角簟而清虛倘徵其形王母之宮可匹若語其巧大秦之璧焉如然而國以奢亡位由侈失帝辛為象箸於前代令尹惜玉纓於往日其人可數其類非一何用崇瑰寶兮極精奇置斯窗於宮室奇幻誰傳伊人得焉吞刀之術斯妙吐火之能又元咽卻鋒鋩不患乎洞胸達腋噓成赩赫俄驚其飛焰浮煙原夫自天竺來時當西京暇日騁不測之神變有非常之妙術初呈握內豈吹毛之鋭難親復指胸中雖爍石之威可出於是叱吒神厲谽谺氣恣旁駕肩而孰不觀也忽攘臂而人皆異之俄而精鋼充腹熾烈交頤罔有剖心之患曾無爛額之疑寂影滅以光沈霜鋒盡處炯霞舒而血噴朱焰生時素仞兮倏去於手紅光兮遽騰其口始蔑爾以虹藏竟霩然而電走隱於笑語回看而鞞琫皆空出自咽喉旁取而榆檀何有莫不刻意斯效焦心已舒想剛腸之礪乃驚燥吻以焚如胡為引鏡之形銷於咀嚼安得燎原之色發自吹噓亦足以道冠幻人名傾術士食針既可以增愧噀酒亦宜乎讓美且夫神仙兮不常變化兮多方或潄水而霧合或吐飯而蜂翔曾未若彼用解牛我則虛喉而挫鋭彼皆鑽燧我則鼓舌以生光然眩惑如斯云為徒耳雖誇外國之獻本匪王庭之伎吾謂吞詞鋒者可尚吐智燭者為是所以安處先生終去彼而取此元凱立功銘其始終欲播美於萬年之後乃沈碑於一水之中剖彼貞姿餘烈必期乎不朽藏斯濬壑垂名庶及於無窮豈不樹佐晉之洪勳立吞吳之巨績思後世以不顯俾中心而是惕將紀乎竹帛時移則令聞應亡若銘以盤盂代異而嘉聲恐寂然則千古無壞雙碑可憑博約之辭既著雕篆之功亦興有美皆述無勞不稱一則置彼高山謂高陵為谷一則投茲深水憚深谷為陵且言曰水以柔而虛受石以堅而可久雖此隱而彼見彼若泉而此阜不知我者笑淪棄於目前庶知我焉諒昭彰於身後既而憑岸爰舉臨川載傾逆洪漣而星落殷白浪以雷聲始觀其文徒謂憂於沒齒終窺其理方知叶於流名由是影動深泉響連通谷莫不讋波神駭水族靈龜將負以股戰陽侯既覽而心服盡驚是日誤墮淚於斯源卻想他時閲色絲於誰目至今五百餘年英聲自傳沔水之恩波尚遠峴山之嵐翠猶鮮但覺潭邊春盡而遺芳不歇更憐川上時移而茂躅難遷然則伊尹之作阿衡姬公之為太宰邁古之芳猷克著迄今而英風未改是知事若美於一時語自流乎千載亦何必矜盛烈沈豐碑欲功名之長在梁世子以體道安居逍遙有餘宴息而魂交成夢分明而身化為魚恍若有忘顧物我以何異悠然而逝失形骸之所如其初也漏滴寒城月籠涼牖悄爾人靜溘焉夜久於銀屏既設之所是角枕已敧之後遽因神遇能遊之質斯成漸覺形遷相望之心曷不是則髣佛川闊依稀浪輕始訝沈浮而在此俄驚鬐鬛以俱生恍兮惚兮豈悟益刀之兆今夕何夕空懷畏網之情由是涵泳無疑噞喁未巳值良夜之寂寂泝清波之唯唯腹上之松俯映在藻雖殊懷中之日旁明銜珠稍似既掉頳尾還張紫鱗維熊維羆而自遠有鱣有鮪以相親沙際禽去汀旁草春遇周公而疑為釣叟逢傅説而謂是漁人於時砌竹無風庭梧有露既異為雲之事空驚微禹之故翻成浪迹全忘枕上之身卻憶浮生寧異蓮東之趣其夢也何樂如之其覺也何愁若斯復是魚由我變抑當我本魚為莊生化蝶之言昔時未信公子為烏之驗今日方知悲夫何事蘧然欲思咸若良由塵世之多故難及深淵之或躍人兮不因一夢之中豈信濠梁之樂萬物生兮巨細相懸蚉之睫兮蟭螟在焉雖受氣以具體亦成形而自天取以比方事著茂先之賦齊其大小理符禦寇之篇眇矣麼蟲生乎積壤名為造化之內質類希夷之象離婁仰視莫得見其形容師曠俯聽曾未聞乎聲響既而遊元氣入無間就彼蚉而悽宛止其睫以回環日往月來顧我而因依自得晨趨暮見覺伊而瞬息長間由是拂眥謀安沿眶可賴喜榮乎噆膚之際懼覆於成雷之會仰觀厥首謂如山嶽之崇旁睨其肩意似叢林之大逼螢火兮豈慮焚其逢肸蠁兮何憚居之每保徑同於枝幹詎知細甚於毫釐未能鵲起安肯蟲疑常笑鷦鷯立彼葦苕之上寧同元燕集於危幕之時豈比夫蠕動微生蜎飛異稟蠅附尾以非類蝨處頭而殊品言乎蚉也則是睫而可知向彼巢焉乃斯形而因審想夫影與塵混身將道俱察其生而洪纖則別論其分而物我何殊似菌朝生不羡千春之壽如蜩秋起無慚六月之圖悲夫謂無至道者多信有茲蟲者少蓋述齊物之域未遂忘形之表若能效三月以齊心必見斯蟲而不小麗日遲遲江南春兮春已歸分中元之節候為下國之芳菲煙羃歷以堪悲六朝故地景蔥龍而正媚二月晴暉誰謂建業氣偏句吳地僻年來而和煦先遍寒少而萌芽易坼誠知青律吹南北以無殊爭奈洪流亘東西而是隔當使蘭澤先暖蘋洲早晴薄霧輕籠於鍾阜和風微扇於臺城有地皆秀無枝不榮遠客堪迷朱雀之航頭柳色離人莫聽烏衣之巷裏鶯聲於時衡嶽雁過吳宮燕至高低兮梅嶺殘白邐迤兮楓林列翠幾多嫩緑猶開玉樹之庭無限飄紅競落金蓮之地別有鷗嶼殘照漁家晚煙潮浪渡口蘆筍沙邊野葳蕤而繡合山明媚以屏連蝶影爭飛昔日吳娃之徑楊花亂撲當年桃葉之船物盛一隅芳連千里鬬暄妍於兩岸恨風霜於積水羃羃而雲低茂苑謝客吟多萋萋而草夾秦淮王孫思起或有惜嘉節縱良遊蘭橈錦纜以盈水舞袖歌聲而滿樓誰見其曉色東皋處處農人之苦夕陽南陌家家蠶婦之愁悲夫豔逸無窮歡娛有極齊東昏醉之而失位陳後主迷之而喪國今日并為天下春無江南兮江北玉律奚始黃鍾實先潛應仲冬之候仍居大呂之前聲既還宮初協乎八音七始數從推歷終由其兩地參天當其黃帝命官太師授職參六呂以迭用本一陽而立則八風自此以條暢萬物於焉而動植權衡有準知纍黍之無差寒暑相生諒循環而不極是知召呂者律為君者宮既從無而入有可原始而要終聲雖發外氣本從中或煦或吹根初九爻而立紀日來月往首十二管以成功懿夫肇啓乾坤潛分節候見歷數以無紊顧萌芽而欲秀革彼應鍾先乎太蔟克諧韶濩惟子野以能知自得厚均匪伶倫而莫究故洪纖溥暢上下無頗騰葭灰而漸散映緹幕以方多初感於人復京房之姓氏終昏於地成燕谷之陽和俾玉燭以調均與璇璣而錯綜於以宣於四序於以貞乎三統自然功歸不宰理叶無為蓋陰陽之變化信氣序之推移雄鳳鳴而雌鳳應蓋皆類此商為臣而徵為事未足方斯為律之本兮既如彼為天之統兮又如此明廷樂協寧俟於李延年皇上聲為豈慚於夏后氏既而榮發枯稿春流遐邇願一變於寒枝復生成兮若是王武子所馭之駒障泥特殊念美錦以斯製對深泉而不逾拂玉鐙以雙垂常憐煥爛突金羈而屢顧豈忍沾濡始夫駿骨是求奇蹤斯得將以鞗革之盛遂備連錢之飾莫不價重千金絲分五色初傾豪貴矜誇之意則多誰謂驊騮顧惜之心亦極觀其萋菲熒煌霞舒翼張隱映桃花之色鮮明紫貝之章况乎還鄉曾衣照地出光得不春苑間遊愁露溼於花下長衢載驟恐塵侵於道旁若夫噴玉柳隄揚鞭蘭路通步障以齊美映流蘇而掩嫮瞻前顧後雖無還淖之虞時止時行似有漸車之懼一旦滉漾將涉權奇少留誠淺深之未測眄侍從以如愁頻頓紅纓雖造父而寧知所以潛憂緑地縱孫陽而莫究其由武子於是探彼柔心察其深旨善知騕裊之欲必為蒲桃之美令左右以解之果騰驤而濟矣然覆被其身旁迷繡輪夾汗溝而綺麗排馽尾以花新向若輕華煥渡奫淪則王氏櫪中空有代勞之用晉朝書上全無稱德之因懿夫特稟超奇非由服習苟嘶風之性斯惠豈戀主之名空立若論彼滋侈則錦障非所急衡嶽雲開見一峯兮秀出崔嵬彼㣥雁以遙翥抵重巒而盡回豈非漸木有程宜從茲而北嚮隨陽既遠不過此以南來觀夫蒼翠遐標嶔岑孤峙輕嵐侵碧落之色斜影染晴江之水彼則俟時而動渺塞外以爰來此惟無得而踰望巖前而載止拂此穹崇歸心忽同遇瀑布而如驚飛矢敫映垂藤而若避虛弓絶頂千仞懸崖半空遙觀增逝之姿似隨風退潛究知還之意不為途窮蓋以應候無差來賓有則斂飄飄之雲翰阻巖巖之黛色亦猶鴝鵒踰清濟以無因何異鷓鴣度澄江而不得於時洞庭木落雲夢霜晴肅肅方臨於鳥道嗈嗈俄背於猿聲稍類乎王子乘舟巳盡山陰之興曾參命駕因聞勝母之名若夫壁立天南屏開空際信紫閣以難匹何香爐之可徒見其似恨山塹如悲迢遞遽旋遵渚之心倏別參雲之勢殊不知識其分而不越守其心而有常若戢藻以咀菱可居彭蠡若浮深而越廣自有瀟湘志在養毛羽違雪霜何集九疑而棲息歷五嶺以翺翔大鵬聞而笑之曰余北海而來南溟是徙高飛而萬里倏忽下視而千峯邐迤嗟乎銜蘆違漠之㣥年年至此疊翠重重數千仞兮峭若芙蓉非華嶽之高掌是衡山之一峯朝日耀而爭鮮嵐光欲拆秋風擊而不落秀色長濃懿乎嶷若削成端然傑起雖千尋之直上猶一朵之孤峙聳碧空而出水無別倚斜漢而淩波酷似吐榮發秀非因沼沚之中固蒂深根巳在乾坤之裏徒觀夫壁立莖直霞臨彩鮮上下邐迤而九疑失翠旁側參差而五嶺迷煙秋夜彌高宛在金波之側晴光半露遙當玉葉之前似吐江南如開空際高低鬬紫蓋之色向背異香爐之勢劒雖合質匪三尺之微茫石縱同規殊一拳之璅細况乎高列五嶽光留四時名芳熊耳影秀峨眉然而只可登也誠難採之幾處樓中送目有池塘之景誰家林表凝情忘草樹之姿帳號既同冠形無異對夏雲而競峭映花巖而增媚遂使娥皇曉望潛憐覆水之規虞帝南巡暗起涉江之思由是楚澤陰遠湘流影孤挺煙蘿之蔥翠寫菡萏之形模本不崩而不騫誰人欲拔若無冬而無夏何代能枯余嘗迥野遙盻晴天遠望見國風隰有之體嘉離騷木末之狀乃曰亦可以獻君王之壽助山河之狀夸娥二子胡不移來與蓮峯而相向龍火西流涼風報秋屆肅殺而金方氣徑奪赫曦而朱夏威收五夜潛生聞桂枝而騷屑千門溥至覺玉宇以風穸八飀於時北斗杓移西郊禮畢蓐收行少昊之令夷則代林鍾之律颯爾斯風生乎是日俄而徹鬱蒸揚憀栗減庭草以芳靡掠林梢而聲疾繇是淅瀝晴景浸淫暮天起蘋葉而有準應葭灰而罔夭夭心無近無遠淒然凜然倏搖曳於紅梁潛催歸燕乍離披於碧樹漸息鳴蟬然後掃蕩千山蕭條萬里飄爽氣以極目厲秋聲而盈耳恨添壯士朝晴而易水寒生愁殺騷人落日而洞庭波起但遠戍煙薄遙村杵頻磨玉蟾而月色初瑩泛瑤瑟而商絃乍新虛檻清泠頗愜開襟之子衡門淒緊偏驚無褐之人北牖間眠西園夜宴紅蕖將碧蕙香減珍簟與纖絺色變張翰庭前暗度正憶鱸魚班姬帳下爰來巳悲紈扇故得苦霧晨卷蒸雲晝銷望裏而林端嫋嫋夢餘而窗外蕭蕭悄絲管於上宮陳娥翠斂颭簷楹於華省潘鬢霜凋既而冷遍中原陰生兌位幾人離避暑之所何處軫悲秋之思雖令蛩響東壁鴻辭邊地又安得吹賦客而促征車自是功名之未遂帝里佳境咸京舊池遠取曲江之號近侔靈沼之規東城之瑞日初升深涵氣象南苑之光風才起先動淪漪其地則復道東馳高亭北立旁吞杏圃以香滿前吸雲樓而影入嘉樹環繞珍禽霧集陽和稍近年年而春色先來追賞偏多處處之物華難及只如二月初晨沿隄草新鶯囀而殘風裊霧魚躍而圓波蕩春是何玉勒金策雕軒繡輪合合沓沓殷殷轔轔翠亘千家之幄香凝數里之塵公子王孫不羡蘭亭之會蛾眉蟬鬢遙疑浴浦之人是日也天子降鑾輿停彩仗呈丸劒之雜伎間咸韶之妙唱帝澤旁流皇風曲暢固知軒后徒遊赤水之湄何必穆王遠宴瑤臺之上復若九月新晴西風滿城於時嫩菊金色深泉鏡清浮北闕以光定寫南山而翠橫有日影雲影有鳧聲雁聲懷碧海以欲垂釣望金門而思濯纓或策蹇以長愁臨川自歎或揚鞭而半醉繞岸間行是日也樽俎羅星簪裾比櫛云重陽之賜宴顧多士以咸秩上延良輔如臨鳳沼之時旁立㣥公異在龍山之日若夫冬則祁寒裂地夏則晨景燒空恨良時之共隔惜幽致以誰同孰見其冰連岸白蓮照沙紅蒹葭兮葉葉凝雪楊柳兮枝枝帶風豈無昆明而在乎畿內豈無太液而在乎宮中一則但畜龜龍之瑞一則猶傳戰伐之功曷若輪蹄輻湊貴賤雷同有以見西都之盛又以見上國之雄願千年兮萬歲長若此以無窮呂公子兮誰與營魚為庶兮水為城雖處至柔之地還深作固之情不假人徒構神功而日就寧勞版築疊素浪以雲平帝始封之於河爵之為伯既奄有其涯涘遂恢張于基墌因上善以中抱若崇墉之外隔赤魴掉尾非經谷利之勞紅鯉暴鰓似困蒙恬之役豈不以還茲渺渺象彼言言高標貝闕洞設龍門於以示神祇之化於以昭鱗介之尊霞影晴臨四面之旌旗火烈湍聲霧急一樓之鼙鼓雷喧彼則險阻可依此則靈長是託周圍而一帶斯繞控引而百川皆作曉遇撇波之子稍類登陴夜聞鼓枻之音終疑擊柝莫不外羅蜃蛤中集黿鼉蕩蕩而欲吞江漢沈沈而自恃山河似慮交侵益廣容刀之所如虞徑敵長流急箭之波乃與川后為鄰陽侯共守奚鮫室之能匹信龍宮而是偶沙留聚沫豈粉堞之云無岸轉盤渦實湯池而自有况乎左負滄海前臨孟津樂毅將攻而莫可魯連欲下以無因測彼淺深豈有不沈之板司其啓閉誰為堅守之人偉夫勢壓重泉功齊百雉咽喉苟有於九曲襟帶詎雄乎千里雖則都於坎據於水賴吾唐之聖君四郊清矣暇日間望秋田遠分彼盈疇之多稼乃極目以如雲墾隴畝以青連乍疑一作凝散漫疊災畬而緑合長帶氤氳豈不以膏澤調均薰風順適致南畝以豐稔若西郊之重積芒既抽而散紫花巳飛而帶白幾多嘉穗高低稍類於垂天無限芳田遠近有同於抱石旁觀夫曼衍平川綿延大田接層阜而如從岫出極低空而若與天連農夫既愜於望歲野老咸欣其有年滿原隰以蒼蒼遙迷曉霧被溝塍而彧彧常混晴煙有地皆勻無川不遍何秋成之色可羡疑暮斂之容斯見似能扶日帝堯之日上臨如欲隨風后稷之風旁扇故得村落心泰田家景間競秀發於郊坰之外同垂陰於疆理之間生因桀溺之耕寧由觸石起自樊遲之學豈肯思山匝高下以鮮若羃東西而波委苟含穎以斯在諒無心而若此不稂不莠同玉葉以紛敷彌阜彌岡異奇峯之邐迤是知黍翼翼以相雜麥芃芃而不如誠匪揠苗之後猶疑荷鍤之初若昧躬親奚百畝以斯盛將其刈穫獲千箱而有餘且君之寶以穀而為人之寶惟食是假觀稼盛於五地若雲凝乎四野若不屬此以歌謠終慮取嗤於樵者路入商山中橫武關呀重門之固護屹峭壁以孱顏昔在危時屯千夫而莫守今當聖日致一作置一卒以長間觀乎地勢爭雄山形互對西連蜀漢之險北接崤函之塞鎖百二都帛丿糸幾千代一作載世亂則厄限區宇時清乃通同一作流外內想一作當其六國連謀關防日修則斯地也雲屯貔虎雪耀戈矛一誤干戈張儀出以行詐懷王入而竟留縱下客之雞鳴將開莫可任公孫之馬白欲度無由洎夫一作及乎塵起九州波搖四海秦鹿失而襟帶難保漢龍興而山河詎一作遽改豈料禦衝之所此日全憑未知擊柝之徒當時安在所謂以兵而備之一作者莫之能守以道而居者無得而踰千里之金城湯池終為漢有二世之土崩魚爛自是秦無今則要害何虞隆平已久雖設險而如在一云雖設險以猶在顧戒嚴而則不蕭條故一作古壘豈臧文之廢來歷漠一作寂寞空扉似楊僕之移後斯蓋一作蓋以文修武偃國泰時雍濬四溟而作塹廓八極以為墉遂使鼙鼓無喧一水之秋一作寒聲決決旌旗常卷千巖之暮色重重嗟夫一作乎昔謂洪樞今成隟地信無外以斯見實善閉之猶在一云實善間之攸至儒有經其所感其事乃曰今朝西去苟一作豈無隨老氏之人他日東來一作還誰是識終童之吏
