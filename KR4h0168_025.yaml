front:
  text: 全唐文欽定全唐文卷二十五元宗六
  hash: sha256:6b503e76b34f427e544e4980950a6e86469c06dc0da75f01e0cfa381984101d4
body:
  text: 勅愛人者天地之德育物者陽和之氣朕立極行政體元順時期於緝熙致彼仁壽今永惟春令慶在發生當萬有之遂心虞一物之失所救人恤隱雖巳著於成式施惠布德俾更宏於新令其天下百姓有灼然單貧不存濟者緣租庸先立長行每鄉量放十丁猶恐編戶之中懸磬者衆限數既少或未優洽若有此色尚軫於懷特宜每鄉前放三十丁仍準旨條處分待資產稍成任依恒式其所放丁委縣令對鄉村一一審定務須得實仍令太守子細案覆本道使察訪如有不當者本里正村正先決一百配入軍團縣令解太守本道使不舉者量貶降七德為武必先禁暴五材並用誰能去兵自古葢非獲巳關山遠戍雖多戀本之情祿位高懸終有懋功之賞若能感激信可優矜其諸征行人家有兼丁如載限向滿情願自相替者宜聽其家內應合更差防及諸雜差科一切放免古者黜陟幽明廉問風俗匪惟察吏亦以恤人今考績之期巳過於三載求瘼之意欲觀於四方宜即選擇使臣分往諸道訪察官吏善惡巡問百姓疾苦兼太守縣令老耄者比聞諸郡或有損處尋令賑恤猶慮艱辛須更優矜務使周濟其開元二十九載內外官所舉太守縣令等朕以撫字之任急於用賢特令舉親務欲求實翹車既至頓網無遺不限登科皆令効職既推心而無負期濟理而有成一自守官向巳終秩思聞為政之績以觀推薦之義先有處分必行賞罰尤須審察將復前言迴日並具狀奏聞且量地制邑大小雖殊置吏養人遠近如一比來中下縣令或非精選吏曹因循徒務填闕天下大率小縣稍多至於蒼生詎免其弊若無優獎豈致循良既在得人寧拘格限宜令選人內取中外清資是明經進士應制明法並資蔭出身有幹局書判者各於當色內量減一兩選注選擬赴任之日仍令引見朕當察審去就其老弱者更不得輒注考滿之後準畿官等例三選聽集在任有政績尤異者三考外委本道採訪使與通狀應是下下縣仍并昇為中下縣又令長字人不可蹙闕比來補授直至選時亦有縣在僻遠多不情願遂虛其位累載闕人既無本官為政不一戶口逃散莫不由茲自今巳後宜令選司先量才注擬如非時有事故等闕者所有當月牒中書門下於內外官中擇進擬遣今所在京員外人數稍衆既無職事頗亦滯才其高品者宜擇量授郡守六品以下堪理人者亦授縣令俾其効用冀有成績天下郡縣先有欠公廨本處今既分稅錢並準式依本足例支給使厚其祿以竭其心經國之制省官為本況分司揆務既有常員授職任人須存定限若踰程式實紊紀綱其內外六品以下員外官至考滿後一切並停合依選例自今巳後更不得注擬其皇親諸親幼小及諸色承恩授官軍功技術內省左右龍武軍并諸番官等不在此限所司仍具作條件處分且禮經垂訓篇目攸殊或未盡於通體是有乖於大義昔如堯命四子所以授時周分六官曾不繫月先王行令葢取於斯苟分至之可言何弦望之足舉其禮記月令宜改為時令但五方定位岳鎮總其靈萬物阜成雲雨施其潤上帝攸宅寰宇是仰且岱宗西岳先巳崇封其中岳等三方典禮所尊未齊名秩永言光被用叶靈心其中嶽神宜封為中天王南嶽神為司天王北嶽神為安天王應須祭告仍令所司擇日聞奏天下山水名稱或同義且不經多因於里諺事若仍舊何成於禹別宜令所司各據圖籍改定訖奏聞昭事昊穹必惟殷祀蓋順帝則而成政也肅雍清廟必惟嚴享蓋繼先志而為孝也則累聖之德在人元陽之和在思所以達明靈之景貺迪皇王之大猷者矣朕夕惕宵衣奉天纉業勉思政道惟懷永圖賴百辟庶官輔予不逮聲朔無遠車書靡殊加以乾符坤珍日來月往感福應之尤盛懼明祠之未殷且資父事天因親設教沿情以達禮廣敬以推尊時享之誠寧宜異數日舉之饋豈忘事生是以疇咨故典率循新禮對越上靈聿追嚴配既而崇牙宿設明德惟馨敬爾臣工駿奔執豆陟降至止樂徧禮成精意上協神休下答宜廣維祺之福以覃作解之恩其天下見禁囚徒除十惡死罪及官典犯贓自餘一切放免自天寶元年巳前流人及配隷効力左降官非反逆緣坐其並量移近處其中有年齒衰暮情可哀矜者仍聽致仕朕承大道之訓務好生之德施令約法巳去極刑議罪執文猶存舊目既措而不用亦惡聞其名自今以後斷絞斬刑者宜除削此條仍令法官約近例詳定處分三皇五帝道冠開闢創物垂範功濟生靈繼天之德在墳典而昭著勤人之祀於禮文而尚闕永言龜鏡宜示欽崇其三皇宜置一廟五帝亦置一廟即令所司卜擇吉地營建仍以時致祭其廟令太常寺較諸廟之主禮有遵於合祭同等則祔義亦取於旁通惠宣太子等雖官為立廟比來子孫自祭或時物有闕禮儀不備興言及此良用憮然宜與隱太子及懿德太子列次諸室擇揀一寬處同為廟一應祭祀及樂饌等並令官供每差祭官宜依常式仍都置廟官及丞等自餘所廢廟官等並宜減省奠獻既昭感思增達恭惟陰教以集禎祥自獻祖宣莊皇后張氏巳下祖父未有贈官及一房子孫沈翳所司即以名聞將展襃崇以申追慕王業之初㣥才佐命中興之後元宰協心且配食廟庭必重勳德循名冊府尚有闕遺緬懷茂功用增禮典自今巳後太廟配享功臣高祖室宜加裴寂劉文靜太宗室加長孫無忌李靖杜如晦高宗室加褚遂良高季輔劉仁軌中宗室加狄仁傑魏元忠王同皎文武之道既惟並用宗敬之義不可獨闕其鄉貢武舉人上省先令謁太公廟每拜大將及行師克捷亦宜告廟今勝殘在運無事為心顧此朝儀當符至理既時非旰食將至升平而廷設殺刑何成在宥其每日立仗食設杖鍉等並宜停廢立身揚名所以廣孝流根自葉亦在推恩既切因親之心須開議事之制其內外文武官五品巳上官父祖無資蔭者其所蔭宜同子孫用蔭之例五服之紀宜所跂及三年之數以報免懷齊斬之殊雖存出母之制顧復之慕何申孝子之心其出嫁母宜終服三載祭祀之典犧牲所備將有達於虔誠蓋不資於廣殺況牛之為畜人實有賴既功施於播種亦力被於車輿此比餘生尤可矜憫但前聖有作難為盡廢明神克享亦在深仁自今巳後每大祭祀應用騂犢宜令所司量減其數仍永為常式崇我祖訓其惟道門將以福助生靈宏拯天下諸觀道士等如聞人數今少修行多闕其欠少人處宜度滿七人並取三十巳上灼然有道行經業者充仍令所繇長官精加試練採訪使重覆勿使踰濫度訖挾名奏聞其諸觀有絕無人處亦量度三兩人準此試選賢擇能嘗慮不廣三府之辟則惟採於大名四科之薦蓋不通於小學今承平既久仕進多端必欲遠賁弓旌載空巖穴片善必錄末技無遺天下諸色人中通明一藝巳上各任薦舉仍委所在郡縣長官精加試練灼然超絕流輩遠近所推者具名送省仍委尚書及左右丞諸司委御史中丞更加對試務取名實相副一時奏聞四瀆五嶽雖差秩序興雲播潤蓋同利物崇號所及錫命宜均其五嶽既巳封王四瀆當升公位遞從加等以答靈心其河瀆宜封靈源公濟瀆封清源公江瀆封廣源公淮瀆封長源公仍令所司擇日差使告祭自古聖帝明王忠臣烈士陵墓有頹毀者先令修葺并禁樵採歲月深久摧壞或多宜令所繇郡縣申明前勅處分並五嶽及諸名山大川並令所在長官致祭諸郡義倉本防水旱如聞多有費損妄作破除自今巳後每郡差一上佐專知除賑給百姓之外更不得輒將雜用天下百姓今載應損郡逋租懸調諸色勾徵變換等物及諸延限者並宜一切放免征行之家每令存恤差科之際或未優矜自今巳後並準飛騎例蠲免天下侍老百歲巳上賜綿帛五段粟三碩八十巳上綿帛三段粟二碩仍令所在長官存問各即分付亞獻太子璵賜物二千匹終獻慶王琮賜物一千匹京文武官各賜帛有差天下賜酺三日門下仲虺相湯言宣雅誥子魚佐魏任總中兵將代天工允憑時傑光祿大夫門下侍郎同中書門下平章事集賢殿宏文館學士崇元館大學士太清太微宮使上柱國臨潁縣開國侯陳希烈逸量宏達英才卓邁既履直而成範亦資忠而炳德學該流略義惟守於經門文麗風騷言必詮於理要自黃樞貳職侍講金華紫府宏真參謀玉鉉歲月逾久而其道彌光人師有屬於在三王度式歌於畫一疇咨既久亮采惟熙宜正貂蟬之榮用兼喉舌之寄可行左相兼兵部尚書餘如故禮部舉人比來試人頗非允當帖經首尾不出前後復取者也之乎頗相類之處下帖為弊巳久須是釐革禮部起今每帖前後各出一行相類之處並不須帖街畫奧壤戎夏所交兵鎮專城藩衞攸重開府儀同三司兼涼州牧單于大都護充持節朔方節度副大使榮王琬溫仁植性孝友因心言必備於忠肅動必循於德義爰就師傅學行可觀載錫珪符名器斯允移郛築壘功存禦要距河臨塞籌切雄邊僉論所歸式遏斯寄宜加外總之名俾授中權之略可兼安北大都護餘如故握乾圖者必稟於元命宗道本者允屬於強名是知順物承天諒通昭感之德報功尊祖貴叶崇高之義朕祗荷丕業恭臨大寶何嘗不宵衣滌慮菲食齋心奉元聖之垂範為蒼生以祈福自頃昊穹眷命至道降休玉芝再產真容累見嘉應薦來罔知攸答豈謂元記陰隲祕牒混成懸徵造化之源密紀仙靈之洞慶崇真籙昭錫朕躬初驗神傳竟彰天授幽深累跡既殊於人代朴畧奇象固絕於名言緬覿皇圖欽承道寶微旨有屬寅畏增深思申嚴敬之誠以崇廣大之業謹上元元皇帝號曰聖祖大道元元皇帝仍以來月五日朕親奉冊禮國家文祖神宗重熙累洽無為之訓垂祐清淨之德在人慎寧後昆累承大業是用欽元符之景命歸清廟之延祥稟慶真源光昭聖烈謹上高祖神堯皇帝尊諡曰高祖神堯大聖皇帝太穆皇后竇氏尊諡曰太穆順聖皇后太宗文武聖帝尊諡曰太宗文武大聖皇帝文德聖皇后長孫氏尊諡曰文德順聖皇后高宗天皇大帝尊諡曰高宗天皇大聖皇帝大聖則天皇后武氏尊諡曰則天順聖皇后中宗孝和皇帝尊諡曰中宗孝和大聖皇帝和思皇后趙氏尊諡曰和思順聖皇后睿宗元真皇帝尊諡曰睿宗元真大聖皇帝昭成皇后竇氏尊諡曰昭成順聖皇后肅明皇后劉氏尊諡曰肅明順聖皇后庶彰祈精之感降貽厥之元符聿修誠闕達孝思於罔極更以來月五日於太清宮前恭禮闕寧王憲薛王業各賜物八百匹忠王浚棣王洽鄂王滉光王涺等各賜物七百匹中書門下賜物五百匹開府王毛仲賜物三百匹皇親五等巳上諸親三等巳上及文武百寮各賜物有差自古明王因心以待人由己以施物故休戚共而憂樂同也中書門下丞相尚書開府三司大將軍父贈三品官九卿三監十二衞監門羽林軍五省長官三府尹大都督府長史父各贈四品官五品以上清官父各贈五品官凡所贈官宜兼贈母邑號俾夫㣥臣受榮上延父母先帝遺澤下及幽冥興言及此良多感歎㣥臣一體榮辱是同龍蛇之歌古今作誡其唐元年兩營立功官三品以上與一子官其四品以下選日優與進改京兆府供頓免今年地稅諸道戰亡人家仰州縣存恤不支濟者量事賑給諸軍健兒別勅行人各賜勳兩轉睦親之訓必備恩榮加命之貴是存優寵順成公主誕姿中掖習訓公宮惠心有孚淑問斯著夙蘊柔閒之操克彰婉娩之規式開湯沐雖巳申於築館爰擇井田俾有光於改邑可封廣寧公主依前實封一千戶寄重者位崇勳高者禮厚欽若古訓抑惟舊章開府儀同三司兼右羽林軍大將軍員外置同正員御史大夫范陽大都督府長史柳城郡太守持節充范陽節度經略支度營田陸運押兩蕃渤海黑水等四府節度處置及平盧軍河北海運并管內採訪等事上柱國柳城郡開國公安祿山性合韜鈐氣稟雄武聲威振於絕漠捍禦比於長城戰必克寸平智能料敵所以擢升臺憲仍仗旌麾既表勤王之誠屢申殄寇之略頃者契丹負德潛有禍心乃能運彼深謀累梟渠帥風塵肅靜斥無虞不有殊恩孰彰茂績疆場式遏且薄衞霍之功土宇斯開宜踐韓彭之秩可封東平郡王仍更賜實封二百戶通前五百戶餘如故春秋致享用存昭敬祝史陳信必在正辭苟名位之或乖於上下而非便故經稱崇事易載禺若所以展祗肅明等威朕欽崇道本嗣守丕業每懷如在之誠敢忘奉先之旨禮或未達情實匪寧承前有事宗廟皆稱告享茲乃臨下之辭頗虧尊上之義靜言斯稱殊未為允自今巳後每親告獻太清官太微宮改為朝獻有司行事為薦獻親告享廟改為朝享有司行事為薦享親巡陵改為朝拜有司行事為拜陵應緣諸事告宗廟者改為奏其郊天后土及祀祝云敢昭告者並改為敢昭薦式崇寧禮庶表因心宣示中外令知朕意睦親之恩理貫存歿飾終之禮義表哀榮故特進上柱國汝陽郡王璡植性謙和執心恭懿聞詩禮而稟訓用忠信而飭躬修詞立誠不虧於道依仁遊藝克著於名況久踐崇班彌彰勤勵冀其永固藩翰有光公族奄茲殞歿良多憫念宜加寵贈用旌幽穸可贈太子太師應緣喪葬量事官供仍令京兆尹一人較葬事王者臨馭萬國莫不尊奉五嶽至於迎氣致祭必在辨方正位朕丕承眷命肅事嚴禮庶有令於乾坤用永垂於典實加以厚德載物莫先於土推誠導氣必叶於時在歷數之有徵諒國家之所感含宏廣大利用豐功隨王雖布於四方歸本且闕於中位朕式明統緒用答元符爰創新儀再修墜典頃者每祝黃帝乃就南郊義實有乖禮亦非便稽諸體式理固不然宜於皇城內西南就坤地改置黃帝壇朕當親祀以昭誠敬仍令中書門下與禮官更審參詳奏聞追終悼往諒著於國章考行易名匪私於天屬故司徒兼太原尹持節充河東道諸軍節度大使支度營田等使上柱國慶王琮地居長嫡道茂中和爰在幼沖克光撝挹既著讓賢之美愈聞禮樂之風加之彫琢文藝周旋禮樂固力行以近仁亦因心而為孝自析圭胙土藩翰式崇授鉞分符權略斯遠年方在壯未虞夭喪疾瘵不救憫惜良深宜循加贈之典式寵元儲之位可贈靖德太子應緣喪葬一事巳上宜並官供仍令太子少師韋縚充監護使京兆尹裴士淹充副先王立政必惟擇賢所以時亮天工叶修人紀總資三事是屬中書審於百工僉曰亞相銀青光祿大夫御史大夫判度支事權知太府卿兼蜀郡長史持節劒南節度使支度營田等副大使本道兼山南西道採訪處置使兩京太府司農出納監倉祠祭木炭宮市長春九成宮使關內道及京畿採訪處置使上柱國宏農縣開國伯楊國忠純粹精明懸解虛受比之管樂文多體要之詞擬於邴魏武有韜鈐之學直方其道易能成往自星郎爰秉天憲軍國大政宏益滋多則造膝沃心巳期王佐彌綸經濟同致雍熙況南臺冢宰尤思藻鑑西垣鼎座深佇燮和會予宿心升爾為相宜兼密啟式總如綸可守右相兼吏部尚書集賢殿學士修國史崇元館大學士太清太微宮使仍判度支及蜀郡大都督府長史劒南節度支度營田副大使本道兼山南西道採訪處置使兩京出納勾當租庸鑄錢等使並如故襃德紀功前王之令典飾忠追遠有國之能事況乎嗣生大賢為朕良弼應五百之數該二八之美調元而星辰以理論道而陰陽以和而寵命未宏稱謂猶褊非所以崇推恩之重廣延賞之義也右相兼吏部尚書判度支魏國公楊國忠亡父贈持節魏郡諸軍事守魏郡太守珣赤泉儲祉白環繼業膺積慶而誕德鍾具美而挺生枝茂者根深流長者源濬是降英裔阜成兆人熙載而百度惟清審衡而九流式序佐我元化格於皇天信為名賢實稟庭訓雖思人愛樹巳有疇庸之策而因條振葉宜益封崇之事俾以建旟之寵仍超曳履之榮既旌徽烈用光泉壤可贈武部尚書鄭國公母張氏可贈鄭國夫人授鉞登壇所以理兵用武益封命職所以襃德疇庸才傑者建希代之功績茂者有非常之賞哲王令典無或踰之開府儀同三司兼鴻臚卿員外置同正員西平郡王判武部事攝御史大夫持節充隴右河西節度使支度營田長行轉運九姓等副大使知節度事赤水軍使上柱國涼國公哥舒翰挺生朔陲干城隴外青蛇入笥神發其祥白武銜珠天資我寶美政以公惠著益深畧以果斷能成頃者犬戎包藏禍盈惡稔南援蠻落東窺塞垣特稟廟謀厲八神於金匱長驅戎境歷三軍於玉堂決水奔雷固無前敵屠城拔壘靡有孑遺收九曲之舊疆開千里之沃壤亭障臥鼓既成禁暴之勳屯田饋軍益以豐財之用則議功行賞厚禮酬勞俾吳芮之忠不獨光於漢策魏絳之樂無擅美於闕仍兼望苑之榮繫以公田之錫可開府儀同三司太子少保加賜實封二百戶通前滿五百戶賜音聲小兒十人莊園各一所與一子五品官更與兩子官用旌元帥之勞以益三軍之氣也餘並如故門下緝熙帝載必大賢砥礪公才允膺殊獎銀青光祿大夫行尚書吏部侍郎上柱國彭城郡開國公韋見素風度宏遠操履貞固懷至公之節守難奪之誠學富典墳每思經濟之義文雄搢紳豈獨彫蟲之英薦居東掖顧問有光累拜南宮銓衡式序清素之業惠澤彌彰爾惟不矜朕志先定信可發揮邦政翊賛台陛將宏夢卜之感俾協蒼生之望可守武部尚書同中書門下平章事集賢院學士知門下省事散官勳封如故葛邏祿葉護頓毗伽特稟英姿擅雄荒服威信馭衆智略超㣥仗宏義以立節竭至誠而嚮順逆虜阿布思邱山積釁天地匪容未就誅夷仍茲鼠竄遂能率引弓之旅佐轉戰之師生縛兇渠咸殲醜類雖不長元惡顧神理之必誅而與我同仇乃忠勇之斯美疇其茂績寵以殊榮可開府儀同三司封金山王依舊充葉護祿俸於北庭給其葉護妻及母並封為國夫人朕臨馭萬邦迨今四紀曷嘗不虔誠至道銳心庶政昊穹孚祐俗致升平仁壽之域漸登太和之風斯在比歲小有僭亢頗非豐稔遂使開倉賑乏空圄恤刑兼蠲徭省賦故得家給人足頃者農功正興而霑澤頻阻言念黎獻匪遑厎寧是用發於精誠庶乎昭鑒至誠上達膏雨應期俾夏苗如雲秋穫不日周覽原野宛同茨梁豈惟有慰朕懷實亦克符人慶此皆上元垂貺宗社降靈豈曰朕躬所能通感屬天長令節盛德在金爰因歡慶之辰用申雷雨之澤其天下見禁囚徒有犯十惡及謀殺偽造頭首罪至死者特宜免死配流嶺南遠惡處自餘一切釋放聖人積不涸之泉王者用無窮之府支計苟足多賦何為天下百姓今載租庸並宜放半所運糧儲本資國用太倉今既餘羨江淮轉輸艱勞務在從宜何必舊數其來載水運入京宜並停如聞天下諸郡逃戶有田宅產業妄被人破除並緣欠負租庸親隣貨賣及其歸復無所依投永言此流須加安輯應復業者宜並給還縱巳代出租庸不在徵賠之限書云咸秩㣥望詩曰懷柔百神永惟明徵豈忘昭報今秋稼穡頗勝常年實賴靈祇福臻稔歲其五嶽四瀆所在山川及得道升仙靈迹之處宜委郡縣長官至秋後各令醮祭務崇嚴潔式展誠享無廣屠宰以備牲牢其天下侍老宜各量賜米麥又親人之要令長為重比雖精選未盡徵求卓魯之才或遺蒲密之化安寄宜令京官五品以上正員文官三品以上正員武官及郎中御史各舉堪任縣令一人具名申省委有司試擇奏授其有善惡賞罰與舉主並同僚佐限期一時令集王制下士視上農周政庶士倍祿若衣食既足則廉恥乃知至於資用靡充或貪求不巳敗名冒法實此之繇輦轂之下尤難取給其在兩京文武九品巳上正員既親於職務可謂勤心自今巳後每月給俸食雜用防閤庶僕等宜十分為率加二分其同正員官加一分仍永為常式其南衙九品巳上并京兆府畿令等宜共賜物二萬匹左右龍武軍各賜一千匹其唐元功臣念言勳舊宜異常倫兩軍各賜物二千匹餘各有差庶生成之澤自葉而流根慶賞之恩繇衷以暢物宜宣示遐邇知朕意焉綾羅絹布雜貨等交易皆合通用如聞市肆必須見錢深非道理自今巳後與錢貨兼用違法者準法罪之人惟邦本本固邦寧必在安人方能固本永言理道實獲朕心思所以康濟黎庶寵綏華夏上副宗廟乾坤之寄下答㝢縣貢獻之勤何嘗不夜分輟寢日旰忘食然以眇眇之身當四海之貴雖則長想遐邇不可家至日見至於宣布政教安輯逋亡言念再三其勤至矣莫副朕命實用恧焉當扆永懷靜言厥緒豈人流自久招諭不還上情靡通於下衆心罔達於上求之明發想見其人當屬括地使宇文融謁見於延英殿朕以人必土著因議逃亡嘉其忠讜堪任以事乃授其田戶紀綱兼委之都縣釐革便令充使奉以安人遂能恤我黎元克將朕命發自夏首及於歲終巡按所及歸首百萬仍聞宣制之日老幼欣躍惟令是從多流淚以感朕心咸吐誠以荷王命猶恐朕之薄德未孚於人撫字安存更冀良算遂命百司長吏方州岳牧僉議廟堂廣徵異見㣥詞盈於札翰環省彌於旬日庶廣朕意豈以為勞稽衆考言謂斯折衷欲人必信期於令行凡爾司存勉以遵守夫食為人天富而後教經教彞體前哲至言故平糴行於昔王義倉加於近代所以存九年之蓄收上中之斂穰賤則農不傷財災饉則時無菜色救人活國其利博哉今流戶大來玉田載理敖庾之務寤寐所懷其客戶所稅錢宜均充所在常平倉用仍許預付價直任粟麥兼貯并舊常平錢粟並委本道判官勾當處置使斂散及時務以矜恤且分災恤患州黨之常情損餘濟闕親隣之善貸故木鐸云徇里胥均功夜績相從齊俗以贍今陽和布澤丁壯就田言念鰥惸事資拯助宜委使司與州縣商量勸作農社貧富相恤耕耘以時仍每至雨澤之後種穫忙月州縣常務一切停減使趨時急於備寇尺璧賤於寸陰是則天無虛施人無遺力又政在經遠功惟久著今逃亡初復居業未康循逃戶及籍外剩田猶宜勞徠理資存撫其十道分判官三五年內使就厥功令有終始當道覆闕及須推劾並以委之不須廣差餘使示專其事不擾於人政術有能必行賞罰其巳奏復業歸首勾當州縣每季一申不須挾名致有勞擾其歸首戶各令新首處與本貫計會年戶色役勿欺隱及其兩處徵科宣布天下使明知朕意震澤之南數州之地頃以水潦暴至沱潛潰溢既敗城郭復瀦原田連歲大歉元元重困餒殍相望流庸莫返加之以師旅煩之以賦役哀我矜人何以堪命朕君臨之道猶鬱牧養之政未宏咎之所降諒在於茲雖天災流行則有恒數而夕惕若厲豈忘責躬夫振人育物大易之明義也自漢魏以來水旱之處必遣使巡問以安集之國朝因其制焉亦命近臣慰撫俾喻求瘼之意用紓科斂之急宜令中散大夫給事中賀若察往湖南宣慰處置其百姓遭損不能自存者應須賑給蠲免宜與本道觀察使商量處置訖聞奏仍齎詔書體問周恤宣示郡邑令悉朕懷門下緣情制禮賢聖所不忘以諡易名古今之同貫故右千牛衞大將軍上柱國汴王璥雖在齠齔頗標嶷岐率以訓典期於老成裂地而封是崇藩屏享年不永俄從夭折秀而不實有以傷嗟宜遵考行之義以備飾終之典可諡曰哀不敬之大在於毀犯陵園自擅之重切於矯誣詔令有此亂常之道必貽無赦之責姜慶初自以頑劣得參姻婭錄其先効擢在西臺素無行能巳速官謗朕永感霜露式瞻松柏以其職司俾往厎事輒於禁域擅鑿連岡當衣冠之出遊臨歲月之所建既有犯於神御又不利於王室知其不可固有所專疑一昨臨遣再三戒勅無君棄命兇蠧尤深書不云乎刑故無小況釋之明陵土之義申屠致廟堧之誅死未云責不忘私眷特緩嚴刑宜賜自盡史忠烈王臣子等忝從所職敢有挾邪事既同科法當均罪亦宜賜自盡其家貲並收沒其駙馬裴倣雖不知情合當緣坐且削官爵拘於私第永清公主亦隨在宅仍絕朝參使知警懼朕自君臨每思刑措豈圖戚里干我國章任匪其人有慙所鑒議法難恕撫懷增傷百辟卿士知朕意焉門下惠宣太子第三十一女柔姿婉訓淑德閑和早習組紃備詳圖史移天有禮撰日于歸宜增列郡之封允叶睦親之計可封新平郡主主者施行門下故惠宣太子第三十女肅雍成性柔婉為容稟訓女師克嫻嬪則爰占近日用叶初笄申錫美名受封良邑可封安定郡主主者施行門下嗣澤王珣承派咸池分輝扶景錫珪前寵纂周典之親賢磐石今隆高漢朝之子弟機彩明悟神情峻拔雅量夙成宏才早著儒庠教冑適資於下帷蕃郡理人允求於別乘衣冠就秩宜頒列位之榮井賦開疆仍茂承家之業可國子司業有德者位崇有功者秩厚事本關於國體理無隔於邦媛故周母有亂臣之名漢嬪有比侯之爵睿宗貴妃豆盧氏賢妃王氏性質陰禮實毗內政訓行九御譽滿六宮歲祀雖淹徽音未昧宜啟非常之命特賜湯沐之邑可各食實封二百戶
