  - {type: head, offset: 3773, content: 甲讀衛生經而知吉凶乙告違勅法司科擅卜禁刑, id: KR4h0168_NFKB_983-h56, level: 2}
  - {type: head, offset: 3921, content: 對太倉耳缺判, id: KR4h0168_NFKB_983-h57, level: 2}
  - {type: head, offset: 3921, content: 太倉申左右耳缺大農不稱其任, id: KR4h0168_NFKB_983-h58, level: 2}
  - {type: head, offset: 4056, content: '對[:#AS-8C7D:⿱鹵木]氏為量判', id: KR4h0168_NFKB_983-h59, level: 2}
  - {type: head, offset: 4056, content: '', id: KR4h0168_NFKB_983-h60, level: 2}
  - {type: head, offset: 4239, content: 對度判, id: KR4h0168_NFKB_983-h61, level: 2}
  - {type: head, offset: 4239, content: 內官以竹為引高廣之數法陰陽宗正以為不中度請科之辭稱事所宜也非無故實, id: KR4h0168_NFKB_983-h62, level: 2}
  - {type: head, offset: 4324, content: 對斗秤判, id: KR4h0168_NFKB_983-h63, level: 2}
  - {type: head, offset: 4324, content: 太府寺去秋追三市斗秤踰月不送寺以市司違時徵銅四斤丞梅福訴云九月上旬平校畢, id: KR4h0168_NFKB_983-h64, level: 2}
  - {type: head, offset: 4431, content: 對貯藳判, id: KR4h0168_NFKB_983-h65, level: 2}
  - {type: head, offset: 4431, content: 所司貯藳以三千圍為積苫覆無芘(防脂切)籬合科何罪, id: KR4h0168_NFKB_983-h66, level: 2}
  - {type: head, offset: 4498, content: 對磑分利不平判, id: KR4h0168_NFKB_983-h67, level: 2}
  - {type: head, offset: 4498, content: 吳丙王丁共有磑納課分利丙云有賸丁云擲日知分所得無賸, id: KR4h0168_NFKB_983-h68, level: 2}
  - {type: head, offset: 4617, content: 對鏇樹為杯椀判, id: KR4h0168_NFKB_983-h69, level: 2}
  - {type: head, offset: 4617, content: 得甲鏇榆樹為杯椀出賣鄉官責其游手惰業, id: KR4h0168_NFKB_983-h70, level: 2}
