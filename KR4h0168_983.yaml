front:
  text: 全唐文欽定全唐文卷九百八十三闕名二十四
  hash: sha256:74cbbe58babe6a5a5007b071a3eb011c60e9439e838d6857254ad178a5d49331
body:
  text: 喪則有等自辨於重輕禮之所行亦崇於節制乙以天乎降戾斯殞其夫則穆伯早亡鄧攸無嗣啜其泣矣何痛如之永懷夫黨無親因求里尹為主禮則然矣人何非哉且決曹所稱亦何加止蓋以喪也寧戚禮則因情姊憂去官見稱於陳重弟服去職著美於譙元斯則事之有由一作猷言也何爽得失相半斯之謂歟亠兊州人平辨受業於田才才亡辨著服六年廬於墓側刺史以為違經越禮妄造異端禁錮三年辨妻遣女上策稱寃廉察彈刺史刑獄不當不學牆面先哲之格言以德潤身前賢之令軌孔子要道逐楊震以西來馬融門生隨鄭元而東去田才地鄰鄒魯俗富詩書水接沂川家傳禮樂白圭無玷孤標席上之珍黃金可輕獨貴林中之寶平辨伏膺道術企足風猷訪顏子於淹中得田生於稷下葉抽槐市鼓篋笥而踐緇帷花發杏壇整襟裾而趨絳帳一登閫閥幾積寒暄知十之業既宏在三之敬尤重專門春誦高臺於是忽傾負杖晨歌梁木由其遽壞荒階積雪徒觀東郭之蹤逝水驚波無復西河之氣師資之禮痛貫幽靈伏道之誠悲深卉木葺苫廬於墓側製麻服於塋前檀木遷移葭灰屢變墳抽細草撫書帶而增悲牖挂殘絲拂琴絃而永慕刺史褰帷魯國剖竹雩壇馮熊軾以宣風樹隼旟而展化以為非禮將作異端不樹甘棠之陰翻行叢棘之酷昔門人子貢廬於孔氏之墳弟子叔然制彼鄭生之服六年不釋於禮稍乖三載錮身在情何忍但以事符公冶繫犴獄而多年命比緹縈仰鳳闈而長叫廉使郵星整俗驛傳宣威正豸冠以觸邪下烏臺而肅物女既陳請使又彈非霜簡載馳雪身無路兩頭今既發覺一面何使逃刑宜降朱轓用直丹筆亠兊州人平辨受業於田才才亡辨著服六年廬於墓側刺史以為違經越禮妄造異端禁錮三年辨妻遣女上策稱寃廉察彈刺史刑獄不當田才地居鄒魯家習文儒業擅籯金道光珍席夙漸升堂之教早傳藏壁之書學市攸開几筵爰設故得詢疑請益還如北海之前函丈摳衣更似西河之上平辨雩川童子闕里諸生常因閉戶之勤豫受專門之業庶祈榮於青紫希變采於朱藍日就月將罰水疑之恩何極陵夷谷徙頽山之痛已深舊宅凄清空聞絲竹遺壇寂寞無復琴歌嗟二物之長收顧百身而莫贖方思重服用表深衷一對松楸六遷檀柘曩時儒肆喜遇祥鱣今日凶廬悲逢弔鶴論情雖會於寧戚據理未允於通途刺史職在宣風政乖道俗沉憂六載亦可驚嗟積禁三年固其未得少女以銜冤伏奏雅叶於雞鳴大使以糾慝彈豪正諧於隼擊即宜録奏伏聽宸衷季氏令質幽間秀容綺艷事夫有道荊金義見美於梁鴻訓子多方布被推賢於孟母為善必應天乎不仁三從靡依兩喪相次欹枕之淚空灑倚廬之望莫依不捨晨昏深符禮制一作則喪子之親哀情已極喪夫之婦為怨難勝非無寡鶴之悲豈息驚猿之痛然喪夫喪子悽感雖同而哭子哭夫禮儀須別穆伯之卒已有前規敬姜告言一何無識縣丞行罰之日於禮已違嫠婦自貽之在律難恕顧茲刑憲並合推科居母親之喪茹荼飲痛踊既無節哭何常聲悲在其中形瘠於外口不甘味身不安美潘生園裏無復版輿顧氏家中空餘畫扇仙人白鶴遙投士行之前孺子隻雞遠赴林宗之所蔡順有繞墳之感老萊無衣綵之由喬枝未摧桂樹猶茂執椅桐之杖上芝蘭之堂循禮制而多違顧刑書而有犯請歸司敗任便科推丁為人子持乎喪服身體髮膚不失全生之道衣衾棺槨無虧送死之儀仰風樹而充窮履霜庭而孺慕鍾創巨之悲酷有荼蓼之苦辛壁日不停練期何及毀不滅性痛感終身道在慎終義存追遠人來輒語禮稱忘哀㣥立多爽於事宜旅行有乖於物理二途俱發一罪須科執親之喪行孝之道出入不當門隧升降不由阼階苴縗在躬溢米充食恨纏風樹痛結寒泉舉號已見於心摧毀瘠載聞於骨立念親之在土哀親之在外寢唯枕塊居必倚廬隙駟不留祥期奄及既除凶制奚鼓素琴示人有終於物無犯食醢猶許奏樂何辜請從雪滌庶符冰釋聖上德合乾坤情深惻隱將廣厚生之道爰崇去殺之文受緩禮於前經懲噬乾於成象三廠墨鼓刃有禁班行百姓造罧無令止息京兆以人多結網即謂臨河以皇上之仁深見寰中之信及論設網之子即云盡欲求魚得鑄劍之夫何必皆緣斷馬事煩言上夫復奚疑鱗族惟錯實繁有徒人不知非龍實有智風雲遇坎見困豫且變化逢屯充膳夏后丁以詭俗為事遊刃非物或異仁賢罔識悔吝何則犬不言殺前哲良規馬重有功後代明訓况四靈之貴萬化之資匪惟瑞啓漢年固以仙登軒帝以屠為稱豈不作法於涼以律繩之可謂自貽伊戚三光赫赫牛星紀於北方八極悠悠牛山建於東國錢塘水上遠浮金鎖之輝蜀郡江前遙沉石犀之影豈止披蹄戴角玉鞅華鞦南州聞果下之名西域表花津之異固以禮標極敬大祀資於潔圭易贊神明引重憑於致遠由是降茲綸綍著彼科條姜牙絶其鼓刀庖丁息其游刃侯明鄉閭賤品稼穡庸夫常傳寧戚之經久習高堂之法西河資産希十千而萬計東州奔駿方一日而千里俄而野心興暴縱目為災引騂角之雕弓控青筌之箭羽異天弧之垂象空法向狼之星殊封禪之舊章便為射牛之事誤殺不禁著自彞章罪疑從輕聞諸古實人守堅貞克終無替苟失廉節其弊斯生乙棲心邱園託志間雅忘負鼎之事從扣角之遊徘徊泉石躑躅林草雅志情遠防微理乖事須正子夏之冠避朱仲之李豈得牽壽春之犢踐於陵之園人而失圖一至於此丑也奚據罰彼何深所損既在於場苗取酬便過於佩犢叔時作喻蹊田罪輕邱明述事奪牛刑重前文已決後見須依議獄緩死先典攸慎聽言觀色法貴詳平刑罰暫虧手足無措眷彼丁矣有異里仁見蒲葉之生春無聞曳耒入桃林之巨野爰事鼓刀遂令河渚風秋奄沉星彩蜀山路險不見金生景匪良交遂來相訴芳蘭入詠遽展契於風雲叢棘議刑幾窮詞於刀筆搖尾求食斯之謂乎朝歌殺牛理非謬矣方引循環之辨翻露鑄錢之責緬監厥跡奚其若斯未盡金潭之由更起淮陽之獄州司振藻處以極刑使者彈毫將為徒坐諒哀矜而勿喜何輕重其若斯狀外不推使司得其折衷案中論死州法酷其深文結以徒刑吾無間矣天經地義道冠生靈立身揚名德光終始見危授命宣尼以為美談臨難捐軀馬遷述其遺烈韓孝忝曰人子先隨父行逢瑩角之初驚似衝燕壘遇奔蹄之暫躍若走秦郊倉黃貽性之憂倏忽慮庖之患霜鋒一舉若庖丁之刃游冰鍔聊揮似宰夫之斷割原始雖稱犯罪要終未可論辜既符名教之規還申壯勇之節酬價匪虧公理與直有愜私家庶叶平反之詞以表從輕之典惟犬守禦居人是安混雞而入坐識於新豐伴鷹而遊行傳於上蔡是故閭閻密邇音響相聞喧雀成譁表貧吏之節噬腓起戒陳為主之誠何畜養之是均而城外之多死知殃預兆未銜吳相之衣遘斃遄深為食驪姬之藥流穢行路彰聞法司舉過從事關京兆且敝帷從棄孔聖之義有虧掩骼候時周公之禮可守二途交戰須定是非執禮而行斯亦為得沉沉長江巖巖峻峽波瀾沃日嶺嶂橫雲路出東吳即是三聲之地途危西蜀還尋萬里之橋顧惟彼景在茲于役乘流振楫方從赤馬之遊滿月彎弧遂落元猿之影雖同養由之妙終致桓公之黜於人則事乖親愛在獸則理切肝腸彼或可傷此何辭黜池籞大開羽族無算乙忝夷隸職養官鵝諒須盡心能識其性稻粱可遇蔓藻堪遊浮積水而連㣥向長風而鼓翅遂其棲託終冀繁多倦鸚鵡以樊籠樂鶢鶋以鐘鼓以人養鳥不死胡為儻或類茲如何免責且片言折獄自古攸難理宜再詰是非不可輕為與奪丁家輦泥載聞於頭禿黃氏把火旋見於眼傷甲之無良情則非善以蒺藜而充飼三子俱亡無桃李之垂陰一朝被告迹符周氏罪挂湯羅循情合科準狀難捨丁為拙好收養賈兒日月淹延羽毛成就逢人不懼遇物無驚有鴨㣥之精神得鷽斯之風彩楚鳥既非別族吳鴉亦是一宗未能甘鼠巳聞啄穀鳥未損物人則何辜即索賠填恐非通允丁稱不伏理亦無乖順時之令則無覆巢作災之禽固資書版陳之禮典布以人倫苟或在辰克用茲道是以有梟萃止爰結興於詩人見彈而求乃寓言於莊叟長沙天性入室貽凶曲阜陳誠毀巢標喻硩蔟氏職惟斯掌務乃昭明有均大羅之躅是忝虞人之效將去妖鳥式徇其義既切惡聲庶無全卵日號月號之法書而不從子從角之規用則斯備周典非昧方書是懸均射隼於高墉豈巢鵀於外戶將使驚鳴緒闐疑同反舌之無聲聯翩影搖隨退鶂之不駐事非詭妄告實欺誣諒稽十日之號難置三章之典大羅以往禮猶因襲豢龍斯廢法亦罕聞自我化及豚魚仁霑草木放楚王之鵠不咎使乎驚梁君之雁豈誅行者獸育豐草鳥棲平林一角以瑞於昌期九苞載叶於仁義瞻言過者豈得傷乎必也百獸異倫六禽殊類稻粱空費庖厨未供遇而見傷亦何矜其非政捨而勿問庶得令其惟新甲以人成恐乖中典欽哉惟恤寧失不經道存皆應感至必通能分禽獸之言豈專夷貊之隸公冶長之縲絏鳥語知非介葛盧之犧牲牛鳴辨數始由人聽終見物情乙以氣烈剛腸寃深反目素不謹於帷薄終取敗於嫌疑行茲亂風自抵邦憲徒嫁禍於鄰婦冀逃刑於我躬屬郡縣察微輕重不濫比夫窶數知來頗類乎方朔驗茲鳱鵠取效何異於公明古而有徵今也寧惑殺人之罪按律可求孽乃自作死將誰緩至若日月薄蝕君臣著象夢轉歌於童子聞取幣於嗇夫伐鼓回輪有祇膺之事迹陰弓枉矢開救射之規模義雖責於上公物終列於庭氏藏非武庫救即㣥妖何邑居之有災見主司之不務殊若在已近欲幸人既闕五兵之伐因虧十日之號實忤於典良尸厥官思取義於磔禳請論刑於徽纆陰陽不測造化多端故有夷蠻之隸實司鳥獸之語乙波流未息克廣前書精義不窮旁通異類告稱妖妄欲抵刑章即科介葛之辜實恐冶長非罪以今况古不坐為然有龜之德徵神為用稟靈千歲遊質於芳蓮納錫九江彰名於禮物取其象事知變占事知來然以寓莊周之談時聞曳尾挂豫且之網寧知刳骨緬懷於甲時惟卜人將言釁龜以考其象理宜別諸名物定乎吉凶俾春夏以宜左右必順有紊於制實惟伊何欲置戾焉事可訊者何則取十朋而分睨弇乃先釁以為尤參五行以觀兆數雖後辨而未失覆其兩端願言一問藏往知來道高三聖內貞外悔名重九江所以大決狐疑先定人志焉得捨其三易紊彼六官賜帛無聞仰滑稽而慙妙致墨多中知僂句之不欺覺筮短而龜長遽變常而易業雖百錢取給有慕君平而四體不勤孰為夫子智有所達鑽祀骨而觀貞神則何施抵凝脂而獲戾且以業為兼善才貴多能端策拂龜罪不加於詹尹收解網刑請寬於易人道月戒期周乎四海卜年貽慶稽彼十朋菙人職在巫咸用方心而考吉材均季主負圖背而知來拂此元衣異夫青純有殊命寶何能致墨執法以簪筆彈珠且問九江之錫主司以巾笥藏骨莫辨千年所留既虧玉兆之獻須抵金科之罰徒為薄訴誰之過歟圖緯垂文龜蓍著象聖人操洞微之柄達者究索隱之端故知盡性窮理惟賢與聖是以魏稱管輅晉有景純卦成而洞曉吉凶繇發而潛知倚伏此皆奇才出於夭骨遠識符於自然爰逮凡人不干其議所以時忌惑衆敕設禁條甲雖沉思緯象遊精數術名止齊於庶品道豈同於古人冒違敕之明文自貽伊戚挂繩非之峻筆何所逃刑然慮或告不真法須更審請窮兩造方定片言正月吉日國命既懸於兩觀同律度量聖典每均乎四時况天子有司多方取則如或失墜其謂法何但不戒而具有虞何闕縱令器有隳毀亦宜隨事修補既羸左右何成出入太倉乾糾不恪將射隼於高墉大農叨忝厥官失庖魚於下局且如古今命官都邑一作都署聯屬沿革既異主掌斯殊不可歸罪一官責成一職重詰所謂庶符一作乎恤刑鹵木氏為量容釜令人概而不稅所司科之謹其權量義叶順時範彼金錫道成厥器信斗斛而均制乃鐘鼎而齊功施之以平萬商立之而觀四國罔不以法貴諸合儀鹵木氏職在為量功期永啓既改煎而不耗亦自權而準之莫不審以方圓容之釜豆炎煙散彩浮紫氣之光芒洞響函規應黃鍾之宮律深模正典實利生民可以垂範將來可以行之天下概而不稅雅符師古之蹤按而將科殊紊平反之道鹵木氏既無遺失圄囚一作梓匠理合審詳罰乃有詞刑宜用恤律歷攸同丈尺有準度必慎於圭撮高一作廣寧失於分寸苟昧斯義則非其人惟此內官聯於宗正權量法度無黍纍之差墨丈尋常豈毫釐之謬允酌故實克循前典既法陰陽之數固因銅竹之宜科之則非訴者為是太府官惟度量務切權衡驗寶貝之充盈察泉貨之輕重校量斗稱甲令有時事屬司存不當踰月瞻言稽緩須置科條梅福跡淪下列志追前古暫輟九江之仙來從三市之任詞有所屈恐獲戾於錙銖道或可遵豈論於圭撮薄言未息紛紜猶多宜窮五聽之情方按三章之律秣馬所資唯草是用徵科百里輸納六間黃白無差短長合度貯積之法令條有文數越三千理則多僻從疑作縱勤苫覆終闕芘籬施功不同處事彌爽犯既非謬辜不免科吳丙王丁均期叶契雞鳴求利不憚孟軻之譏馬磨自資更殊許靖之操市道難固財交易竭競斯升㪷顏寧厚於指囷徇彼錐刀魄無慙於碎璧或陳其有賸許以無厭或掠以浮雲稱斯擲日日有修短關諸至期利有盈虛定乎宜分理應各得何假相尤然質劑既未研詳刑名豈能懸斷更尋枝派方悉根源士農工商孟堅陳十志之本水火金木箕子載五行之數悠悠㣥動各有定業明明財利為謀不同惟甲肖形運乎天巧既勤事於賈豎且效功於匠伯加以是揆是度掎漢社之星榆乃刳乃鏟揮郢人之風斫杯非承露未立雲表碗殊鍊藥空候淮南徇錐刀之小利損耕桑之大業若斬伐愆時未符周禮如雕僞不作自陶魯政夫除害興利禁末勸農罔或奢巧實防器玩器不涉於無用賣有濟於時須雖慙敦本之俗難加惰業之罪幸殊游手宜寬祝面
