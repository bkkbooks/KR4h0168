body:
  text: 君子自強惜分陰於短刻期碩學於縑緗念冉冉之特移非徒愛景惜依依之為戀足冀回光每正中而圭表常懼減於毫芒事且異於秉燭理寧同於息影崇樹在乎功名淹速繼於時景苟不競夫分寸亦何期乎悠永三冬未就實有念於錙銖九仞將成顧無虧於俄頃當其南軒向晝北戶初寒微照悠揚而漸短斜暉晼晚而將殘分以惜焉豈少私而寡欲時之至也諒失易而得難及其躔次當留光華未暮宜草草以不息希曀曀而常駐出處無瑕故垂法於前賢往來不遑見遺履之莫顧既目擊而眷眷亦心想而專專况志業之難就當清陰之屢遷莫不以日繫月以時繫年是宜向微秒而重矣何得在斯須而舍旃不然夏后何以為聖陶公曷足稱賢於焉激切仰茲先哲彼分晷而莫駐此寸陰而靡輟不食不寢載勉於勞者之心以遨以遊誠乖乎志士之節皎皎白駒若有若無雖長繩而莫繫於桑野長戈不能卻彼泉隅今則曖昧斯在瞬息不改宜乎陋韞石之騰輝輕尺璧之殊彩庶立功而立事故不而不怠士有閲簡策尚專精恆俾夜而作晝每聚螢以襲明期照燭於無隱俟沉研而有成縹帙時開玉篆共丹輝並耀銀鈎下映繁星與片月俱生帷幌之際微明舒蔽或熠熠以光吐復離離而珠綴俯而察煥乎呈科斗之文靜而觀炯爾見雕蟲之藝諒依人以明道匪韜光以自衛居暗室者懷我而載寢載興遇明時者假我而自強自勵用或因物勤斯飭躬不晦乎風雨不翳乎昏蒙臨墨池則珠還合浦映草聖則燎點寒叢誰謂向乎晦照篇籍兮無大無小誰謂藏乎密隨晝夜兮無固無必金輝始徹疑清露之騰文鳥迹旋分謂靈烏之就日可以窮永夕可以佐殘燈舍之則其功不足用之則其道彌宏顧螢光之在照蓋欲罷而不能政之至也物全其真德之至也信洽於人不矜不能彼則先之於戒令無偏無黨我則獨寄於真淳諒保政以自睦乃去邪而得仁不然何以姦歸曲直從伸風俗優遊而嚮化草木條暢而和春者哉觀夫穆穆時和溫溫德廣漸之以忠信紀之以刑賞奉聖日之貞明助南風之長養於以任人而任德豈惟舉直而錯枉戴星從事我且亦務其劬勞鳴琴在堂我又不違其偃仰是知循名法者非鴻淳之盛代施慘烈者異冬日之可愛苟和順以積中故信誠而發內人知我所奚憂險易之爭政致平康誰假韋弦之佩事無事為無為清淨而時惟昭泰簡易而人不驅馳物無欺兮彞倫式序政有經兮百度咸宜布和為風而偃草降德為澤而濡枝匪寬猛以取濟匪恩威而自施一德旁流齊是非於衆庶三無合則混情性於高卑豈不以酌元和叶誠悃遷善者斯焉而取斯懷慝者損之而又損君子謂是政也為邦家之大本聖哲之人含道德以自貴遠王褱奇而不珍被褐所懷上恃慈儉以為主作礪於用下推忠信以為臣俾得各歸於其璞庶將靡失於其真異彼滿堂且由乎知足殊夫潤屋焉藉以發身慮知損而賈害比行妨而賤賄寧因衆口以鑠自絶匹夫之罪當令與土同價誰重一籯念其將石俱焚奚誇陸海塞淫奢之路彰廉潔之徒諒縱橫而抵鵲豈鎔範以為符抑好貨之心自家刑國秉不貪之志雖有若無顧毀櫝兮則那念稱穴之可恥獻而辭也足愧彼宋人欲乃攫之誡書乎列子還茲磧礫之內宜彼巖巒之隈類亞父之碎斗鄙昭王之築臺虛而盈將以禮義為器藏諸用何須府庫之財靡近取於藍田詎遠求於林邑卻玲瓏兮塵翳守清淨兮冰立或黃或白得之而必捐如錫如圭踐之而不拾空韞石以自晦孰披沙而強分若受欺於田父嗤冒賞於商君執固窮以去奢視同纍塊喻至富於求學輕如浮雲於是國尚親仁民從棄利戒多藏於百貨思寡欲於萬類所攻惟善寧採之於荊山所揀惟賢任雨之於秦地至精者米至大者山伊巧心之可化諒措手之非艱始聚之時雖未離乎掌握象成之後若可極於躋攀昔馬援以炎徼未賓雄圖是急爰請兵以薄伐將越險而深入懼君意之未明陳地形之久習既而辨襟帶分郡邑雖蠻貊千里亦可圍於寸眸岡巒萬重誠不過於數粒方高高而仰止異屑屑而俯拾遠近忽其豆分東西俄而玉立寫載既宣規模罔雪峯競聳雲嶺交連初疑棲之糧尚班於地漸似如坻之庾欲峻於天笑覆簣之難進訝高陵之遽遷起自纎微有類積塵為嶽終非奇幻那同畫地成川且堅而不動者山之常遠而可識者人之智既分銖於忖度得道路之險陂所謂喻大於微圖難於易事非同於積纍迹豈涉夫詐偽故得戶牖不窺要荒可知積廩於增麗因陳而究奇縮地勢於撮土之間孰云見小備山形於握粟之內何慮功虧近可得而立驗遠無勞於坐馳經營若神不愧巨靈之迹融結隨意將符真宰之窺至矣哉曲盡人謀詳規地險非㣥玉而玉彩爭光異落星而星芒亂點然後師干可試隘害可期不假斗筲之算因成指畫之資念彼愚公誰肯與其進也徵夫良將吾當學以聚之惟隙有輝惟塵是依微明散亂若動若飛殊向晦以宴息類趨明而識機不逐大車寧發詩人之歎無昏廣陌詎緇遊子之衣觀乎杲杲初陽沉沉暗室纎光乍進爰委其質忽煙涵而霧貫每延風而寫日透綺帳而偏明曖丹楹而乍失不重乎金屋不貴乎華堂隨明則著在映而彰代皆擇其居我則不辭於處隙代皆異其志我則不厭乎和光似有情而聚散若任理以行藏漠漠如流翳白駒之逸影濛濛不息起清唱於雕梁惟深惟微于閨于闥來不可止去不可遏語其志也流形似競於分陰語其微也弱質已侔於毫末豈不以循其隙襲其輝洞幽房之曭朗籠踈牖之霏微道或未行歎浮沉之異路時而後動任韜晦以同歸散漫回環空濛蒨練謂醯雞之乍覩疑野馬之潛見不爭鄰女之光不雜寒階之霰故知委范甑者志有所未安惑孔顏者時有所未歡處沉冥而匪異辨疑似而愈難曷若因孤光而有託附流影而為觀者哉所謂暗而能彰虛而能受望彈冠而自必騰清路而何不幸承命於光塵賦斯文而藉手彼好奇者巧與之俱揉煨燼兮是謀是度象猛獸兮為虎為貙將以輝爍殊觀熠耀洪爐腹翕赩以凝電口喊呀而奪朱曳尾垂頭似無心而暴物噓煙吐焰若有齒而焚軀寓形兮必果徒搏兮莫可鋸牙鉤爪乍騰倚於寒灰隅目高眶載光芒於烈火所以暖虛室娛密坐稽其狀也成鷙獸之雄雄求其類焉笑形鹽之其靜兮無營其動兮匪驚稍頓足以狼顧時迸裂以豺聲煜爚交光孰辨犬羊之鞹䫜顤欲步似懷林野之情因炎上以委質殊檻中而徇生輝兮赫兮美其容之有焯不貪不暴嘉其身之中清無野心以見誚非內熱以自照恆虩虩而畜勇復煌煌而引耀威而不猛謂馴擾於中堂攫而莫前疑踡局於餘燎襲狐貉者對之而不驚被絺綌者向之而伏膺佐南薰之煦嫗卻北陸之嚴凝金釭近之而發彩玉壺鄰之而散冰髬髟而枕藉爌晃依馮類火鼠兮炎邱是託比燭龍兮崑閬斯升此制也不唯資於玩好抑亦彰夫伎能天鎮四野君尊萬方取威重以馭物在秉持而有章叶和人神蓋先之於六瑞表正旒扆誠用之乎百王斯為貴也寶之大者琢磨有耀溫潤無瑕天臨靜謐以我鎮壓乎寰中帝德休明以我熠耀乎諸夏皓爾凝潔溫如可觀蘊五德之符采寫四鎮之峯巒其色正其容端乃直乃方象名山而守固不瑕不穢配王室以常安豈不貞姿有奉嘉名天寵遠以視其凝命近以彰其端拱大而不瑑禮經匪尚其文華執之不回聖人無離其輕重想夫始自良工成茲國器端乎掌握撫寧天地邦有六瑞而圭列其初國有三山而象包其四穆穆之儀是佐溫溫之德斯備所謂天子是毗邦國是維雲虹發色冰雪成姿玉几臨朝承德音而有裕金門曉闕布寬政而無私是知岱華恆衡之高自此而增峻琳琅琬炎之美自此而發奇形抱素以呈妍聲含清而取振當照臨之際曾不掩瑜在韜韞之時寧忘作鎮所以朝九有接萬靈奇姿粲粲衆彩熒熒大禹成功垂芳於帝典吾君致理酌憲於國經故曰觀一圭之質見四鎮之形觀一夫之政見萬國之寧儒臣賦鎮圭之事敢大揚於王庭昔姮娥服仙藥於俄頃指陰靈以馳騁嗟人世之如流覺天衢之何永於是竦身騫翥霽月凝冷振環鏘珮雜珠露之珊珊雲帔花冠渡銀河之耿耿伊立志之有恆果躡景而可憑出乎寥廓愛此清澄企豫望之想蟾蜍之下視進吾往也軼埃壒而上升且夫碧虛望而自致清質瞻而不墜天迥而音塵已沒風落而芳馨微至往而不返誰謂與子偕行仰之彌高孰云不我遐棄窈窕輕舉圓明映空遺九族於脫屣冀孤輪之處躬獨往孤高若集瑤池之上潛來煙霧如分紈扇之中迷晶皎亂瞳融神明合柔德通想泛金波詎假琴高之鯉將搖桂魄寧因禦寇之風冥冥晬容規規皓質乘飛廉兮竦踴迫望舒兮寥慓初疑妝以臨鏡形影猶分終類冰之在壺輝華相失故得享年代之悠久與乾坤而齊一明明配日高高在天對陽鳥之升降伴顧兔之昭宣滿時而玉貌和光難分皓皓虧處而娥眉共麗不辨娟娟炯若通輝超然絶俗想明眸而下鑒並玉鉤而傍燭閨中結恨感豫於三五之時笛裏傳情聽我於關山之曲豈伊異人學道全真湘波之洛浦之神曾不足繼其芳塵草綿綿兮擢穎含薰風發發兮乍靡而分其取象也散芳馨於知已其為義也合政令於人君豈惟動之而委順抑亦播之而有聞觀其徜徉代起激拂無已轉緑蕙而影亂時光泛青蘋而文橫秋水浸淫翳薈振奮蘭芷颯然而動昔有遇於荊王泠爾斯來今不乘於列子翻蓊鬱轉葳蕤在芃芃而可玩觀習習而無遺被以幽深諒有條而有暢布乎原隰誠長之而養之或徐或疾順天作則大以抑其滋蔓細以蕩其幽默分乎萬彙蓋吹萬以齊驅繫於一人誠畫一於同德不擇乎高下不棄乎幽蒙敷葉而重重偃翠翻花而灼灼駢紅連綿九野披靡千叢倚伏俟時小人之心猶草衰榮不問君子之德如風莽平皋悠揚茂苑風何草之不動草何風而不偃飄杜蘅而芳氣自遙歷蒿艾而清聲漸遠是知風為號令之類草為衆庶之徒方以俟其披拂固有適於榮枯立政則斯為大矣騰芳而孰不宜乎故觀其化者知神之造觀其風者知國之道將有宣於八方故寓形於蔓草仲尼以之而取譬宋玉由斯而奮藻雖異代而殊時竊敢攄於懷抱彼茁者蓬其生苯䔿因驚風之動地遂離根而去本委順而往異愚夫之守株任運則行叶高人之嘉遁摧弱質絶陳根始遲遲而徐轉俄忽忽而駿奔體以圓而疾質以弱而存凌寒後雕雖有慙於松柏近秋俱敗亦無愧於蘭蓀時也玉露為霜金風應律歎芳菲而難久覩搖落之不一初宛轉以孤翻漸邐迤而連出度平野而暫見映層皋而還失徘徊未已同風葉之辭枝漂蕩不停甚水萍之委質若乃慘淡雲晚悠揚日短歲云秋矣莖弱者先衰風以動之根危者易斷徒觀其委地離披縈吹參差既忘懷於近遠寧繫迹於高卑觸物何情類虛舟而自泛善行無迹於野馬而相隨豈不以生無固蒂轉有長風象車輪未始有極如循環莫知所終遊子感而忘歸歎飄居陌上小人見而懷土憶生在麻中矧夫依物暫停遇風復舉乍飄揚以歷亂或回旋而容與青蘋之末不起聊可以躊躇黃埃之中自飛孰知其處所客有因時結念寓物屬詞觀其衰兮懼老將至矣觀其轉也嗟行靡不之撫懷抱起心有之誡驚鬢髮增首如之悲儻陽春之可待亦何恨飄飄於此時山有極天崇崒冠㣥嶽而首出下壓溟渤之崎岸平視扶桑之初日天光海上瞳瞳而曉色已分人代夢中促促而寒更未畢客有愛此早景登茲崇山候東方之昏黑據中頂之孱顏俄而陽開陰閉翕赩回還曳晨光於莽蒼之外走狂電於溟濛之間高焰忽興瀾汗而洪濤血赤半規猶隱洪彤而青帝朱殷及其旋轉將升睢盱萬狀散五彩而錦章已出照三山而鼎足相向杲杲茲始規規滿望火輪上碾燒碧落之氛埃金汁下融躍洪爐之波浪觀夫巨浸無際踆烏上搏萬象昭著二儀霍寬驚魚龍之蟄銷昧谷之寒散入圃畦想葵藿之俱靡稍分林嶺見木石之同壇獨立嵯峩曠瞻晷度足廠田坴次一道暉華四布赫曦而六合貞明吞納而百川奔赴不假濬沖之目盡見元虛之賦赫奕昭宣層巖之巔赤玉之盤燭地黃金之鏡帖天海若奪魄羲和振鞭溼光而長波初沃暖氣而孤峯最先美潤呈祥重光賦彩帶環抱之珥照不波之海陰火之微茫已沉土圭之盈縮屢改則知大明之麗天兮可捧而升高山之橫空兮作鎮不崩儻躋攀之有路願觀光而一登昔帝舜之南巡不回翳二兮心傷已摧對三湘之遙兮積水無際望九疑之作兮愁雲不開鬱丹誠而飲恨攀緑篠以興哀淚浪浪而千里墮睫竹冉冉而萬點凝苔斂蛾之怨盈臆如狸之班變色落紅臉而珠影爭圓染碧纎兮纈文交織夭紹嬋娟嗚咽澘然瀝青簡兮丹書粲粲灑緑枝兮白露漣漣所謂精神達而理歸其著悲哀集而物謝其堅想夫萬里迎秋重江向夕引蒼翠以歔欷忽闌干而委積杖卷然之手兩點垂絲揮密爾之叢衆痕凝碧是知至哀必感有怨必通竹無情而發外淚有感而從中慷慨成行乍洗龍吟之管斕斒繞節如交鳳食之叢寧類夫聲伯再懷其夢想楊朱徒歎其西東豈無芳菲渝其霜霰豈無浩渺忘其顧盼是以委檀欒寄蔥蒨來非鼓瑟玉箸之滴瀝雙流去乃望夫粉籜之淋漓一變懿乎巖巒滿目今古含情事雖遷於歲月理不昧於堅貞或翦修竿對潭中而錦落或成長簟施堂上而霞騰豈不以拂水捎雲逾千越萬庶夫知我者謂我點點而成文不知我者徒曰青青而懷怨聖理遐遠毛㣥效靈有兔爰止載白其形乘金氣而來居然正色因月輪而下大叶祥經豈不以應至道之神化彰吾君之德馨皎如霜輝溫如玉粹毫素絲而可擬足瓊枝而取類與三窟以殊歸將五靈而共至潔朗貞質聯帛丿糸雅致名殊東郭韓盧不敢向前迹近中林蒼鷹無由得鷙其容炳真其性懷仁飲玉池而冰光不散食瑤草而雪影長新理符守黑事異文身儻使銜鉤殷帝之狼不若如令受彩江生之筆非神載寢載興或馴或擾仰天鑒以昭晰託御林而皎皛為太白之材用作殊祥之標表原夫陰步馬所為不識不知賁然練被炯若星馳白則西方其理且同於服順兔為明視其義取鑒於安危豈惟跧伏於庭側踴躍於堂垂者哉觀其間暇沐浴鴻化笑魯殿之浮名恥梁園之舊價俾夫守株之士幾恨窮通過隙之駒空悲代謝是知隱霧而憂者其文蔚反袂而嗟者其道屈曷若保貞白以暉映承聖靈之剪拂同瑞牒而登高異周書而玩物所以充福應叶禎祥事資朴素匪亞文章知獸用之不擾審天符之允臧伴祥烏於苑囿鄰瑞鴈於池塘懿夫以道德為筌蹄者其可忘皓爾凝素襜如夕張因潔朗以旁徹遂虛明而內彰繇是以洞篇翰鑒毫芒委六出之姿喜乘時而瑞聖就三冬之業期利用之觀光况復素軸增輝經紗閟彩擇居中之茫昧致藏用之所在霏微兮太素初分晃朗兮窮陰既改映草元之客類姑射之神仙隱談天之人疑胚渾之真宰凜凜寒色融融墓幃縑緗叢耀簡牒連輝朣朧而微月將入冪䍥而輕風乍霏故得百代旁窺萬流仰鏡稽古昔資興詠動鉛管而有助含章對鶴書而無非浴淨蓋以啓其幽默不獨事其韜映契莊周之理虛白自生徵大禹之文光陰是競俾夫夕可以忘寐牖可以罷窺煥乎而不藏於密昭然而蓋取諸離清熒兮寒氣方壯髣佛兮晴雲欲披澄筆海之波瀾皆為練色耀書林之梓盡作瓊枝是能燭前轍彰往哲時觀謝賦想墀廡之縈盈載覩曹詩歎蜉蝣之掘閲詳夫理同委照處異在陰比然膏之功益簡助繁日之務逾深必將修詞以進德實勤考古以觀今所謂用晦而彰韜光有睹袪絳紗之閟邃發素王之牖戶期潔白以無虧庶研精乎千古吾君朝黃圖坐甲乙履元吉觀慶雲之飛來暈長空以夾日日明而麗雲潤而黃隨輪已入乎青陸抱影長依於正陽磅礡不散氛氳呈祥暖萬物則草木春色涵一氣則天地黃光推而言之則君為日臣為雲君非臣則股肱斯廢雲非日則光耀難分故上下同體表裏成文樓形遙景于東戶葉影潛扇於南薰由教有所至朝無可昏是日王三朝躔五緯杲杲然無幽不燭飄飄然何遠不暨白主喪氛黑為兵氣將閉陽和動令人畏又奚能勢均抱戴色不嚴毅似龍虎之宛轉傍楹簷之髣佛是日也風不霾時正佳雲日輪盛光陰克諧入房焉可以擬議干呂何足以為懷帶慶雲而共美與淑氣而同儕天有日兮晨光重日有珥兮黃雲捧亦如東海大而百川朝北辰高而衆星拱雲初繚繞日亦曈曨合三光而為一混五色而居中於是彰國祚表年豐應履端之時令識來事之殷充察天象兮陽烏奮翼稽瑞圖兮人望允塞使無階而可乘敢不慙於帝力靈降嘉夢天垂至陽誠發身之兆朕符翊聖之禎祥所謂神而遇暗而章息沖淡之居于于而自得見貞明之質曖曖而彌光倏爾疑升瞰兮下燭曈曨甘寢之所恍惚曾泉之曲撫金烏之翼匪隔雲霄駐羲和之車乍回昏旭想夫卑高莫鄰授受何因忽煌煌而委照值默默而凝神寂其神乃無間而通碧落上其手自有昊而得紅輪縹眇魂交光芒景附肘腋輝爍襟懷煦嫗類銜規於遠山同抱璧於中路在忘形之際用示無私當向晦之時將袪未寤豈不以精誠可託光陰可駐從九霄之降祉表千載之嘉遇者也故曰道契幽微天且不違肸蠻陰步馬指掌陽輝載營魄而虛無默住荷靈貺而照燭潛依至若冥蒙上越埃中歇始悠悠以神契俄赫赫而明發驗扶桑之際其往阻修偶支枕之時其來倏忽是知天無親降靈而非遐神不昧燭幽而不賒不然何虛徐袵席承奉光華高眠而不驚不悚見瑞而可仰可嘉然則荀令之談足徵程昱之榮有兆常眷眷於天路每拳拳於雲表周旋寤寐偃仰昏曉庶照臨之理感通知葵藿之誠不小昔在帝舜昭融車書混同當中而方覃睿化彈琴而遂奏薰風將令煦嫗之恩被于天下欲使和平之道均彼寰中欽若鴻猷康哉上聖修柴望而巡四嶽在璇璣而齊七政彞倫攸敘八元用而八凱登庶績咸熙四目明而四聰正是何茂育生民時移化淳豈不以道有所漸功有所因始頒瑞於㣥后俄舞于於七旬然後端拱無事垂衣守真奏五絃之樂陶萬化之鈞所以厚風俗和神人正父子明君臣三才所以乂百姓所以親故其歌曰南風之薰以阜吾之民且夫角之音兮和而治商之音兮廉而恥徵之音兮正而始皆可以敘九功康百揆琴之聲兮既若此歌之聲兮復如彼然則五音之配在宮為君八風之德在南曰薰南者庶類之所滋盛薰者萬物之所氤氳動乎中形於外播於樂聲成文是知盡善之樂非聖人兮孰作移風之和助元功之匪訛且異軒皇但奏雲門之曲寧同漢后唯陳猛士之歌今我后運叶興王公符象帝修夔氏之韻樂執真元之左契故得淑氣四統妖氛遠霽洋洋聖謨豈遜于有虞之際昔任公子釣魚經年不獲及其獲也衆人饜之公孫宏十上不遇及其遇也帝王任之固知餌大則魚大功高則祿厚魚也人也何酷似乎感其義以作賦曰千載崇崇我聞任公獨坐會稽之上垂釣東海之中海之廣兮混然飛流魚之大兮邈矣難儔所謂之魚三千餘里何以為餌五十其牛其釣兮星霜已周日居月諸兮吞此大鉤吞鉤之時其勢回互覺巨絙之緊急驚白波以鼓怒攪大海簸高濤嶪三山憚㣥鼇及夫道盡途殫繩窮勢蹙突兀出水蹉跎望陸一岸山橫半天雲矗巨鱗既已傾海水亦以清吞舟之害平若乃飛鸞刀以撞突泉為膏兮嶽為骨剝鱗上之重錦抉眼中之明月由河之北達於東溟萬民饜飫三年羶腥向時兮刻意臨川勞神有年舟人不顧漁子悠然坐石滑兮積苔蘚蒼葭變兮老雲煙今日兮投竿瞬息以肉為食豫且氣懾詹何失色契我心者臧丈人適我願者龍伯國釣道既爾人亦如此孫宏未遇買臣家貧海上牧豕江邊負薪常以雲霄自致燕雀時人受侮不少守志彌真終逢挺拔俱為漢臣典郡則還鄉衣錦作相而開閣迎賓則知餌大者魚大道肥者祿肥獲大則喜雖晚何悲魚之與人殊途而同歸昔太公之未遇也隱於渭之濱釣於渭之津坐磻石而不易其摻垂直鉤而不撓其神波萬重而我心惟一歲三周而吾道方申既而寒潭曉霽莫不遺乎巨細兀忘形而有待引經綸而不替期陰步馬以旁行忽冥符而下濟於是拔深泉激細漣振錦鱗而雲霞煥若獲玉璜而篆籀昭然皎皎霜淨亭亭月懸表蒼兕之期功鄰造化騰白虹之氣理契先天所以耀川靈所以誇漁者徘徊自適憤惋俱寫臨清流而素彩熒煌昭白日而祥光上下公乃起川隅懷寶符禺昂志氣振奮泥塗捧抵鵲之容彌彰潔白入飛熊之兆寧掩瑕瑜衆皆釣其名我則釣其道衆皆釣其魚我則釣其寶故知神全者不辭於貧賤志大者不歎於枯稿皤皤兮白髮湜湜兮清流其來也釣於周所謂運良謀擁神休豈芳餌而能獲匪嘉魚而足求異和氏之功疵瑕受戮賤詹何之術溪澗空投然則道感其誠德亦有報天以我為忠告客有悅其性者莫不望茲川而高蹈門下凝成庶政必屬於長材經制四方是資於碩望况參酌理本燮和化源苟非傑賢孰允斯任爰立舊德將諧具瞻淮南節度副大使知節度事管內支度營田觀察處置等使銀青光祿大夫檢校尚書左僕射兼揚州大都督府長史御史大夫上柱國江夏縣開國侯食邑一千戶李鄘性惟直方器本宏固沖敏足以成務通明可以質疑懷匡主之忠規蘊經邦之遠略歷居雄鎮纍服大寮臺閣藩方動留成式資為重望綽有餘材必能翼宣鴻猷導迎嘉祉是用徵拜陟于黃樞竭爾訏謨司我號令法期畫一俗俾康寧寅亮庶工屬在良弼可守門下侍郎同中書門下平章事散官勳賜如故門下江漢之間襟帶之重歷考前載咸稱上遊濱七澤之川源為一方之都會撫封命帥匪易其人朕所以屬意忠賢達於寤寐思宏至理暢合元元是用選茲廉平付以疆土允叶僉議庸歸至公銀青光祿大夫尚書左丞相柳公綽儒門令緒文苑宏才器含剛堅質抱沉厚臨事有斷龍泉挺霜雪之鋒處身無瑕大寶蘊雲虹之氣間者擢居臺閣纍守方隅長沙流易簡之風鄂渚肅鼓鼙之令及典司饋運牧長京畿銓綜庶官紀綱百度咸能舉其典則奉以周旋顧惟公忠朕所嘉尚今乃命爾仗茲旌旄鎮峴首之城池撫襄陽之耆舊於戲昔羊叔子以寬厚宏其化杜征南以文雅播其猷人到於今往往稱歎勉爾終始嗣乎風流罔俾二臣獨輝專美霜臺峻秩人部榮班載光超擢之恩式崇連帥之拜服我嘉尚爾其欽哉可檢校戶部尚書襄州山南東道節度等使議曰吏部擇才用之地職在辨九流之清濁擇四科之邪正推忠良而進英傑舉廉直而黜不職夫天生萬民樹之以元后元后不能以獨任故委之以㣥吏㣥吏不能以自達故繫之以選部選部者風化之本源人倫之砥礪也書曰知人則哲能官人安民則惠哲與惠其選部之志歟所謂㣥吏者君之耳目君以衆耳聽天下之哀樂則無遠不聞矣君以衆目視天下之得失則無遠不見矣若以耳不為君之聰目不為君之明非㣥吏之過抑亦選部之過其故何也背輪轅之用雜賢愚之迹以至於此也夫聖人求賢良而授之政事非徒貴賢良之德義蓋重元元之性命也今之有司罕通其意每歲調天下之士但考其書判據其資格為之品第授之祿秩先訪私家利便次論俸錢之厚薄多士盈庭而自售若衆賈之徙市焉豈銓綜人物品藻英髦之所在也是以天下百姓未臻於和樂者職此之由矣夫以一鏡之明而照天下之形者固難盡其妍媸以一衡之平而稱天下之輕重者固難定其毫釐矣今每歲選人請委州府長史先研其迹行次考其渝濫曾理務者以恪勤廉慎為一科處邱園者以孝悌貞良為一科著此二科然後申送主司按其詞而閲其材材與行必良則試之以理要可觀則從而祿之其郡府長史當校其殊考若材行相反朋黨相資則從而黜之其郡府長史亦書以下考材如此則天下之共公於選吏吏部郎亦不敢私於天下矣俾夫人顧行行顧材材顧祿祿無虛授人無苟得廉恥之化行貪競之風息矣恭聞十目所視十手所指猶是非可辨賢愚可驗况用天下之目乎况用天下之手乎率是道而寮寀不得其人風俗不致和平者未之有也謹議議曰弧矢之利以威天下其來尚矣仲尼有云不教民戰是謂棄之蓋用仁義為之本籌略為之次果敢為之末故曰齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義所謂善師者不陳善陳者不戰蓋有自矣今之有司不曾端其本而徒襲其末取天下之士以懸的布埒為之標準捨矢之中否跨馬之遲速以貌第其人升降其秩豈暇全武之七德射之五善者歟及國家有邊境之虞則被之以甲胄授之以弓矢驅以就役當數倍之師不能屠名城克強敵者何也在司武之不經擇士之無本矣孫吳者兵家之首足不可不行也今孫吳之術卷而不張徒以干戈為擇士之器何異夫無首而冠無足而履哉今請天下應兵部舉選者各習兵書一藝然後試以弓矢優其武辨所謂智勇兼資材略並運仁義之師復行於湯武之代豈惟式遏寇虐震怛戎虜者哉謹議噫日月明而忠賢生日月翳而忠賢斃明翳其天耶非耶其數耶非耶將適然耶非耶且自昔抱大忠而生抱大忠而死者亦何可勝言雖天傾地搖山拆川竭猶可得而評論焉及至軒轅氏之天以道為日月無明翳之變故風后力牧得適其材焉帝堯氏之天以德為日月無生斃之數故羲和氏百工之徒得信其用焉帝舜氏之天以仁為日月無虧盈之節故十六族得宏其理焉大禹氏之天以公為日月無氛靄之蔽故皋陶稷卨之臣得專其任焉殷湯氏之天以信為日月不皎不昧故伊尹得符其志焉文王氏之天以心為日月無薄蝕之變故周召之倫得張其化焉我大唐氏之天以政為日月故房杜魏徵得盡其訏謨焉其餘上自列國下逮周隋或以耳目為日月或以左右為日月一明一翳非天之所為也非地之所為也故萇宏辟伍員梟范蠡魯連去徐衍負石三閭懷沙良可痛哉然三閭者以大忠而揭大文沉吟楚澤哀鬱自贊爰興裦貶六經同風至宋玉景差皆弟子也况吾黨哉唐文宗太和二年春防奉命宜春抵湘陰歇帆西渚邑宰馬搏謂豫曰三閭之墳有碑無文豈前賢缺歟又曰俗以三閭投汨水而殞所葬者招魂也常所惑焉按圖經汨冬水二尺夏九尺則為大水也古之與今其汨不甚異也又楚人惜三閭之才閔三閭之死舟馳楫驟至今為俗安有尋常之水而失其遺骸哉安有不睹其骸而知其懷沙哉但以楚詞有大小招魂後人憑而穿鑿不足徵也愚則以為三閭魂歸於泉尸歸於墳靈歸於祠為其實郡守東海徐希仁洎馬搏以豫常學古道熟君臣至理之義請述始終符契以廣忠賢之業云於戲後代知豫者以此罪豫者以此文曰屈碑立兮讒人泣兮屈碑推兮讒人咍兮碑兮碑兮汨之隗兮天高地濶孤魂魄兮剪流為池軋崖為籠或泳或流逍遙其中何必龍門十躓一通何必滄溟白浪長風此水不竭此崖無窮沖先生名也清虛先生字也本郡主簿西曹祭酒湘東王國常侍先生官也靜福山先生家也於戲先生之名玉堂金簡之名矣先生之官詞林學府之官矣先生之家紅霞丹景之家矣至若鶴骨松貌泉渟谷虛寓形人間天地無纍與夫青童君扶桑公陶隱居張天師遙為師友矣以梁中大通三年家此山陳光大二年去此山春秋九十七門人邑子無以知其蹤但徘徊醮壇泣對香火而已長慶末余自尚書司封郎知制誥翰林學士得罪出守臨汀尋改此郡慕先生至道登先生舊山捫蘿撥雲瞻仰不足稽首巖戶強為之銘曰元都丈人大道之師靜福先生從而學之仙書無文仙語無詞以心傳心天地不知猛虎我策長蛇我持放情逍遙古今為誰華表白鶴千年一歸不知先生此會何時瞻望雲路人間後期
