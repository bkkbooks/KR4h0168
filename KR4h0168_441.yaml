front:
  text: 全唐文欽定全唐文卷四百四十一叔良廣德二年進士
  hash: sha256:2acdf1f52a6a53662ec9547a489a1357164a3249754d044caee4bb075082a6dd
  markers:
  - {type: head, offset: 14, content: 張叔良, id: KR4h0168_NFKB_441-h1, level: 1}
body:
  text: 聖人守公器膺大寶下順乎黔黎上法乎元造天且不言而親於德星有同色兮應以道日月既運欃槍必掃近接唐堯遠徵太昊惠化已敷於萬國降精何慙於五老若乃二儀覆載七曜回旋運行有準次舍有足廠田坴或以璧合或以珠連更水火之啓閉遞金木而推遷且鎮也者配萬象以時應周四序以功全德位居中渾儀之人事著矣色黃主土國家之王氣在焉故歲以春而布令辰以冬而侯宣熒惑奉炎於夏日太白御煞於秋天皆青白各爾赤黑自然忽與土而同色瑞我皇之應乾逖覽傳記遐徵休咎陰數六陽數九上蒼降精元象所守事須合於往契政必由乎厥后二儀交泰兮自古同休五星輝彩兮當今信有天下歡洽百姓殷阜况運昌兮屬乎羲軒矧歲稔兮逢乎申酉且夫據大號寶鴻名既資乎日角亦稟乎星精然後臻符瑞叶休禎天雖高兮取則不遠象既設兮其應甚明觀五曜之同質審四序之有成則知聖能法天天能瑞聖君臣合作遠近相慶德邁乎古今道洽乎歌詠信五星之一色乃昊天之眷命湜大歷中官大理司直嘗聞示見有緣緣隨生滅色空無性性盡真如契之者即為導師了之者如登正覺契了之義其在我禪師歟禪師法諱同光晉人也道心天縱法性生知甫及幼童已悟無為之理才過弱冠便歸不二之門早歲出家旋進具戒以修行之本莫大于律儀究竟之心須終于禪寂禪律之道其在斯乎及持鉢東山歸心禪袒大照屢蒙授記許為人師及大照遷神敬終恆禮乃遁跡林野敢為人先雖情發于衷而聲聞於外辭不獲已乃演大法義開大法門二十餘年振動中外從師授業不可勝言三十餘禪僧盡了心地隨身化度不離几杖或往來嵩少棲息荊蠻用大自在之深心開悟知見行不思議之密行拯拔昏迷不可得而名言也則知法輪常轉經闕慙翰墨有愧荒蕪乃為銘曰世尊滅度後得道轉法輪于今無量劫不知凡幾人禪師自河汾杖錫來問道禪師為授記可以繼僧寶三身與三業如電亦如露生滅既有緣輪回自無數惟有成道者能入諸禪定外現泡幻身內亦真如性一切漏已盡無復諸煩惱過去與未來皆共成佛道太室西兮少室東風雨交兮天地中禪師一去不復返長夜冥冥空是空登肅宗朝官右監門衛胄曹參軍遷右拾遺維闕四字兩儀維聖人首于萬物物本於道道行於人人資於教物本於道者姑肯務德乎人資於教者闕肯崇德乎夫教始於儒中於道終於釋釋之時義大矣哉空寂為體慈悲為用生死為苦涅槃為樂闕二字詢夫異兆漢后夢夫真儀越自西天傳諸東夏所以九圍之內六服之外像法流衍元風振揚四千二百甲子于茲矣我天寶之季乾柱穴㓎折坤維穴㓎裂有為凶渠奸亂河朔有生逆節乘釁江淮乾元中暴兵至于金陵蹂踖閭閻殘其寺觀鞠為瓦礫者福興首之福興寺梁大同二年之俶建也本於塘蒲之東遷於銀湖之北中更一徙以襲其初傳記缺遺莫詳歲月嗟夫昔穢國盡燒我淨土弗毀慧眼之覩矣今精廬斯壞我法侶無歸凡目之取矣有禪師德號道融本姓樓東陽義烏人也肅宗皇帝龍飛朔方大赦天下改元為至德每寺度人以蕃王室時潤州刺史兼御史大夫江南東道節度處置使京兆韋公陟俾屬城大德咸舉所知禪師行業精修法門之中裒然為首遂正名僧籍而闕一字於福興焉初入牛頭山謁第六闕一字忠大師遽受密印而為正座大師三昧之主四支之尊攝心無涯定力無等首施錢三十萬謂禪師曰可闕二字招提闕一字其安樂禪師跪以奉命乃初請之邑再請之州州伯邑長僉諧懇願以大唐上元二年龍集辛丑季秋月旬有九日遂移氏十舊額肇氏十新居於天竺之山為真寶地也天竺在故寺東南七里名符佛國山則我鄉此蓋有開必先陰隲靈鷲禪師嘗讀經典至千二百五十人俱闕一字之而言曰豈直多徒亦堪集事遂據此數以裒其人人錢三緡共成法相行檀如水品物如山未盈旬時我望充塞闕一字是邑也建業舊都有齊梁遺風乃聚沙為塔於然燈求記者家不無之易用受化是故棟梁之才闕一字里而來如陵如堆班倕之伍千里而聚如雲如雨乩之以日懋之以功刊山陊崖敜阱夷坎芟蒙蘢為顯地剗崱闕一字為康衢其平如磨其細如砥禪師以心居中度殿以背居後度宇以首居高度臺以足居下度室以臂居北度廊以手居南度門戶授闕三字皆約我身規圓之矩方之縱度之橫闕一字之上協於天下協於地明協於人幽協於神然後斯之以斧斤督之以繩墨審之以面勢較之以方隅使人無所惑也闕一字之以闕三字之以榱桷闕一字之以軒牖墄之以階墀使人知大壯也先之以粉繪後之以丹雘雕之以金璧鏤之以闕二字使人觀巨麗也春爍瀛海花敷蓬萊如鵬斯飛如虹斯飲色空相射晶光相廞煌煌炎炎闕二字爛爛回翔日月吐納陰陽弗可得而名也白蕩之山以闕一字其左滄江之水以浟其右斗辰之闕一字以爓其上盤龍之鎮以抉其後望夫南上以啓行慈姥東向而奔走勝勢交闕三字放紛蓄靈孕奇闕一字嵐泄霧彩章屢變濃淡更鮮又弗可得而名也多羅之樹鬱以青葱功德之水湛而清淨涌塔浮於倒景香剎彗於行雲貴色有薝蔔之花和鳴有迦陵之鳥大雄據師子之座賁然當陽太子垂瓔珞之衣嫣然列侍相好闕二字變化無窮罔得智而知罔得億而測巍巍光大不可稱量四天赫臨八部周護持殳秉矟一何稜闕四字頤一何拗怒精靈肸蠁如在虛空元攴乎誘掖㣥生虔修六度撞鐘鳴磬以破昏疑擊鼓吹螺以施號令聞者開般若之智見者發菩提之心或謂寶生之國極樂之土頗黎為地黃金為繩流泉浴池珠交霧幔以此為念吾無靦焉惟禪師之經營茲寺也禎符景瑞匪朝伊夕五翬掊地神之定矣三虎禦寇神之命矣二木不奪神之正矣一泉息濁神之淨矣靈芝三秀嬔谷嬔山祥蓮合房于沼于沚造門之女詬而不宿遊方之人投而弗禁祅災起念而自殄危懼歸心而必釋禪師之道惡可倪也禪師之德惡可測也演慈悲之化降淫慝之神皆建廟立祠血食不絶近云百祀遠謂千齡大則犧牛之建小則特豚之禱以月以日以時以節弗敢矯誣不闕五字墉屹然灌木捎天但得而遵何繇而殛禪師以為修道之本在於利人從人之欲可謂除患乃詣其闕三字視諦觀以日繫月身心靜一或呈醜相未覩睟容或闕三字無何稽首悉與受菩薩淨戒而度脫之斬陰斬陽以為梵宇取彼居室置之金仙寂寥而無事矣城邑聚落數百里閒巫風遂消佛道增長闕字主之教歟繄禪師之力歟二相交修一體互用不然者何以元通妙感而若是乎豫耳聆嘉聲目覽懿跡乃知闕一字聖道者誰能慮始創僧坊者闕四字王公大人豪富長者國當全盛家有貨財然以更之存亡積之年紀人則盡瘁事或藂殘未有闕二字乎禪門獨行世界時遭多難道弗屢空闕二字而闕一字福自開晏坐而萬緣斯湊不七八稔指顧皆成輪才乎而奐才乎而若夫經始之善人屋宇之闕一字數紀於碑陰之上庶千劫炳然而可闕一字其辭曰觀空匪易闕一字相良難既觀又闕一字揚波導瀾淵淵我師體闕一字行端經之精舍粲以林巒其宇伊何維木冉與檀其飾伊何維琅與玕耀耀華影峩峩鬱盤閟陰迪陽從暑閲寒世界非廣渤澥非寬景於是萃思於是殫甘露之門淨口以餐般若之闕二字心以安右浹大江左馳長干靄如山青赩若霞丹硉矹豐碑闕二字不刊追琢斯文億載是觀森字從政大歷朝朝散大夫兼并州別駕述夫闕一字冥淡泊者不可以思及混成空有者不可以闕一字量故我聖人之善不知其名而強名之者其惟大道乎先天闕一字王後時闕一字進希微豈得乎搏聽混澄焉撓其清濁湛然無為莫之領闕一字三才自敘萬物大成洎乎叔世智巧闕一字滋闕一字飭陶甄之用漸昧自然之本是以聖人維網深仁救時存乎闕一字象以匡闕一字弊我大唐元宗大聖皇帝道超萬古功冠百王探至闕一字以拯蒼生廣清化而敦兆庶欽若上帝追還元始闕一字以天寶二年闕一字月闕一字日下如聞州縣古元元廟年代將遠或多頽闕一字宜令所在長官量加修葺時縣令河東柳升長河之秀高嶽之英負不羈之才闕二字雲之氣上承朝闕一字下順人心因庭之餘爰搜永寧鄉古廟夫行政治者必務洽乎道乃與景龍觀先生田名德語斯改更闕三字生之闕四字人之力乃於縣東纘舊業創新制周回數里垣闕一字百雉朝啓疏壤夕終杇飾若非至道精感其孰能與於此乎尊師勸勉有方歸化如市堂殿廊宇煥焉惟新元像真容肅然如在至五年又以闕一字術之餘資闕一字洪鐘一口并植奇樹珍林廣芝田蘭圃不可勝數動闕三字精感潛通六年闕一字月闕一字日有詔賜額曰永仙觀敕尊師為觀主別新度七人以充灑掃則自此而立也頃以國家多難未終闕二字之功今天下闕一字平土宇清謐一人有慶兆庶咸蘇復興一蕢之功將成九仞之業大歷六年乃建門屋尊師闕一字務既畢內闕一字蒼生聿修開闕一字之門大啓迷津之闕一字於是集晉右軍王羲之書勒清淨智慧觀身經銘碑刻石實邁古今經文鎮開永疑壬子之世道門復值何必甲申之年觀是則身患頓忘仰之則筌蹄懸解總諸盛事克就其功不稱不伐者惟尊師乎尊師頻陽人也闕一字道而闕一字含道而長年十四中宗孝和皇帝登極置景龍觀而度凡闕一字五十載然主此觀又踰三紀行業闕二字於海內令聲聞達於天府其年七月十六日闕三字旨令知奉先等縣威儀使尊師德合闕三字同其廣事無為而無不為行常道乃非常道闕二字上善無得而稱宏波莫測其淺深闕一字涯豈量其遠近上座蘭法會監闕一字公孫志誠弟子徒衆彭惠源并諸縣闕一字道俗門闕一字等千有餘人并道行純修智懷泉遠咸仰茲德業患作而無記幸時逢康泰人喜豐年縣令裴公平政治有方惠訓無喻故特鏤文金石特建豐碑庶不朽之功並乾坤而可久靜默之教歷億歲而彌彰其詞曰浩浩元始冥冥混成氣分萬族闕二字千名淳闕一字化起闕三字生偉哉闕一字聖聿闕一字善誘探賾隱顯覃思空有闕一字乎未形吾乃無咎握圖繼胄粵我大唐轉彼頽迹降此新綱廟遷邑左化啓頻陽碧堂挺起元宮秀出壘棟闕一字雲浮梁映日面闕一字聖衆羅衛匪一闕二字善貸表列希聲萬鈞陶冶九乳方成響愈迷俗韻節昏明王祭王祭琪林氛氛蘭圃神草遍秀祥花閒吐帷蓋元都垂陰紫府道宏業廣精闕一字無垠天仙合德人物通神皇宮錫號翰苑題文觀闕一字觀惠非實非虛身有患有身無患無或異周蝶或同鵬魚盡至道闕一字道亦真如闕一字如闕一字文既闕一字於闕一字火雕篆是闕一字於玉書功高望重曰我尊師道闕二字聖德邁闕一字夷智方愈疾慧食充饑千齡奉壽萬品承規道則斯在何必具茨式刊琬玉永久為期雲卿桂州刺史睿素子守尚書禮部郎中惟大歷十二年桂林象郡之外有西原賊率潘長安僞稱安南王誘脅夷蠻連跨州邑鼠伏蟻聚賊害平人南距雕題交趾西控昆明夜郎北洎黔巫衡湘彌亘萬里人不解甲天子命隴西縣男昌巙領桂州都督兼御史中丞持節招討斬首二百餘級擒獲元惡并其下將率八十四人生獻闕下其餘逼逐俘虜二十餘萬並給耕牛種糧令還舊居統外一十八州牧守羈縻反覆歷代不賓皆受首請罪願為臣妾嘉其自新俾守厥舊商農漁樵各復其業悼耋鰥寡各安其宅變氛沴為陽煦化險阻為夷途五嶺之人若出元泉而觀白日如蹈烈火而蒙寒冰書上聞優詔嘉焉公卿百辟將校耆艾咸願歌頌勛烈以銘於石其辭曰皇帝嗣位十有五載淳風橫流聲教無外蠢茲蠻陬肆其蜂蠆恃遠怙險為人蟊賊爰命隴西授節討綏訓我師徒如熊如羆捲旗釋甲先喻德澤稔惡弗懲含蠆弗息矯矯隴西礪爾矛鋋鼓奮重泉兵揚九天出其不意億萬踣顛來者面縛亡者染鍔搜洞索穴覆其巢宅若鼓洪爐燎彼毛毳若振飄風摧乎朽脆海嶠濛濛再開天光俾祲作和化戎為農三軍臥鼓四鄙罷柝原野蕭條萬里澄廓明主是嘉罷人是康銘之嶺門用垂無疆惟唐上元辛丑歲叛臣劉展竊地弄兵悖撓天常肆虐黎人淮泗而南施於閩越人殘令絶職貢不修先皇帝命我特進試鴻臚卿兼御史中丞田神功統盧龍徑卒控弦引鏑萬有餘騎涉淮浮江梟懸魁逆布宣德澤返旆河南吳楚之人父子相歡戚屬相賀土壤耕闢年穀豐登舳艫若飛歲月相屬朝廷甄收顯寵薦及出領方面入秉端揆錫圭分社有土為王牧守遠近耆耋農桑工賈飲惠懷德皆願銘石江滸播垂休烈其辭曰昔在上元中夏猶虞姦凶矯攘鯨毒楚吳帝命信都偏師萬人鐵騎騰凌風行雲奔頓旗偃節敦諭威德凶慝不悛搖蠆恃毒桓桓信都奮髯提戈援桴軍門氣凌山河地祇號風江靈鼓波上隕旄頭下除巴蛇通地之經導天之和人胥已安積十餘年田野豐穰轉漕如川伊昔有周召虎方叔降及嬴秦翦起繼躅履險成功孰與為足天子是咨南人是懷享國冀都銘功海門陵谷可遷碩德長存戊申歲六月尚書左僕射趙國公圓薨天子罷朝三日喪禮贈賻加異常數詔贈太子太師諡曰昭襄嗣子裦遵荷先訓敦率舊禮五月而葬二十五月而祥既祥始立廟于洛邑曰考廟皇考廟階二尺有七寸從四尋衡八尋三戶五楹外垂四阿圬塓彩椽不施丹雘齊宮爨室庭垣稱之因述族氏勳躅清顯明銘其德曰太師崔姓清河東武城人也系於齊著於漢荷先少師之教純孝溫重稟受元和緯武經文為國梁柱賊臣祿山憑犯河華元宗順動南巡蜀漢公為居守有扶翊再造之勳函洛阻絶人罹蠆毒肅宗振旅朔陲戡靜禍亂公為宰衡有翼贊匡復之謀山越之難河泗之境公領揚州宣風淮楚有翦攘威鎮之績於惟茂勳莫與為匹禮曰以勞定國則祀之能禦大災則祀之能捍大患則祀之是宜廟食以銘於鼎以九月初朔之日寢廟既成庭除既平備器撰服潔儉中禮先享七日致齊具物水草陸産醴酪牲牷之備外盡物也色溫行恐身詘意愈如懼不及內盡志也禮卒奠撤齊莊之色如存焉歎息之音如聞焉君子曰吾觀崔氏之享有以知禘嘗之義焉古者諸侯立五廟廟有鼎與樂有國之制侯伯有爵而無土廟有鼎祭有樂不克立五廟而立三廟不銘於鼎而銘於碑其銘曰顯顯太師天孕鴻才恢張碩勳光照台階惟昔奸凶蝕恩犯順乘時無虞區域駭震元宗南巡功著巴岷肅宗戡復勳揚冊牘彌廓氛祲宣明日月於惟太師誰將比烈爰自鼎司出鎮淮夷外有亂虜內有疑師欽和畏威遠邇來思於惟太師為國藩維功以殲災勞以定國詳考祀典禮存廟食爰立寢廟不忘儉易卑不狹陋廣不踰制毣毣孝子愈愈其志齊莊慤誠庶物臻備俎豆斯設神將來暨歲時迭移霜露薦至德流慶延昌庇後嗣惟唐六葉歲在乙未凶臣肇亂殘毒生靈穀洛之郊七年方平宮廟燔夷府寺為墟陰燐轉于原隰麋鹿遊于街陌天子乃命河東郡侯延賞尹於東夏恭惟河東虔稟聖謀清默無為外務經簡內無宴嬉勸沮以仁休息以和視人猶身視邦猶家一年流亡鹿君至二年土壤咸闢三年公給人足家有餘積疏達河渠導塞提封溝洫化為通川山木流於郡國乃立宗廟乃建寢殿變邱墟為閭里散災祲為和氣公府若虛戶庭不扃牛馬産畜牧而不羈居守四年遷官罷鎮東人父子孀獨窮老若游魚之失於淵栖禽之喪於林於是河南洛陽洎甸內二十二邑長守將校及佐吏耆艾三軍之終相率琢石頌美表揚仁風詞曰惟皇統極繼業嗣聖凶臣無君矯衆犯順都邑殲殘化為邱樊於烈河東受命緝熙守一含光體純忘機以禮代刑以重威政得其恆物遂其生措置典刑士吏自清弭廢鞭笞黎氓不欺芃芃榛楛變為禾黍氛祲蒙蒙散為祥風乃設隄防禁遏溢暴湍悍安流時無水禍乃疏河渠浸枯決瀦河渠既流山木浮浮煨燼之中再立清廟荊榛之下再閲高殿人不知役公有盈羡風聲沛然大化四流歸朝執憲惠贊皇猷我有牛馬牧而不羈我有兒童路不拾遺泱泱田疇疇能繼之洪惟敻古淳風揚揚下及有周亦稱二南烈烈河東實嗣其風帝舜有虞氏姚姓諱重華帝顓闕八字瞽叟之子闕一字以孝聞卅堯闕四字受堯之禪丁酉法堯禪禹在位五十年南巡狩崩闕八字一百一十有二算聖德闕四字靈魄遊於無方南人懷思立祠禱祭歷夏殷周秦距乎有國凡更十姓享奠不替大歷十一年闕八字皇族隴西縣男兼御史中丞昌巙領桂林象郡之地虔祇統命肅龔神祀以祠宇隳圯狹隘朽陋不足延降聖靈迎致恭恪齊服祭器不闕八字邀福慢禮有里巷蠻夷闕四字於闕二字縣尹曰上有陽崖陰竇下有迥潭伏滔風雲闕八字之闕一字處闕三字駕闕十四字因以俸錢增新易故崇垣峻宇蕭屏牖戶有倫有度堊繕既成以時昭享瞻覿門屏踐履階闥兢業恂懼肅然莫不加敬牲牷既設巫祝斯列齊莊蠲潔慤然如享其誠簫鼓既闋俎豆斯徹神人和悅僾然如受其福是歲寇賊殲平年穀豐稔五嶺之人陰受帝祉官屬長老願刊石琢表識以彰懿烈其辭曰惟虞禪夏夏德斯淪更殷歷周以及嬴秦帝號再尊帝道莫宣祀典空存祀禮無聞於穆皇家踵美於唐獨主淳儉後嗣其昌明明大君俾祐爾躬穆穆宗臣祇慎肅龔廣厦增飾展禮竭忠人神胥會風雨晦蒙三千年閒禮幣贄通西原寇平南畝有年祀事報功皇靈降臻仡仡武夫我戰自克畟畟農耜我勤乃獲日用游焉惡知帝力天人同休心存影會誠感昭通屑易窒礙刊石播美垂億千載迪廣德元年官京兆倉曹參軍彼津之叟兮愛子何多碎驪龍珠兮心亦匪他為教誡之大者猗嗟乎其義則那夫此珠者寶之至也産乎北海之重泉在乎驪龍之頷下海茫茫兮不測龍呀呀兮若鬬當求利以輕生因沒波而直透潛行伏踴既驚且覯賣萬死以觸鱗幸一冒而匪寇父兮畜我子則告之曾是憑怒無然小慈斥其珠而不納乃命石以興詞且龍之得水變化無已奮迅而江海沸騰一噴而雲雷四起攫拏山石碎摽捎林木靡不遇睡之時必為齏粉矣於焉抗手勃然瞋目當頷孰云於徑寸贖罪寧論於十斛因而鍛之星芒迸燭雖有虧於照乘亦無譏於毀櫝豈不知貴踰雙璧價重連城鬻之可以求富獻之可以取榮將以謀孫翼子慎檢而行平窒苟偷之路安和性命之情不然者罔象得之而何重天吳得之而何輕如此則南華之道尊真經之教貴以證輕重之戒以拂夸矜之纍俾龍全難得之珠人獲不貪之利揚風激俗淳源化被酌斯事之為言繄可以用之而無既武有七德所以保大定功器重五兵所以禁暴戡亂在三端而不棄居六藝以為先張回擅飛衛之功樊少得養由之妙同觀挂蝨並斷征鳧暫彎繁弱之弓載發忘歸之矢俱窮中質各盡和容未見於撝謙遽聞於矜尚君子無爭必也射乎府司既曰回優少翁如何不伏
