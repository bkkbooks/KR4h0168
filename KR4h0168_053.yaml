front:
  text: 全唐文欽定全唐文卷五十三德宗四
  hash: sha256:62b8c769ac6dd437c5b4bbab4047a7993831871aead69229eebf7340fb590d40
body:
  text: 翼宣王猷德禮終始蕭何贊清靜之化柳莊為社稷之臣永念忠勞厚其贈襚舉茲命數以寄哀懷故門下侍郎同平章事趙憬體仁宏義循法守正有潔矩之操有致君之誠素履彰其貞固黃中發於事業文含大雅望重周行暢絶域之恩信整天臺之綱轄啓迪理本勤勞國均奉上見宣孟之忠居室聞晏嬰之儉訏謨左掖盡瘁五年嘗納誨以沃心每匪躬以經遠感疾未逾於信宿殲良俄即於杳冥震悼之深當寧流嘆禮有旌飾峻其寵章追崇保傅永慰窀穸可贈太子太傅所司備禮册命賜布絹五百端匹米粟四百石令鴻臚卿王權充册弔使京兆府所奏奉先等八縣旱損秋苗一萬頃計三萬六千二百石青苗錢一萬八千二百貫比緣春夏少雨秋稼或傷頃畝雖損非多黎庶猶慮艱食況畿甸之內供應實煩須有優矜以寬疲瘵其所奏損特宜放免卿職重台衡道存忠諒自嬰所疾每著於懷日冀有瘳宜善將攝遽茲陳請殊曰不然未遂乃誠當悉朕意昆明池俯近都城古之舊制蒲魚所産實利於人宜令京兆尹韓皋充使即勾當修堰漲池比來朝官或諸處過從金吾皆以上聞其間如素是親故或會同僚友伏臘歲序時有還往亦是常禮人情所通自今巳後金吾不須聞卿操履貞方器識淹茂自居台輔益見忠清方藉謀猷遽嬰疾疹歲月滋久章表屢聞陳請再三撝謙難奪且備養賢之禮宜遂優間之秩告免之誠斯為懇至俯從來奏良用憮然任重謀猷道存忠諒辭疾之情既懇優賢之義斯崇中書侍郎平章事盧邁朝序公才操履端敏弼諧庶政夙夜惟寅恭恪之心每思獻納而支體未適固請優間纍表敷陳懇誠彌切將遂其志豫衷耿然爰舉朝章式加命秩可太子賓客朕臨御兆人為之父母思砥於道俾安其生然則邦計不可不供封陲且以集事而纍經水旱或有流庸積成逋懸寖以凋瘵每念於此惕然疚懷中宵以興思拯其弊將以憫其疾苦致於康寧豈可更擾疲人尚為徵斂宜宏善貸以惠困窮其諸道州府應欠負貞元八年九年十年兩稅及榷酒錢總五百六十萬七千餘貫在百姓腹內一切並免如巳徵得在官者宜令所司具條疏聞奏嗚呼天生蒸人君為司牧百姓不足過實在豫永思其艱載用祗畏宣示中外令知朕懷八陵宮寢久要修葺此緣日月非便未及興工宜令宗正寺與所司即計料依所擇日速修理八陵舊寢宮在山上置來多年曾經野火燒焚摧毀略盡其宮尋移在瑤臺寺左側今屬通年欲議修理緣供水稍遠百姓非常勞弊今欲於見住行宮處修造冀久遠便人又為改移舊制恐所見未周宜令中書門下及百寮同商量可否聞奏訪聞蒸庶之間米價稍貴念茲貧乏每用憂懷苟利於人所宜通濟今令度支出官米十萬石於街市東西各五萬石每斗賤較時價糶與百姓任人之道必在無私審官之宜所期適用給事中平章事趙宗儒早以文學纍更職任自居樞近頗歷歲時雖夙夜載勤而政理猶鬱式移秩序以叶朝經可太子右庶子朕獲主宗祀以奉園陵歲月滋深是有崇飾今修奉既畢感慕增懷所賀知京邑為四方之則長吏受親人之寄實繫邦本以分朕憂苟非其才是紊於理正議大夫守京兆尹賜紫金魚袋韓皋比踐清貴頗聞謹恪委之尹正冀效公忠乃者邦畿之間粟麥不稔朕念黎庶方議蠲除自宜悉心以副勤恤皋奏報失實處理無方致令閭井不安囂然上訴及令覆試皆涉虛詞壅蔽頗深罔惑斯甚宜加懲誡以勗守官可撫州司馬員外置同正員馳驛發遣吏部奏選人依前二月三十日以前團奏畢其流外兵部禮部舉人等專委郎官恐不詳審共為取舍適表公平每至留放之時皆就尚書侍郎對定既上下察庶委任得人淮西節度使吳少誠非次擢用授以旌旄秩居端揆之榮任總列城之重期申報效奉我典常而秉心匪彞自砥不類凶狡成性扇誘多端外肆矯誣內懷疑阻毀忠廢信棄德崇姦擅動甲兵屢越封境壽州茶園輒縱淩奪唐州詔使潛搆殺傷干黷國章巳在無赦朕以王者之德在乎好生人君之體務於含垢寧屈己以宥罪不殘人以興師是以上稽宗社之威外抑忠賢之請庶其悛革當議優容今更幸鄰境之喪逞貪亂之志焚掠縣邑殘暴平人朕猶冀其知非為之忍恥亟頒詔令未許出師至乃遣軍攻逼許州肆其蠆毒恣行殺戮流害黎蒸惡稔禍盈人神同棄興言致討實悼豫衷宜令宣武軍河陽三城鄭滑等州節度東都汝州等軍犄角相應同逼申光蔡州常冀幽州淄青魏博易定澤潞太原淮南等州徐泗山南東道鄂嶽等軍各發士馬逐便犄角齊進同為討伐大軍四合計日殲夷嗟我忠良受茲詿誤或心存憤激而力屈凶威玉石俱焚良增憫惻其所收得少誠管內州縣百姓官吏等宜切加慰撫各示安存淮西將士等夙著勳庸素懷忠義為其脅制深可哀矜若能因事建功捨逆效順朕當復其職位待以官封其吳少誠在身官爵並宜削奪其有叶心同謀擒斬少誠者先有官未有官者並授御史中丞大夫封異姓王賜實封五百戶賞錢萬貫莊宅各一所子孫永為功臣先有御史中丞異姓王及刺史者即超轉三資改賜官賞其才器行業為衆所推者便授節度使如有心懷忠憤謀斬少誠被其屠戮者先無官者追贈三品官賜實封二百戶先有官者贈二品官賜實封三百戶仍各與一子正員五品官巳有官者超三資與正員官其所在百姓能團結士衆討除梟斬少誠者準例封賞人臣之所保者忠天地之所助者順報功宥善朕不食言於戲朕司牧黎元為之宗極化有所未洽信有所未孚致茲興戎增用愧悼然不暫勞無以逸俗不誅暴無以安人咨爾藩鎮方州列辟連帥所宜戡翦大憝永康兆人其勠力一心以副朕意應諸道準敕赴蔡州許州將士等皆竭忠誠盡心奉國並懷感激叶力勤王若能梟斬少誠者亦準前例官賞策勳之典朕所必行如少誠平後應赴行營將士超三資改官其賞物節級當續有處分其將士月糧在後回給家口宣示中外咸令知悉應是功臣先有明敕或有抵犯令送本司不令府縣官吏擅有笞撻自今巳後諸軍功臣官健或因買賣諸色逋欠官錢延時不納宜牒送本軍徵收送納如不疏理收索即具狀奏聞朕方勵精庶政博求嘉言比者百官正衙奏事至有多時者公卿庶僚屬當寒暑為弊亦深在於朕懷豈謂優禮自今勿正衙奏事如陳奏者宜詣延英門請對朕獲主兆人以臨方夏憂勤於政思砥康寧然而理化未孚水旱為沴或傷壞廬舍漂損田疇朕為人父母用切於衷其諸道應遭水損州縣令委本道觀察使速具條疏聞奏當有處分京畿諸縣百姓應今歲青苗錢其中有便於納粟者計約時估價納之如便於納錢不便於納粟者宜聽委京兆府專督其務如縣令及主吏壅命者懲罰有差國家經計當有儲蓄百姓徵賦深可優矜所期便人亦冀均濟咨爾長吏宜悉朕懷國之大事式在於明禋王者孝饗莫重於殷祭所以尊祖而正昭穆也朕承列聖之休德荷上天之眷命虔奉牲幣二十五年永惟宗廟之位禘嘗之序夙夜祗栗不敢自專是用延訪公卿稽參古禮博考羣議至於再三敬以令辰奉遷獻祖宣皇帝神主懿祖光皇帝神主祔於德明興聖皇帝廟太祖景皇帝正東向之位宜令所司備禮務極精嚴祗肅祀典載深感惕咨爾中外宜悉朕懷奉遷獻祖懿祖神主正太祖景皇帝東向之位虔告之禮當任重臣宜令檢校司空平章事杜佑攝太尉告太清宮門下侍郎平章事崔損攝太尉告太廟京師近郊時雨未洽慮囹圄冤滯致傷和氣是用軫於朕心其御史臺大理寺及京兆府等諸司繫囚中書門下與有司亟議條理冤滯以聞去夏迄秋頗愆時雨京畿諸縣稼穡不登朕用軫慮愧為父母今宿麥未收其逋租宿貸六十五萬貫石宜蠲除之禮化之本繫乎京師副朕憂人屬於長吏宜勉務農桑各安生業以諭朕懷崔河圖思過之地不能身既再抵國章當從放逐宜長流崖州卿懷伊摯匡時之道有廣成嘉遁之風養素邱園屢辭命秩朕欲洞山問道渭水求師亦何必堅務勞謙固求退讓無違朕命且啓乃心朕以卿德重朝端行敦風俗不言之教所賴攸深未依來請想宜悉也前昭義軍泗州行營衙前兵馬使太中大夫試太子賓客兼監察御史張重政門有勳力性推義勇夙聞克家之美常稱撫衆之才近者其父初亡羣小扇惑誘以奇計俾執軍麾而重政與其母兄號泣固拒遂全懇願奔告元戎不為利回成其先志於家為孝子在國為忠臣軍政乂安行義昭著念茲名節感歎良深宜洽恩榮俾宏激勸禮無避於金革理當由於權奪戎章憲府式示兼崇可起復雲麾將軍守金吾衛大將軍員外置同正員檢校太子詹事兼御史中丞仍委淮南節度使與要職事任使張重政母高平郡夫人徐氏族茂姻閥行表柔明懷正家之美有擇鄰之識頃當變故曾不詭隨保其門宗訓成忠孝雖圖史所載何以加之念其令子巳申獎用特彰母儀之德俾崇封國之榮可封魯國太夫人省所奏請遷祔事具悉卿移孝為忠嘗竭弼諧之志慎終追遠每增霜露之思無忘在公載陳誠懇眷言倚屬嘉歎良深所請令子弟專往營護允依來奏想宜知悉春暖卿比平安好遣書指不多及二月十五日十一月八日有事於南郊太廟行從官吏將士等一切並令自備食物其諸司先無公者以本司闕職物充其王府官度支量給廩物其儀仗禮物並仰御史撙節處分子育黎元未能禁暴在豫之責用軫於懷宜輟常膳五百千文充葬士倫母子其父既衰耄至無所歸良深矜念委京兆尹厚加存恤尚璀至省所陳獻具悉卿職在藩條誠存裨補本乎道德之旨參以理化之源用究元微有茲述作省閲之際嘉歎良深秋涼卿比平安好遣書指不多及嗚呼東鄙之警事非獲巳唯爾將校羣士各以忠節勤於王家南赴蜀門西定涇壘甲胄不解瘡痍未平今載用爾分鎮於周鄭之郊敬聽明命夫王者之師有征無戰稽諸理道用正邦國宜勵乃戈甲保固城池以德和人以義制事將備其侵軼不用越境攻取戢而後動可謂正矣今外夷來庭方春生植品物資始農桑是時俾爾將士暴露中野我心痛悼鬱如焚灼嗟爾有衆其悉豫懷朕承八聖之休德荷上天之眷祐嗣守丕訓不敢荒寧賴宗廟之靈羣后之力戡定大難以康兆人嚴恭寅畏二十有七載今天命降疾不興不寤是用審訓宜聽朕言皇太子誦元良繼明睿哲齊聖孝友和惠恭敬溫文必能覲祖宗之耿光紹邦家之大業宜於柩前即皇帝位嗚呼朕常奉聖祖元元清淨之教勵精至德保合太和每忘己以愛人豈嘉生而惡死咨爾將相卿士方伯連帥其敬保元子永綏萬邦各有叶心同砥於道無廢我高祖太宗之休命諸道節度使觀察防禦等使及諸州刺史等膺鎮守之任有軍旅之事所寄尤重不可暫曠不須赴哀以日易月之制宜遵舊典文武官等朝晡哭臨十五舉音朕每覽漢史至孝文薄葬之詔未嘗不歎息嘉尚緬慕其風園陵制度務從儉約百辟卿士孝子忠臣送往事居無違朕意
