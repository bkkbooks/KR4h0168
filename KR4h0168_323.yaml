front:
  text: 全唐文欽定全唐文卷三百二十三蕭穎士二
  hash: sha256:f297004dc23b157ad2ea3dc88e790744631a3fd03ea3b22b12a5d3f2def4a1d8
body:
  text: 某還奉問垂示報魯郡克捷官軍乘勝進取東平捧對三復實深兼慰逋醜稽誅遂淹氣序芟夷濟濮陵虐洙泗雖遊魂送死所當翦滅而命師授律必俟英威四郎挺雄烈之姿荷專征之任允文允武終古罕儔惟親惟賢方今莫二故能將士憤發忠勇爭先遺孽殄殪隻輪不反俾彼危城蔚為強鎮必將長驅許下席卷浚郊解滑臺之圍刷襄邑之恥在是行矣此皆明大夫善任才而抑軍將之能用命也豈徒咫尺汶陽而久勞其師旅哉遲企大捷預寬憂負天氣漸寒伏惟尊體動止康勝即日蒙免末由拜覿增以勤係所調兵糧事資軍國唯力是視曷敢差池謹遣江陽令杜萬往咨稟違奉纍月伏增馳結首冬漸寒伏惟相公尊體動止康裕敬想表妹珍儀外甥休慰時事孔棘出於慮外京邑傾淪主上遷播率土臣子銜涕痛心相公應期降德康濟危難保翊聖躬乂安社稷勳踰曩昔道貫前修海隅蒼生孰不幸甚況在舊故榮庇特深某自中州隔越流播漢陰遂至江左淮南節度使召掌書記兼補此官羈窘之辰幸忝俸祿然任翰墨罕參籌議徒懷所見莫獲申述竊惟二京未復祅氛方熾靈武太原雖稱官軍甚盛而兩河南北無月不遭寇禍頃者濮陽東平中都郾城相繼失守靈昌潁川皆纍戰之餘今未解圍上蔡汝南近又奔潰虢王之鎮河南亦有政刑而百城饉乏兵力未振河北自六月不聞克捷井陘路亦云未通河東絳郡復傳先陷淮南山北境內賊壘戶寡人貧徵促弊竭衆心危懼莫有固志則兵食所資獨江南兩道耳楚越之地重山積阻江湖浩漫樂興永嘉南通嶺表北至吳會皆境瀕巨海自古平日常備不虞中原或擾不無盜賊為患固宜察其要害增以兵力擢文武良材以鎮捍之先奉七月十五日敕盛王當牧淮海纍遣迎候尚仍在蜀今副大使李中丞華胄茂德平時良守清靜臨人貪暴斂迹雖古龔黃召杜之化無以先之然與今時經略頗不甚稱所蒞謹守科條愛惜府庫江淮三十餘郡僅徵兵二萬已謂之勞人將卒不相統攝兵士未嘗訓練淮左江東三十餘郡無一良二千石豈惟不才乃皆中人以下之不逮其間敗衄略難勝述比者吳郡晉陵江東海陵諸界已有草竊屯聚保於洲島剽掠村浦為害日滋若朝廷不時遣賢王即就鎮求選博通宏略之士以輔佐之特許不計階次超拔才雄以居將守倘一朝勍寇南侵陵蹈淮涘衝要闕繕完之備甲兵無抗擊之利江海餘孽因而嘯聚則長江之南亦從此而大潰矣復何觀釁虜庭指日清蕩哉某雖不敏嘗覽舊史見古今成敗之策江山險易之勢多矣忝職幕賓言不見録長宵歎息不覺飲淚方思虞詡之任朝歌見疑守將古今一也幸他日風塵早辱惠愛今雖卑賤禮數懸絶仰惟無大故則不棄之義或當未賜疏擲耳銜憤萬里遠陳短見亦惟相公留聽無忽尚書房公門下崔公往不自意並陳盛德一顧之末然若非相公為小人貧賤之交不敢輒申狂簡輕冒抵觸書不云乎三后叶心同底於道亦何必人人別疏哉在相公言之耳親弟某乙久在巡內或垂記識自多故以來信問阻絶酸心痛骨未期一見時維以小人承舊愛之故惠提獎之私非所敢望如或假以公乘使江淮獲一親集死生骨肉不勝幸甚末由拜賀無任下情謹因賀赦使附狀不宣蕭某頓首月日應武藝超絶舉某乙謹上書侍郎公執事某汝潁儒家子先人以文至尚書郎今僕不肖持七尺之軀蹶張角力為裦衣者所不見禮猶復決短策希餘光願以羸庛之形忽微之氣三寸之舌百金之義一朝而委諸執事將納之耶拒之耶嗚呼苟或拒之士亦未易知也試為執事言之僕幼聞禮經長習篇翰多舉大略不求微旨且尤好史臣之言自秦漢迄於周隋馳乎千餘載間天人祕理軍國奇畫皆耳剽其論而為文未嘗不喜潤色求官乃拙莫能進取顧人事所先則天資所闕雖欲從士大夫之後高談抵掌取當代名其不可得也審矣然每讀太史公書竊慕穰苴樂生之高義常願一置戎車之殿指麾部分為天子干城近臣不知明主未識徒欲奮決孰為引致嗟乎使古之二子復與僕同時於今雖有敗晉強燕之謀亦不能自達也明矣所謂論干戈於揖讓之代則悖者信哉是以傴僂其形慚沮其色與披堅執鋭之伍以馳逐擊刺為容雖欲恥之其可得已侍郎亦不可謂僕無學而輕之今聖主居安慮危有備無患以侍郎為深寄故專任簡稽之司豈不欲旁求爪牙式遏寇虐故將七擒是擇寧止百中為奇則孫子之謀長於減竈杜侯之力曾不跨鞍蓋古之有善陳不戰者未聞以投石拔棘為全軍也侍郎懋衮之後為善是學朝稱偉才物飽宏議固當纘韋平之業為社稷之臣使小人得馳驅下風計畫見用比蕭何韓信之事顧不美乎侍郎必不以僕為狂使待罪末品參一旅之長受偏師之任羽書狎至烽火交馳察以時候占其氣物標利害之形相山澤之險乍聚乍散一陰一陽飇馳雷動千變萬化使兵不血刃勢如川決與夫搴一旗斬一卒崎嶇行陳之末以徼賞求名者何其遠歟如或人非廢言事有可驗又得出疆場之外奉咫尺之書因宜料敵隨事制變使千古忠臣之節凜然復存則蘇武虜中尚能齧雪傅生幕下必斬樓蘭此亦一奇也侍郎又不可謂僕大言而疑之以侍郎有卓立傑出之姿虛心待士貴不驕物故小人越上下之分持得失之端私布之於侍郎期不以衆人見遇也侍郎用僕亦今日否亦今日屈伸待命惟所進退某再拜某白臨清傳馬子遠至昌樂奉問及亦既披緘慰慘交集幸甚幸甚亡友存日側聞緒言以其先門在殯舊塋未祔將事啓卜指用早秋見託不才俾述銘志手草行狀遺本猶存豈期遠日未臨長夜俄遘埋追遠之純心受終天之永酷幽冥憤歎豈其可言南陽王公聞而傷之近賚錢二萬以濟所欲兄又不以人廢言克申後意則不腆之作刊就有期既往之魂瞑目無悔存歿所荷非二公而誰然後知燕王無以矜其市骨魏妾不獨申其結草矣辭奉日遠係積難任惟珍重因還騎不宣某再拜月日潁川男子蕭穎士敢復書於京兆韋夫子足下嗟乎事有勇於昔聞而怯於今見有求之纍月而棄之一言其勇於昔聞而怯於今見者固見之不厭其成也求之纍月而棄之一言者固言之未通其情也難進為志士之節知音實盛名之選可不謂難哉必也道不磷於進取之幾交可判於言談之分雅心特達中義不回者能之由是而其來也必審於幾其去也必揆於分鳥能擇木木不能擇鳥離合是非之迹在主不在客則僕之所以怯乃足下之所以難也嗚呼將見不見聞不聞惟難僕所以盤桓顧望且纍月焉惜知音之至希一絶不再也泳然不謁幸不怪乎僕家業山東非舉選時不至三輔而倏來忽往亦已再三一昨遇謝官乃不知門下省與朝堂所在足下試以此等事相對豈輕於進退者耶而願託深期積有年矣幼小日曾竊窺足下所著兩京新記長來追思實為善作人所知殷晉亟接清言僕幸因之飽於餘論思心諫遲疑以日為年頃數歲前足下新除吏部郎中時曾與都省之間昧然一謁足下亦頗垂顧接而今得無忘耶豈或念此便謂僕為輕於造詣者也僕往時之舉誠復輕率然自足下則有固求而不至者焉足下誠問僕於衡軸諸公必知未有一人言僕造其門矣以正月二十五日至自東京參後逮茲遽承足下屢垂訪引又賢弟曾一陪宴席貴壻徐子舊所交歡豈不足假延譽於門庭披舊積於心腑耶何曩之不能往也如此所謂勇於昔聞而怯於今見者矣仰惟足下旁求百氏獨步當朝抑揚鑒戒時難與擬自甫登清貫垂二十年更事既多閲人不少尚能紆回雅慮辱在小人勤勤懇懇至於數四何其異也方今運偶休命賢才至衆龍門之下躍鱗所萃豈復吹噓眄睞之地尚微一蕭茂挺乎雖足下惠顧轉深而僕愈自疑也未知足下設何禮以接之竊觀今之文人雅操大缺內不能自強於已外有以求譽於時籧篨闒茸人望口氣謂其高位必以援登芳聲要以用致而當路者既不能人人有許郭之見亦因依左右惑而容之由斯而達十倍八九翕翕闐闐而忘返致令待士者不能備其禮懷才者無以表其誠混淆委翳良足歎也亦知足下爰自諸生早云峻拔策名從仕清標有素世所希也而時事共然頽風一扇詎知來者有貞純之士得無繫纍於流俗乎僕褊介自持粗疏浸久平生峻節未嘗屈下恐足下尚以為風塵之士名位不侔行言致忤音容便阻則麋鹿雖微欲服之轅軛且必異於騏驥矣挺而走險何公之門不可曳長裾乎此所謂求之纍月而棄之一言也足下名卿之孫相門自出妙年籍甚寵駕時賢俯仰周旋故已在雲霄之上而僕汝潁之間一後生耳不知足下何從而見訪耶高命驟臨怪歎無置竊為重之忽記往年奉詣時足下云孫大所言第一進士子則其人不肖誠愧孫公之過談足下誤聽然尚恐足下正由此見知苟曰其然則足下未知之也嗟夫漢闕有言曰公知其一未知其二此言雖大可以喻小若孫考功之於僕可謂知其一也深矣可不忘矣然其所未知者乃三四不啻豈一二而已哉慎子有言以離朱之明視秋毫之末於百步之外視水一尺則不能見其淺深何則所賦者異也曩時與孫考功無里閈交遊之知親朋推薦之分勢懸望阻聲塵不接躡無情之路回必斷之明懷恩下隔於至公而見遇盡關於薄技則是僕詞策之知已非心期之知已故曰可謂知其一也丈夫生遇升平時自為文儒士縱不能公卿坐取助人主視聽致俗雍熙遺名竹帛尚應優遊道術以名教為己任著一家之言垂沮勸之益此其道也豈直以辭場策試一第聲名為知已相期之分耶若由此見知僕不才者幸嘗遇賞於孫氏瑣瑣之文何足枉二賢深顧哉足下蘊邱明之恥資董狐之良載筆延閣職司國史誠朝之得人竊為足下重之斯未易任也亦知足下懷獨見之明後來諸生固無借其一字然受金於呂氏之藏者不可謂之秦無人矣僕不意少有此癖心存目想行已十年時命不貸所懷莫就而朋從之間或謬見稱說亦何知足下不緣此見訪耶苟曰其然則僕心期之知已未始或移於足下矣非曰能爾敢事當仁何者僕私心自料亦已熟矣今朝野之際文場至廣掞藻飛聲森然林植必也扣精微於賞鑒之府稽折中於序述之科如僕料得足下門而入者寡矣僕不敏竊嘗自以為升足下堂而未入於室也但足下未深知耳僕與足下無世業通家之舊屈伸之際僕輒預舒慘焉聲同氣感不知其所以然也夫司業古成均之二學政是循國風伊始先哲王之所以導人敏德謀猷長世者曷嘗不就學校而本風化耶梁代劉嗣芳自尚書左丞除國子博士於時物議以為妙選近高宗朝樂安孫公以宰臣之重再轉此官朝廷素望初不點缺斯尚學尊儒之道也今來擢用此塗稍革必當由憲臺而遷會府典綸誥而掌銓衡一履學官便為屏棄雖不足以斷賢才通塞之路而常情積習可不謂然乎頃在洛中聞足下初出南宮僕惕然不樂尋知足下載司東觀又翻然以喜王綏有言國寶雖不我知我自知國寶此之謂也夫人生相知亦有運命在僕素誠乃命爾足下果惠而訪之豈人事也以足下陵戾青冥漸漬恩渥雍容壁沼之觀耀映石渠之府而屈伸小數僕尚預其慘舒況乎淪厭盛時悲涼壯歲宿心有在得不為先達論乎臨書耿歎不知自已惟足下實深諒之今請以一世浮沈之端一身能否之效從始至末仰訴知音言而不應命之極也僕南遷士族有梁支孫系祖司徒鄱陽忠烈王追蹤二南邁德荊郢有子四十人俾侯錫社入卿出牧且忠且賢終始梁代第三子侍中懿惠侯大同中以信武將軍都督北亠兊州緣淮南軍遺愛在人詔學士謝蘭撰德政碑文長子山陰侯儒術精博世有盛名隋代山陰第十一弟常侍君才標清峻見崔子發齊糾陽玠著談藪亦稱俊爽而有才辨隋開皇中徵為東宮學士謝病免少子零陵通守以再從姪齊王咨議府君為後則小人曾王父本則惠侯第十七弟太尉宜豐侯之後太子太保梁安公之孫宜豐有忠孝大節見稱梁季迹光五史分載南北安公以前代宿德再綰台傅於義寧武德之間同堂兄弟百有數十自梁涉唐多著名迹終古蕃盛莫之與比貞觀之後㣥從雕零垂拱以來無復大位越敬王之圖匡復也王父實預其謀擯身江海不臣武氏舊業邠岐一朝瓦解內弟琅邪王仁簡標列傳贊備昭事迹家君子少丁家難辛苦百罹事繼親長異母弟育孤姪以孝友聞於姻族僕生於汝潁幼而苦貧孜孜強學業成冠歲射策甲科見稱朝右當此之時為奮筆飛鸞鳳摛論吐雲煙明主可正議而干㣥公可長揖而見何言日損一日年貶一年蹉跎半紀乃殊方一下吏耳興言念此不覺氣之交胸從來事業復何所用未可為不知已者論也僕平生屬文格不近俗凡所擬議必希古人魏晉以來未嘗留意又況區區咫尺之判曷足牽丈夫壯志哉而時議喧喧輒復見數亦嘗標獎恩於銓庭振塵聲於輦下而今拙句尚在人口已云再矣復何補於淪棄耶嗟乎以苗侍郎之至公待物以僕之直道干時取捨之端理關於一試由來賞待亦云乎不薄而壯年志氣盡此一行時耶命耶若此之甚也又溺志著書放心前史乍窺律令無殊桎梏使終身學此未知得時用茲措足寧逃罪戾髮膚不毀豈若是也惟疾之憂寧逃罪乎僕從來宦情素自落薄撫躬量力栖心有限假使因緣會遇躬力康衢正應陪侍從近臣之列以針規諷譎為事進足以獻替明君退足以潤色鴻業決不能作擒姦摘伏以吏能自達耳況乎纍土之漸升天無階自經窘蹙千端萬緒方欲議一官之資勤歷政之效信茲課最跂彼京畿不二十年未免斯厄舉足踏坑穽揮手挂網羅摧折庭臣之威喧呶卒伍之役捨長用短雖智何為安見鼓鐘可樂便將饗爰居以愁也近日見苗侍郎乃云以子文章非文章才所及異時大用不繫於此得會當再發方成一舉嗟夫以文體為言則爾而一身自卜且又不然何者僕向時之試非不工也苗公之言非不知也以得便之試逢見知之言詞殫理極卒孤始望自茲以外更安可料哉僕有識以來寡於嗜好經術之外略不嬰心幼年方小學時受論語尚書雖未能究解精微而依說與今不異由是心開意適日誦千有餘言檟楚之威不曾及體有時疲頓即聊自止息不過臨池水視遊魚耳頃來志若轉不耐煩觀圍碁讀八分書亦憤悶除經史老莊之玩所未忘者有碧天秋霽風琴夜彈良朋合坐茶茗間進評古賢論釋典已又酒性不多涓滴輒醉適情緩飲則樂在終席雖體氣薰薰實如困憊而中心醒悟了無惑焉常時知故以此見寡三杯之餘則任意縱誕就閒窗或屏風間曲肱岸幘怡然自處或經過廣座稠人之中綺筵四匝珍羞盈品爽心翻然有時閣箸若乃箏歌亂奏繼以舉白博奕樗蒲呼梟爭道優姬艷伎喧雜左右易貌變聲千態萬曲即口答然氣盡無所覺知心識低佪魂動神撓但思臨長風一大呌耳雖復卻昭子之驚楚奏夏仲御之逃越巫何以加之一行郡邑志尚都沮事與好相背責與悶相成寮列不諳悉異之又以為務恃文詞傲弄當世同聲悉疾何地自容可歎息也直性褊中少所容忍於心不愜未曾勉強昔常話文章得失論姓氏臧否忤人雅意纍悔無及友生邵軫深以為言四五年來絶無此過終朝杜口不復發端偶然見問則率意便答必不能矯情飾理雷同取合而今世風流見異者衆雖三五至交才名久著一參名理俄然楚越而州縣之禮捨義重權小人跨躡便成簡倨卑身下氣已自不堪詞色之端更求附會守初心則嫌猜頓起將任節則操履全乖丈夫行已三十年讀書數千卷尚不能揣摩捭闔取權豪意旨況復終年怏怏折腰於掾吏之下哉古者左史記事右史記言記事者春秋經記言者尚書是也周德既衰史官失守孔聖斷唐虞以下刪帝王之書因魯史記而作春秋託微詞以示裦貶全身遠害之道博懲惡勸善之功大韓宣子見之曰周禮盡在魯矣吾乃今知周公之德與周之所以王也有漢之興舊章頓革馬遷唱其始班固揚其風紀傳平分表志區別其文復而雜其體漫而疏事同舉措言殊卷帙首未不足以振綱維支條適足以助繁亂於是聖明之筆削裦貶之文廢矣後進因循學猶不及竟增泛博彌敦簡要其迷固久非可一二言也僕不揆顧嘗有志焉思欲依魯史編年著歷代通典起於漢元十月終於義寧二年約而刪之勒成百卷應正數者舉年以繫代分土宇者附月以表年於左氏取其文穀梁師其簡公羊得其核綜三傳之能事標一字以舉凡扶孔左而中興黜遷固為放命昔荀仲豫袁彥伯二賢亦嘗筆削紀年裁成兩漢晉代則孫安國編次南北迄穆帝之終其道鸞鑿齒幾原叔庠繼踵於宋齊之間矣梁武烈太子以弱冠之年早事刪録雜諸家之說著三十家春秋泰清之季金陵板蕩元帝嗣興乘輿不復東臺典籍悉上荊州及郢都淪喪焚燒略盡史策遺逸散在人間同原異流十家俱起而究終始一氏則何劉二典存焉陳紀裁於野王齊志創於君樊蔡學士集江陵故事撰後梁春秋隋季有後略一家亦行於世秦趙涼諸國亦有得而稱元魏及周無聞焉爾自漢元卒於大業期運驟遷史籍填委編年之作亦往往而聞其間體裁非無優劣終未能摧漢臣僭僞之鋒接魯論之緒附庸班范曾何足云雄鋩獨斷抑非諸君子之事也誠智小謀大綆短汲深加之數年可以集事嘗願得祕書省一官登蓬萊閲典籍冀三四年內絶筆之秋使孟浪之談一朝見信寧不知立身有百行立命非一途豈必繫心翰墨為將來不朽之事也夫太上立德其次立功其次立言立言者乃不朽之末耳然則古之終年著述者亦已知之心有所存正爾不能自已也豈求見重於千載耶校理是司於今絶望刊削之志事即都損矣聖朝官人宜求稱職使道皆適務時無棄能何須銓衡枉分如此僕以三月二十六日拜謝闕庭邇來凡四十餘日正以足下之故未便東行久不能斷夫人與不見於胸中由此致淹泊耳幸足下勿謂僕為後輩一生聞其小有所知但欲輕一召來試觀其談說也僕遇於足下豈徒伯喈王粲之嘉會子産延陵之吻合耶雖數百年外邈爾相望亦不為遼濶也況契心期於俯仰之頃得不重哉僕從來綴文略不苦思惟專心舊史企望有成不復能以他人手筆冀流傳於人世所以援毫襞紙見推疾速自今月五日始作書首末千餘言經半旬乃就加之筆札斯亦勤矣誠知殊翦截之清詞長謬悠之曼說然苟非足下安能有此課之善士之託於知已恨鬱悒而無所申非必求利也計足下之年應長僕二十許歲亦已懸矣而才名位望之隔則又可知所不間於夙期者道耳足下本以道垂訪小人亦以道自謀故此書之禮過於慢易成足下之高耳苟道之不著而名位是務足下之趨風者多豈惟一蕭茂挺小人之受侮亦衆豈獨一韋夫子乎足下必不以為狂而亮其志越絆拘之常禮頓風流之雅躅乘躡履之遇展傾蓋之歡則重賜一書猥答誠貺既奔足下不暇豈敢差池若文不足徵道未相借請見還此本謹俟燒焚無為輕置蓋瓿使識者一窺齊楚交失非古之君子退人有禮之道也雜詩五首謹以奉投聊用代情不近文律耳穎士再拜朝得書為正不佳又前意已決難作移改是以又不報吾素志疏野平時尚不求仕進況今豈徼榮祿哉前赴牒追者蓋為三道重權冀以疇昔厚眷計議獲申惟薦㣥才庶其裨益今既一言不見預一士薦不行方復規求一中下郡佐而利其祿秩豈在意耶況馬墜所傷全未平復方恐便廢自是棄人才既不足採而加此疾苦更不復力強耳韋二十五與弟昨言中丞必須相然始下筆才非樂生不望擁篲志力弊困未堪詣府日日如斯與斷莫定來中丞便至責其違闕乃罪不可料何負使司作此相陷古人有言冠一免豈可復加於首吾計決矣之死矢靡懼弟無惑焉再申意二十五官無為咄咄見逼也為胸中最傷心力甚弱書數行便不能仰視昔不因子致跌闕交遊早識中丞今海內未靜之秋加之患疾傷損不蒙恩恤過秋羈迫亦知命矣吁何道哉某惶恐叩頭使君公節下小人以蹇淺之姿承命下吏常懼罪戾仰負仁明勵茲駑拙兢惕不暇安敢謬持文翰祗冒府庭濫巴歈之末音覬牙曠之清聽豈惟取笑僚友知其不然故亦退慙虛薄非所敢望今則沒階屏氣心膽戰越竊有短詞願聞於節下執事者理或至切情所不堪誠以仁賢措心名教有地敢布四體伏惟明公圖之某家自周齊業傳清白先人以文學政事任尚書郎門緒不昌幼集荼蓼詩禮之訓襁褓無追顧復之恩縞練仍失顧瞻兄弟童丱五人所不隕滅實同形影少賴餘蔭免從庶役或以進士或以明經二紀於茲畢參官序雖青紫之望有限登天而箕裘之業幸微墜地豈圖家不悔禍釁罰仍鍾纍年以來凶險荐至兩兄一弟殂謝連及孀孤空室苫蓋在庭故不忍聞今在備見誠宜泣血私第移疾公門胡復心顏以冀榮遇所不爾者亦惟明公哀之重以諸姪藐然三喪在殯邱封未兆凍餒是虞匪伊薄祿云何取濟今歲時獲便龜策告從此月之交計發嵩汝季弟傭官越在東吳千里而遙三月不至興言主辦捨某而誰感念存亡觸目纏迫詩不云乎死喪之威兄弟孔懷禮亦有之祖於庭葬於墓所以即遠也人道之終此日而畢天倫宗戚豈可輕忘守官次則情理頓虧越私哀則簡書是懼龍鍾荼苦畢備於茲伏惟明公嘗以雅望忠誠弻諧聖政朝廷故事臺閣式瞻仁恕之風被於列郡儻或窮誠見遇微物感通許以假歸申其永慕生死骨肉實賴明恩所不敢言斯豈獲已況宛葉汝潁密邇山川往復之期旬日以冀奔走之事豈乏差池某頓首謹言昔建安中魏文為王太子與朋友諸彥有南皮之遊揚鳴葭浮甘瓜清泉奫淪千古一色此城隅託勝之舊也由小而方大則貴賤之權可齊以今而喻古則風流之事不易矧乃日清明時升平氓庶阜海濱之利謳吟動齊右之曲亦明代一方之樂也邑宰東海徐君洎英僚二三皆人傑秀出吏能高視郊驛繼當時之歡濠梁重莊叟之興相與矯翠帟騰清波紅妝屢舞緑醑徐進管絲迎風以響亮士女環岸而攢雜可以娛聖澤表人和也層城景移碧潭陰起蕩暄妍之氣色縱魚鳥之遊泳其思夫闕塞崇崒昆池清泠關河千里帝京不見斯興情之極致也爰命墨客紀他鄉之勝事云爾聖后欽明天工愍恤人瘼罷前監郡仍昔按部其為寄也大焉若乃池梁虛城浚都舳艫萬里闤闠千室通邑之尢也東至於河西至於海亘長淮而彌甸服方域之雄也牧守之任循良之選豈易人哉今茲春歲聿旱人咨荒歉朝廷慮東方之耗斁也慎簡大賢而臨蒞之明詔乃下俾巨鹿守李公往焉亦既褰帷零雨其祁矜人廕庥貴糴日衰被青徐而周亠兊豫有政刑矣已而襄國士女結去思之怨大君愍然又命公族之良前文部侍郎東陽繼焉擅文儒之俊所以司綸翰兼銓尺矣韞戎略之權所以參簡稽二麾節矣登朝而備履清貫出守而再踐名邦其鎮撫斯境式慰饑渴宜矣秋九月巨鹿舟輿次於是都明使君客焉懿夫尊卑有序敦晉鄭之好前後斯謠美召杜之德溫溫二公善可知焉越三日宴集於南亭具水嬉也出層城橫通川回環里閭曠望郊廛抑抑威儀徒馭如馳人導馬隨以至於蓬池矯翠帟登畫鷁揖讓有禮獻酬無斁威哉赫乎方伯所以饗邦君也爾乃洲島回互林亭蓊鬱天海清平豁若萬頃澄湛乎其間紅蕖照灼緑菱搖漾淺草細萍往往藂生邀魚舟望白鳥江湖勝勢去去非遠既而涉則在岸泛則在流珍羞間海陸之錯妙舞應荊吳之奏參差逶迤笑語忘疲亦千古一時也晚林未疏隄草更緑輕雨泛灑微風清潤泝洄淪漣終日夕焉二公喜升平生至樂歡然有命賦詩客有欣遇二府簉賓筵之末從事斯文爰操簡請同賦四韻嗣於國風之後焉吾族旭也洵美有聲夫蒸蒸者行之能翼翼者體之敬工文足以標絶唱深識足以剖㣥疑兼而備焉實為難者意其培積風之力駭絶電之姿從東道以載馳去南溟而一息此其分也繫明代擇人宜乎盡能使輪轅當曲直之適鑿枘靡圓方之歎則宏綱舉而浮議息矣以吾弟不羈之才逢聖君如渴之日而徵求章句見遺甲乙是猶籠鸑鷟絆騰黃望遼廓權奇其可得也吾聞諸君子非無位之患惟立身實難今爾有是才居是屈能卷舒其道喜慍不形又其沖融坦蕩莫可得而窺也不然書未十獻歲未二毛道非捭闔交無荐寵而雄雖先進歎甚後時何哉論者以為人之望也仲春二月東京千里之子往矣薄言旋歸賦詩而寵別者皆上國之選莫不銜憤屑涕抗詞悲歌吾乃知道術親而然諾重也況乎西遷而五陵是宅南渡而二曹其昌居宋有摯疇之姻在周為魯衛之國曾是共祖不待馮商之言已為路人未處陶生之歎今也于邁如何勿思詩不云乎凡今之人莫如兄弟不廢急難之謂也禊逸禮也鄭風有之蓋取諸勾萌發達陽景敷煦握芳蘭臨清川乘和蠲潔用徼介祉厥義存矣晉氏中朝始參燕胥之樂江右宋齊又間以文詠風流遂遠鬱為盛集焉若夫華林曲水萬乘之降也蘭亭激湍專城之踐也而方伯之歡未始前聞以俟乎今辰粵天寶乙未暮春三月河南連帥領陳留守李公以政成務簡方國多暇率府郡佐吏二三賓客帳飲於蓬池備祓除之禮也梁有蓬池上矣前迄殷潁右匯郛邑渺瀰淪漣蕩日澄天舟楫是臨泛波景從其左則遙原縈屬崇岡傑竦嘉卉異芳雜樹連青即為臺亭登眺斯在爾乃郡曹頒鏹以給費縣吏領徒而修頓先夕以定議詰朝而集事是日方牧乃擁車徒曳旌旃卯出乎北牖辰濟乎南川匪疾匪閒翼翼闐闐以稅駕於東焉然後降春流揚彩舟羽觴芳羞緩舞清謳援青蘋駭紫鱗回環中汀緬望南津飫於已酣於未歌樂只賦既醉坐闌而靡怠日入而未闋陶陶乎有以表勝境佳辰之具美名公好事之厚意下客不敏聞於前載曰夫德洽禮成則詠歌繫之梁故魏也請皆賦詩志焉
