front:
  text: 全唐文欽定全唐文卷二百八十八張九齡六
  hash: sha256:94f85a10fba834b29d67e47d5f6134d4aae155dcf62b6803d168bcfc435bb50d
body:
  text: 草土臣九齡言伏奉去年十二月十四日制復臣中書侍郎同平章事者外沮公望內奪私情餘生力微哀怖殞絶臣誠哀誠懼死罪死罪臣伏以宰相所職贊理庶事陶冶太和以遂萬物苟非所任有受其殃臣實單人本無大用況在難疚觸緒哀迷矧以素所不堪加之荒塞而軍國事重翼亮誠難臣獨何人謬居此地退省所有負敗將及雖願感恩扶力匍匐祗命其如塵玷聖鑑污辱台衡於國非急於禮虛廢臣比年限役多闕晨昏疚疢之際遽乖救藥凶諱之日遠隔追攀而星霜未周冠冕載道是以庭闈昔絶几筵今阻凡曰名教實所深哀伏惟睿情有以永錫況質言非讓悲款不文祈天之心惟聖所體實冀哀素有次喪紀獲終俯鑒荒迷乞遂情禮臣無任感絶哀迫之至謹詣朝堂奉表陳乞以聞臣誠哀誠懼頓首頓首死罪死罪謹言開元二十二年正月二十七日草土臣張九齡上表臣九齡言伏見千秋節日王公已下悉以金寶鏡進獻誠貴尚之尢也臣愚以謂明鏡所以鑑形者也有妍媸則見之於外往事所以鑒心者也有善惡則省之於內故黃帝鏡銘云以鏡自照見形容以人自照見吉凶又古人云前事之不遠後事之元龜元龜亦猶鏡也伏惟開元神武皇帝陛下聖德之至動與天合本己全於道體固不假於事鑑然覆載廣大無所不包聖道沖虛有來皆應臣敢緣此義謹於生辰節上事鑑十章分為五卷名曰千秋金鏡録雖聞見褊淺所擇不深至於區區效愚其庶乎萬一不勝悃款之至謹言臣九齡言伏奉四月十四日制授臣荊州大都督府長史聞命皇怖魂膽飛越即日戒路星夜奔馳屬小道使多驛馬先少以今月八日至州禮上誠惶誠恐頓首頓首死罪死罪臣不即飲氣取死豈敢輒惜餘命伏念心無黨惡死則似同以此偷生猶希聖察臣往年按察嶺表便道赴使訪聞周子諒久經推覆遙即奏充判官尋屬臣改官使亦有替其後信安郡王禕奏將朔方驅使便請授官臣因其嶺外勤勞因而奏乞事不敢隱未至涉私然進用非人誠宜得罪但臣特蒙拔擢出自宸衷陛下所用隱微惟臣而已伏思報效竊恃聖恩每於事端無所防避智識雖淺罄竭則深微誠區區義有所在豈復與此私協以負纍聖鑒臣雖至頑至愚不至於此皇天后土照臣血誠夙夜煩冤欲辨無路臣聞物有窮者必訴於昊天人有痛者必呼於父母臣今孤苦不乞哀於聖君豈蒙惡聲遂銜冤以沒代臣受性愚鈍暗於知人稟命舛剝與此凶會誠合自死以謝天威所以側息苟存者臣為聖朝所用既極榮寵而一朝至此恐玷明時在臣微生有若螻蟻身名俱滅誠不足言今釁咎則然恩禮猶重面目有靦夙夜唯憂戴盆望天豈期上達又未能宣布聖澤少答殊私局蹐兢皇動失次第無任荷懼兢悚之至謹附河西經略判官所部朝義郎法曹參軍蘇鋭奉表陳謝以聞臣誠惶誠恐頓首頓首死罪死罪謹言臣言伏奉今月八日制恩春郊展禮惟新布澤臣聞古之王政雖在方册將崇舊典必俟聖君伏惟開元神武皇帝陛下德合天明道高帝載以為春者發生之氣氣者含育之本事乃重於歲始禮故親於東郊振絶代之綱作名王之法布澤行慶昭德順時以合陰陽之和以乘天地之正凡在品彙莫不昭蘇臣待罪荊南亦濫承恩賜臣無任欣慶戰荷之至謹因所部送永王俸料官當陽縣主簿陳琇奉表陳賀以聞臣誠歡誠喜頓首頓首死罪死罪謹言臣言伏奉今月二十日制册立皇太子者伏以皇太子天實生德睿智夙備爰以吉辰光膺盛典伏惟開元神武皇帝陛下建儲固本體天合聖萬方之心永貞是屬一人之慶大賚斯在臣某待罪荊南不獲稱慶闕庭欣躍之誠實百常品無任悚踴慶躍之至謹遣所部官宣義郎行枝江縣尉楊崇先奉表陳賀以聞臣誠歡誠喜頓首頓首死罪死罪謹言臣聞聖法天則至理調於元氣天表聖則嘉瑞託於㣥生將以幽贊王澤覺悟生靈知至德之所感如虛響之必應伏見開元神武皇帝陛下道孚神化體合乾行品物所資太和罔不叶圖諜所載殊祥罔不臻故郡國上言日月相繼臣所部豫章縣某月某日獲白鹿一休氣所集靈質自呈欲效符祉易為馴狎臣謹按瑞應圖云王者明惠及下則白鹿見又按孝經援神契云王者德至鳥獸則白鹿見蓋鹿者仙壽之物實為禎祥之表雖時和歲稔固不假於羽毛而天意人事誠欲伸於耳目臣不勝感慶之至謹詣某所奉瑞鹿表進以聞臣誠歡誠喜頓首頓首死罪死罪謹言臣晙言伏奉今月二十九日制授臣兵部尚書同中書門下三品殊常寵榮妄集疲朽承恩竊喜任重惟憂臣誠歡誠恐臣伏以虛受之難魯史誡以量力滿盈之過夏載陳其招損臣階緣試吏際會登朝遂得入拜尚書比天之喉舌出典方鎮為王之爪牙雖忠烈之誠心知所竭而績用之美歲久無聞今陛下不以為愚置之廟堂之上委以軍國之謀實恐鼎足不任鵜翼為刺退失微臣之守上纍陛下之明是以永夕九飛終朝三省泉谷為懼冰炭在懷道雖願於將行位固慙於幸得臣已有別狀具所讓人猶蒙曲私未寢嚴命方欲俯僂恭命對揚休光磨鉛效於一割策蹇同於十駕臣誠懼塵台席謬齒國華將何以允答鴻私弻諧大化拜命祗惕罔知所為臣不勝荷懼之至謹奉表謝以聞臣誠惶誠恐謹言臣言臣一昨扈從西狩岐陽時以有年事因農隙整六軍之衆修大田之禮戎卒是訓威武載揚屬草淺獸肥霜清氣殺詔虞人以即鹿命荊州而起鳥陛下親御弧矢紆駕林衡曾不合圍取其背者雖有逸㣥之狡走險之捷而飛黃騁轡縈拂如組緑沈縱鏑宛轉若神必命中於前期皆應弦而絶倒其餘變態不測神妙無窮非臣瞽言所能模狀既而備獻禽之禮虔薦寢之誠教人以孝自天作則此外效獲畢賜懿親兼禁羽騎無犯宿麥是行也典禮斯備仁恩允洽三令惟肅七德以宣魏武何階亦紀功於猛獸周文差擬將比義於非熊臣忝籍宗枝幸陪鑾輅竊觀神武冠絶古今以為載之空言不若圖之繪事向所述聖今皆寫真雖天顏不違而丹青莫擬徒極愚思庶存萬一謹録上陳伏深戰汗臣誠惶誠恐謹言臣言臣父某官某名往歷樞近志勤忠益至於霸王大略軍國要務事關興替言涉針規因著十篇名曰帝圖祕籙將欲獻納才加撰次尋屬臣私門殃釁夙遘閔凶手澤所存心瞿不忍遂未奏御猶在緘縢二紀及茲遺言將墜誠愚臣不克負荷丕揚休烈俾亡父之業聖代莫傳雖忝掖垣若置冰谷伏惟陛下聽政中昃觀書乙夜思上皇而合道恨古人於同時而臣亡父所論君臣之際必欲驗之行事非直垂於空文誠宜上感宸衷由沒代而匡補下藏祕府因聖君以發明竟未上聞伏增悲懼臣不勝感惕之至謹繕寫封進以聞謹言臣某言某至宣敕旨賜臣裛衣香面脂及小通中散等藥捧日月之光寒移東海沐雲雨之澤春入花門雕奩忽開珠囊暫解蘭薰異氣玉潤凝脂藥自天來不假淮王之術香宜風度如傳荀令之衣臣才謝中人位參上將疆場效淺山嶽恩深唯因受遇之多轉覺輕生之速陛下纂嗣鴻業將三十年太子已下常不離深宮日受聖訓今天下之人皆愛陛下享國日久子孫蕃育不聞有過陛下奈何以一日之間廢棄三子伏惟陛下思之且太子國本難於動搖昔晉獻公惑寵嬖之言太子申生憂死國乃大亂漢武威加六合受江充巫蠱之事將禍及太子遂至城中流血晉惠帝有賢子為太子容賈后之譖以至喪隋文帝取寵婦之言廢太子勇而立晉王廣遂失天下由此而論之不可不慎今太子既長無過二王又賢臣待罪左右敢不詳悉五月二十日宣義郎左拾遺內供奉臣張九齡謹再拜死罪死罪上書開元神武皇帝陛下臣所以上事以臣愚見並當時尢切不敢飾詞伏願陛下親覽可否之宜幸甚幸甚臣伏以陛下自克清內難光宅天下常欲躋人於富壽致國於太平聖慮每勤德音屢發然猶黎人未息水旱為憂臣竊伏思之有由然矣臣聞乖政之氣發為水旱天道雖遠其應甚速昔者東海枉殺孝婦旱者久之一吏不明匹婦非命則天為之旱以昭其冤況今六合之間元元之衆莫不懸命於縣令宅生於刺史陛下所與共理此尢親於人者也多非其任徒有其名致旱之由豈惟孝婦一事而已是以親人之任宜得其賢用才之道宜重其選而今刺史縣令除京輔近處雄望之州刺史猶擇其人縣令或備員而已其餘江淮隴蜀三河諸處除大府之外稍稍非才但於京官之中出為州縣者或是緣身有纍在職無聲用於牧宰之間以為斥逐之地或因勢附會遂忝高班比其勢衰且無他責又謂之不稱京職亦乃出為刺史至於武夫流外積資而得官成於經久不計於有才諸若此流盡為刺史其餘縣令已下固不可勝言蓋氓庶所繫國家之本務本務之職反為好進者所輕承弊之人每遭非才者所擾陛下聖化從此不宣皆由不重親人之選以成其弊而欲天下和洽固不可得也古者刺史入為三公郎官出宰百里莫不於其所重勸其所行臣竊怪近俗偏輕此任今朝廷卿士入而不出於其私情遂自得計何則京華之地衣冠所聚子弟之間身名所出從容附會不勞而成一出外藩有異於此人情進取豈忘於私但立法制之不敢違耳原其本意固私是欲今大利在於京職而不在於外郡如此則智能之士欲利之心日夜營營寧有復出為刺史縣令而陛下國家之利方賴智能之人此輩既自固而不行在外者又技癢而求入如此則智能之輩常無親人之責陛下又未格之以法無乃甚不可乎故臣愚以為欲理之本莫若重刺史縣令此官誠重智能者可行正宜懸以科條定其資歷凡不歷都督刺史雖有高第者不得入為侍郎列卿不歷縣令有善政者亦不得入為臺郎給舍郎雖遠處都督刺史至於縣令以次差降以為出入亦不得十年頻任京職又不得十年盡任外官如此設科以救其失則內外通理萬姓獲寧如積習為常遂其私計陛下獨宵衣旰食天下亦未之理也又古之選用賢良取其稱職或遙聞而辟召或一見而任之是以士修素行不圖僥幸㣥小不逮亦用息心以故姦偽自止流品不雜今天下未必理於上古而事務日倍於前誠為不正其本而設巧於末所謂末者吏部條章動盈千百刀筆之吏辨析毫釐節制搶攘溺於文墨胥徒之猾又緣隙而起臣以為始造簿書以備用人之遺亡耳今反求精於案牘不急於人才亦何異遺劒中流而刻舟以紀去之彌遠可為傷心凡有稱吏部之能者則曰從縣尉與主簿從主簿與縣丞斯選曹執文而善知官次者也惟據其合與不合不論賢與不肖大略如此豈不謬哉陛下若不以吏部尚書侍郎為賢必不授以職事尚書侍郎既以賢而受委豈復不能知人知人之難雖自古所慎而拔十得五其道可行今則執以格條貴於謹守幸其心能自覺者每選於所拔亦有三人五人若又專固者則亦一人不拔據資配職自以為能為官擇人初無此意故使時人有平配之議官曹無得賢之實朱紫同色清濁不分是於聖朝有何裨益故臣以為選部之法弊於不變變法之易在陛下煥然行之假如今之銓衡欲自為意亦限行之已久動必見疑遂用因循益為浮薄今若刺史縣令精核其人即每年當管之內應有合選之色先委考其才行堪入品流然後送臺臺又推擇據所用之多少為州縣之殿最一則州縣慎於所舉必取入官之才二則吏部因其有成無多庸人之數縱有不在送者妄起怨端且猶分謗於外臺不至喧譁於南省今則每歲選者動以萬計京師米物為之空虛豈多士若斯蓋渝濫至此而欲仍舊致理難於改制祗益文法煩碎賢愚渾雜就中以一詩一判定其是非適使賢人君子從此遺逸斯亦明代之缺政有識者之所歎息也夫天下雖廣朝廷雖衆而士之名賢誠可知也若使毀譽相亂聽受不明事將已矣無復可説如知其賢能各有品第每一官缺而不以次用之則是知而不為焉用彼相借如諸司清要之職當用第一之人及其要官闕時或以下等叨進以故時議無高無下惟論得與不得自然清議不立名節不修上善則守志而後時中人則躁求而易操其故何哉朝廷若以令名而進人士子亦以修名而獲利而利之所出衆則趨焉已而名利不出於清修所趣多歸於人事其小者苟求輒得一變而至阿私其大者許以分義再變而成朋黨斯並教化漸漬使之必然故於用人之際不可不第高下若高下有次不可妄干天下士流必刻意修飾思齊日衆刑政日清此皆興衰之大端焉可不察易曰履霜堅冰至言聖人之見終始之徵矣臣今所言上刺史縣令等事一皆指實縱臣所欲變法不合時宜伏望更發睿圖及詢於執事作為長算振此頽風使官修其方人受其福天下幸甚伏惟陛下聰明神武動以聖斷正當可為之運未行反本之法微臣企竦竊有所望伏願少留宸眷稍覽愚誠必無可施行棄之非晚不勝塵露裨補之誠右臣等伏見邠王守禮等表并答制以辥王業有疾聖情軫慮宿夕之間容髮遂變又尋繹致倦假寢通神因獲異方頓解危惙誠陛下友愛之至冠於皇王急難之情達於神道所以諸王陳請願書竹帛然猶讓此歸美推而不居聖德謙沖固難名於廣大臣子之志敢忘義於昭宣況臣等近侍軒墀倍百恆品望以邠王等狀宣付史館謹録狀奏聞伏聽敕旨右未經旬時慘恤相次聖情友愛之至屬此天倫之戚伏聞寢膳有改乎常臣等下情不安夙夜惶灼伏願抑損恩命沖用道心以承宗社之重以慰臣庶之望天下幸甚臣等不勝倍百恆情之至謹奉狀以聞死罪謹奏右臣等伏以至道無名常善救物所以鎮彼澆競登諸福壽而古今殊論穿鑿多門徒廣津梁何階閫閾伏奉恩敕賜臣等於集賢院與諸學士奉觀御注道德經及疏本天旨元遠聖義發明詞約而理豐文省而事愜上足以播元元之至化下足以闡來代之宗門非陛下道極帝先勤宣祖業何能回日月之晷度鑿乾坤之戶牖使盲者返視聾者聳聽蒙蔽頓袪沈迷有適凡在率土實多慶賚無任欣戴忭躍之至請宣付所司施行右伏以自春降澤粟麥已滋首夏再旬時雨稍晚陛下念深萬姓恩覃庶獄將有事山川用達精意德音才發甘霔滂流此誠聖感必通天應如答臣等忝居近侍倍百恆情無任忭躍之至謹奉狀陳賀以聞謹奏右臣伏以皇太子是天下之本為國之二今則睿質漸長猶在深宮所與近習者未必皆正人端士安於逸樂久則性成是以古者明王恐其若此雖在赤子先之以教必使耆儒碩德為之師保故大戴禮云周成王在襁褓之中太公為之太師教之順也周公為之太傅傅其德義召公為之太保保其身體是故成王能聖周道用康秦始皇使趙高傅其太子胡亥因教之以獄所習者非斬劓人則夷人之三族也胡亥即位秦氏以亡則明人之性情莫不由習若近正人聞正事雖欲為惡固已不忍若親近細人不聞教諭縱欲行善猶未知所適此必然也胡越之人生則聲同長則語異蓋聲者天然語者所習習於胡則胡習於越則越故知成於所習不可不慎臣伏願詳擇典故徵用名賢執經勸學朝夕從事俾皇太子得於所習天下幸甚謹奉狀以聞謹狀右件婦女事緣卑褻縱兩縣檢括有所阿容即願宣付憲司糾摘其罪今便收捕入內別加推逐道路有云何急於此若在外勘當慮以相寬其餘法獄豈皆應就內始可以杜其請託方益威嚴便是法不肅而吏不懼其弊尢重於別宅者也昔漢丞相府尚不按吏誠以務在尊崇體不可失況天子中禁而有此名丞尉極微所緣至小固不足以塵黷聖聽雖在內曹外議切切未為得所即有聞知不敢不奏謹狀右高力士宣奉敕張守圭所進送突厥生口具問知委曲故令劉思賢去者臣等伏以北虜凶狡誠亦難保其心然陛下以恩澤懷柔歲月已久使彼豺武頓改頑暴以事觀察信然不虛何者昨李佺使回虜亦具云東下中間或言難信至今果如所説即是輸誠於國未有他詐且契丹等翻覆或往或來今其東討雖未稟命在於夷狄亦不可責於常理若因而屠之亦便除患陛下先有聖料以為如此臣等常竊志之固非所及今其來也若契丹等偶勝北虜勢衰因而乘之滅其大半審料必取始可決行事若不然而軍將妄動徒結大隙亦以不信為國生患莫甚於此臣伏以在邊諸將苟利一軍便即行之以邀榮賞不思遠計誠是大失今劉思賢往望將降書處分守圭必為遠圖無得妄動防約諸將使知聖心縱虜庭聞之尢彰天澤未審可否謹録狀奏聞右奚契丹尢近邊鄙侵佚是慮式遏成勞臣庶常情惟欲防禦所謂長策無出此者陛下獨斷宸襟高奪㣥議以為頓兵塞下轉粟邊軍曠日持久役無寧歲若不因利乘便一舉遂平使遷善者自新為惡者就戮事若不爾無息我人且令大兵臨之凶徒必潰不出此歲當並成擒臣等初奉聖謀高深未測及聞凱捷晷候不差而兩蕃遺噍莫不稽顙緣邊戍卒咸以返耕臥鼓滅烽誠自此始斯皆陛下睿謀先定神武非常觀變早於未萌必取預於無象伏以成功不宰君人所以為量有美不宣臣子所以成罪臣雖蒙瞽安敢無言既預聞始謀又幸見成事豈可使天功虛往而日用不知竹帛相傳復紀何事請具狀宣付史館垂示將來仍請將吏等刊石勒頌以紀功德臣某等不勝區區忭躍之至謹奉狀以聞謹奏右臣等今日於九齡處伏見集賢院奉賀御注前件經墨敕批答兼九齡説睿思幽贊元關洞闢微言奧旨廓然昭暢臣等近識暗於大道粗聞九齡此傳便若已有所得欣戴感悅誠不克任伏惟陛下天縱無方有來斯應萬殊一貫三教同歸伏望降出御本使內外傳授則冀明積劫之重昏納㣥迷於正覺朝聞夕死尚不足吝顧此輕生於焉何幸臣等不勝忭躍之至右臣今日面奉進止西幸有日般運已去仍聞京畿百姓猶有未安倘來歲未熟下無所向朕雖至彼復有何情欲延期至來冬待看穀麥卿等商度以為何似臣等具奏洛陽城闕雖曰皇都至於宮苑之間制度本狹然風土氣候不甚宜人陛下以萬姓為心萬姓以陛下為命億兆所繫誠在聖躬聖躬若安何顧小小陛下遂當寧動色再降德音苟利於人朕何顧惜發言惻隱感動神祗臣等幸聞至言不覺承睫聖恩愛育遂及於此又敕臣等商量進來者湛恩至德焉可使朝臣不知聖君鴻名不可令史官無述臣望宣聖旨改用來年十月幸西京仍望具將本狀遍示朝列并宣付史官等臣不勝感戴踴躍之至右臣奉敕今日於安國觀行香伏見天恩為寧王及故惠宣代國金仙公主共寫一切道經四本伏以睿恩友愛情深天屬生成之德無隔存亡利益之資方宏道要諸經畢繕景福雲集稱贊茲日功用有成教義是先誠所感慶臣無任欣戴之至望宣付史館奉狀以聞謹奏右高力士宣示臣等張待賓表臣等前因奏事親承聖旨懸料數日當有捷書及此使至皆如睿略但狂胡背誕圍逼軍州凶力固已困窮邊城一無所損臣等伏料此賊早是破傷大衆遠來踰月乃去馬羸則多死人苦則計生本是烏雜之徒足徵破亡之漸此皆皇威遠讋氛祲坐銷豈伊邊人所能自保臣等幸忝樞近承奉聖謨邊捷有符不勝慶悅謹奉狀陳賀以聞仍望宣付史館謹奏
