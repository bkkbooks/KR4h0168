front:
  text: 全唐文欽定全唐文卷九百四明概貞觀初沙門
  hash: sha256:59c4a093652cb4fb6efab39a50bffd6a96c991410b219864aa5c7f7655514bdb
  markers:
  - {type: head, offset: 12, content: 明㮣, id: KR4h0168_NFKB_904-h1, level: 1}
body:
  text: 僧明概言概聞三皇統天五帝御宇道含宏而遠大德暜覆而平均敷善教以訓民布慈心而育物逮乎中古其道弗虧故漢武欽明見善而弗及顯宗睿哲體道而弗多遂能紆屈尊儀甘泉禮金人之瑞翹想夢寐德陽降銅像之徵於是秦景西遊越流沙而訪道摩騰東入跨蔥嶺而傳真遂得化漸漢朝寺興白馬之號道流晉世剎建青龍之名其間盛寫尊儀競崇寺塔騰慧雲於落仞涌法水於窮源驅有識於福林登蒼生於善地開闡佛法昭化愚矇故得永平季年嘉瑞臻集慶雲流潤湛露凝甘澤馬騰驤神雀翔集朱英吐合穎之秀紫葩生連理之枝可謂不世之奇徵非常之嘉瑞者也於是西域入侍南越歸仁偃革休兵銷金罷刃豈不由感聖降靈奉戒行善精誠昭著貫達幽明者哉故書云天生神物以祚聖人無德斯隱有道則見著之惇史可得而詳惟我大唐膺期啓運握機御歷誕命建家初起義則道叶百靈始登圖則威加萬國故世充化及授首於東都建德武周櫬身於北朔荊吳剋定秦隴廓清方應駕七寶而飛行導千輪而輕舉巍巍弗與蕩蕩誰名功既成焉事亦畢矣加以留心佛法眷言匡護故莊嚴總持再興九級沙門釋子更度千人像化彌盛於前朝寺塔更興於聖世方頂戴三寶宏護四依合掌低頭忘帝王之貴斂心屈膝盡至敬之誠概自慶遭逢屬此嘉運方願息心淨剎畢志元門懍厲六時以酬聖世之德翹勤五體用報罔極之恩而奕忽肆狂言上聞朝聽輕辭蔑聖利口謗賢出語醜於梟音發聲毒於鴆響專欲破滅佛法毀廢衆僧割斷衣糧減省寺塔其故何也奕曾為道士惡妒居懷故毀聖劣凡讚愚勝智以下誇上用短加長違理悖情一至於此但讒言害德偏聽傷賢故宋受子罕之言囚於墨翟魯信季孫之説逐於尼邱二子之賢弗能自免八條之謗或纍於人然以主上欽明弗容讒慝縱其三至寧致一疑但浮雲在天白日有時虧照遊翳拂日陽精為之不明而傅奕浮辭迷於視聽情理眩惑言語混淆弗可專聽豈應偏信請共決對存毀分甘概忝在緇徒預參法侶忽聞誹謗寧不深傷縱回刃刳心未以為痛抽刀斫髓詎以為殘謗讟之深傷酷甚此經云亡身護法沒命宏道此其時也方抽腸瀝膽報邪逆之仇讐申表獻誠雪師父之謗辱冒昧忤聽追用驚惶謹言靈潤俗姓梁氏河東虞鄉人隋仁壽中出家太嶽靈巖寺貞觀八年住京師宏福寺吾今東行纍有三益一酬往譴二順厭生三成大行吾有宿纍蒙天慈責今得見酬則業纍轉滅唯加心悅何所憂也愚夫癡愛隨處興著正智不爾厭不重生夫淨穢兩境同號大空凡聖有情咸推覺性覺空平等何所著也自度度人俱利之道舉人出家依道利物願在三有暜濟四生常無退轉三益如是汝等宜知各調淨根業興善而住吾無慮矣元琬俗姓楊氏宏農華陰人事曇延法師為師貞觀初敕住暜光寺十年卒元琬聞真容晦迹像教陵遲無不假緇素以住持設內外而為護遂得法雲再潤慧日重輝光協萬乘紹隆千載竊尋住持之理義有多門宏護之方教乃非一若不依佛取捨仍恐賞罰乖宗如其準教驗時是則簡徑當理伏以僧尼等不依戒律致犯刑章聞徹闕庭塵瀆聽覽琬等僧徒無任慚懼但恐餘年昏朽疾苦相仍弱命不存洪恩未答遂於經中撰佛教後代國王賞罰三寶法及安養蒼生論并三德論各一卷伏願聖躬親降披覽陛下廣開上書之路冀納芻蕘之言謹獻祕要之經詳金口之教但琬忝當傳法庶無匿教之扶劣署封以酬終後之事不勝戀仰謹奉經以聞元正告始景福維新伏維殿下膺時納祜罄無不宜但琬夙縈沈疴不獲奉慶蒙降逮問無任荷戢感顧恩隆罔知攸厝今略經中要務即可詳行者四條留意尋檢永綏寶祚初勸行慈引涅槃梵行之文令起含養之心存兼濟之教也二減殺者引儒禮無故不殺牛羊者皆重其生去其濫逸也又云王者修其教不易其俗齊其政不易其宜見其生不忍其死聞其聲不食其肉此即上帝悼損害之失樹止殺之漸也故佛經有恕己之喻誡之以殺打諸事也琬聞東宮常膳日多烹宰審如所承誠有大損殿下以一身之料遍擬㣥僚及至斷命所由莫不皆推殿下所以長懷夕惕望崇慈恕自今已往請少殺生東宮內外咸減肉料則歷長命久仁育斯隆三順氣者如經不殺曰仁仁主肝肝者木也春陽之時萬物盡生宜育㣥品用答冥造如其有殺是不順氣殿下位處少陽福居春月行慈以和正氣施惠以保天齡請年別春季斷肉停殺慜彼含育順此陽和四奉齋者如經年三月六齋能潔六根便資五福伏願遵行受持齋戒何者今享此重位咸資往因復能進德崇善用成其美則善知識者是大因緣元琬道德疏微曲蒙顧盼謹率聞見敢塵聽覽慧賾俗姓李氏荊州江陵人九歲投本邑隱法師出家隋開皇中住江陵寺後敕住清禪寺大業末卜居終南高冠嶺貞觀初敕召翻譯新經十年卒年五十七般若燈論者一名中論本有五百偈龍樹菩薩之所作也借燈為名者無分別智有寂照之功也舉中標目者鑑亡緣觀等離二邊也然則燈本無心智也亡照法性平等中義在斯故寄論以明之也若夫尋詮滯旨執俗迷真顛沛斷常之間造次有無之內守名喪實攀葉亡根者豈欲爾哉蓋有由矣請試陳之若乃構分別之因招虛妄之果惑業熏其內識惡友結其外緣致令慢聳崇山見深滄海恚火難觸詞鋒罕當聞説有而快心聽談空而起謗六種偏執各謂非偏五百論師爭興異論或將邪亂正或以偽齊真識以悟而翻迷教雖通而更壅可謂捐珠玩石棄寶負薪觀畫怖龍尋迹怯象愛好如此良可悲夫龍樹菩薩救世挺生訶嗜欲而發心閲深經而自鄙蒙獨尊之懸記然法炬於閻浮且其地越初依功超伏位既窮一實且究二能佩兩印而定百家混三空而齊萬物點塵劫數歷試諸難悼彼㣥迷故作斯論文元旨妙破巧申工被之鈍根多生怯退有分別明菩薩者大乘法將體道居衷遐覽真言為其釋論開祕密藏賜如意珠略廣相成師資互顯至若自乘異執鬱起千端外道殊計紛然萬緒驢乘競馳於駕駟螢火爭耀於龍燭莫不標其品類顯厥師宗玉石既分元黃亦判西域染翰乃有數家考實析微此為精詣若含通本末有六千偈梵文如此翻則減之我皇帝神道邁於羲農陶鑄侔於造化包六合而貫三才攝四生而宏十善崇本息末無為太平守母存子不言而治偏復留心釋典遐想至真以為聖教東流年淹數百而億象所負闕者猶多希聞未聞勞於寤寐中天竺國三藏法師波頗蜜多羅唐言朋友學兼半滿博綜㣥詮喪我怡神搜元養性遊方在念利物為懷故能附筏傳身舉煙召伴冒冰霜而越蔥嶺犯風熱而度沙河時積五年塗經四萬以大唐貞觀元年嵗次娵訾十一月二十日頂戴梵文至止京輦昔秦徵童壽苦用戎兵漢請摩騰遠勞蕃使詎可方茲感應道契冥符家國休祥德人爰降有司奏見殊悅帝心其年有敕安置大興善寺仍請譯出寶星經一部四年六月移住勝光乃召義學沙門慧乘慧朗法常曇藏智首慧明道嶽僧僧珍智解文順法琳靈佳慧賾慧淨等傳譯沙門元謨僧伽及三藏同學崛多律師等同作證明對翻此論尚書左僕射邠國公房元齡太子詹事杜正倫禮部尚書趙郡王李孝恭等並是翊聖賢臣佐時匡濟盡忠貞而事主外形骸以求法自聖君肇慮竟此宏宣利深益厚實資開發鑒譯敕使右光祿大夫太府卿蘭陵蕭璟信根篤始慧力要終寂慮尋真虛心慕道贊揚影響勸助無輟其諸德僧夙興匪懈研核幽旨去華存實目擊則欣其會理函丈則究其是非文雖定而覆詳義乃明而重審嵗次壽星十月十七日檢勘畢了其為論也觀明中道而存中矣觀空顯第一而得一乘空然則司南之車本示迷者照膽之鏡為鑒邪人無邪則鏡無所施不迷則車不為用斯論被申其由此矣雖復斥內遮外盡妄窮真而存乎妙存破如可破蕩蕩焉恢恢焉迎之靡測其源順之罔知其末信是瑩心神之砥礪越溟險之舟輿駭昏識之雷霆照幽塗之日月者矣此土先有中論四卷本偈大同賓頭盧伽為其注解晦其部執學者昧焉此論既興可為明鏡庶悟元君子詳而味之也志寬俗姓姚氏蒲州河東人隋青州刺史任豫自幼出家大業中以事流西蜀貞觀初還鄉里十七年卒於仁壽寺年七十八等同幻境俱稟泡形不意之情非復言像素法師俗風清美道器沖深包總義門研機至實但正業久成必之淨土此方薄運頓失所歸老病之僧早應先去罪重福微猶守餘報耳法師不遺故舊昨二十五日夜降神共聚同臥一牀通夕言議至曉方別情猶今昔事即存亡冥感之誠未可陳述元覽俗姓李氏趙州房子人年十三至汾州就超禪師出家貞觀初入京師住宏福寺十八年捨身渭陰洪陂坊敬白十方三世諸佛弟子元覽自出家來一十二夏雖霑僧數大業未成今欲修行檀波羅蜜如薩埵投身尸毗割股魚王肉山經文具載請從前聖敢附後塵衣物衆具任依佛教臨終之人多不周委慧淨俗姓房氏常山真定人隋國子博士徽遠猶子年十四出家貞觀二年新經至敕淨譯釋十三年延為暜光寺主仍知紀國上座十九年卒年六十八伏奉恩令以慧淨為暜光寺主仍知本寺上座事奉旨驚惶罔知攸措但慧淨不揆庸短少專經論用心過分因搆沈疴暨犬馬齒隆衰弊日盛甚賴全生納養僅時敷説磨鈍策蹇濫被吹噓至於提頓綱維由來未悟整齊僧衆素所不間恩遣曳此庸衰總彼殷務竊悲魚鹿易處失燥溼之宜方圓改質乖任物之性既情不逮事實迫於心撫躬驚惕不遑啓處然恩旨隆渥罔敢辭讓謹以謝聞伏增戰栗重蒙令旨恩渥載隆追深悚怍但慧淨學慚照雪解愧傳燈濫叨榮幸坐致非望復蒙垂茲神翰播斯宏誘文麗辰象調諧金石加以恩兼道俗澤總存亡獎進高深譬超山海循環百遍悲喜交加徒知銘感豈陳螢露頻煩曲降顧已多慚謹以狀聞用增怵惕披覽高論博究精微旨贍文華驚心眩目辨超炙輠理跨聯環幽難勃以縱橫掞藻紛其駱驛非夫哲士誰其溢心瞻彼上人固難與對輕持不敏寧酬客難來論云一音演説各隨類解蠕動衆生皆有佛性然則佛陀之與先覺語從俗異智慧之與般若義本元同習知覺若非勝因念佛慧豈登妙果答曰大哉斯舉也深固幽遠理涉嫌疑今當為子略陳梗概若乃問同答異文郁郁於孔書名一義乖理明明於釋典若名同不許義異則問一不得答殊此例既升彼並自沒如有未喻更為提撕夫以住無所住萬善所以兼修為無不為一音所以齊應豈止絶聖棄智抱一守雌泠然獨善義無兼濟較言優劣其可倫乎二宗既辨百難斯滯論云彼此名言遂可分別一音各解乃玩空談答曰誠如來旨亦須分別竊以逍遙一也鵬鷃不可齊乎九萬榮枯同也椿菌不可齊乎八千而况爝火之侔日月浸灌之方時雨寧有分同明潤而遂均其曜澤哉至若山豪一其大小彭殤均其壽夭莛楹亂其橫豎施厲混其妍媸斯由相待不定相奪可忘莊生所以絶其有封非於未始無物斯則以余分別攻子分別子亡分別即余亡分別矣君子劇談幸無謔論一言易失駟馬難追斯文誡矣深可慎哉論云諸行無常觸類緣起復心有待資氣涉求然則我淨受於熏修慧定成於繕剋答曰無常者故吾去也緣起者新吾來也故吾去矣吾豈常乎新吾來矣吾豈斷乎新故相待假熏修以成靜美惡更代非繕剋而難功是則生滅破彼斷常因果顯其中觀斯實莊釋元同東西理會而吾子去彼取此得無謬乎論云續鳧截鶴庸詎真如蟲化蜂飛何居弱喪答曰夫自然者報分也熏修者業理也報分已定二鳥不羡於短長業理資緣兩蟲有待而飛化然則字象易疑沈冥難曉幽求之士淪惑罔息乃道緣四果尚昧衣珠位隆十地猶昏羅縠聖賢固其若此而况庸庸者乎自非鑑鏡三明雄飛七辨安能妙契元極敷究幽微貧道藉以受業家門朋徒是寄希能擇善敢進芻蕘如或鏗然願詳金牒慧斌俗姓和氏兗州人年十九為州助教年二十三出家臺山年三十四住泰山梁父甑山存道寺後徵為京師宏福寺主貞觀十九年卒年七十二哀哀父母載生載育亦既弄璋我顧我復一朝棄豫山川滿目雲掩重關風驚大谷愛敬之道天倫在茲殷憂暮齒見子無期鑿井通給託事興詞百年幾日對此長悲玉檢之南嶧陽之北獲麟之野秉禮之國居有美政俗多儒墨玉井洞開高碑斯勒海雲貞觀時沙門夫聖生西域影示現於東川教被當闕一字流波蓋於萬代故如來滅後千年之中草有四聖人法師闕一字傳法也千年之後次有凡夫法師亦傳法也暨大魏太和草二年闕一字天竺優迦城有大法師名勒那麼提闕二字寶意兼闕二字乘備照五明求道精勤聖賢未簡而悲矜苦海志存傳化遂從彼中闕一字持十地論振斯東夏授此土沙闕二字光禪師其闕五字教授瓶寫水不失一滴其光律師俗姓楊盧奴闕四字弟子名振齊魏十有餘人謂闕五字詢闕五字師此等十德皆有別傳若大乘筌旨深會取舍之方祕教隨機洞照卷闕三字有其唯道憑法師之一人也闕十字人也闕一字成弟子草餘人苦十地祕論固本垂綱而傳燈闕七字法師之一人也蓋明法師闕十二字中闕一字當千地之後之上首也又是光律師之孫憑法師之闕八字八秋中涉學學且散矣薄言從宅巡衢野望繁霜滿闕五字怖闕二字猛倚樹歎息拭闕十三字命也忠情既發留者誰乎不計危亡專投隱覺於臘闕九字此日而受出家闕十三字穀嵗已向周有人言曰此非佛法矣求仙之念從是闕十一字而兼餌誦闕十四字念闕一字吾當學問於閻浮提中作最大法師若闕一字不爾闕十一字伴難逢踟闕十四字舀到已闕一字奉大法師聽十地地持其法師也道諱道闕十一字年在從闕十六字之威巍巍自住薄有四王之德師於夏日輒患曰闕十二字此闕十六字還向定州而受具戒受已連翩復返上原年草闕二十八字亦訖年草六從隱律師也業想清高闕三十字年草九向彼白鹿李潛下寺首尾一周時造十時疏闕二十九字更還鄴更訪名醫又患求師栖勤之苦遂披闕一字九闕二十九字壽闕二字一首大法師記德碑文一首年卅一更闕二十七字疏兩卷集勝髣疑疏一卷集菩薩戒本一卷闕一字集闕二十七字策論師聽雜何毗曇四有餘遍兩遍既周私鈔闕三十字肇世四齊天保元年冬在鄴京講十地論闕三十字旨闕一字一卷合十三卷矣年卌三聊講華嚴時有檀闕三十三字一闕一字束覆牀而已於束丁隨力撰制謂集闕三十一字集央掘魔羅疏一卷集無量壽經疏一卷集闕三十一字卷集溫室疏一卷集遺教論疏一卷集衆經宗闕三十二字信三寶論一卷集食鷇雞卵成煞有罪論一卷闕二十九字生闕一字成林矣年卌七赴請范陽隨宜闡説三智博流時遇闕一字德闕二十四字齊祚靡頽聖駕在運三寶頓壞殘僧驚竄逃趣無於有俗弟子將太清闕二十二字茲闕一字想作十慈頌十志頌十首作齊已消闕一字頌草七首作觸事申闕一字頌闕十九字集滅法云記一卷集老集莊紀一卷集五兆書一卷華嚴闕一字華闕二十二字遏奉得舍利世尊一粒六返迹洺州於俗弟子廬永幹遏奉得辟闕二十二字集四分戒本疏一卷般若論疏一卷集破寺報闕二字卷闕一字尊世闕一字中闕二十一字世雄頌一卷年七十文皇帝命入咸陽策杖闕三字往闕二字已後還相闕二十一字佛法東行譯經法集上首村衆法一卷集闕三字義記一卷集寒陵山闕二十二字二日終於闕一字寺哀哉慧日此時歿矣闕三字衣懸絶矣其志闕二十一字老而不惓勤講闕一字方止講經講論護法為闕三字奉闕三字為意敬聖敬闕十九字唯上補衣粗食闕一字婦女及尼交遊迹絶骨向親聖往來闕二十六字厭俗愛道本非闕一字事省不求繁務雖居邑闕一字郭每樂山闕六字風來闕一字中心闕二字弱水闕一字至闕十字物其講也聲闕一字緩而終急華嚴經講九口十六遍闕七字百餘闕九字經磨闕七字戒闕二字磨闕二字槃經講一闕二字然解闕九字旨闕十六字兩闕一字論闕一字之開闕三字夜別一人僧欠差長極闕二字五臘闕七字時惟使大闕二字遣闕一字彌闕一字衆闕十六字受菩薩戒後闕化大隋闕十一字高餘於闕三字上而短下細而不闕十六字閻一所聖賢不憚吾闕十字東土傳化起於漢明麼騰迦闕一字來此於闕十一字中天之地城名優迦法闕十一字悲風內鼓遊茲洛邑專宏大乘精成難闕十字龍舄遞出法輪相繼闕一字人闕十二字師時十八家求學造此結門闕十四字二十有一南遊鄴京大師闕十一字三十有四講説住持如龍處雲雨闕十三字其間撰結內外俱駕八十有闕十字哀闕一字哉法雨此時雲滅來世蒼生傳名麼
