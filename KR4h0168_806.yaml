front:
  text: 全唐文欽定全唐文卷八百六詞立咸通十三年官虔州孔目
  hash: sha256:df1b6150a138514bf5052111aa360d170c3f04c4c1958ff0d13afedb99a98279
  markers:
  - {type: head, offset: 12, content: 蔡詞立, id: KR4h0168_NFKB_806-h1, level: 1}
body:
  text: 京百司至於天下郡府有曹署者則有公厨亦非惟食為謀所以因食而集評議公事者也繇是凡在厥位得不遵禮法舉職司事有疑獄有寃化未洽弊未去有善未彰有惡未除皆得以議之然後可以聞於太守矣冀乎小庇生靈以酬寸祿豈可食飽而退㣥居偶語而已况虔居江嶺地扼咽喉有兵車之繁賦役之重苟一物為害則萬姓何辜一綱不提則七邑何守同舍諸公得無屬意焉小子承乏每慙尸素志求短拙憂心忘餐或有公事之稽留獄訟之寃滯六曹之臧否百姓之慘舒農桑之失時鄉閭之蠧弊聞見所未及才智所未臻希會饌以言之共裨風化院食堂舊基陋咸通七年夏前太守隴西公遇時之豐伺農之隙因革廨署爰立茲堂環之高樓翼之虛楹有風月之景花木之陰無燥濕之虞墊陷之慮聚於此者得無愧焉處廣廈宜念巢居露寢者食兼味宜念糊口甑塵者夏清涼宜念曝日而耕者冬溫燠宜念卒歲無衣者苟用心如是則日食萬錢無以為愧豈惟公膳哉自創建之後於今七年未有紀述深以為缺小子伏役之暇好讀書為文雖顧不才聊用直録咸通十三年五月三日記圭僖宗時人龍爭虎鬬兮萬象交奔鏃盡兵窮兮白日猶昏潛豹略而久困割鴻溝而兩存臨屹屹之重關平分海嶽指遙遙之一水畫斷乾坤秦之末世也鹿走中原人殃下土天垂不定之氣代作分爭之主皆欲呵叱㣥類鞭笞萬宇或功侔擘嶽掃氛祲以將清或力並觸山缺穹昊而未補爭馳羽檄欲定雲雷共假長山之隔闊請如橫漢以昭回劈六合以中裂割八紘而半開於是對戢雄稜俱停執馭盟高岸以斜指約中流而內據霜戈雪刃擁雲陳以東歸火幟虹旗扶日輪而西去險隘瓜剖沉深帶橫兩曜而寧休暈蝕重宵而未落欃槍晉魏周韓出地表而共宗函谷燕齊楚越徹天涯而盡屬彭城池塹彌堅人烟漸隔瘡痍詎息於餘略兵甲俄循於舊跡孤軍外鎖截南北於千城萬馬重來併華夷於一擲由是霾陰再合霆霹交侵強者功淺弱者機深空欲限溝洫之迢遞閉關河之阻尋分地理而不分天理割波心而不割人心及夫垓下之劍不還江上之師莫遏始知鳳閣之難處徒想鴻溝之獨割至今京索之原古津空闊廣明初梓州浮圖祠大小共十二慧義居其北兜率當其南牛頭據其西正觀距其東上臨絶壁下瞰長江青靄屬天纖塵莫及巉巖險峭孤標勢盛諸寺讓焉自儀鳳元年置本號清居尋改真觀凡一百六十七年會昌中例從毀廢大中時內大德僧知元與工部李侍郎同議興復功業未就屬蠻獠猖狂將犯西蜀有三藏僧洪照召諸寺僧智海等於舊基置降魔壇號曰無能節度使尚書獨孤公因給牒置院利人信施洊至飛木挽石僦徒募工樹立新規因循舊跡制未周歲而及半創觀音像堂三間南邊佛舍五間山頭大閣三層七間房廊厨庫門廡十五間皆盡雕飾之妙宏壯之麗瞻仰崇峻依歸者萬計舊傳磚塔十三層歲久傾欹忽遇風雷遲明卻正時以龍神扶掖之異今餘其址又有石龕四五兼鬼子母下臨方泉里巷以高禖之饗祈禱者衆頗有靈異故李公溪石前身之說詩碑尚在洪照姓鄭氏虢州盧氏人幼詣清凉金闕寺鏡公處出家竹林寺用公處具戒壯歲就興善寺則公處受灌頂五部大法明五天梵字太和七年遊蜀初住綿州大安寺洎返初服再從剃落因隸帛丿糸州開元寺置上方轉輪經藏十年秋川主尚書韋公請居慧義般舟院因得重新正觀焉常以真言祛邪逐崇呪水治病救人不可勝數咸通十三年夏六月委化於般舟舊座壽七十八臘五十五建方墳於東山梓州諸寺山院陳迹慧義則有庾開府王子安李北海趙蕤處士碑牛頭則有閭邱博士均嚴員外碑南禪院應天院則有李員外商隱淨光徹大碑圓梵寺兜率寺則有崔相國楊相國記靈泉院法社龕則有王校書魯記皆雄詞健筆抉異挑奇相繼馳名於諸夏矣惟正觀舊無紀述照公門人從文清標正直勤苦修持承襲巖栖宗依明教亦得其三密心印乘間録精宇之興廢先師之行業劘懸崖五尺請書圭辭不獲命書曰舊真觀寺今觀音院元始其意照成其志文終其事辛丑歲正月二十七日丙子刻瑄咸通朝諫議大夫伏見新及第進士令狐滈是河中節度使檢校司空同中書門下平章事令狐綯男舊名壽改名滈竊聞項年暫曾罷舉自父當重位而權在一門求請者詭黨風趨妄動者邪朋雲集每歲春闈登第在朝清列除官事望雖出於綯取捨悉由於滈喧然如市傍若無人威振寰中勢傾天下及綯去年罷相出鎮其日令狐滈於禮部納卷伏以舉人文卷皆須十月已前送納豈可父身尚居樞務男私挾其解名干撓主司侮弄文法若宰相子弟總合應舉即不合繼絶數年如宰相子弟不合應舉即何預有文解公然輕易隱蔽聖聰將陛下朝廷為綯滈家事伏恐奸欺得路孤直杜門非惟取笑士流抑亦大傷風教伏請下御史臺子細推勘納卷及取解月日聞奏臣職當諫署分合上聞稠僖宗朝亳州刺史昭宗乾寧四年加金紫光祿大夫檢校工部尚書自大寇犯闕之後㣥凶誅殄已來大小寇逆前後一十八度欲犯太清宮或迷失道途或龍神示見終挫凶計宮城晏然所庇護居人不知其數請移真源縣就宮安置魏賓咸通時鄉進士太嘷爰興木德啓姬周之運靈王少海緱嶺表登仙之慶故王之命氏始乎太子晉晉生龜襲封於太原今為郡人也草四代祖褒仕晉為大將軍以孝敬動天粲兮國史流祚萬世忠貞顯隆軒冕官常有國皆有不復備列於斯志君諱仲建字彥初即將軍之遠派也曾祖潾逮皇考坤咸以博識著稱委簪纓有羈縻之患故遁俗不仕府君乃坤之次子矣幼而廉慎長而剛毅偉其貌而孝於家睦乎宗而潔諸已訥言敏行金穴山藏用捨無遺鶉駟一致誠明諒直清簡洽聞涵㯋鋭於鋒鋩極逍遙於大道武齊樂伯劒敵莊周縱雄辨而嶰谷潛暄攄麗藻而綺霞爭秀志高氣遠觀象紫微當豹隱之餘芳應處士之嘉號非公而孰能與於此哉識者以為懷寶不耀至信自彰探老氏之希夷固全真於物外者也方欲鍊形羽化潄液丹霄存神於罔象之中抱一於杳冥之內將宣平生之大節豈料尋師未遂步水俄侵賈生之鵩鳥遽延排寢之搏膺斯及嗚呼春秋六十以疾不間終於河梁之別業公娶清河張氏乃班孟之名家胎訓之清譽蘋蘩繼代中饋祖禰之母儀耳故能有子一人焉曰知教實令嗣也自齠季丱歲所好所慕已脫落常態及成童伯仲以孝經授見末章有裂骨之痛親屬以為曾閔之匹俾專就養克扶竭力之仁捧藥問安式展因心之孝銜酸茹恨泣血穹蒼劈地捫心幾將滅性於廬次悲夫繼夫人安氏淑順閨閫亦盡敬姜之禮知教乃抑情斂涕罄彼稱家克己勵精冀終大事以其年歲在乙酉十月己酉朔草二日庚午至孝由是坐踴無時徒跣備先王之制列儀旐自三城護府君之神座歸葬於河陽縣豐平鄉趙村之北原附大塋啓先夫人之舊窆合祔於斯禮也尚念鍾嵒圯毀江甗摧頺歷數有期堙滅無紀請編是誄於泉壙魏賓嘗游館穀竊覿徽音直筆其辭用旌孝子之慕孺乃作銘云王氏盛業姬周奕世降及仙才浮邱以濟元偉孝弟仕晉文帝義烈汪洋忠貞昭晰以至於公克揚嘉裔猗與府君以大其先嗟嗟夫人柔順其賢孝子號天哀親棄捐感靈陶鸖相彼何阡峰巒山纍巋氣魄聯綿尹默之悲凉奚及陸機之雅賦依然檜柏秋月春松暮烟庶山川之不易摽志誄於他年雲字景之一字瑞卿咸通朝官起居郎歷興元少尹臣伏見今月十五日敕除長安縣尉集賢校理令狐滈充左拾遺者滈頃籍父威不修子道干權黷貨有口皆知據其輿論之所咨嗟宜於霜憲之所破碎豈可令捧近日月飛翔雲天此則有罪而反榮是乃無辜而可警也伏惟陛下以獻文繼代孝德承祧臨天下以至明示天下以至信有善必勸有惡必懲分別昭彰使人不惑也今滈為諫官是惡人得位善人必疑矣陛下何以執信行令使萬方從化平滈麻衣如雪干弄未光穿緣穴鼠之墉以欺其父出入吞舟之網不畏於人至於朝廷命官公然請託不封殿最無取賢愚但擁富資即為高第遂使堯官三載黜陟有繫於金錢孔教四科取舍或由於聲色且令狐綯進用李琢首亂南方贓罪流聞遠近昭著使天下兵戈徵斂未有巳時而南安舉城化為凝血矣陛下每臨朝聽政語及南安事或至掩泣未嘗離心上欲收復土疆次欲誡勵臣下琢頃以典郡贓穢廷臣曾有論封令狐綯比竟用之由滈有納賄故也李琢之罪既正刑書則舉以致戎者是誰之故此乃目前可驗天下皆知臣豈苟緣愛憎妄有論列滈為人子陷父為惡豈堪鳴玉曳組為陛下諫臣乎陛下必欲推寧僭之恩以寵於滈豈不念南方赤子流離死亡豈不念州郡徵斂生人受弊豈不念蔡襲酷沒豈不念國計空虛凡此數條盡滈之由也臣頃事先朝任太常博士以滈專恣威福勢傾朝廷大中十三年五月二十三日已進密疏直啓九重先帝且務苞含微臣亦蒙全宥幸得要領獲事聖朝臣今若顧惜微疆寢而不奏是臣不以事先帝之心事陛下也生則罪重死有餘辜但獲上聞聖聰一悟睿旨雖當鼎鑊亦所甘心伏望改授滈一官以息㣥議臣一昨以令狐滈負議聖朝脫身疏網因緣僭祿抗奏上論伏自疏奏以來二十餘日未奉明詔異議喧然臣孤立自持當此大位忽異恐事生不測先及臣身則一去帝城千里吞恨將來拜疏何略聞知臣今再上聞者但以勢不可默也滈之取錢豈令臣見臣只以貪僭之譽布在人間惟受傳聞即有論列先朝獻疏已具指陳還緣此子竊父威權為過不少而外人言論上聞於天所以先帝不加責於微臣以言之無罪不然令狐滈外倚家門之權內連鄭皓之寵臣尋粉碎於先朝矣今日豈得全生更為陛下明言乎令狐綯為先帝權柄大臣獨亶恩澤職當調護國本訏謨皇家陛下序屬天宗躬為長子先帝親觀齒讓目覩溫文大中十年十月八日敕右諫議大夫豆盧籍刑部郎中李鄴並以本官充夔王巳下侍讀此令狐綯交連帝戚位冠鼎臣端坐中書作何行李陛下受天照命㣥臣定策宮禁之事則臣不知但欲冊夔王便可知綯臣節况濫舉李琢致其毒流生人使先帝貽厥之謀不及陛下好生之德未免憂勤綯只合辭榮乞骸席藳請罰何顏更令不孝之子濫求官榮事體既乖人情實憤李琢本無吏道惟有貪名滈既身挫人言琢官實由賄得綯拔自㣥小分符交州琢果大肆凶殘處置杜存誠父子取怨溪洞闔境亂離其坐罪貶官綯猶專為掩覆依前要用更與壽州蕭倣駁議既行李琢罪狀轉驗琢不自澄省指斥王廷按獄司窮重重貶削分務未久又除宋州直至綯罷相權琢始廢居東格無私宰物當如是乎若令狐綯以琢一時敏辨以有公才用琢如或不知在綯未為有過豈李琢前僭未塞後惡乃張知是罪人橫身庇護則綯之舉吏自與心違滈之取錢何須眼見衆口紛紜號為白衣宰相朝廷設進士之科本求才彥鎮其浮濫屬自宰臣陛下御極之初大臣儀刑百辟豈為綯言出鎮滈便策名放榜宣麻相去二十三日綯既公然進狀請試春官滈則元在京都不經舉進明言拔解傍若無人滈為宰臣之子不患無位且合簡身慎行以成父業有何急切如此攫拿使天下孤寒人人怨歎謂之無解及第實則有耳未聞不懼人言一至於此臣若悉書滈過方罄南山之竹恐未盡也臣家惟有童稚更無兄弟自傷側足單居但思引領獲罪令狐綯身榮上相位冠通侯十年桃李之陰兩葉公台之貴煦能生物怒可移山臣子豈無常人之情有何苦切頻將單脆微蔑之身與強家立怨立敵自取傾危也直以曾將滈事上聞先朝滈出網羅偶逋清憲更欲玷黷皇化參侍玉墀人懷怨心而敢指斥是欲以大中威福復行之於舜日也獨臣將經是事豈得逡巡止可碎身權豪之門不可負陛下設官分職况綯有粃政亦何阻直言以其前章猶未明切聞滈黨欲謀害臣恐不及繼言便至貶降臣又思令狐綯負先帝之事陛下不知誤我聖明由臣恇怯今再得指陳滈事啓達聰明臣於妻子官業已無愛惜矣用舍之宜一俟聖裁鈐懿宗時以詩賦著名纍舉進士不第玉露初降金風正秋有壽星之發彩出離方而若浮太史於是奏時令贊天休謂三光之丕顯蓋萬乘之勤修天子乃命有司灌鬱鬯登靈壇以蕆事敬南極而延望當其氣凝霧寢烟消霞曠循大象之昭回見孤光之寥亮月來歲往常居赤帝之前目擊心祈空仰碧霄之上所欲精誠斯感肸蠁潛交矚神靈兮心馳箕斗奠椒獎兮酌滿陶匏事異乞言殊養老於東序祭惟合禮同祀月於西郊時也陰陽正位晝夜平分思薦祉於人壽遂大享乎天文則知秩天宗用郊祀斯祭也象在角亢壇當戊巳月皎皎而清漢波流夜蕭蕭而白榆風起齊心既潔蘋蘩之薦巳申壽域先開龜鶴之年可俟祀事既道之南恍惚兮光臨俎豆依稀兮氣動烟嵐由是見星足廠田坴之不爽知君德之相參彼牛女迢遞以增思參商隱見而差失處圓靈兮徒分炳煥於敬授兮未為貞吉曷若我冠衆星而稱老當三秋而迥出既有補於乾坤詎廢書於時日是宜執犧象展雞彞召馮相而司歷命祝史以陳辭如此則所謂一人有慶而兆民賴之玭咸通十年進士昔宋有野人負日之暄兮獻君不知天下流光以所見為未見不信人間委照以所聞為未聞當其愛景稍融農民乍悅謂國內無有謂山前自別恐若木之光遽失慮扶桑之影將滅於是耒耜潛棄耘鉏暫輟指天路而貢誠適君門兮效節紅輪在上無欺皎爾之心赤羽相隨可驗昭然之說乃曰臣生於隴之畔長於隴之旁朝播其穀暮植其桑絲不得上體粟不得充腸以藿為食以蓑為裳體凍乎雪骨寒乎霜因取適於中野遂潛舒於太陽煦不厭暄不忘而恐率土之尊未識民間之樂一氓之賤敢私天外之光所以貢其所知陳其所覩願日之彩致於君之館願日之輝及於君之宇南畝而曾無寸澤猶悅於身東方而幸有餘明敢忘於主主乃憫其甚朴嘉其至誠一則警於驕逸一則念及黎氓安知萬室豪家更有追歡之意六宮長夜仍多縱樂之情嗟夫人各有生生而有異爾豈不以種植為業逋租為事上或逼於狼政下或臨於虎吏汲汲為心營營為意遂使朝光不辨誰知勞者之情暖景為祥忍奪生民之利乃知貴之逸者有之何稼穡而能知賤之至者不一則陽和而豈失彼徒見其夕入而因忘其曉出三尺之童子猶嗤何以日而獻日不見和字官韻喬池州人咸通中進士黃巢之亂隱九華山燕訓恭儉樂協詠歌君子以之侑食先王所以布政師彼國子舞於公庭始合於文執羽籥而在列終奏以武覩弓矢之斯張進退疾徐取六律以成節屈伸俯仰宣八風以克諧始協伯夔之教自得周官之典眂瞭詔瞽既訴者之有詞樂師巡列何朴作之妄罰於此觀禮宜其緩刑畋懿宗朝官知制誥門下死生有命雖著於格言天橫難明豈由於定數每念肅雍之德載經悲愴之懷疏土易名用申彞典故同昌公主生知孝敬天錫聰明桃李凝華芝蘭蘊秀克奉公宮之訓寧煩女史之針洎結慶秦樓傳芳魯館蘋蘩潔淨環珮鏗鏘不矜帝子之尊盡執家人之禮謂乎積善享彼修齡驚電逝以霜摧致珠沉而玉折粉田蕪沒金榜淒涼荒沁水之林園寢平陽之簫鼓哀情靡極縟禮宜加啓衛國之山河擇周公之諡號式崇徽教用慰營魂可贈衛國公主兼賜諡曰文懿仍令所司擇日冊命主者施行朗懿宗時人蓋聞三皇之時人本敦朴各守性命保其沖和全厥天年化窮則已降及唐虞之代嗜欲猶淳家給人足不相侵伐君君臣臣各理其職而已海內平一刑措罔施足而馳者安於山鱗而潛者樂於水羽而飛者保於林胎夭不傷耆耋得死苟無禍害之釁奚假振拔之門哉殷周已還戰國萌動弦弧掞矢鍊甲鑄兵乃有強凌弱衆暴寡由是爭鬬之患生殺伐之禍興矣雖老氏垂清淨之化仲尼用禮樂之教莫能救也而苦海波湧愛河風騰害源弗袪心垢彌悖重圍匝於三界毒焰延於四生乘時蕩滌建設航筏汲引沉溺者惟佛世尊於是標六度之寶訓轉無上之法輪作迷途之指南為黑夜之明炬處濁世者何能濟哉但為三惑牽纒六趣淪陷頓而悟者萬無一焉粵有我東晉左散騎常侍輔國大將軍太傅胡安定公得之矣公諱鳳字世鸞才推國英德標人瑞出蕃入輔興事建功焯乎圖書煥在南史其激俗尢異立跡惟能者可得而言之於戲胡公辭榮不讓於二疏知足式於元老壓伐冰之貴攀定水之宗悟萬法皆空歎浮生若幻以晉義熙二年正月捨所居為和安寺焉尊像端嚴塔廟宏麗由浙而左香剎之盛莫之偕也夫人九江郡太守呂公凱之女也柔明淑嬺姻族推高配德宜家義諧琴瑟發無上願捨不住資亦於是日同捨西莊置五福寺焉殿宇嚴整高卑得宜迭經廢興更名靈曜寺其五福舊額則移於縣郭之東山立寺焉和安門接三衢途通百越法衆雲集供具日臻長夏講筵無時暫輟燈然積代之明福贊無疆之休故得族茂千枝化霑來葉後嗣蕃衍不可勝言或以廉秀登科或以勳勞筮仕剖符列郡遵問絹之清風鳴絃化人效馴雉之素履其在空門持律行者二人二十三代孫聖壽寺僧令宣和安寺僧清瑗並童丱出家弱冠受具以為百億三昧無非度門調伏身心梵行精密調伏心為定慧調伏身為律儀護持第一如優波離受佛付囑比大迦葉行標法侶玉潔緇林宗孫棲遁雲壑者凡數十門皆琴書自娛泉石為玩與夫俯首下位者不亦高乎二律公洎枝孫輩凡若干人聚而歎曰我二十三代祖太傅公捨宅置寺綿歷歲時當武宗皇帝御宇之五年以釋教陵遲緇徒冗雜非一蕩滌無清化源初下明詔沙汰僧尼尋降敕旨毀廢寺宇則和安靈曜並隨而廢焉舊用碑銘一皆碎棄千載之後莫詳其由安可不紀於堅珉揚其往烈洎宣宗皇帝即統祚六年以三教並行殊途一致有裨大化幽贊王猷重降德音再許置寺國朝大理卿溫公彰蒞郡之日特表奏論恩賜禪月之額有上首大德正白修大乘業得無畏輪行化未周喜捨鱗積營構堂殿不月而成爾後尋復寺名其士庶助成功德者名秩姓字者別有標録此不更書今所敘述但彰厥初立寺之由焉朗謝秩鄞江寓居蘭渚寺幸不以匪才見託書事牢讓數四堅請如初釋耒揮毫但慚荒拙銘曰美胡公山嶽降靈爰挺人英出鎮蕃屏入輔王廷德彌馨兮其一美胡公爵貴祿優知雄守柔能捨能捨居成寶樓名不朽兮其二美胡公桃夭蕡實有堅其室同捐別墅圓明佛日爰聚尼衆棲禪靖謐置靈曜兮其三美胡公盛德顯融令始罄終美宅名園鬱為梵宮億萬子孫福壽永隆祚不窮兮其四伉咸通朝官吏部郎中四方取則西夏為樞九流待問東臺是急若舉不失德實人所具瞻而肅穆清規崇嚴丹陛登清光於霄漢不違顏於咫尺則當進退禮容孰聞槃辟雅拜既無觀於叔氏亦何取於鄒人有司上聞攸資伏念儻使廣成不遠應無北面之尊綺季或存未屈南山之老試可乃巳誰不謂然在天莫如龍龍之德佐天地養萬物百穀賴以生四海所共尊者也社祭土稷祈穀國之重典也既立壇以享其神矣則龍之靈翔風灑雨澤枯稿滋稼穡可不嚴奠酹之所哉余受命牧明人四月戾止六月大旱俾吏具香酒敬祈於五龍之神有蜥蜴狀者躍入杯中飲酒復出緣器上顧吏久之跳躑而去吏未返雨已大注由是生植茂遂闔邑豐衍思所以崇祀事答神休者乃建宇爽塏依方塑像以時薦饗謂之五龍祠堂云時咸通六年季秋之末也
