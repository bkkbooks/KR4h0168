front:
  text: 全唐文欽定全唐文卷二百五十八蘇頲九
  hash: sha256:04b046b1bc3d5c6d5b9844396a5b2d857733b3b226834faca5ba857638063ff9
body:
  text: 世稱李公德為範言為師行為則事為程於戲彼之四者吾以一貫及值緝熙之運懷廣大之業天下謂之登相國踐台司竟而此位不躋亦公之譽也若季孫何訪不對者宣尼季子可法以書者文仲夫如是故聞其風志其道粵未量已公諱乂字尚真趙房子人也柏人侯曇裔孫侍書勁十一世孫自咎繇虞臣老聃周史純嘏之烈清華其冠曾祖彥博振威將軍光州固始令祖惠明弋陽西曹椽熊州司倉書佐父大智閬州新政令公貴達追贈濟州刺史以昭孝焉北臨代有恒岳東注彭有泫水豈恒之寶泫之精矣何奇士之不乏而我公誕生歟公幼而閔凶弱不好弄十一從學極奧研幾十二屬詞含商咀徵中書令薛元超謂人曰此子必負海內盛名十九郡舉茂才策第考功郎劉思立一見又如之調補潞州壺關婺州武義尉羈雲逸而在泥蟠也秩滿詣選吏部侍郎蘇味道偉藏器而嗟韞櫝也特授藍田尉又策高第累遷乾封萬年尉雍州長史薛季昹視事咨謀推誠悅服主畫諾而班詔書也擢為監察御史歷殿中侍御平而不頗踈而不漏與御史令黃門監漁陽公承旨鞫偽發姦除惡刑以矯末禮以教中有若決疣潰癰焚符破璽景龍中葉靜能諂諛媚妬權勢傾人自謂金鼎可期羽衣而立公劾奏其僻中宗原而宥之不肖者懼不仁者遠無何加朝散大夫遷尚書司勳左司二員外右司郎中中書舍人立義起草司言揮翰葢閑練而芳蔚也遂長兼昭文館學士雲龍待問天馬成歌㣥士躍鱗繄公稱旨太子上即位檢校吏部郎中正關鍵端也持刀尺審也建是無撓翕然有聲二歲遷黃門侍郎加銀青光祿大夫進爵中山郡開國公食邑二千戶四歲轉紫微侍郎掌制數月兼刑部尚書明年正除檢校尚書校郡國考績凡二歲古之邁迹垂憲選賢與能多矣抑揚者或齟齬為心塞默者或籧篨為貌介無不執執則嫌於偏柔無不通通無惡於善士君子患也公列近臣居常伯則不然秉彞德徹乘理錯綜平枉梧按疑倫省忠而公信而順謀始而作慮先而動明可照肝膽精可析毫芒議必當而刑不放也故邦釋令典公敷大猷粗舉凡矣聖人迪謨訓書冊惟文乎公掌絲綍握鉛槧典可常而史不隱也聖人鞠師旅繕甲兵惟武乎公賦其車蒐以器居有禮而用有神也聖人訊法約疇事省惟清乎公削煩苛節更算著諸令而便於宜也聖人核臧否甄黜陟惟明乎公差九牧區五等措諸枉而舉於直也夫文武以序清明以成斯事體大與時偕行行之我公則無遺矣嗚呼我公何不壽矣明靈罔恤闇忽而殂享年六十開元丙辰歲仲春癸酉薨於京師宣陽里第旒冕震悼衣冠痛惜秦里奚鄭子產烏足擬哉制贈公黃門監絹布三百疋米粟三百石以賻之太常考行曰貞宜矣公每誡其子師於薄葬有子寧等五人並喪過乎慼奉遵先旨不敢隳廢韋賢業儒竟遷魯國杜預知禮自表邢山故寧等以其夏丙申卜葬長安細柳原東北望帝京二十有五里償其志也柩既引戶部尚書東平畢構少府監吳郡陸餘慶散騎常侍扶風馬懷素黃門侍郎清河崔泰之洎紫微侍郎武功蘇頲祖於延年門外舉觴言曰不還故鄉達也別於此路窮也孰云中山寧厥后土非此公之為慟吾誰慟乎服馬悲鳴而不前行人涕泣而相向僉以頲者公稱知我我謂之甥固嘗揮斤見期必使刊石為事頲則不佞曷于是重相泣謂曰我輩見中山弗冥冥隳行弗察察從政弗執利邀寵弗夸毗耀榮無躁求無苟得結友朋義也誨子弟仁也薦賢畏其知聞善若已出急於病讓於夷輕於財重於施廼中山之度矣所著文集成六十卷五言之妙一變乎時流便清婉經綸密緻猶樂簫韶工黼黻也至於心凝風味神嬉景華奕碁不孤絃酌相伴樂然有地貴豈在人奈何則亡不可復見因更為長慟俾愚敘之黃門監漁陽公盧公居世有閎散之任與公有范張之密強學偉詞葢撰其實也遂作頌云龍德周史龜文漢相鼎鼐遞襲簪纓相望常山之英泫水之精代稱不乏人惟特生其一鯉趨成訓敦詩閱史鴻漸于磐陟遐自邇暫勞州郡俄拾青紫王佐之才一日千里其二高遊省門近侍軒墀守位以正行已無私無私伊何惟忠是効以正伊何臨事不撓其三八座爰踐三階未陟如何不臧景命云極中夜嬰癘崇朝孔亟縱壑摧鱗靡霄墜翼其四如水之清如玉之貞如衡之平如鏡之明應享年以介壽何短晷之先傾晉喪名臣兮羊公見哀於武帝鄭有遺愛兮尼父掩泣於僑卿其五歸無途兮往不返歲將晏兮逝水遠南山南河往不返可奈何日運星迴天長地久旌芳宣懿無非舊友其六昔軒轅至孔某師止十一名之聖者今天下尊皇帝學踰三五教之神者既學且師考今猶昔蹈道從事伊褚公焉公諱無量字宏度其先邑河南之陽翟十一代祖盛後漢海鹽長子孫因居遂為吳郡海鹽人也五代祖陽齊民部尚書駙馬都尉嗣錢唐侯高祖遼民梁鄱陽王國常侍曾祖仁宏陳始興王法曹參軍暨陽令祖範隋豫章郡丞父義宗皇贈使持節和州刺史自微子封宋以迄于恭恭裔食褚因而得姓廼侯廼戚或史或儒粵不可量已豈岳鎮天峻是先人之郡國將湖清世平當天子之門館靈其效矣公實休哉上哲鍾懿元和育粹忠乎孝乎盡至於至寬得衆易有親晦而明微而闡其立行也絲白不染不成黼黻砥磺不礪不就純鈞寢思益居待問功可倍諭可博其立言也始吳興沈子山吳郡曹福授以經次吳郡張嘉會授之史演至賾平牴牾研至精起廢疾貫心則中達革其餘師乃厭服爾為宗匠逮攝齊膠序揚袂河洛罔不企獨立以先赴聆遠音而響從猶彫材之有楩柟綷翼之有鵷鳳下制嘉辟用超倫等即拜成均直講轉右鷹揚倉曹參軍直講如故稍遷成均助教累至國子博士朝散大夫國子司業崇文館學士常二仲齊祀會一時髦彥主賓難折㣥疑應不敢夸官閥單不能曜旗鼓太夫人在東也庭闈是思鍾釜不違遂罷而就養我聖皇居震也司過惟史聽聰則書復徵以侍讀及回金輅問辟雍搖柄前席有丞有祝聲㣥奔以坻穨辯連屬而河瀉是日中賜章綬并時服雜繒就拜銀青光祿大夫以昭其業上正位遷剡王傅國子祭酒轉左散騎常侍特封舒國公實食二百公雖傳天人司國子然而載啟載沃百氏之言滿中禁日尊日事五更之禮存上庠故珥貂寵而刑馬誓也尋與中令范陽張說侍郎武功蘇頲黃門郎趙郡李乂等開講序于掖垣悉上其昌言嘉謩可體要經遠者京都之政起自軒墀齊魯之風成於㝢縣公以遭盛明而華皓不息廼作帝師懷喜懼而斑斕未旋孰為人子灑零獻懇于再于三重論思而久駐修切至而方遣臨軒贈詩盈篚將意華晨省而偉晝遊焉居無何太夫人即世公禮不當毀號而殆滅遂于塋兆之側伏苫塊時松楸鹿常犯之公祝乃止應物也通神也有如是乎喪既除驛徵至仍舊左常侍兼侍讀登朝則老臣布武自屏不趨侍講則宦者平肩必輿而進皆別旨之非常也上復以舊章散落㣥籍湮墜張購令据逸文補其缺刪其謬勅公於都乾元殿京麗正殿總而成之上帝之璧先王之府委墳素流筆墨可滌元覽而照清光耶日者皇太子志于學齒于冑演經則太師憑几納誨則元良降席諭夫錯中刑外一物三善者禮如前粵開元庚申歲正月哉生魄景命不造遘疾薨於長安崇仁里之賜第春秋七十有五上輟朝不視旅次而哭遣中使潺湲以恤故盼近臣歔欷以追往乃贈禮部尚書賻物四百段米粟四百石小宗伯陳祭儀亞京尹護喪事歸則本州刺史帥屬厚加焉僉謂公進以秉德動而率禮自石渠延首金華造膝時屬升賢良杜讒佞雖明慮天斷匪獨開陳亦讜辭日聞寧虛聽受若藏者諗無藝出裘者思有惠使輕革也之說傲嬰也之譏又安能是果良圖中比則隱之微章之末所撰儲君翼善二十篇帝王要覽二十二卷帝王紀錄二卷心鏡三十篇刪正論語孝經䟽各一部每條上則留中錫之孔殷盈不可數大抵以義約以文見俾興亡有兆消長無傾規乎諷乎類乎指乎行之則是聞足自戒不然何以皇賚之聖叶之至於斯也化益淳儒益信則郊廟有典賓軍有容發揮牲王斟酌犧象必咨焉度焉此又衆之難公之易薨後㣥學士於書殿中得講史記至言十二卷即日聞之上悼甚重賜其家絹五百疋試為我著常奏新篇從取其書竟賫遺草悲夫粵某年仲冬甲子歸祔于錢塘臨平山之舊城容軒止塗喪服會葬者數百顧而歎曰公何學也何師也則我副君惟君是登皇極天子之子是作孟侯皆受于公矣董則五朝典學無同道之用桓則三世各師有殊特之美曾不可援以事舉諸凡卓哉使後之人泛微波攀絕迹者我公也太常易名曰文宜也長子河南澠池主簿庭詢次左拾遺庭誨次京兆渭南縣尉庭賓三子之戚二連所善居家嗣徽繼世承烈則仲弓之有元及季伯起之傳秉及賜故遠邇嘉之吳江漫兮將海合吳岫重兮與天沓公是屬兮公是安仁則返兮儉乃完異樹行兮生也志他石篆兮子也刊噫不憗歟寄之銘曰昭昭府君生代叶期儒有斯文帝王者師探幽典墳贊道雍熙其德彌芬其謩益祗訓由老成榮以恩屢資孝是悅資忠是務禹嘗獻蓍光不言樹專褚之學啟舒之賦六經芳兮七命章戴頻頻兮服煌煌無還齡兮有去光未飾杖兮歘擁梁宸極悽兮門人慕悲風起兮轅馬顧背西畤兮即東路路阻修兮日悠悠旌旐思兮空山秋吾見業可久而名不朽者猗冄褚侯猗冄褚侯乾坤既分彖象攸配變則成女終於歸妹惟長公主乎公主諱少免字花粧我興家邦天錫宗社昌運及五聖真享鴻名聖期至六神武膺駿命道闕六字焉絪縕構極倬彼雲漢的瀝乘春華如桃李順顏承志約禮知節得繭館從蠶之儀採公宮習史之藝載瞻湯沐爰賦井田其創也與多於仙源其徙也稱長於涼國故丞相虞公太原溫彥博曾孫曦台揆門閥風流儒雅僉諧是圖歷選伊尚君子至止碩人其頎協時之吉備典之實雜珮明璫褧衣錦裳熒熒煌煌有秀有芳居迴暎以虹倚動㣥超而翠翔媛成肅雍侯守祿位貴則能降降而不驕勞而在勤勤則不匱未嘗有也皇嘉之而謂曰台和以樂變乎風揮五絃之盡美觀萬物之從令欲同聽乃親故特傳於汝公主清揚神潔妙指心閑猶白雪之詞冥通則應類青谿之曲多領悟皆賞初榮賜以得後誡盈而散恩過魯元王豈上邑寵逾竇太常豈臨山每絕館陶之祈自無昭平之贖粹溫而敏靜好而詳以北渚之愁若何西方之聖如是大修圓果深入至空竟而瑤草淪霜桂枝辭月開元十二載八月辛巳遇疾薨於京邸永嘉里第享年三十八嗚呼哀哉上徹懸久悼臨次增涕京尹護喪㣥司蕆事其年仲冬壬午陪葬於橋陵生資敬愛歿效充奉蕭史樓中鳳音何望軒轅臺下龍得仍攀子西華等扶杖而立茹荼以泣潺湲赴賓憫默觀者羽葆容裔翰林酸嘶又昭乎遺風誰著縑垂厥後代諒憑刊刻豐碑詔立睿札親紆捧戴則奔馳四靈光華則迴薄七耀明山可轉況連於銳元圃惟積重錯於琅玕俾銅縷之湮沈由寶書而飛動禮臣不佞敢作銘曰天其有章銀漢玉潢我則有祥霄明燭光柔祗不忒芳問允塞何彼穠矣其儀是則鳳凰于飛公子同歸琴瑟在御德音莫違何泬寥之素秋兮獨杳杳之元夜何闇忽之誰忍兮痛明靈之不借清霜皛月楚挽將發流吹結雲秦聲不聞惟聖皇兮固金石噫長主兮森松柏榮以悼之兮長不斁御史大夫維弻之副尚書丞相粵官之長若庭堅是勅山甫為式凝績之懋追榮未極可也聖皇執象增天報功元老協斯捧日疇貴將詔頌其美稱用命伯嬰與之佐佑存趙立孤可也廣平之傑出者公名則字行謀世以字行始終不易源彼二烈泉乎百代門閭當華嶽之峯碑闕倚桃林之塞遷自吾祖定成我居作鄭人矣曾祖諱慶隋長子令祖諱德淹隋太康令考諱藥王皇秋浦令子男樹聲大崇於官閥令長傳業夙振於台揆況一變從道三稱靡風乎公神靈特應金火殊發含照灼而更幽蓄堅剛而轉銳常謂處山者猛不採藜藿成蹊者芳不言桃李靜安獨行汎覽㣥書以管晏之謀迪訓貽典用申韓之法徵奇撮要高深廣大盡在是矣志大好學首中甲科初補潞城尉轉趙之平換虞鄉主簿任非待賢居是適用嬰酷而罷居喪幾滅率由於至性每不勝哀禮闋入為鄠尉時吳郡顧琮秉銓調餗致公密啟授萬年尉尋遷左肅政臺監察御史裏行歷殿中左右肅政丞侍御史迴復雙拜周旋五人悉心果孚履尾奚懼豶豕既制拉二豎於威弧之張神羊既立挫三思於止戈之武固亦霜驅隼勁露落鵬摧豈避憸言俄招毀議出為幽州司馬都督薛訥以元帥綜戎仗權公為在端寮設文備甲兵繕倉廩績絕漠以奔嚴城洞啟遷定州長史未詣職入除金部郎中景龍六年鳴牝肆辛子分宰京邑先屠戚黨吏部人相狃獄市皆紛徵拜公長安令丕弊不辜大安所屬無何除將作少匠少府少監飾卄懲蓏疑愛費閉奢曾不無益而成有登加七命食千戶俾侯於廣平國轉刑部侍郎兼檢校宋王府長史司寇持平以議罪君王好直而請由是用刑不頗為善最樂也明年王正月我后時邁翠華順動蒼駕巡遊幸朔方而經周漢陟河東而觀舜禹命公為蒲州刺史本道按察偉儲峙之饒悅股肱之壯期至人於道路宴君子於雲天然後搏擊守宰澄清中理上因聽政顧侍臣曰江淮之閒風氣果銳吏諸尤者朕巳得之又遷揚州大都督府長史公刈作姦鉏撓法萬商利於舟檝三吳貞於鼓鑄皇念勤矣徵拜鴻臚卿即殿中監國開賓館威懷柔服之序王列御府備物致用之殷則九卿不如六尚書也公力主財巨細錙銖定豐省翹天地之蘇來自西極溢水衡之貫獻于北宮擢拜御史大夫朝之紀也夫端以憲職流為法家含宏則弊于僶俛竦踊則嫌於激訐狂徒失得且觀興替公之度葢不然森貌寡詞彼憚嚴而惴懼察幽藏密我易躁而安動庶物和矣㣥司晏如加戶益榮金紫宣命賚予虛佇丹青尹政嗚呼方恒位事歘謝期頤享年八十有三以開元十四載春之孟庚寅統日薨于洛陽之審政里第宸極悼焉行必馳組請不釋服曷云多矣一尚德二尚厚三尚齒四尚舊以革而問遺中使者鴻寶金闕相望自闕逮凶則撫贈左丞相衾裳布帛盡萃其家喪禮葬數邁超夷等伊我公蹈規懸解臨事默識至神為心至公陳力薄驕奢之行卑乃崇高重明哲之謀尊而壽考匪有倫有要知至知終何以符契于君臣寵靈於存沒古未之効也以貞為謚然與其年暮春壬寅十朋啟塋雙表昭歸厝于鄭之少華原禮也一子鎮之幼為尚舍直長稟義方之誨成幹裕之能以杖扶後起柴毀孤立凡厥所嗟上之不隕直清而美者則侍御史彭城劉彥回同郡宋詢並為勞人祗服盍承報國聞薦府庭朝夕棟宇遇甚恩結悲盈涕濡相與開陳詔命甄用詞藻爰備刊勒宜存妙好顧秩重黎之司日其正于禮者其不佞乎粗言銘曰程伯休父膺厥命兮我公之貞保氏姓兮我公之德宣歌詠兮至於天官翊明聖兮登以碩老資忠敬兮壽必待終名轉盛兮卜而獲兆典實令兮嗚呼太史秉直少華南映望陪我京還即于鄭天下膏腴之土莫若雍州雍州紱冕之多莫若韋氏粵自殷伯傳于漢相昌世濟美慶不乏賢高矣乎猶秦塞出華岳西連于嶓冢大矣乎猶濁河納清渭東至於溟渤言之者可備矣故周隋創歷俊乂當朝惟我二君迭為二祖逍公其首鄖也其仲處有山林之節糠粃俗塵出為廊廟之器丹青世道鄖之子太僕少卿陵州刺史武陽公諱津是生銀青光祿大夫太子詹事贈秦州都督諡曰貞諱瑎是生司農丞贈金州刺史諱暢皆素風清範百代一時公諱抗字抗金州府君第二子也八歲精易十五讀春秋深入爻彖試論臣主及貴疑便成誦具解理微義中初以明經射策補魏州參軍立於稠人端若一鶚復常調就太子典膳丞換岐州司倉雍州司戶右輔要劇上京浩穰九年致豐兩訟舉直升左臺殿中侍御史轉尚書主客吏部二員外吏部郎中侍中執憲者譙郡桓彥範廣平宋璟太選持衡者京兆韋嗣立河內司馬鍾並遠識高量領賢進善齊白共青縑者范陽盧懷慎子從愿趙國李乂吳郡陸象先隴西李朝隱武功蘇頲為四公特賞推數子之器公益文墨自持準繩不雜拜洛陽令役人好惠務約刑清刻石而傳鳴桴自止遷御史中丞兼禮部尚書法明象魏禮達邦家外守其則內修其度遷兵部尚書戎政孔殷夏司多僻作姦犯科者莫忌接利乘便者皆是公凡易四年濯然一變發其狙詐成我鷹揚別加銀青光祿大夫除太子左庶子閑以珍攝德以調護而巴蜀方隅西南斗絕戎常犯軼蠻或離叛討則勝不補亡厭造端之口綏則靜而作乂翹致理之心命公為益州大都督長史持節巡按公至革乎弊順乎美暑往寒來人不知用風雨時順物果遂宜入拜黃門侍郎東密黃扉右嚴青闥半股肱之委總修飾之裕上閒燕顧近臣言韋抗朕素知之何適不允大鴻臚今典賓客之事古稱行人之職俾令即序期以不濫抗宜兼授登叶睿圖遷御史大夫持節朔方軍大總管擇副宰御元帥廷諍已決廟謀先假挫貪人於敗類追桀虜於奔亡公之績也會涼州都督楊敬述羽林將軍郭知運失律搖憲喪師倚權公確乎不拔條奏其罪公之正也以郡縣吏坐贓發覺貶安州都督尋與之蒲雷澤之庶河濱之阜聲淪燠休頌被和樂未幾拜為大理檢校刑部尚書欽若刑柄繫於人命士師之望平寇之成安以手足所措慎以毫之失繄賴公勿喜斯得不寃而待算則摧其巧粉飾則杜其放上將登封岱山留睠洛邑延企遲居徘徊往俞因謂公曰朕思久之罔出卿者廼仗公作鎮還贈武陽伯兼吏部銓斥浮動甄貞實妍女露求當之途勢利塞容非之鏡復盧從愿暨頲受恩聯召崇朝交臂至信相欵他日攜手微疾應問豈期搖落素秋窅冥元夜開元十四年八月某日薨於洛之永義里第享年六十嗚呼人之望公以宗伯韙公陟台階佐王道始則夷路翹首終而亨衢鎩翮吁嗟全德孤我具膳而勝氣標準色莊辭定舉不忤物行不由徑獨而不黨三者無惑聞義於卜商起子立誠於鮑叔知我撫遺恤孤常所空匱以奮藻揮毫轉為速速故大課典謩必咨於公是亦施政何遽薨也旒扆深撫床之痛纓緌惜和鼎之實葢如鄭國僑虞之奇楚子文魯公儀不其偉矣詔贈太子太傅護葬及窆備物加等太常考行曰貞粵以某年某月日卜葬於京城東南少陵原禮也笳鐸晨送烟霜曉發葬者藏也儉則自完素車出祖縞衣來至吉先兆於蓍蔡哀更傷於松柏光昭之事克恭懿之道存此曷為然其不捐者三子長京兆士曹參軍曰載次昭文生曰翹幼某公侯必復美秀而文可以崇京兆之阡屬扶陽之館公之季左司郎中萬年令澤州長史曰某松柏之材也公最友于毒天倫之孔艱思我兄之不及疇云撰勒其寄雕刊以頲爰在弱齡獲知君子牙琴不賞慟哭茲晨樂弩仍懸沈羸歲晚悲悽固託撫疾何成愧不得絕妙好辭披文而相質爾銘曰國大司寇家大彭氏亡世疇貴府君鍾美衣冠禮樂盡在是矣講信修睦自求諸已爵之以官其直如矢秉之以憲其清若水遽登金華終列瑤戺威震蠻貊信夫邊鄙曰刑曰政載敞載理公輔未升官人作紀柰何遠韻忽頓高軌跡滿清畤事昭緹史微言遂絕令問不巳巖綠南望樓丹北峙或向城闉或臨松梓盛烈孤邁㣥悲四起生甫及申思皇多士必訏謨以亮采惟肸蠁幽贊者不曰才乎若蘊其才居其業奉丹霄之下濟辭白日之中辰者不曰命乎霸城王府君諱易從字某爰事英主皇皇我神武金期寶臣籍我公輔及揮綸翰秉刀尺宜其尹天下登宰衡雖克揚其休而不踐厥位何也府君之始魏安僖王弟信陵君之績秦滅魏謂之王家者遂命氏焉其後世居霸城族著京兆故得魏藩公子錫允稱宗是猶齊國大夫因昌保姓況神皐之表裏形勢俊城之相承紱冕固以倜儻卓犖為龍為光五代祖羆西魏尚書令贈太尉相州刺史扶風公紀于周史高祖明遠隋雍州大中正宏化郡守司金上士銀青光祿大夫書大旂勒大鼎猗冄成績繁衍重世曾祖壽隋州都七職主簿隋氏淪胥煬皇板蕩竟全孤竹之操不敗幽蘭之芳祖喜皇朝晉州司倉參軍同州河西縣丞父慶趙州房子冀州棗強二縣主簿文秀儒雅韜光鏟跡雄雌之歎則聞鸞鳳之栖未遠公八歲工詞賦十五讀典墳十八歷涉代史十九初遊太學二十升甲科三傾五城一日千里階選部冊天門出九流之先當萬夫之特授亳州城父尉且未光也無何棗強府君不祿毀將形骨扶杖於家者三載哀不絕聲倚廬於墓者六祀古曾子死事之終今老萊生事之極思奉檄以盡養顧裾而足恥庭闈何適有南山之隱路黌塾不倦有北海之儒門教子弟學成志立葢云十數而府君雲臥林栖傲然肥遁迫於從父之命就以賢人之辟授華州華陰縣尉復冊甲科轉京兆府美原縣尉換華原丞廉問之舉屈為之佐殊尤之薦用冠于首擢拜左臺監察御史王憲斯執國刑不紛一歲遭內艱如在先考之戚禫闋制復舊倖臣左補闕何輝圖怙勢作奸頗盈罪惡府君直言正色莫避權寵墨條奏當朝允之遷殿中侍御史無何拜尚書戶部員外郎轉祠部主爵考功三郎中邦有教謂之安國有祀謂之事則人祇之政罔弗格邦有等謂之爵國有功謂之課則賞罰之旨罔弗齊自非貞廼應物敏於成務疇能振景拔萃川渟岳立主上旒冕而思一以寰宇腹心特重其掖垣故近密委於侍臣緝諧連乎小相拜給事中轉中書舍人剸犀兕者其議可以斷割賦鷦鷯者其言可以遠大況天詞往復形於中旨人望虛佇期以上台姑試之劇備觀周美遷兵部侍郎回翔要津拂拭夷路消長容其正忠邪順其直戎昭者有畢力之師彞序者無曠負之人以東南封圻淮海殷雜雖陸攝水標填于委輸而風果氣銳懲以剽輕巨鎮何有繄公則賴乃出為揚州大都督府長史陽秋信風雨若不競不絿有倫有要化之為最理念于茲嗚呼景命不融流年孰返以年月日遘疾終于府之官舍享年六十府庭䬃戀閭巷聚哭攀舟檝以咨嗷越江關之重復名流常化雅俗追嗟嗚呼以為當代所歸禮謝於陳在豈謂逢時共許愛深於產卒夫靈龜明鏡可以決疑駟馬拱璧不如進道牽於彼則疑巳釋存乎我則道巳用府君是以寘毛髮之愆徵膏肓之疾加以博聞好古精義入神有夫子之文章得吾家之書籍或寫或繕海富山藏嘗工篆體閒以琴德不耀穎而好事者珍每成聲而知音者賞身歿之日所纂集二十卷自彈琴凡數張俾後代美其華旨其實垂芳塵之菴藹採嘉頌之洋溢其高致歟粵開元十五年龍集於卯仲春日晨卜葬於京兆咸陽洪瀆原禮也周之堇原漢之槐里丹碑已刻青檟成行子八人長曰有次曰實並行齊曾閔聲軼元季徵昔有八子之名居喪有二連之善府君之仲著作佐郎敬從者季太廟丞擇從者敬也瑚璉之器擇也金玉其相稱之真披文之實記吾人早遊學序曾比義於青襟晚哭寢門匪致能於黃絹辭所不獲強為之銘曰高惟雍兮大曰京遷王氏兮著霸城或公或侯散佩垂纓子子孫孫府君挺生其一德有必綜才無不括勝情風翔偉量河濶帝曰俾乂求賢如渴公其裒然藏器以達其二三才清憲清憲攸歎四趣明光明光孔彰並躋雙掖雙掖忠益皆掌二柄二柄方正其三爰迴藻司廼蒞揚都政既成矣公嘗邁乎輔我皇極奮于天衢柰何不臧違世而殂其四世閱人之不息兮人違世之遂即獨四塞之山川兮盡千年之封域噫古之不朽詩載是力撰懿圖芬兮清深廣直其五維開元四年太歲景辰六月乙巳朔二十日甲子大行睿宗大聖真皇帝崩於百福殿徙殯於太極殿之西階粵十月朔某日將遷座於橋陵禮也素帟褰周青壺警節儼無聲以虛衞陳有象而成列哀子開元神武皇帝諱追攀引綍眇擗司常悽庶物其涕迸迸感衆靈而影翔潤茲鴻業欽若要道爰制近臣敢揚大寶其詞曰高祖興唐垂其耿光睿宗誕慶紹我明命明命伊何重熙累盛耿光伊何翊善傳聖在昔分瑞爰初剖符宅殷令典居相宏圖宣哲觀藝祗庸服儒踐其成式納以嘉謩否歷終泰傾維更紐子從代王子事周母退象藏密沖襟釋負不為震驚自得謙受擁乃政復亨而運開固推皇弟仍陟元台鳴牝搆孽紛虹肆灾飈馳神武電掃姦回三讓天下再登宸極順夫甿心忘我帝力鞮譯修貢親賢任職樂英已敷禮緯重飾宗廟率祀郊邱肇禋養而迎夏芟以祈春靜默沿道和平返淳智周翔泳功濟陶鈞知子惟明從吾所尚陋伊祁之莫緒追齧缺而將喪帝允執乎厥中皇遂崇於太上始受圖而觀察終脫屣以清曠齋必閑館朝而別宮問安順色資孝宏風理極兼受言承至公豈綴衣而憑几忽成鼎而號弓嗚呼哀哉夢年䍐驗顧命是屬付神器其得所委靈心其何欲增摧絕以孺慕竟厭時以去俗萬邦赴而同軌六遂陳而帥屬外㣥悲於縞素中不瘞於珠玉蜃輅迎轉龍㡛戒徂寒生紫殿曉發清都笳挽遲遲而徙靡旆旌戀戀以威紆除櫟陽之御路指橋岳之幽途禮既獻而三徹神方寧而九虞遠奉遊冠近嚴歸蹕因高而渭川盡見憑下而秦京稍出積耘草以橫霜攢悲松以翳日嗚呼哀哉粵羲軒之建子姒兮令問傳其不巳猗冊之尊聖真兮鴻名冠而方始然後景雲靄華露滋揚至德殷永思此天子之孝也臣何足以知之嗚呼哀哉維景雲元年歲次庚戌十月戊寅朔二十日丁酉和恩皇后魂歸於仙靈宮之寢殿粵十一月戊申朔二日己酉招祔于定陵禮也皇帝翼翼而承洪緒親親而居寶位痛終鮮於棣華哀不從于竹淚祔自姬冊招因漢圖神既來兮雲之際神將往兮山之隅象物中嚴容車外設閒奇香兮靄如在委微燼兮空若滅當四海之遏音延六宮而告訣有司忝直清之寄奉旨宣方大之烈其詞曰乾道元亨川維永貞德由覆合功佇載成帝典攸正人倫則厚以光虞嬪思媚京婦貴冑昌演華宗慶膺書藏乃命符得而興展我之媛惟皇之出主家選容師氏練吉觴賀紫掖軿歸朱邸儉而中規榮必循禮闕二字覯止婉兮孌兮陳詩佩玉執事裁袿姜后通言衞臣知行是修密靜能服莊敬芬若蘭吐華若李穠光搖采翟歘同飛龍房樂懸而莫御國風咏而猶廣豈娥靈之有憑而化羽之無像嗚呼哀哉至業隆於祀夏尊名冠于升唐披麗人之金屋見仙鳥之瑤筐才窈窕兮時已逝事蹉跎兮夜不暘潛太虛以滅景長自依乎清光萬邦攀於晏駕七月會于同軌往寓集青之臺今招灑丹之水上仙厭俗以求故內則在陰而追美無不之兮有來長作合於神理對橋山之墜舄垂渭溪之造舟㣥動觀而雨泗柔明進而燭幽嗚呼哀哉聽鳴雞以徒奏悲服馬以空發簫鼓還兮遺朔風松楸翳兮吐微月歸杏陵其永閟絕柘館而靡尋資謂德之良史圖配和之徽音嗚呼哀哉維開元十四年歲次景寅四月己酉朔十九日丁卯太子太傅岐王薨于洛冊諡惠文太子殯于正寢之西階仲夏景申將祔於橋陵禮也曉風北清魄月西照列鐸挽以嚴鼓出軒除而滅燎皇帝戚深天倫寵異天人追遣奠於將遠慟哀懷其若新震以貞位文以光諡爰詔司存廼甄遺懿其詞曰重元之門唐系居尊五色之土岐封效古瑤圖正位兄一弟二寶萼承庇帝三王四常急難兮特詢以事竟扶翼兮能竭其志其志伊何程才則多武之以靖文之以和勇超東牟思奪東阿是曰且爾曷云其他覃訏守成忠肅鍾美克順克比為臣為子河書聚學沛易窮理毫使露濡賦令雲起出咨岳政入慎邦紀魯衛則侔武桓斯擬傳於元嗣欽若端士往錫朱旂來朝紫微家人輯穆藩后增暉甘旨不同而不膳珍華不共而不衣楚謀或隱梁籍寧違屬巡岱以封還侍升天而慶歸猗冄兮揚名於後懿鑠兮修業可久富貴兮于何不有闇忽兮曾莫之壽嗚呼哀哉宵欲分漏革傳於奏天初辨時憲切乎思駿馬連甫而交使近臣駢命而挾醫望君王兮何遲遲俯櫺檻兮猶若期至不至兮歘長辭悲莫悲兮唯此悲外皆罷惙兮內獨漣洏豈吾季之在哉崇后儲以諡之孝依橋岳仁本京師莊洎文兮疇能忍茲靈輴稍發清道徐按整承華之鹵簿昭德陽之宮觀樹陰陰於國門橋耿耿於天漢盈舊戀以迴復蓄新哀以聚散煢然嗣王若不勝喪慘天地之何心怨關山之巳長夫儉為之德謙固其則存沒是膺惠文是徵存也高臺深池之不競歿也備物重器之不矜嗚呼哀哉典冊之有憑惠文之有稱故奉先皇之松柏成太子之園陵嗚呼哀哉維景雲元年歲次庚戌十月戊寅朔十三日庚寅攝太尉銀青光祿大夫守戶部尚書上柱國宣城郡開國公臣姚珽等上議曰臣聞聖人極天下之賾以象其物宜成天下之文以察其時變加於百姓之謂德刑於四方之謂風德也者動於神明風也者由於教化原始見則名合道先知終存義迹因行表其來尚矣伏惟大行應天神龍皇帝纘武之命允文之基肇承於宥密以至乎緝熙若乃含青雲之符耀赤光之瑞履順而一夷險安貞而再潛躍由是恭于三朝服茲四罪徯予之始祀夏而無改舊物若帝之初遷周而有膺新命虔匹夫蒸蒸之思愛於文武豫大帝庚庚之占友於王季既而三年諒陰九族敦敘免喪問道穆乎天子之容退朝藏密怡若家人之禮功收其成不以微刑濟其寬不以大讜詞所不忤讒說所不入約躬而厚物盡下以推人翺翔乎儒雅之林經啟於文章之囿不傷麛卵不夭卉木體仁也行於蠻貊暨於陪臺施惠也酌中衢之樽不竭也陳太廟之器不盈也故能百寶用四靈臻嘉禾神芝日獻于府柔遠格懷荒至名駒鉅象歲填於牧方採原陵之露華感而通夢遂揚昊壇之煙燎嚴以配尊然後心游絕冥神寄愷樂在雲臺之上希夷於真諦之門追汾水之陽縹緲乎列仙之館豈圖變生氛沴凶遘霄極歘憑玉以大漸顧遺弓而上遷所以函夏攀援人神哀戚龍攢既啟鳥耘逾慕禮徹三獻北有因山之名法崇二言南有至郊之議謹按諡法慈惠愛親博施備物皆曰孝安人緝衆推賢讓能皆曰和夫孝以愛親和以安人是則憲先王之典謨垂後裔之光烈者葢天之所稱矣請上尊諡曰孝和皇帝廟曰中宗謹議
