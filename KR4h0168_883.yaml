front:
  text: 全唐文欽定全唐文卷八百八十三徐鉉六
  hash: sha256:4b3623d36b3b5bba4b6397bf994b7347c737d386331b790691b29d4ef34a6cdb
body:
  text: 人生而靜性之適也若乃廟堂之貴軒冕之盛君子所以勞心濟物屈己存教功成事遂復歸於靜用能周旋於道常久而不已者也有唐再造俗厚政和人多暇豫物亦茂遂名園勝概隱轔相望至於東田之館西州之墅婁湖張侯之宅東山謝公之遊青溪賦詩之曲白楊飲酒之路風流人物高視昔賢京城坤隅爰有別館百畝之地芳華一新舊相毗陵公習靜之所也其地却據峻嶺俯瞰長江北彌臨滄之觀南接新林之戍足以窮幽極覽忘形放懷於是建高望之亭肆遊目之觀睨飛鳥於雲外認歸帆於天末四山隱現而屏列重城邐迆而霞舒紛徒步而右回闢精廬於中嶺倚層崖而築室就積石以為階土事不文木工不斫虛牖夕映密戶冬燠素屏塵尾棐几藜牀談元之侶此焉遊息設射堂於其左湛方塘於其下虛楹顯敞清風爽氣襲其間崎岸縈回紅藥翠莕藻其涘至於芳草嘉禾修竹茂林紛敷翳蔚不可殫記凡廄庫之室廚廪之區賓燕所資不戒而具每良辰美景欣然命駕㣥從子弟結駟相追角巾藜杖優遊笑詠觀之者不知其為公相也古人有言朝廷之士入而不能出况於輕鐘鼎之貴徇山林之心將相之權不能纍其真肺腑之親不能係其遁道風素範豈不美歟又以鉉無事事之情有善善之志見徵拙筆用勒貞珉是時嵗次辛酉冬十月十日記開元中尊崇至道伸嚴祀典詔置九天使者廟於匡廬之山真靈咸秩率由科教應門左右圖五百靈官之像焉天祐初江西連帥南平王鍾公遣道士沈太虛設醮於廟太虛醮罷恍然若夢見圖像一人前揖太虛曰我張懷武也常為軍將有微功及物帝命為靈官既寤訪懷武之名無能知者歸以語進士沈彬彬後二十年遊醴陵邑令陸生客之方食有軍吏許某後至話及張懷武彬因問之許曰懷武者蔡之裨將某之長吏也頃甲辰嵗大飢聞豫章獨稔即與一他將各率其屬奔焉既即路兩軍稍不相見進至武昌釁隙大搆剋日將決戰禁之不可懷武乃攜劍上戍樓去梯謂其徒曰吾與汝今日之行非有他圖直救性命耳奈何不忍小忿而相攻戰哉夫戰必強者傷而弱者亡如是何為去父母之國而死於道路耶凡兩軍所以致戰者以有懷武故也今我為汝等死兩軍為一無搆難矣遂自剄於是士衆皆慟哭乃與和親比及豫章無逃亡者許某但懷其舊恩不知靈官之事沈君好道者也常以此語人鉉始在膠庠預聞斯論辛酉嵗扈從南幸獲謁祠宮道士童處明出沈君所述傳求潤色之以刊貞石嗚呼古之君子體至公綜萬殊虛心存誠事至而應道苟行矣何必在已物既濟焉何必享利故有歸全以為孝殺身以成仁此兩者同出而異名同謂之元非清貞之氣不能衛其義非靈仙之位不足寧其神昭報動乎上肸蠁應乎下然則天之愛民甚矣咨爾百代高山仰之於是嵗次癸酉上元日記筠州祈仙觀者東晉黃真君上升之地因為道館綿歷代祀互有增修國朝保大中元宗皇帝奉為吳讓皇再加營構金石具刻此不備書夫言意假象故立朝修之所形器有壞故資繕完之工此觀當荊楚之要津實郵傳之便道過賓稅駕遊子解裝憧憧往來罕或虛月加葺之後二紀有餘閈閎垣墉頽落且半道士羅自正總攝真侶啓煥元風以為道由人宏德以勤維不飾不美人其謂何於是心謀躬行節用畜力授其徒之可任者會其士之好道者月省嵗計經之營之即舊謀新興廢補闕十有餘嵗其績大成凡建聖祖殿黃真君殿各一區峙瑤壇範洪鐘造橫橋於通津植茂樹而蔽野其修舊振壞者層樓重廊二十餘間其取材也時其擇匠也良程之以壯督之以固瓴甋瑌磩尚其密藻繪丹雘尚其麗帑廪不費工庸不勞煥然新宮峙此靈境君子是以知其能也夫神仙之事史臣不論豈不以度越常均非擬議所及故邪仲尼書日食星隕皆略其微而著其顯慮學者之致惑也又况於希夷恍惚之際乎然而載籍之間微旨可得書云三后在天詩云萬壽無疆斯皆輕舉長生之明效也及周漢而降則事迹彰灼耳目不誣天人交感民信之矣於是通儒洪筆始著於篇至如許君黃君通幽洞冥窮神極妙逮爾姻族與夫家人乘景上隮超然絶俗故墟舊井真氣裴回至其鄉而思其人仰其道而踐其迹斯觀之盛豈徒然哉鉉頃嵗扈從南巡有事於遊帷之觀二宮相距兩舍而遙使指有程瞻望弗及逮今一紀無日忘之會羅君狀其功績圖其形勝見託紀述欣然而書開寶七年九月二十四日記謹按開寶七年為南唐後主十四年元氣既判天地乃位氣之清明靈粹者鍾乎洞天福地名山大川之間真聖之所戾也景福之所興也然則遊居走望乃建道館焉通都大邑往往而在豫章之地實曰奧區帶豫章之通川據西山之雄鎮鬱映磅礡神異所棲高真十二震曜方夏揚靈軌轍靡迆蟬聯保大庚戌嵗詔復高安縣為筠州析其北鄙為清江縣而三清觀負新邑之左瞰長江之濱形勝高奇壇宇嚴淨聞諸故老云昔吳許二君嘗遊茲地夜覩青氣上屬於天相與嘆曰此非凡地當為神仙之宅及二君登晨之後邑人追感前言共構茅茨嵗時薦獻衆目為草堂道院函關紫氣事往名存盩厔草樓人非郭是年世彌遠增修益崇開成中始詔賜號三清之觀自時厥後又踰十紀運逢治亂道有汚隆中興已還百度咸復官得其守人盡其能道士吳宗元允迪元風克堪道任以為朝禮之域飇歘所臨不飾不美衆將安仰於是月考嵗計庀工飭材補廢扶傾無所不至建三清之殿造虛皇之臺設待賓之區敞卞賢之室範華鐘之鏗訇聳層樓之岧亭回廊復道重深奧祕於是飾儀衛備器用肅然必洽煥焉可觀夫其誠至者其禮備其守固者其事舉道不遠矣人焉廋哉宗元又以雲境昭回祥符肸蠁思刻貞石以貽後人不遠千里見訪論撰嘉尚其意故為直書時甲戌開寶七年十二月十二日記南唐後主十四年同安郡南二十里古城南隅有松焉拳曲擁腫勢若九謺交柯聳幹無不蟠屈者其地高迥旁無壅閼莫知其何由如是或曰下有頑石根不得舒氣脈僨興故為此狀好事者以為盛觀焉余始聞其名今至其下睹之而眙曰嗟夫草木麗地稟天之和條暢秀茂固常也若乃原隰之宜失陰陽之候違柔脆之姿則離披枯瘁貞徑之質則抑鬱盤錯生理乖矣獨有王褱奇之貌嗚呼失其所乎昔在太古君臣強名賢愚同域洪洪洞洞是謂太和降及後代聖人有作顯仁義建功名扶衰拯敝不得已也於是有愛惡則象生焉其甚者飾行以矯時執方以違俗考槃閭巷聲重王公上德喪矣獨有高世之譽嗚呼荀孟屈賈之徒豈斯松之類邪感物徘徊因為之贊吁嗟彼松孰為而生天枉其性屈折其形人實我貴我非所營噫嘻淳風曷歸大道安行吾欲與汝各全其真作此好歌以告騷人穆穆清真不緇不磷文高學富道直誠純昭質已邈斯猷愈新丹青畫像以永光塵棠陰峴首瞻仰霑巾建康城北有雞籠山焉傍帶潮溝却臨後湖宋元嘉中改為龍山湖曰元武紀瑞也雷次宗之儒學蕭子良之西邸遺蹤可識爽氣長留東麓有泉至清而甘水旱不增減道人令隱乃搆精廬於其陽酷愛此泉以為靈液因思前作皆有銘贊而此獨闕常欲補之無何夕次松下恍惚若夢見一人元巾素衣謂隱曰此泉已有銘矣因徵其文即高吟四句吟罷不復見觀其詞意無以加也豫聞而異之因篆於石其詞曰原發石中派分塵外如醴之味與時而在臣聞昊穹凝命元化不宰司契牧民之重授以聖功益謙輔德之明顯諸神道玉燭景風之瑞所以報憂勤天時地物之妖所以警安逸是以古之聖人覩災而懼因敗而成撥亂反正之勳偃武修文之業延洪光大皆有幽贊者焉故禹奠九州受蒼水繡衣之命武師牧野接五車兩騎之神或假靈於五將三門或取象於長庚北落奇怪恍惚歷代有之然則潔粢豐盛崇名紀號欽若天意丕顯陰功元元本本政之大者也茲我后所以側身修德允濟時艱武烈帝所以禦災捍患光膺帝服人神合應豈不偉哉惟帝才冠生民道高振古登賢能於鄉老論昭穆於本朝若夫忠孝文武之風信智言行之懿提綱按部之績夷凶靜亂之勤論道經邦之猷宮縣錫馬之寵忘身徇國之節警愚顯俗之奇固已炳爥丹青鏗鏘金石用能高標明祀大庇蒸民犧牲玉帛數有加於㣥望備物典册禮遂縟於真王是知妙極無方數均不測告禎符以元后集景命於舊邦豈徒雪霜風雨禳祈雩禜而已我唐之中興也南司天北司地命羲和而治歷法鳲鳩以安民令行而風雨不愆澤廣而禽魚允若無文咸秩墜典由是孔修有開必先百神於焉受職及運鍾下武慶洽重熙二聖相承載光明德五材並用誕告多功御名正而泰階平王澤流而頌聲作人將登於壽域時已洽於淳風數或推移唐堯有懷襄之患天將警戒周成有雷雨之災丙辰嵗金革爰興師徒四出師屯細柳火照甘泉蠢茲越人伺隙稱亂焚我郊保軼我封陲宵災御亭晨圍武進天子為之旰食東郊於是弗開於時令儲后以長子帥師以九命作伯風行京口氣懾勾吳激大義以推心授成謀而警衆右武衛將軍柴克宏見危致命臨難忘生總率禁兵星言赴援人懷國恥如報私仇軍政肅而上下接和人心感而神祗助順若昆陽雷電之震耀淮淝草木之形勝兵勢飇馳醜徒冰泮冥貺彰灼有如此焉當是時也以承平之人鄰貢獻之國爟燧卒至溝隍未嚴首尾方畏衆寡非敵摧堅如拉朽擒寇如拾遺崇朝之間邊鄙克定匪大君之昭感豈人力之獨能雖通幽洞靈實聖哲之所務而問神語怪非典册之攸先故揚榷而論蓋史臣之職也主上以功成弗處無德不報增封晉號厥有舊章乃下詔册贈武烈帝備名數禮也於是正南面之尊窮大壯之勢耽耽新廟奕奕崇堂雉門兩觀之嚴左墄右平之制龍旗鑾輅雲罕軒懸兼三代之盛儀抗五郊之殊禮與夫周人革命止陳元牡之祈晉室主盟但用朱絲之禱報功之典不亦盛乎常州刺史何重貴初領前軍獨當強寇以忠貞為甲胄以恩信為金湯首挫賊鋒力全郡壘褰帷之任因以酬庸坐樹之風更成德讓皆足以光昭雅頌垂示來雲後之君子知天命不可以智取大福不可以力勝幸災怙亂鬼得而誅背盟姦好人將誰與覆車斯在殷鑑匪遙類委土以為師樹豐碑而紀事下臣奉詔謹泐銘云元功不宰帝德無為化機冥運㣥動交馳必有神道鑑而董之董之伊何惟帝之職恍惚有象陰陽不測如嶽降祥配天輔德保我蒸民莫匪爾極偉哉間傑多藝多材名馳八紘位重三槐祀典光啓王封肇開人思召樹俗畏軒臺洪惟我后積仁纍慶運啓再造功宣二聖金鏡在握璿璣以正陰陽既和人神交應時災有數孰克違斯靈命自天疇能間之盜兵竊發元貺冥期風雲鼓蕩氛厲殲夷蔣侯助順霍山啓道卑聽非遠誠明則到上曰欽哉享茲昭告帝服加尊大名紀號多壘既平連營既寧奕奕新廟崇崇百城民罔疵癘年斯順成庭有備物時殷頌聲禍福何常惟人所擇棄信毀義恃衆與力上帝不蠲明神是殛勒石嚴祠敢告萬國下臣伏讀前史窮探政經莫不以兵戰為危事目干戈為凶器異達人之格論蓋曲士之常談若乃上考洪荒遐觀擬象九疇垂範何嘗棄從革之功五緯麗天詎可淪長庚之耀春生夏長非秋無以收成雷動風行非霜不能肅殺先王設教誰敢渝之垂衣裳以正其本為弧矢以申其用阪泉戡難所以見軒后之神明丹浦庇人所以成帝堯之光宅七旬來格本由舞羽之仁八百同辭始自葬枯之惠故修文廟堂之上者武功之始折衝千里之外者文德之形如仁而忘兵則西夏偃王以之而殞恃力而棄義則夫差嬴政由是而亡乃知文德不修則武功不立武功不試則文德不昭相須而成其揆一也故立其教者謂之聖大其業者謂之賢聖則應天順人西伯受代殷之任賢則開物成務太師有佐命之功當其偃息朝歌盤桓渭水量恢宇宙既處困而能通才冠生民亦俟時而後動雲雷之屯已搆天人之契冥符歷數有歸君臣相遇投釣而起同車以還尊為王者之師我無慙德加之百官之上人絶異言大矣哉聖哲膺期無德而稱己故能式遏亂略大拯橫流把白旄而誓師操黃鉞而助斷解倒懸之困釋比屋之誅大統既集天保已定然後式廬表墓歸馬放牛申義風於夷齊授成事於旦奭宏開四履高祀五侯及其德澤將衰風流已遠猶使紀侯大去不遺九世之讐周室既卑更賴一匡之業自非道充四表功濟三才孰能丕顯烈光若斯之盛者也其後聖人既沒真風漸離戰國如焚㣥生殄瘁先王利器舉為爭奪之資闕里諸生率用縱橫之説遂使中都憤歎聿興未學之詞柱史傷嗟始發不祥之論流遁忘返積習生常則我武濩之音將墜於地夫至公所以應㣥動上德所以綜萬殊達其旨則左右咸宜迷其本則弛張兩失自漢參霸道魏濟姦雄藐爾千年荒哉七德國家參墟發命扈水膺圖㣥黎興徯后之辭八表有宅心之地高祖奉天革政扇牧野之高風太宗屈已師臣躡渭濱之盛軌施其法則致其報入其國則思其人貞觀年中始於磻溪立廟元宗祇若先訓奮發神謀平內難於女戎嗣鴻圖於代邸永言遺範重事嚴禋開元中詔京師及天下州府並立太公廟著良辰於上戊抗縟禮於虞庠而復歷選前修式崇配享得其體者參入室升堂之列蹈其迹者儼摳衣函丈之容穆矣皇風煥乎甲令肅宗來朝走馬初嚴避敵之師九五飛龍遂荷在天之命澆戈既戮商奄猶驕方資戡定之勤更舉裦崇之詔禮尊南面位極真王取其大告之稱以定易名之典歷代之闕文備矣聖皇之能事蒸哉故得靈鑒孔昭㣥臣競勸諸侯供職函夏同文中興之功配天齊古雖復運逢興替時有安危造周之德既隆思漢之人常在烈祖沈潛剛克神武有徵靜氛癘於蕭墻功高庖正掃欃槍於丹徼業茂賓門由是四海樂推三靈眷命光復舊物洪惟至公大道將行皇猷纍洽今上允文允武克長克君自出震見離發號施令雷行天下豐宜日中信及豚魚仁霑行葦若夫尚齒尊賢之教宵衣旰食之勤制禮作樂之文返朴斫雕之質固已紛綸帝籙掩映瑤編猶復叶比臧謀疇咨庶政以為五材並用廢一不可天下雖平忘戰必危是故簡萬乘之人申九伐之令六官聯事百度惟貞副君以介弟之尊當撫軍之任威而不猛動必以仁大元帥齊王明德茂親由諸王而宿衛副元帥燕王敦詩説禮以長子而帥師用能啓迪大中張皇下武其餘西京名將霧集星羅北府奇兵飇馳電騖並列雲臺之像咸開長水之營地利人和思深慮遠域中無事則用之於進賢興功四方有變則用之於弔民伐罪故出車甌洛則係以長纓鞠旅衡湘則舉為內地皆所以拯其塗炭之患息其沈閼之爭非徒夸大兵威并兼土宇而已至於篁竹萑蒲之聚田昭屈景之宗或粗舉先聲或聊分偏校莫不厥角稽顙請命即刑史不絶書野無遺寇斯乃聲明文物之外廟堂帷幄之間思未半而功已倍矣加以為而不宰讓德於天潔粢豐盛靡違於時事春蘭秋菊遠被於無文乃顧戎韜式嚴邦政以為三王四代之事罔不從師前哲令德之人必將崇祀列聖盛典實啓孫謀乃復舊章爰作新廟於是宗伯建位梓人授規入端門而右回旁太學以西顧瞰康莊而列屏因爽塏而營基他山之石咸移中伐之材畢萃成之不日自比靈臺揆彼方中寧慙楚室崇堂屹以特起高門豁其洞開筵有籩豆之區階有賓主之位干戈在序鐘鼓在庭繟然觀藝之場藹爾致誠之地春秋二仲時和氣清醴盞交羞牲牷不疾鶡冠礧劍展告虔薦信之儀玉戚朱干儼象德達神之列中軍元帥出建靈旗六郡良家來登勇爵斾旌鐃吹桓桓推轂之威金石絲篁穆穆燕毛之序觀之者亂臣知懼比夫漢尊黃老詎臻清淨之源秦用刑名徒有深刻之弊中庸之德其在茲乎嗟夫聖人沒而微言絶王澤竭而頌聲息奚斯路寢諸侯之事何觀吉甫清風衰世之音孰尚豈若帝圖光赫聖祚宏新人知鼓篋之方家識止戈之漸固可著之金石列在鼎彞微臣學愧常師用慚兼備承明再入固無經國之才宣室徵還幸對受釐之問將使延州聽樂長聞雅正之聲上受書世出帝王之佐敢揚丕訓敬勒貞珉其銘曰於惟基命建用皇極實有武備以昭文德弗惠弗迪是糾是殛天地剛柔惟帝之則是則是效文王武王惟師尚父時維鷹揚匡正天下綏爰四方微禹之烈於湯有光肅肅牽牲皇皇表海簡禮從質因民不改難老曰壽專征為大泱泱之風至今猶在大道既隱明王不遭走鹿爭逐赬魚告勞泯若四履紛吾六韜我思古人心焉忉忉天或愛民物無終否率此叛國歸於聖帝自葛初征至牧乃誓君子萬年本支百世鴻圖再造二聖重光亦既大賚寧惟小康六事允釐四維孔張夢寐卜獵咨嗟釣璜虎踞之陽龍藏之涘爰作新廟畢崇明祀設枑交戟朱門納陛嵬嶵穹崇重深奧祕名光大告禮重真王侑神祀食入室升堂威儀文物容貌采章列聖有作茲焉不忘膠庠既成教義既明三湘即序百越來庭馬無南牧人怨東征烈烈政典洋洋頌聲商郊車騎灌壇風雨績用不泯威神若睹鏤金石以表德薦馨香而受祜春蘭兮秋菊無絶兮終古若夫聖人有作沒而不朽畏其神而向其臺思其治而愛其樹故尊道貴德元化所以無窮高山景行後賢所以不乏妙門光啓上士勤行書契已還煥乎丹青者可數邦域之內表厥宅里者相望時運與并人境交得教之大者其可忽乎袁州宜春縣紫微觀者蓋有晉鄧袁真人上升之地也左鍾山之奇峰右洪陽之仙洞巉巗千仞蔽虧日月窈窕百里畜泄風雨回岡層巒崇其基坰激湍澄溪宣其氣象真靈之所遊集邑居之所走望皇統中否下國尋戈齊臺盡傾魯宅多壞鹿巾霞帔藐矣流離藻扃黼帳翦焉廢而周德未厭漢守仍存舊物既甄墜典咸復惟茲靈境將俟其人道士孫去華殖本康樂之川從師新吳之邑清心鍊氣絶粒忘形三十餘年其道彌固保大中自所居華林山館南遊此鄉望佳氣之鬱蔥躡垝垣之靡迆慨然歎息誓志終完於是面壑依巖披榛築室勤身而感物應迹以化人鄉閭風隨跪信日至節以致用時而命工二十餘年厥功克就紺殿特立重廊回合闢朱戶以瞰野峙瑤壇而在庭至於像設之尊嚴仗衛之精麗廚之充牣居室之清間洪纖必周奢儉中度美矣顯績昭哉素誠夫裦善稱伐春秋之旨雖在遐遠人其捨諸監察御史李君思義奉使宜春稅駕斯館覩厥成績嘉其秉心碑而揭之以文求我言意難盡強為之銘銘曰袁君之賢此州乃名鄧氏之仙此觀乃形春華麗絶真氣融明允矣奧壤居然福庭運逢交喪地有遺靈美哉孫師興廢扶傾重閣金鑰還飛火鈴煙霞聚散飇歘逢迎精誠所感大道方行用刊樂石永告雲扃鉉嘗讀文中子所著書竊觀其建言設教憲章周孔有道無位故德澤不被於生民然而門人弟子如房魏李杜輩皆遭遇真主佐佑大化元功盛烈亦云至矣猶以為禮樂不興未能行文中子之道嗟乎使顏閔之徒遇貞觀之世舉聖人之業成天下之務豈不益大乎時運不並亨聖賢不世出可為長嘆息已矣夫太羹元酒足以通神明而不能競適口之味大咸雲門足以和風俗而不能高娛耳之聲五常六藝足以興國家而不能勝捷給之數釋菜合樂足以祈永貞而不能掩福田之説李斯荀卿弟子也而為焚書之酷德彞文皇上宰也而沮王道之議况其餘哉故用兵已來郊庠鄉孰委而不修者有年矣皇唐中興之一紀天子乃崇學校養庶老舉六德教胄子旁達郡國靡然向風舒州古諸侯之封也其地廣其任重太傅周公舊勳碩望來頒詔條武以貞師仁以行政動必資於前訓舉必順於人心前吏部郎鍾君頃登銓管之司實參侍從之列論思典治必以名教為先洎從左官來為佐職神交主諾人無間然始一年而旱暵作二年而百穀登三年而上下和既富而教爰修廢典乃嚴社稷則播殖之功報乃祀箕畢則風雨之候時乃即黌堂謁先聖寢廟卑而將圯衮冕陋而不度政之大者烏得已焉於是庀工庸示儀制堂奧戶牖巍乎大壯山龍藻火煥乎有章重門以深之周垣以繚之俎豆升乎筵干戚由乎序侁侁衆賢是配是侑肅肅燕毛以衎以樂閭伍之屬耆幼之倫惠澤漸乎肌膚風教移乎情性惜其所治者百城耳推是而往何所不至哉鉉也不才放逐至此蒙地主之惠接故人之歡博我以文宜無所讓屬役既具冠篇將畢會鍾君召還京師祖行之夕視草以送且曰敬教勸學非大君子不能行計功稱伐非大手筆不能任吾友紫微郎韓君即其人也託之銘頌以永清風
