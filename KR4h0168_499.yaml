front:
  text: 全唐文欽定全唐文卷四百九十九權德輿十七
  hash: sha256:e893755384ec503b81dc4f267fb178dc19668ae96914907776c2595e1340704f
body:
  text: 漢興五代孝武思理膠西相陳天人之際王道之端昌言大對統紀條貫純嘏積厚遠而寖明帝唐九葉順考古道隴西公兼將相之重承尉衛之崇啓心宣力作率慶事陟格宗工能積其烈公諱晉字混成河東虞鄉人廉忠溫厚潔矩通理秉義以立故不為利疚知動之微故每與吉會初肅宗受端命以合兵車思欲去元元於湯火致王度於金玉以文告威讓遠猷密布一作命之為重也故公解巾披荊校文視草凡三徙官被以采章代宗御天下乃清吏職以為文憲彌綸陪二事任百辟交修則理道洽故公再入御史府三為尚書郎歷祕書監長府奉常武候之亞今上建皇都以纂鴻業思代天工俾寧方內故公出入屯夷昭明有融中居大僚以至柄用貞元五年春三月拜門下侍郎同中書門下平章事居五年除禮部尚書用耆碩俊德轉遷兵部分正宏化以本官畢命為東都留守東都畿汝州都防禦使安危注意以左揆持相印充宣武軍節度汴宋亳潁等州觀察處置等使十五年二月丁丑薨於位享年七十六罷朝三日追命太傅有司易其名曰恭惠職喪法賻皆峻彞等所以視其踐履而加優之也初公以祠部郎為出疆從事北方之強驕蹇沓貪伐功怙力徵我厚幣使臣指顧公攝其詞詞達氣直虜皆震伏殫威命於專對輝光華於外區仁者之勇沛然餘力其為太府未浹日而理乃珥貂蟬實兼憲丞含章以承顧問秉直以司紀律修起故事京師肅然其為華州徵赴行在以祭酒亞相使於北河其往也薊門不出關東多壘習俗故態且相附離公則破其從約使循軌道其還也蒲坂既阻王宮未清婪婪二逆恣睢相合公則折其凶謀因以鬱沒憑軾有勞扈蹕而旋益用尊禮大其職業司徼循也五校嚴備持重而不苛處綱轄也六職遵修舉直而不紊典禮樂也百神咸秩薦信而不黷其為相也上戴元聖下熙百工柔惠小物協寧大政推明常古之制章敘理平之業粹和而不耀敬讓而不居言陳於前不可悉數拜章八上然後得請其撫封也尢為難理先是在宥推恩參授兵柄至有恃凶器以邀好爵者氣焰不還風波相沿是邦再亂人用恫恐上以為陳留天下之郊也非素重臣不可以率先賦政公既受命與一二從事記室儒服而前不待裏言不恃扞衛寬信夷易暗然風行長城大蔡蘊在靈府悍將伏罪齊人樂業四鄰諸侯折中於公居四年政成力疾纍求入覲因條陳利病請制於未然上難其繼以致沒代噫夫一邦之人得公而理失公而亂劫介夫殺大吏猶原燎川潰於不可遏嚮公之嘉猷密疏如前知焉其明智歟董氏在春秋時書法不隱在戰國時贊明命聞於諸侯自膠西而下淳耀滋大在魏有司徒昭在蜀有尚書令允扶義納忠以斡機衡其族舊矣公曾祖仁琬皇州博士祖大禮贈右散騎常侍考伯良開州新浦主簿贈尚書左僕射三代有令德而無貴仕蕃祉所鍾發為追崇宜哉有子四人祕書省著作郎全道祕書郎溪大理評事全素太常寺太祝澥等其承學也專其就列也敬斬然而孤纍然以哀日於先遠象數協吉以某年十月丁酉奉理命家法薄葬公於河南縣萬安山之原以前夫人南陽張氏繼夫人京兆韋氏祔焉從周禮也惟公自筮仕至捐館四十五年無伐善無違德歷官三十六皆以理效聞自建中以還居中分閫再調鼎實一人而已范文子所謂厚德者能享多福惟公有之全道等猶懼懿鑠之不永於後與陵谷之有遷也以德輿奉行公之命書者三宜金石刻故迹其誄諡而為之銘其詞曰后王財成雋乂昭明以建皇極甫申居內方邵理外周邦是式於惟隴西求福不回文武宣力調和公餗整訓長轂柔惠且直膠西章章道可佐王屈相下國綿代儲慶至公而盛位實配德孑孑干旟昔往浚都俗既紓息翻翻素旗今旋洛師人用悽惻惟是壤樹資於四布萬安之側德輝在茲永代有詞於以篆刻有唐文學政事之君子曰相國齊成公諱抗字遐舉清方粹溫潔矩秉懿明誠盡性切磨化育之道精義入神旁魄天人之際以忠事君以病乞身乃去台宰乃儕商皓然後徹琴瑟啓手足歿齒無違德以從先大夫於九原易名曰成不亦宜乎公定州義豐人自太公表東海桓公匡天下為國為家或哲或仁烈祖贈太師府君諱浣歷給事中中書舍人吏部侍郎止於平陽太守出入陟降中行山立至今言開元名臣者稱公有遺直遺愛焉實生先公贈國子祭酒府君諱翧履道貞厲仕至左龍武軍倉曹積厚於上流光於下其位不充故大受於成公公既齓而孤哀過成人屬幽陵橫潰中夏如燬奉太夫人安輿違難於越得子州支伯之故地而偕隱焉誅草茅以順居息悅山水以資仁智方茂天爵用觀靈龜嘉招重問奔走以狎至虛已宏道從容而翔集吳郡張相君鎰方以仁義理濠上得君為榮及進律於洪成師於岐纍為命介若驂有靳建中中戎王謀大和會以休寧西方右扶風綿亘汧隴地當甌脫且有成命正其經界公實佐中權登壇涖盟得其情數與之約結克就衣裳之會用銷邊鄙之警自解巾三遷至殿中侍御史俄屬涇旅竊發㣥凶挻災天兵展義於甸內王公死難於理所百舍奔問至於行宮拜侍御史有詔以蕭黃門復布愷澤於東夏命公為工部員外郎以贊焉復命轉倉部郎中李懷光阻命於蒲連兵未解關中飢旱經費不足轉粟饋軍濟時之艱患求才急病命使以轉達遷兵部郎中兼御史中丞以董其任俄拜諫議大夫當軸者不相容坐婚親細故出為處州刺史先是山越寇攘蕩覆城寺公乃卜勢勝之爽塏因習俗之便安三時不害百堵皆作朝典陟明拜蘇州刺史吳實劇部大田多稼浮徭冒役吏禁或弛占著名數戶版不均公乃閲其生齒書其比要強家大猾不得蓋藏公持單輕與之紓息已日乃孚厥猷茂焉遷潭州刺史御史中丞湖南觀察使以嚮時二郡之理而宏大之其仁可知也左曹理本徵為給事中周郊寄重擢為河南尹盜有宋瞿曇者白晝椎剽為郡偷囊橐三川病之幾三十年公法令嚴具網絡張設名捕魁宿使無遺類指顧之間擒擲如神乃作祕書章明文雅修舊以起廢乃作太常統和神人節事以辨志便蕃大僚其道乃光德宗皇帝方以堯舜氏聰明之道馭天下用賢人充相位拜中書侍郎同中書門下平章事熙九功之歌質百官之成損益文獻化裁形器精微以折衷密靜而不伐或事隱於造膝或言行於沃心初天官氏每歲表他曹郎二人閲多士試言第其甲乙春官氏俾考功郎選孝秀之親故者而進退之公以冢宰少宗伯為官人取士之本蓋天子有司之重寄至於避小嫌亂舊章適滋旁歧孰謂扃鐍蹇蹇坦坦之道豈如是耶然後闢康莊作衡尺遵公是之路去自便之私天下之人謂之理道尋有詔修國史昔孔父無位以空文為一王法公當盛聖之代用宰司總直筆其於裦貶勸懼明焉勤慮盡瘁積成寢恙纍章乞告改太子賓客遭罹不淑贈戶部尚書時貞元甲申歲夏四月春秋六十有五夫人河南獨孤氏某官某之女賢明蚤夭繼夫人蘭陵蕭氏某官某之女仁順有禮法嗣子餗銜恤毀瘠侍公裳帷以某月日祔於東都某原喪祭哀敬君子以為有後惟公深而通肅而寬出處動靜必以中正敬用五事暢於四支資性儼恪尢長鑒裁在岐也薦齊忠公映佐蕭也薦盧恭公邁皆至丞相其他推轂下士為朝廷臣成天下重名碩望者不可勝書凡所論著皆研幾析理宏雅夷遠洪州文宣王廟碑張蕭盧三相國碑志本聖人教化之迹推大政謨明之道固其性術講貫而發舒乎斯文文集二十卷中倫體要盡在是矣公薨五年餗調為洛陽尉永惟先烈未刻豐碑以德輿夙承湖海之舊中忝掖垣之屬他日舉代靡形話言獲於遺編實見陰德顧茲無似有玷知人濡涕含毫以表幽宅銘曰昔在營邱大風泱泱有倬平陽令聲章章不踐宰政貽慶子姓倉曹含光太學追命厥生中書秉哲居正鵬起扶搖鸞翔慶霄乃登紫微以瑞清朝吉凶糾纆寒暑結轖其生有涯其用無極壽堂冥漠冢樹森植楬茲馨香終古是式天球白珩産於崇山扣之而清越格人莊士生於積德用之而宏大其或含光而耀藏器不發乃熾而昌是滋百祥蘊而為義方飾而為徽章故太原王公四筮仕而領通邑五追崇而登端右循政茂於官下湛恩集於身後有繇然也公諱光謙字某自東漢雁門太守澤五代至晉中書令獻之坦之葳蕤德名與吉祥侔盛自後魏龍驤將軍長社穆侯慧龍五代至隋祕書少監卲以勳華文學復大其門祕書生隋揚州戶曹參軍來戶曹生皇青州司戶參軍子奇司戶生美原丞贈太常卿慶賢三代沈晦邁其風訓公即太常府君之長子也幼而岐嶷長而淳懿潔矩慎獨抱仁戴義閎深博辨之學稽古禮文之事炳然含章靡不通貫至若文舒之清修廉實處沖之剖析元微安期之宏恕懷祖之沈靜合是家法而躬行之始以門蔭受署凡四徙官曰幽州三水潞州潞城二主簿絳州萬泉縣丞楚州淮陰縣令所至之邦二千石必加禮慰薦而公牢讓勇退卑不可踰及為縣令也務清靜之理而去其煩苦推明誠之本而教以廉隅一同熙熙生殖阜滋楚風丕變幾至齊魯因喟然曰彼天爵美祿者在仁義與樽酒而已太邱彭澤豈多秩耶於是放懷於外嗇神於內沈研象繫之表盤礡天人之際其致知格物不可詳也以開元二十九年春正月捐館舍於淮陰年六十九其明年返葬於河南府偃師縣北山之陽夫人博陵崔氏贈博陵太夫人繼夫人隴西李氏後夫人同郡武氏贈彭城郡太夫人飾終三加子貴故也公之才子五人長曰翊以博雅典憲亮直方貞歷御史中丞左散騎常侍刑部吏部二侍郎御史大夫贈戶部尚書諡曰忠惠次曰翺吏理詳明官河南府陽翟縣尉次曰翃循良愷悌勳德茂盛歷辰朗容三州刺史容管經略使兼御史中丞河中少尹朔方節度留後汾州刺史單于副都護鎮武軍使徵拜京兆尹尋兼御史大夫再居大理寺卿為福建觀察使入為太子賓客貞元十二年檢校禮部尚書東都留守踐履藩垣逾四十年階至特進爵封本郡次曰向士行清修為秦州上邽縣尉幼曰翽文敏有幹裕歷監察御史三原縣令著作郎太子僕翺向皆不幸早夭翽亦命屈其志而忠惠公太原公總集休祉為宗工藎臣初忠惠公與肅宗代宗從容言天下事甚衆且曰文致太平在正名百職危言悃愊痛詆權幸條疏理道坦然章明沃心前席倚以為相者數矣雖位竟不致而其遺風直聲暴乎天下太原公剖符賦政纍刻金石滅夷越劇賊開地靜人倅蒲也以沈機銷急變護單于也以尺書柔獷俗中外官師俶聲流聞保釐尹正式是東夏安危注意未始有極言代德者以公之道未光而慶下鍾惟其有之是以似之之故也初以忠惠公扈鑾輅於岷峨其勤匪懈贈公隴州刺史又以持節印册命專對於北方間關忠力再贈公祕書監後以太原公南服嘉庸三贈公為工部尚書以轂下肅清四贈公為太子少保以閩方報政五贈公為尚書右僕射噫嘻賢人教忠之業令嗣揚名之孝大君追遠之澤是三者可謂至矣十七年太原公貞於龜筮得二月壬寅吉於是備八旒七章鷩冕佩玉之飾博陵彭城二郡太夫人以象服祔焉詔給鹵簿官司喪事慶靈集於一門光耀被於九原君子然後知積德豐報之不誣矣至若忠惠之子為守臣太原之壻居台司諸孫昌阜冠映圭組則列諸碑陰以備代家斫茲琬玉銘公德美其詞曰有匪君子兮德行醇備蟬聯烜赫兮峻閥宏義觀我靈龜兮懼臘毒之厚味樹風百里兮馳蒲密之極摯慈和安靖兮闔境如春仲叔容儀兮與古為倫全才不耀兮流慶後昆忠惠既沒兮太原顯尊五加追命兮賁茲元壤隼旟龍劒兮以至師長澤流根葉兮恩及漏泉壽堂拱木兮以橫蒼煙隨武可作兮臧孫有後崇岡樂石兮昭晰攸久吁嗟王公斯為不朽惟南川郡王諱昌字公明貞師於安定十六歲歲直鶉火夏五月甲子寢疾病考終命制詔襚以司空印綬而弔祠法賻稱焉於是內子諸孤宗姻家老盡誠信於內從事大吏倫侯亞旅展匍匐於外叶志會事拂龜露蓍象數皆得以條陳纖微必蒙於可報以冬十月丁酉返真宅於京師某原禮也公之先彭城人楚元王交之後夔國公宏基之族孫也大王父全慶皇汴州別駕王父達徐州長史父庭玉試太常卿贈徐州刺史三代醇靜不躋豐祿故天爵覆露發祥於公公角犀燕頷魁岸碩大思謨泉深盛氣揚休清明以虛受莊重而強立稟於端誠之謂義發於慮憲之謂仁揚天聲之謂武節修方任之謂文事再居陪卿三佐列藩以宮尹中執法以騎省亞丞相冬官宗伯比踐六職再受鉞而一撫封列王爵而食真賦終於端右飾以論道其初守商邱援彭城下濮陽壁寧陵釋陳圍復梁野皆急病肆力威功自著起沮傷以奮擊化怪駭為休寧其守不可拔其功不可遏投難而智勇俱殖酣戰而奇正合發兵法曰有必勝之將書曰存亡在所用其信然乎始從河南節度使張介然東討林胡殺略居多次從宋州刺史李岑扞城半歲劇賊遁去又從臨淮王光弻汧國公勉每用上效揚於軍鋒洎劉司徒元佐始擁節旄錫宣武之號以族屬勳力賈餘勇無前凡希烈之自寧陵走汴自汴走蔡以至於死皆公之為貞元三年以偏師八千承詔護塞亦既旋旆俾營甸圻有尢違者連斬以徇天子壯其忠概未幾徵還沃心前席饗醴命宥建行師之節制自稟新書分上相之賦輿留屯便地明年正月進律作藩彤弓元甲物采備厚因六郡之氣俗用十連之教理入覲宣室請城平涼屹為巨防乃拓故地而又險走集以禦寇徙邑居以便人夷墝埆而制井疆斬荊以列逵市貨力具舉農戰交修邊關棄地宴然富殖長幼養老沛然生聚鄰有墜師者濟之棄甲者納之凡涇人之所未習者皆優為之涇土之所未産者皆茂遂之昆夷懾讋爟火訖息彼西土軌道繄吾謀實然理命不忘於信賞遺章備見其忠悃年止於六十五未極壽寵皇帝之所以恤然加等良有以焉夫人吳國夫人陸氏柔嘉綢直婦道明備長子殿中侍御史贈潁州刺史均教忠能仕不幸蚤夭嗣子右威衛騎曹參軍士涇慤善有訓行與支子右衛率府兵曹參軍士傪洎士良及士和等以德輿嘗受面命類涇人聲詩馨香始終其傳信也熟將篆樂石載徵菲詞中郎二碑竊善頌於無愧春秋五例冀終義於後經銘曰亹亹南川得時經武大君有命式是西土西土濯征衆心成城壽甲雕戈涇師以貞隼旗鷩冕涇俗以寧肆厥忠力秉茲義程凡在五符至於白徒制為田廬亦有賈區實墉實畝交贊令圖嘉生油油比屋愈愈昔誓偏師士皆致果如使臂指可蹈水火孰云危事決勝在我狂猰內訌惡氛濛濛濁河而南或守或攻陳壁既捷夷門乃通時惟南川實冠㣥公乃分兵符乃鏤彞器服物昭庸天休滋至勞勤心力宏大功利師則嚴終公惟盡瘁智氣冥冥發揚昭明下平水土上助神靈輅葆參差邱封崢嶸立此堅石於昭厥聲
