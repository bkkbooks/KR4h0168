front:
  text: 全唐文欽定全唐文卷三百四十顏真卿五
  hash: sha256:87402ab2a7f688758eb6d62e9dcad1c899c2d4aaaf80c0e17995c9efd71efb89
body:
  text: 華姑者姓黃氏諱令微撫州臨川人也少乃好道丰神卓異天然絕粒年十二度為天寶觀女道士年八十髮白面紅如處子狀時人謂之華姑蹀履而行奔馬不及聞魏夫人仙壇在州郭之南草木榛翳結廬求之不得長壽二年歲在壬辰冬十月壬申朔訪於洪州西山胡天師天師名超能役使鬼神見其懇切遙指姑所居南二百步曰烏龜原中有石龜每蹂踐田苗百姓患之乃擊斷其首即其處也明日與姑登山顧望西面有池水焉天師謂姑曰池中有所見乎曰無師遂舉左手令姑自腋下觀之四仙浴焉師曰爾有道分必當得之因留與語數日既還至州虔誠尋訪遂獲石龜於壇中央掘其下得尊像及刀鋸各一油甕五口燈盞數十個天后聞之盡收入內姑嘗於旦夕精思想象之間忽有告曰壇南有九曲池汝可開之姑從而獲焉磚砌盡在他日有異香綵雲從西南而來其夕夢有人謂姑曰井山道場何不修葺姑未及往忽然感疾姑悔之曰得非違尊教所致乎翌日病愈又聞異香而宿於谷口聞鐘聲遲明入山果獲壇殿池砌餘址半峯有自然石井深可三尺闊丈餘故名井山天欲雨則雲霧先起姑既置精舍時聞仙梵之音環壇五七里間莫敢樵採姑遂灑掃修葺極其力焉人或不潔不誠必遭蛇虎怪異之警迷不能出矣至今猶然有野鹿為獵人所射來姑前姑為拔箭其後每至齋時即銜蓮藕以獻姑前開元九年欲上昇之際忽謂弟子曰不須釘吾棺可以絳紗羃之數夕有雷震電繞視紗頂孔如雞卵屋穿容人棺中惟覆被木簡而巳弟子奠瓜數日生蔓長數尺結實二顆其大如桃姑同學弟子黎瓊仙恆服茯苓胡麻絕粒四十餘秋年八十齒髮不衰六七歲時親覩其事每至忌辰即風雲蓊鬱直入室內村野路人往往見綵雲白鶴飛入洞口清齋行道時每有一朱鬃白馬在壇側逼之則奔而出外捨之則隨而復來靈異昭彰不可談悉仙臺觀道士譚仙巖史元同左通元等每至三元恆修齋醮大歷三年真卿獲刺是州明年春三月山下有女道士曾妙行夢一女師令上七層華樹層層掇飡及寤猶飽因是不食嘗於觀中見黎瓊仙跪而拜曰夢中所見乃尊師也因請依之於今覺韶顏潤澤虔修香火於此山遐邇駭慕焉嗚呼麻姑得道於名山南真昇仙於龜原華姑鶴翥於茲嶺瓊仙妙行接踵而去非夫天地肸蠁從古以然則何以仙氣氤氳若斯盛者真卿幸因述職親覩厥猷若默而不言則來者奚述乃為銘曰綽約華姑真仙品徒芳連比色逸俊爭驅南郭從魏西山訪胡腋窺仙浴原獲龜烏靈跡既儼曲池猶污鼎新廟貌煥然規模名曰井山終焉不逾鹿來藕獻馬見鬃朱簡解空存紗穿上徂奠瓜吐實藹室雲趨妙行精持高真是俞勒銘翠炎永播元都先生姓李氏諱含光廣陵江都人本姓宏以孝敬皇帝廟諱改焉二十一代祖宏江夏太守避王莽徙居晉陵遂為郡人高祖文嶷陳桂陽王國侍郎曾祖榮皇朝雷州司馬祖師龕隱居以求其志徙於江都父孝威博學好古雅修彭聃之道與天台司馬練師子微為方外之交尤以篤慎著於州里考行議諡曰正隱先生母瑯琊王氏賢明有德行先生孩提則有殊異晬日獨取孝經如捧讀焉羈丱好靜處誦習墳典年十八志求道妙遂師事同邑李先生遊藝數年神龍初以清行度為道士居龍興觀尤精老莊周易之深趣執喪過哀口不嘗甘旨之味食惟穬麥而已封植膳羞皆出其手號毀骨立親族莫不傷之開元十七年從司馬練師於王屋山傳受大法靈文金記一覽無遺綜核古今該明奧旨元宗知先生偏得子微之道乃詔先生居王屋山陽臺觀以繼之歲餘請居茅山纂修經法頻徵皆謝病不出天寶四載冬乃命中官賫璽書徵之既至延入禁中每欲諮稟必先齋沐他日請傳道法先生辭以足疾不任科儀者數焉元宗知不可強而止先生嘗以茅山靈跡翦焉將墜真經祕籙亦多散落請歸修葺乃特詔於楊許舊居紫陽以宅之仍賜絹二百匹法衣兩副香鑪一具御製詩及序以餞之又禁於山側採捕魚獵食葷血者不得輒入公私祈禱咸絕牲牢先生以六載秋到山是歲詔書三至渥澤頻繁暉映崖谷初山中有上清真人許長史楊君陶隱居自寫經法歷代傳寶時遭喪亂散逸無遺先生捧詔搜求悉備其跡而進上之先時元宗將求大法請先生為師先生竟執謙沖辭疾而退洎七載春元宗又欲受三洞真經其年春之三月中官賫璽書云其月十八日克寸受經誥是日於大同殿潔修其事遂遙禮先生為元師并賜衣一襲以伸師資之禮因以元靖為先生之嘉號焉仍詔刻石於華陽洞宮以誌之是歲夏五月隱居先生合丹之所有芝草八十一莖散生於松石之間詔俾先生與中官啟告靈仙緘封表進夏又詔以紫陽觀側近二百戶太平崇元兩觀各一百戶並蠲其官徭以供香火秋七月又徵先生既自請居道觀以養疾九載春辭歸舊山其年夏六月前生靈芝之所又產三百餘莖煌煌秀異人所莫覩先生又圖而奏之是歲冬又徵先生於紫陽別院館之十載秋先生又懇辭告老御製序詩以餞之十有一載先生奉詔與門人韋景昭等於紫陽之東鬱岡山別建齋院立心誠肅是夜仙壇林間徧生甘露因以上聞特詔嘉異初隱居先生以三洞真法傳昇元先生昇元付體元先生體元付正一先生正一付先生自先生距於隱居凡五葉矣皆總襲妙門大正真法所以茅山為天下道學之所宗矣於戲是非可齊也我物均焉生死可忘也覺夢同焉如此者何域心於變化之際哉先生以大歷已酉歲冬十一月十有四日遁化於茅山紫陽之別院春秋八十有七其年十二月八日門人赴喪而至者凡數千人號奉冠舄遷窆於雷平山之西陲遺命以松棺竹杖木几水瓶香奩香鑪置於藏內門弟子等仰奉嘉猷克遵儉德先生識思真淳業行高古道窮情性之本學冠天人之際所以優游句曲鬱為王者之師出入明庭特寵肩輿之貴是知順風而問昔稱於黃帝望山而請今見於元宗矣又博覽㣥言長於著撰嘗以本草之書精明藥物事關性命難用因循著音義兩卷又以老莊周易為潔淨之書著學記義略各三篇內學記二篇以續仙家之遺事皆名實無違詞旨該博初先生幼年頗工篆籀而隸書尤妙客或賞之云賢於其父因投筆不書元宗詔山人王旼強請先生楷書上經一十三紙以備楊許之闕先生能於陰陽術數之道而不以藝業為能極於轉鍊服食之事而不以壽養為極但冥懷素樸妙味元津非夫博大之至人孰能盡於此真卿乾元二年以昇州刺史充浙西節度欽承至德結慕元微遂專使致書於茅山以抒誠懇先生特令韋鍊師景昭復書於真卿恩眷綢繆足勵超然之志然宗師可仰望紫府而非遙王事不遑寄白雲而攸遠洎大歷六年真卿罷刺臨川旋舟建業將宅心小嶺長庇高蹤而轉刺吳興事乖夙願徘徊郡邑空懷尊道之心瞻望林巒永負借山之記而景昭洎郭閎等以先生茂烈芳猷願銘金石乃邀道士劉明素來託斯文真卿與先生門人中林子殷淑遺名韋渠牟嘗接采真之遊緒聞含一之德敢強名於巷黨曷足辨於鴻蒙其詞曰抱一混茫人之紀綱先生以之氣王神強乃啟元旨元門以彰乃為帝師帝道惟康甘露呈瑞靈芝效祥上士云感高風載揚鶴返仙廟雲辭帝鄉退歸而老妙識行藏德本無累道心有常實曰形解孰云坐忘伐石表墓勒銘傳芳谷變陵遷厥跡彌光士有牢籠太虛撠掖元造擺元氣而詞鋒首出軋無間而理窟肌分者其惟元真子乎元真子姓張氏本名龜齡東陽金華人父遊朝清真好道著南華象罔說十卷又著沖虛白馬非馬證八卷代莫知之母留氏夢楓生腹上因而誕焉年十六遊太學以明經擢第獻策肅宗深蒙賞重令翰林待詔授左金吾衞錄事參軍仍改名志和字子同尋復貶南浦尉經量移不願之任得還本貫既而親喪無復宦情遂扁舟垂綸浮三江泛五湖自謂烟波釣徒著十二卷凡三萬言號元真子遂以稱焉客或以其文論道縱橫謂之造化鼓吹京兆韋詣為作內解元真又述太易十五卷凡二百六十有五卦以有無為宗觀者以為碧虛金骨兄浦陽尉鶴齡亦有文學恐元真浪跡不還乃於會稽東郭買地結茅齋以居之閉竹門十年不出吏人嘗呼為掏河夫執畚就役曾無忤色又欲以大布為褐裘服徐氏聞之手為織纊一製十年方暑不解所居草堂椽柱皮節皆存而無斤斧之跡文士效柏梁體作歌者十餘人浙江東觀察使御史大夫陳公少遊聞而謁之坐必終日因表其所居曰元真坊又以門巷湫隘出錢買地以立閈閎旌曰迴軒巷仍命評事劉太真為敘因賦柏梁之什文士詩以美之者十五人既門隔流水十年無橋陳公遂為剏造行者謂之大夫橋遂作告大夫橋文以謝之常以豹皮為屐騣皮為屩隱素木几酌斑螺盃鳴榔杖拏隨意取適垂釣去餌不在得魚肅宗嘗賜奴婢各一元真配為夫婦名夫曰漁僮妻曰樵青人問其故曰漁僮使捧釣收綸蘆中鼓枻樵青使蘇蘭薪桂竹裏煎茶竟陵子陸羽校書郎裴修嘗詣問有何人往來答曰太虛作室而共居夜月為燈以同照與四海諸公未嘗離別有何往來性好畫山水皆因酒酣乘興擊鼓吹笛或閉目或背面舞筆飛墨應節而成大歷九年秋八月訊真卿於湖州前御史李崿以縑帳請焉俄揮灑橫抪而纖纊霏拂亂搶而攢毫雷馳須臾之間千變萬化蓬壺髣髴而隱見天水微茫而昭合觀者如堵轟然愕貽在坐六十餘人元真命各言爵里紀年名字第行於其下作兩句題目命酒以蕉葉書之援翰立成潛皆屬對舉席駭歎竟陵子因命畫工圖而次焉真卿以舴艋既敝請命更之答曰儻惠漁舟願以為浮家泛宅沿泝江湖之上往來苕霅之間野夫之幸矣其詼諧辨捷皆此類也然立性孤竣不可得而親疎率誠澹然人莫窺其喜慍視軒裳如草芥屏嗜欲若泥沙希跡乎大丈夫同符乎古作者莫可測也忽焉去我思德茲深曷以寘懷寄諸他山之石銘曰邈元真超隱淪齊得喪甘賤貧泛湖海同光塵宅漁舟垂釣綸輔明主斯若人豈烟波終此身昔孔悝有彞鼎之銘陸機有祠堂之頌皆所以發揮祖德敷演家聲故君子之觀其銘也既美其所稱又美其所為無而稱之是誣也有而不述豈仁乎論而撰之敢不祗懼君諱惟貞字叔堅其先出於顓頊之孫祝融融孫安為曹姓其裔邾武公名夷甫字顏子友別封郳為小邾子遂以顏為氏多仕魯為卿大夫孔門達者七十二人顏氏有八戰國有率斶秦有芝貞漢有異肆安樂其後喪亂譜牒淪亡魏有斐盛盛字叔臺青徐二州刺史關內侯始自魯居於瑯琊臨沂孝悌里生廣陵太守給事中葛繹貞子諱欽字公若精韓詩禮易尚書學者宗之生汝陰太守護軍襲葛繹子諱默字靜伯生晉侍中光祿大夫西平靖侯諱含字宏都隨元帝過江巳下七葉葬在上元幕府山西生侍中光祿勳西平定侯諱髦字君道事具孝行傳生州西曹騎都尉西平侯諱綝字文和生宣城太守御史中丞諱靖之字茂宗生巴陵太守度支校尉諱騰之字宏道善草隸書有風格梁武帝草書評云顏騰之賀道力並便尺牘少行於代生輔國江夏王參軍諱炳之字叔豹以能書稱生齊持書御史兼中丞諱見遠字見遠和帝被弒一慟而絕梁武深恨之事見梁周北齊書生梁鎮西記室參軍諱協字子和感家門事義不求聞達元帝著懷舊詩以傷之撰晉仙傳五篇日月災異圖兩卷文集二十卷見梁書生北齊給事黃門侍郎待詔文林館平原太守隋東宮學士諱之推字介著家訓二十篇冤魂志三卷證俗字音五卷文集三十卷事具本傳黃門兄之儀周御正御史中大夫麟趾學士隋文輔政不署矯詔索璽又拒之出為集州刺史新野公後朝朔望引之御榻曰見危授命臨大節而不可奪古人所重何以加卿事具周書弟之善隋葉令子孫見於後黃門生皇秦王記室諱思魯愍楚遊秦小記室字孔歸君之曾祖也隋司經校書東宮學士率子弟奉迎義旗於長春宮招瓜州拜儀同博學善屬文自為父集序國史稱溫大雅在隋與思魯同事東宮彥博與愍楚同直內史省彥將時與遊秦同典校祕閣二家兄弟各為一時人物之選少時學業顏氏為優其後職位溫氏為盛溫氏譜亦載焉生勤禮字敬君之祖也幼而朗悟識量宏遠工於篆籀尤精詁訓解褐校書郎與兩兄弟師古相時同時為宏文崇賢學士弟育德又於司經校定經史當代榮之太宗嘗令師古讚崇賢學士以兄弟特命蕭鈞讚之曰依仁服義懷文守一履道自居下帷終日德彰素里行成蘭室鶴鑰馳譽龍樓委質著作郎修國史夔府長史贈虢州刺史生昭甫敬仲殆庶無恤少連務滋辟強昭甫字周卿君之父也幼而穎悟尤明詁訓工篆籀草隸書與內弟殷仲容齊名而勁利過之特為伯父師古所賞重每有著述必令參定嘗得古鼎二十餘字舉朝莫識盡能讀之高宗侍讀曹王屬贈華州刺史真卿表謝肅宗批答卿之乃祖當為碩儒既高倚相之能遂有臧孫之後不墜其業在卿之門生我伯父諱元孫臮君伯父聰穎絕倫尤工文翰舉進士考功郎劉奇特標榜之由是名動海內累遷太子舍人元宗監國專掌令畫嘗和遊苑詩批云孔門稱哲宋室聞賢翰墨云捷莫之與先歷滁沂濠三州刺史贈祕書監君仁孝友悌少孤育舅殷仲容氏蒙教筆法家貧無紙筆與兄以黃土掃壁本石畫而習之故特以草隸擅名天授元年糊名考試判入高等以親累授衢州參軍與盈川令楊炯信安尉桓彥範相得甚歡又選授洛州溫縣永昌二尉每選皆判入高科侍郎蘇味道以所試示介衆曰選人中乃有如此書判嗟歎久之遂代兄為長安尉太子文學以清白五為察訪使魏奉古等所薦五邸初開盛選僚屬拜嶭王友柱國伯姊御史大夫張知泰妻魯郡夫人亡將葬數家占君不利臨壙君哭而拒之曰豈有亡手足之痛牽拘忌而忍自絕乎弗從其年七月才生明遘疾而歿教義者隱而傷焉與會稽賀知章陳郡殷踐猷吳郡陸象先上谷寇泚河南源光裕博陵崔璩友善事具陸據所撰神道碑累贈祕書少監國子祭酒太子少保真卿表謝肅宗批答云卿之先人德行優著學精百氏藝絕六書頻擢甲科屢升循政曳裾王府名右鄒枚載筆春宮道高徐阮既而壽乖華髮器紆青雲業載史臣慶傳令子追存盛美裦贈崇班且旌善於義方俾揚名於有後濠州生春卿杲卿曜卿旭卿茂曾春卿工詞翰倜儻有吏才蘇頲舉茂才偃師丞杲卿文理清峻所居有聲太常丞攝常山太守祿山反擒其心手開土門拜衞尉卿兼中丞城陷杲卿叱詈之遂被鉤舌支解而終贈太子太保諡曰忠節真卿表謝肅宗批答云自羯胡猖狂入我河縣所在官吏多受迫脅卿兄以人臣大節獨制橫流或俘其謀主或斬其元惡當以救兵懸絕身陷賊廷旁若無人歷數其罪手足寄於鋒刃忠義形於顏色古所未有朕甚嘉之曜卿工詩書草隸十五以文學直崇文館淄川司馬旭卿善草書允山令茂曾好屬文詁訓仁厚絕衆犍為司馬君生闕疑允南喬卿真長幼輿真卿允臧闕疑仁孝有吏能精詩傳善剖判杭州參軍允南仁孝有清識工詩人多誦其佳句善草隸與春卿杲卿曜卿同日於銓庭為侍郎席建侯所賞達奚珣薦為左補闕真卿時為殿中正至三拱法座舞蹈而衣袂相接者三故允南賦詩云誰言百人會兄弟也霑陪歷殿中膳部司封郎中國子司業金鄉男喬卿仁和有吏幹富平尉真長清直早世幼輿方雅有醞藉通班漢左清道率府兵曹真卿早孤蒙伯父臮允南親自教誨舉進士歷校書制舉醴泉尉陟清白長安尉三院御史四為大夫六為尚書再為採訪節度充禮儀使光祿大夫魯郡公允臧敦質孝悌有吏能制舉延昌令監察充朔方衣資使殿中三為侍御史中允江陵少尹荊南行軍濠州及君孫泉明佐父開土門彭州司馬威明卭州司馬季明子幹沛翊頗誕及外孫博野尉沈盈盧逖並為逆胡所害各蒙贈五品京官濬好屬文翹華正岳頁慈明都水使者岳頁好五言校書頲仁孝方正明經大理司直嶺南營田判官執喪九日不食頡河陽尉顗鳳翔參軍頗工小楷洗馬頏恭仁奉禮郎並早喪逝紘方義主簿臮覯並沒蠻襲明微明德明未仕通明獲嘉尉將明昌明尉克明崇文明經衞密標榜之翽有德行文詞華原主簿準溧水尉覿頗工文襄陽尉覲有文行宏文進士顥仁友清白常熟令封金鄉男穎清介勤學侍郎蔣洌賞其判京兆兵曹襲金鄉男岫仁純常熟主簿任城男頎浚儀尉頌清源尉頂幹辦揚府法曹願長厚清白朝邑尉頵左率倉曹碩祕書正字頮有吏幹歙州錄事參軍曲阜男䪻好為詩富陽尉禺好為文常州參軍並粗有所立君之諸祖父㣥從揚庭頤並侍讀強學益期並學士中和至誠敬仲大智溫之澂之澹之搢挺援撰溫泳陵並明經康成強學希莊日損隱朝鄰幾知微舒說順勝式宣韶並進士制舉有意中和趨庭希莊至刺史利仁明天文欣期元淑景靈並校書光庭注後漢書嘉賓千里昇庠匡朝怡滔渾允濟搢逸覿不器防有文詞博古少連恭敏惇學行敬仲溫之以孝聞潤有風義晃鏻邈迢以清白稱其餘咸著官族不獲悉數洪惟累祖之耿光丕業有若子泉宏都之德行巴陵記室之書翰特進黃門之文章祕監華州之學識肇自魯國格於聖代紛綸盛美遂舉集於君君能述遵前人不敢失墜其志事以忝聿修宜其克饗尊榮為清廟不祧之主真卿幸承遺訓叨受國恩既受無疆之庥敢揚不朽之烈銘曰系我宗邾顏公子封郳魯附庸亞孔聖浴沂風刺青徐給事中護營柳渡江楓侍兄疾感虵童鄰火斷珥貂重施七葉傳孝恭武騎都尉司從便尺牘繼魚蟲慟君難憤而終咨記室游湘東嗟御正凜移忠臮黃門擅文雄三韶長事東宮四穆叔史牢籠裦華州詁訓通小祕監盛名鴻維少保文翰工蒞畿赤五裦崇登望苑友桂叢三超贈保儲宮流光盛廟貌融永不祧垂無窮夫人諱華存字賢安任城人晉司徒劇陽文康公舒之女也師於小有清虛真人王裒裒命中候上仙范邈為立傳其略云夫人挺瓊蘭之流映體自然之靈璞志逸雲霞明潔鮮蔚天才卓異元標幽拔少讀老莊三傳五經百子無不該覽性樂神仙味真慕道少服胡麻散茯苓丸吐納氣液攝生夷靜親戚往來一無關見常欲別居閒處父母不許年二十四強適太保掾南陽劉君幼彥生二子璞遐幼彥後為修武令夫人心期幽靈精誠苦盡逮子息粗立乃離隔室宇齋於別寢清修百日忽有太極真人安度明東華大神方諸青童扶桑碧河湯谷神王景林真人小有仙清虛真人王裒來降裒謂夫人曰聞子密緯真氣太帝君敕我授子神真之道青童曰清虛爾之師也度明曰子苦心求道道今來矣景林曰虛皇鑒爾勤感太極已注子於玉札子其勗哉青童又曰子不受聞上道內法晨景玉經者仙道無緣得成也後日當會陽洛山中爾勤密之矣王君乃命侍女開玉笈出太上寶文八素隱身大洞真經高仙羽元等書三十一卷手授夫人焉此皆王君昔遇南極夫人西城真人王方平於陽洛山所受之本經也山中有洞臺是清虛之別宮王君至是北向祝誓於夫人曰太上三元九皇高真虛微八道上清玉晨裒為太帝所敕於魏華存王君又說太極白簡青籙金刻玉文有得見此三十一卷書者之姓名也凡此寶書起自清虛真人受太師西城王君紫元夫人從是當七人得之以白玉為簡青玉為字至夫人為四矣於是景林又授夫人黃庭內景經令晝夜誦讀萬遍乃得洞觀鬼神此乃不死之道也於是四真吟唱各命玉女彈琴擊鼓吹簫合節而發歌歌畢王君乃解語夫人向所授書存思指歸寶經節度行事口訣諸要粗訖徐乃別去凡二夕一日共會在曲靜之中自此之後王君及西城真人諸元君夫人互有來往或與隔壁共庭初不駭悟已而幼彥以暴疾殞世直天下荒亂夫人撫養內外傍救窮乏超㣥先覺乃攜細小徑來東南及兒息各大並處官位至於守靜之思與日而進也凡在世八十三年以成帝咸和九年歲在甲午王君乃與東華青童來降與夫人靈藥兩劑使頓服之剋期曾於陽洛宮夫人服藥稱疾閉目寢息飲而不食七日夜半太乙元仙遣飇車來迎夫人用藏景之法託形神劒化成死骸始終外朗仙化內逸冥變隱適從此而絕子璞時為庾司空司馬遐時為陶太尉從事中郎安城太守故夫人自此隱化淪景須臾至陽洛山明日青童君太極四真人清虛王君三天法師張道陵等凡四十七真人降教夫人於隱元之臺王君令夫人清齋五百日讀大洞真經并分別登真祕奧道陵授以新出明威章奏入靜存祝吏兵符籙之訣衆真各標至訓三日而去道陵所以備教委曲者以夫人在世為女官祭酒領職理故也夫人遂修齋讀經誦言萬過積十六年顏如少女於是龜山九靈太真西王母金闕聖君南極元君乃共來迎夫人遂白日昇晨北詣上清宮玉闕之下太微天帝中央王老君三素高元君太上玉晨大道君太素三元君扶桑太帝君金闕後聖君各令使者致命授夫人玉札金文位為紫虛元君領上真司命南嶽夫人比秩仙公使治天台大霍山洞臺之中主下訓奉道教授當真仙者而男之高仙曰真人女曰元君於是夫人受錫事畢王母及金闕聖君南極元君各去使夫人於王屋小有之中更齋戒三日畢九微元君龜山王母三元夫人馮雙禮珠臮諸衆仙並降夫人於小有清虛上宮絳房之中時夫人與王君為賓主焉神肴羅陳金觴四奏各命侍女陳曲成之鈞九雲合節八音零粲於是西王母擊節而歌歌畢馮雙禮珠彈雲璈而答歌餘真人各歌須臾司命神仙請隸屬及南嶽神靈迎官並至虎旗龍輦激曜數百里中西王母諸真乃共與夫人東南行俱詣天台霍山臺又便道過句曲金壇茅叔申宴會二日二夕又共適於霍山夫人安駕玉宇然後各別初王君告夫人曰學者當去疾除病因授甘草丸所謂穀仙方也夫人服之而仙夫人能隸書為王君立傳事甚詳悉又述青精迅卞註黃庭內景經自後屢降茅山子璞後至侍中蒙使傳法於司徒瑯琊王舍人楊羲護軍長史許穆穆子玉斧並昇仙事具陶宏景真誥所呼南真即夫人也初夫人既渡江徧遊名山至臨川郡臨汝水西立壇置精舍院東百餘步造冢壙又於石井山建立壇場往來遊憩歲月深久榛蕪淪翳雖備載圖經而略無遺跡有唐女道士黃令微道行高遠八十而有少容蹀屣而行奔馬不及時人見其顏色殊異號曰華姑聞夫人靈跡長壽二年歲在壬辰冬十月乃訊於洪州西山道士胡超超能通神明遙指郭南六里烏龜原有石龜每犯田苗被人擊首析其處是也姑與道流尋訪見龜在壇中央其下得尊像油甕鋸刀燈盞之類俄夢夫人指九曲池於壇南獲之磚砌猶在景雲中睿宗使道士葉善信將繡像幡花來修法事仍於壇西置洞靈觀度女道士七人開元初元宗使醮祭祈禱不絕每有風雨或聞簫管之聲入室禮謁必須嚴潔不爾必有虵虎驚吼之異時時有雲如烏鳥㣥飛垂帶直下壇上倏忽不見西出如向井山前後非一已而華姑肸蠁間如有告者曰井山古跡汝須崇建俄聞異香從西來姑行宿洞口聞鐘磬之音遲明入山果遇壇殿餘址遂建立屋宇屢聞仙梵之響環壇數里有採斫及不精潔者必有怪異之警有野鹿中箭來投華姑姑為拔之後每齋前則銜蓮藕以獻姑開元九年姑欲上昇告弟子曰勿釘吾棺可以絳紗羃之已而雷霆震擊紗上有孔大如雞卵棺中惟有被覆木簡屋上穿可容人座前奠瓜數日生蔓結實如桃者二每至忌辰則風雨鬱勃直入室內元宗聞而駭之覆視明白使道士蔡偉編入後仙傳二十九年春三月乙酉使道士齎龍璧來醮忽有白鹿自壇東出至冢間而滅五色仙蛾集壇上刺史范陽張景佚以為聖德感應立碑頌述天寶八載以夫人得道昇仙之所度女道士二人見修香火大歷三年真卿叨刺是州言崇禮謁郊郭蒙邃萑蒲震驚女弱曹逃豺狼窟聚真儀如在壇殿巋然瞻仰徘徊悄焉若失有仙壇觀道士譚仙巖者修真自遠法侶是宗請以男官黃道士二七人抽隸洞靈共申灑掃高行女道士黎瓊仙七人萃居壇院精力住持巳久率勵往來增修觀宇從之不日遹暨厥成仙跡之載崇師之力也敢備其本末而為頌云銘曰紫虛元君維魏夫人位列五嶽名高七真凝華台允奪志劉嬪太帝昭懇清虛降神㣥仙畢會玉笈斯陳服道日損精心益勤蛻形神劒託馭飇輪適抵陽洛遄登隱元黃庭朗詠白日昇晨西降王母東過叔申傳法侍中許楊為鄰伊昔南渡爰居汝濱壇場處所埋沒荒榛實賴華姑諗於胡尊果獲靈跡烏龜之原次尋井山實叶曩言嫣然簡解紗羃空存野鹿銜藕靈瓜吐根怪異昭彰不可殫論二聖竦駭屢崇明禋于嗟女弱香火堙淪真卿刺州謁拜斯頻乃命仙子增修鼎新華姑侍傍異代同塵曷表元德銘功翠珉垂諸來裔坱圠無垠
