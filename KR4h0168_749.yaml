front:
  text: 全唐文欽定全唐文卷七百四十九杜牧二
  hash: sha256:01b16d0bc70751540b187827eb5dcf27ce661e689699ee0bf4a693b53a2c7006
body:
  text: 敕銀青光祿大夫檢校國子祭酒前使持節都督勝州諸軍事兼勝州刺史御史中丞充本州押蕃落及義勇軍等使上柱國李誠元開元時吐蕃上書悖慢無禮皆邊將造偽交鬬華夷冀立功勳以求爵賞自長慶已降怠於制置西北守帥多非其人侵虐種落厚自封殖至使忿鷙之性不甘欺奪之苦近者聚為內寇至乃騷動天下因令循撫果效信順是以屢詔執事慎於選求僉曰誠元家本北邊志氣慷慨將軍之子頗傳父業學萬人敵知四夷事迹榆林之前政寄馬邑之名邦仍留兼官用震殊俗夫車馬甲兵戰之器也禮樂慈愛戰所蓄也然後要之誠信禦以堅明雖曰戎狄豈不畏服深期國士無頽家聲可檢校國子祭酒使持節朔州諸軍事兼朔州刺史御史中丞散官勳如故敕兵者凶器也將者死官也若不擇才必有陷敗銀青光祿大夫檢校右散騎常侍使持節隴州諸軍事兼隴州刺史御史大夫充本州防禦使上柱國薛逵胸奴犯塞李廣逢時爪牙甚堅翅翼頗健任以隴倚戎守封當賜輒分軍租不入士爭為死虜不敢犯今以天水名郡號為新都用汝守之期於鎮靜無召戎生事無玩兵邀功正封疆守禮信險走集嚴候伍邊將之道莫過於斯玉印貂冠皆為榮秩壯爾軍旅惟恐不多勉礪鋒鋩以期報效可檢校左散騎常侍使持節秦州諸軍事兼秦州刺史御史大夫充天雄軍使兼秦成兩川經略及義寧軍行營鎮遏都知兵馬使本道營田等使散官勳如故敕銀青光祿大夫檢校太子賓客使持節宥州諸軍事兼宥州刺史御史中丞充經略軍使押蕃落副使左神策軍宥州行營都知兵馬使上柱國鴈門郡開國侯食邑一千戶田克加梟俊無敵感激輕生李信之氣蓋關中陳安之勇聞隴上委以邊郡能得士心寇圍陰河守陴甚寡爾乃萬死不顧一奮無前奇兵徑衝驍騎橫挑圍開孤壘戰敗豪羌言念忠勞豈愛爵賞貽以崇秩用酬奇功畢萬匹夫也百戰皆獲有馬百乘死於牖下死不在寇此乃趙鞅誓衆之辭也宜念古人之言勉作萬夫之特可檢校國子祭酒餘並如故敕朝議郎前使持節坊州諸軍事守坊州刺史薛淙等仲尼對魯哀公曰人道之大莫先為政漢宣帝曰與我共治者其唯良二千石乎念先師賢帝之言思疲人良吏之選夙興夜寐不忘於此淙以文科入仕命守邊郡屬當伐叛兵於其郊處劇不繁事叢皆辦如愚進以門子屢為長吏其為政化可差古人藏與逢閲官簿而頗多言理名而亦著紹元嘗聞謹慎可宰百里己所不欲勿施於人無忘格言副我優寄可依前件敕朝議郎前守太原府晉陽縣令上柱國鄭液等今之郡守為人師帥宣上教化者也以液久在官途嘗宰大邑聞其為治人歌舞之以蒙執殳前驅豫之雄也光祿護塞居延視胡虜不敢窺士爭為死各委分寄實曰遷升通州雜以華夷淮南兩有兵賦爾其往哉今用誡爾為天子之守臣作百姓之長吏言於仕進可曰顯榮夫君子之道先有諸己後求於人苟能律身始可檢下勉詳詔令用謹理行從規始於門子入仕恭謹無尤自州佐而升在朝班列五尚而職於三服亦為良遇無忝官常可依前件敕正議大夫前使持節淄州諸軍事守淄州刺史上柱國太原縣開國男食邑五百戶賜紫金魚袋王晏實等俟善政而後用或蔑無所聞滯序進之常途則怨生於下古今政柄患斯二者晏實初本侹等三人入仕年多亦嘗為郡聞無悔吝是熟詔條濟南跨河有兵有賦巴渝夷俗慷慨豪健形於樂曲爾其往哉古之人有言曰子苟為善誰敢不勉身率以正孰敢不正欲謹於行在於廉平宏宗溫慎有餘王屬咸為清秩銖以文學嘗佐賢侯作掾京兆亦曰美仕皆有官業慎無自薄可依前件敕大中大夫前使持節文州諸軍事守文州刺史兼侍御史充本州鎮遏使上柱國郭瓊等鄰山順政僻處山谷罕知文律易為欺奪瓊與宗元守郡宰邑聞無悔吝爾其往哉仲尼曰正身而人正欲善而人善撫我疲俗宜遵格言苟或不臧貽爾之戚雅康入仕嘗在班列青宮贊導陵邑守奉若非謹慎不膺斯任可依前件敕中散大夫前使持節柳州諸軍事守柳州刺史上柱國賜紫金魚袋吳從等地遠京邑俗雜蠻夷不知文律易為欺奪朝廷選置多無名人小則抑鬱不伸大則聚以為寇蓬緣巴徼其風忿徑瓊處海外在兩漢時往往小反羅居百越磎洞深阻咨爾三吏比嘗為郡亦報有政勿以荒服侮我疲人或異詔條必置厥辟稍當敘進優以上佐苟有聞見無忘裨助可依前件敕正議大夫前使持節忠州諸軍事守忠州刺史上柱國裴閲等江峽之間其俗剽悍聞爾為理人惜其去若不遷陟豈酬政能洎師素等久居官常皆無悔吝半刺列郡人所咨稟衣冠弓劍之地霜露感思之心尤藉謹良以顓守奉各服休命勉於始終可依前件敕中大夫前使持節申州諸軍事守申州刺史上柱國賜紫金魚袋陸紹等夫以冉求之才方六七十為之三年然後可使足人今者一州之地五六於此况上饒參以越俗遂寧旁緣巴徼號為沃野皆有厚賦委之分寄實難其人以紹其先君子仍代作相能以儒學緣飾吏理以載頗有長者之舉聞於士林之間夫二千石所繫朕常留念舉以授爾能不誨乎恤孤獨逮不足修其教徇其宜凡此四者著於王制勉循古道以活疲民宗道宰邑卓然善政廉使上課書為第一列於遷陟得以不時無易初心以失前效可依前件敕朝議郎前京兆府渭南縣令上柱國張德翁等德翁承訓審矩為天子之守臣作百姓之長吏仕而至此斯亦達矣匹夫為善人猶則之守令所為誰敢不化詩曰爾之教矣人胥效矣可不勉之量助奉陵邑以謹慎選執臨師景參諒等各以序進亦為良遇可依前件敕朝議郎前守成都縣令上柱國賜緋魚袋王樟等盧山江關扼束控西南夷置吏不善所虞非細以樟嘗宰劇縣在會府中條令和平吏人嘉美迹爾前政撫豫遠人禮曰人之所好己亦好之人之所惡己亦惡之以此用心何憂不理暨錥與綬門子清族閲其官簿入仕已久東南諭導名藩上寮頗為優間宜服休命可依前件敕開府儀同三司檢校國子祭酒前使持節都督銀州諸軍事兼銀州刺史御史中丞充本州押蕃落及監牧副使兼度支銀州營田使上柱國清和郡開國公食邑二千戶傅孟恭等孟恭山西將門並州壯士雖長鉟都尉黑矟將軍校其忠勇無以過也左宦非罪志氣益堅守邦有聞官業克奉今以威州新造蛇豕之衛非爾材力不能控壓遂以武健佐助戎臣觀其列狀頗著勤效敏於窮塞提挈孤軍樹立和門繕完械用翬飛虹亘者三百間耀雪吹毛者數萬事言其勞績亦少比倫各兼憲班或伏熊軾可曰榮遇無自懈怠可依前件敕中散大夫前使持節利州諸軍事守利州刺史上柱國姚克柔等仲尼曰人道之大莫先為政之功者其長人乎克柔嘗典一邦愈知為理承鼎增宙等開敏有材幹能堪事河池名郡畿內小侯仕於清時皆為良遇大凡為理之要先事孤弱譬諸草木無倦栽培仲連荏苒宦途歲月滋久東朝贊道亦曰升遷各慎厥官無忝榮命可依前件敕前靈鹽節度掌書記朝請郎試大理司直兼殿中侍御史朱載言等刺史縣令皆古之五等諸侯行詔條紀綱專教化殺生者也得其才則疲人蘇息非其任則百姓愁怨載言循省問遠等或以吏理進官或以科名入仕當此選擇聞無悔尤海豐越俗王畿名邑夫邪正表前之影教令草上之風若非律身不能為理公及以勤謹膺陵邑慎選幼章以才敏坐京兆劇曹各有官業無自廢怠可依前件敕銀青光祿大夫前使持節邢州諸軍事守邢州刺史兼侍御史充本州團練使上柱國支某等近者控名責實事不苟且量材適用咸當所宜咨爾某等各於進官亦以勞久王門為傅越徼分憂洎守奉園陵毗佐列郡皆曰美秩盡獲優安各務清勤無掇悔吝可依前件敕朝散大夫檢校太僕少卿前兼江陵少尹上柱國鄭㥄四代所貴事皆不同至於尚齒其道一也聞爾久居官次年踰月制家惟四壁身無一簪今者致政里居亞列半俸足得安枕几而就頤養敬老之道亦為優異可守大理少卿致仕散官勳如故敕銀青光祿大夫檢校刑部尚書前兼左金吾衛大將軍御史大夫充左街使太原郡開國公食邑二千戶王釗常侍文陛召見武臺願以五千獨當一隊思長策久安之術避必戰敢死之虜頗口某蟲免胄獨能全師洎繁纓趨朝執金入侍夷險一貫忠勞兩兼子尾之疾雖平郗克之步尚蹇官崇環衛職實司武入座副相不失舊榮且務優安勉於遵養可檢校刑部尚書兼右領軍衛上將軍御史大夫充大內皇城留守散官如故敕昭武軍校尉前守右驍衛將軍上柱國賜緋魚袋王知信等古人之為理也不以一眚而掩大功克黃紹子文之宗霍陽繼博陸之後知信烈祖貝邱之戰可庇十代豈止曾孫寰父伯仲亦效忠懇提挈全魏歸於朝廷今者寵以將軍旌其舊德豈惟獨舉賞延之典亦欲使列士諸將自為孫謀彞鎬明誼入仕已久皆無悔吝故有序遷臨封遠邦蔡亳兵部分憂佐理無忘謹廉可依前件敕朕據南面之尊制一代之命先講百官之法後行四方之政若有罪不問是倒持太阿有頑不磨是廢去砥石則拱視天下何以為理雲麾將軍起復檢校刑部尚書兼右羽林統軍御史大夫張直方席其先人任為邊將披誠向闕執玉來朝近臣勞郊大匠理第典兵於禁門之內立侍於交戟之中校其寵榮無與等比而乃每輕法檢恣為遨蕩擅去宿衛潛遊異縣有司問狀持舌不言以至再三姑引闕古人有云語人必於其倫觀過必於其黨念其生自戎旅素不鐫琢既觸法網亦可矜容加膝墜泉豫常自慎小懲大誡爾宜知恩不失將軍之榮仍有兼官之重足得湔洗以俟甄升可銀青光祿大夫檢校刑部尚書兼左驍衛將軍御史大夫敕金紫光祿大夫檢校工部尚書兼左武衛上將軍御史大夫上柱國吳興郡開國公食邑二千戶朱叔明司馬軍令黃帝理法兵家尚嚴始可克寸敵邊將破虜詐增首級亦罪之小者漢文時魏尚囚繫漢宣時田順自殺開元中幽州長史趙含章大破奚虜旋坐贓賄放流瀼州縱有功勞不贖罪犯是以拓土萬里垂功中興自長慶己還益輕邊事選拔將帥多非賢良豪奪種落蹄角之畜割削士卒衣食之賜見利則往見弱則欺罔酬恩榮不顧廉恥積帛藏鏹邱纍陵聚是以戰士離落兵甲鈍弊積三十年擲之不問近者伐叛益知其由屢下詔書誥誡深切豈知頑昧不可鐫琢嗟爾叔明材惟朴木敇性命淺狹其兄叔夜以贓抵刑不出私門可視覆轍忝據藩翰已積歲時料甲峙糧既乏素效事虜接戰不報寸功而乃公欺降戎乾沒戰馬歸充伏櫪告以敝帷人之無良一至於此昔曹劌請戰卜式輸財俱是匹夫不與公食爾乃貴擁旄鉞任倚邊陲何其用心與古相萬諫臣拜疏前罰未塞尚為恩貸不失將軍分務洛師可以循省可右武衛大將軍分司東都散官勳封如故敕北落親軍夾峙宮省選忠勇者為吾爪牙右神策軍奉天鎮都知兵馬使銀青光祿大夫檢校國子祭酒兼右威衛將軍御史大夫上柱國安定郡開國公食邑二千戶梁榮幹射必落雕力能扼虎自晦雄毅益守謙恭故能塞護長榆兵分細柳恩加士卒名著勳勞今日擢掌五兵榮懸三綬勉礪鋒鍔上答寵光可檢校國子祭酒兼右神策軍將軍知軍事御史大夫充馬軍都虞侯散官勳封如故敕忠武將軍前左武衛將軍兼澧州長史合川郡公賜紫金魚袋呂衛等衛為天驕之魁來就諸臣之位誠敬忠信不失其常銖朗入仕歲久閲官頗多聞無尤違是率理道將軍上佐半刺之任言於清時皆為美仕帖以祿秩之綬用嘉慕義之心慎無自輕勉於敬畏可依前件敕翰林待詔昭武校尉前守左驍衛將軍上柱國賜紫金魚袋張幼彰等幼彰修已鴻都奏技攻於丹青用志不分與古爭品審以武進晚能知書屢以辭章上干丞相知實以謹良綰務師儒以詳練守職或藝或勞或遷或拔將軍佐僚皆為寵擢各守職秩無忘專慎可依前件敕一品孫李明遠三品孫韓鍔等立侍交戟才能勝冠出入見君父之尊師資益忠孝之道流離少好騏驥老成宜念聿修慎無欲速明遠可致果副尉守左千牛備身鍔可翌麾校尉守左千牛備身敕前鳳翔節度副使朝議郎侍御史內供奉賜緋魚袋李鄠等五嶺之表地遠京邑吏以法制奉公下以文律自持蓋亦寡矣而鹽鐵榷束之籍延袤萬里若當其才非唯山澤之饒歸於公上亦得以遠人利病聞於朝廷今吾丞相揣摩親規改易舊制以鄠文學廉慎當官挺然嘗倅賢侯號為名士以此委任必有可觀蕃瑾嗣閔咸有才賢佐蕃評刑知已所請各進官秩皆為榮遇宜思報效無纍薦延可依前件敕權知鹽鐵廬壽院事朝請郎侍御史內供奉韋宗立等近者恢復河湟訓定羌虜江湖之間人安而不擾供饋之費財有餘而力不蹙實由管榷委之名臣今者尚書休以爾宗立等上言咸曰清白處已勤慎奉公豫安能知無不可者暨頡與潛皆稱名士自有丞相為爾已知守職佐藩無忝新命可依前件敕前知度支河南院事朝散大夫試太子司議郎兼侍御史上柱國賜緋魚袋房次元等有司臣各言爾等或以科名文學或以清白才用列於薦籍其辭甚美分金穀榷運之務無忘謹廉佐諸侯將軍之府宜竭裨助報知苟盡能不達乎爾其勉之可依前件敕大中大夫使持節邠州諸軍事守邠州刺史充兵馬留後上柱國賜紫金魚袋李知讓等以知讓所理雜以華夷宜假霜臺用壓戎落瓊璹觀等皆吾卿大夫之令子弟也戎臣知之請為佐理夫幕吏之道有事必言知無不為考於職分亦無本局各思報效勿事依違可依前件敕朝議郎行鄭州管城縣令上柱國賜緋魚袋崔彥曾等戎臣請士京兆求賢披其薦籍皆曰才能彥曾左官非罪理人異等詵張王賢客梁苑辭人元汶官決平之司無舞文之過移為典獄陟在賓階不纍已知惟有直道可依前件敕朝議郎前守太常丞上柱國李承慶等以文學升名於有司以才能入仕於官次諸侯辟之以佐於賓席天子用之以升於朝廷次第等級大小高下亦與古之鄉舉里選考德試言無以異也爾等皆吾卿大夫之令子弟也清風素範克肖家聲屬辭雕章能取科第既有知已皆為才人賢觀與遊達視所舉今爾賓主兩皆得之義則進否則退無為美疢以求苟容可依前件敕前昭義軍節度判官朝議郎殿中侍御史內供奉夏侯曈等曈以科名辭學開敏多才久遊諸侯常蘊令聞周知吏理兼能潔身戎臣上言願為毗贊既諾仕以委質宜直道以酬知途以文行策名節走耳隱清遠言於後進實為秀人延閣典校丞相所請勉循階級以至堂奧可依前件敕在春秋時晉為諸侯國也尚立公族大夫教育諸卿之子富有賢哲不假搜聘召同列而會者三百餘年况今天覆盡得而禹畫無遺名卿賢相之家清風素範之族子孫森羅髦俊並作次第敘用豈歎乏才匭使判官將仕郎守國子監太學博士蕭孜等或以秀異得舉文學決科或以行實立身遭逢知己皆後生可畏之士為當時有才之人東觀著述殿閣典校參畫幕府開導獻納清秩美職二者兼之不由階級安至堂奧勉於修慎以候超升可依前件敕將仕郎前守京兆府藍田縣主簿楊知退等國家蕩定齊魯餘三十年多用名儒鎮之以還古俗其賓吏皆為秀彥宏文館四部㣥書十八學士詳考理亂鋪陳王道此乃貞觀之故事也若非名士固不與焉知退文行溫雅副幕府之求廷望才學聲華膺丞相之選當戰伐之後切於供饋庠績自以謹幹稱於有司子非能知咸徇其請各宜率勵無纍所舉可依前件敕度支東渭橋給納使巡官將仕郎試大理評事兼監察御史白從道等朕以國計出入委於表臣尚書郎當戰伐之餘財穀殫蹶斷長補短以無為有今者上言三吏皆曰國才校其智能足應事役暨守臣貽孫等亦曰祥蛻文學溫慎可在賓階才者得失之端士者功名之本勉於自勵無負已知可依前件敕河東節度副使朝散大夫檢校大理少卿攝御史中丞上柱國盧籍等夫諸侯之任重矣其行道也得以阜俗變俗其行法也得以刑人賞人若張政化得以助業某等上言咸舉可用籍等或負才器倜儻不㣥或以文章策名俊秀或有幹局可佐囹圄皆徇所請豫安能知並州近胡王業茲始艱難已來何戰不會長沙始安頗聞旱耗各宜良士以佐賢侯夫直道枉道無他故也取容盡節而已勿慮後患宜竭報知暨殿省佐僚縣道為郡豈曰虛授亦當爾才正霜臺之舊名班藝閣之初命各服寵祿勉於自強可依前件敕浙江西道都團練判官將仕郎監察御史裏行鄭碣李仁範暨虔餘等咸以文行策名清時諸侯知之命為幕吏少微四星處士毗輔之宿也天之布列在軒轅前此乃天意親近賢良先於后威者吾能言之耕延陵之臯荷石門之篠沉如魚潛冥若鴻翔非吾賢相爾不肯起勉酬知已以壯在野並可依前件敕前鄆曹濮等州觀察支使朝散大夫試大理評事裴詒等守臣有司上請諸士皆曰詒等士族之中有政事科名清廉公謹嘗經職守稱有才能古人於一飯之恩尚有殺身以報况於知已得不勉之可依前件敕朝議郎行祕書省著作佐郎石賀等朕寄諸侯之事重矣大者教化風俗小者惠養黎庶環千里之疆綰三軍之衆講求倚用不五六人守臣公度仲郢所請賀等各以文學決科愷悌干祿觀其褒舉皆是才名能報所知能用可用在爾賓主豫不與焉暨鑲與鈞亦稱智敏神州作掾五庫掌財足展幹能無惰官守可依前件敕前振武軍節度判官文林郎監察御史裏行顧湘等近者循名責實科指稍峻諸侯有司亦各搜選才良以佐物務湘覺本以文進兼通吏理從周暨魯皆稱幹能于以聲韻上獻律呂精工雖曰小道亦有可觀徇請酬勞咸加新命各守職分無忘用心可依前件敕攝戶部巡官宣德郎試祕書省校書郎兼殿中侍御史趙元方等各為長才自有知巳地官平糴專豐耗發斂之任京尉坐曹決事得操豪猾交戟之內贊佐衛臣言於仕進皆曰得路勉思報效無纍所舉並可依前件敕前度支東渭橋給納使巡官徵仕郎試大理司直兼殿中侍御史上柱國韋承鼎等持身謹潔美才周通奉公當官先勞後祿端雅守道俊秀升名久遊賢侯衆稱君子參東朝之贊諭分五尚之職秩糾大府㣥吏之失提王畿生齒之籍方六七十長億萬夫金臺嘉招武幄與食法官憲秩以壯藩垣進於清時皆為美仕近者屢譴幕吏豫豈無意蓋欲廓賓階敢言之路誡諸侯自是之尊惟滄新造控制兩河付之誠臣尤藉良畫若免後患慎勿苟容各修官業無自偷薄可依前件敕新授銀青光祿大夫檢校國子祭酒兼濮州長史殿中侍御史上柱國康從固其父秀榮實為名將李廣多爭死之士竇嬰無入家之金一收七關易如拾芥念爾跨馬事敵執戈同仇壯比文鴦勇同李敢子之能仕父教之忠古人之言信不虛設今者願留闕下以奉朝請念其垂誨可見至誠曳裾憲寮用示恩寵宜思終始上報君親可檢校國子祭酒兼翼王府司馬殿中侍年史散官勳如故敕中散大夫前守青州別駕上柱國張正度等各以才能仕進謹慎修身積日纍時咸有知已或以序進或徇所請皆佐列郡無怠官常可依前件敕中散大夫前守彭王府司馬上柱國馬逈等以爾入仕歲久愈知為理半刺上佐得與二千石參校政事短長利病者也今以名郡藉其佽助各有兼授以峻等衰慎守官常無自偷惰可依前件敕右神策軍右廂兵馬使兼押衙銀青光祿大夫檢校國子祭酒前靈州大都督府左司馬殿中侍御史上柱國高駢禁旅典兵為吾爪士言念付祿未稱輸勞外之王官帖以憲秩可曰榮遇無忘盡瘁可檢校國子祭酒兼濮王府司馬侍御史餘如故敕忠武軍節度右都押衙銀青光祿大夫檢校太子賓客兼殿中侍御史王仲元等自艱難以來言念許師何役不行何戰不會居常則長法知禮臨敵則致命爭登摽於和門不忝忠武爾等短衣長劒事寇乘邊觸履艱危無所顧慮將軍列狀憲班酬勞勿矜常勝無忘淬礪可依前件敕前件等拔以貔貅之勇籍於禁旅之中大刀長矛重弓束矢林會山立星羅翼舒惟以忠勤拱我宸極錫之勳寵以酬勞瘁可依前件敕右龍武軍大將兵馬都知正議大夫檢校太子賓客上柱國賜紫金魚袋右龍武軍宿衛劉誠信等技以勇聞任以信普力可挾輈以走敵藝能奪矟以制人常礪鋒銛無所回避自拱宸極益展忠勞思以報之何惜階級可依前件
