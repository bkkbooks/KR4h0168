front:
  text: 全唐文欽定全唐文卷七百二十字待價趙郡人進士擢第又書判拔萃開成中拜戶部侍郎以本官同平章事武宗立遷門下侍郎罷為太常卿再貶江西觀察使昭州刺史宣宗立內徙郴舒二州遷河陽節度使入為吏部尚書檢校右僕射淮南節度使進封贊皇郡公大中七年卒年六十九贈司空諡曰貞穆
  hash: sha256:063db2f63f62216724553a40785cd9734371dce494b9ef27af9f5010dc7533ac
  markers:
  - {type: head, offset: 13, content: '李[:#AS-8FA5:●]', id: KR4h0168_NFKB_720-h1, level: 1}
body:
  text: 臣聞人臣之節本於忠藎苟有所見即宜上陳况為陛下諫官食陛下厚祿豈敢腹誹巷議辜負恩榮臣等聞諸道路不知信否皆云有詔追李光顏李訴欲於重陽節日合宴㣥臣儻誠有之乃陛下念㣥臣敷惠澤之慈旨也然元朔未改園陵尚新雖陛下執易月之期俯從人欲而禮經著三年之制猶服心喪今遵同軌之會適去於中邦告遠夷之使未復其來命遏密弛禁蓋為齊人合宴內庭事將未可夫明王之舉動為天下法王言既降其出如綸苟玷皇猷徒章直諫臣等是以昧死上聞曲突徙薪義實在此且光顏李訴久立忠勞今方盛秋務拓邊境如或召見詔以謀猷裦其宿勳付以疆事則與歌鍾合宴酒食邀歡不得同年而語也陛下自纘嗣以來發號施令無非孝理因心形于詔敕固已感動於人倫更在敬慎威儀保持聖德而已臣等不敢緘默輒貢狂言懼不允當伏待刑憲伏以榷率救弊起自干戈天下無虞所宜蠲省况稅茶之事尤出近代貞元中不得不爾今四海鏡靜八方砥平厚斂於人殊傷國體其不可一也而又茶為食物無異米鹽人之所資遠近同俗既蠲渴乏難舍斯須至於田閭之間嗜好尤切今收稅既重時估必增流弊於人先及貧弱其不可二也且山澤之饒出無定數量斤論稅所冀售多若價高則市者稀價賤則市者廣歲終上計其利幾何未見阜財徒聞斂怨其不可三也臣不敢遠徵故事直以目前所見陳之伏惟陛下暫留聰明稍垂念慮特追成命更賜商量則嗷嗷萬姓皆荷福利臣又竊見陛下愛人育物動感神明即位之初已懲聚斂外官抽貫旋有詔停洋洋德音千古不朽今者榷茶加稅頗失人情臣忝職諫司豈敢緘默塵黷旒扆戰越伏深天球河圖有國之大寶麒麟鳳凰王者之嘉瑞方於賢彥即又次焉天佑我唐才傑間出輔時興化代有其人公諱僧孺字思黯隴西狄道人本子姓漢有牛崇為隴西主簿因家焉代為西州豪族八代祖宏仕隋為吏部尚書封奇章公佐佑文帝有重名于時高祖鳳中宗時為春官侍郎掌國史曾祖休克集州刺史贈給事中祖父紹太常博士贈太尉父幼聞華州鄭縣尉贈太保公七歲而孤依倚外族周氏嶽嶽卓卓有老成之風以喪禮自處未嘗戲弄年十五知先奇章公城南有隋室賜田數頃書千卷乃辭親肄習孜孜矻矻不捨蚤夜洎四五年業成舉進士軒然有聲時韋崖州作相網羅賢雋知公名願與交公袖文往謁一見如舊由是公卿籍甚名動京師得上第聯以賢良方正舉又冠甲科策中盛言時事無有隱避持權者深忌之出為伊闕尉名府賢侯羔雁繼至封章屢薦每為中執事所沮皆不滿秩從潞帥郗士美授管記三奏不得請竟除河南尉會有次對大寮因言事解於上前遷監察御史丁太夫人憂服闋除本官轉殿中公以文高氣直纍歲堙屈問望所屬推美於臺閣間入省拜禮部員外郎時孟尚書有重望以地官二卿兼領綱憲薦公知雜轉都官員外兼侍御史免憲職授考功員外郎集賢學士穆宗即位宰相稱其能遷庫部郎中掌書命召對與語上德之面賜五品服未幾遷中丞每對延英必移時盡言天下事有武將李直臣為宿州刺史豪奪聚斂以貨數百萬厚結權貴公按之為有力者排幾不勝竟以詞堅理直上意回直臣乃得罪由是上以清直知又面賜金紫拜戶部侍郎時望允塞中書令韓宏以財投分公拒而不受上因他事知之愈賢公遂作相持重顧大體不言細事嘗謂同列諸相曰致理之本流品為先彞倫攸叙蓋謂此也每惜名器力與同列爭方鎮以不廉聞者輒奏貶以賄賂求進者必阻之先是李司徒逢吉與杜循州元穎同作相穆宗寢疾議建儲二與公不協後元穎出鎮井絡逢吉銜之思有釋憾於政事堂謂公曰西川前有廢立謀上熟知之來日延英發其事公不知慎勿沮議公曰王導有言我雖不殺伯仁伯仁由我而死正近此耳又安得不言哉逢吉喑嗚而止敬宗年少嗣位公雅善敷奏每言一事必本末陳之上甚倚愛同列挾中助力赫赫妬公之賢公亦思避其鋒三上疏求外任上以武昌善地建節幢兼相印以授之既至問人所病害咸言鄂土疏薄歲一修城役工誅茅人用咨怨公默許心計埏泥範磚未及三年盡換舊制崇墉堅壁人到于今賴之文宗嗣位二年公入覲詔復相位上雅知公名一見恨得之晚會宋相申錫以廉介聞巨姦鄭注挾北軍勢卜射取財貨富侔於國忌宋之直陰畫詭計誣與藩邸通因內臣而上其變造作似是衆皆符會上驚聞激怒下法吏議其罪諫官伏閣爭不得公入侍密啓上意乃寬止於郡佐公實有力今李崖州鎮劍南西川上言西蕃別屯以維州降帶甲之士甚鋭其地要害得之足以壯邊部徐圖河湟此其漸也上疑不决下南宮議百執事皆是西川奏公獨曰國家近與昆夷歃血四鎮晏然今若自虧大信犬戎恃衆見詰渝盟彼直我曲未可量也上曰丞相之言是詔還維州初德裕承籍地勢自負機術公介特素不與之交及是大不平遂成宿憾公與李尚書宗閔同輔政出入殿省進退有度上偏目公曰卿才類霍光異日可屬大事公懼滿辭位再陳封章寵加端寮出鎮淮海不改相印再登將壇揚州當江淮之衝習偷薄之俗公清淨易化人移風俾及五年臻於至理倉廩實禮義行刑措政成脫屣歸洛優詔屢降雅志不回拜檢校司空東都留守文宗將有大制置大除授必降中使假於他方入皇城宣密旨獻可替否如在君前其信重也如此俄以左僕射徵王人就賜官告特明異禮公感恩雖厚退身愈堅一對而歸不詣相第亦有中阻未諧人情又加相印出為漢南節度使制出上悔之欲追成命公固辭上曰且不與卿周歲別出都門特賜清廟器六事皆範金飾玉如古時制宣曰以卿精忠用以貺別寵待之禮當時無儔公到襄州均井稅薄地征人用胥悅咸歌來暮武宗初纘極聽信未一行險者乘時而起凶德參會倒置天下事清賢名輩多被斥逐惟公位高德重最難搖撼臲卼齟齬幾至二年屬大水壞居人廬舍公以實上聞仇家得以逞志舉兩漢故事坐災異策免降授太子少師時議不平又還檢校司徒兼太子太保俄又改太傅再臨東郊劉從諫死劉稹自擅以昭義軍阻命天兵誅討五年方剋上喜甚素忌公者媒孽煆鍊誣公與從諫交上怒下詔旬日三貶公至循州長史鑿空指鹿四海之士感冤之公推運達命恬然如得好官時踰嶺越險二年在海上無所苦今上即位大明善惡三遷至少保轉少師牽復高位分司東洛池臺琴酒逍遙自娛賢士大夫尚其軌躅未半歲遘疾薨于東都城南之別墅自嬰疾至于捐館談笑言語宴居自若口占理命纎悉無遺上聞為之軫悼聯日不視政公卿相弔正人雪涕冊贈太尉遣大僚弔祭公端明簡重忠厚誠慤平居私室如見大賓不喜釋老唯宗儒教早與韓吏部皇甫郎中為文章友其名相上下晚與白少傅劉尚書為詩酒侶其韻無高卑前後作鎮皆佩相印辟署多名人難其進而勇於退儉必中禮貴而不奢知命達理保和居易三領大鎮接護軍以禮貌不至交歡再入中書待樞使以公平不容請託有恩必報有讐不校韋崖州於公恩也嫁二女歸名士薦長子登周行李崖州於公讐也恤竄謫之窮途厚供待於逆旅其厚德歟亦難能也夫人同郡辛氏贈僕射祕之女賢明懿淑稱於族姻有子五人曰蔚曰叢能嗣其業皆擢進士第蔚監察御史叢使府協律曰奉倩洛陽尉二人未知名公以大中戊辰歲十二月二十九日薨以大中己巳歲五月十九日葬小子不佞早棲門牆考選第叨殊等之科開賓筵忝入幕之吏國士相遇筆札見知周旋款眷垂三十載刊石表墓分也難辭公歷官三十一政作相一十九年逮事六宗光輔四帝承主恩必由直道解相印實無罪名自少及長不失色於人佐時理家無悖入之貨持身斤斤履道甚夷嘗病在高位者不知止足終日抗論剋期拜章竟不及年俾孤美志銘曰公之生兮稟星辰公之道兮侔古人公之才兮渾而真公之性兮威且仁公之文兮班馬鄰公之藝兮游夏均公之儉兮自我身公之簡兮無雜賓公之貞兮肅人倫公之慎兮質鬼神公之相兮平如鈞公為邦兮政如春公不幸兮罹數屯公無辜兮介於循天開日明兮堯舜為君舉直措枉兮幽冤必伸牽復高資兮言旋洛濱逍遙琴筑兮無異隱淪屈指懸車兮歉然十旬素懷未遂兮美疹來臻悲廠田坴冕旒兮哀動搢紳寵贈加等兮冠于台臣有司職喪兮歸葬咸秦觀者歎息兮國人酸辛袁安餘慶兮令嗣兟兟陳實道廣兮門生振振乃纘徽猷兮刻於貞珉碑生金字兮名德長新維開成五年歲次庚申七月乙亥朔十一日乙酉哀弟嗣皇帝臣某伏惟大行皇帝德升上元功定內難百辟勸進萬姓樂推洎順人撫運嗣統立極凝旒建大中之道執契宏無為之化聰明天縱孝敬日新翼翼承九廟之祭蒸蒸奉三宮之養以文思光赤縣以武德澄滄海慈儉厚下端莊肅物達聰無不察黈纊若不知成湯之六事罔大禹之九功咸序學無常師惟格王是式仁必由已以蒼生為心修雅樂而簫韶成音戒逸遊而靈囿望幸遏外夷之教羈縻殆絶舉中古之典汪洋勃興宮禁無私恩嬪嬙無侈服每宰臣伏奏卿士宴見論道何啻於日旰恤刑已至於歲減大闢諫路深排幸門危言激訐惟理是聽匪唯納之而又賞之密戚貴寵惟法是訓匪唯戒之而又繩之禎符祕瑞王者之所寶郡國承詔寢而不揚鴻名徽號列聖之所重臣寮抗疏約而不受興起儒術修明祀事刻經誥於琬玉具宗廟之琮璜雞鳴而起孜孜於衆善日入而息矻矻於㣥書惇叙九族厚戚藩之恩協和萬邦敦戎狄之信至公不私於天性體道必從乎人欲應變懸解知機如神日者數逢俶擾星有謫見克已修德側身勵政和人心以保乂謹天戒而來祥復貞觀之故事編開元之政要旌別淑慝澄清品流一物失所必形於晬容百姓未康每勞於聖慮聽政餘力游藝緣情探二南之風雅窮六義之教化汾水著韶柏梁變體腴雋人口馨香國風南山崇崇京國之望不列祀典綿千百年舉神授職發自精懇興雲致雨響應虔祈至於出宮人放鷙鳥太官節重味之膳外府減任土之貢傾倉賑乏平糶恤饑蟲螟不為災水潦不成沴日月照臨天地含宏肖翹蠢蠕樂生遂性稽帝王之能事鄙封禪之虛美超邁三五度越聖賢由是四夷八蠻罔不來廷九州六合罔不承順在宥天下十有五年於戲身居九重心遍萬㝢日用優濟時臻治平形悴神勞至於大漸啓金縢而無驗憑玉几而有命顧屬冲昧丕承寶圖祗奉神器懼不克荷今因山戒期復土備禮痛深手足哀結精靈呼天劈摽觸目增感夫諡者行之迹號者功之表採鴻生巨儒之議從公卿庶尹之請考彼古道易茲大名對越昊穹式揚徽烈謹遣太尉中書侍郎同中書門下平章事李謹奉冊上尊諡曰元聖昭獻孝皇帝廟號文宗伏惟聖靈昭格膺受茂典陰步馬宗社介福無窮嗚呼哀哉少平元和初官待詔天列鈎陳之象國維環衛之儀蒼旻立程圖諜斯載心膂之寄賢良是疇苟非副慎選曷以將軍纍代而居其位焉將軍姓王氏諱榮字榮與本太原人也肇自軒后延于周室自靈王喪道黜太子晉於河東時人號為王家子孫因以命氏子晉生敬宗為司徒至秦始皇大將軍翦子曰賁孫曰離皆以武略著名列于戰國策及漢昌邑中尉吉博通墳典形于書籍生二子長曰霸居太原次曰駿居琅琊公即霸之後矣自翦至魏凡三十四代有昶為征南將軍後遇西晉陵替子孫有過江者為江東盛族其不往者代有賢豪史傳備彰此無縷載隋季喪亂龍蛇起陸爰有唐之始祖舉義師于北京惟公之先宗嚮雄風於西土繇是奕葉承緒因家上京曾祖元皇越州長王父思獻唐元功臣行右龍武軍大將軍父崇俊皇開府儀同三司行左龍武軍大將軍事莒國公兼京城功德使贈太子太保慶有所屬世無乏賢猗歟將軍即太保之元子也高門有嗣美玉無瑕識鑒精通知謀周達忠孝立志溫良飾躬總角精乎兩經弱冠窮于三略文武不墜剛柔得中風姿逸㣥果斷在已公門家子也肅宗皇帝美公先父有勤勞于國有訓導於家爰自妙年授公左龍武軍司戈廣德初轉本軍中候未幾遷同州伏龍府折衝賜紫金魚袋本軍宿衛皆特降恩煦寵於勳賢代宗之初蕃戎豕突烽燧西舉鑾輿東巡公之父子俱為侍從翼戴往復公家是先特拜公陝府元從游擊將軍守左龍武軍馮翊府左郎將上柱國太原縣開國伯食邑七百戶公以恪居韶淑之年志出雲霄之路勤守職業色養無虧雖居長上以公代有勳績將施延賞之恩特賜故右龍武軍將軍李敬照之長女以其令淑有聞由內而降為公之夫人也恩逾國戚寵過常倫服玩禮儀無非常賜渥澤雱霈未之前聞公謙冲有恆恭儉無替並謂禍生不意家釁洊臻公柴骨棘心居苫枕塊左右墳闕薦奠朝晡覩之者涕零聞之者惻怛可謂至孝之至恭仁之闕數年後遷右神武軍翊府中郎將尋改右清道率府率建中末賊泚扇奸乘其不虞禍起肘腋宮室蜂蠆車駕郊畿公乃奔馳扶輪躬奉矢石出歿生死羽衛君王是知仁者必有勇也上嘉其誠特封武威郡王食邑三千戶實封五百戶逮於克復城闕載酬厥勳興元初拜奉天定難功臣雲麾將軍守右監門衛率府率尋充左龍武軍南仗使八年轉左內率府率軍職如故公家之事知無不為晝警夜巡考課尤著有詔補本軍通直將軍職其將遷望亦增重松竹之操森然可觀貞元末特拜左龍武軍事居文明之代翊舜禹之君嗣業既彰軍風載振昔宏農楊氏四世三公今太原王君三代三品於戲德宗皇帝奄忽升遐順宗欽明踐祚皇極公以冊立之重拜御史中丞尋加鎮軍大將軍賜一子正員八品改贈先父太子太保殊常之澤併集公門雖承湛露之恩不易履冰之誡霜仗增肅天門益雄規謨昭彰職事修舉前後倫類莫之與京於是書芳躅於武經寫丹青於麟閣俄乃紫微遷位皇室荐哀二帝山陵六軍扈蹕羽儀爭勝公也推先煥采寶歷新升恩加近侍遷本軍大將軍兼御史大夫佩玉腰金珠門綵㦸昔馬援有伏波之號班超揚定遠之名雖門望同途終華裔別實豈若登壇柱國授鉞中朝晝列彤庭暮嚴清禁渙汗之重孰云比肩至如君盡其臣忠子及於父位萬乃有一公其獲諸公之性也矜孤愍窮寬仁厚德不伐其善無施其勞忠孝仁義全乎始終財帛洽於姻親粟祿霑于鄉黨享福居崇固其宜矣公當拜命之始將軍疑有事於南郊獻鋒鋭者盈於九門積玉帛者來于萬國公為六軍之首將持百代之名敷陳盛儀回出㣥格美望充於朝野嘉聲達於聖聰因賜二子出身用旌厥德公竭乃筋力罄於心神靡盬自哀積勤致疾天醫繼路御餌盈庭雖上命以惜賢竟膏肓之罔救公纍官十任歷事五朝謀猷克申威惠斯在猶以遺訓貽乎子孫身後之儀靡不詳告有始有卒公其得之公嘗謂知已曰大丈夫誓當開拓疆境掃滌欃槍誅鋤奸凶廓清華夏致君堯舜之上榮名管葛之前豈可保位金門坐安天祿而已何乃壽齡不永事與願違未盡所試奄辭明代嗚呼元和二年十月二十一日薨於道政里之私第享年五十有六萬乘眷勳勤之德徹食傷嗟三軍思撫育之情攀轅慟泣意夫卞氏之玉絶跡於良時隋侯之珠韜光於幽壤翩翩盛德足繼前修亹亹餘風揚乎後代亦可謂歿而不忘者也來年十一月二十四日丹旐既舉青烏告期有司上聞錫葬殊等出天厨以饗奠俾中貴以臨喪鹵簿溢於郊衢笳簫震于阡陌寵光存歿澤被幽明棲神於鳳城東南龍首原先塋之左禮之至也夫人隴西郡夫人李氏婦德柔明母儀貞順視孤惸以灑泣撫靈櫬以銷魂追思飾終罄竭家産嗣子朝散郎前行左內率府録事參軍太原縣開國公諒及王女等或婉淑冲和或貞剛勵節各稟家訓修于令聞絶漿豈獨於曾參負米猶思於子路終天罔極叩地何追慮嘉躅之遺聞請修文以記德豫以素承交契見託臨終辭之不俞聊載貞石銘曰禺禺聖君兮諤諤良臣惟德是輔兮皇天匪親國有環衛兮天有鉤陳心膂之寄兮疇咨哲人將軍之孫兮將軍之子開國承家兮提綱振紀君臣浹洽兮永冀終始形圖彩閣兮名列青史彼蒼者天兮殲我中賢皇王軫悼兮士旅澘然于以展恩兮式奠几筵于以飾終兮鹵簿旌旃龍首之原兮鳳城之前蕭蕭白楊兮窅窅黃泉立石刻銘兮紀勳紀德揚名播美兮千年萬年鴻祖潁川人老父姓賈名昌長安宜陽里人開元元年癸丑生元和庚寅歲九十八年矣視聽不衰言甚安徐心力不耗語太平事歷歷可聽父忠長九尺力能拽倒牛以材官為中宮幕士景龍四年持幕竿隨元宗入大明宮誅韋后奉睿宗朝㣥后遂為景雲功臣以長刀備親衛詔徙家東雲龍門昌生此歲趫捷過人能搏柱乘梁善應對解鳥語音元宗在藩邸時樂民閒清明節鬬雞戲及即位治雞坊於兩宮間長安雄雞金毫鐵距高冠昂尾千數養於雞坊選六軍小兒五百人使馴擾教飼上之好之民風尤甚諸王世家外戚家貴主家侯家傾帑破産市雞以償雞值都中男女以弄雞為事貧者弄假雞帝出游見昌弄木雞於雲龍門道傍召入為雞坊小兒衣食右龍武軍三尺童子入雞㣥如狎㣥小壯者弱者勇者怯者水穀之時疾病之候悉能知之舉二雞雞畏而馴使令如人護雞坊中謁者王承恩言於元宗召試殿庭皆中元宗意即日為五百小兒長加之以忠厚謹密天子甚愛幸之金帛之賜日至其家開元十三年雞籠三百從封東嶽父忠死泰山下得子禮奉尸歸葬雍州縣官為葬器喪車乘傳洛陽道十四年三月衣鬬雞服會元宗於溫泉當時天下號為神雞童時人為之語曰生男不用識文字鬬雞走馬勝讀書賈家小兒年十三富貴榮華代不如能令金距期勝負白羅繡衫隨軟輿父死長安千里外差夫持道挽喪車昭成皇后之在相王府誕聖於八月五日中興之後制為千秋節賜天下民牛酒樂三日命之曰酺以為常也大合樂於宮中歲或酺於洛元會於清明節率皆在驪山每至是日萬樂具舉六宮畢從昌冠雕翠金華冠錦袖繡襦袴執鐸拂導㣥雞叙立於廣場顧眄如神指揮風生樹毛振翼礪吻磨距抑怒待勝進退有期隨鞭指低昂不失昌度勝負既决強者前弱者後隨昌雁行歸於雞坊角抵萬夫跳劍尋撞蹴毬踏繩舞於竿顛者索氣沮色逡巡不敢入豈教猱擾龍之徒歟二十三年元宗為娶梨園弟子潘大同女男服佩玉女服繡襦皆出御府昌男至信至德天寶中妻潘氏以歌舞重幸於楊貴夫婦席寵四十年恩澤不渝豈不敏於伎謹於心乎上生於乙酉雞辰使人朝服鬬雞兆亂於太平矣上心不悟十四載胡羯陷洛潼關不守大駕幸成都奔衛乘輿夜出便門馬踣道穽傷足不能進伏入南山每進雞之日則向西南大哭祿山往年朝於京師識昌於橫門外及亂二京以千金購昌長安洛陽市昌變姓名依於佛舍除地擊鐘施力於佛洎太上皇歸興慶宮肅宗受命於別殿昌還舊里居室為兵掠家無遺物布衣憔悴不復得入禁門矣明日復出長安南門道見妻兒於招國里菜色黯焉兒荷薪妻負故絮昌聚哭訣於道遂長逝息長安佛寺學大師佛旨大歷元年依資聖寺大德僧運平往東市海池立陀羅尼石幢書能紀姓名讀釋氏經亦能了其深義至道以善心化市井人建僧房佛舍植美草甘木晝把土擁根汲水灌竹夜止觀於禪室建中三年僧運平人壽盡服禮畢奉舍利塔於長安東門外鎮國寺東偏手植松柏百株構小舍居於塔下朝夕焚香灑掃事師如生順宗在東宮捨錢三十萬為昌立大師影堂及齊舍又立外屋居游民取傭給昌因日食粥一杯漿水一升臥草席絮衣過是悉歸於佛妻潘氏後亦不知所往貞元中長子至信衣並州甲隨大司徒燧入覲省昌於長壽里昌如已不生絶之使去次子至德歸販繒洛陽市來往長安間歲以金帛奉昌皆絶之遂俱去不復來元和中潁川陳鴻祖攜友人出春明門見竹柏森然香煙聞於道下馬覲昌於塔下聽其言日之暮宿鴻祖於齊舍話身之出處皆有條貫遂及王制鴻祖問開元之理亂昌曰老人少年以鬬雞求媚於上上倡優蓄之家於外宮安足以知朝廷之事也然有以為吾子言者老人見黃門侍郎杜暹出為磧西節度攝御史大夫始假風憲以威遠見哥舒翰之鎮涼州也下石堡戍青海城出白龍逾葱嶺界鐵關總管河左道七命始攝御史大夫見張說之領幽州也每歲入關輒長轅挽輻車輦河間冀州傭調繒布駕轊連軏坌入關門輸于王府江淮綺縠巴蜀錦繡後宮玩好而已河州燉煌道歲屯田實邊食餘粟轉輸靈州漕下黃河入太原倉備關中凶年關中粟麥藏于百姓天子幸五嶽從官千乘萬騎不食于民老人歲時伏臘得歸休行都市閒見有賣白衫白疊布行鄰北廠墨間有人禳病法用皂布一尺持重價不克致竟以幞頭羅代之近者老人扶杖出門閲街衢中東西南北視之見白衫者不滿百人豈天下之人皆執兵乎開元十二年詔三省侍郎有闕先求曾任刺史者郎官缺先求曾任縣令者及老人見四十三省郎吏有理刑才名大者出刺郡小者鎮縣自老人居大道傍往往有郡太守休馬於此皆慘然不樂朝廷沙汰使治郡開元取士孝悌治人而已不聞進士宏詞拔萃為之其得人也大略如此因泣下復言曰上皇北臣穹廬東臣雞林南臣滇池西臣昆夷三歲一來朝會視之禮容照之恩澤衣之錦絮飫之酒食使展事而去都中無留外國賓今北胡與京師雜處娶妻生子長安中少年有胡心矣吾子視首飾華服之制不與向同得非妖物乎鴻祖默不敢應而罷去絢字文明宰相執誼子大中時歷吏部司封員外郎江陵少尹絢少陸機入洛之三歲多重耳在外之二年自襄陽負書笈至江陵拏葉舟泝巫峽抵白帝投謁故贈兵部尚書賓客中山劉公二十八丈求在左右學問是歲長慶元年春也蒙丈人許措足侍立解衣推食晨昏與諸子起居或因宴集命坐與話論大扺根於教誘而解釋經史之錯謬及國朝文人劇談卿相新語異常夢話美譽善謔卜祝童謠佳句廋詞即席聽之退而默記或染翰竹簡簪筆書紳其不暇記録因循遺忘者不知其數在掌中梵夾者百存其一焉今悉依當時逐日所話而録之不復編次矣號曰劉公嘉話録傳之好事以為談柄也時大中十年二月朝散大夫江陵少尹上柱國京兆韋絢序
