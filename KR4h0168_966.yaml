front:
  text: 全唐文欽定全唐文卷九百六十六闕名七
  hash: sha256:2d8b78de58148dde6a2a6a50a3f4530efecde065426b02abb89f9e0d666511ac
body:
  text: 臣伏以宿衞官健素有名額因循相習漸慢常經臣自受任以來每懷憂懼縱寬尸祿何敢敗官況臣丙夜自當竊希往䠱酉點親至備聞前規據人數纔二百以來準元額不及大半去二月十三日已具陳奏令臣搜求諸頭冗剩量減所由資課詢謀舊例斟酌事情遂遣抽收四百四十名人數既足他處驅使亦無欠闕輒具條流伏乞勅臣當司永為遵守京兆府奉先縣鹵池側近陂泊池井應有水柏柴燒作灰煎鹽等臣勘按先據雨池榷鹽使申長慶三年二月十五日於奉先縣界捉獲水柏柴灰四十石六斗二升數內取一石煎得鹽一十二斤一兩使司恐是盜刮鹻土妄稱是水柏柴灰重收採水柏柴三十斤燒得灰二斗二升煎得鹽二斤一十二兩緣從前未有明勅禁斷所以百姓故有抵犯伏以柏柴灰比曾煎試據所獲灰准舊試例約得鹽一斗八升比類鹻土煎鹽所收鹽分數較多其鹻土亦有勅條禁止其水柏柴灰亂法甚於鹻土不可因循臣今商量從今已後捉獲盜採水柏柴灰重一十二斤即計鹽一斤犯灰一斗即計鹽一斤四兩並准兩池例八斤計折同犯刮鹻土煎鹽勅條節級科罰所冀鹽法齊一榷課免虧准四年五月起請節文伏以三衞出入禁署子弟期於恭恪近日頑弊者非正身諸司公言納資訪聞亦不雇召士庶假蔭混雜搢紳倖隙一開奸濫紛入其資三衞並請停廢伏以為官擇人實資進選舉能考績固切旁求必當按實循名聽言觀行事合先於徇眾道必惡於自媒進退之間風俗所繫近日人多干競跡罕貞修或日詣宰司自陳功狀或屢瀆宸衷曲祈恩波乏受爵讓能之賢啟施勞伐善之弊亦有粗因勞績已受官榮及居今任別無課効唯引向前事狀祇希更與遷陞凡是此流稍要立制伏望自今後應緣官闕須有除授先選吏跡有聞行已務實者隨才獎用如有志涉浮躁事近邀求者量加擯斥所覬官修其方人思勵行元和四年閏三月四日勅應有鉛錫錢並合納官如有人糾得一錢賞百錢當時勅條貴在峻切今詳事實必不可行只如告一錢賞百錢則有人告一百貫錫錢須賞一萬貫銅錢執此而行是無畔際今請令以鉛錫錢交易者一貫以下州府行常杖決脊杖二十十貫以下決六十徒三年過十貫以上集衆決殺其受鉛錫錢交易者亦准此其鉛錫錢並納官其能糾告者一貫賞五千不滿貫者准此計賞累至三百千仍舊取當處官錢給付其所犯人罪不至死者徵納家資充填賞錢謹按凱樂鼓吹之歌曲也周官大司樂王師大獻則奏凱樂注云獻功之樂也又大司馬之職師有功則凱樂獻於社注云兵樂曰凱司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝楚振旅凱入魏晉以來鼓吹曲章多述當時戰功是則歷代獻捷必有凱歌太宗平東都破宋金剛其後蘇定方執賀魯李勣平高麗皆備軍容凱歌入京師謹檢貞觀顯慶開元禮書並無儀注今參酌今古備其陳設及奏歌曲之儀如後進士舉人先試帖經并畧問大義取經義精通者次試議論各一首文理高者便與及第其所試詩賦並停者伏請帖大經各十帖通五通六為及格所問大義便於習大經內准各明經例問十條仍對衆試口義伏惟新制進士畧問大義緣初釐革今且以通三通四為格明年以後並依明經例其所試議論請各限五百字已上為式准勅差孟琯巡察米價其江西湖南地稱沃壤所出常倍他州俾其通流實資巡察若便空行文牒或慮遠郡未委詔條今孟琯既下淮南即去洪潭不遠伏望便令兼去洪潭當司藏書六萬餘卷列官三十一員廨署傾危祕閣摧破久未修葺漸恐費功伏當陛下文明之朝天下宗聖萬方觀德之日海內崇儒之時今者棟宇欹斜圖籍缺落臣忝職司輒申伏乞特下有司計料修葺便加功力庶得完全准太和元年九月十九日勅釐革兩畿及諸道奏請州縣官唯山劒三川硤內及諸道比遠許奏縣令錄事參軍其餘並停自勅下以來諸道累有奏請如滄景德棣勅後已三數員伏以勅令頒行不合違越苟有便宜則須改張自今以後山劒三川硤內及諸道比遠州縣官有出身及前資正員官人中每道除錄事外望各許奏三四員如河北諸道滄景德棣之類經破傷之後及靈夏邠寧麟坊涇原振武豐州全無俸料有出身人及正員官悉不肯去吏部從前多不注擬如假攝有勞望許於諸色人中量事奏三四員其餘勒約及期限並依太和元年九月十九日勅處分三銓正令史每銓元置七人今請依太和元年流外銓起請置五人減下二人南曹令史一十五人今請依太和元年流外銓起請節文減下三人當司兩銓侍郎廳伏以吏部居文昌首曹侍郎為尚書貳職銓庭所宜順序廳事固有等差舊以尚書廳之次為中銓其次為東銓自乾元中侍郎崔器以當時休咎為虞奏改中銓為西銓以久次侍郎居左以新除侍郎居右因循倒置議者非之伏請今以後以久次侍郎居西銓以新除侍郎居東銓伏准僕射上儀故事自御史中丞吏部侍郎以下羅拜階下准元和七年雜定儀注全無受拜之禮當時盡以僕射非其人所殺禮臣等以為祇合係官之輕重不合為人而升降受中丞侍郎拜則似太重答郎官以下拜則似太輕臣等商量令諸司四品以下官及御史臺六品已下并郎官並望准故事餘依元和七年勅處分准太和三年十一月十八日赦文天下州府兩稅占留支用有定額其殘欠羨餘錢物並合明立條件散下諸州府者伏以德澤宏深優裕郡縣申明舊勅曉示新規使其政有準繩法無差謬實天下幸甚又諸州應有城郭及公廨屋宇器械舟車什物等合建立修理須創制添換又當州或屬將校所由有巡檢非違追捕盜賊須行賞勸合給程糧者又當州或百姓貧窮納稅不逮須矜放要添貨物者又當州遇年穀豐熟要收糴貯備以防災歉者應開元禮學究一經二禮三史明習律令科人等准太和元年十月二十三日勅散試官及白身人並於禮部考試其有出身及有官人並吏部科目選者凡是科目本合在吏部試自分兩處考試每處皆別與人數轉多事理非便臣等商量坐准前吏部收試其諸節目並准太和元年十月二十三日勅處分當司准赦書節文緇黃之眾蠶食生人規避王徭凋耗物力應諸州府度僧尼道士及創造寺觀累有禁令尚或因循自今以後非別勅處分妄有奏請者委憲司彈奏量加貶責於百姓中苟避徭役冒為僧道所在長吏重為科禁者謹具起請條件如後准天寶八年十一月十八日勅諸州府僧尼籍帳等每十年一造永為常式者其諸州府近日因循都不申報省司無憑收管造籍起今已後諸州府僧尼已得度者勒本州府具法名俗姓鄉貫戶頭所習經業及配住寺人數開項分析籍帳送本司以明真偽又將諸州府及京城應置方等受戒僧尼身死及還俗者其告牒勒本寺綱維當日封送祠部其餘諸州府勒本州申送以憑注毀又諸州府僧尼籍帳准元勅十年一造今五年一造又天下僧尼冒名及非正度者緣經恩赦自太和三年十一月十八日勅前無憑追勘自今已後伏請切加禁斷先度者具名申省省司各給牒知為憑入籍又正度僧尼並列於省司請告牒其僧尼童子自今已後不得令私度如有此色勒當寺綱維申報本管長吏其與剃頭師長及專擅出家者當便科決勒還俗其綱維不申報十日已上勒停解便令出寺其所在長吏不為糾舉者具名銜奏聽進止又諸州府及兩京除舊寺破壞要修理外並不創建造寺仍請具每州縣管寺幾所每寺管僧尼幾人並請具寺額僧尼名申省如有創造寺舍委本管長吏切加禁斷其僧尼有不依典教興販經紀行船駕車擅離本寺於公衙論競及在俗家夜結戒壇書符禁呪陰陽術數占相吉凶妄陳禍福既虧釋教與俗無殊自今已後切加禁斷如有此色委所在長吏量情科決使勒還俗其天下州府村坊佛堂普通私色蘭若義井等並請割屬當州府寺收管又伏准元和元年二月十日勅京城及諸州府寺觀銅鐘因有破損須更製造者請令州府申牒所司奏聞勅下許以本鐘再鑄不得更別添銅者其諸州府近日皆不守勅文擅有鼓鑄自今已後並令申省臣等伏以當司公事廢闕多年名額空存事皆去本因起請再舉舊規比類參詳依格請量抽太和三年終已來至今年三月四月已來得員及計人成三考闕四十五員伏緣去冬諸色黃衣參選者倍多於常年其間十七人皆是勳臣貴戚及常參官子弟不可任遠處州縣官三銓以當年合用闕方員發遣之外每選各有十餘人未得官今請准元和中及長慶初勅例據現在人數量抽前件闕注擬畢具所用闕聞奏湖南管內諸州百姓私鑄造到錢伏緣衡道數州連接嶺南山洞深邃百姓依模監司錢樣競鑄造到脆惡姦錢轉將賤價博易與好錢相和行用其江西鄂岳桂管嶺南等道應有出銅錫處亦慮私鑄濫錢並請委本道觀察使條疏禁絕准貞元十八年四月一日勅諸親注得外官欲赴任自今已後每年須先奏聞者今請至時准勅簡勘聞奏其諸親已薨歿子弟注得外官者准前後勅合奏聞起自今已後請便赴集更不在重奏限其給解處審勘責仍於家狀一一具奏諸親等第如違駁放應屬諸使外內百司度支戶部鹽鐵在城及諸監院畿內并諸州監牧公主邑司等將健官典所繇等准承前例皆令先具挾名勅牒州府免本身色役自艱難已後事或因循多無挾名自補置恣行影占侵害平人自元和二年長慶元年寶歷元年太和三年前後赦令約勒皆令條疏及勒具挾名聞奏所司竟未遵行姦弊日深須有釐革況聖王在上百度惟新內外有司悉心奉法改更置制今也其時臣等若又依違蒼生何由蘇息望合令本軍本使本司勘會據元勅元管數額合食衣糧資課糧料人具挾名補置年月鄉里分析聞奏此外不得更有影占自此之後有逃死補替仍每年終具替人挾名闕聞奏其挾名限勅下三箇月內聞奏畢左右神策六軍威遠營除請依餘一切委本軍條疏理訖具數聞奏其餘諸司諸使并令御史臺勾當依限申奏仍切加訪察勿許因循諸道節度觀察防禦經畧等使有子孫授京城及諸州府官合赴任奏請勾留在本道事伏以本置官員藉其任守吏曹注擬皆是職司況調選須有出身合年十五已上比及於二十以下十年則二十五年足可以為成人矣今則皆稱年小奏請勾留在於相承習以成例若實年小即不合早補身名若實當年又何慮為官不了今請諸方鎮子孫應選授及奏授官一切勒歸本任不得輒更奏留如或恩出殊常特賜一子者年五十已下即任奏聽進止庶得藩方絕塵冒之請州府無假攝之官中外遵承典章不紊伏準太和三年十一月十八日赦文天下除兩稅外不得妄有科配其擅加雜榷率一切宜停令御史臺嚴加察訪者臣昨因嶺南道擅置竹練場稅法至重害人頗深伏請起今已後應諸道自太和三年準赦文所停兩稅外科配雜榷率等復却置者仰勅至後十日內具却置事由聞奏仍申臺司每有出使郎官御史便令嚴加察訪苟有此色本判官重加懲責長吏奏聽進止國之根本係於生靈人之性命懸於守宰刺史猶官重事隔莫得躬親親人之切無如縣令況自兵興以來仍歲災歉百姓凋弊救弊之術在於擇吏又錄事參軍糾察屬縣課責下僚一郡紀綱藉其提舉若曰令吏曹注擬無由得盡人才真偽難知貪廉莫辨准太和二年赦書已令揀擇緣吏部起請多有異同訪聞近年已來所舉殆絕又去年吏部舉請令郎官御史等舉薦堪為縣令錄事參軍者雖有保任之言殊非責成之道臺省官假使是其親故或素所深知既非得於任官未必究其事實豈若考績效於理所聽善惡於甿謠則政之否臧較然易辨臣等商量望令京兆河南尹及天下刺史各於本府本道常選人中揀勘擇堪為縣令司錄錄事參軍人名具課績才能聞薦其諸州先申牒觀察使都加考覈申送至吏部至選集日不要就選場更試書判吏部尚書侍郎引詣銓曹試時務狀一道訪以理人之術及自陳歷任以來課績令其一一條對但事理明切不假詞華取其理識優長者以為等第便於大縣及難理處注擬仍取稅五萬貫以下縣注授即免盡占常選人闕員其刺史所舉縣令錄事參軍如并有人人得上下考就加爵秩者任年考已深者便優與進改其縣令錄事參軍如在任績效明著兼得上下考及陟狀者許非時放選仍優與處分便委本州長吏聞薦庶得詳其實效如所舉縣令錄事參軍犯贓一百貫已下者刺史量削階秩一百貫已上者移守僻遠小郡觀察使望委中書門下奏聽進止其犯贓官縱累逢恩赦亦不在收敘之限所舉人中如有兩人善政一人贓犯亦得贖免如此則長吏切於求理須自擇才上奉朝章必無濫舉諸道諸使停罷郎官御史等望令罷職後其所任官經兩考已上方得冬薦如所任官未經考者許以罷職後計月日成兩考即得冬薦如考數未滿便冬薦者其所舉官量加殿罰如文學才行堪獎用者中書門下別加採擇不在此限諸州府上佐罷秩後便求本道薦狀入城今中外官員年不盈溢聞薦繼至除授稍難其上佐考滿後望量立年限經二年已上方得聞薦其非時替者更守二年即似稍屈望一年後許冬薦如才行政績為衆所知者望委中書門下搜訪與昇獎不在此限應諸州刺史除授序遷須憑顯效若非責實無以勸人近者受代歸朝皆望超擢在郡理績無繇盡知或自陳制置事條固難取信或別求本道薦狀多是徇情將明典章在覈名實伏請自今已後刺史得替待去郡一箇月後委知州上佐及錄事參軍各下諸縣取耆老百姓等狀如有興利除害惠及生人廉潔奉公肅清風教者各具事實申本道觀察使簡勘得實具以事條錄奏不得更為文飾其文狀仍與觀察判官連署如事無可稱者不在薦限仍望委度支鹽鐵分巡院周訪察各申報本使錄事如除授後訪知所舉不實觀察判官分巡院及知州上佐等並停見任一二年不得敘用如緣在郡贓私事發別議處分其觀察使奏取進止所冀吏皆禀法人獲乂安遷擢之時更無濫授准今年五月二十九日御史臺奏勅大事限二十日中事限十五日小事限十日奏畢刑部覆大事限十五日中事限十日小事八日奏畢詳臺司所奏即大理刑部兩司俱照詳具獄未經刑部覆一則失聖朝慎恤刑獄意二則未合以生事上黷聖聰伏請依舊程限大理寺斷了申刑部覆同訖方奏請准今月九日德音節文令監司於諸道搜訪名儒置五經博士一人者伏以勸學專門復古之制博採計當年講授多少以為考課等級應補當司諸學生等按學令儒術以備國庠作事之初須有獎進伏請五經博士秩比國子博士今左氏春秋禮記周易尚書毛詩為五經論語爾雅孝經等編簡既少不可特立學官更請依舊附於中經准太和四年十月二十五日勅大理寺決斷刑獄大事二十日中事十五日小事十日奏畢刑部詳覆大事十五日中事十日小事八日奏畢近日省寺詳斷有踰勅限七十餘日者抑由條奏之間未盡事理舞文之吏得以遷延往往決斷未下瘐死獄中臣請自今以後刑獄本曹詳覽奏狀有節目未具者大事七日內小事五日內條流事由只行一牒再勘本推官三日內具事由牒報省寺如情狀要節已具省寺不得以小小節目移牒往來四遠州府牒勘本推後事有不具結罪不得者請具事由奏聞不得更逾勅限又准貞觀三年七月十七日勅允推狀內錢物大段事狀已具小小節目未盡不妨詳斷者省寺更不要移牒盤勘又准名例律二罪俱發以重者論臣深詳勅文律意唯懼刑獄淹延使無辜者拘繫囹圄罪惡者潛啟倖門臣請勅下後御史臺嚴加察訪如或踵前廢格知彈御史臺不舉又省寺可斷不斷不具可結斷事情聞奏使結斷不得須便牒本處致其稽遲並請臨時量事大小論罪按罰先奉勅詳定前大理丞謝登新編格後勅六十卷者臣等據謝登所進詳諸理例參以格式或事非久要恩出一時或前後差舛或書寫錯悞並已下落及改正訖去繁舉要列司分門都為五十卷伏請宣下施行進士放榜舊例禮部侍郎皆將及第人名先呈宰相然後放榜伏以委任有司固宜精慎宰臣先知取捨事匪至公今年已後請便令放榜不用先呈人名其及第人所試雜文及鄉貢三代名諱並當日送中書門下便令定例准勅疎理諸色入仕人等今諸司流外令吏府史掌固禮生楷書醫工及諸軍諸使承優官典總一千九百七十二員共請權減六百五十七員兵部奏應管左右仗千牛僕寺殿中省進馬左右金吾仗長上共一百六十一員今三色共請減六十七員文簡武簡三衞每年三銓都請留六十人為定禮部奏明經宏文館生太廟郊社齋郎掌坐等共五百五十二人今六色共請減一百三十八人今月十七日臣等於延英奏事陛下以近歲陰陽不和水旱為害恐作事有乖於時令施教未合於天心問臣等讀月令因何停廢伏以堯命羲和之官以理四時節授人事至漢丞相魏相奏云陰陽者五事之本㣥生之命自古聖賢未有不由者也兼引高帝時相國蕭何奏云自天子王侯有土之君能法天地順四時以理國家身無旤夭年壽永久是奉宗廟安天下之大禮也顧選氣未應災害之作實恐由斯臣等商量古者敬其事則命以始請從來年正月依開元禮讀時令陛下御宣政殿如朝朔之禮兼請太常卿先撰儀注務於簡便以酌時宜所冀簡而易從行之可久准貞元二十一年六月六日勅訴事人不得越州縣臺府便經中書門下陳狀者近日狡猾論競皆不待州府推斷便來詣闕非惟煩黷天聽實亦頗啟倖門請自今已後有此類先科越訴罪然後推勘又准開元十二年八月二十四日勅比來小有訴競即自刑割自今以後犯者先決四十然後依法勘當伏以先自毀傷律令所禁近日此類稍多不至甚傷徒驚物聽請連勅牓白獸門如進狀又牙历耳者准前勅處分又鞫讞已具便合就行刑皆近歲時覬望恩澤或緣一人稱寃即十數人停決囚繫淹久奸吏用情自今後同罪人並伏雖一兩人解寃不相連者並先科決稱寃者依前收禁聞奏進士舉人自國初以來試詩賦帖經時務策五道中間或暫改更旋即仍舊葢以成法可守所取得人故也去年八月節文先試帖經口義論議等以臣商量取其折衷伏請先試帖經通數依新格處分時務策五道其中三道問經義兩道時務其餘並請准太和六年以前格處分今月九日閤內面奉進止令條流進士人數及諸色人等進士元格不得過二十五人今請加至四十人明經元格不得過一百一十人今請減十人伏以國家取士遠法前代進士之科得人為盛然於入仕須更指揮必使練達固在經歷起來年進士及第後三年任選委吏部依資盡補州府參軍緊縣簿尉官滿之後來年許選三考後聽諸使府奏用便入協律郎四衞佐未滿三考不在奏改限如任江淮官特與勉其綱使又聞每年貢士常僅千人據格所取其數絕少強學待用常年不試孤貞介士老而無成甚可惜之臣等商量望付所司精求行藝起來年添滿四十人及第仍委禮部於所試諸色貢舉人元格數內共減一十五人都守每年放出身黃衣人數永為定制編入常格庶令才人速得自効經於下位以致上達據大理寺申准詳斷安南經畧使韓約奏丹犯贓并欲謀惡事已准法處置訖者伏以追攝禁勘即是制囚不合專擅處置奉三月十九日勅宜付所司速詳斷聞奏今據寺申據律文反逆謀叛各有本條並無欲謀惡事之科又准律以贓入罪者除正贓見在流死勿徵據罪先勒張丹通款估納家資然後就刑慮涉情故又張丹男宗禮宗智等年皆幼弱張丹雖微愛州雖遠且常領郡則謂銜恩縱合重繩須候勅命既歸法寺必在正名苟輕荒服之刑是棄遠人之命伏以聖朝以慎恤為理以惠澤愛人每議典刑必行寬宥豈使一夫不獲吞恨九泉伏請聞奏推覆方可詳斷所冀事狀明白法令施行
