front:
  text: 全唐文欽定全唐文卷四百四十三晟字良器隴西臨洮人年十八從軍以戰功累遷左羽林大將軍大歷初拜開府儀同三司兼左金吾衞大將軍涇原四鎮北庭都知兵馬使封合川郡王德宗在奉天詔晟赴難授尚書左僕射同中書門下平章事收京城拜司徒改封西平郡王貞元三年拜太尉中書令五年畫像凌煙閣九年薨年六十七冊贈太師諡忠武
  hash: sha256:b87f9a8b6854f6a7817195b210b448b320de0202e20a493a20e1a45d8d6f2263
