body:
  text: 赦懷光有五不可河中抵京師三百里同州制其衝兵多則示未信少則力不足忽驚東偏何以待之一也今赦懷光則必以晉絳慈隰還之渾瑊康日知又且遷徙二也兵力未窮忽宥反逆四夷聞之謂陛下兵屈而自罷耳今回紇拒北吐蕃梗西希烈僭淮蔡若棄強示弱以招窺覬三也懷光既赦則朔方將士悉復敘勳行賞追還縑稟今府庫空殫物不酬滿是激其叛四也既解河中諸道還屯當有賜賚賞典不舉怨言必起五也今河中米斗五百芻槀且罄人餓死墻壁間其大將殺戮幾盡圍之旬時力窮且潰願無養腹心疾為後憂臣請選精兵五千約十日糧可以破賊田希鑒悖逆成性怙亂作奸頃因兇徒遂搆邪計昨者蕃眾効義左右官軍馮河祇供將期收復而涇原惡黨醜正害賢陷翻軍城殘賊忠義明班奔竄纔得全生河清忠勤終見肆毒職繇希鑒扇動逆類猖狂負國家之深恩受朱泚之節制包藏狡逆莫甚於斯臣昨者巡邊將欲安撫而希鑒潛勒步騎或在要衝名為迎臣實欲拒捍臣先令精銳以奪其勢次遣宣諭以慰其心雖云鴟張未暇設施跡其前後實不可容男艹口咢等罪惡既同謹並按軍令訖臣幸當重寄累受寵榮除惡之義思去本根報國之誠敢誅無禮況俯臨邊境須用忠良若容此人無以懲革頎字休明河南人累官京兆尹徙河南尹三遷工部尚書以太子少師致仕卒當今兵革未偃宜崇武教以尊古重忠烈以勸今欲有貶損非激勸之道也追尊王位以時祠之為武教之主若不尊其禮則無以重其教也文武二教國並宜立廢一不立况其典禮之制已歷二聖今欲改之恐非宜也浩代宗朝官駕部郎中雷車闐闐六合喧吼驟風雨於南極旋星雲於北斗蹙東海以波蕩擺太山而剖玉石至堅切如泥濘松柏至勁粉為枯朽鼉皮擊考而魑魅睒目易龍顏抵觸而鯨鯢奔走陶鑄造化之鑪而鴻毛萬像斡運乾坤之柄而嬰孩㣥有由是言則九鼎瑣細三山培塿鼒鼐可以指揮蓬萊可以背負殊不測離蒼天之遠近當懼驚魂在元雲之幾重徒勞矯首及夫白日雨歇長虹霽後列缺緩轡元冥假手蓄殘怒之未洩聞餘音之良久而小子之繆學敢獻疑於左右今若為善惡之宰主操賞罰之休咎胡不扶持顏閔之羶行夭閼桀跖之龜壽罪一亂臣懲天下之兇醜旌一孝行激天下之悌友法高懸於堯典刑不試於周后何必霹靂潛窟之龍養育吠堯之狗天地吾知至廣也以其無所不覆載日月吾知至明也以其無所不照臨江海吾知至大也以其無所不容納料廣以寸管測景以尺圭航大以一葦廣不能逃其數明不能私其質大不能亡其險偉哉夫子生後於天地而知始亡先於天地而知終非日非月光之所及者遠不江不海潤之所浸者博三代禮樂吾知其損益百王憲章吾知其消息君臣以位父子以親家國以肥鬼神以享道未可詮於無物釋未可證於無生一以貫之者我先師夫子見之矣夫子聖人也帝之聖者曰堯王之聖者曰禹師之聖者曰夫子堯之德有時而息禹之功有時而窮夫子之道久而彌彰遠而彌光用之者昌捨之者亡昔否於宗周今泰於皇唐不然者何被衮而裳垂旒而王者哉扶風古縣也在京之西環渭而北望標關輔之首雄壓劇秦之大有尉曰袁弁者學稽漢室名振伊鼎跡泯味道力餘攻文其為政也剛而能斷柔而能吐其理身也靜爾深谷澹然澄江紆大君之明命注賢相之清選寅奉聖旨廓新祠堂殿宇岑立宮墻島峙睟尊儀於兩楹羅禮貌於十哲砌蘭有主院柏分行徂庭自肅入室知敬陳牲牢而在旅間籩豆而無算天下大軍之後時弊而沒禮域中小康之前俗媮而迷歸懿文以戢兵尚德以銷戰使人從善遠惡而不自知大哉袁氏之子其用心也至矣邑宰李公政事練達德音和理風聲樹而丕變甿頌樂而不支縣丞主簿尉等琅琊王畿黍稷公器覽容色窺相公之明鏡整鬐鬣趣相公之龍門雲霄坐馳鳴躍可俟浩客自帝輦聿來鳳翔入境而醉聞佳政歸歟而食味尤績前尉許摯起予能事春秋之徒如何勿書時大歷二年某月日記公宴堂昭儉也高平王尚猶侈焉先是王師出征邊遽告聳百戰俠骨委於溪澗九遷殤魂飛在草莽上聞而憐之詔我薛公為刑部尚書兼御史大夫保於東建節於鄴也時兵不滿百馬惟數駟府微棲糧家僅餘堵公乃掃除粃政濟活人命一年而墻宇興二年而耕稼盛日就月將遂臻夫小康崇其宴堂者不得已而營也豈無黕幕尚爾能可久豈無丹楹愛爾不愆素豈無錯石所慮轉他山豈無貨財所重仍舊貫其始也經搆侏儒迴移欒櫨率取諸大壯未暇於全模其終也嶷然雲橫燦以星鋪禮行於九賓並坐於千夫不設窗戶且防於壅閼不加剞劂且陋夫華皖水之以視其平坦墨之以視其方直役也應時宜其善頌成之匪日所謂悅使若軍中凱樂㣥下胥宴六佾咸在三懸既張清醑引淮芳饌羅岳自上而王侯公伯迨下而皁隸庖翟進則酣而不荒退則服之無斁及四賢講德七子會文拂羽扇而納凉揮素琴而待月對水得江湖之性捲簾見天地之心寂寂無譁綽綽有裕相與先評所職次徵他詞驟揚厥懿徐攻其短君子以為薛公義誘於眾仁和於物誘進則眾洽和同則物安俾夫聳善觀過罔不由斯堂也向使卑不合度儉不中禮適足尤孟孫之室美諷夷吾之山節浩躭靜辭蒲脂車訪舊入境而七德有餘及庭而三歎不足幸承君之惠顧又因此以賀之操觚斐然於是乎記時大歷三年六月旬有五日也朝徹大歷九年官華陰縣令唐大歷九年甲寅季春月哉生明華陰令盧朝徹下車散齋浹日精意選擇元辰吉蠲饙饎靡愛斯牲敬修祀事端笏祠宇縉紳奠饋敢告金天王粵山嶽配天聰明正直豈直禍淫實真祚德朝徹不佞獲領茲縣職監灑埽躬備陳薦顧嗟菲薄性受愚蒙清是家風所遺方乃天誘其衷與眾難合于時不容向老厲志如何遭逢抱拙恬澹委運窮通倘力于政王降百祿稍私其身王肆厥毒福謙害盈則仰嶽靈不識不知何敬神為拜手稽首兮氣莫敢怠躋庭啐酒兮儼然有待松柏颼颼兮屑窣若來容衞森森兮髣髴如在冕大歷中朝散大夫行河中府功曹參軍上柱國府君諱履清字履清京兆萬年人也王惟聖後系出田宗功闕也五代祖立行工部郎中更靈夏夔潭等四府都督封晉陽闕早世考尚賓歷原州參軍事定遠城兵曹參軍贈金紫光祿大夫闕藝尚德業脫畧諸子憲章五經處吏事也能果斷居朋友也無忌闕以桓文之勳伊呂之重開建大府邦家長城知其名而辟之闕中豳寧三道營田等務致使後來難繼前政知慙豈止充牣當時苟闕力寘夫恤弟疾篤割其股肉則所部靡草上之風矣秋麥兩歧靈芝闕旌表府君課効多此類也以前後功累遷官凡十五任而至金紫光祿闕汾陽王以吉昌濁河上流邊郡善地戎守夷落易動難安永言輯綏闕帝可其奏仍乘傳走郡又敷異術載底吉祥猛獸度河而去境感我善闕兩穗卿雲炳而五色瑞圖驟披臺使攸屆於是歸禾之詔藏在闕命賢愚同歸以大歷十一年正月廿四日遘疾不起薨於官舍之正寢享闕兄履堅朝散大夫守豐州長史弟履濟朝散大夫守慈州別駕長子綸朝闕塟合度以十二年二月廿日還塟於高陵之奉正原禮也名成於代宦達於闕匪敢愧詞迺為銘曰聖祀百世奕世其昌有媯之後言育於姜陳宗不守命氏惟王滔滔秦淮為我闕世濟其美芬芳竹素跌宕杞梓君家盛事不可勝紀天步未清闕上介部有仁兄歧麥挺秀靈芝發生邊郡近胡邑無完郛荊誰翦豺狼未驅闕皇帝曰俞下車幾何畏愛更作允文允武爰究爰度畜牧新泰謳歌薄洛以激闕竄孝子負土嘉禾有畔吉凶同域生死一貫倏忽長逝嗚呼永嘆舊邱還塟遠道闕日羽葆秋煙一掩黃泉於萬億年牧東平人永泰二年進士自尚書郎出為澤州刺史方輿之靜也軸居其重大輅之轉也軸當其用夫履端抱圓何所適而不中則有飾以金玉交以丹漆乍駢首於青案或周身於縹帙雖偶提而偶攜亦無固而無必故能退尺則不短進寸則不長得隨時之舒卷合君子之行藏劉向校書之時偏薰蘭氣楊雄草元之所獨染芸香其質則微其用不淺若輪轂之負載同戶樞之開轉能藏飛鶴之書更掩迴鸞之篆妙撝謙以處厚每求伸而先卷遭秦則玉質斯焚入漢則石渠可踐別有韜黃公之秘畧懷王烈之素書探禹穴而誰見啟金縢而有諸仲宣之藏萬卷惠子之藏五車非我軸之何寶能懷文以自如豈俟脂膏後運枘鑿方虛彼所恃而有待假經籍為蘧廬大哉將聖樂天知命憲章文武昭宣孝敬遊道藝之門觀魯衞之政知禮文之述作繫王道之衰盛將有託於知音故先擊其浮磬翕如始奏泠然激揚旁達草木獨調宮商律中乃節而信清引而越以長何一氣之立則若五色而成章羽可以振振獸可以蹌蹌神人以和舍此奚取樂懸之位斯焉是將諧協於國風本一於心始將此易俗非為悅已作於朝而君臣同和聽於家而少長咸喜不達情者莫究其理不賞音者莫知其旨非有為而作焉豈苟樂而為爾噫斯道之行如磬之聲合於制度發以清英應小大以隨擊拊原始終不可將迎伊物情之滯隔莫不由此而發明謂為藝以吾不試語之道而知吾志固非繫而不食豈止垂之如墜曾見訪於萇宏反受嗤於荷蕢彼往而不返欲潔其身如樂之無節則可奪倫義有昧於反舌耳無聞於日新何沒沒於隱者亦硜硜於小人必也審音居然大辨動應而溥暢虛中而獨善使石聲無定則我心可轉初未明乎弛張庸詎議乎深淺一雅一變正聲久遣子擊此者亦屢歎之唯聖有作闡教命夔乃知樂正雅頌復在於明時論大歷九年趙州判官通直郎行昭慶縣丞惟六祀大鴻臚何公再踐諸侯奉若明命尹茲趙人人賴惠浹聿興謌之頌之懿鑠布濩逖聽洋溢恒之伯受鉞統牧實旌異政俾幕賓繕部員外郎兼侍御史王公載揚休烈垂裕長世刻貞石無以節省順人欲也序婉辭無以勤思崇茂德也其文見乎意曰惟恪修連率之職擇茲令典明于東土敦敘邦教撫柔元元次云咨我良二千石叶漢宣之議激流揚波輝光奕葉式遵讜言用集器宇益稱慎行克和厥中服勤於理簡易其俗君子曰王公之筆直而不汙夫采其英聲覩其儀形聲乃頌而不腆其實形乃表而不忒其素或曰理道之要龔黃未優成師之最衞霍猶劣吾儕小人嘗與二三子稽覈今古否臧時政格於㣥議莫出公右由是訟庭肅肅無畱事焉郡佐寮吏望公高軌而已公牆宇外嶷管庫內嚴非禮不動唯義是訓見危受命全其節臨難抗志忘其身所以馳騖喪亂之間寵錫和平之際昔堯命四嶽商朝諸侯周建牧伯作六瑞以等將勸親人莅事惟明公其至矣州人屬荐飢之歲如享公之膏粱寒露之時如服公之衣裘存安在危肅理在擾豪右姦宄伏其威繩樞寡弱懷其德而使商農工賈朝夕從事不異視而遷焉公嘗曰未戰修備兵之勢也未用資置物之理也推此例而理之萬貨之源可見矣故詢諸體物較之成用徵於前古其誰儔之夫頌德紀功之事不書其細而煥然昭明大體也論等忝竊幕吏敢攄無窮魯史之末固亦有製豈直敘述遺事益以廣揚不朽兼諸官屬具紀碑陰舟字公受水部員外郎岑之子以尚書郎奉使出為虔州刺史封隴西縣男臣某言今月日中使內府丞張某至伏奉敕書賜臣及軍將臘日面脂香袋紅雪澡豆等殊私忽臨捧戴無力手足蹈舞心魂若驚臣某中謝伏惟陛下以節遇嘉平律當凝閉爰布發生之德猥承頒賜之榮膏液廣霑降中天之渥澤生香遠及蘊西域之芳馨苦口以愈沉疴澡身以滌塵垢無任感戴屏營之至臣某言中使至伏奉敕書手詔賜臣新歷日一本口脂面脂紅雪紫雪金花各一枝并賜臣春衣一副牙尺一枚大將衣兩副宸翰忽臨殊賜兼及蠻夷捧詔抃躍輕生將吏受恩誓心効死臣某中謝伏以令節嘉平曲承寵賚凝膏芳潤獲滋蒲柳之容寶器珍奇遠承日月之照謬當重寄星歲屢移恩積邱山功無毫髮況元陰云暮斗柄初迴已霑芳澤之恩兼降中和之服頒賜尺於王度布新歷於荒陬躍抃徘徊罔知所報臣某言臣素以庸虛百無所取肅宗委臣方面擢尹兩京蓋以天寶末年祿山干命臣未有職位客遊陳州賊兵過河官吏奔竄臣義集驍勇亟摧賊鋒以閭閻之人當幽薊之卒勢相懸倍不顧死亡臣之輕生實著誠素今者回紇代立求援聖朝陛下大布皇威加其冊禮爰膺將命實受寵光又其道路無虞夏帳尤近擁旄仗節持憲珥貂銜非常之詔書寵內附之蕃落去獲重貺歸成大勳雖潦倒之人衰朽之士亦宜據鞍增氣叱馭前驅况臣常在軍戎未至遲暮豈不欲保微臣之富貴求陛下之恩私哉其理必至顛沛必至廢闕隱而不露何以事君臣往在宣州曾卒得癎疾三日三夜都不知人自此以來發無時候或輕或重或疾或遲此病所來得於風熱常因冒暑失食及冬衣太溫兼食羊肉立即發動若過磧之後更無菜蔬苦寒之地須加狐貉又於藥物不得及時則微臣不得全活且螻蟻之命誠何足言但恐敗事有失前期稽恩廢禮伏願陛下以臣此表徧訪朝臣言若涉虛事近辭避伏願加以斧鑕肆諸市朝且使將來永息欺詐無任哀懇迫切之至臣某言臣以久違闕庭歲請朝覲在宣州日伏奉德音且以河南用兵許臣事平入奏尋蒙寵命移鎮浙東臣自至越州旋經歲序瞻戀宸極道路轉遙俯察微躬疾病加劇實慮溘先朝露永謝明時昨者隨表便行冀蒙聖恩昭許續奉進止所在令迴伏迫宸嚴不敢冒進臣防身寡智處眾多尤但恐讟謗之聲日聞天聽浸潤之漸將迴聖慈憂疹相并死亡無日臣管州郡幸無逋懸西河之間又已寧靜伏願陛下察臣誠懇許臣朝謁實冀犬馬之疾歸上國而蠲除風波之言仰皇明而昭鑒無任懇迫之至臣某言臣一昨初承國哀號慕罔極已陳哀懇請赴山陵伏奉批答上遵遺旨不許奔會元宮甫閉攀扈無由永惟舊恩實延巨痛陛下自登寶位日月重光百靈昭蘇萬物咸覩臣限所守僻在海隅遐瞻闕庭未獲稱慶陛下湛恩雨施大號風行繁徭頓除窮海知化臣管內州郡幸獲安帖在臣使務必有常規將臨元會之期倍切朝宗之戀伏願許臣蹔趨天闕獲覲龍顏進稟命於聖君退宣風於遐壤臣死生無恨榮願之至三十三官足下近年已來宰臣當國多與故人禮絕僕以禮處足下則足下長者僕心未忍欲以故人處足下則慮悠悠之人以僕為詭我欲修書逡巡至今忽承足下出守夔國於蒼生之望則為不幸為足下謀之則名遂身退斯又為佳僕昧時者謹以為賀但鄱陽雲安道阻且長音塵寂蔑永以三歎僕所疾沈痼方率子弟力農為世疎矣足下亦焉能不疎僕耶足下素闕僕所知之其於得喪固怡如也然朝臣如足下寡矣明主豈當不察之耶惟強飯自愛珍重珍重傳曰物生而後有象象而後有滋滋而後有數數成而文見矣始自天地終於草木不能無文也而况於人乎且夫日月星辰天之文也邱陵川瀆地之文也羽毛彪炳鳥獸之文也華葉彩錯草木之文也天無文四時不行矣地無文九州不別矣鳥獸草木之無文則混然而無名而人不能用之矣人無文則禮無以辨其數樂無以成其章有國者無以行其刑政立言者無以存其勸誡文之時用大矣哉在人賢者得其大者禮樂刑政勸誡是也不肖者得其細者或附會小說以立異端或雕斲成言以裨對句或志近物而玩童心或順庸聲以諧俚耳其甚者則矯誣盛德汙衊風教為蠱為蠧為妖為孽噫文之弊有至是者可無痛乎天后朝廣漢陳子昂獨泝穨波以趣清源自茲作者稍稍而出先大夫嘗因講文謂小子曰吾友蘭陵蕭茂挺趙郡李遐叔長樂賈幼幾洎所知河南獨孤至之皆憲章六藝能探古人述作之旨賈為元宗巡蜀分命之詔歷歷如西漢時文若使三賢繼司王言或載史筆則典謩訓誥誓命之書可彷彿於將來矣嗚呼三公皆不處此地而運蹇多故惟獨孤至常州刺史享年亦促豈天之未欲振斯文耶小子所不能知也已矣常州諱及有遺文三百篇安定梁肅編為上下帙分二十卷作為後序常州愛士而肅最為所重討論居多故其為文之意肅能言之比塟博陵崔貽孫又為神道碑悉載行事而痛其不登論道之位崔公剛而好直其詞不黨君子謂之知言昔班孟堅美漢得人之盛曰文章則司馬遷相如又曰劉向王裦以文章顯是則四君子者有漢之文雄歟然而遷無鄉曲之譽虧大雅明哲保身之美相如薄於貞操有滌器受金之累向無威儀遺文以繆而身幾不免裦多為歌頌當時議者以為淫靡不急其他無聞焉大較詞人多陷輕躁否則愞狹迂僻於事放弛其能蹈履中道可為物主者寡矣孰與常州發論措詞皆王霸大畧孝悌之至達於神明善與人交久而敬之當官正色不畏強禦加之以仁惠愛物吏民敬畏而文又如是乎其餘則二君既言之矣今亶錄崔氏之作綴於篇末云爾
