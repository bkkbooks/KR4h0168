front:
  text: 全唐文欽定全唐文卷二百九十張九齡八
  hash: sha256:c9bfa349d95ef15ee963039f45fc3e4cc64870daf2f1d4196f39e5961e13e041
body:
  text: 伏以天者百神之君王者所由受命也自古繼統之主必有郊配之義葢以敬天命報所受也故於郊義則不以德澤未洽年穀未登凡事之故而闕其禮昔者周公郊祀后稷以配天謂成王幼沖周公居攝猶用其禮明不可廢也漢丞相匡衡曰帝王之事莫重乎郊祀董仲舒又云不郊而祭山川失祭之事且逆於禮故春秋非之臣謂衡仲舒古之知禮皆以郊之祭所宜先也陛下紹休聖緒於今五載既光太平之業未行大報之禮考之於經義或未通今百穀嘉生鳥獸咸若夷狄內附兵革用弭乃怠於事天恐不可以訓願以迎日之至升紫壇陳采席定天位則聖典遵矣慶禮在人苦節為國勞臣一行邊陲三十年所戶庭可樂彼獨安於傳遞稼穡惟艱又能實於軍廩莫不服勞辱之事而匪懈其心守貞堅之規而自盡其力有一於此人之所難況營州者鎮彼戎夷扼喉斷臂逆則制其死命順則為其主人是稱樂都其來尚矣往緣趙文翽作牧馭之非才自經隳廢便長寇孼故二十年閒有事東鄙僵屍暴骨敗將覆軍葢不可勝紀大明臨下聖謀獨斷恢祖宗之舊復大禹之迹以數千之役徒無甲兵之強衞指期遂往稟命而行於是量畚築執鼛鼓親總其役不愆所慮俾柳城為金湯之險林胡生腹心之疾葢為此也尋而罷海運收歲儲邊亭晏然河朔無擾與夫興師之費轉輸之勞較其優劣孰為利害而云所兦萬計一何謬哉及契丹背誕之日懼我犄角之勢雖鼠穴自固而駒牧無侵葢張星彼都繄賴之力也安有踐其跡以制其實貶其諡以徇其虛採慮始之謗聲忘經遠之權利義非得所孰謂其可請以所議更下太常庶表行之迹可尋易名之典不墜者也問興化致治必俟得人求賢審官莫先慎舉聖朝受命於今百齡堯封比屋魏網斯頓史曹之職衡鏡攸歸歲時調集士踰累萬借使崔毛重起裴樂復存觀貌察言且猶未暇考行徵實其可得乎若遠循漢魏之規復存州郡之選即務辭會府權歸外臺牧守之明何法能鑒變通之要厥路奚由文武之道並用無偏軍旅之制事宜經遠而越騎佽飛皆出畿甸丁年負甲耆日釋戈兦歿葢多軍容每闕今欲均井田於要服遵兵賦於革車恐習俗滋深慮始難就揆今酌古其衷若何且惠在安人政惟重穀頃承平既久居泰易盈編戶流兦農桑莫贍精求良吏未之能補遂其寬施則莫懲遊食峻其科禁則慮擾疲人革弊適時應有良術子等並明於國體允應於旁求式陳開物之宜無效循常之對對嗣魯王道堅所舉道侔伊呂科徵仕郎行祕書省校書郎張九齡伏覽睿問大哉國體九品流弊嘗所懵焉幸因對揚庶言其可古者諸侯貢士司徒論士必講禮觀能鄉舉里選故十五十八之歲大學小學之節誦習以時教化以禮則孝悌之行可知於鄉曲政事之業可升於國朝先王務教此其大者及周道既衰斯文將喪秦氏滅學唯力是親仁義大壞俊造亦兦漢高以馬上非禮復修三代之事魏武以軍中是務權立九品之儀後代因循莫能改作紛紛橫調滔滔皆是天下公器可謂傷心伏惟陛下神啟睿圖天佑明德物不終否故受之以泰弊不遂極乃鼎之以新滌瑕蕩穢今其時也伏願圖之夫正其本者萬事理勞於求者逸於使豈有大明御宇慮此假權之人循良擇人安得謝恩之議是則外臺會府真若滿於貯中濟理適時復何殊於掌上者也且有備無患兦戰必危是以振旅茇舍之儀羽林佽飛之衞漢家徵選咸出五陵周制供王不踰千里此以均其遠近會其中正王者之制豈虛乎哉必開井賦於要服俾裒益於畿甸雖經始之規何施不可而圖遠之業猶願勿遵且將振九品之頹綱維百王之絕略使官有位次資有等衰才苟不侔時所勿取使夫能者代上帝之理議者息高門之談吏精其心人享其利流庸不日而來復耕桑何憂乎不稔動之斯應綏之斯來若惟作法於末途非救弊之本意盛德大業孰與歸乎某怖慄塵埃棲棲非得言之地慷慨禾莠惓惓因獻策之時何敢望焉盡心而已謹對對王道務德不來不強臣霸道尚功不伏不偃武此勞逸異數得失可名故曰務廣德者昌務廣地者兦是時漢武事胡豈比重華之干羽秦皇戍越奚擬公劉之橐囊雖古人有言引之者有同於河漢而王者大化行之者必本於唐虞不亦然乎此則開基之大者也國家因巳有之地廣無私之仁犬戎即敘肅慎入貢若力不能救豈惟桓公之恥征在其蘇是必成湯之怨然而春秋所貴惟義所在內諸夏而外夷狄此明中國恐弊不興異域之功下人苟安何惜救兵之舉則知弔伐之義隨時之道也今頗彫弊抑非其時至如守塞則侯應之言為得斥地則蒙恬之弊可知前事昭昭足為明戒者也必欲繫單于之頸裂匈奴之肩奚霫背恩受制於北虜小人發憤請議于東征謹對對伏惟殿下德成問安教存齒學則孝悌之感元良之貞詠子衿之詩義形乎辭真吾君之子也天下幸甚幸甚伏以化憑於勢聲若順風之遠感因於時德甚置郵之速則何草不偃何心不應而曰未能動俗殿下之至謙也尚何術之務而捨此乎今又降意微言徵諸墜典至如黃帝斲木葢取諸意文王演卦乃言其象雖成象之時不同而得意之言一也周公制禮夏正得天縱損益可知而因循不改去聖既遠禮經殊殘遺文苟存㣥儒紛糅故喪服異制諸家殊軌故王肅之旨約情以斷鄭元之言引經取決呂氏因封侯之餘俗採禮官之舊儀故戴聖採十二紀之首為十二月令存周之典其故匪他仲尼以尊魯而取美於頌穆公以尊周而見序於書左氏以艷富稱誣穀梁以文清為婉范甯序事其義則詳樂書因秦而遂兦空有河閒之制夾氏在傳而不見惟餘班固之說謹對月日左拾遺張九齡謹奏記紫微令梁公閣下公登廟堂運天下者久矣人之情偽事之得失所更多矣非曲學之說小子之慮所能損益亦已明矣然而意有不盡未可息區區之懷或以見容亦猶用九九之術以此道也忍棄之乎今君侯秉天下之鈞為聖朝之佐大見信用渴日太平千載一時胡可遇也而君侯既遇非常之主已踐難得之機加以明若鏡中運如掌上有形必察無往不臻朝暮羲軒之時何云伊呂而已際會易失功業垂成而舉朝之眾傾心前人之弊未盡往往擬議愚用惜焉何者任人當才為政大體與之共理無出此途而曩之用才非無知人之鑒其所以失溺在緣情之舉夫見勢則附俗人之所能也與不妄受志士之所難也君侯察其苟附及不輕受就而厚之因而用之則禽息之首為知巳而必碎豫讓之身感國士而能漆至於合如市道廉公之門客虛盈勢比雀羅廷尉之交情貴賤初則許之以死殉體面俱柔終乃背之而飽飛身名巳遂小人恒態不可不察自君侯職相國之重持用人之權而淺中弱植之徒巳延頸企踵而至諂親戚以求譽媚賓客以取容情結笑言談生羽翼萬事至廣千變難知其閒豈不有才所失在於無恥君侯或棄其所短收其所長人且不知深旨之若斯便謂盡私於此輩其有議者則曰不識宰相無以得遷不因交遊無以求進明主在上君侯為相安得此言猶出其口某所以為君侯至惜也且人可誠感難可戶說為君侯之計謝媒介之徒即雖有所長一皆沮抑專謀選眾之舉息彼訕上之失禍生有胎亦不可忽嗚呼古人有言禦寒莫若重裘止謗莫如自修修之至極何謗不息勿曰無害其禍將大夫長才廣度珠潛璧匿無先容以求達雖後時而自寧今豈無之何近何遠但問於其類人焉廋哉雖不識之有何不可是知女不私人可以為婦矣士不苟進可以為臣矣此君侯之度內耳安用小人之說為固知山藏海納言之無咎下情上通氣用和洽是以不敢默默而已也願無以人故而廢其言以傷君侯之明此至願也幸甚幸甚自出江郡慰誨累及情義已積昆弟無喻人生相知可謂厚矣僕方請歸養從此告辭會面無期所懷當盡故復累而言之耳凡為前相所厚者豈必惡人耶僕爰自書生燕公待以族子頗以文章見許不因勢利而合但推獎之日不量不才引致掖垣有負時議然則初有超拔豈由本心嗷嗷之口曾不是察既不稱其服又加之讒閒負乘致寇幾於不免當此時也若無所容以孤特之身處背憎之地自怪既往何幸而全追想寒心怳怳發悸嚴子足下不意而然既而遠出猶有餘釁巧言潛搆期僕傾危故使者之來怒於心而色於事賴於自慎幸且無咎不者吹毛洗垢求其痕疵勢窮力屈將無控告未始怯事也有為而然以故春中有書薄言求庇足下猶不諒此意以為汲汲於聲名而乃約以莊生之言博以東山之法曉導精至誠故人之情向之所防有異來旨彼二教者忘情滅識無有纏愛故福至不喜禍至不憂今僕養親豈復割離恩愛直措心於此地哉正欲惟疾之憂全身遠害故雖在小小敢不兢兢至如自放身心雖復懵昧幸受教於君子亦聞道於古人豈不能少有所適方復屑屑於毀譽之際也管仲嘗三戰三北而鮑子不以為無勇以其有親足下寧不我知而有此誨且往者不自量力因緣小技䠥薛干進荏苒歷年固以為運屬盛明朝多君子義能容物而忘其孤陋則不知弊帚之貴末路多艱今專典一州葢幸遇已甚而平生萬事為寒暑所移雖忝簪纓若墜泉壑者耳誠恥令名之不副寵章也昔賈誼才偕管晏言則霸王名重漢廷官止梁傅班固猶云未為不遇況僕擬非其倫遇已過彼顧多慙色豈敢怨而更求歟足下知心當明義有所在耳尊者慈愛諸下懷寧本鄉不欲隨官重有離別春秋高矣晨昏久違僕豈復規規然徼無妄之福在悔恡之動而逈無所恃單孑獨立萬一蹉跌或遠庭闈朝心不開暮髮盡白行已五十獨不知命是以死抗疏乞歸侍藥一則潔膳以展下情二則辭滿而無貽憂周易曰飛鳥遺之音不宜上宜下葢取此義亦自卜者審也顧恨上負明主邱山之恩未有涓塵之答下愧知己契獎之力卒無如言之效又平生不飾小節苟取虛名使吠聲之徒退有後議竟未獲盡展所有之用以塞罔極之讒碌碌而歸不能不耿耿耳古人有從所好者僕亦有心庶承顏之餘放性自適軒冕之事亦云儻來林澤之閒聊足散慮縱絕後望亦了一生何必崎嶇不平齟齬求入然後為得也去矣嚴子勉事聖君儻存平仲久要之言無惜詩人金玉之問幸甚張九齡白李公足下夫心以義持公為時出雖冥冥入窮神之奧鬼莫我窺而恟恟自眾人之口通者誰惑何則我有獨見之明物無浮言之信亦猶太阿之劍犀角不足齒其鋒高山之松霜霰不能渝其操斯豈非愛惡則物之相背而終始則我之不移且如明公義貫心靈人推正直遂乃雄飛清憲高步等夷向若見不決於明濟不兼於物終然獨善而已何自致之若是乎如此則明公獨運之機以獲當仁之利固人情之可恕何橫議之能干昨所造次下風求為從者亦望心與道合申一言而取容人以義圖輕干駟如脫屣則不意制以形骸之外拘於牙齒之閒葢下慎閉門而公奚措意夫國家所以歷試官序推擇士林雖因時買利之夫猶能變節而服義兦軀之意奚遽生疑此亦人言亦何害歲寒之取效然明公所以不容左右誠非克堪固當別有嚶鳴如為蛇足而以為家屬在彼用防未然既明公之慮極精微亦下官之心懷感激何者至如中朝著姓連姻華族及夫委以鈞軸綜其條流而朝廷豈可南求儋耳之酋北取旄頭之虜必佇異方之任乃無內顧之私者耶故知事有是非公無遠近昔如祁奚之舉子不避其親齊人之為盜固在於楚是以為善在已執一心之既定詭道從時乃千人之所指然下官所以勤勤自致其功靡他正以居本海隅始無朝望昔遇光華啟旦朝制旁求誤登射策之科忝職藏書之閣又屬朝廷尚義端士相趨復以無依見容不時廾置所以遲迴城闕感激身名未甘田里之平人所慕君親之大義而才能不急時用無施俸猶擬於侏儒舉未優於儲㣥所以饑寒在慮扶侍增遙而慈親在堂如日將暮遂乃甘心附麗乘便歸寧不然則命非飲冰幸安中土又安能崎嶇執事之末還無一級去且二年願明公審圖彼人向者何為嗚呼忠信獲戾古人之言惟教義之所矜乃譏嫌之見及恨不能隳肝嘗膽徇知己以求申而飲氣吞聲負當年而歎息庭闈眷戀行路屏營斯薄宦之所嬰念勞生之有役望美高傳何嗟及矣炯炯式微心為誰矣轉當側聽妙選用息鄙心心之有懷言不能盡某再拜集賢殿者本集仙殿也上不以惟睿作聖而猶垂意好學用相必本於經術圖王亦始於師臣及乎鴻生碩儒博聞多識之士自開元肇建以迄於今大用徵集煥乎廣內而聽政餘暇式燕在茲忠臣嘉賓得盡心之所聰明文思有光被之德故下以道親上亦歡甚即於御座爰發德音以為候彼神人事雖千載傳於方士言固不經遂改仙為賢去華務實且有後命增其學秩是以集賢之庭更為論思之室矣中書令燕國公外弻庶績以奉沃心之謀內講六經以成潤色之業故得出入華殿師長翰林惟帝用臧固天所賴拜命之日荷寵有加降聖酒之罍頒御之膳食以樂侑人斯德飽時有侍中安陽公等承恩預焉學士右散騎常侍東海公等攝職在焉或稷大賢或泉雲諸彥文王多士周室以寧武帝得人漢家為盛而高視前古獨不在於今乎咸可賦詩以光鴻烈夫道行與廢命也非謀之不臧命通與塞時也豈力之為弊古之君子推其分養其和仲尼得之以絃歌傅說因之以版築至若詩有怨刺之作騷有愁思之文求之微言匪云大雅王六官志其大者司馬公引而申之謫居何心不欲賈生之投弔窮愁非我安用虞卿之著書嘗以風月在懷江山為事簿領何廢形勝不辜既好樂而無荒亦上同而不混迨乎倚層閣憑華軒川澤清明上懸秋景岑嶺迴合下帶溪流聯草樹而心搖際烟氛而目盡茲邦枕倚是日登臨豈子虛之過詫誠仲宣之信美物色起殊鄉之感誰則無情而道術得異人之資吾方有遣於是旨酒時獻清談閒發歌滄浪以放言詠蟋蟀而傷儉葢古人之作者豈異於斯盍賦詩以揚其美天子建五長守四方內以承衞京師外以攘却戎狄則有持其節制未十年而歷踐撫其封疆既一行而寧輯盡在我叔父備聞於朝廷昔者吉甫是欽仲著孝友之德楚子所畏趯在諸侯之選世有實績今以美濟俾我張氏鬱彼士林以媚於一人以正於四國豈非德能光大謀必變通思古人之獲心施君子之不器所以前拜小司馬兼擁旄於五命今為左常侍仍總戎於三蜀軌模素遠綽有先路之風聲車服載馳光被上軍之禮命莫不文茵暢轂淑旂綏章嘽嘽皇皇途將出於華陽威己疊乎夜郎是時也四序鱗次屬當春夏之交千里草長有懷原隰之往乃闢軒宇邀賓寮自髦士而及同姓由金華而下建禮或交以道合豈徒肆好之風或情以族親所謂宗盟之義龜組交映肴蓛駢羅而聲欲成文發中堂之絃管志在擊節感四座之衣冠必名義而為言雖聚散而何有酒酣相顧驪歌乃作白日西下求壯士之翻車青山南登愛忠臣之叱馭凡我明懿賦詩餞行景龍東山初主第也始其置金榜築鳳臺窮土木之功極岡巒之勢議與磐石同體造化較力何其壯哉自吾君茅茨不翦采椽不斲既抑華而務實將設教以垂範以故平陽化焉罷歌舞於其地麻姑見者變桑田於此時所謂長女之宮鬱為列仙之館其後嘗有好事以為勝遊令日芳辰攜手接袂往往而在祗取樂焉高十官雌伏都畿星言至止聞殊庭之可尚召嘉客以相歡徒觀其匠幽奇宅爽塏十里九版豈惟梁氏之作千巖萬壑宛是吳中之事青林修聳而垂綵綠蘿蒙籠以結陰清流若鏡下照金沙之底雜花如錦傍緣石菌之崖則可以藻飾形神揮斥氛滓相顧風塵之表無負雲霄之㮣既而東主西賓酒酣樂闋聚必有散匪伊麋鹿之㣥往而不返固亦山林之弊高公乃振衣而起舉盃有屬却計送人出長安之東道退思征馬向洛陽之南阡雖暫勞於州縣廹於簿領方欲厭於承明資其騫躍夫如是相知意氣何恨仳離盍賦詩焉以贈行者故郡城有荒臺焉雖層宇落搆而遺制巋然邑老相傳斯則辥公道衡之所憩也辥公不容隋季出守海隅豈作臺榭以崇奢葢因邱陵而視遠必有以清滌孤憤舒嘯佳辰寄文翰以相宣仰風流而未泯今司馬公英達好古清譽滿時迹有忤於貴臣道未行於明主以長沙下國同賈誼之謫居六安遠郡無桓譚之不樂嘗以為仁不異遠必敷政以愛人窮當益堅已坦懷而樂地屬府庭閒暇江浦清明南土陽和覺寒氛之向盡東郊候暖愛春色之先來於是命輕舸以乘流趣高臺而降望越荒堞披古道躋隱嶙而三休俯芊綿而四極其遠則烟連墟井指甌貊以南馳雲合山川距荊吳而北走其近則深谿見底鱗介之所出沒喬林夾岸羽毛之所翱翔悠哉辥公無不寄也意神奇之可接陟彼峻隅想風景之不殊翦為茂草司馬公又以為峴山故事感羊祜以興言湘水遺風懷屈原而可作況登高能賦得無述焉某實小人受教君子雖羲之樂會稽之士自與許詢而仲舉禮豫章之人復招徐孺是日也㣥英在焉猥惟陋才忝陪下列祗命為序請各言詩宋司馬才通命塞雲翼泥蟠蔡邕朔方不廢琴書之業賈誼宣室欲言鬼神之事既而出宿南浦與鴻鴈而同歸追餞北梁對江山而不樂是日渚雲欲霽林鳥將春惜時物之方華重情人之自遠㣥公有感中座無歡他日清風自當元度之夕茲辰零雨得無子荊之詠遂相與援翰賦詩贈行漁陽我之巨鎮也慎選軍佐敷求國良以王公能有命汝往底其耕戰之事介於將吏之間則已聲籍天庭氣雄遼碣鷹揚有日馬首欲東自名卿大夫與時髦懿士莫不激其節而重其邁結軫連袂攜壺抱琴留飲極於郊歧望美延於朔裔者不可勝數仲月暄矣陽時賁若植物之發芳香行人之感意氣不曰㣥萃豈懷安於鹿豕不曰垂堂已載馳於原隰孰不知西笑之美況伊歲華東征之勤兼彼戎旅葢樂不遑舍君人之所難義不顧私志士之為用今之作者聞而休之各賦詩一章以志其善也杜城南曲斯近郊之美者也背原面川前峙太一清渠修竹左並宜春山靄下連谿氣中絕此皆韋公之有也余固己聞之開元歲夏四月猥忝散職居多放情跂彼一行無忘於夙尚時其七召果獲於前期廼與起居舍人蔡公萬年主簿韓公惠而得朋欣然命駕韋公方拭席見待羞以藥物之滋倚琴相歡雜以嘯歌之韻清言移景閒步周林飜飛自情俯仰為得斯亦吾儕之樂事幸可而同也扶陽餘慶磻溪古迹樹留梓漆器用天成庭漸芝蘭馨香世襲斯乃韋氏之懿業是所為異焉而韋公尚其同之樂忘其異之貴均林棲於服冕齊鼎食於榮枯彼未可量吾見其大迹繼前軌將為龍以為光道包遠圖豈一邱而一壑二三君子相與志之云予之友曰韋侯始以才進中而遇坎自廷尉評為益州刺史行欲美也玉映而山輝善無小也鶴鳴而天聽俄自謫宦假其察視奮飛泥蟠皇華原隰為持斧之吏受負弩之禮非其明義清節高邁卓絕時輩所美朝議推多亦焉得利其往蹇而振其廢滯而今而後予有以見舉德之輶為神之介雖不本於利而終享其實者有矣夫火中暑徂使車云邁心同道合旨酒有踐或席次林園或觴臨郊歧風流相從日夕以繼者於若人如此其厚也僉以為無欲而自致韋子之謂道有善而不揚友朋之為過然則今之所至莫近於詩盍賦一章以美吾友故有斯作也夫德之所感者深物之所懷者遠中國有聖占候而自來四夷不王征伐而難致故絕域有來貢沒羽諸侯有不入苞茅舉其大凡不在遐邇頃有至自南海厥繇西域獻其方物而獅子在焉爾雅所謂狻麑如戔虎貓食虎豹今之所見信然絕猛者也其天骨雄詭材力傑異得金精之剛為毛㣥之特仡立不動而九牛相去眈視且瞋則百獸皆伏所以肉視犀象孩撫熊羆其餘瑣細不置牙齒我天子示柔遠之義國無不庭有伏猛之威物無難制故其受羈絏伏閑皁馴而為用鋒莫可當然吾君所存義不謂此葢蠻夷君長歲時貢獻或殊琛絕賮實於內府或異獸奇禽擾於外囿皆其覲禮若中國之贄幣所不辭讓明異方之臣妾此則非有利物之心充耳目之翫好以為懷柔之道示天地之含容不其然歟固無德而稱也義異獒犬豈勞召公之訓美同赤豹何關韓侯之詩凡我侍臣為之贊云鳥之鷙者曰鷹曰鶻鷹也者名揚於尚父義見於詩鶻也者迹隱於古人史闕其載豈昔之多識物亦有遺將今而嘉生材無不出為所呼之變與所記之不同者耶然於羽族之中絕有豪傑之表氣感剛悍體侔銛鋒顧視之間偉如也夫授以勁翮意不㣥飛資其利觜義在鮮食生有自然之權用無可抑之勢古之言武士法吏齊名比義者以其嚴若郅都飛若李廣委質於所事報功於所養不憚摧翼以虧勇不立垂枝以屈節是鳥也向之擬議不亦宜乎夫鸞與鳳將感於仁所不及也鷄與鶴猶較其德彼何有焉況其餘雖飛雖鳴凡者怪者肉非登俎才非下鞲威力不敵㣥噪無益然後知二禽之為用眾鳥之絕倫者也故君子韙其然工人圖其狀以象武備以彰才美雖未極其天姿有以見其風骨矣昔支遁道林常養名馬自云重其神駿斯圖也非彼人之徒歟
