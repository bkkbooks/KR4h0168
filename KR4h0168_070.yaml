front:
  text: 全唐文欽定全唐文卷七十文宗二
  hash: sha256:19f18176040d7a0cdd4a113f93d82da3cb6196b56a234370b25d743e11e4a17d
body:
  text: 闡至業敷大化實賴於忠賢逐姦慝去黨比必資於正直非才推間代道茂經邦則安能秉是鈞衡贊豫鴻業朝散大夫守門下侍郎同中書門下平章事上柱國賜紫金魚袋李固言剛毅自任端嚴不回常懷疾惡之心每負佐時之業頃者姦雄蔽過私黨比連非爾固言孰開豫意況面陳至懇章疏繼來辨虞卿宗閔之傾邪明蕭浣李漢之朋附爰付大任益章器能勵乃公忠副豫委遇朝議大夫守中書侍郎同中書門下平章事上柱國姑臧縣開國男食邑三百戶賜紫金魚袋賈餗抱忠與義秉直端誠文包經濟之方學達古人之奧自付以樞柄咨其謀猷瀝懇盡規夙夜匡補竭傅説之啓沃致山甫之將明而又舉善推賢孜孜匪懈苟利於國知無不為惟嶽降神邦家永賴於戲貞觀之初共推房杜之德開元之際又稱姚宋之賢思得其人常勞寤寐但使固言樹讜直除四凶以肅清餗推至公披八元以輔弼闕之邦家庶叶斯美是宜榮加書府之職寵兼文館之任或監綜史氏以潤色大猷仍進崇階用獎忠孝勉服新命無替前勞固言可銀青光祿大夫崇文館大學士兼修國史餗可銀青光祿大夫充集賢殿大學士監修國史餘並如故主者施行夫輔宰之任緝熙庶工苟或政紊彞倫迹涉黨比則何以執是邦柄毗豫一人銀青光祿大夫守中書侍郎同中書門下平章事上柱國襄武縣開國侯食邑一千戶李宗閔頃以詞藝列於班行乃藉宗枝驟升顯貫朕嗣膺大寶夢想勤勞謂其忠厚小心再委樞務每必造膝而問虛己以求將欲俾人不迷致我垂衣而理付之鈞軸斷然不疑而乃事每懷私言非納誨近者別登俊彥與之同列忌賢不悅物論喧譁翼贊之效蔑聞怨嫌之聲屢作前後叨位中外同辭惟進奔競之徒莫修恭慎之道蔽我卑聽擅我化權不思急召之恩都忘再擢之寵況且志無報主舉非正人顧其操心乃是速戾則何以式是百辟以維四方尚從屈法之典俾守遐藩之牧所謂全體良愧知臣可明州刺史仍馳驛赴任明州刺史李宗閔股肱之臣付以大政所宜竭節以答殊榮事或負豫法所難貸雖欲終始其可得乎且細大之既暴前詔而交通匪類蹤迹又彰豈可尚領方州牧我黎庶宜謫遐佐以肅朝倫可處州長史馳驛發遣交結凶邪叨取榮顯姦險陰慝因事盡彰頃為吏部侍郎令沈於內人宋若憲處密求宰相乃事迹敗露文字猶在閲視之際良深歎駭既專樞柄益附私黨附下罔上廢義滅公言多矯誣動挾欺詐傷風敗俗負我何深按之刑章法在無赦尚以早經任使賜以全生投之裔夷示我恩貸嗚呼知人則哲朕方自咎為臣苟進當鑒於斯百爾君子宜體豫意朕嗣位君臨精求至道日慎一日於今十年期輔佐之臣為我致理中立匪懈知無不為今得其人果副僉屬朝議郎尚書戶部侍郎判度支上柱國賜紫金魚袋李石操履堅貞志業宏茂性合道要識通化源屢佐藩方備聞勳績用司夕拜之任旋和尹正之榮爰委賦征備宣試效是宜擢膺輔弼俾勵政經爾當勤成務之規率致君之道內貞百度外靖四方參毗萬機課程庶績盡匪躬之節竭宣力之能大振朝綱兼司國計致億兆之富庶成方夏之乂安副豫知臣勉茂休烈可朝議大夫守本官同中書門下平章事仍依前判度支勳賜如故御史中丞有翼上言曰御史府其屬三十八例以中臺郎稽參其事以重風憲如處誨族親胄貴能博文論義理無不講求朝廷典章飽於聞見乞為副二以佐紀綱以爾處誨當居內廷草具密旨自以疾去於今惜之闕俞其言如我得闕有翼為爾之知己豫為有翼之德鄰上下交舉豈有私受勉修職業所報非一自昔皇王之有天下也君非臣罔以濟其理臣遇君然後顯其才以調陰陽以承法度雖堯舜不能自聖雖皋夔不能自賢君臣相須今古同體余之夢卜實有慕焉檢校兵部尚書兼興元尹御史大夫山南西道節度管內觀察處置等使李固言稟河洛之上靈孕乾坤之間氣孤迥獨立公忠自持擅菁英之雄文洞旨要之奧學仁歸信厚動合典謨巖廊正人中外全德官業夙望殷乎華夷歷居大僚咸稱厥職乃者擢自輔相委之樞衡不依違以徇人每精恪以憂國匪躬而謇諤彌勵絶私而節操不渝洎仗鉞漢中頒我條詔端嚴以訓齊師律寬惠以綏撫蒸黎遂用徵還俾副公議召至宣室前席與言聽其誠詞皆臻理化是宜再參大柄正位黃樞為朝廷之股肱聳縉紳之耳目康濟四海毗豫一人是非罔及於愛憎任用必分其清濁有犯無隱進思弼違無忝我知更光爾道可守門下侍郎同中書門下平章事門下宇縣乂安戎夷即敘雖亭障無虞於侵軼而卒乘難廢於訓齊況乎保固邊方控臨雜虜將付戎律是擇良才銀青光祿大夫檢校刑部尚書兼右執金吾衛大將軍御史大夫充右街使上柱國渤海郡開國公食邑三千戶高承恭昔爾先父勤勞王室式遏邊陲戡定庸蜀事存竹帛功銘鼎彞惟爾承恭克荷堂構學通奇正業擅機謀寬宏得大將之風質厚有端人之操早升朝序纍踐寵榮擁緹騎以邀巡勤彰夙夜建油幢以鎮撫績著公忠嗣乃家聲為余爪士朕以單于舊地境接外蕃備紫塞之風煙屏黑山之寇盜是用錫以麾節俾作翰垣於戲張奐守節一作正卻酋長之金鐻陳泰惟公緘豪右之寶貨遂得羌戎稽顙種落歸心行之非難勉企前哲罔違訓誡負我知人仍兼八座之崇式重三軍之任保茲終始懋乃嘉猷可檢校刑部尚書兼安北都護御史大夫充振武麟勝等軍州節度觀察處置等使散官勳封如故主者施行王者任賢能所以緝熙庶績舉正直期乎獻可弼違苟非懋茲四德何以光膺大任翰林學士將仕郎守尚書工部侍郎知制誥兼皇太子侍讀上騎都尉賜紫金魚袋陳夷行元精降靈厚載儲祉聚蓄英粹作時休祥懷道清貞執德謙茂行高嵩華宏包容之偉量明洞水鏡韜妍媸於默識貞己滋潔遇物能容雖牆岸孤峻而襟抱夷曠孝友為修己之具文學誠潤身之餘衆推全才時號端士頃在郎署雅有名稱是用擢居禁密俾輔導元良論辨見賢人之業教諭得名臣之體星琯屢改才術彌彰古稱旁求於夢卜曷若選之於言行是用付以政柄登於台階任茲鈞衡之重處以皋夔之秩人所注意豫將仰成勉陳啓沃之規以副具瞻之望可守本官同中書門下平章事散官勳賜如故王者胙土畫疆封建子弟所以承衛帝室蕃茂本枝祖宗成式朕曷敢廢況天付正性夙奉至訓尊賢好善體仁由禮是可舉建侯之命膺分社之榮親親賢賢於是乎在敬宗皇帝第二子休復第三子執中第四子揚言第六子成美皆氣蘊沖和行推敬慎遊泳墳索佩服師言宜開土宇之封用申睦族之典休復可封梁王執中可封襄王揚言可封紀王成美可封陳王宜令有司擇日備禮册命周宅土中藩衛並建漢有天下子弟畢封朕承列聖之鴻搆託於兆人之上順考古道用保乂於皇家第二男宗儉孝友齊莊恭肅明懿蹈師氏之典訓佩古人之格言動必有程雅不好弄遵道誠資於積習樂善實本於生知洪量不矜芳猷自穆是宜光分茅社作我藩翰式發麟趾之祥欽若犬牙之制爰舉成命錫其寵章可封蔣王仍命有司備禮册命運行帝載翊贊天工必俟輔臣以宣至化將益秉鈞之重是資並命之求諸道鹽鐵轉運等使正議大夫守戶部侍郎上柱國宏農郡開國伯食邑七百戶賜紫金魚袋楊嗣復動必居正言惟在公峻若孤山清猶止水從政稟詩書之教承家達禮樂之源朝議郎守尚書戶部侍郎判戶部事上柱國賜紫金魚袋李質本溫明才推俊茂智能周物宏本有容守和為君子之儒可大見賢人之業挺為國傑秀稟元精生必為時寶稱希代便蕃清秩操履有常調黃鐘而協諧和朱弦而疏越或總戎重鎮或敷惠字人卒乘有輯睦之功惸嫠著昭蘇之詠洎入司邦賦爰掌版圖事未財成公望猶鬱是可以宰領樞務用弼豫違敘彞倫而建大中罄訏謨而調元氣乂寧華夏保合神人宜申補衮之規致我垂衣之理於戲孔明相鼎峙之國尚聞魚水之詞夷吾輔霸業之君猶致鴻翼之喻矧豫祗荷丕構雖未克紹前修造次之間不忘遵道宵衣旰食一紀於茲災沴尚生於早蝗黎元屢困於衣食中夜靜慮若涉大川將求津涯俟爾而濟爾謂是靡以拂吾心而不行爾謂非靡以徇吾志而苟用開物成務俾乂於得時求賢審官寧我以多士則魚水鴻翼夫何足言勉副求無忝我休命嗣復可守本官同中書門下平章事依前充諸道鹽鐵轉運使勳賜如故可守本官同中書門下平章事依前判戶部事散官勳賜如故翼亮之臣寄任攸重九功未敘則宜立於廟堂百度既貞則兼制於方嶽中外迭處式寵才賢銀青光祿大夫守中書侍郎同中書門下平章事充集賢殿大學士上柱國李石元精降祥河嶽鍾秀文含大雅學茂全經贍智通理亂之源達識究古今之變望鬱人傑居為國楨頃者嘉其多能俾調鼎實動必循道知無不為每竭慮於謀猷思致豫於堯舜嘗司轉漕仍總征財盤錯之難錐刀不滯增台輝之光彩揚鳳沼之波瀾墜典咸修遠方畢服夙夜匪懈光我知臣近者情在進賢願辭衮職誠不易奪朕所難違乃眷荊門東南巨鎮山川重險舟車要衝比罷節符是遵權便台臣往涖宜復前規俾登大將之壇仍持上相之印尹正望府兼視雄藩增榮峻階無忝朕命可中書侍郎同中中書門下平章事兼江陵尹充荊南節度管內觀察處置等使勳如故褒善飾終王者常典況我友于之愛手足之親永言痛悼之懷用錫元良之命故齊王湊孕靈天宇擢秀本枝孝敬知於孩提惠和洽於親愛將固磐石遂分茅社學探蟻術之精智有象舟之妙好書樂善造次不失其清規置醴尊師風雨不忘其至敬方期鮐耉以保怡怡天胡不仁殲我同氣念周宣好愛之分長慟莫追覽魏文榮樂之言軫懷無巳繇是稽諸前典式展追榮特峻彞章表恩泉壤雖禮命之儀則爾而天倫之恨何攄遐想幽魂宜膺寵數可贈懷懿太子有司擇日册命朕每覽國史見太尉無忌之事未嘗不廢卷咨嘆遐想其人訪其裔孫用申甄獎緝熙柄政亮采皇猷宏道德而輔昌圖調陰陽而平景緯我惟求舊人亦與能正位台階實資元老河東節度觀察處置等使開府儀同三司守司徒兼中書令太原尹北都留守上柱國晉國公食邑三千戶實封三百戶裴度星辰稟秀山嶽炳靈文蔚采章量包江海負經邦之遠略懷許國之明誠研幾而識洞蓍龜運籌而道光竹帛風雨一致儀刑四朝萬方所瞻百辟為憲洎揚旌鴈塞建節龍山謹管籥而戎索煙清壯襟帶而軍牙氣肅虜絶南牧聲雄北門懿茲殊庸豫所嘉歎是用專授衡軸俾清化源統和神人茂育區夏夫宰相之任作豫股肱外可以懷柔四夷內可以親附百姓大可以贊亭毒阜生成小可以激貪廉正雅俗爾有休躅豫不重言至於玉立巖廊風行號令端若植表為時指南開豫胸襟廣我視聽實賴人傑代茲天工爰罷麾幢再操舟楫庶展乞言之禮豈唯論道之尊佇竭訏謨無忝毗倚可守司徒兼中書令散官勳封如故朕丕承寶圖思臻古理小大之政皆倚輔臣選衆攸難得人而授中大夫守太常卿上柱國賜紫金魚袋崔鄲天資正性嶽降王褱材慎楊震之四知邁皋陶之九德抱負直質秀發英華動必蹈中言皆體要聚學每探於精賾馳騁九流摛文若奏乎笙簧抑揚三代鴻量難挹懿聲自高乃者入典訓詞出司俊造能用周密靡混研媸銓總以明允為先廉察以澄清為重嘗踐其職顯有休功秩宗之選方登公台之論彌鬱繇是酌其望實付以鈞衡恢豫之規模廣豫之耳目於戲宰相之任弼諧是資豫欲使六氣均調惟爾贊豫欲使萬方平乂惟爾謨子欲使臣寮得職惟爾諧豫欲使邪正不亂惟爾翼言罔慮於咈耳進無忘於沃心貞觀開元之法度俱存房魏姚宋之規猷盡在咨爾丞相舉而行之可守本官同中書門下平章事散官勳封如故門下古先哲王之有天下也何嘗不正國本而承天序建儲二而主重器朕以寡昧祗荷丕圖虔恭寅畏思固鴻業慎擇令懿曠於旬時而卿士獻謀龜筮告吉以為少陽虛位願舉盛儀列聖垂休俾合豫志選賢而立式表無私敬宗皇帝第六男陳王成美天假忠孝日新道德溫文合雅謙敬保和裕端明之體度尚詩書之辭訓言皆中禮行不違仁是可以訓考舊章欽若成命授之七鬯以奉粢盛宜回朱邸之榮俾踐青宮之重可立為皇太子宜令所司擇日備禮册命朕以邦國之大機務之多惠有所未周化有所未洽不有忠讜之士左右輔益逮暗無燭不其難歟今即高選正人俾居諫省朝政闕失期乎必聞是用自朕心持申獎命所期稱職豈限常資可諫議大夫仍兼起居充職比者禮部奏卿風狂遂且養疾關外今却攜卷軸潛至京城遇朕微行聞卿諷詠觀其志業可謂屈人是用顯我特恩賜卿墨制宜從短簿別俟殊科叔父絳王為逆賊等援立竊窺大位既無討賊之意遂使忠義銜冤及王師擒妖義旅問罪前驅勇氣以致殲殂伏以太皇后慈仁思以慰解宜令有司量事收葬申恩討賊刑禮之中示於四方以明朕意君天下者莫尚乎崇淡泊子困窮遵道以端本推誠而達下故聖祖之誡以慈儉為寶大易明訓垂易之文未有上約而下不豐欲寡而求不給朕以眇薄遭逢內難刷君父之仇恥攄億兆之哀冤而股肱大臣羣卿庶士引義抗請至於再三以圖宗社之安以答華夷之望俯從衆欲夙夜震兢思所以克己復禮修政安人宵興匪寧旰食勞慮夫儉過則酌之以禮文勝則矯之以質庶乎俗登太古道洽生靈儀刑邦家以化天下內庭宮人非職掌者放三千人任從所適長春宮見在斛斗及絲草席等依前戶部收管鄠縣渼陂鳳翔府駱谷地還府縣教坊樂官翰林待詔伎術官并總監諸色職事中冗員者共一千二百七十人並宜停廢總監中一百二十四人先屬諸軍並各歸本司餘七百三人勒納牒身放歸本管先供教坊衣糧一百分廂家及諸司新加衣糧三千分並宜停給應緣田獵鷹雛獸犬等並宜放除五坊加配諸道鷹鷂等長慶以來常進外宣索自今巳後一切停進其須備搜狩量留者宜準憲宗朝故事其今年新宣附食度支衣糧小兒一百人並宜停罷應別詔宣索纂組雕鏤不在常貢內者並停度支鹽鐵戶部及州府百司應供宮禁年支一物以上並準貞元額為定度支撿勘其元和以來加配合停色數二十日內分析聞奏先造供禁中牀榻以金飾瑟瑟雜寶鈿珍珠瑪瑙裝者悉宜停進東頭御馬坊毬場並却還左龍武軍其殿及亭子令所司拆毀餘舍並賜龍武軍收管應行從處張設不得用花蠟結綵華飾今年巳來諸道所進音聲女人各賜束帛放還本道應城外墳墓先有開劚道路以備行幸處宜令兩軍及府縣曉示百姓任其修塞其大逆魁首蘇佐明王嘉憲石定寬閻惟直及因凶賊姦計遂與同謀人劉克明田務成許文端等汙瀦無赦梟首無論巳處斬訖家並籍沒妖妄僧惟真道士趙歸真等或假於卜筮或託以醫方疑衆挾姦矯誣干禁並從流竄以靖京師其情非姦謀迹涉詿誤者自今巳後一切不問凶徒既殄寰宇佇康載舉令猷用宏庶績於戲昔漢文顧十室之産而天下乂安我太宗皇帝勤四海之理而帝業隆盛暨乎列聖罔不承式而歲代滋久訛弊以生仍屬艱故未遑改作朕祗荷重器思臻大寧將正躬以立訓爰取新而革故咨爾百辟卿士外服侯衛其喻朕意永堅乃心無縱欲而敗度自砥身於不類率是教典用交修焉布告中外咸使知悉朕在億兆人之上不令而人化不言而人信者法也法行則君主重法廢則朝廷輕田伾常挂亡命之章偷請養賢之祿迹在搜捕公行人間而更冒選吏曹顯擬郡佐及黃樞覆驗烏府追擒證逮皆明姦狀盡得三移憲牒一無申陳衆狀滿前羣議溢耳終則步健不至鋃鐺空來蔑視紀綱頗同侮謔顧茲參畫負我上台閲視連名伊爾二子又新可汀州刺史續之可涪州刺史衣服車乘器用宮室侈儉之制近日頗差宜付所司並準儀制令依品秩勳勞仍約今時所宜撰等級送中書門下參酌奏聞元首股肱君臣象類義深同體理在坦懷夫任則不疑疑則不任然自魏晉以降參用霸制虛儀搜索因習尚存朕方推表大信置人心腹庶使諸侯方嶽鼓洽道化夷貊飛走暢泳治功況吾台宰又何間焉自今以後紫宸坐朝衆僚既退宰臣復進奏事其監搜宜停朕聞動人以行不以言應天以實不以文蓋明誠者感通之大本也刑德者陰陽之大倫也故五事陳於洪範時令著於禮經雖堯湯之災或丁於天數而休咎之萌必徵乎人事朕祗荷大統子視兆人宵衣昃食不敢自逸猶慮上心不達於下下志不通於上是以正朝延聽便殿訪求事之益者罔不行弊之壅者罔不去庶乎交感以致洽和而誠有所未臻信有所未達自春及夏亢陽為害雖麥秋大稔而禾歲未登京畿之間陰陽小爽齋禱備至膏澤未濡中心惻然思所以濟豈庶獄之未孚將一夫之不獲永用惕戒載懷哀矜其京畿見禁囚徒犯死罪非故殺人者並降流流巳下罪遞減一等依令有司約禮禱祠宗廟遍祈山川務盡莊敬以副豫志百司庶務有不便於人者各委長吏悉心陳列無使壅於上聞其寶歷二年十二月二十七日敕及今年二月十二日赦條所釐革施行未畢者宜令中書門下速舉處分朕志唯克己誠在恤人自臨御以來躬行不逮乃者永虞艱食瞻仰昭回幽禱移災蔬食逾月益罷浮費用嚴天譴尚懼明有未燭道有未宣聞於神者無馨香施於理者或繆戾終夕三省履冰在懷內外卿士有規朕以道宜封事條奏宰衡庶尹侯衛守長各勵乃職庶承於天休諸道諸軍使應奏判官并每年冬薦等所奏判官除新開幕府擬員闕置署外其向後奏請如是元闕即云官某職今奏某人充如巳有今更奏即云某職某人緣某事停奏某人替具前使下臺省官合冬薦者除府使罷外既有薦用當且要籍豈合數月之間便稱去職自今巳後如帶職掌授臺省未經兩考者不在冬薦限如其中實有事故其他官據品秩合冬薦者則依元敕王者之御天下也推其至誠格以大順臣子之奉君父也效以奔走竭其忠貞故能上下交感家邦用寧其有專上周旋干紀悖戾怠棄彞典矯誣當時固人神之所不容古今未能赦者也朕以菲德祗荷鴻業將躋俗於至厚之域致人於無過之地永用勞慮惻然疚懷李同捷幸席舊勳不思纘緒斬麻未幾私行墨縗毒殺忠良擾惑部校稽之國憲難逭常刑朕以頃在先朝巳稽中旨實遵成命未議改圖庶乎舞階以服有苗因壘而降崇國使臣旁午優詔指明而又越留務之權授之戎帥拔負海之地置之中華推恩含垢斯亦至矣而同捷益懷迷執閉境練兵大詬鄰封拒捍中使遐邇憤怒中外驚嗟叛命既彰大義當絶事非獲己良用憮然其李同捷在身官爵並削奪朕以滄景之地凶魁竊據今若怒茲小醜遽至大刑慮金革一揮玉石同碎弔人之義深置未安宜令四面節度使各蓄兵鋒共固疆守絶其窺伺之路撫其離叛之人嚴戈矛之備以待其窮據山川之要以張我武如叛徒驚擾潛有侵軼當隨機禦遏以自保完勿使淩犯為虞隄防或弛其滄景將士如有能奮揚忠義執戮渠魁者先是六品巳下官者便授三品正員官其先是五品巳上官者節級超獎仍賜莊宅各一區錢二萬貫文並列加寵任如能率所管兵馬以州郡來降者超三資與官便授嶽牧賜錢一萬貫以城鎮來降者超兩資與官仍賜錢五千貫以一身降者亦與改轉仍賜錢帛其同捷如能知義悔過束身歸朝並與洗雪仍加寵獎若不能悛悟自取誅夷罪止一身其餘脅汙一切不問於戲佳兵者聖祖之所誡文德者前哲之所崇肆豫寡昧敢忘丕訓然以齊庶方者號令立人紀者君臣斯制苟渝大倫安設是用絶其奔軼誡以申嚴佇無戰於文告庶有瘳於迷復特此來遠諒非初心布告內外咸使知悉孔門高懸百行由至順者其身必榮朝廷廣設衆官踐正途者其道必達前鄉貢進士熊望因緣薄技偷冀褻幸營居中之密職擾惑朝經鼓逼下之囂聲因依邪隙及衆議波湧纍月不寧司門驗繻纍月至四考覆謬妄乃非坦途朕大啓康莊以端羣望俾示投荒之典用正向方之流可漳州司戶
