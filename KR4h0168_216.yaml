front:
  text: 全唐文欽定全唐文卷二百十六陳子昂八
  hash: sha256:9f72d3477fa470a0f71af26c466154d206c2e8b13f230a22d0c0cd97ca9645c2
body:
  text: 嗚呼君諱虔禮字過庭有唐之不遇人也幼尚孝悌不及學文長而聞道不及從事得祿值凶孽之災四十見君遭讒慝之議忠信實顯而代不能明仁義實勤而物莫之貴厄貧病契闊良時養心恬然不染物纍獨考性命之理庶幾天人之際將期老而有述死且不朽寵榮之事於我何有哉志竟不遂遇暴疾卒於洛陽植業里之客舍時年若干嗚呼天道豈欺也哉而已知卒不與其遂能無慟乎銘曰嗟嗟孫生人見爾迹不知爾靈天竟不遂子願兮今用無成嗚呼蒼天吾欲訴夫幽明夫人諱某清河郡東武城人也昔軒轅錫允弧矢崇威畏其神者三百年得其姓者十四族金貂七葉漢天子之忠臣鼎足三公晉武皇之名相孤卿玉帛世有其庸曾祖某北齊太常卿徐亠兊二州刺史天人之禮位掌於秩宗侯伯之尊寵優於露冕祖某隋汾陰壽春陽城三縣令襲公侯之瑞屈銅墨之班士元非百里之才太邱有三台之望父某唐戶部侍郎復亳建三州刺史尚書北斗始贊於南宮方嶽專城終榮於獨坐夫人即刺史之第若干女也稟柔成性蘊粹含章承禮訓於公庭習威儀於壼則夫其窈窕之秀婉孌之姿貞節峻於寒松韶儀麗於溫玉鉛華不御飾環佩之容浣濯是衣勤黼黻之綵自作嬪於君子主中饋於家人三千之禮不違九十之儀無慝至乃恭於奉上順於接下仁孝以承宗祀慈惠以睦閨門則雍雍蹌蹌必由其道矣嗚呼府君不造遘此閔凶中年不圖早世而殞青松摧折哀斷女蘿之心丹節孤高終守柏舟之誓而府君食先人之德無厚生之財夫人徇黔婁之貞闕丹臺之産孀居永日蓬首終年處貧素而彌堅保幽芳而不昧始府君之逝有四子焉少遭罔極之哀未奉過庭之訓夫人保持名教終始禮經既勗之以義方又申之以遠大皆能率由慈訓克荷嘉聲箕裘之業載隆燕翼之謀不霣非夫淑明賢懿聖善溫良崇婦道之深規宏母儀之至範孰能昭宣令問若斯之盛哉彼蒼不忱殲我眉壽春秋若干載初元年月日遘疾終於洛州某里之私第嗚呼哀哉夫人令儀有穆惠問無喧敦雅志於詩書婉嫻情於琴瑟若乃姆師酒食之議女工纂組之繁莫不總制清衷宏宣懿則茂蘋蘩之雅訓協沼沚之芳猷雖古稱敬姜詩云淑女論容比德殆無以過穠華不居私扃永閟嗣子某等悲摧欒棘思結寒泉永惟同穴之儀仰遵歸祔之典以大周天授二年二月日朔遷祔於袁州府君之舊塋禮也合葬非古奉周公之儀墓而為墳宗仲尼之訓嗚呼鴛鴦之樹眇泣於松楸鼓吹之山緬然於邱壠原陵何代銘志無文有哀黃鳥之詩遂勒青烏之兆銘曰詩云淑女君子好求懿哉令德嘉儀聿修溫容玉映峻節松楸妙心彤史潔志元猷昭宣壼則惠穆蘋洲共伯早逝貞姜獨留煢居蓬首哀深柏舟彼蒼不憖此夜長幽懷南風之吹棘想北隴以同邱青春兮白日獨昭昭以悠悠維唐垂拱二年太歲景戌七月二十日殤子高氏卒嗚呼哀哉含瓊敷而不玉實者有矣夫我觀皓元機化出入夭壽之數榮落之原皆一受而不易者也悲夫古人之仁懿中庸不幸短命今復見之於高子矣高子渤海蓨人也黃州府君之幼孫宛邱府君之叔子生而岐嶷實覃實華越在襁褓神明滋茂童蒙淵敏光潤玉顏八歲始教方書受甲子巳知孝悌之道詩禮之規宛邱府君鍾愛之他日嘗趨庭與諸兒戲神情涵泳綽然如鴻雛鵠子有青雲之意也府君美之曰能光我家者此兒十五通左氏春秋及尚書飛騫之志日新宏大矣不幸享年十七遇暴疾而夭嗚呼哀哉宛邱府君感慟哀過於禮曰不恨爾壽之不長惜爾器之不彰夫何苗育今也則亡嗚呼吾將老矣爾遠何哉其年七月殯於家園日月云徂六載於茲矣天授二年龍集辛卯府君方大崇元域以安先兆諸子之柩皆祔焉其年二月癸卯朔十八日庚申啓殯歸瘞於大塋禮也銘曰來不可遏去不可止唯死與生由生以死於戲殤子噫何往矣傷慈父之肝情獨冥冥而長巳死而有知可也若其無知悲爾夫人諱某河南郡人也昔吾君夏后氏之子霸有幽都皇運北興鼎圖南起開寶符而帝天下撫璿璣而王中國則後周之受命武帝之雲孫夫人四代祖也曾祖某失周子之封亡山陽之國雖存天子之允已類咸陽布衣植德早夭祖某隋朝官澧州澧陽縣令父某龍州司法皆承家席寵代有令名夫人賁穠華襲繁祉崇徽惠穆秀色苕榮自於幼年有令儀也十四適於高府君夫其溫慈惠和信肅修穆行有法度動有禮經嚴恪以理家人僩瑟以和君子則已含乎光大矣若乃宗廟衷敬仁孝也娣姒祗和謙順也蠲潔酒食婦儀也黼黻元黃女工也宏此四德而務六親鞶帨以文之雜佩以發之猗可以作範母儀昭宣壼則矣至於訓子以睦教女以順愛下以慈與人以讓外以贊府君之德內以光中饋之教皆曰聞其進不見其退也嗚呼仁而不壽生也永終永淳元年五月遇疾終於宛邱縣之官舍時年二十七嗚呼哀哉高府君尋以公事罷職山塋未卜旌旐來歸府君思北海之魂留東園而殯日月遂往九歲於茲府君方崇樹先塋增封舊域以大周天授二年太歲辛卯二月癸卯啓殯於東園遷祔於洛州某原禮也哀哉夫人雅有高行終而不忘以為厚葬非禮也是以珠玉不飾磚瓦是藏高府君聿遵其志率以薄葬於戲非古之明德淑女金玉其光何以躋之吾忝門閭之賓覩其家道矣雍穆懿鑠實有清風故敘之而未充德也銘曰夭夭桃李有華兮灼灼淑人宜家兮修睦婦道不譁兮窈窕嬪儀孔嘉兮榮采之方茂而云亡兮咨嗟君諱某字某其先渤海蓨人也因仕居洛今為陽翟人昔赭鞭乘運襲炎帝之宗蒼兕應期承太公之允崇勛霸業光烈猶存曾祖某北齊太子中舍人贈冀州刺史青宮近侍光寵朝班皂蓋追榮恩崇國禮祖欽仁隋左親衛大都督檢校祕書郎帶七尺劍始遊天子之階持三寸筆終入藝香之閣父相唐江州潯陽縣令舒州懷寧縣令絃歌之化身不下堂神明之威蝗猶避境君即懷寧府君之長子也黃河一直青松萬仞性惟仁孝行實溫恭文義必以潤身名節由其徇物唐龍朔元年有制舉忠鯁君對策及第試永州湘源縣尉位卑黃綬志在清規秩滿以常調補鳳州黃花縣丞梁竦長懷尚勞州縣桓談不樂空負琴書又轉易州遂城縣丞以管輅之材從趙典之任古人斯在君子居之大周革命任曹州離狐縣丞而春秋已高日月方出武盡美矣不得夷齊之臣文哉郁乎自邈夏商之道於是因階秩滿告老歸間閉郊扉於南野習巖居於東㵎詩書琴酒以觀先達之風山水邱園將為遺老之賞天授二年歲在單閼七月二十二日考終厥命卒於陸渾縣明高之山莊時年七十有二嗚呼哀哉君雅尚節義素履元亨懷古人之遠圖慕先賢之遺烈以為桓魋石槨非則於禮經墨翟桐棺實宜於聖典遺令薄葬務取隨時即以其年十月日葬於北邙山平樂之原禮也嗣子思恭孝思罔極喪制過哀思封樹而緬懷恐東西而不志白楸為槨奚遵古葬之儀丹漆題封即表永年之記銘曰泱泱大風其太公兮穆穆君子紹厥宗兮忠鯁察廉仕漢宮兮才高位卑考永終兮哀哀孤子號蒼穹兮歸葬平陵松柏桐兮君諱孜字無怠其先陳國人也六代祖太樂梁大同中為本郡大司馬生五代祖方慶屬梁亂始居新城郡武東山生高祖湯為郡主簿生曾祖通早卒通生皇祖辨少習儒學然以豪英剛烈著聞是以名節為州國所服皇祖生考元爽保植先人茂德降生於君君幼孤天資雄植英秀獨邁性嚴而尚倜儻之竒愛廉貞而不拘介獨之操始通詩禮略觀史傳即懷軌物之標希曠代之業故言不宿諾行不苟從率身克己服道崇德閨門穆穆如也鄉黨恂恂如也至乃雄以濟義勇以存仁貞以立事毅以守節獨斷於心每若由已實為時輩所高而莫敢與倫也是以鄉里長幼望風而靡邦國賢豪聞名而悅服方謂拂羽喬木緬升高雲而遭命大過棟橈而殞嗚呼天咎豫乎時年三十五是歲龍集癸巳有周天授二年秋七月卜兆不吉權殯於真諦寺之北園始以今甲午歲獻春一月己酉朔二十五日己酉定於石溪山之北岡陪考墳也君家世墳壠在武東山昭穆崇封松柏列盛至君考遺令獨愛石溪之岡故君從先志祔葬於此嗚呼哀哉始君伯父海內之文人也含純剛之德有高代之行每見君歎曰吾家代雖儒術傳嗣然豪英雄秀濟濟不泯常懼後來光烈不象先風每一見爾慰吾家道實謂君有逸㣥之骨拔俗之標超山越壑可以駿邁也豈其夭絶喪茲良圖嗚呼其元命歟遭命歟天不忱歟道固謬歟大圓蒼蒼大方茫茫賢聖同此爾之何傷古人有言珠玉而瘞是暴骸於中原況吾家道尚儉名訓未墜封樹之禮吾敢過焉是用錫爾瓦木之器塗芻之靈堯舜之典忠孝之經昭示後代以安爾形銘曰我祖之葳蕤兮邈於陳緬遙裔兮此江濆五代崇光兮至夫君徽烈英曜兮始葐蒀何意嚴霜兮降青春玉樹摧落兮成黃塵南山無隟兮永幽淪悠悠昭代兮卜爾辰吾慟感傷兮號蒼旻問之蓍策兮立茲墳乃言千載兮衣冠來臻黃頭之子白服人嗟爾黃頭兮勿傷神君諱該字彥表帛丿糸州顯武人也其先自潁川遷蜀矣曾祖寄祖曾考永貴皆養高不仕君少好學能屬文上元元年州貢進士對策高第釋褐授將仕郎其明年制敕天下文儒司屬少卿楊守訥薦君應詞殫文律對策高第敕授茂州石泉縣主簿開耀元年制舉太子舍人司議郎大府少卿元知讓應制薦君於朝堂對策高第敕授隆州蒼溪縣主簿垂拱四年又應制學綜古今對策高第敕授懷州河內縣尉凡歷所職皆以清廉仁愛著聞有周革命天授三年恩敕自河內追入閣供奉居未期不幸遇疾於神都積善坊考終厥命年六十三歸葬於豆圌山之陽原禮也嗚呼哀哉古人有云飾顏夷之行不逢青雲之士而聲名磨滅者有之矣嗚呼我陳君敦懿元默潔清溫良馴道執志好學博古恂恂焉行高職卑不改其操學優祿薄不怨於天四舉有道三歷下位宴如也非諄諄淑人其誰能涅此而不渝哉夫知命可謂君子矣好學可謂為文矣丹書不藏於勳府青史不昭於方冊於戲一絶故老之口孰知夫子之賢哉吾與君族人也服美其德尚矣昔子雲稱李元常璩敘令伯皆沒而不朽後代稱之斯非若人之徒歟吾豈默而無述其銘曰誾誾君子好斯文兮縟藻鞶章潛卿雲兮棲遲下位允升聞兮金署玉堂見吾君兮鸞階鴻漸期紫氛兮鍾鳴漏盡竟蘭焚兮儒行墨節將何云兮恭承遺言立石人兮金刻丹書記歲辰兮青龍甲午銘茲墳兮姬人姓薛氏本東明國王金氏之允也昔金王有愛子別食於薛因為姓焉世不與金氏為姻其高曾皆金王貴臣大人也父永沖有唐高宗時與金仁問歸國帝疇厥庸拜左武衛大將軍姬人幼有玉色發於穠華若彩雲朝升微月宵映也故家人美之少號仙子聞嬴臺有孔雀鳳凰之事瑤情悅之年十五大將軍薨遂翦髮出家將學金仙之道而見寶手菩薩靜心六年青蓮不至乃謠曰化雲心兮思淑真洞寂滅兮不見人瑤草芳兮思葐蒀將奈何兮青春遂返初服而歸我郭公郭公豪蕩而好竒者也雜佩以迎之寶瑟以友之其相得如青鳥翡翠之婉孌矣華繁艷歇樂極悲來以長壽二年太歲癸巳二月十七日遇暴疾而卒於通泉縣之官舍嗚呼哀哉郭公恍然猶若未亡也寶珠以含之錦衾而舉之故國途遙言歸未逮留殯於縣之惠普寺之南園不忘真也銘曰高邱之白雲兮願一見之何期哀淑人之永逝感紺園之春時願作青鳥長比翼魂魄歸來遊故國公諱元敬字某其先陳國人也五世祖太樂梁大同中為新城郡司馬生高祖方慶方慶好道得墨子五行祕書白虎七變法遂隱於郡武東山生曾祖湯湯為郡主簿湯生祖通通早卒生皇考辨為郡豪傑公河目海口燕頷虎頭性英雄而志尚元默㣥書祕學無所不覽年弱冠早為州閭所服耆老童幼見之若大賓二十二鄉貢明經擢第拜文林郎屬憂艱不仕潛道育德穆其清風邦人馴致如衆鳥之從鳳也時有決訟不取州郡之命而信公之言四方豪傑望風景附朝廷聞名或以君為西南大豪不知深慈恭懿敬讓以得也州將縣長時或陳議青龍癸未唐歷云微公乃山棲絶穀放息人事餌雲母以怡其神居十八年元圖天象無所不達嘗宴坐謂其嗣子子昂曰吾幽觀大運賢聖生有萌芽時發乃茂不可以智力圖也氣同萬里而合不同造膝而悖古之合者百無一焉嗚呼昔堯與舜合舜與禹合天下得之四百餘年湯與伊尹合天下歸之五百年文王與太公合天下順之四百年幽厲板蕩天紀亂也賢聖不相逢老聃仲尼淪溺溷世不能自昌故有國者享年不永彌四百餘年戰國如糜至於赤龍赤龍之興四百年天紀復亂夷胡奔突賢聖淪亡至於今四百年矣天意其將周復乎於戲吾老矣汝其志之太歲己亥享年七十有四七月七日己未隱化於私館孤子子昂愚昧鞠然在疚不知所從乃祗馴聖人卜宅之義是歲十月己酉遂開拭舊塋奉寧神於此山石佛谷之中岡也銘曰賢者避地邈其往兮鳳兮鳳兮誰能象兮嗚呼我君懷寶不試孰知其深廣兮悠悠白雲自怡養兮大運不齊賢聖罔象兮南山四君不遭漢天子固亦商邱之遺壤兮君諱某字某趙國人也乃昔嬴楚睽孤豪傑雲起廣武君負霸王之略為成安之師實欲北興帝基南面稱創雄圖未展大運陵穨傳云有明德當代不顯其後必有昌者自武至君二十四代矣公侯寶王刻鼎銘鐘紛綸葳蕤代濟不泯六代祖孝伯後魏北部尚書秦州都督宣城公魏之名臣載在青史曾祖某後周陜州芮城縣令祖某屬隋運板蕩君子道消遜言遁時不顯於仕拜儒林郎父某唐隆州蒼溪縣丞襄州荊山縣尉有高才而無貴仕君鍾常山之氣炳漳水之靈少尚名節躬行仁義始入太學以精理見知未幾進士高第拜白水縣尉尋轉雲陽尉屈青雲之資從黃綬之任雖吏道迫屑而遐情眇然秩滿調補洛陽尉盤根利器尹守拭目遷懷州司法祿不徇榮位以行道雅尚貞遜與衆趍少合洎上聞對策甲科授益州大都督府録事參軍滿歲擢授水衡監丞君所居清淡仁惠為政識真之士以公輔許之而好學篤道介如石焉故位不充量搢紳高其才烈士伏其義竟不能驤首雲路長鳴天衢知與不知咸皆共歎有餘恨也而君浩然冥順獨與化遊方將幽採元微精核通變天命不祐春秋若干遘疾終於官某歲某月安厝於某所禮也嗚呼古所謂歿而不朽者有矣夫遺言餘旨粲然可觀有子曰某痛門風之將泯懼代業之罔傳乃刊石紀德銘旌之曰常山之靈和氏之英世有明德鍾此令名黃黻不貴拱璧為輕仕以宏道祿匪徇榮高志厲雲思機入冥嗚呼天乎殲我國楨萬歲通天二年三月朔日清邊道大總管建安郡王某敢以牲牢告軍牙之神蓋先王作兵以討有罪奸慝竊命戎夷不龔則必肆諸市朝大戮原野我皇周子育萬國寵綏百蠻青雲干呂白環入貢久有年矣契丹凶羯敢亂天常乃蜂聚丸山豕食遼塞宴安鴆毒作為欃槍天厭其凶國用致討皇帝命我肅將王誅今大軍已集吉辰協應旄頭首建羽旆前列夷貊咸威將士聽誓方俟天休命為人殄災惟爾有神尚殲乃醜召太一會雷公翼白虎乘青龍星流彗掃永清朔裔使兵不血刃戎夏來同以昭我天子之德允乃神之功豈非正直聰明哉無縱大讎以作神羞急急如律令萬歲通天二年月日清邊軍海運度支大使虞部郎中王元圭敢以牲酒馳獻海王之神神之聽之我國家昭列象胥惠養戎貊百蠻率職萬方攸同鮮卑猖狂忘道悖亂人棄不保王師用征故有渡遼諸軍橫海之將天子命我贏糧景從今旌甲雲屯樓船霧集且欲浮碣石淩方壺襲朔裔即幽都而漲海無倪雲濤洄潏胡山遠島鴻洞天波惟爾有神肅恭令典導鷁首騎鯨魚呵風伯遏天吳使蒼兕不驚皇師允濟攘慝勦虐安人定災蒼蒼㣥生非神何賴無昏汨亂流以作神羞急急如律令丁酉歲三月庚辰前將軍尚書王孝傑敗王師於榆關峽口吾哀之故有此作天未悔禍兮熾此山戎虐老昏幼兮人罹其窮帝用震怒兮言翦其凶出金虎兮曜天鋒掃宇宙之甲馳燕薊之衝何士馬之沸渭若雲海之洶洶荊吳少年韓魏徑卒戈矛如林白羽若月且欲蹈烏丸之壘刈赤山之旗聯青邱之繳封黃龍之尸凶胡猖獗姦險是憑蛇伏泥滓蟻鬬邱陵哀我將之仡勇兮無算略以是膺陷天井之死地屬雲騎以相騰短兵既接長㦸亦合星流飈馳樹離一作雜山沓智無所施其巧勇不能制其怯頓金鼓之雄威淪輿尸之敗業嗚呼哀哉矢石既盡白日穨主將已死士卒哀徒手奮呼誰救哉含憤抗怒志未回殺氣凝兮蒼雲暮虎豹栗兮殤魂懼殤魂懼兮可奈何恨非其死兮棄山阿血流骨積殪荒楚思歸道遠不得語降不戮兮北不誅歿不賞兮功不圖豈力士之未徇誠師律之見孤重曰壯士雖死精魂用凶醜爾讎不可縱我聞強死能厲災古有結草抗杜回苟前失之未遠儻冥讎之在哉嗚呼魂兮念歸來居延海南四百餘里有古城焉土人云是塞上翁城今為戍其基扃趾跡蓋數千年也丙戌歲兮我征胸奴恭聞北叟託國此都子尚于叟日月遐邁及今來思實獲心契欣問于叟何德其愚僻居幽漠浩與代殊忘情逸馬胡寧而知福謝於鄰人何達而不淑丁男既存君子知復人以為極也伊懷茲土既板且築扃禁天崇墉隍雲矗今則荒穢代亦不育其故何哉賢叟之德登叟之堂天道何遠而茲理茫茫人代自故兮邱壠崩荒魂魄何獨不歸故鄉叟乎叟乎我心之傷維年月日謹以牲酒之奠致祭故延俊府折衝燕然軍孫府君之靈惟君少馳英武早效成功聲雄塞上名重關中憺稜威於敵國存大節於家風既揮金而退老方餌藥於仙童何昊天之不弔隨大化以長終白馬故人青烏送往素車永訣黃壚誰賞醑酒盈觴魂兮尚饗維某年月日朔方道大總管建安郡王攸宜以酒饌之奠祭故壯武將軍左玉鈐衛中左三軍營主苗君之靈君忠勇兼資戎麾夙濟烏丸作逆赤羽從軍方且任君先鋒仍馳後徑刈鮮卑之壘摧冒頓之師執馘獻俘歸受國賞何圖大勛未立隨命先凋永懷咨嗟情用兼慟故命酒奠告爾殤魂君其有靈歆茲薄酹嗚呼尚饗維年月日朔孫女夫某等謹以清酌庶羞之奠敢昭告於故黃州高府君之靈惟府君含德元亨保和光大才堪濟代而運屬承平器允登臺而命鍾流落有瑚璉之寶無廊廟之資豈圖大位不躋幽靈永昧尊儀潛翳三十餘年元殯既開黃腸已古今青烏改卜丹旐來歸窀穸即期幽明永訣某等忝承嘉惠奉事門闌興言追慕實增感咽竊惟精意以享黍稷非馨敢陳薄酹以獻明靈嗚呼哀哉伏惟尚饗維年月日朔女夫某謹以清酌嘉蔬之奠奉祭於故高氏河南宇文夫人之靈恭聞夫人有清穆之德皓潔之行淳懿肅恭內外仰則而遺風素範蕙敷蘭滋用能惠心光孚氤氳沼沚崇嚴壼訓芬郁母儀中饋柔嘉娣姒有則豈圖慈顏幽翳於今十年毫水巳拱尊靈廓然今吉辰協應幽殯方開容象如在器質巳灰改卜禮典宅兆方遷山園既列祖載行焉哀子號咷女也蟬媛終天永訣泣血流漣某謬承嘉惠預叨姻戚生事早睽送終空積竊聞精意以享黍稷非馨敢陳薄酹以獻明靈伏惟夫人明神尚饗維年月日左拾遺陳子昂謹以少牢清酌之奠致祭故人臨海韋君之靈惟君孝友自天忠義由己有經世之略懷軌物之量甘心苦節風雨不改常欲窮則獨善其身達則兼濟天下感激遐詠邈然青雲何期良策未從大運奄忽嗚呼哀哉昔君夢奠之時值余置在叢棘獄戶咫尺邈若山河話言空存白馬不弔逮天網既開而宿草成列言笑無由夢寐不接永言感慟何時可忘今旌旐言歸關河方遠興言永訣今古長辭鄧攸無子天道何知洛陽舊陌拱木猶存京兆新阡孤松巳植巳矣韋生云何及矣大運之往賢聖同塵嗚呼哀哉伏維尚饗維年月日朔某等謹以云云古人歎息者恨有志不遂如吾子良圖方興青雲自致何天道之微昧而仁德之攸孤忽中年而顛沛從夭運而長徂惟君仁孝自天忠義由己誠不謝於昔人實有高於烈士然而人知信而必果有不識於中庸君不慙於貞純乃洗心於名理元常既沒墨妙不傳君之逸翰曠代同仙豈圖此妙未極中道而息懷衆寶而未攄永幽泉而掩魄嗚呼哀哉平生知己疇昔周旋我之數子君之百年相視而笑宛然昨日交臂而悲今焉巳失人代如此天道固然所恨君者枉夭當年嗣子孤藐貧窶聯翩無父何恃有母丨旬兮焉嗚呼孫子山濤尚在嵇紹不孤君其知我無恨泉途嗚呼哀哉尚饗
