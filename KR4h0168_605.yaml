front:
  text: 全唐文欽定全唐文卷六百五劉禹錫七
  hash: sha256:56daf3bdc12e11a48e50d2ccc031a411cad22f7001aa782ebedd218ff263c775
body:
  text: 起文章而陟大位丹青景化焜耀藩方如非烟祥風緣飾萬物而與令名相終始者有唐文臣令狐公實當之公名楚字殼士燉煌人今占數於長安右部天授神敏性能無師始學語言乃協宮徵故五歲已為詩成章既冠參貢士果有名字時司空杜公以重德知貢舉擢居甲科琅邪王拱識公於童丱雅器重之至是拱自虞部正郎領桂州鋭於辟賢以酬不次之遇先拜章而後告公既而授試宏文館校書郎公為人子重難遠行稟命而去居一歲竟迫方寸而歸家在并汾間急於祿養捧從事檄於并州凡更三牧官至監察御史元和初憲宗聞其名徵拜右拾遺歷太常博士入尚書為禮部員外郎性至孝既孤以善居喪聞中月除刑部員外時帝女下嫁相禮闕官公以本官攝博士當問名之答上親臨帳幄簾內以窺之禮容甚偉聲氣朗徹上目送良久謂左右曰是官可用記其姓名未幾改職方知制誥詞鋒犀利絶人遠甚適有旨選司言高第者視草內庭宰臣以公為首遂轉本司郎中充翰林學士滿歲遷中書舍人專掌內制武帳通奏柏梁陪燕嘉猷高韻冠於一時會淮右稽誅上遣丞相即戎以督戰公草詔書詞有涉嫌者相府上言有命中書參詳竄定因罷內職歸閣中而君心眷然將有大用且出入以試之乃牧華州兼御史中丞錫以金紫居鎮七月遷大夫充河陽三城懷州節度使又七月急召抵京師拜中書侍郎同中書門下平章事天下然後知上心倚以為相非一朝也是歲元和十四年秋明年正月憲宗晏駕惜其在位日淺遭時大變穆宗踐阼轉門下侍郎平章事萬幾百度別有所付第以舊相署位充山陵使七月禮畢部下吏有以贓狀聞者朝典用責率之義是以左授宣歙池等州都團練觀察處置使兼御史大夫恩顧一異媒孽隨生旋又貶衡州刺史移郢州轉太子賓客分司東都尋起為陜號觀察使或有上封者稱前以奉陵寢不檢下獲譴今陵土猶濕未宜遽用次陜一日重為賓客分司長慶四年改河南尹其秋授檢校禮部尚書兼汴州刺史充宣武軍節度管內觀察處置等使汴州為四戰之地擇帥先有功峻刑右武疑似沈命號為危邦者積年公始以清儉自律以恩信待人以夷坦去㣥疑以禮讓汰慘急自上化下速於置郵泮林革音無復故態璽書勞之就加大司馬文宗纂服三年冬上表以大臣未識天子願朝正月制曰可操節入覲遷戶部尚書俄為東都留守又轉檢校尚書右僕射兼鄆州刺史天平軍節度使後以王業之始實為北京移鎮太原從人望也以吏部尚書徵續換太常卿真拜尚書左僕射大和九年冬十一月京師有急兵起上方御正殿即日還宮是夕召公決事禁中以見事傅古義為對其詞讜切無所顧望上心嘉之居一二日守本官兼諸道鹽鐵轉運使以斡利權既非素尚仡仡牢讓故復為檢校左僕射興元尹山南西道節度觀察使兼御史大夫開成二年十一月十二日薨於漢中官舍享年七十齊終之前一日自修遺表初述感恩陳力之大義中及朝廷刑政之或闕意切言盡神識不昏上深悼之形於愍冊未登三事故以贈之歸全之夕有大星隕於正寢之上光燭於庭天意若曰既稟之而生亦有涯而落其文章貴壽之氣焰歟初憲宗覽國書見五王復辟之際狄梁公實尸之公為台臣獨召便殿問曰仁傑有後乎公以其支孫試校書郎兼謨為對即日拜左拾遺公遂草制它日相銜者因抉其詞以為非春秋諱魯之旨穆宗新即位謙讓不自決遂有衡州之貶公議冤之嗟乎天之於賦豫也甚嗇而難周公獨富文華丁良時歷名卿至元老蓋忠廉孝友愛才與物合是粹美以將之邪可謂全德矣既免喪嗣子左補闕綯集公之文成一百三十卷因長子太子左諭德宏分司東都負其笥來謁泣曰先贈司空與丈人為顯交撤懸之前五日所賦詩寄友非他人也今手澤尚存言之嗚咽長號豫為之慟收淚而視分當編次之始公參大鹵記室以文雄於邊議者謂一方不足以騁用徵拜於朝纍遷儀曹郎乃登西掖入內署訏謨密勿遂委魁柄斯以文雄於國也嗚呼咫尺之管文敏者執而運之所知皆合在藩聳萬夫之觀望立朝賁㣥寮之頰舌居內成大政之風霆導畎澮於章奏鼓洪瀾於訓誥筆端膚寸膏潤天下文章之用極其至矣而又餘力工於篇什古文士所難兼焉昔王珣為晉僕射夢人授大筆如椽覺而謂人曰此必有大手筆事後孝武哀冊文乃珣之詞也公為宰相奉詔撰憲宗聖神章武孝皇帝哀冊文時稱乾陵崔文公之比今考之而信故以為首冠尊重事也其它各以類聚著於篇天以正氣付偉人必飾之使光耀於世粹和絪縕積於中鏗鏘發越形乎外文之細大視道之行止故得其位者文非空言咸繫於訏謨宥密庸可不紀惟唐以神武定天下㣥慝既讋驟示以文韶英之音與鉦鼓相襲故起文章為大臣者魏文貞以諫諍顯馬高唐以智略奮岑江陵以潤色聞無草昧汗馬之勞而任遇在功臣上唐之貴文至矣哉後王纂承多以國柄付文士元和初憲宗遵聖祖故事視有宰相器者貯之內庭繇是釋筆硯而操化權者十八九公實得時而光焉公諱絳字深之趙郡人在貢士中傑然有奇表既登太常第又以詞賦升甲科授祕書省校書郎歲滿從調有司設甲乙問以觀決斷復居高品補渭南尉擢拜監察御史未幾以本官充翰林學士居中轉尚書主客員外郎歷司勳郎中知制誥遷中書舍人風儀峻整敷奏讜切言事感動上輒目送之一旦召至浴堂門與語半日曰將移用於大位宜稔熟民聽遂出為戶部侍郎遷中書侍郎同平章事毅然有直聲及冊免而聞望益大周旋公卿間五為尚書歷御史大夫左僕射一以三公領太常刺近輔居保釐登齊壇皆再焉大和三年以司空鎮南鄭居二歲坐氣剛玉折海內冤惜之後三年嗣子前京兆府尹曹掾璆次子前監察御史裏行頊等泣持遺草請編之肇自從試有司至於宰天下詞賦詔誥封章啓事歌詩贈餞金石揚功凡四百餘篇勒成二十卷上所以知君臣啓沃之際下所以備風雅詩聲之義洪鐘駭聽瑤瑟清骨其在翰苑及登臺庭極言大事誠貫理直感通神祇龍鱗收怒天日回照古所謂一言興邦者信哉始愚與公為布衣游及仕畿服幸公同邑其後雖翔泳勢異而不以名數革初心今考其文至論事疏感人肺肝毛髮皆聳嗚呼其盛唐之遺直歟漢庭以賢良文學徵有道之士公孫宏條對第一席其勢鼓行人間取丞相且侯使漢有得人之聲伊宏發也皇唐文物與漢同風故天后朝燕國張公說以詞標文苑徵元宗朝曲江張公九齡以道侔伊呂徵德宗朝天水姜公公輔杜陵韋公執誼河東裴公垍以賢良方正徵憲宗朝河南元公禎京兆韋公惇以才識兼茂徵隴西牛公僧孺李公宗閔以能直言極諫徵咸用對策甲於天下繼而有聲宰相古今相望落落然如騎星辰與夫啓版築飯牛者異矣公本名淳舉進士登賢良既仕更名處厚字德載漢丞相扶陽侯之裔孫後周逍遙公敻之八代孫江陵節度參謀監察御史裏行贈右僕射某之元子生而聰明絶人在提孩發言成詩未幾能賦受經於先君僕射學文於伯舅許公孟容及壯通六經旁貫百氏咨天人之際遂探歷數明天官窮性命之源以至於佛書尤所通達初為集賢殿校書郎宰相李趙公監修國史引公直東觀就改咸陽尉遷右拾遺轉左補闕世稱有史才而能諫諍入尚書為郎歷禮部考功皆人望所在上方用威武以讋不庭宿兵寢久韋丞相貫之酌人情上言不合意冊免因歷詆所善公在伍中出為開州刺史居二年執友崔敦詩為相徵拜戶部郎中至闕下旬歲間以本官知制誥穆宗新即位注意近臣召入翰林充侍講學士初授諫議大夫續換中書舍人侍遊蓬萊池延問大義退而進六經法言二十篇優詔答之賜以金紫尋遷權知兵部侍郎知制誥翰林侍講史館修撰長慶四年春敬宗踐祚以公用經術左右先帝五年稔聞其德尤所欽倚內署故事與外庭不同凡言翰林學士必草詔書有侍講者專備顧問雖官為中書舍人或它官知制誥第用其班次耳不竄言於訓詞至是上器公且有以寵之乃使內謁者申命去侍講之稱慮未諭於百執事居數日降命書重舉舊官以明新意尋真拜夏官二卿由是內庭詞臣無出其右者凡密旨必承乎權輿故號承旨學士上富有春秋未親庶政有疑滯視公如蓍龜寶歷季年宮壼間一夕生變人情大駭雖鼎臣無所關決惟內署得預參畫㣥議閧然俟公一言而定戡難纘服再維乾綱今上繼統策勳第一擢拜中書侍郎同中書門下平章事以高才遇英主功顯人伏言無不從筆端膚寸澤及天下盡罷冗食請歸才人事先有司物止常貢城社無犯巖廊益尊感恩盡瘁不嗇神用大和二年十二月上前言事未及畢辭疾暴作以朝服委地同列白奏搢笏扶持之不能起上命中貴人左右翼負歸於中書如大醉狀上震驚咨嗟徵醫賜藥旁午謺委會暮肩輿至第詰旦以疾不起聞贈禭加常禮後十年嗣子蕃以太子舍人直宏文館編次遺文七十通銜哀貢誠乞序以冠其首謹桉公文未為近臣已前所著詞賦讚論記述銘志皆文士之詞也以才麗為主自入為學士至宰相以往所執筆皆經綸制置財成潤色之詞也以識度為宗觀其發德音福生人沛然如時雨裦元老諭功臣穆然如景風命相之冊和而莊命將之誥昭而毅薦賢能其氣似孔文舉論經學其博似劉子駿發十難以摧言利者其辨似管夷吾噫逢時得君奮智謀以取高位而令名隨之豈不偉哉初蕃既纂修父書咨於先執李習之請文為領褎許而未就一旦習之悄然謂蕃曰翱昔與韓吏部退之為文章盟主同時倫輩柳儀曹宗元劉賓客夢得耳韓柳之逝久矣今翱又被病慮不能自述有孤前言賫恨無已將子薦誠於劉君乎無何習之夢奠於襄州蕃具道其語余感相國之平昔且嘉蕃之虔虔孝敬庶幾能世其家故不敢讓云爾八音與政通而文章與時高下三代之文至戰國而病涉秦漢復起漢之文至列國而病唐興復起夫政厖而土裂三光五嶽之氣分太音不完故必混一而後大振初貞元中上方嚮文章昭回之光下飾萬物天下文士爭執所長與時而奮粲焉如繁星麗天而芒寒色正人望而敬者五行而已河東柳子厚斯人望而敬者歟子厚始以童子有奇名於貞元初至九年為名進士十有九年為材御史二十有一年以文章稱首入尚書為禮部員外郎是歲以疏雋少檢獲訕出牧邵州又謫佐永州居十年詔書徵不用遂為柳州刺史五歲不得召病且革留書抵其友中山劉禹錫曰我不幸卒以謫死以遺草纍故人禹錫執書以泣遂編次為三十二通行於世子厚之喪昌黎韓退之志其墓且以書來弔曰哀哉若人之不淑吾嘗評其文雄深雅健似司馬子長崔蔡不足多也安定皇甫湜於文章少所推讓亦以退之言為然凡子厚名氏與仕與年暨行已之大方有退之之志若祭文在今附於第一通之末云五行秀氣得之居多者為雋人其色瀲灩於顏間其聲發而為文章天之所與有物來相彼由學而致者如工人染夏以視羽畎有生死之殊矣初貞元中天子之文章煥乎垂光慶霄在上萬物五色天下文人為氣所召其生乃蕃靈芝萐莆與百果齊圻然煌煌翹翹出乎其類終為偉人者幾希矣東平呂和叔實生是時而絶人甚遠始以文章振三川三川守以為貢士之冠名聲四馳速如羽檄長安中諸生咸避其鋒兩科連中鋩刃愈出德宗聞其名自集賢殿校書郎擢為左拾遺明年犬戎請和上問能使絶域者君以奇表有專對材膺選轉殿內史錫之銀章還拜尚書戶部員外郎轉司封遷刑部郎中兼侍御史副治書之職會中執法左遷緣坐出為道州刺史以善政聞改衡州年四十而歿後十年其子安衡泣奉遺草來謁咨余敘之成一家言凡二百篇勒成十卷和叔名溫別字化光祖考皆以文章至大官早聞詩禮於先侍郎又師吳郡陸贄通春秋從安定梁肅學文章勇於藝能咸有所祖年益壯志益大遂撥去文章與雋賢交重氣概核名實歆然以致君及物為大欲每與其徒講疑考要皇王富強之術臣子忠孝之道出入上下百千年間詆訶角逐謺發連中得一善輒盱衡擊節揚袂頓足信容得色舞於眉端以為桉是言循是理合乎心而氣將之昭昭然若揭日月而行孰能閼其勢而爭夫光者乎嗚呼言可信而時異道甚長而命窄精氣為物其有所歸乎古之為書者先立言而後體物賈生之書首過秦而荀卿亦後其賦和叔年少遇君而卒以謫似賈生能明王道似荀卿故余所先後視二書斷自人文化成論至諸葛武侯廟記為上篇其他咸有為而為之始學左氏書故其文微為富豔夫羿之關弓惟巴蛇九日乃能盡其彀而回注鷃爵亦要失中於尋常之間非羿之手弓有能有不能所遇然也後之達解者推而廣之知余之素交不相索於文字之內而已心之精微發而為文文之神妙詠而為詩猶夫孤桐朗玉自有天律能事具者其名必高名由實生故久而益大尚書郎盧公諱象字緯卿始以章句振起於開元中與王維崔皓比肩驤首鼓行於時妍詞一發樂府傳貴由前進士補祕書省校書郎轉右衛倉曹掾丞相曲江公方執文衡揣摩後進得公深器之擢為左補闕河南府司録司勳員外郎名盛氣高少所卑下為飛語所中左遷齊邠鄭三郡司馬入為膳部員外郎時大盜起幽陵入洛師東夏衣冠不克歸王所為虜劫執公墮脅從伍中初謫果州長史又貶永州司戶移吉州長史天下無事朝廷思用宿舊徵拜主客員外郎道病留武昌遂不起故相崔太傅時為右史方在鄂以文志其墓其詞曰噫公妙年有聲振耀當代翱翔雲路不虞矰繳盛名先物易生癘疵三至郎署坐成遺耋蹭蹬江皋棲棲沒齒見知者恨之公遠祖元魏北齊後周皆為帝師公之叔父嵩山逸人諫議大夫皓然真隱者也公下世後七十三年其孫元符捧遺草來乞詞以表之嘗經亂離多所散落今之存者十有二卷凡若干篇片言可以明百意坐馳可以役萬景工於詩者能之風雅體變而興同古今調殊而理冥達於詩者能之工生於才達生於明二者還相為用而後詩道備矣余嘗執斯評為公是且衡而度之誠懸乎心默揣㣥才鈞銖尋尺隨限而盡如是所閲者百態一旦得董生之詞杳如摶翠屏浮層瀾視聽所遇非風塵間物亦猶明金綷羽得於遐裔雖欲勿寶可乎生名挺字庶中幼嗜屬詩晚而不衰心源為罏筆端為炭鍛鍊元本雕礱㣥形糾紛舛錯逐意奔走因故沿濁協為新聲嘗所與游皆青雲之士聞名如盧杜高韻如包李迭以章句揚於當時末路寡徒值余歡甚因相謂曰間者身以廷尉屬為荊州從事移疾罷去幽臥於武陵逮今四年言未信於世道不施於人寓其性懷播為吟咏時復發笥紛然盈前凡五十篇因地為目吾子常號知我盍表而志之為生羽翼豫不得讓而著於篇因系之曰詩者其文章之蘊邪義得而言喪故微而難能境生於象外故精而寡和千里之繆不容秋毫非有的然之姿可使戶曉必俟知者然後鼓行於時自建安距永明已還詞人比肩唱和相發有以朔風零雨高視天下蟬噪鳥鳴蔚在史策國朝因之粲然復興由篇章以躋貴仕者相踵而起兵興已還右武尚功公卿大夫以憂濟為任不暇器人於文什之間故其風寢息樂府協律不能足新音以度曲夜諷之職寂寥無紀則董生之貧臥於裔土也其不得於時者歟其不試故藝者歟釋子工為詩尚矣休上人賦別怨約法師哭范尚書咸為當時才士之所傾歎厥後比比有之上人生於會稽本湯氏子聰察嗜學不肯為凡夫因辭父兄出家號靈徹字源澄雖受經論一心好篇章從越客嚴維學為詩遂籍籍有聞維卒乃抵吳興與長老詩僧皎然游講藝益至皎然以書薦於詞人包侍郎佶包得之大喜又以書致於李侍郎紓是時以文章風韻主盟於世者曰包李以是上人之名由三公而揚如雲得風柯葉張王以文章接才子以禪理說高人風儀甚雅談笑多味貞元中西遊京師名振輦下緇流疾之造飛語激動中貴人因侵誣得罪徙汀州會赦歸東越時吳楚間諸侯多賓禮招延之元和十一年終於宣州開元寺年七十有一門人遷之建塔於越之山陰天柱峰之陲從本教也初上人在吳興居何山與晝公為侶時豫方以兩髦執筆硯陪其吟咏皆曰孺子可教後相遇於京洛與支許之契焉上人沒後十七年豫為吳郡其門人秀峯捧先師之文來乞詞以志且曰師嘗在吳賦詩近二千首今刪去三百篇勒為十卷自大歷至元和凡五十年間接詞客聞人酬唱別為十卷今也思行乎昭代求一言羽翼之因為評曰世之言詩僧多出江左靈一導其源護國襲之清江揚其波法振沿之如么弦孤韻瞥入人耳非大樂之音獨吳興晝公能備衆體晝公後徹公承之至如芙蓉園新寺詩云經來白馬寺僧到赤烏年謫汀州云青蠅為弔客黃耳寄家書可為入作者閫域豈獨雄於詩僧間邪澤宮送士歲貢也晉昌唐如晦以信誼為良弓文學為菆矢規爵祿猶衆禽密彀持滿遡風蜚繳者數矣有措杯之妙而無雙鶬之獲韔弓收視歸究其術繇是跡愈屈而名愈聞君子益多之彼不由其術一幸而中者雖懸貊在庭君子未嘗多也歲殫矣告豫以西余為賦澤宮一章庶見子之弓弗再張也已丞相彭陽公始由貢士以文章為羽翼怒飛於冥冥及貴為元老以篇詠佐琴壺取適乎閒宴鏘然如朱絃玉磬故名聞於世間鄙人少時亦嘗以詞藝梯而航之中途見險流落不試而胸中之氣伊鬱蜿蜒泄為章句以遣愁沮悽然如燋桐孤竹亦名聞於世間雖窮達異趣而音英同域故相遇甚歡其會面必抒懷其離居必寄興重酬纍贈體備今古好事者多傳布之今年公在并州余守吳門相去迥遠而音徽如近且有書來抵曰三川守白君編録與吾子贈答緘縹囊以遺余白君為詞以冠其前號曰劉白集悠悠思與所賦亦盈於巾箱盍次第之以塞三川之請於是緝綴凡百有餘篇以彭陽唱和集為目勒成兩軸爾後繼賦附於左方大和七年二月五日中山劉禹錫述貞元中豫為御史彭陽公從事於太原以文章相往來有日矣無何豫受譴南遷十餘年間公登用至宰相出為衡州方獲會面輸寫蘊積相視泫然爾後或雜賦詩贈答編成兩軸大和五年余領吳郡公鎮太原常發函寓書必有章句絡繹於數千里內無曠旬時八年公為吏部尚書豫牧臨汝有詩歎七年之別署其後云集卷自此為第三未幾豫轉左馮公登左揆每悔近而不見形於詠言開成元年公鎮南梁豫以太子賓客分司東都新韻繼至率云三軸成矣二年冬忽寄一章詞調悽切似有永訣之旨伸紙悸歎居數日果承訃書嗚呼聆風相悅者四十年會面交歡者十九年以詩見投凡七十九首勒成三卷以副平生之言長慶四年余為歷陽守今丞相趙郡李公時鎮南徐州每賦詩飛函相示且命同作爾後出處乖遠亦如鄰封凡酬唱始於江南而終於劍外故以吳蜀為目云大和八年豫自姑蘇轉臨汝樂天罷三川守復以賓客分司東都未幾有詔領馮翊辭不拜職授太子少傅分務以遂其高時豫代居左馮明年豫罷郡以賓客入洛日以章句交歡因而編之命為汝洛集
