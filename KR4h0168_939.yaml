front:
  text: 全唐文欽定全唐文卷九百三十九杜光庭十一
  hash: sha256:6d9ff6306ceac0bb2001fd7acf3452a7d3c89e25cb80618dcc08894f07799fb1
body:
  text: 伏以二氣陶融三元生化裁成品物亭育㣥方受命稟形上繫天府至於壽算遐促祿祚短長立身有罪福之因行運有吉凶之數天司地主宰無私臣伏恐三命五行或逢災咎九星七曜或值照臨陰陽有刑剋之期祿算有凶衰之會又恐積生所犯冤債未除積世所行過尢旋結常情罔測神道難知非託醮祈無由解釋輒因本命之日虔備香燈仰元象以披心對星壇而瀝懇敢希至聖俯鑒丹誠三官落罪之文五帝削災妨之籍臣宿瑕蕩滌積釁銷平輟死北宮上生南極天曹增祿司命延年眷屬和寧公私清泰即荷衆聖之恩不任伏聞垂象九天流光萬有帝車周運聖力遐通裁四海以無私福㣥生而不宰惟祈必應有願克從臣頃以大順二年遭逢危厄憂逾蹈火危甚履冰既難保於朝昏敢望全於形命元元丹懇啓訴無門惟注念蒼穹冥祈元斗潛興大願冀贖深災果蒙大道鑒臨至真通感垂好生之澤開罔極之恩獲洗罪尢盡消冤戾仰天慈而積感報元造以無階旋屬公役所拘道途無暇嵗華纍改誠願未申况復水陸經過江山往復幾逢俶擾頻值艱危幸脫鋒鉦免罹凶橫皆承廕護倍切兢榮今以本命之辰於玉局靈化詣北斗七元之殿當元卿大帝之前虔備醮壇恭酬往願昔所許奏錢若干貫請至今年八月五度奏納取畢伏惟斗中衆聖元府上司鑒顧丹誠曲回鴻造使宿願周備賜靈澤遐霑赦過除災延祥介福年祿增益危厄銷平眷屬乂安公私貞吉即永荷斗極衆真覆祐之恩不任伏聞三洞寶經九天真訣虛無凝愛混合成文龍篆鳳章發舒杳冥之始瓊編玉檢敷宣天地之先大則制御乾坤保鎮劫運安寧祚歷昭祐帝王次則和輯五行調平六氣蠲邪度厄濟物利人遵修則災咎可銷諷誦則禎祥可降臣等以母行年衰厄疾苦所嬰憂懼但深告祈無所敢憑元聖披瀝丹心伏願敕三寶威神命侍經寮屬解五行刑剋却三命凶衰增祿南天延生司契六府調理百病痊平永垂覆祐之恩克享遐長之福謹以玉局化轉經設醮冥叩至真不任臣聞天道無親輔茲有德功或及物福必無涯當川安撫副使張琳奉主無私酬知盡節初終一致雖風雨而不渝籌畫萬端越嵗寒而彌徑頃以四郊多壘兩鎮稱兵物力將虛經費逾廣厚斂則生靈必困薄賦則供億不充出自良謀豐其軍食糗糧山積戈甲雲屯人不告勞物無失所益振貔貅之勢佇成弔伐之功但以張某三命之中猶逢災厄二運之內甲祿氣微天符臨本命之宮土星逆愁煩之位慮為災咎輒罄誠祈爰託皇壇旁希元祐伏願十華降福三聖回光錫善貺於諸天災殃自息蕩過尢於九府祿算增延永俾安寧共康藩屏臣情誠迫切冒瀆高明不任伏以二氣清寧表天地亨貞之道五材倚伏荷乾坤成育之恩至於命籍短長祿祚豐薄立身罪福行運吉凶莫不上自天司旁資元命主張考校巨細無遺臣竊恐列宿五行躔次有照臨之咎九宮三命陰陽有厄會之期以此憂兢恐成災厄今以立冬令節祈福良辰虔罄丹誠精陳醮禮仰天闕而瀝懇瞻地府以冥心佇降恩慈曲流洪福使災凶殄息過咎蠲銷錫以嘉祥增其壽祿落罪書於北府紀生籍於南昌眷屬安寧幽明康乂回翔天路長親日月之光棲息人寰永沐真靈之祐不任伏聞歷象推移運三元而成嵗陰陽變化資大道以宣功澤霈幽明事均今古其有宏仁秉義體順和光則天錫禎符神彰吉貺或動乖守慎志協回邪乃蹈彼艱虞兆茲否塞影響之報理實昭然臣猥以庸虛早塵職祿雖肅恭自立畏慎推誠常懷聚鷸之譏每懼維鵜之誚况復訓齊戎伍祇奉藩垣鋒鏑猶施鉦鞞未息摧堅挫鋭徒申擒討之謀故殺誤傷慮搆幽冤之咎以茲屬念深用置懷今則秋帝考功地官校籍罪福咸舉毫末無遺或臣有塵忝之非有殺傷之故有六情之罪有三業之辜有注訟未除有冤讎未釋事題黑簿名挂陰曹乞垂悔謝之緣並降蠲消之澤俾其克勵得以自新至於宿曜垂災行年值厄亦希超度獲保乂安上祈九祖生天三塗離苦飛沈遂性生植無傷四方之戈甲早寧萬戶之農桑畢就俗聞謠詠野息氛埃咸歸清淨之風大洽希夷之道虔修醮酌懇薦章詞遙祝仙壇仰望真祐不任臣以庸微叨承宿運謬參職秩繼忝官榮統御戎車襲行條令或剋收境邑除蕩姦凶外禦寇讎內綏疲瘵而宴賓犒士須有宰傷去弊誅邪必資刑律誠非徇已務切安人竊慮斬決之間重輕有失傷殺之際故誤難明以此憂惶恐貽譴責又慮臣行年三命或值凶衰宿曜五星或逢臨照因其厄會遂履凶危又恐九祖幽儀未蒙遷拔六親滯識猶有拘留緬長夜以魂驚念陰關而心懼思罄歸依之懇仰申薦奉之誠輒憑本命之辰式備資薰之力冥心靈化遐想寶壇陳醮禮以肅恭貢章詞而精禱伏冀元元錫祐大道流慈光開泉曲之庭詔下酆都之府使九元超度衆苦蠲消生神碧落之天蛻影朱陵之洞福延後嗣惠被宗親其有往世愆瑕無窮冤對咸承懺滌並使和平乞臣罪落書生宮注籍災凶弭息祿算遐長兼祈福介川源澤覃遠近戈鋋早戢疵癘不生野復耕桑人歸富壽洎乎沈潛異質冥漠殊庭同沐元風咸升道域誓虔丹懇永奉鴻慈不任伏以灝氣漸凝㣥山挺秀高扶宸極厚鎮坤輿惟彼西南上通參井結靈積瑞含藏日月之華謺翠推嵐包括神仙之宅位崇衆嶽秩亞三山為天下之福庭冠域中之勝概崇臺比立黃軒之祕迹猶存巨浸旁分大禹之神功可覩每彰符應以祐生靈頃屬雨澤踰旬泉源坌涌丹崖翠巘雖傳隕圯之聲紺殿彤軒靡有震驚之變緬茲㣥異益驗光靈臣叨荷殊恩膺茲重寄綏撫之能未著兢憂之懇常深恐臣過咎所招仙嶽降異常之兆災蒙所襲神峯垂警告之祥夙夜省循若據冰炭莫展披陳之路惟虔禱謝之誠輒按明科恭申大醮庶蒙鑒祐以贖愆違不任伏聞元化運行三才資始體乾坤而成象感陶煦以凝神由是懸命籍於天關繫生死於斗極其有行藏巨細舉措纖微八靈伺察以無遺十值考讎而畢至善功潛著則名列仙曹過目所彰則書編鬼録用茲懲勸以導於人其惟本命尊神主張校録緬思元旨實切稟修臣猥以凡微曾無機略唯奉公克己效命為時未展勞能纍驚塵忝揣循增懼委任益深况封畿戈甲之餘壠畝榛蕪之後疲羸未復瘡痏未平撫之則濡沫才通撓之則溝湟甫及而驟司六邑務彼三農暑耨寒耕雖勤劬於人力有秋望嵗殊仰俟於天時但罄丹心禺祈元祐敢因本命之日虔申醮謝之儀所祈真聖鑒臨福祥臻萃赦臣叨據之苦奬臣肅奉之誠使鋒鏑早寧京坻有積人無疵癘之苦年祛水旱之虞俾臣九祖超升三塗清宴其或宿曜運行之厄嵗年刑剋之災淫刑濫賞之非故誤殺傷之咎並希昭祐暜錫蠲消永誓歸依以酬真貺不任伏以稟氣分形上資元化主算定祿仰繫真曹臣伏恐履行之間或貽愆咎年運之內或遇災凶非仗神功難申懺滌輒干真鑒虔備醮儀頃以此山嶽瀆上司神仙福地洞裏之玉樓金闕塵俗難窺人間之古殿荒臺蹤基易變梁摧螮蝀瓦落鴛鴦若無營葺之興已雜蒿萊之徑某叨居宰宇竊備繕修既俾功庸仍申藻繢圖五嶽九江之像貌河侯溪女之真肅穆冕旒駢羅珠翠如登貝闕似挹驪宮既輝煥於素垣益深嚴於元德所冀少城天府永賴休禎秋報春祈克承嘉祐敢因元命之日虔修讚祝之筵伏惟應念回軒分靈降澤錫臣以增延祿算助臣以消解災凶兩地之骨月安寧一境之生靈蘇泰誓傾丹悃上副元慈不任伏聞妙本應期元精啓運三光分照萬有陶形圓清方濁之間遞為主宰日域星躔之內各備職寮大則司劫歷弛張小則察人倫善惡有逾衡鏡無隱鋒毫竊惟九室洞天㣥真會府丹崖蕩日翠谷呀雲鸞旗之所往還霓節之所遊集叨膺宰宇獲詣仙山雖食蘖苦心飲冰潔己功應無補過必彰聞况於咫尺之中敢罔真仙之鑒更慮九辰行運三命推移福善不常災凶靡測拳拳素懇若履顛危輒因本命之辰載申祈醮之禮天衢地壤水府星宮咸罄血誠仰祈明祐伏乞解災釋過延貺垂祥壽祿惟增凶危自息已往則九天開度見存則兩地安寧一境生靈同承福廕兵車休駕封部無虞長欣靜謐之期永荷靈真之澤不任伏以二象分華三元列曜司悔吝吉凶之契操死生罪福之權主宰無遺幽明咸繫臣自惟凡昧夙奉正真叨荷寵章獲忝位祿循涯省分常懼於曠官恤物安人敢忘於勵已尚慮動違恭慎日積愆瑕上瀆真靈潛貽厄會又恐五星進退四曜運行或居身命之宮或臨惡弱之位况臣今年天符臨於命卦木星未出身宮第二十宿中蝕神所歷小運行直又值天羅竊憂福過災生命衰祿薄按河圖內品太元祕文瀝懇貢詞披心備禮仰華蓋儀璘之闕若對九芒瞻星辰日月之宮盡傾丹款伏冀宸光下燭開昏晦而洗沈冥靈景延暉碎禍車而焚罪網使年齡克保品秩攸升一境之士庶康寧兩地之親緣安泰仙山表貺人無瘥疫之傷靈府垂禎嵗有京坻之望唯虔素悃上答元功不任伏以七政上尊五靈元老位司北極部制中天至於地分吉凶天文災福五行六氣三命九宮萬彙慘舒咸歸考校臣以兵戈既久殘瘁逾年念彼生靈痛深肌骨敢因醮謁載罄祝祈瀝懇紫微叩心元象實希憫鑒俯降禎祥消沴氣於郊原退災星於井絡一川康泰萬有昭蘇永戢戈矛惟新祿算九天霧卷重披日月之光三蜀煙清再播雲雷之澤即仰荷帝君憫護之恩不任伏以天府名區少城奧壤龍神福地天帝雄藩豈以凡微叨茲臨鎮而謬分朝寄總此封疆十載於茲日深兢懼但以粵初蒞任便屬艱難黃巾犯秦翠輿幸蜀行朝萬衆駐蹕五年力盡扶天誠深報國功宣匡復以及回鑾其間有跋扈稱兵盱睢竊發秀升擁師於下瀨郭琪奮臂於中軍咫尺乘輿震驚輦轂上資睿武旁假神威相繼克平以安大駕感茲靈祐常貯血誠今則時未底寧人方肆亂帝車順動又幸陳倉中原有焚燎之災六合靡晏寧之所雖誠深憂國志切匡君難申嵇紹之忠山川杳隔空抆袁安之淚扈衛無由緬想神功必垂濟助爰申醮禮仰冀靈通希回助順之恩共安天步少借害盈之力遠掃凶渠復黃屋於上京延寶圖於萬葉椒漿之奠永答明慈臣不任瀝懇披心虔請之至惟彼仙山鎮茲坤壤八十一洞分日月於地中二十四峯繚煙霞於天際潛司罪福以統生靈臣夙慕元徽早崇清靜躬逢聖日既叨輔贊之榮夢想靈山常貯逍遙之志尚縈多事徒鬱素懷今節及仲秋禮當望秩遐瞻翠巘杳隔紅塵虔備醮壇用申誠祝伏冀虎旗龍斾遠辭八極之宮鶴馭鴻驂聊降二仙之駕歆茲薄禮錫以殊休俾稼穡有年凶災不起幽明共福家國咸安比帝祚於崇岡續唐年於劫歷必期修潔以奉靈光不任臣聞九元御極綜列宿於紫微七政垂光統衆星於黃道指攝提而臨萬象運招搖而主百靈生死吉凶咸繫司牧臣以受年之時此月火星及暗曜罡星皆臨本命以茲戰悚恐蹈災危敢以丹誠上祈元祐虔修大醮備瀝微衷伏惟九聖延慈乘帝車而降福七真垂貺回杓建以祛災二十八宿行藏皆資祥慶一十二宮分度永息屯蒙誓勤忠赤之心以答靈真之念不任臣以庸虛猥當大任極台衡之秩居藩屏之崇雖傾捧日之心莫著匡君之績頃以四郊多壘中國不寧戎馬載馳兵車尚駕或近臣肆逆或遠鎮辜恩才滅梟巢初回鑾輅又聞薄伐再致省巡凡在人臣豈勝憤惋惟炷香冥想望聖祖之貽休拜表祈真待陰兵之助役果見偽王孽相連頸殲夷凶帥朱玫繼蹤斬馘緬維幽讚更切明誠近又太乙運行已照蜀分五星移度或在身宮慮薄德所招即凶災洊至常加惕勵罔敢遑寧遂有鄭君雄韓球兩地結連遽興兵甲隔絶恩信淩犯關防殘掠生靈焚燒郡邑數州塗炭千里傷夷憫此幽冤痛深骨髓臣所以上祈至道明禱真靈志先憂國憂人誠匪為家為已由是上天悔禍大道降靈包藏者尋就誅鋤黨附者皆從剪撲封疆繼靜凋瘵旋蘇韓球敗亡君雄梟戮漸通道路將雪冤沈尚以芟刈之時殺傷非一仰體好生之旨震悼何安俯嗟遊岱之魂凄涼莫已是用凝神叩寂拜手歸心陳謝恩謝過之儀瀝祝地祝天之懇庶祈元聖曲鑒丹誠輝映清壇降流洪澤蠲除愆咎弭息災凶使生者乂寧幽途開泰臣又聞衆星拱極百谷朝宗蠢彼不庭敢違天道更鄰近境綿亘數州山寨相望久為凶逆欲恃其蜂合蟻聚之勢仗鋤耰白挺之徒垂二十年不賓睿化擬因揭瓴之便將申破竹之功為國除姦為人除害重希神力克震軍聲酆都以三十萬兵常祛沴氣洞泉有二十五將潛制妖徒正道殛邪神明助順敢緣斯旨再罄赤心伏惟俯鑒奏陳克回明祐使昌瀘梓遂永無蛇豕之災草木藂林盡化鋒鋋之狀咸知帝力主復王謠然後論賞龜城拜章鳳闕韜弓解甲歸馬休牛長諧魚水之歡克暢君臣之道明明血懇大道鑒之不任歸命祈祈恩屏營憤切之至謹詞伏聞大道垂功裁成品物真靈設位主宰㣥生至於水府明神山林正職各司罪福以庇蒸黎當縣地控上遊素名劇邑賦輿重大耕稼茲繁堤堰所防安危是繫某所修堰分當彼濬流自泛溢以來纍有摧壞雖俾夜作晝竭力焦心旋有葺完尋聞傾陷豈水脈所注不可備防豈龍神所為未容障塞憂惶迫切無所告祈且食乃民天人為邦本或虧秋稔必致年凶况天府膏腴勢連下瀨少城戶口旁接通波若為侵軼之災必有泥沙之變救茲墊溺須仗元威伏惟大道開恩明神流鑒愍其農畝念彼生靈回不測之神功借無私之聖力特垂濟護俾獲安全使黍稷永豐京坻有望息襄陵懷山之禍叶年豐俗富之期蘋藻效誠敢負靈貺不任三寶開光五文孕化凝水火木金之氣成雲霞龍鳳之書保制乾坤鎮寧天地洎乎降傳下土濟護㣥生夏禹得之以成功仲尼奉之而興詠有家有國罔不遵修所以服御神祗鎮安川嶽禳除氛沴清肅宮城至於居宅之興亦在鎮禳之例臣頃於所部特創新居既畢巨功爰申大醮按河圖品格依靈寶文儀篆刻真符清修香火所冀解銷犯觸安集正神召彼靈官永垂擁衛伏惟元元鑒祐衆聖流慈敕勤職司錫其禎貺居止寧泰眷屬康安分近天皇大火之鄉况屬身宮或鄰對照捫心震惕循已驚虞是用瞻本命福山仰列仙靈化歷三元而禱祝遍九曜以虔祈伏冀洞府神真披香奉御元元尊聖垂澤降臨賜臣以景貺禎符解臣以災期厄會克承祐護允洽康寧上願皇業天齊聖圖嶽鎮伊川洛汭運叶中興八水三山俗諧昭泰戢鋒鋋於九野共文軌於萬方臣得勵忠貞永扶英睿不任伏聞大道縱靈元和肇化燭三光而上列運六氣於中天播裁成字育之功物無不遂持寒暑暄涼之柄政無不均所以五星秉大帝之符司明罪福十神行太乙之令統御吉凶律歷難欺古今所秉臣遭逢聖運塵忝殊榮山河控井絡之雄封壤握坤維之重常虞福過實懼災躔今則涼德靡修太穹垂戒月朔則太陽薄蝕當對照之方既望則太陰變虧在身宮之位飛天火曜臨於命辰干祿納音仍逢衰氣恐成災咎彌切憂惶是用遵按元科勵精丹懇奉香羞於玉局陳醮禮於瑤壇仰三景以希恩暜周天而禱福伏冀昭彰俯鑒月人丁蠁垂休錫禎貺於三命五行解災期於身宮分野至有故傷誤殺往債宿冤咸賜蠲除永俾貞吉上願皇圖悠久聖壽延長還秦符大漢之隆宅洛契宗周之盛干戈偃戢夷夏昭蘇得傾報國之心克叶自天之祐不任激切虔祈之至謹詞伏聞道氣流布三才乃分陰陽陳變化之機水木肇相生之象巢穴之風既替宅宇之作遂興順二氣以營修體五行而制度實資神化大庇生靈臣以庸愚不明元理因時改作隨力興修土木之功曾無避忌穿鑿之處深有驚喧或抵犯王方或背違天道致使龍神未守居止非宜恐迫凶衰更延災厄謹歸心大道稽首三尊按靈寶明科修五帝大醮虔恭懺謝拜請符文懺已往犯觸之非祈將來安寧之福伏冀二儀介瑞五帝垂祥凶惡蠲除龍神鎮守人口清泰動靜康寧營造興工常蒙利祐公私和暢眷屬乂安即永荷太上衆尊五帝祐護之恩不任伏以大道垂化元氣流形鼓鑄㣥生有清濁剛柔之異舒張八節定春秋冬夏之方所以考校吉凶司明罪福惠既周於家國恩亦暜於存亡臣等獲值昌期早欽道化資神功而生育荷聖力以裁成竊慮處俗立身寧無過咎前生今世必有瑕或五行三命之中遭逢厄會或暗曜明星之卜因值照臨以此兢憂輒思祈醮爰逢令節同竭丹誠是天元啓候之期當大聖延慈之日翹心靈化稽首瑤壇精潔香花虔恭醮祝伏冀高尊鑒祐衆聖哀憐垂罔極之慈賜無疆之澤使積生罪惱纍世冤讎已往非將來厄運乘八節自新之力降三宮肆赦之恩並賜蕩除永錫貞吉使臣九元七祖受福祉於南宮眷屬親緣落死名於北府公私和洽壽祿遐長即永荷衆聖祐護之恩不任伏聞大道混融㣥材昭著陰陽升降吉凶之理肇分善惡循環罪福之文是啓玉虛大帝金闕元皇申命真靈俾其主宰三官五帝爰居勸沮之司南斗北元以統死生之録洪纖備舉億劫無差所以丹元經有修禳之祕訣祈天悔過有懺滌之明科竊仰宏慈敢陳微願臣獲膺宿會運偶昌期猥以凡庸遭逢異寵伏念戴清履濁寓世立身事主奉親自家刑國雖忠貞勵節勤瘁在公而休祉難臻愆違易集况臣頃因扈衛時屬艱憂豺豕欺天氛霾蔽日層巖瑞氣但布護於帝車九陌妖塵正昏蒙於輦道乃忠義奮身之際是人臣效命之期得以手捧天樞身排鯨浪克寧皇極以罄丹心遂叨非次之恩遽荷重難之寄連營貔虎千里提封慚無監撫之能但切兢憂之懇竊恐臣前生今代歷劫以來未達正真動成罪戾或上虧天理下犯地宜中忤人情旁違物性十躔外積三業內興或助順除姦誅邪佐命或故傷誤殺秉法持綱或星曜運行時逢臨照或三命經歷因值衰危八卦九宮有刑妨之數冤讎債訟有考對之文幽晦常情眇然難測惟資修奉上叩元虛冀獲感通克承覆祐是用按河圖真格披正一靈科溥海嶽以貢誠遍乾坤而瀝懇恭陳醮禮以展肅虔伏惟三寶回光衆聖流鑒赦其宿過錫以殊休罪蠲消生名列品和平冤債清蕩災凶九元七祖同霑洪澤六姻九族咸沐元慈俾川境安寧生靈輯睦俗無疵癘野有謳歌幽府冥司神輝朗徹飛行蠢類惠渥滋濡上願國步夷平聖躬和暢五兵韜偃萬宇乂康鑾旗早復於秦京象法重懸於魏闕瞻天望日言發心馳不任
