front:
  text: 全唐文欽定全唐文卷四百五十沼為鳳翔隴右節度使張鎰屬官營將李楚琳作亂死其難
  hash: sha256:4c55ccd4b0016ba693057eace5f9a548b4987959829e46fd20f48e150f4973b3
  markers:
  - {type: head, offset: 13, content: 王沼, id: KR4h0168_NFKB_450-h1, level: 1}
body:
  text: 任良物官著國典而為重守法立度在所司而靡踰丁筮仕策名掄才授署既而天書薦委寧俟及之期會府陳辭重希刈楚之選官才登於纍日時已後於三冬允哉廢置明乎用舍雖進賢是急冀開取士之門而嚴敕不移誠曰在公之義訴而不納信謂得宜況歲進其書事有徵於前志不拘以限亦何聽於薄言請俟他年無隳舊典錫寶應中進士官禮部員外郎皇上端拱穆清法春秋五始之要酌禮樂三代之英赫帝典含元正衡紀允叶攝提為貞疏龍首以抗殿靡魚須而建旌開彤庭執玉帛者萬國發金奏韻簫韶而九成祥風應律慶雲夾日華夷會同車書混一羽衛宿設乘輿曉出陳八佾象鈞天之儀舞百獸備充庭之實彼毛㣥與羽族感盛德而呈質度曲既三薰風自南進旅退旅兮猛志外戢擊石拊石兮和氣內含忽齊首以瞪目乍脈脈而耽耽威而不猛樂而不諼搏鷙者搖尾而就養剛狠者戢角於觸藩牝馬馴致於坤德㣥龍利見於乾元若乃大禮成壽觴薦天聲起皇威遍金石鏗鏘以攢雜文物葳蕤以蔥蒨獸臣獻伎於廣廷樂正舉麾於層殿怛荒戎於醜虜咸稽首而革面其初進也波委星攢如岡如巒發揚蹈厲兮鼓舞爭集無大無小兮容止可觀其少退也軍旋陳折匪蠻匪貊蹄角且千兮羽儀纍百詭色殊奇兮相輝赫赫豈獨九尾靈狐一角神獸顧免宵落麒麟夜鬬非熊非羆為猿為狖威鳳巢閣騶虞在囿條支之犀黃支之鷇而已其徒實繁厥狀非一五靈嘉瑞百寶異質數不可盡之於詞名不可殫之於筆莫不聞至樂而知感樂皇風以相率忽指顧於應規亦回旋而中律穆穆焉羌難得而備述則知樂之感也深德之被也普彼禽獸之遇聖隨萬里而咸覩至若吳歈越吟荊豔楚舞徒慆堙於心耳安擬議於干羽曾不得充虞舜之帝圖列后夔之樂府辭曰鑠元會兮正王度奏雲門兮歌大濩百獸舞兮四夷懼于胥樂兮皇風布客有慕上古之賡歌望承明而獻賦漢宮昏曉兮樓殿相望雙闕雲聳兮千門日長銅壺夜漏金鏡朝光鏘華鐘兮肅天居之岑寂張猛簴兮壯神容之焜煌含虛守靜應用無方聞之者朝警而夕惕扣之者神和而意揚此乃樂府之彞器宮懸之高張豈比夫羽籥絲竹匏土革木徒攢雜以鏗鏘若乃九陌初昏重門聚清禁將開繁星乍落月宿翠樓風清金閣發清聲之響亮覺層樓之寥廓思遠客於鶉衣怨美人於羅幕足使懷愁者感之而增欷得志者聽之而愈樂豈在物之有心伊人情之所托及夫雞人未唱鵠鑰猶封星翻南陸月挂西峰出入萬室周流九重走軒車於金馬震櫺檻於銅龍千官警兮清佩響百鳥鳴兮春露濃豈謝泗濱之浮磬豐嶺之霜鐘而已哉夫其逐吹含空馳煙驛霧徘徊宮闕演漾官署虎嘯空中龍吟何處近從丹庭之室遠盡青門之樹刜之以劍思利器之一揮擊之以莛歎清音之難遇豈獨稱鳧氏於周典發鯨魚於漢賦爾其舂容鼓怒之音千石萬鈞之實洪爐鎔冶之姿追蠡篆文之質總衆美以混成亮吹萬而得一客有羈旅靈臺經過牟首元文未獻白賁徒久聲聞於外空美鼓鐘於宮氣或在天誰知藏劍於斗懷洪音而未發敢虛心而待扣至陽之精內含文明成命宥密神化陰隲倬元聖而緯天爍靈符之在日人文變見元象貞吉煥爾殊容昭然異質三陽並列契乾體以成三一氣貫中表聖人之得一當是時也河清海晏時和歲豐車書混合華夷會同皇帝乃率百吏禋六宗登臺視朔候律占風祀夕月於禮神之館拜朝日於祈年之宮霽氛霧掃煙虹地涯靜天宇空陰魄既沒大明在東吐象成字昭文有融法科斗以為體並踆烏以處中馮相未覿疇人發蒙此乃聖人合契至化元通不然者何得曜靈起瑞明被於有截垂光燭地運行而無窮聖人以不宰成能日月以無私可久偶聖則呈祥逢昏則顯咎貞觀契無為之功休祥應無疆之壽沒於地我則取誡於明夷登於天我則呈形於大有其初見也昭昭彰彰流晶耀芒若神龍負圖兮呈八卦於羲皇其少登也發色騰光乍見乍藏狀靈龜銜書兮錫九疇於夏王蔽虧若木隱映扶桑曈曨五雲之表輝映重輪之旁臨紫宸兮千門洞照出黃道兮八極增光惟德化成惟王正位兄其日兮姊其月父事天兮母事地罄六合以為王統三才而制字道不藏寶神開奧祕王在日兮垂文日在天兮重懿豈徒色映合璧光連抱珥三舍回魯陽之戈載中美漢文之志皇上以為命不于常惟德是據災逐祥啓福隨禍著知微知彰一喜一懼因嘉瑞以增德合元符而降祚客有上國觀光金門獻賦覩日中有字之感成天下至公之務傾心太陽企踵雲路願回光以暫燭庶千載之一遇琮寶應中擢進士第至尊者王至明者日處其位兮無二配其德兮惟一制服以象必圖之而並臨視朝以時方候之而俱出懿夫日實也厥生于東王往也厥居於中其呈象以下燭必布德而上通然則日中之有王字者豈不以昭宸聰彰國風煥乎黃道赫矣蒼穹表皇綱之不紊延聖祚於無窮者哉且天垂三光日當其首人執六藝書列於後此神功之所成彼人力而何有況乎烏為鳥矣無慚蒼頡之能日匪扇焉寧假右軍之手稽圖緯於載籍信可大而可久豈比夫龜麟龍鳳徒在乎宮沼郊藪適足以勞於使臣未可以齊乎不朽夫運行不已者天地之常臨照無私者日月之光美之則配於太昊惡之則比夫夏王是以逆其時則休亦成咎順其道則否亦為臧故昔王者莫不觀天文兮順陰陽授人時兮正紀綱而人用康而邦其昌如此者厥鑒不遠實歸美乎我皇信所謂承天之序襲於休祥者也是知君能則天天必呈瑞明海內之四目瞻日中之一字士有仰止雲路苦心詞賦戰欲酣兮日將暮儻魯陽之修戈可借冀和仲之餘暉可駐願傾葵藿之心希成桃李之樹映瀛州高陽人舉進士博學宏詞纍授監察御史建中初遷刑部員外郎拜給事中轉中書舍人貞元二年以本官拜平章事改中書侍郎封河間縣男貶夔州刺史歷衡州洪州十一年卒年四十八贈禮部尚書諡曰忠閉天地成四時者元冬麗乎天明萬方者白日至若斗杓移指寒氣入律霜函冰以凝沍風落木兮蕭飋始乘乾以運行乃宅巽而是出明在地上望杲杲於扶桑光搖水中疑泛泛而萍實故日出暘谷衆人熙熙苦寒者自我而燠若即幽者自我而明之將所鑒而並鑒故無私而不私懿夫吾君之威可畏可愛象嚴凝以神武配耀靈於光大是以愚智必仰賴者也又如殘夜猶昧破積陰以重光晨霜正繁濟輿民於附火聖人納諫亦替否而獻可同彼天象發陽明以自東觀乎道經體人庶而居左君法日也申文明於九重臣諫君也扇和氣於三冬故時以泰歲以豐方夔龍而並騖與步驟而追蹤臣某言伏聞南蠻以六月某日大破吐蕃弄視等城擒戮俘獲不可勝計者臣聞德之所綏在遠咸服義之所棄雖暴必亡蠢茲犬戎敢肆凶戾久稽天討時動邊塵人神共讎夷夏同憤遂使南蠻奮旅仗義爭先覆其保障之時奪彼肥饒之地斬馘萬級俘計千㣥揚天聲於區外正王略於殊俗自非陛下道超帝圖化協神用武先七德守在四夷安得使百蠻稽服潛被聲教始左衽以請吏俄倒戈而效誠舍其唇齒之資為我爪牙之用雖書稱即敘詩美來威方之聖功彼有慙德臣謬膺朝寄待位東土不獲隨例稱慶闕庭忭躍之誠倍萬恆品不勝慶快之至臣某言臣聞荷覆載之德者願酬天地之仁懷涓埃之勤者冀裨海嶽之大所以思或出位知無不為況臣受寵過深感恩逾切不竭忠以自效是盜祿以苟安臣某中謝臣伏見三時雨一穀不登黎庶以闕二字不知卿士以月俸自恃竊惟聖慮已積憂勤凡在人臣何以安處昨者自春及夏時雨漸陛下心憂於清穆之中躬禱於靈池之上精誠所至昭感遂通祥禽呈瑞於御前膏雨布澤於天下遂使百穀皆稔九土大豐國無不獲之夫代成廉讓之俗斯乃皆由聖德上合天心顧此齊人俱受其賜此何異開口待哺澡身仰衣豈知宸衷不可常勞靈雨亦難恆若者也必在酌堯舜之至道舉祖宗之成法復修義倉以救歉歲則黎人絶水旱之困陛下釋憂勤之念君逸無勞乃合至道足食無患斯謂雍熙豈臣率心實聞方册又臣伏以賦稅之道理化之源必資考古酌今以通其變俾為經制豈利因循各具狀別隨表臣某中謝伏以聖心屬念惟在黎元微臣蠢愚嘗歷州府敢以所見備於上聞徒竭誠請理猶未明輕冒宸嚴不勝隕越臣某言前月十七日八陵禮畢臣議以為不合賀宰相御史臺罰臣一月俸至十九日宰相奉宣聖旨不須罰者臣以愚直守職造次執文憲司班列失儀委典書罰聖慈照鑒特恩釋放兢懼戰越不知所圖臣某中謝臣伏以昨者八陵之禮百王未行特由陛下發於孝思成此盛典祉歸聖祚慶屬皇家惟當稱賀殿廷豈合推美臣下事關諂瀆禮近嫌疑臣忝職司豈敢苟且又詳郊廟之禮與臣愚見亦同但緣李汶性褊而剛不敢對衆陳白所以入咨宰相冀其無迹而停豈圖智小慮深竟以徇公招咎陛下察臣等守直免臣罰俸懲勸斯在隕越何酬臣某中謝臣素庸虛叨蒙獎擢身則誠為賤品官是陛下九卿臺司理在持綱臣則職當執理綱失是一時之誤禮失為終古所非書罰已擅臺威放罰特聞聖造誠合各守職分上答恩私宏陛下太和之仁示朝廷至公之道豈以蓄憤未泄求過轉深數日已來衆情共悉臣昨自緣公事頻詣延英李汶疑臣別有披陳遂欲曲生瑕舋責臣不賀宰相則上引班列失儀惡臣專守禮文則旁説河南殘破其牒已公行組織欲杜臣之口近聞又有譖説擬陷臣之身不敢縷有塵煩自當漸布行路臣孤立無援行公奉職惟聖明在上微臣必不及寃但恐誣構日深慈母亦當動聽臣今不敢避李汶之怒惟懼失人臣之和夙夜不寧憂惕成病若更請對轉恐生疑戰汗倣徨不知所處無任兢懼感恩之至臣某言臣聞修身止謗君子之道尚口自理小人常情臣雖駑劣不才竊服師父之訓縱有謗讟未嘗辨明久必自孚庶無所愧況釋謗於已則必委過於人棄讓違謙何愧之甚然命之所切不緣臣身伏以受陛下命官之初直自聖心所擇遽致遺闕上纍皇明此臣不得不辨一也聞謗臣之詞以驚聽為務或云父子相食或云盜賊公行山谷之間已有結聚或云坊市之內亦致流亡儻或上達天聽則貽憂聖慮又臣不得不辨二也臣某中謝臣伏以鄰近數州去年皆同水旱惟當府一境前年先有水災既已積憂又加再歉其間數縣人戶頃者實多逃移據兩稅案所有未歸人戶尚有一千五百已下有負獎任不勝憂惶自蒙陛下恩慈特發倉儲賑貸安業者無不歡欣逐食者漸已遷還幸災之人騰謗益甚致滋嫌怒實此根由蓋緣臣自到任以來事有不幸曾正寃獄嘗奏貪官且獄是聖衷所明幽魂知感贓是疫人之害疏網不容當官而行於臣何有今則彞章雖舉衆怒遂深乃於道路郵亭造其飛語又於往來使客揚此虛聲轉至沸騰布於遠近且謗臣者以去臣為限臣不去不休臣若尚安居謗亦滋甚向念時雨未降人心易搖乞罪微臣以安百姓今月十九日又得南市署丞張斌狀送留守牒市之意似欲慰人戶詳其榜內之詞却慮搖動愚下其牒云戶口流散村落空虛恐依山林變為狂寇攘竊道路隔硋往來者今地即王畿有事尚令密啓人皆服化虛詞豈可榜陳敢言不利府司又恐惑於遠聽臣伏以俱承寄任貴務和同今日故就皇城自取商議既至門首又不見臣臣憂懼轉深不敢不奏其市榜諸縣見擬移牒請其且收臣既昧通方輒陳事體兢懼戰越不知所裁今東都幸有臺省之官悉是朝廷所擇職為耳目身在都城固諳纖微望委勘察庶事責實甘待刑章無任惶懼懇迫之至臣某言臣聞恩之重者非命可酬誠之切者無言以代但無以非命又無以可伸臣某中謝臣又聞君親之恩天地之理在臣所感異於常恩臣於廣德二年曾授徐州一尉既不赴任即同無官建中之初便荷聖澤自此纍擢以至台司此臣所感異於常恩一也聖朝特重史官宰臣先獲兼授况臣不逮忽竊殊私此臣所感異於常恩二也敢言守直實稟至愚是以凡所歷官必遭飛謗慈母有投杼之惑古人著竊鈇之疑臣獨何人纍蒙聖察此臣所感異於常恩三也但夙多羸疾今迫衰齡常恐殊恩未酬朝露溘盡負天愧地不知所云臣某中謝臣又聞西晉山濤之事君每有所知必有密奏晉代謂之山公啓事實若今之榜也意在臣展盡忠之道君擇可採而行使政自上施言無外見但以臣性本庸淺識又暗劣每有聞見莫辨是非若合陳不陳懼乖耳目之任不合奏妄奏則當塵瀆之辜是積慙惶亟歷星歲竟未能舉一賢以自代興一利以上陳冒寵偷安其罪至重更以臣除官制云爾其竭誠啓沃以廣視聽故臣得以盡其管見塵浼天聽謹別録狀同進以聞無任兢惶戰汗之至臣某言伏以臣之依君猶子之依父若心有憂患口不陳聞則是孤負恩慈自取禍敗臣某中謝臣去年八月十九日陛下賜臣蔭官詔云漕運成功擢居東掖者臣俯慙光寵上感聖明粉骨糜軀匪申報效臣昨東都主運之日是上都闕糧之時賊寇未平蝗蟲方甚臣於河陰領米分付陝州務相催驅不敢回避其時王事至切臣官最卑臣心雖守謙恭公事亦多抵誤猶蒙陛下遣假日暹宣慰於臣處事之難臣有微功實由天庇及臣延英對日不敢一言自陳怒臣者疑臣以張聲勢憂臣者料臣必投魑魅今臣貶官自緣親纍聖恩猶與上州自然宿怒未平因恐小人承便臣既在遠還固易誣痛則呼天實在今日憂之切者謹陳一端往者張鎰在鳳翔之時奏留都營田副使張信之得罪自為犯贓以臣不與往還於臣便生疑怨一昨秋夏之際張信之多在上都自臣貶黜已來不知今向何處但慮知臣在遠又知執政憎臣必恐求媚取容構虛逞怨倘有罪戾聞於聖聽乞降三司審推則臣萬死無恨方當黜責猶恃恩私仰望天顏實如咫尺無任憂迫恃恩之至臣某言臣不幸多疾且昧攝生積年不瘳遂成沉痼內有五臟心病轉深外有四肢足力不逮豈可參掌密命趨侍玉階上負聖私下曠公事縱恃恩無懼而省已何安臣某中謝臣以為寵祿不可苟偷疾病實難自強所以每轉一職常積憂惶自頃受官纍經陳乞及奉天拜命陛下殷憂臣合捐生豈敢言病況當憤切所致實亦患苦自忘今逆臣殲夷庶物欣暢餘生獲泰宿疾頓來豈無諸醫竟未有效忪悸之疾動發無時事輒經心病則加劇或達曙方定或彌日不瘳神形怗然若無所據又風痺之狀趨步蹇止往來扶策自不能持念此餘生顧成廢棄豈宜叨處榮位貽穢台司聖恩縱欲優容公議實難逃避特乞賜臣骸骨待盡邱園冀勿藥以稍痊實殺身而非報無任懇迫惶懼之至臣復言臣以沉疾在躬不任所職每因召對輒具上聞遂敢重表陳誠所冀俯回天鑒伏奉還詔未蒙矜允慙惶靡據冰谷在懷臣某中謝臣竊以幹事先於志氣立朝本於威儀威儀整則朝無惰容志氣強則事無遺理今臣足疾近安敢高行止年又衰殆豈任機務況自宣恩復命僅歷七旬扶疾趨朝唯經再月竊惟非據何心自安聖恩雖欲優容公議實難逃責且頃冒榮獎屬當艱虞在中無獻納之能奉使乖撫綏之術涓埃莫效僭忝實多上孤恩私內苦疲薾將何以奉中興寧濟之道致泰階平一之符夙夜愧怖精爽飄越伏惟皇帝陛下高覆厚載慈惠生成矜臣朽憊賜臣首領豈惟微臣免曠官之罪實亦聖朝廣全育之恩臣復言臣以病曠官合從罷免纍陳丹懇冀蒙允察再奉墨詔猶未優容受恩則深揣分增懼臣某中謝臣聞循已就安聖賢之深誡捐軀報節臣子之大端況臣一門荷恩四葉為相謬以姻戚光於宗親殊私未酬微命寧顧但苦病在方寸慮事則愈昏職近宥密尸位則多曠今四遠氛祲尚未廓清萬機損益皆關聖慮是明王宵旰之日賢哲馳騖之秋豈臣妄庸所當毗倚犬馬之戀雖欲遲回夔龍之行詎宜塵穢伏乞曲留宸鑒俯察愚衷矜臣量力之請免臣妨賢之責私誠獲遂公議允諧無任悃欵悚迫之至臣某言臣生何僥幸遇聖屬千年之運命何乖薄染患逾十旬之程法既限於朝章事竟塵於天聽惶懼戰灼不知所圖臣某中謝臣自三月天澤傍流御醫親降膏肓既辨沉痼日輕但於寢疾多時羸頓猶甚支體骨立氣力惙然審慮旬日之間未任朝謁之禮更以法資畫一令在必行豈以微臣虧於大憲況中書近密樞務重切不可一日而闕臣以纍月在假頗為曠闕罪實難逃更乞淹延心何自處故臣之陳奏非敢竊退讓之名臣之懇誠非為追止足之誡直以當其無病猶不逮人既以違文豈堪玷法伏乞宏廣運之道崇大中之規是歸執象之言以副垂衣之理豈微臣幸甚實彞章幸甚無任誠懇之至右準式文臣當州不在行香之數伏以聖朝宏孝御下崇德追先憑法力於傳香奉永懷於率土下垂甲令旁感物情臣州稍以遐遠比於列郡遂漏恩私俱承亭育之中獨隔情理之外況語桂廣則道里猶近並接衢婺則州望悉同推於等夷倍切誠懇又垂白之老一命之士或生於開元天寶或逮事肅宗代宗從頂至足生成是賴五月六月思慕彌深方當感切之辰難抑衆庶之意臣又以國家榮建寺觀繼度緇黃所種田疇已為優厚食時受供皆荷殊恩忌辰修齋當茲別給如蒙聖澤許同鄰州應緣香燈所需皆率官吏取足於刺史以至末班輕減俸錢敬修法事庶使山越遺老咸覩漢儀海郡具僚率由唐典無任至誠至懇之至中使某至奉宣進止賜臣馬一匹并鞍轡者臣官叨上司日荷厚俸固其乘馬足展驅馳宸眷過深聖慈猶軫猥出上駟特賚微臣豈徒體合鑄金法相皆備而乃足符歷塊驥德是稱仍束以銀鞍絡以金轡顧自微賤何可服乘拜命驚惶不勝戰汗當攬轡之際思六合於如琴執鞭之辰度三代之得策空懷夙夜寧效涓塵無任感激之至右今日中使景忠信至伏奉恩旨賜臣前件馬并鞍轡告身衣服等寵賚所及遑荷難勝臣自受命以來神爽飛越晦明之際寢食靡遑恩私特加榮錫備至命書煥耀渥澤殊常出衣服於御府輟驊騮於天廣既負乘之懼不稱之災慶賜有溢目之榮獎任有提耳之誡以臣愚陋負荷難勝雖欲殺身豈酬鴻造無任感恩惶懼荷戴之至謹奉狀陳謝以聞謹奏
