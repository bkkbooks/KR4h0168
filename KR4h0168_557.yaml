front:
  text: 全唐文欽定全唐文卷五百五十七韓愈十一
  hash: sha256:a9b241f14219a60d4a69ee877e471fe381167537ac6f8f05aeef983ec79fdac2
body:
  text: 貞元十四年正月戊子隴西公命作東西水門越三月辛巳朔水門成三日癸未大合樂設水嬉會監軍軍司馬賓佐僚屬將校熊羆之士肅四方之賓客以落之士女和會闐郭溢郛既卒事其從事昌黎韓愈請紀成績其辭曰維汴州河水自中注厥初距河為城其不合者誕置聯鎖於河宵浮晝湛舟不潛通然其襟抱虧疏風氣宣泄邑居勿寧訛言屢騰歷載已來孰究孰思皇帝御天下十有八載此邦之人遭逢疾威嚚童噭呼劫衆阻兵懍懍栗栗若墜若覆時維隴西公受命作藩爰自洛京單車來臨遂拯其危遂去其疵弗肅弗厲薰為太和神應祥福五穀穰熟既庶而豐人力有餘監軍是咨司馬是謀乃作水門為邦之郛以固風氣以閈寇偷黃流渾渾飛閣渠渠因而飾之匪為觀遊天子之武維隴西公是布天子之文維隴西公是宣河之沄沄源於崑崙天子萬祀公多受祉乃伐山石刻之日月尚俾來者知作之所始太原王宏中在連州與學佛人景常元慧遊異日從二人者行於其居之後邱荒之間上高而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤燔椔翳却立而視之出者突然成邱陷者呀然成谷窪者為池而闕者為洞若有鬼神異物陰來相之自是宏中與二人者晨往而夕忘歸焉乃立屋以避風雨寒暑既成愈請名之其邱曰俟德之邱蔽於古而顯於今有俟之道也其石谷曰謙受之谷瀑曰振鷺之瀑谷言德瀑言容也其土谷曰黃金之谷瀑曰秩秩之瀑谷言容瀑言德也洞曰寒居之洞志其入時也池曰君子之池虛以鍾其美盈以出其惡也泉之源曰天澤之泉出高而施下也合而名之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也於是州民之老聞而相與觀焉曰吾州之山水名天下然而無與燕喜者比經營於其側者相接也而莫直其地凡天作而地藏之以遺其人乎宏中自吏部郎貶秩而來次其道途所經自藍田入商洛涉淅湍臨漢水升峴首以望方城出荊門下岷江過洞庭上湘水行衡山之下繇郴踰嶺猿狖所家魚龍所宮極幽遐瑰詭之觀宜其於山水飫聞而厭見也今其意乃若不足傳曰知者樂水仁者樂山宏中之德與其所好可謂協矣智以謀之仁以居之吾知其去是而羽儀於天朝也不遠矣遂刻石以記書記之任亦難矣元戎整齊三軍之士統理所部之氓以鎮守邦國贊天子施教化而又外與賓客四鄰交其朝覲聘問慰薦祭祀祈祝之文與所部之政三軍之號令升黜凡文辭之事皆出書記非閎辨通敏兼人之才莫宜居之然皆元戎自辟然後命於天子苟其帥之不文則其所辟或不當亦其理宜也南陽公自御史大夫豪壽廬三州觀察使授節移鎮徐州歷十一年而掌書記者凡三人其一人曰高陽許孟容入仕於王朝今為尚書禮部郎中其一人曰京兆杜兼今為尚書禮部員外郎觀察判官其一人隴西李博自前鄉貢進士授祕書省校書郎方為之南陽公文章稱天下其所辟實所謂閎辨通敏兼人之才者也後之人苟未知南陽公之文章吾請觀於三君子苟未知三君子之文章吾請觀於南陽公可知矣蔚乎其相章炳乎其相輝志同而氣合魚川泳而鳥雲飛也愈樂是賓主之相得也故請刻石以記之而陷置於壁間俾來者得以覽觀焉丞之職所以二令於一邑無所不當問其下主簿尉主簿尉乃有分職丞位高而逼例以嫌不可否事文書行吏抱成案詣丞卷其前鉗以左手右手摘紙尾雁鶩行以進平立睨丞曰當署丞涉筆占位署惟謹目吏問可不可吏曰得則退不敢略省漫不知何事官雖尊力勢反出主簿尉下諺數慢必曰丞至以相訾謷丞之設豈端使然哉博陵崔斯立種學績文以蓄其有浤涵演迤日大以肆貞元初挾其能戰藝於京師再進再屈闕一字人元和初以前大理評事言得失黜官再轉而為丞茲邑始至喟曰官無卑顧材不足塞職既噤不得施用又喟曰丞哉丞哉余不負丞而丞負余則盡枿去牙角一躡故迹破崖岸而為之丞廳故有記壞漏汚不可讀斯立易桷與一九冰墁治壁悉書前任人名氏庭有老槐四行南牆巨竹千梃儼立若相持水虢虢循除鳴斯立痛掃溉對樹二松日哦其間有問者輒對曰余方有公事子姑去考功郎中知制誥韓愈記愈少時則聞江南多臨觀之美而滕王閣獨為第一有瑰偉絶特之稱及得三王所為序賦記等壯其文辭益欲往一觀而讀之以忘吾憂繫官於朝願莫之遂十四年以言事斥守揭陽便道取疾以至海上又不得過南昌而觀所謂滕王閣者其冬以天子進大號加恩區內移刺袁州袁於南昌為屬邑私喜幸自語以為當得躬詣大府受約束於下執事及其無事且還倘得一至其處竊寄目償所願焉至州之七月詔以中書舍人太原王公為御史中丞觀察江南西道洪江饒虔吉信撫袁悉屬治所八州之人前所不便及所願欲而不得者公至之日皆罷行之大者驛聞小者立變春生秋殺陽開陰閉令修於庭戶數日之間而人自得於湖山千里之外吾雖欲出意見論利害聽命於幕下而吾州乃無一事可假而行者又安得捨己所事以勤館人則滕王閣又無因而至焉矣其歲九月人吏浹和公與監軍使燕於此閣文武賓士皆與在席酒半合辭言曰此屋不修且壞前公為從事此邦適理新之公所為文實書在壁今三十年而公來為邦伯適及期月公又來燕於此公烏得無情哉公應曰諾於是棟楹梁桷板檻之腐黑撓折者蓋一九冰級甎之破缺者赤白之漫漶不鮮者治之則已無侈前人無廢後觀工既訖功公以衆飲而以書命愈曰子其為我記之愈既以未得造觀為歎竊喜載名其上詞列三王之次有榮耀焉乃不辭而承公命其江山之好登望之樂雖老矣如獲從公遊尚能為公賦之元和十五年十月某日袁州刺史韓愈記此驛置在古宜城內驛東北有井傳是昭王井有靈異至今人莫汲驛前水傳是白起堰西山下澗灌此城壞楚人多死流城東陂臭聞遠近因號其陂臭陂有蛟害人漁者避之井東北數十步有楚昭王廟有舊時高木萬株多不得其名歷代莫敢翦伐尤多古松大竹于太傅帥襄陽遷宜城縣并改造南境數驛材木取足此林舊廟屋極宏盛今惟草屋一區然問左側人尚云每歲十月民相率聚祭其前廟後小城蓋王居也其內處偏高廣員八九十畝號殿城當是王朝內之所也多甎可為書硯自小城內地今皆屬甄氏甄氏於小城北立墅以居甄氏有節行其子逢以學行為助教元和十四年二月二日題雜古今人物小畫共一卷騎而立者五人騎而披甲載兵立者十人一人騎執大旗前立騎而披甲載兵行且下牽者十人騎且負者二人騎執器者二人騎擁田犬者一人騎而牽者二人騎而驅者三人執羈靮立者二人騎而下倚馬臂隼而立者一人騎而驅涉者二人徒而驅牧者二人坐而指使者一人甲胄手弓矢鈇鉞植者七人甲胄執幟植者十人負者七人偃寢休者二人甲胄坐睡者一人方涉者一人坐而脫足者一人寒附火者一人雜執器物役者八人奉壺矢者一人舍而具食者十有一人挹且注者四人牛牽者二人驢驅者四人一人杖而負者婦人以孺子載而可見者六人載而上下者三人孺子戲者九人凡人之事三十有二為人大小百二十有三而莫有同者焉馬大者九匹於馬之中又有上者下者行者牽者涉者陸者翹者顧者鳴者寢者訛者立者人立者齕者飲者溲者陟者降者癢磨樹者噓者嗅者喜相戲者怒相踶齧者秣者騎者驟者走者載服物者載狐兔者凡馬之事二十有七為馬大小八十有三而莫有同者焉牛大小十一頭橐駝三頭驢如橐駝之數而加其一焉隼一犬羊狐兔麋鹿共三十旃車三兩雜兵器弓矢旌旗刀劒豫楯弓服矢房甲胄之屬瓶盂簦笠筐筥錡釜飲食服用之器壺矢博奕之具二百五十有一皆曲極其妙貞元甲戌年余在京師甚無事同居有獨孤生申叔者始得此畫而與余彈棊余幸勝而獲焉意甚惜之以為非一工人之所能運思蓋藂集衆工人之所長耳雖百金不願易也明年出京師至河陽與二三客論畫品格因出而觀之座有趙侍御者君子人也見之戚然若有感然少而進曰噫余之手摸也亡之且二十年矣余少時常有志乎茲事得國本絶人事而摸得之遊閩中而喪焉居間處獨時往來余懷也以其始為之勞而夙好之篤也今雖遇之力不能為已且命工人存其大都焉余既甚愛之又感趙君之事因以贈之而記其人物之形狀與數而時觀之以自釋焉愈叔父當大歷世文辭獨行中朝天下之欲銘述其先人功行取信來世者咸歸韓氏於時李監陽冰獨能篆書而同姓叔父擇木善八分不問可知其人不如是者不稱三服故三家傳子弟往來貞元中愈事董丞相幕府於汴州識開封令服之者陽冰子授余以其家科斗孝經漢衛宏官書兩部合一卷余寶蓄之而不暇學後來京師為四門博士識歸公歸公好古書能通之愈曰古書得其據依蓋可講因進其所有書屬歸氏元和來愈亟不獲讓嗣為銘文薦道功德思凡為文辭宜略識字因從歸公乞觀二部書得之留月餘張籍令進士賀拔恕寫以留愈蓋得其十四五而歸其書歸氏十一年六月四日右庶子韓愈記永貞元年愈自陽山移江陵法曹參軍獲事河東公公嘗與其從事言建中初天子始紀年更元命官司舉貞觀開元之烈㣥臣惕栗奉職命材登良不敢私違當時自齒朝之士而上以及下百執事官闕一人將補必取其良然而河南同時於天下稱多獨得將相五人故於府之參軍則得我公於河南主簿則得故相國范陽盧公於汜水主簿則得故相國今太子賓客滎陽鄭公於陸渾主簿則得相國今吏部侍郎天水趙公於登封主簿則得故吏部尚書東都留守吳郡顧公盧公去河南為右補闕其後由尚書左丞至宰相鄭公去汜水為監察御史佐山南軍其後由工部侍郎至宰相罷而又為趙公去陸渾為右拾遺其後由給事中為宰相顧公去登封為監察御史其後由京兆尹至吏部尚書東都留守我公去府為長水尉其後由膳部郎中為荊南節度行軍司馬遂為節度使自工部尚書至吏部尚書三相國之勞在史册顧吏部慎職小心於時有聲我公願潔而沈密開亮而卓偉行茂於宗事修於官嗣紹家烈不違其先作帥南荊厥聞休顯武志既揚文教亦熙登槐贊元其慶且至故好語故事者以為五公之始迹也同其後進而偕大也亦同其稱名臣也又同官職雖分而功德有巨細其有忠勞於國家也同有若將同其後而先同其初也有聞而問者於是焉書既五年始立石刻其語河南府參軍舍庭中於時河東公為左僕射宰相出藩大邦開府漢南鄭公以工部尚書留守東都趙公以吏部尚書鎮江陵漢南地連七州戎士十萬其官宰相也留守之官居禁省中歲時出旌旗序留司文武百官於宮城門外而衙之江陵故楚都也戎士五萬三公同時千里相望可謂盛矣河東公名均姓裴氏論曰登孔氏之門者衆矣三千之徒四科之目孰非由聖人之道為君子之儒者乎其於過行過言亦云鮮矣而夫子舉不二過惟顏氏之子其何故哉請試論之夫聖人抱誠明之正性根中庸之至德苟發諸中形諸外者不由思慮莫匪規矩不善之心無自入焉可擇之行無自加焉故惟聖人無過所謂過者非謂發於行彰於言人皆謂之過而後為過也生於其心則為過矣故顏子之過此類也不二者蓋能止之於始萌絶之於未形不二之於言行也中庸曰自誠明謂之性自明誠謂之教自誠明者不勉而中不思而得從容中道聖人也無過者也自明誠者擇善而固執之者也不勉則不中不思則不得不二過者也故夫子之言曰回之為人也擇乎中庸得一善則拳拳服膺而不失之矣又曰顏氏之子其殆庶幾乎言猶未至也而孟子亦曰顏子具聖人之體而微者皆謂不能無生於其心而亦不暴之於外考之於聖人之道差為過耳顏子自惟其若是也於是居陋巷以致其誠飲一瓢以求其志不以富貴妨其道不以隱約易其心確乎不拔浩然自守知高堅之可尚忘鑽仰之為勞任重道遠竟莫之致是以夫子歎其不幸短命今也則亡謂其不能與已並立於至聖之域觀教化之大行也不然夫行發於身加於人言發乎邇見乎遠苟不慎也敗辱隨之而後思欲不二過其於聖人之道不亦遠乎而夫子尚肯謂之其殆庶幾孟子尚復謂之具體而微者哉則顏子之不二過盡在是矣謹論或問諫議大夫陽城於愈可以為有道之士乎哉學廣而聞多不求聞於人也行古人之道居於晉之鄙晉之鄙人薰其德而善良者幾千人大臣聞而薦之天子以為諫議大夫人皆以為華陽子不色喜居於位五年矣視其德如在野彼豈以富貴移易其心哉愈應之曰是易所謂恆其德貞而夫子凶者也惡得為有道之士乎哉在易蠱之上九云不事王侯高尚其事蹇之六二則曰王臣蹇蹇匪躬之故夫不以所居之時不一而所蹈之德不同也若蠱之上九居無用之地而致匪躬之節蹇之六二在王臣之位而高不事之心則冒進之患生曠官之刺興志不可則而尤不終無也今陽子在位不為不久矣聞天下之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政視政之得失若越人視秦人之肥瘠忽焉不加喜戚於其心問其官則曰諫議也問其祿則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉且吾聞之有官守者不得其職則去有言責者不得其言則去今陽子以為得其言言乎哉得其言而不言與不得其言而不去無一可者也陽子將為祿仕乎古之人有云仕不為貧而有時乎為貧謂祿仕者也宜乎辭尊而居卑辭富而居貧若抱關擊柝者可也蓋孔子嘗為委吏矣嘗為乘田矣亦不敢曠其職必曰會計當而已矣必曰牛羊遂而已矣若陽子之秩祿不為卑且貧章章明矣而如此其可乎哉或曰否非若此也夫陽子惡訕上者惡為人臣招其君之過而以為名者故雖諫且議使人不得而知焉書曰爾有嘉謨嘉猷則入告爾后於內爾乃順之於外曰斯謨斯猷惟我后之德夫陽子之用心亦若此者愈應之曰若陽子之用心如此滋所謂惑者矣入則諫其君出不使人知者大臣宰相者之事非陽子之所宜行也夫陽子本以布衣隱於蓬蒿之下主上嘉其行誼擢在此位官以諫為名誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僭賞從諫如流之美庶巖穴之士聞而慕之束帶結髮願進於闕下而伸其辭説致吾君於堯舜熙鴻號於無窮也若書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓之也或曰陽子之不求聞而人聞之不求用而君用之不得已而起守其道而不變何子過之深也愈曰自古聖人賢士皆非有求於聞用也閔其時之不平人之不乂得其道不敢獨善其身而必以兼濟天下也孜孜矻矻死而後已故禹過家門不入孔席不暇暖而墨突不得黔彼二聖一賢者豈不知自安佚之為樂哉誠畏天命而悲人窮也夫天授人以賢聖才能豈使自有餘而已誠欲以補其不足者也耳目之於身也耳司聞而目司見聽其是非視其險易然後身得安焉聖賢者時人之耳目也時人者聖賢之身也且陽子之不賢則將役於賢以奉其上矣若果賢則固畏天命而閔人窮也惡得以自暇逸乎哉或曰吾聞君子不欲加諸人而惡訐以為直者若吾子之論直則直矣無乃傷於德而費於辭乎好盡言以招人過國武子之所以見殺於齊也吾子其亦聞乎愈曰君子居其位則思死其官未得位則思修其辭以明其道我將以明道也非以為直而加人也且國武子不能得善人而好盡言於亂國是以見殺傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以為有道之士也今雖不能及已陽子將不得為善人乎哉或曰天子坐於明堂執傳國璽列九鼎使萬方之來者惕然知天下之人意有所歸而太平之階具矣後王者或闕何如對曰異乎吾所聞歸天人之心興太平之基是非三器之能繫也子不謂明堂天子布政者耶周公成王居之而朝諸侯美矣幽厲居之何如哉子不謂傳國之璽帝王所以傳寶者耶漢高文景得之而以為寶美矣新莽胡石得之何如哉子不謂九鼎帝王之所謂神器耶夏禹鑄之周文遷之而為寶美矣桀癸紂辛有之何如哉若然歸天人之心興太平之階決非三器之所能也夫帝王之聖者卑宮室賤金玉斥無用之器以示天下貽子孫而後王猶殫天下之土木不肯已又安忍誇廣之尊其為明堂歟若傳國璽之狂嬴賊新童心侈意而為之示既有之不抵之足矣稱其符瑞則未也若九鼎之死百牢不能膏其腹火萬載不能黔其足其烹飪祠之用又足取豈不為無用之器哉堯水滔天人禽鬼神之居相混已禹導川決水以分神人之居乃銷九金乃鑄九鼎儀萬有之族露怪異之狀其護人己其救人已後王決不如大禹識鬼神之狀又無當時汨沒之危而徒欲閫金大廣器物與夫墊巾效郭異名同藺者豈不遠哉是亦見謬也噫不務其修誠於內而務其盛飾於外匹夫之不可而况帝王哉元和六年正月乙丑晦主人使奴星結柳作車縛草為船載糗輿粻牛繫軛下引帆上檣三揖窮鬼而告之曰聞子行有日矣鄙人不敢問所塗竊具船與車備載糗粻日吉時良利行四方子飯一盂子啜一觴攜朋挈儔去故就新駕塵彍風與電爭先子無底滯之尤我有資送之恩子等有意於行乎屏息潛聽如聞音聲若嘯若啼圭石歘嚘嚶毛髮盡竪竦肩縮頸疑有而無久乃可明若有言者曰吾與子居四十年餘子在孩提吾不子愚子學子耕求官與名惟子是從不變於初門神戶靈我叱我呵包羞詭隨志不在他子遷南荒熱爍濕蒸我非其鄉百鬼欺陵太學四年朝虀暮鹽惟我保汝人皆汝嫌自初及終未始背汝心無異謀口絶行語於何聽聞云我當去是必夫子信讒有間於豫也我鬼非人安用車船鼻嗅臭香糗粻可捐單獨一身誰為朋儔子苟備知可數已不子能盡言可謂聖智情狀既露敢不回避主人應之曰子以吾為真不知也耶子之朋儔非六非四在十去五滿七除二各有主張私立名字捩手覆羹轉喉觸諱凡所以使吾面目可憎語言無味者皆子之志也其名曰智窮矯矯亢亢惡圓喜方羞為姦欺不忍害傷其次名曰學窮傲數與名摘抉杳微高挹㣥言執神之機又其次曰文窮不專一能怪怪奇奇不可時施祗以自嬉又其次曰命窮影與形殊面醜心妍利居衆後責在人先又其次曰交窮磨肌戛骨吐出心肝企足以待置我讎寃凡此五鬼為吾五患飢我寒我興訛造訕能使我迷人莫能間朝悔其行暮已復然蠅營狗苟驅去復還言未畢五鬼相與張眼吐舌跳踉偃仆抵掌頓腳失笑相顧徐謂主人曰子知我名凡我所為驅我令去小黠大癡人生一世其久幾何吾立子名百世不磨小人君子其心不同惟乖於時乃與天通攜持琬玉易一羊皮飫於肥甘慕彼粳糜天下知子誰過於豫雖遭斥逐不忍子疏謂豫不信請質詩書主人於是垂頭喪氣上手稱謝燒車與船延之上座御史武君當年喪其配斂其遺服櫛珥鞶帨於篋月旦十五日則一出而陳之抱嬰兒以泣有為浮屠之法者造武氏而諭之曰是豈有益耶吾師云人死則為鬼鬼且復為人隨所積善惡受報環復不窮也極西之方有佛焉其土大樂親戚姑能相為圖是佛而禮之願其往生莫不如意武君憮然辭曰吾儒者其可以為是既又逢月旦十五日復出其篋實而陳之抱嬰兒以泣且殆而悔曰是真何益也吾不能了釋氏之信不又安知其不果然乎於是悉出其遺服櫛佩合若干種就浮屠師請圖前所謂佛者浮屠師受而圖之韓愈聞而弔之曰晢晢兮目存丁寧兮耳言忽不見兮不聞莽誰窮兮本源圖西佛兮道豫勤以妄塞悲兮慰新魂嗚呼奈何兮弔以茲文王充者何會稽上虞本自元城爰來徙居師事班彪家貧無書閲書於肆巿肆是遊一見誦憶遂通衆流閉門潛思論衡以修為州治中自免歸歟同郡友人謝姓夷吾上書薦之待詔公車以病不行年七十餘乃作養性一十六篇肅宗之時終於永元王符節信安定臨涇好學有志為鄉人所輕憤世著論潛夫是名述赦之篇以赦為賊良民之甚其旨甚明皇甫度遼聞至乃驚衣不及帶屣履出迎豈若雁門問雁呼卿不仕終家吁嗟先生仲長統公理山陽高平謂高幹有雄志而無雄才其後果敗以此有聲俶儻敢言語默無常人以為狂生州郡會召稱疾不就著論見情初舉尚書郎後參丞相軍事卒不至於滎論説古今發憤著書昌言是名友人繆襲稱其文章足繼西京四十一終何其短耶嗚呼先生君子溫間骨氣委和迹不拒物心不揚波澄源卷璞含白瑳瑳遺紙一張德音不忘人患不知其過既知之不能改是無勇也余生二十有八年髮之短者日益白齒之搖者日益脫聰明不及於前時道德日負於初心其不至於君子而卒為小人也昭昭矣作五針以訟其惡云余少之時將求多能蚤夜以孜孜余今之時既飽而嬉蚤夜以無為嗚呼余乎其無知乎君子之棄而小人之歸乎不知言之人烏可與言知言之人默焉而其意已傳幕中之辨人反以汝為叛臺中之評人反以汝為傾汝不懲邪而呶呶以害其生邪行與義乖言與法違後雖無害汝可以悔行也無邪言也無頗死而不死汝悔而何宜悔而休汝惡曷瘳宜休而悔汝善安在悔不可追悔不可為思而斯得汝則弗思無善而好不觀其道無悖而惡不詳其故前之所好今見其尤從也為比捨也為讎前之所惡今見其臧從也為愧捨也為狂維讎維比維狂維愧於身不祥於德不義不義不祥維惡之大幾如是為而不顛沛齒之尚少庸有不思今其老矣不慎胡為內不足者急於人知霈焉有餘厥聞四馳今日告汝知名之法勿病無聞病其煜煜昔者子路惟恐有聞赫然千載德譽愈尊矜汝文章負汝言語乘人不能掩以自取汝非其父汝非其師不請而教誰云不欺欺以賈憎掩以媒怨汝曾不寤以及於難小人在辱亦克知悔及其既寧終莫能戒既出汝心又銘汝前汝如不顧禍亦宜然隴西李觀元賓始從進士貢在京師或貽之硯既四年悲歡窮泰未嘗廢其用凡與之試藝春官實二年登上第行於裦谷役者劉允誤墜之地毀焉乃匣歸埋於京師里中昌黎韓愈其友人也贊且識云土乎成質陶乎成器復其質非生死類全斯用毀不忍棄埋而識之仁之義硯乎硯乎與一九冰礫異儒生高常與豫下天壇中路獲硯石似馬蹄狀外稜孤聳內發墨色幽奇天然疑神仙遺物寶而用之請豫銘底仙馬有靈迹在於石稜而宛中有點墨迹文字之祥君家其昌
