  text: 全唐文欽定全唐文卷五百十七肅字敬之一字寬中世居陸渾建中初中文辭清麗科擢太子校書郎累轉右補闕翰林學士皇太子諸王侍讀卒年四十一贈禮部郎中
  hash: sha256:1c7fa91947e67cec7c124a83bd37806de5d024dba13ae9513fa48284f0d4ba0f
