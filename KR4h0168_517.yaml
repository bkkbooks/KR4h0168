body:
  text: 余行年十八歲當上元辛丑盜入洛陽三河閒大塗炭因竄身東下旅於吳越轉徙阨難之中者垂二十年上嗣位歲應詔詣京師其年夏除東宮校書郎遂請告歸覲於江南八月過崤澠次於新安東南十數里舊居在焉時歲滋遠荊榛蕪翳喬木蒼然三徑莫辨訪鄰老而已盡眄庭柯以霑衣情之所鍾可勝歎耶夫懷舊之志在昔所不免聖如尼父達若莊叟且有歸與之歎悵然之思予蓬艾存乎胸中喜懼形於膝下寓江海之遐阻念歸來而不得思潘園板輿之樂陶野巾車之遊願言莫展一食三歎至是當秋日蕭索征途浩渺棟宇摧落曾不得乎少留心之憂傷又加於他日一等遂作賦紀事以過舊園命篇其辭曰白露既戒夫清秋爰駕言而東邁漫征路之悠悠且予發乎新安歷函關之舊邱灌叢林以相屬披一徑而可求閴里巷之罕人辨原田而莫由堂除既缺衡宇亦折樹蔽戶而稍稍水衝隄而活活駭獸㣥起頹墉四達識舊井於庭隅弔重蘿於木末既循省而顧慕愈辛酸而慘怛何纏迫而求所安激予哀而不可遏也昔子生之三歲值勍虜之衝奔徙穹廬於華縣蒙郊廟於氛昬皇遊蜀川帝出朔原尸逐纔血烏丸又屯俄四逆之薦凶扇熛炭而爇黎元予既幼捨此居業慮性命之所存始竄跡於許都又逃刃於夷門沿汴水之湯湯棹淮波之翻翻荷聞詩之前訓迫馳役而不敢言截淛河以徑度趣諸越而休止在長洲與蘭陵亦一閏而三徙嫋嫋兮秋風湛湛兮春江傷吾心其何已皇八葉之御極亦既安此寰中浮窳繽其來歸真獨鬱猶未通洎大歷之二七六龍忽其上升赫元聖之統天敷太和於黎蒸建皇極以成化啟公車以選能子筮遇觀之六四聿投迹於雲羅謬試言於內殿俾典校乎承華聆聖賢之休風仰墳籍之長圃與世道而遊息實人倫之憲矩史正直以終始蘧卷舒於嘿語展甘黜而不去莊頤神以遐舉諒修已之異宜各宏道而得所矧微生之庸拙胡可嫚夫出處眇江湖之漂蕩廢田里於草莽苟將愜乎予思孰辨夫懷安之與懷土伊吾土之所安迺陋狹而在斯實舊德之師儉庶後昆以易持高祖父趙王府記室宜春公洎曾王父侍御史府君已降三世居陸渾有田不過百畝開元中為大水所壞始徙於函關其始也桑柘接連蔬果芳滋彼茅軒與甕牖亦寒燠之攸宜羌百歲而員居曾未幾而亂離二十載而一來紛蕪穢而莫治駐周覽而未已又旋指於江湄曾是追感於平生孰不悲傷而涕洟抑聞夫仲長之園面流水而覽平原遭世緒之溷濁竟初懷之罕存又聞夫郭泰之德不違親貞不絕俗當罻羅之周布竟淳白而不辱何天宇之交泰蹇予生之孱獨退無庇跡之所進靡代耕之祿慨捨此而不留徒仰高於前躅日晼晚而命駕恨盤桓以出谷慮將歸之或迷吾斯志夫喬木亂曰所居而安易之序兮歷聘懷歸孔之慮兮粵予庸昧道莫著兮曩離舊邦紛世故兮林井殘泥禽亦去兮墜廢居業忸而懼兮遲歸有時葆吾素兮聖澤濡煦兮動植斯形相彼瑞草兮逢時效靈體嘉生於浩氣秉直道於彤庭昔在堯帝至化惟馨伊屈軼之芳貞協王猷與國經有皇睿后德動杳冥二氣暢而㣥生遂百祥來而萬宇寧矧夫佞者小人之道直者為國之寶雖糾正於邦憲實發明於瑞草象恭言偽於是焉去而勿疑葉布莖分何患乎辨之不早若乃一人當宁超黃越虞百辟來朝日臨雲趨風力論道伊咎陳謨瑞草在前疇敢以諛故曰物生於有有生於無感此變化發為禎符不然彼植物之何知乃同功於帝俞天道不言聖人無心寓形闡教其用則深禾穎降於周王芝房發於漢后信呈豐兮告慶幷垂美於不朽彼直指以去邪諒於功乎何有我明主所以超三英之躅彼靈草所以為百瑞之首有由然也史魚守直宣父惡佞佞直不分邦家靡定惟草所指惟皇所聽指歸乎一聽戒乎失苟君道之不宏徒倚瑞以自必重曰煜彼草兮直而指聖之瑞兮時之理頌皇休兮無極已予幼而漂流遂寓於江海之上與鳧雁為伍有年矣或祿仕以代樵牧其暇則以㣥籍自娛又嘗染重膇疾每求長桑氏之術以為療其他未之思也方俟閒則追尚平五嶽之遊無幾何會明詔以監察御史徵俄轉右補闕羈守職次未遑自免江湖之思漫如也閒一歲加翰林學士領東宮侍讀之事既微且陋載荷天睠上不能宣令德通古今當論思之任次不足宏三善備教諭充端士之列每省名位眄章綬中心惄然不欲寢食無一日而安者三年於茲其愧畏乃如此時步自中禁休於里巷病攻其外神倦於中囂焉忘形思及道本然後知一動一靜萬化殊塗寂然同歸未始有物且不知夫曩歲之浮遊與今之局束彼乎此乎是歟非歟杳不得其倪矣於是作述初賦以紀懷且貽諸同志焉爾我洪系兮肇昭耿乎伊唐始贊禹以陳謨末開國而為梁遭暴嬴以滅周兮涉天漢而方彰社郃陽而守九江系祖漢廷尉郃陽侯諱放見漢書武威九江太守高山侯諱統見後漢書逮七序而見光後漢侍中裦親愍侯諱竦作七序有傳維涼牧之豐融後漢黃門侍郎涼州刺史侍中關內侯諱寬見魏書咨散騎之殉節晉散騎常侍馮翊太守扶風鄉侯諱廙死愍帝之難贈吏部尚書益州刺史見晉書遭匡攘以遷逝遵河右以蟬蛻晉蜀郡太守寧州刺史扶風鄉侯諱迪生酒泉太守關內侯諱秋避亂居張掖綿侯服以守業傳龜組而罔替自酒泉以下六世郡守關內侯煒司空之藩魏宏茂德為表綴魏大將軍洛州刺史贈侍中司空郃陽公諱越見後魏書翼翼尚書允明且哲司空之孫隋御史大夫刑部尚書邯鄲敬公諱毗隋書有傳納言執法乃遂乃達播五葉而逮予垂慎身之芳烈伊孤朦之薄祐撫生植之多艱豈前修之將墜藐才菲而體孱奉徙宅之善教得帶經之殘編諒不師而不訓烏識立德與立言洎章甫之在首始礪志以就賢思琢璞以解蔽終扞格而難前升九顥之宏軌探乾坤之大紀求專直與翕闢問性命之終始曰君子之不用實未成之所擬苟體健以立誠何剛柔之不履慨尋繹以內省觀萬動之攸歸若捫天而罔階知集木之匪危何大道之汗漫悼吾人之崎巇仰前哲之休風屢惆悵以忸怩且自擊以自考亦三復而九思庶初筮以發蒙敢舍龜而觀頤美海嶽之靜深援幽人以為期聿投迹於林中就拙者之所宜屬夫上有聖帝旁求俊乂載馳車乘搜及瑣細彼執持憲與匡補闕載宜乎學該紀律識洞經制故小人之備官幸不招損而速戾斯時也天光鏡乎宇內洪稜憺乎荒外上躬祀於泰壇先假廟以告配百神受職以咸秩萬國駿奔而來祭肆覲創五月之吉朝宗盛三朝之會月窟日際風行雨霈謬參侍從之臣獲睹人神之泰又感夫翰苑崇祕人文是經樂正司業元良以貞講藝承華視草承明莫不才侔相如道博桓榮何皇鑒之偏屬降湛恩於鯫生若側足以登塗方飭躬以效誠雙書紳之猶怠慮數馬之非精晝兢兢以徊徨夕默默以屏營豈不以命重才輕惕墜而不敢寧也我寓我居於彼南里匪容車騎實遠朝巿羌歸沐以斯憩聊優游以休止旁枕大道其平如水南望南山橫空黛起君子所履小人所視乍埽室以自安殊塞門而不仕於是有竹有梧清風穆如放懷端居元宇自虛遺原憲之貧病忘甯武之智愚喪我南郭之几盡心西域之書悟幻有之遷斡得環中之妙樞合乃一指流為萬塗審物我之同域又遑遑其焉如何睿后之渥飾宜克恭以忘劬惟少海之洪瀾豈勺水之云輸伊志慮之久曠矧疲痾之集予徒端直以勿貳又焉能以為乎有無冥冥飛鴻其虛其徐英英白雲亦卷亦舒吾企夫物之未及故浩然而述初受命寶在昔曰傳國璽自秦始皇有焉蓋取夫一世二世傳於無窮故有傳國之號歷兩漢至於陳隋隋煬帝之遇禍也宇文化及盜之而西竇建德滅化及取焉易稱物不可以終否武德中太宗一戎衣而天下大定是器也與璽同歸國家用之以受命所承更名大寶而多歷年所自前代觀之受天明命則不求而得僭賊劫遷則得之而失蓋神物之所在非徒然也抑又聞之鼎之輕重與璽之去留莫不視德之上下位之安危若恃寶命在已而慆心堙耳漸乎危殆以負扆之尊被竊鈇之言當此時也此片玉耳復何為哉竊讀史氏感興亡之器忿覬覦之類於是作受命寶賦若形制之小大厚薄則未始詳也故不備焉其辭曰物之貴兮惟玉之英翕二氣以成形涵百寶之純精卞氏得之三獻而後明當秦趙之抗衡挺高價於連城伊玩好之所資微神器之鴻名及夫秦始稱皇削平六王為龍為光追琢成章其文曰受命於天既壽永昌其始也謂世有哲王傳國寶之無疆何逆天以暴物不及期而降殃惟陰陽之運行終授受而不常隨素車與白馬歸赤精於路旁逮夫漢業中微后族專命祿去公室世移威柄寶沙麓之遺瘵成巨君之篡害雖擲地以慷慨終莫救夫顛沛俄漸臺之頹覆歷更始與赤眉咸庸懦而不居卒亂長而禍滋洎四七之龍驤為火主以得之遂祀漢以配天延二百之炎輝苟非其人寶命不歸悼桓靈之不嗣置天下於阽危既而赤伏道喪黃星兆發雲雷遘迍朝社播越去乘輿而漂蕩入眢井以蕪沒披草萊以拯之實功存乎武烈何典午之傾潰劉石盜以自尊既江表之卜年遂歸明以去昬五世推移或亡或存失得由道隋之幷吞始負險以爭雄俄銜璧而來奔惟大業之離阻由君昬而黷武豺狼呀以當路郊廟毀而失主望夷之釁既發斯器淪於醜虜昊天有命眷我高祖鶱飛汾晉震謺關輔雲行雨施雷動飇舉聖人既作萬物斯覩於斯時也充德扇結東周卼臲帝謂文皇陳師往伐如火烈烈如風發發牛口先撥虎牢則達致四海於清平混車書以同轍惟神器之有在終告歸於魏闕考乎先王之統世也以文經天以武緯地觀象備物從宜制器播而用之為天下利故曰大德曰生大寶曰位位之升降唯道所至先王審其所以故為大於細為難於易然後本不搖而末不墜安危之體鑑此而已若夫符命之所加歷數之所歸莫不天人合發區宇樂推休祥煥然靈命顯思是以有守有失動而悅隨苟貪功而僣禮莫不速禍而召危此玉也公路執持眾叛而親離趙高引佩殿壞而身糜惟前軌之昭昭孰可幸捷以取之若曰吾有天命如天有日傳寶在我昬庸自佚則陸渾無問鼎之事歷代無奉璽之術苟思慮於廢興故不既得而患失於戲天發禍機聖人定之天生神物聖人用之唐哉皇哉大人造之子孫百代永言保之議曰有國之典存以位敘其德沒以諡易其名名之小大視德之美惡蓋書其著而畧其微要其終而明其義故曰諡以尊名節以一惠恥名之浮於行也楊文貞體淳素之質協時中之德爰自下列至於宰司秉心不渝動必由道與夫立功立事開物濟眾不同日語矣而清儉厲俗明哲保身曰文與貞在我惟允秉公議者其誰曰不然今奉符謂公與元載交游嘗為載薦引載之咎惡悉歸於公斯乃昧於觀行定諡之義且非君子成人之美也請區而評之昔荀爽為董卓所舉致位三公及卓斁亂漢政可謂甚矣而漢史曾不以卓之過累於慈明晏子陳氏俱事齊侯陳志邪而晏志正春秋亦不以陳之惡延於平仲是知道不必合事不必同則載之於公其事可見况當載秉鈞而公不參大政載以時望慕我我則靜而守中因疎為適見清節又有發載之惡皆泄漏致辭患自掇也庸可救乎及夫載覆其餗公膺大任任職日淺屢以疾辭位且不安安可以寂寥啟悟而責之乎昔季文子相三君無食粟之馬衣帛之妾君子以為忠楊公以大名厚位出入三朝無宅一區無馬一駟志於清白交不諂瀆可不謂貞乎掌訓誥秉銓衡處成均貳宗伯潤色王度無替厥美加以敏而好學見善如不及可不謂文乎謹按諡法稱貞之例有三清白守節曰貞大慮克就曰貞憂國忘死曰貞文之義有六經天緯地曰文道德博厚曰文愍人惠禮曰文不恥下問曰文慈惠愛人曰文修德來遠曰文名既不備事亦殊貫又安可以二王三恪私廟家祭之闕併責於一名哉若具美果在一名則士文伯孔文子且無經緯天地之文孟武伯甯武子又非克定禍亂之武若以廢禮不稱其名則臧孫辰縱逆祀不得諡文管夷吾臺門反坫不得諡敬是知議名之道錄其所長則捨其所短志其大行則遺其小節使善惡决於一字褒貶垂於將來蓋先王制諡之方也若綜覈名實形於公論宜取坦然明白彰於遐邇者今或乘人之意肆誣謗之辭所謂抉瑕刺骨之說非正議也且聖無全能才不必備以鄭公徵立言正色恥君不如堯舜其節大矣而昧於知人許公王褱固執遺一作條詔廷沮邪計其志明矣終不能守故春秋為賢者諱過傳稱不以一眚掩大德語曰無求備於一人蓋二公所以為文貞也若曰百行所歸九德咸事如周公之文宣父之宣然後擬議則千古莫嗣而諡典絕矣安在一二蘇魏足為定制乎謹上參典禮近考故事楊公之名請如前議云爾太史公曰詩人道西伯以受命之年稱王而斷虞芮之訟遂追王太王王季改正朔易服色十年而崩或謂大雅序文王受命作周泰誓序十有一年武王伐殷妄徵二經以實其說子以為反經非聖不可以訓莫此甚焉嘗試言之夫聖人無作作則為萬代法蓋仲尼美文王之德曰三分天下有其二以服事殷又曰內文明而外柔順以蒙大難文王以之未有南面稱王而謂之服事易姓創制而謂之柔順仲尼稱武王之烈曰湯武革命又曰武王末受命未有父受之而子復革命父為天子子云末受當武王之會盟津也告諸侯曰汝未知天命未可以誓師也曰惟我文考大統未集予小子其承厥志孰有王者出征復俟天命天統既改而復云未集禮大傳稱牧之野既事而退柴於上帝追王太王王季文王改正朔殊徽號若虞芮之歲稱王則不應復云追王王制既行則不應復云改物是皆反經者也夫大者天地其次君臣聖人知定位之不可易也故制為上下之禮財成天地之道使各當其分而不相閒若億兆之去留天命之與奪則存乎其時聖人順而行之故謳歌有所歸而舜禹揖讓桀紂惡盈則湯武放伐所謂後天而奉天時不得已而為之者也若殷道未絕紂惡未極而遂稱王以令天下則不可謂至德也此其非聖者也予以為大雅作周之義蓋取夫積德累仁為海內所歸往武王因之遂成大業非所謂革命易姓為作周也泰誓紀年蓋武王周公追考前文陳王業之盛自虞芮始故斷為受命之歲仲尼憲章文武故因而敘之曰十有一年武王伐殷非所謂自稱王而為之數也文王既沒經義斯在如曰不然以俟君子論曰修釋氏之訓者務三而已曰戒定慧斯道也始於發心成於妙覺經緯於三乘導達於萬行而能事備焉昔法王出世由一道清淨用一音演說機感不同所聞益異故五時五味半滿權實偏圓小大之義播於諸部粲然殊流要其所歸無越一實故經曰雖說種種道其實為佛乘又曰開方便門示真實相喻之以眾流入海標之以不二法門自他兩得同詣祕密此教之所由作也洎鶴林滅而法網散神足隱而宗途異各權所據矛盾更作其中或三昧示生四依出現應機不等持論亦別故攝論地持成實惟識之類分路並作非有非空之談莫能一貫既而去聖滋遠其風益扇說法者桎梏於文字莫知自解習禪者虛無其性相不可牽復是此者非彼未得者謂證慧解之道流以忘返身口之事蕩而無章於是法門之大統或幾乎息矣既而教不終否至人利見慧聞慧思或躍相繼法雷之振未普故木鐸重授於天台大師大師像身子善現之超悟備帝堯大舜之體相贊龍樹之遺論從南岳之妙解然後用三種止觀成一事因緣括萬法於一心開十乘於八教戒定慧之說空假中之觀坦然明白可舉而行是故教無遺法法無棄人人無廢心心無擇行行有所證證有其宗大師教門所以為盛故其在世也光昭天下為帝王師範其去世也往來上界為慈氏輔佐卷舒於普門示現降德為如來所使階位境智蓋無得而稱焉於戲應跡雖往微言不墜習之者猶足以抗折百家昭示三藏又况聞而能思思而能修修而能進進而不已者歟斯人也雖曰未證吾必謂之近矣今之人正信者鮮啟禪關者或以無佛無法何罪何善之化化之中人以下馳騁愛欲之徒出入衣冠之類以為斯言至矣且不逆耳私欲不廢故從其門者若飛蛾之赴明燭破塊之落空谷殊不知坐致焦爛而莫能自出雖欲益之而實損之與夫眾魔外道為害一揆由是觀之此宗之大訓此教之旁濟其於天下為不侔矣自智者傳法五世至今天台湛然大師中興其道為予言之如此故錄之以繫於篇夫止觀何為也導萬法之理而復於實際者也實際者何也性之本也物之所以不能復者昬與動使之然也照昬者謂之明駐動者謂之靜明與靜止觀之體也在因謂之止觀在果謂之智定因謂之行果謂之成行者行此者也成者證此者也原夫聖人有以見惑足以喪志動足以失方於是乎止而觀之靜而明之使其動而能靜靜而能明因相待以成法即絕待以照本立大車以御正乘大事而總權消息乎不二之場鼓舞於說三之域至微以盡性至賾以體神語其近則一毫之善可通也語其遠則重元之門可闚也用至圓以圓之物無偏也用至實以實之物無妄也聖人舉其言所以示也廣其用所以告也優而柔之使自求之擬而議之使自至之此止觀所由作也夫三諦者何也一之謂也空假中者何也一之目也空假者相對之義中道者得一之名此思議之說非至一之旨也至一即三至三即一非相含而然也非相生而然也非數義也非強名也自然之理也言而傳之者迹也理謂之本迹謂之末本也者聖人所至之地也末也者聖人所示之教也由本以垂迹則為小為大為通為別為頓為漸為顯為祕為權為實為定為不定循迹以返本則為一為大為圓為實為無住為中為妙為第一義是三一之蘊也所謂空也者通萬法而為言者也假也者立萬法而為言者也中也者妙萬法而為言者也破一切惑莫盛乎空建一切法莫盛乎假究竟一切性莫大乎中舉中則無法非中舉假則何法非假舉空則無法不空成之謂之三德修之謂之三觀舉其要則聖人極深研幾窮理盡性之說乎昧者使明塞者使通通則悟悟則至至則常常則盡矣明則照照則化化則成成則一矣聖人有以彌綸萬法而不差磅礡萬劫而不遺燾載恒沙而不有復歸無物而不無寓名之曰佛經號之曰覺究其旨其解脫自在莫大極妙之德乎夫三觀成功者如此所謂圓頓者非漸次非不定指論十章之義也十章者恢演始末通道之關也五畧者舉其宏綱截流之津也十境者發動之機立觀之諦也十乘者妙用所修發行之門也止於正觀而終於見境者義備故也闕其餘者非所修之要故也乘者何也載物而運者也十者何也成載之事者也知其境之妙不行而至者德之上也乘一而已矣豈藉夫九哉九者非他相生之說未至者之所踐也故發心者發無所發安心者安無所安偏破者偏無所偏爰至餘乘皆不得已而說也至於別其義例判為章目推而廣之不為繁統而之不為少如連環不可解也如貫珠不可雜也如懸鏡不可揜也如通川不可遏也議家多門非諍論也按經證義非虛說也辨四教淺深事有源也成一事因緣理無遺也噫止觀其救世明道之書乎非夫聖智超絕卓爾獨立其孰能為乎非夫聰明深達得意忘象其孰能知乎今之人乃專用章句文字從而釋之又何疎漏耶或稱不思議境與不思議事皆極聖之域等覺至人猶所未盡若凡夫生滅心行三惑浩然於言說之中推上妙之理是猶醯雞而說大鵬夏蟲之議層冰其不可見明矣今止觀之說文字萬數廣論果地無益初學豈如暗然自修功至自至何必以早計為事乎是大不然凡所為上聖之域豈隔闊遼敻與凡境杳絕歟是惟一性而已得之為悟失之為迷一理而已迷而為凡悟而為聖述者自隔理不隔也失者自失性不失也止觀之作所以辨異同而究聖神使㣥生正性而順理者也正性順理所以行覺路而至妙境也不知此教者則學何所入功何所施智何所發譬如無目昧於日月之光行於重險之處顛踣墮落可勝既乎噫去聖久遠賢人不出庸昬之徒含識而已至使魔邪詭惑諸黨並熾空有云云為坑為穽有膠於文句不敢動者有流於漭浪不能住者有太遠而甘心不至者有太近而我身即是者有枯木而稱定者有竅號而稱慧者有奔走非道而言權者有假於鬼而言通者有放心而言廣者有罕言而為密者有齒舌潛傳為口訣者凡此之類自立為祖繼祖為家反經非聖昧者不覺仲尼有言道之不明也我知之矣由物累也悲夫隋開皇十七年智者大師去世至皇朝建中垂二百載以斯文相傳凡五家師其始曰灌頂其次曰縉雲威又其次曰東陽小威又其次曰左谿朗公其五曰荊溪然公頂於同門中慧解第一能奉師訓集成此書蓋不以文詞為本故也或失則煩或失則野當二威之際緘受而已其道不行天寶中左谿始宏解說而知者蓋寡荊溪廣以傳記數十萬言網羅遺法勤矣備矣荊溪滅後知其說者適三四人古人云生而知之者上也學而知之者次也困而學之又其次也夫生而知之者蓋性德者也學而知之者天機深者也若嗜慾深耳目塞雖學而不能知斯為下矣今夫學者內病於蔽外役於煩沒世不能通其文數年不能得其益是則業文為之屨校梏足也棼句為之簸糠眯目也以不能喻之師教不領之弟子止觀所以未光大於時也予常戚戚於是整其宏綱撮其機要其理之所存教之所急或易置之或引伸之其義之迂其辭之鄙或薙除之或潤色之大凡浮疎之患十愈其九廣畧之宜三存其一於是袪鄙滯導蒙童貽諸他人則吾豈敢若同見同行且不以止觀罪我亦無隱乎爾建中上元甲子首事筆削三歲歲在析木之津功畢云爾
