front:
  text: 全唐文欽定全唐文卷五百四權德輿二十二
  hash: sha256:672833e203da309f978a855c4c11396961d6191c646129299a78bdb5343bc4dd
body:
  text: 府君諱達字某天水略陽人曾祖崇本皇朝散大夫滑州匡城縣令祖若訥皇通議大夫桂歙梓三州刺史考僎皇深州安平縣令自十二代祖前秦安邱敬公至四代祖平涼公皆有勳力為通侯大吏自匡城至安平以文采政事為列城二千石家法休聲貽於後昆府君以士行吏理平端實大歷初調為家令寺主簿歷同州馮翊縣尉河南府登封主簿京兆府咸陽縣丞居之必聞考績得之必由綜核中外之姻或據戚里都侈鄉未嘗巧從以去窮約且以枉道由徑食浮於人為誡大率每十歲徙一官故歷三紀而四受祿勤官肅事不誘於長上循理蹈和不懾於健羡其有常歟其難進歟貞元十九年歲在癸未秋七月壬戌感風疾終於新昌里享年六十先是夫人南陽張氏明茂有禮法亦天奪其壽府君周縗既除三月而鞠凶及悲夫支子塤等謀於族屬家老以明年春二月己酉祔真宅於萬年縣龍首原謹書官次以納幽穸銘曰幽邱而下煜煜圭組宜昌鄜城仍代啓土平涼策勳梓州懿文家牒德風儀刑薦紳時惟叔父祗服丕矩始仕宮卿乃從左輔周旋二畿坦坦安卑遵道而行不競於時修短奄忽兮嗚呼涕洟崇岡美檟兮永識於茲君諱少安字公和隴西成紀人自元魏僕射文穆公沖而下為西州冠族或位不充者必以令德聞曾祖仲進皇宣州司馬祖僑河南府澠池縣令父愔朝議大夫宗正丞贈濮州刺史君即濮州第三子敏信寬綽篤於行義方舉孝廉偶為所親者薦授冀州阜城縣尉既非所好終不屑就王黔中礎之持節廉問也表為推官轉支使歷左武衛胄曹參軍大理評事用誠直贊佐夷落之人宜之府除至京師轉三原縣尉管中書甲庫考績四居上第遷長安主簿二陵復土之重比歲會同輦轂之下儲峙無違典司廏置肅給安靜尹守以為能方受代而復表留一歲御史府察視者數薦君自代君方勇於退故朝命未及焉元和三年三月乙酉感疾不起於長安興化里第享年五十君溫仁孝友喻義循理恢恢然有君子之度齒位皆屈而知者歎焉夫人滎陽鄭氏太僕少卿叔規之女仁而不壽先是君元兄柳州刺史捐館舍請君襄事間關勤遠間一歲有嗒然之痛喪服甫除俄啓手足噫以積善之家而叢不淑如是糾纆之數其可問耶嗣子拭授等號奉輤車以夏五月景申祔於東都潁陽縣之某原禮也音徽永昧志義相倫情殷中外年同甲子濡涕操管銘於墓門銘曰族之盛兮才之令兮才知命兮俄大病兮葬者藏兮潁之陽兮志邱荒兮杳茫茫兮王妣夫人姓楊氏宏農人祖敏皇太僕少卿交州都督金鄉縣公父晏湖州武康縣令夫人始笄歸於王考府君府君名重而祿薄家肥而身約仕至左輔尉中兵紀綱掾所與遊者皆天下雋人賢士夫人無攸遂勸以義之道備焉天寶四年先太保貞孝公既孤夫人慈仁訓育以文行紹續繇進士第授臨清尉薊縣尉安祿山之亂也以大節聞履險違難崎嶇色養滅迹人事以扁舟為家至德二年夫人棄孝養於杭州富陽縣之行次時四方兵交歲大疫江東尢劇未克歸祔此焉寧神先公號咷崩毀因中風濕痺痛一作痼外除拜御史著作郎皆以疾不祗命大歷丁未德輿丁荼蓼貞元戊辰再集艱餘生未泯積慶所鍾因緣踐履叨冒崇大以歲時之不易事物之多故久未遷神心焉若摧言陰陽者利在卯酉元和五年歲直庚寅德輿忝太常卿以明年之吉襄事既具其年猥參宰政禮不克就乃建宗廟以嚴蒸嘗逮今十二歲在丁酉德輿以檢校吏部尚書理戎漢中拜章上請協用龜策啓先公先太君壽堂於丹徒啓夫人壽宮於富陽得七月壬寅祔王考府君兆域於東都伊闕縣慈水之陽吉自杭抵洛凡二千五百里水陸安靜誠信無違天之佑也惟尊靈幽閟周一甲子罪在孱菲宜當誅殛而懿範遺訓流光孕休閨門受祉施於孫子霜露怵惕如惔如酲又德輿之生也後不獲逮事逖聽令聞靡詳萬一故合姓之紀歲棄代之享年皆闕焉刻茲介石以永終吉銘曰惟王母之令德淑明柔克閨門延耀以引以翼王父安卑兮其道未光先公大節兮易名章章伊孤孫之蒙騃不獲逮事慶靈流澤兮積纍名器浙河湯湯輤車帷裳伊水之陽祔於幽堂萬有千歲兮徽音不忘元和十年歲在乙未冬十月二十一日戊午故祕書少監贈絳州刺史獨孤郁妻天水權氏寢疾終於京師光福里嗚呼吾之女也故哭而識之惟吾門代有懿德至先君太保貞孝公以大節大行為人倫師表故鍾慶於爾而又夭閼其成此吾所以不知夫天之所賦也初笄有行未嘗遠父母兄弟考室同里常如歸寧始絳州以褐衣納采其後為侍臣史官更掌中外誥詔皆再命或三命十數年間便蕃清近烜赫光大天下公議以宰政待之其於閨門之內佐君子供先祀嘻嘻申申有孝有仁乃者吾忝大任絳州居近侍而能婉約勞謙得六姻之和長信宮受册命之歲與母於內朝序位環佩之聲相聞黨族榮之人情禮意纖微矩度言內則者以為折中嚱夫絳州方強仕不淑爾又未練而歿年止三十一天之報施其何哉始稱未亡人也懼貽吾憂每斂戚容而為柔色然以沈哀攻中竟不能支悲夫初先舅憲公有重名於時絳州生而孤不得逮事儻冥冥有知將同穴而養於下耶抑智氣在上歸於合莫耶吾不知也生子二人女一人長男前一歲未成童而夭次曰晦生十年矣至性過人未期再丁荼蓼噭號罔極晦世父右拾遺朗茹終鮮之痛撫之如不孤貞於龜策得明年六月六日壬寅祔葬於東都壽安縣之某原宜琢墓石以永於後吾老矣豈以文為懼他人不知吾女之茂實故隱痛而銘曰暘光未晝而湛暗兮植物方華以稿落兮懿吾女之淑令兮祔君子於冥漠已乎已乎吾不知夫神理之有無貞元十有一年歲在乙亥三月丁丑故相國安平公夫人河東縣君考終命於京師安仁里蓋春秋若干其孤曰懿伯號侍輤裧以十月庚午返祔於河南某原安平公之舊封禮也夫人姓柳氏代為河汾右族齊周之際中書孝公虬司會景公慶以匪躬厚行為北朝名臣孝公生止戈後周洛州刺史洛州孫皇海州長史憬憬生皇伊陽縣丞璿夫人之祖禰也夫人憑積厚之祉體柔嘉之姿既笄歸於安平公公始以處士納采至於佩相印三十年間內則彰聞嘗以命婦宜家疏封於本郡又以中宮恤禮為位於內朝齊明以助祭慈惠以厚下褕翟五采副笄六珈幽間必聞於法度侈泰不萌於心術盛德發於身而被於族姻不可詳已始用和樂安於隱約終以淑均居於顯尊大君子之家肥道光其助宏矣既嬰未亡之痛深惟出世之法受微言於順禪師以蓮華普門為方寸津筏宜其永錫睂壽而為大家今則已矣豫一不知夫命也懿伯為左千牛備身純孝好學居喪得禮長女適宏農楊宏徵才半歲有共薑柏舟之誓明識令行倫於古人幼女以襟褵來歸共承宗事故於夫人之道得周知之懿伯以陵谷之不可以不識哀請論撰大凡以乾元元年合姓貞元二年受封安平公薨八年而夫人捐館其銘曰於穆夫人徽柔淑溫儀於德門蹈履內則六姻是式藹然慈仁魚軒煌煌佩玉鏘鏘威儀申申居貧且樂處貴逾約其道可尊不享天年奄歸下泉孰司陶鈞哀此孝嗣煢然無恃訴於蒼旻東周故園宰樹鮮原裳帷翻翻祔於幽穸刻是貞石厥聲長存郡王張公鄧國夫人谷氏墓志銘並序夫人姓谷氏魏郡昌樂人其先漢大司農永之後故義武軍節度檢校司空同中書門下平章事贈太傅上谷郡王張公之夫人也四代祖那律貞觀中仕至諫議大夫宏文館學士曾祖補衮左羽林軍長史祖倚相祕書省正字佐蘭錡以嚴禁旅詳魯魚以考祕文猶未充其才則延耀於後考崇義天寶末以雄略氣敢從漁陽之師每建奇功亟摧北狄歷左武衛將軍左金吾衛大將軍纍兼太僕殿中追贈特進懿是勳慶聚於夫人天資才明動合圖史早以襟鞶之誡宜於鐘鼎之門百兩以納采三月而助祭克洽中饋至於上公其於佐以純誠規以策畫超冠命婦之道叶贊守臣之勞者有焉建中元年疏賦於魏郡三年徙封於鄧國徽音法度列在命書貞元七年太傅薨於理所嗣子今義武軍節度易定等州觀察處置等使工部尚書易州刺史兼御史大夫延德郡王茂昭能業其勤載延其賞克家稟訓宣力撫封六官分職八命作牧虞潭榮養用厚人倫魯侯燕喜方期壽考伯仲有裕稱於北河曳裾於邸第者三持憲於牙門者一貞元十一年以幼子銀青光祿大夫光祿少卿駙馬都尉茂宗既承築館之恩來俟執笲之慶方榮著代俄痛終堂以十二年二月丁卯寢疾歿於萬年縣安仁里享年四十九遺表以車服器用上獻王人就第申弔賜絹三百匹布一百端此又恩禮之有加也尚書以移孝在公遠竭誠信光祿以銜恤茹痛躬奉裳帷以其年冬十月甲戌得吉卜於京師少陵原不祔於太傅行古之道也生極井賦沒有寵賻恩備終始以榮以哀申命司言之臣採其淑行用琢琬玉銘於墓門銘曰鵲巢之德夫人之職輔於上谷啓是鄧國淑慎溫惠徽柔令克大閨門施於燕翼萬鍾雖及九原俄即賦命有涯孝思罔極夫人姓李氏趙郡人前相國司空今戶部尚書燕國于公之室也曾祖仲恩皇藍田縣尉祖琳河南府參軍考復司農丞三葉名器卑而婚親族類為山東冠甲外曾王父裴丞相文獻公左右元宗為時才臣外王父吏部郎中贈刑部尚書綜以文行著於清名舅族多賢與軒冕俱大中外積厚而生夫人興元元年燕公以南官郎冕而親迎其後歷二千石九卿觀風貞師焯耀宏大三公相印六職地征勤勞輔佐淑慎和樂鵲巢之均一樛木之逮下采蘋之能循法度螽斯之子孫衆多實備有焉晉令公侯夫人銀印青綬佩水蒼玉貞元三年夫人以外命婦封河內縣君十九年以元侯內子進衛國夫人廣大專靜尚柔含德不言而徽音自遠不耀而儀型可象鍾郝之禮法為而不有姬嬴之地望有而不恃於六姻之中薰然以仁煦然如春推心以及物各得其所欲故燕公琴瑟友之鐘鼓樂之克成婦順以贊家道元和十年冬十二月甲辰寢疾薨於安仁里第享年若干不求醫禱以順性命雖知道之君子所難能焉明年春二月庚申祔先姑之塋於興平縣之某原禮也嗣子前太子左贊善大夫正祕書丞方某官季友某官某等永惟免於水火以至冠婚列在朝序率由慈蔭自帷堂至於遣奠哀敬有加燕公以德輿於外族為表甥於中臺為同列嗒然之痛俾志斯文公又命方等泣狀往行始終詳實故如其論次繫之以銘銘曰燕公之室宏是內則衛國攸宜淑明柔克環珮鏘然蒸嘗吉蠲家肥族睦二十二年如賓之敬循道之性不慮不圖奄忽大病茂陵蒼蒼宰樹陰堂幽宅於茲兮德耀不忘夫人姓張氏南陽人曾祖鉉皇正議大夫常州刺史祖重暉皇朝議大夫衡州刺史贈太常卿考伯禽皇銀青光祿大夫將作少監兼通事舍人奕代以大夫二千石班宣教化而先公贊謁在帝左右兄憑又以衛尉少卿王傅世其官故表儀風訓家法延耀夫人承是吉祿生而懿美大歷十二年既笄歸於天水權公公時為馮翊縣尉其後簿登封贊咸陽徊翔於周秦甸圻間皆用功次得調滿歲食貧則嘻嘻於衡蓽之下族屬和而家事理抑夫人是賴資性溫重閨門整峻每中外六姻有嘉會喪禮必羞必赴周旋法度士女憲焉而不得鳴珈珮玉宏大中饋命也貞元十八年夏四月暴嬰疾癘終於京師新昌里春秋若干秋九月窆於某縣某原從吉筮也支子某等充窮抆泣捧是圓石云不可以不識命從祖兄子銘之其詞曰在漢七貂族之盛兮常山衡陽休有慶兮父兄仍代贊名命兮展彼夫人來合姓兮徽柔靜專家道正兮生也有涯斯大病兮芻靈廣柳掩泉徑兮刻此貞珉彰淑令兮夫人姓崔氏博陵安平人皇鳳閣侍郎平章事博陵郡王元暉之曾孫禮部侍郎璩之孫侍御史賁之息女洋州刺史琅琊王君澄之嘉偶崔氏自漢濟北長岑代為文宗王氏自晉睢陵即邱繼生元臣二族之茂范蔚宗沈休文推本言之矣重以母后中宗之際石泉博陵二先正有經綸命代之材推戴格天之業延耀濟美為祥為祉為君子為士女合姓好逑與他族不侔夫人未笄纍失恃怙旁無兄弟泣血襄事奉二尊裳帷間關道途自鍾陵抵洛邑哀敬與禮三者無違神祐純孝為宗姻所歎某年從父兄縱盛選卿才故王君納采焉王君以才器政事連辟公府歷御史司直為河南紀綱掾改陽翟令入為尚書屯田郎出刺洋州柔嘉左右叶是休德初洋州同氣八人名位焯於當時冢婦介婦必華宗淑哲夫人贊宗事供先祀鼓瑟誦詩姿操間雅奉上以誠㣥居用和外言內言不越於閫朝服祭服必成於手洋州捐館二十年而夫人歿於櫟陽之別墅時貞元十九年秋七月某甲子蓋年五十一初洋州娶滎陽鄭氏生子曰造而夭夫人以繼室生子三人曰乃曰逵曰邁母儀均養皆為良士造仕至藍田尉乃修詞與計偕逵邁咸以門資分佐環列哀號罔極泣問龜策以二十年冬十月某甲子祔於洋州之舊封先是洋州猶子興平尉源長受夫人之理命曰吾與爾二門積德奕代銘表必咨時文先舅之碑吏部趙郡李公實為之先君之志從翁太傅文貞公實為之且以德輿於夫人有通世之舊猥求論撰泣狀遺懿實而不華是用采獲以銘內則銘曰安平臨沂右族蕃滋仁賢是儀好合嘻嘻乃封故地象服斯貴諒無攸遂亦勸以義婦順彰聞母儀可尊肅肅閨門四男晨昏吁嗟風樹奄閟泉路魯人之祔皇辟之墓鏤茲淑聲永識冥冥夫人姓韋氏京兆杜陵人楚傅漢相之後分封競爽以至周鄖襄公孝寬為宗門龜龍曾祖某某官祖某某官父楚器皇太子宮門郎其外族隴西李氏涼武昭王元盛後魏司空文穆公沖隋絳郡公禮成之世德輿之從母姊也中外華閥乃生淑哲幼失恃怙先太君保而養之猶女子子焉既笄歸於某郡許授授循理喻義調常州義興尉湖州武康丞滿歲葺田廬於霅溪之上忘懷進取夫人贊家道以供先祀誡伯宗而饁冀缺許君之動靜無悔抑有助焉所從之祿甚薄不及偕老徙宅教子宜家佐餕閨門之禮有同嚴君才識所及過人遠甚雖內外之言不越於閫而人事物理皆能折中焉凡結褵二十五歲而稱未亡人又十五歲而不舉火時元和二年正月某甲子春秋五十九其子士儉謹敏屬詩書未與計偕者不忍違養故也泣訪蓍蔡得十月某甲子吉權祔於皇辟之封惟夫人有姿操徽範不得被魚軒翟茀之飾獨振內則而傳母儀孝子冢婦居喪率禮禮無違而哀有餘姻黨稱焉嗚呼孩提相長實均同氣今視士儉猶吾之出焉士儉緘哀詞理命請刻圓石屑涕直書寄茲沈痛銘曰士之積行未必豐祿有美夫人不登象服從夫也有德有儀訓子也恩斯勤斯勸以義兮導之慈養未及兮命奪之服在緦兮心若期刻琬玉兮流涕洟夫人姓盧氏范陽人北齊黃門侍郎思道之五代孫也曾祖悌皇高道不仕祖綱皇城門郎父侑皇太原縣尉雖仕皆數命以至淪謝而皆飾行懿文有當時之譽明德奕世誕生夫人既笄嬪於李公李公為烏程丹陽二縣尉夫人居貧守約動必由禮謙敬以睦中外吉蠲以奉蒸嘗甘糲粱服浣濯中饋式敘和樂嘻嘻有嘉聞而無攸遂一紀於茲矣嘗聞善餘慶謙受益豈前志之謬歟將有必定之數歟既而奄忽遘疾不翌日而大漸以大歷十一年月日歿於丹陽之私第享年若干以某月日權厝於縣西之五里原從宜也生子數人早歲夭落今之存者女子三人長者生才六霜其次差以幼矣雖禮所未及而號不絶聲呱呱然行路為之憯戚公以為鼓盆傷神兩不中節而鍾情之哀可勝既乎且虞陵谷之變也乃命權氏甥德輿為之銘曰去夏屋之渠渠兮即孤邱之峩峩往不可復兮沈痛如何薤露蒿里兮古有哀歌夫人姓盧氏范陽人曾祖仁皇相州録事參軍祖不勤皇壽州霍山縣丞父隨皇太原府祁縣丞三世沖晦皆不至大官故夫人鍾其粹美生為嬪則以既笄之年歸廬江何君官至洛陽縣尉夫人有輔贊之美柔明之行誠順孝慈以內則為師故得六姻之和而禮無違者乾元中何君早世夫人訓字諸孤動必以方長子士程為蘇州嘉興尉幼子士乂儒行修明或吏或文克荷克構有女二人長適河東裴氏次適博陵崔氏皆奉母氏之訓宜其家室非導之教之之至其及此歟以興元元年三月日考終命於嘉興年六十一士程士乂等謀及龜筮以某月日權厝潤州未克返葬故也夫人即考功員外郎士幹之世母也豫嘗接考功遊獲聞行實故不敢辭二孤之請刻石以銘之辭曰婉彼夫人淑明柔克周旋動用率由四德不享蕃祉不躋壽域二連之哀哀何有極夫人姓權氏天水略陽人十二代祖翼前秦僕射安邱敬公其後至周隋間有佐命功代荷茅土者三葉以至曾王父滑州匡城縣令崇本王父益州成都縣尉無侍烈考許州臨潁縣令伋成都以太學進士擢第臨潁判入甲科皆以文學著名粹行純氣有以鍾下夫人生而敏異姿性端明懿行全識發於天授而和敬以事長慈惠以拊下窈窕德象動成儀度機鑒精辨而深自晦默伯仲甥姪等每有疑理滯義多所咨訪夫人不得已而後言言必中倫誠順之道自中形外外內族姻之中瞻其儀型剛戾者順不仁者化以貞元二年三月歸河東柳君君為睦州桐廬丞方謂有魚軒象服之慶享偕老宜家之壽不幸遘疾癘以其年七月日終於桐廬之官舍享年若干自設帨至於屬纊九族無間言終食無違德宜乎綏福履而介睂壽備祭服以參繭館而迫厄終身莫申其道六姻安仰為善者惑豈善慶昭報之言妄作耶將壽夭淹速之度固有所定耶柳君奉其喪以某月日權厝於丹陽縣某原竇氏伯娣之塋次從遺旨也從父兄子德輿一二㣥從銜茹永痛書實録於墓石銘曰采蘩采蘋列於詩人恭惟淑明與古為鄰嘉玉粹溫蕣英葐蒀淒風夜壑銷鑠堙淪命不可問兮從古沄沄追琢淑德兮用識幽墳
