front:
  text: 全唐文欽定全唐文卷六百七十五白居易二十
  hash: sha256:f672c496ca146954a76466b99274b72f5a4e2fd1f31d42532891d3ebf513a292
body:
  text: 月日居易白微之足下自足下謫江陵至於今凡所贈答詩僅百篇每詩來或辱序或辱書冠於卷首皆所以陳古今歌詩之義且自叙為文因緣與年月之遠近也僕既愛足下詩又諭足下此意常欲承答來旨麤論歌詩大端并自述為文之意總為一書致足下前累歲已來牽故少暇間有容隙或欲為之又自思所陳亦無足下之見臨紙復罷者數四率不能成就其志以至於今今俟罪潯陽除盥櫛食寢外無餘事因覽足下去通州日所畱新舊文二十六軸開卷得意忽如會面心所蓄者便欲快言徃徃自疑不知相去萬里也既而憤悱之氣思有所洩遂追就前志勉為此書足下幸試為僕畱意一省夫文尚矣三才各有文天之文三光首之地之文五材首之人之文六經首之就六經言詩又首之何者聖人感人心而天下和平感人心者莫先乎情莫始乎言莫切乎聲莫深乎義詩者根情苗言華聲實義上自聖賢下至愚騃微及豚魚幽及鬼神㣥分而氣同形異而情一未有聲入而不應情交而不感者聖人知其然因其言經之以六義緣其聲緯之以五音音有韻義有類韻協則言順言順則聲易入類舉則情見情見則感易交於是乎孕大含深貫微洞密上下通而一氣泰憂樂合而百志熙五帝三皇所以直道而行垂拱而理者揭此以為大柄決此以為大竇也故聞元首明股肱良之歌則知虞道昌矣聞五子洛汭之歌則知夏政荒矣言者無罪聞者足戒言者聞者莫不兩盡其心焉洎周衰秦興採詩官廢上不以詩補察時政下不以歌洩導人情乃至於諂成之風動救失之道缺於時六義始刓矣國風變為騷辭五言始於蘇李蘇李騷人皆不遇者各繫其志發而為文故河梁之句止於傷別澤畔之吟歸於怨思彷徨抑鬱不暇及他耳然去詩未遠梗㮣尚存故興離別則引雙鳧一鴈為喻諷君子小人則引香草惡鳥為比雖義類不具猶得風人之什二三焉於時六義始缺矣晉宋已還得者蓋寡以康樂之奧博多溺於山水以淵明之高古偏放於田園江鮑之流又狹於此如梁鴻五噫之例者百無一二焉於時六義寖微矣陵夷至於梁陳間率不過嘲風雪弄花草而巳噫風雪花草之物三百篇中豈捨之乎顧所用何如耳設如北風其涼假風以刺威虐也雨雪霏霏因雪以愍征役也棠棣之華感華以諷兄弟也采采芣苢美草以樂有子也皆興發於此而義歸於彼反是者可乎哉然則餘霞散成綺澄江淨如練離花先委露別葉乍辭風之什麗則麗矣吾不知其所諷焉故僕所謂嘲風雪弄花草而已於時六義盡去矣唐興二百年其間詩人不可勝數所可舉者陳子昂有感遇詩二十首鮑防有感興詩十五首又詩之豪者世稱李杜李之作才矣奇矣人不逮矣索其風雅比興十無一焉杜詩最多可傳者千餘篇至於貫穿今古覼縷格律盡工盡善又過於李然撮其新安吏石壕吏潼關吏塞蘆子畱花門之章朱門酒肉臭路有凍死骨之句亦不過三四十首杜尚如此况不逮杜者乎僕嘗痛詩道崩壞忽忽憤發或食輟哺夜輟寢不量才力欲扶起之嗟呼事有大謬者又不可一二而言然亦不能不麤陳於左右僕始生六七月時乳母抱弄於書屏下有指無字之字示僕者僕雖口未能言心已默識後有問此二字者雖百十其試而指之不差則僕宿習之緣已在文字中矣及五六歲便學為詩九歲諳識聲韻十五六始知有進士苦節讀書二十已來晝課賦夜課書間又課詩不遑寢息矣以至於口舌成瘡手肘成胝既壯而膚革不豐盈未老而齒髮早衰白瞥瞥然如飛蠅垂珠在眸子中也動以萬數蓋以苦學力文所致又自悲矣家貧多故二十七方從鄉試既第之後雖專於科試亦不廢詩及授校書郎時已盈三四百首或出示交友如足下輩見皆謂之工其實未窺作者之域耳自登朝來年齒漸長閱事漸多每與人言多詢時務每讀書史多求理道始知文章合為時而著歌詩合為事而作是時皇帝初即位宰府有正人屢降璽書訪人急病僕當此日擢在翰林身是諫官月請諫紙啟奏之外有可以救濟人病裨補時闕而難於指言者輒詠歌之欲稍稍遞進聞於上上以廣宸聰副憂勤次以酬恩獎塞言責下以復吾平生之志豈圖志未就而悔已生言未聞而謗已成矣又請為左右終言之凡聞僕賀雨詩而衆口籍籍已謂非宜矣聞僕哭孔戡詩衆面脉脉盡不悅矣聞秦中吟則權豪貴近者相目而變色矣聞樂遊園寄足下詩則執政柄者扼腕矣聞宿紫閣村詩則握軍要者切齒矣大率如此不可徧舉不相與者號為沽名號為詆訐號為訕謗苟相與者則如牛僧孺之戒焉乃至骨月妻孥皆以我為非也其不我非者舉不過三兩人有鄧魴者見僕詩而喜無何而魴死有唐衢者見僕詩而泣未幾而衢死其餘則足下足下又十年來困躓若此嗚呼豈六義四始之風天將破壞不可支持耶抑又不知天之意不欲使下人之病苦聞於上耶不然何有志於詩者不利若此之甚也然僕又自思關東一男子耳除讀書屬文外其他懵然無知乃至書畫棊博可以接㣥居之歡者一無通曉即其愚拙可知矣初應進士時中朝無緦麻之親達官無半面之舊策蹇步於利足之途張空弮於戰文之場十年之間三登科第名入衆耳迹升清貫出交賢俊入侍冕旒始得名於文章終得罪於文章亦其宜也日者又聞親友間說禮吏部舉選人多以僕私試賦判傳為準的其餘詩句亦徃徃在人口中僕恧然自愧不之信也及再來長安又聞有軍使高霞寓者欲聘娼妓妓大誇曰我誦得白學士長恨歌豈同他妓哉由是增價又足下書云到通州日見江館柱間有題僕詩者復何人哉又昨過漢南日適遇主人集衆樂娛他賓諸妓見僕來指而相顧曰此是秦中吟長恨歌主耳自長安抵江西三四千里凡鄉校佛寺逆旅行舟之中徃徃有題僕詩者士庶僧徒孀婦處女之口每每有詠僕詩者此誠雕蟲之戲不足為多然今時俗所重正在此耳雖前賢如淵雲者前輩如李杜者亦未能忘情於其間古人云名者公器不可以多取僕是何者竊時之名已多既竊時名又欲竊時之富貴使已為造物者肯兼與之乎今之迍窮理固然也况詩人多蹇如陳子昂杜甫各授一拾遺而迍剝至死李白孟浩然輩不及一命窮悴終身近日孟郊六十終試協律張籍五十未離一太祝彼何人哉彼何人哉况僕之才又不逮彼今雖謫在遠郡而官品至第五月俸四五萬寒有衣饑有食給身之外施及家人亦可謂不負白氏之子矣微之微之勿念我哉僕數月來檢討囊篋中得新舊詩各以類分分為卷首自拾遺來凡所遇所感關於美刺興比者又自武德訖元和因事立題題為新樂府者共一百五十首謂之諷諭詩又或退公獨處或移病閒居知足保和吟翫情性者一百首謂之閒適詩又有事務牽於外情性動於內隨感遇而形於歎詠者一百首謂之感傷詩又有五言七言長句短句自一百韻至兩韻者四百餘首謂之雜律詩凡為十五卷約八百首異時相見當盡致於執事微之古人云窮則獨善其身達則兼濟天下僕雖不肖常師此語大丈夫所守者道所待者時時之來也為雲龍為風鵬勃然突然陳力以出時之不來也為霧豹為冥鴻寂兮寥兮奉身而退進退出處何徃而不自得哉故僕志在兼濟行在獨善奉而始終之則為道言而發明之則為詩謂之諷諭詩兼濟之志也謂之閒適詩獨善之義也故覽僕詩者知僕之道焉其餘雜律詩或誘於一時一物發於一笑一吟率然成章非平生所尚但以親朋合散之際取其釋恨佐懽今銓次之間未能刪去他時有為我編集斯文者畧之可也微之夫貴耳賤目榮古陋今人之大情也僕不能遠徵古舊如近歲韋蘇州歌行清麗之外頗近興諷其五言詩又高雅閒澹自成一家之體今之秉筆者誰能及之然當蘇州在時人亦未甚愛重必待身後然後人貴之今僕之詩人所愛者悉不過襍律詩與長恨歌已下耳時之所重僕之所輕至於諷諭者意激而言質閒適者思澹而詞迂以質合迂宜人之不愛也今所愛者並世而生獨足下耳然千百年後安知復無足下者出而知愛我詩哉故自八九年來與足下小通則以詩相戒小窮則以詩相勉索居則以詩相慰同處則以詩相娛知吾罪吾率以詩也如今年春遊城南時與足下馬上相戲因各誦新艷小律不襍他篇自皇子陂歸昭國里迭吟遞唱不絕聲者二十里餘樊李在傍無所措口知我者以為詩仙不知我者以為詩魔何則勞心靈役聲氣連朝接夕不自知其苦非魔而何偶同人當美景或花時宴罷或月夜酒酣一咏一吟不知老之將至雖驂鸞鶴遊蓬瀛者之適無以加於此焉又非仙而何微之微之此吾所以與足下外形骸脫蹤蹟傲軒鼎輕人寰者又以此也當此之時足下興有餘力且欲與僕悉索還徃中詩取其尤長者如張十八古樂府李二十新歌行盧楊二秘書律詩竇七元八絕句博搜精掇編而次之號元白徃還詩集眾君子得擬議於此者莫不踊躍欣喜以為盛事嗟乎言未終而足下左轉不數月而僕又繼行心期索然何日成就又可為之歎息矣又僕嘗語足下凡人為文私於自是不忍於割截或失於繁多其間妍媸益又自惑必待交友有公鑒無姑息者討論而削奪之然後繁簡當否得其中矣况僕與足下為文尤患其多巳尚病之况他人乎今且各纂詩律麤為卷第待與足下相見日各出所有終前志焉又不知相遇是何年相見在何地溘然而至則如之何微之微之知我心哉潯陽臘月江風苦寒歲暮鮮歡夜長無睡引筆鋪紙悄然燈前有念則書言無次第勿以繁雜為倦且以代一夕之話也微之知我心哉樂天再拜侍郎院長閣下戶部牒中奉八月十七日書具承康寧喜與抃會并別覩手翰訪叙綢繆何眷好勤勤若此之不替也幸甚幸甚首垂問以鄙况不足云蓋默默兀兀委順任化而已次垂問以體氣除舊目疾外雖不甚健亦幸無急病矣次垂問以月俸月俸雖不多然量入以為用亦不至凍餒矣又垂問以舍弟渠從事東川近得書且知無恙矣終垂問以心地此最要者輒梗㮣言之頃與閣下在禁中日每視草之暇匡牀接枕言不及他常以南宗心要互相誘導別來閒獨隨分增修比於曩時亦似有得得中無得無可寄言來書云麤示可乎斯不可也又知兵部李尚書同在南宮錢蕭二舍人移官閒秩退朝之暇數獲晤言每話舊遊輒蒙見念此蓋君子久要之心不為榮顇合散增減耳而不佞者又何幸焉然自到潯陽忽已周歲外物盡遣中心甚虛雖賦命之間則有厚薄而忘懷之後亦無窮通用此道推頹然自足又或杜門隱几塊然自居木形灰心動逾旬月當此之際又不知居在何地身是何人雖鵩鳥集於前枯柳生於肘不能動其心也而况進退榮辱之累耶又思頃者接確論時走嘗有言薦於執事云心與迹多相戾道與名不兩立苟有志於道者若不幸於外是幸於內猥蒙歎賞猶憶之乎今之身心或近是矣退思此語撫省初心求仁得仁又何不足之有也前月中長兄從宿州來又孤幼弟姪六七人皆自遠至日有糲食歲有麤衣饑寒獲同骨月相保此亦默默委順之外益自安也况廬山在前九江在左出門是滄浪水舉頭見香爐峰東西二林時時一徃至如瀑水怪石桂風杉月平生所愛者盡在其中此又兀兀任化之外益自適也今日之心誠不待此而後安適况兼之者乎此鄙人所以安又安適又適而不知命之窮老之至也院長公望日重啟沃非遙仰惟勉樹勳名勿以鄙劣為念月日弟子太原白居易白濟上人侍右昨者頂謁時不以愚蒙言及佛法或未了者許重討論今經典間未諭者其義有二欲面問答恐彼此卒卒語言不盡故麤形於文字願詳覽之敬佇報章以開未悟所望所望佛以無上大慧觀一切眾生知其根性大小不等而以方便智說方便法故為闡提說十善法為小乘說四諦法為中乘說十二因緣法為大乘說六波羅蜜法皆對病根投以良藥此蓋方便教中不易之典也何者若為小乘人說大乘法心則狂亂狐疑不信所謂無以大海內於牛迹也若為大乘人說小乘法是以穢食置於寶器所謂彼自無創勿傷之也故維摩經摠其義云為大醫王應病與藥又首楞嚴三昧經云不先思量而說何法隨其所應而為說法正是此義耳猶恐說法者不隨人之根性也故又法華經戒云若但讚佛乘衆生沒在罪苦不能信是法破法不信故非獨慮說者不能救病亦懼聞者不信沒入罪苦也則佛之付囑豈不丁寧耶何則法王經云若定根基為小乘人說小乘法為大乘人說大乘法為闡提人說闡提法是斷佛性是滅佛身是說法人當歷百千萬劫墮諸地獄縱佛出世猶未得出若生人中缺脣無舌獲如是報何以故眾生之性即是法性從本以來無有增減云何於中分別病藥又云於諸法中若說高下即名邪說其口當破其舌當裂何以故一切眾生心垢同一垢心淨同一淨眾生若病應同一病眾生須藥應同一藥若說多法即名顛倒何以故為妄分別析善惡法破一切法故隨機說法斷佛道故此又了然不壞之義也又金剛經云是法平等無有高下是名阿耨多羅三藐三菩提又金剛三昧經云皆以一味道終不以小乘無有諸襍味猶如一雨潤據此後三經則與前三經義甚相戾也其故何哉若云依維摩詰謂富樓那云先當入定觀此人心然後說法又云不觀人根不應說法夫以富樓那之通慧又親奉如來為大弟子尚未能觀知人心况後五百歲末法中弟子豈能盡觀知人心而後說法乎設使觀知人心若彼發小乘心而為說大乘法可乎若未能觀彼心而率已意說又可乎既未能觀與默然不說又可乎若云依義不依語則上六經之義互相違反其將孰依乎若云依了義經則三世諸佛一切善法皆從此六經出孰名為不了義經乎况諸經中與維摩法華首楞嚴之說同者非一也與法王金剛三昧之說同者亦非一也不可徧舉故於二義中各舉三經此六經皆上人常所講讀者今故引以為問必有甚深之旨焉今且有人忽問法於上人上人或能觀知其心或未能觀知其心將應病與藥而為說耶將同一病一藥而為說耶若應病與藥是有高下是有襍味即反法王等三經之義豈徒反其義又獲如上所說之罪報矣若同一病一藥為說必當說大乘大乘即佛乘也若讚佛乘且不隨應且不救病即反維摩等三經之義豈徒反其義又使衆生沒在罪苦矣六者皆如來說如來是真語實語不誑語不異語者今隨此則反彼順彼則逆此設有問者上人其將何法以對焉此其未諭者一也又五蘊者色受想行識是也十二因緣者無明緣行行緣識識緣名名緣色色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死病苦憂悲苦惱是也夫五蘊十二因緣蓋一法也蓋一義也畧言之則為五詳言之則為十二雖名數多少或殊其於倫次轉遷合同條貫今五蘊中則色受想行識相次而十二緣中則行識色入觸受相緣一則色在行前一則色次行後正序之既不類逆倫之又不同若謂佛次第而言則不應有此雜亂若謂佛偶然而說則不當名為因緣前後不倫其義安在此其未諭者二也上人耆年大德後學宗師就出家中又以說法而作佛事必能研精二義合而通之仍望指陳著於翰墨蓋欲藏於篋笥永永不忘也其餘疑義亦續咨問居易稽首余與河南元集虛范陽張允中南陽張深之廣平宋郁安定梁必復范陽張時東林寺沙門法演智滿士堅利辯道深道建神照雲臯恩慈寂然凡十七人自遺愛草堂歷東西二林抵化城憩峯頂登香爐峯宿大林寺大林窮遠人迹罕到環寺多清流蒼石短松瘦竹寺中唯板屋木器其僧皆海東人山高地深時節絕晚於時孟夏如正二月天山桃始華澗草猶短人物風候與平地聚落不同初到怳然若別造一世界者因口號絕句云人間四月芳菲盡山寺桃花始盛開長恨春歸無覔處不知轉入此中來既而周覽屋壁見蕭郎中存魏郎中宏簡李補闕渤三人姓名詩句因與集虛輩嘆且曰吁此地實匡廬間第一境由驛路至山門曾無半日程自蕭魏李遊迨今垂二十年寂寥無繼來者嗟乎名利之誘人也如此時元和十二年四月九日太原白樂天序荔枝生巴峽間樹形團團如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朶如蒲萄核如枇杷殼如紅繒膜如紫綃瓤肉瑩白如冰雪漿液甘酸如醴酪大畧如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣元和十五年夏南賓守樂天命工吏圖而書之蓋為不識者與識而不及一二三日者云平淮西之明年冬予自江州司馬授忠州刺史微之自通州司馬授虢州長史又明年春各祗命之郡與知退偕行三月十日參會於夷陵翌日微之反棹送予至下牢戍又翌日將別未忍引舟上下者久之酒酣聞石間泉聲因捨棹進策步入缺岸初見石如疊如削其怪者如引臂如垂幢次見泉如瀉如灑其奇者如懸練如不絕綫遂相與維舟巖下率僕夫芟蕪刈翳梯危縋滑休而復上者凡四五焉仰睇俯察絕無人迹但水石相薄磷磷鑿鑿跳珠濺玉驚動耳目自未訖戌愛不能去俄而峽山昏黑雲破月出光氣含吐互相明滅晶熒玲瓏象生其中雖有敏口不能名狀既而通夕不寐迨旦將去憐奇惜別且嘆且言知退曰斯境勝絕天地間其有幾乎如之何俯通津帛丿糸歲代寂寥委置罕有到者乎予曰借此喻彼可為長太息者豈獨是哉豈獨是哉微之曰誠哉是言矧吾人難相逢斯境不易得今兩偶於是得無述乎請各賦古調詩二十韻書於石壁仍命予序而紀之又以吾三人始遊故以為三遊洞洞在峽州上二十里北峰下兩岸相廞間欲將來好事者知故備書其事天地間有粹靈氣焉萬類皆得之而人居多就人中文人得之又居多蓋是氣凝為性發為志散為文粹勝靈者其文沖以恬靈勝粹者其文宣以秀粹靈均者其文蔚溫雅淵疏朗麗則檢不扼達不放古淡而不鄙新奇而不怪吾友居敬之文其殆庶幾乎居敬姓元名宗簡河南人自舉進士歷御史府尚書郎訖京兆亞尹二十年著格詩一百八十五律詩五百九賦述銘記書碣讚序七十五總七百六十九章合三十卷長慶三年冬遘疾彌畱將啟手足無他語語其子途云吾平生酷嗜詩白樂天知我者我歿其遺文得樂天為之序無恨矣既而途奉理命號而告予無幾何會予自中書舍人出牧杭州歲餘改右庶子移疾東洛明年復刺蘇州四年間三換官徃復奔命不啻萬里席不遑煖矧筆硯乎故所托文久未果就及刺蘇州又劇郡治數月政方暇因發篋閱睹居敬所著文集其間與予唱和者數十首燭下諷讀憯惻久之怳然疑居敬在傍不知其一生一死也遂援筆草序序成復視涕與翰俱悲且吟曰黃壤詎知我白頭徒念君唯將老年淚一灑故人文重曰遺文三十軸軸軸金玉聲龍門原上土埋骨不埋名嗚呼居敬若職業之恭慎居處之莊潔操行之貞端襟靈之曠淡骨月之敦愛邱園之安樂山水風月之趣琴酒嘯咏之態與人久要遇物多情皆布在章句中開卷而盡可知也故不序時寶歷元年冬十二月乙酉夕在吳郡西園北齋東牖下作序貞元十五年秋予始舉進士與侯生俱為宣城守所貢明年春予中春官第既入仕凡歷四朝才朽命剝蹇躓不暇去年冬蒙不次恩遷尚書郎掌誥西掖然青衫未解白髮已多矣時子尚為京師旅人見除書走來賀予因從容問其宦名則曰無得矣問其生業則曰無加矣問其僕乘囊資則曰日消月朘矣問別來幾何時則曰二十有三年矣嗟乎侯生當宣城別時才文志氣我爾不相下今予猶小得遇子卒無成由子而言予不為不遇矣嗟乎侯生命實為之謂之何哉言未竟又有行色且曰欲謁東諸侯恐不知我者多請一言以寵別予方直閣慨然竊書命筆以序之爾白氏前著長慶集五十卷元微之為序後集二十卷自為序今又續後集五卷自為記前後七十五卷詩筆大小凡三千八百四十首集有五本一本在廬山東林寺經藏院一本在蘇州南禪寺經藏內一本在東都勝善寺鉢塔院律庫樓一本付姪龜郎一本付外孫談閣童各藏於家傳於後其日本暹羅諸國及兩京人家傳寫者不在此記又有元白唱和因繼集共十七卷劉白唱和集五卷洛下遊賞宴集十卷其文盡在大集內錄出別行於時若集內無而假名流傳者皆謬為耳會昌五年夏五月一日樂天重記序洛詩樂天自序在洛之詩也予歷覽古今歌詩自風騷之後蘇李以還次及鮑謝徒迄於李杜輩其間詞人聞知者累百詩章流傳者鉅萬觀其所自多因讒寃譴逐征戍行旅凍餒病老存歿別離情發於中文形於外故憤憂怨傷之作通計今古什八九焉世所謂文士多數奇詩人尤命薄於斯見矣又有以知理安之世少離亂之時多亦明矣子不佞喜文嗜詩自幼及老著詩數千首以其多也故章句在人口姓字落詩流雖才不逮古人然所作不啻數千首以其多矣作一數奇命薄之士亦有餘矣今壽過耳順幸無病苦官至三品免罹饑寒此一樂也太和二年詔授刑部侍郎明年病免歸洛旋授太子賓客分司東都居二年就領河南尹事又三年病免歸履道里第再授賓客分司自三年春至八年夏在洛凡五周歲作詩四百三十二首除喪明哭子十數篇外其他皆寄懷於酒或取意於琴閒適有餘酣樂不暇苦詞無一字憂歎無一聲豈牽強所能致耶蓋亦發中而形外耳斯樂也實本之於省分知足濟之以家給身閒文之以觴咏弦歌飾之以山水風月此而不適何徃而適哉茲又以重吾樂也予嘗云理世之音安以樂閒居之詩泰以適苟非理世安得閒居故集洛詩別為序引不獨記東都履道里有閒居泰適之叟亦欲知皇唐太和歲有理世安樂之音集而序之以俟夫採詩者甲寅歲七月十日云爾去年微之取予長慶集中詩未對荅者五十七首追和之合一百一十四首寄來題為因繼集卷之一今年予復以近詩五十首寄去微之不踰月依韻盡和合一百首又寄來題為因繼集卷之二卷末批云更揀好者寄來蓋示餘勇磨礪以須我耳予不敢退舍即日又收拾新作格律共五十首寄去雖不得好且以供命夫文猶戰也一鼓作氣再而衰三而竭微之轉戰迨茲三矣即不知百勝之術多多益辦耶抑又不知鼓衰氣竭自此為遷延之役耶進退唯命微之微之走與足下和荅之多從古未有足下雖少我六七年然俱已白頭矣竟不能捨章句拋筆硯何癖習如此之甚歟而又未忘少年時心每因唱酬或相侮謔忽忽自哂况他人乎因繼集卷且止於三可也忽恐足下懶發不能成就至三前言戲之者殆為巾幗之挑耳然此一戰後師亦老矣宜櫜弓匣刃彼此與心休息乎和晨興一章錄在別紙語盡於此亦不修書二年十月十五日樂天重序元和五年予為左拾遺翰林學士奉詔寫真於集賢殿御書院時年三十七會昌二年罷太子少傅為白衣居士又寫真於香山寺經藏一作藏經堂時年七十一前後相望殆將三紀觀今照昔慨然自嘆者久之形容非一世事幾變自一作因題六字以寫其一作所懷前三年元微之為予編次文集而敘之凡五帙每帙十卷訖長慶二年冬號白氏長慶集邇來復有格詩律詩碑誌序記表贊以類相附合為卷軸又從五十一以降卷而第之是時太和二年秋予春秋五十有七目昏頭白衰也久矣拙音狂句亦已多矣由茲而後宜其絕筆若餘習未盡時時一詠亦不自知也因附前集報微之故復序於卷首云爾
