front:
  text: 全唐文欽定全唐文卷九百八十九闕名三十
  hash: sha256:ca6ea428852a231f7a3dd926d297573d6f583a9bfd1259d9cd9f59d073aa02fd
body:
  text: 蓋聞至理元微起夫言象之闕一字真為眇邈闕二字希夷之闕一字而能仁降迹隨緣利現紫狀西誕則珠星奄輝白象東馳則金人入夢是闕一字三乘之軌齊騖八正之門洞啓日用之益可略言焉自闕二字三千之前道光汲引塔盈八萬之後歸闕一字寂闕二字夫闕二字難遇闕三字針人心易遷同茲斫石何則釋迦現於既往仰企踵而不追彌勒降於將來俯翹足而難俟居前後而成鄣惟進退而莫闕一字言念沉淪喟然嘆息乃與同志百餘人等上願皇基永固配穹天而垂拱下使幽塗載曉趨彼岸而闕一字升遂於茲嶺敬造彌勒像龕一所地聳雙闕壁映千尋前泝清流却倚重岫縈帶闕一字薄密邇京華似耆山之接王城給園之依衛國也既資勝地又屬神工疏鑿雕鐫備盡微妙以大唐貞觀二十二年四月八日莊嚴斯畢於闕一字尊儀始著似降兜率之宮妙相初成若在菩提之樹白毫月照紺髮煙凝蓮目疑動果脣似説其有禮闕二字足瞻仰尊顏者莫不肅然毛竪豁爾心開實釋梵所歸依龍天闕一字衛護彼丹青徒煥旋見銷毀金玉雖珍易以零落豈若因山成固同乾坤之可久刊石為貞何陵谷之能貿於是勒銘龕闕一字式纘靈儀其詞曰真如眇眇正覺巍巍四宏動念八相流輝鹿園闡法鶴樹拂衣十方三世異軫同歸其一闕一字歟逸多正真道備踵彼遐武補茲佛位兜率降神閻浮廣利淨土闕一字啓闕一字門罔閟其二思覩聖容龕茲巖曲既雕既就將起將躅釋梵冥感靈祇幽屬似會龍華如遊雞足其三丹巘重疊清川滉漾松桂灌叢聖仙來往影留怖鴿手威狂象妙包湛然歷劫瞻仰其四闕十七字於闕四字山於紫闕二十四字劫齡越恆河闕八字元風廣被俱升三闕一字之闕二字妙難闉闕一字重雲而不闕三字陸念淨於心田闕四字五乘調於意樹崇遵正覺鑒照不周闕二字之闕二字靈未盡闕三字海動闕一字無常明陰洞陽空窮其數廣門杳闕三字其闕一字聖道幽元不悉其旨舉闕一字無上抑神無下彌於宇宙攝以毫闕四字淑芥闕一字難巧拂石屢盡墨海無闕一字照玉燭而轉金輪散堯雲而闕二字日闕四字濟闕一字三闕二字法宣陽獎延拾地云以大德寺者荊河之闕二字也上嶔嵒逼漢下幽邃窅蒙左則金臺寶闕右則岡嶭山阜山弓山隆前上洛闕二字同涓定鼎洪流其後盟津達於晉閾徘徊盤鬱五臺陸府山扃三山闕一字州山過外闕一字倍尸靈念熊耳魚聖鱗獻書進圖入匪賦贛咸貴納稅纎美闕一字歌闕一字産西詩菜菲自大豸既殷皇家鹿止萬代神基明堂鈿鈺雖非拔濟闕一字預孤園未闕一字舍衛香城豈非闍峯雪岫者歟荊元魏帝規矩闕一字尼霸闕一字隆邦禎祥表於慈父占龍威珤帳妙處雲天瑞膺明靈揮巖刊塔闕一字為大德寺也皇儀數改帝業頻移行匆遇逋周時逢價道虧尊廢像遂斷香路於西方滯遊魂於淨土因以釋斆陵遲神香頗及珮形殊影獨處堂門無菩薩真人闐夜橑落懟金顏於麓野幽玉面於摧龕聖德深明舉淹留於金闕一字大帝乘時出震思徹九圍遠眺昏窅親觀隱歿撲炬燎於邪烽楫㣥迷於苦海頻奉明詔重令修緝復崇前號度尼五等並早辭百兩夙契三乘燔香翦綵發曇花之志無常無我法印尊儀戒行不虧陸闕一字無纍復有法子清信闕二字劉仁則草六人等幼闕一字貞敏宿悟三空闕一字敬闕一字情先苞肆忍絲中白縷食內柚餐禪營寶塔特造僧房闕一字待布金徘徊闕一字就鴻鐘廢而還擊聲徹九天清唄闕二字再稱聞於闕一字地今建石碑像一軀金容毫目出界無雙玉面蓯蓉拾方俙有聞名合掌闕一字幼愆除見影低頭恆闕一字罪滅復營彌勒閣一所金鈴寶鐸和天樂而鑑鏘妙闕二字花齊綺雲而合雨采闢大千山路渡彼岸津梁聖斆而復全蒼生罪而還福闕一字舟待楫竟無越海山功樽滿衢中安知挹闕一字伏闕一字而皇上宏資福垂拱而蒞捌荒德被黔黎斂袵而闕二字國恩闕一字巧骨石室歸仁澤及蜎蟲非金闕一字流偈法相常住齊三光闕四字皇福臻同闕二字山固再申斯句刊勒茲銘輒以輊闕一字聊興掬闕三字智劍闕三字鋒闕二字金鋋能摧怨弓門無臨大穀零覩遊闕一字礎瞻玫闕三字鶴舞文闕五字慈門宏勝業於神州設夔功於赤縣今乃鐫闕三字鏤石尋闕一字繼釋祖山遺風嗣金文山祕碣恐塵飛阱海桑出波中讚闕三字難窮歎慧風而靡絶翹心渴仰願奉神光普照無邊咸歸妙旨闕四字闕一字雄慈父靈儀頗識説法有功論義智力入斷五欲出降六賊闕四字破魔軍息其一新構雲閣鯨棟鯢虹丹梁緑綺宿鳳棲龍觀如見鶴闕二字真空波行論法沼語驚鴻其二四蛇迅速烏飛兔散火宅非固諸子為難金鼓既韻方超彼岸闕一字等修謹常遵誦讚其三東流頗息西闕一字難追去來無礙四運相隨天長地久釋廟逶迤金璽常固寶闕一字無虧其四闕一字宮月殿青紫丹墀左連帝闕右闕一字王畿峩峩妙德供養巍巍常遵福地闕一字共歸依其五昔軒轅之臺表於大荒之野靈光之殿存乎曲阜之鄉然皆起滅不停苦空無我遺風餘迹尚或可觀况佛剎淨居金剛福地百靈之所翊衛萬善之所扶持宜其踰億劫以永存歷三災而彌固者也龍泉寺者晉咸康二年縣民王陽及虞宏實等之所建立二人以宿植之良因修未來之勝果爰捨淨財興斯福事雖宏壯未極而嚴淨有餘其地勢則憑峻嶺以為墉縈長江其如帶乃於形勝之所式建方墳背巘面流亭然孤立譬崑峯之望坳澤若圓嶠之泛滄溟棲真之致莫與為儔道場之建於茲二百年矣值梁室板蕩大盜潛移四海沸騰九夷交亂其壯騎之所憑陵戎馬之所轥轢燎原剃草邑無遺噍玉堂金穴餘構莫存甲第高門尺椽皆盡浙河之左尤鍾其斃於時禹川殷阜舉袂成帷雲棟繡櫺雕甍綺閣皆夷漫滌蕩萬不一存潤屋為墟曝骸如莽家靡餘爨路無行迹唯此伽藍嶷然不動清梵夜響和鈴旦揚行人宴默風塵無警或有履鋒介士彎弧劍客莫不釋戈免胄望崖頂禮豈非慈善幽贊功德冥符能伏獯戎善和怨適斯固三寶之力不可思議但自創立以來多歷年所時經理亂道或汚隆冬室夏堂亟多頽毀禪思或擾分衛罕周乃有清信士女若干人咸撤布帛隨時喜捨步影揵捶資待無缺有仁祠焉有淨衆焉藉四部之護持起十方之回向低頭合掌並趣菩提彈指散花皆成立少道然佛法難逢人身易失傳火交謝念念不留閲水成川滔滔莫反寧可宴安巢幕甘寢積薪沉溺蓋纏不求解脫實宜共出愛網同護法城修福不捐至誠必感大悲汲引義非虛説庶憑願力俱證道場是用鏤之金石咸題姓字貽諸不朽乃作銘曰正教既隱像法斯備奈苑祇林香城金地鳥跋連屬雞飛相次像設間安斯為佛事乃建靈塔傃江之泳棟宇既修雕龕斯整負岩面壑棲雲倒景淡爾智流嶷焉仁靖方丈淨室四柱寶臺運遷時謝日往月來桂棟或朽蘭橑將摧珠幡掩色寶網凝埃篤矣清信共宏利益或捨衣裘咸傾粟帛造新葺故呈材獻石地擬金繩供同香積世諦虛假色相非真棲託毒樹回環苦輪惟我淨域出要良津勝業可久暉光日新蓋聞日月星辰著明也可以用土圭而度之陰陽風雨其氣也可以陳灰琯而察之此皆不越尋常之境並歸生死之途而猶八卦敘之而闕三字識之能識生則不滅實即空而有空法本不然藏諸用而沖用故前佛後佛廣開四諦之門全身示身便起三伊之相入波羅之國即闕五字而頂禮獼猴水上導七淨之遙波雞足山中開五乘之出路祥禽聞梵便生忉利之天旅鴈聆音自上拘尸之塔豈不法王廣濟衆闕六字德周於砂界若鳧鐘之待物巨細飛聲像鸞鏡之高懸方圓盡具故得去之不去來之不來剖芥子而納山河引蓮花而闕十字寺者隋開皇三年之所立也既而上圖景宿天文當畢昴之間下析物土地理是唐虞之國前通廣劇邯鄲跕屣之郊後控闕十三字亹積香爐之煙鴛水南流滔滔注祥河之浪信陰陽之交會實賢聖之泉藪於是憑爽塏建招提布金繩求水臬瞻闕一字揆闕十字山之梵橫步簷之四注俯視雲霞立寺高閣之百重上臨闕一字雨離房別殿玉璫與鳳剎相輝復霤重階珠綴共龜鋪交映五衢闕九字漢神龕百鏡似若天成玉樓千柱還疑地涌豈獨須彌山上坐觀波若之臺舍衛城中行列祇陀之樹故有巢禽宿德飧闕十字天下交喪芒芒率土俱勞烽火之憂懍懍懷生並入刀兵之劫而白波之衆遊定水而吞砂黃巾之黨入禪林而召雨暨闕十字無思不服諸侯八百會牧野而前歌列士三千歷商郊而後舞渠魁既翦即收雷電之威日月貞明連敷雲雨之澤粵在闕十字規造化上棟下宇直放乾坤芳果竹林還如天竺之國碧題銀榜即同王舍之城而冷暖池邊乘杯可度菩薩樹下了義安闕九字大周革命卷懷前古聖德高於望雲神化通於煉石明堂端委朝萬國而受圖書卑室居尊走百蠻而奉琛幣清風入律瑞闕九字美矣演淳化於無邊唐哉皇哉揚至誠於有頂景福既集濟塗炭於炎崑惠澤傍羅拯飛沉於苦海爰有像主柱國張黑刀闕九字之名山東擅終軍之妙或祥鳩襲慶祖德攸傳飛燕入懷象賢無墜王夷甫之瑤林瓊樹自是孫謀嵇叔夜之龍章鳳姿斯為錫允闕六字明珠並入檀那之施江妃雜珮咸從衆妙之門遂以長壽二年一月五日乃於舍利塔中敬造尊容像一鋪并諸夾侍菩薩總有一十闕五字交輝八十種好紺髮與青蓮競色金容聚日疑漢夢之霄通瑞影含闕一字動周王之夜鑒五百羅漢爭持貝葉之文八萬國王自奉銀棺闕五字開一切攝醉象於初心紹隆三寶屏炎龍於弱歲尼連禪河側不動不傾賓波羅窟邊惟寂惟寞至於貫花舉葉之闕一字奧義攸歸九部闕六字説示説還成有説之宗非想非名盡入名言之義高懸法鏡遍三界而歸依器綜寫瓶在十方而回向愛河之內即遇導師業霧之闕七字餘慶得祥鱣之美重規疊矩乘朱軒者十人積德纍能為公卿者四代龐士元之展驥未遂良衷陳仲舉之題輿空然見闕一字邑闕一字寇闕六字譽於家庭訓人標上德之容利物盡中和之器俯臨小邑即動絃歌未展高材寧悲下調花飛一縣掞潘嶽之文詞菊泛三清闕八字海人也寵冠天齊名飛富縣公侯必復竟從飛鳳之徵禮讓有餘俯廾盧龍之賞懷仲弓之道德珠玉相輝蘊元禮之風流闕九字人宏廉眘之風接士盡留連之契員外丞張大亮南陽人也金鉤錫祚石印延祥磊硌為梁棟之材魁梧抱文儒之器清輝闕九字三君平陽疏紫氣之徵汾浦得黃雲之寶員外主簿張仁觀南陽西鄂人也天縱多奇地靈標慶管公明之文學盛德猶闕十字非性極間明郭子元之事無疑滯情存夙夜崔亭伯之職在拾遺尉沈令圭吳興人也風雲逸氣鸞鶴奇姿盛門閥於江闕十字儀韶亮博聞強記俯地芥而無遺遊藝多材仰天官而可代員外尉李楚璧趙郡人也才為代出器實非常令德相承闕十一字的凡厥寮友賞極煙霞既防患而洗心佇良因而植操依希勝果在名利而不渝齋戒道場出樊籠而獨秀恤隱求闕十二字而愛郝知運卅五人等燕趙奇士圭璋令望才子有八非唯里號高陽讀書萬卷豈直門稱通德理既窮於性相實闕十二字之尚擁遂乃宏宣誓願爭趨福業驪珠鵲玉並入祇園鳳粟鳧緍咸從奈苑敬依多寶而立豐碑逸須達而均芳冠闕十二字超十號觀其地也列闕一字之遺塵語其産焉先王之桑梓壯麗侔於魯殿締構擬於周堂豈可使寶塔棲霞遂沉吟而不讚闕十字少女之詞楊德祖有銘於絶妙賈逵金字山如礪而猶存呂望昆吾海成田而不昧其詞曰道本無象法亦難名神功罕測妙力潛營出入空界周流化城即色是色非形示形其一遊彼獨園超然喜捨教行震旦言從兌野頂巢飛鳥闕十二字其二闕十四字遠度白毫超相青蓮引步八正之門三乘之路其三芒芒沙界蠢蠢籠樊積塵為嶽集愛成源猶驚意馬未靜心猿遽勞廠田坴纍溺想闕一字言其四大周造闕二十五字解慍薰風其五爰有信士衣冠令胄楚國先賢陳留耆舊煙霞滌想芝蘭挺秀一代名德十方領袖其六靈鵲山東祥鴛水北不近不遠是廓是闕十七字池蓮垂葉梁梅吐花風吟寶鐸地布金砂飛甍轉鳳闕一字草鳴麚其八劫灰難住嵐風易滅闕一字盡城空桑生海竭用旌元礎庶揚洪烈天闕一字地闕而不渝雲闕若夫溫席扇枕養性之道存焉塗車芻靈送終之儀見矣然未能棺中説法置親於忉利之宮地下乘杯救母於阿鼻之獄名言之所不測報應之所潛通唯我大雄闕一字斯普濟金鄉縣垤溝村李弼徽孝心而至純德穴俱符追惟顧復之恩願假菩提之力謹為亡考見存母鐫碑像一龕闕二字踴出石闕四字光吐而世界闕四字而魔波伏以斯功德闕一字報劬闕一字惟願五濁恆清三災不染乘斯寶筏迥入禪河因彼闕一字輪遐超火宅上沾有頂下漏無垠俱就福田咸升彼岸以大周長安二年歲次壬寅十一月甲子朔十五日戊寅其功方就託此闕一字因為聖神皇帝下為含闕一字俱登出覺銘曰孝子不匱菩薩闕一字生以斯法忍闕一字護慈下闕大唐沂州闕粵以仙圖寂寞闕規玉府將成不滓之闕教淪骨法闕一字無觸石之期欲火起炎昆之焰其後馬鳴龍闕葉之闕一字言摩騰法蘭傳貫花之寶偈爰有清信仕顏文資草餘闕等並兒鄰松男慈兒三人居郡琅琊兄文枋陸闕二字鯉躍孝悌闕義闕一字鄉孔子龍蹲禮樂詩書之國共成勝業載結良緣捨難捨闕成未成之業闕一字於英固之力聖水之際奉為皇帝師僧父母敬造老子三尊一闕一字刊闕一字以畢莊嚴乃成僉闕以蜀闕一字唐德闕一字有闕一字施真宗闕一字勒鄭闕一字理闕二字旋法力式旌其事闕乃作銘曰闕三字下雞足巖闕一字三尊既立勝業橫開斜臨闕鳴花過秋蜂闕三字斯畢妙福長該闕一字我功德闕一字我能闕一字業超十闕三天唯則闕一字空闕一字盡劫未灰燃庶瓊碑闕金闕二字原夫贍部神州薩訶妙境代應賢劫成芥子而滿由旬時現聖雄喻曇花而實希有騰妙雲而潤三卉就微塵數之人天振法鼓而揚一音徹恆沙量之佛土惜哉彼王舍城內或不見不聞喜夫我皇唐國中得總持總集玉毫金彩具真儀而畢歸華簡花編窮祕藏而咸造仍使梵宮妙智變現宰官帝室仙苗化成藩牧有正議大夫行衛州別駕李諱闕一字溫地靈天系應半千而獨高玉樹瓊枝紹得一而孤秀器侔台鉉德並阿衡化勝解刀勢逾展驥壓黃河北岸欲千里浮清鎮太行東隅使百城安肅行君子之道四聖論克從用養人之德三賢謨勿爽觀好以悅若流杜母之慈矜孤愍窮如遺邵父之愛縣令朝請大夫韋諱允衝斗奇光早聞博識連城重價速就明時斷錯節而姦盜除製文錦而儒雅服潘河陽之詞采著述在於多間薑灌壇之嚴闕一字疾暴避於他境不下堂而人自理豈獨宓齊飭高國而祥欲棲不孤王阜縣尉宣德郎盧節明如冰鏡直類絲繩諤諤當官賢於闕一字舍誾誾理事果似仲由妙稱比乎終童可畏甚乎顏子咸以歷任共於惟衛應授疾於星奔州縣帶於康莊晨夕佇於天命於茲述職不易其人非夫富贍若山智慧如海孰能預於斯矣然驛長孫璧者周文王之苗衛上卿之允漢司農寶魏侍中資或闕一字守太原或受封安定門風不變舞松柏而增清代德相資歌鳳凰而轉盛丕祖德嚴考禮父慈子孝積善揚名衛荊之富美可儔鄭莊之迎賓足擬屬開元運載區宇廓清九隅未降之天十洲無記之地咸來貢篚競湊厥途豈唯南馳蒼梧北走紫塞驎駒驥子負琛賮而元黃逐日追風觸闕二字而委斃助國之寶飛天之種吳欲諸侯之葬燕以千金之市可不惜乎璧祖母恆農楊氏出四代五公之門乘採蘂報環之福春秋八十四策桃花而若飛座客闕一字千餘泛竹葉而常滿以禮為國足揚於國風以貞利家已殷於家道扶人有惠樹提伽之業成發心用慈優波離之念重誓告諸佛願及庶官齊十力而救拔四生息三毒而哀矜五苦遂得赭白成闕二字祥花之飛滿驛中紫騮應歌如綵雲之奔流櫪上誓願斯果功德是崇敬造彌陀一區并以菩薩兩侍琢之以碧玉嶷若寶山之拔來飾之以黃金渙似蓮河之湧出韋堤希悲感在昔雖遙舍利弗喜歡闕三字覩妙相縱小神力不輕樹千萬里之路旁使百億衆之偕見下拜稽顙罪滅無餘右繞至心闕三字限庶夫天長地久植善之行恆流海變田移種德之名無朽其詞曰惟唐纍慶輔國多賢分枝蔭衛別駕安蕃六條代布三德日宣出身明白就道幽元其一儒門令問貴代貽芳出從京兆作宰新鄉鳴絃有序製錦無傷依仁撫俗詠德斯彰其二孫家慈母族本恆農春秋欲暮聽覽仍聰三堂禮異四海賓同玉杯常滿綺座無空其三有尉盧君其若生知黃陂萬頃郤桂一枝行仁火速為國星馳當官有效處事無闕一字其四至美孫家善資軍國造彌陀像願威神力天地常清干戈永息劫石恐消豐碑乃勒其五宇宙之外有聖人焉乘時而來知變而逝道不可以終喪故授之以像是以聖人之體見乎舍利聖人之容見乎廟聖人之尊嚴見於塔三者廣大悉備聖人之化業存矣曰鹿泉信士畢瑜張成道心之攉焉者也歸戒是與聲塵若廾高尚淨名之事欽惟睿覺之風悉心勵行屬意遐遠乃聚其族而令其家曰金玉朿帛吾知之矣適足以馳慮喪神不可以經綸界劫吾將底崇妙事丕建靈塔百歲之後良無間然爾其念哉於是子孫咸跪悅敬諾乃謀奧勝卜華敞周爰咨度遂定於本願之伽藍焉既其徇名山採貞石肅志潔慮以精以析旬有五日果獲真美暉山韞玉渥靈含潤既蹶既發粲然可觀軸而推之雷奔谷響千唱百和不植地而致焉乃鑿闕一字璞之闕二字而礱之濁澤精密不瑕不磷審高下明廣輪疊而成階積以曾峻崨嶫峯起嵯峩山盤周際吻合間不容髮儼若地湧鬱猶渾成巋哉實荒劫之宏鎮也初真策之設也思厥舍利罔知所請乃誠克念匪皇底寧斯無所有送釋惠起所致者草有四粒以屬焉既獲厥心豁若符契非夫靈聖默運其孰能與於此乎乃考彞範本元儀黃金其棺白銀其槨周以石篋襯以琉璃香物萬選名花數百既散既屬封之掩之堅林之事宛然斯在令范陽盧公字從運夫人滎陽鄭氏慨大師之永往仰勝會而興懷雨泣輸誠大捨服玩士女千萬徘徊獻心延慕金容覬全身而樹多福者信亦繁矣因斯而觀則耳目之外界趣之中密逾周旋崇禧致遠者又惡可得其源倪哉闕三字四博鑿華龕製金容廣良業厥有砥信昌言左右維南有佛實維慈氏畢公所立崇願將來冀其下生北面而事爰有淨邑長老王闕三字五十二人欽若神界洗心安養清修其本式建彌陀乃西其居以正厥位太原胡仙經彌勒於北所以發其蒙也高尼明惠設能仁於東所以昭其本也四子各以其志競心方面雕粹渥飾有休有倫底綏四方姦魔自喪蕩蕩幻境居然化淳嗟乎不覩於茲安知天地大寶之所在也先是故寺主振法師故都維那知遜法師桑門之道勝也寺主僧希名都維那僧惠仙上坐僧惠超威儀僧道光法師僧智秀律師闕一字道瑗律師僧湛寂前上坐頭陀僧道解乃起合寺諸釋鄉城長幼及篤信麴客良等為國建釋迦石像於北殿其高二丈有八尺開鑿啓發其功甚廣亦既構立崇崇嶷然煥乎金光寂矣神峙紺目海視玉豪山轉衆美繁衍熊熊鏡天王褱壯偉麗城巾所絶左藥王右藥王其高草有五尺二者蓋前丞王務光張成之所造也渥彩曜靈光相暉炳峩峩抑抑信生人之真救焉夫惟王公博孝之君子也母氏聖善卒於茲邑銜恤在疚莫知所從以為俎豆牲牢不足以光贊營魄乃樹斯妙業以展寒泉之心相此則寶林德水之必然也自有唐開元八年繕理畢經始於今草有五載是時碑既未備而振遜俱歿王公又徙職於壽陽法門智秀有恆其德仰茲廣業追惟聚散恐歲月浸遠元由蔑聞越九年作噩歲春仲望乃與前塔合而為頌宣之豐石以存萬古其詞曰巋哉靈塔既闕一字其崇舍利內德光輝外融四德既位萬德咸豐作鎮荒劫皇哉覺風崒彼曾廟有靈其嶷擢擢皇皇紫金維色法雲亞聖左右翼翼既清昏波與時偕極真源淳淳合變而身矧茲像設又倍遺塵不有轍迹孰知所臻勒銘金石作鎮天人闕皇之德施化侔天地經綸象雲雷日月所臨之闕遠闕也憬闕二字夏其惟犬戎聚落猖狂保聚山谷故聖王之闕則懷闕舊章特申約言載錫姻好闕明德闕也潛通約而反間闕軍士闕未加闕乃親闕敗謀闕大闕水闕德闕二字叛闕舉而定闕也武有七德今則過之而頌聲無聞何以闕聖策謀從闕頌曰闕
