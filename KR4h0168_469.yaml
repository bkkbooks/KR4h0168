front:
  text: 全唐文欽定全唐文卷四百六十九陸贄十
  hash: sha256:5bae6be240a3bb560965d250041cbbf0e08348feb0850a70212e4b54e8497b81
body:
  text: 右冀寧奉宣聖旨往年百官請上尊號曰聖神文武皇帝今緣經此寇難諸事並宜改變衆議欲得於朕舊號之中更加一兩字卿宜商量事體穩便得否者伏以睿德神功參天配地巍巍蕩蕩無得而名臣子之心務崇美號雖或增纍盈百猶恐稱述未周陛下既越常情俯稽至理愚衷未諭安敢不言竊以尊號之興本非古制行於安泰之日已纍謙沖襲乎喪亂之時尤傷事體今者鑾輿播越未復宮闈宗祏震驚尚愆禋祀中區多梗大憝猶存此乃人情向背之秋天意去就之際陛下誠宜深自懲勵以收攬㣥心痛自貶損以答謝靈譴豈可近從末議重益美名既虧追咎之誠必纍中興之業以臣庸蔽未見其宜乞更詳思不為凶孽所幸此臣之至願也謹奏右冀寧奉宣聖旨卿所商量加尊號事雖則理體甚切然時運必須小有改變亦不可執滯不信卿宜為朕更審思量應亦無妨者臣聞德合天者謂之皇德合地者謂之帝德合人者謂之王父天母地以養人理物各得其宜者謂之天子是皆至尊之殊號極美之大名雖欲變更無踰於此故伏羲神農黃帝堯舜自生人已來君德之最神聖者天下尊之美之亦已至矣而其指以為號者或曰皇或曰帝唯目一字且猶不兼禹湯繼興莫匪大聖尚自菲薄降號為王嬴秦德衰於殷周而名竊於羲皞兼皇與帝始總稱之流及後代昏僻之君乃有聖劉天元之號是知人主輕重不在名稱崇其號無補於徽猷損其名不傷於德美然而損之有謙光稽古之善崇之獲矜能納諂之譏得失不侔居然可辨況今時遭屯否事屬艱難尤宜懼思以自貶抑必也俯稽術數須有變更與其增美稱而失人心不若黜舊號以祇天戒天時人事理必相扶人既好謙天亦助順陛下誠能斷自宸鑒渙發德音引咎降名深自克寸責惟謙與順一舉而二美從之外可以收物情內可以應元運上可以高德於敻古下可以垂法於無窮興廢典矯舊失至明也損虛飾收美利大智也前聖之所以永保鴻名常為稱首者達於茲義而已矣陛下何吝而不革反欲加冗號以受實患哉元元道德經曰王侯自謂孤寡不穀以賤為本也周襄王遭亂出居于鄭告于諸侯曰不穀不德鄙在鄭地春秋禮之以其能降名也漢光武詔令上書者不得言聖史册稱之以其能損已也臣顧以賤微獲承訪議伊尹恥其君不如堯舜臣亦恥之是以誠發於中不復防慮忌諱赦其愚而鑒其理惟明主行焉謹奏右隱朝奉宣聖旨并以中書所撰赦文示臣令臣審看可否如有須改張處及事宜不盡條録奏來者臣謹如詔旨詳省再三猶懼所見不周兼與諸學士等參考得失僉以為綱條粗舉文理亦通事多循常辭不失舊用於平昔頗亦可行施之當今則恐未稱何則履非常之危者不可以常道安解非常之紛者不可以常語諭自陛下嗣承大寶志一中區窮用甲兵竭取財賦氓庶未達於暫勞之旨而怨咨已深昊穹不假以悔禍之期而患難繼起復以刑謫太峻禁防傷嚴上下不親情志多壅乃至變生都輦盜據宮闈九廟鞠陷於匪人六師出次於郊邑奔逼憂厄言之痛心自古禍亂所鍾罕有若此之暴今重圍雖解逋寇尚存裂土假王者四凶滔天僭帝者二豎又有顧瞻懷二叛援黨姦其流實繁不可悉數皇輿未復國柄未歸勞者未獲休功者未及賞困窮者未暇恤滯抑者未克伸將欲紓多難而收㣥心唯在赦令誠言而已安危所屬其可忽諸動人以言所感已淺言又不切人誰肯懷昔成湯遇災而禱于桑野躬自矒剔以為犧牲古人所謂割髮宜及膚翦爪宜侵體良以誠不至者物不感損不極者益不臻今茲德音亦類於是悔過之意不得不深引咎之辭不得不盡招延不可以不廣潤澤不可以不宏宣暢鬱堙不可不洞開襟抱洗刷疵垢不可不蕩去瘢痕使天下聞之廓然一變若披重昏而覩朗曜人人得其所欲則何有不從者乎應須改革事條謹具別狀同進除此之外尚有所虞竊以知過非難改過為難言善非難行善為難假使赦文至精止於知過言善猶願聖慮更思所難易曰聖人感人心而天下和平夫感者誠發於心而形於事人或未諭而宣之以言言必顧心心必副事三者符合不相越踰本於至誠乃可求感事或未致則如勿言一虧其誠終莫之信伏惟陛下先斷厥志乃施於辭度其可行而宣之其不可者措之無苟於言以重其悔言克誠而人心必感人心既感而天下必平事何可不詳言何可不務罄輸愚懇伏聽聖裁謹奏右冀寧奉宣敕旨卿及諸學士名銜宜並鈔録進來冀寧又向臣説云聖意以臣等自到奉天書詔填委欲與改轉以獎勤勞者承命竦恧顧慙非宜進退倣徨不知所措臣謬以儒學選居翰林雖職異訏謀而恩參近侍當陛下用兵之會乏決勝之籌從陛下避狄之遊靡出奇之計見危闕授命之節知難無伏死之爭事君大猷臣則皆曠屑屑供職曾何足云夫君之有臣以濟理也理不失道亂何由生亂之浸興由理乖也君之及難實臣罪也是以主憂則臣辱主辱則臣死今陛下躬罹逼脅露處郊畿園廟震驚斯謂辱矣寇讎密邇亦云憂矣臣竊謂凡今在位任重者其罪大職近者其責深臣之職司頗亦為近是宜當責安可增榮又聞初到奉天已頒詔命應是扈從將吏一例並加兩階今若翰林之中獨蒙改轉乃是行賞不類命官以私録微勞則臣等遷位過優勸來者則從官加階太薄先後失次輕重不倫凡百具寮誰不解體夫行罰先貴近而後卑遠則令不犯行賞先卑遠而後貴近則功不遺至如徇主忘家固是臣子常分追陪輦蹕曷足甄稱陛下必以朝官之中有來有否事須旌別以警不從則望先録大勞次遍㣥品然後以例均被臣亦何敢獨辭殊渥曲臨實傷大體不任靦懼之至謹奉狀以聞謹奏右臣聞作法於涼其弊猶貪作法於貪弊將安救示人以義其患猶私示人以私患必難弭故聖人之立教也賤貨而尊讓遠利而尚廉天子不問有無諸侯不言多少百乘之室不畜聚斂之臣夫豈皆能忘其欲賄之心哉誠懼賄之生人心而開禍端傷風教而亂邦家耳是以務鳩斂而厚其帑櫝之積者匹夫之富也務散發而收其兆庶之心者天子之富也天子所作與天同方生之長之而不恃其為成之收之而不私其有付物以道混然忘情取之不為貪散之不為費以言乎體則博大以言乎術則精微亦何必撓廢公方崇聚私貨降至尊而代有司之守辱萬乘以效匹夫之藏虧法失人誘姦聚怨以斯制事豈不過哉今之瓊林大盈自古悉無其制傳諸耆舊之説皆云創自開元貴臣貪權飾巧求媚乃言郡邑貢賦所用盍各區分稅賦當委之有司以給經用貢獻宜歸乎天子以奉私求元宗悅之新是二庫蕩心侈欲萌柢於茲逮乎失邦終以餌寇記曰貨悖而入必悖而出豈非其明效歟陛下嗣位之初務遵理道敦行約儉斥遠貪叨雖內庫舊藏未歸太府而諸方曲獻不入禁闈清風肅然海內丕變議者咸謂漢文去馬晉武焚裘之事復見於當今矣近以寇逆亂常鑾輿外幸既屬憂危之運宜增警勵之誠臣昨奉使軍營出遊行殿忽覩右廊之下榜列二庫之名戄然若驚不識所以何則天衢尚梗師旅方殷瘡痛呻吟之聲噢咻未息忠一作辛勤戰守之效賞賚未行而諸道貢珍遽私別庫萬目所視孰能忘懷竊揣軍情或生觖望試詢候館之吏兼採道路之言果如所虞積憾已甚或忿形謗讟或醜肆謳謠頗含思亂之情亦有悔忠之意是知氓俗昏鄙識昧高卑不可以尊極臨而可以誠義感頃者六師初降百物無儲外扞凶徒內防危堞晝夜不息逮將五旬凍餒交侵死傷相枕畢命同力竟夷大艱良以陛下不厚其身不私其欲絶甘以同卒伍輟食以啖功勞無猛制而人不攜懷所感也無厚賞而人不怨悉所無也今者攻圍已解衣食已豐而謠讟方興軍情稍阻豈不以勇夫恆性嗜貨矜功其患難既與之同憂而好樂不與之同利苟異恬默能無怨咨此理之常固不足怪記曰財散則民聚財聚則民散豈非其殷鑒歟衆怒難任蓄怨終泄其患豈徒人散而已亦將慮有構姦鼓亂干紀而強取者焉夫國家作事以公共為心者人必樂而從之以私奉為心者人必咈而叛之故燕昭築金臺天下稱其賢殷紂作玉杯百代傳其惡蓋為人與為己殊也周文之囿百里時患其尚小齊宣之囿四十里時病其太大蓋同利與專利異也為人上者當辨察茲理灑濯其心奉三無私以一有衆人或不率於是用刑然則宣其利而禁其私天子所恃以理天下之具也捨此不務而壅利行私欲人無貪不可得已今茲二庫珍幣所歸不領度支是行私也不給經費非宣利也物情離怨不亦宜乎智者因危而建安明者矯失而成德以陛下天姿英聖儻加之見善必遷是將化蓄怨為銜恩反過差為至當促殄遺孽永垂鴻名易如轉規指顧可致然事有未可知者但在陛下行與否耳能則安否則危能則成德否則失道此乃必定之理也願陛下慎之惜之陛下誠能近想重圍之殷憂追戒平居之專欲器用取給不在過豐衣食所安必以分下凡在二庫貨賄盡令出賜有功坦然布懷與衆同欲是後納貢必歸有司每獲珍華先給軍賞王褱異纖麗一無上供推赤心於其腹中降殊恩於其望外將卒慕陛下必信之賞人思建功兆庶悅陛下改過之誠孰不歸德如此則亂必靖賊必平徐駕六龍旋復都邑興行墜典整緝棼綱乘輿有舊儀郡國有恆賦天子之貴豈當憂貧是乃散其小儲而成其大儲也損其小寶而固其大寶也舉一事而衆美具行之又何疑焉吝少失多廉賈不處溺近迷遠中人所非況乎大聖應機固當不俟終日不勝管窺願效之至謹陳冒以聞謹奏右冀寧奉宣聖旨緣國家賦稅多出江淮既未收復京城恐遠路傳説過甚所以欲得遣一大臣往彼宣慰以安遠近之情初欲簡擇此使並先共宰相商量皆云蕭復久任江外刺史諳彼事宜又就宰相之中名望最重令其往彼宣慰人必望風悅服其時蕭復亦自見此商議更無異同朕猶不能自斷遂喚諸朝士般次對見一一親向説宣慰之意問其穩便與否皆云至要並無異辭朕所以更不疑惑已與擇得發日及其臨行從一等却論奏欲得且留蕭復又頻有朝官上封事亦與從一等意同朕忽見此翻覆非常悵恨數日思量不測其故意者必是蕭復計會遣其論奏蕭復又有何事苦欲得住其意深不可會卿比來諳此人性行否兼與朕子細思料若不肯去其意何在者蕭復往年曾任常州刺史臣其時寄住常州首尾二年閲其理行及到京邑多與往來歲月滋深情意相得復之志性臣則備諳本是貴門又聯戚屬痛自修勵慕為清貞矯枉太深時或過當論經義則以守死善道執心不回為本議人物則以魏元忠宋璟為師己之所行皆欲盡善故涉好名之纍亦無應變之才用雖不周行則可保至如二三爽德翻覆挾姦復之為人必不至是安有親承計議退自變渝私誘官僚曲令干説是同兒戲非近人情雖甚狂愚猶應不敢若稍恭慎固當不為況乃見稱名流獲踐清貫備股肱之任承渥澤之私何心何顏忍至於此假令蕭復之意或欲逗留在於從一之徒寧肯附會臣緣自到行在常居禁中向外事情視聽都絶忽承顧問莫測端由陛下必欲研窮斯理不為難察初舉蕭復充使本是從一等商量後請蕭復不行又是從一等論奏一矛一楯理必有歸或遣或留意將安在但垂睿詰孰敢面謾蕭復若相屬求則從一等何容為隱從一等儻自回互則蕭復不當受疑陛下奚憚而不辨明乃直為此悵恨也夫明則罔惑辨則罔冤惑莫甚於逆詐而不與明冤莫痛於見疑而不獲辨是使情偽相糅忠邪靡分茲實居上御下之要樞惟陛下留意幸察謹奏袁高楊頊已上二人並曾任御史中丞裴諝曾任金吾將軍孫咸曾任京兆少尹周皓曾任丹延都團練觀察使裴胄曾任宣州刺史崔造殷亮李舟以上並任郎官何士幹姚南仲陸淳沈既濟已上曾任補闕拾遺右臣近因奏對言及任人陛下纍歎乏才惘然憂見於色臣退而思省且喜且慙所喜者樂陛下急於求賢明君致理之資也所慙者恥近侍不能薦士微臣竊位之罪也輒自揣擇思舉所知猶懼鑒識不明品藻非當反覆參校未果上聞昨蒙宣示中書進擬量移官令臣審看可否者因悟貶降之輩其中甚有可稱臣以素所諳知兼聞公議此狀之內僅得十人狀所不該又有三四或因連纍左黜或遭讒忌外遷互有行能咸著名迹置之清列皆謂良材若但準例量移及令仍舊出守固非陛下愛賢之意亦乖海內望理之心儻蒙特恩追赴行在試垂訪接必有可觀録用棄瑕既符德號振淹求舊亦闡大猷謹録薦陳庶備採擇其餘差序遠近並具別狀以聞謹奏右賊泚稽誅保聚宮苑勢窮援絶引日偷生懷光總仗順之師乘制勝之氣鼓行芟翦易若摧枯而乃寇奔不追師老不用諸帥每欲進取懷光輒沮其謀據茲事情殊不可解陛下意在全後委曲聽從觀其所為亦未知感若不別務規略漸相制持唯以姑息求安終恐變故難測此誠事機危迫之秋也固不可以尋常容易處之今李晟奏請移軍適遇臣銜命宣慰懷光偶論此事臣遂訊問所宜懷光乃云李晟既欲別行某亦都不要藉臣猶慮有翻覆因美其軍盛強懷光大自矜誇轉有輕晟之意臣又從容問云昨發行在之日未知有此商量今者從此却回或恐聖旨顧問事之可否決定何如懷光已肆輕言不可中變遂云恩命許去事亦無妨要約再三非不詳審雖欲追悔固難為辭伏望即以李晟表出付中書敕下依奏別賜懷光手詔示以移軍事由其手詔之大意云昨得李晟奏請移軍城東以分賊勢朕緣未知利害本欲委卿商量適會陸贄從彼宣慰回奏云見卿論敘軍情語及於此仍言許去事亦無妨遂敕本軍允其所請卿宜授以謀略分路夾攻務使叶齊克寸平寇孽如此則詞婉而直理順而明雖蓄異端何由起怨臣初奉使諭旨本緣糧賜不均偶屬移軍事相諧會又幸懷光詭對且無阻絶之言機宜合并若有幽贊一失其便後悔何追伏望聖聰速垂裁斷謹奏右懷光當管師徒足以獨制凶寇逗留未進抑有他由所患太強不資傍助比者又遣李晟李建徽楊惠元三節度之衆附麗其營無益成功秪足生事何則四軍接壘㣥帥異心論勢力則懸絶高卑據職名則不相統屬懷光輕晟等兵微位下而忿其制不從心晟等疑懷光養寇蓄姦而怨其事多淩已端居則互防飛謗欲戰則遞恐分功齟齬不和嫌釁遂構俾之同處必不兩全強者惡積而後亡弱者勢危而先覆覆亡之禍翹足可期舊寇未平新患方起憂歎危切實堪疚心太上消慝於未萌其次救失於始兆況乎事情已露禍難垂成委而不謀何以寧亂李晟見機慮變先請移軍就東建徽惠元勢轉孤弱為其吞噬理在必然他日雖有良圖亦恐不能自拔拯其危急唯在此時今因李晟願行便遣合軍同往託言晟兵素少慮為賊泚所邀藉此兩軍迭為犄角仍先諭旨密使促裝詔書至營即日進路懷光意雖不欲然亦計無所施是謂先聲一作人有奪人之心疾雷不及掩耳者也夫制軍馭將所貴見情離合疾徐各有宜適當離者合之則召亂當合者離之則寡功當疾而徐則失機當徐而疾則漏策得其要契其時然後舉無敗謀措無危勢今者屯兵而不肯為用聚將而罔能叶心自為鯨鯢變在朝夕留之不足以相制徒長厲階析之各競於擅能或建勳績事有必應斷無可疑解鬬不可以不離救焚不可以不疾理盡於此惟陛下圖之以前件事宜臣昨晚自行營回面奉進止以臣所商量許李晟移就城東灼然穩便但慮懷光不免悵望因此生詞轉難調息則不如不去令臣更審細思量奏來者臣以事機得失所繫安危千慮百思通夕忘寐誠以貪因循而不能矯失者終有大患處臲卼而不思出險者必無久安罄陳芻蕘惟所省擇謹奏右欽漵奉宣聖旨自發洋州已來纍路百姓進獻果子胡瓜等雖甚微細且有此心今擬各與散試官卿宜商量可否者伏以爵位者天下之公器而國之大柄也唯功勳才德所宜處之非此二途不在賞典恆宜慎惜理不可輕若輕用之則是壞其公器而失其大柄也器壞則人將不重柄失則國無所恃起端雖微流弊必大緣路所獻瓜果蓋是野人微情有之不足光聖猷無之不足虧至化量以錢帛為賜足彰行幸之恩因饋酬官恐非令典謹奏右欽漵齎中書所與進瓜果人擬官狀示臣仍奉宣聖旨朕所到處欲得人心喜悅試官虛名無損於事宰臣已商量進擬與亦無妨者臣愚以為信賞必罰霸王之資輕爵褻刑衰亂之漸信賞在功無不報必罰在罪無不懲非功而獲爵則爵輕非罪而肆刑則刑褻爵賞刑罰國之大綱一綱或棼萬目皆弛雖有善理末如之何天寶季年嬖幸傾國爵以情授賞以寵加天下蕩然紀綱始紊逆羯乘釁遂亂中原防戍歲增策勳日廣財賦不足以供賜而職官之賞興焉職員不足以容功而散試之號行焉青朱雜沓於胥徒金紫普施於輿皂薰蕕無辨涇渭不分二紀于茲莫之能整當今所病方在爵輕設法貴之猶恐不重若又自棄將何勸人聖旨以為試官虛名無損於事臣伏恐陛下思之未熟偶有是言儻或謂之信然臣竊以為過矣夫立國之道惟義與權誘人之方惟名與利名近虛而於教為重利近實而於德為輕凡所以裁是非立法制者則存乎其義至於參虛實揣輕重並行而不傷迭用而不悖因衆之欲度時之宜消息盈虛使人不倦者則存乎其權專實利而不濟之以虛名則耗匱而物力不給專虛名而不副之以實利則誕謾而人情不趨故國家之制賞典錫貨財賦秩廩所以彰實也差品列異服章所以飾虛也居上者必明其義達其變相須以為表裏使人日用而不知則為國之權得矣謹按命秩之載于甲令者有職事官焉有散官焉有勳官焉有爵號焉雖以類而分其流有四然其掌務而授俸者唯繫於職事之一官以序才能以位賢德此所謂施實利而寓之虛名者也其勳散爵號三者所繫大抵止於服色資蔭而已以馭崇貴以甄功勞此所謂假虛名以佐其實利者也虛實交相養故人不瀆賞輕重互相制故國不廢權今之員外試官頗同勳散爵號雖則授無費祿受不占員然而突銛鋒排患難者則以是賞之竭筋力展勤效者又以是酬之其為用也可謂重矣今或捧瓜一器挈果一盛亦授試官以酬所獻則彼突銛鋒而竭筋力者必相謂曰吾以忘軀命而獲官此以進瓜果而獲官是乃國家以吾之軀命同於瓜果矣瓜果草木也視人如草木誰復為用哉且員外試官無俸祿之資無攝管之柄無見敬之貴無免役之優唯假空名以籠浮俗浮俗所以若存若亡而未甚厭棄者徒以上之所惜耳今陛下若又輕用之以為無損於事人寤斯旨復何賴焉後之立功曷用為賞陛下若欲賞之以職事則官員有限而勳伐無窮固不勝其用矣陛下若欲賞之以貨財則人力已殫而帑藏皆匱固不充其費矣既未有實利以敦勸又不重虛名而濫施人無藉焉何以為國且植瓜樹果多是野人貧者所資唯在衣食假以冗號亦奚用焉必欲使之歡欣不如厚賞錢帛人不失利國不失權各得所宜兩全其寶何有不可顧傷大猷願留睿思更少詳度謹奏
