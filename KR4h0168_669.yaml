front:
  text: 全唐文欽定全唐文卷六百六十九白居易十四
  hash: sha256:37eaf8152efa64aaa61cd9cefeadb374a71f17e1df6a7bbf7563778cec8144e4
body:
  text: 右今日高品劉全節奉宣進旨以臣等在院覆策畢特加慰問并賜設及匹帛者臣等職在掌文詔令考策雖竭鄙昧猶懼闕遺豈意皇鑒下臨聖慈曲至惠加賜食榮及承筐寵厚縑緗仰難勝於元貺恩深醉飽退有愧於素飡徒積慙惶何酬慶賜右前件官比任海州刺史被本道節度使配諸州稅麥一例加估徵錢晏頻申奏恐損百姓本使稱用軍事切不得已而從之及被人論朝廷勘覆責不聞奏除削官階在法誠合舉行於晏即為獨屈况晏累為宰牧皆著良能清白公勤頗聞於衆自經停罷已涉三年退居洛陽窮餓至甚身典三郡家無一金據此清廉別堪優獎又建中初李正已與納連反汴河阻絕轉輸不通晏先父洧即正已堂弟為徐州刺史當叛亂之時洧以一郡七城歸國効順棄一家百口任賊誅夷開運路之咽喉斷凶渠之右臂遂使逆謀大挫妖寇竟消從此徐州埇橋至今永為內地如洧之子實可念之臣伏以洧之忠功不可忘晏之吏材不可棄伏希聖念量授一官庶使廉吏忠臣聞之有所激勸右件人隱居樂道獨行善身斂跡巿朝息機名利况家傳簪組兄在班行而楚獨棲山臥雲鍊氣絕粒滋味不接於口塵埃不染於心二十餘年不改其樂志齊箕潁節類顏原搢紳之間多所稱歎臣為尹正合具薦論雖飛鴻入冥自忘飲啄而白駒在谷亦貴縶維儻蒙寘彼周行縻之好爵降羔鴈之禮命助鵷鷺之羽儀足以厚貞退之風遏躁進之俗茲亦盛事有裨聖朝以前件謹具如前臣伏以念功振滯前王之令猷貢士推能長吏之本職其李晏韋楚等並居府界不踐公門臣實諳知輒敢論薦有涉塵黷無任兢惶謹具奏聞伏聽勅旨太和六年六月二十六日河南尹臣白居易狀奏右中使某奉宣聖旨賜臣等前件物等俯僂受賜竦躍荷恩天酒來以分甘御羞降而示惠臣等省躬知感因物言情寵過加籩懼多尸素之責榮同置醴慙無麥曲糵之功徒瀝丹誠豈酬元造右臣等材愧庸虛職叨輔弼遇天下削平之日當西戎即敘之時遂使殊方致茲遠物此皆率由元化感慕皇風人臣既絕外交問遺敢為己有今蒙重賜益荷聖慈况來自外夷知德廣之所及降從中旨仰恩深而不勝感戴慙惶倍萬常品伏蒙聖慈特加寵錫珍羞出於內府旨酒降於上尊捧戴歡榮不知所措臣久叨台鼎新忝節旄勤勞無展於股肱醉飽有慙於口腹伏以出從內廄行及中塗假飛龍之駿駒代跛鼈之蹇步執鞭拜命借馬喻身取其戀主之心以表為臣之節恩深易感情懇難陳竦踴之誠倍百㣥品詔賜累加慙惶交集寵來天上感動人間且金蘊其堅奉之而永貞王度刀宣其利操之而遠耀天威豈惟佩作身榮實可藏為家寶况臣望闕漸遠受恩轉多比堅而報國有時効死而殺身無地晉侯以驪姬之惑殺太子申生或謂申生得殺身成仁之道是以晉人諡為恭世子載在方冊古今以為然居易獨以為不然也大凡恭之義有三以孝保身子之恭以正承命臣之恭以道守嗣君之恭若棄嗣以非禮不可謂道受命於非義不可謂正殺身以非罪不可謂孝三者率非恭也申生有焉而諡曰恭不知其可若垂之來代以為訓戒居易懼後之臣子有失大義守小節者將奔走之將欲商搉敢徵義類在昔虞舜父頑母嚚舜既克諧瞽亦允若申生父之昏姬之惡誠宜率子道以幾諫感君心以至誠雖申生之孝不侔於舜而獻公之頑亦不逮於瞽盍以蒸蒸之乂俾不格於姦乎故咎之始形則齋栗祗載為虞舜可也若不能及禍之將兆則讓位去國為吳泰伯可也若又不能及難之將作則全身遠害為公子重耳可也三失無一得於是乎致身於不義不祗陷父於不德不慈負罪被名以至於死臣子之道不其惑歟夫以堯之聖書美曰允恭舜之孝書美曰溫恭今以申生之失道亦謂曰恭庸可稱乎周之衰也楚子以霸王之器奄有荊蠻光啟土宇赫赫楚國由之而興諡之為恭猶曰薄德今申生徇其死不顧其義輕其身不圖其君俾死之後弒三君殺十有五臣實啟禍先大亂晉國則楚恭之得也如彼申生之失也若此異德同諡無乃不可乎左氏修魯史受經於仲尼蓋仲尼之志邱明從而明之無善惡無大小莫不微婉而發揮焉至於申生之死也之諡也畧而無譏何其謬哉何以覈諸且仲尼修春秋明則有凡例幽則有微旨其有君不君臣不臣父不父子不子者率書名以貶之故書曰晉侯殺其太子申生不言晉人而書晉侯且名太子者蓋明晉侯不道且罪申生陷君父於不義也以微旨考之則仲尼明貶可知矣以凡例推之則左氏之闕文可知矣嗚呼先王之制諡豈容易哉善惡始終必襃貶於一字所以彰明往者勸阻來者故君子於其諡無所苟而已矣繇是而言則恭世子之諡不亦誣乎不亦誣乎問皇帝若曰朕觀古之王者受命君人兢兢業業承天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徵極諫而文學稍進匡時濟俗罔不率繇厥後相循有名無實而又設以科條增求茂異捨斥已之至言進無用之虛文指切著明罕稱於代茲朕所以嘆息鬱悼思索其真是用發懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間驩然相與子大夫得不勉思朕言而茂明之我國家光宅四海年將二百十聖宏化萬邦懷仁三王之禮靡不講六代之樂罔不舉浸澤於下升中於天周漢已還莫斯為盛自禍階漏壤兵宿中原生人困竭耗其大半農戰非古衣食罕儲念茲疲甿遠乖富庶督耕殖之業而人無戀本之心峻榷酤之科而下有重斂之困舉何方而可以復其盛用何道而可以濟其艱既往之失何者宜懲將來之虞何者當戒昔主父懲患於晁錯而用推恩夷吾致霸於齊桓而行寓令精求古人之意啟迪來哲之懷眷茲洽聞固所詳究又執契之道垂衣不言委之於下則人用其私專之於上則下無其效漢元優游於儒學盛業竟衰光武責課於公卿峻政非美二途取捨未獲所從余心浩然益所疑惑子大夫熟究其旨屬之於篇興自朕躬毋悼後害對臣聞漢文帝時賈誼上疏云可為痛哭者一可為流涕者二可為長太息者三是時漢興四十載萬方大理四海大和而賈誼非不見之所以過言者以為詞不切志不激則不能迴君聽感君心而發憤於至理也是以雖盛時也賈誼過言而無愧雖過言也文帝容之而不非故臣不失忠君不失聖書之史策以為美談然臣觀自茲以來天下之理未曾有髣髴於漢文帝時者激切之言又未有髣髴於賈誼疏者豈非君之明聖不侔於文帝乎臣之忠讜不逮於賈誼乎不然何衰亂之時愈多而切直之言愈少也今陛下思禹之昌言而拜之念漢之極諫而徵之廢虛文之無用者獎至言之斥已者詢臣以可行之策諭臣以不倦之意懇惻鬱悼發於至誠此真聖王思至理求過言之明旨也斯則陛下之道已宏於前代臣之才識劣於古人輒欲過言以裨陛下明德萬分之一也裨之者非敢謂言之必可行也體用之必可明也且欲使後代知陛下踐祚之後有樸直敢言之臣出焉無俾文帝賈誼專美於漢代然後退而俯伏以待罪戾焉臣誠所甘心也謹以過言昧死上對伏蒙陛下賜臣之策有思興禮樂之道念救疲甿之方辨懲往戒來之宜審推恩寓令之要至矣哉陛下之念及此實萬葉之福也豈惟一代之人受其賜而已哉臣聞疲病之作有因緣焉救療之方有次第焉臣請為陛下究因緣陳次第而言之臣聞太宗以神武之姿撥天下之亂元宗以聖文之德致天下之肥當二宗之時利無不興弊無不革遠無不服近無不和貞觀之功既成而大樂作焉雖六代之盡美無不舉也開元之理既定而盛禮興焉雖三王之明備無不講也禮行故上下輯睦樂達故內外和平所以兵偃而萬邦懷仁刑清而兆民自化動植之類咸煦嫗而自遂焉雖成康文景之理無以出於此矣洎天寶以降政教寖微寇既薦興兵亦繼起兵以遏寇寇生於兵兵寇相仍迨五十載財征由是而重人力由是而罷下無安心雖日督農桑之課而生業不固上無定費雖日峻管榷之法而歲計不充日削月朘以至於耗竭其半矣此臣所謂疲病之因緣者也豈不然乎由是觀之蓋人疲由乎稅重稅重由乎軍興軍興由乎寇生寇生由乎政缺然則未修政教而望寇戎之銷未銷寇戎而望兵革之息雖太宗不能也未銷兵革而求征徭之省未省征徭而求黎庶之安雖元宗不能也何則事有所必然雖常人足以致勢有所不可雖聖哲不能為伏惟陛下將欲安黎庶先念省征徭將欲省征徭先念息兵革將欲銷兵革先念銷寇戎將欲銷寇戎先念修政教何者若政教修則下無詐偽暴悖之心而寇戎所由銷矣寇戎銷則無興發攻守之役而兵革所由息矣兵革息則國無餽餉飛輓之費而征徭所由省矣征徭省則人無流亡轉徙之憂而黎庶所由安矣臣竊觀今天下之寇雖已盡銷伏願陛下不以易銷而自怠今天下之兵雖未盡散伏願陛下不以難散而自疑無自怠之心則政教日肅無自疑之意則誠信日明故政教肅則暴亂革心誠信明則獷鷙歸命革心則天下將萌之寇不遏而自銷歸命則天下已聚之兵不散而自息然後重斂可日減疲甿可日安富庶可日滋困竭可日補日安則和悅之氣積日富則廉讓之風形因其廉讓而示之以禮則禮易行矣乘其和悅而鼓之以樂則樂易達矣舉斯方而可以復其盛用斯道而可以濟其艱懲既徃之失莫先於誠不明而政不修戒將來之虞莫大乎寇不銷而兵不息此臣所謂救療之次第者也豈不然乎至若齊行寓令之法以霸諸侯漢用推恩之謀以懲七國施之今日臣恐非宜何者且今萬方一統四海一家無鄰國可傾非夷吾用權之秋也雖欲寓令令將何所寓耶今除國建郡置守罷侯無爵土可疏非主父矯弊之日也雖欲推恩恩將何所推耶但陛下嗣貞觀之功宏開元之理必將光二宗而福萬葉矣何區區齊漢之法而足為陛下所慕哉精究之端實在於此矣又蒙陛下賜臣之問有執契垂衣之道委下專上之宜敦儒學而業衰責課實而政失者此皆政化之所急古今之所疑陛下幸念之臣有以見天下之理興矣夫執契之道垂衣不言者蓋言已成之化非謀始之謂也委之於下者言王者之道庀其司分其務而已非謂政無大小悉委之於下也專之於上者言王者之道秉其樞執其要而已非謂事無巨細悉專之於上也漢元優游於儒學而盛業竟衰者非儒學之過也學之不得其道也光武責課於公卿而峻政非美者非考課之累也責之不得其要也臣請重為陛下別白而明之夫垂衣不言者豈不謂無為之道乎臣聞無為而理者其舜也歟舜之理道臣粗知之矣始則懋於修已勞於求賢明察其刑明慎其賞外序百揆內勤萬樞昃食宵衣念其不息之道夫如是豈非大有為者終則安於恭已逸於得賢明刑至於無刑明賞至於無賞百職不戒而舉萬事不勞而成端拱凝旒立於無過之地夫如是豈非真有為者乎故臣以為無為者非無所為也必先有為而後至於無為也老子曰無為而無不為蓋是謂矣夫委下而用私專上而無效者此由非所宜委而委之也非所宜專而專之也臣請以君臣之道明之臣聞上下異位君臣殊道蓋大者簡者君道也小者繁者臣道也臣道者百職小而衆萬事細而繁誠非人君一聰所能徧察一明所能周覽也故人君之道但擇其人而任之舉其要而執之而已矣昔九臣各掌其事而唐堯乘其功以帝天下十亂各効其能而周武總其理以王天下三傑各宣其力而漢兼其用以取天下此三君者不能為一焉但執要任人而已亦猶心之於四肢九竅百骸也不能為一焉然而寢食起居言語視聽皆以心為主也故臣以為君得君之道雖專之於上而下自有以展其効矣臣得臣之道雖委之於下而人亦無以用其私矣由此而言光武督責而政未甚美者非他昧君臣之道於小大繁簡之際也漢元優游而業以寖衰者非他昧無為之道於始終勞逸之間也二途得失較然可知陛下但舉中而行之則無所惑矣臣伏以聖策首言曰思賢能以濟其理求讜直以聞其過又曰上獲其益下輸其情其末章則又曰興自朕躬無悼後害此誠陛下思酌下言欲聞上失勤勤懇懇慮臣輩有所隱情者也臣敢不再竭狂直以副天心之萬一焉臣聞古先聖王之理也制欲於未萌除害於未兆故靜無敗事動有成功自非聖王則異於是莫不欲逞於始悔追於終政失於前功補於後利害之效可略而言且如軍暴而後戢之兵亂而後遏之善則善矣不若防其微杜其漸使不至於暴亂也官邪而後責之吏姦而後誅之懲則懲矣不若審其才得其人使不至於姦邪也人餒而後食之人凍而後衣之惠則惠矣不若輕其徭薄其稅使不至於凍餒也舉一知十不其然乎今陛下初嗣祖宗新臨蒸庶承多虞之運當鼎盛之年此誠制欲於未萌除害於未兆之時也伏惟陛下敬惜其時重慎其事既往者且追救於弊後將來者宜早防於事先夫然則保邦恒在於未危恭已常居於無過三五之道夫豈遠哉臣生也得為唐人當陛下臨御之時觀陛下昇平之始斯則臣朝聞而夕死足矣而况充才識之貢承體用之問者乎今所以極千慮昧萬死當盛時獻過言者此誠微臣喜朝聞甘夕死之志也不然何輕肆狂瞽不避斧鑕若此之容易焉伏惟少垂意而覽之則臣生死幸甚生死幸甚謹對問周禮庶人不畜者祭無牲不耕者祭無盛不蠶者不帛不績者不縗皆所以恥不勉抑游惰欲人務衣食之源也然為政之道當因人所利而利之故修其教不易其俗齊其政不易其宜由是農商工賈咸遂生業若驅彼齊人強以周索牲盛布帛必由已出無乃物力有限地宜不然而匱神廢禮誰曰非闕且使日中為巿貿遷有無者更何事焉對利用厚生教之本也從宜隨俗政之要也周禮云不畜無牲不田無盛不蠶不帛不績不縗蓋勸厚生之道也論語云因人所利而利之蓋明從宜之義也夫田畜蠶績四者土之所宜者多人之所務者衆故周禮舉而為條目且使居之者無游惰無墮業焉其餘非四者雖不具舉則隨土物生業而勸導之可知矣非謂使物易業土易宜也夫先王酌教本提政要莫先乎任土辨物簡能易從然後立為大中垂之不朽也若謂其驅天下之人責其所無強其所不能則何異夫求萍於中逵植橘於江北反地利違物性孰甚焉豈直易俗失宜匱神廢禮而已且聖人辨九土之宜別四人之業使各利其利焉各適其適焉猶懼生生之物不均也故日中為巿交易而退所以通貨食遷有無而後各得其所矣由是言之則大易致人之制周官勸人之典論語利人之利三科具舉有條而不紊矣謹對問書曰眚災肆赦又曰宥過無大而禮云執禁以齊衆不赦過若然豈為政以德不足恥格峻文必罰斯為禮乎詩稱既明且哲以保其身易稱利用安身以崇德也而語云無求生以害仁有殺身以成仁若然則明哲者不成仁歟殺身者非崇德歟對聖王以刑禮為大憂理亂繫焉君子以仁德為大寶死生一焉故邦有用禮而大理者有用刑而小康者古人有崇德而遠害者有蹈仁而守死者其指歸之義可得而知焉在乎聖王乘時君子行道也何者當其王道融人心質善者衆而不善者鮮一人不善衆人惡之故赦之可也所以表好生惡殺且臻乎仁壽之域矣而肆赦宥過之典由茲作焉及夫大道隱至德衰善者鮮而不善者衆一人不善衆人效之故赦之不可也所以明懲惡勸善且革澆漓之俗矣而執禁不赦之文由茲興焉此聖王所以隨時以立制順變而致理非謂德政之不若刑罰也然則君子之為君子者為能先其道後其身守其常則以道善乎身罹其變則不以其身害乎道故明哲保身亦道也巢許得之求仁殺身亦道也夷齊得之雖殊時異致同歸於一揆矣何以覈諸觀乎古聖賢之用心也苟守道而死死且不朽是非死也苟失道而生生而不仁是非生也向使夷齊生於唐虞之代安知不明哲保身歟巢許生於殷周之際安知不求仁殺身歟蓋否與泰各繫於時也生與死同歸於道也由斯而觀則非謂崇德者不為成仁殺身者不為明哲矣嗚呼聖王立教同出而異名君子行道百慮而一致亦猶水火之相戾同根於冥數共濟於人用也亦猶寒暑之相反同本於元氣共濟於歲功也則用刑措刑之道保身殺身之義昭昭然可知矣謹對問聖哲垂訓言微旨遠至於禮樂之同天地易簡之在乾坤考以何文徵於何象絕學無憂原伯魯豈其將落仁者不富公子荊曷云苟美朝陽之桐聿來鳳羽泮林之椹克變鴞音勝乃俟乎木雞巧必資乎瓦注咸所未悟庶聞其說對古先哲王之立彞訓也雖言微旨遠而學者苟能研精鉤深優柔而求之則壼奧旨趣將焉廋哉然則禮樂之同天地者其文可得而考也豈不以樂作於郊而天神和焉禮定於社而地祇同焉上下之大同大和由禮樂之馴致也易簡之在乾坤者其象可得而徵也豈不以乾以柔克而運四時不言而善應坤以陰步馬而生萬物不爭而善勝柔克不言之謂易陰隲不爭之謂簡簡易之道不其然乎老氏絕學無憂儆其溺於時俗之習也原伯魯不學將落戒其廢聖哲之道也孟子不富之說慮蘊利而生孽也公子荊苟美之言嘉安人而豐財也鳳鳴朝陽非梧桐而不棲擇木而集也鴞止泮林食桑椹而好音感物而變也事有躁而失靜而得者故木雞勝焉有貴而失賤而得者故瓦注巧焉雖去聖逾遠而大義斯存是故遠旨微言可明徵矣謹對問天地有常道日月有常度水火草木有常性皆不易之理也乃至鄒衍吹律而寒谷暖魯陽揮戈而暮景迴呂梁有出入之游周原變堇荼之味不測此何故也將以傳信乎抑亦傳疑乎對原夫元氣運而至精分三才立而萬物作惟天地日月暨水火草木度數情性各有其常其隨事應物而遷變者斯人之所感也何哉惟天地萬物父母惟人萬物之靈蓋天地無常心以人心為心苟能以最靈之心感善應之天地至誠之誠感無私之日月則必如影隨形響隨聲矣而况於水火草木乎故有吹律於寒谷和氣生焉揮戈於曜靈暮晷迴焉神合乎水游呂梁而出入不溺化被於草木周原而堇荼變味蓋品彙之生則守其常性也精誠之至則感而常通也靜守常性動隨常通是道可於物而非常於一道也夫如是則兩儀之道七曜之度萬物之性可察矣可信矣夫何疑焉謹對問紡績之弊出於女工桑麻不甚加而布帛日已賤蠶織者勞焉公議者知之欲乎價平其術安在又倉廩之實生於農畝人有餘則輕之不足則重之故歲一不登則種食多竭往年時雨愆候宸慈軫懷遣使振廩分官賤糶故得餒殍載活麥禾載登思我王度金玉至矣竊聞壽昌常平今古稱便國朝典制亦有斯倉開元之二十四年又於京城大置賤則加價收糴貴則終年出糶所以時無艱食亦無傷農今者若官司上聞追葺舊制以時斂散以均貴賤其於美利不亦多乎對人者邦之本也衣食者人之所由生也古者聖人在上而下不凍餒者非家衣而戶食之蓋能為之開衣食之源均財用之節也方今倉廩虛而農夫困布帛賤而女工勞以愚所闚粗知其本何者夫天地之數無常故歲一豐必一儉也衣食之生有限故物有盈則有縮也古之人知其必然也故敦儉嗇以足衣務儲蓄以足食是以禹有九年之水湯有七年之旱野無青草人無菜色者無他焉蓋勤儉儲積之所致耳故曰前事之不忘後事之元龜也當今將欲開美利利天下以厚生生蒸人返貞觀之昇平復開元之富壽莫善乎實倉廩均豐凶則耿壽昌之常平得其要矣今若升聞率修舊制上自京邑下及郡縣謹豆區以出納督官吏以監臨歲豐則貴糴以利農歲歉則賤糶以卹下若水旱作沴則資為九年之蓄若兵革或動則餽為三軍之糧可以均天時之豐儉權生物之盈縮修而行之實百代不易之道也虞災救弊利物寧邦莫斯甚焉然則布帛之賤者由錐刀之壅也苟粟麥足用泉貨流通則布帛之價輕重平矣抑居易聞短綆不可以汲深曲士不可以語道小子狂簡不知所以裁之莫究微言空慚下問謹對問禮記曰事君有犯無隱又曰為人臣者不顯諫然則不顯諫者有隱也無乃失事君之道乎無隱者顯諫也無乃失為臣之節乎語曰不知命無以為君子易曰樂天知命故不憂又語曰君子憂道不憂貧斯又憂道者非知命乎樂天不憂者非君子乎夫聖人立言皆有倫理雖前後上下若貫珠然今離之則可以旁行合之則不能同貫豈精義有二耶抑學者未達其微旨耶問大時不齊大信不約大白若辱大直若屈此四者先聖之格言後學之彞訓有國者酌之以行化也立身者踐之以修己也然則雷一發而蟄蟲蘇勾萌達霜一降而天地肅草木衰其為時也大矣斯豈不齊者乎日月代明而晝夜分刻漏者準之無杪忽之失焉春秋代謝而寒暑節律呂者候之無累黍之差焉其為信也大矣斯豈不約者乎堯讓天下而許由遁周有天下而伯夷餓其為白也大矣斯亦不辱者乎桀不道龍逢諫而死紂不道比干諫而死其為直也大矣斯豈不屈已者乎由是而觀有國者立身者惑之久矣衆君子試為辨之問大凡人之感於事則必動於情發於歎興於詠而後形於歌詩焉故聞蓼蕭之詠則知德澤被物也聞北風之刺則知威虐及人也聞廣袖高髻之謠則知風俗之奢蕩也古之君人者採之以補察其政經緯其人焉夫然則人情通而王澤流矣今有司欲請於上遣觀風之使復採詩之官俾無遠邇無美刺日採於下歲聞於上以副我一人憂萬人之旨識者以為何如問百官職田蓋古之稍食也國朝之制懸在有司兵興以還吏鮮克舉今稽其地籍則田亦具存計以戶租則數多散失至使內外官中有品秩等局署同而厚薄相懸不啻乎十倍斯者積弊之甚也得不思革之乎請陳所宜以救其失問穀帛者生於下也泉貨者操於上也必由均節以致厚生今田疇不加闢而菽粟之價日賤桑麻不加植而布帛之估日輕懋力者輕用而愈貧射利者賤收而愈富致使農人益困游手益繁矣然豈穀帛斂散之節失其宜乎將泉貨輕重之權不得其要乎今天子方策天下賢良政術之士親訪利病以活元元吾子若待問於王庭其將何辭以對
