body:
  text: 柳子讀古書覩直道守節者則壯之蓋有激也恆懼過而失中庸之義慕西門氏佩韋以戒故作是賦其辭曰邈豫生此下都兮塊天質之慤醇日月迭而化升兮遁初而枉神雕大素而生華兮汨末流以喪真晞往躅而周章兮懵倚伏其無垠世既奪豫之太和兮眷授豫以經常循聖人之通途兮鬱縱臾而不揚猶悉力而究陳兮獲貞則於典章嫉時以奮節兮憫已以抑志登嵩邱而垂目兮瞰中區之疆理橫萬里而極海兮頽風浩其四起恟驚怛而躑躅兮惡浮詐之相詭思貢忠於明后兮振教導乎遐軌紛吾守此狂狷兮懼執競而不柔探先哲之奧謨兮攀往列之洪休曰沈潛而剛克兮固讜人之嘉猷嗟行行而躓踣兮信往古之所仇彼穹壤之廓殊兮寒與暑而交修執中而俟命兮固仁聖之善謀吾祖士師之直道兮亦愀然於伐國尼父戮齊而誅卯兮本柔仁以作極藺竦顏以誚秦兮入降廉猶臣僕吉優繇而布和兮殘萑蒲以屏匿劌拔刃於霸侯兮退匑匑而畏服寬與猛其相濟兮孰不頌茲之盛德克明哲而保躬兮恢大雅之所勗陽宅身以執剛兮卒易師而蒙辜羽愎心以盩志兮首身離而不懲雲嶽嶽而專強兮果黜志而乖圖咸觸屏以拒訓兮肆殞越而就陵冶訐諫於昏朝兮名崩弛而陷誅苟縱直而不羈兮乃變罹而禍仍歷九折而直奔兮固摧轅而失途遵大路而曲轍兮又求達而不能廣守柔以允塞兮抵暴梁而壞節家撝謙而溫美兮脅子公而喪哲義師仁而惡狠兮遂潰騰而滅裂斯委懦以從邪兮悼上蔡其何補徐偃柔以屏義兮倏邦離而身虜桑宏和而卻武兮渙宗覆而國舉設任柔而自處兮蒙大戮而不悟故曰純柔純弱兮必削必薄純剛純強兮必喪必亡韜義於中服和於躬和以義宣剛以柔通守而不遷兮變而無窮交得其宜兮乃獲其終姑佩茲韋兮考古齊同亂曰韋之申申佩於躬兮本正生和探厥中兮哲人交修樂有終兮庶寡其過追古風兮昔有智人善學鴟夷鴟夷蒙鴻罍罃相追諂誘吉士喜悅依隨開喙倒腹斟酌更持味不苦口昏至莫知頽然縱傲與亂為期視白成黑顛倒妍媸已雖自售人或以危敗衆亡國流連不歸誰主斯罪鴟夷之為不知為瓶居井之眉鈎深挹潔淡泊是師和齊五味寧除渴饑不甘不壞久而莫遺清白可鑒終不媚私利澤廣大孰能去之綆絶身破何足怨咨功成事遂復於土泥歸根反初無慮無思何必巧曲徼覬一時子無我愚我智如斯若知牛乎牛之為物魁形巨首垂耳抱角毛革疏厚牟然而鳴黃鐘滿脰抵觸隆曦日耕百畝往來修直植乃禾黍自種自斂服箱以走輸入官倉已不適口富窮飽饑功用不有陷泥蹶塊常在草野人不慚愧利滿天下皮角見用肩尻莫保或穿緘縢或實俎豆由是觀之物無踰者不如羸驢服逐駑馬曲意隨勢不擇處所不耕不駕藿菽自與騰踏康莊出入輕舉喜則齊鼻怒則奮躑當道長鳴聞者驚辟善識門戶終身不惕牛雖有功於已何益命有好醜非若能力慎勿怨尤以受多福柳子既謫猶懼不勝其口筮以元遇干之八其贊曰赤舌燒城吐水於瓶其測曰君子解祟也喜而為之賦胡赫炎薰熇之烈火兮而生夫人之齒牙上殫飛而莫遁旁窮走而逾加九泉焦枯而四海滲涸兮紛揮霍而要遮風雷唬唬以為士冖䂞籥兮回祿煽怒而喊呀炖堪輿為甗兮雲漢而成霞鄧林大椿不足以充於燎兮倒扶桑落棠膠轕而相義膏搖脣而增熾兮焰掉舌而彌葩沃無瓶兮撲無篲金流玉鑠兮曾不自比於塵沙獨淒已而燠物愈騰沸而骹齒可吾懼夫灼爛灰滅之為禍往搜乎太元之奧訟衆正訴㣥邪曰去爾中躁與外撓姑務清為室而靜為家苟能是則始也汝邇今也汝遐涼汝者進烈汝者賒譬之猶豁天淵而覆原燎夫何長喙之紛拿今汝不知清己之慮而惡人之譁不知靜之為勝而動焉是嘉徒遑遑乎狂奔而西愫一作四索盛氣而長嗟不亦遼乎於是釋然自得以泠風濯熱以清源滌瑕履仁之實去盜之夸冠太清之元冕佩至道之瑤華鋪沖虛以為席駕恬泊以為車瀏乎以遊於萬物者始彼狙雌一作雄倏施而以祟為利者夫何為耶懲咎愆以本始兮孰非豫心之所求處卑污以閔世兮固前志之為尤始豫學而觀古兮怪今昔之異謀惟聰明為可考兮追駿步而遐遊潔誠之既信直兮仁友藹而萃之日施陳以繫縻兮邀堯舜與之為師上睢盱而混茫兮下駮詭而懷私旁羅列以交貫兮求大中之所宜曰道有象兮而無其形推變乘時兮與志相迎不及則殆兮過則失貞謹守而中兮與時偕行萬類藝藝兮率由以寧剛柔弛張兮出入綸經登能抑枉兮白黑濁清蹈乎大方兮物莫能嬰奉訏謨以植內兮欣余志之有獲再徵信乎策書兮謂炯然而不惑愚者果於自用兮惟懼夫誠之不一不顧慮以周圖兮專茲道以為服讒妒構而不戒兮猶斷斷於所執哀吾黨之不淑兮遭任遇之卒迫勢危疑而多詐兮逢天地之否隔欲圖退而保巳兮悼乖期乎曩昔欲操術以致忠兮衆呀然而互嚇進與退吾無歸兮甘脂潤乎鼎鑊幸皇鑒之明宥兮纍郡印而南適惟罪大而寵厚兮宜夫重仍乎禍謫既明懼乎天討兮又幽栗乎鬼責惶惶乎夜寐而晝駭兮類鹿君䴥之不息凌洞庭之洋洋兮泝湘流之沄沄飄風擊以揚波兮舟摧抑而回邅日霾曀以昧幽兮黝雲涌而上屯暮屑窣以淫雨兮聽嗷嗷之哀猿衆鳥萃而啾號兮沸洲渚以連山漂遙逐其詎止兮逝莫屬余之形魂攢巒奔以紆委兮束洶涌之奔湍畔尺進而尋退兮蕩回汨乎淪漣際窮冬而止居兮羈纍棼以縈纏哀吾生之孔艱兮循凱風之悲詩罪通天而降酷兮不殛死而生為逾再歲之寒暑兮猶貿貿而自持將沈淵而隕命兮詎蔽罪以塞禍惟滅身而無後兮顧前志猶未可進路呀以劃絶兮退伏匿又不果為孤囚以終世兮長拘攣而轗軻曩豫志之修蹇兮今何為此戾也夫豈貪食而盜名兮不混同於世也將顯身以直遂兮衆之所宜蔽也不擇言以危肆兮固㣥禍之際也御長轅之無橈兮行九折之峩峩卻驚棹以橫江兮泝凌天之騰波幸余死之已緩兮完形軀之既多苟餘齒之有懲兮蹈前烈而不頗死蠻夷固吾所兮雖顯寵其焉加配大中以為偶兮諒天命之謂何閔吾生之險厄兮紛喪志以逢尤氣沈鬱以杳渺兮涕浪浪而嘗流膏液竭而枯居兮魄離散而遠遊言不信而莫余白兮雖遑遑欲焉求合喙而隱志兮幽默以待盡為與世而斥謬兮固離披以顛隕騏驥之棄辱兮駑駘以為騁元虬蹶泥兮畏避蛙黽行不容之崢嶸兮質魁壘而無所隱鱗介槁以橫陸兮鴟嘯㣥而厲吻心沈抑以不舒兮形低摧而自愍肆余目於湘流兮望九嶷之垠垠波淫溢以不返兮蒼梧鬱其蜚雲重華幽而野死兮世莫得其僞真屈子之悁微兮抗危辭以赴淵古固有此極憤兮矧吾生之藐艱列往則以考已兮指斗極以自陳登高巖而企踵兮瞻故邦之殷轔山水浩以蔽虧兮路蓊勃以揚氛空廬頽而不理兮翳邱木之榛榛塊窮老以淪放兮匪魑魅吾誰鄰仲尼之不惑兮有垂訓之謨言孟軻四十乃始持心兮猶希勇乎黝賁顧余質愚而齒減兮宜觸禍以阽身知徙善而革非兮又何懼乎今之人噫禹績之勤備兮曾莫理夫茲川殷周之廓大兮南不盡夫衡山余囚楚越之交極兮邈離絶乎中原壤汙潦以墳洳兮蒸沸熱而恆昏戲鳧鸛乎中庭兮蒹葭生於堂筵雄虺蓄形於木杪兮短狐伺景於深淵仰矜危而俯栗兮弭日夜之拳攣慮吾生之莫保兮忝代德之元醇孰眇軀之敢愛兮竊有繼乎古先明神之不欺余兮庶激烈而有聞冀後害之無辱兮匪徒蓋乎曩愆罹擯斥以窘束兮豫惟夢之為歸精氣注以凝沍兮循舊鄉而顧懷夕豫寐於荒陬兮心慊慊而莫違質舒解以自恣兮息愔翳而愈微歘騰涌而上浮兮俄滉漾之無依圓方混而不形兮皓醇白之霏霏上茫茫而無星辰兮下不見夫水陸若有鉥豫以往路兮馭擬擬以回復浮雲縱以直度兮云濟豫乎西北風纚纚以經耳兮類行舟迅而不息洞然於以瀰漫兮虹霓羅列而傾側橫衝颷以蕩擊兮忽中斷而迷惑靈幽漠以瀄汨兮進怊悵而不得白日邈其中出兮陰霾披離以泮釋施嶽瀆以定位兮互參差之白黑忽崩騫上下兮聊桉行而自抑指故都以委墜兮瞰鄉閭之修直原田蕪穢兮崢嶸榛棘喬木摧解兮垣廬不飾山嵎嵎以巖立兮水汨汨以漂激魂恍惘若有亡兮涕汪浪以隕軾類曛黃之黭漠兮欲周流而無所極紛若喜而佁擬兮心回互以壅塞鐘鼓喤以戒旦兮陶去幽而開寤罾罻蒙其復體兮孰云桎梏之不固精誠之不可再兮豫無蹈夫歸路偉仲尼之聖德兮謂九夷之可居惟道大而無所入兮猶流遊乎曠野老聃遁而適戎兮指淳茫以縱步蒙莊之恢怪兮寓大鵬之遠去苟遠適之若茲兮胡為故國之為慕首邱之仁類兮斯君子之所譽鳥獸之鳴號兮有動心而曲顧膠豫衷之莫能捨兮雖判折而不悟列茲夢以三復兮極明昏而告訴楚越之郊環萬山兮勢騰涌夫波濤紛對回合仰伏以離迾兮若重墉之相褒爭生角逐上軼旁出兮其下坼裂而為壕欣下頽以就順兮曾不畝平而又高沓雲雨而漬厚土兮蒸鬱勃其腥臊陽不舒以擁隔兮㣥陰沍而為曹側耕危穫苟以食兮哀斯民之增勞積林麓以為叢棘兮虎豹咆㘚代狴牢之吠嘷豫胡井眢以管視兮窮坎險其焉逃顧幽昧之罪加兮雖聖猶病夫嗷嗷匪兕吾為柙兮匪豕吾為牢積十年莫吾省者兮增蔽吾以蓬蒿聖日以理兮賢日以進誰使吾山之囚吾兮滔滔景公夢疾膏肓尚謂虛假命秦緩以候問遂伏身一作俯伏於堂下公曰吾今形體不衰筋力未寡子言其有疾者何也秦緩乃窮神極思曰夫上醫療未萌之兆中醫攻有兆之著目定死生心存取舍亦猶卞和獻含璞之璧伯樂相有孕之馬然臣之遇疾如泥之處埏疾之遇臣如金之在冶雖九竅未擁四支且安膚腠營胃外強中乾精氣內傷神沮脈殫以熱益熱以寒益寒針灸不達誠死之端巫新麥以為讖果不得其所餐公曰固知天賦性命如彼暄寒短不足悲修不足歡哂彼醫兮徒精厥術如何為之可觀醫乃勃然變色攘袂而起子無讓我我謂於子我之技也如石投水如弦激矢視生則生視死則死膏肓之疾不救衰亡之國不理巨川將潰非捧土之能塞大厦將崩非一木之能止斯言足以喻大子今察乎孰是爰有忠臣聞之憤怨亡廢寢食劈摽感歎生死浩浩天地漫漫綏之則壽撓之則散善養命者鮐背鶴髮成童兒善輔弻者殷辛夏桀為周漢非藥曷以愈疾非兵胡以定亂喪亡之國在賢哲之所扶匡而忠義之心豈膏肓之所羈絆豫能理亡國之刓弊愈膏肓之患難君謂之何以醫曰夫八紘之外六合之中始自生靈及乎昆蟲神安則存神喪則終亦猶道之紊也患出於邪佞身之憊也疾生於火風彼膏肓之與顛覆匪藥石而能攻者哉因此而言曰豫今變禍為福易曲成直寧關天命在我人力以忠孝為干櫓以信義為封殖拯厥兆庶綏乎社稷一言而熒惑退舍一揮而羲和匪昃桑穀生庭而自滅野雉雊鼎而自息誠天地之無親曷膏肓之能極醫者遂口噤心醉局斂茫然投棄針石匍匐而前吾謂治國在天子謂治國在賢吾謂命不可續子謂命將可延詎知國不足理疾不足痊佐荒淫為聖主保夭壽而長年皆正直之是與庶將來之勉旃沙之為物兮視汙若浮金之為寶兮恥居下流沈其質兮五材或闕耀其光兮六府以修然則抱成器之珍必將有待當慎擇之日則又何求配圭璋而取貴豈泥滓而為儔披而擇之斯焉見寶蕩浸淫而顧盼指炫熀而探討動而愈出幽以即明涅而不緇既堅既好潛雖伏矣獲則取之翻混混之濁質見熠熠之殊姿久暗未彰固亦將君是望先迷後得孰謂棄豫如遺其隱也則雜昏昏淪浩浩晦英姿兮自保和光同塵兮合於至道其遇也則散奕奕動融融煥美質兮其中明道若昧兮契彼元同儻俯拾而不棄諒致美於無窮欲蓋而彰將炯爾而見素不索何獲遂昭然而發蒙觀其振拔汙塗積以錙銖碎清光而競出耀真一作直質而持殊錐處囊而纖光乍比劍拭土而異彩相符用之則行斯為美矣求而必得不亦悅乎豈獨媚旭日以晶熒帶長川之清淺皎如珠吐疑剖蚌之乍分粲若星繁似流雲之初卷是以周德思比而岐昌即詠陸文可侔而昭明是選若然者可以議披沙之所托明揀金之所裁良工何遠善價爰來拂以增光寧謝滿籯之學汰之愈朗詎慚擲地之才客有希采掇於求寶之際庶斯文之在哉惟饗帝以事天必推策而迎日寅方肇建俟啓蟄以展儀卯位將初爰用牲而協吉送烈烈之凝氣遵遲遲之陽律猶分可愛之輝式佇寅賓之質稽之虞典期匪疾而匪徐行以夏時契惟精而惟一職在馮相事傳小正符上春以備儀必修其始先仲春而有事故謂之迎時也淑景初延幽陽潛啓當四時之首位用三代之達禮探賾索隱得郊祀之元辰極往知來正邦家之大體事冠前古儀標後王皮辨乍臨土圭之影猶積泰壇既罷玉漏之聲漸長變熙熙之純曜流杲杲之晴光璧影始融麗景才一作欲凝於城闕輪形尚疾斜暉未駐於康莊是知迎長日之儀實王心之所共兆南郊之位乃陽事之所用故可以知上下之際見天人之交動浮光於俎豆散微照於包茅周流金石暉照陶匏異乎天紀不修秦伯尚矜其泰畤日官失職晉侯徒繼乎夏郊於以迎之則無違者委照將久豈三舍之足憑延光可期胡再中之云假自然應以繁祉錫之純嘏禮儀允洽於神人正朔克周於戎夏今我后再新古禮與天地相參應戩穀之宜受之千億奉郊祀之報至於再三然則迎長日恭祀事並虞夏而何慚異哉鼓之設也恢制度於天邑佐大禮於時行即行贊盛容而立之斯立觀其象可以守威儀之三千節其音可以表吉行之五十配和鸞以入用並司南而為急若乃郊薦之儀既陳封禪之禮攸執經千里而分寸可候度四方而禮容是集施五擊於華山之野知霧氣巳籠用百發乎南山之陽識雷聲所及先聖有作後王式遵啓元機以求舊運巧智而攸新相彼良工自殊昧道之士眷茲木偶應異迷途之人齊步武而無佚差遠近而有倫遵大路罔愆乎禮典聽希聲克正於時巡雖道有環回地分險易固善應而莫失諒知幾而有為載考載擊所辨於長亭短亭匪疾匪徐足分乎有智無智觀其妙矣孰測其微細觀其徼矣詎知其啓閉音不衰而得度響其鏜而有制於以翊龍御於以引天旋異銅渾之儀亦可敘紫微之星次殊玉漏之制而能步黃道之日躔周物之智斯設極深之機是研鄙繁音之坎坎陋促節之闐闐妙出人謀思由神假時然後擊贊賞典於今茲動惟其常契同文於古者由是皇衢以正帝道斯盛恭出震以成威膺御乾而啓聖我后得以昭文物展聲明不愆於素可舉而行宜乎騁墨妙呈筆精固敢先三雅而獻賦庶將開萬國之頌聲
