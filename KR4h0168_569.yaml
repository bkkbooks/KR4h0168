  text: 全唐文欽定全唐文卷五百六十九宗元字子厚河東人貞元九年進士又中博學宏詞科貞元十九年為監察御史裏行順宗朝擢禮部員外郎坐黨王叔文貶邵州刺史再貶永州司馬移柳州刺史元和十四年卒年四十七
