front:
  text: 全唐文欽定全唐文卷六百三十五李翺二
  hash: sha256:33393a52b9e9333aaca59296ea88930a2763792cb1ca17f7bc4f66c3285b5dae
body:
  text: 還示云於賢者汲汲惟公與不材耳此言取人得無太寬否灼然太寬夫又何疑此事汲汲如嗜欲之未得自以為勝荀令君耳目所及書記所載未見其比何意忽然當一時而更有人也故具於後以當講學且自道無愧兼以為戲耳如愚之於人但患識昏智不足以察人為纍耳苟以為賢則不要前人相知相識逢便見機巧有慧辨故身雖否塞而所進達者不為少矣其鑒賞稱頌人物初未甚信其後卒享盛名為賢士者故陸歙州韋簡州是也好善太疾智識未精彼勝於彼則因而進之或取文辭或以言論或以才行或以風標或以政術往往亦有不稱於前多矣不可以言其名然亦未嘗以為悔也其中亦有痛與置力後因禮節不足或因盡言而詰之前人既非賢良遂反相毀損者亦有其人矣且龐士元云拔十失五猶得其半真大賢之言也如鄙人無位於朝厄摧於時悽悽惶惶奔走恥辱求食不暇自一千年來賢士屈厄未見有如此者尚汲汲孜孜引薦賢俊如朝饑求飧如久曠思通如見妖麗而不得親然若使之有位於朝或如兄儕得志於時則天下當無屈人矣如或萬一有之若陸歙州韋簡州之比猶奔走在泥土則當引罪在已若狂若顛朝雖饑不敢求飧曠雖久不敢思通見妖麗閉眼而不觀視遷榮如鞭笞宮割之在躬夫又何榮樂而得安然也不知此心自古以來曾有人如是者否不知代有聖人排肩而生曾有一賢用心近於此者乎若古或有之幸示其人如或無之奈何乃言惟公與不材耳如兄者頗亦好賢必須甚有文辭兼能附己順我之欲則汲汲孜孜無所憂惜引拔之矣如或力不足則分食以食之無不至矣若有一賢人或不能然則將乞丐不暇安肯孜孜汲汲為之先後此秦漢間尚俠行義之一豪雋耳與鄙人似同而其實不同也三五日前京尹從叔云某大官甚知重陸汙當時對云士所貴人知者謂名未達則道之家之貧則恤之身之賤則進之故也若陸汙之賢章然矣某官之知既甚矣某官之位日見天子足以進人矣開幕辟士足以招賢矣而皆未及陸汙若如此之知知與不知果同也若實知乃反不如不知矣京尹不能對也大凡身當位得志於時慎閉口不可以言知人若知人而不能進志未得而氣恬體安不引罪在己若顛若狂與夫不知人者何以異也如離婁與瞽夫偕行而同墜溝中或以無目不見坑而墜或以心不在行憂思之病而墜所以墜則殊其所以為墜則同也天下如瞽者鮮則其墜者皆離婁也心不在焉故也樂道此者蓋以自勵非欲刺乎富貴之人當為再三讀之以代擊髀而歌焉某再拜足下書中有無怨懟以至疏索之說蓋是戲言然亦似未相悉也薦賢進能自是足下公事如不為之亦自是足下所闕在僕何苦乃至怨懟僕嘗怪董生大賢而著士不遇賦惜其自待不厚凡人之蓄道德才智於身以待時用蓋將以代天理物非為衣服飲食之鮮肥而為也董生道德備具武帝不用為相故漢德不如三代而生人受其憔悴於董生何苦而為士不遇之詞乎僕意緒間自待甚厚此身窮達豈關僕之貴賤耶雖終身如此固無恨也况年猶未甚老哉去年足下有相引薦意當時恐有所纍猶奉止不為何遽不相悉所以不數附書者一二年來往還多得官在京師既不能周遍又且無事性頗慵懶便一切畫斷祇作報書又以為苟相知固不在書之疏數如不相知尚何求而數書哉惟往還中有貧賤更不如僕者即數數附書耳近頻得人書皆責疏簡故具之於此見相怪者當為辭焉辱書覽所寄文章詞高理直歡悅無量有足發豫者自別足下來僕口不曾言文非不好也言無所益衆亦未信祇足以招謗忤物於道無明故不言也僕到越中得一官三年矣材能甚薄澤不被物月費官錢自度終無補益屢求罷去尚未得以為愧僕性不解諂佞生不能曲事權貴以故不得齒於朝廷而足下亦抱屈在外故略有所說凡古賢聖得位於時道行天下皆不著書以其事業存於制度足以自見故也其著書者蓋道德充積厄摧於時身卑處下澤不能潤物恥灰泯而燼滅又無聖人為之發明故假空言是非一代以傳無窮而自光耀於後故或往往有著書者僕近寫得唐書史官才薄言詞鄙淺不足以發明高祖太宗列聖明德使後之觀者文采不及周漢之書僕以為西漢十一帝高祖起布衣定天下豁達大度東漢所不及其餘惟文宣二帝為優自惠景以下亦不皆明於東漢明章兩帝而前漢事跡灼然傳在人口者以司馬遷班固叙述高簡之工故學者悅而習焉其讀之詳也足下讀范蔚宗漢書陳壽三國志王隱晉書生熟何如左邱明司馬遷班固書之溫習哉故溫習者事跡彰而罕讀者事跡晦讀之疏數在詞之高下理之必然也唐有天下聖明繼於周漢而史官敘事曾不如范蔚宗陳壽所為况足擬望左邱明司馬遷班固之文哉僕所以為恥當茲得於時者雖負作者之才其道既能被物則不肯著書矣僕竊不自度無位於朝幸有餘暇而詞句足以稱讚明盛紀一代功臣賢士行跡灼然可傳於後代自以為能不滅者不敢為讓故欲筆削國史成不刊之書用仲尼褒貶之心取天下公是公非以為本㣥黨之所謂為是者僕未必以為是㣥黨之所謂為非者僕未必以為非使僕書成而傳則富貴而功德不著者未必聲名於後貧賤而道德全者未必不烜赫於無窮韓退之所謂誅奸諛於既死發潛德之幽光是翺心也僕文采雖不足以希左邱明司馬子長足下視僕敘高愍女楊烈婦豈盡出班孟堅蔡伯喈之下耶仲尼有言曰不有博奕者乎為之猶賢乎已僕所為雖無益於人比之博奕猶為勝也足下以為何如哉古之賢聖當仁不讓於師仲尼則曰文王既沒文不在茲乎又曰子欲無言天何言哉孟子則曰吾之不遇魯侯天也臧氏之子安能使豫不遇乎司馬遷則曰成一家之言藏之名山以俟後聖人君子僕之不讓亦非大過也幸無怪某再拜某頓首足下不以某卑賤無所可乃陳詞屈慮先我以書且曰余之藝及心不能棄於時將求知者問誰可則皆曰其李君乎告足下者過也足下因而信之又過也果若來陳雖道德備具猶不足辱厚命况如某者多病少學其能以此堪足下所望博大而深宏者耶雖然盛意不可以不答故敢略陳其所聞蓋行己莫如恭自責莫如厚接衆莫如宏用心莫如直進道莫如勇受益莫如擇友好學莫如改過此聞之於師者也相人之術有三迫之以利而審其邪正設之以事而察其厚薄問之以謀而觀其智與不才賢不肖分矣此聞之於友者也列天地立君臣親父子別夫婦明長幼浹朋友六經之旨也浩浩乎若江海高乎若邱山赫乎若日火包乎若天地掇章稱詠津潤怪麗六經之詞也創意造言皆不相師故其讀春秋也如未嘗有詩也其讀詩也如未嘗有易也其讀易也如未嘗有書也其讀屈原莊周也如未嘗有六經也故義深則意遠意遠則理辨理辨則氣直氣直則辭盛辭盛則文工如山有恆華嵩衡焉其同者高也其草木之榮不必均也如瀆有淮濟河江焉其同者出源到海也其曲直淺深色黃白不必均也如百品之雜焉其同者飽於腹也其味鹹酸苦辛不必均也此因學而知者也此創意之大歸也天下之語文章有六說焉其尚異者則曰文章辭句奇險而已其好理者則曰文章敘意苟通而已其溺於時者則曰文章必當對其病於時者則曰文章不當對其愛難者則曰文章宜深不當易其愛易者則曰文章宜通不當難此皆情有所偏滯而不流未識文章之所主也義不深不至於理言不信不在於教勸而詞句怪麗者有之矣劇秦美新王褒僮約是也其理往往有是者而詞章不能工者有之矣劉氏人物表王氏中說俗傳太公家教是也古之人能極於工而已不知其詞之對與否易與難也詩曰憂心悄悄慍于㣥小此非對也又曰遘閔既多受侮不少此非不對也書曰朕堲讒說殄行震驚朕師詩曰菀彼柔桑其下侯旬捋采其劉瘼此下人此非易也書曰允恭克讓光被四表格于上下詩曰十畝之間兮桑者間間兮行與子旋兮此非難也學者不知其方而稱說云云如前所陳者非吾之敢聞也六經之後百家之言興老日冉列禦寇莊周鶡冠田穰苴孫武屈原宋玉孟子吳起商鞅墨翟鬼谷子荀况韓非李斯賈誼枚乘司馬遷相如劉向揚雄皆足以自成一家之文學者之所師歸也故義雖深理雖當詞不工者不成文宜不能傳也文理義三者兼并乃能獨立於一時而不泯滅於後代能必傳也仲尼曰言之無文行之不遠子貢曰文猶質也質猶文也虎豹之鞟猶犬羊之鞟此之謂也陸機曰怵他人之我先韓退之曰唯陳言之務去假令述笑哂之狀曰莞爾則論語言之矣曰啞啞則易言之矣曰粲然則穀梁子言之矣曰攸爾則班固言之矣曰囅然則左思言之矣吾復言之與前文何以異也此造言之大歸也吾所以不協於時而學古文者悅古人之行也悅古人之行者愛古人之道也故學其言不可以不行其行行其行不可以不重其道重其道不可以不循其禮古之人相接有等輕重有儀列於經傳皆可詳引如師之於門人則名之於朋友則字而不名稱之於師則雖朋友亦名之子曰吾與回言又曰參乎吾道一以貫之又曰若由也不得其死然是師之名門人驗也夫子於鄭兄事子産於齊兄事晏嬰平仲傳曰子謂子産有君子之道四焉又曰晏平仲善與人交子夏曰言游過矣子張曰子夏云何曾子曰堂堂乎張也是朋友字而不名驗也子貢曰賜也何敢望回又曰師與商也孰賢子游曰有淡臺滅明者行不由徑是稱於師雖朋友亦名驗也孟子曰天下之達尊三德爵年惡得有其一以慢其二哉足下之書曰韋君詞楊君潛足下之德與二君未知先後也而足下齒幼而位卑而皆名之傳曰吾見其與先生並行非求益者欲速成也竊懼足下不思乃陷於此韋踐之與翺書亟敘足下之善故敢盡辭以復足下之厚意計必不以為犯某頓首凡居上位之人皆勇於進而懦於退但見已道之行不見己道之塞日度一日以至於黜退奄至而終不能先自為謀者前後皆是也閣下居位三年矣其所合於人情者不少其所乖於物議者亦已多姦邪登用而不知知而不能去柳泌為刺史疏而不止韓潮州直諫貶責諍而不得道路之人咸曰焉用彼相矣閣下尚自恕以為猶可以輔政太平雖枉尺猶能直尋較吾所得者不啻補其所失何足遽自為去就也竊怪閣下能容忍亦已甚矣昨日來高枕不寐靜為閣下思之豈有宰相上三疏而止一邪人而終不信閣下天資畏慎又不能顯辨其事忍恥署勑內愧私歎又將自恕曰吾道尚行吾言尚信我果為賢相矣我若引退則誰能輔太平耶是又不可之甚也當貞觀之初房杜為相以為非房杜則不可也開元之初姚宋為相以為非姚宋則不可也房杜姚宋之不為相亦已久矣中書未嘗無宰相然則果何必於房杜姚宋况道不行雖臯陶伊尹將何為也房杜姚宋誠賢也若道不行言不信其心所謂賢者終不敢不進其心所謂邪者終不敢不辨而許敬宗李義府同列用事言信道行又自度智力必不足以排之矣則將自引而止乎將坐而待黜退乎尚自恕苟安於位乎以閣下之明度之當可知矣凡慮己事則不明斷他人事則明已私而他人公勇易斷也承閣下厚知受獎擢者不少能受閣下德而獻盡言者未必多人幸蒙以國士見目十五年餘矣但欲自竭其分耳聽與怪在閣下裁之而已三兩日來皆傳閣下以淄青未平又請東討雖非指的或慮未實萬一者有之只可先事而言豈得後而有悔且如房杜姚宋時政大耀而無武功郭汾陽二李太尉立大勳而不當國政閣下以舍人使魏博六州之地歸矣自秉大政兵誅蔡州久而不克奉命宣慰未經時而吳元濟生擒矣使一布衣持書涉河而王承宗恐懼委命割地以獻矣自武德以來宰相居廟堂而成就功業者未有其比是宜以功成身退養德善守為意奈何如始進之士汲汲於功名復欲出征以速平寇賊之為事耶自秦漢以來亦未嘗有立大功而不知止能保其終者即韓侍中親率重兵以壓境矣田司空深入賊地以立功矣凡人之情亦各欲成功在己惟恐居下顧宰相銜命領三數書生指麾來臨坐而享其功名奪人之功不可一也功高不賞不可二也兵者危道萬一旬月不即如志是坐棄前勞不可三也凡三事昭灼易見豈或事在於己而云未熟耶伏望試以狂言訪於所知之厚者意切辭盡不暇文飾伏惟少賜省察翺再拜前嶺南節度判官試大理司直兼殿中侍御史韋詞處士石洪原注明經出身十五年前曾任冀州糾前宣歙來石軍判官試太常寺協律郎路隨江西觀察推官試祕書郎獨孤朗右三人先以論薦一人繼此咨陳如韋之才能無方忠厚可保翺與南中共更外患始終若一此人先為一二暗人之所排詆聞宰相惑於流言都無意拔用如此才能豈患不達適足以厚其資耳石洪之賢優於李渤身遁而道光材長而器厚若在班列必有殊跡如路隨首以父在蕃中未敢昏娶年六度矣不畜僕妾居處常如在喪雖曾閔復生何以加此其見解高明事悉相類獨孤朗人物材能不後韓休起居比以伯父年高罷舉歸侍遂伯父之身豈非厚於孝而薄於名者耶凡此四人材能行義超越流輩自二年來閲除書采擢後進多矣未見勝之者或隔以浮言或限以資敘賢者自處而不求苟進在上者無超異之心因循而不用則馮唐白首董生不遇何足怪哉翺以為宰物之心患時無賢能可以推引未聞其以資敘流言而蔽之也天下至大非一材之所能支任重道遠非徇讒狠之心所能將明也嗟夫翺之說未必果信於兄兄之言亦未盡行於時雖殷勤發明何有成益但知而不告則負於中心耳月日鄉貢進士李翺再拜前者以所著文章獻於閣下纍獲咨嗟勤勤不忘翺率性多感激每讀古賢書有稱譽薦進後學之士則未嘗不遙想其人若與神交太息悲歌夜而復明何獨樂已往之事哉誠竊自悲也臨空文尚慨慕如不足况親遇厥事觀厥人哉幸甚幸甚翺自屬文求舉有司不獲者三栖遑往來困苦饑寒踣而未能奮飛者誠有說也竊惟當茲之士立行光明可以為後生之所依歸者不過十人焉其五六人則本無勸誘人之心雖有卓犖奇怪之賢固不可得而知也其餘則雖或知之欲為之薦言於人又恐人之不我信因人之所不信復生疑而不自信自信且猶不固矧曰能知人之固是以再往見之或不如其初三往見之又不如其再若張燕公之於房太尉獨孤常州之於梁補闕者訖不見一人焉夫如是則非獨後進者學淺詞陋之罪也抑亦先達稱譽薦進之道有所不至也孔子曰舉爾所知古君子於人之善懼不能知既知之恥不能舉之能舉之恥不能成之若翺者窮賤朴訥無所取然既為閣下之所知敢不以古君子之道有望於閣下哉不宣翺載拜李觀之文章如此官止於太子校書郎年止於二十九雖有名於時俗其卒深知其至者果誰哉信乎天地鬼神之無情於善人而不罰罪也甚矣為善者將安所歸乎翺書其人贈於兄贈於兄蓋思君子之知我也豫與觀平生不得相往來及其死也則見其文嘗謂使李觀若永年則不遠於揚子雲矣書己之文次忽然若觀之文亦見知於君也故書苦雨賦綴於前當下筆時復得詠其文則觀也雖不永年亦不甚遠於揚子雲矣書苦雨之辭既又思我友韓愈非茲世之文古之文也非茲世之人古之人也其詞與其意適則孟子既沒亦不見有過於斯者當其下筆時如他人疾書寫之誦其文不是過也其詞乃能如此嘗書其一章曰獲麟解其他可以類知也窮愁不能無所述適有書寄弟正辭及其終亦自覺不甚下尋常之所為者亦書以贈焉亦惟讀觀愈之辭冀一詳焉翺再拜足下復書來會與一二友生飲酒甚樂故不果以時報三讀足下書感歎不能休非足下之愛我甚且欲吾身在而吾道光明也則何能開難出之辭如此之無憂乎前書所以不受足下之說而復闢之者將以明吾道也吾之道非一家之道是古聖人所由之道也吾之道塞則君子之道消矣吾之道明則堯舜文武孔子之道未絶於地矣前書若與足下混然同辭是宮商之一其聲音也道何由而明哉吾故拒足下之辭知足下必將憤豫而復其辭也足下再三教我適時以行道所謂時也者乃仁義之時乎將浮沈之時乎苟仁且義則吾之道何所屈焉爾如順浮沈之時則必乘波隨一無此二字流望風而高下焉若如此雖足下之見我且不識矣况天下之人乎不修吾道而取容焉其志亦不遐矣故君子非仁與義則無所為也如有一朝之患古君子則不患也吾之道學孔子者也孔子尚畏於匡圍於蒲伐樹於桓魋逐於魯絶糧於陳蔡之間夫孔子豈不知屈伸之道耶故賢不肖在我者也富與貴貧與賤道之行否則有命焉君子正己而須之爾雖聖人不能取其容焉故孔子謂子路子貢曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子路對曰意者吾未仁且智耶而人之不我信與行也子曰有是乎使仁者而必信安有伯夷叔齊使智者而必行安有王子比干子貢對曰夫子之道至大故天下莫能容盍少貶夫子之道子曰良農能稼而不能為穡良工能巧而不能為順君子能修其道綱而紀之統而理之而不能為容爾不修道而求為容賜也而志不遠矣謂顏淵如謂由也賜也顏淵對曰夫子之道至大故天下莫能容雖然推而行之不容何病夫道之不修也是吾醜也夫道既已大修而世不用是有國者之醜也不容何病不容然後見君子孔子蓋歎之也以孔子門人三千其聖德如彼之至也而知孔子者獨顏回爾其學焉而不能到者也然則僕之道天下人安能信而行耶足下之言曰西伯孔子何等人也皆以柔氣污辭同用明夷也以避禍患斯人豈浮世邪人乎西伯聖人也羑里之拘僅不免焉孔子聖人之大者也其屈厄如前所陳惡在其能取容於世乎故曰危行言遜所以遠害也其道則爾其能遠之與否而必容焉則吾不敢知也非吾獨爾孔子亦不知也僕之道窮則樂仁義而安之也如用焉則推而行之於天下者也何獨天下哉將後世之人大有得於吾之功者爾天之生我也亦必有意矣將欲愚生民之視聽乎則吾將病而死尚何能伸其道也如欲生民有所聞乎則吾何敢辭也然則吾道之行與否皆運也吾不能自知也天下人安能害於我哉足下又曰吾子夷齊之道也如僕向者所陳亦足以免矣故不復有所說若韓孟與吾子之於我親故知我者也苟異口同辭皆如足下所說是僕於天下衆多之人而未有一知已也安能合於吾心乎吾非不信子之云云者也信子則於吾道不光矣欲默默則道無所傳云爾子之道子宜自行之者也勿以誨我翺再拜齊桓公不疑於其臣管夷吾信而霸天下攘夷狄匡周室亡國存荊楚服諸侯無不至焉豎刁易牙信而國亂身死不葬五公子爭立兄弟相及者數世桓公之信於其臣一道也所信者得其人則德格於天地功及於後代不得其人則不能免其身知人不易也豈惟霸者為然雖聖人亦不能免焉帝堯之時賢不肖皆立於朝堯能知舜於是乎放歡兜流共工殛鯀竄三苗舉禹稷臯陶二十有二人加諸上位故堯崩三載四海遏密八音後代之人皆謂之帝堯焉向使堯不能知舜而遂尊歡兜共工之黨於朝禹稷臯陶之下二十有二人不能用則堯將不得為齊桓公矣豈復得曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉者哉春秋曰夏滅項孰滅之蓋齊滅之曷為不言齊滅之為桓公諱也春秋為賢者諱此滅人之國何賢爾君子之惡惡也嫉始善善也樂終桓公嘗有繼絶存亡之功故君子為之諱也繼絶存亡賢者之事也管夷吾用所以能繼絶世存亡國焉爾豎刁易牙則不能也向使桓公始不用管夷吾末有豎刁易牙爭權不葬而亂齊國則幽厲之諸侯也始用賢而終身諱其惡君子之樂用賢也如此始不用賢以及其終而幸後世之掩其過也則微矣然則居上位流德澤於百姓者何所勞乎勞於擇賢得其人措諸上使天下皆化之焉而已矣茲天子之大臣有土千里者孰有如執事之好賢不倦者焉蓋得其人亦多矣其所可求而不取者則有人焉隴西李觀奇士也伏聞執事知其賢將用之未及而觀病死昌黎韓愈得古人之遺風明於理亂根本之所由伏聞執事又知其賢將用之未及而愈為宣武軍節度使之所用觀愈皆豪傑之士也如此人不時出觀自古天下亦有數百年無如其人者焉執事皆得而知之皆不得而用之翺實為執事惜焉豈惟翺一人而已後之讀前載者亦必多為執事惜之矣茲有平昌孟郊貞士也伏聞執事舊知之郊為五言詩自前漢李都尉蘇屬國及建安諸子南朝二謝郊能兼其體而有之李觀薦郊於梁肅補闕書曰郊之五言其有高處在古無上其有平處下顧二謝韓愈送郊詩曰作詩三百首杳默咸池音彼二子皆知言者豈欺天下之人哉郊窮餓不得安養其親周天下無所遇作詩曰食薺腸亦苦強歌聲無歡出門如有閡誰謂天地寬其窮也甚矣又有張籍李景儉者皆奇士也未聞閣下知之凡賢人奇士皆自有所負不苟合於世是以雖見之難得而知也見而不能知其賢如勿見而已矣知其賢而不能用如勿知其賢而已矣用而不能盡其材如勿用而巳矣能盡其材而容讒人之所間者如勿盡其材而已矣故見賢而能知知而能用用而能盡其材而不容讒人之所間者天下一人而已矣茲有二人焉皆來其一賢士也其一常常之人也待之禮貌不加隆焉則賢者行而常常之人日來矣况其待常常之人加厚則善人何求而來哉孔子曰吾未見好德如好色者聖人不好色而好德者也雖好德而不如好色者次也德與色均好之又其次也雖好德而不如好色者下也最甚不好德而好色者窮矣有人告曰某所有女國色也天下之人必將極其力而求之而無所愛矣有人告曰某所有人國士也天下之人則不能一往而見焉是豈非不好德而好色者乎賢者則宜有以別於天下之人矣孔子述易定禮樂刪詩序書作春秋聖人也奮乎百世之上其所化之者非其道則夷狄之人也而孔子之廟存焉雖賢者亦不能日往拜之以其益於人者寡矣故無益於人雖孔子之廟尚不能朝夕而事焉况天下之人乎有待於人而不能禮善人良士則不如無待也嗚呼人之降年不可與期郊將為他人之所得而大有立於世與其短命而死皆不可知也二者卒然有一於郊之身他日為執事惜之不可既矣執事終不得而用之矣雖恨之亦無可奈何矣翺窮賤人也直辭無讓非所宜至於此者也為道之存焉耳不直則不足以伸道也非好多言者也翺再拜翺自十五已後即有志於仁義見孔子之論高弟未嘗不以及物為首克伐怨欲不行未得為仁管仲不死子糾復相為讐而功及天下則曰如其仁曰由也果賜也達求也藝於從政乎何有然則聖賢之於百姓皆如視其子教之仁父母之道也未嘗不及於衆焉近代已來俗尚文字為學者以鈔集為科第之資曷嘗知不遷怒不二過為典學之根乎入仕者以容和為貴富之路曷嘗以仁義博施之為本乎由是經之旨棄而不求聖人之心外而不講幹辦者為良吏適時者為通賢仁義教育之風於是乎掃地而盡矣生人困窮不亦宜乎州郡之亂又何怪焉竊嘗病此以故為官不敢苟求舊例必探察源本以恤養為心以戢豪吏為務以法令自檢以知足自居利於物者無不為利於私者無不誚比之時輩亦知頗異思齊古人則十曾未及其一二為恨耳自到有改易條上者亦有細碎侵物彰從前之失太深不令條上者縱未窮盡亦十去其九矣惟三兩事即須使司處置已有申上者未蒙裁下謹具公狀若或並賜處分則當州里無弊矣蓋古人屈於不知己而伸於知己翺不肖既已謬蒙十一叔知獎如此其又何敢不言翺再拜
