body:
  text: 皇帝在位十五載西人獻異龜於王庭匪青黑以飾體特潔白而成形融彩可嘉且不溷於五色呈祥有異詎止齊乎四靈蓋以我皇行化無外止戈偃武人綏道泰升至德於元穹降殊祥於神蔡且夫龜者稟先知之異白者表司殺之方豈天意興威於有截俾臣下受命而無將西土是生實西方而主義被甲以至猶帶甲以來王不然何以白愛純容皎素甲皓霜華而浹洽炯玉質輝金精凝雪彩之清貞泳靈沼而冰靜息泰階之砥平足使孟津之鱗恥捷乎素鬣越裳之雉羞奮於翹英矧乎稟殊姿體異貌陋三足之為美匪六眸以是效其用也或協聖人之心其動也克符智者之樂然後知戲朝之虎不足徵銜鈎之狼不足神彼駒來思徒稱皎皎爾獸至止虛擅諄諄未若茲瑞德無與鄰應天之命昭王之仁非櫝中之毀棄不蓮上以因循將順乃元穹以呈其貺曷思乎綠水而返其身則彼寧王有遺元緒又安得而比倫嚮非我皇從道不咈必將混於介族詎得分為理物宜乎冠異紀首靈篇且無使其湮鬱惟漢德之雍熙俾遐荒兮肅祗布澤所治致遠人之樂只任土必貢奉良馬以來思殊乎皎皎陋乃騤騤翼八鑾以御矣齊四牡以維之由是朝發於窮邊夕獻於君所倏追風以掣電邈千里兮一舉仰騄驥之居周鄙驌驦之在楚故將進薦於象魏庶得超遙於苑圉帝曰斯馬爾其還與旅獒之訓今則皎如歸獸之義寧當忽諸矧乃乖乎法駕而不合於乘輿且帝之御也厥儀惟舊帝之動也其道惟守驅千乘以啟前羅萬騎以居後分青旌兮在左揚素旆兮在右儼五路以居中矯六龍以齊首龢鑾是響將節乃疾徐次舍有期豈宜乎奔走蓋順之而可信違之而則不雖千里兮足珍於一人兮何有矧乃場苗既食馬政攸班間以赤兔兼之白馬間叶圖之駒伏皁稱德之驥在閑足以驅馳於九域之內足以巡狩於六合之間宜乎旋爾故鄉歸於舊壤超乎半漢適彼莽蒼庶逐北風之思卻從東道之上俾得交頸裔土翹足荒陬克全真性有歸㣥休同越地之放象似桃林之罷牛豈比驊騮卒見羈於造父寧同屈產終服御於晉侯是知漢文之德彌尊歸馬之猷克中示後之立國者盡規矩之以郤遠方之貢囊之為物也虛受而無遺錐之為器也利用而攸資彼式處焉必將勁而出矣此乃柔止安得固而藏之遂得耀穎於紉縫之處呈銛於挫銳之時諒遏之兮不可非剛克兮何其炯炯乎從革之資纖纖乎徑寸之質露微鋩以外見透虛囊而首出方同人之處晦靜以求伸比達士之奮奇物莫能屈既藏身於不固寧脫穎之無必觀其觸之必徹指之必穿方將動而愈出孰曰鑽之彌堅所以趙氏克明因之而興喻毛生不讓比之而自賢信立德而法矣誠有待而言焉且賢之在代也或默或語猶錐之在囊也或出或處囊雖固兮錐必自分代雖溷兮賢罔同㣥豈比夫不銳者載繁載考而莫出不善者四十五十而無聞是以匪無思乎指地將有望於決雲吐穎呈鋒磨礪而自我投奇擢異提攜而在君嗟乎道之將行也必有用我者彼賢未達雖執鞭而尚從我道有庸寧補履而為下向使無銛鍔之珍為鉛刀之倫縮勁挺於囊士冖䂞受頑鈍於陶鈞復何異怳忽之內物鴟夷之中人君子曰是事也可以為鑒戒可以明進退豈獨美於一時蓋垂規於百代心為靈府樂有正聲感通而調暢之理自得訢合而邪僻之慮不生翕如冥契混若化成孕和平於德宇保純粹於元精故先王立極受命制民作則修匏土革木之器備干戚羽旄之飾將以悅萬人康四國動蕩其心志推移於道德薰然而煦日以和悠爾而躋之壽域成文不亂知至樂之有融從律弗奸見王道之甚直聲之所感性罔不悛致和易於無象禁奸邪於未然希夷自適鬱結攸宣苟斯須之不去何嗜欲之能遷况乎大樂同和至音交暢聽寂寞而何求視窅冥而無狀將欲革驕志以純仁化貪心為貞諒在乎思不惑兮心不流安至樂兮優而柔順至性之蕩蕩符大道之油油純如皦如足養浩然之氣融融洩洩寧抱悄爾之憂是知以德音為音則合於仁義以淫樂為樂則比於慢易咸濩作而理亦隨之鄭衞興而時乃殆而信至化之所繫實和樂之攸資是以重華明兮簫韶若此獨夫靡兮顛沛若彼忘味興嘆於宣尼觀風見稱於季子則知樂之為用也不獨逞煩手讙俚耳正心術而導淳源非聽其鏗鏘而已樂之為樂也布五氣和八風政之為大也包有截被無窮雖尋源泝異而致用是同故政行而樂作而樂在其中是以重華昭昭兮簫韶若此獨夫靡靡兮顛沛如彼鄭衞作而濮上慄焉絃歌聞而武城樂只故為政之善否實由樂之張弛惟審樂之大義其梗概也如是若乃終始類四維廣大象八區成質文於五色齊宥密於三無奏宮而君位斯合動商而臣道克符角之鳴人斯度矣徵之應事而形乎理方元氣政亦陰敷彼師曠傾耳而在晉季札發跡而在吳惟樂之道也蓋精微於此乎不然何以深聽密察善惡凶札寂慮居安靜志遐觀故將亡之音哀以思至理之感柔而寬是故君子審音以知樂存亡必見乎未兆理亂亦在乎先覺其道亂也噍殺作而嘽慢興其世理也乘麒麟而棲鸑鷟則是政之所以樂亦依於苟聽五聲以悖矣諒八音而忽諸方今九功已成八佾斯舞鼓虙羲之琴瑟植虞舜之干羽故能仁洽道廣澤融德溥聽之忘味殊三月之在齊化之式臧寧一變而至魯客有作樂之賦者將含容於上古天配五色惟春也蒼然地孕萬物惟玉也堅焉玉可久持故君子比德於玉蒼實正色蓋聖人形象於天歲既陽止色其著矣東方木德之令蒼本靈威之紀順其色繄象服是宜飾其容信以蒼為美晶熒兮其瑩如碧追琢兮其平如砥實同法服不敢違於先王有異象環獨見用於孔子若乃太史告立春之期天子迎東郊之時映乎元冕節以采茨碧若生芻之色肅乎出藍之姿縈垂組而溫潤澤矣繫衝牙而左右流之質且異珪終乃磨之無玷色雖匪白誰謂而不緇故能間五玉先四服混元冕曜黃屋微白虹之皎潔對蒼龍以照燭豈非哲匠之所逢他山之所攻采此溫如之質擇其善者而從得佩之服之於此琢之磨之於彼齊蒼璧之獲薦異白玉之見毀色膺時用寧侔純漆之元彩非染成詎比奪朱之紫矧乎四氣莫先乎春陽五位莫首乎東方九有具瞻其尊也帝皇萬物咸賴其大也穹蒼我乃應春氣之德順陽和之則為帝者之行節候穹蒼之正色叢四美而具宣冠㣥玉之攸克所以標嘉名於時令宜乎哉垂楷模之無極濛贈太子少傅均子德宗朝為中書舍人達萬類者莫尚於和氣鬱萬類者莫極於幽情故登臺而豁望得寓目於春榮高臨乎雙闕迥出乎重城洞千門而拂曙披九陌於初晴雲當軒而氣潤風溢檻而光清陰始分而土膏起陽已動而泉脈生縹緲九層之端希微四達之眺春馭興而搖裔興牽春而窈窕鶬鶊來於東野鴻鴈去於南津愛烟霞而改舊嘉草樹而含新思欣欣於麗景情豔豔於韶春雖懵陰陽之義且知天地之仁我國家道洽眾靈化涵諸夏吹律豈勞於鄒衍操音寧藉於子野德被荒遐而有截澤周品物而無假因壽域以同歸奚樂郊而獨寫是知氣之所感者情情之所和者氣氣苟達而內愜情必洽而外慰等彼純帛丿糸之溫若享太牢之味因在極於羨溢寧止臻於髣髴不然者太昊之令何榮老氏之言安貴而已也春臺高兮勢峩峩鶯亂囀兮傳伐柯聊登陟兮一過攬春心兮未和春臺曉兮光淡淡花競落兮如菼菼遠憑臨兮一覽嫋春心兮多感感因外而重遣和自中而再尋任三陽之榮悴齊萬化以浮沈風何知於虎嘯雲何識於龍吟猶春臺之蹈泰與聖政之同深聖唐九葉皇帝平內盜攘外夷建中興永圖以崇王業乃命潼關鎮國軍節度使檢校尚書右僕射兼御史大夫華州刺史武康郡王李元諒整兵隴右分鎮京西朝野訢以為宜軍州翕而益重復我洮罕期在於茲且謂分星辰之精山河之靈彧穆英明為國而生者也於是行軍司馬御史中丞董叔經以州人感公救其塗炭荷公拯其瘥癘露表㣥言贊於雲隄曰臣聞鼓天下之大節莫先於忠義卻天下之大難莫出於才能奏勳庸播金石以為天下表莫盛於碑版然則陛下宗臣元諒雄傑英勇沈斷明謀虎身之望夙成龍額之封果及武齊七德而克用為模文有九功而能舉為法故炳燭方召粃稗韓彭桓桓然徇國之功皆可揭而昌言也昔陛下薄狩郊甸爰幸巴梁虵虺畜而毒生豺狼飽而害作內奰宮闕黨與譸張何望之墾掘咸林敬缸窺覷蒲坂同逆相扇傾陷巨州元諒時以散員副戎關鎮無一廛之土無一旅之眾感憤而發招輯白徒斬賊使於潼津破賊將於敷谷乘勝連擊遂克城池閭閻載安室家相慶此其徇國之功一也勇夫重閉以備不虞創績墉隄是徵板幹環迴裹於修郭延袤臷於通衢冀防馳突之鋒庶窒搜牢之掠四封輻輳不震不驚益兇䜿東顧之憂壯義夫西討之勢此其徇國之功二也州之器備自昔其空乃剔鑊鼓為兵撤氈彯為甲剡蒿揉為弩載簀鞏為排嚴約誓於五申肅部隊於三令勞逸斯共甘苦必分德以導其懷刑以齊其力義以啟其憤忠以發其誠由是士皆嚮方樂公戰矣此其徇國之功三也籍馬蒐乘補卒濟師始編簿者二千終載書者一萬進次昭應稟命於副元帥之軍列屯興泰分迾於尚可孤之壘元兇恃眾犯我中營或靡旌而來或掉鞅而去因其去也霆激飆衝分翼夾馳邀覈其陣血鬬滻川之水屍膏灞岸之田狡勢迷窮不能復振此其徇國之功四也蒼茫御苑橫矗長雲摧百堵而洞開擁三軍而徑入姚令言望旗而潰張光晟棄甲而奔彀騎爭追若燎於藪賊泚憂迫躬率全軍驅其恟恟之徒揮我堂堂之眾一鼓而北竄死真寧氛祲廓而黃道清腥穢消而彤庭肅頓師章敬都邑晏如迎大駕復於咸秦還大兵散於陰晉此其徇國之功五也李懷光阻河拒命竊弄戈鋋北連綘臺南抵黃巷選朔方之徤將保朝邑之離宮陛下特詔攻圍重鞠戎旅總於經略丕冒平涼或掎擊其救兵或邀絕其餫卒力殫命窘因乃求降未殲當道之豺且磔吠籬之犬此其徇國之功六也進屯河縣接邏官橋雖竹纜已焚而水口將渡大憝知窘猶懷鬬心乘時出奇幸於有勝遲明遇伏卒以無歸恚蹙窮城因絞中閣三條以謐三輔斯寧此其徇國之功七也戎羌不道俶擾西陲驟掠邠涇深入鹽夏狃其橫猾溽暑仍留苟不用權若何攘暴迺勵我鷹揚之旅乘其馬瘠之時張皇軍形緩俘令逸然後排烽結隊加竈翻營師未逾於洛源寇已還於河曲此其徇國之功八也婪婪藩虜匿詐求和重違修好之言用許尋盟之約諸軍畢會是燭沈疑陳其不誠請以為備且曰古者諸侯相見兵衞不撤警也今犬羊反覆未可以端拱待之乃距平涼二十里所柵為壁塹為壕設晉師敖前之伏修楚臣勁後之殿練銳三千涉涇式遏既而升壇將歃果以惡來聲若河翻勢如山進望我旗鼓驚眙而還禦侮之道既宏折衝之威亦著此其徇國之功九也良原縣間在涇隴西壓窮邊罹彼煙塵翦除荊棘事未經啟密命興功遂發軫而遽行即建標而特起恢其制度峻以規模役不二旬隱然嶽立乃修廬井乃闢田疇商旅載通流庸偕附烽堠交於塞表保障連於峽右雖周築虎牢漢憑馬邑式遏亂略曾何足云此其徇國之功十也朝廷所以降丕命策高勳重位以崇之豐爵以榮之歌鐘以樂之邸宅以寧之自建中以來衞社稷之臣秉旄鉞之將除宰輔董戎外其孰能疇匹於此哉况明允豪賢勤於理要清恕以康黎獻簡恤以裕公私推信誠宏敬讓薄九賦勵三農抑浮窳之風興廉正之教一年而人知禁二年而人知惠三年而人知愛四年而人知誦夫然又安可使懋功昭德沈隱無聞者歟願聽華人篆之樂石制曰可於是耆壽荔非昇古沙門釋僧惠道士遊方外等千乃心萬乃口喜從所欲祈我筆端乃約奏章以纂成績公本姓安氏武威姑臧人蓋黃軒帝孫降居安息高陽王裔留宅姑臧僕射元魏之股肱武衞巨唐之牙爪世濟其貴公又昌明而弱歲羈孤感於知己某某之族從駱統之姓鎮潼關者五年矣既申武節克建戎勳天子以敦淳可親誠明可信更名賜氏以昭實焉書所謂踐修厥猷靈承多寵者矣若夫校功王府譔德侯家雖馮異揚言已傳徽於昔歲而吉甫作頌庶宏美於今辰詞曰洸洸武庸兮有虔秉鉞即戎臨敵兮原火烈烈隊如星兮陣如雪進如流兮止如臷轉電激兮衝風發壞苑垣兮復宮闕既東征兮又西伐鼙鼓雄兮才氣傑滌昏霾兮掃妖孼河瀆清兮渭源澈功既成兮恩亦結倚銕防兮賚金穴華山麗兮敷水澨惠汪濊兮威凜冽庶甿安兮㣥盜絕舞稚童兮歌大耋城窣雲兮營偃月望麾幢兮想旌節樹豐碑兮頌英哲詞不媿兮勳不滅文昌字墨卿一字景初西河人元和中累轉祠部郎中知制誥穆宗立拜中書舍人進中書侍郎同中書門下平章事自表還政授劍南西川節度使敬宗立拜刑部尚書轉兵部判左丞事文宗朝遷御史大夫封安平郡公檢校右僕射平章事充淮南節度使再徙鎮西川大和九年卒年六十三贈太尉平都山最高頂即漢時王陰二真人蟬蛻之所也峭壁千仞下臨湍波老柏萬株上插峯嶺靈花綵羽皆非圖志中所載者昏旦萬狀信非人境貞元十五年余西遊岷蜀停舟江岸振衣虔潔詣諸洞所石嵒靈竇蒼焉相次苔龕古書依稀可辨時與道侶數人坐於下須臾天籟不起萬竅風息山光耀於耳目煙霞拂於襟褎相顧神竦若在紫府元圃矣牽於形役不得淹久瞻眺惆悵書名而去爾來已三十四年大和庚戌歲自淮南移鎮荊門有客由峽中來者皆言當時題紀文字猶在觀宇歲久臺殿荒毀不三數年必盡摧沒於巖壑矣乃捨一月秩俸俾令修葺子來同力浹旬報就去年冬十一月詔命換麾幢再領全蜀泝三峽歷舊遊依然境物重喜登覽聞泉聲而緩步愛松色而難別遂命筆硯志於巖谷時大和七年正月五日記蜀城正南當二江合流之上萬井聯甍之內獨有岡阜迴抱數里地形含秀而高坦木色貫時而鮮澤以氣象言之不有金剎梵宇孰能主其勝勢乎天寶末元宗巡狩此方崇護法教度僧建寺大啟休福至德二年長史盧公元俗奏置此寺以菩提為號焉先是僧眾鄉黨耆舊相厥林野將興塔廟徘徊凝睇漠然無所乃諗於草堂寺無相大師以質之大師傳繼七祖於坐得三昧以不思議之知見破㣥心之蒙惑遂指茲地宜開法門夫風行地上而萬竅自號大師一言而天心感悅故得廣輪棟宇版築垣墉翦榛莽以立宏規繚荒墟以羅物象大歷初節度使相國崔公寧以此寺剏名修建未就乃迎彭州天飭山惠悟禪師以居焉禪師即無相大師之升堂法子也覺照圓朗了於實際以方便說化導㣥生俗流歸依其眾日倍經始之制於茲復興其後有信心居士薛藏尹偘者生於岷峨得其靈秀氣豪量濶宗敬二乘皆能以財發身悟愛為妄捐捨寶貨同修梵場蚩蚩之徒隨我先倡方構雲起儼如天成觀乎崇殿巍巍殫於宏麗列柱屹立以壯趾攢櫨分形以扶栱豁紺宇而色明洞綺寮以霞散金碧絢煥逢倒景而共照珠鐸玲瓏無迴飆而獨響長廊之外江浦悠然高檻之端雲峯對出有巖壑之松桂是人寰之林藪學無生者得自在攝威儀者無缺落住持之益其何博哉繇是言之非龍駕之巡幸無以建法幢懸雕牓非大師之言授無以識茲地占幽奇非居士之捨財無以集工輸成像設參會而來福祥冥感流慶昌運推乎無窮今皇帝纘八聖之耿光奉三無私以端拱則全蜀之保寧法輪之常運庸詎知其際邪徵其建立以來招化檀施者有若寺主惠嚴姓張氏操行端明始終無替帛丿糸歷五紀成此茂功押寺臨壇大德元極德高宿殖振起律儀上座惠通識敏量寬通藝兼蘊都維那行持典座行謙聰悟多聞探詳經論咸緇門挺秀戒行精嚴若眾流為川㣥材成廈喜日月之既就歎成功之莫紀年代悠緬易為消失不立篆記將何以報眾士之有聞乎請余為詞用述前迹銘曰時久太平幽陵起兵騎入宮壼塵飛杳冥翠華西巡旋復天京崇演法梁為濟㣥生藹藹岡原於江之涘盤林走壤或隱或起建寺之辰經營於此誅茅破藪夷高堙埤云誰知之大師所指萬材既構百役齊功日就月將化為蓮宮正殿渠渠觚稜倚空長廊複宇霞截雲重乃有二士迴向正法能成香剎標於濁劫瞻敬自生萬緣皆攝利益宏溥偉哉善業西南巨鎮地足寶坊形勝之中愛此凊涼遠對前山終古蒼蒼貞珉既刻永播坤方是草木有異於草木則靈武侯祠前柏壽千齡盤根擁門勢如龍形含碧太空散霧虛庭合抱在於旁枝駢梢葉之青青百尋及於半身蓄風雷之冥冥攢柯垂陰分翠間明忽如虬螭向空爭行上承翔雲孤鸞時鳴下蔭芳苔凡草不生古色天風蒼蒼泠泠曾到靈山老柏縱橫亦有大者莫之與京於惟武侯佐蜀有程神其不昏表此為禎斯廟斯柏實播芳馨夫五兵之設本以助文德而成教化故聖人不專任之其有桀驁暴邪干紀作孼道德不服則兵以威之文誥不諭則兵以靜之在禁暴除害而已自黃帝堯舜不能無誅至湯武受命武功寖盛其本之以仁義行之以弔伐惟帝與王率由茲道於戲創業之君勞而後定守文之主安而忘戰故三代之衰功在五伯未有中葉之後再安生靈前古所無歸於聖代我唐運之興也高祖太宗以仁義之兵除暴隋之亂戎功祖武百代丕承元宗嘗亦內翦奸邪外清夷狄所以繼文之代協帝之明既而禍起於微亂生於理由是髖髀之眾結固於兩河斤斧不用帛丿糸歷於五紀肅宗代宗親翦大憝且務生育德宗順宗觀於天象察於人事以理運未至沴氣猶凝運啟昇平以俟後聖惟我后握樞出震端扆嚮明考上元之心思祖宗之意掃滌區宇光啟帝圖不以萬乘為尊四海為富遵大禹櫛風之志有光武乙夜之勤以為景擒七國而漢民安成翦三監而周化洽焉有患難未去而德教可興日者李琳恃近狄之固劉闢憑坤維之險李錡保長江之衝從史資太行之阻四兇相挺繼為亂常三數年間盡膏鈇鑕太尉茂昭以中山之地盡室來朝司空宏正以全魏之邦舉宗向闕義風所激莫不歸心况彭城從折簡之召橫海展執珪之覲向之談虞虢之存亡議輔車之形勢莫不刳心斷臂繼踵為忠既而麟見於巴賨之間河清於鄘衞之際固本根之貺昭聖祚之符廓清寰海兆於此矣而長淮右地連山四起控扼吳楚密邇轘轅有上帝濯龍之池同冀方多馬之國戈鋋雪照駔駿雲屯二姓三兇憑阻作孼歲在甲午吳少誠積禍而斃餘殃聚於逆嗣氛祲淮濆我后方弔人省冤墾災除穢猶命使者持節往申寵賻以昭柔服之義示含宏之仁元濟刦眾拒境滔天肆逆剽葉縣燒舞陽侵襄城伊洛之間騷然震恐乃詢廷議咸願假以墨絰授以兵符天子淵默以思霆馳以斷獨發宸慮不詢眾謀漢宣從屯田之議晉武決平吳之計至聖不惑㣥疑自消於是會鳧藻之師得鷹揚之帥以忠武軍帥李光顏往者平朔邊靜庸蜀雙矛電激孤劒飆馳亦猶馮異之總軍鋒子顏之將突騎才氣雄武可掃攙槍總魏博河陽郃陽凡三軍自臨穎而前以河陽軍帥烏重允當從史內訹邪謀外阻兵勢精誠奮發密應王師故得虜魏豹於軍中縛呂布於麾下識慮中正可革梟音益以汝海之地總朔方義成陜虢劒南西川鳳翔延州寧慶凡七軍由襄陽而進宣武帥韓宏請以子公武領精卒一萬二千時集洄曲欒書作帥鍼為戎右充國討虜卬統支軍是能從帥之命成父之志又以壽春守李文通夙精戎韜累習軍旅明於守備可保金湯總宣武淮南宣歙浙西徐泗凡五軍扼固始之險以鄂岳都團練使李道古以先曹王皋有任城之武昔征兇渠嘗取安陸授以戎柄嗣其家聲乘五關之隘以唐鄧隨帥李愬溫敏能斷靜深有謀昔趙孟慕成季之勳復能霸晉亞夫紹絳侯之武亦克擒吳想其英徽必有以似山南東道荊南凡兩軍自文成而東乃命御史中丞裴度布挾纊之恩奉如絲之命以諭㣥帥以撫輿師且以古之會兵必謀元帥令歸於一勢不欲分命宣武軍帥韓宏為諸道行營都統假陸遜之鉞拜韓信之壇指蹤畫奇正之機發號申嚴凝之令然後有司馬之法成節制之師而寒暑再罹賊巢未下又命內掌樞密之臣梁守謙肅將天威盡護諸將懸白日於千里推赤心於萬人由是甘寧奮升城之勇君文勵擊郾之志焚上蔡以翦其翼拔郾城以扼其吭以軒后攻蚩尤之亂殷宗伐鬼方之罪周公誅淮夷之叛雖以聖討逆皆三年後定百辟之議且謂久勞將決其機以安海內復命丞相裴度擁淮蔡之節撫將帥之臣分鄧禹之麾旆盛竇憲之幕府四牡業業于藩于宣先是光顏重允公武戎旅同心壘垣齊列常蛇之勢首尾相從胡騎之雄紛紜縱擊逐餘孼如鳥雀獵殘寇似狐狸干矛如林行次於洄曲丞相之來也㣥帥之志氣逾勵統制之號令益明勢如雷霆功在漏刻賊乃悉其精騎以備洄曲之師唐隨帥李愬新總傷痍之軍稍勵奔北之氣城孤援絕地逼勢危而能養貔虎之威未嘗矍視屈鷙鳥之勢不使露形是以收文城柵而降吳秀琳下興橋而擒李祐祐果敢多略眾以留之或謂蓄患不利吾軍愬誠明在躬秉信不撓爰命釋縛授之親兵祐感慨之心出於九死縱橫之計果效六奇粵十月既朢陰凝雪飛天地盡閉愬乃遣其將史旻仇良輔留鎮文城備其侵軼命李祐領突騎三千以為鄉導自領中權三千與監軍使李誠義繼進又遣其將田進誠領馬步三千以殿其後郊雲晦冥寒可墮指一夕卷旆凌晨破關鋪敦淮濆仍執醜虜雖魏軍得田疇為導潛出盧龍鄧艾得田章先登長驅帛丿糸竹用奇制勝與古為儔四紀逋誅一朝蕩定攄宗廟之宿憤致黎庶之大安周漢以還莫斯為盛帝命策勳進宏為侍中光顏重允竝為司空愬為左僕射帥山南東道公武加散騎常侍節制鄜坊丹延道古進御史大夫文通加散騎常侍王師獲金爵之賞環境蒙優復之恩掩骼埋胔除瑕宥罪躋㣥生於壽域還比戶於可封東西南北無思不服丞相旋請來朝後加金紫光祿大夫封晉國公乃眷淮濆烝人生殖俾擇循吏撫其疾傷以宣慰副使刑部侍郎馬總領淮蔡之任天子議功雲臺追美將帥俾刻金石以揚休勳而百辟僉謀㣥帥克讓推義士之志敢貪天功徵賢臣之言實在君德於是搢紳之士暨侯服之臣上獻鴻名式昭徽冊然後光輝千古聲名百蠻詔命掌文之臣文昌勒銘淮浦庶乎閱周雅者美宣王之中興觀劒銘者戒蜀川之恃險銘曰天有肅殺萬物以成雷風為令霜霰為刑君有武節四海以寧陳之原野阻以甲兵在昔聖主格寧邦國武以禁暴刑以助德牧除害馬農去蟊賊苟非戎功孰靜㣥慝明明我后神算精微九重獨運千里不違宵衣旰食再安中㝢始翦朔漠旋梟蜀虜丹徒鏦濞白門縛布服茲四罪豈勞一旅淮夷怙亂四十餘年長蛇未翦寰宇騷然逮於孼童逆志滔天懷柔匪及告諭罔悛帝念生人乃申薄伐飛將鷹揚前鋒電發齋壇命信靈旗指越我武惟揚祅氛未滅集於洄曲決戰摧兇豹略臨晉維留沓中桓桓襄帥奇謀成功浮罌暗渡束馬潛攻合以長圍絕其飛走布德滅妖升城獲醜商不易肆農安其畝洄曲殘兵投戈束手帝嘉㣥帥賞不踰時畫社啟封珪組陸離洎於蠻貊服我英威刻之金石作戒淮夷
