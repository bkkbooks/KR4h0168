front:
  text: 全唐文欽定全唐文卷二百五十四蘇頲五
  hash: sha256:f6394d5bd1706f34c677722e3bb3e0d9fa542c5181a913e50783391ccece686a
body:
  text: 勅駔駿服皁軍國為容苟非懿親莫允斯寄祕書監檢校殿中監嗣虢王邕地隆藩屏才蘊忠賢以河閒之碩儒膺舞陽之茂寵學窮四徹已綜圖書任司六尚式光軒冕必能駟馬舉筴兩驂執轡用聞玉臺之歌入侍瑤池之賞宜與張涉同知內外閑广既餘如故勅自古帝王莫能獨理爰樹侯伯所以分政則今都督刺史之謂矣葢欲亭之毒之納於富壽不夭不札以致和平朕受天眷命作人父母殷鑒遠圖罔知攸濟頃者都督刺史惟良是求而寂寥厥聲孰副虛想豈六條察舉未詢事以考言將三載黜陟不責實而求當遂令進之則易吏煩於送迎退之則難人務於苟且豈所謂安孤老長子孫之意耶漢宣由是興言劉廣為之長歎誠有旨也今事謀伊始邦政惟新俾凝庶績思改前弊自今已後都督刺史每欲赴任皆引面辭朕當親與疇咨用觀方略到任之後宜待四考滿隨事褎貶與之改轉諸州上佐五品已上應改轉限亦宜准此夫類其才則適用久其事則有恒致用執恒未聞不致於禮也咨爾在位可弗勉哉勅立政之本惟賢是擇朕祇膺大歷殷鑒遠圖揚於王庭生此王國朕之所望久矣豈徵辟為事未極於巖藪而高尚絕塵見遺於草澤將何以舉逸而勸賁然來思且才之或偏器罔求備固非臧文之智則尚其言收曲逆之奇則捐其行過而能改仁遠乎哉天下諸州有懷才隱逸跅弛不調及失職冤人等並令諸道檢察使博訪具以名聞副朕饑渴之懷庶廣搜揚之義勅三春布和萬物資始而去冬無雪以迄於今將何以敬授人時欽若天道豈政有所缺將教有不明致茲亢旱深有祗惕堯舜以百姓為心禹湯以萬方罪已朕雖薄德匪敢遑寧自今以後每日聽政思宏道理俾康庶績至於日旰忘食未明求衣惟懷永圖朕之志也凡百在位可不勉歟勅朝集使等朕自臨萬邦倏已三載何嘗不兢兢業業勵精政道思欲棄末敦本阜俗安人寰瀛之閒日月以冀所以急於農務不奪人時富而教之庶乎可致夫苛政甚於猛武貪人比之蝥賊頃雖臨遣使臣未能澄正此弊或刻以害物或擾以妨農或背公向私或全身養望至使錢穀不入杼軸其空捐瘠相仍流庸莫返且四方事廣一人獨化共理之寄非卿而誰卿等至州遞相勗勵勤恤孤弱勸率耕桑各効清勤無或隳怠勅朝集使等朕聞御寰瀛者不可以獨化養黎獻者必存於共理故專一方親百姓能致循良之術必無愁苦之聲非牧伯之賢疇離於此所以精求臺閣歷選縉紳常舉百寮之要以先六刺之重虛想隹政用成庶績自去冬入計者則循名責實詢事考言雖不無等差終未有殊異得非歲時或淺風教未洽耶故一切不除各再臨所典至於敬耆老恤煢弱止姦盜挫豪強人不忍欺吏不敢犯田疇墾闢獄圄空虛徭賦必平逋逃自復門杜請謁庭無滯留若是者廼關乎職思可以力致至於弭災眚集休祥尚德義崇禮樂儒風大長道化滂流耕夫克讓織婦知節草木不夭昆蟲咸遂扇彼淳源登茲壽域若是者亦宏之在我仁遠乎哉豈惟祿秩就加當以公卿入拜其或靡副朝奬不恭朕言陟既有之黜故宜及勉旃俞往各勤我班瑞之分命勅朝集使朕聞天生蒸人溥於四海天有成命孚於萬邦必內立公卿外建侯伯后非賢罔使賢非后罔事借耳以廣聽假目以遐覽則諭上旨通下情庶政諧而㣥萌樂矣由是三考黜陟百官會疑昔之訓然耶朕以薄德祚膺寶位受乾坤之顧荷宗廟之靈懍乎若涉春冰如馭朽索責在司牧所賴分憂曷嘗不想望賢才馨香至化七年於茲矣咨爾㣥岳實邦之良服勤政途深佇嘉績豈為吏䍐久與人未信何殊尤絕異寂寥厥聲恭惟永圖當副虛屬孔子曰苟有用我者三年有成漢宣曰庶人安田里無愁恨之聲者政平訟理也以為太守數易則下不安誠哉是論矣今之牧守古之諸侯寵數特加情寄尤切故躬饗廷內則飲食宴樂幣帛筐篚入至朕前則敷衽以陳命席而對所冀仁且不遠言之必行以副朕憂勞之心託卿勤卹之助卿等宜慎厥始成厥終往欽哉祗守爾典操一州之統分六條之察念茲在茲用光我班瑞之命有賞有罰朕無戲言並即好去勅朕自君臨區域子育黎庶歲年是慎夙夜惟寅而誠或不孚政猶未洽所在旱澇屢觀章表因饑饉而為理竭憂勞以養人非夫二千石孰應斯委下戶給之高戶貸之所須賑恤並先處分至於常賦則著恒典檢據成損蠲減有條又近日以來中外少事差科調發殆至於無處馭通融當免於弊不知卿等從州來日百姓間得安穩以否其閭閻未便勅令有闕具以陳聞副我深寄時寒涉路並平安好且三兩日尋親識後取曹司進止勅朕聞諸禮曰刑禁暴爵舉賢則政均矣好惡著則賢不肖別矣其道然耶朕以虛薄祗膺景命荷宗社之靈當億兆之責曷嘗不昃朝晏坐畏天愛人思欲保其和樂躋於仁壽則與我共理者其惟良二千石乎每計吏還州與之陛見示其賞罰錫以筐篚亦云命而已矣而朝集使豫州刺史裴綱分典荊豫為政煩苛頃歲不登合議蠲復部人有訴便致科繩縣長為言仍遭留繫御史推按遽以實聞虐政弊人一至於此朕夙夜兢惕匪遑寧居尋遣使存問其諸道有損處已量加賑恤水旱不時實朕之過惠養失所分刺之由是用黜綱於嶺裔儆彼㣥岳朕於蒼生若保赤子為之均田邑制廬井必欲其時和年登遠安邇肅託於牧宰代以躬親故歷難其官誠經國致理之意也夫德惟善政政在養人故土煩則草木不長水煩則魚鱉不大必也寬恕貴乎清靜諸刺史都督宜問疾苦拯貧窮杜侵漁察冤獄至於賦役務從減省深刻為事人何以堪私惠苟行法或將墜理須折衷用存楷式其百姓有穩便者隨事條奏朕將親覽焉欽爾有官各勤為政如風化允穆課績殊尤當擢之不次旌乃厥美凡百庶邦敬聽朕命勅朝集使古者覲㣥后比萬國黜幽陟明循政思理罔之廢也朕以虛薄屬當期運受命穹昊司牧黎元何嘗不中夜求衣分晝忘食欲其日月所燭霜露所墜不獨親其親不獨子其子五穀豐植萬物阜安為無為事無事與能共化於茲八年矣而淳源未還至道猶鬱豈朕之不德耶將吏之不賢耶徭賦或繁耶綱維或紊耶故延入階陛躬問得失悉如卿所對則朕無憂矣書曰非知之難行之惟難語曰仁遠乎哉我欲仁斯仁至矣卿等宜祗典厥職克正其身修於國章允茲朝寄因乎風俗示之訓誘必也道德齊禮以公滅私田里絕愁歎之聲邦家聞寬厚之化乃及優賞如或依勢作威倚法以削流亡未至教令不行加以常罰自餘宜依別勅處分勤恤人隱以副朕懷並仰好去勅朝集使等朕承天丕命子育萬方樹之師長俾敷景化將以固茲邦本致諸昇平而大道緬然淳風未暢租賦頗減戶口猶虛水旱相仍耕桑莫贍葢朕之不德而吏之無方永言於茲良增歎息往歲河南失稔時屬薦饑州將貪名不為檢覆致令貧弱萍流外境責在致理有從貶黜因茲以來率多妄破或式外奏免或損中加數至如密州去秋奏澇管戶二萬八千八百不損者兩戶而已無田商賈之流雷同入數自餘諸州不損戶即丁少得損戶即丁多天災流行豈應偏併皆是不度國用取媚下人曩之刻薄也如彼今之踰濫也如此不副朕意一至於斯踈怠之雖已會赦尸曠之跡豈不多慙當令所司比類澄汰卿等與朕共理實惟分憂各勉思政途以匡不逮其百姓閒事物去冬赦書已處分訖若人有疾苦鄉有姦豪不勸農桑不崇學校並宜敦勸以正風俗逃亡之戶必藉招攜差科之閒務令停減如臺省處事有不穩便於時者具利害聞奏勿復依隨以損百姓卿等至州之日宜一留意用綏我庶人並即好去勅朝集使等朕君臨㝢內子育黎元何嘗不易愛人勤恤庶政天下至廣不能獨任故樹之方牧咨其共理而淳化未敷至道猶鬱庸賦尚減戶口且虛水旱相仍倉儲莫贍無聞慈惠之政未息凋弊之流豈朕之不明而吏之無術言念於此用惻于懷卿等是行勉思厥政百姓聞有鰥寡丨旬兮獨不能存濟者務令優養游業浮惰不勤稼穡者將令懲肅敦以學校勸以農桑差科之閒務使平允逃亡之戶兼藉招攜令其下人使得蘇息諸州遭澇之處多是政理無方或堤堰不修或溝渠未洩頻已處分竟無承稟常破租庸是何檢校至州之日各宜勸勉應合修塞開導宜預施功若不蹔勞何以獲利已令御史分知訖宜勵所職勿犯常科今考績深者已有除改資歷淺者更佇良能應還州人已令所司各與賜物待駕發後三五日別親識並即好去勅朝集使等宏風善俗寄於良吏求瘼恤隱職在親人朕並建藩牧擇其師長欽若古訓俾人用康而教化或未洽黎甿或未寧攘竊者或有犯禁逋亡者䍐聞復業豈朕敦諭之道尚缺而牧宰之訓未明歟永念於此不忘旰昃卿等咸承朝寄分掌外臺共理之道期於康濟至若率身以正馭衆以仁而下不化者未之有也卿等還州宜禁侵漁絕浮惰丨旬兮獨鰥寡尤資惠育盜賊祅訛特宜禁斷其征鎮人家每須優當科斂之事必在均平頃者水災薦及河朔朕思無不至憂彼元元發倉廩漕江淮以賑之蠲租稅停征役以安之今屬春陽布和農事方起慮有乏絕致妨農桑雖已遣使安撫或恐事未周贍如有不支濟者即便量事賑給諸道有損之處亦宜准此朕不欲一物失所衆情不遂納㣥生於仁壽躋大化於昇平卿等各宜恭守朝章宣布朕意雖萬方有罪敢忘在子而三載考績須徵行事安人稱職可不勉歟並宜好去勅夫孝者天之經地之義人之行故上自天子下至庶人資於敬愛以事父母所謂冠五常之表稱百行之先如或不由其何以訓如聞道士女冠僧尼等有不拜父母之禮朕用思之茫然罔識且道釋之教葢懲惡而勸善父子之儀豈緣情而易制安有同人代而離怙恃哉哀哀父母生我勞瘁故六親有不和之戒十號有報恩之旨此又窮源本而啟宗極也今若為子而忘其生傲親而徇於末背禮而強名於教傷於教則不可行行教而不廢於禮合於禮則無不遂二親之與二教復何異焉自是已後道士女冠僧尼等並令拜父母喪紀變除亦依月數庶能正此穨弊用明典則罔虧愛敬之風自叶仙真之意勅惟刑恤哉古之道也朕撫臨四海茂育萬邦思致淳風登諸壽域期畫冠而不犯故開羅而在宥念茲下愚自抵常法時屬盛夏天其養長在物最靈惟人為貴朕處臺榭猶有鬱蒸之毒彼居囹圄能無憯怛之憂故遣紫微黃門備加按省覽其所奏用憫於懷爰矜可恕之罪必務惟輕之義將布寬惠俾從原減宜依前件勅朕聞珠玉者饑不可食寒不可衣故漢文云琱文刻鏤傷農事錦繡纂組害女工農事傷則饑之本女工害則寒之源又賈生有言曰夫人一日不再食則饑終歲不制衣則寒饑寒切體慈母不能保其子君焉得以有其人哉朕以眇身託於王公之上曷嘗不日旰忘食未明求衣思使返樸還淳家給人足而倉廩未實饑饉相仍水旱或愆糟糠不厭靜思厥故皆朕之咎致有漿酒藿肉玉食錦衣互相夸尚浸成風俗夫令之所施惟行不惟反人之化上從好不從言是以古先哲王以身率下如風之靡何俗不易此事近有處分當以施行朕若躬服珠玉自翫錦繡而欲公卿節儉黎庶敦樸是使揚湯止沸涉海無濡不可得也是知文質之風自上而始朕欲捐金抵玉正本澄源所有服御金銀器物今付有司令鑄為鋌仍別置掌以供軍國珠玉之貨亡益於時並即焚於殿前用絕浮競至誠所感期於動天況於凡百有違朕命其宮掖之內后妃以下皆服澣濯之衣永除珠翠之飾當使金土同價風俗大行日用不知克臻至道布告遐邇知朕意焉勅臘月乞寒外蕃所出漸漬成俗因循已久至使乘肥衣輕競矜胡服闐城溢陌深玷華風朕思革穨弊返於淳樸書不云乎不作無益害有益功乃成不貴異物賤用物人乃足況妨於政要敗紊禮經習而行之將何以訓自今以後即宜禁斷勅釋氏汲引本歸正法仁王護持先去邪道失其宗旨乃般若之罪人成其詭怪豈涅槃之信士不存懲革遂廢津梁眷彼愚蒙相陷坑穽比有白衣長髮假託彌勒下生因為妖訛廣集徒侶稱解禪觀妄說災祥或別作小經詐云佛說或輒畜弟子號為和尚多不婚娶眩惑閭閻觸類實繁蠹政為甚刺史縣令職在親人拙於撫馭是生姦宄自今以後宜嚴加捉搦仍令按察使採訪如州縣不能覺察所由長官並量狀貶降勅禮存寧儉書戒無益約費嗇財為國之本至如賜酺合晏正欲與人同歡廣為聚斂固非取樂之意況日徇於奢是不誠也心勞於偽是不經也殷鑒於此良用憮然自今以後兩京及天下酺宴所作山車旱船結綵樓閣寶車等無用之物並宜禁斷勅朕聞樂者起於心心者動於物物不正則不可為樂樂不和則不能理人況天生黎蒸區別男女外則導之以禮中則由之以樂苟或不臧孰云致禮自有隋穨靡庶政彫弊徵聲徧於鄭衞衒色矜於燕趙廣場角抵長袖從風聚而觀之浸以為俗此所以戎王奪志夫子遂行也朕方大變澆訛用清淄蠹眷茲女樂事切驕淫傷風害政莫斯為甚既違令式尤宜禁斷自今以後不得更然仍令御史金吾嚴加捉搦如有犯者先罪長官務令杜絕以稱朕意勅虞之四朝且編區㝢漢之三輔本同京師善於古者考於今發乎邇者應乎遠若順豫之事缺則紊於王制巡遊之典備則慮於人勞朕受命膺期勵精設教幸乾坤幽贊風雨咸若百物既阜三農已登同穎薦於宗廟穭穗生於郡國我無大桀實欣於歲取人有小康未果於時邁但左翊之地近入黃圖新豐之邑甫鄰青綺山川宮館咫尺相望欲過灞亭而涉戲經沙阜而臨渭見彼耆耋問其疾苦察長吏之政恤黎甿之冤葢所以展義陳詩觀風問俗始自畿甸化於天下宜以今月二十五日幸長春宮停五日緣頓所須並令所司支備一事以上不得干擾州縣發日唯量將飛騎萬騎行更不須別遣兵馬及妄有科喚朕此行之處不得進奉在路有稱冤苦州縣不能疏決者委御史金吾收狀為進各勉所職副朕意焉黃門朕聞養人者謂之司牧非逸於人上事天者謂之帝皇葢御乎天下故作為棟宇以避燥濕居於臺榭以順高明斯乃奉時令布政教也朕以不德祗膺睿圖寶十家之產愛兆人之力未嘗興工於土木役思於池籞冀之休乂以致雍熙自律應長嬴時方大暑溽雲屢起溫風且至伏以太上皇宴居珍衞滌慮清閑迹不往於甘泉心每期於汾水朕侍於左右以奉晨夕助元默之化則虧於聽理當炎蒸之序又瀆以囂煩惕焉載懷敢忘順色然大明創兆先聖所營即舊不加因時而往千門萬戶外雖謂於別宮一日三朝中自連於複道下所以寧問安之懇上所以資習靜之娛實獲我心俾康政理古有服重裘者則念人之寒居夏屋者則念人之熱況比歲阻飢甫田不稔或愚人陷罪圜土稱冤凡厥庶寮將何以恤兩京及諸州宜令長官親理冤獄除犯名教及官典犯贓并緣妖偽以外餘罪徒以下咸宜放免其有茂才異等拔萃超㣥緣無紹介久不聞達者咸令自舉朕當親問其應宣撫咸使名聞舉人試第四等宜准舊例別加優奬見任人各量與改轉前資常選人至冬依選例與處分其未出身者兼授散官先天以來軍將押衙官等在陣戰亡者令本軍勘實奏聞其妄說災祥誑惑閭里并令州縣長官等嚴加捉搦仍令御史金吾防察繩糾有能直言極諫補朕之闕者各封進狀朕將親覽如有可採當加奬擢其皇親諸親及東宮承優任員外檢試等官近停令至冬處分者有家道貧迫情願外任者亦令所司勘績闕量才注擬其緣坐流人處置有輕重不類者令所司勘會聞奏主者施行維景龍四年歲次庚戌五月辛亥朔二十八日戊寅應天神龍皇帝若曰夫親先之義始自國家嫡後之封終傳土宇咨爾故澤王男義瑾授桐貽緒訓闕一字垂芳性夙宜於禮樂行盡成其忠孝是知周之曲阜元子建侯漢之平臺共王襲父推其繼美俾爾宜乎是用命爾為嗣澤王於戲率由軌訓祗服彞典故可以不驕不矜廼惠廼順北暨於上黨南臨於太行偉其井邑光我藩屏往欽哉維景龍四年歲次庚戌五月辛亥朔二十八日戊寅應天神龍皇帝若曰易不云乎義崇於利建書不云乎道尚於敦睦故知樹藩屏者以奉先王之言強宗室者乃歸諸父之允咨爾金紫光祿大夫行祕書監檢校太尉殿中監知隴右三使仗內諸閑广既上柱國嗣虢王邕爾門膺魯拜地冠虞封本以忠孝仁義之規成乎宣慈惠和之業思窮占雨沛經不測其精詞高賦月陳詩莫踰其麗匪惟政修中夏稱於虢叔固以姻連外戚寵則吾姨遂能在位不驕鳴謙自牧造次何者寧忘服儒從容謂之最樂為善加以望隆才位聲軼典司動則有恒靜而無撓載刊三豕廚委於殺青爰捧六龍广既填於伏皁故可以榮絕乎四履位徼乎九就夫陳留者徙梁之邑在浚之郊井邑遂割於鴻溝舳艫遠通於巨壑雖帝堯遺俗國中承重厚之風而王武舊邦天下擅膏腴之地親既賢矣我圖爾居是用命爾為汴王於戲爾其敏厥行祗厥典思不怠畏不法取則前鑒罔貽後羞行作我唐藩以惠於汴土慎之哉其保朕之休命維先天二年歲次癸丑十一月辛酉朔二十八日戊子攝太尉臣某等文武官六千五百一十四人言臣聞厥初生人首出庶物物不自理惟后可以康乂后不自專惟人所以歸往古先哲后安人育物表功崇號不可避也皇矣上帝臨於巨唐降氤氳垂耿光重熙而累盛至太皇而授聖皇臣等敢稽首而言曰曩者景龍之末長蛇縱禍陛下慮宗社之墮提劒而夷之則因親以尊主閒者朝有賊臣天罰大憝陛下拯邦家之難援旗而勦之則措枉以舉直戮不及嗣惡惟其魁思與王公卿士下逮元元揚闓擇而育和氣臣又聞軒夢華胥堯期姑射未有一其道而順太皇之心文王昭事武王緝熙未有一其時而居聖神之位褰裳釋重至公也端冕嚮明至孝也使九族敦敘百工允釐東西南北砥礪聲教彼靈有四招翠黃而可乘我寶有三捐珠玉而不御然猶發揮禮樂馳騖典墳論思獻納進善從諫日慎一日上稽乎天意下考乎人謀卓哉協元符而鑠靈命者也夫開者泰也罔不亨元者善也罔不利神者聖也罔不通武者威也罔不服臣等不勝大願昧死上尊號曰開元神武皇帝謹上玉冊玉璽臣等誠惶誠恐死罪死罪謹上黃門朕聞聖人無心同於吹萬上皇有道契於明一居天下之尊者莫大體其大以照臨成天下之務者至公順其公以康濟故能稽昌歷考元符通於神祇格於上下鴻名不可以深拒盛典不可以固違斯豈在予而徇於物也朕以菲德丕承聖訓掃除欃槍保衞宗社內問安以承志外聽理以推誠始自朝廷納之以軌物終加蠻貊洎之以聲教欲令跂行喙飲含齒戴髮去其夭札蠲其疵癘每乾乾於紫座寧自貴於黃屋而凡我㣥辟顧斯兆庶以為人謀協從天意欽若王者人所歸也帝者天之號也歸之者以德號之者以功然號以功成則功不可以不表歸以德厚則德不可以不勵朕猥屬與能之運遂忘沖讓之私將逮臨寅之歲首甫擇建子之天統是用發揮景命受茲禮冊夫循名者責實謀始者慮終勉而全之非敢自滿所以克已思政唯懷永圖懼弗勝荷用多慙惕赦令所作其來尚矣是則姦人之幸嘗思奔馬之喻朕但欲令其畏惡化之為善庶比屋可封豈開羅為惠朕之此志每用形言頃屬冬序頗愆農澤洎辰練日有司備禮則上天同雲北風雨雪意者將乘廣慶必待湛恩宜行宥過之典以叶隨時之義可大赦天下改先天二年為開元元年自開元元年十二月一日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒咸赦除之云云禮尚於儉書誡於奢朕方歸敦樸以存勸沮至於乘輿服御及土木之功蠲除撙節貴從省王公以下宜識此心欲將先自朕躬冀能化行海內薛伯陽以凶魁之子合寘嚴刑緣尚主之恩特令遠貶旋念從夫之禮深矜自我之出宜復舊婚再承新命可唐州別駕員外郎置同正員郭元振往立大功保護於朕頃因閱武頗失軍容責情放逐將收後效可饒州司馬員外置同正員朕聞罪不相及先王之制叔向豈坐於凶弟展禽見稱於哲兄劉廙不以劉偉獲辜王導不以王敦廢職崔滌為其兄湜搆禍每進款誠事朕有年心則無隱忠邪既判賞罰宜均俾踐儲卿式彰臣節可太子僕員外置同正員國初以來宰相及實封功臣子孫一房沈翳未承恩者令所司訪擇有才用者量加擢用周朝酷吏來俊臣周興之徒殘害宗枝毒害良善永言及此深所嘆恨其酷吏有身在及酷吏身後有子孫亦令所司勘會甄別處分諸軍將士有年歲深久所由要籍或不得選集及未敘勞効咸委軍將據實奏聞仍令所司早勘處分及諸軍子將總管以上自今已後冬正賜帛一準京官例給亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之赦書日行五百里布告遐邇咸使知聞主者施行
