front:
  text: 全唐文欽定全唐文卷九百七元奘二
  hash: sha256:fe9a65529ede0613fef0d2a10acd1a41a75aa007d480869f113205337556e3ed
body:
  text: 大唐國苾芻元奘謹致書摩訶菩提寺三藏慧天法師足下乖別稍久企仰惟深音寄不通莫慰傾渴彼苾芻法長至辱書敬承休豫用增欣悅又領細白㲲兩端讚頌一夾來意既厚寡德愧以無當悚息悚息節氣漸和不知信後體何如也想融心百家之論栖慮九部之經建正法幢引歸宗之客擊克勝鼓挫鍱腹之賓頡頏王侯之前抑揚英俊之上故多歡適也元奘庸弊氣力已衰又加念德欽仁唯豐勞積昔因遊方在彼遇矚光儀曲女城會又親交論當對諸王及百千徒衆定其深淺此立大乘之旨彼豎半教之宗往復之間詞氣不無高下務存正理靡護人情以此輒生淩觸會罷之後尋已豁然今來使猶傳法師寄申謝悔何懷固之甚也法師學富詞清志堅操遠阿耨達水無以比其波瀾淨末尼珠不足方其皎潔後進儀表屬在高人願勗良規闡揚正法至如理周言極無越大乘意恨法師未為深信所謂耽玩羊鹿棄彼白牛賞愛水精捨頗胝寶明明大德何此惑之滯歟又壞器之身浮促難守宜早發大心莊嚴正見勿使臨終方致嗟悔今使還國謹此代誠并附片物蓋欲示酬來意未足盡其深心也願知前還日渡信渡河失經一䭾今録名如別請為附來餘不能委述苾芻元奘謹呈大唐國苾芻元奘謹修書中印度摩揭陀國三藏智光法師座前自辭違俄十餘載境域遐遠音徽莫聞思戀之情每增延結彼苾芻法長至蒙問并承起居康豫豁然目朗若覩尊顏踴躍之懷筆墨難述節後漸暖不審信後何如又往年使還承正法廣大法師無常奉問摧割不能已矣嗚呼可謂苦海舟沈天人眼滅遷奪之痛何期速歟惟正法藏植慶曩晨樹功長劫故得挺沖和之茂質標懿傑之宏才嗣德聖天繼輝龍猛重然智炬再立法幢撲炎火於邪山塞洪流於倒海策疲徒於寶所示迷衆於大方蕩蕩焉巍巍焉實法門之棟幹也又如三乘半滿之教異道斷常之書莫不韞綜胸懷貫練心腑文盤節而克暢理隱昧而必彰故使內外歸依為印度之宗袖加以恂恂善誘曉夜不疲衢樽自盈酌而不竭元奘昔因問道得預參承并荷指誨雖曰庸愚頗亦蓬依麻直及辭還本邑囑纍尢深殷勤之言今猶在耳冀保安眉壽式讚元風豈謂一朝奄歸萬古追維永往彌不可任伏惟法師夙承雅訓早升堂室攀戀之情當難可處奈何奈何有為法爾當可奈何願自裁抑昔大覺潛暉迦葉紹宗洪業商那遷化毛掬多闡其嘉猷今法將歸直法師次任其事唯願清詞妙辨共四海而恆流福智莊嚴與五山而永久元奘所將經論已翻瑜伽師地論等大小三千餘部其俱舍順正理見譯未周今年必了即日大唐天子聖躬萬福率土安寧以輪王之慈敷法王之化所出經論並蒙神筆製序令所司抄寫國內流行爰至鄰邦亦俱遵習雖俱像運之末而法教光華雍雍穆穆亦不異室羅筏誓多林之化也伏願照知又前渡信渡河失經一䭾今録名如後有信請為附來并有片物供養願垂納受路遠不得多莫嫌鮮薄元奘和南沙門元奘言使人李君信至垂賜手詔銀鉤麗于丹字睿藻鬱彼河圖磊落帶峯嶽之形郁潤挹風雲之氣不謂白藏之暮更覩春葩之文身居伊洛之澗忽矚崑荊之寶捧對歡欣手舞足蹈昔季重蒙魏君之札唯敘暌離惠遠辱晉帝之書才令給米未覩詞兼空寂可舍之旨誨示大隱朝市之情固知聖主之懷窮真罄俗綜有該無超羲軒而更高架曹馬而逾遠者矣但元奘素絲之質尢畏朱藍葛虆之身實希松思願媲煙霞於少室偶泉石於嵩阿允避溺之情終防火之志所以敢竭愚瞽昧死陳聞庶陶甄之慈無遺鳧鷃雲雨之澤不棄蛛蟊而明照霈臨不垂亮許仍降恩獎曲存輝賁五情戰懼不知所守既戢來言不敢更請謹附謝文唯增悚越沙門元奘啓垂賜衲并雜物等捧對驚慙不知比喻且金縷上服傳自先賢或無價闕一字衣聞諸聖典未有窮神盡妙目擊當闕一字如今之賜者也觀其均彩濃淡黻衣不能逾其巧裁縫婉密雜縷無以窺其際便覺烟霞入室蘭囿在身旋俯自瞻頓增榮價昔道安言珍秦代未遇此恩支遁稱禮晉朝罕聞斯澤唯元奘庸薄獨竊洪私顧寵循躬彌深戰汗伏願皇帝皇后富衆多之子孫享無疆之福祚長臨玉鏡永御寶圖覆育㣥生與天無極不任慙佩之至謹啓謝聞施重詞輕不能宣盡沙門元奘啓伏奉令旨以元奘為慈恩寺上座恭聞嘉命心靈靡措屏營纍息增深戰悚元奘學藝無紀行業空疏敢誓方期光贊憑恃皇靈窮遐訪道所獲經論奉敕翻譯誠冀法流漸潤克滋鼎祚聖教紹宗光華史冊元奘昔冒危塗久嬰疴疹駑蹇力弊恐不卒業孤負國恩有罰無赦命知僧務更貽重譴魚鳥易性飛沈失路伏惟皇太子殿下仁孝天縱愛敬因心感風樹之悲結寒泉之痛式建伽藍將宏景福匡理法衆任在能人用非其器必有蹎仆伏願睿情遠鑒照宏法之福因慈造曲垂察愚誠之忠款則法僧無晦老之咎魚鳥得飛沈之趣不任誠懇之至謹奉啓陳情伏用慙惶追增悚悸元奘聞七曜摛光憑高天而散景九河灑潤因厚地以通流是知相資之美處物既然演法依人理在無惑伏惟皇太子殿下發揮睿藻再述天文讚美大乘莊嚴實相珠回玉轉霞爛錦舒將日月而聯華與咸英而合韻元奘輕生多幸沐浴殊私不任銘佩奉啓陳謝謹啓奘聞江海遐深濟之者必憑舟楫㣥生滯惑導之者實假聖言是以如來運一子之大悲生茲穢土鏡三明之慧日朗此幽昏慈雲蔭有頂之天法雨潤三千之界利安已訖捨應歸真遺教東流六百餘祀騰會振輝於吳洛讖什鍾美於秦涼不墜元風咸匡勝業但遠人來譯音訓不同去聖時遙義類差舛遂使雙林一味之旨分成當現二常他化不二之宗㭊為南北兩道紛紜爭論凡數百年率土懷疑莫有匠決元奘宿因有慶早豫緇門負笈從師年將二紀名賢勝友備悉咨詢大小乘宗略得披覽未嘗不執卷躊躇捧經侘傺望給園而翹足想鷲嶺而載懷欲一拜臨啓伸宿惑然知寸管不可窺天小蠡難為酌海但不能棄此微誠是以束裝取路經塗荏苒遂到伊吾伏惟大王稟天地之淳和資二儀之淑氣垂衣作王子育蒼生東抵大國之風西撫百戎之俗樓蘭月氏之地車師狼望之鄉並被深仁俱沾厚德加以欽賢愛士好善流慈憂矜遠來曲令引接既而至止渥惠逾深賜以話言闡揚法義又蒙降結娣季之緣敦獎友于之念并遺書西域二十餘番煦飾殷勤令遞餞送又愍西遊煢獨雪路淒寒爰下明敕度沙彌四人以為侍伴法服綿帽裘毯鞋襪五十餘事及綾絹金銀錢等令充二十年往還之資伏對驚慚不知啓處決交河之水此澤非多舉蔥嶺之山方恩豈重懸度淩溪之險不復為憂天梯道樹之鄉瞻禮非晚倘蒙允遂則誰之力焉王之恩也然後展謁衆師稟承正法歸還翻譯廣布未聞翦邪見之稠林絶異端之穿鑿補像化之遺闕定元門之指南庶此微功用答殊澤又前塗既遠不獲久留明日辭違預增悽斷不任銘荷謹啓謝聞沙門元奘啓元奘殃深釁積降罰明靈不能殞亡偷存令日但灰律驟改盈缺匪居墳壟淪頽草棘荒蔓思易宅兆亟歷嵗年直為遠隔關山不能果遂幸因陪隨鑾駕得屆故鄉允會宿心成茲改厝陳設所須復蒙皇帝皇后曲降天慈賜遣營佐不謂日月之光在瓦礫而猶照雲雨之澤雖蓬艾而必霑感戴屏營喜鯁兼集不任存亡銜佩之至附啓謝聞事重人微不能宣盡元奘自惟薄祐生不遇佛復乘微善預聞像教倘生末法何所歸依又慶少得出家目覩靈相幼知慕法耳屬遺筌聞說菩薩所修行思齊如不及聞說如來所證法仰止於身心所以歷尊師授博問先達信夫漢夢西感正教東傳道阻且長未能委悉故有專門競執多滯二諦之宗黨同嫉異致乖一味之旨遂令後學相顧靡識所歸是以面鷲山以增哀慕常啼而假寐潛祈靈祐顯恃國威決志出一生之域投身入萬死之地經是聖迹之處備謁遺靈但有宏法之人遍尋正說經一所悲見於所未見遇一字慶聞於所未聞故以身命餘資繕寫遺闕既誠遂願言歸本朝幸屬休明詔許翻譯先皇道跨金輪聲震玉鼓紹隆像季允膺付囑又降神發衷親裁三藏之序今上春宮講道復為述聖之記可謂重光合璧振彩聯華渙汗垂七曜之文鏗鈜韻九成之奏自東都白馬西明草堂傳譯之盛詎可同日而言者也但以生靈薄運共失所天惟恐三藏梵本零落忽諸二聖天文寂寥無紀所以敬崇此塔擬安梵本又樹豐碑鐫斯序記庶使巍峩永劫願千佛同觀氤氳聖迹與二儀齊固辨機貞觀時人年十五出家大總持寺為薩婆多部道嶽法師弟子大矣哉法王之應世也靈化潛運神道虛通盡形識於沙界絶起謝於塵劫形識雖盡應闕一字生而不生起謝雖絶示寂滅而無滅豈實迦維降神娑羅潛化而已固知應物效靈感緣垂迹嗣種剎利紹允釋迦繼域中之尊擅方外之道於是捨金輪而臨制法界摛玉毫而光撫含生道洽十方智周萬物雖出希夷之外將庇視聽之中三轉法輪於大千一音振辨於㣥有八萬門之區別十二部之綜要是以聲教之所霑被馳騖福林風軌之所鼓扇載驅壽域聖賢之業盛矣天人之義備矣然後忘動寂於堅固之林遺去來於幻化之境莫繼乎有待匪遂乎無物尊者迦葉妙選應真將報佛恩集斯法寶四念總其源流三藏括其樞要雖部執茲興而大寶斯在粵自降生洎乎潛化聖迹千變神瑞萬殊不盡之靈逾顯無為之教彌新備存經誥詳著記傳然尚㣥言糾紛異議舛馳原始要終罕能正說此指事之實録尚衆論之若斯况正法幽元至理沖邈研覆奧旨文多闕焉是以前修令德繼軌譯經之學後進英彥踵武缺之文大義鬱而未彰微言闕而無問法教流漸多歷年所始自炎漢迄於聖代傳譯盛業流美聯暉元道未攄真宗猶昧匪聖教之行藏固王化之由致我大唐臨訓天下作孚海外考聖人之遺則正先王之舊典闡茲像教鬱為大訓道不虛行宏在明德遂使三乘奧義鬱於千載之下十方遺靈悶於萬里之外神道無方聖教有寄待緣斯顯其言信矣夫元奘法師者疏清流於雷澤派洪源於媯川體上德之禎祥蘊中和之淳粹履道合德居貞葺行福樹曩因命偶昌運拔迹俗塵閒居學肆奉先師之雅訓仰前哲之令德負笈從學遊方請業周流燕趙之地歷覽魯衛之邦背三河而入秦中步三蜀而扺吳會達學髦彥遍效請益之勤冠世英賢屢申求法之志側聞餘論考厥衆謀競黨專門之義俱嫉異道之學情發討源志存詳考屬四海之有截會八表之無虞以貞觀三年仲秋朔旦褰裳遵路杖錫遐征資皇化而問道乘冥祐而孤遊出鐵門石門之厄踰凌山雪山之險驟移灰管達於印度宣國風於殊俗喻大化於異域親承梵學詢謀哲人宿疑則覽文明發奧旨則博問高才啓靈府而究理廓神衷而體道聞所未聞得所未得為道場之益友誠法門之匠人者也是知道風昭著德行高明學蘊三冬聲馳萬里印度學人咸仰盛德既曰經笥亦稱法將小乘學徒號木乂提婆唐言解脫天大乘法衆號摩訶耶那提婆唐言大乘天斯乃高其德而傳徽號敬其人而議嘉名至若三輪奧義三請微言深究源流妙窮枝葉煥然慧悟怡然理順質疑之義詳諸別録既而精義通元清風載扇學已博矣德已盛矣於是乎歷覽山川徘徊郊邑出茅城而入鹿苑遊杖林而憩雞園回眺迦維之國流目拘尸之城降生故基與川原而膴膴潛靈舊址對郊阜而芒芒覽神迹而增懷仰元風而永嘆匪唯麥秀悲殷黍離愍周而已是用詳釋迦之故事舉印度之茂實頗採風壤存記異說嵗月遄邁寒暑屢遷有懷樂土無忘返迹請得如來肉舍利一百五十粒金佛像一軀通光座高尺有六寸擬摩揭陀國前正覺山龍窟影像金佛像一軀通光座高三尺三寸擬婆羅尼斯國鹿野苑初轉法輪像刻檀佛像一軀通光座高尺有五寸擬憍賞彌國出愛王思慕如來刻檀佛像一軀通光座高二尺九寸擬劫比他國如來自天宮降履寶階像銀佛像一軀通光座高四尺擬摩揭陀國鷲峯山說法華等經像金佛像一軀通光座高三尺五寸擬那揭曷國伏毒龍所留影像刻檀佛像一軀通光座高尺有三寸擬吠舍釐國巡城行化像大乘經二百二十四部大乘論一百九十二部上座部經律論一十四部大衆部經律論一十五部三彌底部經律論一十五部彌沙塞部經律論二十二部迦葉臂耶部經律論一十七部法密部經律論四十二部說一切有部經律論六十七部因論三十六部聲論一十三部凡五百二十夾總六百五十七部將宏至教越踐畏途薄言旋軔載馳歸駕出舍衛之故國背伽耶之舊郊踰蔥嶺之危隥越沙磧之險路十九年春正月達於京邑謁帝雒陽肅承明詔載令宣譯爰召學人共成勝業法雲再蔭慧日重明黃圖流鷲山之化赤縣演龍宮之教像運之興斯為盛矣法師妙窮梵學式讚深經覽文如已轉音猶響敬順聖旨不加文飾方言不通梵語無譯務存陶冶取正典謨推而考之恐乖實矣有縉紳先生動色相趨儼然而進曰夫印度之為國也靈聖之所降集賢懿之所挺生書稱天書語為天語文辭婉密音韻循環或一言貫多義或一義綜多言聲有抑揚調裁清濁梵文深致譯寄明人經旨沖元義資盛德若其裁以筆削調以宮商實所未安誠非讜論傳經深旨務從易曉苟不違本斯則為善文過則艷質勝則野讜而不文辨而不質則可無大過矣始可與言譯也李老曰美言者則不信信言者則不美韓子曰理正者直其言言飾者昧其理是知垂訓範物義本元同庶袪蒙滯將存利善違本從文所害滋甚率由舊章法王之至誠也緇素僉曰渝乎斯言讜矣昔孔子在位聽訟文辭有與人共者弗獨有也至於修春秋筆則筆削則削游夏之徒孔門文學嘗不能讚一辭焉法師之譯經亦猶是也非如童壽逍遙之集文住生肇融睿之筆削况乎刓方為圓之世斫雕從朴之時其可增損聖旨綺藻經文者歟辨機遠承輕舉之允少懷高蹈之節年方志學抽簪革服為大總持寺薩婆多部道嶽法師弟子雖遇匠石朽木難雕幸入法流脂膏不潤徒飽食而終日誠面牆而卒嵗幸藉時來屬斯嘉會負噪鳥雀之資厠鵷鴻之末爰命庸才撰斯方志學非博古文無麗藻磨鈍勵朽力疲曳蹇恭承志記論次其文尚書給筆札而撰録焉淺智能多所闕漏或有盈辭尚無刊落昔司馬子長良史之才也序太史公書仍父子繼業或名而不字或縣而不郡故曰一人之精思繁文重蓋不暇也其况下愚之智而能詳備哉若其風土習俗之差封疆物産之記性智區品炎凉節候則備寫優薄審存根實至於胡戎姓氏頗稱其國印度風化清濁㣥分略書梗概備如前序賓儀嘉禮戶口勝兵染衣之士非所詳記然佛以神道接物靈化垂訓故曰神道洞元則理絶人區靈化幽顯則事出天外是以諸佛降祥之域先聖流美之墟略舉遺靈粗申記注境路盤紆疆埸回互行次即書不在編比故諸印度無分境壤散書國末略指封域書行者親遊踐也舉至者傳聞記也或直書其事或曲暢其文優而柔之推而述之務從實録進呈皇極二十年秋七月絶筆殺青文成油素塵黷聖鑒詎稱天規然則冒遠窮遐實資朝化懷奇纂異誠賴皇靈逐日八荒匪專夸父之力鑿空千里徒聞博聖望之功鷲山徙於中州鹿苑掩於外囿想千載於目擊覽萬里若躬遊敻古之所不聞前載之所未記至德燾覆殊俗來王淳風遐扇幽荒無外庶斯地志補闕山經頒左史之書事備職方之遍舉慧立本名子立高宗改為慧立俗姓趙氏天水人貞觀三年出家豳州招仁寺又充大慈恩寺翻經大德次補西明寺都維那後授太原寺主立聞諸佛之立教也文言奧遠旨義幽深等元穹之廓寥類滄波之浩瀚談真如之性相居十地而尚迷說小草之因緣處無生其猶昧况有縈纏八邪之網沈淪四倒之流而欲窺究宗因辨彰同異者無乃妄哉竊見大慈恩寺翻譯法師慧基早樹智力夙成行潔圭璋操逾松杞遂能躬遊聖域詢稟微言總三藏於胸懷包四含於掌握嗣清徽於曩哲扇遺範於當今實季俗之舟航信緇林之龜鏡者也所翻聖教已三百餘軸中有小論題曰因明詮論難之指歸序摧邪之軌式雖未為元門之要妙然亦非造次之所知也近聞尚藥呂奉御以常人之資竊衆師之說造因明圖釋宗因義不能精悟好起異端苟覓聲譽妄為穿鑿排衆德之正說任我慢之褊心媒衒公卿之前囂喧閭巷之側不慚顏厚靡倦神勞頗歷炎凉心猶未已然奉御於俗事少閒遂謂真宗可了何異鼷鼠見釜竈之堪陟乃言崑閬之非難蛛蝥覩棘林之易羅亦謂扶桑之可網不量涯分何殊此焉抑又聞之大音希聲大辨若訥所以淨名契理杜口毗耶尼父德高恂恂鄉黨又叔度汪洋之稱元禮楷模之譽亦未聞誇競自媒而獲縉紳之推仰也云觀夫夜星宵月繼西日之明三江九河助東溟之大相資之道在物既然傳襲之風於人豈異自法王潛耀之後阿難結集已來嵗越千年時逾十代聖賢間出英睿遞生各韞圖闕俱苞上智負荷遺法控御天人道制風飇神傾海嶽或舒指而流膏液或異室而朗奇光或連尸以伏天魔或一對而迥時主或願通法於邊剎冒浪波於嶮塗或虛已以應物求褁糧而行死地終令元津溢漾惠濟無疆既益傳燈實符付囑考之前冊可不然哉而清源不窮今復遇法師嗣承之矣惟法師星象降靈山嶽騰氣才過東箭譽美南金雅操不㣥堅芳獨拔以四生為已任建正法為身事巍巍乎似嵩華之負穹蒼皎皎焉若琅玕之映澄海而聰機俊骨發於自然味道輕榮率由天性至夫多識洽聞之奧冠恆肇而逾高詳元造微之功跨生融而更遠滔滔乎藹藹乎實紹隆之器也神之將使像化重光於頽季之期故誕茲明德者矣法師以往今古大德闡揚經論雖復俱依聖教而引據不同諍論紛然其來自久至如黎耶是報非報化人有心無心和合怖數之徒聞熏滅不滅等百有餘科竝三藏四含之涅槃大小兩宗之鉗鍵先賢之所不決今哲之所共疑法師亦躊躇此文怏怏斯旨慨然嘆曰此地經論蓋法門枝葉未是根源諸師雖各起異端而情疑莫遣終須括囊大本取定於祗洹耳由是壯志發懷馳心遐外以貞觀三年秋八月立誓束裝拂衣而去到中天竺那爛陀寺逢大法師名尸羅跋陀此曰戒賢其人體居二宗神鑑奧遠博間三藏善四韋陀於十七地論最為精熟以此論該冠衆經亦遍常宣講元是彌勒菩薩所造即攝大乘之根系是法師發軔之所祈者十六大國靡不歸宗稟義學之徒恆有萬計法師既往修造一面盡歡以為相遇之晚於是服膺聽受兼咨決所疑一遍便覆無所遺忘譬濛汜之納㣥流若孟瀦之吞雲夢彼師嗟怪嘆未曾有之若斯人者聞名尚難豈謂此時共談元耳法師從是聲振蔥嶺名流入國彼諸先達英俊聞之皆宿構重關共來難詰鴈行魚貫轂駕肩隨其竝論之詞雲屯雨至法師從容辨釋皆入其室操其戈取其矛擊其盾莫不人人喪輒解頤虔伏稱為此公天縱之才難酬對也戒日王等見之報喜皆肘步嗚足傾珍供養罷席之後更覺梵書并餘經論自如來一代所說耆山方等之教鹿苑半字之文爰至後聖馬鳴龍樹無著天親諸所製作及灰山住等十八異執之宗五部殊途之致并收羅研究達其旨得其文并佛處世之迹如泥洹堅固之林降魔菩提之樹迦路崇高之塔那揭留影之山皆躬伸禮敬備覩靈奇亦無遺矣法師心期既滿學覽復周將旋本土遂繕寫大小乘法教六百餘部請像七軀舍利百有餘粒以今十九年春正月草五日還至長安道俗奔迎傾都罷市是時也煙收霧卷景麗風清寶帳盈衢花幢土奄日慶雲垂彩於天表郁郁紛紛庶士詠讚於通莊轟轟隱隱邪風於焉頓戢慧日赫以重明雖不逢世尊從忍利之下閻此亦足為千載之休美也法師此行經途數萬備歷艱危至如涸陰沍寒之山飛濤激浪之壑厲毒黑風之氣狻猊貙犴之㣥竝法顯失侶之鄉智嚴遺伴之地班超之所不踐章亥之所不遊法師子爾孤征坦然無梗扇唐風於八河之外揚國化於五竺之間使乎遐域侯王馳心輦轂遠方酋長係仰天衢雖法師不世之功抑亦聖朝運昌感通之力也皇帝握龍圖而纂歷應赤服以君臨戮鯨豕以濟㣥生蕩雲霓而光日月正四維之絶柱息滄海之橫流重立乾坤再施鎔造九功包於虞夏七德冠於曹劉海晏河清時和嵗阜遠無不順邇無不安天成地平人慶神悅加以重明麗正三善之義克隆宰輔忠勤良哉之歌斯允既而功窮原載德感上元紫芝含秀於玉階華果結英於朱閣又如西州石瑞松縣琨符紀聖主千年之期顯儲君嗣承之業鳳毛才子之句上果佛日之文歷萬古而不聞當我皇而始出豈非明靈輔德元天福眷者焉加復遊心真際城塹五乘追思鷲嶺之容竚想提河之說故使遺形紺髮煥彩來儀勝典高僧相輝而至慈雲布於六合法鼓震於三千天花將景風共飛翠霧與香煙同馥於是溺俗沈流之士望彼岸而有期清虛蹈元之賓顧三空而非遠所謂司南啓路而衆惑知方商飈襲林而㣥籟自響法師盛德也如彼逢時也如此豈同雅澄懷道遇二石之凶殘安什傳經值符姚之僞歷校之深淺即行潦之類江湖比之明暗乃朝陽之與螢曜矣昔鍾玦既至魏文章賦以讚揚神雀斯呈賈逵獻頌而論異在禽物之微賤古人猶且詠歌况法師不朽之神功棟梁之大業豈可緘默於明時而無稱述者也立學愧往賢德非先達直以同霑像化叨厠末塵欣慕之懷迫於恆品所以力課庸愚輒申斯傳其清微令望之美絶後光前之蹤別當分諸鴻筆非此所能覼縷也冀明鑑君子收意而不哂焉贊曰生靈感絶大聖遷神其能紹繼唯乎哲人馬鳴先唱提婆後申如日斯隱朗月方陳穆矣法師諒為貞士迥秀天人不羈塵滓窮元之奧究儒之理潔若明珠芬同蕙芷悼經之闕疑義之錯委命詢求陵危踐壑恢恢器宇赳赳誠恪振美西州歸功東土屬逢有道時惟我皇重懸玉鏡再理珠囊三乘既闡十地兼揚俾夫慧日幽而更光曰余庸眇幸參塵末長自蓬門靡雕靡括高山斯仰清流是渴願得攀依比之藤葛
