front:
  text: 全唐文欽定全唐文卷一百四十九遂良字登善散騎常侍亮子初授秦州都督府鎧曹參軍貞觀中累拜中書令與長孫無忌同受顧命高宗立爵河南郡公拜吏部尚書同中書門下三品為右僕射諫立武昭儀為皇后左遷潭州都督再貶愛州刺史顯慶三年卒年六十三神龍元年武后遺詔復其爵位
  hash: sha256:0cc33bd8db59ef4df46931ebfcf8874328f285ce6736bd6299fb15a3ef3a62b9
  markers:
