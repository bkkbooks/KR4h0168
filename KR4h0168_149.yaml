body:
  text: 臣遂良言伏承風氣小動正進湯藥臣荷恩光不勝愁懼既聞御膳平和一則以喜伏惟陛下異人者神明同人者五情夫人之生以神為主神太用則虛形太勞則倦有此而不生疾者非所聞也陛下昔年力平寇亂及臨寶位憂勞萬國龍荒沙漠何所不思情切於此無時懈怠遂令陛下鬚鬢為之早白又數年已來耽翫書史每作文咏兼諸手筆日暮繼燭運心不停又詰朝與㣥臣論政數百千語音若韶夏理同蘭王若非辛勤何以得此且以天情愛好不能自息臣愚誠恐陛下今猶看讀夫人年踰四十筋力漸疲篤而不休更增疹疾然君以百姓為心百姓以君為命君體平康天下安寧陛下已讀得之者用之不可盡已知者當世不能踰伏願節諸言語且無披卷每減思慮微疴自遣天下蒼生之所幸賴臣不勝區區謹敢表聞伏願無覽臣之表遣傍人讀知臣章臣願足矣下愚之情伏深戰灼臣遂良言古稱君為元首臣作股肱梁棟榱桷隨能助化所謂成海取乎細流崇山由乎積壤然則為治之本在於擇人不正其原遂差千里周禮卿大夫之職考士德行獻之于王王拜而受之登于天府漢家以明經拜職或四科辟召必擇器任使量才命官然則市井子孫不居官吏大唐制令憲章古昔商估之人亦不居官位陛下許諸司令史捉公廨本錢諸司取此色人號為捉錢令史不簡性識寧論書藝但令身能估販家足貲財錄牒吏部便即依補大率人捉五十貫已下四十貫已上任居市肆恣其販易每月納利四千一年凡輸五萬送利不違年滿授職然有國家者嘗笑漢世賣官今開北路頗類於此在京七十餘司相率司副九人更一二載後年別即有六百餘人輸錢授職伏惟陛下治致升平任賢為政或太學高第或諸州進士皆策同片玉經若懸河奉先聖之格言慕昔賢之廉恥拔十取五量能授官然犯禁違公輒罹刑法况乎捉錢令史主於估販志意分毫之末耳目鄽肆之間輸錢於官以獲品秩荏苒年歲陛下能不使用之乎此人習與性成慣於求利苟得無恥豈蹈廉隅使居其職何向而可將來之弊宜絕本源臣每周遊民間為國視聽京師僚庶爰及外官異口同辭咸言不便臣無容靜嘿輕敢表聞伏願更勅朝臣遣其詳錄輒煩聽覽伏深戰慄謹言臣遂良言臣聞主祭祀之冑必資於嫡長擢文武之材無限於正庶故知求賢之務有異於承家前王制禮緣情斯極永嘉以來王塗不競在於河北風俗頓乖以嫡待庶而若奴妻遇妾而如婢廢情虧禮轉相因習搆怨於室取笑於朝莫能自悛死而無悔降及隋代斯流遂遠獨孤后罕睢鳩之德同牝雞之晨普禁庶子不得入侍自始及末怨曠未弭聖朝御治深革前弊人以才進不論嫡正自茲二紀多士如林今者簡千牛舍人方為此制臣竊思審於理未安何者母以子貴子不緣母也今以母非正室便言子無貴仕則趙衰孕於越婢遙集產於胡嫗田文枚臯皆妾子也文則播美於強齊臯則有聲於隆漢未聞前載有所間然此類甚多備存史冊不敢煩引輕黷宸嚴今反棄古實從近事以妬忌之政施明敭之日非徒英雋交屈固亦競端斯始王者設教務慎其源源流一開為弊必甚儻側室之子負才而不用君棄之於上家輕之於下忠孝不展友愛無施如此等人豈不怨憤雖隔千牛之選仍許三衞之宮色類乃復稍殊捍禦至竟無別若惟才是用人自甘心一彼一此異端斯起至於昨來檢括麤人公孫武遠及崔仁師等兒多是嫡子故知善惡由乎積習邪正寧限嫡庶必然之理不言可明伏願更量可否還遵昔制不使側室之冑有高才而被屈正妻之子雖至愚而獲用則嫡庶於此分鑣諍訟無因發矣前選已了不可更追乃今補闕猶得詳審臣蒙恩奬擢厠近司事有未安豈敢自默謹以表奏伏增惶悚臣遂良言竇智純不自循名陷於險薄既是陛下近親由來之所詣委然智純戚屬使任女為王妃結髮從我實為故舊書言昔在唐堯以親九族陛下憲章前事自須進退以禮方今刑網寬大不以疑罪與民宏基所注箭射舍中事已非實智純自藏獨樹狀又難明所以刑部大理各相得失陛下已出智純為開州刺史便是貶責正當處分已畢今之餘事只是窮逐語言但智純戚屬貴望親姻既蒞職居官布在朝野相逢談說言議是常兼復其婦積病在牀命懸朝夕即日刑部官司及在朝士皆不欲陛下更窮此事設令實推得智純自藏獨樹誣宏基家人刑名指歸殊非重大況又事跡曖昧猶未分明若久窮逐便成苛細生於物議虧損至德如臣愚見伏願更施天澤赦其所短情存故舊不失善聲即日在外議論如此臣猥居諫職而不敢不聞塵黷聽覽伏增戰慄臣遂良言臣聞三爵獻酬所以成禮七升為限謂之無度書之雅誥其慎在酒伏見去月二十七日為太子成婚訖北門賜三品以上宴自日辰時連至三更疲勞聖躬尤非盛事有識者云云皆言非是昔孫權漢后酒敗其德昔陳完謂齊景公曰臣卜其晝未卜其夜白日傾酌是陶神情伏願陛下更無夜飲臣以虛薄拾遺是司不辭嚴誅輕敢奏聞謹陳庸淺不勝戰越臣遂良言臣聞大聖文明必垂憲法使聽之者知善聞之者自新謂之中刑而終久無弊糠粃古昔而樹之風聲冠葢百王光茲至道伏惟陛下心記五車坐談千卷斷決機務必先至理臣昨日伏見勅至門下五品已上官人妻及女等有犯罪者並沒為官婢夫犯惡逆始用此刑不然歷代雜刑曾無此準聖主可以理平臣乞以一理敢煩天聽夫禁穢防姦既張羅網生民干犯必有其事今忽有三公六尚書等官當重寄或有子數人半居文武而此三公六尚書之婦忽犯姦淫披猖衢路沒為官婢其夫既恥其子亦愧更何顏以在列亦無面以當官合門恥辱一時俱棄至於九卿之室十二衞將軍之妻沒為官婢夫豈不愧雖有文武之幹珪璋之質朝廷之所嗤笑儕流之所指點自貽伊戚理須屏跡臣恐失諸人倫有從此起是以古者存其大體而畧其細微掩其家室而用其才能若沒其女亦為狼狽厥父與兄胡顏自處乞陛下審教化之本詳刑罰之要臣甘從鼎鑊更請一言忽若郡王近親縣主密屬有如此者若何處置若沒為官婢則非復國章若不為則同罪異罰臣詳案前載參驗當今輕敢思量實為不可臣荷陛下殊恩擢居近侍披跡庸流位班四品官高祿厚於臣願足俛仰而無過從容而悅聖顏所以敢犯雷電獻心帷扆者夙奉深恩願罄微節昔臣有慕汲黯而願其后為堯舜守茲愚誠欲崇主德雖則畏懼必冀陳聞伏願天明一垂矜察陛下必以為此事難容理須懲肅可更付近臣詳議增加其罪臣未敢出勅手執踟蹰敢冒宸嚴伏待刑憲臣遂良言昔人輸寫至誠必通幽顯是以落日迴光飛泉上出臣丹心不著空祈聽覽擢臣之髮不足讐臣今月五日詣虔化門進封表論五品以上官人妻及女等有犯罪者沒為官婢既未進旨下情惶懼臣又再三思量實為不可唯有身犯叛逆天下不容妻奴等始合配沒自茲以往曾無此例若犯姦罪身即沒官不敬舅姑則依常律自非中刑不可為教至於一婦沒官其夫及子同宗合門有大羞辱見在朝者皆不可用郡王近親縣主密戚或有如此事並具前表夫帝王作典謂之利用恐其罪而化之不因其罪而利之不驚人心不興物議教民以善不為異罰則三皇以來二百餘帝禁止姦穢皆無此法至於明聖獨用此刑既慙古昔終塵德義然則刑為政教之用政為社稷之本若再三如此天下依行臣恐政道因茲漸就流壞是以不避嚴誅更敢一請若即班行四方談議臣緘口不言罪合萬死執以陳聞伏候刑憲謹言臣遂良言昔者聖人之於鬼神也聞之而不獨信知之而不專恃是以顓頊依於鬼神制之以正不懼驚異增修仁德孔子不語怪力亂神伏惟陛下氣葢區中威移海外擁百萬之陣頓九夷之顙自書史所載未之前聞夫人歡樂則意氣高悲哀則膽力少自不可信茲訛惑轉移常操而宮中嬪列謂之婦人恇弱周章眼光浪見更相恐懼動一驚百雖有孟賁壯志孔翟精誠終不免聽之心疑聞之意動變異之來具諸前志自須制之以貞正厲之以安靜謂之為吉則變謂之為祥則嘉如臣愚見宜勅宮中眼花浪見不得報告傍人更相恐動亦不得專輒奏聞如此而不安然臣受死罪謹錄前載所見者為吉慶具別狀以聞臣遂良言昔聖人制禮尊嫡卑庶謂之儲君道亞睿極其為崇重用物不計泉貨財帛與王者共之庶子體卑不得為例所以塞嫌疑之漸除禍亂之源而先王必本人情然後制法知有國家必有嫡庶然庶子雖愛不得超越嫡子正體特須尊崇如不能明立定分遂使當親者疎當尊者卑則佞巧之姦乘機而動私恩害公或至亂國伏惟陛下功超邃古道冠百王發號施令為世作法一日萬幾未盡其美臣職在諫諍無容靜默伏見東宮料物歲得四萬段付市貨賣凡直一萬一千貫文魏王支別封及廩物一年凡直一萬六千貫文此便儲后俸料翻少於諸藩朝野聞見以為非是陛下往年行幸自洛陽還太子於闕首獻食家令無物可用遂內出綾綵貨充鼎實預是宮臣誰不聞見陛下必以為魏府支用見不足人多費廣此理可通然則至於儲君更宜增益臣謹按漢明帝披輿地圖等儲君戶口諸子租歲不過二千萬明德馬后為言亦不偏得此則防其嗜慾節其驕恣伏願陛下頗擇漢法宏蕩無偏儲君之用微附古昔然晉王陛下親自撫養至於成立上聖深慈偏所鍾愛傳曰臣聞愛子教之以義方忠孝恭儉義方之謂國家於東宮畧同魏府即目所覩未有殊別語其將來不可不慮若多其室宇唯欲崇高賜以金貝使其盈積家人多於餘國良馬超於列藩王成童之年已得如此長世以後嗜慾方生歲增則欣喜微減則失意財多則溢罕有克全寵祿過驕安能自制昔漢竇太后及景帝並不識義方之理遂驕恣梁孝王封四十餘城苑方三百里大營宮室複道彌望積財鏹巨萬計入警出蹕小不得意發病而死宣帝亦驕恣淮陽憲王幾至放敗賴其輔以退讓之臣僅乃獲免且魏王既新出閤恒存禮制言提其耳且示節儉自可在後月加歲增愛子豈慮不足微臣庸暗不知大體所有管見願悉言之特願天明曲垂省覽即日諸王僚佐皆選上才或幹職有餘識見猶闕莫不誘王財賄偏曲聞奏他王皆不得我王獨得之以此自矜以茲為美即日僚佐率多如此愚臣所見特謂不然傳曰上之化下如風之靡草也則眾人萬語不及陛下一言能成就保全唯在陛下留意子弟置嚴師傅諸王之國帝弟歸藩何嘗不德音懇切示其成敗此皆皇唐美制以為稱首諸王尊奉則無失然則芻蕘之說更有可觀愚臣千慮或一可採伏願陛下廣加教諭他王皆求請有一王獨足陛下則崇賞之他王皆戲有一王獨愛學陛下則崇賞之他王好獵有一王獨不遊陛下則崇賞之他王皆營作有一王獨靜處陛下則崇賞之上好之則下為之上賞之則下趨之雕琢諸王皆成退素如斯陷敗臣所不聞薰風所扇日馳千里既教之以謙儉又勸之以文學惟忠惟孝因而奬之道德齊禮乃為良器此所謂聖人之教不肅而成者也臣以不才叨居諫職甘從鼎鑊輕敢以聞煩讟之伏增戰慄昔兩漢以郡國理人除郡以外分立諸子割土分疆雜用周制皇唐郡縣粗依秦法皇子幼年或授刺史陛下豈不以王之骨肉鎮扞四方此之造制道高前烈如臣愚見有小未盡何者刺史郡帥人仰以安得一善人部內蘇息遇一不善人合州勞弊是以人君愛恤百姓常為擇賢或稱河潤九里京師蒙福或人興歌詠生為立祠漢宣帝云與我共理者惟良二千石乎如臣愚見陛下兒子內年齒尚幼未堪臨人者請且留京師教以經學一則畏天之威不敢犯禁二則觀見朝儀自然成立因此積習自知為人審堪臨州然後遣出臣謹按漢明章和三帝能育愛子弟自茲以降以為準的封立諸王雖各有國土年尚幼小者各留京師訓以禮法垂以恩惠訖三帝世諸王數十百人惟二王稍惡自餘餐和染教皆為善人此則前事已驗惟陛下詳察焉陛下兵機神算人莫能知昔隋末亂離手平寇亂及北狄侵邊西蕃失禮陛下欲命將擊之㣥臣莫不苦諫惟陛下明畧獨斷卒並誅夷海內之人徼外之國畏威懾伏為此舉也今聞陛下將伐高麗意皆熒惑然陛下神武英聲不比周隋之主兵若渡遼事須剋捷萬一差跌無以示威遠方必更發怒再動兵眾若至於此安危難測臣聞古者哲后臨朝明王創制必先事華夏而後夷狄務廣德化不事遐荒是以周宣薄伐至境而反始皇遠塞中國分離漢武負文景之聚財玩士馬之餘力始通西域初置校尉軍旅連出將三十年復得天馬於宛城採葡萄於安息而海內虛竭生人失所所以租及六畜算至舟車因之凶年盜賊並起搜粟都尉桑宏羊復希主意遣士卒遠田輪臺築城以威西城武帝翻然追悔情發於中棄輪臺之野下哀痛之詔以人神感悅海內乃康向使武帝復用宏羊之言天下生靈皆盡之矣是以光武中興不踰葱嶺孝章即位都護來歸陛下誅滅高昌威加西域收其鯨鯢以為州縣然則王師初發之歲河西供役之年飛芻輓粟十室九空數郡蕭然五年不復陛下每歲遣千餘人遠事屯戍終年離別萬里思歸去者資裝自須營辦既賣菽粟傾其機杼經途死兦復在其外兼遣罪人增其防遏彼罪人者生於販肆終朝惰業犯禁違公止能擾於邊城實無益於行陣所遣之內復有逃兦官司捕捉為國生事高昌塗路沙磧千里冬風冰冽夏風如焚行人去來遇之多死易云安不忘危理不忘亂設令張掖塵飛酒泉烽起陛下豈能得高昌一人斗粟而及事乎終須發隴右諸州星馳電擊由斯而言此河西者方於心腹彼高昌者他人手足豈得糜費中華以事無用書曰不作無益害有益其此之謂乎陛下道映先天威行無外平頡利於沙塞滅吐渾於西海突厥餘落為立可汗吐渾遺萌更樹君長復立高昌非無前例此所謂有罪而誅之既服而存之四海八蠻誰不聞見蠕動蠉生畏威慕德宜擇高昌可立者立之微給首領遣還本國負戴洪恩長為藩翰中國不擾既富且寧傳之子孫以貽永世臣聞周世問安三至必退漢儲視膳五日乃來前賢作法規模宏遠禮曰男子十年出就外傅出宿於外學書計也然則古之達者豈無慈心減茲私愛欲使成立凡人尚猶如此况君之世子乎自當春誦夏弦親近師傅知人間之庶事識君臣之大道使翹足延首皆聆善聲若獻歲之有陽春元天之有日月宏此懿德乃作元良伏惟陛下道育三才功包九敘新樹太子莫不欣欣既廢昏立明須稱天下瞻望而教成之道實深乖闕不離膝下常居宮中保傅之說無暢經籍之談蔑如且朋友不可以深交深交必有怨父子不可以滯愛滯愛或生伏願遠鑒殷周近遵漢魏不可頓革事須階漸恒計旬日半遣還宮專學藝以潤身布芳聲於天下則微臣雖死之日猶生之年臣聞有國家者譬諸身兩京等於腹心四境方乎手足他方絕域若在身外臣近於坐下伏奉口勅布誥臣下云自欲伐遼臣數夜思量不達其理高麗王為陛下之所立莫離支輒殺其主陛下討逆收地斯實乘機關東賴陛下德澤久無征戰但命二三勇將發四五萬人飛石輕梯取如迴掌大聖有作必履恒規貴能克平兇亂駕御才傑惟陛下宏兩儀之道扇三五之風提厲人物皆思效命昔侯君集李靖所謂庸夫猶能掃萬里之高昌平千載之突厥皆是陛下發蹤指示聲歸聖明臣旁求史籍訖乎近代為人之主無自伐遼者人臣往征則有之矣漢朝則荀彘楊僕魏代則母邱儉王頎司馬懿猶為人臣慕容貞僣號之子皆為其主長驅高麗虜其人民削平城壘陛下立功同於天地美化苞於古昔自當超邁於百王豈止俯同於六子昔翦平寇逆大有爪牙年齒未衰猶堪任用匪惟陛下之所使亦何行而不克方今太子新立年實幼小自餘藩屏陛下所知今一旦棄金湯之全渡遼海之外臣忽三思煩愁並集大魚依於巨海神龍據於川泉此謂人君不可輕而遠也且如長遼之左或遇霖雨滂沱水潦騰波平地數尺夫元菟濱海途深難測非萬乘所宜行踐東京太原謂之中地東撝可以為聲勢西指足以摧延陀其於西京逕路非遠為其節度以設軍謀繫莫離支頸獻皇家之廟此實處安全之上計社稷之根本特乞天慈一垂省納莫離支虐殺其主九夷所不容陛下以之興兵將事弔伐為遼山之人欲報主辱之恥古者討殺君之賊不受其賂昔宋督遺魯君之郜鼎桓公受之於太廟臧哀伯諫曰君人者昭德塞違今滅德立違而置其賂於太廟百官象之又何誅焉武王克商遷九鼎於雒邑義士猶或非之而况將昭違亂之賂器置諸太廟其若之何夫春秋之書百王取則若受不臣之筐篚納弒君之朝貢不以為何所致伐臣謂莫離支所獻自不合受君為元首臣號股肱龍躍雲興不嘯而集苟有時來千年朝暮陛下昔在布衣心懷拯溺手提輕劒仗義而起平諸寇亂皆自神功文經之助頗由輔翼為臣之懃元齡為最昔呂望之扶周武伊尹之佐成湯蕭何關中王導江外方之於斯可以為匹且武德初策名伏事忠勤恭孝眾所同歸而前宮海陵憑凶恃亂干時事主人不自安居累卵之危有倒懸之急命視一刻身縻寸景元齡之心終始無變及九年之際機臨事迫身被斥逐闕於謨謀猶服道士之衣與文德皇后同心影助其於臣節自無所負及貞觀之始萬物惟新甄吏事君物論推與而勳庸無比委質惟舊自非罪狀無救搢紳同尤不可以一犯一愆輕示遐棄陛下必矜元齡齒髮薄其所為古者有諷諭大臣遣其致仕自可在後式遵前事退之以禮不失善聲今數十年勳舊以一事而斥逐在外云云以為非是夫天子重大臣則人盡其力輕去就則物不自安臣以庸薄忝預左右敢冒天威以申管見臣聞信為國本百姓所歸是以文王許枯骨而不違仲尼寧去食而存信延陁曩嵗迺一俟斤耳值神兵北指盪平沙塞狼山瀚海萬里蕭條陛下兵加諸外而恩起於內以為餘寇奔波須立酋長璽書鼓纛立為可汗其懷恩光仰天無極而餘方戎狄莫不聞知以共沐和風同飡恩信頃者頻年遣使請婚大國陛下復降鴻私許其姻媾於是報吐蕃告思摩示中國五尺童子人皆知之於是御幸北門受其獻食於時百寮端笏戎夷左袵虔奉歡宴皆承德音口歌手舞樂以終日百官會畢亦各有言咸以為陛下欲得百姓安寧不欲邊境交戰遂不惜一女而妻可汗預在含生所以感德今一朝生進退之意有改悔之心臣為國家惜茲聲聽君子不失色於物不失口於人晉文公圍原命三日糧原不降命去之諜出曰原將降矣軍吏請待之公曰信國之寶也民之庇也得原失信何以庇之陛下慮生意表信在言前今者臨事忽然乖殊所惜尤少所失滋多情既不通方生嫌隟一方所以相畏忌邊境不得無風塵西州朔方能無勞擾彼胡以主被欺而心怨此士以此無信而懷慚不可以訓戎兵不可以勵軍事伏惟陛下以聖德神功廓清四表自君臨天下十有七載以仁恩而結庶類以信義而撫戎夷莫不欣然負之無力其見在之人皆思報厚德其所生允嗣亦望報陛下子孫今者得一公主配之以成陛下之信有始有卒其唯聖人乎且又龍沙以北部落無算中國擊之終不能盡亦由可北敗苪興突厥兦延陁盛時以古人虛外實內懷之以德為惡在夷不在華失信在彼不在此伏惟陛下聖德無涯威靈遠震遂平高昌破吐渾立延陁滅頡利輕刑薄賦庶事無壅菽粟豐賤祥符累臻此則堯舜禹湯不及陛下遠矣伏願旁垂愷悌廣茲含育而常嗔絕域有意遠藩非偃伯興文之道非止戈為武之義臣以庸暗忝居左右敢獻瞽言不勝戰懼臣聞君子不失言於人聖主不戲言於臣言則史書之禮成之樂歌之居上能禮其臣臣始能盡力以奉其上近代宋孝武輕言肆口侮弄朝臣攻其門戶乃至狼狽良史書之以為非是陛下昨見問張元素云隋任何官奏云縣尉又問未為縣尉已前奏云流外又問在何曹司元素將出閤門殆不能移步精爽頓盡色類死灰朝臣見之多所驚怪大唐創歷任官以才卜祝庸保量能使用陛下禮重元素頻年任使擢授三品翼贊皇儲自不可更對㣥臣窮其門戶廾昔日之殊恩成一朝之愧恥人君之御臣下也禮義以導之惠澤以驅之使其負戴元天罄輸臣節猶恐德禮不加人不自勵若無故忽畧使其羞慙鬱結於懷衷心靡樂責其仗節死義其可得乎秦始皇既幷天下取趙璧琢而為之方四寸紐五盤龍面曰受命于天既壽永昌丞相李斯之小篆也璽上隱起為盤龍文曰受天之命皇帝壽昌歷代傳之謂曰傳國璽也秦滅傳漢歷王莽為元后投之於地一角小缺莽滅校尉公賓龍以璽詣更始以璽上劉盆子盆子面縛入於後漢光武靈帝崩少帝失位掌璽者投於井為孫堅所得袁術拘其妻而奪之術死荊州刺史徐璆得還許獻之漢滅傳魏魏又傳晉懷失政璽投劉聰聰死劉曜得之傳於石勒季龍冉閔季龍磨其隱起之文刻其旁曰天命石氏冉閔敗其將蔣幹以璽送建業歷東晉宋齊梁侯景陷臺城簡文以璽上景景將侯子般盜璽走至棲霞寺僧惠永得之陳永定三年僧死弟子普智奉璽獻陳陳止傳隋隋末沒於宇文化及及又沒於竇建德至大唐武德四年太宗文武皇帝為天策上將軍東討擒竇建德德妻曹氏及左僕射裴矩奉璽上獻天子八寶有國之符印也一曰神璽所以承百王鎮萬國也二曰受命璽所以修封禪神祇之用三曰皇帝之璽答疏於王公用之四曰皇帝行璽勞賚賢臣功勳用之五曰皇帝信璽徵召臣下則用之六曰天子之璽答四夷書信用之七曰天子行璽撫四夷用之八曰天子信璽發番國兵用之衞宏漢議曰皇后太子以金為之神璽受命璽皆為傳國之璽其六璽皆六螭獸紐文曰皇帝之璽皇帝行璽皇帝信璽天子之璽天子行璽天子信璽虞喜志林曰所封事異故文字不同漢儀又云以皇帝行璽為凡雜以皇帝之璽賜諸侯書以皇帝信璽發兵其徵大臣以天子行璽外國之事以天子之璽鬼神事以天子信璽皆以武都紫泥封青囊白素裏兩端絳尺一板中約署有事及發外國兵用天子信璽封拜外國及徵召用天子行璽賜匈奴單于外國王用皇帝信璽諸下銅獸符發郡國兵用皇帝之璽封王公以下遣使皆用皇帝信璽若駕行幸次直侍信璽以從天子之璽合璽其用以玉其封以泥皇后及太子之信曰凡大朝會則捧璽以進其用以金於御座車駕行幸則奉璽從於黃鉞之內今元正朝會則進神璽及受命璽為五轝若行幸則合六璽為五轝函籙封盛以從符璽郎四人從六品掌天子六璽及傳國之璽其所用有事則於內行事畢則奉而藏之貞觀十三年四月九日奉勅內出樂毅論是王右軍真跡令將仕郎直宏文館馮承素模寫賜司空趙國公長孫無忌開府儀同三司尚書左僕射梁國公房元齡特進尚書左僕射申國公高士廉吏部尚書陳國公侯君集特進鄭國公魏徵侍中護軍安德郡開國公楊師道等六人於是在外乃有六本並筆勢精妙備盡楷則褚遂良記潭府下濕不可多時深益憒顇況兼年暮諸何足言疾患有增醫療無損朽草枯木安可嗟乎自離王畿親故阻越每思宿曩寧喻于心承汝立行可謩出言成軌遷居要職擢任雄臺聞之嘉聲增以羡慕更得汝狀深美吾誠因奏事間方便在意徙居此土深成要佳汝悉也五月八日舅遂良報薛八侍中前山河阻絕星霜變移傷搖落之飄零感依依之柳塞烟霞桂月獨旅無歸折木葉以安心採薇蕪而長性魚龍起沒人何異知者哉褚遂良述家姪至承法師道體安居深以為慰耳復聞久棄塵滓與彌勒同龕一食清齋六時禪誦得果以來將無退轉也奉別倏爾踰卅載即日遂良鬚鬢盡白兼復近歲之間嬰茲草土䴏雀之志觸緒生悲且以即日蒙恩驅使盡生報國塗路近止無由束帶西眺于邑悲罔更深因姪還州慘塞不次孤子褚遂良頓首和南維貞觀二十三年歲次已酉五月甲辰朔二十六日已巳大行皇帝崩於翠微宮之含風殿旋殯於太極殿之西階粵八月庚寅將遷座於昭陵禮也鳳紀凝秋龍帷將曙溘化同軫綿區縞素哀子嗣皇帝諱覽風樹而增感攀銅池而拊膺逼宗祧之是寄傷往駕之無憑奠樽盈而悲序促靈景翳而愁雲興去劒滋遠情徽方閟爰詔司存傳芳瓊宇其詞曰三微固祉五耀垂文光昭司牧對越唐勛族著元牝家傳縉雲高祖配天一人有慶大行神武維幾作聖良書自得高文成性夙表餘雄先懷反正蒼兕爰發朱旗首令寰瀛昏墊關洛荒蕪妖傾地軸盜弄乾樞戎衣光啟霸政宏謨天兵電照月陣風驅蚩尤遞剪猰窳咸誅閏位不虔餘分興戾先收秦組次焚商袂轉圜上畧容光下濟從邑垂仁賓門灑惠修風順軌凝圖奉睿青戾同規元殊叶契發揮三五聲名遐裔泛野休兵靈臺偃革升巖藏銑遵河奉璧學肆徐輪邱園散帛就日攸宜如天在斯形哀動植化美塤箎樂華曾舉禮葉旁垂沙場罄翦斗極咸羈狼山入囿潮渚歸池東旌若木西斾條支龍卿委質鳥服來儀大矣乘時悠哉利見文龜浮沼應龍在淀潏露飛甘卿雲呈絢松荑望幸瑤華方薦仙丹劒術星飛告變凝沴氣於千年掩璿暉於離殿嗚呼哀哉宏璧陳階鈞天罷舞夢齡遐想宮車晏出大隧弗營元龜獻吉展軨効駕羲和司日迫靈心於將餞痛皇情其如失凝清秋於廣陌遡悲風於長術經栢梁而徐轉邁蘭池而從蹕聳輕斾之逶迤動邊笳之蕭瑟嗚呼哀哉周營甫竁漢啟泉闈穀林搖落喬巖變衰平原淒兮白日遠深渚澹兮秋雲飛覽銅雀而興慕傷鼎湖之不歸嗚呼哀哉崤陵元壤隅山窮路肅衞翻英輕池委素羲庭易晚松陰難曙萬方悲而雨泣三靈慘而雲沍嗟厚德之長違仰高天而攀慕嗚呼哀哉崇基永煥置業方昭遺風餘烈天長地遙想神襟而騰茂縱史筆而揚翹籠嘉聲於日月終有裕於唐堯嗚呼哀哉永徽二年九月余判同州夜靜坐於西廳若有若無猶夢猶醒見一女子高髻盛妝泣謂余曰妾漢太史司馬遷之侍妾也趙之平原人姓隨名清娛年十七事遷因遷周遊名山攜妾於此會遷有事去京妾僑居於同後遷故妾亦憂傷尋故瘞於長樂亭之西天帝閔妾未盡天年遂司此土代異時移誰為我知血食何所君亦將主其地不揣人神之隔乞一言銘墓以垂不朽余感寤銘之銘曰嗟爾淑女不世之姿事彼君子弗終厥志百千億年血食於斯蓋聞翊亮天儀處師臣者參聖丹青景化應圖緯者鄰幾若乃闕一字靈闕之表經綸帝績仰代元造之功論道太階獨見於文昭公矣公諱元齡字闕五字人也闕河闕一字繼響承家鎮聞韶之雅俗曾祖闕一字後魏闕一字安太守襲闕二字武闕三字歷清闕皇朝贈徐州都督臨淄定公政以禮成教由言滿通德之門早聞闕精通未兆同后邰之克嶷良由自然體曲昇之多才非闕年十有八俯從賓貢澹乎藏器世莫能知吏部侍郎闕二字基闕二字之闕之闕十字成闕一字簡詔徵碩老典校文自非學擬更生方膺妙選闕五字得闕二字公以闕外闕一字歲序厂田坴懷終身永切至哉天性獨越人靈於時道闕以闕四字之鑒方深在慇憂而未晞隱如之寄斯重太宗時稱元帥乃命公為記室於是臨戎習禮奉闕一字司闕一字之闕敵飛箭下億丈之城故以敷暢軍謀弻舞干而制勝宏宣廟畧闕公為冠首累加上柱國封臨淄侯俄而釁闕三字禍胎滋蔓闕一字叔闕一字兵闕而闕一字主約沈族以酬恩俄然內闕三字英威纂統引以為右庶子闕十二字太宗御歷遷中書令封邢國公邑三千戶實食闕一字州賦一千三百戶闕高祖太宗二實錄合冊歲賫闕一字周闕四字代史合三百闕一字七闕二字復闕獨闕五字矣俄遷尚書左僕射當朝作紀巨闕二字分闕一字國闕二字鴻闕一字必舉闕一字衡闕高祖升遐帝不言政吉凶機務大小責成園寢規闕二字副闕喻奄宅於龜蒙公固辭裂土詔從其義尋加太子少師闕二字二闕一字並闕土斯平致河圖於東序洎乎今上升儲道光守器長春闕二字方嗣虞風仙闕一字流聲闕一字揚闕一字化闕風闕七字寓故藉羲馭之功少海浮霄尚假朝宗之助增天益峻意在茲乎尋而闕撥亂飲雪披榛晚贊天成憂深責厚罄其心力遘此沈闕一字古人有言曰形大勞闕太宗驚其色憂親加察問方依實奏帝用憮然馳遣良醫幷賫御藥闕殊不闕一字身愒視光陰益深憂國高陽公主為其子妻附闕一字諫闕二字逾闕將第三子遺則為朝散大夫使及目前見其通顯恩波闕四字無闕太宗俯閱巨川悼藏舟之夜失今上緬惟過隙闕三字之闕三字紹闕陽闕十一字鼓闕一字班劒卌人葬事所須並令優給仍特降旨許闕一字墓碑闕二字遂闕二字臣之闕並闕三字神契德洞天經體孝闕四字形闕一字少闕一字徒讖闕一字瑤光而識闕二字歲踰闕山不復逝水無追家闕四字與而謀曰昔闕一字國懷闕三字音闕辰精降說華靈誕震台嶽資神齊光含峻闕一字我闕一字網闕二字掩闕一字道契文闕一字聲闕聖賢同德君臣協志穹壤闕一字平幽遐必闕一字革闕一字從闕一字羈闕鬱掞詞雕煥始發如綸俄成壯觀闕二字總務玉鉉調闕一字儀形濟濟闕門當魯館邸照姬車卜居昭儉闕二字防奢禮崇身約闕一字邇情遐闕易闕二字道難明德暉不昧環景齊明
