body:
  text: 愁之為物也親賤貧傲富貴無賢知兮不肖事違衷而必至非元黃之色殊甘辛之味其去也若緣雲之難其來也類走丸之易愁兮愁志士蹇以徘徊鬱風雲之氣挺棟梁之材思宏廓以經濟刻洪勳於鼎鼐命路猶隘天衢未開滄波悠悠以東注白日忽忽其西頽元德拊髀以泣下孔明抱膝而思來愁兮愁靜女悵其誰語聳端操而不爽抱明心以自處當泮冰之良辰期鳴雁之得侶桃李艷於淑景蕙蘭生於幽渚望蹇修兮不來念良人兮何許愁兮愁邊塞兮行役始忘家而徇國忽時淹而歲積金河流而更遙銅柱去而太劇凝雲披嶺驚沙滿磧馬向北以嘶風人上隴而吹笛功名慨其緬邈鬢髮颯以斑白伏波據鞍而骨驚定遠操戈而涕激愁兮愁禁掖兮恩光爭修曼態競飾明璫動千金之巧笑希一顧於君王嬌妒盈於思慮移奪起於毫芒何長門之咫尺邈阻絶乎陵岡宮殿深兮月皎歌吹清兮夜長班姬無言以掩扇陳后回裾而就牀愁兮愁春與秋兮登臨放臣寓目遊子開襟楓江千里青壁萬尋微波蕩漾灌木蕭森香雜花而覆水見高葉之亂林起宋玉之沈思傷屈平之遠心愁兮愁往事紛其斷續申生被譖周勃受辱樂毅無階以返燕黃權何計而歸蜀投令君於虛器疑卞和之美玉李廣失路於胸奴徐市泛舟於海曲過山陽而日晚望西陵而樹緑包胥感激於秦庭鄒陽畏逼於梁獄愁兮愁羇志杳而無伴鴻漸於陸層霄未半懷戴君與利物每行吟而坐歎安得百斛之醇醪使斯愁也霞開而雲散者哉貞元十四年我常侍鍾陵之政成繇賦均調法令修理男女大小祗承教化土地千里蚩蚩浩浩莫不剗心化為端良然後覃思閒暇將有改築自我宮府至於門臺是用乘時洗故作新先是城有贅墉橫亘東西盤護便地甚曰無壯瞻彼闉闍亦特其門崇未及雉廣不容軌公斸掘平夷垣修塗壞撤規模巖巖四扉每五夜將旦候吏雲委鼓鳴逢逢輷然洞開軒蓋絶塵而並騖軍旅擁關而坌入旗過優游馬不駢蹄徘徊流覽勝氣洋溢改作之致騰淩前人真卓然之思也君子謂公氣冥元極智遊象鬱以盛德統於大位苟視民之弊吾見其雍閼不和之氣決防潰澤之不若也豈復有煩寃濫之志漸於風俗哉循跡觀改正在於是公嘗自濡翰有所紀敘實恐揮謙休聲不揚小子愚陋贊述銘頌請刻於貞石之陰使新門之績也皇皇然頌曰鍾陵古城隘不工麗譙隙穴廢崇墉右貂作鎮寢前蹤中央砥平溪蒙籠嚴城朝旦日曈曈高開四門車馬通此邦此績垂無窮敢紹華藻揚清風城于防春秋書之重時也城于蘄輿人誦之美功也何可謂之功曰余得言之矣大唐庚辰歲秋九月嶽鄂觀察使御史中丞鄭公前牧於蘄春始佩銅虎符是年冬十一月蔡人不虔天子詔諸侯之師誅破之我有疆場與人腹背慮禍甚劇為虞落然民大愁恐若寇暴至是邦也夙昔無事人傲慢垂百餘祀城隍不張頽墉壞堞僅為平野公乃度舊址量客土備畚鍾嘯丁壯勃焉而興於是謹刀布以索力考鼛鼓以蕩氣嚴進退以設令立師伍以程課蒸徒雷呼萬鎚星飛誅惰聳勞間無留時凡甲子五癸即崒然城成矣墉高三雉門容兩轍周回一千八百四十步門臺睥睨霞赩雲截如崇山斷岸邈不可嚮議金湯者我居首焉日者嗣曹王皋討希烈之叛於此嘗具板幹作為坯築役徒巨億經費稱是樹而復潰卒無能名風俗耉老以為蛟螭靈怪蟠窟固護使人不見其績也公躬自省視循理辨物心禱且計輔之至誠遂用堅緻嗚呼蘄城楚舊封也疆淮蔡邇申息地當隘束實生攻奪若嚮時敵者驅鐵衣出穆陵襲我無備搖脛而至即江淮之南吾見其波動矣然俾夫大藩倚其固屬郡抱其勢千里士庶高枕而臥寇不致萌彎弓捻矢之意者新城之謂也繇是大君聽民間威聲聞望以公有文武上才秉心塞淵可以防方隅可以握權貴故拔自倅牧雄居盛府山川幢蓋皆舊物也寄任之重敻無其鄰夫賢為世出績因時達微新城吾見公之力才事業其堙鬱不揚乎鯫生作頌頌以後辭曰庚辰之歲鶉首有彗人用五兵維彼蘄下壃及風馬實啓戎情在昔無虞蔑其闉闍埤堞頽傾我公作守恢拓荒舊乃新其城百堵言言四阿孱顏矗如雲平扼衡據會寇不敢過生人休戚維茲盛烈遭時而發鴻振芳名我有貞石不追不琢孰聞風聲是用作頌冀茲不朽與日永明虎在毛物有剛猛而為暴者也畋而獲之覩令施而士勇者也且荊為澤國疆亘雲夢伐麕麚弋鴻雁蓋便習也唯獲虎則異故大而張之六年冬十二月臘日甲辰節度使御史大夫樊公大畋於郢城修軍禮也先期之辰命耆將宿帥將騎步兵五千盛陳於所舍之地越翌日朝陽始升郊牧靜夷建大斾之彤彤抗高旌之萎蕤無小無大千㦸萬羽閃舒絢煥膠轕磢錯狀濤湧而波汨咸從公而觀之於是樹蘭防列轅門表旗鼓而卒伍縈紆遼蔓星陳鱗次中軍發號沸渭四起拉榛棘祕梗橦高坱埤踣健足剗驍翅脂染鳴鏑血湔飛幟或潰潰以狂顧或奔猭而滅地竭鋭精以圖免雖絶脰而猶視士氣方雄乃縱火攻烈焰炎炎燒雲飈風烻陰深巷薈翳蒙籠抃呼未終山平澤通其有冒鬱攸走煤燼蒙茸袒裼徒摶獨殺者不可勝道維明日復圍於龍山之北岡先是里人之訟乳虎為暴肆毒貪婪白晝族行圈皂無豕牛林麓絶樵蘇老幼愁恐極於兵寇既卜其穴乃大搜而取之爽氣凌厲士拗餘怒思與鬬死莫有異慮敲扣拍撲芟殺策石剝洞篁篠之冥密劃蒙蔓之纍絡勢窮則搏鬬於莽下觀其怒氣之所狡憤迅軀之所騰跱鋸牙之所噉齚鉤爪之所拏玃傑作人立呀若箕張聲軒暴雷目爍燦炬爰有一人烏獲之倫威鬱喬傑彳票狡獷決憑髯奮怒毛竪眥裂鐏長㦸以撐拒乃匐身而掩刃勢傾力絶四偃在地穿喉貫背爪有餘搏於是騰氣射虹霓酣譟破山林耋老慶童幼抃淋漓贔負獻於公所公以為天稔其毒必將妊孕剖視其腹即獲乎四子矣於是回鑣返斾校能計獲發府庫行飲勞賞功也大凡古者天子諸侯四時皆畋因畋以理兵先視其禮儀次察其號令後觀其坐作進退之度有不用命者乃斬之以狥於衆焉武德修備乃事搜狩上以奉宗廟下以禮賓客其有肉不登俎材不中器則謂之不軌不物而君子譏之今大夫法先王之制順時序之氣展敬農隙大講戎事卒乘具文章明武修也威儀肅行伍列禮盛也無逸飛無漏走令張也繄是三者備足焜耀况乎啓沉毅誅暴橫耽耽五虎斃在指顧是得不謂動合模範成堂堂之觀乎公常握文武之柄荷申甫之寄擁旄荊國星霜四周流愷悌之仁布大中之化政之被民者如陽和熙熙蒸變生物各遂暢達不知其然故無得而稱焉洎於軍旅之際德禮也如是勇練也如是播此智略寓諸形容因知公之師可以振文經可以翊皇威可以截不庭可以攝四夷與上古儔侶赫赫巍巍即豈獨躪荒山殪猛獸馳騁觸蹶左旋右抽而已哉載末儒也猥以縫掖獲陪鞭弭之後目覩盛烈失去畏懦敢愛文字使其暗然而不彰乎乃作頌曰元陰凝兮殺氣厲揚三軍兮順時殺鋋㦸羅兮山谷隘飛走殫兮林莽壞有虎勃起兮萬夫駭闞呀夭矯兮雷霆唱紆沉慮兮振明戒于一奮兮傾五害旋勝軍兮翻大斾空皋藪兮樂幼艾勇毅之師無與對可誅不王截海外臣某言今月某日中使某官至伏知聖旨賜淮西節度使吳少誠米若干石鹽若干石帛若干匹雨露之潤忽沾於焦旱生育之德忽被於饑寒凡在臣庶孰不慶幸臣某誠歡誠喜頓首頓首日者少誠迷誤興兵淮蔡陛下開日月之耀霽雷震之威洗其瑕穢復賜圭爵使螻蟻重安於窟穴草木再洽於恩光大義易凶邪之心和平銷悖亂之氣今復恤其歉儉賜之粟帛聖澤灑危疑之地皇慈周反側之人合救時之宜塞未萌之釁微禽食椹尚懷好音萬夫戴恩豈不知感此所謂睿圖宏遠神武深沉善戰於仁施之中伐謀於茫昧之際武何戈而不止物何化而不從增七德之輝華動八紘之踴躍臣叨居將相職守藩維不獲奔走稱慶宮闕無任歡抃懇之至謹奉表陳賀以聞臣某言臣聞臣之事君猶子之事父苟閨庭之侍曠晨昏之禮絶擬議名教得為孝子乎臣自違天顏二十餘載身不趨宮闕之地心不展烏鳥之誠戴天嚮日肝肺焦灼况臣暮齒筋力漸衰以中人之材當大藩之寄智慮昏殆政術荒踈自揣封疆固多敗纍豈可使萬人稟無德之令四方興尸祿之譏局形顧影月慙歲恥方今赫赫大國髦彥如林采於衆才必超十倍伏願陛下暫回慈眷俯察愚衷念蒼生之疲授能者之位即微臣無妨賢之愧大君有任用之明得公論於搢紳盡私誠於犬馬再以白首獲奉紫宸備一刻於周行實百生之榮耀前後陳乞煩黷聖聰雖懇迫之未伸瞻軒墀之已近不勝慺慺之至臣某言得廬州刺史裴靖狀稱巢縣百姓唐海母喪廬墓手自耕植以備祠祭無何於粟田之中輒産嘉禾一本六穗一本五穗即時差録事參軍朱寧丁寧考驗事狀明白臣聞感天地者存乎誠通神明者極乎孝蘊而為精粹發而為禎祥上元與之獻酬后土為之泄露故使騰芳高隴擢穎清秋冠九穀之英英增大田之藹藹此皆陛下聖德茂鴻化洽名教立風俗厚生人之內有淳孝靈瑞之下有嘉禾邁風烈於前王煥丹青於唐史不然何幽贊元答其若是乎臣猥以鈍劣祇守風土宣陛下之恩澤撫陛下之庶氓覩茲盛美光榮耳目不勝歡忭踴躍之至臣某言中使某至伏奉詔旨並賜臣及將士冬衣等來自九天頒於下土手捧目視霞開雪凝是何眇爾之賤質膺此爛然之盛服臣某中謝臣久在藩條無裨政術每懼素飧之責以成負粟之羞陛下含貸優容天覆地載伏念微臣之羸老且憂將校之寒沍賜之以衣服寵之以光榮俱無汗馬之勞已有維鵜之刺雖君父德大不求於所酬而臣子感深自期於必死無任感恩懇激之至謹奉表以聞臣某言中使朱萬春至伏知聖旨念臣風疾賜臣手詔並賜御札藥方四道天使忽臨宸翰猶濕跪捧驚越不知所從臣某中謝前月九日臣飲食失宜誤為熱風所中初甚沉頓肢體不安今暫調護稍用衰退伏以微臣之疾貽陛下之憂降駟騎於雲霄出神方於禁掖循端究末味密思精補神農之闕遺蔑桐君之漏略乾坤恩重螻蟻感深將欲調和已知平愈此所謂半枯之樹遇陰陽而扶踈既涸之魚值洪波而奮迅仰天忭躍局地兢惶惟兩曜以鑒誠何百年之可報不勝感戴懇迫之至臣某言今月日中使郭忠政至伏奉手詔以臣微疾尚軫聖懷日月私臨於幽蟲雨露曲霑於旱草感戴所迫若無精魂臣某中謝臣初中風疾狀候頗劇自蒙聖澤特賜神方酌和劑之宜備甘辛之味曾不信宿已覺痊平伏以聖意廠田坴綿此方神異思慮超古今之表重輕得損益之中故以藥攻病如水灌火且以鴻恩為湯餌何榮衛之不調以造化為岐和何膏肓之不去邱山至重草芥極微報恩之分殺身後已不勝激切危懇之至謹奉表陳謝以聞臣某言中使某至伏蒙詔旨褒臣政事慰疾病並示除改廬州刺史路應等五色絲綸九霄雨露光華潤澤人併集微臣捧戴兢惶無地容措臣某中謝臣伏見自淮而南天下重鎮臣叨受旄鉞僅二十年人無夭昏歲屬豐稔瞻彼疆域小有康寧此皆陛下睿謀鴻化之所被及豈臣薄劣自能致理臣所患風疾漸至降損飯食甘適肢體便安此皆陛下神方祕術之所攻療非臣調護所能平愈伏見除改諸州刺史等路應和而明裴靖才而通羅珣斷而達李正明強而毅陛下或以賞授或以能遷或增之以憲司或擢之以棘寺實所謂宸鑒高遠睿獎宏深雖虞舜官人之美無以過此臣才非申甫恩重嵩華惟局地以倣徨敢窺天之遠近不勝懇切慺慺之至謹奉表陳謝以聞伏見自建功汧隴之後天子念重付託西蜀擁旄仗節垂二十年能斷西戎之股臂鑿南蠻之耳目獻驃國之絃管摧芥蒂之橫猾四方仰首威聲赫然是何才略如是之偉也巴岷之人蒙恩惠被法禁秋霜膏雨不足為喻是何教化如此之美也於戲大丈夫生於天地之間功德富貴而已矣今令公英姿玉色照灼當世勳業格皇天崇高如泰山若使圖丹青刻鐘鼎為有唐一世之盛令公獨得之矣某頃不自揆謬隱匡廬間其所務者不專文字亦嘗有意窺佐王治國之術思樹勳不朽之事心長才短難進易退徘徊林壑屢易星霜齒髮蕭索無所成遂雖命使然也亦實慙質鈍自成都違奉馳心旌麾高卑勢殊分絶干請一昨戀慕滋甚不敢寧處因修狀疏並獻拙文不謂滄溟量深轉涵微細猥見下答仍賜褒寵蓬蓽之下煥然有光臨風悚息不知所措某氣性野直寡儔少合宇宙至廣迥無知音遭逢知音便是死所伏惟令公上才宏識傑出人表律呂一動變寒為溫伏知小生爰自茲日至於沒齒無沈痼之恨矣然九霄之鴻假徑翮而飛者也萬斛之舟假長風而逝者也鴻與舟不翮不風皆摧頽朽蠧之物也安能自運哉輒敢比况輕塵視聽伏計令公發函之際當不哂飛逝也新文五章音以賞奏重干宗匠伏惟俯賜省覽幸甚幸甚伏惟尚書雲霄之祿位汧隴之勳業河海之宇量青萍之操持斯事已形丹青載在太常野人復欲云云則若詠滄溟之深頌泰山之高識者聞之以為悠悠腐儒僕不曉事故略而不書某聞獸饑思食士窮思遇此生物之常也其有食不濟遇不至常情必然某則否何哉夫蘭有香雖植蘙薈必從風而揚之士有道雖混闒茸必由人而彰之某拜顏踰年出入五謁而善竟不聞於左右顧不及於布褐汨沒塵土造次羈旅是缺行敗德充溢視聽之深也射矢失中求正諸已而已矣不然即黃金之臺崔嵬造天獨不陪郭隗之後從容而登之乎然有志未遂於節下將欲求遂於節下伏惟少請詳之幸甚幸甚頃年與友生數人隱居廬山中時包祭酒牧於江州小子荒唐曾以短書干之包公聲聞君子也一言感激因為遠大當是時賢豪侁侁滿盈江湖翕然以風概相與亦屢為侯伯之有土者行束帛之禮焉某皆抗詞不應斯鵾鵬一舉之致以方寸之地久違寧覲顧瞻歸路敢逡巡乎昨奔走萬里得伸拜慶慈顏怡怡然喜其如人親戚鄰里亦會酒相賀雖爵祿未及而門戶有光稽古之力實亦斯在則古林之松桂草堂之朋友懷芳結念相望於穀口可勝言哉今欲越三峽之湍瀨適九江之遐阻以業就志以家依山清風白雲相與終歲斯也者非大官上列恢張特達之賜則無以自振焉尚書功德巍巍與嵩華侔善政如和羹深仁類陽春寵材拯困多在輦下今羽毛頽弱大賢能煦而嫗之使其騫飛乎今鱗介蟠屈大賢能澤而雨之使其騰驤乎顧之即榮重委之即廢賤通塞之路期於反掌敢不虛中惕慮敬俟遭值伏惟非常施與之幸甚幸甚天下有特達之道可施於人者二焉大者以位舉德其有自泥塗布褐一奮而登於青冥金紫者也次者以財拯困其有自糲飯蓬戶一變而致於膏梁廣厦者也載羽毛頽弱未敢辱公扶搖九萬之勢家室空耗今則困矣敢欲以次者為節下之纍謂之何哉載聞至誠貴直至敬無飾故以懇質之詞為述情之具伏惟少留意焉幸甚載頃與友生數人隱居廬山其所學者不獨文章名數而已意根於皇極大中之道用在於佐王治國之術常欲致君於堯舜馳俗於中古此乃小子夙夜孜孜不怠也攻錯未半歸寧蜀道蜀之連帥以載微有文采遮使止住小子亦隳産不應扶持東下意者欲開故山草堂拂舊帙編簡晨昏之暇終竟前志一昨牽滯事故不覺淹久囊橐之資日竭高厲之氣日消上無以供養尊長下無以撫字孤稚倣徨燥灼內熱如疾每延想舊居雲霞在天松桂繞屋肺腹一夕而九回矣夫欲搆大厦者陵雲之基形宏敞之勢兆未備者榱桷朽壞而已得不謂班倕惜之乎鑄寶劍者負斷犀之資照含斗之氣所闕者淬拭發硎而已得不謂歐冶惜之乎載伏觀大夫起自堯山宰奮臂遊長安以宏偉之才進乎明君不十數年佩虎符握龍節有盛德勳庸於世真天下特達之士也載亦敢以肺腸之事干之誠能回公方寸之地為小子生涯庇庥之所移公盈月之俸為小子度世衣食之業使隱不遺親闕道以靜片言之下大獲素尚即赫赫巍巍之稱當在寰宇之內不在主客也載聞蒲牢之鐘擊之以莛筯叩者之誤也艅艎之舟投之以秉庾載者之咎也今載欲發大名壯志敢以細言詭數上干高明乎且常見前賢房大尉書贈張燕公云欲起自燕國公門下矣載亦欲感君之恩望公之顧使異日之談亦起自大夫門下矣詞理如此不合經義退自思省終用慚愧伏惟溟渤之浪涵容尺波幸甚幸甚不宣載再拜聆夫子之善聲滿盈矣世且多故無緣會覿開襟嚮風勞止如何余友蘭陵蕭易簡篋中獲足下所製窮達述高韻孤峙詞趣淵密探聖賢性命之際究天地否泰之理固知殷紂之黃屋不為通也顏子之陋巷不為窮也使百世君子之知道益明守道益堅不汲汲不戚戚從容中道斯立言之由也顧惟短才謬嘗為文伸紙始竟百骸清快斂挹已久無可自道因豫章王兵曹往聊寫梗概不盡慨詠之萬一耳尚書以雄才盛業作鎮南服紆精誠之處答天子之寄百越乂清幕士燦然甚善甚善公昔典九江載在匡廬被以淳仁扇以清風中林逋客安樂無橫至於敞南軒之勝開北樓之宴廠田坴綿樽斚操觚發詠者可勝言哉爾後榮遷亞尹承江陵之歡好超拜容府展襄陽之慶荷違奉尊嚴不十數年伏以英姿奮登雲霄光華富貴烜赫當世某今藏遁山邱作老書生江湖重阻禮數間絶尚書或眇不置慮即小子旦暮敢不馳心於旌㦸耶一昨徑理扁舟遠離潯陽不畏道路時伸賀禮屬船隘熱劇飲食江水度廬陵百餘里防護無術痁疾動作藥物荒乏鄰於委踣以今月十八日達南康使醫工診視了未蠲愈自揣氣力不任支持遂祈戎使君致健步持短書並備舊文緘結敬獻閣下運動不偶嬰此疾瘵志竟莫伸端緒未展然不獲覩節旄之重挹政化之光仰首嚮風愁惋盈膺伏計宣達聰明悉善下賢幸甚幸甚三月中馮翊嚴謨至山居道楊秀才衡擕挈口纍歸心大府此人氣性岐嶷有縱橫之才未遭知己久見堙壓加以蹖駮聲音不振如鴛雛鍛翮瞻雲興歎况曩昔承歡厚薄齊同一旦流離棲身失圖北遊不可立家無路伏惟尚書大厦宏敞能不以蓋覆為意乎伏枕陳露兢惶展轉不宣某再拜某有舊故為南康郡太守今年夏五月往遊其門至冬十月歸山下遂於江州盧使君處伏奉書問並覩押衙盧從史所留示委曲重詞異禮一何特達捧讀慙恐若無憑依伏惟尚書忠厚淳粹發於大造靈姿傑立長材卓然以社稷為生死以勳庸為倚任義感生於慷慨聞望歸於德禮屬思宏邁遠蹤前人由是天子以山東之利兵廣土授之使長於諸侯蓋有以也夫翊王公之美者莫如賢贊策畫之利者莫如才延納優劣不啻十百如某者一蓬蓽士也癡緩朴訥無可採擇性嗜閒退不求聲利頃在山林中飲食斸藥保養性命時運不適即覽閲六籍或持竿釣魚以此竟歲人世機事視之懵然不悟高明橫加鄙夫手疏襟素不師文字是所謂嘗蘇草而掇蘭蕙簸礫石而揀王褱璧欲自隗始為天下士君子之先伏知異日截犬戎一宇宙拯民戴主在此志也念茲菲薄無用裨補况且多病形憊氣衰不任策使實貽敗纍未獲趨拜謝恩鈴閣又南歸日晚酬答稽疏瞻望旌麾惶灼無次古人有感一言重一顧期於殞越請報國士即小子平生之旨豈無是耶伏惟開懷察納不記疵吝幸甚幸甚不宣某再拜明公材略橫世氣為人傑旌節森然先鎮東徐靜則近鄒魯之士講詩導禮動則駕貔貅之卒肅清淮海名聞休烈風動四方節士義夫孰不投心甚善甚善真天子文武大臣哉載迂儒不才越尋常間敢以疏鈍切懷風概如是星霜十周天矣緬彼山川遼敻蕭條世多械束末由造請復欲牽文字試書功德事無端緒殆似行佞懷緘浩思殊鬱鬱不快也適值去年秋有冠軍將軍李圓者道來自東狀貌不凡三扣柴荊載意其偉士延坐與語語酣中起議及劍術云嘗以青萍貺公乃發筐篋出閣下寶劍銘相示載鑒裁不明敢懸貨人因覽文以異劍覩劍以奇文繇是憑之為聰明依之為肺腸恣陳蕪穢妄有紀述托拾冠軍之行跡鄭重執事之美茂得為通誠導意之因緣也大凡人之有生處而道德不滋於身者竊兩曜之光明也出而功烈不被於世者偷大君之圭組也况乎屬一詞屯一事上不陳教化次不敘志意皆游言也豈曰文為一昨諷公之製聳文豪爽立意健激首則見定忠固義之分末則存策勳樹績之心識者謂公異日必帥諸侯蕩蕃虜拔鋒燧於近塞洗腥臊於絶漠黃河九曲為大國池沼然後拜閶閣和陰陽炎炎赫赫載勳盟府豈獨擁旄按甲長於一方而已哉載不量氣力庶慕區區之分借如智慮短薄無裨絲髮亦欲如班孟堅之比為竇車騎刻燕然之石公謂之何哉載今蹶然飛書遠聞伏以冠軍緣公而德彰小子援公而思勇即託記録之目輒以葛溪劍志為名屬事相交關謹偕寓獻貴賤不侔禮實異儀輕用塵忝臨風震悚閣下或為休庇若將獻酬張布錦繢鋪映麻枲命使令問訊江君奔走之僕山中茅舍偶自詳憶耳不宣載再拜去年春三月某有謂暫出蓬戶間適值麾幢將度潯陽嚴太守命某為二食之客偶於末席備聆嘉話如和風扇春膏雨潤物真可愛也玉斝未醉蘭橈遽動襟緒百端鬱鬱不開後有遠役南征千里夏徂冬歸道路蕭條音塵寂滅至此而已今者有襄漢之役實遊郡境誓將維舟泄宣曩懷一昨至蘄陽岸下屬日晏水濶風猛波起帆席張快不可偃落眄睞失徒煙露蒼茫杳杳馳心悵然無悰某深山耕漁之人也不求于進貴賤之異何緣區逼竊嚮下風聽君子之議采輿人之誦若將時會踐升朝廷伏知君侯必能明禮樂補教化翊大君於皇極保蒼生於仁壽夫如此則善人國之紀也敢不恭敬乎敢不親愛乎拳拳之衷正在此耳方迫行邁稍趨北路廷賓英華戀慕滋篤李山人丞以藝術日遊門閣問訊所止將欲候起居今故留之用書寫懷其他文一軸蓋執贄也非敢誇也不遺細陋或見光寵但願抵襄漢病夫拂拭耳目而俟之某再拜朱校書至猥辱書問並示孟處士碑篆端由捧讀彌日抃躍無次夫旌善人採遺美蓋有位君子之所行志豈伊薄劣敢議發揮言輕賜重益用惶駭又於朱校書處恭覩製作約數十篇高格侔山嶽迅勢擬波濤邁氣薄雲霄遠思躡鴛鴻當世翰墨都無此手臟腑恍恍至今悸動斯可謂煥乎文章也一昨奉辭伐罪統貔虎之師沉謀偉略洞入神鬼以鎮則有制以戰則有威巍巍赫赫聲振寰海斯可謂盛乎武事也文武吉甫佐天子贊襄使奸臣賊子無萌芽於禍亂者我尚書之謂矣小人君子咸知幸甚某一凡夫也棲遁匡廬垂二十年讀書不及於儒把筆才過於常談泯泯人世鄰乎強仕斯亦不足畏也然徒有愚妄之意愛大名慕大節懸芳竹帛為千古榮勤勤懇懇正為此耳小子聆閣下之事業英姿豪韻逈如古人私心歡喜動作顛沛况前旨稠疊猥賜誘喻令一至峴首追賞風景小生何人當此珍重誠宜奔走拜伏旌麾間識征南之儀觀揖當陽之談話凝襟滯想從茲泄露屬入夏多病氣力衰羸火雲始生道路且遠瞻仰尊重魂爽飄然若望溟海未知濟涉如此誠激何緣上達唯有牘可寄肺腸今如特差祗舍人呂及自潯陽專往奉狀塵獻鈴閣伏惟鑒察愚朴不責狂瞽幸甚幸甚候問起居之禮謹俟異日此無多談某官任進朝至猥賜書札並官告衣服鞍馬等開緘之後伏知常侍不以載懦劣無取飛章上聞蒙授太常寺奉禮郎充南昌軍副使者此所謂天子厚澤下潤林泉諸侯盛禮曲霑固陋思惟腆薄何緣如是五內慙愧倣徨失從某弱年不自揆妄植強操祖尚名節嘗以為靜既砥礪以修道動即功德以被世故棲遲不進垂二十年雖跡在邱壑而心非長往且山木之挺者憂良匠之不來室女之容者憂士夫之不娶某雖孱愚材貌俱微實求知音為之投誠一昨候謁盛府禮數優貸降大人之嚴重涵小生之濶略顧問采色若有所注居未經時榮命果來變枯槁為美粹易荷衣為簪組起締構於平地生翼羽於雛鷇鴻漸之兆始於茲辰與夫尋常感恩不同日而語也誠宜掩山扉別巖松扶策病憊祗赴所職伏以歸山之日嘗於甘子堂中輒以私志上廣視聽嘗恐道有所未立學有所未周遭值引遇速貽敗纍實欲姑務斂退以備見聞况江西為藩鎮之雄常侍負伊咎之資署置賓佐四方傾耳或主客懸絶祗取笑焉故嚮風斂手不敢上道又某童孺酷嗜山水建中初與友生數人自岷蜀結心匡廬始至甚病困無以瞻結偶獲一地蓬陋翳薈苟取便易未遑變更含憤不快如病毒螫近者江州李使君以俸錢四萬為某買山號三澗峯在二林之右孤巖絶壑匡廬之左壞褐破袍沛然滿篋方將面雲峯構草堂咏歌堯舜綢繆松柏報償昔年之志而去是有始而無卒有胸而無心必當為溪猿谷鳥側目相視豈止於林慙澗恥而已哉伏惟閣下道極上才之美政布中和之化昭昭德禮攬接士庶凡在草木尚獲暢達區區鄙愫冀見察納某幼小淪賤胄緒逶迤糟心服道年甫強仕比為四海之諸侯屬意亦勤矣禮則甚厚實未隨之今常侍不問賢否事出沉斷恩寵忽至門戶有光銜涕感激不知所措則自茲日至於沒地出於閣下門闌矣菲薄之質已為閣下從事矣夫如是雖千里之外猶趨奉左右也伏計王公大人雅量如淵當見其遐遠樹名異日豈以一召違命遂賜重乎鄙人恃此敢存俯仰既乞守蓬蓽未獲奔走其官告人馬輩謹並使還府久處荒野詞意疏蕪干犯尊嚴但增惶恐狂狷幸甚幸甚今月二十一日謹遣家人楚山專奉狀伏計已達任押衙至猥賜書示並官告衣服等戴荷之至無任下情孟夏漸熱云云即日某侍奉外蒙恩常侍開長者之懷以國士見遇拔自蓬蓽署職拜官手疏廠田坴綿出於濬發古人云屈於不知已而伸於知已今常侍知我實獲死所捧讀之次涕激肝心假如時命不偶溘死朝露平生志氣己無所恨若齒髮猶壯前途未失即立疑之忿庶幾賢達故前啓求息山林更自磨礪報答之分正在此矣伏惟曲賜鑒察免貽聽熒幸甚幸甚其官告衣服鞍馬等欲留告身為與職名相聯欲留白衣又與公服同對捨一取一竊未合度謹令並去附上伏惟委曲鑒照下情懇望專使孟溫朝至再蒙示及招誘誨諭激切倍劇前書之賜議者云得地千里不如一士閣下以泰山之高就蟻蛭之卑損折威重一至於此是何節士義夫之不投心服體是何藩臣方伯之不師謙降禮是何澆風弊俗之不易邪蹈正是何奸臣賊子之不悛暴畏義君子動氣小人抃手熙熙相賀如見中古如載之不肖猶夫人也常侍之引遇也如是况今有賢於載者乎是知劇辛趙往鄒衍齊來抑有以也夫丈夫處世誠宜種道德樹勳績頽年急節慨如不及然才短而好進者敗謀人而不審已者危三尺童子明詳斯旨伏覽書示閣下又許與過以遠圖伏計俯示鄙人實恐孤負聰明視聽失所以鉛刀為重器以散木為良材反覆思量益用慚惕是以前後勤懇少求退息欲磨鈍使利拂昏冀明蹄涔之內灌瀉涓滴料新營山居松桂未盈尺墟墁未快乾即閣下已在鳳池矣此不揆懦劣敢希提擕助君治國裨補萬一若素尚飽滿耳某昧於機要識且迂疏敢恃深知纍竭肺腑儻允遂鄙志從容林壑野人之誠也敢不歡愈以受賜或固使愚陋周旋幕府諸侯之禮也敢不恭敬以俟命此進退之分繫於主不繫於客也意有虔切不覺費詞伏惟再垂覽察幸甚幸甚貞元元年八月二十五日野人符載再拜頓首上書於觀察使大夫盧公某伏見古人或出以行道或處以向晦皆其德不昧其迹不辱者以其立身之本固動靜之分明也載顧散細之材無榱桷之用違力妄進祗取顛沛故廬山南往有一畝之宅有友生五人切切偲偲更迭鼓琴意者擬立誠潔矩師避地避言之義豈曰嘉隱以干聞達是月二十一日賢都水弟叔姪至止伏奉書諭猥加詞飾捧緘開讀光曜林壑蘊蓄慚懼若無憑依伏惟大夫天子碩臣包甫冠申文武皇皇作藩於唐以河海之廣涵游泳之物曲存惠好俯慰憔悴則士君子相顧而言曰以方伯高明之尊以野客草茅之賤尚能降損懷抱招納以禮况四方多士得不望塵欽義奔走於下風者耶方今江湖上接鯨鯢之地皇帝以襟帶軫慮授大夫以安之恭聞旄金戊之至也政不煩吏不擾帷幄多賢傑軍旅有敘事黎人熙熙各遂生性爰及巖谷亦云逍遙是知凡在府蔭孰不幸甚載誠宜被荷服躡芒屩拜跪於旌㦸之下常以山中氣寒嬰內藏之病高風搖落寖欲增劇未申悃欵良用震恐候羸形支持堪自興運端神肅氣側聽精微之論伏惟少賜鑒燭以達愚悃幸甚幸甚不宣載再拜廬山山人符載頓首頓首死罪夫仁義揚顯朗德之充也惠慈被幽昧仁之原也竊見故鹿門孟處士浩然納靈含粹伏儒傑立文寶貴重價吞連城一旦殞落門允陵蔑吁嗟邱隴頽陷荒圃形或異斧高不及隱永懷若人行路慨然前日辦覺佛寺峴首亭恭覩明公垂意拳拳將墓文表隨封起窀穸閣境搢紳瞥聞嘉聲風動興感偕至踴躍然垂休務當時從善貴流今閣下外迫軍旅程使之劇內勞賓客俯仰之勤牽耗星歲未遑指顧嘗恐旦夕飛踐廊廟廠田坴綿深旨鬱紆不寫則處士之風流精爽沉翳厚地矣或好事者乘而射之孤負夙志矣伏惟閣下醇仁盛德覆乎草木除惡彰善發於鄉黨割省庶務凝神晷刻盼睞官屬望則疑首尾實足以副士林之翹翹慰羇魂之冥冥事關教化不主名譽伏惟慮之始終之幸甚幸甚
