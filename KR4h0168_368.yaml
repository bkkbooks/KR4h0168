front:
  text: 全唐文欽定全唐文卷三百六十八賈至三
  hash: sha256:513646656fcf72fe4358796b10a3a73f448ea5ec2699f38ee6dc8f4f0b45eea1
body:
  text: 禮部奏每歲貢人依鄉舉里選敕令議者謹按夏之政尚忠殷之政尚敬周之政尚文然則文與忠敬皆統人之行也且諡號述行美極於文文興則忠敬存焉是故前代以文取士本文行也由詞以觀行則及詞也宣父稱顏子不遷怒不二過謂之好學至乎修春秋則遊夏之徒不能措一詞不亦明乎間者禮部取人有乖斯義易曰觀乎人文以化成天下關睢之義曰先王以是經夫婦成孝敬厚人倫美教化移風俗蓋王政之所由廢興也故延陵聽詩知諸侯之存亡今試學者以帖字為精通而不窮旨義豈能知遷怒二過之道乎考文者以聲病為是非而惟擇浮艷豈能知移風易俗化天下之事乎是以上失其源而下襲其流乘流波蕩不知所止先王之道莫能行也夫先王之道消則小人之道長小人之道長則亂臣賊子由是生焉臣弒其君子弒其父非一朝一夕之故其所由來者漸矣漸者何謂忠信之陵頽恥尚之失所末學之馳騁儒道之不舉四者皆由取士之失也夫一國之士繫一人之本謂之風贊揚其風繫卿大夫也卿大夫何嘗不出於士乎今取士試之小道而不以遠者大者使干祿之徒趨於末術是誘道之差也夫以蝸蚓之餌雜垂滄海而望吞舟之魚至不亦難乎所以食垂餌者皆小魚就科目者皆小藝四人之業士最關於風化近代趨仕靡然同風致使祿山一呼而四海震蕩思明再亂而十年不復向使禮讓之道宏仁義之風著則忠臣孝子比屋可封逆節不得而萌也人心不得而搖也且夏有天下四百載禹之道喪而殷始興焉殷有天下六百祀湯之法棄而周始興焉周有天下八百年文武之政廢而秦始并焉觀三代之選士任賢皆考實行故能風俗淳一運祚長遠秦坑儒生二代而亡漢興雜三代之政宏四科之舉西京始振經術之學東京終持名節之行至有外戚竊位強臣擅權弱主孤立母后專政而社稷不隕終彼四百豈非學行扇化於鄉里哉厥後文章道弊尚於浮侈取士術異苟濟一時自魏至隋僅四百載三光分景九州阻域竊號僭位德義不修是以子孫速顛饗國咸促國家革魏晉梁隋之弊承夏殷周漢之業四隩既宅九州攸同覆燾亭育合德天地安有捨皇王舉士之道從亂代取人之術此公卿大夫之辱也楊綰所奏實為正論然自典午覆敗中原板蕩戎狄亂華衣冠遷徙南北分裂人多僑處聖朝一平區宇尚復因循版圖則張閭井未設士居鄉土百無一二因緣官族所在耕築地望繫數百年之外而身皆東西南北之人焉今欲止依古制鄉舉里選猶恐取士之未盡也請兼廣學校以宏訓誘今兩京有太學州縣有小學兵革一動生徒流離儒臣師氏祿廩尚無貢士不稱行實胄子何嘗講習獨禮部每歲擢甲乙之第謂宏獎勸不其謬歟祗足長浮薄之風啓僥幸之路矣其國子博士等望加員數厚其祿秩選通儒碩生間居其職十道大郡量置大學館令博士出外兼領郡官召置生徒依乎故事保桑梓者鄉里舉焉在流宇者庠序推焉朝而行之夕見其利如此則青青不復興剌擾擾由其歸本矣人倫之始王化之先不是過也謹議易曰觀乎天文以察時變觀乎人文以化成天下然則唐虞賡歌殷周雅頌美文之盛也厥後四夷交侵諸侯征伐文王之道將墜地於是仲尼刪詩述易作春秋而敘帝王之書三代文章炳然可觀洎騷人怨靡揚馬詭麗班張崔蔡曹王潘陸揚波扇飇大變風雅宋齊梁隋蕩而不返昔延陵聽樂知諸侯之興亡覽數代述作固足驗夫理亂之源也皇唐紹周繼漢頌聲大作神龍中興朝稱多士濟濟儒術煥乎文章則我李公傑立當代於戲斯文將喪久矣習鄭衛者難與言咸頀之節被氈裘者難與議周公之服而公當頽靡之中振洋洋之聲可謂深見堯舜之道宣尼之旨鮮哉希矣觀作者之意得易之變知書之達究詩之微極春秋之裦貶可謂孔門之弟洙泗遺徒至其逸韻揚波扇飇餔糟啜醨時有婉麗之什浮豔之句皆牽於詔旨迫於時事然亦言近而興深語細而諷大罔有不含六經之奧義覽者其知夫子之牆乎至先大夫與公有皮鮑之知公嗣子吏部侍郎季卿與至有聲譽之好德業度量弱歲聞之於趨庭文學編簡中年得之於吏部所見異辭所傳異文敢不序焉夫其遊夏之文學不備顏子之德行許郭之機覽未聞班張之贊述而公文與行協識與才并是故大名震於當代德慶流於後葉不其偉歟天子以淮海多虞黎人未乂命舊相崔公董之公以封略所覆澄清是圖辟柱史蔣公佐之如翰負風以石投水於茲五稔方隅克定乃朝天闕將命述職帝用嘉之進其命秩七月流火言旋幕府懿親良朋寵行惜別曰兵興十年九州殘弊生人凋喪植物耗竭行者罹鋒刃之艱處者困求奪之纍豈不以連率之敗類使臣之無恥獨揚州一隅人尚完聚屢遇海島震蕩再當河南離叛亟供職役之繁而室家相保耕績未罷得非崔公之賢乎公之賢而其佐可知矣今朝廷多故戎狄未服塞門不扃人心驚駭魚鹽之殷舳艫之富海陵所入也齒革羽毛元纁璣組東南所育也匡時之謨富人之術幕府所畫也豈伊方隅是賴得不勉歟時臨歧贈言盍各有望衆君子之志其詩乎豫謫居洞庭歲三秋矣有客自蜀浮舟來者則河南于侯能讀古人書辨當世務年邇四十猶沈下位為靜者之尚退乎先達之怠賢乎與子登麗譙緣島嶼一時纍月多情甚歡忽然挂帆告我行邁豈非窮轍不能濡故也馮翊太守王公移鎮武昌好賢下士所以衣縫掖襲藝文者歸之如川吾子東行謂得時矣千里之馬維而不馭則意在空谷而遠思豐草纍鷙之鶚韝而不搏則心在窮徼而愈懷雲霄是以濟時命代之才或湮淪未遇之士眇然在滄海之上扁舟之中矣李侯吾之鮑子也我知其為人立身清而廉從政敏而達內以孝悌著外以信義稱嘉辰良宵亹亹清話又足見林宗高識叔度洪量一命佐邑非以政學也再命環衛之曹非為官擇也徒棲遲下位祿未代耕是以去遊鏡亭探禹穴水宿雲臥彌年始還今又匹馬出關艤舟洛下念安石東山之賞懷子猷剡溪之興何雲思浩蕩而野情寥廓哉豫困於徒勞纍及五斗升沈風波之裏局蹐長吏之前豈滄洲遠蹈之情南陽躬耕之意臨歧對酒有愧長劍想子行邁路經夷門見潁川陳兼河南于頔為問道心無恙星鬢如何宿昔屢空復為安邑也豫近得陰君祕訣之北方河車郊原近山金鼎夕燎秋來氣冷爐火適宜刀圭一開與子攜手在陽而舒在陰而慘性之常也履險而栗涉夷而泰情之變也觀揖讓而退睹交戰而競目之感也聞韶濩而和聆鄭衛而靡耳之動也夫其舒則怡慘則悴栗則止泰則通退則無咎競則有悔和則安樂靡則憂危性情耳目優劣若此故君子慎居處謹視聽焉沔州刺史賈載吾家之良也理沔州未期月而政通民和於聽訟堂之西因高構宇不出庭戶在雲霄矣却負大別之固俯視滄海之浸閲吳蜀樓船之殷覽荊衡藪澤之大自公退食遊焉息焉圖書在左翰墨在右鳴琴洋洋亦有旨酒性得情適耳虛目開且處動則倦理倦莫若靜處靜則明惟明以理動窮則變變則通通則久今沔州靈府怡而神用爽政是以和觀其前戶後牖順開闔之義簡也上棟下宇無雕斫之飾儉也簡近於智儉近於仁仁智居之何陋之有况乎當發生之辰則攢秀木於高砌見鶯其鳴矣處臺榭之月則納清風於洞戶見暑之徂矣洎搖落之時則俯皓氣於軒檻見火之流矣值嚴凝之序則目素彩於簷楹見雪之紛矣政成訟清體安心逸而詩人之興常在四時四時之興秋興最高因以命亭焉余自巴邱徵赴宣室歇鞍棠樹之側解帶竹林之下嘉其俯仰美其動息乃命進牘抽毫以記之天地定位三川據其極王侯設險虎牢擁其要扼之以五嶽維嵩崒焉迫之以四瀆洪河突焉宜其咽喉九州閫閾中夏贊經綸之攻拒却欃槍之陵暴若乃金火代變山河分裂脅從力爭議散約解時則漢祖守之以臨山東坐清三齊強楚躑躅而不進及夫隋氏失馭中原板蕩封豕薦食龍戰元黃時則太宗據之以拒河朔克擒醜夏偽鄭袒縛而請命於戲自周室微弱虎狼并吞盛衰千祀正閏更王而政和民安一統長久漢氏昭於前載我唐光於茲日其創業之主戡難定功咸在斯地意者天開險固為霸王之器乎聖作功業知窅冥之意乎不然何元期時事影響之若此也又聞諸鄭志曰制巖邑也虢叔死焉而唐漢紹興得非山靈河神正直是輔乃知英雄者不獨恃險而顛沛者在於涼德歟天寶七載至自宋都西經洛陽歇鞍登茲懷古欽望覽山河之壯麗想威靈而咫尺慨然有懷敢獻銘曰邈矣維嵩峻極於天磅礡崔嵬北臨洪川嶽瀆會險蹙圻封泉實開虎牢作固伊瀍維茲虎牢天設巨防攻在坤下拒在離旁昏恃以滅聖憑而王崢嶸豁呀孟門相向伊昔漢祖戡秦統周勍敵相及此焉淹留終夷海表遂割鴻溝乘釁而東奄有九州隋氏敗績黎人艱阻帝命太宗陳師鞠旅鐵騎僔僔雲旗容與擒夏剋鄭在此一舉日月永清昆蟲得所歲在戊子西經登茲祗聖肅然憫亡悽其虢叔反道復隍熸師項氏烹苛莫能守之險易同途成敗異時德不在鼎王孫布詞三苗不循魏武忸怩逆失順獲古今同期申鑒勒銘庶警將來觀象考歷本乎元辨方正位稽乎極體元御極莫先於教教之大者莫大於儒旌儒有祠我新典也昔秦滅羲軒之制廢唐虞之則大搜學徒竭索儒黨懷書捧檄者鱗集鹿君至然後罪九流之異論尤百氏之殊術無辜殺身有道併命冤骸積於坑谷流血淬於泉壤蹈仁義而死者不可勝紀開元末天子在驪山之宮登集靈之臺考圖驗紀周覽原隰見鄉名坑儒頽塹猶在慨然感亡秦之敗德哀先儒之道喪強死千載遊魂無依乃詔有司是作新廟牲幣有數以時饗祀因祠命鄉號曰旌儒人神和悅怨氣銷散於戲秦皇帝以神武邁古并吞六合掃天下以一篲芟㣥雄如衆草建守罷侯大權在已自軒轅已降平一宇宙未有若斯之盛也夫戡亂以武守成以文文以正崇武以權勝秦皇知權之可以取不知正之可以守向使天下既定守正崇儒遵六經之謨訓用三代之文質則黃軒盛美湯武宏業不若也觀夫坑儒焚書之意乃欲蓋先王之能事竊作者之鴻名黈衆耳以前聞逞私欲於當代此儒之所忌也秦之所志悲夫儒以恭儉為宗秦則疲弊生人極力宮室儒以道德柔遠秦則竭耗中國勞師四夷儒以宥過議賢秦則刻法峭刑賊虐諫輔儒以述先好古秦則師心徇智燔棄墳典夫如是則秦不得不滅儒不得不坑事使然也今天子矯覆車之前軌崇明祀於後葉秦之所滅我之所興斯區夏無疆之休子孫萬代之福也昔武王封比干之墓則招諫之道勸矣晉文表綿上之田則志過之名立矣漢高護信陵之冢則尊賢之風著矣未若激揚大教廟食衆賢上以興天地之經次以存顛覆之鑒下以絶厲災之眚建一祠而三德具焉鯫臣不敏敢作頌曰於維先王設教崇儒作訓六經為代典謨降及夫子三千其徒再揚清風文在茲乎天喪斯文道有通塞實生暴秦反道敗德竊善攘譽師慝徇惑焚書坑儒萬古悽惻牢落千祀微茫九原驪山之北坎窞猶存草樹無色愁雲晝昏時聞夜哭知有冤魂帝在華清登高訪古愍默頽塹悲涼榛莽上感亡秦覆車遺武下哀㣥哲饗祀無主爰降嘉詔聿修清祠饋之牲牢奠酹以時幽幽廟門肅肅靈儀冥漠求食長無餒而粵自漢初迄於隋運亦有令主尊儒尚訓闕典罔崇斯文莫振昭昭神理長懷幽憤我后濬哲聰明文思敷宏大教咸秩神祇鬼無妖災人不癘疵俾爾蒼生富壽無期小臣作頌敢繼刪詩昔者高宗既歿殷始錯命政有斁倫敗紀事有梗神虐天迄於獨夫積慝乃稔武庚不化茅土再血元鳥之祀宜其忽諸噫湯之德衰故微子復興於宋矣微子諱啓實帝乙元子帝乙懵賢之故而神器不集於君君肅恭神人恪慎克孝才兼八元之偉德首三仁之列始在擇嗣箕子贊焉尹茲東夏周公嘉焉歿而不朽仲尼稱焉覩其進思盡忠則忤主以竭諫退將保祀則全身以逃難去就生死之塗沈吟出處之域有以見聖達之情也若乃受為不道暴殄天物剖諫輔之心解忠良之骨億兆墜於塗炭宗祧困於臲卼而君崎嶇險阻避迹藏時免身龍戰之郊解縛鷹揚之帥卒能修復舊物統承先祀七百餘年歆我神祇非明德至仁其孰能與於此於戲國之興亡不獨天命向使帝乙捨受而立啓前箕子而後少師則文王未可專征於諸侯武王未可誓師於牧野雖周公之聖不過子産善相矣太公之賢不過穰苴之法矣是太王立季歷而昌帝乙捨微子而亡成敗繫人不其昭彰乎皇帝二十有一載豫作吏於宋思其先聖遺事求於古老輿人則得君之祠廟存焉盛衰紛綸年祀超忽喬木老矣靈儀儼然椽欒茨塈者月繼蘋蘩牲幣者日接何百代之後而仁風獨揚乎留連廟庭乃作頌曰天革元命皇符在木元天降災上墋下黷人怨神怒川崩鬼哭赫赫周邦如臨深谷逖矣微子逢時顛沛居亡念存處否求泰諫以明節仁而遠害作誥父師全身而退龍戰於野鳥焚其巢桓桓周王奄有商郊面縛就執牽羊投庖祀商修器啓宋分茅嗟爾宋人來蘇是仰穆如雨潤靄若春養以戴以翼是宗是長茫茫舊封千載餘響我來祠廟永挹遺芬荒階蔓草古木垂雲惆悵曩賢徘徊日曛鐫石紀德用流斯文清靜致理中庸之德至高明柔克簡易之體大繹微旨而徵遺論何先生道蔚其葳蕤者也先生宣慈在躬精義入神德順乎天性根於仁殷其如雷曖然如春始受業於仲尼終委質於魯君爾乃周道凌遲王風哀思夷狄竊於位號干戈亂於原野則我魯國無齊晉之強定哀非桓文之主三卿有僭虐之政先生處此亂邦從容理邑平心氣而全耳目晏然躋富壽之域焉自非知微知彰變化無窮孰能臻此觀夫為政之大體元之要恤孤哀喪舉事問弔訓之以悌加之以孝借五更而悟君賢三老而稟教然後燕居以伕其體張樂以和其人夜漁不戒而信欺吏不威而息是以宣尼惜君之理小子期問君之政暇何其遠哉向使移於有國之君則陶唐之理也施於有政之臣則二南之化也昔舜左禹而右臯陶不下席而天下理周公殽膳在御不解懸而四夷伏小大則異其揆則同天寶初至始以校書郎尉於單父想先生行事徵其頌聲而古碑殘缺苔篆磨滅使立志之士何以揖其遺風焉嗚呼其道存而其事往其人亡而其政息哀哉遂作頌曰鳴琴湯湯虙子之堂清靜無為邑人以康澆風化淳霸俗致王誰謂陽鱎革而為魴皤皤黃髮或師或友芃芃麥苗不稂不莠齊師已卻魯俗斯阜諫或剖心伊人引肘穆穆伊人希聖之才堯舜既往孰為來哉從時卷舒與道徘徊遊泳孔門取容定哀泱泱千古顯顯令德聲隨悠牧惠與順息人亡政弊道播神默寂寥夜川惆悵舊國荒祠尚掃苔篆將磷尋風聆韻想見其人年代邈殊精誠暗親再表貞石頌聲惟新乾象元地勢坤稽謀惟神觀察孰見元善利物純陰步馬而不仁坤順為牛或剛克以殊用彼見於陝郛者其陰步馬歟其剛克歟寓精堅強壯趾慎固內習坎窞外形端倪居於道周敦兮若朴謂為首匪如山之狀謂用角匪如栗之象曾覽古史罔徵其由深不可識孰知其故吾將本自然歸神功豈謀人力役鬼傭哉東臨周畿西盡虢略載厚地而莫聳拒長河而不崩向使非神或憑微子之力則城復隍矣人其魚乎乃詢耆耋聽輿誦僉曰子之鎮其日固久人由是怙恃物由是生資嘗欲掘地及源以觀其徼庀徒執用大臻於茲橫縻林梗四進雲鍤尋下體之極達純陰之精至於退諸泉而入於穴俾圍木靡拉懸絙絶縋既致乃穽其見如初五丁力拔而不及方舟鎖曳而奚可虎無所措其爪猛焉能噬兵無所容其刃投豈皆虛鑣鑣行人無住蒞下當函關之路望若隨仙府桃林之墟時得歸獸若以匹敵必於其倫則長蛇繞閬風而周巨鼇負蓬萊而抃可明徵矣且察內以外觀遠以近在端鋩之末固未可量也亦何知不磅礡數州之間日用有迷其力矣夫能利於物帝之念擇善而為臣之忠是以我國家咸秩無文發天使以祀我明牧謀始有作招墨客以頌頌者誦也容也誦令德昭厥異穆如清風敢刊之貞石頌曰杳冥精兮混茫氣凝為伏牛載厚地巨靈西掌屹贔屭長河東流泙沸渭堅立不動神之至層城固護人大庇德合無疆其可既昔人無述今是志於維李公誕靈中和磊落懷奇如山如河胸中洞開萬里長波孝友忠信詩之無邪早歲登科以文從吏纍擢大邑拔乎其萃時之方難朝慎名器帝曰忠讜爾居建議出典方嶽入趨禮闈再掌絲綸翺翔鳳池乃作天官又侍紫薇八使澄清功濟危時諤諤正言有犯無隱詼諧善謔託諷唇吻雲衢未窮陰霜夙霣悽愴東川古來共盡人懷遺愛帝念謀猷裦贈春官悲感林邱已矣平生哀哉若浮獨有令名與天悠悠
