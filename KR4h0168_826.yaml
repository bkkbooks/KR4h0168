front:
  text: 全唐文欽定全唐文卷八百二十六黃滔五
  hash: sha256:e78b3d12c59e006caf4e960eac49fc380850058b31c03d6108e9e2ea8a8683b8
body:
  text: 三教之垂萬古也咸以師弟子授獨釋氏之師弟子削姓以名別為父子之流葉東塔和尚葉真身大師其道偕極不可思議以父子言克盡弓裘之善和尚法號志忠俗姓陳世居仙遊祖諱璠父諱笻繼以好尚山水崇佛友僧生和尚自於乳抱鼻逆羶辛九歲詣真身大師為童子一見之兩如宿契年十五落髮初大師之卜龜洋也雲木之深藤蘿如織狼虎有穴樵採無徑俄值六眸之巨龜足躡四龜俯仰其首如作禮者三逡巡而失遂駐錫卓庵名其地曰龜洋焉龜洋之泊也盂不及村畬不及葘山産菜號苦蓋以之充卯而齊惟大師與和尚俱歲移月更名馳跡漏檀信尋而施漁獵投而事時謂之二菩薩僧其他或來人之稍乖嚴潔則立有蛇虎驚吼之怪及武宗皇帝乙丑之否棄之而絛帽潛匿大師允檀信之迎隱於數家和尚棲於巖穴之內不離茲山相伍者麋鹿馴伏者虎狼既而靡耕葘杜施丐還取苦莽之卯至今茲院之逢歉歲一邱之風不泯宣宗皇帝復寺之始議者以靈巖之奇勝非我菩薩僧不可以宏就由是都人環乞大師以居故和尚獨薦龜洋之址焉松堂揭而覺路喧天金磬敲而道花滿地誠以上升道士不受籙成佛沙彌不具戒和尚且不之然旋將西游受具足戒於襄州龍興寺大中十二年東還由廬陵與草庵和尚值草庵曰來自何山曰六眸山曰六通乎曰慧非重瞳和尚蓋行高而言寡是日對答如流既及本山人地愈盛院落則不營而峻供捨則不化而來咸通三年靈巖力圓乃迎大師返於茲八年大師坐亡法身不壞南北歸敬闐然無時和尚以之煩十三年遂南五步里之山得峯之秀室而禪焉即今南畬也廣明元年弟子智朗惠朗元鑒藏輝景間宏幹鴻超悉以植性祇園分光慧炬以謂我大師承法馬祖親得心印則和尚焉今以宿曉而晦辭煩即靜不可使六眸靈感之地留形示滅之異葉其葉而不之大乎於是迓乞歸於院將以宏張法輪式救迷津其如感通雖然現沒有數中和二年是時公尚未登甲科龍集壬寅三月十日示滅壽年六十有六僧夏二十有五後二旬之一日建窣堵波於東岡焉嗚呼和尚之道不粒而午不宇而禪與虎狼雜居所謂菩薩僧信矣其三月之朔語其衆曰至道之有顯晦師弟之不欲雙立昔大師之去也留形為之顯今吾之行矣速藏為之晦故將儀貌若生而蓋棺晦朔不逾而啓土從付囑也其上足景間宏幹以凡紀道名須資詞筆懇賫行實扣愚求文滔早訪蓮扃今悲松塔敢辭抽思用刻貞銘為之銘曰六眸獻山二葉開蓮號及菩薩正真自然雲林匿跡狼虎參禪仙花撲地智月懸天示滅之滅顯晦岐焉布金左岡建塔開阡實歸上界豈曰下泉松風柏雨空悲歲年師法號行標俗姓方祖榮父安莆之盛族也師生於建中二年辛酉齠齓即穎悟異於諸童九歲投玉澗寺監寺神皎出家將二年嘉其拔萃命之落髮師以梵行未至不敢預大僧數至貞元十七年時師年二十一方剃鬢髭翼日遽講所習涅槃經一寺歎服既而辭其師北遊抵京薦福寺受戒品詣章教大師法會章教奇之令首其衆凡十年士君子之造者無不聳慕尋為功德使推入道場憲宗善之元和十一年丙申師年三十六東歸復於玉澗焉法雨隨車慈雲被物洎武皇帝會昌元年辛酉除佛舍籍釋子於戶部師則巾華陽衣縫掖晦迹樵客廬於西巖石室律身守道如居千衆及宣皇帝復寺大中元年丁卯師年六十七剌史琅琊王公迎以幡花舍於郡開元寺俾為監領大中六年師年七十二師以環足之煩擁旅之數乞歸故山先時玉澗之北巖泉石之奇也卜而居之縣令中山甄宿與莆之士庶爭沐醍醐共隆蘭若烟巒蔽虧朱碧掩映前俯平川後峙奔嶠地自人勝名由道高剌史河東薛公仰其孤風復馳開元之僧衛以入郡日扣華嚴大義幾忘食寢洎解印與之偕至北巖題之為華嚴院以徹祠部焉師咸通六年七月五日示滅壽八十有五僧夏六十有四後四十有五日建窣堵波於西岡十一年其徒從紹疏師行實於闕升其院為華嚴寺有徒三十人皆肅肅可觀不忝師門於戲師儀梵骯髒言詞雅直沖默而明敏慈恕而剛毅儒書皆通三皇五帝之道言未嘗及而人知其博古也經論綜貫天堂地法之說舌未嘗舉而人皆務崇善也所至清風凜凜政所謂釋子之高傑者也弟子道光道圓令詢悉器傳師道愚冠扣師關壯以隨計乾寧二年忝登甲科東還薦造金地歲周三紀膠掌而拜影堂腹藳而銘遺美不可使桑門大士泯而無述焉故銘曰智月不缺乘虛照物道花不衰吐豔無時洞徹照灼傑然吾師禀薦福戒分章教枝厥宗得雋內庭擢之御香徹印雲間資期數有汙隆道無磷緇德風徒襲法舸寧維山幽跡高身沒名垂松塔雖故竹毫可追稽首影堂敬刻斯碑大師法號義存長慶二年壬寅生於泉州南安縣曾氏自王父而下皆友僧親佛清淨謹志大師生而鼻逆薰血乳抱中或聞鐘磬或見僧佛其容必動以是別鍾愛於膝下九歲請出家叶而未即十二從家君遊莆田玉澗寺寺有律僧慶元持行高潔遽拜之曰我師也遂留為童子焉十七落髮淳朴貞古了與流輩異暨武宗皇帝乙丑之否乃束髮於儒冠萊中而蓬跡來府之芙蓉山宏照大師見奇之故止其所至宣宗皇帝之復其道也涅而不緇其身也褎然而出北遊吳楚梁宋燕秦受具足戒於幽州寶剎寺訖巡名山扣諸禪宗突兀飄颻雲翔鳥遊爰及武陵一面德山止於珍重而出其徒數百咸莫之測德山曰斯無偕也吾得之矣咸通六年師歸於芙蓉之故山其年圓寂大師亦自溈山擁徒至坐於怡山王真君上升之地其徒熟熟師已嗣德山纍纍而關師拒而久之則有行實者始以師同而議曰師之近巍巍乎法門圍繞之所不可造次其地宜若鷲嶺猴江之為卜府之西二百里有山焉環控四邑峭拔萬仞崷崒以支圓碧培塿以覛㣥青怪石古松棲蟄龜鶴靈湫邃壑隱見龍雷山之半頂之上則先冬而雪盛夏而寒其樹皆別垂藤蘿䒠茸而以為之衣交錯而不呈其形奇姿異景不可殫狀雖霍童武夷無以加之實閩越之神秀而古仙之未攸居誠有待於我師也祈以偕行去聲秋七月穿雲躡蘚陟險升幽將及之師曰真吾居也其夕山之神果效靈翼日巖谷爽朗煙霞飛動雲庵既立月構旋隆繇是柅法輪於無為樹空門於有地行實乃請名其山曰雪峯以其冬雪夏寒取鷲嶺猴江之義斯則庚寅逮於乙未師以山而道侔山以師而名出天下之釋子不計華夏趨之如赴召乾符中觀察使京兆韋公中和中司空潁川陳公每渴醍醐而不克就飲交使馳懇師為之入府從人願也其時內官有復命於京語其道其儕之拔俗悟空者請蛻浮華而來剃僖宗皇帝聞之翰林學士訪於閩人陳延郊得其實奏於是聖錫真覺大師之號仍以紫袈裟俾延郊授焉大師授之如不授衣之如不衣居纍夏辛亥歲朔遽然杖履其徒啓而不答雲以隨之東浮於丹邱四明明年故府侍中之有無諸闕克寸句洗兵於法雨致敬於禪林馥師之道常東望頂手後二年自吳還閩大加禮異今閩王誓衆養民之外雅隆其道凡齊僧構剎以之龜焉為之增宇設像鑄鐘以嚴其山優施以充其衆時則迎而館之於府之東西甲第每將儼油幢聆法輪未嘗不移時餘乎一紀勤勤懇懇熊羆之士因之投跡檀冉漁獵之逸其或弭心鱗羽戊辰年春三月示疾吾王走醫醫至粒藥以授師曰吾非疾也不可罔子之工卒不之餌其後札偈以遺法子函翰以別王庭夏五月二日鳥獸悲鳴雲水慘悴其夜十有八刻時滅度俗八十有七僧臘五十有九以其月十五日塔其藏焉其塔也其徒僉云以山之奇堂之峻法堂也大師之生也去聲是其歿也不宜捨諸故坎其中焉若干尺之高若干尺之周皆雕珉石錯火壤磷磷焉嶪嶪焉四隅則環宇以庥玲瓏䆗窱雲霞時入風雨罔侵其日奔閩之僧尼士庶僅五千人閩王娣之子降左金吾衛將軍檢校刑部尚書延禀始陳祭是設齊焉大矣哉大師之見世于是罔量其僧耶自始及茲凡四十年東西南北之夏往秋適者不可勝紀而常不減一千五百徒之環足其趨也馳而愈離辨而愈惑常曰三世諸佛十二分教到此乃徒勞耳其庶幾者若干人其一號師備擁徒於元沙今安國也其二號可休擁徒於越州洞巖其三號智孚擁徒於信州鵝湖其四號慧稜擁徒於泉州招慶其五號神晏今府之鼓山也分燈之道皆膺聖獎錫紫袈裟而元沙級宗一大師招慶元晤大師鼓山定慧大師之命焉其曹早曰法雖無說名以文垂自少林之建曹溪無不刻碑而紀頌我師其默乎一旦惣其曹句首曰從智如堵而扣愚求文滔老且病刊勒之加多已辭避欽師之道不覺聳然偉夫恭聞釋波之東注也流其象則不流其旨流其旨則不象其形厥初大迦葉之垂二十八葉至於達摩達摩六葉止於曹溪分宗南北德山則南宗五葉大師嗣句其今六葉焉雪峯之分元沙洞巖鵝湖招慶鼓山其道皆離貝葉以祗其七非滔之能言也但美數公葳蕤其葉衆多殷勤之請遂為之銘而應其求其詞曰曹溪分派誰繼南宗一言冠絶六葉推雄無物之物非空之空不瑩而明不增而隆縮靡秋毫舒靡鴻濛不有靈鏡曷揚真風懿彼閩越巍乎一峯洞壑斯異雪霜罕同天之有待師也云鍾名將道協跡與仙崇奔走厥徒百千其叢庶幾幾人莫不元通分燈照耀樹本玲瓏聖君寵謺賢王敬重不生不滅曷始曷終刻貞石於斯文旌厥德於梵宮姬孔之教與日月以懸天顏閔之馨作芝蘭而出地可不誄清塵於桂苑揭貞石於松阡敘白楊之別生悲風示黃壤之下藏嘉氣者哉漢太邱長二十三世孫南安縣尉諱真生處士蕘蕘生大理評事齊忠信篤敬不類今世嘗有白雀巢其庭宇佳蓮産其池塘識者謂其後必大有子九人皆力儒學公其長也諱嶠字延封齠齓好學弱冠能文與高陽許龜圖江夏黃彥修居莆之北巖精舍五年而二子西去復居北平山兩地穴管寧之榻十霜索隨氏之珠然後應詔諸侯求試宗伯而以咸通乾符之際龍門有萬仞之險鶯谷無孤飛之羽才名則溫歧韓銖羅隱皆退黜不已故公自丁丑之及丙申高價馳而逸步躓既而大盜移國德公文行之深者安州鄭郎中諴孫拾遺泰嘆而勉之久乃持輦下之屈名適蜀中之貢府致卿士倒屣場席開路清風既而竊為權官沽諸將求識而薦之公時己出經試比言之者闕一字榮紙而亡是舉光啓二年收開三年榮登故相滎陽鄭公禮部上第大哉公為人謹信居家純孝事繼親彌善廬先君墓泣血有聞其所為文扣孟軻揚雄戶牖凡三百篇有表奏牘頗為前輩推工且大唐之設網士得之於是者歲幾人焉矧復有避宦者之節若走衝虛之車焉滎陽公自以得人其春首門人脫麻攝京兆府參軍司空太原公帥閩解榻以禮辟之為大從事受大理評事兼監察御史今府相繼擁於節旄益賢其參畫奏大理司直兼殿中方期輟從藩屏入踐諫垣不幸寢疾浹辰不起享齡七十有五光化二年十月三日嗚呼將來失其龜鏡斫者喪其般倕雖登大年終恨朝露三年庚申正月十七日丙午葬於泉州莆田縣崇教里北平故山禮也公兩娶魯國林夫人滎陽潘夫人其子三人仲曰說買石太湖刊文愚與公同邑閩越江山莆陽為靈秀之最貞元中林端公藻冠東南之科第十年而許員外稷繼翔其後詞人亹亹若陳厚慶陳泛陳黯林皓許溫林速許龜圖黃彥修許超林郁俱以夢筆之詞籯金之學半生隨計沒齒銜寃曠乎百年而公追二賢之後七年而徐正字寅捷八年而愚闕一字莫不以江山之數耶猗歟昔之負高才不以位而碑者襄陽惟孟先生焉今也纍懿德不隆位而碑者以陳夫子始愚沾巾宿草無愧抽毫其辭曰江山之秀鍾乎人純孝高節并其身掬茲二美摛為雄文以之登桂科以之列蓮賓斯為君子誰曰未仁嗚呼九原宜樹貞珉維光化三年歲次庚申正月庚寅朔十五日甲辰將仕郎守國子四門博士黃滔謹以清酌之奠敬祭於侍御陳君延封之靈伏以靈閩之江山莆稱秀絶首武德之科級自貞元之英哲其後繼生碩儒亹亹鴻都交懷荊璞互握隋珠皆指期於拾芥終慟哭於彎弧洎宣皇之後年則夫子之斯出持曾參之孝行袖孟軻之文帙薦賦諸侯上書聖日射宮而徑挺弦矢藝圃而葳蕤華實難亨者吾道難偶者至公管仲三奔非戰之過孫宏十上蓋時未通七千里而辛勤上國二十年而惆悵東風人皆一一以興憤我獨孜孜而養蒙既而鳳闕飛塵龜城挂榜儀曹方急於中興權宦輒窺其上賞殊不知楊吟誦於犬子景薦延乎商鞅古為不然吾肯斯倣誰不奇夫子之節誰不高夫子之名冰霜卻污松柏居貞渭水之釣有守武城之徑寧行逮夫岷峨歲改岐雍煙清天子復含元謁見有司新都省權衡巍巍令聞赫赫嘉聲遂從寰海回翥蓬瀛振輝光於甲乙開道路於孤平望高而先脫麻衣家遠而須榮鄉土十二人林君茂躅一百年莆邑大數君侯設醴以前席里巷拜塵而如堵雷車轞轞鶴賀翩翩初命就門見東周之三語前程不日候西漢之七遷旋以孔樽引滿徐榻解懸白璧黃金而謺矣玳簪珠履以加焉列藩所得者賢才古人所重者知己既將推珍於席上豈獨矜詞於雪裏莊周說劍則韓魏呈鐔郭隗升臺則樂鄒覯止繡衣曜日驄馬嘶煙飛詔而賓階次第假途而寺盤旋莫不漢帷駐策薛石留箋從容渥澤寵異淹延胡言薤露忽敗椿年嗚呼石火風燭驚波逝川聖賢之不免矣古今之共痛焉滔江鄉則中外親姻帝里則參差硯席干名而後乎一紀論友而仰乎三益蟬槐給念幾同京洛之愁鶯柳看時各署神仙之籍別來輦下歸自甌中塵忝而郤詵桂緑因依而王儉蓮紅斷金益固投漆攸同見行藏於柱史論倚伏於塞翁實期以始者文場之懿德邇來使府之清風伏蒲北省起草南宮更雪當時之寃滯少為吾黨之隆崇是何天之喪道之窮匆匆大夜默默元穹滔復曉夕以思江山之事林君則以合浦垂名夫子則以申秦得意高步斯振宏規靡異前輩曠世後來遂志俱蟠使下之柏俱亶乙中之二林端公貞元七年首閩越之科第以珠還合浦賦擅名後十年莆邑許員外榮登自此文學之士繼踵而悉不偶時曠八十七年始鍾於延封其文以申秦續篇亶名後六七年徐正字及第兼滔塵忝林端公同延封榜皆第十二人皆開路於後人皆終使府大判官判官皆柏臺林荊南延封閩中也推是言之豈偶然耳賢哲相望今昔一致嗚呼延封昨日而冰壺仙霧今辰而丹旐芻靈雖死生之理能一終痛傷之懇罔寧況以平生樹德幽宅刊銘無慙郭泰之賢箋毫曷措爰枉趙岐之寄涕淚交零水咽雲愁風悲日暮精靈一閉於泉壤歲月空蒼於壠樹椒壺略備蘭俎聊具申永訣於斯言庶冥感其誠素嗚呼哀哉惟靈伏以彼蒼者穹禍淫福善噫何斯言之或謬歟籛鏗壽而顏淵夭盜跖宥而嵇康刑屈原寃而文考溺冉惡疾而左喪明胡其然哉胡其然哉伏惟明靈柳蔥松峭山嶷鶴孤落落君子行行魯儒始者辭鷗西邁希鵬北徂高高蟾桂赫赫鴻都和贄之學三泣宋盧之俟一呼而以氣直志大數奇道汙大中季之計車奔走咸通際之名路崎嶇於是涕唾聲華毫簪笏枕中罷競於名位壺裏別窺於日月東尋玉籙則龍虎嵯峩南訪金沙則羅浮突屼北固風清西陵月明蘭舟泊岸金磬飛聲塵埃謝傅之叔姪夢寐茅家之弟兄古觀秋住靈蹤日行松下之齊宮肅肅雲山之醮火熒熒罏然北癸鼎化西庚羽人傾蓋府帥投誠說浙西周體范居陶象端適衛蓋婚嫁之須了匪貨財之所繫愈高雲鶴之逍遙益笑匏瓜之繫滯何武江都蕭牆禍儲羊腸莫守蝸角旋孤說淮南高蕭條陳蔡之圍聖賢大困惆悵崑崙之火玉石俄俱綿邈吳山蒼茫閩海遽聲沉而響絶薦時移而歲改絡秀愁積孟光泣倍山頭之鶴駕無覩水底之鯉書空待宅相征輪梁園洛濱見徐甲之移主知伯陽之蛻身海山失翠烟樹亡春滔竊惟早歲忝拜清塵蒙以拾青相器投漆相親鑒羲之必晉朝名士識陳平為漢代英臣爰將淑女俾結嘉姻十載不攀於桃李兩誠空貫於松筠愚以感明靈之殊義戴明靈之至仁金重季布枝輕郤詵逡巡東越拖擲西秦實期歸釣嚴灘終棲鄭谷戶外山碧樽中酒緑將仰止於樂冰冀參差於衛玉豈意寂寥音信髣佛幽明聖人之齊始卒君子之一枯榮天上之鵲橋宜度人間之鴛被須成開簾鳥囀回轡蜩鳴東牀則黯黯愁色南渭則哀哀哭聲嗚呼哀哉平生氣概昔日忠貞龜齡易昧駒隟斯驚在物之理豈人之情愚輒疑道家有形全氣全兵解木解考斯事矣或其義也不然者胡埋南祖之蛇罔念北翁之馬嗚呼哀哉列冢開阡重泉九原古之所制今也斯存伏惟明靈魏夫人遺蓮峯而取喻葛仙翁賸竹枝以為論固以神遊蓬島洞入桃源然則不樹松柏罔詒子孫是用葬喬山之冠劍招湘浦之精魂滕公啓室宋玉申言曰楚山青兮淮波緑劉雞飛兮隨鷁覆遺蹤脫屣辭彼俗楊柳霜多不堪矚螺江淺兮甌山陰繼升天兮徐董任風為輪兮雨為轡東歸來兮北追尋陳桂席兮奠椒漿樹馬鬛兮開壽堂千秋萬歲兮舊江鄉魂歸來兮山之陽詞咽淚迸猿悲鳥傷東波送恨西日沉光雪耀霜明而莫覩芝焚蘭以空芳孀妻捧奠出女尸喪嗣男而杳杳江嶺鄙子而明明肺腸劍以求心而克許樂以悲告而寧忘願明靈之冥感鑒蘋藻於壺觴嗚呼哀哉故右補闕博陵崔府君之靈惟靈大唐有進士科無巖穴詔故鵠版之降不易其人元和之起也則有陽諫議城凜凜清風其不起也則盧諫議同昭昭高道一以權豪之忌空福道民一以堯舜之世但樂箕潁其後陸君汙以忠勳應召惠君實以忠議赴徵未委起草伏蒲何如人也洎博陵崔君之生也迥禀高奇兼之文學近則繼李飛之蛻隨貢遠則同毛義之志奉親東浮謝公舊州式避戈㦸遁於仙巖濬谷克業經綸而以酒美肉羶澤馨川媚五辟三顧懸榻開樽不辭小國之權蓋切高堂之養既而大君之思夢說四輔之急薦雄繫三詔而就門參七人而列職仲舒謁帝必演春秋呂望投竿定為師傅奈何龍蛇起陸烏兔無光莫扶劉氏之宗祧空泣袁安之涕泗甌中越絶養素守蒙賢王之結嘉姻時議之期良輔豈意皇天不祐白日無憑消渴之亟茂陵少微之入瑤桂芝焚蘭梁壞山頽雖人生之有定期實士德之為不幸嗚呼閩中三月烟光秀絶脂轄赴闕鯤鳳嘈囋其猶南浦魂斷北梁涕咽而況昨日軒車今朝塗芻唱薤露以出門飛粉旌而戒途五離擇日九泉卜居其在樵蘇其在博沽至於路行尚皆悲吁矧其嶽嶽之曰男子鏘鏘之號魯儒識通龜策握耀蛇珠數百篇有唐之詩數千字中興之書國風騷雅王佐謀訏沉光之猶衝斗垂翼之未搏扶賫志歿地其痛何如雲物為之無色剛忍為之不愈滔飲風永嘉傾蓋無諸多君於士元廊廟待我以叔度陂湖交言既異投分斯殊方俟彈冠仰修程於霄漢誰云執紼悲落景於桑榆豈鬼神之害良善而吉凶之昧賢愚顏回先死盜跖後殂世之災眚生之毒痡愴恨風燭凄凉隙駒肴匪豐俎酒匪馨壺歎松蒿而永往託蘋藻以聊舒明靈有感鑒而歆歟己乎己乎嚱嚱維光化四年歲次辛酉正月二十七日祭於東君之靈閩山秀氣魯國清塵天之授受鍾我仁人卓矣生世學而立身衛玠則旁輝其舅曾參則大孝於親始者隨計歸越上書入秦亶價而侯門傾動呈功而鳳藻精新咸通之年九霄也鷁路乾符之際萬仞也龍津既而甌嶺經兵蜀川迎帝匪無隨駕之懇實切問安之計肩負燋飯志銷丹桂雖深藏豹之誠難遏化鯤之勢都堂昔日困一千輩之交鋒大國中興作第二人之登第杏園醉後華表歸時往歲井邑茲辰羽儀旋屬姑蘇積釁勾踐興師於是板輿避地草檄從知百越之江光洶湧四明之山翠參差長鯨既剔逸足難羈東別朱門南還故里一朝而奄至泣血三載而蔑聞見齒仲由此後千鍾之祿悠哉毛義終身一檄之榮已矣修程不顧盛德逾馨田園草緑戶牖山青與夔龍而抗跡追園綺而忘形且期齊鶴算壽陟龜齡是何修短之期莫測吉凶之閾難扃明神罔佑大禍斯丁士林慘怛詞苑伶俜滔始自童年至於壯歲江鄉為竹馬之友京輦作谷鶯之會三朝被刖棲遲泣荊璞之艱十上遭時次第到瑤蟾之內誰言忽遽歎存亡痛人琴之俱絶緬膠漆以空傷嗚呼用新平生德行曩昔文章近則孟浩然雖人間不仕遠則卜子夏乃地下為郎誠以高科而貞退固從陰隲以舒張逝水東流踆烏西匿昨辰而椒桂獻酬今日而藻蘋滴瀝且彭祖之延永壽亦至銷磨而巨卿之哭故人得無悽惻況乎東西多故南北遙程不得親隨薤露送別松塋既闕殷勤而執紼空將嗚咽以沾纓謹以依稀蔬果一二精誠願冥符於肹蠁申永訣於幽明維光化三年歲次庚申十一月日敬祭於林君執友之靈惟靈夫渥窪之足以千里之為程已馳之而俄沮嶰谷之音以六律之為府既參之而忽泯夫不永其終始何痛如之嗚呼林君得以言矣君負相如之詞賦慕郤氏之科名一紀秦城千門禰剌雖衆口大馨其鳳藻人罕如焉而三春纍困於鶯喬數何奇也然則女貞而十年必字藥靈而九轉須成果契至公克升上第既己東堂得意南國言旋龍珠則動彩於握中鴈字則增輝於天際將冀盛清風於吾道豈期歎逝水於人生屈原之難問者天蔡澤之不知者命螺江烟景方翻丁令之羽毛駒隙光陰俄啓曾參之手足誠壽天靡移於夙契且鬼神何害於善人禍福吉凶悠揚曖昧淒涼物理慘怛人情今則壽域斯開貞魂永蟄壠頭水咽山上雲愁鄧攸之繼世無兒語留身後崔曙之遺孤有女詩在生前雖盛衰之同休亦存亡之至痛滔京關進退硯席參差幸忝先鳴彌欣繼捷未賀桂枝之入手忽從薤露以傷心修短有茲吁嗟何極靈輀戒路丹旐翻風遠寓丹誠聊陳薄奠願垂冥感鑒歆於斯嗚呼哀哉惟靈金石呈姿陂湖禀量伊彼昭代生乎德門膺河清嶽峻之期亶賈虎荀龍之號時稱最怒賈家三虎偉節最怒家謂無雙月中則桂樹連枝日下則鴛行接翼故得鄰家醜婦競顰西子之眉洛下諸生皆掩謝公之鼻為大廷之領袖定千古之風流既而魏闕飛塵蜀都迎駕雖則急賢於行在而志作賦於間居留連霅水之烟波容與松江之歲月其奈珠以川媚蘭於澤馨從吳苑之琴樽謺堯天之雨露金臺蒲省驄馬螭頭誠幾三顧以就門猶作八元而在野其後七升赴命二妙對揚天駟呈材蛟龍得水入鼇山而侍從登鳳閣以優游名由實生位以德舉天子乃擢王褒為諫議升孝若於貂璫前彰潤色之功後養燮調之業旋以欃槍未落岐雍多端忘越嶺之崎嶇慕荊州而倚托東閣之留連斯重北轅之行邁方營誰料彼穹者天俄奪之魄漳濱一鬼驟苦劉楨殷氏兩楹遽鍾夫子山頽梁壞璧碎芝焚雖人世之死生實士林之摧沮今以湖湘梗澀伊洛迢遙北邙之路連天松楸莫附南巷之號至血邱壠權儀烟雲慘淡於原頭猿鳥悲涼於林際滔曩從上國獲戴殊私近慶外藩薦承厚顧每佇十旬之入拜寧期二豎以來攻彭殤雖謂其同休幽顯其如乎永隔靈輀戒路丹旐翻風昨辰而椒桂獻酬今日而蘋蘩滴瀝人生到此天道何言雙淚空流九泉無曙東波嗚咽西日蒼茫輒寓茲誠謹陳薄奠敢祈冥感髣佛歆斯惟靈趙璧呈姿隋珠禀價為乎國器生之德門劉家則三嘏揚芳馬氏則五常亶美故得數枝郤桂交茂鴒原一本田荊分輝雞樹理窟則曲臺得雋寶人則華省垂名由是迥拔蘭宮騰光水鏡臺推二妙日俟七升不幸岐雍多艱干戈未偃補傾乏石救濁非膠爰攀鴈字於五湖因展驥程於百越誰料皇天不佑彌苶斯縈遽折椿齡俄隨薤露山頽梁壞芝蘭焚雖修短之有定期實簪紱之為至痛今則江湖梗澀京洛迢遙權卜靈岡寓安壽域川上之東波嗚咽雲間之西日慘悽大夢莫回下泉長暮滔早干輦轂歷踐軒牆旋振羽於邱門獲陪塵於阮巷顏回短命既恨當年溫氏冥裝復從今日人生若此天道何言涕淚空流幽明驟隔嗚呼哀哉輀車明發丹旐晨飛輒憑蘋藻以寓誠用薦塗芻於永訣願垂冥感髣佛鑒歆嗚呼哀哉故軍倅觀察推官檢校主客員外郎廣平宋君希邈之靈曰惟靈物有盛則有衰人有生則有死古今不易之數毫髮無差之理然則厥壽苟百壽終則滅厥身苟修身歿名留是以顏子夭而其言不朽原壤老而於道何求吁嗟希邈藹然清休蘭杜敗而終馥松柏折而終秋德水千尋人材八尺敻雲鶴於風裁濊陂湖於胸臆既而臺築黃金禮先白璧為席上之至珍運幕中之婉畫洛水波清泉山翠橫優游五府輝映雙旌兩地之隆崇物望一方之煦嫗人情繇是入曳珠履出居武城尊俎克彰於令譽絃歌回振於嘉聲才業大聞君恩薦至爰從寺以寵陟旋慶蘭宮之澤被丹鳳飛詔銀魚受賜雖棠陰蓋地能資樹德以行春而醴酒謺觴終以持盈而戒意九仙樹碧八座塘深駐清源則一府延頸赴無諸則一郡沾襟嗚呼希邈持何道致人如斯之欽豈非秉仁義忠孝以行己無是非毀譽以萌心者哉奈何晉公二豎漳濱一鬼惡去藥石之內樂入膏盲之裏冉耕惡疾以相攻長卿消渴而不止艾烟百穴藜杖二年禍被三彭之所迫靈非九轉以寧痊嗚呼哀哉石火風燭驚波逝水誠修短之無改矣奈痛傷之有等焉芝焚桂璧碎珠捐至於行路孰不涕漣愚一揖清塵偏容瑣質初憐淡以如水後乃投而若漆十年之寒暑無變三益之金蘭愈密洎夫秦城駐跡儉府叨招竊惟上榻幸忝同僚南二隼旟雖寄懷而稠謺北依龍節終積戀以迢遙沙岸迎歡津樓送別且言不日之後會誰料終天之永訣人生夢幻夫復何言世路存亡難勝痛咽嗚呼哀哉昨日而箋函寓意今朝而蘋藻興詞駒隙之光陰如此龜臺之學習何斯幽明驟隔音信無期加以道路修阻弓旌縶維慟哭寢門而莫逮呌號穹碧以奚為聊馳一奠之椒桂用敘千秋之別離噫嚱噫嚱已而已而維天復二年歲次壬戌敬祭於故秦國太夫人之靈夫生帝王則若文母方鍾至聖生人臣則若陶母方降大賢信夫韜昴宿之耀於胸襟掬嵩山之氣為懷抱豈容易哉伏惟明靈天資婦道神授母儀金石不足喻其貞明芝蘭不足表其芬馥訓逾孟織智邁謝圍顏氏子則提育聖人曹大家則師資諸女既作閨門之上瑞乃生英傑於皇家立曠代之鴻勳擁兩藩之龍節食則萬錢調膳祿則三世及親見綵衣則衣錦之姿見冰鯉則和羹之味騰輝女史興詠國風推於古今實無倫比乃由懿德致此大榮嗚呼靈藥難求流光易謝本冀霜松而永壽忽驚風燭以斯零竟成舉世之悲傷空切至誠之號慕審知幸攀令嗣獲忝親鄰論交既契於金蘭抹泣乃同於親屬輒陳薄奠用表悲誠敢冀明靈依稀歆鑒故南平王之靈惟靈五羊奧區番禺巨壤漢為列郡唐作雄藩總百蠻五嶺之殷有出將入相之盛是故地啓嘉數天生大賢濬六韜三略之才謀韞五袴二天之政術俾其於家受詔衣錦馬牙控二十四州之繁難當二十八齒之美茂光揚千古冠絶一時鍾其明靈其昭昭矣至若恢張霸業揚清波臺陟九層靡慚郭隗劍提三尺授自呂虔爰持副二之雄姿遂領節旄之重寄由是澤施甘露令肅秋霜掀文房武庫以連雲騰逸氣英風而偃草上榻則阮瑀下賢則左車從善則軾閭宣威則斷案故得越伏波之銅柱獻而來感鄂公之鐵鞭呈祥以見火山改色珠浦生光無煩處默之酌泉大鄙趙陀之纍土然後鳴鐘出入調鼎升聞致交趾之封疆歸石門之教化九遷渥澤克居浴鳳之池雙立節旄遠過跕鳶之水雖士鮪列弟兄三地山簡兼荊湘四州語未同年事推曠世嗚呼是何才德之若彼功業之如此而彼穹者天不壽其齒畢雲龍之契會與龜鶴而等倫矧天子方欲使降皇華恩宣金冊表裏東周之盛旌崇南越之隆胡二豎之亟攻竟三醫之莫救泰山頽壞俄興孔氏之歌漢水淒涼遽罷羊公之市實國家之不幸實藩鎮之不幸某早塵興國旋忝睦鄰雖瓊樹之未親若銅盤之已接方定金蘭之至分豈期幽顯之驟殊況以幸結良姻纍交專介幕下崔員外昨馳禮幣嘗詣門牆爰蒙執手之歡宏敘親仁之旨今則遽悲存歿益歎彭殤故將薦舉征塵躬申薄奠九泉注望於歎逝以難勝五月指期表同盟之必至嗚呼哀哉曩馳羔鴈今遣蘋蘩伊人事之有茲顧痛傷而何極然則荀龍賈虎大馮小馮雖嗟松壠之長歸終慶荊枝而繼茂永言歡好寧怠初終幸明靈之一臨鑒此丹赤嗚呼哀哉
