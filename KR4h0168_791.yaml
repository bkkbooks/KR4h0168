front:
  text: 全唐文欽定全唐文卷七百九十一遂會昌六年官太學博士直宏文館
  hash: sha256:3c737b7e16026628cfd1e10b5294868a7d9efed77abab64040baf718372b2e37
  markers:
  - {type: head, offset: 14, content: 鄭遂, id: KR4h0168_NFKB_791-h1, level: 1}
body:
  text: 夫論國之大事必本乎正而根乎經以臻於中道聖朝以廣孝為先以得禮為貴而臣下敢不以經對三論六故已詳於前議矣再捧天問而陳乎諸家之說求於典訓考於大中廟有必修之理主無可置之理何則正經正史兩都之廟可徵禮稱天子不卜處太廟擇日卜建國之地則宗廟可知則廢廟之說恐非所宜廢謹按書詩禮三經及漢朝兩史兩都並設廟而載主之制久已行之敢不明徵而去文飾援據經文不易前見東都太廟合務修崇而舊主當瘞請於太微宮所藏之所皇帝有事於洛則奉齊車載主以行重厚會昌六年官祕書少監宗廟之作其來尚矣宗言尊也廟言貌也尊祖考容貌之處尤不可不嚴其制司空禦災捍患東漢光武錫青社於茲土襲封纍代作世嗣之始焉世列祀典牲奠罔缺朝列九禪澤垂千載古木岑樓堞絲蘿邃幃帳而尢不動而敬不怒而威郡邑仰其靈封境承其祐無誠不感有禱必通而殿堂古遠土木力盡鴛瓦分散虹梁敧傾漏雪過風彌年積月雖鶴駕如在而翬翟罔形於是二十三代孫朝議郎前杭州臨安縣令上柱國疑有則官居五命之尊長冠諸枝之首化一宗之德輯千門之睦言發響逐人胥樂成以謂難仍舊貫爰立新規詢謀僉同得心應手子孫願施力輸緡疾風之靡草矣不浹時而轇轕遒奡軒楹蔽日飛甍遏雲宏麗固護周環密緻神靈得以永安也其承稟有若此者伏聞非常人立非常事誠言乎哉宜採能文刻書金石永俾來裔審茲重典祕書少監從孫重厚撰唐會昌六年歲在丙寅八月庚午朔二十一日庚寅宗長二十三代孫朝議郎臨安縣令上柱國有則并諸院弟姪及諸枝長孔目職司等同勾當修建一十五處宗人之名列於後煥京兆人大中三年攝館驛巡官以文林郎守涇縣尉雲騎尉山川視公侯之外凡有益於人者國命遍祭雖十室之邑有主於民民得以奉其威而賴其祐焉者按金籙經云小山小水必有神當隸近嶽今宛陵涇縣十八鄉戶四萬民奉湖山神蓋所以奉其威而賴其祐爾邑圖牒載山高三百丈上有湖水山名因也涇民札瘥禱之必瘳涇田水旱禱之必豐曲誠嘉志神無不答民遂立廟其下以祀斯亦涇之民得歸其心而保其身也京兆人韋煥曰天地之氣結而著形形於氣而有神今山川之神亦天隸下土付其地而宰之或靈或否在人愚智斯見矣今莫徵其初舊祀且陋逮文宗皇帝更歲號之初宰邑者裴公銲祈神有徵遂徹其故以廣之高堂敞宇土質彩衣歲聿其久復將顛崩邑人恂恂相與謀新重基列阼帳幕其塵丹故模駮輝光照人儀衛必備奇貌醜身輿馬必全翠飾金陳烏乎山神能靈於民民必來臻苟違舊德民將何親肥牷脂醴民之餱糧哀簫鳴鼙奪民耕功神之永福涇民山壤而后已乎煥尉涇畢期未代府公以簡召將行邑有王浰者纂聚其由來啓前庭遂為浰書修廟之歲月於右且異示於後生庶涇之人日有來者歎曰某年有韋尉子雖無他及我憐其為我紀茲事以思之大中三年十一月二十一日也濛字潤之宣宗朝官大理卿古者懸法示人欲使人從善遠罪至於不犯以致刑措准太和二年十月二十六日刑部侍郎高鉞條疏准勘節目一十一件下諸州府粉壁書於録事參軍食堂每申奏罪人須依前件節目歲月滋久文字湮淪州縣推案多違漏節目今後請下諸道令刻石置於會食之所使官吏起坐觀省記憶條目庶令案牘周詳珽大中時鄉貢進士湯有大德於天下戴之如日仰之如春其後也君諱華字知新曾祖備祖賓考嵒皆簪組相繼官烈當時頗有功於國以載於譜諜此略而不書公幼耽墳籍將欲振於時立大來之器以晨昏是切仕不擇祿釋褐衡州參軍圭璋美璞州縣良材記室之芳秩罷猶在再調授福州侯官丞兼總感德場人不告勞征賦皆集伉馴雉之化致象雷之聲謀而有方簡以蒞事授亮而庶務皆決正色而㣥吏瞻風公之器用未盡宏遠秩滿寓居南方以土風有殊瘴厲所染沈痼既搆天壽不遐以大中十一年六月五日終於嶺中連江邑之客第春秋五十八道路民慟風雲助悲先權殯於竹林原夫人琅琊郡王氏故衡陽縣明宰之女以禮節奉君子以慈和訓閨門感形影之未亡歎梧桐之半死望故鄉以泣血泛滄溟以護喪蓬首逝波沒身徇義艱險不憚旌旐之情今古罕及男二人長曰宗鉉次曰宗鎬女五人咸匍匐愴地哀號訴天以日月有時窀穸斯議以大中十二年十一月二十八日歸葬於明州卯貝縣龍山鄉江上里庚向之原禮也銘曰修與短兮胡可知聖與賢兮莫能窺器未展兮誠足悲存者有恨兮淚如絲哭丹旐兮一家隨風九原兮滿松枝密京兆杜陵人德宗朝登進士第歷官明州湖州刺史遷越州都督充浙東西團練副使皇唐御神器一百四十二載天下大康而海隅小寇敢肆蠆毒結亂於甌越而句章闕三字之口戰卒數萬皆由此之故是郡罹災逾苦井邑焚爇遺骸積而不掩生民僅有存者闕二字未完其危猶未安天子哀之詔擇可以子物拯艱者以鎮恤之乃命長安令河東裴警殿於茲邦詔書既下而罷民歡煦若幼子之望慈父焉彤䄡員來則收合創痍之境熙熙如衣之食之一年而驚逋復田疇闢茨孰興然後以禮義利物之教教之人之啙窳者教之以溫恭惇質人之卉服祝髮者教以儀飾之度人之匱財乏食者教以耕耨之事㣥吏懷其仁而畏其嚴罔敢射其利焉故為政三年其賞人也不用財其勵人也不闕二字於戲長人之體不一若乃華夏之人習性純純其理之也可朞月而致若海裔之人土風闕二字暴殘嗜殺寬之則法令非行威之則圜視而凶心勃生其欲馴之也難矣哉及公之化夷俗為鄒魯使父子長幼各得其宜則知中庸清靜之德感人深矣夫理一邑而能人和闕二字者則可以移於一郡而能導之以德教者則可以施於天下公之所理之行豈止郡邑而已實宜佐彼大化輔皇王以昌經邦國以康調元氣於陰陽者也公尋而進秩州民共思願紀詞於碑豫忝躡高蹤竊跡前事敢不頌厥美貽諸億祀銘曰美裴公兮肅肅清風純和積中令德顯融爰踐華省爰宰赤城克成厥功帝曰咨爾休懿可建旟於東美裴公兮於郡斯牧是祗是肅化流比屋變此夷風迄成魯俗人之父母匪公而誰慰我惸獨羡裴公兮胡棄我而適他邦惟我下民思心徘徊殷焉不忘願頌休績播億萬載刊於圭璋宏簡大中六年官宗正卿當司修圖譜官李宏簡伏以德明皇帝之後興聖皇帝以來宗祊有序昭穆無差近日修撰率多紊亂遂使冠履僭儀元黃失位數從之內昭序便乖今請宗子自常參官并諸州府及縣官等各具始封建諸王及五代祖及見在子孫録一家狀送圖譜院仍每房納於官取高處昭穆取尊即轉送至本寺所司磨勘屬籍稍獲精詳諷大中朝官司勛員外郎遷郎中自吏部侍郎謫守漳浦乾符中入為工部尚書檢校戶部尚書東都留守劍南東川道節度使得菩提一乘嗣達摩正統志其修證俾人知方則有大師法名義中俗姓楊氏為高陵人因父仕閩生於福唐縣年十四宋州律師元用剃髮二十七具戒先修三摩鉢提後修奢摩他禪那大師幼悟法印不汨幻機日損薰結元超冥觀先依百巖懷暉大師歷奉西堂百丈石丰刀石後依大顛大師寶歷初到漳州州有三平山因芟剃住持敞為招提學人不遠荒服請法者常有三百餘人示以俗諦勉其如幻解脫示以真空顯非祕密度門虛往實歸皆悅義味知性無量於無量中以習氣所拘推為性分知智無異於無異中以隨生所繫推為業智以此演教證可知也大師一日病背疽閉戶七日不通問洎出疽已潰矣無何門人以母喪聞又閉戶七日不食飲武宗皇帝簡併佛剎冠帶僧徒大師至於三平深巖至宣宗皇帝稍復佛法有巡禮僧常肇惟建等二十人刺史故太子鄭少師薰俾蕆其事旬歲內寺宇一新因舊額標曰開元於戲知物不終完成之以裨教知像不盡法約之以表微晦其用而不知其方本乎跡而不知其常咸通十三年十一月六日宴坐示滅享年九十一僧臘六十五諷自吏部侍郎以旁纍謫守漳浦至止二日訪之但和容瞪目久而無言徵其意備得行止事實相見無間然也問曰周易經歷三聖皆合天旨神道注之者以至虛而善應則以道為稱以不思而元覽則以神為名達理者也經云隱而顯不言而喻不疾而速不行而至後之通儒有何疑也異日又訪之適有刑獄因語及師曰孝之至也無所不善有其跡乃匹夫之令節法之至也莫得而私一其政則國之彞典其於適道適權又如此言訖頷之不復更言今亡矣夫強擬諸形容因為銘曰觀跡知證語默明焉觀證知教權實形焉體用如一曷以言宣太素浩然吾師亦然觀其定容見其正性不閲外塵朗然內淨智圓則神理通則聖師能得之隨順無競吾之行止師何以知得性之分識時之機達心大師邈不可追涓宰相珙子大中四年登第歷杭州刺史終御史大夫維光化元年歲次戊午九月戊辰朔八日乙亥皇帝若曰咨爾宣力興復功臣鎮國匡國等軍節度管內觀察處置修葺宮闕同州長春宮等使開府儀同三司守太傅兼中書令興德尹使持節同州諸軍事兼同州刺史上柱國許國公食邑四千戶食實封一百戶韓建朕以前代功臣實重信賞至有刻於鼎鼐紀在旗常垂帶礪之言保金石之誓勳賢所付宜茂明恩况卿秉謙蹈和持重守正屬朕前歲巡狩而乃躬親奉迎季孫之道在事君周勃之心唯安國畢力扈駕為我出車克奉行朝更無遺事可謂忠於社稷光映簡書旋以歸復京都葺修宮闕載宏舊制皆叶規程眷是殊庸實用嘉矚雖迭增崇數而未足酬功宜申誓券之文以示旌勳之典矧夫黃河不竭青山非窮比此賞延錫於苗裔使卿永荷祿位長受寵榮對銘鏤以同堅煥聲徽而轉美卿恕九死子孫恕二死或犯常刑所司不可加責禮命甚重往惟欽承宜付史館頒示天下洮大中時鄉貢進士有釋氏子宅於馬鞍山下者一日忽扣太原王生洮促足角坐涵意欲泄不能者數四頃乃作曰欲以天王堂事勞筆端謹按釋氏書云天王生于闐國作童兒時猶能血鏃射妖遂去走天竺遇金仙子授記護閻浮提補多聞王騰雲跨漢靸鬼撚魔霞幟雪㦸指勾擢絆竟鎮妙高北面水精宮中為藥義官長吁奇怪事孔子弟子慙於語然儒以正直為神今天王能射妖摧魔用壯護世是亦正直也復慙之哉按馬鞍山湧出平原中絶頂晴望他山百餘里緣接培塿咸溝穿塍織坦然鋪出復多奇石支疊危柱釋氏築室鑿倚山半今天竺堂實翼西北隅塑狀若聳屹然拄空金精獰王褱力溢膺腕彘卒象伍作為部落堂宇宏麗四檐飛翬庥靈庇像若鄋月㒼被甲擔戈立於煙靄洮因勞其費進曰非某力能皆邑民為之朔實成於張宏度堂實成於俞師甫吁大凡力於耕者一人切於穫者三人豈偶然於天王哉釋氏子姓闕號清建姓趙號良顗時唐大中三年鄉貢進士王洮立皓宰相絪孫舉進士纍遷起居郎尚宣宗女萬壽公主拜駙馬都尉歷禮刑吏三部侍郎大中十三年檢校禮部尚書河南尹卒自武德已後便有進士諸科出鶯谷而飛鳴聲華雖茂經鳳池而閲視史策不書所傳前代姓名皆是私家記録虔承聖旨敢不討論臣尋委當行祠部員外郎趙璘採訪諸家科目記撰成十三卷自武德元年至大中朝謹專上進方俟無疆璘字澤章南湯人徙平原開成三年進士大中時官祠部員外郎歷度支金部郎中遷左補闕出為衢州刺史伏以新正大慶萬國來朝華夷願覩盛儀士庶固當胥悅但竊聞關輔之內頻歲不登自冬以來降雪極少尚須祈禱方軫聖慈伏見去歲之初權御宣政從宜之制出自宸衷事簡禮全人心為便伏乞且推此例停御含元待至豐年卻依舊典所冀觴稱萬壽不愆元會之期禮酌一時益表聖明之美臣官忝諫列合陳管見浙東觀察治勾踐故城其東北二里有山曰蕺蕺蔬類也傳云昔越君所嗜常採於此遂用名之在晉為王逸少別址尚留故池與祠堂又云陳太建初有天竺徒聽門踰顛辨博神異及死葬山上其形數見後夢語其門人曰必為臥像屋之壓我則不見為之果如言而所搆華壯敞潔甲於郛內所謂昌安寺者其後二百七十餘年學人懷表猶病正位未廣繕治益嚴又十年值會昌廢毀之數獻文皇帝君天下大中初復許郡府量立寺宇而越州得其五昌安在詔中六年六月又別以戒珠為名觀察使尚書李公褒實司其事當是時其徒多罷去或不任事而懷表復顓其勞今則崇構真就矣學者或去或沒獨懷表齒且耄精恪如初可歡乎余長慶中始冠將為進士生寓此肄業時懷表己名字衆人中及開成繕治始休工余以前讎校祕書遊越與懷表復相遇蘄余為記逮今二十二換四時矣中間遭罹邱墟又重樹立於人事悲歡不可遽數循分纍寸奇蹇塵寰晚守江嶺強號顯達而表公不離繩榻幾覩廢興雪頂絲睂始終一趣可謂行充於內而福持於外者矣余既詳其本末思有以傳於綿長客有前藤州刺史駱巽與聞之喜曰某蕺山之下寄居人也且與表公遊甚久歸願買石以刻遂筆以授之咸通三年正月二十五日中大夫守衢州刺史趙璘書伸大中時人府君諱君平字君平其先燕國公纂集㣥書家有鳩金復撰才命論教流天下分派周室即是公之苗裔宗枝矣公本深州饒陽縣之人也別業樂亭積有餘載曾頲皇朝任絳州長史祖徽高尚不仕考承泰頃以城戍艱虞此城被幽州攻圍公負倜儻之材輸誠展效去元和四年授成德軍節度使牒補充十將兼充樂壽鎮遏都知兵馬使菀公押衙公君平將子之家赳赳軍前干城之志信義立身孤標作操東西欽企南北共談辨說仲由乃文乃武孝悌成家垂訓禮樂克著始終可以龜鏡焉公寢疾享年三十有六以太和八年八月草日終於市坊私第也嗚呼良木斯傾哲人其殞銜哀有餘可謂珠沈洛浦寶劍一促我遐壽孀居洞房遲遲飲恨葛藟無託夫人久嬰瘥瘵醫瘳無痊夫人以大中六年正月十五日歿於私舍夫人春秋卌有九女師娘子年齒初笄髫齔惣立春花欲發秋葉已凋割慈母之恩憐痛膝下之寤寐皇天不祐夭折妙年小娘子年一十有九以大中三年四月四日殂矣新婦天水趙氏才入貴門積善無瑕苗而不秀遂埋紅粉傷瘞九泉新婦年草有二以大中四年六月十一日喪矣皆附塋安厝可惜可惜孰謂痛哉實謂悲哉嗣子弇號叫攀慕糜潰骨體可以曾參同年而語哉遂乃庀冢修葬合祔元扃禮周終竟南沈漳水北望燕幽巍屹墳封雙靈再合卜取大中七年十月四日窆於縣城之東南三里故塋域殯焉禮也所慮年代深邃陵谷變移勒石記之千載無朽其詞曰燕公之孫苗裔深根常為儕闕變作弔賓空留七德兮千載書劒舊跡兮生塵夫人令德合卺同牢哀哉白駒兮西慝奈何松柏兮蒼蒼宙江南西道觀察使咸陽郡公丹子以廕調河南府司録參軍宣宗讀元和實録美丹政事拜宙侍御史出為太原節度副使召拜吏部郎中出為永州刺史還為大理少卿拜江西觀察使遷嶺南節度使加檢校尚書左僕射同中書門下平章事咸通中卒大理少卿兼御史中丞賜紫金魚袋韋宙大中十二年准詔嶺南宣問六月二十九日再過此藏經舊日創置隨寺毀廢賴道深和尚藏諸石室言上人明上人以補其闕獲覩舊績觸緒摧殞施三百千再建堂宇時湖南江西皆擾亂一辭京闕三踐危邦到此數刻與言明話道又乘軺北去男澤侍行余今年七月銜命按撫嶺南中旬之初自番禺赴闕聞洪兵大擾乃直趨鍾陵既至留一夕察其陰謀備知情狀明日渡章江二十九日憩此與言明二上人談元兼訪經藏遺址晚晴西去六十四日余廉問江西乃帥襄鄂許蔡四軍赴鎮十一月二十七日兵次北田余雖擐甲戎事方殷經過松門遲遲不能去之以示暇送駐前鋒於峴再與言公遊時明上人已物故悲愴久復跨馬前去因書行止題於水堂壁大中十二年十一月二十七日江南西道都團練觀察處置等使兼御史中丞韋宙題璠大中九年由郎中出為袁州刺史大中壬申歲夏五月乙未詔高平守璠曰汝在澤以能聞今輟於袁宜用前心以為理璠再拜奉詔南之秋七月哉生魄入浪於盟津鼓雙翼飛波抵鍾陵及仲月既維舟於觀步觀以淨為名昔東晉許真人棲息之舊地葷羶汙觸必有變怪按仙籍云神仙中有孝道明王授道要於聖母母傳法於吳猛許遜遜字敬之以孝廉上第補旌陽令則聖母為旌陽之師矣璠既升堂謁真人禮成而退傍有香水設位而無像質北墉有掛繢畫為少女者曰真人之聖母也璠謂聖母之嚴顏華髮不宜為幼婦必矣詢於耆舊求聖母之遺像一無可取者後數月春光滿湖繁花壓枝會郡之文士於望湖亭俄假寐於嘉蓮閣恍若有睹疑非在夢見老母涉菱波步浮芹至於閣前云神母之儀祗爾不必他求璠遽起命畫工施古脫其所見增減信宿方定儀相如涉菱之母矣乃於郡齊軒置座以塑畫像踰月而功就端嚴儀表威容凜然豈靈仙憑託而致是乎爰命道門都監易智周與威儀易景詵道士施契虛等以香花時果迎聖母歸淨觀時八年三月十五日記溫裕禮部尚書戣子登進士第宣宗朝歷官京兆尹天平軍節度使右軍曹濮等州觀察使孔溫裕奏伏以禮樂儒學教化根本百王取則千古傳風國朝宏闡文明尊尚祀典不違古制大振皇猷今曲阜縣乃魯國故都文宣廟即素王舊宅興儒之地孕聖之邦所宜廟宇精嚴禮物具舉近者以兗州頻年灾歉都廢修營徒瞻數仞之牆才識兩楹之位雖春秋無缺於釋奠而揖讓頗紊於彞章遂使金石之音靡聞於肸蠁俎豆之設常列於荒蕪聖域儒門豈宜堙墜臣忝為遠裔叨領重藩咫尺家鄉拘限戎鎮望闕里而無由展敬瞻廟貌而有願興功臣今差人齎持料錢就兗州據廟宇傾毀處悉令修葺皆自支費不擾州縣所需獲遂幽懇克申私誠伏緣兗州非臣本界須有申奏伏乞天恩允臣所請無任悃迫屏營之至謹具如前朗字有融宰相珣瑜子始辟柳公綽山南幕府入為右拾遺開成中纍拜御史中丞戶部侍郎為鄂嶽浙西觀察使進義武宣武二節度使歷工部尚書同中書門下平章事罷為太子少師卒贈司空當館修撰直館共四員准故事以通籍者為直館伏以修史重事合選廷臣秩序或卑筆削不稱其直館伏請停廢更添修撰二員璫大中時鄉貢進士此山前面有石龕龕有石像從彌勒佛并侍衛菩薩至神獸等計九軀案寺記云唐初有一童兒名善子十歲已下自相魏間來於此山捨身決求無上真正之理闕一字啓首闕一字四體遂墮未及半虛五雲封之西去其音樂闕二字天風錯闕一字畢寺緇白無不瞻聽乃鑿此山成龕立像旌之闕一字證明功德暨乎會昌五年毀去佛闕一字天下大同凡有額寺五千餘所蘭若三萬餘所麗名僧尼二十六萬七百餘人所奉驅除略無遺孑惟此龕佛像儼闕一字微有薰殘大中五年奉旨許於舊蹤再啓精舍寺主僧從闕一字聞於州縣起立此寺有杭州鹽官縣人僧子儒俗姓董氏不遠江湖訪尋名跡至六年五月七日得度既果前闕三字懇誠金采餝方山證明功德兼闕三字神及師子各二隻闕一字金彩色闕一字功價闕三字五十貫文施主二百餘人闕二字一鐫姓名闕二字左其山龕寺寺之艮直上可四里下思人闕一字井以闕一字處星端旁視闕一字滄溟有同蓬島闕一字龕石闕一字有泉不闕一字來源從細竇泄闕一字石盆闕六字而已玉液金漿莫得闕一字其甘闕三字香山闕二字質乎香闕一字子如公明山巒之闕三字固敬石之像長牢冀賢劫盡而同盡自闕二字外胡可傾移哉大唐大中八年四月八日鐫記鉉大中時處士竊惟金人西闕一字雷音絶唱於闕一字筮至教闕三字業空傳於漢地雖法門繁闕一字俱闕二字梁闕五字其闕一字陀羅尼焉于公稱惟則本河南人也家贍溫恭人稱英亮忠信先聞於闕一字室深崇闕一字志於三乘有悲闕一字之心具利闕一字之行闕王闕一字之暇闕二字興懷將構禎模冀崇妙闕一字有緣闕一字德同心為闕二字之利而居闕十二字乎存沒逝者不闕字于厥願存之豈爽以前心既屬道泰時通亦乃樹茲本意爰闕二字刻密言徵良匠以呈奇採元石而鑽鏤厥功既就乃卜闕一字縣城艮隅之立闕一字足使霑塵闕一字影闕一字屣闕一字舟瞰矚承風永辭闕二字鉉實不敏轍闕四字申闕三字述闕一字猷雖不足以成文闕一字深心於能事矣九野太清兆人承慶鑿井而飲方間射鮒之泉持刃以雄仍均佩犢之日澄瀾可汲思抱甕而無階銛刃將揮提刜鐘而可擬故乃旁求假器甫當於銅瓶何輕用傷人有類於鉛筑衡門未出遽覩虧全疏網難容俄聞置罰訟端斯起異共弊而無憾刑柄終疑遂殊條而靡決慎非投鼠破則宜陪法在鷞鳩傷固難逭比盜之訴不亦厚顏用刃之科誠非次骨文慚陸海晷落三晡空有薦於芻詞諒輕塵於藻鏡寧鄉貢進士攝館驛巡官大中十年夏六月公命遷社於州坤築四壇壇社稷其廣倍丈有五尺其高倍尺有五寸主以石壇風師其廣丈有五尺其高尺有五寸壇雨師廣丈而高尺自初獻迄終獻專一室有廈橫附二室皆南鄉備犧帛西鄉之楹凡二室龜甎脊道凡十有三條其縈折則三百九十有七尺繚垣凡百堵其高逾尋苞巨榕凡二十本南北行延崇甍展階揭雙扉於東鄉具扃鑰焉其外北東闢二室有廈其南立雙表及建功以十七日戊子起冬十一月庚子畢謹按閩故壇坫南邪西隙蚌蟹污輳負蒲葦之豪家禽野牧觸踐無禁至祈報時率戒閩侯官責辨與胥譁庀權事其晴也雖重菅不免於濡舄其雨也必撐篷以護緌瀆神勞人未嘗有寤者元侯關西公既蒞閩其春由郡儀即社喟然顧曰吾嚮理蘇厥壇惟更仍歲穰穰蘇人宜之今閩饒化期將丕革首在茲乎由是擇謹事者行故壇西躬取其地受之節餼嚴帑靡隱者除鳩工以掉畚斫材以陶坯肩有歡謠杵無怨築故擘錢垂十萬不徭一丁不斂一戶而爽潔開拓四壇鏤焉夫遷社於州坤右位也不書稷風雨尊社也禮稱諸侯為百姓立社曰國社而厲山氏之農棄配祀焉共工氏之后土勾龍兼饗焉風秩雨班光昭舊典蓋先聖王尊以示本均以行政未之改也惟我元侯敬恭乎上撫臨於下戢苛剃慢顯晦咸寧繁條陰森如肅其饗自然克靈克序德致元侯而施於一方也是月牙將翁行全牘其績歸成於公公曰壇倚浮屠祠爭出睂睫吾患將來有醉浮屠或易於遷徙焉苟非鐫琢則本末無所彰遂以記徵下寮寧寧不得辭且拜命之辱謹用二十九日戊辰獻記云詢河東人官縣尉余嘗作尉甸服聞侯真人升仙之說而未熟其事洎辛已歲宰於斯邑與渤海高公為交代方覩其文及詰諸耆耋皆與前文符驗噫神仙之術雖賢哲猶疑而道華登高松躡雲路繫衣松杪爐香尚煙杳然升天孰能致詰高公博學好古欲旌其跡俾蹈道之士勵志精勤故授受於子克成其事豈子晉吹笙來緱山令威化鶴憩華表獨留名於前代而不暫還故鄉是刻石舊居以期於絳節遇大中時守彭王府咨議參軍天地之大德曰生剛柔之育質曰性盛衰相攻存亡凌替理達希夷之旨竟歸終極之原至若生有令淑而顯茂則紀述而銘焉有唐故銀青光祿大夫行內侍省內侍伯致仕彭城郡開國劉公夫人霍氏世系文之昭也當周之興封建子弟因而氏焉其後代變時移今為京兆居人也皇父晟將仕郎守家令寺藏署丞公孝履資身恪勤蒞事歷官秩而益著勤瘁之名奉春儲而出納之功無吝幸以慶鍾德門是生愛女夫人即公之長女也夫人幼聞詩禮早肅端姿齊潔持心溫柔飾性霜松比操寒竹孤貞閨門悅懌之儀晨昏問安之禮皆主之矣榛栗告修將移他族遂適彭城公百兩之後一與之齊嚴奉舅姑敬恭戚族服浣濯之衣儉而達禮遵婉娩之教婦道日新飾其德而不飾其容嚴其家而不嚴其身名同夫貴德與家崇寵錫降封太原華邑昔公謂曰我以代傳鐘鼎門蔭蟬聯先開府秉左廣之權吾令弟統右歡之帥朱紫赫奕棣草口咢鱗敷者四人而悉忠於國孝於家學大戴禮諷毛氏詩堅白自持秋毫無隱功備史冊銘在景彞戒滿盈而慕冲謙棄軒冕而好疏逸功與名皆全矣而思內則雍穆吾心至矣夫人結褵作配三十三年履正居中其道益彰洎浙右歸闕纍移星歲頤攝乖宜寖成沈痼夫人侍執湯藥饁奉飲膳所舉者無不親嘗不顧寒暄不離座隅日月迭居近於二載夫人自此憂患亦已成疾先常侍奄從薨逝祭祀蒸嘗不失如在之敬至於卜遠之日疾將就枕諸孤曰違裕若是豈在力任夫人曰吾逝生死同塵何愛身命一閉泉壤永為終天但無虧於節義豈望苟自偷安踴哭而往畢遂其志爾來日遘綿惙針醫不減遽至彌留以大中九年十一月十八日終於來庭里之私第享年五十七嗚呼人之所貴者福與壽積善既昧於徵應隟光難駐其檐楹青春路遙白日將謝妝樓儼設玉匣漸見其塵封輕影忽飛夜臺已知其息處有子三人嗣曰復禮威遠軍監軍使行內侍省內僕局丞賜緋魚袋仲曰全禮內侍省內府局丞充內養季曰伸禮皆才聞五美學贍三冬孝敬承家忠貞蘊志總戎而理遵約法專對而辨注懸河自鍾艱疚茹毒銜哀泣血絶漿罔顧晨夕因心之孝冀報其劬勞思養之情徒悲於風樹以明年正月二十九日祔葬於萬年縣龍首鄉先常侍塋西禮也遇奉命述敘敬為銘曰夫人懿德蘊其明識端姿潔朗惠質柔直工修內範容無外飾玉鏡孤光珉瑤潤色問名成禮作合君子四德道隆九族稱美門崇鼎列功高嶽峙澤及華封輝光青史雲路碧落霜折瓊枝其往如慕其返如疑龍首之堽滻川之湄魂遊九原與公同歸恕大中時官蘇州府掾捨人事而介福專人事而薄神皆君子不為也苟不以仁惠愛民而止以墮怠理道持甘酌芳饎以交神神在聰明正直豈許之乎若憂勤焦思訪接無怠於賢人且不遺况賢神乎所以大德君子以厚人故不薄神楚州淮壖涘太宰伍相廟置在吳時臨邗溝當伐越時為餽運所開太宰經畫及因讒而沒其神憑大波雄憤無所泄蓄為猛飇駭衆吳人恐之故相與立祠邗溝上歷代皆崇其祠椎牛釃酒小民有至破産者比齊清河王勵刺此州申教部民不宜荒瀆非神之意其風稍革國朝龍朔中為狂人郭行真所焚乾封初準敕重建大中十歲四月十八日上以山陽荐災當寧憂軫曰非朝之顯德清望有材者不可分吾憂子衆姓於是詔兵部郎中榮陽公守郡立政行道得民之心每兩小差期晴少失候公一至請之靈貺立答連歲豐穰豈非神之陰贊耶舊廟菆隘淺迫前橫岸道塵坌玷褻公默圖將顯大之且俟誠化更廣即增張神宇俄有州人蔣容者啓公請合財葺之殆天啓乎何冥契如是耶於是開其前伸其後重肖神像及儀從等畢新廟之成也面河距淮巖然崇堂蜿然修廊像設新而英姿益明旗旓新而靈衛愈嚴庭可以長布武階可以勞拾級管簫朝奏一何和神也風月夕清一何宜神也祭法曰夫日月星辰民所瞻仰也山陵林谷川澤民所財用也今太宰之高不啻星辰太宰之利不啻山谷彼青骨而邀食於民者豈得同日而語洎詔徵公為左諫議大夫釋符之日恕蒙公付以留務行及祠前顧謂恕曰有事或誠存太宰其應也如響今去能無感焉君為我編其修建之由恕謹奉教一無僞飾公之始至也承菑沴之後廬井殘矣廩藏空矣道既殭殍牢亦充塞及公之布德也四時洽暢千里醉歌帑廥皆溢庭無訟人鄉縣郭邑致十倍之繁富廓宇亭肆興萬堵之宏麗休祥表見仁聲流揚傳車云歸耆少遮道竟夕不得前雖古之良二千石實有慙色素負謙損不先之道至於理功皆不欲人言恕親吏也其可隱而不書巨唐大中十二年七月十一日記符大中時河南人夫人林氏其先下邳郡人也曾祖闕一字皇任廣州參軍祖景闕二字任潮州長史父闕十七字鄉里咸謂闕一字高闕六字夫人則府君之仲女也未笄而柔和冰潔既鬟惟闕二字蘭馥由親族闕二字黨闕二字以闕二字也闕三字而閩中闕一字族富春孫氏子以闕四字作闕二字婦闕二字媒闕八字夫人闕一字得以闕三字得闕一字配闕而闕慈闕一字仁闕一字繩闕也闕冀闕三人長曰闕二字娘闕以闕闕一字墳峨峨闕一字山之旁懿德美行不隨闕二字高山有闕一字雕琢無妨闕五字之闕六字陵谷改張此石若出斯文闕一字昌
