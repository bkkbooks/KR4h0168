front:
  text: 全唐文欽定全唐文卷八百八十九宗佶本姓甘氏洪州人蜀先主王建養子以軍功累遷武信軍節度使天復初充扈駕指揮使進太師封晉國公後為樞密使唐道襲所搆先主命撲殺之
  hash: sha256:63367b68eec02e7387854966df6f066a71e8d53289d7355129fa6768c911190b
  markers:
  - {type: head, offset: 14, content: 王宗佶, id: KR4h0168_NFKB_889-h1, level: 1}
body:
  text: 臣官預大臣親則長子國家之事休戚是同今儲貳未定必生厲階陛下若以宗懿才堪繼承宜早行冊禮以臣為元帥兼總六軍倘以時方艱難宗懿沖幼臣安敢持謙不當重事陛下既正位南面軍旅之事宜委之臣下臣請開元帥府鑄六軍印征戍徵發臣悉專行太子視膳於晨昏微臣握兵於環衞萬世基業惟陛下裁之宗儔蜀先主王建養子累授天雄軍節度使兼侍中乾德三年擢山南節度使充西北面都招討行營安撫使以後主王衍荒淫憂憤卒雖居兵籍心在佛門修心於行伍之間達理於幻泡之外歸心而依佛化截足以事空王壯哉貔貅何太猛利大願難阻真誠可嘉准狀付本軍除落名氏仍差虞候監截一足訖送真元寺收管灑掃焚修涓字信之婺州東陽人登大中四年宏辭科進士起家京兆府參軍昭宗時官祠部郎中擢眉州刺史蜀主分藩西川表為節度判官歷官至御史大夫卒開匣出虎孔宣父不責他人當路斬蛇孫叔敖非因利己專殺不行於閫外先機恐失於彀中臣輒行閫制處斬訖臣聞興師者殘兵力虛府庫弊㣥畜損弓甲衰農桑動德義興詐偽故損國害人莫先於用兵也方今梁王朱全忠霸盛強據兩京料其先取河東河東梁之敵國也勢不兩立儻一處為雄率天下之眾一舉西來縱諸葛重生五丁復出無以泥封大散石鏁劍門今秦庭實蜀之巨屏也去其屏窺見庭館焉莫若與秦王和親稍稍以麻布茗草給之不傷於大義濟之以小利蜀但訓兵秣馬因敵料強足可以保天祿於三川固子孫於萬葉潛令公主探其機密窺彼室家俟便攻之一舉而獲可也古之用兵非以逞威暴而肆殺戮蓋以安民為先豐財為本湯武無忿怒之師高光有魚水之士故能應天順人弔民伐罪今自土德云衰朱梁逞虐雍都洛邑盡是荊榛江南山東各有割據鬬力則人各有力用兵則人各有兵陛下欲以一方之強舉萬全之策臣恐陛下之憂不在於秦雍而在於肘腋之下也莊字端已見素之後乾寧中登進士第為判官擢左補闕蜀主為西川節度副使昭宗命莊宣諭兩川遂畱蜀掌書記尋擢起居舍人為安撫副使蜀主開國進左散騎常侍判中書門下事累官至門下侍郎吏部尚書同平章事武成三年卒諡文靖詞人才子時有遺賢不霑一命於聖明沒作千年之恨骨據臣所知則有李賀皇甫松李㣥玉陸龜蒙趙光遠溫庭筠劉德仁陸逵傅錫平曾賈島劉稚珪羅鄴方干俱無顯遇皆有奇才麗句清詞徧在詞人之口銜冤抱恨竟為冥路之塵伏望追賜進士及第各贈補闕拾遺見存惟羅隱一人亦乞特賜科名錄升三級便以特勅顯示優恩俾使已升冤人皆霑聖澤後來學者更勵文風吾蒙主上恩有年矣衣襟之上宸翰如新墨詔之中淚痕猶在犬馬尚能報主而况人之臣子乎自去年三月東還連貢二十表而絕無一使之報天地阻隔叫呼何及聞上至穀水臣僚及宮僚千餘人皆為汴州所害至洛果遭弒逆自聞此詔五內糜潰方枕戈待旦思為主上報讐今使來不知以何宣告謝元暉文集盈編止誦澄江之句曹子建詩名冠古惟吟清夜之篇是知美稼千箱兩歧綦少繁絃九變大濩殊稀入華林而珠樹非多閱眾籟而紫簫惟一所以擷芳林下拾翠巖邊沙之汰之始辨辟寒之寶載雕載琢方成瑚璉之珍故知頷下採珠難求十斛管中窺豹但取一斑自國朝大手名人以至今之作者或百篇之內時紀一章或全集之中微徵數首但掇其清詞麗句錄在西齋莫窮其巨派洪瀾任歸東海總其記得者才子一百五十人誦得者名詩三百首長樂暇日陋巷窮時聊撼膝以書紳匪攢心而就簡蓋詩中鼓吹名下笙簧擊鳬氏之鐘霜清日觀淬雷公之劍影動星津雲間分合璧之光海上運摩天之翅奪造化而雷雲噴湧役鬼神而風雨奔馳但思其食馬畱肝徒云染指豈慮其烹魚去乙或至傷鱗自慙乎鼴腹易盈非嗜其熊蹯獨美然則律者既採繁者是除何知黑白之鵞強識淄澠之水左太沖十年三賦未必無瑕劉穆之一日百函焉能盡麗是知班張屈宋亦有蕪辭沈謝應劉猶多累句雖遺妍可惜而備載斯難亦由執斧伐山止求嘉木挈瓶赴海但汲甘泉等同於風月烟花各是其樝梨橘柚昔姚合所撰極元集一卷傳於當代已盡精微今更採其元者勒成又元集三卷記方流而目眩閱麗水而神疲魚兔雖存筌蹄是棄所以金盤飲露惟採沆瀣之精花界食珍但享醍醐之味非獨資於短見亦可貽於後昆採實去華俟諸來者光化三年七月二日前左補闕韋莊述藹前蜀韋莊弟余家之兄莊自庚子亂離前凡著歌詩文章數十通屬兵火迭興簡編俱墜惟餘口誦者所存無幾爾後流離漂泛寓目緣情子期懷舊之辭王粲傷時之製或離㣥軫慮或反袂興悲四愁九愁之文一詠一觴之作迄於癸亥嵗又綴僅千餘首庚申夏自中諫闕四字辛酉春應聘為西蜀奏記明年浣花溪尋得杜工部舊址雖蕪沒已久而柱砥猶存因命芟夷結茅為一室蓋欲思其人而完其廬非敢廣其基構耳藹便因閒日錄兄之藳草中或默記於吟詠者次為五卷目之曰浣花集亦杜陵所居之義也餘今之所製則俟為別錄用繼於右時癸亥年六月九日藹集崇前蜀乾德時人原夫混茫無象生元氣以發揚太極成形建兩儀而交感是故一升一降既慘既舒深知要妙之門默起自然之理萬化皆歸於橐籥八風尋運於璿璣雖開闔紫宸實分官於九府而主張玉籍俱命職於㣥真洎周朝則教演五千流唐室則宗分前後所以法天取則帝王崇至靜之源秉一成功冠褐慕至和之境得之者壽失之者亡羲軒冀表於前芳茅許將傳於故事上則雲官月殿熒煌高鎖於三清下則瓊室珠房重謺旁分於五嶽權福罪則皆同影響叩希夷則莫睹樞機然後九有延祈故崇宮廟三元禮醮遍列壇場苟邦國以長興諒焚修而不泯其謂乎開元觀者城東異境物外靈蹤實乾坤秀麗之鄉乃雲鶴盤旋之地當吳大帝龍驤碧漢鵲起金陵奉元元而旦夕未皇執躁靜而禱祈不倦訪鼎湖之舊迹尋河上之元風儻尚虛無必開虔奉至寶鼎四載乃方立為崇真之觀初標堂宇繼設住持綿星紀以逾深存香燈而不闕值隋皇革命神器移天方當在宥之初遽布維新之政開皇十一年又換元額為崇僊之觀遇大唐高祖皇帝應天徇物捲眾臨戎定山河為一統之宗使區宇絕三分之勢明明表德蕩蕩垂風及元宗皇帝躬乘大寶克顯丕圖復會僊師同訪桂花宮裏潛逢聖祖還遊羊角烟中萬年以表於殊風四海仍新於大號開元二十六年又奉更改則今之名額也崇基宛若真像豁如以次薰修遞相嚴敬有道士彭法宣等各懷道德繼備精虔表方隅歸向之場顯塵世祈求之旨及乎咸通已後玉關據虎金革犯秦經兵火以延焚因毀殘而廢墜暨皇唐復霸帝業中興刺史張公承傑心懸妙理志慕真筌洞鑒精虔深委功績至保大九年相次捨置三清尊殿功德寶壇等志堅有感德邁皆通是表良因用成其事由是散求郢匠廣布楚材梁棟雲鋪棼橑鱗次殿堂纔畢巍巍籠紺霧細霞廊廡方開赫赫布祥光瑞色真容聖像儼若化來玉女仙童忽如降下黼黻而皆成異境清虛而盡似仙鄉芬芳之琪樹祥花繚繞之松陰桂影疑十洲之風月移在人間眺萬洞之烟霞宛如象外矧以前臨大道紅塵不惹於元關後跨長江淥浪同含於妙性八海之羽人頻至五山之詞客如歸豈讓丹邱何殊閬苑將期立績冀僝厥功上可以裨贊皇圖下可以休禎庶類而崇智乏精通才非敏速忝承來命請紀殊猷立言慙裦貶之文握筆絕色絲之字冀遷陵谷用表貞珉長為不朽之名永作無窮之譽時乾德二年太歲甲子十月十五日記德權許州人事蜀主為眉州刺史累遷太保中書令永平元年卒贈太師案讖文李祐西王逢吉昌土德兌興丹莫當李祐者唐亡也西王者王氏興於西方也逢吉昌者逢字如殿下之名也土德坤維也兌興亦西方也丹莫當者丹朱也言朱梁不敢與殿下抗也願稽合天命仰膺寶籙使天地有主人神有依道安蜀乾德時人倉廩者國之本糧食者人之命固其本則邦寧重其命則人富今粒食中皆生蜂蠆切疑在位貪鄙奪民農時戕害人命故天生災異以為警告又蟲皆曳米而行恐邊鄙不寧干戈忽起饋挽相繼人不堪命伏願少精聖慮與大臣恐懼修省以消災異罕字仲緘西江人事蜀後主除溫江主簿遷太子洗馬罕長興二年嵗在戊子時年三十有五疾病踰時閒坐思書之點畫莫知所以乃搜閱今古篆隸始見源由旋觀近代以來篆隸多失始則茫乎不知終則惜其錯誤欲求端正將示同人病間有事其志不遂至明德二年乙未復病迄於丁酉冬不瘳病中無事得遂前志與大理少卿趙崇祚討論成一家之書昔孔安國尚書序云古者伏羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉賈耽鎮滑州時作偏傍字源序云降及夏殷周通謂之古文至宣王太史史籒著大篆十五篇與古文小異七國分裂篆與古文隨其所尚始皇兼并海內丞相李斯遂收拾遺逸作蒼頡七章中車府令趙高作爰歷七章太史胡母敬作博學七章竝約籒文篆體轉工世即謂之小篆屬秦政滋煩人趨簡易故軍正程邈變古文大小篆作隸書然書之所興莫定何代隸之所起始自秦時篆者取蟲篆之形隸者便徒隸之用漢初有書師以隸合小篆為五十五章教於鄉里平帝元始中徵通書會京師者百有餘人方立小學之科揚雄採掇其可用者作訓纂八十九章至東漢班固加十三章共一百二章二千一百二十字雖㣥書竝載而目錄不分惟太尉祭酒許慎取其形類作偏傍條例十五卷名之曰說文頗有遺漏呂忱又作字林五卷以補其闕洎三國之後歷晉魏陳隋書甚行篆書殆將泯滅至唐將作少監李陽冰就許氏說文復加刊正作三十卷今之所行者是也其時復於說文篆字下便以隸書照之名曰字統開元中以隸體不定復於隸書字統下錄篆文作四十卷名曰開元文字自此隸體始定矣兼改古文尚書及無平不陂字即其類也先已有九經音義及切韻玉篇行焉大歷中司業張參作五經文字三卷凡一百六十部其序畧云以類相從務以易了不必舊訣自非經典文義之所在雖切於時畧不集錄以明為經不為字也開成中唐元度以五經文字有所不載復作新加九經字樣一卷凡七十六部其序畧云有偏傍上下本所無者纂為雜辨部以統之然九經所有之字即加訓切况是隸書莫知篆意其字注解或云說文者即前來兩說文也或云石經者即蔡邕於國學所立石經也或云隸省者即隸減也唐立石經乃蔡邕之故事也周禮保氏掌養國子以道教之六書謂象形指事會意諧聲轉注假借六者造字之本也篆雖一體而隸變數般篆隸即興訛舛相錯非究於篆無由曉隸六書者非止著一意而屬一字一字之內有占六書二三四者大都造字皆包含六意字有正者倒者橫而在上中下者豎而在左右中者向者背者竝者重者順者逆者左者右者俯者仰者橫坼而裏別字者豎開而夾別字者有一字成者有全二字三字四字五字合成者有省二字三字四字合成者隸書有不拋篆者有全違篆者有減篆者有添篆者有篆隸同文者在篆體則可辨變隸體則多有義異而文同篆亦有之今悉解之於後文此不同例俗有隸書賦者假託許慎為名頗乖經史據顏氏家訓云斯實陶先生弟子杜道士所為大誤時俗吾家子孫不得收寫又有古今隸書端字決疑賦更不經於隸書賦當今之世不可學之又有文下作子為學更旁作生為蘇凡數十百字謂之野書唐有勅文明加禁斷今往往見之亦不可輒學顏真卿撰干祿字書一卷每一字作三般即注云上正中通下俗既合標題合有裦貶全無與奪亦無取焉其道書鬼書天篆章草八分飛白破體行書無益於字此亦不錄篆隸有筆力遒健字勢妍麗斯乃意巧之人臨文改易或參差之長短之屈曲之拗捩之務於奇怪以媚一時後習之人性有利鈍致與元篆隸不同蓋病由此起今之學者但能明知八法洞曉六書道理既全體格自貴亦何必踵歐虞褚柳之惑亂哉罕今所篆者則取李陽冰重定說文所隸者則取開元文字雖知魯鈍不失源流所貴講說皆有依憑點畫自無差誤杜征南注左氏春秋以經雜傳謂之集解何都尉論語序云今集諸家之善亦謂之集解罕以隸書解於篆字之下故效之亦曰集解今以說文浩大備載㣥言卷軸煩多卒難尋究飜致懵亂莫知指歸是以翦截浮辭撮其機要於偏傍五百四十一字各隨字訓釋或有字關起字者省而難辨者須見篆方曉隸者雖在注中亦先篆後隸各隨所部載而明之其餘形聲易會不關造字者則畧而不論其篆文下及注中易字便以隸書為音如稍難者則紐以四聲四聲不足乃加切韻使學者簡而易從渙然冰釋於說文中已十得其八九矣名之曰林氏字源編小說古人窮困湮厄而述作興罕也臥疾數年飽食終日思有開悟貽厥將來非欲獨藏私家實冀徧之天下乃手書刻石期以不朽一免傳寫之誤二免翰墨之勞或有索之易為脫本審篆隸無纖毫之失質人神無愧恥之心古今所疑坦然明白如其漏畧以俟君子興土木於禁中選驍雄於手下爰持斧鉞出鎮藩籬飾宮殿於遐方命鑾輿而遠幸為釁之端為禍之原有王承休在摧挫英雄吹揚佞媚全無才智繆處腹心斷性命於戲玩之間戮仇讐於樞機之下有功勞而皆棄非賄賂而不行有宋光嗣在受先皇之付託為大國之棟梁既不輸忠又不知退恣一門之奢侈任數力之驕矜徒為貪饕之人實非社稷之器有王宗弻在妄陟雲霄殊非謇諤興亂本則逞章程之妙恣奸謀則事頰舌之能心口傾危尚居左右有韓昭在性懷慘毒心恣貪殘焚爇軍營恢拓私第不顧喧騰於眾口惟思自任於忿懷有歐陽晃在酷毒害民市井聚貨叨為郡守實負天恩瘡痍已徧於陽安蒙蔽半由於內密有田魯儔在為君王之元舅受保傅之尊官但務奢華不思輔弻第宅迥同於上苑金珠求滿於貪心有徐延瓊在出為畱守入掌樞機無諤諤以佐君但唯唯而徇旨有景潤澄在搜求女色取悅宸襟常叨不次之恩每冒無厭之寵敷對惟誇於便捷佐時不識於經綸素非忠勤實為忝竊有嚴凝月在唱亡國之音衒趨時之侈每為巫覡以翫聖明致君為桀紂之昏使上乏唐虞之化有臣在陛下任臣如此何憂社稷不安寂字閑閑棲四明山昭宗徵赴闕召對內殿尋請還山寓居江陵唐末除諫官不起趙匡凝奔蜀寂偕行蜀主王建待以師禮位至蜀相同光末平蜀從王衍降授工部尚書致仕清泰三年卒年八十餘歷代之君乘時啟運莫不博訪髦士詳求碩畫以武定禍亂以文致康羲故軒皇命六相虞舜舉八元伯禹拜昌言成湯師一德周有多士文王以寧此歷代之大經求賢之極摯也今百辟之中有謀可以策國勇可以盪寇或博究治體或精知化源未擢穎於明廷尚含光於庶位者伏望恢明聖之畧開戶牖之圖親賜顧問以觀其能置之列位盡其獻納俾官無敗政人無滯才右件鞍轡馬腰帶甲冑槍劍麝臍琥珀玳瑁金稜椀越瓷器竝諸色藥物等皆大梁皇帝降使賜貺雕鞍撼玉堅甲爍金十圍希世之珍六轡絕塵之用槍森蛇檊劍耀龍鋒金稜含寶椀之光祕色抱青瓷之響上藥非蜀都所紀名香從外國稱奇遠有珍華竝由惠好顧酬謝而增愧仰渥澤以難勝捧閱品名實慙祇受大蜀皇帝謹致書於大梁皇帝閣下竊念早嵗與皇帝共逢昌運同事前朝俱榮倚注之恩竝受安危之寄豈期王室如燬大事莫追橫流泛濫於八方衰釁淩夷於九廟此際與皇帝同分茅土共統邦家扶危者力既不宣握兵者計無所出某忝列同盟之分幸居平蜀之功所宜治兵甲以固封疆聚征賦以修進貢望星使而經年不至指雲鄉而就日無期遠聞皇帝應天順人開基立極拯生靈於塗炭示恩信於豚魚東南之王氣咸歸河洛之殊祥畢至四門盡闢百度惟貞竟無意於興邦止施仁而濟物以此內量分限不在經綸七十州自可指揮八千里半因開拓遂至萬民叶議八國來朝爰徵史冊之文亦有變通之說且東漢亂離之後三國齊興西周微弱之時六雄競起俱非恃彊逼禪皆以行道濟時雍容於揖讓之前輕重於英雄之內况西蜀開山立國燒棧為謀稱雄雖處於一隅避狄曾安於二帝鼎峙之規模尚在山呼之氣象猶存永言梁蜀之懽合認弟兄之國今蒙皇帝遠尋舊好專降嘉音坦無間諜之嫌再敘始終之約款慮則春冰共泮開通則東海可歸光榮遽被於子孫暢遂咸旉於草野今則盡焦勞而勵己用勤儉以師賢常瞻偃草之風以繼用天之道又蒙厚加賜貺別降珍奇十驥聯鑣六龍竝駕稱德曾參於萬乘呈才皆過於千金載觀戀主之心益勵懷恩之志寶帶輟異方之貢名香加遠國之珍奇鋒利過於雪霜雅器價齊於金玉入用多慙於未識捧持方喜於初觀望思而一日三秋仰德而跬步千里自此榮遵天路繼遣星槎緘章不候於飛鳶裂帛豈勞於繫雁忻榮慰嘉併集此時敬以專使盧卿等迴備陳所志幸望開覽謹白
