front:
  text: 全唐文欽定全唐文卷一百四十八顏師古二
  hash: sha256:0b9ea2aa19868ac1bd7c489e4a4ed5a5b33506ccb4c3c5b23d4f0b177f9181a2
body:
  text: 儲君體上哲之姿膺守器之重俯降三善博綜九流觀炎漢之餘風究其終始懿孟堅之述作嘉其宏贍以為服應曩說疏紊尚多蘇晉衆家剖斷蓋鮮蔡氏纂集尤為抵牾自茲以降蔑足有云悵前代之未周愍將來之多惑顧召幽仄俾竭芻蕘匡正暌違激揚鬱滯將以博喻胄齒遠覃邦國宏敷錦帶啓導青襟曲稟宏規備蒙嘉惠增榮改觀重價流聲斗筲之材徒思罄力駑蹇之足終慙遠致歲在重光律中大呂是謂涂月其書始就不恥狂簡輒用上聞粗陳指例式存揚榷若夫有功可大盛業光於四表有親可久厚德加於萬類救災撥亂闡宏威以則天立愛宣慈垂至仁而濟物其於司牧黎獻汲引㣥生窮高極深道隆致遠伏以現神通力摧破波旬之兵開方便門消滅尼犍之罪斯蓋法王聖跡調御善權不可思議莫知邊際者矣自隨歷云季政網不綱海嶽沸騰函夏裂繩樞競起白梃稱兵毒卉久敷妖精晝隕五山並食九嬰為害交相吞噬恣行大于斫仰籲蒼昊局跡靡依俯墜塗炭息肩無所剝極則亨否終斯泰用集明命爰啓真人我大唐皇帝慶發靈圖祚昭寶籙撫茲歸運拯彼橫流惟神惟幾乃文乃武聰明時乂勇智自天猗歟五材聖質苞其純懿大哉七德宸鑒測其幽遠至如封胡異說力牧奇篇元女黃石之精微玉帳絳宮之祕要莫不裁成睿思總制深衷超冠情靈之表得諸耳目之外爰茲草昧自彼參墟投袂濡足東征西怨克翦方命鯨鯢斯盡芟夷干紀邦域底平掃欃槍於天衢匪遑寧處戮獝狂於地表無思不服阪泉鹿之師議勤已陋共工有扈之戰固多慙色載籍所傳孰可侔其髣佛言象所寄安足紀其希夷武德之初諸華未緝穀洛之地尚阻朝風念彼王充偷安假息悼干戈之日用悵烽燧之多警於是親總元戎授茲戚鉞建瓴東下將一車書北據崇芒南屯伊闕雲羅既布指期滌蕩然而賊竇建德往因多難夙長亂階僞黨實繁凶毒孔熾妄作元圭之瑞竊號夏王驅扇黑山之旅擅強河朔破邑屠城斬祀殺厲矯誣上帝多歷年所又以逞其狙詐乘彼阽危即傾許之人徒收亡隨之文物遂乃憑陵濟岱薦食徐兗驟勝愈驕負力作氣惟茲勍寇同惡相求臮此役也實來赴援溯流而上奄至滎陽間使驅馳潛申約結將規合勢以抗我師首足互資實同夏屋之獸前後迭至冀效常山之蛇妙算所甄洞其曲折中權所稟見可而進是以引麾北制移蹕東虞天策頻加神鋒纍奮其後酋渠相命妖孽並臻鑿齒之類為㣥窫窳之徒成列發自板渚迄於茲地獷癸爭先陸梁競出比角舉尾飲竭洪流吞石噉沙聚蔽陽景皇赫斯怒爰整六軍飛廉翊衡豐隆先路然後置天地之陳揚日月之旗震夔鼓以申嚴鏗虬鐘而大號星流電擊鳳矯龍騰丘巒為之震跳梗林於是靡拉陷堅挫猛刮野掃地喋血僵尸填坑滿谷禽茲元惡未及旋踵仍執醜虜曾靡孑遺渙若氷消漼同魚爛氛祲祛除風雲融朗列代神璽莫不畢收前王彞器此焉總獲既而乘轅西返蒨斾右臨奮決水之威乘破竹之勢廓清萬里大定三川散馬華陽飲至豐鎬豈如漢王力競屢見屈於城皋魏武爭雄久連兵於官渡及夫海外有截宇內無虞執玉帛以臨朝垂衣裳而班治珍符雜沓繁祉絪縕甘雨薰風時和歲稔正簫韶之樂非止咸英定郊雍之禮豈帷俎豆跂行喙息跖實排虛邇狹游原遐濶泳末攫摯忘嘴距之用夷狄齊冠帶之倫外戶常開內機不作置含靈於仁壽變品庶於陶甄思廣舟航無隔幽顯靜言官首或握節以殉忠追悼行間有薶輪而棄野愍疏屬之罪方滯迷塗念刑天之魂久淪長夜以為拔除苦纍必藉勝因增益善根實資淨土乃命克敵之處普建道場情均彼我恩洽同異爰立此寺俾號等慈境實鄭州縣稱泛水班倕闕一字集矩矱斯備式搆寶坊樹茲靈塔飛梁虹指浮柱星懸層閣崢嶸修廊黮䨴朝雲暫起華礎流津曉露微沾夕盤泫溽茹蘆在阪化為詹蔔之林熠耀宵行翻映摩尼之彩傍開奈苑敷淨花而韡華却帶蓮池積定水而澄湛結衣萃止振錫來儀戈六品齊芳禪枝並茂其地則遙瞻太室夏后之所發祥近眺襄城軒轅於是訪道舳艫控引循金隄以逼側冠蓋往來趨玉門而隱軫勢居爽塏物稱衍沃誠原陸之膏腴信康莊之都會豈惟致罰之野獲免汙豸者淫慝所懲赦其京觀乃令深入緣起永脫蓋纏普賴法財同歸妙樂悠悠曠劫憑慧力而靡偏同目同目恆沙譬福聚而無盡南山之壽既彌茂於億年北極之尊實牢籠於萬代竊惟望雲就日博貫多能理極寰中道臻繫本考核篆籀遍詳流略定儒墨之短長棄刑名之苛嬈纖微必舉幽賾斯應不能遁其隱奧無所潛其肸蠁五老變為流星懸識象緯八靈符於積雪曲盡物名昃食忘勞昧旦丕顯尚想巖穴博逮芻蕘俱幸滿堂之歡猶興納隍之慮愛踰祝網仁兼扇暍降元覽而游藝觀人文以化成賤齊梁之短篇鄙苦寒之危調轉規注河之論聽者開神芝英垂露之書觀者眩目飛猿妙術抑咒神工制律呂之輕重知草木之情狀郁哉煥乎弗可記已重明養德守器光於匕鬯璇枝樂善作固列於維城威儀抑抑良翰赳赳文士蘊金錫之姿武臣表熊羆之狀耕田鑿井雖受賜而無迹擊壤鼓腹諒日用而不知百年然後勝殘仲尼之言斯濶三脊之茅難致夷吾所志為小蓋夫植操恆久莫貞乎金石盛德形容聿宣於歌頌末臣庸謏預奉鴻猷雖罄短才未揚休烈其詞曰肇自無極初分太清二儀定位四大居貞緬求遂古逖聽遐聲質文遞變粹駮殊名其一季葉紛詭政荒道喪逐鹿爭驅乘龍有亢亟罹不造時逢無妄至治莫興嘉生靡暢其二滔德既厭炎運將徂鴻飛野滿狼入朝蕪緑林叛換青犢睢盱中外板蕩億兆淪胥其三聖帝膺期愍彼顛覆始建天柱初安地軸萬難畢夷㣥凶盡戮芒芒率土俱荷亭育其四壽華釁社用康國步陽紆斃慝實清王度牧野非艱鳴條豈固勢踰蘀卷俯同滎注其五魔衆既摧勝幡斯立釋茲罪垢俾申幽執施以無畏斷其餘習即此戎墟招提攸葺其六雲樓赫燡月殿玲瓏冬延愛日夏納清風白蘋齊葉丹桂臨藂綺疏瞰迥繡閣臨空其七金繩吐光寶鈴和響香繞梵音花飛仙掌妙想凝寂真容煥朗開士宅心伊蒲瞻仰其八崇巖秀峙迅流長邁石城回矚龍池斜界左顧敖碻右通泛祭實為勝境誕標靈怪其九至人惠利正覺津梁偕登萬善普照十方深慈廣博冥慶遐長式光勿替永播無疆其十維某年敢昭告於神州地祇惟祇包函區夏載負㣥生溥彼域中賴茲厚德式遵彞典㨂此元辰敬以玉帛犧牲粢盛庶品明獻厥誠備茲禋瘞維神上通雲漢光啓圖書分導九枝傍潤千里素秋式序用率典常思廉本名簡以字行陳吏部尚書察子初授秦王府文學太宗即位為著作郎宏文館學士寫形於十八學士圖拜散騎常侍賜爵豐城縣男貞觀十一年卒贈太常卿諡曰康易曰亢之為言也知進而不知退知存而不知亡知進退存亡而不失其正者其惟聖人乎傳曰知足不辱知止不殆然則不知夫進退不達乎止足殆辱之纍期月而至矣古人之進也以康世濟務也以宏道厲俗也然其進也光寵夷易故愚夫之所乾沒其退也苦節艱貞故庸曹之所忌憚雖禍敗危亡陳乎耳目而輕舉高蹈寡乎前史漢世張良功成身退病臥却粒比於樂毅范蠡至乎顛狽斯為優矣其後薛廣德及二疏等去就以禮有可稱焉魚豢魏略知足傳方田徐於管胡則其道本異謝靈運晉書止足傳先論晉世文士之避亂者殆非其人唯阮思曠遺榮好遁遠殆辱矣宋書止足傳有羊欣王微咸其流亞齊時沛國劉瓛字子圭辭祿懷道棲遲養志不戚戚於貧賤不耽耽於富貴儒行之高者也梁有天下小人道消賢士大夫相招在位其量力守志則當世罔聞時或有致事告老或有寡志少欲國史書之亦以為止足傳云元素蒲州虞鄉人為竇建德黃門侍郎建德平授景城都督府録事參軍太宗即位纍遷右庶子銀青光祿大夫授潮州刺史徙鄧州麟德元年卒微臣竊思秦始皇之為君也藉周室之餘因六國之盛將貽之萬葉及其子而亡諒由逞嗜奔欲逆天害人者也是知天下不可以力勝神祇不可以親恃惟當宏儉約薄賦斂慎終如始可以永固方今承百王之末屬凋弊之餘必欲節之以禮制陛下宜以身為先東都未有幸期即令補葺諸王令並出藩又須營構興發數多豈疲人之所望其不可一也陛下初平東都之始層樓廣殿皆令撤毀天下翕然同心欣仰豈有初則惡其侈靡今乃襲其雕麗其不可二也每承音旨未即巡幸此乃事不急之務成虛費之勞國無兼年之積何用兩都之好勞役過度怨讟將起其不可三也百姓承亂離之後財力凋盡天恩含育粗見存立饑寒猶切生計未安三五年間恐未能復奈何營未幸之都而奪疲人之力其不可四也昔漢高祖將都洛陽婁敬一言即日西駕豈不知地惟土中貢賦所均但以形勝不如關內也伏惟陛下化凋弊之人革澆漓之俗為日尚淺未甚淳和斟酌事宜詎可東幸其不可五也臣又嘗見隋室初造此殿楹棟宏壯大木非隨近所有多自豫章採來二千人曳一柱其下施轂皆以生鐵為之中間若用木輪動即火出鐵轂既生行一二里即有破壞仍數百人別齎鐵轂以隨之終日不過進三二十里略計一柱已用數十萬功則餘費又過倍於此臣聞阿房成秦人散章華就楚衆離乾陽畢工隋人解體且陛下今時功力何如隋日承凋殘之後役瘡痍之人費億萬之功襲百王之弊以此言之甚於煬帝遠矣深願陛下思之無為由余所笑則天下幸甚臣聞皇天無親惟德是輔苟違天道人神共棄然古三驅之禮非欲教殺將為百姓除害故湯羅一面天下歸仁今苑內娛獵雖名異遊畋若行之無恆終虧雅度且傅說曰學不師古匪說攸聞然則宏道在於學古學古必資師訓既奉恩詔令孔穎達侍講望數存問以補萬一仍博選有名行學士兼朝夕侍讀覽聖人之遺教察既行之往事日知其所不足月無忘其所能此則盡善盡美夏啓周誦焉足言哉夫為人上者未有不求其善但以性不勝情耽惑成亂耽惑既甚忠言盡塞所以臣下苟順君道漸虧古人有言勿以小惡而不去小善而不為故知禍福之來皆起於漸殿下地居儲二當須廣樹嘉猷既有好畋之淫何以主斯匕鬯慎終如始猶恐漸衰始尚不慎終將安保臣聞周公以大聖之材猶握髮吐哺引納白屋而况後之聖賢敢輕斯道是以禮制皇太子入學而行齒胄欲使太子知君臣父子尊卑長幼之道然君臣之義父子之親尊卑之序長幼之節用之方寸之內宏之四海之外者皆因行以遠聞豈假言以光被伏惟殿下睿質固已崇高尚須學文以飾其表竊見孔穎達趙宏智等非惟宿德鴻儒亦兼練達政要望令數得侍講開釋物理覽古諭今增輝睿德而雕蟲小技之流祗可時命追隨以代博奕耳若其騎射畋遊酣歌伎玩苟悅耳目終穢心神漸染既久必移情性古人有言心為萬物主動而無節則亂臣恐殿下敗德之源在於斯矣臣聞孔子云能近取譬可謂仁之方也已然書傳所載其言或遠尋覽近事得失斯存至後周武帝平定齊梁卑宮菲食以安海內太子贇舉措無度穢德日著烏丸軌知其不可具言於武帝武帝慈仁望其漸改及其踐祚狂暴肆情區宇崩離宗祀覆滅即隋文帝所代是也文帝因周衰弱憑藉力資雖無大功於天下然布德行仁足為萬姓所賴勇為太子不能近遵君父之節儉而務驕侈肆情今之宮中山池遺址即殿下所親覩是也此時亦恃君親之恩自謂太山之固詎知邪臣敢進其說向使動靜有常進退合度親君子疏小人捨浮華尚恭儉雖有邪臣間之何能致慈父之隙豈不由積德未宏令聞不著讒言一至遂成其禍臣以愚蔽竊位兩宮在臣有江海之潤於國無秋毫之益是用必竭愚誠思盡臣節者也竊惟皇儲之寄荷戴至重如其積德不宏何以嗣守成業聖上以殿下親則父子事兼國家所應用物不為節限恩旨未踰六旬用物已過七萬驕奢之極孰云過此龍樓之下唯聚工匠望苑之內不覩賢良今言孝敬則闕視膳問安之禮語恭順則違君父慈訓之方求風聲則無愛學好道之實觀舉措則有因緣誅戮之罪忠臣正士未嘗在側㣥邪淫巧昵近深宮愛好者皆遊手雜色施與者並圖畫雕鏤在外瞻仰已有此失居中隱密可勝計哉宣猷禁門不異闤闠朝入暮出穢聲已彰臣以德音日損頻上諫書自邇已來縱逸尤甚右庶子趙宏智經明行修當今善士臣每奏請望數召進與之談論庶廣徽猷今旨反有猜嫌謂臣妄相推引從善如流尚恐不逮飾非拒諫必招禍敗方崇蔽塞之源不慕欽明之術雖挹睿哲之姿終罹罔念之咎古人云苦藥利病苦言利行伏願居安思危日慎一日則天下幸甚臣觀自古以來未有如隋室喪亂之甚豈非其君自專其法日亂向使君虛受於上臣弻違於下豈至於此且萬乘之重又欲自專庶務日斷十事而五條不中中者信善其如不中者何况一日萬幾已多虧失以日繼日乃至纍年乖謬既多不亡何待如其廣任賢良高居深視百司奉職誰敢犯之臣又觀隋末沸騰被於㝢縣所求天下者不過十數人餘皆保邑全身思歸有道是知人欲背主為亂者鮮矣但人君不能安之遂致於亂陛下若近覽危亡日慎一日堯舜之道何以能加鈞貞觀朝中書舍人依仁服義懷文守一履道自居下帷終日業彰素里行成蘭室鶴鑰馳稱龍樓委質
