front:
  text: 全唐文欽定全唐文卷三百四老萊洛邑人遂州刺史叔則父
  hash: sha256:5593de7a5276a599d9ca3b44f05e8eeef1a7ef920f9e0395c87647c8de9f8320
  markers:
  - {type: head, offset: 12, content: 鄭老萊, id: KR4h0168_NFKB_304-h1, level: 1}
body:
  text: 惟彼璇衡分乎四序調茲玉管載啓三春寰中祈覛土之功海內佇農祥之應甲職司銅墨道洽絃歌務切耕耘情深勸勉洎乎立春之日望氣之辰為土牛於縣門設耕人於犬畝隨方所造雖取法於陰陽候節而為固無虧於令式今者四門併造數次施功便於春月之中豫設秋冬之事禳災或可在法難通州司科以不應縣局乃為申訴春在兩日雖事分疏齊復三廟何如道理即科其罪恐涉深文輒此商量寧斯折中請從寬典佇叶通規琬字茂貞鄧州南陽人賀州司馬思彥子舉茂才擢第又舉文藝優長賢良方正連中拜監察御史出監河北軍兼按察使開元中遷殿中侍御史坐事貶官國安危在於政政以法暫安焉必危以德始不便焉終治夫法者智也德者道也智權宜也道可以久大也故以智理國國之賊不以智理國國之福貞觀永徽之間農不勸而耕者衆法不施而犯者寡俗不偷薄器不汙窳吏貪者士恥同列忠正清白者比肩而立罰雖輕而不犯賞雖薄而勸位尊不倨家富不奢學校不厲而勤道佛不懲而戒土木質弗厚裨販弗蚩其故奈何維以皇道也自茲以來任巧智斥蹇諤趨勢者進守道者退諧附者無黜剝之憂正直者有後時之嘆人趨家競風俗淪替其故奈何行以霸道也貞觀永徽之天下亦今日之天下淳薄相反由理則然夫巧者知忠孝為立身之階仁義為百行之本託以求進口是而心非言同而意乖陛下焉能盡察哉貪冒者為能清貞者為孤浮沈者為黠剛正者為愚位下而驕家貧而奢歲月漸漬不救其弊何由變浮之淳哉不務省事而務捉搦夫捉搦者法也法設而滋章滋章則盜賊多矣比法令數改或行未見益止未知損譬奕者一棋為善而復之者愈善故曰設法不如息事事息則巧不生聖人防亂於未然天下何繇不理哉永淳時雍邱令尹元貞坐婦女治道免官今婦夫女役常不知怪調露時河內尉劉憲父喪人冇請其員者有司以為名教不取今謂為見機太宗朝司農以市木橦倍價抵罪大理孫伏伽言官木橦貴故百姓者賤臣見司農識大體未聞其過太宗曰善今和市顓刻剝名為和而實奪之往者學生佐史里正正每一員闕擬者十人今當選者亡匿以免往選司從容有禮今如仇敵賈販往官將代儲什物俟其至今交罷執符紛競校在亡往商賈出入萬里今市井至失業往家藏鏹積粟相夸今匿資示羸以相尚往者夷狄疑闕字今軍屯積年往者召募人賈其勇爭以自效今者差勒闔宗逃亡相繼往者倉儲盈衍今所在空虛夫流亡之人非愛羈旅忘桑梓也斂重役亟家産已空鄰伍牽連遂為遊人窮詐而犯禁救死而抵刑夫亂繩已結急引之則不可解今刻薄吏能結者也舉刻吏能引者也則解者不見其人願取奇才卓行者量能授官又仕路太廣故棄農商而趨之一夫耕一婦蠶衣食百人欲儲畜有餘安可得也夫量事置官量官置人使官稱其人須人不虛其位除此之外使其耕桑任其商賈何為引令入仕廢其本業臣愚以為國家開仕進之門廣矣皆棄農桑工商而身趨之當今一夫耕而供數百人食一婦蠶而供數百人衣遂使公私皆無儲蓄若不釐革其弊必甚逸開元時清河人維大唐開元七年歲次已未粵正月庚寅朔時大人出為海州司馬禮當巡屬縣問耆疾周覽海甸察聽氓謠人無事矣乃回駕惕想眇矚雲山尋紫翠之所登虬龍之道蓋欲徵靈宅吉洗我塵慮巖巖直上窅窅傍邃霧月與碧海同深朝霞將赤城爭峻代有知而不能至者至而不能賞者賞而不能窮者亟聞我東海縣宰河南元公光發幽躅起豫泉石締思搆匠蠲潔形勝遂披叢篁鑿崩壁流泉噴水藏宿雨而時來臥石埋雲觸搖風而不散歷時花木紅紫無名入聽笙歌宮商自合固可為真人之別館元始之離宮哉夫登會稽探禹穴慕古長想復何奇乎豈如志在魏闕心遊江海兩忘出處雙遣是非唯元公得之矣攀賞未極列壑生陰促駕言旋攢峰擁騎家君顧而歎曰爾知遊名山勒銘紀者非思入上元道存虛白亦何能造次不遠而為之吾少事雲林長牽塵迹晚齡心事盡於巖間小子志之貽夫來者其列座同志次而鐫之承徵開元時鄭州人謹案魏典及北齊至後魏太平真君年中內學者奏言上黨有天子氣在壺關大王山於時太武南巡親幸上黨掘山封石將以厭之亦猶秦始皇東遊望氣者云五百年後金陵有天子氣始皇乃改金陵為秣陵塹北山以絶其勢孫權僭號吳人以為當之孫盛晉陽秋云從始皇東遊之歲至孫權僭號之時中間四百三十七年權數未當應及晉元帝南渡始有五百二十六年以彼金行奄居四海金陵之瑞其在茲乎又按太武之後百有餘年高歡以內學之言復欲妄干符命因勒兵馬來在晉陽舍於壺關六旬而去更有上黨百姓從在晉陽因名上黨之坊實曰晉陽之地歡又居此僞以應之論其僭應則高歡不異於孫權語以虛攘則太武有同於嬴政暗於時運豈不惜哉臣等恭尋符命壺關天子之氣正是陛下當焉元穹上眷符命下鍾故使歷試潞州所以用當其應此天意也豈人事乎然而一幸潞州三移灰琯壺關之地歲時為搜狩之場大王之山朝夕即豫遊之所始能龍潛上黨尋乃鳳舉咸寧內學之言果合符契又按內學所奏符應年月太平真君太平則叶今辰真君則更明陛下自唐至魏三百餘年觸類而推無不驗應伏願陛下上承天意下諭人心昭告寰瀛編列國史臣等沐道醉心觀洋駭目披圖逖聽曠古無聞實慶生涯親承旦暮函開元六年官祕書少監養賢之祿國用尤先取之齊人未為剝下何用立本息利法商求資皇運之初務革其弊記本收利以繩富家固乃一切權宜諒非經通彞典頃以州縣典吏併捉官錢收利數多破産者衆散諸編戶本少利輕人用不休時以為便付本收利患及於人然則議國事者亦當憂人為謀恤下立計天下州縣積數既多大抵皆然為害不少且五千之本七分生利一年所輸四千二百兼算勞費不啻五千在於貧人已為重賦富戶既免其徭貧戶則受其弊傷人刻下俱在其中未若大率㣥臣通計衆戶據官定料均戶出資常年發賦之時每丁量加升尺以近及遠損有兼無合而籌之所增蓋少時則不擾而易從庶乎流亡漸歸倉庫稍實則當咸出正賦罷所新加天下坦然什一而稅上下各足不其遠矣尚久視六年進士大中大夫行尚書祠部郎中天台也桐柏也代謂之天台真謂之桐柏此兩者同體一作出而異名同契乎元道無不在夫如是亦奚必是桐柏耶非桐柏耶因斯而談則無是是無非非矣而稽古者言之桐柏山高萬八千丈周旋八百里其山八重四面如一中有洞天號金庭宮即中右弻王喬子晉之所處也是之謂不死之福鄉養真之靈境故立觀有初強名桐柏焉耳古觀荒廢則已久矣故老相傳云昔葛仙公始居此地而後有道之士往往因之壇址五六厥迹猶在洎乎我唐有司馬鍊師居焉景雲中天子布命於下新作桐柏觀蓋以光昭我元元之丕烈保綏我國家之永祉者也夫其高居八重之一俯臨千仞之餘背陰嚮陽審曲面勢東西數百步南北亦如之連山峨峨四野皆碧茂樹鬱鬱四時並青大巖之前橫嶺之上雙峰如闕中天豁開長澗南瀉諸泉合潄一道瀑布百丈懸流望之雪飛聽之風起石梁翠屏可倚也琪樹珠條可攀也仙花靈草春秋互發幽鳥清猿晨暮合響信足賞也始豐南走雲嶂間起剡川北通烟岑相接東則亞入滄海不遠蓬萊西則浩然長山無復人境總攬奧祕鬱為秀絶苞元氣以混成鎮厚地而安靜非夫神與仙宅仙得神營其孰能致斯哉故初構天尊之堂晝日有雲五色浮靄其上三井投龍之所時有異雲氣入堂復出者三書之者記祥也然後為虛室以鑿戶起層臺而壘土經之殖殖成之翼翼綴日月以為光籠雲霞以為色花散金地香通元極真侶好道是遊斯息微我鍊師孰能興之鍊師名承禎一名子微號曰天台白雲河內溫人晉宣帝弟太常馗之後祖晟仕隋為親侍大都督父仁最取唐興為朝散大夫襄州長史名賢之家奕代清德慶靈之地生此仙才以為服冕乘軒者寵惠吾身也擊鐘陳鼎者味爽人口也遂乃捐公侯之業學神仙之事科籙教戒博綜無所遺窈冥夷希微妙詎可識無思無為不飲不食仰之彌峻巍乎其若山挹之彌深湛乎其若海夫其通才練識贍學多聞翰墨之工文章之美皆忘其所能也練師蘊廣成之德睿宗繼黃軒之明齊心虛求將倚國政侃侃然不可得而動也我皇孝思維則以道理國協帝堯之用心寵許由之高志故得放曠而處逍遙而遊聞鍊師之名者足以激厲風俗睹鍊師之容者足以脫落氛埃以慈為寶以善救物神以知來智以藏往允所謂名登仙格迹在人寰奧不可測矣夫道生乎無名行乎有精一作情分而作三才播而作萬物故為天下母修之者昌背之者亡故為天下貴況絶學無憂長生久視也哉道之行也必有階也行道之階非山莫可故有為焉有象焉瞻於斯仰於斯若舍是居教將奚依損之又損以至於無為元門既崇不名厥功朝請大夫使持節台州諸軍事守台州刺史上柱國賈公名長源有道化人有德養物嘗謂別駕蔣欽宗等曰且道以含德德以致美美而不頌後代何觀乃相與立石紀頌以奮至道之光其辭曰邈彼天台嵯峨崔嵬下臨滄海遙望蓬萊漫若天合呀如地開烟雲路通真仙時來顧我鍊師于彼瓊臺鍊師鍊師道入元微吸日安坐淩霄欲飛興廢靈觀鍊師攸贊道無不為美哉輪奐窈窈茫茫通天降祥保我皇唐如山是常吾聞闕一字君闕一字曰古之孝者闕三字德闕四字碑闕一字明示於後代也故今之孝者馮氏三子道闕一字崇闕四字論闕十二字文曰公諱仁闕一字字太元長樂人夫馮文王之允也畢萬闕一字封於魏文闕四字馮闕四字有自來矣闕二字流長枝分葉殳衣冠人物史諜存焉曾祖闕三字隨官闕一字尚書兵部郎贈銀青光祿大夫吏部尚書昌黎公諡曰壯武望重一時氣雄千載闕四字外臣嘉遁不仕闕一字壽祖若闕三字嗣幽貞闕一字於我公復修祖業特有奇稟識密洞微德暉內藏道氣潛運闕一字可闕三字無為闕一字不闕一字俗闕二字泊其真㣥居罔見其闕一字處會通默養空而浮代莫能知闕一字以闕一字守闕六字清闕一字之闕三字以琴書闕一字娛優哉闕六字所謂逃名避聲闕一字已會景龍闕一字年闕公之誠孝精忠道士道力意得元珠謀參黃石同心戴舜以為天子闕四字銀青光祿大夫鴻臚卿冀國公實封三百戶銀印青綬昭其闕一字也皂蓋朱轓昭其位也闕四字昭其闕一字也闕四字昭其闕一字也公闕二字厥子克闕一字於邦帝用嘉之拜公為朝散大夫使持節沁州諸軍事沁州刺史仍聽闕二字時人榮之制有踰天官闕一字名年八十九以闕二字十有一年夏五月庚午終於京師闕四字惟十有一月十日壬申葬我公於咸陽北原禮也闕九字其宅兆而安厝之闕四字銘曰闕十六字遊藝依仁從吾所好闕五字物之奧闕恕闕一字乃嚴訓嘉闕二字功是闕一字豫闕一字是啓豫衷汝作闕二十二字孝子闕二字垂闕一字無窮適之初名昌恆山愍王承乾孫神龍初起家左衛郎將開元中拜刑部尚書天寶元年為左相纍封清和縣公罷政事守太子少保坐與韋堅相善貶宜春太守會御史羅希奭陰被詔殺堅等於貶所過宜春適之懼仰藥死聖心才啓靈貺潛通膏澤並霑罔不滂霈請宣付史館仍於濟源縣虔修賽禮臣不工文且非碩學更紆天人之翰以光鄙野之人又見陛下訓以義方教之親睦文王美棠棣之華皇王之際於斯為盛事連中禁恐良史闕書請編諸典策以光千古臣伏以朝服準式皆合備具比來有稱慘故式致乖疏臣望自今已後每當正至及緣大禮應朝官並六品清官並服朱衣餘六品以下望許通著袴褶朔望日請依舊文武官朝集使並服袴褶如有慘故準式不合著朱衣袴褶者其日聽不入朝自餘應合著不著者請奪一俸以懲不恪其蕃官望不在此限如情願著者請聽餘望依今式古之聖人乘時迭用贊神道立人倫所以為理者也理之為極故受之以無為昔之真人歸根去羡探有物入無窮所以為久者也久幾乎息故受之以實際於是大雄有作大覺無邊常樂常往不生不滅鑒阿僧而示開闢傳法印而逾繩契映明月而小元珠位輪王而卑五帝去聖日遠多門互出名數棼絲言說滋蔓粵有紹興法寶超詣真宗由密意而致清涼域秉圓照而入空寂舍無聞無示非穿非鑿斷諸委曲直見本源其事業有如此者我大師其人也禪師諱法現弋陽人本名法顯避中宗廟諱於是改焉即雙峯忍禪師門人也俗姓宣氏出自周宣王盛於元魏代禪師儀表端嚴睂宇森秀人相具足梵音清暢乘運而應數隨方而立表以濟南浮之人以嗣東山之業初母在孕不喜葷辛及誕之後每以沙上戲為佛塔志學之歲遠方訪道年十有九爰就剃落始配住福田寺其後以選更隸龍興寺焉後因捧盂上堂逢一神僧顏赤如醉語師曰汝可名法顯因忽不見年滿受具遂以此名年二十五次因寺事差往鄱陽所憩之家皆同舊識或云宿昔夢師之來儀服宛如所見設供養者皆蒙誘掖闔門盡里同發菩提心爾時鄱陽大旱師為受戒二千餘人事畢天晶無雲其夜雨雪盈尺隨緣利物殊類齊感在舟則異鱗呈質使漁者收綸登陸則困鹿求哀而獵者束矢所過古寺廢塔雖獨而止猛獸惡龍山精木魅毒氣生烟火衆魔成軍陳坦若虛舟莫能惱害至永淳歲有三婆羅門寄金銀珠寶於師復置牀簀而歸西域其後有賊劫房惟此諸寶獨在出入三載主乃東來各以還之封緘如故母氏遣師預修已墓寺前南嶺地為吉祥掘皆巨石不可開動已經數日師意彌專忽有一人來詣掘所作禮既畢出一編書與師遂云為師穿墓觀其用狀殆非人功信宿掘成不知所在開其留書乃菩提達摩之論也及築墳傅土每夕有猛獸踏跡如杵倏然墓成經一十八年母何氏壽八十有六既耆而艾無疾而終師廬於墳所遂經二載形體臞瘠僅能識者每有人潛獻牛乳其味凝厚衆疑有異後加驗問莫知所從嘗置碗佛前乃成舍利旬日之後碗中有聲沃而滌之金光浮出連珠成貫色有似榴者其後漸多至百餘粒他州造塔者皆來請之分與而去夫其異應不可思議乃菩提之示現者矣大易云神道設教然則至人無迹至化無名萬緣盡空一切不動此皆善靈扶護示相云為因感而來無幽不兆咸莫知其所以豈我師之意乎徒觀遠衆響臻㣥疑景附惟分請益波回山積有迷有達或饑或渴禪師發以希聲之音現以隨緣之相如振風之過衆竅似膏雨而成百穀至有求明義學談說人天三論飲其辨才九部矜其理窟及乎對詢真賾不覺神醉大巫捨筏靡旗廢講焚疏因而退密專至攝心有初地弟子左相兼兵部尚書李適之往以先君佐蘄瞻言歸省因得禮尊儀於密座委弱質於專門持心苦體不舍晝夜尋遘私艱重集于蓼無怙可恃創巨釁窮負土墳傍泣血廬次大師哀其劬頓假以梯航引於煨燼之區拔於冤毒之海其後皇圖復禹重構維城神龍之中璽書再降授朝請大夫旋追赴京輦禪師遂敷宰官之義強弟子以行雖間濶積年而誨誘無遠屬有東信至自蘄春方承八年諱問其說最後功德恨不親聞付囑是用觸緒悲涼復次使者言師以開元八年六月初於本寺精舍結跏趺坐積十三日不更飲食無復煩惱因禪不解便入無餘春秋七十有八是日雲物變異香氣晦合池水自黑林鳥皆悲座前白蓮枯卷堂後列柏凋瘁四部雷動三界霔泣或絶於地或訴於天嗚呼慈母忍棄窮子一定以來全軀不壞髮長膚軟紅爪丹唇經今二十年竟不敢遷閉近日薄加香漆四衆供養如生故知不盡之明與劫代而相弊應見之相豈堅林之可焚徒徵夢幻之言莫見去來之迹然則建之於常空有立之於不皎昧難可以智知孰能以識識住持強固永為宗極以適之心存遺偈力荷慈緣髣佛礦鑠依稀火傳摛其勿照之曜著以忘言之筌敢申頌元德以昭播人天其詞曰皇矣能仁宏宣妙覺彼上人者是為禪族繼體前聖傳燈後學舟梁愛河掎拔情嶽肇允光相翻飛度門偈傳心極神授名尊霰零嚴戒盜入重昏窮魚脫泉困獸還魂獨絶人代蒸在林野魔屬不神善緣來假乳似糜獻編同圯下度無量人實無度者諸行圓滿庶類知歸往虛來實遇病為醫大雲澍雨惠日揚輝事復無事機反於機我於往昔天方薦瘥倣徉推極荼毒謂何孰承最上密受居多未究深海旋驚尺波變異潛惑悲憂斷絶皆發大怖遍身見血深入靜思義開形閉當知恆住敢告非滅慎言開元八年官瀛州司法參軍祭天地宗廟樂合用商音又周禮三處大祭俱無商調鄭元云此無商調者祭尚柔商堅剛也以臣愚知斯義不當但商音金也周德木也金能剋木作者去之今皇唐土王即殊周室五音損益須逐便宜豈可將木德之義施土德之用又說者以商聲配金即作剛柔理解殊不知聲無定性音無常主剛柔之體實由其人人和則音和人怒則聲怒故禮稱怒心感者其聲粗以厲愛心感者其聲和以柔祇如宮聲為君商聲為臣豈以臣位配金為臣道便為剛乎是知周制無商不為堅剛見闕蓋以扶木德忌金行故國祚靈長後葉昌盛卜代三十卜年八百是去金之應也即人神之心可見剛柔之理原乎聖人之情詳夫作者之旨車服器械為易代之通規郊禋聲調避德王之刑剋此不疑之理也其三祭並請加商調去角調郊廟二舞人不依古制未協人神案周禮以樂舞教國子舞雲門大咸大濩大武是知古之舞者即諸侯子孫容服鮮麗故得神祇降福靈光燭壇今之舞人並容貌蕞陋屠沽之流用以接神欲求降福固亦難矣有隋之際猶以品子為之號為二舞郎逮乎聖朝遂變斯制誠願革茲近誤考復古道其二舞人望取品子年二十以下容顏修正者為之令太常博士主之準國子學給料行事之外習六樂之道學五禮之儀十周年量文武授散官號曰雲門生又按周禮奏太簇歌應鐘以享地祗注云地祗謂神州社稷也太簇陽也位在寅應鐘陰也位在亥故斗建亥則日月會於寅斗建寅則日月會於亥是知聖人之制取合於陰陽歌奏之儀用符於交會今之祭社即乖古法乃下奏太簇上歌黃鐘但太簇黃鐘俱是陽律上下歌奏不異乃是陽合於陽非特違其禮經抑亦乖於會合其社壇歌黃鐘請改為應鐘又五郊工人舞人衣服合依方色按周禮以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以元璜禮北方是知五天帝德色玉不同四時文物各隨方變冀以同色相感同事相宜陰陽交泰莫不由此今祭器茵褥總隨於五方五郊衣服獨乖於方色舞者常持皂飾工人恆服絳衣以臣愚知深為不便其工人衣服請各依方色其宗廟黃色乃各以所主色禮神又以樂理身心禮移風俗請立樂教以化兆民周禮曰以樂德教國子中和祗庸孝友其國子諸生望教以樂經同於禮傳則人人知禮家家知樂自然風移俗易災害不生其樂經章目雖詳稍乖旨要請委通明博識修撰訖然後頒下元瓘開元八年官國子司業先聖孔宣父廟先師顏子配則配像當坐今乃立侍準禮授坐不立授立不跪顏子道亞生知才先入室既當配享其儀見立請據禮文合從侍坐又四科弟子閔子騫等並服膺儒術親承聖教雖復列像廟堂不參享祀謹按祠令何休范寧等二十二賢猶霑從祀豈有升堂入室之子獨不霑春秋配享之餘請春秋釋奠列在二十二賢之上七十子者文翁之壁尚不缺如豈有國庠遂無圖繪請命有司圖形於壁兼為立贊庶敦勸儒風光崇聖烈曾參孝道可崇獨受經於夫子望準二十二賢從享三禮三傳及毛詩尚書周易等並聖賢微旨生徒教業必事資經遠則斯道不墜今明經所習務在出身咸以禮記文少人皆諳讀周禮經邦之軌則儀禮莊敬之楷模公羊穀梁歷代宗習今兩監及州縣以獨學無友四經殆絶既事資訓誘不可因循其學生望請各量配作業並貢人預試之日習周禮儀禮公羊穀梁並請帖十通五許其入策以此開勸即望四海均習九經該備孚開元八年官起居舍人伏見所製氣雄詞美德音相屬鄙炎漢之奢侈徇有唐之儉陋知作勞而居逸念中人之家産用心如此天下斯安臣職在司言請宣示百寮及編國史
