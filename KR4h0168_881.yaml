front:
  text: 全唐文欽定全唐文卷八百八十一徐鉉四
  hash: sha256:410b4924543365d8ea1d6577855aa6623418b38e774cb5a8c9d604db51f93797
body:
  text: 文武百官臣某等言伏奉制旨以聖尊后册禮奉令旨俟百日後上進者仰承嚴命固合遵行但以事有未安理須陳奏中謝伏以歷代已來嗣極之主禮之大者尊奉上宮倘或正儀未行庶事莫敢先舉所以陛下裁膺册禮即下制書長樂歸尊已先孝理百司承式將撰吉辰及金輅言旋六宮即敘惟有典禮已屬稽遲遽覩絲言備聽慈旨在苴麻之次誠極感傷然吉凶之儀本無妨礙歷稽前代遍考儒臣法度具存事體至大况渙汗之澤暜及諸侯册之行便當相次未修大禮交歉㣥情伏乞陛下再稟嚴慈俯回聽允臣等幸列有位庶免曠官冒瀆冕旒無任云云文武百官某等言伏覩御札崇尚儉約克已庇民節省服用去金玉之飾減放嬪御屏聲色之娛供進珍羞制作奇巧中禁賜與內門資用並從損廢以緩征徭宸翰章明德音流布凡百卿士至於兆人歡呼感動倍百常品中賀臣聞文武之政方策存焉知之非艱行之不易故自三代已降繼體之君有師保之訓以制其情有諫諍之臣以救其失及其行也猶未臻焉豈有發自宸衷出於獨斷乾文昭煥至德宏新聳動四方如此之盛者也伏惟陛下重熙撫運下武膺期翼翼小心乾乾夕惕寅畏所感人神罔弗和仁明所加細大罔弗理然猶勞謙訪道虛已求才日照天臨山藏海納體唐堯之仁以親九族極虞舜之孝以奉上宮率天下之尊以承顏問安居四海之富以扇枕調膳德既充矣化亦孚矣然後恤小民之艱食閔㣥吏之急徵息澤虞之征釋公田之禁崇足用之本近取諸身致九年之儲無求於外斥靡曼之色咸遂物情除珍玩之飾率由舊典去淫巧以急用罷私積以歸公生人之耳目惟新風俗之澆浮立變先皇帝貽翼子之訓垂聖人之資言有所未宣行有所未遠陛下奉揚先志推而行之數年之間盛美斯備向若非陛下之孝心廣達無以見先帝之聖作惟幾巍乎煥乎不可得而名已昔者成湯因嵗旱而罪已周成動天威而責躬咸能即致時雍永錫繁祉豈若陛下春秋方富中外方寧制於幾先行此難事宗社之降靈可見邦家之流祚何窮率土之濱孰不幸甚則臣向所謂知之非難行之不易陛下既能行之矣臣又聞行之甚易終之實難願陛下慎而守之則登三邁五夫何遠耶臣等幸塵班列無補明德徒慚充位之譏但賀蒼生之福措詞有盡順美難周臣等無任瞻天仰德歡呼躍踴之極云云臣鉉伏奉詔諭以元宗皇帝實録命臣修撰才微任重恩厚責深拜捧絲綸若臨冰谷中謝臣聞握圖御宇既憲章於在昔創法垂統亦啓佑於後昆然則至德無名元功無迹惟日用而不竭豈淺局之能量是以良史之才歷代為重以南董之直而無聞於成編如遷固之能而不絶於浮議則知鋪陳王業昭灼皇圖求之當仁豈易輕授伏惟元宗皇帝紹中興之統承纍洽之基大孝邁於有虞仁恕逾於漢祖愛人節用得孝文之風重學崇儒有建元之烈東京則光武章明以憂勤立政魏室則太祖陳王以文藻化人綜是全功允昭聖德對越上帝敷佑下民二十年間慎終如始陛下嗣膺寶歷欽若天明以纍聖之資輔生知之哲導揚休命啓煥貽謀故得畏軒后之神更延三百配文王之祀永奉明堂必將著以丹青播於金石斯為重任宜在鴻儒如臣者章句末流記問微學遭逢之便塵玷司言豈意天鑒不遺宸慈過聽猥加寵寄及此非才進退莫遑怔忪失次然臣祇事先帝常忝近司沐王澤以滋深欽皇風而永久報大君之厚德誠有愚心厠作者之清塵其如公議戴恩愈極揣分彌驚未識津涯徒知慶躍云云右臣伏蒙宸慈念及闕乏特降宣旨為置莊田仍且於少府監賜熟米二百石者望外之恩莫知所自撫躬拜命終懼且驚伏以臣稟性顓愚觸塗疏拙幸緣際會早玷清華祿秩之資既為過量吉凶之備皆沐優恩空費稻粱寧裨海嶽但以家傳清白族有羈孤雖欲居常終慚逼下蓋亦暗於世務非敢竊效古人伏惟陛下明極燭幽仁深廣覆親加寵諭曲軫殊私昔者葛亮薄田不聞君賜孫宏脫粟尚獲時譏如臣非才何以致此辭讓則有辜憫惻祇受則更覺貪叨徒承推食之恩轉積素餐之懼乾坤之施無可上酬螻蟻之軀惟知畢命臣聞廣莫極於坤元則含容光大擬議著焉尊莫隆於皇后則窈窕思賢詠歌發焉是以上德無名而稱謂流於百代至道無象而儀刑表於四方此固天理出於自然聖人所以無避者也矧惟節惠之禮百王盛典述德之議史臣至公誕昭耿光敢揚懿德伏惟大行國后生商遺烈安劉積慶淑質奇相惠問英才光映台華作儷公族紹隆藩閫載輯儲闈世子專寢門之禮孝心不匱大君以家人之慶天覆有加誠由肅雍之德叶此睦姻之盛言內則者以為美談及運屬飛天尊歸配地嚴恭匪懈稟母儀於上宮慈惠積中率婦道於天下浣濯是服而六衣有煒環佩中節而九御有倫思脫簪之戒以成憂勤之政躬大練之飾以輔純儉之風陰教既孚王化茂遠方輿告變椒風永閟慟結長樂哀纏紫宸龜筮叶從攢塗將啓旌德之號彤管斯存若乃山河表德而文之以禮金玉其相而守之以恭垂訓以慈進賢以哲至於誦經習詩之敏審音知樂之明超然遠識敻絶終古勤行孝養下自從化故寬裕懷於六宮天資明惠學無不通故遺愛鍾於宸眷載稽具美實光前烈謹案諡法德禮不愆容儀恭美皆曰昭慈哲遠識寬裕遺愛皆曰惠仰惟實録足表鴻猷諡曰昭惠后謹議右臣伏覩國家裒采㣥才搜揚片善有上書言事者猶有可取必加甄録廣納之意遐邇知恩然臣竊嘗觀之率皆淺近止於采取金寶檢榷賦租製作舟車斬伐材木巡察關禁收捕寇攘既利害相參亦虛實略半食祿者衆成務者稀若乃先王教化之源朝廷刑政之本謂之迂濶竟爾寂寥得人之盛未可致也去夏有布衣陳禹詣獻納院上疏獨與衆異其言曰五常之教不立度量之器不均又曰江鄉之民存不事之以禮沒不祭之於室斯實有意於教化而不汨於流俗者也臣於是訪其為人則鄉曲無過延之與語則靜默寡詞倘使行顧其言才副其識則古之循吏何以踰之願陛下以親民之職試其為理考績之際自有常科臣忝預銓司顧慙則哲謬妄論薦俯伏兢惶謹奏世事推移長塗暌隔違離軒砌二十餘年追念生平有靦心目伏承大王英謀奮發妙略宏施長驅伐叛之師克正奪宗之罪奉天朝之正朔慰全楚之謳歌成功上簡於帝心惠澤遠敷於疲俗風猷所及慶快同深儼早被恩私今通信問欣躍之極倍萬常情儼聞君子退人忠臣去國舊君有反服之禮交絶無惡聲之嫌以義始終今古一也某受性無術暗於事機佩師訓以周旋忘時態之險易追惟疇昔受遇先王國士之知何嘗暫忘某復曳裾侯館委質府庭松楸所依兄弟少長大義若此乃心如何而世事推移讒言交構忠信獲罪干戈日尋某雖不才非敢愛死過君以求名則不忍苟生以失節則不能誠恐蕞爾之身終為執事之纍所以仰冒嚴禁逃還故鄉出魯國以悲歌向西河而下泣子鮮去衛非欲立宗梁鴻適吳本期自質先皇帝恩深善貸義極綏懷采鄉曲之棄妻收荊岑之遺璞遂得服勤州縣歷職朝廷始望初心豈將及此但封疆敻隔玉帛不尋奕世君臣一朝吳越愧三州之父子羡五部之弟兄外靦交朋俯慚章綬每春秋代序霜露交零飛江南之㣥鶯嘶代北之朔馬悲興觸緒淚落霑襟自分沒身長懷永嘆而天將厭亂人或與能大王以命世之資克清家難聖上以至仁之舉大濟橫流車書既同冠蓋相望方承大王念紉蘭之逐客哀叢棘之離人煦以恩光感之意氣乘軒食肉有若平時始聽音塵猶疑夢寐且悲且慰五情無主苟非大人之德不以細故介懷則惠好所臻孰能若是某又聞善父母者必推錫類之感善兄弟者必廣常棣之風故能功冠生民道濟天下大王英謀遠略宏量深仁上國仰其嘉猷全楚被其渥澤如某昔年事分曾無蠆芥之嫌今日支離合在昭蘇之數况東西一體道路無虞倘蒙閔以懸旌全斯大造兄弟子姪並許還朝存者荷二天之恩沒者釋九原之恨則生死骨肉未可比量瀝膽隳肝寧申萬一某以學古為家業以感義為素懷空言虛詞且非説客皇天后土實鑒此心猶覬拭玉張旃或從行人之末捧禽執贄重趨典客之傍丹懇獲申微願斯畢雖復身填溝壑猶望魂魄知歸攬筆陳詞悲來橫集鉉以疏拙之性頑滯之資厠於人曹無足比數然以荷先人之業猥踐清貫讀往聖之書頗識通方纍朝舊恩漸於肌骨至於行道濟物立身揚名報國士之知成天下之務竊不自揆頗嘗有心故膺耳目之寄當津要之路侃然受任不以為憂而才與心違命與運背言出而不能悟主身廢而無足救時三年之中百艱備歷干戈擾於內地烽火照於闕庭奔走道路容身靡所當此時也苟得耕於南畝齊於一民以斯終焉尚為幸也而副君將聖王道漸亨博採遺賢以濟多難贊諭之任首及非才拜命以來翻自憂愧何者儲后踐納麓之重而處於承顏之地有從諫之善而立於無過之場徒欲持稊米以實太倉秉燭火以助羲御恐不足以副上德之舉塞故人之望也但當正身潔已徇公滅私使內不愧於本心外不違於所學而已閣下德我太甚期我太深歷陽郡佐白君至京辱貺手札慶譽優渥勗勵殷勤知己之情無以過此然此日副君之垂顧乃昔時閣下前席品題之所致也緘藏佩服何日忘之今兵難少寧蒸民未泰頂踵利物斯實其時閣下高臥已久㣥望頗鬱宣室之召斯在不遠勉慎興居以副翹企悽悽之意遲用面諭不宣再拜月日東海徐鉉答拜稽首復書處士足下鉉讀聖人之書探作者之意出處語默信非徒然故高臥堯舜之代不為背時濡足楚漢之際不為趨利嗟乎天下兵起百年於茲立功名取富貴者有之貞苦節安徒步者何寂寞而無聞也愚常疑廉恥之風於是乎絶而足下負磊落之氣畜清麗之才褐衣韋帶賦詩自釋介然之操其殆庶乎悠悠之人尚未識其所謂惟韓君叔言知之以鉉愛奇好古者也故屢稱足下之行亟誦足下之詩相視欣然以為今猶古也然鉉才名地望遠謝韓君極慮息心不足當隱君子之厚顧足下德我太甚惠我好音咫尺之書則古人之道在其中百篇之詩則作者之序冠其首先以溢美之贈益以謙光之詞發緘欣玩不能自巳又念昔之隱者消聲物外絶迹時人今足下高蹈如彼自屈若此得非以吾道久否思發憤而振起之爾鉉誠淺劣不足以堪願契素交嵗寒然後盛集續當歸納不宣鉉再拜十二月日復書正字足下辱貺長箋詞高旨遠循環捧讀欲罷不能見顧之深良足愧也吾子以老成之智蘊救世之心一言悟主俯拾初筮雖位未充量然升聞特達超然獨異亦古之所難也推是而往其道可知鉉也不才猥厠先達雖復識不能見之於未兆才不能濟之於已形然而振天下之公議舉天下之公器推轂後進心無適莫庶幾不下於昔賢吾子異日當知為不妄其古今之變安危之勢忽乎微哉未可一二以言語盡也謹俟暇日當接餘論聊奉還答伏惟鑒悉徐鉉白臣聞堯尚文思書有永言之目漢崇儒學史稱好道之名所以澤及四海化成天下其後迂濶王道蕩淫淳風正始之音闕而莫續魏帝浮雲之句不接輿詞王融曲水之篇無聞聖作將興古義允屬昌期我皇帝陛下常武功成右文業廣明踰日月不以聖智自居思掞雲天不以才能格物其或南薰有懌東作無憂民思秋稼之娛物茂冬蒸之禮恩覃在鎬調振橫汾天籟發音疇非聳聽乾文垂象寧隔仰瞻信可以暢列聖之謨猷變生人之耳目者也於是嵗足廠田坴作噩序首青陽元鳥司啓之明晨白獸稱觴之節日有唐中興之一紀皇上御歷之七年地平天成時和嵗稔衢樽之味暜洽元風擊壤之聲散為和氣同雲暗野朔雪飛空急勢隨風影亂東郊之仗凝華接曙光浮元會之筵星蹕既移雲罍啓太弟以龍樓之盛入奉垂旒齊王以鳳沼之崇來參鑾几霞軒結轍革履齊趨唯陳韶濩之音無取魚龍之戲喜油油之既洽顧奕奕之方呈筆落天波言成帝典七言四韻宣示㣥臣乃命太弟太傅建勳翰林學士給事中朱鞏常夢錫翰林學士中書舍人殷崇義遊簡言吏部尚書毗陵郡公景運工部尚書上饒郡公景遜左常侍勤政殿學士張義方諫議大夫勤政殿學士潘處常魏岑駕部員外郎知制誥喬舜主客員外郎知制誥徐鉉膳部員外郎知制誥張緯光祿卿臨汝郡公景遼鴻臚卿文安郡公景遊太府少卿陳留郡公景道左衛將軍樂安郡公宏茂駕部郎中李瞻等或賡元首之歌或和陽春之曲如葵心之向日馭似蟄戶之環雷門二十一篇咸從奏御皆所以美豐年之兆申萬物之情非徒載笑載言一咏一吟而已昔者白雲之唱七萃驅馳黃竹之詩萬人凍餒王猷且塞後嗣何觀孰若偃仰大庭優遊六藝初筵有秩而六宮不移夜漏未央而百官已事被之樂府授以史官煥乎文章無得而稱也有詔為序以紀嵗月御批云宿來健否酒醒詩畢可有餘力何妨一為之序以紀嵗月呵呵天慈過聽猥屬微臣徐樂上書徒慙暮入其日內宴臣鉉逮後方赴安國作序幸冠首篇狂僅成兢憂罔措謹上昔者漢宮故事著成王負扆之圖魯殿宏規紀黃帝垂衣之象用能昭文昭物雖十世而可知如玉如金更百王而不易况乎天統建寅之首皇猷纍洽之辰上瑞方呈宸遊載穆拱北極而衆星咸在祝南山而萬壽無踰明皇花萼之樓風流不泯德祖中和之節雅頌常垂實奕世之耿光為中朝之盛觀固當騰之竹帛飾以丹青襲六藝以同明與天文而共麗皇太弟重離暜照博望凝思敦古道以致君法前經而作事命千秋而指畫召立本以趨馳粲然後素之功焯爾彰施之象煦如就日肅不違顏萬國式瞻若奉衣裳之會㣥臣仰止似聞輿馬之音盛德形容於斯大備者也初外朝既罷內宴方陳赴召者上自副君逮於戚里銅壺已晏聖藻爰飛或逡巡而載歌或蹈詠而不作既而有詔出示㣥官臣建勳義方鉉等聞命在前援先就因承中旨入奉斯筵而兩省衆篇翌日咸集故奉和者二十一首而侍宴者十有四人前序闕遺被令重述謹上臣聞軒后之神也畏愛止乎三百唐虞之聖也倦勤及乎耄期文王之明夷也爻象周於六虛宣父之感麟也裦貶流於百代乃知功利之及物者與形器而有限道德之垂憲者將造物而常新是故體仁者必懇懇於立言務遠者必勤勤於宏道然則封泰山告成功七十二家正禮樂刪詩書一人而已大矣哉立教之難也有唐基命長發祥符舊物重甄斯文不墜皇上高明博厚濬哲文思既承纍聖之資仍就甘盤之學鴻才綺縟理絶名言默識泉深事符影響自祇膺眷命欽若重熙廣大孝以厚時風勵惟精而勤庶政宥萬民而罪巳體百姓以為心俗富刑清時安嵗稔其或萬幾暇豫禁籞晏居接對侍臣宵分乃罷討論墳典昧旦而興口無擇言手不釋卷嘗從容謂近臣曰卿輩從公之暇莫若為學為文為學為文莫若討論六籍遊先王之道義不成不失為古儒也今之為學所宗者小説所尚者刀筆故發言奮藻則在古人之下風以是故也其高識遠量又如此焉昔魏武帝有言老而勤學而所著止於兵書吳大帝亦云學問自益而無聞述作風化之旨彼其恧歟屬者國步中艱兵鋒始戢惜民力而屈已畏天命而側身靜慮凝神和光戢耀而或深惟邃古遐考萬殊懼時運之難并鑑謨猷之可久於是屬思天人之際遊心今古之間觸緒研幾因文見意縱橫毫翰炳煥縑緗以為百王之季六樂道喪移風易俗之用蕩而無止慆心堙耳之聲流而不反故演樂記焉堯舜既往魏晉已還授受非公爭奪萌起故論享國延促焉三正不修法弊無救甘心於季世之偽絶意於還淳之理故論古今淳薄焉戰國之後右武賤儒以狙詐為智能以經藝為迂濶此風不革世難未巳故論儒術焉父子恭愛之情君臣去就之分則裦申生明荀彧俾死生大義皎然明白推是而往無弗臻皆天地之深心聖賢之密意禮樂之極致教化之本源六籍之微辭㣥疑之互見莫不近如指掌煥若發蒙萬物之動不能逃其形百王之變不能異其趣洋洋乎大人之謨訓也夫天工不能獨運元后不能獨理故有道無時孟子所以咨嗟有君無臣鄭公所以嘆恨庶乎斯民有幸大道將行舉而錯之域中則三五之功何遠乎爾臣又聞將順致美鋪陳耿光布堯言於萬邦稱漢德於殊俗蓋詞臣職也若乃嚮明而理負扆而朝慶賞威刑豫遊言動則有太史氏存焉又若雅頌文賦凡三十卷鴻筆麗藻玉振金相則有中書舍人集賢殿學士徐鍇所撰御集序詳矣今立言之作未即宣行理冠皇墳謙稱雜説臣鉉以密侍禁掖首獲觀瞻有詔冠篇勒成三卷而三卷之中文義既廣又分上下焉凡一百篇要道備矣將五千而並久與二曜以同明昭示孫謨永光册府謹上臣聞通物情而順時令者帝王之能事感惠澤而發頌聲者臣子之自然况乎上國春歸華林雨霽宸遊載穆聖藻先飛雷動風行君唱臣和故可告於太史播在薰絃帝典皇墳莫不由斯者已嵗躔己巳月屬仲春主上御龍舟遊北苑親王舊相至於近臣並儼華纓同參曲宴時也風清景淑物茂人和望蔣嶠之嶔崟祝為聖壽泛潮溝之清淺流作天波絲簧與擊壤齊聲盞斚共君恩並醉乃命即席分題賦詩睿思雲飄天詞綺縟文明所感蹈詠皆同既擊鉢以爭先亦分題而較勝長景未暮百篇已成自揚大雅之風豈在遒人之職奉詔作序冠於首篇授以集書藏之金匱謹上鼓天下之動者在乎風通天下之情者存乎言形於風可以言者其惟詩乎粵若書契肇生雅頌乃作達朝廷邦國之際其用不窮更治亂興替之時其流不竭六義浸遠百代可知若夫王公大人居尊履正其行道也無迹其成務也不宰所以可則可象有功有親非夫詠言何以觀德周文陳王業之什召穆糾宗族之篇聖人輯之皇猷備矣子桓振建安之藻昭明總著作之英體有古今理無用舍夫機神肇於天性感發由於自然被之管絃故音韻不可不和形於蹈厲故章句不可不節取譬小而其指大故禽魚草木無所遺連類近而及物遠故容貌俯仰無所隱怨惻可戒贊美不誣斯實仁者之愛人智士之博物王室光啓人文化成上去刪詩綿二千祀其用益廣其制益精絶其流冗結以周密王言帝典炳蔚於縑緗詞人才子充溢於圖牒若乃練調暢則高視前古神氣淳薄則存乎其人亦何必於苦調為高奇以背俗為雅正者也殿下挺生知之哲有纍聖之資道冠三才學兼百氏虞庠齒胄騰聲於就傅之年侯社錫圭底績於為邦之際隨城封壤人歌召伯之棠浙右控臨時賴京師之潤戎機鞅掌曾不勞神間館娛遊未嘗釋卷深遠莫窺其際喜慍不見於容唯奮藻而摛華則緣情而致意至鍾山樓月登臨牽望闕之懷北固江春眺聽極朝宗之思賞物華而頌王澤覽穡事而勸農功樂清夜而宴嘉賓感邊塵而憫行役沈吟命筆顧盼成章理必造於元微詞必關於教化或寓言而取適終持正於攸歸著於篇凡若干首及玉符來覲元圃歸尊臨飛閣之華池即洊雷之講肆斯文間作盛德日新蓋曠代之宗英實一時之師匠以鉉幸塵贊論嘗典絲綸謂可言詩因令視草聽鈞天之奏徒欲動心酌滄海之波唯知滿腹敬抽短翰式繼頌聲謹序士君子藏器於身應物如響成天下之務者存乎事業通萬物之情者在乎文辭然則日月不知人亡政息瞻之則渺然在羲軒之上蹈之則肅然若旦暮之間自非遺文餘教則作者之道或幾乎息矣嗟乎天地長久英靈超忽鄴中才子與樂事以俱淪江左名臣及元談而共盡清流可楫勝氣猶生閲蠧以凄涼撫絶韋而慷慨斯文未喪何代無人濟陽江公鍾川嶽之粹靈體角犀之奇相芳蘭十步本自天資建木千尋非求外獎弱齡聞道夙嵗馳名竹箭稱美於東南來充王府天馬擅奇於西北入奉乘黃於時聖歷中興賢才間出公從容冠蓋之際頡頏臺閣之間文高學深識優理勝虛襟接物易多通正色當官直方無擾定祖宗之大號功補神明端風憲之直繩氣懾姦宄身可屈而名不辱用即行而舍即藏故叢棘三年雅懷自若承明再入時望彌高人無間然道亦光矣嗚乎運逢上聖年在中身人之云亡空嗟殄瘁死而可作誰與同歸詩所謂胡不萬年傳有云古之遺愛者也昔襄陽孟浩然年五十有二疾發背而亡公豈其後身歟何符合之若此惟公以進士擢第以詞賦馳名事藩邸參管記之司登朝籍專掌綸之任奏議表啓時然後言詩筆歌頌和者彌寡絶文場而遠騖橫學海以孤飛綜南北之清規盡古今之變體優遊兩制不亦宜乎然而初無編文乃亡逸嗣子翹門生王克珍等或搜諸經笥或傳於人口或焚藳之外或削材之餘彙聚㣥分凡得十卷授之執友以命冠篇鉉族近情親官聯迹密每西垣景晏北第風清忘形樽俎之間得意筌蹄之表西江東海俱為賦鵩之鄉北門右掖並對受釐之問嗟乎相如既往空存封禪之書季子云來但有心期之劍寢門流慟已隔生平都門長送遽成今昔追託言於夙契申永悼於斯文援毫悲吒存諸梗概云耳人之所以靈者情也情之所以通者言也其或情之深思之遠鬱積乎中不可以言盡者則發為詩詩之貴於時久矣雖復觀風之政闕遒人之職廢文質異體正變殊塗然而精誠中感靡由於外獎英華挺發必自於天成以此觀其人察其俗思過半矣比夫澤宮選士入國知教其最親切者也是以君子尚之蘭陵蕭君江左之英詩苑之精其為人也樂易其處世也靜默忘形衡泌之下苦節戎馬之間其道日新其名益震諸侯虛左五府交辟今晉王殿下樹藩作相樂善愛才幕府初開君實首冠由典校書至儀曹郎出入兩宮官無虛授優遊多士交必正人每良辰美景登高送遠適莫不存於心府勢利不及於笑談含毫授唱豫和汝其性淡故略淫靡之態其思深故多清苦之詞大雅之士何以過此鉉與君為友幾將二紀其間聚散窮達罕或寧居淡成之懷終始若一靜言投分想見古人丁巳嵗撫王高讓承華出分陝服君以宮省舊德復踐初筵撰行之夕俾豫視草鉉也不佞無足揚君之美徒欲申別恨敘交情故作斯文冠於篇首云爾
