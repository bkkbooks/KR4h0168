front:
  text: 全唐文欽定全唐文卷四十三肅宗二
  hash: sha256:2b0671271b3c2b64b7ba51d4763854b80a8418a70c3ef142e079baf4e53e2489
body:
  text: 握兵之要古先為重命帥之道心膂攸憑是知靖難夷凶必資於金革總戎授律實仗於親賢蓋將砥寧邦家保息黎獻者矣朕以薄德纘承鴻緒往屬元凶暴亂中夏不寧上憑宗社之靈下藉熊羆之力由是廓清咸洛拯此生人頃以河朔殘妖尚稽天討蛇豕竊依於城堡塗炭久被於齊氓朕為人父母寧忘閔念雖好生息戰每冀其歸降而餘孽昧恩靡聞於悔禍所以軒后親征於獯鬻周文致役於昆夷古之用兵蓋非獲巳趙王係幼稟異操夙懷韜略負東平之文學蘊任城之智勇性惟忠孝持愛敬以立身志尚權謀有經通之遠智知子者父方有屬於維城擇能而授俾克申於戎律且凶徒嘯聚頗歷歲時惡既貫盈理當撲滅君親有命可不敬乎俾展龍豹之韜永清梟獍之類可充天下兵馬元帥仍令司空兼侍中鄭國公光弼副知節度行營事應緣軍司署置所司準式刑政之本皇王大要政事或失於厥中帝道則乖於御下王者持平慎恤蓋在於此朕纘服洪緒躬臨庶政何嘗不內軫泣辜之念外覃解網之恩詔書所下期於必當往以衣冠之伍受職賊中量其重輕俾申貶黜比聞三司處置未甚均平或同科之中升降有異或謫任之所風宜不一頗招情故殊非至公是以搢紳之間不無竊議有司奉法其若是邪又流降量移久申詔令省司類例事亦稽遲遂使嶺嶂踰時積流荒之嘆雨露凝澤壅如絲之旨逖聽遐邇頗聞咨嗟斯乃主者怠官甚無謂也宜令中書門下類例三司先所貶官各據科目均平改擬仍審勘前後制敕應合霑恩并速處分準制合量移人亦令吏部速比類聞奏又緣頃經逆亂中夏不寧士子之流多投江外或扶老攜幼久寓他鄉失職無儲難歸京邑眷言憫念實惻於懷宜令中書門下牒本道責取名品應五品巳上官並即與進取六品巳下官合序用名品可收者亦量才敘用仍據中外員闕均聽授官其授京官者仰本道勾當裝束即令赴京授外官者各令之任餘不合授官是士流者所在州縣一切安存無害公私勿令干擾朕聞效官者必量力而授任致理者亦擇才而能況風化之源本資於長吏升降之義用明於朝典古之建萬國親諸侯蓋以撫綏黎民宣布王化則今之令長古稱子男矜孤恤寡均徭省賦皆是職也朕以薄德恭膺寶位屬殘孽猶聚戎軍未戢雖憂國之計且務於濟時而恤人之心每深於惠物將求厚俗必在審官至於刺史治中皆制命所授辨其材術蓋在朝廷先令中書門下精加擇訪務德惟良如非理人之材並即量宜改授且諸縣令員數應多如聞處理之間廉平者少或使司所奏以功見稱或主司所擬循資而授儻乖任用空忝親人或有案牘之間曾未間於令式征賦之際皆委任於胥徒繇是吏轉生姦遂為蠧政人不堪命因而失業興言及此良用憮然夫易柱以調弦聲之和也革弊而從理政之體也漢宣帝曰與我共理天下者其惟良二千石乎因知方嶽之任足以委黜陟之權矣凡諸道節度皆職備防戎政在理兵豈遑廉問必令郎官御史分命巡察則乘驛暫往難於委知諒無益於澄清反有增於勞擾其天下縣令各仰本州府長官審加詳察如有衰耄暗弱或貪財縱暴不間時政為害於人並具名録奏即與改替其才職相當者並依舊奏定巳後有不稱者所繇官長量加殿黜庶理人之職無或謬焉又入仕之流本期展用且無事實豈可徒勞今員外之官所在甚衆既不釐務空效馳驅將適鄉閭復拘職守念其旅寓良可優矜應州縣見任員外官並任其所適計秩滿後各與成資仍於本色內減一兩選與留其先緣罪纍貶授者不在此限如員外官中材識幹濟曾經任使州縣所資者亦任量留上州不得過五人中州不得過四人下州不得過三人上縣巳上不得過一人古之任官必寄成政如長吏數易則綱條不恤所以人懷苟進之心俗靡居常之業比者或開此弊實謂未便於時自今巳後刺史縣令更不得數有移改善政聞於上則當議擢遷如道失厥中亦自申懲誡黜陟之道固有彞章又比來刺史之任皆先奏州縣官屬苟為改作孰免顏情自今巳後除帶刺史判官外一切不得奏改官吏到任之後察有罪纍及不稱職者任具狀奏聞請然後無所與替其刺史非兼節度但有防禦使者副使判官委於本州官中推擇亦不得別奏人並委中書門下著為常法庶使官無失位政有常經宣示天下宜知朕意昔昆夷作患周宣興薄伐之役陳豨稱亂漢祖發親征之師蓋所以禁暴除凶取威靖難上以保宗社下以拯黎元古者帝王茲道無替頃者祿山稱兵搆逆背義負恩惡既貫盈尋巳殄滅而思明殘寇尚敢挻妖聚其蜂蠆之餘邀我雷霆之伐朕以干戈屢動黎庶未康繇是按甲延誅冀其來格而乃竊兵干紀自取滅亡副元帥光弼糾率鋭徒恭行天罰爰啓絳宮之略克摧青犢之師曾未浹辰大破凶黨此皆穹昊垂祐宗社降靈是以戎律用貞禍淫斯在如聞蓬艾之下蚊蚋猶虞故當乘破竹以追奔同燎原而撲滅朕為人父母深念塗炭是用大整戈矛方申弔伐撫綏河雒以致和平即以今月十七日幸東京率六軍取北路進發但巡幸所過自有行營應緣祗供並有司自辦其路次州縣一切不得別有徵斂亦不得輒有進獻及時新野味等王公以下文武從官每頓主人供蔬飯不得輒置魚肉餅果及鋪設亦不得妄差人力別有祗承行從官及州縣所繇有如違犯王公以下五品以上具名録奏當日貶官餘并從軍令仍令知頓使左右巡使御史相知糾察具狀彈奏如涉阿容及不能舉奏所繇議在必行毋貽後悔仍令戶部侍郎同中書門下平章事第五琦充置頓使應行幸供擬及兵馬糧料續撙節作條件奏聞其從官委中書門下定名録奏務從減省不欲勞煩宣示中外宜知朕意朕為人父母時屬艱虞東夏不康近郊多壘除妖撲燎戎馬交馳父出夫行征徭未息蓬頭汗甲今巳纍年憂我人斯寢興誠切達精誠於天地委長策於廟堂宗社假靈王師克勝殘逆窮搏聚而相持造舟橫河樹柵憑岸一鼓齊進應時殲蕩陝東連捷吉語驟來平賊安人指期可待自古王者得神以興城梁不假於人功士馬或稱於幽贊休徵斯在靈應不違凡百具寮相同慶慰蕭華素有材能擢居省闥間者見迫狂虜陷於艱危遂能徇節本朝乃心王室潛通誠款以表忠純殺身獨難通其不死之理行權有賞道其歸有之心終以見疑妄遭禁錮事則昭著理可甄明今魏郡既收疲氓思乂黔黎載請允叶人心宜更剖符仍思禦侮可魏州刺史臨難亡身為臣之大節念功加贈經國之常典故衛尉卿兼懷州刺史充北庭行營節度使虢國公李嗣業植操沈厚秉心忠烈懷幹時之勇略有戡難之遠謀久任邊陲備經任使自凶渠搆亂中夏不寧持感激之誠揔驍果之衆親當矢石頻立勳庸壯節可嘉將謀於百勝忠誠未遂空恨於九泉言念其功良深憫悼死於王事禮有可嘉宜增裂土之封用廣飾終之義可贈武威郡王其賵贈及緣葬事所司倍於常式仍令官給靈輿遞還所在以其子佐國襲其官爵實封二百戶自來諸州府多有奏請官者或先無闕員所司雜授深紊紀綱自今以後州縣官有灼然衰暮暗弱無政及犯贓私切須與替者仰具事由聞奏如緣軍州文要官吏部任簡擇並具闕由聞奏所奏人皆須具歷任考第甲授日月同奏泉府之設其來尚矣或因時改作則制有重輕往以金革是殷邦儲稍闕屬權臣掌賦變法非良遂使貨物相沿穀帛騰踊求之輿誦敝實由斯夫易柱調絃政之要者今欲仍從舊貫漸罷新錢又慮權行轉資艱急如或猶循所務未塞其源實恐物價虛騰黎人失業靜言體要用藉良圖且兩漢舊規典章沿革必朝廷會議共體至公蓋明君不獨專法當從衆議庶遵行古之道俾廣無私之論宜令文武百官九品巳上並於尚書省議訖委中書門下詳擇奏聞厚禮所以飾終易名所以表行況情鍾天屬寵及褒封載疇加等之美式備元儲之贈永懷軫念有惻彞章第十二子故興王紹育慶璿源分華若木天資純孝神假聰明河間聚書幼聞樂善之旨延陵聽樂早得知音之妙頃以暫嬰沈瘵殆積旬時而資敬益彰穎悟逾爽愛親之戀言不間於斯須告訣之辭事先符於夢寐顧惟至性實切深哀將胙土析圭載崇藩翰聞詩對易爰就琢磨方冀成立豈期夭喪瑤英始茂遽摧於當春隙駟俄遷忽沈於厚夜興言痛悼憫惜良深宜賁寵於青宮俾哀榮於元穸可贈太子諡曰恭懿應緣喪葬所司準式仍令兼京兆尹劉晏充監護使少尹陶鋭為副主者施行朕聞昆夷作患周王授鉞於方叔大宛不庭漢主委兵於廣利則知昏迷之黨舞干不足以懷柔聖哲之謀伐叛必資於用武事將禁暴蓋非獲巳司徒兼中書令朔方鄜坊邠寧等節度使代國公子儀慶鍾五百運符魚水挺文武之宏才蘊韜鈐之遠略積蒼生之重望有命代之元勳負鼎和羹巳申於啓沃登壇制勝實佇於謀猷萬里長城倚賴攸屬今殘祆未殄戎事猶殷爰資一舉之功以靖四方之難宜令子儀都統諸道兵馬使管崇嗣充副使取邠慶朔方路過往收大同橫野清夷便收范陽及河北仍遣射生衙前六軍英武長興寧國左右威遠驍騎等左廂一萬人馬軍三千步軍七千人以開府李光進充都知兵馬使特進烏崇福充都虞右廂一萬人馬軍三千人步軍七千人以開府儀同三司李鼎充都知兵馬使特進王兟充都虞渭北官健一萬人馬軍三千人步軍八千人以開府辛京杲充使朔方留後蕃漢官健八千人馬軍八百人步軍七千二百人以兼御史中丞任敷渾釋之同充使蕃漢部落一萬人馬軍五千人步軍五千人以兼御史中丞慕容兆與新投降首領奴賴同統押充使鄜坊等州官健一萬人馬軍一千人步軍九千人以攝御史中丞杜冕充使寧州官健一萬人馬軍一千人步軍九千人以攝御史中丞桑如圭充使涇原防禦官健二千人馬軍五百人步軍一千五百人以大將軍閻英奇充使搜乘練卒籍馬賦車合四海以齊心率九夷而同力金鼓作氣鐵騎爭雄欱野噴山殷天動地以服順之師旅討從逆之凶徒人事天時指期可定今將略高闕出雲中驅蚊蚋於幽燕掃欃槍於鞏雒削平天下混一車書然後獻凱清廟策勳盟府剋寧區夏豈不盛歟兵馬既衆恐路次難為供應仍備六十程糧馱遣發馬畜草料所在量事支供不得妄有煩擾百姓仍委子儀即差人先於諸道計會分般次進發仍與回紇兵馬犄角相應逐便討除所關軍務應須處置並委子儀續具狀聞奏卿父子相從大膺儒術既精且博其道可師出入禁庭勤勞侍讀歲月滋久宏益頗多今以暮年俾令致仕仍加子職用資孝養兼賜紫金魚袋絹三百匹皇帝信問朕聞調御上乘久安中土常懷大士共濟羣生師以法鑑高懸一音演説藏開祕密境入圓明大悲不倦於津梁至善必明於兼濟尊雄付囑實在朕躬思與道安宣揚妙用廣滋福潤以及大千傳象罔之元珠拔沈迷之毒箭良緣斯在勿以為勞杖錫而來京師非遠齋心巳久副朕虛懷春寒師得平安好遣書指不多及持衡當軸體備股肱若鼎餗之不知慮鼓妖之有闕一字台司稍紊王度則乖宜峻彞章以懲不道銀青光祿大夫行中書侍郎同中書門下平章事集賢殿崇文館大學士兼修國史上柱國姑臧縣開國伯李揆本以藝文纍階資序周旋近密參掌絲綸庶其翼亮之勤列在訏謨之地任惟過力誠匪奉公無聞憂國之心不懼曠官之責具瞻何取進退求容仍懷罔上之謀更漏省中之語端居相府潛搆禍胎扇湖南之八州阻江陵之節制將圖不軌俶擾方隅考驗甚明發姦斯在私乘驛傳自越章程式按秋官合從徽纆但以位叨宰輔久侍階墀特寬丹筆之書猶任朱轓之職俾從遠黜以肅朝倫可袁州長史員外置同正員仍即馳驛赴任百司及州縣興工力役不急之務一切並停諸軍兵健應在行營有羸老病疾不任戰陳者各委節度使速揀擇放還路次州縣量加濟恤諸色番役各令所司減省放其營農故金紫光祿大夫太子太傅兼宗正卿齊物宗室圭璋士林楨幹清廉獨斷剛毅不羣歷踐周行備經中外威名益振忠效彌彰三尹神州一登會府擒姦掩鈎距之術恤獄正喉舌之官遂令調護儲闈再登師傅從容賓友師長官寮桑榆之時壯志逾勵松柏之性晚歲常堅天不憗遺奄然殂謝念親感舊深軫於懷宜錫寵章載光營魄可贈太子太師儉德之恭約失者鮮格言為重理道在茲朕志復淳源用濟海內振其元化鏡以至清非謂艱難之時自崇朴素之本無聲之樂庶聞於四方曳地之衣將比於前古且率人而自我亦揉木而銷金為君之難事當乎增惕股肱之義務在乎弼違期於啓沃之勤不在延君之譽為人上者此道惟常豈可付以史官宣於中外載循來表殊匪朕懷八座位崇是資望實七兵寄重必藉勳賢況見危致命為臣之大節存舊録功有國之常典貺茲名器允屬當仁元從開府儀同三司判院帥行軍司馬充間廣既五坊官院營田栽接總監等使兼隴右羣牧使京畿鑄錢使長春宮使勾當內作少府監及殿中都使上柱國郕國公李輔國精明洞物宏毅冠時鍾河嶽之秀氣稟人倫之高識悉心無隱應物推誠潔己不雜於風塵臨事無忘於夙夜義形造次績著始終頃在殷憂備同甘苦身率先於草創功有成於纘服洎大兵之後戎務實繁職統中外事無大小克徇恭敬之節用申協贊之勳比陳利害多所宏益永言忠讜實表公才未嘗矜伐彌自謙損星霜幾變夷險一心豈有業構經綸任兼軍國尚居散列獨謝崇班宜膺喉舌之寵仍受腹心之託欽乃攸司以副僉望加兵部尚書餘並如故皇王俯仰應協於靈祇典禮廢興式存於禋告蓋重成命以崇祗肅朕獲嗣鴻猷敢志虔敬頃以三代正朔所尚不同百王徽號無聞異稱顧茲薄德思創常規爰因行慶之日將務惟新之典而建元立則制命膺符受於天地祖宗申於百辟卿士今既循諸古法讓彼虛名革故之宜巳宣於臣下昭報之道未展於郊廟因時備禮擇日陳誠克明恭己之心庶降庇人之福至誠斯感其在茲乎宜取今月二十八日朝獻太清宮二十九日享太廟元獻廟來月一日祭圓丘及太一壇禍福之源天不可問報應之道理或難憑遂使積善深仁併罹荼毒元惡大憝得恣凶殘自古以來未免斯咎日者祿山作逆竊據兩都塗炭我生靈傷夷我骨肉於禮院門遇害王妃及男子等或閨闈令德婦道柔間或藩邸象賢幼年聰慧蒼黃之際陷沒賊中嗟其無辜並遭非命興言及此痛悼良深宜令所司即擇日收葬一事巳上並令官供其失骸骨者亦令招魂神而有感庶從改卜之安魂兮來歸將就新營之吉聖人立號天下至公膺其美者必歸有德有其德者或無其位苟徽烈可紀則追崇之典行焉況義貫因心禮優加等稽夫往策抑有前聞盛業鴻猷久不可替故靖德太子琮慶鍾霄極親則朕兄性與天道行高時望宣慈惠和聰明睿哲四科兼綜一以貫之而福壽不遐既隨往運緬惟友愛實軫於心朕昔踐儲宮顧誡非次於君人之命所不敢違以少長而言豈忘其序每思懇諫竟莫獲從遽順聖慈嗣茲寶位安可不申夙志有闕推恩宜加尊異之名載茂哀榮之典敬用追諡曰奉天皇帝命將之選當仁實難非夫文可經邦不能安人和衆武可禁暴罔以剋敵成功允藉宏才爰申錫命司徒中書令靈州大都督府長史單于鎮北副大都護持節充朔方節度關內支度營田鹽池押諸蕃部落副大使知節度事六城水運使兼邠寧鄜坊等道節度副大使上柱國代國公子儀河嶽間氣巖廊重寶器量深識寬而有謀術應通方用而無滯自經艱阻實擁旌旄遂能克復二京折衝千里厥戎將殄時乃之功久勤啓沃載竭忠讜人之望也天實賚豫今殘寇未寧興師頗廣鎮守經制巳有區分而籌畫指麾必資專制將軍辭第無以家為丞相憂邊思平國難固以訏謀之用宜申總統之威其將戡定外虞澄清列郡光膺藩屏之寄式崇社稷之勳對揚休命以永終譽可封汾陽郡王知朔方河中北庭潞儀澤沁等州節度行營兼興平定國等兵馬副元帥仍充本管內觀察處置使餘如故太寶禎符時膺昌運皇天不祕紫府降靈敷上帝之耿光悟神祇之有鑒荷斯戩穀宏濟艱難冀與兆人同登壽域股肱奉上宗廟福豫豈唯朕躬致此嘉瑞卿咸有一德寅奉休徵將使發揮克諧輔弼所請宣示中外編入史册者依天下之本屬於元良四方之明資其冢嗣是有傳歸之義必膺監撫之重克廣前烈與人守器非君父之獨親俾生靈之同載朕號慕弓劒寢居縗絰頃以疾苦未能康寧殘寇猶虞中原多壘軍國大務理須參決乃眷匕鬯恭承宗祧皇太子豫天縱聰明日躋聖德中興宸搆巳有大功問安寢門知九國之夢制勝戎閫高五品之才時方艱難禮在諒暗且以庶政委之元子宜令權監國於戲奉天地者是稱大寶承宗廟者必在元良吾以薄德纂承丕緒今以憂勞所積遘疾彌留用申顧命誡爾元子爾性稟生知幼有明德蒸蒸之孝言必因心溫恭睿哲允文允武往在西土爰討凶渠命爾總戎克宣王略收復中夏唯爾之功遂升以儲闈將中我鴻業爾有令聞萬方宅心吾大漸之後即宜膺寶位夫天下至廣神器所重丕承纍聖之德虔奉大中之道必當任賢勿二去邪勿疑以慈惠為心開諫諍之路兢兢業業無怠無荒嗚呼戒之無替厥命敕帝王享國天命有常大歷傳歸皇綱無易朕幸以涼德繼承宗祀在長樂問安之日屬元凶間釁之初南奉聖皇北集戎事賴將相同德社稷降靈爰發五原成師一旅丕圖克振華夏乂寧旰昃之心每勤思於兆庶晨昏之禮嘗不匱於庭闈而天禍上延神心未悔正當金革罹此凶災遂遘膏肓惟茲大漸及茲理命獲著誓言庶安國以保人豈嘉生而惡死審以大計屬於公卿皇太子豫仁孝元良聰明齊聖佐成大業能事神祇朕既彌留可守宗社宜令所司當日具禮於柩前即皇帝位應緣朕喪事制度並準聖皇遺詔其諸道節度使都督刺史等並不須赴哀又為兵革未寧郵驛艱弊一切不須專使奉慰朕執喪在疚不食葷羶所設饋奠皆須如在有違本意神亦不歆其祭祀之禮一切不得宰殺且國儲非廣虛費稍多宮掖之間須有釐革所有三宮內人宜量事減省及至德巳來籍沒家口非切要者並與放出諸王院內亦宜準此其文武官僚合須褒賞天下百姓宜在優矜每當變易之時皆下惟新之命並委皇帝節級處分嗚呼股肱勳臣敬保元子事居送往諒在於茲宣示萬邦宜從朕意
