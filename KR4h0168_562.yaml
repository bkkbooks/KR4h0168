front:
  text: 全唐文欽定全唐文卷五百六十二韓愈十六
  hash: sha256:1657f172dd9d9edfea3dfae08154fe759e2f62fb1842cfc525e44b5461a1c0e6
body:
  text: 少府監胡公者諱珦字潤博年七十九以官卒明年八月十四日葬京兆奉先夫人天水趙氏祔焉其子逞迺巡遇述遷造與公壻廣文博士吳郡張籍以公之族出行治歷官壽年為書使人自京師南走八千里至閩南兩越之界上請為公銘刻之墓碑於潮州刺史韓愈曰胡姓本出安定後徙清河於今為宗城屬貝州大父諱秀武后時以文材徵為麟臺正字父宰臣用進士卒官平陽冀氏令贈潭州大都督公早孤能自勸學立節槩非其身力不以衣食凡一試進士二即吏部選皆以文章占上第樂為儉勤自刻削不干人以矯時弊及為富平尉一府稱其斷決建中四年侍郎趙贊為度支使薦公為監察御史主餽給渭橋以東軍洗手奉職不以一錢假人賊平有司考覈㣥吏多坐貶死獨公以清苦能檢飭無漏失遷河南倉曹魏公賈躭以節鎮鄭滑以公佐觀察事檢校尚書工部員外郎以剛直齟齬不阿忤權貴除獻陵令居陵下七年市置田宅務種樹為業以自給教授子弟貞元十一年吏部大選以公考選人藝學以勞遷奉先令以治辦遷尚書膳部郎中改坊州刺史州經亂無孔子廟公至則命築宮造祭器率博士生講讀以時如法以祠人吏聚觀歎息遷舒州刺史州歲大熟麥一莖數穗閭里歌舞之考功以聞遷尚書駕部郎中數以事犯尚書李巽巽時主鹽鐵事富驕恃勢以語丞相由是退公為鳳翔少尹巽死遷少大理改少詹事元和十二年朝廷以公年老能自祗力事職不懈可嘉拜少府監兼知內中尚明年以病卒公始以進士孤身旅長安致官九卿為大家七子皆有學守女嫁名人年幾八十堅悍不衰事可傳載可為成德銘曰朅朅胡公既果以方挾藝射科每發如望人求於人我己為之自始迄終不降色辭因官立事隨有可載發跡餽軍遭讒府介去居陵下為吏為隱坊舒之政於茲有靳守官駕部名升已屈躋於少府甚宜秩物不配其有君子恥之少府古卿公優止之刻文碑石以顯公行維公後人無怠嗣慶上之元和六年其相曰權公諱德輿字載之其本出自殷帝武丁武丁之子降封於權權江漢閒國也周衰入楚為權氏楚滅徙秦而居天水略陽符秦之王中國其臣有安邱公翼者有大臣之言後六世至平涼公文誕為唐上庸太守荊州大都督長史焯有聲烈平涼曾孫諱倕贈尚書禮部郎中以藝學與蘇源明相善卒官羽林軍錄事參軍於公為王父郎中生贈太子太保諱皋以忠孝致大名去官累以官徵不起追諡貞孝是實生公公在相位三年其後以吏部尚書授節鎮山南年六十以薨贈尚書左僕射諡文公公生三歲知變四聲四歲能為詩七歲而貞孝公卒來弔哭者見其顏色聲容皆相謂權氏世有其人及長好學孝敬祥順貞元八年以前江西府監察御史徵拜博士朝士以得人相慶改左補闕章奏不絕譏排姦倖與陽城為助轉起居舍人遂知制誥凡撰命詞九年以類集為五十卷天下稱其能十八年以中書舍人典貢士拜尚書禮部侍郎薦士於公者其言可信不以其人布衣不用即不可信雖大官勢人交言一不以綴意奏廣歲所取進士明經在得人不以員拘轉戶兵吏三曹侍郎太子賓客復為兵部遷太常卿天下愈推為鉅人長德時天子以為宰相宜參用道德人因拜禮部尚書同中書門下平章事公既謝辤不許其所設張舉措必本於寬大以幾教化多所助與維匡調娛不失其正中於和節不為聲章因善與賢不矜主已以吏部尚書留守東都東方諸帥有利病不能自請者公嘗與疏陳不以露布復拜太常轉刑部尚書考定新舊令式為三十編舉可長用其在山南河南勤於選付治以和人以寧便以疾求還十三年某月甲子道薨於洋之白草奏至天子痌傷為之不御朝郎官致贈錫官居野處上下弔哭皆曰善人死矣其年某月日葬河南北山在貞孝東五里公由陪屬升列年除歲遷以至公宰人皆喜聞若已與有無忌嫉者于頔坐子殺人失位自囚親戚莫敢過門省顧朝莫敢言者公將留守東都為上言曰頔之罪既貰不竟宜因賜寬詔上曰然公為吾行諭之頔以不憂死前後考第進士及廷所策試士踵相躡為宰相達官與公相先後其餘布處臺閣外府凡百餘人自始學至疾病未嘗一日去書不觀公既以能為文辭擅聲於朝多銘卿大夫功德然其為家不視簿書未嘗問有亡費不偫餘公娶清河崔氏女其父造嘗相德宗號為名臣既葬其子監察御史璩纍然服喪來有請乃作銘文曰權在商周世次不存滅楚徙秦嬴劉之閒甘泉始侯以及安邱詆訶浮屠皇極之扶貞孝之生鳳鳥不至爵位豈多半塗以稅壽考豈多四十而逝惟其不有以惠厥後是生相君為朝德首行世祖之文世師之流連六官出入屏毗無黨無讎舉世莫疵人所憚為公勇為之其所競馳公絕不窺孰克知之德將在斯刻詩墓碑以永厥垂唐故陳許軍節度使金紫光祿大夫檢校尚書左僕射兼御史大夫右龍武統軍彭城郡開國公食邑二千戶贈潞州大都督劉公諱昌裔字光後薨既葬將反机於京舍於墓次故吏文武士門人送客訖事會哭將退咸顧戀牽連一口言曰自我公薨至葬凡所以校德焯勤者莫不粗完隱卒崇終有都督之詔日事時功以著不可誣有太史之狀太常之狀有諡有誄有幽堂之銘又如即外碑刻文以顯詩之其於傳無已豈不益可保於是相許諾以告其孤縱縱哭捨杖拜曰縱不敢違則相與刻銘文曰劉處彭城本自楚元陽曲之別繇公祖遷公曾祖考為朔州守祖令太原仍世北邊樂其高寒棄楚不還逮於公身三世晉人公生而異魁顏鉅鼻幼如舒退少長好事西戎乘勢盜有河外公雖家居為國喑噫來告邊帥可破之計楊琳為橫巴蜀靡彫公由游寄單船諭招折其尾毒不得動搖琳後來降公不有功終琳之已還臥民里蓋古有云人職其憂無事於職而與國謀德宗之始為曲環起奮筆為檄強寇氣死決敗算成效於屈指環有許師公遂佐之蘇氏軋敵多出公畫累拜郎中進兼中丞雖在陪貳天子所憑蔡卒幸喪圍我許郛新師不牢劻勷將逋公為陳方應變為械與之上下寇無所賴遂至遁敗以功遷陳實許之半聲駕元侯以勢自憚復入居許為軍司馬脫權下威士心益歸卒嗣環職棄惡從德乃與蔡通塗其榛棘稚耆嬉遨連手歌謳上無可怨外無與讎既長事官浚之大夫其償未塞僕射以都及癸巳歲秋涌水出流過其部破民廬室公即疏言此皆臣愆防斷不補漬民於泉臣耄且疾宜即大罰上曰火甾害大臣其來允余之思其可止哉驛隸走呼有中使來公迎於驛遂行不迴六月隆熱上下歊赩公鞭公驅去馬以輿公病日惡不能造闕仆臥在宅閔有加錫命為統軍龍武之右兼官左相百僚長首冬十一月日將南至公遂薨殂年六十二奏聞怛悼俾官臨弔悲不聽朝贈督潞州存歿之賚於數為優明年九月東葬金谷公往有命匪後人卜河東節度使贈尚書右僕射鄭公葬在滎陽索上元和八年六月庚子太史尚書比部郎中護軍韓愈刻其墓碑曰司馬氏遷江南有鄭豁者仕慕容垂國為其太子少保其孫當拓跋魏為滎陽太守後者號其族為南祖南祖之鄭入唐有為利之景谷令者曰嘉範於公為曾祖是生撫俗為泗之徐城令徐城生公之父曰洪卒官涼之戶曹參軍公諱儋少依母家隴西李氏舉止異凡兒其舅吏部侍郎季卿謂其必能再立鄭氏稍長能自課學明左氏春秋以進士選為太原參軍事對直言策拜京兆高陵尉考府之進士能第上下以實不姦樊僕射澤以襄陽兵戰淮西公以參謀留府能任後事戶曹殯於涼涼地入西戎自景谷徐城三世皆未還滎陽葬公解官舉五喪為三墓葬索東徐城墓無表公能幼長哀感心求不置以得舊人指告其處其後為大理丞太常博士遷起居郎尚書司封吏部二郎中能官舉其名德宗晚節儲將於其軍以公為河東軍司馬能以無心處嫌閒卒用有就貞元十六年將說死即詔授司馬節節度河東軍除其官為工部尚書太原尹兼御史大夫北都留守公之為司馬用寬廉平正得吏士心及升大帥持是道不變部將有因貴人求要職者公不用用老而有功無勢而遠者削四鄰之交賄省姱嬉之大燕校講民事施罷不竢日用能以十月成政氓征就寬軍給以饒十七年疾廢朝夕八月庚戌薨享年六十一天子為之不能臨朝者三日贈尚書右僕射即以其年十月辛卯葬索上疾比薨醫問交道比葬弔贈賜使者相及凡河東軍之士與太原之氓吏及旁九郡百邑之鰥寡外夷狄之統於府者聞公之薨皆哭曰吾其如何公與賓客朋游飲酒必極醉投壺博弈窮日夜若樂而不厭者平居簾閣據几終日不知有人別自號白雲翁名人魁士鮮不與善好樂後進及門接引皆有恩意始娶范陽盧氏女生仁本仁約仁載皆有文行二季舉進士皆早死仁本為後子獨存不樂舉選年三十餘始佐河陽軍後娶趙郡李氏生三女二夫人凡三男五女長女嫁遼東李繁繁亦名臣子有才學遺命二夫人各別為墓不合葬系曰士常患勢卑不能推功德及人常患貧無以奉所欲得若鄭公者勤一生以得其位而曾不得須臾有焉雖然觀其所既立其可知已嗚呼哀哉公諱燕奇字燕奇宏農華陰人也大父知古祁州司倉烈考文誨天寶中實為平盧衙前兵馬使位至特進檢校太子賓客封宏農郡開國伯世掌諸蕃互市恩信著明夷人慕之祿山之亂公年幾二十進言於其父曰大人守官宜不得去王室在難某其行矣其父為之請於戎帥遂率諸將校之子弟各一人間道趨闕變服詭行日倍百里天子嘉之特拜左金吾衞大將軍員外置賜勳上柱國寶應二年春詔從僕射田公平劉展又從下河北大歷八年帥師納戎帥勉於滑州九年從朝於京師建中二年城汴州功勞居多三年從攻李希烈先登貞元二年從司徒劉公復汴州十二年與諸將執以城叛者歸之於京師事平授御史大夫食實封百戶賜繒綵有加十四年年六十一五月某日終於家自始命左金吾大將軍凡十五遷為御史大夫職為節度押衙右廂兵馬使兼馬軍先鋒兵馬使階為特進勳為上柱國爵為清邊郡王食虛邑自三百戶至三千戶真食五百戶終焉公結髮從軍四十餘年敵攻無堅城守必完臨危蹈難歔欷感發乘機應會捷出神怪不畏義死不榮幸生故其事君無疑行其事上無間言初僕射田公其母隔於冀州公獨請往迎之經營賊城出入死地卒致其母田公德之約謂父子故公始姓田氏田公終而後復其族焉嗣子通王屬良禎以其年十月庚寅葬公於開封縣魯陵岡隴西郡夫人李氏祔焉夫人清夷郡太守祐之孫漁陽郡長史獻之女柔嘉淑明先公而殂有男四人女三人後夫人河南郡夫人雍氏某官之孫某官之女有男一人女二人咸有至性純行夫人同仁均養親族不知異焉君子於是知楊公之德又行於家也銘曰烈烈大夫逢時之虞感泣辤親從難於秦維茲爰始遂勤其事四十餘年或裨或專攻牢保危爵位已躋既明且慎終老無隳魯陵之岡蔡河在側烝烝孝子思顯勳績斵石於此式垂後嗣元和八年十一月壬子上命丞相元衡丞相吉甫丞相絳召太史尚書比部郎中韓愈至政事堂傳詔曰田宏正始有廟京師朕惟宏正先祖父厥心靡不嚮帝室訖不得施乃以教付厥子維宏正銜訓事嗣朝夕不怠以能迎天之休顯有丕功維父子繼忠孝予維寵嘉之是以命汝愈銘欽哉惟時臣愈承命悸恐明日詣東上閣門拜疏辤謝不報退伏念昔者魯僖公能遵其祖伯禽之烈周天子實命其史臣克作為駉駜泮閟之詩使聲於其廟以假魯靈今天子嘉田侯服父訓不違用康靖我國家蓋寵銘之所以休寧田氏之祖考而臣適執筆隸太史奉明命其可以辤謹桉魏博節度使銀青光祿大夫檢校工部尚書兼魏州大都督府長史御史大夫沂國公田宏正北平盧龍人故為魏博諸將忠孝畏慎田季安卒其子幼弱用故事代父人吏不附迎宏正於其家使領軍事宏正籍其軍之眾與六州之人還之朝廷悉除河北故事比諸州故得用為帥已而復贈其父故滄州刺史兵部尚書母夫人鄭氏梁國太夫人得立廟祭三代曾祖都水使者府君祭初室祖安東司馬贈襄州刺史府君祭二室兵部府君祭東室其銘曰唐繼古帝海外受制狎於太寧燕盜以驚㣥黨相維河北失平號登元和大聖載營風揮日舒咸順指令嶪嶪魏土嬰兒戲兵吏戎愁毒莫保腰頸人曰田侯其德可倚叫譟奔趨乘門請起田侯攝事奉我天明束縛弓戈考校度程提壃籍戶來復邦經帝欽良臣曰維錫予嗟我六州始復故初告慶於宗以降命書旌節有韜豹尾神旗櫜兜㦸纛以長魏師田侯稽首臣愚不肖迨茲有成祖考之教帝曰俞哉維汝忠孝子思乃父追秩夏卿媲德娠賢梁國是榮田侯作廟相方視阯見於蓍龜祖考咸喜暨暨田侯兩有文武訖其外庸可作承輔咨汝田侯勿亟勿遲覲饗式時爾祖爾思惟路氏遠有代序自隋尚書兵部侍郎諱袞四代而至冀公冀公諱嗣恭以小邑蕭關令發聞開元受賜更名書於太史治行靈州終功南邦享有丕祉紹開厥家官至兵部尚書封冀國公薨贈尚書右僕射司空公諱應字從眾冀公之嫡子用大臣子謹飭擢至侍御史著作郎選刺虔州割餘雩都作縣安遠以利人屬鑿敗灘石以平贛梗陶甓而城罷人屢築詔嗣冀封又加尚書屯田郎中進服色遂臨於溫築隄岳城橫陽界中二邑得上田除水害拜尚書兵部郎中兼御史中丞淮南軍司馬改刺廬州又甓其城人不歲苫入為尚書職方郎中兼御史中丞佐鹽鐵使使江東有功用半歲歷常州遷至宣歙池觀察使進封襄陽郡王至則出倉米下其估半以廩餓人蜀闢誅行軍千五百人於蜀李錡將反以聞置鄉兵萬二千人錡反命將期以卒救湖常坐牢江東心錡以無助敗縛作響山亭營軍左右權丞相善之鑱其說響山石居宣五年以疾去位校其倉得石者五十萬餘府得錢千者八十萬公之為州逢水旱喜賤出與人歲稔以其得收常有贏利故在所人不病饑而官府蓄積元和六年天子憫公疾不可煩以職即其處拜左散騎常侍以其祿居其歲九月望薨於東都正平里第年六十七明年葬京兆萬年少陵原夫人滎陽鄭氏祔既其子臨漢縣男貫與其弟賞貞謀曰宜有刻也告於叔父御史大夫鄜坊丹延觀察使恕因其族弟進士㣥以來請銘遂以其事銘曰冀公之封維艱就功襄陽繼大啟慶自躬於虔洎溫厥緒既作以及職方遂都邦伯朝夕人事下完上實師於其鄉鄰寇逼屈營軍響山牆屋修施裦功刻表丞相之辭受代而家敘疏及邇病不能廷食祿卒齒凡代大家維艱其保既顯既願戒於終咎伊我襄陽克慎以有延畀後承莫不率守有墓於原維樹在經以告無期博士是銘王氏皆王者之後在太原者為姬姓春秋時王子成父敗狄有功因賜氏厥後世居太原至東漢隱士烈博士徵不就居祁縣因號所居鄉為君子公其君子鄉人也魏晉涉隋世有名人國朝大王父元暕歷御史屬三院止尚書郎生景肅守三郡終傅涼王生政襄鄧等州防禦使鄂州采訪使贈吏部尚書公尚書之弟某子公諱仲舒字宏中少孤奉母夫人家江南讀書著文其譽藹鬱當時名公皆折官位輩行願為交貞元初射策拜左拾遺與陽城合遏裴延齡不得為相德宗初怏怏無奈久而嘉之其後入閣德宗顧列謂宰相曰第幾人必王某也果然月餘特改右補闕遷禮部考功吏部三員外郎在禮部奏議詳雅省中伏其能在考功吏部提約明故吏無以欺同列有恃恩自得者眾皆媚承公疾其為人不直視由此貶連州司戶移夔州司馬又移荊南因佐其節度事為參謀得五品服放跡在外積四年元和初收拾俊賢徵拜吏部員外郎未幾為職方郎中知制誥友人得罪斥逐後其家親知過門縮頸不敢視公獨省問為計度論議直其寃由是出為峽州刺史轉廬州未至丁母夫人憂服除又為婺州刺史時疫旱甚人死亡且盡公至多方救活天遂雨疫定比數年里閭完復制使出巡人填道迎顯公德事具聞就加金紫轉蘇州變其屋居以絕火延隄松江路害絕阻滯秋夏賦調自為書與人以期吏無及門而集政成為天下守之最天子曰王某之文可思最宜為誥有古風豈可久以吏事役之復拜中書舍人既至京師儕流無在者視同列皆邈然少年益自悲而謂人曰豈可復治筆硯於其間哉上若未棄臣宜用所長在外久周知俗之利病俾治之當不自愧宰相以聞遂得觀察江南西道奏罷榷酤錢九千萬軍息之無已掌吏壞產猶不釋囚之公至脫械不問人遭水旱賦窘公曰我且減燕樂絕他用錢可足乎遂以代之罷軍之息錢禁浮屠誑誘壞其舍以葺公宇三年法大成錢餘於庫粟餘於廩人享於田廬謳謠於道途天子復思且徵以代虛吏部左丞位以待之長慶三年十一月十七日薨於洪州年六十二上哀慟輟朝贈左散騎常侍某日歸葬於某處某既以公之德刻而藏之墓矣子初又請詩以揭之詞曰生人之治本乎斯文有事其末而忘其源切近昧陋道由是堙有志其本而泥古陳當用而迂乖戾不伸較是二者其過也均有美王公志儒之本達士之經秩秩而積涵涵而停韡為華英不矜不盈孰播其馨孰發其明介然而居士友以傾敷文帝階擢列侍從以忠遠名有直有諷辨遏堅懇巨邪不用秀出班行乃動帝目帝省竭心恩顧日渥翔於郎署騫於禁密發帝之令古而蔚不比於權以直友寃敲撼挫揠竟遭斥奔久淹於外歷守大藩所至極思必悉利病萎枯以膏燠暍以醒坦之敞之必絕其徑浚之澄之使安其泳帝思其文復命掌誥公潛謂人此識宜少豈無凋郡庸以自效上籍其實俾統於洪逋滯攸除姦訛革風袪蔽於目釋負於躬方乎所部禁絕浮屠風雨順易秔稻盈疇人得其所乃恬乃謳化成有代思以息勞虛位而竢奄忽滔滔維德維績志於斯石日遠彌高韓姬姓以國氏其先有自潁川徙陽夏者其地於今為陳之太康太康之韓其稱蓋久然自公始大著公諱宏公之父曰海為人魁偉沈塞以武勇游仕許汴之間寡言自可不與人交眾推以為鉅人長者官至游擊將軍贈太師娶鄉邑劉氏女生公是為齊國太夫人夫人之兄曰司徒元佐有功建中貞元之間為宣武軍帥有汴宋亳潁四州之地兵士十萬人公少依舅氏讀書習騎射事親孝謹偘偘自將不縱為子弟華靡遨放事出入敬恭軍中皆目之嘗一抵京師就明經試退曰此不足發名成業復去從舅氏學將兵數百人悉識其材鄙怯智勇指付必堪其事司徒歎奇之士卒屬心諸老將皆自以為不及司徒卒去為宋南城將比六七歲汴軍連亂不定貞元十五年劉逸淮死軍中皆曰此軍司徒所樹必擇其骨肉為士卒所慕賴者付之今見在人莫如韓甥且其功最大而材又俊即柄授之而請命於天子天子以為然遂自大理評事拜工部尚書代逸淮為宣武軍節度使悉有其舅司徒之兵與地當此時陳許帥曲環死而吳少誠反自將圍許求援於逸淮啗之以陳歸汴使數輩在館公悉驅出斬之選卒三千人會諸軍擊少誠許下少誠失勢以走河南無事公曰自吾舅沒五亂於汴者吾苗薅而髮櫛之幾盡然不一揃刈不足令震駴命劉鍔以其卒三百人待命於門數之以數與於亂自以為功并斬之以徇血流波道自是訖公之朝京師廿有一年莫敢有讙呶叫號於城郭者李師古作言起事屯兵於曹以嚇滑帥且告假道公使謂曰汝能越吾界而為盜耶有以相待無為空言滑帥告急公使謂曰吾在此公無恐或告曰翦棘夷道兵且至矣請備之公曰兵來不除道也不為應師古詐窮變索遷延旋軍少誠以牛皮鞵材遺師古師古以鹽資少誠潛過公界覺皆留輸之庫曰此于法不得以私相餽田宏正之開魏博李師道使來告曰我代與田氏約相保援今宏正非其族又首變兩河事亦公之所惡我將與成德合軍討之敢告公謂其使曰我不知利害知奉詔行事耳若兵北過河我即東兵以取曹師道懼不敢動宏正以濟誅吳元濟也命公都統諸軍曰無自行以遏北寇公請使子公武以兵萬三千人會討蔡下歸財與糧以濟諸軍卒擒蔡姦於是以公為侍中而以公武為鄜坊丹延節度使師道之誅公以兵東下進圍考城克之遂進迫曹曹寇乞降鄆部既平公曰吾無事於此其朝京師天子曰大臣不可以暑行其秋之待公曰君為仁臣為恭可矣遂行既至獻馬三千匹絹五十萬匹他錦紈綺纈又三萬金銀器千而汴之庫廏錢以貫數者尚餘百萬絹亦合百餘萬匹馬七千糧三百萬斛兵械多至不可數初公有汴承五亂之後掠賞之餘且斂且給恆無宿儲至是公私充塞至於露積不垣冊拜司徒兼中書令進見上殿拜跪給扶贊元經體不治細微天子敬之元和十五年今天子即位公為冢宰又除河中節度使在鎮三年以疾乞歸復拜司徒中書令病不能朝以長慶二年十二月三日薨於永崇里第年五十八天子為之罷朝三日贈太尉賜布粟其葬物有司官給之京兆尹監護明年七月某日葬於萬年縣少陵原京城東南三十里楚國夫人翟氏祔子男二人長曰肅元某官次曰公武某官肅元早死公之將薨公武暴病先卒公哀傷之月餘遂薨無子以公武子孫紹宗為主後汴之南則蔡北則鄆二寇患公居間為已不利卑身佞辭求與公好薦女請昏使日月至既不可得則飛謀釣謗以間染我公先事候情壞其機牙姦不得發王誅以成最功定次孰與高下公子公武與公一時俱授弓鉞處藩為將疆土相望公武以母憂去鎮公母弟充自金吾代將渭北公以司徒中書令治蒲於時弟充自鄭滑節度平宣武之亂以司空居汴自唐以來莫與為比公之為治嚴不為煩止除害本不多教條與人必信吏得其職賦入無所漏失人安樂之在所以富公與人有畛域不為戲狎人得一笑語重於金帛之賜其罪殺人不發聲色問法何如不自為輕重故無敢犯者其銘曰在貞元世汴兵五猘將得其人眾乃一愒其人為誰韓姓許公磔其梟狼養以雨風桑穀奮張厥壤大豐貞元元孫命正我宇公為臣宗處得地所河流兩壖盜連為㣥雄唱雌和首尾一身公居其間為帝督姦察其嚬呻與其睨眴左顧失視右顧而跽蔡先鄆鉏三年而墟槁乾四呼終莫敢濡常山幽都孰陪孰扶天施不留其討不逋許公預焉其賚何如悠悠四方既廣既長無有外事朝廷之治許公來朝車馬干戈相乎將乎威儀之多將則是矣相則三公釋師十萬歸居廟堂上之宅憂公讓大宰養安蒲坂萬邦絕等有弟有子提兵守藩一時三侯人莫敢扳生莫與榮歿莫與令刻文此碑以鴻厥慶
