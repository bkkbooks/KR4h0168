seq: 182
front:
  text: 全唐文欽定全唐文卷一百八十二王勃六
  hash: sha256:e7f27033c4095336b5ba72107e75556b56eeec8150c96f95bcdd2fde46d75dab
body:
  text: 夫神明所貴者道也天地所寶者才也故雖陰陽同功宇宙戮力山川崩騰以作氣星象磊落以降精終不能五百年而生兩賢也故曰才難不其然乎今之㣥公並受奇彩各仗異氣或江海其量或林泉其識或簪裾其跡或雲漢其志不可雙得也今並集此矣豈英靈之道長而造化之功倍乎然僕之區區常以為人之百年猶如一瞬非不知風月不足懷也琴樽不足戀也事有切而未能忘情有深而未能遣故僕射㣥公相知非不深也相期非不厚也然義有四海之重而無同方之感分有一面之深而非纍葉之契故與夫升華者其異乎嗟乎積潘楊之遠好同河汾之靈液目置良友相依窮路是月秋也於時夕也他鄉怨而白露寒故人去而青山迥不其悲乎盍各賦詩云爾下官才不曠俗寵不動時充帝王之萬姓預乾坤之一物早師周禮偶愛儒宗晚讀老莊動諧真性進非干物自疏朝市之機退不邀榮誰識王侯之貴散琴樽於北阜喜耕鑿於東陂野老披荷暫辭幽澗山人賣藥忽至神州驚帝室之威靈偉皇居之壯麗朝遊魏闕見軒冕於南宮暮宿靈臺聞絃歌於北里交情獨放已厭人間野性時違少留都下道王以天孫之重分曲阜之新基畢公以帝室之華擁平陽之舊館迹塵鐘鼎思在江湖居榮命於中朝接風期於下士緑縢朱紱且混以蘿裳列榭崇軒坐均於蓬戶賓主由其莫辨語默於是同歸終大王之樂善備將軍之揖客是日也雲繁雨驟氣爽風馳高秋九月王畿千里高扃向術似元禮之龍門甲第臨衢有當時之驛騎英王入座牢醴還陳高士臨筵樵蘇不爨是非雙遣自然天地之間榮賤兩忘何必山林之下元談清論泉石縱橫雄筆壯詞烟霞照灼既而神馳象外宴洽寰中白露下而南亭虛蒼烟生而北林晚鶢鶋始望不及牲牢麋鹿長懷非忘林藪先生負局倦城市之塵埃遊子橫琴憶汀洲之杜若况乎迹不皆遂時不再來屬宸駕之方旋值㣥公之畢從洛城風景此會無期戚里笙竽浮歡易盡仰雲霞而道意捨塵事而論心夏仲御之浮舟願乘春水張季鷹之命駕思動秋風策藜杖而非遙整柴車之有日青溪數曲幽人長往白雲萬里帝鄉難見安貞抱朴已甘心於下走全忠履道是所望於㣥公倘心迹克諧去留咸遂廟堂多暇返身滄海之隅軒冕所辭回首箕山之路尋赤松而見及泛黃菊以相從雖源水桃花時時失路而幽山桂樹往往逢人庶公子之來遊幸王孫之畢至茅君待客自有金壇王烈迎賓還開石架維恐一邱風月侶山水而忘年三徑蓬蒿待公卿之來日對光陰之易晚惜雲霧之難披㣥公葉縣鳧飛入朝廷而不出下走遼州鶴去謝城闕而依然敢抒重襟爰疏短引式命離前之筆希存別後之資凡我故人其辭云爾天地所以間南北山川所以別風雲陽舒陰慘覺造化之為勞日運星回恨良辰之不定白七官天台傑氣地乳奇精當益友之龍頭處通侯之燕頷靈珠耀掌是琴酒之文人長劍橫腰即風雲之烈士屬天象掩峻帝道徵奇吐詞場之珠玉作朝廷之鸞鳳寰中握手得希代之英靈天下傾心盡當年之意氣整秋駕駐春裝背橫溪之七曲對長亭之十里中情易感下調多愁送君當東陸之前逢我在北風之別嗟乎良友不追神交已遠同人者少方見阮籍之眼青知我者稀不學馮唐之首白唯當遜遊絶壑旅思空山幽桂一叢賞古人之明月長松百尺對君子之清風既而花鳥爭飛烟霞競集青山高而望遠白雲深而路遙貴余以道誰能著後五千言贈子以言空有離前四十韻東西南北某也何從寒暑陰陽時哉不與河陽古樹無復殘花合浦寒烟空驚墜葉王生賣藥入天子之中都夏統乘舟屬㣥公之大會風烟匝地車馬如龍鐘鼓沸天美人似玉芳筵交映旁徵豹象之胎華饌重開直抉蛟龍之髓季鷹之思吳命駕果為秋風伯鸞之適越登山以求淥水辭故友謝時人登鄂坂而迂回入邙山而北走何年風月三山滄海之春何處風花一曲青溪之路賓鴻逐暖孤飛萬里之中仙鶴隨雲直去千年之後悲夫光陰難再子卿殷勤於少卿風景不殊趙北相望於洛北鴛鴦雅什俱為贈別之資鸚鵡奇杯其盡忘憂之酒游汾勝壤樓船高漢帝之詞卜洛名都城邑辨周公之跡仰天文而窺日月雖共光華憑地理而考山川即殊南北韋少府玉山四照珠胎一色縱橫振鋒穎之才吐納積江湖之量子雲筆札擁鸞鳳於行間孫楚文詞列宮商於調下牽絲一命披林野而隨班考績三年指蘭臺而赴選移征駕背長亭地隔風烟人離歲月寒原冠蓋既同斟桂之歡歧路風塵即斷驚蓬之思下官詩書拓落羽翮摧頽朝廷無立錐之處邱園有括囊之所山中事業暫到漁樵天下棲遲少留城闕忽逢萍水對雲雨以無聊倍切窮途撫形骸而何託於時冰霜裂地星象回天朔風動而關塞寒明月下而樓臺曙各題一字傳之兩鄉云爾蔣山南望長江北流伍胥用而三吳盛孫權困而九州裂遺墟舊壤數萬里之皇城虎踞龍盤三百年之帝國關連石塞地實金陵霸氣盡而江山空皇風清而市朝改昔時地險實為建業之雄都今日太平即是江寧之小邑吳生俊寀輔佐烹鮮我輩良遊方馳去鷁梁伯鸞之遠逝自有長謠閔仲叔之遐征仍逢厚禮臨別浦枕離亭陳雲四面洪濤千里簾帷後闢竹樹映而秋烟生棟宇前臨波潮驚而朔風動嗣宗高嘯緑軫方調文舉清談芳樽自滿想衣冠於舊國便值三秋憶風景於新亭俄傷萬古情窮興洽樂極悲來愴零雨於中軒動流波於下席嗟乎九江為別帝里隔於雲端五嶺方踰交州在於天際方嚴去舳且對窮途玉露下而蒼山空他鄉悲而故人別請開文囿共瀉詞源人賦一言俱題四韻觀夫釋迦如來之垂迹也淨法界身本無出沒大悲願力示現受生洎兜率陀天為護明菩薩降迦毗羅國號一切義成金團天子選其家白淨飯王為其父玉象乘日示來於大術胎中金輪作王創誕於無憂村下八十種隨形之妙好粲若芬花三十二大士之相儀皎如圓月四方而各行七步九水而共沐一身現優曇花作獅子吼言胎分之已盡早證常身為度生以還來今垂化迹於是還羇襁褓示貌嬰兒為占相也悲悵於阿私陀仙往郊祀也驚起於大自在廟或為童子或學聲名為講武也箭塔箭井猶存為角力也象迹象坑仍在受欲樂於十歲現遊觀於四門樂沙門身厭老病死於是作瓶天子以警覺彰伎女之醜容淨居天王以捧持躍車匿而嚴駕逾春城於八夜栖雪嶺於六年人辭愴戀主之心馬舐落連珠之淚揮寶刀而落紺髮塔起天宮將袞服以貿皮衣形參山鹿叩林仙之所得了世定之非真食麥食酥降苦降樂且瑤琴奏曲必自中而曲成佛果圓因亦假中而果滿由是擇其處也過龍窟浴其身也入連河示其食也受難陀之乳糜示其座也受吉祥之茅草以最後之勝體詣菩提之道場圓解脫之深因登金剛之寶座一百四十功德不共二乘八萬四千法門高超十地由是魔軍威懾於慈力愁怖旋歸媚女敗毒於定心女羸變質於是堅牢地神踴躍而作證虛空天子展轉而報知類蓮花而出水赫煥無方若桂月以懸空光明洞徹經七日受提謂之蜜麨警以少小之言垂一音授賈客之代歸賜與人天之福既成佛已觀所化緣悲二仙而不遇雷音喜五人而堪從法化然以塵根昧劣聖智淵深順其法則法不應根順其根則根不達法莫不為愛河之長溺緣癡樂之所盲苟不利於當聞仍假言於入滅於是忉利帝釋雲驅於三十三天堪忍界王霧擁於一十八梵頭面作禮致敬專精請轉法輪勸隨宜說如來尋念善逝通規順古佛之嘉謨應㣥機之鄙欲於是十方佛現同興讚美之辭一法乘分共創塵勞之域由是起道樹詣鹿園三月調根五人得度憍陳如悟慈尊之首唱創解標名舍利弗逢馬勝以傳言於途見諦探菽氏繼踵以師事率門屬以同歸迦葉氏彙迹以降心領火徒而回席莫不甘露洪澍摩泥普應天界人界鸚林尸林或鷺池或鷲嶺或海殿或庵園或獼猴池或火龍窟或住波羅奈或居摩竭提或依堅固林或止音樂樹或海濱楞伽頂或山際補陀巖或迦蘭陀竹園或舍衛國金地或應念而空現或沒山而出宮或說法假於六方或化身變為三尺或掌覆而指變或光流而佛來或一身並普集於衆身或此界便明於他界或變淨而以淨覆穢或隨俗而即俗明真若空谷之答響洪鐘之待扣矣其間所說阿含四有般若八空密嚴華嚴佛藏地藏思益天之請問楞伽山之語心萬行首楞嚴一乘無量義大悲芬陀利法炬陀羅尼無垢稱之說經須達拏之瑞應本事本生之別諷頌重頌之殊象馬兔之三獸渡河羊鹿牛之三車出宅或謂之有空守中也或謂之無轉照持也或謂之頓也漸也或謂之半也滿也或無說而常說或不聞而恆聞或保任而可憑或加被而不忘無小而不大無邊而不中三乘同入一佛乘三性同歸一法性真可謂父母孩孺導師險夷懸日月於幽宵布舟航於幻海為雲為雨使枯槁以還滋為救為歸指窮途於壽域暨乎所作已辦功成不居將返本以還源類薪盡而火滅由是指力地詣金河光流面門相驚塵剎山搖地動俱興苦痛之聲異類變容同現奢花之血受純陀之後供納毗夜之密言唱四德以顯三伊指萬有而歸一性酬多羅迦葉四十二請問已周度須跂陀羅八十一化緣將畢破十仙之橫計使獲朝聞建四塔之崇規遐滋末葉將欲明有為之有滅表無相以無生上升金剛身往復虛空界日月其猶墜落螢光如何久留誡有常身使無放逸於是還登玉座首臥鶴林遍遊三昧之門將復一真之性逆入順入全超半超依四禪之等持湛三點之圓寂是時也人天呌躃鳥獸哀號飄風驟雲山吼波逆案輪王之古式方俟葬儀命力士以捧持竟無能動由是金棺自舉繞拘尸之大城寶炬不然駐闍維之盛禮莫不生怨在於王舍創結夢於十號慈尊大迦葉遠下雞峯獲瞻禮於千輻輪足畢以兜羅緻㲲聖火自焚爇王衆旃檀之薪注帝釋全瓶之水彼願力猶在悲心尚熏碎金剛之勝身為舍利之遺骨於是八國嚴衛四嶽肅容各自持於金壜競歸興於寶塔於是若牙若髮迦葉婆禮於忉利天宮或炭或灰無憂王建於贍部洲界若乃金言道在塵劫法存象王去而象子隨一燈滅而一燈續莫不大迦葉雲迎千衆阿難陀雷吼三輪商那表定於未來毛掬多化籌而盈室始自壞梁之感終乎流乳之徵瓶器異而水必同燈點殊而光終一是以大乘之真空妙有文殊彌勒異其宗小乘而分㲲㭊金上座大衆元其部或十支宏闡或千部鬱興馬鳴龍樹繼其宗無著天親播其美或提婆鑿眸而作器陳那吼石以飛聲或百偈齊祛於外宗或十師翊贊於遺頌或聞經而夜升兜率或待佛而窟寄修羅或劍誓首以要期或象䭾金而請釋或賞能而食邑或得勝而建幢或論般若之理也名燈或究俱舍之非也名雹莫不殊途異轍終會一源自有及空咸歸萬液自商周見虹貫炎漢夢金人教及神州聲流華夏勃叨生季世獲奉真談維陸續而以敘金言在飄零而不逢玉相見聞盡爾宗致昭然蓋委遺文不復備而言也乃為銘曰化起從本源功成應賢劫萬行顯真宗三祇積鴻業為法出於世降靈示分脅眉橫天帝弓目帶青蓮葉仙師相垂淚天神爭捧接灌頂當在宮飛輪化彌帖宗承天日貴象貫師子頰善教誰與傳抨彈獨豪俠遊觀驚老死逾城棄臣妾落髮親寶刀貿衣遇㣥獵寄跡狎麋鹿苦身示羸怯食糜人盡知坐草魔方懾潔若蓮出水明逾鏡開匣山海類高深雲雷等辭捷三時教彌闡萬類根自愜四問聊欲酬十仙度相躡補處記慈氏遺文囑迦葉臥樹徒再春香薪已焚㲲悲心及綿遠舍利光郁烈獨我生後時餘渡幸霑涉昔者聖人之作易也始畫八卦以通神明之德以類萬物之情以為分太極者兩儀也分四象者八卦也成八卦者十六將也司八卦者十二月也分十六將者三十二候也分十二月者二十四氣也分三十二候者六十四卦也司二十四氣者三十六旬也進退於三百六十六日屈伸於三百八十四爻往來飛伏之理盡矣孤虛消息之端極矣三才之道不可不及也五行之義不能復過也翕之以幽明張之以寒暑會之以生死申之以去就禍福生焉吉凶著焉成敗行焉逆順興焉賢者識其大者遠者不賢者識其小者近者奉之者則順背之者則圓立者稱聖偏據者號賢嘗試論之曰三才者易之門戶也八卦者易之徑路也引而伸之終於六十四卦天下之能事畢矣陳而別之極於三百八十四爻天下之微理罄矣夫陰陽之道一向一背天地之道一升一降故明暗相隨寒暑相因剛柔相形高下相傾動靜相乘出入相藉泯之者神也形之者道也可以一理徵也可以一端驗也故天尊則地卑矣水濕則火燥矣山盈則澤虛矣雷動則風適矣是以天下有風可以姤矣則地中有雷可以復矣天下有山可以遁矣則地上於澤可以臨矣天地不交可以否矣則天地既交可以泰矣風行地上可以觀矣則雷行天上可以大壯矣山附地上可以剝矣則火附天上可以大有矣風行水上可謂渙矣則水在地上可以比矣雷出地奮可以豫矣則風行天上可以小畜矣雷之與水可作解矣則風之與火可以家人矣雷在風上可以恆矣則風在雷上可以益矣風在地下可以升矣則雷在天下可以無妄矣風在水下可以井矣則雷在火下可以噬嗑矣風在澤下可謂大過矣則雷在山下可為頤矣雷在澤下可以隨矣則風在山下可為蠱矣澤上有水可為節矣則山上有火可為旅矣雷在水下可為屯矣則風在火下可為鼎矣水在火上可為既濟矣則火在水上可為未濟矣澤中有火可以革矣則山下有水可為蒙矣火在地下可以明夷矣則水在天下可為訟矣地下有水可為師矣則山下有火可為賁矣澤上於天可為夬矣則澤下有水可為困矣山下有天可以為大畜矣則澤下有地可以為萃矣山在澤上可為損矣則澤在山上可為咸矣澤上有火可為暌矣則山上有水可為蹇矣上天下澤可為履矣則地下有山可為謙矣澤上有風可為中孚矣則山上有雷可為小過矣山上有風可為漸矣則澤上有雷可以歸妹矣此天地以對成之義陰陽反合之理故卦相次則反爻以成義易之八卦是也八八相生則錯卦以興理因而重之是也故聖人之道可縱焉可橫焉可合焉可離焉逆而陳之未嘗逆焉順而別之未嘗順焉三畫以變雖天地之數可無韜也九六相推雖萬二千五百之浩蕩不能踰於三百八十四三百八十四之糾紛不能踰於六十四重之以六十四不能過於八卦張之於八卦不能過四象紀之兩儀兩儀之理達而太極得矣故古往今來寒進暑退死生亂動是非縢結未嘗非兩儀也而未嘗離太極也故曰有寒有暑則兩儀不廢也無思無為則太極未嘗遠也見之則動儀忘之則太極夫然故不捨二求一未嘗離動以求靜未嘗離動以達靜也有可有不可非聖人之謂也無可無不可是夫子之心也然天下之理不可窮也天下之性不可盡也有窮盡之地者其唯聖心乎有窮盡之路者其唯聖言乎故據滄海而觀衆水則江河之會歸可見也登泰山而覽㣥嶽則岡巒之本末可知也是以貞一德之極權六爻之變振三才之柄尋萬方之動又何往而不通乎又何疑而不釋乎故孔子曰必也正名乎名者義之本也非聖人孰能正之哉若抑末執本研精覃思非聖人之書則不讀也非聖人之言則不取也庶幾乎神明之德可通乎萬物之情可類乎未之思也夫何遠之有君子可不務乎哉論曰昔之列桐圭建茅土者非一君焉至於孝思可稱仁風茂著存乎緗牒十一而已豈非生於深宮之中長於婦人之手膏肓積乎驕慢情奔淪乎嗜欲鳴呼有國有家者可不誡乎論曰美哉貞修之至也或抗情激操杖清剛而勵俗或理韻和神抱直方而守道或旌奇表善擢才於不次之階或剖滯申嫌措辭於難犯之地並能以禮升降與時舒卷既明且哲以保其身盛矣哉原夫御俗裁風變彞倫者寄乎直全身遠害得隨時者存乎變夫然故進不違義退不傷生清貞靜一保其道委迤屈伸合其度易曰君子或出或處或默或語天下何思何慮同歸而殊途百慮而一致此之謂也論曰易稱觀乎天文以察時變傳稱言而無文行之不遠故文章經國之大業不朽之能事而君子所役心勞神宜於大者遠者非緣情體物雕蟲小技而已是故思王抗言詞訟恥為君子武皇裁出篇章僅稱往事不其然乎至若身處魏闕之下心存江湖之上詩以見志文宣王有焉論曰陰陽代興剛柔合運威恩參用以成化文武相資以定業况乎康侯自我宗子維城者乎城陽之權略明决卒摧呂氏之變任城之志意剛斷實啓有魏之業蓋有助焉陳思雅懷忠勇義形家國表奏永昌洞曉兵數績著疆場長沙武陵亦足云也論曰東平以盛德匡時大興禮樂齊獻以至親統物光濟中外淮陽安定峻必行之典安陸扶風深受遺之泣能義形家國理極忠貞使黃河如帶垂芳不朽盛矣乎守方雅以調蕃政用公直而掌朝論昂然直上凜有生氣衡陽太原亦足云也論曰前史稱良藥苦口而利於病忠言逆耳而利於行豈非士情竭於不顧主色期於難犯中人以下罕免斯纍其有抗辭必盡忠烈橫匪石之心聞善若驚君王動順風之請相須之際良可詠也清河之恭慎真懇雅為辭益上引聖朝下託師傅和矣哉論曰原夫重藝尊師登奇佇逸道存萬里神交一面故有推輪擁篲寡人忘千乘之榮越席分庭上才當四海之禮斯實蕃邸之盛事間平之用心也而有矯情役智蕩逸名利之間室隙蹈瑕乾沒英翹之地便僻脂韋飾其迹甘言巧辭運其辨假君王之顧盼用君王之威福傳曰好善而不擇人則前代有以之傾矣至於興諧文雅賞盡烟霞月庭廣闢風閨洞敞西園故事下蘭坂而宵歌東苑遺塵坐槐庭而曉賦折旋書藝之園翺翔儛詠之隙洋洋乎亦為樂之一方也論曰夫濫觴懸米翻浮天動地之源寸株尺糵擢捎雲蔽景之幹豈非積微成大陟遐自邇易曰山下有泉蒙君子以果行育德故考其前事備之於篇論曰夫陵谷好遷乾坤忌滿哀樂不同而不遠吉凶相反而相襲故有全中卒行用心於不爭之場杜漸防微投迹於知幾之地昔之善持滿者用此者也諺曰禍不入慎家之門前代有以之興矣至若中山激難重存親禮武陵變色復延情愛子建之陳辭貢憤長沙之發對因機雖亦各達其心未若洪慶之希聲也論曰詩云靡不有初鮮克有終若夫東平之奉憲遵約耿介原陵之奏中山之見賢思齊殷勤濮陽之託庶幾乎可謂慎終矣至子塵之奉行文處疑中尉之遠述河間陳思克已並未易誣也論曰漢自順桓之間國統屢絶奸回竊位閹宦滿朝士之蹈忠義履冰霜者居顯列則陷犯忤之誅伏閭巷則嬰黨錮之戮當是時也天下之君子掃地將盡雖九伊周十稷契不能振已絶之綱舉土崩之勢明矣熹平中大黃星見楚宋之分遼東殷馗曰其有真人起於譙沛之間以知曹孟德不為人下事之明驗也先時秦帝東遊亦云金陵當有王者興董扶求出又曰益州有天子氣從茲而言則長江劍閣作吳蜀之限天道人謀有三分之兆其來尚矣然廢興有際崇替迭來每覽其書曷能不臨卷而永懷撫事而伊鬱也嘗試論之曰向使何進納公業之言而不追董卓傕汜棄文和之策而不報王允則東京焚如之禍關右亂麻之尸何由而興哉至使乘輿蒙塵於河上天子露宿於曹陽百官饑死於牆壁六宮流離於道路蓋由何公之不明賈詡之言過也於是劉岱喬瑁張超孔胄之徒舉義兵而天下響應英雄者騁其驍悍運其謀能海內囂然於茲大亂矣袁本初據四州之地南向爭衡劉景升擁十萬之師坐觀成敗區區公路欲居列郡之尊瑣瑣伯圭謂保易京之業瓚既窘斃術亦憂終談尚離心琮琦失守其故何哉有大賢而不能用覩長策而不能施便謂力濟九區智周萬物天下可指麾而定宇宙可大呼而致也鳴呼悲夫余觀三國之君咸能推誠樂士忍垢藏疾從善如不及聞諫如轉規其割裂山河鼎足而王宜哉孫仲謀承父兄之餘事委瑜肅之良圖泣周泰之痍請呂蒙之命惜休穆之才不加其罪賢子布之諫而造其門用能南開交趾驅五嶺之卒東界海隅兼百越之衆地方五千里帶甲數十萬若令登不早卒休以永年神器不移於暴酷則彭蠡衡陽未可圖也以先主之寬仁得衆張飛關羽萬人之敵諸葛孔明管樂之儔左提右挈以取天下庶幾有濟矣然而喪師失律敗不旋踵奔波謙瓚之間羈旅袁曹之手豈拙於用武將遇非常敵乎初備之南也樊鄧之士其從如雲比到當陽衆十萬餘操以五千之卒及長坂縱兵大擊廓然霧散脫身奔走方欲遠竄用魯肅之謀然投身夏口於時諸葛適在軍中向令帷幄有謀軍容宿練包左車之計運田單之奇操懸軍數千夜行三百輜重不相繼聲援不相聞可不一戰而擒也坐以十萬之衆而無一矢之備何異驅犬羊之㣥餌豺虎之口固知應變將略非武侯所長斯言近矣周瑜方嚴兵取蜀會物故於巴邱若其人尚存恐玉壘銅梁非劉氏有也然備數困敗而意不折終能大啓西土者其惟雅度最優乎武侯既沒劉禪舉而棄之覩譙周之懦詞則忿憤而忘食聞姜維之立事又慷慨而言喜惜其功垂成而智不濟豈伊時喪抑亦人亡乃知德之不修棧道靈關不足恃也魏武用兵髣佛孫吳臨敵制奇鮮有喪敗故能東擒狡布北走強袁破黃巾於壽張斬眭固於射犬援戈北指踏頓懸顱擁斾南臨劉琮束手振威烈而清中夏挾天子以令諸侯信超然之雄傑矣而弊於褊刻失於猜詐孔融荀彧終罹其災孝先季圭卒不能免愚知操之不懷柔巴蜀砥定東南必然之理也文帝富於春秋光膺禪讓臨朝恭儉博覽墳籍文質彬彬庶幾君子者矣不能恢崇萬代之業利建七百之基骨肉齊於匹夫衡樞委乎他姓遠求珠翠廢禮諒暗之中近抱辛毗取笑婦人之口明帝嗣位繼以奢淫征夫困於兵革人力殫於臺榭高貴鄉公明决有餘而深沈不足其雄才大略經緯遠圖求之數君並無取焉山陽公之墳土未乾陳留王之賓館已啓天之報施何其速哉故粗而論之式備勸戒俾夫來者有以監諸焉
