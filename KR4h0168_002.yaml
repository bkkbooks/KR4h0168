  text: 全唐文欽定全唐文卷二高祖二
  hash: sha256:c22d9a4f0c766c7a789dd3f0dee5c5cf6cb78d8d81b5f2c015f45be25158df9b
body:
  text: 貴爵尚齒列代通規進秩優賢有國彞訓尚書左僕射魏國公寂太子少保新昌縣公綱左武大將軍陳國公抗太常卿沛國公元璹納言漢東郡公叔達內史令宋國公瑀兵部尚書蔣國公通戶部尚書滎陽郡公善果右武大將軍羅侯御史大夫滑國公無逸等或歷任前代職位隆顯或耆年夙望德邁老成翊戴經綸功績茂重或險夷契闊情兼惟舊並職司近侍任兼心膂恩禮所加義從隆渥特宜襃異俾越常倫寂巳下奏事及侍立令升殿朕承天明命撫育萬方康俗濟民無忘寢寐西蜀僻遠控接巴夷厥土沃饒山川遐曠往者隋末喪亂盜寇交侵流寓之民遂相雜撓游手墮業其類實繁敓攘矯虔因此而作王業伊始務從草創牧宰庶寮隨事遷易州縣分析權宜廢置然而王道未洽民瘼猶存靜言思之夙夜軫念澄源正本義在更張可令秦州總管鄻國公軌御史大夫滑國公無逸為益州道安撫大使宣揚朝典進擢廉平貶黜苛暴申理寃滯孝弟貞節表其門閭鰥寡孤獨量加贍恤事有便宜並委處分有隋失馭喪亂宏多民物凋殘俗化踰侈耽嗜之族競逐旨甘屠宰之家恣行刳殺芻豢之畜靡供肴核之資胎夭之㣥莫遂蕃滋之性傷財墮業職此之繇敓攘穿窬因茲未息禮曰君無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍非惟務在仁愛蓋亦示之儉約方域未寧尤須節制凋弊之後宜先蕃育豈得恣彼貪暴殘殄庶類之生苟循目前不為經久之慮導民之理有未足乎其關內諸州宜斷屠殺庶六畜滋多而民庶殷贍詳思厥衷更為條式五等列爵茂績超於恒典四嶽分官連帥總其常賦山河之賞義在酬庸方伯之任實資賢哲使持節和州總管和州刺史東南道行臺尚書令上柱國楚王伏威往因喪亂糾合徒旅綏靜淮濆緝寧江介閭閻安堵吏民率職遠稟朝化具申忠款仍請立功掃除多難誠節既表志識可嘉委以招懷特宜受命寵禮之序式加常秩可使持節總管江淮以南州諸軍事揚州刺史東南道行臺尚書令淮南安撫大使上柱國進封吳王食邑五千戶賜姓李氏附屬籍自隋室不綱政刑荒廢戍役煩重師旅薦興元元無辜墮於塗炭轉死溝壑暴骨中原宗黨淪亡邑居散逸墳隴靡託營魂無歸朕受命君臨為民父母率土之內情均亭毒一物失宜寢興軫慮念茲道殣義先弔恤雖復令巳頒下普遣葬埋猶恐吏不存心收葬未盡宜令州縣官司所在巡行掩骼埋胔必令周悉使郵亭之次無復遊魂窀穸之下各安所厝姬文惠化恩及枯骸庶踵於前此焉非遠朕發跡太原陳師汾澮底定皇室廓清函夏惟彼晉魏事等豐宛近者妖寇憑陵侵斥郊境害虐良善擁逼吏民大軍東討義存拯難芟夷醜類實在弔民凡厥渠魁巳就殲殄脅從之輩情有可原宜許自新義深蕩滌其晉州潞州隰州并州等四總管內自武德三年四月二十二日以前被劉武周宋金剛等所詿誤者罪無輕重皆赦除之各令復業一無所問州縣城堡有固守忠節抗禦凶徒者具錄聞奏別加襃賞取亂侮亡聖王於是致治民和衆泰湯武所以成功兵革之興義資靖難出軍命將蓋非獲巳自隋氏數窮天下鼎沸豺狼交爭黔庶凋殘朕受命君臨志存寧濟率土之內咸思覆育聲教所覃莫不清晏惟彼伊雒尚隔朝風世充作梗肆行凶暴害虐良善擁迫吏民反道亂常日月滋甚禍盈釁積天亡有徵心腹猜攜黨援孤絕農畝荒廢糧廩內空城隍社稷勢皆殄潰弔民問罪今實其時可令陝東道行臺上柱國秦王世民總統諸軍東踰崤澠分命驍勇百道俱進救彼塗炭誅其兇渠凡此授律義在拯民府庫貨財一無所利克寸敵制勝効策獻功官賞之差並超常典其有背賊歸款因事立勳即加寵授務隆優厚襃德敘功有國彞訓任賢賞善列代通規偽燕王高開道家本海隅志懷慷慨有隋之末州域彫殘招集徒旅自保邊塞繕修斥堠捍禦寇戎民吏肅清倉庫完實既而審達機變遠慕朝風闔境獻誠歸款內屬請申經略輯寧燕代厥功以茂宜從襃寵禮命之差用超常級可使持節蔚州諸軍事蔚州總管加授上柱國賜姓李氏上屬籍宗正封北平郡王食邑五千戶疇庸旌善哲王彞訓任賢使能有國通典胡大恩往因隋季夷狄交侵繕甲聚徒輯寧邊境既而阻隔戎寇自保方隅遠慕朝風因機立效摧破凶黨亭徼無虞抗䟽闕庭以申誠節忠義克舉宜隆寵命因其所統即加榮秩可使持節代州諸軍事代州總管加授上柱國封定襄郡王食邑五千戶賜姓李氏上屬籍宗正祝網泣辜彰乎舊典赦過宥罪著自前經往者劉武周竊據邊陲擁逼良善石嶺以北皆罹其弊雖復武周奔竄寄命蕃夷而殘黨餘氛尚懷旅拒致使朔漠猶警關塞未寧屢動干戈久違聲教代州總管定襄王大恩勤績允著安輯邊境討擊未賓率其從化朕君臨天下義存撫育念彼彫弊若納諸隍但朔方黎元逆命日久今雖歸附仍懷反側其代州總管府內石嶺以北自從武德四年二月二十九日以前所有愆犯罪無輕重悉從原宥可並令安居復業勿使驚擾緩刑議獄哲后彞訓解網泣辜前王茂軌朕君臨海內撫育黎元一物乖所納隍興慮其益州道行臺及夔州總管府衆務臻集統攝遐長囚徒禁繫其數不少或控告未申多有寃屈或注引肆志濫及貞良致使文案稽延獄訟繁擁念彼枉滯情深愍惻其益州總管內諸州委御史大夫無逸檢校夔州管內委趙郡公孝恭檢校所有囚悉令覆察務從寬小大以情但有負罪逃亡離棄鄉邑無問輕重悉令歸首明加勸導務修墾植庶使家給人足稱朕意焉聞獲建德竟如汝所料畫策者雖吾平定者汝也吾聞黃河千年一清乃當今日汝功一也隋氏分離崤函隔絕兩雄合勢一朝清蕩汝功二也兵既克捷更無死傷無媿為臣不憂其父汝功三也吾今開懷抱養蒼生盡其天年心無外慮汝功四也自隋氏失馭政散民流盜賊交侵區宇離析惵惵黔首俱被焚溺之災元元無辜並困豺狼之吻朕受天明命君臨八極克除暴亂大拯黎民聲教所覃無思不服惟彼趙魏尚隔朝風建德往因喪亂連㣥結黨竊州據邑擅置官寮叛渙一隅恣行凶虐朕愍彼河朔久遭塗炭納隍軫慮無忘興寢但以彫弊之後惡煩士衆且事含宏未先討擊然而遊魂放命數稔貫盈驅率犬羊圖為侵斥與王世充欲相救援輒來舉斧以抗大軍兵威所臨醜徒皆潰生擒建德囚致軍門凡厥支黨皆就虜獲歷年逋寇一舉廓清蕩滌遺民與之更始可赦山東諸州舊為建德詿誤者自武德四年五月八日以前皆赦其罪仍令太子左庶子鄭善果為山東道撫慰大使考功郎中李覲玉膳部郎中高正表為副存問民俗宣布朝章其有率衆全城因機立效者量其功績就加職任奇才異行隨事旌擢其亡命山澤仍為結聚詔書到後三十日不來歸首者復罪如初稽胡部類居近北邊習惡之徒未悉從化潛竄山谷竊懷首鼠寇抄居民侵擾亭堠可令太子建成總統諸軍以時致討分命驍勇方軌齊驅跨谷彌山窮其巢穴元惡大憝即就誅夷驅掠之民復其本業行軍節度期會進止者委建成處分朕初膺靈命撫育萬方一物失宜憂責在己是以昧旦丕顯昃食忘勞思流惠澤被於率土日者世充作梗僭擅一方侵虐士民阻絕聲教鞏洛之地比邑連城受制凶威莫能自勉翹足引領乞師請降朕愍彼黎庶獨為匪民命將出軍用申撫弔兵威所震醜徒慴伏元惡頓顙面縛軍門殄滅氛祲混同文軌拯彼烝民出乎塗炭宜從蕩滌與之更始可赦河南諸州舊為世充所詿誤者自武德四年六月四日巳前皆赦其罪若有率其部衆保城邑因事立功以歸朝化者量其效績就加職任奇才異行隨事旌擢鰥寡孤獨以時恤理亡命山澤詔書到後三十日不來歸首者復罪如初天生烝民樹之司牧光宅區宇撫字黎庶日月照臨文明於是統極雷雨作解順時所以布化往者隋氏代衰政刑廢缺九服雲擾五岳塵坌率土之民墜於塗炭瞻天蹐地控告無所朕愍彼橫流志存拯溺投袂鞠旅肇建義旗伐暴除殘克寧宇縣靈祇叶賛遐邇樂推景運所集祗膺寶位戡翦多難綏輯遺氓溥彼萬方情均覆育然而世充放命擾亂周韓建德遊魂虔劉趙魏害虐良善阻絕朝風言念匪民久罹凶毒滿堂之樂猶有向隅納隍之歎無忘旦夕是以出軍命將伐罪弔民宗廟威靈卿士效節旌旗所拂醜徒冰泮二凶授首萬方廓清車軌大同氛祲澄蕩邊解析烽燧無虞振旅休徒凱歌里忭今既九圍盡謐八表乂寧思與吏民勵精更始又惟寡德政道多違陰陽不調致茲亢旱深思惕懼震悼于懷解網崇恩宜流愷澤可大赦天下自武德四年七月十二日昧爽巳前大辟罪巳下巳發露未發露悉從原免自武德二年十二月三十日巳前亡官失爵者量聽敘用天下民庶給復一年其陝鼎函虢虞芮六州供轉輸之費幽州管內久隔寇戎給復二年身死王事量加襃贈律令格式且用開皇舊法孝子順孫義夫節婦所在詳列旌表門閭奇才異行隨狀薦舉高年惸獨量加贍恤三楚之地江山遐阻五嶺之表經塗遼敻自有隋失馭盜賊交侵聲教莫通方隅隔絕朕受圖膺運君臨區宇率土之濱情均撫字方今函夏寧乂文軌大同尉無虞要荒率職然而江蠡之泒咸阻寇戎閩禺之鄉未聞正朔左武將軍黃國公張鎮周大將軍合浦縣公陳知略二方首族早從歷任思展誠效輯寧州里鎮周可淮南道行軍總管知略可嶺南道行軍總管以安撫之今東應義旗西開幕府設官分職本在忠誠道士岐平定鏟迹求真銷名離俗恬淡榮利無悶幽閒而能徹損衣資以供戎服抽割菽粟以贍軍糧忠節丕嘉理須標授平定宜授金紫光祿大夫巳下並節級授銀青光祿大夫以酬其義擇善任能救民之要術推賢進士奉上之良規自古哲王宏風闡教設官分職惟才是與然而巖穴幽居草萊僻陋被褐懷珠無因自達實資選衆之舉固藉左右之容義自搜揚理宜精擢是以貢士有適爰致加錫之隆無益於時必貽貶黜之咎末葉澆偽名實相乖取非其人濫居班秩流品所以未穆庶職於是隳廢朕膺圖馭宇寧濟兆民思得賢能用清治本招選之道宜革前弊懲勸之方式加常典苟有才藝所貴適時潔己登朝無嫌自進宜令京官五品以上及諸州總管刺史舉一人其有志行可錄才用未申亦聽自己具陳藝能當加顯擢授以不次賞罰之科並依別格所司頒下詳加搜別務在獎納稱朕意焉使持節廬申二州諸軍事本州刺史方亮往因喪亂保據邑土識達事幾蚤歸朝化勳庸克著誠效達彰念此勤勞嘉歎何極今四方平泰九有廓清宜慰部人修營產業秋漸冷卿比平安好在否闕罪止凶渠詿誤脅從並無所問其有棄惡思順自拔而來隨即安置給其優賞咸使附業各令安堵雖賊之魁帥久同叛逆必能臨機效節因事立功並即敘勳班賞量才授任如其不從告諭敢懷迷執然後肅正軍法齊以大刑其陝西東道大行臺及山東道行軍元帥河南河北諸州並受建成處分其閒經略籌筭賞罰科條要在合機皆以便宜從事司典序言史官記事考論得失究盡變通所以裁成義類懲惡勸善多識前古貽鑑將來伏犧以降周秦斯及兩漢傳緒三國受命迄於晉宋載籍備焉自有魏南徙乘機撫運周隋禪代歷世相仍梁氏稱邦跨據淮海齊遷龜鼎陳建宗祊莫不自命正朔帛丿糸歷歲祀各殊徽號刪定禮儀至於發跡開基受終告代嘉謀善政名臣奇士立言著績無乏於時然而牘未編紀傳咸闕炎涼巳積謠俗遷訛餘烈遺風泯焉將墜朕握圖馭宇長世字民方立典謨永垂憲則顧彼湮落用深軫悼有懷撰次實資良直中書令蕭瑀給事中王敬業著作郎殷聞禮可修魏史侍中陳叔達祕書丞令狐德棻太史令庾儉可修周史兼中書令封德彞中書舍人顏師古可修隋史大理卿崔善為中書舍人孔紹安太子洗馬蕭德言可修梁史太子詹事裴矩兼吏部郎中祖孝孫前祕書丞魏徵可修齊史祕書監竇璡給事中歐陽詢秦王文學姚思廉可修陳史務加詳覈博採舊聞義在不刊書法無隱詩不云乎民亦勞止汔可小康自有隋失馭政刑板蕩豺狼競起肆行暴虐徵求無度侵奪任己下民困擾各靡聊生喪亂之餘百不存一上天降監爰命朕躬廓定凶災乂寧區域念此黎庶凋弊日久新獲安堵衣食未豐所以每給優復蠲減徭賦不許差科輒有勞役義行靜使務農桑至如大河南北離亂永久師旅薦興加之饑饉百姓勞弊此焉特甚江淮之閒爰及嶺外塗路懸阻土曠民稀流寓者多尤宜存恤此等諸處往隔寇戎自經開泰歲月未久猶恐士民積習不改前弊州縣官人未稱所委迎送往來尚致勞費其河北江淮以南及荊州大總管向西諸州所司宜便班下自今以後非有別勅不得輒差科徭役及迎送供承庶令安逸明加約稱朕意焉隋末喪亂豺狼競逐率土之衆百不存一干戈未靜桑農咸廢凋弊之後饑寒重切永言於此悼於厥心今寇賊巳平天下無事百姓安堵各務稱職家給人足即事可期所以新附之民特蠲徭賦欲其休息更無煩擾使獲安靜自修產業猶恐所在州縣未稱朕懷道路迎送廨宇營築率意徵求擅相呼召諸如此例悉宜禁斷非有別勅不得差科不如詔者重加推罰布告天下咸知此意端揆之職綜理百司任望斯重勳賢攸寄尚書左僕射魏國公寂風格清粹局量宏雅早預經綸元功特著變諧治本茂績以宣中書令宋國公瑀志懷忠確業履沖素歷居顯要厲精理術獻納惟允周慎有聞宣穆彞章允釐庶政寂可尚書左僕射瑀可尚書右僕射朕恭膺大寶克隆景祚永言孝思聿追罔極肇惟自昔葺宇舊居王迹所基積慶攸在桑梓之敬每懷踐歷日不暇給以迄於茲今既氛祲廓清區夏寧謐民休俗泰天成地平爰擇良辰言還邑里禮同過沛事等歸譙故老咸臻族姻相會肅恭薦享感慶兼集思俾歡心逮於衆庶愍茲幽滯有懷寬澤都輦之地宗祏所居祚固萬邦義越常等時惟孟夏方申長育宜順天心宣茲惠澤可曲赦京城內繫囚見徒及被推問應集之人死罪巳下並從放免其內有於政切害情理難原者宜降死從流有隋喪亂區宇分離百姓凋殘弊於兵甲田畝荒廢饑饉薦臻元元無辜墮於溝壑朕膺圖馭極廓清四海安輯遺民期於寧濟勸農務本蠲其力役然而邊鄙餘寇向或未除頃年以來戎車屢出所以農功不致倉廩未登永念於茲無忘寤寐今既風雨順節苗稼實繁普天之下咸通茂盛五十年來未嘗有此倉箱之積指日可期時為溽暑方資耕耨廢而不修歲功將闕宜從優縱肆力千頃其有公私債負及追徵輸送所至處且勿施行尋常營造役使工匠事非急要亦宜停止見在囚繫事未決斷傍引支證未須追攝百司常務並宜且停內外官人行署以上量事分番皆盡九月三十日其軍機急速及盜賊之事不在停限州縣牧宰明加勸導咸使勠力無或失時務從靜以稱朕意禁暴輯兵昔王於是致治亂常干紀有國所以明刑東南道行臺尚書左僕射上柱國輔公祏本自凡伍素無藝用往因擾亂連結徒旅與吳王杜伏威同心協力保據江淮早率數部遠歸朝化錄其功效授以官爵任官方隅榮寵兼至不能勵身奉上克保名節遂乃包藏禍心圖為不軌自伏威入朝之後公祏恣行專擅違犯朝憲不顧典章徵斂穀帛掠奪子女肆其殘忍妄行誅殺驅役士民招聚奸盜毒流衆庶怨結遐邇國家務存含養未申刑罰每加懲誡冀其自改今乃稱兵內侮假相署置驅扇蟻徒敢行抄竊惟彼兇逆速宜勦定命將授律義在安人巳令天策上將太尉領司徒尚書令陝東道大行臺雍州牧領十二衞大將軍上柱國秦王世民為江州道行軍元帥統率驍勇風驅電擊麾斾所臨當即奔潰凡此罪惡止在魁渠脅從之徒一無所問縱有巳陷賊黨非其本心拔難而來因立功効此等之類皆從官賞江淮以南比遭毒螫吏民困辱各不聊生平定之後普給優賞即令撫慰各令安堵勳賞之科具如別格宜明宣布咸使聞知
