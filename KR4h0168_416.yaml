front:
  text: 全唐文欽定全唐文卷四百十六常袞七
  hash: sha256:7e4bc8c7a6315522a94c698657a5375a7c3ea9f6a352788fc196982707382843
body:
  text: 臣某言中使王開諫李重芝等至伏奉敕旨送吐火邏王子并曹義臣家口共四十四人配漳泉等州安置伏聞大破凶醜收復涇州梟斬帥劉元等傳送闕下餘黨悉降西陲底定凡在臣庶不勝慶悅臣聞聖人有作神契必先用彰睿謀小有邊患以威天下大告武成因茲斬闕罔不率俾伏惟聖神文武皇帝陛下德合天地明罰以法雷霆道符炎黃有征以懲姦宄蠢茲狂狡敢拒封圻梟獍之心不知恩愛豺狼之性輒肆傷殘聖慈以元造曲成神武不殺時寬嚴旨頻許自新益用恣睢竟無悛革然夏后之征扈氏召六卿以龔行周文之伐密人示萬邦以整旅咸在侯甸之內亦效訓誓之勤於是我伐用張親授經略而執迷不復雖困猶鬬暫假游氛尚稽靈誅皇赫斯怒天威振耀簡車馬以大閲命將帥以長驅飛舞梯衝瞰臨壁壘凶徒悚栗義士激昂梟懸渠魁檻送支黨上以告清廟下以布遐方人神豁憤朝野大慶百二之塞外虞解嚴十萬之師餘勇可息則日月所照敢不來庭戎夏大同期於指掌臣謬承重寄喜萬恆情無任慶躍之至謹奉表陳賀以聞臣某言伏以補闕姚南仲和士幹等上封事恩命特與改官及進階兼賜章服又內常侍吳承倩奉宣聖旨令兩省供奉官數論得失無有隱諱者德音霈然公讜知勸㣥情震喜中朝動色易曰感人心而天下和平今之所感可謂深矣臣謬當丞弼之任不能有所啓聞踧踖自慚惶汗失次然以聖德之宏納天聽之宏博欣奉踴躍不勝大慶臣聞從諫則聖帝之德也有犯無隱臣之分也故上聞逆耳之忤受而不疑下有殺身之益死而無悔禮曰天子齊戒受諫又曰近而不諫則尸利帝道莫盛於有虞書之美舜則曰嘉言罔攸伏萬邦咸寧王道莫過于有周詩之頌文則曰思皇多士惟周之楨漢家雜之以霸亦詳延極諫訪求得失國朝稽合皇道肇修人紀貞觀故事布在典章危言正論聞於天下陛下以欽明御歷紹休祖業仁聖廣大天覆地容求賢進善有如不及每覽㣥臣奏議日旰忘勞穆然嘉納不令夙退順顏者必遠忤旨者必容而芻蕘之可擇庶藜藿之兼採少有所補從之如流雖委輅論都即日西行伏車頓首路回乘輿方之於今未云其速而又渙發宸旨宣導近臣直言者賞之於朝罷奏者責其所職以明沮勸大悅人心則太平雍熙之化溥將四表矣可以動天地可以服戎夷雖上古至理納諫達聰坦然不諱未覩今日之盛也望請宣付史官光垂帝録臣職任潤色敢揚鴻休無任欣躍之至臣言今月二十六日得太清宮道士陳嶽等狀稱聖祖殿院東廊九靈門北有奈樹連理異枝還合者臣按漢武元狩元年得奇木枝旁出輒後數日越地及胸奴率衆來降者中興書云王者德澤純洽八方大同則木連理伏惟皇帝陛下體元以臨寶位法道以御太和孝通神明故祖宗禔福德合天地則草木呈祥至孝所感生靈遂性湛恩既溥異類懷仁大告休期纍彰嘉瑞況我祖太清別殿奇樹效珍連理雙莖混成一體其同本也所以繁於衆枝其附內也所以慶於無外必有削衽之類亦表其強幹之休天下一家本支百代稽于圖傳可以明徵聖敬所臨神心允答不然豈獨秀不遷之廟增華太素之宮曲折合符精靈相會耿光丕貺高映古今臣愧無黃老之術謬贊清虛之化獲奉休異喜萬恆情望請宣付史官編之簡冊無任欣抃之至謹奉表陳賀以聞臣某誠歡誠慶頓首頓首臣等言伏見兵部尚書中書門下平章事李抱玉進芝草嘉禾者臣聞王者道洽則靈芝生天下和一則嘉禾應伏惟陛下誕膺景命憂濟生靈合太上之德感元精之氣天地氤氳神明滋液降此珍物叶於昌期垂蓋連莖三華煥發離根合㯋一穗孤秀沐我渥澤扇其祥風衆草之英百穀之長以兆稔歲以符太平昔周得唐郊之獻列篇於典策漢獲甘泉之祉薦歌於清廟三瑞之極一朝會同長發其祥無疆之慶臣等謬忝近侍幸覩休祥欣忭之情倍萬恆品無任歡忭之至臣某言今日中使吳承倩至宣示宋汴節度使御史大夫田神功所獻芝草一株紫蓋黃莖叢生者天生神物王者嘉瑞奇秀之狀靈篇未書伏惟陛下孝通神明德至草木和氣所感禎祥屢彰煌煌靈芝郡國來獻垂以金蓋發其瓊葩爛然紫雲之色灼然紅蕖之秀土德斯應皇家永昌固可寫狀圖牒薦于郊廟祗奉天意贊揚鴻休臣等獲覩殊祥喜倍恆品無任慶抃之至臣等伏以西京櫟陽縣有泉水於平地湧出潔誠飲者痼疾咸痊稽之圖牒是曰醴泉臣聞和氣上感湛恩下浹則有休徵以彰至化近在雨金之地特啓英泉之瑞無源獨湧平地滂流當神明之積高表陰陽之不測其氣香潔其味甘醇抱華清而蕩邪資靈化以除穢積年之疾一飲皆愈挈瓶而至重趼相望日以萬計酌而不竭齊莊之誠益厲神達之效愈彰伏惟陛下宏父母之深仁納黎元於壽域感此靈液助其生成疾苦假除夭昏不作勿藥有喜愛人斯甚可以見天地之心可以明帝王之德昔唐堯至聖光武中興沛然發祥千歲一覩啓我昌運居然合符鴻休無疆天下慶幸臣等謬司近密喜倍常情無任欣慶之至臣等言今月日內侍董秀至宣進止文丹國王來朝并獻白象十一頭者臣聞春秋二百四十年不紀祥瑞而載異國之朝其在周書亦美西戎之獻蓋重其德化及遠天下大同也伏惟陛下以致敬事天地以致孝奉宗祀武功以定大難文德以懷遠人故舊典未載之邦前王不賓之長聲教所隔言語莫通悠悠南溟幾千萬里瞻望中國知有聖人踰海而來歷年方至紳冒重阻奔波載馳黃帔飾冠白璫玩耳伏柔㣥象牽置闕前低回馴擾稽顙屈膝隨萬國而來庭與百獸而率舞如知禮樂之節益盛羽儀之容有以彰仁化元通淳源洽暢至和大順以兆昌期事軼於軒轅跡超於漢代矣臣等謬塵樞近獲覩鴻休伏請宣付史官光昭簡冊無任慶抃之至臣某言今日內常侍吳承倩宣恩命示臣咸陽縣所進白鼠臣聞王者將致無疆之休必有非常之應臣竊謂鼠者陰類四夷之象白者金精西方之色以西方陰類受制於近郊得非諸戎有納款之誠中國啓受降之兆也伏惟陛下俯憂黎獻控馭蠻夷能以禮綏孰云力競而晝伏夜動時擾於封疆乘障安邊尚勞於師旅今天且悔禍戎將感恩方委貢於蠻邸遂呈祥於甸邑干戈既息已有明徵鳥雀之來多慙遠瑞臣等忝居近侍獲覩禎符歡抃之誠倍萬恆品臣聞夏歷其昌羿何逃罪漢維既振莽亦伏誅伏惟皇帝陛下恢正皇綱光膺帝業日月照其明略雷霆發其英斷拯橫流而方割撲燎火之已焚頃者胡羯亂常崤函失守暴殄天物憑陵帝京上皇興避狄之仁陛下有蒙塵之難賴宸衷果決睿算昭宣憤陵寢之樵蘇悲黎元之塗炭必將嘗膽誓使然臍不有殷憂何以啓中興之盛業不有患難何以彰撥亂之英哲步自郇邠至於朔漠撫巡城邑招致甲兵誥命俯臨三讓而登九五師徒走集一呼而踰百萬設壇拜將虛左迎師臨朝有木惕之容率土下哀痛之詔六軍之號令既肅萬人之賞罰且明湯火不辭矢石何懼及清秋戒節太白方高爰整軍容順乎殺氣龔行天罰掃彼妖氛千里貔武之營百里龍蛇之陳沸若雲海聚如雪山壘揭終峯塹回渭水闞軍聲而邱陵簸蕩煬兵氣而天地晦冥蠢茲凶徒猶敢旅拒鼓譟白刃來聚犬羊之㣥旗靡黃塵旋就鯨鯢之戮渠魁不漏噍類無遺枝梧者面縛中軍顛背者頭懸後殿敗符融於肥水自可慙功破王邑於昆陽未云快意遂封尸於京觀旋振旅於王城啓闢千門掃除九陌祓羶腥於宮闕洗毒螫於閭閻耆艾歡迎久思周德衣冠雨泣還覩漢儀謳吟變噢咻之聲氣象回嚴凝之慘廓丹霄以瞻羽衛肅黃道而復鑾輿正寶位於北辰道光主鬯迎上皇於西蜀歡展奉親永惟宗社之靈實荷乾坤之慶臣忝陪宗室喜萬恆情無任踴躍歡抃之至謹奉表陳賀以聞臣某言今日伏見劒南西川節度使崔寧所奏露布十一月七日於劒南大破吐蕃斬首八千五百級生擒九百四十二人獲馬牛器械以千萬計者陛下以西戎負恩連歲設備近興武旅遠鑠王師故隴上或虞卭南每捷事同符契謀動鬼神凡在臣庶不勝慶快伏以西蜀一隅犬戎乘隙聖謀潛運藩帥龔行以我同力出其不意故得邊兵無遺鏃之費狂寇有輿尸之凶名王首將既充俘馘要塞堅城亦入封守神武之德莫測掃除之勢足徵天聲一臨風動萬國則方隅不擾候我綏懷夷夏大同期於指掌臣等覩茲大捷愧乏嘉謀慶躍之誠實倍恆品臣某言中使某至示臣山南西道露布破吐蕃高安堡五百人又生擒堡使等七人又破急援兵馬二千餘人者大獲帥長驅其畜牧焚其資儲夷其堡隊獲覩慶捷喜倍恆情臣伏以秋成以來㣥帥宣力陛下皆先授方略合如符契以蕃醜東寇猶窺疆場受命獻恭掩征巢穴允膺密旨精擇奇鋒行於險中出其料外遂使恃固之壘遽復於隍將領之渠盡襟其甲猶不悔禍更招援軍以犬羊恃衆之㣥當貔武輕齎之旅雖終日猶鬬殲耗相仍而乘夕盡逃覆亡不暇聖謀方舉西候遂寧神算既行北郊以靖遠周萬里之外俯料四夷之情中詔是闕所征皆捷苟承成命皆可指期故卭道拜章於前漢池拜章於後復留睿略更布新書軍中皆必勝之師天下無不賓之虜臣幸參樞近更乏嘉猷拜舞失容以慙以賀臣某言中使某至奉宣某月日敕承嗣本輔逆臣罪當參夷陛下垂包荒之德開自新之路假以台袞冀其悛革豈謂豺狼之心飽而增凶動搖鄰境慢易君命天下臣子雖扼腕攘臂願食其肉畏懼陛下不敢自發今陛下殷然震雷霆之怒下誅購之令戴髮橫目莫不憤激臣受國恩守在遠藩不得驅策駑蹇列於將臣巨猾之首竟為他斷撫劒慙恥心魂馳越臣又知鯨鯢既盡蜂蠆自滅陛下垂衣裳以臨萬邦無為之政行同大舜無任慶快感憤之至臣某言今月中使某至伏蒙聖恩宣示山南西道節度使檢校工部尚書張獻恭所奏露布破岷州吐蕃十萬餘衆生擒百餘人并獲牛馬及燒焚賊倉庫甲仗並盡者伏以吐蕃背恩負約屢擾邊陲惡稔禍盈自招喪敗聖謀潛運克寸捷相仍自秋以來制勝非一頃則收功朔北今又獻凱山南皆陛下指授規模克寸期進取遂令銜命之將感義之徒服順爭先奉詞掩襲未鼓而收城壘既戰而殲寇戎策備火攻威同電掃回軍乘勝又破柘川殺獲追擒不可勝數嘯聚之黨今已戮除噍類之餘自當殄滅廓清右地計日可期斯實皇威遠覃睿略先定動罔遺策舉必有功臣謬踐台陛親承睿算無任踴躍之至臣某言臣親奉聖旨伏承御膳過時微似煩熱臣等退用兢悸不安寢興齊居潔誠思獲休問適中使吳承倩至奉宣德音今已校退卿等不須憂者恭承睿旨俯協歡心欣抃失容蹈舞不足伏以陛下裁成二氣聽斷萬方每積憂勞載勤宵旰所以下祈人命上黷聖躬責在微臣退增兢懼今溽暑過候涼秋戒期方目力穆清上滌元慮伏惟簡臨庶政保合太和以答天地穰穰之福以慰臣子禺禺之望天下幸甚無任喜慶踴躍之至臣等言今日董秀奉宣文成殿御功德佛放光明六宮及諸王公主并近侍等並觀其光從三更四點直至四更猶在臣聞明主之理本以庇人大聖之教先於及物合若符契感而遂通伏惟陛下以道法天以心證佛措六合于無事納㣥生于慶門薰然慈心在宥天下滌慮恭默齊于穆清以四海之尊勤三乘之法故得大雄應見變化無方毫光破昏金殿如晝照恆星而奪彩混圓魄而一色曠代之瑞天人咸覩玉漏將盡銀河以低仰光明而無際知皇劫之彌遠臣等謬忝樞近倍萬恆情無任慶抃之至臣某等言中使吳承倩至奉宣進止以臣等所奏華陽公主初薨聖慈深悼抑情復膳保御至和伏惟陛下初以愛主幼沖純性聰敏恩念之厚有過於成人疾病之憂非止於一日早齡遽失流痛兼哀臣等不安下情惶懼上請微誠感達蒙降德音而不以至愛之私忘於所寶之重推必然于大分割無益以遣懷用復常禮以勤庶政此則陛下齊親疏於一致宏覆燾于萬邦契聖祖元元之符實天下蒼生之福臣等纍日兢怖焦心失圖承命釋憂倍常慰幸無任感悅之至謹奉表陳賀以聞臣某言臣聞葵藿何稟猶每傾陽犬馬無知尚能戀主伏惟陛下回鑾巴蜀指斾咸秦萬乘雷奔經劒門之險阻六宮雲從歷棧道以崎嶇恐天步有厭於登臨聖躬暫勞于行幸稍移玉輦將至金牛漢水梁城郡當所守蜀門秦塞路則居中乃微臣厠侍從之時宜陛下休羽儀之地伏望小停仙蹕寬一日之程暫奉宸居喜千年之遇臣忝陪宗室得備藩條懇款之情倍萬恆品無任攀戀屏營之至奉表陳情以聞臣某等言今月某日伏奉批詔以臣所請復常膳御正殿未賜允許者臣等恭承詔旨竊仰聖謀以為前史所垂正言可取則應天動人之事實哲王致理之先然臣伏思陛下繼體以來推誠必至友愛之道顯教萬方惻隱之心罔遺一物於王師致討司寇用刑率皆毒被蒸人罪興衆怒救殘虐之極弊懲悖亂之元凶而後效順立功報之爵祿勞心焦思痛在瘡痍屢降德音勤行王道得非應天以實而動人以行哉況謫見之後戒懼不遑朝野所知星辰所照則大官進御路寢燕居既舉舊章將踰期月固可以特開睿鑒俯循㣥心理且叶於至公事兼存於大體臣某等謬居宗緒敢貢飾詞盡布腹心復干宸扆無任仰望兢越屏營之至臣某言伏奉以華陽公主攝和稍乖思念所切齊宮親禱輟膳終朝臣等下情不遑寸刻竊以經時之疾變節或加分至所臨晦明異狀漸過其後旋即如初頃嘗驗之多亦然矣陛下以海內之衆子育寧殊豈天屬之間皇慈獨軫伏願忘懷淡慮常膳以時保安聖躬用慰臣下屬茲煩暑尤切懇誠謹奉表陳露以聞無任兢惶迫切之至臣袞言臣先患腰膝比成積疾自從趨侍漸覺痊除每屬陰寒即微發動近加秋冷轉不支持半身風痺右足拘急謂其冷甚因以熱攻遂覺頭旋兼之眼暗寒溫相觸調息實難伏蒙聖慈特賜醫藥殊造至深灰粉酬恩未申萬一生成之功雖則頓瘳積久之癥固難速效沈綿增劇憂懼失圖先因入湯常愈斯疾漸逼冬候今正其時伏望天恩許臣就湯將息駑駘蹇步冀效驅馳螻蟻微誠庶回昭鑒無任懇迫之至謹奉表陳乞以聞臣某言臣纂承丕圖懼忝鴻業宵衣旰食寅畏增深未戢難于寰區恐獲戾於宗廟明發惕厲祈哀聖靈夢寐承顏如親左右謂臣曰知爾孝敬憫臣而降以恩私福及沖人祐其後嗣德音所誨歎息如聞睿旨慈仁再三眷命追攀不逮哀慕難任欲報之恩昊天罔極無任荷恩摧咽之至謹奉表陳謝以聞臣某誠悲誠喜頓首頓首謹言
