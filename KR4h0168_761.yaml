front:
  text: 全唐文欽定全唐文卷七百六十一涯太和朝官司勳員外郎
  hash: sha256:7be70fd8bb4e71763079a06866a8b45dd08d6558c0e2d3fdbbe1d6328e84d123
  markers:
  - {type: head, offset: 14, content: 鄭涯, id: KR4h0168_NFKB_761-h1, level: 1}
body:
  text: 會昌六年五月禮儀使奏武宗昭肅皇帝祔廟并合祧遷者伏以自敬宗文宗武宗兄弟相及已歷三朝昭穆之位與承前不同所可疑者其事有四一者兄弟昭穆同位不相為後二者已祧之主復入舊廟三者廟數有限無後之主則宜出置別廟四者兄弟既不相為後昭為父道穆為子道則昭穆同班不合異位據春秋文公二年躋僖公何休云躋升也謂西上也惠公與莊公當同南面西上隱桓與閔僖當同北面西上孔穎達亦引此義釋經文賀循云殷之盤庚不序陽甲漢之光武上繼元帝晉元帝文皆用此義蓋以昭穆位同不可兼毀二廟故也尚書云七世之廟可以觀德且殷家兄弟相及有至四帝不及祖禰何容更言七代於理無疑矣二者今以兄弟相及同為一代矯前之失則合復祔代宗神宗於太廟或疑已祧之主不合更入太廟者案晉代元明之時已遷豫章潁川矣及文即位乃元帝之子故復豫章潁川二神主於廟又國朝中宗已祔太廟至開元四年乃出置別廟至十年置九廟而中宗神主復祔太廟則巳遷復入亦可無疑三者廟有定數無後之主出置別廟者按魏晉之初多同廟葢取上古清廟一宮尊遠神祗之義自後晉武所立之廟雖有七主而實六代蓋景文同廟故也又按魯立姜嫄文王之廟不計昭穆以尊尚功德也晉元帝上繼武帝而惠懷愍三帝時賀循等諸儒議以別為主廟親遠義疎都邑遷異於理無嫌也今以文宗棄代纔六七年武宗甫爾復土遽移別廟不齒宗祖在於有司非所宜議四者添置廟之室案禮論晉太常賀循云廟以容主為限無拘常數故晉武帝時廟有七主六代至元帝明帝廟皆十室及康穆二帝皆至十一室自後雖遷故祔新大抵以七代為準而不限室數伏以江左名儒通賾覩奧事有明據固可施行今若不行是議更以迭毀為制則當上不及高曾未盡之親下有忍臣子恩義之道今備討古今參校經史上請復代宗神主於太廟以存高曾之親下以敬宗文宗武宗同為一代於太廟東閒置兩室定為九代十一室之制以全臣子恩敬之義庶協大順之宜得變禮之正折古今之紛互立㣥疑之杓指因心廣孝永燭於皇明昭德事神無虧於聖代夫禮經垂則莫重於嚴配必參損益之道則合典禮之文况有明徵是資折衷伏自敬宗文宗武宗三朝嗣位皆以兄弟考之前代理有顯據今謹詳禮院所奏並上稽古文旁摭史氏協於通變允謂得宜臣等商議請依禮官所議處誨字廷美贈僕射澣子太和八年進士累遷工部刑部侍郎出為浙東觀察使檢校刑部尚書宣武軍節度使勅儀曹劇任中臺慎擇總百郡之俊造考五禮之異同必求上才以允僉屬中散大夫尚書工部侍郎鄭薰高陽茂族通德盛門秉莊氏之遺風蘊名卿之品業文諧騷雅鼓吹前言譽洽搢紳領袖時輩操守必修其謙柄進退常踐於德藩㬪中詞科亟升清貫持橐列金華之侍揮毫擅紫闥之工貳職冬官克揚休問是用俾司貢籍以振儒風朕以化天下者莫尚於人文序多士者以備乎時選育材之本惟善是從搴拔既尚於幽貞聳勸勿遺於曹緒無求冠玉無採雕蟲當思取實之方必有酌中之道爾其盡慮以率至公可守禮部侍郎邠為古國其俗質而厚其人樸而易理業尚播種畜擾有后稷公劉之遺風始皇并天下地屬右輔後漢析為新平郡後魏改置豳州國朝因之開元中詔以豳幽為疑因改為邠天寶已前太平歲久西通伊涼萬里而遠邠實為近郡申王薛王以親賢之責居之太尉房公以盛德之重居之洎逆胡勃起幽朔西戎塵坌蕩湧乘艱難際盜據河右蕃兵去王城不及五百里邠由是為邊郡斥候近郊鎮要害大歷中尚父汾陽王始以朔方軍壯其威容後益選武勇驍健有膽決奇謀者繼之今天子三年西戎款關獻河湟數州故地西鄙益拓邠為近蕃上念兵戎方息邊備愈遠始詔司空白公由丞相府持節來鎮丞相功成繼命文雅忠恕之風煦然而起邊人若寢寤拭目心意蘇醒始知禮讓文化之為急務廷議以我季父尚書公前為夏帥夷甿乂安寇盜弭息儲廩果實兵械果完懋賞休績遷鎮是軍季父又以理夏之政移之於邠邠人嬉嬉薰為太和嘗覩屋壁志前帥是軍者之名氏因曰曩之帥此者豈不知是耶始務公車而角材堅壘未暇及此爾吾既承數君子大理之後敢不勤督吾之未至者况今戎醜既夷不宜獨以鳴鼓鼙教擊刺為事因命疏自開元以來刺是郡帥是軍者追書於屋壁季父尚書公曰吾思將有以警於吾前警於吾後者邠之土實婦人無桑績不能自衣朔方之軍雄男子勇於公戰無他業以自厚故郡之人以耕稼為事軍之卒以勇敢得賞後之撫於人者宜勉農畝時其徵調人不擾而完富矣帥於軍者宜嚴其刑賞時其衣食卒不驕而勇敢矣人既完富卒既勇敢生聚之訓練之吾知青海之西不數年為內郡矣命處誨記其始終序於前後處誨謹以季父之言志於後將允於後之人俾無怠大中二年三月二十日記華州刺史宿孫舉進士官兵部尚書伏以班位等差本係品秩近者官兼臺省立位稍遷頗紊彞制理亦未通今據臺司重舉元和元年所奉勅常參官兼大夫中丞者准檢校官立在左右丞之上者承前列曹侍郎兼大夫者至少准京兆尹往往帶此官其京兆尹是從三品至今班位只在本品同類官從三品卿監之上在太常宗正卿三品之下其尚書左丞是正四品上戶部侍郎是正四品下今戶部侍郎兼大夫只合在本品同類官正四品下諸曹侍郎之上不合在正四品丞郎之上與京兆尹在正三品卿監之下無異又據尚書右丞是正四品下吏部侍郎是正四品上今吏部侍郎班位在右丞之下蓋以右丞官居省轄職在糾繩吏部侍郎品秩雖高猶居在下推此言之則左丞品秩既高又處綱轄之地戶部侍郎雖兼大夫豈可驟居其上今據散官自將仕郎上至開府特進每品從上下名級各異則從上下又不得謂之同品今取於理近者用以比方今京兆河南司錄及諸州錄事參軍皆操紀律糾正諸曹與尚書省左右丞紀綱六典畧同設使諸曹掾因其功勞朝廷就加臺省官立位豈得使在司錄及錄事參軍之上施於州縣尚謂非宜况在朝廷實為倒置且尚書左丞自置此官職業至重按六典得彈射八座主省內禁令及宗廟祠祭之事御史糾刻不當得彈奏之豈可不究是非輕為措施今臺司所奏但言往例曾不揣摩事若循理雖無往例亦合遵行事若非宜雖有往例便合改正今據元和元年臺司所奏勅戶部侍郎兼大夫班位合在兵部侍郎之上在左右丞吏部侍郎之下今若因循往例不改正遣戶部侍郎兼大夫位在左右丞之上則京兆尹兼御史大夫班位合在太常宗正卿之上不惟有紊典章實恐重違元勅謹具貞元二年以後勅旨如前伏乞重賜參詳庶合事理准赦書節文量縣大小各置本錢逐月四分收利供給不乘驛前觀察使刺史前任臺省官等晉慈隰三州各置本錢訖得絳州申稱無錢置本令使司量貸錢二百貫充置本以當州合送使錢充伏以蜀蔡之功實皆超卓勳力雖等艱危則殊高崇文憲宗御宇之初朝廷討叛之始雷霆斯赫物力方全劉闢起參佐而為凶魁行惡者勢同烏合崇文統百萬而命㣥帥起行者理足鷹揚所以嚴道雖深劒門不能恃其固汚俗未久刀州莫與結其恩大勳誠集於忠勞作孽本無其根據此崇文所以不辱專征之寄克成定蜀之勳至於李愬之所立適當伐蔡累年旁有包荒數鎮元濟襲父業而成邪計凶黨皆為其致命同惡懼齒寒而為陰援軍須必從以有資是故垤窟益深毒爛不誅愬於此時獨能善貸行權竄謀沈斷跳驅閒道乘凌堅壁不俟拔幟而坐失金湯未暇請纓而已纍俘虜斯實軍鋒之冠萬夫之將由是言之伐蜀當專征之始衆銳且同於楚金攻蔡承連兵之餘㣥疑頗同於魯縞及成功而雖一在出奇而尤高昔者光武比耿弇於韓信優之獨收勍寇今陛下令臣等挍崇文與李愬之功迥出等夷儻聖慈以格言所著德宜有鄰武功之中功皆難掩則愬居第一崇文次之庶盡公言上符詔旨伏以憲宗皇帝元德英猷邁越千古神機睿算恢復四方始者既戮惠琳連誅闢錡睿求良輔果集大勳乃覆淮蔡之妖巢大芟河朔之餘孽皇威震耀寰宇和寧偃武修文幾無遺事陛下崇嚴享禮爰軫孝思將舉元勳以顯丕績臣等伏思故司徒兼中書令贈太師裴度天縱忠公道施康濟始處司言之任屢陳憂國之誠常因別召深得聖旨乃貳邦憲使於藩方處嫌疑者悉付心誠懷顧慮者必得要領俄登相位專任大事遂乃擒元濟梟師道承宗効順劉總叩頭程權來朝同捷就戮蓋憲宗有知人之明而度盡致君之道也於是息瘡痍培根本宇內無獷悍之俗元和為盛明之代薰灼天下將明帝圖古往今來善無與讓即祇配聖德光揚大勳詳考功行無先於度中立會昌初官華州下邳縣尉武陵軍事判官桃源山洞開顯廡宇興剏神仙異境具武陵經今有言者道士朱法虔以狀來曰有觀在山有戶在疆圖籍且久事不能辯農人曰斧某林田某墟而養侵競未能以遵清淨之化公賢其辭實疑漁蠹之未弭迺詢故實刻石定所至而明白之滎陽公之臨武陵實開成五年也桃源觀在州西水路去州城一百四十里陸路八十里准天寶七年五月十三日制取近山三十戶蠲免租賦永充灑埽守備山林此觀山四至准建中二年所定山界東西濶七里南北長九里周迴三二里東至厮羅溪五里西至大江二里南至障山四里北至大江五里障山在祠堂南四里以山嶺分水為界直南屏蔽如障故以名八跡壇在祠堂北一百八步瞿童上昇處足印八跡後人思之立壇於其所因以為名今奉勅醮祭皆在斯壇秦人洞在障山中峯之陰厥狀如門巨石屏蔽靈跡猶存有水自中涓涓不絕竹樹陰森雖盛夏炎熾凜然若秋又多奇花奇木禽獸非凡信仙境也朱老師閣在觀西一百步老師名靈䛒於此朝禮常聞異香仙樂既終後人莫敢居年久摧毀厥址尚存今有杉木十餘株枝幹盤屈若龍蛇之形凌冬不凋有松柏之操桃源洞在祠堂北大江南岸漁人黃道真見桃花處備於陶淵明伍安貧記云會昌元年十二月二十一日軍事判官前華州下邳縣尉狄中立記藏言江西人府君諱常字中行扶風平陵人也祖亶同昌郡司馬贈水部郎中皇考叔向仕至左拾遺贈尚書右僕射當代宗皇帝朝善五言詩名冠流輩時屬貞懿皇后山陵上注意哀挽即時進三章內考首出傳諸人口者有禮遜生前貴恩追歿後榮又命婦羞蘋葉都人插㮈花又禁兵環素帟宮女哭寒雲備在文集故刑部侍郎包佶製序府君同氣五人各載首序府君大歷十四年舉進士與故吏部侍郎奚陟商州牧卞俛祕校獨孤授同年上第迨拾遺下世力養繼親家無舊產百口漂寓繇是棄高科於盛時就泉府之少職邅迴者十年厥後載罹家禍因卜居廣陵之柳楊西偏流泉種竹隱几著書者又十載繇擢第至釋褐凡二十年洎貞元十四年秋成德軍節度使太尉王公命從事御史盧泚貺五百金辟為掌記不就其年淮南節度左僕射霸陵杜公奏為參謀授祕書省校書郎厥後歷泉府從事繇協律郎遷監察御史裏行居無何湘東倅戎轉殿中侍御史賜緋魚袋元和六年繇侍御史入為水部員外郎亦既二歲㛰嫁未畢求牧守之官出為朗州刺史轉固陵潯陽臨川三郡既罷秩東歸舊業時宰嘉招固辭衰疾因除國子祭酒致仕寶歷元年秋寢疾告終於廣陵之白沙別業卒時年七十其年詔贈越州都督會昌元年武宗即位恩覃中外嗣子宏餘任黃州刺史准赦改贈太子少保有文一十八卷西江逸民褚藏言製序府君諱牟字貽周家世所傳載於首序府君貞元二年舉進士與從父弟故相贈司徒易直故相贈少師李公夷故兵部侍郎張公賈故工部侍郎張公正甫同年上第府君初授祕校東都留守巡官歷河陽昭義從事累轉協律郎評事監察御史裏行府罷復為留守判官轉殿中侍御史尋為昭義節度判官累遷檢校水部員外轉本司郎中兼御史賜緋魚袋後為留守判官檢校尚書都官郎中出為澤州刺史改國子祭酒長慶二年春寢疾告終於宣平里之私第享年七十四嗣子周餘任祕書監今上即位恩覃內外准赦文大中四年贈給事中府君和粹積中文華發外惟琴與酒克儉於家時人以為有前古風韻世為五言詩加以筆述文集十卷未暇編錄府君諱㣥字丹列家世所傳載於首序府君由弱冠不樂進士之科便於著書耕墾墳籍既孤以蔬素自適著書於毘陵之西偏給長兄之俸而與諸季安於膝下者十稔洎再罹內艱殆盡而復前者數四厥後郡守給事中京兆韋公夏卿知公以為江左文雅無出其右適貞元十年詔徵天下隱居邱園不求聞達之士韋公遂薦焉與桂山處士劉明素同表公之言云受天清氣與道逍遙時人以為孔北海拔禰衡之文不之過也其時天下慰薦九人公獨不除授其後韋公移牧吳郡又以公所著史記名臣疏三十四卷進入皆寢而不報人皆異之公自以為通塞繫於命靜而俟之厥後韋公入為天官侍郎改京兆命中謝之日德宗與之緒言韋進曰臣忝居達官而竊負其位上曰卿有何負奏曰臣守毘陵日薦處士竇㣥於時獨蒙不錄後臣在蘇州又進竇㣥所著名臣疏又蒙不答臣以為以人而廢在臣則當然言㣥則屈上乃驚曰卿之知人固無疑卒不問者乃宰執之失也便宣即令召對此貞元十八年也公即日起於衡泌白衣召見上謂公曰夏卿知卿卿有何蘊蓄得以盡言公從容對曰臣無蘊蓄第讀書俟時夫蘊蓄者迹在近班進有所不納諫有所不聽臣即蘊蓄如臣處於草茅但仰元化而已實無蘊蓄上甚奇其對便宣令付中書即除諫官釋褐授右拾遺居無何祕監張公薦和蕃請公為判官因改侍御史其後有故不行請復本列上不許遂守侍御史俄兼領雜務德宗晏駕改膳部員外郎兼侍御史知雜事出為唐州刺史司空于公鎮漢南奏公為節度副使檢校兵部郎中兼中丞加金紫居無何除吏部郎中遷御史中丞以舉職太過出為黔州觀察使後以十洞擾亂准詔用兵翦伐事平公坐貶開州刺史亦既周歲除容管經畧使憲宗以公守官無隱思欲大用因急詔追入中途遘疾終於衡州旅館享年五十贈左散騎常侍公有子曰謙餘審餘偕孝敬相率審餘應進士公天授和粹亮直孤峻著書俟用隱於衡泌未嘗以名利枉其所守時論以公有公輔之望卒無所伸文集散落未暇編錄府君諱庠字冑卿家世所傳載於首序府君初應進士感於知己一言遂從事於商洛授國子主簿未幾而罷後吏部侍郎韓公出鎮武昌美公之才辟為節度副使遷監察御史俄而昌黎移鎮京口用為節度副使改殿中侍御史昌黎却入公至輦下遷澤州刺史秩滿時光祿卿范公由吳郡領宛陵奏公試太子中允兼侍御史為團練副使加章服府罷除奏天縣令遷登州刺史昌黎公留守東都又奏授公為汝州防禦判官改檢校戶部員外郎兼侍御史後遷信州刺史三載轉婺州亦既二載遘疾告終於東陽之官舍享年六十有三公天授倜儻氣在物表一言而合期於歲寒為五字詩頗得其妙嗣子匡餘疾沒世次曰繇晉州司法次曰載國子監直講皆克荷素風聿修官業詩筆散落編錄未遑府君諱鞏字友封家世所傳載於首序府君元和二年舉進士與今東都留守左僕射孫公故吏部侍郎興元節度使王公源中中書舍人崔公咸制誥李公正封同年上第府君世傳五言詩頗得其妙故相淮陽公鎮滑臺辟為從事釋褐授祕校淮陽移鎮渚宮遷峴首改協律郎二府專掌奏記淮陽下世司空辥公平鎮青社辟公為掌書記又改節度判官副使累遷至大理評事監察御史裏行殿中侍御史檢校祠部員外郎加章服後辥公入為民籍府君除侍御史轉司勳員外郎遷刑部郎中文昌故事文酒之為由公復振也故相左轄元稹觀察浙東固請公副戎分實舊交辭不能免遂除祕書少監兼中丞加金紫無何元公下世公亦北歸道途遘疾迨至輦下告終於崇德里之私第享年六十有子六人長曰景餘疾歿世次師裕見任晉陽令俱力學修文孝敬相率公溫仁華茂風韻峭逸遇境必言詩言之必破的佳句不泯傳於人閒文集散落未暇編錄確字剛中河南人開成二年登第累拜兵部侍郎咸通五年以本官同平章事進中書侍郎加右僕射罷為鎮海節度使加太子太師徙河中卒戶部每年合納當使三月九月兩限絹二十一萬四千一百疋錢五萬貫自大中八年已後至咸通四年積欠五十萬五千七百餘貫疋前使杜悰申奏請起咸通五年正月已後於諸道州府場監院合送戶部八十文除陌錢內割十五文當時收管以填積欠續據戶部牒稱州府除陌錢有折色零碎請起咸通五年所合送延資庫錢絹逐年兩限須足其餘陌十五文當司仍舊收管前使夏侯孜具事由申奏且請以戶部論請期限其咸通五年錢絹戶部已送納自六年至八年其錢絹依前不旋送納又積欠三十六萬五千五百七十貫文者伏以所置延資庫初以備邊為名至大中三年始改今號若財物不充則名額虛設當置制之時所令三司逐年分改減送當使收管元勅只有錢數但令本司減割送庫不定色目以此因循漸隳舊制年月既久積欠轉多既無計以徵收乃指色以取濟稍稱備邊名號得遵元勅指揮乃割戶部除陌八十文內十五文收管及戶部請逐年送庫具票從今既積欠又多終慮不及期限臣今酌量請諸道州府場監院合送戶部錢絹內分配令勒留下合送納延資庫數目令本處別為綱運與戶部綱同送上都直納延資庫則戶部免有逋懸不至累年積欠臣覽貞觀故事太宗初定官品令文武官共六百四十三員顧謂房元齡曰朕設此官員以待賢士工商雜色之流假令術踰儕類止可厚給財物必不可超授官秩與朝賢君子比肩而立同坐而食太和中文宗欲以樂官尉遲璋為王府率拾遺竇洵直極諫乃改授光州長史伏乞以兩朝故事別授可及之官貺吏部侍郎漢之子登進士第余自幼伏覽外王父昌黎文公燕喜亭記則知連州山水之殊亭之稱因記為天下所嘉連為郡既遠且秀亦因亭而高時談山水可娛者較數連矣中州人既以連遐遠不可得與遊皆依記以圖為館宇飾味山水者莫不目登心到焉如此則亭豈可荒記豈可仆乎三年冬余侍行承詔於連水陸南馳幽無所攄志無所用乃縱業於山水以資養志况又外祖所記亭在是耶昔聞今見必矣踵於郛則訪焉耆老曰無矣吁昔奚寵遇而讚詠之如彼今遭何人廢棄之如此豈亭之屯耶竊歎數月得刺史武公至歡之尤甚且曰不修則過及余矣遽揮徒而窮尋之冒翳履淖抵巇擘蔓得餘址焉級磚缺擲棟榱垣瓦寸折片碎蓊汗其甚石記斷僵莓昧其字公整而修之徵記本於余家易石而琢之不旬就矣於舊不移不損煥而為新命余記其跡余辭小子豈敢措筆以並前記公曰不與記實此則又毀後人知子至而不顧子過矣余何別不修者乎余曰諾時會昌五年十一月五日連州刺史武興宗書濆武宗朝官洛陽令遷滁州刺史上臨御明年濆自洛陽令之太守詔牧滁民之三月得古溪郡之東北十里按地圖志在皇道山之右昔始皇途經是山因以名焉其下西永陽嶺迸流於荇溪此溪是也不濬川導廣泉演漾潭島影溢江漢埇中流袤平壇四浪滉朗雙派委輸襟帶一川斜界千畝無茭苗蘋萍之雜其淼練如也有廢亭占勝之地其狀依然也照晴而空水相鮮澄遠而霽山瀉色趨向奇狀不可窮竟訪郡之長老考亭之廢興皆曰三十甲子二周星而不知其所由來矣驗圖籍亦昧其始興之歲也秋七月前河中監察汝南公况前武寧軍殿中隴西公拱州遷客司馬宏農公紹復咸以勝概為宴之須乃卜於亭是咨是謀遂古創今僉曰惟允不越月他工具洎六旬有六日新亭就楹不茀茀昭其儉也甍不仡仡示無僭也內不重門曠其景也外不崇墉達其望也繇是四時之氣成象不絕春木秀容夏雲奇峯秋天爽空冬日暖濃觸類有景與溪無窮雖羊公峴溪曷足以加其勝矣於戲物之廢興時也苟非其時聖人微言矧其蒙者乎時會昌二年正月八日建儇武宗時人縣城西郛七十里有東漢春穀縣之遺址後因以名鄉鄉之北鄙抵於大山之峯巖秀異於他山山之林巒溫潤於他木議者以為下有泉洞故爾洞門如圭勢實天鑿四面來束兩崖相撐腹內周圓似刳而成仰視嵌空怪狀非一若羽若鱗若動若植不知所以然者蓋疑山川陰陽有吐納蓄洩之道下有流泉淺深未測洞門右擁復穿石竇達於洞外注為澄潭下灌良田功侔造化若乃松韻秋景鳥鳴春林野花爭芳吐火噴雪不可得而名也洞之西偏有石壁屹立高三十餘仞廣袤等夷有類丹青元黃錯雜垂蘿引蔓布列纓緌石壁之下復有名園流泉繞其兩面巖翠環其四隅先是故吏部常選樂安蔣公諱誦有之未遑經始而傳於故明州司功參軍蔣公諱珵司功之季年顧命其子係曰是地也鄰接靈境不樹藝桑麻可請名僧崇建蘭若依託寺宇而根固焉是以君子韙之係既免喪於太和七年有禪僧超覺自金陵杖錫而至曰我尋山水者度量宏博珠融月圓係乃以前竟見託忻然而受覺公乃經丈尺具畚挶芟治繁蕪鑿石夷壤建置方丈而景象旋生矣於戲天作靈奇而覺公潤色之以合天地之心開成二年請附屬於隱靜寺時上座僧文度寺主僧道琮都維那僧文昱皆道門樞轄釋氏師長迺曰此地斯來符西徵矣貞元中故工部尚書博陵崔公字斯邑也曾遊茲洞崔公佳之有紀行之什自洞迴驂親翰於寺之壁事既契叶不其休哉遂兼以公之作聞於官司因隸於隱靜寺焉覺公欲刊石為記使後人知其所由來乃有處士南陽左歡實邱明之遐裔亦當今之俊選好逑錢媛始契宜家惜夭桃之芳晨痛梧桐之先落鳳琴罷響魚目常開捨其服翫粧奩獨致豐碑之用昔羊公遺愛墮淚於峴山今左氏思賢凄凉於石壁儇固不才詎識文章之紀律以宗室之休美輒受命而為記蔣秀士前序其事即會昌二年九月二十七日樹碑慶讚悉皆周備至五年天下廢寺遂被隨例廢毀今逢明代精舍重興左公恐絕其靈跡盡忠竭誠又出數緡再留後紀資其存歿福壽無疆永為不朽于會昌三年官庫部郎中知制誥伏以御史大夫中丞掌邦國憲法朝廷紀綱兼此官者皆以所領務重特為寵異近來諸行侍郎兼御史大夫者並在左右丞之上相承不改行之已久况今使下監察御史裏行朝謝時列在左右司郎中之上以此參彼足可辨明况奉去年十月二十八日勅御史大夫進為正三品中丞進為正四品郎官望等尤為重任酌從宜之文定可久之法合崇憲職式叶朝章請准前例諸行侍郎兼御史大夫中丞者在尚書左右丞之上
