front:
  text: 全唐文欽定全唐文卷七百三十三端符穆宗朝官拾遺
  hash: sha256:4a5648227f41adec941eb79b2f8f414945f3fb05fd77a84004d1a3f7f271a574
  markers:
  - {type: head, offset: 14, content: 韋端符, id: KR4h0168_NFKB_733-h1, level: 1}
body:
  text: 三年冬端符於三原令座中揖其㣥官有客曰某丞李謂端符曰是衛公之胄也其家傳賜書與他服器十餘物者訖宴端符即丞居為客謁丞延入就列端符因跪請曰籍君僕射公之嗣固願見僕射公之烈之多其事辭雖史記或闕略具天下耳舌矣聞君世傳文帝詔與公服物者願得以觀丞慘慘曰諾即其家傴僂躍步奉賜書一亟他物一器出發視有玉帶一首末為玉十有三方者七挫兩隅者六每綴環焉為附而固者以金丞曰傳云環者列佩用也玉之粹者若含怡然澤者若渙釋然公擒蕭銑時高祖所賜于闐獻三帶其一也素錦袍一其襟袂促小裁製絶巧密光爛爛如波旁出紫文綾襖一促製小袖如袍其為文林樹於上其下有馳馬射者又雜為狻猊虎貙橐駝者靴袴一往來為鈎屬鎖劍文疑非華人所為也自始傳於今莫能名其物象笏一差狹不類今笏者佩筆一奇木為管韜刻飾以金別為金環以限難其間韜者火鏡二大觿一小觿一竹卞囊二椰杯一蓋常佩於玉帶環者十三物已亡其五其存者八文帝為兒時與公子某年上下文帝命居宮中侍吾兒戲即賜以皇子服物黃綾袍緋綾裙皆為龍鸞文素錦襖綷五彩為花若鳥者素錦半袖小笏皆緻巧功良今工之為不能也文帝賜書二十通多言征討事厚勞苦信必威賞而已其兵事節度皆付公吾不從中理也既公疾親詔者數四其一曰有晝夜視公病中老嫗令一人來吾欲熟知公起居狀丞曰權文公視此詔常泣曰君臣之際乃如是耶端符既畢觀中若有物擊惻其心者於玉帶見遠方致物而上不專有以賜有功也於文錦衆物見其時之工志功不志靡也於賜公子以皇子衣服見視臣如友而猶兒也於詔征討見擇將材付將職也上嘗不曲制其事旁他可動哉於問公疾見上答憫公如家人之視子姓也公之勞烈如是其大固有以感之獨推期運吾不信也丞曰子觀吾故物異他人之觀一似動色隱心者於霜露變時每閲省是物人雅謂子工文辭幸為記吾得觀以慰吾慕思也故曰記衛公故物窮者宜有以樂乎果宜有以樂也窮者宜有以懼乎果宜有以懼也樂者何樂吾之窮非吾之修也樂吾之不苟就偷取也樂吾寢道之安腹義之飽而不更富貴也樂吾之自反而縮偃偃而居蕩蕩而行也樂吾之善擇善蹈而無所移流也樂舉如是也樂可涯乎哉故曰窮者果宜有以樂也懼者何懼吾之窮時不能也懼吾之道終不能施設也懼利澤不下於人也懼吾之榮名淑譽不冒聞於天上以為父母寵大懼吾之無以與親戚為厚也懼吾之無以與鄉黨賢友俱有之也懼舉如是也懼可弭乎哉故曰窮者果宜有以懼也達者宜有以樂乎果宜有以樂也達者宜有以懼乎果宜有以懼也樂者何樂吾之達上不欺乎君下不愧乎人樂吾之乘良食腴有以得之也樂吾能蹈古之達者之道以匡戴於上也樂吾之進而能思有心為報也樂吾之穀祿豐多而不能為積藏有以與戚愛為厚也樂吾之不大其家而養來天下賢士可以繼續吾祖道也樂吾之奉養祠祀率父母所教育而居有之以為潔甘薌馨也樂吾之功利流布於人而國人指名以榮父母之善教誨也樂上有以倚也樂下有以仰也樂似先古之為令子孫也樂垂後世為賢祖考也樂古之人非無吾道而有合不合吾適有之而有合之樂舉如是也樂可涯乎哉故曰達者宜有以樂也懼者何懼吾之所以達無曲折便邪以得之乎懼吾雌顏飴辭態媚嬖御以得之乎懼吾飛聲竄跡盜取衆好以得之乎懼吾之得位無急夷而讓病乎懼吾無嗜豐盈而迷位如郵乎懼吾不恤居職而早計後來乎懼吾無激詭譎詐以取譽乎懼吾無攜實傳藝為雀集狙黠乎懼舉如是也懼可忘乎哉故曰達者宜有以懼也窮者宜有其所以樂無其所以懼古之人有之顏子是也凡所以病疾於道擇去之鮮矣而又得聖人為之依旦夜熟復所理以為樂所謂懼者獨不得功利下於人耳辱有所歸也歸乎有國有人者也與吾之俱生之人無達也懼於我何哉達者宜有其所以樂無其所以懼古之人有之周公是也以家為周抱負稚主以究成天下矣凡所以養天下者宜舉置之以為樂而一無所以懼代之希顏子而道周公者有其所以有無其所以無哉苟不至焉宜兩有所戒作兩戒所謂榮與辱者賢不肖之辨也朝暮之所存也君子小人所以異道而殊名也君子無榮辱小人有辱而無榮志意修術業明德行備飾是榮之自內者也由之而爵列尊穀祿厚無擇而不宜是榮之自外者也君子有諸內而外者至焉猶是藝之耨之鎛之水澤以時而苖之猥大者也而世謂之榮是果不足為君子榮也以至貴於天下立國家偃然若固有之者彼修之非一日也得之誠有術也吾所以待之無愧也又何榮乎哉厄窮詈侮暴怒橫逆以至於擊悴逐磔世所謂之辱者是又果不足為君子辱也問其逢何物也其遭何時也吾之所以不容用吾之所修可於堯禹孔子而不可於斯時也吾又何辱乎哉君子無榮非不榮也所以為榮者出於吾道耳異乎世之所謂幸而榮者也謂種而收者幸可乎君子無辱非不辱也吾之道大彼不足用吾之說粹彼不足聞辱誠有所在也猶河海之不可內於坳涔也是豈河海辱哉故曰君子無榮辱由是為說也小人有辱無榮曲哆險詭突誕嫉賊是辱自內者也由之而得刑殺流放是亦有諸內而外者至焉是猶薉蕪之鬱止之而蓬亂疽結也謂飯茹死者不幸可乎幸而售姦容邪盜有位勢則當時之賢者陰指而默笑之憤之甚者筆之於書以示戒於後視其所處如鼠之肥肆於廩也豕之腯澤於欄也其榮乎哉故曰小人有辱無榮也小人之有辱無榮內外備至而不容說焉然則就是說吾又有明焉君子非有榮者有仁義之榮而無勢任之榮也在吾之修者堯禹孔子吾將坦蕩蕩而君師之立其朝躋其堂恬而有之流千萬世鼻口吾芳醲故曰有仁義之榮也若勢與任吾又惡取哉得之吾不屑也流千萬世不遂者稱道而自信焉惡在乎得與否也故曰無勢任之榮也若小人則無適而不辱也學者述道行吾說而審取焉君子小人分矣孺子道成人之言父母必憐誇焉非直父母也鄉人亦異而指之矣是何也非所以期孺子也待以孺子而言成人也則父母憐之如鄉人指異即有魁然成人而事孺子是何人哉其所以待之視之用何心也移是而言小人不能為君子固也陷乎罪誅非暴逆狠戾而窘於咽喉之空尺寸之膚受之不仁仁人不憫憐之也今有一鄉之吏遇孺子把弄土塗折挽草木則呵而批之曰何爾也成人者有妄毀淫取顧不敢動睫而過之是誠不了一鄉矣吾欲世之大人無獨見鄉吏之不了一鄉而不自見所不理無喝怒於孺子之為而恬視魁然成人挽折大草淫取大物者本其所以待之之心從而校之天下幾蘇息今有人負病於此則其親戚者憂之聞善醫則不遠燕越而求之欲其病之速瘳若噓毛掇葉之易是直智無所施耳然則憂者雖甚不能為也善為者又非所憂也不憂非薄人也非其他耳彼誠善醫也安得人人而憂之必居其地而恥不能則將悉其技而為之與憂者之心不異故病甚憂戚之得善為之醫則幾乎平理矣不得善醫者百十旦夜坐環之而藥謀無所曉其去死喪幾何故曰憂不能為技不習也為者不必憂非其地也必得善為之者處憂之之地然後知病之間也不日矣昔之為天下國家而病者豈無善之者耶不得處憂之之地耳漆室女誠憂矣不能為魯也鴟夷子嘗工為越矣陶朱公則視猶涉者之視車使嘗得善為天下國家者處憂之之地何敗亡之有紹復左僕射於陵子擢進士第登宏詞科終中書舍人敕百事根本在文昌官綱轄不修則庶人墮矣是以選擢之際常難其人不有精才孰膺茲任江南西道都團練使觀察處置等使檢校右散騎常侍周敬復以精遠之詞早登科籍以深奧之學遂列顯名振風績於南宮奮華輝於翰苑聲猷實著名以事高厥德允修在公不倦俾贊丞於都座庶警策於周行振舉朝倫有望於爾可尚書右丞充長慶中官倉部員外郎筆之健者用有所長惟茲載事或表含章雖發跡於衆毫誠難㯋脫苟容身於一管豈是鋒鋩進必願言退惟處默隨所動以授彩寓孤貞而保直修辭立句曾無點畫之虧游藝依仁空負詩書之力恐無成之見擲常自束以研精擇才而丹青不間應用而工拙偕行所以盡心於學者嘗巧於人情惟首出筒中長憂挫鋭及文成紙上或冀知名以其提挈不難發揮有自縱八體之俱寫亦一毫而不墜何當入夢終期暗以相親儻用臨池詎欲辭於歷試今也文章具舉翰墨皆陳秋毫似削寶匣以新但使元禮之門不將點額則知子張之手永用書紳夫如是則止有所託有因然後録名之際希數字於依仁漢興五葉帝曰孝武氣蓋㣥方威加醜虜謂八表可以臣服謂四夷可以力取所以發王者之師於中原登單于之臺於北土乃徵騎卒爰整虎貔將馳大駕用建靈旗電耀星奔忽東西而沸渭虯騰龍騁紛左右以葳蕤出乎關山之外乘乎肅殺之時始也歷涿郡之墟涉西河之水踐胸奴之絶域蹂長城之故壘洪塵坌乎三邊白刃森乎萬里追風躡影之騎蔚以先登執弓挾矢之徒紛然四起帝於是奮師旅縱窺臨雲浮層構霜激雄心鼙鼓之聲自陰山而雷動旌旗之色從大漠以煙深故得遠瞰龍城旁分馬邑俯雲路以周覽窮地形之可襲悠悠四塞辨古戌之微茫一一遼天見征鴻之出入既而虜不敢犯兵亦言旋將雪恥於平城之下冀歸功於高廟之前殊不知天下一家不必耀威靈於億兆域中無事何煩誇被練之三千况彼讋㣥胡恣專殺且非示一人之恩信亦何以制九夷之桀黠徒使五原之下感戎馬之蕭蕭四海之中識兵車之軋軋未若我國家無私為用不戰為名外設受降之壘內懸進善之旌俾四方之通泰致九有之文明豈徒與西戎北狄較戰而論兵天實至尊物難致味所以郊祀之展禮惟重犧牲之用犢有為故能昭德馨導生氣叶上帝精明之感必因誠以告虔示下土恭謹之心有以小而為貴由是選才斯始稟命有歸固資於至敬之薦不在乎充身之肥盡黑黃蒼赤之形舉書其數用齒角皮毛之狀具體而微苟山川之不舍曷天地以相違當其大禮既陳泰壇斯踐形殊歸獸角若獨繭羈縻忽至初無悚於肇牽觳士角束方來終有悲於餘喘肅然之內蠢爾如生委質未分於天理亡軀終狥於物情足以上祇明命下達精誠乾乾之意不虧因必之於心敬戢戢之儀斯異亦何假於楅衡可以薦明時可以撰吉日天子以之合禮而具備有司用此陳儀而罔失殺身之際雖有補於馨香登俎之時固無慙於榛栗斯可以見至德在斯入用惟時實禮之大者在信以成之介葛雖聞於早辨莊周誠得而興悲是故聖人制禮作樂必資後學分隆殺於輕重之心辨等儀於長短之角彼賓客者滿尺宗廟者盈握曾何足以表於齊莊固未可以彰其忠慤方今四海既定小信咸孚郊天祀地之禮將展博碩肥腯之用奚無所以下臣稽首而歌曰惟吾君之德也與天地之巍乎人無善惡利乃交爭故懲忿者無如於立義感物者必在於推誠所以庾氏子能捐片璧遂息兩情誠聖人之閫域見智士之縱橫當其愛惡所逼長短相賊意各是非事難姑息乃曰碎我此寶成君之德苟有易心固無難色傍窺利害遂生一决之心下視錐刀不顧千金之直於是置諸厚地投此攻堅隨形騞若應手琤然萬點星分善價之心俱死二疑冰釋力爭之意都捐斯乃大讓所加連城非寶棄此十德欲求諸道不然安得勵不貪之志在彼斯須堅必斷之謀於豫懷抱卓哉奇士克已喻人解紛以道出義於身故得割所愛成乃仁不以利為用而以德為鄰況乎雪彩飛揚霜華奔迸折裂無幾堅貞失性如散天之氣忽若斷虹碎含璧之圓皆如破鏡此既棄寶彼焉息競則當路者誠可以稽疑立教者固宜於希聖彼機忘於絶絃難解於弄丸亞父碎斗而增恚海客鍛珠而成難徒生一理未息兩端曷若格物於恥勸人為美究其道不徒然想其心非率爾誠哉莊生之說吾固知其有以試一望兮雲晚而山晴白日欲沒兮紅霞始生含江天之霽潤籠烟景之虛明發光華而不定若組織之相成陽文陰漫乍合乍散離披晃朗錯雜陵亂麗雲日之幾重鋪綺繡之千段翻光倒景擢函萏於湖中舒豔騰輝攢螮蝀於天畔照萬象於晴初散寥天於日餘吐丹氣於青嶂為金光於碧虛越女浣紗恥鮮明之莫及巴姬濯錦慙光彩之不如攢紅散紫參差邐迤狀㣥飛之鸞鳳類叢生之花花始一變而舒霞終一變而成綺當是時也則有才子去國遊人別家泛濫秋景徘徊霽華惜賞心之日暮悵游目於天涯積九秋之懷抱對茲夕之烟霞仰丹霄之愁斷想赤水之路賒能不沉吟徙倚臥坐興嗟況復雲景回午蒼涼愁暮思攄懷以振藻返疑憂而失趣空吟謝客之詩遐思公孫之賦三陽布萬物新攝提建月勾芒御辰惟東風之解凍明下土而知春於是嗣木德游水濱坼凅沍開奫淪始自震而發跡終習坎而成仁原夫其始也出大塊乘新律度晴川經暖日積習習之淑氣散峩峩之素質順流而委想銀河之漸傾逐吹以分訝瑤池之漸失飄然既至颯爾攸興潛融積溜暗斷輕冰自太簇之氣生功因入律悅中流而瓦解聲若裂繒不疾不徐如考如擊動輕澌於皎潔上游鱗於磧礫未分蘋末疑馮夷之剖蚌胎稍辨波心若荊山之流玉液意同攻陷勢若刳剔何虎嘯之威方微信狐疑之心已釋羊角既止蟬翼潛銷表一歲發生之候當三春啓蟄之朝鼓怒斯至徘徊遽飄拂圓折之時初疑破鏡迸亂流之處盡若回潮斯以見寒暑不夭夭心推遷屢急何一氣之自噫信百川而皆及導仁為煦决滯之義則深以德而和陷堅之功斯立當其晴流漸泮麗景初馳飄忽既及凝滯無遺狀曉河雲卷之初忽其明矣若太素氣分之際難可辨之是知天地既春欣榮者衆將以遂於㣥性不獨釋於積凍然後驅飛廉命羲仲俾風日之可遊冀臨川而必中石雖至大兮水亦能受以水浮石兮其功難就何異術之得中忽成橋於海右是必窮怪力極宇宙將觀光於暘谷亦誇功於周舊在昔嬴氏八表初吞言巡日域遂瞰海門感召初牽以表回山之力崚嶒斯至皆呈見血之痕誠陰陽之不測與天地而長存當其大駕臨流㣥官列位皇威赫其斯震巨石屹以前至豈惟韞玉皆符投水之姿不俟造舟自叶濟川之利所以驅汗漫走嶙峋架巨壑越通津始峩峩而驟轉忽蕩蕩而惟新嶽立星馳異成名於隕宋神扶鬼助若受命於強秦故得勢壓長源影分高浪似迫官刑之急如搆凌波之壯萬靈卻走藹朝景以先驅五色爭臨杳如虹之可望硉矹初定崢嶸不讓烏鵲未足以比倫黿鼉故難其想尚萬變千化杳杳茫茫將持峻極以配靈長投跡皆因於水府推功可謝於媧皇嗟乎代異人殊山空地寂邈矣前事依然故跡對江海之上終感逝川在陵谷之中徒為怪石則知帝王之道貴乎居深日月之異難可窺臨馳騁固傷於至德亂神終歎於非今地控強秦路惟分陜有太華之作固若崇墉之生險絶壑中抱重巒外掩倚雲漢而匝野屏開跨金方而當空黛染千尋壁立萬雉雲屯龍盤日月虎視乾坤大河自北而東呀為濬洫穹谷從中而斷豁若重門誠百二之光宅見九五之天尊偉夫襟帶皇都咽喉上國磅礡乎崤函之外隱軫乎豐鎬之側所以羅㣥象吞八極展萬祀而成在衆心冠三秦而位居一德况乎天地初霽雲霞四披紅塵滅影碧落標奇宿霧市之氣尚凝烟闕聳蓮峯之色不讓文陴顧萬夫之莫向信六國而奚為岌岌神才言言天設連岸抱九州之路壯氣折諸侯之節蕭蕭歸馬想飲窟之初還隱隱輕雷訝鳴鼓之不歇天包地束鳥過雲輕萬仞垂峭千峯入冥髣佛虹霓盡識旌旗之色依稀星月皆分弧矢之形疑其發跡混茫孕茲重阻假巨靈拔山之力衛王者登龍之所不然安得不費一錢不勤一旅削成而千里共峻作鎮而一人可禦是宜堯為君而舜為臣道為主而德為鄰與天地之人共守使海內之士咸賓夫如是則東夷之與北狄雖欲窺而何因也從諫澤潞節度使悟子悟卒從諫主留後寶歷中為昭義節度使太和初進司空封沛國公七年加同中書門下平章事進檢校司徒兼太子太師會昌三年卒年四十一贈太傅臣聞造僞以亂真者匹夫知之尚不可况天下皆知乎執疏以為親者在匹夫之家尚不可况處大國之朝乎臣受國恩深奉公心切知有此色安敢不言伏惟皇帝陛下仁及萬方孝敦九族而推心無黨惟理是求微臣所以不避直言切論深事伏見金吾將軍蕭本稱是太后親弟受此官榮今喧然國都殆聞藩府自上及下異口同音皆言蕭宏是真蕭本是僞臣傍聽衆論遍察㣥情咸思發明以正名分今年二月其蕭宏投臣當道求臣上聞自言比者福建觀察使唐扶及監軍劉行立具審根源已曾論奏其時屬蕭本得為外戚來自左軍臺司既不敢研窮聖意遂勒還鄉里自茲議論轉益沸騰臣亦令潛問左軍榷論大體而士良推至公之道發不黨之言蓋蕭本自度孤危妄有憑恃伏以名居國舅位列朝班而真僞不分中外所恥切慮皇太后受此罔惑已有恩情若含垢於一時終取笑於千古伏乞追蕭宏赴闕與蕭本對推細詰根源必辨真僞涯等儒生荷國榮寵咸欲保身全族安肯搆逆訓等實欲討除內臣兩中尉自為救死之謀遂至相殺誣以反逆誠恐非辜設若宰相實有異圖當委之有司正其典刑豈有內臣擅領甲兵恣行剽劫延及士庶橫被殺傷流血千門僵尸萬計搜羅枝蔓中外恫疑臣欲身詣闕庭面陳臧否恐并陷孥戮事亦無成謹當修飭封疆訓練士卒內為陛下心腹外為陛下藩垣如姦臣難制誓以死清君側劭權字昭衡擢進士第昔王者以濟衆為先念舟航之未具長川謂運斤之人必能造物選合抱之木遂使攻堅既而削彼鱗皴定茲繩墨短長大小任規模之巧心高下重輕稱波瀾之巨力原夫造其舟而利其用亦由求其理而安其國剞劂斯休舳艫已流小周穆黿鼉之駕契高宗舟楫之求德合國風暗動揚帆之勢人歌帝力爰成鼓栧之謳濟物不得無其舟行化不得無其相運智既由乎明主操舟亦因乎哲匠器無不具實均大造之功道無不通宛叶蒼生之望必也主意渺瀰用汝猶疑不顧斧斤之妙不求擁腫之資則思涉之人恨無航而空歎未濟之士欲行水而何期且刻之求劍者其意細微用之稱象者誠非大計曷若濟巨川而是念命良工而立制欲使蠻夷之類慕化而有路斯來商賈之徒通貨而乘流遠逝利涉之道彌彰拯溺之功潛契以此利物何物不利以此濟人何人不濟由是皇恩遠被鴻化旁流潛通四海之路皆因一葉之舟用之則行豈隨波而上下利有攸往當與道而沉浮今我后契道臨人端默求理思通大水濟川之具雖多樂得長材刳木之心未已則知從古之君為舟於水若葦杭於河廣之內似芥葉於坳堂之裏方之於今未足喻其大而擬其美不約字還朴長慶三年進士李固言在成都辟為幕官加檢校侍郎胡越異方兮言語不通邂逅相遇兮扁舟之中訝形殊而類別偶泝浪而乘風邈矣兩鄉懷土之情則異飄然一葉濟川之計斯同始也各自天涯俱來波際指遙程於空闊紛遠思而容裔南冠朔服俄泛泛以相親孤棹片帆杳悠悠而未濟安危目擊休戚心期當波瀾之起處是肝膽之呈時水害若防不獨文身之俗風高儻便豈惟嘶馬之思去乃夷猶來何處所不遠南北宛為儔侶投足而乍憐遙集共軫風濤思鄉而何暇哀吟且虞悠阻迹也既狎心焉匪寧搖烟蕩水泛梗飄萍在浩渺之難測况沿洄之不停容與安流每欣欣而會意縱橫駭浪咸惴惴以忘形蓋以風水多虞因依不間來非類聚雖慙泛洛之仙情匪貌親誠無敵國之患殊方何遠合志何深因託質於刳木遂忘言於斷金向若不同其利無得而尋長嗟帛丿糸邈莫嗣徽音則朔野慕射雕之悍炎洲樂拾翠之心復安得同其憂患而計其浮沉哉於是察其事嘉其意諒極暌而乃合非棄同而即異永懷共濟之誠信無往而不利簡求字子臧宣武軍節度使宏正子長慶元年進士大中時拜涇原渭武節度使檢校左散騎常侍上柱國范陽縣男徙義武又徙鳳翔河東咸通初以太子少師致仕五年卒年七十六贈尚書左僕射會昌壬戌歲簡求既撰大師碑銘是月藏真身於法堂之西南隅琬玉將刻遭值難事塔石圯坼福地汙瀦今天子紹開洪基保定景福以為生靈遷善本乎化導之功帝道無為雅契空寂之理申明像教以福㣥生遂班示縣道崇煥寺宇余時分符吳郡昕公實來因以奉錢即其故處言興版築肇畫規模而檀施景隨嘗功百態楚材山委郢匠星馳俄而詔自九天慶傳百郡委廉使裁創新規金容玉毫華藏寶剎凝輝呈瑞雲矗山橫長廊四周繚垣千步巍巍巨塔揭乎其中周環重軒金碧盡飾非神功法力曷以臻於此邪於維大師兼視報化傳燈演法垂七十年拔出於苦途者何啻萬人迎意而有得者亦云數輩物飽慈誘人懷永思雖法身不隔於存沒而遺迹願留於景像昕公五行潛秀六度圓成啓有為而悟無為來無從而去無至智機元應心匠不疲茲寺也闢一乘之妙門為多士之福地感通宸聽爰錫寶題猗歟韙哉莫大之功也粵若大師示滅之四月院主僧法昕萃諸門人授簡於簡求曰若之師深索禪悅為本宗之門人前時來謁我師一言有得今將以是月十七日謹護法器藏於靈龕紀徽烈於樂石者非子而誰歟簡求於義諦無文字之解辭不得已乃粗舉其要以備用焉師諱齊安知者謂帝系之英高門之出先人因難播越故師生於海汀郡焉深避世榮終祕族氏尊其雅尚故亦不書在胎而夢日兆祥既孕而神光下燭數歲有異僧款門召見摩其頂曰鳳穴振儀龍宮藏寶紹隆之業其在斯乎及丱亟請出家父母呵止之師曰祿利之養止於親爾冥報之利不其遠耶圭組之榮止於家爾濟拔之利不其廣耶父母感悅而順聽遂依於本郡雲宗禪師雖勤勞謙默和光同塵而螢月殊輝雞鶴異態矣當年受具乃詣南嶽知嚴律師外檢律儀內照實相非修非證雅會真詮後聞南康之龔工山大寂大師隨化度人慈緣幽感裹足振錫不日而至本師奇而悅之乃以辨惠暢其指歸俾於剎那而登妙覺及大寂蛻去盡力送終後遊他方爰宏般若且曰胎卵濕化無非佛種行住坐臥皆是道場方便隨迎各安性類妙心法眼其有限乎元和末師春秋已逾七十而居於越蕭山之法樂寺寺古製陋垣屋靡完補壞扶傾不克晏坐時昕於海昌放生池壖廢地肇葺禪居焉修廊大殿彩壁層甍罛罶自屏鱗介咸若昕謙不自有延請我師慕學之徒從而至者日比百數逮今委化年整二紀釋子仰食信士檀施粳稌糗餌蔬果飴糖無精粗之分別無凶札之隆殺星馳阜積莫辨誰何非冥報勝因何以臻此師不言寒暑不下堂廡無留盼無傾聽如此者蓋有年矣每五日開法四座屏氣直心示體引經證心法外無言叩之即應不分迷悟矧勝負之機耶不有定慧矧是非之相耶與夫顯神通而振道業者固相遠也而又法身魁岸相好莊嚴眉毛紺垂顱骨圓聳望之者如仰高華而揖滄溟曾不測乎高深者也於戲德由天縱為傳教之法雄道實生知蓋積習於聖位聆其風者皆曰不可思議粵以會昌壬戌歲十二月二十一日泊然宴寂俄爾示滅先時而竹柏盡死至是而精彩益振爰有清響扣戶祥光滿室如環佩之鏗鳴若劍㦸之交射示現之相豈由於我哉嗟乎流禪河於法海寧有盡期詮㣥品於三乘同歸聖果今也徒瞻妙相永閟輝容橋壞元津雲霾瑞日學徒信士哀可既乎是用追采遺言重宣教旨銘曰人心常靈法證常明定慧一相有無俱名於此有得自師歸寂近取諸身胡云不識五千尊經何限奧義迷者見文悟者見意見者無住指即是處醫病未除徒勞回顧我行慈悲示爾蚩蚩無鑿高原自有清池大師之言一一真詮不疑不怖同歸善緣甘字和鼎長慶末進士又登制科太和中纍官侍御史貶封州司馬執事之部孝童楊牢父茂卿從田氏府趙軍反殺田氏茂卿死牢之兄蜀三往索父喪慮死不果至牢自洛陽走常山二千里號伏叛壘委髮羸骸有可憐狀讐意感解以尸還之單縗冬月往來太行間凍膚皸瘃銜哀雨血行路稠人為牢泣歸責其子以牢勉之牢為兒踐操如此未聞執事唁而書顯之豈樹風扶教意耶且鄉人能齧疽刳䏶急親之病皆一時決耳猶蒙表其閭脫之徭上有大禮則差問以粟帛今河北驕叛萬師不能攘而牢徒步請尸仇手與夫舍腐忍瘡者孰多牢絶乳即能詩洛陽兒曹壯於牢者皆出其下牢之贖喪潞帥償其費其葬也滑帥賻之財斯執事之事他人既篡之矣即有稱牢於上者執事能無恨其後乎於衛有人焉汙㣥潔獨師聖友賢不明於諸子間或從孟軻遊在貧逃官將仕不妻宜若狂然鄉之君子以言譎曰若雖不明於諸子然且從軻軻為書曰仕非為貧也而有時乎為貧娶妻非為養也而有時乎為養今聞若推養於弟避媒竄祿聖耶孟軻邪俱不識也對曰此吾母也吾母教我曰無以貧故不擇官不擇官滋汝以偷也無以養故不擇婚不擇婚滋汝以纍也孝在便吾心也孝不在便吾身也愈愈授枕者便吾身也孳孳受道術者便吾心也若便然汝不見馬牛羊豨乎同費芻豢也馬牛則免也羊豨則不免無他牛以耕免馬以駕免豈惟芻豢為然人有大焉汝當勤其道者也我對曰某聞會盟則牲馬宗廟則犧牛如此不以免奈何吾母嗟曰汝誠得列於會盟薦於宗廟雖不免吾言歡我固受教於吾母矣不然我何以得專此如牽人言而戾母心不知其子也鄉之君子退曰吾聞曾子能養志者也若人曾子哉吾竄乎奚竄吾竄利也利所趨也所竄也吾將為吾之所為也吾豈為人之所為也哉今是頑人曾無不忍之心然常獨有忍心者由害於利也且謂螻蚓大於麋鹿則許之乎聲不許也然人顧而遭螻蚓則迂足而活之過而傷螻蚓則失聲而痛之顧而見麋鹿則援弓而逐之幸而中麋鹿則失聲而喜之忍於大者不忍於小者何歟麋鹿利於口腹也螻蚓不利也故居於利則雖麋鹿忍也不居於利則螻蚓不忍也然則羈於利而忍於麋鹿者獨小人耶長人有甚焉長人則果忍於人矣烏有是哉前有將官兵以誅恆蔡叛者不十餘戰而能殺萬人則師喜不能殺萬人則師恥豈翅忍乎從有侈富而劫死者有怨曠而姦死者有饑寒而道路死者有加兵死之數今是長人固有不忍之心然獨時有忍心者亦由害於利也是故利滋博者忍滋多也吾方與之角利將在所不忍乎故曰吾竄乎奚竄吾竄利也如此俯讀倚詠孳孳於策試者竄而非邪然吾之所竄竄乎心也不竄乎身昔者趙狐正晉先盟五合諸侯傳曰生不及利彼豈竄吾身哉或曰申恆何讐而叛解曰盜賊富家讐乎且婪其財而強索之若寃其主也申習盜恆習賊差乎解曰害財曰盜以盜害人曰賊天下有士家之有紵粟也天下有相家之有子弟也申憑葉縣非盜歟恆驚宰相非賊歟或曰有盜一金費十金而可捕為之乎有賊一夫殺十夫而可磔行之乎今三年兵之非十金而捕如費何萬人死之非十夫而磔如殺何解曰以金為輕而不捕則窮人家家謀盜矣富人家家遇盜矣以一夫為寡而不磔則壯夫人人為賊矣懦夫人人被賊矣是故盡天下之盜者三年為蚤也勝天下之賊者萬人為少也或曰吾聞勇夫重閉盍鍵乎解曰天雨垣敗盜賊乘之門之閉耶曰以彼習叛之巧也贖而吏之何如解曰盜賊欲巧吏不欲擾如贖娼而為妻也為娼且淫為妻且禁乎北諸侯來朝過溫溫令送於溫指問水名令曰濟也侯曰豈濟瀆邪令復曰然侯曰河吾望也其橫千里渾猛如漲無風或毀船殺人得清淇洹漳之水不加深別為九河不加狹彼所以為瀆也今盡濟水之力載數石之舟廣不能橫深不能浮而曰與河同靈等秩吾不識先生班祀之意也令曰濟南去數十里過河矣寡介如此馳狂濁中未嘗波渝氣奪別河而潛積沙連塊千里不壓不翳益壯其流帥汶而東終能發山輸海此其所以為瀆也今河負其強大自積石不捷趨海往來戎狄間脅涇渭灃漆汾洛伊沁之水以滋其暴決愁民生中土患勢逆曲多窮始歸海此皆濟水所羞也執事豈以大為賢乎侯默然
