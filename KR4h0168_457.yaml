front:
  text: 全唐文欽定全唐文卷四百五十七頠肅宗時人
  hash: sha256:5e6b3bb33f00a36d88691eb7fac45f9e498096bf1bbd9c08f74b685252e0fcd9
  markers:
  - {type: head, offset: 14, content: 孫頠, id: KR4h0168_NFKB_457-h1, level: 1}
body:
  text: 是月也見斗於辰日交長至有司方陳大禮展時事達九門以磔攘協四靈而滌器匪歲之卒乃春之季令陰氣以下降使陽和而上利順三時而不忒協萬福而必萃命方相氏出儺百神丹首纆裳辮髮文身摐金鼓以騰躍執戈矛以逡巡驅赤役於四裔保皇家於萬人斯乃卒歲之儺也豈比夫抑陰而畢春於是休徵允備有典有則洗滌氛癘祚我邦國其弓乃桃其矢乃野仲無以施其計遊光曷足逞其特然而禮法肅設干旌駢羅祠青帝以邀福抑金方以與儺將以窒陰氣發陽和已矣哉斯欲陳儺之儀述儺之飾盛可以仰功可以抑騰金耀於四目被熊皮於五色乍煒煒以煌煌或昈昈而赩赩既秉戈而揚盾率百隸而是職及乎出未央經上林芳菲發越瑕穢漂沉時令既畢嘉貺是尋黃龍白鳳大輅南金聚高冠之岌岌會長劒之森森我皇堯舜比德夔龍是扶春儺高門載馳載驅玉以制容金以飾途流聲教以布濩乃洋溢於天衢既而陰陽交和庶物時育氛氤將掃祥光可掬綏我眉壽介尒景福客有書劒三朝苦心簡牘荏苒青衿蹉跎白屋儻不棄於芻蕘將刷羽於喬木岑廣德中官金部員外郎大司徒以物地是事小宗伯以人神是圖我稼既同則田祖斯饗爾酒既旨則嗇夫載馳堯典授時羲氏成於歲職魯人將事宣父與於蜡賓二三有司是勤執事奚不薦守自以速尤至如土反其澤之年水歸其壑之暮必合聚萬物而索饗焉欲使仁之深義之盡然後神不乏祀人亦報功今者所由實未敦古且藏冰以閟猶祭司寒何殞霜既成獨遺司嗇雖云迎而祭其如避馬有辭且以德勤人豈三施而無報以庸食鼠將一祭而未忘況主稼則人食田惟獸棄人與獸雖祭何為如或不有是神無足稱者必也猶能為鬼不其餒而嗟乎主祠何其展事不如林放有問豈得季旅無譏卒為漢儒尚見非於齊魯未乖周禮何謬居於滕薛御史報法愚所謂臧行則肅宗時擢書判拔萃科少翁繁弱靈苗張迴忘歸遠系各是良弓之子俱膺美箭之名類筋角以甄形攸資定體固鏃羽而成質期乎陷堅蓋取諸暌用明弧矢之利道該於藝允覿和容之能非唯取貴禮經固亦以威天下是處顏高之室稱乎六鈞實發養繇之弦先於百中論其飲羽本為相資詰以主皮事非獨善瞻言繕造何劣何優據其精靈徒矜徒尚文戰而未覺先鳴齊驅而適聞後殿少翁不伏雅叶道方張迴非優謂符彞典調荊南人官參軍贊王理制國用稽諸縣籍抑有彞典故命敷土聿興五員之規用師頒田式均三易之賦歷選列辟率由舊章國家大責四瀛咸則三壤穀出不過籍所以豐財萊田不致徵實惟饒衍麟書是紀象魏攸懸浹日使觀先庚以令何彼咨嶽猶大禁之因循孰謂法雷亦小東而杼軸既徵求之無藝翻給貸之是憂皮之不存毛將焉傅百姓不足九式何施外臺則驅雞善嚴使司則害馬已去雅符中典無勞簿言英幹太原人廣德二年試鴻臚卿渝州刺史兼渝合兩州招召團練使此石應聖帝明王時和年豐則見晉義熙三年已有記矣今繼故事云帝有道兮契無情天降祉兮石應靈萬國歡兮仰太平五穀豐兮賀聖明戢干戈兮罷練兵晉垂記兮唐勒銘秀一作芳大歷八年進士有客有客棲於草澤觀龍門壯禹迹目送跳沫十有餘里心驚懸流千有餘尺氣濛濛而霧蒸聲隱隱而雷激於是吞舟之倫吹潦將適奮泥沙而鱍刺簸鬐鬣以投擲鱗櫛比而映水星攢目曈曨而中流月白翔謺浪凌洪波當用取之既逞志而浩汗何往不可豈失溜而蹉跎遂脫魚服入龍渦上既親於天水下不離於黿鼉天吳旁睞而莫測其以馮夷眙而孰知其他出彼處此載騰載躍違任公之釣餌遠漁父之矰繳昔常未達伏艱難以如茲今則獲伸觀變化之何若既稟受乎靈遂隱見乎形騖寥廓升窅冥却訝泥蟠免翻身於尾赤旋驚意逸摩正色於天青然後知遊濠浮沉在藻出入嗟所處之齷齪恨中區之於邑豈若一朝豹變千古名立當天衢而翺翔近日域而呼吸懸水之丈人莫比赤鱗之巨鯉何及永無涸轍之憂寧有窮波之急別有志士卓爾不㣥名嗟歲晚寢必夜分思拜手於丹闕願獻賦於明君儻獲比魚而變龍必能行雨而吐雲惟窮愁之伊鬱嗟大塊之勞生登春臺而寫望獨觀化以娛情熙熙然不知吾之喪我悠悠爾方悟象之難名矧夫見千門之景霽逢六合之風清夫何化者之自化使夫成者之自成樂以忘歸歎盤遊之楚后極而起恨痛傷心於屈平然則春之為氣可以感人臺之為高可以觀徼總山川以窮覽極宇宙而遐眺俯瞻魏闕散嘉氣之氤氳延望天門登大明之皛耀於時也三農伊始百卉皆春天地相近雷雲鮮屯欣太皡之在震嘉勾芒之在辰以斯觀乎天倪乃無所不至以是觀乎王化亦何遠不均稽乎登臺之意也寓興實繁忘情蓋寡獨有役於耳目匪安排於原野爭徇物以矜能建升高而自下庸詎知澹乎無為道之所貴起乎累土采老氏之元言歌彼載陽識詩人之所謂方發生之道達屬陽和之布氣登臺謂何雅興逾多玩韶景而則麗聆微風而轉和雖黃鳥之可悅無同人而則那時來何歡物至而感思千里之遐騁登九層以流覽褰裳未濟徒有望於江湖藻鑒高懸且欲呈其肝膽故其取類也遠寓興也深庶鑒登高之賦無遺入爨之音何大歷中進士粵惟姑洗應律勾芒御辰鴈橋風暖犀浦花新謺嶂縈郭長楊映津軒車照地士女驚人風土堪樂山川可珍歲時不殊於荊楚形勝有類夫咸秦晚景彌秀晴江轉春即有卓氏名姝相如麗室織迴文之重錦豔傾國之妖質鳴梭靜夜促杼春日布葉宜疎安花巧密寫庭葵而不欠擬山鳥而能悉績縷嫌遲顰蛾慕疾乍離披而成段或煥爛而成匹言濯春流鳴環乃出於是近深沈傍清泚朱顏始映珍篋方啟其始入也疑芳樹影落澗中少將安焉若晴霞色照潭底奪五雲長風未散泫百花微雨新洗爾乃曝林崖出泉洞遲日徐轉和風緩送稍變迴鸞全分舞鳳戲蝶時遶嬌鶯欲弄乘春景而方收俟王正而入貢懿其彩色足重鮮明可嘉青為禁柳紅作宮花能使衞尉縈障夫人飾車郎官居而列宿郡守衣而還家若夫齊紈之與楚練豈非細縠之與輕紗夫幽棲多暇樂道閒居坐文章之苑囿放精思以畋漁詠太沖之招隱諷相如之子虛覯蘭凋而蕙歇傷夏卷而秋舒昇重軒以徙倚目平海而踟蹰見五雲之間出繞三山而忽諸映烏晶之曭朗涵蜃氣之紆徐光泛泛而逾靜影離離而不疎懿夫騰碧海瑞皇家金柯玉葉兼雜花文璀璨光紛華況夫羅錦帳繞香車雙虹宛轉縈翠霞及夫倏而聚忽而散霓裳羽旆相陵亂倚長空浮迴岸宛若瓊樓金闕橫天半美人濯錦春江畔既而叢彩可望奇狀難名㣥象糾紛疑綺羅之繡出五色明媚若丹青之畫成影沉波而海晏氣羃岫而山晴嗤碭嶺之光淺恥汾川之色輕壯瑞圖之舊籙應樂府之新聲似帝鄉之迢遞冀有司而見行悠悠帝國三千里不託先容誰衒美希君顧盻當及時無使霏微散成綺惟改歲之宏典爰授衣於肅霜稽月令之前制得豳詩之首章夫其損益從時取其觀古人象元黃既績可以為公子裳促機上之寒杼發桑間之懿筐零露既漙肅霜既降聚於燎火無資於借人勸其功傭俾率於同巷爾其敦質素黜華靡翔葛屨之儉嗇犮麻衣之浮侈裂素之潔既無取於流黃我朱孔陽復何為乎惡紫苟狸製之可識諒羔羊之在此且德惟稱服道在隨時惜光陰之暮矣恐絺綌之淒其會斯蠶績取彼狐狸既申之以雜佩又組之以素絲信物之美者惟君子宜之借如輕裘被服之客纖手縫裳之女晝翦綺紈夜調砧杵微芳發素袖舉絲兮衣兮爰犮爰語莫不遵向晦以宴息樂盛陰之室處於戲聖實作則皇惟降衷禮章度數服制卑崇鑒羔袖之非類慎鷸冠之不衷豈可裦然充耳不念女工俾僭亂以陵上興怨言於大東而已是以帶裳表儉黻冕昭文襲緇衣之改造追補袞之清芬故能宜象服集元纁將菲薄以為寶豈浮奢之足云守道固窮至圖未就卒歲無褐憂心如疚四時迭運竊獨悲此凜秋萬物有託子何為乎巖岫空負悲哉之感徒為哿矣之富儻有彈冠之期不忘綈袍之舊帝念分憂國資共理慎擇股肱之守以為藩屏之臣甲遇明時偏承重寄須榮晝錦焉可步歸未聞叔度之歌空效買臣之事自可奉乎新命剖之分符而乃襲以故衣懷其印綬況從大夫之後不可徒行而於掾吏之間誠為誕妄車曾不下匪黃霸之臨人吏乃疾呼類陳遵之驚座以為失禮其若有詞捨而勿詰於古何愧子華大歷十年進士嗟夫約物之製智不可限利用則深論工太簡彼如意之在御得幽賞之餘裕雕飾非駭目之珍雅麗乃捎雲之簵絲柄玉質瓜首冰素啟嘉論之要端導指蹤之宏度原其性也靈而貞度其體也堅而輕倚鮮膚而烟潤掉皓腕而風生升堂間乎琴瑟入座偶乎簪纓荷新仁之重顧承在握之深情㣥幽人之居既挺乎高節如君子之義因錫以嘉名工以盡智明乎所為樂貴聲和禮存體易唯此物之聞素通達人之深義不擊寶樹而爭豪豈埋金陵而自累眾媚彩而求益我全真以自適點珠翠之華筵宜幽棲之煙策雖小曲而受用終大正而不易動息含舒散之情拂拭滅風塵之迹信而可久直而不朽每發四座之先不起一人之後亮無心以應物寧效事而我有擢本歸造化之工死節順操持之手嗟乎在野之年亭亭碧鮮泫空中之墜露掃石上之輕烟紆巧思以就規愜幽心而靜便永以錫君之肌骨永以奉君之周旋亦以居守之臣感時之倫分御服而恩甚擊唾壺而命迍胡一否而一泰因歌之於古人士開大歷十年進士尊彼國常乃立人極依大社以封土命諸侯以方色木官復位東極於焉必書火正是司南方由之可識西同白帝之象北察元武之職配中黃而立名覆四方而作式於是端扆穆穆授策皇皇賢戚封建君臣樂康既載人之爾厚亦植物而惟良可以載八紘包大荒豈離逷於我邑盡東南於我疆昔神黷無厭聞革故於有魏天祚明德遂惟新於聖唐總祝融與蓐收臣元冥與勾芒知合之以濟代故貢之以來王守於爾位亦有寵子思翦桐而是立故分茅以共理所以維城所以撫封爰作稼穡錫之附庸立五色以相備和八音以相從色能惟正音乃叶雅將察之以報功故封之以立社惟人是恤選賢以建仰夏正之攸敦法周官之大憲胙之而氏可命相之而宅可依五德聿修萬方知歸即之也真彩煌煌望之也靈壇巍巍足以表正方夏發揚德輝等乎珪瑞叶以元吉建樹侯家藩屏王室分之惟五行之惟一實邦家之永固與天壤而齊畢聖人在上與天地廣元德彰於日月洪休備乎瞻仰合璧之為狀也㯋耀相向圓明比象麗重光於一軌開混茫而精爽其真不遷其合以兩和陰陽而二儀交泰辨分至而九服融朗既無異於弦朢故王道所以坦蕩也至矣哉考日以正時本於元妙會日以合月宜乎暠曜歷足厂田坴次而雙滿合晶耀而並照一陰一陽曰柔曰剛既恒其用亦曜其相其合也契天地之明其璧也本日月之光國有道則循其度邦無道則失其常上元昇而軒歷著太初復而漢運昌寧止纖纖西樓昭國熹而形偃杲杲東戶表臣忠而據黃者哉懿乎一德升聞天休下答示軌範於萬代發文明於六合且乾道微而難究惟君是侯帝德廣而無私惟天是祐明者莫昭於日月故表之以會同同者將慶於和平乃整之於宇宙同輪共規叶慶應期既周天而同道乍皎皎以遲遲璧之生也本乎律律之用也在乎時厥祥云久逢昏則否其興也明后惟道之遐其應不差是昭乎皇家諒我后之明德發大道於光華何必堯年之與漢代而茲歷之可嘉春澤一作丁澤大歷十年進士日之升也浴海而麗天嶽之峻也切漢而臨邊登高者以致九霄之上愛景者欲在萬人之先其所惟一其仞惟千伊風靈之有載彼日觀之存焉夫其夜刻未終曙色猶昧彼窮高之極遠此有進而無退未辨昏明斯分覆載屢聞鳴鴈猶陰沉而不覩忽聽晨雞即曈曨而可愛於是漸出暘谷將離地維巖巒既秀草樹生姿氣則赫赩人皆仰之其望也如燭其照也無私昔者帝王御宇立極垂統封禪及此成功巡狩應其春仲莫不登茲絕頂遐燭大明思煦嫗之義窮造化之精以為日象一人之德嶽是三公之名信王侯之設險俾夷狄之來平方今一德無為三光有象動植昭泰神祇肸蠁千巖瑞色思效祉以爰升萬壑春雲欲入封而空上客有才乏羽儀心思鶱翥每積聚螢之志難登望日之處引領終夕含情達曙知照燭之有期故躊躇而不去重曰日有觀兮絕代獨立登之望兮無遠不及何太陽之至精莫不專於出入冕大歷四年官劒南西道節度副使攝渝州刺史左威衞大將軍天下有道祥瑞必呈明王協應今靈石見于深潭克表清泰攝刺史之宏農楊公之坐嘯也頃緣馬伯南據州數月及公下車闡揚恩信乃避而去楊子琳部率一萬公以談笑慰之遂感激沿流封疆烏合之眾礪戈恃險八年不降公飛短檄責之乃斂袵屈膝而至於是邱園之士襁負畢來六府孔修百姓鼓腹因感此石如晉義熙之春焉頌曰懸崖十仞盤石且靈候時將穩必見其形烟塵已息巴地初寧良牧移風厥德惟馨清大歷二年自宿州刺史徙吳興遷越州都督充浙東西團練副使吳興古郡顧渚名山當貢焙之所居有靈泉而特異用之蒸搗別著芳馨信至德之感通合太和而獻納甘有同于沆瀣清遠勝于滄浪曙諝從弟大歷朝官臨桂縣令二年余從兄自左司郎中詔領虔州牧不朞月而令行焉削其煩苛存乎簡易惟德用乂以康保民端已而屬吏自修體道而風俗加讓除惡務本闕二字等不法非時而誅施惠惟勤王劒闕一字窮苦出錢以賑原義制事非禮罕言爾日也路不拾遺人歸其厚戊申歲季夏閏月遠郊陽於戲儲潭神之靈者入廟而驕陽猶赫陳祠而元冥召陰我信既孚伊神降祉乾坤合德風雨應期表以隨車雲不待族昭其福善雷無假震越翼日而滂沱矣發我枯瘁長我黍稷卓彼甫田厥有秋矣曷以報德靡愛斯牲曷以表靈載葺其宇夫供億王用俾無暴徵轉輸泛舟爰有易道人無怨色其財罕遺天與和氣而變不生則災害匪常休咎由政明矣其宋也下堂頓首其衞也舉國興師神昭至誠則不容易豈比夫至理通變發言馨香神人叶和天地之利宜保膺元吉翼戴休明禍亂無因而生福慶永垂後裔曙則不典敢贊頌聲頌曰仙郎出守猛虎渡河祐賢進善崇正黜訛黃霸潁川晏嬰東阿輕關易道禁暴屏苛列邑循吏異畝嘉禾士農工商阡陌宏多時雨不降儲潭是過幽廟肸蠁連山嵯峨天地合氣魚龍躍波隨車霢霂通昔滂沱實發實穎載謠載歌精意以薦至誠伊何牲不愛羊酒盈其犧天下之利期在惟和少儒大歷四年自揚州司馬除括州刺史先生垂教則喪也寧戚君子立身必造次於是甲何為者焉知禮乎惰爾庶功隳我王化既稱家而罕制復居里而無職且啜菽飲水樂盡其中泣血寢苫孝乎斯在何必厚藏醯醢傚襄公之送妻自可薄盡有無同子柳之葬母忽而都闕未之前聞不績無纕則周官之故事有裘勿服乃郕人之匪臧況八使觀風澄清可尚六條曠職政化蔑如不懲熊軾之孰謂蠏筐之責禹制初闢周疆肇建蕭收漢閣益掌虞邦井田有差經隧無紊順陽和以肅事映秋霜以畢力四時得業萬邦作孚豈容吉泰愚駑致心誣妄析言興盜亂名改作革公田以入已自犯嚴科移私籍以安居不知天憲往聞匡子今觀吉生幸付司刑以議其罪伉大歷朝官太常博士臣出身事君忝備近密夙有志願銘之在心若遭艱危必死王事當今日之際是臣死之秋將死之言庶裨萬一特乞陛下少垂聽覽則甘就鼎鑊且天生四夷皆習戰鬬輕走易北獨有犬戎數萬之師犯關度隴歷秦渭牧邠涇曾不血刃直至城闕館穀向有三載帛丿糸地數踰千里謀臣不為陛下陳一言武士不為陛下效一戰各攜卒伍剽刦閭閻汙辱宮闈燒焚陵寢者何故此將帥之心叛陛下也自朝義東滅迴紇北歸陛下以為智力所能神明所贊委權近貴失意元勳日引月長浸成大禍陛下侍臣載路多士盈庭竟無一人折檻牽裾犯顏迴慮至使北捐汾浦西失秦川者何故此公卿之心叛陛下也陛下出城之日鑾駕未動京師百姓刦奪府庫城外百姓更相殺戮者何故此三輔之心叛陛下也自九月二十八日聞有警急十月一日下詔徵兵至今凡四十日矣天下兵一人不至何故此四海之心叛陛下也近自京輔遠至海隅文武百寮志皆離叛雖有朝恩戮力陝郡堅城陛下獨能長守社稷乎今臣所言四者皆叛陛下以為虛邪實邪若以為實陛下以今日之事為安邪危邪若以為危陛下豈得高枕而臥不决大計臣聞良醫之療病也必審觀病源當病授藥若不當病療之無益陛下知今日之病何因至此臣實知之請言其故何者天下之心皆恨陛下不練士卒疎遠賢良委任宦官離間將相以至於此陛下必欲救今日之急存宗廟社稷即請斬元振之首懸示天下盡出內使配隸諸州以朝恩勳勞留在左右仍以神策兵馬迴付漢官使朝臣百寮每日坐議左右使令盡用文武然後大下明詔削去尊號引過歸已深自刻責誓與下寮將相率德勵行後宮嬪妃且移別院與宰相以下晝夜論政下詔云若天下勳臣知予自新許予改過即召募將士來赴朝廷若以為舊惡未悛修身有闕則帝王大器敢妨聖賢聽天下所往也陛下若納臣此言行臣所請一月之內天下兵馬若不雲集闕下臣請闔門寸斬以謝陛下伏乞陛下讀臣此表一二十徧親與朝廷商量事若可行則自處置不用露臣此表臣今日上表即知萬死但願行之死無所恨陛下若違臣所請更無長策社稷重事伏惟陛下審圖之
