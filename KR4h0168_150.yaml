body:
  text: 臣聞陳力就列不能者止鐘鳴漏盡夜行宜息故張良多病辭少傅而專道養韋賢告老謝丞相而乞骸骨豈惟體非筋力不可疲殆從政抑亦情重謙退欲以廉讓宏道自時積亂離久習澆弊仁義之化忽之其若遺名利所存苟得而無恥今四海乂安㣥生樂業陛下思治之情勞於寤寐臣謂欲防其末先正其本若廉恥之教不行則升平之化無自謹按瑾等理治之教義多罕稱出身事主行能兼闕年方壯也尚不如人耄又及之無能為矣張瑾拔跡行陳素無才略自歸聖朝總兵過任子玉之戰頻有喪師須賈之髮未足論罪朝廷假以餘年不置於法陛下再造天地更施雲雨瑾等並以髮齒流恩遂使名器踰量特進之號擬迹竇周公冠軍之名連衡霍去病既年在遲暮智乏老成宜思靜退自安止足而外托闕庭之戀內希筐篚之恩牽力衰朽強顏預朝陛下仁愛之心形容於萬物以其不堪侍立特於廊下賜坐叨榮自若聞寵不驚貪競之志更深靦目之顏愈厚臣聞設法訓人在宏其教引年敬老終取於賢寧有庸庸之流諄諄若是而可均彼上庠忝茲厚秩且名曰人臣事乖朝列養非貴德坐異論道縱慶雲之惠不別荊棘闕恩傷教其如禮何臣以庸才謬當朝寄風俗未清實任其咎瑾等爵秩既隆虧損尤大釋此不問安事狐貍激貪止競宜從隗始儻天地含容未至屏黜請斥放之罷歸里第且七十致仕古今通規近代以來貪競不息臣隨即舉劾恐陷罪者多內外諸司有如此比散下知之使遵節制四維以張彞倫式敘臣某言臣聞同陰以息分路尚有悽然向隅成悲滿堂猶且不樂况天倫長逝伉儷不終共被同車之歡遂隔今古撫存悼亡之痛有傷心目而可譬孔懷於行路忽齊體於泉壤對凶筵而奏艷妓悅新寵而忘舊哀此實名教所不容人倫之尤蠧者也謹按子和一介庸流百行兼闕階緣際會叨濫恩榮乃分建茅社參掌禁衛厠跡周行有年歲矣縱前賢之行未識思齊而先王之禮宜其企及寧有弟喪妻殞才逾十旬子哭父歌遂同一日身被子高之縗室對安仁之簟鄰舂不相而家妓畢陳節物共時而悲欣相對傷風損教莫之為甚何可視息人間參預朝列雖自鄶以下無足致譏而告朔餼羊實愛其禮陛下勤求治理崇奬教義欲使習弊之人變於其道但子和器識庸下所傷尤大若準常科則免而無恥請特加貶以敦禮教謹奏君舉必書言存左史臣職當兼修起居注不敢不盡愚直若陛下一言乖於道理則千載略於聖德非止當今損於百姓也文本字景仁鄧州棘陽人高祖朝署行臺考功郎中貞觀時纍授中書侍郎專典機密封江陵縣子拜中書令從太宗伐遼至幽州暴疾卒年五十一贈侍中廣州都督諡曰憲攝提改度孟陬順紀歸餘既終獻歲方始乃詔司存命掌故考憲章修法度三朝之禮畢陳九賓之儀咸具庭燎晃以飈舉明燈煜以星布爾乃月正元日節應勾芒浮祥煙而泛佳氣闢閶闔而敞德陽虞賓光於列位呼韓厠於班行百寮濟濟萬國皇皇腰金鳴玉執贄奉璋內自畿甸外被要荒輸賝王會納貢職方司儀之職無替臚人之列有章既伸眷於宸極亦矯首於巖廊猶川流之歸海若湛露之晞陽張崇牙設柷敔陳鼎實列樽俎梐枑肅而為衛戈鋋森以齊舉五輅接軫九旗揚斾羽蓋葳蕤雲車暗藹發聲名於文物備威儀於冠帶正位恭已體元得一望之如雲就之如日郊廟致敬山川咸秩教先大道學敦儒術憲章載記殷鑒周宣回輿南畝駐蹕東㕓親耕帝藉躬稼大田方期多稼介此豐年富實教資農惟政本上敦播植下勤藨蔉榮辱既著淳朴可反禮節既興登封何遠式敷帝典載穆王度元良育德維城作固股肱周召爪牙信布比漢之兆方周之祚維貞觀十二年四月已卯皇帝使某副使某持節冊命曰於戲夫易陳利建道貫三才傳稱夾輔業隆百代是以周之魯衛式固維城漢之梁趙克隆磐石惟爾使持節都督梁洋集畢四州諸軍事梁州刺史漢王元昌幼聞教義器識聰敏早開土宇禮數優隆逖矣南鄭襟帶西蜀按部之重茂親是寄持民之譽期月有聞是用錫以茅賦備茲典冊爰誓山河永作藩屏朕聞曰事君盡禮資於孝敬為政以德始於仁厚故士無貴賤由之者揚名時無古今背之者殄行往欽哉爾其執心於忠孝踐行於儉約無好逸豫以犯非禮無縱嗜欲以邇宵人明率舊章永保疆土可不慎歟維貞觀十二年四月已卯皇帝使某官某持節冊命曰於戲肇自黃唐洎乎漢晉莫不敦睦親戚任用賢能咸作疆土世為藩翰惟爾使持節潞沁韓澤四州諸軍事潞州刺史韓王元嘉識量沈厚業尚修整夙禀趨庭之訓早膺析圭之寵上黨奧壤地連秦晉開國之典攸歸按部之譽允穆是用率由故實光備寵章式固維城傳之永世朕聞口詩書禮樂仁義之府也孝友忠信人倫之基也是以河間之賢在於修學東平之譽成於為善往欽哉爾其覽載籍之旨求聖賢之訓戒茲邪僻以仁厚為心勗彼怠荒以重慎為德乃服明命勿替敬典可不慎歟於戲蓋五等肇於帝軒殷周不改其制六條創於有漢魏晉必修其道是知選賢建戚莫先於藩衛經邦致治允資於刺舉惟爾使持節都督遂晉果合四州諸軍事遂州刺史彭王元則幼稱歧嶷夙禀義方褰帷汝潁之地聲績可紀建旟巴蜀之境風俗以康是用率由令典錫茲寵命傳爾子孫長為唐輔朕聞為臣子者踐行冀於忠孝處富貴者貽戚在於驕奢故能播美當時垂芳後裔往欽哉爾其監于經籍詢于蓍龜見善如不及見惡如探湯無違禮以害身無縱欲以敗俗夙夜匪懈罔有後羞可不慎歟維貞觀某年某月某日甲子皇帝若曰於戲昔在哲后受命君臨並建茂親以為藩衛然則古之列國今之按部循名或異立政實同皆所以共治黎元俱奬王室克隆鼎祚咸悉由之惟爾雍州牧左武侯大將軍越王泰生而韶敏幼而好學樂善不倦才德日新地則維城禮優分器惟彼三魏實號五都非親勿居夾輔攸屬是用命爾為使持節都督相衛黎魏洺邢貝七州諸軍事相州刺史改封魏王傳之子孫長為藩翰古人有言皇天無親惟德是輔民心無常惟惠之懷往欽哉爾其監此格言無自驕奢無邇邪佞兢兢業業以保爾茅土可不慎歟於戲朕光膺寶圖欽若前典崇睦親之義固惟城之業並錫之以土地授之以刺舉爰誓山河永作藩翰惟爾洺州刺史郯王惲幼稱岐嶷早聞詩禮式開土宇允備車服惟彼漢池地兼舊楚作鎮之重僉議攸歸是用命爾為使持節襄州諸軍事襄州刺史改封蔣王傳之子孫長為唐輔朕聞立身之基曰忠與孝為政之本曰禮與德行之則成名違之則喪道詳求大訓莫此為先往欽哉爾其祇服朕詔敦演經典無奢侈以乖節儉無逸豫以虧謹肅聿修厥德垂徽於永世可不慎歟於戲蓋王者受命聖人作則垂法度以經邦選賢戚以布政作屏王室莫先於胙土共治天下實寄於頒條惟爾岐州刺史許王元祥幼禀義方早有志尚地惟邢晉禮優河裴姑蘇奧壤舊吳是宅既建作牧必侯懿親是用命爾為使持節蘇州諸軍事蘇州刺史改封江王傳之子孫世為唐輔朕聞曰孝敬忠貞人之美行也禮讓仁恕政之善經也是以奉上者戒於邪僻御下者警於驕傲然後能保其彊土和其人民往欽哉爾其鑒持身之規求為邦之道尊五美而屏四惡近君子而遠小人祇畏兢兢無替朕訓可不慎歟維貞觀某年月日甲子皇帝若曰於戲肇有君長司牧黎元雖步驟殊時損益異術至於建親勳而作屏陳龜鼎於無窮其揆一也惟爾光祿大夫行晉州刺史趙郡王孝恭器識宏通風略宏贍親猶凡蔣佐比燕荊王運權輿寰區未乂擁節西騖靖巴漢之妖氛受金戊南伐戮荊吳之蛇豕誠著經綸功宣方面及入侍禮閣出總藩麾令聞光於搢紳惠化洽於謠俗析圭之重允屬勳庸按部之榮義存帶礪是用命爾為使持節觀州諸軍事觀州刺史改封河間郡王傳之子孫永為唐輔往欽哉爾其勉茲忠孝鑒于典禮勤恤民隱無棄朕命可不慎歟臣某言臣聞生者天地之大德人者有生之最靈是以物無大小咸愛其命人無貴賤咸惜其生故聖人宏全身之道而能免於憂患賢者著養生之術而能終其壽考嵇康有云導養得理以盡性命上獲千餘歲下可數百年而皆不精故罕能得之又云夫為稼於湯代偏有一溉之功雖同焦爛必溉者後枯然則一溉之益不可誣矣誠哉斯言實為篤論但養生之術故非一途詳求至理語其大略莫若順陰陽之序節寒溫之中何則人資陰陽以育俟寒溫以成雖禀於五常而連類於萬物在春夏也萬物因而生長人亦宜微受溫暖以豐其肌膚在秋冬也萬物因而收成人亦宜微受寒涼以堅其筋骨是以貧賤之人皆順其性而疾病者少富貴之人多違其真而疾病者多是知春生夏長秋收冬藏此天道之大經也不順則無以為天下紀綱故日月四時之順不可失也仲長統曰百年者人之常壽之上者也順四時節飲食適衣服遠聲色避災患者躋上壽之常道至於吐故納新熊經鴟顧此乃山林之術非廟堂所行養生之要唯斯而已竊惟皇帝之位尊貴斯極夏則復殿清暑長廡生寒金壘浮蟻無赫曦之色玉饌含氷有凄凉之氣冬則溫室墐戶曲房掩軒前盈獸炭輕扇可以在握躬御狐白微汗可以沾襟斯皆陰陽交易寒溫過度雖適一時之性實乖四序之宜故荀卿曰喜怒哀樂好惡必得其中所以養神也寒溫盈虛消息必得其中所以養氣也寢興動靜屈伸必得其中所以養體也是知攝生之道必在得宜况陛下憂勤之心勞於內豈可使冬夏之節候虧於外哉伏願降日月之明覽聖賢之旨順陰陽之序節寒溫之中則南山之壽更增於億年北極之尊永固於萬國伏願順萬國之歡心膺三靈之眷命備天官以周衛盛輿服以巡遊五輅齊列六龍按轡瞻岱郊而啓軔指嬴里為一息詔卿士延禮官設壇場陳玉帛禋六宗而報上帝班五瑞而朝諸侯成天下之壯觀紹帝王之盛節俾夫山稱萬歲壇燭神光播厚福於無窮揚鴻徽於來裔臣伏以君集等或位居輔佐或職分牙爪並蒙拔擢授將帥之任不能正身奉法以報陛下之恩舉措肆情罪負盈積實宜繩之刑典以肅朝綱但高昌昏迷人神共棄在朝議者以其地在遐荒或欲置之度外惟陛下運獨見之明授決勝之略君集等奉行聖算遂得指期平殄若論事實並是陛下之功君集等止有道路之勞未足以稱其勳力而陛下天德弗宰乃推功於將帥露布初至便降大恩從征之人皆沾滌蕩及其凱旋特蒙曲宴又封屬國加之重賞內外文武咸欣陛下賞不踰時而未經旬日並付大理雖乃君集等自掛網羅而在朝之人未知所犯恐海內又疑陛下惟録其過似遺其功臣以下才謬參近職既有所見不敢默然臣聞古之人君出師命將克敵則受重賞不克則受嚴刑是以當其有功也雖貪殘淫縱必蒙青紫之寵當其有罪也雖勤躬潔已不免斧鉞之誅故書曰記人之功忘人之過宜為君者也昔漢二師將軍李廣利損五萬之師糜億萬之費經四年之勞唯獲駿馬三十匹雖斬宛王之首而貪不愛卒罪惡甚多武帝以為萬里征伐不録其過遂封廣利海西侯食邑八千戶又校尉陳湯矯詔興師雖斬郅支單于而湯素貪盜所收康居財物事多不法為司隸所繫湯乃上疏曰臣與吏士共誅郅支幸得擒滅今司隸乃收繫案驗是為郅支報讎也元帝赦其罪封湯關內侯賜黃金百斤又晉龍驤將軍王濬有平吳之功而王渾等論濬違詔不受節度軍令得孫皓寶物並燒皓宮及船濬上表曰今年平吳實為大慶於臣之身更為咎纍武帝赦而不推拜輔國大將軍封襄陽侯賜帛萬匹近隋新義郡公韓擒虎平陳之日縱士卒暴亂叔寶宮內文帝亦不問罪雖不加爵拜擒虎上柱國賜物八千段由斯觀之將帥之臣廉慎者少貪求者衆是以黃石公軍勢曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者邀趨其利愚者不避其死是知前聖莫不收人之長棄人之短良為此也臣又聞之天地之道以覆載為先帝王之德以含宏為美夫以區區漢武及歷代諸帝猶能宥廣利等况陛下天縱神武振宏圖以定六合豈獨正茲刑網不行古人之事哉伏惟聖懷當自已有斟酌臣今所以陳聞非敢私君集等是以螢爝末光增輝日月陛下若降雨露之澤收雷電之威録其微勞忘其大過使君集等重升朝列復預驅馳雖非清貞之臣猶是貪愚之將斯則陛下聖德雖屈法而德彌顯君集等過雖蒙宥而過更彰足使立功之士因茲皆勸負罪之將由斯而改節矣臣聞開撥亂之業者其功既難守已成之基者其道不易故居安思危所以定其業也有始有卒所以崇其基也今雖億兆乂安邊隅寧謐既承喪亂之後又接凋弊之餘戶口減損尚多田疇開闢猶少覆燾之恩著矣而瘡痍未復德教之風被矣而資産屢空是以古人譬之種樹年紀綿遠則枝葉扶疏若種之日淺根本未固雖壅之以黑壤暖之以春日一人搖之必至枯槁今之百姓頗類於此常加含養則日就滋息暫有征役則隨之凋耗凋耗既甚則人不聊生人不聊生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非民孔安國曰人以君為命故可愛君失道則人叛之故可畏仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古之哲王雖休勿休日慎一日者良為此也伏惟陛下覽古今之事察安危之機上以社稷為重下以億兆為念明選舉慎賞罰進賢才退不肖聞過即改從諫如流為善在於不疑出令期於必信頤神養性省畋獵之娛去奢從儉減工役之費務靜方內而不求闢土載櫜弓矢而無忘武備凡此數者雖為國之常道陛下之所常行臣之愚心唯願陛下思之而不倦行之而不怠則至道之美與三王比隆億載之祚隨天地長久雖使桑穀為妖龍蛇作孽雉雊於鼎耳石言於晉地猶當轉禍為福變災為祥况雨水之患陰陽常理豈可謂天譴之而繫聖心哉臣聞古人有言農夫勞而君子養焉愚者言而智者擇焉輒陳狂瞽伏待斧鉞臣聞揖讓受終之后革命創制之君莫不崇親親之義篤尊尊之道虔奉祖宗爰致郊廟自義乖闕里學滅秦庭儒雅既喪經籍堙殄兩漢纂修絶業魏晉敦尚斯文而宗廟制度典章散逸習所傳而競偏說是所見而起異端自昔迄茲多歷年代語其大略兩家而已祖鄭元者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辨是非紛而不定陛下至德自然孝思罔極孺慕踰匹夫之志制作窮聖人之道誠宜定一代之宏規為萬世之彞典臣等奉述睿旨討論往載紀七廟者實多稱四廟者蓋寡校其得失昭然可見春秋穀梁傳及禮記王制祭法禮器孔子家語並云天子七廟諸侯五廟大夫三廟士二廟尚書咸有一德曰七世之廟可以觀德至於孫卿孔安國劉歆班彪父子孔昆虞喜干寶之徒或學推碩儒或才稱博物商較古今咸以為然故其文曰天子三昭三穆與太祖之廟而七是以晉宋齊梁皆依斯義立親廟六豈非有國之茂典不刊之休烈乎若使違㣥經之正說從纍代之疑議背子雍之篤論遵康成之舊學則天子之禮下逼於人臣諸侯之制上僣於王者非所謂尊卑有序名位不同者焉况復禮由人情非自天墮大孝莫重於尊親厚本莫先於嚴配數盡四廟非貴多之道祀建七世得加隆之心是知德厚者流光乃經世之高義德薄者流卑實不易之令範臣等參議請依晉宋舊典立親廟五其祖宗之典不在此數庶承天之道興於治定之辰尊祖之義成於孝治之日謹議昔孫卿子云有天下者事七代有一國者事五代則天子七廟古今達禮故商書稱七代之廟可以觀德祭法稱王立七廟一壇二墠王制云天子七廟三昭三穆與太祖之廟而七莫不尊始封之君謂之太祖太祖之廟百代不遷祫祭之禮毀廟之主陳於太祖未毀之廟主皆升合食於太祖之室太祖東向昭南向穆北向太祖者商之元王周之后稷是也太祖之外更無始祖但商自元王以後十有四代至湯而有天下周自后稷已後十有七代至武王而有天下其間代數既遠遷廟親廟皆出太祖之後故得合食有序尊卑不差其後漢高受命無始封祖即以高皇帝為太祖太上皇高帝之父立廟饗祀不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其高祖太皇處士君等並為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西豫章潁川京兆府君等並為屬尊不在昭穆合食之列歷茲已降至于有隋宗廟之制斯禮不易故宇文氏以文皇帝為太祖隋室以武元皇帝為太祖國家誕受天命纍洽重光景皇帝始封唐公實為太祖中間代數既近列在三昭三穆之內故皇帝太廟惟有六室其宏農府君宣光二帝尊於太祖親盡則遷不在昭穆合食之數今皇極再造孝思匪寧奉二月二十九日敕宣光以下依舊號令尊崇續又奉三月一日敕既立七廟須尊崇始祖速令詳定者伏尋禮經始祖即是太祖太祖之外更無始祖周廟太祖之外以周文王為始祖不合禮經或有引白虎通義云后稷為始祖文王為太祖武王為太宗及鄭元注詩雍序太廟為文王以為說者其義不然何者彼以禮王者祖有功而宗有德周人祖文王而宗武王故謂文王為太祖耳非祫㣥主合食之太祖今之議者或有欲立涼武昭王為始者殊為不可何者昔在商周稷坰人坰始封湯武受命湯武之興祚由稷坰人坰故以稷坰人坰為太祖即皇家之景皇帝是也涼武昭王勳業未廣後主失守國土不傳景皇帝始封實基明命今乃捨封唐之盛烈崇西涼之遠構考之前古實乖典禮魏氏不以曹參為太祖齊梁不以蕭何為太祖晉氏不以胡公殷王卬為太祖宋氏不以楚元王為太祖陳隋不以胡公楊震為太祖則皇家安可以涼武昭王為太祖乎漢之東京大議郊祀多以周郊后稷漢當郊堯制下公卿議議者僉同帝亦然之唯杜林正議獨以為周室之興祚由后稷漢業特起功不緣堯祖宗故事所宜因循竟從林議又傳稱欲知天上事問長人以其近之武德貞觀之時主聖臣賢其去涼武昭王蓋亦近於今矣當時不立者以必不可立故也今既年代深遠方復立之豈是三祖二宗之意實恐景皇失職而震怒武昭虛位而不答非社稷之福也宗廟事重禘祫禮崇先王以之觀德或者不知其說既灌而往孔子不欲觀之今朝命惟新宜應慎禮祭神如在理不可誣請準敕加太廟為七室享宣皇帝以備七代其始祖不合別有尊崇之義謹議對去智絶巧聖人之至德斫雕為朴先王之令圖是以賈多端則貧士多技則匱未有崇茲剞劂競彼奢淫而能匡國安家宣風致化者矣自文明御宇大拯黔黎繼禮樂於將絶反淳風於已散庶績伊凝彞倫攸序雖復工商異類四民之禁惟宜而錐刀必爭三農之務或失誠宜絶其麗美敦茲質朴刻玉雕金棄之如芥草揮鋤執耒紀之以賢良則稼穡惟興勤體之夫知勸怠惰方革遊手之人自除謹對夫藏室延閣之舊典蓬萊宛委之之遺文其源始於六經其流分於百氏莫不美天地為廣大嘉富貴為崇高備物致用則上聖存其發育御氣乘雲則列仙體其變化茲乃盡域中之事業殫方外之天府踰繫表而稱篤論闕帝先而謂窮神豈非徇渺漫於陷井者未從海若而泳天池也矜峻極於塊阜者未託山祇而窺地軸也烏識夫無邊慧日垂鴻輝於四衢無相法寶蘊善價於三藏洎乎出闕器之外寂焉超筌蹄之表三界方於禹跡也猶大林之匹豪端四天視於侯服也若龍宮之方蝸舍升彼岸而捨六度則周孔尚溺於沈淪證常樂而捐一乘則松喬莫追其軌轍由是見真如之寂滅悟俗諦之幻化八儒三墨之所稱其人填邱壠矣柱史園吏之所述其旨猶糠粃矣若夫七覺開闕八正分塗離生滅而降靈排色空而現相惟妙也掩室以標其實惟神也降魔以顯其權故登十號而御六天絶智於無形之地遺三明而冥五道應物於有為之域是以慈悲所及跨恆沙而同跬步業緣既啓積僧祇而比崇朝故能使百億日月蕩無明於大夜三千世界隮法雲於下土然則功成道樹非鍊金之初跡滅堅林豈斷籌之末功既成俟奧典而垂範跡既滅假靈儀而圖妙是以載雕金玉闡其化於迦維載飾丹青發其善於震旦繩繩乎方便之力至矣巍巍乎饒益之義大矣文德皇后道高軒曜德配坤儀淑聖表於無疆柔明極於光大沙麓蕃祉塗山發祥來翼家邦嗣徽而贊王業聿修陰教正位而叶帝圖求賢顯重輪之明逮下彰厚載之德忠謀著於房闥孝敬申於宗祀至諴所感清出月魄於上至柔所被蕩震騰於下心繫憂勤行歸儉約胎教克明本枝冠於三代閫政攸敘宮掖光於二南陋錦繒之華身安大帛賤珠玉之寶志絶名璫九族所以增睦萬邦所以至道宏覽圖籍雅好藝文酌黃老之清靜窮詩書之溥博立德之茂合大兩儀立言之美齊明五緯加以宿殖遠因早成妙果降神渭涘明四諦以契無生應績昭陽馳三車以濟有結故帛丿糸區表剎布金猶須達之園排空散花踊現同多寶之塔諒以高視四禪俯輕末利深入八藏顧蔑勝鬘豈止降揚蕤軼有媯之二女載祀騰實越高辛之四而巳哉左武侯大將軍相州都督雍州牧魏王體明德以居宗膺茂親而作屏發揮才藝兼苞禮樂朝讀百篇總九流於學海日摛三賦備萬物於詞林臨魯衛以驂鑣馭梁楚使扶轂長人稱善應乎千里之外通神曰孝橫乎四海之濱結巨痛於風枝纏深哀於霜露陽陵永翳懷鏡奩而不追閟宮如在蹈階除而增慕思欲弭節鷲嶽申陟屺之悲鼓枻龍池寄寒泉之思方願捨白亭而遐舉瑩明珠於兜率度黃陵而撫運蔭寶樹於安養博求報恩之律歷選集靈之域以為百王建國圖大必揆於中州千尊託生成道不闕一字於邊地惟此三州實總六合王城設險曲阜營定鼎之基伊闕帶坰文命闢襄陵之闕一字穹隆極天崢嶸無景幽林招隱洞穴藏金雲生翠谷橫石室而成蓋霞舒丹巘臨松門而建標崈基拒於嵩山依希雪嶺闕一字流注於德水人丙佛連河斯固真俗之名區人祇之絶境也王乃罄心而宏喜捨開藏而散龜貝楚般竭其思宋墨騁其奇疏絶壁於玉繩之表而靈龕星列雕闕一字石於金波之外而尊容月舉或仍舊而增嚴或維新而極妙白豪流照掩蓮花之質紺髮揚暉分檀林之侶是故近瞻寶相儼若全身遠闕一字神光湛如留影嗤鏤玉之為劣鄙刻檀之未工杲杲焉踰日輪之麗長漢峨峨焉邁金山之映巨壑耆暗在目冉竭可想寶花降祥蔽五雲之色天樂振響奪萬籟之音是以覩法身之妙而八難自殄聞大覺之風而六天可陟非正真者其孰能與於此也善建佛事以報鞠養之慈廣修福田以資菩提之業非純孝者其孰能與於此也昔簡狄生商既輪回於名相公旦胙魯亦流遁於國城猶且雅頌美其功同和於天地管弦詠其德闕二字於鬼神况乎慧燈普照甘露遍灑任姒尊名具之以妙覺間平茂實成之以種智是用勒紺碣於不朽譬彼法幢陳讚述於無窮同闕二字偈俾夫衣銷劫石與金剛而比堅芥納須彌隨鐵圍而齊固感闕二字詞乃作頌曰十號開緒二諦分源有為非貴無相稱尊光宅沙界闕一字居給園仁舟戡溺智炬排昏緣發現跡化終還淨色身暫掩靈照遠鏡布金降真攻玉圖聖五道有截三闕一字無競帝唐闕一字紀太姒定祥功濟赤縣德穆紫房十品散馥三慧騰光廣闢香地載紐元綱卓爾英王至哉茂則丹青神甸鹽梅王國擲地闕一字文橫海邁德孝思不匱報恩罔忒聿修淨業于茲勝境梯危紫闕三字翠嶺勒石表相因山墓闕一字希聖雖遙求心寧永豪光闕八字祇樹樓似增城飛泉灑漢危石臨星巖垂日近松闕十三字來遊闕四字垂柸川闕十三字純孝克宣勝業載圓邪山滅地顧闕十二字皇祚於下闕伊太極草昧元氣氤氳二儀肇闢三才乃分火化之風既往結繩之政無聞遐哉邈矣故靡得而云也逮乎書契興爻象辨皇王著諡號闡歷選列聖逖聽遺篆犧農崇行道之化堯舜宏揖讓之風湯武以干戈而稱盡美成康以刑厝而表成功雖步驟殊時澆淳異世道有文質政有隆替不在天文因人垂制規模煥其有章聲實渺其難繼異哉秦氏之為政也恃崤函之作固因襄文之餘烈窮起剪之暴兵納鞅斯之邪說兼兩州之地削六雄之轍先生之道廢曩聖之德滅利觜長距殫蒼生之命刮語焚書愚黔首之性海內訾其凶滅天下苦其苛政於是懷道挾術之士背三秦而遠跡抱朴養素之夫竄九夷而自適趙高閻樂啓其亂陳勝吳廣伺其隙喪六璽於二代隳七廟於一擲永鑒其弊吁其劇歟粵若漢祖之龍飛踐宸極居大寶感素靈之符行元聖之道靖大亂以永寧濟斯人於難老洎文景之纂歷乃守文之有聲逮武宣之繼統亦王功之有成然而闕皇王之要道慙天地之至精仍踵秦之制度尚沿秦之章程既無關於政作孰與發其聲名雖時乘於六位實貽誚於三靈者矣我有新之創業也纍功而據帝圖積德而膺寶命政化洽於巖廊惠澤溢於號令四表荷其亭毒萬物遂其正性帝典闕者既補王綱弛者咸正其德也彌厚其道也彌盛若夫文軌大同夷狄嚮風武功也制禮裁樂遷風變俗文教也肇改正朔爰變服色至聖也盡禮郊禋致敬鬼神大孝也幽人咸洎奇士畢至濬哲也既厝刑書亦廢囹圄鴻德也是以天不愛其道地不愛其寶龜威浮洛飛黃服皂一角九尾之瑞朝夕坰牧並柯共穗之祥日月畿服超邃古之芳英邁前王之簡牘其天意也如此其人事也如彼諒可以披緑圖詔青史降齊郊下嬴里登介邱以昭德同梁甫以播美摛記牒於無窮播歌誦而盈耳俾夫千載之上往聖恧其鴻名百代之後下王奉其英聲固皇極於造化合至道於神明豈不美哉豈不美哉昔者帝媯升歷九官奮其庸有周誕命六卿揚其職國鈞總於公相闕一字乎二闕三字歸於臺成乎闕一字晉雖淳闕二十五字帝載闕一字盛德建闕五字也若夫昴宿麗天感其靈者人傑嵩嶽鎮地降其神者國楨叶闕一字夢於龍闕四字於舟楫其闕字也闕一字庸器闕四字其闕一字也闕八字豈闕九字復闕二字矣公太原闕一字人諱闕四字臨系姬文之遠胄派唐叔之遙源食邑河內世功開其緒著姓晉陽闕一字德派其闕一字雖闕十四字義闕三字於闕一字下晉之勳烈闕一字真闕一字於闕二字猶培塿之望闕四字之闕四字祖裕魏太中大夫言為准的行成表綴廊廟翹首搢紳結轍闕一字公叔而比德闕一字思闕一字而闕十二字司馬皇朝贈魏州刺史闕三字學夢鳥闕一字文名冠海中闕三字下孔門密子闕二字不顯於當時潁川陳君哀榮無間於異代能兼之者不亦優乎公闕一字兩儀之闕三字百闕一字之懿闕三字義以闕五字以闕八字所以闕八字所以知闕一字洋洋焉若洪河之東注巖巖焉猶華嶽之西峙若乃三德六行列聖之所闕一字也舉厝闕三字域闕十一字息闕十三字雲霓以闕二字淪闕四字與然則闕一字臺闕二字始於覆闕三字維地肇自涓流是以平津筮仕由賓王而佩印文終創業階闕一字吏而命闕四字範同符闕一字烈闕十八字內史闕一字子時隆闕十一字薛道衡闕一字宗闕一字肆牢籠多士太子洗馬李綱直道正辭羽儀海內並下堂見禮倒屣定闕四字稱闕六字趙闕十六字衡嶽則夫闕七字宣室而闕二字誼乃授通事舍人斂笏鳳池垂紳鸞閣王褱姿月舉韶音玉振每至文武在列華裔闕一字庭對越闕十六字漢菀闕三字其闕二字洪闕五字以闕一字其闕一字斯乃闕一字賢闕一字餘闕五字隅闕一字歟雅度在乎經國大業之始以親喪去官孺慕之感哀毀之極與夫長孫闕三字龍闕十七字煬帝闕二十六字斯政出奔高麗既而乘轅南反詔公銜命蕃境申明臣節陳之以逆順闕一字暢闕三字之以禍福闕二十八字豈如闕八字海張騫擁節無功於月氏又以公為東北道招慰大使屬天地橫潰華戎版蕩闕三十五字而闕一字天憑闕一字握闕二字之符授越遷夏商之鼎艾綬銀章弓旌先於髦俊建社班瑞光寵屬於勳庸庶績所以咸凝闕三十七字雖闕二字總其方闕三字毗其政刑而滅沒不㣥豈蹉於吳阪清越振響終特達於章臺徵為中書舍人遷中書侍郎闕二十九字其歷闕一字則闕三字美於闕三字其得人則孝若飛聲於洛下云誰嗣響復在茲焉屬獫狁縱慝疆場受駭甘泉闕三字之火雲闕四字之闕十三字鞠闕五字懷闕三字之將琴闕一字在闕一字佇甘闕一字之闕一字乃以闕三字軍長史十萬之師方絶大漢五餌之術必繫單于而南風褰律闕一字之闕一字北闕一字肆豺狼之毒闕二十八字皇闕一字嗣堯闕二字繼文治闕五字澆俗侔於結繩叶和萬邦遠夷同於編戶威懾龍瀚澤流龜闕二字寶無俟於闕三十字拜闕二字治中撿校吏部郎闕一字尋闕六字公望為時宗才稱王佐鴻翼所漸自回溪而薄九霄驥足既馳遊閶闔而闕一字千里雖闕二十六字閣糾繆闕三字選闕一字議武闕一字渥洽闕六字爵命日隆寵祿歲厚猶司馬之四至慈明之十旬乃以闕一字官拜太子右庶子遷御史大夫仍闕二字中書侍郎遷中書令闕十一字於廊廟闕七字位闕二字獨闕四字職司八柄公又處之故能出總糾察入專機管執簡冊以肅周行奉絲綸以光帝闕二十四字其猶闕二字俄闕三字衛闕三字餘如故闕二字虞闕二字食邑三千戶德優爵重鎬京之舊制非功不侯中陽之令典踰七命而兼二善闕一字下以闕六字佩闕十五字矣闕八字之職闕三字踰於副闕五字天道闕一字斗極之運四時下料人事邁元愷之贊百揆聖朝欽若前典憲章往代懷磻溪闕三字想闕三字而闕四字公闕十七字臨闕一字而闕三字觀闕四字南宮之故闕二字求闕一字道勤行而不倦歷選前哲仰止而無怠是以忠闕一字寬裕闕一字內恭之闕二字虛闕三十七字以事一人獻闕一字之規不闕一字於忠恕損益之義皆出於仁厚違規矩枉尋尺光其家而弗為利社稷安億兆闕一字其身而無悔肅肅焉濟濟焉闕十九字之毀闕三字言闕十字心之所同必擇善以利物意之所異不是已而違人闢德義為宮牆包禮闕五字人之善闕三字之清闕十三字今而闕一字毀譽闕三字而篤闕二字位高矣闕二字茲闕一字祿厚矣治闕二字約以孝敬之道移於哲兄行慈惠之心洽於猶子允所謂朝廷之棟幹闕五字焉以貞觀十一年闕八字洛陽闕四字疾闕一字動闕一字寄深闕二字恩息股肱闕四字於道路名闕三字陳其方技逯輔德愆報彌留曠旬兩楹之奠既兆二豎之災乃闕二字遣銀青光祿大夫行中書闕二十五字之闕二字盡闕二字之德闕五字大漸闕一字忘於舉能子顏啓足情存於慎赦眇焉千載於斯一揆六月闕一字日薨於闕四字春秋闕一字十有闕十六字類齊后闕三字即以其日闕五字百僚闕一字列莫不流涕乃詔民部尚書莒國公唐儉工部侍郎盧義恭護喪行中書侍郎闕六字禮部侍郎令狐德闕二十字諡曰恭公闕五字碑闕三字塋地於昭陵之側並給東園祕器賻贈二千段喪葬所須並令官給闕一字祖送之典墳塋之制咸闕一字禮闕十八字篆籀闕十六字獻之闕一字漢室之闕一字佐也密陵當陽晉朝之賢輔也雖復卿雲摛思班爾運奇勒銘由其闕一字孫表墓闕一字於闕二十四字詔闕二字往載不其偉與武湯一德垂之百代其詞曰藹藹高門世膺顯命堂堂盛德家襲餘慶抗節飛英扶危流詠軒蓋接闕一字圭璋闕一字映闕三十七字藝闕一字德財成闕二字範圍儒墨非馬擅奇雕龍貽則發跡素里馳聲上國仲舒揚庭吾邱待闕一字數闕四十四字釋釣滋泉陳謨德顯定策功宣縱壑才鶩搏風初矯密勿鸞閣便繁鳳沼仲舉性闕六字我闕四字儀表闕三十二字鑄丹闕三字薪理一水逝黃陂光沈趙日稅駕天府夷體泉室麟閣圖形鳥闕一字騰實悲纏闕十字恩闕九字羅闕三字懿範闕六字觀夫太陽始旦指崦嵫其若馳巨川分流趨渤澥而不息是以至人無已先天地而御六氣列仙神化隘宇宙而遺萬物與大齊魯搢紳束名教於俄景漢魏豪傑徇榮利於窮途何異於蜉蝣生於崇朝爭長於龜鶴秋毫出於末兆計大於昆閬者哉若乃岱山龍駕傳神丹之祕訣秦都鳳祠流洞簫之妙響用能延頽年於昧谷振朽骨於元廬白玉之簡祈西王而可迎青雲之衣師東陵而易襲豈非度世之寶術登遐之妙道焉法師俗姓孟氏諱靜素江夏安陸人也其先徙里成仁繼跡於孔墨冬笋表德齊聲於曾閔是以貽則當世錫類後昆軒冕之盛既富於天爵賢明之質獨表於仙才固以軼仲弓之奕葉邁陽元之餘慶者矣法師禀兩儀之靈和體五常之休德崇蘭散馥掩蕭艾於芳春朗月揚輝蕩雲霧於清夜盈尺之寶出鄢郢而連城徑寸之珍入大梁而照乘豈惟揚號異才馳聲益部曹稱孝行播美上虞而已哉幼而慕道超然拔俗志在芝桂譬芻豢於糠粃心繫烟霞方綺羅於桎梏既而初笄云畢逮吉有興懿戚託繼世之援慈親割相離之情千金甫陳百兩將戒法師凌霜之操必守節於元冬匪石之誠誓捐生於白刃素概難奪嘉禮遽寢乃脫屣通德之門絶景集靈之館虔修經戒長甘蔬菲潄元氣於亭午思輕舉於中夜若夫金簡玉字之餘論元化道樞之妙旨三皇內文九鼎丹法莫不究其條貫猶登山而小魯踐其戶庭若披雲而見日允所謂天挺才名人宗模楷者已隋高祖文皇帝聞風而悅徵赴京師亦既來儀居於至德之觀公卿虛已士女翹心於是高視神州廣開衆妙懸明鏡於講肆陳鴻鐘於靈壇著籙之侶升堂者比迹問道之客及門者成㣥雖列星之仰天津衆山之宗地軸未足以喻也我高祖以大聖締基功踰覆載皇上以欽明纂緒道冠犧農崇三清以緯民懷九仙而濟俗天地交泰中外和平法師維持科戒宏宣經典時歷夷險懷趙璧而無玷年殊盛衰鼓吳濤而不竭跡均有待心叶無為循大小於天倪既齊椿菌忘壽夭於物化寧辨彭殤而靈氣有感仙骨夙著金液方授駕白龍而不反玉棺遽掩望青鳥之來翔以貞觀十二年七月十二日遺形而化春秋九十有七顏色如生舉體柔弱斯蓋仙經所謂尸解者也冕旒惜道門之梁壞搢紳悼人師之云亡固以恩侔撤樂悲踰輟相有敕賜以賻禮資給葬事並加隆焉弟子陳光等義結在三名高入室對衣履而增絶瞻風雲而永慕思欲寄銘讚以敘思勒琬璧以紀德俾夫成銀之室神變久而若在遺履之地靈跡垂於不朽其詞曰西秦簫響東陵聖迹霞舉玉京雲開金液飛廉先路勾芒奉璧形表丹青聲流金石元風誰纂允屬賢明翟衣絶志鶴御依情棲心大道投蹟長生三山可陟九轉方成靈化人間高翔羽服白霓擁蓋青虯夾轂丹竈留烟仙壇餘竹貽則終古永播蘭菊
