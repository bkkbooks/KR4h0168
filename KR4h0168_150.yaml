front:
  text: 全唐文欽定全唐文卷一百五十正倫相州洹水人高祖朝歷齊州總管府録事參軍貞觀中纍遷中書侍郎賜爵南陽縣侯顯慶初纍授黃門侍郎兼崇賢館學士進同中書門下三品遷中書令兼太子賓客宏文館學士封襄陽縣公三年出為橫州刺史卒於貶所
  hash: sha256:d5f3f3bc0e0dd64d53f722dbdd9db5378e433bafb9f00ffefaa4add16be167d5
