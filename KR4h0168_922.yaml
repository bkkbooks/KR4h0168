body:
  text: 先師名貫休字德隱婺州蘭溪縣登高里人也俗姓薑氏家傳儒素代繼簪裾少小之時便歸覺路於安和寺請圓貞長老和尚為師日念法華經一千字數月之內念畢茲經先師與鄰院童子法號處默偕年十餘嵗同時發心念經每於精修之暇更相唱和漸至十五六嵗詩名益著遠近皆聞年二十嵗受具足戒後於洪州開元寺聽法華經不數年間親敷法座廣演斯文邇後兼講起信論可謂三冬涉學百舍求師尋妙旨於未傳起微言於將絶於時江表士庶無不欽風年齒漸高屬天下喪亂時處默和尚謂師曰吾師抱不羈之才懷自然之道時不與我能無傷哉復為先師曰分袂無血淚望處空闌干後隱南嶽闕二字不闕一字先聃為備者曰吾聞岷峨異境山水幽奇四海騷然一方無事遂乃過洞庭趨渚宮歷白帝旋聞大蜀開基創業奄有坤維歎曰不有君子寧能國乎遂達大國進上先皇帝詩其略曰一瓶一鉢垂垂老萬水千山得得來高祖禮待膝之前席過秦主待道安之禮踰趙王迎圖澄之儀特修禪宇懇請住持尋賜師號曰禪月大師曲加存恤優異殊常十年以來迥承天眷無何壬申嵗十二月召門人謂曰古人有言曰地為牀兮天為蓋物何小兮物何大苟愜心兮自欣泰身與名兮何足賴吾之治世亦何久邪然吾啓手足曾無愧心汝等以吾平生事之以儉可於王城外藉之以草覆之以紙而藏之慎勿動衆而厚葬焉言訖奄然而絶息遂具表聞天先帝蹙然久之乃命所司備一期葬事於時在城士庶無不悲傷曇域遂以先師遺言上奏請以薄葬之禮帝曰朕治命可行焉敕命四衆共助葬儀特豎靈塔敕諡白蓮之塔以癸酉年三月十七日於成都北門外十餘里置塔之所地號升仙葬事既周哀制斯畢暇日或勛賢見訪或朝客見尋或有念先師一篇兩篇或記三句五句或未間深旨或不曉根源衆請曇域編集前後所製歌詩文贊日有見問不暇枝梧遂尋檢藁草及暗記憶者約一千首乃雕刻成部題號禪月集曇域雖承師訓藝學無聞曾奉告言輒直序事時大蜀乾德五年癸未嵗十二月十五日序有唐翰林學士兵部侍郎吳融請為敘先師長謂吾門人曰吳公文藻瞻逸學海淵深或以揖讓周旋闕一字待矣或以文害辭或以辭害志或以誕飾饒借則殊不解我意也子可於余所著之末仰重序之曇域乃稽顙而言曰語云子疾病子路欲使門人為臣子曰欺天乎曇域小子何敢敘焉師曰子不知皆孔子弟子記諸善言以成其書况吾常酷於茲心勦形瘵訪奇稽古慰以大道眷然皓首豈為賈其聲耶且吾昔在吳越間靡所濟集聊欲係志於翰墨得以亂思不憗遺老矣子無辭焉但當吾意而言之然又不可以過之樂天長吉似之矣吾若與騷人同時即知殊不相屈耳直言之無相辱也曇域遜讓不暇力而敘之延壽字沖立俗姓王氏餘杭人年十六獻齊天賦於吳越忠懿王年二十八為華亭鎮將以官錢放生坐死獲赦遂出家住天台智者巖天柱寺宋建隆元年忠懿王命主靈隱寺後遷永明道場賜號智覺禪師開寶八年卒年七十二諡永明宗照大師無住般若教海威光諷誦而感通靈異受持而果報昭彰畢使凡身未來而位登寶覺能令促命現世而壽緒金剛洪範五福其一曰壽堅持之者偏承靈佑湖神歸命受淨戒而挫凶暴之威病者投誠愈沈疴而軫慈悲之苦大旨甚深罩古籠今字字演無生之性重重敷不住之音任布七寶之珠珍難偕四句縱捨三恆之身命莫比持心大教正宗真如海藏靈神擁護陰官歸向坐一層金之金榻拔出冥中降五色之祥雲迎歸天上斯經也降心為要無我是宗信解而體齊諸佛受持而福等虛空法力難思不墮刀峯之所神功罔測能超駭浪之中一心受持千聖稱讚滯魄投誠而歸淨道苦戰敗陳而超危難獄官現證冥魂脫而世命增惡友妬心金文隱而霞條散或乃身枷自解母眼雙明口門光耀肉體堅貞天香馥郁仙樂淒清臨法而三刀不斷命講而束素俄呈寫在空中點點而雨霑不溼求於紙內重重而文綵全生是知大報攸長正宗罕措旨妙而難解難入信順而不驚不怖金剛神暗使變肉為骨須菩提密令斷薰啖素因書力而懺罪遇火光而得度積祿延年扶持擁護異哉為㣥典之大還上升覺路一心妙法巧喻蓮華誦持而感通靈瑞校量而福比河沙善神擁護真聖咨嗟知命如見證果非賒兵仗潛空密衛而皆居福地異香滿室坐化而盡駕牛車爾乃然臂歸向焚身供養紫氣騰空而演瑞白光入火而標狀燒時而列宿飛下迹處而金園立相形消骨盡捨珍寶而難可比方火滅煙飛唯心舌而鏗然紅亮書寫經卷功德無邊感佳夢而正誤送金精而入緣白雀呈瑞隱士書詮四衆潛淚哀聞大千寶殿遙分而夢處神僧送藥而病痊妙字才成逝者而已聞生處真文既繕夭喪而忽爾增年帝釋迎前天童侍側暜賢摩頂以慰喻廟神請講而取則口放異光而何假銀燈舌生甘露而豈須玉食投崖不損乏氣增加或施戒而行悲或謗消而難息説法聞於金口得定超於真域能令凡質毛孔孕紫檀之香任壞肉身舌表現紅蓮之色甘雨灑地天花墜空紅燭然於眼裏白蓮生於掌中神遊佛國迹現天宮水滿金瓶自冬溫而夏冷齋陳玉饌遂應供而身通猴侍虎隨除魔去病異花生於講座甘澤霔於談柄冥司隨喜靈神請命扶危懺罪駕苦海之慈航拔死超生懸幽途之明鏡當圓寂之時靈通可知或山崩而地動或花雨而樂隨金殿房中而煥赫寶蓋夢裏而威蕤駕乘潛來見身忽生於他國空聲密報栖神俄託於蓮池食感舍利空中彈指講聞異鐘錫扣池水或救旱而使龍或持咒而降鬼可謂獨妙獨尊盡善盡美任千聖以讚揚難窮妙旨伏以真源湛寂覺海澄清絶名相之端無能所之迹最初不覺忽起動心成業識之由為覺明之咎因明起照見分俄興隨照立塵相分安布如鏡現像頓起根身次則隨相而世界成差後則因智而憎愛不等從此遺真失性執相循名積滯著之情塵結相續之識浪鎖真覺於夢夜沈迷三界之中瞽智眼於昏衢匍匐九居之內遂乃縻業繫之苦闕一字解脫之門於無身中受身向無趣中立趣約依處則分二十五有論正報則具十二類生皆從情想根由遂致依止差別向不遷境上虛受輪回於無脫法中自生繫縛如春蠶作繭似秋蛾赴燈以二見妄想之絲廠田坴苦聚之業質用無明貪愛之翼撲生死之火輪用谷饗言音論四生妍醜以妄想心鏡現三有形儀然後違順想風動搖覺海貪癡愛水資潤苦芽一向徇塵罔知反本發狂亂之知見翳於自心立幻化之色聲認為他法從此一微涉境漸成戛漢之高峯滴水興波終起吞舟之巨浪爾後將欲反初復本約根習鈍不同於一真如界中開三乘五性或見空而證果或了緣而入真或三祇重鍊漸具行門或一念圓修頓成佛道斯則剋證有異一性非殊因成凡聖之名以分真俗之相若欲窮微洞本究肯通宗則根本性離畢竟寂滅絶升沈之異無縛脫之殊既無在世之人亦無滅度之旨二際平等一道清虛識智俱空名體咸寂迥無所有唯一真心達之名見道之人昧之號生死之始復有邪根外種小智權機不了生死之病原罔知人我之見本唯欲厭喧斥動破相析塵雖云味靜冥空不知埋真拒覺如不辨眼中之赤眚但滅燈上之重光罔窮識內之幻身空避日中之虛影斯則勞形役思喪力損功不異足水助冰投薪益火豈知重光在眚虛影隨身除病眼而重光自消息幻質而虛影當滅若能回光就已反境觀心佛眼明而業影空法身現而塵迹絶以自覺之智刃剖開廠田坴內之心珠用一念之慧鋒斬斷塵中之見網此窮心之旨達識之詮言約義豐文質理詣揭疑關於正智之戶剃妄草於真覺之原愈入髓之沈疴截盤根之固執則物我遇智火之焰融唯心之爐名相臨慧日之光釋一真之海斯乃內證之法豈在文詮智解莫窮見聞不及今為未見者演無見之妙見未聞者入不聞之圓聞未知者説無知之真知未解者成無解之大解所冀因指見月得兔忘弟抱一冥宗捨詮檢理了萬物由我明妙覺在身可謂搜抉元根磨礲理窟剔禪宗之骨髓標教網之紀綱餘惑微瑕應手圓淨元宗妙旨舉意全影能摧七慢之山永塞六衰之路塵勞外道盡赴指呼生死魔軍全消影響現自在力闡大威光示真實珠利用無盡傾祕密藏周濟何窮可謂香中其牛頭寶中探其驪頷華中採其靈瑞照中耀其神光食中啜其乳麋水中飲其甘露藥中服其九轉主中遇其聖主故得法性山高頓落㣥峯之峻醍醐海濶橫吞衆派之波似夕魄之騰輝奪小乘之星宿如朝陽之孕彩破外道之昏蒙猶貧法財之人值大寶聚若渴甘露之者遇清涼池為衆生所敬之天作菩薩真慈之父抱膏肓之疾逢善見之藥王迷險難之途遇明達之良導久居閽室忽臨寶炬之光明常處裸形頓受天衣之妙服不求而自得無功而頓成故知無量國中難聞名字塵沙劫內罕遇傳持以如上之因緣目為心鏡現一道而清虛可鑒辟㣥邪而毫髮不容妙體無私圓光匪外無邊義海咸歸顧盼之中萬象形容盡入照臨之內斯乃曹溪一味之旨諸祖同傳鵠林不二之宗㣥經共述可謂萬善之淵府衆哲之元源一字之寶王㣥靈之元祖遂使離心之境文理俱虛即識之塵詮量有據一心之海印楷定圓宗八識之智燈照開邪暗實謂含生靈府萬法義宗轉變無方卷舒自在應緣現迹任物成名諸佛體之號三菩提菩薩修之稱六度行海慧變之為水龍女獻之為天珠天女散之為無著華善友求之為如意寶緣覺悟之為十二緣起聲聞證之為四諦八空外道取之為邪見河異生執之作生死海論體則妙符至理約事則深契正緣然雖標法界之總門須辨一乘之別旨種種性相之義在大覺以圓通重重即入之門唯種智而妙達但以根羸靡鑒學寡難周不知性相二門是自心之體用若具用而失恆常之體如無水有波若得體而闕妙用之門似無波有水且未有無波之水曾無不溼之波以波徹水源水窮波末如性窮相表相達性源須知體用相成性相互顯今則細明總別廣辨異同研一法之根元搜諸緣之本末則可稱宗鏡以鑒幽微無一法以逃形則千差而暜會遂則編羅廣義撮合要文鋪舒於百卷之中卷攝在一心之內能使難思教誨指掌而念念圓明無盡真宗目覩而心心契合若神珠在手永息馳求猶覺樹垂陰全消影迹獲真寶於春池之內拾礫渾非得本頭於古鏡之前狂心頓歇可以深挑見刺永絶疑根不運一毫之功全開寶藏匪用剎那之力頓獲元珠名為一乘大寂滅場真阿練若正修行處此是如來自到境界諸佛本性法門是以暜勸後賢細垂元覽遂得智窮性海學洞真源此識此心唯尊唯勝此識者十方諸佛之所證此心者一代時教之所詮唯尊者教理行果之所歸唯勝者信解證入之所趣諸賢依之而解釋論起千章衆聖體之以宏宣談成四辨所以掇奇提異研精洞微獨舉宏綱大張正綱撈摝五乘機地升騰第一義天廣證此宗利益無盡遂得正法久住摧外道之邪林能令廣濟含生塞小乘之亂轍則無邪不正有偽皆空由自利故發智德之源由利他故立恩德之事成智德故則慈起無緣之化成恩德故則悲含同體之心以同體故則心起無心以無緣故則化成大化心起無心故則何樂而不與化成大化故則何苦而不收何樂而不與則利鈍齊觀何苦而不收則怨親暜救遂使三草二木咸歸一地之榮邪種蕉芽同霑一雨之潤斯乃盡善盡美無比無儔可謂括盡因門搜窮果海故得創發菩提之士初求般若之人了知成佛之端由頓圓無滯明識歸家之道路直進何疑或離此別修隨它妄解如穀角取乳緣木求魚徒歷三祇終無一得若依此旨信受宏持如快舸隨流無諸阻滯又遇便風之勢更加櫓棹之功則疾屆寶城忽登覺岸可謂資糧易辨道果先成披迦葉上行之衣坐釋迦法空之座登彌勒毗盧之閣入暜賢法界之身能令客作賤人全領長者之家業忽使沈空小果頓受如來之記名未有一門匪通斯道必無一法不契此宗過去覺王因茲成佛未來大士仗此證真則何一法門而不開何一義理而不現無一色非三摩鉢地無一聲非陀羅尼門嘗一味而盡變醍醐聞一香而皆入法界風柯月渚並可傳心煙島雲林咸提妙旨步步蹈金色之界念念嗅簷蔔之香掬滄海而已得百川到須彌而皆同一色煥兮開觀象之目盡復自宗寂爾導求珠之心俱還本法遂使邪山落仞苦海收波智楫以之安流妙峯以之高出今詳佛祖大意經論正宗削去繁文唯搜要旨假申問答廣引證明舉一心為宗照萬法如鏡編聯古製之深意撮略寶藏之圓詮同此顯揚稱之曰録分為百卷大約三章立法正宗以為歸趣次申問答用去疑情後引真詮成其圓信以茲妙善暜施含靈同報佛恩共傳斯旨耳思有檢校釋門威儀自像教西流具文東譯學傅師口凡今則多注訣聖情前古未有臣請具幡花奉迎於敬愛寺設齋慶賀其御注經伏乞示天下宜付史官純白新羅國沙門恭惟我國大師始自出昭終於沒齒生緣眷屬觸事因緣即門生金長老允正所修録具門人崔大相仁兗所撰碑述之今白之所記者恭以大師於唐新羅國景明王之天祐年中化緣畢已明王諡號銘塔仍敕崔仁兗侍郎使撰碑文然以世雜人猾難為盛事是以年新月古未立碑文至後高麗國凡平四郡鼎正三韓以顯德元年七月十五日樹此豐碑於太子山者良有良緣者乎爰有國師之門神足國主寺之僧頭乾聖院和尚者法諱讓景俗姓金氏字曰舉國為師而或體或心為王而乍耳乍目將恐芳塵風掃美迹雲消黃絹將爛翠炎弗植師恩雀報自立龜碑和尚王父藹元聖王之表來孫憲康王之外庶舅清廉謠聒於街路忠孝譽酣於尊卑內知執事侍郎外任浿江都護父訪禮才兼六藝學貫五經月下風前屬緣情體物之句春花秋月呈撫絃韻竹之聲內至執事含香外赴朔州長史和尚始自華色終於叟身動止言談行蹤風格可備別録此略言焉且國師碑之與録可記而未記者曰龍潭式照乾聖讓景燕口惠希宥襟允正請龍善現靈長元甫石南迥間嵩山可定太子本定右九師者國師存日羽異在卵未翥青雲之際國師沒後角足成體始遊碧海之中師之在時法席闕一字牛毛之數師之入滅禪座財鐘乳之多人謂之評曰九乳若鐘養九方之佛子一面如鏡正一國之君臣古所謂翼衆銑銑茲焉在焉其允正長老者乾聖同胎之弟也戒高持者名出有人存歿言行門人別録其母氏夢妊盈之日日入於寢室娠季之月月入於密窟果誕乾聖與宥襟也豈翅曇諦母夢二物之徵慧住阿娘獲二果之瑞而已哉仁兗者辰韓茂竣人也人所謂一代三鶴金榜題回曰崔致遠曰崔仁兗曰崔承祐闕一字中中人也學圍海嶽加二車於五車才包風雲除三步於七步實君子國之君子亦大人鄉之大人是或折桂中花扇香風於上國得蔥羅域推學究於東鄉承大師重席之恩撰大師鴻碑之記白也執尺占天冉終近遠傾蠡酌海豈度少多然則言而不常默猶不可後來君子取之捨之而已賢義廣順三年益都縣大雲寺講經沙門伏自玉毫掩相求瞻覩以無由金像遺蹤猶修崇之可託且我佛住世莫久像教是依了達者位證三乘漸成者道隆五福伏以雲門山大雲寺者未可知其始建之時也因覽古碑云開皇年中曾有修建但以寺居峻嶺地枕長郊覩聖像之陵夷見精藍之荒廢近則雖興新搆必知未稱舊基唯有壁龕彌勒石像依稀相闕一字隱映儀形風雨交侵間損雕鎪之質嵗華綿邈全無彩繪之蹤蓋事有廢興理關舒慘豈斯期今日獲遇信心闕一字清信弟子彭仁福本貫浙江寓居海岱固安賜履未遂三乘唯闕一字夙懷善因便至信知修崇之可託明幻惑之不堅是以廣闕二字因投諸蘭若此則因參遠寺傍覩真容遂乃慎選良工精求彩筆果得入神之妙闕一字瞻如在之儀重新兩龕加闕一字修飾雖遙奈苑何異闕一字峯一㣥遠黎豈起闕二字之想四來闕二字頓生恭敬之心諒此淨因必獲多福更有會同良友亦是闕一字知各起齋心助成勝事仍雕闕六字庶使萬古千秋不泯增修之狀陵遷谷變常開化導之門如賢義者迹忝緇衣辭虧黃絹常復斯言之戒敢述刊述之文蓋猥付非才而堅令敘録既難退讓何免言衍尢謹題釋遠六祖法嗣號龍門法眼禪師心元虛映體絶偏圓金波匝匝動寂常禪念起念滅不用止絶任運滔滔何曾起滅起滅寂滅現大迦葉坐臥經行未嘗間歇禪何不坐坐何不禪了得如是始號坐號禪坐者何人禪是何物而欲坐之用佛覓佛佛不用覓覓之轉失坐不我觀禪非外術初心閙亂未免回換所以多方教渠靜觀端坐收神初則紛紜久久恬淡虛間六門六門稍歇於中分別分別才生巳成起滅起滅轉變從此心現還用自心反觀一遍一反不再圓光頂戴靈焰騰輝心心無礙橫該豎入生死永息一粒還丹點金成汁身心客塵透漏無門迷悟且説逆順休論細思昔日冷坐尋覓雖然不別也大狼籍剎那凡聖無人能信匝地忙忙大須謹慎如其不知端坐思危一日築著伏惟伏惟三自省察是身壽命如駒過隙何暇間情妄為雜事既隆釋種須紹門風諦審先宗是何標格道業未辦去聖時遙善友師教誠不可捨自生勉勵念報佛恩惟已自知大心莫追報緣虛幻不可強為浮世幾何隨家豐儉苦樂逆順道在其中動靜寒溫自愧自悔華嚴以十法界總攝多門示無盡之理禪門有十元談以明唱道洞山有十不歸以表超證山僧述十可行以示後生庶資助道譬諸蓬生麻中不扶而直又如染香之人亦有香氣有少益者書之於后僧姓氏無考居終南太一山自法王命駕遵之者九乘宏傳聲教統之者三藏然則指月之喻無爽於恆規因言之義有契於常則所以實相窅冥開宗於文字權道綜御崇尚於方言且夫一音各解惟聖之筌蹄隨緣別悟在凡之準的西梵天語邃古莫虧東華人言沿時遷貿至於説文在漢字止九千韻集出唐言增三萬代代繁廣符六文而挺生時時間發寄八體而陳迹求真本據諒在前後核其離廣誠歸物議夫以佛教東翻六百餘載舉其綱紐三千餘軸隨部出音聞之往説殷鑒㣥録未曰大觀然則必也正名孔君之貽誥隨俗言晤釋父之流慈非相無以引心非聲無以通解有大慈恩寺元應法師博聞強記鏡林花之宏標窮討本支通古今之互體故能讐校源流勘閲時代刪雅古之野素削澆薄之浮雜悟通俗而顯教舉集略而騰美真可謂文字之鴻圖言音之龜鏡者也以貞觀末歷敕召參傳綜經正緯咨為實録因繹尋閲捃拾藏經為之音義注釋訓解援引㣥籍證據章明煥然可領結成三帙自前代所出經論諸音依字直反曾無追顧致失教義實迷匡俗今所作者全異恆倫隨字刪定隨音徵引並顯唐梵方言翻度雅鄭推十代之紕紊定一朝之風法文非詞費務在綱正恐好異者輒復略之斯則得於要約失於義本救弊開信終掩元化故重陳委悉無昧焉序之云爾
