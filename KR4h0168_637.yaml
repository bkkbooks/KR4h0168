front:
  text: 全唐文欽定全唐文卷六百三十七李翺四
  hash: sha256:b9c39d737604a93c1ab5ba0f7297f09197f05ef40c810cc637628fe72c9e794a
body:
  text: 居士處深在察微萌雖有讒慝不能蔽明漢之孝昭睿過周成上書知詐照奸得情燕蓋既折王猷治平百代之後乃流淑聲人之愛我我度於義義則為朋否則為利人之惡我我思其由過寧不改否又何仇仇實生怨利實害德我如不思乃陷於惑內省不足愧形於顏中心無他曷畏多言唯咎在躬若市於戮慢謔自它匪汝之辱昔者君子惟禮是持自小及大曷莫從斯苟遠於此其何不為事之在人昧者亦知遷焉及己則莫之思造次不戒禍焉可期書之在側以為我師晝日居於是窮性命於是待賓客交其賢者亦於是有客曰翺銘於是先時寢壞有隘其廬乃作斯堂高嚴旟旟六桷四楹重架虛欒栱不設簷蜚祛祛麗不越度儉而有餘左立嘉亭繚以環除延延其深肆肆其紓吏事既退齊心以居思民之病擇弊而鉏弗逸弗墜謹終猶初大旱之後鄰邑成墟獨我州氓樂哉胥胥鬼神所福事匪在豫丞相所言乃下徵書復官於朝以解前疽刻銘於斯永示㣥舒維泗州開元寺遭罹水火漂焚之餘僧澄觀與其徒僧若干復舊室居作大鐘貞元十五年厥功成於是隴西李翺書辭以紀之八月梓人功既休戊寅大鐘成先時厥初罹於天菑波沈火燔既浮為薪既蜚為塵澄觀之功恢復其居革舊而新環墉如陵臺殿斯嚴乃三其門俾後勿踰其徒不譁咸復其勤有加於初屋室既同乃範乃鎔乃作大鐘乃懸於樓以鼓其時以警淮夷非雷非霆鏗號其聲淮夷其驚上天下地弗震弗墜大音無斁千僧戮力願昭其績乃銘於石長慶二年十二月江州刺史李君濬之截南陂築堤三千五百尺高若干尺廣若干尺以通四鄉之路畜水為湖人得其贏正月既畢事舒州刺史李翺詞以紀之詞曰天地作物功或不周賢人相之智與神侔漭漭南陂冬乾夏滮九江暴漲潛潮逆流東南百步城市所繇水積既深大波其虎風亦有舟航覆溺之憂擔壅疊路車軔其輈童嬰涕墮老婦號愁歷古逮茲孰為氓籌濬之之來養民如身乃築長堤距江之瀕厚其錢傭以飽餓人南北東西百里鬬臻莫不用力千鎚響振虓歡相勵不督而勤堤既成止岡聯突起堅若石城障為瀦水蒲莞菱芡鴻鶬鱣鯉唯其所取或食或祀長堤坦坦植之楊槐架豁飛圮以便去來除險作利非賢不能歌示江人式悅汝懷九津九星橫河中天下有道津梁通石穹隆兮與天終日月星辰經乎天天之文也山川草木羅乎地地之文也志氣言語發乎人人之文也志氣不能塞天地言語不能根教化是人之文紕繆也山崩川涸草木枯死是地之文裂絶也日月暈蝕星辰錯行是天之文乖盩也天文乖盩無久覆乎上地文裂絶無久載乎下人文紕繆無久立乎天地之間故文不可以不慎也夫毫分寸之長必有中焉咫尺尋常之長必有中焉百千萬里之長必有中焉則天地之大亦必有中焉居之中則長短大小高下雖不一其為中則一也是以出言居乎中者聖人之文也倚乎中者希聖人之文也近乎中者賢人之文也背而走者蓋庸人之文也中古以來至於斯天下為文不背中而走者其希矣豈徒文背之而已其視聽識言又甚於此者矣凡人皆有耳目心口耳所以察聲音大小清濁之異也目所以別采色朱紫白黑之異也心所以辨是非賢不肖之異也口所以達耳之聰導目之明宣心之智而敦教化風俗期所以不怍天地人神也然而耳不能聽聲惡得謂之耳歟目不能辨色惡得謂之目歟心不能辨是非好惡惡得謂之心歟口不能宣心之智導目之明達耳之聰惡得謂之口歟四者皆不能於己質形虛為人爾其何以自異於犬羊麋鹿乎哉此皆能已而不自用焉則是不信已之耳目心口而信人之耳目心口者也及其師曠之聰離婁之明臧武仲之智宰我之言則又不能信之於己其或悠然先覺者必謂其狂且愚矣昔管仲以齊桓霸天下攘夷狄華夏免乎被髮左袵崇崇乎功亦格天下溢後世而曾西不忍為管仲也孟子又不肯為曾西向使孟子曾西生於斯世秉其道終不易持其道終不變吾知夫天下之人從而笑之又從而詬之曰狂民爾頑民爾是其心惡有知哉曾西孟子雖被訕謗於天下亦必固窮不可拔以須後聖爾其肯畏天下之人而動乎心哉世俗之鄙陋迫隘也如此夫何敢復言安得曾西孟子而與之昌言哉龍與蛇皆食於鳳龍智而神其德無方鳳知其可與皆為靈也禮而親之蛇毒而險所忌必傷且惡其得於鳳也不惟齧龍雖遇麟龜固將噬之而亡之鳳知蛇不得其欲則將協豹犬而來吠嘷也賦之食加於龍以龍之神浮於食也將使飽焉終畏蛇而不能麟與龜瞪而謳曰鳳兮鳳兮何德之衰往者不可諫來者猶可追已而已而既而麟傷於毒伏於窟龜屏氣潛於殼蛇偵龍之寐以毒攻其喉而龍走鳳喪其助於是下翼而不敢靈也有小鳥止於人之家其色青鳩鵲鳥之屬咸來哺之未久野之鳥羽而蜚者皆以物至如將哺之其蟲積焉㣥鳥之鳴聲雜相亂是鳥也一其鳴而萬物之聲皆息人皆以為妖也吾詎知其非鳳之類耶古之說鳳者有狀或曰如鶴或曰如山雞皆與此不相似吾安得知其鳳之類耶鳳禽鳥之絶類者也猶聖人之在人也吾聞知賢聖人者觀其道由黃帝堯舜禹湯文王至於孔子顏回不聞記其形容有相同者是未可知也如其同也孔子與顏回並立於時魯國人曷不曰孔之回而顏之某乎是可知也陽貨之狀類孔子聖人是以畏於匡不書七十子之服於陽貨也有人焉其容貌雖如歡兜惡來顏回子路七十子苟從而師之者斯為聖人矣故曰知賢聖人者觀其道似鳳而不見其靈者山雞也則可似其形而鳳之云耶天下之鳥雖鳳焉鷹鸇鵾鴻其肯鳳之耶是鳥也其形如斯㣥鳥皆敬而畏之非鳳類而何鳥至於宋州之野當貞元十四年有乘國馬者與乘駿馬者並道而行駿馬囓國馬之鬃血流於地國馬行步自若也精神自若也不為之顧如不知也既駿馬歸芻不食水不飲立而栗者二日駿馬之人以告國馬之人曰彼蓋其所羞也吾以馬往而喻之斯可矣乃如之於是國馬見駿馬而鼻之遂與之同櫪而芻不終時而駿馬之病自已夫四足而芻者馬之類也二足而言者人之類也如國馬者四足而芻則馬也耳目鼻口亦馬也四支百骸亦馬也不能言而聲亦馬也觀其所以為心者則人也故犯而不校國馬也過而能改駿馬也有人焉恣其氣以乘人人容之而不知者多矣觀其二足而言則人也耳目鼻口亦人也四支百骸亦人也求其所以為人者而弗得也彼人者以形骸為人國馬者以形骸為馬以彼人乘國馬人皆以為人乘馬吾未始不謂之馬乘人悲夫王野人名體靜蓋同州人始遊浮山觀原未有室居縫紙為裳取竹架樹覆以草獨止其下豺豹熊象過而馴之弗害也積十年乃構草堂植茶成園犁田三十畝以供食不畜妻子少言說有所問盡誠以對人或取其絲約酬利弗問姓名皆與或負之者終不言凡居二十四年年六十二貞元二十五年五月卒於觀原茶園村人相與鑿木為空盛其尸埋於園中觀原積無人居因野人遂成三百家有尚怪者因謬謂王野人既死處士陳恆發其棺惟見空衣翺與陳相遇問其故恆曰作記者欲神浮山故妄云然元和四年十一月翺以節度掌書記奉牒知循州五年正月准制祭名山大川翺奉牲牢祭於山致帝命遂使斫木為棺命將吏村人改葬野人遷於佛寺南岡其骨存焉乃立木於墓東志曰王處士葬於此削去謬記以解觀聽者所惑或曰貴與富在我而已以智求之則得之不求則不得也何命之謂哉或曰不然求之有不得者有不求而得之者是皆命也人事何為二子出或問曰二者之言其孰是耶對曰是皆陷人於不善之言也以智而求之者盜耕人之田者也皆以為命者弗耕而望收者也吾無取焉爾循其方由其道雖祿之以千乘之富舉而立諸卿大夫之上受而不辭非曰貪也私於己者寡而利於天下者多故不辭也何命之有焉如取之不循其方用之不由其道雖一飯之細也猶不可受况富貴之大耶非曰廉也利於人者鮮而賊於道者多故不為也何智之有焉然則君子之術其亦可知也已學者多稱仲尼歷聘不遇吾謂仲尼觀禮行道不歷聘不遇也夫二國交歡曰聘以臣使於君亦曰聘男輸財於女國駕帛於士皆曰聘故無財與無君國之命不曰聘也當德蝕衰周道徂七國蓋仲尼傷禮樂不起是以學韶於齊求師於周將欲鑄義以鏡國張仁以羅俗使明備為宗資也且去魯適衛蓋辭在於仕矣自宋之鄭殆非臣矣絶糧於陳蔡亦無財矣官至司寇果不為士安謂聘哉吾聞天子觀夏道則之杞觀殷道則之宋較是而言雖他國可知也安謂歷聘哉元和六年八月余自京還東暮宿在江濤水既平月高極明萬物潛休遠無微聲坐久夜靜目亦將瞑聞江中有如賈人相與言曰與子商遊十有餘年不識我愚託我如親相得之歡百賈誰如泰山後召子欲代豫力雖不能志願如初自昔及茲未嘗汝薄利必以告害斯共度誓當結固永守終樂汝之責人慘若五刑小不順汝亦何足聽汝心好惡灼若天星動比孔某其神且明異汝者斥諂汝者榮苟不汝隨絶如詛盟人實難知堯所未易我雖受責敢喪前志利汝薦汝每憂不暨終何能成惟力所至豈不汝怨我道無二曰豫虛言鬼神來棄汝實異茲翻然汝作瘡疣生心洗刮不落巧蔽我長善探我惡短我如墜譽我如縛人或美我汝閃其目人或毀我汝盈其欲充汝之心飽汝之腹雖汝子孫亦所不足我實蒙頑為汝之辱動多尤悔嬴敗不畜汝既富厚享天百福筋骨堅強婢妾約綽財貨積委屋室豐渥我從此去非曰道薄願汝我忘無盛其毒言未訖余叱之曰人生若流其可久長須臾臭死瞥若電光用心平虛天靈所臧得失是非其細如芒奚為交爭此實不祥相歡不足其氣已僵汝行吾言可以息兵於是言者歎息吐氣掩鬱無語啓戶視之不見其處翺至零口北有畜雞二十二者七其雄十五其雌且飲且啄而又狎乎人翺甚樂之遂掬粟投於地而呼之有一雄雞人截其冠貌若營㣥望我而先來見粟而長鳴如命其衆雞衆雞聞而曹奔於粟既來而皆惡截冠雄雞而擊之而曳之而逐出之已而競還啄其粟日之暮又二十一其㣥棲於楹之梁截冠雞又來來如慕侶將登於梁且棲焉而仰望焉而旋望焉而小鳴焉而大鳴焉而延頸喔咿其聲甚悲焉而遂去焉去於庭中直上有木三十餘尺鼓翅哀鳴飛而棲其樹顛翺異之曰雞禽於家者也備五德者也其一曰見食命侶義也截冠雄雞是也彼衆雞得非幸其所呼而來耶又奚為既來而共惡所呼者而迫之耶豈不食其利背其惠耶豈不畏喪其見食命侶之一德耶且何衆棲而不使偶其㣥耶或告曰截冠雄雞客雞也子里東鄙夫曰陳氏之雞焉死其雌而陳氏寓之於我㣥焉勇且善鬬家之六雄雞勿敢獨校焉是以曹惡之而不與同其食及棲焉夫雖善鬬且勇亦不勝其衆而常孤遊焉然見食未嘗先啄而必長鳴命侶焉彼衆雞雖賴其召召既至反逐之昔日亦猶是焉截冠雄雞雖不見答然而其迹未曾變移焉翺既聞之惘然感而遂傷曰禽鳥微物也其中亦有獨禀精氣義而介焉者客雞義勇超於㣥㣥皆妒焉尚不與儔焉况在人乎哉况在朋友乎哉况在親戚乎哉况在鄉黨乎哉况在朝廷乎哉由是觀天地間鬼神禽獸萬物變動情狀其可以逃乎吾心既傷之遂志之將用警豫且可以作鑒於世之人夏尚忠殷尚敬周尚文何也曰帝王之道非尚忠也非尚敬與文也因時之變以承其弊而已矣救野莫如敬救鬼莫如文救僿莫如忠循環終始迭相為救如火之菑而燒也人知其勝之於水矣勝於水者土也水之潰遏其流者則必大為之防矣故夏禹之政尚忠殷湯之政尚敬武王之政尚文各適其宜也如武王居禹之時則尚忠矣湯居武王之時則尚文矣禹與湯交地而居則夏先敬而殷尚乎忠矣故適時之宜而補其不得者三王也使黃帝堯舜居三王之天下則亦必為禹湯武王之所為矣由是觀之五帝之與夏商周一道也若救殷之鬼不以文而曰我必以夏之忠而化之是猶適於南而北轅其到也無日矣孔子聖人之大者也若孔子王天下而傳周其救文之弊也亦必尚乎夏道矣是文與忠敬皆非帝王之所尚也乃帝王之所以合變而行權者也因時之變以承其弊者也不可休而作為之者也善理其家者親父子殊貴賤別妻妾男女高下內外之位正其名而已矣古之善治其國者先齊其家言自家之型於國也欲其家之治先正其名而辨其位之等級名位正而家不治者有之矣名位不正而能治其家者未之有也是故出令必當行事必正非義不言三者得則不勸而下從之矣出令不當行事不正非義而言三者不得雖日撻於下下畏其刑而不敢違欲其心服而無辭也其難矣或寵其妻或嬖其妾或聽其子或任其所使既愛之則必信其邪言信其邪言則害於人也多益於身者無有苟如此則名位必僭矣他人拒其間則不和順其過則虧禮不正之則上下無章正之則不得其情不如已者言之則為愚賢於己者言之則為吾欺此治家之所以難也彼人者豈言其家之不治哉縱其心而無畏欲人之於我無違故及於斯而不知也然則可改而為善乎曰耳目鼻口四支百骸與聖人不殊也聖人之道化天下我獨不能自化亦足羞也思其不善而棄之則百善成雖希於聖人猶可也改為何有如不思而肆其心之所為則雖聖人亦無可奈何百骸之中有心焉與聖人無異也嚚然不復其性惑矣哉道其心弗可以庶幾於聖人者自棄其性者也終亦亡矣茫茫乎其將何所如冉求非不足乎力者也畫而止進而不止者顏子哉噫顏子短命故未到乎仲尼也潢汙之渟不流也決不到海矣河出崑崙之山其流徐徐行而不休終入於海吾惡知其異於淵之自出者邪貞元十五年六月二十九日隴西李翺敬載拜於禹之堂下自賓階升北面立弗敢嘆弗敢祝弗敢祈退降復敬再拜哭而歸且歌曰惟天地之無窮兮哀生人之常勤往者吾弗及兮來者吾弗聞已而已而人之所以為聖人者性也人之所以惑其性者情也喜怒哀懼愛惡欲七者皆情之所為也情既昏性斯匿矣非性之過也七者循環而交來故性不能充也水之渾也其流不清火之煙也其光不明非水火清明之過沙不渾流斯清矣煙不鬱光斯明矣情不作性斯充矣性與情不相無也雖然無性則情無所生矣是情由性而生情不自情因性而情性不自性由情以明性者天之命也聖人得之而不惑者也情者性之動也百姓溺之而不能知其本者也聖人者豈其無情耶聖人者寂然不動不往而到不言而神不耀而光制作參乎天地變化合乎陰陽雖有情也未嘗有情也然則百姓者豈其無性耶百姓之性與聖人之性弗差也雖然情之所昏交相攻伐未始有窮故雖終身而不自覩其性焉火之潛於山石林木之中非不火也江河淮濟之未流而潛於山非不泉也石不敲木不磨則不能燒其山林而燥萬物泉之源弗疏則不能為江為河為淮為濟東匯大壑浩浩蕩蕩為弗測之深情之動靜弗息則不能復其性而燭天地為不極之明故聖人者人之先覺者也覺則明否則惑惑則昏明與昏謂之不同明與昏性本無有則同與不同二皆離矣夫明者所以對昏昏既滅則明亦不立矣是故誠者聖人性之也寂然不動廣大清明照乎天地感而遂通天下之故行止語默無不處於極也復其性者賢人循之而不已者也不已則能歸其源矣易曰夫聖人者與天地合其德日月合其明四時合其序鬼神合其吉凶先天而天不違後天而奉天時天且勿違而况於人乎况於鬼神乎此非自外得者也能盡其性而已矣子思曰惟天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化聖人知人之性皆善可以循之不息而至於聖也故制禮以節之作樂以和之安於和樂樂之本也動而中禮禮之本也故在車則聞鸞和之聲行步則聞佩玉之音無故不廢琴瑟視聽言行循禮法而動所以教人忘嗜欲而歸性命之道也道者至誠而不息者也至誠而不息則虛虛而不息則明明而不息則照天地而無遺非他也此盡性命之道也哀哉人皆可以及乎此莫之止而不為也不亦惑耶昔者聖人以之傳於顏子顏子得之拳拳不失不遠而復其心三月不違仁子曰回也其庶乎屢空其所以未到於聖人者一息耳非力不能也短命而死故也其餘升堂者蓋皆傳也一氣之所養一雨之所膏而得之者各有淺深不必均也子路之死也石乞孟黶以戈擊之斷纓子路曰君子死冠不免結纓而死由非好勇而無懼也其心寂然不動故也曾子之死也曰吾何求焉吾得正而斃焉斯已矣此正性命之言也子思仲尼之孫得其祖之道述中庸四十七篇以傳於孟軻軻曰我四十不動心軻之門人達者公孫丑萬章之徒蓋傳之矣遭秦滅書中庸之不焚者一篇存焉於是此道廢缺其教授者惟節文章句威儀擊劍之術相師焉性命之源則吾弗能知其所傳矣道之極於剝也必復吾豈復之時耶吾自六嵗讀書但為詞句之學志於道者四年矣與人言之未嘗有是我者也南觀濤江入於越而吳郡陸傪存焉與之言之陸傪曰子之言尼父之心也東方如有聖人焉不出乎此也南方如有聖人焉亦不出乎此也惟子行之不息而已矣於戲性命之書雖存學者莫能明是故皆入於莊列老釋不知者謂夫子之徒不足以窮性命之道信之者皆是也有問於我我以吾之所知而傳焉遂書於書以開誠明之源而缺絶廢棄不揚之道幾可以傳於時命曰復性書以理其心以傳乎其人於戲夫子復生不廢吾言矣或問曰人之昏也久矣將復其性者必有漸也敢問其方曰弗慮弗思情則不生情既不生乃為正思正思者無慮無思也易曰天下何思何慮又曰間邪存其誠詩曰思無邪曰已矣乎曰未也此齊戒其心者也猶未離於靜焉有靜必有動有動必有靜動靜不息是乃情也易曰吉凶悔吝生於動者也焉能復其性耶曰如之何曰方靜之時知心無思者是齊戒也知本無有思動靜皆離寂然不動者是至誠也中庸曰誠則明矣易曰天下之動貞夫一者也問曰不慮不思之時物格於外情應於內如之何而可止也以情止情其可乎曰情者性之邪也知其為邪邪本無有心寂然不動邪思自息惟性明照邪何所生如以情止情是乃大情也情互相止其有已乎易曰顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不遠復無祇悔元吉問曰本無有思動靜皆離然則聲之來也其不聞乎物之形也其不見乎曰不覩不聞是非人也視聽昭昭而不起於見聞者斯可矣無不知也無弗為也其心寂然光照天地是誠之明也大學曰致知在格物易曰易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此曰敢問致知在格物何謂也曰物者萬物也格者來也至也物至之時其心昭昭然明辨焉而不應於物者是致知也是知之至也知至故意誠意誠故心正心正故身修身修而家齊家齊而國理國理而天下平此所以能參天地者也易曰與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體一陰一陽之謂道此之謂也曰生為我說中庸曰不出乎前矣曰我未明也敢問何謂天命之謂性曰人生而靜天之性也性者天之命也率性之謂道何謂也曰率循也循其源而反其性者道也道也者至誠也至誠者天之道也誠者定也不動也修道之謂教何謂也故曰誠之者人之道也誠之者擇善而固執之者也修是道而歸其本者明也教也者則可以教天下矣顏子其人也道也者不可須臾離也可離非道也說者曰其心不可須臾動焉故也動則遠矣非道也變化無方未始離於不動故也是故君子戒慎乎其所不覩恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也說者曰不覩之覩見莫大焉不聞之聞聞莫甚焉其心一動是不覩之覩不聞之聞也其復之不遠矣故君子慎其獨慎其獨者守其中也問曰昔之注解中庸者與生之言皆不同何也曰彼以事解者也我以心通者也曰彼亦通於心乎曰吾不知也曰如生之言修之一日則可以至於聖人乎曰十年擾之一日止之而求至焉是孟子所謂以杯水而救一車薪之火也甚哉止而不息必誠誠而不息則明明與誠終嵗不違則能終身矣造次必於是顛沛必於是則可以希於至矣故中庸曰至誠無息不息則久久則徵徵則悠遠悠遠則博厚博厚則高明博厚所以載物也高明所以覆物也悠久所以成物也博厚配地高明配天悠久無疆如此者不見而章不動而變無為而成天地之道可一言而盡也問曰凡人之性猶聖人之性歟曰桀紂之性猶堯舜之性也其所以不睹其性者嗜欲好惡之所昏也非性之罪也曰為不善者非性耶曰非也乃情所為也情有善有不善而性無不善焉孟子曰人無有不善水無有不下夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其所以導引之者然也人之性皆善其不善亦猶是也問曰堯舜豈不有情耶曰聖人至誠而已矣堯舜之舉十六相非喜也流共工放歡兜殛鯀竄三苗非怒也中於節而巳矣其所以皆中節者設教於天下故也易曰知變化之道者其知神之所為乎中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉易曰唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至聖人之謂也問曰人之性猶聖人之性嗜欲愛憎之心何因而生也曰情者妄也邪也邪與妄則無所因矣妄情滅息本性清明周流六虛所以謂之能復其性也易曰乾道變化各正性命論語曰朝聞道夕死可矣能正性命故也問曰情之所昏性即滅矣何以謂之猶聖人之性也曰水之性清徹其渾之者沙泥也方其渾也性豈遂無有耶久而不動沙泥自沈清明之性鑒於天地非自外來也故其渾也性本勿失及其復也性亦不生人之性亦猶水之性也問曰人之性本皆善而邪情昏焉敢問聖人之性將復為嗜欲所渾乎曰不復渾矣情本邪也妄也邪妄無因人不能復聖人既復其性矣知情之為邪邪既為明所覺矣覺則無邪邪何由生也伊尹曰天之道以先知覺後知先覺覺後覺者也豫天民之先覺者也豫將以此道覺此民也非豫覺之而誰也如將復為嗜欲所渾是尚不自覺者也而况能覺後人乎曰敢問死何所之耶曰聖人之所明書於策者也易曰原始反終故知死生之說精氣為物游魂為變是故知鬼神之情狀斯盡之矣子曰未知生焉知死然則原其始而反其終則可以盡其生之道生之道既盡則死之說不學而自通矣此非所急也子修之不息其自知之吾不可以章章然言且書矣晝而作夕而休者凡人也作乎作者與萬物皆作休乎休者與萬物皆休吾則不類於凡人晝無所作夕無所休作非吾作也作有物休非吾休也休有物作耶休耶二者皆離而不存豫之所存者終不亡且離矣人之不力於道者昏不思也天地之間萬物生焉人之於萬物一物也其所以異於禽獸蟲魚者豈非道德之性全乎哉受一氣而成形一為物而一為人得之甚難也生乎世又非深長之年也以非深長之年行甚難得之身而不專專於大道肆其心之所為則其所以自異於禽獸蟲魚者亡幾矣昏而不思其昏也終不明矣吾之生二十有九年矣思十九年時如朝日也思九年時亦如朝日也人之受命其長者不過七十八十年九十年百年者則稀矣當百年之時而視乎九年時也與吾此日之思於前也遠近其能大相懸耶其又能遠於朝日之時耶然則人之生也雖享百年若雷電之驚相激也若風之飄而旋也可知矣况千百人而無一及百年之年者哉故吾之終日志於道德猶懼未及也彼肆其心之所為者獨何人耶
