  text: 全唐文欽定全唐文卷六百九十三存誠字資明河東人第進士元和中纍拜給事中遷御史中丞卒贈刑部侍郎
  hash: sha256:1e8c3a2817f4a85c0c31384d480a43820f9d35a54fc66659505ed73d1ba67f27
  markers:
  - {type: head, offset: 14, content: 薛存誠, id: KR4h0168_NFKB_693-h1, level: 1}
body:
  text: 上帝乃眷下顧豐我皇祚産禎石以報德約遠人以遐赴外輝煥以發章內清明而含素方圓冰潔篆隸星布五千符聖歷之長一九合太陽之數瑩然非追琢所及忽爾若神靈來附考乎文也知諸受命之期徵乎石焉示此維城之固且夫文旌乎實石堅乎質垂本根以繁茂作元后之貞吉驗符而天命有歸貽慶而孫謀莫失方洛書以自來狀河圖以負出懿夫皪彩發鮮隱起成妍貿非工斫字乃神鐫移篆文於玉璽之上取隸則於銅棺之前紛鳥迹以屆漢若飛騰而在泉帝拜昌言慶實延於卜代名傳聖運功何異於補天苟不思而來暨恭承眷於上元信乎瑞以勤致彰乎天賜其為后也貴乎無得而稱其為石也下乃不求而致豈比夫渭濱之璜兮空言佐命峴首之碑兮永沉文字孰若我垂吉祚於當時演昌期於後嗣且夫文可嘉而不可卷石可固而不可轉題八角而爾乃增輝刻九言而吾斯盡善宜子孫之蟄蟄得先徵於隸篆太宗勞謙垂制虔告上帝伊連被而莫紀自高祖而流裔其石也為遐玉之祥惟孤也實先君之系誠降慶之所致敢欺紿於輿隸於是公卿列辟劒佩鏘鏘聯趨詣石載拜稱觴斯萬人之有慶表二聖之重光不然何炫發於石玉侔其相瑩煌無點璀璨有章帝曰祖考之德惟覃股肱之能以參故天錫之罔替諒不穀而何堪惟神化之所感何禎祥之必臻位將天而同德天與日而共新百靈扶於三善萬象資乎一人是以英聲遠被嘉貺必陳於是祕其迹則如畫如隱圖其文則匪雕匪刻屈若絲縈舒同髮直彩非因染辭無假飾雖真籙之可觀固神功之靡測若乃煙消字發苔落文生映月波起含日金明彰八千之綿祚著三代之珍名或鸞回而鳳轉乍雲點而霜橫法兼篆籀體備形聲信天筆之攸假實神翰之所成至如桂影宵臨星光夜燭分若珠解連同瓊續映朝霞以散錦流夕露以垂玉紀三皇之故事包五代之遺躅足使濁河龍泳清洛龜沈既超前而冠後亦挾古而光今所以管絃流韻鐘石凝音豈獨妙符至理固亦道叶乾心總㣥瑞以考徵實表盛乎貞紀騰茂實於千載激清流乎萬祀元象煥以呈祥靈山鬱以效祉明皇期一作基之永固與天地乎終始嗟微臣之菲薄屬欽明於暮齒望天闕以長謠情顧戀其何已也戣字君嚴冀州人登進士第元和初授嶺南節度使穆宗立召為吏部侍郎改右散騎常侍轉尚書左丞以禮部尚書致仕長慶四年卒年七十三贈兵部尚書諡曰貞臣某言臣聞七十致政禮經格言此蓋先王立教示人有終也苟或冒榮貪祿不知其退亦搢紳之醜也今臣年已過矣耄亦及之顧盼班行每懷慙靦幸屬聖明御宇多士盈朝百度既貞萬靈遂性躍魚戲在藻之樂野夫盡擊壤之歡微臣叨逢此時得以陳露而猶進不知止懼損明風况齒髮已衰筋力不逮雖列官次恐貽敗闕伏以南宮左轄華省紀綱政理所關選用為重豈臣衰朽久膺此任伏乞聖鑒察臣誠懇賜臣骸骨歸老邱園所冀聖朝無浮食之人微臣免強飯之責將違聖代戀闕誠深無任悃欵之至右中使某至伏奉墨詔並賜藥金一合神刀等俯循陋質仰戴殊私渤澥無比其深山嶽無方其重臣蓽門賤品環堵諸生乏禦侮之籌謀罕濟時之方略而因緣官學塵忝班行效無可稱事每逾量聖慈過聽擢領藩方祗命戒途不敢陳讓省躬撫事益懼菲才今又特降王人遠臨郊甸寶刀出於武庫上藥本於金精足以蠲除疫癘激發忠勇顧惟孱懦承此寶光捐軀盡節豈足為報無任感戀懇款之至右中使至奉宣進止將前件馬送臣至京兆路界祗承寵光載兢載惕微臣猥以庸瑣謬分憂寄拜命之日已受賜於龍媒遵路之時復假榮於天驥恩私稠疊渥澤殊常豈謂聖意不遺獨懷軫念輟驊騮於內廣既騁逸步於長衢驅馳忘勞服習如志誓當夙駕奔走所部冀安夷獠以免聖憂無任感恩懇款之至右臣聞唐德格天列聖垂祐必紀名號以彰治功伏惟元和聖文神武法天應道皇帝陛下纘戎十聖時乘六龍躬一德而善繼丕承罄有形而天覆地載既休武力方用文經遺步驟於殷周振聲容於華夏既而天人合應億兆叶心探至道於邦家之先揭鴻猷於強名之域陛下初違㣥議方守謙光旋體至公遽回慈眷德意既降盛禮將陳凡在品彙無任幸甚臣以待罪遐徼不獲稱慶闕庭徒勤子牟江海之心有同太史滯留之日無任歡抃之至臣聞帝皇立極必建儲二俾承宗祧所以祗奉粢盛永固社稷者也伏惟睿聖文武皇帝陛下積德承業光有天下思正國本以和人心載考春秋之義以明君臣之道主茲匕鬯允屬元良推明至公振舉舊典皇太子體仁秉哲既嫡且賢溫文發中孝友聞外欽若丕訓允膺册禮陛下將嗣十聖之休烈垂百代之懿範大備禮物廣設明庭陰氣方晦而忽銷旭日既升而增朗夷夏胥悅神祗克諧足以包夏孕商跨周軼漢夫何晉魏以降易置瑣瑣不足侔比盛禮既畢洪恩又洽恤刑議獄旌善賞勞禮問高年存恤疾隱皇王之德於茲備矣臣忝列近侍親承睿謨抃蹈之切不任愚懇右伏以前件州縣或星布海壖或雲絶荒外首領強黠人戶傷殘撫御緝綏尤藉材幹刺史縣令皆非正員使司相承一例差攝貞廉者懇不願去貪求者苟務徇私臣自到州深知其弊必若責之以理莫若加給料錢今具分折如前並不破上供錢物輒陳管見務在遠圖伏乞天恩允臣所請右內給事袁思藝至奉宣聖旨賜臣江東成金二挺若服之後深有補益兼延駐者伏以仙方所祕靈藥稱珍必候休明之辰上益無疆之壽不意俯回天眷念及微臣賜九轉之金駐百年之命且螻蟻賤質豈能長固蒲柳易朽常慮先雕竊荷生成之恩寧酬造化之德澤如河海空欣羽翼之期寵若邱山何伸灰粉之謝錫字君貺元和九年蘇州從事歷淄王傅終衢州刺史臣某言伏奉十一月七日恩敕授臣持節蘇州諸軍事守蘇州刺史以今月六日到州上訖臣績用無聞寵章非次恩崇效淺任過憂深承命震惶不知所措臣某中謝伏惟睿聖文武皇帝陛下道符乾元功配坤德盛明參於兩曜休烈冠於百王覆幬㣥生憂勤庶政至於牧人長吏簡在宸衷然後明視達聰獎勞懲過俗臻壽域垓靡窮人是以列郡庶尹莫不甘於隕首以答元造臣藝術非工吏能罕立纍因過幸嘗忝官榮所歷衢婺兩州皆屢荒殘之後侵漁稍息是朝廷法令之明飢饉不生屬年歲豐稔之運績無異等恩被殊私纍貪天功以竊身寵况東吳繁劇首冠江淮自非良能豈可妄處受任踰重兢慙失圖獨不汰侈於法程晏安於寢食誓刻肌骨用申涓毫無任受恩慙懼之至臣某言臣才不過人任忽踰量局蹐無措憂慙不容臣某誠惶誠懼頓首頓首臣歷忝方州誠無異效至如俗幸不擾人懷小安是屬天時實非臣力况自永貞以來陛下每降恤隱之澤則惸嫠保安發賑救之仁則癘災不起法令昭著姦邪已清時歲豐穰流庸自占比屋日用豈臣之功陛下勸獎道崇葺綏念切採擢凡品統臨列城將何以表正一方肅清㣥吏庶竭微力仰酬天慈力不足則繼之以死是臣職分所當奉行秉茲一心敢有二事以今月二十八日到所部上訖謹奉表陳謝以聞臣某言伏奉九月二十一日恩旨授臣衢州刺史以今月十八日到州上訖祗承寵光魂首飛越臣已嘗試任績用無聞薦沐恩私兢惶靡措臣本諸生行能罕立徒以親知謬舉踐履踰涯常叨省署之榮亟歷萬方之重事懷靦冒恩戴生成伏以浙東諸州衢為大郡纍經荒儉切在保綏憂勤所分求非易臣自量智力懼不勝任守信偷安踰年受代當此益重實昧寵章頃屬旱災相繼夭喪過半生聚長育理難卒平賦斂徵求物有常數自前年以來陛下以覆育之慈深布弔憫賑貽口食蠲復地征人用昭蘇氣消疵癘竊以匹夫遂性天下懷仁况江表獲安動踰百萬臣職當撫字倍切常情欲宣明詔條通達幽隱敦實務本者勸之以農開通明敏者進之以學奉朝廷法制守使府規模克勵小心庶無大悔有渝此志敢逭明刑臣某言中使王文朝至伏奉六月六日恩制授臣宣州刺史兼御史中丞充宣歙池等州都團練觀察處置等使以七月二十九日到鎮上訖臣謬承寵章顧影慙灼祗奉明詔撫心震驚臣某中謝伏惟元和聖文神武法天應道皇帝陛下嗣承大寶光啓中興德洽生靈道超今古平逆亂之本建太平之階將澄化源先正理道詳授長吏撫綏疲人冀厚生成用頒教化以臣庸昧何以表率一方以臣孱微何以訓齊百姓始懼貪冒終思悔尤伏以人之性命懸在衣食衣食所繫蠶農為先使蠶不失時農無愆候其在姦豪屏息賦役均平既絶侵漁雖災害不困既均物力雖貧乏亦安不困而安可成富庶臣纍叨重任願效微功嘗所粗知猶勉懼不至况有未達豈昏愚可任竊自思惟不遑寢食至若鉛刀一割之用駑馬再馳之勤所願酬恩更期效命旬歲無補刑章敢逃無任受恩惶恐之至平字坦塗贈太保平陽郡王嵩子纍官左龍武大將軍授鄭滑節度使入為左金吾衛大將軍帥鄭滑徙盧平封魏國公拜河中絳隰節度使更封韓召拜太子太保以司徒致仕卒年八十贈太傅當管虞鄉縣王賢鄉有白虎入靈峯觀謹按孫氏瑞應圖白虎者義獸也名騶虞王者德至鳥獸澤洞幽冥則見謹畫圖進上涉洛陽人初與弟渤偕隱廬山自號清溪子憲宗朝為太子通事舍人謫峽州司倉參軍太和中為太學博士復以事流康州桂為郡也巖其先之有井室人民百千祀矣居是邦者匪哲則豪何四三里之內而巖不載於前籍為巖將屈於古而合伸於今哉為人未知其巖巖俟人以時哉青溪子昧而未詳也豫之仲曰渤受天雅性生不雜玩少嘗讀高士傳列仙經遊衡霍幽遐之境巢嵩廬水石之奧凡俗所覯必皆礱磨大璞翦鑿遺病意適而制非主於名寶歷初自給事中出藩於桂一之年治鄉野之病二之載搜郛郭之遺得隱山元巖冥契素尚余因謫去炎海途由桂林巖之勝再遂其賞勒銘洞石表遠迹於他年銘曰桂之有山潛靈億年拔地騰霄戟列刀攢巖之有洞窈窕鬱盤虎挂龍懸形狀萬端旁馳杳冥仰踏巑岏玉落磬墜幽深晝寒巴陵地道小有洞天文籍之囿吾何有焉酒一卮兮琴一曲元巖之下可以窮年涇官河南府密縣尉元和元年入為太常博士禮經祖有功宗有德皆不毀之名也惟三代行之漢魏已降雖曰祖宗親盡則遷無功亦毀不得行古之道也昔夏后氏十五代祖顓頊而宗禹殷人七代祖契而宗湯周人三十六王以后稷為太祖祖文王而宗武王聖唐德厚流廣遠法殷周奉景皇帝為太祖祖高祖而宗太宗皆在百代不遷之典故代宗升祔遷代祖也德宗升祔遷高宗也今順宗升祔中宗在三昭三穆之外謂之親盡遷於太廟夾室禮則然矣或諫者以則天太后革命中宗復而興之不在遷藏之例臣竊未喻也昔者高宗晏駕中宗奉遺詔自儲副而陟元后則天太后臨朝廢為廬陵王聖歷元年太后詔復立為皇太子屬太后聖壽延長御下日久姦臣擅命紊其紀度敬暉桓彥範等五臣俱唐舊臣匡輔王室翊中宗而承大統此乃子繼父業是中宗得之而且失之母授子位是中宗失之而復得之二十年間再為皇太子復踐皇帝位失之在巳得之在巳可謂革命中興之義殊也又以周漢之例推之幽王為犬戎所滅平王東遷周不以平王為中興不遷之廟其例一也漢呂后專權産祿秉政文帝自代邸而立之漢不以文帝為中興不遷之廟其例二也霍光輔遷之廟其例三也伏以中宗孝和皇帝於聖上為六代伯祖尊非正統廟亦親盡爰及周漢故事是與中興功德之主不同奉遷夾室固無疑也朝散郎前行河南府密縣尉太常禮院修撰臣涇言臣聞在昔聖王之御宇也仰則觀天以知變俯則考地以取象因順變之道作為禮樂化成人文以光天下者莫大乎郊祀著之方策豈微臣詎一二所能盡臣聞禮有志誠非玉帛無以見乎外樂有志節非鐘磬無以達乎中故自五帝殊時三王異禮莫不因之沿革觀損益焉伏惟皇帝陛下承天景命列聖重光法唐堯無為而化致大禹黻冕之美明德超於千古至誠通於百靈玉帛牲縣大備前典微臣謬參綿蕝久歷歲時每仰絲綸輒書故實謹集歷代郊廟享祀之要及聖朝因革沿襲之由倫比其文各標篇目裁為大唐郊祀録十卷其中義有同異皆隨文注釋神位升降並寫而為圖祝史陳告之詞工歌大雅之什亦俱編於次謹詣光順門隨表封進伏望頒諸東觀庶有補於將來上表陛下教敬之原下伸微臣蟻術之望無任屏營懇款之至虞仲字見之趙郡人元和初進士又擢宏詞纍拜中書舍人大和中纍遷兵部侍郎改吏部開成四年卒年六十五贈吏部尚書敕竭誠於補察必罄訏謨鋪文於誥命以光鴻業非明識屢經於體遠麗藻已著於知微則何以副我虛求充於任使翰林學士中散大夫中書舍人上柱國賜紫金魚袋王源中天籟無器大球不磨範圍可以程搢紳刀尺可以制度量自拔於郎署置諸中禁嘗因進見敷奏以言揖黃憲而褊胸不生覩汲黯而風神自整今時方無事政在和平外付股肱內倚心腹必冀協恭以奉上營道而同方俾下無間言上無偏聽萬物攸繫朕時賴之勉勤夙夜之規以副簡求之望可尚書戶部侍郎知制誥依前充翰林學士散官勳賜如故敕夫言語侍從之臣非賢不命久而加獎則彞典也翰林學士朝議郎行左補闕賜緋魚袋李讓夷器以琢成材為衆出蘊積邁時之志發明扶道之心學務研精文推軼拔早飛聲於戎幕遂躐位於諫垣忠言屢聞密命斯委果揚溫雅之稱宜獲持謙一作訏謨之效亦既久次所宜轉遷受遐寵於握蘭用酬勞於視草勉宏前懿以服寵榮可行尚書職方員外郎依前充翰林學士散官賜如故敕朝庭之制外有綸闈之職以奉大猷中有翰苑之司以專密命帝王懿範備舉而行森然在前其道一貫朝散大夫守尚書戶部郎中充翰林學士上柱國賜紫金魚袋王源中能斷大事美秀而文服君子之儒乘賢人之業朝議郎行尚書禮部員外郎充翰林學士上柱國賜紫金魚袋宋申錫和順積中英華發外懷致君之志布經國之文二者皆國器也先皇帝能用之顧豫沖人敢不加敬申命執事崇其寵章藉右掖之芳名參內庭之重任思為盡飾朝典宜之源中可權知中書舍人依前翰林學士散官勳賜如故申錫可守尚書戶部侍郎知制誥充翰林學士散官勳賜如故敕夫秩高綸闈職贊書命禁署之內用才尤難蓋以討論而功垂無窮潤色而言流有截非嘉績日著雄文風翔則何以茂於轉遷副此僉屬朝議郎守諫議大夫充翰林學士上輕車都尉賜紫金魚袋路隋澄澄天倪落落風韻氣含古道行為人師朝議郎行尚書庫部員外郎充翰林學士上柱國賜紫金魚袋韋表微符彩外朗誠明中虛言皆本仁動必循矩而皆揚歷榮序輝耀朝倫以高行清議發於身以精理敏識稱於職而澄㣥疑之聽昭宣素風况選自先朝擢居內職或依經而諫諍為志或視草而周密居心言念前勞是嘉成績洎豫嗣位思親賢人覩形容而鄙吝自袪察言行而公忠益見奧詞達學偉望清規式叶豫求宜從朝獎中書理本內禁化源並承訓誥之榮往勵將明之道我方舉爾善爾宜懋厥官隋可守中書舍人依前翰林學士散官勳賜如故表微可守本官知制誥依前翰林學士散官勳賜如故敕夏官之屬以九法平簡稽司寇之列以三典詰邦禁選用郎吏斯為重難朝議郎前使持節婺州刺史上柱國騎都尉賜紫金魚袋柏耆徑正誠明富以材識揚聲禮閣直筆諫垣徵事郎使持節蘄州諸軍事守蘄州刺史驍騎尉賜緋魚袋狄兼謨舊德在人文風擅價興起憲署勞徠疲氓有以恬退自安遇事而後發有以昭融美稱非道而莫遷顧茲缺員宜乎並拜懋承寵擢以奉彌綸耆可守尚書兵部郎中散官勳賜如故兼謨可守尚書司門郎中散官勳賜如故敕朝議大夫郎守尚書戶部郎中兼侍御史知雜事上輕車都尉賜緋魚袋王政雅朝議郎守尚書戶部郎中上柱國賜紫金魚袋豆盧曙等御史府紀綱中外事雜而繁故常以侍御史一人綜其庶務政無大小罔不關決繇是得參舉中臺郎之可者以兼領焉既而第其諫績以勸能吏陟明者必載遷於省閣當選者復繼入於憲闈此其可以為重也爾等皆以簡願端明修詞踐行發強可以守直開敏可以適中嘗遊刃於京邑亦坐籌於戎閫臺閣之上聲華益高贊均輸於財征表明慎於郵罰分曹左右其用維新是宜舉武部之雄以獎成績授都曹之重以勵兼才博觀稱服之能式副有司之請政雅可守兵部郎中兼侍御史知雜事散官賜如故豆盧曙可職方郎中敕朝散大夫使持節袁州諸軍事守袁州刺史上柱國蕭睦中臺總天下之務分以郎吏各有司存前代用人率為慎選以爾克茂才實嘗擢科名操尚端貞職業修舉纍登使局頃綰郡章去常見思居不自伐是宜陟以郎署佇其彌綸能稽舊章則無敗事可行尚書祠部員外郎散官勳如故敕登仕郎殿中侍御史內供奉護軍李行修沉正為質發強於用敏識可以周務懿文可以誠身連擢憲闈聲績甚茂近以江淮災旱眷切疲黎舉爾忠實往申慰撫攬轡有恤人之色登車多濟物之心既表嘉庸仍當滿秩優其遷擢以勸公勤刑曹詳讞之難郎署彌綸之重斯為盛選無愧當官可守刑部員外郎散官勳如故敕宣武軍節度判官朝議郎檢校尚書戶部郎中兼侍御史賜緋魚袋張勝之卑以自牧文而有禮既踐憲臺遂參相府事人見必盡之操在醜有不爭之美尚書列屬分曹涖職聽其會計以考歲成擢用為郎是稱清選勉爾從政以休輿議可行尚書比部員外郎散官賜如故敕都輦之下居百郡之首尹正之重俾四方承流苟或枹鼓不驚豪右自息所宜增秩以稱任能朝議郎守京兆尹上柱國賜紫金魚袋劉栖楚長才挺生利用能斷徇公忘已奉上絶私居多急病之心動著必聞之美黃旐之姦不發赭裾之盜靡聞載勤檢馭之方頗精風化之本繫爾才術副豫簡求朕所以惜其聲猷難議遷擢尚留劇任更俟當官就加青綬之秩重委黃圖之理宜崇望實無替威名可以本官兼御史大夫餘如故敕僕射二令之職也奉常正卿之選也假中臺之極稱冠列寺之崇秩受此兼命必資重賢前荊南節度管內觀察處置等使銀青光祿大夫檢校吏部尚書江陵尹御史大夫上柱國清河縣開國公食邑一千五百戶崔㣥道合時中識通政本含五行之秀氣為一代之偉人文學致名公忠涖職清貞不撓方廉自持曩升台階助我憲祖實著贊時之績用存經國之規周旋纍朝揚歷大位出作垣翰入標羽儀風雨有不已之鳴雪霜無可變之色秉是全德罔聞異詞乃者輟自夏卿授之戎閫統荊衡之巨鎮嗣羊杜之前聲政推洽平理在徵復禮樂之器豫心所難冀流合雅之音將考依經之制慎簡斯久僉諧乃俞俾回軍旅之謀式暢人祗之職伯夷官業佇乃修明可檢校尚書右僕射兼太常卿散官勳封如故敕為宮相者非班位已深名望有素則不可也前東都留守判官朝議郎檢校太子右庶子兼侍御史上柱國賜緋魚袋楊歸厚詞場英華諫省勤舊及典列郡政聲必聞乃者罷符印之勞佐保釐之重賢士君子歎其不遷儲闈屬寮中庶為美爰用分職爾其往哉可守太子右庶子分司東都散官勳賜如故敕漢號左馮翊分理浩穰近者非清名顯秩不在茲選正議大夫行給事中上柱國渤海縣開國男食邑三百戶賜紫金魚袋高重沉厚守道貞介操身以禮法為踐履之途以學行為遊泳之地堅金不耗止水無波穆然士風休有美論屬者侍周禁署駮議瑣闈重席有戴憑之名通經得陳邵之美侍從之暇附益宏多移於牧人宜有善政吾以商原故地豐水攸同襟帶山川接畛甸服掌離宮之管鑰領近關之式遏俾揚風化思得兼材爾宜提舉政經蘇息物力清靜率下以奉詔條用答寵榮勿替休問可使持節同州諸軍事同州刺史充本州防禦長春宮等使散官勳封賜如故敕朝散大夫前守蓬州刺史上輕車都尉裴浰朝議郎前守通州刺史賜緋魚袋郭曥等夫上之化下猶泥之在鈞唯甄者之所為耳以爾等前所為政皆播能名人多袴襦之謠理有綏定之績衡陽苞湖賦繁地闊尤藉良牧以扇仁風勉奉詔條陟明斯在浰可守衡州刺史散官勳如故曥可守利州刺史散官賜如故敕致果校尉守右監門衛將軍兼御史中丞王承休朝議郎守太子少尹賜紫金魚袋王宏質等咸以事勞顯於中外或武稱和義環衛有嚴或吏能適時長征攸佐循其履歷頗謂優深寵以郡符俾洽條理夫以巴賨雜俗山谷異宜必在通其有無繕其征賦勉茲勤恤用表分憂承休可朝請郎使持節陵州諸軍事陵州刺史散官如故宏質可使持節澤州諸軍事守澤州刺史散官賜如故敕舉才命官得人斯重詢事考績稱職為難况較正違失典司文誥參我密命為吾近臣非望實兼優則不在茲選朝議郎守諫議大夫知匭使上騎都尉賜緋魚袋李渤清標雅裁器韻不㣥贍學積文泉源益濬有濟人經國之術資通時利物之才朝散大夫守尚書司封郎中知制誥上柱國鄭涵操履堅明雄文炳蔚虛懷宏達雅思沖深立言嘗見其著誠秉志頗聞其經遠夫澄其源者必清其流端其本者必正其末其便蕃禁掖潤色王猷君不可以私其人臣不可以虛其受簡材既因於朕志當官爰俟於爾能其有嘉聞以光茂選渤可守給事中散官勳賜如故涵可守中書舍人散官勳如故敕參掌有密斧藻訓誥侍立於文陛之下揮翰於禁署之中非第一流不在其位朝散大夫守太常少卿知制誥上柱國賈餗器範溫雅詞藻宏麗朝散大夫守尚書職方郎中知制誥上柱國清河縣開國男食邑五百戶崔咸學探奧旨文有正聲而皆公論所歸清規擅稱比美玉而光彩外溢服華組而煥耀揚輝闕苟大章之才闕識王濬沖之質則損乎文佇爾酌中明吾試可無使相如視草專美於前時也其懋承之餗可守中書舍人散官勳如故咸可守中書舍人散官勳如故式之在西蜀也入人耳目其事熟矣固非愛之者所能粉飾而文其論惡之者所能披抉而其説蜀之此時雖女子小人亦知凶闢斷頭之不日然為其用者乃救死於頸語其無勇烈之心斯可矣豈可盡披其附麗之名乎如式之於劉闢既不能死可謂求生害仁者也而駁議曰大節已虧無乃過言歟何從聞之闢之走西山也召所疑畏者十數輩於庭將盡殺之然後去而式在其間蒼黃之際闢黨有護持者僅免於難推嚮之論則不當如是明矣然居此時有將見危授命之義殺身成仁之道詰之者稱式無愧色愚不信也如是則式之去希烈也理河南也廉宣城也何以無忠敬之目歟愚論之曰式也不疾任求之目不閉吉邑之口其罪也無王浩棄家之心無譙元受毒之志其罪也如闢之反天子棄墳墓乃曰顧式説一夢以結其心署一牒以張其勢豈其然乎夫人臣不幸罹於是惟死而已矣然孟子曰生吾所欲也矧自軻已下哉使死之易則王諒李業虞悝鴻信不足貴也意者將不可以必死望人乎始以不死罪之以懷生貶之是異論也夫諡者易其名者也夫子曰名以出信又曰名之必可言也名不正則言不順以至于刑罰不中正謂此耳夫豈容易哉語曰於其所不知蓋闕如也恍惚之夢駁議之外無言者懼非所以昭示後世也臯陶謨曰五刑五用哉言用刑當其罪也刑其支體於一時猶須當其罪矧刑其行義揭之於千萬年歟康誥曰敬明乃罰請依前諡為傾周士京兆人鄉貢進士國家自誠而明講信修睦既移風以設教每登賢而制祿由是命司樂之職掌彼成均教舞勺之童取諸鄉族常德咸事庸言可復納諸軌物則物有其容攝以威儀則儀無不淑日就月將不疾而速於以見中和之教克修梓之材可育觀鼓篋請益攝齊員來嚴師尊道至矣休哉捧函丈之筵無思不厭聽撞鐘之問有説必該心不忘於翼翼視有主於梅梅審依仁即童蒙之求我語成器如梓人之理材且鼓舞鏗鏘徒聞於物格興道諷誦亦資於釋回豈如中以理心和而適分敬居簡而可久德有常而不紊孝實天經友為義訓本其至也可以賾天地之情引而伸之可以暢雍熙之運則知敦和章德在聖與仁革蒙惑於初志致輝光於日新於以代天工則庶績時序於以施邦教則百姓皆淳斯可謂理以樂成俗師以賢得人於戲至教在茲無從匪彞合遊洋以來學任道德而為資孝友祗庸則無不順者自上下下可咸使由之夫然則樂之教也義微而婉以八音為制以六德為本既履孝而資忠宜任重而道遠若然者安得不慎其終而思其反者也臣某言臣以斗筲之資荷旄金戊之寄職兼千乘位總十連而節制頒條曾無可紀妨賢專祿亦已四年由是再陳表章備瀝衷懇誠在必達義無苟安伏惟元和聖文神武法天應道皇帝陛下憂勤萬務砥礪庶工服勞中外者有更踐之常受寄方隅者無專任之幸所以俗用丕變官稱得人坐致平治實使均一天下幸甚天下幸甚今輒冒犯嚴譴更陳丹悃不敢廣引遠事請以近日言之至如楊於陵鄭絪馬總等或從偏鎮陟授或自周行蒞事或三年獲歸或三考除替公議惟允私願亦伸伏乞聖慈平分許循往例賜停見職擇用㣥才則聖代盛審官之規微臣無去國之歎無任禱祈之至臣某言臣歷刺三州連總三府外任逾紀入覲無階就日望雲魂飛心往臣某中謝伏惟睿聖文武皇帝陛下覆載無私遐邇同欽復升平之故事繼前聖之高蹤中外踐更出入迭用臣以虛薄叨受恩榮徒竭夙夜之心未伸朝夕之敬天威咫尺誠寤寐而無違雲漢昭回固瞻仰而何及是以前在朗寧封章纍上及移臨松漠星紀屢周微衷尚隔於戴盆積望徒懸於窺管葵藿之誠彌切犬馬之戀愈深人欲天從於茲未驗下情上達終冀不誣敢黷宸嚴罄陳丹懇伏乞賜臣除替許至闕庭厠蹈舞於㣥寮備班行之散地足趨中禁目覩大明俾成九族之榮以盡百生之幸非敢竊國賓五獻之禮希康侯三接之恩一覿龍顏萬死為足無任懇到迫切之至謹遣某官陳乞以聞
