front:
  text: 全唐文欽定全唐文卷九百八十七闕名二十八
  hash: sha256:c46345d6128bda6181337aed97e5e726bbce530f2fd6a51dbe9d052975d73542
body:
  text: 夫真容凝寂應身淨參慧日振暉慈風化物託儀金闕一字寫質丹青勝萟良規敢不闕二字佛弟子趙婆長孫同薄合義等敬造阿彌陀像一軀上為帝主師僧父母法界衆僧共成佛道貞觀草一年正月八日大唐乾封二年九月三日佛弟子張開疆尹氏女為父母舊貫絳州樂居洛邑女出事他族遠隔山河抽割衣資敬造阿彌陀像一軀願父母兄弟及因緣眷屬永無災障值佛聞法大唐故道安禪師姓張雍州渭南人也童子出家頭陀苦行學三階集録功業成名自利既圓他利將畢以總章元年十月七日遷形於趙景公寺禪院春秋六十有一又以三年二月十五日起塔於終南山鵄鳴塠信行禪師塔後志存親近善知識焉竊以理冥真際證一法以標同道契應機隨十方而顯號故以光開別相起化逾宏業現他心崇因更遠是知方稱妙樂開妙覺之重闈玉樹金臺啓菩提之祕苑觀日觀華之觀疑繫深習於薰修仰十闕一字以虔誠妙旨資其密感弟子宣義郎周遠志等並翹想於法浦乃結願於西方僉憑六八之言遂要盟於彼會然即幽塗皎鏡承慧日於堯天覺路重開蕩六塵於舜海既而沐茲鴻造想荷恆深罄臣禮而寫真容申孝仁而圖淨域奉為天皇天后太子諸王遠劫師僧七代父母敬造阿彌陀石像一龕今得成就素毫融質矚三界而凝明聖衆乘心覃太虛而應物祥花敷座延勝福於花臺寶樹流光證慈光於道樹蓮開碧沼瑩朝日以增輝聚月分容闢昏衢而永旦用斯功德保祚皇基兼被幽明同歸福海竪通有頂總契無生旁亘無邊俱升淨境上元二年十二月八日記大唐高宗天皇大帝之所建也佛身通光座高八十五尺二菩薩七十尺迦葉阿難金剛神王各高五十尺粵以咸亨三年壬申之歲四月一日皇后武氏助脂粉錢二萬貫奉敕檢校僧西京實際寺善道禪師法海寺主惠睞法師大使司農寺卿韋機副使東面監上柱國樊元則支料匠李君瓚成仁威姚師積等至上元二年乙亥十二月卅日畢功調露元年己卯八月十五日奉敕於大像南置大奉先寺簡召高僧行解兼備者二七人闕即續填創基住持範法英律而為上首至二年正月十五日大帝書額前後別度僧一十六人並戒行精勤住持為務恐年代綿邈芳紀莫傳勒之頌銘庶貽永劫云爾佛非有上法界為身垂形化物俯迹同人有感即現無罪乃親愚迷永隔唯憑信因實賴我皇圖茲麗質相好希有鴻顏無匹大慈大悲如月如日瞻容垢盡祈誠願畢正教東流七百餘載闕一字龕功德唯此為最縱廣兮十有二丈矣上下兮百卌尺耳闕十一字沙不知而解遍知功超闕二字於是珠闕一字宵殞四緣發教於西湖金色夜明百位闕十二字放青蓮瑤楫回苦海之湍寶舟迂愛河之浪十號之大一言難述但宇宙茫闕九字者佛也可貴可重者生乎因果之福功德而矣弟子衡陽闕一字王府行參軍武騎尉中闕九字掌中早奉過庭之訓承恩膝下遽聞詩禮之風所為闕二字橫而邪峯概日聚六塵於前運闕二字果於闕一字緣遂使病發膏闕二字謝平臺之會痾廠田坴腠理闕二字歸田之闕二字以憑台闕一字於彼岸山欲頽而重存託闕一字月於此身川將逝而闕二字色空下濟示無言說之門妙氣上浮頗有詞談之契加以廛萊舊壞堂構故基仰荷孫謀之澤恭申昏省之志高祖諱龍成盩厔縣尉通洛縣丞隋崇政縣令仙鳧入駕敷至德於一同祥雀出馴播仁風於百里牛刀屢動不覺年之已衰魚鼎頻移不知老之將至開皇闕四字謝榮時屬堅帝出遊屈龍駕於亭館備供頓析垂鴻恩於睿旨遂封亭前水曰龍闕十字莫不顯忠良闕三字飛令譽於古今曾祖諱昌仁周三崤鎮將祖諱則闕十二字峻阜聳清闕三字心千夫之長振闕三字五校洎乎仁壽之歲豪傑齊於闕十四字銜恨枉闕三字友于之重俱從闕三字諱闕二字乎江南天裂晉北地闕十四字才弱冠顧桑梓以言歸武德之中下枌榆而有闕五字紫極助闕三字揚闕十二字聖善南陽韓氏時迫耄年恩隆撫念伯兄處闕七字副尉萬基叔闕三字國闕一字吉闕五字紹祧嗣復嚴尊於東闕二字地無追奄積闕六字罔極昆季班首青七飛鳴虔想劬勞闕一字心闕三字惟保護庶酬妙力爰於闕二字式建豐碑粵若稽古闕一字冊金輪聖神皇帝陛下降兜率以乘時臨宸極而膺闕一字無為而朝萬闕二字無事而靜八荒換姚日以闕二字補媧天而永固上奉得一下及七世父母法界衆闕五字雙闕四字獨心於獨園之內卅二之闕一字相宛若猴池八十種之異儀儼同鹿野庶使功凝厚地闕八字高天放慈雲於寶闕二字其寺也疏基臨水構宇乘巖曉霞落而甍鳳紅晨曦低而棟闕九字於塵崖瓊岫福巒舉殃氛於霧際都師貞素等五淨凝心闕二字滌想挺仁山於忍草闕十字乏生知學無談奧徒事揄揚之意終乖要妙之詞高而非闕二字所闕一字大道豈小闕一字能議輒申狂簡敬闕三字雖桑野時遷蓬溟或變流一名於三寶與地久而天長其詞曰釋宗既作法教爰崇周闕一字夜殞闕七字道敬想尊容或鐫琬炎或闕一字金闕一字其一明明尊像巖巖寶閣俯帶長流仰連峻崿夕露成珠朝闕六字飛雕甍魚躍其二粵若先祖且文且武一世英雄二朝弼輔播美縑緗揚名今古存忠懇於情闕六字宇其三運逢屯否時遇糾紛天南地北鳥散荊分神器改易載返邱墳瞻雙桐而識井望五柳闕三字其四下闕三字悲恭申仰報翠石旁采良工側召雙像異儀丹青殊妙導愛水之沉淪清火宅之焚燎其五闕七字深闍山味道浴池滌心峯如鷲嶺樹等鶴林幽谷延其鐘響清風引其梵音其六晦明遷闕四字新無闕二字說何示何存是理斯表非言不津敬崇顯乎前烈庶垂裕於後昆其七前闕食長齊六時禮誦常坐不闕十八字人不為師於尼衆定慧雙妙善淨闕一字維闕一字人闕一字欲闕一字俞闕二字丹量闕四字留連有始有終確乎不拔深慈攸被惡見者咸闕一字遷心大悲所闕一字固疾者莫不痊復固以長河南北請謁者如雲太行東西歸依者若霧凡一千下闕導庸詎勝紀門人公度千有餘人雖為度脫之師亦無章句之教但以淳德變化至精感動清顏一奉隨類曲成經者擅其經律者專其律遊觀門而淨眼撫禪鏡以明心咸自磨皆為法器當州門子外境博徒並鴻雁連飛稻麻分秀僉以為禪支落蔭定水淪波盈目空悲拍頭無逮追法王之覆育感慈父之他行渴仰遺形願分灰骨相州門徒一百人等於谼谷寺東形勝之所建塔供養即萬歲登封元年歲次景申一月草六日也斯即山臨傘蓋峰瞰香爐金門連聖者之居寶剎接神人之宅敬託茲地仰答師恩遂勒塔圖銘紀頌遺烈式宣此義乃說偈也詞曰真宗之妙正法之晶收攝萬境洗蕩六情禪林載鬱定浦爰清誰傳寶印寶仗金禎雲堯憬族天漢遺靈去超習諦來踐福庭身衣脫像心卷開經戒囊闕一字固律鍵疏營邇圖全梵遠託圓成牽蘿澗戶冒葛山楹虬盤八定鷃憩五停念茲却鑰眷彼傾瓶苦節尤苦貞心更貞穹崇輔德沈潛贊誠泌泉流態藏祇耀形馴象降質諍贙吞聲香菲神異藥授銜苓雨不衣溼禽不頂驚轉業安養移心往生水想彌淨日觀愈明天子召我披銀洛京緗葩吐萼緑樹舒榮長懷麓岫不顧王城祇門葉墜㧙室梁傾天歌載請聖衆來迎祥虹上屬神燈下旌至德云捨孰不悲零凡所薰發石宇籌盈分置蘇乳各潤根莖隨方闡化應物敷程扶輪寶月翼亮金星一州高足十縣㣥英同思正濟共感他行却依巃嵸俯瞰崢嶸分灰建塔頌德圖銘俾四埵之藍壞溢九地而蘭馨大周天冊萬歲金輪聖神皇帝如意元年迎神王入內其神王原是泥塑彩裝其皇帝敬重神王脫空闕一字佇糾以金裝為年歲多日金薄雕落後開元草年僧宏器報以金裝恐後僧徒貴勝不知所由立一小碑述久視元年還神王敕具録如後少林寺神王二右去如意元年奉敕將前件神王入內比不敢陳請今內出功德散與諸寺其少林神王送在大福先寺但山寺去都稍遠巧人難遇前件神王元在少林上坊普光佛堂今者現闕其大福先寺總得神王一十五軀望請前件兩軀得還少林令本處尊儀具足冀得幽山功德不闕莊嚴闕一字往來有所瞻仰謹詣光政門奉狀陳請以聞伏希恩旨久視元年九月十三日少林寺主義獎等狀僧宏藏敕好還少林寺門司李阿毛宣右監門直長路尚賓左監門直長成思貞押門長上果毅杜行敦周還少林寺師子敕一道少林寺師子二師子郎二右件師子等並是少林寺普光堂前隨神王功德其神王奉今月十三日敕還少林寺為前狀不別顯師子等福先寺綱維但付神王未付師子既是隨神王一鋪功德望請許將還山供養謹詣光政門奉狀以聞伏聽敕旨久視元年九月草九日少林寺主僧義獎等狀敕好九月草九日門司李仁福牒右監門直長路尚賓左監門直長成思貞押門長上果毅杜行敦周少林寺賀師子敕一道少林寺僧義獎等言伏奉九月十三日恩敕賜還神王又奉其月草九日恩敕兼還師子恩波洊委喜懼兼深僧義獎等誠惶誠恐死罪死罪但此功德昔是素裝忽覩靈姿遂如金飾元功再造天巧自然神之力巍巍如是緇徒局影若攀兜率之宮靈相生光似降莊嚴之國手舞足蹈倍百恆情無任荷懼屏營之至謹附表陳謝以聞謹言久視元年十月日少林寺主僧義獎等上表敕好放阿師去久視元年十月六日門師陳嘉逸牒普光堂內一佛二菩薩迦葉阿難及門外二金剛二神王二師子城內少有傳聞博士姓李名雅永平年造此尊像奇妙少雙菩薩儀容卒不可有阿難迦葉貌相肅然合掌虔恭實難希有門外二金剛鳥鵲不汙相承稱說異相屢現其師子者乍著儀容或嗔或喜畫工巧匠不可圖容二師子郎常相標弄此一鋪功德不可思議聞夫香風掃地五百如來之出興寶花雨天六萬仙人之供養豈若慈氏應現彌勒下生神力之所感通法界之所安樂前揚州大都督府揚子縣令蘭陵蕭元眘學菩薩行現宰官身留犢三江還鳧八水於是大宏佛寺深種善根奉為七代先人爰及四生庶類敬造彌勒像一鋪并二菩薩粵以大周長安三年九月十五日雕鐫就畢巍巍高妙霞生七寶之臺蕩蕩光明月滿千輪之座無邊功德即開方石之容無量莊嚴希證恆沙之果重宣此義而為讚云巍巍梵仙光宅大千容開碧玉目淨青蓮歌陳相好銘記因緣等雨法雨長滋福田夫悠悠三界俱迷五淨之因蠢蠢四生未窺一乘之境蒙埃塵於夢幻隔視聽於津梁朝露溘盡前塗何託渤海高延貴卓爾生知超然先覺知滅滅之常樂識空空之妙理眷茲朽宅思樹法橋敬造石龕阿彌陀像一鋪具相端嚴真容澄瑩金蓮菡萏如生功德之池寶樹扶疏即蔭經行之地所願以茲勝業乘此妙因凡厥含靈俱升彼岸竊惟大雄利見宏濟無邊真諦克明神通自在是以三千世界禪河注而不竭百億須彌甘露灑而恆滿歸依妙理無乃可乎朝散大夫行司農寺丞姚元景慈悲道長忍辱心遐悟朱紱之儻來沿紺池而利往發願上下平安爰於光宅寺法堂石柱造像一鋪爾其篆刻彰施儀形圓滿真容湛月坐青石而披蓮法柱承天排紺霄而舞鶴雲日開朗金光炳然風塵晦冥玉色逾潔身不可垢道必常明宴坐經行善宏多矣俾我潘輿盡敬將法輪而恆轉姜被承歡曳天衣而下拂崑邱燎火還披鷲嶺之雲寶劫成塵載滌龍宮之水乃為銘曰法無闕一字兮神化昌流妙宇兮燦容光彌億齡兮慶未央長安四年九月十八日書曹氏故妻王三娘長安人也少修真媛苦空閒悟觀身地篋五蘊防非調善誠心從遊自遣因圓業謝奄忽從風春秋卅有八儀鳳二年八月五日捨化即其月殯亡親院後息智度恐陵谷名移人處隔易剷題元石表此芳猷至神龍二年二月八日修建墳焉州城西北墉上神祠案孫處元潤州圖經云本漢荊王之廟也漢書高帝族兄漢興為將軍有功封為荊王王於此地與黥布戰薨人為立廟歷吳晉宋齊梁陳俗皆享祀隋平陳廢州為鎮數經寇賊鎮官汹懼屢禱求福助焉其祭文道士江旻所作詞甚華美前後二千石及上佐下車輒先祭而始蒞職如慢黷不虔應時致禍左驍衛大將軍薛訥嘗為此州司馬被病危篤令祝張文瑾至誠乞請當時獲愈自是恭祀有加刺史王美暢修飾堂宇門屋步廊皆令文瑾監領瑾亦勤懇手種果木一百餘株司馬成敬荷多識前言往行文藻精新居常信篤備深誠敬乃於先天二年三月內命工人雕刻神儀并造王之后妃嬪妾及左右侍從威儀圖於壁上總三十餘軀盛矣哉雖太伯子房祠中象設嚴麗不之過也成公奉計入朝言發朝夕吳郡孫處元撰碑披文相質窮理盡性稽諸典故備通神道時秋八月工畢皇帝安七廟殛四凶天下太平域中無事文瑾潔身修已常主奠祭歲月躬親不懈其事楚詞云靈偃蹇兮姣服芳菲菲兮滿堂五音兮繁會君欣欣兮樂康豈虛也恐陵谷遷貿蘭菊有渝敬草故實而為之記天寶八載十一月十八日縣尉盧重華自廢寺移於道周以全故也闕二字夫為政有愛於人人則思愛而紀其政或尸而饗之或碑而頌之使芳名轉彰善績闕二字亦冀後賢警慕而似之公為政有聞是以皇帝降書以稱其名勒書為碑舍闕二字其績刻於碑陰其碑闕一字然立於水東道北雨頻壞道其過者不得周覽但知其名闕四字年四月天作雷雨震碑仆於坑闕一字碑攢少虧龜破四段吏人告豫豫駭闕一字洗而視之其文煥蔚其闕一字殊特顧問從吏從吏不知及問邑客無有知者噫余以闕一字盧君之德行彰闕一字公之文學不然者豈盧君有隱慝耶余乃上白府闕一字韋公請闕二字於縣門以光其邑韋公允之乃遂事也於是碑縣闕二字文績再揚余雖不敏警闕三字記移日洛州緱氏縣景山鄉蓋聞妙闕雲闕濯海金蓮湛闕惠闕今清信弟子闕義令等皓闕孝慈闕心千哀闕崇福祐用展敬捨淨財闕母闕七世先亡造石得圖阿彌像一鋪今得成願闕功德資蓋闕又為合家平闕親眷屬同沾此福我皇乘時龍臨大寶四十載矣洪休鑠於元吉元澤浸於有截恢復五運更明三辰以為海者沖融浮天汗漫吐氣戴萬有朝百川屢效休徵之應未崇封建之典逮天寶十載三月庚子冊為廣利王明盛禮也分命義王府長史范陽張九章奉玉簡金字之冊將璧環幣帛之貺拖毳衣繡潔牲正辭神理居歆佇百福而上達帝道惟永視九瀛而咸乂洋洋乎未始有也初張公作宰南海亟遷右職惠化未泯琴堂尚存人挹子奇之風時美相如之使議政之老惟見子孫佐書之史俱垂班白風闕郊侯鱗雜歡迎詠舊德於江干覩慈君於鷁首咸謂愷悌君子令問不忘者歟夫典冊光揚德貴周洽信美不著古人所慚敢舉其凡以記於石夫天寶十載暮春三月天王正土德之元辰海君受玉冊之初吉也太原王闕三字人名闕三字仁闕八字書中郎守武興郡四境山嶙峋構新亭迓佳賓曰翠峯景實真唐天寶房史君上賜晏刊堅珉亭之右名不泯以貞元十三年四月十三日左街功德使開府邠國公竇文瑒奏千福寺先師楚金是臣和尚於天寶初為國建多寶塔置法華道場經今六十餘祀僧等六時禮念經聲不斷以歷四朝未蒙旌德伏乞聖慈特加諡號以廣前修奉敕宣賜諡曰大圓禪師中書門下准敕施行者今合院梵侶敬承恩旨頂奉修持用資皇壽將恐代隔時遷真蹤靡固輒刊碑末以紀芳猷遠追鷲嶺之風聿光不朽之跡舍利本大隋仁壽四年甲子歲幽州刺史陳國公竇抗於智泉寺創木浮圖五級安舍利於其下即子城東門東百餘步大衢之北面也原寺後魏元象元年戊午歲幽州刺史尉萇命造遂號尉使君寺後改為智泉寺至大唐則天時改為大雲寺開元中又改為龍興寺太和甲寅歲八月二十日夜忽風雨暴至災火延寺浮圖靈廟颯為烟燼洎會昌乙丑歲大法淪墜佛寺廢毀時節制司空清河張公准敕於封管八州內寺留一所僧限十人越明年有制再崇釋教僧添二十置勝果寺度尼三十人秋八月二十一日因板築於廢寺火燒浮圖下得石函寶瓶舍利六粒及異香玉環銀扣等物伏遇司空固護釋門殷誠修敬仍送憫忠寺供養士庶瞻禮至九月二十八日藏之多寶塔下原夫太極肇分三才定位佐圓方之化育乃自神祇保區宇之昌寧率由英傑是知神人一致幽顯殊途生則負業負才功名冠世歿則至靈至聖禍福及人代有可稱永垂祀典而神周氏諱鵬舉字垂天東晉時會稽人姬氏分支汝州啓祚軒裳集慶冠蓋傳芳稟靈虬無匹之資挺天馬不羈之質文戈耀彩早符却日之能智劍騰光自淬浹雲之利宏詞登第雄俊成名初宰上虞憂分百里布絲桐之政兼冰蘗之操民仰如神物資厚利趨朝龍闕出牧雁門才興廉袴之謠已顯孟珠之譽人安物阜歲稔時清繼隆竹帛之功迥播仁賢之美自後心思退讓志務幽閒俄辭建隼之榮遂厭垂魚之貴念昔會稽東上虞北曾遊魚浦湖遇春景韶光訪物外之靈蹤尋湖中之勝概益見澄瀾湛湛分玉鏡之清光翠岫峩峩列雲屏之秀色松篁掩映花嶼幽奇每資賞眺之情頗愜嬉遊之趣舟泛青翰車乘白駒全家忽隱於靈淵闔邑但驚其神化俄而潛通肸蠁迥布威靈升為水府之仙超統陰司之職即時聞奏丹陛肇建嚴祠敬之者福必生焉犯之者禍當立至牲牢互進籩豆交陳遠近居民無不畏憚時有明州天童寺僧曇德禪師道高康惠德重圖澄感太白之星精下為童子登招提之果位即造諸天禪師聞神血食生人由是大垂慈力俾歸正覺徑造靈祠禪定身心結跏趺坐顯靈通萬狀變見無方禪師寂若無人湛然不動神乃尋知悔過忽顯真身與三人禮拜歸依受五戒三皈之法祭奠不茹葷血廟庭願託祇園昔本在湖壖地形窄隘鄉人孔澤趙瑗以為非立伽藍之所竭誠祈禱咸願遷移啓告才終狂飈忽起朱綬飛停之處香爐飄落之中民乃上聞於官敷奏於帝續降敕命建置殿宇精崇梵剎安處祠堂院與廟成咸為利濟會昌五年天下廟庭例行停廢惟此廟宇獨與重存後佛教重興一切仍舊民間祈求應若答響可謂奉天之令安國之禧咸叶庶民乃為贊曰神道性兮杳冥人神應兮有靈稟一生兮丈夫欽萬古兮留名威光震兮赫奕劍氣上兮衝星仰如在兮享祀感神理兮精誠爇香火兮不絶永表載兮典經竊以武安君威靈振古術略超時播千載之英風當六雄之勍敵廟貌雖存於近縣詹聖上思闕甍已甚於荒涼念道蹤闕三字令當司見葺冀存闕一字美不泯歲時冠裳闕二字劍珮嚴整倬爾闕一字跡感發宸聰剞劂才施堂宇光粲興功闕一字畢禋祀備周刊石貞珉用資不朽其所添置物色具列於後三貞祠在靈寶縣南二里按碑記云晉末太傅楊駿之三女也駿遇害舉家籍沒而三女誓不歸於他氏貞以為名時重其操設廟像以旌之紀其堅貞之德作銘曰彼之三靈淑德惟明父之罹禍誓節全貞節操當時以貞為名起祠塑像用表精誠竊聞天不能並覆地不能俱載父母有生育之恩而不免沉淪之患師資之道即不然訓我以法樂我以心悟之於一言之下頓超生死之境得之於有無之際便登常樂之門萬路交馳而不能撓其道三界炯然而不能壞其性是知師資之禮孰能報哉先師俗姓張氏法諱皈敬當邑人也即靈塔大師上足也幼歸釋氏長參元宗一言合道便契真理掛錫崑峰久歷星歲近厠茲院未更歲餘疾恙漸縈即赴魔請付囑斯在遷神淨方春秋卌七去景福之首五月九日已歸大寂門人全意等以絶粒齊心香花供養素服之載禮之如存遂則捨茲所有建彼尊勝幢焉於是召良匠鑿嘉山穿厚地而取奇石翦長林而出珍材役百千人功計半一之歲莫不金槌連擊鋼鏨雙衝玉屑迸飛石火電耀吐蓮華之仰覆垂瓔珞之縱橫瑞氣祥雲若盤龍之偃蹇懸針垂露似返鵲之遨翔一軸真文橫鋪八面以日計時功圓既就於是卜縣之艮位置院之坤宮地連溟渤勢接崑巖四山如闕一字日之形萬象帶含春之景坐中秀氣視遠近之江山枕上泉聲聽曉夜之流水依稀無憂之所髣佛極樂之場可安尊勝之文可置不朽之跡伏恐陵遷谷變渤澥成塵若不鏤石於斯何表將來之紀大璞未雕惟寂即無其執我淳源既泮性生遂有於成身是以四相盛衰三界紛擾本師世雄哀其顛墜憫彼輪回構巨釭而燭幽運廣筏而濟溺立善作福皆為方便之門舉首低頭盡是可歸之路淨化院者即鑒諸道者之所建也道者永嘉人受業於先峯護國靈應禪院彌年苦節早歲勤身著頭陀粗弊之衣修菩薩利樂之行逢緣必作隨處立功建濠河津要之橋梁修府郭壅狹之歧路蚤臨潭廟中之靈宇宵奉園穹前之淨地其於運力供僧重言化俗苟有一善利於人樂無不為乃曰國土民安君王信向足雲水烟霞之衆瓶囊盂錫之遊其間或有幻相無情塵緣將盡百衲之衣何直周身之具奚求爰尋佛言備得教旨且西土苾芻苾芻尼下至優婆塞優婆夷送往之禮名以闍維闍維之文實火化也棄餘灰於遠水免遺骨於他山勞無煩人置不有地即具以上事達於廟朝創佛祠於湖山思祈為功德主上曰六度門中常聞喜捨八福田內屢建津梁勤王早立於大勳奉佛素崇於至性聞是善也欣然在懷遂奏敕與請置其所乃於鎮西闕之右延壽山之陽郛郭匪遙柴水甚便命開基址式建僧居聖上允俞錫名淨化闍維之道興於此焉繇是臺閣勳臣香閨貴戚府郭君子闤闠信人發心無難捨之財集事有易成之力像設畢備舍宇一周香燈含晝夜之輝鐘磬續晨昏之韻仍於院側立此方壇或願闍維不計來衆資其事用給以薪蒸利濟之門無大於此將欲紀録不朽刊勒堅珉海濶山高莫並有為之福毫枯筆竭難書無盡之功伏惟佛生中國當此土周昭王初闕暨乎聲教流傳始自漢皇感夢自後支那國內廣布流行歸之者盡悟無生敬之者皆超彼岸有求皆應無願不從似影隨形如聲響應爰有百法大德者始從無棣攜杖錫以南來既至磬陽闕一字龍興寺駐足是以繼開瑞典講論明門闕四方之負笈雲臻寰海之聞名悉至實謂塞嶮道而歸正道摧邪見以悟真宗六事行圓人皆稽首弟子等曾遊法會覩六事以精嚴暫聽分宣似衣中之得寶是以學親六事共結二因閭巷相闕一字朋儕共允展轉相呼來者甚衆信士既多標禮闕佛會是以長於月圓日宿淨三業旦入寺中隨僧讚唱以連天五體投誠而迎地雖為歲久未闕一字標題乃有都副維那幢會糾首與會衆商議擬造石幢臺座鐫上下經兩軸會衆既聞無不允許遂闕二字良匠選巨材各捨青蚨共崇勝業今則功圓闕一字妙不讓於兜率陀天鸚鵡頻伽恰似移西方在此幢儀既就列姓氏以雕鐫顯示當來瞻敬者皆獲斯善闕一字多愚少智輒順尊情書述荒詞略為序讚賢劫千佛第四能仁悲深願廣濁界度人給孤園裏闕一字演金經金身放瑞處處蓮生化佛先唱釋迦自陳彌勒獨悟萬倍解生近執示起心裏疑生三業俱淨五體投誠世尊往昔授記丁寧彌勒修行未得真成貪心申在禪定不行既言成佛何處受生子細諦聽却後一紀知足天生官闕一字萬億五百為名盡修禮度闕一字作祇迎善賢顯勝樓閣崢嶸珠從額出內院方成寶樹風動晝出音聲不談鄭衛唯演空名花湧八水遊闕一字棟行能柔能冷飲不傷形寶女執拂帳內遊行小梵張網大梵懸鈴因修六事意想投誠人閒壽足闕一字臂便生花芬頭上闕八字敬禮慈尊阿難長跪發問經名世尊為答觀慈氏經下生經讚曰大智舍利能轉法輪白佛啓問彌勒當因世尊誡敕當一心聽四海漸感地即廣平村邑相近絶有邱陵人唯三病更無餘闕一字應往大藏廣集珠珍七寶闕七字頭城大廣濶縱橫上諸樓閣百寶所成慈尊修道從境而生妙臺始就即使分諍知世閒法無常必生捨家修道當日即成龍花樹下契證金身從座而起往翅闕一字城天龍前引四象隨行梵王侍右帝釋闕一字傾闕九字業迎佛入此大城佛開妙辨廣利㣥生三會得度遺法衆生釋迦上足號迦葉名藏闕一字雞足只後慈尊山神來報彌勒始興乃從定起來禮慈尊世尊預記讚彼殊因當來證覺號成佛經闕虎踞小之則鳳峙鸞翔皆崇以佛宮盡立闕形尚在靈泉汹湧灌千頃之田園異樹婆娑闕生草茅漸沒國家祈禱闕一字瞻瓦礫之場闕四民樂矣五教隆焉咸歌堯舜之風盡詠禹湯闕人多舉意則有檀那衆戶同連款狀共詣府門闕崇作今來之金地仍闕一字威嚴帖牒差選公幹主闕上人之謂歟謙大德道行清高心懷淡寂雄經闕副僉諧已斯主綰公卿仰慕緇素傾瞻安闕一字上人神闕無意遊行精舍伽藍有心建立於是師長委之匡構闕緣言諭逐分注題闕一字斂資金貿易材木尋其巧匠召以闕桷爰從保大三年起首迄於四載興功變此闕二字成斯蓮闕枅向夕陽而似哈雲霞當朝旦而如啖霧露闕二字日闕之猿聲響亮泉池寫漢闕一字時之月色晶明疑從闕三字移闕自諧住止迥以精勤廣召信人深嚴佛事修生闕二字福善結闕莫委元由之事須礱貞石以鏤清名契恩內典闕一字虛莫闕詣以蕭宮才申攀闕一字之儀便沐周隆之禮尋垂闕一字弗可闕乃為銘曰大哉皇覺廣應人天教敷妙旨法闕二字元化闕然不傾各變形質為石堅貞四方祈雨八表揚名闕二字宋代有此闕唐升元歲末保大惟新地欲興發果得其人安公竭闕一字謙德橫身告其闕大漢皇帝以大寶十年丁闕一字歲敕有司用烏金鑄造闕一字十佛寶塔一所七層並相闕一字蓮花座高二丈二尺保龍闕一字有慶祈鳳歷無疆萬方咸闕一字於清平八表永承於交泰然後善資三有福被四恩以四闕一字乾德節設齊慶讚謹記若夫乾元有象大道難量無廣乘則不知其永歸無漸教則莫詳其肇發亦如夫川之相也初淺而後深足之行也闕爰有清信士丁思禮碩德純孝諒直彰仁賢彩若丹詞林歷客早揚儒訓曷際釋流宿殖善芽一門深入妻朱氏芳蘭佳秀智炬恆暉雖染世塵常樂闕離往因東邁路屆灰溝遇見石碑隳壞彌極於時稽顙遂發願言敬鐫阿彌陀佛一鋪蜜多心經一卷願則彼作碑在此修竭力盡忠繼踵前蹟堅雖殊異功乃無差百福莊嚴檀波為一是時也惠風梵響曙色舒輝緇黃駢闐衣冠霧集且以珠投濁水便乃澄清日出浮雲皎然開霽發於內而應乎外起於微而至乎極休哉幽元寶相標德剋為碑板永讚不息其詞曰闕一字士修兮聖作悟立靈相兮尋覺路標豐碑兮色身求了心澄兮登淨土上闕設大齊闕朝爰洎遐邇設使芬盡方闕忘議善乃為銘曰茫茫宇宙悠悠世間九世銜海四闕二字山三塗即獄五道無關闕循還至聖何像嶷爾惔怕示現無方迦維垂迹等救燒闕息衆榷城推輪火宅八十代盡天人喪師撫膺雨淚香水闕八國均持機緣靡隔靈祥俟時坊墳式建層表臨空非因闕金盤仰露寶鐸搖風山移川徙徽業興隆公孫龍者古之辨士也嘗聞其論願觀其書咸亨二十年歲次辛未十二月庚寅僕自嵩山遊於汝陽有宗人王先生名師政字元直春秋將七十博聞多藝安時樂道恬淡浮沉罕有知者僕過憩焉縱言及於指馬因出其書以示僕凡六篇勒成一卷其夜僕宿洞元觀韓先生之房先生名元最字通元從容人間虛淡自保與僕觀其書且謂僕曰足下後生之明達者公孫之辨何如僕曰小子何足以知之然伏周孔之門久尋聖賢之論多矣六合之內聖人論而不辨六合之外聖人存之不論簡而易之欲其可行也神而明之存乎其人也陳詩書定禮樂身心之道達而已家國之用足而已變而通之未嘗滯之引而伸之未嘗蕩也令天下思之而後及也令天下得之而不過也若此則六經之義具矣五常之教足矣安取辭堅別白之辨乎故曰若公孫之論非不中也非不妙也其辭逸其理吝其術空其義粗令人煩非高賢不能知也非明達不能究也抑可以為聖人之理不足以為聖人之教若隨方而言觸類而長何必白馬堅石獨存其理乎故曰因是之論也即直之論也惑其文則不可以為易矣達其意則不足以為難矣可存而不可守也可辨而不可行也知者不必言言者不必用也然天下之理不可廢也天下之言不可沮也故理可貫也言可類也若使僕借公孫之理乘公孫之意排合衆義掊一作倍勞㣥言則雖天下之異可同也天下之同可異也天下之動可靜也天下之靜可動也堅不堅白不白石非石馬非馬何必聚散形色離合一二者乎先生曰天下有易迷之者難則天下無易矣天下有難能之者易則天下無難矣足下當有易之地用無難之辨能為龍之所為乎僕笑而答曰使虎豹之力移於麋鹿固為虎豹矣使雁鶩之力移於鷹隼固為鷹隼矣故以仲尼之道託於盜跖之性則盜跖固為仲尼矣今公孫龍之理處於弟子之心矣弟子且非公孫龍乎遂和墨襞紙援翰寫心篇卷字數皆不踰公孫之作人物義理皆反取公孫之意觸類而長隨方而說質明而作日中而就就以事源代迹皆疑因意而存義也以幸食代白馬尋色而推味也以慮心代指物自外而明內也以達化代通變緣文而轉稱也以香辛代堅白馮遠而取近也以稱足代名實居中而擬正也或因數陳色或反色在數或棄色取味或以氣轉形明天下之言無所不及也發沉源而迥騖闢榛路以先驅庶將來君子有以知其用心也豫少讀歷代史每考沿習自夏殷迄於周齊未聞兩都並置東西互處者夫殷之五遷蓋建國不安之為也商都於亳底綏四方武王克殷為周成王卜洛幽王為犬戎所敗平王東遷自是不復都豐鎬矣更於秦漢晉魏但處一都隋以奄宅區宇公私殷富恃此繁盛遂創兩都為巡幸不常用都為憩息之所洎乎我唐高宗以伊洛勝概每樂巡幸是時武后殺蕭妃寃出宮室不安竟因登封遂成都洛武氏革唐為周乃立武氏崇先廟於東都神龍初中宗反正遷崇先於西京乃以其地為太廟欲使四海之知我唐復有宗廟矣爾後中宗還京復享太廟時朝廷多事不暇議去東都權朝但閟而勿享元宗巡狩駐蹕復享洛廟是時君臣安於清泰曾不論及宗廟定制遂使後人皆曰兩都不疑矣夫以出征則載遷廟之主亦有所稟既言載主則郡國豈宜復有廟主耶今二都並建各立神主都洛則有洛廟還秦則有秦廟則是便於人而不敬其神也以是而言毅然不移以朝萬國不亦宜乎昔隋時有上言者一帝二都實非舊典遂改為京始創之日已有譏者足顯二都之設可謂不經高祖武德七年正月改東都為洛州是知稽古之帝必考是非置郡罷郡垂法後世貞觀四年詔發卒修洛陽乾元殿以備巡幸給事中張元素上書陛下頃平東都之始層樓廣殿皆令撤毀天下翕然同心歸仰豈有前則惡其侈靡後則襲其雕麗每承德音未即巡幸此則事不急之務成虛費之勞國無兼年之積何用兩都之好昔漢祖將都洛陽婁敬一言即日西駕豈不知地推中土貢賦所均但以形勢不如關內也太宗遂止元素機奧學達為魏文貞推重請罷修建是也兩都置宗廟不殊侍御史顏標上議東都宗廟天寶建中兩度賊陷東都神主散失之外臣據見在十一主並已瘞於兩陛之閒向來疑遲未去東都之號者蓋以舊廟存焉則顏標所引原廟述漢失禮亦至矣旋為巨寇焚爇廟室悉成煨燼况乎城闕崩壞宮室邱墟廢之有時契於至理今請制為藩鎮以汝洛節度使為名選帥實兵遇東夏闕
