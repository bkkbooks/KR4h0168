  text: 全唐文欽定全唐文卷六百四十四仲素河間人官中書舍人
  hash: sha256:ce428eeff8b9b3989c9511aed1bee0b8f8223e35e66078d24a421de0affa08cb
  markers:
  - {type: head, offset: 14, content: 張仲素, id: KR4h0168_NFKB_644-h1, level: 1}
body:
  text: 天何言哉歲云秋矣臨甫田而一望見多稼之具美亘平野而雲鬱覆高原而黛起九土用康兆人賴止豈非協風中律農祥順車丸土牛作候而不銅雀載鳴而有以徒觀其千畝既良萬頃式臧興有渰而混色霑霂以齊芳雜非烟與非霧乍漠漠以蒼蒼孰克辨乎帝力咸自嘉於我疆御田祖之神時聞擊鼓樂農夫之慶且見築場察彼近郊知夫四裔何山苗之能植伊隰桑之尚蔽豐滋漫若用表於播時悅茂油然寧憂於晚歲矧乃華實云就堅好不渝豈茨梁之足喻若薈蔚之將敷知艱難垂戒於徃哲務藨蔉在勸於鄙夫爰協古公之政式宏管氏之虞至夫實穎蓁蓁厥田上上膏陰潤以蕃庶矗朝隮之異狀邱陵共秀且聞束皙之詩黍稷盈疇更鬱仲宣之望懿夫白露凝冷清風戒寒是刈是穫式燕且歡諒遺滯之足利思京坁而可觀蓋由我君勤儉所彰純嘏屢錫運璿衡之冥數煥玉燭而昌歷分地而嘉穀用登報天而犧牛在滌下臣覩而作頌敢歎美於成績重曰望如雲兮我稼既同除其穢兮田具是功既庭又碩兮將表歲終喜有秋兮可以勞農賢哉南容詠白圭於雅什奉明義以為誡徵莠辭於口給諒同符於素履將辨志而貞立玷生在玉伊良工之可磨言出於躬縱駟馬之不及是知詩之為喻言以昭信想研精於奧旨知底滯於遺韻詠歎彰其不足反覆明乎克慎身之是省况開卷而念茲心苟無瑕異獻璞之徃吝允矣君子宜其念之懲諸嘉玉觀爾靈龜尚鮮華之彩慕特達之詞知在涅而不昧同居暗以無欺重明哲以作則故沉吟於四時既切磋以求友將造次而解頤得之自中殊學者之四失復而無斁類夫子之繹思是謨是訓是傚是則諒修巳以為物可自家而刑國既引之以改過復重之以比德香芸自雜於卷舒青蠅寧間乎白黑彼以圭為瑞此以誡為珍苟因文而假物非貴玉而賤珉然則懷璧者恥慢藏而成玷事君者畏不密而失身夫其列於雅頌備法語之為用垂於後昆庶厥道之長存汗簡之文可考絕編之義再敦且非守句之末學有異斷章而賦言豈不以賢智之心慎樞機之所啟瑾瑜之質懼毫髮以成痕懿夫志士仁人明不自是執一善以無失故三復而樂只若或志於斯行秉善價而誰毀物有資於利用則機之功也可錄初離立以待時竟開張而濟俗言念魯相溫其如玉覽下妾而獻藝將自家而窒欲克勤克儉誠君子之息機焚如棄如示小人之止足酌其妙也得而言者斯以明貴賤正儒雅龍梭勿用猶懸素壁之隅星石曾支尚在綠窗之下懿其以彼火烈彰茲行危諒舍之而是警非敝之而改為鼓鐘於宮覺前言之嘉喻勞薪用爨嗟彼世以方知惟此政經必資輔理傷抱布之趨來異斷機之所擬燎枯木以烟散暢清音而風美迢迢之象遠在於天札札之聲不雜於耳且懷柔之理文歸不競何兆庶之淺深在仁知之游泳道自絕於瑕玷慶旁作乎龜鏡絲麻不績而家乃致於肥煨燼未除而邦巳聞其政是知重為輕根旨遠道敦息邪贏於高位澄細流於上源雖屢空於衣褐實垂裕於子孫瑟彼信圭諸侯是執當大君之辨等與五玉而咸集皎以式孚堅於特立錫山川以為瑞在享獻而增襲將持比德以省躬豈獨退揚而進揖懿夫潔白其質縝密其文得儀形之是表敘羔雁以成㣥玷絕可磨不愧南容之復性惟特達每勞宣代之分則而效之惟其嘉矣觀正直可以行化取毀方於焉克巳至若左右佩珩淒鏘宮徵寧同乎信以守之豈嗟乎不我屑以韋弦可譬琮璧自殊孚尹旁達陽采外敷因追琢以為用諒小大之合符韞以保焉匪沽諸善價省其人也宜賦以生芻此乃邦之令典孰可巳乎捧當心而措於掌足以見古人之象稟溫潤而洞晶熒於以彰文物之形色配彼蒼示不言之信神如此鑑同明德之馨所以掌節是司藉之乎繅與蒲穀而齊列冀邦家之永保比楚玉之無瑕哂夏璜之有考或以圭為瑞或以象為珍傳命自同於符璽達情可接於君臣稽彼前典光輝日新念君子之作誡宜近取諸乎身徵晦明於異域聞庶類之酬德彼黃雀之罹害遇青衿而見惻有纖微之陋體無彩翠之奇色投林苦鴟鳶之患墜地逢螻蟻之食情懷舊匹尚有啁噍之音自戀故枝難舉翩翾之翼感之奚止曰楊氏子取於步武之內寘彼巾箱之裏全而育之焉知所以洎養羽之再就方銜恩而決起黃花受哺寧同食椹之懷白璧來酬用記封公之祉言徵其事載赫厥靈表齊諧之異志合漢史之祥經倏去之時既入㣥而多類重來之夕方詭狀以呈形稱仙使而報德何倖喜之可稱質乍隱於恍惚環既受而晶瑩且賁然之好瑞以神告其潔白而就封諒生成之是報想夫初飛葉際忽墜花陰空城路遠穿屋譏深化未及於遙海聲似愁於北林焉知鴻鵠之秉志實賴兒童之有心是知好生自中神貺元格贈祥符之數四勝兼金之累百皛皛月圓規規霜白溫其之色且異隨侯之珍皎若之形自類有虞之獲嗟夫靈異之跡出於無間或鵲緘玉印或樹蘊金環曾未若稚子懷仁祥禽致感彼君子之出處實濟物於迍坎環兮四代五公垂竹帛之可覽昔竇滔之于役從軍伊少婦兮玉潔蘭薰對鳴機以抽恨織美錦而成文攢萬緒之荏苒揉衆彩之絪縕腸迴而綠字初結髮亂而青絲共棼萋兮斐兮常屬思於黃絹不日不月長寄懷於碧雲其始也軫蕙心蓄藻思披黃流之渥彩等後素之繪事循環而覽夫言豈一端宛轉而求則韻皆居次寫別既久怨心有盈錦霞駮而增麗詩綺靡而緣情自發於巧心素手何慙於墨妙筆精當其用寄遠方臨風載閱跡類雕蟲文如委纈既連珠而復貫又通理而不絕居人言念緘萬恨而在中君子置懷字三歲而寧滅是繹是尋攻乎織紝宛而成章見色絲之麗永以為好表美人之心儻或以新而代故豈殊陋古而榮今黼黻不同愁閱目而等耀彩章自異懼讒口之見侵况復委篋多年化塵千古方爛兮如在復燦兮可覩藻豔波旋環迴輻圓蘊四愁而難解煥五彩以相鮮猶或踰繡段勝彩牋貴以文自奪鴛衾之價贈乎遠無勞雁足之傳且物在人亡留思長想謂其文之著也可卷而懷謂其製之貴焉乃攄而賞若知七襄之非匹豈玉案之虛徃空濶靈沼蒼茫舊規昔穿焉迎秋而大閱戎艦今漲也乘春而無竭陂池惟時陽候既序陰冰巳泮天子乃詔京尹以庀役命水工而叶贊陳衆力而雲鍤勃興決萬派而箭流共灌澹汪汪之積水似耿耿之斜漢况復穀雨初霽夭桃正春總上善以利物涵聖澤之深仁軼彼宮沼瀰如海濱鼓金隄之曲岸揚石鯨之彩鱗浪涌烟郊更失辨牛之涘日華翠㶑纔分織女之津伊昔殊方未化勤遠是思非障澤之瀦矣將水戰而肄之構館浮鷁以遨以嬉獱獺呈形有類於文身之俗鳧鷖亂響如習乎下瀨之師春水平兮波緩春日煦兮沙暖雖守柔以易狎竟安卑而就滿重泉之沫騷騷而若迴淺沚之毛離離而漸短至若鏡朗風收澄明不流沃餘潤於芳野引孤光於釣舟豈獨鼈蜃是獻實亦龜龍載游厥跡既徃前聞可想故人遙集曾分刼火之灰蕃帥來朝暗識滇河之象其漲則那式詠且歌開鄭白之墳衍流畎澮以天波瑞氣長凝表宸居之在鎬晴虹乍飲若榮光之出河大哉水之為量皆從夫一勺之多水可取鑒人能就諸將審巳以徵實必含形而納虛其止也靜其清也徐方湛兮而皎鏡異沔彼而淪胥符上善之心自多宏納見無私之狀臨或躊躇資坎德之深矣諧至人之淡如當其曉日增鮮光風未度既清泠以爰止持炯戒以為喻等濫觴之猶蓄何一杯之是措諒善惡之咸觀必形影之自遇豈獨無當五色空涵眾文伊吉凶之肇起如動靜之潛分俯而窺似神交之澹泊默而察若靈化之絪縕且義叶養蒙道深觀竅洞虛無以責有在清明而惟肖心不同也常稱厚貌之疑鑑之精兮未若重泉之照辨妍媸而無失固潔著而為妙斯所以田巴覽之而獨悲陸雲觀之而自笑若乃芳塘始啟白水初澄有美人兮方覿坐曲岸而情凝毫髮巳分想沉姿而映藻清華不動見浮彩之生菱是知聲有徃而必復者謂其響答水以止而能鑑者謂之冥合方取則於川渟孰混歸於海納此亦紀人事垂正經庶在觀身而責影豈徒品物而流形今則萬頃方臨㣥容在掌隨方圓以見意在清通而賦象苟明鑑之不遺願飾躬而是徃畫繪之事彰施於文表其能故散彩而設雜其暈故後素而分運茲潔白之光綜彼深淺之色始其布濩終若組織成山龍華蟲之美實曰當仁後黑黃蒼赤之采固無慙德間精微而不亂蔚明麗之相得昭昭以著郁郁斯皇發眾狀而逾出映繁文而益彰奪朱紫兮不能爭其要汙白黑兮無以損其光於以界道斯能辨方昔實瞻之在前昭其本始今為來者居上爛以主張素為繪兮事惟從古禮於繪也義實斯取其素也同至淳之得一其繪也合比象而為五理眾者寡予惟汝明無使輝華自混無使毫髮難并處皦昧之間造形則辨居有無之際遇物皆呈雖欲勿用曷其有成乃知作繪者惟文是務言詩者在理為喻故得盡飾之道不愆於素探周禮冬官之職諧衞風碩人之詞爰遂事而乃睠幸全功而勿疑質不勝文孰謂何先何後白能受采有以顛之倒之胡未至而取誚豈卒獲而能欺不有分布孰為文采恒起予於後進潤色斯成苟棄我於巳前人文焉在美矣夫繪事之義所以刑萬邦而昭四海昔穆王之御天下蕩志思元凝然眇然將以肆車馬之遠跡訪崐閬之㣥仙既而獲八駿以為乘輿六龍而並騖謂升天可冀寧為海右之巡行地無疆漸出人間之路弱水巳踰層城是赴洎夫展王母之儀容見列仙之軒輅絳官元圃異故鄉之樓臺鳳舞鸞歌勝至樂之韶濩澄光渺瀰極望瑤池湛水容之漫漭蕩日采以參差遠近洲沚駢羅羽儀蕩蕩五雲冒芝田而不散翩翩三鳥拂珠樹以相隨金液是嘗玉杯是挹桃杏之花競秀蓬瀛之侶遙集遊仙可戀覺天路之日長惟帝念歸懼人間之景急嗟乎道不可測理難具形且復淫神之與驕志啄腐之與吞腥固不可以長遊仙境久會衆靈於是迴輕軒反飛鞚却瞻遼廓而無見尚聞簫鼓之餘弄雖周文之歌鎬燕且異尋仙秦穆之享鈞天常稱在夢此則詣之者身從之者衆稽彼異錄陳茲所窺後之王者樂以聞斯方士彩童幾涉風波之阻金莖玉露寧延隙駟之馳故我后端拱穆清無為元感却走馬而萬方以泰不出戶而八紘盡覽彼乃輕萬里而崇一朝孰若濟㣥生於屯坎月以陰德玉聞夜光伊在天而成象杳如鈎而可望每映樓而皎皎類照廡之煌煌隱見以時兮不愆其候虧全有節兮此惟其常當其霽景方晚晴飇既涼瑩迢遞之初魄出西南之一方韜皎皎之輝尚潛元兔呈纖纖之狀詎假白狼矧乃就盈之姿曲成是愜從三讓而載吐表四序之克協侔雕瓊之異象契舒蓂之數葉臨洞房之內猶隔瑣窗隱遙城之隅乍明粉堞觀夫媚霜烟挂遼敻悟如珪之有始知合璧之將聖既麗天而作則亦順辰而為政彎環而素彩未流蕭散而丹霞始淨所以增思婦之獨愁發詩人之興咏豈止生彼海澨煥乎天經况於玉以比德復如鈎而效靈落魚浦之間偏宜泛影垂朱簾之側宛似分形思其迥出隴陰漸登雲路每因躔而進晷若就新而去故沉泬寥之空碧麗柔明之微素曷蛾眉之足儔豈玉璜之能喻然而合其道也則圓景不渝順其化也而盈缺或殊當未光之時所明若昧自哉生之外其有如無且色依微於林表晦見西方之謂朓光掩映於暘谷朔出東隅以為朒今異此而守度諒君明而臣肅故其賦玉鈎之輝輝誠可增金波之穆穆彼衆禽兮終嵗嚶嚶此反舌兮語默有程蓋時止而則止故能鳴而不鳴青春始分則關關而爰語朱夏將半乃寂寂而無聲有以見天地之候有以知禽鳥之情爾乃觀其所來察其所以或㣥或友爰飛爰止啄朱櫻而潛下嫋綠楊而暗起先秋而默恥競響於蜩螗擇木而遊契不言於桃李於是靜觀其妙先徵其比閟茲百囀誡煩詞於躁人默若三緘象欲訥於君子徒觀其行藏以時喧靜惟允其鳴也有節其默也可準初疑管絃之並奏鏗爾曲終又似環佩之齊鳴詘然聲盡是以理契中寂道符閑澹陰陽交而止聲春夏交而知感哂城烏之夜噪向曙乃啼歎野鶴之秋鳴在陰常慘原夫生乃依巢來而依候靜集林薄閒棲苑囿飛而無懼知皇家仁解網羅應不愆期答聖君信及鳥獸懿夫遏其音調其羽結舌何異銷聲何取鶯能囀鸞善舞鳳鏘鏘而聲樂雁嗷嗷而音苦在和鳴而則多於敬授而何補曷若動適其宜靜得其時伴元燕之辭巢秋而俱去陪黃鳥之遷木春以為期豈比夫嘻嘻者聞妖於亳社交交者見刺於秦詩斯則冥契陰隲迥殊品彙標羽族以稱奇載月令以為貴配鳴鳩之拂羽備嵗候於三百六旬比鶡鳥之吞聲應天時於二十四氣至矣哉隨時之智從宜之義抑斯禽之謂天作大室巍乎蒼蒼立極正位含精降祥惟漢武之肇祀聞嘉言之孔彰告盈數以不忒鬱希聲之載揚於時五輅既臻千官畢會望嶄巖之絕壁升縹緲之華蓋排羽衞於山前刻金石於天外諒精誠之至感致天地之交泰於是騰洪音流翠藹始則類乎雷殷終不因於地籟惟天祚聖谷得一而盈維嶽降神聲至三而大夫其登封則千古是追峻極而四方是維瑞載光於漢史德且詠於周詩動合休徵有異坻頹之震響含靈祀且殊大塊之噫是時也百神受職萬靈獻功霽山霧收山風福穰穰於宇內聲隱隱於封中且啟迪之微延洪是表因勒成而響答殊卜祝之占兆憑乎物陋石言之不臧錫自天歎夢齡之尚少懿乎脗合散乎絪縕邈崇邱之杳靄伊仰止而敷聞掩龜格與鳳降軼神光與慶雲獨得乎數千百祀何慚於七十二君稽彼衆山咨夫四嶽或泥金於杳靄或瘞玉於帛丿糸邈封並聞夫再三響未效於清濁方今文物芬郁寰瀛廓澄我后克讓謙勤夙興巳固如山之壽式當如日之升所以下臣獻頌望翠華之是登仁者靜而自閒高其居而閉其關爰開窗以列岫若施障而圖山邈彼黛巘當於其間至若虛牖洞開連峯向晚雲無心而迥出鳥厲翼而孤返初疑鏡裏覺萬象之俱深又似壺中見三山之尚遠洎如雨歇原野風開薄帷天道不窺而自見山光遙麗而增思謝守臨齋以觀詠之不足陶公開卷則知室是遠而若薜蘿之在眼方坐嘯而搘頤杳杳雲峯既自中而翫矣蒼蒼海嶠亦孔昭而見之况復彩翠之容朝昏是變將避俗以無悶殊近知而守見簾光乍入增松雪之微明砌竹旁垂助林巒之蔥蒨夫其窗也或飾之以青瑣交之以綺疏想取榮於爾室非助境於吾廬鑿垣而疊嶂遙列寓目而幽襟必舒偶琴酒之樂只泯色空之豁如且彼植木翫芳者有時而改累土為山者有時而始曷若曲肱隱几事幽功倍垂碧紗而嵐氣共凝卷宿霧而翠屏常在是知事有親而逾失遠而匪疎徇利爭先之徒固難知也逃名小隱之士或近沽諸亦何必尋赤城之標究蓮峯之掌彼垂堂而是冒此自牖而可賞山中人兮誠不在於獨徃管為物兮虛受天為體兮據安能因徑寸之內將窮轉轂之端用當其無蒼蒼之色何盡微而不大恢恢之狀則難故雖無私以居上信可因物而仰觀於是正瞻視品清澄察九垠之際極一目之能髣髴其形難識翼摩之鵠依稀其狀猶如背負之鵬或因夫窺牖是見且異夫置階而升風息八方烟消四極默淳淳之靈響湛悠悠之神域乃執輕管納麗則遙睇罔審窺不忒虛其內雖高明之可分小其形胡廣大之能測故使蓋影多掩笠形半匿月既滿而猶虧日將中而如昃掌握之內安得容其九重咫尺之中豈能盡其五色且管之為質也秉直天之為體也含虛天執虛而秉陽垂象管抱直而利有用無信大小之有異亦遐邇以斯殊窺臨既加徒云其至矣貞觀必得信安可測夫若然則固知事不可以近圖遠物不可以小謀大小謀大則立而致尤近圖遠則坐而賈害故方朔言也明俟時之難莊周著之表遊方之外客有勤學孜孜憂心悄悄服仁義而罔舍守翰墨而自矯將搦管而是窺願天上之不遺微眇客有觀光於樂府見玉磬之騰英嗟至寶之明契如截肪之曲成挺十德以為美諧八音而作程韞櫝未施尚秘璘玢之色在懸以和乍聞清越之聲當其磬師來求玉人爰格將古樂之是備自他人而云獲追琢既成磨礱載白掩淒清之瓊佩洞閑華之水碧然後張之清廟奏彼朱宮懸簨簴而其容轉麗偶笙簧而其韻暫同明半規而似月發異彩而如虹懿此昭質暢矣音律練響而鳴球可諧還和而浮石非匹爛鮮華之溫潤含正聲之縝密惠而好我為齊路以足珍藏或俟時殊泗濱之自出至於擊拊孔皆備虞韶而克諧清明可貴表尼父之忘味於以宣古風於以蕩邪氣越羽籥之繁會聆鬼神於髣髴豈獨質類冰凝響與風興混金石之華清光不昧較隍池之寶美價斯騰是知叔之離而三代尚紀子之擊而千古攸稱則知夫樂之所屬本於化俗方將審音以知政豈在雕金而鏤玉麗矣哉荊山之珍兮可奏洞庭之曲水效珍兮將應時而出珍浮水兮見可寶而逸當入用之晨豈可藏於密所以次其崖岸露彼真質清明內融符采外溢霄舒夜度遙分蟾兔之輝旭日朝臨下映鮫人之室皆見其處幽邃誰見其內明媚皆知其隨波誰知其抱器邦家藉之不我遐棄觀其璞將有營工其獻情闕二字規模可定剸割方成色光芒而白氣溫潤而清是磨是琢且見其能照載考載擊乃知其有聲夫如是守靜而素豈不以有文而明因得之乎名曷觀之乎器噫同流不知誰念茲而在茲識者未覩寧寶之而存之發跡徐方雖則泗濱而見呈祥聖代不同三獻之疑况貞以自持涅而不淄堅以自秘毀而不變既成何用之顧宜任當人之薦同百寶而敷陳雜衆類而朝見向若不合宮徵之韻不叶雅音之績聞之者謂為空言見之者謂為怪石則以日繫月徒滌盪於風波自秋徂冬難覬覦於採摭焉可見哲匠顧盼良工追琢奏曲者想乎簨簴審音者訓其清濁故知秉文者必有時藏器者不終否理代之音既作移風之義斯起若不聞大韶大濩庸詎知夫石之為美良金可聚駿骨難遇傳名豈限乎死生賈價寧視乎全具伊前王之善誘賴下臣之素數滿籯初訝乎一空絕足終欣其薦赴故郭隗發求馬之術使燕昭興築臺之務賢為國寶昔見載之於經馬以龍名後亦表之於賦當其勤求未至思慮益專安得戀軒而就勒空聞馳荊而刷燕多亦奚為每厭倦於凡類愛而不見寧惜費於且千蓋為傾心於延望之日市骨實猶生之年其志著其謀宣非獨自馬而獲馬此實因賢而訪賢何異祿豐而遊士可集餌美而潛魚必懸夫其取與之分戒其鄙吝是非罔惑孰敢妄進苟能賤貨以沽名果乃愜心而得駿斯骨也當填溝壑誰分天驥之上才縱視丹青豈辨靈螭之洪允幸特達而見重使聲價之復振至若唐公驌驦穆王騄駬代勞馳路追奔結軌陳力效能死而後巳豈若稱德之際交義之始金侔龜形骨異象齒求焉事殊於漢日懸之數合於秦市智能測遠利用鈎深叶田方之念諧季札之心敦信外彰表然諾於匪石沉機內密重枯朽於捐金想夫嘶風頫影垂髾植髮雖仆質於弊帷曾受精於皎月蒙君子一顧之渥恩知異日窮塵之委骨大川不測以設險浮橋架迥以通逵利乎濟也或溢解乎難也無私以虛舟而易蕩屬激箭以相推吾見其梁木斯壞安得稱大道甚夷肇彼謀者莫知其誰於是辦修笮曳長縻侔可久以為慮將制動而咸資且夫原始要終授材度費徵十圍之巨收千古之貴費非難得用之不既易危成安斯之所謂憑遠岸亘長河將好勁以橫截或守柔以旁羅每自直以應用恒守節而居多檻欄之勢舳艫之廣因大索以橫流俾㣥材之攸仰皆恃此以綰縶故不憂於板蕩徒謂其勁挺為質連延不一或指遠岸以孤引或自中灘而對出苟異志而殊途亦齊勞而共逸縱奔澌激射浮湍迅疾駭聲騰雷驚波凑日雖前後之鼓怒終上下而駢比拔山之倫扛鼎之匹雖則取之大壯抑亦勢之或失豈不以順事安排故能守乎元吉斯乃道濟行路功深模軌人有觀於投足物寧憂於濡尾視綯索而久存亦何比於一葦况橋因索而襲故索以橋而用長力雖參於索鐵繫或固於苞桑恢益下之極致信為物之紀綱彼黿鼉虛構於溟海烏鵲徒駕於天潢惟衆人之攸利蓋有助於連航夫物有小而可以屬詞材有小而足以濟時索因有條而不紊人亦直道而用之儻要津以見假願盡力以維持臣某等言今月某日伏見平盧淄青等州節度使鄆州大都督府東平縣官莊地內有禾異隴雙本合成一穗畫圖奏進傳示百僚者臣等中賀謹按瑞應圖曰王者德茂而太平君臣和則嘉禾朱草以中萌言不得中和之氣即不生也伏惟陛下鼓和風茂休德泰階平於上下大中建於人臣神明是若徵兆必報通彼殊壠總其雙莖滋大澤以冥造成嘉穗而薦和合為一彰至化之會同堅而好表資生之豐實推物類以得天意觀繪事而擬靈篇凡在班行咸同慶幸不勝歡抃踴躍之至臣某言伏見今月九日中書門下宣示百官西內池中嘉蓮圖其蓮一本兩花者臣聞明聖有作天人合應既彰化本必降祥符即事而推昭昭可見伏惟陛下儲精要道憂濟㣥方致理大同猶懼不至所以恢宏聖教資福生靈元造感通嘉瑞屢降况茲圅萏儒釋同稱經文但喻乎淤泥詩人特歌於陂澤豈比夫躍銅池闕三字傳芳丹禁濯影清流特聳孤莖以表清淨之源一致對敷雙萼是明內外之教齊興天雖不言假物明意臣仰披圖牒逖覽古先豈無禎祥莫此昭著望雲就日徒深抃躍之誠舞德歌功何報恩私之重無任抃賀慶躍之至臣某言伏見劍南東川觀察使潘孟陽奏龍州寶華山中有麟見獨角馬蹄遍身光耀并嘉禾二十二莖至八十九穗麟見與鹿每來同食各畫圖函盛封進者臣聞六合同歸則麒麟至天下和一則嘉禾生伏惟陛下昭事上帝凝精衢室宵興滌慮申旦忘倦大敷至化以永時邕故得希世之祥應我皇運異質卓犖奇彩光明顧步幽巖發聞郡國神物自生於聖日靈編徒載其嘉名况大田之中衆穗斯茂沐以膏澤扇其祥風而後呈彼珍㣥承茲共觝必生長畝之秀以期王者之瑞因緣所驗鄭重合符有以識上聖之心兆至和之本德超千古慶洽無疆日月所均無思不服臣等幸覩休異喜萬恒品無任抃躍之至臣某言伏聞蔡州營田招討使韓全義今月某日大破賊軍斬首擒生其數至廣臣某中賀臣聞天覆至大負慝者必降雷電之討君恩至重失節者須示斧鉞之誅賊臣吳少誠輒因將帥之權遂肆豺狼之性聖恩含忍久示招攜敢固執迷未即歸罪今全義親承睿旨虔稟聖謨暫師臨境㣥兇授首梟斬元惡計日可期廓清淮濆在茲一舉臣謬忝地官之職情同率土之歡欣快之誠倍百常品無任踴躍之至臣某言得度支使李巽與臣委曲報劍南行營官軍大破逆賊劉闢事宜伏承自六月十日後鹿頭城下石碑谷口前後殺獲巳僅三萬餘人今月六日又於鹿頭城下殺賊二百餘人兼奪得一柵東川節度使高崇文便於城下頓軍又西川賊於鹿頭城投降都虞候郝同美說賊城精兵不下數百人其餘一二千悉是子弟鹿頭城內人心亦甚危懼計即投降又官軍出戰賊衆大敗殺傷欲盡者伏以逆賊劉闢愚狡狂童稔蓄兇慝脇帶州邑依阻城池背誕皇恩自貽赤族陛下曲垂宏貸念彼遠人此賊敢肆拒張恃茲薄戍望其悛革又巳稽誅一興貔武之師果盡螳螂之衞今則神人共怒覆載不容王師鼓行窮寇席卷傾枳棘之巢待擒妖鳥決潢汙之水以捕涸鱗揚斾整戈指期翦滅此實聖德遐被神武昭宣岷蜀清寧當候旬日凡在臣子孰不歡心某忝荷鴻私謬承朝寄無任慶快之至臣某言得進奏官報狀伏承九月某日高崇文差兵馬使酈定進於彭州界捉到劉闢盧文若并家口等有詔罪劉闢及生擒外餘一切不問西川減放兩稅并割西川六州與東川者臣聞鬼方不賓高宗用討防風後至夏禹行誅自古聖帝明王將欲上平泰階下齊萬國未有不先正刑罰後致雍熙者也闢搆亂阻兵違天背順聚茲蜴蜮固彼幽遐謂天可逃無罪不肆陛下斷於睿略興此神兵寇壘妖鋒飇馳電掃顧茲劇賊尚敢退藏同惡相攜偷生逭孽灌莽雖深豈網羅之能避武夫多力巳梟獍而同擒萬里喧傳兆人鼓舞刑當磔裂罪合誅夷肆市陳原纔攄衆怒自陛下握乾御歷授籙纂圖玉燭載和金鏡愈朗至於夏州俶擾蜀郡亂常春斬惠琳冬擒劉闢神速之效從古所無復霽整旅之威降納汙之詔滔天作逆唯罪一身念兩川徭役之勤爰矜賦稅割六州版圖之屬以定封疆日月發其貞暉山澤通其喜氣凡在率土孰不歡康臣謬沐殊私叨承重寄手舞足蹈倍萬恒情無任慶抃之至岐陽法門寺鳴鸑阜有阿育王造塔藏佛身指節太宗特建寺宇加之重塔高宗遷之洛邑天后薦以寶函中宗紀之國史肅宗奉之內殿德宗禮之法宮據本傳必三十年一開則玉燭調金鏡朗氛祲滅稼穡豐宏璧之在御府也韞連城之價所以為寶景雲之見慶霄也麗捧日之彩所以為瑞大臣之居崇列也處近君之任所以為貴况復侍軒墀之密地護禁衞之雄軍昭彰茂功回復介祉終始一德永垂清名者哉侯誰能之見於彭公矣公諱獻忠字琦夫大彭為商諸侯以國表姓至漢大司馬宣有遠績盛烈書於班史至孫業避漢末之亂寓居隴西襄武縣因地分望傳諸歷代湟中隴上推為右族派緒綿遠冠蓋蟬聯貴仕漸繁乃附咸鎬今為京兆三原人也烈考諱令俊皇朝議郎行內侍省內謁者監保安福履宏闡義訓鍾慶濟美傳於藎臣公善下中蹈方守直竹箭有筠而可比城府無迹而自深以虔肅恭懿承大君以仁孝清儉纘前烈建中三年入侍宮殿德宗皇帝嘉其敏厚器任異等便蕃於帷扆之內承奉於指顧之間言必有章動皆由禮貞元三年授內府局丞四年授奚官局令六年授內謁者監七年授朝散大夫清階命服所以馭貴白珪無玷赤紱斯皇自天之渥澤方深漸陸之羽儀始就十一年授朝請大夫周旋密勿獻納端亮孔光問樹而不對石慶數馬而後言以公方之今古何遠十六年特加金紫所以懋其勤而昭其美也二十年加正議大夫內侍省內侍仍賜上柱國充教坊使位愈高而接物愈敬恩益厚而處躬益卑故能行與福隨動將吉會當德宗仙馭上升順宗宅憂諒闇公以貞固服勞之節宣承衞翊戴之忠嘉績悃誠可書竹帛皇上御極拱侍穆清疇其功庸疏以爵土元和元年封襄武縣開國男食邑三百戶充飛龍使二年加忠武將軍右武衞將軍三年授左神策軍副使加雲麾將軍馭衆之才著於倅理賜棨之戶耀其高門所以旌其勳表其貴也其年奉詔充淄青道宣慰使六年遷知內侍省事充弓箭庫使六年充惠昭太子監護使祗事既畢加冠軍大將軍至十月遷左領軍衞大將軍知內侍省事充左神策軍護軍中郎將兼左街功德使十二年春以勤瘁遘疾上章請告宸睠屬賴令臥護陳讓懇切累至再三動於天心方始得謝二月乙巳薨於翊善里之私第享年五十二聖皇軫悼輟膳興歎追念勳舊賻襚加等贈開府儀同三司左武衞上將軍所以錄其勞而飾其終也官司職喪僚吏襄事卜竁窀窆圖其永安以十月十四日葬於萬年縣鳳棲原祔從先域之松檟禮也惟公爰自弱冠暨於知命奉職三朝殫竭一心掌繁領重樹勳宣力澡濯仁義發揮心靈斯所謂奉上之忠閨門就養承順著聞及丁艱棘勺飲不進毀瘠過禮宗族感傷斯所謂因心之孝踐歷禁省榮耀貂璫冠軍護戎在帝左右飲冰持操鑒水潔身侈泰是懲燻灼自息冥與道契儉而全真生不務於家為歿仍規其薄葬斯所謂立志之本探賾精微講貫學藝周勃引強之能有而不恃孫武用奇之術知而罕論斯所謂遊藝之方綜事呈才仰奉睿旨允釐樂府韶夏是司演嶰谷之正聲絕齊竽之濫吹廨署增煥絲桐載和去而借留上叶宸聽既臨馬政一日必修用奚官訓騶之法整穆王八駿之皁及董武庫程範庶工弦木砥金罔不犀利斯所謂莅官之敬嘗馳星軺撫慰亠兊鄆海岱之域風宣露濡戎臣列校蹈舞感抃斯所謂銜命之功萬旅雲屯屹為親衞加拜中尉統茲六年夜護繚垣曉趨丹陛陰助神武制外自中獎善任材動必詢衆廣修廩庾贍食熊羆符伍有倫禮樂是閱咸使夫既勇且毅並務於移孝為忠至於別部支兵邊陲縣內拊循訓整不犯秋毫聞公之歿如喪親戚斯所謂護軍之畧宜其享之遐福錫以永年蒼蒼難諶不至者壽夫人長樂郡君馮氏端懿柔明慈和婉孌母儀婦德淑慎是彰自晝哭之罹凶乃冥心而習靜落髮壞服從哀即空元和十二年三月十五日出家受戒特勅正度仍賜法名正智賜居義陽寺所以遂宏誓而資幽福也嗣子希績次子給事郎行內侍省奚官局丞員外置同正員希昭次子正議大夫行內侍省員外置同正員上柱國賜紫金魚袋希貞次子正議大夫內侍省內侍員外置同正員上柱國賜紫金魚袋希晟次子希晃次子希慶芝蘭滿庭組綬相映荼蓼茹戚縗麻儼然哭泣之哀慕深先遠烝彞之紀思列舊勳欒欒貴臣匍匐上請詞臣奉詔傳信揚芳焯敘德善永垂貞石銘曰帝在法宮下臨八荒外倚輔弼內憑忠良奕奕彭公蘊義含章左右軒陛言端行方夙夜孔勤貔貅是職丹霄侍從黃道引翼深承寵渥克茂勳力寒玉侔清朱絲表直厚德多恕明誠不回決雲利器構廈長材北落謝疾東榮報哀恩加法賻官贈儀台祖載之辰清川曉涉悽愴笳挽搖曳旌翣新阡舊城龜從筮協原即鳳棲封如馬鬣紹續之馨子貴家榮繼孝嗣恪宣功保名纂篆金石琢磨堅貞用播徽烈將來作程
