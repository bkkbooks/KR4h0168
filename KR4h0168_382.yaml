front:
  text: 全唐文欽定全唐文卷三百八十二元結三
  hash: sha256:9ceb9bf06d649e8efad38558fbc270f347f4cbb9f6af880cec6ee6a95ffbbb77
body:
  text: 天下太平方千里之內生植齒類刺史能存亡休戚之天下兵興方千里之內能保黎庶能攘患難在刺史耳凡刺史若無文武才畧若不清廉肅下若不明惠公直則一州生類皆受其害於戲自至此州見井邑邱墟生人幾盡試問其故不覺涕下前輩刺史或有貪猥惛弱不分是非但以衣服飲食為事數年之間蒼生蒙以私欲侵奪兼之公家驅迫非奸惡強富殆無存者問之耆老前後刺史能恤養貧弱專守法令有徐公履道李公廙而已遍問諸公善或不及徐李二公惡有不堪說者故為此記與刺史作戒自置州以來諸公改授遷黜年月則舊記存焉己已中平昌孟公鎮湖南將二歲矣以威惠理戎旅以簡易肅州縣刑政之下則無撓人故居方多閑時與賓客嘗欲因高引望以抒遠懷偶愛古木數株垂覆城下遂作茅閣蔭其清陰長風寥寥入我軒檻扇和爽氣滿於閣中世傳衡陽暑溼鬱蒸休息於此何為不然今天下之人正苦大熱誰似茅閣蔭而庥之於戲賢人君子為蒼生之庥蔭不如是邪諸公詠歌以美之俾茅閣之什得系嗣於風雅者矣道州城西百餘步有小溪南流數十步合營溪水抵兩岸悉皆怪石欹嵌盤缺不可名狀清流觸石洄懸激注佳木異竹垂陰相蔭此溪若在山野則宜逸民退士之所游處在人間則可為都邑之勝境靜者之林亭而置州已來無人賞愛徘徊溪上為之悵然乃疏鑿蕪穢俾為亭宇植松與桂兼之香草以裨形勝為溪在州右遂命之曰右溪刻銘石上彰示來者舂陵俗不種菊前時自遠致之植於前庭牆下及再來也菊已無矣徘徊舊圃嗟歎久之誰不知菊也方華可賞在藥品是良藥為蔬菜是佳蔬縱須地趨走猶宜徙植修養而忍蹂踐至盡不愛惜乎於戲賢人君子自植其身不可不慎擇所處一旦遭人不愛重如此菊也悲傷奈何於是更為之圃重畦植之其地近讌息之堂吏人不此奔走近登望之亭旌旄不此行列縱參歌妓菊非可惡之草使有酒徒菊為助興之物為之作記以託後人并錄藥經列於記後癸卯中扶風馬向兼理武昌以明信嚴斷惠正為理故政不待時而成於戲若明而不信嚴而不斷惠而不正雖欲理身終不自理況於人哉公能令人理使身多暇招我畏暑且為涼亭亭臨大江復在山上佳木相蔭常多清風巡迴極望目不厭遠吾見公才殊政殊跡殊為此亭又殊因命之曰殊亭斲石刻記立於亭側庶幾來者無所憾焉永泰丙午中巡屬縣至江華縣大夫瞿令問咨曰縣南水石相映望之可愛相傳不可登臨俾求之得洞穴而入棧險以通之始得搆茅亭於石上及亭成也以階檻憑空下臨長江軒楹雲端上齊絕巔若旦暮景風烟靄異色蒼蒼石石庸含映水木欲名斯亭狀類不得敢請名之表示來世於是休於亭上為商之曰今大暑登之疑天時將寒炎蒸之地清涼可安合命之曰寒亭乃為寒亭作記刻之亭背樊水東盡其南乃樊山北鮮津吏欲於鮮上以為候舍漫叟家於樊上不醉則閑乃相其地形驗之圖記實吳故宴遊之處縣大夫馬公登之歎曰謝公贈伏武昌詩云樊山開廣宴非此地邪吾欲因而修之命曰廣宴亭何如漫叟頌之曰古人將修廢遺尤異之事為君子之道於戲天下有廢遺尤異之事如此亭者誰能修而旌之天將厭悔往乎使公方壯而有是心也吾當裁蓄簡札待為之頌故作廣宴亭記以先意云九疑山方二千餘里四州各近一隅世稱九峯相似望而疑之謂之九疑亦云舜望九峯疑禹而悲從臣有作九疑之歌因謂之疑九峯殊極高大遠望皆可見也彼如嵩華之峻峙衡岱之方廣在九峯之下磊磊然如布碁石者可以百數中峯之下水無魚鼈林無鳥獸時聞聲如蟬蠅之類聽之亦無往往見大谷長川平由深淵杉松百圍檜栝並茂青莎白沙洞穴丹崖寒泉飛流異竹雜華迴映之處似藏人家實有九水出於山中四水南流灌於南海五水北注合為洞庭若度其高卑比洞庭南海之岸直上可二三百里不知海內之山如九疑者幾焉或曰若然者茲山何不列於五岳對曰五帝之前封疆尚隘衡山作岳已出荒服今九疑之南萬里臣妾國門東望不見涯際西行幾萬里未盡邊陲當合以九疑為南岳以崑崙為西岳衡華之輩聽逸者占為山居封君表作苑囿耳但苦當世議者拘限常情牽引古制不能有所改剏也如何故圖畫九峯畧載山谷傳於好事以旌異之如山中之往跡峯洞之名稱為人所傳說者並隨方題記庶幾觀者易知時永泰丙午年也客有問元子曰子著二風詩何也曰吾欲極帝王理亂之道系古人規諷之流曰何如也夫至理之道先之以仁明故頌帝堯為仁帝安之以慈順故頌帝舜為慈帝成之以勞儉故頌夏禹為勞王修之以敬慎故頌殷宗為正王守之以清一故頌周成為理王此理風也夫至亂之道先之以逸惑故閔太康為荒王壞之以苛縱故閔夏桀為亂王覆之以淫暴故閔殷紂為虐王危之以用亂故閔周幽為惑王亡之於積累故閔周赧為傷王此亂風也訂曰子頌善上不及羲軒湯武閔惡又不及始皇哀靈焉可稱極帝王理亂之道對曰於戲吾敢言極極其中道者也吾且不曰著斯詩也將系規諷乎如羲軒之道也久矣誰能師尊如湯武之德吾則不敢頌為規法過於是也吾子審之元子天寶中曾預燕於諫議大夫之坐酒盡而無以續之大夫歎曰諫議冗者貧無以繼酒嗟哉元子醉中議之曰大夫頗能用一謀令大夫尊重如侍中威權等司隸若何大夫問謀對曰大夫得寱婢一人在人主左右以寱言為先諷則可請有所說大夫不聞古有邰侯侯家得寱婢寐則寱言言則侯輒鞭之如是一歲婢寱如故侯無如婢何有夷奴每厭勞辱寐則假寱其言似不怨主而若忠信侯聞問之則曰素有寱病寐中寱言非所知也引寱婢自辨詞說云云侯疑學婢鞭之不止矒之鉗之奴寱愈甚奴於是重窺侯意先事寱說說侯之過警以禍福侯又無如奴何客有知侯禍機因寱奴之先扣侯門諫侯侯以改過免禍侯納客為上賓復其奴命曰寱良氏子孫世在於邰大夫誠能學奴效婢假寱言以規諫人主俾悔過追誤與天下如新大夫見尊重威權何止侍中司隸大夫乃歎曰嗚呼吾謂今之士君子曾不如邰侯夷奴邪天寶戊子中元子遊長安與丐者為友或曰君友丐者不太下乎對曰古人鄉無君子則與雲山為友里無君子則與松柏為友坐無君子則與琴酒為友出遊於國見君子則友之丐者今之君子吾恐不得與之友也丐者丐論子能聽乎吾既與丐者相友喻求罷丐友相喻曰子羞吾為丐邪有可羞者亦曾知未也嗚呼於今之世有丐者丐宗屬於人丐嫁娶於人丐名位於人丐顏色於人甚者則丐權家奴齒以售邪佞丐權家婢顏以容媚惑有自富丐貧自貴丐賤於刑丐命命不可得就死丐時就時丐息至死丐全形而終有不可丐者更有甚者丐家族於僕圉丐性命於臣妾丐宗廟而不敢丐妻子而無辭有如此者不可為羞哉吾所以丐人之棄衣丐人之棄食提罌荷杖在於路傍且欲與天下之人為同類耳不然則無顏容行於人間夫丐衣食貧也以貧乞丐心不慙跡與人同示無異也此君子之道吾君子不欲全道邪幸不在山林亦宜具罌杖隨我作丐者之狀貌學丐者之言辭與丐者之相逢使丐者之無恥庶幾時世始能相容吾子無矯然取不容也於戲丐者言語如斯可編為丐論以補時規乾元已亥至寶應壬寅歲時人相誚議曰元次山嘗漫有所為且漫聚兵又漫辭官漫聞議云云因作漫論論曰世有規檢大夫持規之徒來問叟曰公漫然何為對曰漫為公也漫何以然對曰漫然規者怒曰人以漫指公者是他家惡公之辭何得翻不惡漫而稱漫為漫何檢括漫何操持漫何是非漫不足準漫不足規漫無所用漫無所施漫焉何效漫焉何師公髮已白無終惑之叟俛首而謝曰吾不意公之說漫至於此意如所說漫焉足恥吾當於漫終身不羞著書作論當為漫流於戲九流百氏有定限邪吾自分張獨為漫家規檢之徒則奈我何都昌縣大夫張粲君英將之官與其友賈德方元次山別且曰吾邑多山澤可致麋鹿為二賢羞賓客何如及到官書與二友曰待我化行旬月使虎為鹿豹為麕梟為鷓鴣蝦蟇為兔將以豐江外庖廚豈獨與德方次山之羞賓客也德方對曰嗚呼兵興歲久戰爭日甚生人怨痛何時休息君英之化豈及虎豹將恐虎窟公城豹遊公庭梟集公楹㣥蛙匝公而鳴敢以不然之論反化君英次山異德方報君英化虎之論豈直望化虎哉次山請商之君英所謂待吾化虎然後羞吾屬也其意蓋欲待朝廷化小人為君子化諂媚為公直化奸邪為忠信化進競為退讓化刑法為典禮化仁義為道德使天下之人心皆涵純樸豈止化虎而羞我哉德方未量君英歟次山故編所言為化虎之論自兵興已來今三年論者多云得如管仲者一人以輔人主當見天下太平矣元子異之曰嗚呼何是言之誤邪彼管仲者人耳止可與議私家畜養之計止可以修鄉里畎澮之事如此仲可當焉至如相諸侯材量已似不足致齊及霸材量極矣使仲見帝王之道識興國之禮則天子之國不衰諸侯之國不盛如曰不然請有所說仲之相齊及齊彊富則合請其君恢復王室節正諸侯君若惑之則引禍福以喻之君既聽矣然後約諸侯曰今王室將卑諸侯更彊文王風化殘削向盡武王疆域割奪無幾禮樂不知其田征伐何因而出我是故謹疆域勉日夜望振兵威可臨列國得與諸侯會盟一旦能新復天子之正朔更定天子之封畿上奉天子復先王之風化下令諸侯復先公之制度以為何如若皆不從我則以兵臨於魯魯不敢不從魯從則與魯西臨宋鄭宋鄭從則與三國北臨燕衞燕衞從則與諸國西臨秦晉秦晉從則與七國以尺簡約吳楚吳楚從則天下無不從之國然後定約若有果不從者則約從者曰吾屬以禮樂尊天子以法度正諸侯使小國不常患弱大國不敢怙彊此誠長世之策若天子國亡則諸侯交爭兵戈相臨誰為彊者則安得世世禮讓相服宗廟血食我是故力勸諸侯尊天子今某國猶豫宜往問之若不從約則與諸侯率兵伐之分其疆土遷其子孫留百里之地奉其宗社下為諸侯廣子孫之業上為天子除不順之臣何如如此則諸侯誰敢不從然後定天子封畿諸侯疆域輿服器玩禮樂法度征賦貢輸自齊魯節正節正既定乃共盟曰有貳約者當請命天子廢其驕凶以立恭順廢其荒惑以立明哲敢不聽者伐而分之如初約制定於是諸侯先各造邸於天子之都諸侯乃相率朝覲已而從天子齊戒拜宗廟禮畢天子誓曰於戲王室之卑久矣予不敢望皇天后土之所覆載將旦暮皁隸於諸侯不可則願全肌骨下見先王今諸侯不忘先王之大德不忘先公之忠烈共力正王室俾予主先王宗祀予若昏荒淫虐不納諫諍失先王法度上不能奉宗祀下不能安人民爾諸侯當理爾軍卒修爾矛㦸約爾列國罪予凶惡嗣立明辟予若能日勉孱弱力遵先王法度上奉宗祀下安人民爾諸侯當保爾疆域安爾人民修爾貢賦共予郊祀予有此誓豈云及予將及來世予敢以此誓誓於宗廟予敢以此誓誓於天地諸侯聞天子之誓相率盟曰天子有誓俾我諸侯世世得力扶王室使先王先公德業永長諸侯其各銘天子之誓傳之後嗣我諸侯重自約曰諸侯有昏惑當如前盟若天子昏惑不嗣虐亂天下諸侯當力共規諷諫諍如甚不可則我諸侯共率禮兵及王之畿復諫諍如初又甚不可進禮兵及王之郊終不可進禮兵及王之宮兵及王之宮矣當以宗廟之憂咨之當以人民之怨咨之當以天子昔誓咨之當以諸侯昔盟咨之以不敢欺先王先公告之以不敢欺皇天后土告之然後如天子昔誓如諸侯昔盟使管仲能如此則周之天子未為奴矣諸侯之國則未亡矣秦於天下未至是矣如曰仲才及也君不從也仲智及也時不可也則仲曾是謀也乎君不從之也歟仲曾是為也乎時之不可也歟況今日之兵不可以禮義節制不可以盟誓禁止如仲之輩欲何為矣古今所貴有土之官當其選授何嘗不難為其動靜是人禍福為其噓噏作人寒燠煩則人怨猛則人懼勿以賞罰因其喜怒太寬則慢豈能行令太簡則疎難與為政既明且斷直焉無情清而且惠果然必行或曰關由上官事不自我辭讓而去有何不可誰欲字人贈君此箴豈獨書紳可以銘心有時士教元子顯身之道曰於時不爭無以顯榮與世不佞終身自病君欲求權須曲須圓君欲求位須姦須媚不能此為窮賤勿辭元子對曰不能此為乃吾之心反君之言作我自箴與時仁讓人不汝上處世清介人不汝害汝若全德必忠必直汝若全行必方必正終身如此可謂君子蒼梧郡城東二三里有泉焉出在郭中清而甘寒若冰在盛暑之候蒼梧之人得救渴泉與火山相對故命之曰冰泉以變舊俗銘曰火山無火冰泉無冰惟彼泉源甘寒可徵鑄金磨石篆刻此銘置之泉上彰厥後生涍泉之陽得怪石焉左右前後及登石顛均有如似故命之曰五如石石皆有竇竇中湧泉泉詭異於七泉故命為七勝泉石有雙目一目命為洞井井與泉通一目命為洞樽樽可貝居酒石尾有穴有如礲者又如瀧者泉可渟澄匝石而流入礲中出而為瀧於戲彼能異於此安可不稱顯之銘曰五如之石何以為名請悉狀之誰為我聽左如旋龍低首回顧右如驚鴻張翅不去前如飲虎飲而蹲焉後如怒龜出洞登山若坐於顛石則如船乘彼靈槎在漢之間洞井如鑿淵然泉湧澄瀾涵石波起如動不旌尤異焉用為文刻銘石上於千萬春零陵瀧下三十里得丹崖翁宅有唐節督者曾為瀧水令去官家於崖下自稱丹崖翁丹崖湘中水石之異者翁湘中得道之逸者愛其水石為之作銘銘曰瀧水未盡瀧山猶峻忽見淵洄丹崖千仞磳磳丹崖其下誰家門前斷船籬上釣車不知幾峯為其四墉竹幽石磴飛泉戶中怪石臨淵石因石因石巔何得石巔翁獨醉眠吾欲與翁東西茅宇飲啄終老翁亦悅許世俗常事阻人心情徘徊崖下遂刻此銘道州江華縣東南六七里有回山南面峻秀下有大巖巖當陽端故以陽華命之吾遊處山林幾三十年所見泉石如陽華殊異而可家者未也故作銘稱之縣大夫瞿令問藝兼篆籀俾依石經刻之巖下銘曰九疑萬峯不如陽華陽華嶃巉其下可家洞開為巖巖當陽端巖高氣清洞深泉寒陽華旋回岑巔如闢溝塍松竹輝映水石尤宜逸民亦宜退士吾欲投節窮老於此懼人譏我以官矯時名節彰顯醜如此為於戲陽華將去思來前步却望踟广豆寸徘徊浯溪在湘水之南北匯於湘愛其勝異遂家溪畔溪世無名稱者也為自愛之故命浯溪銘曰湘水一曲淵洄傍山山開石門溪流潺潺山開如何巉巉雙石臨淵斷崖夾溪絕壁水實殊怪石又尤異吾欲求退將老茲地溪古地荒蕪沒已久命曰浯溪旌吾獨有人誰知之銘在溪口浯溪之口有異石焉高六十餘丈周迴四十餘步西面在江口東望峿臺北臨大淵南枕浯溪廎當乎石上異木夾戶疎竹傍簷瀛洲言無由此可信若在廎上目所厭者遠山清川耳所厭者水聲松吹霜朝厭者寒日方暑厭者清風於戲厭不厭也厭猶愛也命曰廎旌獨有也銘曰功名之伍貴得茅土林野之客所耽水石年將五十始有廎愜心自適與世忘情廎傍石上篆刻此銘浯溪東北二十餘丈得怪石焉周行三百餘步從未申至丑寅厓壁斗絕左屬回鮮前有磴道高八九十尺下當洄潭其勢碅磳半出水底蒼然泛泛若在波上石巔勝異之處悉為亭堂小峯歁竇宜間松竹掩映軒戶畢皆幽奇於戲古人有蓄憤悶與病於時俗者力不能築高臺以瞻眺則必山巔海畔伸頸歌吟以自暢達今取茲石將為峿臺蓋非愁怨乃所好也銘曰湘淵清深峿臺陗山陵登臨長望無遠不盡誰厭朝市羈牽局促借君此臺一縱心目陽厓礱琢如瑾如珉作銘刻之彰示後人峿臺西面㩻今支高迥在亭為東崖下可行坐八九人其為形勝與石門石屏亦猶宮羽之相資也銘曰峿臺蒼蒼西崖雲端亭午崖下清陰更寒可容枕席何事不安湘江西峯直平陽江口有寒泉出於石穴峯上有老木壽藤垂陰泉上近泉堪戙維大舟惜其蒙蔽不可得見踟广豆寸行循其水本無名稱也為其當暑大寒故命曰寒泉銘曰於戲寒泉瀛瀛江湄堪救渴暍人不之知當時大暑江流若湯寒泉一掬能清心腸誰謂仁惠不在茲水舟楫尚存為利未已天寶十三年春至夏甚旱秋至冬積雨西塞西南有迴山山巔是秋崩坼有穴出泉泉垂流三四百仞浮江中可望於戲陰陽旱雨時異以至柔破至堅事異以至下處至高理異故命斯泉曰異泉銘於泉上其意豈獨旌異而已乎銘曰何故作銘銘於異泉為其當不可閼坼石出焉何用作銘銘於異泉為其當不可下窮高流焉君子之德顯與晦殊為此銘者忘道也歟乾元戊戌浪生元結始浪家瀼溪之濱瀼溪蓋湓水分稱瀼水夏瀼江海則百里為瀼湖二十里為瀼溪瀼溪浪士愛之銘之其濱於戲古人喜尚君子不見君子見如似者亦稱頌之瀼溪可謂讓矣讓君子之道也稱頌如此可遺瀼溪若天下有如似讓者吾豈先瀼溪而稱頌者乎銘曰瀼溪之瀾誰取盥焉瀼溪之漪誰取飲之盥實可矣飲豈難矣得不慚其心不如此水浪士作銘將戒何人欲不讓者慚遊瀼濱郎亭西郛有藂石石臨樊水漫叟構石顛以為亭石有窊顛者因修之以藏酒士源愛之命為抔樽乃為士源作抔樽銘銘曰窊顛之石在吾亭上天全其器實有殊狀如竇而底似傾幾欹非曲非方不準不規孟公高賢命曰抔樽漫叟作銘當欲何言時俗澆狡日益偽薄誰能抔飲共守淳樸抔湖西南是退谷谷中有泉或激或懸為竇為淵滿谷生壽木又多壽藤縈之始入谷口令人忘返時士源以漫叟退修耕釣愛遊此谷遂命曰退谷元子作銘以顯士源之意銘曰誰命退谷孟公士源孟公之意漫叟知焉公畏漫叟心進跡退公懼漫叟名顯身晦公恐漫叟辭小受大於戲退谷獨為吾規干進之客不羞遊之何人作銘銘之谷口荒浪者歟退谷漫叟抔湖東抵抔樽西侵退谷北匯樊水南涯郎亭有菱有荷有菰有蒲方一二里能浮水與漫叟自抔亭遊退谷必泛此湖以湖在抔樽之下遂命曰抔湖銘曰誰遊江海能厭其大誰泛抔湖能厭其小故曰人不厭者君子之道於戲君子人不厭之死雖千歲其行可師可厭之類不獨為害死雖萬代獨堪汚穢或問作銘意盡此歟吾欲為人厭者勿泛抔湖道州東郭有泉七穴或吐於淵竇或瀪於嵌臼皆澄流清漪旋沿相奏又有藂石欹缺為之島嶼殊怪相異不可名狀此邦豈世無好事者邪而令自古荒之乃修其水木為休暇之處每至泉上便思老焉於戲凡人心若清惠而必忠孝守方直終不惑也故命五泉其一曰潓泉次曰忠泉次曰涍泉汸泉淔泉銘之泉上欲來者飲潄其流而有所感發者矣留一泉名曰漫泉蓋欲自旌漫浪不厭歡醉者也一泉出山東故命之曰東泉引來垂流更復殊異各刻銘以記之於戲潓泉清不可濁惠及於物何時竭涸將引官吏盥而飲之清惠不已泉乎吾規古之君子方以全道吾命汸泉方以終老欲令圓者飲吾汸泉知圓非君子能學方惡圓曲而為王直蒙戮辱寧戮不王直而不曲我頌斯曲以命淔泉將戒來世無改淔焉不為人臣老死山谷臣於人者不就汚辱我命忠泉勸人事君來潄泉流願為忠臣沄沄涍泉流清源深堪勸人子奉親之心時世相薄而日忘聖教欲將斯泉裨助純孝誰愛漫泉自成小湖能浮酒舫不沒石魚漫也叟稱名泉何為旌叟於此漫歡漫醉泉在山東以東為名愛其懸流溶溶在庭作銘者何吾意未盡將告來世無忘畎引道州城東有左湖湖東二十步有小石山山顛有窊石可以為樽乃為亭樽上刻石為志銘曰井石何狀如獸之踆其背䫜窊可以為樽空而臨之長岑深壑廣亭之內如見山岳滿而臨之曲浦回淵長瓢之下江湖在焉彼成全器誰為之力天地開鑿日月抆拭寒暑琢磨風雨潤色此器大樸尤宜直純勒銘亭下以告後人永泰丙午中自舂陵詣都使計兵至零陵愛其郭中有水石之異泊舟尋之得巖與洞此邦之形勝也自古荒之而無名稱以其東向遂以朝陽命之焉前刺史獨孤愐為吾翦闢榛莽後攝刺史竇泌為吾剏制茅閣於是朝陽水石始有勝絕之名已而刻銘巖下將示來世銘曰於戲朝陽怪異難狀蒼蒼半山如在水上朝陽水石可謂幽奇巖下洞口洞中泉垂彼高巖絕崖深洞寒泉縱僻在幽遠尤宜往焉況郡城井邑巖洞相對無人修賞競使蕪穢刻石巖下問我何為欲零陵水石世人有知
