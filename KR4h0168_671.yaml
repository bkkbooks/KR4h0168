  text: 全唐文欽定全唐文卷六百七十一白居易十六
  hash: sha256:cd0b807be46eb8d2873098a7f9dde5cf5b4259a9e4837ca760fc7c9af6f8101f
body:
  text: 夫欲達聰明致理化則在乎奉成式不必乎創新規也臣聞堯之所以神而化者聰明文思也舜之所以聖而理者明四目達四聰也蓋古之理化皆由聰明出也自唐虞以降斯道寖衰秦漢以還斯道大喪上不以聰接下下不以明奉上聰明之道既阻於上下則訛偽之俗不得不流於內外也國家承百王已弊之風振千古未行之法於是始立匭使始加諫員始命待制官始設登聞鼓故遺補之諫入則朝廷之得失所由知也匭使之職舉則天下之壅蔽所由通也待制之官進則衆臣之謀猷所由展也登聞之鼓鳴則㣥下之寃濫所由達也此皆我烈祖所創纍聖所奉雖堯舜之道無以出焉故貞觀之太和開元之至理率由斯而馴致矣自貞元以來抗疏而諫者留而不行投書於匭者寢而不報待制之官經時而不見於一問登聞之鼓終歲而不聞於一聲臣恐衆臣之謀猷或未盡展朝廷之得失或未盡知壅蔽者有所未通寃濫者有所未達今幸當陛下踐阼體元之始施令布和之初則宜申明舊章條舉廢事使列聖之述作不墜陛下之聰明惟新以初為常今其時矣時不可失惟陛下惜而行之則堯舜之化祖宗之理可得而致矣臣故曰達聰明致理化在乎奉成式不必乎創新規也臣聞國家之患患在臣之壅蔽也壅蔽之生生於君之好欲也蓋欲見於此則壅生於彼壅生於彼則亂作其間歷代有之可略言耳昔秦二代好佞趙高飾諂諛之言以壅之周厲好利榮夷公陳聚斂之計以壅之殷辛好音師涓作靡靡之樂以壅之周幽好色褒人納豔妻以壅之齊桓好味易牙蒸首子以壅之雖所好不同同歸於壅也所壅不同同歸於亂也故曰人君無見其意將為下餌蓋謂此矣然則明王非無欲也非無壅也蓋有欲則節之有壅則決之節之又節之以至於無欲也決之又決之以至於無壅也其所以然者將在乎靜思其故動防其微故聞甘言則慮趙高之諛進於側矣見厚利則慮榮夷公之計陳於前矣聽新聲則慮師涓之音誘於耳矣顧艷色則慮褒氏之女惑於目矣嘗異味則慮易牙之子入於口矣大如是安得不晝夜慮之寤寐思之立則見其參於前行則想其隨於後自然兢兢業業日慎一日使左不知其所欲右不知其所好雖欲壅蔽其可得乎此明王節欲決壅之要道也臣聞建官施令者君所執也率職知事者臣所奉也臣行君道則政專君行臣道則事亂專與亂其弊一也然則臣道者百職至衆萬事至繁誠非一人方寸所能盡也故王者但操其要擇其人而已將在乎分務於㣥司各令督責其課受成於宰相不以勤倦自嬰然後謹殿最而賞罰焉審幽明而黜陟焉則萬樞之要畢矣故失君道者雖多夕惕若厲之慮而彞倫未必序也行臣事者雖多日昃不食之勤而庶績未必凝也得其要逸而有終非其宜勞而無功故也臣又聞坐而論道三公之任也作而行之卿大夫之職也故陳平不肯知錢穀邴吉不問死傷者此有司之職也非宰相之任也夫以宰相尚不可侵有司之職况人君可侵宰相之任乎可侵百執事之事乎臣又聞宰相之任者上代天工下執人柄㣥職由之而理亂庶政由之而弛張君之心膂待宰相而啓沃君之耳目待宰相而聰明設其位不可一日非其人得其人不可一日無其寵疑則勿用用則勿疏然後能欣合其心馴致其道蓋先王所以端拱凝旒而天下大理者無他焉委務於有司也仰成於宰相也臣聞為國者皆患吏之貪而不知去貪之道也皆欲吏之清而不知致清之由也臣以為去貪致清者在乎厚其祿均其俸而已夫衣食闕於家雖嚴父慈母不能制其子况君長能檢其臣吏乎凍餒切於身雖巢由夷齊不能固其節况凡人能守其清白乎臣伏見今之官吏所以未盡貞廉者由祿不均而俸不足也不均者由所在課料重輕不齊也不足者由所在官長侵刻不已也其甚者則有官秩等而祿殊郡縣同而俸異或削奪以過半或停給而彌年至使衣食不充凍餒並至如此則必冒白刃蹈水火而求私利也况可使撫人字物斷獄均財者乎夫上行則下從身窮則心濫今官長日侵其利而望吏之不日侵於人不可得也蓋所謂渴馬守水餓犬護肉則雖日用刑罰不能懲貪而勸清必矣陛下今欲革時之弊去吏之貪則莫先於均天下課料重輕禁天下官長侵刻使天下之吏溫飽充於內清廉形於外然後示之以恥糾之以刑如此則縱或為非者百無一二也臣聞古者計人而置官量賦而制祿故官之省置必稽人戶之衆寡祿之厚薄必稱賦入之少多俾乎官足以理人人足以奉吏吏有常祿財有常征財賦吏員必參相得者也頃以兵戎屢動荒沴薦臻戶口流亡財征減耗則宜量其官而省之併其祿而厚之故官省則事事簡則人安祿厚則吏清吏清則俗阜而天下所由理也然則知清其吏而不知厚其祿則飾詐而不廉矣知厚其祿而不知省其官則財費而不足矣知省其官而不知選其能則事壅而不理矣此三者迭為表裏相須而成者也伏惟陛下詳而行之臣又見兵興以來諸道使府或因權宜而置職一置而不停或因暫勞而加俸一加而無減至使職多於郡縣之吏俸優於臺省之官積習生常煩費滋甚今若量其職員審其祿秩使衆寡有常數厚薄得其中故祿得其中則費不廣而下無侵削之患矣職有常數則事不煩而人無勞擾之弊矣此又利害相懸遠者伏惟陛下念而救之臣伏見百司食利利出於人日給而經費有常月徵而倍息無已然則舉之者無非貧戶徵之者率是遠年故私財竭於倍利官課積於逋債至使公食有闕人力不堪弊既滋深法宜改作且王者惡言求利患在不均况天下之錢一也謂之曰利曷若謂之曰征乎取之於寡曷若取之於衆乎今若日計其費歲會其用舉為定數命曰食征隨兩稅而分徵使萬民而均出散之天下其數幾何均之於衆則貧戶無倍息之弊矣入之有程則公食無告闕之慮矣公私交便其在茲乎臣伏以職田者職既不同田亦異數內外上下各有等差此亦古者公田稍食之制也國家自多事已來厥制不舉故稽其地籍而田則具存考以戶租而數多散失至有品秩等官署同廩祿厚薄之相懸近乎十倍者矣今欲辨內外之職均上下之田不必乎創新規其在乎舉舊典也臣謹按國朝舊典量品而授地計田而出租故地之多少必視乎品之高下租之厚薄必視乎田之肥墝如此則沃瘠齊而戶租均等列辨而祿食足矣今陛下求其典而典存焉索其田而田在焉誠能申明舉而行之則前弊必自革矣問傳曰誰能去兵兵之設久矣又曰先王耀德不觀兵二者古之明訓也然則君天下者廢而不用且涉去兵之非資以定功又乖耀德之美去就之理何者得中又問兵不妄動師必有名議之者頗辨否臧用之者多迷本末故有一戎而業成王霸一戰而禍及危亡興滅之迹何由逆順之要安在臣聞天下雖興好戰必亡天下雖安忘戰必危不好不忘天下之王也祭公曰先王耀德不觀兵老子曰兵者不祥之器不得已而用之斯則不好之明訓也傳曰誰能去兵兵之設久矣又周定天下偃武修文猶立司馬之官六軍之衆以時教戰斯又不忘之明訓也然則君天下者不可去兵也不可黷武也在乎用之有本末行之有逆順逆順之要大略有三而兵之名隨焉夫興利除害應天順人不為名先義然後動謂之義兵相時觀釁取亂侮亡不為禍先敵至而應謂之應兵恃力宣驕作威逞欲輕人性命貪人土田謂之貪兵兵貪者亡兵應者強兵義者王王之兵無敵於天下也故有征無戰焉強之兵先弱敵而後戰也故百戰百勝焉亡之兵先自敗而後戰也故勝與不勝同歸於亡焉然歷代君臣惑於本末聞王者之無敵則思耀武是獲一兔而欲守株也見亡者之自敗則思弭兵是因一咽而欲去食也曾不知無敵者根於義自敗者本於貪而欲歸咎於兵責功於武不其惑歟興廢之由逆順之要昭然可見唯陛下擇之臣伏見自古以來軍法之衆資糧之費未有如今日者時議者皆患兵之衆而不知衆之由皆欲兵之銷而不得銷之術故散之則軍情怨而戎心啓聚之則財用竭而人力疲為日既深其弊亦甚臣以為銷兵省費者在乎斷召募去虛名而已伏以貞元軍興以來二十餘年陛下念其勞效固不可散棄幸以時無戰伐又焉用增加臣竊見當今募新兵占舊額張虛簿破見糧者天下盡是矣斯則致衆之由積費之本也今若去虛名就實數則一日之內十已減其二三矣若使逃不補死不填則十年之間十又減其三四矣故不散棄之則軍情無怨也不增加之則兵數自銷也去虛就實則名不詐而用不費也故臣以為銷兵之方省費之術或在於此唯陛下詳之夫欲分兵權存戎備助軍食則在乎復府兵置屯田而已昔高祖始受隋禪太宗既定天下以為兵不可去農不可廢於是當要衝以開府因隙地以營田府有常官田有常業俾乎時而講武歲以勸農分上下之等遞勞逸之序故有虞則起為戰卒無事則散為農夫不待徵發而封域有備矣不勞饋餉而軍食自充矣此亦古者尉侯之制兵賦之義也况今關畿之內鎮壘相望皆仰給於縣官且無用於戰伐若使反兵於舊府興利於廢田張以簿書頒其廩積因其卒也安之以田宅因其將也命之以府官始復於關中稍置於天下則兵權漸分而屯聚之弊日銷矣戎備漸修而訓習之利日興矣軍食漸給而飛挽之費日省矣一事作而三利立唯陛下裁之臣聞君明則將賢將賢則兵勝故有不能理兵之將而無不可勝之兵有不能選將之君而無不可得之將是以君功見於選將將功見於理兵者也然則選將之術在乎因人之耳而聽之因人之目而視之因人之好惡而取捨之故明王選將帥也訪於衆詢於人若十人愛之必十人之將也百人悅之必百人之將也萬人伏之必萬人之將也臣以為賢愚之際優劣之間以此而求十得八九矣臣聞明王之御功臣也量其功而限之以爵審其罪而糾之以法限之以爵故爵加而知榮矣糾之以法故法行而知恩矣恩榮並加畏愛相濟下無二志上無疑心此明王所以念功勞而全君臣之道也若不限之以爵則無厭之心生矣雖極人臣之位而不知榮也若不糾之以法則不忌之心啓矣雖竭人主之寵而不知恩也恩榮不知畏愛不立而望奉上之心盡念功之道全或難矣故傳曰報者倦矣施者未厭此由爵無限而法不行使之然也唯陛下察之問戎狄之患久矣備禦之略多矣故王恢陳征討之謀賈生立表餌之術婁敬興和親之計朝錯建農戰之策然則古今異道利害殊宜將欲採之孰為可者又問今國家北虜誠南夷請命所未化者其惟西戎乎討之則疲頓師徒捨之則侵軼邊鄙許和親則啓貪而厚費約盟誓則飾詐而不誠今欲遏彼虔劉化其桀驁來遠人於朔漠復舊土於河湟上策遠謀備陳本末臣聞戎狄者一氣所生不可剪而滅也五方異族不可臣而畜也故為侵暴之患久矣而備禦之略亦多矣考其要旨大較有四焉若乃選將練兵長驅深入之謀自王恢始建以三表誘以五餌之術自賈誼始厚以賂遺結以和親之計自婁敬始徙人實邊勸農教戰之策自朝錯始然則用王恢之謀則殫財耗力罷竭生人禍結兵連功不償費故漢武憬然而下哀痛之詔也用賈誼之術則羌胡之耳目心腹雖誘而荒矣而華夏之財力風教亦隨而弊矣故漢文知其不可而不行也用婁敬之計則啓寵納侮厚費偷安雖侵略之患暫寧而和好之約屢背故漢氏四代為胸奴所欺也用朝錯之策則邊人有安土之患未免攻戰之勞胸奴無得志之虞亦絶歸心之望故漢武猶病之有廣武之役也是以討之以兵不若誘之以餌誘之以餌不若和之以親和之以親不若備之有素斯皆前代已驗之事可覆而視也以今參古棄短取長亦可擇而用焉然臣終以為近算淺圖非帝王久遠安邊之上策何者臣觀前代若政成國富德盛人安則雖六月有北伐之師不足憂也若政缺國貧德衰人困則雖一時無南牧之馬不足慶也何則國富則師壯師壯則令嚴人安則心固心固則思理如此久久則天子之守不獨在於諸侯將在於四夷矣則暫雖有事何足憂焉若國貧則師弱師弱則不虞人困則心離心離則思亂如此久久則天子之憂不獨在於邊陲或在於蕭牆矣則暫雖無事何足慶焉蓋古之王者慶在本而不在末憂在此而不在彼也今國家柔中懷外近悅遠來北虜向風南蠻底貢所未化者其餘幾何伏願陛下畜之如犬羊視之如蜂蠆不以士馬強而才力盛恃之而務戰爭不以亭障靜而煙塵銷輕之而去守備但且防其侵軼遏其虔劉去而勿追來而勿縱而已然後略四子之小術宏三王之大猷以政成德盛為圖以人安師壯為計故德盛而日聞則服服必懷柔師壯而時動則威威必震讋夫然可以不縻財用不煩師徒不盟誓而外服不和親而內附如此則四海之內五年之間要荒未服之戎必匍匐而來河隴已侵之地庶從容以歸上策遠謀不出於此矣臣伏見方今備邊之計未得其宜何則京師之兵其數頗衆域堡甚備器械甚精以之遏侵掠禁奪攘則可矣若犬戎大至長驅而來臣恐將卒雖多無能抗者今所以軫陛下慮者豈非此乎其所以然者蓋由鎮壘太多主將太衆故也夫鎮多則兵散兵散則威不相合而力不相濟矣將衆則心異心異則勝不相讓而敗不相救矣卒然有事誰肯當之今若合之為五將統之以一帥將合則戮力帥一則同心仍使均握其兵分守其界明察功罪必待賞罰然後據便宜之地扼要害之衝以逸待勞以寡制衆則雖黠虜無能為也臣又以為自古及今有不能守塞之兵而無不可守之塞有不能備戎之將而無不可備之戎故曰十圍之木持千鈞之屋得其宜也五寸之關能制其開闔居其要也伏惟陛下握戎之要操塞之關則西陲之憂可以少息矣問易曰王公設險以守其國記曰在德不在險然則用之則乖在德之訓棄之則違守國之誡二義相反其旨何從又問以山河為寶者萬夫不能當也以道德為藩者四夷為之守也何則苗恃洞庭負險而亡漢都天府用險而昌又何故也今欲鑒昌亡審用舍復何如哉臣聞易曰王公設險以守其國又秦得百二以吞天下齊得十二而霸諸侯蓋恃險之論興於此矣史記曰在德不在險傳曰九州之險是不一姓蓋棄險之議生於此矣臣以為險之為用用舍有時恃既失之棄亦未為得也何者夫險之為利大矣為害亦大矣故天地閉否守之則為利天地交泰用之則為害蓋天地有常險而聖人無常用也然則以道德為藩以仁義為屏以忠信為甲胄以禮法為干櫓者教之險政之守也以城池為固以金革為備以江山為襟帶以邱陵為咽喉者地之險人之守也王者之興也必兼而用之昔漢高帝除害興利以安天下自謂德不及於周而賢於秦故去洛之易即秦之險建都創業垂四百年是能兼而用之也桀紂三苗之徒負大河憑太行保洞庭而不修德政坐取覆亡者是專恃其險也莒子恃其僻陋不修城郭浹辰之間喪其三都者是怠棄其險也由斯而觀之山河之阻溝墉之固可用而不可恃也可誡而不可棄也智以險昌愚以險亡昌亡之間唯陛下能鑒之問周制五等其弊也王室衰微秦廢列國其敗也天下崩壞漢封子弟其失也侯王僭亂何則為制不同同歸於弊也故自古及今議其是非者多矣今若建侯開國恐失隨時之宜如置守專城慮乖稽古之義考其要旨其誰可從又問封建之制肇自黃唐郡縣之規始於秦漢或沿或革以至國朝今欲子兆人家四海建不拔之業垂無疆之休大鑒興亡從長而用無論古今擇善而行侯與守而何先郡與國而孰愈具書於策當舉行之臣聞封建之廢久矣是非之論多矣異同之要歸於三科或曰周人制五等封親賢其弊也諸侯擅戰伐陪臣執國命故聞蠶食瓜剖以至於衰滅也而李斯周青臣之議繇是興焉又曰秦皇廢列國棄子弟其敗也萬民無定主九族為匹夫故魚爛土崩以至於覆亡也而曹冏士衡之論繇是作焉又曰漢氏侯功臣王同姓其失也爵號太尊土宇太廣故鴟張瓦解以至於勃亂也而朝錯主父之計繇是行焉然則秦懲周之弊也既以亡而易衰漢鑒秦之亡也亦矯枉而過正歷代之説無出於此者以臣所觀竊謂知其一未知其二也何者臣聞王者將欲家四海子兆人垂無疆之休建不拔之業者在乎操理柄立人防導化源固邦本而已蓋刑行德立近悅遠安恩信推於中惠化流於外如此則四夷為臣妾况海內乎雖置守罷侯亦無害也若法壞政荒親離賢棄王澤竭於上人心叛於下如此則九族為讐敵况天下乎雖廢郡建邦又何益也故臣以為周之衰滅者上失其道天厭其德非為封建之弊也秦之覆亡者君流其毒人離其心非唯郡縣之咎也漢之禍亂者寵而失教立不選賢非獨強大之故也繇是觀之苟固其本導其源雖郡與國俱可理而安矣苟踰其防失其柄雖侯與守俱能亂且危矣伏惟陛下慮遠憂近鑒古觀今以敦睦親族為先不以封王為急以優勸勞逸為念不以建侯為思以尊賢寵德為心不以開國為意以安撫黎元為事不以廢郡為謀則無疆之休不拔之業在於此矣况國家之制垂二百年法著一王理經十聖變革之議非臣敢知問三代之牧人也立井田之制別都鄙之名其為名制可得而知乎其為功利可得而聞乎又問自秦壞井田漢修阡陌兼並大啓遊惰實繁雖歷代因循誠恐弊深而害甚如一朝改作或慮失業而擾人既廢之甚難又復之非便斟酌其道何者得中臣聞王者之貴生於人焉王者之富生於地焉故不知地之數則生業無從而定財征無從而平也不知人之數則食力無從而計軍役無從而均也不均不平則地雖廣人雖多徒有富之名而無富之實是以先王度土田之廣狹畫為夫井量人戶之衆寡分為邑居使地利足以食人人力足以闢土邑居足以處衆人力足以安家野無餘田以啓專利邑無餘室以容遊人逃刑避役者往無所之敗業遷居者來無所處於是生業相因食力相濟其出財征也不待徵書而已平矣其起軍役也不待料人而已均矣然後天子可以稱萬乘之貴四海之富也洎三代之後厥制崩壞故井田廢則遊惰之路啓阡陌作則兼並之門開至使貧苦者無容足立錐之居富強者專籠山絡野之利故自秦漢迄於聖朝因循未遷積習成弊然臣以為井田者廢之頗久復之稍難未可盡行且宜漸制何以言之昔商鞅開秦之利也蕩然廢之故千載之間豪奢者得其計王莽革漢之弊也卒然復之故一時之間農桑者失其業斯則不可久廢不可速成之明驗也故臣請斟酌時宜參詳古制大抵人稀土廣者且修其阡陌戶繁鄉狹者則復以井田使都鄙漸有名家夫漸有數夫然則井邑兵田之地衆寡相維門閭族黨之居有亡相保相維則兼並者何所取相保則遊惰者何所容如此則庶乎人無浮心地無遺力財産豐足賦役平均巿利歸於農生業著於地者矣問肉刑者其來尚矣其廢久矣前賢之論是非紛然今欲棄之而不行法或乖於稽古若舉而復用義恐失於隨時取捨之間何者為可臣伏以漢除肉刑逮今千有餘祀其間博聞達識之士議其是非者多矣其欲廢之者則曰刻膚革斷支體人主忍而用之則愷悌惻隱之心乖矣此緹縈所謂雖欲改過自新其道亡繇者也其欲復之者則曰任箠令用鞭刑酷吏倚而行之則專殺濫死之弊作矣此班固所謂以死罔人失本惠者也臣以為議事者宜徵其實用刑者宜酌其情若以情實言之則可廢而不可復也何者夫肉刑者蓋取劓腓黥刖之類耳書所謂五虐之刑也昔苗人始為之而天既降咎及秦人又虐用之而天下亦離心夫如是則豈無濫死者耶漢文帝始除去之而刑罰以清我太宗亦因而棄之而人用不犯夫如是則豈有罔人者耶此臣所謂徵其實者也臣又聞聖人之用刑也輕重適時變用舍順人情不必乎反今之宜復古之制也况肉刑廢之久矣人莫識焉今一朝卒然用之或絶筋或折骨或面傷則見者必痛其心聞者必駭其耳又非聖人適時變順人情之意也徵之於實既如彼酌之於情又如此可否之驗豈不明哉傳曰君子為政貴因循而重改作又曰利不百不變法臣以為復之有害而無利也其可變而改作乎問聖王之致理也以刑糾人惡故人知勸懼以禮導人情故人知恥格以道率人性故人反淳和三者之用不可廢也意者將偏舉而用耶將並建而用耶從其宜先後有次耶成其功優劣有殊耶然則相今日之所宜酌今日之所急將欲致理三者奚先臣聞人之性情者君之土田也其荒也則剃之以刑其闢也則蒔之以禮其植也則穫之以道故刑行而後禮立禮立而後道生始則失道而後禮中則失禮而後刑終則修刑以復禮修禮以復道故曰刑者禮之門禮者道之根知其門守其根則王化成矣然則王化之有三者猶天之有兩曜歲之有四時廢一不可也並用亦不可也在乎舉之有次措之有倫而已何者夫刑者可以禁人之惡不能防人之情禮者可以防人之情不能率人之性道者可以率人之性又不能禁人之惡循環表裏迭相為用故王者觀理亂之深淺順刑禮之後先當其懲惡抑淫致人於勸懼莫先於刑剗邪窒欲致人於恥格莫尚於禮反和復朴致人於敦厚莫大於道是以衰亂之代則弛禮而張刑平定之時則省刑而宏禮清淨之日則殺禮而任道亦如祁寒之節則疏水而附火徂暑之候則遠火而狎水順歲候者適水火之用達時變者得刑禮之宜適其用達其宜則天下之理畢矣王者之化成矣將欲較其短長原其始終順其變而先後殊備其用而優劣等離而言之則異致合而理之則同功其要者在乎舉有次措有倫適其用達其理而已方今華夷有截內外無慮人思休和俗已平泰是則國家殺刑罰之日崇禮樂之時所以文易化成道易馴致者由得其時也今則時矣伏惟陛下惜而不失焉問成康御宇囹圄空虛文景繼統刑罰不用太宗化下而人不犯成此功者其效安在桀紂在上比屋可誅秦氏為君赭衣滿道致此弊者其故安在今欲鑒桀紂秦氏之弊繼周漢太宗之功使人有恥且格刑措不用備詳本末著之於篇臣聞仲尼之訓也既庶矣而後富之既富矣而後教之管子亦云倉廩實知禮節衣食足知榮辱然則食足財豐而後禮教所由興也禮行教立而後刑罰所由措也蓋前事之不忘後事之元龜臣請以前事明之當周成康之時天下富壽人知恥格故囹圄空虛四十餘年當漢文景之時節用勸農海內殷實人人自愛不犯刑法故每歲決獄僅至四百及我太宗之朝勤儉化人人用富庶加以德教至於升平故一歲斷刑不滿三十雖則明聖慎刑賢良恤獄之所致也然亦由天下之人生厚德正而寡過也當桀紂之時暴征讐斂萬姓窮苦有怨無恥姦宄並興故是時也比屋可戮及秦之時厚賦以竭人財遠役以殫人力力殫財竭盡為寇賊㣥盜滿山赭衣塞路故每歲斷罪數至十萬雖則暴君淫刑姦吏弄法之所致也然亦由天下之人貧困思姦而多罪也由是觀之刑之繁省繫於罪之衆寡也教之廢興繫於人之貧富也聖王不患刑之繁而患罪之衆不患教之廢而患人之貧故人苟富則教斯興矣罪苟寡則刑斯省矣是以財産不均貧富相併雖堯舜為主不能息忿爭而省刑獄也衣食不充凍餒並至雖臯陶為士不能止姦宄而去盜賊也若失之於本求之於末雖聖賢並生臣竊以為難矣至若察小大之獄審輕重之刑定加減於科條得情偽於察色此有司平刑之要也非王者恤刑之德也至若盡欽恤之道竭哀矜之誠使生者不怨死者不恨此王者恤刑之法也非聖人措刑之道也必欲端影於表澄流於源則在乎富其人崇其教開其廉恥之路塞其寃濫之門使人內樂其生外畏其罪則必過犯自省刑罰自措斯所謂致㣥心於有恥立大制於不嚴古者有畫衣冠異章服而人不犯者由此道素行也問今之法貞觀之法今之官貞觀之官昔何為而太和今何為而未理事同效異其故何哉將刑法不便於時耶抑官吏不得其人耶臣伏以今之刑法太宗之刑法也今之天下太宗之天下也何乃用於昔而俗以寧一行於今而人未休和臣以為非刑法不便於時是官吏不循其法也此由朝廷輕法科賤法吏故應其科與補其吏者率非君子也甚多小人也蓋刑者君子行之則誠信而簡易簡易則人安小人習之則詐偽而滋彰滋彰則俗弊此所以刑一而用二法同而理殊者也矧又律令塵蠹於棧閣制敕堆盈於案几官不遍覩法無定科今則條理輕重之文盡詢於法直是使國家生殺之柄假在於小人小人之心孰不可忍至有黷貨賄者矣有怙親愛者矣有陷讐怨者矣有畏權豪者矣有欺賤弱者矣是以重輕加減隨其喜怒出入比附由乎愛憎官不察其所由人不知其所避若然則雖有貞觀之法苟無貞觀之吏欲其刑善無乃難乎陛下誠欲申明舊章剗革前弊則在乎高其科重其吏而已臣謹按漢制以四科辟士其三曰明習律令足以決狐疑能按章覆問文中御史者辟而用之伏惟陛下懸法學為上科則應之者必俊乂也升法直為清列則授之者必賢良也然後考其能獎其善明察守文者擢為御史欽恤用情者遷為法官如此則仁恕之誠廉平之氣不散於牘之間矣掊刻之心舞文之弊不生於刀筆之下矣與夫愚詐小吏竊而弄之者功相萬也臣又聞管仲奪伯氏之邑沒無怨言季羔刖門者之足亡而獲宥孔明黜廖立之位死而垂泣三子者可謂能用刑矣臣伏思之亦何代無其人哉在乎求而用之考而獎之而已伏惟陛下再三察焉問政不可寬寬則人慢刑不可急急則人殘故失於恢恢則漏網而為弊務於察察則及泉而不祥將使寬猛適宜疏密合制上施畏愛之道下有悅服之心刑政之中何者為得臣聞聖人在上使天下畏而愛之悅而服之者由乎理大罪赦小過也書曰宥過無大况小者乎刑故無小况大者乎故宥其小者仁也仁以容之則天下之心愛而悅之矣刑其大者義也義以糾之則天下之心畏而服之矣臣竊見國家用法似異於是何則急察之政急於朝官而寬於外官懲戒之刑加於小吏而縱於長吏是則權輕而過小者或反繩之寄重而罪大者或反捨之臣復思之恐非先王宥過刑故之道也然則小大之喻其猶魚耶魚之在泉者小也察之不祥魚之吞舟者大也漏之不可刑煩猶水濁水濁則魚喁政寬猶防決防決則魚逝是以善為理者舉其綱疏其網綱舉則所羅者大矣網疏則所漏者小也伏惟陛下舉其綱於長吏疏其綱於朝官舍小過以示仁理大罪而明義則畏愛悅服之化暗然而日彰於天下矣臣聞聖王之去盜賊也有二道焉始則舉有德選有能使教化大行姦宄者去次又安其業厚其生使廉恥大興貪暴者息故舜舉臯陶不仁者遠晉用士會盜奔於秦此舉德選能之效也成康阜其俗禮讓興行文景富其人盜賊屏息此安業厚生之驗也由是觀之則俗之貪廉盜之有無繫於人之勞逸吏之賢否也方今禁科雖嚴桴鼓未靜敓襄攴者時聞於道路穿窬者或縱於鄉閭無乃陛下之人有多困窮凍餒者乎無乃陛下之吏有非循良明白者乎伏惟陛下大推愛人之誠廣喻稱善之旨厚其生業使俗知恥格舉以賢德使國無幸人自然廉讓風行姦濫日息則重門罕聞於擊柝外戶庶見於不扄者矣臣謹按書曰眚災肆赦又易曰雷雨作解君子以赦過宥罪斯則赦之不可廢也必矣管子曰赦者奔馬之委轡也不赦者痤疽之石廉石也又諺曰一歲再赦婦兒喑啞斯又赦之不可數也明矣然則赦之為用用必有時數既失之廢亦未為得也何者赦之為德大矣為賊亦甚矣大凡王者踐祚改元之初一用之則為德也居常致理之際數用之則為賊也故踐祚而無赦則布新之義缺而好生之德廢矣居常有數赦則惠姦之路啓而召亂之門開矣由此而觀蓋赦者可疏而不可數也可重而不可廢也用捨之要其在茲乎問學者教之根理之本國家設庠序以崇儒術張禮樂而厚國風師資肅以尊嚴文物煥其明備何則學詩書者拘於文而不通其旨習禮樂者滯於數而不達其情故安上之禮未行化人之學將落今欲使工祝知先王之道生徒究聖人之心詩書不失於愚誣禮樂無聞於盈減積之為言行播之為風化何為何作得至於斯臣聞化人動衆學為先焉安上尊君禮為本焉故古之王者未有不先於學本於禮而能建國君人經天緯地者也國家刪定六經之義裁成五禮之文是為學者之先知生人之大惠也故命太常以典禮樂立太學以教詩書將欲使四術並舉而行萬人相從而化然臣觀之太學生徒誦詩書之文而不知詩書之旨太常工祝執禮樂之器而不識禮樂之情遺其旨則作忠興孝之義不彰失其情則合敬同愛之誠不著所謂去本而從末棄精而好粗至使陛下語學有將落之憂顧禮有未行之嘆者此由官失其業師非其人故但有修習之名而無訓導之實也伏望審官師之能否辨教學之是非俾講詩者以六義風賦為宗不專於鳥獸草木之名也讀書者以五代典謨為旨不專於章句詁訓之文也習禮者以上下長幼為節不專於俎豆之數裼襲之容也學樂者以中和友孝為德不專於節奏之變綴兆之度也夫然則詩書無愚誣之失禮樂無盈減之差積而行立者乃升之於朝廷習而事成者乃用之於宗廟是故溫柔敦厚之教疏通知遠之訓暢於中而發於外矣莊敬威嚴之貌易直子諒之心行於上而流於下矣則覩之者莫不承順聞之者莫不率從管乎人情出乎理道欲人不化上不安其可得乎臣聞仲尼沒而微言絶七十子喪而大義乖大義乖則小説興微言絶則異端起於是乎歧分派別而百氏之書作焉然則六家之異同馬遷論之備矣九流之得失班固敘之詳矣是非取舍較然可知今陛下將欲抑諸子之殊途遵聖人之要道則莫若宏四術之正義崇九經之格言故正義著明則六家之異見不除而自退矣格言具舉則九流之偏説不禁而自隱矣夫如是則六家九流尚為之隱退况百氏之殊文詭制得不藏匿而銷蕩乎斯所謂排小説而扶大義斥異端而闡微言辨惑嚮方化人成俗之要也伏惟陛下必行之問禮樂並用其義安在禮樂共理其效何徵禮之崩也何方以救之乎樂之壞也何術以濟之乎臣聞序人倫安國家莫先於禮和人神移風俗莫尚於樂二者所以並天地參陰陽廢一不可也何則禮者納人於別而不能和也樂者致人於和而不能別也必待禮以濟樂樂以濟禮然後和而無怨別而不爭是以先王並建而用之故理天下如指諸掌耳志曰六經之道同歸而禮樂之用為急故前代有亂亡者由不能知之也有知而危敗者由不能行之也有行而不至於理者由不能達其情也能達其情者其唯宗周乎周之有天下也修禮達樂者七年刑措不用者四十年負扆垂拱者三百年龜鼎不遷者八百年斯可謂達其情臻其極也故孔子曰吾從周然則繼周者其唯皇家乎臣伏聞禮減則銷銷則崩樂盈則放放則壞故先王減則進之盈則反之濟其不及而泄其過用能正人道反天性奮至德之光焉國家承齊梁陳隋之弊遺風未弭故禮稍失於殺樂稍失於奢伏惟陛下慮其減銷則命司禮者大明唐禮防其盈放則詔典樂者少抑鄭聲如此則禮備而不偏樂和而不流矣繼周之道其在茲乎問禮樂之用百王共之然則歷代以來或沿而理或革而亂或損而興或益而亡何述作之迹同而失得之效異也方今大制雖立至理未臻豈沿襲損益未適其時宜將文物聲明有乖於古制思欲究盛禮之旨審至樂之情不和者改而更張可繼者守而不失具陳其要當舉而行臣聞議者曰禮莫備於三王樂莫盛於五帝非殷周之禮不足以理天下非堯舜之樂不足以和神人是以總章辟壅冠服簠簋之制一不備於古則禮不能行矣干戚羽旄屈伸俯仰之度一不修於古則樂不能和矣古今之論大率如此臣竊謂斯言失其本得其末非通儒之達識也何者夫禮樂者非天降非地出也蓋先王酌於人情張為通理者也苟可以正人倫寧家國是得制禮之本意也苟可以和人心厚風俗是得作樂之本情也蓋善沿禮者沿其意不沿其名善變樂者變其數不變其情故得其意則五帝三王不相沿襲而同臻於理失其情則王莽屑屑習古適足為亂矣故曰行禮樂之情者王行禮樂之飾者亡蓋謂是矣且禮本於體樂本於聲文物名數所以飾其體器度節奏所以文其聲聖人之理也禮至則無體樂至則無聲然則苟至於理也聲與體猶可遺况於文與飾乎則本末取舍之宜可明辨矣今陛下以上聖之資守烈祖之制不待損益足以致理然苟有沿革則願陛下審本末而述作焉蓋禮者以安上理人為體以別疑防欲為用以玉帛俎豆為數以周旋裼襲為容數與容可損益也體與用不可斯須失也樂者以易直子諒為心以中和孝友為德以律度鏗鏘為飾以綴兆舒疾為文飾與文可損益也心與德不可斯須失也夫然則禮得其本樂達其情雖沿革損益不同同歸於理矣問時議者或云樂者聲與器遷音隨曲變若廢今器用古器則哀淫之音息矣若捨今曲奏古曲則正始之音興矣其説若此以為何如臣聞樂者本於聲聲者發於情情者繫於政蓋政和則情和情和則聲和而安樂之音由是作焉政失則情失情失則聲失而哀淫之音由是作焉斯所謂音聲之道與政通矣伏覩時議者臣竊以為不然何者夫器者所以發聲聲之邪正不繫於器之今古也曲者所以名樂樂之哀樂不繫於曲之今古也何以考之若君政驕而荒人心動而怨則雖舍今器用古器而哀淫之聲不散矣若君政善而美人心和而平則雖奏今曲廢古曲而安樂之音不流矣是故和平之代雖聞桑間濮上之音人情不淫也不傷也亂亡之代雖聞咸頀韶武之音人情不和也不樂也故臣以為銷鄭衛之聲復正始之音者在乎善其政和其情不在乎改其器易其曲也故曰樂者不可以偽唯明聖者能審而述作焉臣又聞若君政和而平人心安而樂則雖援蕢桴擊野壤聞之者亦必融融泄泄矣若君政驕而荒人心困而怨則雖撞大鐘伐鳴鼓聞之者適足慘慘戚戚矣故臣以為諧神人和風俗者在乎善其政歡其心不在乎變其音極其聲也問聖王立郊廟重祭祀者將以展誠敬而事鬼神乎將欲裨教化而利生人乎又問近者敬失於鬼祭祀以淫禳禱者有僭濫諂媚之風蒸嘗者失疏數豐儉之節今欲使俗無淫祀家不黷神物省費而厚生人守義而不惑何為何作可以救之臣聞祭祀之義大率有三禋於天地所以示人報本也祠於聖賢所以訓人崇德也享於祖考所以教人追孝也三者行於天下則萬人順百神和此先王所以重祭祀者也臣又觀之豈直若是而已哉蓋先王因事神而設教因崇祀以利人俾乎人竭其誠物盡其美美致於鬼則利歸於人焉故阜其牲牷則牛羊不得不蕃矣豐其黍稷則倉廩不得不實矣美其祭服則布帛不得不精矣不畜者無牲不田者無盛則遊惰者不得不懲矣勤本者不得不勉矣四者行於天下雖曰事鬼神其實厚生業也故曰禮行於祭祀則百貨可極焉斯之謂矣然則物力有餘則奢淫之弊起祀事不節則諂黷之萌生先王又防其然也是以宗廟有數豐約有度疏數有時非其度者則鬼不享而禮不容非其類者則神不歆而刑不舍二者行於天下則人與神不相黷矣不相傷矣近代以來稍違祀典或禮物失於奢儉或巫史假於淫昏追遠者昧從生之文僥福者有媚神之祭雖未甚弊亦宜禁之伏惟陛下崇設人防申明國典蒸嘗不經者示之以禮禳禱非鬼者糾之以刑所謂存其正抑其邪則人不惑矣著其誠謹其物則人厚生矣斯亦齊風俗和人神之大端也惟陛下詳之臣伏以國朝參古今之儀制喪葬之紀尊卑豐約煥然有章今則鬱而不行於天下者久矣至使送終之禮大失其中貴賤昧從死之文奢儉乖稱家之義况多藏必辱於死者厚費有害於生人習不知非寖而成俗此乃敗禮法傷財力之一端也陛下誠欲革其弊抑其淫則宜乎振舉國章申明喪紀奢侈非宜者齊之以禮凌僭不度者董之以威故威行於下則壞法犯貴之風移矣禮適其中則破産傷生之俗革矣移風革俗其在茲乎問漢魏以降像教寖興或曰足以耗蠧國風又云足以輔助王化今欲禁之勿用恐乖誘善崇福之方若許之大行慮成異數殊俗之弊裨化之功誠著傷生之費亦深利病相形從其遠者臣聞上古之化也大道惟一中古之教也精義無二蓋上率下以一德則下應上無二心故儒墨六家不行於五帝道釋二教不及於三王逮乎德既下衰道又上失源離派別朴散器分於是乎儒道釋之教鼎立於天下矣降及近代釋氏尤甚焉臣伏覩其教大抵以禪定為根以慈忍為本以報應為枝以齋戒為葉夫然亦可誘掖人心輔助王化然臣以為不可者有以也臣聞天子者奉天之教令兆人者奉天子之教令令一則理二則亂若參以外教二三孰甚焉况國家以武定禍亂以文理華夏執此二柄足以經緯其人矣而又區區西方之教與天子抗衡臣恐乖古先惟一無二之化也然則根本枝葉王化備焉何必使人棄此取彼若欲以禪定復人性則先王有恭默無為之道在若欲以慈忍厚人德則先王有忠恕惻隱之訓在若欲以報應禁人僻則先王有懲惡勸善之刑在若欲以齋戒抑人淫則先王有防欲間邪之禮在雖臻其極則同歸或能助於王化然於異名則殊俗足以二乎人心故臣以為不可者以此也况僧徒月益佛寺日崇勞人力於土木之功耗人利於金寶之飾移君親於師資之際曠夫婦於戒律之間古人云一夫不田有受其餒者一婦不織有受其寒者今天下僧尼不可勝數皆待農而食待蠶而衣臣竊思之晉宋齊梁以來天下凋弊未必不由此矣伏惟陛下察焉問國家化天下以文明獎多士以文學二百餘載文章煥焉然則述作之間久而生弊書事者罕聞於直筆褒美者多覩其虛辭今欲去偽抑淫芟蕪剗穢黜華於枝葉反實於根源引而救之其道安在臣謹案易曰觀乎人文以化成天下記曰文王以文理則文之用大矣哉自三代以還斯文不振故天以將喪之弊授我國家國家以文德應天以文教牧人以文行選賢以文學取士二百餘年煥乎文章故士無賢不肖率注意於文矣然臣聞大成不能無小弊大美不能無小疵是以凡今秉筆之徒率爾而言者有矣斐然成章者有矣故歌詠詩賦碑碣讚誄之制往往有虛美者矣有愧辭者矣若行於時則誣善惡而惑當代若傳於後則混真偽而疑將來臣伏思之大非先王文理化成之教也且古之為文者上以紉王教繫國風下以存炯戒通諷諭故懲勸善惡之柄執於文士褒貶之際焉補察得失之端操於詩人美刺之間焉今褒貶之文無核實則懲勸之道缺矣美刺之詩不稽政則補察之義廢矣雖雕章鏤句將焉用之臣又聞稂莠秕稗生於穀反害穀者也淫辭麗藻生於文反傷文者也故農者耘稂莠簸秕稗所以養穀也王者刪淫辭削麗藻所以養文也伏惟陛下詔主文之司諭養文之旨俾辭賦合炯戒諷諭者雖質雖野採而獎之碑誄有虛美愧辭者雖華雖麗禁而絶之若然則為文者必當尚質抑淫著誠去偽小疵小弊蕩然無遺矣則何慮乎皇家之文章不與三代同風者歟問聖人之致理也在乎酌人言察人情而後行為政順為教者也然則一人之耳安得遍聞天下之言乎一人之心安得盡知天下之情乎今欲立採詩之官開諷刺之道察其得失之政通其上下之情子大夫以為何如臣聞聖王酌人之言補已之過所以立理本導化源也將在乎選觀風之使建採詩之官俾乎歌詠之聲諷刺之興日採於下歲獻於上者也所謂言之者無罪聞之者足以自誡大凡人之感於事則必動於情然後興於嗟歎發於吟詠而形於歌詩矣故聞蓼蕭之篇則知澤及四海也聞禾黍之詠則知時和歲豐也聞北風之詩則知威虐及人也聞碩鼠之刺則知重斂於下也聞廣袖高髻之謠則知風俗之奢蕩也聞誰其穫者婦與姑之言則知征役之廢業也故國風之盛衰由斯而見也王政之得失由斯而聞也人情之哀樂由斯而知也然後君臣親覽而斟酌焉政之廢者修之闕者補之人之憂者樂之勞者逸之所謂善防川者決之使導善理人者宣之使言故政有毫髮之善下必知也教有錙銖之失上必聞也則上之誠明何憂乎不下達下之利病何患乎不上知上下交和內外胥悅若此而不臻至理不致升平自開闢以來未之聞也老子曰不出戶知天下斯之謂歟問國家立諫諍之官開啓沃之路久矣而謇諤者未盡其節謀猷者未竭其誠思欲取天下之耳目裨我視聽盡天下之心智為我思謀政之壅蔽者決於中令之絶滅者通於外上無違德下無隱情何為何方得至於此又問先王立訓唯諫是從然則歷代君臣有賢有否至若獻替之際是非之間若君過臣規固宜有言必納如上得下失豈可從諫如流以是訓人其義安在臣聞天子之耳不能自聰合天下之耳聽之而後聰也天子之目不能自明合天下之目視之而後明也天子之心不能自聖合天下之心思之而後聖也若天子唯以兩耳聽之兩目視之一心思之則十步之內不能聞也百步之外不能見也殿庭之外不能知也而况四海之大萬幾之繁者乎聖王知其然故立諫諍諷議之官開獻替啓沃之道俾乎補察遺闕補助聰明猶懼其未也於是設敢諫之鼓建進善之旌立誹謗之木工商得以流議士庶得以傳言然後過日聞而德日新矣是以古之聖王由此塗出焉臣又聞不棄死馬之骨然後良驥可得也不棄狂夫之言然後嘉謀可聞也苟臣管見之中有可取者陛下取而行之苟臣芻言之中有可採者陛下採而用之則聞之者必曰如某之言如某之見猶且不棄况愈於某之徒歟則天下謀猷之士得不比肩而至乎天下謇諤之臣得不繼踵而來乎故覽其謀猷則天下之利病如懸於握中矣納其謇諤則朝廷之得失如指諸掌內矣所謂用天下之耳聽之則無不聰也用天下之目視之則無不明也用天下之心識思謀之則無不聖神也聖神啓於上聰明達於下如此則何壅蔽之有耶何絶滅之有耶臣又嘗觀歷代人君有愚有賢舉事非盡失也人臣有能有否出言非盡得也然則先王勤勤懇懇勸從諫誡自用者又何哉豈不以自古以來君雖有得未有愎諫而理者也况其有失乎臣雖有失未有從諫而亂者也况其有得乎勤懇勸誡之義在於此矣惟陛下鑒之問天地無私賢愚間生焉理亂有時邪正迭用焉然則理代豈無愚邪者耶將有而不任耶亂代豈無賢正者耶將有而不用耶思決所疑可徵其驗又問歷代之君無不知用賢則理用愚則亂從諫興從佞亡也而取舍之際紛然自迷故誅放者多非小人寵用者鮮有君子至使衰亡危亂歷代相望豈臣之邪正惑其心乎將已之愛惡昏其鑒乎昏惑之由必有其故臣聞昏明不並興邪正不兩廢蓋賢者進則愚者退矣曲者用則直者隱矣亦由晝夜相代寒暑相推必然之理也然則盛明之代非無小人小人之道消不能見而為亂也昏衰之代非無君子君子之道消不肯出而為理也故殷紂之末三仁在朝虞舜之初四凶在位雖仁在朝不能用之所以喪天下速於旋踵也雖凶在位卒能去之所以理天下易如覆掌也用舍興亡之驗唯明主能察之然則歷代之主莫不知邦以賢盛以愚衰君以諫安以佞危然則有前車覆而後車不誡者何也蓋常人之情悅其從命遜志者惡其違已守道者又君子難進而易退况惡之乎小人易進而難退况悅之乎是則常主之待君子也必敬而疏其遇小人也必輕而狎狎則恩易下及疏則情難上通是以面從者日親動則假虎威而自負也骨鯁者日疏言則犯龍鱗而必死也故政令日以壞邦家日以傾斯所以變盛為衰轉安為危者矣是以明主知君子之守道也雖違於已引而進之知小人之徇惑也雖從於命推而遠之知讜言之為良藥也雖逆於耳恕而容之知佞言之為美疹也雖遜於心忍而絶之故政令日以和邦家日以理斯所以變衰為盛轉危為安者矣盛衰安危之效唯明主能鑒之夫欲使臣節盡忠人心愛上則在乎明報施之道也傳曰美惡周必復又曰其事好還然則復與還皆報施之謂也夫日月不復則晝夜不生陰陽不復則寒暑不行善惡不復則君臣不成昔者五帝接其臣以道故其臣致君以德也三王使其臣以禮故其臣事君以忠也秦漢以降任其臣以利故其臣奉君以賈道賈道者利則進不利則退故君昏寡救惡之士國危鮮致命之臣是以其君獨安獨危其臣亦獨憂獨樂君臣之道既阻於上則兆庶之心不得不離於下也故曰君視臣如股肱則臣事君如元首君待臣如犬馬則臣待君如路人君愛人如赤子則人愛君如父母君視人如土芥則人視君如寇讐孔子云審吾之所以適人知人之所以求我也則盡忠愛上之策在於此不在於彼矣臣聞昔者西伯善養老而天下歸心善養者非家至戶見衣而食之也蓋能為其立田里之制以安其業導樹畜之産以厚其生使生有所養老有所終死有所送也近代之主以為老者非帛不暖非肉不飽而特頒其布帛肉粟之賜則謂養老之道盡於是矣臣以為此小惠也非大德也何則賜之以布帛仁則仁矣不若勸其桑麻之業使天下五十者可以衣帛矣賜之以肉粟惠則惠矣不若教其雞豚之畜使天下七十者可以食肉矣然後牧以仁賢慎其刑罰雖不與之年而老者得以壽矣不奪其力不擾其時雖不與之財而老者得以富矣使幼者事長少者敬老雖不與之爵而老者得以貴矣此三代盛王所以不遺年而興孝者用此道也臣聞聖人南面而理天下自人道始矣人道之始始於親親故堯之教也睦九族而平百姓文王之訓也刑寡妻而御家邦斯可謂教之源理之本也今陛下誠欲推其恩廣其愛使惠洽九族化流萬人則宜乎先親後疏自近及遠者也然後置其師傅間之以教訓選其賢能授之以官政或出為牧守入為公卿如此則雖無三代封建之名而有三代翼戴之實也使棣華之詠協於內麟趾之風著於外所謂枝葉茂而根本可庇骨肉厚而家國俱肥則天下之人相從而化矣故曰未有九族睦而萬人叛者也未有九族離而萬人和者也蓋先王所以布六順而化百姓敷五教而協萬邦者由此道素行也問子大夫才膺間出副我旁求宜當悉心靡有所隱其或典章有違於古禁令不便於今爾無面從豫將親覽臣伏以今之典章百王之典章也安有戾於古道者歟今之禁令列聖之禁令也安有乖於昔時者歟但在乎奉與不奉行與不行耳陛下之念至此誠思理之心切好問之旨深也此臣所以極千慮昧萬死而獻狂直者以副天心之萬一焉臣聞典章不能自舉待教令而舉教令不能自行待誠信而行今百王之典具在列聖之法明備而禁未甚止令未甚行者臣愚以為待陛下誠信以將之昔宓賤行化德及泉魚非嚴刑所致也推其誠而已魯恭為理仁及春翟非猛政所驅也委其信而已今以陛下上聖之資仁惠之力令行禁止之勢萬萬於一邑一宰也何慮教不敷而化不洽乎臣聞周公之理也周年而變三年而化五年而定陛下苟能勤教令以撫之推誠信以奉之則三年化成五年理定臣竊未以為遲矣伏惟陛下少垂意而待焉
