front:
  text: 全唐文欽定全唐文卷七百七十三李商隱三
  hash: sha256:d2934a3e31909985b493b7f3f783442bb2b2359699e79d7a04821e0d2c23a70b
body:
  text: 右中使某至奉宣恩旨賜臣冬衣一副大將衣四副兼賜臣手詔一通者八行帝語窅降于重霄一襲天衣俯回于窮節臣當時準詔給散訖臣叨蒙重寄適控遐陬地雖五鎮之衝氣得四時之正每元冥應律顓頊司辰當二日之鑿氷則殊豳野及兩楹之飛雪無異朔山重以賨布少溫蠻帛丿糸乏暖方求麗密以禦嚴凝豈望司服頒衣貴臣傳詔綾裁飛鵠絮裛仙蠶白分椒壁之光紫奪蘭牙之色巳均下將仍逮連營晏子狐裘故弊何彰于國儉王恭鶴氅風流不自于君恩被服有輝負戴無力謹當上宣殊渥下拊多寒均大袑于琅琊變無襦于蜀郡粗令康泰以塞貪叨臣與大將等無任望闕感恩抃舞屏營之至右中使某奉宣恩旨以臣赴任特借飛龍馬一匹并鞭轡等送至京兆府界者臣謬奉恩榮出叨廉問豈期蹇步深軫皇慈特命內臣俾騰上駟梁懸蜀鐙几覆吳鞍每多曳練之疑不假著鞭之力倏踰秦甸將復周間照地回光瞻天送影長亭欲別未期東道而來雙闕尚嘶願附北風之思無任感恩戀闕雪涕屏營之至右中使某至奉宣恩旨賜臣端午紫衣一副百索一軸銀器二事大將衣三副并賜臣手詔一通者伏以五神定位祝融司長養之功六律鈞和蕤賓有酬酢之義故節推戴禮日著漢儀彼艾人遠具于歲時角黍近標于風土乃耆舊傳聞之末亦君親慶賜之原伏惟皇帝陛下克協樂章允符時訓恩霑近戚惠浹元寮臣守介蠻圻程遙鳳闕敢希瘴嶠特降乾文輕縞染衣真金備器海綃掩麗渠碗藏珍拜受若驚跪捧如失常衣國僑之紵被服多慚久攜顏氏之瓢捧持未慣當晝而不假文扇向日而惟宜飲冰况又將以綵絲縈諸畫軸用禳故㤅兼續修齡爰自微臣頗流諸校鞠躬被寵全踰錫帶之榮覩物傳輝實動請纓之思唯當仰成帝力粗舉藩條誓相率於明時庶同登于壽域臣與大將等無任望闕感恩抃舞屏營之至右今月某日中使某奉宣進止就長樂驛賜臣及將吏等設饌者將承藩寄尚忝朝恩絡繹八珍芬芳九醞臣階緣薄伎塵辱修塗揚執㦸之讀書雖無非聖董大中之對策何補清時忽委廉車乍離閨籍誠欣列土實耿辭天然猶食指告祥朵頤有慶爰于近驛式降貴臣酒自堯樽饌分殷鼎下霑將校旁耀路岐况臣平生本實孤賤懷書奉役久無黔突之謀入國展儀且懵殽蒸之禮飽期滿腹醉更憂心終虞負乘之災無報雲天之施臣與將吏等無任望闕感恩結戀屏營之至伏以運當聖日節在王春近則入金門而排玉堂歡于上壽遠則梯重山而浮漲海務以獻琛臣受國恩深守藩地阻明珠大貝南異于百蠻翠羽犀皮北殊于三楚前件銀出非大冶貨在中金敢以元正式陳方賄望闕憶銀臺之嶠尚隔仙寮瞻天仰銀漢之流莫階霄露馳心獻祝因物達誠干冒宸嚴不任兢越右臣伏以握丕圖而御物必相見於離推小正以辨時則盛德在夏故著為令節稽以舊章通修任土之宜仰續後天之壽臣方乘傳置未至藩維前件銀巳及中塗實從前政拜章獻祝雖令尹以告新納賮展儀欲長府之仍舊謹以前觀察使楊漢公封印進上千春屬慶億載儲休繫以藩條闕覲丹墀之下徵諸貨志且愧白金為中干冒宸嚴無任兢越右臣伏聞烈山神井開農皇降聖之時南頓嘉禾茂漢后誕祥之日伏惟皇帝陛下系傳太素瑞掩前朝資南訛致育之功演北極居尊之慶臣方叨廉察巳去班行莫階貢重之儀徒切維禖之禮前件物等或潔凝圭錫芳厠蘭蕪可傳御器之間儻助薰風之末其餘則攻皮合巧截竹呈能豈納職于屨人願永康于天步干冒陳進兢越無任右臣伏以黃鍾應候白琯舒和近訪晉儀禮同元日遐觀魯史事重朔朝伏惟皇帝陛下與天同休如日之盛將融漢道兼舉周正臣方賀廉車闕稱壽酒心懸土炭空循太史之書身遠江湖徒積子牟之戀苟無納贐曷慶履長前件銀等禀和于天地之爐擢粹于神仙之府豈為方賄且自地征對三品之金庶陪白璧厠一丸之藥請映元霜私白身等雖長在遐鄉而生知望闕比從訓示堪備指呼冀因物以達誠竊先時而效祝七百年之卜願過成周八千歲為春敢徵蒙叟干冒陳進兢越無任右臣伏准建中元年正月五日敕內外文武官到任三日舉一人自代者臣伏見前件官汾陽啓胄沙麓遺芳佩觿之辰平居不戲加冠巳後出言成章本以詩書綽有機斷奉陰郭之良躅御馬鄧之成規臣與其祖禰以來蕃宣相接雲臺高議同承鐘鼎之餘麟閣舊圖共著河山之誓交深志見年齊道均今河內名邦覃懷巨郡南蕃鳳闕平分晉鄭之交北控羊腸方有干戈之役推讓雖循于故事薦聞實切于私誠伏乞聖恩特允臣志無任感恩推賢之至謹録奏聞伏聽敕旨右臣伏准某年月日敕內外文武官上後舉一人自代者伏以京邑為四方之極咸秦乃天下之樞必命英髦以居尹正臣謬蒙抽擢素乏材能將何以風采章臺羽儀華省况又方營咸鎬肇建園陵苟推擇之不先則顛覆而斯在前件官莊栗以裕簡嚴而寬玉無寒溫松有霜雪頃居內署實事文皇引裾而外朝莫知視草而中言罔漏洎分符近甸廉印雄藩不狥物以沽名善推誠而立斷渾若全器宜乎在庭儻召以急宣被之眷渥必能明張條目峻立隄防肅千里之封畿總五都之貨殖軒臺禹穴無虧充奉之儀漢苑秦陵盡絶椎埋之黨特乞俯回宸斷用授當仁免今日之叨恩冀他時之上賞干冒陳薦兢越殊深伏以內史故事例帶銀青尹正舊儀平揖令僕必資髦碩方備次遷臣特以鯫儒猥丁昌運位崇八座官紹三王况駕有上仙車當晏出務煩廣既置役重津途儻讓爵之不思則敗官而斯疚前件官荊岑挺價赤堇揚鋒禀松筠四序之榮包金石一定之調由中及外自誠而明昨者故鄣利遷朝臺受律隱之清節無愧于投香江革歸資唯聞于單舸必能集同軌之會奉因山之儀使桴鼓稀鳴建瓴流化伏乞特回鳳詔以命龜從成聖朝棫朴之詩減微臣維鵜之刺干黷旒扆伏用兢惶右件官克生公族早履宦途器實幹時辨能專對加之夙明韜略久逐旌旃頃為知巳屈從吏議許文休之流浪萬里非賒王仲宣之播遷三年未遇儉而不懟困且能通雖何恤于無家良可悲其絶籍去歲以維新之命大洽鴻私亦既旋還合從敘用開成五年十一月十三日吏曹巳注右威衛倉曹參軍授官未謝又蒙挾名除替初云牽復仍迫屢空京口劉生方思鵝炙洛陽蘇子巳弊貂裘方今崇帝堯敦厚之恩推魏文榮樂之旨豈令棄良材于散地化王孫為旅人臣素乏器能叨膺任使控緑池之要地守清澤之堅城將以宣布威靈彈壓氛祲苟咨謀失所佐理非材豈惟衄此軍聲兼且傷于朝寄臣深自計孚實當仁况又得於諸宗且兼通舊諸葛均有因依之分龎士元多鑒裁之恩是敢輒黷宸階乞榮賓席使得盡其風力佐彼邊陲錐處平原之囊必將脫㯋劒拭華陰之土粗雪幽沈請依資賜授一官充臣防禦判官干冒宸旒無任戰越右臣先臣贈太保某塋在河南縣界臣自終喪紀便參朝倫三年贊道於宮庭千里違離於墳墓竊惟令式合許芟除追遠興情敢希榮于陸煜報恩未死寧自誓于羲之伏乞聖慈特從丹懇右前件官名與再從叔故媯州參軍自勵向下一字同伏以韓自勵頃因宦遊歿于幽朔羈孤未返親黨莫知近始言歸因之合族雖為子之道則慎更名于巳孤而諸父之來固難舉諱于其側伏請改名融謹録奏聞伏聽敕旨某謬蒙朝委實異時才先憂素餐有負疲俗司徒道光纂服功著干城朝廷慮切河湟每難節制非洞知軍志夙練武經則無以完輯師人撫安戎落自承鎮定大治聲謠雲臺議功烟閣畫像必留殊渥以俟元勳伏惟為國自愛某方祇遠役未獲拜塵瞻戀之誠翰墨無喻到任續更有狀右今月得本州進奏官狀報今月十二日皇躬痊復相公躬率百寮奉見奉賀訖伏以聖上祇膺大寶虔奉睿圖務此憂勤稍虧頤攝相公輔宣元首翊贊靈猷戴宗廟之垂休慰黔黎之允望金縢玉檢惡藏請代之書黃屋丹墀每進先嘗之藥至誠斯著休問旋臻然後率百辟以雲趨導九重之日朗百蠻傾耳萬國企心某愧守關河忝分符竹不得少塵班列共展歡呼對熊軾以自悲淚如雨墜望鳳池而結戀心逐雲飛無任抃賀攀戀之至某初到京即附狀伏計上達某幼嘗困學晚亦獻書自履宦途常依德宇果蒙陶冶遂至顯榮無陸賈籍甚之名遂王華富貴之願然實脂膏不潤冰蘖居懷頃在藩方常憂典憲請田五輩遠戒于貪夫投香一斤近追于廉士及移邊鄙屢易星霜魏尚莫計于收租李牧不聞于捕虜獲修覲禮復忝卿曹位重大農榮兼右揆當金穀之任為后稷之官供億既切于堯厨主掌實關于周庾諒非巧宦亦異當仁相公顧遇特深音徽遠降存十年之長垂一字以褒雖蕭何之自下周昌曾難比數仲尼之兄事子産莫可等夷捧緘悸魂伸紙流汗方縈職署獨曠門墻仰望恩輝伏馳魂夢伏承恩詔榮徵聖上肇自漢藩顯當殷鼎必先求舊以謹惟新夫昭貴族而理近官為邦之遠算險不懟而怨不怒事君之大忠相公受寄纍朝允懷明德傅巖克申三命未盡嘉謀晉室更作五軍尚慚多讓喜慍罔形于用捨是非無撓于去留簡素騰輝鍾彝溢美而又志唯逃富道惡多藏鬬尹之糗一筐皆因君賜江氏之田半頃豈為孫謀固合長在廟庭永光帝載使庶政絶貪婪之患大朝無黨比之憂况今者時逼藏弓禮當輔主元侯功大獨申攀送之哀伯父位尊使率駿奔之列移寒在律鼓物須雷凡在含靈莫不延頸某早蒙恩異獲奉輝光蔣琬牛頭省占佳夢謝安麈尾屢聽清談果得叨忝圭符留連旗鼓捫心自愧沒齒難忘竊計軒車巳臻伊洛佇見方明展事庭燎陳儀雨將至而柱礎先知風欲來而巢居盡識下情無任欣抃踴躍之至伏惟特賜恩察不審自跋涉道路尊體何如伏計不失調護昔周文纘十五王之緒顯正舊邦襄孫總十一德之基方寧故國今惟新之歷始叶卜于姬公作輔之臣又徵言于單子以今况古千載一時某竊思章武皇帝之朝元和六年之事鎮南建議初召羊公征北求人先咨謝傅故得齊刳封豕蔡剔長鯨伏惟相公清白傳資馨香襲慶始自辛卯至于庚申雖號歷四朝而歲才三紀淮王堂構既高大壯之規漢相家聲復有急徵之詔桂苑之舊賓未老金縢之遺事猶新燮理雖繫于陰陽怵惕固深于霜露且廣陵奧壤江都巨邦爰在頃時亦經蕪政風移猒劾俗變侵凌家多紛若之巫戶絶孌兮之女相公必置于理大為其防鄴中隳河伯之祠蜀郡破水靈之廟然後教之厚俗喻以有行用榛栗棗修遠父母兄弟隱形吐火知非鬼不祭之文抱布貿絲識為嫁曰歸之旨化高方嶽威動列城陳於太史之詩列在諸侯之史今者重持政柄復注皇情便當佐禹陳謨輔堯考績鄉誅下比朝舉養廉中臺奬枕杫之郎外郡表斬芻之婦然後司成立學謁者求書大講廢官咸修闕政致于仁壽煦以和平凡在生靈孰不欣望某早塵下顧曾奉指蹤江左單衣每留夢寐柳城素几行覩尊顏伏限守官莫由迎謁空知忭賀不可奮飛下情無任瞻望踴躍之至某本無宦業過沐朝恩罷護六戎歸塵九署以任兼金穀時逼園陵有愧交親未遑簡問解攜稍久諸趣如何山公醉時謝守吟罷茗芽含露䪥簟迎風遠想音容杳動心素惟珍重珍重右今月日得本道進奏院狀報今月日皇太子奄違儲二伏以皇太子道著武闈位高象輅方將傳輝蘭殿積慶桂宮花枕畫轓永綏福履銅扉銀榜克懋溫文豈謂釁結洊雷禍廠田坴重海商山羽翼嗟綺季之俱還緱嶺雲霞與浮邱而莫返相公恩深銘釜地屬持衡攀東序以心傷望春坊而目斷某忝蒙委寄常竊寵榮不獲齒列班行奔波慰敘下情無任悲咽遑迫之至右今月日當道押衙劉石回伏蒙天恩重賜加授檢校兵部尚書官告不許更陳讓者某幸承餘慶遂會昌期早慕修途獻書試吏晚存遠略傳劒論兵自擁節旄頻移星歲常虞尸曠或抵彝章往在番禺巳分風憲及臨安定又假冬卿善政蔑聞奇勳莫建而有不循階陛超授班資且周禮設官邦政莫先乎司馬漢史解誥士貴無過于尚書外顧輩流內量涯分遜而不免居亦何安蔡氏歷遷楊公纍代方茲尊顯殊曰寂寥此皆相公假借軍聲贊揚聖澤感而益懼榮以宏憂謹當切誡滿盈遙加率勵古者不辭于三仕必願致身昔人雖取于十官終期無罪粗申報效以謝貪叨苟遺此言是不能享鎮守有限不獲奔走陳謝伏增惶悚之至韓琮段環裴蘧夏侯曈右件官等或斷金舊友或傾蓋新知既有藉于賓榮敢自輕于主擇輒以具狀奏請訖伏乞相公曲贊殊恩盡允私懇使免孤鄭驛不辱燕臺謹録狀上伏見除書伏承光膺新命伏惟感慰四海事畢兩階遇隆式光謙慤之誠克見隆崇之寵今者長君惟睿元子有文當深慮之所關必殊勳而是賴山濤則曰禱天下之選張秩則曰用天下之賢西漢之命元成以相門才子東都之升鄧禹因先帝舊臣休哉二公叶我一德雖曰曠代乃若合符伏惟慎保起居俯鎮風俗俟金縢之有見俾玉鉉之重光某竊憶春初曾蒙簡賜故欲琴樽嵩嶺魚釣平泉豈貪行意之言便阻具瞻之懇伏惟少以家國為念也方抵藩任未即門闈攀戀恩光不任輸罄伏惟特賜恩察伏見今月某日制書伏承相公由大司徒之率屬掌中祕書之樞務寵延注意榮叶沃心凡備生靈莫非陶冶伊昔帝賚良弼嶽降名神夢出傅巖高宗才得于胥靡卜從渭水西伯止逢于釣翁豈若相公涵泳天池翺翔雲路然後光膺爰立顯副僉諧接庾亮之分曹必資孔演列王濛之對掌宜屬劉恢允契同升果聞並命祇神塞望華夏式瞻某夙奉恩光今叨任使守朝那之右地鎮安定之遺封不獲趨賀黑轓拜伏金印空知踴躍莫可奮飛下情云云伏蒙榮賜手筆某揣摩莫效耽玩無聞不過功曹平生素分願為小相曩昔殊榮而幸遇清朝遂階貴仕玉門關外何成異域之功灞水亭邊徒有舊時之號此皆頃在邊上日相公方調殷鼎正運漢籌不復軍租仍寬虜級巳得入叨九扈克罷再麾恩顧未酬音徽仍繼禮踰名品事越等倫望星宿于三台背惟浹汗感春秋之一字心不容銘仰望旌門恨無羽翼下情云云伏見今月某日制書奉承相公顯由起部光踐黃樞唯彼秦宮必加漢相是能超絶庶尹冠映㣥倫昔荀悅榮登止通左氏張華寵拜空對建章豈若相公翊贊皇猷發揮清問恥君不及堯舜欲人盡若胥庭式叶具瞻爰從正位馮參帷幄式展于矜嚴杜恕紀綱不資于交援曠百千歲無三四人某忝沐陶甄謬居藩服心懸廊廟同邊馬之嘶鳴身繫節旄羡塞鴻之騫翥無由拜賀伏用兢惶某少乏能名長無清譽書非十上劍敵一人而命與時偕道將運會南踰祝髮西扼狄鞮分起部而未淹遷司戎而何速飛章雖達丹款尚稽顧此尸承實為塵忝相公上宏信及仰贊恩覃優柔列藩容易好爵得雖有自居亦甚危銘在座隅鏤之心骨唯當策無妄舉令有必行慮以前茅馭之長轡克成戎律以奉廟謨伏惟始終恩察某當道行軍司馬崔璫朝奏在城今月十七日得狀云今月十二日于太清宮齊宿處獲謁見相公伏承首座相公特論某所請不許吐番交馬事合大體當時魏謨起居備録其事者伏以本道與鳳翔節制雖殊封疆相接俱當料敵同切成謀蕞爾寇戎不循盟誓稽留重使侮易大朝既以非時又稱繼好深慮得請便有乘機遂敢竊獻情誠屢陳箋疏言雖當病事且侵官加以思惟方憂罪責不謂相公更因敷奏深賜褒稱使賈誼上書達于天聽山濤立論著在史官榮冠一時名留百古顧茲非望皆有所因仰戴恩輝略踰涯分謹當坐以待旦居無求安墾叔子之田疇修李興之政具忽承後命有以先登粗異驅馳用為報效伏惟始終恩賜知察右伏見今月某日制書以相公纍請退閒特從休浣式崇階級無廢平章元老道尊必用三王之禮中樞務重猶當五日為期伏惟相公德契昭融言成啓沃太邱家法若守官司京兆門風宜書甲令仰攀日月高拱星辰為堯闢四聰禹來五諫始者以舋生鼎飪禍接藩維前殿朝回莫收金印凶門師出空委油幢當是非擾攘之間即內外危疑之際相公克凝庶績顯執大權為易于難制動以靜皂襜斯入無聞鮑永之兵黃閣洞開例醉曹參之酒然後澄清流品提挈紀綱補吏盡去刻深用人不由黨援咸有一德于今三年深惟逃責之規載切避榮之旨削藳章數免冠請頻張良去粒之懷錙銖軒冕范蠡扁舟之志夢想江湖異代結交殊時合志果當渥澤爰峻等威祇奉青宮監臨東觀教溫文于漢字總端揆于秦官百辟之劍佩以隨六館之生徒是屬手扶帝座身帶天光何澄闕朝寧妨理事杜夷就第無曠執經煥發丹青光昭簡素乾惕無咎謙尊以光某謬奉詔條嘗承廟算慙指蹤而未曾獲兔仰儀刑而徒歎登龍亦冀終遂息肩永當褫帶地遊蒙穀更趨方外之神人洞入華陽猶詔山中之宰相羈牽尚爾抃賀無期瞻望輝光伏增攀戀不審近日尊體何如相公踐履道樞優游天爵功無與讓故勇于退能不自伐故葆其光自罷理陰陽就安調護鳳池來者守咎繇之矢謨雞樹後生奉蕭何之畫一用而無喜成則不居求諸古今實煥緗素某早蒙恩顧纍忝藩方本冀征轅得由東洛伏以延英奉辭之日宰臣俟對之時止得便奏發期不敢更求枉路限于流例莫獲起居瞻望恩光不任攀戀倘蒙知其丹赤賜以始終則雖間山川若在軒屏伏惟時賜恩察不審近日尊體何如此方地控淮徐氣連荊楚不惟土薄兼亦冬溫維揚居萬國之中得四方之正或聞今歲亦不甚寒相公百祿所綏五福攸集伏料調護常保康寧從古以來大賢所處未有不功高而去德盛而謙以烟水為歸塗指神仙而投分名高百古事冠一時然而內難外憂不常而起深謀密畫須有所歸則呂望老于渭濱始持兵柄周公還于洛邑復秉國鈞亦不草芥軒車埃塵祿位不關通介蓋屬安危相公昔在先朝實康大政當君子信讒之日禀達人大觀之規據梧但歌反袂無歎及為賓望苑分務洛師徐勉園中唯餘卉木陶公嶺上空有白雲小竹帛之所傳鄙鼎彝而不問夫以行藏定分用捨通方當遭時復生之前立功立業者甚易及受簡被疑之後不怨不怒者至難遠則狼畏跋胡鴟憂毀室近則越蠡扁舟而獨往漢良却粒以辭榮雖同畏危機亦不得中道仰惟閫奧實冠品流今寶歷既初聖政茲始將安丕祚必屬宗臣凡在隱微莫不祠禱某早蒙奬拔得被寵榮番禺將去之時獲醉上樽之酒許下出征之日猶蒙尺素之書便道是拘登門莫遂向風弭節掩泣裁箋思幄戀軒不勝丹款伏惟終始恩照謹狀近頻附狀伏計相次達上自學士罷領南臺復還內署朝委攸重時論愈歸夫一時效功逐惡者鷹隼千年呈瑞應聖者鸞皇擊搏殊能翺翔異品當在紫庭無事應韶濩以來儀豈復白野有求與雲羅而並出唯聽後命爰副具瞻某才謝適時仕無明略久乘亭障長奉鼓鼙猿臂漸衰燕頷相誤弊廬仍在白首未歸顧臯壤以興嗟念路歧而增歎當依餘眷庶愜後圖仰望音徽不勝丹赤伏見除書伏以小司馬掌邦計伏惟感慰侍郎致君業廣圖國功深頃在內朝則裨大政昭獻御極名高侍從之臣昭肅握圖迹在循良之傳今上講求㣥辟深念大藩以自江之西雖豫章為奧壤而居河之上推白馬為要津爰陟廉車以登將席長城萬里大國三軍雪諸儒之懦名盡將軍之威令果承紫詔來駕墨車向闕馳心揚廷識貌清秋一鶚碧海孤峯天子動容㣥僚服美便合入居台鉉以慰華夷然以天下之賦輿海內之財幣是資經費宜屬成謀苟失當仁則乖大計故晉室有鬻練之乏漢臣興造幣之端是不得人何以為國仰惟餘地巳不同年矧又秩二夏官任毗司馬昔祈父爪士未有兼官方朔侍郎不聞釐務倚之為相今也其時某伏限守藩莫由申賀山河百二巳抱歸心風水五干况兼離戀瞻望門宇不任懇誠右某自解北闕出守南荒嘗犯露以脂車無侵星而擁棹即以今月日到任上訖桂陽始至荔浦初臨警宵鐘而尚誤晨趨聞暮鼓而由斯夕拜仰瞻爐冶實隔烟雲唯當恭守詔條欽承廟算寬其竭馬任其鞭羊襦袴粗及于疲人禮樂必資于君子伏惟俯賜恩察右得進奏院狀報幽州張相公大破奚寇斬馘剌史巳下並焚燒驅獲車帳器械牛羊等伏以近歲以來北番微擾奚寇恣其狗盜頗復鴟張相公鈎格傳能崆峒禀氣克揚戎略式靖邦讐姑用火攻未加湯沃剌睢盱之面貫聾瞶之耳帳幕如掃干矛盡熸聚輪轂于戌樓出羊牛于塞草此皆相公授其軍令雄此邊聲願崇九伐之威且舉一隅而示昔越平吳國實立賀臺楚勝晉軍將為京觀固不可銘山示績畫閣傳勳盡良相之廟謀豈將軍之天幸某謬蒙任使竊慶翦除伏恨守藩闕陪賀列無任抃躍攀戀之至右某當管將士本一千五百人有北境兩度行營有西京十鎮防戌既部伍皆更招收數額則轉增加糧料不經申破留州自備纍政相成况近年不甚登穰亦經水潦拿舟負弩尚嘆于征途穭穀神蠶未豐于下舍今縱仰承渥澤合進勳階將徵簡禮之資盡有囊裝之許雖祁寒暑雨小民不識于天時而露冕褰帷長吏合宣其人願輒以具狀奏聞訖伏乞相公俯推近例許且權停干冒尊嚴無任戰灼之至花犀腰帶一條右伏蒙仁恩俯寵行邁駭雞等貴畫隼增輝徒勤萬里之肺肝愧乏十圍之腰腹仰從台衮來飾藩垣縱拜賜而有期懼立朝而無取謹依處分捧領訖下情無任戴荷之至某行役以今月二十八日達潭州訖囊裝簡薄賓御單輕但承霖雨之功免值風波之阻計塗非遠到任有期方積懼于貪叨豈暇懷于啓處當道適臨遐徼奉遠宸居輒亦導以簡書頒之詔旨省迎新之費謀即舊而安匪務先聲實行素志其于脂膏有戒冰蘖自規不唯禀以廟謀固欲誓于神道冀傾駑蹇用副恩憐苟渝斯言是不能享伏惟終賜恩察俯揚征棹仰望台庭敢階開閣之賓唯羡吐茵之吏下情無任結戀感激之至某素乏異能驟蒙殊寵實幸藩宣之日得承陶冶之餘不敢遑安以須至止即以今月某日到任上訖數屬城之地半雜遠夷稽守器之人多非命士雖欲粗修理行終憂不致殊尢唯當惠撫疲氓智籠獷俗則蒲盧之善養冀桑椹以懷音兼宏獄市之規以奉巖廊之化伏惟特賜恩察伏見制書伏承加集賢殿大學士恩極台階榮兼祕殿通鳳池于冊府擢雞樹于書林中外具瞻遐邇增慰相公黃中禀氣素尚資仁片玉一枝巳光于昔日前籌五鼎果慶于茲辰况又高步瀛洲領官仙掖佇見亡書必復墜簡重編使三千之徒並受其義俾百家之說各有所安芟翦繁蕪整綴差謬某早承重奬今守遐藩雖榮廉問之權實羡校讐之吏仰瞻門闥俯抱肺肝陳賀末由伏深感戀某行役以今月二十八日達潭州訖波恬風止帆駛舟輕遠承殷楫之餘利濟熊湘之水况茲樂土嘗扇仁風式訪顛毛兼詢憩樹吏皆攀轅之士民皆遮道之人帛丿糸以歲時深在肌骨何武以亠兊州之政黃霸以潁川之能或入作尹京或登為國相向若非相公清門重德士範詞宗則安能侔亠兊潁之佳聲兼何黃之盛拜况運當惟睿聽屬虛襟仰贊治平固在朞月伏惟善保尊體以副沃心某實乏異能叨當問俗未識褰帷之後何酬大冶之恩唯當務以躬親蠲其疾瘼煩宣詔旨咨禀廟謨冀免尢違庶可避辟伏惟遠賜恩察伏見制書伏承天恩榮加崇文館大學士某竊尋舊史常仰清門魏齊以來閥閲相繼皆當代才子翰林主人相公傳慶降祥重規疊矩漢籌殷鼎巳慶于台階玉軸藝籤重光于冊府仰惟成命實屬當仁某過沐恩光末由陳賀感激瞻戀不任下情得進奏院狀報伏承尋達上京賢相還朝元侯入覲皇闈曉闢朱旗將金印同歸碧落宵清台座與將星俱耀事光聞聽道合休明况相公瑞玉揚輝貞金抱質冠明舜日袖舉堯風挺山立之奇姿鬱鼎角之殊相固巳表儀朝列傾注宸襟鳳澡刷其前池鸞翺翔于故闕淺深魏邴陟降蕭曹凡在含靈莫不增抃况某忝當寵寄曾奉恩光伏想嚴道來儀方明展事漢營前箸張子房不讓成功齊井新柴管敬仲豈辭殊禮限縈廉察闕備班行且未卜於登門徒有賀於華國抃躍攀戀伏深下情某因緣薄伎獲奉休期左掖中臺巳踰厥任廉車憲印轉過其材即以今月七日赴任相公早於寮故俯察孤愚寄以夙期霑之好款今者辭違稍遠拜謁末由捨魯首燕不勝私懇河中帶朔方之兵甲為皇都之股肱竊思宸襟嘗注碩德下車敷化期月有成則必復還廟堂重執時柄雖欲固讓如蒼生何伏惟俯為明時善加保重到任當差專使起居諸續陳啓天恩刑部相公登庸伏惟感慰刑部相公盛烏衣之遊相公禀青雲之秀更歷股肱之郡咸登鼎鼐之司凡在生靈不任欣慶昔疏廣家榮兩傅止當儲護之朝王儉門有二台不在休明之運將煩擬議又豈同塗某方守藩條闕陪賀客唯願蕃昌姜姓恢大崔門永令阮巷之間迭奉堯階之化伏惟特賜恩察
