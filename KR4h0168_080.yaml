seq: 80
front:
  text: 全唐文欽定全唐文卷八十宣宗二
  hash: sha256:88febd77a5433bdb5d909794da7c8cfd913f28159932be80435503c3591d8eb8
body:
  text: 輔相之任也調陰陽而撫夷夏貞百度而康兆人代天為工持國之柄殷夢周卜竭誠待賢彼何人哉予獨不可寘于精懇果得髦傑朝散大夫守尚書兵部侍郎判度支上柱國彭城縣開國男食邑三百戶賜紫金魚袋蕭鄴天實佑朕生此令人星辰降祥珪玉含瑞蘊通明經遠之識抱宰割利用之才載居禁垣重參宥密資委既至忠讜愈聞爰付地征仍司邦計善為均節益茂事功道惟剛明人無侵撓風望彌峻遐邇具瞻思致昌期必資俊德是以簡自朕心叶於僉諧擢登中樞持平庶政爾其體太和而順元氣推至心以序彞倫短長之才罔有所廢細大之務一以居心扶皇極而作國楨庇蒼生而遂物性雖堯舜比聖朕何敢言而夔龍致君爾無多讓周以冢宰致國用漢任丞相調兵食斯舊典也毋謂其煩懋建嘉庸對此崇寵可守本官同中書門下平章事仍判度支門下近制諸侯薨歿朝廷或命其子弟嗣守爵者且慮職卑望輕未能彈壓軍行乃詔親王為帥以統臨焉蓋尚體行權之旨也昭王汭貞祥所聚姿質幼茂孝敬天授溫文日宣寧勞保傅之規自識君親之道學禮不倦發言有章式光維城宜假分閫朕以趙地名服常山奧區人多忠樸俗尚義勇少長有禮里閭自康屬帥臣云亡戎府無長中權劇務巳委諸甥上將崇名允歸愛子顧梁園以雄處秉漢節以遙臨光撫舊封式膺新命歡不阻於膝下詔榮宣於廷中邦家有光藩屏斯盛九命俾尊於開府一方遠奉於建牙實惟至公勉服丕訓可開府儀同三司守鎮州大都督充成德軍節度鎮冀深趙等州觀察處置等使封如故主者施行相輔之臣賢傑是膺苟或道茂台階功宣時柄洪化方深於倚注微疴遽告其退休宜降寵私俾安頤攝庶得君臣之義實全終始之恩通議大夫守中書侍郎兼禮部尚書同中書門下平章事監修國史上柱國賜紫金魚袋鄭朗靈鳳耀儀非熊表德貞厚可以鎮風俗謙恭可以和神人量合澄波氣凝金璞論議必根於王化文章雅叶於國經起於卑寮積乃重望自周旋臺閣總領藩方故事盡著於典章仁聲藹流於謠詠頃司邦計國用以殷逮領憲闈朝綱載肅洎乎克符夢卜遂委鈞衡理庶政而百度惟貞調元氣而三光增耀而久勤獻納稍失節宣屢陳謝病之辭特舉優賢之命是用釋茲機務允乃至誠爾其專一精神輔助藥石將圖有閒務在無營往參六傅之榮仍加貳令之職用為羽翼爰輟股肱嘉猷永播於事功深睠豈忘於興寢慎爾多福祗承恩寵可檢校尚書右僕射兼太子少師門下惟政之艱非賢勿乂用熙庶績實仗羣材頃所以旰食宵衣勤求機衡之寄咸得時哲副予虛懷太中大夫守工部尚書同中書門下平章事集賢殿大學士上柱國賜紫金魚袋崔慎由器識淹通風鑑明秀黃香之祗勤彌切壺遂之深衷足稱朝散大夫守尚書兵部侍郎同中書門下平章事判度支上柱國彭城縣開國男食邑三百戶賜紫金魚袋蕭鄴操履清方詞調凝遠孔光之慎密早著山甫之將明可嘉而並宏覽典墳博通理道亟更顯重雅有風教允副僉諧當茲鈞軸延謀時務稽參政途盡心力以經邦宏禮樂而緯俗羣善必舉庶官乃和可以勒美太常書忠甲令者矣今則三秋式稔四境無虞乃眷股肱厥有成績至於總史官之微婉備帷幄之講求繼美皐夔比良遷董顧茲茂典式示襃優敬爾在公服我休命慎由可監修國史鄴可充集賢殿學士餘如故主者施行故通議大夫檢校尚書右僕射兼太子少師上柱國賜紫金魚袋鄭朗植操端方稟氣莊重藹若瑞玉澹如澄川智略合乎著蓍誠信服於僚友自膺寵寄頗負全才竭匪躬於諫垣彰盡瘁於瑣闥載踐方嶽亟登師壇觀風推惠愛之心訓士得撫循之術政溢聞聽念茲徵還位冠冬卿職重邦計經費有節財用不虧繄彼休功明我推擇爰嘉峭峻俾總紀綱公望益隆典彞具舉式諧注意且沃深衷俄參化源以提政柄三事仰清廉之節百度見損益之能近煦和風遠浹膏雨方俟坐鎮雅俗表率庶官頤養或乖腠理生疾屢陳章䟽乞遂退閒既堅乃誠式允其請每圖懿績唯冀有瘳何竟至於彌留而遽聞於捐代閱奏興悼臨軒載懷將輟視朝之儀兼列上公之秩慰茲幽壤期爾有知可贈司空闡大化以建皇極敷至德以乂黔首百度惟允八荒用寧倚於輔臣副以邦柄求之夢獵協於蓍龜克諧明謨允屬僉議稽能必思於廟略疇德佇煥其國經朝議大夫守尚書戶部侍郎判度支上柱國賜紫金魚袋劉瑑岳彩舒輝鸞姿降靈馭煙霄而六轡齊升布雲和而九成合奏行居人表文著國華潤色詞林早參宥密彩筆既符於宿夢溫樹不漏於私言再秉絲綸貳於刑讞振藻益茂聽詞無冤洎尹正洛師擁旄梁苑咸能變風俗而求人瘼和號令以肅軍威重委北門輯茲王業既聞報政果叶予懷是用付以煩難慎司邦計彌月探執繫時功成巳洽咎夔之風宜膺台鼎之命爾其平章百姓敬敷五教使羣職必舉四夷率賓杜回邪之迹開讜正之門大道必寘其沃心忠信無懼於逆耳於戲大小之政既巳咨之成務且輟於司存均節尚煩於廟算祗我明訓服茲休嘉可守本官同中書門下平章事依前判度支夫尊任輔相之道也入則秉鈞衡以臨羣辟出則賜弓矢以長諸侯寵光不渝寄屬咸重將求良翰乃命台臣太中大夫守中書侍郎兼禮部尚書同中書門下平章事監修國史上柱國賜紫金魚袋崔慎由繼美德門承家貴位縉紳偉望禮樂上流挺松筠之貞姿服蘭蓀之懿行自居多器累歷清華禁林才擅於多能綸閣詞推於巨麗物情愈茂廷譽甚高再列貳卿之崇亟闡六條之化爰加獎任益委重難屢啟嘉謀俄參大柄而周涉寒暑備見器能道巳著於始終恩豈殊於中外睠茲東蜀實曰奧區俾授旌旄以彰優重昔叔子望高於峴首次公聲振於潁川孰有後先率是為理勉宏風教期懋厥庸可檢校禮部尚書使持節梓州諸軍事兼梓州刺史御史大夫充劒南東川節度副大使知節度事管內觀察處置等使門下康濟生靈必在陶甄之化稽參政事允歸王佐之才況乎元首股肱義均一體叶心同德予懷所嘉式兼刊綜之榮用舉襃隆之典朝散大夫守工部尚書同中書門下平章事充集賢殿大學士上柱國彭城縣開國男食邑三百戶賜紫金魚袋蕭鄴襟神清肅器鑒精通敷賛大猷孫宏有慎厚之行朝議大夫尚書戶部侍郎同中書門下平章事判度支上柱國賜紫金魚袋劉瑑業履清方風標峻整彌綸庶務安國乃任職之臣而皆詞煥丹青道潤金璧匡衡貢禹經術該明孔光師丹議論寬博或頃司邦計茂厎慎之規或嘗擁節旄著繕完之績洎膺樞近益暢謀猷每見沃心實諧注意俾厥后為堯舜納百姓於休和即竭乃誠期於予理子長子駿之職石渠天祿之書稽合異同裁成襃貶儒雅之任迭選攸宜式表茂勳用榮兼領永綏寵渥往孚於休鄴可監修國史瑑可兼充集賢殿大學士餘各如故主者施行自古有天下得列聖帝哲王之科者必由良臣以就景化故君非輔弼無以啟昌期時未清平不得稱賢相契合交感相須而成苟非其人豈副斯舉朝議大夫尚書兵部侍郎充諸道鹽鐵轉運等使上柱國賜紫金魚袋夏侯孜禮樂重德簪裾上流才可兼人智可周物蘊範時之行義富經國之文章識探奧微器抱沖粹早踐清列克彰令名闕當七月匡諫無隱再歷三獨糾繩不回廉風俗而政清提紀綱而望振旋領版籍亦司牢盆推公秉持息力完緝法得其倫要吏憚其威稜國財可豐官事具舉是用陟此邦傑付之廟謨既諧朕心且洽僉論於戲宰輔巨任羣倫共瞻政乖其宜則四海罹弊事叶其理則萬人以蘇副吾拔擢之恩勵爾燮諧之道朝廷聳望爾其戒之可守本官同中書門下平章事依前充諸道鹽鐵轉運等使門下輔弼之任陶鈞為重所以導陰陽而施化相天地以成功宣亮皇猷藻飾王度苟或嬰以他務兼拘利權則異乎代天佐理之道矣通議大夫尚書兵部侍郎同中書門下平章事判戶部事護軍賜紫金魚袋蔣伸紫微上才清廟雅品潔如寒玉峻若孤峯既高絕俗之姿能履中和之道秉吉士之操時然後言學君子之儒仁而且勇洎寵承內旨擢處禁垣嘉言屢沃於朕心密賛深知其忠懇委司版籍益彰器能遂踐台階頗洽公望澄源以正本循名而責實豈以司存尚煩丞相去茲劇務俾專緝熙所宜竭爾一心開予四目推至公而平庶政也依前兵部侍郎同中書門下平章事散官勳如故門下朕居兆人之上當萬機之廣戎夷式敘陰陽克調實宗社降靈輔弼宣力臻彼富庶至於洽平既彰大明益佇化成之妙載煩台席用盛儒林之選朝議大夫守尚書兵部侍郎同中書門下平章事充諸道鹽鐵轉運等使上柱國賜紫金魚袋夏侯孜材協國楨道稱王佐以孝友為家行以禮樂為身文潢陂納寬澗松挺節雄詞擅雅奧學洞微利刃發硎而肯綮無滯代天宰物而埏埴有餘薰然至和霈若潛潤況精列圖籍煥開禁垣高列雋髦翔集近署雅歸清重方在專總演暢事功顯揚懿美是宜更一乃志愈專乃衷吐辭雖酌於當今正學必思於稽古俾密勿之際啟沃之間無忘我以三墳五典更光丕績永孚於休可充集賢殿大學士餘並如故主者施行朕獲承丕緒奄有萬方憂物之心常懷惕厲荷天之力漸至厎寧此中外元僚文武庶政咸有一德以匡沖人而卿等猥以鴻名加於菲薄拜章瀝懇至於再三伏念自列聖以來何嘗無今日之請然率不能讓者上慰宗廟之靈下迫羣臣之願粵予小子豈敢久勞卿士之心哉敬充乃誠良深自愧所乞宜依朕以憲宗皇帝道叶中興威加寰海開啟聖意則有杜黃裳弼成功業則有裴度著在國史時無比倫宜以杜黃裳裴度同配享禮論功配食文武宜兼元和一朝武臣功力最高者定一人與杜黃裳裴度同配享憲宗皇帝室頃李愬有平蔡之績高崇文有收蜀之功校其二人功孰為重宜令尚書省議奏比來多有無良之徒妄於街衢投置無名文狀及箭上并旗旛上肆為奸言欲以惑聽自今巳後如有此色宜準寶應二年正月十八日勅令所在地界於當處焚毀埋藏不要聞奏應天下州縣或土風各異或物產不同或制置乖宜或章條舛謬或云施之歲久或緣礙於勅文有利於人而可舉行者有害於物而可革去者並委所在縣令錄事參軍備論列於刺史具以上聞委中書門下據事件下觀察使詳言列奏當與改更各從便安自當蘇息如或在官因循不舉後來者無以申明利害較然違慢可見當重加懲罰仍更不得授縣令錄事參軍刺史委中書門下具名奏聞別議殿責食力之徒須令自濟天下倉場所納斛斗如聞廣索耗物別置一倉斛斗又隨斗納耗物率以為常致疲人轉困職此之由自今委長吏切加提舉一切依倉部格如有違犯專知官停見任仍殿兩選所由決脊杖二十準法處分所貴利歸農畝耕者不饑其天下諸州府百姓兩稅之外輒不許更有差率巳頻申飭尚恐因循宜委御史臺切加糾察如有違犯縣令錄事參軍判官節級科責長吏不存勾當亦委臺司察訪聞奏其諸道州府應所征兩稅匹段等物並留州留使錢物納匹段等虛實估價及見錢從來皆有定額如聞近日或有於虛估匹段數內實徵估物及其分數亦不盡依勅條宜委長吏切加遵守苟有違越必議科繩本判及專知官當重懲責又青苗兩稅本繫田土地既屬人稅合隨去從前赦令累有申明豪富之家尚不恭守以後州縣覺察如有此比須議痛懲地勒還主不理價直刑獄之內吏得使情推斷不平因成冤濫無問有贓無贓並不在原免之限攘竊之興起於不足近日刑罰頗峻盜賊益煩贓至一千便處極法輕人性命重彼貨財既多殺傷且乖教化況非舊制須議改更其會昌元年二月二十六日勅宜委所司重詳定條流聞奏每思前賢設官分職豈徒然哉今州有上佐縣有丞簿俗謂閒官不領公事殊乖制作之本意也自今後州縣公事上佐丞簿得失須共參詳如有敗闕或不遵法理及百姓流亡不先舉明並須連坐冀得人展其才官無宂食女人之德雅合慎修嚴奉舅姑夙夜勤事此婦之節也先王制禮貴賤同遵既以下嫁臣寮儀則須依古典萬壽公主婦禮宜依士庶法司使法或持巧詐分律兩端遂成其罪既奸吏得計則黎庶何安自今巳後應書罪定刑宜令直指其事不得舞文妄有援引頒示天下長吏嚴加覺察不得輒使奸吏如有此色當議停解如聞近日多有閒人不務家業嘗懷凶惡肆意行非專於坊市之閒恐脅取人財物又其中亦有曾為趨吏依倚門欄自恐愆尤遂致停解不思己過卻務怨讎妄搆虛辭恣行恐嚇要懲此弊以靜奸源自今巳後宜委京兆府切加訪察如有此色便捉獲痛加刑斷此後除巨蠹所不原外每立夏至立秋前犯罪人就州府常條之中量與減貸速為䟽理無令淹繫朕以驪山近宮真聖廟貌未嘗修謁自謂闕然今屬陽和氣清中外事聽政之暇或議一行蓋崇禮敬之心非以盤遊為事雖申勅命兼慮勞人卿等職備禁闈志勤奉上援經據古列狀獻章載陳懇到之辭深睹盡忠之節巳允來請所奏咸知朕聞王者立德必本於念功天下歸仁莫先於興滅回鶻久為與國常建大勳累申式配之儀兼展稱藩之禮天寶末興兵之後國步未夷釁起凶妖率其忠勇控弦而至革車之會增威止戈而歸犀毗之賜甚寵殊庸盛禮煥烈縑緗是為親隣成其邊衞牧馬遠迹於朔野烽火罷照於甘泉雖云華夷歡若親戚會昌中遠方喪亂可汗淪亡狼顧既困於歲牧鼠竊或行於邊時屬姦臣作軸懦將操戈困樂禍以乘危遂興戎而生事不念救災之義盡為助順之功驅彼流離窘為徒隷情闕懷土自比南冠之悲跡則亂華未免北風之思舊國空瞻其茂草名王猶困於旅人相彼窮危寧無慨歎朕君臨九有子育兆人雨露之所霑濡日月之所照燭欲令自遂必念好還乃眷朔易之雄況當勳力之後每思報德實用疚懷所以頻遣詔書俾勤尋訪穹廬莫覩甌脫巳平萬騎豈無其忠臣六角冀存其貴種頗勞寤寐屢閱歲時沙漠既空井邑猶在近有回鶻來款朔方帥臣得之送至闕下又有回鶻隨黠戛斯李兼至朝廷各令象胥徵其要領音塵可訪詞旨必同願復本邦仍懷化育皆云龎特勒今為可汗尚寓安西衆所悅附颺宰相以忠事上誓復龍庭雜虜等以義向風頗聞麕至闕契素願慰悅良多俟其歸還衙帳當議特舉冊命今遣使臣且往慰諭況情深振撫道既切於懷來而功濟艱難義豈忘於繼絕至如待呼韓以殊禮約冒頓以和親止於嘉其來朝亦或慮其為患今則因此離散追彼功勳俾立國於狼居稍聚人於烏合再尋舊好宜舉良圖報告天下咸知朕意夫興滅繼絕有國之懿圖推亡固存先王之茂典在春秋時齊秦列國之諸侯也秦穆尚存於晉嗣齊桓猶繼於莒土況我國家超邁皇王并包宇宙昔者回鶻可汗在武德之初始畢效力於太宗在天寶時葉護有功於京洛乾元至德之際與子儀叶心大破西虜自時以降誼為舅甥歲有通和情無詭詐會昌中其國實遇天災莫能地著盡皆散徙遂至滅亡朕自纂承丕圖常多軫惻爰命使者將遠撫之訊厥存亡俾求嗣立軺車甫至於靈武蕃使巳及於塞垣迨至闕庭深陳血懇稱可汗巳立諸部賓歸實資神祇之衞乃藉忠勳之力果能克紹叶纂舊圖頗協人願深契朕志尚恐未為諸蕃所信猶疑新造之邦是用特命使臣遵行冊禮於戲布德茂功柔遠祗邇前代之所以稱禮也使若敖氏之無後何以勸善須布中外咸使聞知表朕中懷不問夷夏可冊為嗢祿登里邏汨沒密施合俱錄毗伽懷建可汗命檢校祕書監兼御史中丞王端章持節冊使仍令所司擇日備禮冊命朕以萬機事繁躬親庶務訪聞羅浮山處士軒轅集善能攝生延齡益壽乃遣使迎之或冀有少保理也朕每觀前史見秦皇漢武為方士所惑常以之為誡卿等位當論列職在諫司閱視來章深納誠意彥昭早著令名累更劇任入司邦計開張用經緯之文出統藩維撫馭得韜鈐之術自臨并部殷若長城但先和衆安人不欲恃險與馬遂致三軍百姓瀝懇同詞備述政能惟恐罷去顧茲重鎮方委長材既獲便安未議移替想當知悉生死之理修短之期古往今來是其常也爰以宗祧所繫嗣續有歸眷彼臣寮宜申顧託我先朝憲宗昭文彰武大聖孝皇帝承十聖之基構翼翼為心平五道之寇讎孜孜不怠雖長慶促運寶歷生奸文宗揚其耿光武宗付朕鴻業自臨億兆十有四年每思偃武修文庶幾至德要道賴諸良弼罄乎嘉猷或陳無逸之篇或進勿休之說東后畢覲西旅繼來克復河湟拓疆三千里外告成宗廟雪恥二百年閒僅稱太平咸曰丕變顧朕寡昧何以堪之今也天命靡常冥數先定與我之齡雖盡卜世之年甚長趣彼若遇歸之命而非夭釋然何慮貽厥孫而有謀皇太子漼羽翼早成春秋巳盛既膺主鬯克荷承祧宜於柩前即位仍以門下侍郎平章事令狐綯攝冢宰軍國務殷豈可久曠以日易月宜遵舊制皇帝三日而聽政二十七日而釋服天下節度觀察防禦等使及監軍諸州刺史職守非輕並不得離任赴哀天下人吏百姓告哀後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉釋服之後無禁舉樂文武官等朝晡臨事皆十五舉音宮中當臨者非時無得擅哭前漢與後魏孝文俱從薄葬朕甚慕之營奉山陵稍減常制勿以金銀錦綵緣飾葬具醫術之徒夙夜勞苦深可矜念不須理問五坊鷹犬並令解放咨爾內外將相爪牙腹心之臣其敬保我令子輯寧我邦家成朕素懷克厎於道布告遐邇咸使聞知
