body:
  text: 石比臣心水猶君德誠見投而不阻如從諫而無極蓋所以作仁聖思正直清逾萬頃能容落落之姿操或一拳以造沉沉之色惟我聖后啟乎宸聰每以淡然之德能取確爾之功言乎水也逾漢祖之虛受稱乎石也遇留侯之盡忠是以王事竭誠㣥臣報政具懷鑿鑿之美允納洋洋之聖君心潤下已覃滂沛之恩臣志補天願表堅貞之性故得朝廷肅穆上下交慶小伊傅以輸忠配唐虞而比盛者也當其欲進嘉謀心懷隱憂思衮職而有補隨諫鼓以來投於是咸趨丹陛若蹈洪流且推誠而上達亦虛心而下求既乃契皇情承天奬介然允臻乎浹洽渙若盡納其忠讜一言初進開龍顏而似激圓波萬國皆聞入宸心而若流清響乃知窺日月之光有虧必諫震雷霆之怒有諫必從雖磊落以難進乃廣大而見容既無悔以無尤子產徒言於狎水那將恐而將懼韓非奚患於攖龍且夫瓊瑤為報而匪珍夜光處暗而多患未若我喻水於盛德比投於納諫允當上善之求勿謂下流之訕遂用握金鏡臨玉除忠言得進以無隱聖慮每徵於往初如是則祥符出惠澤舒將無事而無諫見寰瀛之晏如夫潮之生因乎日也其盈其虛繫乎月也古君子所未究之將為之辭猶憚人有所未通者故先序以盡之肇始窺堯典見歷象日月以定四時乃知聖人之心蓋行乎渾天矣渾天之法著陰陽之運不差陰陽之運不差萬物之理皆得萬物之理皆得其海潮之出入欲不盡著將安適乎近代言潮者皆驗其及時而絕過朔乃興月弦乃小嬴月朢乃大至以為水為陰類牽於月而高下隨之也遂為濤志定其朝夕以為萬古之式莫之逾也殊不知月之與海同物也物之同能相激乎易曰天地暌而其事同也男女暌而其志通也夫物之形相暌而後震動焉生植焉譬猶烹飪置水盈鼎而不爨之欲望膳羞之熟成五味之美其可得乎潮亦然也天之行健晝夜復焉日傅於天天右旋入海而日隨之日之至也水其可以附之乎故因其灼激而退焉退於彼盈於此則潮之往來不足怪也其小大之期則制之於月大小不常必有遲有速故盈虧之勢與月同體何以然日月合朔之際則潮殆微絕以其至陰之物邇於至陽是以陽之威不得肆焉陰之輝不得明焉陰陽敵故無進無退無進無退乃適平焉是以月之與潮皆隱乎晦此潮生之實驗也其朒其朓則潮亦隨之乃知日激水而潮生月離日而潮大斯不刊之理也古之人或以日如平地執燭遠則不見何甚謬乎夫日之入海其必然之理乎且自朔之後月入不盡晝常見焉以至於朢自朢之後月出不盡晝常見焉以至於晦見於晝者未嘗有光必待日入於海隔以映之受光多少隨日遠近近則光少遠則光多至近則甚虧至遠則大滿此理又足證夫日至於海水退於潮尤較然也肇適得其旨以潮之理未始著於經籍間以類言之猶乾坤立則易行乎其中易行乎其中則物有象焉物有象而後有辭此聖人之教也肇觀乎日月之運乃識海潮之道識海潮之道亦欲推潮之象得其象亦欲為之辭非敢衒於學者蓋欲請示千萬祀知聖代有苦心之士如肇者焉賦曰開圓靈於混沌包四極以永貞赩至陽之元精作寒暑與晦明截穹崇以高步涉浩漾而下征迴龜鳥於兩至曾不愆乎度程其出也天光來而氣曙其入也海水退而潮生何古人之守惑謂茲濤之不測安有夫虞泉之鄉沃焦之域棲悲谷以成暝浴濛汜而改色巨鰌隱見以作規介人呼吸而為式陽侯玩威於鬼工伍胥洩怒乎忠力是以納人於聾昧遺羞乎後代曾未知海潮之生兮自日而太陰裁其小大也今將考之以不惑之理著之於不刊之辭陳其本則晝夜之運可見其影響言其徵則朔朢之候不爽乎毫豈不謂乎有耳目之疾而㸌將判乎神醫者也粤若太極分陰分陽陽為日故節之以分至啟閉陰為水故霏之以雨露雪霜雖至賾而可見雖至大而可量豈謂居其中而不察乎渺漠亡其外而不考其茫洋者哉故水者陰之母日者陽之祖陽不下而昏曉之望不得成陰不升而雲雨之施不得覩因上下之交泰識洪濤之所鼓胡為乎歷象取其枝葉而迷其本根也策其涓滴而喪其泉源也於是欲抉其所迷而論之採其所長而存之光乎廓乎汨磅礡乎差瀴溟之無際曷鴻濛而可以盡度乎乃知夫言潮之初心遊六虛索蜿蜒乎乾龍駕轇轕乎坤輿知六合之外洪波無所洩識四海之內至精有所儲不然何以使百川赴之而不溢萬古揆之而靡餘也是乃察乎濤之所由生也駭乎哉彼其為廣也視之而盪盪矣彼其為壯也欱乎其沆沆矣其增其嬴其難為狀矣當夫巨浸所稽視無巔倪洶涌澒洞窮東極西浮厚地也體定半圓天而勢齊謂無物可以激其至大故有識而皆迷及其碧落右轉陽精西入抗雄威之獨燥卻衆柔之繁濕高浪瀑以旁飛駭水洶而外集霏細碎以霧散屹奔騰以山立巨泡邱浮而迭起飛沬電烻以驚急且其日之為體也若熾堅金圓徑千里土石去之稍邇而必焚魚龍就之雖遠而皆靡何海水之能逼而不澎濞沸渭以四起故其所以凌鑠其所以薄激者莫不魄落焯爍如爨巨鑊赩兮不可探乎蓅蓅之內呀焉若天地之有齦齶其始也漏光迸射虹截㝢縣拂長庚而尚隱帶餘霞而未殄其漸沒豸句兮若后羿之時平林載馳驅貙虎與兕象懾千熊及萬羆呀偃蹇而矍鑠忽劃礫而齒差齒宜其少進也若兆人繽紛填城溢郭蹄相蹂蹙轂相摩錯閧闉澶漫凌彊侮弱皇輿之前蹕孰不奔走而揮霍及其勢之將極也涾兮若牧野之師昆陽之衆定足不得駭然來奔騰千壓萬蹴搏沸亂雄稜後閼懦勢前判懾仁兵而自僵谷呀而巘斷此者皆海濤遇日之形聞者可以識其畔岸也賦未畢有知元先生諷之曰斯義也古人未言吾將揮乎文墨之場以貽永久為天下稱揚爰有博聞之士駭潮之義始盱衡而抵掌俄禁頁齘而吅丂一眙擥衣下席蹈足掀臂將欲致詰領畫天地久之而乃謂先生曰伊潮之源先賢未言枚乘循涯而止記其極木華指近而未考其垠焉有末學後塵遽荒唐而敢論先生矍然而疑乃因其後推車捧席執腒伺顏言之少間請見徵之所如客乃曰人所不知而不言不謂之訥人所未識而不道不謂之愚彼亦何敢擅談天之美斡究地之羭指溢漭之難悟欲蠱聽於㣥儒今將盡索乎彼潮之至理何得與日月而相符且大章所步東西有極容成叩元陰陽巳測陽秀受乎江政元冥佐乎水德莫不窮海運稽日域及周公之為政也則土圭致晷周髀作則裨竈窮情乎天象子雲贊數於幽默張衡考動以鑄儀淳風述時而建式彼皆凝神於經緯之間極思乎圓方之壼胡不立一辭於茲潮以明乎繫日之根本也先生苟竒之胡不思之先生將寶之胡不考之苟由日升當若準若繩何春夏差小而秋冬勃興其逾朔也當少進何遽激而斗增其過朢也當少退何積日而馮陵晝何常微夜何常大何錢塘洶然以獨起殊百川之進退何仲秋忽爾而自興異三時之霶霈日之赫焉猶火之烈火至水中其威乃絕入洪溟以深漬何日光而不滅潮之往來既云因日日惟一沉潮何再出萬流之多匪江匪河發自畎澮往成天波終古不極盍沉四國何成彼潮而小大一式為潮之外水歸何域又云水實浮地在海之心日潛其下而逢彼太陰且其土厚石重山峻川深投塊置水靡有不沉豈同其芥葉而泛以蹄涔繄坱圠之至大何水力之能任吾聞之天地噫氣有吸有呼晝夜成候潮乃不踰豈由日月之所運作誇誕以相誣者哉先生閱賦之初深通厥旨及聞客論訢然啟齒於是謂客徐坐善聽厥辭蓋聞南越無頒冰之禮鄭人有市璞之嗤常桎梏於獨見終沉溺於㣥疑既別白而不悟爰提耳而告之然事有至理無爭無勝猶權衡之在懸審錙銖而必應稽海潮之奧旨諒余心之足證當為子窮幽而洞冥豈止於揆物而稱哉夫日北而燠陽生於復離南斗而景長邇中都而夜促當是時也氣蒸川源潤歸草木既作雲而洩雨乃襄陵而溢谷魚龍發坼於胎卵鳥獸含滋於孕育且水生之數一而得土之數六不測者雖能作於溟渤苟窮之當無羡於升掬其散也為萬物之腴其聚也歸四海之腹歸則視之而有餘散則察之而不足春夏當氣散之時故潮差而小也及其日南而凉陰生於姤退東井而延夕遠神州而減晝當是時也草木辭榮風霜入候水泉閉而土涸滋液歸而下凑瘁萬物以如燖運大澤而若漏縮於此者盈於彼信吾理之非謬秋冬當氣聚之時故潮差而大也兩曜之形大小唯敵既當朔以制威陽雖盛而難廹其離若爭其合如擊始交綏而並鬬終摩壘而先釋日沮其雄水凝其液既冒威於一朝信畜怒乎再夕且潮之所恃者月所畏者日月違日以漸遙水畏威而乃溢亦猶㣥后納職來造王門獲命以出望宁而奔引百寮而盡退何一跡之敢存此潮象之所以逾朔二日而斗增也黃道所遵遐邇巳均肆極陽而不礙故積水而皆振自朔而退退為順式自望而進進為干德伊坎精之既全將就晦而見逼勢由朢而積壯故信宿而乃極此潮之所以後朢二日而方盛也自曉至昏潮終復始陽光一潛水復迸起復來中州逾八萬里其勢涵澹無物能弭分晝於戌作夜於子子之前日下而陰滋子之後日上而陽隨滋於陰者故鑠之於水而不能甚振隨於陽者故廹之為潮而莫肯少衰此潮之所以夜大而晝稍微也嘗信彼東遊亦聞其揆賦之者究物理盡人謀水無遠而不識地無大而不搜觀古者立名而可驗何天之造物而難籌且浙者折也蓋取其潮出海屈折而倒流也夫其地形也則右蟠吳而大江覃其腹左挾越而巨澤灌其喉獨茲水也夾㣥山而遠入射一帶而中投夫潮以平來百川皆就浙入既深激而為鬬此一覽而可知又何索於詳究㣥陰既歸水與天違當宵分之際避至烈之輝因圓光之既對引大海以㣥飛夫秋之中而陰盛亦猶春之半而陽肥事苟稽於已著理必辨於猶微故濤生於八月之朢者尤岌岌而巍巍也萬物之中分日之熱叩琢鑽研其火乃烈吹煙得燄傳薪就爇附於堅則難消焚於槁則易絕所依無定遇水乃滅太陽之精火非其匹至威無燄至精無質入四海而水不敢濡照八紘而物莫能屈就之者咸得其光輝仰之者不知其何物其體若是豈比夫寒灰死炭遇濕而同漂汨哉方輿之下陽祖所迴歷亥子而右盛逾丑寅而左來右激之遠兮遠為朝左激之遠兮遠為夕既因月而大小成亦隨時而前後隔此日之所以一沉而潮之所以兩析也天地一氣也陰陽一致也其虛其盈隨日之經界寒暑之二道將無差於萬齡故小大可法而乾坤永寧也若夫雲者雨者風者霧者為雪為霜者為雹為露者雷之所鼓者龍之所赴者㣥生之所賦者萬物之所附者彼皆與日而推移所以就其衰而成其茂也然後九圍無餘而萬流為之長輔談未竟客又勦而言曰若乃寒暑定而風雨均也吾聞之洪範云豫常燠急常寒狂乃陰雨為沴僭則陽氣來干苟日月之躔一定又何遠於王政之大端彼有後問姑紓前言夫三才者其德之必同天以陽為主地以陰為宗叅二儀之道在一人之功一人行之三才皆協德順時則雨霽均行逾常則凶荒接僭慢所以犯陽德也故暴尫莫之哀狂急所以犯陰德也故離畢為之災此則為政之所致非可以常度而剸裁也客曰唯其餘如何復從而解之曰惟坤與乾余常究焉清者浮於上濁者積於淵濁以載物為德清以不極為元載物者以積鹵負其大不極者以上䂓奠其圓故知鹵不積則其地不能載元不運則其氣無以宣夫如是山嶽雖大地載之而不知其重華夷雖廣鹵承之而不知其然也氣之輕者其升乃高故積雲如嶽不駐鴻毛輕而清也而物莫能勞及其干霄勢窮霏然下墜隨㘭壑而虛受任畎澮之疏潰著則重也故舟檝可以浮寄至夫離九天堙九地作重陰之膠固自堅冰以馴致固可以乘鴻溟以自安受萬有而不圯者也聽茲言較茲道定一陽之所宗何衆理之難考且合昏知暮而翰音司晨安有懷五常之美預率土之濱苟無諒乎此旨亦何足齒於吾人子以天地之中元氣噫噦為夕為朝且登且沒泛辭波而甚雄處童蒙而未發孰觀地喙乎深泉之涯孰指天吭乎巨海之窟既無究於茲源寧有因其呼吸而騰勃者哉客謝曰辭既已矣欲入壼奧願申一問先生幸以所聞教之嘗居海裔覿潮之勢或久往而方來或合沓而相際曷舛互之若斯今幸指乎所制先生撰屨旁眄亦窮其變吾因訊夫墨客當大索其所見彼亦告於余曰日往月來氣迴天轉其激也大則體甚而相疎其作也小則勢接而相踐惟體勢之可準故合沓而有羡其何怪焉客乃巳心軀歛色交袂而辭彼圓元方賾古惑今疑歎載籍之不具恨象數之尚遺方盡迷於閫域非先生親得於學者而孰肯論之於是乎若卵判雛生鼓擊聲隨雷電至而幽蟄起蛟龍升而雲雨滋形開夢去醒至酲離既手之舞之足之蹈之乃避席而稱詩為賀演知元先生之辭辭曰噫哉古人迷潮源兮刓編齾翰曾未言兮羅虛列怪無藩垣兮名儒幽討理可尊兮高駕日域窺天門兮潮疑一釋永立言兮若和與扁袪吾惛兮昔之論者何其繁兮意摩心揣祇為讙兮陰陽數定水長存兮進退與日遊混元兮一升一降兮寒暑成下凝濁兮上浮清隨盈任縮兮浮四溟釜鎘蒸爨兮擬厥形願揚此辭兮顯為經高誇百氏兮貽億齡先生曰彼能賦之子能演之非文鋒之破鏑何以解乎㣥疑客乃酣然自得由然而退也瀟湘二姬桃花玉姿獻柘枝之妙舞佐清宴於良時始其金罍欲陳象筵宿設考清音於絃管之部選麗質於綺羅之列何彼姝之婉孌媚戎服之豪俠司樂以魚符發詠侍兒以蘭膏薦潔華燈張翠被徹聽銅壼之刻漏瞻銀漢之明滅佇新詞以潛習隱含具而纔閱恐急節之將差撫柔荑而不絕及夫陽烏浴彩寒鷄早晨登妝臺而鸞鳳比翼對寶鏡而菡艹舀爭春袿裳馥以彩翠玉指皓以嶙峋互飾鉛華畏濃澹之殊態共聽金管恐高低之不均須臾饔正奉羞司尊舉酌左肴兮右胾兕觥兮玉爵朱題赩以垂虹素幕翩以騰鶴羅異果之芬芳映雕盤之錯落時也㣥工合奏絃悲管清升歌闋賓禮成於是乎壘鼉鼓啾鳳笙雲駢四座花芬兩楹舞師巧誨於蹈厲諧優飾辨以縱橫且曰不巾不櫛匪鐸匪舌古也郅支之伎今也柘枝之名因清角之繁奏見韶華之並榮佳人乃整金蟬收玉燕襲舞衫突舞弁珠彩熒煌鈐光炫轉外寶帶以連玉中丹裾而疊蒨則有鞶鑑逶迤瓊瑰四垂靴瑞錦以雲匝袍蹙金而雁欹將翺將翔惟鴛惟鴦稍隨緩節步出東廂始再拜以離立俄側身而相望思東南之美兮清風甚長凝情頃刻兮靜對鏗鏘再撫華裾巧襞修袂將勻玉顏若抗瓊珶懷要妙以盈心望深思而滿背彼工也以初奏迎我舞也以次旅呈乍折旋以赴節復宛約而含情突如其來翼爾而進每當節而必改乍慘舒而復振驚顧兮若嚴進退兮若慎或迎兮如流即避兮如恡傍睨兮如慵俛視兮如引風褭兮弱柳煙羃兮春松縹緲兮翔鳳婉轉兮游龍相邇兮如借相遠兮如謝忽抗足而相跐復和容而若射勢雖窘於趨走態終守乎閒暇飛飇忽旋鸞鶴聯翩撼帝子之瑤珮觸仙池之玉蓮擁驚波與急雪捲祥雲及瑞煙詞方重陳鼓亦再歇俄舉袂以容曳忽吐音而清越一曲曲兮春恨深一聲聲兮邊思發傷心兮隴首秋雲斷膓兮戍樓孤月歌扇兮纔斂鳴鼙兮更催將騰躍之激電赴迅疾之驚雷忽如厭乎揮霍戢餘勢以徘徊屹而立若雙鸞之窺石鏡專而望似孤雲之駐蓬萊輕攢翠蛾稍拂香汗暫爾安逸復騁陵亂抽軋軋於蕙心耀纎纎之玉腕躊躇曠望若戀虞以南馳俯僂迴旋非為劉而左袒拾華衽以雙舉露輕裾之一半花灼灼鼓逢逢帽瑩隨蛇熠熠芝蘭之露裾翻莊蝶翩翩獵蕙之風來復來兮飛燕去復去兮驚鴻善睞睢盱偃師之招周伎輕軀動盪蔡姬之讋齊公則有拂菻妖姿西河別部自與乎金石絲竹之聲成文乎雲韶咸夏之數然後能使燕趙慙妍威嬙掩嫮我之服也非妹喜之牝雞我之容也非木蘭之雄兔既多妙以多能亦再羞而再顧鼓絕而曲既終倏雲朝而雨暮謝尚以小節不拘曲藝可俯願狎鴛鴦之侶因為鸜鵒之舞於是褫貂裘岸章甫在容止可觀之際方見翼如當管絃互奏之時俄逞退旅伊昔王導延為上賓陪謁者讓登之處遇㣥賢式燕之辰俎豆在列尊卑且倫始服膺於末席方酬賞於主人導曰久慕德音衆皆傾想願覩傞傞之態用答嚶嚶之響非敢玩人以喪德庶使棲遲而偃仰徒欲見長觜利距之能豈比乎弋林釣渚之賞公乃正色洋洋若欲飛翔避席俯傴摳衣頡頏宛修襟而乍疑雌伏赴繁節而忽若鷹揚由是見多能之妙出萬舞之傍若乃三歎未終五音鏗作頷若燕而蹙頻德如毛而矍鑠衆客振衣而跂望滿堂擊節而稱樂且喤喤之奏未終而洩洩之容自若於是媿飲啄盡歡娛聽式歌而調兼吐鳳觀屢起而勢若將雛以樂慆憂既醉者於焉巳矣手舞足蹈囅然者豈得而無是知因此名聞那辭跡屈同漁陽之慷慨鄙五原之噎鬱將美其率爾不矯怡然任真自動容於知巳非受侮以求伸况乃意綽步蹲然後知鴻鵠之志不與俗態而同塵惟天有河是生水德凌浩渺之元氣挂崢嶸之遠色所以正辰極奠南北其清莫挹濯星斗以滋上元其惡可流蕩雲霓以臨下國赫赫融融自西自東沿大象而其源不竭橫中古而其運無窮磅礡九霄浸潤豈沾於土宇輕清一氣波瀾寧動於天風匪湯湯而就下但耿耿而浮空處晝則潛由昏則見俟良夜之延矚故高明而自擅光連月窟何慙媚以懷珠影照天津豈愧淨而如練至若白榆風勁析木煙秋吹玉葉而將落泛金波而共流皎晶無際闌干自浮渡蟾魄之孤輪不聞濡軌漲鵲橋之遠岸詎見操舟莫議高深孰能揭厲演漾必滋於若木氛氳更襲於丹桂映蒼山而漸出想積石於河源拂遠樹以將低誤一葦於天際遙思濯手遠憶乘槎流合璧之輝幾疑沉玉映散金之氣或類披沙辨牛豈見其津涘聞雞遽隱於雲霞是宜以河之名居天之大閣道蛇橫於曲渚驪珠蚌剖乎淺瀨源流自遠清無可羡之魚分野甚明皎若誓封之帶鑿自太古疏於圓靈奔注肯隨於川瀆高明自貫於日星夫其濟黃道決青冥蔭地軸灑天經悠矣久矣配吾君之永寧天不自明垂之以日月聖人不自理付之以公卿日月所以成天之文者無私照故也公卿所以成人之文者無私心故也為天之明行帝之德是公卿與日月同體者也然日月未嘗私晝夜以序明晦以時人生而戴之固無驚懪耳目延頸企踵而望之也及碩人重德恢宏綱於將絕時人莫不拭眥假聽傒其聲明矣如是則又雖與日月同體與人望之心過之也伏以文物之勢嶪乎將頹聖上一旦惕然思高祖太宗經天緯地之勤基美於千萬世其術祇在乎人文之中人文之中則不踰擇士之賢否也故度天下之德莫重於僕射計天下之學莫深於僕射觀天下文章莫富於僕射兼是三美然後詢於廟堂之上使諮於僕射俯而莅之其實不啻若移太山之重以鎮之也夫如是則預於貢士者何敢造次而進哉某本孤淺生江湖間自知書巳來竊有微尚窺奧索幽久而不疲垂二十年以窮苦自勵伏念當太平之辰不預兵役農商之伍得盡其志則將欲發其身大其家盡心於明時以竟其歲也乃志望士林之中及來輦下再試皆黜觀望於時而揆於事至於得之者未必盡賢失之者未必盡愚意謂隨天下貢士且進且退可以無咎今乃不意遇聖君賢相以僕射為日月照臨多士莫不屏氣攝息人之自咎若抱罪戾其在王門公族少讀文學尚為憂惕啟僕射之德振於文機其必得天下苦心之人而進之然後優游盛明為臯為伊以茂生植者也不然豈至於是逾二十載復匡之乎是知天啟德於僕射在此時也某於此時若不得循牆以窺則是終身無竊望之分也敢布愚拙伏惟特以文之光明而俯燭之幸甚幸甚并獻拙賦一首塵冒尊嚴無任悸慄之至夫以璿樞顯視周四七而成文玉琯潛聆載十二而分統肇有憑翼生乎象先雖迷放屬之源終識踆足厂田坴之數是以迎推洞乎三合分至貞乎四禽既測洪荒瞭分清濁於是九圍所沓必揆於靈臺萬古無差可徵於幽贊且彤車白馬先命羲和紫極黃龍次分甘石雖東流不溢天問猶疑而北戶承陽地維何隱稽乎儒氏之業也莫不咸思蟻轉盡愧雞如安可命曰三靈或至迷其二大愚以始聞方數側揆元黃亦嘗以大竇酬嘲敢云早慧既不用蛉膠習戲自鄙童心及竊譽里中拘塵長者執經堂奧避席嚴師自悟牖間愧非胡廣頻依廡下虛感伯通而日月居諸榆槐屢改管窺之心妄切瞽史之學難修而又爛額焦頭方思馬褐捉襟見肘久困牛衣颯垂領以若驚顧生髀而增歎信天人之際難可究思考經緯之文固有宗旨竊以海潮之事代或迷之今於賦中盡抉疑滯輒依洛下閎張平子何承天等以渾天為法水與地居其半日月繞乎其下以證夫激而成潮之理并納華夷郡國環以二十八宿黃道所交及立北極為上䂓南極為下䂓以正乎日月之所由升降其理昭然可辨謂之潮圖施諸粉繢庶將無闕緬螢囊之已久撫魚網而多慙敢避識者之譏固受不知之罪云耳八月之朢日在翼軫之間此時潮最大今立此朢之夕日入初於時在戌見潮初生之候地浮於水天在水外天道右轉七政左旋日入則晚潮激于左日出則早潮激于右潮之小大則隨于月月近則小月遠則大右此賦中具論之矣一曰渾天張衡所述二曰葢天周髀以為法三曰宣夜無師法四曰安天虞喜作五曰昕天姚信作六曰穹天虞聳作自葢天以下並好竒徇異之說非至說也先儒亦不重其術也右經撰賦及圖定取渾天為法其增立渾天之術自張平子始言天地狀如雞子天包於地周旋無端其形渾渾故曰渾天也晉葛洪謂天形如雞子地如雞子之黃周天三百六十五度四分度之一半覆地上半繞地下二十八宿半隱半見宋何承天云廼觀渾儀研求天意乃悟天形正圓水居其半中高外卑水周其下梁祖晅云渾天之形內圓如彈丸其半出地上半隱地下右今撰圖正用此法但諸家能言天形而未知日之激水而成潮也又按周易離為日坤為地日出地上於卦在晉日入地下卦為明夷乾為天坎為水天右旋入水為夕則天在水下於卦為需天左旋昇出為潮於卦在訟又離為日坎為水日出水上卦為未濟濟之言涉也日東出而未西涉水此其象也日入水下卦為既濟言日右隨天入已涉于海則周易之象其事較然右今撰潮圖探於周易合乎渾天推于爻象故賦指復姤二卦以定陰陽言不及渾天而乖誕者凡五家莊子逍遙篇元中記王仲任論衡言日不入地山經釋氏言四天乙巳占具解訖右並無證騐不可究尋王仲任徒肆談天失之極遠桓君山攻之已破此不復云莊生則假物為喻以論真宗而學者多誤故列之為難信之首元中山經一無可取釋氏俱舍乃自立心法非可以表測而度量也又按吳王蕃法云余因周禮鄭衆鄭元之言用勾股之術以求天之里數夏至之日以八尺之表求晷於陽城表南得影一尺五寸南至日南下無影則日南去陽城一萬五千里立八十而旁十五則日高八萬里日南邪去以勾股法得八萬一千二百九十四里有竒蓋天頂至地之數也倍之得十六萬二千五百八十八里有竒即天徑之數也以周徑之法乘得五十一萬三千六百八十七里有竒即周天之數也右肇始學渾天法於度支推官監察御史太原王軒軒以王蕃之術授焉自後因演而成圖既知夫天地之薄厚則日月之行寒暑之候皆由自得之遂用覃思巨溟稽萬流之昇降果見潮生之候由是博考㣥言以證遇晦而自得之旨無所疑焉渾儀之制渾儀法肇得自虞舜以琁璣玉衡以齊七政鄭康成云其轉運者為璣其止息者為衡皆玉為之七政者日月五星也則渾儀之本法晉侍中劉智云顓頊造渾儀黃帝為葢天則此二器皆古聖王之制作也但學者失其用耳說者乃云始自張衡今考其事張乃巧述其法而揆之非始造者也虞喜又云洛下閎為漢武帝於地中轉渾天定時修太初歷又知此術在張平子前也後漢左中郎將賈逵以永元十五年造黃道渾儀張衡以延熹七年更造銅儀以四分為度于密室中以漏水轉之令伺者閉戶而唱以告司天者云琁璣所加某星已中某星今沒皆如合符契其後吳王蕃修之如陸績及後魏太史令晁崇隋河間劉焯皆修渾儀之法李淳風因為遊儀葢與靈憲同也右以物象天謂之渾儀則日月四海在渾儀之內日月盈縮之度可察而獨迷潮水生來之候豈古人未之思乎肇秪於此術究而得之不為怪誕無據之說猶恐時之學者尚有所疑故以著之吁天地之至賾天地之元精升降變化因時而發者惟聖人焉惟神物焉聖人理乎陽神物理乎陰故能靈浹乎寰區功濟乎動植君大道而不屈運元德於無窮者天之為也夫能知天之為者必探乎坤輿之涯必有司宰當夫萬物不振百姓不親虎豹虺蝮搏齧騰觸骨月冰泮害毒草靡於斯時也天地既否雲電將屯則有軒毓乎繞樞商生乎元乙姜嫄履歆而后稷誕慶都夢龍而伊祁興五精在天迭降於代是三才不理乃生聖人也聖人既生品物既盛德刑政事克傳克修其或山冡崒崩高岸為谷道隱乎功德隱乎奢貪敗生災風雨不若於斯時也草木失滋胎卵殈殰則有至精下降乃生神物既坼既堛光明蜿蟺則溫姥之毓龍義斯在矣昔者秦毒天下神鬼乏主英精怪質潛躍失次故龍遁乎漲海之涯托乎嫠姥之室圓苞不陣霞錦相光鱗鬣未生風雨如晦姥既躭之在手覆之以衣一夕威靈欲震雷電皆至龍遂育焉厥後姥以母龍以子提護縈繞如乳如嬉或遊於泉或躍於滸姥方朝膳必薦鮮鱗他年姥斮鱗於溪龍遊於刃下而尾觸銛鋒姥駭視之則墮數尺矣因泳去於是盤天乘風出幽入冥惚恍變化潛乎乾戰乎坤不知其往矣姥恨其誤傷竟不復至而姥亦逾乎鮐鯢克慎厥化姥無姻戚閱城人葬之水涯惟龍乃寓形於人衰杖如瘵洟苫涕塊哀呼浹日謂人曰藏我母卑矣他日潮水齧之非葬之所也其將假爾牛馬為役以遷於顯爽一夕風雷大至明日視之則姥之封若覆夏屋矣在於山巔里之中牛馬皆殆不飲齕齊衰者亦亡所在閱城人立姥及龍之像以禮祠之既而龍降於祠堂形類虺徙日而不見其趾尾端之枿突而圓焉其大小長短視無常質人或誠禮之則飲巵酒循衣繞軀玩狎如喜其能司人禍福若有權衡度量焉自秦至於聖唐千六百餘歲其靈不泯今乃有龍伯龍叔龍季焉伯則舊也叔季不知何代相踵而來也今皆在閱城元和中故宜春縣令盧府君嘗遊宦南越乞靈於龍契乎其旨嘗夢龍伯謂之曰君將宰邑江西其致我焉許之及太和五年歲在壬子府君來宜春遂立祠於邑東昌山津右府君諱㟧舉孝廉三遷為宜春令始至遇邑大饑令豪族以陳積周賦貧民故得不佻不病不橫不流民從其化矣夫神物莅乎陰府君之美政微龍之輔乎予於府君為宗姪予為兒而府君多之曰乃異日其聞乎故予始終龍姥之事及載府君置祠之旨焉姥溫姓閱城人也閱城為秦南越邑代謂之曰龍母龍母古矣其言甚質吾思以文之追書姥為閱城君焉刻銘於祠之闑西云天地何寶聖人之道天有五精惟聖迭生聖道未弭百靈奉祉惟周之湮稔毒於秦龍迷所奉棲於越人伊姥何慈惟龍克孝如持天綱示越人教涕洟封樹有禮有容豈惟神物是謂孝龍孝龍之靈宜崇宜薦巖巖此祠君子攸建有雲在山有水在川龍德永永為民有年惟蘭斯叢惟芷斯茂龍德馥馥作為民祐鳴鳩之飛在于灌木彼哺者鳥亦讙其族龍有孝思俾民敦睦紹惟瓞麥秀其歧龍錫民福子孫嗣之逐逐蹄輪汔汔檣檝龍靈可依且不爾愜惟龍之祠涖于此津千萬其祀福于袁人右臣聞神農立極先定乾坤軒后統天始宏歷象蓋以大聖有作而大法乃明必自臣子之所為克成君父之至德只如陳韶奏夏允諧聖帝之音而伐鼓鏗鐘元在工人之手業雖成於微賤事乃表於皇王臣今所陳竊用此道伏惟睿文明聖孝德皇帝陛下德邁伊媯道包覆載垂衣而九有無外執契而萬國來庭日月貞明天地交泰珍圖瑞物允膺得一之符伯益臯繇共佐千年之聖臣實陋賤亦忝方州而微臣始自知書志在稽古或觀天地之道得於經史之間既察置圭亦聞測管究黃鍾於玉律窺碧落於璿樞伏念司馬遷則書載天官張平子則儀鈞地動臣仰遵前哲輒揆圓虛偶識海潮深符易象理皆摭實事盡揣摩既當鳳紀之朝願陳蠡測之見臣肇誠惶誠恐頓首頓首臣又聞天垂象而六合成道生一而三才具皆由日月運乎陰陽是謂神明分乎晝夜伏知此道盡在陛下睿鑒之中故不俟微臣因此別白然自古以來莫不以地厚難測日既入而人不見其行海大無涯潮潛生而人不知其候上古聖人則之於八卦學者演之成六家而有講論未明根本不圖天垂大法假乎微臣獲在聖朝彰此愚見臣門地衰薄生長江湖志在為儒弱不好弄研求近代寒苦莫甚於斯臣伏念為業之初家空四壁夜無脂燭則爇薪蘇曉恨頑冥亦嘗懸剌在名塲則最為孤立於多士則時負獨知累竊皇恩遽變白屋臣於會昌三年應進士舉故山南節度使同中書門下平章事王起擢臣為進士狀頭筮仕之初故鄂岳節度使盧商自中書出鎮辟臣為從事自後故江陵節度使贈太尉裴休故太原節度使贈左僕射盧簡求皆將相重臣知臣苦心謂臣有立全無親黨不能吹噓悉賞微才奏署門吏臣前年二月蒙恩自潼關防禦判官除秘書省著作郎其年八月又蒙恩除倉部員外郎充集賢院直學士去年五月又蒙恩除歙州剌史臣謹行陛下法令常懼夭夭心違理郡周星未有政績潛被百姓詣闕以臣粗能緝理求欲留臣奉七月二十二日敕又蒙聖恩賜臣金紫臣素無強近之援不異草澤之人忽荷寵光及此叨忝臣不以平生志業上奏於宸慈實懼犬馬之微忽先於溝壑則臣積年無所闡揚非唯自負片心實亦上辜聖代是敢竊以所撰前件潮賦并圖進上臣為此賦以二十餘年前後詳參實符象數願潢汚之水輒赴溟渤之流而雕蟲所為刻鵠難肖塵冒天聽罪當鼎鑊今差軍事押衙盧師洎隨狀奉進上凟宸嚴敢期睿覽臣肇無任惶懼戰越屏營之至謹錄奏以聞伏俟誅責宜春郡東五里有山望之正若冠冕同麓而異峰四首相屬兩仰成形况在東方如畫震卦郡人名之曰呼崗意者亦謂其若長幼相呼同在一處其義不顯予無取焉其西北有石室臨游溪之涘邑人彭先生嘗釣此巖下先生諱搆雲善黃老言寶應中詔以玉帛召先生不至時太守命其鄉曰徵君鄉巖曰徵君釣臺咸通七年予罷新安守以俸錢易負郭二頃在震山之西又得楓樹之林於溪南日與郡守高公遊其下公名厚衣纓之茂士也為政嚴簡民悉安之咸瞻仰之而以震山易呼岡之名白公公喜命刊其事於巖下予既得西林而羅鳥罝兔挾彈走馬於其間亦請命其林曰盧氏弋林以對其東彭氏釣渚也因謂高公使郡人無得樵漁於是林之檀欒杉檜不日豐茂以冠於郡主帥高公因戒吏以丹書貽盧氏使西疇之人世世掌之時郡民相率言曰二剌史俱好事者吾儕幸寓目焉遂以刊之是歲景戌十一月二十三日謹記至哉邃古已來天之永錫正命者其惟帝唐乎聖祖神宗光啟土宇垂億萬祀克承休嘉莫不以禮樂先兆人以慈儉任天下仁居惠往營魄離者而其施猶存揭淺厲深心跡泯者而厥功亦在常善救人常善救物非至德誰能普行之故鬼神受祉黎元樂康寶祚延洪率由此道也於是表大覺為靈根與㣥生共有叩真空而不壞惟聖者獨知非崇夫金輪氏之教則焉得窮理盡性齊萬法於物我哉是以沉善惡於洗妄之泉擢枝莖乎植性之囿嘗令學者崇飾精廬顯有堂皇亦如庠序郡國分理必付元臣將俾㣥生罔不開悟且夫斯干秩秩止在周邦靈宮彤彤唯居魯國曷有列剎映乎霄顥飛甍麗乎陽光瞻彼玉毫儼然金地翬軒鵰晥岫聳雲攢遍於州郡若斯之美與若夫宣城新興寺者會昌四年既毀大中二祀故相國太尉裴公之所立也公諱休字公美河東聞喜人代濟文德洎公彌大擢進士甲科登直言制首未三十由拾遺遷殿內鴻名偉望迭處清雄入奉絲綸出省風俗拜春官則齊驅驥騄視民部則克阜生齒至於調入王府貨出水衡洎陟台司亦勞厥事凡三拜廉察五授節旄孫先生有愧知兵山巨源當慙視史揆路既長乎百辟荊門復平乎水土公降由辛未歸以甲申為唐碩臣作佛大士光珉顯竹此不復書所至之邦必興修淨行大中二年拜宣城常與名緇會難有設疑以試公者曰三界虛妄㣥生顛倒可有修行能解厂田坴縛孰為智慧可化凡愚胡為乎公之區區徒自撓耳公曰噫嘻珠玉在櫝啟之則見其珍聖賢有門行之則踐其閾分塗而往惟善惡焉善惡如東西耳趣之不已則至其所焉在乎推心於不染馭馬於無塗也如是三界信真實㣥生非顛倒但學者不能窒慾攘貪遺名去利弗捨有漏而思住無為耳然捨之自我取不由人非用智慧解彼厂田坴縛如此則了無一物以撓吾真也他日門人有謂公曰敢問三界之言未立人不知修行不知因果畏陰隲者不為之多介景福者不為之少理亂增損繫乎其時洎斯教也行乎諸華愚人畏罪以損其惡賢者望福以增其善增之不已則至今當盡善矣損之不已亦至今宜無惡矣何昏迷暴虐無減於秦漢之前福慧聰明不增於魏晉之後歸之者殊塗輻湊立之者萬法雲興稽諸天不見其文求諸古莫有其法號為大聖作天人師是宜使吾人盡升覺路不宜使蚩蚩庶類由古迄今若斯之迷者也設使像法至今未行將盡墮惡道為鬼為蜮乎夫法未始有今而有之希聖之徒可存而知之也其由之之固庸非溺乎公笑謂之曰大昭肇啟法不齊備聖人繼作代天為工結繩畫卦質文滋變一聖立一法生天道人事顯若符契夫燧人氏之未為火也則天無火星人無火食龜無火兆物無火災必矣少昊氏之未理金也則天亦無金星人亦無金用龜亦無金兆物亦無金災必矣及聖人攻木出火鍜石取金於是乎精芒主宰騰變上下則知世法時事隨聖而立佛聖人也考精神之原窮性命之表作大方便護於㣥生㣥生受之而不知蓋由天道運行物以生茂皆謂自已孰知其然也於是問者廓然自得佛味武宗時毀寺而宣之新興故有崇基廣厦文甓雕甍鞠為土梗唯喬柯灌木森聳澗澞祥煙翠靄交覆巖麓耳及宣宗詔許立寺宣之四人相鼓以力請先立之於宣郛公獨不許遂命苾蒭上首元敬謂之曰吾聞之新興寺大歷初有禪師巨偉南宗之上士也與北宗昭禪師論大慧綱明實相際於此始作此山道塲後有浩禪師作草堂於道塲西北其旁有藻律師居之律師去世門人立塔院貞元中巨偉之門人靈翹始請於太守合三院而為寺彼皆智慧傑出親啟山林今之立寺無以易此也議定郡東故有妙覺寺寺雖毀而杉檜多大十圍一旦有二龍鬬谷中拔大樹三十二視之皆殿宇之材也公嘆曰將立寺而龍拔巨樹天其有意乎遂用之於是霜斤沐楹玉砂瑩礎上下其響音中桑林不朞年而雲攢四榮風搖寶鐸蟉拏六扇月照金鋪勝紀一源繚牆百雉繕修多羅為攝受置無盡藏為莊嚴䆗窱幽邃輪奐博敞蓋江南之首出也初奉詔隸僧三十人今其存者大半搆殿立門有軒有廡則律師元敬法華道延首其事編經立藏不遺句偈則維摩從省禪門真會著其功善集檀施備修房廊學於三時旁窺六義則金剛清越服其勤而法華遂言湼槃明則洎法林超度皆以禪學為宗律師道隨宜春人幼植淨行得泥丸妙旨一日以披文相質之事造余於新安余既許之道隨復言繼二十人者皆苦修持能遺物累則有應元友恭道幽仁寶懷賁從儉惟恭文明師迴師宗思靜常政文暢宏暢契蒙景先法進惟勤志宏元操與前輩又為三十人矣而太尉所立有殿內千佛有地藏院有上方石盆院又以俸錢入膏腴之墅為地藏香火定中之謀始於太尉太尉作之門人述之有作有述誰曰不然乃為銘曰奕奕新興敬亭南麓鉅構崇基崢嶸煜煜伊昔既毀神愁鬼毒洎將再營天人合福赩有逴龍其怒則觸助作棟楹拔此巨木雨運風移騰川跨陸神怪戮力老幼同心蚨翼飛貨龍鱗布金揭立赫奕化成嶔崟玉礎方丈花臺百尋日明香剎雲生寶林太尉裴公聳其學者宏以戒光甘露披灑示厥有為取彼難捨必有精靈扶持大厦小儒刻石有慙史野永言歌之庶近風雅韞咸通末為州刑掾韞咸通末為州刑掾時盧陵盧肇罷南浦太守歸宜春公之文翰海內知名韞竊慕小學因師于盧公子弟安期歲餘盧公忽相謂曰子學吾書但求其力爾殊不知用筆之方不在於力用於力筆死矣虛掌實指指不入掌東西上下何所關焉常人云永字八法乃點畫爾拘於一字何異守株翰林禁經云筆貴饒左書尚遲鈍此君臣之道也大凡點畫不在拘之長短遠近但勿遏其勢俾令筋骨相連意在筆前然後作字若平直相似狀如算子此畫爾非書法也吾昔授教於韓吏部其法曰撥鐙今將受子子勿妄傳推拖撚拽是也訣盡於此子其旨而味乎韞加以久罹戎事筆硯多亡終不能窮其妙亦猶古人有得不死之術者人將從學焉未至得術者物故歎恨不極人或議之曰彼尚不能自免何恨之有耶客曰昔有善算術者臨終傳於子終不能曉乃傳於人他人盡其妙彼何妨得而不能演哉愚雖受盧公之命既不能自益其要妙敢恡復傳於智者
