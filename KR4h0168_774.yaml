front:
  text: 全唐文欽定全唐文卷七百七十四李商隱四
  hash: sha256:45f5df856148f5722b33d2c538db8d25f0bf54bda0bcd172422c13b44c80b172
body:
  text: 伏見除書伏承新命相公廟鼎調味戎麾著功佩印來歸執圭入覲朱暉黃髮尹勳清操想名氏而疑古儼風容而在今固合重處化源再毗昌運而道唯養退志在遠權慮不節以成嗟恐知進而無亢餐餔典訓寢興雋賢堅拒注懷退守師長然竊惟故實式見優崇胡廣五遷方膺此寵荀覬四讓始受今榮皆名絶品流事高銓攝伏想當仁有裕得請為娛從容於鳳池雞樹之間焜耀以蒼玉皂襜之飾雅稱鎮物孤風動人凡在含靈孰不仰止某早承重顧今守遐方唯嘆羈留莫伸抃賀望蘭臺之祕邃天上人間附桂水之平生一日千里攀戀之至無任下情伏惟俯賜恩察某以今月九日到任上訖疆分楚越民雜華夷殫獷俗巫風帶三居五宅頒條之寄稱職為難伏幸過潭州日得與輿人詠我台座聞寇恂之理行窺樊仲之官司誓欲披拂仁風禱祈膏雨粗師遺愛俯惠疲氓伏料清光必亮丹款至於酌泉投香之戒飲冰食蘖之規實惟素誠敢有二事伏惟特賜恩察某行役以今月二十八日達潭州訖輕帆直渡長楫橫飛仰承金鉉之恩輝幸免石郵之留滯但以素無勳效謬奉寵榮俯憂攬轡之時有辱洪爐之賜然亦欲簡惠以臨雜俗誠明以待遠人稟王符麴豉之規略王霸米鹽之政使疲羸措手頑梗革心伏見恩制伏承相公因緣新座懇讓兼榮仰讀綸言實光鼎味凡在生植孰不歡呼昔齊氏主盟亦分三鼓晉人興讓遂立五軍彼皆列國之僚尚煥素臣之史豈若相公顯夫睿哲克致升平當注意於作相之時盡同心於官僚之事况典冊之任古今所難繫百代之觀瞻垂一王之楷法固在專修凡例謹授諸儒則獸殿刪儀瀛洲集論校其輕重良有等夷將令能業其官必在各司其局某早蒙榮顧遙奉休聲徒勤仗節之心未有望塵之路抃賀之外結戀伏增不審自經哀苦尊體如何王丞相之還臺不無深感潘黃門之歸路諒有餘悲然訪以元言推之大觀苟陶埏於莊惠豈蒂芥於彭殤伏惟上答皇私下裁沈痛俯安寢膳以定樞機不以鍾情或虧常理東門吳向無之說則近傷慈魏陽元自損之言實存深旨某早承恩矚方此辭離憂望之誠頃刻無喻伏惟俯收卑款以慰遐藩下情云云以今月九日到任上訖地當嶺首封接蠻陬猿飲鳥言罕規政令銀簪銅鏑本主羈縻實憂下才無以布政唯當推誠慮物潔已臨人畏楊震之四知從士伯之三務所冀粗攀方國無失賦輿然後宣布朝經闡揚廟算設學舍媒官之令峻頑人罷女之科仰奉恩知敢同荒墮伏惟特賜恩察某行李今月二十八日已達潭州訖某曾無材術謬忝恩榮雖曰小藩且兼雜俗慮物斯至撫躬不任昨者迎迓之初粗停浮費至止之後務扇仁風苟或滿假為心墮偷在念豈為顯責當逭幽誅伏計亦賜信察南郡旬時方集水潦重湖吞吐實亞滄溟未濟之間臨深是懼及揚帆鼓枻則浪靜風和不吟行路之難乃仗濟川之便儻聞見之下指教所存苟可輕其悔尢敢不聳於咨稟伏惟特賜留念某以今月某日到任上訖漢縣舊封越城遐嶠夷貊半參於編戶賦輿全視于奧區不知疏蕪曷處盤錯唯當仰承指訓俯事躬親合農功於國僑思馬志於文子冀申豪髮用贖簡書至於生事沽名迷方改務實於他日則巳誓心庶遵丙吉之規稍勵賈琮之志伏惟特賜恩察伏見恩制伏承屢貢昌言請均兼職副天道福謙之旨遵元元象易之文果降絲綸式光鈞軸永言欣荷難以鋪陳且詩戒從事獨賢傳美同班相恤知者甚衆行之實難苟未研味道樞探詳物理則安得盡賢哲之至賾合經典之大猷凡在含生罕不伏義况朝廷道先報本業重承祧必用親賢以奉宮廟若華委照仙李垂陰恢大君無忝之功稟聖祖永存之慶某早蒙恩異雖遠拜辭擊節嚮風撫牀竊抃末由陳賀攀戀伏深某謬蒙恩渥寄以察廉退省庸虛實深兢惕伏幸塗經荊楚行拜旌麾冀於侍宴之餘得受發蒙之教即以今月七日赴任桂林不唯雜俗實介遐荒然處於上游嘗是重德餘波所及孔道是因粗仰仁聲必康疲俗况某早緣宗族辱奉恩知便路起居率誠咨稟庶常祗佩用免悔尢慰忭之深先積卑懇上路後續更有狀伏惟照察伏蒙仁恩賜及銀器綾紗茶藥等某雖征遐嶠亦守小藩就道巳備資糧到鎮粗有俸入實無闕乏可軫恩憐方幸經途得遂拜覲稟同姓異殊之禮展小國事大之儀宴好頻仍言教懇至長途方即厚賜仍加俯稽推讓之誠益重違離之戀謹依榮示別教捧領訖下情云云不審近日尊體何如道濟明時德彰暗室固巳神祇薦祉寒暑均和竊料寢興常保休祜下情無任忭慰之誠近者上臺出為外相伏思元老已注宸心况十叔相公師律克貞功成允懋運籌調鼎已著於他年反風起禾更在於今日不唯宗族實係蒸黎伏為俯為休明善加頤養某實無材術叨處察廉唯當規奉上游因依下顧庶將兢惕以免悔尢尋欲慎擇時才式將好幣屬楚南越北苦異繁華捆載橐裝更無珍妙又虞菲廢以辱藩條靦冒之誠陳喻無所李支使商隱雖非上介曾受殊恩常願拜叔子於薊州更咨魯史謁季良於南郡重議齊論抒其投迹之心遂委行人之任其他誠款附以咨申伏惟俯賜恩察某素無材術謬竊寵榮論駮靡效於掖垣廉問更叨於藩服此皆相公十一丈早回掄覽曲賜丹青知其平生未始郤曲振毛羽於衝風之末脫氛埃於剛氣之中雖曰至愚實佩嘉貺即以今月七日赴任瞻戀旌斾徘徊路岐杳然向風魂動心至相公十一丈早參大政克建殊勳成則不居惕而無咎然今茲昌運實屬長君優游雖縱於宗臣融冶必資於宰匠竊計明臺衢室已懸夢思豈復龍節霓旌可淹偃息伏惟特加寢膳以副禱祠歸奉休期遠登壽域內修百職外庇庶藩則某雖僻在遐方仰違德宇片心朽質萬里不孤特希終始恩亮到任即差專使起居諸續陳啓謹狀得本道進奏院狀報相公親鼓上軍大破奚寇威加元朔慶動紫宸凡在生靈莫不欣快伏以北邊諸虜最強者奚車帳既雜於華風弓㦸頗窺於漢制馬牛銜尾羔駱交蹄朝廷常壓以雄軍處之重將訪於耆舊不絶侵漁相公太白傳精雷泉稟氣黃公授略元女與符綦連四弓常推其百勝蘭子七劒不顧於萬人建牙旗而草樹分形橫雕戈而烟雲斂氣而又以功勳任已感激事君每雪涕以論兵願風驅而掃寇永言異類曾不畏威或獸摶於桑河或鴟張於遼水彼專其暴我務於仁彼輕進以易奔我薄威而養鋭待人百其勇士一其心然後分命驍雄克寸期討伐珍國見賊唯懼其少韓信用士每辦於多一麾而大野朝昏再鼓而窮荒晝赤朱旗喪斧逸馬迷輪耳盡貫而無所伏聽面皆夷而不容泥首熸焚殆盡孳息全空向若非動有成謀舉無遺算以廟堂之決勝佐沙漠之橫行則何以致此一朝平其積患昔漢時驍將多以後期周室虎臣唯稱薄伐比於今日詎可同年某嘗讀兵書誤兼文律馬援聚米曾或留心奚反持矛未至無力遠廉嶺表遐仰邊功闕申賀於行臺空抒懷於尺牘執筆撫劒欣慕無任伏惟俯賜照察伏見除書伏承新命某竊惟故事頗服前言令王之守四海也尊胥附之友立禦侮之臣周室之均五等也命晉楚更盟俾周召分理必配之重德倚以奧區然後可以祗承大君表率㣥辟今中祕黃門之重胥禦之所處也井絡廣陵之大侯伯之所分也本以英靈烜之事任猶在神明所祐禱祝有成苟非上材曷處斯寄伏惟相公指南儒術華蓋詞林擅揚馬之文章富伊臯之業望自顯扶皇極允踐台階不如蕭何見漢祖之高論以告仲父識齊桓之格言故得四翟八蠻九流萬國波恬巨浸草偃高風而又成則不居亢而知退雖延睿想終協元機况井鬼分疆岷峨會險殷富則銅山丹穴精靈則雁水犀津池留萬歲之名橋有七星之號碧雞使者部下時來白鳳詞人座中常滿以功成名遂之日處既富且貴之尊意氣良辰優游豐福為古今之圭表兼將相之安危訪於前修無以擬議某早承顧念曾被陶埏今者五嶺之衝再麾是守灌漏巵而填巨壑尚隔杯盤朝白帝而暮江陵空吟風水感知懷戀無喻下情更須旬月遣專使起居伏惟俯賜照察不審近日尊體何如玉壘延清錦城致爽伏料撫寧多暇福祐來成相公白琯正音黃彞重器道既著於燮理績復彰於旬宣方今化切修文時當偃伯必資元老以冠庶僚雖羽儀未集於方明而夢想固通於中夕佇見坤維返駕宣室虛襟更躋湯禹之姿重講胥庭之化訪諸動植望在旬時况某仰奉恩知獲階廉問既殊常品實倍私懷赴任有程瞻風未卜結款詞訥依仁路賒冀申毫髮之功永奉陶甄之賜即以今月七日進發到府續差專使起居伏惟恩察伏見除書伏承遷寵相公允膺四輔光贊六朝靜則龍蟄存神在一水而無悶動則鳳翔覽德自千仞以來儀雖世塗則有汙隆而吾道終無消長憶昨暫非利往遠適荒陬仲尼之不陋九夷子文之能安三已永言閫閾實冠品流今者復自衡陽去臨汝水以舊丞相兼老成人竊計中塗即有新命俯移高尚還處燮和欲將不為蒼生其若仰孤清廟某昨者幸因行役得奉輝光伏蒙賜以從容降之談吐語百代之損益定九流之否臧調以道心附之禪理始知全德不可度思此時退以語人便將心卜恐未可絶張良之粒具范蠡之舟今則果然不差懸料伏望遠離下土促動前騶復昔日之九遷慰今晨之四海某限當廉察未冀趨承於抃賀而則深顧辭離而漸遠南荒受任方榮便道而來東閣重開畏在他人之後瞻戀思顧不任下情伏惟俯賜照察相公才為時生道應夢得六月一息宜澡刷於天池五色成章必騫翔於雲路嵇山莫峻黃波未宏朱絃奏廟而八音以和瑞玉禮天而百神斯肅不有人傑誰康帝家始者召入紫宸親承清問仲舒演春秋之奧孫宏闡洪範之微抉摘姦豪指切貴近雲霞動色日月回光超絶古今喧傳華夏蒙恬之筆鋒斯挫張永之紙價彌高言在必行得之何讓運祚唯深源是繫富貴逼安石不休密勿平章從容輔翼或武思禁暴則暫別鳳池及功著于藩則復還龍節夷險一致左右皆安爰自保釐遂升端揆納言名幘進賢號冠師長㣥僚協宣庶績得人之盛非才不居王詢在朝晉室每多其經籍徐宣留務魏帝不視其文書式究彞倫是稱尊顯固當允諧㣥議克注上心重秉國鈞復執人柄某謬逢嘉會素乏殊能而受寄疆場假名省署清光莫覩丹慊徒深望京華而甚遙聽邊吹而增欷下情伏增抃賀攀戀之至不審近日尊體何如相公早輔大朝顯有休績伊尹同德臯陶矢謨並著在典經垂於名命而又載懷達節不有成功神理佑謙天道保退伏料調護常極和寧然某竊計前經遐追曩躅險而不墜邵公所以能諫約而無舋重耳所以復還况今慶屬休期運推常武必資國老以立台庭伏料即時入膺榮召凡在華夏莫不禱祠某實乏勳庸謬當廉察將因行役獲報尊嚴俯執輕橈恨無飛翼會昭潭積雨南楚增波尚滯旬時若隔霄漢齊心結念常存李固之匿犀倚寐銜誠巳夢孫宏之脫粟攀戀之至猶積下情門下相公出鎮坤維相公進扶宸極某竊尋前史仰考昌時必有上台號曰當國姬姓則魯周公居君牙君陳之上漢室則蕭相國在張良韓信之先專吐嘉猷獨融明命伏惟相公克懷懿德允遇休期一自燮調屢彰勳伐恥君不及於堯舜遠過前人舉賢不避於親讎深符直道果茲優寵首在注懷外耀國華內榮官族鳳池浴日聊均潤於同人雞樹侵雲憶分陰於遊子曠百千歲無三四人凡在含靈敢不從化况某早蒙恩顧今獲驅馳伏限頒條莫由陳賀檻猿絆驥敢嘆於拘留邱室膺門實懸於誠抱抃賀攀戀不任下情伏惟俯賜恩察某素無才能謬忝廉察實憂尸祿有負疲人僕射地處親賢情殷家國纍更重寄亟立殊勳上黨頃集凶徒近為王土瘡痍未復愁怨尚多果枉雄才以孚至化南則揚河橋之威斷北則煦上谷之仁聲下車政成投刃節解厚承恩顧抃賀伏深拜謁末由無任瞻戀到任續更有狀某謬蒙渥恩叨受廉察顧循虛薄頗積兢惶僕射克著殊勳允承寵重所至皆理無難不更宣武兵多大梁地要承言今昔常繼風流不唯寄以安人多是倚之為相况當碩德尢注㣥情某厚蒙恩知倍深倚望即以今月七日赴任續更有狀某材術素空寵榮疊至未申論駮俄忝察廉尚書允贊休期克抱全德直以高堂指訓外地優閒尚稽廉部之名實積具瞻之望然賢豪出處典傳流故有移孝作忠自家刑國推曾顏之至行參邴魏之嘉猷將使為臣皆規令範出征入輔尤叶㣥情厚承恩憐倍注誠款即以今月十日赴任到鎮更當有狀某今月九日到任上訖不任感惕職重賦輿俗參夷獠務便宜於五嶺或有可觀同剌舉於三河竊將不可但期克寸苦用答恩榮侍郎早立清朝久持重任未處平章之地猶孤動植之心昔周室均財司會且參於太宰漢朝主計丞相仍兼於列侯故事具存殊恩允屬側聆注懇實倍常情伏惟俯賜照察伏承榮膺新命伏惟感慰閣下深蘊材謀久未登用雖當劇任猶屈壯圖然五歲之中二都咸歷東京圭表已肅於殷頑西雍山河佇奔於晉盜便承寵擢入贊休明注望之誠頃刻斯至某實無材術謬忝察廉方蘇瘴嶠之疲羸闕覿章臺之風彩受釐辱召對策叨名雖羈旅於小藩實寤寐於餘眷未期拜賀無任馳思某實無績效謬竊寵榮顧憂菲陋之姿必負澄清之寄十五丈周旋華貫彰灼休聲尋合光輔大君俯成嘉運直以避榮為意勇退是謀大鬱物情未副公議然民資先覺材為時生苟卷懷而太深則燮理而何望伏惟時以為意也末由拜謁瞻戀伏深到任後續更有狀某以九月九日到任上訖映帶溪洞錯雜蠻夷剛鹵石田事殊於農政賨懞越紵功異於桑均實懼疏蕪有辱廉撫至於屏除苛黠賞慰柔良敢忘深薄之規以纍準繩之地伏惟特賜照察伏料旌斾將及容州先以仁聲浹之和氣遠夷畏服疲俗乂安豈待經時然後報政某素無材效忽被恩榮實幸小藩得親奧壤仰承餘論庶免曠官即以某月日進發到任續差專使馳狀某素無材效謬忝恩榮實積兢惶罔知啓處大人盛名典郡碩畫佐時將以俯歷州鄉深求疾瘼然後入膺寵命以副具瞻不唯卑誠實在公議末由拜謁結戀無任某少乏高標本無遠韻徒以堅同匪石直慕如弦遂忝人曹乃行官牒略無淺效以答明時豈謂復冠六聯又司九法柳營莫從於多讓蘭臺超假於前行若非相公允輔朝恩克成人美將其加秩可以雄邊則安得及茲無容而授謹當以身為率克寸已而行義若霜明斷如劒刜使其有勇兼且知方兔穴雖多盡思堙塞梟巢任固皆誓焚除微振軍聲以緩官謗伏惟特賜恩察右件官是某親弟頗長政事早履宦途為宰而績著一同作掾而學推三語脂膏莫潤圭玉無瑕然至於稽勾緡錢掌司財幣未嘗留意素非所長自某年月日蒙今荊州李相公差知埆橋院後常所兢惶每虞敗纍上虧國用旁負已知况又務控淮河地鄰徐汴居然深薄已歷炎涼某年過始衰念深同氣實憂非據有辱至公迫於情誠輒祈休罷相公推友悌之憂於天下妙咳唾之末於藩條爰擇良材俾代其任獲殊常之福事過禱祠蒙不次之恩疾同影響閨門大慶手足增榮未知殺身復在何日下情云云某學輕筐篋略昧韜鈐仰藉時來因成福過夙當分土早竊持符皆已淹時未始報政一時特回天鑒超授厚官仍常伯之榮兼司馬之職而舋憂器滿懼切泉深旋避莫能陳遜不獲此皆相公優重干城之寄導揚錫爵之恩不計貪叨但思獎賞自卜斯審所得尚多謹清勵冰霜堅同金石漸期豐羡粗振稜威少謝武皮實甘馬革伏惟特賜恩察右伏以相公蘭臺克成於故事黃扉顯正於嘉謀道協五臣名高六相遠流休問實激含靈某忝建高旌方掀大斾軍中之執既闕於請纓土貢之餘尚盈於厥篚前件物等薄如蜩甲輕甚鴻毛是願達誠敢求覩物延陵至鄭不隔紵衣之微孔聖刪詩無廢木瓜之興貴賤雖聞有異古今未始無茲干觸威嚴伏增兢懼右伏以相公光由版籍顯拜樞衡浴威鳳於池中問喘牛於路左華夷共慶陰陽以調某雖久在民間常居軍右早識薛宣之必相夙知蔣琬之為公情異常時事殊庶品敢申野外之贄粗罄橐中之裝前件物等價才數金重非兼乘同炙背之願獻况藉手以無因姚察養廉何妨於花練謝安敦素猶取於蒲葵塵黷尊嚴伏深兢越伏以相公脫屣華省振衣中樞溫樹人問而莫知非熊帝感而斯兆軸青史而祗將紀德列景鐘而唯待銘功某任屬啓行志唯盡敵誰言樗散最沐陶甄是敢竊獻食芹輒羞行潦前件物等非因杼軸不曰苞苴曾未足云殊無所直溫孫宏之被才可禦寒易晏子之衣尚猶為隘輕冒威重伏用慙惶某頑謝雕鐫散慙繩墨敢言人地可至圭符三刀之占已聞於為郡萬里之相復起於封侯而效若豪輕功如髮細縱欲志兼冰蘖性約韋絃才可立身未能報主昨者誰謂尢異忽致遷升官踰三命之尊秩總六條之首深惟速謗是切固辭而假器如前循牆無及方茲有靦敢以為榮相公優禮藩維宏宣渥澤與之不吝期以有成亦既思維莫能負荷但當驅羊而鞭其最後牧馬而去其害㣥極力訓齊悉心董正冀無虞前敵取效他年用報國恩兼酬廟算伏惟特賜恩察伏見今月某日制書伏承相公假道版圖正位機密俞膺帝曰歌叶臣哉動植具榮飛沈咸若爰稽往誥載考前經齊定霸威由皆以告仲父漢興王道常謂不如蕭何此所以顯重輔臣光昭宰匠以今况古千載一時且溫嶠纍遷尚見讓而不拜張華敘進亦聞久始即真斯實重難常勞倚注苟非才標棟幹味極和羹莫可比肩孰能接武六戎傾首百辟寄心某早被蔭庥常聞咳唾今者適從亭障方事鼓鼙不敢擅棄虎符輒趨鳳誥下情云云學士時仰高標世推直道果當清切以奉恩私地接蓬山居遙閬苑敢期塵路獲望冰容然前者猶蒙問以好音致之尺牘是何眷遇孰可欽承某自領藩條纍蒙朝獎皆因學士每於敷奏輒記姓名深憂李廣之不侯曲辨孟舒之長者不有所自安能及茲方限征行末由款謁空餘深戀貯在私誠伏惟特賜信察右某伏奉某日制書出守以某日到任上訖伏以境臨東雍地帶上陽為匪沃饒外繁傳置遘驕陽積潦之患困苗螟葉蠈之災將活齊人在擇良牧某因緣儒術塵汙郡符皆由相公假以羽毛飾之丹雘隼飛旟上懼失於頒條熊伏軾前恐乖於求瘼唯當夙宵罔懈深薄為虞冀勞來而有成庶疲羸而獲泰下情無任云云某本無遠韻實謝修途鄒衍文辭敢逃怪忤揚雄鉛槧終取寂寥豈意相公拔自曲臺致之近郡貴從剖竹感在維桑雖恩獎之是懷亦憂兢而斯在但當課其錢鎛督以杼機使渤海田中永無佩犢平原境內盡死飛蝗免斯人溝壑之虞贖他日簡書之責伏惟特賜恩察伏見前月十九日恩制座主相公登庸某科等受恩伏增榮抃閣下同德比義契重交深載惟爰立之榮佇見彙征之吉下情不任迎賀踴躍之至伏惟照察右某伏奉月日制書授持節懷州諸軍事守懷州剌史兼御史中丞者以今月日到任上訖某特以門資早登朝選嘗奉出疆之任曾非泛駕之材直以揚大國之稜威奉良相之成算幸無挫屈兼免滯留業官未多無罪為幸豈意相公上引睿旨下念勳家既假寵於中司又頒條於名部去神州二百里而近無正守三十年已來記室參軍代司符印中兵祭酒分理城池今各額更新官司復舊用威寇敵兼壯郊圻當此之時授任尢重豈伊庸懦可以指令唯當非憂人之不思非利物之不念罄忠武在行之衆奉盟津攬轡之威冀無後艱以答殊奬伏惟俯賜恩察謹録狀上伏承榮兼史職伏惟感慰十三大學士學同九流文窮三變果解殊選允用當仁千載興懷一時定法使馬遷死且不朽猶畏後生若王隱魂而可知必慙非法凡厥儒學以為光榮况某嘗被恩知曾蒙講教唯望精聞變例竊見先經雖類偃商終一辭而不措庶同公穀許二傳以兼行伏計清光必賜念記方之遐嶠臨上孤舟仰望玉音俯佩金諾下情不任攀賀結戀之至不審近日尊體何如太原風景恬和水土深厚伏計調護常保和平某下情無任忭賀之至豐沛遺疆陶唐故俗自頃久罹亢頗至荒殘軒車才臨日月未幾旱雲藏燎於天末甘澤流膏於地中堡鄣復完汙萊盡闢此皆四丈膺靈嶽瀆稟氣星辰繫庶有之安危與大君之休戚再勤龍闕復還鳳池凡在生靈冀在朝夕伏惟為國自重某才乏出㣥類非拔俗攻文當就傅之歲識謝奇童獻賦近加冠之年號非才子徒以四丈東平方將尊隗是許依劉每水檻花朝菊亭雪夜篇什率徵於繼和杯觴曲賜其盡歡委曲款言綢繆顧遇自叨從歲貢求試春官前達開懷後來慕義不有所自安得及茲然猶摧頽不遷拔剌未化仰塵裁鑒有負吹噓倘蒙識以如愚知其不佞俾之樂道使得諱窮則必當刷以羽毛遠謝雞烏之列脫遺鱗鬛高辭鱣鮪之㣥逶迤波濤沖唳霄漢伏惟始終憐察伏蒙仁恩賜借太原日所著歌詩等伏以四丈翊戴大君儀刑多士鬱為邦彥早司國鈞盛烈殊勳已光於帝載徽音清論復播於仁謠尚或研美二南留情四始峻標格而山聯太華鼓洪濤而河到三門望絶攀躋理無揭厲足使清風知愧白雪懷羞縱金懸而誰得求瑕但紙貴而莫不傳寫某者頃雖有志晚無成功雅當畫虎之譏徒有登龍之忝淮邸夙叨於詞客梁園早廁於文人每至因事寄情寓物成命無不搦管興歎伏紙多慙思遲已過於馬卿體弱復踰於王粲豈可思當作賦任竊言詩空懷博我之恩寧發啓豫之歎謹當附於經史置彼縑緗永觀大匠之宏規長作私門之祕寶伏惟特賜照察前月末八郎書中附到同州劉中琴書一封仰戴吹噓內惟庸薄書生十上曾未聞於明習劉公一紙遽有望於招延雖自以數奇亦未謂道廢下情無任佩德感激之至彼州風物極佳節候又早遠聞漢水已有梅花繼兔園賦詠之餘不有博奕蹈漳渠宴集之暇以挹酒漿優游芳辰保奉全德伏思昔日嘗忝初筵今者帛丿糸隔山川違舉旌斾託乘且殊於文學受辭不及於大夫仰望恩輝伏增攀戀伏奉月日榮示兼及前件綃等退省孱庸久塵恩煦致之華館待以嘉賓德異顏回簟瓢不稱於亞聖行非劉實薪水每纍於主人束帛是將千里而遠縕袍十載方見於改為大雪丈餘免虞於偃臥下情無任捧戴感勵之至今月二十四日禮部放榜某徼成名不任感慶某材非秀異文謝清華幸忝科名皆由奬飾昔馬融立學不聞薦彼門人孔光當權詎肯言其弟子豈若四丈屈於公道申以私恩培樹孤株騫騰短羽自卵而翼皆出於生成碎首糜軀莫知其報效瞻望旌棨無任戴恩隕涕之至前月七日過關試訖伏以經年滯留自春宴集雖懷歸若無其長道而適遠方俟於聚糧即以今月二十七日東下伏思自依門館行將十年久負梯媒方霑一第仍世之徽音免墜平生之志業無虧信其自強亦未臻此願言丹慊實誓朝暾雖濟上漢中風煙特異而恩門故國道里斯同北堂之戀方深東閣之知未謝夙宵感激去住倣徨彼謝掾辭歸繫情於臯壤楊朱下泣結念於路歧以方茲辰未偕卑素况自今歲纍蒙榮示軫其飄泊務以慰安促曳裾之期問改轅之日五交辟而未盛十從事而非賢仰望輝光不勝負荷至中秋方遂專往起居未間瞻望旌旄如闊天地伏惟俯賜照察伏承博士七郎自到彼州頓痊舊疾無妨步履不廢起居某頃在東郡久陪文會嘗歎美疹滯此全材今則拜慶之初纍歲之拘攣頓釋承歡之始一朝而跪起如常理絶言詮道符神用且相如痟渴不聞中愈士安痺疾乃欲自裁爰在前賢亦有沈痼豈若此蹣跚就路傴僂言歸念彼良方始憂病在骨髓徵諸大易終聞蹇利西南此皆四丈德契誠明七郎行敦孝敬才當撫覲并愈疲羸某素受恩私不任抃賀
