front:
  text: 全唐文欽定全唐文卷四百十五常衮六
  hash: sha256:cba59501993deba7152a3930ae0255cd357d8e3bcb5d096ab00f722725f96aab
body:
  text: 勅至理之代先德後刑上歡心以臨下下忻然而奉上禍亂不作法令何施去聖久遠薄於教化書填委獄訟煩興苛吏舞文寃人致辟思欲刷恥改行厥路無由豈天地父母慈愛之意也朕主三靈之重託㣥后之上夕惕若厲不敢荒寧內訪卿士外咨方岳日不暇給八年於茲而大道淳風鬱而不振四郊多壘連歲備邊師旅在外役費尤廣賦輿輸轉疲耗吾人困竭無聊窮斯濫矣下愚闇昧不見刑網戎士在軍未習法令犯禁抵罪其徒實繁幽繫狴牢未詳事實吏議不決動淹時序傷沮和氣屢彰咎徵此皆朕之不明教之未至上失其道而繩下以刑敢不罪巳以答災眚且人者君之支體害之則君有所傷刑者教之輔助失之則人無所措慮有寃濫慘然憂傷用明慎罰之典俾宏在宥之澤其天下見禁囚徒死罪降從流流已下罪釋放其左降官及流人并移隸等並予量移仍委所司即勘責送名中書門下奏聽進止如聞州縣官比年率意恣行麤杖不依格令致使殞斃深可哀傷頻有處分仍聞乖越自今已後非灼然蠧害者不得輒加非理仍委觀察節度等使嚴加捉搦勿令有犯如違錄名奏聞量情科貶宣示中外宜悉朕懷門下惟辟奉天作人父母若天垂戒於上人不安於下則修德勤政以達至誠恤刑獄之寃滯問閭閻之疾苦招納諫諍訪求賢良允迪前烈率由茲道朕獲承宗廟之重託於王侯之上夙夜齋慄莫敢荒寧推誠以撫萬邦屈已以安百姓憂勤之至日慎一日服御之給損之又損而涉道猶淺燭理不明國經王度多有廢闕加以寇戎驟犯軍國煩勞賦重人竭因之歲歉田荒業廢逋散相仍每深怵悼頻有蠲降兼亦求良吏以惠矜人除去奸兇用達幽枉大變風俗更張刑政冀人和之漸洽何天眚之屢彰固以朕德之寡昧化之衰薄其咎不遠在予一人亦由郡邑之政未盡條理或貪以害物或擾以傷農有凌弱暴寡之寃有不均失中之政人無所措多陷刑辟蓋上之教道未至豈忍以文法繩之慘然憂嗟深自引慝雖靡草麥秋之候方斷薄刑而薰風長養之時宜寬庶獄大決疏網與之更新其天下見禁囚徒死罪並降從流流已下並釋放內外文武官及前資官六品以下并草澤中有碩學專門茂才異等智謀經武諷諫主文者仰所在州府觀察牧宰精求表薦如所由搜揚未盡遺逸林閒者即宜詣闕自舉親當策試量能擢用朕每覽漢文詔書至陽和之時草木㣥生之類皆有以自樂而吾百姓或阽於死亡而莫之省緬然遐想感歎增懷哀今之人又甚於昔思有贍恤俾安其居觀察節度使及刺史各宜訓勵所部使奉科條變貪官之節激循吏之行其清白明著政理殊尤者具以名聞必加獎擢若冒於貨賄紊我綱紀切宜糺摘當峻刑憲其官人犯賄經恩免罪者並宜申報中書門下及所司不得容其却上自王室多故積有歲時皆我文武之臣中外戮力今天下既定崇德報功與之剖符傳代不絕至於莅官述職各宜明慎典刑貽慶子孫永同休戚於戲武德貞觀之閒有若魏徵王珪李靖李勣房元齡杜如晦等扶翼大運勤勞王家尊主庇人匪躬致命咸有一德格於皇天緬然長懷風烈猶在其後嗣沈翳特加優獎如廟宇荒毀即宜修葺無德不報何日忘之其鰥寡孤獨老幼貧窮不能自存者委州府縣吏取諸色官物量事賑給抑招攜戶口勸課農桑應所在州府有興功役處非灼然急切者宜並停之四瀆五岳名山大川神明所處風雨是主宜委中書門下分使致祭以達精誠孝子順孫義夫節婦事跡明著者特加旌表頒示中外知朕意焉主者施行門下濟於道者化醇而刑措善於理者綱舉而網疏朕涉道未宏燭理多昧嘗亦遐思太古高揖元風保合太和在宥天下蓋德薄而未臻也是用因時以設教便俗以立防務盡平恕用申哀恤又教淺而多犯也加以邊虞未戢井賦猶繁荒瘵之際寇攘斯起遂令圜土嘉石之下積有纍囚危章互之中困於法吏屬盛陽之候大暑方蒸永念狴牢何堪鬱灼所以沮傷和氣感致咎徵天道人事豈相遠也如聞天下諸州自春以來咸愆時雨首種不入宿麥未登哀此矜人何恃不恐皆由朕過益用懼焉惕然憂嗟深自咎責所以悉減常膳別居齋宮禱於神明冀獲嘉應仲夏之月靜事無刑以助晏陰以宏長養斷薄決小已過於麥秋繼長增高宜順乎天意可大赦天下其大歷七年五月十五日昧爽已前已發覺未發覺已結正未結正應天下見禁囚徒罪無輕重一切悉宜放免所由更不須類例聞奏宜令諸道節度觀察及諸州牧縣宰於當管內所有名山靈跡各精誠致祭祈降甘澤冀獲豐稔永思流弊庶振風猷其巴南諸州仍歲水旱迫於凍餒或至流離因有剽求苟全性命懼刑網之所及姑嘯聚以相依抑有由焉蓋非獲已永言其弊用軫於懷如能相率來歸各安生業並無所問咸許自新敢以赦前事相告言者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里宣示中外咸使聞知主者施行門下古者以季春之月布德行惠恤刑振乏朕親執犧牲玉帛獲奉於上帝神祇九年於茲矣克已思理明不能燭昆夷未敘王畧猶虞歲會三秦之師日有千金之費悉索敝賦疲於餽軍侯甸之閒徵求耗竭百穀翔貴關中小歉窮則斯濫安能懼刑因而成盜多有犯法至於軍戎之士致使廩賜不充因之逃亡抵於邦憲事非獲已情亦可察迫以露濡之感明發有懷屬禁烟之令節方薦鮪於寢園聖祖敷佑景靈告祥先天後天載荷嘉貺以陰以雨又助發生固宜順曲成之仁布惟新之命赦罪育物曠然滌除其京兆府及三輔并京城內諸司諸使見禁囚徒犯死罪已下特宜釋放其有犯未發覺者罪無輕重亦宜一切放免如有妄論告者以其罪罪之其官典犯贓不在免限頃者魚朝恩夙有功勳委之戎事而徵求黎庶空竭閭閻加之廣有貿易奪人賄利京城之內擅致刑獄恣行忍虐幽執無辜部領帥人乖於撫馭資糧刻薄勞役煩苛惡稔舋盈自嬰沈痼念其勳舊許以優閒令罷兵權遂其養疾而宗社降鑒神明所殛羸瘵不起旋至斃亡既往無追一切不問所管將士等同坐於王事各効忠勤是朕爪牙自致勳業竝宜仍舊勿有憂懼蓋以朕誠乖感物明未知人失於授任而臻此也今則虛懷引咎親御禁戎特加優寵以表勞績其資聖寺禁人并追捕勘責等即宜並停然以王畿艱弊矜恤疲人蠲稅罷徭與之休息尚恐流傭罕復貧弱未安益用憂勤諒資損約京兆府百姓承前應欠負官物等委所由勘責實在百姓腹內者一切放免其在所由腹內者不在放限畿內官人手力資課及府官充職掌名額稍多所有祇供不免煩費並諸縣郵遞路次館驛諸色徵科等一物已上並委中書門下與京兆尹即會計責取色目一一商量條件處置務令減省以息煩勞其諸司諸使迴易一切並停不急之務亦宜且罷農隙之後照準常式宣示中外知朕意焉門下朕以寡薄獲守丕圖恭默思道克謹天戒常恐至誠不達景化未敷寅畏之誠寢興在慮自純陽用事靈雨夭夭心旬麥雖有秋禾未嘗畝有阻三農之候將貽百姓之憂是用齋心滌思禱於上下神祇雲從自郊月未離畢膏澤不降憂勤益深雖水旱成災陰陽恒數而政刑失中或致夭夭心伏豈孚有爽哀敬未誠歟嗟我矜人陷於刑辟當炎蒸之序在縲絏之中久積幽寃有傷和氣所以引成湯之六事過實在予寬大禹之九刑誠存育物期於作解以救如焚其京城見禁囚徒死罪降從流流已下罪一切釋放仍委中書門下即疏理處分訖奏聞雖赦罪從輕或謂之長惡宥過無小寧失於不經庶空夏臺用緩秋典宣示中外令知朕意省表具知朕思求理化親閱典墳至於去邪納諫之規勤政慎兵之誡取而作鑒畫以為屏與其散在圖書心存而景慕不若列之繪素目覩而躬行庶將為後事之師不獨觀古人之象卿詞彰順美義見忠規省覽再三深叶朕意所賀知省表具知朕纘嗣鴻業託於王公之上常恐涉道猶淺燭理未明夙夜祗畏罔或寧逸至於法天象以垂制順人心而平亂立刑辟而不峻興禮教而不倦出澆浮延納忠直思濟於道保合太和今寰海削平載櫜弓矢皆賴於輔弼之臣盡規於左右將帥之畧宣力於邦家循省表章請崇徽號武功文德揚美於予用愧於懷何以及此尚以昆夷未敘邊鄙猶虞不果允從宜斷來表省表具知昔我祖宗每崇徽號皆以道侔天地澤被生靈故請之不疑而受之不愧是謂典禮鴻光赫然朕以寡昧祗承寶位寅恭惕勵不敢荒寧常懼理化未敷非以自尊為意若蕩清寇孼修舉政刑此乃中外英賢叶心所致況復前疏亦已言之卿等善則稱君過陳功德表章三至益愧於懷豈大體之必然何懇言之不已沈吟終日未果允從省表具知兇逆亂常侵侮中夏曩者潼關失守京國不寧朕因涉岐梁至於巴蜀遂命皇帝肇登寶歷爰靜妖氛今官軍益振回紇效款即議南行共為翦滅卿忠惟奉國孝則保家懷不二之心秉難奪之操皇帝累申寵命兼以崇班宜有懋於深恩且用光於重寄維大歷三年歲次戊申正月朔二十八日皇帝遣某官某乙持節冊命曰於戲建萬國者不獨於中夏嗣一姓者必求於令德咨爾新羅王金英憲男乾運爰自祖宗撫有東表克生明懿載茂勳伐采章文物久沿華風忠敬孝恭率由純性用蕃君子之國能執外臣之禮夫繼代之重擇賢而授是用建爾冢社祚於青邱敬其所守纂其舊服忠以奉上惠以撫下永修東蕃之職無替先君之命肅膺典禮可不慎歟維大歷四年歲次已酉五月戊辰朔二十四日辛卯皇帝若曰於戲魯邦外館有小君之儀漢室和親從閼支之號命公主而疏邑以封煥於徽章抑有前範咨爾第十女稟秀雲漢增華女宗卓爾洵淑迥然昭異肅雍之道能中其和縟麗之功自臻於妙不資姆訓動會禮經甫及初笄之年眷求和鳳之對用開湯沐方戒油軿我有親鄰稱雄貴部分救災患助平寇虞固可申以婚姻厚其寵渥況有誠請爰從歸配是用封曰崇徽公主出降回紇可汗冊曰可敦割愛公主嬪於絕域爾其式是閫則以成婦順服茲嘉命可不慎歟臣某言伏見八月二十六日制冊上皇太后尊號凡在生靈不勝慶幸臣聞天地之經所固者本聖人之德無加於孝故紹休以受命榮號以歸尊是用慶善奉慈因親教愛也伏以皇太后法象太極是生兩儀光昭上元以母萬物塗山降瑞華渚呈符照臨典禮示天人之慶範裁成風化表戚屬之宗師詩云思齊大任文王以聖則知祚我仁慶誕興睿哲穆穆明明有自來矣伏惟聖神文武皇帝陛下以皇道還淳以文明致理行三代之典教備兩漢之威儀逾年改元謁告清廟永言配命殷薦圜丘大孝通於神明至化被於寰宇瞻戀慈訓尚未遑安虔奉徽章以崇位號嚴恭前殿陳布外朝萬國在庭千官執禮冕旒端拱翼翼烝烝候金冊以拜興承瑞寶而俯受聖理之至其道大光朝野同歡臣妾有恃言念舊黨遂及姻聯裦德以殊榮推恩以序進華冑增貴外家益尊固可以感動靈祇懷服戎狄豈止德教加於百姓仁厚及於九族而已宜其煥列青史昭播鴻猷億萬斯年以承多福臣所守有限不獲稱慶闕庭無任抃躍忻悅之至謹遣某官奉表陳賀以聞臣某言臣聞天文次星配以妃位帝宮內職守在王化視公卿而命秩思賢才以審官蓋五禮之宗六義之本也伏惟寶應元聖文武皇帝陛下紹典文武屬當多難一日萬務親紆聖心初定㣥兇尚多闕典紫庭分理頃刻未遑彤管記言因茲而缺然則奉若天道以陰而助陽御於家邦由中而及外今既三靈叶泰四海永清宜舉舊章以行盛禮竊承壼制未正等威當熊之德或聞於蘭殿貫魚之序無別於椒房固以叶周南之風參虞汭之化豈使坤儀曠其取法陰教闕而不修雖則在宸衷安敢默於誠請伏冀大明禮秩俾率宮庭以厚人倫以風天下庶得外朝均政㣥望獲從無任懇款屏營之至臣某誠惶誠恐頓首頓首謹言臣某言臣聞君父之命誠不合辭臣子之心固無所隱隱之則有累天鑒辭之則有負國貞在無隱而不言雖稟命而非孝臣所以省躬審分讓德推賢瀝懇上聞冒嚴亟請丹誠罔感皇睠未昭戰兢失圖精爽飛越臣某誠惶誠恐頓首頓首伏以國之上嗣古曰元良觀象於天應前星之環極取法於地視少海之朝宗必訪蓍龜以承主鬯臣幼非樂善長未好儒慈獎特深愚蒙不易教之羽籥有昧樂章訓以詩書終迷義府遊虧四老才乏五官人莫係心德非守器頃者外統㣥帥內錄尚書竊懼任崇以憂官謗今謬塵博望猥辱壽春位登青宮禮絕朱邸且乖人望載黷朝經循名責實未足承天之序捨長立賢亦猶行古之道伏惟陛下博求公議允納微誠更擇溫文俾膺繼紹遠想伯夷之讓用升季歷之材則至公大行天下幸甚無任懇迫屏營之至謹奉表陳讓以聞臣誠惶誠恐頓首頓首臣子儀等言臣聞聖人昭事以奉時乾道下濟以成物伏惟寶應元聖文武皇帝陛下勤勞庶政憂濟萬邦念生靈之未康慮兵食之不足恭默寅畏齋於穆清減膳徹樂以祈元造天人合應雨雪呈祥在登臺視朔之辰飄灑盈尺俯獻歲發生之節飛舞驚春太素混成浩然萬里甲子之瑞載表於昌期春秋所書亦先於農事重陰益固應水澤腹堅之時積潤潛通迎土膏脈起之候靈貺斯在豐年可知佇登來麰不暇祈穀侍臣相慶野老同歡臣謬奉中樞獲覩嘉慶無任忭躍之至謹奉表陳賀以聞臣子儀等誠歡誠喜頓首頓首臣某言臣一昨奏對親承聖旨以旬期少夭夭心春雨未降雖去冬積雪宿麥頗滋閏年之候農耕未晚甫當薦鮪之月爰及禁火之辰紫陌揚塵青郊晦色日勞聖念恐失人時虔於龍堂親行齋禱德音朝發甘澤夕零霢霂散於城池芳菲遍於草樹四遠皆浹㣥情共歡昔在聖人祭則受福必以精意通於神祇伏見陛下每發聖心未嘗無應與天合德所感昭然慶悅之深倍萬恒品無任慶忭之至臣等言臣聞王者應天以實禮神以誠則其祥大來所榮必速伏惟寶應元聖文武皇帝陛下端命上帝陰騭下人大哉洋洋發育萬物一風一雨必經於憂勞惟精惟微久存於齋禱自立春之後膏澤頻滋宿麥方蘇首種不入百穀皆賤㣥黎稍安屬盛德在火之辰恐散陽流輝之亢小夭夭心旬候則失人時乃命尹京載明祀典飭三輔之屬吏修百縣之大雩陛下又於龍祠躬自祈請雖田事未廢而皇情過勤意纔發而氣蒸令始降而雲合寧止西郊之密且有南山之隮霈然時行丕冒海表浹辰而霽更說㣥心擢芒之蕃將豐於夏薦流根之潤佇合於秋成固使我倉如陵萬億及秭軍國是賴朝野同歡多福殊休莫盛於此臣等謬塵樞近喜倍恒情無任慶忭之至臣某言臣聞春秋龍見而雩以其盛德在火萬物炳然陽驕而旱也周禮所以修一縣之大祀命三公以卜郊則知古之勤雨首於是月蓋聖人順天以垂訓王者奉時以告虔伏惟寶應元聖文武皇帝陛下憂勤庶政寅畏上元全萬物而曲成恐一夫之不獲嘉生是降率土皆穰又自春以來膏澤相繼禾方長茂猶潤纎莖麥且擢芒仍涵秀色及純陽用事流輝是憂未失旬期已勞聖慮勉農祈穀合樂圜丘感上帝之儲祉顧蒼生之禔福祭之明日夜合層雲微風既和震電不作靄然四合滂灑終朝動乾坤而滿盈洽陰陽之化育郊原益茂田稺皆登俯觀秋至之收佇廣歲成之望自朝及野咸慶時和比肩鼓腹空迷日用臣謬參衮職久荷鴻私仰聖澤之無涯愧生成之未答無任忭躍之至謹奉表陳賀以聞臣某言伏見徐承嗣奏今月一日法當日蝕時有澍雨者臣聞日之所足厂田坴行有虛道至之所會蝕亦無災況聖以合天德以禔福是有幽贊宜於感通伏惟寶應元聖文武皇帝陛下協用五紀順用三極歷象日月統和陰陽迺者疇人推策合朔於辰非正陽之所忌於大明而何損猶能懼而勤政實以應天齋於穆清益用恭默精誠所達元運相符圓尺之影始生於海上膚寸之雲忽遍於天下霈然而起豈止終朝莫測應龍之外潛復踆烏之次伐鼓用幣悉罷於有司潤物蕃生普歡於在野及乎睿宿更益清光同道相避則聞昭子之對當交而變果徵劉邵之言古今殊祥中外所慶臣等謬陪近侍喜萬恒情無任抃蹈謹表臣聞惟德動天其應如響日月交會數之常也交而不蝕德所感也伏見有司奏今日午正後七刻太陽初虧未正後三刻復滿者是日也高天無雲太陽不掩訖於申酉光彩逾明萬㝢同瞻百物協慶伏以聖人者合天地以為德與日月以為明當虧而不虧明足見矣當應而遂應神不欺矣伏惟陛下德本於孝動由於禮勤儉以厚下寬仁以愛人憂庶政而疚懷求眾善如不及行之於下土升聞於上帝無遠不屆感而遂通一人有慶三光薦祉昔唐虞至化而星辰不孛日月不蝕以今方古千載同貺大禮元辰在於明發俯逼惟新之運彌彰不掩之祥人事天心何其允協潛輝散彩愈曜於朱城麗景臨空轉明於黃道凡在生類同知聖猷無任踴躍之至臣某言伏見太史奏今月十三日降誕之辰有慶雲見自卯及巳五色相輝京城士庶無不觀覩者臣聞應天者聖降必有期從龍者雲感而成瑞伏惟寶應元聖文武皇帝陛下啟我昌運本乎太微甲觀畫堂以書有慶赤光紫氣以表祥符每歲孟冬內朝舉禮萬國稱賀㣥臣獻壽紛委靈貺總集良辰今者慶雲表祥史冊十月良月遠膺盈數之期後天奉天近叶下元之歷從風蕭索抱日縈迴色涵流渚之虹影雜繞樞之電交映榮光曲成轉蓋萬物皆覩㣥情共歡無疆之休永永禔福臣奉觴慶賀於萬斯年無任抃躍謹奉表陳賀以聞臣等言伏見太原尹北都留守檢校工部尚書薛兼訓奏忻州七聖廟內尊容奉勅移太原府紫微宮安置昨正月二十九日啟告其時有紫雲見兼金奏之聲者臣聞廟貌尊嚴所以追孝天地明察則必垂祥伏惟皇帝陛下全聖人之至德合神道之設教受天之命嚴龔奉先明發有懷載感於文武菲食致美必誠於宗廟序五位而禮順刑四海而化光茲以聖靈在天緬慕增惕是有象設不忘哀矜永念興王之地如聞樂沛之言遠自方州遷於京邑克配上帝高居紫微當其撰吉之時爰有奉章之請百神紛委萬靈朝拜雲浮瑞色樂協薰風已含氣於潛龍更和響於翔鳳用彰莫大之孝以嗣無疆之歷雖周室之既受多祉漢朝之屢獲嘉應未有祖禰丕祐天人合符若斯之盛也臣無裨政事但慶鴻休不勝抃躍之至謹奉表陳賀以聞
