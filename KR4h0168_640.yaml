front:
  text: 全唐文欽定全唐文卷六百四十李翺七
  hash: sha256:61d5b619d7373e89e7ca7de2fbc50d017f2047bcdd9778c2cc3983d8dce341df
body:
  text: 盧坦字保衡河南人父巒贈鄭州刺史坦少孤初任韓城縣尉歷宣城鞏河南三縣尉其吏河南知捕賊杜黃裳為河南尹謂坦曰某家子與惡人遊破舊産公為捕賊盍使察之坦對曰凡居官終始廉白祇入俸錢者雖歷大官亦無厚蓄以傳其能多積財者必剝下以致如其子孫善守之是天富不道人之家也不若恣其不道以歸於人坦以為宜故不使察黃裳驚視因使升就堂坐自此日加重及黃裳為吏部侍郎將授以太常博士會鄭滑節度使李復表請為判官得監察御史薛盈珍為監軍使纍侵軍政坦每據理以拒之盈珍嘗言曰盧侍御所言皆公我故不違也有善吹笛者大將十餘人同啓復請以為重職坦適在復所問曰衆所請可許否坦笑曰大將等皆久在軍積勞亟遷以為右職奈何自薄欲與吹笛少年同為列耶復告諸將曰盧侍御言是也大將慙遽走出就坦謝且曰向聞侍御言某等羞愧汗出恨無穴可入李復病甚盈珍以甲士五百人入州城人皆恐駭坦遽止之盈珍不敢違復卒盈珍主兵事制以姚南仲代盈珍方會客言曰姚大夫書生豈將材也坦私謂人曰姚大夫外雖柔中甚剛又能斷監軍若侵必不受禍自此萌矣若從公喪而西必遇姚大夫吾懼為所留以及禍遂潛去姚果以牒來請終以不逢得解及盈珍與姚隙從事多黜死者王緯觀察浙西兼鹽鐵使請坦為轉運判官及李錡代請如初轉殿中侍御史錡所行多不循法坦每爭之詞深切聽者皆為之懼纍求去不得凡在錡府七年官不改錡惡狀滋大坦慮及難又非可以力爭遂與裴度李約李稜繼以罷去後數年詔追錡入錡遂扇兵士殺留後以留己因發兵取宣州為其將所擒送斬死順宗皇帝寢疾王叔文居翰林決大政天下懍懍坦說宰相韋執誼速白立皇太子以樹國本執誼深納其言將以為殿中侍御史時御史中丞亦以為請王叔文使人請坦將以為員外郎知楊子留後坦假他詞不受叔文不悅故事皆不行及王叔文貶出坦遂為殿中侍御史權德輿為戶部侍郎請為本司員外郎尋轉庫部兼侍御史知雜事未久遷刑部郎中知雜事如故赤縣尉有為御史臺所按者京兆尹密救之上使品官釋之坦時在宅臺吏以告坦白中丞請覆奏然後奉詔品官遂以聞上曰吾固宜先命所司遂使宣詔乃釋數月遷御史中丞賜紫衣分司東都尋歸西臺初上禁絶罷鎮節度使等獻財貨載於赦條時山南節度使柳晟浙東觀察使閻濟美皆罷鎮有所獻坦劾奏之晟濟美皆白衣待罪上召坦對曰柳晟閻濟美所獻皆家財非刻下卿勿劾坦對曰陛下所以布大信於天下者赦令是也且兩臣首違詔臣職當舉奏陛下不可以失大信於天下上曰朕既受之矣如何坦曰出歸有司以明陛下之德上善之竟為宰相所寢李錡之誅有司將自淮安王之下墳墓皆毀之宰相不敢言坦奏曰李錡與國同族其反逆不道身既斬死并殺其子罪塞矣若將追毀祖父墳墓臣以為不可淮安王有佐命之功且國貞又死王事漢誅霍禹不毀霍光之墳房遺愛伏誅罪不追於元齡此前代及聖朝之故事也康誥曰父子兄弟罪不相及若將易之無乃罪及良臣且傷大體乎上改容曰非卿言何由知遂命停毀仍禁樵採給五戶守淮安王之墳以示不忘其功上策賢良方正之士有懷書策入者將深罪之坦奏言四方不明知所犯必以為策詞抵忤宜輕其責上從之江寧節度使裴垍一作均入為僕射行香時將處諫議常侍之上坦引故事及姚南仲近例以為證裴垍怒曰姚南仲何足為例耶坦應曰姚僕射但不是勑使耳何不足以為例也遂為垍所排改左庶子坦初為殿中當杜黃裳為相故纍遷凡二十有三月而至中丞及居官守道正言日聞而人忌其遷之速數月宰相裴垍白以為宣歙池等州都團練觀察處置等使兼御史中丞宣州刺史劉闢反逆其壻蘇強坐誅死強兄宏為晉州從事自免歸人莫敢用坦奏言蘇宏有才行其弟強坐劉闢反誅宏與強相去三千里必不通謀以強廢宏非陛下惜才之志因請宏以為判官上曰假令蘇強當時不就誅尚宜隨材而任之况在其兄耶遂得請及在宣州江淮大旱米價日長或說節其價以救人坦曰宣州地狹穀不足皆他州來若制其價則商不來矣價雖賤如無穀何後米斗及二百商人舟米以來者相望坦乃借兵食多出於市以平其直人賴以生當塗縣有渚田久廢坦以為歲旱苟貧人得食取傭可易為功於是渚田盡闢藉傭以活者數千人又以羡錢四十萬代稅戶之貧者故旱雖甚而人忘災五年冬遷刑部侍郎充諸道鹽鐵轉運使減冗職八十員自江之南補置付之院監使無所與數月轉戶部侍郎判度支坦歷更重位以朝廷是非大體為己務故多所陳請或上封告泗州刺史薛謇為代北水運使時畜馬四百匹有異馬不以獻者事下度支乃使巡官往驗之未反上遲之使品官劉泰昕按其事坦上陳以為陛下既使有司驗之又使品官往豈大臣不足信於品官乎臣請先罷免疏三奏上是之遂追劉泰昕舊賦於州郡者或非土地所有則厚價以市之他境坦悉條奏各去其所無罷宣歙度支米收其價以移之於湖南免江南鹿臘配之鄜汝州以韓重葉一作華為代北水運使開廢田列柵二十益兵三千人歲收粟二十萬石八年西受降城為河所壞城使周懷義上言宰相議徙天德故城坦以受降城張仁願所作城當磧石得制北狄之要若避河流宜退三數里其費不多天德故城北倚山去河甚遠失制虜要地非便因使水運使察視遠近利病以圖進上使品官強文彩覆之文彩言與坦合上召坦使條陳將行之竟為宰相所奪乃出坦為劍南東川節度使周懷義數月憂卒燕重盱代其位遂移天德故城軍士歸怨因殺重旴屠其家初坦與宰相李絳議論多合絳藉以為己助及坦出半載而絳罷坦至東川奏罷兩稅及山澤鹽井榷率之籍夷人歌之錦劍二州有通文成州路每歲奏發二千兵以防西蕃其實不過一二百人坦乃奏於衝地置戍鎮之上誅蔡州詔發兵二千人於安州每朔望使人問其父母妻子其有疾者與之藥故兵士皆感恩而無逃者及薨贈禮部尚書建中四年李希烈陷汴州既又將盜陳州分其兵數千人抵項城縣蓋將掠其玉帛俘纍其男女以會於陳州縣令李侃不知所為其妻楊氏曰君縣令也寇至當守力不足死焉職也君如逃則誰守侃曰兵與財皆無將若何楊氏曰如不守縣為賊所得矣倉廩皆其積也府庫皆其財也百姓皆其戰士也國家何有奪賊之財而食其食重賞以令死士其必濟於是召胥吏百姓於庭楊氏言曰縣令誠主也雖然歲滿則罷去非若吏人百姓然吏人百姓邑人也墳墓存焉宜相與致死以守其邑忍失其身而為賊之人耶衆皆泣許之乃徇曰以瓦石中賊者與之千錢以刀矢兵刃之物中賊者與之萬錢得數百人侃率之以乘城楊氏親為之爨以食之無長少必周而均使侃與賊言曰項城父老義不為賊矣皆悉力守死得吾城不足以威不如亟去徒失利無益也賊皆笑有蜚箭集於侃之手傷而歸楊氏責之曰君不在則人誰肯固矣與其死於城上不猶愈於家乎侃遂忍之復登陴項城小邑也無長㦸徑弩高城深溝之固賊氣吞焉率其徒將超城而下有以弱弓射賊者中其帥墜馬死其帥希烈之壻也賊失勢遂相與散走項城之人無傷焉剌史上侃之功詔遷絳州太平縣令楊氏至茲猶存婦人女子之德奉父母舅姑盡恭順和於娣姒於卑幼有慈愛而能不失其貞者則賢矣至於辨行陳明攻守勇烈之道此固公卿大臣之所難厥自兵興朝廷注意寵旌守禦之臣憑堅城深池之險儲蓄山積貨財自若冠胄服甲負弓矢而馳者不知幾人其勇不能戰其智不能守其忠不能死棄其城而走者有矣彼何人哉若楊氏者婦人也孔子曰仁者必有勇楊氏當之矣贊曰凡人之情皆謂後來者不及於古之人賢者自古亦稀獨後代耶及其有之與古人不殊也若高愍女楊烈婦者雖古烈女其何加焉豫懼其行事堙滅而不傳故皆敘之將告於史官嗚呼孔氏云遠楊朱恣行孟軻距之乃壞於成戎風混華異學魁橫兄嘗辨之孔道益明建武以還文卑質喪氣萎體敗剽剝不讓儷花鬬葉顛倒相上及兄之為思動鬼神撥去其華得其本根開合怪駭驅濤湧雲包劉越嬴並武同殷六經之學絶而復新學者有歸大變於文兄之仕宦罔辭於艱疏奏輒斥去而復遷升黜不改正言亟聞貞元十二兄佐汴州我遊自徐始得兄交視我無能待子以友講文析道為益之厚二十九年不知其久兄以疾休我病臥室三來視我笑語窮日何荒不耕會之以一人心樂生皆惡言凶兄之在病則齊其終順化以盡靡惑於中欲別千萬意如不窮臨喪大號决裂肝胸老日冉言壽死而不亡兄名之垂星斗之光我撰兄行下於太常聲殫天地誰云不長喪車來東我刺廬江君命有嚴不見君喪遣使奠斚百酸攪腸音容若在曷日而忘嗚呼哀哉尚饗維大和元年歲次丁未九月庚申朔二十日己卯朝散大夫守右諫議大夫知制誥李翺謹以清酌庶羞之奠敬祭於亡友故福建都團練觀察處置等使兼御史中丞獨孤君侍郎之靈嗚呼昔我與君自少而歡中暫乖阻周荊眇綿宣城越中二府周旋同事於公職以相連子常推後我唱其先叔向汝齊不紉而堅蘭馨以聞乃在掖垣引我代己其謂真賢共升於朝亦又多年或外或內莫余或捐君齒少我髮鬢都元豐盈角犀氣茂神全當臻上壽福祉昌延何為發瘍針藥弗蠲有妻既喪有子童然喪祭誰主銘旌有翩嗚呼哀哉唯短與長會歸於死以存悲逝前後皆爾哭君之哀痛折支指欲抑不能縱之曷已嗚呼哀哉入君之戶但有裳帷思與君言不見容儀薦肉不食酌酒不持嗟嗟用晦何亟臻斯嗚呼哀哉尚饗嗚呼蘊德在躬必逢其慶利物之至宜乎得政君居翰林遭國之病建立詔制所頒未定决危疑於一言討篡逆以從正橫兵刃以森列述王心而革命伏㣥情於頃刻咸屬目以生敬既名遂而衆安乃登庸而輔聖窒因依之他路收爵賞之全柄升俊良之滯淹摧奸凶之熾盛何襮柔而中毅護勳賢於視聽惟廷相之雍雍伊近世而疇並將協德以致理事有初而未竟方陳謀於帝前忽顛仆以終命雖禀受之有數亦生靈之不幸嗚呼哀哉緬維昔歲陪迹南宮省己何有辱交於公公賢偶時羽若飛鴻走斥於外困不能通公相未幾遽歸自東司諫左垣視草禁中汲引之惠如帆得風飄淪八年顛白成翁幽蟄忽發渙然啓蒙烈士感知矧惟賤躬間以存歿心悲曷窮奠爵而拜公其表衷嗚呼哀哉尚饗前此八年公在宣州翺歸自南下江之流公發辟書使者來召言重禮至實賓之右內懼不稱又安敢辭仰公之德自託如歸亦既在門有言必信翺亦不二知賢則進公曰汝言我用無疑每疑賢者患不能知汝正而公與我氣合有懷必陳無謂弗納公遷侍郎翺赴浙東宦途有阻困不能通公陳上前出白丞相保明無過照灼有狀事遂解釋奏方成官非公之力其退於田公鎮劍州翺亦東掾亟言於相曷不以薦官罷在家臥病飲貧惟公見念復召為賓自修辟牒以復前好承命而行不憚遠道余及陝郊聞公之喪失聲泣哭若火煎腸公為大臣一心正直發言動聽義形在色公出乎外衆論日歸輔相之位實公所宜惟公之薨骨鯁道衰天下失望賢人共悲生必有盡自古皆爾歿而益光孰與公比喪車東去歸祔先址臨路一號永訣於此嗚呼哀哉尚饗嗚呼貞元中歲公既為郎始獲趨門仰公之光遂假薦言幽蟄用彰德惠之厚歿身敢忘公以直道於南出藩謬管記室日陪討論舊政多粃如絲之棼與賢共謀穢滌榛燔監戎戾強陰附包奸潛譖危疑處之若間并兼百流清濁中分賓主之義由茲益敦公自登朝及於謝政善接交友居官恪敬溫然如春柔立不佞坐直屢退進匪由競更歷中外聲華日盛咸期作相為國之慶宜而不居斯可云命知足告休頤養於家子為侍郎光耀芬葩亦列卿曹秩祿且多孫童滿前園沼經過門吏盈朝宴賞有加宜哉萬壽吉慶靡他棄此弗顧哀哉奈何嗚呼哀哉身誰不貴有後斯榮惟公之嗣實大家聲公為弗亡顯顯其名嗚呼哀哉卜筮叶期返宅於滎翺復守郡居不敢寧追懷恩舊躬在郊坰承教絶績刻揚德馨縞服前導盡哀墓庭尚或鑒此公乎有靈嗚呼哀哉尚饗嗚呼天地粹氣降為哲人忠播大惠濟於生民命與時違有此不伸責安所歸乃在鬼神嗚呼哀哉兄初有疾隸人來告走駟往視連呼不覺痛攪我腸誰其能療嫂姪既至患亦微痊我時屢往笑語依然實希返初以及高年謫官分曹拜恩遄發負罪即路不遑去別意謂全德功當及人尚祈會面復接歡欣如何一乖死生驟分嗚呼哀哉豈虞濬之遂臻於茲舍我而去將安取規惟後與先能校幾時短耶長耶終永同歸死為盡乎將有所之惟盡惟有兄其己知嗚呼哀哉兄之既疾告於妻子自古神聖莫不皆爾名垂不滅能光萬祀生平交故歿後誰是吾友在東可以託死且吾所有往謂編紀吾名庶存乃賢在史臨絶又告丁寧心耳所録既到酸慘啓書披尋未窮漫洟盈裾生雖相好歿更有餘敢辭厚命但惡空虛著兄之德刻石幽墟傳乎萬祀用顯名譽嗚呼哀哉兄喪東來我拘郡事闕四字棺不得視形存心遊蕩魄傷氣一杯寫情四望歔欷嗚呼哀哉尚饗嗚呼材不如君富貴者衆身喪遠郡不逢世用如君之年存者則多而遽謝歿傷哉奈何官不展心壽不及老妻少子稚棄去何早我知子能一十八年力竟不及於茲己焉臨君之喪灑酒以訣刻石在壙名傳詎滅下從先人萬古之藏要歸於盡安問短長嗚呼哀哉尚饗祕書少監十弟諒之之靈惟君文行修潔夙負嘉名纍升科第士友歡接遂登諫省蔚以直聞周歷南宮連刺三郡得風告罷入二祕書致政於家息心養疾沈恙頓已日望其除告言不聞凶訃遄至嗚呼哀哉年未五十有男早亡少妻主喪有息非嗣報施之道冥茫孰知嗚呼哀哉吾責刺遠州道里遐濶病不得見喪不得臨痛悼摧傷悽貫心骨有酒在盞有肉在盤魂兮其來歆此單薄灑淚遣祭哀而不文孰期諒之去矣長別嗚呼哀哉尚饗維元和七年歲次壬辰九月景辰朔十五日庚午觀察判官攝監察御史李翺等謹以清酌庶羞之奠致祭於劉君之靈我等與君同列賓筵共食偕行歲辰再遷公事多暇嬉遊百般柳垂於塘荷秀於川或泛在水或登在山飲酒終夜觴觥往還笑言無虐咸盡其歡君實強盛時惟壯年宜哉壽考福祿來臻奈何遭疾針藥弗痊日冀返初憂危遽傳長路未極琴書忽捐嗚呼哀哉堂有老母室有少妻幼男稚女或童或孩發聲怨切弔者酸悽祔葬舊域隨喪以歸已矣劉君自古如斯有肉一豆有酒一卮我來一別去去長辭嗚呼哀哉尚饗嗚呼某維錢君潔行而文上第有司藉藉京秦退居於湖遭病且貧乃耀雄詞單使來臻中丞覽之嗟嘆盈辰遂馳官牒請列賓筵翩然而至灼灼有聞實司表奏章句出㣥有時過我蘊積皆申無言不契有奧必陳每日仰公心知古人古人孰知幸聯為賓與我相接三十餘旬不見有過潛然日新余有行闕二字鄭之間書札日來道遠情親丁寧戒我已事亟還方將執手復展歡欣如何中道哀訃忽聞驚呼失聲迸淚流巾豈其相逢丹旐載翩少妻慟哭聽者酸辛漫漫者天曲直誰賢梁冀張讓富貴在身童烏項士冖䂞夭枉其年王鳳何得賈誼何愆將貴賤前定或短長偶然其誰司之施與何偏天不肯告使人惑焉臨喪寫哀備在斯言萬事皆已一觴在前死矣奈何悲哉錢君嗚呼伏波之生好兵自喜幼有壯節騰身出仕定冊歸漢謨俞帝旨算無失畫功伐可紀破斬徵側實平交趾來往蠻溪未卒而死小人赤口曷本於理薏苡南還明珠譖起乃收侯印爵不及子遺德不忘愛留社里築廟以祭人畏其鬼久而若新千歲不毀詁詁蚩蚩易白成緇孔子義失勳華不慈曾氏殺人母投於機居竊厥嫂陳平不疑申生置堇晉有驪姬無極巧舌伍奢族夷孟子傷讒萋兮作詩公失其所梁松實為何獨將軍自昔如斯故士有歷萬代而不滅者常被訕於當時苟窺心而不怍雖棄置其奚悲赫赫聖帝嘉賢命詞酒斚既設神乎降思尚饗自春亢陽將害嘉穀是以齊心命使用祈於王惟神降歆明應如答陰雲周布膏澤四施旱苗復生宿麥重秀臣人歡悅草木鮮榮惟王之功拯祐於下某忝尹京邑慮迫㣥心實荷王化道以嘉祉方當月禁不殺牛羊謝王嘉錫曷敢稽留且薦中素非陳豆羞請俟踰月乃列牲牢維長慶三年十月二十七日朝議郎守尚書禮部郎中上輕車都尉李翺謹遣舒州攝要籍司衙前軍虞候吳潭以清酒鹿脯告辭於灊山大神之靈翺自去歲來臨此邦遭罹炎旱淮左畢同鄰郡逃亡十家六空惟此舒人安業於農我政無能遘此歲凶災同報異乃神之聰事幸無敗譽斯有融遂忝帝命復官南宮皆神所祐我亦何功將赴京邑路㳂大江遣使來辭神鑒豫衷維長慶元年歲次辛丑十二月癸亥朔十九日辛巳父舒州剌史翺以酒果之奠敬別於第七女足娘子之靈吾以前月二十八日蒙恩改授舒州刺史以明日將領汝母等水路赴州故以酒果來與汝別嗚呼我為汝父汝則吾女王命有期不得安處延陵喪子葬不歸吳考之於禮其合矣夫汝之形骨託終此土汝之精神冥漠不覩上及於天下及於泉鬼神有知汝骨安全永永終古無有後艱我來訣別涕淚漣漣嗚呼尚饗
