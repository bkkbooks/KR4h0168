front:
  text: 全唐文欽定全唐文卷二百五十一蘇頲二
  hash: sha256:4d6ed2e6498db81d5eb710110da1efd73b389b2a678be77d95bfb15ba4bdc699
body:
  text: 敕朝請大夫守中書舍人兼知吏部侍郎事修文館學士上輕車都尉盧藏用含和育粹直道正身學貫儒墨詞精比興風塵之外獨秀瑤林清白之中常懸冰鏡自四年掌誥九品作程峻而不雜重輕咸當而能要浮競斯遠刀尺之委銓衡已歸特選周才更符僉望可檢校吏部侍郎仍佩魚如故門下通議大夫行中書舍人上柱國正平縣開國男裴漼敏學聰亮雅詞微婉陽秋具體夙夜在公精義析於連環規矩同於匪石久典清密見稱忠信稽之務軍國是殷宜擢美才俾揚戎政可尚書兵部侍郎勳封如故主者施行黃門正議大夫行少府監上柱國安陽縣開國男源乾曜思總事端言思政要外則經通成務內則周密知微其識也清以文守法尚方愛費己稱寶玉之府司徒帥屬更重神仙之闈宜副朝獎蒞於邦教可行尚書戶部侍郎散官勳封如故主者施行門下太中大夫前守蒲州刺史修文館學士上柱國開平縣開國子徐彥伯素履內融清暉外徹學究精密旁通儒者思舍飛動高視祠人名與時行位因才致河潤九里先美股肱邸留一月初榮侍從考工之任選衆攸稱可守尚書工部侍郎餘如故主者施行黃門朝請一作散大夫檢校尚書主爵郎中慕容珣在公無撓守道不回利用特稱其斷割清心自表其剛正正議大夫行商州刺史上柱國申國公高紹羽儀鵷鷺符采圭璋詣理愈見於昭明屬詞每聞於警拔九流綜核五等封建式副為郎之美宜用選衆之求珣可尚書吏部郎中紹可行尚書主爵郎中散官勳封各如故主者施行敕宣議郎守尚書考功員外郎王邱學思文華精而典麗朝議郎守侍御史內供奉判右司員外郎上柱國韋虛心神清氣勝敏以甄通或刈其楚翹先有司之課績或提其綱轄肅諸曹之填委爰旌二妙宜叶再遷邱可守尚書主爵郎中虛心可守右司郎中散官勳如故黃門朝散大夫守江州別駕李雍探學精奧為文沉鬱謇諤之心動必無撓彌綸之用行則有恆故以高才逸㣥懿聲滿聽宜膺版圖之任允光蘭握之選可守尚書戶部郎中散官如故主者施行黃門正議大夫行尚書右司員外郎上柱國蔡秦客風格允正文詞優洽明以在公直而履道聲馳粉署爰提建禮之綱位總金曹宜轉司徒之屬可行尚書金部郎中散官勳如故主者施行黃門正議大夫檢校尚書禮部郎中上柱國彭景直通理內融含輝外靜文尚典雅學窮精博故能容臺是則仙闥咸推俾即真於滿歲更惟允於卿月可行尚書禮部郎中散官勳如故主者施行黃門中大夫檢校太子洗馬鄭博雅志業融暢襟靈間遠備聞前言嘗習故事來遊博望既增清道之華入奏明光宜副丹墀之寵可行尚書膳部郎中散官如故主者施行黃門朝議大夫行大理正上柱國李懷讓直方在公清而轉徑通明應務吏必兼文故能譽滿簪纓望華臺署爽鳩作士雖參聽棘之言司馬訓兵重踐握蘭之任可行尚書兵部郎中散官勳如故主者施行黃門通議大夫行太子洗馬高仲舒洽聞殫見履直居溫士慕清暉人推至行崇賢企德己膺洗馬之榮建禮求才宜拜乘鳬之寵可行尚書都官郎中散官如故主者施行敕朝議郎前行左司員外郎柳渙色莊心徑贍學能文堅守憲章務從條理為時所重滿歲當遷宜罷臺轄更司門鍵可守尚書司門郎中散官如故黃門中散大夫檢校太子左贊善大夫王踐睦明敏練習雍容間雅聲馳在公政曉為吏往還臺閣已叶於初從令掌衡虞俾光於重入可行尚書虞部郎中散官如故主者施行敕朝議郎行起居舍人判左司員外郎柳渙襟情雅正藝能敏洽珥筆記言才光東觀張燈起草譽動南宮宜同滿歲之遷式副為郎之舉可行左司員外郎散官如故敕尚書金部員外郎姜昂殿中侍御史李常等勵節修身敏才通識金曹典事頗效精勤白繩違久聞堅正皆能奉職宜稱遷升昂可尚書右司員外郎常可行侍御史散官勳如故敕朝議郎行殿中侍御史李畬雅負才學能循名教蒞官執憲歷歲愈聞清操默識為時所重俾樹聲於勳府宜矯步於仙闈可尚書司勳員外郎散官如故敕朝散大夫行河南府士曹參軍裴耀卿士行純密文詞典麗時人許其清秀職事推其綜核惟才是舉方憑止水之明在位斯聞佇考觀光之彥可檢校考功員外郎敕朝議郎守潤州司馬李元紘清真不雜恬雅自居部劇著於祠曹養能傳於宰邑頃聞出佐方馳日下之聲爰佇入官猶屈黃中之美宜遷郎位以寵相門可行尚書度支員外郎散官如故黃門朝議大夫行尚書祠部員外郎兼判倉部員外郎上柱國陳惠滿操履堅剛能守文法朝請大夫前行太子舍人上柱國蕭嵩風情瀟灑見推才器並頡頏清貫藉甚芳猷大事曰祀蒸人以粒宜奉舊章俾承新命惠滿可行尚書倉部員外郎嵩可行尚書祠部員外郎散官勳各如故主者施行敕朝議郎前行兵部員外郎上柱國趙升卿爰以詞學亟兼文吏踐行貞固用心純密校人祗事即位求才宜膺賜筆之榮重陟含香之列可行尚書駕部員外郎散官勳如故門下太中大夫尚書都官員外郎上柱國張景升操履精密刑書洞曉自遷郎位咸服吏能用於噬嗑必資哀敬丕蔽之審惟才是擇可行尚書刑部員外郎散官勳如故門下朝散大夫殿中侍御史李全昌措懷條暢臨事明允執憲繩違以文從吏五材審用百工為職握蘭之美賜筆攸歸可行尚書工部員外郎散官如故主者施行敕通直郎行殿中侍御史河北道度支營田使游子騫在公必慎臨事克誠言用身謀智為心計頃持憲嘗騖使車往則甄明動惟宏益宜登仙署之列佇總公田之事可尚書屯田員外郎散官如故門下宣議郎試大理評事王琪奕代儒雅門傳教義風襟育粹詞韻含清雖職尚安卑而才方致遠連枝席寵爰映於棣華起草升榮俾光於蘭握可朝散大夫水部員外郎主者施行門下國之副相位亞中台自非邦直孰司天憲銀青光祿大夫將作大匠天水郡開國公尹思貞賢良方正碩儒耆德剛不護缺清而畏知言易從莊色難犯徵先王之體要敷袵必陳折佞臣之怙權拂衣而謝故以事聞海內名動京師鷹隼是擊豺狼自遠必能條理前弊發揮舊章宜承弄印之榮式允登車之志可御史大夫封勳如故主者施行黃門三台副職百寮之師紀綱是任蒞事惟能國子祭酒上柱國廣平郡開國公東都留守宋璟含純粹之德秉清剛之氣學研精以辨政文體要以經遠吉人之寡敷言有訓君子之慎擇行無違正色而自具陽秋立誠而不僭風雨必能靜專動直獻忠納規常聞沃心之任靡憚犯顏之情使其坐以鎮俗嶷然當朝則不能者退不仁者遠王臣蹇蹇懦夫有立俾光天憲式副人瞻可御史大夫勳封如故主者施行黃門副相之重㣥僚取則爰理其綱錫之以印河南府尹上柱國武威縣開國子李傑直清浩素剛斷精密學究文儒才優經濟物寧滯用若遇盤根人或蒙求似開明鏡心公而惡惡道正以間邪河南擅聲天下稱最必檢齊霜憲宏長風猷俾其立朝用爾敦俗可御史大夫勳封如故仍驛赴京主者施行敕朝請郎守尚書虞部郎中崔沔純至之心求忠出孝精微之用博學多文故能清以激貪靜而鎮躁頃攝官持憲履繩錯墨臨事不詘在公則聞宜正三獨之名以光二丞之秩可守御史中丞知東都留臺事散官如故黃門二彼副相一其三獨不任宏才孰膺高選朝議大夫守給事中上柱國李懷讓直方孤聳清迥特立祗服文儒克修典禮持疏網而不漏常嫉惡以闢邪泛虛舟於自然不近名而過實必能去煩苛之小節知憲章之大體允符㣥議光踐中司可守御史中丞散官勳如故門下朝議郎行密州司馬員外置同正員慕容珣志竭忠讜才充學行方書之允門傳御史直繩必踐廷奏姦人凜然生風不避當道醜正非罪遺賢久歎長鯨已戮擊隼方秋宜賁寵章復膺清憲可朝散大夫行御史臺侍御史主者施行敕通直郎監察御史裏行驍騎尉褚璆清識雅致遒文贍學養能見其盤錯臨事杜於脂韋比騖輕軺且持嚴逢二庭之寇無乏於餽軍徵萬里之兵有聞於赴敵念勞斯屬懋賞攸憑增遷御史之端式寵侍臣之列可侍御史勳如故敕朝議郎行司農寺丞張遊清方自居專直不撓秋風始擊每勵鷹鸇歲寒後凋斯見松柏國儲在於紅粟王憲持於白式寄人天之重更聞臺閣之遷可行侍御史散官如故敕營田使游子騫等砥操礪行慎言檢迹清公乃持法之端詞學皆養能之要臨事必果已畏神羊執心不回先聞擊隼宜在鸞階之列用成烏府之遷可依前件主者施行敕朝議郎行殿中侍御史楊瑒風度凝整器懷沈密清心所以激貪明識由其應務頃司王憲深練朝經體文質以會理適剛柔以為用必能履繩作則執宏宜夙從臺閣之遷更寵軒墀之列可行侍御史散官如故敕奉議郎行監察御史鄭溥等志蘊公忠才兼學行守文法以明練循憲章以清直神羊共觸常聞避馬之雄夕烏明飛俾叶遷鶯之舉可依前件敕通直郎行右拾遺鄭繇心堅而靜體密而和文章掞發學思該敏諫臣讜議久列瑤墀御史直繩宜遷石室可行左御史臺監察御史散官如故黃門命卿之貴以象冬春化人之本孰踰禮樂殿中監上柱國楚國公姜皎貞夷粹溫精密純固蘊深厚之量懷直方之道學非為已聞義思齊忠以事君立言成則自歷屯險爰憑翊戴鳴謙滿於視聽好讓存於始終故可銘之鼎彞光我簪紱在昔唐典惟清乃命洎於周官以和為重宜守太常卿勳封如故主者施行黃門中衛司階已崇於命將上卿為府尤重於睦親左衛將軍上柱國兼通事舍人內供奉韋希仲以醞藉之姿中折旋之禮趨事端雅吐詞雄暢束帶立朝既副聲實彯纓在位迭居文武宜輟魚鈐之委敘於麟族之盟可宗正卿餘如故主者施行門下上卿之貴爰因德選終獻之禮必由才致宣威將軍上柱國房光義門承胄緒地聯姻戚雅容端操惟玉有溫擇行踐言復圭無玷頃祗班序尤稱望實蘭錡趨職已仗於誰何柏梁賦詩俾聞於總領可太中大夫守光祿卿勳如故主者施行黃門僕臣之任王命斯允在德而舉其名必彰銀青光祿大夫檢校太僕卿上柱國華容縣開國男王希雋門承舊閥器蘊通才立言可以敏事為政可以居劇登於副尹聲滿於字人試乃列卿眷踰於數馬巾車是屬建鼓攸司爰賴服勤宜膺邦寵可太僕卿勳封如故主者施行黃門法者天下所共廷尉天下所平選衆甄才惟明克允宗正卿上柱國廣平郡開國公判尚書左丞陸餘慶早回翔於近密久踐歷於中外雍容文雅自然素徵清商蕭散風華莫不瑤林瓊樹必當和而不撓貞則有恆正罰金於後人戒刻木於前吏念茲欽恤深可哀矜宜修白雲之典俾靜黃沙之職可大理卿勳封如故主者施行黃門賓客旅庭戎夷在邸眷言職任必佇其才銀青光祿大夫詹事兼尚書右丞上柱國鄧國公張暐雅量溫恭志誠忠信懷直方而不蔽務寬大而不雜委之軍旅則常服威名升之國朝則咸宜令典非契因潛躍義篤始終可辨鴻臚之儀惣象胥之事爰加寵拜允符成奬可鴻臚卿勳封如故主者施行門下膺河寺之秩寵選方高致泉府之殷惟才是屬銀青光祿大夫行黃門侍郎上柱國常山縣開國男李從遠清密任道直方為量學仞山高詞場雲鬱闕里之室動不違仁潁川之門居而會理比登要近備效忠益宜回夕拜式踐冬卿可守太府卿勳封如故主者施行黃門朝議大夫守太子率更令鄭孝式早負才幹素聯姻戚詢事可以樹風聽言可以從事韜戈之任衛㦸是司俾移名於白宜亞寵於丹可守衛尉少卿散官如故門下朝議大夫守中書舍人上柱國陸景初識悟清真虛心得妙言符正直獨行鄰幾故能儒元默知文史明達翔集仙署翻飛禁省而咎繇為理釋之不冤精求上才欽恤中典宜慎刑法俾聞哀敬可大理少卿散官勳如故主者施行黃門正議大夫行太常少卿上柱國薛縣開國男韋玢勵精正己力行徇公從務表其清白幹時允其文采故以臺閣褎稱縉紳甄奬盛禮興樂望雖重於執圭八政一農事尤殷於理粟況洛京轉漕淮海通波宜任牟融之能遷改鄭莊之弊可兼司農少卿散官勳封如舊仍分司東都主者施行黃門乃眷文籍填於外府旁求儒雅掌彼中繩左散騎常侍常山縣開國公仍每日入內侍讀馬懷素有舒向之風擅東南之美貫穿從學博而多能沉鬱成章麗而有則自朝趨鎖闥日侍金華事必討論言惟潤色故可以發揮祕奧詳核異同俾徵荀勗之才更允潘尼之拜可祕書監餘如故主者施行黃門職惟共工率以匠石愛力省費為官擇人岐州刺史上柱國彭城縣開國侯韋湊直方在躬孝友成性文學可以比事高明可以應物素風清節已振循良之聲課最當先宜膺述守之任可將作大匠勳封如故主者施行黃門尚方既設內府為要選衆而求非賢孰與銀青光祿大夫行太府少卿上柱國趙國公崔諤之承名相之軌有忠臣之節正無所詘明無不鑒若披雲霧不雜風塵藉甚才名彬彬文質允茲邦彥尤重時英用符文舉之遷庶叶孟孫之拜可少府監勳封如故主者施行黃門銀青光祿大夫行光祿少卿上柱國金城縣開國子杜元逞久登位事早負聲實擇言以法飾吏以文清方蘊其素心斷割成其利器用才可任惜太官之滯留備物惟殷當御府之關綜宜膺寵命式副僉選可殿中少監散官勳封如故主者施行黃門正議大夫前襄州刺史上柱國陳正觀蘊器沈敏懷才雅實在公有甄綜之能臨事有靖恭之譽頃者荊岑作鎮楚望班條時許仁明俗稱威惠五材是用百工分職爰考掄材之績宜膺梓匠之司可行將作少監散官勳封如故門下中散大夫守將作少監上柱國李處直秉節清苦用心該密學探㣥言文有幽致侍臣對問駮義無差共工之職豈徒有效宜遷內府俾往中京可少府少監散官勳如故仍今東都留司檢校主者施行敕宣議郎右拾遺內供奉陳貞節卞寶輝光楚材翹秀窮禮經之奧博踐詞律之風雅參名列侍每獻昌言掌事奉常宜銓令典可守太常博士散官如故黃門朝議大夫守諫議大夫上柱國兼修國史吳兢祗服言行貫穿典籍蘊良史之才擅巨儒之義頃專筆削仍侍軒階而官之正名禮不以諱宜著書於麟閣復載籍於鴻都可行著作郎兼昭文館學士餘如故主者施行黃門朝議大夫檢校祕書丞兼昭文館學士上柱國胡皓屬文用思知名最久才清調遠寓興皆新頃掌祕文佇刊良史宜擢金閨之彥用光石渠之作可行著作郎餘如故主者施行黃門師氏之職訓於胄子儒林之選必俟賢人魏州刺史上柱國北平縣開國子楊嶠直清莊敬浩素純密服膺勤業道在其中因心執禮行成於內樹風有循良之課試劇聞精練之能往在東都攝於西序巾卷資其導誘紀綱正其頽弊惟教之立厥聲孔臧俾崇於釋菜逾勸於攻木可國子祭酒勳封如故主者施行黃門銀青光祿大夫宋王府長史上柱國襄城縣開國伯鄭諝純固仁厚溫恭雅實嘗覽墳籍克修言行玳筵承寵己參佐於王門瓊林講藝用周旋於師氏可行國子司業散官勳封如故主者施行
