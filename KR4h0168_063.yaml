  text: 全唐文欽定全唐文卷六十三憲宗八
  hash: sha256:b1c67bdff963046d8f291aa92187284ba61a1b03d50cb5a76cc69f0f78ea5393
body:
  text: 維永貞二年歲次景戌正月景寅朔皇帝臣某稽首再拜奉册言臣聞上聖元邈獨超乎希夷強名之極猶存乎言象豈足以表無為之德光不宰之功然稱謂所施册攸著涵泳道德感於精誠願奉洪徽有以自竭伏惟太上皇帝陛下道繼元功業纘皇極膺千載之休歷承九聖之耿光昭宣化源發揚大號政有敦本示儉慶有格天漏泉恩翔春風仁育羣品而功成不處褰裳去之付神器於沖人想汾陽以高蹈體堯之德與神同符其動也天其靜也地巍巍事表無得而言顧茲寡昧屬膺大寶懼忝傳歸之業莫申繼述之志夙夜兢畏惟懷永圖今天下幸安皆睿訓所被而未極徽號孰報君親是以臺臣庶官文武之列抗疏於內方伯藩守億兆之衆同辭於外請因壽歷以播鴻名臣不勝大願謹上尊號曰應乾聖壽太上皇當三朝獻壽之辰應五紀啓元之始光應徽稱允協神休斯天下之慶也維元和四年歲次己丑十月癸酉朔十三日乙酉皇帝若曰自我有國大諸侯之勳勞者必勒功圖形播於鐘鼎藏於盟府歿則極異等之禮以嘉魂魄使奮乎百代之上百代之下為臣者莫不興起也咨爾故邠寧慶等州節度支度營田觀察處置等使充京畿諸軍都統開府儀同三司檢校司空同中書門下平章事持節邠州諸軍事兼邠州刺史上柱國南平郡王食邑三千戶高崇文英姿絶羣雄略神授上通星辰之氣克扶期運之數少事塞門保寧朔漠千秋之勇常冠軍鋒吳芮之忠早書令甲頃以井絡之下盜臣流毒獸心狼顧誘脅我人遂拜於齊壇授以蕭斧束馬蓐食先命戒途曾無再籍之役不用一卒之死生致首惡戮尸天街西南晏清按堵如故禮加九命秩尊三事貴列東第壤踰徹侯動蕩夷夏輝灼編進律遷秩兼制舊疆臥鼓翳扉解甲休卒期以無征逮乎三垂暗忽生災壽量中輟維屏之嘆瞿然疢懷故命國子祭酒劉宗經副使司勳郎中李直方持節册贈爾為司徒賻禭命數率禮加等式表無原之功用申不檢之賞將我痛悼告於幽神維元和四年歲次己丑十月癸酉朔十八日庚寅皇帝若曰於戲昔禹有聖子克承父業故三王代襲以天下為家我唐受天明命垂二百年欽惟十聖虔嗣寶歷亦罔敢越丕子之責傳序相受以及豫一人獲奉圭幣事上帝承宗廟夙夜祗懼不敢荒寧永惟負荷思建儲二須假五載相時一德允屬於爾元子鄧王寧惟爾兩曜分輝五行總秀體資上哲性被至仁粵在幼沖挺然岐巍寬厚之量匪由師訓溫恭之德稟自生知爰撫藩封式崇磐石河間之泉懿決策不窮東海之開明視牘能辨陪厚宗祀贊獻郊禋展禮克誠執事惟敬勤龔子道左右朕志旋觀表識宜踐青宮訊於著龜靈命不二謀及卿士人心協同尚膺七鬯允事監撫是用命爾為皇太子往欽哉莫尊匪君爾為之臣莫親匪父爾為之子愛敬誠矣忠孝並焉爾其虛受以下賢齊肅以成德無以崇廣處己無以怠忽臨人繼明四方以貞萬國永言配命可不慎歟維元和四年歲次己丑十二月壬申朔二十七日戊戌皇帝若曰歿加榮號所以勸人示其爵列之差用彰禮命之數咨爾故彰義軍節度支度營田申光蔡等州觀察處置等使光祿大夫檢校司空同中書門下平章事使持節蔡州諸軍事兼蔡州刺史上柱國濮陽郡王吳少誠嘗賈拳勇習知戰陳服上將之號令為中書之首出及鑿門建牙授以封域稜威以行法制峻文以輯賦輿當先聖之委遇極寵祿之休顯序位列公台之盛茅土有侯王之尊謂終享遐紀策勳功令壽量斯盡軫於豫衷今遣使權知宗正卿李詞副使起居舍人裴度持節册贈爾為司徒於戲守屏之臣注意斯重昭我寵渥藏於後昆維元和七年歲次壬辰十月景戌朔十七日壬寅皇帝若曰於戲建立儲嗣崇嚴國本所以承祧守器所以繼文統業欽若前訓時惟典常越我祖宗克享天祿奄宅九有貽慶億齡肆豫一人序承丕構纂武烈祖延洪本支受無疆之休亦無疆惟恤負荷斯重祗勤若厲永懷嗣訓當副君臨咨爾遂王恆體乾降靈襲聖生德教深蘊瑟氣叶吹銅早集大成不屑幼志溫文得於天縱孝友因於自然符采昭融器業英遠爰膺錫社實寄維城懿河間之不羣慕東平之最樂自頃離明輟曜震位虛宮地德可尊人神攸屬式稽令典載煥徽章是用册爾為皇太子往欽哉有國而家有君而父義兼二極重繫萬邦何好非賢何惡非佞何行非道何敬非刑居上勿驕從諫勿咈懋茲乃德惟懷永圖用陪二朕躬以對揚休命可不慎歟維元和十五年歲次庚子閏正月甲辰朔越三日景午皇帝若曰於戲上天降鑒保乂于我國家十聖丕承光宅四海鴻休大業以逮豫一人嚴恭祗畏懼弗克荷賴宗社垂慶生靈乂安今朕寢疾彌留弗興弗寤神器所付屬之元良咨爾皇太子恆孝友聰明溫文睿哲自主七鬯日新厥德必能纘序朕志綏靖萬邦是用命爾陟於元后宜令中書侍郎平章事令狐楚奉册即皇帝位懋建皇極無忝我祖宗之休烈朕聞明王之以孝理也必先之以博愛臨之以莊敬由一人之至德鼓四表之歡心臻於太和以育庶類則下知禁而無犯上措刑而勿用斯道不遠宏之在豫朕以寡昧嗣守丕業荷纍聖之鴻休稟太上之嚴訓夙夜寅畏不敢荒寧承顏而退省萬幾問寢而下臨四海虔奉惟眷施於兆人皇王以來孰有斯慶端本之化自豫躬行總百行之源刑四方之理推恩以覆育廣敬以昭事王者要道朕其庶乎則日月之燭臨可以率俾昆蚑之涵養期於不夭是必家至日見而後化洽刑清圖始所難慎終斯勉猶恐下愚之人因循陷辟官師之長教道未明迫於飢寒遂愆禮節詿誤之網顧失政而多途哀矜之人雖得情而勿喜思與公卿大夫下及士庶人勵翼循省以圖將來其因體元之始覃此惟新之澤上報於君父下念於蒼生頒慶紀年鴻恩斯洽可大赦天下改永貞二年為元和元年自元和元年正月二日昧爽巳前大辟罪巳下常赦所不原者咸赦除之京畿諸縣今年十二月青苗錢及榷酒錢並宜放免地稅率於每年斗量放二外江淮荊襄等十州管內水旱所損四十七州減放米六十萬石秋稅錢六十萬貫內外文武見任在官神策六軍諸道將士等各賜爵加勳有差自武德巳來功臣子孫與官及出身文武常參官觀察節度團練經略使刺史六軍大將等父母亡歿與贈官至德以來任宰輔與追贈及諡陝州奉天元從功臣普恩之外更賜勳爵中書門下及外使宰相宜與一子七品官東都留守六軍大將等與一子出身東宮官並與改官其撰册文官等與一子官及勳爵有差天下百姓高年者賜米帛羊酒國子監祭酒司業及學官並先取朝廷有德望學識者充東都國子監諸館共置學生百員應天下州府每年所稅地丁數內宜十分取二均充常平倉仍各逐當處穩便收貯以時價糶糴務在救人朕聞王者大業孝莫盛於配天國之大事禮莫尊乎享帝故二儀合祭知上天所子之仁萬國駿奔觀聖人嚴父之道教之所設禮極於斯我國家祖武宗文繼天撫運聲名所被車書必同承祧而御極業光十聖體元而紀號年將二百朕以微眇纘奉昌圖畏此洪業若臨深谷而大事所屬仙寢維營凶德相挻兩隅皆阻淮湖奧壤水旱愆期惄然疚懷懼不克濟既而上天降祐烈祖垂休妖氛盡殄逆節咸伏精祲有以相蕩善惡有以相資五兵才試而復藏四氣應序而咸理物皆滋茂歲亦豐登百姓之心歡然相與是用齋精三日款謁上元明發不寐祗見烈祖周旋在位陟降是依克配之禮既展如在之誠增慕嘉此福祐與物惟新式敷雍若之化俾洽霈然之澤可大赦天下罪無輕重常赦不原者咸赦除之左降官與量移及復資仍聽纍敘流移配隸並放還天下應有逋欠在百姓腹內者及京畿今年夏青苗錢並放免官酤酒及雜榷率並同禁斷淮南江南去年巳來水旱疾疫其稅租節級蠲放天下兩稅貞元四年制書巳令三年一定委有司舉舊敕商量處置諸道年終勾當宜停刺史録事參軍並不得擅離州其事類巳後制敕速令有司刪定江淮大縣每歲據闕委三省御史臺諸司長官節度觀察使各舉堪任縣令不限選數並許赴集臺省官及刺史赤令有闕先於縣令中揀擇如有能否與元舉人同賞罰復置具員簿以序內外庶官禁郵驛假託乘勢京兆府諸司色役人各令條流省天下官吏應行鞭捶責情致死切令察訪王府六品巳下官及諸州縣有獄并省處分諸官諸使有要停減者委有司商量廢省天下百姓不得冒為僧尼道士以避徭役其創造寺觀廣興土木者舉敕處分內外文武見任及致仕官諸軍將士等以品秩節級賜勳爵文宣王及二王三恪公主諸王與一子官仍賜物有差宗子中有才用者委中書門下量才敘用故尚父子儀太師晟太尉秀實顏真卿顏杲卿張巡許遠南霽雲及配享功臣與一子官及出身有差至德巳來功臣未配享者速令詳定文武常參官及諸道節度觀察使等并諸軍使並與父母封及追贈并一子官及出身有差諸軍立仗及在本營節級賜物應緣大禮職事官並賜階爵天下諸色人中有賢良方正能直言極諫慱通墳典達於教化軍謀宏遠堪任將帥詳明政術可以理人委內外官各舉所知當親策試天下百姓高年者賜米帛羊酒物及版授官封名山大川及古聖常明王忠臣烈士各令以禮致祭門下朕丕承寶圖撫有方夏夙夜寅畏不敢荒寧永惟祖宗之鴻業歷考前王之令典思所以垂統立極事神保人推明至公安固大本尊廟祧而主七鬯嚴社稷而奉粢盛俾開春闈乃命元子斯古今之通誼也皇太子寧清明體仁莊敬好禮服典謨之誼一君親之誠允諧詢謀用建儲二爰以吉日册於明廷鼓鐘載和文物大備盛禮云畢慶感良深是宜布澤申恩自中達外厥有前躅舉而行之自元和四年十月十八日昧爽以前天下應犯死罪非殺人者降從流流罪巳下遞減一等左降官未經量移者即與量移文武常參及諸州府長官子為父後者賜勳兩轉應緣册禮行事官賜階及勳爵有差鄧王府官量與進改夫輔翼元良教諭成德使目睹正事耳聞正言形於施為漸於心術非齋莊忠慤之士不在茲選工部侍郎歸登給事中呂元膺並踐履端方行義修潔通於經訓而得其要達於教化而蹈其中侍講承華師範磐石訪乃公議副豫精求並可充皇太子諸王侍讀登宜加一階元膺宜賜紫金魚袋天下孝子順孫先旌表門閭者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭祀朕聞王者法天作則與衆守邦奉天無私居兆人上當恭己嚮方之際切臨深馭朽之懷憂勤靡遑今古何遠所重者兵革不試軌度自貞熙仁扇和以至大道朕顧惟菲德祗奉睿圖承昊天之眷命纘列聖之丕緒昃食以求至理虛心而俟昌言兢兢業業常懼失墜逮今十有四年矣道且希於廣運意常在於包荒推誠則深感物未至頃歲蜀川浙右怙亂阻兵人神共誅翦滅相次姑務偃革期於措刑方簫勺以懲姦庶干羽以成化而淮蔡寇孽稔禍挻災問罪興師蓋非獲己每念征行之暴露軫餽給之煩勞中宵惕然載益祗勵妖凶既殄黎庶用康斯皆宗社垂休中外協力將勤恤於下土冀昭答於上元茲朕所以思與羣公卿士勵精於庶政也屬獻歲發春授時惟敬勾萌盡達幽蟄咸蘇徽纆可矜鰥恤存念俾踈網之是決與慶澤之惟新可大赦天下元和十三年正月十日昧爽巳前大辟罪巳下咸赦除之惟官典犯贓不在此限左降官及流人移隸等並與量移近處別敕因責降授正員官所司亦與處分其淮西管內縱有迹同惡逆挂涉流言事在往時一切不問如聞申光蔡殷四州百姓干戈之後餓殍為病宜委所在長吏設法綏理先入擒吳元濟立功將士委韓宏條疏宜速具功勞等第聞奏待有甄獎處分天下諸州府百姓兩稅之外輒不得更有差率巳頻申敕尚恐因循宜委御史加糾察其諸道州府縣用兵巳來或慮有權置職名及擅加科配事非永制者一切禁斷淮西側近應緣資給軍用榷稅經奏請者各委條疏停省王承宗若束身赴闕捨而不問仍加官爵其度支元和二年巳前諸道借假及懸欠錢物斛斗雜物當四百八十餘萬貫石端匹枚具斤兩等並放鹽鐵戶部諸監院應有欠負亦疏理減放二王三恪及文宣公各賜物五十匹神策六軍威遠金吾及皇城等緣御樓立仗將士等及在城蕃客各賜物有差故尚父子儀贈太師晟贈太尉秀實杲卿真卿張巡許遠南霽雲與一子官出身有差中書門下及文武常參官諸道節度觀察神策諸軍等使祖父母節級與贈封官存者量與致仕及邑號天下百姓高年賜米帛羊酒有差門下朕聞惟人戴后因事必極於推尊惟辟奉天有善必歸於讓德式敷景化以答元功居有勞謙之思進多滿假之懼緬自邃古何嘗不由是而致理焉朕獲纘睿圖祗膺神器上奉大祭下安羣生恭己臨軒兢懷馭朽志欲周於四海念常切於一夫旰食宵興唯恐失墜運屬休泰時丁小康方隅廓清氛祲銷蕩斯乃上荷乾坤之垂祐宗社之降靈下賴卿士之叶心戎臣之宣力端拱嚮道推誠任能豈豫寡昧用集丕績況至化猶鬱勤憂未寧而中外臣僚文武多士纍陳懇疏並進昌言願獻鴻名以增虛美拒衆心而率籲轉切顧眇身而內愧靡安乃撰吉辰爰受典册禋告於清廟虔聞於昊天當茲盛儀夕惕增厲於戲朕自御極再加景號在徽章而孔備諒浮實而多慙宜因行慶之辰誕布惟新之澤與物咸遂永孚於休可大赦天下自元和十四年七月十三日昧爽巳前大辟罪巳下巳發覺未發覺巳結正未結正繫囚見徒罪無輕重咸赦除之唯故殺人及官典犯贓不在此限左降官量移近處巳經量移者更與量移如復資者即任赴選集丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州申請如準前制巳合量移有司未注擬者並任纍敘并別敕因責授降資正員官所司亦與處分亡官失爵放歸不齒者量加收敘流人移隸等並與量移近處僧尼道士移隸者得罪人巳亡歿家口未放歸者一切放歸如有情願住者亦聽住左降官及流人先有官者如有巳亡歿各還本土應反逆緣坐配流在遠處身巳亡歿者如有親戚任便歸葬棄瑕宥過既咸達於幽明録善舉才庶無遺於廢滯或中外前資見任官如有因瑕纍未經録用并左降官事情可恕才行足稱者宜委中書門下量加拔隨能録用妖凶久阻汙脅所加今既蕩清宜從洗滌其淄青舊管內官吏將士百姓等縱有迹同惡逆挂涉流言事在往時一切不問維新之後仍不得遞相糾告革其弊俗阜彼遺人切在分憂期於共理鄆曹濮淄青沂海等三道百姓久淪寇境皆被傷殘宜委本道觀察使刺史設法綏撫務令安輯勳籍所著常典必行常恐踰時無忘終食應平淄青諸道立功將士宜委本道速準前敕條疏聞奏當與甄獎自經討伐鋒刃所交言念傷殘每深憫惻其淄青舊管四面官軍陳亡將等巳有前敕處分收葬量事致祭其是賊徒遺骸委在中野者亦委所在州縣速與掩瘞輦轂之下萬邦所瞻封畿之內百役斯集永言凋瘵是用蠲除其京畿諸縣今年秋稅戶青苗及秋冬季榷酒錢每貫量放四百文從元和五年巳前諸縣百姓欠負錢物草斛斗等共一十三萬五千一百一十三貫石速委京兆府疏理具可放數聞奏天寶巳後戎事方殷兩河宿兵戶賦不入軍國費用取資江淮繭絲所收寧免加厚物力有限水旱相因歲月既深凋瘵亦甚眷言及此憫歎良多今上天垂休氛沴清息師旅之後又茲豐穰省事恤人庶乎惠養其淮南浙江東西宣歙江南湖南福建山南山東荊南等九道今年秋稅錢合上供者每貫量放三百文度支其今年秋稅留州留使錢并鄂嶽共十道每貫量放一百文度支元和五年巳前諸道州府監院送省除前制放免外諸色欠負逋縣錢物等共四百二十八萬八千八百貫石等監院鹽鐵使從貞元五年巳後至元和五年巳前制疏理量放外應負諸色錢物斛斗共三百三十二萬二千一百五十一貫石等戶部從建中三年巳後至元和九年巳前除前制踈理外諸色欠負錢物共計五十三萬九千四百六十四貫石等並委本司踈理具徵可放數聞奏御史臺及祕書省等三十二司公廨及諸色本利錢其主保逃亡者并正舉納利十倍巳上攤徵保人納利五倍巳上及展轉攤保者本利並宜放免其正舉未至十倍亦委御史條疏聞奏京城內私債本因富饒之家乘人急切終令貧乏之輩陷死逃亡主保既無資産亦竭徒擾公府無益私家應在城內有私債經十年巳上本主及原保人死亡又無資産可徵理者並宜放免比來州縣多不定戶貧富變易遂成不均前後制敕頻有處分如聞長吏不盡遵行宜委觀察使與刺史縣令商量三年一定必使均平其京兆府亦宜準此河隴迥遠風沙早零動切煙塵之虞居勞晝夜之警方加拊勉寤寐在懷緣邊諸軍自今巳後所給衣賜及軍糧價直宜委度支稍加優恤展材效用既竭忠勞行慶覃恩所宜優給內外文武見任及致仕官三品巳上賜爵一級四品巳下加一階仍賜勳兩轉神策六軍金吾威遠皇城諸道將士等普恩之外賜勳三轉諸道將士經淮西淄青兩度立功者更賜勳兩轉詩歌有客王道攸存禮著先師儒風載闡永懷後嗣寧忘加恩二王三恪及文宣公賜物五十匹仁親為寶睦族是先霈澤所存用頒慶賜大長公主長公主嗣王各有賜物宸居所拱禁衛斯嚴寄切爪牙效彰忠勇恩榮素厚寵錫宜周神策六軍金吾威遠皇城等諸軍將軍巳下各有賜物其將士等長行立仗者并守本營者每人各賜有差四夷來庭萬里觀禮柔遠之義恩不可遺鴻臚禮賓院應在城內蕃客並節級賜物昭受册典永垂鴻休皆為皇臣克贊盛禮崇階高爵任子延恩式永寵章以明酬獎讀册官侍中韓宏讀寶官戶部侍郎平章事皇甫鎛並加一階巳至三品者賜爵二級撰册文官中書侍郎平章事崔羣與一子正員官奉册寶綬書玉册書寶官加兩階進寶綬進册禮儀贊導押寶綬舉舁寶册官加一階其餘應職掌行事官寫制書官太常修撰儀注禮官并內侍省行事官三品巳上賜爵一級四品巳上各加一階仍賜勳兩轉鐫造玉册并填金字造寶官等各賜物五十段每懷先正尚想舊勳將以勸忠故茲進録故尚父子儀贈太師晟贈太尉秀實各與子孫中一人八品官張巡許遠南霽雲顏杲卿真卿各與子孫中一人出身陝州元從奉天定難功臣三品巳上普恩之外賜爵一級四品巳上更賜勳三轉身歿未經追贈者宜與追贈太學崇儒教化根本兩都國子監館宇如有隳壞處宜令本司計料聞奏當與修葺官屬師氏委中書門下及所司精慎選擇用賢納諫常所虛心計科求人抑有古典天下諸色人中有賢良方正能直言極諫博通墳典達於教化軍謀宏遠堪任將帥詳明政術可以理人者委中書門下尚書御史臺及諸司四品以下清望官五品以上清望官諸道觀察使刺史各舉所知仍限來年正月內到上都朕當親自策試宗子中如有才行可稱者委宗正寺及所在長吏具以名聞仍委中書門下量才敘用國典舊章墜廢滋久者各委本司條疏奏請當議施行元和元年巳來制報處分有未遵行者委御史臺提舉聞奏大明黜陟著在格言所以考官吏之濁清究黎人之利病敷我化理屬於使臣宜委中書門下選黜陟使分巡天下恤其耉老必及於州閭表其行義用敦乎風俗天下百姓年百歲以上各賜米五石絹二匹純綿一屯羊酒有差九十以上各賜米三石絹兩匹仍令本縣令就家存問孝子順孫義夫節婦旌表門閭終身勿事先巳旌表者量加優恤祀典所載朝章是崇或美利在人或遺風可慕必資申敬乃副豫誠五嶽四瀆宜委本州府長吏備禮致祭名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器者百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使知聞噫夫物我既殊嗜欲方熾六限陷因緣之境七情奔利害之場蓋纏其真執縛於妄愛惡攻內紛華蕩前心類騰猿身若狂象豈復悟菩提之性息塵埃以自明了真如之理本空寂而為樂不有妙覺其孰拯斯溺乎由是至人開法大士傳教濟羣迷於彼岸澌諸妄於此門不滅不生視色空而俱泯無來無去觀性相以皆如然則泯色空者非言無以極其致如性相者非文無以會其歸設此筌蹄納諸逵路此蓋西方神人之大教也大乘本生心地觀經者釋迦如來於耆闍崛山與文殊師利彌勒等諸大菩薩之所説也其梵夾我烈祖高宗之代師子國之所獻也寶之歷年祕於中禁朕嗣守丕業虔奉昌圖聽政之暇澡心於此以為攝念之旨有輔於時潛道之功或裨於理且大雄以慈悲致化而朕生而不傷法王以清淨為宗而朕安而不擾敷教於下用符方便之門勵精以思是叶修行之地無為之益不其至乎夫如是得不演暢真宗闡宏奧義者也乃出其梵本於醴泉寺詔京師義學大德罽賓三藏般若等八人翻譯其旨命諫議大夫孟等四人潤色其文列為八卷勒成一部如來祕藏歷塵劫而初開大乘真理超沙界而方證燭其昏昧示以津梁俾披閲之者甘露灑於心田曉悟之者醍醐流於性境嗟嘆不足披玩豈忘亦既書寫聊為序引雖離諸文字詎假發揮而啓其宗源式存年代時我唐御天下一百九十有四年也
