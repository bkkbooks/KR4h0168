  - {type: head, offset: 4694, content: 員外郎陳景居官清謹上親以宸(一作神)筆題劒賜之有龍泉字景揆無功不敢當受遂表奉讓御史彈故違勅不伏, id: KR4h0168_NFKB_957-h29, level: 2}
