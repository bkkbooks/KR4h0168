body:
  text: 佩玉之設所以導容止節威儀惟山元之在御配組織之標奇山以表名蓋取山崇之德元而載色且昭元默之宜合殊姿於雅稱俾服玩以無虧懿其韞櫝稱珍連城表質爰制衝牙之用以戒趨馳之失匪取乎截肪自資乎純漆響既清越理惟縝密色溫合乎緇衣韻鏘鳴乎玉律動之在聽隨矩步而聲繁佩之在躬寧風趨而影疾㣥寮奉贄庶官陪位貴賤畢陳高卑咸萃我則發清響標奇器飭彼雅容遵乎深意配元侯而禮盛奉上公而儀備豈比瑌珉彰庶士之殊水蒼表大夫之異况乃黝衡比色緇組侔文體元端而位辨表黼衮而功分或倚或垂昭君臣之異載揚載揖殊進退之聞宜發明乎盛德永光錫乎洪勳其質貞清其光錯落官推玉府之典制自玉人之作是用比德賢臣表功王爵始自韞石未彰含暉尚晦隱元山以參差冠元雲而霮䨴哲匠莫顧俊賢未佩徒棄置於層巒豈琢磨於明代及乎偶拂拭遇磨礱服之容美執之禮崇自可寶同乎金錫豈惟價重於王公則知其律聿修在禮斯柔非夫賜象服錫鳴璆何以膺山元之瑞於諸侯者哉國家業藉承平道惟禮樂既克諧之是作豈鐘鼓之云乎調白雪之琴薰風巳被蓄應霜之氣職務司存必俟洪鐘之功更叶陶鈞之力而和戎魏絳須賜歌鐘救衛于奚理存名器豈得時須有失歲計不充懼金玉之科條託鉛錫之闕乏何不豫呈功課早計有無遠乎鑄銅之山近取罰鍰之坐置棘之典今也何逃握蘭之見斯焉謂得大聖崇業萬象潛通據河洛之要創造化之功建以黃壤亘以紫宮右輔伊闕左連轘嵩銀臺比而可擬瀛壺方而詎同掩扶桑於日域包蓬萊於海濛式均霜露之氣以分天地之中於是仰元穹之文俯黃壤之理下壓坤德上羅乾緯垂形象物既不假於銀衡司刻探元何必邀於銅史其細也難究其妙也若此斯豈光陰而若易徙且夫聖不可測道實兼致天地與能幽靈必契囊括衆巧網羅㣥藝自然而來疇能比計今來古往時移道替滋歲月以成朽覺風塵之漸異人有代兮俗疑沒地有形兮無制零落空階莓苔古砌頽墉邐迤但覺蕭條高阜荒涼寒城蕪翳攀聖迹而難企感吾徒而流涕猗歟成周系聖纂極君少臣輔流言更逼自陝卜洛其儀不忒公敷其化人盡其力惠而不費功成事息欽聖德之微奧豈賦者之能識天得一以清地得一以寧日月得一以明聖人法之以化成無私之謂莫之與京三者不忒天下和平天之道也存乎至輕潛運而三光是麗不言而四時是行夏以長春以生亭毒之德以無私覆為名地之義也為利至廣大流百川細包草莽因金風而物成熟遇木德乃氣騰上且無私載坤德存乎易象月之來日之往無幽不燭有形斯仰其照無私實至明而稱朗若天地不能存之以信則生成之理息日月不能存之以明則終古之道爽苟不失歷羲和得其所掌我天子今九有是御用無私以成心每宵衣以達曙奉此三道守而勿去大象是執選賢為急昭昭為大與天地而相參明明鑒下齊日月而出入天光發乎幽滯仁聲振於潛蟄儔陽之德因時行而有階起豫者商想茲道而無級苟志斯道立之斯立當軸者斯焉取斯何憂乎地芥之難拾謝惠連遒文擅名藻思騰聲覩階墀之積雪因體物以興情曰是雪也感沍寒之德陶元化之精元冬御時固淒其而以降青春換律奚浩然以居貞豈不以其氣徑其質清處慘無昧遇蒙而成若就陽呈妍巳遇乎東風所解且居陰寓質望晞夫朝日之明乃春宵尚寒銀漢未沒質瑩庭廡光搖林樾雜凝花於春露亂素影於夜月小山虛映瑤峯盈尺而潛生樛枝乍垂梅花照樹而將發詎比夫瓊蕊難求夜光可照且昧不貪之寶未得卷舒之妙或消或結吾將任其行藏是玩是瞻彼何為乎衒耀當其朔風駛同雲劇既散亂以飛空或繽紛而下隙於是出野而萬頃連縞晞山而千峯合璧既見晛以俱消將飄零而委積隨時之義雖守潔而在今潤物之功固呈豐而自昔既而陽氣長陰氣滅將散有以歸無尚葆光而固節已矣哉人道不能無否泰天道豈可無寒熱固可洞消息以從之何必託興於殘雪我天子德廣虞夏業傳高曾展義之心攸克觀風之禮必登故臺之用也斯建臺之名也是宏然後度材比德奢而不盈興功俾役儉而不陋萬物是集百工是湊從繩罔愆運斤以鬬欻以山立揭焉雲構豈不謂鴻休叶贊元德時雍錯綜之典不革經始之道克從闢以九戶聳以千重接祥光於溫液見張平子東京賦納瑞氣於驪峯觀乎大厦耽耽飛簷穆穆殊形詭制㣥品異族或霞駮而電開或龍蟠而獸伏浩飾彰盛洞文潛蓄既藻井以垂珠亦丹墀而布玉晴天返照垂螮蝀於雕梁霽色澄明挂蟾光於重屋混合元麗巍峩特起入窈窱兮不知所之視瓖璚兮不知所以及夫西成罷務北陸將寒霜封原隰雲蔽峯巒金輿斯御綵仗初攢寧侈心以攸往必風俗之所觀設教陳詩事必彰於禮備承天統物政本在於人安至如庭宴薰薰衣冠察察其樂將萬其儀用八奏金石兮匪疾匪徐命鼓琴兮載擊載戛既而若登仙境若奪神功度宏規兮其外變多態乎其中傍眺六合遠視八風吐元和而納純懿詠仁洽而歌道豐則魏之所造漢之所崇伊制作而靡及豈古今而遽同客有觀乎順動審彼始終因厥誠兮垂慶宜永永兮無窮楚之人兮有舟利於涉者節以楫師而競馳因汩羅拯溺之事為江漢載浮之嬉以娛黎蒸以穆風俗故歲習而無虧爾其月維仲夏節次端午則大魁分曹決勝河滸飾畫舸以爭麗建綵標而競取聿來肇自於北津所屆期於南浦選孟賁烏獲以用壯酹川后天吳以潛輔重輕莫異於錙銖先後不差於步武外希得雋之稱內約疇庸之伍降簪裾以列筵擁士庶兮如堵於是鷁首齊向飄然羽輕引長緪以觀整羅小艇以持平遠岸天闊乘流鏡清援枹者氣作於一鼓理棹者伎懩於先鳴聆大呼之始發若縱柂而迅征直衝諒駛於狂兕忽往未殊於駭鯨日正晝而懼眩浪無風兮欻生鳴鼙吹竽上聒天衢如伏波整旅合水獸於江湖建旗列卒俯映泉室若五利將軍訪仙師於溟渤攝靈奇以潛駭恆遊泳而下逸㣥聲合譟㣥手齊力慮勍敵之我先莫遑舍於瞬息乘輕若在於風馭處疾互飛於首飭舳艫惟正審流鏑之向齊楫棹翻然亂驚鳧之揮翼投徑竹以交擁各庶幾於獨剋向背適中勝負攸分一喻馬之旋濘一如龍之曳雲始差池以接影忽敻絶而殊㣥曾不移晷倏然戾止去孤標於部黨爭距躍而赴水有麾竿以贊獲或振綵以揚美中程者雖多欲於上人後時者猶未甘於勝巳懲既往之敗績佇將來以雪恥由是勵能激憤赴漲而回其逐進也速飛電之經目其引退也緩孤鷮之應媒彼狃淺以生怠此方殷而有猜仰興慕於三節爰息徒而復來論始作之功雖掉鞅而偏擅稽未事之效乃發梁兮備該然後弭舟楫宴沙場叶同黨之誠願錫上官之寵光徵固疑敵之財以頒賞合如澠之酒以飛觴勉居後人以成績翻有初於不藏水府淡以澄靜人㣥欣而樂康夫吞刀倚巧而幻人之伎角抵稱妙而狡童之戲豈比夫仙舟以濟川之器競渡有救災之義非百夫之衆無以較其捷非九江之廣無以蕆其事總夷夏之具搜為壯觀之能類滅蔡用隱無宇興言伐莒獻俘周公不享馬先猶不用馬人社寧容祭人惟彼宋君志多剛很惡有大而必陷善無細而必違遂取鄫生以血祭社愚管窺此其傷實多或人所告深符至道殺人者死傷人者刑先達所制後進攸則一作行宜投正法庶革來犯坤珍之潛思察妙有之嘉生伊靈邱之産王得天地之純精超衆寶而惟美比君子而居貞舍溫潤之麗色抱清越之奇聲神光照廡高價連城瑜滅有私而不掩圭美無心而自明爾乃太元分儀洪纖是質瓊瑤琬炎之殊號結緑懸黎之衆述五色相宣千名競出振鶴羽以益鮮聳雞冠而增煥匪蒸栗之足侔何純漆之能亂乃堅以守正妙以通微洪爐不能易其色厚地不能瘞其輝乍騰虹於白氣或見女以青衣山林孕之而含鬱川瀆育之而漣漪昭靈神之景命啓聖哲之昌期無終設漿而獲偶渭浦投釣而匡時復有逍遙人俗髣佛仙府泛醴流膏崇臺結宇飛華崑閬之岫結影蓬瀛之浦使人主齋戒班倕歎揚磨礱規矩華皖文章琢之為圭下辨君臣之節合之為璧上連日月之光既展禮於天地亦分榮於殿堂垂纓珮兮濟濟登鑾輅兮鏘鏘入管絃而流韻備樽俎而含芳然而運有屈伸時兼否泰當其潛影幽阻抱璞荒外碔砆紛糅砂礫無汰空泥而不緇何風雲之難會嗟夫雖天下之至寶必俟鑑而後知苟非人而妄進則按劍以興疑故卞和為之瀝泣鄒陽為之銜悲夫物不可以衒賣將韞櫝而藏之精瑞氤氳兮生獬豸之炳靈志耿介而不㣥世情偽而尤雜動微明而鏡分詩美乎思無邪道貴乎解其紛得道之實為身之文豈徒神明其形將以幽贊人君涇也濁渭蕕兮在薰辨之以履霜堅冰無俾乎水深雪氛則致明如日月靈應如風雲所不至者固亦有聞夫道無為神無方聖人之政有以相合靈物之質不必咸章名用而行迹舍而藏與麟趾同符騶虞齊光肇允丕應時唯我皇咨爾輔弼咸懷忠良感觸邪之義成無妄之綱五福儲峙四靈倣徨爾有足兮不行而至爾有角兮其用也剛人是知勸實丁厥祥孰與鳳鳥去飛龍圖未揚惜暌闊於明代竟流連於素王物亦生蠱邪行紊德雖明足辨類凶族起於唐虞智足周身讒巧傾於孔墨水火不可以同器邪正不可以同國懿茲神獸間執讒慝分兩造之疑冠百祥之特勇毅而能斷智明而不惑守法者仰之以司南疾惡者投之於有北固操斧而思用因伐柯而取則龍闕分官烏臺肅政扶直指之角象繩愆之性聯繡衣以生風借白簡而增徑物莫不肅時靡有競所謂君子道長邦家德政苟違中人斯同妄行豈王臣匪躬之德叶哲后授賢之命眷彼法冠恐其規鏡則戴鶡聚鷸足為服之盛何必儀形神物示人以敬庶乎在位者竭能而輔政於廓靈沼其流湯湯控清源於近甸澄積溜於方塘頃者天子時欲出池苑贍農桑納獻可之規諫設成務之紀綱乃斬柳破隄防將欲抑耳目之遊觀資稼穡於乂康一物失所若巳納隍竭其澤則龜魚無咸若之地害於物則邦家無好生之方豈以成功者不可以適變識道者克在乎順常乃天意怡豫人謀允臧不遠而復載濬其隍亦既具畚鍤亦既瀦沼沚將挹彼而注茲乃引流而激水總括趣絶見鯨波之大來委輸成深覺鳧舟之漸起且池之盈矣亦云自頻修軌躅雖聞於仍舊開汲引終期乎取新鱗介將枯而復躍草木咸滋而更春皇矣我后有如其仁懿乎哉仰對一水旁連九陌流惡有類於汾澮納汙頗同於川澤煙收霧斂混天色而波清秋霽霜晴浮月華而影白載育菱芡㣥浮羽翮將飛有翼時棲太乙之雲欲濟無梁幾滯璧池之客且流謙者聞於善下惡盈者誡於自滿儻從事於水鑒庶可形乎長短問羲農之時市井爰立夏殷以往泉貨無聞太公立九府之法夷吾通萬鍾之藏輕重良由於出令斂散實在於得時自此以還資幣數改景王寶貨單穆立母子之譏文帝四銖賈生深博換之歎既而白金易賤赤仄難行小則米石至萬大則一當五百禁鑄彌重姦錢益多雖復棄市相尋黥罪日報苟非其術為害更深且示以厚利隨以重辟是誘良民陷之坑阱朕屬此流弊情甚傷之故罷均輸之官省鹽鐵之利復欲收銅於斷鑄勸百姓於農桑奪商賈之權塞兼并之路而象稱交易書載懋遷歷代相承行之巳久一日變改公私非便且軍國所須虛一作糜費猶廣尺寸為用分裂亦難益國寧民應有長策明言爾志以沃朕心對臣聞楚王明月之珠寒而不可服魏王照室之寶飢而不可餌然則養㣥黎之氣命為萬姓之衣被苟異農桑義難豐渥雖繼天象日之際猶為血飲但立地甄海而還誰不粟食質文空變高深自徙親藉躬桑殊途共致故得時名有道世號無為英聲鼓而未窮茂實飛而詎巳方驗稱為寶者不勞氣白如虹謂之天者不假圓而似蓋且鑄金為貝信有從來漢改四銖秦行半兩用捨更互廢輕就重之宜損益不常地馬天龍之異復有豫章銅嶽蜀道銅山全歸佞幸之爐蝢入諸侯之冶所以公私大半偽實相蒙姦佞用此而兼并豪戚因茲而聚斂洛京三廠墨之內賈客雲屯齊宮七市之間商人霧塞乃令東漢楚子高閣浮空西蜀彭家連樓跨術雷車電騎多出工巧之家列鼎撞鐘無非貨殖之里賓徒藿肉鮑書不足論僮僕藜餘張詩莫能序三田為之廢業五稼由此多荒伏惟陛下依乾度立坤功道則光格四天德乃牢籠九地五羊銜粟時和之義先表雙雀飛鳴歲稔之徵巳見尚留情天下之命置懷天下之本欲絶彼工商斷茲鹽鐵乃還淳之要術非進取之權道何者今東南雖款西北未平戎馬可馳兵車驟轉假復銅頭鐵額本無敵於黃軒繕甲行師固有勞於蒼帝誠宜立彼田畯闢茲泉府既篤墾草之功還修上林之務耕疆抗陸織室開扉採彼三條藉茲千畝時行范子擒吳之祕計兼宏管相霸齊之遠略隴西馬援監舊鑄之司淮陽汲黯塞姦爐之巧乃復罄杜冶之便宜疏鄭陂之浩渺羽林創其始中郎嗣其末王基進業勞就沮漳鄧艾申權功成陳蔡邱陵滅矣禾粟之饒未虧洛水竭焉資貯之蓄寧滅於是修天陳縱天兵既飲馬於南池遂徵鶼於西海然後收銅勿用沉璧而歸崇女士女於耕桑禁綺繡於商賈則堯心舜行併可陵勝火職雲司翻能度越者矣謹對國之彞倫資於版籍儻或廢闕是長姦回頃者寰海微波編戶失業枌榆暫別蓬籜無歸聖朝提象握符再造區夏矜百姓之流蕩廢三年之典故且量地出稅據丁授田法在畫一事宜經久永言州府恤此疲人曾無革弊之規徒徇隨時之義昔漢朝倉卒猶或先收今盛代升平寧容後造租賦所繫不可憑虛豪右主藏須從托實欲施小惠亂我大猷人有憚於暫勞國遂忘於固本州司所見頗昧通途爰扣兩端敢申獨見陳景門接聚星望高披霧香含紫帳舄下丹墀待漏南軒依玉壺而轉潔書章北闕映金波以自清趨簡要之司握蘭任重出神仙之路題柱恩深電影分龍星芒自轉霜毫寫鳳神筆俄飛事頗叶於韓稜寵方同於漢主慙無功最固有謙辭奏草輸忠初聞賜劒吹毛入罪忽見彈珠然而鴻澤旁流將崇懋賞烏臺典法欲置深文郎官未越常規御史到疑同違敕既無負犯並宜告記張勤家承七葉政舉六條經一作謠日無戲方馴白鹿牽星可暴欲好青牛鄭傑滎水通門襄城編戶既仰留棠之德旋聞化梓之求言惜清廉少從拒抗雖林中鳳集已見秦彭而天上鶴來忽徵王距銅符此閟玉樹斯存始叶朱暉慮玷解刀一作鈎之化終齊季札即追懸劒之誠昔孔氏脫驂猶見疑於弟子今張勤受犢何廢惑於鄉人論情不是監臨撫事適當投贈輒為糾告深懵古今不犯刑書理宜絶筆懿文聚學以期致遠難進易退必在從誠且朝錯多才亦先於掌故東方答客豈望於侍郎苟有求於敘進亦何問於卒史受祿不誣致貴有漸陟遐由邇楊園必倚於畝邱在著從微增冰有成於積水方進寧辭於計食陶潛不恥於折腰矧茲百石之比乃是上農之秩誦多為美誠有司之合甄先求見黜宜功令之致訟罪自已招誰可怨咎禮因樂聲既沿且襲須有專達司於太常是知六律六呂之差三成四成之奏所以感和天地降格神祇煩手淫聲必有所禁輯人安代奚乃之違則韶濩其名匪一夔而可辨笙鏞以間何細器之能諧輒遊厥詞過亦奚逭精氣為物物必有依遊魂為變變亦有歸蜩者精氣所聚甲者遊魂以飛功存造化理暗幽微察形如在責實而非觀乎離隱出穴先號後喜或附枯枝或映深水揮幽跧伏臨危聳跱致身勞苦不獨附贅懸疣動足艱難何殊駢拇枝指上懼於雀下憂於蟻情有感於仁人事不可乎以巳效神仙尸解之術得龍蛇變化之理雖欲全生且同半死既坼既副如動如止一體區分雙形酷似高冠而立睅目而視莫躁其心能靜諸巳飲露則躍翻風忽起再生之命蠢焉不存之皮朽矣覩遺迹於棄甲想能鳴之在耳空披腹心徒伏泥滓其內也既等混沌之無竅其外也何患螳螂之利觜與繪事而均功齊木偶之所擬昔則如羹如沸孰能聽之今則不飲不食何憂餒而數往有分塗窮有時雖滅天理尚存幽姿已脫輕翼猶帶懸緌有象受服者解褐衣而去又同適越者棄章甫於茲既逍遙以脫屣非蠆芥以僵尸其靈託焉蘧廬可以設喻其質去矣魍魎曷足措詞文非變虎殼等枯龜莫懷爾詐仍謂我欺心通者不惑性殊者猶疑君徒見僵仆塊然而無用曾不如脫身輕舉而莫追工有習藝求名志在不朽乃言曰藝未達不可求以諸色器未精徒勞措以其手安得輕進自貽伊醜於是摩厲為先動用為後誠旨趣之可尚實果決之不苟所謂作事謀始本立道生繩墨盡索斤斧畢呈慮妍媸之稍違而或愆規矩審鋒鋩以求鋭而必取專精勤勤不怠矻矻有營欲盡心於鎪鏤用度木於林衡亦如舟楫良然可思其濟涉耒耜利始得議其耦耕於其發硎可視以精為貴不然何以能久用之不既驗朴斫之有辭懼剞劂之猶未爰究爰度無或不良揣八材之質淬百鍊之鋼然後切磨效奇成至寶之美刳剡中度用巨材之長呈機巧以盡善豈濫窳之是將且斟酌不撓矜名嘗巧雕鐫非他施功幾何既適心而便手因投刃以攢柯向使因循為心則器必殘缺若苟且從事則人亦詆訶安得不分班倕之元妙就玉石之琢磨觀夫欲展而能先利其器以工立喻則人不二可為庶士之規寧比匹夫之志故曰用藝者警戒不遠立身者得失由斯若幸而濫進則人必爾窺是以君子不容易於所為麗澤作兌馳騁為獵大易克演老氏攸誡故違者匪宅是卜終莫之陵愚者動而離制事不師古甲也所處得八卦之龜奧景其律田獲三品之獸物隔疾生喜式損於悔吝自衒厥功載象於士女詳諸訟者反而不思稽以斷之固未為失初尋量力義叶獲麟之傳末觀強暴罪挂吞鯨之網苟用則得歸藏之繫象可尊奄詣有司溫柔之薄言斯在況何往不利違禁見嬰宜置妄干之責勿容不中之訴則高尚其事甲取類於緇衣下人之孽景乖慕於白賁揖讓而升發彼以祈爾爵正鵠苟失必也反求諸身甲主張三侯是供五射簋二以薦初陳強飲強食之辭金奏既動間以采蘩采蘋之節屬九圍有截五兵載櫜宜習禮於澤宮可觀德於相圃下綱不及於地武中掩以待於手弓惟若寧侯則抗而祝也所以擇士乃與之祭焉稱非息宴妄為柱史之糾觀其守職未失梓人之規無咎可徵甲免夫戾披大易而探賾偉元言之杳冥惟乾坤之交泰獲品物之流形惟卦也泰之義廣惟卉也茅之性靈其用也潔身而白當春也應候而青或茂江國或生楚郊三脊之異是稱靈茅刺其無禮詩人引之於純束責其不入諸候終貢於厥包不然者草則多矣胡著之於繫爻哉故可比君子喻物類惟人也能同其地人易心則兩苦茅分族則雙悴苟連茹以相依夫何往而不利是則傳其潔守其貞榮落惟運窮通曷情道或屯蒙滋雨露而育質時逢振拔與連類而共征確乎莫移以保貞吉用之錫命既著之夏典將以縮酒又薦於周室異芝蘭之稟性不同其香等葵藿之有心尚思向日歲聿云暮霜風慘栗願當蕪沒之時不棄輕微之質猗彼菁茅挺生不雜縮醪醴以致潔與清明而相合荊人是職將有體其精誠王澤不流遂無聞於賦納故小白仗義夾輔衰周言念彤弓元矢實征九伯五侯惟苞茅之有闕乃伊人之所羞爾貢或愆於先職王祭誠非於異求有命是遵雖云我疆理無思不服孰曰風馬牛於是戒徒無譁命衆以律顧爾心之有二諒我德之惟一楚子承擯以請罪夷吾將事而靡失陳師鞠旅見旌斾之翩翩伏軾致辭想德音之秩秩且曰祭有百籩縮酒為先類生芻而比潔同有藇以告虔職貢斯巳爾則不共於命馨香罔薦我將謫見於天豈可狃爾車徒恃乃封守慢上則君臣異等黷兵則齊楚非偶議乎品列我則齒兄弟之二三揆以疆場我則吞蠻荊之八九是以來求獻捷豈敢定居如憂連茹而亡禍之大者乃將任土作貢禮可忽諸於以止戈寰區折衝盞斚侔潔白於粢醍肅君臣於上下泰壇之禮成彼菁菁者茅問罪之師罔倦悠悠於野然後率職四方用賓於王信耀德於千祀豈矜功以一匡異魯隱觀魚以犯憲笑晉文將狩以亂常曷若返行葦之積德遵方物之舊章美哉無私之舉也將歷代而彌光
