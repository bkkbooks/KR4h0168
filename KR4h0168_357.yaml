body:
  text: 二公諱伯夷叔齊昔有殷時遼東孤竹君之子也自歷載所記有國以來事之美者莫先於讓是故君老於位命立叔齊齊固辭以請伯伯固辭以不嗣遂相與義退遁逃西周當是時也帝殷不臧用錯天紀人棄莫保以戴於周周武王秉白旄仗黃鉞經綸所以撥亂威畧所以龔罰雷震萬國風行六師二公於時推忠臣之誠明死君之節伏車而諫慷慨瀝血且夫大運不以時曠達節不以義距黔首焉得以厭毒鬼神焉得以無主於是討罪於商為天下王二公以立志貞也檢身操也建侯戡難不可以闕也以臣伐君不可以訓也相於國莫非其土異於事不食其粟乃西上首陽之山歌采薇而死蓋天下義感之始也及孔子生東周之季演中興法游夏之徒皆誨納於教未嘗敘仁人烈士不先於二公者焉謂不辱其身不降其志矣若乃紛綸茂德載在策府則泰伯之道子臧之仁也上思附義退曰能賢則宋穆之言延陵之行也道無不貴志不苟合則許由之節伯成之高也慮必中清廢能中權則虞仲之居夷佚之放也聲垂事載功存業廣則范蠡之去魯連之辭也此數公者至於黜榮保讓亦以盛矣兼之固君臣之分以愛其節曷可以同議也所謂繼之者忠矣杖之者義矣施之者誠矣用之者確矣昭矣至矣韙矣允矣上古無以加百代為之憲越大梁歲行於是邦遇縣宰太原王公惠工訓農勸學敬教㣥業頓以繫賴四方咨於作則邑臨未周人悅有化以為二公廟德不祀實甚懼焉復何以圖不朽示來者而已遂因閒力考餘時經始是圖敦崇舊規厥構棘翼自公尸之然則表前載揚懿烈使俊光熊熊彰紀事也以吾學乎舊史氏請隲其文固不佞乃作銘曰大道混混或險夷兮殷實荒德莫業於主人神疑兮帝用克商大運期兮天下爭利而獨奔義貞名垂兮神農虞夏氏已沒曷所歸兮斵石千秋聞風規兮適字達夫滄洲渤海人舉有道科中第累拜左拾遺轉監察御史元宗西狩適閒道及帝於河池遷御史擢諫議大夫累除成都尹劍南西川節度使廣德元年召為刑部侍郎轉散騎常侍封渤海縣侯永泰元年卒贈禮部尚書諡曰忠坤靈繁毓萬象周流綜㣥物之眾夥懿羽族之齊侔俱含識與哺啄終愧容於爽鳩散以瑤光之彩來自鍾巖之邱周官以司寇比德漢氏以將軍作儔鉤成利觜電轉奇眸蒼姿謺色元距聯韝至於長楊大獵雲夢時蒐寒光送曉霜氣橫秋頓平原而亘弋截洞壑以張罘野霧初霽朝陽尚早於是排空漢飛絕島奮之鼓之載擊載討凌紫氣而蔽日下平皋而覆草歸鴻失四飛之路狡兔亡三窟之道夫品彙之功用之非器至於表德頗亦丰致仙莫過龍駿莫過驥鵬垂天以圖南劍斷甲以稱利夫其庶類之呈能未若茲禽之為鷙固得緗牒再演史臣攸記逐彼鳥雀然明之對國僑擊於殿上要離之讐慶忌且般樂之遊君子未適禽荒是戒哲王盛績太康洛汭之表已驚不還李斯上蔡之門情何更溺覽二君之喪道每觀事其如惕幸免射於高墉願摶風而上擊天寶初有自滑臺奉太守李公鶻賦以垂示適越在草野才無能為尚懷知音遂作鶻賦其辭曰夫何鶻之為用置之則已縱之無匹懷果斷之沈潛任情性之敏疾頭小而銳氣雄而逸貌耿介以凌霜目精明而點漆想像遼遠孤貞深密將必取而乃迴若受詞而無失當白帝之用事下青霄而委質乃順節而勃然因指縱而挺出嚴冬欲雪蔓草初焚野莽蕩而風緊天崢嶸而日曛忿頑兔之狡伏恥高鳥之成㣥始滅沒而畧地忽升騰而篲雲翻決裂以電擊皆披靡而星分奔走者折脇而絕脰鳴噪者血灑而毛紛雖百中而自我終一呼而在君夫其左右更進縱橫發跡埽窟穴之凌兢振荊榛之淅瀝翕六翮以直上交雙指以迅擊合連弩之應機類鳴骨孝之破的豁爾胷臆伊何凌厲以爽朗曾莫蠆芥豈虞夷險之怵惕觀其獲多不有得用非媒歷閶闔以肅穆翊鉤陳以環回幸耀光於蒐狩承翦拂於樓臺望鳳沼而輕舉紛羽族以驚猜路杳杳而何向雲茫茫而不開鶯出谷而徒爾鶴乘軒而何哉彼懷毅勇轗軻而棄置胡不效其閒關而徘徊爾乃顧恩有地戀主多情念層空而不去託虛室而無驚雅節表於能讓義心激於效誠勢愈高而下急體彌重而飛輕戢羽翼以受命若肝膽之必呈嗟日月之云邁猶羈縻而見嬰別有橫大海而徑度順長風而一寫投足眇於巖巔脫身逸於弋者冰落落以凝閉雪皚皚而飄灑諒堅銳之時然寧苦寒以求捨匪聚食以祈滿聊擊㣥以自假比元豹之潛形同幽人之在野矧其升巢絕壁獨立危條心倏忽於萬里思超遙於九霄豈外物之能慕曷凡禽之見邀未知鴛鷺之所以孰與夫鵬鷃之逍遙云爾哉歲在甲申秋窮季月高子遊梁復久方適楚以超忽望君門之悠哉微先容以効拙姑不隱而不仕宜漂淪而播越出東苑而遂行沿濁河而茲始感隋皇之敗德劃平原而為此西馳洛汭東並淮涘地豁山開川流波委六宮景從千官邐迤龍舟錦帆照耀乎數千里大駕將去㣥盜日起尸位者卷舌而偷生直諫者解頤而後死寄腹心於梟獍任手足於蛇虺既垂弒於匹夫尚興疑於愛子豈不為窮力役於征戰務淫逸於奢侈六軍悲牧野之師萬姓哭遼陽之鬼嗟顛覆於曩日指年代於流水唯見長亭之烟火悲曠野之荊杞至酇縣之舊邑懷蕭相之高風既屈節於主吏每歸誠於沛公始俱起於天下乃從定於關中推金帛於他人挹圖籍於我躬按山川之險阻救天地於屯蒙嘉盈俸以增邑方指縱而建功納邵平以防患舉曹參而告終經洛城而永望想譙郡而銷憂慨魏武之雄圖終大濟於橫流用兵戈以威四海挾天子而令諸侯乃擅命以誅伏徒矯跡以安劉吾始未知夫逆順胡寧比於殷周下符離之西偏臨彭城之高岸連山鬱其漭蕩分大澤乎渺漫憶昔天未厭禍項氏叛渙解齊歸楚自蕭擊漢天地無色風雲潰亂憫君王之坎軻混士卒以奔散苟炎運之克昌豈人生之塗炭次靈壁之逆旅面垓下之遺墟嗟魯公之慷慨聞楚聲而悒於歌拔山以涕洟竊霸圖而莫居擯亞父之何甚悲虞姬之有餘出重圍而狼狽至陰陵以躊躇顧天亡以自負雖身死兮焉如登夏邱以寓目對蒲隧而愁予聞取慮之斯在微長直而舍諸宿徐縣之迴津惟偃王之舊域方以小而事大豈無位而有德彼皆昏暴以喪邦伊何仁義而亡國高延陵之挂劍慕班彪之述職緬沛水之悠悠俯婁林之紆直即日河滸依然泗上山川土地耳目清曠眺睢源之呀豁倚楚關之雄壯挂輕席於中流順長風以破浪過盱眙之邑屋傷義帝之波蕩歎三戶之亡秦知萬人以離項越龜山而訪泊入漁浦而待潮鴻鴈飛兮木葉下楚歌悲兮雨瀟瀟霜封野樹冰凍寒苗岸草無色蘆花自飄幸息肩於人事願投跡於漁樵思魏闕而天遠向秦川而路遙候鳴雞以進帆趨亂流以爭迅縱孤舟於浩大撫垂堂以誡慎遵枉渚於淮陰徵昔賢於韓信哀王孫之寄食嘉漂母之無慍鄙亭長之不仁乃晨炊而嗇恡忽從龍以獲騁遂擒豹以自奮破全趙有奇謀稱假齊以益振幸辭通以感惠俄結豨而謀釁當處約而心亨曷持盈而不順陵赤岸之迢遞棹白浪之紆餘歷山陽之村野投襄賁之邑居人多耆艾俗喜觀漁連葭葦於郊甸雜汀洲於里閭感百川之朝宗彌結念於歸歟日杲杲以麗天雲飄飄以卷舒魯放情而蹈海孔永歎於乘桴遇坎則止吾今不知其所如臣適言臣田野賤品生逢聖時得與昆蟲俱霑雨露常謂老死林藪不識闕庭豈期巖穴久空弓旌未已賢才畢用搜訪仍勤見堯舜之為心荷乾坤之善貸臣藝業無取謬當推薦自天有命追赴上京曾未浹旬又拜臣職顧慙虛受實懼曠官捧日無階戴天何報臣已於正衙辭訖即以今日赴官無任犬馬之志謹奉表陳謝以聞臣適誠惶誠恐頓首頓首臣某言伏奉聖恩授臣彭州刺史寵光自天喜懼交集臣某誠惶誠恐頓首頓首死罪死罪臣本野人匪求名達始自一尉曾未十年北使河湟南出江漢奉上皇非常之遇蒙陛下特達之恩累登諫司頻歷憲府比逆亂侵軼淮楚震驚遂兼節制之權空忝腹心之寄銜命感激思効駑駘敢竭公忠動無迴避而智不周物才難適時俄塵聖聽果速官謗實謂斧鉞可待流竄在茲陛下宏覆載之恩明日月之鑒始拜宮尹今列藩條雨露之恩更霑枯朽陽和之氣忽振沈埋天高聽卑臣獨何幸臣某誠惶誠恐頓首頓首死罪死罪臣聞忠臣事君雖死無貳臣今未死敢忘至公伏惟陛下哀臣愚蒙矜臣方直臣雖在遠若近天顏臣以今月七日到所部上訖宣布德音草木增氣敷陳睿澤黎庶昭蘇無任悃屏營之至謹附驛奉表陳謝以聞臣某誠惶誠恐死罪死罪謹言臣某言受脤登壇必先禮樂剖符攬轡是委腹心方將總領諸侯整訓戎旅分二南之名器創七德之籌謀君無虛授臣無虛受授受之際任用匪輕況全蜀奧區非賢勿守方面重寄擇善而從顧臣庸愚豈合祗拜遠奉恩制不敢逡巡即以二月二日上訖天威在顏風俗思變飲冰食櫱策朽磨鉛臣往在淮陽已無展効出臨彭蜀又乏循良雖聖恩不移而微臣益懼謹當宣揚皇化鎮撫蕃蠻訓率吏兵翦除夷獠庶冀毫髮增益山邱陛下慎擇任人朝廷多士伏願更徵英彥俾付西南許臣暮年歸侍丹闕臣子之懇君父之慈天高聽卑下情上達軍府多事稅賦方殷臣今逐便指撝乘閒式遏救蒼生之疲弊寬陛下之憂勤乃臣丹誠縷縷於夙夜無任悾之至謹遣洋州司馬攝參謀臣路球謹奉表陳謝以聞流布聖澤江淮益深扇揚皇風草木增色伏惟陛下大明照臨純孝撫御漢主事親之日爰總六師軒后垂衣之辰再清四海猶以京華尚阻國步暫艱運黃石之神謀推赤心於人腹臣器非管樂殊孔明之自比識謝孫吳異山濤之暗合豈意聖私超等榮寵薦臻拔自周行重寄方面以時危而注意竊愧非才因國難以捐軀顧為定分即當訓練將卒緝綏黎甿外以平賊為心內以安人為務庶使殄滅兇醜舞咏時邕報明主知臣之恩成微臣許國之節臣某言臣得河南道及諸州牒皆言逆賊安祿山苦痛而死手足俱落眼鼻殘壞臣聞負天者天誅負神者神怒其道甚著今乃克彰臣某誠懽誠喜頓首頓首逆賊孤負聖朝造作氛祲嘯聚吠堯之犬倚賴射天之矢殘酷生靈斯亦至矣臣恨不得血賊於萬㦸肉賊於三軍空隨率土之懽遠奉九霄之慶即當總統將士憑恃威靈驅未盡之犬羊覆已亡之巢穴無任踴躍慶快之至謹遣攝判官李翥奉表陳賀以聞臣某言閏正月十六日中使郭羅至伏奉勅書示臣聖畧收復洛掃殄兇徒臣某手之足之載欣載躍臣聞天不假易將而必誅守在四夷難逃一面頃者逆胡稔惡竊據中都欲驅犬羊敢肆蠆毒碎首於雷霆之下竄跡於城社之中猶貯殘魂擬收餘燼陛下澤深覆載功濟艱難神武必止於干戈寰區大拯於塗炭好生惡殺誠屢發於宸心走獸奔禽盡已罹於網目使風雲一變日月增輝巨海絕其揚波妖氛化為和氣臣忝司戎律累奉德音昭宣睿謀底寧縣道天下幸甚豈獨方隅無任慶快之至謹遣洋州司馬員外同正員攝參謀臣路球奉表陳賀以聞臣某言臣某言臣聞人臣無將將必誅之逆賊前成都少尹兼侍御史偽稱成都尹兼侍御史中丞劍南節度使徐知道中官攜養莫知姓族熒惑主司叨竊憲臺不能輸瀝肝膽以答休明而懷挾奸邪嘯聚同惡傾竭府庫塗炭黎甿遂為欃槍恣行蠆毒杜塞劍道擁遏朝經部署兇殘統領州縣曾未數日蕩壞一隅郊原已空市井如掃臣與卭南隣境左右叶心積聚軍糧應接師旅以今月二十三日大破賊眾同惡翻然共殺知道大軍慶快雲物改容百姓欣懽景色相賀此皆社稷昭應神靈保持伏惟皇帝陛下一德動天無遠不屆兵戈向戢華夏克寧布蕭王之赤心竭臣子之丹妖氛聚而皆盡郡國危而更安高視百王能事斯畢臣忝守藩翰罹此艱虞覩天地之廓清與飛動之咸若無任踴躍之至謹奉表陳賀以聞右自徐知道作亂軍府畧空救弊扶傷事資安輯臣夙夜陳力起處不遑伏以二陵攀號臣未修壤奠萬方有主臣未覩天顏犬馬之誠不勝懇候士卒稍練蕃夷漸寧特望聖恩許臣入奏謹錄奏聞伏聽勅旨謹奏臣某言符瑞之興實由王政歌詩之作本自國風伏見范陽盧某母瑯琊王氏性合希夷體於靜默精微道本馳騖元關旁通天地之心豫紀休徵之盛去景龍二載撰天寶迴文詩凡八百一十二字循環有數若寒暑之遞遷應變無窮謂陰陽之莫測誡其子曰吾沒之後爾密記之當逢大道之朝必遇非常之主則真圖之製便可上言君親之義不違犬馬之誠斯在臣早識其子常與臣言星霜屢移書奏仍闕以歲月悠遠旨趣幽微沈吟取耳目之前倏忽應禎祥之後伏惟皇帝陛下乘道御極至聖興化參日月之並明一乾坤而同德梯航萬里爭飲淳和之風臣妾四夷盡歸仁壽之域今陛下務於道道可盡乎法於天天實長久是知與道齊運比天同休無疆之休乃在茲矣則王氏之美其可替乎章句粲然所謂沒而不朽者也臣某誠惶誠恐頓首頓首昔漢幸甘泉且昧神君之語周窮轍跡徒稱王母之謠豈若迥出名言高懸響像應皇王之丕命運宮商於景福且夫靈芝嘉禾草木之瑞者黃龍丹雀禽獸之瑞者猶能光揚帝載標榜頌聲方之真圖彼未為得特望編之史策列在樂章則陛下先於天而聽於人也臣才術淺劣謬忝藩垣曾微涓塵以答萬一恒馳北極每切子牟之戀遙奉南山願效封人之祝僕射哥舒翰忠義感激臣頗知之然疾病沈頓智力俱竭監軍李大宜與將士約為香火使倡婦彈箜篌琵琶以相娛樂樗蒲飲酒不恤軍務蕃軍及秦隴武士盛夏五六月於赤日之中食倉米飯且猶不足欲其勇戰安可得乎故有望敵散亡臨陣翻動萬全之地一朝而失南陽之軍魯炅何履光趙國珍各皆持節監軍等數人更相用事寧有是戰而能必勝哉臣與國忠固爭終不見納陛下因此履巴山劍閣之險西幸蜀中避其蠆毒未足為恥也劍南雖名東西兩川其實一道自卭關黎雅界於南蠻也茂州而西經羌中至平戎數城界於吐蕃也臨邊小郡各舉軍戎並取給於劍南其運糧戍以全蜀之力兼山南佐之而猶不舉今梓遂果閬等八州分為東川節度歲月之計西川不可得而參也而嘉陵比為夷獠所陷今雖小定瘡痍未平又一年已來耕織都廢而衣食之業皆貨易於成都則其人不可得而役明矣今可稅賦者成都彭蜀漢州也又以四州殘敝當他十州之重役其於終久不亦至艱又言利者穿鑿萬端皆取之百姓應差科者自朝至暮案牘千重官吏相承懼干罪譴或責之於鄰保或威之以杖罰督促不已逋逃益滋欲無流亡理不可得比日關中米貴而衣冠士庶頗亦出城山南劍南道路相望村坊巿肆與蜀人雜居其升合㪷儲皆求於蜀人矣且田土疆界蓋亦有涯賦稅差科乃無涯矣為蜀人之計不亦難哉今所界吐蕃城堡而疲於蜀人不過平戎已西數城矣邈在窮山之巔垂於險絕之末運糧於束馬之路坐甲於無人之鄉以戎狄言之不足以利戎狄以國家言之不足以廣土宇奈何以險阻彈丸之地而困於全蜀太平之人哉恐非今日之急務也國家若將已戍之地不可廢已鎮之兵不可收當宜却停東川併力從事猶恐狼狽安可仰於成都彭蜀漢四州哉慮乖聖朝洗盪關東掃清逆亂之意也儻蜀人復擾豈不貽陛下之憂昔公孫宏願罷西南夷臨海專事朔方賈捐之請棄珠厓以寧中土儻言政本匪一朝一夕臣愚望罷東川節度以一劍南西山不急之城稍以減削則事無窮頓庶免倒懸陛下若以微臣所陳有裨萬一下宰相廷議降公忠大臣定其損益與劍南節度終始處置昔漢祚陵夷桓靈棄德宦官用事國步多艱宗社有綴旒之危宰臣非補衮之具董卓地兼形勝手握兵鈐顛而不扶禍則先唱興晉陽之甲君側未除入洛陽之宮臣節如掃至乃發掘園寢逼辱妃嬪太后之崩豈稱天命宏農之廢孰謂人心敢諷朝廷以自尊貴大肆剽虜以極誅求焚燒都邑馳突放橫衣冠凍餒倚死牆壁之閒兆庶困窮生塗草莽之上於是天地憤怒鬼神號哭而山東義旗攘袂爭起連州跨郡皆以誅卓為名故兵挫於孫堅氣奪於袁紹僭擬輿服黨助奸邪驅蹙東人脅帝西幸淫刑以逞有湯鑊之甚要之糜爛刳剔異端乃謂漢鼎可移郿塢方盛殊不知禍盈惡稔未或不亡故神贊允誠天假布手母妻屠戮種族無留懸首燃臍遺臭萬代骨肉灰燼不其快哉今狄道之人不慙卓之不臣而務其為鬼苟斯鬼足尚則漢莽可得而神晉敦可得而廟桓元父子可享於江鄉爾朱弟兄可祀於朔上嗟乎仁賢之魄寂寞於邱陵義烈之魂沈埋於泉壤何馨香之氣而用於暴悖之鬼哉適竊奉吹噓庇身戎幕每承餘論飽識公忠之言不遠下風盡知仁義之本昨忝高會敬受德音今具賊臣之事悉以條上謹按尚書王者望秩天地之神祇諸侯祭境內之山川亂臣不言淫祀無取則董卓之廟義當焚毀天子務西州之實歲糴億計何始於貴取而終以耗稱俾邊兵受寒戰馬多瘦輓域中之稅鑄海上之山江淮之人蓋奔命矣豈財賦之地抑以從來將利害之鄉猶有所闕廟堂精思其故表竇公自憲闈而董之開釋叢脞之病發揮鹵莽之極政之大者不其然與今農夫力於必登廉賈知夫踊賤鳴戲若惟斯之義以見天下之兵我幕府涼公勤勞王家常用此道干戈所適戎狄相弔宜哉八月既望公於是領錢穀之要歸奏朝廷副節制郎中裴公軍司馬員外李公追臺閣之舊遊惜軒車之遠別席樓船於池上泛雲物於城下胡琴羌笛繚繞隈隩儛羅袨裝映帶洲渚醉後歡甚東日遐瞻一作東林日高語歧路於樽前指京華於天杪有若司直崔公之逸韻嘉其廷評數賢之閒作適忝斯人之後敢拜首而序云皇甫冉補闕自擢桂禮闈遂為高格往以世道艱虞避地江外每文章一到朝廷作者變色於詞塲為先輩推錢郎為伯仲誰家勝負或逐鹿中原如果熟任霜封籬疎從水度又裛露收新稼迎寒葺舊廬又燕知社日辭巢去菊為重陽冒雨開可以雄視潘張平揖沈謝又巫山詩終篇皆麗自晉宋齊梁陳周隋已來採掇者無數而補闕獨獲驪珠使前賢失步後輩却立自非天假何以迨斯恨長轡未騁而芳蘭早凋悲夫周官行夫掌邦國傳遽之事施於政者蓋有章焉皇唐之興盛於古制自京師四極經啟十道道列以亭亭實以駟而亭惟三十里駟有上中下豐屋美食供億是為人跡所窮帝命流洽用之遠者莫若於斯矣伊陳留雄稱山東聲英海內昌大囂庶有梁魏之遺跡風煙兩河之眇襟帶九州之半洎皇華軺傳夷使駿奔出關而馳南向北戶山川水陸之役兆於是矣故上源所置與其難哉居里之衝瀕河之陽地形湫隘館次卑狹巽在堤下面於劇旁走庭以隅建步終坎車靡方駕騎無並鞭其鬱閉有如此者壬辰歲太守元公連率河南之三載也堯治四岳而神人理漢詔八使而風俗清舉德推賢事高典策革已成之弊持獨斷之明迨茲郵亭俯視頹朽何逼側蹇淺不稱其聲將圖鼎新豈曰仍舊顧謂長史李公曰夫開釋故實發揮制度不有攸居者誰其允協今奏計闕前先甲而往小大之務公其領之申命錄事參軍馮元掌曰維操繩墨者蓋用於正蘊廉慎者俾臨於財公以正身用財均力紀綱相佐善莫大焉復命浚儀令裴勝曰公之為縣也易於理訓迪其源秉清白之一門據忠信之餘地夫忠以創物清而守官立言有程指使而可於是北吞里室人以利遷也南豁路旅事無苟免也合土以峻墉攻木以高戶棟宇相翼㣥材如生茲所謂動乃有經徐而不費於戲久於否者宜以改作本於功者終乎永貞則亭之成焉我方訪王公澄清之初也公時膺邁德天與大才屬梁宋不登朝廷旰食求瘼之重不其然歟用能官去粃政人無菜色百城偃於迅風萬象納於明鏡乃因寮吏慨然於茲亭曰且夫木石之新者而猶可觀況人而自新孰不觀者又曰傳不云乎啟塞從時用之善者而今而後吾以無事為事焉君子是以知郵亭之可嘉而我公之清淨無窮也末吏不敏紀於貞石云百獸至猛莫如師子紺眼星懸赤尾焰起銅爪鐵甲鋸牙鑿齒顧犀象則百隊山跧看熊羆則千㣥野死以此言威威可知矣仙尉樊公寫其象於中廳崑崙却捽而屋壁欲動虎豹膽懾而訟庭已空稜稜兮隔簾飛霜颯颯兮滿院生風於是乎師子為百獸之長遂識樊公為百夫之雄阿育王繡像竇氏女奉為亡妣太夫人蘇氏所建也嗚呼有以蓬首操行柴立孝思仰昊天之茫茫對高堂而泣血女之孝矣將感於神明婦之義矣可施於王化故能塵垢明鏡住持青蓮永明宿因獨見諸淨以為霜雪風雨之思胡寧以報親功德莊嚴之深冀以益吾親矣乃自方丈之室沛然廣大之願綵翠鮮秀光華可掬運夫心眼之靈盡如相好之美瞻仰圍繞涕淚是悲俾像教之勿墜如佛身之有在夫莫大者孝也不泯者善也惟孝與善可以導達幽冥則我太夫人宜歸淨土矣嗚呼孝之至也感人無窮乃為讚曰佛不可見兮法亦難知惟我莊嚴兮本乎孝思儻幽冥兮昭乎景福彼淨土者可得而歸之維乾元元年五月日太子詹事御史中丞高適謹以清酌之奠敬祭於故御史中丞張許二公之靈中丞體質貞正才掩㣥豪詩書自負州縣徒勞惆悵雄筆辛勤寶刀時平位下世亂節高賊臣通逆國步驚騷兩河震恐千里嗷嗷投袂灑泣據鞍鬱陶全譙入宋收梓捍曹心繫魏闕志清武牢帝曰嗟爾龍光豹韜憲台戎幕持斧擁旄嗚呼予亦忝竊統茲介冑俄奉短書至夔狂寇裹糧訓卒達曙通晝軍乃促程書亦封奏遂發趫勇俾驅鳥獸將無止心兵亦死鬬賊黨頻蹙我師旋漏十城相望百里不捄紜紜嘯聚兵鋒亦湊積薪為梁決岸成竇嗚呼當此虎敵豈無強鄰常時肝膽今日越秦堅守半歲絕糧數旬柹椽秣馬煑紙飼人病不暇拯歿無全身煎熬甲冑啄嚙膠筋慷慨艱險淒涼苦辛嗚呼我辭淮楚將赴伊洛途出茲邦悲纏舊郭邑里灰燼城池墟落何九拒之崢嶸皆二賢之制作聲蓋天壤氣橫遼廓讓死爭先臨危靡却嗚呼闕天亦難論萬夫開壁一旅纔存衰羸既竭力弱相吞陷阱織路梯衝棧門土壕水合木柵雲屯居即其敵突無其奔烟雲劍㦸逼側紛昏與求生而害義寧抗節以埋魂嗚呼悖逆殲潰干戈將止海岳澄清朝廷郅理封功列爵懷黃拖紫傷哉二賢不預於此嗚呼孀婦伶俜愛子追贈方榮賞延茲始寂寂梁苑悠悠睢水黃蒿連接白骨填委思壯志於冥寞問遺形於荊杞列祭空城一悲永矣惟明天寶元年官隴右節度使龍支縣人庫狄孝義有馬生龍駒經九旬有九日身有鱗而不生毛臣就視時有慶雲五色遙覆馬上久而不散伏望宣付史官以光實錄
