front:
  text: 全唐文欽定全唐文卷七百六十七詢字誠之贈吏部尚書傳師子會昌初進士纍遷中書舍人出為浙東觀察使除戶部侍郎咸通四年為昭義節度使奴結牙將為亂滅其家贈兵部尚書
  hash: sha256:f282efec3a6dbeb15ee30a39b26ef718b45386ba5d0e0f73d4393539efec8d66
  markers:
  - {type: head, offset: 14, content: 沈詢, id: KR4h0168_NFKB_767-h1, level: 1}
body:
  text: 門下朕聞王者建植子弟胙以茅土將欲蕃昌磐石深固本根周漢之隆率由斯道及我列聖每用舊章所以撫安生靈保祐中外朕恭承天序敢紊前規爰加立愛之恩庶廣推公之義憲宗第十八子惴生則溫柔性惟聰達神邁氣朗聞禮知方蘊積中之粹和資奉上之孝敬必能副豫友愛始終令圖以耀金枝以輔王室是命俾開朱邸盛建戚藩載啓唐虞之風用崇麟趾之慶嗚呼惟茲盛典用別親賢必思繼美二南紹休五等佩維城之重思外屏之尊無怠無荒服我丕命可封棣王仍令擇日備禮冊命敕職奉命書選歸於鴻藻名參侍從任切於端人由具美而方升非一善而能進我今慎擇得自僉言起居郎曹確秀發人倫行修儒閫保此全器彰乎令名負賈生之才識窺夫子之牆仞禮樂盡在襟情甚夷貞而能和用則善晦遐志陵厲早超脫於池中茂業宏深動聲華於日下爰自侯府列於王庭踐霜臺而職舉方書立文階而事光載筆持以風表居然羽儀稽其行能雅副銓擢是用寵爾良吏為豫近臣俾從瑣闥之榮更侍玉堂之奧皇猷思暢用宣祕密之文清秩不移尚受無私之旨秉心勿替於正道視草勉高乎訓詞無忘懿圖佇答休命可守本官充翰林學士門下潤色王業允俟於良臣丹青帝圖必資於宰匠朕嗣膺大寶思闡鴻猷永惟化源實屬髦傑斯所以調六氣以遂物總萬幾而富人夢帝賚豫爰立作相正議大夫守御史大夫崔鉉山河秀氣經緯長才金聲含正始之和玉立在風塵之表正議大夫行兵部侍郎判戶部事魏扶天與全德性惟中庸有致遠之宏謀負王佐之盛業並操身特立抱器挺生高標旁映於㣥倫明識動符於大雅早登華顯備閲休嘉穆然清明鬱有素望居易求已秉仁立誠每懷憂國之心益竭徇公之志或早以精慮升於鼎司深陳造膝之言密厲匪躬之節或嘗以敏用服於大寮智有洞於機權才復深於練達爰委綱憲仗名節而立朝亦總地卿當會計而經國紀綱式敘征稅益饒陟其休庸付以大柄朕欲宣明號令宏濟生靈致寰海之乂安復河隍之土宇爾從容奏議朝夕揣摩副華夏之具瞻展舟航之大用輔教化本乎無隱辨雅正在於至公俾踐中台同參庶務敬服明訓式揚茂勳鉉可中書侍郎同中書門下平章事扶可守本官同中書門下平章事門下天不能獨運任寒暑而成歲功君所以稱尊仗股肱而熙帝載高拱巖廊之上卒成天地之宜故風后登庸軒圖以穆文終佐理漢業遂昌何莫斯由夫豈相遠爰感風雲之會果符夢卜之求屬在休期俾升良弼戶部侍郎判戶部事魏謨膺賢運之間氣負王佐之宏材山嶽孤高圭璋特達道德忠信資以修身文章政事乃其餘力自騰芳詞苑振跡諫垣文宗知臣深加寵遇檢校甚峻守道不回未至達官蔚為國器星霜屢變流落幾途秀木摧風燎原見玉汲黯心存乎廊廟望之志在於本朝朕獲奉寶圖勵精理本盡伸人隱思變時雍佇聞宣室之言是有夕扉之拜偉其風望委以憲綱正色立朝不仁自遠二於卿秩掌我地征吏不敢欺身無伐善彌見精強之用頗聞流衍之能朕常咨以謨謀觀其識略動中理會慮必輸忠切劘每賴其沃心慷慨不忘於造膝是宜樹為名表載之休聲俾增輝於三台允僉諧於四嶽於戲調鹽梅之元鼎濟舟楫之巨川上維四方之安危下繫㣥生之舒慘居是任者不其重歟夫激濁揚清衆自聳善著誠去僞人斯歸厚爾其開張教化之具導迎陰陽之和使萬物各遂其宜百官得任其體昔爾先祖為唐輔臣人鏡之名阿衡比德爾尚纂承義訓克嗣清風勉思貽厥之謀以闡將明之業勿畏嫌而避事無執謙以自疑永孚於休用觀乃績可守本官同中書門下平章事依前判戶部事門下我國家之稱至理其惟貞觀開元乎雖盛德成於祖宗而致君存乎輔弼委是丕構付豫沖人實資獻臣共荷洪業俾登玉鉉用振金聲正議大夫守禮部尚書充諸道鹽鐵轉運等使裴休明堂棟梁清廟瑚璉道崇五美學綜九流持去邪與善之心蘊尊主濟時之術早升甲乙首冠賢良諫垣馳讜正之名史氏動直言之筆羽儀著定律呂縉紳仙闈道播於彌綸右掖詞推於潤色三臨藩郡皆垂良吏之能四二卿曹益見大臣之體洎乎司泉府之重管山澤之財用適變通法均寬猛大計如富強之業常規多饒羡之功人無告勞刃有餘地是可以載光衮職爰陟台階式贊雍熙宜膺夢卜爾其允釐庶績盛起訏謨涉大川而示吾津涯馭六馬而遺吾銜策俾臻皇極克嗣前修於戲人代天工豫違汝弼悉乃心力作吾股肱無使阿衡專美於殷家山甫獨稱於周室勉宏懿德勿忝虛懷可守本官同中書門下平章事依前充諸道鹽鐵轉運等使考三載之績爾最無聞致多士之朝人言未息既起風波之論難安喉舌之司畋字台文桂管觀察使亞之子會昌二年進士乾符中以吏部侍郎同平章事僖宗上尊號加中書侍郎轉門下侍郎兼禮部尚書集賢殿大學士封滎陽郡侯中和三年復拜司空門下侍郎平章事罷授檢校司徒太子太保卒年六十三贈太尉又贈太傅昭宗時追贈司徒諡文昭門下推轂總戎朝廷之重寄登壇受鉞將帥之殊榮况地接燕山境連京甸兵雄俗阜拱我宸居宜擇英賢以壯垣翰具官某乙雷泉禀氣邳石降籌習起翦之兵書用關張之戰略雄嚴可憚忠赤無疑彰勇藝於轅門顯勤勞於禁旅言皆許國志在忘家驊騮豈戀於縶維雕鶚常思於振擊今故錫之旄鉞授以土田俾侯於邠用示殊寵爾其申嚴斥堠訓習師徒增疇隴以俟豐穰飭器甲以圖精利搜乘補卒無惑於惰游禦寇安人必期於靜謐尚父之英威未殄古公之風化猶存勉揚政經無負優寄可檢校某官充邠寧節度使主者施行門下全蜀之南封部遐廣屏限蠻貊巂為要衝間者守將不嚴寇兵來陷蕭條故地寂寞有年與其黷武開疆孰若屯師固圉况精甲可用腴田可耕苟得其人豈復玩寇是用割分州里崇建翰垣思其長才付以重事簡求中外格於旬時果得良臣實契朕志朝議大夫前鳳翔少尹上柱國賜紫金魚袋李師望早以才幹彰於吏途縱橫不羈沉毅有斷頃歲王師伐叛命爾供軍糗糧相繼於路歧兵士皆欣於飫飽裘甫之役爾守天台克以偏師大挫狂孽厥後繼領符竹咸推器能二尹岐山既從休罷鷙羽豈閒於韝上神鋩終躍於腰間朕以荒服未寧坤維多慮式當經制尤渴英奇知其可行召與之語嘉謀響答雄論風生奏刀而髖髀皆虛聚米而山河盡覩築壇驟拜余無悔焉於戲初造之邦詎有堅敵種落雜處兵糧未殷全資智謀克在威愛爾其投醪共味立法推誠理軍猶家養士如子闢汙萊以務稼穡籌險阻以制關防弓矢戈矛當嚴煆礪風雲氛祲無忽視瞻熟孫武之韜鈐慕孔明之事業使苴咩城下常驚鼓鼙之威大度河南永保金湯之固勉思報國勿負知臣擢握兵符銜榮憲印統諸軍之鈇鉞兼六部之賦輿上應星辰貴為侯伯將旌殊渥匪限彞章敬之戒之無忝休命可巂州剌史兼御史大夫充定邊軍節度使眉蜀卭雅黎等州觀察處置統押近界諸蠻并統領諸道行營兵馬制置等使省表具悉卿一門忠孝三代勳庸銘於景鐘煥在青史卿承祖父之訓襲弓冶之基起自禁軍從微至著始則囊錐露穎稍有知音尋則天驥呈才急於試效自秦州經略使授交趾節旄聯翩寵榮汗漫富貴未嘗斷絶僅二十年卿報國之功亦可悉數最顯赫者安南拒蠻至今海隅尚守次則汶陽之日政聲洽平洎臨成都脅歸驃信三載之內亦無侵淩創築羅城大新錦里其為雄壯實少比儔渚宮不暇於施為便當移鎮建鄴才聞於安靜旋即渡江自到廣陵併鍾多壘即亦招降草寇救援臨淮大約昭灼功勳不大於此數者朝廷纍加渥澤靡吝徽章位極三公兵環大鎮銅鹽重務綰握約及七年都統雄藩幅員幾於萬里朕瞻如太華倚若長城凡有奏論無不依允其為託賴豈愧神明自黃巢肆毒咸京卿並不離隋苑豈金陵苑水能遮鵝鸛之雄風伯雨師終阻帆檣之利自聞歸止寧免鬱陶卿既安住蕪城鄭畋以春初入覲遂命上相親領師徒因落卿都統之名固亦不乖事例仍加封實貴表優恩何乃疑忿太深指陳過當移時省讀深用震嗟聊舉諸條粗申報復卿表云自是陛下不用微臣固非微臣有負陛下者朕拔卿汶上超領劒南荊潤維揚聯居四鎮綰利則牢盆在手主兵則都統當權直至京北京南神策諸鎮悉在指揮之下可知董制之雄而乃貴作司徒榮為太尉以為不用何名為用乎卿又云若欲俯念舊勳佇觀後效何不以王鐸權位與臣主持必能紏率諸侯誅鋤㣥盜者朕緣久付卿兵柄不能翦滅元凶自天長漏網過淮不出一兵襲逐奄殘京國首尾三年廣陵之師未離封部忠臣積望勇士興譏所以擢用元臣誅夷巨寇心期貔武便掃欃槍卿初委張璘請放却諸道兵士辛勤召置容易放還璘果敗亡巢益顛越卿前年初夏逞發神機與京中朝貴書題云得靈仙教導芒種之後賊必蕩平尋聞圍逼天長必謂死在卿手豈知魚跳鼎釜狐脫網羅遽過長淮竟為大憝都統既不能禦遏諸將更何以枝梧果致連犯關河繼傾都邑從來倚仗之意一旦控告無門凝睇東南惟增悽惻及朕蒙塵入蜀宗廟汚於賊庭天下人心無不雪涕既知歷數猶在謳謠未移則懷忠拗怒之臣貯救難除姦之志便須果決安可因循况恩厚者其報深位重者其心急此際天下義舉皆望淮海率先豈知近輔儒臣先為首唱而窮邊勇將誓志平戎關東寂寥不見干羽洎乎初秋覽表方云仲夏發兵便詔軍前並移汶上喜聞兵勢渴見旌幢尋稱宣潤阻艱難從天討謝元破苻堅於淝水裴度平元濟於淮西未必儒臣不如武將卿又云若不斥逐邪佞親近忠良臣既不能保家陛下豈能安國忽當今日棄若寒灰者未委誰是忠良誰為邪佞終日寵榮富貴何嘗不保其家無人捍禦寇戎所以不安其國豈有位兼將相使帶銅鹽自謂寒灰真同浪語卿又云不痛園陵之開毀不念宗廟之焚燒臣實痛之實在茲也且龜玉毀於櫝中誰之過也鯨鯢漏於網外抑有其由卿手握強兵身居大鎮不能遮圍擒戮致令脫漏猖狂雖則上繫天時抑亦旁由人事朕自到西蜀不離一室之中屏棄笙歌杜絶遊獵蔬食適口布服被身焚香以望園陵雪涕以思宗廟省躬罪已不敢遑安姦臣未悟之言誰人肯認陛下猶迷之語朕不敢當卿又云自來所用將師上至帥臣下及裨將以臣所料悉可坐擒用此為謀安能集事者且十室之邑猶有忠信天下至大豈無英雄况守固城池悉嚴兵甲縱非盡美安得平欺卿尚不能縳黃巢於天長安能坐擒諸將只如拓拔思恭諸葛爽輩安能坐擒耶勿務大言不堪垂訓卿又云王鐸是敗軍之將兼徵引矍相射義者昔曹沫三敗終復魯讐孟明再奔竟雪秦恥近代汾陽尚父咸寧太師亦曾不利鼓鼙尋則功成鍾鼎安知王鐸不立大勳卿又云無使百代有抱恨之臣千古留刮席之恥但慮寇生東土劉氏復興即軹道之災豈獨往日哉我國家景祚方遠天命未窮海內人心尚樂唐德朕不荒酒色不虧刑名不結怨於生靈不貪財於㝢縣自知運歷必保延宏况巡省已來真祥薦降西蜀半年之內聲名又以備全塞北日南悉來朝貢黠戞善闡並至梯航但慮天寶建中未如今日清宮復國必有近期卿云劉氏復興不知誰為其首遽言刮席之恥比朕於劉盆子耶仍憂軹道之災方朕於秦子嬰也雖稱直行何太罔誣三復斯言尤深駭異卿又云賢才在野憸人滿朝致陛下為亡國之君此子等計將安出伏乞戮賣官鬻爵之輩徵鯁直公正之臣者且唐虞之世未必盡是忠良今巖野之間安得不遺賢彥朕每令銓擇亦遣訪求其於選將料兵安人救物但屬收復之業講求理化之基自有長才同匡大計賣官鬻爵之士中外必不有之勿聽狂辭以資游說且朕遠違宮闕寄寓巴卭所失恩者甚多尚不興怨卿落一都統何足介懷况天步未傾皇綱尚整三靈不昧百度猶存但守君臣之軌儀正上下之名分宜遵教約未可隳淩朕雖沖人安得輕侮但以知卿歲久許卿分深貴存始終之恩勿貯猜嫌之慮所宜深省無更過言臣年十八登進士及第二十二書判登科此時結綬王畿便貯青雲之望洎一沉風水久換星霜厭外府之樽罍渴明庭之禮樂咸通五年方始登朝若非遭逢聖君無以發揚幽迹臣任刑部員外郎日纍於閣內對揚去冬蒙擢宰萬年又得延英中謝傾藿幸依於白日捨盆終覩於青天昨以京縣浩穰苦心為政疲羸初息強禦無蹤方專宰字之心用副憂勤之化陛下過垂採聽超授恩榮擢於百里之中致在三清之上才超翰苑遽改郎曹臣會昌二年進士及第大中首歲書判登科其時替故昭義節度使沈詢作渭南縣尉兩考罷免楊收以結綬替臣詢則備歷顯榮歿經數載收則寵極台輔絀巳三年臣則外困賓筵內甘散秩仰窺霄漢空嘆雲泥雖云賦命屯奇實以遭人排忌禁林素號清嚴承旨尤稱峻重偏膺顧問首冠英賢今之宰輔四人三以此官騰躍其為盛美更異尋常豈謂凡流繼茲芳躅臣所以憂不稱承旨之任也至若繼劉瞻之慎密守保衡之規程瀝懇事君披肝翊聖以貞方為介胄用忠信之藩籬丹青帝文金玉王度臣亦不敢讓承旨之職况沉舟墜羽因聖主發揚有薄藝微才受鴻恩知遇再周寒暑六忝官榮由郎吏以至於二卿自末僚而遷於上列敕魏博權知兵馬留後韓君雄及將士等何全皡藉祖父之餘基受朝廷之重寄身居節制位極公台所宜慮危圖安忘私濟衆乃驕矜失道滿假為心刻削衣糧恣行殺戮致三軍之怨怒乘馬匹以奔逃忽以敗亡良可驚歎君雄素聞奇節久著威聲權於衆情主彼留事果能撫安戎旅鎮定軍城將士等義激英雄名光壯武雖從權而選帥終請命以聞天况知乂寧尤用嘉矚今遣高品康道偉等專往宣慰其他續議指揮想宜知悉秋凉卿比平安好否遣書指不多及敕文裕及魏博三軍將士等駱全諷至知全皡紀綱失制軍府離心衆議不容脫身潛遁再三省問驚嘆良深且何氏一門將相三代進韜則首推誠義宏敬則屢建勳庸全皡紹襲其芳主張軍旅亦能輸心向義赴難興師雖無蕩定之功頗著勤勞之節朝廷念其壯武益以官榮位列上公寵兼台座一時之美無以過焉豈謂弛慢生災驕荒致患鼓師徒之怨怒貽祖父之包羞三軍將士等義勇無倫忠貞有素負山西之壯氣因河北之威聲必當洞明禍福之源深悉變更之體因以物情積憤軍令乖張不可保安致滋騷動大凡恤人者則父母虐我者則仇讐訓傳所言古今無異何全皡既敗戎律即當舉正朝章韓君雄若合㣥情權可主其留事更俟奏報當有指揮將士等切宜禁戢兵戎肅清疆境勿因驚擾妄有殺傷特遣高品康道偉等專往宣慰言不盡意當識朕懷秋凉三軍將士等各得平安好否遣書指不多及鳳翔隴右節度使檢校尚書左僕射同中書門下平章事充京西諸道行營都統上柱國滎陽郡開國公食邑二千戶鄭畋移檄告諸藩鎮郡縣侯伯牧守將吏曰夫屯亨有數否泰相沿如日月之蔽虧似陰陽之愆伏是以漢朝方盛則莽卓肆其姦凶夏道未衰而羿浞騁其殘酷不無僭越尋亦誅夷即知妖孽之生古今難免代有忠貞之士力為匡復之謀我國家應五運以承乾躡三王之垂統綿區飲化匝宇歸仁十八帝之嘉猷銘於神鼎三百年之睿澤播在人謠加以政尚寬宏刑無枉濫翼翼勤行於王道孜孜務恤於生靈足可傳寶祚於無窮御瑤圖於不朽近歲螟蝗作害旱暵延災因令無賴之徒遽起亂常之暴雖加討逐猶肆猖狂草賊黃巢奴僕下才豺狼醜類寒耕熱耨不勵力於田疇偷食靡衣務偷生於剽奪結連凶黨驅迫平人始擾害於里閭遂侵凌於郡邑屬以藩臣不武戎士貪財徒加討逐之名竟作遷延之役致令滋蔓纍有邀求聖上愛育情深含宏道廣指萬方而罪已用百姓以為心假以節旄委之藩鎮冀其悛革免困疲羸而殊無犬馬之誠但恣蟲蛇之毒剽掠我征鎮覆沒我京師凌辱我衣冠屠殘我士庶視人命有同於草芥謂大寶易竊如奕棊而乃竊據宮闈僞稱名號爛羊頭而拜爵續狗尾以命官燕巢幕以誇安魚在鼎而猶戲殊不知五侯拗怒期分項羽之尸四冢既成待葬蚩尤之骨猶復廣侵田宅濫瀆貨財比溪壑以難盈類烏鳶而縱攫芒芒赤縣僅同夷貊之鄉惴惴黔黎若在狴牢之內固以人神共怒行路傷心畋謬領藩垣榮兼將相每枕戈以待旦常泣血以忘餐誓與義士忠臣共剪狐鳴狗盜近承詔命會合諸軍皇帝親御六師即離三蜀霜戈萬隊鐵馬千㣥雕虎嘯以風生應龍驤而雲起淮南高相公會關東諸道百萬雄師計以夏初會於關內畋與涇原節度使程宗楚秦州節度使仇公遇等已驅組練大集關畿爭麾隴右之蛇矛待掃關中之蟻聚而土番黨項已久濡皇化深憤國讐願以沙漠之軍共濟蕩平之捷此際華戎合勢藩鎮連衡旌旗煥爛於雲霞劍㦸晶熒於霜雪莫不持繩待試賈勇爭先思垂竹帛之功誓雪朝廷之恥矧茲殘孽不足殄除况諸道世受國恩身縻好爵皆貯匡邦之略咸傾致主之誠自函洛搆氛鑾輿被敵莫不指銅駝而眥裂望玉壘以魂銷聞此勤王固宜投袂更希憤激速殄寇讐永圖社稷之勳以報君親之德迎鑾反正豈不休哉據真格功行滿千者身登仙五百者子得之三百者孫得之昔許子何陰功密德流於七世洎東晉而遠遊長史小掾三人登升主簿而下七人度世是知元根靈廕必有所逮太元真人茅長君乘雲龍白日上升常恨以激俗警弟不能潛通隱化為劍解術則終始混世乃靈真之本也二事者先生宜其得之鄧氏得姓在春秋兩漢魏晉繼有賢傑洪源演派或仕或隱自纍世咸居撫州麻姑山涵樂天和不以軒冕嬰纍洪嗣道高於世開元中詔贈臨川太守生福唐尊師諱紫陽以道法佑明皇帝為元門之師嘗用下元術使神卒朱兵討西戎之犯境若雷霆變化犬戎大敗時稱為神人福唐生華封尊師諱德誠少隨福唐侍內禁元宗奇其穎悟曰斯子必為教主因以巾簡授之使居華封觀其交神通靈除害利人之事備於先生所撰家紀先生即華封之從子也諱延康天機元挺法相沖雅貞元初隨師於會稽受三洞筆籙尋復麻姑山葆神茹氣淡然與天倪元合三景五牙二星八道之祕雲章龍篆齊元醮會之法神悟靈契悉臻宗極屢為廉使郡守請敬師受排邪救旱顯應非一元元張祋之道大行於鍾陵間寶歷中舊相元公制置江夫人有疾忽夢神人云何不求麻姑仙師元公遽命使禱請既至而疾果愈夫人稽首奉籙俱為門人復以明威上清之道授鄒平公文於廣陵涼公逢吉於夷門自是藩服大臣爭次迓勞太和八年秋又詔至闕下嘉其道德籍隸太清宮暇日遊龍興觀見壇宇蕪圯怵然曰豈可使勝地堙廢吾其居而化之遂精嚴像法建濟靜治音持洎幢節龍繒之用約數萬計不一二歲其功成皆齊章符醮之贈固不封殖於民也開成初鴻臚少卿屈突謙妻李氏魅狐得孕厥害濱死先生以神篆針砭既服而誕則妖雛數首皆斃矣道尊而神昶每與帝王言歸於清淨與公卿言戒其止足與將進者言勉於淡泊與其徒弟子言勗之勤久每傳法授籙持爐焚章儼容虔慮間不容髮故自三事巳降多執香火之禮神都威儀與名德道士半出於門下法教之盛近未有也昭肅皇帝幸興唐觀訪先生修真之道宸旨嘉豫錫以紫服後帝受籙於南嶽廣成師請先生為監度上嗣位爾時於內殿訪其元言第以道德黃庭西升經旨應對若丹砂硫黃之事置而不論居常惟食元氣微飲旨酒熊經鳥伸而已故甲子餘八十而顏朱無縠文豈非噓吸沖和棲真通粹之效歟前歲季冬以墜足告疾止不能履他無所患今年十月忽料經典告牒及所撰科法儀軌一以焚之弟子請其故默而無復下會夜夢遊神鄉殆非人間世後輒獨坐叩頭稱善門人問之答曰吾今在天台修齊汝去無擾吾也十一月庚申形解於觀之清室享年八十有六據真為右弼王真人治桐柏金庭山即天台之洞臺也先生其授事於斯乎且法不可絶家風宜有人承之道德經以子孫祭祀不輟為貴則真胄之續宜其然哉先生有子三人長曰道牙棄舒州太湖丞授三洞經籙次曰道石本缺一字試協律郎假職閩越次曰道苗襲經符奉齊戒以法教之系駐於龍興道牙奉遺告護元輿歸於故山以十三年十二月三日葬於撫州南城縣故鄉諲潭里湖頭村靈山硤祔曾祖父塋嗚乎浮遊於四方雲無心也光赫於上京教可行也神於故鄉孝不忘本也畋授正一法於先生宇下今令似以銘石見託既熟元範非所宜辭乃揮涕為銘曰修之身其德乃真真不渝與化為徒蟺乎劒乎後何斯年舉空衣於山隅余大中八年為前渭南縣尉閒居伊洛常好娛遊春夏之交獨登嵩少路由緱嶺謁升仙太子廟雲霞之志於斯浩然遂搆詩一章用申凝慕今者謬塵樞務已及四年忽覩成庶大夫奏牒請以元元廟李尊師配住賓天觀則知緱巖靈宇儀像重新輒寫舊詩寄王公請標題於廟內乾符四年閏二月三日開府儀同三司行門下侍郎兼兵部尚書平章事監修國史鄭畋記黯字希孺穎川人舉進士計偕十八上而不第隱居同安臣等世籍漢民也雖地沒戎虜而常蓄歸心時未可謀則俯僶偷生既遭休運詎可緘默伏思中國之患邊戎其來久矣唐虞夏殷之前則淳風未漓夷夏自判故干戈不興事亦宜矣繇周以降或侵或伐無代無之然則享國長久君臣有謀唯是其餘不足徵也周漢討邊之事臣知之矣請較而論之以為國朝比且周之伐獫狁也以斥逐為心不常事之故進則遄征退則息兵致其邊鄙無備壁壘不營此乃周之謀失於不固矣漢之討胸奴也乘時之豐恃兵之雄深入窮荒莫計遠邇故雪山青海皆為內封其後財匱力殫厥功不就遂交和親之好自浼帝屬延法後時斯為漢之謀失於太廣矣唐有天下邁於周漢之道一家其六合一心其兆人唯茲犬戎未能無患當開元中有將臣善於攻戰振張皇威殲殄醜虜自秦地而西有地數千里此則展拓周疆翦截漢域所謂廣袤得其中矣其後國家以內寇時起不遑西顧其蕃戎伺隙侵掠邊州臣等由此家為虜有然雖力不支而心不離故居河湟間世相為訓今尚傳留漢之冠裳每歲時祭享則必服之示不忘漢儀亦猶越翼胡蹄有巢嘶之異噫其怨慕也有是陛下新統寰區以慈仁化育聞之得不惻然而軫念乎夫事有可行勢有必克寸苟懈而不為是失古人見幾之義今國家無事三方底寧獨取邊陲猶反掌耳矧故老之心觖望復然儻大兵一臨孰不面化今陛下采臣之言則先選良將不以前負勳業者與更授節制者為之何者彼功崇矣彼位極矣復將悉力營之哉以此臨事必多自顧願陛下詔班行之中器識有殊籌畫可用者踰一資一級授鉞將兵俟見功庸而後加之爵賞必能摧凶破敵無所愛矣戎翟者亦天地間之一氣耳不可盡滅可以斥逐之伊周漢之事如前所陳今之所取願止於國朝已來所沒秦渭之西故地朗畫疆域牢為備禦然後闢邊田飽士卒可以為永遠之謀迥出周漢之右則臣得棄戎即華世世子孫無流離之苦生死幸甚黯去歲自褒中還輦下輔文出新試相示其間有江南春賦篇末云今日併為天下春無江南兮江北某即賀其登選於時矣何者以輔文家於江南其詞意有是非前眹耶今春果擢上第夏六月告歸省於閩命序送行某辭以未第言不為時重輔文曰吾所知者惟道與義豈以巳第未第為重輕哉愚繇是不得讓鱗㣥之衆也必聖其龍羽族之多也必瑞其鳳鳳非四翼龍非二首所以異於鱗羽者惟其稀出耳嚮使日百時千盈川溢陸則蛇虺鳩雀無非龍鳳矣其誰曰聖且瑞哉進士科由漢迄唐為擢賢之首也寰瀛之大億兆之衆歲貢其籍者數才於千有司升其名者復止於三十其不為貴而且稀乎輔文早歲業儒而深於詞賦其體物諷調與相如揚雄之流異代而同工也故角於文陳而聲光振起今之中選是榮其歸想寧慶之晨為鄉里改觀孰不謂人之龍鳳乎懿哉輔文是行也足以自重或問為物之暴者出於狼虎也何暴攫搏於山藪之間爾權幸之暴必禍害於天下也狼虎焉得而類諸夫狼虎之暴炳其形猶可知也權幸之暴萌其心不可知也自口者不過於噬人之腥咋人之骨血自心者則必亡人之家赤人之族為害其不甚乎然則權幸之暴不能抑亦有國者不能設備以禦之俾民罹其害曰虎狼吾知其能禦者弓矢也權幸如之何能禦也曰刑法曰彼秦漢其弛刑法耶何趙高王莽之肆暴而不能禦哉曰彼秦之高漢之莽得肆其暴者皆由刑法之不明也苟明暴何自矣噫田鄙者由能執弓矢以彌其暴耳有國者反不能施刑法而禦其暴豈有國者重其民不若田鄙者重其生哉昔有兔類而小食穀於田及穀熟農者穫而歸之兔類而小者亦隨而至遂潛於農氏之室善為盜每竊食能伺人出入時主人惡之遂題曰鼠乃選才可捕者而舉焉人曰蒼莽之野有獸其名曰狸有爪牙之用食生物善作怒才稱捕鼠遂俾往須其乳時探其子以歸畜既長果善捕遇之必怒而捕之為主人搏鼠既殺而食之而㣥鼠皆不敢出穴雖為巳食而捕人獲賴無鼠盜之患即是功於人何不改其狸之名遂號之曰者末也蒼莽之野為本農之事為末見馴於人是陋本而榮末故曰乃生育於農氏之室及其子巳不甚怒鼠蓋得其母所殺鼠食而食之以為不搏而能食不見捕鼠之時故不知怒又其子則疑與鼠同食於主人意無害鼠之心心與鼠類反與鼠同為盜農遂嘆曰本用汝怒為我制鼠之盜今不怒鼠巳是誠失汝之職又反與鼠同室遂亡乃祖爪牙之為用而誘鼠之為盜失吾望甚矣乃載以復諸野又探狸之新乳歸而養既長遂捕鼠如曩之者或問古之士能直諫不君之君者其誰為最曰有諫秦者齊人茅焦也曰夏無龍逢耶殷無比干耶曰不以之無而功德相遼耳夫諫者不獨以言忠而欲其氣雄不獨以名彰而欲其事立四者克備是為難矣昔嬴氏貪噬㣥雄以取天下豪暴奢侈古初無先故非必為而諫必距當其遷太后於雍有及泉之誓凡戮諫者二十七人矣天下忠赤之士莫不囚氣鎖詞是時焦能獨奮勇果不顧其威且肉視虎狼冰顧湯金隻諤諤造庭折其四失俾暴主悔非遷善敬從其言繇是骨肉之恩斷而再續君臣之義捨而再交諫諍之路塞而再啓皆由焦之功也噫忘軀徇忠亦諫者之職然決死於二十七人之後不難乎其心哉進諫於二十七人之後不難乎其詞哉斯可謂言忠氣雄名彰事立備矣豈若龍逢諫桀比干諫紂徒自柔聲婉詞而又身不免事不立其足為茅先生之徒歟問者喜而退嘗得揚雄云君子在理若鳳在亂亦若鳳謂隱見之得宜也將欲神之以為鑑逮覽其劇秦美新則有異乎是雄仕漢遇新室之亂以不能去之又懼禍及乃為斯文以媚而取容嗚呼鳳固若是耶果若是則鳳遇矰繳而猶回翔其間邪夫君子之仕也所以行其道道之不行也則可以明其節彼莽之不臣雄時在列宜以君臣之義興亡之理匡救之以行其道苟畏其威愛其死則可投簪高謝以明其節詎有苟祿貪生徇非飾詐廣引秦過以譽惡德是稔其篡逆也與古之持顛扶危死名節者背而馳也則向者所著若鳳之說得不為誣鳳也哉雞常禽也晦曉而不昧其候鳳靈鳥也理亂而不知其時耶噫言之不思有如是耶或曰古之人臨危制變亦有權焉雄知莽之不可匡也故矯為其辭姑務脫禍是亦權也子何過之深歟曰不然夫權者聖人有焉所以不失其道未見捨其道而從其權昔仲尼仕魯以季桓子荒齊樂知其不可匡也乃去之曾不聞矯為其辭以求容於魯雖仲尼日月其德人之不侔然雄亦慕仲尼之教者以著書立言為事得自易哉夫立言者豈不欲人從教耶且巳不能信人况求信於人乎語曰君子先行其言而後從之豈斯言可欺也哉大中初年大梁連帥范陽公得大食國人李彥升薦於闕下天子詔春司考其才二年以進士第名顯然常所賓貢者不得擬或曰梁大都也帥碩賢也受命於華君仰祿於華民其薦人也則求於夷豈華不足稱也耶夷人獨可用也耶吾終有惑於帥也曰帥真薦才而不私其人也苟以地言之則有華夷也以教言亦有華夷乎夫華夷者辨在乎心辨心在察其趣嚮有生於中州而行戾乎禮義是形華而心夷也生於夷域而行合乎禮義是形夷而心華也若盧綰少卿之叛亡其夷人乎金日磾之忠赤其華人乎繇是觀之皆任其趣嚮耳今彥升也來從海外能以道祈知於帥帥故異而薦之以激夫戎狄俾日月所燭皆歸於文明之化蓋華其心而不以其地也而又夷焉作華心黯自關東隨計來闕下經華嶽祠有巫導以祈謁乃徹蓋整衣馨爐瀝觴俯拜而前緘默而退巫曰客是行也務名邪官邪胡為乎有祈禮而無祈詞神之肸蠁而答盍舒乃誠曰余其來拜以嶽長㣥山猶人之有聖賢草木之有松蘭百川之有河海鱗羽之有虬鸞屹屹崇崇干霄拄空載國祀典宜人攸宗拜之思盡乎余之敬詞之默懼乎神之聰且神視果高而聽果深必福其善而禍其淫余行合乎神也必照而臨如欺乎神也祈之乎何心巫兮余言無妄兮為妄言者之針禹賢益以天下授益采其謳謠之所歸卒讓於啓故啓不由父授而書無典訓黯追其旨作禹誥嗚乎惟位於君惟父於民禪授無疏親親惟其人德之肖仇敵可道之違昵愛不可苟昔堯舜傳人今吾傳家孰不知其私耶所以然者天人之意然也汝其念之陶者土之器也持之得其人則完不則毀位者國之器也持之得其人則治不則亂吾得之惟艱汝繼之無忘其難苟汝後之不克肖宜復於堯舜之道歸於有德勿以吾傳之為世有之嗚乎不賢而毀其器俾後援私而罪我也汝其念之覆載之中胸有心者有其謀然其謀則必為巳而鮮為人也故有孜孜汲汲力於謀者得之則逸身豐家不得則嫉時怨命噫此真澆風薄俗者之心也豈古聖賢之心乎夫古聖賢未始無謀而不求利於身也不求利於身而利自及也何以明之堯舜有大寶之位不傳於子而傳於他人是為天下之謀得其君也大禹疏鑿橫流過其門而不顧啼嬰是為天下之人謀出其溺也后稷勤耕播植百穀是為天下之人謀粒其食也其謀信何如哉古今語帝王者必首於堯舜論功德者無出於禹稷風馨億齡不復磨滅其利身又何如哉近世之謀則不然小者不過於謀衣食大者不過於謀祿位督之利天下者或未見謀嗚乎持是心而希其道侔於古人是猶欲越山海而捨梯航其進也無由矣雖今聖人在上賢人在位其謀靡為不然恐蚩蚩者日用而不知也故因文以辨之且欲賢不肖皆公其心苟賢不肖皆公其心則上古之風日可復矣
