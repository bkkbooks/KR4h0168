front:
  text: 全唐文欽定全唐文卷四百五十六授大歷十四年進士又舉博學宏詞
  hash: sha256:2fa54f671e641f7f9a7d03ca1249b6b5d69565be4c3a31d6c8fd3a6d64639019
  markers:
  - {type: head, offset: 14, content: 獨孤授, id: KR4h0168_NFKB_456-h1, level: 1}
body:
  text: 先王以武不可獨任故受之以師得其人則百蠻風靡失其職則九廟陵夷君於是慎擇其難申命分掌動衆以正臨下以長合人謀兮順天獎慎戰也在知機而萬全慎身也如臨深於百丈夫然後出號令拔忠讜樹藩屏疇土壤截方隅以無事威戎狄以稽顙俾其政成者列爵功高者受賞是知師貞丈人之稱也至若藎臣嘉謀以國利不可動忠不可賊威遠方以慕化訓萬民以勤德使強弱不相陵乃勝殘而可克力牧佐之而不疑軒后居之而不惑此帝者之師也蕭蕭馬鳴悠悠斾旌伐叛則刑立柔遠而德成上乃奉君之職下乃守臣之貞湯武用之而定業伊周法之而作程此王者之師也審官以統衆求賢以自輔必觀釁而後動豈窮兵以極武不害閭閻不敗工賈政得其經事合其矩管仲因之以相齊桓晉文由是而稱盟主此霸者之師也暴而不戢安忍無親徒侈其欲輕用其人處勞則先加於衆居後則樂止其身猶回邪而自保迷大路而不遵州吁處之以國滅子反效之以禍臻此黷武之師也嘗試言曰王心無逸師出以律惟德其欽惟刑是恤自然道貫三五勳崇四七不假築京觀兮定武功逞淫刑兮數軍實言乎師貞在人其來自久動無悔敗位不虛受追惟古昔厥有臧否是則頗牧之勇敢可以執其手平勃之臨事可以難其後伊呂之行可以欽其順疑其守不失其攻不有行稱文武之略居成社稷之守神祇以百福休祜子孫以百代不朽蓋由尊嚴之重以禮立訓師律順正動而何咎術有以厭勝則靈旗之制可知寧不師古或取諸隨命曰靈表神靈之託考其象亦象之在斯前史載焉可得而舉用於兵禱之際在乎郊見之所詳厥制之由始信法天而為紀翠華匪倫黃鳥可擬因通帛以作繪樹修竿而直指三星前列成太乙之旗九仞高懸拂堪輿之壁壘垂彩揚光煥其有章牡荊郅偈而乍動登龍蚴蟉而欲翔物之精也必異神之用也無方靡微風知其整整含霽景覩夫央央惟時越人害及疆場彼則神怒我將霆擊乃祈幽贊乃導彼役所以酌意於天所以信威於敵撰辰其吉用致精一元穹是饗太史祇祓及瑄玉既陳而靈旗獨出順徂征之所向庶獲醜之可必異先登之蝥弧同指佞之屈軼帝車爛爛靡豐蔀而見斗君象昭昭狀寅賓之出日終能吞若裔土克全師律豈得之於伐謀將有類於斯術嘗聞王者兮厥德不回兩階之舞兮三苗實來則吾君紹重華之廣運超帝徹之雄才布澤而陽和乃發抗威而枯朽易摧且將舉天畢以掩凶暴傾雲漢而滌氛埃古靈旗者奚足道於今哉昔佽飛兮言越川湄佩寶劒兮安流自持進孤棹以將半乃雙蛟而見追曳紐搖環欲奪晶熒之氣呼風吸浪先呈夭矯之姿初其徑楫將移輕帆未濟嗟履險以多變歎韜鋒而自衛俄而積水怒陰雲蔽彼拿空攫霧之狀當一明一晦之際其來也壘白刃旗短袂不足以當其勢朱鬐赤鬣夾巨艦以風馳火尾金鱗奪雄鋩而電逝乃言曰彼亦奚逃徒為汝勞衝黭黮以天暝蹙嵯峨而浪高徒觀夫鼎爾騰沸雷然怒號雖欲穀其口牙其刀抗爾以千艘踣若質流若膏爾能傷豫之一毛既激氣於煙景忽碎爾於靈濤是知計於生而不計於死利於劒而不利於水互出沒以神鬬洶崩騰而陳起舟旁奪魄求形於似海之喉岸側甘心挂骨於如霜之齒及其沸渭砰訇風號雷驚驤首如元雲阻色騰眸而白日韜精須臾勇氣勵神機生拂首摧爪奮喉裂纓方澒洞於重險已支離於浚瀛於是海蕩山覆川停浪肅莫不駭其類奔其族元黃之血隨重沫於奫淪磔裂之形蝕餘威而蹙縮卒使劒返人安鱗窮血殘極浦煙霽澄江景闌逶迤然鷁首光轉錯落爾龍泉影寒冰彩猶鮮激金璫之照曜星文尚濕歸寶匣以闌干嗟乎冥心者其勝如此恃力者其形若彼徒欲徵怪異壯奇詭至今人語其風見英姿之卓爾楚竹嬋娟英柔碧鮮折其膚以為簟俟方暑而登筵信服物之妙麗何巧心之廠田坴綿故匠士意其用也清以目焉有若粉署仙郎翰林高價義均膠漆官則同舍獲五花之珍簟當三伏之炎夏以為身之所安願與友而共藉嘉貺允屬其人如玉發緘而冰氣驚客入座而波文滿目在一物之足貴亦兼金而匪欲親於體有寢處之同觀適於時念卷舒之齊躅矧夫畏日赫赫蒸雲爍石高館沉沉面池枕林芳華交映軒宇靜深乃爾娛坐開張聯心清引微飈涼回夕陰可以愈幽毒可以蕩煩襟賦明水而詎屏委輕扇而自任幸君之拂拭奉君之休息襲握蘭之晨芳參覆錦之夜飾貞可比操文用表德入芙蓉之幕煥以相鮮照瓊樹之姿粲其增色亦有別號行唐是稱流黃紋織錦象凝霜承以羅綺薦於玉牀肅蔥蘢之翠幄取寂歷之洞房君不至而碧鮮回美人獨居兮清晝偏長雖或殊姿而異質亦云蠲暑而致涼物則周用時然斯在遇陽之夕陳於寢以發華洎陰之興韜於筒而祕彩懼流麝而將暗同棄席之見待儻無忘於遺簪為君含情而不改物有可為之感憤彼玉也則良寶而斯韞豈不以識貞或寡至真難鬻白虹之氣莫通元圃之英久伏精鑒頗期於卞氏無厭匪及於虞叔懷特達之性豈傷於山抱堅剛之姿寧毀於櫝雪澤膏光陰中之陽工成六器色備五方是飾容乘乎車服亦將頒瑞於侯王表其華同貞士之素履韞於密叶至人之退藏誠異乎石處而以居可比夫處實而若虛我則物之貴者彼宜力以求諸惟賢有孚豈名是沽佩諸身可以節君之步執於手可以息君之趨或稱之以琬玉或嘉之以瑾瑜韞櫝如將於慢藏匪瑕之匿連城儻用之善價何脛之無是知接神祇者必我之由奉朝聘者亦我之求雖含光之未發信入用而則周伊入用也理均乎兼濟其含光也義等乎獨善詎若韞鄭鼠之足嗤寧燕石而莫辨有客感而歎曰玉也者固可取貴乎天下今不售於人猶獨高其價垂大賢之盛德非小禮之能捨故有偃蹇當時沉冥委化必使反荊王之深惑審田文之見詐則美玉器而髦士官豈徒埋身而照夜昔日趙氏且衰為暴秦所易徒稱割城以求璧然必背約而棄義將受其禍敢圖其利安定存乎變通得失繫乎愚智籌量未決君臣大恐賴繆子之薦賢得藺生之餘勇語之不怍觀者咸悚庶將城入而璧留焉使趙輕而秦重夫其壯節惟一至寶無雙奉草芥之使至虎狼之邦於是秦王自以強可臨弱志揚氣高謂我匹夫不難以制謂璧無足尚安得逃方坐章臺之中列萬乘之雄㣥臣陪位使者趨風因發檢以求璧陳結觀而表衷浮光爛兮鏡吐潤色皎以冰空語未及於前約寶方傳於後宮果無有償城之意欲坐收獲璧之功藺君乃探物揣情沈機內萌譎指瑕以復取遂立言而未平攄壯心而激發抗英辨以縱橫怒髮竿聳瞋目電驚且使辱命將焉用生請以臣之頭璧俱碎君之軒楹我合詭以全變彼示詐而望誠九賓之禮徒設間道之使已行義必付於知巳色無懼於就烹卒能成兩國之勝負駭千古之威名然則寶也且所據神異取之不可以僥幸幾星碎以棄秦庭終月圓而還趙境復得曜叢臺之瑰麗增昴宿之輝影於物也善價斯存於國也懿圖惟永是知興衰之大略社稷之遠慮必假賢豪用能輔助何全璧之事立亦全國之功著誠乎得士且昌惟其善馭坤載靈物母之者金稟清英乎元化耀方色乎少陰將善利以宏博豈難得而迥深河之水配融衍以表性女之質齊婉潔而為心無脛而將無翼而翔靜波空而鏡朗動星駭而珠光體之則剛柔可易形之則大小無方爛其春冰莫能解之以明庶炯爾秋露孰能晞之以朝陽以登真者尚其變我色則為黃為丹彼神則九鍊九轉驗此金訣求諸大化理契斯伏可得而長存致乖而飛莫知其所舍乃有志翹鴻寶心繫紫庭閟響岑寂棲真窅冥赫珠光之炎上陶素質之陰靈苟還丹可以變其骨非有力所能制其形飄然將駕夫雲螭渺然或觴於瑤池望三山以增逝顧九野而興悲後天之術兮曾莫勤斯朝菌之秀兮不其殆而夫以見索隱以明推晦究精理其必然玩常情以多昧伊姹女之為美諒山經之所最且其受制黃牙可效於物寧若虛聞絳雪莫耀於代是將涉天潢者我道其津首雲路者我清其塵方乘化以適道孰知夫所以能神戰國之分裂寰區境削兵抑者不惟燕乎昭王乃卑身以勤德懷霸業之遠圖伊取士之或異及成功而莫殊抗珍臺而臨碣石廓賢路而走幽都表之以高居尊之以厚禮曷云成土木之弊適以備股肱之體於是雲竦山峭穹崇䆗窱架坱圠以上馳飾金寶以內照泛易水之浮景蔭尾星之垂耀是為層構臨而時傑臻亦猶甘餌懸而巨鱗釣展禮於此感之在彼降其尊以奉其卑豐於物而薄於已臨燕薊之衆目傾齊趙之奇士士之得可霸其將四海有焉士之失且亡豈直千金而已然則作為臺館實耗財力始若勦人終能肥國宋歌澤門以歸怨燕尊郭隗而耀德苟順動而若斯尚何求而匪克義積道光聲馳風揚㣥材並用墜業乃昌屈於一人以釣士則開霸而圖王侈於一臺以釣國則兼大而稱強誠異虜其臣而必弊瓊其室而是亡且惟臺則沒矣代如何其帛丿糸邈千載蒼茫一時孰為來者曾莫嗣之國是以興鑒黃金之豈吝賢如可得下白屋而寧辭故九九之術不棄齊桓以成功善善之道克廣燕昭以垂風用能首五霸冠七雄抑未有為國而失士可攄盛烈於無窮白者物之正色采自人之發揮有善政之功何不合執必遷之性詎能非所以投質而丹青必應改作而元黃莫違玉色可移酒變美人之貌素容可化塵緇遊子之衣始以潔白為佳無文是寶流行於一掬之緑遷移於五彰之好假乎異物奚謂莫知其他變而從宜匪曰不恆其道是知白之美者采必加諸始謂不愆其素終成求媚之虛潔其身敢望於潤色汚為染勿訝其文如露變盤中之文氤氳而乍結雲改封中之色燦爛而潛舒然知素以為貴文而後進棄彼而不緇從我動而無競知其白不足以含章美其文必滋乎彩潤豈舊染於姦色因物有遷自委質以成文非我無信於是推其嗜好窮其妍否虛白為文藻之宗繪事為朴素之後坦然明白佩此以飭身婉而成章是期乎假手若以考自然之性明發彩之功專其容知變以為義形於色不雜而為忠英英之雲抱日之文何染鑿鑿之石補天之力何工如以素質莫問奇文是啓耀之以不慚之文居之以勿執之體可黃可黑將興墨子之悲或素或青未易殷王之禮不然者何以麻衣雖白兮采服斯有如雪之潔兮如濡已受黔生白鵠之羽赤點青蠅之首發顏色兮不辱其身離堅白兮莫失其守懿夫明斯理者然後知吾道之不苟漆園傲吏志愜神王和而不唱或崆洞之間或濠濮之上誠道樞之同體表人情之異狀爰感激於惠施乃興之於郢匠嗟乎功有善價吾道之亞既出鬼而入神亦千變而萬化可以迎夫遠近可以接夫上下用之朋友管鮑可以全交行之君臣桓文可以致霸請言其始也鼻之堊兮匠之良子有度兮我有長形枯木兮自若斤成風兮允臧土微微以霞散刃熒熒以電光信之者雙美疑之者兩傷其為心也以濟其為妙也更相吾固知青萍之術兮空設公輸之巧兮徒嘗實由氣同者合聲同者應揮手餘地因悟解牛之能忘情銛鋒宛識狎鷗之興豈兩賢之相厄乃二人之俱別疑有不度其時不稽厥疑蒿目猶視蓬心自師代匠石而忍垢騁鋒刃而勿思永昧心得圖為面欺苟臨事以率爾或後悔而悽其且傷於手之是懼亦何暇乎涅而不緇曷若素緝乃事爰定乃志料輕重審同異曾無恐泥之憂頗識斷金之利雕鎪合乎神理磨礱出乎人意苟自得以忘形亦可斫乎有鼻至於道洽情融體異心同求之不得感而遂通利器見投尚倉惶於麾下良工斯在乃拂拭於塗中君既有執柯之便豈比夫按劒之雄東海神木是曰蟠桃可得聞其廣而未量其高蓋蒼龍之所臨據白日之所光照結根於凌北之峯稟氣乎衡星之耀其生植也與乾坤始其蟠縈也至三千里上鳴天雞下宅鬱壘徒駭於説莫原所以配若木以相望冠扶桑而特起爾乃煥初陽之杲杲壓巨海之漫漫太皞司方以流盻羲和策御而上干傾高柯而飛鳥罕及垂巨葉而青雲共蟠何帝休之名志豈姑繇而變觀窮海陸以標奇抗蓬瀛而爭聳疑蒸林之相合乃一木之所擁照溟海則攀其若浮升日輪則遠視如捧霜雪莫能以雕換風濤庸得其震傾拂垂雲之修翼蔭吹潦之長鯨非有歲之可紀每先晨之效明拂青桂於陰魄掩白榆於太清信植物之神秀壯元化之曲成木無與儔其誰騁兩鬬之術子不可獲安有被三竊之名是知瑰異之説或處明而若晦區域之心多玩小以疑大天無所不育地無所不載莫出混茫之中咸居耳目之外偉蟠桃之遐絶宜列仙之遊會安得探神物而駐韶顏涉滄海而登朔山驂素虯之天矯駕彩鳳之回環庶因此以捧日願修條而一攀有漢武徹惟時巡省窮楚之望極江之永舳艫塞川旗甲蕩景洶洶旭旭虯盤龍騁駐清蹕則洪波可遏赫皇靈則潛怪可怛何彼蛟之夭矯據積水之空濶謂佽飛之劒莫前滅明之璧是奪天子乃戒無譁於羽衛思有用於弦括命舟牧回青翰而上詔弓人奉烏號以登肅天儀以山立將親發以抗稜陰察變態雄猜跨騰古冶之倫眥裂不敢擅其勇逢蒙之黨技癢不敢專其能我矢則直我弦斯控持滿而英氣頓飛命處而幽姿必中歘飇颼其電霍卒頸嚲而胸洞贊獲者鼓殷天之雷稱慶者躍如熊之衆始乎發若神兵爆其有聲洪波雪湧白羽月傾突紫肉裂素纓餘怒蚴蟉上浮泓澄踣質已靡於巨艦流血方走乎東瀛介以鱗莫能捍七札之徑神之化不能保重泉之生萬靈震駭九泒徐清然後海若扈蹕陽侯洗兵山川肅其晏如雲霧廓其四除涉者利乎涉漁者安乎漁於是左史趨進執簡以書曰天子幸潯陽也親射蛟而獲諸遂翻龍旆韜象弭篙工奮棹歌起威厲乎斷白蛇氣雄乎絙青兕隘秦皇之觀日追夏后之勤水且夫君以勝殘為大臣以反德為害亦將制於彀中靜此宇內俾貫革之藝息垂衣之道泰豈徒與射夫漁父較勇而論最次天地之量者海為之大首鱗介之雄者鯤靡有敵稟形徒怪其恢詭造物孰根乎朕迹慌北溟之安流考南華之遺迹好奇焉得以心駭乘理可同乎目擊且魚之狀有踰七日之尾而海之深蓋積八紘之水靜則高浪為之中輟動則連山為之四起鮮鱗俯首以駿奔元冥投足而去視其有適也越孟諸之夕宿其自縱也豈鹽田之陸死況風濤乍息空水相涵橫巨鱗而海分為二赩雙目而日為之三涾沱迆延載回載旋嚇鰓則飛沫成雨擊尾乃跳波蕩天任公之術靡措龍伯之力徒然生無以傷庸識其長久大不可度莫知其幾千固非海若之所俟屬天雞之所犯干不吞龍舟以作暴豈貪牛餌而自殘遵坎德以獨適隨混元而變觀本於鱗而孰知終始化為鳥而何足控摶一氣潛融飛沉以通刺天之鬐拂口垂雲之翼從風曜靈韜映以驟晦溟漲豁落而半空方鼓怒於皓漾歘騰凌於鴻濛觀其羽之化也將飛風之積也未厚六翮之力相切萬流之波却走恐天衢之不容顧水府其何有嗟鷙鳥之纍百異亢龍之上九彼黿鼉之穴處而釣絲或困彼鴻鵠之雲飛而網羅才遠曷若縱溟渤而摶扶搖其勢固以相萬茅有衆靈名之為盛雖百代以呈質終三脊以居正每彰封禪之期如受鬼神之命生於古既光七十之君獻於今更表千里之聖出於淮甸來彼江潭使馳於北星流於南捧執而有嚴有翼緘縢而再四再三及夫覩至尊呈大國致於金華之上啓於瑤池之側施陳而百瑞慙容撫玩而千官變色美其出有常地生必舊形非成野鹿之禮寧假澄酒之馨超常倫而薦闕殊衆品而實庭理盡三分似叶通三之化體皆一類欲明得一之靈隱見之時吉蠲中禮獨標珍草之狀悉皆兄弟之體整齊而玉匣遙傳潔靜而瓊華新啓應盛禮而居首表常度而為後道未格也雖有采而必無嶽可封焉縱不求而自有觀王者之得失知禮事之臧否且夫玉帛廣矣何尚於茅豈不以貴稱三脊重載六爻始彙征於吳楚終遍藉於陶匏奉上之時且報云亭之兆升中之後因知天地之交吾皇由是命太史詔宗伯議封山謀勒石備文物與禮器修玉函與金策使聖功登於九天靈茅光於三脊使臣稽首稱萬壽以旋役古先哲王允釐內外雖庶政之咸敘在司天而為大所以叶乎上下所以察乎交會其職廢而時令則乖其職修而黎人永賴歲既陽止東風作矣惟時羲仲奉若天紀候暘谷之初升揆農功之當起寅賓克展守而勿失耒耜乃修視其所以觀乎旭日之漸也麗蒼穹而曜晶按黃道而徐行萬物發春仁氣良由茲始四方仰照陽德協於離明盈縮必循夫晷度職司寧闕其將迎木位值於扶桑初杲杲以出土膏潤於南畝且澤澤其耕故王者重焉官不虛授考之歷象則象是用貞準之田農則農靡候惟帝典之明徵示人有常惟日官之無改永代斯在平秩乎下以播百穀欽若乎上以刑四海慎爾有司惟其敬之是將邁景德於太皞俟神功於女夷玉燭開耀金烏效遲致人和而歲美無亂日而廢時況吾君承乾元化昭宣敘三光以著象乘六龍以御天經紀不忒職官維賢分命之事舉曲成之道全觀寅賓之出日端稼穡兮大田願聆舜絃歌唐年因末光之可就與羲馭而回旋滄洲一望兮其傷實苦靈查萬里兮越在海浦何遭遇於聖日獨埋沒於重土島嶼雲深風塵歲古可為萬乘之器郢匠未斫願作浮海之桴魯人無取不取其材又無良媒驚沙苦霧激電奔雷根柢折枝條摧勢窮兀兮半隱青樹色蒼茫兮渾生緑苔波濤灌注同汨羅之洲渚川澤卑濕類長沙之浦隈釣客登頓漁翁往來自然形變為枯木心成於死灰誰憐在盤根之春當擢幹之日對上苑臨溫室植紫陌以獨秀蔭朱城而未出春風驟入花飛微而雪下晴煙四斂葉布濩而雲密誠以負大厦之材濟巨川之質何斧斤之為患使形骸而自失悲夫昔之繁華也如彼今之搖落也如此故知道不常泰亦不常否物有萬生亦有萬死事既同於糾廠田坴庸詎識其終始彰周公之聖則大木斯拔表宣帝之興則枯柳還起君無曰枯查委之泥沙試斫為仙枕薦於公寢必能夢華胥之神國安蒼生之庶品君無曰散木棄之溝瀆試剖為犧樽登諸廟門必能縮包茅之醴酒降重天之渥恩濟美前烈垂芳後昆願君無棄於海上乘以登天朝至尊彼炎荒兮王國是賓比馴象兮越俗所珍化之式孚則必受其來獻物或違性所用感於至仁吾君於是詔掌獸之官諭如天之意惟越獻象不遠而致推已於物曾何以異徒見弭雄姿而屈猛志安知不懷其土而感其類揆夫國用芻豢之費則多許以方來道途之勤亦至與其紲之而厚養孰若縱之而自遂且彼集於禁林我則有五色九苞之禽在於靈囿我則有雙觡共抵之獸何必致遠物於外區崇偉觀於皇都是用返諸林邑之野歸爾梁山之隅時在偃兵豈嬰乎燧尾上惟賤賄寧恤乎焚軀非同委棄罔或踟蹰知拜跪兮則有謝渥恩兮豈無復得顧侶求㣥跨川登陸食豐草以垂鼻出平林而瞪目逍遙乎存存之鄉保守乎生生之福懷仁初就於牽掣順理竟資於亭育遊乎水同反身之龜處乎山異放麑之鹿大道茲始淳風不遐感以和樂亦參乎百獸率舞驅之仁壽寧阻乎四海為家奚必充帝庭之實駕鼓吹之車然後可以為國華者哉由是聖心孚於下國物靡不獲其所化乃允臻其極放一獸而庶類知歸遂四方而萬代作則彼周驅犀象漢放駿馬未可論功而校德逖矣外區實生珍異彼靈獸之則獲製良裘之斯至聖王之所未覩獻令之所莫備叶朝宗則來自金方應中國而色當土位意者以烈風之靡興溟海之清澄德動天而遐方內向氣入翼而貢獻足徵方啓襲以進語如執輕之不勝颯然舜風翠雲之光可奮籠夫堯日青鳳之燠徒稱故其背崑崙踰弱水重九譯越萬里豈殊俗之所貴信希代之為美直千金者更輕稱狐白者非擬雖沉以天沼無易暵其之性燎以京薪獨異焚如之理斯乃動聽驚視孰知其然者矣夫物有難測必思之而不厭事有詭常亦推之而可驗何異績鼠毛以為布引龍鬚以成絲浣於火而自若弦於弓而有之況能禦寒涼以效用因裼襲以呈姿司服以登備皇儀而飾朝禮至尊爰御光紫極而耀丹墀遂使越人捧翟以求退王母收環而請辭㣥公乃拜手而稱曰休哉聖君之緝熙且天地不愛其寶豈戎夷敢愛其私乎將念委裘之有實防侈服之生禍表微於君子小人酌義於夏山殷火俾萬物之咸格期德風之在我於是天子曰俞彼則獻其琛曷若獻其可博哉匠人之心窮地之産覽如意之形製實用周而事簡惟竹也何慕實存乎貞素伊篠簜之既敷持斧斤而方顧擇其罕節稽此有裕燥之以火首之曲也中鈎裁之以金本之長也合度蒨練冰削離褷瓜布靡加雕飾之勞卒獲提攜之遇被以嘉名允臻厥成匪求榮觀自愜幽情彼用玉之為寶我則不謂其貞彼用鐵以為固我則利在乎輕指事明義此焉攸寄執之者安創之者智巾几周用邱園共賁外青中素合二妙於陰陽尚質貴誠符兩儀之簡易爾乃林棲沖寂室處虛白㣥義窟之黨速道流之客發奧滌元遐鈎獨索必資振擊以聳聽常假指麾而就適則知好塵尾者將害物以嬰咎執象笏者徒徇祿而何有用惻於心亦勞於手既因時而能遷在理順而體便素質或輕於流俗貞姿或重於高賢故形其貞則示屈而表伸致其用則物疏而道親豈節歌於烈士可投贈夫幽人願如君意以靡極與靈壽而為鄰遊者感異源而合趣指涇渭於秦樹涇如經也自北而南流渭若緯焉從西而東注惟相近以不息勢使然而自遇湜湜其沚昔既聞之於詩湯湯其流今則狀之為賦夫至清者渭至濁者涇惟清也鑒物之道著惟濁也含垢之義形共導金氣咸通井星混殊流之昭晰成一帶之瀠渟初以縱亂橫似爭長而難雜終以潔受汙何極暌而乃合禹功之所兩存漢苑斯焉博納乍異其色覺遊鱗之隱見必同乎聲帶長風之蕭颯象昭回之可求歌鄭白之有由飲馬投錢足以發明廉士決渠降雨足以殷富神州既相宏以利物寧自異乎並流知之者齊我以不皎不昧感之者比我於一薰一蕕斯乃柔以長存和之足貴近則順洪河之紆直遠則成滄海之濩渭同功一體叶靈通氣信殊穀洛之流寧爽淄澠之味夫然彼獨清而無偶非達識之所謂旗昭戎容武備天討上蔡干紀惟聖后之克誅南越徂征穆漢皇於肇造仰垂象以徼福洎有司而請禱封疆乃俟於指明寇虐方期於蕩掃詳其效虞典之舞羽體周官之禡牙九仞屹以特立三星粲其增華分野高標象指麾於帝力光耀旁發形耳目於兵家矧乎天飛龍而載圖北有斗而上獻當我師之欲勇乘彼衆之胥怨上宣其意將同乎十手所臨人授其蹤必在夫六斿之建至乃直指遐舉申嚴叶時且殷祭以誠若視凶徒而蠢茲小蝥弧之先登令斯行也奉郅偈以東向神乎尊之匪曳珠而極侈諒懸首而為期懿夫從人謀而罔咈則異於九旗之物攄皇怒以不賓取貴於八方之神故能殺敵啓靈伸威定國蟠喜氣以將遠揚勝風而自北儀在端表始令于師貞以出人知嚮方用符於我戰則克奚必彰翠鳳以崇麗法元蛇而辨色適足以計其功庸未可以靖乎氛慝睿略無敵宸心有征侔制勝於左杖聿稱材於牡荊方旗指以神輔俾蔡潰而功成蹈道不昧謀謨孔明徵太史於往制備唐年之主兵者哉明明天子五帝可六政不嚴而諸夏以清師不陳而遠人咸服於是旋大旆罷長轂劒無頓鋒矢無血鏃萬方悅四境肅同夏后之舞羽舞干犮周王之白狼白鹿邊鄙以之不聳神祇於焉介福至矣哉善師不陳之功烈烈而郁郁者也伊昔漢武黷兵於鄰殫天下之賦悉域中之人南浮瘴海北歷胡塵然後戎虜稽服甌閩入臣孰與乎兵不交而枹不鼓遂奔走而來賓我師孔間我后齊聖順魯史之武有七德法周書之農用八政不討遠而遠者自懷不耀兵而兵威克盛信八王之楷範為百代之龜鏡者也自太朴之既散俗易弊而難威蜂蠆或恣其毒螫鴟梟乃縱其翻飛是以有征無戰有守無圍家以文事革武事士以儒衣易鐵衣王者之兵也有征而無戰北方之強也不召而來歸旋師以出振旅而返示牛馬而弗服在干戈而載偃鄙楚子之滅弦小文王之侵阮百僚兮率職濟濟㣥士兮直言謇謇聲教所被則莫我敢遺日月所臨於是乎無遠蕩蕩昭昭不諱之朝忝陶唐之比屋敢頌美於帝堯劒挺銛鋒鐘列重器何百鍊之堅鋼向千鈞而效試刜於有質若無質以通元中乎有聲若無聲而斷棄則知淬磨歲久雄稜霜利不然焉能逗撓獸之形以中開使發鯨之聲而靜閟想提握以輕奮宜鏗錚而應刃忽投剛以泯入狀體柔而理順遂使風胡延視喜見其雄鋒子野聳聽莫聞其遺韻爾乃理將神契迹與道俱透茲堅重泯若虛無於是觀其用而駭矣取其類而比夫當破堅之時方切玉而則異逮絶響之後狀決雲而匪殊是以知其獲揮刜之效微齟齬之虞勿以簨簴可憑猶懷抵礙勿以金石之固尚蘊含胡宜其暗彰發揮靜應凌厲冰結於直透之始泉默於旁通之際莫知所觸故寂兮寥兮不輕其鋒信無凝無滯於戲亦猶道之肥者往無不通藝之至者物無不合苟韞藏於求用必開張而盡納載原斯器夫豈與鄰當耿介以發鋭若感通而應神所以願於重而宣利干於大以求伸果然刜音而不錚為異銛鍔而無厚可珍則剸元犀奚可以擬議輕白羽曷足以等倫故君子謂青萍干將之刃也可以比德於吾人臣等言臣聞征而無戰者王者之師也將而必誅者春秋之義也臣伏見周智光傲狠頑虐昏迷猖狡敢專生殺之威以慢王度崇飾姦慝之志自干天誅陛下謂罪在已躬視人如子永言式遏之義不得已而用師而將才受鉞兵未血刃已梟元惡之首載安舊汚之俗昔漢征黥布望塵而憂殷伐鬼方積年乃克豈若陛下朝命將帥夕殲渠魁制勝神速從古未有臣等不勝慶快之至武俊字元英本出契丹怒皆部年十五隸李寶臣帳下為裨將勸寶臣以恆定等五州歸朝廷封維川郡王兼御史中丞德宗朝以討李維嶽功授檢校祕書監兼御史大夫恆冀觀察使既而與朱滔謀叛自立為趙王李抱真遣客賈林説之使歸命乃黜偽號詔拜檢校工部尚書恆冀深趙節度使又加檢校司空同中書門下平章事兼幽州盧龍節度使琅邪郡王與李抱真大破朱滔軍於貝州上還幽州盧龍節度詔以恆州為大都督府即授武俊長史賜德棣二州俄進檢校太尉兼中書令貞元十七年卒年六十七贈太師諡曰忠烈自古通賢見機而作主上明明二百年之令主宗枝百代帝子帝孫吾徒頃因讒臣罔上觸藩之際遂懼傾危拒境抗兵偷存瞬息今朱泚竊據于宮闕朱滔長驅于河北聖上巡狩于畿甸希烈鴟張于淮楚昔班彪之智知漢祚之未衰馬援書生識光武之可輔今請轉禍為福以過為功戮力勤王共匡時難牒昭義魏博滄景等州即請部署四鎮齊驅魏博擊其前滄景掩其後易定乘其左昭義奪其右掃蕩妖孽廓清寰宇然後奉表紫宸獻書北闕榮家榮國豈不休哉抗字遐舉定州義豐人纍拜太常卿以中書侍郎同中書門下平章事以病罷為太子賓客卒年六十五贈戶部尚書諡曰成元日朝賀奏事官戶部尚書司天監準開元禮兼合於橫班同㣥官拜訖然後依次奏事自頃因循並未拜已前先就于階立奏事畢隨例便退臣與禮司商量請依開元禮戶部尚書已下於南班再拜訖便隨上公升于階就東向位立準儀注奏事庶裨闕典以補舊儀每年大中小祀都七十祭其四立二分二至臘上辛吉亥等日蓋為氣節也其後寅後申後亥後丑等日蓋謂星次也伏以氣行有時刻星位有次舍或定用日或定用辰不可改移請依舊制其或有別禱祭即是太卜署擇日並請準四月六日敕廢務日不用遂為故典舊儀注無日蝕廢祭之文元年建丑月祠部奏曰來年建寅月一日祈穀祀昊天上帝是月司天臺預奏其日太陽虧時禮儀使于休烈奏曰臣謹按曾子問曰當祭而日食其祭也如之何夫子曰按祭而已矣牲至未殺則廢漢初平四年正月當祭南郊日蝕又行冠禮博士殷盈孫與八座議以為正月元日太陽虧而冠有祼獻之禮有金石之樂是為聞災不嚴肅見異不怵惕也望下太常別擇日其二日祭太一準禮儀物同祠所既緣日蝕各守本司亦望同下太常更擇日
