front:
  text: 全唐文欽定全唐文卷九百敦仁字君澤固始人隱仙遊植德山下閩王昶強以袍笏不受清源節度使留從效再辟之乃求監小溪場既至請升場為縣舉王直道自代隱居佛耳山自號清隱數年卒
  hash: sha256:2688fdfb4fdcd2f2dfd313e9af650c72bc8141f61393f594c5be95a8500efe61
  markers:
  - {type: head, offset: 11, content: 詹敦仁, id: KR4h0168_NFKB_900-h1, level: 1}
body:
  text: 去邑西逾百餘里有山曰佛耳峭絶高天遠跨三郡有田可耕有水可居豫卜而築之榜堂曰清隱若夫煙收雨霽雲捲天高山聳髻以軒騰風梳木而微動寒泉聒耳戛玉鳴琴非宮非商不調自協非絲非桐不撫自鳴春而耕一犁雨足秋而斂萬頃雲黃飢餐飽適遇酒狂歌或咏月以嘲風或眠雲而潄石同穎閩永隆時中散大夫夫古之塔者兒童聚沙授記聞諸金仙子鬼神碎寶成功歸彼鐵輪王今之塔也非寶非沙彌堅彌大鑿鞭來之巨石狀湧出之浮圖是故人但有心物亦無體心以不貪為戒寶即同沙體以不磷為名石還勝寶我當今睿文闕三字聖元德隆道大孝皇帝君臨城內佛在王中雖日揔萬幾且躬行十善嘗曰植福靡因乎地賦命弗自乎天猶吾基構之肯承亦我梯梁之夙設而今而後念茲在茲永隆三年嵗次辛丑冬十一月上視朔之暇顧謂南面城中西來山左林繁薝蔔種滿國以馨香草偃苾芻占度年之蒼翠可安之窣堵鎮此高岡是月八日峻址環開貞姿片合層一至九樣獨無雙暨某年某月良工告成凡一十六門七十二角并隨層隱出諸佛形像共六十二軀繇是影籠千室猶趨潤礎之隅勢入重霄已戴補天之色壯矣哉壽嶽因之永固他山為之一空設使王曰毗沙擎應不動臺稱壘土比則非牢作之者莫與爭功目之者自然生善臣叨承出綍俾屬受辛瞻八面之貞明相高闕二字舉一隅之磨琢略類微才將何確論宏規虛忝堅令善志却於文罷特地魂驚蓋不容揖讓洪儒雕鐫翠炎唯深幸矣敢直言之永隆三年嵗次辛丑十一月記瞻閩鄉貢進士神仙變化非靈洞而不棲祖佛修行非聖嶽而不憩以王子晉騰身於緱嶺能大師景迹於曹山雖出凡之路斯然而達命之元不爾是謂控鶴驂鸞之客以九仙六洞為家出生離死之人以大道三界為宅或金骨化而煙霞停影空閉古壇或色身謝而水月回光却歸他世豈可以凡心識豫去住豈可以元心測彼變通哉大閩國西嶽名山者初有神仙以變化次有祖佛以修行聖迹聿興在於唐朝之首為其山中分六合高冠二儀巖根而吼出雷聲峯首而戛橫斗柄寒生六月風記五天上有列仙聚會之壇中有志士修真之室云云光憲字孟文貴平人唐時為陵州判官後唐天成初避地江陵為荊南武信王高季興掌書記纍官荊南節度副使試御史中丞入宋授黃州刺史乾德末卒風雅之道孔聖之刪備矣美刺之説卜商之序明矣降自屈宋逮乎齊梁窮詩源流權衡辭義曲盡商榷則成格言其惟劉氏之文心乎後之品評不復過此有唐御宇詩律尢精列姓字掇英秀不啻十數家惟丹陽殷璠優劣升黜咸當其分世之深於詩者謂其不誣顧我何人敢議臧否苟成美有闕得非交遊之罪邪禪師齊已本胡氏子實長沙人家邇溈慕大禪伯入頓門落髮擁毳遊方宴坐宿念未忘存闕三字師趣尚孤潔詞韻清潤平淡而意遠冷峭而闕十三字鄭谷郎中與師闕六字敲門誰訪闕二字客即闕一字師應是逢新雪高吟得好詩格清無俗字思苦有蒼髭諷味都忘倦拋琴復捨棊其為詩家者流之稱許也如此晚嵗將之岷峨假途渚宮太師南平王築淨室以居之捨淨財以供之雖出入朱門而不移素履議者以唐來詩僧惟貫休禪師骨氣混成境意卓異殆難儔敵至於皎然靈一將與禪者並驅於風騷之途不近不遠也江之南漢之北緇侶業緣情者靡不希其聲彩自非雅道昭著安能享茲大名鄙以旅宦荊臺最承款狎較風人之情致賾大士之旨歸周旋十年互見閫域師平生詩藳未遑刪汰俄驚遷化門人西文併以所集見授因得編就八百一十篇勒成一十卷題曰白蓮集蓋以久棲東林不忘勝事余既繕寫歸於廬嶽附遠大師文集之末闕五字遞為輝光其佳句全篇或偶對開卷輒得無煩指摘濡毫梗概良深悲慕天福三年戊戌三月一日序崇訓為北漢宿將纍從征伐有大功後以譖言被殺兩鹽池周圍極遠以棘為籬別無城壁其巡警牙官數百步一人向未立法猶有犯禁近奉九月十日條流雖不該制置鹽場務司亦已曉諭今來未審依舊法用新條伯塤北漢天會十五年官尚書虞部郎中權知藳城縣事獲鹿自漢以來號稱名邑邑西北奧有含滋吐潤濃翠如勻不險不夷獨秀而野按之圖經實所謂奇石山也環邑皆山而山之大者青嶂碧巘雲岫煙嵐峩峩萬謺一帶屏列而危巔峻嶺又且連亘重復有弗絶者宜睥睨此山迤邐而不足道然境勝地靈特為逸人高士所愛固異乎他山也里人好事者曹人劉清於山之阿穴石為二洞命其名曰純陽曰修真學道者居焉洞之頂有地爽塏坦然如砥平廣袤百步冠褐之侶因議其所以起建三清殿以崇奉高真其徒五六人與夫掌化緣者分遣四方未幾邑境鄰封人皆輻輳信心喜施財無所惜而富者車載貧者肩擔沓沓而來惟恐其後由是鳩材僝工閲數月告成巍然突兀屹立於上衆所欽戴也顧不偉與初於殿廡下其無草木如屺道衆手植數樹力於栽培柔枝弱幹今漸扶疏掩映緑陰頗增氣象然則殿之建也豈徒示甍桷之壯麗赭堊之藻飾以為衆人觀美哉蓋使之登其庭瞻仰繪像而咸起好善之心焉先是殿之始基也其種種靈迹所以信於人者固難以縷陳而悉數之試概舉其略以表希異遊民有張氏者乃富農也榆數株方茂許施其一以為之材後靳吝竟不副所願化緣渠長欲以錢易之亦不肯售越三日急電迅雷駭人耳目大風飄屋雨霔如傾轟然霹靂不知其所從來拔張氏所許樹矒去枝條其家驚惶遽載而施焉洎涓日之良役夫以構則適當務農之時從事東作者頃刻弗得息欲借人以助役至是辭以無暇道衆倣徨四顧茫然失措者久之方慮勝緣艱阻不旋踵濃雲布野雨亦隨降而執耕布種者不能趨田畝於是竭蹶以赴期會人遂雲集隆棟巨梁成於肇造既構則天乃開霽變化之道孰能測究哉工作之興也先於南坡下取土以供其用人之登躋疲勞方苦其難忽有一裦衣老叟謂其人曰此山之鞍其上有土甚廣何必遠去以空困爾力遂以杖指示叟導而前乃至其所劚去蕪根果得厚壤十數步內亦無拳石蓋惟土功之大自起址以至於塗塈杇墁因是取足力不乏而倍以省虆梩之役美哉斯事也道衆欣然共延於座方烹茗以謝其意俄失所在衆皆奇之法師龎居仁子安以道行住持率其徒成此善緣躬自董功勞且不憚至誠所動有感必通是故始於繕營則有賴人為及其畢事則致獲神助其於真荃正教又能宣揚之而通元究微深造本原細繹沖科廣敷大範而以之開悟衆人而使趨向也一爐香火安置清壇幡蓋具陳花燈間列吟詠清祝執幡行道而持誦之力垂惠一方期於無天災無物癘雨暘時敘五穀豐穰俾人人多種福田而咸集壽域顧豈小補哉蓋余曩時與龎為學校友而縣令王公都官亦有同年契因殿之落成也欲刊諸崖石而紀之以垂永遠來請余記義不得辭余昔為布衣時長邑庠者殆數嵗矣每因暇日歷覽此山之勝故余喜道其事而為之文也浩字浩然沁水人北漢時隱太行洪谷自號洪谷子凡畫山水意在筆先丈山尺樹寸馬豆人遠人無目遠樹無枝遠山無皴隱隱似眉遠水無波高與雲齊此其訣也山腰雲塞石壁泉塞樓臺樹塞道路人塞石分三面路有兩蹊樹觀頂水看岸基此其法也凡畫山水尖峭者峯平夷者嶺峭壁者崖有穴者岫懸石者巖形圓者巒路通者川兩山夾路者壑兩山夾水者澗注水者溪通泉者谷路下小土山者坡極目而平者坂若能辨別此類則粗知山水之髣佛也觀者先看氣象後辨清濁分賓主之朝揖列㣥峯之威儀多則亂少則慢不多不少要分遠近遠山不得連近山遠水不得連近水山腰回抱寺觀可安斷岸頽堤小橋可置有路處人行無路處林木岸斷處古渡山斷處荒村水濶處征帆林密處店舍懸崖古木露根而藤纏臨流怪石嵌空而水痕凡作林木遠者踈平近者森密有葉者枝柔無葉者枝硬松皮如鱗柏皮纏身生於土者修長而挺直長於石者拳曲而伶仃古木節多而半死寒林扶疏而蕭森春景則霧鎖煙籠樹林隱隱遠水拖藍山色堆青夏景則林木蔽天緑蕪平坂倚雲瀑布行人羽扇近水幽亭秋景則水天一色竹敕竹敕疏林雁橫煙塞蘆裊沙汀冬景則樹枝雪壓老樵負薪漁舟倚岸水淺沙平凍雲黯淡酒簾孤村風雨則不分天地難辨東西行人傘笠漁父簑衣有風無雨枝葉斜披有雨無風枝葉下垂雨霽則雲收天碧薄靄依稀山光淺翠網曬斜暉曉景則千山欲曙霧靄霏霏朦朧殘月曉色熹微暮景則山銜殘日犬吠疏籬僧投遠寺帆卸江湄路人歸急半掩柴扉或煙斜霧橫或遠岫雲歸或秋江遠渡或荒冢斷碑如此之類須要筆法布置更看臨期山形不得犯重樹頭不得整齊山借樹為衣樹借山為骨樹不可繁要見山之秀麗山不可亂要顯樹之精神若留意於此者須會心於元微惲字孟深汴州陽武人乾祐初舉進士仕北漢纍官至推誠佐命保祚功臣特進守尚書左僕射兼中書侍郎平章事上柱國隴西郡開國公入宋纍官忠武軍行軍司馬端拱元年卒年七十三帝宅之西五里而遠㣥山邃谷延袤縈擁北自乾坎南距申酉蒼崖峭壁怪石靈泉薜蘿蔭乳竇以夏寒藂桂嚮晴暘而冬緑澗溜清泚自激輕音蔓草芃茸本無毒螫洞穴窈窕煙嵐閉虧隔雲聞雞犬之聲度嶺接樵蘇之徑大哉氣通斗極崆洞帶多武之鄉地劃參墟晉野樂深思之俗况乎刑政之經不紊霸王之器具存紀都邑即天下之浩穰養士馬即域中之精勇往者北齊啓國後魏興邦雖未臻偃伯之稱且咸正事天之位時或倦重城之晏處選面勝之良遊各營避暑之宮用憩鳴鑾之駕亦猶秦之阿房晉之虒祁楚之章華漢之未央古基摧搆往往存焉年歷寖遠率多改作蓋以翼翼都會豪右富民因舊圖新增制惟錯於是乎金人塔廟老氏宮觀星布於巖石矣懿哉坤維之上一舍之遙㣥木陰翳奇峯崷崒上有平址東西僅五十步北倚石壁有彌勒閣內設石像侍立對峙容旨溫闕一字其鐫磨之巧代不能及昔睿宗皇帝再加添設功用宛然次東有池水甚潔澄湛凝碧覩之恐聳國人儼其堂宇偶以神位每角亢方中雷雨未施即雩禱咸萃矣馴嶺西下闕二字約三百步有高寺榜曰天龍故易義云夫龍者潛即勿用飛即在上天龍之名固其宜矣今英武皇帝應千齡之運居九重之尊比自舞象執經齒胄學優於庠序問安侍膳闕四字於庭闈動叶咨詢行符典則負對日之辨似不能言闕一字稱象之智果而勿伐肅肅煌煌然偉量知幾深不可測立德在間平之右承家繼文武之基自非道濟艱危孝安宗社孰能與於此乎天會中睿宗皇帝以道闕十一字出閣授檢校司徒歸義府都督時年尚幼沖躬親官次寡辭敏德務簡刑清吏不敢欺府無留事嘗以公退休暇與叔季諸王方駕接軫禮謁精藍一嵗之中闕三字數上獨於東序訴觀音像一堂其內幡花鬘蓋供飾之用靡不嚴潔於茲日新每具齋禱罔不乾乾惕惕潛發明誠所志者延鴻祚於邦家弭災氛於區宇因心愛敬不忘斯須闕二字甚嘉㣥論歸美攸是罷解公府特恩加檢校太保授右金吾衛大將軍充大內都點檢貞幹服勤中外嚴敕宣威敬事動叶聖謨及皇帝踐阼加闕二字太師行太原尹階勳爵邑悉稱公台尋領侍衛親軍事未幾值倉卒之變震駭非常上獨執雄斷入平內難時戊辰秋九月嗣升宸極立定傾危赫然大闕一字垂裕終古自是闕二字潔念恆切歸依每屆良辰必親行幸至壬申年十二月二十二日詔有司於大殿後正面造重樓五間尋遣良冶鑄賢劫自拘留孫如來已降鐵佛千尊闕一字範金審像闕二字容光相圓明等無差別如是勻分龕室各安上級時詔宣徽北院使永清軍節度使檢校太保范超自始監修應期成就基砌柱礎廣檻飛甍丹彩相望闕四字巍乎窗扉下瞰於雲端棟宇勃興於地表金爐曉炷惟聞薝蔔之香玉磬晨鳴不假蓮花之漏議者曰樹超世之果圖不朽之功必依惟睿之謀宜享終天之祿豈比夫望祭闕五字禱之宮駕騁瑤池徒縱盤遊之樂者哉上御宇之八年乙亥嵗天贊皇帝義敦天性禮叶彞章洎春末夏初纍飛詔示必以備物典册將加徽號洪名闕二字君親之恩敬修迎受之禮至夏六月十六日果降貴近昭宣闕一字容尋於正殿闕二字英武皇帝兼頒龍衣玉帶駟馬雕鞍別賜神旗鼓吹殊私異將闕五字衆心悅隨㣥后稱慶寶函金簡揚命舜命禹之書馭朽持盈盡為子為臣之敬禮之大者帝載無窮先是英武皇帝以今嵗攝提建月青風闕五字升寒氣將退嚴整儀衛親率公卿駕蒼虬之騤騤衣赭袍之熠熠雲韶寅導和樂闕五字曲之居誤屆初禪之境臣幸陪天仗親奉德音既成闕一字福闕六字之佑遽茲承詔俾志勝緣將紀洪猷潛思祕祝所冀龍華會上側聆善囑之言星宿劫中遍覩青蓮之相歡心有待謹作銘云覺皇遞興大教垂世成位有期壞空相繼大哉賢劫千佛重光六度萬行軌躅相望浩劫迢遙一念可攝勿謂難逢聲塵相接惟彼陶唐上列參墟莓莓沃野煌煌帝居天啓亨會神輸瑞圖英武定難后來其蘇聖人有作撫寧邦域治民事天允釐庶績金像玉樓伊帝之力普濟蒼生永尊皇極
