front:
  text: 全唐文欽定全唐文卷六百七十三白居易十八
  hash: sha256:974aae8f742ad53b2213fec80d848bc4c33ca53292512c54c9e57d6be2a8a461
body:
  text: 仁無貪貨義有通財在潔身而雖乖於知巳而則可景乙奇贏同業氣類相求競以錐刀始聞小人喻利推其貨賄終見君子用心情表深知事符往行如或貧富必類自當興讓立廉今則有無相懸固合損多益寡是為徇義豈曰竭忠受粟益親孔氏用敦吾道分財損己叔牙嘗謂我貧無畏人言俾彰交態設以關防辨其出入既慎守而無怠豈偽遊而能過景勤恪居懷夙夜奔命以謂寇攘事切宜早圖之罔思呵察戒嚴不可踰也萑蒲乃司敗小事襟帶實國家大防仰老氏之文雖知善閉稽周公之制尚曰不征責已具於有司理難辭於靡盬盍從致詰無信飾非婚以匹成嫡庶宜別訟由情察曲直可知將令人有所懲必在弊之不及隱其庶孽冒乃婚姻情以矯誣始聞好合事斯彰露旋見仳離既生非偶之嫌遂起納徵之訟詞多執競理有適歸乙則隱欺在法而聘財宜沒丁非罔冒原情而饋禮可追是非足明取與斯在象彼坤儀妻惟守順根乎天性父則本恩饌宜進於先生膳可輟於田畯夫也望深饁彼方期相敬如賓父兮念切枵然旋聞受哺於子義雖乖於齊體孝則見於因心盍嘉陟岵之仁翻肆送畿之怒孰親是念難忘父一之言不爽可徵無效士二其行犬馬猶能有養爾豈無聞鳳凰欲阻于飛吾將不取品秩異倫臧獲有數苟踰等列是紊典常丁志在作程惡夫過制爰陳誠於白奏俾知禁於素封將使豪富之徒資雖積於巨萬僮僕之限數無踰於指千抑義叶於隋時革弊道符於漢日責其論事無乃失辭若守職而越思則為出位將盡忠於陳計難伏嘉言楚既失之鄭有辭矣教有權節業無易宜地苟異於寒溫農則殊於早晚甲分憂率職從俗勉人天時有常農宜先定地氣不類寒則晚成雖愆揉木之時未違把草之候正惟廉使何昧遺風縱稼器之已修先成焉用苟土膏之不起欲速何為誠宜嘉乃辨方豈可詰其行古循諸周禮修耒雖在於季冬訓此豳人于耜未乖於正月責則迂也訴之宜哉姦或不誅吏將焉用苟欲科其官失必先辨以司存乙慎守無聞庀徒有怠嘉賓戾止誠宜慮以相翔暴客聿來固合擒而勿佚既隳官禁是縱公行且戒事之前不申嚴於聚柝慢官之後欲移過於守塗誠乖率屬之方宜甘責帥之罰然以官雖聯事等列或殊罪不同科重輕宜別比夫所屬請以異論傳舍是崇使車攸處將供行李必辨公私何彼客遊欲從公食豈無逆旅宜受饋於盤飱既匪使臣何苟求於館穀信叨餮而是啓寧僭濫之可容同周官之廬入宜銜命非鄭氏之驛置豈延賓法既自干咎將誰任然則不應入而妄入刑固難逃而已供與未供罪宜有別請從減降庶叶科條大水為災中橋其壞車徒未濟誠有阻於往來修造從宜亦相時之可否顧茲浩浩阻彼憧憧人訴川梁不通壅而為弊府慮水沴薦至毀必重勞苟後患之不圖則前功之盡棄將思濟衆固合俟時徵啓塞之文雖必葺於一日防懷襄之害未可應乎七星無取人辭請依府見軍尚隱情臣宜守道况握中權之要當絶外交之嫌景受命建牙遇敵飲藥直雖可舉忠則不知且事君在公訓旅貴信失人臣之節爾豈自明惑士卒之心吾將安仰况兵惟尚詐人不易知同饋醪而無他推誠猶可苟流毒而不察雖悔寧追無謀既昧三思不伏恐涉二過勿疑以飲徒徇陸抗之名未達而嘗且墜宣尼之訓是違師律難償鄰言將非處右莫敢示威軍或別屯則宜專命丁位雖佐理分以戎行執專征之權錫弓於周典操司獄之柄受棨於漢儀既有令而必行信無瑕而可戮實握兵之能政奚執簡之舉違如或稟命於連營畏子不敢今則分部而賜戟無我有違宜崇魏絳之威勿議秦彭之罪讓賢雖仁廢長非順徒聞建善則理其如亂嗣不祥甲告老於朝立子為後雖急難自舉必有可觀者焉而長幼以倫無所苟而己矣况欲正其爵位豈宜越以鴈行於弟克恭厥兄徒見好仁之請知子莫若於父盍從立長之言無忌雖欲傳家季札終當棄室諒可致詰罔聽不能孝養父母有命必從禮事舅姑不悅則出乙親存為子年壯有妻兆啓和鳴授室之儀雖備德非柔淑宜家之道則乖若無爽於聽從曷見尤於譴怒信傷婉娩理合仳離且聞莫慰母心則宜去矣何必有虧婦道然後棄之未息遊詞請稽往事薑詩出婦蓋為小瑕鮑永去妻亦非大過明徵斯在薄訴何為喪雖寧戚禮宜節哀俾不足與有餘必跂及而俯就景愛深血屬禮過時制興鮮兄之歎情既鍾於孔懷及居姊之喪服將除而不忍雖志崇敦睦而事越典彞况儀貴適中哀不在外宜抑情而順變多奚以為苟在禮而或踰過猶不及請遵仲尼之訓無執季路之辭下有巢許遂免所司欲旌其節大理執不許臣節貴忠國經懋賞宜遵善道難廢彞章丁陷在賊庭強其祿仕敦在三之義因時難而名聞守無二之忠經歲寒而節見逼夷齊以周粟引巢許於唐臣身以道存情非利動所當厚獎何乃深疑且人無不臣之心所謂順也邦有惟重之典其可廢乎從亂則必論辜守道豈無旌善野哉大理信乃執迷展矣所司誠為勸沮官有常尊禮無不敬位若殊於等列弔則異其節文景為大夫丁乃元士居喪而哭合遵朝夕之期特弔以行奚越尊卑之序既乖前典乃速斯言且禮貴明徵位宜慎守俟非其事信干食菜之榮儀失其宜徒展贈芻之意是曰無上將何以觀旁求俊造逮將筮仕歷試文辭俾從卜夜苟狂簡而無取宜確執而勿聽萃彼㣥才登於會府惟賢是急慮失寶於握珠有命則從許借光於秉燭及乎考核罕有菁英屬辭既謝於揀金待問徒煩於繼火將期百鍊之後思苦彌精何意一場之中心勞逾拙曷如早已焉用晚成敢告有司勿從所請貴賤苟合曾是泛交窮達相致乃為執友乙既登貴仕爰有故人以為念舊追歡知己之心未至行權勵節成人之美則多不登夫子之堂乃進僕人之食苟推誠而相激雖屈辱以何傷安實敗名重耳竟慙於子犯感而成事張儀終謝於蘇君是勉後圖且符往行如或識才半面契未同心雖發憤以達人必取怨於謗已以斯致誚亦謂合宜賦斂異名君臣殊政藏諸百姓在王者而則然虛我千倉於職司而不可景匱茲國用豐彼家財人不誅求誠為寬政府無儲蓄寧匪慢官况今征稅有常公私兼濟苟能取之以道則下自樂輸何必藏之於人使上將乏用既爽奉公之節宜甘掠美之科罔縱縣辭請依郡詰飲食以陳庶無求飽齊衰可恤仁豈忘情丁靡念人喪姑求主禮遇加籩之膳誠可療飢對泣血之哀亦宜忘味既念吉蠲之饎是忘惻隱之心况舂於其鄰相猶違禮而食於其側飽亦非仁徒嘉施氏之儀且昧宣尼之教勿思變色當顧戚容圜土不嚴罪人其遁亡而由已誠曰慢官獲則因人其何補過相維彼甲所謂攸司不念恪居警於羑里旋聞失守逸乃楚囚雖非故縱所為曾是慢常而致徒稱勿佚未可塞違得於他人自是疏網無漏失其所職豈可出柙不科無貪假手之功固合甘心於罰示衆知防必修水禁救人鮮死無縱川遊乙行險不思馮河無悔慕呂梁之術習於浮水違周官之令忘彼危身將不弔而是虞雖有故而宜禁忘子産喻政爾則狎而玩之引仲尼格言吾恐蹈而死者既殊利涉當戒善遊未可加刑且宜知懼將苟有謀勞而後逸師不用律臧亦為凶况未靖方隅尚勤征伐即戎推轂既崇四七之名臨敵屯營何乖什伍之列是使人慢孰謂戎昭薄威雖欲恤勞徹警恐為懈怠且有嚴有翼猶奪先人之心不備不虞寧救長蛇之尾必也權能制勝謀必出奇亦待臨事有成然後斯言可信監軍之劾舉未失中彼景之辭試可乃已克寬克仁所謂易事不知不慍是曰難能况乎醉起甕間嘔盈車上小人沉湎自貽誚於彼昏君子含宏乃忘情於斯怒宥過所宜無大知非庶使有慙未乖觀過之仁雅叶諦思之義且恕當及物察貴用情絶纓繼醉而猶捨吐茵及亂誤豈不容無從下吏之規庶叶前賢之美請備半價乙不伏馬牛於牧蹄角難防苟死傷之可徵在故誤而宜別况日中出入郊外寢訛既品量以齊驅或風逸之相及爾牛孔阜奮騂角而莫當我馬用傷踠駿足而致斃情非故縱理合誤論在皂棧以來思罰宜惟重就桃林而招損償則從輕將息訟端請徵律典當備半價勿聽過求承家不嗣禮許仳離去室無歸義難棄背景將崇繼代是用娶妻百兩有行既啓飛鳳之兆三年無子遂操別鵠之音將去舅姑終鮮親族雖配無生育誠合比於斷絃而歸靡適從庶可同於束蘊固難效於牧子宜自哀於鄧攸無抑有辭請從不去慎終之道必信必誠死葬之儀有豐有省諒欲厚於卜宅亦難輕於慮居丁昊天降凶遠日叶吉思葬具之豐備欲祔九原顧家徒之屢空將鬻五畝愛雖深於送死義且涉於傷生念顏氏之貧豈宜厚葬覽子遊之問固合稱家禮所貴於從宜孝不在於益侈盍伸破産之禁以避無廟之嫌業有四人職無二事如或居肆則不及仕門一作任甲爰有周親是稱工者方恥役以事上且思祿在其中有慕九流雖欲自遷其業未經三載安可同升諸公難違甲令之文宜守吏曹之限如或材高拔俗行茂出㣥豈惟限以常科自可登乎大用以斯而議誰曰不然官分正贈蔭別品階如酬死繼之勳則厚賞延之寵追思乙父勵乃臣節捐軀致命尚克底定爾功繼代勸能豈忘勤恤我後椒聊既稱有實桃李未可無陰忠且忘身優宜及嗣如或病捐館舍贈官當合降階今則死衛國家敘蔭所宜同正庶旌義烈用叶條章責其失事長之道景云不敢不忠於國守位居常小宜事大持法舉正卑可糾尊景名署外臺身由中立直而自守郡郵之政必行明不相蒙州將之邪無隱且六條枉撓百事滋昏苟不提綱是為漏網雖舉違犯上虧敬長之小心而陳奏盡忠得事君之大節既非下訕難抑上聞君命是專刑其無小王言非密罪則從輕丁乃攸司屬當行下不慎厥德擅發如綸之言自災於身難求疏網之漏然則法通加減罪有重輕必也志在私行唯當專達之責如或事關樞密則科漏泄之辜請驗迹於紫泥方定刑於丹筆王命急宣行無停晷制書稽緩罪有常刑將欲正其科繩必先揆以時日甲懈位敗度慢令速尤蓄怠棄之心既虧臣節壅駿奔之命自犯國章然則審時勾稽考程定罪法直以役當期月所由以違未浹辰將計年以斷徒恐乖閲實請據日而加等庶叶公平是曰由文俾乎息訟賄以公行印惟盜用罪之大者法可逃乎伊人無良同惡相濟所由既敗官為墨豫取豫求彼乙乃竊器成姦不畏不入潛謀斯露竊弄難容猶執薄言將求末減用因於買比自作而雖殊情本於姦與偽造而何異以茲降等誠恐利執禁之要在乎去邪為政之先必也無訟毖彼泉水流於道周飲瓢之人孔多蔑聞病間濫觴之源不足必起爭端訟所由生欲不可縱上善未能利物左道足以惑人且稽以祥符徵之時事地不藏寶當今自出醴泉天之愛人從古未聞聖水無聽虛誕之説請塞訛偽之源鳴鶴處陰聲聞于外元豹隱霧樂在其中此將適於退藏彼何強之維縶景業敦道行志薄宦情太守以舉爾所知將申蒲帛之聘夫子以從吾所好不顧弓旌之招懼俗吏之徒勞引巫家以自穢冀其言遜獲免翻以行詐論辜况商洛拂衣漢且求之不得潁川洗耳堯亦存而勿論天子尚不違情功曹如何按罪津梁不修何以為政車服有命安可假人丁職是崇班體非威重輕漢臣之寵失位於高車徇鄭相之名濟人於大水志雖恤下道昧叶中與其熊軾涉川小惠未遍曷若虹橋通路大道甚夷啓塞既闕於日修揭勵徒哀其冬涉事關失政情近沽名宜科十月不成庶辨二天無政法許原情慈通隱惡俾恩流於下亦直在其中甲忝齒人倫忍傷天性義方失教曾莫愧於父頑攘竊成姦尚不為其子隱道既虧於庭訓禮遂闕於家肥且情比樂羊可謂不慈傷教况罪非石厚徒云大義滅親是不及情所宜致誚惟賢是求何賤之有况士之秀者而人其捨諸惟彼郡貢或稱巿籍非我族類則嫌雜以蕭蘭舉爾所知安得棄其翹楚誠其惡於稗敗諒難捨其茂異揀金於砂礫豈為類賤而不收度木於澗松寧以地卑而見棄但恐所舉失德不可以賤廢人况乎識度冠時出自牛醫之後心計成務擢於賈竪之中在往事而足徵可常科而是限州申有據省詰非宜官擇賢良選稽名實苟作偽而心拙必代斫而手傷乙情非容姦行乖周慎將如吾面遂充職以不疑未見子心果代試而有悔既彰聞而貽戚乃連坐以論辜察情諒不同謀詰罪誠應異罰法無攸赦選者當準格論人不易知職官所宜情恕削奪恐為過當貶降庶叶決平庠序辨儀則先長長朝廷列位必尚親親惟彼周行是名同位德非心競禮失肩隨甲以桑榆年高何以卑我乙以葛藟族貴奚獨後豫各興爭長之辭遂昧常尊之位然禮經尚齒且王室貴親晉鄭同儕信高卑之或等滕薛異姓諒先後之可知難遵少長之倫宜守親疏之序聲雖非實善豈無名不可苟求亦難盡棄屬時當側席任重掄材思得士於聲華懼誘人於奔競若馳騖而方取慮非歲貢之賢儻寂寥而後求恐失日彰之善將期托實必在研精但取捨不私是開乎公道則吹噓無益自閉其幸門名勿論於有無鑒自精於舉措教惟馴致道在曲成將遜志以樂㣥在毀方而和衆况化人由學成性因師雖和光以同塵德終不雜苟圓鑿以方枘物豈相容道且尚於無隅義莫先於不劌司業以訓導貴別或慮雷同學官以容衆由寬何傷瓦合教之未墜蓋宣尼之言然文且有徵則戴氏之典在將勸學者所宜韙之禮貴妻柔則宜禁暴罪非夫告未可麗刑何彼無良於斯有怒三從罔敬待以庸奴之心一杖所加辱於女子之手作威信傷於婦道不告未爽於夫和招訟於鄰誠愧聲聞於外斷徒不伏未乖直在其中雖家肥難從縣責調選正名誠宜守序敷求懋德安可拘文乙積行於中暗彰於外廉使以道敦知已欲致我於青雲天官以限在出身將棄子於白屋事雖異見理可明徵掄瑣瑣之材則循舊格刈翹翹之楚寧守常科幸當側席之求無惑刻舟之執况自家刑國移孝入忠既聞道不虛行足見舉非失德所宜堅決無至深疑家云無故三年不成義敦好合禮重親迎苟定婚而不成雖改嫁而無罪景謀將著代禮及問名二姓有行己卜和鳴之兆三年無故竟愆嬿婉之期桃李恐失於當年榛栗遂移於他族既聞改適乃訴納徵揆情而嘉禮自虧在法而聘財不返女兮不爽未乖九十之儀夫也無良可謂二三其德去禮逾遠責人斯難見賢不稱且虧事上之節非義苟合則涉黷下之嫌丁貴乃立家友其管庫不思進善徒務降尊若接而或非自貽交利之責儻知而不舉則速蔽賢之尤既未核於是非故欲紊乎貴賤况公叔薦士家臣尚見同升雖文子好能管庫不聞為友信乖慎守宜及或非為國勸農田疇有制示人知禁衢路攸先瞻彼三農藝斯五稼且町疃是務豈是贍軍雖轍迹不加未為曠土輦轂必資於平易康莊難縱以荒蕪務有畔之農秋成而利亦蓋寡侵如砥之道歲久而弊則滋多請論環衛之非式表鐵冠之劾諸侯不下用戒風君子好求未乖婚義甲既榮為郡且念宜家禮未及於結褵責已加於執憲求娶於本部之內雖處嫌疑定婚於授官之前未為縱欲况禮先納采足明嬿婉之求聘則為妻殊非強暴之政宜聽隼旟之訴難科漁色之辜桑梓攸重必在恪恭官品斯同則宜抗禮乙班榮是踐威重可觀况衣錦還鄉已崇三品之秩雖剖符臨郡應無再拜之儀豈以州里版圖而紊邦家典制如或商周不敵敢不盡禮事君今且晉鄭同儕安得降階卑我既不愆素何恤或非鮮或不給既曠乃官辭且無徵是重而罪景獸人斯掌禽獻罔供當路可求曾不思於疐尾充庖為用遂有闕於去腸既愆冬獻之期難償秋官之責載詳地産重振一作核國章薦必以時吾能言於周有生靡常所子勿謂其秦無縱口給之不慙在面欺而無捨人縱於貪動而生悔物非其道取則有贓丁放利欲贏景逋債未償懷不忌而強取姑務豐財逞無厭之過求豈非黷貨情難容於強暴法必禁以奪攘以交易而求多尚宜準盜在倍稱而過數孰謂非贓若以律論當從縣斷爵命未墜嗣襲有期在紀律而或愆當職思而宜舉乙舊德將繼新命未加所宜纂彼前修相承以一子何乃廢其後嗣自棄於十年歲月既已滋深公侯固難必復然以法通議事理貴察情如致身於宴安則宜奪爵若居家而有故尚可策名須待畢辭方期析理禮惟辨貴孝不貶親是謂奉先孰云僭上丁慶加一命憂及三年凶降昊天且結茹荼之痛吉從遠日方追食采之榮既貴賤之殊宜亦父子之異道同曾元易簀正位於大夫殊晏嬰遣車見非於君子未爽慎終之義允符從死之文辭則有徵責之非當觀行慰心則稟父命辨惑執禮宜全子道甲立身失正沒齒歸亂命子以邪生不戒之在色愛妾為殉死而有害於人違則棄言順為陷惡三年之道雖奉先而無改一言以失難致親於不義誠宜嫁是豈可順非况孝在慎終有同魏顆理命事殊改正未傷莊子難能宜忘在耳之言庶見因心之孝
  hash: sha256:e3901e92cdf17b9ccbd783d1bc51469b5433b8cb68563b9c9fc253ad22652b21
  markers:
  - {type: head, offset: 0, content: 得景與乙同賈景多收其利人刺其貪辭云知我貧也, id: KR4h0168_NFKB_673-h1, level: 2}
  - {type: head, offset: 118, content: 得景夜越關為吏所執辭云有追捕, id: KR4h0168_NFKB_673-h2, level: 2}
  - {type: head, offset: 219, content: 得乙以庶男冒婚丁女事發離之丁理饋賀衣物請以所下聘財折之不伏, id: KR4h0168_NFKB_673-h3, level: 2}
  - {type: head, offset: 321, content: 得乙在田妻餉不至路逢父告饑以餉饋之乙怒遂出妻妻不伏, id: KR4h0168_NFKB_673-h4, level: 2}
  - {type: head, offset: 437, content: 得丁上言豪富人畜奴婢過制請據品秩為限約或責其越職論事不伏, id: KR4h0168_NFKB_673-h5, level: 2}
  - {type: head, offset: 545, content: 得甲為邠州刺史正月令人修耒耜廉使責其失農候訴云土地寒, id: KR4h0168_NFKB_673-h6, level: 2}
  - {type: head, offset: 672, content: 得乙掌宿息井樹客至不誅相翔者御史糾之辭云罪在守塗之人, id: KR4h0168_NFKB_673-h7, level: 2}
  - {type: head, offset: 788, content: 得景為私客擅入館驛欲科罪辭云雖入未供, id: KR4h0168_NFKB_673-h8, level: 2}
  - {type: head, offset: 900, content: 得洛水暴漲決破中橋往來不通人訴其弊河南府云雨水猶漲未可修橋縱苟施功水來還破請待水定人又有辭, id: KR4h0168_NFKB_673-h9, level: 2}
  - {type: head, offset: 1006, content: 得景為將敵人遺之藥景受而飲之或責失人臣之節不伏, id: KR4h0168_NFKB_673-h10, level: 2}
  - {type: head, offset: 1139, content: 得丁將在別屯士卒有犯每專殺戮御史舉劾訴稱曾受棨㦸之賜, id: KR4h0168_NFKB_673-h11, level: 2}
  - {type: head, offset: 1242, content: 得甲告老請立長為嗣長辭云不能請讓其弟或詰之云弟好仁, id: KR4h0168_NFKB_673-h12, level: 2}
  - {type: head, offset: 1349, content: 得甲出妻妻訴云無失婦道乙云父母不悅則出何必有過, id: KR4h0168_NFKB_673-h13, level: 2}
  - {type: head, offset: 1466, content: 得景有姊之喪合除而不除或非之稱吾寡兄弟不忍除也, id: KR4h0168_NFKB_673-h14, level: 2}
  - {type: head, offset: 1568, content: 得丁陷賊庭守道不仕賊帥逼之辭云堯舜在上, id: KR4h0168_NFKB_673-h15, level: 2}
  - {type: head, offset: 1709, content: 得景為大夫有喪丁為士而特弔或責之不伏, id: KR4h0168_NFKB_673-h16, level: 2}
  - {type: head, offset: 1802, content: 得吏部選人入試請繼燭以盡精思有司許之及考其書判善惡與不繼燭同有司欲不許未知可否, id: KR4h0168_NFKB_673-h17, level: 2}
  - {type: head, offset: 1916, content: 得乙貴達有故人至坐於堂下進以僕妾之食或誚之乙曰恐以小利而忘大名故辱而激之也, id: KR4h0168_NFKB_673-h18, level: 2}
  - {type: head, offset: 2047, content: 得景領縣府無蓄廩無儲管郡詰其慢職景云王者富人藏於下故也, id: KR4h0168_NFKB_673-h19, level: 2}
  - {type: head, offset: 2152, content: 得丁食於喪者之側而飽或責之辭云主人食我以禮故飽, id: KR4h0168_NFKB_673-h20, level: 2}
  - {type: head, offset: 2245, content: 得甲為獄吏囚走限內他人獲之甲請免罪, id: KR4h0168_NFKB_673-h21, level: 2}
  - {type: head, offset: 2345, content: 得乙川游所由禁之云有故要渡, id: KR4h0168_NFKB_673-h22, level: 2}
  - {type: head, offset: 2438, content: 得景為將每軍休止不繕營部監軍使劾其無備辭云有警軍陣必成何必勞苦, id: KR4h0168_NFKB_673-h23, level: 2}
  - {type: head, offset: 2562, content: 得丁乘車有醉吐車茵者丁不科而吏請罪之丁不許, id: KR4h0168_NFKB_673-h24, level: 2}
  - {type: head, offset: 2668, content: 得甲牛觝乙馬死請償馬價甲云在放牧處相觝, id: KR4h0168_NFKB_673-h25, level: 2}
  - {type: head, offset: 2780, content: 得景娶妻三年無子舅姑將出之訴云歸無所從, id: KR4h0168_NFKB_673-h26, level: 2}
  - {type: head, offset: 2875, content: 得丁喪親賣宅以奉葬或責其無廟云貧無以為禮, id: KR4h0168_NFKB_673-h27, level: 2}
  - {type: head, offset: 2986, content: 得甲之周親執工伎之業吏曹以甲不合仕甲云今見修改吏曹又云雖改仍限三年後聽仕未知合否, id: KR4h0168_NFKB_673-h28, level: 2}
  - {type: head, offset: 3089, content: 得乙請用父蔭所司以贈官降正官蔭一等乙云父死王事合與正官同, id: KR4h0168_NFKB_673-h29, level: 2}
  - {type: head, offset: 3189, content: 得景為錄事參軍刺史有違法事景封狀奏聞或, id: KR4h0168_NFKB_673-h30, level: 2}
  - {type: head, offset: 3296, content: 得丁私發制書法司斷依漏洩坐丁訴云非密事請當本罪, id: KR4h0168_NFKB_673-h31, level: 2}
  - {type: head, offset: 3386, content: 得甲為所由稽緩制書法直斷合徒一年訴云違未經十日, id: KR4h0168_NFKB_673-h32, level: 2}
  - {type: head, offset: 3493, content: 得乙盜買印用法直斷以偽造論訴云所由盜賣因買用之請減等, id: KR4h0168_NFKB_673-h33, level: 2}
  - {type: head, offset: 3582, content: 得有聖水出飲者日千數或謂偽言不能愈疾且恐爭鬬請禁塞之百姓云病者所資請從人欲, id: KR4h0168_NFKB_673-h34, level: 2}
  - {type: head, offset: 3687, content: 得景有志行隱而不仕為郡守所辟稱是巫家不當選吏功曹按其詭詐景不伏, id: KR4h0168_NFKB_673-h35, level: 2}
  - {type: head, offset: 3807, content: 得丁為刺史見冬涉者哀之下車以濟之觀察使責其不順時修橋以徼小惠丁云恤下, id: KR4h0168_NFKB_673-h36, level: 2}
  - {type: head, offset: 3914, content: 得甲告其子行盜或誚其父子不相為隱甲云大義滅親, id: KR4h0168_NFKB_673-h37, level: 2}
  - {type: head, offset: 4003, content: 得州府貢士或市井之子孫為省司所詰甲稱㣥萃之秀出者不合限以常科, id: KR4h0168_NFKB_673-h38, level: 2}
  - {type: head, offset: 4139, content: 得乙充選人職官選人代試法司斷乙與代試者同罪訢云實不知情, id: KR4h0168_NFKB_673-h39, level: 2}
  - {type: head, offset: 4244, content: 得甲與乙爵位同甲以齒長請居乙上乙以皇宗不伏在甲下有司不能斷, id: KR4h0168_NFKB_673-h40, level: 2}
  - {type: head, offset: 4350, content: 得選舉司取有名之士或云不息馳騖恐難責實, id: KR4h0168_NFKB_673-h41, level: 2}
  - {type: head, offset: 4451, content: 得太學博士教冑子毀方瓦合司業以非訓導之本不許, id: KR4h0168_NFKB_673-h42, level: 2}
  - {type: head, offset: 4562, content: 得甲居家被妻毆笞之鄰人告其違法縣斷徒三年妻訴云非夫告不伏, id: KR4h0168_NFKB_673-h43, level: 2}
  - {type: head, offset: 4647, content: 得乙居家理廉使舉請授。官吏部以無出身不許使執云行成於內可移於官, id: KR4h0168_NFKB_673-h44, level: 2}
  - {type: head, offset: 4765, content: 得景定婚訖未成而女家改嫁不還財景訢之女, id: KR4h0168_NFKB_673-h45, level: 2}
  - {type: head, offset: 4886, content: 得丁為大夫與管庫士為友或非之云非交利也, id: KR4h0168_NFKB_673-h46, level: 2}
  - {type: head, offset: 4987, content: 得四軍帥令禁兵於禁街中種田御史劾以無勅文辭云因循歲久且有利於軍, id: KR4h0168_NFKB_673-h47, level: 2}
  - {type: head, offset: 5079, content: 得甲為郡守部下漁色御史將責之辭云未授官以前納采, id: KR4h0168_NFKB_673-h48, level: 2}
  - {type: head, offset: 5170, content: 得乙為三品見本州刺史不拜或非之稱品同, id: KR4h0168_NFKB_673-h49, level: 2}
  - {type: head, offset: 5261, content: 得景為獸人冬不獻狼責之訴云秦地無狼, id: KR4h0168_NFKB_673-h50, level: 2}
  - {type: head, offset: 5361, content: 得景負丁財物丁不告官強取財物過本數縣司以數外贓論之不伏, id: KR4h0168_NFKB_673-h51, level: 2}
  - {type: head, offset: 5447, content: 得乙請襲爵所司以乙除喪十年而後申請引格不許乙云有故不伏, id: KR4h0168_NFKB_673-h52, level: 2}
  - {type: head, offset: 5548, content: 得丁為士葬其父用大夫禮或責其僭辭云從死者, id: KR4h0168_NFKB_673-h53, level: 2}
  - {type: head, offset: 5645, content: 得甲將死命其子以嬖妾為殉其子嫁之或非其違父之命子云不敢陷父於惡, id: KR4h0168_NFKB_673-h54, level: 2}
