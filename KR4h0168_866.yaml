front:
  text: 全唐文欽定全唐文卷八百六十六夔有雋才為宣州田頵上客知頵不足抗吳著溺賦以戒之頵不用竟至於敗
  hash: sha256:9ff918d21ed3bf8894edba874881e783e1f583af56118efe773f9d807c222516
  markers:
  - {type: head, offset: 14, content: 楊夔, id: KR4h0168_NFKB_866-h1, level: 1}
body:
  text: 元微先生淡慮澄情樓倚嶽陽湖觀洞庭渺漫兮若與乎天平遠指君山一螺黛清遙覘湘浦一片雲明輕楫巨舸載縱載橫或楚歌以應棹或漁唱以齊征雖云吳楚之濶於焉瞬息之程俄而濃雲興猛吹作訇訇兮雷霆零零兮雨雹波勢兮奔騰波聲兮渀瀖或若積雪或若裂壑樓岌嶪兮地如落欹檣側帆出歘入煙馳霧驟神號鬼泣忽翼舉忽蟲蟄波而解浪而傾者亦一瞬而俱及雨既霽風亦止呀呷餘波振蕩未已俄有呈其板而流者碎其篷而飄者彼緘縢之篋扄鐍之匱委翳波間罔知所祕或一竹以脫命或舉族而咸墜沿汀繞濱零落在地元微子指而泣曰其嗜利則孟子所以惡交爭也其欲速則仲尼所以悲不達也孰有輕命若糞重賄如山用一縷無繼之力涉萬仞不測之川踐險冒危既蔑履冰之誡殞身覆族空銜沒齒之寃宏農子聞其言同其歎此則以江以湖沒不可援今復有非波非濤溺不可算窺之則茫然無岸由古及今陷者如貫元微子矍然其詞泫然其悲何陸之為溺而不維不持紛吾緒而亂余曲爾其辨而析之乃曰趜蘖是惑沉湎無時混淆先後顛倒矩規惟誕是習莫禮是持散髮裸體以遨以嬉汨親疏兀尊卑情所至則至意所為則為可慶者忽其慶可悲者忘其悲龍章莫保鳳德何衰光逸則獨竇求入伯有則壑谷忘歸子反不謀於軍前敗非天作正平不拘於席上禍乃自貽但驕其氣益亂其機隋兵濟江玉樹方舞越人入戶金斝猶飛所以為酒之溺也至若貝含其齒雲聳其鬟苞藏其戾矜持其妍斥巧若拙移曲成端為媚斯極荷寵益堅陳靈以衵服戲朝俾君臣受禍驪姬以歸胙獻毒使父子成寃齊莊以盜室取斃郤犨以奪儷不全此所以為色之溺也至若伊義莫顧惟賄是務以譎以回不軌不度溝壑難滿錐刀必聚莫興知足之慙蔑有惡盈之懼其帑溢其帛蠧其貫朽其粟腐營營尚恐其力窮汲汲不思其日暮復有白版為侯黃金作輔南宮變屠賈之行西園成闤闠之路求金求劍曾無就木之心鬻爵鬻官但欲齊天之富壬夫死而方覺雍子戮而未悟此所以為貪之溺也至若專國之柄操天之軸任其性情隨其嗜欲其喜也沉者浮其怒也贏者縮易否為臧化直為曲雖山重而可回雖海深而可覆其門若市其帑如谷背者斥向者録言張其機笑孕其毒譽之則銖而為鈞訾之則歌而為哭屏內外之氣側天下之目稽其莽卓考其産祿謂兵鈐之在已將神器之有屬國璽行竊弄之手宮闈開盜視之目自謂其投蓋之力可圖殊不知燎原之火難撲既衆叛而親離竟噬臍而齧腹此所以為權之溺也是四者匪橫其流匪駕其舟有溺者孰究其由其毒也必漬於骨髓其痛也亦甚於戈矛雖扛鼎之力觸山之酋亦不能杼之以出而况於纎離之儔哉元微子乃曰始吾觀涉水而溺則恍然而內惕今復聞不波而沉則瞿然如大敵且酒不可甘甘之則沉吾命酒曰甘波色不可愛憂之則溺吾命色曰愛河衣所以被體食所以充腸苟朝脯而不匱寒暑而有裝豈假積粟於廪儲貨於囊且藥所以攻百疾百疾蠲而藥不止者鮮不及其殃吾命財曰藥江士患不達之名不立之身苟達苟立在守其真何必競升沉之路爭輕重之鈞狼子野心昵之害人吾命權曰狼津噫生於世不溺於四水者吾謂夫顏閔之倫議曰刑可以立乎堯舜不能去不亦深乎曰二於法而行之苟違之者是不由砥終而紊之則孰若嚴刑而使知畏姑以一宇言之立其牆垣崇其閈閎猶有穴而入者而况於不設乎漢輕其法穽民於禍矣之而不是乎更疑嗚呼致金於路坐拾者以盜否秦伯伐晉兩用孟明皆敗績用之不怠復伐於晉晉人不出遂封殽尸霸者以武為功乎昔楚子敗晉闕二字京觀以昭武功楚子不從曰所以稱武者以有七德也我無一焉其可稱哉今稽秦師忽蹇叔之忠諫納子之狂謀勞師欲以襲國殽及彭衙之敗隻輪不返渡河焚舟示其致死晉不與敵遂霸西戎亦未為勝也况兩敗一勝與敵乃亡尺全寸焉足為功哉夫飢虎餒狼一意於吞噬乎吾見晉之懸門不發者君子多矣子雲有言曰琴瑟鄭衛調俾夔因之亦不可以致簫韶故董仲舒云琴瑟不調甚者必改而更張也舜承堯禪當太平至理之後猶且放四凶舉八元八愷而後百揆四門方克調序當今承百王衰弊之末繼萬法隳散之餘皇綱不序事無舊貫閣下掌國之鈞提人之柄將循其舊而就為治乎將擇其善而漸以化乎將新其轍而革其弊乎某誠不敏粗達利病之源常欲得布露蘊蓄於執政以助教化則與躅人之喜慍隨聲而是非者固不同其軌矣夫廣引古事以黷左右蓋類庸醫不審疾病掊聚衆藥合為一法希有或中耳况今下筆者言登庸之善則皋夔蕭曹語字牧之能則龔黃卓魯此亦閣下飫於聽視矣今不敢遠為徵譬請質而言之閣下將循其舊而就為治耶且四海生靈火陷密網舉手搖足如在桎梏其懷革弊剗訛之政如旱苗之待甘雨若循其舊不為之制信其治不為之憂蠧不剔則壞及根本毒不抉則疽及骨肉矣以此知循舊之難也閣下將擇其善而化以漸耶且知人之道聖哲猶難故仲尼有以貌以言之失則閣下所為善者其欲詢於人乎其欲取於言乎取於言言未必信詢於人人未必誠蓋澆競日久煽為朋黨內則巧詐萬變外則潔矩自任同於已者互推互挽出於已者擠辱如仇訪於人有是有非聽於人有端有曲雖秦鑑之明堯羊之觸未免其撓且惑此以見擇善之難也閣下將欲新其轍而革其弊耶在今日時之訛俗之壞况大兵久役之後救其衰殘未有首於此也前車已覆後車豈可躡而行之固當改轍易塗以取其不傾不蹶道路之人亦知此為至計况廊廟帷幄之畫豈不以是為急哉然民困已久如涸澤窮鱗噞喁餘喘更沃之沛澤則有蘇活之望若顧而哀之曰吾未能卒致其澤命貫而挈之俟有水之地則捨而放諸則是魚之反不如噞喁於涸澤矣此以見新轍之難也然則為政之道固在乎人其人存則其政舉其人亡則其政息今大兵之後生民陷於塗穽九州四海固仰首於吾君吾相以待其脫塗出穽也使吾君為堯為舜固在吾相之左扶右翼齊桓公任管仲九合諸侯一匡天下任豎刁易牙則國亂而無主身歿而不殯如此則匡持裨贊繫於臣不繫於君也今閣下蒞事以來以為天下安乎危乎賈誼居漢文升平之代猶言今所安者抱火而厝於積薪之下而寢其上矧今日生民首未去其壓足未釋其縛乃欲循常之轍以安輯還定猶為飢仆者談翊日之膳將何所濟哉夫欲安其民則莫若擇守宰夫欲固其本則莫若去奢侈夫欲官之治則莫若為官而擇人夫欲弊之革則莫若限田而定賦夫朝廷之立在固本根本根固則兆庶安兆庶安則盜賊息盜賊息則基於太平矣欲安其兆庶莫若擇守宰守宰良則人民安人民安則無逋逸如抱沉痼者偶所親之衛養焉肯捨其親而從疏乎苟不精擇其守慎選其宰信虛聲徇請謁是致禍於民而思其安如挾彈以驅林惡禽之驚也決防以涸泉怪魚之逝也故漢宣帝詔曰與我共治天下其惟良二千石乎故承平之代號為得人內外肅穆時風一變如是則守宰之任其可容易乎其可輕受乎今遠方郡邑民抱愁痛嗷嗷然如嬰兒之望父母也朝廷命牧守選邑宰以何道而取耶其有忘慈惠之心蘊聚斂之志不思疾痛但恣刻剝役尫瘵以從欲飾廚傳以邀名天路高邈呌訴無所居者以遠而吞氣行者以賂而設譽縱使貪過桀跖亦可高枕夷柳如此則流毒於下豈有既乎故曰欲安其民莫若擇守宰也夫世態驕奢競相扇習生民益痛時風益訛昔有諫舜用漆者以其漆不已至於象象不已至於珠玉夫塞其源絶其流猶有浸漬潰防之穴而况決其源疏其流其可罪諸洋溢乎且古者車服僕隸悉繫於位上不得踰制下不得僭上故貞觀開元之初位至丞相其導從不過十數人而已逮林甫秉政內挾邪以固寵外託勢以立威勝已者巧法以誅之異已者倚公以斥之內外畏惡林甫亦自審其曲由是出入嚴其兵衛如見大敵自後執政者嗣其餘風至今不衰下至散班冗職但力可致者即前有驅後有殿固莫問於品秩矣至於崇德雅望亦不能復其本縱心有所惡皆有類聚者瞽惑不得固其節矣且月俸既有限餘給既無數以有限之入供無度之費俾其分一職當一位不掊不斂者亦鮮矣車服僕隸之為費尚且如此矧復後庭曳綺羅飾粉黛者其費如何哉故因賂而仕由賄而達牛驥皂隸汨為一流居外者恃內之權恣其刻削居內者恃外之遺益其侈靡耗民之生如城之狐蠧民之力如社之鼠枯骸朽皮盡取後已閣下其不痛心乎其不抆泣乎夫四方程式自輦轂出儻閣下剋已以行俾四海知所法則其為革弊剗訛不啻沃湯於砌雪也故曰欲固其本莫若去奢侈也自大駕南巡官失其守冀販繒織畚之伍有安劉滅項之才於是爛羊續貂首尾顛倒苟無董正是紊國經元宗平內難有功者多橫行自負姚梁公當國引光武故事請不任功臣以政優其祿秩置於散地使不干禁忌無韓彭葅醢之戮保子孫爵祿之慶閣下不以是為慮乎書曰官不必備惟其人國家設庠序之官蓋説禮敦詩之本也苟非其人焉可妄授今貴遊豪胄恥言國庠凡受其官意若獲譴故朝廷職事亦以為尋常莫知大學為國之本本顛則枝葉從之矣焉有文明之代輕易儒學齒其位者曾不知書之顛倒而欲以此發明大義闡揚大道是猶責瞽者以元黃語聾者以律呂舉是一隅則百辟其選豈可不托其名責其實也故曰欲官之治莫若為官擇人也今天下黔首不憚征賦而憚力役明敕屢降非不丁寧州縣奉私曾不遵稟既因循未用亦有所未盡焉蓋僑寓州縣者或稱前賢或稱衣冠既是寄住例無徭役且敕有進士及第許免一門差徭其餘雜科止於免一身而已今有僥幸輩偶忝微官便住故地既云前曾守官州縣須存事體無厭輩不惟自置莊田抑亦廣占物産百姓懼其徭役悉願與人不計貨物只希影覆富者稱物産典貼永絶差科貧者以富籍擠排助須從役利入私室害及疲民無利潤者轉見沉淪有膏腴者坐取安逸衣冠戶以餘慶所及合守清廉既恃其不差不科便恣其無畏無忌且古畫地之數限人名田一則量其貧富一則均其肥瘠今凡稱衣冠罔計頃畝是姦豪之輩輻輳其門但許借名便曰納貨既託其權勢遂恣其苞囊州縣熟知莫能糾摘且州縣所切莫先科差富貴者既黨護有人貧困者即竄匿無路上逼公使下窘衣資怨嗟之聲因傷和氣苟權利之路絶請託之幸除即民必泰俗必阜矣何以塞其門杜其隧在定其稅額而已自一品至九品各限其田田有恆即賦有限無路廣占矣既絶其廣占即富者無苟免之徭貧者無非次之役則凋瘵何有夫不蘇時俗何有夫不安故曰欲弊之革莫若隨田而定賦也是四者固為政之綱也將欲安其人豐其俗實未有先於此道也復有急於是者蓋朝廷之法也夫法者士庶之所以共固不以士則廢庶則用所以一而行之者欲人之鮮過也苟輕者以賂而重曲者以勢而直縱朝廷示於人雖一子不為信而况有勢有賂者焉肯凜畏哉今朝廷之法不及州縣之條州縣之條違者必有刑所以人知懼朝廷之法犯者未必罪所以人莫畏是以冠履雜處首尾倒置國君之威不行於世牧伯之令反信於時如此則風俗日已漓國柄日已陵不其痛歟不其惜歟今為政者未嘗以此為痛蓋各急於私不計於法設有其行典者悉貧而寡援俾其受罰而興怨蓄憤而不能訴鬼神有知固納其訴則伏陰陽繁霜苦雨豈不職於此哉且石碏殺其子君子以為義叔向戮其弟仲尼以為直今閣下當此大柄豈有捨其義與直而混其名與齷齪者為偶哉今法不患不制而患不行事不患不立而患不公苟以用法必公不以豪強而曲直則不出戶可以見四方之承稟不下席可以知兆庶之休戚矣代宗朝用楊綰為相綰性清儉時論推之及為相郭汾陽為河中節度使憚之妓樂減半驗於此即四方凜畏當國者操守耳陳平對漢文云宰相者上佐天子燮理陰陽內親附百姓外鎮撫四夷使御史大夫各得其職今陰陽調乎百姓親乎四夷柔乎內外之職各得其任乎欲陰陽之調也獄無滯訟官無濫政農桑無失時公府無加賦則里有歌巷有頌和聲達於上休氣屬於下陰陽何有於不調哉欲百姓之親也不奪其力以營臺榭不劫其才以具土木不掠其糧以給犬馬不賦其財以資交結聞民之病如子之病聞民之餒如已之餒百姓何有於不親哉欲四夷之柔也省刑罰薄賦斂謹庠序之教申孝悌之義鄉里識尚齒之敬道路知事長之禮然後固其關防禁其侵掠士冖柘其戈革示以恩信四夷何有於不柔哉欲內外之職得其任也命各舉所知隨材引用不以位微而不録其言不以地寒而不取其行稱文者授以文學之任然後考其文之臧否稱武者授以兵衛之任然後驗其武之勇怯稱理者授以親人之任然後責其理之優劣稱錢穀者授以度支管榷之任然後課其錢之盈虛實者升之不副者黜之其升黜皆及其所舉故人不以黨而進亦不以獨而退則內外之職何有不得其任乎自元和以降宰相閉關不接士夫遊其門升其室者非有世故非有媒薦固不可偶頃刻之語周公一沐三握髮公孫宏開東閣邴吉不以吐車茵為過而乃致理平故太平之基非一士之功也借如大厦崇崇誠柱石棟梁之力然捨其欒櫨榱桷此為何室哉今天下有倒懸之急實閣下夜以繼日籌其事坐以待旦思其用忘寢食以待往來捐金帛以給貧困之秋也某家且貧讀書著文之餘以漁獵奉甘滑今閣下居密勿啓沃之地輒以漁獵為諭焉夫漁於澤遍水而布罟獵於林被野而設罝不遍不被是闕其具也及其獲魚得兔非一日之力今內外百執事亦罝罟之衆目焉焉可一一責其獲又焉得以不獲而不設也然能不縱其躍不漏其走亦足助為漁獵矣苟或不掩其走不蔽其躍即捕之無虧其綱紀則後日之漁獵不患於遺矣惟不以詞之繁試一二垂省幸甚幸甚夫樓閣亭榭之建其名既殊其制亦異至於瞰江流跨嶺脊延親賓合歌樂晴朝月夕肆坐放懷蓋其致一也然則有以位名之者以氏名之者以景名之者以意名之者取近而言以位名之於洪州滕王閣是也以氏名之於江州庾樓是也以景名之者於鄂州黃鶴樓是也以意名之今見望春亭焉望之名愚知之矣或曰志其始建之時也其未然乎四時相序春實稱首春德發生德合仁也愛民之務莫先於仁仁以合天天以合仁治道盡矣意望者其在茲乎於是賦五言詩一章八句度材者定曲直於繩較物者決輕重於衡蓋繩無欺衡無私故人所取鏡也今使五邑之吏枉正無所逃千里之情毫釐無所差束其內外必蹈乎規矩戢諸桀黠知攝於刑憲斯郡主簿有繩衡之無私為得其任矣高陽許鎕以前秋曹椽端於讞獄詔寵之遷陟斯任自兵興十五載事隳宿貫守國之法制稟朝之政令者由關而東郡亦無幾惟吳興遵國經體舊章上下謙敬確然不渝然此數萬衆兵之所給固繫於土賦俾其役不重斂不煩吏不苛民不疲萬目自正者全在提其綱乎君制事以義制心以禮節不為勢易志不為強奪靜以督其下故其下肅恪以蒞其事故其事簡由是衆吏畏而庶務集僅致於訟息而刑置矣廣明中妖巢揭竿以犯帝閽遂俾翠華有西南之狩梁鄭周秦之甲皆閣手無所敵凡五改火鸞駕外駐甲辰年今太守以彭門之師擒巢於萊蕪提其顱薦於成都明年春玉輦還闕遂以功牧於吳興帝念殊庸位不配德詔加防禦以高其位始開幕延賓增吏拓制度是取督郵之舊署為防禦使院然後合功廩戶三掾之廳移居視印繩墮於此夫簷楹迫則耳目泥居處蕪則思慮昏今茲視於前則淺而露覘於後則湫而陋得無泥與昏乎而又藂蓧雜卉蔭翳階序列衙者亂其次授事者喪其局交肩駢足褻禮虧敬君乃命梓人擇王褱材敞前楹豁南榮砥中唐嚴層扄設外屏以肅其入也構環廊以莊其位也撤舊增新擁隘咸革列目之物罔不完美覩其顯敞則夏奪其暑居其奧密則冬去其寒地斯清境斯勝足以豁聽視爽精神導中和之性增沖淡之趣矣君子是以知蘊智者於事敏負才者應用周如水於器方員無所滯如絲於色元黃無不入如是則化為完易卑為高蓋出於餘力乎况君行已之道及物之利其察也鑑焉臧否無匿其信也潮焉朝夕不忒俗茹其正吏飫其直叔向所謂明察之官忠信之長者於此而見矣斤塗畢役君以夔業於文且謂紀年表事春秋之曩志也茲廳之立既始於我而載祀莫紀無乃取議於將來乎其為我書之無虛美無加飾惟實是編足以貽後遂謹而日之請題於東墉以記廳之始
