front:
  text: 全唐文欽定全唐文卷九百六十二闕名三
  hash: sha256:a9e932b8b44315ddb1a768bfb7f7d518af579ddf0b403ac75a3ec131e55379f0
body:
  text: 竊以寶山峻極駘足未窺惠海遙波輕舟誰泛故以探沙亂一作詩元妙類杵迷形百代同昬千年誰啟皇上託應金輪均符玉鏡俯矜若習續照慈燈鶴禁還春龍泉更曉元水躍祥丹陵寫電功韜火宅德覆昬衢智惠之光猶初日照忍辱之力如明月珠天成地平遐肅邇穆澤漏無底化行靡外滄河鏡淥碧海調氛停瑞氣於三辰汎祥煙於五節鱗羽被解罹之澤黎元沐至仁之道正化潛通法輪常轉類空鏡之傳虛猶懸河之寫澗儲君德彰妙象體睿春瓊視膳閑辰遨遊心法搦管摛章既便娟錦縟清談論辮亦參差玉照夏啟愧德周誦慙風乃於元圃園棲聚德心一作懋之英並命陳徐之士謳談永日講道終朝賓從無聲芳香動氣七辯懸流雙因一作林俱啟情遊彼岸理愜祇園靈塔將涌天花乍落于時藏秋仲節麗景妍辰氣冷一作含金扉霜浮玉宇聖慈冲邃獨幸朱堂玉砌碧水銀沙鳥弄翅一作鳩於瓊音樹葳一作藏蕤于妙葉液水穿流蓬山寫狀風生月殿日照槐烟網叨籍殊寵陪奉末塵預入寶樓竊窺妙簡鳬藻喜抃獨營心靈敢作頌云皇儀就日帝道昌雲化隆垂拱德曼鴻芬機乘八解道照三墳巍巍蕩蕩萬代一君重離照景玉潤舒華七淨標美三善稱嘉降茲法雨普洽生牙漣漪義水照曜文花芳園靉靆天宮類寶析論冥空元機入道密宇浮清一作清幽重關一作檐相藻日映金根一作雲風搖銀一作瑞草肩隨接武握寶靈珠皆抽四照並按九衢顧惟多徒奉瑛瑜終如燕石更似齊竽大唐闕二字九載歲次庚寅十月景辰朔十八日癸酉闕二字斯亡闕三字原夫超三界越四生者非至真至聖其能勉闕二字至真如何無微不著至聖如何無求不救是故欲拔苦紛當憑真正仗有為之相功德是修究無為之體理默虛運粵有處士薛待伊者望河東汾陰人門盈組綬冠冕相輝雄氣過人志節逾眾承家孝友奉公懇誠故言口闕一字如之境如危闕一字難久緬祖德之餘訓懷父母之鞠育思報恩昊天無極遂獨深願敬造七級石浮圖一闕二字見存父母椉福善齊眉百齡嘉祐日新永招餘慶為亡闕六字氏樂安闕三字功德願闕一字冥杖永拔三塗長昇五闕二字前外內眷屬等同茲闕三字負乃材極崑岷匠窮異術方如珪者為彫闕一字級緻如形者闕三字信莫不瞻仰發念頂禮消不日云闕四字果恐浮闕六字勒頌貞碣以表將來其詞曰至真闕一字象浮圖示形闕三字華鈴韻闕二字瞻禮闕一字影泉壤拔靈含化闕一字仰通幽洞冥其一至人真闕二字心遠盈而無緇闕一字濁能清倜儻博物闕二字孔明一闕二字勝埒闕一字鈞闕一字其二門下典於屬國列彼正卿班秩既崇寵光斯在金紫光祿大夫行國子監祭酒武三思延恩戚里効職公朝能勵恭勤以修名檢頃在膠序頗淹星歲度材而用舉類而遷宜增三揖之榮俾正九賓之禮可行鴻臚卿散官如故謹案此制文苑英華誤為孫逖作考逖知制誥在開元二十四年時武三思久被誅且新舊唐書亦不載三思宮鴻臚卿題與撰人必有一誤今存疑編入闕名門下四輔齊耀眾星拱於北辰百職分官萬物歸於西掖翺翔鳳閣泛泳龍池報我祖宗格於上帝今獲良弼天實賚予勅某官李景進昔漢館陶公主為子求郎而不得何者非其人也今汝景進亦吾外戚而謹愿儒雅好學善言久為臺郎頗副時望故均慶澤擢轉名曹彼漢推公而吾獎善兩得其道不亦宜乎辭不正則名數亂於昏踰非不禁則儲蓄蠧於姦慝理財之義繫斯二者今天下之金穀調度萃於戶部而度支實司其會計出納之繁則非知古理財之要莫能補察以佐其長以爾寓服職書館㣥居是儁而能以文學精深秀發其間試諸繁使其必有可觀矣以爾翼丞於都水非閒職也而器能有裕濟登無遺究其所知何紛不理進膺劇選益觀事功門下跨千里之山河察五城之風俗海物惟錯民庶實繁作我藩侯斯為重寄膺是任選其惟信臣通議大夫檢校工部尚書兼少府監充內中尚使上柱國襲岐國公食邑三千戶實封三百七十戶賜紫金魚袋李燧鐘鼎垂休勳庸襲慶擅文武之全致蘊公忠之大經用富機權學贍韜畧智足成務詞能飾身屢更惟月之曹亟踐執金之貴嶠南著招撫之績涇上垂訓齊之名英烈之門爾實為冠於戲乃祖乃父克成元勳惟子惟孫合異常寵是用擢爾於優散之地復爾於節制之雄擁我朱旗往鎮青社爾其敷我雨露修我政刑竭丹款以事君推赤誠以御眾虛已接士傾心禮賢勿恃貴以自驕罔厚斂而虐下使精銳之號益振於三軍愁歎之音不興於百姓優崇之典吾何愛焉俾遷秩於秋卿仍兼榮於弄印勉懋休績克終令圖可檢校刑部尚書兼青州刺史御史大夫充平盧軍節度使登萊棣州觀察處置等使散官勳封如故主者施行門下虜無南牧漢高魏尚之功地霸西戎秦用孟明之力平襄舊壤成紀雄軍控壓外夷保障中夏請兵出塞非幢節無以取威謀帥因時非傑材不足授任安邊制勝移孝為忠俾膺紅斾之榮且用墨縗之典正議大夫前守右金吾將軍上柱國太原縣開國男食邑三百戶賜紫金魚袋王安實韜鈐宿將勳閥名門家傳淮水之靈神授圯橋之畧堅剛不拔捷勇欲飛訓武旅以衛宸嚴握兵符而參禁近匪躬奉上宣力任公剖竹淄川克茂藩條之政執金緹騎彌昭夙夜之勤朕以七萃屯師三秦繕塞屬山西之氣俗扼隴首之咽喉地要而城孤野豐而兵勁張其羽翼可以捍此疆陲壯彼金革無辭戒於鼙鼓息疑專城之舊制築命將之新壇揆務與能選材伸用苴麻順變聞命登塗載仗出車之令佇揚鎮遠之聲總輯師徒撫寧蕃部無邀功以生事勿慢政以啟戎俾老少安懷郊坰靜一假南臺之憲印分北落之朝班勉樹嘉庸以固吾圉可起復忠武將軍守金吾衞將軍兼秦州刺史御史大夫充天雄軍節度秦城河渭等州營田觀察處置押蕃落等使散官勳封賜如故主者施行門下授律中權分憂外閫制彼短長之命握予生殺之機境壓賨渝封含要害克膺委屬必在忠賢朝散大夫守尚書兵部侍郎兼御史大夫充諸道鹽鐵轉運等使上柱國賜紫金魚袋韋有翼蘊德無隅藏鋒向晦行滋蘭畹志茂松心當官澄止水之明臨事出龍泉之利早升台閤備歷清華陳藥石於諫曹司黃素於右掖長纓得俊美價自騰左輔施河潤之功右陝繼召南之愛佐於三典麗刑多哀敬之心貳彼五兵整武得弛張之道委茲榷管制以重輕才識變通法均寬猛今以劒外之封疆敻邈東蜀之輿賦殷繁慎簡難能俾承重寄是舉報功之典庶協易祿之文於戲荊州思叔子之仁蜀郡愛文翁之化壤界相錯風謠尚存罔使潼川獨無賢守題劒重登壇之貴持綱增攬轡之威往圖嘉庸對我休命可檢校工部尚書使持節梓州諸軍事兼梓州刺史御史大夫充劒南東川節度副大使知節度事管內觀察處置等使散官勳封如故主者施行問安時處順泊然懸解至人之心也故曰材全而德不形又曰休影息跡與夫五漿先饋履滿戶外者固不侔矣然則以紀渻之養雞痀僂之承蜩匠石之運斤梓慶之削鐻用志不分移於教化則萬物之相刃相靡者悠然而順闇然而和奚在於與無趾無服之徒支離形德然後為德耶願聞其說跪發天華觀河宗之奇寶虔開祕篆聆雲英之麗曲包萬葉之鴻規籠千祀之殊觀相趨慶抃莫知所限竊以慧日西照朗巨夜而開冥法流東徙洽凍荄而挺秀無方之化不一應物之理同歸歷代迄茲咸崇斯典伏惟皇帝陛下垂衣截海作鏡中區錫類之道彌光出要之津尤重開給園於勝境咸稱首以閒居地穹輪奐人標龍象重茲濬發沖旨爰製豐碑妙思難涯元襟獨王義超繫表理邃環中臣等夙敬真宗幸窺天藻以坳堂之量揣靈鼇之浚壑蜉蝣之情議仙驥之遐壽式歌且舞咸誦在心循覽周遑不勝欣躍元元皇帝見於廟所金相玉毫彩奪夜明之景白駒丹鬣跡留天驥之衢青童曉引應瓊鐘而降節紫雲宵布籠銀漢而高昇固以克昌厥緒惟新景命恢我皇度光乎兆人所以道冠百王慶隆萬葉永綏寶祚克享無期者也臣某言臣聞兩儀定位法象必在於區分百物正名稱謂不可以相奪然則當至公之運勿用於權處太朴之辰宜循其本臣竊見周官保氏教國子六書一曰指事二曰象形三曰諧聲四曰會意五曰轉注六曰假借夫假借者謂本無其字假用音者也昔伏羲氏仰觀法於天俯觀法於地爰造書契是生文籍夫書者著也篆者傳也所以昭著誓言傳之不朽推義結字斷天下之疑垂萌示象紀天下之德安可穿鑿音韻假溢言詞者哉自史籀篇亡李斯簡脫古文有數物類難周雖魯恭王壞孔子之宅河內女子毀老聃之家而屋壁之餘門庭蓋尠敬侯所寫凋訛於正始之間汲冢所開散落於太原之際由是後儒晚學苦音訓之繁耆生故老嗟異同之雜下兼案牘旁洎質劑聽受施行莫能見曉規模典憲於何取則不有釐改孰導㣥疑當今受神冊鑄寶鼎封禪之隆固將九皇比德文章之盛豈直三代同風百官以理萬民以察臣伏見御筆前後所製新字等神功開合天地盤旋於筆端元造運行日月相望於紙上玉牒石記無以校其幽深河圖洛書不能方其麗則臣幸承皇訓親沐聖猷窺東國一札之文奉西京七言之詠劉德之陳雅樂雖未澄心劉儻之學史書頗嘗遊目輒欲循環睿旨罄竭蒙情凡所借音並加新字將令分有一定無汨於源流理或萬殊各隨其事業以此化俗佇微益於毫釐以此教人儻不虧於影響伏乞上元卑聽至道曲成矜此庸愚霈然聽許臣即望以類撰綴隨了進呈輕觸冕旒不勝惶惕之至臣聞元化不宰是有強名聖德彰聞必崇大號伏惟陛下首出千古體元獨斷掃氛祲於軒宮闡文明於宸極皇綱絕而復正神器危而重安聖達神祇功齊天地若無尊號臣下何稱易曰陰陽不測之謂神傳曰保大定功之謂武陛下斷大事於容易見成形於未兆故一蓍呈祥千里傳慶斯所謂不測也興王業於多難安生靈於反側故百神奉職四夷納貢斯可謂定功也故臣等敢上尊號曰開元神武皇帝伏惟從之臣某言臣海圻陋品業尚罕稱斂袵衡泌之間角巾山野之際夙安環堵之室罔知榮進之階屬天步方難霸圖資始遂偶飛龍之會預參汗馬之期既而慶集私門恩被昆弟歷載內外備蒙選擢承乏三朝於茲三十餘載竟微塵髮之效空負亭育之私加以鐘漏已殫齒歷云暮杖國之年斯及夜行之懼載深若勉茲衰遲久玷刺舉既取紊於官曹抑貽誚於通識當今天地休明賢能方軌豈可以策駑懷祿茹怍昧榮是以量力陳辭料能寫實天鑒凝遠特希憫照昔廣德休老方開漢室之恩陽元請骸空表晉朝之惠微臣竊景前懿敢祈今澤反初服於東臯沐薰風於窮巷倘高舂少駐敝蓋未陳庶乎瑤池之曲延望白雲之宴仙閭之阿載奉翠華之謁犬馬之志實百恒心臨表鯁戀辭意懇結臣某言臣才輕位重効淺恩深鑾駕西巡猥忝居守違離罕異進退門闌感戀惟深負乘是懼臣某中謝臣初辭之日伏奉德音限以周年許遵舊例推遷荏苒星歲再環夕惕屏營日月以冀葵藿傾葉豈望迴光犬馬有心常懷戀主顧循卑鄙未敢上聞伏承今孟冬有事陵廟慶章覃於四海國禮盛於百王伏念漢臣彌嗟留滯預逢舜后願侍宗禋瞻望之情倍百恒品且三川朝市四塞關河論都抗於西賓作鎮雄於東夏倉儲猶在邦政孔殷臣亦何人久斯重任不勝控款兢惶之至謹奉表附驛以聞伏乞俯矜誠請更擇親賢不棄草茅之微終奉綸綍之委臣等自今月以來累見隴右奏大破吐蕃大嶺青海等軍捷書前至日因奏事陛下謂臣等曰吐蕃背恩神人共棄豈惟隴右頻勝三數日間河西當有大捷今日王倕果奏大破吐蕃魚海及遊奕等軍擒生斬級并虜獲羊馬不可勝計竊觀前後克捷皆是特稟聖謀密練驍雄深討兇寇以寡擊衆所向無前天心與睿德合符士卒與神兵叶契九重制勝動必有成萬里知來見於未兆一月三捷千古未聞品物同歡何況臣等伏望宣示朝野編於史冊臣等昨十二日因奏事親奉德音朕以正月甲子日為萬姓祈福初登壇時疾風甚勁及行事之際則恬然清謐又朕親撰黃素文置壇所案上竭誠陳請須臾騰空飛上空中復聞有言報朕休徵論蒼生福慶及行禮事畢又風起如初朕近於嵩山所鍊藥成其時亦置於壇側及夜左右方欲收藥又空中聞語諸靈官雖已赴大同殿其藥且未須收此自監守言聲甚厲其左右祗承及道士等聞者莫不驚悚以達曙之後乃收其藥朕為蒼生祈福有此殊應與卿等同慶者臣聞上天之載雖曰無聲聖人所感必將有應陛下精誠契道深仁被物親祈介福用濟㣥生法事既陳疾風旋止聖詞上告祕錄騰飛遂降神言屢呈昭應始則孚佑下土報黔庶之和平終乃垂護靈丹表皇期於萬億人聽所接神休莫踰希微之地屢有昌言感應之功不唯幽贊殊祥特異振古未聞諒天意之合符豈山聲之足比無疆之慶萬國同歡況在微臣實倍常品伏望編諸簡策宣示中外臣聞道之應也萬姓叶心德之至也百靈表貺是以帝王從天以受休命臣子奉主以薦尊名下戴上為至忠上納下為大順伏惟陛下垂衣而端拱司契而乘時御辨而氣和提象而物覩臣等上稽儀極下考前訓旁求史氏明徵道書皆可以配至極之崇高建大號之美稱陛下宗師懸解挾五帝之常道恬愉自得陋三王之仁義同符帝典振古莫儔靈寶經曰大寶君者大洞之尊神玉皇之正氣陛下經高上之至理復帝先之淳源九㤅生真二合成德殊休應道已契靈文景命楊符宿彰仙籙則知聖祖以大道授陛下久矣當以應道答之苟人望洽而固違則㣥情抑而不副是以公卿宗子懇誠於內緇黃艾耋瀝款於外宜蒙納許以昭介福伏惟陛下承上元乃顧之意順普天翊戴之情伏以端午良辰萬壽來應昌圖與兩儀配永寶運與三景俱長欽若鴻名克彰厚慶聿陳大禮式茂元和臣等謹竭愚誠冒死請加尊號期於成遂以叶衆心臣等昨於勤政樓下敘立恭聞德音今日又道門威儀王虛真奉宣聖意伏承陛下奉為五聖寫一切道德經五本於太清宮興唐東明龍興觀各置一本仍各賜絹五百匹以申齋慶臣等伏以至理本乎無為乃隱言以演教孝思存乎追遠必精意以報親陛下欽崇道元虔奉先聖更抒睿思刊定真經玉軸瓊輪既懸之於日月元宗奧旨方下濟於雲霄罔極之情因心知至無疆之福有感必通式明孝經之誠更闡上皇之化即知北極之字期悟俗於㣥迷南薰之風思濟人於壽域凡在士庶孰不歡欣臣等謬列台司幸叨宮使感悅之極實萬常情無任忭躍之至望宣示朝廷編諸史冊臣等今日因奏事伏承昨日辰時大同殿前鐘樓上忽聞鐘聲其殿院常扃閉內更無人即令檢覆其鐘樓門及殿院門皆閉須臾其鐘又鳴如此者三度聞鐘聲響六十下其聲清徹但異人間左右侍臣及女道士等皆聞伏以至順通微蘊虛無以為用虔誠上達應精感以交符陛下端拱清穆欽崇道寶尊玉皇之象未明而朝謁寫㣥經之字乙夜而元覽雖高居於紫極常屬念於㣥生故得契協希夷跡多靈異雖仙樓未啟而神鐘自鳴不俟鯨魚之擊徹響於雲漢宛同鸞鳳之音諧韻於金石實表㣥仙効祉元祖呈祥徧圖牒而罕傳貫古今而未有臣等幸參近侍竊聽休徵欣躍之誠實萬常品無任慶忭之至謹奉狀陳賀以聞仍請宣示中外編諸史冊臣等今日因奏事承德音聞江南為橘江北為枳蓋以地氣有殊物性因變朕近宮內種柑子樹數株今秋以來結實一百五顆乃與江南及蜀道所進無別亦可謂稍異者伏以自天所育者不能改有常之性曠古所無者乃可為非常之感是知聖人御物以元氣布和大道乘時則殊方叶致且橘柚所植南北異名實造化之有功匪陰陽之所革陛下元風真紀六合一家雨露所均混天區齊被草木有性憑地氣而潛通故茲江外之珍果為禁中之花實綠蒂含霜芳流綺殿金衣爛日色麗彤庭豈比乎搖木移根俟風而實若榴傳種因石為名理非自於人謀事實關於神化圖牒未有耳目攸新臣等忝侍軒墀恭聞殊應喜慶交集倍萬常情仍望宣示朝廷光諸史冊伏奉恩勅令臣等三月已來分日入朝逐便尋勝伏以聖政和平景光韶麗道風淳被朝野歡娛陛下均惠澤而不遺俾簪纓其共賞因其無事許以番休草木加春沉翔益暢生成之德報効何階復以宮闕增修子來云就軍麾告捷飲至初行臣等無汗馬之勞空霑分器懷賀鷰之志敢効獻芹伏請進錢一千貫文以充宴樂願接順陽之慶得伸就日之懇老君越在皇世驟表休祥皇帝陛下垂裳多暇鍾想妙門遂乃申模聖像託構崇椒騫鳳甍於鳥路抗虯簷於雲表茲焉鑿牖爰申上祥俾夫柱下靈姿散奇光於壇宇棟間仙侍流異景於階庭允應至誠宜符睿德楊七廟之遐慶保億載之宏規豈可與虞致榮光漢延嘉氣靈禽降祀膚葉興封者同年而語哉伏見元帥行營露布伏承官軍大破逆賊二千餘衆兼燒浮橋柵壘等悉皆蕩盡陝東大破凶徒斬級生擒甚衆又見中書門下稱河陽橋頃因河淩衝突連艦偏斜昨一軍吏夜聞橋下鬧見有神人云我是毗沙門天王為國家正此橋柱及平明橋忽正又勝州已北百姓數千人忽見兵馬極眾喚百姓索食其中有人云我是張韓公及王忠嗣領此兵馬為國家討賊不日當太平百姓陳祭訖須臾不見此皆聖德所感人神合符靈應昭然古今未有者臣聞聖人者與天地合德日月齊明神祇告休山川輸貺雖五兵暫阻而七德肇修伏惟乾元大聖先天文武孝感皇帝陛下眷德昭融文思光被道沖元漠德同淵明三靈貢珍百神効職頃者兇徒未殄侵軼京師東郊不開尚稽大討幽明增憤動植未康固得天祇護梁神兵啟陣喧聲夜發狀若搆於黿鼉靈契昭然威德清於蚊蚋三軍盡覩百姓咸觀此實止戈之先兆也及師出交懷一戎而㣥凶塗地兵臨分陝再戰而餘孽殄殲擒元惡而詰彼兇殘焚賊橋而斷其歸路莫不覩兵勢以懾竄聞軍聲而畏威撲滅之期於斯見矣此則天時人事斷在目前睿算神功致之度內皆經籍未載古今蔑聞者也臣某言今日中使吳永清宣示臣萬年縣靖恭坊南街柳樹上降甘露者臣聞元元皇帝有言曰天地相合以降甘露伏惟寶應元聖文武皇帝陛下事天明事地察所以受三靈之景貺叶萬國之歡心其在陽不晞被葉增固且泫且潔如脂如飴神明有以告祥蒼翠因而不改則顥元之氣下浹於人軒轅之精不愛其寶裨太平之瑞呈上陌之中況地即萬年時當子月不寒沍實表靈長禎符薦臻壽域何遠以之興運在陶唐而則然特用紀元於大漢而無愧伏望宣付史館永播休徵臣謬承雨露之恩愧無滴涓之至臣某等言臣伏聞逆賊僕固懷恩以去月九日死於靈州鳴沙縣又見成德軍節度使李寶臣露布斬逆賊蔚州刺史曹楚王并破黨項部落收諸蕃漢軍兵一作健及百姓等三萬餘眾又邠寧節度使白孝德破僕固琡下兵馬及吐蕃斬首三千級生擒一百五十九人獲馬八百匹兼鳳翔等節度使李抱玉亦破吐蕃羌渾等三千餘眾收其軍資器械不可勝數者臣聞積德者天之所啟反道者鬼得而誅逆賊懷恩者氊裘雜種出身微賤陛下以其久經驅策嘗立功勳任以樞機一作中樞升之上將而豺狼其性梟獍其一作為心連結西蕃因依北虜大為人患二年於茲謂旅拒可以偷生猖狂可以集事曾不知逆天暴物其惡貫盈故王師未加而元兇自斃又曹楚玉去順效逆與之連衡更唱迭和同為不道李寶臣恭行天罰遂戮鯨鯢其餘吐蕃之兵羌渾之旅或敺役邠土或陵逼鳳翔白孝德陷之於前李抱玉破之於後既以剪其兩翼方且覆其全軍信宿一作聞非之間數道皆捷彼進無所入退無所從殄掃妖㣥指日非遠臣歷考近事因知天意自祿山開釁思明亂常迄於懷恩三凶繼跡始雖俶擾旋見敗亡社稷危而復安天地否而重泰足明皇穹保佑歷數延長卜年之慶永代無極臣等幸逢昌運忝列朝行慶躍之誠倍萬恒品無任歡忭之至臣某言聞忠邪不可以並立善惡不可以同道吳任宰噽而伍胥誅夷楚任靳尚而屈平放逐遠惟前事孰不痛心伏見灃州刺史裴冕忠肅明允道高德厚匪躬無怠有蹇諤之風道佐先帝驅馳靈武贊雲雷之業成社稷之勳程元振忌其直方遂加誣構投謫荒裔天下稱冤空懷醞正之悲莫雪增嫌之恥今姦邪屏退聖政大明百度惟貞四門以穆寰海之內元元之人莫不延首德音思聞至化願特令追冕列在天朝俾之端揆庶寮平章百姓處詢謀之任當燮理之權必能協和萬邦致君堯舜臣位兼將相職忝股肱思進賢傑共熙帝載臣無任懇願之至臣聞孝至於天則祥發陵邑德被於物則化及鳥獸伏惟陛下因心廣教宏道極和時因霜露之恩流行雲雨之澤故前聖垂裕歆於明誠皇天報貺賜以嘉應異鵲來感翔集可窺跡比人謀事歸神化伏望宣示中外編諸史冊臣聞春秋二百四十年不紀祥瑞而載異國之朝其在周書亦美西旅之獻蓋重其德化及遠天下大同也伏惟寶應元聖文武皇帝陛下以至敬事天地以至孝奉宗祀武功以定大難文德以懷遠人故舊史未載之邦前王不賓之長聲教所隔言語莫通悠颺南溟幾千萬里瞻望中國知有聖人踰海而來歷年方至帛丿糸邈重阻奔波載馳黃金飾冠白璫充耳服柔㣥象牽致闕前低徊馴擾稽顙屈膝隨萬國而來庭與百獸而率舞如知禮樂之節益盛羽儀之容有以彰仁化元通醇源溥暢至和大順以兆昌期事軼於軒皇迹超於漢代矣臣等謬塵樞近獲覩洪休伏請宣付史官光昭簡冊聞王者有日官動而必書事無虛美用成善終之義觀乎君舉之明體合忠直輔宣法教斯良史之任也帝者盛美紀於一時闕登雅頌彰示國家斯君子之罪也昔漢武有獲蛟之歌魏祖有南皮之事皆盛其殊能敘列前載元宗開元中蒐於岐陽親御弧矢陳九軍之禮有百中之捷煥耀圖史布昭詠歌今陛下以豐歲皆秋農郊始隙因依時令習用戎事遊涉靈囿經於上蘭以一發之神連三窟之狡弦匪再控騎無角逐進異前禽之失舉明不合之圍事過舊聞妙歸天縱足以重威四海高視千古恩賜之後榮慶中朝公卿庶尹動色相賀垂於簡牘允叶禮經若聖情沖深過於謙讓則史臣曠職後代無稱凡在庶位罔知所出伏願特迴聖慈俯遂誠情頃者賊臣兇狡敢蔽聰明陛下以時發覺咸就誅放與人更始在物惟新浹辰之間果獲佳應至德之化光賁草木太平之時遂形文字伏望藏於祕閣宣付史館草土臣某言伏奉某月日制書起復授臣某官兼某使捧對恩命哀號失圖微臣夙遭凶舋幼集荼毒亡母鞠育驟歷暄寒三十年間勤勞備至俾臣習武教臣觀書丁寧懇切僅至成立自逢昌歷累辱驅馳待罪朝行或申微効皆母之訓以及於斯凡在輩列莫不知委而久從王事靡有定居晨昏屢違甘旨多闕則臣之於母所負實深扣地呼天萬恨何極伏願察臣哀迫許臣終喪少申子道無乖企及無任迷謬崩迫之至草土臣某言一昨具陳哀懇冀蒙諒察旋奉墨制有阻微誠精魄震蕩五內分裂中謝臣為學至淺昧於禮經今冒死上聞實私情懇迫臣年未弱冠即罹閔凶終鮮兄弟惟臣與母零丁孤苦繼以屢貧衣食所資悉資紡績比臣從戎朔漠漸列軍行適遇艱難累經戰陣北出恒趙西趣鳳翔或往鄴下或留河上臣母別臣積憂成疾禪誦之外泣涕終日形貌支離殆於骨立及兩京既復九方既同臣在邠寧粗申力養豈謂無狀速禍殃罰所鍾深顧起復之恩永負劬勞之報興言及此摧心痛骨則臣母於臣異於常母臣之於母不逮常人誠合服縗廬墓以終餘齒豈可忘哀徇祿所務從權此則天地不容名教所棄伏乞納臣窮款矜臣血誠俯遂愚衷許終喪紀儻殘生未泯子道獲全必當竭力他年以答元造雖復捐身鋒鏑死且無恨無任荒迫之至臣誦言臣自奉明命累表陳乞懇誠無感聖慈未迴進退兢惶如履冰谷臣誦誠惶誠恐頓首頓首臣聞少陽之重嗣守宗祧故傳曰年均擇賢義均以卜為國之本繼奉休明臣質惟愚蒙未經師傅問安侍膳夙乖奉養之規秋籥夏弦昧於齒冑之訓無以上承匕鬯展敬粢盛內省多慙豈敢飾讓未蒙諒察惶怖失圖臣所以累獻封章備陳丹懇伏望俯迴天眷曲遂愚衷臣無任懇款之至臣某言伏奉今月日詔書大赦天下禹湯罪已霑澤既同羿浞負恩姦謀自蹶中賀伏惟陛下以天聖匡難宏慈御物而賊臣棄義乘亂一作舋敗常爰幸近郊方勤遠畧改元更始統歷惟新猶復惕厲懷柔誠明引咎務好生之德恩覃萬類遵泣辜之典罪止元兇振廢滯而片善無遺安反側而㣥邪革慮損去徽號帝堯之克讓也貶徹服御大禹之師儉也罷搉筦之利征賦就恒正封畧之侵干戈繼息辟賢致理疏爵報功減冗官而祿秩有倫優死事而存歿知感喜氣充於六合仁風被於八荒孰非昭蘇罔不率俾自然假息之孽輿櫬就誅改轍之徒束身請命八龍旋軫萬國來庭不勞王者之師重集康哉之化臣忝守藩維不獲稱慶闕庭忭躍之至倍萬恒品云云臣某言中使某至伏奉某月日勅書并手詔勞勉臣等兼賜臣衣一副臘日口脂紅雪一合中和尺一貞元八年歷日一通陛下道邁古先德動天地凡於一物必寄聖慈欲臣襦暖惸嫠故衣裳是賜欲臣除去人患改良藥下霑欲臣永駐衰容故馨香流潤新歷方啟慶昌運之無窮彞尺辨才審度量而不昧力微賜重捧戴兢惶臣無任臣某言中使郭昕至伏奉手詔并賜臘日口脂紅雪貞元九年歷日等拜受怔營不知所措臣某中謝伏以玉散降於仙宮金膏流於祕藏含芳咀味覺六府之和潤骨凝膚改三年之觀況復惟新聖歷受朔齊人稱慶戴恩倍萬恒品不勝踴躍之至臣某言中使吳千金至伏奉十一月九日賜勅書手詔存問臣及將吏百姓等自天渙汗隨地涵濡徧施稚孺普及纖細歡呼未暇聖念再加老幼奉恩感動肌骨又以臘日將及賜臣紅雪口脂各一合貞元十五年歷日一通跪啟緘封榮抃相集伏以方傳上仙藥成中禁却老除患妙絕如神嘗所聞知豈期親授況階蓂候朔晷度不差蒲柳微生又膺天歷恩波逾重蹐跼難勝不任感恩荷聖踴躍之至臣燧言臣前竊睹御製賜靈鹽節度使杜希全君臣箴一篇輒請刻石於太原興王之都與元宗所製起義堂頌碑並列垂訓後代光示萬邦伏奉批表及賜臣等手詔俯蒙允許仍賜臣一本又賜臣御製宸扆台衡銘二首并敘精義微言深於羲文之旨明訓大誡叶於舜禹之謩涵周詩而軼商頌準天地而懸日月五彩彰施而溢目八音均調以動心至於上下咸和君臣交儆僻邪無自而入猜虐不萌於中鬱堙底伏之氣宣強悍讒諛之說泯授申甫以作誡紹唐虞而追蹤誠文教之極而至治之本也臣餘生陋質材朽功微陛下獎勵過深寵錫逾厚使得獲覩殊觀接聞至音目以勳賢稱其威武跪拜捧震駭顧循悚怍實願周旋奉戴內以為子孫藏恢演昭宣外以垂金石刻今者琢磨已就刊勒方施至於次序篇章論載年月未敢即定謹令圖畫進上仍請於碑首正面刻作御製箴銘四字其下刻年號月日字建箴銘二首并序其碑首陰面伏請準起義堂頌碑例刻年號月日字建其下刻臣所上表疏伏蒙批表勅語及所賜臣手詔庶使後之觀者尋其并連究其本末以知盛德之事懿鑠丕顯游揚無極臣之所願也不勝忻懼悃懇之至謹遣某官臣某奉表以聞臣誠懽誠喜頓首頓首謹言臣某言臣私門積釁幼集荼蓼賴諸兄訓育得漸有成比登官序各限中外聚居則少離別則多兄薰頃任河中少尹先因風痺成疾手足不理於今累年中間迎到上都臣自躬親方藥兄以枌榆松檟盡在河東懷土之心暫來輒去近從數月頗益沉帛丿糸形貌支離言詞蹇止甥姪數輩年盡兒童雖在左右未能侍養欲重迎至此在兄則羸瘵難堪將馳往近關顧臣為官守所繫魂銷氣索志往形留百憂攢心動失次第伏以聖慈涵育至德潛通肖翹之倫各遂其性特乞罷臣所職許以還鄉儻得數歲侍兄必冀沉疴有間然後星言匍匐稽首闕庭臣之至願於斯萬足無任懇願迫切之至
