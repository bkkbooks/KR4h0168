front:
  text: 全唐文欽定全唐文卷五百七十八柳宗元十
  hash: sha256:5fc59f88717536aa455678a976eab3bff9000b2c8f764c55b56ff6230edad73f
body:
  text: 潤之盜錡竊貨財聚徒黨為反謀十年今天子即位三年大立制度於是盜恐且奮將遂其不善視部中良守不為已用者誣陷去之睦州由是得罪天子使御史桉問館於睦自門及堂皆其私卒為衛天子之衛不得搖手辭卒致具有間盜遂作而廷臣猶用其文斥睦州南海上既上道盜以徒百人遮於楚越之郊戰且走乃得完為左官吏無幾盜就禽斬之於社垣之外論者謂宜還睦州以明其誣既更大赦始移永州去長安尚四千里睦州未嘗自言吳武陵剛健士也懷不能忍於是踴躍其誠鏗鏘其聲出而為之詩然後慊於內豫固知睦州之道也熟銜匿而未發且久聞吳之先焉一作言者激於心若鐘鼓之考不知聲之發也遂繫之而重以序越有納官之令以勝大敵漢有羽林之制以威四夷國家寵先中丞邁古人之烈故君自未成童品常第四人猶曰於古為薄漢北地都尉卬以不勝任陷胸奴而子單侯於瓶濟北相韓千秋以匹夫之諒奮觸南越而子延年侯於成安君之土田之錫猶挫於有司之手始由施州為涪州扞蜀道勍寇晝不釋刃夜不釋甲曰我忠烈允也期死待敵敵亦曰彼忠烈允也盡力致命是不可犯然而筆削之吏以簿書校計贏縮受譴茲郡凡二歲朝廷建大本貞萬邦慶澤之濡洗濯生植又况涪州家聲之大裕蠱之志宜尤被顯寵者也自漢而南州之美者十七八莫若澧澧之佐理莫踰於長史以是進秩人猶曰且有後命永州多謫吏而君侯惠和溫良故其歡愈異於他部優詔既至而君適讎於文其往也獨故凡羡慕之辭無不加等噫以君承荷之重恭肅之美四方之求忠壯義烈者將於君是觀凡君子之志欲其優柔而益固憤悱而不忘以增太史世家之籍用是為貺則拱璧大鼎烏可以言重乎河東薛存義將行柳子載肉於俎崇酒於觴追而送之江之一本無之字滸飲食之且告曰凡吏於土者若知其職乎蓋民之役非以役民而已也凡民之食於土者出其十一傭乎吏使司平於我也今我受其直怠其事者天下皆然豈唯怠之又從而盜之向使傭一夫於家受若直怠若事又盜若貨器則必甚怒而黜罰矣以今天下多類此而民莫敢肆其怒與黜罰何哉勢不同也勢不同而理同如吾民何有達於理者得不恐而畏乎存義假令零陵二年矣蚤作而夜思勤力而勞心訟者平賦者均老弱無懷詐暴憎其為不虛取直也的矣其知恐而畏也審矣吾賤且辱不得與考績幽明之説於其往也故賞以酒肉而重之以辭仕於世有勞而見罪凡人處是鮮不怨懟忿憤列於上訴於下此恆狀也異於恆者其道宜顯薛生司貨賄於軍興之際兵亂不去然得以不犯由太行以東皆傳道之可以為勞矣而竟連大獄以致於放不戚於貌不悱於心樂以自肥而未嘗尤於物其有異於恆矣哉朝廷施恩澤凡受謫者罪得而未一作末薄乃命以近壤薛君去連而吏於朗是其漸於顯歟君子學以植其志信以篤其道有異於恆者充而大之苟推是以往雖欲辭顯難矣過洞庭上湘江非有罪左遷者罕至又况踰臨源領下灕水出荔浦名不在刑部而來吏者其加少也固宜前豫逐居永州李君至固怪其棄美仕就醜地無所束縛自取瘴癘後豫斥刺柳州至於桂君又在焉方屑屑為吏噫何自苦如是耶明時宗室屬子當尉畿縣今王師連征不貢二府方汲汲求士李君讀書為詩有幹局久遊燕魏趙代間知人情識地利能言其故以是入都干丞相益國事不求獲乎己而已以有獲豫嫉其不為是久矣今而曰將行請豫以言行哉行哉言止是而已嚴氏之子有公貺者退自有司踵門而告柳子曰吾獻藝不售於儀曹之賈貨不中度敢逃其咎詰朝將行願聞所以去我者其可乎哉豫諭之曰吾子以沖退之志端其趨嚮以淬礪之誠修其文雅行當承教戒於獨立之下濬發清源激揚洪音沛哉鏗鏗乎充於四體之不暇吾何敢去子恭惟相國馮翊公有大勳力盈於旗常極人臣之尊分天子之憂殿邦坤隅柄是文武若子者生而有黼繢粱肉之美不知耕農之勤勞物役之艱難趨其庭有魏絳之金石焉候其門有亞夫之棨戟焉中人處之不能無傲而子之伯仲皆脫略貴美服勤儒素退託於布衣韋帶之任如少習然故繼登上科以及於子是可舉嚴氏之教誦乎他門使有矜式也而吾子又引慝內訟撝謙如此其何患乎賈之不售而自薄哉於是文行之達若高陽齊據者偕賦命豫序引豫朴不曉文故書嚴子之嘉言編於右簡竊褒貶之義以贈周乎志者窮躓不能變其操周乎藝者屈抑不能貶其名其或處心定氣居斯二者雖有窮屈之患則君子不患矣元氏之子其殆庶周乎言恭而信行端而靜勇於講學急於進業既遊京師寓居側陋無使令之童闕交易之財可謂窮躓矣而操逾厲志之周也才濬而清詞簡而備工於言理長於應卒從計京師受丙科之薦獻藝春卿當三黜之辱可謂屈抑矣而名益茂藝之周也苟非處心定氣則曷能如此哉豫聞其欲退家殷墟修志增藝懼其沈鬱傷氣懷憤而不達乃往送而諭焉夫有湛盧豪曹之器者患不得犀兕而剸之不患其不利也今子有其器宣其利乘其時夫何患焉磨礪而坐待之可也遂欣欣而去朝廷用文字求士每歲布衣束帶偕計吏而造有司者僅半孔徒之數春官上大夫擢甲乙而升司徒者於孔氏高第亦再倍焉僕在京師凡九年於今其間得意者二百有六十人其果以文克者十不能一二嘗從俊造之後頗涉藝文之事四貢鄉里而後獲焉方之於釣者絲綸不屬釣喙甚直懷有美餌而觖望獲魚之暮則善取者皆指而笑之今辛生固窮而未達遲久而不試褒衣之徒視子而捧腹者蓋不乏一作不之知焉辛生嘗南依蠻楚專志於學為文無謬悠迂誣之談鍛鍊翦截動可觀采故相國齊公接禮加等常為右客且佐其策名之願遂笈典墳袖文章北來王都笑揖㣥伍文昌下大夫上士之列見而器異爭為鼓譽由是為聞人戰術藝之場莫與爭鋒然而遷延三北躑躅不振豈其直鈎而釣懷美餌而羡魚者耶若辛生者有司抑之則已不然身都甲乙之籍其果以文克歟今則囊如懸罄傭室寓食方將適千里求仁人被冒畏景陟降棧道吾欲抑而不嘆其若心胸何然吾聞焚舟而克手劍而盟者皆敗北之餘也子之厄困而往霸心勇氣無乃發於是行乎成拜賜之信刷壓境之恥無乃果於是舉乎往慎所履如志遄返勉自固植以遂子之欲姑使談者謂我言而中不猶愈乎世有病進士科者思易以孝悌經術兵農曰庶幾厚於俗而國得以為理乎柳子曰否以今世尚進士故凡天下家推其良公卿大夫之名子弟國之秀民舉歸之且而更其科以為得異人乎無也惟其所尚又舉一作文學移而從之尚之以孝悌孝悌猶是人也尚之以經術經術猶是人也雖兵與農皆然曰然則宜如之何曰即其辭觀其行考其智以為可化人及物者隆之文勝質行無觀智無考者下之俗其以厚國其以理科不俟易也今有博陵崔策子符者少讀經書為文辭本於孝悌理道多容以善別時剛以知柔進於有司六選而不獲家有冤連伏闕下者纍月不解仕將晚矣而戚其幼孤往復不憚萬里再歲不就選世皆曰孝一作仁悌人也如是且不見隆雖百易科其可厚而理乎今夫天下已理民風已厚欲繼之於無窮其在慎是而已朝廷未命有司既命而果得有道者則是術也宜用崔子之仕又何晚乎僕智不足而獨為文故始見進而卒以廢居草野八年麗澤之益鏃礪之事空於耳而荒於心崔子幸來而親一作覿豫讀其書聽其言發豫始志若寤而言夢醒而問醉未及悉而告豫以行豫懼其悼時之往而不得於內也獻之酒賦之詩而歌之坐者從而和之既和而敘之僕之始貢於京師蓍者卦之曰是所謂望之未覩隱而未見矘乎遠而有榮者也今茲歲在鶉首若合於壽星其果合乎僕時悒然遲之謂其誕慢怪迂是將不然然而僅置於懷耳未克決而忘之也後果依違遷就四進而獲卒如其言云噫彼莫莫者其有宰於人乎不然何其應前定若是之章明也今蔡君馳聲耀譽聞於公卿戰藝之徒推為先登而五就鄉舉往則見罷意者前定之期殆未及歟故君子之居易俟命樂天不憂者果於自是也君其勵文學焉丈人牧人南邦君展覲承顏婆娑愈樂之暇則充其經笥茂是文苑時焉逃哉遲速之事則瞽史之任吾不及知所謂先聲後實者豈唯兵用之雖士亦然若今由州郡抵有司求進士者歲數百人咸多為文辭道今語古角夸麗務富厚有司一朝而受者幾千萬言讀不能十一即偃仰疲耗目眩而不欲視心廢而不欲營如此而曰吾能不遺士者偽也唯聲先焉者讀至其文辭心目必專以故少不勝京兆韋中立其文懿且高其行願以恆試其藝益工久與居益見其賢然而進三年連不勝是豈拙於為聲者歟或以韋生之不勝為有司罪豫曰非也穀梁子曰心志既通而名譽不聞友之過也名譽既聞而有司不以告有司之過也人之視聽有所止神志有所不及古之道名譽未至不以罪有司而况今乎今韋生樂植乎內而不欲揚乎外其志非也孔子不避名譽以致其道今韋生仗其文簡其友思自得於有司抑非古人之道歟將行也豫為之言既以遷其人又以移其友且使惑者知釋有司也自命鄉論士之制壞而不復士莫有就緒故叢於京師京兆尹歲貢秀才常與百郡相抗登賢能之書或半天下取其殊尤以為舉首者仍歲皆上第過而就黜時謂怪事有司或不問能否而成就之中書高舍人備位於禮部攘袂矯枉痛抑華耀首京師之貢者再歲連黜辛生以是不在議甲乙伍中其沈沒厄困之士閣戶塞竇而得榮名者連畛而起談者果以至公稱焉其能否也世莫知也若辛生其文簡而有制其行直而無犯嚮使不聞於公卿不揚於交遊又不為京師貢首則其甲乙可曲肱而有也嗚呼名之果為不祥也有是夫既受退告歸長沙以辛生之文行八年無就如其初而退返吾甚憤焉孟子曰位卑而言高者罪也於辛生又不能已故略伯氏自淮陽從調抵於京師冬十月牒計不至攝衽而退顧謂宗元曰昔吾祖士師生於衰周與道同波為世儀表故直道而仕三黜不去孔子稱之遺佚而不怨厄窮而不憫孟子贊之今吾遑遑末路寡偶希合進不知嚮退不知守所不敢折其志戚其心遵祖訓也然而闕滫瀡之養乏庾釜之畜逼迸無成東轅淮湖雖欲脫細故於胸中味道腴於舌端勉修厥志懼不恆久子當慰我窮局之懷袪我行役之憤博之以文發於詠歌吾非子之望將誰望焉宗元再拜曰夫聞善不慕與聾瞶同見善不敬與昏瞽同知善不言與嚚瘖同則聞之先達久矣矧吾兄有柔儒之茂質恢曠之宏量敢不一作無敬乎有述祖之美談安道之貞節敢無慕乎覩徽容而敬聞嘉話而慕敢無言乎言不稱德文不盡志適為纍而巳矣於是賦而序之繼其聲者列於左凡五十七首遂命從姪立編為後序終焉吾與謀由高祖王父而異謀少吾二歲往時在長安居相邇也與謀皆甚少獨見謀在衆少言好經書心異之其後吾為京兆從事謀來舉進士復相得益知謀盛為文辭通外家書一再不勝懼祿養之緩棄去為廣州從事復佐雍州連得薦舉至御史後以智免歸家江陵有宅一區環之以桑有僮指三百有田五百畝樹之穀藝之麻養有牲出有車無求於人日率諸弟具滑甘豐柔視寒暖之宜其隟則讀書講古人所謂求其道之至者以相勵也過永州為吾留信次具道其所為者凡士人居家孝悌恭儉為吏祗肅出則信入則厚足其家不以非道進其身不以苟得時退則退尊老無井臼之勞和安而益壽兄弟衎衎以相友不謀食而食給不謀道而道顯則謀之去進士為從事於遠始也吾疑焉今也吾是焉別九歲而會於此視其貌益偉問其業益習叩其志益堅於呼吾宗不振久矣識者曰今之世稍有人焉若謀之出處庸非所謂人歟或問管仲孔子曰人也謀雖不試於管仲其為道無悖亦可以有是名焉抑又聞聖人之道學焉而必至謀之業良矣而又增焉志專矣而又若不足焉孔子之門不道管晏則謀之為人也其可度哉吾不智觸罪擯越楚間六年築室茨草為圃乎湘之西穿池可以漁種黍可以酒甘終為永州民又恨徒費祿食而無所答下愧農夫上慚王官追計往時咎過日夜反覆無一食而安於口平於心若是者豈不以少好名譽嗜味得毒而至於是耶用是愈賢謀之去進士為從事以足其家終始孝悌今雖羡之豈復可得謀在南方有令名其所為日聞於人吾恐謀不幸又為吾之所悔者將已之而不能得可若何然謀以信厚少言蓄其志以周於事雖履吾迹將不至乎吾之禍則謀何悔之有苟能是雖至於大富貴又何栗耶振吾宗者其惟望乎爾人咸言吾宗宜碩大有積德焉在高宗時並居尚書省二十二人遭諸武以故衰耗武氏敗猶不能興為尚書吏者間十數歲乃一人永貞年吾與族兄登並為禮部屬吾黜而季父公綽更為刑部郎則加稠焉又觀宗中為文雅者炳炳然以十數仁義固其素也意者其復興乎自吾為僇人居南鄉後之穎然出者吾不見之也其在道路幸而過豫者獨得澥澥質厚不諂敦朴有裕若器焉必隆然大而後可以有受擇所以入之者而巳矣其文蓄積甚富好慕甚正若牆焉必基之廣而後可以有蔽擇其所以出之者而已矣勤聖人之道輔以孝悌復嚮時之美吾於澥焉是望汝往哉見諸宗人為我謝而勉焉無若太山之麓止而不得升也其唯川之不已乎吾去子終老於夷矣外氏之世德存乎古史揚乎人言其敦大朴厚尤異乎他族由遵而上五世為大儒兄弟三人咸為帝者師其風之流者皆好學而質重遵豫弟也廣而不肆巽而不懾孝敬忠信之道拳拳然未嘗去乎其中蓋由其中出者也浸潤以詩易動搖以文采以豫棄於南服來從豫居五年矣未嘗見其行有悖乎義言有異乎行者則豫之棄也適纍斯人焉以愛豫而慰其憂思故不為京師遊以取名當世以桂之邇也而中丞之道光大多容賢者故洋洋焉樂附而趨以出其中之有夫如是則宜奮翼鱗乘風波以遊乎無倪往哉其漸乎是行也吾觀古豪賢士能知生人艱飢羸寒蒙難抵暴捽抑無告以呼而憐者皆飽窮厄恆孤危訑訑沖沖東西南北無所歸然後至於此也今有呂氏子名讓生而食肉厭粱稻欺紈縠幼專靖不好遊不踐郊牧坰野不目小民農夫耕築之倦苦不耳呼怨而獨悴然憐天下之窮氓坐而言未嘗不至焉此孰告之而孰示之耶積於中得於誠往而復咸在其內者也彼告而後知示而後哀由外以鑠己因物以激志者也中之積誠之得其為賢也莫尚焉呂氏子得賢人之上資增以嗜儒書多文辭上下古今左繩右準以為直道其於遠且大若稼而穀圃而蔬不丐買而有也今來言曰道不可特出功不可徒成必由仕以登假辭以通然後及乎物也吾將通其辭干於仕庶施吾道願一決其可不可於子何如豫曰志存焉學不至焉不可也學存焉辭不至焉不可也辭存焉時不至焉不可也今以子之志且學而文之又當主上興太平賢士大夫為宰相卿士吾子以其道從容以行由於下達於上旁施其事業若健者之升梯舉足愈多身愈高人愈仰之耳道不誤矣勤而不忘斯可也怠而忘斯不可也捨是吾無以為決子其行焉零陵城南環以㣥山延以林麓其涯谷之委會則泓然為池灣然為溪以上多楓楠竹箭哀鳴之禽其下多芡芰蒲蕖騰波之魚韜涵太虛淡灩閭里誠遊觀之佳麗者已崔公既來其政寬以肆其風和以廉既樂其人又樂其身於暮之春徵賢合姻登舟於茲水之津連山倒垂萬象在下浮空泛影蕩若無外橫碧落以中貫陵太虛而徑度羽觴飛翔匏竹激越熙然而歌婆然而舞持頤而笑瞪目而倨不知日之將暮則於向之物者可謂無負矣昔之人知樂之不可常會之不可必也當歡而悲者有之况公之理行宜去受厚錫而席之賢者率皆左官蒙澤方將脫鱗介生羽翮夫豈趦趄湘中為憔悴客耶豫既委廢於世恆得與是山水為伍而悼茲會不可再也故為文志之灌水之陽有溪焉東流入於瀟水或曰冉氏嘗居也故姓是溪為冉溪或曰可以染也名之以其能故謂之染溪豫以愚觸罪謫瀟水上愛是溪入二三里得其尤絶者家焉古有愚公谷今豫家是溪而名莫能定土之居者猶齗齗然不可以不更也故更之為愚溪愚溪之上買小邱為愚邱自愚邱東北行六十步得泉焉又買居之為愚泉愚泉凡六穴皆出山下平地蓋上出也合流屈曲而南為愚溝遂負土纍石塞其隘為愚池愚池之東為愚堂其南為愚亭池之中為愚島嘉木異石錯置皆山水之奇者以豫故咸以愚辱焉夫水智者樂也今是溪獨見辱於愚何哉蓋其流甚下不可以溉灌又峻急多坻石大舟不可入也幽邃淺狹蛟龍不屑不能興雲雨無以利世而適類於豫然則雖辱而愚之可也寧武子邦無道則愚智而為愚者也顏子終日不違如愚睿而為愚者也皆不得為真愚今豫遭有道而違於理悖於事故凡為愚者莫我若也夫然則天下莫能爭是溪豫得專而名焉溪雖莫利於世而善鑒萬類清瑩秀徹鏘鳴金石能使愚者喜笑眷慕樂而不能去也豫雖不合於俗亦頗以文墨自慰潄滌萬物牢籠百態而無所避之以愚辭歌愚溪則茫然而不違昏然而同歸超鴻蒙混希夷寂寥而莫我知也於是作八愚詩紀於溪石上君子遭世之理則呻呼踴躍以求知於世而遁隱之志息焉於是感激憤悱思奮其志略以效於當世必形於文字伸於歌詠是故有其具而未得行其道者之為也婁君志乎道而遭乎理之世其道宜行而其術未用故為文而歌之有求知之辭以豫弟同志而偕未達故為贈詩以悼時之往也豫既困辱不得預睹世之光明而幽乎楚越之間故合文士以申其致將俟夫木鐸以間於金石大凡編辭於斯者皆太平之不遇人也豫既謫永州以法華浮圖之西臨陂池邱陵大江連山其高可以上其遠可以望遂伐木為亭以臨風雨觀物初而遊乎皓氣之始間歲元克己由柱下史亦謫焉而來無幾何以文從豫者多萃焉是夜會茲亭者凡八人既醉克己欲志是會以貽於後咸命為詩而授豫序昔趙孟至於鄭賦七子以觀鄭志克己其慕趙者歟卜子夏為詩序使後世知風雅之道豫其慕卜者歟誠使斯文也而傳於世庶乎其近於古矣
