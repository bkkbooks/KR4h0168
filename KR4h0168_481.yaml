front:
  text: 全唐文欽定全唐文卷四百八十一周任德宗朝官侍御史
  hash: sha256:22af5a5899337d068a8e734669b233db4c1615a6c2c1c3b711e11e55471d2828
  markers:
  - {type: head, offset: 14, content: 呂周任, id: KR4h0168_NFKB_481-h1, level: 1}
body:
  text: 春秋左氏傳曰天反時為災地反物為妖其於水也反利為害矣在唐堯時包山陵而浩滔天在漢武時浮齧桑而浸鉅野皆震蕩上心昏墊下人其故何哉天其或者警休明而表忠誠也皇唐貞元八年歲在壬申夏六月上帝作孽罰茲東土浩淼長瀾周亘千里請究其本而言之是時山泐桐栢發谼歕湧下注淮瀆平湍七丈浮壽踰濠下連滄波東風駕海潮上不落兩水相逆濺濤倒流矗縮迴薄衝壅淮泗積陰驟雨河瀉瓴建不舍晝夜至於旬時乾坤合怒雲雷為屯以水濟水吞州漂防走不及竄飛不及翔連甍為河海噍類如魚鱉事出慮外孰能圖之開府儀同三司檢校右散騎常侍兼御史大夫泗州刺史武當郡王張公伾以其始至也聚邑老以訪故搴薪楗石以禦之其漸盛也運心術以馭事維舟編桴以載之遂連軸促櫓歛邑之惸嫠老弱州之庫藏圖籍官府之器先寘於遠墅軍資甲楯士女馬牛遽遷於水次將徤丁壯遏水之不可者任便而自安迨數日而計行矣洪波汗漫不辨涯涘驚飈鼓濤舟不得不覆巨浪崩山城不得不圯崇邱如島稍稍而沒厦屋如查汎汎相繼天迴地轉混茫其中公獨與左右十數人纜舟於郡城西南隅女牆濕堵之上以向衝波之來不亦危哉公之左右失色同辭請移公曰伾天子守土臣也苟有難而違之若王命何且南山隔淮幾五六里吾能徃矣況是別境離局姦也雖死不為公於是使部內十驛遷於虹城西鄙而南傍南山而東四百里達維揚之路俾星郵無壅又東北直渡經下邳五百里至於徐州通廉察之問又移書淮南城將令斷扁舟徃來立標樹信以虞寇賊之變公每端拱對水而訴曰伾奉聖主明詔司牧此州以親萬姓河公何為不仁降此大沴伾之罪也厲聲正色阽危不撓歷數旬而水定又再旬而水耗自水始至及水始耗已六時矣又一時而復流郊境之內無平不陂郛郭之間無岸不谷尺椽片瓦蕩然無所有可異者惟公之路寢與內寢巋然存焉豈不可浮而徃抑不可顛而壞乎斯則神仰公之仁先庶物而遺已神賞公之忠臨大難而守節神高公之義動適權以成務故保其聽政養安之所旌公之善也昔召伯之理也人愛甘棠而勿翦方茲神靈扶持不亦遠乎公乃捨車而徒棄輴而泥弔亡恤存綏復軍郡遠軫聖慮詔左庶子姚公弔而賑之至於修府署建城池詔有司計功而償緍立㕓市造井屋公申勸科程以貰以貸纔踰年而城邑復常矣其餘縮板為垣樹柳為麗端衢四達廨宇雙峙雙闕雲聳瓊臺中天即公之新惠也天災流行何代無之逢昏即盛遇賢即退故劉昆反風而火滅王尊臨河而水止蓋忠誠之至也公嘗領羸兵守孤城以百當萬俾國家全山東之地名載青史公即國之長城也今以一葦之航絓於危堞之上以當漲海之勢城頺而一塊不傾水止而所濟獲全公即國之貞臣也固知明主之委任於公也皆感而通焉周任不敏學於舊史氏借古人以諭公或曰未同年矣謹述而記之時貞元十三年歲在丁丑清和之月哉生魄勒於石損之貞元十四年進士邈彼斜漢麗於中天遇良宵之已艾與清景而相鮮勢則昭回既闌干而遠映時方蕭瑟亦汎濫而高懸的爾遙分淒然仰眺澄奕奕之浮彩隱蒼蒼而引耀孤星迴泛狀清淺之沉珠殘月斜臨似滄浪之垂釣輕暉幕幕遠景蕭蕭色分隱映光凝泬寥擬瀑布而不落似輕雲之欲銷夜景將分清光向曉縈碧落以迴薄澹晴空而縹緲躋攀不及限一水以心遙瞻望空勞邈九霄而思杳發跡無際凌虛不傾積曙色之牢落圅爽氣之淒清疑曳練而勢遠訝殘虹而體輕遠想牽牛漸失迢迢之狀遙思弄杼無聞軋軋之聲景氣潛昭氛埃遠屏寧在地以為狀信滔天而挂影可以翫清光狎餘景分暉爽亮向曉色而亭亭遠勢縱橫帶秋光之耿耿偉茲垂象倬彼青霄映星足厂墨之的的出雲路以昭昭想穿鑿之初悠然莫測稽源流之始邈矣方遙則知匪自人功實惟天設自虛無而想像界寥廓而昭晰意天邊之橫注遠若波瀾想空裏之潛流遙疑嗚咽宜其臨清泚挹澄澈儻天路之可昇與清漪而比潔昔人有暗室無欺行行路歧涉清流之蕩漾指白水以驅馳乘匹馬而來念茲枯渴傾一囊以用投彼漣漪且水本無情人能誓志俯濯纓之上善控奔蹄之小駟廉隅是切斗升之水無多重價將酬子母之錢盡棄湯湯淺瀨歷歷五銖飲之而忘其量也投之而無乃甚乎同濟河而沉璧異濁水以求珠隱金沙之中迷於赤仄落蘋蘩之上混彼青蚨嗟乎利已則多潔身誠鮮在一飲而何損投半兩而稱善鳧鷖下處對鵞眼而難分鱣鮪游時雜鯨文而不辨駸駸練影潏潏波聲滿腹而自資行道墜錢而孰謂沽名郭況之家人儻來訝移金穴漢代之貲郎或見猶認水衡浦漵縈盈汀洲重疊吳酌貪而難並王不言而雅叶致香醪而一醉且乏杖頭入春溜以俱沉不漂榆莢澄明水底散亂馬前乍似揀金之磧何殊種玉之田逐好利之徒無辭俯拾同貫珠之子幾誤旁穿是知雅志無儔常情不到將均勺水之直自勝飲冰之操則墜銀瓶於井底思婦徒傷投竹杖於陂中仙翁可報賢哉項氏之心從吾所好異彼天馬生於遠方每流汗以津潤如成血以熒煌所以名重騄驥價高驌驦骨騰肉飛既揮紅而沛艾麟超龍翥亦流汗以徜徉當其武皇燿兵貳師服猛破大宛之殊俗獲斯馬於絕境由是辭遠塞以俱來望漢庭於遐騁初疑霢霂染瀚海之霜華終訝淋漓變榆關之霞影及乎獻闕之始就駕之初飾金羈而勢如躡影排玉勒而態若凌虛伯樂乍觀訝霑襟而沃若王良載馭驚濺袖以班如觀其步驟如流驅馳若滅恣餘力而聳躍控中衢而敻絕長鳴向日足火言火火蹀而色若渥丹驤首臨風奮迅而光如振血疾徐中節羈朿如濡流膺臆以飛赭灑纓鬣以凝珠雄姿泛彼逸態濡于映白駒之㣥皆疑失素齊紫燕之匹不可奪朱卓彼奇姿實為殊觀初溢腹而霑灑終盡足而渙汗此朱翼而表異難並駿良彼赤鬣以稱奇飜同欵段超騰莫及迅疾難儔遽赫如以浹洽乍煥若以飛浮儻遂越都甚追風而更疾如同過隙似奔電以潛流且其戢聯翩異踡跼材逾良駿名失逸足儻不棄於血誠將八鑾而齊躅護字殷功博陵人貞元十二年進士終嶺南節度使惟刀鏡之異名共堅剛以為質懿靈仙之手澤得微妙之心術銛鋒始扌叐乍盤屈以規圓朗鑒俄成駭拂拭而光溢則知道藝之秘變化之神實希夷而有德寧積習而可臻瞥然而電影初散煥爾而菱花已新用不假物力非因人可以矯而揉可以引而伸歘應手以從革爛含光而足珍霜刃既摧冰光乃見自金環而耀彩入寶匣而增絢道高欒氏鄙噴酒而雨飛術邁壺公輕投杖而龍變諒成形於顧指豈勤力於鑄鍊在剸剖之則遺將妍媸而必辨仙術斯遠人情匪量雖五金勁質百鍊純鋼或卷舒而在意信元妙之無方利用無虧同切玉於周后明輝既就齊照膽於秦王軼前志而稱奇著幽經以標異始挈而雄鋩若失屢照而清光不匱覩神迹之昭彰識靈訣之奧秘是將手以為炭心以為爐既可引而可屈亦何有而何無考乎誠與元而契稽乎理為道之俱異哉術亦無詐將本之於神化法不可傳徒仰之於列仙雖改其狀不淪其堅初徑挺以繩直終青熒而月圓昔也為刀則犀兕之可斷今也作鏡知鑒照之無偏儻或收於一割與鸞影而鶯遷陽精之瑞兮惟瑞之嘉首三光而委照備五色以連華繁彩遙分叶土數於聖運祥光下燭贊元吉於皇家且夫天之降禎昭示㣥有日之效慶丕應元后軼圖牒而稱靈著策書而不朽徑惟千里表年歷而當千麗彼九華彰帝業之在九懿其廓煙霄而朗霽歛天宇之氛曀出暘谷之方融歷離宮而增麗羲和疑而愕立疇官駭以橫睇循黃道以遲遲爍青冥而晰晰觀其瑞景中煥浮晶外溢所以告昌期符聖日結金天以標異掩㣥祥而首出仰其眾色比河上之榮光徵彼謠言異江中之萍實景麗天衢明均八區知神光之有宰信元化之潛敷媚韶陽於紫陌混佳氣於皇都於是見土行之善應識帝載之珍符君一德兮格于上天日五色兮臨于下土實有感而斯見固惟仁而是輔乘虛散彩狀朝煙之曖空緣隟通輝若晴虹之入戶燦爛同耀元黃交映暈藻繪於金輪聚雲霞於寶鏡當道泰以垂貺契河清之表聖諒四彗之莫儔豈再中而攸競則知天意非昧人情可測所以異其彩示輝光之日新所以呈其祥慶文明之允塞偉夫彼日之瑞可以象君之德謬膺薦於春闈幸觀光於上國昌言貞元十六年進士天序運氣王統時紀欽若是授人之初履端為步歷之始欲正時而罔忒非置閏其何以伊昔陶唐五帝之世申明推策之術表錫落蓂之異羲和之職既分歷象之文始備於其寅亮帝圖式昭天事其則伊邇其猷孔嘉日月運行故有遲速之異晦朔循軌因為大小之差立分至則寒暑不忒積餘日而盈虧匪賒且正者王之丕訓時者天之大信正得其序則面離而御乾時失其經則夏雹而冬震人殃於疫年不為順故時不得不正歲不得不閏也昔周禮在魯歷法可推官或尸位閏則迷時良史為之追正議士為之興辭俾夫司歷法者罔或二事建皇極者於焉慎思則序不而事不悖沴可伏而祥可期我唐百王居盛九葉伊聖昧爽無忘乎順序動息必繇乎時令茲歲也當仲秋而歸餘居位也闔左扉以舒政化災為祥紆憂作慶南山之壽閏月而潛宏北戶之甿重譯而歸正於時金風半肅雕雲乍歛野樹丹舒遙峯翠點燕溟海以馳歸鴻朔漠而方漸正時之文存乎徃志舍之則玉燭不調得之則銅儀安次可以使四方稟朔之君萬代守文之士知我正徃歷奉天時而置也總字會元扶風人元和初為虔州刺史入為刑部侍郎歷淮西忠武天平軍節度使長慶二年加檢校尚書左僕射入為戶部尚書三年卒贈右僕射謚曰懿臣某言中使至奉宣聖旨賜臣敕書手詔并御製中和節詩序及尺等天貺薦臨睿文亮發仰觀俯愧祗懼若驚自受殊恩守茲遠鎮才拙日淺政未及人陛下頻降寵私驟施惠渥雖大君獎飾其道則然微臣駑猥豈宜及此臣聞先聖有作不相沿襲苟合天理順乎人心則可以垂憲百王布諸彞典側覽明詔以二月一日為中和節事因祈穀便賜歡娛兼賜臣御製詩序一本尺一枝者伏以仲月良辰首建嘉節朝野慶洽君臣樂康助萌芽之發生擬天地之含育誠所以跨越周漢邁絕古今況聖人麗藻高懸日月皇儲妙翰益覩文明誕告萬方孰不歡抃又書同律度禮均衡石以尺頒賜固協其時敢不佩此謨猷謹於軌範限守邊鎮遂闕稱觴徒觀宴鎬之詩不厠賡歌之末無任兢荷歡躍之至臣聞臣之事君如子事父子有晨昏之道臣有朝覲之儀載罹寒暑之遷豈勝犬馬之戀臣聞古之郡國皆有邸第列在京師出命守藩入令述職所謂百谷朝海眾星拱辰伏惟皇帝陛下德伏萬邦理臻三代夷夏率俾沉翔煦然臣頃受任番禺星霜七變身在南海心懸北闕特蒙渥澤徵領宗司方厠朝行旋牧關輔東郡缺帥又忝總戎雙旌自天便道之鎮赤墀轉遠㐲謝無因及茲三年丹懇每結況自貞觀之後迄於聖朝臣之一門繼荷重任擁旌鉞者僅二十人高祖淮安郡王神通弼亮太宗戮力締構榮登左揆以寵勳勞臣無先祖之功而塵先祖之位師長宗秩胡堪謬列是願罄述愚志一覩聖顏宵腸九迴晝食三歎今河朔軌道汴宋厎寧臣所部宣揚睿慈綏緝黔庶師旅知訓農桑以時徵賦有常廪儲有備但以違奉既久心不遑安輙敢冒昧上聞特希矜許入覲臣獲蹈舞班叙親承德音去歸方隅生死榮幸右臣伏見前件官才畧過人清貞出眾早居省闥鬱有政聲官叙已高時望仍重爰自出牧美績尤彰正直不回沉毅能斷伏乞以臣官授之於質則必能鎮靜方域輯和蕃戎臣之才能誠所不逮官謗易召榮福難叨伏希聖慈允茲誠請則君無妄授之義臣無虛受之名不勝懇切愧靦之至唐受天修命用古道理仁覆德載與二侔大宏煦丕冒與三並曜繼明嗣睿萬葉其始於十一聖聖謨熙載千祀其初於十四歲歲二月丁已平巨寇復齊魯地三月巳丑乃命臣總授節分閫撫安餘眾且理於鄆而觀察曹濮故荷皇澤來濯汙俗人既沭浴咸以潔清物無夭傷各遂性命不化化不楙楙感聖德也豈待守臣施諸政術而革訛止謬乎於以見周公太公之遺風仲尼之禮教有所不泯者焉何以言之先是元兇事猶未順唯此邦眾尚或率從及顯逆謀多不為用其所寵任皆亡命之徒與皂隷耳故義聲一呼厥眾咸應乃知斯人可與為順不可與為逆此其明騐與夫州郡廳事之有壁記雖非古制而行之已久其所記者不唯備遷授書名氏將以彰善識惡而勸戒存焉其土風物宜前政往績不俟咨耆訪耋搜籍索圖一升斯堂皆可辨喻原茲邦域其來遠矣曰太昊之墟曰魯之須句曰漢之東平曰今之鄆州其地一也武德中為總管府亦為都督府而蔣曹戴濮兗五州隸焉貞觀初廢府復為州八年始自鄆城移於是就高爽也自逆帥攘據罔率訓典改易升降名稱溷淆蓋無取焉今以平寇之初魏博田公奉詔權兼勾當則位同正牧宜書為首亦春秋始魯隱公賢之也其國初以來刺史名氏及遷改之次既遭薎棄難以究詳訪諸史官異日備於東壁時聖歷元和紀號已亥直歲十二月己卯檢校禮部尚書兼鄆州刺史御史大夫馬總記衍左丞倫之子歷官江蘇虢三州刺史貞元二十一年加工部尚書臣所治多是山田且當郵傳衝要屬歲不登頗甚流離舊額賦租特望蠲減臣伏見比來諸郡論百姓間事患在長吏因循不為申請不詣實不患朝廷不矜放有以不言受譴者未有言而獲罪者陛下拔臣牧大郡委臣撫疲民臣所以不敢顧望苟求自安敢罄狂瞽上干聖覽維字正文越州山陰人至德二載進士擢辭藻宏麗科調諸暨尉辟河南幕府終祕書省校書郎聖人之在運也上天為之降祥將以示德遠告時康火精始凝初臨於嵎谷陽德用事首出於東方作大明兮其彩白有善守者其人黃惚兮恍兮見於為物之體窈兮冥兮來於無何之鄉豈惟有德動天景再中於漢帝至誠感物退三舍於魯陽所謂人者臣之稱日者君之象三光可得居尊眾靈於焉稱長人所以守日叶伊皋之弼亮天所以垂休明億兆之所仰實王化之基格諒神功之肸蠁則知唐虞之代羲和之最蕭索糺紛如煙如靄又況夫兆慶於合璧告祥於抱戴嘉其氣霽地表雲收天外出暘谷而輪開當亭午而光大映真人之麗質爛霓裳與羽旆離婁敻敻以喪明周文咄咄而延昧屬宇宙以廓清表陰陽以交泰我君如日之昇惟天是則君臣合體符瑞允塞以太古而望今齊哲聖以同德益宰相揆族子第進士憲宗聞其名召為秘書少監集賢殿學士遷太子賓客轉右散騎常侍太和初以禮部尚書致仕卒時又有太子庶子李益同在朝故世言文章李益以別之夫聖人之理原於始而執其中觀天文以審於王事觀人文而知其國風故每歲孟春採詩於道路而獻之泮宮有以知下之化達人之窮發於關雎之首及乎王道之終故曰天明自人而視天聽自人而聰所謂政於內繫一人之本動於外形四方之風始於風成於雅失其道或天方薦瘥得其宜或錫之純嘏是人情之大竇未有不由於斯者爾其德以頌宣事以類比陳之於學校將可以反正輟淫播之於絲桐何有於翦商變徵屬辭庶因於勸戒緣情孰多夫綺靡嘉魚作而賢者進焉騶虞廢而王道缺矣至於詩之為稱言以全興詩之為志賦以明類亦有感於鬼神豈止明夫禮義王澤竭而詩不作周道微而興以刺俾乃審音之人於以知風之自洎夫代見更改也運歷於詩亡自天未喪斯文也以至於皇唐於是抑文尚質崇儉去奢振六藝以補化秉一言之無邪不然何以天地奉若而不興雲漢之嗟用能德馨而蘋蘩可薦誠達而來麰降生雖九重歲招其諫諍而九有日聞其頌聲且君非五諫兮何弼詩匪六義兮何成我皇乃以詩而條之國政本乎人情故得行於蠻貊豈獨用之邦國修之身則壽考不忘垂乎後則子孫千億乃知詩之為教蓋亦王猷之至極通微海州人德宗朝官壽安縣令入為金部員外郎召充翰林學士遷職方郎中知制誥春秋以立功於時謂之不朽釋氏以不住於相至乎無生善時者勳業存離相者往來一以是居世其至人之蘊耶維夫事上以忠修身以道竭節於盛明之代遺情於寵祿之間通乎大觀與物終始建先脩之所為順理之期光昭前聞有若左神威軍中護軍兼柱國焦公公名希望字希望舊史稱周武王克寸殷紂封神農之後於焦至武王孫康王生子曰文手中有畫如焦字之數又以封焉爰初啟土實居陝服眾國入於焦因從平陽遂命為氏其間允文允武或哲或謀代不乏賢可得而畧厥後或以官族寓籍於京兆府之涇陽公之系緒今縣人也曾祖諱躍太宗撥亂常從征遼拜絳州鳳庭府果毅都尉祖諱法滿克踐儒行累遷至朝散大夫絳州司馬皇考諱孝憬佩服仁義不交世祿積德之慶鍾美於公公嶷靈純粹秉志剛實耿介不㣥風標自遠清襟朗察萬象無所隱其情見性圓明眾辨不得礙其正以言則窮其奧得聖人之心以行則用其中合君子之度年及弱冠選侍彤闈貞松之姿既呈於徑寸層臺之峻亦資於覆簣守內府局同正丞以陝府元從授承務郎敬恭朝夕恪守官次忠信以奉上之道禮義以周身之防莊而能和敏而有勇故可以恭武可以佐文方圓適器無入而不自得今皇帝之在春宮每加信任洎正宸極爰獎貞純於是朱紱斯皇銀章有耀公夙荷榮渥茂茲寵光便繁左右密勿軒陛事君不二志守職惟一心口無擇言身無悔行見義能勇盡力忘勞其衞主也有匪躬之節鑾輿既復上懿其誠除給事同正賜金印紫綬益見親重乃命監射生軍事貞元五年詔以射生軍為神威軍加內侍省同正兼謁者監賜上柱國餘如故公訓整戎務練達武經舉傑雋棥心勳實贍材用協師徒我車既堅我馬斯服至若郊廟之事文衞之儀材官彍騎林植鱗次若離若合者固足以耀皇威而振國容矣十三年制加中護軍累遷內侍省內侍同正兼內常侍公受委愈重執心愈恭守直無隱盡忠在公理軍如家正身率下上所甚信咸感悅之爰廣舊軍肇建新宇叶比眾志允成厥列布之以署爰峻壁周講藝有館公食有堂既庶既繁兮樂且康為輪為奐兮耀華章迴六龍之日馭降萬乘之天光以永代垂則宣力四方者也至乃公離諸見性符道源以明誠宏大覺之因以清淨修有為之事動靜無閡喧寂一如不牽外緣不滯禪想以之疑則貞固幹時仁者悅其仁義者服其義嘗事上則忠信行已以莅職疑謂無上法寶諸佛之心自達磨東來實為教祖公了見真性元契度門乃於軍中建立精舍上以奉國下以利人皇上御大明以燭幽發慧日以垂照廣一乘之妙旨輔萬物之自然及公上奏乃賜額曰貞元達磨傳法之院表正知也每從容而歎曰性無生滅物有始終本乎天者為昭明親乎地者為委順是以遺生死外形骸感冬夜之詩歸於其室備歲時之制允叶前經信所謂知命不憂達生之情者矣乃建先脩墖於涇陽之縣東南焦劉渡之西公之故夫人李氏浮圖城中龜謀協從鴈影連屬支提鬱起像法恒存吾將老焉可以無累經言諸相常寂公之志歟嗣子朝榮等克稟趨庭之訓無虧立身之道以是有後人咸曰休哉惟公之內誠既率乎天至公之元達載光乎法器宜乎承睿睠協師貞紀嘉績茂休聲保黃中之元吉暢塵外之高情既得瑕邱之地先開張禹之塋仁之報兮壽未極檟可材兮躬所植表全美於貞珉俾後生而作則銘曰萬物芸芸孰見其真修身踐言實惟哲人猗歟護軍與道為鄰率性居正資忠事君澄心止水勵節貞筠行有枝葉道無緇磷其動以直克廣厥勳及新營宇載肅鈎陳眾服其誠上嘉其勤朝章允集睿睠逾殷處貴尚謙秉志惟純清虛應物恬曠怡神法本無生有非吾身靜觀其復視喪猶塵委順於何涇川之津鴈墖先啟區中了人爰植爰修以躬以親洪流不竭法壽長春表石垂芳千年日新
