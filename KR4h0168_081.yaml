front:
  text: 全唐文欽定全唐文卷八十一宣宗三
  hash: sha256:8ca054ed9b295a79916a27ba7b833c76afb69a260f5884da89c8922151e61491
body:
  text: 夏州等四道土無絲蠶地絕征賦自節度使以下俸料賞設皆剋官健衣糧所以兵占虛名軍無戰士緩急寇至無以支敵將欲責課又皆有詞須有商量用革前弊夏州靈武振武節度使宜每月各給料錢廚錢共三百貫文監軍每月一百五十貫文別勅判官每月五十貫文節度副使每月七十貫文判官掌書記觀察判官每月各五十貫文推官四十貫文賞設每道每年給五千貫文修器械每道給二千貫文天德軍使料錢廚錢每月共給二百貫文監軍每月二百貫文都防禦副使每月五十貫文判官每月四十貫文巡官每月三十貫文賞設每年給三千貫文修器仗每年一千貫文如以後依前兵額不實器仗不修其本判官重加貶降主帥別舉處分其所給料錢等並以戶部錢物充起十月支給一年以後仍每秋一度差御史一人點兵士器仗聞奏揚州等八道州府置榷麴并置官店酤酒代百姓納榷酒錢并充資助軍用各有權許限揚州陳許汴州襄州河東五處榷麴浙西浙東鄂岳三處置官店酤酒如聞禁止私酤過於嚴酷一人違犯連累數家閭里之閒不免咨怨宜從今以後如有人私酤酒及置私麴者但許罪止一身并所由容縱任據罪處分鄉井之內如不知情並不得追擾其所犯之人任用重典兼不得沒入家產聖人嚴配圓丘將以孝理天下而歷代因之務行大赦冤滯者可從昭洗險慝者宜示澄清所有大禮前據有罪巳結者亦在速令詳議無至惠姦會昌季年併省寺宇雖云異方之教無損致理之源中國之人久行其道釐革過當事體未宏其靈山勝境天下州府應會昌五年四月所廢寺宇有宿舊名僧復能修創一任住持所司不得禁止門下朕聞恭順之道人倫大經省奉之儀臣節攸重況發自誠悃稽諸典謨庶叶禮文式遵前憲伏以積慶殿皇太后坤元降秀皇極居尊道冠母臨訓彰壼職屬時當濡露感切於孝思氣爽保和恙生於寒暑自春歷夏有加無瘳焦思匪遑旦夕增灼豈尚安於聽斷且欲專於問恐中外具僚未諒予意起今月十四日以後權不聽政故茲宣示宜體朕懷五歲再閏固在不刊二稔職田須有定制自此巳後宜依屯田所奏永為常式李回鄭亞元壽魏鉶巳從別勅處分李紳起此冤訴本由不真今既身歿無以加刑粗塞衆情量行削奪宜追奪三任官告送刑部注毀其子孫稽於經義罰不及嗣並釋放李德裕先朝委以重權不務絕其黨庇致使冤苦直到於今職爾之由能無恨歎昨以李威所訴巳經遠貶俯全事體特為從寬宜準去年勅令處分張宏思李公佐卑吏守官制不由己不能守正曲附權臣各削兩任官崔元藻曾受無辜之貶合從洗雪之條委中書門下商量處分李恪詳驗款狀蠹害最深以其多時須議減等委京兆府決脊杖十五配流天德李克勳欲收阿顏決脊杖二十配流硤州劉羣據其款狀合議痛刑曾効職官不欲決脊決臀杖五十配流岳州其盧行立及諸典吏委三司使量罪科放訖聞奏朕以俗未臻於富庶念每切於黎元衣食罕充旰昃興歎夫百姓田疇地有高低歲有善惡偶有水澇即低田不稔稍遇亢旱即高處無苗近聞州縣長吏掩其水旱傷損務求辦集唯於熟苗上加徵將填欠數致使黎元重困惠養全乖自今後州縣百姓有遭水旱苗稼不收處驗不虛便準前後勅文破免不得加徵熟田人戶令本配額外重出斛斗朕聞禮發乎因心服勤於遺體周典著問安之範戴經存就養之文垂為格言式示達禮惟朕小子敢廢前修伏以太皇太后母臨六宮子育羣品清淨養性恬和保神屬時暑小侵違豫不閒寢膳未復憂灼靡寧日欲親於藥餌情豈安於聽斷凡有事務且委司存恐中外具僚未悉予意起今月二十日以後權不聽政故茲宣示宜體朕懷省所奏當府周公祠舊有泉水枯竭十月中因風泉水五處一時湧出又有七處見出并圖畫進上事具悉朕聞致理之代地出醴泉蓋以澤可濟時德推上善徵諸傳記最為休祥朕以虛庸敢膺元貺披圖見瑞省表增慙豈惟菲德致之亦卿循良所感臨軒嘉歎至於再三今賜名潤德泉想宜知悉冬寒卿比平安好遣書指不多及兩軍及諸軍巡捉得劫賊京兆府先牓懸賞近日捉獲得賊都不給付既違公勸何以勵人宜令京兆府所有軍巡捉獲劫賊便須支給賞錢先經流貶罪人不幸歿於貶所有情非惡逆任經刑部陳牒許令歸葬絕遠之處仍量事官給棺櫝沒陷河湟百有餘歲中原封界咫尺戎疆累聖含容久勞征戍伏思元和中將攄宿憤常欲經營屬誅鋤叛臣未暇收復今則恭行先志克就前功不遠徵兵不勞財力二州之外兼得七關又取維州粗成邊業尚以息人解甲未收山外諸州且以肆眚申恩所以頒示天下其御樓依所乞設官分局各有主張其於在公責辦斯切諸州府及縣官到任巳後多請遠假或稱周親疾病或言將赴婚姻令式既有假名長吏難為止遏遂使本曹公事併委北廳手力俸錢盡為己有勤勞責罰則在他人須有條流俾其兼濟具諸州府縣官如請公廨假故一月巳下即任權差諸廳判官一月巳上即準勾留例其課料等據數每剋二百文與見判案官添給諸縣主壻選尚之初多無官緒或正員初秩授檢校朝官從前條流都未詳備自今以後縣主壻如先有官宜超資與進改如未有官者且授檢校官待三周年後與第二任正員官仍委宗正卿檢勘聞奏夫婦之際教化之端人倫所先王猷為大況枝連帝戚事繫國風苟失常儀即紊彞典其有節義乖常須資立制如或情有可愍即務從權俾協通規必惟中道起自今以後先降嫁公主縣主如有兒女者並不得再請從人如無兒女者即任陳奏宜委宗正寺準此處分如有兒女妄稱無有輒請再從人者仍委所司察獲奏聞別議處分並宣付命婦院永為常式如聞諸道軍將及官健等近日所在將帥多務因循當召募之時巳不選擇及收補之後曾莫教招遂使名在戎行少能知其弓矢職居列校罕見識於韜鈐緩急忽有徵差便取見在應數惟憂就役豈暇圖功虛費資糧莫克讎敵為弊頗久須有舉明自今巳後委諸道觀察節度都防禦團練經略等使每道慎擇會兵法及能弓馬解槍弩及筒射等軍將兩人充教練使每年至合教習時分番各以本藝閱試其閒或有技藝超異者量加優賞仍作等第節級與進改職名每至年終都具所教習馬步及各執所藝人數申兵部及中書門下仍委兵部勘都開件聞奏所冀各盡伎能自成勁銳其支郡有兵處亦委本道點訓練準詔處分應公主家有莊宅邸店宜依百姓例差役征課如邑司擅行文牒隱庇兼藏匿要人便委諸軍諸使及府縣當時捕捉收禁聞奏其邑司官吏及印本緣徵封須行文牒今即便因他事攬撓府縣自今以後除徵封外如緣公事並令邑司申宗正寺寺司與酌量公事行牒其邑司並不得擅行文牒條䟽刺史交代須一一交割公事與知州官方得離任準會昌元年勅刺史只禁科率由抑配人戶至於使州公廨及雜利潤天下州府皆有規制不敢違越緣未有明勅處分多被無良之吏致使恐嚇或致言訟起今後應刺史下擔什物及除替後資送錢物但不率斂官吏不科配百姓一任各守州縣舊例色目支給如無公廨不在資送之限若輒有率配以入己贓論裴休條䟽茶法事極精詳制置之初理須畫一並宜準今年正月勅處分考功所條流較考功事頗為詳悉唯一件難便允從近日俗尚矜能人少廉恥若榜門許其論告則自此必長紛爭當否之閒固有公議其一件宜落下餘依奏勅準開元十三年八月十四日及太和八年二月十三日勅文剺耳稱冤先決四十然後依法勘當近日無良之徒等閒詣闕剺耳每驚物聽皆謂抱冤及令推窮多是虛妄若不止絕轉恣凶狂宜自今以後應有人欲論訴事自審看必有道理即任自詣闕及經臺府披訴當為盡理推勘不令受冤更不得輒有自臥階前剺耳有犯者便準前勅處分後配流遠處縱有道理亦不為申明朕自臨御以來常恐一物失所以傷陰陽之和致災厲之變而重困吾民故推教化之源務率先之道減服御絕玩好苟利於民者無不行阻撓於政者無不改而郡縣災疫相繼屢奏流亡慘怛之懷疚於寤寐將何以臻於富庶哉苟害生民豈憚釐革如聞嶺外諸州居人與夷獠同俗火耕水耨晝乏暮飢迫於征稅則貨賣男女姦人乘之倍討其利以齒之幼壯定估之高下窘急求售號哭踰時為吏者謂南方之俗夙習為常適然不怪因亦自利遂使居人男女與犀象雜物俱為貨財放闕四方鰥寡高年無以養活豈理之所安法之所許乎縱有令式廢而不舉為長吏者何以副吾志自今巳後無問公私土客一切禁斷勅諸州刺史各於界內設法鈐制不得容姦依前販市如敢更有假託事由以販賣為業或虜劫谿洞或典買平民潛出券書暗過州縣所在搜獲據贓狀依強盜論縱逢恩赦不在原宥之限仍仰所在切加把捉如違節級科斷其方鎮及監軍使命並州府寮吏等自當謹守詔條率身奉法倘有踰犯當重科繩其白身除準勅常數進送外亦準此處分其百姓兩稅定額各據土地所出方圓收納不得豎色目妄配亂徵致令艱愁莫相保守如有貧窮不能存濟者欲以男女傭雇與人貴分口食任其行止當立年限為約不得將出外界還同交關各委本道長吏專加糾察仍先具條流聞奏其餘州縣更有積弊深害百姓而因循未革者亦具分析聞奏當酌量處分粗安黎庶稱朕意焉四海九州莫非吾之赤子念茲遠俗尤用軫懷如聞日南自郭細為亂之後溪洞頻有不安朗寧去歲巳來屢為南蠻侵軼遠思裔俗載想疲黎有枉莫伸無辜受戮者多矣想思朝廷之弔問若大旱之望膏澤也是用申詔執事聿求使臣內外通班文武多士爰擇敏達副吾選求銀青光祿大夫檢校太子賓客兼右千牛衞大將軍侍御史上柱國宋涯早列和門夙通軍志公忠有素文武是經信義彰美於禁營政績茂宣於汧隴吾所求者爾其人乎昔司馬相如奉漢廷之命通西南夷路飛檄曉論不勞師征夜郎牂牁等皆生梗之俗猶能永奉漢法於今稱之而況安南邕管皆吾藩方雖遠朝廷咸遵法理爾其將我憫憐之意深訪疾苦之源貧者撫之富者利之老者安之少者懷之盡爾公廉究茲利病因宜制變臨事合權能安遠方克致寧謐豈無崇秩以獎勤勞俾增石室之榮以盛軺車之貴無憚遐役佇立厥功可守本官兼御史中丞充安南邕管等道宣慰使朕以政閑賞景幸於莊嚴其寺複殿重廊連甍比棟幽房祕宇窈窕䟽通密竹翠松垂陰擢秀行而迷道闕天下梵宮高明寡匹當建之時以京城西昆明池勢微下乃建木浮圖高三百尺藩邸之時遊此伽藍覩斯勝事其總持寺大業中立規制與莊嚴寺正同今容像則毀忍草隨荒香徑蕪侵尚存基址其寺宜許重建以副予心朕以寡昧獲承丕構潔誠以奉九廟恭己以臨兆人宵旰在懷罔敢暇逸而憂勞所迫蒸暑或加疾恙未瘳既逾旬朔萬幾繁重不能躬親詢於大臣稽以古訓永惟負荷之重思建儲貳之賢用舉徽章式固大本長子鄆王溫宜改名漼濬哲天縱孝敬日躋秉德不回出言可法英姿齊聖粹厚而恭道叶繼明義符立長可以貳於神器增輝前星宜立為皇太子權勾當軍國政事咨爾三事百辟內外臣僚宜協乃心敬輔元子罔違於道俾致時雍布告遐邇咸令知悉門下冒法干紀豈限於華夷伐罪弔人固資於典訓朕端拱御㝢六年於茲兢兢業業不敢荒怠常恐一物失所羣心靡寧旰食宵衣思厎於道屬者以党羌恣為侵叛尤苦農商朕為人父母豈無憫惻雖傷財害物非朕躬之願而禁暴定功實武經之要是以爰興師旅龔行天討而凶渠稔惡稽曠歲時師宿既勤物力將屈賴宗社儲祉中外叶心大搜妖巢盪定關隴誠殫財而凋力亦暫費而永寧今則軍功巳成制置將就息戈解甲固在及時捨罪緩刑所宜布澤南山党項為惡多年化諭不悛頗為邊患近興兵士經歲討除拒官軍者悉就誅擒懼法令者皆從逃竄大開湯網巳施去殺之仁遠並堯年寧限可封之屋今聞殘寇無所依歸皆是王人豈忘憫惻其南山党項巳出山者或聞逼於饑乏猶行劫奪平夏不容無處居住今委李福且先遣蕃官安存招誘令就夏銀界內指一空閑田地居住所有從前掛涉惡跡者今一切不問惟再犯疆界却入山林或不從指揮即召募平夏党項精銳者討逐議不容捨如能革心向化願同平夏即須投誠獻款跡效分明撫馭之閒便同赤子如有屈事即任於本鎮投狀論理仍各令本鎮遣了事軍將安存平夏党項素聞為善自旬月以來發使撫安尤見忠順一如指揮便不猖狂各守生業自茲必令永戴恩信長被華風或聞從前帥臣多懷貪剋部落好馬悉被誅求無故殺傷致令怨恨從今巳後必當精選清廉將帥撫馭羌戎明下詔條漸令知悉靈鹽夏州邠寧鄜坊四道官吏自用兵以來責辦公事亦甚辛勤軍將皆巳得官文吏未酬勞績宜令每道揀選公勤有勞效官吏具名聞奏有官者與依資轉遷無官差攝者當與正官仍具差攝年月申奏直須公當不得轉授囑託如是將帥親情亦須具言四道百姓徵斂不時差役至多疲瘵亦甚或聞屋宇被賊焚燒至於桑麻亦遭砍伐生業既失須加安存宜各優給三年其有無屋可居無牛可種者委長吏量事接借一一奏聞仍須早設法招攜令各歸復勿令豪富便占產業為生自用兵以來諸道應徵發之處所有將健或沒於鋒刃或存被瘡痍雖經襃贈及曾優恤委本道更加存撫或自因廢疾不任在公者終身不停衣糧如情愿回與子孫兄弟甥姪者便與補替應討伐党項諸道在行營將士巳頒賞賜邊上制置有敘績節級放還仍委本道敘錄具名聞奏當加甄獎自用兵巳來京師與鄜坊邠寧兩道接界及當路諸縣差役繁併物力凋殘若無優矜必難存立其今年夏稅錢及青苗錢每貫量放三百文其斛斗糧量放一半仍委京兆尹差官子細磨勘其或雖在鄉村不曾經供應者不在準例放限仍一一條件等第聞奏如是分路處就中更校便併者量加優恤必使均平其所放錢及斛斗委戶部以實錢支填仍令京兆府各下諸縣散榜鄉村要路曉示百姓務令知悉用兵以來城鎮曾遭陷沒官健百姓因被殺傷親戚既無遺骸在野委所在長吏差人為收拾如法埋瘞仍量事致祭應有增修城鎮添置堡委所在將帥擇其要害絕彼窺覦切務堅完令可固守邊上不許以兵器於部落博易從前累有制勅約勒非不丁寧近年因循却不遵守自今巳後委所在關津鎮鋪切加捉搦不得輒有透漏其有犯者推勘得實所在便處極法其所經過州縣關津鎮鋪節級痛加懲責義無容貸其閒或情涉隱欺準所犯人處分党項本是邊甿只合州縣撫馭致令一朝侵叛由於處理乖方既往不可加刑從今必行法令自此之後邊上逐界皆巳有制置把捉如或更有羌寇侵盜即是將帥依前貪求當先加罪於本界邊將然後翦逐寇賊通商之法自古明規但使處處流行自然不煩饋運委邊鎮宜切招引商旅盡使如歸除禁斷兵器外任以他物於部落往來博易應緣徵兵處士馬皆效勤勞亦巳各有賞賜其本道將帥當續議量加酬獎京畿及鄜坊靈鹽邠寧夏州并涇州鳳翔振武天德等道自用兵以來人頗勞苦今頒德澤須令曲恩應見禁囚徒據罪遞減一等惟官典枉法犯贓及賊中有持杖劫人故殺人等不在此限如有積年逋賦必加徵督不得者委長吏條流聞奏準格律大功巳上親及女壻外甥不許連任自用兵巳來諸道節將及長吏權宜差親表主持公事兵罷之後理當不然其三族內親並不得令主兵權及充要職如是元在本軍先充職掌者亦須具名聞奏自用兵以來科配百姓事取濟辦多出權宜今既罷兵諸道節度防禦刺史及鎮使等不得更依前妄有科配仍令各具本管侵害百姓事須釐革者作條件聞奏自党項擾亂以來所在多被攻劫白刃之下必有孝子順孫義夫節婦事跡有可稱者委所在長吏察訪優恤其家仍具名聞奏將加旌異於戲蠻夷猾夏固有用於常刑撫馭乖方遂致興於薄伐傷夷暴露朕實愧焉是用覃恩以慰勞瘁布告中外咸使聞知主者施行平夏南山雖云有異源流風俗本實不殊我國家累聖以來許居內地久奉聲教亦立功勞朝廷撫綏常布恩信近者邊陲之帥制御乖方遂有凶悍之徒不率父兄之教或侵暴州鎮或攻掠道途告諭罔悛猖狂頗甚朕君臨區㝢深念黎元凡曰含生皆同赤子但欲為人除害固非黷武佳兵每覩殺傷深多憫惻是以去年洗雪平夏驅除南山及聞窮困無歸復有懷來之意遂令白敏中李安業分統諸軍先示招攜仍加訓練但知非則赦免不得巳則誅鋤王者之師義實在此近得敏中狀申南山盡願歸降瀝懇輸誠惟思展效請般運糧料乞保護封疆閱其奏章深愜朕意比者或有剽劫必推南山南山或有寇擾亦指平夏既相非斥互說短長終難辨明祗益仇怨今則並從洗雪咸許自新但能各務安全遞相勸勉保其生業絕彼侵踰從前所有愆違自此一切不問惟鹽州深居沙塞土乏農桑軍士運糧須通商旅沿路堡柵事須修營今委李安業依朝廷制置差兵建築防守尤恐部落心懷疑慮委令李安業駐軍塞門朕之屈法從人斯為極矣若執迷不返干犯國章後悔難追深宜自省門下皇王之令凶逆必寘於嚴誅天地之仁含育亦存乎在宥除惡務絕其根本原情必諒於親踈慮興詿誤之嫌用安反側時舉寬宏之典盡滌瑕痕追維長慶之初亂臣賊子之輩人神共憤覆燾不容頃以論刑是從流竄而東宮親昵之黨亦參帷幄之謀顧偷冒以取恩陷君父於不義必資懲創以盪奸源議法當然非朕敢赦而曾不知過交搆流言興謗道途扇惑人聽蓋以從前搜捕未盡巢穴猶存再令根尋果獲支黨無非近戚咸伏其辜在臣節而既虧於國章而難逭并巳從別勅處分除竄逐遐荒及配諸陵守當外應諸惡黨從祖兄弟子壻妻族內外親戚門生故吏及比來別居并從踈遠等降德音後一切不問諸司諸使更不用尋勘務從寬恕俾絕憂疑惟先推鞫得姓名合流者雖巳逃竄如獲日準前勅處分頃者屢降明詔以順人心重此究尋蓋非獲巳今則更無餘孽永絕猜嫌攄憤之志既申懲惡之刑亦至乘春布澤大與惟新明示中外咸知予意主者施行門下朕以寡昧嗣守睿圖奉列聖之丕訓撫寧四海受一作膺上天之景命司牧兆人敢忘勵志勤身虔恭寅畏雖動思罪己而陰陽屢愆每念惠人而蒸黎尚困是由政教無素王澤不流精誠未達於穹蒼災沴遂痡於下土是用中宵輟寐未明求衣言念及此良深愧惕近者江淮數道因之以水旱加之以疾癘流亡轉徙十室九空為人父母寧不震悼此乃天之垂誡咎實在予焚灼於懷夙夜增懼當宁興嘆遂命使臣乘驛撫巡便宜救恤減上供饋運發諸道倉儲免積歲之逋租蠲逐年之常貢尚思災疫之後閭里未安須更申明用示優軫應揚潤廬壽滁和宣楚濠泗光宿等州其閒或貞元以來舊欠逃移後闕額錢物均攤見在人戶頻年災荒無可徵納宜特放三年待稍完復却即令依舊或逋懸錢物斛斗數內先巳放免度支却徵收者宜委本司細詳元勅磨勘如合放免不得追徵或先因水旱賑貸欠常平義倉斛斗若終不可徵收亦宜放免或今年合徵兩稅錢物量百姓疾疫處各委逐州準分數於上供留州留使三色錢內均攤放免或收管諸色逋懸錢物等年月深遠但挂簿書空務追徵益生勞擾宜委有司速勘會了絕蠲放不得留為應在以資奸蠹之徒其濠泗宿三州大中六年以前所在逋懸宜亦放免或以常平義倉斛斗賑恤者宜委本司收破其賑貸者即待秋熟填納所減上供運米及州縣諸色斛斗等巳令減價糶貸救接百姓用止翔貴以濟周貧或每年進奉茜草藥物紵練貢布等亦巳條流節級停減以前諸色應蠲免節目等或巳行勅令或見勒條流並委中書門下各令本州及本司速準此處分仍具各分析聞奏所有諸道放免事例宜委州縣於鄉村要路一一榜示遍令閭閻分明知悉又以數道疾疫百姓流亡永言宵旰之勤豈務珍華之貢其淮南宣歙浙西三道今年賀冬及來年賀正所進奉金銀錢帛宜特放免均融仍各委本道觀察使據所放均融貸貧下戶填納稅租其逃亡戶如賑恤使有所不該者亦以此便宜濟助務令蘇息又江淮數州水旱相繼安南一境寇擾初寧公用之閒必當虛竭但緣及時錫賚須遣使臣其淮南宣潤安南等四道今年冬衣使本道合與常例人事物等亦宜權停於戲天災流行自古未免屬在牧宰為吾撫安豈無惠育之方以濟凋殘之弊如或守法不謹吏緣為奸紀律乖訛刑法踰濫重繫者因循不省逮捕者追擾滋多或征賦不均或徵科無算有一於此重困吾人即何以消弭災譴用康疲瘵宜委所在長吏慎恤刑獄踈決囚徒必務躬親俾無冤滯檢轄暴吏懲殿慢官寬常賦之征罷不急之務詳求病利悉以奏陳恭佇良規用副憂寄苟不遵詔旨尚務侵欺必正刑書義無容貸宣示中外宜諒予懷主者施行
