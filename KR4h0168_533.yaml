front:
  text: 全唐文欽定全唐文卷五百三十三李觀二
  hash: sha256:5f688c703d1ef5e0339a5f3b2c0c79630cd8f449e1d5c05c6ca3a154a2012334
body:
  text: 羊舌大夫謂鬷明曰子不言吾幾失子矣仲尼又云言而無文行之不遠則知士不得不言言不得不文然言之不失行之能遠在員外也不在不佞至於心與時事固不可不奉達員外亦當一一詳悉無脫略也觀東人之後十歲讀書十六能文不止能文亦有壯心及茲弱冠頗覽古今輒不自量謂以可取天下之名遂以去歲三月賓來咸陽一之日舍逆旅主人仰見帝居雙闕入天顧身仿佯若遊塵止於五嶽之高二之日持無似之文干有名者數公望其刮目以鑒真作致身之椎輪客去門掩然以寂寥無言三之日飛廉始春春官解褐試士於司存觀亦捧手蹀足而淈其不㣥於伍四之日灼有明文曰我采不渝爾則懷珉既如是矣則有故舊者置酒一榼而歡飲之以得失相安然常人有情亦不免悵焉由是天球減價而喪色鏌鎁不寶而奪鋭減價者卻委以櫝中不寶者未倚於天外側聞員外好人有奇者故緘二物以代謁斯二物者非好奇君子則不足以為託然猶慮其未甚悅故復重述耳今之人學文一變訛俗始於宋員外而下及嚴祕書皇甫拾遺世人不以為經呀呷盛稱可歎乎然世人之庸而擬議於數公其猶人與牛馬也以觀視數公則皆師延之餘音况能愛世人之蠅蚊乎夫能以觀之文言於世人得非會㣥聾而鼓五音曷知其由來哉方今座主五百年之間出者觀三千里之賤士耳座主有至公而觀無聞焉非觀獨恥之而員外恥之何者使誠無可聞而至有聞欲速之過也使有可聞蔽賢之過也員外必澄神洗機而鏡其是非無黨欲速與蔽賢二者之理謹留短書於宅并詩三十首尋拜高風以聆員外之玉音觀幸甚支使職佐方面公才絶倫其分所部來督屬郡必以舊二千石將去新股肱守未至而應慮編黎失業欺吏得伺便是以中司據案輟食賈支使餘勇俾威之德之支使下車人以之安姦心欲萌者若烈風卷危葉惸獨無告者譬枯轍沃膏雨闔境不擾殆將晏如問公之秩則屈於馮郎觀公之政則優於杜母然儻翼一舉誰能料其高下哉觀靜居養晦束髮初冠纍受郡薦不隨計偕直以無親於權右寡譽於鄉曲陸行闕徒御長邁匱資用每西顧而笑知難入身徘徊斂歌罔自酸念嘗聞古聖欲濟先濟物欲達先達人卞和再刖足而不去欲濟物也禽息一碎首而不丨員思達人也側見昨者此州舉人陳昌言朱公薦戴察並以才獲送而不果往或以親老而惜養或以家貧而莫進相會而議不知所安㣥吟動風聚泣成沼况秋節轉厲羈心益雄恨天下丈夫不可投刺碌碌之類雖投奚為惟公秉干將之利挻荊楚之秀方釣名之日亢得路之地觀輒欲遂君子之美張小人之謀其陳昌言等執事誠肯徹重味於膳夫抽月俸於公府實數子之囊備二京之糧則公之德聲日播千里魯衛之客爭趨其門亦可謂委能於聖朝豈止殺身而已矣言用與不用公其度之不然則言之於有司取我王稅量其豐省贍其所須亦足明非常人有非常之事將白於連帥固亦惟命相時而制變亦惟命昔漢武帝詔郡國貢士縣次給食此明天子也仲灌夫好禮敬賤士推拔下輩此賢大夫也公能收納任懇則善不可加問之數子乃釋鹽車之患也公若輕財惜施輕士不恤使觀之言如水投石則行垂涕唯唯而退言公輕財惜施者若公府之積粟腐貫朽曾不振窮貸乏而多為曲贖小吏狗鼠薦蠧鮮不千百豈不輕財惜施歟又言輕士不恤者則陳朱戴者鋭力詞翰腹歉翅折不能達揚而執事高視蔑有救心豈非輕士不恤歟且公波瀾在衷深淺未卜先設以與奪願筌否臧嗟夫當春正植以桃李卒歲然後驗松柏公留意而圖之觀攝衽而長跪觀白衣之王臣也育於天人間二十年矣膽薄不敢以干大人頭方不足以扇知已以此而食誠愧之哉而聞使君德閎列郡名截區宇翕歸人望轟動朝聽灌注我元造昭蘇我蒼生實宜居中作舟匡上調鼎千乘之任未周其用君子之議以為屈焉觀稟踈狷之性執廓大之志而不能與㣥俗爭狎獨兀爾憔悴固事亦無可談然渠所論不過物之貴賤利之豐省相斥工拙相旌是非乃令慷慨之人有霸王之略而不得語反見疵瑕耳嘗以天下如使君者未乏如觀者不少聊且收涕於衽束臂置胸庶幾於鵾鵬不遽歌龍蛇也使君令問熙洽穆如清風家鍾其祚天契之秩人莫得而涯之竊窺使君善美雙著其善也在乎制事中度立政有要吏不慢局獄無撓刑斬前守之苛弊若嗇夫之去草能於是民誦之曰雖有飢饉必遇豐年大盜既去我公來臻斯使君之善也其美也在乎雅量汪洋神機貞明蓄山之靈洞人之情鑒有所臨細無遁形麗藻之振其音鏗鏗斯使君之美也使君頃在幕府及統留後事禦卒競勸疲民惠和敏見洽聞高謝朋伍不然者何得奮於戎佐而一舉趾跨上二千石歟吁海內同軌四方萬餘里出使君之境誰獲小康非使君之民罕霑大賚郊邑騷屑人胡疇依豈不為歲時薦之以水旱官長墜之於塗炭觀甚不佞猶知痛之雄飛丈夫豈止太息傳曰自非聖人內寧必有外憂今主上非不聖但輔相有闕也以觀庸意儻挻使君於廊廟則中人以上不為非中人以下遠惡矣今特遣處民之上利身而不利國在朝之右諛媚不直緣邊之寇蜂起為蝥賊觀誠守貧窶無卜式裨國之利身復多病無終軍繫虜之力但怒發撫髀氣如騰雲苟未獲謀何命之劇終固當曳履諫天子借劒趨相門盡養民治國之計逐倚法尸祿之吏使衛青重揖客孔子畏後生使君展轉覽此書觀非寓言也觀將適於越途經貴州無何遇疾不獲俯謁迫以月盡於紀道賒其程衣衾素單糧糗倏罄惟有塵鏡委匣韋編在囊滄洲目前風水相駭默默長顧便堪酸心艱勤於下邑悽斷於易水使君知否知否念茲在茲蒼惶寫言兢懼待命有觸忌諱願開含宏月日觀再拜觀潔身復古立行師古臨事不惑見危必進秉此數節時人罕知伏惟良寶匿瑕明鑑含垢暫留頃刻少納芻蕘遂厥愚懇死而無悔竊見前此邑丞朱利見一室窮病十年非辜形神沮弱容鬢衰颯若遣憂能傷性此人殆不久生孤禽孺子相向嗚唈眢井壞竈共之淒涼觀雖非比齒稍與同道往往目覩感之酸然常恨莫能為計無所施力使有穀帛當能賑之此生亦人倫之落落士林之楚楚代習禮樂宿傳衣纓乃祖乃父亦有拾青拖紫三徵五辟者也生家亡早孤年壯方仕所共交結亦皆名流微班不達直道來纍人不哀者諒誰有心觀與此生非有半面故素一夕優狎非有斗筲之惠杯酌之好但私心助痛借口為言昔荊軻徇燕丹之急聶政答嚴遂之闕一字故載籍不朽以為美談且數子者良有由緣今之所論有異於此况觀輒以翩翩賤質曾為使君翦拂璅璅薄伎復忝使君盼睞寄家樂土日聞盛事竊見信有所未洽恩有所未周安敢坐同碌碌不以陳述伏惟使君大其量深其懷使儒衣之士復罄心腹幸甚幸甚觀早窺典墳見古賢良居五等之位設六條之政所以察刑獄詢諍訟褒善懲惡恤勞勸分是以名彰王府勳潤史筆豈可備員已矣尸祿悠哉故漢文帝云與我共理者其惟良二千石且自使君下車數載田疇始闢桑柘初拱人識廉恥邑無逋亡當朝談其美列嶽讓其最雖文翁化蜀伯道理吳二侯既歿惡為絶倒獨有南冠朱利見氣衝牛斗間使君嚴如雷電慈如太陽何不修慎終之德解懸絶之命使仲由之諾不墜長孺之灰更燃則流芳一時垂範千載且此人窮窶於原婁汚辱於韓范恓惶於蔡澤憔悴於屈平整冠而緌斷斂衽而肘露猶矻矻耽學依依固窮常戴使君殊造對孤枕流涕日者有故壽昌沈尉周行之末識量非常知事有廢興人有迍泰承使君咳唾拯此人溝壑朱生不幸沈子云亡顧茲塵昧可為悲想夫處大官者威貴能斷權尚從宜綸釣淹滯篲掃讒慝即言者得盡意疑者獲自明使君垂彤襜佩朱紱丈夫之雄也凡所措捨豈不易哉朱利見餘負亦可以為力敢望周旋不棄特達庇之是所望也頃聞歙州長史羅士詹亦朱利見同類當時刺史劉公獨降大惠羅士詹不盈一稔旋踵西歸利見當時幽縶曾不側息莫非羅生與倜儻之士會朱生受肅殺之氣偏嗟夫三尺之童子為之恨恨且宇內所注渝濫官其中有附迹權門處陰勢路則官遣得雪祿都免收有損朋黨之私挾貞介之操則繫銅至弊名器被誣豈不為至主上無及溜之臣㣥小得鼓刀自割也觀土梗微物竊所不幸英雄之人曷以為意曩聞孔璋薦表代李北海死曠古之後先王所嘉觀誠駑怯恆羡高躅執事之議欲將何如使君不疾爾臧否則朱生索於枯魚之肆矣嘗見古人持危救傾率克有益使君豈不知此子不為食駿之士盜裘之夫人不易知知人則哲伏惟審念之然此人年五十鬱有詞藻義必致命性頗輕財乃俠少之流也居官直而簡與友信而敬乃百古人之次也蕭蕭健筆喋喋利觜環坐之先也凡今之人惡直醜正入門自媚邪道苟容故有貝錦首章青蠅獨弔觀雖輒舒紙染翰輕陳肺肝無任情激不敢諛羈屑之士進趣益難書發之日出柴扉東面再拜傾耳聽音倍深兢戰觀受性不敏言事務直侍御幕府俊選屬城具瞻不腆之書深冀開覽觀年十有八再忝鄉薦身未入洛家猶寄吳心惟使氣性不偶合仗前輩奇節辱窮居清操天下之事能傾腹心不但以董生下帷蘇子刺股而已觀於還淳遁迹向歷數歲蓬戶卻掃侍親之側其志未果屈躬增修竊見有被注渝濫官朱利見前任此邑丞腐儒孤官才受三命無賴令史前削除名銜裂其冠冕奪其祿利亡家既久求食無所危於纍卵急於倒懸如何聖朝有厥濫罰每一念此悲涕交注觀比有一書上此州獨孤使君先論朱利見續以古今事爾時獨孤公尺書見招知己相遇緩躡珠履偕升蘭堂飽之以嘉殽醉之以芳醑特賞才調且憐義聲仍謂觀曰見足下高作奇之又奇良深靦容敢不承命其所上獨孤公書兼録呈上惟少披覩明不虛耳頃者韓相國臨十數州殺人不問罪自用若無上晝聚冤氣夜啼枉魂人人畏威莫敢諷議今尚書領藩翰之任抱澄清之志視民如子龔上若父寄公耳目固宜竭誠伏見太陽炎赫砂礫燋鑠旱魃作厲農夫憂飢直為囚繫無辜之所致也雖欲禱桑林焚巫尫亦將奚及不如疏決滯獄速宥疑罪則歲稔國富不期而至觀所説是方伯政本非豎儒之談執事之人用收采否如理以為當言之可行請馳一介之使問三徑之客即荷衣蕙帶以趨下風必謂狂簡終不惠顧則退臥岩藪俟有知己翹足仰望以聽指南月日於法司上書郎中閣下彞不耽書嗜酒已至於老東西南北無立錐之地以免餒凍者賴王公大人相養耳竊以閣下有經濟之器因敷小人直戅之性非敢失色於左右僥求於去就不圖行絓時禁坐貽伊戚惶怖無暇縶維不安仰天椎心收血續淚所言駭鹿觸網飛蛾蹈火顛蹶靡排彞何以堪彞知過矣彞舉家十口兒女幼弱皆小寺中僑寄目下絶粒閣下錮彞在此令吏推責反覆憂難辭理俱屈衰髮一夕如經十秋素來無業只慣飲博罔曾負纍以至訊問事過奇喘無禍不有且彞於天下何異株塊比於閣下細微若螻蟻如國家之事肉食者謀雖鞭之長胡及馬腹况中籌之子如何敢及早聞閣下清節玉立洪量海納軍謀在握文藻盈帙中外騰口聲歸其高彞是用私達微誠庶被知已不測閣下以言罪之嘗聞不以言廢人閣下何必取威於懦夫而後行今自明主設誹謗之木諸侯有鄉校之議且今主上何愧於唐堯閣下何短於鄭卿伏惟念彞之失寬彞之責使得擢髮便當鉗口匍匐鈴下以收前非則伏諸忠信越境不敢留也彞死罪死罪月日窮居布衣李圖南有腹心事上書郎中閣下圖南聞書者舒也舒所憤蓄於人之心禍福之萌繫乎一言郎中止水之鑒不私秋毫如川注東不讓細流圖南殺身之誠去此誰告是用端蓍龜考吉日進牘於執事所尚拙實不張遊詞郎中為三復焉圖南同學之生戴察字彥衷年二十二蘇州人也而有蘇州之稅司籍者目之以為僑戶異哉書劒之子而與農賈同貫豈非當日闕明吏以至於是乎其人固窮自立家業無一老父垂白處妹未字湫底之巷蓬茨蔽身弊衣糲食丏貸取給纍年徭賦非出諸巳即日數口憂擠溝壑重以官迫不聊有生郎中侯服玉膳信有如是事者否郎中之始至也謀以息民布令曰矜老疾活艱困凡在庶物令趣其本於是鄉計之而白於縣縣審之而上於郡執事視之而疾首曰罔有不允乃條其年稅差與蠲放禺禺延頸情有所向爾時彥衷乃借人冠履佩人劒帶時步麾下啓區區心書訟其戶祈與降殺若何執事以為不切之務棄而莫顧及再投狀狀無所投矣彥衷亦謂圖南曰我他年不言而今言者以韋公負天下人望當有解左驂之分也豈同絳灌之列哉不圖如羝羊觸藩進卻斯咎乃高歎曰清源無增瀾安得運吞舟歎聲未已淚亦隨注侍者改色浮雲為陰因成沈疴月有餘日老親在側竟夕不寐一飲一食皆求諸鄰爨無束楚室若懸罄圖南昨就相省杖而能起神緒淒黯絶無話言立未俄頃見有衣黃衣者排闥直入口稱里胥罵彥衷曰兩稅方斂何獨不納刺史縣令公知是誰俾豫肌膚代爾擔責嚄嚄叫怒不容少安彥衷回惶若狂計靡從所其父諭之曰取爾常讀之書常撫之琴質於東西家南北家以其所資將以奉之無令來客貽我之戚彥衷唯唯乃獲上繒而與之及將去也仍誡之曰後所欠者必扼公喉唾雪而取辦於時蠶妾牧豎知為之辱况圖南六尺之士乎圖南聞龜玉毀於櫝中守者之過也而彥衷不獲其所郎中何以為理人哉彥衷乾乾之子章句精意此土儒輩無居其先每秋鄉送皆為賓首溫良敬簡殊有可紀郎中命世之傑合天縱才明眸燭微剛略定猜刑賞之下萬無一乖寧令一彥衷肝腦布地不知所階悲哉圖南聞士為知己死且不忘是用感激於左右假手於執事免彥衷之役螻蟻之望則決之矣昔魏絳薄言晉侯為之稱過李斯肆辨秦帝為之復客鄭僑致誚范丐為之輕幣江淹投筆建平為之側席斯皆咫尺之素也以相寤也今圖南此書亦望郎中有成績也不願郎中空寒暄也使圖南書事無實言挾於妄則立伏匕首甘棠之間以塞深責彥衷亦獲無咎郎中慎勿恥葑菲之旨克動瞻聽而損其言不為之行也謹遣隸人捧書跪獻圖南伏俟咳唾不宣圖南再拜僕聞孔宣父云如有周公之才之美使驕且吝其餘不足觀也矣足下德非古人何遽相淺如一及第僕保之久矣但與足下論其先後耳僕長於江表今未弱冠自謂來者晚遭知音比見吳中人談足下美不容口僕外氏河南行軍司馬舊與足下遊揚善聲僕每懷殊節不履常迹立名委運求友勝已是以昨晝徒步奉尋所居將拜足下先丈人之靈問足下不滅之戚如何稱倦哭泣輒安牀褥辭以有疾坐而誣我人子喪禮豈其然乎僕躊躇愀然頃乃能去敬料足下雅度必以所報之人云僕貌不王褱傑衣不鮮麗前無高車後無蒼頭量僕為區區進次之人而默相遣若使有一俗士煌煌輕肥足下必投袂而起何疾之稱爾大丈夫當立天下何取辱於足下之門嗟乎李生斯過也矣且僕相造重足下足下非禮見辱豫以深貧交數公咍僕不已足下知無所曰疑乖攝夜來計減請垂加食罔至毀性雖未執手惜虧前意謹封名紙以抒末分書用直敘拙而不文月日某再拜六年春我不利小宗伯以初誓心不徒還乃於京師窮居讀書著文無闕日時是年冬復不利見小宗伯嗚呼天難諶命難言聖人且猶盤桓我安得如料而決志哉但堅節不去躁機不來兢兢而強勉勉而為耳於時顧逆旅而無聊圖俟時而尚遐發能遷之慮緘莫知之嗟乃以其明年司分之月乘罷驢出長安西遊一二諸侯求實於囊往復千里投身甚難殊不知西陲數州界在虜關土塞門民獷榮戰陋儒我見其將遺我縵胡我見其士賦我從軍向之之謀暨感激心卒無所開祗忽一念我家如在長安或遇適戌而宿隨登陴而望有東方之人老在塞下者為我言用兵之勤及五十年每歲孟秋邊風便寒達於堅冰武夫操戈僵不得煦胡兵顤戮寇罔於常方言會候人舉烽我茫然謂戎來遂夜馳歸長安窮處蕭條猶初乃開而居乃出而書上不敢偶下不敢專鄙苟得之名謝姑息之交愚與介并直與諂違是用人不合余余不合人故身有負俗之議文多自我之非然斯者略不損明其猶荊民不譽宋王臧倉之疑孟軻及我而三奚足屑哉然特苦旦暮之供出處之虞也而幸有一僕賃之童純義而誠服事祇勤傭蓄以給余為隸以奉余久而不求直殆而不施勞盤飱之廉汗馬之庸不能過焉古者孔子門人皆曰上賢及在厄窮有慍見者吾老君亦有從者徐甲老君去官甲亦求去夫孔老之道於我也則小大較然其門人從者之操則何遠斯童哉吁我嘗獨歌而悲客有造曰子之窮達在時與人我曰不在時乃在人不在人乃在斯童何者仲尼適周魯君乃與一乘車兩馬一豎子自周而還其道益明則聖人經為亦用其資獨作恆人乎今我所以能於京師保窮居讀書著文無廢日時者乃斯童之力也非我之能也非親交骨肉之力也成我洪名階我青雲有日矣汝知之乎汝我季也我空言哉吾違養以來不忘歸歸而無名為親之羞困而行之窮苦日尋俯而自安窮則可也流親之羞歸不可也念二途日夜腐心渾元循環三歲一朝油然而思衆恨長短居人遊人相屬之憂寧同時哉行至八月天地淒涼葉下西郊我在空房晨起吟咏閴乎無人夜臥不寐寒漏自長意可覆也難可縷陳我書不稀汝書亦新異日兩至同慰一身豈不旨哉年不甚幼近學何書擬舉明經為復有文明經世傳不可墮也文貴天成不可強高也二事並良苟一可立汝擇處焉無乃不修繫書黃耳依依有遺千萬孝弟其兄云云月日鄉貢進士李觀長跪薦書侍郎座右侍郎知小子也侍郎方揚清上流觀方委照下風夫上流之清有源下風之行無還借之於人事也有察之者昭昭有昧之者元元乃古人曰離婁視千里盲不見咫尺得非然哉用是越㣥子之行薦數字之書排得喪之懷登萬一之途侍郎其或不見邪其或悅也得不言之而後退言之而後進安可空空而為乎昨者奉試明水賦新柳詩平生也實非甚尚是日也頗亦極思侍郎果不以媸奪妍不以瑕廢瑜獲邀福於一時小子不虛也而以帖經為本求以過差去留觀去冬十首之文不謀於侍郎矣豈一賦一詩足云乎哉十首之文去冬之所獻也有安邊書漢祖斬白蛇劒贊報弟書邠寧慶三州饗軍記謁文宣王廟文大夫種碑項籍碑請修太學書弔韓弇沒胡中文等作上不罔古下不附今直以意到為辭辭訖成章中最逐情者有報弟書一篇不知侍郎嘗覽之耶未嘗覽之耶觀嘗竊覽侍郎頃年詩一篇言才者許以不一端文者許以所長則雖班固司馬遷相如未聞若話言是侍郎雅評掩於三賢矣故觀今日以所到之文謀於侍郎不以帖經疑侍郎也且昔聖人曰後世罪我者以春秋知我者亦以春秋夫聖人祖述堯舜憲章文武然猶以春秋為言者何也蓋以誼有所不加道有所不拘夫文人讀春秋求旨歸觀實忝為文不敢越及來應舉知有此事意希知音遇以特知而有司多守文相沿今遇侍郎其特知乎且侍郎曰帖經為本本實在才才不由經文自謬矣由經之才文自見矣本於是在不在帖是或亦所司以是置人不然其恥耳今觀也實在洛日擊指揮占往來以侍郎為文犀以侍郎作靈龜中之通者不聞遺訓兆之靈者不聞宿夜顧不復帖聞洛乞今先意知微則兩至之慮一意是恤幸甚幸甚觀再拜文之難言也久矣是使為文者紛綸無人察其否臧焉雷同相從隨聲是非遂令怨咨之音作苟且之道開荊璆無價碔玞有輝仰惟執事坐而相之得不然乎當今朝廷洪雅尚文以文化人四方翕然聽命於有司有司於是乃以詞賦瑣能而軌度之聲稱叢聞而搴擷之謬矣哉失在茲乎原夫先作之立軌度者懼常才之不及也非罪其過也抑亦有良材茂器或所不識也博聲稱者有司之至公也亦至私也且聲稱之始十九黨與己乃惑之識不自勝襲私載公是至私也設有一人乘語未終而難觀曰軌度以考其能違之者子何病聲稱所以尋其實也無之者子何病則曰俞哉非願去軌度塞聲稱二者誠仕進之嚮也蓋欲有司之留視於軌度之外者綏聽於聲稱之遺者勿以人之好惡奪已之精理也何者慮良冶之巧無消冰之術鏌鎁之鋭無補履之用而因投棄為代所笑耳是説也得不近之哉實所未言於人常用叩之執事耳觀長於江湖之鄉學於仁義之書微有志義仍近直方不苟與人亟於自求從學兩年屑屑焉人未之聞名未之成進取無嘉謨環向多窮愁視形如陋視文如愚憤之用勞罔之攸安欲如之何執事文章之儲文詞之師扶微削訛可以厚名殫鑒垂哀可以辨文觀也於焉捧卷如歸言莫卒微不知悚兢觀再拜觀小人也伏思不肖之身出自大賢門下其為幸也不敢忘也今者東還拜親即不得以起居執事者將何以申大賢小人邈矣之間乃致其慺慺戀戀之心也於是乃屏窮處之中集常念之言修辭謁之書其一所以發揚狂愚昭宣緝熙其二所以遇知託分原始要終胡敢空言濫説以讟左右哉傳曰言身之文也在乎身非言不見也言為善召應蔑有遠近也伏惟內之觀於相國門人也相國於觀師道也門人得請於師道師道得訓於門人古之典也是仲尼門人七十子之徒皎皎如也申申如也觀誠至愚不能庸敏然頗常思古今治亂邦家大體生民之難君臣之際以為意也豈徒焦氣力勞形神潤飾言辭以自賢且相國昔以章句知之耳今固亦章句待之耳繇是越石父不言齊相曷繇加命韓信不言滕公曷繇奇之哉伏惟念之也伏惟內之也觀幼養於親長敬於家非良朋善友寖明寖昌之道也然天之與識蓋忝文翰先王之書其見有圖功植節周旋忠毅信誼死生患難之間或翺翔倜儻瑰名烈行不變者則甘心願之其餘深旨微文則萬未知一家貧無以自成性顓不樂他能灼如也不得已乃拜親而來無一金之資五尺之童莫與合者飄無處所鬱乎而懷浩乎而思是亦多為風聞所訕不聞雷同所稱時之來也而獲遇相公之權衡文場博哉其度堅哉其口不以譽就不以毀搖既事之時亦盡一時之良矣而觀特為推擇起離曖昧居置昭晰翕乎下流以干時而思也無異起白骨出黃泉之惠不純大也此所以言其幸也不敢忘也及其罷也即思歸還供養庭闈俯仰淹留復以逾時乃應選科不自計量幸去衣褐為吏於公益用感遇之無窮也而貴益重賤益輕故無易由言也莫開説也比者數與其得造左右溫顏而愈匪及論議意者以其駑庸不足言也是日以念之月以思之時以疑之不自已也當其進時既不以言而以言者所謂干議也當其退時既不以問而以問者所謂犯貴也不懼二者之為尤上無一言之可談如此則下之思慮塞矣上之聞見褊矣觀於左右悠矣古者有詢於芻蕘有不恥下問經垂厥文不亦懿乎今者將有所陳幾贊謀猷先陳為容儻蒙降鑒觀惶怖幸甚幸甚觀聞惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至人本是故能若天之時迪地之利輯人之和以平天下以育㣥生以禋祀天地宗廟之神夫言通天下之志者即生民庶物哀樂零茂無非知也夫言成天下之務者功作云為開利除害無非務也夫言不疾而速者君之號令也夫言不行而至者君之德澤也苟德澤加號令信利開而害除民悅而物遂則天下有幾欲至矣安得不曰神乎不曰幾乎不曰深乎然是者曷由臻也誠在理運遭明主明主遭賢臣賢臣舉善人而官之乃能今相國既遭明時既輔睿主持政廟堂當仁天下則用何而相聖人之道用何而成天下之務伏欲聞其言而頌其實也噫夫惟宰相之官陰陽之爐冶天下之樞轄賢人作者之器用也非守常人之所宜坐也故不可序進而久升也董仲舒雖未久不害為輔佐繇是相國立身以來不二十年踐乎諸生興乎三公鼓動天化鈎深含靈茂實葳蕤榮聲洋溢蒸民之詩曰天監有周昭假於下保茲天子生仲山甫天子有命仲山甫將之猗歟實謂相國之謂歟相國何以承之哉切惟三年於茲天下亦無大不治民亦無大不安陰陽亦無大不和而議者竊不能云曾不討其本而思其中斯皆好言鄙夫且人君內設公卿士大夫理內也外建方嶽侯伯理外也內外之官各得其理今議者則不然覩職之乖則曰宰相聞一郡之災則曰宰相聽一民之咨則曰宰相苟如此而求仲虺巫咸不能無過也然議雖非不可不察也天下之人理難求也執事但求人之要而不求天下之理則非也夫天下之人不可盡勝執事者耳目之至也當在用人而理也用人而亂也故昔漢用張敞召信臣文翁則理也用東廣川則亂也然則有刺史案其治亂隨而陟降三代已還有考績之典今則闕然無取州郡者或連歲而來逾紀而去惡不加勸害民者滋深利民者不立和氣為仁沴氣為災人傷憂苦則和氣不興沴氣升至虧損陰陽結積水旱牧守非人之故所生也一人不修一境罹災十人不修十境罹災修者寡不修者衆則沴氣多和氣寡凡天下幾十境而不溥耶近者天下往往水災是其效也今或不能率復三代與漢舊典何不選舉公良分郡按察邦伯牧長責其親臨及其風俗以勸以懲又漢朝每策舉髦俊賢良之士吏事咸通儒書問以治亂求以災祥處之民上試之臧否國家曠之殆殊急賢吁黔首之上必有欺吏白屋之間必有純人不用務奚以成天下之人必共而安之天下之務必共而成之任有怍職是謂不朗忌而不求是謂害賢宰相職也在明二端昨者盧賈二公同升台鼎天下謂賢相公薦賢莫不欣欣偉乎稷契暨乎十臣且出自門下永懷歡謠惶怖幸甚幸甚竊惟前後相府多相繼踵咸遺要道罔思經綸前化蕭何後法曹參何多誤也天下之敗則緣是乎又漢有何武薛宣為相時譏其煩碎無大體不稱賢公又申屠嘉傳曰嘉死後皆以列侯繼踵齪齪廉謹為丞相備員而不能明發功名宣帝時上日親萬機考核名實而魏邴之徒總衆職以稱上心陳平對高祖曰宰相者上佐天子燮理陰陽外鎮撫四夷內親附百姓使公卿大夫各任其職前史載之必謂是相國常所留意邪視今人君循理有類漢宣而相公亦宜舉魏邴之長班固曰高祖開基蕭曹為冠孝宣中興魏邴有聲是時黜陟有序公卿稱位禮讓樂行觀樂覽漢宣之代二賢之制故以言於執事者竊惟朝廷用人大若未盡之艱虞以來百司不綱事或流末官備職虛多不厲已有能倍於官有用寡於職有亟見於除有久不得遷夫用不及職則職廢官減於能則能怨亟除長躁競久不遷者傷偏頗則陳侯使卿大夫各任其職或不然也或聞天后故事百官去位展轉相舉稽伏用人莫有苟知逮開元際多有賢良皆曩之遺舉今雖無老成人尚有典刑庶可法也可期理安或有謂相國曰時之無人也此甚不可聽也誠用之未當令驥捕鼠則何由得也以劒補履則無由剋也責燕雀以六翮之用則何由致也用之當用物且靡遺况天下之士行道甚難也逢時不易也行道甚難也而天下之士不以此時遇相國而相國不以此時得天下之士則千秋不可復期嘉會不可再來盛德不可久持故昔人曰未遇伯樂則千載無一驥明其士無時而特達也猶馬無時無千里者也甚可思也伏惟勿忽之也雖然大略在官人其次偃兵語曰天下安注意於相今四海八方注意於相國之時故不敢復以兵問大君子也小生伏辭無加拜跪今則無端陳利説害相國之明曷不至也天下之能曷不畢也以為狂愚厥惟闕也以為庶幾厥惟詳也有以容德乃斯之謂也感戀於門出涕屏營觀惶越再拜
