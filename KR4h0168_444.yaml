front:
  text: 全唐文欽定全唐文卷四百四十四回大歷中進士
  hash: sha256:67f4d70d6754713bcb8796ab980c803cd7fb2db1d8c2401215dc3177b249954c
  markers:
  - {type: head, offset: 14, content: 沈迴, id: KR4h0168_NFKB_444-h1, level: 1}
body:
  text: 皇帝御極貞元三祀時乘盛秋府主左僕射馮翊嚴氏總帥文武將佐洎蒙輪突蹄之旅疆理南鄙營軍沔陽先聲馳於種落伐謀息其狂狡於時威武震謺虜騎收跡塞垣肅修烽燧滅焰士無保障之役馬無服轅之勞重關弛邊轂棲野我師惟揚則有餘力乃升高訪古周覽原隰敬修茲廟式薦馨香光靈若存年祀浸遠雖簫鼓欣奏邑里祈禳而風雨飄颻祠堂落構土階莫數尺之崇庭除無袤丈之隙登降不能成禮牲玉不得備陳頽墉露肩灌木翳景樵蘇滿徑麋鹿走集馮翊曰丞相以命世令德功存季漢遺風餘烈顯赫南方邱壠南山實在茲地荒祠偏倚廟貌垝裂非所以式先賢崇祀典也乃發泉府徵役徒撤編菅芟剃叢薄是營是葺衆工㣥至繚以高墉隔閡芻牧增以峻宇昭示威神靈英昔賢像設如左翼翼新廟日至而畢顧謂小子揚榷前烈銘於廟門曰在昔君臣合德興造功業有若伊尹相湯呂望興周夷吾霸齊樂毅昌燕是數君子皆風雲相感垂裕來世嘗以為阿衡則尊立聖主天下樂推尚父則上讐獨夫諸侯同舉管氏藉強齊之力以宗周無令王樂生因建國之資贊燕昭為奧主君臣同道僅能成功惟武侯遭時昏亂㣥雄競起高光之澤已竭桓靈之虐在人遇先主之短促值曹魏之雄富能以區區一州介在山谷驅羸卒輔孱主衡擊中原撐拒強敵論時則辛癸惡稔語地則燕齊勢勝遷夏殷者未可校功霸桓昭者不足侔力向使天假之年理兵渭汭其將席卷西邑砥綏東周祀漢配天不失舊物矣洪伐彰彰宜冠古今倬軼前烈其誰曰不然武侯名跡存乎國志今之㣥書姑務統論大略敘我新意至於備載爵位追述史傳非作者至德也今則不書其銘曰桓靈濟虐雲海橫流㣥雄蝟起毒蠚九州天既厭漢人思伐劉沸渭交爭存亡之秋其誰存之時維武侯伊昔武德踠足南陽退藏於密不曜其光有時有君將排垢氛魚脫溪泉龍躍風雲先主纘緒天下三分馥馥德馨悠悠清塵前哲後賢心跡暗淪建茲新廟式是梁岷去泰大歷中朝請郎行成都府廣都縣丞四維無涯元黃混其體精氣相射陰陽孕乎中寒暑推移日月所以交會道德敷暢仁義所以表儀即有金人流化開悟方便之門寶籙闕宗沖融自然之理法本無別道亦強名隨化所生同歸妙用故知二儀生一萬象起三殊途而歸體本無異至哉廣運元之又元方丈之間示我三教察其規製即資州刺史叱干公作禮虔誠大歷二年十月奉為我國家之所造也公六德居邦千里作鎮心貫白日志勵秋霜出敵忘家長安不修甲第以身許國閫域獨作長城公之忠也每厭黑山尚屯常以丹忱望闕所經幽異志諴感神上啓靈祇誓清壤裔公之義也今南方已定全蜀無虞戰馬歸山衆落附欵公之力也襟帶無外書軌永同至於海隅罔不咸若公之闕也所以建此道場上答神理公之信也天地合應鬼神共資磅礡山川毖邃祠宇闕二字智力誰啓此門巍巍乎視現不窮蕩蕩乎思量無及人世幻影盡證虛無衆聖真容超然利見無言說法無色現身不動如如能生此會黃金照曜上有白毫放光紫氣氤氳下有真人現世漢崇裦聖已表儒風唐號文宣彌尊德位仙雲法雨併灑虛空東序西庠盡涵霧露別為世界更有神形手持寶刀常親護法枝葉本根則後周之苗裔也位尊茅土再忝文王之名班列將軍特闕龍驤之號羅列四部變現十方回向之間不覺恍惚想之疑遠人理並行聽之無言風樹傳法悲夫造化未出陶鈞稽首歸依願離生死踟蹰勒石用紀斯文其詞曰西方大聖為法現身不生不滅無我無人甘露灑雨水闕淨塵心澄智海道引迷津湛然不動永絶諸因混元難測杳杳冥冥恍惚有物想像無形闕天辨位四方闕星中含仙道下育人靈法傳不死空餘老經廣學成海渙文麗天光闕十哲軌範三千獲麟悲鳳讚易窮元首唱忠孝跡重仁賢其道不朽今古稱先秀榮代宗朝人掌地之圖辨邦之數分疆畫野度土居民將以均其賦役一其征繕俾上下而為宜體磽肥而施法甲之所給類彼均人度以物情頒其職事我疆我理雖差百畝之田如茨如梁何乖一易之地且稽諸王制考彼周官當務審其徵求而克均其政令李悝為魏方興地力之能管仲相齊式廩軍實之要更耕而穫豈昧隨時受以公田雅符通典若科之罪勿使能殖鎮代宗朝為昭應令仕至司門郎中臣聞國以人為本害其本則非國神以人為主虐其主則非神故昔之聖王所以極陳理道明著祀典將愛其人而慎用其材力敬其神而虔恭於祠祭故神享其明德而降之福人受其大賚而盡其力然後神人以和而國家可保也一昨蟊賊作孽水旱為災雖王畿皆遍而臣縣最苦此則神之不能禦大災明矣又何力於陛下而得列祀典哉且以殘弊之餘當凶荒之歲丁壯素出家入仕羸老方飛芻挽粟今但供億王事已不堪命更奔走鬼道何以聊生臣又聞天地之神尊之極者掃地可祭精意可享陛下亦何必廢先王之典崇俗巫之說走南畝之客殺東鄰之牛而後冀旡妄之福陛下雖欲為人祈福福未至而人已困矣其不可一也陛下不視昔者有道之君至德之后曷不卑宮室惡飲食恭已以遂萬物之性哉陛下今違神亭育之心竭人疲困之力如是又何從而致其福哉此其不可二也又陛下宗廟之敬極矣尚無一月三祭之禮今此獨為則宗廟之靈將等以親疏校以厚薄陛下又何以言哉此其不可三也又天地婆父祀典無文言甚不經義無可取若陛下特與大地建祖宗之廟必上天貽向背之責陛下又何以為詞哉此其不可四也夫湫者龍之所居也龍得水則神無水則螻蟻之匹也故知水存則龍在水竭則龍亡此愚智之所同知矣今湫竭已久龍安所存陛下又崇飾祠宇豐潔薦奠為去龍之穴破生人之産人且怨矣神何歆哉此其不可五也其道君三皇五帝則兩京及所都之處皆建宮觀祠廟時設齊醮饗祀國有彞典官有常禮蓋無闕失又何勞神役靈此其不可六也臣稽先王之典禮觀前聖之軌躅休咎豐凶災祥禍福必主帝王五事不在山川百神此其不可七也臣伏察此弊頗知其由蓋以道士李國禎等動衆則得人興工則獲利祭祀則受胙主執則弄權是以鼓動禁中熒惑天聽踰越險阻負荷粢盛以日繫年無時而息曾不謂神功力空止竭人膏血以使人神胥怨災孽並生罔上害人左道亂政原情定罪非殺而何臣昨受命之時親承聖旨務存安緝許逐權宜誠願沉鄴縣之巫安流弊之俗其所興兩祠土木之功丹青之役三六之祭灑掃之戶謹明宣旨並以權宜停訖人吏百姓等知陛下以從善為心嫉惡為務蠲除不急剗革煩苛皆喧呼於庭抃躍於路所徵糧糗無不樂輸臣伏以國禎等並交結中貴狡蠧成性臣雖忘身許國不懼讒構終恐賄及豪右復為奸惡其國禎等見據狀推勘如獲贓狀伏望許臣徵收便充當縣郵館本用其湫既竭不可更置祠堂又不當為大地建立祖廟臣並請停其三皇道君天皇伏犧女媧等既先各有宮廟望請並於本所依禮齊祭虔舉進士歷御史府三院刑部郎中江汝二州刺史祕書監元和中卒大歷七年冬十有二月辛酉御史中丞前晉州刺史高公薨嗚呼天柱折地維缺豈止梁木其壞泰山其頺乎中書令汾陽王聞之衣及於寢門之外至哀不哭仰天久之曰天喪余俾余何所依律苟在飲公之化食公之德莫不叩心絶氣行號巷哭其月乙亥天王使中使來歸我公之賵贈潞州大都督詔曰狐裘濯冠勤固無歇閉閣留牘盡瘁有終謂公有古人之風故貺公以古人之節傳曰知臣莫若於君豈虛也哉公諱武光字叔良其先渤海人也曾祖正初隋左金吾衛中郎將祖翰皇中散大夫常州長史皇考莊皇左騎衛將軍代濟忠貞保乂王室纍膺熊羆不二心之佐盛德之後必有達者惟公生焉公則將軍之嗣子也在厥初生自貽哲命弱而幹父長乃克家恥雕蟲而不為嘉從龍而或躍故能事親克諧於純孝弻主必著其大忠忠孝並全社禝之衛也以申警之勤首職洛交郡安昌府別將昭忠信也由是公忠壯自篤勤勞日宣為國爪牙在帝左右美爾攸績於嘉乃勳纍遷至忠武將軍守左清道率洎天寶末會幽燕階禍公密奏辨疑讋履霜之漸叩血流地上濺御衣雖涉闕之諫不從而竭忠之誠克見帝嘉乃節拜右羽林將軍知軍事及亂作公待罪闕下曰臣始知之不能糜碎身首啓沃聖聰俾賊猖狂藥不瞑眩誰之咎也敢忘其死帝遽錫公雜綵二百假瓶盤副焉曰子言無隱朕甚嘉焉言而不從朕之過也惟今之謀言姑將以為親其年秋公陷賊境為賊所得賊議焚太廟與清渠之役中使孫知古遇賊若為釁鼓之事公節由義感忠以勇成危言勃如賊爾咸若是歲國廟不焚中使復命公之力也其有金鏃淫夷南冠繫俘咸賴迓續以永其命者可勝言哉其時賊議公本我唐之藎臣也不可以握兵之要恐通內外之言賊遂黜公出典故絳絳人聞公之至也公來其蘇公之牧絳也我躬則閲雖外困賊命而內綏我人億兆協心和樂且孺卒使包茅之貢日臻乎行在及王師大來公志克遂墜城歸命乃享無疆之休易曰女子貞不字十年乃字其是之謂乎入朝肅宗詔復位羽林是歲年穀不登長安餓死相屬公揚言於上請出禁衛之米以頒餓者上多之乃俾公司出納之吝翼日餓隸復蘇人賴家給時謂之公致君邁於堯舜不然何博施之道廣耶越月除奉先是邑也有不腆之賦戶人逋其邑三千公戾止未幾戶人復歸如初屬虜難未已時奴剌拔我鳳州皇上類能俾公康乂公於是乎始有剖符之寄公之始至克黜戎難靖安西人踰月政成封內大理俾其禍疑之蓋及身於仁壽之域矣其年秋有詔遷梁州刺史充山南道觀察初商人吏那延西人之子也楙遷員來遇疾而卒遂殫所得之資備送終之禮明日死徒數百人咸造公庭曰今有以見死者之幸我如此不如死疑其餘字人之恤飲冰之潔不書可知也君子曰高公荷天之百祿永終無斁由是汾陽王美公之政無度寶應初以今上之命命公救濯於絳加銀青光祿大夫絳人喜公之來如見父母戎首師乾光皇甫大沖率徒數千居郡之南山食人馬牛奪人妻妾渴日為惡不彌虔劉洎公之下車旬時克浸仁風率復淳化封域之內謐如也雖晉用隨會㣥盜出奔舜舉咎繇不仁者遠曷以為比俄而汾晉阻兵關東漸弊脅權相滅鮮克胥匡以公獨固大節仗大順初誘之以高位不從又逼以白刃不從身幾見危節終不奪可謂風雨如晦雞鳴不已上徐聞其忠壯也加特進守左金吾衛大將軍又轉開府儀同三司試太常卿封渤海縣開國公食邑一千五百戶加朝散大夫閒歲遇汾陽王論晉倒懸之急若涉水之不濟由是上將公為舟楫克濟其難公自是以利往為晉康侯加御史中丞夫晉陶唐之舊也介二大都之間達四康衢之要賊臣之所讐斂王師之所蹂踐室盡閴爾田其荒兮其有彼積之苗美哉之奐則為武臣所有其秋興履畝之役行比屋之稅撫弱惸獨不畏強禦晉人沐公之惠如慶雲也一年逋逃復二年田疇闢三年之外中和之詠甘棠之頌洋洋乎盈耳哉三年秋汾陽王復以公勤績克聞於上上俾公以尹河府浹辰之內揚然有聲晉人思公遺愛銘頌貞石經始有典不日成之覩而思仁墮淚於下汾陽王聞之復聞於上上詔公再造其晉加樂安郡開國公公之至也大耋鼓腹而歌㣥黎投杖而拜武人總戈以馳突樂正交鼓而和羅公既喜迓如雲人亦沐公如雨風生草偃政簡人和陶然日遂其性矣以明年冬汾陽王以秦隴不關藉公以籌其策公罷侯於晉克揚西土之烈無何遘癘虐疾遂歸休於宣平私第病日臻既彌留銀青光祿大夫兼絳州別駕趙公廉公之愛壻也素知其為人名節清峻氣宇沖邈臨終之日托以後事而誓言於公曰嗚呼余不天余之生也克艱難昔往蹇之際不克抗臣節以死王事繄老母之故賴皇鑒之明以汾陽王靈不汝疵瑕獲保首領以免今死喪洊至逃逭無所汾陽王生成之恩不得而答太夫人罔極之德何階而報天乎天乎誰察豫之心乎言終飲恨而歿享年六十有五夫人隴西李氏柔克宜家坤儀訓內享年不永先公而逝大歷八年正月五日詔贈郡夫人夫人以其月乙酉合祔於萬年縣鳳棲北原禮也公六典大郡三掌禁兵清儉以立身貞固而獲歿誰謂高氏無君子斯焉取斯太夫人隴西李氏回已斷之腸就終焉之禮夫人天水趙氏誓同穴之志為未亡之人嗣子長曰升次曰昱咸在童齓集蓼茹荼哭不絶聲盡而繼之以血也虔忝吏末曾工為文受命於愛壻趙公俾光昭公之令德逖聽遺愛搦札而書不覺涕之沱若跪而銘曰天贊皇明而公克生欽若王事有終於成乾乾惕厲謇謇忠貞三主禁兵六牧專城於穆性情洋洋頌聲九有作程惟皇之楨胡不終吉今天降疾禍升福黜幽啓明窒佳城鬱鬱備物秩秩送終於畢不思其出隴月宵弔郊雲曙密吁嗟高公千秋此室翃字君平南陽人侯希逸在淄青李勉在宣武皆辟佐幕府後以駕部郎中知制誥終中書舍人臣某言中使某至伏奉手詔兼賜臣茶一千五百串令臣分給將士以下聖慈曲被戴荷無階臣某中謝臣智謝理戎功慙蕩寇前恩未報厚賜仍加念以炎蒸恤其暴露榮分紫笋寵降朱宮味足蠲邪助其正直香堪愈病沃以勤勞飲德相歡撫心是荷前朝饗士往典犒軍皆是循常非聞特達顧惟何幸忽被殊私吳主禮賢方聞置茗晉臣愛客才有分茶豈知澤被三軍仁加十乘以欣以忭感戴無階臣無任云云臣某言伏奉詔書追贈臣亡父先臣司空者慶因出震澤及重泉禮命式加哀榮兼極臣某中謝臣遭家不造過庭無聞仰先聲而彌高勤遺訓而靡及徒因積善率勵小心位忝統戎寵加錫賞此誠陛下孝理為本德教所先因作解之明威布追遠之厚德禮降幽壤位崇上公遂使展罔極之哀受恩感於庶物襲有後之慶撫事愧於揚名既申報養之懷載竭移忠之孝臣子誠願備極於斯無任哀感之至臣某言伏奉詔書追贈臣亡母李氏楚國太夫人者承命祗感哀榮罔極臣某中謝臣年甫強仕禍積靡恃痛吹棘之莫喻瞻風樹以永懷雖忝分茅之榮實由斷織之訓動興怵惕感戴劬勞豈謂陛下推恩成仁廣孝致理寵延隴隧秩開國封使微臣沒地有辭終天無恨既申欲報之志更切匪躬之誠餘生萬死豈答元造無任受恩屏營哀感之至臣某言伏奉恩制追贈臣亡父通直郎行京兆府醴泉縣尉成名禮部郎中者渥澤流於幽隧哀榮集於私門兢惶拜命涕咽無措臣某中謝先臣素履貞白早謝昌時臣雖叨竊班榮不及祿養每懷風樹之痛莫報蓼莪之恩伏惟皇帝陛下深宏孝理澤被存歿特降殊私爰加裦贈幽靈知感結草有期微臣戴恩畢命思報不任荷懼懇悃之至臣某言中使某至伏奉敕書宣慰臣及將士等并賜臣母申國太夫人口脂一合面脂一合澡豆一貼并賜臣溫香一合兼賜將士口脂等聖慈稠謺感戴無階臣某中謝臣絲髮效微乾坤施重因時受賜覩物知恩寵及澡身榮加潤色恭嘗御藥心則和平親受國香人其服媚飾犬羊之賤質齊鴛鷺之增慶恩必及於慈親澤兼流於宿將感戴洪恩無任抃躍屏營之至臣某言臣亡兄某以今月二十日詔葬永畢感恩追慟肝心如裂臣某中謝臣亡兄俯歸幽穸更軫皇慈易以大名賜夫祕器王人加贈京兆護喪道備哀榮念深勳舊霍光故事斯則為優謝安殊禮彼何足貴臣限總留務虔恭聖私不及親扣泉扄盡哀號之義回趨陛下謝裦寵之恩慟哭轅門五情分潰臣無任感激之至臣某言奏事官潘洽回伏奉敕書手詔兼宣進旨不許臣輒離所部又以臣腳弱無力伏奉批表以軍府政殷藉卿鎮輯不赴上都也懇誠莫遂祗命哀惶臣某中謝臣兄永辭昭代俯及葬期臣請解戎章歸護喪事義雖聞上恩不聽卑掩泣轅門飛魂隴樹外慙形影內切肝腸千兩送車臣空瞻望九原臨穴臣不躬親一呌骨驚三時心死伏以大君有命重鎮無人俾臣割哀勗臣留務宣恩拜手祇事撫膺又荷聖慈追懷前效俯悲竹替屨軫念松楸更使改期貴先遠日幽明銜荷感謝無階無任哀感之至臣神玉言今月三日得上都留後報稱伏奉敕牒臣亡兄神功宜令所司於京兆府界擇地安葬仍令京兆尹充監護使勾當恭承渥澤俯及遠期拜手感恩摧心增慟臣某中謝臣亡兄任崇寄重方報聖恩祚薄釁深早違昭代天慈悼往朝典飾終日月有時乾坤曲施榮加昭葬寵荷官給榮如曹氏京兆開阡貴比霍家祁連象冢義光前古禮極哀榮在臣一門盡出望外載悲載躍無階上酬臣願號赴私門親護喪事緣總留務不敢自專今見催促行裝伏待進止云云妾張氏言奏事官潘洽回伏奉手詔以妾亡男贈司徒神功葬日有期特承哀問兼賜神玉手詔所賜本道錢四萬貫並令妾以下聖慈曲被感戴哀絶妾中謝妾隨子東征銜恩北闕纍承雨露載啓山河同覬之親幸及貴登僕射異勤之母不見生拜司徒忽荷聖慈寵加存沒敬姜年暮俯矜哭子之哀庾翼才微尚使領兄之衆殊悲望外旦慰目前況將逼遠期特垂渥澤更切撫存之義兼回贈往之資赤仄盈庭紫泥在篋痛而受賜哀以為榮庶神功有知應感安親之道魂其無昧更酬報國之誠載號載悲不勝感絶妾無任悲戴之至臣神玉言伏奉手詔兼奉敕牒賜錢五千貫文給臣亡兄神功葬事用拜手感恩闔門悲戴臣某中謝臣兄始終效節存歿銜恩智悼在堂已加朝禮滕公居室又荷天慈錫其九府之錢寵以重泉之路多踰千萬榮冠一時去病飾終空陳元甲孔光送往薄賜黃金在臣私門寵極前古但盡哀號之禮寧憂窀穸之儀臣無任感戴悲躍之至臣某言中使梁某至伏奉今月日制書授臣使持節蔡州刺史兼御史中丞充淮西節度觀察度支營田等使留後特達睿恩殊常寵寄權兼專席榮重褰帷稠謺聖慈心魂戰越臣某中謝臣少小孤遺又無藝術叔父忠臣勵以成人自屬艱難親承任使備牙門之將總帳下之兵耳目腹心臣當職分毫釐絲髮臣合知委而依阿從事曖昧居心㣥小用權臣不能規諫三軍潛怨臣不能警覺蒼黃之際遂成禍階十起之恩低回未報一朝之難逼迫見留白刃交前脫身無路謝安內舉竊效馳驅疏廣告歸獨乖隨從在臣情地何以自容雖早殄仇讐才雪家怨而自慚面目有負國恩豈謂降以殊私副茲重鎮上承朱邸之令下奉玉帳之謨權副九州地方千里在臣微眇難繼威聲豈臣竊賣舊勳謬膺殊澤撫心泣血何地自容特望聖恩察臣微懇選朝廷舊德副節度重權許臣歸骨關西死且不朽臣某言臣聞子之能仕父教之忠臣仕雖無聞忠冀盡力當陛下至理之日偶四方無事之時臣幸揚名清朝全節聖代於臣之分榮感多焉而罔極之心未遑省告伏以先臣墳墓遠在定州道路所經瞻馳靡及臣自入宿衛三十四年頃者師旅雖寧武臣分閫臣職叨禁近事絶私情宏覆之德靡所不容而兢懼之誠實難自盡空懷怵惕之感莫申展奠之儀今寰宇廓清憂疑必釋當天下交泰之際是人神叶吉之期臣寄重藩維不合上請今遣弟某官某專拜掃以道途所近便取北路赴定州輒披懇誠無任兢惶云云臣某言臣自出邊鄙素無才術頃因寇難纍效驅馳遂荷殊私謬膺重寄介於偏僻密邇寇讐備歷艱危得全節義遼陽移拔趙北掃除皆仗威靈非臣力致幸逢清廓輒自寬間麾下不虞舟中生變坐貽顛沛實愧無謀縱欲粉身於何塞責陛下念臣微效未即書刑許歸朝廷俾露誠懇王畿日近聖問荐臨雖承雨露恩深其若邱山罪重闕廷進對臣亦胡顏鈇金戊就誅甘當碎首謹於路側降服而囚且十年以來秉戎律者其於綏撫或有乖方不待刑章蔽於部曲隱而不數斯輩亦多臣以負罪雖同免罹其禍幸全腰領伏俟天誅臣之為榮死亦不朽臣無任懇欵之至臣某言奏事官蘇翼回伏奉聖造答表勒臣即復章綬速赴闕庭捧讀震驚心魂爽越臣某中謝臣智謝統戎罪深負國本期死所翻荷生成恩承主偏法為臣屈回謝九原之路仰銜再造之功拜命之初不勝抃躍臣即匍匐拜謝闕庭無任感戴抗平州人官京掾理天地者陰陽統邦國者文武才得其位政由其理則元后作聖九有以寧其或紐暫解而復維運偶否而終泰是以周十世而生方叔唐八葉而傳太傅保乂藩服昭宣王度嘉言大猷鬱為國楨太傅諱承嗣其先有媯之後自敬仲奔齊五代而昌因采田而氏焉異才茂德繼踵而至其後議郎疇哭劉虞墓讓盧龍勳義聲洋洋焯於古今公則議郎之裔今為北平人也曾祖堪隋州從事祖璟皇鄭州別駕烈考守義皇安東副都護贈戶部尚書皆恭肅明哲純懿貞良纂邁德之仁傳有後之慶公則尚書之草六子也元和間生其德直方剛毅中正根於天常鍾海嶽之靈抱清淳之氣幼尚擊劍長而事邊度山川之險易計戎狄之勇怯沉機潛運藏用待時開元中林胡犯邊公始以兵術聞節將急而求公乃假公平盧先鋒使即日以偏師敵之公大破夷落斬首萬計朔漠之人恃公為雄戎帥以捷聞特拜公左武衛郎將策殊勳也仍前平盧先鋒使擒俘斬首一月三捷戎陬氣懾邊徼塵清改左武衛中郎將遷左清道率拜左武衛將軍昭武功也天寶季年逆帥安祿山竊幽陵之甲以叛驅劫忠良易其守心跖犬吠主大肆凶逆料天下敵已唯公一人遂乃臨以刀鋸邀其質任爰授兵要置之腹心公迫以凶威計無從出竊謂所知曰昔龔勝閉口君房殺身無補於時自擠溝壑乃呼天飲泣忍死從權將圖不朽之勳以顯大忠之節時寇陷洛陽遐邇震駭大縱虜奪以弭凶徒唯公禁戢屬兵託以戒嚴他盜時大雪滿營間無徑術逆帥巡行諸部躬自勞寒至公之營疑其無人公乃介胄轅門出卒羅拜閲數伍籍不缺一人逆亂之徒尤加敬憚爰及刑獄取決於公寇逆亂常法令苛慘織辭詆告每陷忠良皆以阿旨入法為已誠察理辨情為携二公將謀知免且欲雪冤每至議讞必歸情實至於免鼎鑊脫桎梏者不可勝數冀其違忤稍見疏遠而逆帥以為平允得當仁德歸厚信重獎助又倍於常其後賊亂蜂起互相吞戮祿山流膏安慶絶凶思明陷刃朝義傳首羿浞既平日月貞明公雲龍交感霖雨將作誓爾有衆同歸聖朝誠意克從大節斯立時代宗在宥天下降衷於人載覽歸欵特加誠順即日除戶部尚書御史大夫莫州刺史復以莫州地褊不足安衆特遷魏州刺史貝博滄瀛等州防禦使公榮懼感泣澘然涕流荷天之休誓答元造中以狀聞上收其忠錫以旄鉞真拜魏博等州節度觀察處置等使初懷恩之討朝義也深結歸命之帥陰有將叛之心及恃功不虔造節方兆虎據汾晉寇於太原乃分使河朔連扇㣥帥邀我同惡示以師期㣥帥獻欵决計於公公曰吾儕所以修睦僕固者將欲藩翰王室懷寧遠邇竭股肱之力報亭育之恩乃玩兵左道自任姦慝有死而已吾蔑從之俱精練成師以順王命臣子之職也由是㣥帥感悟率德相從械繫行人顯與之絶暨聲問達於四境干紀之師索然氣奪是以懷恩喪子於榆次棄甲於西河北走胡庭埋魂絶域抑有由也蹈危而正可謂文武三傑精剛百練者也惟帝念忠拜公尚書左僕射賞有功也遷大司空旌有德也初公之臨長魏郊也屬大軍之後民人離落閭閻之內十室九空公體達化源精潔理道宏簡易剗煩苛一年流庸歸二年田萊闢不十年間既庶且富教義興行魏自六雄升為五府拜公為魏州大都督府長史仍加實封一千戶以陟明也而緇黃耋耆詣闕陳乞請頌德裦政列於金石帝曰俞以命先臣門下侍郎王縉撰紀功烈錫魏人以碑之其明年請立生祠而尸祝之公執謙沖抑而勿許茂厥丕績秩遷太尉疇咨補職爰立作相公拜賜荷寵若墜泉谷誓將率先啓行斬伐不臣殄彼昆夷復我河湟然後挂冠都門告老歸第嗚呼有志不就昔人所痛致君之道未展大夜之期俄及大歷十三年春二月遘天倫之戚茹痛而疾秋九月甲午薨於戎府享年七十有五天子悼舟楫之沉覆邦人號榱棟之崩摧罷輟市朝哀慟中外諫議大夫蔣鎮冊贈太保臨弔賻禮有加等夫人富春孫氏齊莊之德備矣開越國之封列魚軒之貴降年不永先公即世其年十二月十四日得吉兆於魏州貴鄉縣金堤鄉吳河里之原遷夫人之殯歸同穴之期而祔焉禮也公孝敬忠信慈仁睦友造次顛沛一以貫之在家如嚴君撫人如慈父違其子而進猶子逾十起之愛傳八命之榮則宋穆不獨賢伯魚有慚德積載餘慶並時而昌允子十一人長子維皇魏州刺史次子朝左神武將軍知軍事檢校右散騎常侍兼御史大夫三子華皇太常少卿駙馬都尉尚永樂長公主永樂薨復尚新都長公主贈工部尚書四子繹皇試大理評事五子綸皇監察御史裏行七子繪八子純不幸早世九子紛皇河南參軍十子紳殿中侍御史內供事十一子縉殿中侍御史內供奉皆文武奕世忠孝傳家或至大官或階清級誕生檢校尚書右僕射同中書門下平章事駙馬都尉鴈門郡王襲實封五百戶贈司空緒則公之第六子也纂承鴻勳不忝前烈開戚里之貴繼茅土之封繡轂朱輪光輝日新聖朝覃孝理之恩軫聞鼙之念復追贈公太傅復贈魏州大都督相國蒸蒸孝思霜露增戚復以生祠故事具表上聞天子彰善崇德乃許追立爰命詞臣禮部侍郎呂渭徵撰休烈厥功茂焉相國生工部尚書兼魏州大都督府長史御史大夫充魏博相貝澶衛等州節度管內度支營田觀察處置等使季安繼踵象賢克荷丕構玉立氷潔孤高不㣥駸駸逸足長途萬里勳賢接武今古罕倫嗚呼開國承家之義顯矣翼子謀孫之道光矣沒而不朽非公而誰抗賓事戎麾出入三世目覩芳躅耳聆嘉聲不愧之詞誠非諂上敢刊樂石傳於無窮詞曰維嶽雄氣鍾於崆峒委和孕靈降生我公於惟我公其德崇崇處暗不昧在明則通其一運屬昌時功居顯位天子命我蒞於東魏榮傳曳履寵拜端揆乃領司空俄登太尉其二爰立作相俾屏我王訓節制師威不庭方為國之紀為人之綱教義聿修德音孔揚其三上天降災奪我元老邦國殄瘁誰云壽考梁木其壞嘉言是寶隴月阡松荒烟蔓草其四墮淚碑在生祠廟存澤流福子慶被孝孫日下甘棠風清德門刻此金石傳芳後昆其五
