front:
  text: 全唐文欽定全唐文卷三十七元宗十八
  hash: sha256:28dcbd51b378b01820b38d6a62f13697ff0426279887dd268243c3e3f1576c1f
body:
  text: 朕禮賢之志恨不同時旌善之懷何隔今古卿業崇啟迪功濟艱難盡人臣之忠節成天下之美事方接婚姻之禮長榮帶礪之族潤葉流根不足多謝朕頃賜扇聊以滌暑卿立賦之且見情素詞高理妙朕詳之久矣然佳彼勁翮方資利用與夫棄捐篋笥義不當也卿去歲禮闈擢授樞密實關政本將倚為相頃來升用是會宿心雖屬家艱巳踰年序不有至孝誰能盡忠若墨縗之義不行蒼生之望安在謂此情難奪豈成命可移比日行在佇卿促轡今既至止無勞固辭朕以非常用賢曷云常禮哀訴即宜斷表今日便上凡曰兄弟豈同他人況有疾疹自成憂迫不辭容髮致改且喜神心助人雖用靈方猶未痊平顧茲德薄實懷多慮所請宣示良或未然兄弟之喪人倫所重哀廢飲食禮訓有變雖欲自抑有如此情先聖說經激時立教文理一貫悟之不遠後來注解歧路增多既失本真動生疑誤朕恭承餘烈思有發明推校諸家因之詳釋庶童蒙是訓亦委曲其詞慮有未周故遍示積學竟無損益便請宣行朕之不才甘失旨於先帝卿等虛美豈不畏於後生循環此情未知所適可廣示朝廷有能正朕之失者具為條件錄姓名以聞當別加重賞事有難易因圖可否小蕃背誕惡貫巳盈人神廾之指期可滅今之克寸定偶會夙心記以史官銘之樂石頗矜功伐不願為之伯獻前請朕巳不納卿等苦論載用多媿使桓山之頌復在茲乎此經宗旨先離諸相解說者衆證以真空僧徒固請欲以宏教心有所得輒復䟽之今請頒行慮無所益初聞三輔之閒今歲善熟朕緣陵寢誠欲西行然積虛累年乍得小稔即又聚食所慮重難倘夏麥不登未免匱乏百姓不足朕孰與安所以再三疚懷欲去不忍至於宮苑所樂氣非宜苟得人安終不以此為念卿可宣前旨更俟後期所請遍示朝列及宣付史館亦屬煩也任卿等自商量道由先宗欽承餘慶所祈福力憑以真經歸謹至誠匪存名教所請者依狂賊遠來無能支久果自奔北不擾邊人豈朕獨見之明固在大臣良算所請宣付史館者依醜虜違方我之有待奔亡相次天實誅之鎮撫四夷故有賢相權宜一策何獨朕躬所賀知比未窮巢穴有慎佳兵果自猜攜人神所廾折衝樽俎遙可圖之所賀知用兵之上者修政於廟堂折衝千里之外此之謂也小寇適降復為翻動邊軍除翦有國常刑朕方事藉田而今獻捷當鑄劒㦸以為農器也兩蕃歸我因用御邊北虜猖狂欲有親率何則馳騁之騎突厥頗強弓矢之功契丹稱勁彼強也歷遠已弊此勁也襲近而摧勢自不敵況違天意廟堂良算亭障稜威故合而有成豈朕之獨斷所賀知東歸兩蕃不孤含育北制強虜且知威信自相攻伐稍警邊陲屢有奔亡非無逆順朕之早預故亦常圖今乃歸功得無同體死批朕臨御有年更事多矣天人之際先意後合此亦賊意可量非朕謀之必中將有可紀任付史館方隅蹔警乃圖其事不出意外且有殺傷雖復嘯聚邊城固應知難而退鼎臣參佐何獨朕躬所賀知朕以信撫遠蕃故當順以歸命去順為惡天何容之力屈計窮果自奔散卿等料其後事亦以當然所賀知藉田勸農勞酒成禮此時降雪神人以和是賴台臣致茲嘉應漢家用儒倚以為相卿等輔佐朕亦論思侍講說詩用符正道既至匡益特加章綬是先敦獎應會謀猷因斯行諸引進經術也所賀知過月不雨農事或諐是用責躬兼令省獄卿即同體共達乃誠天且不違穀麥皆遂若事關政令動必合符積久冤抑亦宜踈理宜成朕懷也所賀知雨以救旱忽致秋霖所慮害農彌深罪己明靈肸蠁遂與開霽實因誠至非謂德先時麥既登百穀有望亦卿等同體之效所賀知時愆膏雨至於節日以此之故初無宴私雖遵所請憂樂相半樂同和氣憂亦為陰因茲霈然若以誠應方收晚歲有同再熟與卿同慰也歲律方窮久無雨雪頃者信宿落而復收朕用責躬天實降鑒皓然竟夕將遍寰瀛固在卿等寬和所致也朕每念元元無忘夙夜頃來少雨是用精祈所見徵祥果成其應豈朕之德天實為之今則滂沱與卿等同慰請付史館者依一昨有司奏太陽當虧孰云交分亦繫休咎朕之薄德是用責躬應蝕不蝕且符至願昔漢家日蝕之變則舉賢良招直諫蓋思補過以荅其咎也曷若勤於未兆預以圖之招諫登賢以先天意當與卿等夙夜為心所請付史館者依朕欽藉元風緬懷道力上資宗廟下浸元元俾在潛通乃至昭覩愧畏相屬曷用當之願記史臣以彰降鑒豈朕所宜讓也所請者依朕親耕千畝卿等佐之謂之勤農期於盡力故園苑種麥別殿築場訓子勸人因之表奏粢盛薦寢是契夙心雲日告休易致昭感欲書諸史策卿實史官任斟酌事宜耳象物成文以行代教傳習寖遠疑誤增多不制其失孰云端本稍變條流因之指授且以相示竟無可否豈用茲小學而歸美乎餘依所請頃因節日會以萬方略舉三教未暇盡理復茲一集求之精義不許游詞用服其心以懲習俗況會三歸一初分漸頓理皆共貫使自求之卿等論道廟堂化源何遠事關風教任付史館不壞之法真常之性實在此經衆為難說且用稽合同異䟽決源流朕位在國王遠有傳法竟依羣請以道元元與夫孝經道經三教無闕豈茲祕藏能有探詳所賀知兒子等服勤師訓匪曰才能初為此文次令繕寫卿在左右因以呈示曾不箴規乃致推美將朝列得無愧乎道有默仙謂之形解古來既爾今亦將然童幼之年傷其夭促靈變之理乃入元真且與方外為心不比人閒結念所請書諸國史以襲元元卿亦史官任為凡例兼請宣示者並依先帝應期道光文武之業亦既廾代人畏軒轅之臺忝以丕承罔不夙夜每有啟悟形於動靜豈茲狂悖勞我神兵保祐實深戴賀增惕古之靈應未之前聞所請宣付史官并示朝列固其宜也並依卿早踐中書後牧邊郡因加此紱義在優賢今特賜卿猶前命也所謝知卿學府高標士林貞幹論思之地亦既優閒彌綸之司聊從應務別當獎擢何乃謙撝所謝知昔掌王言以宣國命頃來相習多事游詞卿舊在掖垣巳推才識及登書府備探微奧故有新命宜副朕心何所謙抑誰與宣誠卿之忠誠本於孝行亦既許國每懷安親爰請二弟近鄉就養申之孝友遞為隱犯用嘉此請故遂雅懷所謝知此職掄才十年虛位以卿達識所以酬庸斟酌朝經動關政本當茲密命宜喻朕懷所謝知歲比不登朕每勤止宮中閒處粟麥兼滋常嘉苗以近知遠亦既成熟實用慰心所以躬率諸子是芟是刈稼穡艱難取知為國之本宗廟致敬實謂思於所先既以薦新餘用分錫卿等同體固合共之所請宣付史館任量其宜也臘日所惠固其常耳信則微物亦有嘉名與卿共之何足為謝尺之為數陰陽象之宰臣匠物有以似之卿等謀猷非無法度因之比興以喻乃心盡力鈞衡深知雅意大臣作頌以揚休聲銘之琬玉亦資翰墨太子鴻書則非工身為國本將示於後因以命之無能發揮何所為謝卿之昆弟並著才能去歲所諭巳有處分既終祥縞宜列朝衣豈謂殊私雅符公議所謝知藉卿政事頃在纆縗今禮制巳過服用茲始少許衣物何足謝焉復緣講讀便與希烈未得付卿今過有稱揚豈成獻替所期勠力保合太和今付一本觀唱和之美也比年少雪遂罕秋成恐陰律愆期時無可望孰云禱久每事虔誠雨雪驟盈喜慰初集率爾成作書情而巳方示朝廷比來官宅隨事借人與卿寧居用加修飾巳有處分不煩讓也欲令師儉雖則卿心縱使增修其如國命況聞制度不是宏博大臣所處亦以為宜可擇日移入卿移孝於忠自家刑國誠有必盡義實可嘉人之同氣莫不相似念卿才識弟亦可知朕欲登賢俱在朝列而尚居哀紀願留主祭可以理奪用允所求待至縞祥非無後命不可復見惟餘孝思情禮所歸遠近無別卿當大任朝夕謀猷欲遂乃懷其如重寄既從奪禮安得顧私宜抑此情也天啟元符以賛鴻業朕誠薄德曷用當之既史冊是書而頌聲復起宗子固請遂及於茲卿之詞旨度越前輩曲成意義多所發揮實靈命之克彰因斯文之不朽朕之知卿非在今日君臣之際何有閒言故在增榮有以昭亮況卿令弟尚淪卑秩以公見授何謂私恩所謝知尊師跡參洞府心契沖冥故能詞省旨奧義博文精足以宏闡格言發明幽致朕恭承祖業式播元風覽此真筌深符夢想豈惟披翫無斁將以啟迪虛懷其所進之文用列於篇籍也得所進明照寶劒等含兩曜之暉稟八卦之象足使光延仁壽影滅豐城佩服多情慚式四韻省表具知師羽儀碧落梁棟元門迹雖繫於人閒神自超於物累方欲受三清之要宣六氣之和資於朕躬助以為政且光慶之義衆妙所存江海之心此期難允即宜斷表深體朕懷靈祇應夢厥疾全瘳烈士除妖實須稱獎因圖異狀須顯有司歲暮驅除可宜徧識以祛邪魅兼靜妖氛仍告天下悉令知委夫頌者美盛德之形容每省朕躬曷稱奇紀歲月斯積符瑞屢臻欲備敘之復茲誠請實賴人事不遺神明允來意也卿立廟之時此地閒僻今傍江修築舉國勝游與卿同之須避喧雜事資改作遂令官司承以拆除終須結搆巳有處分無假致辭卿等思致君堯舜欲加號聖文朕內省虛懷安敢當此又太宗睿宗皆有聖謨纂承祖號安敢同稱幸體朕懷宜斷來表聖文之名稱號所極卿等致君堯舜亦宜導以沖撝超駕前王彌增夕惕豈朕好譽之心內致自矜之色外形招此假詞以相虛美靜思反照撫事求心詩云我心匪石不可轉也幸悉所守即斷來章惟聖與文洪名極稱內省虛缺安敢冒承匪石之心巳具前答方與卿等上調元氣下遂蒼生政削浮華化歸敦樸升崇高之號去滿假之端勉建皇極以迎天祐悉此至言宜斷來表者德之本教之所由生也故親自訓注垂範將來今石臺畢功亦卿之善職覽所進本深嘉用心兇逆亂常侵侮中夏潼關失守京國不寧朕因涉岐梁至於巴蜀遂命皇帝肇登寶歷爰靖妖氛今官軍益振回紇効款即擬南行共為翦滅卿忠惟奉國孝則保家懷不二之心秉難奪之操皇帝累申寵命兼以崇班宜有懋於深功一作宮且用光於重守門下朕昔在藩國此維邸第乾坤未泰陰陽尚蒙則有神物效靈祥符肇貺飛嘉氣於在田之際湧瑞池於或躍之時惟此舊居式加新宇周牆僅板於百堵卑宮不階於三尺棟梁之用毀撤所餘聊以紀天地之休徵貽子孫之儉約耳屬春令變始時惟發生萬國來朝千官入賀既稱觴以獻壽宜施惠以布德況農桑在稼穡正興或幽彼囹圄獨隔陽和之澤或迫於徭役不遂農桑之務言及於此軫歎良深其徒巳下罪且令責保其應當番兵丁匠等灼然單貧者所由勘會並放營農所在訴訟長官隨事䟽理勿使冤滯非軍國所要餘不急之務一切並停仍加勸課循植農穡其河北水損戶既屬春事慮有乏絕不支濟者宜委使與州縣相度量加賑恤諸處行人之家及鰥寡惸獨不能自存者州縣長官親加優撫使得存濟應有差科量事矜放且宣風緝化職在令長有司銓藻之次特宜審擇其才惟德與刑為政之要頃無聞於風化多取威於檟楚理人之道其若是乎愚昧之流或輕抵犯宜加曉諭使識章程其含生之類不敢輒有屠殺天下捕獵亦宜禁斷仍嚴加捉搦百司各遵時令務宏寬大之典使政理無私稱朕意焉
