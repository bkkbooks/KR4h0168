front:
  text: 全唐文欽定全唐文卷一百二十八行密字化源廬州合肥人自廬州刺史纍遷淮南節度使乾寧二年表請討朱全忠加檢校太傅同中書門下平章事封宏農郡王四年授江南諸道行營都統擊敗全忠於淮水遂全有江淮之地光化三年加侍中天復二年拜東面行營都統中書令進封吳王天祐二年十一月薨年五十四諡武忠子溥僭稱帝追尊為太祖武皇帝廟號太祖
  hash: sha256:9a6d4edb95501a727be9c606fb1de74bc352623115c34fc487de305c3b6f6cc8
  markers:
  - {type: head, offset: 14, content: 吳王楊行密, id: KR4h0168_NFKB_128-h1, level: 1}
body:
  text: 敕淮南觀察使東南諸道行營都統牒左押衙充右弩隊都指揮使溧陽洛橋鎮遏使知茶鹽榷麴務銀青光祿大夫檢校刑部尚書兼御史大夫上柱國史實牒奉處分前件官譽馳鄉里才達變通禦邊徼以多能緝兵戎而有術加以洞詳稼穡善撫蒸黎賦輿深見其否臧案簿窮知其利病以久無宰字尤藉招攜俾分兼領之榮庶養新歸之俗儻聞報政別議酬勞事須差兼知溧陽縣事準狀牒舉者故牒天復三年十一月九日牒使檢校太師守中書令吳王押溥行密幼子初封丹陽郡公後繼兄渭僭僞號晉天福二年遜位於李忭忭遷溥於潤州年餘以幽死詢諸贈典繫乃彞章啓有厥由豫何不舉故淮浙宣歙管內道門威儀逍遙大師問政先生為國焚修大德賜紫聶師道早通元理夙契真風野鶴不羣孤雲自在昔太祖創基之際巳命焚修及元勳匡國之初早曾瞻敬眷言素業實冠元關雖升遐屢歷於光陰而遺懿益隆於寰宇況教門上請台輔奏陳且將啓元墟即回故里是用加之峻秩錫以崇階式表休恩庶昭往行可贈銀青光祿大夫鴻臚卿問政先生忭字正倫本姓李徐州人幼孤養於徐溫遂冒姓徐氏名知誥吳天祐中自元從指揮使遷升州防禦使纍遷檢校太保潤州團練使朱瑾殺溫子知訓知誥以州兵入廣陵定亂遂代知訓為淮南節度行軍副使內外馬步都軍副使武義元年拜左僕射參知政事順義元年加同平章事領江州觀察使溫死加都督中外諸軍事封潯陽公改封豫章公太和三年以太尉中書令領鎮海寧國諸軍節度使出鎮金陵天祚元年加尚父太師大丞相天下兵馬大元帥進封齊王三年受吳禪即皇帝位國號大齊尋改號唐改元升元復姓李氏更今名七年二月殂年五十六僭諡光文肅武孝高皇帝廟號烈祖比者干戈相接人無定主地易而弗藝桑隕而弗蠶衣食日耗朕甚憫之其嚮風面內者有司計口給食願耕植者授之土田仍復三歲租役於嘻仁不異遠化無泄邇其務宣流以稱朕意禮莫重於享帝孝莫大於隆親事實重大承以輕眇可謂無其德而用其事祗加畏焉於嘻爾公爾侯各揚厥職不供乃事國有常典朕以眇躬託於民上常懼弗類以墜高祖太宗之遺業羣公卿士顧欲舉上尊號之禮朕甚不取其勿復以聞右僕射兼中書侍郎同平章事監修國史李建勳幸處台司且聯戚里靡循紀律敢黷彞章其罷歸私第前朝失御強梗崛起大者帝小者王不以兵戈利勢弗成不以殺戮威武弗行民受其弊蓋有年也或有意於息民者尚以武人用事不能宣流德化其宿學巨儒察民之故者嵁巖之下往往有之彼無路光亨而進以拊傴為嫌退以清寧為樂則上下之情將何以通易之政將何所議乎昔漢世祖數年之閒被堅執鋭提戈斬馘一日晏然而兵革之事雖父子之親不以一言及之則兵為民患其來尚矣今唐祚中興與漢頗同而眇眇之身坐制元元之上思所以舉而錯之者煢煢在疚罔有所發三事大夫可不務乎自今宜舉用儒者以補不逮孤始任義方以風憲乃能力振朝綱辭皆讜切可宣示朝野賜義方衣一襲以旌直言乃公乃侯越百執事欽承嗣命命爾保元子璟祗肅天鑒社稷宗廟永有終我不敢知曰其基永昌我亦不敢知曰墜命罔後天不爾諶祐於有德厥位艱哉景本名璟字伯玉先主忭長子年十歲官駕部郎中纍進諸衛將軍拜司徒平章事知中外諸軍事都統先主受禪封吳王徙封齊王為諸道兵馬大元帥先主殂襲位改元保大十三年周世宗南侵遣使請奉正朔不許中興元年周再南侵表請獻江北郡縣避周諱更今名下令去帝號奉正朔顯德七年宋受周禪遣使如宋賀即位建隆二年六月殂年四十六告哀於宋請追復帝號僭諡明道崇德文宣孝皇帝廟號元宗春秋日食地震星孛木冰感召靡爽比災異頻仍豈人君不德以致之耶抑亦天心仁愛而譴告之也朕甚惕焉曩者兵連閩越武夫悍將不喻朕意務為窮黷以至父征子餉上違天意下奪農時咎將誰執在豫一人其大赦境內窮民無告者咸賜粟帛嵩嶽降靈誕生良弻佐我先朝施及朕躬尚賴保釐砥於成績乃遽爾請罷豈朕不能優禮勳舊而致然也昔蕭何守巴蜀高祖無西顧之患寇恂守河內光武無分民之嫌今任公以何恂之事宜強飯扶力以副朕意於嘻國之安危惟茲淮甸慎始成終非公而誰所請宜不允臣聞捨短從長乃推通理以小事大著在格言實徵自古之來即有為臣之禮既逢昭代幸履良途伏惟皇帝陛下體上聖之姿膺下武之運協一千而命世繼八百以卜年化被區中恩加海外虎步則時欽英主龍飛則圖應真人臣僻在一方謬承餘業比徇軍民之欲乃居后辟之崇雖仰慕華風而莫通上國伏自初勞將帥遠涉封疆敘寸誠則去使甚艱於閒路則單函兩獻載惟素願方俟睿慈遽審大駕天臨六師雷動猥以遐陬之俗親為跋履之行循省伏深兢畏無所豈因薄質有纍蒸人伏惟皇帝陛下義在寧民心惟庇物臣倘或不思信順何以上協寬仁今則仰望高明俯存億兆虔將下國永附天朝巳命邊城各令固守見於諸路皆俾戢軍仰期宸旨才頒當發專人布告伏冀詔虎賁而歸國巡雉堞以回兵萬乘千官免驅馳於原隰地征土貢常奔走於歲時質在神明誓於天地庶使闔境荷咸寧之德大君有光被之功凡在照臨孰不歸慕謹令翰林學士戶部侍郎臣鍾謨工部侍郎文理院學士臣李德明奉表以聞仍進金器一千兩銀器五千兩錦綺綾羅二千匹及御衣犀帶茶茗藥物等又進犒軍牛五百頭酒二千石伏自上將遠臨六師尋至始貢書於閒道旋奉表於行宮虔仰天光實祈睿旨伏聞朝陽委照爝火收光春雷發音蟄戶知令惟變通之有在則去就以斯存所以徘徊下風瞻望時雨載傾捧日輒敘攀鱗伏惟皇帝陛下受命上元門階中立仗武功而戡亂略敷文德以化遠人故得九鼎慶基復昌於寶位十年嘉運允正於璿衡實帝道之昭融知真人之有立臣幸因順動敢慕文明特遣翰林學士尚書戶部侍郎臣鍾謨尚書工部侍郎文理院學士臣李德明同奉表章且申獻贄請從臣事仍備歲輸冀闔境之咸寧識人君之廣覆不遙日下恭達御前既推向化之誠更露繇衷之願臣伏念天祐之後率土分摧或跨據江山或革遷朝代皆為司牧各拯黎元臣繇是克嗣先基獲安江表誠以瞻烏未定附鳳何從今則青雲之候明懸白水之符斯應仰祈聲教俯被遐方豈可遠動和鑾上勞薄伐有拒懷來之德非誠信順之心臣自遣鍾謨李德明入奏天朝具陳懇款便於水陸皆戢兵師方冀寬仁下安億兆旋進歷陽之旌斾又屯隋苑之車徒緣臣既寫傾依悉曾止約令罷警嚴之備不為捍禦之謀其或皇帝陛下未息雷霆靡矜葵藿人當積懼衆必貪生若接前鋒偶成小競在其非敵固亦可知但以無所為圖出於不獲必於軍庶重見傷殘豈唯瀆大君亭育之慈抑乃增下臣咎釁之責進退維谷夙夜靡遑臣復思東則會稽南惟湘楚盡承正朔俾主封疆自皇帝陛下允屬天飛方知海納雖無外之化徒仰祝於皇風而事大之儀闕卑通於疆吏惟憑元造猥念後期方今八表未同一戎茲始倘或首於下國許作外臣則柔遠之風其誰不服無戰之勝自古獨高臣幸與黎人共依聖政蚩蚩之俗期息於江淮蕩蕩之風廣流於華裔永將菲薄長奉欽明白日誓心皇天可質虔輸肺腑上祈冕旒仰俟聖言以聽朝命今遣守司空臣孫晟守禮部尚書臣王崇質部署宣給軍士物上進金一千兩銀十萬兩羅綺二千匹臣叨居舊邦獲嗣先業聖人有作曾無先見之明王祭弗供果致後時之責六龍電邁萬騎雲屯舉國震驚羣臣惴悚遂馳下使徑詣行宮乞停薄伐之師請預外臣之籍天聽懸邈聖問未回通宵九驚一食三嘆繇是繼飛密表再遣行人敘江河羡海之心指葵藿向陽之意皇帝陛下自天生德命世應期含容每法於方輿亭育不遺於下國先令副介密導宸慈綸旨優隆乾文炳煥仰認懷來之道喜則可知深惟事大之言服之無斁臣聞盟津初會仗黃鉞以臨戎銅馬既歸推赤心而服衆一則顯周君之雄武一則表漢后之仁慈用能定大業於一戎紹洪基於四百兼資具美允屬聖君伏惟皇帝陛下量包終古聖合上元子育黎民風行號令以其執迷未復則薄賜徂征以其向化知歸則俯垂信納仰荷含容之施彌堅傾附之念然以淮海遐陬東南下國親勞翠蓋久駐王師以是憂慚不遑啓處今既六師返斾萬乘還京合申解甲之儀粗表充庭之實但以自經保境今巳纍年供給既繁困虛頗甚曾無厚幣可達深誠然又思內附巳來聖慈益厚雖在照臨之下有如骨肉之恩縱悉力以貢輸終厚顏於微鮮今有少物色以備宣給軍士謹遣左僕射平章事臣馮延巳給事中臣田霖部署上進臣聞聖人制禮重尊奬之心王者會朝宗燕享之事是以此日輒薦微誠竊以臣幸能迷復方認懷來決心既嚮於皇風注目每瞻於清蹕伏自陪臣入奉帝誥薦臨頓安下國之生靈俱荷大君之化育雖復尋令宰輔專拜冕旒少傾貢奉之儀仰答含容之德然臣靜思內附欣奉至尊既推示其赤心又迥隆於乃眷豈將常禮可表深衷是以別命使臣更伸誠懇俾展犒師之禮仍陳買宴之儀躬詣行朝聊資高會庶盡傾於臣節如得面於天顏伏惟皇帝陛下承天子民溥恩廣施四海識真人之應萬方知王澤之深固以包括古今絲綸典則盛矣美矣無得而稱凡仰照臨孰不歡悅今遣客省使臣尚全恭專詣行闕進獻犒軍買宴物色臣幸將下國仰奉聖朝特沐睿慈俯垂開納巳陳鮮禮請展御筵因思盡竭於深衷是敢別陳於至懇伏以柏梁高會宸極居尊朝臣咸侍於冕旒天樂盛張於金石莫不競輸庭實齊獻壽杯而臣僻處遐陬迥承乃眷雖心存於魏闕奈日遠於長安無繇親咫尺之顏何以罄勤拳之意遂令戚屬躬拜殿庭庶代外臣獲參執事納忠則厚致禮甚微誠慙野老之芹願獻華封之祝謹差臨汝郡公臣徐遼部署宴上進獻物色詣闕臣謬承先業僻在一隅不識天命得罪上國困而後伏何足可多許以不亡臣之幸也豈意皇帝陛下辱異常之顧垂不世之私外雖君臣內若骨肉殊恩異禮無得而言退日揣循何階及此且古人有一飯之恩必報臣竊慕之故自結髮巳來未嘗敢輕受人惠雖往事君父亦嘗以退讓自居不圖今辰頓受殊遇此臣所以朝夕慙恨恐上報之無從也然天地之功厚矣父母之恩深矣而子不謝恩於父人且何報於天以此思之則惟有赤心可酬大造況臣嘗嗟世網別貯素懷方以子孫託於陛下區區之意可勝言哉兼臣比乞鍾謨過江蓋有情事上告鍾謨又巳奉聖旨許其放回伏乞才到京師即令單騎歸國庶於所奏早奉敕裁瞻望冕旒不勝懇禱臣聞天秩有禮位巳定於高卑王者無私事必循於軌轍倘臣下稍踰名分則朝廷實紊等夷情所難安理須上訴竊以臣比承舊制有昧先機勞萬乘之時巡方傾改事慶千年之嘉會固巳知歸伏惟皇帝陛下稟上聖之姿有高世之行囊括四海澤潤生民明目達聰道均有截東征西怨化被無垠巳觀混一之期即仰登封之盛而臣爰從款附屢奉德音陛下煦嫗情深優容義切全却藩方之禮惟頒咫尺之書粵在事初便知恩遇向者未遑堅讓今茲敢瀝至誠且臣頃以德薄道乖時危事蹙獻誠以奉陛下請命以庇國人獲保先基賜之南服莫大之惠曠古未聞微臣退思所享巳極豈於殊禮可以久當伏乞皇帝陛下深鑒卑衷終全舊制凡回誥命乞降詔書庶無屈於至尊且稍安於遠服乃心懇禱無所寄言先因河府李守貞求援又聞大國沿淮屯軍當國亦於境上防備昨聞大朝收軍當國尋巳徹備其商旅請依舊日通行願陳兄事永奉鄰歡設或俯鑒遠圖下交小國悉班卒乘俾乂蒼黔慶雞犬之相聞奉瓊瑤以為好必當歲陳山澤之利少助軍旅之須虔俟報章以答高命道塗朝坦禮幣夕行煜字重光初名從嘉嗣主景第六子封安定郡公進封鄭王徙吳王以尚書令知政事宋建隆二年嗣主南遷立為太子監國嗣主殂襲位更今名開寶七年宋師南征八年金陵陷肉袒降於軍門封違命侯太平興國初改封隴西郡公三年七月薨年四十二贈太師封吳王臣本於諸子實愧非才自出膠庠心疏利祿被父兄之蔭育樂日月以優游思追巢許之餘塵遠慕夷齊之高義既傾懇悃上告先君固非虛詞人多知者徒以伯仲繼沒次第推遷先世謂臣克習義方既長且嫡俾司國事遽易年華及乎暫赴豫章留居建業正儲副之位分監撫之權懼弗克堪常深自勵不謂奄丁艱罰遂玷纘承因顧肯堂不敢滅性然念先世君臨江表垂二十年中閒務在倦勤將思釋負臣亡兄文獻太子從冀將從內禪巳決宿心而世宗敦勸既深議言因息及陛下顯膺帝籙彌篤睿情方誓子孫仰酬臨照則臣向於脫屣亦匪邀名既嗣宗祊敢忘負荷惟堅臣節上奉天朝若曰稍易初心輒萌異志豈獨不遵於祖禰實當受譴於神明方主一國之生靈遐賴九天之覆燾況陛下懷柔義廣煦嫗仁深必假清光更逾曩日遠憑帝力下撫舊邦克獲宴安得從康泰然所慮者吳越國鄰於敝土近似深讎猶恐輒向封疆或生紛擾臣即自嚴部曲終不先有侵漁免結釁嫌撓干旒扆仍慮巧肆如簧之舌仰成投杼之疑曲搆異端潛行詭道願回鑒燭顯諭是非庶使遠臣得安危懇臣猥以幽孱曲承臨照僻在幽遠忠義自持唯將一心上結明主比蒙號召自取愆尤王師四臨無往不克窮途道迫天實為之北望天門心懸魏闕嗟一城生聚吾君赤子也微臣薄軀吾君外臣也忍使一朝便忘覆育號咷鬱咽盍見捨乎臣性實愚昧才無異稟受皇朝奬與首冠萬方奈何一日自踵蜀漢不臣之子同羣合類而為囚虜乎貽責天下取辱祖先臣所以不忍也豈獨臣不忍為亦聖君不忍令臣之為也況乎名辱身毀古之人所嫌畏者也人所嫌畏臣不敢嫌畏也惟陛下寬之赦之臣又聞鳥獸微物也依人而猶哀之君臣大義也傾忠能無憐乎倘令臣進退之跡不至醜惡宗社之失不自臣身是臣生死之願畢矣實存沒之幸也豈惟存沒之幸也實舉國之受賜也豈惟舉國之受賜也實天下之鼓舞也皇天后土實鑒斯言昨因先皇臨御問臣頗有舊人相伴否臣即乞徐元楀元楀方在幼年於箋表素不諳習後來因出外問得劉鋹曾乞得廣南舊人洪侃今來巳蒙遣到徐元楀其潘慎修更不敢陳乞所有表章臣且勉勵躬親臣亡國殘骸死亡無日豈敢別生僥覬干撓天聰只慮章奏之閒有失恭慎伏望睿慈察臣素心秋山的翠秋江澄空揚帆迅征不遠千里之子于邁我勞如何夫樹德無窮太上之宏規也立言不朽君子之常道也今子藉父兄之資享鍾鼎之貴吳姬趙璧豈吉人之攸寶矧子皆有之矣哀淚甘言實婦女之常調又我所不取也臨歧贈別其唯言乎在原之心於是而見噫俗無獷順愛之則歸懷吏無貞汚化之可彼此刑唯政本不可以不窮不親政乃民中不可以不清不正執至公而御下則憸佞自除察薰蕕之稟心則妍媸何惑武惟時習知五材之難忘學以潤身雖三餘而忍捨無酣觴而敗度無荒樂以蕩神此言勉從庶幾寡悔苟行之而願益則有先王之明謨具在於緗帙也嗚呼老兄盛年壯思猶言不成文況歲晚心衰則詞豈逮意方今涼秋八月鳴桹長川愛君此行高興可盡況彼敬亭溪山暢乎遐覽正此時也玉斚澄醪金盤繡糕茱房氣烈菊蕊香豪左右進而言曰維芳時之令月可藉野以登高矧上林之伺幸而秋光之待褒乎余告之曰昔時之壯也情槃樂恣歡賞忘勞悁心志於金石泥花月於詩騷輕五陵之得侶陋三秦之選曹量珠聘伎紉綵維艘被牆宇以耗帛論邱山而委糟豈知忘長夜之靡靡纍大德於滔滔愴家艱之如燬縈離緒之鬱陶陟彼岡矣企豫足望復關兮睇豫目原有鴒兮相從飛嗟豫季兮不來歸空蒼蒼兮風淒淒心躑躅兮淚漣洏無一歡之可作有萬緒以廠田坴悲於戲噫嘻爾之告我曾非所宜天長地久嗟嗟蒸民嗜欲既勝悲歎糾紛緣情攸宅觸事來津資盈世逸樂鮮愁殷沈烏逞兔茂夏凋春年彌念曠得故忘新闕景頽岸世閲川奔外物交感猶傷昔人詭夢高唐誕誇洛浦搆屈平虛亦憫終古況我心摧興哀有地蒼蒼何辜殲豫伉儷窈窕難追不祿於世玉潤珠融殞然破碎柔儀俊德孤映鮮雙纖穠挺秀婉孌開揚艷不至冶慧或無傷盤紳奚戒慎肅惟常環珮爰節造次有章含顰發笑擢秀騰芳鬢雲留鑒眼彩飛光情瀾春媚愛語風香王褱姿稟異金冶昭祥婉容無犯均教多方茫茫獨逝捨我何鄉昔我新昏燕爾情好媒無勞辭筮無違報歸妹邀終咸爻協兆俯仰同心綢繆是道執子之手與子偕老今也如何不終往告嗚呼哀哉志心既達孝愛克全殷勤柔握力折危言遺情眄眄哀淚漣漣何為忍心覽此哀編絶艷易凋連城易脆實曰能容壯心是醉信美堪餐朝饑是慰如何一旦同心曠世嗚呼哀哉豐才富藝女也克肖采戲傳能奕棋逞妙媚動占相歌縈柔調茲鼗爰質奇器傳華翠虬一舉紅袖飛花情馳天際思棲雲涯發揚掩抑纖緊洪奢窮幽極致莫得微瑕審音者仰止達樂者興嗟曲演來遲破傳邀舞利撥迅手吟商逞羽制革常調法移往度翦遏繁態藹成新矩霓裳舊曲韜音淪世失味齊音猶傷孔氏故國遺聲忍乎湮墜我稽其美爾揚其祕程度餘律重新雅製非子而誰誠吾有類今也則亡永從遐逝嗚呼哀哉該茲碩美鬱此芳風事傳遐祀人難與同式瞻虛館空尋所蹤追悼良時心存目憶景旭雕甍風和繡額燕燕交音洋洋接色蝶亂落花雨晴寒食接輦窮歡是宴是息含桃薦實畏日流空林雕晚籜蓮舞疏紅烟輕麗服雪瑩修容纖眉範月高髻淩風輯柔爾顏何樂靡從蟬響吟愁槐凋落怨四氣窮哀萃此秋宴我心無憂物莫能亂絃爾清商艷爾醉盼情如何其式歌且宴寒生蕙幄雪舞蘭堂珠籠暮捲金爐夕香麗爾渥丹婉爾清揚厭厭夜飲豫何爾忘年去年來殊歡逸賞不足光陰先懷悵怏如何然巳為疇曩嗚呼哀哉孰謂逝者荏苒彌疏我思姝子永念猶初愛而不見我心燬如寒暑斯疚吾寧御諸嗚呼哀哉萬物無心風烟若故惟日惟月以陰以雨事則依然人乎何所悄悄房櫳孰堪其處嗚呼哀哉佳名鎮在望月傷娥雙眸永隔見鏡無波皇皇望絶心如之何暮樹蒼蒼哀摧無際歷歷前歡多多遺致絲竹聲悄綺羅香杳想渙乎忉怛恍越乎悴憔嗚呼哀哉歲云暮兮無相見期情瞀亂兮誰將因依維昔之時兮亦如此維今之心兮不如斯嗚呼哀哉神之不仁兮斂怨為德既取我子兮又毀我室鏡重輪兮何年蘭襲香兮何日嗚呼哀哉天漫漫兮愁雲曀空曖曖兮愁烟起蛾眉寂寞兮閉佳城哀寢悲氛兮竟徒爾嗚呼哀哉日月有時兮龜蓍既許簫笳淒咽兮旗常是舉龍輀一駕兮無來轅金屋千秋兮永無主嗚呼哀哉木交枸兮風索索鳥相鳴兮飛翼翼弔孤影兮孰我哀私自憐兮痛無極嗚呼哀哉夜寤皆感兮何響不哀窮求弗獲兮此心隳摧號無聲兮何續神永逝兮長乖嗚呼哀哉杳杳香魂茫茫天步抆血撫櫬邀子何所苟雲路之可窮冀傳情於方士嗚呼哀哉善法書者各得右軍之一體若虞世南得其美韻而失其俊邁歐陽詢得其力而失其溫秀褚遂良得其意而失其變化薛稷得其清而失於拘窘顏真卿得其筋而失於粗魯柳公權得其骨而失於生獷徐浩得其肉而失於俗李雍得其氣而失於體格張旭得其法而失於狂獻之俱得之而失於驚急無蘊藉態度
