front:
  text: 全唐文欽定全唐文卷五百七十七柳宗元九
  hash: sha256:694b5caaa29cdf4a52fce50ee9a152e3a2ef7c1938d55542d4196c220472847c
body:
  text: 當管奉詔與諸管齊進誅討邕管草賊黃少卿漢軍馬步等若干人各具兵馬數及軍將若干前牒奉處分竊以天啟昌期大功畢集神開興運微惡盡除黃少卿等歷稔逋誅舉宗肆暴恃狡兔之穴跧伏偷安憑孼狐之邱跳踉見怪以為威弧不射天網可逃侵逼使臣隳犯王略恣其毒虐速我誅鋤敵國盡在於舟中還師已期於席上謂宜投戈頓顙面縛乞身歸郡邑於王官效黎獻於天吏而乃繕兵補卒增壘閉途正當天討之辰更積鬼誅之罪眾輕鬬蟻勇劣怒蛙纖縞當強弩之初孤豚僨肥牛之下事同拾芥力易摧枯杪忽蜂腰虛見辱於齊斧突梯鼠首濫欲寄於旄頭勦絕有時不索何獲某拱稽致命執銳忘生車甲既備於小戎鯨鯢豈逃於誅戮竊觀上略總制中權戰士義激於身心列校勢成於臂指蹶張之技盡出於山林拔距之材徧徵於川洞賞懸香餌令布疾雷莫不鼓舞戎行虔恭師律投軀不愆於羽檄跂足唯俟於牙璋今月某日奏事官米蘭迴捧受詔命神飛首勇足蹈心馳懽聲洽於萬夫勝氣橫於千里國容不入屨且及於寢門家事勿關土已填於左闔即以月日全軍出次分道並進所期戮力敢告同心孔大夫貞直冠時清明格物全體許國一心在公兵精食浮為日固久容府陽中丞以義烈為己任勳襲太常安南李中丞以英武為家風業傳彞器並膺邦寄克達皇威南則浮海濟師共集堂堂之陣東則橫江誓眾用成善善之功以此鼓行坐觀盡敵刑惟勿喜誅有可哀徵側之勇冠一方竟就伏波之戮呂嘉之威行五嶺終摧下瀨之師嗟此陋微自貽禽滅勉成良畫速致殊勳雖荒徼之地固不勞於有征而昇平之年將自此而何事書之竹帛實謂揚名事須移牒鄰管以成犄角舉牒者傳曰詩書執禮禮不執則不行自開元制禮大臣諱避去國恤章而山陵之禮遂無所執世之不學者乃妄取預凶事之說而大典闕焉由是累聖山陵皆摭拾殘缺附比倫類已乃斥去其後莫能徵永貞元和間天禍仍遘自崇陵至於豐陵不能周歲司空杜公由太常相天子一作天下連為禮儀使擇其寮以備損益於是河東裴瑾以太常丞隴西辛祕以博士用焉內之則攢塗祕器象物之宜外之則復土斥上一無斥上二字因山之制上之則顧命典冊與文物以授萬一作方國下之則制服節文頒憲則以示四方由其肅恭禮無不備且苞并總統千載之盈縮羅絡旁午百氏之異同搜揚翦截而畢得其中顧問關決而不悖於事議者以為司空得其人而邦典不墜裴氏乃悉取其所刊定及奏復於上辨列於下聯百執事之儀以為崇豐二陵集禮藏於太常書閣君子以為愛禮而近古焉昔韋孟以詩禮傳楚而郊廟之制卒正於元成鄭元以箋註師漢而禪代之儀卒集於小同賈誼以經術起而嘉最好學盧植以儒學用而諶為祭法舊史咸以為榮今裴氏太尉公以禮匡義嗣侍中公以禮議封禪祠部公以禮承大事大理公以禮輔東宮而瑾也以禮奉二陵又能成書以充其闕其為愛禮近古也源遠乎哉瑾字封叔其伯仲咸以文學顯於世大理之兄正平節公以儀範成家道以文雅經邦政今相國郇公其宗子也郇公以孝友勤勞揚於家邦遊其門若聞韶濩入其廟如至鄒魯恩溢乎九族禮儀於他門則封叔之習禮也其出於孝弟歟成書也其本於忠敬歟由於家而達於邦國其取榮於史氏也果矣左右史混久矣言事駁亂尚書春秋之旨不立自左邱明傳孔氏太史公述歷古今合而為史記迄於今交錯相糺莫能離其說獨左氏國語紀言不參於事戰國策春秋後語頗本右史尚書之制然無古聖人蔚然之道大抵促數耗矣而後之文者寵一作襲之文之近古而尤壯麗莫若漢之西京班固書傳之吾嘗病其畔散不屬無以考其變欲采比義會年長疾作駑墮日甚未能勝也幸吾弟宗直愛古書樂而成之搜討磔裂攟摭融結離而同之與類推移不易時月而咸得從其條貫森然炳然若開㣥玉之府指揮聯累圭璋琮璜之狀各有列位不失其序雖第其價可也以文觀之則賦頌詩歌書奏詔策辨論之辭畢具以語觀之則右史紀言尚書國語戰國策成敗興壞之說大備無不苞也噫是可以為學者之端耶始吾少時有路子者自贊為是書吾嘉而敘其意而其書終莫能具卒俟宗直也故刪取其敘繫於左以為西漢文類首紀殷周之前其文簡而野魏晉已降則盪而靡得其中者漢氏漢氏之東則既衰矣當文帝時始得賈生明儒術武帝尤好焉而公孫宏董仲舒司馬遷相如之徒作風雅益盛敷施天下自天子至公卿大夫士庶人咸通焉於是宣於詔策達於奏議諷於辭賦傳於歌謠由高帝迄於哀平王莽之誅四方之文章蓋爛然矣史臣班孟堅修其書拔其尤者充於簡冊則二百三十年間列辟之達道名臣之大範賢能之志業黔黎之風習列焉若乃合其英精離其變通論次其敘位必俟學古者興行之唐興用文理貞元間文章特盛本之三代接於漢氏與之相準於是有能者取孟堅書類其文次其先後為四十卷贊曰文之用辭令襃貶導揚諷諭而已雖其言鄙野足以備於用然而闕其文采固不足以竦動時聽夸示後學立言而朽君子不由也故作者抱其根源而必由是假道焉作於聖故曰經述於才故曰文文有二道辭令襃貶本乎著述者也導揚諷諭本乎比興者也著述者流蓋出於書之謨訓易之象繫春秋之筆削其要在於高壯廣厚詞正而理備謂宜藏於簡冊也比興者流蓋出於虞夏之詠歌殷周之風雅其要在於麗則清越言暢而意美謂宜流於謠誦也茲二者考其旨義乖離不合故秉筆之士恆偏勝獨得而罕有兼者焉厥有能而專美命之曰藝成雖古文雅之盛世不能並肩而生唐興以來稱是選而不怍者梓潼陳拾遺其後燕文貞以著述之餘攻比興而莫能極張曲江以比興之隟窮著述而不克備其餘各探一隅相與背馳於道者其去彌遠文之難兼斯亦甚矣若楊君者少以篇什著聲於時其炳耀尤異之詞諷誦於文人盈滿於江湖達於京師晚節徧悟文體尤邃敘述學富識遠才涌未已其雄傑老成之風與時增加既獲是不數年而夭其季年所作尤善其為鄂州新城頌諸葛武侯傳論餞送梓潼陳仲甫一作眾甫汝南周愿河東裴泰武都符義府泰山羊士諤隴西李諫一作鍊凡六序廬山禪居記辭李常侍啟遠遊賦七夕賦皆人文之選已用是陪陳君之後其可謂具體者歟嗚呼公既悟文而疾既即功而廢廢不逾年大病及之卒不得窮其工竟其才遺文未克流於世休聲未克充於時凡我從事於文者所宜追惜而悼慕也宗元以通家修好幼獲省謁故得奉公元兄命論次篇簡遂述其制作之所詣以繫於後博陵崔成務嘗為信州從事為予言邑有聞人濮陽吳君弱齡長鬣而廣額好學而善文居鄉黨未嘗不以信義交於物教子弟未嘗不以忠孝端其本以是卿相賢士率與亢禮予嘗聞而志乎心會其子偘更名武陵升進士得罪來永州因奉其先人文集十卷再拜請予以文冠其首予得徧觀焉其為辭賦有戒苟冒陵僭之志其為詩歌有交王公大人之義其為誄誌弔祭有孝恭慈仁之誠而多舉六經聖人之大旨發言成章有可觀者古之司徒必求秀士由鄉而升之天官古之太史必采民風陳詩以獻於法宮然後材不遺而志可見近世之居位者或未能盡用古道故吳君之行不昭而其辭不薦雖一命於王而終伏其志嗚呼其可惜哉武陵又論次志傳三卷繼於末其官氏及他才行甚具云僕聞之世其家業不隕者雖古猶乏一作今也求之於今而有獲焉王氏子某與予通家代為文儒自先天以來策名聞達秉毫翰而踐文昌登禁掖者紛綸華耀繼武而起士大夫掉鞅於文囿者咸不得攀而倫之乙亥歲某自南徐來執文貺予詞有遠致又著論非班超不能讀一作續父兄之書而乃徼狂疾之功以為名吾知其奉儒素之道專矣間以兄弟嗣來京師會於舊里若璩瑒在魏機雲入洛由是正聲迭奏雅引更和播塤箎之音韻調律呂之氣候穆然清風發在簡素非文章之冑曷能及茲况宗兄握炳然之文以贊關石廌冠銀章榮映江湖則嚮時之美談必復其始某也謂予傳卜氏之學宜敘於首章操斧於班郢之門斯強顏耳詩凡若干首談者謂大梁多悍將勁卒亟就猾亂而未嘗底寧控制之術難乎中道蓋以將驕卒暴則近憂且至非所以和眾而乂民也將誅卒削則外虞實生非所以扞城而固圉也是宜慰薦喣諭納為腹心然後威懷之道備聖上於是撫以表臣贊以藝人參剛柔而兩用化順逆而同道既去大憝遂安有眾故楊公以謀議之隟對揚王庭不踰時而承詔復命示信於外諸侯時當朝之羽儀凡同官之寮屬皆餞焉容受童孺使在末位禮部郎中許公以宏才奧學已任文字顧唱在席咸斷章而賦焉謂工部郎中崔公文為時雄允宜首序謂小子預離觴之餘瀝俾撰後序編以繼之大凡軍旅之制贊佐之重崔公序之備矣膺命受簡欲默不敢故書談者之辭拜手以獻用充餘篇云貞松產於巖領高直聳秀條暢碩茂粹然立於千仞之表和氣之發也稟和氣之至者必合以正性於是有貞心勁質用固其本禦攘冰霜以貫歲寒故君子儀之清河崔敦詩有柔儒溫文之道以和其氣近仁復禮物議歸厚其有稟者歟有雅厚質方之誠以正其性愨論忠告交道甚直其有合者歟是故日章之聲振於京師嘗與隴西李杓直南陽韓安平洎予交友杓直敦柔深明沖曠坦夷慕崔君之和安平厲莊端毅高朗振邁悅崔君之正予以剛柔不常造次爽宜求正於韓襲和於李就崔君而考其中焉忘言相視默與道合今將寧覲東周振策於邁且餞於野或命為之序予於崔君有通家之舊外黨之親然吾不以是合之崔君以文學登於儀曹敭於王庭甲俊造之選首讎校之列然吾不以是視之於其序也故載之其末云僕間歲驟遊邠壃今戎帥楊大夫時為候奄盡護㣥校用笞法箠令不吐強禦下莫有逗撓淩暴而犯令者沈斷壯勇專志武力出麾下取主公之節鉞而代之位鶡冠者仰而榮之今又能旁貴文雅以符召文士之秀者河南獨孤寧署為記室俾職文翰翕然致得士之稱於談者之口蓋朝廷以勇爵論將帥豈濫也哉獨孤生與仲兄實連舉進士並時管記於漢中新平二連帥府俱以筆硯承荷舊德位未達而榮如貴仕其難乎哉噫自犬戎陷河右逼西鄙積兵備虞縣道告勞內匱中府太倉之蓄僅而獲饜投石而賈勇者思所以奮力論者以為天子且復河壖故壃拓達西戎而罷諸侯之兵則曳裾戎幕之下專弄文墨為壯夫捧腹甚未可也吾子歷覽古今之變而通其得失是將植密畫於借筯之宴發㣥謀於章奏之筆上為明天子論列熟計而導揚威命然後談笑罇俎賦從軍之樂移書飛文諭告西土劫脅之伍俾其簞食壺漿犒迎王師在吾子而已往慎辭令使諭蜀之書燕然之文炳烈於漢史真可慕也不然是瑣瑣者惡足置齒牙間而榮吾子哉觀室者觀其隅隅之巍然直方以固則其中必端莊宏達可居者也人孰異夫是今若杜君之隅可觀而中可居居之者德也贊南方之理理是以大總畱府之政政是以光其道不撓好古書百家言洋洋滿車行則與俱止則相對積為義府溢為高文愨而和肆而信豈詩所謂抑抑威儀惟德之隅者耶今往也有以其道聞於天子天子惟士之求為急杜君欲辤爭臣侍從之位其可得乎濮陽吳武陵直而甚文樂杜君之道作詩以言予猶吳也故於是乎序焉近制凡得仕於王者歲登名於吏部兵一作吏部則必參其等列分而合之率三十人以為曹謂之甲名書為三其一藏之有司其二藏之中書洎門下每大選置大考績必關決會驗而視其成有不合者下有司罷去甚眾由是吏得為奸以立威賊知以弄權詭竊竄易而莫示其實必求端愨而習於事辯達而勤其務者命之官而掌之居三年則又益其官而後去其職有范氏傳真者始來京師近臣多言其美宰相聞之用以為是職在門下甚獲休問初命京兆武功尉既有成績復於有司為宣州寧國令人咸曰由邦畿而調者命東西部尉以為美仕范生曰不然夫仕之為美利乎人之謂也與其給於供備孰若安於化導故求發吾所學者施於物而已矣夫為吏者人役也役於人而食其力可無報耶今吾將致其慈愛禮節而去其欺偽淩暴以惠斯人而後有其祿庶可平吾心而不愧於色苟獲是焉足矣季弟為殿中侍御史以是言也告於其寮咸悅而尚之故為詩以贈其去而使予為序昔漢室方盛文章之徒合於京師亦既充金馬石渠則又溢於諸侯求達其道故枚乘客於吳相如遊於梁其或致書匡主用極其志節之大者也適時觀變以成其性道之茂者也渤海幸君既登於太常之籍又膺邯鄲之召北會元戎直道自達吾儕器其略南聘天朝相禮述職公卿多其儀合度於易于之間雖枚生之節長卿之道無以尚也冬十有二月朝右禮備復於轅門我同升之友是用榮其趣舍惜其離曠卜茲良夜詠嘆其美比詞聯韻奇藻遞發爛若編貝粲如貫珠琅琅清響交動左右㣥公以侍御之往也予闕其述命繫而序焉士之習為吏者恆病於少文故給而不肆飾於華者嘗病於無斷故放而不制今李生學於詩有年矣吟詠諷賦頗聞乎人至於是州唯州之牧咨焉以贊戎事而糺㣥吏甚直且武豈所謂吏而華者耶以府喪罷去擇而之乎有禮之邦推是道也以往然而不際於禮則吾不知也八年冬予與馬邑苑言揚聯貢於京師自時而後車必挂轊席必交衽量其志知其達於昭代究其文辨其勝於太常探而討之則明韜於樸厚之質行浮於休顯之聞一作問遊公卿之間質直而不犯恪謹而不懾交同列之㣥以誠信聞予拜而兄之以為執誼而固臨節不奪在兄而已是歲小司徒顧公守春官之缺而權擇士之柄明年春同趨權衡之下並就重輕之試觀其掉鞅於術藝之場遊刃乎文翰之林風雨生於筆札雲霞發於簡牘左右圜視朋儕拱手甚可壯也二月丙子有司題甲乙之科揭於南宮予與兄又聯登焉予不厚顏懷愧而陪其遊久矣夏四月告歸荊衡拜手行邁輪移都門之轍轅指秦嶺之路方將高堂稱慶里閈更賀曳裾峨冠榮南諸侯之邦遐登王粲之樓高視劉表之榻桂枝片玉光生於家是宜砥商雒之阻艱帶江漢之浩蕩以談笑顧盼超越千里而無倦極也然而景熾氣燠往即南方乘陵炎雲呼吸溫風可無敬乎慎進藥石保安其躬是亦非兄之所宜私也㣥公追餞於霸陵列筵而觴送遠之賦珪璋交映或授首簡於予曰子得非知言揚者乎安得而默耶予受而書之編於㣥玉之右非不知讓貴傳信焉爾始予幼時拜兄於九江郡覩其樂嗜經書慕山藪凝和抱質氣象甚茂雖在綺紈而私心慕焉厥後竊理文字先禮而冠遇兄於澤宮之中觀其德如九江之拜蓋世俗不能移也自是戰藝三北左次陋巷予亟會於其居視其道如澤宮之遇亦挫抑所不能屈也逾時而名擢太常聲動京國士輩仰慕顧盼有耀予獲賀於蔡通儒氏窺其志如陋巷之會又得意所不能遷也君子志正而氣一誠純而分定未嘗摽出處為二道判屈伸於異門也固其本養其正如斯而已矣吾兄先覺而守道獨立而全和貞確端懿雅不羈俗君子之素也亦既升名天官告予東遊是將乘商於浮漢池歷郢城下武昌復於我始見之地則朋舊之徒含喜來迎宗姻之列盡皆加禮以待舟輿所略賀聲盈耳離㣥之思行益少矣僕不腆見邀為序狂夫之言非所以志君子也自達而已隴西辛殆庶猥稱吾文宜序事晨持縑素以班孝廉之行為請且曰夫人殆所謂吉士也愿而信質而禮言不黷慢行不進越其先兩漢間繼修文儒世其家業其風流後允耽學篤志之士往往出於其門今夫人研精典墳不告劬勩屬者舉鄉里登春官獲居其甲焉家於蜀之東道其嚴君以客卿之位贊是方岳為大夫良今將拜慶寧覲光耀族屬是其可歌也道出於南鄭外王父以將相之重九命赤社為諸侯師今又將亟駕省謁從容燕喜是又可歌也故我與河南獨孤申叔趙郡李行純行敏等若干人皆歌之矣若乃序者固吾子宜之柳子曰吾嘗讀王命論及漢書嘉其立言彼生彪固之冑歟相國馮翊公功在社稷德及生人其門子遊文章之府者吾嘗與之齒彼生嚴氏之出歟承世家之儒風沐外族之休光彼生專聖人之書而趨君子之林宜矣哉遂如辛氏之談濡翰於素因寓於辭曰為我謝子之舅氏珠玉將至得無修容乎河東古吾土也家世遷徙莫能就緒聞其間有大河條山氣葢關左文士往往仿佯臨望坐得勝槩焉吾固翹翹褰裳奮懷舊都日以滋甚獨孤生周人也往而先我且又愛慕文雅甚達經要才與身長志益強力挾是而東夫豈徒往乎溫凊奉引之隟必有美製儻飛以示我我將易觀而待所不敢忽古之序者期以申導志義不為富厚而今也反是生至於晉出吾斯文於筆硯之伍其有評我太簡者慎勿以知文許之君子病無乎內而飾乎外有乎內而不飾乎外者無乎內而飾乎外則是設覆為阱也禍孰大焉有乎內而不飾乎外則是焚梓毀璞也詬孰甚焉於是有切磋琢磨鏃礪栝羽之道聖人以為重豆盧生內之有者也予是以好之而欲其遂焉而恆以幼孤羸餒為懼恤恤焉遊諸侯求給乎是是固所以有乎內者也然而不克專志於學飾乎外者未大吾願子以詩禮為冠履以春秋為襟帶以圖史為珮服琅乎璆璜衡牙之響發焉煌乎山龍華蟲之采列焉則揖讓周旋乎宗廟朝廷斯可也惜乎予無祿食於世不克稱其欲成其志而姑欲其速反也故詩而序云士之知感激許與常欲以有報為志者則凡志乎道者咸願為之如趙生庶乎哉來謂予曰宗人尚書以碩德崇功由交廣臨荊州仁我若子姓恩禮重厚有賢子為御史好學而甚文友我若同生歡欣交通我誠樂為之用甚不辤也不幸遭重痼六旬而後知人方其急也大懼不克報尚書公之恩又懼無以當御史君之心以沒每念於是未嘗不衋然內傷若受鋒刃自是而後調藥石時飲食生血補氣強筋植骨榮衞之和膂力之剛迨今茲始全然為人舒幹抗首文翰端麗材足以用敢辤而往以效於戲下其言云爾自吾竄永州三年趙生亟見視其狀專謹愿愨觀其跡溫密簡靖聞其言徑直端誠自尚書理一作之為荊州異政日至至則趙生喜忭起立伸目四顧不啻若自巳而為之者誠宜有報知已之道又誠宜有大賢而為之知也是行也趙生其將奮六翮翔千里以為轅門大府之重增羽儀之盛其道美矣故予繼之以辭
