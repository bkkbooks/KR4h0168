front:
  text: 全唐文欽定全唐文卷四百五季重天寶時擢書判拔萃科
  hash: sha256:9c2a95465963cb023b49f707320bcd9a64b1fa3e2b9bd63261600f7554bf4e35
  markers:
  - {type: head, offset: 12, content: 于季重, id: KR4h0168_NFKB_405-h1, level: 1}
body:
  text: 政在利農人惟守業順其事者莫不胥悅變其舊者曾是興謠惟甲國鈞是秉具瞻斯重永言溝浚而新是謀水旱不資燮理而成化人天可望冀敦勸而有秋然則南陽之陂自滮池而為睦澤鄴傍之水因舄鹵而作膏腴是泛是流俯雲雨之攸潤我疆我理棲豆芋之餘糧方進不忘於前蹤白公且同於斯類此則有益於國專利而行未可式禮茍愆更從人欲陂兮當復聽乃輿言惑衆論笞責則何甚黃鵠既聞於師古焉敢定刑丹筆亦宥於無稽終宜服念置之理也誰曰是乎階天寶時人堪輿之內㣥象茫茫均四時之辨物列五色以居方名可大者其惟中黃吹律成音考定宮商之韻麗天為則遙分日月之光石在穀城之下氣流華闕之傍雲瑞命官而共治星見知芒之莫當恆發揮於奕奕寧見混於蒼蒼黃之為用時義大矣揣稱之功請言其始土德載物首更王之五行河水流謙恆曲成於千里鶴拂羽於太液龍弄鱗於成紀悲哉秋之為氣歲將暮止菊花可折凝曉露而含光木葉既零拂涼風而亂起夫惟色有其變用無不遍染素絲之正色映飛塵而不見合氛昏而暫隱向晴暾而復見漢霧塞而呈災秦蛇夢而命奠乃有虢國窮士非聖不述務本於三學道於一雖觀色而託賦猶守中而靡失希執念而見升願啓心而就日神既和而人不可誣化將兆兮道與之俱故聖人張樂於無聲之境以造化夫寰區樂之作焉所以節百事物既忘矣於是奉三無其用秩秩其風于于發自靈府達於道樞樂師盈庭政行於靡擊靡考涓衣在御化成而不曳不婁爰自周隋上達堯禹或理或亂時更萬主誰不欲肅清家邦統一區宇莫能知無聲之樂而政教斯聚慆堙既考於鳴絃節宣豈專乎促柱移風莫大於出令修德不在乎觀舞故曰猶有五起政之所急徵之則道存微明行之則人用寧輯所謂君子設法貴與物宜日聞之政四方以寧過此以往豫亦知其不經肆皇家之首出庶物也高張政典而疏數適中深具揖讓而剛柔洽時且無惉懘之風豈蕩然而不反何異闡諧之作故賁然以來思是以素王間居而觀卜商體政以妙願盡趨隅之禮以聞愷弟之要不可以耳察又難以目照方知夙夜之詩遂合無聲之兆昔先王省風作樂象物制典賓宴服禮神歆降戩六代各異五音相演盛衰感召而自生理亂區分而可辨列國殊化化形於聲淫正難分分之者善於是師曠陳樂而立伯牙注耳而聽鐘師擊鐘罄師擊罄考鼓振革撰土木以相宣懸匏裁笙發絲竹而遞鎣審正聲之發防姦聲之徑俾夫鄭不干雅正不近佞混音者澄醉歌者醒集九成而儀羽自降立六變而致物斯定惟政在人惟聲無私興亡繫焉逆順應之天將是懲神告勿疑卜商之告文侯古則如此端賜之問師乙歌如何其堂上堂下既獻既酢百拜終禮八音合樂天地潛會鬼神相索遂使浹洽充塞馨臭上登和樂無親惟德是宏惉懘無準惟惡是朋聲雖無常聽其有恆蓋致理者妙非習樂者能惡可鑒誡德可奮興惟周后棄播種黍稷惟文王昌不邇聲色雅頌廢於後昆幽厲隳於正直觀聖人之備樂知天子之深識既而石昆緩有餘其樂只且聲之感化浸潤相於審音達性飛沈翔泳自上化下敢告執政棲簡天寶時擢書判拔萃科大道既行農不易畝中孚斯及國有常稅各修九賦之職寧奪三農之勤惟彼所司於何妄作隳周公之垂法行魯宣之弊政穀出不過籍已舉邱明之凡法乃變於人寧規商鞅之律氓則胥怨誰任其辜主上情殷納隍慮一物之乖所見夫栖畝欣五穀之薦登德澤既滂和氣充塞誠可減從輕賦須允下人之喜遂行厚斂虛憑中尉之詞事則匪躬罪當諸已則屨校滅趾茲咎未深而剝床以膚取凶斯在挺天寶時擢書判拔萃科郊賦有籍邦政是敷制乎上地無越三人之倫居彼中田常許兩家之共始成薄賦乃曰恤人周末無年魯初有制憂稅畝者作自哀公對盍徹乎聞諸有若所以人多怨讟國起侵伐動干戈而稅繁供軍旅而儲廣抑為末也寧是本歟當今薰風阜財協氣登穀兵則不動人其以寧斯足解慍之時奚為變法之稅中尉推過罔失臣儀輿人頌康當歸帝美兩執斷矣一言在茲光元宗時擢書判拔萃科王祥望職久著傳刀龎統良材攸稱展驥承上接下故宜自已而行舉目提綱或可稟人而措如鄭産流譽尚採鄉校之言晉侯質疑猶聽輿人之誦則智有不達材有不通江海以納流為大君子以訪賢為美子賤之居茂宰實稟度於邑人何晏之任尚書尚關懷於談客孔子既稱其善史臣不敘其非按舊章而可憑明所司之妄舉安今不伏良謂有詞峴元宗時擢書判拔萃科始吾有形與憂俱生形是幻器憂為妄情愛業潛結貪心日萌如狂犬之逐塊似飛蛾之赴明舉世役役終身無成慨愚者之未達嗟此志之難遏多賤實而貴名咸棄本而逐末利之所在蹈水火而非懼勢之所存棄仁義而如脫方自以為氣足自負殊不知患其可掇夫生也有涯而智之無已鵬鷃未足適其分儒墨焉能齊其理世謂之憂我適足以為喜世之所譽我適足以為毀自我心而視物四者未知其孰是借如青樓上路紅粉佳人編貝為齒點朱為唇朗如明月之初霽芳若緑條之在春流曼臉而光射動鳴環而態新此必天下之巨豔固當衆族而咸親奚為乎鳥見之望層雲而自逸魚見之入深泉而不出彼醜好之非我吾孰知其所失若乃樂府窮選伶人擅名跳丸劒之揮霍奏金石之鏗鍧復燕趙之稱最信音容之莫京清歌一轉而行雲遏長袖屢舞而流風并實天下之樂事當觸類而含情奚為乎爰居卒夭於鐘鼓聾俗不知其韶武嗟愛憎之在物吾孰知其所主嘗以為生者物之可欽死者人之可畏方其髑髏之自得也不異夫南面之至貴謂死之為是生之為非何存沒之交戰而彼我之相違嗟乎求馬於肆馬不可以得以猿為心猿亦未之息夫制動者以靜吾當反照於元極端右之寄古人為難光我大邦抑惟良政豆盧安雅有通識率由舊章呂虔推其佩刀諸葛稱其驥足好問則裕高步於邱門有道可尊且懸於陳榻舍茲正寢延彼部人飢渴良圖咨謀雅道昔干木賤士文侯尚且軾閭侯嬴匹夫信陵以之虛左重其所部望古何慚舉此為非愚所不取先意多才入仕直道登朝權上路之衣冠光大君之寵命周官有序既標將作之名漢制無差還視列侯之秩家聲克紹門閥載昌京兆地靈韋氏之繼為丞相姑臧人物張家之歷踐武威前史不以為非通方不以為纍事可師古何必循常然遺劒可悲喬木有感名教之地動息增懷隔以屏風昔聞其旨易其坐處今見斯人苟遺芬而在旃豈夫君之可誚穹壤之福允及君子純嘏之徵良歸盛德索和誠孝總心極義切天經其行則晉代荀何其道則孔門曾閔獲西籬之粟遂貽俗士之譏採南陔之蘭忽招獄官之訟愚謂不可况夫賢哉極一作拯元宗時擢書判拔萃科立物有恆堅樹在始繕而不固壞而難支既動作而必虞將紀律而斯約罰之惟五先明宥過之文死則有三終傷不弔之旨若過誤而先定乃平刑而是察乙則何者率爾薄言已聞滅鼻致災胡乃反脣推過且宇之必葺誠備慮而則安牆或不修將隟壞而誰咎罪有所在焉可逃夫字物必制嘉謨克獲飭勸耕桑領符臥理出入阡陌其敢寧居且通溝之攸在亦堰陂而斯尚鄉亭之中曾未刻石水門之下初欲成雲化可比於文翁恩實多於召父使臣以飲冰察俗煩擾致詞太守以均水利人約束尤當疆埸有理知薄言之足稱忿爭不生何簡書之妄奏此而無爽自可明徵迥天寶時鄉貢進士粵至高者天也朗然懸七政之輝至廣者地也宴然澄百川之氣雖則蕩雲沃日寧浮夜壑之舟合璧連珠未照無明之域豈若一人感夢畫象南宮八脫洪源傳經西土變靈威而救苦海散法雨以濟炎山啓方便之門則三塗並軌開有緣之路則七戒居心思元無測其淺深博物莫知其近遠不生不滅其惟釋氏乎此果園者寺主希炎都師靈光奉為天皇天后以率土蒼生之所立也諸色人等之供修焉法師夙達元風雅通妙覺察古今休咎聽浮圖之鈴躡寥廓高卑飛德真之錫將以登天遊霧豈徒鳴磬焚香而已哉邑人成公滕定趙乾楊藥師並濟北名家山東英妙挺含章之秀氣萬古馳聲振夏日之嚴威百代垂譽長嘯之后惟若嗣音故能疏煩想於心胸瑩虔誠以恭敬悟色空之合迹知內外之異門欲碎斜山先揮法刃冀落塵網願觸惠風於是測景瞻星共崇梵宇萬楹藂像緑雲上闕一字百丈孤標通天秀出飛梁偃闕一字拖太虛之彩虹疏網參差挂高樓之新月金暉象駕色亂丹霞玉映鶴林光搖碧雪風吟仙鐸似聞觀世之音人步香階如到聰尼之國爾乃春亭東指板築猶存幽郭西瞻弦歌如在前闕一字橫海闕一字泛葉舟後望大河遙分竹箭平原坱圠嘉樹扶疏桃李茂盛每垂秋實松竹夾道不變春榮所謂戡智慧之鐵圍得曹衛之寶勢於時天寶八載歲次巳丑四月乙未朔十月甲辰迥築室清濟地接祇園持法丹經心希妙理拾百氏之芳潤美大釋之形容其詞曰粵若大雄赫然而見既號普賢仍為正遍馬寺東營鶴林西變道引佛闕一字門開方便其一尊容儼雅大厦宏敞寶閣萬重星樓千丈鴈塔斜飛橫簷直上日月為光滴瀝成響其二猗歟妙覺彼闕一字先知真情有趣法體無為不可闕一字議豈得心非其三東拱春亭西鄰匡郭朵散青蓮花開紅藥慈雲布而龍興甘露墜而珠落不生不泯惟闕一字惟闕一字其四恌元宗時人先奉恩敕令臣校搭御書睿宗大聖真皇帝集臣伏見集中具載前事讚文又見孔子廟堂猶未刊勒臣竊以為尊儒重道褒賢紀功本於王庭以及天下一則崇先聖之德一則紀先聖之文其兗州孔子舊宅益州文翁講堂經今千有餘載皆未題頌臣特望搭御書讚文及陛下所製顏回讚并百官撰七十二弟子及草闕一字賢讚令東都及天下諸州孔子廟堂精加繕寫御製望令刻石百官作望令題壁陛下孝理天下義冠古今使海內蒼生欣逢聖造冀敦勸風俗光闡帝猷景育元宗時人蓋聞諸易曰有天地然後有萬物有萬物然後有君臣有君臣然後有上下然則星辰象緯邱陵山險所以經啓八紘彌綸萬域者也聲明文物禮樂典章所以黼藻生靈化成邦國者也至於高居萬乘富有四海為而不宰裁成於孕育之先感而遂通囊括於混元之首雖柔來剛往乾坤之軌躅可尋而步帝馳王雲火之聲塵不昧則疇咨四嶽允釐百工大則鶴鼎魚璜錫寵於機衡之地小則回翻墨綬守位於子男之國其有相門紬緒王佐推才負揭仁義周旋禮節排九流而迥出掩三異而孤升緝諧氓吏綏和風俗堂上堂下驅宓賤於後塵星出星入置馬期於散地簡而以肅嚴而不殘馳心於廊廟之前縱迹於江湖之上者獨在於岑君乎君名植字德茂南陽陽人也其先出自顓頊氏后稷之後周文王母弟輝克寸定殷墟封為岑子今梁國岑亭即其地也因以為姓代居南陽之陽十三代孫善方隨梁宣帝西上因官投迹寓居於荊州焉自軒階垂祉薑汭開宗神嶽構其崖巘靈根肇其枝葉其後佐帝師王封侯尚主十卿五公之貴七珥三組之榮衣冠燭耀於區寓允緒綿聯於載籍亦由秦移趙璧魏得隋珠不常厥地所在稱寶何止梁亭漢室先開佐命之封吳郡荊門晚葺因居之地若斯而已哉高祖善方梁驃騎大將軍周起部尚書開府儀同三司長寧縣開國公食邑一千二百戶贈侍中諡曰敬當萬機之損益成八座之儀表銀艾圭茅金鏘玉振榮高當代龍豹之託逾深寵茂幽扄鵷鸞之寄斯重曾祖之象隋虞部員外侍郎襲爵長寧公霞鶱電邁鳳彩龍光初膺星象之榮晚襲山河之寵祖文本皇朝中書令兼太子賓客宏文館學士江寧縣開國伯食邑四百戶贈侍中諡曰憲宏材巨量經文緯武高標百尋絶壁千仞丹青神化翊亮天工即隆周之申甫亦皇軒之風力若乃百揆務殷三階事切西朝機要之所北閣神仙之地任總訏謨榮高密勿至於五車萬卷百家諸子吐鳳懷蛟淩雲概日不尚浮綺尤存典裁藻翰之美今古絶倫父景倩周大中大夫行麟臺著作郎兼宏文館學士綰青襟而司禮館草元經而登書閣聲榮之重驛美於當朝燕翼之寄傳徽於後烈君紫泉飛液丹山耀彩孤峯懸日月之輝激溜聚煙雲之氣虛心倜儻靈鸐再舉而未窮逸調從橫大鵬六月而方息生而好學幼而知禮孝行無待於傍授仁心得之於自然黃憲之類顏回汝南為貴賀循之擬龔勝江東擅名不學左思十年為賦聊同方朔三冬讀書不出戶庭既馳心於萬里將排雲日亦因基於一匱弱冠以簪纓貴胄調補修文生明經擢第回帷連夕拜之所紫禁邇朝聞之地圖書所會館宇生光解褐同州參軍事譽警北曹聲馳南府地靈天秩渾金璞玉之材主吏參卿孫楚蕭何之德屬軒塋卜遠禹山斯會撫遺劒而空存想遊冠而無及松霾漢隧竹染湘川雖鏤鼎銘彞將勒生金之字而庀徒蕆事終資倚玉之材課效居多恩腴俯逮特授蒲州司戶參軍事俄以親纍左授夔州雲安縣丞賈誼長沙屈原湘水溪連五毒攀鳥道而銜悽峽帶三巴聽猿聲而下淚秩滿丁府君憂去職三年泣血七日絶漿殆不勝喪幾於滅性服闋調衢州司倉參軍事秦稽負日楚夢含雲東連射的之山西拒沈珠之浦上農攸屬倉廩為禮節之先下位斯安等列處儕流之首尋沐恩旨雪其親纍一遇雲雷之施再生花萼之榮既席寵而沿恩亦流根而洎葉君之兄羲材望冠時聲名動俗膺奮飛而首出指寥廓而曾鶱位才陟於聞鶯才實兼於緣鵠既而八龍雙驥慈明與劉岱均飛二陸三張士衡與孟陽齊價豈直家風祖德見稱於中旨掌紼司綸復傳於後葉光暉所燭朝野增榮然則宅火均司象雷分邑莊周著小鮮之誡尹何招美錦之嫌列五等於姬封高十城於漢秩字育之道循良是資擢授潤州句容縣令瑤山奧壤金陵舊地郊原枕端委之墟江漢擁朝宗之水海潮驚而翔鷺起山氣合而盤龍見物産殷積水陸兼并人多挺劒之雄俗有亡珠之弊君達於時事明於政理政不嚴而自肅化不令而人從氓黎感惠愛之如父母姦邪屏迹畏之若神明戶口滋豐田疇墾闢行太邱之道德息灌壇之風雨國家下武膺運中興纂業氛祲廓除日月開朗君遇見知之主逢時來之運若魚縱壑如鴻順風優制所覃崇班益峻加朝散大夫上柱國紫泥流渥朱紱升榮列五彩之通班聯九章之賁飾於是貴而思降盈而知損如絲之旨載流亂繩之化逾息先是邑居湫厄里閈榛蕪爰自歷政未遑加緝君乘三餘之隙因四人之暇覽山川之體勢量資物之豐省逐便興功因時改作人無廢業役不浹辰流一切之權道成纍代之宏業頃緣稼穡頻鍾炎亢雲漢之詠徒勤京坻之望斯絶君親加暴露遍請山川率氓庶以具馨香俯壇場而展誠敬濃雲布族膏雨成絲綿八極而俱灑匝四溟而廣遍自非仁心所及誠感必通其孰能預於此乎加以道尚朋執情敦宴喜每至星搖劒室月下珠潭菱津回棹女之喧桃徑擁樵童之樂臨萬家之井邑眺千里之風煙良談間起清文不輟信可謂兼文兼吏公才公望者焉上聖深視九重高居萬宇乃眷時政分命使司端冕旒而思天下布德澤而周海內博訪英髦探求異術十道飛馹萬域承風江東道黜陟使朝散大夫行度支員外郎攝右臺侍御史源乾曜崖岸孤聳風飇秀出千仞罕節百尺無枝地入星臺列珠軒而應翟庭分月樹搖鐵柱以驚烏冰霜凜白簡之威霞日聚繡衣之色遙同李郃上回星象之輝俯類張綱先懾權豪之氣以君才地加之聲實每肆揄揚先膺薦舉王生千里佇入於匡佐荀氏十旬行登於台府顧盼之重郡縣增榮馳表疏於龍闈遽翻飛於鶯路隨郗詵而齊舉攀鄧攸而不留黯黯津亭搖搖軒騎壽春遺犢將折轅而共分葉縣歸鳧逐行舟而俱遠由是三吳士庶二江人物來暮之歌方遠去思之戀益深期寇君於一年思段侯之再撫丞魏烜家承軒冕代傳儒墨鳴謙自牧處劇若間以函牛之巨量二割雞之小道主簿崔子佺相門卿族玉葉金柯光彩可以射人風神可以凜俗尉李棻張隱朝章仇嘉勗等並公侯復祉琳琅積譽經史足用刀筆推工暫回東道之姿免屈南昌之化鄉吏等或耆年宿望或盛族名家負雲澤之王褱寶馳水鄉之俊逸山川舊迹龍盤武踞之間軒冕餘風東箭南琛之亞並餐和浴道多從食椹之恩老安少懷久沐惟桑之化雖功成帝力上皇之耕鑿已勤而事稟國經下邑之風猷可紀是用傍遵縑簡俯緝謳謠核南襄之故事採西郭之前躅飛丹屑瓦行抒雕金之思相質披文無愧沈碑之浦其詞曰山嶽騰氣河汾孕象基構百尋源流千丈地靈坱軋天姿肸蠁長寧建侯襟懷洞朗江陵奕載風飇峻上賾隱鈎深知來藏往斫雕為朴用晦而明文緯天地武定從橫如周稷卨似漢良平金社開封珠盤載盟逖矣遐緒猗歟克生乘彼靈慶光斯燕翼道映時宗言為士則月鏡虛湛雲峰迥植藝蘊縑緗材經邦國金玉其性松篁其德鶴鳴不已鴻飛未息欲麗九成先階一匱比迹庠序聯芳旌賁軒塋卜遠禹山云萃倚玉推才雕金纂懿秦關漢輔吳田虢地孫楚參卿蕭何主吏鴻鐘待扣明鏡不疲詞端筆杪月落雲披時更出處道或推移曾參盡孝賈誼傷離五湖東指三峽西窺六條齊稟百里均知帝道光亨聖人有作如鵬得吹似魚縱壑越自奮飛載翔寥廓珠江控海金陵負郭夏禹經營農皇甄度星足廠田坴牛斗雲連蜃閣令長何擇循良在茲驅駕宓賤雕鎪馬期政實無擾人稱不欺韋絃是緝冰玉攸資神憂河甸獸斷江湄蝗去無限鸞歸有時八使出關二星向蜀乘驄衣繡揚清激濁黜陟攸先推理是屬上敷帝念下從人欲一聽謳謠載欣風俗行收顧盼坐成珠玉若管知鮑如蕭得王君子既見為龍為光選衆而舉載揄載揚飛名日路驛薦雲莊渺渺雲澤禺禺水鄉西北萬里東南一方坐結去思長嗟來暮躑躅翬壤迢遙鶯路何以報恩宸階遠訴何以旌德高碑迥樹潘嶽創詞楊修辨句一刊懿迹千齡垂裕兼瓊天寶元年官益州長史吐蕃白狗國及索磨等諸州籠官三百餘人出奉州望準女國等例簡擇許令入奏餘並就奉州宴賞放還堂構天寶十二載官陜郡平陸縣尉公諱志廉字惠達富陽人也昔吳稱帝業飛龍鬱起於江東漢辟賢臣易道超來於北海彼德高致遠者蓋則其先故知族茂慶流彌蒙洎後闕二字之闕三字之第六子也承家之纘克奉徽猷風姿璨然自幼及長智識天與藝能師資既得時以自致實負才而見用服勤就養竭力盡忠承顏不違虔心至孝居公守道在職惟賢釋褐授儒林郎拜內謁者監陟資驟進俄遷朝議大夫守內常侍朱紱奕奕儀容堂堂言語侍從之臣左右中涓之任淑慎攸止咸當聖情君恩曲臨殊私荐及出入鴛鸞之殿栖遊日月之宮蹀紫燕於香街捧金輪於馳道者蓋得其忠焉公以勢莫久居了真空而是觀所歸正信悟即有而得元于以運短道長功存已沒天寶十二載十一月十一日寢疾終於咸寧縣來庭里之私第時春秋五十二夫人則天水郡君趙氏之女作嬪叶禮于飛有光先夫亡沒三歲而已即以明年夏六月八日合葬我府君夫人於長樂之原禮也天子以舊臣可重軫念於懷既贈之以粟帛復爰申於弔祭喪事之日人力借供嗚呼生榮沒哀身沈譽在繐帷已故石槨猶新掩泉戶以空幽慮桑田之有變將刻石以斯著庶不為冥寞君者乎乃作銘曰名家令族孝子忠臣禮義及物賢良立身鬱鬱芳猷堂堂雅量白圭無玷玉卮有當官因德建寵自勤榮侍衛宮禁輝光日生上壽未央於焉卒歲落影西沈巨川東逝白日晝短黃泉夜長佳城寂寞原野悲涼美石已刊功名闕五字洊千秋不改琚天寶六載官濟源縣尉善利物者曰水水之靈者曰瀆瀆有三而濟居其一焉道源數畝而深無底細流數里而能截河信造化之奇功者也天官小宰達奚公智乃周物德惟上善昔遊于茲嘗志其事琚忝尉此邑恐墜斯文爰命攻金刻諸樂石庶將來之不朽也
