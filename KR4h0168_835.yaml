front:
  text: 全唐文欽定全唐文卷八百三十五錢珝五
  hash: sha256:6d28bd033e19c023bfefc3f49d8c5777d43bb10b7547f637b2bb7fd9cf0caa94
body:
  text: 臣某言伏奉聖慈賜臣某階某官食邑若干戶官誥一通者臣某中謝臣伏以周官所建冡宰是先進階陛之名增井賦以數重在彞典合為渥恩冒寵以來偷安而處不能退讓方懼滿盈詎謂陛下每顧舊章必加優禮雅誥既垂於綸綍侍臣忽降於宮闈五彩相鮮且成文於潤飾萬鈞比重幾無力以捧持聚族咸觀省躬何稱遭遇莫酬於君父寶藏空戒於子孫竊視權衡惟思砥礪臣某無任感恩荷聖激切惶越之至臣某言今月某日賜臣某官誥一通者臣某中謝臣敢謂皇慈仍加霈澤固讓而丹誠莫遂退思而元造寧酬今者特降近臣遽臨私室琅函乍啓捧持空耀於微躬寶軸載觀燦爛仍驚於衆目榮光併集舒卷不遑難勝黼黻之文何補燮調之任唯當千慮以荷萬幾見可而進之謀知無不為之力用裨至理庶奉休期仰戴聖慈臣某無任省已感恩之至臣某言臣先蒙恩命授集賢殿大學士今月某日中使至忽承霈澤降自重霄再披五色之文若戴千鈞之重臣某中謝伏惟尊號皇帝陛下求衣待旦側席視朝方致理於雍熙每仰成於輔相臣自慚竊位唯懼曠官未獲避賢何堪假寵爰驚瑣質更被鴻私提玉鉉於中台已憂公餗總石渠之祕署兼集㣥才當文德之大朝實名儒之大任今者遽頒雅誥益示皇慈兼命王人且臨私第琅函乍啓光凝紫府之烟寶軸潛舒潤帶金盤之露空知焜耀無報睿明臣某無任荷聖感恩兢懼之至臣某等言今月某日高品張師道至奉宣聖旨示臣等涇州所進白野鵲者臣聞白為正色鵲實靈禽在五行而賦稟金精於衆鳥而有殊羽族臣某中謝伏惟尊號皇帝陛下應上天之道必順五行遂萬物之情非徒衆鳥宜獲降祥之類以昭致理之心是以素翼流光丹眸耀衆俄呈瑞質能弄好音應圖牒以自來詎網羅之所得諸侯入獻史氏明書寧同集樹之烏堪並紀年之雀方開景運實契禎符臣某等謬贊皇猷竊觀神貺無任賀聖歡忭之至臣某等言今月某日高品張徒羽至奉宣聖旨示臣某物者至化無私殊祥畢萃既光史策允叶元符臣某中謝伏以西方主白金氣應秋故靈禽頻見於塞垣元貺實昭於人事遂使載飛之類皆呈受采之姿以物窺天知天感聖犬戎柔服必無犯於西方禾黍豐登將有成於金象假茲毛羽降彼藩隅既來獻於帝居獲同觀於公府何能翼戴徒荷休明臣等無任舞詠聳抃之至臣某言今月某日中使某至奉宣聖旨賜臣布一千匹絹二千匹者臣某誠哀誠感頓首頓首臣災集衰門禍貽諸父執禮既循於經典成喪將服於冠裳何言臣子之情必軫君親之念近效承命飛星忽降於重霄寵數有章束帛載頒於內府哀榮曲被跪受難勝上感聖慈臣無任涕泣惶越之至右伏以香火至誠祝後天於萬歲弦匏飾喜會率土於三春敢望宸衷恩隆輔弼王人遞降寵錫爰加酒醞繼陳炮燔兼至名茶馥郁嘉果駢羅嘗珍而食指先驚敢忘盈滿竊位而憂心已醉寧待獻酬仰望睿慈臣某等無任兢感歡忭屏營之至臣某言今月某日中使某至奉宣聖旨頒示御札以貶黜張道古事更令申誥中外者聖旨昭垂㣥情胥悅臣某中謝臣伏念元和中吏部侍郎韓愈因陳佛骨遂拜封章以為前古奉佛帝王年代猶促憲宗以人臣去就乖忤非輕震怒所臨遂竄荒裔憲宗英主韓愈名臣典記可行事無不順今張道古狂瞽所獻斥犯非常凡曰在庭皆知難恕深宏睿哲且欲含容雖匿瑕之道則然於犯上之名斯重臣等請行譴逐陛下尚顧物情宸翰所臨皇言曲被盡賀為君之盛咸知六德之能捧戴聖慈如親丹扆臣某等無任銘篆兢越榮感之至臣某等言臣嘗讀漢史竊見上官桀桑宏羊皆惡霍光之忠於王室也欲奪其權遂詐為燕王上書言光將有非常之變而昭帝知其詭詐欲害賢良顯發怒言保明元輔識者以為漢昭之聰睿遠過周成臣等每閲其書實感其事以為後代不復有之今月某日獲延英奏事親奉聖言且以陛下深懼艱屯欲清教化寤亂階於前事窮蠹本於小人既已誅鋤方期屏絶而常有技術賤微之輩班行險躁之徒潛結詭謀輒投邪隙且相援引遂有譖傷間諜滋深根株甚巨而聖心不動睿鑒有融盡辨讒諛靡容交亂致臣於不疑之地知彼有禍人之心且赫揚於斯必令懲革覬於左右永杜奸邪臣等且懼且驚載思載感還至公府未知所安樞密使某等又至中書備傳睿旨伏知是李遂劉達等共謀推薦李潔秉政因此大惑天聽君臣之所難聞乾坤之所共棄有李遂之奏肆志巧言而陛下不以為疑祗以為怒凡所布諭必盡洪纎某等復宣陛下之言不惟保任臣等兼欲擊斷此輩彰明我心臣等稟命而思激情以泣自有邦國誰無君臣今此讒邪忍施陷穽密搆於一夫之口何術可知潛行於萬乘之前何人敢辨雖陛下察之不惑隱之不言有此釁端加於輔相臣之寤寐將至驚狂一旦親奉堯言俾行漢律使罪人斯得餘才自安復使微臣必無他慮食駃騠者未足為德喻媒孽者未足為辭李遂輩擠臣於不測之溪陛下賜臣以援溺之手誣臣以難明之罪陛下諭臣以必信之言彼昭帝之時漢家方盛霍光之辨且有詐書今李遂得於艱苦之朝進傾危之說宸聰之外孰可得聞則臣等塗汙一浸江漢難濯歿為野土誰為呌閽不有睿明焉知昭釋感入骨髓誓諸神祇千拜首以何為一剖心而始足惟當竭誠啓沃戮力弼諧盡毀家紓難之謀繼圖國忘身之策尚疑丹悃未答皇私荷聖感恩臣等無任抃蹈兢栗涕泣屏營之至臣某言自中使馬承倩送臣卻至所部漢川回監軍中使孟遊仙等續發北面拜天南旋舊鎮望九門而彌遠顧三蜀而何情如丹之心具列前表庶明臣子之分以期君父之知臣某中謝臣四度興師每冬獻捷願將邊事親達宸聰比恐三軍阻臣行計潛裝密辦亦既經年上都贏糧傍路支費事皆前定誓衆遂行日望京闕天威咫尺豈知時乖運末屬彼外虞徵發之期指蹤又切進退難處倣徨以還有心未明有口猶閉若撻之恥空思於堯舜戀主之誠倍慙於犬馬臣知從事官王欣傅遙自經驅使積有歲時言行惟一為臣腹心當今切務具如別狀悉令密啓遠達由衷伏乞聖慈俯回神鑒仍賜容納許以畢辭天下幸甚天下幸甚其有不載文墨更令附口奏聞皆是刳心所陳豈為億中之說倘可裨補雖死猶生區區赤實敢希萬一臣以今月某日卻至成都訖整齊戎事即赴行營西藩動靜續冀奏聞衆星微象長拱北辰勺水細流盡朝東海惟臣不及飲恨何言無任感戀屏營之至謹奉表陳謝以聞臣某言伏奉今月某日敕命授臣親兄太常卿檢校右僕射者霈澤下臨私室相慶臣某誠歡誠荷頓首頓首臣兄某抱公藏器據德有鄰為善而不欲近名從政而但思利物自臣遽升台輔獲導化源雖向國去私戒臣常切而入門避事遠謗每深出趨垂拱之朝退務掩關之樂陛下禮行舟楫念及塤篪慰其友愛之懷進以優崇之秩伏以九卿之位歷代所尊舜以三禮命伯夷漢以奉常加稷嗣倚古則重得人始光用典之難敢言兄氏方懷慚惕忽荷皇私而階峻銀青寵兼端揆喜溢在原之屬恩加當軸之臣既激弼諧且宏名教股肱作輔莫成鎮撫之功手足相須但有胼胝之誓臣無任愧竦之至臣某言臣聞古之王道美在詩人爰徵式宴之名則有鹿鳴之什俎豆既列筐篚亦陳㣥臣享而受之得使盡其心也能追古道實在哲王臣某中謝伏惟尊號皇帝陛下聖文有作臨照克明昨者以告見祖宗率兩宮而偕行重典祈禱天地感百神而已報豐年方屬清和更宏慈惠遂當暇日乃闢廣場既接輔臣兼延卿士我心則悅洞開咫尺之顏不醉無歸畢降獻酬之禮而又深形睿旨新製樂章但臣等忠則有思拙而無補陛下勉其翼戴播在弦歌竊聽鏗鏘空知慚感為恩如此何力可勝徒以宮殿飾同疑文符混一舞成奇字更俟太平待季子之請觀笑吳宮之教戰盡如解慍詎異聞韶況凡有嘉籩親令下筯臣細之事指顧不違鴻私曲被於茲辰寵遇頗踰於往列仍蒙賜賚且極纎華伏自侍宴已來還家自省燮理欲酬於元造終乏嘉謨傳聞空遍於遠方彌光聖德君臣共樂史冊可書臣某等無任銜恩涕感歡榮忭躍之至臣某等言臣聞謂傾心於百辟向日雖同觀拱極於衆星在天各遠所以會朝之地每隔丹墀而燕私之嘉忽親黼扆注渥恩而則可求故實以未聞事出常倫感深庶位臣某等伏以考擊鍾鼓鋪陳几席恭惟列聖常命周行且屬宴安仍須物用匪勞規畫始就歡娛今陛下以尚念多難不為自逸外闕貢輸之數內無饒羡之資蓋以臨昧旦而謁宗祧彞章必具仰昊天而祈稼穡甘澤已頻方當行慶之時且欲與人同樂昨者昭垂睿眷俯接㣥僚忘憂而飲備六清既飽而羞踰百品戒膳夫之失飪詔酒正以如澠賜者鮮闕行之皆遍飾喜則聲從禹律製曲則音自堯聰樂和而鳳鳥應來舞妙而薰風共轉曲形文字全為生靈承天詔以咸觀兼聞金石泛恩波而已醉不待樽罍柏梁殿唯召詞臣華林園亦非密座共當異寵難並茲辰光束帶而更勵立朝顧綵繒而彌慚勝質則微臣非徒享滋味聽鏗鏘而已霑纓感德稽首拜章臣某等無任荷恩激切榮耀屏營之至謹奉表陳謝以聞臣某言伏奉某月某日制命追贈臣亡曾祖某贈某官亡祖某贈某官亡父某贈某官伏以恩深逝水澤及重泉哀極失圖感惟增懼伏念先臣實逢聖代寵被乘軒之數名傳汗簡之書而隙駟難留隴樹斯拱積感既深於霜露叨榮復忝於陶甄陛下重顧台臣爰加贈典陰陽未序寧施報國之功霈澤遽臨空激承家之志仰惟追命唯自省躬臣某無任荷聖感恩哀榮歡懼屏營之至臣某言伏奉今月某日制書追封臣亡曾祖母亡祖母亡母某國夫人者典常重舉渥澤下流臣某中謝伏以尊號皇帝陛下動法天經用宏王道繼降追榮之命若酬輔政之功竊念微臣謬持魁柄計日月則四時未半調陰陽則六氣未和而聖造曲臨彞章俯及上公端揆已承褒飾之恩大國贈封更荷顯揚之賜康化權而無力顧家牒而有光祗戴睿慈臣某無任哀感激懼屏營之至臣某言伏奉今月一日制書除臣使持節懷州諸軍事守懷州剌史成命俯臨兢魂自失妨賢不退無德而升恩屢錫而知慙祿彌高而愈懼中謝臣聞國經選士有一善而不集作無遺天爵與能從九徵而可試臣薄遊憲府纍踐禮闈衣繡無執簡之才起草愧含香之列移官望苑日月其除驂駕梁園涓埃莫效剖符南峴既恧民謠作鎮西河未寬人隱二一作三邦為政撫熊軾而無功八使回軒同鶴鳴而有薦遂乃謬霑束帛猥賜褒揚頓掩前瑕更延今寵山陽大郡河內名區桑竹蔭淇水之西井田雜邙山之北將何以潤通京邑化接神州雖勉三載之勤何補一年之借封畿之要歷選稱難臣也胡顏敢膺斯寄伏乞再求遺玉更網潛珠庶使賢才申共理之心聖主得分憂之地無任叨竊之至謹詣朝堂奉表陳讓以聞臣所讓人別狀封進臣某言臣昨奉恩命加臣某官者非常之澤稟命實難今月某日已奉表讓訖伏慮聖慈所注宸旨未回纍足屏躬自逃無地遂敢再傾肝膈仰告睿明臣雖至愚非敢飾讓一則副陛下用臣之公道保陛下知臣之遠圖一則惜朝廷之典章重朝廷之爵秩永惟矜鑒在我聰明伏以顯賞之恩殊勳是稱凡施君命必合國章昨者逆將興妖稱兵搆變災匪同於天作患實過於主憂咎在輔臣理當昭憲但臣久罹強劫莫扈出居走間道以獲歸乃王靈之所被免致陷身之禍得陳拜首之容伏蒙陛下特閔驚危盡寬罪戾收雷不振就日復安尚處弼諧空知慙感至於遽停輦輅近駐郊圻廟貌不遙園陵可望是陛下孝通祖考所以不遠京師也又能庇茅茨祇臨草莽潛施英略使殄逆徒坐待梟夷風行號令然後決乘輿之反正慰父老之怨思謀夫自多睿志先定自陛下精感社稷所以不移節序重啓昌期咸資聖斷臣將何力可助元功比者殊渥遽臨莫知所以為賞之僭懼及淫人春秋正言國家大事聖朝行之則有損微臣受之則無名且臣叨荷休明貴為宰物兢兢守道尚懼尤汲汲經邦未能報效今伐叛之地實非近藩虜馬方飲於渭川戎帳頗施於秦甸農商半收疑貢賦鮮通中外未安宵旰多慮凡垂恩澤先布瘡痍次及勳功方為闕十字元和聖武乃顧淮西宰臣裴度總統全師削平宿寇勤勞忠烈史策昭煥獻捷還都書勳行賞持衡之地但加金紫之階詎是憲皇之恩澤不深裴度之勳名不盛此乃愛重彞憲保持大臣遂令賞薄於功欲使衆稱其美列祖遺法陛下聿修在臣感恩欲增聖德中書故事常欲兼官雖當敘進之間亦在歲時稍久錫之有度拜者則安臣又非宜朝將何論真食之命令典俱存求而論之斯事非細軍儲方困公聚正虛郡國凋殘乃陛下殷憂之本臣僚艱窘是陛下軫恤之秋而宰臣獨以膏腴贍其封邑人情頗惑事理不通承命以來連宵審度粗能祇荷皆欲寵光何敢進犯天顏尚煩俯察誠憂赫怒其可苟安不言則負任使之恩有讓則違奬錫之旨有違無負明主必容情激辭多憂緣寵過伏乞特回沛澤且使燮調息致寇之危疑合興邦之理道臣某無任死請迫切懇悃之至臣某言臣昨蒙聖恩加臣某官實封等瀝誠雖切天鑒未回今月某日又奉宣命賜臣持危匡國致理功臣者寵光踰溢俯僂驚惶昨已奉表陳讓訖恩出一時事非常典衆方興論內不自容是以伏紙寫心纍干睿鑒未蒙俞允匪獨驚危朝省夕思且涕且激臣腐材弱質叨列公台何施尊主之能未立為臣之節而艱難之後陛下待遇愈優食必分甘言皆動色宏慈厚禮前代所無比及今茲適當反正斷自不疑之旨遽行非次之恩則臣竊驚孤心兼量愚分仰酬萬一且合如何至使堅讓未休蓋亦深知不可上惟聖德恐有失中受詔之難血誠在此陛下以歸復之慶謂臣有參贊之功嘉謀既出於元機勝略必資於英決恭惟茂實前已備論上聖推不宰之心而具臣乏可書之績則甄賞之命遵行及私唯增鄉校之言兼致胸奴之笑否臧是驗損益可知況臣在中書又殊同列彥若與博執政在臣之先或纍歲燮和或踰年鎮撫弼違斯切成效固彰臣自再忝秉鈞初當變律未調鼎餗徒辱車茵遂罹向闕之兵莫救燎原之火至於今日無補大朝寵奬重恩俯躬非稱伏以奠食之命雖著舊章蓋上將平戎大勳卓立超酬特賞始可勝任行於文臣此事固少況在今日不並往時天下編氓殆無膏血筋力盡疲於戰伐經營多廢於耕桑所在聚兵肆為厚斂不免者痛侵刳剝可免者患至流亡鄉弊家殘不勝條說寧於此際更可重傷兼計百戶之封歲當五百餘萬軍儲常廢國用急須以此校之所濟非少今陛下焦勞睿算臣等涸竭智謀蓋為朝廷日憂匱乏曷若回非宜之恩命救急務於公家聖慮既寬臣心自泰生人不加於怨苦經費自濟於艱危宏陛下為國之資伸微臣代天之極幸以是竊度實敢固違加臣之名本加疑武將伏自先帝興復之後宰臣特授殊恩且類權宜何光定制況臣執政為日未多安可輒冒憲章當此多數伏自陛下光承丕構實耀英謀如秦權黃鎬之凶徒及近歲甫誅之大寇載揚我武克致明刑此外凡有凶渠未嘗漏網聖功神略可謂赫然去年公卿等合彼兆庶之心遂有鴻名之請封章四上伏奏纍陳陛下以時未戢兵人多言病不循令典不顧㣥情久執至謙畢奪衆懇作聖有歸於公望上言敢犯於聖明夫元首股肱闕二十二字陛下讓懿號於去年臣則受巨名於今日闕六字不同一體之榮與之則臣蒙姑息之愛矧於事實未合便宜近者國之名器多假諸侯法度久踰改張何暇宰臣謹畏再務率先尚慮驕矜不能警戒陛下若於朝廷未安之際藩方難制之時忽使輔臣併加殊事則勳侯戎帥越例貪求中書自思無以奏奪空煩聖慮益壞政經是因今日之恩復作他時之患諒非細故得不極言纍陳切讓之辭庶獲洞開之鑒上祈聖哲備識愚衷寵渥未收憂心如灼生惟富貴誰無崇盛之謀禍在滿盈臣有顛危之懼方承任使必覬哀矜伏乞聖慈速降明詔允許臣某無任瀝血輸懷祈恩俟命激切惴悸之至謹奉表陳讓以聞臣某言臣叨膺殊渥特越常倫一縷千鈞非能比重纍棊加卵何足為危是以繼獻封章面陳肝血宸衷益注寵數不移未允愚私如中狂疾伏以皇帝陛下恢張天覆優遇宰衡流澤而唯恐不深錫爵而唯恐不重欲行君德更邁古皇茂典畢申睿慈未足內惟感激旁有神明則臣報效之端合識安危之道臣昨者辭讓繼具鋪陳不敢更俟煩文上干聖覽但以陛下大崇儒術多悅㣥書經誥之間講論尤切察臣子去就之分考生人禍福之源固以精辨否臧盡詳炯戒今臣之懇激尚敢披陳夫貴而知懼者春秋所書祿不期侈者尚書之訓苟忘斯論何以全身況臣之生年歲當丙子四十強仕血氣方剛求之族類之間初在簪裾之列而臣亨逢廣運夙忝重官爰自前年已居台輔至於今日復列鼎司享於極位之中處在㣥寮之上潛憂弔者已在臣門凡有寵光每宜畏避則官無厚謗天祐微躬上可以永保陛下之恩次可以善守先臣之嗣是非之際物理甚明如或終自昏迷仍貪寵利害盈之罰更在何人太盛之災不到他日今陛下以崇名重器豐祿殊榮併壓臣身必速天咎倘此期未至尚或苟容而焚灼常苦於寸心芒刺日加於四體精神紛擾疾疹交侵便至乞骸何能充位雖臣欲陳綿力粗補萬機更策懦才或康庶政固無門於立效徒抱恨以自尤且臣在同列之間擢用最近等衰之制輕重有宜今臣所蒙制命授集賢殿大學士序遷彞典寵飾新恩難有固違謹當祗受其功臣名號官階爵賞實封等深思僭溢必致邅災敢徼飾讓之名願擇常存之福且將勤勵獲佐盛時直露情私寧欺君父伏乞聖慈終賜矜允臣某無任迫切泣請恐悸之至
