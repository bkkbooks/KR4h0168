front:
  text: 全唐文欽定全唐文卷六百六十六白居易十一
  hash: sha256:16faf8905b5d8c3ba3b2a52cb15b5737b554a386cb33886575a079968927f493
body:
  text: 維長慶元年歲次辛丑四月庚寅朔二十一日庚戌皇帝若曰唐有天下垂二百載列聖垂拱八荒即敘舟車之所及日月之所照威綏仁董罔不嚮化惟北之氣積厚而靈靈發象生生為豪傑義信武烈代為名王南西東方亦有君長較雄鬬智莫之與京國朝已來寖漬風澤或効功伐或申婚媾同和協比以訖於今今朕不得祗嗣大統推義布信以初為常矧乎柔遠申恩睦鄰展禮茲為舊典垂自祖宗虔奉恭行安敢失墜咨爾九姓回鶻君登里羅羽錄歿密施句主錄毗伽可汗地生奇特天賜勇智英姿所莅雄畧所加諸戎雜虜愛畏柔服風靡山立清寧一方宜人有土受天百祿時推代嗣實來告予曰予一人實隣冊命是用遣使朝議大夫檢校左散騎常侍兼少府監御史大夫雲騎尉賜紫金魚袋裴通副使朝議大夫守少府少監兼御史中丞襲魏國公食邑三千戶賜紫金魚袋賈疄等持節備物冊為登里羅羽錄沒密施句主錄毗伽可汗於戲善必有鄰德無不荅此崇恩禮則彼竭信誠克保大義永藩中夏昭昭天地實聞斯言維長慶元年歲次辛丑某月朔某日皇帝若曰北方之強代有君長作殿元朔賓於皇唐粵我祖宗錫乃婚媾五聖六紀二邦一家此無北伐之師彼無南牧之馬兵匣鋒刃使長子孫叶德保和以至今日咨爾回鶻君登里羅羽錄歿密施句主錄毗伽可汗義智忠肅武決勇健天之所授時而後生故東漸海夷西亘山狄惠寧威制鱗帖草偃聲有聞於天下氣無敵於荒外而能事大圖遠納忠貢誠請仍舊姻誓嗣前好朕惟睦鄰是務柔遠為心既降和親之命遂申飾配之禮禮物大備寵章有加喜動陰山光增昴宿夫以回鶻雄傑如彼慶榮若此雖自貴曰天驕子未稱其盛雖自尊曰天可汗未稱其美宜賜嘉號以大誇將來今遣使某官某副使某官某等持節加冊為信義勇智雄重貴壽天親可汗於戲降展親大德也進冊加號大名也宜乎思大德稱大名懋哉始終欽若唐之休命維長慶元年四月某日皇帝若曰朕聞古有履忠仗順生而大有為者又有功成身退歿而永不朽者非正氣令德間生挺出則高名大節孰能兼之哉故天平軍節度使檢校司徒兼侍中楚國公劉總降自天和生為人傑得君於先帝叶運於昌時纂戎弓裘守土燕薊迨此一紀北方晏然有開必先納款於我沈斷大事奮揚奇謀捧幽都四封之圖挈盧龍三軍之籍盡獻闕下高謝人間感動君臣驚激忠義顧妻子若脫屣視富貴如浮雲惟道是從奉身以退仲連事成而蹈滄海子房名遂而追赤松賢明所歸今古一致朕方改授兵柄移鎮鄆郊命作司徒倚為左相期奮乃志將沃朕心而天不憗遺邦失柱石夫臣戴君如元首則君視臣如股肱股肱或虧何痛如是茲朕所以廢朝軫念備禮加恩庸建爾於上公蓋褒贈之崇重者也嗚呼爾總尚知之乎今遣使某官某副使某官某持節冊贈爾為太尉臣某等言伏奉今日制書大赦天下者臣與百執事奉揚宣布與億兆眾蹈舞歡呼自天降和率土同慶臣等誠歡誠忭頓首頓首伏惟皇帝陛下出震御極建元發號大明升而六合曉一氣薰而萬物春肆眚措刑滌瑕蕩穢凡在黔首納於歡心矧又祗祀天地孝享宗廟蠲減租賦策徵賢良褒德及先賞功延嗣敬賓養老念舊睦親生人之積弊盡除有國之頹綱必舉况陛下承二百祀鴻業之重纂十一聖耿光之初始奉嚴禋新開寶歷天下之目專專然觀陛下之動天下之耳禺禺然聽陛下之言斯則陛下出一言不終日必達於朝野舉一事不浹辰必聞於華夷當疲人求安思理之秋是陛下敬始慎微之日苟行一善則可以動人聽而式歌舞况具眾美信足以感人心而致和平康哉可期天下幸甚臣等謬居重位幸屬鴻休慙竊股肱喜深骨髓歡忻悚躍倍萬常情無任鼓舞慶幸之至臣某等言今月二十四日臣等已陳表章請上尊號愚誠雖懇聖鑒未迴蹐地跼天不勝大願臣等誠惶誠恐頓首頓首臣聞大道者無求於物物尊而不辭至公者非欲其名名生而不讓不讓故與天合德不辭故率土歸心斯所謂應乎天而順乎人者也伏惟皇帝陛下嗣興一德統牧萬方致時俗之和平納生靈於富一作福壽金革已偃銷七十載之厲階玉燭方調啟一千年之聖運天人合應書軌混同而鴻名未加盛典猶缺華夷失望史冊無光此誠君上之謙然亦臣下之罪也今臣所以上稽天意下酌人情再黷皇明重陳丹慊臣謹按書曰思曰睿睿作聖又曰乃聖乃神乃武乃文經曰明王以孝治天下凡此五者歷觀列辟雖甚盛德莫能兼之伏以陛下自即大位及茲二年無巾車汗馬之勞而坐平鎮冀無亡弓遺鏃之費而立定幽燕仁和一薰獷驁盡化可不謂睿文乎削平天下震耀八荒北虜求婚以稟命西戎乞盟而納威靈四及奔走來賓可不謂神武乎陛下以萬乘之尊四海之富供養長樂道光化成推而致之可塞天地可不謂孝德乎故臣等敢冒死稽首上尊號曰睿文神武孝德皇帝伏惟陛下畧撝謙之小節宏祖宗之大猷惟十一一作二聖在天豈忘繼其志以億兆人為子寧忍阻其心特迴宸衷俯受徽號在元穹不為主宰於盛德有所形容煥乎大哉垂裕無極此實天下之幸甚非獨臣之幸也臣等無任誠願懇禱之至臣某言伏奉今日制書授臣某官同中書門下平章事者寵擢非次憂惶失圖蹐地跼天不知所措臣某誠兢誠惕頓首頓首臣聞上理陰陽下平法度外撫夷狄內親黎元使百官各修其職一物不失其所此宰相之任也臣有何功德有何才能越次超倫忽承此命下乖人望上紊朝經致寇速尤無甚於此臣謬因文學忝列班行先朝乏人擢居內職星霜屢改爵秩驟加未逾十年忽登相位名浮於實任過其才豈唯覆餗是憂實累知人之鑒况陛下肇開歷數將致升平輔弼之臣尤宜慎擇臣粗知古今敢言本末樞衡要地初不得人則理化勞心終無成日此所以重陳手疏再瀝血誠乞迴此官別授能者臣若得請便不負恩情見於辭非敢飾讓皇天白日實鑒臣心無任懇屏營之至謹奉表陳讓以聞臣某言伏見二月二十二日制書逆賊李師道己就梟戮者皇靈有截睿算無遺妖氛廓清遐邇慶幸臣某誠歡誠喜頓首頓首臣聞亂常干紀天殛神誅李師道包藏禍心暴露逆節罪盈惡稔眾叛親離未勞師徒自取擒戮伏惟睿聖文武皇帝陛下文經天地武定華夷凡是猖狂無不誅剪兩河清晏四海會同昇平之風實自此始臣名參共理職忝分憂忭舞歡呼倍萬常品守官有限不獲稱慶闕庭無任慶快踴躍之至謹具奏聞謹奏臣某言伏奉七月十三日制書大赦天下跪捧宣布蹈舞歡呼自天降休率土同慶中謝臣聞元功盛德非鴻名不能形容物厲人疵非皇澤不能滌蕩自非上聖莫能兼之伏惟元和聖文神武法天應道皇帝陛下纂承大業子育㣥生信及豚魚威殲梟獍削平寰海混一車書億兆一心願崇大號從人欲而俯膺盛禮賜時和而廣洽皇恩蠲減賦租收拔淹滯命黜陟而別能否開諫議而策賢良宿弊必除舊章咸舉帝王能事盡集於今凡在生靈孰不幸甚臣謬當委擢職在頒條忭躍之誠倍萬常品限以守官不獲稱慶闕庭無任慶忭之至臣某言臣聞聖明在上刑政叶中則天地氣和風雨時若常聞其語今見其時臣某等誠歡誠躍頓首頓首臣伏以陰陽氣數盈縮相隨去秋多霖今春少雨宿麥猶茂農功未妨陛下念物憂人先時戒事靡神不舉有感必通故雲出於山月離于畢初灑塵以霢霂漸破塊而霶雨氵它圃囿田疇無不霑足雨之所致臣知其由自上而來雖因天降從中而得實與心期發於若厲之誠散作如膏之澤凡在率土孰不歡心臣等位忝鈞衡職乖燮理仰陰陽而增懼顧霖雨而懷慙無任兢惕之至臣某等言伏承某道逆賊某乙某月某日已被某殺戮訖皇靈震耀兇孽梟夷率土普天歡呼鼓舞臣等誠喜誠忭頓首頓首臣聞亂臣賊子阻兵干紀者明則有天討幽則有鬼誅遲速之間罔不殲殄伏惟文武孝皇帝陛下君臨八表子育㣥生合天覆地載之德順春生秋殺之令宿寇遺孽闇然銷亡四海九州廓然清晏逆賊某乙一介賤隸兩河叛人包藏禍心竊弄凶器戕害主帥虔劉善良幕燕鼎魚偷活頃刻顛木之餘枿痤疽之遺種斧斨欲加而先折鍼石未攻而自潰不有弔伐孰知德威不有妖氛孰知神算則天下之心有以知順存逆亡其猶影響者也臣伏以某乙既已斬首某乙將何保身若不乞降即應生變輔之或在車則相依皮既不存毛將安附况我乘破竹彼繼覆車止戈之期翹足可待無任喜慶忭躍之至臣某等謹言臣聞堯湯之逢水旱陰陽定數也宋景之感熒惑天人相應也蓋天地大統不能無災皇王至誠可以銷慝嘗聞此說今偶其時臣等誠欣誠幸頓首頓首伏見司天臺奏今月一日太陽虧者陛下舉舊章下明詔避正殿降常服禮行於已心禱於天天且不違物寧無應况正陽月朔亭午時中和氣周流密雲布濩蒙然暫蔽赫矣復明屏翳朝隮但驚若煙之涌曜靈晝掩不見如月之初所謂誠至於中而感通於上也臣等敢不再陳事理重考禎祥三光忌盈必有時蝕萬物莫覩與無災同慶生交感之間喜浹照臨之內雖卿雲五色瑞景再中除沴致祥曾何足比百辟伏賀萬人仰觀事彰天鑒孔明道配日新其德臣等幸遭昌運謬荷殊私皆乏濟時之才同居待罪之地日月薄蝕自慙燮理無功山川出雲實賴聖明有感感賀欣戴倍萬常情無任忭躍竦踴之至臣植言臣有情事久未敢言今輒陳露伏增戰灼臣亡父某官亡妣某氏是臣本生亡伯某官某贈某官臣今承後建中初德宗皇帝念臣亡伯位高無後以猶子之義命臣繼紹仍賜臣名嗣襲雖移孝思則在上荷君命永承繼絕之宗中奪私恩遂阻劬勞之報歲月曠久情禮莫伸自去年已來累有慶澤凡在朝列再蒙追榮或有陳乞皆許迴授况臣猥當寵擢謬陟台階爵祿之榮實有踰於同輩顯揚之命獨未及於先人飲泣茹悲哀慙兩極臣今請以在身官秩幷前後合敘勳封特乞聖慈迴充追贈倘允所請無幸於斯則臣烏鳥之心猶再生而展養犬馬之力誓萬死以酬恩蹐地仰天不勝感咽披陳誠懇煩黷宸嚴無任惶懼激切之至謹奉表陳露以聞臣某言臣以去年十二月二十日伏奉勅旨授臣忠州刺史以今月二十八日到本州當日上任訖殊恩特獎非次遷榮感戴驚惶隕越無地臣某誠喜誠懼頓首頓首臣性本疎愚識惟褊狹早蒙採錄擢在翰林僅歷五年每知塵忝竟無一事上荅聖明及移秩宮寮卑冗疎賤不能周慎自取悔尤猶蒙聖慈曲賜容貸尚加祿食出佐潯陽一志憂惶四年循省晝夜寢食未嘗苟安負霜枯葵雖思向日委風黃葉敢望霑春豈意天慈忽加詔命特從佐郡寵授專城喜極魂驚感深泣下方今淮蔡底定兩河乂寧臣得為昇平之人遭遇已極况居符竹之寄榮幸實多誓當負刺慎身履氷勵節下安凋瘵上副憂勤未死之間期展微効跼身地遠仰首天高螻蟻之誠伏希憐察無任感激懇彷徨之至謹遣某官某乙奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言臣某言去年七月十四日蒙恩除授杭州刺史屬汴路未通取襄陽路赴任水陸七千餘里晝夜奔馳今月一日到本州當日上任訖上分憂寄內省庸虛仰天感一作戴恩跼地失次臣某中謝臣謬因文學忝厠班行自先朝黜官以來六年放棄逢陛下嗣位之後數月徵還生歸帝京寵在郎署不踰年擢知制誥未周歲正授舍人出泥登霄從骨生肉唯有一死擬將報恩旋屬方隅不寧朝廷多事當陛下旰食宵衣之日是微臣輸肝寫膽之時雖進獻愚衷或期有補而退思事理多不合宜臣猶自知况在天鑒忝非土木如履氷泉合當鼎鑊之誅尚忝藩宣之寄才小官重恩深責輕欲答生成未知死所唯當夙興夕惕焦思苦心恭守詔條勤恤人庶下蘇凋瘵上副憂勤萬分之恩莫酬一二仰天舉首望闕馳心葵藿之志徒傾螻蟻之誠難達無任感恩激切之至謹奉表稱謝以聞臣某言伏奉今月日制書授臣守本官同中書門下平章事者殊常之命非望之恩出自宸衷加於凡陋竦駭震越不知所為中謝臣伏准近例宰相上後合獻表陳謝臣今所獻與眾不同伏惟聖慈特賜畱聽臣伏聞元宗即位之初命姚元崇為宰相元崇欲救時弊獻事十條未得請間不立相位元宗明聖盡許行之遂致太平實由於此陛下視今日天下何如開元天下微臣自知才用亦遠不及元崇若又僶俛安懷因循保位不惟恩德自負實亦軍國可憂臣欲候坐對時便陳當今切事下捄時弊上酬君恩臣之誓心為日久矣陛下許行則進不許則退進退之分斷之不疑敢於事前先此陳啟况臣才本庸淺遭遇盛朝天心自知不因人進擢居禁署訪以密謀恩獎太深讒謗竝至雖內省行事無所愧心然上黷宸聽合當死責豈意憐察曲賜安全螻蟻之生得自茲日今越流輩授以台衡拔於萬死之中致在九霄之上捫心撫已審分量恩陛下猶不以眾人之心待臣臣豈敢以眾人之心事上皇天白日實鑒臣心得獻前言雖死無恨無任感恩懇之至謹奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言臣居易言伏奉三月四日恩制授臣使持節蘇州諸軍事守蘇州刺史臣以某月二十九日發東都今月五日到州當日上任訖時當明盛寵在藩條祗命荷恩以感以懼臣某誠歡誠幸頓首頓首伏惟皇帝陛下嗣膺歷數重造寰區將致昇平在先政化詢求牧守勤卹黎元實陛下慎選惟良之秋責成共理之日也臣以微陋早忝班行前自中書舍人出為杭州刺史幸免敗闕實無政能巳蒙寵榮入改宮相今奉恩寄又分郡符獎飾具載於詔中慶幸實生於望外况當今國用多出江南江南諸州蘇最為大兵數不少稅額至多土雖沃而尚勞人徒庶而未富宜擇循良之吏委以撫綏豈臣劣之才合當任使然既奉成命敢不誓心必擬夕惕夙興焦心苦節唯詔條是守唯人瘼是求諭陛下憂勤之心布陛下慈和之澤則亭育之下疲人自當感恩而歲時之間微臣或希報政塵瀆皇鑒吐露赤誠寵至空驚恩深未答無任慙惶懇激之至謹差軍事散將某乙奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言臣聞皇階肇興必本其丕烈明號允屬將御其成功所以開天地命歷之符合人靈慶感之運臣等輒敢上稽天鑒下采人謠以今月十九日瀝懇陳辭冀孚睿聽九重尊祕萬有禺禺誠如動天心如履薄臣等誠惶誠恐頓首頓首伏惟睿聖文武皇帝陛下一德繼統上符十天六龍時乘下壓㣥嶽張寶圖以光帝載懸玉鏡以澈襟靈休明會朝則百神冥衞清淨子物而萬邦式孚今夫陰本於刑陽稱其德以刑而右武以德而尚文蓋將導人君無為之初官天道有成之始今陛下宣威紀功示人以武也業古垂統示人以文也纂炎唐十一之盛陋宗周八百之期序庶徵於域中惟賜履於閫外宇宙至廣每驚符瑞之繁動植殊輕奚答生成之造昔之述夏禹美宣王雖外軼其聲而中未盡善孰若陛下慮及一物精入萬樞發揮盛祉啟迪鴻業自彼元和至於茲歲掃㣥妖清巨祲率黎崇之不恪剗節枿之方圓或身暴都市或首懸藳街天英神斷不疾而速雖堯伏四罪殷征三年揆之於今彼有慙德固當仰應名實丕隲鴻徽闢乾位於象帝之文飾宸耀於稟氣之類豈可抱沖謙之微事曠祖宗之大猷臣等不勝由衷大願願上尊號曰元和聖文神武法天應道皇帝伏願納天人之貺采臣庶之誠昭示至公允塞㣥議無任悃迫慺慺之至臣聞古先哲王垂衣御極何嘗不取鑒祖則作為盛猷伏觀列聖以來必崇明號既以表域中之大亦以示天下之公苟或沖讓未行撝謙不發則無以焜煌前烈威畧外區臣等所以披誠上陳冀垂明聽墨詔批答天心尚違臣庶禺禺不知所措臣等誠惶誠恐頓首頓首伏聞開元天寶之盛也典章大備劍㦸已銷表德顯功累上尊稱蓋天人之符契不得已而從之陛下稟上聖之姿造中興之運踐臨土宇虔奉宗祧恢復兩河廓清四海象天為大竝日之中丕業巍乎已成鴻名鬱而未稱臣等所以采前古之議酌當今之詮敢悅懌於天顏冀光昭乎史冊百辟卿士皆以為宜萬方黎元固不可忽陛下損之於其成之代棄之於太寧之時尚以河湟未收關隴設備而欲更施利澤方啟舊章執謙德而彌仰崇高議神功而無以彰灼億兆延頸靈祗顧懷率土之人皆知不可况天地之意祖宗之靈乎臣等命偶昌期職叨樞近雖微誠不足以上感而懇願終冀於必從伏乞深惟訓謨特降宸慮允華夷之至望回日月之殊輝誕受鴻名光膺大慶紹五帝三皇之絕典光九廟萬國之丕休人神交感孰不為允無任懇款兢惶之至臣聞仰稽舊章虔上尊號懇誠三瀝沖旨未回朝野禺然罔知攸措臣等誠惶誠恐頓首頓首臣聞帝王御極作人司牧德盛者爰加顯號功高者必建鴻名是用叶天地之符塞人祗之望榮非為己義實徇公爰在累聖必從眾欲矧陛下踐寶祚握瑤圖懸日月而照九圍鼓雷霆而清八極故得吳蜀電滅齊蔡砥平攄祖宗之宿憤救黎元於焚溺今者威加四海澤浸八荒文軌罔不同華夷罔不服政刑罔不舉符瑞罔不臻闢再造之宏規致中興之昌運而典冊猶鬱徽號未崇何以副萬國之心何以答三靈之貺臣等謬居樞近累黷宸嚴望九重之俯從為千載之榮遇雖則祈天之奏伏蒲而未感所冀回日之誠傾藿而必遂臣等不勝懇款屏營之至臣某言臣聞主聖臣忠聖主既明臣輒獻至忠之誠上明國之典下去邪之疑伏望陛下納臣之諫則海隅蒼生兵屯咸偃無大臣之諫則國必敗有大臣之諫則國必安非疑元稹之其事有實亦不虛矣矯詐亂邪實元稹之過朝廷俱惡卿士同寃裴度論議之謀陛下已令獎度之勳不允所請理已為乖今陛下含忍不為竄逐處之臺司同議國典天下人心無不惶戰何執元稹之言居度散司之職且同議裴度今功業今代一人卿侯士庶無不同惜今天下欽度者多奉稹者少陛下不念其功何忍信其奸臣之論况裴度有平蔡之功元稹有囂軒之過東都畱守誠即清閒人勞之功不合居於散地伏望陛下聖恩照明竝無矯言伏乞追裴度別議寵榮臣素與元稹至交不欲發明伏以大臣沈屈不利於國方斷往日之交以存國章之政臣等職當諫列不敢不奏謹奉表以聞無任兢迫戰切之極瞻望迴恩天下同慶謹案文苑英華註云元白交分始終不替方元傾裴白不應有此論列集固無之光謂君直友逆則順君以誅友古有行之者則此奏亦不為過但白非其人也與元稹二表俱非是當以唐書為正唐家制度每征伐專委將帥責成功比年始以中人為都監韓全義討淮西賈良國監之高崇文討蜀劉貞亮監之且興天下兵未有以中人專統領者神策既不置行營節度既承璀為制將又充諸軍招討處置使是實都統恐四方聞之必輕朝廷後世且傳中人為制將自陛下始陛下忍受此名哉且劉濟等洎諸將必恥受承璀節制心有不樂無以立功此乃資承宗之姦挫諸將之銳陛下討伐本委承璀外則盧從史范希朝張茂昭今承璀進不决戰已喪大將希朝茂昭數月乃入賊境觀其勢似陰相為計空得一縣即堅壁不進理無成功不亟罷之且有四害以府帑金帛齊民膏血助河北諸侯使益富強一也河北諸將聞吳少陽受命將請洗滌承宗章一再上無不許則河北合從其勢益固與奪恩信不出朝廷二也今暑濕暴露兵氣薰蒸雖不顧死孰甚其苦又神策離募市人不狃於役脫奔逃相動諸軍必搖三也回鶻吐蕃常有游偵聞討承宗歷三時無功則兵之彊弱費之多少彼一知之乘虛入寇渠能救首尾哉兵連事生何故蔑有四也事至而罷則損威失柄祗可逆防不可追悔兵多則難用將眾則不一宜詔魏博澤潞定滄四節度令各守境以省度支貲餉每道各出銳兵三千使李光顏將光顏故有鳳翔徐滑河陽陳許軍無慮四萬可徑薄賊開弓高糧路合下博解深州之圍與牛元翼合還裴度招討使使悉太原兵西壓境見利乘隙夾攻之閒令招諭以安其心未及誅夷必自生變且光顏久將有威名度為人忠勇可當一面無若二人者
