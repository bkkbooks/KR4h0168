body:
  text: 繭吾髮以㣥嬉兮乃恣狎於林壑窘世路之榛榛兮匪茲焉而何託仰基矩之惟舊兮豈孱之彼度矧嶄紆而還農兮亦靡勞於濬鑿壯神工之騁奇兮樹一峯而中擢齴鼇鼻而噓空兮湧佛螺而旁絡阜交蹠於艮隅兮俯川塍而黼錯躋遺堞以仰眩兮洶瀑巔而電薄腴卉木以駢昌兮藹葩屏而麝幄滋彩綷以紛翔兮玩韶鮮而戲濯覩㣥物之遂性兮澹吾躬而斯樂笑殊道以狥強兮喜夸鵬而跼蠖雖穴處而志揚兮邈軒肆於宏廓借家國之未忘兮鄙榮伸而陋約鑱貞明而自勗兮行與息而靡怍芳灩灩兮翠帛丿糸帛丿糸泥晨霞兮泊晚煙鬱情條以凝睇裊愁緒以傷年㣥企胥悅幽棲自憐勝事而何人忘返賞心而與我相捐當其玉律驚春香風拂曙晴陽小苑之道紺靄青門之樹繡轂相追金覊並騖攜豔冶以爭出指狹邪而共走耳乚貪壯歲之娛遊惜繁華之易度豈知低摧上國寂寞良辰林幽鶯囀院古苔新暗想歌鐘之會出隨車馬之塵落日歸臥懸琴歎頻孤枕役故園之夢一宵驚白首之人江楓暮兮江水淥蕩覊魂兮勞遠目倚蘭棹兮雨霏霏歷蘋洲兮衣馥馥千古兮此時此地愍輸忠而見逐邊鴻下兮邊草生擁玉帳兮滯龍城折柳厭河梁之贈落梅傳戌笛之聲萬里兮此時此日歎積雪之徒征莫不慘澹傷神迴環縈慮念郢闕以迴首憶帝鄉之歸路雖陽和之暗攻自眇默而誰訴於是情馳天末黛歛閨中徘徊暖榭徙靡芳叢燕泥滴滴而簷壞蛛網迷迷而帳空憐笙罷興挑錦停功怨韶光之虛擲與長夜而還同若斯者固紛爾多狀浩然莫窮彼人情之貿遷繁植物之榮悴何深衷之委鬱謝圜煦於天地縈心夜焚凝魄朝醉同垢衣之莫澣豈萱枝之可慰願昭暢於春臺雪胷襟之滯義西方之鳥有名共命者連腹異首而愛憎同一伺其寐得毒卉乃餌之既而藥作果皆斃吾痛其愚因為之賦且以自警賦曰彼翼而飛罔憎其類彼蟲而螫罔害於已惟斯鳥者宜稟乎義首尾雖殊腹背匪異均休共患寧忿寧己致彼無猜銜堇以餌厥謀雖良厥禍孰避梟鴟競笑鳳凰愕眎躬雖俱斃我則忘類人固有之是尢可畏或競或否情狀靡窮我同而異鉤挐其外膠緻其中癰囊已潰赤舌靡縫緩如闕二字迅如駭附強迎意掩醜自容忘其不校寢以頑凶若茲黨類彼實孔多一勝一負終嬰禍羅乘危逞怨積世不磨孰救其殆藥以至和怪雖厲鳥勿伐庭柯爾不此病國如之何愚嘗賦春情數百言狀其思媚自謂摭眾騷之遺恨遭亂而失今獨憶其間三十五字存於濯纓之東楹云暖融溶兮傍曲塘扶蘭心兮牽藕腸雨絲絲兮羃暗芳阻佳期兮日難忘情煙綿兮悄自傷再拜愚伏以布衣犯將相之威者近皆笑率指愚為狂是輕薄子不能以恢然之量待今賢傑也相公得不念之耶某迹拘世累而業久於山援古勘今思有所發者葢竊惟近朝據重位而勇蹈功名之利恥天下有遺才直吾相國也又敢求吾相之心所以未忍棄生民之望者固非濡濡於富貴豈不以時持大柄事或阻心且後弛張俾無遺恨於不朽耶愚以是竊抃有以企天下之福矣雖在於至愚猶有輕慮誠以相公既當有得賢之盛將尢有惜夫自持既嘗獨決機權將尢以事不足問則黨附之賢或興而專美之道可隘耳請陳其說夫用人固得矣亦在知失之不足葢為明則偽者懲而實者勸且無傷於愛士處事也固濟矣又知謀之不必自我出為知則聽日廣而神不勞且無傷於好謀是道也葢賢哲用之而不竭相公得之而不疑坦懷至公自無愧古然後文尚制科之選武先西北之虞前年已上書蜀相抑簡誕以捐空峻規程而括實則病應適時之宜盡矣此皆相公夙自踐於沉實而小子雖吃悸不能面發願激揚於片時耳非為挾利之資也抑自古釣奇而售跡者既多以分蹇動無所合且實必俟臨機方見其萬一非敢率易併凟尊威干犯之誅則不復自同輕薄子以為疑懼俟命再拜中丞閣下某昔者常從其友於郡邑之鄙其鄰叟有善藝卉木者或從之鬻於都下未嘗不亟售而返人謂之曰里市所貨皆資生之所闕尚有提之汲汲而不克售者今叟晨往暮歸未嘗少滯其所鬻何哉叟曰鬻植之道雖本於天時亦且診於人情耳葢視其人夸其居侈則所翫者必欲朝炫其葩夕味其實矣彼或以勁正自處所植必慕賢良吾皆揣之各衒其所欲焉有曝滯之患哉今閣下前為小宗伯實振惟公之舉庶不孤吾道矣况憲府僚屬繫本朝之輕重是尢宜於慎擇也會昌中杜牧之為補闕陪賀客於孔氏之門獨歛板而前言御史丞風威在取人之得失乃薦邢㣥焉今有邢賁者乃㣥之猶子雅志貞獨且以名節自任其所任其所為亦足觀其所志愚以是輙有里叟之說葢待吾憲丞不薄矣且自古推心苟不望報於其人則未有不堅於著効者愚所任不私而已苟謂言者之輕而捨諸亦非敢以為恥又有王駕者勳休之後於詩頗工於道頗固但其所知方在顯清之地不敢越境以輸其珍耳所與論詩一首亦輙緘獻其他當俟閤下操人柄救時艱而后敢以志英豪之事業者達於執事庶不驅之讐敵也再拜辱示製述甚非所宜敢不以所說陳於左右哉楚宋交怨而使在其間宋人有得玉於其境者遇楚使適至誇示之楚人謀沮其玉請先譽於宋國既獻宋果怒曰玉產於吾土而價張於吾仇是欺我也不果售今吾守道固窮且竊文學之譽是邪競沽虛者之所仇嫉者吾子之才固奇矣乃以所質寘於吾懷是玉者未適於市而噪者已盈於門矣必曰不投知於司空氏必曰不受知於司空氏則雖吾子之奇必足速得志於時矣舍是無他術也所貺益腆不敢發柙幸詳其意勿冒時之所忌文之難而詩尢難古今之喻多矣愚以為辨於味而後可以言詩也江嶺之南凡足資於適口者若醯非不酸也止於酸而已若鹺非不鹹也止於鹹而已中華之人所以充飢而遽輟者知其鹹酸之外醇美者有所乏耳彼江嶺之人習之而不辨也宜哉詩貫六義則諷諭抑揚渟蓄淵雅皆在其中矣然直致所得以格自奇前輩諸集亦不專工於此矧其下者耶王右丞韋蘇州澄澹精緻格在其中豈妨於道學哉賈閬仙誠有警句然視其全篇意思殊餒大抵附於蹇止方可致才亦為體之不備也矧其下者哉噫近而不浮遠而不盡然後可以言韻外之致耳愚竊嘗自負既久而愈覺然然得於早春則有草嫩侵沙長冰輕著雨銷又人家寒食月花影午時天上句云隔谷見雞犬山苗接楚田又雨微吟足思花落夢無憀又夜短猿悲減風和鵲喜靈得於山中則有坡暖冬生笋松凉夏健人又川明虹照雨樹密鳥衝人得於江南則有日帶潮聲晚煙和楚色秋一作戍鼓和潮暗船燈照島幽本集同又曲塘春盡雨方響夜深船得於塞上則有馬色經寒慘鵰聲帶晚饑得於喪亂則有驊騮思故第鸚鵡失佳人又鯨鯢人海涸魑魅棘林幽得於道官則有碁聲花院閉幡影石壇高得於夏景則有地凉清鶴夢林靜肅僧儀得於佛寺則有松日明金像苔龕響木魚又解吟僧亦俗愛舞鶴終卑得於郊園則有暖景雞聲美微風蝶影繁又遠陂春早滲猶有水禽飛上句云綠樹連村暗黃花入麥稀得於樂府則有晚粧留拜月春睡更生香得於寂寥則有孤螢出荒池落葉穿破屋得於愜適則有客來當意愜花發遇歌成雖庶幾不濱於淺涸亦未廢作者之譏訶也七言云逃難人多分隙地放生鹿大出寒林又得劍乍如添健僕亡書久似憶良朋又孤嶼池痕春漲滿小欄花韻午晴初又五更惆悵回孤枕猶自殘燈照落花上句云故國春歸未有涯小樓欄檻別人家又殷勤元旦日欹午又明年上句云甲子今重數生涯只自憐皆不拘於一概也葢絕句之作本於詣極此外千變萬狀不知所以神而自神也豈容易哉足下之詩時輩固有難色儻復以全美為上即知味外之旨矣勉旃司空表聖再拜足下末伎之工雖蒙譽於賢哲未足自信必俟推於其類而后神躍而色揚今之贄藝者反是若即醫而靳其病也惟恐彼之善察藥之我攻耳以是率人以謾莫能自振痛哉且工之尢者莫若工於文章其能不死於詩者比他伎尢寡豈可容易較量哉國初主上好文雅風流特盛沈宋始興之後傑出於江寧宏肆於李杜極矣左丞蘇州走耳乚味澄敻若清風之出岫大歷十數公抑又其次焉力勍而氣孱乃都市豪估耳劉公夢得楊公巨源亦各有勝會閬仙東野劉得仁輩時得佳致亦足滌煩厥後所聞逾褊淺矣然河汾蟠鬱之氣宜繼有人今王生者寓居其間浸漬益久五言所得長於思與境偕乃詩家之所尚者則前所謂必推於其類豈止神躍色揚哉經亂索居得其所錄尚累百篇其勤亦至矣吾適又自編一鳴集且云撐霆裂月劼作者之肝脾亦當吾言之無怍也一本有道之不疑四字足下某贅於天地之間三十三年矣及覽古之賢豪事跡慙企不暇則又環顧塵蔑自知不足為天下之贅也噫豈非才不足而自強耶雖然丈夫志業引之猶恐自跼誠不敢以此為憚故文之外往探治亂之本俟知我者縱其狂愚以成萬一之効壯心未決俯仰人郡今遇先生俾僕得以盡論願修討源然後次第及於濟時之機也唐虞之風三代非不敝也賴聖人先其極而變之不滯耳秦漢而下時風益澆視之而不知其弊矯之而不知其變文質莫辨法制失中侮儒必止沈儒必削則士大夫雖有自負雅道者既不足以振之而又激時之怨耳漢魏之際其弊葢極懲馬融胡廣之流故李膺質而峻誡何晏桓範之俗則王衍簡而清矯之而不和滯之而不顧始以類聚相扇終以浮黨見嫉而至家國皆瘁而不寤也悲夫故愚以為今欲應時之病即莫若尚通不必叛道而攻利也隘則驅之以仇已樹政之基莫若尚法不必任察而嗜刑也弛則怠之以陷人舍此二者伊周不能為當今之治苟在位者有問于愚必先存質以究實鎮浮而勸用使天下知有所竟而不自窘以罪時焉噫有必不能辨之於言者有之矣未有無其心無其言可以垂名於不朽者且一家之治我是而未必皆行也一國之政我公而未必皆行也就其間量可為而為之當有以及於物不可為而不為亦足以見其心必曰俟時而後濟其仁葢無心之論夫百人並迫於水火可皆救之斯為幸矣不可皆救則將竭力救其一二耶亦將高拱以視之耶幸先生以質於時賢審其有心然後可為編次第之說再拜吾既以疑經為後述矣今年夏陳君果復致累百言且援穀梁之說欲以質吾吾熟視其書率意而答之足下復所云云非不知也且夫謂之求則固當偕受其譏矣雖然舅姑之疾且餒苟力不能制其悍婦則必羸其聲哀求於一飯豈忍誚之乎吾本朝之臣耳豈敢誨其苞茅不貢之漸耶于載之下必有知言者不多譚戴容州云詩家之景如藍田日暖良玉生煙可望而不可置於眉睫之前也象外之象景外之景豈容易可談哉然題紀之作目擊可圖體勢自別不可廢也愚近作虞鄉縣樓及柏梯二篇誠非平生所得者然官路好禽聲軒車駐晚程即虞鄉入境可見也又南樓山最秀北路邑偏清假令作者復生亦當以著題見許其柏梯之作大抵亦然浦公試為我一過縣城少留寺閣足知其不怍也豈徒雪月之間哉佇歸山後看花滿眼淚迴首漢公卿人意共春風上二句楊庶子哀多如更聞下至於塞廣雪無窮之句可得而評也鄭雜事不罪章指亦望呈達知非子狂筆孫君足下所貺累幅皆厚責於我是足下勤於吾道必欲起而振之也何以克當雖然始於退者皆曰吾之必誠也今愚獨以為不誠自訟亦誠在其中矣幸足下詳其旨古之山林者必能簡於情累而後可久今吾少也忿然不能自勝於胷中及不誠而退者然亦窮而不搖尋而不進者葢審已熟雖進亦不足於救時耳彼一飯之施或請濟於其鄰雖童子不可以空器紿之也矧當艱否之運吾君吾相方以爵秩來天下之賢達將與之共拯其可沽虛而自集耶且自古賢達用舍之際當俟至公物情而後天意可見雖宰執大臣之推心亦不能察天下拒我之意也况足下一布衣其可獨私於我哉書曰龜從蓍從則人亦不違天矣足下所示勤勤於此而取舍之間果致失墜是非有物亦欲沮之耶始吾自視固缺薄今又益疑其不可妄進且持危之術制變之機非鯫懦之所克辨也愚雖不佞亦為士夫獨任其恥者久矣其可老而冒之耶韓吏部激李桂州之不行責陽道州無勇雖致二賢適自困亦何救於大患哉其所為者或奮而不顧匹夫匹婦亦可為之孟子所謂非不能也足下粹於通義耳其間亦未盡於僕者勿多譚再拜金之精麤攷其聲皆可辨也豈清於磬而渾於鐘哉然則作者為文為詩才格亦可見豈當善於彼而不善於此耶愚觀文人之為詩詩人之為文始皆繫其所尚既專則搜研愈至故能衒其工於不朽亦猶力巨而鬬者所持之器各異而皆能濟勝以為勍敵也愚嘗覽韓吏部歌詩累百首其驅駕氣勢若掀雷抉電奔騰於天地之間物狀奇變不得不鼓舞而狥其呼吸也其次皇甫祠部文集所作亦為遒逸非無意於深密葢或未遑耳今於華下方得柳詩味其深搜之致亦深遠矣俾其窮而克壽抗精極思則固非瑣瑣者輕可擬議其優劣又嘗覩杜子美祭太尉房公文李太白佛寺碑贊宏拔清厲乃其歌詩也張曲江五言沈鬱亦其文筆也豈相傷哉噫彼之學者褊淺片詞隻句不能自辨已側目相詆訾矣痛哉因題柳集之末庶俾後之詮評者罔惑偏說以葢其全工知非子雅嗜奇以為文墨之伎不足曝其名也葢欲揣機窮變角功利於古豪及遭亂竄伏又故無有憂天下而訪於我者曷以自見平生之志哉因捃拾詩筆殘缺無幾乃以中條別業一鳴以目其前集庶警子孫耳其述先大夫所著家牒照乘傳及補亡舅名權四歲能諷誦其舅水輪陳君賦十六著劉氏洞史二十卷贊祖彭城公中興事並愚自撰密史皆別編次云有唐光啟三年泗水司空氏中條王官谷濯纓亭記傖荒之俗尢惡伎於文墨者華民流寓而至則遽發其士冖䂞焚棄札牘之累以快既自容矣又仇沮繼至者若不勝其怨噫是華舌夷心而又甚之者矣洎天下將亂則雖吾里其風亦變果傖荒之流民亦多矣倘或未化亦其益孤不能自振苟聞志於吾伎則必躍而游之矧踵門而勤請者耶光僧生於東越雖幼落於佛而學無不至故逸跡遒勁之外亦恣為謌詩以導江湖沉鬱之氣是佛首而儒其業者也雖孟荀復生豈拒之哉今繫名內殿且為歸榮足以光於遠矣永嘉西岑康樂勝遊之最是行也為我以論詩一篇題於絕壁人之格狀或峻其心必勁心之勁則視其筆跡亦足見其人矣歷代入書品者八十一人賢傑多在其間不可誣也國初歐虞之後繼有名公元和長慶間先大夫初以詩師友兵部盧公載從事於商於因題紀唱和乃以書受知於裴公休辟倅鍾陵及徵拜侍御史退居中條時李忻州戎亦以草隸著稱為計吏在滿因輟所寶徐公浩真跡一屏以為貺凡四十二幅八體皆備所題多文選五言詩其朔風動秋草邊馬有歸心十數字或草或隸尢為精絕或綴小簡於其下記云怒猊抉石渴驥奔泉可以視碧落矣先公清旦披玩殆廢寢食常屬誡云正長詩英吏部筆力逸氣相資奇功無跡儒家之寶莫踰此屏也但二者皆美神物所窺必當奪璧於中流飛鋩於烈火也殆非子孫之所可存耳庚子歲遇亂自虞邑居負之置於王城別業丙辰春正月陝軍復入則前後所藏及佛道圖記共七千四百卷與是屏皆為灰燼痛哉今旅寓華下於進士姚顗所居獲覽書品及徐公評論因感憤追述貽信後學且冀精於賞覽者必將繼有詮次光化二年八月三日泗水司空圖銜涕撰錄謹記休休也美也既休而且美在焉司空氏王官谷休休亭本濯纓也濯纓為陝軍所焚愚竄避踰紀天復癸亥歲蒲稔人安既歸葺於壞垣之中構不盈丈然遽更其名者非以為奇葢量其材一宜休也揣其分二宜休也且耄而瞶三宜休也而又少而惰長而率老而迂是三者皆非救時之用又宜休也尚慮多難不能自信既而晝寢遇二僧其名皆上方刻石者也其一曰闉頑謂吾曰吾嘗為汝之師也汝昔矯於道銳而不固為利欲之所拘幸悟而悔將復從我於是谿耳且汝雖退亦嘗為匪人之所嫉宜以耐辱自警庶保其終始與靖節醉吟第其品級於千載之下復何求哉因為耐辱居士歌題於亭之東北楹自開成丁巳歲七月距今以是歲是月作是謌亦樂天作傳之年六十七矣休休乎且又歿而可以自任者不增愧負於國家矣復何求哉天復癸亥秋七月二十七日耐辱居士司空圖記中條就蒲津東顧距虞鄉纔百里亦猶人之秀發必見於眉宇之間故五峯頍然為其冠珥是谿蔚然涵其濃英之氣左右函洛乃滌煩清賞之境會昌中詔毀佛宮因為我有谷之名本以王官廢壘在其側今司空氏易之為禎陵谿亦曰禎貽云愚以家世儲善之祐集於厥躬乃像刻大悲跂新構於西北隅其亭曰證因證因之右其亭曰擬綸志其所著也擬綸之左其亭曰修史勗其所職也西南之亭曰濯纓濯纓之牕旦鳴皆有所警堂曰三詔之堂室曰九籥之室皜其壁以模玉川於其間備列國朝至行清節文學英特之士庶存聳激耳其上方之亭曰覽昭懸瀑之亭曰瑩心皆歸於釋氏以栖其徒愚雖不佞猶幸處於鄉里不侵不侮處於山林物無天伐亦足少庇子孫且詎知他日復覩睟容訪陳迹者非今茲誓願之證哉久於斯石庶幾不昧有唐光啟三年丁未歲記上四年春以大河南王公治狀宜陟詔假禮部尚書按察宣歙池三郡既即治未涉時吏化民悅晝亡可為冬十月賊始自同安分濟入屠至德在池州公遣將孟琢疾以兵助守池州州亦有備賊少却會其黨繼至言扣璧實欲轉襲南陵公揣之如其計命樊儔進扼青陽路儔固自彭門分公察其健決而易敵誡之邀險無得輕進儔固去會諜者言寇少將遁氣欲生沮之麾兵不顧既而越險賊遽至軍遂委而逸間二日馳歸以敗告公數其違命立斬以狥諸將在南陵聞之者皆股慄以死綴賊故青弋江得恣為備青弋在江東南陵也人心不搖矣公前命寧國兵遮截之生得其踏白數十騎乃並山引退四月凶渠復大入而都紀王涓亦自采石赴援公宴勞加禮且諭之曰盜匿情詐吾盡得之矣今席勝而驕謂吾城不勞而可綴則攘臂而來前無絲髮之礙矣若知吾堅壁待之其勢自衂將軍第按甲稔威以伺其隟慎勿與之驟戰也涓意銳自州城日趨四舍至南陵未會食而戰遽死之明日中貴人自領敗卒尚四五千傷痛之聲與塵埃相雜而至江南雅自怯獨幸北軍以為固及聞涓敗相顧失色賴公前策涓不足恃拒守益嚴又城中水乏而泉自躍出人心益牢竟免攻圍之患既踰月中貴人阻撓無去意卒橫不能禁公以書讓之曰吏之捕蝗者既不克勝而且俯食於民是率暴以濟災也今將軍纂天下精兵挫於狂寇而又恣之俾民不得治其生業何以稱主上所以待將軍之意哉中貴人詞詘趨發其親吏入里舍敺奪民馬公乘門望之麾左右立提置杖殺軍愕貽不敢留自後日夕撫循常若寇復至者其儲畜繕完之利到今賴焉噫公始以傑德峻望為時聳服而敻特恢濟之心人莫能見雖不能致其道以和平天下然捍境蔽鄰不涸得賦亦足濟庸而塞根耳愚嘗襲跡門下受知特異敢次見聞以開史氏之聽洛自西北走耳乚大河葢同源於積石伏而乃發離而復合耳故其流皆渾而悍暴而難制然左輔土田賴之為膏壤堰雖勞不可廢也而又振泥加厚水勢益抑去故治之治之勤日倍也大中末州南堰壞久不能復比歲旱蝗關畿尢困咸通五年太原王公自中書舍人出牧是邦思所以利人者無易於此乃省公用節私費僦徒賦役躬親率屬得健吏於班授以成規亦既集事而中作雨甚川壑會流雷風蹴南而鼓之益肆狂嚙雖有力者堅百仞之阜亘為其防亦不能禦勢明矣必俟至誠克敷旁資感效耳公晨往河壖跪陳牢醴既而陰雲潰散功倍人悅翌日堰乃成水折而東皆若導而徙令邑里交賀合樂以迓之流聞京師中外以為國慶時國家兵役屢興漕輓已絕故自淮汴至於河潼之交百敖皆刳人無所仰視之者雖已鼎食亦若銜餒而返農饑卒怠何以振其威力哉關中不涸之轍必本是堰公果成之以明大計雖旋亦决敗而功緒足遺後人矣七年秋愚自滿獲展贄見之禮出次近坰備得其事因著於篇以彰勤濟之志云嚴飭祠宇非欲侈於自奉也葢不崇不侈無以聳動㣥品俾堅嚮善之心耳况帝夢可徵華緣已熟山川神祗罔不薦款故自京邑以及遐裔勝㮣相望皆奠厥居中條發於蒲趨於艮傑出而為太行則天壇不得不冠葢華嵩爭勍日觀也其北川壑會流盤鬱粹自高平西顧以至靈泉極矣泉之為靈非惟利物亦當滋潤所及不育毒螫也其院東向顯豁亘為大川端門洞闢正與旭日相迓豈梵書所謂震旦者此其證哉且有為無為於我不礙弛之則若涸其中用之則必滂其外皆克固其源乃能動而必濟也今禪宿洪密長老俗姓劉氏本儒家子早詣石霜契其大旨煩而不撓簡而必周初自清凉歷覽至是山乃創林栖之所遇太尉李公駐軍高平首資葺構遠近道俗莫不歸嚮今蒲芮隴西左揆常因題紀亦備贊揚則密公之道益光矣凡製經樓齋堂共一百餘間又塑羅漢潔刻之相以漸化服而後日集方丈敷演上乘自江漢北渡以至魏晉之交其俗堅悍難誘今則悉為佛人矣且善教童孺者雖指摘其書而必以言反覆曉諭當自釋然若典教積於前笞撻駭於側彼將竄匿之不暇詎肯說而從命哉律刑書也經誥誓也禪乃誘勸之宗先馴其性而後入人者耳故其道至隱其功至博不可廢也常念畜役之外以逮傭隸雖豢養至豐莫不苦於受制殊不知覊鞅之勞或能避免而方寸之內不形不聲牙孽牢萌託其力者愈不能爭以此淪陷死生之域綿刼不能自脫其苦何如哉噫苟非三世之尊夷山斡海六祖親授捩其鉗金犬長老繼作磨昏抉瞶則彼爨膏鑊而勇於自浴者雖糜爛其身猶未悔也今乃聚其徒侈其居永為一檀施之會且俾其福慧皆殖然則密公之積焉可抑沒哉耐辱居士病且死不忍其門人慧依慧海之勤請也直紀所行惟以漏畧為愧云天祐二年歲次乙丑七月望日記
