  text: 全唐文欽定全唐文卷八百七圖字表聖河中虞鄉人咸通十年進士乾寧中累遷戶部侍郎乞還山昭宗在華陰徵拜兵部侍郎不赴朱全忠篡國召為禮部尚書不起聞哀帝弒不食卒年七十二
  hash: sha256:da86024457e353302077f53ec93f74e621a127a7d2381419fbec178018282c44
