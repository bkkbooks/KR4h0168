front:
  text: 全唐文欽定全唐文卷四百九十三權德輿十一
  hash: sha256:f6db1182d0976b7688fd98f2bdea98c50961dcecbcf5bf9845d1bb8b7b377385
body:
  text: 昔廬山遠公鍾山約公皆以文章廣心地用贊後學俾學者乘理以詣因言而悟得非元津之一派乎吳興長老晝公掇六義之清英首冠方外入其室者有沃洲靈澈上人上人心冥空無而跡寄文字故語甚夷易如不出常境而諸生思慮終不可至其變也如風松相韻冰玉相叩層峯千仞下有金碧聳鄙夫之目初不敢眡三復則淡然天和晦於其中故睹其容覽其詞者知其心不待境靜而靜况會稽山水自古絕勝東晉逸民多遺身世於此夏五月上人自鑪峯言旋復於是邦予知夫拂方袍坐輕舟泝沿鏡中靜得佳句然後深入空寂萬慮洗然則嚮之境物又其稊稗也鄙人方景慕企尚之不暇焉敢以離㣥為歎予丱歲時遇渾淪於荊溪徒見其山巾羽衣有元古之貌瞻敬不暇未遑問道倏然一別俄六七年今茲獻春相訪於練湖之濱藥囊藜杖就館於我參希夷之旨析萬物之理皆發於全樸冥於大道非夫人之為道道烏乎在嘗以郭氏注莊生之書失於脗合萬物物無不適然則桀驁饕戾無非逐性使後學者懵然不知所奉因自為注解并作三十三篇指要佳言精理特出古人之右矣夫然者睹其容則鄙吝無自入聞其言則和易浹於內兩忘所得得之至也既而振拂屨杖超然遠遊浮洞庭涉廬阜然後揮手人世南登衡山將長往而不返耶或暫遊人閒而不可得見之耶予風波之人未脫世累得以愚薄自全靜每造適今日之別在於忘言邱侯文似相如而檢度過之則令名貴仕何逃吾彀故前年舉秀才上第今之應詔詣公車方今皇明照燭茂遂生物修西漢舊典詳延天下方聞之士而之子世父冠貂蟬叔父冠惠文皆以清詞重當世則文學政事子之家法冥冥戾天實自茲始因想夫危冠博帶與諸儒受詔論思應對於彤墀之下亦當明三代之損益厚七教於風俗使百執事傾聽屬目成聖朝不諱之盛夫如是則鄙夫安於南畝得以柴車角巾展歲事於田畯歌由庚華黍之詩為惠大矣若與彼滔滔逐進者汩其波流使晁錯董仲舒之徒顓美於漢非始望也邱侯勉旃文章之道取士其來舊矣或材不兼行然其得之者亦已大半故筮仕之目以東堂甲科為美談潁川陳侯以色養力行之餘輒工詩賦長波清瀾浩浩不窮初未覯止也屯田柳郎中為予言之且誦其佳句曰地偏雲自起月暮山更深及獲其卷又有過於是者踠驌驦櫝干將恬然裦衣以否為泰久矣今年秋驅車江濆獻賦京師叩予柴門惠然見別予以鄙畧亦嘗志於文頃年廹知已之眷辱霑官命故每客有為卿大夫所薦舉計偕者其於餞軷或諗之以言今於陳侯猶前志也取士以孝秀二科古道也家有兼者時論多之君之㣥從皆以文藻射策或致位郎署今孝廉又以溫凊之餘力行居業業茂行修西遊太學吾知夫上第之後衣春服吟舞雩東還南徐拜慶堂下粲粲門子經術發身古人有俯拾地芥之說斯濫觴矣古者採詩以辯志升歌以發德繫於時風播為樂章有不類者君子羞之令兄能泝其末流泳於深源志之所之不遷於物以為洙泗弟子起予者商而又嘉回之屢空鄙賜之屢中故帶經食力耕於汝山之下環堵蓬茨若蔭華榱逸韻麗藻鏘然在聽去歲臨汝守首賢能之書貢於儀曹瞻言正鵠審固則獲前此亦嘗失之矣退實無慍贏而不囂蓋能反諸已而已且用廉賈之道故也今將抵洛郊歷平陽與賢諸侯交歡假道然後自洛之汝燕居中林磅礡古昔務諸遠大鶯出幽谷鵬擊南溟將與㣥從叔季復修異日之賀豈止於今耶南宮郎有雅知兄者且與德輿為僚徵詩貺別以附其志謹序正字服儒服修儒行餘力則緣情類事作為清詞通歷代之歌詠稽其質文總其要會嘗出其所製三百餘篇以示予皆淨如冰雪粲若組繡言詩者許之結廬江南退然食力奉詩書屨杖為膝下歡蓬蒿晏如不改其度每遇一勝境得一佳句則怡然獨哂如獲貴仕豐祿恬於進趨十年於茲或謂之曰邦有道以貧賤為恥時可動以晏安為累况君族父相國以文武重望為國宗臣澤流北方勳在王府安人禁暴埽天下之災祲開府辟士走四方之才雋至公之府者惟恐後公待之如已失况乎宗族之內有之子之才耶相國元昆今左常侍漢陽公之領郡丹陽也予方僑居別部備辱嘉薦亟游其門當時已見君新詩盈軸日至鈴閣夫如是則其歡舊矣又何疑焉正字仍巾車撰日視遠如邇且以俟檄召驅傳車而後行者為隘吾徒偉之想夫趨轅門會竹林旆旌之下時獻歌頌亦一時之盛也予以貧病不能遠遊美太原之茂勳感漢陽之深眷送子於往實獲我心况與君同居里閈靜賞湖月亦云舊矣辱命為序所不敢辭清旭燕居有秀才鈕氏以儒者衣冠訪我於衡門之下用文一軸與刺偕至訪其行色則曰將抵賢二千石陸上饒然後自江而西射策上國且上饒以偉詞邁氣待東南之士士至必循分加禮繇是裦衣之徒恥不登其門故殿中韓侍御元直工為直詞嘗貺若以序故臨海守李君子從父戶部皆以文藝風騷為師友又貺若以詩矧夫植文行於內親仁賢於外強學不倦絜己以進今茲行也以桂林一枝為己任豈虛也哉辱徵不腆是用詞達行為士本文為身華其或好華去本失之彌遠鄙人結廬湖濱宴息多暇常默以此求士於去年得重表甥滎陽鄭公達兼是二美早為時賢所重專學懿文發於齠丱溫純積中晦而不耀非其徒不苟合非其道不妄動其於服先訓食舊德以日就章大眾君子識其將然子之元兄早歲登賢能之書名聲籍甚而能在險立節拔身幽陵乃居諫議乃服金紫言忠勇者是之今鄭生駕言上國所以展友于之慶也亦當觀光筮仕俾花萼迭映士林之美將萃爾伯仲乎撰日言邁訪予告別予亦漉旨酒巾柴車與一二友出送於野凡祖軷者請偕賦棠棣之詩序曰自夏書禹貢周官職方漢志地理厥後史臣繼有其書國家將九夷丕冒四海梯航聲朔過前古遠甚相國魏公明誠助化育奧學窮古今百揆師長十年樞衡贊端拱無為之風以宥天下王佐盛業論著形焉嘗以為言區域者闊畧未備或傳疑失實於是獻海內華夷圖一軸古今郡國縣道四夷述四十卷盡瀛海之地窮鞮譯之詞陳農不獲之書朱贛未條之俗貫穿切劘靡不詳究開卷盡在披圖朗然又撮其要會切於今者為貞元十道錄四卷其首篇自貞觀初以天下諸州分隸十道隨山河江嶺控帶紆直割裂經界而為都會在景雲為按察在開元為採訪在天寶以州為郡在乾元復郡為州六典地域之差次四方貢職之名物廢置升降提封險易因時制度皆備於編而又考迹其疆理以正謬誤採獲其要害而陳開置至若護單于府並馬邑以北理榆林關外宜隸河東樂安自乾元後河流改故道宜隸河南合川七郡北與隴坻南與庸蜀回遠不相應宜於武都建都府以恢邊備大凡類是者十有二條制萬方之樞鍵出千古之耳目故今之言地理者稱魏公焉公之意豈徒洽聞廣記以學名家而已哉蓋體國遠馭不出戶而知天下親百姓撫四夷真宰相之事也凡今三十一節度十一觀察與防禦經畧以守臣稱使府者共五十列於首篇之末其三篇則以十道為準縣距州州距兩都書其道里之數與其四鄙所抵其事覈其言詳閎覽默識精微錯綜斯為至矣德輿忝掖垣之屬承公話言盱衡屈指珠貫冰釋辱命授書其大端輒罄斐然之辭豈揚不休之業時貞元壬午歲夏四月謹序今之畸人有隱居張氏者治莊子內外雜篇以向郭舊注未盡采其旨乃為之訓釋猶懼學者之蕩於一端泥於一說又作三十三篇指要以明之蓋宏道以周物闡幽以致用內外相濟始終相發其文約其旨明纍如珠貫渙若冰釋既而以予嘗所蘄嚮俾敘而辨之為道之用也經天地該萬物內化者可以澤四海外化者可以冥是非訢然順物內外偕化得其環中以應無窮古之善為道者如此洎乎性命耳目之相軋也不勝於物則相辨相劘徇乎無涯氣耗乎名聲之域心鬬於彼是之境陳蠧滑湣封執逆旅懼力不足而㣥奔舛馳莊生哀其如是乃退廣柱下之說弛張變化未始離乎道用虛靜恬淡無為為本焉故其言后王撫世也則曰靜而聖動而王無為也而尊其言君子行道也則曰時命大行乎則返一無迹大窮乎則深根寧極窒乎欲則曰休影息迹達乎生則曰外形委蛻其放言大觀也則齊彭殤一堯桀等周公於猨狙比大舜於豕蝨或至大適以為累或至細乃牽乎用斯豈窮鄉一曲者所能通故有內外雜篇之異然則道之於物無不繇也行之者視其分隨其方而揭厲之則為家為邦為仁為智游之泳之日漸漬之化與心成不知所自則昧者皦躁者靜循之而愈照冥之而愈妙攖寧懸解豈遠人哉隱居之意明此而已矣隱居者九垓別號渾淪子老於是學徧遊名山無常居不粒食與土木鳥獸同其外而中明也如是向使與漆園同代如邱明受經於仲尼矣其顏成子南榮趎之徒與予摳衣於君實所辱命粗舉莊子之畧直書隱居之志以冠於篇昔舜禹之代股肱昌言以祗承於帝修六府敘九功曰都曰俞交修一德殷周之際有伊訓說命太保太師旅獒金縢之書以戴翼其代皆有大烈格於皇天自三代已還君臣感會何嘗不經緯斯文裁成百度太傅文貞公寅亮德宗致建中之理左輔右弼緝熙光明居中一歲以至大病愍策尊名為唐宗臣公薨二十九歲天子命公嗣子植為右拾遺植乃捧公遺文三十編見咨論敘德輿以為君子消長之道值乎其時而文亦隨之得其時則章明事業以宣利澤不得其時則放言寄意以攄志氣公自門子秀士被服薦紳至於登大朝筦宰政四十年閒作為文章以修人紀以達王事懼喜怒之不中節故有作威誡懲苟得之害正故有重請銘恐匪人之干紀故有與永王璘牋書誚時宰之不能上廣聰明故有臺封說悼谷風之詩廢故有僚友箴慮法吏邊吏之失其官守故有鼠議是惟無作作則有補於時以至於修事功斷國論導志通理昭明易直施於名命為雅誥刻於金石無愧辭康莊逸軌卓犖濬發九流六藝鼓舞奔走陳思王所謂儼乎若崇山勃乎若蒸雲惟公信然公姓崔氏諱祐甫字貽孫博陵安平人先孝公之清德與公始中終之盛烈勒於帝籍藏在惇史升公堂奧之君子多為之譔錄大較以同人之中正大有之剛健中庸之明誠洪範之攸好德艱貞踐履出入光大皆充其義如其文嘗試言之天下公器也匪皇極不乂操柄者務廣通則其弊以流縱私回則其弊以沒以是至於紀綱淆亂官職耗廢敗壞陵夷而不可為務守者弊以隘則窘若梏拲於是才滯而不發事壅而不宣其於病王猷盭大倫也及公平衡宰物為之折衷使文皇明皇之風粲然復興崇起教化萬方同軌道協氣宣臻至理而無癘疵為仁由己善善若不及泝其心源存乎斯文君子曰觀文貞之文而知其道知其道然後知其理古之易易也昔公能修先孝公之志類其文章趙郡李公遐叔實為之序今植亦能修公之志而德輿無似懼辱命焉凡九百二十篇為一家之言云爾嘗讀賈誼書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能達四聰而盡其善排㣥議而試厥謀道之難行亦已久矣東陽絳灌何代無之噫一薰一蕕善齊不能同其器方鑿圓枘良工無以措巧心所以治世少而亂日多大雅衰而正聲寢漢道未融既失之於賈傅吾唐不幸復擯棄於陸公公諱贄字敬輿吳郡蘇人溧陽令偘之子年十八登進士第應博學宏辭科授鄭縣尉非其好也省母歸壽春刺史張鎰有名於時一獲晤言大加賞識暨別鎰以泉貨數萬為贐曰願以此奉太夫人一日之膳公悉辭之領新茶一串而已是歲以書判拔萃調渭南主簿御史府以監察換之德宗皇帝春宮時知名召對翰林即日為學士由祠部員外轉考功郎中朱泚之亂從幸奉天時車駕播遷詔書旁午公灑翰即成不復起草初若不經思慮及成而奏無不曲盡事情中於機會倉卒填委同職者無不拱手歎伏不能復有所助嘗從容奏曰此時詔書陛下宜痛自引過以感人心昔禹湯以罪已勃興楚昭以善言復國陛下誠能不吝改過以言謝天下俾臣草辭無諱庶幾㣥盜革心上從之故行在詔書始下雖武人悍卒無不揮涕激發議者以德宗克平寇亂不惟神武之功爪牙宣力蓋亦資文德腹心之助焉及還京師李抱貞來朝奏曰陛下在山南時山東士卒聞書詔之辭無不感泣思奮臣節時臣知賊不足平也公自行在帶本職拜諫議大夫中書舍人精敏小心未嘗有過艱難扈從行在輒隨啟沃謨猷特所親信有時讌語不以公卿指名但呼陸九而已初幸梁洋棧道危狹從官前後相失上夜次山館召公不至泫然號於禁旅曰得陸贄者賞千金頃之公至太子親王皆賀初公既職內署母韋氏尚在吳中上遣中使迎至京師道路置驛文士榮之丁韋夫人憂去職持喪於洛遣人護溧陽之柩祔於河南上遣中使監護其事四方賻遺數百萬公一無所取素與蜀帥韋南康布衣友善韋令每月置遺公奏而受之服闋復內職權知兵部侍郎覲見之日天子為之興改容敘弔優禮如此內外屬望日夕俟其輔政為竇參忌嫉故緩之真拜兵部侍郎知貢舉得人之盛公議稱之貞元八年拜中書侍郎平章事公以少年入侍內殿特蒙知遇不可與眾浮沈苟且自愛事有不可必諍之上察物太精躬臨庶政失其大體動與公違姦諛從而閒之屢至不悅親友或規之公曰吾上不負天子下不負吾所學不恤其他公精於吏事斟酌剖决不爽錙銖其經綸制度具在德宗實錄及竇參納劉士寧之賂為李巽所發得罪左遷橫議者以公與參素不協歸罷相之議於公戶部侍郎判度支裴延齡以姦回得幸害時蠧政物議莫敢指言公獨以身當之屢言不可翰林學士吳通元忌公先達每切中傷陰結延齡互言公短宰相趙憬公之引拔昇為同列以公排邪守正心復異之㣥邪沮謀直道不勝十年退公為賓客罷政事明年夏旱芻糧不給軍校訴於上延齡奏曰此皆陸贄輩怨望鼓扇軍人也貶公忠州別駕上怒不可測賴陽城張萬福救之獲免蜀帥韋令抗表請以贄代已歲賂資糧公在南賓閉門卻埽郡人希識其面復避謗不著書唯考校醫方撰集驗方五十卷行於世江峽十稔永貞初與鄭餘慶陽城同徵還公已薨歿時年五十二公之秉筆內署也搉古揚今雄文藻思敷之為文誥伸之為典謨俾僄狡向風懦夫增氣則有制誥集一十卷覽公之作則知公之為文也潤之餘論思獻納軍國利害巨細必陳則有奏草七卷覽公之奏則知公之為臣也其在相位也推賢與能舉直錯枉將斡璿衡而揭日月清氛沴而平泰階敷其道也與伊說爭衡考其文也與典謨接軫則有中書奏議七卷覽公之奏議則知公之事君也古人以士之遇也其要有四焉才位時命也仲尼有才而無位其道不行賈生有時而無命終於一慟唯公才不謂不長位不謂不達逢時而不盡其道非命歟裴氏之子焉能使公不遇哉說者又以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏爭烈蓋道未至也應之曰道雖自我宏之在人蜚蝗竟天農稷不能善稼奔車覆轍孔孟亦廢規行若使四君與公易時而相則一否一臧未可知也而致君不及貞觀開元者蓋時不幸也豈公不幸哉以為其道未至不亦誣乎公之文集有詩文賦集表狀為別集十五卷其關於時政昭昭然與金石不朽者惟制誥奏議乎雖已流行多謬編次今以類相從冠於編首兼畧書其官氏景行以為序引俾後之君子覽公制作效之為文為臣事君之道不其偉歟辰象文於天山川文於地肖形最靈經緯教化鼓天下之動通萬物之宜而人文作焉三才備焉命代大君子所以序九功正五事精義入神英華發外著之話言施之憲章文明之盛與天地準贊皇文獻公以文行正直祗事代宗中行山立乃協於極初未弱冠隱於汲郡共城山下營道抗志不苟合於時族子華名知人嘗謂公曰叔父上鄰伊周旁合管樂聲動律外氣橫人閒感激西上舉秀才第一陟降中外閒關代故宣力匪躬勤於王家出涖方國入居清近由給事黃門官小司空剖符毘陵陟明於吳廉問風行為四方表率拜御史大夫不仁者遠武皇炳然審天工之可付公亦曉然知理道之可必一德交感推心合符執熱以待濯臨摯而不淑豈斯人未得蒙公之功化邪何造物者之戾也始與計偕投小宗伯書至內外埽除之際自為墓誌其閒嚮三十年周旋官業與斯文相為用大凡出於詩之無邪易之貞厲春秋之裦貶且以閎奓鉅衍為曼辭麗句可喜非法言故公之文實而粹精朗拔而章明書誌三篇感慨自敘英華特達君子之道有初有終至若嘉園綺弛張出處於秦漢之閒著四先生碑美蕭文終邴丞相之倫或退或讓作五君詠病有司詩賦取士非化成之道著貢舉議其他下屬城教條則辭語溫潤言公事上奏則切劘端正觸類而長皆文約旨明昭昭然足以激衰薄而申矩度如崑邱元圃積玉相照景山鄧林凡木不植覽公遺編者髣髴風采知公之道焉烏虖以韓安國之忠厚多大畧漢武以為國器壺遂深中篤行將亦倚以為相董仲舒言天人之際有王佐之才而皆不至彼當時齷齪備位者朝廷無虛日又况奇衺忮害崇黨蔽善公於斯時道未光大然其謨猷獻替過於當國流風遺書暴於天下神之聽之介景福於趙公纂承門訓宏大名器三命樞機為唐夔龍君子然後謂流澤貽慶之言也信德輿先公與公天寶中修詞射策為同門生並時筮仕於魏貝之地聲猷志氣相親莫逆伏思羈屑展敬無容猥以疎愚承趙公至惠忝聲舉之舊無忘代親翊唐虞之朝嘗陪宰政捧門中集錄屑涕見授辭不獲命謹直書以冠於篇善乎揚子雲之言曰詩人之賦麗以則班固亦曰賦者古詩之流也至若言天下之事業美盛德之形容皆源委於是而派流寖大然則體物導志其為文之本歟清河張登剛潔介特不趨和從俗循性屬詞發為英華秉直好靜居多隱約始以巾褐辟歷衛佐廷尉平監察御史罷去家居以薦延改河南士曹掾滿歲計相表為殿中侍御史董賦於江南無何授漳州刺史居七年坐公事受劾吏議侵誣胸臆約結感疾不起悲夫君以偉詞逸氣滯於奧渫之下又疾卑讇細人白黑太明矯枉憤厲往往過正故其賦有云鶡必鬬而知斃龍就屠而不馴又云賤而榮兮跌而喪痛一世之紛綸皆所以感慨頓挫放言而兆憂賈禍恒必由之二十年閒數免希遷志力相盭斯亦從古才士之所患也與夫脅肩令色坐取曠貴者豈同日哉所著詩賦之外書啟序述誌記銘誄合為一百二十篇相如之形似二班之情理公幹之卓犖經奇景陽之鏗鏘蔥蒨升堂睹奧我無媿焉自古富貴而名磨滅者何可勝紀如張君求居寄別懷人三賦與徵相一篇意所有激鏘然玉振予嘗吟咀於脣吻之閒以為儻有經梁昭明之為者斯不可遺也已曾不得登金閨玉堂備言語侍從之列伏守海郡廹阨終身可勝歎耶君之孤宣猷以予建中初同為丹陽公從事捧持遺文拜泣見託開卷三復追懷舊故詠言擊節髣髴如聞列於左方傳諸好事云爾敘曰三代之理曰忠敬文文之為也上以端教化下以通諷諭其大則揚鴻烈而章緝熙其細則詠情性以舒憤懣自孔門偃商之後荀况孟軻憲章六籍漢興劉向賈誼論時政相如子雲著賦頌或閎侈巨麗或博厚遒雅歷代文章與時升降其或伯仲之閒齊名善價以德行世其業以文學大其門則又鮮焉公諱若訥字某天水畧陽人其先武丁生子手文命氏在殷周閒為諸侯國楚滅秦遷始居汧隴甘泉安邱之明德宜昌鄜城之勳力胙土啟封三葉彌大以至平涼公文誕生滑州匡城縣令崇本即匡城府君第二子純嘏粹氣積為清和文誼內富英華外發弱冠與伯氏無侍叔氏同光同游太學連登上第由是士林風動一時嚮慕言文章者實歸公門永徽開耀之後以人文求士應詔累踐甲科極天人之際陳教理之本堅疏古義納忠本朝自晉州霍邑縣尉四遷至咸陽尉由右補闕拜起居郎在中宗時嘗以禁中書籍編脫繆詔朝廷文學大官十人緒正之而公以秩卑名重特居其選時拜貺於執事者公曰此君命也又何私焉比及已事彼皆轉職獨用砥矢之道不得居中出為蜀州司馬改梓州長史彭州別駕吾道一貫虛舟其心士師之退黜恬然海沂之詠歌日茂拜歙州刺史遷桂州都督梓州刺史用中和清淨之政化悍戾剽輕之俗三郡藹然有鄒魯之風方謂入掌典謨訓誥之文外當十聯九牧之寄壽違其量自古同悲以某年月日奄捐館舍享年若干而伯氏官至成都尉叔氏官至長安丞皆有盛名而無豐祿此其所以為善者惑也公自布衣時與許國蘇公友善自彭原上計至京師而許國當軸道舊歡甚謌詩祖餞或諗公加敬異數且以為孟晉之機公曰交道舊矣豈遷於物若然者是薄蘇公也所不忍為處之如初禮不暫屈其持操前定皆此類也知陳伯玉於下輩卒成大名其他所與游者皆鉅儒宿學天下賢士公歿後二十餘年德輿先人筮仕河朔始類公之文章為三十卷成都府君長安府君各二十卷未遑序引遇幽陵兵亂故其篇皆亡德輿既齓而孤莫知世德逮志學之歲距公之下世年逾四紀諮謀於諸父兄故德善行義不得其詳至大歷末方獲其文百餘篇其學富其才雄有賈生之正相如之麗大抵以彩錯峻拔使善否章明為主至於脗機楗於動用以闕其情則棲隱賦歸山賦體物比事極風人之麗則則喜雨賦悲秋賦俶儻閎達以文藝自任則詣樂城公奏記上吏部裴李二侍郎書敘家風世德以識幽壤則司田大夫水部員外二世父墓誌記時賢循吏績用行實則劉馮翊碑梁萬年鄭拾遺誌銘緣情遣詞寫境物而諧律呂則寄蜀中舊游詩蜀國吟擬古橫吹曲其餘表牋啟銘贊序述合而類之列為十卷蓋於公述作三之一也幸而異日盡獲公之遺文則當求主文者為之序錄今姑舉其官命事業書於篇第之初以自識云謹序
