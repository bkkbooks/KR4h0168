front:
  text: 全唐文欽定全唐文卷二百七十六咸中宗朝學士
  hash: sha256:bf7bdb5fabb4fe2ed708c3fce8ec9e348624dd7249f66c4d1c185b7ccbb096b5
  markers:
  - {type: head, offset: 14, content: 李咸, id: KR4h0168_NFKB_276-h1, level: 1}
body:
  text: 客有都尉崔公嘗以投筆筮仕遇解九二爻應無何而立功異域逮遂之來相與遊田而獲三狐公以為應往者之兆遂為田獲三狐賦余因應云放心而適者其在乎遊田徒御自肅鐶鋂相牽指東郊以按轡乘北風以鳴鞭風威初厲鷹隼斯擊英寮訟閒農人務隙分曹命侶榮隨所歷未濟之狐歘起荒陌多疑膽損虛驚心惕趫材競逐良弓可射算分銖於遠近乃舍拔而則獲於是長舒遠引自北徂南遇豐草而必陟逢虎穴而爭探車輕輪高㣥足走參走覃將使蹂躪其十二三爾乃出林莽踐平蕪歷歷爾見綏綏有狐莫赤其色又腯其膚各挾爾之矢先張爾之弧雖羅空三面而人合四隅終見加其一目遽生擒於僕夫更有七擒七縱乍奔乍逸忽投足於舊邱且守之而勿失俄而獵火焰熾蘊崇煙鬱知隱伏之無所動險中之瞰出搏噬交亂竿殳揘觱罔解狐之終凶符六二之貞吉得理中之道偕枉直之實且夫平原廣衍何有何無獨茲狐之見獲應君子之筮謨君子云誰其惟崔公筮謨伊何當入其仕乎固欲知蔡澤之躍馬而問詹尹以泛鳧公侯干城則四方壯士文章經國則一代英儒我章斯銀我綬斯朱安比夫求魚靡餌即鹿無虞哉已而日低嵐岫煙生寒柳鬯弓釋掤割鮮縱酒是田也蓋以集彼戎事從其㣥醜第吾人之歡謠別郢中之能不豈徒焚林竭澤乾池滌藪況夫天誡其馳騁御難其枯朽雖俟俟儦儦或㣥或友皆棄之而不受嘻茲狐之無知何雖獸而似智當其七雄分勢遇楚相以申威九尾來儀感魏君而呈瑞又若腋入珍裘肉登俎味在物斯賤與人為利利之者以此載詠歌而無愧守一中宗朝官萬年縣尉除監察御史遷右臺侍御史坐黨宗楚客配流端州臣聞去疾宜遠史策攸存惡逆不誅禍難未已故潘崇進說宮甲遂興霍禹陰謀芒刺可驗謹案魏元忠擢自布衣越升台衮十旬遠至一歲九遷日月借其光彩風雲資其鳴躍享營邱之大名食睢陽之茅土當須竭誠畢命徇義酬恩而乃搆惑儲宮躬為謀主位高勢重狼顧豺聲親典五兵又司百揆儲宮向闕先召賊臣北軍斬關未聞死難至於陷重俊令犯逆誘臣下使謀君戎馬滿於宮中戰場在於闕下宸座驚逼兆庶憂懼一日之閒中外隔絶禍交之首實階元忠宜肅朝章以明典法用塞人祇之怨稍清郊廟之恥罪狀既實自孽難逃義士忠臣誰不憤激重俊是陛下之子猶加昭憲元忠非勳非戚焉得獨漏嚴刑縱陛下惡死好生其如國典何元忠等請汙宮以謝罪赤族以申刑伏望付法據狀科斷大同中宗朝官雍州司田南郊有事北陸已寒丁不在田人皆入室此時勸課切恐煩勞嶷溧陽人若夫天定位地成形三光搖造化之基九土運陰陽之氣出乎震見乎離建官凝體國之理多士鬱經邦之化則有祥開白虎感驟帝而挺生跡煥蒼龍應馳王而傑出聖人神道而設教賢哲思皇以熙績總天下之順是資舟楫之用康天下之務多仗股肱之力故能經綸大造裁成於品彙之先左右中州制宰於神明之表求之振古何代無其人哉公諱憲字景法其先京兆杜陵人十三世祖崇後漢建武中封溧陽侯子孫因家焉今為縣人也自大電含樞三百年之盛德流虹貫日七十載之宏圖憑天寵以宏業被龍光而錫允衆仲稱官有世功太史則周之天官延陵曰周多君子大夫則衛之司直竟寧之疇嗣也伏青蒲而諫之建武之懋功也奄丹陽而國之陸海摛其穎烈三江派其遙緒東南之美復在於斯高祖光字伯朗晉中書侍郎遷侍中魏稱通事周美有常莫非其人藻蔚於皇渙皆稱其職駢蕃於帝猷曾祖雅字叔安晉散騎常侍尚德懷道而當朝居官體誠而奉上祖輝字季明晉積石將軍乘師誓衆仗鉞捍城比蒲類之為盟同二師之列號父儔字伯倫晉豫章太守國以諍臣為基人以良吏為本以興其理多資馭俗之能在位惟良是曰真宮之選天遺以文月懸其字故賢哉令聞是稱百代之宗卓彼英姿獨冠千人之表枝條磊砢而多節涯涘深沈而莫際金堅玉潤嶽鎮泉渟吉甫降神咸頌國楨之美茂先為賦即推王佐之才藏器於身俟時而動靜其節高其事在幽而闡自然公輔之資用晦而明終負朝廷之譽屬江東草昧晉主休明人未安業帝明俾乂皇華昭贊待以殊榮固辭以疾再不應命制書責讓起為尚書左民郎荀慈明之好學初不就徵謝安石之貞德卒從嘉召聯榮錦帳肅事丹墀逶迤建禮之門贊奏明光之府斯言復覩時聞彥輔之談故事將遺屢發文章之對轉建安太守廣熙故郡羅平舊俗上當牛女之野下帶龍川之坰百越南垂旁通於比景雙吳左瞰近接於居風地實貿遷人惟標準秦漢以還號為難肅公下車風行宏道信理文翁之臨蜀郡政教多奇子翼之蒞潁川恩威大舉用能決訟斷辭興利除害勸勤治民舉善黜惡庶績其乂緝熙以安烈虎稱歌既表仁和之盛遊麟入瑞爰旌禮訓之隆朝廷嘉之纍增賞異封山陰縣侯錫以山川加之紱冕丹書白馬以為利建之儀玉佩金章用表誠封之命方當入調鼎餗光踐台階雖欣鄭鹿之祥忽起虞鴻之疾春秋七十有二薨於會稽郡追贈江州刺史生也有涯多屈宰衡之望歿而不朽用伸追贈之章昔以晉永和八年歸葬於舊原土山之乾壞山左轉洮水長流齊太公之五代不忘周壤孔宣尼之四友我則殷人燕之往觀從若斧者吳所習禮不至泉焉茫茫古阡寂寂幽隴時更晉宋代歷陳隋隨武子之謀身九原可作藺相如之立事千載猶生其盛烈也如彼其遺風也如此從孫中散大夫太子洗馬宏文館學士江州刺史元道文林郎叔豪參訓質疑遵儀克選忠臨畏道業擅長衢嗣孫義謙寶俊君逸等價重南金美踰東箭敦行不怠在家必聞未能州縣之勞深體邱園之逸以為家聲世業若被於管絃相質披文未宣於金石疇資故實爰命小人雖仁不讓師而意非稱物潘黃門之藻思敬述源流謝康樂之才華恭陳祖德後賢校理猶知幼婦之辭深谷為陵尚識當陽之字銘曰伊昔有熊道德資始名烈五帝澤流千祀文捨伯邑武興太史官有世功春秋所祀衛尉疇嗣孝成以康將軍樹績光武其昌事列盟府功書太常源分陸海派別三江懿彼侍中飛纓殿內為王之伯熙帝之載左貂右蟬切問近對八舍攸履七車不昧散騎帝友朝夕進規奉興肅事贊道攸宜有濟之論兼濬之儀獻替之美復在於斯桓桓積石允文允武外擅爪牙內為心膂氣逸南仲才高邵虎作師之貞爰誓其旅豫章太守人之領袖如玉之貞如松之茂共理天下是資時秀良二千石抑非虛授惟君挺生才術縱橫黃裳元吉白賁永貞荊岩植潤漢水騰明是謂家寶膺茲國楨英英學藝為郎滿歲紫帳趨榮青縑沐惠王談練習鄭泰才計持實有章大猷無替悠悠廣熙南海之湄言典斯郡遠豫將之變其風俗鎮以宣慈人斯攸賴吏不忍欺列郡之政茲焉為盛開國承家大君有命山川光錫圭組輝映是曰懋功往哉惟敬重此台望期諸棟隆初欣鄭鹿奄嘆虞鴻麟傷孔子馬思滕公死而可作善始令終言式其墓壞山之路如斧載形廣輪為度委鬱松檟蒼茫草露萬古同心千春罷曙猗歟雲允世豈乏賢不忘其本願述其先陸家茂德潘氏流泉家聲懿範日月俱懸溫中宗朝擢書判拔萃科宗伯建官成均務學本乎風化爰立庠序人惟教首義在通經所授復據禮文有誤深非儒者講信之道自闕師資齒胄之儀曾非挑撻四時訓誘事乃薎如三月違仁豈無尤矣且如迷復未曉輕清儻舞樂或乖問夔則可如論詩不足在鼎何觀既投刃而非虛宜稱觥而見罰昔者先王制禮作樂也象物昭著厥儀孔殷大夏雲門既修之於千帝金鍾玉磬亦畫之於五采用能文物以紀聲名有差習之以和人悅衆播之以移風易俗當今命夔奏樂使鳳振羽豈蟹蟲之虛責何蚡蝑之矯言應為細碎微軀別有所飾輕清雅樂此非其任所司是舉深得其宜請革前非仍科後罪貞朏中宗朝擢書判拔萃科體國經野在乎六職審材辨器謂之百工須任宜以播聲當舉類以為用故羸者羽者爰標大獸之名連行仄行實曰小蟲之屬施大於筍簴發爾標形篆小於宗彞寂然為象有此成則斯無替之何彼所司用荒厥職以為細碎不亦宜乎志忠景龍朝官右驍騎將軍兼太史事昔高祖未受命時天下歌桃李子太宗未受命時天下歌秦王破陳樂高宗未受命時天下歌側堂堂天后未受命時天下歌武媚娘伏惟應天皇帝未受命時天下歌英王石州順天皇后未受命時天下歌桑條韋闕五行六合之內齊首蹀足應四時八節之會歌舞同歡豈與夫簫韶九成百獸率舞同年而語哉伏惟皇后降帝女之精合為國母主蠶桑以安天下后妃之德於斯為盛謹進桑條歌十二篇伏請宣布中外進入樂府皇后先蠶之時以享宗廟思齊刑部尚書德懋子官左衛將軍高邁高秀俱承茂族難兄難弟各登清官故能望高陸寶價重韋珠棠棣春風芳菲兩襲桑榆日暮光景同歸挂冠冕於東門方休白首奏絃歌於北里直散黃金邑宰率由舊章禮宏於羔鴈縣吏恭承嘉命事失於鴟鳶伏念刑書眷言惇史大夫學吏獄雖成於鼠偷京兆能官罪不加於烏攫邁中宗初年人昔孟明之載戰載北也空山肉填平地血流匹馬隻輪蕩然不收社稷包羞朝廷隱憂用兵至此不死何求誠以棄瑕之恩未報拜賜之言虛設砥名勵節易地改轍冀桑榆之未晚得雌雄之一決乃復總元戎申薄伐駟馬雲屯長劍電掣哮闞兮前貔後虎威棱兮左霜右雪火千旗而四面風生雷萬鼓而一道地裂小長平之瓦散淩不周之柱折朝出乎咸秦夕濟乎孟津其氣益振其屈欲伸於是指河中之舟示軍中之人曰吾與君子誓雪前恥雪則出黃泉之下勝則入青雲之裏吹噓而霜露變叱咤而風塵弭雖無此舟誰無此舟爾否則骸骨為異鄉之土魂魄為鄰國之鬼雖有此舟誰有此舟矣乃命焚之夫其火與木相守水與火相煎烘大川焮長湍龍吼乎沸潭魚喁乎湯泉舳艫化而為炭楫櫂揚而為煙水聲與軍聲合旁括乎地火氣與兵氣鬬上衝於天是以天為我赫怒焉地為我震嶪焉林木為我枯死焉山陵為我崩騫焉千里而高鳥不過四遐而猛獸莫前況於人乎況於國乎於是晉君臣聞之心攢百箭背負芒刺形神無主手足若墜曰秦師德之修誠之至天將啓吾將避閉城郭而不出潛鋒鋩以自備以五廟苟存為幸以萬人苟免為智敢怙其山河而虞其土地於是晉實為主反為客秦實為客反為主不戰而勝不攻而取掠地於大河之北封尸於崤陵之下既而鬼雪前恥人解厚顏四顧野清橫行而旋譟聲破晉山喜氣塞秦關曹沫復魯之勳自居其下范蠡平吳之力莫厠其閒此役也見孟明之臨事暫否終泰圖之大也見子桑之舉人遺粗得精鑒之明也見秦伯之用賢責功舍過道之在也臣事君不必自致藉主司之公君使臣不必自得藉主司之忠由是觀秦伯之有子桑猶耳目之在躬以其視視一國之明以其聽聽一國之聰自可以翊天子還淳風代與三五比崇身與二八爭功威強晉霸西戎不亦宜乎明明我后渴賢固久懸無私之鏡以照六合持無私之衡以稱九有掇奇拾異葑菲盡取若有一人兮近文章含堅貞悔已往之無成謀大來於此行出蜀郡題橋以見志入函關棄繻以示誠寧作焚舟而死不為棄甲而生投軍於子桑自比於孟明君謂之何如哉言之不可以已也頌之曰析薪如之何匪斧不克事君如之何匪媒不得是知焚舟之役非孟明之力乃子桑之力也昔在太始原於物初天地草昧建皇王以為宰淳朴自理非賢臣而勿居歷雲官與鳥職接洪範而周書無不較權衡之輕重考度量之盈虛因物以極神託數以明象積分而成寸引尺而為丈列陰耦而陽奇法天三而地兩準之億萬其如指掌時止則止時行則行隨物而應施不失平其至妙也多少不能以藏數其至微也長短不能以隱情易而無欺而無惑節之以禮其儀不忒聖人進退以觀象君子方圓而取則成百王之規矩為萬代之繩墨欽若伯禹聖哉為王道濟天下爰敕大章投足既廣行地無疆彼里之難測用度之可量四時以日月為明萬國以君王作大同衡律而一軌量海內平而天下泰居日中而成市觀異方而畢會在商賈之所資惟尺度而為最夫道以神契物以言筌義無不盡理無不全度之為物也資道以為用度之為道也託物而無偏述斯往矣吾不知所以然北溟有魚其名曰鯤橫海底隘龍門眼睔睔而明月不沒口呀呀而修航欲吞一朝乘陰陽之運遇造化之主脫我鬐鬣生我翅羽背山橫而壓海嵯峩足山立而偃波揭豎張皇聞見卓犖今古過魯門者纍百曾莫敢覩來條支者成㣥又何足數既負此特達壯心亦有取也若乃張垂天激洪漣海若簸其後陽侯騰其前洶如也皓一作皎如也蛟螭為之悚一作怛怖洲島為之崩騫如此上未上之閒邈矣三千接海運摶風便飛廉倏而走羊角忽而轉勃如也蓬如也雲溟為之光掩山澤為之色變如此高未高之閒騰夫九萬足踏元氣背摩太清指天池以遙集按高衢而迅征時與運并道與時行遺夭閼之類放逍遙之情如此自一日亘千歲陰數與陽數際乃下夫南溟之裔嗚呼誰無借便之事九萬三千故非常情之所希冀誰無回翔之圖一舉六月故非常情之所覬覦由此言之則鳳凰上擊誠未得其錙銖鴻鵠一舉適可動其盧胡況鷦鷯一作鶉鵪之輩尺鷃之徒易安易給其足其居須臾之閒騰躑無數齷齪之內翩翻有餘伊小大之相絶亮在人而亦爾淩雲詞賦滿腹經史婆娑獨得骯髒自是不大遇不大起謂斯言之無徵試假借乎風水看一動一息凡歷天機一作大幾千萬里離婁之目處暗室或不能覩燈處之皎如也澄公之掌在元夜或不能照燈在之了如也故大雄氏以方便力救黑暗界藉其光誘其人佛所以有然燈名法所以有傳燈義大抵長明燈是其蘊乎夫日主晝太陽之精中則昃昃則沒我長明燈不沒月主夜太陰之精滿則虧虧則盡我長明燈不盡日月尚爾況小光小明哉要自積苦為海舉足見溺積邪為山舉足見礙竟不能倣佛之或倣佛之不克成就之言之可為長嘆我邑中有俊傑主此然燈精進或就於寶融寺藏經院且夫蘭炷爇火吾見其盛未見其微也鐵盆盛膏吾見其增未見其減也一籠而四時長花滿室而終歲不夜人見之者一作禮眼蒙利再作禮心蒙爽心眼自相照了內外由是洞徹然則終日見燈未嘗見燈終日不見燈未嘗不見燈夫達觀者乃如是也意者不獨於此直上照一天二天乃至三十三天無門不闢恆沙善人由茲而入直下照一地二地乃至一十八地有獄皆開多劫罪人由茲而出若然者四維上下虛空可思量不可思量邪我長明燈實相功德亦復如是邁三數年內願銘頌之閒迫賤事未搆斯文一朝染目疾朦朧而不自審從何得也遂夢神人語邁曰子於長明燈其有負乎邁應聲而寤寤而起起而作頌明日目愈頌曰見外燈長明見內燈長明萬惡自光中滅萬善自光中生不見一燈百千萬億燈乃至於無窮不見一人百千萬億人歸之於大同空則是色色即是空弟子作頌允執厥中
