front:
  text: 全唐文欽定全唐文卷一百八十七善揚州江都人顯慶中纍補太子內率府録事參軍崇賢館直學士兼沛王侍讀除潞王府記室參軍轉書郎乾封中出為經城令坐與賀蘭敏之款密流姚州赦還載初元年卒
  hash: sha256:e3b87682683319df82d5121796d72f6f3edb924d8381bcaae288a02decf0f3f9
  markers:
  - {type: head, offset: 14, content: 李善, id: KR4h0168_NFKB_187-h1, level: 1}
body:
  text: 臣善言竊以道光九野縟景緯以照臨德載八埏麗山川以錯峙垂象之文斯著含章之義聿宣協人靈以取則基化成而自遠故羲繩之前飛葛天之浩唱媧簧之後掞叢雲之奧詞步驟分途星足廠田坴殊建球鍾愈暢舞詠方滋楚國詞人御蘭芬於絶代漢朝才子綜鞶帨於遙年虛元流正始之音氣質馳建安之體長離北度騰雅詠於圭陰化龍東騖煽風流於江右爰逮有梁宏材彌劭昭明太子業膺守器譽貞問寢居肅成而講藝開博望以招賢搴中葉之詞林酌前修之筆海周巡帛丿糸嶠品盈尺之珍楚望長瀾比徑寸之寶故撰斯一集名曰文選後進英髦咸資準的伏惟陛下經緯成德文思垂風則大居尊耀三辰之珠璧希聲應物宣六代之雲英孰可撮壤崇山導涓宗海臣蓬衡蕞品樗散陋姿汾河委策夙非成誦崇山墜簡未議澄心握玩斯文載移涼燠有欣永日實昧通津故勉十舍之勞寄三餘之暇弋釣書部願言注輯合成六十卷殺青甫就輕用上聞享帚自珍緘石知謬敢有塵於廣內庶無遺於小説謹詣闕奉進伏願鴻慈曲垂照覽謹言遵乾封時太常博士北郊之月古無明文漢光武正月辛未始建北郊東晉成帝咸和中議北郊用正月皆無明據武德來禮今即用十月為是陰用事故於此時祭之請依舊十月致祭元素總章時殿中侍御史臣伏見儀注皇帝升壇及降並繇午階初引太尉奠玉亦從南陛臣不敢廣陳典故以煩聖覽必謂君王不可與臣下同階太尉奠玉請從卯階依西獻禮則登降有數君臣道存祐龍朔中同文寺丞竊以君親之重事極昊天恭恪之儀理貫名教至如凝心元路投迹法門莫不肅敬神明不輕品物事如司馭議中彈豈有弛傲所生不屈君父既違恭順之禮恐纍求道之因彈曰誠固不纍其如陷君親何請革舊風準敕申拜謹議師望高宗朝封襄邑縣子駙馬都尉顯慶三年為涼州剌史上元二年移華州巖巖靈嶽峻極氛氳下飛懸布遙橫陳雲雄峯異立觀起秦君即高因遠岧然出㣥詎假祗園無勞孤給乘基表列載懷興葺月桂嶺松參差相及天歌人梵往來謠習伊初就列走實馳名晚行應止何為振纓胸奴樂獵關塞道清越裳奉贄風塵不驚縱誕務間歸依淨域蓮池化造削成神力繪彩無施煙霞無飾以斯莊敬回資動植今之建塔昔者沉碑桑田不定陵谷須移有非真有離非久離思超彼岸願入禪枝師德字宗仁鄭州原武人第進士調江都尉上元初為監察御史長壽元年纍授夏官侍郎進同鳳閣鸞臺平章事出為河源積石懷遠軍及河蘭鄯廓州檢校營田大使入遷秋官尚書原武縣男改左肅政御史大夫並知政事證聖中拒吐蕃於洮州敗績貶原州員外司馬萬歲通天二年入為鳳閣侍郎復知政事進納言更封譙縣子隴右諸軍大使聖歷三年突厥入寇詔檢校并州長史天兵軍大總管卒年七十贈幽州都督諡曰貞原夫哲后時乘聖人貞觀必俟風雲之應以光朝列尤資棟幹之材式隆王道若乃傑出文武挺生才俊道符忠孝性與清白高視於寇賈之前獨步於韓彭之上肹蠁名教蟬聯簪組許史焉可儔金張莫能匹四海慕其風範千里仰其談柄玉質金相探賾索隱沒而不朽其惟賀蘭都督涼國公之謂哉君諱明字若水本出武威姑臧人也聖期爰始賜貫神京而香逐芝蘭辛隨薑桂今屬洛州永昌縣以光盛業焉原夫仙窟延祉吞雹昭慶因白鹿而上騰事光圖牒遇奇峯而南逝義隆縑簡邑怛於是亡精鮮卑由其禠魄恤允於前涼之境茂族於洪源之地良史載焉此可略而志也曾祖哥論易勿施莫賀可汗遞襲圭璜夙傳弓冶共棲梧而比翼與良玉而齊價濯如春柳徑逾霜竹英名振白山雄圖光紫塞祖繼莫賀特勒積代為英傑之先光圖絢史保家為名教之首掞今超昔宏材膠葛洪源浩汗映竹史而騰芬綴綿書而擅響父何力鎮軍大將軍行左衛大將軍撿校鴻臚卿撿校左羽林大將軍上柱國涼國公贈輔國大將軍使持節並汾箕嵐四州諸軍事並州大都督諡曰毅公地積膏腴門標英偉發言會規矩動容成楷則學該流略文超賈馬威青海而安白道光三部而截九夷揆務機司為㣥僚之宗匠榮膺蘭錡成五戎之準的而鐘漏斯盡天贈崇班聿加千里之榮俄處六條之位哀榮之禮既洽朝野式瞻送終之典更隆搢紳翹德公赤野生姿青田矯翰家蓄古賢之操門傳高士之節年甫一歲起家授上柱國封漁陽縣開國公食邑一千戶八歲起家授太子左千牛十一授朝散大夫太子通事舍人裏行十二授奉輦大夫若夫紫禁青規之所必擇賢而方授玉階金闕之前實高門之能處所以榮加髫丱澤及綺紈鳴玉鏘金光前映後乃人物之儀表實衣冠之領袖重以河山險要惟賢是居爪牙任功非親莫委麟德年中授左武衛大將軍賀蘭州都督自非承家奕葉纍代衣纓焉可內奉鉤陳外膺剌舉者矣相府在藩為涼州道元帥以公為左闕軍總管侍中薑恪為涼州鎮守大使以公為副然則朝端妙選實佇異能望重材高允膺僉屬後以鱉海未清蛇川尚阻戎車所及尤俟英將從中書令李敬元征吐蕃公為柏海道經略使於是南討吐蕃北征突厥纍摧凶醜勳績居多後狼山及單于餘黨復相聚結奉制討擊應時平殄前後賞勞不可勝紀改授左驍衛大將軍襲爵涼國公食邑三千戶賜錦袍寶帶金銀器物雜綵綾錦等數千件授長男嵸三品以酬功也仍改為燕然道鎮守大使撿校九姓及契苾部落公俶遵遠望赤水而前驅徑騎騰空指白蘭而長騖左縈右拂八校於是爭先斬將搴旗三軍以之作氣遂得降絲言以隆爵命自天府而錫珍奇金貝咸紆繒錦交集列鼎而光祖禰分茅以惠子孫策勳居最又授雞田道大總管至烏德鞬山南招降二萬餘帳縱使李牧寧部充國和戎推昔揆今當年罔二尋授右豹韜衛大將軍未幾復改授左豹韜衛將軍並充懷遠軍經略大使又依舊知燕然道大使功高望重亟膺獎擢得人之譽聞於朝野惟大周革命重懸闕二字擢授鎮軍大將軍行左鷹揚衛大將軍餘並如故有制曰鎮軍大將軍行左鷹揚衛大將軍兼賀蘭都督契苾明妻涼國夫人李柔順成姿幽間植性聿修婦德每勤於闕二字叶贊夫家必存於忠義既竭由衷之請宜覃賜族之恩並及母臨洮縣主並蒙賜姓武氏公侯必復河洛胄賢屬寶運之開基接仙潢而錫派忠貞無替聲振金氏表裏承恩勳高石窖後授朔方道總管兼涼甘肅沙五州經略使度玉關而去張掖棄置一生瞰弱水而望沙場橫行萬里幄中有策閫外宣威豈直操履冰霜固亦心符筠玉名高一代氣逸九霄者矣既而司寇逝川俄結頽山之恨將軍大樹行聞斷石之嗟悲夫以證聖元年臘月草三日遘疾薨於涼州姑臧縣之里第春秋卌有六制曰悼往贈榮經邦之懿典飾終加等列代之徽猷諒以褒德勸能念勞追舊者也故鎮軍大將軍行左鷹揚衛大將軍兼賀蘭都督上柱國涼國公契苾明理識開舉局量沈雄家著勤誠代彰忠懇早膺朝寵夙紹庭規秩峻銜珠寄隆賜金戊入參巡警淑慎之譽必聞出綏藩落威惠之聲兼濟日轡不留夜舟俄徙未窮遠略遽謝昭途載想嘉庸良深矜歎宜申殊澤式旌幽壤可贈使持節都督涼州諸軍事涼州刺史餘如故賜物三百段便於涼州給付所緣葬一事以上並令官供仍差涼州都督府長史元仁儼監護仍令朝散大夫通事舍人內供奉邊懷秀弔祭既而居諸易遠宅兆攸資金鳧泛泉玉雞伺旦粵以大周萬歲通天元年歲次景申八月庚午朔十有五日甲申葬於咸陽縣之先塋禮也禮司諡曰公夙承門閥早踐通班茂績昭宣聲望顯著學該流略藝總兵鈐以孝安親以忠奉國終始如一存沒不渝旌善易名宜憑典寶按諡法寬樂令終曰靖請諡曰靖公惟公降淳粹而蓄王褱奇稟清忠而挺才望韶儀淹雅難窺於得失逸調清通不測其涯涘抑揚人傑雕繢士林等桃李之無言若朱藍之在性先人而後已鄙利而尚賢亭亭有千丈之幹其高非易仰汪汪如萬頃之波其深不可測有碩學焉有令問焉擅班馬之雄辨蓄靈蛇之雅作逸氣上煙霞之表高名振朝野之際五公七侯之盛僅可執鞭曜蟬鳴玉之榮才堪捧轂如楊彪之承伯超若班固之嗣叔皮加以懸榻翹賢分庭接士衣裘鞍馬朝成夕費兼濟之性光映人物乃搆厦之良材映車之名寶者矣夫人唐膠西公孝義之長女也齊輝婺彩擢幹瓊枝莊敬率由於自然抑揚女史溫柔稟之於本性光輝內則既而雄劍潛鋒崩城起恨毀瘠逾於大禮攀號洎乎翦髮夷夏足其悲哀搢紳增其慘蹙屈已而遵女誡飭躬而宣婦道可謂承家稟訓執仁組行者歟長子左豹韜衛大將軍兼賀蘭州都督上柱國涼國公從山次子右武威衛郎將上柱國姑臧縣開國子嵩右玉鈐衛郎將上柱國番禾縣開國子崇等並早涉義方夙延庭訓孝心冥獎至德純深仍候氣廠田坴憂先嘗空闕充窮盈感孺慕增悲棘貌由乎絶闕柴毀幾於滅性可謂至道冠幽明窮途傷骨髓哀號劈踴獨超前輩雖罔極之誠踐霜露而逾感相質之重映今古而垂裕是用傍求翠琬式樹豐碑家風祖德居然在斯用以光士行用以芳本枝歷千秋兮無斁經百代兮無虧銘曰東井蒼蒼西土茫茫天開分野地列封疆門多英毅代産忠良偉哉人物紛乎典章其一前涼後涼乃祖乃父赫奕冠蓋蟬聯文武金相玉質光台映輔至德符孝貞心翼主其二可汗嗣立抑揚流輩業盛後昆道隆前載遐邇欽挹夷夏欣戴四海英髦共推貞概其三特勤垂裕搏風振翼孔席申歡嵇松比直智水遊泳仁山止息討本尋源斯標歧嶷其四毅公雅節莫之與京既忠且孝王佐人英研精流略損闕良平昭昭餘慶恤允膺榮其五挺生異材齠年振響未盈小學亟承恩獎門閥易隆牆仞難仰學行無斁名實逾廣其六露冕關河式清邊徼遽宣威德聿敷名教肅彼夷落鎮茲襟要人揚德宇窮微盡妙其七綏邊寄重尤資望族顯允奇材悠然嗣福外清荒憬內膺榮祿總戎之寄聲連祕牘其八詵詵于隰屢警邊城侵闕躍馬概闕揚旌橫雲列陳背水開營未經千日俄夢兩楹其九駕闕難留居諸易促旋悲闕佩遽傷埋玉松蔭隴兮均青草縈墳兮吐緑式鐫貞琬以光勝躅其十
