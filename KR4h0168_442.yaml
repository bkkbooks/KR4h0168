front:
  text: 全唐文欽定全唐文卷四百四十二牧蕭㯋士弟子
  hash: sha256:a37e9cf47a769075d9c0387693df07e187dd83c966c8cf8a6e207c61eea5a17e
  markers:
  - {type: head, offset: 14, content: 息夫牧, id: KR4h0168_NFKB_442-h1, level: 1}
body:
  text: 志有之事三如一者惟君父師乎所以生之教之祿之生而不教不可立也教而不成不可祿也故師勉乎教而學者勵乎已已立學成而會友以講之是以伯魚趨庭曾參避席卜商投杖厥義於是乎在冬十有二月家君宰邑許下夫子問津潁上二賢將馳會府皆適茲土夜處狹室列坐有位尊卑儼如或捧觴上壽或摳衣請益始敦詩以説禮終講信而修睦然後文飽於德義潤其身頃夫子升堂之後若盧賈劉尹之徒半紀間接武鳴躍實夫子訓之導之斯至也今殷郭二子天資才幹而加之鏃羽觀光王庭俯拾地芥其誰曰不然飛霜靄林寒氣總至月落西戶夜將向晨座隅謙謙畢醉溫克則知孔門宴餞異於他日二三子終身識之夫子以家君政事百里無事命門弟子賦鳴琴亦以釋仳離之怨焉小子不敏忝居門人之末敢不敬書其事云季友河南人為豫章太守李勉賓客專心所感偽物皆成若商邱之始泳得明珠於至精以荷畚之窘揖乘軒之榮曾狎侮之不暇孰招延而有情惟此翁者古之愚也存已性之任真謂人言之無假守其抱朴之意不知玩人之事信河水之深曲是寶珠之所置洪流沃日呀萬丈之層潭絶岸排雲抱千艘之險地無烏獸之敢近豈泥沙之可得何長舌之見欺遂投身於不測膺騰於泉客之繳足迹於馮夷之域奫淪未遠覺圓質之當捫滉漾無涯見孤光之上逼於是握照乘之珍出重泉之濱星輝耀掌雪彩環身當太陽之益照射衆象而驚新虛白無瑕粲瓊華而納景清規半濕炯冰狀而流津足供居常者駭異輕薄者居厚瞪睢盱之拙目鉗胡盧之笑口不待驪龍之睡無勞巨蚌之剖超萬頃而一合由素無而忽有彼非他能道在至信苟志氣之克專實神靈之與進脫用心之疑惑必在物而多吝故事無可否精求乃獲泉非合浦尚謂出其明珠地比荊山固可營其拱璧彼移山於海飲羽於石皆非自然之致力繄敢而後適鑒於水者不在於廣大而在於澄渟奔流則崇山莫辨靜息則纎芥必形故能任人倫之巨細隨物色之丹青皆一鑒而洞達若三光之出冥因見砥之清成照膽之朗以無心而應物皆潔已而呈象如白日之輝輝無孤蓬之振蕩馮虛之狀信有妍而有媸閲實之明固無偏而無黨若乃仙井舊泄華池既瀦中無浴鳥下絶遊魚疑金鏡之湛寂若琉璃之至虛當其來見威儀之酷似及其去無眹迹於淪胥向使潺湲不息噴薄長注將沃日而騰虹或因山而瀑布遭駭飇之猋欠起值潛蚪之交騖雖有清明之本質豈能使形影之相遇是知專而靜可以居要明而動亦不能照斯大道之指歸豈常情之感召得懲躁之為誡知飾容之惟肖人觀於水既定而後詳水鑒於人當止而為妙照其美也非所愛照其惡也非所憎不分明於有位不掩映於無朋諒可移性俾居於正直豈懷鑒貌獨貴於清澄想夫煙雨初霽泥沙不雜明看練皎止若冰合忽形來而影見類聲往而響答在良賢而暫窺宜陋軀之愧納今者貞清特異熲耀前聞雖萬形之森列終一鑒而區分洄字幼深宰相休子蔭補宏文生乾元中拜諫議大夫知制誥興元元年為兵部侍郎轉京兆尹加御史大夫貞元十年終國子祭酒贈戶部尚書刑部掌律令刑名按覆大理及諸州應奏之事並無為諸司尋格式文比年諸司每有豫奪悉出檢頭下吏得以生姦法直因之輕重又先有敕當司格令並書廳事之壁此則百司皆合自有程式不惟刑部獨有典章訛斃日深事須改正敕旨宜委諸曹各以本司雜錢置所要律令格式其中要節仍準舊例録郎官廳壁左右丞勾當事畢日奏其所請諸司於刑部檢事待本司寫格令等了日停江淮七監歲鑄錢四萬五千緡輸京師工用運轉每緡度二千是本倍於子今商州紅崖冶産銅而洛源監久廢請鑿山取銅即冶舊監置十爐鑄之歲得錢七萬二千緡度費每緡九百則得可浮本矣炎史亡何所人大歷末官右庶子進禮部侍郎貶澧州司馬繼天者君也戴天者臣也下之事上作股肱耳目上之任下敷心腹腎腸甚矣哉君之難臣之不易也今聖上高九皇之道賢臣合一德之義風雲元感魚水冥符作樂崇德于是乎在詩有六義請賦歌之曰於赫我皇受天明命平六府和八政天合德日躋聖神生甫而山出雲在玉衡而照金鏡考金石以和樂美鹽梅之克正超百王之至理冠六代之尤盛至矣哉鴻鈞之代何物不樂仰乾坤之德知樂之所由興觀君臣之和知樂之所由作在宇宙而皆滿鼓陰陽而合漠且宮為君商為臣其德斯溥羽為物徵為事其宜咸若諧宰相之燮理象天子之經略可以頌猗那可以美於鑠正南面陳黼黻於以紀聲明於以展文物進旅退旅撞鐘考鼓四方皆聞萬物咸覩事無事明主之衣已垂為無為大臣之袞何補雲干呂而風入律進成規兮退成矩無不幬也象乎三天無不載也均乎九土小仲尼之在齊狹季札之觀魯惟太平之和樂按前史之未聞不殊東戶之代何謝南風之薰遠無攜而邇不逼夔為臣而堯為君肅雍和鳴越詩人之作發揚蹈厲薄武王之勳節有序聲成文豈徒以諧鼓舞蓋所以調氤氳允所謂奏大音兮當聖朝合六英兮和九韶陳威儀之穆穆表至德之昭昭奏之以人奚異洞庭之響莫匪爾極何必康衢之謠一屈一伸下兢上讓或右文而左武或先吁而後唱端拱者上帝之君賡歌者濟時之相大化優洽淳風溥暢元元本本形難為狀州之北邈矣可遊汾水之陽杳然自喪所以表大道之理豈徒知皇帝之貴徐則文足昭疾則武足畏俯仰之際見旒扆之情綴兆之間知鼎鼐之味不聞於柏皇栗陸何有於殷周漢魏敢獻幽蘭之曲希從拔茅之彙帝在上黨延唐寺有李樹連理上親視焉賦曰惟彼嘉樹列星之精耀本扶疏當元光之降誕盤根連理應我后之文明天之發祥豈無他木必曰茲樹是光皇族所以並修幹連高枝青房表異朱仲稱奇察以休徵不假終軍之識同於樹德寧為簡主之知族茂宗榮盤根合理花之發也霰每亂於青春實之繁兮珠更深於寒水豈徒生於靈井植彼東園自感義以相待但成蹊而不言此乃興聖主之符表天家之姓一人親覩六合稱慶至若鍾山之實玉井之仙或正冠而垂訓或投贈以成篇比德於我彼何有焉臣炎作賦天子萬年景龍元年四月二十四日皇帝初臨上黨日抱戴皇天告符微臣頌之蓋古詩之流也賦曰日麗於天是曰太陽經千里臨八方符一人之元聖曜五色之重光祚我休徵莫先懸象表至聖之無二呈繼照於明兩陽光杲耀抱黃道而再中喜氣氤氳戴赤霄而直上聖有感天無私八紘占其瑞色六合仰其重離終古不虧得天長久豈止大章之步非齊夸父之走惟抱也同衆星之拱北辰惟戴也比萬邦之奉元后則知天為父日為兄同符叶慶以應文明我皇首出而御極光被無垠而太平抱戴之秋八月十有四日夜月重輪瑞之大者天意若曰將俾吾君姊事之賦曰我皇初列唐侯潛蟠藩國英武方斷文明表德穆然思道順帝之則既而動三合奔百神廓太清而萬里耀朗月以重輪時屬高秋瑞彰元后光泛皎潔之斜漢色映闌干之北斗金波耀景非懸闞澤之名璧彩揚輝不入士衡之手理殊吳夢符炳漢謠淨桂花於日道環水鏡於丹霄臺榭冰潔郊原霜縞月之揚光天不愛道一盈一缺則惟其常彩溢重輪告於天表大人占之夏啓以兆亦所以類星珠表金鏡兩耀齊美一人之慶於萬斯年受天之命景龍二年夏四月十七日帝在廳事假寐白鶴觀道士宋大辨等三十人同見赤龍據桉至矣哉神妙無方不可得而稱也賦曰元天之龍兮見而在田我后之龍兮飛以御天據聖人之大寶與列祖而同元高出而潛躍以自試來定天寶居然假寐合而成體散而成章若窺於牖若施於堂且據桉而向明負扆以當陽日月在身有舐天之嘉夢風雨合氣將振翼而雄驤㣥居愕視聖作物覩赫然龍光真我明主祈券表異亦惟前聞曠然振古卓有吾君王人之瑞比之龍首高居而遠望以臨乎九有天子之威比之龍鱗皇之可畏以肅乎萬人徒稱其象未覩其真恭惟我后近取諸身於昭巨唐其命維新永據九五斯焉萬春景龍二年秋八月屬縣長子有嘉禾合穗瑞不虛月侯其禕而乃賦曰天祚明德兮降之嘉生按彼靈篇兮莫之與京脈震土膏且分苗于南畝駟臨天漢爰合穗以西成當元后之歷試表休徵於太平不莠不稂實堅實好引薰風於和氣承湛露於蒼昊生非百里驗管仲之虛辭出異崑山自我皇之所寶在瑞圖之右為曠代之祥唐叔得之而合穎周成得之以充箱雙米一稃稱之表異孤莖六穗頌以非常今也尤盛居然允臧轉風而屢騰佳氣就日而交見祥光獨天不生托厚載於富媼非聖不感效元符於我皇我皇得之熾而昌風之起兮雲之揚嘉禾之瑞未可量天子億載臨萬方景龍二年八月帝逐鹿於潞河惟河也深三丈濶倍之鹿迫而入水因鞭而逐之水不及韉應弦獲鹿後騎入者溺焉賦曰大君于田兮巷無居人四鍭如樹兮六轡既均定俞騎而百靈奔命騰雨師而四野清塵鳴獸駭殫川原飛伏事非定霸不求陳寶之雞位在至尊故取中原之鹿驚而決驟鳴不擇音將投身以赴水非順命而前禽駭浪溢湧揮鞭電爍烏號滿月而方開驥足撇波而巨躍乘流既濟赫怒中止斃駭鹿之一發振驚弦而未已洞胸絶系左角右觭雖復驅兩开而獲五豵發小豝而殪大兕皆平陸之常事曾何足以踰此誰為河廣一馬馳之大人將興靈感若茲諒神明之所輔何後乘之可追從此繼天而作主元元日用而不知景龍二年九月後常有童謠云羊頭山作朝堂郡南六十里有羊頭山今興唐宮即當之矣賦曰熒惑之星兮列天文降為童謠兮告聖君發自鳩車之歲稱為竹馬之㣥其言伊何克明寶位惟山之北正應天邸之居曰興朝堂用彰天子之置大人占之而自負黎庶聞之而屬意天人合慶歷運其昌同康衢聞於翼善比歸亳順於成湯言且表微諒人神之應事惟在昔殊飛走之祥豈比卯金稱為劉氏赤伏徵於漢光且遊童之謳謠羌見偉於疇昔千古所記百王不易豈徒采於茅茨空用書於竹帛天贊我皇時高列辟惟一人之有應振六合之光宅景龍二年秋九月五日黃龍見於上黨伏牛山之南岡遲留久之表彰聖人之德也賦曰龍之來兮乘其陽躍於泉兮臨高岡龍之至兮歸有德符於黃兮土之色精曜曜光雄雄上不在天兮接於物下不在田兮蟠於空列四靈智稱其首居五位色表其中將衒甲以無比與負舟而不同明皇家之王氣符歷數於聖躬飛煙噴霧若動若顧聲雖虩虩非同三尺之劒色乃煌煌下映五花之樹誠帝王之嘉兆寧朝夕之可遇何蛇蚓之足言諒騰黃之匪喻同翠龜之薦緑圖彰大人兮告元符覽史墨之言未之聞也驗登殷之祀不其然乎景龍三年春二月帝巡屬縣至於襄垣漳水有赤鯉躍聖帝之瑞也賦曰魚在在藻兮躍於中流吾君戾止兮樂我王遊惟赤鯉之呈祥殊白鱗之入舟非竹箭之危湍無聞點額同昆明之望幸非為吞鉤豈其為祥必河之鯉用表皇族克繁帝祉雖云水物宜紫鼉緑鼇之同身是曰元符亦赤雁丹烏之可比赬鱗耀彩碧水無波非應瓠巴之清角何言寧戚之高歌周文之時躍於沼漢宣之代舞於河且合符於圖牒宜入頌於猗那豈徒鏤甲葺鱗下沿上泝皆為儔匹文鰩是喻吐尚父之兵鈐傳遠人之尺素事稱嘉瑞匪琴高之所乘詩有樂胥似相如之獻賦景龍三年六月十五日黃龍再見於牛山天意汲汲於聖人賦曰龍之見也春分而登於天龍之潛也秋分而入於川假崇山而再見應元聖而通元蜿蜒孤蟠雲霧四發目中精耀光飛列缺之火頷下珠懸色奪蟾蜍之月方將遊彼池囿豈徒止於郊野非同上天之五蛇有異渡江之一馬孫權象之而置於軍中魏帝範之而在於殿下永言於此我皇是宜秦王之夢立乎鄜畤漢后之時見於成紀彼皆一至此則重光采色炫耀文明焜煌錯甲鏤鱗既以成乎字分官紀號可以表其祥超紫鳳於丹穴越青鸞於女牀龍德相承而無悔天家久久而蕃昌景龍三年九月九日帝與㣥官壺口山升高時有紫氣光彩照日賦曰吾王不遊人何以休望壺口之千里值重陽之九秋山對翠屏動暉光之赫赫雲成紫蓋扶晚日之油油宛轉浮空輪囷不散應一人之盛德為萬歲之榮觀氤氳瑞色無孤峰斷陳之嵯峨搖曳晴空雜玉葉金枝之燦爛亦何異出蒼梧入大梁為漢武之蓋升軒轅之堂忽兮改容形難為狀紛紛郁郁用表靈貺乃同芒碭之間非比崑崙之上豈徒合以膚寸垂以飄扇河汾永兮天之眷紫氣凝兮人罕見位當用九果符九日之祥運極通三永御三雲之殿景龍三年九月十七日上使韓從禮蓍筮卦未成蓍自立從禮曰大人之瑞也賦曰惟彼神蓍生而有知用之不測明以稽疑擢九尺之纎幹伏千年之寶龜德圓而神兮無幽不及其生三百兮其用五十惟聖人之觀象乃神動而鬼入列八卦以效變翹孤莖而孑立數彰得一命乃自天同大橫之有夏表或躍而在田其察也深其功也大稱美名於神物齊妙用於神蔡是曰元后茲為筮從氣受陰陽夜分而彩露兼涵幽贊天地朝覆而輕雲數重蓍而有靈立定天保可謂神助用光天造功深莫善仲尼且許以鉤深屈於不知太公徒言乎腐草蓍之立兮發其祥吾君得之尊以光明乎太極演彼歸藏因卜祝之符瑞應天人之會昌金橋在上黨南二里常有童謠云聖人執節渡金橋景龍三年十月二十五日帝經此橋之京師賦曰沔彼流水兮清且漣漪度木為梁兮於焉在斯成金橋之巨麗得鐵鎖之宏規當其受以金模觀其曲面經始也則大火朝流成功焉乃天根夕見彰於聖德發彼謳歌千人唱萬人和丹雘蜿蜒倚晴空之螮蝀瑰材櫛比超渡海之黿鼉人且告符功惟用壯非填鵲之可比法牽牛而為狀鶴鳴陰處雁覆晴川異東明擊水而投步匪秦帝驅山而著鞭惟彼童謠兮言猶在耳大人應運兮奉天而起乘彼橋以徑度按周道以如砥于是提三尺乘六龍懷萬邦入九重景龍三年十月二十五日帝還京後州內所居寢堂上有紫氣七日不散賦曰於穆聖王先天不違謳歌既洽朝覲攸歸往京邑而經千里自潞郊而乘六飛洪惟此邦初九之地翬飛鳥跂謂尚諸侯之宮虎踞龍驤忽成天子之氣方凝紫色是謂非煙乍蕭索乎空外更霏微乎日邊若動非虛似浮有實覆彩鴛之瓦髣佛升堂繞文杏之梁氤氳入室是作興王之兆克符來復之日遠而望之乃散亂浮空近而觀之則希微無質欲見峰巖之上先形藩邸之間異張華之寶氣衝斗殊尹喜之真人度關若乃廣野之宮闕化成漲海之樓臺回映諒陰陽之盡美非福應之攸盛惟紫氣之來集實皇家之大慶休哉聖君有天下之成命維廣德二年歲次甲辰三月戊辰朔二日已巳皇帝若曰昔者哲王必建元子上以奉宗廟下以係民生固本乃安立長乃順經明者是稱其兩樂善者不止於三資於君父之間運在神明之側稽古承式肆豫命汝天下兵馬元帥尚書令雍王適智崇天錫德茂日新文實志經武兼講藝孝深於性尤切於問安識蘊其明更精於簡牘奉辭伐叛稟命成師積稔逋誅一戎底定業著於內功加於時萬方以貞朕志允定是用命爾為皇太子以踐於儲宮往欽哉無以不副忘其恭無以不會易其度觀圖書之得失思締搆之艱難夙夜惟寅主茲匕鬯永懷我高祖太宗之丕命可不慎歟文昌貴臣新受厥服再拜稽首對揚休命逶迤而退則展慶賀之禮下舍之間則懷宴語之好所以昵僚友宣寵光敵者易親歡焉而至是以蕭公膺納言之職路公徵賀遷之會洎冡宰司寇作者三人國老如塤箎之和陽春屬星鳥之序欣榮相合辰當美景形制所選地從主人窮土木之幽荒尋柏亭之奇構賓主有禮旨酒以柔之清言以發之庖盈而不侈筵肆而不雜狎而不黷酣而不流有太平君子之光見可久賢人之德風調日暖煙靄無陰松茂草滋泉石通氣鶯出幽而初囀花含愁而將歸外物獻美中懷有融高興格於丹霄餘思垂乎清晝四座相顧請豫所尊悅題賦詩無忘盛集
