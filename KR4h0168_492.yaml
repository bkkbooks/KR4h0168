front:
  text: 全唐文欽定全唐文卷四百九十二權德輿十
  hash: sha256:5a201479974f8075aedc6a3f417d0e49658e9f0afb8eaa00d752229929284c42
body:
  text: 十年冬豫與今左曹相君兵部郎崔君同受詔禁中雜閲對策以第其等將命於廷有請程百職之功緒者且以郎吏諫曹為言時相君為吏部郎崔為右補闕因相顧曰直言者方譏切吾黨其可捨諸豫撫手賀之以為得雋及後詔下徵他日之詞則許生也典校滿歲西遊岷峨丞相彭城公雅聞其才辟以從事十三年冬以府檄計事至於京師獻歲回車釃酒祖道以子之直而和敏而文策名於天府叶志於元臣摶迅飇翔層雲將賀不暇給而別何為愴衆君子中飲皆賦使鄙夫類之大夫杜公用德禮威信訓齊南海居二年以部從事檄召京兆韋君君溫文裕蠱鋭於術學在綺襦青襟之歲粲若冰玉年方冠仕至廷尉評擁大府之傳赴賢主人之命其徒榮之且楩楠巨幹不産培塿則知天鍾美茂亦多在世德其要在聿修之不怠而已彼吏理與將命事之細者况新發於硎鋩刃韜匣不折不缺之誡豈足為執事道耶豫嘗被公辟書辱在下介顧以多病不敢遠遊南方祈執事者芳訊見及則詳言美化佇為中和樂職之頌以抒下情士君子之發令名沽善價鮮不由四征從事進者翔集翰飛蓋視其府之輕重耳則侍御之今日猶鄙夫之昔時也因想昔與今徐方連帥王僕射德素盛府主公楊尚書達夫同登龍門於鍾陵爾來二十年矣二賢以大僚碩望當明天子注意分閫之重鄙夫顧無所用亦五叨中臺俯仰印紱以過量自愧追懷舊恩敢忘其所自耶况侍御溫良敏肅用文術自贊初為州里所舉俄屬聖朝以舊勳推恩纍更祿位再至京劇今茲簪法冠駕軺軒感於已知不計勤遠又焉知圖南水擊之變化不在此耶既賀侍御所從又悅達夫之舉賓主之間仁義在焉欵門告別思以言為貺至若洪範之攸好德盤銘之日日新皆侍御所執也又何言焉敬謝達夫慎夏自愛無金玉爾音而已相國臨淮公觀風俗於井絡之下辟禮所及皆雋人賢士隴西李侯虛中敏厚而文嘗再中正鵠於春官天官氏同門生已翰飛三臺出入承明獨用恬退結黃綬於伊洛或靜以勝熱或贏而不囂豫意其必遇真工大冶以發鋩刃今果峩惠文趨黃閣視其所舉問其所從可以交賀矣行當見相君政成一方執介圭歸上台則掖垣侍從之選不在從事之賢者吾不信也中外零落始衰多疾祖道握手漼然涕洟至若銅梁玉壘之勝踐使軒賓榻之盛集皆備於歌詩者之説不能悉數云今名卿賢大夫繇參佐而升者十七八蓋刷羽幕廷而翰飛天朝異日之濟否視所從之輕重故豫內兄以黔巫之地為夷途安流者受署於中執法王君故也以王君之馨香望實宜處清近久矣惟天愛人授茲一方則兄之赴知已誠可賀也兄端明文敏焯見吏理奉本府之書奏陳遠人之便宜已事復命驅車就路敢用觴酒宴軷繫之以言曰武陵辰溪四封十五郡大凡五十餘城以仁佐賢寧彼縣道婉婉語言化為風謠然後徵理行之第一獻賓寮之功用夫如是得不謂所從之重乎京師離㣥咏嘆仁政寓辭鈴閣之下無金玉其音德蕩乎名名與實軌矣至有趨世徇物隨波同流茫茫九有公是大喪故道直多棄行方則躓鄙嘗病之今見盧君君精辨自內直方形外隤然獨立以名教自任每著文輒先理要而後文采至若罪荀文若評郭林宗發明指擲意出舊史其旨在乎澄汰風俗掃鎮浮誕舉而行之有補王度衡茅居息終歲自樂貞恆之心風雨不改與夫叩角彈鋏不相遠乎中丞李公以清德重望秉旄漢南辟士之日以君為首非夫知精達識又焉能出衆人之視聽延拔貞晦則漢南風政因茲而見驛騎蕭蕭訪別蓬門元言清酤相會於遠君又授豫以正名至終二論鄙人亦出篋中幾銘名實論士行辨三篇以申報貺商於之地與郊圻接畛藩部條職顓達於京師且有賦輿得署賓介今二千石以宗室貞幹自中臺郎出守首辟博陵崔君君溫恪廉清且以文敏緣飾三命官至汜水主簿吏理有聞以中外之勳華文雅所憑者厚遊必有方翔而後集然則君之委質商之報政二者其相為用乎園綺風聲夢想如在古祠喬木為寄遐心豫弱歲時從師於黨孰鄭生已用經術上第誦古先格言圓冠紳帶綽綽溫雅里閈僑居年輩為長逮今踰二紀三徙官至親軍紀綱掾青袍化緇班鬢如艾徐道舊故悲歡相因以鄭生之理文修行而職業未稱得不為大來之將然歟抑食浮於人者或臘毒歟豫不知也今則請急於環列遵途於江介懷舊遊也吳中多賢士君子居易求志為豫多謝之夏四月臨海紀綱掾崔稚璋受命選部出車東門是歲重表甥權德輿始至京師寓居同里顧其室空無以自貺遠輒竊仁者之義申之以言云古之君子修誠以慎獨居易以養正行實中茂而纓轂外華其或不至則安之若命蓋直已而不必用蹈道而不必行居今行古者實鮮而稚璋是已言必踐學必思四命官率由會府進不苟而交不黷廉肅給推心為理滿歲罷去則與令弟躬耕於茅山之下睦姻食力修家法考農政嘻嘻申申有義有仁起於棖闑被於鄉黨之動也之靜也得古之遺風暗然而未彰不易其方寧蹇連以終否無奇邪以害正華髮承辨知者嘆之且夫列郡之督郵視天臺之司轄地征之衆寡賦政之細大為樞為柅何莫由斯豫獨知臨海之人受賜不暇矣又况琪樹風清石橋月明羽人仙子髣佛如覿遣有涉無與境而勝象外之歡可勝既乎今大君子主制河東諸侯府多雋賢且有雅知稚璋者庸詎知今日適越不為異時之大來耶二三君子送遠加等釃酒以祖道歌詩以發志賢稚璋而思仙山故也各見於詞扶風馬諫茂直直方中和之性發於恬曠放言遣詞亦有餘力知名舊矣故相得甚歡觀覽其卷則警會心府三復不倦若霜鴻清唳松雪孤映或諸生所不能至者而茂直至之且多特操尤病苟進故調於南宮仕於東朝戰勝無悶官間更適適相遇於南徐俄愴離居官局所係言旋上國豫乃與一二疏放之客詣精廬上方主人又以啜茗藉芳代夫飛觴舉白元言至論代夫握手流涕時物具舉靈臺曠然晴江有楓千里在目茂直深於詩者衆君子以詩貺之郡功曹實亞都吏而冠六聯選部銓署勤於他職李侯宗室子器幹明茂蒞官處煩率無留事清修緣飾傾心於士友此其可尚也豫接李侯中外之姻十二年矣曩歲既展禮屬豫有禮官之命來趨闕下今茲得調甫獲再會又屬豫承乏代斫於儀曹不得授館以觴酒相歡才數四耳征蓋將去離憂惄然竊聞太夫人賢明有門為門訓誡豫之內妹主中饋勸以義出則事良二千石分曹賦事入則順承慈歡琴瑟靜好名教之樂豈待多祿耶富春江漁浦潭紀行之詩與郡中坐嘯主諾之謠吾知之矣族屬稽滯於江南者衆寓書難遍悉為多謝豫始與馬生相遇於南徐州皆以刊校冗員涵泳文誼生以既不得調乃反初服與計偕豫放浪於江湖間因為東諸侯辟召旋忝朝命與漢廷臣並行於西垣南宮中時生窮閻旅食射策未中積歲於靈臺之下儒衣甚敝詩思不詘亦與其徒三數生嬉春感秋觴酌吟嘯視豪遊曠貴者敖如也先皇帝不以僕不肖使操刈楚之柄輒以得士自賀豈惟竊不遺不偷之目而已耶今之出青門結黃綬筮仕賦祿於東南之奧區且曰外兄州尊理行充茂所以利攸往而不薄於中都官誠有由也然則郡齋言詩幕廷主畫雖欲勇退其可逃乎清和之月草木條暢京邑氣正在陽則舒方宜會合坐歎離索追計舊故向三十年湖塘里巷疑在前日各有班鬢愴茲離襟又何可言也為豫敬謝中丞君乃者南康永嘉廬江晉陵已為二千石表率今當明天子守臣之寄為仁由已固又與前四郡不侔賦政之暇知君自熟豈敢為曹邱耶但交賀而已過江山水陽羡居最性質夷淡者得之愈深袁生願恭文敏渴善好學今茲試吏其本可書先正南陽王實扶中興之運光啓土宇慶流後昆國有令典延世命官解巾筮仕偶得佳境况青春之年綵衣黃綬出則為政入則承歡以世德遺直而慎修之不怠異時必復此其椎輪歟追思童丱遊寓茲地煙潭雲洞杳窱靜深邑中諸生多業文者亦清輝勝概之所發也生其勉之有衛許胄曹首類歌詩鏘然在聽猥徵不腆俾敘夫㣥篇從舅詞甚茂行甚修嘗見其緣情百餘篇得騷楚之遺韻故江南煙翠多在句中蓬蔂江湖坎土稟終歲而衣不襲突不黔彼乘堅驅良滅沒於康莊者復何人哉繇從舅而言可以言命冬十一月方以大袂單衣挈書笈西遊且見訪曰豫不試久矣道不可以終窶今將遊上京抵名卿以決出處其可乎哉德輿曰時有通塞道有顯晦審時行道惟賢者能之今王度清夷紀律昭明晏安迷邦是為大謬是舉也得審時行道之宜矣又何敢規吾嘗思天下之理必求其端於士行博厚人文昭明則理道從之孤卿大夫皆由士而進得不謹於初以自重耶然則鏌干之刃騄驥之步百鍊千里必俟知者此長孺所由獲進於左君之門也左君嘗二六官之半復以綱轄再臨儀曹銛鋒絶足於是乎得且爾齠歲秀發好學不遷逮乎弱冠餘勇可賈修詞體物講貫習復發鏃中的觀者偉之夫每歲登名者四方之人皆屬耳目以評其當否不可誣也若爾之敬遜務時敏沛然得之異時遠至如在步武矣吾與長孺曾王父在永徽開耀之間繼以賢能之書來獻於王庭德名家法華萼相輝暨吾早歲亦將砥礪充賦而先友過聽遽以名聞蓬茅之中未筮而仕既而中外族姻有以前心見勉者吾以為雖冗員解巾亦君所命也豈可更名越禮以孟晉求售耶循性所安遊寓湖海或辱賓召亦嘗從之頃歲以禮官徵在闕下因緣朝獎忝冒清近既非所宜居常缺然歲時易過道義難就視爾之年猶前日耳每思孔孟不惑不動心之言以為元龜而未能也然則舉於鄉者士君子之本爾能聿修其慰如何叔父以廷尉評典城於蘄里有課最家有教義駕言歸寧拜慶上堂青純被體桂枝在手服名教者相賀况吾之心耶宗門單鮮㣥從之登仕次者不十數輩相愛以誠惜別為甚因爾之文藝徵吾之出處故詞雖繁而不能已也噫風水之積厚也方可以負大舟大翼爾其勉之餘則節食慎夏寓書而已十四年四月從曾祖兄德輿序今年㣥從之調試於天官春官者以十數興廉舉秀既有其人而少清以經明解巾參南徐州軍事其伯氏掾周衛叔氏簿郟城代耕話別徵詩導志夫千里足下九江濫觴致遠就深在乎不已况爾文敏修潔澡身立誠康莊渤澥吾見其往至如鮑昭之詞律孟嘉之風流又其次也想自丱歲僑居是邦趨朝七年束一作榮以紳珮煙霞井田如在目前舉白祭軷離憂加等尚書公以政成事鎮安一方幕庭婉婉多我之執爾其敬恭以事長者求為可知暗然日彰嚮吾所謂不已之道在此而已十三年三月醉後序昔安邱敬公以王佐之才而運丁苻氏故經綸大略堙厄不振如其乘時行道可以財成家邦豈止於相區區前秦與王景略齊名而已時軋道塞從古以然德輿與兄實承安邱之遺烈其後枝流以食舊德故兄能踐中行蹈貞厲守師氏之訓修君子之詞慤靜而用晦誠謙以居約者向二十年裦衣大帶名未登於王府方以一葦為航遊江湖間今將省家於上饒順流於潯陽羈旅之中未始以進趣為念鄙則不敏粗為哲兄言之自十數年間戎車居天下之半故純白清靜之士多鬱而不發其或倚佳名席勢一作世卿以取富貴者皆朝為屠沽夕拖章組風波變化以萬萬計其次或雜與諸生之徒冠柱後惠文持從事使者之檄溢於府寺喧於傳置風流不還聲實相遠然則得喪本不足以滑曠士之慮又况今之得喪耶先師曰知足者不以羡自纍行修於內者無位而不怍此二者可以書紳而三復也鄙夫所獻者如斯已矣如其地理所歷與煙霜之候皆備於詩人之思此略而不書士君子筮仕之門有以代德庥廕而奉清廟齋祠者及夫試吏就祿與秀才孝廉郎等蓋以舊服流慶後昆宜之其於獎人為善之義深矣從兄承舄奕簪纓之後荷葳蕤文誼之訓敏於學行而薄於宦名乃今調於天官署崑山主簿以姑胥之通邑士衡之佳句僑舊耕種多依是間上有良二千石為東諸侯表率其飭躬敬事夙夜勤敏椎輪積水或在茲乎從弟中書舍人德輿序其所繇俾㣥從偕賦叔父端懿誠厚退然自牧博洽前載不以沽名待價為心德輿羈丱時伏見從叔義興君戶部君送別二序自前秦安邱敬公至周千金恭公而下德善功烈辨其昭穆叔父承千金廣川清水三葉紹封之慶其素履淑行二叔父實詳言之爾來三十餘歲矣服義日茂用晦如初以仁愛任恤復趨選部銅章列城得之不勤昔季路宓不齊理蒲與單父為孔門上第宏之在人仁遠乎哉况番君故地理通下邑其壤沃其境清惠和廉可以遊刃異日九江之西上百里課第於有司者其在叔父乎佐酒霑醉歌詩為禮有命曰爾宜序謹序漢廷諸公皆附經術而施政事故其有猷有為不疚不懼若况者嘗理左右史記事記言之經傳謨訓居有司籍奏中乃令參調署吏以養以仕言顧於行行本於經修性勤身而祿在其中矣夫學者病口肄其言而心不能通故吾三年第經明者三百餘士而知類通達者往往有焉嘗與賢諸侯河東柳敬叔吳郡陸伯沖寓書往復論取士之道二君子言之頗詳若况之所履其吾與二君子之所欲求也豈無多文之富耶而况不耀豈無趣捷之敏耶而况不為蓋質素者受采必固平夷者遵道必遠况之志其在是乎吾與况也行以五綵衣裳視朝夕膳裘褐初解綬黃甚新彼陽羡有佳山水玉潭東舍溪南嶽洞靈仁祠仙觀邑子鄉導窮年勝賞筮仕於斯其樂如何有以賀義方之慶輕少別之戚伯仲㣥從類其詩文亦命小子璩繫於編末時皇帝御極甲子赦令之後一月也廷尉評張君以溫文敏直為修身策名之具其於㪺挹風雅導詠情性成乎餘力粲為清詞故嘗擁盛府之傳喧士林之譽自中發外豈徒然哉春三月自鍾陵抵漢南綵衣班然脂轄首路將欲問詩禮於堂下謁旌旆於轅門漢南之渴賢下士張侯之清聲茂實翔集之美其可逃乎僕以不腆辱鍾陵從事之末君即我公之南容也故得揖光塵於門閣接笑言於杯斚交歡而莊敬既醉而溫克樂未幾也別又繼之㣥賢以地經舊楚有離騷遺風凡今宴軷歌詩惟楚詞是斆以官命輕重為編次前後云丁氏子用文誼緣飾吏道尉丹陽三年嘉聞籍甚罷去之日以綵衣歸田廬邑中諸生愴離宴之不足俾豫序㣥言以為貺且著作繇經術進遍覽東觀石渠之奧殆二十年然後以華髮赤紱歸休里第巾安車理農政視纓轂聲榮與糞壤同矧餘杭有山水仁祠為浙右之冠想夫人持琴書履杖視朝夕之膳咨諏古義發明隱伏煙蘿魚鳥在動靜間夫如是焉用以少別為念士有抗方外之迹以世教為桎梏者不然則必由於文章之途以其合大中之道天理發於心術周於事業此賢士君子之所以致思也太原王生仲舒從事於斯弱冠秀發始以雅詞一軸為士相見之贄豫嘗學於此間世多病方將自全於朴止所不知及覽子之文文達而理舉溫潤博雅且多古風則曩時之心斐然復生所守不固然也然則文變損益非鄙所知粗言士友出處之略用以為贈動而不皎靜而不昧而不峻通而不雜此吾徒之所夙夜也固在子之彀中耳行旅之虞不足以誡執事自由拳抵信安途不千里奉板輿之歡赴竹林之期况新安江路水石清淺嚴陵故臺德風藹然漁浦潭七里瀨皆此路也二謝清興多自茲始今日出祖可以言詩度門之教根於空寂因修以取證階有以及無不踐精深之習而悟虛無之理者未之有也未得為得則其病歟僕久味斯法思與言者既而得元禪師師早誦大乘經各數萬言晚得觀門之學今則色空如一哀樂不入矣桑門之患有二焉未得之患為外見所雜既得之患為內見所縛今元公翛然於二見之間不內不外冥夫至妙身戒心惠合於無倪且以句吳有山水之絶境天竺又經行之靜界振錫而往其心浩然蓋隨緣生興觸物成化而不為外塵所引也幅巾男子權德輿稽首豫與惠公遊十年而惠公以其徒依公見訪藹然之和發於眉宇得其道者不待言説豫嘗欲黜健羡遺名聲不使塵機世相滑湣靈府故每隨縉紳士則神怠與依惠遊則性勝蓋循分而動亦境所由然上人以東陽為山水佳地且生約二德昔所遊踐况雲泄石室花發桃巖是二精舍為東南甲乙乃振緇錫泛然而行道機法樂盡在是矣如僕者方牽攣世教未得與師為方外之遊遐情幽賞期一二偈疏
