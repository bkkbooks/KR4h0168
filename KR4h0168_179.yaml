front:
  text: 全唐文欽定全唐文卷一百七十九王勃三
  hash: sha256:db23696362745dc4ee02dc5e22726e98918b6d9783a7c59c8338616b7621aa35
body:
  text: 臣伏見總章元年十二月四日詔既清東寇將覲南嶽甫資元勳旋窺大典伏惟皇帝陛下黼藻神器銜策睿圖用天老之前機戮防風之後至為而不恃懸寶位於中宸卑以自居託靈符於上帝禮凝蒼璧瑞溢元圭紫旻降祜黃祇叶矩微臣學不照古才不曠時窺宇宙之神功覩郊禋之盛節時非苟遇懷雅頌而知歸道不虛行想謳歌而有志豈與夫周傳考室裁稱棟宇之規漢奏甘泉未息嬉遊之諷比興衰於前代較馳驟於同衢而已謹憑天則輒貢拜南郊頌十章文不足奇意有遺美臣誠惶誠恐謹言臣某言臣聞帝機無眹道洽則時雍靈化不言功成則頌顯伏惟陛下體元纂極模神建隧棟梁三氣庭階六合松軒夜警杳冥姑射之心茅殿晨凝寥廓峒山之駕臣霑風太上庇影華胥仰衢室而無階候襄城而有地雖望卑平叔空勤景福之詞而文謝子雲願竭甘泉之思謹憑天造輒貢九成宮頌二十四章攀紫墀而絶望叫丹闕而纍息臣誠惶誠恐死罪死罪謹言臣某言臣聞奉忠履義帝業所資昭德報功王風是切臣父故臣使持節都督豐州諸軍事豐州刺史上柱國南康郡王士達往因隋季預奉皇初于時九洛未清雙崤尚梗江淮海嶽王公數十亡父身羈僞鄭寵極戎庭掃千載之風雲擁三河之士馬情思奉順義不圖生綿越寇場密歸誠欵登太行而耀甲則建德離心出函谷而揚麾則王充破膽天書屢降手敕仍存洎乎九服乂安四方無事謀臣出鎮猛將臨邊西窮赤水之源東究青邱之境橫戈北塞盡沙漠之風塵授鉞南荒被牂牁之矢石義形夷險迹遍疆場分閫淹榮懸車遂禮雖死於牖下實懷天子之恩力盡方隅無愧忠臣之節今者歸藏有日先遠戒期陛下德被遊魂惠流枯骨高班厚祿已極於生前列鼓鳴簫復光於身後誠非毀滅所能投報但臣霜露之感瞻彼岸而神銷烏鳥之誠俯寒泉而思咽希開淨福庶補窮埏伏惟陛下恢不次之恩録無涯之請使獲從朝例賜許度人濟沈識於昏塗拯亡靈於燬宅則陛下乾坤之施既不隔於幽明微臣螻蟻之心豈忘情於家國是所圖也非敢望也輕黷冕旒若墜氷谷勃言鄉人奉五月一日誨子弟各陳百里之術宣於政者承命惶灼伏增悲悚勃聞古人有言明君不能畜無用之臣慈父不能愛無用之子何則以其無益於國而纍於家也嗚呼如勃尚何言哉辱親可謂深矣誠宜灰身粉骨以謝君父復何面目以談天下之事哉所以遲回忍恥而已者徒以虛死不如立節苟殞不如成名悔過儻存於已為仁不假於物是以孟明不屑三奔之誚而罷匡秦之心馮異不恥一敗之失而摧輔漢之氣故其志卒行也其功卒就也此言雖小可以喻大此勃所以懷既往而不咎指將來而駿奔割萬恨於生涯進一簣於平地者今大人上延國譴遠宰邊邑出三江而浮五湖越東甌而度南海嗟乎此皆勃之罪也無所逃於天地之間矣然勃嘗聞之大易曰人之所助者信也天之所助者順也是以君子不以否屈而易方故屈而終泰忠臣不以困窮而喪志故窮而必亨今交趾雖遠還珠者嘗用之矣書不云乎弗慮胡獲弗為胡成不勝憤激之至謹上百里昌言一部列為十八篇分為上下卷庶竭私欵少裨公政追思罪戾若投氷谷謹奉言疏不備勃再拜蓋聞聖人以四海為家英宰與千齡合契用能不行而至春霆仗天地之威以息相吹時雨鬱山川之兆故有元蛟晚集憑鶴鼎而先鳴蒼兕晨驚運龍韜而首出並能風騰霧躍指麾成烈士之功蠖屈虬奔談笑坐㣥卿之右未如越蒼海棄行間排紫微謁天子於是遭不諱之主擁非常之位龍章鳳黻照其前鏘金鳴玉謺其後三靈叶贊超然奉天下之圖四海承平高步取寰中之託君侯之富貴足矣聖朝之付遇深矣故知陽侯息浪長鯨臥橫海之鱗風伯停機大鵬鎩垂天之翼及其投形巨壑觸丹浦而雷奔假勢靈飈指青霄而電擊神氣洋洋謂鱗翮使之然也殊不知兩儀超忽動止繫於無垠萬化糾紛舒卷存乎非我是以陳平昔之智士也俯同降卒百里奚曩之達人也親為餓隸當其背強敵轉康衢雄慮耿於風雲危途迫於朝夕豈自期榮稱相府西藩開虎據之圖寵冠齊壇東向舉熊飛之策顧盼可以蕩川嶽咄嗟可以降雷雨遂令用與不用是非於楚漢之間知與不知得失於虞秦之際故曰死生有數審窮達者繫於天材運相符決行藏者定於已君侯足下可不謂然乎借如勃者眇小之一書生耳曾無擊鐘鼎食之榮非有南鄰北閣之援山野悖其心跡煙霧養其神爽未嘗降身摧氣逡巡於列相之門竊譽干時匍匐於㣥公之室所以慷慨於君侯者有氣存乎心耳實以四海兄弟齊遠契於蕭韓千載風雲託神知於管鮑不然則荷裳桂楫拂衣於東海之東菌閣松楹高枕於北山之北焉復區區屑屑踐名利之門哉至尊以搖河徙嶽之威當立地開天之運聖人有作㣥材畢舉星辰入仕揖讓朱鳥之門風雨稱臣奔走蒼龍之闕方欲停旒金室引成康於已往闢纊瑤林復堯舜於茲日可謂明明穆穆盡天子之容貌矣抑嘗聞之丹山九仞煙峰非數簣之功紫極千門雲臺俟萬楹之力故天下至曠神器不可獨專天道無私元勳有待而立書曰元首明哉股肱良哉好問則裕自用則小况掌萬國之權受一人之寵動見臧否言知利害君侯足下何時易耶雖國有大命不資童子之言而恭此小心敢進狂夫之說伏見遼陽未靖大軍頻進有識寒心㣥黎破膽昔明王之制國也自近而及遠先仁而後罰徵實則效存徇名則功淺是以農疏十野僅踰重石之鄉禹截九州不敘流沙之境豈才不及而智有遺哉將以辨離方而存正功也雖至人無外甲兵曜天子之威王事有征金鼓發將軍之氣而長城在界秦漢所以失全昌巨海橫流天地所以限殊俗闢土數千里無益神封勒兵十八萬空疲帝卒驚烽走傳駭秦洛之氓飛芻挽粟竭淮海之費於是乘奸放命者出繩纆以生威因公挾私者入閭閻而競法雖一物失所太階延旰食之憂而百戰方雄中國鮮終年之樂圖得而不圖失知利而不知害移手足之病成心腹之疾征稅屈於東西威信蹇於表裏語曰勝之不武不勝為辱天下之責四面至矣誠可遠凝高策上薦忠言決人事於去就合天情於終始遂令回麾轉檄背青邱而騖列障分亭巡蒼波而守昔者齊侯以力方城為楚國之辭虞帝崇文苗人失洞庭之險况乎仗德綏亂以直乘邪明逆順之端聳華夷之望雖復舳艫沸海旌旗觸天鐵山四面金城千里亦不能為敵人計矣此君侯之未諭一也蓋聞星回日運御洪荒者貞夫一電照風行制寥廓者歸乎靜易曰復其見天地之心乎語曰動之斯和綏之斯來是知源潔則流清形端則影直大道起而仁義息神化周而市獄定雖復體元立教眚災耀知遠之書順時宰物宥罪發精微之典而况澆風易漸淳化難歸孔明耿介於當朝子輿殷勤於易簀蓋有由也伏見邊凶尚梗殊恩屢發命山澤者日月相趨朝脫桎梏夕還囹圄姦徒抱袂因時立僥幸之謀頑夫頓足中路紆吁嗟之慘皆由寬勝於猛人迷所習勸沮不彰廉恥相冒亦有公卿失職恥受圭符之任郎官有釁俯捨銅墨之榮又焉可以宏長風流抑揚衆務者也且夫朽索充羈不收奔馬之逸輕緡振網或隨吞舟之勢况非常之化方洽於齊人無妄之恩乃及於㣥小將恐匡衡管仲復靈詔於下泉矣古之善為國者不然信賞而必罰道德而齊禮澤配風雨而無曲惠威振雷霆而絶私戮交書聳幣伏慈厚之師投金散璧樹仁明之長故雖開衢室蓋明堂亦將四三皇而六五帝矣此君侯之未諭二也蓋易曰天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財是知發揮地利農桑啓其業振蕩天功泉貝流其用伏覩前制屢擾事非畫一廛市蕭然人情怪動夫煩簡並用未盡交易之宜輕重齊行適啓兼並之路於是連闤掩闠者閉肆而乘其屈布衣韋帶者闔門而受其困五方競爽務淺術以相雄百郡爭勝驅末技而成弊田夫織婦衣食鮮終朝之給巨駔洪商輿馬挾封君之勢蓋有由來矣故曰國儲闕於九載則公上無所給家廩乏於三年則妻子非其有夫陰陽覆逆天地之常數百六運窮湯堯所不免一旦洪泉決地大旱焦山風雨於一嵗之間霜雹於數州之境繁運廣役首尾於中外沓稅增徭日夕於都鄙燮陰陽者將何以處之一夫竊議公之盛德虧矣愚謂嚴程峻法絶輕陋之貨則奸鎔之源塞矣沿風正典重耕耘之務則邪贏之計沮矣然後遠宏教旨大變流俗法立有犯而必施令出唯行而不返違公竊鑄者具五刑之戮因時力田者懸一命之賞不然則賈生朝錯復流涕而言矣此君侯之未諭三也嵩衡不拒細壤故能崇其峻江海不讓纖流所以存其廣是以星臺曉闢上台忘吐握之勞月殿宵興中宇軫山林之慕知夫御天下者必待人也詩曰濟濟多士文王以寧未見君子憂心如醉伏見皇明遠燭帝采遐宣張樂岱郊騰勳社首徵廉察孝瑤壇虛不次之階署行議年璿檢動非常之詔天下可謂幸甚矣於是友月朋霞之客背青皋而至馮唐顏駟之才排紫閣而集夫豈知終始異數涇渭同流蘿薜失圖簪纓解體惜哉㣥英霧散名侯招蔽善之嫌天下雷同君子鮮長鳴之地而欲招絶足致真龍難矣此君侯之未諭四也易曰拔茅連茹以其彙征吉豈非順物不若招類報國不如進賢陽事升而雨露歸陰駕凝而風霜厲莫不觀時有記撫氣相求窮則獨善其私達則兼善天下而利已疵物者以自任為身謀知進忘退者謂專榮而得計豈知夫尺波易謝寸晷難留陵谷好遷乾坤忌滿君侯足下出納王命升降天衢激揚鳳扆之前趨步麟臺之上亦復知天下有遺俊乎夫心之精微口不能言也言之微妙書不能文也伏願闢東閣開北堂待之以上賓期之以國士使得披肝膽布腹心大論古今之利害高談帝王之綱紀然後鷹揚豹變出蓬戶而拜青墀附景摶風捨薹衣而見絳闕幸甚斯不為難矣庶幾乎麑卵不棄終感元枵之精駿骨時收或致飛黃之錫書生王勃死罪死罪再拜月日龍門百姓某謹再拜奉書於司馬上官公足下蓋聞靈化出於窈冥帝圖寄於寥廓聖人生而萬物覩太階平而四國會故曰有非常之后者必有非常之臣有非常之臣者必有非常之績至今雷奔雨嘯風旋電轉拾青紫於俯仰取公卿於朝夕雲臺迫漢南宮列元宰之圖霜㦸羅門北闕據名臣之第嘗見之矣至若時非我與雄略頓於窮途道不吾行高材屈於卑勢孔宣父之英達位未列於陪臣管公明之傑秀名僅終於郡屬有時無主賈生獻流涕之書有志無時孟子養浩然之氣則亦有焉豈非妙造無端盛衰止乎其域神期有待動靜牽乎所遇向使太公失於周伯則旗亭之屠父韓信屈於蕭何則轅門之餓隸又焉得鷹揚豹變吐納風雲者哉故曰知與不知用與不用觀夫得失之際亦窮達之有數乎其有邀時譽忘廉恥徇苟得設向背於朝廷立縱橫於勢利舉三寸之舌屈辱豪門奉咫尺之書逡巡下席皆自謂材足以動俗智足以濟時鐘鼎輝其顧盼冠蓋生其藉甚豈知夫四海君子攘袂而恥之乎五尺微童所以固窮而不為也此蓋莊周有言所以得意而忘象得象而忘言語曰談何容易易稱書不盡言知談之不易而欲言之盡以是思之良可知矣下官者康衢之賤耳嘗聞闕里之言頗挂平輿之目豈不知塵形俗狀游水鏡而多慙抱鼓援鼙過雷門而自失而欲刻鵠飾鳧唐突扃鑰者耶徒以登山泛海庶測高深執炬傳螢希增日月三奔九合下官聞管仲之風千載一時君侯受鮑卿之託是以敢陳其徑庭不然則秋風明月西江留獨往之因桂嶠松巖南山有不㣥之地矧區區者而重高明之閫閾哉君侯極天分構振瓊樹而韜霞帶地疏源握珠胎而冠月鱗軒羽殿瑤臺降卿相之榮鵲印蟬簪金社發公侯之始青皋獨唳望鴻漸而翻霞丹穴高鳴對鵷池而矯霧嚴助以賢良待詔未厭承明汲黯以方正拾遺終榮臥理藩維克振既參來暮之歌邦國不空自有康沂之相加以雄材廣度散琬玉於胸懷逸氣遒文運風霜於掌握迫青霄而構舍煙霞之涯涘莫尋振滄渤以流謙江漢之波瀾未測耀靈圭於趙席垂棘知歸辨㣥籟於莊軒懸匏自託賓階夕敞清河銷驥縶之虞虛榻晨披元禮得龍驅之地方當翊贊宸極羽儀台屏豈徒偃仰州縣勞事藩庭而已哉借如僕者言不滿於鄉黨聲不出於堂閾東海取樂於簞瓢南山異志於文史餐花佩葉入蘭室而談元挹露攀霞坐松扃而嘯逸揚子雲之淡泊心竊慕之嵇叔夜之逍遙真其好也未嘗露才揚已飾小智以驚愚假勢憑時託中人而樹迹遍遊天下寒心於將相之門獨守太元側身於名利之境嘗謂奉琴巵於北牖詠詩禮於南陔坐商洛而折雲英臨江湖而採煙液生願畢矣而屬鸞扃停逸頻虛不次之階鶴板徵賢纍發非常之詔天下有道吾豈匏瓜承達人一顧之榮辱公車再辟之禮平津侯之博物終屈奉常賈大夫之才名猶逢綘灌况庸者而可免於此乎君侯要津先據圖海盛於當時下官覆簣方勤為山始於今日雖陵深谷變終非入室之賓而晝詠宵吟敢預升堂之列夫以幽明不測尺標見天下之心巨細相傾寸管合羲舒之度豈非道存斯貴理在必亨霸略近發於輿歌皇圖不隔於芻議故有榮枯絶等奉推轂而欣然年勢不侔受分庭而罔愧風規可接惟君侯體之今古未殊則下官願矣常恨霜松列澗萬尋無罩月之期露草滋山寸莖有梢雲之望斯則聲實困於兼濟才位難於俱立况乎地勢不足以誇俗容貌不足以動人遑遑藪澤安足以奉高明之咳唾也所冀蠅階賤質附雲足而追飈蚋序輕姿託霜毛而絶海委名勵已蛟鐔申獨斷之能偶跡當仁驪珠鮮暗投之懼天衢可望指鵬程而三休巨壑難遊伏龍門而一息勃死罪死罪昊天不忱哲人終否畢公逝矣傷如之何敬想情則懿親義惟良執非夫人之為慟其誰為慟乎僕與此公早投交契夷險之際終始如一常思並建忠孝之績共申家國之讐壯志不就古人所悲何圖一旦長訣嗚乎哀哉管仲不存叔牙空在子皮已喪子産何依興言追昔良增痛悼適得韋四郎書具承大郎雅意知欲以此公碑志託之下走夫撫今懷昔理寄斯文旌德敘功事屬知已是以子期幽思感叔夜之形言伯喈雄藻待林宗而無愧下走雖不敏幸託深期此而不為誰當為者但恐位卑先達才非拔萃虛承厚眷不副高聞謹遣舍弟勛往面取進止臨書啜泣慘惶不次蓋聞天地作極不能遷否泰之期川嶽薦靈不能改窮通之數豈非聖賢同業存乎我者所謂才榮辱異流牽乎彼者所謂命是以龍驤鳳峙伊周成翊贊之功含糗羹藜顏冉困棲遲之病或先號而後笑或始吉而終凶事不可量功未必定則知洪濤未接長鯨多陸死之憂層風未翔大鵬有雲傾之勢池鰌井鮒亦將鼓鱗而輕之田鳩野鷃亦將鶱翮而侮之及其衡溟渤接扶搖吹波則江漢倒流騰氣則虹霓掩彩摩赤岸負蒼天然後知其力焉吁韓信之無津也昌亭之一餓夫耳馬卿之失路也臨卭之一食客耳武不足以服衆文不足以動時長劍屈於無知洪筆淪於不用洎乎雄圖躡運至尊納背水之謀麗藻升朝天子賞淩雲之作威加海嶽聲振廊廟彼淮陰之俠少成都之遺老也又焉能知遠近哉是以鑒物於肇不於成賞士於窮不於達是知卞和之得玉也精存於岸谷之間張華之得劍也氣發於星辰之際夫豈琢磨成器然後知其寶剸斷為能然後知其用哉仰惟鄉耆等並玉山高族金隄勝侶列子弟於千城耀衣冠於百代或以風雲去國公孫躍馬之年鐘鼎從王諸葛攀龍之日門庭相接雕薨將綺棟連陳機杼相和鳳鑷將虬梭交響金漿玉饌食客三千緑幘青裳家僮數百沖襟渺識人多江漢之靈麗藻華文代有雲淵之氣北齊開敞南館虛閒詩酒同歸琴書合契忘機得意恥嵇阮之交疏虛席延賓恨原嘗之客少實煙霞之藪澤風月之津梁者乎劉仲文之遠識不以乾沒詣梁城閔仲叔之高風不以口腹纍安邑雖其已沒生氣猶存况乎屬宇宙之明當天下之泰不能俯拾青紫高視搢紳攀北極而謁帝王入南宮而取卿相脅肩側足求哀鍾釜之間低首俯眉取濟斗升之未嗟乎誠下官所以仰天漢而鬱拂臨江山而慷慨者也但時可以未遇道可以未行志願可以未成功業可以未就古之才足以輔王業躡跡屠釣之門功可以濟巨川藏身版築之下百里奚之負販陳湯之丐貸而况於庸者哉此僕所以駿奔於顧盼之餘自致於恩光之末也且夫精誠所感尚動神明意氣相交豈慙車馬倘能投心季子遙存素紵之恩援手應侯先立綈袍之贈豈人之情也能無報乎方今白藏紹序朱律謝期天高而林野疏候肅而江山靜輕蟬送夏驚晚吹於風園旅鴈乘秋動宵吟於露渚絲纊成於南畝粳黍被於東阡時計有儲願履多福下官薄游綿載飄寓淹時歡躓相仍憂虞自積陟梁鴻之峻嶽何暇長謠臨阮籍之長途惟知慟哭庶憑賙給以濟飄危輕訴短懷佇流嘉耗蜀都廣鎮岷墟奧壤山分玉宇水向金陵景貺有期英靈間出榮問休暢幸甚幸甚夫神有可迫淥波驚七柱之音道有可符元霜扣九鐘之節豈道窮精祕妙聽察於無聲理實杳冥元應通於不測波流柱響波無入柱之因霜落鐘鳴霜非扣鐘之具矣况乎言忘意得臭味相求目擊道在神明已接鄭僑之逢吳札無謂殊方阮籍之對嵇康自然同氣僕雖不敏嘗從事於斯矣嘗謂薰蕕不共器梟鸞不比翼是以類乎方者接風雲於千里乖乎類者起山川於一面抑嘗聞之士之生也其跡可擯而道不可藏其身可辱而志不可奪其有拂衣投臂遁形滄海之隅裂裳裏足獨立高山之頂量腹而食度身而衣以鐘鼎為芻豢以衣冠為縲絏方欲策鸞鳳而撫雲英鞭虹霓而採煙液其次排玉闕指金門成賈誼之謨樹終軍之策因機入務懷素將相之門沐露沾霜擁篲公侯之室然則拾青紫於旦暮取功名於俄項演文物而動寰中騰聲名而振天下若下官者可謂慙二途矣而斂手長揖強顏高視低心於蹇躓之辰忍恥於恓惶之日者哉渭濱留釣鷹揚之業未萌淄源滯牧鴻漸之資蓋寡及其攀穹運接靈期乘雲雷而清八極和陰陽而調萬品則知冥機所運吉凶於倏忽之間元命所移飛伏於斯須之際以日月自至聊復爾耳方今炎飈謝節爽候開辰風高而宇宙清霜下而亭郊肅歸雲止鴈流曙響於東津落照開鴻寫晴規於北岸螢疏夕砌蟬促朝林感序緣情登高寄賞僕一違秦隴再革炎涼戒征軸而無因指歸途而有倦故鄉超曠層山重復吳宮尚遠頻驚去燕之心楚峽猶賒已下聞猿之淚徒以風猷未隔道義相存幸承知已之心稍緩他鄉之思昔者虞公再見懸光白璧之前季布一言猶定黃金之諾况乎交已成於杵臼道已茂於金蘭希照窮途遠流嘉貺若使恩裁口腹空留安邑之賓惠闕始終取恨昌亭之客
