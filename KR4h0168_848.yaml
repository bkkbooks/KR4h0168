front:
  text: 全唐文欽定全唐文卷八百四十八疇後唐長興元年官宗正丞
  hash: sha256:8c91e14d38bf3e823e3cfcdbdcc485ba51122c617df48008e8ff04b77fd6a6fe
  markers:
  - {type: head, offset: 14, content: 李疇, id: KR4h0168_NFKB_848-h1, level: 1}
body:
  text: 京畿內列聖園陵自兵亂後來人戶多於陵封內開掘燒磚窰竈掘斷岡阜驚動神靈此後請嚴切禁止奉陵州縣凡有封內窰竈並宜修塞崇遇後唐長興元年官尚舍奉卿竊見文武百官一品己上薨謝者皆有賻贈自四品己下無例施行請特定事例以表無偏澄後唐長興二年官大理少卿猗嗟掄材者梓必將有以掄者動不妄施材者用之為美塗其丹雘之色契乃斫雕之理成乎器用孰不勤止則知能者軌物其利博哉達於道必獲乎象酌於事實在乎材材罔不奇戒乎不知應時可重匪飾胡為須度長而潔大諒方矩而圓規役是司者勉矣厥宜亦猶德必輔人材不假器人失德而奚取器非材而奚利材濫則過於梓人德乖則失乎爾位其有取非輪桷性實散樗以不材而見棄思入用其焉如豈比山有之亦修短惟準工度也而削理有餘既罕節而抱直成大厦之厥居者哉夫如是則工以理材為難國以教人為聖聖體材而存道材象道而成政宏之在人慎乃出令藏器俟時人罔越思達乎至極欽哉有司惟試可矣以材校之守而弗失其德秩秩以人觀材以材觀實非獨陳伊周之宏義將以翊我唐之政術儻小材之不遺願雕煥於茲日陛下御極以來大稔於此時無水旱歲有豐登所以民去農桑士思遊情或機巧以趨利或宴樂以棄時且一夫不耕或受其飢一婦不織或受其寒者而況鄉閭之內城郭之中競削錐刀罔知本末或鼓舞於村落或謳歌於市㕓實繁有徒觸類而長若非禁止漸恐滋彰莊後唐明宗朝官刑部員外郎臣聞漢宣帝云與朕共治天下者其唯良二千石乎今國家每擇郡牧唯賞軍功慮於治民未盡其旨為人求瘼責在參佐則庶幾近理願留天眷俾慎揀焉和後唐明宗朝為西川雲州使中京帝宅上洛星橋宮城俯臨九重密邇康莊或斷一切停留架海黿鼉誰看往迹填河烏鵲不見新營冠蓋相喧遏紅塵而不度車徒競擁駐白日而移陰修搆既在科須差遣誠歸正典事合屬於將作不可責以親人訴者有詞請停推劾威等連狀舉忠將為幹濟廉使以忠懦弱不舉職事以邀名欲科不伏上洛飛湍中橋施搆參差危柱若星影之全開斷絶浮梁似虹光之半起望九衢之車馬未見川流瞻兩岸之風煙更疑波委楊忠宣風帝輦作宰神州以修造之辰當沍寒之節私雇船舫公然來往論惠雖是恤人語事更非濟物且雨畢理道水涸成梁莫不率由舊章抑亦編諸甲令故違憲法自置刑科廉使以懦弱繩愆正符厥理杜威以幹濟連狀未識其宜鬱後唐明宗朝官大理少卿准貞觀五年八月二十一日敕極刑雖令即決仍三覆奏在京五覆奏決前三奏次日兩奏惟犯惡逆者一覆奏著於格令又准建中三年十一月十四日敕應決大辟罪在京者宜令行決之司三覆奏決前兩次決日一奏又謹桉斷獄律諸死罪囚不得覆奏報下而決者流二千里即奏報應決者聽三日乃行刑若限未滿而行刑者徒一年伏以人命至重死不再生近年以來全不覆奏或蒙赦宥己被誅夷伏乞敕下所司應在京有犯極刑者令決前決日各一覆奏聽進止有凶逆犯軍令者亦許臨時一覆奏應諸州府乞別降敕指揮伏自廣明辛丑之後天祐甲子已來官壞政荒因循未補此蓋諸司滅喪人吏曹局亡失簿書至令官僚中有不知所掌之事者伏准文明元年四月十四日敕律令格式為政之本內外官員退食之暇各宜披覽仍以當司令式書於廳事之壁俯仰觀瞻使免遺忘虔尋茲制實繫化源請下內外文武百司如本司闕令式者許就三館抄六典內本司所掌名目各粉壁書寫朋龜後唐天成中官太常博士謹桉禮經臣不誄君稱天以諡之是以本朝故事命太尉率百僚奉諡冊告天於圓丘回讀於靈座前並在七月之內諡冊入陵若追尊定諡命太尉讀諡冊於太廟藏冊於本廟伏以景宗皇帝頃負沈寃歲月深遠園陵己修不祔於廟則景宗皇帝親在七廟之外今聖朝申寃追尊定諡重新帝號須撰禮儀又禮云君不逾年不入宗廟且漢之殤沖質君臣己成晉之惠懷愍俱負艱難皆不列廟食止祀於園寢臣等切詳故實欲請立景宗皇帝廟於園所命使奉冊書寶綬上諡於廟便奉太牢祀之其四時委守令奉薦請下尚書省集三省官詳議施行禺後唐明宗朝官太常博士伏以宗廟之制歷代為難須按禮經旁求故實又緣禮貴隨時損益不定今參詳歷代故事立高曾祖禰四廟更上追遠祖光武皇帝為始祖百代不遷之廟居東向之廟供為五廟庶符往例又合禮經據開元禮臨軒冊禮命諸王大臣其日受冊者朝服從第鹵簿與百官俱集朝堂就次受冊訖通事舍人引不載謁朝還第之儀自開元以後冊拜諸王皆正衙命使詣延英進冊皇帝御內殿高品引王入立於位高品宣制讀冊王受冊訖歸院亦無乘輅謁朝之禮臣按五禮精義云古者皆因禘嘗而頒爵祿所以示無自專稟之於祖宗也今雖冊命不在蒸嘗然拜大官封大邑必至殿廷敬慎之道也今當司欲準開元禮其日秦王服朝服自理所乘輅車備鹵簿與㣥臣俱集朝堂就次受冊訖至應天門外奉冊置於載冊之車秦王升輅出謁太廟訖歸理所儀仗鹵簿如來時之儀虔膺後唐長興二年官遼州和順縣令里俗有父母在而析財別居又宗族之間或有不義凌其孤弱者請行止絶知微後唐長興二年官刑部郎中開元刑法格有後格破前格之載無後敕破前律之文今雖以律定罪以格禁違復有八議之條廢來斯久請准舊制令居八議之條有犯死罪者令所司准法先奏請行議典臣每詳覆案文靜究贓罪條件或有因緣勘鞫滋漫告陳雖廣訟論漸異根本其間有物關獻遺事同情異或果實紙筆之徒或絲履茶藥之類逐色目計錢不及三二百聚都數不過四五千為案牘之微贓傷朝廷之大體引律二罪俱發以重者論不纍輕以加重請非正論事條外定贓之時並許除落請藩方州郡皆令抄寫法書每遇詳刑須憑條格既無失入自絶銜寃近年關防商賈不憑司門公驗關禁之設國有舊章請諸司舉行之竊以唐有天下垂三百年聖帝明君覽宏綱而御極忠臣賢佐法古道以贊時兩漢已還歷代罕比雖國有中否之數人無厭德之言果致陛下紹開中興纘承大業將欲永光帝載而猶動守典刑伏見州縣官僚被人論訟始行追取未辨是非稱呼不去其官曹枷鎖已拘於道路所以上無恥格下絶恭敬有玷盛明實駭觀聽此後凡有官緒可稱所訟罪名未正伏請祇令監守皆在法司俟曲直稍分即荷校無憚所貴坐法者知國章有節司刑者表守律無踰竊覩近敕慮有官吏割剝下人許百姓陳告民之愚下罔認宸衷或捃托纖微或受人驅駕事多憑虛適足為亂有過者固合當辜誣罔者請議刑憲庶或知止免瀆風化允升後唐長興三年官太常丞使府郡牧例以隨身僕使為中門代判通呈等名目極多皆恃勢誅求不勝其弊伏請特行止絶如藩侯郡守不能書札請委本判官代押其職務監臨請差本處衙院官吏庶得漸除踰濫兼使州奏薦判官多非才行或以賄賂求進今後奏薦請令本人隨表至京令所司比驗同文後唐長興三年官國子博士伏見每年春秋二仲月上丁釋奠於文宣王以亠兊國公顏子配坐以閔子騫等為十哲排祭奠其七十二賢圖形於四壁面前皆無酒脯自今後乞准本朝舊規文宣王四壁諸英賢畫像面前請各設一豆一爵祠饗華後唐長興四年官刑部員外郎臣竊以欽恤者聖人之大德畏慎者臣下之小心倘不怠於交修庶自叶於理道伏遇陛下靜符元化動修至仁八紘無幽枉之人四海有升平之望但以人非誘勸事罕專精將欲仰副憂勤實願再明條制伏見本朝故事凡內外官司有能辨雪寃獄活得人命者特書殊考非時命官多難已來此道漸廢既隳賞典難得公心伏乞明降敕文顯示中外自此不繫正攝官吏能辨雪寃獄全活人命斷割才訖旋具奏聞考較不虛時與超轉如或滯留不具申奏及虛妄冀希恩澤其所任司長本判官並請重加殿罰希甫宋州人少舉進士為梁開封尹袁象先掌書記後唐同光初為駕部郎中遷諫議大夫兼匭函使以希旨誣殺豆盧革拜左散騎常侍後告密事發貶嵐州司戶參軍長興中卒於貶所臣聞天地助順神理福謙既物性之則宜何虛心之致誤伏惟陛下自統臨四海勤恤萬方每崇恭儉之風嘗布仁慈之德即合陰陽無爽災沴不生百穀豐盈五兵偃息今乃川瀆決溢水旱愆違必恐是調燮未乖祭祀未潔軫吾君宵旰之慮負陛下覆育之恩臣實痛心誰回愧色伏乞特頒明詔下訪有司詢其消遣之方採彼妖祥之本應是前王古帝往哲先賢或有遺祠但存舊址在祀典者咸加嚴敕稟靈通者盡略修崇悉遵虔肅之誠無惰精祈之懇然後別宣長吏側聽庶民稍關疾苦之由須罄撫循之策冀其昭感仰贊升平四方刑獄動皆上聞不獨有紊於公朝兼且淹延其獄訟伏乞條流縣令凡死罪已下得專之刺史部內有一吏一民犯罪得專之觀察使部內有犯罪五人已下得專之如此則朝廷事簡見萬乘之尊矣臣叨蒙擢任官忝諫司所職重難兼知匭院但有關於至理即欲合於無私冀竭丹誠仰裨元造臣伏見自同光元年十月九日先朝收下汴州後至今年四月一日已前兵革盛興亂離斯極典章幾壞刑政莫施每於紛擾之間甚有殺傷之苦非惟州縣長吏或濫誅夷直至鄉里居民互為殘戮挾私怨者公行白刃將快忿心怙強力者豈聞丹書惟欣得志掠妻女以轉賣劫財貨以平分如此之流應遍天下伏惟皇帝陛下薦恢帝載光啓鴻圖伏思自陛下臨御以來皇綱漸正有功者盡賞有罪者咸誅閫外將清朝中無事今則匭函己再修整欲具進呈必恐撎出外邊施行己後遠近披欣受狀至多但慮京國諸司囚禁便憂填委則至上虧皇化有玷國風其次更慮勳貴親賢或關對訟便煩讞議或礙刑書若今事有否臧即便政移曲直以臣愚見欲自元年四月二十八日昧爽己前罪無輕重應大辟己下罪一切釋而不問庶得刑清俗泰國富民康咸欽不宰之功永奉維新之化府州官吏不務守官咸思避事每覩微小刑獄皆是聞天不惟有紊朝綱實恐淹延刑獄臣聞禁暴亂者莫先於刑律勤禮義者無切於詩書刑律明則人不敢為非禮義行則時自然無事今詩書之教則業必有官刑律之科則世皆莫曉近者大理正宋升請置律學生徒雖獲上聞未蒙申舉伏乞特頒詔旨下付國庠令再設此科許其歲貢仍委諸州各薦送一兩人就京習學候至業成便放出身兼許以卑官卻還本處則率土之內盡會刑書免禍觸於金科冀咸遵於皇化琮後唐長興中官濮州録事參軍門下邊境未寧固資於選帥輪轅適用必在乎與能無煩易地之勞各副長城之委鳳翔節度使檢校刑部尚書李業生自將門久知虜態悅詩書而不倦索韜鈐而甚精河東節度使檢校禮部尚書李拭早膺儒冠克擅文場幼挺瑚璉之姿尤通冉季之政並纍更重任必播能名或居劇塞而練卒討羌或領北門而剋己訓士皆勤勞備著功效居多朕以右輔之新拓土疆是資綏緝大鹵之連控戎落尤藉隄防或更戶封之崇或仍舊貫之美各膺新命無替前勞諸道獄囚恐不依法考掠或不勝致斃翻以病聞請置病囚院兼加醫藥航後唐長興四年太常博士准格詐為制敕僞行符印罪當絞其令史吳知己准格重杖一頓處死本司官祠部郎中王承辨初不精詳致彼罔冒准詐僞律合杖九十如己去官則減等今王承辨己別除官據格放罪門下令史陳延祐雖不與吳知己同情有涉屬託准律杖一百放堂後官何康初言屬託不至瑕疵准律杖罪呂道昭李玩呂圖事雖關連別無深罪准格並合釋放諫議大夫張延雍補蔭自有格文催促失於事體言苛剋之語雖是見人據引驗之詞蓋亦虛指伏候敕處分比來小祠已上公卿皆著祭服行事近日惟郊廟太微宮具祭服五郊迎氣日月諸祠並祇常服行事兼本司執事人等皆著隨事衣裝狼籍鞋履便隨公卿升降於壇墠按祠部令中祠己上應齊郎等升壇行事者並給潔服事畢收納今後中祠己上公卿請具祭服執事升壇人並著具緋衣幘子今臣檢禮閣新儀太微宮使卯時行事近年依諸郊廟例五更初便行事今後請依舊以卯時光憲後唐明宗朝官太子賓客以禮部尚書致仕應順元年卒臣聞國之重事惟祀與戎四時薦享之儀合以敬恭備禮每祭三公具列御史監臨行事㣥官皆宿壇廟或屋宇不庇風雨或止泊投寄村園無戶牖以防虞無薦席以藉地苟傷棲旅難責精虔禮或不周福將安望乞今量事添置庶保肅恭將垂帝範在守於舊章欲敘彞倫合循於典故實大朝之理本蓋有國之常規臣嘗覽列聖實録伏見建中元年正月五日敕旨應內外常參官後三日舉一人自代者編諸簡冊冀拔賢良是資教化之方以盛簪裾之列爰於近歲稍易舊規臣請明下敕文許行建中故事所冀振纓在位咸懷舉善之心棫朴興歌漸致得賢之美愚字子晦自稱趙郡平棘西祖之後初名晏平舉進士又登宏詞科授河南府參軍梁末帝嗣位纍擢司勳員外郎入後唐為翰林學士同光三年魏王繼岌征蜀請為都統判官蜀平就拜中書舍人改兵部侍郎長興初拜中書侍郎平章事兼吏部尚書閔帝嗣位進位左僕射清泰初加特進太微宮使宏文館大學士後罷相守本官二年卒維應順元年歲次甲午四月庚午朔六日乙亥文武百寮特進守司空兼門下侍郎同中書門下平章事充太微宮使宏文館大學士上柱國始平郡公食邑二千五百戶臣馮道等九千五百九十三人上言帝皇興運天地同符河出圖而洛出書雲從龍而風從虎莫不恢張八表覆育兆民立大定之基保無疆之祚人謠再洽天命顯歸須登宸極之尊以奉祖宗之祀伏惟皇帝陛下天資神智神助機權奉莊宗於多難之時從先帝於四征之際凡當決勝無不成功洎正皇綱每嚴師律為國家之志大守臣子之道全自泣遺弓常悲易月欲期同軌親赴因山而自鄂王承祧奸臣擅命致神祇之乏饗激朝野以歸心使屈者伸令否者泰人情大順天象至明聚東井以呈祥拱北辰而應運由是文武百辟嶽牧㣥賢至於比屋之倫盡祝當陽之位今則承太后慈旨守先朝遠圖撫四海九州享千齡萬祀臣等不勝大願謹上寶冊稟太后令奉皇帝踐祚臣等誠慶誠忭謹言臣覽國史開元十七年宰臣張說源乾曜奏改朔體元固聖主之能事良辰嘉會亦俗化之大端蓋周人有合宴之儀漢代有賜酺之律所以歌詠皇德啓迪人情至若泛菊高堂遂號重陽之節流杯曲水永為上己之游在昔偶行於今不改豈足比君臨四海運應千年畫璿圖而敬授民時秉玉燭而節宣和氣身為律度德合乾坤仰為樞電之祥最是寰區之樂願從人欲特創節名封函尋示於允俞自此永編於令式舊章斯在列聖嘗行將有擬倫預慚膚淺伏惟皇帝陛下動遵典法克叶祖宗方今玉鏡高懸璿樞廣運告成功於朝社正大禮於宮闈是以舞干率服於三苖班瑞雍熙於萬國臣等以獻歲元正之月是猗蘭降聖之辰梅花映雪於上林椒酒迎春於祕殿江邊野老願鑾輅之時巡陌上遊童醉堯樽而獻祝請於是月特舉節名副與人共樂之言致率土交歡之義臣等謹按元宗皇帝以八月五日載誕張說等請以其日為千秋節臣等不揆庸暗輒體憲章請以來年正月降聖日為千春節僕關東一布衣耳幸讀書為文每見父子君臣之際有傷教害義恨不得肆之市朝明公居近關重鎮君父幽辱月餘坐視凶逆而忘勤王之舉僕所未諭也僕竊計中朝輔弼雖有志而無權外鎮諸侯雖有權而無志惟明公忠義社稷是依往年車輅播遷號泣奉迎纍歲供饋再復廟朝義感人心至今歌詠此時事勢尤異前日明公地處要衝位兼將相自宮闈變故己涉旬時若不號令率先以圖反正遲疑未決一朝山東侯伯唱義連衡鼓行而西明公求欲自安其可得乎此必然之勢也不如馳檄四方諭以逆順軍聲一振則元凶破膽旬浹之間二豎之首傳於天下計無便於此者
