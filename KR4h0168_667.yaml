  text: 全唐文欽定全唐文卷六百六十七白居易十二
  hash: sha256:43bcaac8d69b1b0dc877bb120e17f00867cb93d3ff439efd1d1fe6f89d45e374
body:
  text: 五月八日翰林學士將仕郎守左拾遺臣白居易頓首頓首謹昧死奉書於旒扆之下臣伏奉前月二十八日恩制除授臣左拾遺前充翰林院學士者臣與崔㣥同狀陳謝但言忝冒未吐衷誠今者再黷宸嚴伏惟重賜詳覽臣按六典左右拾遺掌供奉諷諫凡發令舉事有不便於時不合於道者小則上封大則廷諍其選甚重其秩甚卑所以然者抑有由也大凡人之情位高則惜其位身貴則愛其身惜位則偷合而不言愛身則苟容而不諫此必然之理也故拾遺之置所以卑其秩者使位未足惜身未足愛也所以重其選者使上不忍負恩下不負忍心也夫位不足惜恩不忍負然後能有闕必規有違必諫朝廷得失無不察天下利病無不言此國朝置拾遺之本意也由是而言豈小臣愚劣暗懦所宜居之哉况臣本鄉里豎儒府縣走吏委心泥滓絶望煙霄豈意聖慈擢居近職每宴飫無不先及每慶賜無不先霑中廄之馬代其勞內廚之膳給其食朝慙夕惕己逾半年塵曠漸深憂愧彌劇未伸微效又擢清班臣所以授官已來僅將十日食不知味寢不遑安唯思粉身以答殊寵但未獲粉身之所耳今陛下肇建皇極初受鴻名夙夜憂勤以求致理每施一政舉一事無不合於道便於時故天下之心禺禺然日有望於太平也然今後萬一事有不便於時者陛下豈不欲聞之乎萬一政有不合於道者陛下豈不欲革之乎倘陛下言動之際詔令之間小有遺闕稍關損益臣必密陳所見潛獻所聞但在聖心裁斷而已臣又職在中禁不同外司欲竭愚衷合先陳露伏希天鑒深察赤誠無任感恩欲報懇款屏營之至謹言右臣伏見內外官近日除改人心甚警遠近之情不無憂懼喧喧道路異口同音皆云制舉人牛僧孺等三人以直言時事恩獎登科被落第人怨謗加誣惑亂中外謂為誑妄斥而逐之故並出為關外官楊於陵以考策敢收直言者故出為廣府節度韋貫之同所坐故出為果州刺史裴垍以覆策又不退直言者故免內職除戶部侍郎王涯同所坐出為虢州司馬盧坦以數舉事為人所惡因其彈奏小誤得以為名故黜為左庶子王播同之亦停知雜臣伏以裴垍王涯盧坦韋貫之等皆公忠正直內外咸知所宜授以要權致之近地故比來衆情私相謂曰此數人者皆人之望也若數人進則必君子之道長若數人退則必小人之道行欲卜時事之否臧在數人之進退也則數人者自陛下嗣位以來並蒙獎用或任之耳目或委以腹心天下人情日望致理今忽一旦悉疏棄之或降於散班或斥於遠郡設令有過猶可優容况且無瑕豈宜黜退所以前月以來上自朝廷下至衢路衆心洶洶驚懼不安直道者疚心直言者杜口不審陛下得知之否凡此除改傳者紛然皆云裴垍等不能委曲順時或以正直忤物為人之所媒孽本非聖意罪之不審陛下得聞之否臣未知此説虛實但獻所聞所聞皆虛陛下得不明辨之乎所聞皆實陛下得不深慮之乎虛之與實皆恐陛下要知臣若不言誰當言者臣今言出身戮亦所甘心何者臣之命至輕朝廷之事至大故也臣又聞君聖則臣忠上明則下直故堯之聖也天下已太平矣尚求誹謗以廣聰明漢文之明也海內已理矣賈誼猶比之倒懸可為痛哭二君皆容納之所以得稱聖明也今陛下明下詔令徵求直言反以為罪此臣所以未喻也陛下視今日之理何如堯與漢文之時乎若以為及之則誹謗痛哭尚合容而納之况徵之直言索之極諫乎若以為未及則僧孺等之言固宜然也陛下縱未能推而行之又何忍罪而斥之乎此臣所以為陛下流涕而痛惜也德宗皇帝初即位年亦徵天下直言極諫之士親自臨試問以天旱穆質對以兩漢故事三公當免卜式著議宏羊可烹此皆指言當時在權位而有恩寵者德宗深嘉之自第四等拔為第三等自畿尉擢為左補闕書之國史以示子孫今僧孺等對策之中切直指陳之言亦未過於穆質而遽斥之臣恐非嗣祖宗承耿光之道也書諸史策後嗣何觀焉陛下得不再三省之乎臣昨在院與裴垍王涯等覆策之時日奉宣令臣等精意考覆臣上不敢負恩下不忍負心唯秉至公以為取捨雖有讐怨不敢棄之雖有親故不敢避之唯求直言以副聖意故皇甫湜雖是王涯外甥以其言直合取涯亦不敢以私嫌自避當時有狀具以陳奏不意㣥心嗷嗷構成禍端聖心以此察之則或可悟矣儻陛下察臣肝膽知臣精誠以臣此言可以聽採則乞俯回聖覽特示寬恩僧孺等準往例與官裴垍等依舊職獎用使內外人意歡然再安若以臣此言理非允當以臣覆策事涉乖宜則臣等見在四人亦宜各加黜責豈可六人同事唯罪兩人雖聖造優容且過朝夕在臣懼惕豈可苟安敢不自陳以待罪戾臣今職為學士官是拾遺日草詔書月請諫紙臣若默默惜身不言豈惟上孤聖恩實亦下負人道所以密緘手疏潛吐血誠苟合天心雖死無恨無任憂懼激切之至右臣聞諸道路皆云于頔裴均纍有進奉並請入朝伏聞聖恩已似允許臣側聽時議內酌事情為陛下謀恐非穩便晝夜思慮不敢不言伏見貞元以來天下節將握兵守土少肯入朝自陛下刑服三凶威加四海是得諸道節度使三二年來朝廷追則追替則替奔走道路懼承命之不暇斯則聖德皇威大被於四方矣夫謀宜可久事貴得中當難制之時則貴欲令其朝覲及可制之日則不必使之盡來何則安衆心收衆望在調馭之得其宜也臣伏見近日節度使或替或追稍似煩數今又許于頔等入奏或慮便留在朝臣細思之有三不可何者竊見外使入奏不問賢愚皆欲仰希聖恩傍結權貴上須進奉下須人事莫不減削軍府割剝疲人每一入朝甚於兩稅又聞于頔裴均等數有進奉若又許來荊襄之人必重困於剝削矣奪軍府疲人之不足奉君上權貴之有餘伏料聖心知之深所不忍此不可一也臣又竊聞時議云近日諸道節度使或以進奉希旨或以貨賄藩身謂恩澤可圖謂權位可取以入覲為請以戀闕為名須來即來須住即住要重位即得重位要大權即得大權進退周旋無求不得天下節度使盡萌此心不審聖聰聞此議否今于頔等以入覲為請若又許之豈非須來即來乎既來必以戀闕為名若又許之豈非須住即住乎則重位自然合加况必求之乎大權不得不與况必圖之乎重位大權人誰不愛于頔既得則茂昭求之臣聞茂昭又欲入朝己謀行計茂昭亦宰相也亦國親也若引于頔為例獨不可乎若盡與之則陛下重位大權是以人情假人也授之可乎若獨與彼不與此則忿爭怨望之端自此而作今幸門己開矣速杜之又令于頔等開之臣必恐聖心有時而悔矣其不可二也臣又竊見自古及今君臣之際權太重則下不得所勢太逼則上不甚安今于頔任兼將相來則總朝廷之權家通國親入則連戚里之勢勢親則疏者不敢諫權重則㣥下不敢言臣慮于頔未來之間內外迎附之者其勢已赫赫炎炎矣况其已來乎臣恐于頔未到之間內外合言者已不敢言矣况其已到乎脫或至此陛下有術以制馭之耶若用術制之不如不制之安也若又無術將如之何且于頔身是大臣子為駙馬性靈事迹陛下素諳一朝到來權兼內外若繩以規制則必失君臣之心若縱其作為則必敗朝廷之度進退思慮恐貽聖憂其不可三也凡此三不可事實不細伏乞聖覽再三思之今臣所言皆君臣之密機安危之大計伏望祕藏此狀不令左右得知况臣以疏議親以賤論貴語無方便動有悔尢言出身危非不知耳但以職居近密身被恩榮苟有聞知即合陳露儻言而得罪亦臣所甘心若默而負恩則臣所不忍伏希聖鑒俯察愚誠謹具奏聞謹奏右臣伏見有司以今年豐熟請令畿內及諸處和糴令收錢穀以利農人以臣所觀有害無利何者凡曰和糴者官出錢人出穀兩和商量然後交易也比來和糴事有不然但令府縣散配戶人促立程限嚴加徵催苟有稽遲則被追捉迫蹙鞭撻甚於稅賦號為和糴其實害人儻依前而行臣故曰有害無利也今若有司出錢開場自糴比於時價稍有優饒利之誘人人必情願且本請和糴只圖利人人若有利自然願來利害之間可以此辨今若除前之弊行此之便是真得和糴利人之道也二端取捨伏惟聖旨裁之必不得已則不如折糴折糴者折青苗稅錢使納斛斗免令賤糶別納見錢在於農人亦甚為利况度支比來所支和糴價錢多是雜色匹段百姓又須轉賣然後將納稅錢至於給付不免侵偷貨易不免折損所失過本其弊可知今若量折稅錢使納斛斗既無賤糶麥粟之費又無轉賣匹段之勞利歸於人美歸於上則折糴之便豈不昭然由是而論則配戶不如開場和糴不如折糴亦甚明矣臣久處村閭曾為和糴之戶親被迫蹙實不堪命臣近為畿尉曾領和糴之司親自鞭撻所不忍覩臣頃者常欲疏此人病聞於天聰疏遠賤微無由上達今幸擢居禁職列在諫官苟有他聞猶合陳獻况備諳此事深知此弊臣若緘默隱而不言不惟上孤聖恩實亦內負夙願猶慮愚誠不至聖鑒未回即望試令左右可親信者一人潛問鄉村百姓和糴之與折糴孰利而孰害乎則知臣言不敢苟耳或慮陛下以敕命已下難於改移以臣所見事又不然夫聖人之舉事也唯務便人唯求利物若損益相半則不必遷移若利害相懸則事須追改不獨於此其他亦然伏望宸衷審賜詳察謹具奏聞謹奏右嚴綬輔光太原事迹其間不可遠近具知臣前日對時已仔細面奏今奉宣輔光已替嚴綬續追此皆聖鑒至明左右不能惑聽合於公議斷自宸衷內外人心甚為愜當其嚴綬早須與替不可更遲緣與輔光久相交結軍中補署職掌比來盡由輔光今見別除監軍小人乍失依託或恐嚴綬相黨曲為妄陳軍情事宜之間須過防慮伏望聖恩速令貞亮赴本道便許嚴綬入朝右貞亮原是舊人曾任重職陛下以太原事弊使替輔光然臣伏聞貞亮先充汴州監軍日自置親兵數千又任三川都監日專殺李康兩節度使事迹深為不可違性自用所在專權若貞亮處事依前即太原却受其弊雖將追改難以成功其貞亮發赴本道之時恐須以承前事切加約束令其戒懼此事至要伏惟聖心不忘右范希朝前在振武威令大行至今蕃戎望風畏伏况又勤儉信實所在士卒歸心今若太原要人無出希朝之右伏恐聖意慮其有年臣又訪聞希朝筋力猶堪驅使但且令鎮撫必愜軍情待其一二年間威制成立然後擇能者則必易守成規則雖老年事須且用其靈武比太原雖小亦是要鎮如納臣愚見伏望便須擇人與希朝相代謹具奏聞右伏以聖心憂軫重降德音欲令實惠及人無如減放租稅昨正月中所降德音量放去年錢米伏聞所放數內已有納者縱未納者多是逃亡假令不放亦徵不得况旱損州縣至多所放錢米至少百姓未經豐熟又納今年租稅疲乏之中重此徵迫人力困苦莫甚於斯却是今年伏望聖恩更與宰臣及有司商量江淮先旱損州作分數更量放今年租稅當疲困之際降惻隱之恩感動人情無出於此敢竭愚見以副聖心右伏見大歷已來四十餘歲宮中人數積久漸多伏慮驅使之餘其數猶廣上則屢給衣食有供億縻費之煩下則離隔親族有幽閉怨曠之苦事宜省費物貴遂情頃者已蒙聖恩量有揀放聞諸道路所出不多臣伏見自太宗元宗以來每遇災旱多有揀放書在國史天下稱之伏望聖慈再加處分則盛明之德可動天心感悅之情必致和氣光垂史册美繼祖宗貞觀開元之風復見於今日矣非小臣愚懇不能發此言非陛下英明不能行此事如蒙允許便請以德音中次第處分謹具奏聞伏待聖旨謹奏右臣三五日來聞于時議云前件所進者並是于頔愛妾被普寧公主暗欲選進今于頔所進事非獲巳者臣未知此説虛之與實再三思之皆為不可何則于頔自入朝來陛下待之深得其所存其大體故厚加寵位知其性惡故不與威權中外人情以為至當在於于頔亦自甘心今因普寧奪其愛妾衆人既有流議于頔得以為詞臣恐此事不益聖德在臣愚見豈敢不言伏見陛下數月以來分別邪正所有制斷所有處置無不合於公論無不愜於人情惟此一事實乖時體關於損益臣實惜之今道路云云皆有此説是于頔自進亦恐外人不知去就之間恐須却賜于頔內足以辨明聖意外足以止息浮詞又令于頔有所感戴臣所聞所見如此伏恐陛下要知輒敢密陳庶裨萬一謹具奏聞謹奏右今日守謙宣令撰與師道詔所請收贖魏徵宅還與其子甚合朕心允依來奏者臣伏以魏徵是太宗朝宰相盡忠輔佐以致太平在於子孫合加優恤今緣子孫窮賤舊宅典賣與人師道請出私財收贖却還其後嗣事關激勸合出朝廷師道何人輒掠此美依宣便許臣知非宜况魏徵宅內舊堂本是宮中小殿太宗特賜以表殊恩既又與諸家不同尤不宜使師道與贖計其典賣其價非多伏望明敕有司特以官錢收贖使還後嗣以勸忠臣則事出皇恩美歸聖德臣苟有所見不敢不陳其與師道詔未敢依宣便撰伏待聖旨謹具奏聞謹奏右臣竊聞王鍔見欲除平章事未知何故有此商量臣伏以宰相者人臣極位天下具瞻非有清望大功不合輕授王鍔既非清望又無大功若加此官深為不可昨日裴均除平章事內外之議早已紛然今王鍔若除則如王鍔之輩皆生冀望之心矣若盡與則典章大壞又未感恩若不與則厚薄有殊或生怨望幸門一啓無可奈何臣又聞王鍔在鎮日不恤凋殘唯務差稅淮南百姓日夜無憀五年誅求百計侵削錢物既足部領入朝號為羡餘親自進奉凡有耳者無不知之今若授同平章事臣恐四方聞之皆謂陛下得王鍔進奉而與宰相也臣又恐諸道節度使今日已後皆割剝生人營求宰相私相謂曰誰不如王鍔邪故臣以為深不可也其王鍔歸鎮與在朝伏望並不除宰相臣尚未知所聞信否貴欲先事而言或恐萬一已行即言之無及伏惟聖鑒俯察愚衷謹具奏聞謹奏右臣伏聞向外傳説云裴均前月二十六日於銀臺進奉前件銀器雖未審知虛實然而物議喧然既有所聞不敢不奏伏以陛下昨因時旱念及疲人特降德音停罷進奉天意如感雨澤應期巷舞途歌咸呼萬歲伏自德音降後天下禺望遵行未經旬月之間裴均便先進銀器誠有此事深損聖德臣或慮有人云裴均所進銀器發在德音之前遂勸聖恩不妨受納以臣所見事固不然臣聞衆議皆云裴均性本貪殘動多邪巧每假進奉廣有誅求料其深心不願停罷必恐即日修表倍程進來欲試朝廷嘗其可否何者前月三日降德音準諸道進奏院報事例不過四五日即裴均合知至二十六日進物方到以此詳察足見姦情今若便容果落邪計况一處如此則遠近皆知臣恐諸道依前從此不守法度則是陛下明降制旨又自棄之何以制馭四方何以取信天下臣反覆思慮深為陛下惜之伏準德音節文除四節及旨條外有違越進奉者其物送納左藏庫仍委御史臺具名聞奏若此事果實則御史臺必準制彈奏諫官必諫宰相必論天下知之何裨聖政以臣所見伏望明宣云裴均所進銀器雖在德音之前恐四方不知宜送左藏庫收納如此則海內悅服天下歡心事出宸衷美歸聖德又免至御史諫官奏論之然後有處置在於事體深以為宜伏願聖心速賜裁斷謹具奏聞謹奏右伏以鳳翔右輔之地控壓隴蜀又近國門最為重鎮承前以來多擇有功勳德望者為之節度使昨者孫璹忽除此官臣緣素未諳知不敢輕議可否及制下之後甚不愜人心孫璹雖久從軍不聞有大功效自居禁衛亦無可稱至於姓名衆未知有縱有才略堪任將帥猶宜且試於小鎮不合便授此重藩豈唯公議之間以為過當亦恐同類之內皆生幸心况今聖政日明朝綱日舉每命一官一職人皆側耳聽之則除授之間深宜重慎今孫璹己受成命未可遽又改移待到鳳翔觀其可否以後不可不審伏恐聖聰要知右輔國當徐州用兵之時已有殊效及李錡作亂之日又立大功忠節赤誠海內推服近來將校少有比倫已蒙聖恩授金吾大將軍以示獎勵以臣所見更宜與一方鎮以感動天下忠臣之志以摧攝天下姦臣之心何者輔國之事無人不知方鎮之榮無人不愛若輔國更得節度使天下聞知人皆為貪寵榮誰不爭效忠順萬一若一方有事一帥負恩則麾下偏裨競為輔國亂臣賊子不敢不息一則明勸忠貞二則暗銷禍亂聖人機柄正在於斯今輔國聞己有年亦宜速用事不可失臣深惜之然以輔國未曾為理人官恐未可便授大鎮若近邊次節度有要替處與輔國最為得宜謹具奏聞謹奏右伏緣元稹左降事宜昨李絳崔㣥等再己奏聞至今未蒙宣報伏恐愚誠未懇聖慮未回臣更細思事有不可所以塵黷至於再三臣內察事情外聽衆議元稹左降不可者三何者元稹守官正直人所共知自授御史已來舉奏不避權勢只如奏李公佐等之事多是朝廷親情人誰無私因以挾恨或假公議將報私嫌遂使誣謗之聲上聞天聽臣恐元稹左降已後凡在位者每欲舉事必先以元稹為戒無人肯為陛下當官執法無人肯為陛下嫉惡繩愆內外權貴親黨縱橫有大過大罪者必相容隱而已陛下從此無由得知此其不可者一也昨者元稹所追勘房式之事心雖奉公事稍過當既從重罰足以懲違况經謝恩旋又左降雖引前事以為責詞然外議喧喧皆以為元稹與中使劉士元爭廳自此得罪至於爭廳事理已具前狀奏陳况聞劉士元踏破驛門奪將鞍馬仍索弓箭嚇辱朝官承前己來未有此事今中官有罪未見處置御史無過却先貶官遠近聞知實損聖德臣恐從今已後中官出使縱暴益甚朝官受辱必不敢言縱有被凌辱毆打者亦以元稹為戒但吞聲而已陛下從此無由得聞此其不可者二也臣又訪聞元稹自去年以來舉奏嚴礪在東川日枉法收沒入平人資産八十餘家又奏王紹違法給券令監軍押柩及家口入驛又奏裴玢違敕旨徵百姓草又奏韓皋使軍將封杖打殺縣令如此之事前後甚多屬朝廷法行悉有懲罰計天下方鎮皆怒元稹守官今貶為江陵判司即是送與方鎮從此方鎮報怨朝廷何由得知臣伏聞德宗時有崔善貞密告李錡必反德宗不信送與李錡李錡大怒遂掘坑縱火燒殺崔善貞未數年李錡果反至今天下為之痛心臣恐元稹左降後方鎮有過無人敢言皆欲惜身永以元稹為戒如此則天下有不軌不法之事陛下無由得知此其不可者三也若無此三不可假如朝廷誤左降一御史蓋是小事臣何敢煩黷聖聽至於再三乎誠以所損者深所關者大以此思慮敢不極言陛下若以臣此言為忠又未能別有處置必不得已則伏望且令追制改與一京師間官免令元稹却事方鎮此乃上裨聖政下愜人情伏望細察事情斷在聖意謹具奏聞謹奏右緣討伐恆州事宜前者已具奏聞此事至大至切臣不合一奏便休伏願聖聰再賜詳省臣伏以河北事體本不合用兵既已用兵亦希萬一所以人意或望成功今看事勢保必無望何者陛下本用兵之初第一倚望承璀第二準擬希朝茂昭今承璀自去以來未敢苦戰已喪大將先挫軍威至今與從史兩軍入賊界下營未得從史雖經接戰與賊勝負略均况奏報之間又事恐非實遷延進退貴引日時不唯意在逗遛兼是力難支敵希朝茂昭數月以來方入賊界據所奏到賊新市城一鎮便過不得又奏深澤縣今却被賊打破則其進討之勢想亦可知劉濟親領全軍分圍樂壽又奏賊城堅守卒不易攻師道季安元不可保今看情狀似相計會各收一縣便不進軍如此事由陛下具見據其去就豈有成功未審聖心何如更有所望以臣愚見速須罷兵若又遲疑其害有四可為陛下痛惜者二可為陛下深憂者二何則若果有成功即不論用度多少既的知不可即不合虛費資糧悟而後行事亦非晚今遲校一日有一日之費更延旬月所費滋多終須罷兵何如早罷臣伏見陛下比來愛人省用發自深心至於聖躬每事節儉今以府庫錢帛百姓脂膏資助河北諸侯轉令富貴強大臣每念此不勝憤歎此其為陛下痛惜者一也臣伏恐河北諸將見吳少陽已受制命必引事例輕重同詞請雪承宗若章表繼來即議無不許請而後捨模樣可知轉令承宗膠固同類如此則與奪皆由鄰道恩信不出朝廷實恐威權盡歸河北臣每念此實所疚心此其為陛下痛惜者二也今天時已熱兵氣相蒸至於飢渴疲勞疫疾暴露衣甲暑濕弓箭瘡痍上有赤日前有白刃驅以就戰人何以堪縱不惜身亦難忍苦况神策官健又最烏雜以城市之人例皆不慣如此忽思生路或有奔逃一人若逃百人相扇一軍若散諸軍必搖事忽至此悔將何及此其為陛下深憂者一也臣伏聞回鶻吐蕃皆有細作中國之事小大盡知今聚天下之兵唯討承宗一賊自冬及夏都未立功則兵力之強弱資費之多少豈宜使西戎北虜一一知之忽見利生心乘虛入寇以今日之勢力可能救其首尾哉兵連禍生何事不有萬一及此實關安危臣每思之憂入骨髓此其為陛下深憂者二也伏惟詳臣此狀察臣此心審賜裁量速有處分如此則是陛下社稷宗廟之福不獨天下幸甚謹具奏聞右臣所請罷兵前後己頻陳奏今日事勢又更不同比來日月漸深憂惶轉甚若不極慮若不切言是臣懼罪惜身上負陛下伏希聖鑒憐察血誠知臣心如此更詳此狀臣伏以行營近日事體陛下一一具知師道令收棣州至今竟未奉詔至於表章詞意近者亦甚乖宜季安等心元不可測與賊計會各收一空縣而已相顧拱手便休聞昨者澤潞潰散健兒其間有入魏博却投邢州者季安追捉並按軍令昨所與詔都不稟承據此情狀略無形迹但恐今日以後此輩無不辦為又比來所望有功只在南北兩道今師道希朝等屯軍向欲半年過新市一鎮未得茂昭又稱兵少特地方請加兵則南道勢力今亦可見北道承璀竟未立功元陽新到邢州又奏兵數至少請諸軍兵馬議不可抽假使承璀等竭力盡忠終恐不副聖意據此事勢萬無成功陛下猶未罷兵不知更有何所待臣伏恐劉濟近日情似盡忠今忽罷兵慮傷其意以臣所見理固不然劉濟大姦過於㣥輩外雖似順中不可知有功無功進退獲利初聞罷討或可有詞見雪恆州必私懷喜何則於承宗本末之勢同也假令劉濟實忠實藎陛下難阻其心猶須計量重輕捨小圖大豈緣劉濟一人惆悵而不顧天下遠圖况今事情又不至此伏望聖意斷之不疑臣昨日以軍久無功時又漸熱人不堪命慮有奔逃前狀之中已具陳奏今果聞神策所管徐泗鄭滑兩道兵馬各有言語似少不安臣自聞之不勝憂切一軍若不寧貼必扇諸軍之心自此動搖何慮不有事忽至於此者則陛下求不罷討得乎一種罷兵何如早罷必待事不得已然後罷之只使陛下威權轉銷天下模樣更惡如此事勢皆在目前只合逆防不合追悔今盧從史已歸罪左降王承宗又乞雪表來元陽方再整本軍劉濟且引兵欲進因此事勢正可罷兵赦既有名罷亦有勢若又此時不罷臣實不測聖心臣伏料陛下去年初鋭意用兵之時必謂討承宗如討劉闢李錡兵合之後坐見誅擒豈料遷延經年如此然則始謀必剋猶不可知後事轉難更何所望至於竭府庫以富河北諸將虛中國以使戎狄生心可為深憂可為痛惜已具前奏不敢再陳况今日已前所惜者威權財用今日已後所憂者治亂安危國家有天下二百年陛下承宗社十一葉豈得以小忿而忘國家大計豈得以小恥而忘宗社遠圖伏願聖心以此為慮臣前後已獻三狀不啻千言詞既繁多語亦懇切陛下若以臣所見非是所言非忠况以塵黷不休臣即合便得罪若以臣所見為是所言為忠則陛下何忍知是不從知忠不納不然則臣合得罪不然則陛下罷兵伏望讀臣此狀一二十遍斷其可否速賜處分臣不勝負憂待罪懇迫兢惶之至謹奏
