front:
  text: 全唐文欽定全唐文卷七十三文宗五
  hash: sha256:242278365bfebec339536adc890c55b8ef7edc9ecc5991114fe534768c597b49
body:
  text: 朕嗣守丕構對越上元虔恭寅畏於今一紀何嘗不宵衣念道昃食思愆師周文之小心慕易乾之夕惕懼德不類貽列聖羞欲致和平時無災咎然誠未感物謫見於天仰愧三靈俯慙衆彙思獲攸濟浩無津涯昔宋景發言星因退舍魯僖納諫飢不害人取鑒往賢深惟自勵載軫在豫之責宜布恤辜之恩式表殷憂冀答昭戒應在京城百司及天下州府見禁囚徒各委長吏親自鞫問罪合死者降從流流巳下並釋放惟故殺人及官典犯贓并主掌錢穀之吏計較盜竊者不在免限揚州楚州浙西管內諸郡如聞去年稍旱人罹其災豈可重困黎元更加誅斂爰布蠲除之令用申拯物之情宜委本道觀察使於兩稅戶內不支濟者量議矜減今年夏稅錢物每貫作分數蠲放分析速奏仍於供上及留州使額內相均落下務令蘇息膏澤不愆播種伊始土木興役恐妨農功禁中及百司所有修造並宜權停韶陽御辰生氣方盛思全物類以順天時內外五坊凡有籠養鷹鷂及雞鴨狐兔等悉宜放之起今月一日至五月三十日禁京師畿內採捕禽獸羅網水蟲以遂生成永為定制委臺府及本軍本司切加禁止唐州晝劫縣官桂管聚集妖人或始於計窮或迷於誘導嘯聚未散伏藏山林者各委本處長吏遣人宣諭恩旨便令放歸鄉貫田里俾安家業勿更根尋所犯如不從制命不在此限朕今素服避殿命太常徹樂大官減膳一日常費分為一旬近者內外臣僚繼獻表章徵引故實請册尊號夫道大為皇德大為帝朕膺此稱祗愧巳多矧踵星變之災敢議名揚之美非懲既往且警將來宰臣百僚及諸道節度觀察等使更不用奏請如表巳在道路及到者並宜卻還常參官及諸州府長吏如有規諫者各上封事極言得失陳救災之本明致理之方咸竭乃心以俾厥辟於戲朕明誠未感化理未孚譴告在天丁寧斯甚所宜盡意與我同憂勉進嘉言共凝庶績弼違納誨副茲虛懷宣示內外各令知悉自春以來未降甘澤從來但以過時無雨始議祈禱及至降灑巳似後時今雖未旱亦要沾洽各宜差官精誠祈禱每聞京師舊説以為終南山興雲即必有雨若當晴霽雖密雲他至竟不霑霈況茲山北面闕廷日當恩顧修其望祀寵數宜及今聞都無祠宇巖谷闕湫卻在命祀終南山未備禮秩湫為山屬捨大崇細深所謂闕於興雲致雨之祀也宜令中書門下且差官設奠宣告恩禮便令擇立廟處所回日以聞命有司即時建立農人遍野甘澤稍愆眷言時苗未保收穫齋心懇禱猶望有成各宜差長吏所在靈廟禱祈秋旱未雨慮有幽冤縲禁多時須議疏決京師刑獄宜令右僕射兼門下侍郎平章事鄭覃親往疏理仍分命宰臣祈雨於太廟太社白帝壇慶成節朕之生辰天下錫宴庶同歡泰不欲屠宰用表好生非是信尚空門將希無妄之福恐中外臣庶不喻朕懷廣置齋筵大集僧衆非獨凋耗物力兼恐致惑生靈自今宴會蔬食任陳脯醢永為常例咸使聞知詔書載堯典首陳睦族詩歌周德實美維城朕嗣統百王憲章二代義雖本於敘族道無愧於尊賢式遵舊章爰舉成命嘉王運循王遹恭王通等孝敬恭恪敏裕齋莊播蘭茝之清芬炳圭玉之符采易浚沛獻詩掩楚元古人素風造次於是師氏典訓周旋以之固可以超金紫之貴階升台鉉之崇秩策勳詔爵以寵分茅並可金紫光祿大夫檢校司空賜上柱國仍依百官例給料錢敕檢校吏部尚書安王溶檢校兵部尚書潁王瀍宜並從百官例賜料錢生為名臣歿有理命終始之分可謂兩全然以鹵簿哀榮之末節難違往意誄諡國家之大典須守彞章鹵簿宜停易名須準舊例諸道應薦萬言童子等朝廷設科取士門目至多有官者合詣吏曹未仕者即歸禮部此外更或延引則為冗長起今後不得更有聞薦俾繇正路冀絶幸門制服輕重必資典禮如聞往者駙馬為公主行服三年緣情之義殊非故實違經之制今乃聞知宜令期周永為定制卿道冠時髦業高儒行著作礪濟川之效宏致君匡國之規留芳巖廊逸老林壑纍降褒詔亟加崇秩而志不可奪情見乎辭鴻飛入冥吟想增歎今賜絹三百匹以備山谷所乏便遣蕭俶過彼宣付想宜知悉門下朕嗣守丕訓恭臨大寶兢兢業業十有三年何嘗不惠下以愛人克己以利物外無畋遊之樂內絶土木之功浣衣菲食宵興夕惕厚於身者無不去便於人者無不行損羣方之砥貢驅時風於朴素將以宏祖宗法度致夷夏雍熙心雖勞於九垓道未進於一取顧惟不德慙歎方深今雖遐邇甫寧忠良叶志五兵戢其鋩刃百姓絶其征行勤求理道日冀平泰而去秋旱蝗所及稼穡卒癢哀此蒸人懼罹艱食是用順時布令助煦育之深仁施惠覃恩法雨露之殊澤其淄青亠兊海鄆曹濮去秋蟲蝗害物偏甚其三道有去年上供錢及斛斗在百姓腹內者並宜放免今年夏稅上供錢及斛斗亦宜全放仍以當處常平義倉斛斗速加賑救京兆府諸州府應有蝗蟲米穀貴處亦宜以常平義倉及側近官中所貯斛斗量加賑賜災旱之餘撫養尤切眷茲長吏必在得人應遭蝗蟲處刺史委中書門下精加訪察如有煩苛暴虐貪濁懦弱者即須與替邦畿之內徭役殷繁言念疲人固資矜恤京兆府今年夏青苗錢宜量放一半應遭蝗蟲及旱損州縣鄉村百姓公私債負一切停徵至麥熟即任依前徵理及準私約計會其遭蝗蟲及旱損處準敕添貯義倉每畝九升斛斗去秋合徵在百姓腹內者並宜放免其天下州府貸種糧子在百姓腹內者更不要徵閉糴禁錢為時之蠹方將革弊尤藉通商其見錢及斛斗所在方鎮州府輒不得擅有壅遏任其交易必使流行仍委出使郎官御史及所在度支鹽鐵巡院切加勾當兼委轉運使設法般運江淮糙米於河陰積貯以備節級賑濟纍時以來水旱時有方隅郡府杼柚屢空厚下所以安人裒多由其稱物至於徵斂亦在寬恤應方鎮州府借便度支鹽鐵戶部錢物斛斗經五年以上者並宜放免天下百姓人吏欠太和九年以前官錢斛斗家業蕩盡無可徵納囚繫囹圄動經數年者亦宜放免刑獄之重人命所懸將絶冤濫必資慎恤京城百司及畿甸見禁囚徒委中書門下差官疏理無使冤濫輦轂之下法在肅清姦盜竊發理難容舍親仁坊今年五日賊依前委京兆府左右街使鳳翔邠涇金商同華等州切加捕逐如獲頭首準法科斷其餘支黨一切不問於戲惟此凶災是彰菲德情敢忘於罪己惠所貴於及人施令布和期於蘇息凡厥臣庶宜體朕懷主者施行大河而南幅員千里楚澤之北連亘數州近以水潦暴至隄防潰溢既壞廬舍復損田苗言念黎元罹此災沴或生業蕩盡或農收索然困餒凋殘豈能自濟是用勤約疚於中懷今故臨遣使臣詳問病害紓其墊溺之苦申以勞來之方勉諭師徒安存孤老將我惠澤冀蘇疲人宜令給事中盧宏宣往陳許鄭滑鄆曹濮等道宣慰刑部郎中崔往山南東道鄂嶽蘄黃道宣慰於戲朕自君臨勵求理道常恐一物失所每以萬姓為心誠無感通時有災害夙夜愧悼不知所然宣示藩方喻茲詔命使寬其徭役禁其侵漁多方輯綏俾速完復布告氓庶知朕意焉上天蓋高感應必繇乎人事寰宇雖廣理亂盡繫於君心從古以來必然之義朕嗣膺寶位十有三年常克己以虔恭每推誠於庶衆將以導迎休應漸致雍熙期克荷於宗祧思保寧於華夏而德有所未至信有所未孚災氣上騰天文謫見再周期月重擾星躔當求衣之時覩垂象之變兢懼惕厲若蹈泉谷是用舉成湯之六事念宋景之一言詳求譴咎之端採聽消禳之術必有精理蘊於衆情冀屈法以安人爰恤刑而原下應京城百司及諸道州府十一月八日巳前見禁囚徒未經敕斷者犯死罪並降從流流巳下遞減一等其十惡及謀殺人劫盜賊并官典犯贓不在此限諸道今年遭水及蝗蟲州縣人戶等宜委觀察使與州縣長吏計會精加察訪勿憚奏論諸道所有進獻時新委中書門下更點勘撙減以稱朕意京畿之內百役繁興欲其阜安切在優恤其今年二月二十五日敕賑貸諸縣百姓糧種粟八萬四千九百七十八石如聞數內半是義倉斛斗此乃救災之備豐年自合收積其餘有戶部管係者並且停徵以俟來歲畿內諸縣應有開成元年以前諸道逋欠並宜放免仍委度支與府司同勘聞奏如是官吏破用不在此限皇太子葬事卜日稍近但令粗及禮制不必過務虛儀以涉繁冗則須裁減冀無害物夫豈傷恩易定兩州地里深阻近者守臣喪沒軍中初有異圖纍遣詔書申明事理革心遷善章表繼來張元益出定州後應是初扶樹元益有違朝旨者自將校至於官健委節度使安行慰諭並經放釋如或輒相告訐卻以其罪罪之冀使藩方永無疑懼文武百僚及諸色人有能通達刑政之源參考天人之際隨在各上章疏指言得失乃至徹樂減膳抑亦舊章便當內自指揮不復更形綸翰宣示中外宜體至懷應諸道奏請軍將兼巡內州別駕長史判司等近日諸色入流人多官途隘窄諸道軍將自有衣糧優厚之處仍兼月俸若更占州縣員闕則文吏無所容身須有申明人知分限起今巳後諸道節度團練防禦等使不得更奏大將充巡內上佐等官今日巳前見任者且依任前守官應京有司有專知別當及諸色職掌等近日諸司奏請州縣官及六品巳下官充本司職掌援引舊例色目漸多致使勾留溢於舊額起今巳後各於本司見任官僚之中揀擇差署不得別更奏官如是敕額職名當司無官員相當者即任準舊例奏請司徒兼中書令裴度盛有勳烈纍任台衡以疾恙未任謝上須加優異用示恩榮其本官俸料宜起今日便付給所司京城百司及府縣禁囚動經歲年推鞫未畢蓋繇官吏因循致此留獄鬱蒸在冤滯難堪宜付御史臺委中丞高元裕及強明御史三兩人各就本司應見禁囚分閲案牘據理疏決聞奏喪於舊塋詔越王事迹國史著明枉陷非辜尋以洗雪其子珍他事配流數代漂零不還京國元真弱女孝節卓然啓護四喪帛丿糸歷萬里況是近族必可加恩行路猶或嗟稱朝廷固須恤助委宗正寺京兆府與訪越王墳墓報知如不是陪陵任祔塋次卜葬其葬事仍令京兆府接措必使備禮葬畢元真如願往京城便配咸宜觀安置本置義倉只防水旱先給後奏敕有明文劉約所奏巳為遲晚宜速賑恤王鍔纍朝宣力王稷一旦捐軀須録遺孤微申憫念王叔泰委吏部與九品官令主祭祀蕭洪起自細微恣為狡妄假我外家之族冒居元舅之尊纍忝重官再叨雄鎮作偽無狀從古未聞不處極刑猶為寬典宜長流歡州百姓洪男恪女壻萬縝徐國夫人女壻呂璋並決杖流嶺南崖象等州恭惟皇太后族望遠承齊梁之後僑寓流滯久在閩中慶靈鍾集早歸椒掖終鮮兄弟常所咨嗟朕自臨御以來便遣尋訪冀得諸舅以慰慈顏而姦濫之徒探我情抱因緣州里之近附會祖先之名覬幸我國恩假託我外族蕭洪之惡迹未遠蕭本之覆轍相尋宏之本末尤更乖戾三司推鞫曾無似是之蹤宰臣參驗見其難容之狀文款繼入留中久之朕當視膳之時頻有咨稟恭聞處分惟在真實丐沐墮桑既無可驗鑿空作偽豈得更容據其罪狀合當極法尚為含忍投之荒裔凡百庶士宜體朕懷蕭本今宜除名長流愛州蕭宏配流儋州宏泰以慶成令節擅放纍囚雖云竭誠且為干禁恐開後例須示薄懲宜罰一季俸料朕以郊廟之禮嚴奉祖宗備物盡誠庶幾昭格恭惟忌日之感所謂終身之憂而近代巳來歸依釋老徵二教以設食會百辟以行香將以仰助聖靈冥資福祚有異皇王之術頗乖教義之宗昨得崔蠡奏論遂遣討尋本末禮文令式曾不該明習俗因循雅當釐革其兩京天下州府以國忌日於寺觀設齋行香起今巳後並宜停罷軍司所推鞫妖賊賀蘭進興等五十九人昨令宰司詳覆推狀款驗節目並無參差緣是妖逆之徒不同尋常刑獄便令裁斷冀免停留今高元裕及魏謨等論奏請付法司覆問重慎刑辟與衆棄之斯亦舊章雅當依允其妖賊徒黨除白身及官健四人依前軍中及狀內推勘餘並宜付御史臺重覆限三日內聞奏朕顧以眇身獲承丕構嚴恭寅畏十有五年列聖鴻猷朕豈能荷涉冰匪懼馭朽非難雖宇內小康而大道猶鬱方自砥礪期臻理平天不祐豫夙嬰疾疹政慮多闕心靡遑安近者凝沍所侵久而寖劇臣僚愛我內外一心禱祀畢為藥石備至亟換旬朔有加無瘳懼不能躬總萬幾日釐庶政稽於古訓謀及大臣用建親賢以二神器親弟潁王瀍朕昔在藩邸常同師訓動成儀矩性秉寬仁俾奉昌圖必諧人欲可立為皇太弟應軍國政事便令權勾當百辟卿士中外庶臣宜竭乃心輔成豫志陳王成美先立為皇太子以其年尚沖幼未漸師資比每念重難不行册命回踐朱邸允叶至公可依前復封為陳王嗚呼萬務不可以久曠萬方不可以乏統惟義所在朕不敢私宣布中外咸令知悉孔氏以顏冉之行首於四科漢代以荀陳之門方之八凱乃眷時哲得茲令名用舉飾終之恩以抒殲良之歎故山南西道節度使崔琯誠明履正粹密鄰幾有子政之精忠得公綽之不欲禮樂二事以為身文仁義五常自成家範往以茂器列於大僚屬賢相受誣廟堂議法由長孺之道以佑正人微京兆之言豈聞非罪既是魏其之直益彰王鳳之邪莊色於朝羣公聳視讜詞不撓淑問攸歸歷踐名藩皆留遺愛居常慎獨清則畏知爰自青襟迄於白首勵翼之志始終不渝未陟台階實辜公論追榮左相式示優崇可贈尚書左僕射宗廟之事朕合親奉其禮但以千乘萬騎動費國用每有司行事之日被衣冠坐以俟旦比聞主者不虔祭器勞敝非事神蠲潔之義卿宜嚴敕有司道吾此意朕以寡昧祗承丕業慕貞觀之至化希開元之中興十有五年勤勞宵旰雖俗未臻於仁壽而物或近於乂寧斯乃羣后叶心豈朕獨致自謂勵精未巳理平可期誠不感通宿疾重遘藥石無補至於彌留惟懷懿圖宜有顧託是用審訓其聽豫言皇太弟瀍睿哲明裕孝友溫文忠正寬仁博達周敏必能篤祖宗之休烈闡皇王之令猷宜於柩前即皇帝位仍以門下侍郎平章事楊嗣復攝冢宰軍國務殷豈可久曠以日易月宜遵舊章皇帝三日而聽政二十七日釋服天下節度觀察防禦等使及監軍諸州刺史職守非輕並不得離任赴哀天下人吏百姓告哀後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉釋服之後無禁舉樂文武官等朝晡臨事皆十五舉音宮中當臨者非時毋得擅哭漢文薄葬朕實慕之奉營山陵務從儉約無以金銀錦綵緣飾喪具醫術之徒夙夜勞苦深可矜念不須加罪仙韶樂官放歸本司五坊鷹犬並宜解放嗚呼生死常期今古無異豫素知遠何足甚哀咨爾將相卿士內外腹心爪牙之臣其敬保我太弟輯寧邦家成朕素懷克砥于道布告遐邇咸使聞知
