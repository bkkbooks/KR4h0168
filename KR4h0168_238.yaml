body:
  text: 臣某言臣聞孝於親者然後可以忠於君理於家者然後可以移於國臣實妄庸叨奉明聖職在樞要切寄股肱恩非始圖榮絶流輩臣之殞身無以上答然臣老母今年八十有一起居漸廢齒髮日衰飲食朝晡非臣不膳寢興侍奉非臣不歡臣欲僶俯國朝則顧復無報臣欲歸養私第則聖澤不資實類羝羊羸角方同狼跋其尾去歲陳乞初沐聖恩旋承後命不垂允納良由臣孝道衰廢至誠無感扣心泣血夙夜無寧臣自受北征帛丿糸歷旬月慈母銜泣朝夕倚閭寢膳不時重增羸耗臣子之道何以為心陛下聖澤遠覃中外無事彞倫攸敘俊乂盈朝臣之短才無所裨補伏願少垂矜察俯遂私恩許臣告歸之請終臣犬馬之養然後糜軀粉骨上答天造奮身虜庭效命戎幕臣之萬死不敢為恨無任愚懇之至臣愚雖不達時變竊嘗讀書見自古帝王之迹衆矣臣聞土階三尺茅茨不翦采椽不斫者唐堯之德也卑宮室菲飲食盡力於溝洫者大禹之行也惜中人十家之産而罷露臺之制者漢文之明也並能垂名無窮為帝皇之烈豈不以克念徇物博施濟衆以臻於仁恕哉今陛下崇臺邃宇離宮別館亦已多矣更窮人之力以事土木臣恐議者以陛下為不憂人務奉已也且頃歲己來雖年穀頗登而百姓未有儲蓄陛下西幸東巡人未休息土木之役歲月不空陛下不因此時施德布化復廣造宮苑臣恐人未易堪今左右近臣多以順意為忠朝廷具僚皆以犯忤為患至令陛下不知百姓失業百姓亦不知左右傷陛下之仁也臣聞忠臣不避死亡之患以納君於仁明主不惡切直之言以垂名千載陛下誠能發明恕之制以勞人為辭則天下必以陛下為惜人力而苦已也小臣固陋不識忌諱敢冒死上聞乞下臣此章與執事者議其可否則天下幸甚毛子足下勤身訪道不毒氛瘴裹糧鬼門放蕩雲海有足多矣一昨不遺猥辱書札期我遐意詢于道真使人慙愧也僕知之矣士之生代則有冥志深蔽滅木穹窒鍊九還以咽氣味三秀以詠言因將養蒙全理不以能鳴夭性則其上也義感當途説動時主懷全德以自達裂山河以取貴又其次也至於誠信不申忠孝胥缺獨禦魑魅永投豺虎無面目以可數推心膺以問天斯最下也僕在壯年常慕其上先貞後黷卒罹憂患負家為孽置身於此何顏復講道德哉雖然少好立言亟聞長者之説老而彌篤猶憐薄暮之晷加我數年庶無大過覽莊生鯤鵬之喻則乾坤龍馬之旨可好矣培風運海則六九之源無差矣隳之正氣則洗心藏密有由矣開卷獨得恬然會真不知寰宇之寥廓不知生之與謝斯亦曖昧所守何必為是倘吾人起豫指掌而説今之隱几不亦樂乎道在稊稗闕一字無相阻曷為區區過勞按劍也頃風眩成疾下淚復厲力此還答無所銓次淹遲闕一字期庶不我責盧藏用頓首昔孔宣父以天縱之才自衛返魯乃刪詩書述易道而修春秋數千百年文章粲然可觀也孔子歿二百歲而騷人作於是婉麗浮侈之法行焉漢興二百年賈誼馬遷為之傑憲章禮樂有老成之風長卿子雲之儔瑰詭萬變亦竒特之士也惜其王公大人之言溺於流辭而不顧其後班張崔蔡曹劉潘陸隨波而作雖大雅不足其遺風餘烈尚有典型宋齊之末蓋憔悴矣逶迤陵穨流靡忘返至於徐庾天之將喪斯文也後進之士若上官儀者繼踵而生於是風雅之道掃地盡矣易曰物不可以終否故受之以泰道喪五百歲而得陳君君諱子昂字伯玉蜀人也崛起江漢虎視函夏卓立千古橫制穨波天下翕然質文一變非夫岷峨之精巫廬之靈則何以生此故其諫諍之辭則為政之先也昭夷之碣則議論之當也國殤之文則大雅之怨也徐君之議則刑禮之中也至於感激頓挫微顯闡幽庶幾見變化之朕以接乎天人之際者則感遇之篇存焉觀其逸足駸駸方將摶扶搖而陵太清躐遺風而薄嵩岱吾見其進未見其止惜乎湮厄當世道不偶時委骨巴山年志俱夭故其文未極也嗚呼聰明精粹而淪剝貪叨桀驁以顯榮天乎天乎吾殆未知夫天焉昔嘗與余有忘形之契四海之內一人而巳良友歿矣天其喪豫今採其遺文可存者編而次之凡十卷恨不逢作者不得列於詩人之什悲夫故粗論文之變而為之序至於王霸之才卓犖之行則存之別傳以繼於終篇云耳夫理存於業理契則業忘心宅於形心寂則形勝豈不以體會機化通同我人馳無役有而吻合出生入死而無際古之懸解者懷挾海嶽提挈天地掌擲千界身沒一絲前際後際其非動無去無來而常樂豈支離其德孟浪其言哉蓋同體大非而物不能自物也則有泳其洪波志其小行指元源以驤首扣幽鍵而少留亦能捭闔形神度越茲數則衡嶽思海之列可得而稱矣衡嶽寺者梁天監三年立本名善思暨陳改為大明有隋號為衡嶽則衡山之心也二十八宿上飛翼軫之晶三十六都下蟠吳楚之紀赮駮舒蔚燦爛炳煥以萬殊松標玉聳清蒼璀錯以億尺水碧嚴霜而育粹雲芝佇秀以孕真幽岫滅氛絶頂無迹遊其質者則蘧廬清明挹其靜者則營魄淵淡信神明之所棲遲也故異人接踵於此焉遊靈迹葳蕤道風帛丿糸邈自鷲巖西閟象教東流勝躅雖多宗元或替至於仗智慧劍壞煩惱軍理以意傳階惟神遇者未有斯美之盛也然而年代悠邈故老或遺真詮緬微後生何述有沙門惠日俗姓慶氏濮陽人也息心達道利見觀方自北徂南爰憩茲嶽入空寂舍覺今昔常然到清涼池知我人非遠備聞衆異祗覿前修而山間朴略篇無次遂覃思翰墨博采遺風事無虛美務存托實自思大師凡一十八人著之於傳藏用早遊斯道頗涉藝文承日真之恩奬聞衆公之故事心存目想若見期人倘茲理或存亦旦暮之斯也遂懷鉛秉翰序其傳焉藏用常以俗多拘忌有乖至理乃著析滯論以暢其事詞曰客曰天道元微鬼神幽化聖人所以法象衆庶由其運行是故大撓造甲子容成著律歷黃公裁變元女啓謨八門御時六神直事從之者則兵強國富違之者則輔弱朝危有同影響若合符契先生亦嘗聞之乎主人曰何為其然也子所謂曲學所習懦儒一作昧所守徒識偏方之詭説未究亨衢之通論蓋易曰先天不違傳稱人神之主範圍不過三才所以虛中進退非邪百王所以無外故曰國之將興聽於人將亡聽於神又曰禍福無門唯人所召人無釁焉妖不自作由是觀之得失興亡並關人事吉凶悔吝無涉天時且皇天無親惟德是輔為善者天降之福不善者天降之殃高宗修德桑榖以變宋君引過法星退舍此天道所以從人者也古之為政者刑獄不濫則人壽賦斂蠲減則人富法令有恆則國靜賞罰得中則兵強所以禮者士之所歸賞者士之所死禮賞不倦則士爭先赴苟違此途雖卜時行刑擇日出令必無成功矣自季代遷訛俗多徼幸競稱怪力爭誦詭言屈政教而就孤虛棄信賞而從推步附會前史變易舊經依託空文以為徵驗覆軍敗將者則隱祕無聞偶同幸中者則共相崇飾豈惟聽之增惑亦乃學人自是嗚呼習俗訛謬一至此焉夫甲子興師非成功之日往亡用事異制勝之辰苟修其德何往不濟夫環城自守接陳重圍無關地形不乖天道若兵強將智粟積城堅雖復屢轉魁剛頻移太歲坐推白武行計貪狼自符雞鬬之祥多貽蟻附之困故曰任賢使能則不時日而事利法審令正則不卜筮而事吉養勞賞功則不禱祀而得福此所謂天時不如地利地利不如人和故太公犯雨逆天時也韓信背水乖地利也並存人事俱成大業削樹而斬龎涓舉火而屠張郃未必暗同歲德冥會日遊俱運三門並占四殺杜郵齒劍抑唯計沮垓下悲歌實階刓印若以並資厭勝不事良圖則長平盡坑固須恆濟襄城無噍亦可常保是知拘而多忌終喪大功百姓與能必遺小數金雞樹上方為楚國之殃萬畢枕中適搆淮南之禍刻符指盜反更亡身被髮邀神翻招夷族吁嗟威斗赭鞭不禳赤伏之運築城斷岡何救素靈之哭火災不驗裨竈無力以窺天超乘階凶王孫取監于觀德九徵九變是曰長途人謀鬼謀良歸有道此並經史陳迹聖賢通規仁遠乎哉詎宜滯執客乃蹙然避席曰鄙人困蒙不階至道請事斯語歸于正途而今而後焚蓍龜毀律歷廢六合斥五行浩然清慮則將奚若答曰此所謂過猶不及也夫甲子所以紀日月律歷所以通歲時金木所以備法象龜蓍所以前人用聖人以是神明德行輔助謀猷存之則叶贊成功執之則凝滯于物消息之理其在茲乎客於是循墻匍匐帖然無氣口呿心醉不知所以答矣維年月日某官名恭弔漢忠臣將軍紀信公曰皇綱絶兮帝紐穨王風悲兮霸道衰天運促兮周以霸秦德棄兮漢業開何項王之屭尸貝作驅除於雲雷豈淵海之飛蕩資拔山之偉才於是左契歸楚㣥雄奉職皇矣漢祖獨負其直矧滎陽之圍城兮既孤而逼偉將軍之天誘兮矯奪其識彼見危而授命兮亦各有時考振古以為觀兮罔恢帝基感將軍之發憤兮壯大義之在茲仰前修以砥節兮顧車回而馬遲嗚呼身既焚兮業既昌楚歌絶兮漢道光君不旌兮史不揚功不録兮歿不殤奄孤墳以載葬抑千祀而為荒皇周敷訓兮澤及枯胔伊豫寡德兮忝宰茲地奉宣嘉猷兮懼尸厥位闕二字將軍兮允忠且義託神交於萬古兮實獲心志乃斫石於他山兮式幽墳以昭賁詞曰攝提貞歲兮奉揚仁風跋涉草莽兮詞弔紀公善彼勇兮殺身為忠九原不作兮豫將焉同金石刻名兮千萬歲魂魄光烈兮為鬼雄有漢忠烈姓紀名信官族代載史失其書昔秦始皇棄六代之業窮天下之力以從其心施及二代荐作昏德人怨神怒百姓與能此皇天所以興漢祖也夫龍躍虎變不有非常之災則不能蔚其文而神其行故英雄豪傑雷動震擊並起而亡秦當是時海水飛而無紀王綱穨而不紐強者制命弱國連衡項籍提八千之兵鼓行而稱伯隳名城坑徑卒弒義帝屠咸陽七十餘戰而天下大定矣於是背關懷楚專制主約雖負河山藉舊業南面而稱孤者猶膝行請命舉國受署莫能枝梧焉而高祖奮于漢中定三秦之地扶義仗信東向而爭天下天下之命懸于二雄山東紛紛螽合蟻聚未有所係籍當以百萬之衆困高祖於滎陽紀公推天歷之在劉顧臣節以自僨躬載黃屋出東門而詫之沮百萬之氣頓強楚之威奪諸侯之魄回霸王之機身焚孤城之下功濟廟堂之上高祖因之以成帝業雖宏演納肝而無悔干犫請矢而不疑公孫抱子而為詐孟陽寢牀以自欺其忠則然於大業不可以希也先軫免胄以立誠鋤麛觸槐以取喪富辰懟諫而赴翟仲由結纓而為壯其節則全於大機則無以尚也荀息守言而死事豫讓感遇以自殘石乞就烹以殉白漸離目以報丹其義立矣於大濟則闕焉故功貴成業貴廣苟有大賴則輕太山於鴻毛壯哉紀公誠得其死矣夫城郢而增君名寢齋以祈於死其於忠也不亦泰如於戲仲尼所謂殺身成仁臨難無苟免者則紀公其人也而歷載數百莫能表之縣令會稽孔君名祖舜字奉先資大聖之緒秉忠孝之規清身以激俗矯枉以從政到官視事三載有成於是鄉之碩老攝而請曰府君以盛德茂才宏宣大化旌孝尚節敦學務農人無懸耜野無冥草可謂政之美者也而紀公之墓蕪而不顯豈所以鼓舞前志發揮臣子之道哉府君乃咨謨寮吏稽古訓典以為忘生從道者仁也沈斷固分者義也威儀不忒者禮也好謀而成者智也有死無二者信也決機興運者明也大節不撓者勇也夫藏一行於人則銘之金鼎輝鑠風雅況紀公兼而有焉斯實忠臣義士之殊尤而文獻之所先也故表商容式干木君子韙之乃仰惟春秋旌善之義庶幾為臣之節奮于百代之上凜然可以比肩斯人俾能揚耿光厚忠義崇尚教化以昭烈我明天子之風豈不褒德而顯功哉遂作頌曰雄雄紀公自天作忠膺皇祖兮卓犖磊朗瑰佹倜儻奮威武兮虎鬬龍戰扶危制變挫強楚兮定霸興王身焚業昌得其所兮雲雷經綸乃聖乃神萬物覩兮千載一振闡幽作訓為代矩兮三五巳矣愚聖同死苟無足而稱焉吾何以貴夫古兮長安元年鄉人白孔府君請為紀公建立碑表府君具狀申請而州寮以為異代風烈令式無文且懼鄉人頭會抑而不建孔府君感激忠義拘牽下僚乃歎曰吾以不才忝茲邦政至於激貪勵俗旌孝尚忠臣子之行教化之端也鄉人之請允有禮矣吾可以嚜歟至二年七月乃自減私俸將斫石采山以旌忠烈會有耕闕一字於紀公墓側居人田中得一古石磨礲俱闕一字但無文字其螭首及兩側龍距文髣佛有子丹碑法生動之勢非近工所為詢之故老莫究年代府君遂酬地主之直樹之於墓刊勒斯頌豈神明昭應有所感發哉何其幽顯之符會也鄉人奔走而觀者甚衆咸喜紀公有述幽石自彰闕一字以崇宰君之徽烈表至諴之必感夫減俸以旌賢至清也希古以砥節至忠也不然後闕一字何以仰德而立名哉乃於碑陰刊紀斯異蓋天地無私窮理者惟性陰陽不測寓形者曰神飛龍御乾固洗心於密大鵬運海亦止氣於符致言乎寥廓之場抑有幽兆會精於寂滅之域罔窺成憲豈禮樂仁義漸漬之速相資將受相行識明昧之功互用粵我元聖于照竺乾知生生不生以一乘為貞實體滅滅不滅以三身為去來示八萬法門應乎六道運百千方便極乎兆域小枝小葉灑甘露而俱霑非想無想覆慈雲而畢潤四天為界陱輪斯擲十地登庸大車以載然後示凡遺化即色歸空亡筌于善逝之名脫屣于無餘之分雖薪盡火滅菩提無可作之期而影謝燈傳智惠有不止之壽舍利形像沙界滿于文提修多文字泉宮演于科目則言非理適而理必因言見異真詮而真固憑見矣容州都督府景星寺者高宗天皇大帝所建也高宗繼文嗣武纘歷登樞淳化洽于無垠至德覃於有截緝熙庶績平章百姓沐雨思理窅然姑射之風順風聞真邈矣崆洞之野金繩玉檢躋日觀而告成功寶篆瑤緘禪雲亭而肅明祀靈茅瑞鰈海嶽之珍畢萃氣象謳歌天人之心允接增封東岱有景星垂象制諸州置寺仍景星為名蓋恆星幽感金人應夢之兆也是時天子接千歲之統揖九牧之符日月告休風雨時若人是用息化臻俾人故列嶽之建剎者罔不揆日庀徒儀星起構欂櫨嶷而爭聳瑤碧煥以相輝而此邦荒服權輿墉隍草創雖琁題可訪而金地猶蕪時都督樂處元以式遏為心未遑經始後長史陳善宏以薰修為念頗加剃翦於是香緣法侶聽鍾梵而知歸飛錫上方仰幡花而發行矣垂拱中有寺主僧伏僯者密行稱獨解空無二法雲持誦即降天花惠風宴坐允飛靈液厥有甘露泫于庭柯都督李行裒具狀以聞中旨宣諭賜天柱納一條由是歸依檀度者日有之矣天授中改為大雲寺移額于城西焉五緯韜光三靈改貺法因事起修塔廟而依然名隨代遷仰絲綸而已替星辰可望尚想衣冠棟宇無瞻鞠為禾黍通天中賊謝策陳隱等干紀叛換縱兵郊郭虔劉邑居焚爇城市尊儀法宇復成煨燼惟阿育王像并夾侍菩薩不墮烘燎夫元精沖隱非擬議所及道真密趣豈知識能究然而即體均化所契者莫殊就物同如彼適者誰拒山河信隔我念不疲金石自流外緣罔易法身寶相理則固然像教遺形曷以臻此抑靈姿密會神明之所扶持也御史李令質具狀以聞有敕褒異仍令農隙繕葺聖歷之際都督沈仁果將事開拓審曲面勢規模博敞移置于城矩臬所圖有儀式矣神龍初為龍興寺道以不住為名事以無常為體海桑頻變詢故老而猶存星榆既往訪賓實而無所故景星之號淪于再祀矣今都督光府君名楚客樂安郡人也昔光曜契理於元言光音造靈於真位自茲厥後英邁聯華公實濟之不墜其緒夫其瑰姿雅量貞操峻節朗若登昆邱而剖虹玉自為廟廊之寶錧祕匣而見龍泉即成軍國之器精識粹理婉詞奧學又似武庫居府圖象莫遺文軒在藻庭黼斯備始以孝廉擢第倅西城尉歷增城南海令韶州司馬廣州都督府長史兼經略副使制加朝散大夫充嶺南五府安撫經略副使以功倅遊騎將軍守右驍衛翊府右郎將兼檢校廣州都督府長史以親纍貶授藤州司馬守之晏如也尋授朝散大夫守雍州都督長史未幾擢授檢校雍州都督充開馬援古路使北轉安南副都護賀州刺史纍充邊隅任參文武張綱靜寇攘敓載清魏綘和戎威懷允輯安仁作賦初直虎賁之省馬援言邊復綰狼荒之郡朝廷以容山諸越鬼門多梗博選吳逋僉歸望實倅正議大夫檢校北府都督兼管內經略使公至則宣皇明頒時令修戰守之備以與權示威信之成以諭物夷梗翕然革心矣又以俗殊政異氓風不一因人設範違方或二難以慮始可使由之阜成日用之功克就月將之漸以為食者人之天食不足焉未可以訓時則度其川原分其高下田畯至喜是銍是穫歲以有成矣以為禮義者德之輿禮義興而人倫厚然後修其喪祭節其賓嘉夫夫婦婦兄兄弟弟庶及乎教矣以為學校者行之府學校立而邪枉措時則理其庠序敦其絃詠青青子襟在城闕矣夫如是郛廛之間坰野之外典章器服粲然可觀復有幽洞負阻荒閈憑深者瞪目駭心滅木間分封其林塢之固時為道路之虞公則奉國廟之威靈恭武臣之貔豹隮險冒毒深入不毛故振古未賓如思蕃古往者莫不風舉雷爍魚潰鳥散矣威加陬落聲被縣道聯虛均化列郡同風抑前載之所闕也然後親視閭閻詢問耆老披圖牒以望古緝典憲以考詳則知茲寺久蕪也是用稽騭墜記虔心帝藉捧喬嶽之遺芳餘威可戴守疑山之舊綍熙載思揚今天子嗣守丕構開元立極修廢祀秩無文同符三王超越五帝將以軼包犧之化洽葛天之風而煌煌祖業翳于遐甸豈有司恭守率由之節也是亦為政敢不勤職遂于城北廢祠復建茲寺即棟宇之遺趾因庶人之子來經之營之是版是築法堂迥構畫剎孤標鴈塔分身初疑踴出蜂臺合勢更自飛來清梵晨吟龍象森而成列華鐘夜吼魔鬼瞑而不作此地南馳日戶北走石門海陸當天下之衝賝賮總寰中之貴珠還浦媚商旅之所往來桂長巖芬隱淪之所棲息故乘緣趣業覩皆因者斯亦衆矣寺主僧惠雲上座法練大雲寺主僧小車上座神衛都維冉空空隆興寺主僧灌頂上座道昌等越金之粹冰玉之英探丹果於九部見青蓮于一念思惟佛影感聖后之仁慈棲息寶橋愧賢臣之護屬竊懼德充位博功高名遂後之來者莫繼斯文若夫金石之堅讃述之美庶乎故事不朽則精舍可以長存矣相與斫石建表祈之篆刻而作者蓋闕故歷稔未刊長史知經略副使上柱國河東薛惟鑒宏量厚德器博才贍一言所趣山河罔千里之艱片善相依風雨投百年之分録事參軍鄧武龍工曹賈長源倉曹朱皓戶曹房燕客兵曹蘇奭法曹庾德從參軍周仁昉黎重炎宗庭玼普寧令曹風賀川令王眺渭龍令趙大賢欣道令陳令高北流令李奬陸川令黎伯倍陵城令嚴崇甫隨安令泰行儒羅豆令胡行楚宕昌令成等學古入官勵精祗務聲高列寀化洽為邦藤州刺史李偉之義州刺史陳大煥禺州刺史陳吳客白州刺史覃崇位黨州刺史莫懷毅平琴州刺史周圭巖州刺史陳越客牢州刺史耿仁忠竇州刺史陳仁玘蔚林州刺史何乾遇等或位以材授或職因地奬化浹海壖績揚朝聽鄉人前豆州懷德縣令楊誕平琴州福楊縣丞丁行忠前白州周羅主簿覃雲方蔚林州興業縣令盧丞祐等百有餘人或文以幹闕一字或武以成節並深悟緣起虛懷贊歎屬鄙人罹憂五宅投速九真心依鷲嶺之恩路出鳶江之徼衆君子博我以道德訪我以文章昔常掌言西掖載筆東觀必聞其政豈直是邦乃靳小音無非喜舍其詞曰天運而下元精隱曜地靜而升默化潛召通才綴象中樞演妙含粹蘊和會真體要對越前覺應速乘時昧定凝照虛融宴持即體惟密同如則悲有感斯赴攸稱大師業著功揚緣空識謝獨園善屬雙林稅駕賢劫千名塵沙萬化惠炬方皎傳燈不夜昔在高宗文思作主珍圖輯瑞瑤壇稽古璧合珠連雲臺策府實感真夢元開法宇帝鄉厭代喬山棄祕象韜精榮河改名録歸授手讖假神足福地還金靈豪變王官議識舊邦其命維新珠緯雖復璇題尚淪軒除莫究鐘梵誰親匪我良牧疇皆勝因我牧伊何光分作扞懿文經武綏邊靜亂勝因伊何畫剎仍貫遺綸可仰故趾無換帝典還揖王城重開氓風則阜人亦子來班爾稅式林虞效材崢嶸法架肅穆香臺列嶽惟良大藩英寀邑稱髦俊封美賢宰刻頌金石揚名山海奉國承家忠孝斯在因以事起功以銘宣理以詞著教以言傳見色祈信觀文趣緣道場永久我業無邊維唐景雲元年歲在庚戌十一月己巳太子少傅許國蘇公薨於崇仁里之私第春秋七十有二嗚呼哀哉粵明年三月已酉制葬我公於武功之先塋禮也公諱王褱字昌容京兆武功人其先出自帝高陽襲允曰黎實勤火正逮昆吾之子始封於蘇以國受氏公其後也暨漢平陵侯子建子侍中嘉魏侍中則晉尚書遁即聯華國圖代載明德公高祖周度支尚書邳國公諱綽立言成務垂於後昆公曾祖隋尚書右僕射開府儀同三司邳國公諱威嘉謨成績懿于當代大父隋尚書職方郎鴻臚卿諱夔理綜㣥品識覃衆妙烈考祕書丞池台二州刺史贈岐州刺史諱亶遊藝聚學素風不隕公系上聖之遐緒鍾盛德之泉茂資元和以體仁穆清明以成美初孩而孤稟絳郡夫人之慈訓幼而岐嶷聰敏冠常始讀山棲志一覽便誦及長博緯經史尤善屬詞年十八進士高第補寧州參軍轉恆州司法丁絳郡夫人憂自中山涉褰跣從至京兆哭不絶聲性以禮全形以哀瘠左庶子張大安以孝悌上聞服闋拜恭陵丞轉相府録事參軍上改封豫官亦隨府上即帝位拜朝散大夫尚書水部員外郎未幾兼侍御史淮南廉按俄拜夏官員外兼官尹丞歷水部祠部郎中兼判司禮事以親聯出為朗州刺史轉歙州刺史并州武興令檢校冀州刺史纍遷汾鼎同汴揚陜以纍最入為尚書右丞加銀青光祿大夫遷尚書左丞戶部尚書又拜侍中京師留守兼理冤滯車駕還京持節河北按撫加金紫光祿大夫轉吏部尚書東都留守尋復還守本職廷拜尚書右僕射同中書門下三品封許國公監修國史今上踐阼拜尚書左僕射屢抗詞乞骸優答不許拜太子少傅公有子七人長子頲字廷碩歷給事中中書舍人修文館學士太常少卿嘗掌綸誥與公聯侍紫墀接機黃閣前後之拜近古未有公體道貞固立心直多識前言遍詳舊事自周隋損益家牒可紀公則紹之罔不畢綜故閨門之內孝悌成則朋友之間忠信克舉其在參佐也婉孌柔嘉醜夷不爭其事藩邸也從容諷議賓寮是仰四為郎而彌綸之功布於省閣九為牧而循良之績著於州郡周旋二轄焞耀文昌回翔兩宮耀鑠巖廟版圖國之信而五教在寬冢宰人之紀而九流式敘左右端揆盡訏謨之略東西掖闈備忠讜之美德愈盛而心益下位彌大而行益恭用能高而不危長守富貴考父三命謙光數朝平仲一心中孚纍聖非至德淑慎疇至此哉夫其仁恕篤密清廉惠躬儉約以自持蹈名教以檢物祿以周急不積于家財以睦親必均於衆故義廣而私謁之途阻名揚而兼濟之道宣亦叔敖之賢國僑之懿也幾深通志精晤默識文以跖實靡絢其華學以辨微固信於已故始終機揆舉無遺策斯又子房之知孔明之能也造膝沃心務存匡救引過稱善不近於名故聲聞于天而口無擇績宣於外而事罔專蓋叔子之仁孔光之慎也兼斯衆善以畣明德方將三階載理前宮更曜天命不祐暗忽遷殂朝喪其楨人殞所戴天子悼焉遣大府卿李從遠册書弔祭輟朝三日有司備禮發哀追贈司空荊州大都督賻絹布八百段粟米八百石凶事葬事並官給賜東園祕器大鴻臚監護將作立碑太常考行諡曰文貞禮也皇太子別次發哀遣洗馬弔祭賻物二百段祖載之日闕三字官闕二字於開遠門外別遣左常侍徐闕一字宣旨送于郊闕一字令遣洗馬如初禮宮臣已下畢赴朱旗載路班劒啓行哀榮之禮備矣諸侯之孝終矣公家代尚儉載在縑竹其生也堂無宴客門無主賓其終也塋無封樹隧無碑表大漸之始遺令遵行公卿暨親戚賵襚弔祭一無所受周身之外唯闕一字車一乘頲等泣血受命罔有踰越雖迫旨朝不旌墳壙建碑於塋北一十五里故臨大節而不奪見大義而能勇經緯之迹文藝之行備於國章布在人口懼違先訓皆略而不書中書侍郎同中書門下平章事昭文館學士兼修國史皇太子侍讀范陽張説雅俗之鎮具瞻令德文章之雄談者為楷偉公道德之首徽猷可行刊石紀頌詞如清風陳子昂字伯玉梓州射洪縣人也本居潁川四世祖方慶得墨翟祕書隱於武東山子孫因家焉世為豪族父元敬瑰偉倜儻年二十以豪俠聞屬鄉人阻飢一朝散萬鍾之粟而不求報於是遠近歸之若龜魚之赴淵也以明經擢第授文林郎因究覽墳籍居家園以求其志餌地骨鍊雲膏四十餘年嗣子子昂竒傑過人姿狀嶽立始以豪家子馳俠使氣至年十七八未知書嘗從博徒入鄉學慨然立志因謝絶門客專精墳典數年之間經史百家罔不該覽尤善屬文雅有相如子雲之風骨初為詩幽人王適見而驚曰此子必為文宗矣年二十一始東入咸京遊大學歷抵㣥公都邑靡然屬目矣由是為遠近所籍甚以進士對策高第屬唐高宗大帝崩於洛陽宮靈駕將西歸子昂乃獻書闕下時皇上以太后居攝覽其書而壯之召見問狀子昂貌寢寡援然言王霸大略君臣之際甚慷慨焉上壯其言而未深知也乃敕曰梓州人陳子昂地籍英靈文稱偉曜拜麟臺正字時洛中傳寫其書市肆閭巷吟諷相屬乃至轉相貨鬻飛馳遠邇秩滿隨常牒補右衛胄曹上數召見問政事言多切直書奏輒罷之以繼母憂解官服闋拜右拾遺子昂晚愛黃老之言尤耽味易象往往精詣在職默然不樂私有挂冠之意屬契丹以營州叛建安郡王攸宜親總戎律臺閣英妙皆署在軍麾特敕子昂參謀帷幕軍次漁陽前軍王孝傑等相次陷沒三軍震懾子昂進諫曰主上應天順人百蠻向化契丹小醜敢謀亂常天意將空東北之隅以資中國也大王以元老懿親威略邁世受律廟堂弔人問罪具精甲百萬以臨薊門運海陵之倉馳隴山之馬積南方之甲發西山之雄傾天下以事一隅此猶舉太山而壓卵建瓴破竹之勢也然而張元遇王孝傑等不謹師律授首虜庭由此長寇威而殆戰士夫寇威長則難以爭鋒戰士殆則無以制變今敗軍之後天下側耳草野傾聽國政今大王沖謙退讓法度不申每事同前何以統衆前如兒戲後如兒戲豈徒為賊所輕亦生天下姦雄之心聖人威制六合故用聲爾非能家至戶到然後可服況兵貴先聲今發半天下之兵以屬王安危成敗在百日之內何可輕以為尋常大王若聽愚計即可行若不聽必無功矣須期成功報國可欲送身誤國耶伏乞審聽請盡至忠之言凡軍須先比量智愚衆寡勇怯強弱部校將帥士卒之勢然後可合戰求利以長攻短今皆同前不量力又不練暗驅烏合敗後怯兵欲討賊何由取勝僕一愚夫猶言不可況姦賊勝氣十倍未可當也且統衆禦姦須有法制親信若單獨一身則朱亥金鎚有竊發之勢不可不畏人有負琬玉之寶行於途必被劫賊何者為寶重人愛之今大王位重又總半天下兵豈直琬玉而已天下利器不可一失一失即後有聖智之力難為功也故願大王於此決策非小讓兒戲可了若此不用忠言則至時機已失機與時一失不可再得願大王熟察大王誠能聽愚計乞分麾下萬人以為前驅則王之功可立也建安方求鬬士以子昂素是書生謝而不納子昂體弱多疾感激忠義嘗欲奮身以答國士自以官在近侍又參預軍謀不可見危而惜身苟容他日又進諫言甚切至建安謝絶之乃署以軍曹子昂知不合因箝默下列但兼掌書記而已因登薊北樓感昔樂生燕昭之事賦詩數首乃泫然流涕而歌曰前不見古人後不見來者念天地之悠悠獨愴然而涕下時人莫之知也及軍罷以父老表乞罷職歸侍天子優之聽帶官取急而歸遂於射洪西山構茅宇數十間種樹採藥以為養嘗恨國史蕪雜乃自漢孝武之後以迄於唐為後史記綱紀粗立筆削未終鍾文林府君憂其書中廢子昂性至孝哀號柴毀氣息不逮屬本縣令段貪暴殘忍聞其家有財乃附會文法將欲害之子昂荒懼使家人納錢二十萬而意未塞數輿曳就吏子昂素羸疾又哀毀杖不能起外迫苛政自度氣力恐不能全因命蓍自筮卦成仰而號曰天命不佑吾其死矣於是遂絶年四十二子昂有天下大名而不以矜人剛斷強毅而未嘗忤物好施輕財而不求報性不飲酒至於契情會理兀然而醉工為文而不好作其立言措意在王霸大略而已時人不之知也尤重交友之分意氣一合雖白刃不可奪也友人趙貞固鳳閣舍人陸餘慶殿中侍御史畢構監察御史王無競亳州長史房融右史崔泰之處士太原郭襲徵道人史懷一皆篤歲寒之交與藏用遊最久飽於其論故其事可得而述也其文章散落多得之於人口今所存者十卷嘗著江上丈人論將磅礡機化而與造物者遊遭家難亡之荊州倉曹槐里馬擇曰擇昔從父友王適獲陳君欣然忘我幼齡矣榆關之役君籌其謀戎安纍年不接晤語聖歷初君歸寧舊山有挂冠之志豫懷役南遊遘茲歡甚幽林清泉醉歌絃詠周覽所記倏遍岷峨豫旋未幾陳君將化悲夫言絶道冥杳然若喪之幾延陵心許而彼已亡天喪斯文我恨何及君故人范陽盧藏用集其遺文為序傳識者稱其實録嗚呼陳君為不亡矣遂為贊曰岷山導江回薄萬里浩瀚鴻溶東注滄海靈光氛氳上薄紫雲其瑰寶所育則生異人於戲才可兼濟屈而不伸行通神明困於庸豎子曰道之將喪也命矣夫子之生也珠圓流兮玉介潔子之沒也太山穨兮梁木折士林闃寂兮人物疏門館蕭條兮賓侶絶嘆佳城之不返辭玉階而長別嗚呼置酒祭子子不顧失聲哭子子不回唯天道而無託但撫心而已摧尚饗
