front:
  text: 全唐文欽定全唐文卷二百三十八藏用字子潛幽州范陽人舉進士不得調隱居終南山長安中徵拜左拾遺神龍中知制誥遷中書舍人景龍中至尚書右丞先天中坐附太平公主配流嶺表會交址叛有捍禦勞改昭州司戶參軍遷黔州長史判都督事未行卒年五十餘
  hash: sha256:b94b539f008037adde443c7cf68d285722a1b04be6db076a27e00ac889b36810
