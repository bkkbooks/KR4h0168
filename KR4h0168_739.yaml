body:
  text: 石明臣節水喻聖聰順投既因於納諫虛受必俟乎輸忠從以讜言出清規而有中類夫貞節入碧浪以無窮爰自人謀式彰天獎言必在乎能發道奚疑於虛往自懷從善聞蹇蹇於股肱何異臨川運磷磷於指掌理既符於水石事且契於雲龍佇啓心而是贊在虛已而能容石投水而誠資手敏臣佐君而詎得面從當手敏則水不傷清匪面從則君能立政嘉獻替而無爽幸遭逢而有慶致至堅於元奧象以得賢受可轉於清流因之啓聖所以垂衣廣納側席深居言之者何常率爾聞之者足以啓豫攻玉之形隨帝心之沃若補天之質應王澤之濡如既而流謗靡行沈幾自得當持重而無撓冀臨深而不惑逆於耳而順於心黜其邪而褒其直用礪金於睿鑒渙汗潜通舉韞玉於恩波津涯莫測於是宣教化罷畋遊開直道務旁求發揮諤諤之明節會合洋洋之聖謀石以貞堅本無疑於虛擲水惟柔順安有阻於暗投夫然則臣心磊落而上達君德汪洋而下流况乎舟楫之道大行不侮不慢藥石之言盡入何憂何患當道泰而人悅固河清而海晏彼漢高之用留侯未若吾皇之納諫有一人兮甚美事二夫兮深恥不咄咄以怨人常默默而傷已何窈窕兮若彼而寂寞兮如此舌雖在而口不言身未亡而心已死殆其喪主失身去故從新初為息侯之婦今為楚國之嬪標二八之佳麗冠三千之等倫豈君恩之不至顧我恨之有因觸類無言似峽口為雲之女含情不語如山頭化石之人守而不改邈矣而心有所在行之實難確乎而性有所安指逝波於舊寵比浮雲於新歡得不佇蕙思於心曲祕玉聲於舌端於是語笑己而得意莫其處喧譁而不亂挺節操以自持翠羽常低多值斂眉之日瓠犀難見少逢啓齒之時然則動宜三省情順九思似慎樞機暗合吉人之象類含鋒刃潛符靜女之詩嗟夫秦家之女兮在德何有賈氏之妻兮其言亦苟誰令喋喋駐五馬而誚使君之愚焉用嘻嘻獲一雉而忘大夫之醜彼則爾此則否外結舌而內結腸先箝心而後箝口既而載離生育幾變寒暄想蘼蕪之不見厭芣苡之空繁勢異絲蘿徒新婚而非偶華如桃李雖結子而無言及夫雲夢春遊章華夜侍永忘一顧之念難奪三緘之志起居有節惟聞珮玉之聲應對無時不吐如蘭之氣君王於是崇其意重其義命女史以書之為楚宮之故事臣頃自布衣爰及仕進飽僧孺之惠義師居易之文章斯人之亡各已數載屬先帝憂勤之際贈典未行遇陛下聖明之初諡法宜頒其將行業以傳冊書白馬津西南五十里曰堯祠衮龍騰文劍佩有光德音不遐精魄如在然而祠廟僻遠藻薦亦稀荒榛不除茂草斯鞠司空隴西公即戎之二歲勤恤人隱期於俗阜夏四月宿麥方登油雲未施公愀然殷憂思降甘澤因曰古先帝王孰神於堯盍將禱焉期有所應乃率寮屬將校質明而往鐘磬畢陳牲牢在筵翊精肅容虔禱移時祝拜之際肸蠁如答未及回車重陰已周密雨輕灑槁苖特起逮夕及晨自葉流根寮屬將校相率稱賀曰天災滑民仍歲不登道殣流離十年於茲公能以誠明動神祇膏澤發枯朽免積逋於餓隸變旱歉為豐稔固當大崇廟貌以旌厥美於是飾粉壁張羅帷欒櫨四周丹紺交輝肅肅靜密神之所依是宜播公之美揚神之祉刻於金石而為之記時寶歷二年七月二日建立唐乙巳歲帝命司空隴西公作藩於滑公既至問甲士以安問文吏以理問黎人之疾苦翊月之後既安且理而無疾苦明年夏五月暇日公與監軍軍倅賓介遊於佛寺寺號明福因詢明福之義有僧定俊曰冥報記云隋開皇年中滑人杜明福妻齊氏嘗讀法華經沒後為崔氏男子名彥武至仁壽四年崔年三十為滑守一日了然通前生事顧謂從者曰吾昔為此郡人婦今知家處因乘馬抵城闉入修巷指門而呼杜氏明福老矣疾出拜迎崔入門先升堂指東壁圬墁之隆處謂明福曰吾昔所持經衆金金義藏於此第七卷紙末火宇滅今每念至此常不終卷因壞垣果得經并金義其未處咸如說復指庭前樹曰吾常斷髮置諸穴中取之又得明福殆不勝情云皆亡室之所遺記也比計物故之日及生之年略無差焉噫靈驗應兆既如彼存沒契會又如此感嘆久之遂請施宅為寺崔即日為之上言請置寺因號明福由是起殿中虛屋周廊回回前三其門庭二其臺架危樓以聲鐘植修莖以飛幡界宇峻嚴宛如鷲山於茲三百有餘年矣公異其事惜無銘記遂勒石以載既而出家財修浮圖賈彼餘力因其隙時人樂就役物無枉耗越七月浮圖成峻層孤危高無有倫壓地貫天泉縮石低鐵輪周回風鐸四鳴軍城用為壯觀公命敏中援筆以記敏中蹶然而起曰釋氏之教其來久矣漢魏以降復煽而熾其教以禪定慈忍報應齊戒為事亦以是誘掖人心輔助王化何者先王恭默無為之道乃禪定乎忠恕惻憫之訓乃慈忍乎懲惡勸善之法乃報應乎防欲間邪之禮乃齊戒乎分其教而則殊歸於禮而何異子不語怪力亂神惡其人之惑也今崔氏之應足彰福善之理焉可同怪神乎故得直而書之無愧詞於戲公不至寺誰表其異寺不公值誰為之記時也皇帝之代寶歷二祀白露之秋八月癸未因其異而致其施施乎施疑而增其圯後之人兮知我公修浮圖之義肩吾字希聖自號棲真子洪州人元和十年進士隱居洪之西山至敬尚潔在禮惟恭饗異四時大饗以先王為祫羹重五味太羹以無味為宗薦既殊於禘礿禮乃變乎秋冬則知此祭不數此羹不混法明水以成功惡鹹鹺而是損義由反古類稿秸之無文道尚全真喻恬淡而為本故宜輕八簋黜三牲其味惟德其色惟清若謂我在物則物不在於鹽菜若謂我在水則水不在於汙行小周人之尚臭哂殷家之貴聲雖無形而可挾務展禮而由誠觀乎一鼎無包百王是慶法君長以為尊事鬼神而聽命既陳既酌彌重乎精誠不絮不調莫先乎聖敬聿修前典不可度思因七獻以成禮約三歲而為期饗宴既終於勿勿禮容方盛乎遲遲且在有名而可重孰云無味而見遺是以不饗甘苦不由饔餼湆雖假於一烹用不因乎多味澄渟在潔惡薑桂以為滋肸蠁降靈歆明德以為氣是以禮因羹而克舉羹因禮而允修乍同西伯之禴寧比東鄰之牛一以表專一而不二一以表通微而闡幽豈徒不和而為貴亦以明反本之所由懿夫其名類餗其正在禮下以敘人倫上以親祖禰苟傾覆之無虞諒威儀之由體者也稽太古之至薦也以汙樽抔飲除地而為壇迄後聖之禮禋也其籩豆犧象咸飾其碧丹是以五禮秩經於宗伯六樽詔典於春官實有嚴而有翼豈無取於異端故殷王有彤日之祭魯聖有禘月之觀且皇周之享也肇繪象於茲器既普淖於式潔乃登堂而奠次耀如金石以率舞派若洪瀛而贔屭騰圭瓚以沃暢達㣥神於元祕敬宗宜社以交其幽明返本歸仁以尊其天地可以等上下之列可以參陰陽之位豈齊夫斗筲之外役寧假乎挈瓶之凡智憤季氏之將旅恥王孫之寧媚况今交節以義具物昭洗介茲壽考以洽百禮柔嘉滌濯以修其虔恭登降揮觶以流其愷悌夫禮以器成器以禮肅擬冰壺之潔徹鑒膳鼎之覆餗望堯衢而咸惠賴嘉時而有淑既無列野之郊願致誠於工祝僕雖幸忝成名自知命薄遂棲心元門養性林壑賴先聖扶持雖年迫遲莫幸免龍鍾觀其所得如此而已性非生知學道者必資於切問道難言傳立教者不尚於明文藏機隱意恐輕泄於聖言比物屬辭乃密傳於達士世有讀書而五行俱下開卷則一覽無遺聲名喧世孰知不死之方頭角摩天豈悟希夷之理必也訪道尋真求師擇友覽仙經之萬卷不出陰陽得尊師之一言自知真僞水火金木土五行也相生而為子母相克寸而為夫婦舉世皆知也明顛倒之法知抽添之理者鮮矣上中下精氣神三田也精中生氣氣中生神舉世皆知也得反覆之義見超脫之功者鮮矣知五行之顛倒方可入道至於抽添則為有道之人也得三田之反復方為得道至於超脫則為成道之人也古先達士皆曰道成真成道者百無一二今來後學徒有道名真入道者十無八九欲論道而超脫者西山十餘人耳遂從前聖後聖祕密參同一集五卷取五行正體之數每卷五篇應一㤅純陽之義開明至道演說元機因誦短篇發明鍾呂太上至言庶得將來有悟勤而行之繼僕以出塵寰同作蓬瀛之侶華陽真人施肩吾希聖序夫太空浩渺虛無自然視之杳溟無形聽之寂寞無聲近而無比遠而無邊用而無竭處後而無後之後居先而無先之先欲究空而不空莫若神之與氣斯乃太空之維綱也子乃觀已之空與他人之空其空有五焉一曰頑空二曰性空三曰法空四曰真空五曰不空在人高下逐性存亡本自一空而生翻作多空之用耳頑空者虛而不化滯而不通凝而陰沉黯黯胚渾清氣埋藏而不發陽魂朴質而不生斯乃至愚之人也性空者虛而不受靜而能生泯盡諸相不生一意惟見空中之空匪知空而不空但見離中之虛莫測坎中之滿關扃諸妙楗守孤雲枉住性空終歸寂滅誓作杳冥之鬼莫諧升舉之仙斯乃古今禪伯之流也法空者知識相之分行究生死之根源寂寂有歸皎皎不昧動而不撓靜而能生塊然勿用於潛龍乾位初通於元谷在忘色忘形之內居無為無色之中合大道以無差處人倫而不惑乃得道之初也真空者知色不色有正色以視之知空不空有真空而在矣得無用有用之力獲無為有為之功元之又元道非常道真空一變則見真神神變之中物無不備斯乃神仙中人也不空者天之至高至清而生日月星辰地之至靜至寧而生山川草木人之至虛至靈而生仙賓羽客三者至虛而復一一神變而千神化形一氣化而九氣皆煦換凡骨為仙體變萱草作松檜故動以靜為基有用無為本斯乃亢龍有悔之高義也故千經萬綸出自無言古聖今賢空能別法豫恐後人輒生私見強為書之云爾上清元格曰大道似不肖盛德若不足韜光晦跡自衛其身人不知也道未足於已言已輕於人事未充於內驕已見乎外好勝於人人不知也修真之士識人為先務當其取士也聽其言而觀其行及其求法也察其理而驗其功勿以人而廢言防其大辨若訥者勿以言而用人防其善為說辭者或大醇而小疵始愚而終聖修真之士亦有知人之鑑不可不奉無上之道也西山記曰古今聖賢雖有兼人之智普照之明未嘗不先求於人謂務學不如務求師師人之模範也黃帝求赤松子半年方得中戒經止於防外行之失劉安玉師王道原終年始得小術法又不及修養之事陰長生不以馬明生久病而怠其業葛稚川不以鄭思遠家法而誨於人耳朱度胡氏而始終如一方昉遇金華而遠近相隨張夢乾三遇海蟾方得三乘之法解志一一見旌陽盡授九轉之功王猛見長壽大仙談笑之間而識破大道梅福遇大洞真君步趨之次而訣盡天機歷古非無神仙以入南州然修真之士不遇者於識人之際不明也其或道貌古顏辨詞利口者始謂得神仙悠久弛之常俗之輩學而不遇一也或業重福薄不信天機輕命重財甘為下鬼録人纎惡棄人大善雖見其人不聽其言雖聽其言不納其理終無所得仙凡自隔遇而不得二也或博學篤志切問近思縱得真訣自生懈怠悅須臾厭持久朝為夕改坐望立成得而不守三也又况交結狂徒尋搜異論廢時亂日何以成功古人上士始也博覽丹書次以遍參道友以道對言所參無異論以人合道所師無狂徒嗟夫愚而自專賢否不辨賤而自用邪正不分論識人之去就不可勝舉也故古今上聖真人未修鍊先修養故曰沐浴不可當風若幽室靜房閉目冥心平身正坐使元氣上升通滿四大上入泥丸此真沐真浴萬倍於外之水火也又曰不欲遠唾以損氣不欲疾步以損筋不欲極視而昏睛不欲極聽而傷腎不欲久立而傷骨不欲久臥而傷肉多睡濁神頻醉散氣多汗損血力困傷形奔車走馬氣亂而神驚望高登峻魄散而魂飛養形之道安而不勞勞而不乏其力靜而不撓撓而不亂其氣外有所補內有所益然後識五行以保全沖和之氣外固內真兩皆得趣可以長久矣元氣真精能得萬形其聚則有其散則零我氣內閉我心長寧至人傳授小兆諦聽如病得愈如醉得醒心安而不懼形勞而不倦心淡而虛則陽和集意躁而欲則陰氣入心悲則陰集志樂則陽散不悲不樂恬淡無為者謂之元和清靜無為不以外物纍心則神全而守固道德經云視之不見聽之不聞搏之不得詳乎老君之旨趣蓋諭以衆庶之俗民非修生之道民也尹真人節解經云內觀者覩神光不可謂之不明返聽者聞神聲不可謂之無音握固者精神備體不可謂之無形凡在道中之民當須視不見之形聽不聞之聲搏不得之名三者皆得謂之道民矣余慕道年久修持沒功夙夜自思如負芒棘嘗因暇日竊覽三靜經云夫修煉之士當須入三靜關陶鍊神氣補續年命大靜三百日中靜二百日小靜一百日愚雖不敏情頗激切神道扶持遂發至懇且試小靜即以開成三年戊午歲起自正月一日庚申閉戶自修不交人事克寸期百日方出靜室雖五穀併絶而五氣長修幸免瘦嬴不知饑渴未踰月而神光照目百靈集耳精爽不昧此三者皆應則知仙經祕典不虛設也人不修即不知既不知則信彼前後學咸謂神仙之教盡為誑誕之辭今古相蒙未始有極小兆忝為前得者故發言為詞以正將來之惑因創五篇篇之四句貽諸同好用紀元深一氣無方與時消息萬物生死共氣盛衰處自然之間而皆不知所以然而然其所稟習在覆載之下有形者先須知其本知其本則求無不通修道者先須正其源正其源則流無不應若棄其本而外求背其源以邪究雖獵盡百家學窮諸子徒廣虛論之功終無攝養之效得者觀之實為自誤耳今歷觀世間好道之流不可勝數雖知恬淡以自守全不知恬淡之中有妙用矣雖知虛無以為理全不知虛無之中而無不為矣若不知虛無恬淡妙用之理徒委志於寂默之間妄作於形神之外是謂無益之用非攝生之鴻漸也且神由形住形以神留神苟外遷形亦難保抑又服餌草木金石以固其形而不知草木金石之性不究四時逆順之宜久而服之反傷和氣遠不出中年之內疾害俱生使夫輕薄之流皆謂繫風捕影不可得矣翻以學者為不肖以真隱為詭道不亦傷哉或人嘗以此事而譏余曰吾聞學道可致長生吾自童年至於暮齒見學道之人已千數矣服氣絶粒者驅役考召者清靜無欲者修仙鍊行者如斯之流未有不聞其死者也身歿幽壤之下徒以尸解為名推此而論之蓋得者猶靈骨耳非可學而得之余聞斯論不覺心愍於內神恍於外沈吟之間乃太息而應之曰觀子向來所說實亦鄙之甚矣迷之尤矣今世人學人間之事猶有成與不成又况妙本元深昏昏默默胡可造次而得之且大道無親感之即應苟云靈骨無乃疏乎然夫服氣絶粒者道家之所尚人苟得之皆有不食之功身輕之效便自言腸胃無滓立致雲霓形體獲輕坐希鸞鶴採餌者復以毛女為憑呼吸者又引靈龜作證曾不知真氣暗滅胎精內枯猶執滯理於松筠守迷端於翰墨良可嗟矣寧不怪乎至於驅役考召之流蓋是道中之法事研討至精窮其真誥誠為身外之虛名妄作人間之孟浪在已無徵於延益於人有驗於軫攘亂構休祥徒陳禍福如斯之輩並非保生之道也或以清靜無為深居絶俗形同槁木志類死灰不知天地動用之心不察陰陽運行之理如此則雖遊恍惚其恍惚而無涯縱合窅冥其窅冥而莫測翻使希夷之外神用罔然虛白之中元關失守言議之際中有高真喟然而嘆曰守一非一履真非真此亦近為門階之由殊未窺其室中之用矣大凡保氣棲神不可以湛然而得之亦不可以兀然而守之且神無方而氣常運形至靜而用無窮是知保氣者其要在乎運棲神者其祕在乎用吾嘗聞之於師曰體虛而氣周形靜而神會此蓋為出世之元機無名之大用矣勝之寶歷中官宣武節度判官檢校戶部郎中兼侍御史入為比部員外郎陽暉早曙露泫清宵宵既寂而露彩結曙將動而陽氣消是以在蘭者照之則煥乎葉在棘者燭之則晞乎條故乃喻天子布澤於晏猶諸侯命朔於朝觀夫潤草瀼瀼晞陽冪冪氣色濃兮猶茂枝幹燥兮如滌初將比玉以減其琳璃稍欲如珠復消夫的皪故可比臣竭忠以祇敬君降恩而蕃錫及夫大明有赫五色初收淩晨光動平野氣浮遂使將飲之蟬驚陽烏而復退罷警之鶴懼白駒而不留出扶桑兮始上被豐草兮徒周何異夫錫宴則臨乎我后來朝則嘉彼爾侯原夫曭朗之光未舒霑濡之色猶遍忽其陽氣匝晴風扇則滴而有響者其響罷聽布而有文者其文難見夫如是有類藩臣感化而來覿中朝布德而成宴彼以朝為數此以夜為初夜則因我而陰勝朝則因我而陽舒其凝也無不備矣其晞也曷可藏諸况有麗天之輝潤月之意崇其燕禮著乎前志朝日出海若一人之當陽夕露低柯若㣥臣之既醉天晴夜朗林霽煙開稽其順陽之心既且周而復始懿乎漸晞之理又觀往而知來所以為成歲之本履霜之具華葉既濡清光若煦吾知湛露晞朝陽也為君臣宴饗之喻古之善諫者喻其心如繩直展成規於良木既折中而經始必周流而牽復以其性有曲直固從乎彌綸以其材有短長必由之盈縮故可彰其言兮直如矢喻其諫兮從如水既應用而無方且適道而虛已為棆桷之無繆成棟梁之有以舉直錯枉且明徑挺之心動而悅隨不失縱橫之理觀夫度彼山林直以絲繩既遵時而有作乃底績而其凝斷長補短物無失性損上益下道罔不興猶其善而惟變所適類夫諫而不命其承匪差毫釐存乎楷式在操張而為務乃經紀以成德操端有準希匠石以財成枉撓必從表王道之正直况夫準以綸綍順乎節文不循枉以為利必適道而斯分假物而言故引從繩之木樂諫為喻明乎則聖之君原其納誨之謀觀其所由既規矩而有制豈文理而是求糾纆既施足彰妙道之用衆材方正比夫從諫如流且夫獻直言者必有備無患木從繩者叶執藝而諫故得明乎官以相規人之無訕矧其不枉道以求用恆守道以為名匡乎不正使其正規其不平使其平斯所謂不可欺於繩墨乃得配乎權衡恭惟賦於說命知諫道之克明瑾官左衛參軍客有感物而憤激何彼連城之珍尚韞他山之石嗤宋人之謬好嗟卞子之未覿抱昭質而陸沉緘異彩而塵積則知時有興廢道有窮通以彼十德之美處斯一拳之中光未施於照廡氣潜發於如虹知識真者希故處幽自祕莫覩縝密空含精粹良工未遇曷溢目之可觀高價儻來將無脛而自至其窮也類獨善以自守其出也比兼濟而為利誠宜取貴於人資琢成器今也用晦而明抱素含英慮以俱焚每懼崑岡之火俟乎入用自憐物産之精豈真潤木有所輝山可名惜沖鑒之未臨倦凡目之見忽徒在山而斯久獨蒙垢而未發麗質可嘉采實損華居其中誰謂困乎石藏於密非曰匿其瑕是知物變則通否極將泰彼含章而混跡由因中而表外當今庶類歸真萬物化淳地不藏寶山將貢珍豈使永韞光於散地獨埋照於窮塵願鑿石出於奇璞知乎希代之無鄰巖夫字子耕刑部侍郎伯芻子人藏其心不可測度也搖舌於口誰不言仁誼哉清濁相渾真僞難辨今雖有提其肺腸以呈衆某必笑而不諒此亦不足怪也蓋僞者繁而真者寡况憑區區文字而能取信於人耶所以某蘊蓄斯久不敢輕奮抑為此也今幸因執事稍垂盻睞以不倫衆輩故得肆陳其愚惟賜詳之某七歲受教誨始學箕裘迄今十六不見成熟性本慵惰強之惟艱不能戮力盡瘁服勤先聖然常謂男子生而懸弧示有事於四方固不得與兒女曹並列依違以沒世每欲奮廓埃壒破開濤浪聳翼雲漢垂名竹帛謂舒腕可取耳殊不知世道隘局九重阻深不可也又欲藏器弛用洗滌他腸昧旦調旨甘入夜吟編簡索聖賢意探情性源白雲霏空虛舟泛波塵機不張語默自任湜湜然得全其愚為唐一間人而家世清風祇承嚴訓不可也又欲掉長舌於公卿間籧篨戚施以媚於人拱立下流阿旨從衆善者曰善不善者亦曰善巧言如流俾躬處休而愚僻已慣矯之惟病不可也三者之惑心不可屈志不可諧歧路難期歲月易老踐履之道倀然自迷執事濯纓清流敏古多識試言指其要路將鞭蹇以趨之某再拜秋八月劉氏徙竹凡百餘本列於室之東西軒泉之南北隅克全其根不傷其性載舊土而植新地煙翠靄靄寒聲蕭然適有問曰樹椅桐可以代琴瑟植樝梨可以代甘實苟愛其堅貞豈無松桂也何不雜列其間也答曰君子比德於竹焉原夫徑本堅節不受霜雪剛也緑葉凄凄翠筠浮浮柔也虛心而直無所隱蔽忠也不孤根以挺聳必相依以林秀義也雖春陽氣王終不與衆木鬬榮謙也四時一貫榮衰不殊恆也垂蕡實以遲鳳樂賢也歲擢筍以成幹進德也及乎將用則裂為簡牘於是寫詩書彖象之命留示百代微則聖哲之道墜地而不聞矣故後人又何所宗歟至若簇而箭之插羽而飛可以征不庭可以除民害此文武之兼用也又劃而破之為篾席敷之於宗廟可以展孝敬截而穴之為箎為簫為笙為簧吹之成虞韶可以和人神此禮樂之並行也夫此數德可以配君子故巖夫列之於庭不植他木欲令獨擅其美且無以雜之乎竊懼來者之未諭故書曰劉氏植竹記敦史寶歷元年官膳部員外郎中外官寮准制封贈多請回授祖父母臣謹詳古禮及國朝故事追贈出於鴻恩非繇臣下之求不繫子孫之便開元新詔唯許宰相回贈於祖蓋以宰相位高封贈崇極故許回授於義無妨近日常僚率援此例夫推讓於祖在父則然改奪於朝為子何忍伏望宣付宰臣重與依注詳議敬方字仲虔隴西人大中朝官歙州刺史唐大中五年敬方患風疾至湯池浸浴六年十一月又入浴因感白龍見風疾遂瘥乃造白龍堂并勒銘於石銘曰黟山南垠湯泉沸騰伏陽韜焰陰火潛蒸盛夏不增窮冬不冰其誰主張唯龍是膺刺郡二年病不能興發汗五日信而有徵乃作龍堂於湯西陵乃刻龍像為神依憑非衆非公非巫非僧王徭步將陳顗歙丞迭掌吾事各勤爾能來盡瞻依去懷憂兢苟肆慢心貽神怨憎盲憒瘡蹩災亦相仍壬申既夏一陰始升銘石室壁庶無騫崩墀字德升汝南人長慶二年登第辟湖南團練府巡官入為監察御史集賢殿學士太和末纍遷起居舍人開成二年知制誥充翰林學士三年遷職方郎中四年正拜中書舍人武宗立改工部侍郎出為潼關防禦使改鄂嶽觀察使會昌六年移江南西道觀察使大中初拜義成軍節度使封汝南縣男入為兵部侍郎判度支以本官同平章事纍遷銀青光祿大夫中書侍郎監修國史兼刑部尚書會吐蕃以三州七關自歸帝召宰相議河湟事墀對不合旨罷為劍南東川節度使未行改檢校右僕射卒年五十九贈司徒僕射十一叔以文學德行當代推高在長慶之間春闈主貢采托孤進至今稱之近者朝廷以文柄重難將抑浮華詳明典實繇是復委前務三領貢籍迄今二十二年于茲亦搢紳儒林罕有如此之盛况新榜既至衆口稱公墀忝沐深恩喜陪諸彥因成七言四韻詩一首輒敢寄獻用導下情兼呈新及第進士國學官郭彪之太原人幼即攻儒家書後得大通周公孔子旨奧又能明百家流落之言樂苦躬自養不愛苟受祿宰相聞以東國學風醨久學者不得官其中皆以豪人使授業者迷經顓業者墮心元和七年詔彪之為國學助教彪之承詔而來拜祭酒司業已即詣學乃家於學焉役馬一匹左右勞一二人大笈一給用生具以實其間彪之身修而貌古性不合俗尚首冠獸皮服用麻衣褒制襴袖闊帶高羈履大屣至如禮公卿大夫亦是好飲流水茹野蔬與松柏之英不苟味膳又樂飲酒人有見者必置酒於前始飲即周告四座曰酒以和神熙性節之則經縱之則撓固不可為俗主酌挹授之禮命飲者自猒欲彪之盈飲三爵而罷每凌爽詣論堂坐高牀召七學諸生居不施廣裀長席俾鄰臂而坐澄震聲音分析典訓至於一詞間咸以俗理相諭了入於諸生心胸中使蒙者縱歷千萬日亦不失其來由是得諸生每歲纍及薦擢於有司彪之祿給矜孤餘即謀買居於山泉間蔽掩其光明嗟乎時畏奪祿分鄰者衆矣不然何不聞斯人於天子左右必翼揚君德倣治古道使今之時奮為虞夏殷周之風賢者昌不肖者藏公侯康而百姓康噫公侯卿大夫默於明者又無由得通九重聞徹天子聰明彪之內樂遺聞於上以得安性墀元和十年德彪之道於國學仰其風嘉國學得其官又憤遺斯人於盡諫位因書其事作國學官書元和九年旱不周畿斗位直午祝融權威焦金爍石火雲奔馳雄獸遁足棲鳥不飛太陰尫薄雨龍慵癡有泉涸源有木折枝有地文裂有草戕萎炎光鬱洞太陽赫曦田莫可牛稼莫可鎡瞻彼雲漢萬民莫綏秋既罷矣奚療民饑行者燔趾居者焮肥乃命長吏分土之師曝巫於日徙地而市偶泥而龍歌鐘彈吹誕搜祠廟牲鬯繁祀威巫虔祈以期是擬期而不應笞巫不媚萬民首仰日瞻其尚渾碧萬里光蒸交蕩於戲天胡不降原野煌烈極目一狀民罕求穀殍莫求葬拒饑而憊因燠而瘴持頤訴天急睫而望於戲天胡不降汝南周子宇靡其間土靡其廛不稼不穡焉就口食祇寺蚤暮暇惟滂滌天既不蒙我憂孔益徙市曝巫揮時紛徒俗宜此尚天其知乎汝南周子稽首謂曰大凡天地陽壯春夏陰結凝沍當陽之盛陰難施雨過而不時陰陽失序帝心既憂吏民亦苦命太史兆何失其所昔漢宣帝遭潤疑旱暵憂惟不寧退避正殿公卿大夫省宰捐膳以禳民災以拯大難為今效昔冀憩民患無時蒸庶蒼傍疑渙亂於戲胡不為滂荒束束火之境不勞旻蒼施惠中國以綏天子邦重元寶歷時人硤石巖巖靈氣應候千載之闕不闕詳其志自北齊周隋物接耳目遠公之居以成其道既修涅槃藏疏絶筆石巔擲上太虛得以明真契示其同法師稱號惠遠生燉煌李氏之族家數世居霍秀里本宅猶存舊墌與硤石西北連岡闕附前晉有匡山慧遠南朝時論所宗四百餘年至法師占澤州遠當周氏闕齊并除塔廟異人大集獨抗震霆之下正辭無屈面折武帝以阿鼻地獄不論貴賤嚮非幽證其能及此竟隱汲郡西山大隋受命出詣上京文帝始引曇延為大師詔公掌校譯經行僧中統理耀臨一時表儀八尺立衆清莊開皇十二年沒於京淨影寺是日輟朝帝曰喪吾國寶矣驗擲筆故處丹流中貫危石最峭後之人實目曰擲筆臺邑里時朝禮之想在容聲有唐寶歷元年夏四月傅學沙門紫羽請刻石臺上河東薛重元刊録故志云岵寶歷中注浮屠書因供奉僧以聞除濠州刺史履道有本戒之在冰每翹翹於進守如凜凜之不勝纍足有懼旁行可矜識安危之在德豈顛越之或承不敬其心敢徵所以本之於有既漸乎履霜戒在不虞罔輕於狎水方保心於慎獨焉敢測乎涯涘人之所畏豈造次而可忘道之將行非中人而勿履敗或聞於旋踵義無輕於舉趾不處於薄君子之行固然若居下流詩人之戒深矣其始也陽律掩耀陰飇戒時因潤下而生德由寒沍以成姿皎若澄虛而體合上善冥然沉響而跡不能欺苟戒之而不履是以履之而不疑事異涉溱匪裳之褰也德輶如羽知仁可蹈之則知視險無必素誠可諒罔違日慎之心無易春冰之上投足而衆流不測委順而中懷是廣惄焉如搗知大患之在躬生也若浮敢憑虛而用壯孰曰堅乎匪同介如結寒波而暫聚湛清質以含虛恍若有亡似乘空於月宇退然如失猶奉身於玉除且異夫莫來莫往何遵於匪疾匪徐必若懷以勵貪飲以明信如臨之戒如履之慎則知水德可保冰力可任匪冰不薄匪水不深彼之蹈者委乎足我之蹈者本於心又焉能料其薄厚而計於升沉則執德罔愆持危不戒意平淡之可玩在清夷之可快豈知蹈之有道行之在德而忽乎淪溺之敗壺至潔玉至鮮有若君子清標儼然色澄澄而外徹質規規而內圓月出皎兮入夜而其儀難見冰以風壯處寒而其實逾堅諒負奇而可玩超衆器而為先當其韜光幽山韞耀窮石隱榛蕪而懷寶淪泥滓而藏白如虹之氣雖無謝於雲煙抵鵲之鄉常見儔於瓦礫於是卞生見而神動匠氏聞而心惜乃奮剖刻耀精明以玉之美作壺之形信無瑕之可用若不琢兮何成以虛而受達人侔其宏量以明而鑒志士效其清貞若其稟性溫如作器含虛正色則惟珍是務立操則匪貞不居爾乃嚴氣凝元陰作寒飇一振具物寥索川皛皛以凌滿林稍稍而木落日既暮兮金閨寂夜一寒兮玉壺陳素冰滿腹清光照人臨象筵而色媚入金鏡而影新對之者暢慮觀之者清神能勵貪夫何假盤盂之戒有同儒士長為席上之珍是以隋珠奪魄趙璧慙姿瑚璉之器斯實為之美人曾不足方其皎潔錦衾亦安敢誇其陸離偉夫掩物之美比人之德素其表兮其儀不忒實其中兮秉心淵塞伊烈氏之指南固賢人之軌則春雷作龍蛇不安於蟄戶賢人用君子思奮於康衢時至氣動而不知其所以然也是以小生區區願有所陳伏以今之獻書者語取士之得失揚盛烈之宏懿多矣刀尺之下固當有在小子淺陋自陳所抱曾不逮意何敢妄有稱謂以成繁文哉然而志苦者聲必哀氣直者辭必端苟察之不惑聽之不失則伯牙不碎琴卞和不泣玉矣閣下宗文祖德名全道著執贄循牆如岵者固多焉門屏故人非敢自適前者病中求拜輒以愚弱自疑猶記與善謂遇長者之眷固無戲言孤負知見局地無措衣化京塵星霜七周分將委運方里歸策適有一外闕舉解至翎羽之類志氣由存欲就明試不能自决友人樊生之見謀曰足下與元宗簡不與他解就試明主足下其審處之李疑行舉者不然使吾子為主司如君之負辱者將謂伸之乎岵曰伸之行舉日就試可也有姚衮曰夫道窮而心泰者神與之俗變而志定者義歸之時之通塞非智力所及吾子處否若泰不改其守久矣今主司方以公用駭拘俗吾子賢淮陰之辱非韓信罪也不賢損益何有於衆人哉岵曰唯欲聞後命矣嚴考功之納樊衡也以為取衡難得衡無後悔黜衡易失衡有遺恨故開一人之數以容之人到於今不謂衡忝一第而謂嚴得主司求人之義也伏想閣下虛求當甚於嚴也小子焉敢有希於衡哉懼畏不敢多陳死罪死罪
