front:
  text: 全唐文欽定全唐文卷八百一陸龜蒙二
  hash: sha256:f33697d499fb2cfc2dc58fb226706d4dafb81aa7ccb42332d4659f094840822a
body:
  text: 乾符巳亥歲震澤之東曰吳興自三月不雨至於七月當時汙坳沮洳者埃壒塵勃櫂楫支派者入屝屨無所汙農民轉遠流漸稻本晝夜如乳赤子缺缺然救渴不暇僅得葩坼穗結十無一二焉無何㣥鼠夜出嚙而僵之信宿食殆盡雖廬守版擊驅而駭之不能勝若官督尸責不食者有刑當是而賦索愈急棘械束榜箠木肌體者無壯老吾聞之於禮曰迎貓為食田鼠也是禮缺而不行久矣田鼠知之後歟物有時而暴歟政有貪而廢歟國語曰吳稻蟹不遺種豈吳之土鼠與蟹更伺其事而效其力殲其民歟且魏風以碩鼠刺重斂碩鼠斥其君也有鼠之名無鼠之實詩人猶曰逝將去汝適彼樂土况乎上捃其財下啖其食率一民而當二鼠不流浪轉徙聚而為盜何哉春秋蟲蝝生大有年皆書是聖人於豐凶不隱之驗也余學春秋又親蒙其災於是乎記侍御史趙郡李君好事之士也因豫話上元一九冰官寺有陳後主羊車一輪天后武氏羅裾佛幡皆組繡奇妙李君乃出古錦裾一幅示余長四尺下廣上狹下闊六寸上減下三寸半皆周尺如直其前則左有鶴二十勢若飛起率曲折一脛口中銜莩花背有一鸚鵡聳肩舒尾數與鶴相等二禽大小不類而隔以花卉均布無餘地界道四向五色間雜道上纍細鈿點綴其中微雲瑣結互以相帶有若駮霞殘虹流烟墮霧春草夾徑遠山截空壞牆古苔石泓秋水印丹浸漏粉蝶塗染盩緪環珮雲隱涯岸濃淡霏拂靄抑冥密始如不可辨別及諦視之條假斬絶分畫一一有去處非繡非繪縝緻柔美又不可狀也裏用繒綵下製線尚如舊兩旁皆解散蓋拆滅零落僅存此故耳縱非齊梁物亦不下三百年矣昔時之工如此妙耶曳其裾者復何人焉因筆之為辭繼於錦譜之後俾善詩者賦之天與之肱力何帛丿糸帛丿糸耕不能耒漁不能船載筠束毫既勝且便晝夜今古惟毫是鐫爰有茹夫工之良者責其精粗在價高下缺齧義互尚不能捨旬濡數鋒月禿一把編如蠶拏汝實助也我書奇奇渾元未衰惟汝是賴如何巳而有兔千萬拔毛止皮散澀鈍鋩緡觚獄辭圓而不流銛而不欹在握方染亦茹之為斫輪運斤傳之者誰毫健身殞吾寧不悲田廬西北偏有古邱焉高可四望余將升之以眺遠舒鬱農民遮言曰不可是邱有巨如井缶而白忤之能為崇不利人多矣宜無往余取酒沃其邱告之曰物之生而白者犬雞牛馬而巳其餘則老而後白狼狐兔鹿鳥雀燕雉龜之類是巳人老而毛髮皓白耗眊昏倒不能記子孫名字形朽神潰以至於此物老而鱗毫羽甲盡白白而後有靈非一聖賢存乎上德光被於下則不為之出出必人奉之以獻不敢隱匿惟不在瑞典雖然神而且靈尚矣故漢之興神姥謂之白帝子得非天命志怪者必曰自然多穴老墳窾大木要野氓盤肩缶區酒之享作小兒女子寒暑瞢眩淫巫倚之彈絲瞑目歌舞其妖怛駭其惑考鼓用幣僭冒其上歲時奔走畏在人後疾病不治飢寒不辭悉爾輩為之也古者鑄鼎象物使民知神姦若之姦吾知之矣况旅吾之地由我進退蟄以時出無越昆蟲之職無雜鬼神之事吾宮居若野處各有分齊固不相害然斬翳通巔為暇日憑藉之所則不當與人爭也如不用吾言吾當籲天霆斷裂首尾焉吾誠不移無易爾為王霸仲儒清節是履有息躬耕黃頭歷齒故人令狐奉書遣子從以車徒入耀閭里既往霸臥日昃不起其妻訊之以息愧恥君遁世榮抗節不仕子親耒耜固其宜矣我實信道曷足慚彼霸乃欣然恬淡如水夫高婦賢可謂具美摯先生恂伯陵之孫學通五經居於渭濱弟子纍百馬融服勤以子妻之師而益親融為大儒恂乃知人和帝之世公卿以聞季直才器宜當輔臣公車就徵禮備元纁守道不至終為逸民外黃申屠少負名節義女執仇令欲論殺蟠以同縣陳情上讞廷尉宥之旌彼孝烈博通㣥書復善談說漢德日衰政實務末隱於碭山遂與世絶獻帝即位徵為三公邈若不應冥冥一鴻時人賢之重者蔡雍明哲終始嗟乎子龍有道人自天台來示豫怪松圖披之甚駭人目根盤於巖穴之內輪囷逼側而上身大數圍而高不四五尺礧石岢然蹙縮然幹不暇枝枝不暇葉有若龍攣虎跛壯士囚縛之狀道人曰是何物怪如是耶子能辨之乎子曰草木之生安有怪耶苟肥瘠得於中寒暑均於外不為物所淩折未有不挺而茂者也况松柏乎今不幸出於巖穴之內脞脆者則硜然之牙伏死其下矣何自奮之能為是松也雖稚氣初拆而正性不辱及其壯也力與石鬬乘陽之威怒巳之軋拔而將升卒不勝其壓擁勇鬱遏坌憤激訐然後大醜彰於形質天下指之為怪木吁豈異人乎哉天之賦才之盛者蚤不得用於世則伏而不舒薰蒸沉酣日進其道摧擠勢奪卒不勝其厄號呼呶拏發越赴訴然後大奇出於文彩天下指之為怪民嗚乎木病而後怪不怪不能圖其真文病而後奇不奇不能駭於俗非始不幸而終幸者耶道人曰然為我贊之贊曰松生蔭隘巖獄穴械病乎不怪卒以為怪擁腫支離神羞鬼疑道人咨嗟筆傳其奇或怪乎形或奇於辭自為怪魁是以贊之噫先生隱唐餘甘菊老樵漁是器寶實相豫為散人出叢書言天下之險者在山曰太行在水曰呂梁合二險而為一吾又聞乎馬當彼之為險也屹於大江之旁怪石憑怒跳波發狂日黯風助摧牙折檣血和蛟涎骨橫魚吭幸而脫死神魂飛揚殊不知堅輪蹄者夷乎太行仗忠信者通乎呂梁便舟楫者行乎馬當合是三險而為一未敵小人方寸之包藏外若脂韋中如劒鋩蹈藉必死鈎牙历必傷在古巳極於今益昌敬篆巖石俾民勿忘兩觀雉門雖僭天子聖人在朝姦佞誅死姦首擲地姦血如水政不得亂國是以理下及千祀澆風四起內荏外賢舉世稱美赫奕皇都象魏天倚豈無姦邪佩玉蘂蘂聖人弗生兩觀如砥以石鑱辭著乎闕里太古之時何嘗有欺逮乎結繩民始相疑畫卦造書聖人之為圖載文字厥功弗知惟簡惟牘斷竹㭊木纍必充廷負必折軸韋編一絶錯亂名目寖務輕省搗枲剝穀膠綴番番恣其所便蟲篆更隸形模易宣上下今古卷舒蟬聯薰曝蠧鬱疵乎不堅又取珉石琢磨雕鐫由簡牘下其存四遷璽印章號殷勤識焉其巧益甚其訛益繁盟契質要朝成夕反誥誓制令尾違首言箋檄奏報離方就圓録注傳記醜讐美憐銘誄碑表虛功妄賢歌詠賦頌多思諂權在簡牘者埋沒爛壞無遺一編副以枲穀其留最延錯謬顛倒尨蒙弗刪在珉石者固寵納賂唯辭是妍鑱鑿既畢名聲泯然堯舜之道以人為傳有死必繼流乎億年宜斥詐僞焚燒棄捐復以太古結繩之前魯國千乘豈無康逵傳載陋巷以顏居之鄙委側僻樞桑覆茨簟瓢屢空其樂怡怡聖人之言終日不違讚易獨入云顏庶幾門直大道堂如翬飛梁肉在御狼貪豕肥陋巷相去不其遠而我實狂狷蓬蒿所宜勒於柴荊賢哉是思蜀嚴之託蓍龜也以忠孝仁義後來之託蓍龜也以偷佞險詖美之使怡愈怛之使駭畏小人惟惡是嗜惟禍是避惟福是覬惟瞽言是媚曾不究得失之所自故幽贊之蓍前列之龜乃化為庸妄之器嗚乎成都吾不知古為市之地况君平之卜肆耶強為之銘以刻其意世謂舜之在下也田於歷山象為之耕鳥為之耘聖德感召也如是余曰斯異術也何聖德歟孔子叙書於舜曰濬哲文明聖德止於是而足矣何感召之云云乎然象耕鳥耘之說吾得於農家請試辨之吾觀耕者行端而徐起墢欲深獸之形魁者無出於象行必端履必深法其端深故曰象耕耘者去莠舉手務疾而畏晚鳥之啄食務疾而畏奪法其疾畏故曰鳥耘試禹之績大成而後薦之於天其為端且深非得於象耕乎去四凶恐害於政其為疾且畏非得於鳥耘乎不然則雷澤之漁河濱之陶無一感召何也豈聖德有時而不德耶孟子曰堯舜與人同耳而好事者張以就其怪怪非聖人之意也吾病其書之異端驅之使合於道人其從我乎雖不從吾亦不能變其說先儒曰瞽瞍憎舜使塗廩浚井鴆於觴酒欲從而殺之舜謀於二女二女教之以鳥工龍工藥浴注豕而後免矣夫勢之重壯夫不能不畏位之尊聖人不得不敬况舜壻於天子頑囂嫚戾者獨不畏之又從而殺之耶且堯之妻二女帥九子觀舜之德舜反受教於女子其術怪且如此是不教人以孝道教人以術免也固堯使勗之非觀德也何足以天下付邰侯姜女之生子也始棄之命之曰棄宋芮司徒之生女也始棄之亦命之曰棄邰棄為稷官蒸民賴之宋棄美而生佐幾移於宋國名之同也奚傷舜重瞳子項羽亦重瞳子形之類也奚病擇其道如何耳季札以樂卜趙孟以詩卜襄仲歸父以言卜子游子夏以威儀卜沈尹戍以政卜孔成子以禮卜其應也如響無他圖在精誠而已不精誠者不能自卜况吉凶他人乎傳曰武王罷朝而襪繫絶顧左右無可使結者衛褚師呼聲子結襪而登席漢廷尉為王生結襪襪之有帶其來尚矣今獨亡之嗚乎古之制亡者十九奚帶之足云柳下惠之妻誄其夫門人不能竄一字呂不韋作春秋秦人不敢損一字德與刑如何哉竈壞煬者請新之既成又請擇吉日以祀告之曰竈在祀典聞之舊矣祭法曰王為㣥姓立七祀其一曰竈達於庶人庶人立一祀或立戶或立竈飲食之事先自火化以來生民賴之祀之可也說者曰其神居人間伺察小過作譴告者又曰竈鬼以時録人功過上白於天當祀之以祈福祥此僅出漢武帝時方士之言耳行之惑也苟行君子之道養老而慈幼寒同而飽均喪有哀祭有敬不忘禮而約巳不忘樂以和心室暗不欺屋漏不愧雖歲不一祀竈其誣我乎苟為小人之道盡反君子之行父子兄弟夫婦人執一爨以自糊口專利以飾詐崇姦而樹非雖一歲百祀竈其私我乎天至高竈至下帝至尊嚴鬼至幽仄果能欺而告之是不忠也聽而受之是不明也下不忠上不明又果何以為天帝乎世以孟軻氏荀卿子為大儒觀其書不悖孔子之道非儒而何然李斯嘗學於荀卿入秦干始皇帝并天下用為左丞相一旦誘諸生聚而坑之復下禁曰天下敢有藏百家語詣守尉燒之偶語詩書者棄市昔孔子之於弟子也自仲由冉求以下皆言其可使之才及其仁則曰不知也斯聞孔子之道於荀卿位至丞相是行其道得其志者也反焚滅詩書坑殺儒士為不仁也甚矣不知不仁孰謂况賢知而傳之以道是昧觀德也雖斯具五刑而况得稱大儒乎吾以為不如孟軻或問豫曰鳳尾諾為何等物圖耶書耶對曰豫之所聞自晉訖於梁陳以來藩邸之書凡封子弟為王則開府辟僚屬取當時士有學行才藻者中是選其所下書東宮則曰令上書則曰箋諸王下書則曰教上書則曰啓應和文章則曰應令應教下其制一等故也其事行則曰諾猶漢天子肯臣下之奏曰可也鳳尾則所諾箋之文也綷縩然離褷然織與繪莫的知既肯其行必有褒異之辭若今之批答案晉元帝為琅琊王時帝美其才令通習外事常使批鳳尾諾南齊江夏王鋒高帝第十二子甚憐之年五歲使學鳳尾諾下筆便工帝大悅以玉麒麟賜之餘未見其出鳳尾箋當番薄縷輕其制作想精妙靡麗而非牢固者也殆將五百年必不能保而存之好事者或云識妄矣且傳云仲尼在魯與陳有問缶羊楛矢者皆知之及修春秋則遠者略近者詳故曰立於定哀而指隱桓之日遠矣蓋聖人作大典不可不慎則前所傳亦妄矣子學聖人之文者求其誠而巳矣又安可詐測數百年前事自以為賢哉君子慎所傳無易蟹水族之微者其為蟲也有籍見於禮經載於國語揚雄太元經辭晉春秋勸學等篇考於易象為介類與龜鱉剛其外者皆乾之屬也周公所謂旁行者歟參於藥録食疏蔓延乎小說其智則未聞也惟左氏紀其為災子雲譏其躁以為郭索後蚓而已蟹始窟於沮洳中秋冬交必大出江東人云稻之登也率執一穗以朝其魁然後從其所之蚤夜觱沸指江而奔漁者緯蕭承其流而障之曰蟹斷斷其江之道焉爾然後扳援越軼遁而去者十六七既入於江則形質寢大於舊自江復趨於海如江之狀漁者又斷而求之其越軼遁去者又加多焉既入於海形質益大海人亦異其稱謂矣嗚乎穗而朝其魁不近於義耶捨沮洳而之江海自微而務著不近於智耶今之學者始得百家小說而不知孟軻荀楊氏之道或知之又不汲汲於聖人之言求大中之要何也百家小說沮洳也孟軻荀楊氏聖人之瀆也六籍者聖人之海也苟不能捨沮洳而求瀆由瀆而至於海是人之智反出水蟲下能不悲夫吾是以志夫蟹冬十月豫視穫於甫里旱苗離離年無以搘幽傷盈懷夜不能寐往往聲類暴雨而疾至者一夕凡數四明日訊其氓曰鳬鷖也其曹蔽天而下蓋田所當之禾必竭穗而後去曰得無弋羅者捕而耗之耶對曰江之南不能弋羅常藥而得之米庳米斯塗杖叢植於陂一中千萬膠而不飛是藥也出於長沙豫章之涯行賈貨錯歲售於射鳥兒盜興巳來蒙衝塞江其誰敢商是藥既絶㣥鳬恣翔幸不充乎口腹反侵人之稻梁豫曰噫失馭之民化而為盜關梁急征商不得行使江湖小禽亦肆其暴以害民食古聖人驅害物之民出乎四裔矧害民之物乎俾生靈之衆死乎盜死乎飢吾不知安用馭者為橘之蠧大如小指首負特角身蹙蹙然類蝤蠐而青翳葉仰嚙如饑蠶之速不相上下人或棖觸之輒奮角而怒氣色桀驁一旦視之凝然弗食弗動明日復往則蛻為蝴蝶矣力力拘拘其翎未舒襜黑韝蒼分朱間黃腹填而橢緌纎且長如醉方寤羸枝不揚又明日往則倚薄風露攀緣草樹聳空翅輕瞥然而去或隱蕙隙或留篁端翩旋軒虛揚曳紛拂甚可愛也須臾犯蝥網而膠之引絲環廠田坴牢若桎梏人雖甚憐不可解而縱矣噫秀其外類有文也默其中類有德也不朋而游類潔也無嗜而食類廉也向使前不知為橘之蠧後不見觸蝥之網人謂之鈞天帝居而來今復還矣天下大橘也名位大羽化也封略大蕙篁也苟滅德忘公崇浮飾傲榮其外而枯其內害其本而窒其源得不為大蝥網而膠之乎觀吾之蠧化者可以惕惕寒泉子見秦惠王曰客有自趙來以約從連橫事說大王者為誰惠王曰東周人蘇秦也寒泉子曰書十上王弗聽有之乎曰然其道如何王耶霸耶曰黜其霸以隮王乎曰不然則何上書之煩而用之疏乎惠王曰醯雞不能混雷霆嬰兒不能抗烏獲者響與力懸殊故也蘇子誠辨矣安能以三寸舌謀山東諸侯使西面朝秦者乎寡人非不知不破一領甲不折一隻矢之為利也顧猶捕風耳諸侯不可一非一朝也齊桓晉文之霸也始若膠附終若冰拆豈連雞俱不能止於栖而巳哉寡人塞耳義弗聞也寒泉子曰不然夫齊荊三晉之人病於兵久矣方城之金十九為兵一為鎛銚董澤之蒲十九為幹一為箕棬父子兄弟之血前後濺野草齊魂為燕氛趙骨化魏土悽痛之聲入金石出弦匏聞之者悄戚酸屑泣不自禁一旦有人謂曰朝與秦連橫暮得帖帖安臥秦亦厭戰雖鼓牙頰未能吞諸侯秦休而強吾亦奮而勇矣設有辨口安能反覆乎大王不用秦詔一武士尺鐵斷其頸無令車輪輾關下土使關東諸侯聞其言合從散橫東向以背秦大王出則奪氣入則包羞及其殆也披土地以奉讐國獨不念秦仲之業艱難乎春秋祀事何面目見宗廟惠王卒弗用寒泉子耕於鄙趙即封蘇季子為武安君六國果拒秦秦閉關十五年武王既伐殷懸紂首有泣於白旗之下者有司責之其人曰吾冶家孫也數十年間載易其鎔範矣今又將易之不知其所業故泣吾祖始鑄田器歲東作必大售殷賦重秉耒耜者一墢不敢起吾父易之為工器屬宮室臺榭侈其售益倍民凋力窮土木中輟吾易之為兵器會諸侯伐殷師旅戰陳興其售又倍前也今周用鉞斬獨夫四海將奉文理吾之業必壞吾亡無日矣武王聞之懼於是包干戈勸農事冶家子復祖之舊晉悼公見奔蜂屬土於墉負桑蟲而置之若有言者不勝其疑也即召師曠以詰其事曠對曰奔蜂無子負蟲而祝之祝之不怠故其形隨之而化也公駭其說曠因從而理之曰伊蜂也欲蟲肖巳之速是故祝之誠夫誠之感物雖千品萬形之殊未有不從而應之者也誠之不達感之不應雖體質外均而其心化為他類矣吾願以人事明之在昔堯欲天下之治祝舜以禪之舜恐天下未治祝禹以禪之傳之誠故三姓之天下化為一家之治也是則堯舜非不能化其子蓋將傳其祝於至公也臣又敢以晉國事直啓王心冀王之速悟日者曲沃桓叔恤民務德有國之人被其祝無幾而化之雖晨風鬱林魚龍趨潭不是過也逮乎獻公納士蒍之讒逐㣥公子伐麗戎而嬖其女使太子將東山之師厖涼玦離顯以義絶讒言卒行見新城之酷二公子繼踵而奔亡當是時懼獻公之毒不啻虎狼之磨牙也此則父化為虎狼矣既而使兵伐蒲又加兵於屈視其子之居不啻寇戎之所聚也此則子化為寇戎矣文公在外十九年賢士五人之為輔公蚤夜而祝之故異體化為一身也及夫齊桓妻以宗女楚成待以諸侯送之於秦卒以得立此則化於他國不能化於父子聞諸獻公未嘗誠而祝之也是知善祝而他類化者奔蜂也不祝而巳子離者獻公也君子謂公之智不如蜂蜂猶能蕃其類今君先有晉國宜乎上保宗廟之基下近百代之資擇而可化而化之無俾奔蜂逞術於君王悼公曰小問而大獲孤之幸也孤其念焉乃立其子彪為太子而使田蘇為傅昔豢龍氏求龍之嗜欲幸而中焉得二龍而飲食之龍之於人固異類以其若巳之性也故席其宮沼百川四溟之不足游甘其飲食洪流大鯨之不足味施施然擾擾然其愛弗去一旦值野龍奮然而招之曰爾奚為者茫洋乎天地之間寒而蟄陽而升能無勞乎誠能從吾居而晏安乎野龍矯首而笑之曰若何齪齪乎如是耶賦吾之形冠角而被鱗賦吾之德泉潛而天飛賦吾之靈噓雲而乘風賦吾之職抑驕而澤枯觀乎無極之外息乎大荒之墟窮端倪而盡變化其樂不至耶今爾苟容於蹄涔之間惟泥沙之是拘惟蛭蚓之與徒牽乎嗜好以希飲食之餘是同吾之形異吾之樂者也狎於人啖其利者扼其喉胾其肉可以立待吾方哀而援之以手又何誘吾納之陷穽耶爾不免矣野龍行未幾果為夏后氏之醢耒耜者古聖人之作也自乃粒以來至於今生民賴之有天下國家者去此無有也飽食安坐曾不求命稱之義非揚子所謂如禽獸者耶余在田野間一日呼耕氓就而數其目恍若登農黃之庭受播種之法淳風泠泠聳豎毛髮然後知聖人之旨趣朴乎其深哉孔子謂吾不如老農信也因書為耒耜經以備遺忘且無愧於食經曰耒耜農書之言也民之習通謂之犂冶金而為之者曰犂鑱曰犂璧斫木而為之者曰犂底曰壓鑱曰策額曰犂箭曰犂轅曰犂梢曰犂評曰犂建曰犂槃木與金凡十有一事耕之土曰墢墢猶塊也起其墢者鑱也覆其墢者璧也草之生必布於墢不覆之則無以絶其本根故鑱臥而居下璧偃而居上鑱表上利璧形下圓負鑱者曰底底初實於鑱中工謂之鱉肉底之次曰壓鑱背有二孔係於壓鑱之兩旁鑱之次曰策額言其可以扞其璧也皆䝯然相戴自策額達於犂底縱而貫之曰箭前如桯而樛者曰轅後如柄而喬者曰梢轅有越加箭可弛張焉轅之上又有如槽形亦如箭焉刻為級前高而後卑所以進退曰評進之則箭下入土也淺以其上下類激射故曰箭以其淺深類可否故曰評評之上曲而衡之者曰建建犍也所以柅其轅與評無是則二物躍而出箭不能止橫於轅之前末曰槃言可轉也左右繫以木堅乎軛也轅之後末曰梢中在手所執以耕者也轅取車之胸梢取舟之尾止乎此乎鑱長一尺四寸廣六寸璧廣長皆尺微橢底長四尺廣四寸評底過壓鑱二尺策減壓鑱四寸廣狹與底同箭高三尺評尺有三寸槃增評尺七焉建惟稱絶轅修九尺梢得其半轅至梢中間掩四尺犂之終始丈有二耕而後有爬渠疏之義也散墢去芟者焉爬而後有礰石睪焉有碌碡焉自爬至礰石睪皆有齒碌碡觚稜而已咸以木為之堅而重者良江東之田器盡於是耒耜經終焉玉溪生傳李賀字長吉常時旦日出遊從小奚奴騎駏驢背一古破錦囊遇有所得即書投囊中暮歸足成其文余為兒時在溧陽聞白頭書佐言孟東野貞元中以前秀才家貧受溧陽尉溧陽昔為平陵縣南五里有投金瀨瀨南八里許道東有故平陵城周千餘步基趾坡陀裁高三四尺而草木勢甚盛率多大櫟合數十抱藂篠蒙翳如塢如洞地窪下積水沮洳深處可活魚鱉輩大抵幽邃岑寂氣候古淡可喜除里民樵罩外無入者東野得之忘歸或比日或間日乘驢領小吏經驀投金渚一往至則蔭大櫟隱嵓篠坐於積水之傍苦吟到日西而還爾後衮衮去曹務多弛廢令季操卞急不佳東野之為立白上府請以假尉代東野分其俸以給之東野竟以窮去吾聞畋漁者謂之暴天物天物既不可暴又可抉擲刻削露其情狀乎使自萌卵至於槁死不能隱伏天能不致罰耶長吉夭東野窮玉溪生官不掛朝籍而死正坐是哉正坐是哉碑者悲也古者懸而窆用木後人書之以表其功德因留之不忍去碑之名由是而得自秦漢以降生而有功德政事者亦碑之而又易之以石失其稱矣余之碑野廟也非有功德政事可紀直悲夫氓竭其力以奉無名之土木而巳矣甌粵間好事鬼山椒水濱多祀其廟貌有雄而毅黝而碩者則曰將軍有溫而願哲而少者則曰某郎有媼而尊嚴者則曰姥有婦而容艷者則曰姑其居處則敞之以庭室峻之以陛級左右老木攢植森拱蔦蘿翳於上梟鶚室其間車馬徒隸叢雜怪狀農作之氓怖之走畏恐後大者椎牛次者擊豕小不下犬雞魚菽之薦牲酒之奠缺於家可也缺於神不可也一日懈怠禍亦隨作耋畜牧栗栗然疾病死喪氓不曰適丁其時耶而自惑其生悉歸之於神雖然若以古言之則戾以今言之則庶乎神之不足過也何者豈不以生能禦大災捍大患其死也則血食於生人無名之土木不當與禦災捍患者為比是戾於古也明矣今之雄毅而碩者有之溫願而少者有之升階級坐堂筵耳弦匏口梁肉載車馬擁徒隸者皆是也解民之懸清民之目曷未嘗貯於胸中民之當奉者一日懈怠則發悍吏肆刑驅之以就事較神之禍福孰為輕重哉平居無事指為賢良一旦有天下之憂當報國之日則恇撓脆怯顛躓竄踣乞為囚虜之不暇此乃纓辨言語之土木耳又何責其真土木耶故曰以今言之則庶乎神之不足過也既而為詩以亂其末土木其形竊吾民之酒牲固無以名土木其智竊吾君之祿位宜如何可議祿位頎頎酒牲甚微神之饗也孰云其非視吾之碑知斯文之可悲毛元鋭字文鋒宣城人缺於東墅而生昴宿一名旄頭遂姓毛氏世居兔園少昊時因少暴農之稼為鷞鳩氏所擒誅之以為乾豆其族有竄於江南者居於宣城溧陽山中宗族豪甚元鋭之世二代祖聿因秦始皇時遣大將軍蒙恬南征吳楚疑其有三窟之計恃狡而不從使前鋒圍而盡執其族擇其首領酋健者縻縛之獻於麾下大將軍問聿之能曰善編録簡冊自有文字巳來注記略無遺漏大將軍奇之因命為掾掌管記及凱旋聞於上為築城而居其族遂以文翰著名其子士載漢時佐太史公修史有徑直之稱天子因覽前代史嘉其述美惡不隱文簡而事備拜左右史以積勞纍功封管城侯子孫世修厥職能業其官纍代襲爵不絶皆與名賢碩德如張伯英衛伯玉索幼安鍾元常韋仲將王逸少王子猷並為執友歷宋齊以來朝廷益以為重鋭之曾大父如椽與王珣為神契之交大父如華與江文通紀少瑜有綵毫鏤管之惠皆文章之會友也鋭為人㯋悟俊利其方也如鑿其圓也如規其得用也稱志則默默而作隨心應手有如風雨之聲者有如鸞鶴回翔之勢龍蛇奔走之狀者能為文多記不倦濡染光祖德也起家校書郎直館遷中書令襲爵管城侯聖朝庶政修缺易元光同被詔常侍御案遂與石虛中楮知白為相須之友帝以六合晏安志在墳典因詔元鋭專典修撰元鋭久蒙委用心力以殫至於疲極書札粗疏懼不稱旨遂懇上疏告老上覽之嘉嘆曰所謂達士知止足矣優詔可之曰壯則驅馳老則休息載書方冊有德可觀卿仰止前哲宜加厚禮可工部尚書致仕就國光優賢之道也仍以其子嗣職焉史臣曰管城毛氏之先蓋昴宿之精取筆頭之名以為氏以與姬姓毛伯鄭之後毛氏不同族也其子孫則盛於毛伯之後其器用則遍及日月所燭之地也自天子至於庶士無不重之者朝廷及天下公府曹署隨其大小皆處右職功德顯著宗族蕃昌云甫里先生者不知何許人也人見其耕於甫里故云先生性野逸無羈檢好讀古聖人書探六籍識大義就中樂春秋抉擲微旨見有文中子王仲淹所為書云三傳作而春秋散深以為然貞元中韓晉公嘗著春秋通例刻之於石竟以是學為巳任而顛倒漫漶翳塞無一通者殆將百年人不敢指斥疵纇先生恐疑誤後學乃著書托而辨之先生平居以文章自怡雖幽憂疾痛中落然無旬日生計未嘗暫輟點竄塗抹者紙札相壓投於箱篋中歷年不能淨寫一本或為好事者取去後於他人家見亦不復謂巳作矣少攻歌詩欲與造物者爭柄遇事輒變化不一其體裁始則淩轢波濤穿穴險固囚鎖怪異破碎陳敵卒造平淡而後巳好潔几格窗戶硯席翦然無塵埃得一書詳熟然後置於方冊值本即校不以再三為限朱黃二毫未嘗一日去於手所藏雖少咸精實正定可傳借人書有編簡斷壞者緝之文字繆誤者刊之樂聞人為學講評通論不倦有無賴者毀折糅汗或藏去不返先生蹙然自咎先生貧而不言利問之對曰利者商也人既士矣奈何亂四人之業乎且仲尼孟軻氏之所不許先生之居有池數畝有屋三十楹有田畸十萬步有牛不減四十蹄有耕夫百餘指而田汙下暑雨一晝夜則與江通無別巳田他田也先生由是苦饑囷倉無升斗蓄積乃躬負畚鍤率耕夫以為具由是歲波雖狂不能跳吾防溺吾稼也或譏刺之先生曰堯舜黴瘠大禹胝胼彼非聖人耶吾一布衣耳不勤劬何以為妻子之天乎且與其蚤虱名器雀鼠倉庾者何如哉先生嗜茶荈置小園於顧渚山下歲入茶租十許簿為甌木羲之費自為品第書一篇繼茶經茶訣之後南陽張又新嘗為水說凡七等其二曰惠山寺石泉其三曰虎邱寺石井其六曰吳松江是三水距先生遠不百里高僧逸人時致之以助其好先生始以喜酒得疾血敗氣索者二年而後能起有客至亦潔樽置觶但不復引滿向口耳性不喜與俗人交雖詣門不得見也不置車馬不務慶弔內外姻黨伏臘喪祭未嘗及時往或寒暑得中體佳無事時則乘小舟設蓬席賫一朿書茶竈筆牀釣具櫂船郎而巳所詣小不會意徑還不留雖水禽決起山鹿駭走之不若也人謂之江湖散人先生乃著江湖散人傳而歌詠之由是渾毀譽不能入利口者亦不復致意先生性狷急遇事發作輒不含忍尋復悔之屢改不能巳先生無大過亦無出入人事不傳姓名世無有得之者豈涪翁漁父江上丈人之流者乎梁伯鸞墓在吳西門金昌亭下幾一里余過之作文而弔以酒為奠其辭曰先生為五噫之歌漢天子聞而病之南走乎大江之波客臯氏之宇下志沉潛而靡他白吳粲以舉臼夫人之勤亦多不懷志於將沒適乎道而無頗比要離之烈魄冡雖夷而不磨嗟余後先生之千祀聊奉奠而來過俯灌地而仰語顧先生之謂何心性誕客他人之宇下不得故築垣而自翰身病妻弱白吳氏之粲不得故力耕而自穫所以法先生之義者庶五噫之可作金行告窮日御初九桐陰雨壓乎泥沙菊氣風揚乎戶牖寒無以衣病不得酒茫洋於心噎嗢在口稚子拱而進曰古往滔滔人生實勞或暇或逸以嬉以遨茲辰甚良足嘯吾曹趨山選臺席餌樽醪既可逭乎災眚亦聊釋乎鬱陶齊諧之流載此世所謂夫登高者也嘗有意乎子曰吁稚子之知止於是耳曾不探乎奧旨吾數畝之間門常晝關學無端倪宛若循環時孤笑以獨憤樂正直而非險艱為書托之與善治頑有行同而跡類者尚憤疾乎聲顏一驥在坂百駑在間傳嘶振秣侮病擠孱仲尼登東山而小魯况肆遠目而務周旋者哉陽專奧邃假竊名器有土有人前呵後騎佞舌咿啞所向上下鏜威介私放蕩侈哆如此者又欲見耶崇閎大居塈粉塗朱脊會螭屹扉環獸鋪輪鮮蹄驕羽翼成徒繡碧其內絲篁彼姝主張何人庸兒賈夫如此者又欲見耶纓辨外飾悔咎中積簡棄信行附比凶德仁澤乾枯義路填塞權之所憎始厚終斥權之所憐昨罵今惜反掌背面天遼海隔如此者又欲見耶國金鑄兵赤子聚盜煞人無慚罪人何參造化不象名稱同暴以隳牆垣不填堂奧生靈幾何過半減耗殘存伶俜輸挽犒勞羸豪偏陂役使顛倒鄉驅吏笞不舍童耄如此者又欲見耶古所謂登高能賦者賦物之姿慘戚在下吾寧忍欺爾以災眚可逭鬱陶可披我中時病言開怒隨我感物悴遐瞻邇噫是使災眚彌熾鬱陶愈悲唯爾教我百無一宜我穀未實我蔬未肥弗視農圃吾將曷歸無重我悔吾方憒憒稚子不樂惴縮而退
