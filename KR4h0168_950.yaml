  text: 全唐文欽定全唐文卷九百五十
  hash: sha256:bb1bfef0240de46e752ab92dc46cf82744e43c1cdd5b99cc36d3ec6509ac8219
  markers:
  - {type: head, offset: 13, content: 高無際, id: KR4h0168_NFKB_950-h1, level: 1}
body:
  text: 若夫㣥萌異質品物殊狀俱擾擾以祈生各營營而自養莫不濟時為要利物為先法星文而鑿井規卦象而開泉大舜垂功於茲日龎君著績於此年資坎德而成潤播靈液而澄鮮潛流洞澈細影凝洌不以處幽而易清不以居深而變潔於是雕以玉甃飾以銀牀棲永康之瑞鳥呈魯國之羵羊持素綆以就汲引金缾而未央爾其紅桃春暎若新妝之臨寶鏡朱李下垂疑明星之列玉池喜丁公之得利懿嫫母之來窺至若鐵騎雷駭劒士雲列燕山之陳欲舒疎勒之泉已竭旅客愁聚征夫思咽應下拜而將飛表忠臣之高節此甘泉之神用也至若冬凝溫色夏湛寒輝既不偏滋於隆重亦不減潤於卑微飲之咸濟汲之無違轄將投而鳳沒錢始出而鳧飛此甘泉之普施也若乃冲融表裏類彼君子鑒之無窮挹之何已悟帝王之無力學仁者之往視徘徊銓庭思盡美矣臣無際才非馬融位叨麟閣屬秘書監博陵崔公畫鞦韆障而得一觀皓齒蛾眉徧於後庭鞦韆之歡樂焉考古之文苑惟鞦韆賦未有作况鞦韆者千秋也漢武祈千秋之壽故後宮多鞦韆之樂今因覩斯畫而善前名臣雖不敏謹述漢武後庭鞦韆賦以歌之詞曰大哉漢武兮尊一人域中無事兮天下皆春豐比黍兮欲東巡風雨時若兮輝光日新百寮良哉六宮清謐外無金革之警內馭玉帛之逸王母呈益地之圖素女授延齡之術河鼓効職於永巷洛神負書而入室當是時也初度禖鷰之辰未屆親蠶之日鬬春服競新裳臨鏡臺耀殿堂態越千金之態香殊百和之香下珠樓巡玉砌並伍徐出叢三連袂照綠池而嬌多步晴天而影細妍兮雅佳兮麗爭攀桃李之花競說間以紅綈叢嬌亂立以推進一態嬋娟而上躋乍龍伸而蠖屈將欲上而復低擢纖手以星曳騰弱質而雲齊一去一來鬬舞空之花蝶雙上雙下亂晴野之虹蜺徑如風捷如電倏忽顧盼萬人皆見香裾颯以牽空珠汗集而光面時進時退以遊以遊以遨類七縱而七捨期必高而讓高第取其至樂靡辭其體勞徒觀其天仙步虛飛鳥頡頏飛鳥不離於羽族天仙不舉而自上漢皇由是闢昭陽臨未央歌虞舜誡幽王知所以失知所以昌察六宮之閒曠耗五綵之衣裳念一朝之罷織想十月之寒霜俾遊者有禮乃輟而不荒豈茲賞之為樂葢欲習夫采桑必令動也無害何必勞而有妨詔宮掖慕共姜克勤筐篚之事繼美葛覃之章則知漢武之德與堯舜而齊芳於昭聖王兮穆穆兮皇皇嶰谷修篁移植仙堂左聯溫室之樹前對鳳池之芳一生孤貞四時青蒨不爭麗於夏色不改貞於秋霰保此歲寒之容得蔭宰衡之院露羃歷以珠綴風清泠而響繁雜金絲於北掖對稷卨於西垣曉視含煙朝窺捧日挺八桂以獨秀與三槐而交密若夫制為用也則笙可以下鳳凰笛可以奏宮商筆可以播文章管可以調陰陽信無施而不可若有待而韜光亂曰託根勝地兮擢幹梢雲抱貞節兮葱鬱氤氳若賞七賢之清曠不可一日無此君者也聖人順動文思欽明天地貞觀品物咸亨去憑虛而就安處面周洛而背咸京雲旗電發霜㦸林行太陰用事其日在斗萬國來庭百神奔走泉潛動而荄落水益壯而冰厚冠異氣於繚垣吐嘉麰於寒藪不忌風雪全抽兩穗逼日月之光華得雲雨之攸利芒纖纖而擢隴葉青青而聳翠同黍谷之移暄類榆林之因地瑞紀增煥嘉禾異植出天苑以稱奇訪人寰而未識淩玉霜而表勁挺金莖而孤植顧擢穎於年和望生成於地力倬彼藩翰其代天工即漢庭之相國類晉室之清通拜殊祥而北首列圖史於南宮紆睟容於有穆冠鴻業而無窮實穎實栗是崇是奉可以為瑚璉之粢可以為穜稑之種偉長至之馭序同少陽之在候成粒貴於鳥銜覆苗期於雉雊夫瑞也百王之珍事其生也二儀之大德道泰則稱物呈形政乖則㣥方皆忒伊小草之何幸逢大人之允塞願均照於離明祈作禎於王國惟唐累慶惟天眷命植平露之殊祥表吾君之睿聖不窺於牖可以辨百寮之賢不下於堂可以觀四方之政其儀可尚其義可覈平也者所以表太平之時露也者所以彰雨露之澤以此知庶類光贊神功昭格也希代以出曠古而無空嘗睹於青史獨有驗於祥圖借如嘉禾合穗且生於隴畝萐蒲扇食未遠於庖廚孰與夫薦祉於彤庭之際含榮於紫殿之前亭亭莖擢的的規圓屬乾坤交泰風烈昭宣是以執正自守居中不偏偶香階之蓂莢對玉戶之賓連以承君顧盼以奉君周旋非夫聖哲首出英賢在位君臣同心上下一致五帝可以六三王可以四亦曷能感於茲瑞如或政有所缺道有未光則低枝傾葢應是知方寧茲物兮自爾信有神兮所將似能存於炯誡豈獨效於禎祥客有聞之而歎曰於戲哉莫瑞匪靈匪聖莫丁偉茲平露卓爾祥經物之咸若國之康寧覩珍符之有炳敢不頌乎德馨頌曰官惟賢兮政無失君與臣兮德惟一伊平露兮應時出彰聖代兮光史筆史元利濟仁明訓俗善績著聞廉察使以為由刺史錄奏懷俊不伏天經地義聖人不加通幽洞冥神心必應懷俊幼傾怙恃早標孝德充窮之思已結於楹書孺子之感更纏於匣扇既而日月有時爰從筮宅墳塋是託俄見葺廬馬鬛新封牛岡載闡有同文讓柏逕栖烏還類許孜蒿埏集鴈故得皎皎仙兔孕質而呈祥藹藹靈芝抽莖而表瑞豈以劉家之菫唯出於生前王氏之魚不彰於死後此由聖皇御㝢恩覃錫類神靈滋液品物昭蘇純仁蹈於二儀禎符效於萬象假使六條闡化千里宣風侔郭賀之深仁媲劉寬之善績何禎祥之所及豈徵應之所臻廉察推功妄塵旒扆懷俊不伏徒勞漫訟莫大之孝何以自安禮標寧儉士有等威苟不體於牲牢則無儀於享祭惟乙命士克由舊章入戶僾然感四時而展敬祭神如在瞻一廟以式思告全將啟其血毛備物乃利於犬豕修戴禮而不忒豈呂刑而可加或人何斯居然昧識好生軫憲徒有効於愛羊速訟不稽寧無慙於相鼠雖庖廚可遠身踐則誠爽至仁而蠲潔在躬親割乃允孚主敬稱以有故於何議刑九命攸分百工惟敘率溫恭以成政資謙讓以恪居丁屈蠖未伸摶鵬始舉且安身於小吏期漸陸於大來將能克已為仁翻乃直而無禮誘人孔易奚昧政於蒲蘆雨雪其滂奚取方於束濕不賢內省見惡探湯何甯成而可師逢郅都而陵忽斯為酷吏允叶班書欲因效以辟名實文過而取誚德以綏人遠來邇悅服以旌禮上衣下裳苟政刑之不修則顛倒而成刺今者素衣見進白石作詩是曰無良因知暴政類桓叔之從沃若太王之有邠自可責以無歸豈得告其擅去且信美非好如登王粲之樓寧食興謠猶思建業之水訴以聞命抑難有詞既無善閉之能任從樂土之適于稽百氏爰得六藝射之制伎之銳既取象於逢蒙且規模於飛衞寢石遇而洞啟蹲甲徹而激藝疑作勢於是盼牂牂之葉引騂騂之弓撥長弰而累氣慮輕葉之搖風心與手兮冥合神與術兮元同標的外準精和內融杯水凝而色粲粲金鏑擬而光雄雄亦既縱橫鳴絃激羽馳虛走空柳雖大忘於所志之外葉雖小舍之必取其中力不屈道必通牢籠五善之奧摠括百中之工時稱絕技實曰巧發貴乎揖讓賤乎矜伐豈直忘歸貫星繁弱銜月鴈迸落於雲霄猨洞叫於巖樾而已哉客有覩之而歎曰弧矢之利器之維新而彼審鵠為美曷若中葉可珍眾謂之葉我視如輪參於靈妙達於鬼神飛後鏃而挺出劃前括而相循養叔之復一矢顏高之持六鈞庸麗景而同塵此射禮所以宜爾善射所以溫如其發也不虛慎於末善厥初角弓猶有勁楊葉碎無餘不見於動不三字官韻此鏡何代良工鑄成四規是徹百鍊彌輕裁冰比麗止水侔清時開寶匣以厭山精時既荷於提挈敢有疲於將迎所以圖象必盡遇態必呈天地不藏毫髮不形悅孤鸞之舞影怨垂淚之表情曉挂玉堂將助晴陽之照夜流金鵲不讓太陰之明夫其月曙開匳牕昏啟闥目短自見因君以達髮亂未理待我將豁曩者久積氛霧半沾沙土蟾埋影澀痕深翳聚其性不耗其器不窳何造化之奇物歷春秋之萬古幸得懷鉛再治負局斯臨盤龍發彩元兔生陰篋笥見賞緇塵不侵鑒窮高遠光燭湮沈舉棄物於未廢喜昔人之遺音未見今字官韻何異荊山辨玉豐城識劒蓂莢虧而轉麗平冰鋪而不陷近日而陽燧無燄向人而元髮奪鑒若乃秦樓對月魏乘臨珠共照而車中轉麗雙明而臺上不孤持衡在人銓署重其進退元龜不遠掌握通於有無夫其創物斯妙成規作典葢視有同異而鑑無深淺秦得金以龍興夏亡玉而國翦喻無不至作戒示於後昆湛而不流比水通於上善國工是作端形是託將審已於寸心察眾人之所惡金鏡精寶兮珠秀華臺插珊瑚之樹鈎垂菡萏之花暎若無質循則有體洞碧空其何際湛清潭其絕底鸞舞翮於曈曨龍怒鱗於清泚淮南王懸而玩之東方朔見而稱曰此瑾瑜之榮碝磩之英負陰而內景冰澈面陽而外景花明惚兮怳其中有象杳兮冥其中有精爾乃遇妖閒之佚女陶清爽之芳時爭捧鴛匣臨乎鳳墀既翻輪而隱耀又飛花以生姿如玉之明如雪之皎度翠壁以星落薄承塵而霜皛拂高淩深緣隙入奧乍滅沒而在空遂迷失其所造徒美夫不根不蒂扈扈煌煌若漢皋靈媛解仙佩洛川神女獻明璫似珠水之皎皎日月之相望芒角璀錯罔兩搖揚至用在無兮摶之不得極虛為有兮應而不藏淮南王曰旨哉大夫之體物也天地之根孰知其源忽而化化欻爾存存琥珀拾芥鳳形精蕞物之冥會出乎意外於是氣以冥合物由化造礎因雲以積潤燧取火而就燥伊琥珀之為珠亦鳳形而吸草既璀錯以瓊豔又熒煌而金藻爾乃探其至賾持其自然手與心愜視與目全美寶擢色以臨矣飛芒乘虛而附焉此見機而作間不可省彼因感而應道不可傳故能異質脗合殊途元通播形的皪透影玲瓏似乎月含桂以貞明泉泛籜而映淨雲發彩於虹玉竹乘陰於鵲鏡虞都尉見而言曰昔者楓丹岸綺松翠山衣膏淪甘壤珠孕清輝全其真詎蜂巢之所僭守其璞寧鶴卵之能希進乎潔己一薰一蕕而竝採德以繄物拾蕭拾艾而同歸且珠之於寶也至貴芥之於草也至微不以貴而黜菅蒯不以微而替葑菲君無謂我腐為螢有耀君之經是照君無謂我弱為舟有徵君之流可乘物猶尚爾人亦諒只若泰初之偶蒹葭長公之俯青紫生芻對如玉之容芳荷被懷璧之士則珠豈草以相期芥得珠以成美吾乃今知然乎至矣於穆聖君功高德奧利澤能廣靈祇必禱溢周夏之珍符繼三五之徽號順甿心而展禮擇良日而大報所以后土祈穀圜丘祭天雍雍濟濟翼翼乾乾建朱干而日曜張翠帳而雲懸皇帝嚴法駕而戾止詔㣥官而萃旃藉白茅以肅若望青壇而仡然我君精潔我后孝享容衞翩翻威儀森爽就陽之位斯在薦帝之儀罔失陶匏必成牲玉惟栗風伯戒道元冥司律惟天命子之辰惟帝告天之日靈神以之保乂昊穹以之宥密殽核洋溢鼓鐘鏗鍧三靈同感庶物皆精故祭者修禮之義柴者告成之意燎焜煌而上熏煙勃窣而傍駛朝野美乎聖澤華夷贊乎能事惠浹洽於煇庖恩汪濊於民吏則知柴而致福祭示吉蠲效周室之為禮望虞家之有年福福應兮飛焰神神來兮駕煙珪組既陳酒醴皆潔繼功前王垂裕來哲化成而萬壽無疆禮畢而四方有截諒夏郊之義舉媿序能之筆拙夫聖人彰德以建物表意以與名禮容孔備制度昭明衣冠振序簪紱齊榮亦茲珮之為用隨劒履而揚聲觀其所興爰自古昔玉華既重於周后蠙珠亦珍於漢辟葢將以威儀節度知無不易豈徒矜珠玉之芳聲喧步頓之前跡懿其符彩照燭流耀暉光宮徵合韻左右鏗鏘此亦邦國之儀範為衣裳之典章於是垂為臣倚為主式標上下動合規矩亦非獨洛解贈於陳思漢女見投於交甫爾其幽人所重君子攸資則蘭蕊馳馨於楚客象環騰譽於宣尼斯亦偶物昇榮助荷衣之葱翠因時適用陪藻服之葳蕤既而天子會朝臣御華闕冠葢雲發公侯進退而為容卿士俛仰而趨謁茲珮也幸朝儀不棄流響未歇既連帶於虹蜺庶傳名於日月佩必有節牙惟應聲既熠熠以光動始鏘鏘而韻清馳聲曲折之間突爾乃激方隨步武之際跳然若驚嘉其琢自良工飾於君子冀靜聞而中矩每徐轉而知止乍旁達以散遷忽高飄而間起比於德寧無故以去身習乎容諒和鳴而入耳是知宮徵交應周旋必聞助清音而靡絕混真質以纔分將觀其禮朝於君假抑揚而有耀俟動靜以成文故乃藉此相攻彰夫必佩窅爾同聲服而非礙顧規模之可則宛在其中聽寥亮之無差不離於內則知俯仰寧阻進退皆由引異響而非往配禮容而必周虛徐互振寂寞相求洞晨照而彌徹驚微風而更幽原夫製彼奇形韻茲良玉雖杳杳以將盡竟遲遲而潛續澹以成章靜而應曲重輕莫雜恒宛轉而下垂左右皆調每玲瓏而中觸由是孤光屢進片影彌輕駐幽音而乍默值逸勢而俄成方將映組綬厠瑤瓊應疾徐而洞徹順激射以鏘鳴故其悄以分音玲然自我當待叩而逾寂匪輕搖而孰可豈不以佩服紛綸威儀眾夥徵衝牙之微旨然後知古禮之不墮巍巍舜德於今人稱居北極而惟大歌南風以敷宏歌之伊何制絲桐而合奏風之至矣信長育而有徵茲可謂無為而自理天縱而多能美夫誠發深衷物能應感憫沃瘠之勞逸均陰陽之舒慘是用作則於世利之孔多風詠凱兮美萬物之蕃衍樂操琴也佳五聲以同和復而不厭遠而匪他方將煦嫗之為意豈徒娛樂於斯歌觀其發宮應徵揚清激濁自南習習同詩人喻彼棘心入夜泠泠異貧士叩其牛角則知聖人審音以知政化俗而作樂者有矣夫懿其出乎幽谷應以繁聲若雲龍之潛召同律呂之相生萬籟動八音清匪鳴條而扇物方靡草而作程是以人荷時康功歸帝力四氣以之而不撓百穀從茲而蕃殖節有度守有則始從邇以及遠終自南而徂北爾乃匪徐匪疾乍遏乍聞颯颯清音疑少女之初至泠泠餘韻謂別鶴之求㣥亦為父母之罔極何必聲變而成文是以德冠百王致成萬物正南面而恭已懋功千載而不咈苗生有漸兮時不可踰揠而求長兮是謂甚愚謂坐致其滋茂翻立見其萎枯欲速之誠雖切受益之理固無計牽挽之功雖則勞止在播植之道不亦疎乎原夫勢惟探掇心則陵遽曾本固之靡思徒末大以生慮附麗無所同伐木而蹷根援引靡辭似拔茅之連茹苟離根而去本必有損而無助然則抽軋奚補枯槁是招雖盡區區之意彌損芃芃之苗助長且乖於載績速成空望於一朝殊不知潤以膏澤託茲沃壤待天時以煦資地力以養諒物生之有恒何力拔而能長豈不以立心有惑措手無疑俄見宛其死矣猶云有以助之不發悟於盡瘁空深迷於務滋謂短長皆由於已謂遲速不繫乎時勞而無功殄乃自致方握蘭而勢並比捽草而功異增高之望莫從盡揠之助爰至徇躁求之性始望如雲乖馴致之方終貽委地逆其理而如是傷其物而由斯欲益為謀冀有秋之彌疾過求生害嗟不日而巳萎是以君子明於休咎每因緣於根本不苟且於華茂推於命俟於時無若宋人之大謬王者親政以虔遲明於未明之前佇來朝於昧爽爰設燎以光宣爛然具舉赫以相鮮燧人載馳俾流光而燭地㣥后咸造將辨物以朝天時也四照方陽千官是候星尚泛於銀漢夜未窮於玉漏烘廣庭之際赩以朱陽曜紫微之傍皎如白晝伊有爛之通照契無私之光覆於是逮其時灼其姿影搖丹檻光動彤墀凌霜氣而炎威轉熾拂輕飇而委燼潛遺設必有因葢欲司其明也幽無不察豈假望而畏之事光乎國典詠美乎周詩如是則稱蘭膏者自滅影於是夜言金釭者敢呈輝於此時豈設王庭其照能廣既烈烈之傍達亦勤勤於睿想尚早斯至激環珮以鏘洋居高匪遑燭宮闈而曭朗功殊甸燎事美蘭薰焚五夜而幽明巳辨輝九重而鵷鷺斯分小投炬以流景嗤銜璧之呈文息其燄而恒讓朝日浮其煙而乍雜瑞雲有以啟天顏輝至德燐亂炳煥熒煌翕赩連珠戶而散彩暎丹桂而混色懿夫勳烈有融用舍合理當其晦可燔以生讓其明可撲滅而止原燎縱而奚匹爟火通而何以未若茲燎之舉天庭之隈可使九門洞啟諸侯畢來蟻為質兮微眇珠有竅而虛圓苟一縷之是繫雖九曲而可穿當通幽以洞微絲莫能貫俾有條而不紊蟻可知先始蠢蠕以中出稍連帛丿糸而外延豈不以內彼鴻輝曳茲纖縷纔容小往之徑乍見規行之迂於武切曲迴貌見集韻入惟追曲窮瑩質以誠難途匪履端觀巧歷而可數宛轉而進縈紆是尋似登折坂之峻如出重泉之深始九折以漸達終一貫而克任去似洞中方游剖蚌之質動殊牀下奚聞鬬牛之音是知聖者之使宛如窮理誠在小而罔遺俾入微而有以蟻周遊而在內進必束身絲抽縷以貫中屈如繞指隔青熒而可見如遙遶而未已苟非委實而行之安得茹柔而展矣詰屈若茲周流出之當曲轉之中才可容髮既旁通之後亦既牽絲苟柔弱之是引則繚繞而奚辭雖云曲徑而入終殊在垤之時斯則貫纍纍而匪匹達規規而如一求蹊而投彼夜光出室而曾非時術茲蟲也小而近智故可以穿無纇之質海環四方東為之滄有巨鼇兮其大無極戴仙山兮其力難量是山也根無附麗彼鼇也勢則騰驤積浪淪漣拖其身而欻以動蕩攢峯回互加於首而隨以低昂豈不以稟茲魁大舉其峻極當一動一息之際見翻海迥山之力延頸而㣥嶺騰青聳身而半天映黑徵物象之無比見神用之罕測亘橫天極地之質邈爾形標冠蓬萊方丈之尊輕如首飾然則神岳之高兮莫知大鼇之壯兮若茲視鯤鵬如纖芥比嵩華於毫釐嶔崟之容初結根於無地突兀之狀終冠首於此時舉其大吞舟不足稱也喻於小戴勝有以似之觀其轉峯巒偃波浪萬派沸渭特立放曠荷至重而非重見大壯而用壯風水之運贔屭而上摩天垠邱山可勝崷崒而高標海上蓬臺之靈神仙之扃獨冠岧亭橫截滄溟莫究其廣大之形谿谷陵阜嶄巖紛糾仰戴於首無可無不乃與夫天地相久者哉茲嶺磅礡隨流混淪聳切雲之高且知其抗首鼓翻波之勢想見其側身順時而或踴或躍推理而乃聖乃神比愚公之移有異想龍伯之釣無因茲可謂氣冠渺瀰力均造化則鼇之戴山也以地載之力相亞風之壯兮長川凝閉狐之聽兮將往復滯慮陷身之有咎常屬耳而未濟究陰冰之厚薄聽潛流之微細蹀足將舉故軫墜泉之憂傾首不移酷似枕流之勢豈不以稟心回惑澄思精專欲趦趄以未進恐凝沍之匪堅青熒在目懾慄臨川躡彼素姿恐有希夷之韻憂其翠瀲忽生步武之前何危疑以立身非果敢以行已不處其薄豈陷而止蟲疑之理有殊鶴警之聽可比俯連白之上唯恐有聞顧莫赤之軀重其所履若將墜而常怯致身謂葢厚而方敢舉趾且夫冰結也徒稱百丈狐疑也何啻三思顧流音之蔑爾增殺氣以淒其同夫不可陷也曷肯聞斯行之所以汔濟等在梁之固保安同履地之時葢由乎懼彼其融處於不磷雖磑磑而罔釋猶兢兢以克慎馮河有志且居安以思危濡尾是憂故易退而難進觀其俯皓質映清光惟審固而後行或逗撓而不遑審固而或行或止逗撓而若迎若將猜忌罔恤雖稱妖婦之化戒慎為意未踰君子之防所以志無堅決狀若虛佇想清流之若驚知素履之有所諒躡虛以為警將保全以為大俟無聞而後行豈貽乎滅趾之害物有相感動無不濟嗟水母之不明假鰕目以能睨因依倚以自警當行止而有制荷茲盼睞非唯一目之所加遊彼波瀾固亦兩心之潛契生雖異稟趣則同途託清明之餘照導茫昧之微軀誠有利於攸往胡可去其斯須唯暗是投唯明是假彼動容而有類此轉盼而奚捨乍若蒙駒之未視從彼母兮又似瞽人之將行待彼相者備察察於清目盧之際共悠悠於碧波之下俾其誠以明之是同我之身也斯則目非獨見用必更相形質既資於自晦視瞻每比於偷光分水類之餘睛每能瞿瞿遊泉室而有路曾不倀倀雖則視之不見終似闇然而章豈不以水母為名鰕居其首委雙眸而不恡當四望之能久處浩浩之無際瞻之在前俾冥冥之有知不曰我後由是審利害之所宜俾出處之從時合之則昭然發蒙固無隱也離之則寂爾無覩豈不默而既精誠之是達在終始以相持我無爾虞既一作恒司明之不替而一作爾為我目其在暗而無疑則知明不自守昧者為偶物有察而應心功有踰於假手是同久要之道曾不吾欺每思一盼之恩慙非己有建侯行師豫順以動弦木羽蒿暌威以作數我軍實昭彼文章犀兕允著其壽年熊虎方異其班飾則考功有職梓人不替五等差數三屬分明實戎律之所先誠保大之攸急聿宜精其鎔範勗彼弛張對夫子之和容拒養由之徹箭且賓人實貫昧我通規函人之仁愆乎所掌是以綱不及地將和容之未足而或告非工處常刑而誰捨聖澤遐湊皇明幽燭射以觀士武以備文中罕主皮賓有書於揖讓作而不利人無取於能函晉陽之美既虧矍相之儀何覩請徵非道方寘嚴刑秋官聯職司人其位克守爾典用承天休所以辨九土之廣輪紀萬方之眾寡生齒之日必載版圖弱冠之年將均征賦况陰陽殊氣性有剛而有柔男女異倫齒或七而或八以小大斯比生死必登爰稽五刑罪也難麗未及三載詞之有乖門戶攸設姦慝是禁以開以閉在昏在晨當啟塞之從時實終始而合制若位崇列國名大諸侯因農隙而度功既日至而斯畢且魯門所作邱明書以不時長府匪仍宣聖議其有改蠢茲甲者興事不臧雖善閉之典聿修而從時之宜或紊糾之則可稱易何為嘗觀夫乾位始造坤儀廣生運元和而產氣因自有而含精萬靈㣥分立圓形以標貴四體成物包寸心而致亨含妙有而成象賁虛無而自明故其端以居中動不違正藏牝谷而為主闢靈臺而作鏡將黷之而不昏因澄之而彌靜既剗邪而窒慾復窮理而知命然後和精神明情性俾存存而不惑恒皎皎而孤暎由觸類而感有為必因象物知器乘時利人敷禮經以導俗馳精義以入神探禍福而知運任行藏而理身所以君子處順而情逸明王不言而化淳若乃潛英議蓄明斷欲鴻蒙而未析忽冒昧而相亂凝至精而一臨俾㣥疑而四散故使立身者潔之而清真自守入官者朗之而美化攸贊語眾妙之元通分萬殊於大觀然則物以心鑒心由物遷掇輕花而意豔坐孤石而情堅所以去彼取此削觚為圓將欲保至和而不撓存大璞而自然茲會有體彼管攸設選賢而官知人則哲端靈心之朗暢拂清鏡之光潔取捨妙諧於物宜推擇靡遺於井渫遣許郭而齊鑑與山盧而比傑可謂張英風著徽烈嗟小子之庸蔽撫蓬心而望絕天作淫雨害於嘉穀東夏之人實罹其弊發倉賙餼巳軫聖皇之心舉恩累折猶有下人這請雖承恩屏水皆在當年而經國寧人事資可久人惟邦本本固邦寧人或不康君何足取且禮莫盛於封禪歡莫大於觀禮人霑厚慶自給非常之恩歲及大祲何阻後時之澤請從周賚以副堯心天子建國酌疇庸之典諸侯立家重延賞之業甲位居戎旅道在干城覩三邊之羽書獻七縱之奇計閫外之事既受命於瓜時軍中之法幾申號於蔥嶺雖王師有征而胡兵尚寇甲第之歡未展庚日之悲已及逝者何追空怨盧龍之塞嗣子克荷爰受白茅之封眷彼鴈行同夫鳥啄韋賢之子固是齊芳劉憲之兄宜其等列棣華有訓桃李無言不慙孤竹之風願守延陵之節前史嘉其德讓今人胡乃告論即議霜科寧符日用
