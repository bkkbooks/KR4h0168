front:
  text: 全唐文欽定全唐文卷八百九十六羅隱三
  hash: sha256:5bcf17dd6ea00c25cab8b9bc682dc70b062cfe1efc44d1841fc3e3555ef141b8
body:
  text: 物之所以有韜晦者防乎盜也故人亦然夫盜亦人也冠履焉衣服焉其所以異者退讓之心貞廉之節不恆其性耳視玉帛而取者則曰牽於寒飢視國家而取者則曰救彼塗炭牽於寒飢者無得而言矣救彼塗炭者則宜以百姓心為心而西劉則曰居宜如是楚籍則曰可取而代噫彼必無退讓之心貞廉之節蓋以視其靡曼驕崇然後生其謀耳為英雄者猶若是况常人乎是以峻宇逸遊不為人之所窺者鮮矣周公之生也天下理仲尼之生也天下亂周公聖人也仲尼亦聖人也豈聖人出天下有濟不濟者乎夫周公席文武之教居叔父之尊而天又以聖人之道屬之是位勝其道天下不得不理也仲尼之生也源流梗絶周室衰替而天以聖人之道屬於旅人是位不勝其道天下不得不亂也位勝其道者以之尊以之顯以之躋康莊以之致富壽位不勝其道者泣焉歎焉圍焉厄焉天所以達周公於理也故相之於前窮仲尼於亂也故廟之於後莊周氏以其術大於楚魯之間聞者皆樂以從之而未有以嘗之一日無將特舉其族以學焉及其門而周戒之曰視物如傷者謂之仁極時而行者謂之義尊上愛下者謂之禮識機知變者謂之智風雨不渝者謂之信苟去是五者則吾之堂可躋室可窺矣無將跪而受其教一年二年而仁義喪三年四年而禮智薄五年六年而五常盡七年其骨月雖土木之不如也周曰吾術盡於是無將以化其族其族聚而謀曰吾族儒也魯人以儒為宗今周之教捨五常以成其名棄骨月而崇其術苟吾復從之殆絶人倫之法矣於是去無將而歸魯魯人聞者亦得以寢其志故周之著書擯斥儒學而儒者亦不願為其弟子焉圭璧之與瓦礫其為等差不俟言而知之矣然圭璧者雖絲粟玷纇人必見之以其為有用之纍也為瓦礫者雖阜積甃盈人不疵其質者知其不能傷無用之性也是以有用者絲粟之過得以為迹無用者具體之惡不以為非亦猶鏡之於水水之於物也浤然而可以照鏡之於物亦照也二者以無情於外故委照者不疑其醜好焉不知水之性也柔而婉鏡之性也剛而健柔而婉者有時而動故委照者或搖蕩可移剛而健者非闕裂不能易其明故委照者亦得保其質龍之所以能靈者水也涓然而取霈然而神天之於萬物必職於下以成功而龍之職水也不取於下則無以健其用不神於上則無以靈其職苟或涸一川然後潤下涸一澤然後濟物不惟濡及首尾利未及施而魚鱉已敝矣故龍之取也寡有挈其大而舉其高以授人者彼則曰隘矣哉挈而舉者曰以吾所得之廣大曾不若彼人之心又安可以施於彼乎於是退而悸栗不敢以所得為有伯成子高讓禹者非所以小黃屋之尊也夫安九州之大據兆人之上身得意遂動適在我鮮有不以荒怠自放者子高且欲狹禹之心而謹其取也故讓之厥後有卑宮菲食之政幽乎理者神也顯乎用者人也苟易其所則為怪妖非仲尼之所言也三百篇亦刪於仲尼而嶽降申甫不刪者豈仲尼之前則其事信仲尼之後則其事妖苟如是則夔龍稷坰人坰而下有相其君輔其主以致理者皆神降也人何有哉是必以國之興也聽於人亡也聽於神當申甫時天下雖理詩人知周道已亡故婉其旨以垂文仲尼不刪者欲以顯詩人之旨苟不爾則子不語怪出於聖人也不出於聖人也未可知秦穆公女以吹簫降簫史於臺上後乘鳳凰而去名其地曰鳳臺吁神仙不可以伎致鳳鳥不可以意求伎可致也則黃帝不當有崆洞之學意可求也則仲尼不當有不至之歎吾知其得志於逋逸間而秦諱之不書遂強鳳以神強臺以名然後絶其顧念之心今江漢間復有史之迹是愚夫愚婦淫其所以得矣嗚乎上行下效信而有證故秦之道竟施於妄矣狙氏子不得父術而得雞之性焉其畜養者冠距不舉毛羽不彰兀然若無飲啄意洎見敵則他雞之雄也伺晨則他雞之先也故謂之天雞狙氏死傳其術於子焉且反先人之道非毛羽彩錯觜距銛利者不與其棲無復向時伺晨之儔見敵之勇峩冠高步飲啄而已吁道之壞也有是夫秦法之於典墳其酷也甚矣由天文術數者則不與焉而易復從而免噫術數者未易知而秦是以全易者其有旨哉夫易肇於羲皇演於姬昌申於素王其為書則百家九流之先其造作者則百王之祖其理則上下天地出沒鬼神有春秋焉有詩書禮樂焉開闢以來舉一物而言皆貫之秦始皇通三聖之妙鍵闕故假術以言亦將欲闕聖人之旨乎以是亹亹無道而至滅亡者豈天下欲秦見造化之心乎嗚乎言之於三代已前秦則可以理遣言之於戰國之後秦則為我罪人漢祖得天下而良平之功不少焉吾觀留侯破家以讐韓曲逆束身以歸漢則有為之用先見之明又何以加焉史遷則曰張良若女子而陳平美好是皆婦人之仁也外柔而內狡氣陰而志忍非狡與忍則無以成大名無他柔弱之理然也嗚乎用其似婦人女子者猶若是况真用婦人之言哉不得不畏道所以達天下亦所以窮天下雖昆蟲草木皆被之矣故天知道不能自作然後授之以時時也者機也在天為四氣在地為五行在人為寵辱憂懼通厄之數故窮不可以去道文王拘也王於周道不可以無時仲尼毀也垂其教彼聖人者豈違道而戾物乎在乎時與不時耳是以道為人困而時奪天功衛鶴得而乘軒魯麟失而傷足儺之為名著於時令矣自宮禁至於下俚皆得以逐災邪而驅疫癘故都會惡少年則以是時鳥獸其形容皮革其面目丐乞於市肆間乃有以金帛應之者吁是雖假鳥獸以為名其固為人矣復安有為人者則不得人之金帛為鳥獸者則可以得人之金帛乎豈以鳥獸無知而假之則不愧也以人則識廉恥而取之則愧焉嗚乎祿於道任於位權也食於智爵於用職也祿不在道任不在位雖聖人不能闡至明智不得食用不及爵雖忠烈不能蹈湯火先王所以張軒冕之位者行其道耳不以為貴大舜不得位則歷山一耕夫耳不聞一耕夫能翦四凶而進八元呂望不得位則棘津一窮叟耳不聞一窮叟能取獨夫而王周業故勇可持虎虎不至則不如怯力能扛鼎鼎不見則不如羸噫栖栖而死者何人養浩然之氣者誰氏荊楚人淫祀者舊矣有巫頗聞於鄉閭其初為人祀也筵席尋常歌迎舞將祈疾者健起祈嵗者豐穰其後為人祀也羊豬鮮肥清酤滿巵祈疾得死祈嵗得飢里人忿焉而思之未得適有言者曰吾昔遊其家也其家無甚纍故為人祀誠必罄乎中而福亦應乎外其胙必散之其後男女蕃息焉衣食廣大焉故為人祀誠不得罄於中而神亦不歆乎外其胙且入其家是人非前聖而後愚蓋牽於心而不暇及人耳以一巫用心尚爾况異於是者乎原出自楚而又仕懷王朝雖放逐江湖間未必有腹江魚意及發憔悴述離騷非所以顧望逗遛抑由禮樂去楚不得不悲吟嘆息夫禮樂不在朝廷則在山野苟有合乎道者則楚之政未亡楚之靈未去原在朝有秉忠履直之過是上無禮矣在野有揚波啜醨之難是下無禮矣朝無禮樂則證諸野野無禮樂則楚之政不歸楚之靈不食原忠臣也楚存與存楚亡與亡於是乎死非所怨時也嗚乎瞭者與瞍者語於暗其闢是非正興替雖君臣父子之間未嘗以牆壁為慮一童子進燭則瞍者猶舊而瞭者噤不得呻豈其人心有異同蓋牽乎視瞻故也是以退幽谷則思行道入朝市則未有不畏人吁肉以視物者猛獸也竊人之財者盜也一夫奮則獸佚一犬吠則盜奔非其力之不任惡夫機在後也當周公攝政時三叔流謗故辟之囚之黜之然後以相孺子洎召公不悅則引商之卿佐以告之在周書君奭篇彼三叔者固不知公之志矣而召公豈亦不知乎苟不知則三叔可殺而召公不可殺乎是周公之心可疑矣向非三叔則成王不得為天子周公不得為聖人愚美夫三叔之機在前也故碑善而福不善而災天之道也用則行不用則否人之道也天道之反有水旱殘賊之事人道之反有詭譎權詐之事是八者謂之機也機者蓋天道人道一變耳非所以悠久也苟天無機也則當善而福不善而災又安得飢夷齊而飽盜跖苟人無機也則當用則行不用則否又何必拜陽貨而劫衛使是聖人之變合於其天者不得已而有也故曰機虎豹之為害也則焚山不顧野人之菽粟蛟蜃之為害也則絶流不顧漁人之釣網其所全者大所去者小也順大道而行者救天下者也盡規矩而進者全禮義者也權濟天下而君臣立上下正然後禮義生焉力不能濟於用而君臣上下之不正雖抱空器奚所施設是以佐盟津之師焚山絶流者也扣馬而諫計菽粟而顧釣網者也於戲齊叟籍其業於沃衍之野更子弟以主之嵗無水旱之害無螟蟲蟲之患而所入或有衆寡焉叟曰豈吾之不信也如是彼鄰嫗者始衣食於吾家今雖外居猶吾之家隸也俾督孟以伺候叟子之長者及將穫農戶輒揮田具擊孟逐之嫗告孟以不直叟抶孟以仲代焉農戶不之罪及仲之為也復然嫗亦以仲之不直告叟復抶仲而用季將行有言曰叟之農戶未嘗如是之悖自嫗督制後孟與仲皆為擊逐今苟存嫗不唯基址之不留而叟之子弟逐未艾也叟醒然而怒逐嫗而復孟仲之職其秋如舊則前之謀悖者果嫗也而農戶何能乘槎者既出君平之門有問者曰彼河之流彼天之高宛宛轉轉昏昏浩浩有怪有靈時顛時倒而子浮泛其間能不手足之駭神魂之掉者乎對曰是槎也吾三年熟其往來矣所慮者吾壽命之不知也不虞槎之不安而不返人間也及乘之波浪激射雲日氣候黯然而昏霩然而晝乍拓而傍乍蕩而驟或落如坑或觸如鬬茫洋乎不知槎之所從者不一也吾心未嘗為之動心一動則手足之不能制矣不在洪流則稿木之為患也苟人能安其所處而不自亂吾未見其有顛越之心也人之性未有生而侈縱者苟非其正則人能壞之事能壞之物能壞之雖貴賤則殊及其壞一也前後左右之諛佞者人壞之也窮遊極觀者事壞之也發於感悟者物壞之也是三者有一於是則為國之大蠧孝武承富庶之後聽左右之説窮遊觀之靡乃東封焉蓋所以祈其身而不祈其嵗時也由是萬嵗之聲發於感悟然後踰遼越海勞師弊俗以至於百姓困窮者東山萬嵗之聲也以一山之聲猶若是况千口萬舌乎是以東封之呼不得以為祥而為英主之不幸漢祖之圍平城也陳平以木女解之其後徐之境以雕木為戲丹雘之衣服之雖獰闕勇態皆不易其身也是以後人其言木偶者必以徐為宗嘗過留留即張良所封也平與良皆位至丞相是宜俱以所習漬於風俗良以絶粒不反今留無復絶粒者而平之木偶往往有之其剞劂移人也如是買臣之貴也不忍其去妻築室以居之分衣食以活之亦仁者之心也一旦去妻言於買臣之近侍曰吾秉箕帚於翁子左右者有年矣每念飢寒勤苦時節見翁子之志何嘗不言通達後以匡國致君為已任以安民濟物為心期而吾不幸離翁子左右者亦有年矣翁子果通達矣天子疏爵以命之衣錦以晝之斯亦極矣而向所言者蔑然無聞豈四方無事使之然耶豈急於富貴未暇度者耶以吾觀之矜於一婦人則可矣其他未之見也又安可食其食乃閉氣而死舞鏡之禽墮洲之翠南方之所珍也而工簪珥者以為容雖犀象之遠金玉之貴必以間之及舉宮而飾傾都而市金玉犀象之不暇給而二羽之用曾不銖兩焉蓋以羽之輕而金玉犀象之重苟發其顏色則可而較其進則不可也所悲者舞鏡之時墮洲之日爾善不能自善人善之然後為善惡不能自惡人惡之然後為惡善惡之成蓋視其所適而已用其正也則君子用其不正也則小人君子小人寧有面貌哉比干之生也與人無異費無極之生也亦與人無異比干之言為諫諍無極之言為毀佞彼所出者皆言也比干之言非不善也以不用故善不能自善無極之言非不惡也以可入故惡得而為惡譬剛徑之於朽蠧也剛徑者以不得地而屈折朽蠧者幸蟠癭而入焉其不可任也如是世言秦鹿去而天下逐是鹿為聖人器也信焉夫周德東耗秦以力取諸侯雖百姓欲從而秦未嘗有意故為秦者反天下之歸則五十年曠其數以逐人而秦不得與其下復焉謂逐其鹿鹿不在聖人器而逐之者逐秦耳秦實鹿焉六都傾潰睥睨無已奔徑足踐我黔庶觡利穎抵我詩書彼非鹿而何嗚乎去道與德也獸焉不獨秦漢成帝時綱紐頽先生以書諫天子者再三夫火政雖去而劍履間健者猶數百位尚不能為國家出力以斷佞臣頭復何南昌故吏憤憤於其下得非南昌遠地也尉下僚也苟觸天子網突幸臣牙止於殛一狂人噬一單族而已彼公卿大夫有生殺喜怒之任有朋黨蕃衍之大至於出一言作一事必與妻子謀苟不便其家雖妾人婢子亦攖挽相制而况親戚乎况骨月乎故雖有憂社稷心亦噤而不吐也嗚乎寵祿所以勸功而位大者不語朝廷事是知天下有道則正人在上天下無道則正人在下余讀先生書未嘗不為漢朝公卿恨今南遊復過先生里吁何為道之多也遂碑以弔之吳之建報恩寺也塑一神於門土工與木工互不相可木人欲虛其內窗其外開通七竅以應胸藏俾他日靈聖用神吾工土人以為不可神尚潔也通七竅應胸藏必有塵滓之物點入其中不若吾立塊而瞪不通關竅設無靈何減於吾木人不可遂偶建焉立塊者竟無所聞通竅者至今為人禍福天寶中逆胡用事鑾輿西幸貴妃死於馬嵬驛臣在草野間得本朝書讀未嘗不恨生不得批虜顙以快天子意今復百餘年後右軾邊隴裘莽平遠發人宿憤然明皇帝時天下太平矣卒有寵僭之咎不足之恨者何耶夫水旱兵革天之數也必出聖人之代以其上瀆社稷下困黎民非聖人不足以當其數故堯之水湯之旱而元宗兵革焉石孝忠者生長韓魏間其為人猛悍多力少年時偷雞殺狗殆不可勝計州里甚苦之後折節事李訴為訴前驅其信任與訴家人伍元和中蔡人不歸天子用裴丞相計以丞相征蔡若訴者光顏者重允者皆受丞相指揮明年蔡平天子快之詔刑部韓侍郎撰平蔡碑將所以大丞相功業於蔡州孝忠一旦熟視其文大恚怒因作力推去其碑僅傾陊者再三吏不能止乃執詣節度使悉以聞時章武皇帝方以東北事倚諸將聞是卒心甚訝之命具獄將斃於碑下孝忠度必死也苟虛死則無以明訴功乃偽低畏若不勝按驗吏閔之未知其為人也孝忠伺吏隙用枷尾拉一吏殺之天子聞之怒且使送闕下及至也亦未異其人因召見曰汝推吾碑殺吾吏為何孝忠頓首曰臣一死未足以塞責但得面天子顏則赤族無恨矣臣事李訴嵗久以賤故給事無不聞見平蔡之日臣從在軍前且吳秀琳蔡之姦賊也而訴降之李祐蔡之驍將也而訴擒之蔡之爪牙脫落於是矣及元濟縛雖丞相與二三輩不能先知也蔡平之後刻石紀功盡歸乎丞相而訴第具名與光顏重允齒訴固無所言矣設不幸更有一淮西其將略如訴者復肯為陛下用乎賞不當功罰不當罪非陛下所以勸人也臣所以推去碑者不惟明訴之績亦將為陛下正賞罰之源臣不推碑無以為吏擒臣不殺吏無以見陛下臣死不容時矣請就刑憲宗既得淮西本末且多其義遂赦之因命曰烈士復召翰林段學士撰淮西碑一如孝忠語後孝忠隸江陵軍驅使大中末白丞相鎮江陵余求謁丞相府有從事為余道孝忠事遂次焉將所以教為人下太和中張谷納邯鄲人李嚴女備歌舞具及長大妍麗豐足殆不似下賤物又能傳故都聲有時涼曉哀轉歷歷見趙家之遺臺老樹雖驚離弔往之懷似不能多也雅為谷所愛因目曰新聲及劉從諫得父封谷以窮遊佐其事新聲亦從去然性本便惠雖谷之起居謀慮皆豫有承迎故頗聞中外消息時從諫得志後勾聚亡命以窺脅朝廷大為四方人怪訝有實其事於谷者谷不以介意新聲曰妾於公直巾屨間狎玩者耳除歌酒外不當以應顧命然食人之食憂人之憂理之常也况妾乎前日天子授從諫節度使時非從諫有戰野之功拔城之績蓋以其先父挈齊還我去就間未能奪其嗣耳而公不幸為其屬則牽制之道在此不在彼也自劉氏奄有全趙更改嵗時未嘗聞以一縷一蹄為天子壽而指使輩率無賴人也且章武朝數鎮顛覆皆以雄才傑器尚不能固天子恩况從諫擢自兒女子手中一旦襲荷家業苟不以法而得亦宜以不法而終此倚伏之常數也而又卒伍佻險言語不祥是不為齊鬼所酬而死於帳下者幸矣孰謂公從其事反不知其事者哉如不能早折其肘臂以作天子計則宜脫族西去大丈夫勿顧一飯恩以骨肉腥健兒衣食言訖悲涕流落谷不決者三月新聲復進以其業不用也縊殺之會昌中從諫死以其子露父意族之谷竟從逆嗚乎謀及婦人者必亡而新聲之言惜其不用余前過太行時有傳吏能道當時事因拾以編簡巖巖而高者嚴子之釣臺也寥寥而不歸者光武之故人也故人之道何如睨蒼苔以言之尊莫尊於天子賤莫賤於布衣龍飛蛇蟄兮風雨相遺干戈載靡兮悠悠夢思何富貴不易節而窮達無所欺故得脫邯鄲之難破犀象之師造二百年之業繼三尺劍之基者其唯有始有卒者乎今之世風俗偷薄祿位相尚朝為一旅人暮為九品官而親戚骨月已有差等矣况故人乎嗚乎往者不可見來者未可期已而已而
