front:
  text: 全唐文欽定全唐文卷六百五十六居易字樂天其先太原人徙下邽貞元十四年進士元和元年制策乙等累轉主客郎中知制誥文宗朝授太子少傅封馮翊縣侯會昌中以刑部尚書致仕大中元年卒年七十六贈右僕射
  hash: sha256:be5492eda1db75b38cbcd4eabde1f8fcbbcdc876c1cfc5a4c9d247edcda4989d
