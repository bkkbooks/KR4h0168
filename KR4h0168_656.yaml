body:
  text: 迸水所集輕荷正敷引脩莖而出葉凝玉液以成珠淨綠田田神龜之巢處斯在虛明皎皎靈鵲之銜來豈殊既羅列其青蓋又昭章於白榆亂點的皪分規青瑩仰虛無以上出掩晶熒而外映灑之不著湛兮逾淨時寄寓於傾欹每因依於平正可止則止必荷之中央在圓而圓得水之本性飇風既息而常凝魚鳥頻衝而不定爾乃一氣晴後初陽照前宿雨霽而猶濕曉露裛而正鮮熠熠有光映空水而煥若纍纍無數遍池塘而炯然宛轉而魚目迴視沖融而蚌胎未堅因霑濡而小大隨散合以虧全輕彩蕩淵穠香厭浥明璣而夜月爭光丹粟而晨霞散日其息也與波俱停其動也與風皆急若轉於掌乃是江之珠如凝於盤遂成泉客之泣冰壺捧之而殊倫水鏡沈精而莫及則知氣有相假物有相資惟雨露之畱處當芙蓉之茂時雖賦象而無準必成形而在茲喻於人則寄之生也擬於道則沖而用之自契元珠之妙何求赤水之遺居易常見今之立身從事者有失於動有失於靜斯由動靜俱不得其時與理也因述其所以然用自儆遵命曰動靜交相養賦云天地有常道萬物有常性道不可以終靜濟之以動性不可以終動濟之以靜養之則兩全而交利不養則兩傷而交病故聖人取諸震以發身受諸復而知命所以莊子曰智養恬易曰蒙養正者也吾觀天文其中有程日明則月晦日晦則月明明晦交養晝夜乃成吾觀歲功其中有信陽進則陰退陽退則陰進進退交養寒暑乃順且躁者本於靜也斯則躁為民靜為君以民養君教化之根則動養靜之道斯存且有者生於無也斯則無為母有為子以母養子生成之理則靜養動之理明矣所以動之為用在氣為春在鳥為飛在舟為楫在弩為機不有動也靜將疇依所以靜之為用在蟲為蟄在水為止在門為鍵在輪為柅不有靜也動奚資始則知動兮靜所伏靜兮動所倚吾何以知交養之然哉以此有以見人之生於世出處相濟必有時而行非匏瓜不可以長繫人之善其身枉直相循必有時而屈故尺蠖不可以長伸嗟夫今之人知動之可以成功不知非其時動亦為凶知靜之可以立德不知非其理靜亦為賊大矣哉動靜之際聖人其難之先之則過時後之則不及時交養之間不容毫釐故老氏觀妙顏氏知幾噫非二君子吾誰與歸右丞相高公之掌貢舉也予以鄉貢進士舉及第左丞相鄭公之領選部也予以書判拔萃選登科十九年天子並命二公對掌鈞軸朝野無事人物甚安明年春予為校書郎始徙家秦中卜居於渭上上樂時和歲稔萬物得其宜下樂名遂官閒一身得其所既美二公佐清靜之理又荷二公垂特達之恩發於嗟歎流為詠歌予時汎舟於渭因為汎渭賦以導其意詞曰亭亭華山下有人跂兮望兮愛彼三峯之白雲汎汎渭水上有舟沿兮泝兮愛彼百里之清流以我為太平之人兮得於斯而優遊又感陽春之氣熙熙兮樂天和而不憂曰予生之幸兮時哉時哉當皇唐受命之九葉兮夷與華而無氛埃及帝纘位之二紀兮命高與鄭為鹽梅二賢兮爰立四門兮大開凡讀儒書與履儒行者率充賦而西來雖片藝而必收兮故不棄予之小才感再遇於知己心慚怍而徘徊登予名於太常兮署予職於蘭臺臺有蘭兮閣有芸芳菲菲兮其可襲備一官而無事又不維而不縶家去省兮百里每三旬而兩入川有渭兮山有華澹悠悠其可賞目白雲兮潄清流其或偃而或仰門去渭兮百步常一日而三往夜分兮扣舷天無雲兮水無煙遲遲兮明月波澹灔兮棹夤緣日暮兮舟泊草萋萋兮沙漠漠習習兮春風岸柳動兮渚花落發浩歌以長引舉濁醪而緩酌春冉冉兮其將盡予何為乎不樂鳥樂兮雲際鳴嚶嚶兮飛裔裔魚樂兮泉底鬐撥撥兮尾潎潎我樂兮聖代心融融兮神泄泄伊萬物各得其樂者由聖賢之相契賢致聖於無為聖致賢於既濟凝為和兮聚五福發為春兮消六沴不我後兮不我先適當我兮生之世彼鱗蟲兮與羽族咸知樂而不知惠我為人兮最靈所以媿賢相而荷聖帝樂乎樂乎汎於渭兮詠而歸聊逍遙以卒歲貞元十五年春吾兄吏於浮梁分微祿以歸養命予負米而還鄉出郊野兮愁予夫何道路之茫茫茫茫兮二千五百里自鄱陽而歸洛陽朝濟乎大江暮登乎高崗山險歧兮路屈曲甚孟門與太行楓林鬱其百尋涵瘴煙之蒼蒼其中闃其無人唯鷓鴣之飛翔水有含沙之毒蟲山有當路之虎狼况乎雲雷作而風雨晦忽雨奄靄兮不見日陽涉泥濘兮僕夫重膇陟崔嵬兮征馬元黃步一步兮不可進獨中路兮徬徨噫昔我往兮春草始芳今我來兮秋風其涼獨行踽踽兮惜晝短孤宿㷀㷀兮愁夜長况太夫人抱疾而在堂自我行役諒夙夜而憂傷惟母念子之心心可測而可量雖割慈而不言終蘊結於中腸曰有弟兮侍左右固就養而無方雖溫凊之靡闕詎當我之在傍無羽翼以輕舉羨歸雲之飛揚惟晝夜與寢食之心曷其弭忘投山館以寓宿夜綿綿而未央獨展轉而不寐候東方之晨光雖則驅征車而遵歸路猶自流鄉淚之浪浪聖人弦木為弧剡木為矢惟弧矢之用也中正鵠而已矣是謂武之經禮之紀故王者務以選諸侯諸侯用而貢多士將俾乎禮無秕稗位有降殺廣場闢而堵墻開射夫同而鐘鼓誡於以致國用充歲貢使技癢者出於㣥藝成者推於眾在乎矢不虛發弓不再控射繹志也信念茲而在茲鵠小鳥焉取難中而能中乃設五正張三侯叶吉日於清晝順殺氣於素秋禮事展樂容修既五善而斯備將百中而是求於是誠心內蘊莊容外奮升降揖讓合君子之令儀進退周旋伸先王之彞訓故禮舉而義得且無聲而有聞及夫觀者坌入射者挺立矢既挾弓既執抗大侯佽決拾指正則掌內必取料鵠乃彀中所及雕弧乍滿當晝而明月彎彎銀鏑急飛不夜而流星熠熠其一發也騞若徹札其再中也如貫笠玉霜降而弓力調金風勁而弦聲急愜㣥心而踴躍駭眾目而翕習若然者安知不能空彎而雁驚虛引而猿泣者也矧乃正其色溫如栗如游於藝匪疾匪徐妙能曲盡勇可賈餘豈不以志正形直心莊體舒不出範兮信得禮之大者無失鵠也豈反身而求諸斯蓋弓矢合規容止有儀必氣盈而神王寧心讋而力疲則知善射者在乎合禮合樂不必乎飲羽在乎和容和志不必乎主皮夫如是則射之禮射之義雖百世而可知噫下自人上達君德以慎立而性由習分習則生常將俾夫善惡區別慎之在始必辨乎是非糾紛原夫性相近者豈不以有教無類其歸於一揆習相遠者豈不以殊途異致乃差於千里昬明波注導為愚智之源邪正歧分開成理亂之軌安得不稽其本謀其始觀所恒察所以考成敗而取捨審臧否而行止俾流遁者返迷途於騷人積習者遵要道於君子且夫德莫德於老氏乃曰道是從矣聖莫聖於宣尼亦曰非生知之則知德在修身將見素而抱樸聖由志學必切問而近思在乎積藝業於黍累慎言行於毫釐故得其門志彌篤兮性彌近矣由其徑習愈精兮道愈遠而其旨可顯其義可舉勿謂習之近徇迹而相背重阻勿謂性之遠反真而相去幾許亦猶一源派別隨渾澄而或濁或清一氣脈分任吹煦而為寒為暑是以君子稽古於時習之初辨惑於成性之所然則性者中之和習者外之徇中和思於馴致外徇戒於妄進非所習而習則性傷得所習而習則性順故聖與狂由乎念與罔念福與禍在乎慎與不慎慎之義莫匪乎率道為本見善而遷觀誠偽於既往審進退於未然故得之則至性大同若水濟水也失之則眾心不等猶面隔面焉誠哉性習之說吾將以為教先至乎哉元珠之為物也淵淵帛丿糸帛丿糸不知其然存乎視聽之表生乎天地之先其中有象與道相全求之者刳其心俾損之又損得之者反其性乃元之又元元無音聽之則希珠無體搏之則微故以音而求者妄以體而得者非倏爾去焉將窅冥而齊往忽乎來矣與罔象而同歸是以聖人之求元珠也損明聖薄仁義索之惟艱失之孔易將在乎以心忘心以智去智其難得也劇乎剖巨蚌之胎其難求也甚乎伺驪龍之睡夫惟不皦不昧至明至幽將致之於馴致豈求之於躁求性失則遺若合浦之徙去心虛潛至同夜光之暗投斯乃動為道樞靜為心符至光不耀至真不渝察之無形謂其有而非有應之有信謂其無而非無故立喻比夫至寶強名謂之元珠名不徒爾喻必有以以不凝滯為圓以不炫耀為美蓋外明者不若內明之理純白者不若虛白之旨藏於身不藏於川在乎心不在乎水然則外其心頤其神韜其光保其真雖無脛求之必臻勞其智役其識肆其志徇其惑雖沒齒求之不得則知真宗奧秘妙本冥默珠者無形之形元者無色之色亦何必遊赤水之上造崑邱之側苟悟漆園之言可臻元珠之極高皇帝將欲戡時難撥禍亂乃耀聖武奮英斷提神劍於手中斬靈蛇於澤畔何精誠之潛發信天地之幽贊卒能滅強楚降暴秦創王業於炎漢於時瓜剖區宇蜂起英豪以堅甲利兵相視以壯圖銳氣相高皆欲定四海之洶洶救萬姓之嗷嗷帝既心闚咸陽氣王芒碭率卒晨發縱徒夜亡有大蛇兮出山穴亘路傍凝白虹之精彩被素龍之文章鱗甲皚以雪色睛眸赩其電光聳其身形蜿蜿而莫犯舉其首勢矯矯而靡亢勇夫聞之而挫銳壯士覩之而摧剛於是從者告於高皇高皇乃奮布衣挺干將攘臂直進瞋目高驤一呼而猛氣咆哮再叱而雄姿抑揚觀其將斬未斬之際蛇方欲縱毒螫肆猛噬我則審其計度其勢口譟雷霆手操鋒銳凜龍顏而色作振虎威而聲厲荷天之靈啟神之契舉刃一揮溘然而斃不知我者謂我斬白蛇知我者謂我斬白帝於是灑雨血摧霜鱗塗野草濺路塵嗟乎神化將窮不能保其命首尾雖在不能衞其身盛矣哉聖人之草昧經綸應乎天順乎人制勍敵必示以乃武乃文靜災禍不可以弗躬弗親若夫龍泉黯黯秋水湛湛苟非斯劍蛇不可斬天威煌煌神武洸洸苟非我王蛇不可當是知人在威不在眾我王也萬夫之防器在利不在大斯劍也三尺之長於以讋萬物於以威八方歷數既終聞素靈之夜哭嗜欲將至知赤帝之道昌由是氣吞豪傑威震幽遐素車降而三秦歸德朱旗建而六合為家彼戮鯨鯢與截犀兕未若我提青蛇而斬白蛇巧之小者有為可得而闚巧之大者無迹不可得而知蓋取之於巽受之以隨動而有度舉必合規故曰大巧若拙其義在斯爾乃掄材於山木審器於軌物將務乎心匠之忖度不在乎手澤之翦拂故為棟者資其自天之端為輪者取其因地之屈其公也於物無情其正也依法有程既游藝而功立亦居肆而事成大小存乎目擊材無所棄取舍資乎指顧物莫能爭然後任道宏用隨形制器信無為而為因所利而利不凝滯於物必簡易於事豈朝疲而暮倦庶日省而月試知大巧之有成見庶物之無棄然則比其義取其類亦猶善從政者物得其宜能官人者才適其位嘉其尺度有則繩墨無撓工非剞劂自得不矜之能器靡雕鎪誰識無心之巧眾謂之拙以其因物不改我為之巧以其成功不宰不改故物全不宰故功倍遇以神也郢人之術攸同合乎道焉老氏之言斯在噫舟車器異杞梓材殊罔枉枘以鑿罔破圓為觚必將考廣狹以分寸審刓方以規模則物不能以長短隱材不能以曲直誣是謂心之術也豈慮手之傷乎且夫大盈若沖大明若蒙是以大巧棄其末工則知巧在乎不違天真非勞形於木人之內巧在乎無枉物情非役神於棘刺之中若然者豈徒與班倕之輩騁技而校功哉足之健兮有雞足毛之勁兮有兔毛就足之中奮發者利距在毛之內秀出者長毫合為乎筆正得其要象彼足距曲盡其妙圓而直始造意於蒙恬利而銛終騁能於逸少始則創因智士製在良工拔毫為鋒截竹為筒視其端若武安君之頭銳窺其管如元元氏之心空豈不以中山之明視勁而迅汝陰之翰音勇而雄一毛不成採眾毫於三穴之內四者可棄取銳武於五德之中雙美是合兩揆相同故不得兔毫無以成起草之用不名雞距無以表入木之功及夫親手澤隨指顧秉以律動有度染松煙之墨灑鵞毛之素莫不畫為屈鐵點成垂露若用之交戰則摧敵而先鳴若用之草聖則擅場而獨步察所以稽其故雖云任物以用長亦在假名而善喻向使但隨物棄不與人遇則距畜縮於晨雞毫摧殘於寒免又安得取名於彼移用在茲映赤筦狀紺趾乍舉對紅箋疑錦臆初披輟翰停毫既象乎翹足就棲之夕揮芒拂銳又似乎奮拳引鬬之時苟名實之相副信動靜而似之其用不困其美無儔因草為號者質陋折蒲而書者體柔彼皆瑣細此實殊尤是以搦之而變成金距書之而化作銀鈎夫然則董狐操可以修為良史宣尼握可以刪定春秋其不象雞之羽者鄙其輕薄不取雞之冠者惡其軟弱斯距也如劍如㦸可繫可縛將壯我之毫芒必假爾之鋒鍔遂使見之者書狂發秉之者筆力作挫萬物而人文成草入行而鳥迹落縹囊或處類藏錐之沈潛團扇或書同舞鏡之揮霍儒有學書臨水負笈登山含毫既至握管未還過兔園而易感望雞樹以難攀願爭雄於爪趾之下冀得雋於筆硯之間龍為四靈之長渭居八水之一飲亹亹之清流落彬彬之元質忽兮下降賁然躍出首蜿蜒以涌煙鱗錯落而點漆動而無悔爰作瑞於秦川應必有徵乃效靈於漢日觀其攸止察其所為行藏不忒動靜有儀睛眸炫耀文彩陸離躍於泉於焉表異守其黑所以標奇或隱或見時行時止順冬夏而無乖應昏明而有以於是稽大易按前史叶聖人之昌運飛而在天表王者之休徵下而飲水爾乃降長川俯高岸氣默默以黯黯光燦燦而爛爛聞之者心駭而屏息覩之者目月血而改觀一呼一吸而聲起風雷或躍或騰而勢超雲漢覩夫莫智匪常莫黑至祥契昌期於南面合正色於北方拖尾迴翔擘波騰驤飲清瀾之浩浩動素浪之湯湯頓頷而碎珠迸落奮髯而細雨飛揚警水府兮鱣鮪奔走駭泉室兮蛟鼉伏藏元雲從而淺深一色白日照而左右交光且彼候時出處憑虛上下度弱水而斯馭去鼎湖而是駕聞茂先之劍飛是長房之杖化豈若此炎精冥契水德潛稟元甲黯以凝黛文章斐兮摛錦逼而察也類天馬出水而遊遠而望之疑晴虹截澗而飲已而負蒼天去清渭排冥冥之寥廓反浩浩之元氣則知水物之靈鱗蟲之貴盛矣哉抑斯龍之所謂鼓者工所制諫者君所命鼓因諫設發為治世之音諫以鼓來懸作經邦之柄納其臣於忠直致其君於明聖將使內外必聞上下交正於是乎唐堯得以為盛治者也至矣哉君至公而滅私臣有犯而無欺諷諫者於焉盡節獻納者由是正辭言之者無罪擊之者有時故謇謇匪躬道之行也鼘鼘不已聲以發之始也土鼓增華蕢桴改造外揚音以應物中含虛而體道不窕不摦由巧者之作為大鳴小鳴隨直臣之擊考有若坎其缶於宛邱之下又如殷其雷在南山之隈音鏗鏘以鏜鞳響容與以徘徊儆於帝心四聰之耳必達納諸人聽七諍之臣乃來故用於朝朝無面從之患行於國國無居下之訕洋洋盈耳幽贊逆耳之言坎坎動心明啟沃心之諫且夫鼓之為用也或備於樂懸或施於戎政以諧八音節奏以明三軍號令未若備察朝闕發揮廷諍聲聞於外以彰我主聖臣良道在其中以表我上忠下敬然則義之與比德必有鄰將善旌而並建與謗木而俱陳是以聞其聲則知有獻替之士聆其響不獨思將帥之臣嗟乎舍之則聲寢用之則氣振雖聲氣之在鼓終用舍之由人君子哉道本生知德由天縱抱乎不器之器成乎有用之用不器者通理而黃中有用者致遠而任重蓋由識包權變理蘊通明業非學致器異琢成審其時有道舒而無道卷慎其德舍之藏而用之行語其小能立誠以修詞論其大能救物而濟時以之理心則一身獨善以之從政則庶績咸熙既居家而必達亦在邦而允釐彼子貢雖賢唯稱瑚璉之器彥輔信美空標水鏡之姿是謂非求備者有何足以多之豈如我順乎通塞合乎語默何用不臧何嚮不克施之乃伊呂事業蓄之則莊老道德雖應物而不滯終飭躬而有則若止水之在器因器方圓如良工之用材隨材曲直原夫根純精於妙有完元和於虛受內宏道而惟新外濟用而可久鄙斗筲之奚算哂挈瓶之固守何器量之差殊在性情之能不豈不以神為元樞智為心符全其神則為而勿有虛其心則用當其無故動與時合靜與道俱時或用之必開臧武之智道不行也則守寗子之愚至乎哉冥心在我無可而無不可應用不疲無為而無不為信大成而大受非小慧而小知故庶類曲從則輪轅適用若一隅偏執則鑿枘難施是以易尚隨時禮貴從宜展矣君子斯焉取斯賦者古詩之流也始草創於荀宋漸恢張於賈馬冰生乎水初變本於典墳青出於藍復增華於風雅而後諧四聲祛八病信斯文之美者我國家恐文道寖衰頌聲陵遲乃舉多士命有司酌遺風於三代明變雅於一時全取其名則號之為賦雜用其體亦不出乎詩四始盡在六義無遺是謂藝文之儆策述作之元龜觀夫義類錯綜詞采舒布文諧宮律言中章句華而不艷美而有度雅音瀏亮必先體物以成章逸思飄颻不獨登高而能賦其工者究筆精窮旨趣何慚兩京於班固其妙者抽秘思騁妍詞豈謝三都於左思掩黃絹之麗藻吐白鳳之奇姿振金聲於寰海增紙價於京師則長楊羽獵之徒胡為比也景福靈光之作未足多之所謂立意為先能文為主炳如繪素鏗若鐘鼓郁郁哉溢目之黼黻洋洋乎盈耳之韶武信可以凌轢風騷超軼今古者也今吾君網羅六藝淘汰九流微才無忽片善是求况賦者雅之列頌之儔可以潤色鴻業可以發揮皇猷客有自謂握靈虵之珠者豈可棄之而不收金商應律玉斗西建嘉旬雨之時晴叶秋成而適願是用步閭里詢黎獻皇風演溢歌且聽於昇平聖澤汪洋誦不聞於胥怨爾乃命親懿會朋執賦邙山眺洛邑天泬寥而雲靜氣肅殺而風急三川浩浩以奔流雙闕峨峨而屹立飛梁徑度訝殘虹之未消翠瓦光凝驚宿雨之猶濕嘉三時之是務觀五穀之斯入覽滌場之在勤知滯穗之見拾及夫日色黯黯寒光熒熒遠水澄碧㣥山結青山水隱映花氣氳冥瞻上陽之宮闕兮勝仙家之福庭望中嶽之林嶺兮似天台之翠屏宜其迴鑾輿兮檢玉牒朝千官兮御百靈使西賓之誇少弭東人之思攸寧不亦盛哉客有感陽舒詠樂只揮毫翰獨徙倚願得采於芻蕘終期拾乎青紫稷嗣君上稽天命下察人聽以為作樂者存乎功成制禮者本乎理定故易尚隨時禮貴從宜於以致理何莫由斯允矣君子休哉令規採三代之帝典起兩漢之朝儀於斯時也秦吞六雄之後漢承百王之弊禮壞樂崩上陵下替將欲創洪業尊皇帝馴致王道丕革季世莫先乎正位以經邦體元而立制者也夫其將用於國先習於野辨度數於聲名文物審等威於君臣上下儒生肅以濟濟物有其容國典煥其煌煌禮無違者然後闢雙闕會百僚動必嚴恪進無諠囂長幼之序不忒貴賤之儀孔昭鏘鏘兮若萬國赴塗山而會秩秩兮如百官仰太一而朝歲十月天地澄爽宮殿清曠風傳警蹕日麗天仗於是右陳列辟左立丞相東西分而則別文武儼以相向簪裾奕奕頌鵷鷺之具寮劍㦸森森列熊羆之名將帝容式展皇威克壯莫不上恭己以臨下下竭誠而奉上觀其威儀允淑容止具篤天子負鳳扆以皇皇正龍顏而穆穆百辟欣戴九賓悅服拔劍者懲懼而慄慄飲酒者敬慎而肅肅故知君有威故能守其邦臣有儀所以保其祿帝謂叔孫舊章斯存可以發揮我洪德啟迪我後昆方將守而經國豈止煥而盈門不然何以表一人之貴知萬乘之尊乾清而四時行坤寧而萬物生聖人則之無為而無不為神唐御宇之九葉皇帝握符之五載夷夏咸寧君臣交欣有詔始以二月上巳日為中和節自上而下雷解風動翌日而頒乎四嶽浹辰而達乎八荒於戲中和之時義遠矣哉惟唐之興我神堯子兆人而基皇德太宗家六合而開帝功元宗執象而薰仁壽之風代宗垂拱而阜富庶之俗舄弈乎赫赫煌煌八聖重光以至於我皇我皇運元樞陶淳精治定而化成嗣皇極於穆清納黔首於升平於時數惟上元歲惟仲春皇帝穆然居青陽太廟命有司考時令以為安萌芽養幼少緩刑獄布慶賜蓋百王常行之道未足以啟迪天地之化發揮祖宗之德乃命初吉肇為中和中者揆三陽之中和者酌二氣之和其為稱也大矣非至聖疇能建之於是謀始要終循義討源於以九八節而七六氣排重陽而拉上巳煦元氣於厚壞則幽蟄蘇而勾萌達噫和風於窮荒則桀驁化而獷俗淳垂萬祀以攄無窮被四表以示大同於時兩儀三辰貞明絪縕千品萬彙熙熙忻忻繇是文武百辟僉拜手稽首而颺言曰大哉睿德合於元造又曰昔在唐堯敬授人時垂於典謨降及周文在鎬飲酒列於雅頌斯蓋欽若四序愷樂一方而已未若肇建令節混同天下澤鋪動植慶浹華夷若斯之盛歟蓋聖人之作事必導達交泰幽贊亭毒與元化合其運與真宰同其功丕休哉其至矣賤臣易忝濡文明之化就賓貢之列輒敢美盛德頌成功獻中和頌一章附於唐雅之末頌曰權輿胚渾元黃既分煦嫗絪縕肇生蒸民天命聖神是為大人大人淳淳為天下君巍巍我唐穆穆我皇纂承九葉照臨八方四維載張兩曜重光齷齪唐虞走彔走足羲皇乘時有作煥乎文章乃建貞元以正乾坤乃紀吉辰以殷仲春吉辰伊何號為中和和維大和中維大中以暢中氣以播和風萌芽昆蟲昭蘇有融如斡元化如運神功於戲德洽道豐萬邦來同微臣作頌垂裕無窮
