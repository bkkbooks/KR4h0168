front:
  text: 全唐文欽定全唐文卷五百九權德輿二十七
  hash: sha256:aa57475079b0e48897bf8c804b8d57d7814c9c9fcac178698c3d4baa68131654
body:
  text: 維貞元十一年歲次乙亥十月朔日姪女壻起居舍人知制誥權某謹以清酌庶羞之奠敬祭於故洪州建昌縣丞崔六伯之靈伏惟北州茂族中庸令人行有枝葉道無緇磷居常葆和動不違仁素履坦坦閨門申申子真恬退張仲孝友淡而不厭晦而能久亦既再命皆以退聞天爵之外視如浮雲謝病郊園深辭世紛徑多芝朮家有典墳心遊杳冥手植芬氳行樂春晚開襟日曛謬忝嘉姻獲奉深分曩時上策旅食江郡一葦可航百里而近長筵式宴虛室清論少長無違琴觴迭進仰名教之可樂見義方之善訓暇日則多窮年無悶不耗天理同乎大順頃服朝命言旋帝鄉盡室出祖至於朱方離居未幾四換炎涼凶訃忽來哀何可忘山川阻遠情禮未展犯塗潦以無由想音徽而在眼敬薑知禮鯉也聞詩昔著婦行今推母儀婉彼令姪承哀涕洟遠切諸孤之痛難追世父之慈有生必化從古同轍元酒清滌用申永訣寄懷斯文於彼臨穴維貞元十四年歲次戊寅八月戊寅朔十日丁亥右諫議大夫裴佶中書舍人翰林學士吳通微中書舍人高郢尚書司勳郎中知制誥權某尚書司勳員外郎知制誥翰林學士鄭絪起居郎韋丹左補闕翰林學士衛次公右補闕王紓右拾遺史館修撰蔣武等謹以清酌庶羞之奠敬祭於故給事中贈禮部尚書徐公之靈太伯延陵化於東吳遺風禮讓乃有名儒懿懿夫君文誼是圖早歲清名輝動江湖遐覽古音琢磨無斁以五常為師味六學之賾始以處士交馳府辟乃考祕文諸生表的周畿結綬吏隱方適三命登朝禮文損益既肄業以綿蕝亦説經而重席踐履中臺翻飛左掖含章載筆侍講通籍循性不遷虛中靜專駁議清禁於茲八年同官為僚惠好歡然瑣圍密近蘭室周旋分曹直夜接武朝天會清機於妙理每捨筏以忘筌如何移疾亦既旬日謂勿藥之有喜俄交臂而相失死生同途力命難俱焜耀終始恩深禮殊榮春官於夜壑振簫鼓於塗芻平昔談笑倏然虛無含悽寄詞絮酒焚枯願執紼以莫尋奠靈筵而涕濡尚饗維貞元十五年歲次己卯十二月庚午朔二十六日乙未右諫議大夫裴佶給事中許孟容李元素陳元中書舍人高郢權德輿兵部員外郎知制誥崔邠等謹以清酌庶羞之奠敬祭於故吏部侍郎贈禮部尚書奚公之靈竹箭有筠黃裳有文惟公實然早播清芬射策筮仕鬱然令聞翻飛迅飇凌厲層雲乃踐清近時登傑俊選當視草中亦難進南宮西掖砥礪鋩刃奏議練於程品贊書稽乎典訓二職司寇時惟欽慎獄有煩言訟公即訊惟直是從礭然蹈中雖申申以詈豫終蹇蹇而匪躬五歲啓事九流承風寬以有制峻而能通宜躋大年以至宗公絶足方騁修途忽窮佶等或早陪交好或嘗接官命懷鮑叔之深知仰晏嬰之久敬里第方葺蘭萱滿徑平日徽音未移視聽乃者寢疾猶期善慶孰謂旬時奄然大病上軫宸衷榮加飾終題劒告第恩殊禮崇吁嗟祖載去此昭代儼丹旐以就途紛素車而來會晤言如在神鑒豈昧何以泄哀寄茲一酹尚饗維貞元十六年歲次庚辰四月己巳朔越八日景子從表弟朝議郎守中書舍人雲騎尉賜緋魚袋權德輿謹遣使以清酌時羞之奠敬祭於故華州刺史御史大夫盧六兄之靈詩謂君子溫其如玉書稱正人既富方穀明靈比德清議所屬未極全才如何不淑追憶曩歲鍾陵嘉招兄時左遷屈佐乘軺幕庭山郭並榻連鑣心同則親敢曰嘗寮俄奏郡課復升郎位左掖斯密教官已貴殘骸被病土梗蓬纍謝交辟以未能方屏居以自遂拔茅推轂遐蹈古義七發粲然八行狎至詔下江干猥登禮官顧蓬茨之鮿生忽束帶於朝端暇日良夜清言舊歡再披雲霧永契金蘭帝念長人出臨左輔河潼襟要復此居部乃亞丞相金龜映組美利休聲和風甘雨弱植何幸纍叨禁垣諫曹右史以至司言因緣踐履根本推援恐纍知人上負明恩一違晤語九變涼溫日夕音徽切劘討論發函亹亹如見君子或忠言以規過亦善謔而溢美冀登柄用以永介祉每驤首於公朝期盍簪於仁里俄驚感疾方俟有喜志切乞身恩深臥理神道與善胡然不起寢門一哀孰甚知己素車莫遂雪涕何已樽酒簋二深誠在此尚饗維貞元十七年歲次辛巳十一月已未朔十日戊辰姪女壻朝議郎守中書舍人賜緋魚袋權某謹以清酌庶羞之奠敬祭於故房州崔十一叔之靈荊藍之下必産貞玉有斐君子生於茂族信以發志居惟慎獨時然後言言必可復昔未弱冠皎然清規已結黃綬分曹帝畿亦宰一同邑人熙熙有翹者車辟禮交馳乃簪神羊在壽之陽俄佩赤紱贊於熊相尋副戎車再遷直指守臣進律公亦戾止著作中祕古之外史章奏文昌虞衡允理吏二千石風化攸興朱轓赤帷來惠房陵饋軍禦寇徵令重仍恭敬不諼秉持有恆六年刺舉千里清澄凡此下人時公之能昔惟覯止倏焉二紀道信部以交歡寓揚都而宴喜衮衮清義怡怡致美亦既納徵願言未幾悼子咸以作賦感東武而成誄繫援凋落惟公是已方歎分符又悲閔水昔年委質於汴之東從事則異嘉招實同頃忝右掖獲辭南宮或方駕於辨色或開襟於退公華燭以熺芳樽不同乍詠庭中之雪每歡林下之風千騎雖遠雙魚屢通永懷休沐若去池籠顧此室內二年沈痗方書藥石纖悉誡誨精微析理款曲深愛迎門發函俯仰是佩幸積恙之小間冀異時之良會如何奄忽永謝昭代哀以慈結情逾禮外對茲悽酸心骨如碎中饋仁賢諸孤斬然充窮即遠誠信歸全萬事如昨音容冥漠薤晞朝露舟失夜壑鮮原喬木遵彼東洛若堂若坊先子所託目想如在心懷可作神其格思歆此單酌尚饗維貞元十九年歲次癸未十月戊寅朔十二日已丑中書舍人楊於陵禮部侍郎權德輿謹以清酌庶羞之奠敬祭於故戶部侍郎贈右散騎常侍崔君之靈古之大觀推理以達謂生為勞於化不怛苟非至人哀樂云云一欣一戚松茂芝焚遐想深契在於夫君素履無玷黃中有文卓爾堅明皎然貞醇夙以聲實邁於㣥倫伊昔宦遊風塵不雜聯簪法冠並列賓榻夷道可久淡交相合亦既府除索然離居或憩循江或旋練湖君初卷懷寓彼㣥舒三四年間聯奉詔書分曹士師議禮太一作大子中臺奏議並列哀烏道舊放懷話言于于三登首曹乃二司徒相顧飛翻接影天衢顯允德業大僚是都凡我四人交歡靡渝直諒是程中庸是經或會公朝猶疑幕庭孰謂夫子奄然冥冥交臂相失汍瀾涕零入室噭噭孀孤之聲追懷悼心痛我友生密印左貂以哀以榮嗚呼哀哉命之所賦豈有其數乃如之人洵美無度常日謂我文昌聯步如何今茲已隔泉路亹亹良話依依平素晦明再期冥漠大暮萬事風燭九泉草露魂之來兮歆此薄具尚饗維貞元二十年歲次甲申云云故校書楊君幼樞之靈大玉天球不磨不礱清廟黃目森然禮容先正司徒德與位崇恬然清靜以厚時風幼樞嗣之天授全識日新不怠能世其德亦既弱冠聲猶四塞瓊樹一枝鳳姿五色登名太常藝閣為郎首大府之嘉命專中軍之奏章目成清冥足跋康莊期元成於必復知公業之不亡猥以蒙瑣辱當親婭嘉禮用時歡言卜夜追惟世好交契逾深自為聲譽豈止潘任日聞清機灑我煩襟彼松茂以蘭臭諒二人之同心常謂豫曰居中用晦明道若昧姑務其實姑修其內名浮於行所以賈害直諒之詞迭承規誨清和之月邗溝分袂間茲一水使我心痗曠懷勝理緘封相繼不聞移疾奄此下世泣讀訃書百骸如碎寢門一痛素車來會觀聽未移音容如對如何返真迫此短辰書有遺草弔無雜賓塗芻在御嘉耦方妊護喪晝哭反葬咸秦驗熊羆之吉兆償世祀之悠久儼書籍以具存傳義方於身後嗚呼哀哉或仁而夭或鄙而壽彼蒼者何難以理究顏生短命叔寶多病奈何賢達古今不幸大鈞茫茫死生其常痛我幼樞二紀而亡嚴霜夏隕零落貞芳嚮用五福何人則當寫懷寄誠在此一觴哀從中來雪涕浪浪尚饗維貞元二十年歲次甲申十一月戊申朔禮部侍郎權德輿謹以清酌庶羞之奠敬祭於故常州刺史獨孤憲公十四丈之靈嗚呼德充而位不配才大而年不遐稽於賦命從古太息伏惟蘊大雅之愷悌遵六二之直方作為文章律度當世燦如日星炳若龜龍施於政事表率萬國三郡洽和四方鼓舞而不得宏大志業歿於中年豈洪鈞造物使才命相盩先師罕言末如之何伏以夫子篤忘形之契小人展無容之敬去世二紀清風凜然顧以息女歸公愛子雖不獲逮事而備承家法况茲菲薄實忝眷私辨方之年違難於江徼志學之歲伏謁於郡齋典司禮職嘗奉易名之議嚮仰德門今承合姓之重話言誘掖造次敢忘德容碩姿髣佛在目自為聲舉之舊今則潘楊之歡二孤純孝遺烈鍾美鮮原改卜日月有時酒殽靜嘉式薦靈位尚饗維貞元二十年歲次甲申十一月壬戌十六日癸亥禮部侍郎權某云云故大理評事唐君之靈昔與之子江湖覯止伯仲怡怡含章致美麗則拔俗清言會理策名東堂交辟知已始賓岐陽爰佐景通四名安卑虛懷蹈中朝多薦延方俟至公才則有裕命胡不融自展嘉姻才逾半歲索居大半書札相繼北自鄜畤南遵白帝巴峽泝沿風波迢遞反駕京轂遄嬰病癘旬朔之間奄然下世自古哲賢或非大年吁嗟嘉言今亦已焉噭噭孤嗣窮訴彼天舊篋遺草深交絶絃室有才淑含酸晝哭靈轜就路遺允在腹冀協熊羆次昌嗣續波奔塗潦悽悽風燭顧女弟以增欷想斯人之不復白馬素車寒原夏屋奠觴雪涕逆此瞑目尚饗維貞元二十年歲次甲申十一月戊申朔禮部侍郎權德輿謹以清酌庶羞之奠敬祭於故台州刺史獨孤七丈之靈洪範五福古人所貴伏惟道樞德機涵泳交鬯解龜隱几宴息東吳嗇神而去物纍觀化以順天理終始貞吉歸全返真不登期頤者十數歲而已可謂康寧而壽以至考終命宏修政事遵職居部泝沿浙河四為二千石朱轓暢轂所至洽平率誠理身以化封內可謂攸好德其所以異者富於義而遠於利以祿秩賙姻族以清白遺子孫故即遠之日輤裧才具孤嗣藐然以賻布襄事蹈道如是君子以為難介弟憲公挺此文德含章炳然與三代同風先門友善義比金石猶子秀茂申以婚姻引進琢磨居為雅器永懷感悅冀奉話言女子有行得奉門訓竟迫道途之阻未申供養之禮用此歎慟結於中腸轜車東來大斯啓柔嘉清滌用寄單誠尚饗維貞元二十一年歲次乙酉七月戊辰朔四日辛未禮部侍郎權德輿謹遣男璩以清酌庶羞之奠敬祭於故工部侍郎兼御史大夫禮部尚書張二十九丈之靈士君子之所以暢其業者文也學也士君子之所以植其本者正也忠也綽綽工部實由於斯起於逢掖乃執記章明義類振起裦貶博物洽聞時稱良史可不謂文乎誕章成式變禮疑議稽合於古節適於中㣥士屬目一言以決可不謂學乎處燎原盜泉之中不焚不濡終然違難皎潔貞厲狺狺權幸惡厥中立一罹讒鑠遂去清近祕邱十年不得自足可不謂行已之正乎出疆專對照耀原隰天覆之內無遠近君命之下無險夷再叶翟土乃和戎索暢威靈於大荒之外啓手足於野幕之下可不謂事君之忠乎年才逾耳順官止二起部於兄之量二者皆屈彼大耋大僚孰宜之哉頃陪禁掖俄接仁里觴酒歌詩清言善謔靡日而間彌年以歡一瞬之間奄成今古以此思哀如何可忘跌傷左足未任趾步鼓吹臨門涕洟如雨平生風味今日永訣伏枕口占寄懷斯文尚饗維永貞元年歲次乙酉十月景申朔二十三日戊午朝散大夫守尚書戶部侍郎雲騎尉權德輿謹以清酌庶羞之奠敬祭於故司空相國贈太傅魏國賈公之靈覆載之間肖形必化惟令德淑問與天壤俱存伏惟以含一之量叶休嘉之運四征授律勳在盟府二揆居中勤宣宰政注意體國繄公是圖始自黃綬至於元衮率由坦夷以極光大浩若溟海熙如春臺歸全之日朝野相弔窮雕戈金鉉之寵可以言貴過懸車二膳之年可以言壽中和博大之度可以言君子知命順化之理可以言至人三朝告老終不得請法賻弔祠禮加常數鄙薄無似辱公之知獎進切劘逮茲一紀獲居里閈亟踐堂奧拔俗之韻忘年之歡疑在視聽忽成今古嗚呼魏公可勝慟耶潔此觴豆奠於冥漠髣佛風采公其降靈尚饗維元和元年歲次景戌正月景寅朔十九日甲申戶部侍郎權德輿謹以清酌時羞之奠敬祭於故禮部郎中知制誥唐君之靈嗚呼文編行茂才全弱冠知名時推雋賢含章振藻金石在懸緣情放言采組相鮮憶昔淮湖與君覯止忘形合志造適通理瓜步邗溝吳山楚水芝蘭之室三十年矣君自左史進居臺郎豫叨禮官亦忝周行熙春至止休沐相將才盍簪於上國俄出守於遐方盛山雲安風水迢遞屈此二郡俄然半世文章煥發書札相繼辛酸苦言款曲嘉惠顧我忝曠愧君淪滯屢封薦章輒以人廢每與公範交修宿契不進不止中心自誓大君繼明元凱持衡方開宣室以待賈生裁成訓命所謂文柄詔君居之士友相慶遲遲征軒來自荊門凡我同人載勞夢魂屈指繼日俟君西垣不及百里俄歸九原嗚呼文編此痛難言壽堂野土一別終古平昔風姿杳無處所樽酒簋二涕零如雨冥漠之間神其聽否尚饗維元和八年歲次癸巳二月朔日禮部尚書權某云云故京兆府士曹崔君之靈嗚呼相門令嗣被服大義青襟肄業黑衣入侍贊佐征師參榮臺寺職列京掾年才強仕謂登公朝稍進名器層雲未翥迅翼俄墜惟先穆公左官江干一言營道二姓交歡信郡覯止君初丱角揚都會合甫過幼學自至京轂相傳博約永言舊知敢忘先託常曰繫援內惟菲薄缺然深哀猶負前諾力命乖戾英華銷鑠方馳康莊已歎冥漠長女未笄幼男孩提披披靈衣噭噭孀妻緱原大墓祖載東祔瞻言體魄歸此壤樹顧我室人沈痾積年四支半廢雙足不前常痛終鮮况茲歸全氣息才屬形神惙然哭不為位哀不成禮臥牀宛轉如刀集體裧輤曉發銘旌前啓魂無不之歆此牢醴尚饗維元和八年歲次癸巳三月甲寅朔二十八日辛巳禮部尚書權德輿謹以清酌庶羞之奠敬祭於故太保贈太傅岐國公之靈伏惟體溫厚之氣協休和之運五常用仁九德在寬六朝揚歷三后公相契作司徒奭居太保致位遂志晏間顯尊極人倫之壽寵備君上之恩禮傳曰行道有福詩曰求福不回考祥視履惟公是已至若徜徉化元保合太和扶道嘉會將明利澤漸漬於生民而隱於視聽者可勝道哉早辱招辟仕才初命頃沐鴻休職聯大任周旋惠愛三十餘年公府閎議郊居盛集滄溟沃日之量清廟禮神之器四教五福明哲始終話言風采疑在夢想變化糾紛何可勝論常日賓榻今茲靈位常日歡言今茲聲淚常日精爽今茲魂氣常日鳴騶今茲騎吹永去昭代言歸厚地平生一樽拜奠歔欷尚饗維元和十年歲次乙未四月壬寅朔六日丁未外舅太常卿權某敬以清酌時羞之奠致祭於故祕書少監贈絳州刺史獨孤郎之靈噫嘻大鈞生死沄沄壽夭紛綸古人罕言豈造化流形不與其全或一氣滑湣偶然而然嗟我子壻時之令德自誠而明必協於極前殿大對諫垣正色中臺有聲東觀以直訓辭溫雅視草宥密當時之選必居第一玉立皎然古之淵騫抗詞犯顏勇若諸賁立不易方即之也溫道乃前定實安於仁時惟憲公先友是敦既以聲子之舊復茲戴侯之親歡言戾止十五年矣始遇弱冠今才強仕會朝方駕居室同里愛我以德忠言在耳勞績盡瘁疾嬰腠理乞身上言移亞外史謝絶人寰屏居鄠田冀此宴間百疴就痊神理曖昧晦明廠田坴綿勿藥難徵驅車言旋吁嗟風燭糾纆倚伏涉路猶理入門而復親賓怛化里閈行哭如何斯人奄忽不淑物情所望必至宰匠惟君知臣注意寅亮時因劘切然後交鬯動於險中終不委讓徹瑟之辰萬情百身孤孀嗷號所不忍聞念以蒙稚孝思天至禮逾成人哀感異類昔謂福善今疑報施臧孫有後惟此可冀翻翻素旌東指鼎成鮮原夜壑密印芻靈緦衰已除服紀太輕如何此禮不稱豫情薤歌楚挽一往不返哲兄襄事茹痛終鮮送爾冥漠顧豫衰蹇悲哀所鍾賢達未免寓形必化何早何晚雖以懷終不能自遣淚盡彌苦魂交可展奠茲一觴臨訣先遠尚饗維元和十二年歲次丁酉五月庚申朔十三日壬申翁翁婆婆以乳果之奠致祭於九歲孫男法延師之靈爾之敏悟爾之孝愛才至齓齒已能知書倦息猶在於文字嬉遊不離於硯席其姿狀有外祖河南之風懿茲夙成必謂致遠疾瘍所遘醫禱無瘳竟罹夭枉痛切心骨况自二歲三哭殤孫逝者日遠存者無幾吾以衰年多病支體不隨爾父在京不見其絶痛爾槥櫝歸遵畏塗今日哀懷尤倍常理頃者求拔苦海依歸度門故於斂襲率以緇褐今之祖奠靡設羶腥苦痛之深遣割不去臨路長痛嗚呼奈何維貞元十一年歲次乙亥十月朔日子壻起居舍人知制誥權某謹以清酌庶羞之奠敬祭於外姑故河東縣君之靈伏惟承積德之慶稟醇仁之性嬪於盛門播此淑行恭聞幼儀以及結褵居然綢直不待姆師朝尊相府家榮命婦琴瑟和聲珩璜節度執謙處約不改其素專靜是宏紛華靡務四德日滋六姻是宜睦親以誠撫下以慈內則之禮采蘩之詩夙夜無違如春熙熙道備移天哀廠田坴晝哭閨門之訓斷織是勗期於榮養以俟豐祿方慶綵衣遽驚喪服顧惟鄙人辱奉嘉姻十年之間情以理親頃歲違阻遐方食貧殘生未滅慰訓相循俄忝周行來歸帝里驅車遄邁盡室至止舉觴為壽侍坐以齒令節遊娛溫顏燕喜浮生如幻寢疾未幾遽此全歸難徵神理欒欒棘人泣奉塗芻翩翩素旌東指洛都征途在目官局所拘含淒國門拜奠路隅仁愛如昨幽明忽殊托詞寫哀庶達泉壚尚饗維元和三年歲次戊子三月癸未朔二十五日丁未妹壻太中大夫守尚書兵部侍郎上柱國襄武縣開國侯權某云云故校書郎楊君夫人一姊之靈先姊先舅公台積厚德門交輝士女挺秀有儀有耀宜貴宜壽才移所天俄哭於晝遠護帷裳來歸帝鄉灑掃壤樹潔羞蒸嘗之死之誓炯然秋霜二十年間形同未亡乃育孤女是歸良匹亦既有行秀而不實感念難遣哀酸成疾晦明推移變化奄忽昔與幼樞姻聯揚都歲時二紀人事萬殊諒勞生於此世何怛化之同途彼福善與貽慶又不知夫神理之有無顧我好仇永懷伊姊動若形影痛深骨髓芻靈就列送奠停軌觴酒寫哀神其聽此尚饗維元和十二年歲次丁酉六月己未朔十二日庚午外翁婆以清酌庶羞之奠致祭於獨孤氏孫女妹妹之靈吾殘生衰苦殃禍相循四年已來七遘傷悼今日之痛情又倍常以前年再丁齊斬意其孤苦備極或保安全神理謂何又茲夭閼自嬰羸恙雖未痊除而神用精明不減平日昨以晦朔歸奉几筵信宿之間幽明已隔奔告惝恍如狂如癡呼天不聞此痛何極况今冬除禫來歲初笄方擇良對以圖先近豈吾之薄祜有忤神明復爾之稟命不可踰越理遣不去情鍾奈何吾家壤樹宛在伊洛今爾體魄歸祔壽安吾多病薾然義期可見生也死也如環斯循倘冥冥有知冀與爾為泉壤鄉黨瀝酒申訣嗚呼痛深尚饗
