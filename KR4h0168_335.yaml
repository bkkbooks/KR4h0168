front:
  text: 全唐文欽定全唐文卷三百三十五齊融越州人官祕書省正字出為崑山令
  hash: sha256:471d9b812a581677220b8e9eb976f1c8e486dda73b4fdd47f408ea98a49ac2e5
  markers:
  - {type: head, offset: 14, content: 萬齊融, id: KR4h0168_NFKB_335-h1, level: 1}
body:
  text: 國家制禮作樂懸象示人列在京師編諸甲令禮緣失序自可取之於朝樂章不虧何輒列之於野苟希專制豈曰宜言惟彼有州殊非折衷中和樂職不見盛德之容上下判懸無聞達禮之意置之何過州乃飾非不與上聞省以為當我聞語寂滅者本之以不生而菩薩不能去資生立法談逍遙者存之以無待而神人不能亡有待為煩吉闕一字之降帝農教以耒耜蒼靈之下后稷俾其播種故維摩之毗耶稽首持鉢尚詣於香積釋迦之給孤洗足著衣猶乞食於舍衛闕一字知夫食者不獨乎人天農者豈惟夫政本阿育王靈塔寺者晉義熙元年之所置也昔孔雀氏宿童子之因果當金人之授記暨鐵輪位正寶塔功成計鳥道之千里占人寰之一勝夜乂密迹以飛行神僧護影而圍繞雖方壇氣象已萌青石之符而員頂光明未質白雲之狀逮觀音應現而幽贊利賓虛求以昭發全身踊出僁如多寶之音一爪圓開宛是樓丹之相神其不滅道在茲乎晉安帝允釐三才成就六度聿圖蘭若式印招提景行阿育王故以育王靈塔為稱首徒觀夫輪奐規矩鉤繩創製珠軒翠檻延袤中霄玉霤金池周羅上界環海之下流元氣大地為衣圍山之上結太清諸天作蓋信方廣一都之會也左赤岸而千里右青闕三字曲霞標莽蒼幽幽迷鬼谷之祠日剎晶明的的識丈人之館天花未雨宿傳龍界之香地籟無風時起魚山之梵則知定光諸佛悔天台之赤城羅漢㣥仙謬崑崙之元圃闕二字法惟神授道乃人宏向使輸柯王昧巴連之因初微此塔迦葉佛晦閻浮之迹殆曠茲山蓋虛明之絶境不可得而思議者也粵寺東十五里塔墅常住田者宋元嘉二年奉闕二字所立也宋文帝秉籙御乾作娑羅之外護感闍耶子砂糗之供制賜是田梁武皇握樞臨極為寶應之下生見阿育王金粟之果敕蠲其賦日月盈止既有命以自天陵谷迭闕三字動其如地梁普通中沙門僧綬茲寺之應真也以發行為道場以直心為淨土聞純陀良田之喻遂篤志焉既種既戒載芟載柞察地道之化成觀天道之時變晤是闕一字無闕三字始以常住名焉次有僧濟上人虛已淨心紬茲慧業披衣畫其塍埒持戒整其疆畔苗而不秀有恨何及逮陳隋之季喪亂薦臻農野蕭條鞠為茂草我皇家執大象乘飛龍陟丕上帝之耿命紹復先王之大業有山棲曠和上道尊人傑德貴天師中宗孝和皇帝親降璽書願同金輦擊鼓而陳其入國造船而捧其登座故知二乘行道闕二字朱闕一字四果適時還升紫殿雖植衆德本作南山之福田種諸善根存東皋之淨業初湖之左右夾壤二區榛梗始艾災畬粗立僧徒理勝力未贍農童牧因間私竊種藝和上闕一字蒙俗之貪垢負冥期之幽報乃推湖西易壟讓為間田襄攴諍歸之舂稅就給惟割湖東十頃復古賜地窮海北漸曾山南麓樓子根盤以東峙富都股引而西注真陸水膏腴之沃壤實神靈滋液之奧區於是奠其畛畷孚其版籍農野罷侵田畯至喜人到於今稱焉前寺主簡皎二法師僧祇之龍象也就先疇之畎畝敦老農之底績蕆事作製蓑笠來思者久之歲功未成生崖共盡流沙忽去荒涼紫陌之田影璧空存搖落青園之寺可為長太息者矣有惠炬闍黎德業淳修曾統綱領道勝之韻生而能言禪悅之味老而彌篤用能纂其闕一字始高軌可追庀其委積長算斯遠與法言沙門俗姓喻氏貞已密行惠心苦節今屈知墅任垂將十年先是潟鹵未斥塗洫未濬薹稗翳薈漫於農郊夫其心嗇制度目闕一字曲折荷鍤畚土堙窪鏟凸隤竹落揵石留溉高湊仰增卑培薄分殺水怒承達土氣填淤遊蕩而時至餘波寬緩而不迫終古旱害浸以汙潢冬不祈於積雪夏無禜乎小雨由是湖有千金之號焉當其春司載田事既飭産孚甲育萌芽或藨或蔉實穎實發上農臺而課長贏汶陽之稼如雲矣及夫寒蟬紀時農乃登穀完積聚築場圃孚不遺秉贏無闕四字庾而督收成海陵之倉非衍矣詩云綽彼碩田歲取十千其是之謂乎百穀既蒸萬供既設滿以衆香之鉢薰以毗耶之城或異聲聞若化菩薩虛高座以影集時洪鍾而闕三字座而坐飯食經行嗅若香風味同甘露遍滿一劫周流十方聞之者得未曾有食之者咸登正位白衣之會龍國無掘鬱金之香緇裳之集雞寺不碎菴羅之末三藏大闕三字金之奇貴一器沙彌識麨坌之非重資我飯色師之力與都維丹元宗遊方觀化大闕一字慈誘火耕水耨常有助於上農飛杖浮杯今載行乎中國上座釋辨疑十城之僧主也闕三字合金杵發其修徵寺主釋惠敏九州之維丹也風骨天成鐵鎮起其靈相咸能以如來之衣衣分如來之座坐護育王之靈塔願金錢闕一字育王之聖田思模石柱弟子早校蘭書式典麒麟之閣晚遊蓮迹每參鸚鵡之林賓頭盧之下空急見有能師子舍丹私之入寺豈謂無知老人識異博文才非能賦阮公不事曾供香花顧越有緣遂瞻碑版滿笈多之石室未擲其籌對輪王之金地且耕其筆多羅之葉而書偈云渾儀草昧象物紛拏或甲而乙或萌而芽萬殊成類百寶攸嘉故后稷播其種神農嘗其華其一燧人更運火正司職教以鼎飪炊之黍稷易茲毛茹成此粒食是之為人天是之為皇極其二我聞維摩曾語舍利如來大慈甘露上味又見阿難問是香氣亦有以飯食以之為佛事其三若長者主若聲聞人天諸居士地虛空神如聞飯氣而亦來臻況生生之位闕一字有待之為身其四猗歟童子供茲砂糗法王大慈冷然虛受伊鐵輪以授記從滅度後何寶塔之莊嚴得未曾有其五鳥道於許人寰在哉鬼神冥運風雨潛來白雲湧出青闕二字開闕一字千輪之蓮迹建百福之花臺其六宋帝下生梁皇外護太稷賜疇司農蠲賦皋壤映發湖源灌注既魚鱗於左右亦犬牙而盤互其七災畬平秩蓑笠來思爰疏畛畷是務鋤犁三農闕二字萬畝祁祁自膏腴而兼倍矧雨露與華滋其八懿茲開士賞功司過悅以犒勤刑以肅惰東作方喜西成是課始象耕而鳥耘終牛舂而馬簸其九千箱既積五穀斯分味蒸甘露闕一字涌香雲孰云菩薩而謂聲聞搏須彌所不能盡曷毗耶之足薰其十藐爾赤松猶田白玉矧伊塔寺神通付囑信矣育王能生金粟彼鄭國之泥紫如富都之水緑十一我來自東經行成趣淨業斯闢善根方樹式紀因緣匪在章句庶金田與石柱永巍巍以常住或曰佛法東度律教南流而云尸羅波羅蜜者何華言持戒清淨般若波羅蜜者何華言智慧明了故戒為德本萬善以之為生地慧為勝業百福由之以出天聖人以之而修身防非止惡上士以之而度物勸善行慈持之而迷倒是生虛空不可以十指執捉學之而住著為遠日月不可以兩手捫摸信矣二法之難見也如是其有不教而自得天然而自知持象扇而掌數明珠據龜牀而心照清鏡則我元儼律師其人也律師俗姓徐氏晉室南遷因官諸暨遂為縣族年始十二辭親從師事富春僧暉證聖元年恩制度人始墮僧數隸懸溜寺律師幼而明敏長而韶令標格峻整風儀凜然逮於弱冠乃從光州咨受具戒後乃遊詣上京探賾律範遇崇福意律師及融濟律師皆名匠十方南山上足咸能升堂睹隩共所印可由是道遵戒品名動京師安國受記並充大德浚還江左偏宏四分因著輔篇記十卷羯磨述章三篇至今僧徒遠近傳寫初光州岸公嘗因暇寐忽夢神僧謂曰元儼當為法器云何教以小乘後乃命宏般若由是研精覃思採托舊學撰金剛義疏七卷古德所不解先達所未詳咸皆發揮光明若指諸掌誓以一生宣講百遍越邑精舍時稱法華晉沙門曇翼曾結菴層巔入是法三昧感遍吉菩薩徒觀其塔類多寶涌出以證經宮如轉輪飛行而聽法雙烏所以示兆今尚翔鳴六象所以呈奇時猶隱現不可得而思議者蓋斯之謂歟信如來之福庭是菩薩之隱嶽大師乃考槃是卜束鉢深棲建置戒壇招集律行若夫秦衡上士燕代高僧數若稻麻算同竹葦伏膺請益躡屩擔簦宴坐不出幾三十載開元二十四年我開元天地大寶聖文神武孝德證道皇帝持法鏡握神珠親注金剛般若經詔頒天下普令宣誦都督河南元彥沖躬請律師重光聖日律師闡揚幽讚允合天心令盲者見日月之光聾者聞雷霆之響師之演暢蓋有力焉夫樂小法者迷自我而為病通大方者懵開空之法道若夫會三歸一觸理冥事自優波離已下猶或病諸而律師綱紀小乘演暢大法晤佛境之非有識魔界之為空故能使槃將生死一如煩惱與菩薩齊致發心而登佛地非我而誰白黑歸依當仁不讓昔僧護法師常居石城宴坐青壁仰其中峯如有佛像願造十丈以圖兜率良願未諧護公長逝梁武皇帝詔僧祐律師馳傳經理規模刻劃意匠才施俄而山冢崒崩全身坐現合一百五十尺雖金石絲竹四天之供施常聞而功德莊嚴十方之鏤鐫尚闕律師乃內傾衣鉢亦外率檀那布以黃金之色鎔以白銀之相銅錫鉛鍇球琳琅玕七寶由是渾成八珍於焉具足雖寶積獻蓋界現三千迦葉貢衣金踰十萬如須彌之現於大海若法日之出於高山此又律師之功德不可思議者也故洺州刺史徐嶠之工部尚書徐安貞咸以宗室設道友之敬國子司業康希銑太子賓客賀知章朝散大夫杭州臨安縣令朱元慎亦以鄉曲具法朋之禮開元二十六載恩制度人採訪使潤州刺史齊浣越府都督敬誠採訪使盧見義泗州刺史王弻無不停旟淨境稟承法訓齊公乃方舟結乘奉迎律師於丹陽餘杭吳興諸郡令新度諸僧躬受具戒自廣陵迄於信安地方千里緇黃道俗受法者殆出萬人凡禮佛名經一百遍設無遮大會十筵而人境住持舉無與比夫秉法傳授從佛口生有門人法華曇俊崇默龍興崇一開元智符稱心崇義香嚴懷節寶林洪霈覺允灌頂皆不傾油鉢無漏浮囊經不云乎如旃檀林旃檀圍繞如師子王師子圍繞信律師之威師有在而法主之功德不刊嗚呼三界無安百齡共盡此生已遺於後息他世應見於前心天寶三載歲次壬午化緣已畢十一月三日現疾於繩牀七日午時坐終於戒壇院春秋六十有八粵其月二十五日窆於寺南秦山之下高樹雙塔光明踰於白雲列植千松秀色羅於明月經始則神雍崇曉住持則惟湛道昭並躬護聖場親傳智印其餘三千門人五百弟子承般若之深法受毗尼之密行盡號顓門無待彌勒令並列載碑陰用摽律序初律師凶問時余忝外役永懷德音謂如昨日及瞻斯拱木已十有餘秋私念生涯自憐何極庶依神理敢作銘云律師堂堂宗高偃王才華骨貴戒美名香佛國柱石僧門棟梁毗尼玉色般若金光我聞二法難信難解等有開遮平無高下生生草繫節節支解念電不停身塵自假觀生若幻視息猶風慧明日月戒性虛空不遠無相修行在中善矣真匠賢哉法雄我生已盡梵行已立示化衆生隨緣悟入去來三界無苦無樂常行一乘日用斯給哀哀釋子資父惟師痛失瞻仰悲深住持方墳永翳圓塔長辭何時踊現更紹迦維詠洛陽人開元十二年進士祀事孔明展誠誥備崇享獻之道則歌舞其牲嘉滌濯之容則詔相其禮取則不遠聞斯行諸政貴有恆人用不撓雖小祭大祭課乃義疑而職人充人曷不頒布況郵罰麗事職汝之由天子有司是堪自頒龜玉毀櫝曷所逃刑吉凶殊流冕服異數苟將失制敢用此規而泉壤幽深生涯溘盡綴足斂手初聞於長遊設階乘屋遽見於三號甲也用心審於盡愛尤差司服還惜禮經招平生之衣不有曾子之問加冕辨之服更異邾婁之言相彼豸冠素為人望今將一糾實謂正途雍太原人開元中官監察御史纍遷吏部侍郎貞元中由尚書左丞貶歙州刺史神物昭見聖人是則五位時序兮萬邦以寧百祥薦臻兮一人之德鼓茲靈器呈我王國有物有憑匪雕匪刻察其狀而元妙相其儀而不忒諒幽贊而克成矧徽猷之允塞是知奇制可久嘉名不朽類君子之心以虛而受同至人之德終善且有既應盛而自滿不假於盤瓶亦詎炊而自熟何勞於薪槱擬神鼎之有用掩攲器而無咎豈以塵見范丹之空賂為紀國之醜者矣且夫清明在躬符瑞由衷誠之必感感而遂通獻白環於重華克明濬哲錫元圭於文命告厥成功此唐堯之表貺蓋王母之欽風曷若自然挺出為瑞斯崇其應不昧其用無窮莫因埏埴寧俟磨礱以彰我君聖以報我年豐而已哉客有賦而歌曰元德日用兮象帝之先丹甑時見兮神物光妍中含虛兮體道上應規兮法天染人無所施其彩飾陶人無所效其貞堅以享以孝兮可以餴饎多稌多黍兮屢茲豐年無罪未知合否幽家元苞祕書赤制賈逵是擲且未能言鄭興不為孰云有學倘在法而斯禁寧當刑而可捨丕惟斯乙嗜學可嘉仰惠施之藏書得蔡雍之舊業通德惟異未聞北海之旌里仁是依遽致西鄰之責有論語之讖則稱私畜禁書覽天官之文豈曰潛窺元象將循名以責實何加少而為多役以牽傍是非舉直聞言是信雖吾子之有猜執德不回終匹夫之為諒請從郡斷以黜鄰告履冰幽州范陽人開元五年為右補闕準禮父在為母一周除靈三年心喪則天皇后請同父沒之服三年然始除靈雖則權行有紊彞典今陛下孝理天下動合禮經請仍舊章庶叶通典禮父在為母十一月而練十三月而祥十五月而禫心喪三年上元中則天皇后上表請同父沒之服亦未有行至垂拱年中始編入格易代之後俗乃通行臣開元五年頻請仍舊恩敕並嫂叔舅姨之服亦付所司詳議諸司所議同異相參所司惟執齊斬之文又云亦合典禮竊見新修之格猶依垂拱之偽致有祖父母安存子孫之妻亡沒下房筵几亦立再周甚無謂也據周易家人卦云利女貞女正位乎內男正位乎外男女正天地之大義家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦家道正而天下正矣禮女在室以父為天出嫁以夫為天又在家從父出嫁從夫夫死從子本無自專抗尊之法即喪服四制云天無二日土無二王國無二君家無二尊以一理之也故父在為母服周者避二尊也伏惟陛下正持家國孝理天下而不斷在宸衷詳正此禮隨末俗之願念兒女之情臣恐後代復有婦奪夫政之敗者臣聞夫婦之道人倫之始尊卑法於天地動靜合於陰陽陰陽和而天地生成夫婦正而人倫式序自家刑國牝雞無晨四德之禮不僭三從之義斯在即喪服四制云天無二日土無二王國無二君家無二尊以一理之也故父在為母服周者見無二尊也準舊儀父在為母一周除靈再周心喪父必三年而後娶者達子之志焉豈先聖無情於所生固有意於國家者矣原夫上元肇年則天已潛秉政將圖僭篡預自崇光請升慈愛之喪以抗尊嚴之禮雖齊斬之儀不改而几筵之制遂同數年之間尚未通用天皇晏駕中宗蒙塵垂拱之末果行聖母之偽符載初之元遂啓易代之深釁孝和雖多反正韋氏復效晨鳴孝和非意暴崩韋氏旋即稱制不蒙陛下英算宗廟何由克復易云臣弒其君子弒其父非一朝一夕之故其斯之謂矣臣謹尋禮意防杜實深若不早圖刊正何以垂戒於後所以薄言禮教請依舊章恩敕通明蒙付所司詳議且臣所獻者蓋請正夫婦之綱豈忘母子之道諸議多不討其本源所非議者大凡祗論罔極之恩喪也寧戚禽獸識母而不識父秦燔書後禮經殘缺後儒纘集不足可憑豈得與伯叔母服同豈得與姑姊妹制等三王不相襲禮五帝不相沿樂齊斬足為升降歲年何忍不同此並道聽途説之言未習先王之旨又安足以議經邦理俗之禮乎臣請擬經義以明之所云罔極之恩者春秋祭祀以時思之君子可終身之憂霜露之感豈止一二周之服哉故聖人恐有朝死而夕忘曾鳥獸之不若為立中制使賢不肖共成文理而已所云喪也寧戚者孔子答林放之問至如太奢太儉太易太戚皆非禮中苟不得中名為俱失不如太儉太戚焉毀而滅性猶愈於朝死夕忘焉此論臨喪哀毀之容豈比於同宗異姓之服所云禽獸識母而不識父者禽獸㣥居而聚麀而無家國之禮少雖知親愛其母長不解尊嚴其父引此為論則亦禽獸之不若乎所云秦燔書後禮經缺殘後儒纘集不足可憑者人間或有遺逸豈亦家戶到而燔之假若盡燔苟不可信則墳典都謬庠序徒立非聖之談復云安屬所云與伯叔姑姊服同者伯叔姑姊有筵杖之制三年心喪乎所云五帝不相沿樂三王不相襲禮誠哉是言此是則天懷私包禍之情豈可復相沿樂襲禮乎所云齊斬足為升降者母齊父斬不易之禮按三年問云將由修飾之君子與三年之喪若駟之過隙遂之則是無窮也然則何以周也曰至親以周斷是何也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉以是象之也然則何以三年曰加重焉耳故父加至再周父在為母加三年心喪今者還同父沒之制則尊嚴之律安施喪服四制又曰凡禮之大體體天地法四時則陰陽順人情故謂之禮訾之者是不知禮之所由生非徒不識禮之所由制亦恐未達孝子之通義臣謹按孝經以明陛下孝治之合至德要道請論世俗訾禮之徒夫至德謂孝悌要道謂禮樂移風易俗莫善於樂安上治民莫善於禮又禮有無體之禮無聲之樂按孝經援神契云天子孝曰就就之為言成也天子德被天下澤及萬物始終成就則其親獲安故曰就也諸侯孝曰度度者法也諸侯居國能奉天子法度得不危溢則其親獲安故曰度也卿大夫孝曰譽譽之為言名也卿大夫言行布滿能無惡稱譽達遐邇則其親獲安故曰譽也士孝曰究究者以明審為義士始升朝辭親入仕能審資父事君之禮則其親獲安故曰究也庶人孝曰畜畜者含畜為義庶人含情受朴躬耕力作以畜其德則其親獲安故曰畜也陛下以韋氏構逆中宗降禍宸衷哀憤睿情卓烈初無一旅之衆遂殄九重之妖定社稷於阽危拯宗枝於塗炭此陛下孝悌之至通於神明光於四海無所不通使諸侯得守其法度卿大夫得盡其言行士得資親以事君庶人得用天而分地此陛下無體之禮以安上理人也上元已來政由寧氏文明之後法在凶人賊害宗親誅滅良善勳階歲纍酺赦年頻佞之則榮華正之則遷謫神龍景雲之際其事尤繁先天開元之間斯弊都革此陛下之無聲之樂以移風易俗也臣前狀單略議者未識臣之懇誠謹具狀重進請付中書門下商量處分臣言若讜然敢側足於軒墀臣言不忠伏請竄迹於荒裔平子伊闕人開元五年上書論躋睿宗非禮為禮官所軋貶康州都城尉臣聞昔者帝王之為國也行其禮則皇圖昌廢其禮則宗社危臣竊見今年正月太廟毀此乃躋聖貞所致也夫宗廟國之大事陛下當今聖主臣不敢曲意巧言而陳之謹按經傳具陳引休咎特望天恩少察臣言則可晏然無慮也故臣不避誅以言之伏惟陛下俯垂許擇臣按左傳云君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟今日有違於此也昔魯文公二年宗伯弗忌躋僖公於閔公上後致太室壞春秋異而書之今日有同於彼也君子以弗忌為失禮仲尼曰臧文仲不仁者三縱逆祀一也又按五行志書僖公雖閔公之兄嘗為閔公臣臣居君上為失禮也遂太室壞且兄臣於弟猶不可躋之弟上況弟臣於兄豈可躋弟於兄上耶昔莊公三十三年薨閔公三年吉禘自薨至禘向有二年春秋猶非之失禮況夏崩冬禘其不亦太速乎且太廟中央曰太室尊高也魯自是陵夷將墮周公之祀臣昧死據此斷之即太廟毀亦今日將欲陵夷之象墮先帝之祀也斯亦上天祐我唐國乃降此災以陛下去年禘孝和於別室吉祭於太廟未祭孝和先祭太上皇此乃與僖閔事同先臣後君也昔兄躋弟上今弟先兄祭過有甚於古也昔登臣君上今亦如之事豈不同耶昔太室屋壞今聖朝太廟毀變豈不同耶若以兄弟同昭則不合出致別廟若以臣子之例則孝和合進為昭昔武氏篡國十有餘年孝和挺劒龍飛再興唐祚反正朔服色咸依貞觀故事此即有功於天下也今禘於別殿是廢先聖之訓棄中興之功下君上臣輕長重幼若以孝和無道則位不合稱帝墳不得稱陵傳曰子雖齊聖不先父食久矣社氏曰臣繼君父也昔禹不先鯀湯不先契文武不先不窋故宋鄭不以帝乙厲王不肖而猶尊尚之況孝和有大功乎魯頌曰春秋匪懈享祀不忒皇皇后帝皇祖后稷詩曰問我諸姑遂及伯姊禮為其後伯姊而先諸姑者何也尊其先也弗忌欲阿時君先其所親亂國大事故傳特引二詩深責其意方今太廟毀雖臣阿曲之過恐危陛下之國也昔晉太康五年宣帝廟地陷梁折八年正月太廟殿陷改作殿宇更營新廟遠致名林雜以銅柱自八年九月造至十年四月乃成十一月又梁折毀壞據此言之天降災譴非枯朽也晉不知過天下分離王室大亂英雄競起夷狄滿國特望天恩少垂詳察臣知言必就誅夷而昧死言之者以陛下聖明寬容博物納諫而此事恐史筆書之令來代君子以巍巍聖代野無博識朝無忠直臣將何以彰陛下招諫伏請速召宰相已下御史已上衆共謀議移孝和入廟何必苦違禮典以同魯晉哉陛下前降明制令所司到朝堂進封極言時政得失又舉方康顧問又徵賢山野而寂無人言非朝不招諫時惡直言竊為儒生不達大體也特請陛下於其書傳親加省覽以聖慮斷之頃秋夏之間淫雨彌旬傷稼敗邑漢書五行志云簡宗廟不禱祀逆天時則致災也臣又見兩畿戶口逃去者半常侍解宛招攜不還李傑奏請訪括不得臣能使之如鷹有縚若馬有絆夫鳥飛於空魚沈於泉鹿走於野猿猱騰於山猶尚取而馴之屠而食之況於人不能飛沈乎伏望天恩許臣面奏亦為宗廟未安不敢即言仰恃鴻恩之厚不懼雷霆之威昧死連封伏深戰越仲邱沂州琅邪人開元中歷左補闕內供奉集賢修撰起居舍人遷禮部員外郎卒贈祕書少監按貞觀禮正月上辛祀感帝於南郊顯慶禮祀昊天上帝於圜丘以祈穀左傳曰郊而後耕詩曰噫嘻春夏祈穀於上帝禮記亦曰上辛祈穀於上帝則祈穀之文傳於歷代上帝之號允屬昊天而鄭康成云天之五帝遞王王者之興必感其一因其所感別祭尊之故夏正之月祭其所生之帝於南郊以其祖配之故周祭靈威仰以后稷配之因以祈穀據所説祀感帝之意本非祈穀先儒所説事恐難憑今祈穀之禮請準禮修之且感帝之祀行之自久記曰有其舉之莫敢廢也請於祈穀之壇遍祭五方帝夫五帝者五行之精五行者九穀之宗也今請二禮並行六神咸祀又按貞觀禮孟夏雩祀五方上帝五人帝五官於南郊顯慶禮則雩祀昊天上帝於圜丘且雩祀上帝蓋為百穀祈甘雨故月令云命有司大雩帝用盛樂以祈穀實鄭元云雩上帝者天之別號允屬昊天祀於圜丘尊天位也然雩祀五帝既久亦請二禮並行以成大雩帝之義又貞觀禮季秋祀五方帝五官於明堂顯慶禮祀昊天上帝於明堂準孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝先儒以為天是感精之帝即太微五帝此即皆是星辰之例且上帝之號皆屬昊天鄭元所引皆云五帝周禮曰王將旅上帝張氈案設皇邸祀五帝張大次小次由此言之上帝之與五帝自有差等豈可混而為一乎孝經云嚴父莫大於配天其下文即云宗祀文王於明堂以配上帝鄭元注云上帝者天之別名神無二主故異其處孔安國云帝亦天也然則禋享上帝有合經義而五方皆祀行之已久有其舉之難於即廢亦請二禮並行以成月令大享帝之義
