front:
  text: 全唐文欽定全唐文卷四十五肅宗四
  hash: sha256:0cd5bb732b9bd2129ffdf18a712466063eba220bae5fc5823db56a8a7e8241f8
body:
  text: 古者父有天下傳歸於子子有天下尊歸於父有國所以繼統立身莫若揚親其義遠矣我太上至道聖皇天帝惟皇降衷敷祐於上允文允武乃聖乃神道合乎乾坤德明於日月粵若增崇九廟巡謁五陵天子之孝也嚴禋二郊升中東嶽聖人之表也制禮作樂闡學明刑帝皇之業也戡定多難懷柔百蠻霸王之功也於是乎為而不宰成而勿居神超象外之先心契合莫之境釋負於小子俾承於丕搆討伐叛逆綏懷四方豈朕所能皆聖皇之訓也頃者親授寶符載錫美稱顧朕不德弗克負荷君父之命若登於天祖宗之緒恐墜於地一昨與羣公百寮庶尹衆士圖惟帝載欽若聖謨自古以來百王垂範文明濬哲孝友寬仁豈有如我開元之盛也乃稽大典上徽號曰太上至道聖皇天帝纍日誠請不蒙許納至於數四今茲俯從允膺天休克副人望朕上迫嚴旨曲被殊私迎春之初承奉嘉命聖皇所賜曰光天文武大聖孝感皇帝名以制義亦為實賓卑不踰尊是昭物則恭惟聖造何敢當仁頃以鴻業載昌有虧公議復以大聖二字深僣皇猷讓非飾詞言必形泣承順顏色而宸眷不回祗膺寵光乃夕惕增厲今惟新景命禮洽於尊親誕受徽章敬在於順上發生萬物行慶其時孚佑兆人緩刑斯在宜宏霈澤以布陽和可大赦天下改至德三年為乾元元年起二月五日巳前大辟罪無輕重常赦所不免者咸赦除之其兩京文武官應三司先推勘者本罪中遞減一等處分其合放者三司具條件奏聞自開元巳來將相大臣非反逆及犯名教枉法贓罪者流死許其家人以禮收葬其陷在賊境為其殺戮未經追贈者據本官追贈公主并郡王嗣王郡主縣主及皇五等巳上親被逆賊殺害者各與子孫一人官使其瘞藏亡失骸骨者各招魂葬身死者三品巳上各與追贈仍各與一子官五品巳上一子出身六品巳下量事追贈其元從聖皇天帝至成都府文武官五品巳上宜與一子官六品巳下超資進改聖皇至成都府後到官及寧州靈州首末扈從三品巳上與一子官五品巳上放一子出身情願回授周親及親近亦聽六品巳下量與改轉鳳翔府以歸順前者普恩外加一階車駕出城後任官潛藏不仕逆賊即與處分唐元功臣普恩外賜爵一級身亡歿者子孫一人加一階其諸道節度下將士三品巳上與一子官五品巳上放一子出身六品巳下量與改轉勳業高者各委本使聞奏諸道留後將士普恩外賜恩三轉自開元巳來宰輔之家不為逆賊所汙者與子孫一人官賊陷兩京文武常參官及諸州刺史絶脰仰藥不事叛人為衆所知者量加優贈有脫身賊庭妻子被屠戮者委所司勘會聞奏其天下孝義門各與一子官委採訪使具名奏聞量文武處分其左降官非反逆緣坐及犯惡逆名教枉法盜贓如有親年八十巳上及疾患在牀枕者不堪扶持更無兄弟許其停官終養其流人亦準此自今巳後應有以醫術入仕者同明法例處分天下百姓今年租庸並放其百司府縣諸色雜供各宜減半其雜徭役非要切者一切並停其天下州縣有遭逆賊攻擊堅守不下竟以獲全其官人百姓中有實效灼然為衆所知者宜令本道使案驗奏聞據狀迹酬其官賞身亡歿者重加褒贈有父母存者仍與一官及邑號無父母者與妻子有一家丁壯盡被屠害者其父母妻子仍令州縣以官物賑恤并量造舍宇使得安存其州因城陷被賊殺戮殘毀者委本道使勘責取實各量免其二三年租賦自逆賊以來有匹夫匹婦節義可稱者並旌表其閭墓其流亡戶復業者委本道使與刺史勾當賑給并與種子犂牛仍免三年租賦內外文武官三品以上各賜爵一級四品巳下及四方通表使各加一階五品巳下各賜勳兩轉其刺史上佐録事參軍縣令委中書門下速於諸色人中精加訪擇補擬判司丞巳下宜令所繇先於兩京潛藏不仕逆賊及固託疾病官中擇資考深才堪者銓注續發遣皇五等巳上親及九廟子孫有才學政理委宗正寺揀擇聞薦其有任偽官及掌兵馬軍將能即來各還本官仍別優賞其左降官諸色流移配隸安置罰鎮效力之類亡官失爵解退放歸田里及安祿山反黨緣坐不在免限李林甫王鉷楊國忠等一房去年十二月十五日制後所犯並準前制處分朕聞皇天有命皇王受之命之為君孝理為本莫不欽崇前烈聿修裸享之儀對越上元式陳郊禋之敬美其盛德商頌有奏鼓之音告厥成功夏書有錫圭之慶國之大事實在於斯間者孽胡亂常暴殄天物致圖書禮樂或阻於干戈宗廟神祇有虧於享祀朕誕受明命龔行天罰羣妖克殄封鯨鯢以示威王室既寧奉鑾輿而載復太上聖皇天帝功格天地道邁胥庭思凝神於姑射將釋負於宸扆俾豫小子纘承大統夙夜祗懼俯盡臣子之心親親尊尊庶極於此是用追崇先后建立中宮永言孝思感徽音於文母俾行婦道想釐降於虞嬪情理於是獲申人倫以之攸敘然後執瓚清廟歌五聖之重光燔柴圓丘覩百神之受職復修祭禮再備樂章尊祖配天不失舊物今大禮斯舉元符允答行慶施惠尚屬於陽和出繫挺囚必當於時令思與天下更布惟新宜覃肆眚之恩以洽雍熙之化可大赦天下除反逆之黨緣坐謀殺十惡劫盜臨監主掌自餘一切原免其餘逆賊元謀及脅從今但歸投並原其罪仍與官賞其成都元從聖皇功臣及靈武元從功臣並收兩京將士三京留守諸道節度採訪使普恩外三品巳上賜爵一級四品巳上加一階行人賜勳三轉自寇賊以來官吏百姓中有勞未經酬賞者委所在官長具狀奏聞當與甄録天下百姓除正租庸外一切不得別有使役如緣軍務所要自令和市兵士有尫弱羸老並揀擇放其長安萬年兩縣各借錢一萬貫每月收利以充和雇其別敕索物及供諸司并蕃客等左藏雖給價值奏請每引時月宜先給兩縣各五十貫貯於兩市差官專知旋還價值其州府縣門夫勳官並於舊額數減一半其庸丁殘疾人等不須更差其州縣官上什物並以公廨及官人料錢依時價和雇造買不得分配典正其年支口味宜減一半諸使應進鷹鷂狗豽等一切並停應緣南郊百司張設有損百姓苗稼者委京兆尹隨損多少賠酬所損錢物便即聞奏百姓中有能行仁義分濟貧窮免填溝壑賴救恤者具名聞奏當寵以官職鰥寡惸獨篤疾不能自存及陳亡人家並捐免戶州縣隨事優恤賑給百姓中有事親不孝別籍異財點汙風俗虧敗名教先決六十配隸磧西有官品者禁身奏聞京官九品以上許上封事極言時政得失朕將親覽用佇嘉謀才有可觀別當甄録草澤及卑位之間有不求聞達未經推薦者一藝巳上恐遺俊乂令兵部吏部作徵召條目奏聞録事參軍職司糾舉自今巳後宜升判司一政以彰委任國子監學生明經法帖策口試各十並通四巳上進士通三與及第鄉貢明經準常式州縣學生放歸營農待賊平之後任從常式二王三恪各與一子官內外文武官三品巳上賜爵一級四品巳下加一階自古哲王恭承景命莫不執象以御宇歷時以建元必當上稽乾符下立人極者也朕承纍聖之鴻業紹大中之寶位胡孽干紀王師尚勞乾乾之心豈忘鑒寐一物失所每軫納隍之憂萬邦未寧深懷馭朽之懼賴上元垂福宗廟降靈百辟卿士同心勠力方冀干戈載戢區宇乂安每勵躬於帝圖常取則於天道屬天人叶紀景象垂文爰遵革故之典將契惟新之命義存更始庶有應於天心澤被無私宜載覃於率土可大赦天下改乾元三年為上元元年自上元元年閏四月十九日昧爽巳前大辟罪巳下巳發覺未發覺巳結正未結正見禁囚徒罪無輕重常赦不免者咸赦除之其與逆賊元謀及脅從受驅使懼法來降并潛藏不出者巳頻處分但能歸順捨罪除元惡之外一無所問其史思明必能改圖束手來款亦當洗其瑕釁議以勳封內外文武官賜爵各有差六軍及飛龍間廣既加賜物其成都靈武元從扈從遞加有差在外諸軍各加録賞物陳亡將士優加褒贈行人家口所在賑給定禍亂者必先於武德拯生靈者諒在於師貞周武創業克寧區夏惟師尚父實佐興王況德有可師義當禁暴稽諸古昔爰崇典禮其太公望可追封為武成王有司依文宣王置廟仍委中書門下擇古今名將配享並置亞聖及十哲等享祭之典一同文宣自古百王欽慎刑法蓋以法者人之命刑者國之權苟或失其科條固難措其手足頃以姦臣擅命中典不修造次便行哀矜何在自今巳後其有犯極刑者宜令本司依舊三覆庶平反之際人謂不冤幽明之間理皆無濫又書稱羣望咸秩詩曰祀事孔明爰自遐代尤崇祭祀朕深惟古義必在至誠苟德之不修則神亦無據故知精誠有感黍稷非馨而況宋景發言固三徙而可驗漢文深誡為千載之明徵事可遵行理當變革有司所立祕祝之法或移於歲或移於人君人之心寧所忍也自今巳後削去此法其中祀下祀并雜祭祀等一切並停其諸應合祭祀列於常典所用祭料一依古制務從減省以副朕心又車服以庸有虞盛典威儀以等周禮舊章往屬承平多歷年所至於公卿列位中外在官多以奢僭為心流弊成俗宜令所司定王公巳下車服産業各詳古制及令式作節限聞奏自頃戎車未息殘孽猶虞軍吏獻功務陳首級且四海之內孰非王人豈以苟從昏迷陷在夷戮一朝授首懸彼藳街朕志在好生憫其驅脅其諸軍所獲首級除元惡之外一切不得傳送又設官分理本在安人遞遷之政務於利用今寰瀛之內兵革未清加以時或不登物皆踴貴軍儲是急廩稍靡供冗官之流固甚勞弊其京間司官等有材堪釐務者宜命中書門下即類例量資歷出授外官王者稽古設教擇賢以理廣徵岩穴用副薪槱宜令中外五品巳上文武正從員官各舉賢良方正直言極諫各一人武藝文才俱堪濟理者亦任狀舉其或文乏詞策武非騎射但權謀可以集事材力可以臨戎方圓可收亦任通舉並限制到一月內奏畢自古明王聖帝名山大川並委州縣長吏擇日致祭義夫節婦孝子順孫旌表門閭終身勿事為人上者與衆守邦自古哲王懼其滿假聰明濬哲罔不在躬文武聖神乃以為號顧豫菲薄運屬經綸一旅成師復其舊物聖皇納人壽域遊意道源神器之重傳歸於朕獲守丕業若履春冰敢忘謙沖日益招損欲垂範而自我亦去華而就實其乾元大聖光天文武孝感等尊崇之稱何德以當之欽若昊天定時成歲春秋五始義在體元惟以紀年更無潤色至於漢武飾以浮華非昔王之茂典豈永代而為則三代受命正朔皆殊宗周之王實得天統陽生元氣之本律首黃鍾之尊制度可行叶用斯在自今巳後朕號唯稱皇帝其年但號元年去上元之號其以今年十一月為天正歲首使建丑建寅每月以所建為數承天陟后稽古臨人必繇革故之源方合大中之道風行宇縣澤被無涯欽承上帝之心申錫蒼生之慶可大赦天下自二年九月二十一日昧爽巳前大辟罪無輕重巳發覺未發覺巳結正未結正見繫囚徒常赦所不免者咸赦除之其十惡五逆及造偽頭首官典犯贓法實難容刑故無小並不在免限其史朝義若能翻然改圖背逆歸順罪無所問加以勳封自乾元元年巳前開元巳來應反逆連纍赦慮度限所未該及者並宜釋放有官者降資與官無官者依本色例收敘內外官三品巳上賜爵一級四品五品各加一階六品巳下賜勳兩轉成都府及靈武元從普恩之外三品巳上更賜爵一級四五品更加一階六品巳下更賜勳一轉眷及勤勞俾其卓敘每以田功在謹農事惟勤不有司存何成重穀諸州等各置司田參軍一人專主農事每縣各置田正二人於當縣揀明間田種者充務令勸課國之大事郊祀為先貴其至誠不美多品黍稷雖設猶或非馨牲牢空多未謂能享今以元元孚佑至道為心將臻太和不欲多殺禮樂殊制孝敬同歸圜丘方澤任依恆享宗廟諸祠但臨時獻熟用懷明德之馨庶合西鄰之祭唐虞之代肇有九州王者所都文無異制其京兆府河南府太原府三京之號宜停鳳翔先為西京亦宜準此所設諫曹欲聞諷議允副從繩之望須成削稿之書其諫官令每月一上封事指陳時政得失若不舉職事當別有處分其諸州別駕可依舊却置每除京官五品巳上正員清望官及郎官御史諸州刺史皆令推薦一兩人以自代仍具録行能聞奏觀其所舉以行殿最京文武官等賜物各有差自今巳後有隱欺勾剝者宜勾當年若事連去年亦任通勾其隔年者不在勾限官典隱藏在腹內不在此限其氏姓雖得之久遠有與格諱及隱疾同聲者宜改與本族望所出大姓自逐穩便名山大川明王聖帝所在廟祠各委州縣官長虔誠致祭天下侍老先版授者更改與版授未版授者與版授鰥寡惸獨不能存立者委刺史縣令量加賑恤義夫節婦孝子順孫旌表門閭終身勿事赦書有所未及者各令有司速勘會類例條件聞奏惟天為大事之在明惟聖能享承之在德朕託於人上獲守丕圖思大道之行去鴻名之節文武徽號存而不稱開統履端建元叶紀美皆有讓言必可陳虔告上元致齋清廟恭行舊典展禮南郊百神允懷上帝臨我升聞之際其亦可言昭事以誠實膺多福高而不遠復見其心乃發生之時用行嚮勸之道暘谷出日登大明於域中泰山起雲遍膏雨於天下君人臨照德澤周洽布其寬大豈止於茲宜行肆眚之恩益廣萬邦之慶可赦天下自元年建卯月一日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之其反逆造偽頭首謀殺故殺并十惡死罪官吏及典正犯贓為蠧既深在法難容並不在赦限其史朝義巳下脅從將士及受偽官等棄逆歸順因事立功封賞之外餘無所問其諸色流人及左降官等前後頻有處分並與量移所繇稽遲動歷年數宜令有司即申明前後制敕節文速勘責類例聞奏其中外行業夙著情狀可矜久踐朝班曾經任用者委在朝五品巳上清望官及郎官御史於流貶人中素相諳委為衆所推者各以名薦須當才實其內外文武官三品巳上賜爵一級四品巳上各加一階成都府靈武元從功臣三品巳上更賜爵一級四品巳上更加一階朕敬授人時慎徽月令庶無備極以獲休徵自今以後每至四孟月迎氣之日與百辟卿士舉而行之建辰月應番彍騎宜三分量留一分其餘即放歸營農至建巳月任依常式諸州刺史縣令及司田參軍令設法勸課令其耕種不得失時貧不支濟戶仍方圓處置量事借貸務令存立歲終巡按量其功效便申賞罰諸道貢獻除馬畜供軍之外其餘鷹鷂狗豽奇禽異獸並不得輒進五都之號其來自久宜以京兆府為上都河南府為東都鳳翔府為西都江陵府為南都太原府為北都孝本天經禮崇國典橫於四海漏及三泉其京資清正員文官五品巳上武官三品巳上并兩省供奉官御史諸州刺史並諸道節度巳下三品巳上父母亡沒未經追贈者並量與追贈文武不墜道宏於人務在搜揚俾其展效其諸道人中有詞學高深兼通政理軍謀制勝明習韜鈐者委所在刺史揀擇聞薦京四品巳上員文武官任各舉一人孝子順孫義夫節婦旌表門閭終身勿事上天降寶獻自楚州神明告歷數之符合璧定妖災之氣總集瑞命祗承鴻休因以體元叶乎五紀其元年應改為寶應元年建巳月改為四月其餘月並為常數仍舊以正月一日為歲首受茲福應佇以升平因日月之重光布雨露之渥澤其天下見禁囚徒罪無輕重并巳發覺未發覺巳結正未結正四月十五日昧爽以前一切放免左降官宜即量移近處流人一切放回有司更不得輒有類例條件其楚州刺史并出寶縣官及進寶官量與進改隨進寶官典傔等各量與一子官宣示中外宜知朕意今月六日伏見陛下昭告上帝陰騭下民勤恤蒼生克成黃素況靈丹神合祕藥天成聿修增壇奉以行事肅恭展禮飛章騰踊而入雲虛空有言聖壽靈長而象嶽休祐靈感曠古未聞伏望宣示朝廷録付史館陛下顧天位之纍己推以付臣臣又畏天命以固辭期不奉詔未蒙詔許以辱四海而今加之徽號錫以洪名既受寶符又傳神器是重臣以不德私臣以殊寵豈天地之容乎神人之望乎臣聞禮有常尊器不可假名無虛立義然後行頃以寇逆憑陵京闕失守撫軍監國事在一時正位居中尊無二上至于光天之業允文允武聖由天作孝以感通臣何有焉此皆陛下之能事也曲成之惠在慈愛而愈深至公之道將詢謀而未叶伏望寢茲嚴命俯遂勤誠臣下之情不勝至願帝王者天所命也稱號者人所奉也惟有德克躋大寶至聖以享鴻休于是乎人神形容其美行歌詠之不足或為之名焉伏惟陛下乾坤覆載河海潤澤道達生靈惠懷蠻貊尊九廟以崇孝謁五陵以奉先禮二郊以嚴禋祠九宮以致敬刻石北京以揚祖烈泥金東嶽以告成功自三五以還歷選列辟聰明文武齊聖廣淵丕懿純殷孰與比議卓哉煌煌真聖人之表也夫天地至大不能定愆伏之序日月運行不能正薄蝕之氣自狂孽開釁俶擾天紀與時消息為人請命舞干羽而氛祲永清垂衣裳而衽席無改納萬姓於仁壽之域朝百神於清穆之上窅然姑射之山思訪襄城之野斯又臣言之不及稽古所未聞羲軒唐虞何足以云今方推而不居為而不有付臣以宗廟重器錫臣以后王徽章何以克堪辭不獲命臣自奉明詔夙夜於邑以為名不可假尊不可踰敬承嚴旨得為孝乎至于所託者深所荷者大不敢悉拒以違天衷而大聖二字得之不易求諸故實布在册書伏望陛下顧茲當仁期以制義今王公侯伯卿士兆人詢謀僉同稽首闕下臣敢因衆人之議成小子之志上尊號於陛下曰太上至道聖皇天帝即命有司擇日奉行册禮其錫臣帝號大聖二字伏願許停如臣言可以當所希採納如臣誠不足動天伏當待罪將以明授受之道辨上下之分不勝臣子下情懇願之極伏惟陛下俯垂允許以副四海之望陛下以宗社再安天下交泰付臣以神器授臣以寶符加臣以寵章錫臣以徽號君親之義惠下之道巳彰臣子之心奉上之禮未足臣所以與王公卿士百辟兆人思垂裕後昆乃悉數前美仰陛下之行者衆星之拱北辰悅陛下之澤者百川之赴東海繇是纍上尊號敢冒宸威陛下以無為之心不宰萬物抑而未允至于再三羣情禺禺罔知所措一昨辛卯賜誥命曰頻覽章表懇至難違爾寶命惟新洪名允集用加大聖之字克副昊天之心若成命無渝萬國同歡於翊戴儻固辭不已吾亦未膺乎典册今不許撝謙令斷來表進迫嚴旨何以克堪退荷殊私無任隕越小子伏受命矣伏惟陛下允臣所請則自下上上日月之光昭從上下下雨露之恩廣臣巳詢諸龜筮備其禮物請以來月乙巳奉上册禮聖恩招納即日付外施行不勝懇願之至臣伏奉恩命以臣所進藥器深合天心伏蒙特垂褒美令頒示天下臣幸以菲才叨膺寶歷聖慈曲眷每事憂兢至於孝養之宜臣子常禮先意承旨務達微誠不期進奉之時偶合聖旨寧謂至誠能感事近前知以臣孝既繇衷物自冥應特加獎飾許載縑緗在臣下情彌增愧悚德自清虛聖教之實或隱或顯是朴是質靜處瓊臺焚香玉室道心不二是為正一昂昂高士瀟灑孤峙却立排煙乘霓控鯉果然不伐為而不恃馭風冷然與物終始
