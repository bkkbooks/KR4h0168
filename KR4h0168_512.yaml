body:
  text: 維元和三年歲次壬子正月癸未朔十一日癸巳攝太尉銀青光祿大夫守兵部尚書兼御史大夫上柱國趙郡開國公臣李巽及文武官五千七百九十四人等言臣聞自天元而升地黃而凝皇王之道堯舜首出故典謨述焉自堯及唐歷紀三千致理之君不過十數升平之運不至五百天人之交際不其難歟我唐運之興昌期是膺四海一統十聖丕承以至於皇帝則君十一而年二百矣歷考前代丁於斯時皆王澤已竭君明寖替未若我后之維新厥命我唐之中興厥祚顧視周漢不其蔑歟伏惟皇帝陛下紹太宗之英武稟德宗順宗之寅畏乾乾翼翼若不滿志故愛於文母順色之孝也睦於兄弟因心之友也崇讜議察邇言去疑謀杜讒說俾王道正直砥為夷塗發前聖之韞匵披人文之光耀而氣有沴者反時為妖若黎崇之不恪苗人之逆命或誕敷文誥或震謺武功聖造不疾而速非陛下疇能之然後奉四表之歡心總百神之受職蠲祀於清廟嚴禋於上元天地察而神祇著矣臣聞之君人者謙遜靜慤則天應之以福故休祥出焉慈仁愛育則人應之以誠故鼓舞從焉王者因人心稽天意天下俱應而徽號加焉至公之道不可辭也臣等所以勤勤懇懇至於再至於三願奉鴻徽以彰休德陛下猶三揖而五讓之久而罔已始降俞詔於是百辟卿士洎四方侯衞之臣上言曰陛下誕睿聖之姿應會昌之期經天地之謂文禁暴亂之謂武臣等不勝大願謹奉玉冊玉寶上尊號曰睿聖文武皇帝惟陛下懋一德勤萬邦干祿百福垂唐之無疆臣某言伏奉某月日制大赦天下至德純茂鴻私溥洽中賀臣聞聖人紹統必建元良王者郊天是崇嚴配伏惟寶應元聖文武皇帝陛下嗣守鴻業光膺駿命奉先思孝誠已達於幽明立嫡以長義仍深於燕翼皇猷允塞墜禮咸甄俯宏作解之恩式布惟新之令若乃滌瑕蕩穢雷雨之施也茂時育物天地之仁也薄征弛力政理之源也錄功念舊敦勸之方也加以躬儉節用捐珠棄玉執喪者俾從達禮繫獄者咸釋明刑啟進善之門開直言之路德殷虞夏義掩羲軒凡在宥刑孰不欣悅臣某言伏奉二月二十四日制書大赦天下德洋恩溥遠洽邇安億兆欣欣罔不幸甚臣某誠歡誠喜頓首頓首伏惟陛下體元聖之姿膺出符之運統理萬事建中於人躬大禹之菲薄奉元元之慈儉損已以益下約身而愛人捐珠玉而不玩斥綺麗而不御事有妨於農業物有害於女工人力所疲上心攸蕩自此罷黜歸於典常若乃投荒禦魅之倫觸網嬰羅之類或炎裔淪屈骨肉相從或囹圄幽囚饋餉不至皆陽和所未煦雨露所罕霑靡不沐浴天波昭覩白日然後表捐軀之烈所以勸忠廣累葉之仁所以敦孝虔奉寢廟輟玉輿之資惠緩巿估發金錢之積異類均懷土之志高年加挾纊之恩斟酌泉貨之源變通惠利之弊逋債咸已讜直必容如天之湛恩廣矣稽古之能事備矣彼鶉衣之徒鮐背之叟孰不擊中衢之壤共樂於堯年詠泰階之符同躋於壽域况臣謬當共理職在撫循欣抃之誠倍萬恒品不任踊悚之至謹遣當州軍事衙前虞候王國清奉表陳賀以聞臣某誠歡誠喜頓首頓首謹言臣某言伏見制書大赦天下以今年正月一日改為元和元年者臣聞行慶布和允光於獻歲履端居始實屬於元正將大有以惠人乃順時而布令法五始之要流恩而降澤統三微之歷觀象而建元正朔所加遐邇忻戴中賀伏惟皇帝陛下大孝嗣業鴻猷啟圖順天地而發生均日月而齊照馴洽飛走煦育生靈既承太宗文武皇帝之耿光稟保壽天皇之嚴訓百神享德萬國宅心敷作解之澤布維新之典將致和平蠲京畿之逋債言念水旱薄江淮之征賦開羅網以宥過崇勳秩以賞勞宏裦酬之典澤被幽明旌忠烈之臣賞延於代闡庠序以勸學愍耆艾而加禮恩覃有截化洽無垠超溢虞夏掩映軒頊首出千古遐冠百王億萬斯年永荷天祿臣謬當任用分鎮藩維不獲奔赴闕庭親覩盛禮臣某言伏奉某月日恩制大赦天下一人有慶百度惟新戴天履土罔不欣忭中賀臣聞天地元功施雨露以育物帝王繼統昇日月以垂曜㣥品資始萬方文明伏惟皇帝陛下嗣守鴻業光膺駿命淳化均於四序大德合於二儀保寧社稷光宅區宇宏孝慈以御下崇恭儉以垂休恩覃浹旬事冠今古况乃順時布政乘春導和敷作解之恩宣在宥之典九族既睦四門廣闢而又洗滌幽縶雷雨之施也歸還流竄羅網之釋也移敘貶黜覆載之仁也蠲除逋債政理之源也裦寵勳賢激勸之方也廢金寶之貢有以彰儉德也搜遺逸之士有以表至公也元勳宿將賞延子孫庶尹卿士榮周存沒廣直言之路啟進善之門德超虞夏道掩軒頊必將平一殊俗發揮大猷億萬斯年永荷天緒臣謬當任用述職藩維不獲奔赴闕庭臣無任云云臣某言伏奉今月日赦詔自上下下由衷尊尊參天地之大名貴聖文之崇號休氣宛秀彌漫雲天煙景昭華光融草樹臣誠歡誠踊再舞再蹈者有以副萬國之歡情增九廟之炳靈矣臣聞孝子事父誠奉其色忠臣事君將順其美皆殊外獎情實內殷超邁盈耳之言適會因心之義所以然也伏惟陛下道宏一德功蓋四時辰象曷以煥其文雷霆無以雄其武固以業振今昔事溢名言雖僉臣子之謀莫究圓方之廣所謂塞元命起兆人㣥岳騰聲長河變色宜其雷震於地慶蟄戶之出幽日飛於天賀霄漢之開朗是以神魚載舞祥鳳載鳴况於人靈况於榮位乎徒張三寸之舌不足以談聖猷空捐七尺之軀不足以報明主無任大慶欣忭倍百之至謹遣所部宣德郎某奉表陳賀以聞臣某誠惶誠恐頓首頓首臣某言伏奉七月三日冊皇太子詔書大赦天下臣聞元良者宗祀之本枝赦宥者含育之全德伏惟陛下赫然光大日昇於天嶷然崇高岳鎮於地萬齡為壽庶物咸春東海注百川之朝北辰列眾星之拱笑龜鶴之將老嘲鸞鳳之未伸但以禮備儲宮德刑廣物挺黃沙之罪再荷生成洗白玉之瑕俱成渙汗中外一命錫無戰之勳壽考百年賙不耕之粟莫不忭舞帝渥頌歌聖慈萬歲之聲夷夏合聽九成之樂天地同歡臣久沐鴻恩竟無上荅悅豫之至倍百恒情謹因進藥使某陳賀表以聞臣某言臣久處繁機切思退免伏奉詔旨未允深衷仰戴天慈如寘冰谷臣某中謝臣竊惟至敬豈敢煩文再以懇誠上陳睿覽伏以陛下初臨寶圖獲侍丹扆一心捧日見四海之大明八稔代天覩㣥生之茂育恭承睿算實罄愚衷雖微寸功豈敢纖負倘陛下存簪履之舊念葵藿之誠終全深恩退蒙厚禮則是陛下既假之以位又寵之以名至德深仁光昭千古况臣年齒雖長筋力幸全猶得申獲戰之功展死綏之分倘蒙麤使足可酬恩至於左右便繁朝夕機務則心憂智竭力所不任以此至誠期於允遂然以時不再得感王道之方平福不重來念君恩之已極進退惶戀罔知所安謹奉表陳乞云云臣某言臣昨八日再表自陳九日於延英奏對公事既畢輒言私情陛下語臣以兢懼之由諭臣以進退之義今奉批荅令斷表章無涯恩渥木石知感况陛下俯鑒誠懇知非飾詞鑒以止足之心特申分列之外敢不上遵明令退抑微衷恪居官次更飫仁恩顧伯玉之未果徒慙聖私秉安石之偷安猶期他日銜恩之分萬殞猶輕不任感戴惶悚之至謹再奉表以聞臣某言伏奉恩命擢授臣持節忠州諸軍事守忠州刺史越自東海牧於巴中秩優專城任切謠俗臣某誠歡誠喜頓首頓首頃以進取乖方譴累斯及遠投海裔分棄朱崖陛下精意饗天覃恩率土故臣得澡身霈澤剖竹藩方恩出九重謗銷眾口受命之日心魂載馳屬楚越途遙奔馳道阻泝流七千涉險非一虐暑嬰癘羸骸僅存以今月七日舁曳到所部上訖臣往歲曲臺掌禮已蒙訪對之榮南宮起草猶兼奉蕝之任陛下展事宮廟臣實職導乘輿接星仗於鈎陳趨日馭於黃道奉璋薦鬯左右天威增秩進階霑濡慶渥臣業以儒進才匪時須書生之幸亦已過分中貽謗缺咎則自招今荷寵光恩由天造期勵精於緝理庶有效於涓塵巴山萬重峽水千仞微分何寄長瞻北辰臣無任感戴屏營之至謹遣衙官朝散大夫試亠兊州長史賜紫金魚袋宇文儇奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言臣某言伏奉詔書授任柳州刺史以今月二十五日至所部上訖臣某誠惶誠恐頓首頓首臣前歲以疾停官去年蒙恩除替便欲裂裳裹足趨赴京師以舊疾所嬰彌年未愈逮及今夏始就歸途襄州節度使于頔與臣早歲同官見臣當暑在道懇留就館尋假職名意欲厚臣非臣本願伏惟陛下光被之德道已洽於區中憂濟之勤心每徧於天下常以萬邦共理必藉於循良一物不遺尚延於愚藐假臣寵渥重領方州駑駘復效於馳驅枯朽更同於華秀臣某誠歡誠喜頓首頓首臣聞潢汙易竭徒有朝宗之願犬馬無識猶知戀主之誠揣分則然惟天所鑒况臣昔因左官一紀於外子牟馳心於魏闕汲黯注意於漢庭豈伊非夫獨無斯戀去就者榮辱之主朝廷者仕進之源臣子之宜忠貞所志臣雖心同犬馬而分比潢汙幸躡康衢意悲往蹇臣之此誠口不能諭意欲自達文非盡言此臣所以自咎自傷恨乖志願猶冀苦心勵節上奉詔條惠寡安貧下除人瘼恭宣皇化少荅鴻私不勝感戴歡欣之極謹遣衙前軍事虞候王國清奉表陳謝以聞臣某言今月五日中使劉元晏奉宣聖旨擢授臣饒州刺史兼賜官告仍至當州送上者臣與元晏以某月二十三日至州上訖臣伏以郡守分符朝有常典王人賜告榮並貴臣事出非常恩超往例拜舞之際悲歡失容臣某誠歡誠喜頓首頓首臣聞千年一聖生聖時者為遭逢萬朝一昌遇昌期者為嘉會臣頃者每念生聖時逢聖運而職在遐外莫能自通何嘗不顧影獨悲捫心屢泣晝望白日夜瞻北辰豈謂分寸之績未施丹懇之誠若感微藿傾心蓋草木之常分太陽迴燭及幽遠而不遺今陛下降不次之恩授分憂之地拜章承旨皆自中人聖渥霑濡天威咫尺從此萬里不為孤臣臣某誠歡誠喜頓首頓首臣又聞臣子之道犬馬代勞義不辭難分當竭命臣竊以飽食厚祿肥生澤膚猶願荷戈於逐虜之疆免冑於捐軀之所至於理財均賦惠寡安貧勸農桑敦學校儒吏之常節駑駘顧何以堪當此殊榮少荅元造高秩以忝鴻私未酬慺慺此誠沒齒無怠不任感涕屏營之至陛下軫念黎元親問禾黍察閭里之疾苦知稼穡之艱難此則聖主憂勤天下幸甚但以弧矢前驅鷹犬在後田野縱觀見車從之盛以為萬乘校獵傳說必多諫諍之臣義當守職既有聞見理合上陳拱默則懷尸素之慙獻言又懼觸鱗之禍果決以諫實謂守官正當嘉尚非足致詰夫蒐狩之制古今不廢必在三驅有節無馳騁之危戒銜橛之變既不殄物又不數行則禮經所高固非有害然逐兔呼鷹指顧之樂忘危履險易以溺人故老氏譬以發狂昔賢以為至誡陛下每與臣等討論古昔追踪堯舜固當棄常俗之末務詠聖祖之格言願以徇物為心克己為慮則昇平可致聖祚無疆㣥臣異議不禁自息臣伏見代宗朝滑州節度使令狐彰臨終上表悉以土地兵甲籍上朝廷遣諸子隨表歸闕代宗以彰遺表宣示百寮當時在位者聞之無不感歎今有次子通在臣每感彰同時河朔諸鎮付子傳孫無不燻灼數代唯彰忠義感激奉國忘家遣子入朝以土地歸於先帝貞元中長子建坐事死於施州幼子運亦無罪流於歸州欲使忠義之人何所激勸今通幸存得遇明聖伏乞陛下召之與語如堪用望垂獎錄方今置吏不精流品龎雜存無事之官食至重之稅故生人日困冗食日滋又國家自天寶以來宿兵常八十餘萬其去為商販度為佛老雜入科役者率十五以上天下常以勞苦之人三奉坐侍衣食之人七而內外官仰俸廩者無慮萬員有職局重出名異事雜者甚眾故財日寡而受祿多官有限而調無數九流安得不雜萬務安得不煩漢初制郡不過六十而文景化幾三王則郡少不必政紊郡多不必事治今列州三百縣千四百以邑設州以鄉分縣費廣制輕非致化之本願詔有司博議州縣有可併併之歲時入仕有可停停之則吏寡易求官少易治國家之制官一品俸三千職田祿米大抵不過千石大歷時權臣月俸至九千緡者州刺史無大小皆千緡宰相常衮始為裁限至李泌量閒劇稍增之使相通濟然有名在職廢俸存額去閒劇之閒厚薄異類亦請一切商定伏以永昌公主稚年夭枉舉代同悲况於聖情固所鍾念然陛下猶減制造之半示折中之規昭儉訓人實越今古臣以祠堂之設禮典無文蓋德宗皇帝恩出一時事因習俗當時人閒不無竊議昔漢章帝時欲為光武原陵明帝顯節陵各起邑屋東平王蒼上疏言其不可東平王即光武之愛子明帝之愛弟賢王之心豈惜費於父兄哉誠以非禮之事人君所當慎也今者依義陽公主欲起祠堂臣恐不如量置墓戶以充守奉日月運行遲速不齊日凡周天三百六十五度有餘日行一度月行十三度有餘率二十九日半而與日會又月行有南北九道之異或進或退若晦朔之交又南北同道即日為月之所掩故名薄蝕雖自然常數可以推步然日為陽精人君之象若君行有緩有急即日為之遲速稍踰常為月所掩即陰侵於陽亦猶人君行或失中應感所致故禮云男教不修陽事不得讁見於天日為之蝕古者日蝕則天子素服而修六官之職月蝕則后素服而修六宮之職皆所以懼天戒而自省惕也人君在名物之上易為驕盈故聖人制禮務乾恭夕惕以奉若天道苟德大備天人合應百福斯臻陛下恭已向明日慎一日又顧憂天譴則聖德益固升平何遠伏望長保睿志以永無疆之休或以伯儀嘗以推轂之任挫師安州於諡法得無貶乎愚以為不然自中興三十年而來兵未戰者患在將帥以養寇自重縱敵藩身若進而亡師貶以為義誡總干戈者必托於萬全之名而忘一戰之效矣然則保其利者亦君子所嫌也錄其忠而勸善者非陽秋之志歟矧平居進退之節不敢二色稱為忠臣議名之際裦勸所在請諡曰恭以旌厥美臣聞王者建州域物土疆觀次於星躔察法於地理考中國山河之象求二儀險阻之情天漢萌而兩界分南官正而五均敘自黃帝之方制萬國夏禹之分別九州辨方經野因人緯俗其揆一矣及秦皇并六國則罷侯而置守漢武討百蠻則窮兵而黷武雖裂為郡縣者遠過於殷周而教令之所行威懷之所服亦不越於三代失天地作限之意非皇王尚德之仁誇志役心久而後悔由此觀之則聖人疆理之制固不在荒遠矣吾國家肇自貞觀至於開元兼夏商之職貢掩秦漢之文軌梯航累乎九譯廏置通乎萬里然後分疆以辨之置吏以康之任所有而差貢賦因所宜而制名物守其要害險其走集經理之道冠乎百王巍巍乎無得而稱矣易曰天險不可升地險山川邱陵王公設險以守其國險之時用大矣哉然則聖人雖設險而未嘗恃險施於有備之內措於立德之中其用常存其機不顯弛張開闔因變制權所以財成二儀統理萬物故漢祖入關諸將爭走金帛之府惟蕭何收秦圖書高祖所以知山川戹塞戶口虛實厥後受命汜水定都洛陽留侯演委輅之謀田肎賀入關之策事關興替理切安危舉斯而言斷可識矣伏惟睿聖文武皇帝陛下握樞秉聖承祧立極祖堯舜之道憲文武之程皇王之遐蹤行之必至祖宗之耿光寢而復耀天寶之季王途暫艱由是墜綱解而不紐強侯傲而未肅逮至興運盡為驅除故蜀有阻隘之夫吳有憑江之卒雖完保聚繕甲兵莫不手足裂而異處封疆一乎四海故鄘衞風偃朔塞砥平東西南北無思不服臣吉甫當元聖撫運之初從內庭視草之列尋備衮職久塵台階每自循省赧然收汗謨明弻諧誠淺智之不及簿書期會亦散材之不工久而伏思方得所效以為成當今之務樹將來之勢則莫若版圖地理之為切也所以前上元和國計簿審戶口之豐耗續撰元和郡縣圖志辨州域之疆理時獲省閱或裨聰明豈欲希酇侯之規模庶乎盡朱贛之條奏况古今言地理者凡數千家尚古遠者或搜古而畧今採謠俗者多傳疑而失實飾州邦而敘人物因邱墓而徵鬼神流於異端莫切根要至於邱壤山川攻守利害本於地理者皆畧而不書將何以佐明王戹天下之吭制㣥生之命收地保勢勝之利示形束壤制之端此微臣之所以精研聖后之所宜周覽也謹上元和郡縣圖志起京兆府盡隴右道凡四十七鎮成四十卷每鎮皆圖在篇首冠於敘事之前并目錄兩卷總四十二卷臣學非博聞識愧經遠馳騖雖久漏畧猶多輕瀆宸嚴退增戰越謹上夫一邱之土無情也遇雨而偶然也窮象數者已懸定於十八萬六千四百日之前矧於理亂之運窮達之命聖賢不逢君臣偶合則姜牙得璜而尚父仲尼無鳳而旅人傅說夢達於巖野子房神授於上亦必定之符也然而孔不暇暖其席墨不俟黔其突何經營如彼孟去齊而接淅賈造湘而投弔又眷戀如此豈大聖大賢猶惑於性命之理歟將浼身存教示人道之不可廢歟余不可得而知也欽悅尋自右補闕歷殿中侍御史為時宰李林甫所惡斥擯於外不顯其身故余敘其所聞係於二篇之後以著蓍筮之神明聰哲之懸解奇偶之有數貽諸好事為後學之奇翫焉如來自滅度之後以心印相付囑凡二十八祖至菩提達摩紹興大教指授後學後之學者始以南北為二宗又自達摩三世傳法於信禪師信傳牛頭融禪師融傳鶴林馬素禪師素傳於徑山山傳國一禪師二宗之外又別門也於戲法不外來本同一性惟佛與佛轉相證知其傳也無文字語言以為說其入也無門階經術以為漸語如夢覺得本自心誰其語之國一大師其人矣大師諱法欽俗姓朱氏吳都崑山人也身長六尺色像第一修眸蓮敷方口如丹嶷焉若峻山清孤泊焉若大風海上故揖道德之器者識天人之師焉春秋二十有八將就賓貢途經丹陽雅聞鶴林馬素之名往申款謁還得超然自詣如來密印一念盡傳王子妙力他人莫識即日剃落是真出家因問以所從素公曰逢徑則止隨汝心也他日遊方至餘杭西山問於樵人曰此天目山之上徑大師感鶴林逢徑之言知雪山成道之所於是蔭松藉草不立茅茨無非道場於是宴坐之久邦人有搆室者大師亦因而安處心不住於三界名自聞於十方華陰學徒來者成巿矣天寶二祀受具戒於龍泉法崙和尚雖不現身意亦不捨外儀於我性中無非自在大歷初代宗睿武皇帝高其名而徵之授以肩輿迎於內殿既而幡幢設列龍象圍繞萬乘有順風之請兆民渴灑露之仁問我所行終無少法尋制於章敬寺安置自王公逮於士庶其詣者日有千人司徒楊公綰情遊道樞行出人表大師一見於眾二三目之過此默然吾無示說楊公亦退而歎曰此方外高士也固當順之不宜羈致尋求歸山詔允其請因賜策曰國一大師仍以所居為徑山寺焉初大師宴居山林人罕接禮及召赴京邑途經郡國譬若優曇一現師子聲聞晞光赴響者轂擊肩摩投衣布金者邱累陵聚大師隨而檀施皆散之建中初自徑山徙居於龍興寺餘杭者為吳東藩濱越西境馳軺軒者數道通濱驛者萬里故中朝銜命之士於是往覆外國占風之侶盡此奔走不踐門閾恥如瘖聾而大師意絕將迎禮無差別我心既等法亦同如貞元八年歲在壬申十二月二十八夜無疾順化報齡七十九僧臘五十先是一日誡門人令設六齋其徒有未悟者以日暮恐不克集事大師曰若過明日則無所及既而善緣普會珍供豐盈大師意若辭訣體無患苦逮中宵跏趺示滅本郡太守王公顏即時表聞上為歔欷以大師元慈默照負荷眾生賜諡曰大覺禪師海內服膺於道者靡不承問叩心悵惘號慕明年二月八日奉全身於院庭之內遵遺命也建塔安神申門人之意也嗚呼為人尊師凡將五紀居惟一牀衣止一衲冬無纊㲲夏不絺綌遠近檀施或一日累千金悉命歸於常住為十方之奉未嘗受施亦不施人雖物外去來而我心常寂自象教之興數百年矣人之信道者方悕畏於罪垢愛見於莊嚴其餘小慧則以生滅為心垢淨為別捨道由徑傷肌自瘡至人應化醫其病故大師貞立迷妄除其憃冥破一切相歸無餘道乳毒既去正味常存眾生妄除法亦如故嘗有設問於大師曰今傳舍有二使郵吏為刲一羊二使既聞一人救一人不救罪福異之乎大師曰救者慈悲不救者解脫惟大師性和言罕所論說問者百千對無一二時證了義心依善根未度者道豈遠人應度者吾無雜味日行空界盡欲昬癡珠現鏡中自然明了或居多靈異或事符先覺至若飲毒不害遇疾不醫元鶴代闇植柳為蓋此昭昭於視聽者不可備紀於我法門皆為妄見今不書尊上乘也弟子實相門人上首傳受祕藏導揚真宗甚乎有若似夫子之言庚桑得老耼之道以吉甫連蹇當代歸依釋流俾筌難名強著無蹟其詞曰水無動性風止動滅鏡非塵體塵去鏡澈眾生自性本同諸佛求法妄纏坐禪心沒如來滅後誰證無生大士密授真源湛明道離言說法潤根莖師心是法無法修行我體本空空非實性既除我相亦遣空病誓如乳毒毒去味正大師得之斯為究竟何有湼槃適去他方教無生滅道有行藏不見舟筏空流大江蒼蒼遙山成道之所至人應化萬物皆覩報盡形滅人亡地古刻頌豐碑永存㵎戶
