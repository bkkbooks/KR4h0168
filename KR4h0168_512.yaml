  text: 全唐文欽定全唐文卷五百十二吉甫字宏憲趙郡人御史大夫栖筠子憲宗朝為翰林學士轉中書舍人知制誥元和二年擢中書侍郎同中書門下平章事封贊皇縣侯徙趙國公出為淮南節度使六年復入秉政九年卒年五十七贈司空諡曰敬憲改諡忠懿
