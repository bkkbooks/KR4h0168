front:
  text: 全唐文欽定全唐文卷一百五十九君球齊州平陵人貞觀中擢游擊將軍纍授興州刺史遷揚州大都督府長史轉靈州都督卒官
  hash: sha256:dd19efed4e47e816621d57991e245093d168514cc737c9167a9faa3b04e065ec
  markers:
  - {type: head, offset: 14, content: 李君球, id: KR4h0168_NFKB_159-h1, level: 1}
body:
  text: 臣聞心之痛者不能緩聲事之急者不能安言性之忠者不能隱情且食君之祿者死君之事今臣食陛下之祿矣其敢愛身乎臣聞司馬法曰國雖大好戰必亡天下雖平忘戰必危兵者凶器戰者危事故聖主明王重行之也憂人力之盡恐府庫之殫懼社稷之危生中國之患故古人云務廣德者昌務廣地者亡昔秦始皇好戰不已至於失國是不愛其內而務其外故也漢武遠討朔方殆乎萬里廣拓南海分為八郡終於戶口減半國用空虛至於末年方垂哀痛之詔自悔其失彼高麗者遐荒小醜濳藏山海之間得其人不足以彰聖化棄其地不足以損天威何至乎疲中國之人傾府庫之實使男子不得耕耘女子不得蠶織陛下為人父母不垂惻隱之心傾府庫有限之資貪其無用之地設令高麗既滅即不得不發兵鎮守少發則兵威不足多發則人心不安是乃疲於轉戍萬姓無聊生也萬姓怨則天下敗矣天下既敗陛下何以自安故臣以為征之不如不征滅之不如不滅元超贈太常卿收子九歲襲爵尚巢刺王女和靜縣主授太子舍人高宗朝纍遷中書侍郎同中書門下三品拜中書令兼太子左庶子帝疾劇政出武后陽瘖乞骸骨加金紫光祿大夫卒年六十二贈光祿大夫秦州都督臣某言臣蒙非分恩澤一朝拔擢至此局影兢魂惟思報效伏惟天皇開直言之路不棄芻蕘臣之區區敢陳微款伏見近日奏揚州人高敦禮詐宣敕乘驛馬採藥其日奉進去不得至秋即決敦禮犯狀實當萬死但以罪非惡逆據法合至秋分臣聞聖人者德配二儀則天之為政今既勾芒戒序時屬發生禮稱仲春之月無焚山林言順陽而養物也仲秋之月申嚴百刑亦順陰而肅殺也古人有云姦僞者與造化俱生自然之氣也是知掩義隱賊出自帝鴻毀信廢忠生於少昊以今海內之廣何得全無姦僞天皇踐極以來恆已寬仁被物故中外禔福區宇乂安以太平之時闡和平之化若其政察非所謂上遵元老之風伏請稽諸彞典暫回聖慮臣識不及遠輒申愚見懼不瓦合伏增戰栗臣元超言臣聞春搜夏苗前王之令典教兵訓卒有國之宏規伏維天皇以欽明馭㝢中外禔福暫因農隙駐蹕近郊一物一事並從減省在公在私莫不幸賴時惟令月景淑風和宸襟有豫百靈胥悅臣曲荷恩徽重得奉陪鸞駕下情欣躍實倍恆品但以馳原赴草親行聖躬飛蒼走黃頗留神矚控權奇之馬逸影雲趨矯倣徨之箭雄飛星落上截飛鳥下斃狡兔唯恐朽株蟻垤不宜輕之千金之子猶有垂堂之誡萬乘之尊豈忘銜橛之慮又諸蕃首領參豫羽獵天皇以德綏懷遂以操弓持矢既非族類深用為虞臣雖庸劣嘗聞前古今冒死以為言者非謂出之敢諫惟望經川谷不測之地入藂林可畏之途緣龍駟以揚鑣儼風輿而按節三韓雜種十角渠魁勿使咫尺天顏處於交戟之外虔思宗廟之重允副黎元之心凡在懷生幸甚幸甚臣之性命惟天皇宥之臣之冠冕惟天皇賜之謹冒死以聞臣元超啓臣聞位隆載鼎居之者匪易業峻承祧守之者為重何則天下之本屬在元良歷選前修藹尋往傳伏惟殿下畫堂凝祉幼彰岐嶷雕宮誕睿夙擅溫文大孝因心不由於外奬深仁植學惟稟於自然故能聿膺景福式光正緒皇基永固宸構克昌加以識贍機物天姿獨秀生知之量振古莫儔比者監守務殷親覽政事所關視聽決斷如流凡在朝野僉論歸美况臣委質階陛齒跡宮闈恭聞喜躍實百恆品區區所望惟願盛德日新勵茲三善無忘四術率土蒼生幸甚見去年之內數召學士等入討論經籍亹亹不倦此之令問播於邇遐在外聞者誰不欣然今夏已來接對遂簡講藝之道有謝曩時臣之事君在於無隱敢緣茲義輒獻愚忠但臣知識庸淺未足以發明雅訓求之史傳請揚榷而言焉昔漢苑招賢高軒洞敞曹園愛客飛蓋連陰此乃副君之待士也亦有推心鄭衆每佇於咨詢降禮桓榮用承於誨命此則副君之尊師也魏太祖征并州留太子在鄴頗出畋獵崔季圭進而諫曰盤于遊田書之所誡魯侯觀魚春秋譏之周孔之格言二經之明義也深惟儲副以身為寶今忽馳騖陵險誠有識者所以惻心惟太子燔翳捐畢以塞衆望太子報曰昨奉嘉命廣開正路翳巳壞矣畢亦去焉師傅之言實獲我心晉明帝之在東宮中庶子溫嶠中舍人阮放諫馬射曰臣聞千金之子猶不垂堂以萬乘之二若有駭駟之艱豈可不熟念殿下縱一日之娛忘萬代之基凡人猶知其不可况在聖明太子答云省所陳明卿等動靜數示此則副君之納諫不以為嫌者也非獨一時之美事固亦千載之芳猷且思患預防著於易象樂不可極陳之禮經列聖典謨可為龜鏡殿下昔在藩邸時以打毬為戲當此之日已經墜馬近取諸身足為深鑑又陛下仁孝之德聞於四海自車駕發後天慈許入苑內臣竊惟殿下之意既承恩旨始復出遊適以上副聖懷非徇盤遊之樂固以苑囿之地草樹極深絶磴危嶠往往而有控纖離之馬影踰流電擁太阿之劍氣駭奔星截輕禽逐狡兔倘有衝動之變雖悔何追如戶奴等色非是一種或反逆之裔或破亡之餘夷狄遺醜兼在其數密計凶謀理難懸測忽有濳心翳薈侍衛不虞白龍魚服事出慮表臣每一思至此魂爽飛越夫為人子者不登高不臨深恐近於危辱也故樂正子春下堂傷足數月不出猶有憂色弟子問之子春曰君子跬步不敢忘孝之道是以有憂色也子春匹夫尚知愛其身體儲后之尊何可以不慎焉儻馬逢驚佚微致毀傷豈不上貽二聖之憂下乖兆人之望伏謂打毬馳射深是危機天后所賜誡書殷勤至切網羅今古罕得名言竊循旨要在於披懷虛已書云山林隱逸草澤高人總萃春坊冀朝夕設對採其匡贊廣納忠規機務之餘遊心墳籍瑩襟靈於藝圃散耳目於書林披帙橫經克勤無怠此之至戒亦何不思殿下敦崇儒術闡揚文藝爰置學士奬拔人物應斯舉者若登龍津莫不延頸企踵恩承顧盼皆願墮肝膽露款誠布衣之交一言相託尚有懷知已之遇銜國士之恩殿下數存接引與其切磋道義竭忠進善必日有異聞則玉裕彌光金聲自遠頃日時景炎爝不敢望以引召今高秋戒序景物漸涼伏乞聽政餘閒留情墳典所讀班史請畢殘功前者別敕賜物本録殿下書進時請臨池染翰使筆力轉遒仍請逐月一兩度總喚學士因為設食文學張君相素明莊老命之談說能暢元風殿下假以溫顏人各申其藝業鉤深理窟者思憤懷蛟托實詞條者文成吐鳳此亦一時之奇觀可以澡慮怡神預在宮僚人知自效便僻取容者疏之正直不撓者親之棄不急之務而省遊娛絶無益之欲而敦節儉以儒墨為城池翺翔其際以禮義為干櫓棲息其間一則遵天后誡書不敢失墜二則挹古人遺範有所發揮豈不美歟豈不盛歟殿下居養德之辰天下屬望聰明睿智何所不察若稍加引納實廣德音臣曲荷財成濫蒙委任雲雨之施預霑於品物邱山之恩久越於涯涘懼速官謗罔置心靈不揆謏聞輕陳短見庶同纖壒敢類涓埃所冀增山之高裨海之潤臣元超頓首頓首死罪死罪謹言維上元二年夏四月已亥皇太子宏薨於合璧宮之綺雲殿年二十四五月戊申詔追號諡為孝敬皇帝八月庚寅轉遷葬於恭陵有司奏哀冊文曰赫矣皇統昭哉帝謨光膺寶歷大啓瑤圖昌原緬鏡隤址不渝欽惟妙質誕靈居震若木資芳咸池育潤韶襟日湛英姿嶽峻裕玉摛華鋪金協韻肇外作翰爰歸養德衢室成規軒庭稟則聖敬斯踐溫文匪忒傍照四方下貞四國虔誠問寢鳴謙齒胄洞掩儒城橫披禮囿璧流揚彩環林搴秀飛遁來儀鴻生入授率性謂道攸縱自天明踰視牘文冠題鞭裁山聳仞締席開延絶簡時繹精義咸甄豪飛紫露言控曬泉務殷監撫寄深社稷鮑俎不陳龍雋在側聰達有裕闕一字婉兼極瑜佩增輝金華動色乾慈衍渥乃眷儲皇惟天下之重器將釋負於巖廊竭因心之孝辭受終之禮蹐厚載以兢魂局層穹而攬涕沖旨逾懇神鑒不留少微告闕大漸無瘳方劭尊師之業奄從賓帝之遊嗚呼哀哉大象濳運灰飛緹幕輕霜霣兮文梓寒高飇起兮仙桂落未戢歸闕一字之燕空對棲關之鶴嗚呼哀哉玉露獻兆蜃隧合陰拖儀旌之委鬱翊羽騎之森沈轢湯渠而回騖指亳轍以遙臨楚挽驚而疑斷悲笳咽而復尋蕭索動風雲之氣蒼茫感天地之心嗚呼哀哉流日黯以西傾奔川渺而東度地擬橋山之曲闕一字如闕一字陌之路攀宇宙而無追仰音顏以纏慕嗚呼哀哉瀛區有變天柱終飛懷蒼梧而日遠望白雲而不歸沈沈隴樹漠漠泉闈竭闕一字音而載筆藹千祀而騰徽嗚呼哀哉仁貴絳州龍門人貞觀末太宗親征遼東仁貴應募從軍纍擢右領軍中郎將顯慶中以功封河東縣男乾封初進平陽郡公開耀中拜瓜州長史右領軍衛將軍檢校代州都督永淳二年卒年七十贈左驍衛大將軍幽州都督臣聞兵出無名事故不成明其為賊敵乃可服今泥熟仗素幹不伏賀魯為賊所破虜其妻子漢兵有於賀魯諸部落得泥熟等家口將充羡者宜括取送還仍加賜賚即是矜其枉破使百姓知賀魯是賊知陛下德澤廣及也孝源官中書舍人虙犧氏受龍圖之後史為掌圖之官有體物之作蓋以照遠顯幽侔列㣥象自元黃萌始方圖辨正有形可明之事前賢成建之跡遂追而寫之至虞夏殷周及秦漢之代皆有史掌雖遭罹播散而終有所歸及吳魏晉宋世多奇人皆心目相授斯道始興其於忠臣孝子賢愚美惡莫不圖之屋壁以訓將來或想功烈於千年聆英威於百代乃心存懿迹默匠儀形其餘風化幽微感而遂至飛淤騰竄驗之目前皆可圖畫且夫藝有精深學有疏密前賢品録益多其流大唐漢王元昌天植其材心專物表含運覃思六法俱全隨物成形萬類無失每燕時暇日多與其流商確精奧以余耿尚存賜討論遂命魏晉以來前賢遺跡所存及品格高下列為先後起於高貴鄉公終於大唐貞觀十三年祕府及佛寺并私家所蓄共二百九十八卷屋壁四十七所目為貞觀公私畫録又集新録官庫盡總二百九十八卷三百三十卷是隋室官十三卷是左僕射蕭瑀進二十卷楊素家得三卷許善心進十卷高平縣行書佐張氏所獻四卷褚安福進近十八卷先在祕府亦無所得人名並有天和年月其間有二十三卷恐非晉宋人真跡多當時工人所作後人彊題名氏時貞觀十三年八月望日序瑗字伯玉雍州三原人貞觀中纍官兵部侍郎襲爵潁川公永徽中遷黃門侍郎同中書門下三品拜侍中兼太子賓客為許敬宗李義府所譖左授振州刺史顯慶四年卒年五十四神龍元年武后遺制復其官爵古之聖主立諫鼓設謗木冀欲聞逆耳之言甘苦口之義發揚大化裨益洪猷垂令譽於將來揚休聲於不朽者也伏以褚遂良運偶升平道昭前烈束髮從官方淹纍稔趨侍階陛多歷歲年不聞涓滴之嘗覩勤勞之效加以竭忠誠於早歲罄直道於茲年體國忘家捐身狥物風霜其操鐵石其心誠可重於皇朝豈專方於曩昔且先帝納之於帷幄寄之以心膂德逾水石義冠舟車公家之利言無不可及纏悲四海遏密八音竭忠國家親承顧託一德無二千古凜然此不待臣言陛下備知之矣臣嘗懷此心未敢聞奏且萬姓失業旰食忘勞一物不安納隍軫慮在於微細寧得過差况社稷之舊臣陛下之賢佐無聞罪狀斥去朝廷內外氓黎咸嗟舉措觀其近日言事披誠懇惻蓋欲推陛下之德先於堯舜懼陛下之過塵於史冊而乃深遭厚謗重負醜言可以痛志士之心損陛下之明也臣聞晉武宏裕不貽劉毅之誅漢祖深仁無恚周昌之直而遂良被遷已經寒暑違忤陛下其罰塞焉伏願緬鑒無辜稍寬非罪俯矜微款以順人情悰貞觀中官御史遷右丞竊以大道鬱興沖虛之迹斯闡元風既播無為之教實隆未有身預黃冠志同凡素者也道士秦英頗解醫方薄間祝禁親戚寄命羸疾投身姦淫其妻禽獸不若情違正教心類豺狼逞貪競之懷恣邪穢之行家藏妻子門有姬童乘肥衣輕出入衢路揚睂奮袂無憚憲章健羡未忘觀徼在慮斯原不殄至教或虧請置嚴科以懲淫侈淳風岐州雍人明步天歷算貞觀初授將仕郎直太史局纍遷太史令高宗朝封昌樂縣男改祕閣郎中咸亨初官名復舊仍為太史令卒年六十九今靈臺候儀是魏代遺範觀其制度疏漏實多臣案虞書稱舜在璿璣玉衡以齊七政則是古以混天儀考七曜之盈縮也周官大司徒職以土圭正日景以定地中此亦據混天儀日行黃道之明證也暨於周末此器乃亡漢孝武時洛下閎復造渾天儀事多疏闕故賈逵張衡各有營鑄陸績王蕃遞加修補或綴附經星機應漏水或孤張規郭不依日行推驗七曜並循赤道今驗冬至極南夏至極北而赤道當定於中全無南北之異以測七曜豈得其真黃道渾儀之闕至今千餘載矣竊以三辟之重要君者為上彈曰沙門承恩入道非曰要君五刑之極非孝者無親彈曰親放出家詎為非孝耶是以悖德悖禮為大亂之本源彈曰僧等動依經教非悖德禮也唯敬唯忠乃經邦之正軌彈曰僧等雖形闕奉親而內懷其孝敬也禮乖事主而心戢其恩忠也至於老教虛靜資柔弱之曲全釋典冲和常不輕為普敬事如左威衛議中彈未聞慠慢君親矜夸衆庶彈曰沙門身具佛戒形具佛儀人天自仰寧是矜傲可以敦風勵俗安國寧家者也今令道士女冠僧尼恭拜君親於佛道無虧彈曰經云拜君揖君拜親揖親行敬違教孰曰無虧復從國王正法大革前弊深廢澆訛彈曰以順法為訛弊用違教為廢革可謂首燕適越背道逾多也使其永識隨順之方更知天性之重謹議太上三五太元金籙者即元始天尊傳太上大道君也號高聖太上玉晨元皇大道君道君傳紫清太素高虛洞曜三元上道君君傳紫晨太微天帝道君君傳紫明太微九道高元玉晨道君又傳太上老君太微天帝君之下玉晨道君傳紫元太微八素三元元晨元君君傳紫微元靈龜臺九靈太真元君君傳太靈上霄飛晨中央黃老君君傳太元東霞搏桑丹林大帝上道君君住搏桑傳二十真人中土絶傳紫晨太微天帝道君傳上清太平金闕帝晨後聖元元玉皇上道君前聖太上道君稱萬道之主號曰虛皇後聖太上老君稱萬道之君號曰玉皇自有金闕帝君官臣具足亦如世人君人臣之任各有主掌天宮九野皆周也君姓李名聃字伯陽改金籙名之曰太元三五金鎖流珠經籙正論履斗步綱之要籙有八十六篇四十三卷上詣太上老君號高聖太上玉晨元皇大道君請此四十三卷下傳世人係代為真君真君願度十天世界為上天神仙都玉京稱玉皇上帝也以自撰略為一十五卷正經及掌訣圖書論步綱躡紀之事總號之金鎖大名次流珠次飛步天綱次即禹步地紀傳二十卷與尹君君號後聖大法師左上卿卿傳方諸大真人皆佐後聖聖又傳後聖太師太微左真保皇道君後聖又傳九微太真玉闕上相大司命高晨師東海玉明青華小童道君後聖君又傳後聖上保司南極大丹元君紫元夫人夫人有二人一紫微夫人姓李後聖君第三女曾事清河王君小子也子為周穆王上宰相年百年而已性不於道著功夫人勸行履斗之法不行也君又傳白山太素真君後聖君又傳後聖上宰西極總真王君總真傳南極南嶽真人左仙公太虛上真赤君又傳侍帝晨領五嶽司右弻王桐柏真人王君佐後聖君後聖君再授元洲二十九真人各主諸方界闕奏合有仙功著仙聞於太平金闕後聖君便令教試依功給道可仙給仙可真與真其中除仙真外亦有三等上等著功者第一等者修身慎行謹言無妄修煉真心好樂經典讀誦立功香火連宵與人治患更遇六甲神符服而年深且得不死人中之仙矣再修得遇仙師授此圖經方以履步綱斗亦得為真人神仙第二等者好煉金石以為真至之藥效人疾病堅身理藏服餌於山間林藪亦遠萬壽百年不死死後亦不為下鬼便得託生受其本福第三等志心好道隨從明師不遠萬里捨心供力不憚勞苦年月深遠師自與言功記德即教此經傳授之後志心修行卻獲功德於師先得關奏後聖當與給道補為真人者多矣此三等說後聖告正一真人及總真王君金闕聖君又授紫微左夫人又下教授二十四真人升天為二十四玉京左右金闕上真宮御史臣又使王君總真下校授茆盈李仲甫等為司命君令教合道之志者當以教之盈以訓二弟及二許楊左六人盡以授修行此經也後以諸方仙真得者皆因此經或以天尊上真前聖虛皇上帝大道君授付或以前聖太上大宰道君所傳後聖元元玉皇帝大道君或分身再傳或以後聖大宰天師總真係代相授賜拔宅妻子俱升如此得仙真之衆或隱去或見白日上升者人數蓋多不可一一而書記也今以略舉相繼以為引首之目敘其前聖後聖金口所傳金籙玉圖流珠示引次用前後合行用依科排比篇名一一圖分折其祕要內訣引入其大道之門修行得者繼代付授後學高賢心命合仙之士即不得妄傳非人此引黑書者老君所授赤書者後聖君再言天師受告及王君傳録具一一注於書後篇目一一隨卷題配之夫神功造化大易無以測其源元運自然陰陽不可推其末故乾元資始通變之理不窮坤元資生利用之途無盡無源無末衆妙之門大矣無窮無盡聖人之道備矣昔者伏犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與天地之宜近取諸身遠取諸物於是始畫八卦以通神明之德以類萬物之情故可以探賾索隱鉤深致遠幽潛之狀不藏鬼神之情可見允符至理盡性窮源斷天下之疑通天下之志定天下之業冒天下之道可久可大逾遠逾深明本其宗致在於茲矣故曰天垂象見吉凶聖人則之天生變化聖人效之法象莫大乎天地變通莫大於四時懸象著明莫大乎日月是知天地符觀日月耀明聖人備法致用遠矣昔在唐堯則歷象日月敬授人時爰及虞舜在璿璣玉衡以齊七政暨乎三王五霸克念在茲先後從順則鼎祚永隆悖逆庸違乃社稷顛覆是非利害豈不然矣斯是實天地之宏綱帝王之壯事也至於天道神教福善禍淫譴告多方鑒戒非一故列三光以垂照布六氣以效祥候鳥獸以通靈因謠歌而表異同聲相應鳴鶴聞於九臯同氣相求飛龍吟乎千里兼復日虧麟鬬月減珠消暈逐灰移彗因魚出門之所召隨類畢臻應之所授待感斯發無情尚爾况在人乎余幼纂斯文頗經研習古書遺記近數十家而遭大業昏凶多致殘缺泛觀歸止請略言焉夫神妙無方義該萬品陰陽不測事同百慮故景星夜煥慶雲朝集二明合於北陸五緯聚於東井此乃表帝星之聖德順天下之嘉瑞也孛氣見於夏終彗星著於秦末或狗象而東墜或蛇行而西流此則呈執政之酷暴逆生民之禍應也殷帝翦髮沃澤千里宋公請殃熒惑退舍此則修善之慶至德可以禳災也劉裕作逆以長星為已瑞母邱起亂以蚩尤為我祥此則覆災之咎逆招天殃者也唐堯欽明懷山襄陵殷湯聖政焦金流石此猶日在北陸而沍寒日行南陸而炎暑月麗箕而多風月從畢而多雨此運數之大期非關於治亂者也荊軻謀秦白虹貫日衛生設策長庚食昴魯陽麾指而曜靈回駕荀子道高而德星爰聚此則精誠所感而上靈懸著也黃星出漢表當塗揖讓之符紫氣見秦呈典午南遷之應妖象著而殃鍾齊晉蛇乘龍而禍連周楚熒惑守心始皇以終流光墜地公孫遂隙此則先形以設兆也使流入蜀李郃辨其象客氣逼座嚴陵當其占芒碭之異氣常存舂陵之火光不絶或祲星楚幕氣兆晉軍此則當時旌象也周衰夜明常星不見漢失其德日暈晝昏女主攝政遂使紀綱分析權臣擅威乃令至柔震動景藏飛燕地裂鳴雉此則後事而星驗也是乃或前事以告寧或後政而示罰莫不若影隨形如聲召響凶謫時至譴過無差休應若臻福善非謬居遠察邇天高聽卑聖人之言信其然矣是故聖人寶之君子勤之將有興也咨焉而已從事受命莫之違然垂景之象所由非一占人管見異矩別規至如開基闡業以濟民俗因河洛而表法擇賢達以授官則軒轅唐虞重黎羲和其上也疇人習業世傳常數不足其所守妙賾可稱巫咸石氏公唐昧梓慎裨竈其隆也博物達理通於彞訓綜核根源明其大體箕子子産其高也抽祕思述軌模探幽冥改絃調張平子王興元其枝也沈思通幽曲窮情狀緣枝反幹尋源達流譙周管輅吳範崔浩其最也託神設教因變通奬亡身達節書理輔諫谷永劉向京房郎顗之其盛也短書小記偏執一途多說遊言獲其半體王朔東方朔焦貢唐都陳卓劉表郤萌其次也委巷長情人間小惠意唯財穀志在米鹽韓楊錢樂其末也參同異會殊途觸類而長拾遺補闕蔡雍祖暅孫僧化庾季才其博也竊人之才掩蔽勝已諂諛先意讒害忠良袁充其酷也妙賾幽微反招嫌忌忠告善道致被傷殘郭璞其命也自古及今異人代有精窮數象咸司厥職或取驗一時或傳書千載或竭誠奉國或嘉遁相時隱顯之迹既殊詳略之差不等余不揆末學集其所記以類聚編而次之採托英華刪除繁僞小大之間折衷而已始自天象終於風氣凡為十卷賜名乙已每於篇首各陳體例書不盡意豈及多陳文外幽情寄於輪廓後之同好幸悉豫心夫天災時多示有國之大端鵬弔用言為士民之妖怪一則作興衰之先兆一則垂警戒之別途陰陽有蹇驗之時人倫犯淫邪之蠧今古常事不必無之竊慮元蟲難究厭謝無方遂乃採風俗之見聞證先賢之事實並諸符録目曰怪書恐寖淩於萬古故招托為一家宣尼有不語之文民難登其壽域譙子造五行之諜事多中於國家覽之者無貽亂神之譏謹序夫天地昭然略無差忒思測不至占乃無驗苟能窮神知化視象玩占何所不驗歟立占之法本非襲休徵以塞咎故世治國安指象為災為君所戒以保邦於未危世變國亂推象探意察數究機以處身於無禍乃安中間危凶中閒吉之謂也通政經敷陳占條列例衆論非無指歸蓋以天象垂變察乎時政與上象意相符者為陳則占無不驗也又豈特拘指豈云虛言為一時之應歟故明列二十八舍列星三垣天地所主之事所司之分陳其休咎以五緯二曜變犯入守五相加臨以取專應故不書往者之占亦同為比類矣
