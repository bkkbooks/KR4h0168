front:
  text: 全唐文欽定全唐文卷八百九十三鐸事楚武穆王馬殷為從事起家都統判官及建國改為司徒衡陽王馬希聲用藩鎮之儀仍為判官文昭王希範立天策府學士鐸與其選
  hash: sha256:4d611e2f592679c0cc909a0bad607ea3285edb706786780e7ab190c00ec76cfc
  markers:
  - {type: head, offset: 14, content: 李鐸, id: KR4h0168_NFKB_893-h1, level: 1}
body:
  text: 散萬物者莫潤乎雨鈞百貨者莫細乎絲雨將應時既盈空而沃若絲將比密爰委質以棼之原夫清畢啟陰夕陽向暮散輕霞以成綺矗元雲而似布於是霢霂郊野霏微草樹蔽重霄之靄靄猶委緒風映遠岫之濛濛乍迷縠霧髣髴將久輕盈匪疎濛蔑浣紗之際浸淫濯錦之餘織婦停梭似曳乃輕之緒舟人罷釣疑牽或躍之魚由是揚素彩降碧虛忘機別天庭之睆彼拂鬢驚韶髮之皤如徒觀其散影有經分行無匹始斜足以色麗俄交反而勢密輕沾素服懷墨子之悲時遙隔布泉誤詩人之怨日皎皎容潔帛丿糸帛丿糸體微絕而復尋等蛛網而共挂垂之如墜連雪絮以輕飛仰之盈目紛如可矚彼時澤之長懸若天經之恒續秦臺蟻術豈惟珠曲乃穿湘浦燕飛不獨鳥方驚觸有以灑炎炎之苦有以慰蚩蚩之俗且晴晦之異圖牒之祥則有雲如繒以遙列星曳練而可望布霑霈而莫能與比齊帛丿糸密而曷足其相彼龍見而方雩與決雲而齊給或流電而未止或破塊而併集曾未若汗漫於率土之濱表王言之澤及天何言哉萬化斯該嵗云秋矣傷心不已起凉風於四面飛斷雲於千里爾乃高天氣爽寒日光清下翠樓以迴矚見白露之晨生向珠網以添淨依玉階而助明如霜未結似雨還輕點庭蕪而葉重滋園菊而花榮歌湛則周詩入興凝甘則漢載留名故色貴含秋光宜汎曉既騰文於地上復垂容於筆杪煙澹彩而的的月籠華而皛皛豈若華山之際童子受於囊中金莖之端仙掌承於雲表况乎胥臺發色軒邱降祥紅蘭受而彌潔綠葵含而轉芳初益巨海終晞太陽既隨時以隱見還任物以行藏爾其無林不沾無草不羃薤上流彩林中湛液思蟬飲而曉潤旅鶴警其宵滴詞人賦矣已凝冷以淒清君子履之又傷心而怵惕感斯露而揣稱媿才殫而莫析者也恒本姓元避楚景莊王偏諱改姓拓跋武穆王時以學士兼僕射衡陽王罷建國之制降稱節度判官文昭王開天策府置十八學士恒首與其列殿下長深宮之中藉已成之業身不知稼穡之勞耳不聞鼓鼙之音馳騁遨遊雕牆玉食府庫盡矣而浮費益甚百姓困矣而厚斂不息今淮南為仇讎之國番禺懷吞噬之志荊渚日圖窺伺溪洞待我姑息諺曰足寒傷心民怨傷國願罷輸米之令誅周陟以謝郡縣去不急之務減興作之役無令一旦禍敗為四方所笑思覲為楚文昭王牙將累官天策副都軍使諫文昭王不聽扼喉而死先王起卒伍以攻戰而得此州倚朝廷以制鄰敵傳國三世有地數千里養兵十萬今天子蒙塵朝廷無主真霸者立功之時誠能悉國之兵出荊襄以趣京師倡義於天下桓文之業也奈何耗國用而窮土木為兒女之樂乎今四海分裂中原之地纔十數州而大王克紹先業為諸侯之長未聞折一馬箠為天子計愚臣所以為恥也惟大王思之宏皋事楚武穆王由營道令累遷都統掌書記文昭王開天策府與十八學士之列王薨宏皋定議立廢王為嗣恭孝王爭立執宏皋臠殺之粵以天福五年嵗在庚子夏五月楚王召天策府學士李宏皋謂曰我列祖昭靈王漢建武十八年平徵側於龍編樹銅柱於象浦其銘曰金人汗出鐵馬蹄堅子孫相連九九百年是知吾祖宗之慶緒帛丿糸遠則九九百年之運昌於南夏者乎今五溪初寧㣥帥內附古者天子銘德諸侯計功大夫稱伐必有刊勒垂諸簡編將立標題式昭恩信敢繼前烈為吾紀焉宏皋承教濡毫載敘厥事蓋聞牂牁接境盤瓠遺風因六子以分居入五溪而聚族上古以之要服中古漸爾羈縻洎師號精天相名姎氏漢則宋均置吏稱靜溪山唐則楊思興師遂開辰錦邇來豪右時恣陸梁去就在心否臧由巳溪州彭士憗一作士然世傳郡印家總州兵布惠立威識恩知勸故能歷三四代長千萬夫非德教之所加豈簡書而可畏亦無辜於大國亦不虐於小民多自生知因而善處無何忽承間隟俄至動搖我王每示含宏常加姑息漸為邊患深入郊圻剽掠耕桑侵暴辰澧疆吏告逼郡人失寧非萌作孽之心偶昧戢兵之法焉知縱火果至自焚時晉天子肇創丕基倚注雄德以文皇帝之徽號繼武穆王之令謨冊命我王開天策府天人降止備物在庭方振聲明又當昭泰眷言僻陋可俟綏懷而邊鄙上言各請効命王乃以靜江軍都指揮使劉勍率諸部將付以偏師鉦鼓之聲震動谿谷彼乃棄州保嶮結砦憑高唯有鳥飛謂無人到而劉勍虔遵廟算密運神機跨壑披崖臨危下瞰梯衝既合水泉無汲引之門樵採莫通糧糗乏轉輸之路因甘衿甲豈暇投戈彭師杲為父輸誠朿身納我王愍其通變爰降招攜崇侯感德而歸周孟獲畏威而事蜀王曰古者叛而伐之服而柔之不奪其財不貪其土前王典故後代蓍龜吾伐叛懷柔敢無師古奪財貪地實所不為乃依前奏授彭士憗溪州刺史就加檢校太保諸子將吏咸復職員錫賚有差俾安其土仍頒廩粟大賑貧民乃遷州城下於平岸溪之將佐銜恩向化請立柱以誓焉於戲王者之師貴謀賤戰兵不染鍔士無告勞肅清五溪震讋百越底平壃理保乂邦家爾宜無擾耕桑無焚廬舍無害樵牧無阻川塗勿矜激瀨飛湍勿恃懸崖絕壁荷君親之厚施我不徵求感天地之至仁爾懷寧撫苟違誡誓是昧神祇衞於子孫庇爾族類鐵碑可立敢忘賢哲之蹤銅柱堪銘願奉祖宗之德宏皋仰遵王命謹作頌焉其詞曰昭靈鑄柱垂英烈手執干戈征百越我王鑄柱庇黔黎指畫風雷開五溪五溪之險不足恃我旅爭登若平地五溪之眾不足憑我師輕躡如春冰溪人畏威仍感惠納質歸朝求立誓誓山川兮告鬼神保子孫兮千萬春士憗天福中溪州刺史右據狀溪州靜邊都自古已來無違背天福四年九月蒙王庭發軍收討不順之人當都頭將本營諸團百姓軍人及祖父本分田場土產歸明王化當州大鄉三亭兩縣苦無稅課歸順之後請祗舊額供輸不許管界團保軍人百姓亂入諸軍四界劫掠竝盜逃去戶人凡是王庭差綱收買溪貨并都幕採伐土產不許輒有庇占其五姓主首州縣職掌有罪本州申上科懲如別無罪名請不降官軍攻討若有違誓約甘請准前差發大軍誅伐一心歸順王化永事明庭上對三十三天下將宣祗為證者遵度青州人初依楚文昭王馬希範後徙居金陵高尚不仕夫太華維嵩作鎮周秦之地峨嵋劍閣僻臨卭蜀之區曷若峻極於天廬山列五嶽之次欲光於世棲賢居四絕之右其或秀生賢哲氣噫風雷控五嶺而壓三秀匯岷江而瀦蠡澤泉飛黃石千尋之長劍倚天雲吐鑪峯一炷之檀烟上漢石梁與塵寰不接紫霄信日月可親懷山襄陵文命導百川而屆此千乘萬騎漢皇馭六飛以躬臨既如此廬山不得不稱其嶽也若乃五乳峯左謺石澗西屏展層巒狀五老飛星之所門臨三峽聽大禹鑿龍之聲香積具而谷震文魚比毳侶賓而風傳金錫龍潭當戶甘澤與法雨齊飛禪客臨軒師子共象王接武又如此則棲賢不得不名其絕也按張僧鑒潯陽記云姬周初匡俗先生屢逃徵聘結廬此山真人羽化於紫烟弟子指山為廬岫又按張密九江新舊錄云棲賢寺本在州南二十三里齊永明七年諮議張希之造隋末始廢洎唐寶歷初給事中李渤以廬宮是棲隱之所遂捨舊宅以建精藍奏置舊廢寺額仍請先歸宗智常禪師以居焉檀越處仁信之域覩空王而發心菩薩啟圓頓之門馭五乘而接物紹遠公之能事皆唐代之偉人當其海眾雲臻法幢峯立如聲召響目擊道存應物隨緣薪盡火滅法須有主代不乏賢謝山和尚聞法鼓銷聲慮慧日長沒出彼林下來此山中而後照覺禪師再光祖席佛巖大士繼闡宗風今筠長老去來不住彼我兩亡解龍濟之髻珠得清凉之心印源本清而任撓鏡鑑物而忘疲蓮社嘆三草將枯密雲不雨黃屋念釋門無主百堵誰興眷彼名山在乎宸斷應明詔者其惟師歟繇是虔奉綸言遂成素志遽辭丹闕深入白雲師乃乘般若舟遊一真性海愍狂子病灌一味醍醐接引大心眾生俱入華藏世界處㣥華而不自異即煩惱以為菩提賓至如初棟橈畢葺龍集辛酉天子省方千官扈從萬乘啟行大明昇沖六合皆照東風扇律四海維新龍舟纔艤於星灣天步俄登於雲岫心存億兆豈思石槨之堅牢志在寰瀛不問瑤池之遠近瞰雙崖而壁立聽驚湍而雷吼橋橫虹斷危若飛動乃顧謂筠公曰吾愛天下生靈視如巳也豈可使出塵之士來往而履險乎勿憚暫勞須求永逸目顧頤使規模立成仍宣御庫錢二十萬以充其費焉既而雲罕未移勾陳尚駐覽布金之勝㮣揖潄玉之清湍茶烟裊而乳竇飄香禪悅味而虛室生白實釋門之盛事為信史之美譚玉輅言旋緇徒蕆事眾人役役因善價而沽諸伐木丁丁俄梓材而如積屹若神化皆從聖謀朱欄修且直大厦壯而麗馬師皇過此免更乘龍鄧隱峰經行不勞飛錫其新橋依舊以三峽為名又於橋之北建駐鑾亭寺之後改觀音巖為宴聖巖皆先皇駐蹕之所也召伯聽訟國風歌其勿翦叔子去荊峴山存乎墮淚况明明哲后垂二十載覆燾於烝民者哉遵度大袖裦衣以登晉用聞先歸宗之出世恨不同時慕李給事之為人各逢明主而又於筠長老有林泉之舊因御命如瀟湘之遊云欲立貞珉將直書其實以文見託不敢多辭其詞曰廬山天柱五老峯前地如靈隱寺號棲賢山中何有百物生焉寺中何有俊哲居焉江湖會同天文星紀控越連巴東南之美鼓震雷動觸石雲起何必崇朝滂沲萬里芙蓉積翠帝子三宮九峯峨峨秀出雲中龍潭水黑錦谷霞紅吉甫生周不獨惟嵩十八名賢首稱慧遠江州使君書讀萬卷禪師知常竹林一作木之院一言道合法無關鍵指茲舊院建彼祇園上棟下宇寶幢勝旛師子一吼孰敢興言以心印心如篪如壎那含如來圓寂覺路世界無邊非佛不度迦葉慈悲愍眾生誤了真妄源絕生死怖謝山欽因依紹能仁心如太虛本絕埃塵龍濟實相傳之於筠清凉法海秋月一輪聖主知賢詔居茲寺入七葉巖當法王位為述正言與悟息意四執無着是不思議龍集作噩時維小康翠華順動眷被山光造舟為梁八鸞鏘鏘雲溼寶軿谷散天香三峽嵌空雙崖如朿直下百尺飛流噴玉橋危飛動路險巴蜀念彼遊人履茲深谷將易舊制俄成久圖既壯且麗皆遵睿謨莫測天心蒼生是虞欲使萬物安如覆盂亭思駐蹕巖紀聖遊南方徯后碧嶂難留唐祚千葉唐年萬秋惟山與寺配天齊休昱字就之吳越忠獻王長子累遷彰武軍節度使宋師討江南為東面水陸行營應援使從忠懿王朝宋歷授郢州團練使咸平二年卒年五十七贈太師封富水侯若夫非常之人必有非常之事者眾所聞矣其或功及於國道濟於民生居土茅沒饗廟食者求諸前史罕有其倫是以黃石立祠皆因遺跡沔陽致祭實表舊功故聖人之制也法施於民則祀之以勞定國則祀之苟無所稱實曰誣祭惟忠懿王豈誣祭歟公名審知字詳卿姓王氏本瑯琊人秦將翦三十四代孫高祖煜唐貞元中為光州定城宰有善政以及民因遷家於是郡遂世為固始人矣曾祖友贈光祿卿王父蘊玉贈祕書少監父恁累贈至太尉光州刺史十圍巨木始從厚地以盤根九曲洪河本自仙源而析派若匪降神之氣豈生命世之才公即太尉季子也形質魁秀機辨明敏負英雄之氣者必相交友學韜鈐之畧者咸詢智謀懸知五典之書暗合萬人之敵遠近服其義勇鄰里推其孝弟常有善相者詣公之門視其昆弟三人曰富壽皆一體也而季當位極人臣自是公竊負之尋遇陟岵興悲在原軫念恭事孟仲嚴若父焉乾符末鯨網全疎鳧毛屢落摩牙吮血中原正苦於傷殘脫耒裂裳四海盡疲於征戰公蓄慷慨之氣負縱橫之才每或撫髀暗驚彎弧自誓曰大丈夫不能安民濟物豈勞虛生乎於是以俟時待價之闕一字抱拯溺救焚之志豪俠相許寢食不忘雖大鵬未飛已具垂天之勢而神馬一躍終同追電之蹤屬王緒者憑巢寇之戈矛盜霍邱之土宇遽言得志遂啟無厭但思於弱吐強吞豈顧其幸災樂禍因乃大掠部屬旁闕三字復收士民以廣隊伍於是公之昆季咸與焉及秦宗權竊弄五兵遍侵四境緒內乏嬰城之計外無善鄰之助遂率眾以作竄欲避地而偷安玉石俱焚孰能分別豺狼當路無匪縱橫幸豫章懦怯之中偶番禺殘害之後凡經藩翰靡或支吾自潮陽抵漳浦百姓畏其塗炭五馬避其鋒刃豈知兵忌不戢人慎無恒狃蒲騷者終至敗亡妨草竊者焉能長久動蓄自疑之志轉乖同義之心適當軍眾不賓遂為部下所害公素敦誠信累涉艱危既負出㣥之材仍諳武事之術且兵不可以無主將不可以失人眾遂推公而立之公居下惟謙事長必順雖輿情之有屬在公論以不忘乃曰予早事二兄常若嚴訓豈有弟為大將兄居其下者乎遂奏長兄潮以帥其眾仍獲清源為所理之地公由是惡道途之多梗憤貢賦之不通實欲致理一方剋平㣥盜外惟征繕中則經營運籌之勝負豫知攬轡之澄清可待大順冬闕四字廉察遽亡兵馬使范暉奪符印以自尊奉題緘而不遜恣行誅戮罔事綏懷人既類於倒懸時合當於逆取公比緣觀釁以因得徵詞遂舉勤王之師以伸弔民之義躬事戈甲身臨矢石一年而圍闕四字年而堅壁遂陷范暉扁舟欲遯疎網難逃遂為海人梟首以獻公既殲元惡乃布優恩凡曰脅從悉命宥過用仁信以御下行慈惠以恤民會未浹旬已聞致理百姓愛之如父母三軍畏之如神明又能成功不居讓德無愧遂迎長兄潮遷理是郡復請仲兄邽迭居舊邦武肅王表率諸侯蕩平大憝吳越盡歸於賜履江淮咸奉於專征以其能務忠勤遠求薦擢遂奏授本道廉察及泉州符印借命焉尋朝廷以寰海挺災久勞我武東南靖亂獲庇吾民俾提旄鉞之權闕二字襦袴之惠遂升本州為威武軍授潮節度觀察處置等使仍以公為節度副使獎勳績也洎元昆殂謝眾庶歸依公乃躬受遺言式俟朝命明年春帝恩遠降人欲是從初授公檢校刑部尚書威武軍節度兵馬副大使將委什連之任攸居貳職之勞一之日訓習驍雄二之日蘇息疲瘵用心數月善政聞天於是進端揆之資正元戎之位齋壇高築軍幕大開分州司屏翰之權握從闕一字鼓鼙之任未幾顯居使相闕一字錫戶封方隆推轂之寄尢藉秉鈞之力當多難未弭聊同指臂之相須及具瞻有歸實賴股肱之別用式資補衮俾重褰帷天復元年載正乾綱重光帝座言念七閩之地闕一字符八柱之功特頒渥恩用越倫等賜武庫㦸十二枝列於私門非恒例也自是日鍾百祿嵗逢九遷公致君愈勤述職無怠萬里輸貢川陸不繫其賒一心尊戴風雨不改其志昭皇累嘉忠節別錫異數欲酧懋德豈限彞章天祐元年夏四月封琅琊郡王食實封一百戶尋屬龍蛇起陸戎馬生郊人心不厭於有唐天命已歸於新室公知微不爽居闇罔欺梁祖之即位也纔傾作解之恩繼舉疇敷之典三公互拜萬戶連封呂尚帝師之尊官榮既極子儀中令之貴考限惟同尋復進封閩王加福州大都督長史迨莊宗之建王業也神京克復㝢縣咸寧欲敦柔遠之心先下念功之詔遂增井賦仍改功臣式覃北闕之恩用係南門之寄公方推拱極既效安邊惟治民素屬於憂勤而得疾遽從於帛丿糸篤百齡無效五福先全以同光三年十二月十二日薨於正寢享年六十有四朝廷素欽盡節俄覽遺文既增憖老之悲豈慳錫終之典冊贈尚書令諡曰忠懿禮也公生當離亂之運出值艱難之秋割據一方蓄養百姓得深溝高壘之固有披堅執銳之眾贍水陸之產通南北之商鑄銅於蜀山積粟於洛口者不足言其富也連臨淄之袂投淝河之箠者不足言其庶也至若外涵大度內用小心慎刑既及於精詳舉事悉從於簡畧犯則不赦令比秋霜之嚴恩本無私惠如冬日之煖民惟道化吏以法繩此可以稱善為政矣言必皆中行罔自欺非正詞不入於聰非公事不宣於口居常無聲色之樂平生以禮義自守念十家之產者躬行節儉懷五子之歌者心誡荒唐每當爍石之威未常操扇纔屬雞鳴之後早見嚴裝以德報恩遠逾萬里至誠感物動契百神此可以稱善立身矣興崇儒道好尚文藝建學校以訓誨設廚饌以供給於是兵革之後庠序皆亡獨振古風鬱更舊俗豈須齊魯之變自成洙泗之鄉此得以稱善教化矣懷尊賢之志宏愛客之道四方名士萬里咸來至有蓬瀛謫仙鴛鴦舊侶或因官而忘返者或假途而借去者盡赴築金之禮皆歸簪瑁之行其餘草澤蒐羅魚車待遇者固不可勝紀此得以稱善招納矣尊天事地奉道饗神無非克誠足以監德然而素欽釋典大廓法門眾善皆臻何德不報無漏上智苾蒭散布於諸方有作良因伽藍遍滿於樂國煉即山之堅固鑄丈六金身鎔麗水之光輝寫五千祕藏事非為巳願乃庇民此得以稱善求福矣功惟理亂志在盡忠安不忘危常為持險之誡小當事大罔違與國之道以至覆盂數郡高枕三邊雖昆彭致霸之儔未能繼踵在佗燮自尊之患固不同風此得以稱善守位矣且天惟祐德民本懷仁公饗富貴者三十年傳冊封者四五世遺愛銘於人口忠節出於國史臣子之盛不亦大乎迨茲陵谷變遷箕裘廢墜寂寞闕以時之薦淒凉同乏祀之悲士農工商慕舊政以如在潢汙蘋藻望遺廟以不存丙午嵗我師恤鄰闔境嚮化遇今大元帥吳越國王位鍾壓紐運偶負圖當保大定功之初行興滅繼絕之義既克寧於民庶思咸悅於鬼神每念閩川所歸本由王氏而盛雖子孫異代已同薰燼之香而春秋二時宜陳籩豆之禮遂命以公舊第為忠懿王廟仍參常祀之數霸主爰修於廢祭藩侯遂立於叢祠行馬㦸枝尚存故物豚肩尊酒蚤薦惟馨塑山庭月角之容立偕老于飛之像庭廡未同於工績槐檀旋改於光陰舊徑難尋已絕羅含之蘭菊重門長閉但多仲蔚之蓬蒿既乖興廢之儀殊闕致誠之所大宋開寶七年秋九月大元帥吳越國王以時和嵗豐家給人足俾答福謙之佑遂申咸秩之典凡曰祠廟毀廢競出錢帛修完乃命衙直將躬授人工旁材植補遺基而皆備易舊物以咸新曾未踰時已云告畢奢儉得以中度規制得以合禮朱軒粉壁隨晚霽以生光修竹喬松向寒霜而叶色挺曹筆則陰兵欲動聞郢工則神馬欠嘶步從悉周精靈如在矧以故鄉將吏開幕賓僚當其草昧干戈屢經勞苦洎自拊立臺構盡饗崇高乃塑都押衙建州刺史孟威等二十六人以配享焉斯廟也前瞰清流右連淨剎一路自無於塵雜四鄰皆屬於幽奇曉霧纔開先露列窗之岫疎鐘雖近不驚繞樹之禽公昔也常游宴於斯今也復祠祭於此始易宅而為廟矧將廢而能興苟非陰德不衰令名未朽又豈能身歿之後有如此之盛乎昱叨居是藩獲畢斯事仰嘉猷之未遠聽遺愛以長新爰屬短裁庶存實錄燕然敘事雖有謝於孟堅峴首感人亦未多於叔子乃為銘曰極天曰嶽惟嶽有神蓄是靈氣生為異人干霄利劍瑞世祥麟爰當季運實庇烝民唐德將衰㣥雄欲出陰霧垂地秋氣蔽日豺豕猖獗萑蒲縱逸苟非偉才焉濟王室權為巨盜緒亦朋姦欲亂中夏首屠光山誰為英傑同罹險艱終則竄跡能無厚顏爰率部民同徂萬里緒為眾惡公得眾美因戮兇人遂奉君子立功著名自此而始漳浦既寧清源復平遂以政事授於難兄孝實至性謙惟直誠靜可揖讓亂則經營憤彼閩川拊茲裨將苛虐漸篤政刑俱喪銳旅大驅凱歌連唱克定一方式諧眾望始參貳職已播殊勳屏翰之美朝廷備聞迨居重鎮繼事明君盡忠竭節松茂蘭薰偃仰大藩廕庥五郡雖曰功庸亦由時運二柄齊舉七德兼訓令子令孫當年振奮真王重望上相清規陵谷雖變馨香不衰俯緣甲第遂立嚴祠年禩屢易籩豆或虧霸主推恩良時有待舊廟克新遺蹤不改奐爾金碧儼然神彩靈貺芳名千秋如在
