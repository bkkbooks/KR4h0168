body:
  text: 臣亮言伏見聖製故司空鄭國公挽詞十首詞窮清曲理備哀傷漢武北管之書更慙追遠魏文南皮之歎取愧悼與辰緯而相暉隨鍾石而俱振魏徵早逢興運譽美當朝為聖主之賢臣預能官於多士出納通顯憑藉寵私忠誠所到心力同盡而逝水不追清徽永謝樹碑荒壠已叨相質之文哀歌泉路復降高堂之曲事重一時榮流千載臣趨侍學林竊觀睿藻不入玉山屢逢盈尺如遊珠水常覩照車慶抃之深唯知舞蹈不任下情臣亮言臣聞堯鼓納諫舜木求箴茂克昌之風致升平之道伏惟陛下應千祀之期捄百王之弊平壹天下劬勞帝業旰食思理廢寢憂民用農隙之餘遵冬狩之禮軨車之所遊踐虞旗之所涉歷網唯一面禽止三驅縱廣成之獵士觀上林之手搏迴玉鑾而藉豐草引金陣而滿平原盡心目之娛翫罝罘之樂發彫弓而迫狡兔飛勁矢而摧高鳥斯固畋弋之恒規而皇王之壯觀至於親逼猛獸臣竊惑之何者筋力驍悍爪牙輕捷強弩一發未必挫其凶心長㦸纔撝不能當其憤氣雖復孟賁在左夏育居前卒然驚竄事生慮表如或近赴林藂未填坑谷駭屬車之後乘犯宮騎之清塵小臣怯懦私懷戰慄陛下以至聖之姿垂將來之教降情納下無隔直言臣叨逢明代遊宦藩邸身漸榮渥日用不知敢緣天造冒陳丹懇上觸宸嚴伏增戰越典同置臬晝參諸日中之景夜考之極星或告其越司視事詞云知無不為判定之方中作為宮室紫微夜視考太乙之常居黃道晝參取羲和之亭午於是審曲面勢置臬懸衡各有典司乃無詢於梓匠越其樽俎翻見作於同律晉雖不競楚勿與知侵官有刑罪將安捨不司宗伯之事妄為荀息之詞人亦有言自貽伊咎竊伏下風久揖高義有懷靡託於邑良深春暮清和道體休納弟子植生多幸早預法緣近於華嶽創立僧宇此山蘊蓄奇祕控接烟霞削峰累仞靈泉百丈神仙以為勝地賢哲之所同歸結構雖淹禪誦猶寡厥道興廢宏之在人且棟樑三寶必資龍象之力羽儀四眾尤待鴛鷺之㣥法師等學洞經典譽宣真俗實宜共化蒼生升於彼岸且遠人屈已存乎應物大德忘名唯在伸教理必宏濟無隔遐邇仰願俯從微請降迹來儀則釋遠禪居遙蹤可擬王珣精舍清塵不沫是所願也是所願也若夫大塊均形役智從物情因習改性與慮遷然則達鑒窮覽皎乎先覺照慧炬以出重昏拔愛河而升彼岸與夫輪轉萬刧葢染六塵流遁以徇無涯蹐駮而趨捷徑豈同日而言也潁川庾初孩早宏篤信以為般若所明歸於正道顯大乘之名相標不住之宗極出乎心慮之表絕於言象之外是以結髮受持多歷年所雖妙音演說成誦不虧而靈源邃湛或有未悟嗟迷方之弗遠睠砥途而太息屬有慧淨法師博通奥義辯同炙輠理究連環庾生入室研幾伏膺善誘乘此誓願仍求註述法師懸鏡忘疲衢樽自滿上憑神應之道傍盡心機之用敷暢微言宣揚至理曩日舊疑渙焉冰釋今茲妙義朗若霞開為象法之梁棟變㣥生之耳目詞鋒秀上映鷲嶽而相高言泉激壯赴龍宮而競遠且夫釋教西興道源東注世閱賢智才兼優洽精該睿旨罕見其人今則沙門重闡籍甚當世想此元宗鬱為稱首歲惟閹茂始創懷袖月足厂田坴仲呂爰茲絕筆緇俗攸仰軒葢成陰扣鐘隨其小大鳴劍發其光彩一時學侶專門受業同涉波瀾遞相傳授方且顧蔑琳遠俯視安生獨步高衢對揚正法遼東真本望懸金而不刊指南所寄藏㣥玉而無朽豈不盛哉豈不盛哉建平文雅休有烈光懷忠履義一作抱義身立名揚才兼藻翰思入機神當官勵節奉上忘身古稱益友允光斯職蘊此文辭懷茲諒直軍諮諧噱超然辨悟正色于庭匪躬之故道高業峻神氣清遠學總書林文兼翰苑志古精勤紀言實錄臨名殉義餘風勵俗儒術為貴元風可師儔學非遠離經在茲道充列第風傳闕里精義霞開掞辭飈起李侯鑒遠雅量淹通清言析理妙藻推工賢哉博識穆爾清風游情文苑高步談叢篤行揚聲雕文絕世網羅百世並包六藝猗與達學蔚有斯文氷霜比映蘭桂同芬六文科籀三冬經史家擅學林人游書史槐市騰聲蘭宮游道抑揚辭令縱橫才藻薛生履操昭哉德音辭奔健筆思逸清襟言超理窟辯折談風蒲輪遠聘稷契連蹤業敏游藝躬勤帶經書傳竹帛畫美丹青劉君直道存交守信雅度難追清文遠振師古字籀雍州萬年人高祖朝授中書舍人專掌機密太宗即位拜中書侍郎封琅邪縣子遷祕書監宏文館學士貞觀十九年卒年六十五諡曰戴惟奇卉之靈德稟國香於自然儷嘉言而擅美擬貞操以稱賢詠秀質於楚賦騰芳聲於漢篇冠庶卉而超絕歷終古而彌傳若乃浮雲卷岫明月澄天光風細轉清露微懸紫莖膏潤綠葉水鮮若翠羽之㣥集譬彤霞之競然感羈旅之招恨狎寓客之流連既不遇於擥採信無憂乎剪伐魚始陟以先萌鶗雖鳴而未歇願擢穎於金陛思結蔭乎玉池泛旨酒之十醞耀華燈於百枝緬尋遐代詳觀往冊五勝質文三正沿革亂多化尠明寡晦積炎精既淪大運斯斁茫茫率土黯焉已夕皇矣大聖誕受天符雲飛九域電擊八區共工慝斃鹿妖除枝換斯撤欃槍靡餘建武戢刃偃伯衅車蠲苛削密求瘼恤隱琴瑟更張銜策俱盡滿堂已樂聲誦猶軫扇暍垂仁泣辜流憫吏勉端潔民歸愿謹肅恭禋祀祇事上天永惟孝享式備吉蠲外崇耆耋內睦親婣歲時縑纊春秋醴饘㷀嫠是恤痾瘵斯痊閭閻外戶馬牛內广既畎畝相移康莊交讓勿用桴鼓無虞亭障賮納鮫人朔班狼望至誠感慶休氣致祥馴擾一角棲集五章華平挺幹朱草曜芳良耜畟畟多稌穰穰國儲億庾家登萬箱旄彼髦彥任仗忠力光被心膂列居槐棘如砥之平如矢之直淑慎微務精明品式菁菁者莪芃芃彼棫修容禮闈翺翔書圃談極五際翫慕三古杳眇義窟恢台學府儒墨兼陳申韓迭去豈資伯亮寧勞封鉅德音高朗絲言昭普黃竹麗章柏梁清引沈鬱淡雅疎通敏迅抽演闕文網羅遺韻孰登奥室罕窺牆仞妙心洞達神筆允從磥硌新勢奮發奇鋒珪稷鈎婉露散煙濃竦同企鶴蔚若據龍豈唯於趙信乃過鍾道惟天縱藝兼人術用而不知速而不疾至德無象微言罕術玉裕桂宮金植蘭室禮極敬愛行歸忠一天下文明日月貞觀百神受職三靈叶贊泰階既平光華常煥超軒跨昊騰周軼漢萬壽無疆永延遐算第一道問天生蒸庶樹之司牧立化成俗闡教宏風譬璽印之抑塗若盤盂之置水汙隆各隨所齒方圓在其所制夏后尚忠之政固以率服萬邦殷人先敬之道亦足儀型百姓亟從革變靡定沿襲所貴雖殊同歸於乂先聖設法將不徒然厥意如何佇問詮釋第二道問夫雜用霸道不純德教是非稽古何以稱強權宜一切寧可垂訓其理隱微其說安取且設官分職非賢不任知人則哲惟帝難之良由言行相違名實乖舛情態難覩蘭艾莫分藻鏡銓衡若其混糅如何審綜察茲優劣八觀之術往彥所陳七繆之郵非無前說澄汰糠粃其可必陳何謂七繆宜具條錄勿致闕遺又西京課吏其法何以鄴洛考功眾議孰得且公卿巳下員祿素定量其閒劇職務纔舉而散官一色多乏器幹縱非鄙弱則有疵瑕至於銜命諸方承旨出使按察撫勞絡繹相趨若差職事之人則於官曹闕廢如其專遣冗散又致前塗虧失彼此難周未能通允欲施何法使得兼濟又二代寮寀大數幾何用官詳備遣人可觀準望聖朝繁省何若自秦及漢掌外使者何人當塗典午出邦畿者何職書傳所說可得而言職達化方久應商畧既無礙滯悉俟敷陳第三道問潔已以進陳諸往冊平康正直彰乎前訓修身勵操俱曰可稱攝職當官何者尤切必能兼善其利溥哉互有所長宜甄先後今既舉茲二事欲委共康廣扇清風大矯流俗施行條教可用率下使人懷氷玉之心家有素絲之節軌物昭範佇觀表儀若在姬周號稱多士嬴氏居位亦有賢人誰修廉潔之道孰當正直之舉爰及兩漢魏晉已來歷載遐長廉直眾矣其間尤異凡有幾人必須具列姓名分條事迹無或非當意狀殊違先古有言惟德作乂既充廉潔之選又應正直之科誠宜追蹤曩人尚想同志並驅前烈誠可比肩仰企高山誰者弗逮當仁不讓寧假撝謙近取諸身豈或涯分無而為有是則非廉虛美雷同又乖正直兼茲學植理必該通原始要終當盡宏博第四道問學以從政昔賢令則博文強識君子所尚結髮升朝敷袵受職開物成務率由茲道是以登高能賦可列大夫試諷籀篇乃得為史然而算祀悠邈載籍實繁鑽仰雖多罕能擇練今將少論古昔庶異見聞勿用浮辭當陳指要九流七畧題目何施八體六書名義焉在三皇五帝諸說不同列次分區誰者為允翠媯元扈臨之而安得綠純黃玉所表其奚事陰康驪畜行序孰當封鉅大填胡寧游處彤魚昌僕出何典誥窮蟬聲望厥類惟何管仲文錦既醜何貴子產深鍊實厚何俾周鼎所存識者幾物齊鐘所釁卒用何牲罷絀諸侯何名三十六都褎貶將相何謂三十二人至如象葉之精乎棄日木雞之巧乎異端著於簡牒何所沮勸學綜古今想宜究悉一二顯析無憚米鹽第五道問八政所先食貨居首萬商之業市井為利菽粟稻粱饑饉足以充口布帛絲纊寒暑足以蔽形生靈所資莫此為急爰及室宇器械同出五材皆稟造化之功取者得供其用而龜貝之屬何故為寶競取而多誰所創意錢幣之作本以何施億兆賴其何功政教得其何助若夫九府之法於何貿遷三官所統又何典掌未知乘時趨利濟益深淺起偽生姦有何虧敗九府之名欲知其九三官之號何等為三宜各指陳務令可曉子紺稱貴文飾何如赤仄殊形以何間錯又賣穀極賤則農夫劬勞而不給糴價翔踴則工商窘乏而難振為政之道患在不均設法籌算去其太甚使夫荷鍤擁耒阡陌之用獲饒作工通財倉廩之儲不匱又糴三舍一起自何人以母權子云誰所建各申何法厥利焉如今欲修之孰可孰不可亦宜辨說不可曖昧佐時經國此亦一隅既膺斯舉何所興讓聊動翰墨豈申餘勇臣某等言守太常少卿崔敦禮至京師俯降神筆曲垂誨奬祗奉欣戴伏深抃躍臣等詳觀史策歷選前王損益相承質文遞變遺風餘烈昭然可觀自堯舜之後殷周已降政道踳雜淳風斯寢干戈日用喪亂宏多悠悠千載莫能澄廓况乎有隋失德區宇分離九鼎几飛八紘魚爛圓首方足俱委骸於原野蹠實排虛同取斃於兇毒亂極則治命實有歸河清啟期天祚攸底陛下獨運神武援手濡足陶甄庶類屈已忘勞日月之所照臨天地之所覆載皆受更生之賜俱荷裁成之力加以留情庶政昧旦丕顯掃滌煩苛澄清禮樂遠邁開闢之功牢籠帝王之表時和歲稔玉燭遐被嘉祉靈貺金英自臻朱明炎暑聊因多暇蹔迴鸞蹕巡幸甘泉伏承攝衞攸宜聖躬萬福下情慶幸率土咸賴臣等材質康陋謬荷超擢俯循薄劣懼不克堪謹當夙夜戰兢自相勗勵竭心罄力以酬鴻造使百僚率職仰副天心四方祇勉俱稱慈澤臣無任臣師古言伏見宣勅別將薛子雲竇善衞二人釋禁引見此實陛下聖德寬仁垂恩宥過固非愚慮所能測量然臣之區區竊有管見犬馬微志不敢隱默臣聞殺生威權帝王之所執而憲章法律臣下之所奉子雲等身居五品足知禁令捕獲罪人已就拘執計其本犯又非死刑遂乃違法恣心擅行殺戮是無憚也詐云格殺表奏求賞是罔冒也陛下付法司推窮事須歸實而遞相枝蔓希冀恩澤挾偽干真是要君也自古節義之人亦有讓死之事皆為臨危遇厄事不獲已愛敬君親兦身棄命豈如子雲等明白故犯懷詐藏姦朋黨比周違經亂法於義無所取於禮無所勸其罪不可恕其源不可開且法司之體職當察獄義無縱濫不得阿容二人雖則讓辜王司須定實罪不言殺人之道何者合坐專述相讓之辭以為盛美亦非守職務據正法也若使二人皆承則不知罪之所在如其二人並諱復欲何以斷之臣聞愚者之言聖人擇焉脫有可採伏願許察輕塵聽覽伏增戰慄臣師古言臣伏聞前年陛下親發聖慮將降明勅博問卿士議欲封建斯誠天機獨悟妙策深遠既合事宜實惟治要然而議者不一各執異端或欲追法殷周遠遵上古天下之地盡為封國庶姓㣥官皆錫茅社或云凋弊之後人稀土曠封建之事並未可行此皆不臻至理兩失其中何者今古異俗文質不同不可空採虛名以乖實效若即廢罷州縣分為列國無功而受封爵庶姓而專臣吏非直於理不合亦自制度難成至於磐石之基實資藩屏皇枝帝子維城是寄伏以漢祖撥亂懲艾前失大啟九國雜行霸道規模宏遠歷祚延長近代澆浮不樹宗子雖有王侯之號了無藩輔之實故易為傾動顛而不扶前哲往賢論之已備臣愚以為當今之要莫如量其遠近分置王國均其戶邑強弱相濟畫野分疆不得過大間以州縣雜錯而居互相維持永無傾奪使各守其境而不能為非協力同心則足扶京室陛下然後命分諸子各就封之為置官僚皆一省選用法令之外不得擅作威刑朝貢禮儀具為條式一定此制萬世永久則狂狡絕暴慢之心本朝無怵惕之慮臣輒獻愚管伏聽採擇塵黷非宜退增戰懼惶恐謹言明堂之制陛下已發德音久令詳議但以學者專固人人異言損益不同是非莫定臣愚以為五帝之後兩漢以前高下方圓皆不相襲惟在陛下聖情創造即為大唐明堂足以傳於萬代何必論戶牖之多少疑階庭之廣狹若恣儒者互說一端久無斷決徒稽盛禮昔漢武欲草封禪儀博望諸生所說不同莫知孰是惟御史大夫倪寬勸上自定制度遂成登封之禮臣之愚誠亦望陛下斟酌繁省自為節文不可謙讓以淹大典昔周武王之時天下太平遠國歸款周史乃集其事為王會篇今萬國來朝至如此輩章服實可圖寫今請撰為王會圖將封先祭義在告神且備款謁之儀方展慶成之禮固當為壇下阯預申齋潔贊饗已畢然後登封既表重慎之深兼示行事有漸今請察於山下封於山上四出開道壇場通儀南面入升於事為允今請山上圜壇廣五尺高九尺用五色土為之四面各設一陛御位在壇前升自南陛而就行事舊藏玉牒止用石函亦用書盛篋笥所以或呼為石篋然其形大質重轉徙非易岱宗儻無此石皆應取自他山所以不為混成累輯而作大要在於周固藉其縝密而近代儀注更名石䃭䃭非稽古之文本無義訓可尋贏縮之間貴在折中不煩紛議更增疑惑今請方石三枚以為再累其十枚石檢刻方石四邊而立之纏以金繩用備檢約凡言封者皆是積土之名利建分封亦以班社立號謂之封禪厥義可知今若置牒壇上止因累石不加繕築即以為封匪唯嚴祕之道有如簡率亦乃名實不副理恐乖爽今請於圜壇之上安置方石封印既訖加五色土築以為封高一丈二尺而廣二丈金玉重寶質性堅貞宗祀嚴禋皆充器幣豈嫌華靡實貴精確况乎三神壯觀萬代鴻名禮極殷崇事資藻縟玉牒玉檢式韞靈琦傳之無窮永存不朽至於廣袤之數足以載文辭緘束之方務在申膠固今宜立制隨時損益豐功厚德既以跨躡前蹤盛典宏規無勞一遵曩式今請玉牒長一尺八寸廣厚各五寸玉檢厚二寸其印齒疎密隨印大小距石之設意取牢固本資實用豈云巧飾今既積土厚封更無差動天長地久寧假支持斜設橫安請並弗置勒石紀號垂裕後昆美盛德之形容闡后王之休烈其義遠矣其事尚焉我皇聲暢九垓威橫八極靈祇不愛其寶兆庶無得而稽但當贊述希夷以攄臣下之至具祭壇之例登封之所肆覲萬國受記百神固宜刻頌顯揚功業至如小距環壇石闕別樹事非經據無益禮儀煩而非要請從減省神靈璽寶而弗用由來無所施行其六璽雖以封書莫不披於㣥下受命之璽登封則用昭事上元表茲介福休徵緯兆豈因常貫又封檢之璽分寸不同即事而言請並更造既順肅虔之理永垂創制之名禪壇制度請從新禮行事儀式亦並依之自外委細不載於文者職在所司隨事量定議曰謹率愚管具錄如前庸疑之言不足觀采但封禪大禮舊典不存秦漢以來頗有遺跡闕而不備難可甄詳昔在元封倪寬專贊其決逮乎光武梁松獨尸其事搢紳雜議不知所裁至如流俗傳聞記注臆說未嘗從事徒有空言乖殊不一曷足云也且夫沿革不同著之前誥自君作古聞諸往冊方今台鉉佐時遠超風后秩宗典職追邁伯夷究六經之妙旨畢天下之能事納於聖德稟自宸衷果斷而行文質斯允文苑英華載別本同異詔旨集公卿及儒生學士議登封事謹依訪聞具件如右但封禪大禮舊典不存秦漢以來頗有遺跡闕而不備難可甄詳昔在元封時主博採㣥論建武有司亦稟成規至如記注近書委巷浮說不足憑據無所取材且夫沿革不同著於往冊自君作古實惟令範聖朝丕業方貽萬載臣下庸蔽不敢專決請垂鑒察克斷宸哀謹錄奏聞伏聽裁擇謹議近奉德音俾令革嘉名創立實宜允副伏惟聖祖宏農府君宣簡公懿王並積德累仁重光襲軌化覃行葦慶崇瓜瓞詩云濬哲維商長發其祥言殷之先祖久有深德虞夏二代發禎祥也三廟之樂請同奏長發之舞其登歌則各為辭太祖景皇帝迹肇漆沮教新豳岐胥宇之志既勤靈臺之萌始附詩云君子萬年永錫祚允今遐遠之期惟天所命以長福祚流於子孫也廟樂請奏永錫之舞代祖元皇帝丕承鴻緒克紹宏猷實啟蕃昌用集寶命易大有彖曰其德剛健而文明應乎天而時行言德應天道行不失時剛健靡滯文明不犯也廟樂請奏大有之舞高祖太武皇帝膺期馭歷揖讓受終奄有四方仰齊七政介以景福申茲多祜式崇勿替誕保無疆易曰大明終始六位時成謂其終始之道皆能大明故不失時成六位也詩有大明之篇稱文王有明德廟樂請奏大明之舞文德皇后厚德載物凝輝麗天易曰含宏光大品物咸亨言坤道至靜柔順利貞資生庶類皆暢達也廟樂請奏光大之舞謹議伏承詔旨欲太原立高祖寢廟博達卿士詳悉以議聞伏惟聖情感切永懷纏慕思廣蒸嘗事深追遠但究觀祭典考驗禮經宗廟皆在京師不欲下土別置至若周之豐鎬並為遷都乃是因事便營非云一時別立其郡國造廟爰起漢初率意而行事不稽古源流漸廣大違典制是以貢禹韋元成匡衡等招聚儒學博詢廷議據禮陳奏遂從廢毀自斯以後彌歷年代輟而弗為迄今永久按禮記曰祭不欲瀆瀆則不敬書云禮煩則亂事神則難斯並睿哲之格言皇王之通訓况復導揚素志實昭懿則俾遵儉約無取豐殷今若增立寢廟別安主祏有乖先旨靡率舊章垂裕後昆理謂不可誠以天衷不遺至性罔極固宜勉割深衷俯從大禮則刑于四海式光萬代列採搢紳僉曰惟允謹議竊以明堂之制爰自古昔求諸簡牘全文莫覩起自黃帝降及唐虞彌歷夏殷迄於周代各立名號別創規模衆說舛駁互執所見鉅儒碩學莫有詳通斐然成章不知裁斷究其指要實布政之宮也徒以戰國從橫典籍廢棄暴秦酷烈經禮湮兦今之所存傳記雜說用為準的理實蕪昧然周書之敘明堂記其四面則有應庫雉門據此一堂固是王者之常居耳其青陽總章元堂太廟及左个右个與月令四時之次相同則路寢之義足為木括又云王居明堂之篇載帶以弓韣於祠高禖下九門磔禳禦止疾疫置梁除道以利農夫令國為酒以合三族凡此等事皆合月令之文觀其所班皆在路寢者也戴禮昔者周公朝諸侯於明堂之位天子負斧扆南鄉而立明堂也者明諸侯之尊卑也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即太寢也尸子亦曰黃帝曰合宮有虞氏曰總章殷曰陽館周曰明堂斯皆路寢之徵知非別處大戴所說初有近郊之言後稱文王之廟進退無據自為矛盾原夫負扆受朝常居出令既在皋庫之內亦何云於郊野哉孝經傳曰在國之陽又無里數漢武有懷創造廣集搢紳言論紛紛終以不定乃立於汶水之上而宗祀焉明其不拘遠近無擇方面孝成之代表行城南雖有其文厥功靡立平帝元始四年大議營起孔牢等乃以為明堂辟雍大學其實一也而有三名金褎等又稱經傳無明文不能分別同異中興之後蔡邕作論復云明堂太廟一物二名鄭元則曰在國之陽三里之外淳于澄又云三里之外七里之內景已之地穎容釋例亦曰明堂太廟凡有七名其體一也苟立同異競為巧說並出自胷懷曾無師祖審夫功成作樂治定制禮草創從宜質文遞變旌旗冠冕古今不同律度權衡前後莫一隨時之義斷可知矣聖上大啟崇基光膺寶運功高開闢之後德邁邃古之初鳳紀龍官譬畎澮於溟渤隨山鍊石慙培塿於方壺大樂與天地同和豈奏曩時之韶夏大禮與天地同節寧踵前代之膠庠天縱多能睿喆宏覽總五行之秀氣抱六義之菁華秩宗茂典皆取必於宸極共工妙術咸禀訓於深衷隱顯無違洪纖必應百神受職萬物斯覩將建明堂爰降絲綍規矩之度久已蓄於聖懷遠近之宜實不惑於僉議假如姬旦舊章猶當擇其可否宣尼彞則尚或補其闕漏况乎鄭氏臆說淳于謏聞匪異守株何殊膠柱昔漢謹封禪博召諸生則乖戾多端事乃依違累載惟倪寬先覺獻奏昌言獨斷之於天子於是制詔始下決策施行紹列辟之鴻明成天下之壯觀今既時和歲稔俗阜萌安兆庶子來鈎繩庀具揆景置臬良其會也愚謂不出墉雉邇接宮闥實允事宜諒無所惑但當上遵天時祇奉德音作皇代之典彞永貽則於來葉區區碎議皆可畧而不論悠悠常談不足循其軌轍謹議竊以肅恭禋祀經邦彞訓追遠念功歷代鴻典故當立文定制適事從宜垂裕後昆永貽憲則聖皇馭㝢元化醇深錯綜遺文苞括舊藝於穆清廟備孝享於吉蠲股肱良哉豫銘常之配侑爰發明詔俾命率由秩宗致請博謀僚列淺聞寡見無足觀採但禮經殘缺年載遐深傳習各殊執見靡一爾雅說祀禘為大祭公羊義大事為祫何休所釋又異鄭元然皆一配之文曾無重祝之證是非眾論雖曰踳駮隆殺二端厥趨可覩謹按祫者合食禘乃禘祭禘小於祫理則非疑商書稱從與於大享周禮著祭於大烝是知小祀不及功臣其事又無可惑魏晉以降莫不通行中間雖經差失梁朝又已矯正有齊立號朝宗河朔周氏命歷卜食咸陽修定禮義皆有憑據同遵此典未嘗革今欲更改實謂非宜六經莫見斯文三雍不顯其跡悠悠之論蔑足云也且夫無豐於眤昔賢著誡黷則不敬祀典明文徒見異端假從臆說煩而非當於義無取又尋古之配祭皆在於冬據其時月益明非禘况乎臣之立功各因所奉享祀之日從主升配禘之為祭自於本室廟未毀者不至太祖之庭君既不來而臣獨當祀列對揚尊極乃非所事豈容山河之誓務乎殷重霜露之感從於簡畧論情即理孰曰可安今請祫配功臣禘則不豫依經合義進退為允謹議原夫服紀之制異統同歸或本恩情或申教義所以慎終追遠敦風厲俗輕重各順其適名實不可相違喪過乎哀承象之明訓其易寧戚聖道之遺旨所議兩條實為舛駁特降絲綍俾革遺謬歷代之所不寤儒者於是未詳超然元覽獨昭深致竊以舊館脫驂尚云出涕鄰里有殯且輟巷歌况乎昆弟之妻嚴親是奉夫之昆弟貲業本同遂乃均諸百姓絕於五服當其喪沒闔門縞素已獨晏然元黃莫改靜言至理殊非宏通無益關防實開淪薄相為制服孰謂非宜在昔子思宣尼之冑為位哭嫂事著禮文哭既施位明其慘怛苟避凶服豈曰稱情又外氏之親俱緣於母母舅一列等屬齊尊姨既小功舅乃緦服曲生異議茲亦未安秦康孝思見舅如母語其崇重寧非密戚三月輕服靡副本心愚情為昆弟之妻服當五月夫之昆弟咸亦如之為舅小功同於姨服則親疎中節名數有倫帷薄之制更嚴內外之序增睦至如舅姑為婦其服太輕冡婦止於大功眾婦小功而已但著代之重事義特隆饋奠之重誠愛兼極畧其恩禮有虧慈惠猶子之婦並服大功已子之妻翻其減降又是厚薄乖衷義理相形以類而言未為允協今請冢婦朞服眾婦大功既表授室之親又答執筓之養叔仲之後諸婦齊同則周洽平均更無窒礙矣謹議突厥鐵勒皆上古所不能臣陛下既得而臣之請皆置之河北分立酋長領其部落則永永無患矣
