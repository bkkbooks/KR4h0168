front:
  text: 全唐文欽定全唐文卷一百四十七亮字希明杭州錢塘人初授秦王文學預十八學士之列貞觀初為宏文館學士拜通直郎散騎常侍十六年封陽翟縣侯卒年八十八贈太常卿諡曰康
  hash: sha256:bc68391e321afd36bf7f982eb49676662860c567c172ef52bd12787389ac9837
