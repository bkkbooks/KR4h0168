front:
  text: 全唐文欽定全唐文卷五百四十六肅貞元時官國子司業出為浙東觀察使
  hash: sha256:dc9c87c1391939ef05ee7e3710fc0c2a21214a65325faec67c3b7aa37f4ebe89
  markers:
  - {type: head, offset: 14, content: 裴肅, id: KR4h0168_NFKB_546-h1, level: 1}
body:
  text: 爾雅為六經文字之楷模老子是聖人元微之奧旨請勒天下明經進士五經及明一經進士五經及諸科舉人依前習道德經者宜準天寶元年敕處分應合習爾雅者並準舊式履貞貞元七年進士辟雍之裁教化之方辟者象旋圓而不極雍者以流轉而有常行於歷代創自前王崇此乃理廢之斯亡革斁剗澆何莫由之而克著化人成俗靡不因茲而允臧公宮之南靈臺之下赫巍峨以層構規制度於衆寡區別遠采於虞庠經始不差於周雅闡揚學校旁求儒者溫良恭敬之士資於父以事師俊造茂異之倫必自朝而逮野尊卑有秩禮教是崇取乎年均式序不以地高為雄隨其局貴賤之義自別尚乎齒少長之儀有融然可以闡皇化彰國風允叶扣鐘之教克成琢玉之功寧止夫聞天者比於鳴鶴居陸者喻夫漸鴻而已爾其學習以時詩書興教惟司成是典惟古則是效詔夏弦春誦俾民不僣養三老五更俾民知孝惟胄也太子齒矣惟學也元后視之合語於此釋菜有時以崇其道以尊其師俾百工允理庶績咸熙抑前古之是賴伊茲禮之是持德貞行芳達其名以取譬泉流波注立其義而在茲由是金革可偃淳朴斯返所謂深其流者濬其源茂其末者固其本至矣哉辟雍之旨也大辟雍之教也遠可同乎不騫不崩豈俾夫損之又損至矣哉元冬之季茲池可觀臨方塘而霜容既肅照圓月而素色兼寒凝為水碧潔若琅玕迫而窺乍驚飛於繞鵲俯而察寧失顧於回鸞若乃日暮雲晴蒼然色正冰彩旁射蟾輝下映的皪兮地布明璫曈曨兮天垂朗鏡則雖隨侯之珠皎而潔和氏之璧光且淨曷比夫動資文士之興載悅吾人之性觀夫寒空若晝清漏且長透珠簾而庭戶增媚浮玉樹而園林借芳攬之則無誠偶形於顧兔視之若有徒積素於飛霜故能潔通宵之寒氣凝徹底之清光既而空色相鮮餘華昭晰嚴風吹而不散沍陰生而轉潔偏使閨婦增思征人愴別望隴上之嬋娟怨池中之凜冽又能使空門禪客除昏滌暝對之而虛白生襟觀之而神形自瑩嗟乎時之革物物感人心俾閒放者取而適性勤苦者對以愁吟則知冰月之宜靡極沿變之趣彌深原夫幽院添池晴峯繞竹幾處堪賞千般寓目加之以清冰素魄復何愧深山窮谷佇月令之必賦冀同出乎西陸靈臺崇崇兮洞轇轕以帛丿糸延中有珍木兮鬱森森以芊芊始殊形以分聳終共理而連拳始信德以被物初應聖而效焉且學為教原丞為糾局生於學者表王化之大同植於廳者知官政而無曲亦所以據於德而遠於俗也樂我皇道彰我聖年謂為交柯乃尋本而無末謂為別幹能已離而復連依君仁義之圃對君翰墨之筵俾為我師者如斯木之一德為我曹者如斯木之相全故瑞不虛然從化而止化不在遠行之由已有善必應詎云草木之無知惟德是親奚問陰陽之至理可以載美青史可以表慶皇家人各有心我則合而為一物曲有利我則不避其邪夫如是則造化之理易尋天地之情可測順之則生瑞逆之則成慝故曰禍淫湎福正直諒物情之效祥由人君之布德故得托根講肄之宇垂陰夫子之牆雜庭槐以為列偶仙杏而成行逢聖而生匪由乎日月以翼取端為寶孰尚夫金玉其相所謂光乎泰階允臻靈貺不然者則徒聞其說孰究其狀至矣哉觀一樹之攸同知四夷之內向我國家學校崇崇創石經於其中用啓千年之聖將遺萬古之風元化式敷厥德既彰於有截聲詩再闡斯文庶表於無窮既而招學苑之徒命他山之役陳滿笥之文雅結峻天之遠碧且曰道自人宏教由時易若不考深旨勒貞石布落落於廣庭陳巖巖於千尺則何以表吾道之不騫見伊唐之有赫者哉由是雕搜之功備矣文質之義昭然鑿寒光而嶄嶄迭映駢古色而字字相宣儼彼貞規韞玉之姿益壯窮諸墨妙崩雲之勢彌堅事既叶於造微理乃符於托實削成豈勞於執壁立更逾於散帙旁分鳥跡且非精衛之銜來遠映天光有若媧皇之補出可謂洙泗之風不墜而教化之道益敦鑽仰苟同於深奧咫尺可見於微言五色參差夫子之文章盡在丹楹俯瞰聖人之閫閾斯存豈非吾君秉茲一德修文臨極堅貞為庶士之規考禮作百王之式既而辨舛錯而定魯魚然後二三子是效是則國家誕敷文命建學崇政置六經於屋壁作㣥儒之龜鏡翦遺文以辨謬俾雅誥以詳正是以儒業益敷皇風載盛斆學既闡廓宇斯分飾素壁而照月構丹梁而結雲於是集青襟之侶延鴻儒之㣥貞八索起三墳採典謨之淪翳次編之繽紛稽古至今從百家之正義歸真背僞俾四海之同文於是博考㣥臣宣明舊典既科斗之互缺亦魚魯之相舛依鳥跡而難從訪蛇形而莫辨定茲金規程邈之隸書遵彼古文參史籀之大篆然後命鍾張之藝詔文學之官界四壁以繩直揮五色之毫端粲爾其彩昭然可觀雖一勞之克定乃千載之不刊錯綜既備班列有次欲昭明於六書先裦貶於一字俾去顛訛之惑用全述作之意苟不絶於韋編將永齊於石記至於止戈為武反正為乏將為後生之式必憲先王之法爰及垂露懸針鶴頭蚊足酌前修之楷模為後來之軌躅瞻彼垣牆代茲牘篇章煥炳文雅照燭正以先王之修則曲禮三千習以孔門之徒則冠者五六所謂一人作則萬國儀刑光我廊廟異彼丹青示人範於古訓正國常於典經既文明乎天下宜遠域而來庭著絶藝者積功而成窮物理者因心而明觀彼庖丁之游刃合夫天道之至情運心術於妙用得元技於惟精相彼牛兮雖完體斯在於我目也而折俎已呈豈不以因功之深為志所使揮無厚以合度投有閒之中軌積就之妙既由乎月將操割之微亦依乎天理若動不導窾任非由已則必授夫力劬孰能免夫目視始吾於牛也膚革未充筋骸靡窮心無所措其利手無所施其功惑臂臑之原本迷脈腠之要終動既多悔勤而未通逮三載以積用乃一朝而發蒙今吾於牛也察其博碩考其小大不俟刃解自將神會定貴賤之骨若委地而在前視血膋之膏雖表革而無外信功著而理貫乃道成而情泰遂得不遵蓮鍔不合桑林騂騂之軀折如應手角戢角戢之角割若愜心此乃變化斯探視聽靡濫美候明而咸見雖處幽而無暗夫人之修業頗亦象諸能元通而理達則疑釋而誤虛別有技業目牛得同碩鼠取勢行止喻義庠序竊學見賢思齊敢望惟仁是與儻王庖之可待願發硎而延佇惟道路兮此有其紀綱在昏曉兮用警於行藏設彼鼓節以為人防俾守度而知禁咸順時而嚮方觀其四門洞達九逵攸長不有司扃則政或以荒不有式遏則人或以襄粵惟聖唐作法茲始岐路分職里閈對峙萬井如棊三條若砥樹鼉鼓也罔不式遵命武賁焉各慎所履日入於酉俾於行者止斗回於天警夫居者起惟其度數自合銅龍之漏節其晝夜不失金烏之晷豈比夫繁於手盈於耳而悅彼姝者子乎每司晨而不必候時而後動聲坎坎而旁殷遐邇氣雄雄而中遏煩偬通塗廣陌萬戶千扉晨應雞鳴夕催人歸牛羊下時迎暮煙而斯發河漢云沒伴曉色而漸微此乃守常有則守矩不違一厥人兮人懷其信齊厥政兮政絶其非不然者則是或見訛下無所楷使六歷時謬萬夫聽駭是知街之設也所以通達幽深鼓之懸也所以發揚聲音豈獨警其當路亦用革其非心職是司者爾罔不欽無先天兮以欲敗度無後天兮則人匪忱別有養蒙以居惜陰為寶遊藝鄒魯觀光咸鎬每聽喤喤之聲實樂平平之道敢課虛而進牘聊體物而摛藻藻字緯乾莆田人貞元七年進士官嶺南節度副使瑤池洞徹兮堅冰始攢元天皎皛兮皓月初圓冰含虛以凄冷月委照而光寒既合體以凝質故清輝而可觀爾其氣肅而徑色虛而淨俯視則湛若玉壺仰觀則爛如金鏡履之者可以慎其矩步玩之者可以滌其情性嘉乎清熒旁達曈曨交映閒樓臺則素色彌分出河漢則清光寥敻良吏觀我以思飲墨客覽我以興詠懿夫鑒照無隱盈積有方纖埃翳而必見衆象照而難藏晃兮奕奕耀兮彰彰奪銀河之曉色掩水鏡之秋光於時㣥動已息寒夜未央微雲度月以淡蕩細柳拂池而悠揚晶耀兮環林之際朗練兮孤亭之旁月周天兮有虧池擁冰兮難決月在則光瑩月沈則光滅彼冰也非無自然之色我取映月而增潔此月也非無自然之光我取籠冰而加徹斯乃以淨臨淨不瑩自瑩精氣交而上浮光彩融而入暝夫如是至人遇之而暢襟貪夫對之以勵心豈徒皎皎然罔象炯炯爾照臨而已哉向若月隱西峯冰藏深谷焉得解吾人之昏滯悅志士之心目彞京兆府副解元戎帳外兮何者雄躡絶電踏追風於是千旗已合萬馬既匝槍壘環回轅門洞開紛熒熒以照雪殷嶫嶫以隨雷嚴鼓齊蒼山破一夫唱萬人和寒笳既鳴攢騎無聲左右交入奔騰迸集鴻洞戢孴陰森嶷岌揮鐵騎以突空上金鞍而屹立輪寶刀以直視拔長劒而端揖奔鯨絶海旋巨浪以尚遲餓鶻翻身寫長風而未急於是神仙惝恍鬼怪呼吸擺金甲而乍寒噴玉花而半濕膂力既剛雄風莫當擲紅旗以顛倒按白刃以熒煌霍火蒦滅沒離披頡䀪引山河之奔走隨波蕩以低昂訝夫臲卼纍跡從容自適互辟易沸霹靂豁千重以萬重乃左射而右射餘疑掉青絲繫練影叫天閽揮落景雲旗一簸翻古塞而半飛畫㦸雙盤寫長風而自冷况復騰勇氣耀紅塵倚精誠而張膽仗忠信以扶身妙能傑出其大絶倫感平生之顧遇睹性命之逡巡既見知於挺特寧有力於依因得逢堯舜之代以備爪牙之臣恨武場之尚狹局高步而難伸皆曰若更渡交河絶大漠藏鐵羽銷金錯橫穿馬邑雷鼓出於地中直上龍城將軍忽如天落引皇風之披靡蕩殺氣以澄廓不離旗旆長隨衛霍鞭八方之戎羯豁萬里而開拓騁輕趫之俊藝突沙塞以取樂壯觀呈肅然清揚大旆入舊營蘭之生兮不以無人而不芳被廣澤森回塘和寡調高未儷郢中之曲神符夢叶終傳鄭國之香贈靈修於南浦襲嘉慶於北堂於是芊眠茂宛靡迤秋坂紉而為佩騷人之意已深閒以在襟楚客之情何遠薄秋風而香盈十步泛皓露則花飛九畹豈衆草之敢陵幸移根之未晚若乃吳山清兮天氣新湘水碧兮楓岸春煙轉緑蕙波搖白蘋榮曲沼之初蓮遺天涯之美人離別經時歎孤芳於秀質艷陽可惜悵獨立於良辰復有映金砌羅玉戶分竹宮疏蕙圃因風而起不隨彼茁之蓬擇地以生能殊有杕之杜宜其比同心於先哲冠美名於前古蘭在幽兮其芳滿叢士守業兮其道未通入提攜固在於高賞播酷烈當跂於下風寧使凋急景於散地迫嚴凝於歲終况復光陰慘烈冰霰淒切靜而處順不得近於階墀長未當門獨遣冒於霜雪豔歇紅暗莖萎紫折懼鶗鴂之先鳴掩氛氳而頓絶於戲蘭與艾兮異味薰與蕕兮殊途一室之人雖當執我之契十年之臭尚可攘公之羭囂然此道何有何無嗟乎蘭無薰兮搴擷之所不及士無文兮聲華之所不立儻一借於韶光庶餘香之可襲域中之寶生乎天涯天子之馬産乎渥窪澤出騰黃獨降精於太乙神開滇壑固不涉於流沙目散電兮彪駮喙含丹而虎呀躡紅雲而噴玉霑赤汗以攢花望兮以久來何晚耶應圖合牒光我帝業星通兩瞳月貼雙頰四蹄曳練翻瀚海之霜華一噴生風下胡山之木葉然後絡以金羈拂於鱗鬐睛射紫焰梢垂緑絲凝驕欲嘶嚼淒鏘之玉勒謺影不顧紛偃蹇之朱旗皇矣帝徹漢綱斯闕憑百萬之精徑倚四夷之磔裂屠蒲梢而亘大漠指二師而求汗血謂滅沒之未來竟羈縻而不絶有生必感有感必通通也不極環之無窮彼潢汙之斗水乃幽贊於神功然後豗沙卷浪於馮夷之宮謺足側身於奫淪之中星精降兮河嶽動天駟入兮駑駘空嗟武皇之英特而牽其惑欲能敗度侈多涼德夏后九代越天地之紀穆皇八駿荒帝王之則而况金通月支價及疏勒悉復馳去終無所得此余吾之降生解倒懸於中國祈招愔愔式昭德音感激萬古淒涼至今願以求馬之人為求賢之使待馬之意為待賢之心遜字友道趙郡人客居荊州第進士元和中纍除京兆尹改國子祭酒檢校禮部尚書為忠武軍節度使長慶元年進檢校吏部尚書徙鳳翔入為刑部尚書三年卒年六十三贈尚書右僕射諡曰貞越州好山水峯嶺重謺邐迤皆見鑑湖平淺微風有波山轉遠轉高水轉深轉清故謝安與許詢支道林王羲之常為越中山水遊侶以安之清機詢道林之高逸羲之之知止雖生知者思過已半烏知其又不因外獎積成精潔邪妙喜寺去郭二十里而近通舟而到積水四滿樓臺在中觀其林叟漁者小艇短楫求贏而來得志而返濯足擊汰聲滿山谷又有丹素佳禽弄吭清流劈波投空一一遠去時從事四五人天氣清爽同登共覽因思羊叔子在襄陽好風景出鈴閣罷漁獵登峴山今古在懷獨立無對存有令德歿有令名君子哉遜賴聖時欽明寰海無波進無若人之才退獲若人之逸登山望水思泯幽寂雲霞草樹橫在一目非敢追蹤羊公亦復長揖王謝矣時有從事李翺僧靈徹請紀故琢於片石云時元和八月十五日記羽江東人貞元八年進士第二人歷官樂宮尉佐彼美明水含精自天孤影流輝乃凝空作潤萬靈來享故為酒稱元所以貴新滌慮殷薦告虔水本涵清表至深之心著明以比德惟馨香之義全想夫含氣遙空成形永夜出陰鑒則凝清自美對明燭則搖光相借至誠所感同就濕而流大饗是資若待神而化斯可謂至精無眹明誠有孚泛清月而乍融乍結洗輕煙而若有若無潤而鮮見湛露之濡金鏡皛兮潔類清冰之在玉壺至若高天委秋皎月分彩氤氳既合精粹斯在方昭德以降神異趨下而歸海是知嚴而敬者其德大潔而祀者其福倍繄景命之不渝豈成功之不宰原夫明水之初化也天子齊心司烜蕆事望靈月露陰燧皎皛浮光清泠在器自無而有知靈化之不測應感而來知神物之斯至其或崇國祀設方明備禮樂潔粢盛用陶匏之器薦繭栗之牲秩神祗而配坐望天地之含精匪明水而神不降無明水則祀不誠是以明處作離水居為坎諒明水之潛化本陰陽之所感其名也合五行之德其用也冠三酒之功泊爾味淡凝然色融至馨無臭至潔含空則是水也與靈物幽通嗣初貞元八年進士皇上尊教本旌藝能徵鄉舉里選之人則哲俾含光抱素之用必稱故講信修睦之徒坦然宏大謙光素履之士赫爾昭升時乃正月初吉鄉老旁戾奉牘之詞詣闕傾葵藿之心獻歲且曰君不可以獨理必敷求以兼濟賢不可以失時故修已而獻藝惟古訓之是式叶周官之舊制自家刑國率是道而克明選賢與能誠致遠之不泥逖覽虞舜稽古唐堯明揚側陋惠訪庶僚由是金鏡朗玉燭調禮崇儉約樂奏咸韶致王道之易易啓賢路之昭昭豈不以道不遠人宏之在我察言行之枝葉執禮義為韁鎖惟仁是與諒俾善以交修在邦必聞非據德而孰可斯實義光前古道冠百王德政者介爾以昭進學殖者暗然而日彰賤不遐遺邦教以順乎九有下無沈抑聖謨猶洎於萬方矧乎職有司存令申先甲能自上而下下誠德優而化洽是以敦育德禮窮經激浮惰以食力耨甫田於拾青片善罔遺君子何辭於在野芻言式衆多士必見其盈庭吾君於是納遠謀守至正欽若前典申錫時命曰酌爾之素德竭爾之文行俾敷奏沃余一人而聲教加乎萬姓是亦尊賢以崇德致君而齊聖丕休哉揭捍之道成君人之大柄復禮貞元八年宏詞第一人珠行藏兮與道為鄰政善惡兮感物生神私以務貪必去土而匿耀光之崇儉則還浦而歸淳我政無纍匪求而至宛若中流昭然明媚對三光而分色契一德而潛致盈虛無眹不隨月魄以哉生往返有孚殊異奔星之出使徒見其表跡罔知其奚自覩映水之新規謂沈泉之初棄為人利也且一貫以稱珍與衆共之雖十斛而不匱然知此珠之感惟政是隨當政至而則至偶俗離而則離人而無道兮不去何以人而有德兮不復何為止舊浦而可採同暗投而在斯質若纍纍疑點綴於霄漢色仍皎皎終炫耀乎漣漪且夫彼邦政悖我則為不居之物彼邦政間我則能應道而還豈專巨蚌是剖實惟無脛而走將不貪以共存非甚愛之能守浦之不吝任變化以往還珠之員來辨政理之姦不誠可以孚明可以久處沙泥而有光知進退而不苟利用溥博何必取之於龍頷報德宏多奚由得之於蛇口其來也所以輔正其去也所以戒貪警循良之夕惕俾傲很以知慙勿以珠為蘊蓄勿以珠為珍好且還浦而難期且離邦而難寶將守之而勿失在間邪以存道何上天之默默有鈞天之可名蓋德至而則至從無聲而有聲和樂發音與夢寐而潛契精誠自感何耳目之能營懿乎元德升聞天降靈貺匪同乎搏拊之和豈在乎雲霄之上感夫心志達乎肌膚却萬物而有喜聞九奏而可娛其靜也寂寂其動也于于異霜天之鐘應同漢日之山呼肸蠁兮乍有杳冥兮若無表穆公之休烈為子之祥符以遨以遊實我心之獨得不考不擊豈他人之是愈惟茲至樂信夫元造非天私於二君惟天饗於有道不然何融融泄泄發於自然萬籟不雜八音相宣且降歡以入夢知惟德之動天實深乎骨髓之內豈專於視聽之前惟寤語之有說何言辭之能全至哉無金石之迭代無宮商之先後忽變化於合漠韻鏗鏘於妙有既登不死之福庭自諧保生之仁壽則知夫天可通兮道可守自感應之無差知影響之不苟降鑒匪遙德音孔昭鄙未善之周武甚盡美之虞韶豈獨聆之兮四肢酣暢感之兮心神洗滌將使道德之不昧必受如斯之殊錫者也教貞元中官陜虢都防禦判官監察御史裏行有周氏歷數既歸誕革商政皇皇后帝授元老於新邦惟邵康公欽若昊天弻成周道疑而無象用而無方輝動於幽陰明光於上下總三才之懿德弔萬姓之毒痡在昔鳳鳥鳴山鱗蟲躍舟大人經綸賢智為之請命是故朝文王於酆邑翊武王於孟津與公旦夾輔成王紹綏祖業二后陟配而修太平當其嗣君幼立㣥弟稱亂冢宰遘流言之謗太保形不悅之辭賦鴟梟而未歸感狼跋而旋悟稽神謀而不私蔡叔聽天命而不惑姬公嗚呼棄稷之道方盛烈文之孫迪哲貽謺慶以寧亂警微艱於後土誰為不臣我實有主故書曰二公寅亮分正邦國王在鎬所以殿茲陜西自桃林抵流沙盡神州之右地六服㣥辟會於京師華戎稽首咸聽其訓不玩遠物而賓鬼方允王保之肆於時夏萬邦倚相九命作伯載以龍旗執以桓圭泱泱景風自北而南皇化有本生人定性貫以一德革其二心由是播為國經聚作家道施於夫妻夫妻不敢不順行於父子父子不敢不親睦於諸侯諸侯述職柔於百姓百姓康乂時無害氣律無競風蒙以慶雲潤以膏雨然後相洛邑考清廟翹有客以助祭闡先王之大孝故得周公受其龜食仲尼稱其麟趾堯舜既沒淳源下衰湯也不能止鳴條之師武也不能無甲子之陳生二代之末而恥夏殷之事出五兵之後而懷揖讓之風則尚父阿衡宜有慙色啓金縢以定變歸嘉禾於東征惟周公執德不回平其叛國惟召伯誠明其道克正孝孫邦之延長必有其自向非布以愷悌臻乎中庸則不能期逾七百祚邁三十元命無紀上天無功權而代之我制其數王乃班寶玉以授瑞冊子孫而就封為燕太伯奄有遼碣元牡秬鬯與周始終聖唐纘禹舊服丕應天統皇帝睿文韜武光宅海隅思二南而永懷故壤禮十亂而修及廢祀貞元九年龍集癸酉連率姚公南仲宣風於陜戒豐宮而新乎茇舍慎聽訟而樹彼甘棠齊爨既位門階有數被以華蟲之服羞以陸海之葅其或吹豳雅擊土鼓歌鵲巢舞行露羶香徹達悉窣煙雨合樂六變神可得而接矣神實姬姓卜其族以為尸典有秩宗設其官以為主陜縣令李晉肅虔奉新政恭惟昔賢請刻石書以慰餘俗徵士家於太史採奭命於古文教雖不敏敢作頌曰相維宗周王業既成天命文王召公乃生遂佐文王潛翊夷明事紂得禮伐崇有名虐不得縱禍不得萌西土率順東鄰傾武王翦商克集丕祚惟公秉文亦贊其武乃放牛馬乃櫜干櫓戎功告成變化下土三監淮夷不率不循叔旦徂征王家遘屯幼主蠱惑王疑不信王謂太保誨豫沖人遂歸周公反風乃振王謂二公董正圻封疆理天下至於海邦自陜而西自陜而東乃左乃右一其庸功惟德牧人在周其召武亂皆坐君臣同道惟棠有陰惟梅有摽悠悠蒼生各稟其教陜野莓莓燕郊浩浩二千餘載管磬在廟草靡德風山呼頌聲我思康公勒石祠庭重允字保君少為潞州牙將纍遷河陽節度使封張掖郡公以討吳元濟功加檢校尚書右僕射轉司空進邠國公長慶末同中書門下平章事文宗初自天平軍節度移鎮亠兊海加太子太師兼領滄景卒年六十七贈太尉諡曰慤臣以河朔能抗拒朝命者其大略可見蓋刺史失其職反使鎮將領兵事若刺史各得職分又有鎮兵則節將雖有祿山思明之姦豈能一州為叛哉據所以河朔六十年能拒朝命者祗以奪刺史縣令之職自作威福故也臣所管德棣景三州已舉公牒各還刺史職事訖應在州兵並令刺史收管又景州本是弓高縣請却廢為縣歸化縣本是草市請廢縣依舊屬德州韶憲宗朝官戶部員外郎與韋貫之善貫之罷相坐貶州刺史馬暢承藉故業歷居通顯家富於財以奢縱自處不能撫安嫂姪使之離析其干進也赴利如轉圜其居家也操下如束濕故時論鄙之謹按國史宇文士及居家侈縱諡為縱暢之行已同於士及請以縱為諡
