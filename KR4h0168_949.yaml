body:
  text: 窅窅冥冥至道之精視之無見聽之無見聽之無聲伊散木其何識迺沖用而保生夫其措跡隱深寓形偏寂青崿右聳紅溪左闢潄滴瀝之飛泉枕嵌巖之古石將含休以處順不祈祿而自適故其幹也閜砢盤魄蟲穿鳥剝其節大兮不可以為桷擁腫輪囷抱蠧生津其軸解兮不可以為輪空心兮若喪拳枝兮不申理不中於規矩才豈任乎斧斤似支離之有疾固哀駘之入真日者秦構鳳凰漢營鳷鵲崇臨海之殿豐冠山之閣窮宇內之王褱寶盡域中之蘅薄雖片善之必收故散木之不作用能以損之益居貞而晦不恃而成不有而大白雲至止雜蘿薜以成帷清風來兮協笙竽而吹籟異鵲宵集祥鴛曉會隱士挂瓢仙人倚葢不逆於物夫何於害及夫郊暄淑氣景媚風煙夭桃變兮穠李發乍揚芳以競妍既乎寒露朝變凝霜夜結樝梨剝兮橘柚摧澹無情兮何折動息無撓榮枯任節道將契於攖寧德以庶於朗澈與夫五祚三槐仁賓君子東吳豫章西蜀蕭文杏聳於千尋木蘭香於十里皆虯蟠鱗接重葩謺葉杳藹芊綿拂日摩天根柢深固表裏巖泉並恃才而喪質咸為名而夭年是知明不若昧語不如默為善者離其道立行者陰於德社櫟入夢而幾亡野桑因言而自刻豈若聖智雙遣形神兩忘委不才以居寂任無用以為祥鬱鬱於絕冥之界落落於無何之鄉與天地而長久吸日月之明光蒙子休聞而歎曰吾且逍遙其旁惟天地之覆載屬日月之貞明幸雲雨之廣潤及草木之滋榮代何材而不用材何代而不生若乃地勢卑而路修迥有孤山曲澗之幽松挺百尺而敷其狀聳千仞而擢其容柯幹夭矯花葉芊茸枝橫栖鶴葢偃盤龍蹙皮膚而文謺峗宏磊砢而谷深重代人之所未見匠者之所未逢抱雅操兮積年載持概節兮佇時雍梢森乎巖之畔扶疎兮山之足稟二儀而自清居四時而常綠其孤高也則排煙而蕩霧其貞堅也則超代而越俗偏睹日而疏陰邃自然而孤直起喻有叔夜之材入夢表丁君之職澗底幸左思之詠歲寒蒙孔子之識偉哉盛矣屬時代兮多梓其用無隔窺幽澗兮茂松柏梓待構而見須松堪棟兮希擇其文理也奇絕可以雕楹架梲其雅操也昂藏可以振雪淩霜向日貞心擢臨風古氣揚深谷如蒙顧此地有材良王爾經過而歎曰帝德咸亨此松挺生公輸俯仰而顧曰王道利貞大厦用成希皇鑒之留盼感鬱鬱之餘情者也河陽地即帝畿境惟天邑石季倫之別業吹樓雲斷潘河陽之古縣春樹花開波石沿洄沓崑崙之水車馬闐咽俟黿鼉之構虹梁鵲柱既暫勞而永逸風烏海燕但有損而無成爰叩兩端且多職競將申一部希効管窺宜興鞭石之功無取接舟之議閭閈撲地咽綺城之歌鼓軒車沸曉度紫陌之煙埃攸更湫隘或資灑埽丙也業在門居向惟街道傾茲染甕殊漢陰之息機灑以香街異汾水之流惡黃圖作宰當旌臥疾之奇元覽滌除令察軌塵之穢將加箠令允符鞭作灑濘之愆已聞揭厲無良之刺難漏刑名令既有科自成美錦之製丙期無訟難雪素絲之泣靈長演派資潤下以流謙習坎疏源含內虛而濟物故桂林望斷漢臣嗟其水源航葦無因衛女歎其河廣由是剡木為檝利涉存焉造舟為梁有自來矣惟甲與乙俱因行邁駕言出遊大川為阻家非溱澨不可褰裳地若滄流爰憑鼓棹既而甫辭岸浦喜二子之同舟方駕波心嗟一夫之墜魄尋漆園之奧旨未昧藏舟考司寇之微言旋驚逝水至若沃焦不易呂梁難嗣一類士龍之笑幾慚漁父之勇家人告稱故殺縣司斷以疑條乙則有詞未云甘伏向若平生宿憾殞命猶或推科如其邂逅相逢自死如何結罪誠可俾竿而求水府豈得陳牒而訟官曹不悟生也有涯將等死而無弔欲使長江岸上式旌孝女之碑箜篌曲中永作狂夫之曲竊稽狀迹不伏為宜天垂衆象地列百神四時祀之廢一不可所以爰命於甲有事司人如在表至誠之懷惟馨祈莫大之福遂能就盥除穢用燭明儀既俎豆而式陳冀圭璧而必薦諸具已備惟玉未陳謂監祀而罔知何糾事而斯當詞雖不已其難捨諸彼龍門之津流水激射斷山嶙峋厥功彰於夏禹斯險際乎蒼旻河源炳靈以峻極水族候時而薦臻副天用也佇龍行兮驤首參神選也同鯤化兮脫鱗徒觀其向天倪辭水府望霄漢之九越泥沙之五來如及門出若由戶雖懸波而千仞終作氣而一鼓我鬛既張彼川何長仰雲路而抑揚終不息而自強我功既獎彼河徒廣揖天衢而直上誠擇利而攸往變化伊何升沈亦多瀠洄曲渚泛灩長波背蛟室而大集指龍門而遠過至於激厲果決乘陵險絕雖迅湍奔雷駭浪噴雪終瞬息而上膺騰而撇揮其尾而不勞騁其力而不竭於是俄變魚服倏為龍姿志氣自負威靈自持豈同塗於點額寧較力於掀鬐哉於戲道有行藏運有通塞天資性靈神輔正直始有水而呀鰓忽升天而振翼然後隨方受變千里一色風雲際會未始有極慕李膺之往哲孰不願遊追老氏之元蹤而闕一字不測儻真宰之可仰終進德於君門之側法不可易政貴有恒利物雖在於隨時出令必資於長久逷矣遠邑濱諸蠻夷茂其蝸角之兵無能猾夏不虞蜂聚之衆將犯麥秋同鄭伯之襲溫若齊師之入魯自可申之備預固其封疆豈宜因彼犬戎縱其斂積是教翫寇何以字人雖無厚於讐前監是與然不耕而穫後嗣何觀邑宰不從得宜顏類於宓子郡長見讓失指有契於季孫宰實有詞理宜無罰問五曹演妙六轡騰英吹虀延奇貫葉騁術眷茲兼藝理國曰資取要適時何者為急然則旁觀往籍逖聽前規六藝之道同歸十哲之流必習何則書數之事獨列於學官而射御之利不分於師氏今欲鳴鸞逐水落雁穿楊並列膠庠可乎不可至若魏臺漢帳誰擅其能三正一侯孰當其禮軒轅訪道驂其乘者何人夏禹奠山究其理者奚是近從曹馬遠逮羲軒所創之功並宜別白對觀天察地必籍於四時奠主安人莫先於六藝若乃九宮祕法六範奇功懸針垂露之能落雁啼猿之妙永言四術咸濟於時譬以五行理難廢一至於出入軍國之謀道達陰陽之氣取要適時射御為急者先王建國正位辨方順文武以分官仰星辰而布教使僕者知其五御射者掌其六耦各班師氏咸有司存此則垂範將來為國要道何必附輿執轡同歸雁序之庭七札五豝並列鴻都之學事資仍舊無或改焉爾其仲將之署魏臺梁鵠之題漢帳聲傳千載能擅兩朝三正賓諸侯之儀一侯乃大夫之禮軒轅訪道昌㝢驂其乘夏后奠山亥窮其理紛綸前史逖聽可尋竊以遠覽羲軒近觀曹馬心計不過於隸首善御孰若於王良史籀飛毫鍾繇騁翰后羿持箭李廣張弦所創之人所工之事畧陳一二固難悉備謹對命者則何諸侯錫服封之所謂天子胙土列爵馭貴班瑞等官紀律有藏紕繆無籍彼食舊德實光象賢引之表儀用服臧禮分之彩物有文庇身無剡圭之削土是獻劍以當室淹恤草莽乃徵褰之與襦恭承匕鬯宜錫裘以用錦期委曲以趨禮何譎詐而見尤無聽偏辭使叶中典命九儀辨等八柄正名設貴賤之地立財用之宅如或居處無節制度不經動而失中難以為正彼丁為室將瓦是居有覺其楹於粲而埽上棟下宇燥溼不交輪焉奐焉鳥鼠攸去既成奧阼如位崇而德尊不事廉隅知物誘而心汰無法自守用奢宣驕安且燠兮其功可取斲而礱也於禮則那且加命則大夫之命此室則國君之室何取彼義自用於身請麗本刑無撓常度皇帝恩霑庶類道格元功化覃於萬國之間苛慝不作烏巢於圜扉之內囹圄知空載飛載止以雌以雄寂寂無猜於牖下翩翩不去於林中足驗時清可知刑措廉恥必格寬仁有裕垣深不阻於歸飛鑰動何驚於反哺蒼鷹莫擊寧懷獄吏之憂疎網無加豈有虞人之懼夫刀鋸勿用狴牢洞開顧叢棘而未下拂青槐而乍回拾卵無聞於貪吏焚巢自絕於燃灰表異而居飲和而至翻然用刑之處闃爾無人之地中臺柏老顧棲息而難安念室扃閒每飛鳴而自遂實由吾君信孚禽鳥澤及黎元共履安平之路咸知仁育之恩向日寧憂於闔戶知風不憚於襲門定國徒美於祥明何施善政冶長不罹於縲絏豈見銜寃自然罔遇殘傷免於彈射曾無滅趾之士不有抱關之客既生既育八九子以均安不識不知四三皇於往昔是知政惟惠愛不尚威刑止夏臺而自逸陋楚幕之不寧永夜風凄或徘徊於月樹逾冬候暖欣寂寞於訟庭彼三足徒稱夫盛事素容虛美於祥經懿夫昭德塞違柔遠能邇大無用於兵革細罔行於鞭箠每夕宿而來斯寧夜啼而去彼昔周稱訟息漢號刑清曾何足而致此嶽則降神君惟作聖爰膺萬壽之福以奉一人之慶至誠斯感瑞既發於希聲盈數足徵道方期於永命伊昔漢德方至神人以寧展升中之盛禮備昭報之天經休徵是格明德斯馨帝道昌而延祚天心啟而昭靈諒惟恍而惟惚覺非雷而非霆若自觀心數已超於卜祝匪因騰口事全過於夢齡曾異石言方承帝祉大君肅穆以傾聽㣥后左右而驚視訝寂寂以無人每洋洋而在耳數惟萬式彰悠久之期呼至三用表丁寧之旨瞻彼維嵩極天比崇明神是處應感潛通降喜聲於碧嶂遵密命於元穹慶彼盛時巖嶺且聞於隱隱暢茲和氣人心盡樂於融融天既輔於無親神方降於有德在肸蠁而昭異俾聲明而莫測孰謂乎不識不知曷昭夫或語或默懿其發茲大號騰彼宏音儆谷神之虛宅振山木之高林周流崖巘散越嶔崟和清風之遠韻凝翠靄之層陰若非報地承天恪慎克孝洋溢乎德澤布濩乎聲教則何以跡追三五之蹤歲表十千之效囂然震盪忽爾沈潛儼翠華而將下仰太室而迴瞻至矣哉斯前代之盛事惟我后之能兼度地居人量地制邑九有既乂萬邦是孚甲密勿具寮僶俛從仕陳力就列罷職言歸克昌拾芥之榮方展維桑之敬爰居爰處以遊以娛且故國之生平即襄陽之耆舊人知仰德我不求蒙譽擬潘安聞諸鄉曲榮參龎統頗曰池中發其言而有由速之辜而未可請以里人為美無宜告者稱妖欲措常刑其如反坐甲孝以居家學以從政非子房之晚歲翹想赤松類元亮之中年棲神素里琴書養德道義資身青雲舊遊惜鵷行之中斷白沙鄰好善龍種之來歸異趙壹之招嫌同任光之見愛孔子垂教在家必聞程鄭有言寵而能降善莫之大復何加焉至如勝友如龍高才比鳳渥水千里丹山五色語其事類蓋亦繁多考以條章實難科罰理國之宜有時用戰為政之要莫先利人先王以禁暴詰姦良吏以移風易俗訓兵習武熊罷之士卒在和積習生常卭僰之火災歲有銜枚被練必徇死而輕生飛焰浮煙或焦頭而爛額小侯以出車受脤始希分閫之威廉使以建節乘軺方展褰帷之惠功成戰勝知彼竭而我盈令行禁止用防微而慮遠林鍾有作同季武之克齊瓘斚無施類國僑之相鄭軍正有訟均夫臧仲之非人戶稱勞昧彼廉公之化京觀不築楚功既存積塗而防宋災亦免因人之功不可藏示之道何施利物之惠為多無術之談或爽備諸前史焉敢費詞國有五禮甲主六器或欽若天地或虔奉廟祧將以降神祇辨方色則必臨之以莊敬守之以豐潔使舊章攸敘靡物不精甲忝曰司存宜其祇肅徒尸此職曾不是省六宗有祀已墜虞章三禮何知載周典所由加罪亦謂金銘勿一作金石罪言文過飾非方推玉人有闕若徵求有志一作至自可預論既臨時有乖欲何逃責闕供之罪定罪非遙未知祠祀所須為復陳設所犯待知本坐庶論如律蒼龍正宿朱鳥方春山梅早花沼萍新葉嘗新傳於楚俗先薦表於周年採蘋奠誠式遵於南澗進櫻追遠首在於西京至若類獸之鹽惟調和於醯醢闓陽之薦恐有隔於烝嘗請準恒科以懲其慢經途九軌列以城國通莊四會達彼川梁廣直如弦有文侯之擁篲修平若砥見伯也之執殳非據蒺藜將樹桃李無使障塞用絕艱虞歲祀不除時饗不理甲掌惟郊道候承祠祭喪者輟哭田燭是為百神以宗方陳明水之薦三條是務式崇新土之宜類築傅巖固將遵於大制殊開京兆亦何更於前名苟薙榛蕪足歆蘋藻誠為獻力匪曰犯刑且氾埽理在恭嚴反道義非變易何必改作方設興功修故而除足奉虔誠之節棄核而按未通折獄之明對聖人出震博訪芻蕘大帝登庸詢謀師相是以周稱尚父呂望擢自磻溪殷曰得賢傅說求諸版築莫不舟梁羽翮鼎實鹽梅表區㝢之明明成朝廷之濟濟自隆周洎乎幽厲朝政在於諸侯炎漢至於哀平威權任乎卿相貂蟬耀彩雄俊遍五侯之門劍履生光賓客滿四豪之第吹竽彈劍犬吠雞鳴用才各任所能取士不求其備弓旌之命非道德之門蒲帛之徵乖有道之室方今前疑後丞龍翰鳳翼左輔右弼岳氣星精加以徵逸璞於巖廊索遺珠於窮海邱園之下羔雁成行閭巷之中軒軺相次元纁之禮既備巢父長謝山林圭璧之問不空夷齊豈食薇蕨若夫暑氣帛丿糸帛丿糸炎光赫然毒衝心而氣盡汗帀背而珠漣是日何貴茲扇為先匠者呈巧所重惟素疑織飛禽而寫妙規曉月以成圓葉隨意出花逐情妍飾金翠而作彩緻膠漆以期堅爾乃題竹流譽贈葵稱美雖見重於人臣未承恩於天子曷若充歲貢隨筐篚比德進賢齊芳獻雉徙倚君側徘徊宮裏揮拂涼來動搖風起逢陽氣而不息遇重陰而暫止心素何所欲常愁歲月馳珠簾秋氣滿羅幌曉風吹中道恩既歇棄捐誰見知夫何明之為用將燭幽以鑒默故日有朝靈月有宵德衆星垂耀於穹昊爝火與螢而不息皆能懷獨見之明破重昏之匿使晨臨者可分於丹素夜視者不謬於南北蓋所謂明明在上以為人極者也至於桂花未魄虞泉斂暝幽室何觀空堂靜聽飛落木於軒砌吟暮蟲於行徑則有銀燭初然蘭膏未罄昭昭耀耀亦何其盛况乎秦宮曉鑑淄川秋水君子思正其莊容粲兮用修其膩理或拂金光之清景愛瑤華之特起或指波瀾之碧池玩澄泉而未已然非大道之道至白之光且日月聞浮雲之蔽燎火有撲滅之常水猶人撓鏡以塵障豈夫穆穆天子德昭晰以蕙馥皇皇侯伯義赫烈而椒芳寸心所燭萬物無藏既臨表以識裏仍察陰而辨陽然後禮樂設文武張明珠不混於江浦美玉無韞於山岡幽藪盡拔蒙潛載揚由是觀之則燭龍之遐昭離婁之遠望魏乘之所炫蘇績之攸傷安得儔其大小與短長而已哉維皇穹之造物何靈鑒之不昭寂然陰閉倏爾陽驕風行天而啟象水干土而成妖山蛇則四翼呈歲日烏則三足升朝亭皋背春兮失色草木先秋而欲凋螢飛火井蛙動陽飇嗟乎林之云滌山之方焦旱如何其農為是恤雲祁祁而始布日杲杲而行出立嗇夫於丙丁命小童於甲乙春雷無聞奮豫夜月罕當離畢阡陌之多稌不滋堯湯之下人斯疾是則墳封孝婦東海之守非才圄繫寃囚河南之尹未黜而明明我后罪已彤闈日中而御菲食昧爽而籠繡衣慨祥正兮無潤嗟土膏兮遠晞冠華秉翟郡縣襲舞雩之祭務農嗇用山川申祝鼎之祈出德號兮休力役鋪皇恩兮鑠帝暉於是驗靈圖稽祕籙封朽腐宥寃獄損有餘補不足躬耤田以率下遣皇華以問俗借如晉平老矣所好者音古樂俟文侯之睡希聲懵師曠之心德不足而自撫災無何而是侵赤地三年兮罕闢皇天一怒兮何深野無盈尺之潤山無膚寸之陰至如周宣中興視人如子旱魃為虐於藩服㣥元輟耕於耒耜饑饉薦臻惔焚未已畢崇奠釂之設不絕郊宮之祀寧莫我聽憂心如圯及夫下邳內史任在責誠鍾亢陽之有悔毒殲殪之無生乾坤不交兮茲焉中否雷霆不動兮何時滿情求下哀於人瘼希通鑑於神明爾其廣漢從事捫衷自省霑灑不時奚能泣整地則水淪金穴天則泉枯玉井走㣥望而何階誓中隅而有請是以孫武止矢誚梁君之射烏臧文抗議非魯國之焚巫齊阻饑而問孔鄭有事而咨屠彼炎亢之為患信古來而有乎昔者商罪貫盈邢為不道周師初克而年豐衛國致疑於請討矧獯獫兮叛渙伊將驕兮師老方按甲而天誅未迴戈而彗埽行看郅支之亂且見呼韓之保將覆油陰佇羞行潦是時也上方受釐宣室訪議雲臺所以仰乾封之兆稱時運之災濁河清兮龍馬出滄海晏兮鯨魚來山聲萬歲壇勢三陔式行和鸞之節常希法駕之迴皇乎備矣侯不邁哉乙惟賤工執用為事撤彼墻屋嘗聞作向之詩誤此殺人載犯謨虞之律雖因緣毀壞宜申重典而過失殺傷非無彞憲毀垣之下人盍違而去之壞宅之間乙恐非其罪也且凡所隳圯尤資審慎泉臺構落非梓匠之良規廣厦榱崩必鄭僑之見壓備慮欲繩其不謹懸危可恐乎無情既殊故犯之名請抵從輕之議許其收贖竊謂平反靈慶所章錫允乃承家之本恩華薦及疏寺則開國之儀是知禮備十倫系宗祊而敘昭穆榮標五等列畿甸而制子男載德象賢山河必復謀孫翼子弓冶方傳乙以夙所禍胎喪嚴顏於未誕冥包舋始傾厚蔭於生前若趙氏之遺孤如鄭門之棄孕母兮鞠我等令伯之成人生也有文同仲子之先兆既而聿修祖德將克於家未展茅封爰疑載弄之日遽從初議復引冠字之年敬省彞章未可隔其遺誕恭惟典制理宜允其嗣徽舞者樂之容卦者象之則故因舞以成卦乃觀象以知德八音是節位必配乎八風五方具陳衣必表乎五色是以德從之理也功加有截化洽無為作樂以習舞同文而共規俾萬姓覩而悅服百代勤而行斯懿其舞者員來樂人攸敘匏土革木兮夙設六律五聲兮具舉初就列以修容忽揚袂而進旅體殊舜樂九成徒辨其疾徐跡類羲文八卦自分其處所行綴罔失俯仰攸同乾坤定而有倫有要震兌分而自西自東稟雷澤以浹洽象天地之昭融紛綸乎抑揚之際輝煥乎節奏之中進退相依變易交映艮巽布而若離若合離坎峙而不譁不競體山風之次序叶水火之情性周旋乎元武之間繁會乎羽籥之盛既而諧管磬感神人卦成列而不已節有序而復頻赴度應聲倏鳳轉而龍翥攢青拖紫駭霞粲而錦新翹搖兮比大章而未匹縹緲兮異鈞天之下陳我后惟明舊章爰製以嗣以續不陵不替和樂且孺每立象以化人德音不忘故體乾而稱帝是知卦之設也八方正四序和彼象功以明德安可與茲舞而同科天子斂賢才之地合禮樂之府命宗伯因四時之宜教冑子以六代之舞惟德是務以和為主翕左手以執籥就前軒以樹羽方將發揮五禮張皇六詩忽投步而赴節乍整容而自持雖鏘鏘與濟濟必庸庸以祇祇及夫鐘鼓鏗訇絲竹宴衍音容間起干旄迭見屹然山立欻然風從觀者如堵曷不肅雍實經國之洪範蓋訓人之中庸且樂以平其心舞以發其貌故無小無大是則是傚宜合國之子弟實教人於忠孝其儀不忒其德惟馨遠人由是以來之故時無違命明神可得而禮矣故物無遁形大哉聖人其道可久約我以禮樂宏我以孝友覩躚躚之屢舞實循循之善誘文德溫恭則羽籥在歸根之時武士發揚則干戈居蘖萌之後夫手之舞之有小有大成童舞象弱冠舞夏並允浹於生靈良克諧於風雅莫善於樂執而勿舍聖人若斯須而去身則孰能垂拱於天下仲尼講三王之禮垂百代之範臨喪寧戚實先匍匐之風力行近仁更著威儀之則永惟鄰婦忽奄泉扃一作宮蘭閨生向月之悲幽隧切行雲之望於是哀歌佇引尚有具於飯含夢容猶遲誰見勤於營護三日不舉九原若何彼人以桑梓情深芝蘭愛厚欲奔波於黨屬先假借於鄉閭劬勞之志莫辭終始之心愈一作逾勵項將軍之志業比德猶一作無慙郭有道之風猷方斯未遠且為主斂緣是善鄰親疎之爭鬱興牒訴之喧爰起官司以公平在慮剖析存懷申報禮以明愆討彞章而見一作告罰既叶平邦之典妙符淳古之風徒更有詞終成飾說至道無偏陰陽至理象緯不愆爰或五星同色四序調年非天莫能輔聖非聖奚能動天列位有恒皆向北辰為拱偶運則聚寧惟東井見傳觀天文之元吉由人文而化宣爾其歲星配春維德斯專五常仁也五事貌焉彼若仁無虧失貌則終日乾乾熒惑紀於朱夏禮貴知於言雅受制之月每獨入於太微休咎之時則先標於分野發號不乖於火德庶績其凝於天下太白出處衆星異科西則陰星以夕見東則啟明以曉過係金為主用義方多政洽則義當政失則言訛蓋秋令之不逆俾金氣而能和辰象韜精用晦而明智克存而聽審冬令順而水清或奎婁而春見或角亢而秋呈既度數而有準知乾化之升平中央稱鎮應土而分昔則各主方色今則同色垂文特感無為而理實彰有道之君稽乎漢志抑有前聞堯舜為主伊呂作臣時維尚質俗以還淳六氣氤氳風不鳴於樹三光朗麗雨必降於旬豈惟七步而見祉蓋亦四夷以來賓感而遂通休徵薦答諒朝廷之嘉瑞表君臣之道合豈比夫河在天而虛橫斗建月而空帀宿離不忒實禎於國使七政之已齊何五行之相剋既垂象以昭泰可仰觀而取則因明試而賦斯敬頌聖人之大德沐蘭湯兮同之子采白蘋於南澗羞府君之明祀祠肅肅兮山之下神萃萃兮凜千古辛夷楣兮葯殿疑房載雲旗兮駕虯虎澹閟宮之瀏侐紛進拜於軒宇靈連蜷兮既留予蹁躚而婁舞願馨香而嘉薦豈神祇之或吐精享既周歷勝飛眸東拓巨靈之掌北控長河之流殷其雷也寧示力於贔屭成其物也配祀典於清秋豈徒三峯峻秀四面若削扇萬壑以雲騰飛長天而雨落將有開之必先實明神之攸作則知神也無私正直是持禍淫福善幽鑒無遺余總角之年每專精於書圃洎乎既冠之日亦切磋於文詞謂一飛之摩昊胡十上之遊悲聞至誠之必應何功名之太遲豈媚寵而先獲寧守道之後時神乎神乎莫使心疑我后之文思望賢如調飢礪乃鋒刃以俟鹿鳴之時收片玉於宗伯冀神兮無我欺甲才惟國寶秀彼士林孫宏適見於贈芻郄詵佇希於擢桂既忝鄉賦將觀國光雖賓薦可嘉而禮容未足鹿鳴不奏鳳德何衰爾闕其儀我愛其禮甲有言矣郡何詞焉自速其尤誰曰無咎
