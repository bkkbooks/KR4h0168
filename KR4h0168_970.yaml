front:
  text: 全唐文欽定全唐文卷九百七十闕名十一
  hash: sha256:380959035286669fb1bad945a0a3dae1bcdebae95453f047e66cfc465e6f12b5
body:
  text: 往例朝廷命官除將相外並不賜官告因偽朝條流凡准宣授官即特恩賜令使府判官皆許本道奏請或聞多在京師至於令錄悉是放勅後本官自於吏部出給告示中書不更管繫今若為點檢所授官吏器能欲令親承聖澤臣等商量自兩使判官州縣令錄在京除授者即望令於內殿謝官便辭赴任不便進納官告其判司主簿以下極是卑秩不合更許朝對勅下後望准舊例處分凡新除官及差使者合於正衙謝辭每遇正殿起居日百官不於正衙序班致差使及新除官辭謝不得或恐差使者已定發日除宣催發以一日無班便妨辭謝臣令參詳每內殿起居日百寮先序班於文明殿庭候辭謝官退則班入內殿冀便於官吏辭謝者今月四日中丞上事臣等禮合至臺比期不越前規依舊傳語忽蒙處分通出尋則再取指揮要明審的又蒙問大夫相公上事日如何臣等訴云大夫曾為宰相進奏官伏事中書事體之間實為舊吏若以別官除授合云傳語勞來又堅令通出臣等出身藩府不會朝儀拒命則恐有奏聞遵禀則全隳則例伏恐此後到臺參賀儀則不定者謹具本朝舊例合行公事如右應諸道進奏院准本朝例各合置臺巡驅使官一人凡有公事並合申報臺巡逐日在臺祇候應奉公事應諸道進奏官每四孟月初及五月冬至新除大夫中丞並合臺參伏自偽朝以來全墜舊例今准勅命條流請准本朝舊例施行應諸道節度觀察防禦經畧團練使及諸州刺史新除赴任及郎幕上佐官等得替及准宣進奉到闕及歸本道並合廊參正衙謝見辭如遇大夫中丞入臺並合臺參兼凡有公事及到發日並合申報如遇追勘進奏官典勘責科罰又伏以偽朝以來全隳往制既未條理轉失繩規伏乞特降朝勅指揮免令隳紊應在京兩街司及坊市士庶人家及諸道經商客旅或有投井自縊及僕婢諸色人等非理歿故伏據近年以來凡是死亡之家並是臺司左右巡使舉勘差驅使官與諸司人同行檢驗指揮如此施行相承已久臺司若不差人舉勘即非理幽寃無由申雪若一一檢驗即事故之家多稱騷擾況臺司亦常憂兩巡驅使官與諸司同巡檢節級等於有事人家妄有所求今詢訪故事准當司京兆按往例凡京城內應有百姓死亡之家祇勒府縣差人檢驗如是軍人祇委兩軍檢勘如是諸道經商客旅即地界申戶部使差人檢勘仍逐司各具事由及同檢勘行人等姓名申臺及本巡察其間或有事涉寃濫曲直不分察訪得知及有人論訐臺司並行追勘如是兩班官吏之家即合是臺司檢勘伏請自今以後並准故事施行除百司外臺中不更差人誨疑例檢勘如是則軍人百姓各有區分事涉寃誣即行追勘合具舉明庶遵故事者兼得左右巡使狀抄錄到喪葬格例所設車轝儀注物色祇為官品高下無官秩若陳儀主具供應故犯典刑今則凡是葬儀動踰格物但官中只行檢察在人情各盡孝思徇彼稱家之心許便送終之禮臺司又難將孝子盡決嚴刑祇以供人例行書罰以添助本司支費兼緣設此防禁比為權豪之家多有違禮從厚若貧窮下士尚猶不便送終必無僭禮可以闕罰兩京即是臺司舉司諸州府即元無條例者凡棺槨不計有官品並不得於棺槨上雕鏤畫飾施戶牕欄檻楹等官至四品以上使方相七品以上使魌頭四目元衣朱裳執戈楊楯如常制七品以下及無官品者勿用凡明器等三品以上不得過九十事五品以上不得過六十事九品以上不得過四十事當廣地軸誕馳馬及執役人高不得過一尺其餘音聲隊馬威儀之屬各准平生品秩所用仍以木瓦為之不得過七尺及別加畫飾諸纛今謂之鵝毛五纛五品以上竿長七尺五品以下長五尺無官品者勿用諸三品以上引披鐸翣挽歌鼓六行每行六人五品以上二引二披四鐸四翣挽歌四行四人九品以上二翣無者勿用諸車轝三品以上油幰朱絲絡網施襈兩廂畫龍虎幰竿朱垂六旒蘇今之纓帶也七品以上油幰襈兩廂畫雲氣垂四旒蘇九品以上無旒蘇車轝上有結絡者三品以上及將相有鳳臺自諸品官及郡守升朝者羚羊山華餘並平幰百姓喪葬祇合使鼈甲車無幰襈畫飾並無已前儀禮部格物凡官人百姓送葬競為奢僭不依禮式宜令所司切加糾察如物色等數目大小有違條式及輒飾以金銀者杖六十奉勅今後文武兩班及諸司官吏并諸道經商客旅凡有喪亡即准臺司所奏故事施行其街坊百姓及軍人之家每有死喪兼所使廝兒妮子因依暝及行投井自縊非理自致身命者據臺司狀委府縣及兩軍軍巡差人檢勘竊慮前件事故之家或所居隘窄兼阻暑毒之月尸靈難久停留若待申報官中檢勘縱無邀難須經時日今仰本戶可便喚四鄰看驗如無他故便任本主送殯仍具結罪保明文狀報官若有枉有傷害致死鄰人妄有保明本戶并保人勘責不虛各量罪科斷兼聞諸州官府士庶之家或有死喪亦是須候分巡院檢勘頗致淹留既鼓瑟調甚傷風教亦仰約有在京事條例理處分其庶人喪葬所設車轝儀注格例狀稱近日庶流多有違越臺司又難將孝子盡決嚴刑祇以供人例行書罰添助本司支費據此懲創名目且非為政憲綱自今以後所有各計品秩之外及庶人喪葬宜令御史臺委兩巡御史點檢假賃行人須依條例如有違越據所犯重輕臨時科斷臺司不得妄有攪擾五經考試官先在吏部日長定合請兩員數年係屬貢院准新定格文祇令奏請一員兼充考試官緣今年科目人數轉多却欲依舊請考試官各一員如蒙允許續具所請官名進御申奏據南曹駁放選人累經銓及經中書門下論接准堂判具新舊過格年限分析申上者伏以選人或有出身或因除授各拘上例方赴調集多因遠地兵戈兼以私門事故遂致過格固非願為新條標在七年舊格容於十載臣等參詳其選人過格年限伏請且依舊格不問被憂停集除本選數過格十年外不在選集之限禮部貢院申當司奉今月六日勅吏部流內銓狀據白院狀申當司先准禮部貢院牒稱具成德軍解送到前進士王蟾狀請罷攝深州司功參軍應宏詞舉前件人准格例應重科合在吏部其王蟾并解送吏部請准例指蹤者當司遂具狀申堂奉判送吏部分析近年事例如何者伏緣近年別無事例今檢登科錄內偽梁開平三年應宏詞登科二人前進士余渥承旨舍人李愚考官二人司勳郎中崔景兵部員外郎張貽憲者再具狀申堂奉判送吏部准例指揮者其前進士王蟾應宏詞考官試官合在流內銓申請者前進士王蟾請應宏詞伏自近年以來無人請應今詳格例合差考官二人又緣只有王蟾一人獨應銓司未敢懸便奏請差官者奉中書門下牒奏勅宜令禮部貢院就五科舉人考試者伏以舉選公事皆有格條准新定格勅文宏詞拔萃准長慶二年格吏部差考試官二人與知銓尚書侍郎同考試聞奏又准格節文內准太和元年十月二十三日勅應禮部諸色貢舉人及吏部諸色科目選人凡無出身及未有官只合於禮部應舉有出身有官方合於吏部赴科目選其請應宏詞舉前進士王蟾當司當年放及第後尋已開過吏部訖若應宏詞例待南曹判成即是科目選人事理合歸吏部況緣五科考試官只考學業難於同考宏詞者伏奉九月八日勅國祚中興已逾五載皇基統嗣爰及兩朝其有紀年之書行事之紀未聞編錄實謂曠遺所司既不舉明史官又無起請因循斯久闕漏轉多宜令史臣先修太祖武皇帝莊宗兩朝實錄速具奏呈新朝日歷行事亦可精專纂錄無使廢墮者伏以簡編事重久闕鑒修須循廣記之規以備必書之要館司或有闕漏公事盡令提舉施行伏自陛下赴難雒京以副人望宰臣百辟諸道藩侯各貢牋章請臨寶位㣥情尤切三讓彌堅且行教令之規先進代王之號既從俞允尋就纘承皇澤播於萬方聖功超於千古伏自大駕臨至德宮宰臣百官諸道侯伯各上勸進牋表及聖旨謙讓批答兼宣諭諸道教令詔書及寶冊文並自天成元年四月後至今年九月以前內降詔書陛下日親時政金口所宣去弊除姦及近日敷奏省費從寬之事並請下所司各檢抄錄送館所冀編修總無漏畧每遇入閣日只一員侍御史在龍墀邊祇候彈奏公事或有兩班參雜失儀點檢不及難於舉奏者伏以入閣之儀務在整肅或少虧於恪敬則有慢於典經今欲依常朝例差殿中御史二員押鐘鼓樓位仍各綴供奉班出入所冀共為糾察免失規程敢將舉職之程粗益朝天之敬應諸道選人等其中有過格年深無門參選者准天成二年十月二十三日德音並委吏部南曹磨勘如實曾阻兵戈者許令注擬如或詐稱不在此限者凡是選人專思合格不肯固踰選限自滯身名縱限干戈須在州縣應有過格人仰吏部南曹子細磨勘曾阻兵戈州府去處或曾假攝即有隨處文牒一一指實即便送銓司亦須詳先授告身攝牒及審驗年貌方可注擬三銓注擬自有常規從前或有宰臣占著好州縣員闕不令銓曹注授今年應是員闕並送曹銓候移省之時若有好闕尚在必議勘尋其請託及受囑人等當行黜責選人之內族類甚多經任之中資考備在應南曹判成人等仰三銓各據逐人出身入仕文書一一比驗年貌灼然不謬方與注官據長定格選人中有隱憂者殿五選伏以人倫之貴孝道為先既有負於尊親定不公於州縣有傷風教須峻條章自今後諸色官員內有隱冒憂勞者勘責不虛終身不齒所有入仕已來告勅並封付所司焚毀臣聞德教重於日新禮經不自天降故歷代之有損有益隨時之可止可行且華蟲象衮之規三皇未備雲鳥紀官之制五帝皆殊考其言而既出舊章窮其理而便為故實恭惟朝廷之重宗廟為先事繫承祧義符致美將以觀盛德於七代展明祀於十倫一時而儻墜斯文千載而永為闕典且聖朝追尊之日即引漢氏舊儀在漢氏封崇之時復依何代故事是以理關凝滯未協聖謨道合變通方為民則且王者功成治定制禮作樂正朔服色尚有改更尊祖奉先何妨沿革若應州必立別廟即地遠上都定虧孝享之儀徒有尊崇之稱伏據開元中追尊臯陶為德明皇帝涼武昭王為興聖皇帝皆立廟於京都制度斯在況陛下入清內難光闡帝圖德澤廣浹於華夷廟享猶虧於祖禰若宮廟須成於遠塞則烝嘗慮闕於孝思今臣等商量所議追尊四廟望依御札並加帝號兼請於雒京選地立廟伏以祭酒之資歷朝所貴爰從近代不重此官經天緯地莫如文戡定禍亂莫如武武不可不講文不可不修況屬聖朝方勤庶政須宏雅道以振時風望令宰臣兼判國子祭酒事如蒙允許望內賜處分吏部格式司狀申當司先准勅及堂帖指揮應焚毀告身勘同人及失墜文書等臣伏請重給告身令先與檢勅甲如無勅甲可檢即仰取同勅甲人告身勘驗同即與出給若是本朝授官及同光元年後授勘檢同即重與告身如是偽朝授官勘檢不虛即與出給公驗便同告身例處分者伏以再給文書實為難重有司點檢務在周防當司近曾申堂請以合准指揮出給告身公驗旋具選人出身歷任行止牒甲庫永為應驗證明奉判准申者其所追取到選人授官勅甲或同勅甲告身勘驗既同須准前指揮出給見有勅甲者便須注出重給事繇年月日若不注破慮恐選人却將失墜告身參選刺驗勅甲既同文書浩大所司難為一一點檢如是引驗同勅甲之人告身出給佗後却將失墜文書選時甲庫又無憑應騐其同勅甲人告身欲於後面連粘紙亦須使印批注仍牒報南曹要憑將來檢勘者在朝庶官有託故停官者時日稍多即却與前官百司人吏合格者並從選未合格者逐司以年勞奏薦只與勒留官凡百司長官月限將滿及已有人替不得奏薦人使改補職次諸道薦人總與不可全阻又難今後諸道節度使每年許薦二人帶使相者許薦三人團練防禦使各一人節度觀察判官並留旨授書記已下即隨府舊制凡降冊命至尊臨軒伏自陛下纂襲繼有封崇但申持節之儀尚闕臨軒之禮今後有封冊請御正衙雖勞萬乘之尊冀重九天之命如此則行之者禮備受之者感深寧惟轉耀於皇猷實亦永標於青史逐日常朝宣奉勅不坐兩省官與東西兩班並拜押班宰相不拜或聞班行所論承前日有廊餐百官謝食兩省即各有常厨從來不拜或云侍臣不拜檢尋故實不見明規百寮拜為有廊餐即承旨合宣有勅賜食供奉官不拜亦恐非儀且左右前後之臣日面天顏豈可不拜臣等商量今後常朝押班宰臣亦拜通事舍人亦拜閤門外放仗亦拜准往例起居補闕拾遺御史郎中員外郎少卿監國子司業已下每加新命祇於正衙謝後便常朝竊見邊遠令錄尚自對敭班行臣寮並宜中謝今後凡升朝官望並令中謝臺中舊有格杖近年不行每有決遣公事皆於河南雒陽兩縣追取人杖今緣臺中常有囚徒勘責若一一於兩縣追取又緣地理遙遠及後差人往來交妨指揮公事者今臺請置行人杖免妨滯公事孔子有言曰教以孝所以敬天下之為人父者教以悌所以敬天下之為人兄者教以忠所以敬天下之為人君者往聖深旨中古明規方當孝理之朝尤重人倫之本今後㣥臣內有乞假覲省者欲請量賜茶藥所貴勸人之善表主之恩誠有益於皇猷且無損於國勢況在班行有父母者甚少既資風化動挂宸衷五月一日入閣起居准貞元七年四月二十八日勅昔者聖賢觀象因天地交會之次為父子相見之儀沿習成風古今不易王者制事在於因人酌其情而使中順其俗以為禮咸覿之禮既行父子之間資事之情豈隔君臣之際自今後每年五月一日御宣政殿與文武百寮相見京官九品以上外官因朝奏在京者並聽就列宜令所司量定儀注頒示天下仍編禮式永著常規者伏以本朝舊制近代不行方當開泰之期難曠會同之禮宜興墜典以耀明庭五月一日應在京九品以上官及諸進奉使並准貞元七年勅就位起居自此每年永為常式者先據太常寺定少帝諡昭宣光烈孝皇帝廟號景宗伏以本朝基構垂三百年昭宗以中否東遷少帝以沉寃晏駕始封侯於偽室新立廟於聖朝追奕世之尊雪當年之恥先皇帝初定中原之後昭宗少帝尋合一時入廟所司不舉遂成闕禮既暌昭穆難會烝嘗太廟有合食之儀外邑無登歌之奏生曾為帝享乃承祧既號景宗合入太廟如不入廟難以言宗須叶徽章免貽㣥議於理而論祧以遠廟安少帝神主於太廟即昭穆序而宗祀正今或且居別廟即欲不言景宗只云昭宣光烈孝皇帝兼冊文內有基字是元宗廟諱尋常泛行詔勅皆不迴避少帝是繼世之孫冊文內不欲斥列聖之諱今改基為宗字今年諸色及第人中有曾攝州縣官及有御署攝牒兼或有正授官及曾在賓幕赴舉者諸條格中書奏及第人先曾授職官者宜令所司於守攝文書內署重任舉及第年月日或改名不改名分明印押懼其轉賜於人假資冒進也其中曾授正官御署并佐幕者仍約前任資序與除一任官如自中興以來諸科及第人曾授職官者並令所司追給文書到日准今年及第人例處分已授官者不在此限兼勒貢院將來舉人納家狀內各分析曾為官及不曾為官改名不改名其曾為職官者先納歷任文書及第後准例指揮來年二月南郊大禮應諸司寺監合行事官伏以明德惟馨冀神靈之昭鑒作事謀始庶王道之和平前件將來行事官等既預嚴禋希霑聖澤先宜條貫免忤擬倫應合差行事官但是前資并及第黃衣及三司徵科勒留官充任逐司寺監先引驗歷任告身分明則得差補若失墜文書則須得本處當時公驗不得憑諸處所給憑繇如是州縣官須見四道五道以上應攝文牒皆是節察及直屬京防禦團練使差署仍點勘逐任年月遠近曾親公事及得替因繇不是虛牒則得收補其逐司合差職員官吏須是已經附奏者充不得臨時放出虛牒將來所司磨勘如不依元指揮公然顏情互容謬妄其逐司官吏并本人並當勘責各行嚴斷應諸道州府解送諸色舉人須准元勅差有才藝公正官考試及格然可給解仍具所試詩賦義目帖繇送省如逐州府解內不署出前件指揮事節所司不在引試之限禮部貢院考試諸色帖經舉人今後據所業經書對義之時逐經須將生卷與熟卷中半考試不得依往例祇將熟卷試問今後主司不得受內外官寮書題薦託舉人及安排考試官如或實講知有才學精博者任具奏聞若受書題囑託致有屈人其主司與發書人並加黜責其所舉人別行朝典三銓南曹亦不得受諸色官員書題薦託選人如違並准前指揮應諸色落第人此後所司具所落事繇別張懸文牓分明曉示除諸州府解送舉人外餘有於河南府寄應及宗正寺國子監生等亦須准上指揮其中有依託朝臣者於解內具言在某官某姓名門館考試及第後並據姓名覆試諸色舉人至入試之時前五日內據所納到試紙本司印署訖却送中書門下取中書省印印過却付司給散逐人就試貢院合請考官試官今後選舉業精通廉慎有守者充若在朝臣門館人不得奏請開元禮三品以上升殿㣥臣在庭竊以九品分官隨時有異或以卑高定分或以清濁為資積習是常造次難議請沿近禮依內宴列坐開元禮稱賀之後皇帝戴通天冠服絳紗袍百官朝服以侍坐解劒履於樂縣之西北竊以開元舊制長安廣庭故可以究皇儀而展帝容陳百辟而贊㣥后今京邑新造殿廡未更若用前規慮為狹隘議請皇帝冠烏紗巾服赭黃袍百寮具公服候朝堂宏廠即舉舊儀二舞鼓吹熊羆之案工師樂器等事繇久廢無次頗甚歲月之間未可補修且請設九部之樂權用教坊伶人伏以國設高科人貪上第所望不小其業須精實以喪亂年多苦辛人少半失宣尼之道倍勞宗伯之心不望超㣥且須合格今逢聖運大闡皇猷設官共革於時訛選士實期於歲勝又朝廷較藝為擇賢才或臣下收恩豈成公道時論以貢舉官為邱門恩門及以登第為門生門生者門弟子也顏閔游夏等並受仲尼之訓即是師門大朝所命春官不曾教誨舉子舉子是國家貢士非宗伯門徒況又斥先聖之名失為儒之體今後及第人放牓時並須據才藝高低從上依次第安排不得以雋科取鼎島岳斗之名為貴冀從敦實以息浮澆兼不得呼春官為恩門師門不得自稱門生除賜宴外不得輒有率斂別謀歡會曾赴舉落第人無故不得改名將來舉人並依據地理遠近於十月三旬下納文解如違不在收受之限吏部流內銓諸色選人先條流試判兩節並委本官優劣等第申奏文優者宜超二資注擬其次者以同類官注擬所以勵授毫之作亦不掩歷任之勞其或於理道全疎者以人戶少處州縣同類官中比擬仍准元勅業文者任徵引古今不業文者但據公理判斷可否不當罪在有司兼諸色選人或有元通家狀不實鄉里名號將來赴選者並令改正一一署本貫屬鄉縣兼無出身一奏一除官等宜並不加選限伏以體物緣情文士各推其工拙掄材較藝詞場素有其規程凡務策名合遵常式況聖君御宇奧學盈朝倘令明示其規模或慮衆貽其臧否歷代作者垂範相傳將期絕彼微瑕未若舉其舊制伏乞下所司依詩格賦樞考試進士庶令分職互展恪勤來年四月孟夏禘饗於太廟謹按禮經三年一祫以孟冬五年一禘以孟夏已毀未毀之主並合食於太祖之廟逐廟功臣配饗於本廟之庭本朝寶應元年定禮奉景皇帝為始封之祖既廟號太祖百代不遷每遇禘祫位居東向之尊自代祖元皇帝高祖太宗以下列聖子孫各序昭穆南北相向合食於前聖朝中興重修宗廟今太廟見饗高祖太宗懿宗昭宗獻祖太祖莊宗七廟太祖景皇帝在祧廟之數不列廟饗將來禘禮若奉高祖居東向之尊則禘饗不及於太祖代祖若以祧廟太祖居東向之位則又違於禮意今所司修奉祧廟神主及諸色法物已備合預請參詳事須具狀申奏
