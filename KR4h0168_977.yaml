front:
  text: 全唐文欽定全唐文卷九百七十七闕名十八
  hash: sha256:b4bdb428296cf4b390389a5cd7302b1d2770d00aa32a2a0497bafb17fced6c97
body:
  text: 賦受不同勇怯殊迹瞻彼徒搏罕能為之眷乎傷生吾所不與何者啟足貽訓嘗不愛於遺軀履尾有言翻見矜於扼猛撫毒雖殊愛己除橫誠則利人州司執文切同膠柱使科違式所謂合宜山有猛獸林木不伐擇肉而食已假喻於秦君在物為患實有同於周處所以冥氏張弧設其穽獲冀疑蹊在足李陵無憂於垂餌檻穽搖尾張衡絕言於搏翼人之誤陷罪亦何加且啟塞從時古今明準若鷹隼未擊設者誠則匪彞如鴻鴈已飛陷人豈可有訟兩端斯按一言可蔽網罟結繩見彼取禽之道雄雌共穴聞於導渭之山甲雅志平生盤於是習利有攸往每懷馳騁之娛適我願兮仍持採捕之術既尋巒而討谷遂乘幽而險罻羅未亘傍掩西嶺之巖霧雨潛棲并獲南山之獸然體君子之變雖符彖象入虞人之羈蓋無奇異瞻言賞典或恐難從乃眷刑科寧宜濫罰為利殊途生人各業或豺已祭獸罻羅方設或獺未祭魚津梁仍禁惟甲情閑採捕志樂畋遊即鹿於林涉崎嶇之險道將禽伐木橫詰屈之荒途所以盡巢穴之羽毛窮棲宿之飛走竟歲趨末彌年棄本相彼夜行不遑宵處河傾左界捫暗樹以求溪月映前峯度幽蹊而失路倚衡招譴推蹶貽災斷之者雖則不殊觸之者有同非意不利攸往是妨行邁欲罪故為良難與奪覽薄言之訴援不審之詞法貴在寬庶從非濫爰整車徒用陳蒐狩辨其貴賤習以威儀將七德而聿修在三時而無害眷言刺史殊昧禮經在施政以庇人無聞去獸苟徇情而略地空見觀魚且魯隱如棠僖伯稱諫有窮遊洛虞人獻箴從皁隸之賤司誠當失位輕公侯之重任實曰曠官理合緘言豈宜文過請從繡衣之糾勿聽彤襜之辭彼何人斯漁以為事結廬逃境吟澤畔之風烟垂竿振緡盡河邊之歲月坐嚴陵之磯石芳餌長懸入尚父之磻溪遊鱗或躍始虛徐以在藻亦沈淨以遶蓮臨川之羨不忘入肆之求何遠殊野客之來獻匪曰猶賢類詩人之逝梁方聞起訟或告非法未見其宜採川徒山實庶人之攸往輕車重馬合古義其何傷訴云莅事日近陳力以位任才居守列王者之職百度惟貞在有司之能庶官奚曠惟乙績乖幹蠱名非靖恭等韗人之從吏周行是處均倚相之言詩祈招以感何則躬為下士秩等上農莫究端倪孰云主守未聞數馬而對如何尸祿以言匪課月成徒稱日近請抑無稽之訴以從司寇之罰執技事上各有司存學古入官固非失職將守其業用不易方必也正名無敢反側惟乙賤吏實曰函人忘其下旋上旋之權失其犀甲兕甲之屬訴云近莅豈曉籌年比農功之越思同美錦而學製懵其名物主者不利於操刀正以刑書所按乃得其資斧國有等威秩分貴賤必恭爾職乃罔後艱乙何人斯吏之賤者匪懈於位無聞幹蠱之美不思厥職遽招尸素之刺且龜玉見毀誰之過歟名物不分信為罪者貽曠官之罰自已包羞以日近為詞是亦文過必若德同周勃才異嗇夫當吶吶之人無求喋喋之口待窮閱實然後丕蔽為官擇才以政化物先甲申令著於易象惟丁者何效茲酷吏循牆之敬已殊於考父束溼之理將類於甯成陵長而六逆在茲滅德而九功失序且仁以為寶嘗聞得國犯而聚怨焉可定居既紊彞倫之經莫知哀矜之道國之蠧也刑其念哉車服以庸威儀有節各得其所無相奪倫戰者先登昔嘗聞於貍製或人匪服今頗同於鷸冠苟慢經以背常固速尤以貽咎身之災也妖實人興刑其恤哉理在無捨分命庶官各供所職有厥居守無相奪倫師貞丈人或曜威而振旅政成司馬將作氣而利用則擊鼓其鏜執鐃以節苟表盈竭無乖疾徐類援枹而可嘉何動旝而能擬或其失位訟匪有孚我則辯明訴乃無咎甲兵用嚴班位在守慘不畏法是瘝乃官挈轡挈壼隨力同道軍井軍舍從事殊觀匪恪居於戎律遽俶擾於侯度使介冑之夫云思拜井熊羆之將方解佩刀繄所掌而有失故流毒而災衆出晉侯於淖大夫且謂侵官加韓昭以衣典冠乃為越事爾不還忌咎從自及介狄薦居緣邊鎮國有備無患則為邦之大同使勇知方乃訓人之善者惟彼甲也膺茲利建食兼縣邑位列通侯密邇寇讐每惕不虞之至不忘戒懼空思誘掖之仁載稻與脂惠雖存於孺子式餔且歠吾淺之為丈夫何則政貴有恒弗惟好異仁稱兼愛無獨孩提徒必問其名居亦奚俟於丁壯絕甘分苦事雖均於越王小信未孚曾不酌於曹劌廉其邀譽法則傷深方乎詐善理難寘罰國章有節軍政必戒茲不率典誠為曠官甲屬當戎行謹勅乃事鑿門而誓伐鼓以律戎狄孔棘懼邊塵之是侵咨謀有方遂鋪敦而外禦式遏寇虐載孚備預觀釁以動在春秋而則書匪紿而言於雅頌而何失彼人所告不亦厚誣勿得孤虛之奇無乖測度之道襃德祿賢建封列爵以勸能者且旌善人惟彼輶軒是職防禦敷其七德耀以五兵故戎狄之人重譯來朝北闕蠻夷之類稽顙願沐南薰使司欲以德招攜請封茅土憲臺以舊非心膂未許繁纓得失可知與奪斯在且官不必備器無假人願取則於周書無貽誚於漢法刑典有常君命無貳臨危不撓視死如歸瞻彼皇華職思其任眷言青史惟其嗣之况西蕃小寇亂我邊境忠臣效節絕其姦詐使國之軍威得存乎信人之質直以成其名事有類於解揚見稱晉代節無虧於蘇武不遺漢策斯乃一言可以興邦獨行可以振古宜申厚賞以勸不能何所司之見疑昧將軍之雅意訟端不息誠合其宜委質策名惟忠與敬苟失茲道未之前聞甲實鯫生情深義勇常思報効願納忠貞且預公徒寧懷於倒㦸忝膺介士遂自於先登嗟爾徇名何期死政任患有同於丑父見薨疑則類於紛如難不越官我其懷矣死而利國爾實為之何直葢之光華俾懦夫之增氣生涯已謝魂魄焉依昔日求屍則聞五家之免今承寵命遽申三禭之儀優則未乖論且未當徵諸魯史親推見賞於無存考以國章禭服豈聞於祈父劾為專命對將何辭御史頗得於彈毫司馬宜懲於出位
