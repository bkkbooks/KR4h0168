  - {type: head, offset: 0, content: 山有徒搏殺獸者請賞州之所不與使科州違式不伏, id: KR4h0168_NFKB_977-h2, level: 2}
  - {type: head, offset: 74, content: 對捕獸判, id: KR4h0168_NFKB_977-h3, level: 2}
  - {type: head, offset: 74, content: 設穽獲取獸而誤陷人有司按罪不伏, id: KR4h0168_NFKB_977-h4, level: 2}
  - {type: head, offset: 182, content: 對捕鳥鼠獲豹判, id: KR4h0168_NFKB_977-h5, level: 2}
  - {type: head, offset: 182, content: 甲捕鳥鼠獲豹以為有異送官求賞所由科罪, id: KR4h0168_NFKB_977-h6, level: 2}
  - {type: head, offset: 297, content: 對採捕判, id: KR4h0168_NFKB_977-h7, level: 2}
  - {type: head, offset: 297, content: 甲採捕為業斷溪路之木不殊夜行者過乃推蹶科故為罪訴云暗中不審, id: KR4h0168_NFKB_977-h8, level: 2}
  - {type: head, offset: 459, content: 對觀魚判, id: KR4h0168_NFKB_977-h9, level: 2}
  - {type: head, offset: 459, content: 同州刺史矢魚而觀之御史糾彈辭曰農隙以講事仰處分, id: KR4h0168_NFKB_977-h10, level: 2}
  - {type: head, offset: 572, content: 對取魚判, id: KR4h0168_NFKB_977-h11, level: 2}
  - {type: head, offset: 572, content: 有人取魚輕車重馬或告非法訴有古義, id: KR4h0168_NFKB_977-h12, level: 2}
  - {type: head, offset: 692, content: 對不知名物判, id: KR4h0168_NFKB_977-h13, level: 2}
  - {type: head, offset: 692, content: 得乙是甲吏之賤者問所掌名物而不知被科, id: KR4h0168_NFKB_977-h14, level: 2}
  - {type: head, offset: 804, content: 對不知名物判, id: KR4h0168_NFKB_977-h15, level: 2}
  - {type: head, offset: 804, content: 得乙是甲吏之賤者問所掌名物而不知被科訴云莅事日近, id: KR4h0168_NFKB_977-h16, level: 2}
  - {type: head, offset: 902, content: 對不知名物判, id: KR4h0168_NFKB_977-h17, level: 2}
  - {type: head, offset: 902, content: 得乙是甲吏之賤者問所掌名物而不知被科訴云莅事日近, id: KR4h0168_NFKB_977-h18, level: 2}
  - {type: head, offset: 1010, content: 對小吏陵上判, id: KR4h0168_NFKB_977-h19, level: 2}
  - {type: head, offset: 1010, content: 得丁為小吏好陵上為人操下如束溼薪議者稱酷吏曰其理有所効, id: KR4h0168_NFKB_977-h20, level: 2}
  - {type: head, offset: 1103, content: 對衣貍製判, id: KR4h0168_NFKB_977-h21, level: 2}
  - {type: head, offset: 1103, content: 或人衣貍製有司糾云不稱其服, id: KR4h0168_NFKB_977-h22, level: 2}
  - {type: head, offset: 1167, content: 對執鐃失位次判, id: KR4h0168_NFKB_977-h23, level: 2}
  - {type: head, offset: 1167, content: 公司馬執鐃或告失位訴云不爽疾徐之節也, id: KR4h0168_NFKB_977-h24, level: 2}
  - {type: head, offset: 1248, content: 對挈壼挈轡不供判, id: KR4h0168_NFKB_977-h25, level: 2}
  - {type: head, offset: 1248, content: 律挈壼氏合挈轡以令之云官有守不供其事, id: KR4h0168_NFKB_977-h26, level: 2}
  - {type: head, offset: 1351, content: 對載稻判, id: KR4h0168_NFKB_977-h27, level: 2}
  - {type: head, offset: 1351, content: 甲為侯邑鄰於虜每載稻與脂於車行孺子之遊者無不餔也無不歠也必問其名居廉使奏飾詐邀譽訴云候其壯以威虜, id: KR4h0168_NFKB_977-h28, level: 2}
  - {type: head, offset: 1501, content: 對誓戒判, id: KR4h0168_NFKB_977-h29, level: 2}
  - {type: head, offset: 1501, content: 甲掌誓戒鋪敦大防人告其紿遊云不可測度, id: KR4h0168_NFKB_977-h30, level: 2}
  - {type: head, offset: 1602, content: 對請侯降者判, id: KR4h0168_NFKB_977-h31, level: 2}
  - {type: head, offset: 1602, content: 浙江西防禦使請侯降者御史臺守約而爭云非功臣, id: KR4h0168_NFKB_977-h32, level: 2}
  - {type: head, offset: 1706, content: 對不受敵判, id: KR4h0168_NFKB_977-h33, level: 2}
  - {type: head, offset: 1706, content: 安西使路中遇賊命其改所受辭不爾致官甲以死王事論賞所司以為非因戰陣不合訴者不伏, id: KR4h0168_NFKB_977-h34, level: 2}
  - {type: head, offset: 1834, content: 對先登判, id: KR4h0168_NFKB_977-h35, level: 2}
  - {type: head, offset: 1834, content: 甲先登死於霤下司馬三禭之與之犀軒直葢御史劾其專命, id: KR4h0168_NFKB_977-h36, level: 2}
