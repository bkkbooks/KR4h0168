front:
  text: 全唐文欽定全唐文卷十一帝諱治太宗第九子貞觀二年生五年封晉王十七年四月冊為皇太子二十三年六月即位年二十二咸亨五年八月稱天皇在位三十四年年五十六諡曰天皇大帝廟號高宗追尊天皇大聖大宏孝皇帝集八十六卷
  hash: sha256:25ef8c617efa2eee5c9abac14ed4761f38da2c0fb6bcb15171e8aa6fdab03547
  markers:
  - {type: head, offset: 11, content: 高宗皇帝, id: KR4h0168_NFKB_011-h1, level: 1}
body:
  text: 若夫元功攸宰丕業光於帝先神用斯沖峻道輝於象外至於炯誡千祀昭訓百王則有雕金揚不朽之基鏤玉啓無疆之迹而阪泉師律旌德之範未章疇野兵鈐銘徽之典猶闕乘巢革夏恧先覺於丹碑濟鮪戡殷愧生知於翠碣惟睿之失其大者歟自否運辭炎墊㝢之災梗極餘靈泣素稽霄之浸滔天風夏癸以昏初則忠良既逐政殷辛之虐往則邦國斯悴縠霏黃而霧地下黷方祇繩亂赤而雨天上墋圓象人怨神怒語亡之兆遽彰衆叛親離規存之謀遂爽月弓宵而空桂則蝕屢金波星箭夕而奔榆則妖飛玉弩塵埋五嶽見陵谷之遷移水竭百川覩江湖之騰沸鼎巳問於輕重裂周網者七雄德遂寢於休明絶秦綱者幾國天工是代紫庭無享眺之賓神道克恭元冕乏郊禋之辟故以鄒瀛眇眇同結向隅之悲亥跡茫茫共軫推溝之怨妖精紊象寶庫延災萃緑林者煙霏屯黑山者霧合戰龍于野則亂起干戈飛鴻在陸則害生戎馬先文皇帝憫黎元之巳燎救焚洪焰之爐悼品物之將淪拯溺橫流之澨握寶符於代北肇建丹旗剖神珠於漢東方撝白羽運五材而杖順陰陽未測懸兩耀而龔行幽明叶契而武關先入楚猴之暴未誅漸臺雖覆蜀蛙之聲猶振王充盜移鳳扆詿誤伊瀍竇德假署龍官虔劉趙魏同惡相濟共為脣齒先帝威闕一字有截思入無方窮幽測神研幾作聖薛公三策明出下科陳相六奇懸符上略親御姬鉞問罪晉京墨守屢殫般攻益贍鑿修闕一字之壤舉覆匱而成山引曲洛之波沃濫觴而為沼飛衝業業降臨負戶之危長隧悠悠上窺析骸之急奔鯨之穴染鍔非遙封狶之林倒戈斯在建德驅白波之衆濟馬頰之津據青犢之資踐牛口之谷吞沙石而賈勇召風雨而成梟圖解鄴城之圍規降上黨之守蜂飛萬旅胃起千㣥竭汜水之洪流褫岯山之崇堵羽書狎至馹遽交馳夕照趙烽晨驚魯柝於時謀臣鉗口息其請箸之談猛將含牙弭其穿札之氣或請退師函谷以避前鋒或請反斾崤陵以圖後舉先帝乃謂諸將曰本欲先定瀍東次平河朔今既遠投天網自取膏原建德若擒王充必敗虢亡虞滅理有固然韓并魏從義無或爽天實贊我不可失乎兵道尚奇屬斯舉也牽裾之議踐幕庭而局影斷鞅之規望轅門而闕一字息獨決神衷總排輿誦留偏裨之將分拒王城引趫武之師移和制邑滎波遠派遙疏官渡之濱廣武斜臨迥據成臯之險嚴闉概日巨防陵雲寰中逐鹿之郊㝢內闕二字之地興亡之道楚漢之迹猶存得喪之途曹袁之基未泯以代藩之貴均士伍之勞處唐侯之尊等更徭之膳越醪霑惠赴白刃以求仁楚纊銜恩捐蒼璧而取義乃率數百騎入其境五十餘里觀其部列摩壘而旋於是醜類相奔凶渠競進短兵交戰長圍亟合望柘弧而盡殪類棊布於中原應蕭斧而咸摧若星羅於平隰僅而獲反闕一字無一焉闕一字夫趙主入秦昭之關事從權免晉后察王敦之壘道以詐全業蹈往辰功優昔載自是鋒芒遂衄鉦鼓載衰奪林父之心破姜維之膽退歸漳滏恐天討之乘奔遠闕一字轘轅懼王師之兼弱深溝板渚斂轡車關數十罪而不驚示三驅而未款乃休牛洛汭暫息桃林之墟牧馬河陽聊駕襄城之野樵蘇巳遠虛月壘以招兵雉堞不修偃日羽而延寇建德深然楚閒不疑秦諜空峭壁以徑前沈輕舟而直進先帝勒兵背水列騎依山光流闕鞏之甲聲振武安之瓦神規嶽鎮未許代御之辭聖略川凝無受致師之請欲戰不可求反無路肇自霞初迄於景晏湯風爛石溽暑流金贏糧不從壺漿莫繼思仇餉於葛野想蠲渴於梅林齊侯絶華泉之遊楚將無穀陽之飲窮魚失水望清漢而摧鱗暍烏傾巢仰曾天而折翮先帝別命旌麾以乘其背親當矢石以擊其心表裏夾攻遠邇同至始見開行跡鴈分彼陳以弱其鋒終乃合勢形蛇離敵衆而孤其力冀馬追風彩桃花而翼路燕犀奪日輝若枝而鏡野摐金憤關隴之氣淩險若夷浴鐵惋熊羆之心陷堅如朽應龍畫角百川為之震蕩靈鼉制鼓九鎮所以傾頽投石蒙輪霜映雕戈之末翹關拔距電流文劒之端舉長篲以布新卷崩雲以袪祲攻虛匪實塵靡藉於曳柴擊衆以寡火無勞於結燧俘虜十餘萬斬首三千級生擒建德徇於城下靦顏流汗曾無解揚之言懷德畏威翻有蒯通之說然後操袂闕二字伏鑕旗亭臍燃董卓之膏頭飲智瑤之器王充牽羊請服刑馬求盟開定鼎之郊獻測圭之邑義貞白水信縟丹書赦其縲櫬之辜宥其挻埴之命情安共主忘鯁氣於田橫怨切周天忍終凶於魏豹於時沴卷東浸鏡萬里而河清妖斂西氛陳千重而雲散昔高宗鬼方致伐遠克三年周武牧野陳師尚勞再駕未有胸吞宇宙掌握乾坤正西北之傾天軸東南之毀地英謀一振功成晷刻之閒勍敵雙擒業茂須臾之頃故能基大寶於王業錫祉元圭掃元凶於天步臻祥緑錯國八紘而績禹功邁敘倫家六合而心勛德超則大犧皇語聖既桀往而堯今農帝方神遂昏前而闕二字奇謀沖祕非假書於黃石雄斷縱橫詎窺符於元女近以五載巡初省方伊洛九冬狩晚講戎許鄭舉鸞旗而遐指飛翠蓋以長驅垣壘肅而未遷山川儼而無改徘徊丹浦事求聞禮之辰顧步青邱情異撫軍之日波瞻舊漵水變沈沙之奇堞望前墉城餘拔幟之所是以餐哀霜露攀日月而不追茹痛風枝懷天地而莫報金墀在御方九仞以悲深玉案升珍擬萬鍾而闕一字切麟圖闕一字範義百楹書鳳篆留規道千裘冶虔守天位憂輟峻於洪基肅奉帝猷誡虧光於寶祚屬辭抽思實無覬於揚名相質披文庶有裨於紀德乃為頌曰乾綱肇絶神鼎初飛妖淩三季兵纏九圍元功孰纂神器無歸瞻烏逐變即鹿乘機穆穆聖祖桓桓神武電擊河汾雲飛京宇克清龍戰載安鼇柱禮叶禋宗樂諧率舞漳濱胃起洛汭鴟張荐驚權闕一字亟犯封疆裂冠稱帝犯蹕圖王豈知吳滅未辨虞亡睿后生知謀絶㣥彥雲輣西伐霜戈東戰元惡懸首凶渠革面一縱闕一字擒義多昔卞冰銷日域霧斂星區龍庭受吏鳳穴來蘇虔奉天祿恭膺帝圖陶甄太素亭育尊盧啓光夏政誦恢周道濫以菲躬聿承大寶宅侔宇宙業均犧昊豈闕一字英明實資衡保載省王風順驅月駟津由漂鹵途經絶轡思動則天慕纏因地敬愛攸屬明發奚洎寒移暑謝律變星回陳雲先滅月壘猶開毀垣殘柳塞井荒苔水侵闕一字石燧掩飛灰泗水詞班濟陽紀蔡式傳經略敢竭虛昧坤紐方輿乾張圓蓋騰實萬古飛英百代仰惟聖訓奉以周旋虛想異人共康神化式遵曩軌分騖翹車企覿英靈欽聞政道宜頒下州郡妙賢良其有理識清通執心貞固才高位下德重任輕或孝弟力田素行高於州里或鴻筆麗藻美譽陳於天庭或學術該通博聞千載或政事明允才為時新如斯之倫並堪經務而韜光勿用仕進無階委身蓬蓽深為可歎所在官僚精加訪採庶使垂綸必察操築無遺一善弓旌咸宜舉送攝太傅申國公士廉朝望國華儀型攸屬寡人忝膺監守實資訓導比日聽政常屈同榻庶因咨白少袪蒙滯但據案奉對情所未安近巳約吏不許更進太傅誨諭深至使遵常式辭不獲免輒復敬從所司亦宜別以一案供太傅寡人不造咎譴所鍾年在未識慈顏棄背終身之憂貫心滋甚風樹之切刻骨冥深每以龍忌之辰歲時興感空懷陟屺之望益疚寒泉之心既而笙歌遂遠瞻奉無逮徒思昊天之報罔寄烏鳥之情竊以覺道洪慈實資冥福冀申孺慕是用歸依宜令所司於京城內舊廢寺妙選一所奉為文德聖皇后即營僧寺寺成之日當別度僧仍令映帶林泉務盡形勝仰規忉利之果副此罔極之懷營慈恩寺漸冀向功輪奐將成僧徒尚闕伏奉敕旨度三百僧別請五十大德同奉神居降臨行道其新建道場宜名大慈恩寺別造翻經院虹梁藻井丹青雲氣瓊礎銅沓金環花鋪並加殊麗令法師移就翻譯仍綱維寺任蓋聞正法沒於西域像教被於東華古往今來多歷年所而難陀迦葉馬鳴龍樹既同瓶瀉有若燈傳故得妙旨微言垂文見意是以三十二相遍滿人天十二部經敷揚剎土由其路者則高騁四衢之上迷其途者則輪回六趣之中理窟法門元宗祕藏非天下之至賾孰能與於此乎皇帝以神道設教利益㣥生故普建仁祠紹隆正覺卜茲勝地立此伽藍請赤縣之名僧徵帝城之上首山林之士擁錫來遊朝廷之賓摳衣趨座義筵濟濟法侶詵詵實聚落之福田黔黎之壽域加以叢楹疊檊寶塔華臺洪鐘扣而弗喧清梵唱而逾靜若夫盧毗那佛坐普光法堂靈相葳蕤肹蠁以今方古暗與冥符名器之閒豈容虛立然僧徒結集須有綱紀詢諸大衆罕值其人積日搜揚頗有僉議咸云紀國寺上座慧淨自性清淨本來有之風神秀徹非適今也至於龍宮寶藏象力尊經皆挺自生知無師獨悟豈止四諦一乘之說七處八會之談要其指歸得其真趣而巳固亦滌除元覽老氏之至言潔淨精微宣尼之妙義莫不窮理盡性尋根討源其德行也如彼其學業也如此今請為普光寺主仍知本寺事法師比者逡巡靜退不肯降重殷勤苦請方始克從但菩薩之家體尚和合若得無諍三昧自然永離十纏亦願合寺諸師共宏此意其迎請之禮任依僧法忽辱來書甚以傾慰三復之後自覺欣然竊聞如來雖迹起人閒而道籠天外神功妙力不可思議寂爾無為則言語道斷湛然常在則心行處滅但為衆生煩惱漂沒愛河得不大拯橫流令登彼岸故出入三界升降六天經營十方良為於此若夫鹿園福地鷲嶺靈山灑甘露於禪林轉法輪於淨域付囑菩薩濟拔黔黎然後放光面門滅影雙樹寶船雖沒遺教猶存即是如來法身無有異也然人宏道非道宏人遠有彌勒文殊親承音旨近則圖澄羅什發明經教五百一賢信非徒說千里一遇蓋非虛言法師昔在俗緣門稱通德飛纓東序鳴玉上庠故得垂裕後昆傳芳猶子嘗以詩稱三百不離於苦空曲禮三千未免於生滅故發宏誓願回向菩提落彼兩髦披茲三服至如大乘小乘之偈廣說略說之文十誦僧祗八部般若天親無著之論法門句義之談皆剖判胸懷激揚清濁至於光臨講座開置法筵精義入神隨類俱解寫懸河之辨動連環之辭碧雞譽於漢臣白馬稱於傲吏以今倣古彼復何人所以仰請法師為普光寺主兼知紀國寺上座事又聞若獨善之心有限則濟物之理不宏彼我之意未忘則他自之情不坦且普光紀國俱是道場舊住新居有何差別法師來狀云魚鹿易處失燥濕之宜斯乃意在謙虛假稱珍怪昔聞流水長者遂能救十千之魚曠野獵師豈得害三歸之鹿但使筌蹄不用則言象自忘密雲不雨遂淹旬月此朕之寡德非宰臣咎實甘萬方之責用陳六事之過策免之科義乖罪己今敕斷表勿復為辭門下維城道峻理恢於邑壤分社寄隆義先於榮秩雍州牧潞王賢潞州牧周王顯瑤坡挺禎璇源發彩令聞彰於詩禮英徽表於岐嶷戎章之寵宜允於具瞻膏腴之恩式遵於故事並可上柱國各加別食實封一千戶餘如故國家平定天下革命創制紀功旌德久被樂章今郊祀四懸猶用干戚之舞先朝作樂韜而未伸其郊廟享宴等所奏宮懸文舞宜用功成慶善之樂皆著履執拂依舊服袴褶童子冠其武舞宜用神功破陳之樂皆被甲持㦸其執纛之人亦著金甲人數並依八佾仍量加簫笛歌鼓等並於懸南列坐若舞即與宮懸合奏其宴樂內二色舞者仍依舊別設古今典制文質不同至於制度隨代沿革唯祀天地獨不改張斯乃自處於厚奉天以薄又今封禪即用玉牒金繩器物之閒復有瓦樽秸席一時行禮文質頓乖駁而不倫深為未愜其封祀降禪壇所設上帝后土位先設稿秸瓦甒瓢杯等物並宜改用裀褥罍爵每事從文其諸郊祀亦宜準此門下大帝降鑒無幽不燭下人上訴在屈必申將使處巖廊者戶牖絶千里之蔽仰億兆者門庭無九重之隔故堯推心以撫俗業濟天下湯克己以察冤惠孚海內朕祗膺寶歷寅奉璇圖常居安以戒危每在得而思失慮一夫之不獲憂萬方之有罪以為承平既久區宇至曠州邑相望衆庶殷阜事繁則詐起法弊則奸生念茲冤滯深懷惻隱是以頻發詔書庶幾息訟比命申理未副朕懷百姓雖事披論官司不能正斷及於三司陳訴不為究尋向省告言又卻付州縣至有財物相侵婚田交爭或為判官受囑有理者不申或以按主取錢合得者被奪或積嫌纍載橫誣非罪或肆忿一朝枉加殺害或頻經行陳竟無優賞或不當矢石便獲勳庸改換文簿更相替奪或於所部憑倩織作少付絲麻多收絹布或營造器物耕事田疇役即伍功雇無半直又境內市買無所畏憚虛立賤價抑取貴物實貪利以侵人乃據估以防罪或進退丁戶等色多有請求或解補省佐之流專納賄賂或徵科賦役差點兵防無錢則貧弱先行有貨則富強獲免亦有鄉邑豪強容其造請或酒食交往或妻子去還假託威恩公行侵暴凡如此事固非一緒經歷臺省往來州縣動淹年歲曾無與奪欲使元元何所控告見在京訴訟人宜令朝散大夫守御史中丞崔謐朝散大夫守給事中劉景先朝請郎守中書舍人裴敬彞等於南牙門下外省共理冤屈屬戶所有訴訟隨狀為其勘當有理者速即奏聞無理亦示語發遣其有虛相搆架浪擾官方若經處分喧訴不絶者宜即科決使知懲厲仍限今年十二月內使了其在外州縣所有訴說冤滯文案見未斷絶者並令當處速為盡理勘斷務使甘伏勿使淹滯若處斷不平所司糾察得實者所由官人隨即科附可布告遐邇使知朕意主者施行門下蓋上帝臨下覆幬之德彰焉聖人在上財成之跡著焉然則統天理運微政令不能通其道經國訓人非渙汗無以宣其化故羲爻演繇后以施命誥四方虞典記言帝乃敷文被九域豈惟遒人振鐸理存乎闡教象闕懸書義在於垂法雖時分步驟必循先甲之規代變驪騵無革達名之軌既而淳源巳往澆風漸扇奸宄於是萌生譎詐以之飇起相彼㣥俗頗乖於信義顧茲庶尹罕嗣於忠勤尺一交馳徒有書亭之弊五條閒出猶招挂壁之譏非所謂光闡帝圖作為人極者也由此緑綈爰降尤慎於繁冗黃素所施彌崇於喻曉皇家創業抑揚前古粵在貞觀大啓憲章浹聲教於幽遐燭文明於區宇鴻池衍誥統理詳密螭鈕騰文規模宏遠固以貽厥將來懸諸日月朕祗肅鴻業恭臨寶位握千載之禎符承百王之末緒凝神間館託軒夢以憂人採誦康衢用堯心而拯物然以萬機事總恐聽覽之或遺四海務殷慮緝訪之多闕南宮故事綜核巳殫內史舊章搜羅殆盡自御宸扆每懷冰谷身雖處於巖廊情實係於億兆比者在外州府數陳表疏京下諸司亦多奏請朕以為帝命多緒範圍之旨載宏王言如絲彌綸之道斯洽前後處分因事立文歲序既淹條流遂積覽之者滋惑行之者愈怠但政貴有恆辭務體要道廣則難備事則易從故自永徽以來詔敕總令沙汰詳稽得失甄別異同原始要終捐華托實其有在俗非便事縱省而悉除於時適宜文雖煩而必録隨義刪定以類區分上稟先規下齊庶政導生靈之耳目闢風化之戶牖俾夫施之萬祀周知訓夏之方布之八埏共識司南之路仍令所司編次具為卷帙施行此外並停自今以後諸有表奏事非要切並準敕令各申所司可頒示普天使知朕意主者施行經國之制二則有辟為臣之道將則必誅況親則宗枝義兼家國敢懷逆節自桎嚴刑銀青光祿大夫宗正卿員外置同正員嗣岐王珍志在傾邪行惟險薄頃以寇迹未殄軍國多虞因集不逞之徒潛為亂常之計乃欲遠通叛虜搆此凶謀以有上封備聞其狀猶以戚屬初亦致疑遂令推按具自承伏且王者立法百代所遵稽彼常科罪當殊死以其可諱不忍加刑俾從放黜以申寬典宜免為庶人仍於溱州安置至彼捉搦勿許東西其同謀左武衛將軍竇如玢試都水使者崔昌右羽林軍使劉從諫蔚州長塞鎮將朱融右衛將軍胡列直司天臺通元院高抱素右衛率魏兆內侍省內謁者監王道成等九人特宜斬決試太子洗馬兼知司天臺冬官正趙非熊陳王府長史陳間楚州司馬張昂左武衛兵曹參軍焦自榮前鳳翔府郡縣主簿李岊國子監館進士張奐等六人特宜決殺駙馬都尉薛履謙同逆謀宜賜自盡東臺元天著象於紫微厚地區域於赤縣外崇四嶽伊帝闡其宏規旁別九州元王邵其丕績所以料茲物土畫野分疆相彼人事觀時濟俗開物成務理則由然高祖皇帝誕膺靈命肇開景業囊括軒頊孕育胥庭太宗文皇帝大聖登期自天縱哲撲崑岑之猛燎拯滄海之飛流巍巍蕩蕩無得而名焉朕以虛薄夙奉瑤圖承纍德之鴻猷履會昌之嘉運中外禔福遠邇乂安仰薦成功升禋岱巘緬維嚴配祗建合宮感事開元聿光先德俾我黎獻永賴隆平寧濟之方實資寬鑒寐凝想思致厥塗以為翼翼上京率土攸仰翦華抗堞貫渭疏瀾城闕崇嚴都邑夷敞戶口盈積市獄殷繁東西兩縣官曹尚少在於撫字事或難周至於詞訟綜理時闕須分所職各使兼濟其長安縣宜置乾封縣萬年縣析置明堂縣並於京城內近南安置其戶口即於兩縣逐便割隸應須官寮并公廨等一事以上並準長安萬年兩縣各令所司處分奏聞庶使憂勤之懷獨映於前古建元之慶長垂於後葉昔周武垂則汾邑啓維城之固漢文承統睢陽樹磐石之基所以作鎮邦家克隆景業第七子顯育粹雲峯分輝日觀風儀秀舉神識沖和挺玉質而含章振金聲而發彩夙遵教於詩禮方導德於閒平既表岐嶷之姿宜申圭社之貺可封周王食邑一萬戶朕肅承鴻緒無忘馭朽之懷虔奉聖謨每切臨深之懼幸以穹昊垂祐宗社降靈公卿盡叶贊之謀黎庶遂懷生之望故得乾坤交泰日月休徵垂衣而晏九瀛端拱而家六合方將回鑾峒岫體高尚於軒皇脫屣汾川追逸軌於伊后成功弗處思遵象帝之規守器斯傳用申知子之授皇太子宏生知誕質惟幾育性直城趨駕肅敬著於三朝中寢問安仁孝聞於四海若使負荷宗廟寧濟家邦必能永保昌圖克延景歷豈謂遽嬰霧露遂至彌留顧惟輝掌之珍特切鍾心之念庶其痊復以禪鴻名及腠理微和將遜於位而宏天資仁厚孝心純確既承朕命掩欷不言因茲感結舊疾增甚億兆攸係方崇下武之基五福無徵俄速上賓之駕昔周文至愛遂延慶於九齡朕之不慈遽永訣於千古天性之重追懷哽咽宜申往命加以尊名夫諡者行之迹也號者事之表也慈惠愛親曰孝死不忘君曰敬可諡為孝敬皇帝仍遵典故式備徽章布告遐邇使知朕意大行皇帝奄棄普天痛貫心靈若置湯火思遵大孝不敢滅身永慕長號將何逮及粵以孤眇屬當元嗣荷搆乾儀若臨冰谷思勵虛薄康濟黎元敬順唯新仰昭先德宜布凱澤被乎億兆可大赦天下內外文武賜勳官一級諸年八十以上賚以粟帛雍州及諸州比年供軍勞役尤甚之處並給復一年殷宗邁德化致升平周王顯仁政稱刑揩太宗文皇帝神明配德靈武兼資掃欃槍而王區夏混陰陽而作天地以此大業留屬微躬雖復琯變星霜而心嬰荼毒州郡之長能修厥職禮義興行姦回自屏刑憲不苛孤惸是賴有司詢訪宜以名聞有一於此當超不次其有經明行修談講精熟具此嚴才堪膺教胄者志節高妙識用清通博聞彊正終堪卿輔者遊情文藻下筆成章援心處事端平可紀者疾惡揚善依忠履義執持典憲終然不移者京司長官上都督府及上州各舉二人中下州刺史各舉一人前代忠鯁身死王門子孫才堪任官而留滯停移者既想遺風尤宜旌舉比者恭膺寶位乃叶天時繼奉休命必因正朔太宗文皇帝龔行天罰寧一區夏宏功無外盛烈難名攀望徽猷哀盈園寢朕以寡德守茲神器仰憑堂構俯暢生靈酌彼彞倫道兼文武方今孟陬獻蔀常儀佇歷三元首事萬國來庭宜遵經國之典以叶陽和之義可改貞觀二十四年為永徽元年通喪下達聖哲彞訓緯俗經邦咸率茲道至於嬰蓼莪之巨痛懷顧復之深慈得自天經含生罔極者也爰自周衰七雄交爭逮乎漢末三方競峙金革亟動鉦鼓日聞先王典章掃地將盡遂令三邊武猛墨絰而扈戎麾七萃驍雄素冠而事巡警亦有內無繼體傍闕同氣几筵安寄奠酹不親乃眷於斯載深驚歎朕膺茲景命君臨九野中區富教外俗永規宜有解張以勵風俗衛士掌間幕士等遭喪合期年上者宜聽終制三年昔勛華肇政仁義居先殷周創基教學成本朕嗣立鴻基裁成丕緒如臨於海罔知攸濟思得學徒用康庶績而頃歲所敦先諸聖教青襟方領未達至懷唯欲思轅固以加班想高堂以授秩斯文寥落去之彌遠深加發慮稱朕意焉儒官員闕即宜補授其館博士助教節級賜物三館學士有業科高第景行淳良者所司試俱以名聞華州刺史蕭齡之粵以常才纍叨非據入參九列出總六條番禺重鎮控攝遐遠心如溪壑聚斂無厭不憚典章唯利是視豪門富室必與交通受納金銀二千餘兩乞取奴婢一十九人赦後之贓數猶極廣㣥僚議罪請處極刑奏決再三即合從戮但人命至重每存審慎又其驅策自久桑榆漸迫諸子號叫伏闕求恩哀矜之心發自懷抱宜免腰領之誅投身瘴癘之地可除名配流嶺南遠處庶存鑒誡頒示天下朕寅畏三靈憂勤萬類分宵軫慮昃晷忘餐跡在巖廊心遍天下懼八政之或舛憂一物之未安欲使菽粟積於京坻禮讓興於萌俗而德不被遠誠未動天政道有虧咎徵斯應去歲三輔之地頗弊蝗螟天下諸州或遭水旱百姓之閒致有罄乏此繇朕之不德兆庶何辜矜物罪己載深憂惕今獻歲肇春東作方始糧廩或空事資賑給其遭蟲水處量以義倉賑貸貧乏雍同二州各遣郎中一人充使巡問務盡哀矜之旨副朕繾綣之心門下朕聞大德曰生肖天地而為貴大寶曰位體宸極以居貞所以經緯三才彌綸萬物順人心以敷化因天討而立刑易稱明罰哀矜之志愈遠書云肆眚惠之道斯崇故能象服畫冠化隆上葉道德齊禮刑清中代暨乎大道既隱淳風巳衰元首司契徇驕奢以臨下股肱贊道用深刻為奉公罪名積於書滋章被於率土姬訓夏法峻網備於三千秦革周科深文加於九族漢祖約法後嗣不勝其弊晉武蠲刑末流竟致其酷遂使茫茫區㝢圄犴所以實繁蠢蠢黔黎手足為之無措自斯以降禁網愈密歎深袁準之書事切劉宏之奏太宗文皇帝至道難名元功不測撥亂反正恤獄慎刑杜澆弊之餘源削繁苛之峻法道臻刑措二十餘年恥格之義斯隆惻隱之懷猶切玉几遺訓重令刊改瞻奉隆規興言感咽朕以虛寡夙嗣寶圖寅畏上元憂勤庶類乘奔履薄懼一物之未安旰食宵衣慮萬方之多罪雖解網之德有慙列聖而好生之惠無愧伊心於是仰遵先旨旁求故實詔太尉揚州都督監修國史上柱國趙國公無忌開府儀同三司上柱國英國公績尚書左僕射監修國史上柱國燕國公志寧尚書右僕射監修國史上護軍北平縣開國公行成光祿大夫侍中監修國史上護軍草修縣開國公高季輔銀青光祿大夫行黃門侍郎平昌縣開國公宇文節中書侍郎柳奭右丞段寶元太常少卿令狐德棻吏部侍郎高敬言刑部侍郎劉燕客給事中趙文恪中書舍人李友益少府丞張行實大理丞元紹太府丞王文端刑部郎中賈敏行等爰逮朝賢詳定法律酌前王之令典考列辟之舊章適其輕重之宜採其寬猛之要使夫畫一之制而易從約法之文一作章踈而不漏再移期月方乃撰一作始勒成宜班下普天垂之來葉庶設而不犯均被皇恩一作均彼上皇凡在㣥司一作臣逮於列嶽其務在審慎稱朕意焉弋獵畋游素非所好嘗謂此志布於遠近而蕃夷有獻鷹犬者慮阻來遠之情時復為受示以不違其意其諸州及京官仍有訪求狗馬鷹鶻之類來進深非道理自今後更有進者必加罪責去秋少雨冬來無雪今陽和在辰春作方始膏澤未降良疇廢業或恐獄訟之閒尚有淫濫含冤未達弗辜致罪百姓有過責深在豫宜順彼發生申茲恩宥在京及天下囚徒死罪宜降從流流巳下放免鰥寡惸獨及篤疾之徒量加賑恤務令得所窺窬圖讖必以亡身滅族斯皆先賢設教歷代舊章今大器乃與妖人往還虛占禍福矯託天命包藏逆心非意自彰巳歸嚴憲今屈法免死者繇朕寡德所致故也去春遺愛等逆起於前今冬大器禍彰於後一歲之內再有此釁朕宵興自思非無深愧朕恭膺寶命嗣奉瑤圖居萬乘之尊當四海之貴遐觀往烈詳求前古每希蹤於哲后常勞心於庶務兢懼弗寧憂勤若厲屬天下無事區宇有截仰高風於汾射暫清暑於林泉朕昔在震宮侍遊茲壤山川如舊歲月不追今既俗阜年和華夷胥悅緬懷徽範情兼感慰宜遵省方之義且順陽和之序曲申惠澤式彰寬宥行幸所經諸縣及岐州囚徒行人犯罪者流降徒徒巳下並免之故楊紹宗妻王氏因心為孝率性成道年迫桑榆筋力衰謝以往在隋朝父歿遼左招魂遷葬負土成墳又葬其祖父母等竭此老年親加版築痛結晨昏哀感行路永言志行嘉尚良深宜標其門閭用旌敏德賜物三十段粟五十石朕恭膺大寶嗣隆景業虔奉成則光闡宏猷昧旦兢懷宵分動慮蒼昊垂祐宗社降靈順黎元之心藉忠賢之力俗登仁壽道暨升平遠肅邇安時康俗阜履端受節陽和肇氣親率庶僚奉謁陵寢遺弓永慕切終身之憂撫鏡纏悲興寒泉之思敬深如在哀隆罔極薦享既畢精禋獲申式表因心宜宏愷澤可曲赦醴泉縣并行從人大辟罪以下皆赦除之百姓宜免今年租調右監門員外將軍常基在此宿衛進爵一等陵令陵丞各加一階并節級賜物武氏門著勳庸地華纓黻往以才行選入後庭譽重椒闈德光蘭掖朕昔在儲二特荷先慈常得侍從弗離朝夕宮壺之內恆自飭躬嬪嬙之閒未嘗忤目聖情鑒悉每垂賞歎遂以武氏賜朕事同政君可立為皇后少府監非軍國所需宗廟之用並不須飾以珠玉諸州常貢珠寶者並宜停進其市肆閒不得更為雕鏤及貨鬻珠寶及金銀等物朕聞小大以情義重前誥哀矜勿喜道光遐冊朕恭膺寶業嗣臨億兆留心聽斷劬勞日昃一物乖方納隍軫慮今既科格咸備憲制久行鞫訊之法律條具載深文之吏猶未遵奉肆行慘虐曾靡人心在含氣之倫稟柔脆之質乃有懸枷著樹經日不解脫衣迥立連宵忍凍動轉有礙食飲乖節殘酷之事非復一途楚痛切身何求不得言念及此深以矜懷又挾匿名書國有常禁凡厥寮庶咸應具述近遂有人向朝廷之側投書於地隱其姓名誣人之罪朕察其所陳皆極虛妄此風若扇為蠧方深自今以後內外法司及別敕推事宜並依律文勿更別為酷法其匿名書亦宜準律處分庶使泣辜之情遠覃於四海恤刑之旨長垂於萬葉朕聞防禍未萌先賢所重宮闈之禁其可漸歟昔如姬竊符朕用為永鑒不欲今茲自彰其過所搦憲章想非濫也但朕翹心紫禁思覿引裾側席朱楹冀旌折檻今乃喜得其言特免四通等死遠處配流
