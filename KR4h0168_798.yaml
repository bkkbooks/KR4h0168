front:
  text: 全唐文欽定全唐文卷七百九十八皮日休三
  hash: sha256:b12779c971e6ff01b214fa97440f5395bc38d3e8cf8b46284aae47229ab01d03
body:
  text: 祭法曰法施於人則祀之咎繇作帝謨為士師其道參乎舜禹不曰法施於人乎何祀典之闕哉祭法曰能禦大災則祀之堯舜之世山林蕃鳥獸暴益作虞也山林疏鳥獸鮮人民安不曰能禦大災乎何祀典之闕哉祭法曰以勞定國則祀之昔者周公輔武以寧殷亂佐成而立周業制禮樂立明堂不曰以勞定國乎何祀典之闕哉如以咎繇伯益之功小於舜禹不在祀典則契為司徒而民成咎繇也冥勤其官而水死伯益也如以聖人制禮自有七廟不合列在祀典則文王以文治武王以武功周公也如皆以功烈列於民者則吾之先師仲尼邁德於百王垂化於萬世孰不若契為司徒冥勤其官也哉日休懼聖人之文將亂而墜敢參補而附之文曰咎繇能平其法以位終益能立其功以讓禹政周公以文化仲尼以德成非此族也不在祀典昔夏后氏鑄鼎象物使民知神姦或魑魅之外魍魎之餘匿天命竊帝威罔不見形於鼎上者自夏后氏去繼為禍於人間被之者始若處冰檻復若落炎井眩瞀熒惑視之纍形聽者重聲骨節殆重如山已傾始或醒時奪人之情喪人之精兀若木偶昏如宿酲噫或飲食不節哀樂失所病於人者上則湯劑次則礦艾愈矣凡在是病者人也又非天也湯劑不可理礦艾不可攻嗚呼癘能禍人是必有知也既有知奚不效神為聰明正直不加祟於君子焉遂為文祝而逐之曰癘乎癘乎有事君不盡節事親不盡孝出為叛臣入為逆子天未降刑尚或竊生爾宜癘之有專祿恃威僭物行機上弄國權下戲民命天未降刑尚或竊生爾宜癘之有賣交取祿諂交結族一言不善禍發如鏃天夫降刑尚或竊生爾宜癘之美曼之色媚於君側巧笑未足已亡於國天未降刑尚或竊生爾宜癘之柔佞之言惑於君前委順未足國步移焉天未降刑尚或竊生爾宜癘之四星之位奉於紫宸蕭墻禍起帝座蒙塵天未降刑尚或竊生爾宜癘之見災幸久聞禍樂成含羞冒貴忍垢貪榮天未降刑尚或竊生爾宜癘之癘乎癘乎爾目不盲爾耳不聾如向來之所陳奚不禍於其躬仁者必有厄義者必有窮見仁義而勿癘遇姦佞而肆凶非惟去乎物患抑亦代乎天功癘乎癘乎苟依吾言若是吾將達爾於帝聰醉士隱於鹿門不醉則遊不遊則息息於道思其所未至息於文慙其所未周故復草隱書焉嗚呼古聖王能旌夫山谷民之善者意在斯乎或曰仲尼修春秋紀災異近乎怪言虎賁之勇近乎力行衰國之政近乎亂立祠祭之禮近乎神將聖人之道多歧而難通也奚有不語之義也曰夫山鳴鬼哭天裂地拆怪甚也聖人謂一君之暴災延天地故諱耳然後世之君猶有窮凶以召災極暴以示異者矣夫桀紂之君握鉤伸鐵撫梁易柱手格熊羆走及虎兕力甚也聖人隱而不言懼尚力以虐物貪勇而喪生然後世之君猶有喜角抵而忘政愛拔拒而過賢者寒浞竊室子頑通母亂甚也聖人隱而不言懼來世之君為蛇豕民為淫蜮然後世之君猶有易內以亂國通室以亂邦者夏啓畜乘龍周穆宴瑤池神甚也聖人隱而不言懼來世之君以幻化致其物以左道成其樂然後世之君猶有黷封禪以求生恣祠祀以祈欲者嗚呼聖人發一言為當世師行一行為來世軌豈容易而傳哉當仲尼之時苟語怪力亂神也吾恐後世之君怪者不在於妖祥而在於政教也力者不在於角抵而在於侵凌也亂者不在於袵席而在於天下也神者不在於禨鬼而在於宗廟也若然其道也豈多歧哉民性多暴聖人導之以其仁民性多逆聖人導之以其義民性多縱聖人導之以其禮民性多愚聖人導之以其智民性多妄聖人導之以其信若然者聖人導之於天下賢人導之於國衆人導之於家後之人反導為取反取為奪故取天下以仁得天下而不仁矣取國以義得國而不義矣取名位以禮得名位而不禮矣取權勢以智得權勢而不智矣取朋友以信得朋友而不信矣堯舜導而得也非取也得之而仁殷周取而得也得而亦仁吾謂自巨君孟德已後行仁義禮智信者皆奪而得也悲夫文學之於人也譬乎藥善服有濟不善服反為害或曰聖人見一善必汲汲慕之夫丹朱商均雖曰不肖豈便毒於豺虎哉何其嗣之遠也且善足以保身不足以保天下噫丹朱商均苟非堯舜之子一身且不保况天下哉毀人者自毀之譽人者自譽之夫毀人者人亦毀之不曰自毀乎譽人者人亦譽之不曰自譽乎或曰神農牛首蜚仲鳥身信乎哉曰非形也象也夫梟羊猰貐尚猶類人况聖賢也哉或曰夏禹為黃熊信乎哉曰非也感也夫簡狄吞鳥卵而生契薑嫄履大迹而産稷是也當禹之母夢熊而生耳不然者禹誠是熊吾以聖人為罔象也或曰孟子云豫何人也舜何人也是聖人皆可修而至乎曰聖人天也非修而至者也夫知道然後能修能修然後能聖且堯為唐侯二十而以德盛舜為鰥民二十以孝聞焉在乎修哉后稷之戲必以藝殖仲尼之戲必以俎豆焉在乎修哉蓋修而至者顏子也孟軻也若聖人者天資也非修而至也窮山人盡行也大江人盡涉也然而不幸者有遇虎兕之暴蛟龍之患者矣豈以是而止者哉夫途有遇是患而死者繼其踵者惟恐其行之不速也今之士為名與勢苟刑禍及流竄至是監刀鋸者必名人司流竄者必勢士繼其踵者惟恐其位之不速也嗚呼名與勢然也吾患其內虎兕乎蛟龍乎是天不為人幸也非人也其或披林逐虎兕入水嬰蛟龍遇其患也是人不為天幸也非天也若是以取禍則終身所為心之駔儈焉君子不為其所不為小人為其所不為可以威而不威可以殺而不殺難也潔者不觀其窮觀其富也慎者不觀其危觀其勢也苟當窮能潔當危能慎戒也非真也古之官人也以天下為已纍故已憂之今之官人也以已為天下纍故人憂之今道有赤子將為牛馬所踐見之者無問賢不肖皆惕惕然皆欲驅牛馬以活之至夫國有弱君室有色婦有謀其國欲其室者惟恨其君與夫不罹其赤子之禍也噫是復何心哉孟子曰伯夷隘柳下惠不恭伊尹五就湯五就桀皮子採廉於伯夷廉於天下不為隘矣擇和於下惠和於天下不為不恭矣取志於伊尹志於天下不為不大矣天有造化聖人以教化裨之地有生育聖人以養育裨之四時有信聖人以誠信裨之兩曜有明聖人以文明裨之噫裨於天地者何獨聖人雖禽獸昆蟲雲物亦不能自順其化麟鳳裨於祥瑞也蛟龍裨於潤澤也昆蟲裨於地氣也雲物裨於天候也而况於聖人乎况於鬼神乎故紆大君之組綬食生人之膏血苟不仁而位是不裨於祿食也况能裨於天地乎吾乃知是禽獸昆蟲雲物不竊於天地之覆燾也舟之有柂猶人之有道也柂不安也舟之行匪柂不進是不安而安也人之行也猶舟之有柂匪道不行是不行而行也夫秦失柂於項項遺柂於漢是聖人之道不安其所安小人之道安其所不安也伊尹之道一介不以與人一介不以取諸人吾得志弗為也與之以道取之以道天下可也况一介哉伊尹之道近乎執吾去執而取廉者也伯夷不仕非君弗治非民治則進亂則退吾得志弗為也不仕非君孰行其道不治非民孰急天下以非君乎湯不當事桀文王不當事紂也以非民乎桀民不赴殷紂士不歸周矣故伯夷之道過乎高吾去高而取介者也柳下惠何仕非君何使非民與惡人言雖袒裼裸裎於我側爾焉能浼我哉吾得志弗為也夫蚍蜉豈遇人而有禮哉民之下者亦若是而已柳下惠之道過乎溷吾去溷而取辨者也於戲黃卷之內聖賢者皆在焉慕而不可及愛而不可必鬱鬱於厲夫至乎是者為心乎為身乎心則勞身則憊嗚乎道果不在於自用古之奢也吾不奢古之儉也吾不儉適管晏之中或可矣噫古之奢者僭今之奢也濫古之儉也性今之儉也名學而廢者不若不學而廢者學而廢者恃學而有驕驕必辱不學而廢者愧己而自卑卑則全勇多於仁謂之暴才多於德謂之妖小善亂德小才耗道以有善而不進以有才而不修孔門之徒恥也古之隱也志在其中今之隱也爵在其中吏不與姦罔期而姦罔自至賈豎不與不仁期而不仁自至嗚呼吏非被重刑不知姦罔之喪己賈豎非遭極禍不知不仁之害躬也夫易化而善者齊民也唯吏與賈豎難哉人之肆其志者其如後患何聖人能與人道不能與人志嗚呼才望顯於時者殆哉一君子愛之百小人妬之一愛固不勝於百妬其為進也難不以堯舜之心為君者具君也不以伊尹周公之心為臣者具臣也造父善御不能御駑駘公輸善匠不能匠散木吾知夫不教之民也豈易御而易匠者哉陽貨者仲尼之駑駘也互鄉者仲尼之散木也或曰子之道有以邁千人子之貌固不足加於衆噫何哉曰亦何異哉伊臯亦人耳孔顏亦人耳不思而立言不知而定交吾其憚也知道而不行知賢而不舉甚乎穿窬也夫盜也者不能盡一室如不行道足以喪身不舉賢足以亡國金貝珠璣非能言而利物者也至夫有國者寶之甚呼賢惜之過乎聖如失道而有亂國且輸人况夫金貝珠璣哉聖人行道而守法賢人行法而守道衆人侮道而貨法古之決獄得民情也哀今之決獄得民情也喜哀之者哀其化之不行喜之者喜其賞之必至周公為天子下白屋之士今觀於一命之士接白屋之人斯禮遂亡悲夫幸君之急而見懲糾己之讎而為直因躬不好者而為廉因人不樂者以為正大人不由也聖人之道猶坦途諸子之道猶斜徑坦途無不之也斜徑亦無不之也然適坦途者有津梁之斜徑者苦荊三王之世民知生而不知化五帝之世民知化而不知德毀人者失其直譽人者失其實近於鄉願之人哉憚勢而交人勢劣而交道息希利而交人利薄而友道退明君善全臣者不狎哲士善全友者不昵或曰吾善治苑囿我善治禽獸我善用兵我善聚賦古之所謂賊民今之所謂賊臣虸蚄能害稼不能害人姦邪善害人害稼者有時而稔是不害也雖有祝鮀之佞宋朝之美其害人也可勝道哉或問君子之道何如則可以常行矣曰去四蔽用四正則可以常行矣曰何以言之見賢不能親聞義不能伏當亂不能正當利不能節此之謂四蔽道不正不言禮不正不行文不正不修人不正不見此之謂四正鵷鸞不見君子慕焉鶯鳩常見小人捕焉噫君子之出處亦猶夫鵷鸞而已矣不位而尊者曰道不貨而富者曰文噫吾將謂得時乎尊而驕者不為矣吾將謂失時乎富而安者吾為矣或曰將處乎世如何則可以免乎謗曰去六邪用四尊則可矣曰何以言之曰諫未深而謗君交未至而責友居未安而罪國家不儉而罪歲道不高而凌貴志不定而羡富此之謂六邪也自尊其道堯舜不得而卑也自尊其親天下不得而詘也自尊其己孩孺不得而娛也自尊其志刀鋸不得而威也此之謂四尊也愛雖至而不媟讎已危而不擠勢方盛而知足利正中而識已豈小人之能哉以儉而獲罪猶遠乎奢以退而遇謗尚愈乎進弓箕之家生子而捨乎弓箕陶方瓦之家生子而捨乎陶方瓦噫吾之道猶弓箕陶方瓦乎自漢至今民産半入乎公者其唯桑宏羊孔僅乎衛青霍去病乎設遇聖天子吾知桑孔不過乎賈豎衛霍不過乎士伍古之殺人也怒今之殺人也笑古之用賢也為國今之用賢也為家古之酗醟也為酒今之酗醟也為人古之置吏也將以逐盜今之置吏也將以為盜或曰楊墨有道乎曰意錢格簺皆有道也何啻乎楊墨哉吾知夫今之人嗜楊墨之道者其一夫之族耳有天地來言乎孝者大曰舜小曰參舜承順父母之道無不為也雖俾食於褻器寢於廁竇猶將順之况夫修廩浚井哉然猶避乎大杖也雖嘗以小杖為順則舜修廩可也浚井可也設死於大杖誰養瞽叟哉參承順父母之道無不至也鋤瓜傷根曾晢杖之幾至於死是以仲尼不以為孝也何哉有參則皙安無參則皙孤參順鋤瓜之罪設死於杖誰養夫皙哉夫以二孝之不受重責恐夫糜骨節隳肢體有辱於先人也豈有操其刃剸己肉以為孝哉夫人之身者父母之遺體也剸己之肉由父母之肉也言一不順色一不怡情尚以為不孝况剸父母之肉哉故樂正子春喪足不下堂漢景不吮孝文之癰二賢卒成大孝猶傷足不下堂吮癰有難色何者傷己之足傷父母之足也吮父母之癰吮己之癰也傷之者不敬吮之者過媟是以聖賢不為也今之愚民謂己肉可以愈父母之病必剸而飼之大者邀縣官之賞小者市鄉黨之譽訛風習習扇成厥俗通儒不以言執政不以禁昔墨氏摩頂至踵斷指存脛謂之兼愛今之愚民如是其兼愛耶設使虞舜糜骨節曾參隳肢體樂正子春傷足不愛漢景吮癰無難今之有是者吾猶以為不可况無是理哉或執事者嚴令以禁之則天下之民保其身皆父母之身也欲民為不孝也難矣哉人之心也仁者孝有餘凶者暴不足故聖人之制禮非所以懲其不足抑亦戒其有餘由是節之以哀戚定之以封域制之以斬衰仁者之喪滿其哀也不足於心而不能有餘於禮凶者之喪滿其怠也有餘於心而不能不足於禮此由民之心必有嗜欲必知飢渴自開闢而至於今未能改也魯人有朝祥而暮歌者子路笑之夫子曰由爾責於人終無已夫三年之喪亦已久矣又孔子既合葬於防曰吾聞之古也墓而不墳今某東西南北之人也不可以弗識矣於是封之崇四尺孔子先反門人後雨甚至孔子問焉曰爾來何遲也曰防墓崩孔子不應三以其三言之自以非禮不聞也孔子泫然流涕曰吾聞之古不修墓以三年之喪天下之通制也古不修墓聖人之格言也以朝祥而暮歌聖人尚不笑之以經雨而防墓崩聖人尚泣而修之况廬之於其側朝夕而哭哉故合葬於防孔子先反者尚修虞事也今之愚民既合不掩謂乎不忍也既掩不虞謂乎廬墓也傷者必過毀甚者必越禮上者要天子之旌表次者受諸侯之褒賞自漢魏以降厥風逾甚愚民蚩蚩過毀者謂得儀越禮者謂大孝姦者憑之以避征徭偽者扇之以收名譽所在之州鄙礱石峩然問所從來曰有至孝也廬墓三年孝感至瑞郡守聞於天子天子為之旌表焉嗚呼夫古之廬墓至畜妻子於宅兆之前其波流斃至今褻慢焉有守正者雖大孝不録為非者雖小道必旌則聖人之制後何法焉或曰子貢居於夫子墓側六年乃去非廬墓之自耶曰子貢之罪大矣口受聖人之言身違聖人之禮噫甚矣夫子曰事師無犯無隱左右就養亡方服勤至死心喪三年又曰師吾哭諸寢是師之喪也心喪止於三年哭泣至於寢室未有倍其年而哭於墓者斯子貢之罪也今執事者見愚民之有是者宜責而不貴鄙而不旌則民必依禮而行矣苟若是則隳教之風息毀制之道壅傳曰辛有適伊川見被髮而祭於野者今之有是被髮而哭於野者幾何不為戎之於宅兆乎有心於是道者得斯説而存之禁之可也令之可也日休自布衣受九江之薦與計偕寓止永崇里居浹旬有來候者曰子幾退於有司幾孰於執事其譽與名煜煜於京師矣致是也者孰自曰偶與計偕者曾未識咸陽城闕所贄者未及卿相之門所趨者未入勢利之地其譽與名反不知其自矣曰聞子受今小司徒河東公知素矣公當時之望溟渤於文場嵩華於朝右子之上第不足憑他門曰公之為前達接後進今之中古人也愚欲自知其道干之以其文以名臣之威絀賤士之禮其為知大矣所謂干之以其道知之亦以其道遇其人則宣之於口不遇其人則貯之於心非佞傳媚説者也或者不懌而退居一日又有來者曰喋喋之人謂子賴其知欲一舉於有司信哉曰於戲聖天子之世文教如膏雨儒風如扶搖草茅之士得以達市井之子可以進名場大闢豁若廣路千百人各負纍能時執事各立用譽如日休之才處於場中若放鯤鮞於東溟逐麞麛於五嶽以小入大以微混衆其汨汨沒沒昭然可知矣豈能一舉於有司哉或練窮物態曉盡時機一二十舉於有司倘處之下列行其道也上可以布大知下可以存祿利而已矣曰若能者謗歟子宜默處梁上第防其萌曰大聖者不過周孔然猶管蔡謗然前叔孫毀於後何由處世而然亦猶登高者必望臨深者必窺矣詩曰讒言罔極交亂四國夫四國且亂况一士哉雖然敢不防其萌嗚呼防而免者人歟防而不免者天歟魏收為後魏書大夸西域氏之教以為漢獲休屠王金人乃釋氏之漸也秦始皇聚天下兵鑄金人十二於咸陽漢復置之豈可復為釋氏哉夫仲尼修春秋君有僣王號者皆削爵為子况戎狄之道不能少抑其説耶孟子曰能以言拒楊墨者遠矣不能以言抑者收也亦聖徒之罪人矣謂史必直歟則春秋為賢者諱之為尊者諱之筆削與奪在手則收之為是媚於偽齊之君耶不然何不經之如是在昔屈平既放作離騷經正詭俗而為九歌辨窮愁而為九章是後詞人托而為之皆所以嗜其麗辭撢其逸藻者也至若宋玉之九辨王裦之九懷劉向之九歎王逸之九思其為清怨素豔幽抉古秀皆得芝蘭之芬芳鸞鳳之毛羽也然自屈原以降繼而作者皆相去數百祀足知其文難述其詞罕繼者矣大凡有文人不擇難易皆出於毫端者乃大作者也楊雄之文某軻乎而有廣騷也梁竦之詞班馬乎而有悼騷也又不知王逸奚罪其文不以二家之述為離騷之兩派也昔者聖賢不偶命必著書以見志况斯文之怨抑歟噫吾之道不為不明吾之命未為不偶而見志於斯文者吾懼來求世任臣之君因謗而去賢持祿之士以猜而遠德故復嗣數賢之作以九為數命之曰九諷焉嗚乎百世之下復有修離騷章句者乎則吾之文未過不為乎廣騷悼騷也粵句亶之薄俗兮其風狡而且苦吾欲以直道揠其邪心兮皆逞容而莫顧前誨行兮後止高諭仰兮下俯咸謂吾之儇為愚兮並以吾之狸心為傴羌靈修之乃吾知兮先職我而為輔奈其臣之狺狺兮乃不知吾之所撫吾欲以明哲之性辨君臣之分兮定文物之數吾欲以正訐之道兮進忠賢而退姦豎吾欲以醇醲之化兮反當今而為往古吾欲以忖度之志兮定觚圓而反規矩念儓核之在位兮若梟羊之當路內灼怛以如倳兮復何知其所訴乃指天而鬱悠兮將天奪乎國之祜永惄惄以何言兮將求知於吾祖有肪兮墨而謂之不潔有泉兮壅而謂之不決有草洍兮車蘭而謂之不芳有軸兮鍥而謂之不轍聲咺唏以無音兮氣鬱悒而空噎既惄惄以憎懼兮又謾謾而不訣誣彭祖以為孺兮譎殤子以為耋夥衆人之難信兮撏夸者之不悅佞為贅兮何去姦為龐兮莫劀讟為轡兮莫御謗為玉兮何切彘既䑋而必烹兮木方葼兮必折心車龍車龍以似車兮思綿綿而如瓞手欲動兮似拲足將行兮如絏既不辨於顏跖兮遂一貫於堯桀吾哀生之不逢兮奚至死而惙惙念帝座之不曭兮胡交光於卷舌既何路以自辨兮遂沒齒而癆剌靳尚之言兮美於女嬴子蘭之氣兮醲於酲既怒耳帛丿糸以相向兮遂裹足而南征面匿匿以奚色兮心榮榮而何情耳方聰兮忽睽目正視兮忽盲日當午兮便昃天方晝兮不明欲泣兮有血將啼兮失聲望靈修兮似失出國門兮若驚軔識怨兮欲緩駟知愁兮復鳴既倘佯兮夏水復眷戀兮南荊嗟子夙秉於大訓兮涵漬骨之忠貞既貿者之莫余容兮向重蒼而自盟既婪仁以憑義兮遂鈲信而槻誠將真宰之不仁兮胡為役余以此生彼鸒斯之蟊賊兮固不能容乎鶬鶊彼茨菉之叢穢兮固不能讓乎杜蘅已矣乎國無人兮莫我留將訴帝於玉京荷為禱兮芰為襬荃為䘿兮薜為褘弭吾棹兮澧之浦駐吾楫兮湘之湄悲莫悲兮新去國怨莫怨兮新相思幽篁蕭兮靜晚清漪淡兮去遲湘君欲出兮風水急帝子不來兮煙雨微芷既老兮白藥日將暮兮紅萎朝浮乎鶻蹄夕呌乎羈雌䖵漾漾兮不止㶇悠悠兮何之日出沒兮北渚雲依稀兮九疑既無人以辨余兮又何心而怨咨退不解其㤞憏兮進不知其忸怩寒蜩怨而無聲兮古木凄其寡枝嗟吾魄之不返兮千秋萬歲湘中馳慨天道之不明兮何獨生此大佞若猰貐之能冠兮當一國而持柄見亂臣之反詐兮信其主以不競轍已覆而又遵兮仡將翻而不整不思心腹之疾兮又玩膏肓之病竟客死於咸陽兮終不作毒王之幸既養虎以遺患兮遂倒釬而授柄將諛臣之肆禍兮豈上天之付命粵吾大以為不可兮彼以災而為慶倘靈修之魄有知兮刷吾恥於下暝有一美人兮端憂千喑萬愁兮曾不得以少休腸結多以莫回兮淚啼劇而不流王孫何處兮碧草極目公子不來兮清湘滿眸汀邊月色兮曉將曉浦上蘆花兮秋復秋天泬寥以似淬兮峰巉崒以如抽篔簹颯兮雨岸杜若死兮霜洲遺余程兮澧之側整余陌兮湘之幽望女嬃兮秭歸夢懷宋玉兮荊門愁欲向天以號咷兮寸晷不可以少留又不知吾魂之所處兮永寂寞以悠悠山之巔兮水之涘桂為祠兮蘭為位執玉桴兮扣雷鼓奠金麻皿兮滴浮蟻薦瓊芳兮望暮雲獻椒醑兮拜寒水祝肸蠁以怪談兮巫妖冶而魅醉波閃倏兮湘君竹蕭疏兮帝子日將暮兮河伯秋正深兮山鬼神之化兮何方人之艱兮至此胡不化其邪而為正兮胡不返其戾而為義胡不轉其亡而為興兮胡不易其亂而為治但血食於下國兮曾不少裨於有位吾將乘青螭而駕白虬兮將謁帝而訴神之纍謂天弧發鏃兮天棓行箠神速悔尢兮俾吾霛修而易知粵吾秉志兮潔於瑾瑜芬其德而芳其道兮榮於蘼蕪將興國以見罪兮擬佐王而蒙辜彼㣥小之茸茸兮如慕臰之蟞蜉以大鵬為爵兮以康瓠為俞瓦以袞衣為褋兮以黎邱為墟以鄭姬為醜兮以子産為愚以鮑焦為貪兮以孔聖為誣吾將奮鱗於大空兮奚獨慕此江湖吾將發榮於蟠桃兮奚獨守此蒿蔞吾將蕩其魄兮驂風軔與軋車謁帝於冥冥之天兮秉其生殺之樞將飄飄以高逝兮亦何必懷此姦邪之故都堯死兮舜滅禹殄兮湯絶似玉兮將沈如金兮永沒行以仁兮止以義生以貞兮死以潔念余曾不足以蹈聖閫兮亦慕茲而自悅湘浦兮煙深沅江兮風切顧影兮白憐撫躬兮永訣鬼慘兮天愁雨泣兮泉咽竟汨沒以奫淪兮永幽憂而怫鬱湘之山兮未盡湘之流兮不竭千秋兮愁雲萬古兮明月靈均之寃兮孰能銷其氣靈均之愁兮孰能釋其結來者之自鑒兮無致位於牙孽余嘗讀賈誼新書見其經濟之學大矣哉真命世王佐之才也自漢氏革嬴高祖得於矢石不暇延儒生及為天子制缺度弛處華而夷是時獨有叔孫生能定朝儀其制未悉唯生草其書欲以制屈諸侯推定正朔調革輿服通流貨幣天不佑漢絳灌興謗竟枉其道出傅湘沅生自以不得志哀屈平之放逐及渡沅湘沈文以弔之故其辭曰日離九州而相君兮何必懷此故都噫余釋生之意矣當戰國時屈平不用於荊則有齊趙秦魏矣何不捨荊而相他國乎余謂平雖遭靳尚子蘭之讒不忍捨同姓之邦為他國之相宜矣然則生之見棄又甚於平當漢時捨乎帝則為諸侯矣如適諸侯則新書之文抑諸侯而尊天子捨諸侯則胡越矣則新書之文滅胡越而崇中夏也是以其心切其憤深其詞隱而麗其藻傷而雅余悲生哀平之見棄又生不能自用其道嗚乎聖賢之文與道也求知與用苟不在一時而在百世之後者乎其生之哀平歟余之悲生歟吾之道也廢與用幸未可知但不知百世之後得其文而存之者復何人也咸通癸未中南浮至沅湘復沈文以悼之其辭曰粵炎緒之嫣綿兮其國度之未彰天錫生以命理兮冀其道之益光偉吳公之知賢兮道其名於文皇既敐以召之兮遂位之於上庠愍耋儒之蠢愚兮對天問之不臧既㣥愚之讓俊兮馳其譽之煌煌嗟大漢之丕緒兮蚪其賢於汙潢上下溷而不分兮議制削於驕王殺僇棼而不制兮斷捽胡其寇攘羌虜坌以侵華兮曾不能以抑強餌其嗜之延延兮實三代之計良念五德之更承兮論兀貴結而不綱乃秉臆以興説兮數用五而色尚黃又諸侯以開國兮輸其租於咸陽曾不得以撫民兮俾其君兮可忘請紆禺以乘印兮各馳化於所疆上既悅而欲大用兮遭絳灌於東陽道既擯兮何明乃出傅於沅湘侼沅波之滃洫兮或漾棹以夷猶望靈均之沒所兮顧其心之怊怊臨汨羅之浩漾兮想懷沙之幽憂森樛蘿以蓊鬱兮時并狖以相號霧雨暗乎北渚蟲庸毒乎芳洲景黯沮以不明兮若夫悼乎離騷香依依兮杜若韻淒淒兮篻簩山隱隱以掃空兮煙微微而淡秋嗟吾不知所惑兮淚懭恨以橫流當抱憤於渺藩兮曾無足以少休既菼薍以傷思兮又鵂鶹以動愁嗚呼哀哉世既不平領吾道以為非兮吾復何依蘋蘭憔悴兮稂莠繁滋麟鳳匿迹兮梟獍騰威哲匠罷斧兮拙者搆之離婁閉目兮瞽者揚眉子都蒙袂兮敦洽騁姿嗚呼哀哉亦先生之尢也眙其世之不可兮何不解而去位又垂萬世之名兮取捨在此奚自謗於童羖兮乃憪然而為纍蓋伊尹三就五就之心兮冀其民之可治奈惛惛以不悟兮又被之以非議幸一人之再覺兮答受之奧義既孱王以墮駕兮乃寃慟而已矣訊曰君不明矣莫我知幽都寂兮和涕歸文懸日月兮俟後聖用之大故忽兮其何足悲屈原作大招魂或曰景差作疑不能明宋玉作招魂皮子以為忠放不如守介而死奚招魂為故作反招魂一篇以辨之詞曰承溟涬之命兮付余才而輔君君既不得乎志兮余飄飄而播遷余將蕩大空而就滅兮君又招余俾復身余詣帝以請訣兮帝俾巫陽以筮云巫陽語余以不可歸兮故作詞以招君乃下招曰君兮歸來故都慎不可留些其君雄虺兮其民封狐些食民之肝鬲以為其肉兮摘民之髮膚以為其衣些朝刀鋸而暮鼎鑊兮上曖昧而下墨眉尸木癡些君兮歸來故都慎不可留些余昔為比干之魂兮干僇而余去些未聞干貪生以自招兮余竟潔其所處些君兮歸來故都慎不可留些余昔為伍胥之魂兮胥僇而余逝些未聞胥貪位以惜生兮執屬鏤而不滯些君兮歸來故都慎不可留些余昔為宏演之魂兮演自殘而余行些未聞演惜命以不死兮俾其義而益明些君兮歸來故都慎不可留些帝命余以輔君兮亦以君之忠介自今以忠而見聞兮尚盤桓而有待些將自富貴而入羈旅兮其志乃悔些將戀骨肉而惜家族兮何不自裁些梟食母而獍食父兮見禽獸之為生些苟殘者眉壽兮實梟獍而同名些君乎慎勿懷故都之戀歸來乎余為君存千古忠烈之榮名些夫原者何也原其所自始也窮大聖之始性根古人之終義其在十原乎嗚呼誰能窮理盡性通幽洞微為吾補三墳之逸篇修五典之墮策重為聖人之一經者哉否則吾於文尚有歉然者乎或曰聖人之化出於三皇成於五帝定於孔周其質也道德仁義其文也詩書禮樂此萬代王者未有易是而能理者也至於東漢西域之教始流中夏其民也舉族生敬盡財施濟子去其父夫亡其妻蚩蚩嚚嚚慕其風蹈其間者若百川蕩滉不可止者何哉所謂聖人之化者不曰化民乎今知化者唯西域氏而已矣有言聖人之化者則比戶以為嗤豈聖人之化不及於西域氏耶何其戾也如是曰天未厭亂不世世生聖人其道則存乎言其教則在乎文有違其言悖其教者即戾矣古者楊墨塞路孟子辭而闢之廓如也故有周孔必有楊墨要在有孟子而已矣今西域之教嶽其基溟其源亂於楊墨也甚矣如是為士則孰有孟子哉千世之後獨有一昌黎先生露臂瞋視詬之於千百人內其言雖行其道不勝苟軒裳之士世世有昌黎先生則吾以為孟子矣譬如天下之民皆桀之民也苟有一堯民處之一堯民之善豈能化天下桀民之惡哉則有心於道者乃堯民矣嗚呼今之士率邪以禦衆握亂以治天下其賢尚爾求不肖者反化之不曰難哉不曰難哉或問或者曰物至貴者曰金玉焉人至急者曰粟帛焉夫一民之飢須粟以飽之一民之寒須帛以暖之未聞黃金能療飢白玉能免寒也民不反是貴而貴金玉也何哉曰金玉者古聖王之所貴也其在舜典則曰修五玉也其在春秋則曰諸侯貢金九牧禹所以鑄鼎象物玉所以飾禮金所以備貢以斯為貴貴不多乎曰舜取五玉以備禮禹鑄九金以為鼎由言其禮不為諸侯乎不為人民乎苟無粟無帛是無諸侯與人民也則五玉九金豈徒貴哉如舜不修五玉禹不鑄九金三代之祭祀不以玉貨賄不以金矣由是言之金玉者王者之用也苟為政者下其令曰金玉不藏於民家如有藏者以盜法法之民不藏矣法既若是民必貴粟帛棄金玉雖欲男不耕而女不織豈可得哉或曰然能嗣其親不曰子乎吾觀夫今之世誨其子者必檟肌榜骨傷愛毀性以為教嗚呼孟子所謂古者易子而教誠有旨歟不能教其子者是亡其身者也不能得其親者是捨其族者也古之佞臣愛人之貴過乎其親必捨而事之公子開方是也愛人之權過乎其子必殺而徇之易牙是也自茲以降為夫強臣者將欲奪人之宗必先殺己子矣王莽殺子字是也噫教尚不可况其殺歟或曰均是親也均是害也則周公誅管蔡石碏殺石厚叔向僇叔魚漢文流淮南可乎曰均是親也賢則能嗣親凶則能覆族均是害也周公不誅則他人誅之石碏不殺則他人殺之叔向不僇則他人僇之漢文不流則他人流之己刑則及一人他刑則及其族此聖賢所以惜其族也刑也者仁在其中矣能以心求道者不曰己乎能以心為天子為諸侯為賢聖者不曰己乎是己之重不獨重於人抑亦重於道也嘗試論之能辱己者必能辱於人能輕己者必能輕於人能苦己者必能苦於人為孔顏者非他寶乎己者也為盜跖者非他殘乎己者也故古之士有不出戶庭名重於嵩衡道廣於溟海者敬於己而已矣或曰所謂敬己者不曰不能害己者乎如豎貂自宮能敬己乎鮑莊刖足能敬己乎曰均是敬也均是害也其媚與直不同也所謂敬於己者以道也害於己者亦以道也或曰聖人汲汲於民至若堯如臘舜如腒其勞至矣於己安乎曰勞者勞於心也勞一心而安天下若禹者股無胈脛無毛其勞亦至矣勞者勞於身也勞一身而安萬世者也古者有殺身以成仁者况勞者歟嗚乎吾觀於今之世諂顏偷笑辱身卑己汲汲於進如豎貂者幾希問奕之原於或人或人曰堯教丹朱征丹朱作為是信固有其道焉皮子曰夫奕之為藝也彼謀既失我謀先之我智既虧彼智乘之害也欲利其內必先攻外欲取其遠必先攻近詐也勝之勢不城池而金湯焉負之勢不兵甲而奔北焉勝不讓負負不讓勝爭也存此免彼得彼失此如蘇秦之合從陳軫之遊説偽也若然者不害則敗不詐則亡不爭則失不偽則亂是奕之必然也雖奕秋洊出必用吾言焉嘗試論之夫堯之有仁義禮智信性也如生者必能用手足任耳目者矣豈區區出纖謀小智以著其術用爭勝負哉堯之世三苗不服以堯之仁苗之慢堯兵而熠之由羅人殺鵂鶹漁人烹鯤鮞者矣堯不忍加兵而以命舜舜不忍伐而敷之文德然後有苗格焉以有苗之慢尚不加兵豈以害詐之心爭偽之智用於戰法教其子以伐國哉則奕之始作必起自戰國有害詐爭偽之道當從橫者流之作矣豈曰堯哉豈曰堯哉堯為諸侯非求為天子也摯之民用之舜為鰥民非求為天子也堯之民用之或曰摯善亦堯乎曰亦堯而已矣曰摯與堯其民俱捨之則善惡奚分耶曰摯固不仁矣堯固仁矣堯仁如是民尚慕舜况有君惡於摯君道不如堯焉得民用哉故曰聖人不求用而民用之求用而聖人不用之曰若是則孔子奚不用魯曰用之則魯化不用之天下奚化天之利下民其仁至矣未有美於味而民不知者便於用而民不由者厚於生而民不求者然而暑雨亦怨之祁寒亦怨之己不善而禍及亦怨之己不儉而貧及亦怨之是民事天其不仁至矣天尚如此况於君乎况於鬼神乎是其怨訾恨讟蓰倍於天矣有帝天下君一國者可不慎歟故堯有不慈之毀舜有不孝之謗殊不知堯慈被天下而不在於子舜孝及萬世乃不在於父嗚乎堯舜大聖也民且謗之後之王天下有不為堯舜之行者則民扼其吭捽其首辱而逐之折而族之不為甚矣或曰丹朱為諸侯舜為天子丹朱有過舜誅之乎商均為諸侯禹為天子商均有過禹誅之乎曰不也朱均之為國必有舜禹之吏翼而治之何容朱均得暴其民也哉苟有過必諭之諭而不可奪其政如誅之者去堯舜之嗣也焉有為人臣而去其君嗣哉或曰法家嚴而少恩周官有八議漢法有三章微八議也雖然人可免以三章而親賢必刑何哉曰聖賢在世不能無過以輕重議之耳如以謗刑刑之雖周孔其可免諸管子説蚩尤割廬山之金以鑄五兵説者或云蚩尤古天子則炎黃繼命其間無蚩尤之運也案史記云蚩尤與其大夫作亂如此為庶人之暴者且庶人不當有大夫日休以為蚩尤乃黃帝之諸侯蓋其為人暴黃帝征而滅之如此為庶人一夫之暴不足當天子用兵也又明矣嗚呼昭然之理前賢惛之况大聖之深旨哉説者以蚩尤為五兵每有師祭當祭蚩尤嘻厥亂甚矣皮子直以蚩尤為黃帝逆亂之臣五兵直作於炎帝固姶苟自蚩尤始以其亂逆且不當祀况果不自蚩尤蚩尤不道黃帝滅之又不當以不道充祀軒轅五帝之首能以武定亂以德被後今之師祭宜以軒轅為主炎帝配之於義為允
