front:
  text: 全唐文欽定全唐文卷六百三十八李翺五
  hash: sha256:1ca9a2cce953311c8c7cbdc6fb4e31a6f50bd8aecab08696be5d10229b9b1628
body:
  text: 孔子曰道千乘之國敬事而信節用而愛人使民以時又曰若欲行而法則周公之典在孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也欲輕之於堯舜之道大貉小貉也欲重之於堯舜之道大桀小桀也是以什一之道公私皆足人既富然後可以服教化反淳朴古之聖賢未有不善於為政理人而能光於後代者也故善為政者莫大於理人理人者莫大於既富之又教之凡人之情莫不欲富足而惡貧窮終嵗不製衣則寒一日不得食則飢四人之苦者莫甚於農人麥粟布帛農人之所生也嵗大豐農人猶不能足衣食如有水旱之災則農夫先受其害有若曰百姓不足君孰與足夫如是百姓之視其長上如仇讎安既不得享其利危又焉肯盡其力自古之所以危亡未有不由此者也人皆知重斂之可以得財而不知輕斂之得財愈多也何也重斂則人貧人貧則流者不歸而天下之人不來由是土地雖大有荒而不耕者雖耕之而地力有所遺人日益困財日益匱是謂棄天之時遺地之利竭人之財如此者雖欲為社稷之臣建不朽之功誅暴逆而威四夷徒有其心豈可得耶故輕斂則人樂其生人樂其生則居者不流而流者日來居者不流而流者日來則土地無荒桑柘日繁盡力耕之地有餘利人日益富兵日益強四鄰之人歸之如父母雖欲驅而去之其可得耶是以與之安而居則富而可教與之危而守則人皆自固孟軻所謂率其子弟攻其父母自生人以來未有能濟者也嗚呼仁義之道章章然如大道焉人莫不知之然皆不能行何也見之有所未盡而又有嗜欲以害之其自任太多而任人太寡是以有土地者有仁義無代無之雖莫不知之然而未有一人能行之而功及後代者由此道也秦滅古法隳井田而夏殷周之道廢相承滋久不可卒復翺是以取可行於當時者為平賦書而什一之法存焉庶幾乎能有行之者云爾凡為天下者視千里之都為千里之都者視百里之州為百里之州者起於一畝之田五尺謂之步古者六尺為步古之尺小為茲時之尺四尺八寸則方一步為古之方一步餘三百步六寸二分五釐二百有四十步謂之畝古者步百為畝與此時不同從俗之數則易行也一畝為古之田三畝三百有六十步謂之里古者畝百為夫夫三為屋屋三為井井之田九夫三屋方三百步為一里也方一里之田九夫頃異名也方里之田五百有四十畝畝百為頃五頃四十畝也古之里雖小其畝又加小所以古之方一里為田九頃茲時方一里為田五頃四十畝為古之田一十六頃有二十畝也十里之田五萬有四千畝五百四十頃也為古之田一千六百二千頃也百里之州五十有四億畝五萬四十頃也為古之田一十六萬二十頃也千里之都五千有四百億畝五百四十萬頃也為古之一千六百二十萬頃也方里之內以十畝為之屋室徑路牛豚之所息蔥韭菜蔬之所生植里之家給焉古者方一里為井為田九百畝農夫家各受田百畝公田八十畝八家同養公田公事畢然後理私事詩曰雨我公田遂及我私餘田二十畝為廬井屋室茲時里既加大一畝之田為古之田三畝則十畝之田為古之田三十畝校其多少亦相若矣凡百里之州為方十里者百州縣城郭之所建通川大途之所更邱墓鄉井之所聚甽遂溝瀆之所渠大計不過方十里者三十有六有田一十九億四萬有四千畝一萬九千四百四十頃也百里之家給焉千里亦如之高山大川城郭其中斬長綴短而量之一畝之田以強并弱水旱之不時雖不能盡地力者嵗不下粟一石公索其十之一凡百里之州有田五十有四億畝以一十九億四萬有四千畝為之州縣城郭通川大途甽遂溝澮邱墓鄉井屋室徑路牛豚之所息蔥韭菜蔬之所生植餘田三十四億五萬有六千畝三萬四千五百六十頃也畝率十取粟一石為粟三十四萬五千有六百石以貢於天子以給州縣凡執事者之祿以供賓客以輸四方以禦水旱之災皆足於是矣其田間樹之以桑凡樹桑人一日之所休者謂之功桑太寡則乏於帛太多則暴於田是故十畝之田植桑五功一功之蠶取不宜嵗度之雖不能盡其功者功不下一匹帛公索其百之十凡百里之州有田五十四億畝以十九億四萬有四千畝為之州縣城郭通川大途甽遂溝澮邱墓鄉井屋室徑路牛豚之所息蔥韭菜蔬之所生植餘田三十四億五萬有六千畝麥之田大計三分當其一其土卑不可以植桑餘田二十三億有四千畝樹桑凡一百一十五萬有二千功功率十取一匹帛為帛一十一萬五千有二百匹以貢於天子以給州縣凡執事者之祿以供賓客以輸四方以禦水旱之災皆足於是矣鰥寡孤獨有不人疾者公與之粟帛能自給者弗征其田桑凡十里之鄉為之公囷焉鄉之所入於公者嵗十舍其一於公囷十嵗得粟三千四百五十有六石十里之鄉多人者不足千六百家鄉之家保公囷使勿偷飢嵗并入不足於食量家之口多寡出公囷與之而勸蠶以須麥之升焉及其大豐鄉之正告鄉之人歸公所與之畜當戒必精勿濡以內於公囷窮人不能歸者與之勿徵於書則嵗雖大飢百姓不困於食不死於溝洫不流而入於他矣人既富樂其生重犯法而易為善教其父母使之慈教其子弟使之孝教其在鄉黨使之敬讓羸老者得其安幼弱者得其養鰥寡孤獨有不人病者皆樂其生屋室相鄰煙火相接於百里之內與之居則樂而有禮與之守則人皆固其業雖有強暴之兵不敢陵自百里之內推而布之千里自千里而被乎四海其孰能當之是故善為政者百姓各自保而親其君上雖欲危亡弗可得也其在詩曰逮天之未陰雨徹彼桑土綢繆牖戶今此下民或敢侮豫此之謂也禽滑釐問於子墨子曰魯氏有叔姪同處者叔曰無恆姪曰數奇數奇強力能施儉以厚人凡魯氏有大事父叔兄弟所不能集者數奇皆盡身以成之親戚之喪在野者數奇往葬之姑姊妹之無主失時者數奇皆取而嫁之其或不能自存者數奇買田宅以生養之凡數奇之祿朋友故舊緦麻小功之親無不皆周也仕於齊積功當遷辭不受請以與其叔無恆因得官遠近之親莫不歡以賴之獨無恆以為不足於己無恆有妾曰善佞畜私夫以生子曰不類數奇愛不類如其子無恆久乃告數奇曰不類非吾子他人之子也汝勿以為弟數奇驚曰叔父得無誤乎無恆曰吾察之詳矣有驗存焉數奇之從父妹笑曰孰不知之雖然叔父之為人也無常心其後必悔悔則兄受謗為不仁而棄弟矣盍請契焉數奇以為然因質於無恆無恆遂裂帛具書其然之故與數奇以為信既而數奇仕於蜀無恆果復以不類為子愛之加於初數奇至固爭之無恆大怒告人曰帛書非吾意數奇強我以為無恆惡數奇之不順已也毀而敗之冀有惡名於時數奇終不怨其自行如初敢問為數奇者宜奈何而可子墨子曰數奇潔身而去可也問曰姪捨叔而去義乎子墨子曰有大故雖子去父可也叔姪何有古公欲立王季歷太伯仲雍知之遂適吳不返避嫡以成父志晉獻公信驪姬之讒將立奚齊太子申生不去終被惡名雉經以死且陷其父於惡公子重耳奔翟逃禍卒有晉國霸天下故重耳為孝而申生為恭無恆之惡數奇也深矣不去後必相殘陷無恆於大惡孰與去而皆全以追太伯仲雍重耳之迹而行乎雖子逃父可也問曰數奇可以不去而盡從無恆之所行耶曰不可從道不從父從義不從君况叔父乎無恆之所行無恆也如皆從之是陷無恆於惡數奇將何以立禽滑釐以子墨子告於數奇數奇遂適東夷東夷之俗大化樗蒲五木元白判厥二作雉背雉作牛王采四盧白雉牛氓采六開塞塔禿橛木全為王駁為氓皆元曰盧厥策十六皆白曰白厥策八雉二元三曰雉厥策十四牛三白三曰犢厥策十雉一牛二白三曰開厥策十二雉如開厥餘皆元曰塞厥策十一雉白各二元一曰塔厥策五牛元各二白一曰禿厥策四白三元二曰撅厥策三白二元三曰木厥策二矢百有二十設關二間矢為三馬策二十厥色五凡擊馬及王采皆又投馬出初關疊行非王采不出關不越坑入坑有謫行不擇策馬一矢為坑公諱楚金咨議詔第二子明經出身初授衛州參軍又授貝州司法參軍夫人清河崔氏父球亠兊鄆懷三州刺史公伯兄惟慎太原府壽陽縣丞性曠達樂酒不理家産每日賫錢一千出遊求飲酒者必盡所賫然後歸其飲酒徒善草隸書張旭其人也公事壽陽如父在每事必請於壽陽壽陽曰汝年亦長矣若都不能自治立然每事必擾我何為公曰不請非不能為此也不滿乎人心其請如初及在貝州刺史嚴正晦禁官吏於其界市易所無公至官之日養生之具皆自衛州車以來又以二千萬錢入曰吾食貝州水而巳及正晦黜官百姓舊不樂其政將俟其出也㣥聚號呼斃之以瓦石揚言無所畏忌録事參軍不敢禁懼謂公曰若之何公曰録事必不能當請假歸攝録事參軍斯可矣乃如之公告正晦曰若以威強不便於百姓百姓俟使君行加害於使君使君更期出其為使君任其患於是集州縣小吏得百餘人皆持兵無兵者持朴埋長木於道中令曰使君出百姓敢有出觀者杖殺大木下及正晦出百姓莫敢動或曰剌史出可作矣如李司法何貝州震恐後剌史至委政於公姦吏皆務以情告不敢隱貝州於是大理壽陽之夫人鄭氏賢知於族嘗謂壽陽曰某觀叔賢於君某之質不敢與叔母較高下君之家和子孫必有興者壽陽之第二子為戶部侍郎初戶部氏兄弟五人妹一人其喪母也皆幼公每日必抱置膝上或泣而傷諸姪之安於叔父也如未失母時有子三人曰某祗承父業不敢弗及夫人清河崔氏能以柔順接於親族其來歸也皆自以為已親焉翺生不及祖不得備聞其景行其貝州事業親受之於先子其餘皆聞之於戶部叔父伏以皇祖之為子弟時若不能自任也及涖官行事則剛勇不回也如此其行事皆可以傳於後世為子孫法蓋聞先祖有善而不知不明也知而不傳不仁也翺欲傳懼文章不足以稱頌道德光耀來世是以頓首願假辭於執事者亦惟不棄其愚而為之傳焉元和三年十月翺既受嶺南尚書公之命四年正月己丑自旌善第以妻子上船於漕乙未去東都韓退之石濬川假舟送子明日及故洛東弔孟東野遂以東野行濬川以妻疾自漕口先歸黃昏到景雲山居詰朝登上方南望嵩山題姓名記別既食韓孟別豫西歸戊戌子病寒飲蔥酒以解表暮宿於鞏庚子出洛下河止汴梁口遂泛汴流通河於淮辛丑及河陰乙巳次汴州疾又加召醫察脈使人入盧又二月丁未朔宿陳留戊申莊人自盧又來宿雍邱乙酉次宋州疾漸瘳壬子至永城甲寅至甬口丙辰次泗州見刺史假舟轉淮上河如揚州庚申下汴渠入淮風帆及盱眙風逆天黑色波水激順潮入新浦壬戌至楚州丁卯至揚州戊辰上栖靈浮圖辛未濟大江至潤州戊寅至常州壬午至蘇州癸未如虎邶之山息足千人石窺劍池宿望海樓觀走砌石將遊報恩水涸舟不通無馬道不果遊乙酉濟松江丁亥官艘隙水溺舟敗戊子至杭州己丑如武林之山臨曲波觀輪樁登石橋宿高亭晨望平湖孤山江濤窮竹道上新堂周眺㣥峯聽松風召靈山永吟呌猿山童學反舌聲癸巳駕濤江逆波至富春丙申七里灘至睦州庚子上楊盈川亭辛丑至衢州以妻疾止行居開元佛寺臨江亭後三月丁未朔翺在衢州甲子女某生四月丙子朔翺在衢州與侯高宿石橋丙戌去衢州戊子自常山上嶺至玉山庚寅至信州甲午望君陽山怪峯直聳似華山丙申上於越亭己亥直渡擔石湖辛丑至洪州遇嶺南使遊徐孺亭看荷花五月壬子至吉州壬戌至虔州己丑與韓泰安平渡江遊靈應山居辛未上大庾嶺明日至湞昌癸酉上靈屯西嶺見韶石甲戌宿靈鷲山居六月乙亥朔至韶州丙子至始興公室戊寅入東蔭山看大竹筍如嬰兒過湞陽峽己卯宿清遠峽山癸未至廣州自東京至廣州水道出衢信七千六百里出上元西江七千一百又三十里自洛州下黃河汴梁過淮至淮陰一千八百有三十里順流自淮陰至邵伯三百有五十里逆流自邵伯至江九十里自潤州至杭州八百里渠有高下水皆不流自杭州至常山六百九十有五里逆流多驚灘以竹索引船乃可上自常山至玉山八十里陸道謂之玉山嶺自玉山至湖七百有一十里順流謂之高溪自湖至洪州一百有一十八里逆流自洪州至大庾嶺一千有八百里逆流謂之漳江自大庾嶺至湞昌一百有一十里陸道謂之大庾嶺自湞昌至廣州九百有四十里順流謂之湞江出韶州謂之韶江僧文象好養生術元和七年三月十八日朝茅山遇老人於華陽洞口告僧曰汝有仙相吾授汝祕方有何首烏者順州南河縣人祖能嗣本名田兒天生閹嗜酒年五十八因醉夜歸臥野中及醒見田中有藤兩本相遠三尺苗蔓相交久乃解解合三四心異之遂掘根持問村野人無能名曝而乾之有鄉人夌良戲而曰汝閹也汝老無子此藤異而後以合其神藥汝盍餌之田兒乃篩末酒服經七宿忽思人道纍旬力輕健欲不制遂娶寡婦曾氏田兒因常餌之加餐兩錢七百餘日舊疾皆愈反有少容遂生男鄉人異之十年生數男俱號為藥告田兒曰此交藤也服之可壽百六十嵗而古方本草不載吾傳於師亦得之於南河吾服之遂有子吾本好靜以此藥害於靜因絶不服汝偶餌之乃天幸因為田兒盡記其功而改田兒名能嗣焉嗣年百六十嵗乃卒男女一十九人子庭服亦年百六十嵗男女三十人子首烏服之年百三十嵗男女二十一人安期敘交藤云交藤味甘溫無毒主五痔腰腹中宿疾冷氣長筋益精令人多子能食益氣力長膚延年一名野苗一名交莖一名夜合一名地精一名桃柳藤生順州南河縣田中嶺南諸州往往有之其苗大如藳本光澤形如桃柳葉其背偏獨單皆生不相對有雌雄雄者苗色黃白雌者黃赤其生相遠夜則苗蔓交或隱化不見春末夏中初秋三時候晴明日兼雌雄採之烈日曝乾散服酒下良採時盡其根勿洗乘潤以布帛拭去泥土勿損皮密器貯之每月再曝凡服偶日二四六八日是服訖以衣覆汗出導引尤忌者羊肉血老人言訖遂別去其行如疾風浙東知院殿中孟侍御識何首烏嘗餌其藥言其功如所傳出賓州牛頭山苗如萆薢蔓生根如杯拳削去側皮生啖之南人因呼為何首烏焉元和八年八月録吾郡陸傪字公佐生於世五十有七年矣明於仁義之道可以化人倫厚風俗者餘三十年連事觀察使觀察使不能知退居於田者六七年由侍御史入為祠部員外郎二年出剌歙州卒於道貞元十八年四月二十八日也凡人所不能窮者必推之於天天之注膏雨也人心以為生旱苗然也雨與苗運相違或雨於海或雨於山旱苗不得仰其澤惟人也亦然天之生俊賢也人之心以為拯憔悴之人然也賢者與憔悴之人時不合或死於野或得其位而道不能行憔悴之人不得被其惠膏雨之降也適然賢者之生於時也亦然運相合旱苗仰其澤憔悴之人賴其力傅説甘盤尹吉甫管夷吾之類也時勿合膏雨降雖終日賢哲生雖比肩旱苗之不救百姓之弗賴顏子子思孟子董仲舒之類也故賢哲之生自有時百姓之賴其力天也不賴其力亦天也嗚呼公佐之官雖升於朝剌於州其出入始二年道之不行與居於田時弗差也公佐之賢雖日聞其德行未必昭昭然聞於天子公佐是以不得其職出剌一州又短命道病死天下之未蒙其德固宜矣然則天之生君也授之以救人之道不授之以救人之位如膏雨之或雨於海或雨於山旱苗之不沐其澤者均也故君子不得其位以行其道者命也其亦有不足於心者耶得其道者窮居於野非所謂屈冠冕而相天下非所謂伸其何有不足於心者耶荊軻感燕丹之義函匕首入秦劫始皇將以存燕霸諸侯事雖不成然亦壯士也惜其智謀不足以知變識機始皇之道異於齊桓曹沫功成荊軻殺身其所遭者然也乃欲促檻車駕秦王以如燕童子婦人且明其不能而軻行之其弗就也非不幸燕丹之心苟可以報秦雖舉燕國猶不顧况美人哉軻不曉而當之陋矣翺與監察御史韋君詞皆自東京如嶺南水道僅八千里翺以正月十八日上舟於漕以行韋君期以二月策馬疾驅追我於汴宋之郊或不能及約自宣城會我於常州以偕行既翺停舟宿留日日以須韋君之出洛也易期又宣城謀疾到逆江南流上翺以妻疾居信安四十餘日比及江西韋君亦前行矣上桄榔亭見韋君紀姓名且有念我之言嗟夫皆行八千里先後之不齊也不過十日而初謀竟乖人事之不果不可以前期也翺為兒童時聞山遊者説峽山寺難為儔遠地嘗以為無因能來及茲獲遊周歷五峯然後知峽山之名有以然也於靈鷲寺時述諸山居之所長而未言其所不足如虎邱之劍池不流天竺之石橋下無泉麓山之力不副天奇靈鷲擁前山不可視遠峽山亦少平地泉出山無所潭乃知物之全能難也况求友擇人而欲責全耶去其所闕用其所長則大小之材無遺致天下於平治也弗難矣凡居山以怪石奇峯走泉深潭老木嘉草新花視遠為幽自江之南而多好山居之所翺之對者七焉皆天下山居之尤者也蘇州有虎邱山則外為平地入然後上高石可居數百人劍池上峭壁聳立憑樓檻以遠望愍女姓高妹妹名也生七嵗當建中二年父彥昭以濮陽歸天子前此逆賊質妹妹與其母兄而使彥昭守濮陽及彥昭以城歸妹妹與其母兄皆死其母李氏也將死憐妹妹之幼無辜請獨免其死而以為婢於官衆皆許之妹妹不欲曰生而受辱不如死母兄且皆不免何獨生為其母與兄將被刑咸拜於四方妹妹獨曰我家為忠宗黨誅夷四方神祗尚何知問其父所在之方西嚮哭再拜遂就死明年太常諡之曰愍當此之時天下之為父母者聞之莫不欲愍女之為其子也天下之為夫者聞之莫不欲愍女之為其室家也天下之為女與妻者聞之莫不欲愍女之行在其身也昔者曹娥思盱自沉於江獄吏呼囚章女悲號思唁其兄作詩載馳緹縈上書乃除肉刑彼四女者或孝或智或義或仁噫此愍女厥生七嵗天生其知四女不倫向遂推而布之於天下其誰不從而化焉雖有逆子必改行雖有悍妻必易心賞一女而天下勸亦王化之大端也異哉愍女之行而不家聞戶知也貞元十三年翺在汴州彥昭時為潁州剌史昌黎韓愈始為余言之余既悲而嘉之於是作高愍女碑柏氏系自有周叔虞封晉其支子有受邑於伯為采地者因以為姓後世生宗宗以直顯景公厲公之時三郤惡宗共譖殺之其客畢陽以其子州黎奔楚於是改伯為柏及漢有鴻者由議郎為魏郡守子孫家焉故為魏郡也有季纂者入唐為工部尚書生敬仁為蘄州長史生謇為河南永寧令贈大理寺少卿生造為懷之獲嘉令即公之父也公諱良器字公亮生十二年安祿山陷東郡獲嘉守縣印不去為賊將所害公既免喪懷平賊志乃學擊劍依父友王奐奐嘗曰汝額文似李臨淮面黑子似顏平原其必立臨淮即太尉光弼也年十七得汝州龍興尉王奐從事太尉府薦之太尉召與言遂授以兵使平安越之盜纍授左武衛中郎將以所將兵隸於浙西廣德嵗中盜陷江東十州公帥所將兵來婺州功多進左武衛將軍平方清於洞中賜錢五百萬破張三霸海上改左金吾衛將軍為都知兵馬使大歷初潘獰虎據小傷胡參據蒸里江東大擾公將卒三千人騎五百人與戰皆破之斬首三千級執俘一千人詔加檢校光祿大夫兼蘇州別駕又加左羽林大將軍試殿中監察御史李栖筠問公年對曰二十有四戰陳幾何曰六十有二李公歎曰相識甚近得公甚深勉哉公泣涕謝曰遭時喪亂父死家破誓棄性命以除寇讎私志未立豈敢望為明公之所知哉建中初嘗至京師宰相楊炎召之語公因言兩河有事職稅所辦者惟在江東李道昌無政宜速得人以代之炎許諾其冬遂並宣越與浙西以為一而以晉州剌史韓滉代道昌焉及德宗如梁州李希烈陷汴州逐李勉遂僭帝號寇陳州圍宋寧陵滉使公將卒萬人救陳並寧陵是時劉元佐敗於白塔收其卒保宋州使將王彥昭守寧陵希烈擁水灌其南築甬道親臨其北令軍中曰明日日中陷城公聞之厲所將兵成陳以進恐城陷不及使弩手善遊者五百人沿汴渠夜進去城數里沒於水中遂得入及旦賊驅勇卒登城城中伏弩悉發皆貫人斃其後希烈始知救兵得入殺守將因罷去將昌集城中人哭曰向非浙西救至則此城已屠矣遂手叐襄邑收漳口宋州由是獲全李希烈遂失汴州奔於蔡詔封平原郡王食邑三千戶特進兼御史中丞貞元二年淮西平詔曰休勳茂伐書於竹帛戎籍乃為裨將副非所以褒功寵德也其以為左神策軍將軍知軍事兼官如故五年詔與太尉晟侍中瑊等三十六人圖形於凌煙閣上親御即其形而贊之八年遷大將軍士卒之在市販者悉揮斥去募勇者代之故為所監者不悅明年公之故人有犯禁宿於望仙門者衛使奏言遂轉右領軍衛大將軍所監者乃用其衙將魏循代為將軍自是軍中之政不復在於將軍矣十五年兼英武將軍使十八年遷左領軍兼御史大夫十九年閏十月以疾卒年六十一天子為之廢朝贈陝州大都督明年葬於萬年畢原夫人康氏先歿後始附葬有子曰元封為蔡州剌史曰耆為諫議大夫曰元鳳為澄城主簿曰夔為襄州參軍三女皆幼以元封及耆纍贈為司空夫人追封魏國太夫人初公與王栖曜李長榮皆事韓晉公栖曜至鄜坊長榮至河陽澤潞皆擁節有土公自少則戮力破賊及壯解寧陵猗杖之圍希烈之所以兵不及於宋而江東以全者實公之所為也功最高位獨以不副克生良子能大厥家太和元年翺自廬以諫議大夫徵路出於蔡元封泣拜且曰先公之碑未樹教後嗣其果有辭俟也公不可聽乃銘曰公生十二未壯家毀誓殄父讐不怯勇死釋官就軍焯有其勳擒凶盜平威明顯聞人誰不貴孰勝其位由卑至巨莫匪躬致宣疏土壃報未功當是生後人紹慶不忘傅為古姓介子誅樓蘭王封義陽侯俊為二十八將功高稱於兩漢而毅以文章顯自漢以降世纍有人曾祖諫易州長史生大父定州司馬韶贈鄧州長史生父榮贈刑部尚書公諱良弼字安道清河人也以善弓矢顯仕於成德軍流輩稱其朴厚博野樂壽本隸瀛州在范陽成德間為要害地每相攻以取兩城及王武俊破走朱滔詔以博野樂壽與成德軍其後以公選為將而鎮於樂壽公善撫士卒與之同苦樂得士卒死力長慶初幽州繼亂范陽執其帥宏靖而扶克融成德殺其帥宏正將庭湊因盜有地公奮曰吾豈可以為賊乎遂誓衆喻以逆順閉城拒賊潛疏以聞詔以樂壽為神策行營命公以為都知兵馬使與深州將牛元翼博野李寰犄角相應賊屢攻之卒不能克會詔下以克融庭湊皆為節度使公遂將樂壽之師及其妻子手叐城以出賊轉鬬且引遂遇官軍以免於難以功遷沂州剌史未到遽以為左神策軍將軍數月拜鄭州剌史公本用武力進未嘗治人於是痛自刻凜清已率下凡從公將卒本與公同立於樂壽者皆飭懼不敢越條令以侵物故鄭州稱理雖他時文吏罕能過者明年改為鹽州剌史閔帝初以公為銀夏綏宥等州節度使居河陽濡民不耕織黨項千餘落以畜牛羊馬代田業先時將帥多貪至有盜其善馬者蕃落咸怨走以出他境及公之至蕃人來見或獻馬者公拒而不受蕃人喜傳以相告未踰月而部落相勸皆歸蕃人之有罪者懼而來奔故事皆使蕃人出馬以贖公曰吾將於此職當禁其逃亡有罪何俟於贖皆執之以付其蕃落蕃人益喜太和二年九月以公為橫海軍節度使檢校兵部尚書俾治齊州以圖滄景之寇知兵者咸以為命將之當必且有成矣旌旗及於陝而得疾疾愈即路以十月晦薨於硤石驛春秋五十有六天子悼痛為之廢朝贈尚書左僕射以明年七月葬河南府洛陽縣伯樂里夫人南陽張氏柔立善斷公以樂壽拒賊暨轉戰以出夫人粗衣糲食與兵士妻女均好惡用助公事再封南陽郡夫人三子守常守中守章等皆孝謹寡過公方將立大功以報於國不以男子之仕為念故官甚卑有未官者銘曰大夫致身不賴前業遭變竭忠奇節奕奕乃作剌史乃作將軍乃統邊兵事績昭聞廉以檢已嚴以督下蕃落完安馬牛在野大革前事自我為初爾後之來視此勿渝
