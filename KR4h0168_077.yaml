front:
  text: 全唐文欽定全唐文卷七十七武宗二
  hash: sha256:48c2adf32354699d9e63eff05ac885dc39b0b0d839620017cda8a88f1f35cb6a
body:
  text: 齊月斷屠出於釋氏國家創業猶近梁隋卿相大臣或沿茲弊鼓刀者既獲厚利糾察者潛受請求正月以萬物生植之初宜斷三日列聖忌斷一日仍準開元二十二年敕三元日各斷三日餘月不禁諫官論事所見不同連狀署名事同糾率此後凡論公事各隨己見不得連署姓名如有大政奏論即可連署郊禮日近獄囚數多案款巳成多有翻覆其兩京天下州府見繫囚巳結正及兩度翻案伏款者並令先事結斷訖申朕恭承遺令既遵易月之文而公卿庶僚願舉酌中之典徵引古義發揮舊章閎茲敷陳良用酸惻朕嗣纘鴻業豈以自私勉副羣情倍深感切所有降服及山陵制度並依漢魏以來朝廷大政必下公卿詳議博求理道以盡羣情所以政必有經人皆向道此後事關禮法羣情有疑者令本司申尚書都省下禮官參議如是刑獄亦先令法官詳議然後申刑部參覆如郎官御史有能駮難或據經史故事議論精當即擢授遷改以獎之如言涉浮華都無經據不在申聞段王褱等詳議東都不可立廟李福等狀又有異同國家制度須合典禮證據未一則難建立並令赴都省對議須歸至當悲田養病坊僧尼還俗無人主持恐殘疾無以取給兩京量給寺田賑濟諸州府七頃至十頃各於本管選耆壽一人勾當以充粥料卿欲遂頤養辭位閒休今者社稷安謀系在良平況北虜殘孽未殄西戎國內不安除寇靖邊藉卿調鼎遽茲陳退所不忍聞縱纍陳情終不允遂比緣錢重幣輕生人轉困今新加鼓鑄必在流行通變救時莫切於此宜申先甲之令以警居貨之徒京城諸道宜起來年正月巳後公私行用並取新錢其舊錢權停三數年如有違犯同用鉛錫錢例科斷其舊錢並沒納朕以微眇獲守宗祧祗荷鴻休懼不克濟乾乾夕惕若涉春冰旰昃忘疲宵分假寐而陽和布固陰交爭寒暑所侵乖於攝理忽嬰疾疚茲巳經時漸覺衰羸藥餌未效臣僚愛我中外叶心禱祝畢為針石備至皇子沖幼未經師資軍國事重須選賢德稽於訓典謀及大臣用建明哲以二神器親叔光王怡宜改名忱植性忠孝翼翼小心禮樂生知聰明天縱溫文敏裕博厚寬仁言必依經雅符於詩禮動不違矩式合於典謨俾奉丕圓必愜人欲可立為皇太叔應軍國政事便令權勾當百辟卿士中外庶官宜竭乃心輔成豫志於戲萬幾不可以久曠兆人不可以乏統惟義是守朕不敢私宣布中外咸令知悉前覽四表報皆一詞可謂君臣之義至矣天人之理盡矣朕辭益固情益堅誠獻可之不移奈虛美而難處山雖崇而降地易象明言海雖王而下川元元深旨文王以小心事帝虞舜以恭己臨人銘盤取勵於殷湯欹器戒盈於周廟皆以畏惕而自警不聞滿足而虛尊卿等以塞北平胡山東殄寇韜兵偃武鑄㦸為農郊天之年瑞雪清路冊號之夏嘉雨滅災毀摩尼壞法之邪蕩并寇亂常之暴此皆上元厭禍宗社儲休至於刑政克明文武具舉年登適臻其氣順俗阜實自於官修內承宰輔之謀外盡藩侯之力余雖垂供且有何功況臻鴻徽尤非稱德既頻推美何以當之然禮貴從人事難徇志祗循前訓允遂羣情殊不自安諒非縱欲勉爾所請深用愧懷省表具知我文祖有文貞房杜左右前後若日照月臨緝熙帝圖肇顯天祿異代同德建勳垂休克相朕躬光集大命功居第一節貫在三神開智謀識洞蓍蔡用夔龍之道振堯舜之風懸衡不欺朗鑑能燭乃者葷狁狂獗參翦伐之權頑童侵虐啓平殄之策贊我獨斷挺身羣疑子房潛運於先機張華堅執於必克制變兵事訏謨國經晝則共議公朝夜多不寐私室揮發綸綍揣摩典章弼亮五年風雨一志剛健不倚謙尊益光見吳芮蕭何之心盡食糵飲冰之節今邊烽息照凶首巳殲允賴疇咨克平夷夏特寵槐庭之拜俾崇鳳沼之榮巍峩三台耀映千古未為寵答繼有讓章體朕至懷宜斷來表所謝知省表具悉褒德賞功禮經備舉疇庸答效國典攸存昔子儀以外止軍功所宜牢讓今卿以內匡時政非合固辭況道濟公忠才兼文武弼諧五載始終一心頃以虜寇初平才息戈甲旋又潞童怙亂須議翦除惟卿竭誠與我同志晉武平吳之計全在張華漢高鎮俗之謀誰先周勃所以舉茲寵秩用答元勛恨更無官以償忠節且三載考績猶進律以甄勞況五兵成功無超位而表異自豫遷授非限常程式示恩榮允符公論是宜贊傑用佐經邦王祥之碩德當任楊秉之貞廉稱職未酬萬一無至再三勉服官常宜斷來表天道運行二氣交感著明不息罔有僭差苟或變見是為至誡朕以寡德祖宗眷佑撫臨四海茂育羣生夙夜祗栗思臻和洽年穀幸豐方期富庶而德有所未至信有所未孚祆星謫見既望未減天乖常象咎徵昭然觀占次舍寢興愧惕雖罪己之詞嘗申謝譴而在豫之責更示深衷是用側己修身以答天意冀有感召導迎休祥自此未御正殿宰臣與羣官有司且於延英聽命慎刑審獄理滯申恩冀絶冤結以通和氣其天下見禁囚徒京城內宜委宰臣一人於尚書省詳覆如情狀冤屈疏理訖具録聞奏諸州府各委長吏親自覆問不得信任官吏令有冤誣不急之務或慮勞役且令休罷亦示恤人應京城內及諸州府公廨寺觀如非要切所有營繕并勒權停救患備災為政之本言念黎庶彌切憂勤應今年諸道水災蝗蟲州縣或有存恤未及處並委所在長吏與鹽鐵度支巡院同訪問聞奏或恐明年又有水旱蝗蟲其近江州縣今正當農隙各委本道加築隄防及勸課百姓種植五豆以備災患其常平義倉先有收貯米足處切令校料不得信任所由欺隱永思天誡用警畋遊克己省躬損之又損其臘日京兆府及諸司進食並宜權停於戲譴告之徵幽微元遠上天垂耀鑒誡彰明思獲銷禳深用兢勵遐想殷宗之道修德以勝妖緬懷宋景之賢發言而退舍將欲推誠以御物化災而為祥庶或感通以遂福應宣示中外宜諒至懷主者施行門下朕恭臨寶位祗嗣丕圖勤恤憂兢夙夜匪怠懼天下之目專專然以觀豫勳懼天下之耳喁喁然以聽豫言何嘗發一言不遵祖宗之法制動一事不副卿士之羣心雖克己甚勞誡心無逸驅時風於朴素絶進取於爭馳便於人者無不為厚於身者無不去然而惠化猶闕懲勸未行殘虜在邊尚煩饋餉狂童叛潞猶擾干戈蓋不得巳而用之事有違其志者顧惟寡昧慙歎方深今朝野叶心忠良同志共除氛祲日冀清平而秋雨經旬有妨收積雖云苗稼未害亦恐陰沴為災慮生人之疾苦未蠲刑獄之滯冤未理勵堯舜敬天之志當夕興嗟虔禹湯罪己之心詰朝下詔衆貧國何云富人瘠君安得肥況畿甸差科終年無巳百司取給供億實多其京兆府秋稅及青苗錢共放八百萬便委張賈與諸縣令同商量各據所損多少作等第減放更不用檢苗覆損煩於申奏其合徵納物仍量與寬限容待路通後輸納如聞貧人未及種麥仍委每縣量人戶所要貸與種子寬限至麥熟日填納如京兆府自無種子即據數聞奏太倉給付其御史臺京兆府所有囚徒委宰臣一人與左僕射王起御史中丞李回就都省疏理如情狀可矜者便與決遣其諸州府囚徒亦委長吏親自疏理勿令冤滯於戲水旱之災陰陽定數適當菲德合恤疲人施令布恩期於蘇息凡厥臣庶宜體朕懷門下朕思三五巳降誰能去兵文武之道參用為理況以寡昧獲承丕構環四海九州之大子圓首方足之多一夫候之疾痛必軫其憂一士之忠勞必思其報一風一雨之愆必申其析祝一事一役之橫費必念其所來業業兢兢如即深薄雖興兵動衆非豫素懷而伐罪弔人有國常憲干戈一舉飛挽是勞緣路徵輸指期調發耕夫不遑於壠畔織婦有輟於機中豫之疚懷豈忘終食頃以虜騎犯塞王師戒邊今以潞寇阻兵靈旗指晉始無虞於塞北復有征於山東勞者未安居者寧逸蓋不獲巳且多懼焉念其徵發師徒道路供饋地素貧褊物力巳窮今欲及徵秋稅之時宜有蠲免用布慈仁之澤冀為疲瘵之醫勉副曲恩永安生業其太原管內欣雲汾代蔚朔六州振武天德及河中晉絳陝沿路州縣今年秋稅及地頭錢宜放免河南府亦是供頓往來道路比晉絳太原即免編併其沿路畿縣及河陽汜水縣秋稅地頭錢量放上供一色其合留使留州錢物各委本道觀察使具放缺額數奏聞當與商量於戲朕君臨萬方子育兆庶務將去害豈謂佳兵上天鑒豫元功福善佇聞掃殄共樂清平未閒之心憂愧而巳凡百多士宜體朕懷門下朕聞覆載之內逆命者必滅其身日月所臨亂常者必覆其族矧有恩孤亭毒禮背君親罪惡貫盈人神共棄咎將自執禍豈能逃逆賊劉稹包祖父之姦謀肆豺狼之狠戾動干紀律力逞凶頑招亡命而為腹心憑山川而為險固脅從百姓殘忍一方積惡成殃擢髮難數朕恭承寶位祗畏上天每戒佳兵常思去殺然事關除暴理合興師遂命戎臣會兵攻伐鼙鼓闕雷霆之怒戈鋋行原野之誅惡黨既擒元凶就戮載馳驛騎傳首上聞又獻捷音降書繼至是用丕變弊俗洗蕩妖氛式布新恩獲全舊土念彼戰爭之地適當凋瘵之餘租稅且蠲征徭合減其澤潞五州共給復一年河南府當路縣太原府及接昭義界縣河陽懷州陝晉絳及當路州縣今年秋稅並且放免酬忠旌善爵賞宜加其行營立功節度使並別敕處分其大將巳下委本道各具功效聞奏續有處分諸道行營咸盡忠力至於攻取克寸捷屢聞應緣討伐將士歸還之際並有優賞巳從別敕處分離鄉征役固有勤勞臨陳殺傷寧無闕歿行魏祖弔魂之禮施周文葬骨之仁其行營將士陳亡者先巳有敕便令子弟填替如無子弟三年不停衣糧有因戰陳傷損手足永廢者終身並不得停衣糧陳歿將士骸骨先令所在埋瘞不許便令將歸今巳事平如家口遷取委所在州縣量事應接發遣如無親屬來取者重與改瘞勿令暴露仍與設祭諸道行營陷沒將士見在昭義者各放歸本道其澤潞五州百姓先因用兵逃散在諸處者委元逵宏敬劉沔元式石雄安存發遣各令歸業仍委盧鈞設法招攜務於綏輯其有劉從諫巳後暴賦加徵害於百姓者並且放免用兵以來劉稹所招收團練官健放歸營生五州內百姓如有家事蕩盡交切饑餓者委盧鈞以軍糧賑貸如先有倉窖被賊收管未破用者並還本主其莊田巳為人占奪者亦並卻回今秋猶及種麥如自無麥種子者且以官麥貸借如五州有無麥種子者共借三萬石令供軍院逐便支付其先賢墳墓碑記為人所知被發掘者卻與掩藏仍量與致祭其諸色人內如有文學節行比來藏避從諫隱跡山林者並令搜訪具以名聞又自劉悟從諫至劉稹逆命以來如有忠義之徒曾謀歸國為殘害者並具聞奏當有贈恤應五州界內戰處所在骸骨如無主者並與收拾埋瘞今遣吏部侍郎高銖給事中盧宏正專往宣慰存問疾苦撫恤凋殘回日各宜具利害聞奏於戲朕以四海為家兆人為子一夫不獲常所歉然闕不寧每勞軫慮今逆黨巳戮內地無虞偃戢干戈謀從此始庶乎元氣保合太和遐邇聞之當體豫意主者施行皇帝若曰惟天育生物必極其毒而後臻於和惟君保天祿必登厥德而後砥於道我國家建皇圖焯鴻業二百三十祀祖宗儲休俾豫嗣厥位豫祗若天地紹古之訓惟賢時念乃有冢臣光祿大夫守司徒兼門下侍郎同中書門下平章事兼充宏文館大學士太清宮使衛國公李德裕左右豫一人撫四夷親萬國文以和政武以寧亂於戲爾有蹈義斷金之操不踰於險易爾有移忠匪石之志可薦於宗社故翦吾欲以康務沃朕心而成德日者弧星耀芒朔漠之人若墜沸鼎惟爾總合智力撲其氛焰盜萌蠹本牙角滅息孽豎扇禍壺關搆釁閉險聯絳趙魏淮潞五州之人是莫不憂其生於旦夕惟爾協豫一人經是七德決自樽俎發如雷電風后之握機成陳密並軒皇羊祜之沈謀制勝元同晉帝修德刑為戰器閲禮樂為身文雖其功不自伐巳為衆所共欽不有殊榮曷酬盛德茲用命爾為太尉往惟欽哉維會昌六年歲次景寅三月壬寅朔二十六日丁卯皇帝若曰惟元穹降祚啓我唐運奕葉重暉赫曦纂承列聖顧瞻敷佑沖昧獲承大寶君臨兆人懼不能任夙夜兢厲祇事九廟於今七年實賴宗社之靈台衮之輔忠良畢力內外協心北翦山戎東殲孽豎不失傳付之業方期仁壽之寧屬頤護或虧寒暑致恙禱神餌藥有加無瘳乃闕親賢而委家國皇太叔權勾當軍國政事忱溫慈睿哲孝友端明蘊東平為善之心尚河閒好學之志必能燾煦天下穆清大中於戲惟敬惟和克敏克寬斥去奇邪親任仁人是用終陟元后宜令某官奉冊即皇帝位欽若天道緝熙帝圖懋哉敬哉
