front:
  text: 全唐文欽定全唐文卷八百三十七廷圭河東人中和中舉進士光化中為中書舍人遷刑部吏部二侍郎拜尚書左丞入梁為禮部尚書後唐莊宗平河南除太子少師致仕同光三年卒贈右僕射
  hash: sha256:a1324e4de099997c1f5b98e6da9d7385f9f107163fb1f72c1008efdabbc10459
