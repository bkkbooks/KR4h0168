body:
  text: 敕國家龍朔中有侍極官今之左右常侍也前代崇寵秩比侍中密參帷幄之謀時號清重之選從容獻納允屬名儒今執政言爾具官李澥地實華腴性惟貞介聚學為己修禮藩身清明照物以忘疲淡泊居貞而有守來司綸誥潤色推工去臥雲山含章見譽增重價誠由於合匱固深根頗異夫揠苖久漏搜羅幾為遺逸升之近署官以封貂宜俟併伸勉從虛佇可守右散騎常侍敕朝廷具位之臣得直言天子過失太平之基也矧司我諫議列吾軒墀啓乃心而沃我心盡爾言而攻我過眷求之道時惟艱哉具官董禹謺中詞科優有文藝西漢故事甘泉遺儀聞其討論多所詳悉逮事先帝頗揚直聲徵還周行歷踐臺閣靡所附麗能精典墳公論推其才術鄉校言乎淹恤今擢爾為諫議大夫置朕左右勉揚厥職往副旁求夫立肺石挹獸樽扶將顛袪未寤在履正直務去將迎爾或推公朕豈憚改書紳銘座服我訓詞佇稱人情勿孤朝奬可左諫議大夫敕具官錢珝孟子不云虞舜聞一善言見一善行若決江河沛然莫之能禦也朕凝神穆清耽味墳史用爾掌綸誥時推得人觀其書詞敻絶塵滓褒貶盡春秋之要旨指歸決訓誥之源流傳聞四方平視三代而秉守甚正韜藏有程介然獨行卓爾清峙閲爾之能事多矣聆爾之嘉猷藹然信乎虞舜之心若江河之不能禦也俾即真秩斯為舊章夫參贊樞衡典司綸綍職業彌重扶搖漸崇勉副簡求無孤寵待可中書舍人敕具官楊贊禹等以贊禹挺生公族雅有令名檢身如履其春冰操心不愧於屋漏而言行無玷文章可觀連中殊科首冠㣥彥捨而不顧去奉良知三年於茲澄淡一致自待之意何其遠歟以谷二雅馳聲甲科得雋亦承遺搆自致亨衢求諸輩流兼慎行止朕方求理道允屬滯淹聞爾贊禹之規為可以厚風俗而敦教化聞爾谷之詩什往往在人口而伸王澤舉賢勸善允得厥中並命諫垣我為公選汝於職業勉自激揚可依前件敕朕以萬乘之尊託于人上居九重之奧以御區中財成天地之宜外委於良輔夙夜宥密之命內咨於近臣佇沃乃心底豫於理具官崔汪山嶽鎮地望之而秀絶無涯金石在懸扣之而宮商有序門地軒冕甲於當時具官崔涓公台華胄名教偉人稟象緯之英姿得乾坤之秀氣器業事望鎮於周行具官李磎學際天人道隆姬孔參言語侍從之列擅淵雲賈馬之才履正居中格於公論而皆體訓誥以事我拱霄極而致身吾得名臣汝遘昌運君臣胥遇千載一時或秩滿佇遷或職勞可舉往膺並命允屬當仁綱轄二卿清重無對玉堂溫樹近密孰階遂爾扶搖副我欽屬可依前件敕近侍宸嚴參豫密命韜經濟彌綸之望為言語侍從之臣乃眷周行朕將注意詢於卿士僉曰汝諧爰膺並命之求允屬當仁之選起居郎李昌遠魁梧博厚寬裕溫良蘊是粹和發為符采監察陸扆圭璋縝密咸頀琤瑽藹然休聲礪乃佳器士林擢秀聞爾則百尺無枝筆陳交鋒聞爾則一戰而霸皆伸於知已副我旁求濬柱下之清源無忘啓沃紹雲間之華譽勿鼓喧囂慎繼前修罔言溫樹吾有美實期爾為鹽梅吾有巨川佇爾為舟楫勉思稱職無忝飛升可守本官充翰林學士敕朕久為姦幸蔽我聰明其心懵然是非倒置一旦開悟洞決疑迷寰區冀寧邪正茲別明發不寐思豫藎臣雖已命官未滿延屬亟加寵澤式示優崇新授具官孔緯直道致君至誠醫國先帝以爾輔弼子沖人業履之勤明備於前制唯朕不明不敏俾爾堙厄於外者有年矣言念至此心焉震驚苟不驟加寵榮仍復徽數即何以示豫補過之心也天官太宰首冠六卿往執銓衡暫煩藻鏡殊恩縟禮並復舊章逖聽履聲佇還衮職惟爾元老體豫虛懷可吏部尚書仍復持危啓運保乂功臣開府儀同三司上柱國魯國公食邑四千戶實封二百戶敕台衡舊德纓冕碩生朝昏常置於我心事業無忘於汝礪矧朕出潛之日實操顧命之書乃眷滋深公望惟允宜膺重任以副旁求具官劉崇望昔以文詞事先帝為翰林主人旋以藥石沃朕心號中興宰相歷試宏業周旋大寮人無間言動不過則頃罷鈞軸亟移光陰室既生白舟惟任觸浩然正氣充塞乎天地之間卓爾神光瑩徹乎星辰之表琴樽遂性名教檢身家事雍肥物情重贍一作崇重靖言素履頗厚時風大道之行斯文未喪將論舊德允屬僉諧爰增光祿之勳往曳尚書之履敬佩休寵克當厥官無或牢謙尚欲高臥可光祿大夫守兵部尚書敕參斷時政允屬公卿鎮重周行式資舊老而叔世掄選率尚英華俾我洪儒碩生軋軋不進汲長孺於焉興歎燭之武是以有詞思求其人夕惕若厲爰有良輔協吾此心且言爾前尚書右丞盧知猷在和武光孝皇帝朝以文學詞賦擢進士第登宏詞科舊相列藩羔雁交辟雅有淑問鬱為名儒及我懿考踐作歷諫省郎署官常兼史職藹然直聲著在筆削先皇帝嘗輟自朝右再委方州饒陽上洛之人於今懷爾之德旋掌誥命亟服寵榮逮豫沖人歷事四帝出入華顯諳練故實子雲之筆札有名周昌之厚重無黨鎮吾風俗繄爾秉持遂用委以五兵贊豫九法服我休命稱茲簡求往惟欽哉無墜成績可兵部侍郎敕朕以至公掄才時致用乂周行進秩公論為人如聞右司郎中杜致美以吾上台實爾猶子深自抑損不求聞達隱几端居不言時事閉關卻掃深味道腴夫何山濤魏舒校爾優劣而戶部員外楊拙始以籍甚之稱洽於名場歷聘侯藩亟踐臺省強學務本履正居中夫何顏駟揚雄侔爾專靜奉常典樂建禮含香詢爾清間明我搜選克敬乃事交修厥官各謂當才無忝並命可依前件敕具官劉崇彞朕聽政之暇耽玩㣥書每讀考槃之詩常軫遺逸之慮訪於輿論得爾崇彞聞其常抱業試於有司才優數奇十上不第言行修整文學該通儒雅之聲著於洛下而以爾令弟秉豫大鈞鴻飛冥冥不近賢路從軍試吏亦曰強名荀徇爾私其如公議是用陟居華省寵以郎曹典制六官之重伏奏青蒲之上疇爾夙志豫恩不輕凡百未申宜體朕樂善興能之意無患不知也可敕天子省方藩侯述職睦鄰事大允執厥中偃革崇儒行成於內我知之矣彼有人焉具官溫緒懿祖考為朝廷大臣偉望威名皆烜赫信史而爾砥節礪行修詞立誠抱終身之憂脫屣科第仗四方之志服勤官途束帶公朝曳裾侯府刃有餘地人無間言朕以釁結萑蒲兵纒封域藏書之府煨燼罕存爰委藩宣為我採托而爾能奉綸旨來貢之書欲以先王之格言廣我視聽思列聖人之行事規我怠荒實嘉乃心斯驗夙志爾帥具舉豫其懋遷升之文昌授以清署用酬稱職以勸事人凡百賓階無忘幕畫可尚書水部郎中敕具官徐彥樞文昌列曹代稱清署宗伯之重時難厥官其在外郎選擢尤重率多虛位以待當才聞爾淡以立身謙而履道情田萬頃瑤林將玉樹森羅文律九成調露以承雲交奏動必由禮人無間言克成德行之規不染脂韋之態介然自立無愧前修是用聽彼㣥情懋茲劇選斯文重振資爾之嘉謀時政有疑佇爾之讜論勉臨厥職紹乃家風敬蹈冰泉以成踐履可敕具官徐彥樞吾前以儀曹員外郎南宮劇選求思時彥克副僉諧聞爾先臣在會昌中事武宗皇帝文行修整綽有令名亦由至公膺此慎選得人之盛於今稱之而彥樞趣嚮規為能紹先志俾之繼美亦謂當才而能以爾令兄執吾大柄潔矩彌峻避嫌不居牢讓之心確乎山立今吾又安敢以流薄所尚浼爾操修改司人曹允叶中道亦欲使彥樞展四體以事我秉一心而律人靡不有初爾無忘於自勵其下皆讓豫庶幾乎有聞稽乃檢身慮吾假器自待之旨何其優哉可敕具官沈棲遠等由御史屬為尚書郎選擢之重難踐歷之清切所以廣育材之道也以棲遠清白嚮正藝實揚名魯人將以為木鐸太一下傳其洪範石渠鉛槧諫署淹翔動靜有常職業惟允以元晏詞無枝葉道有汙隆履君子之中庸練國朝之故實直方之氣僉論多之文藝之優前輩高許而皆乘驄衣繡為我憲臣指佞埋輪恪居官業疇其久次爰俾序遷勉思伏奏之勤無忘率職之重可敕漢制御史中丞入朝得與尚書令專席而坐示威重於百辟也前代之盛風猷具存國朝用人職業尤重非材優望峻者不中茲選丞相言爾中書舍人獨孤損儒林挺秀卿族騰芳文擅菁英學窮壼奧演之為事業暢之為人文立我明廷號為端士逮豫寡昧歷事三朝勞爾班行向踰二紀徊翔兩掖尹正神京直聲載揚休問逾暢自掌我誥命垂為典謨煥然一家之書擬於三代之際器業事望由茲而益隆蘊勵琢磨所向而可仗朕言念理本係於臺綱詢謀股肱謂爾宜稱今以爾為御史中丞其為我峻爾風望正言隳頽疑無憚觸邪勉思舉職佇觀爾志以稱我心敕崔義進等吾近以風憲之任委諸名卿中外肅然佇其振舉果於掄選能掇菁英且言澄淡秉彞進退由禮義進之修整也無怠牆岸山立時情藹然光裔之峭直也不黨英華發外清徑積中祁之蘊蓄也無多謝於前修聞善若驚覆簣不止皎之砥礪也頗自強於遠概皆克荷先訓來為聞人俾之整肅周行懲艾風教觸邪指佞庶有可觀爾當其才朕俞其請各揚厥職懋對天休可依前件敕具官牛希逸等我以憲章法理之任付於歸昌俾嗣復家聲振舉職業逖聽風采佇整頽隳今以爾希逸珽列狀來上且言文行修飾操履端潔可使簪白筆以書法冠豸冠而觸邪俾欺暗之人視爾如秦鏡醜正之士畏爾如堯羊升之明庭聳我昌運樂聞爾志允叶人情即俞所陳式旌懋選噫澄清之始糾正為先爾宜輔助歸昌提振綱紀無或碌碌以謝前修則驗爾修飾端潔之道矣而撲疑隱鱗戢翼負志求伸既得其時佇觀所尚而今而後可不勉之可依前件敕具官韋韜等卿寺膠庠僉曰清署序遷慎擇必惟其人以韜儒素承家直方守道源本粹茂材術周通以績詩禮飭躬竹替裳著代心惟耿介志在功名以承休養素典墳服膺螢雪成如麟角雅有鳳毛以承乂鼎甲華宗松筠茂行貞方從政諫讞有聞而皆久脫朝簪能安陋巷列卿曹而象月次國學以橫經我俞丞相之求爾叶輪轅之用敬慎爾事往臨厥官無或素飧以塞虛位可敕具官某書曰昔周穆王命伯冏為太僕正曰昔在文武聰明齊聖侍御僕從罔匪正人以承弼厥辟且曰僕臣正厥后克正僕臣諛厥后自聖太僕之為官也重矣朕每讀書允擇其可矧惟前代畢用名臣數馬執綏故實具在為豫禦侮作我前驅審官擇人今以命汝稽諸訓誥得不勉之可守太僕卿敕具官某書曰昔我先公五世后稷以服事虞夏夏之衰也棄稷不務先公不窋用失其官至於武王昭前人之光明事神保人莫不欣喜訓誥具在朕安敢失墜而叔世偷薄乃不知稼穡之艱率以三署為華輕其柬用寖以成俗嘻鄭元漢之名儒也韓信漢之上將也尚聞徵拜或至就加來奉疇庸得不寅畏敬受羲和之職往修后稷之官豐阜有聞陟勸斯在可敕具官趙巒等或公卿棣草口咢或台輔子孫或登史傳之科或著絃歌之政並從間罷亟涉光陰振滯掄材各當遷陟亞於卿寺頒我詔條洎率屬於膠庠一時之茂選也惟勉思砥礪以應簡求大開霄漢之程允屬軒裳之後苟能自奮可往承之可敕具官孫乘等廷尉卿生人之司命也大宗正我族之本根也二卿之任昔難其材與夫丞殿省而立朝著聽於公舉我有人焉以乘等或掌奏大藩或字人劇邑書檄有聞於記室絃歌多暇於琴堂而昌亦號通材丞於六尚言從罷秩久於艱難各使立朝仍觀舉職恤刑庇本勉稱我心可敕李崇等各以材行來服簪裳或字人著績於封畿或嗜學見推於流輩夫卿寺王官儲宮學省一時茂選爾往蒞之飭勵有聞陟勸斯在敕令之出牧優賢之任也苟昆弟當塗即不敢膺其選避膏粱而示謙畏者果能行之乘氣焰而苟溫足者或自便矣具官崔昌遐昔以令季作鎮衡湘願分使符出守荊楚輟自祕府委之夷陵二天方惠於疲人三入復蘇於旱歲亟陳章表牢執撝謙以為手足秉鈞固絶飢寒之患簪纓委地宜均休戚之懷且惜分飛懼妨賢路操履如是在志不回凡今之人茲用嘉尚況爾踐揚華顯彬蔚彩章際此修途資之明識又安敢置爾於要劇之地煩爾於撝揖之勞者哉眷言三閣實祕九流簡求常在於清賢臨長必先於儒者矧留虛位允屬僉諧更增馭貴之榮不改秩宗之任敬承休寵勉務優間可正議大夫守祕書監敕具官鄭璘等堯舜禹湯文武之善桀紂幽厲之違非直筆信史後王莫得而詳也我國家列聖行事亦具書於史官將以昭示後昆垂訓不朽紀綱專總於丞相筆削分任於名儒非夫望蘊司南才膺載筆者不當其選而崇望言爾璘等博聞強識繩直冰清四時之和氣襲人一字之褒貶惟正聞見事典周知故實可以著不刊之書論司過之史爾宜詳於注記紀乎言動之非繼彼春秋明乎得失之迹彰善疸惡無忿疾厥心舉直錯枉無上下其手佇聞稱職當議陟明可敕具官錢珝等儒術可以厚風俗人文可以化天下帝王興創不能異之粵我皇祖肇基丕闡茲道反隋氏之政追孔門之風鼓篋升筵者餘八千人邦寧本固者垂三百載詒厥沖不敢昏迷佐豫中興乃眷於是良重集賢藏書之府故用丞相司之得選官屬將慎廢墜以珝禮為身幹慎得言樞奉典刑之遺無辱趙氏以昭緯名冠來籍道絶下交居德行之科不減顏子方設鉛槧有期丹青爾宜窮四部之多正五體之別無使我集賢殿不及漢興之東觀祕書也勉矣哉可敕具官楊授乃眷膠庠文學所聚聿求臨長必在通儒以授洛下高才關西冠籍台庭襲慶士族揚芳守欹器之不盈蹈黃裳之元吉策名筮仕垂四十年流落棲遲失騫翥勢所嗟暮齒久困窮途勉當文理之朝蒞乃成均之職我惟求舊爾往崇儒載推尚齒之恩仍假納言之任噫隸名之籍今無聞焉邱園之秀為我屬意敬承休命以振斯文可依前件敕具官裴迪等天子擢侯府之彥升諸周行掄材奬勞斯謂彞制逮於搜索淪滯羽儀膠庠四面取人一時慎選以迪卿材應聘儒席稱珍以鎬幕畫有聞賓榮具美以玭華宗輝譽官路流芳各負所長求伸其志而諸侯之府裨贊是繄驗安劉戴舜之功見難進易退之道太僕禦侮二尹優賢司成古官歷代清選唯爾三子來服訓詞交修厥官以稱我意可敕具官契苾璋尚齒酬勞固聞於茂典念功求舊式勸於後生朕嘗因坐朝周視百辟有峩冠擔圭華髮承辨鷹揚鶚立於墀廡之上者一旦便殿詢於宰臣且曰衛將軍璋也夙號良將實著軍功嘗擁節旄兼聞善政自處之環衛委以腹心闢彼汙萊盡作文王之囿化其士卒皆為君子之營而耆艾服勤班資不稱積薪之歎達我聰聞俾升上將之尊不假三師之貴吾於爾輩無吝優恩勉服軒裳共致寧謐可敕具官劉思謙等大將軍齊之三公執金吾漢之中尉或分黃麾坐正殿之前或橫佩刀立天子之側親近寵貴莫之與京以思謙等昔在艱難不渝風雨克保臣節能知武經而瓘祖考勳名功格上下副朕基構克勤班行清修自持儒雅有守朕言念後生遘諸多難朝施勞於旄鉞莫置位於公侯獨爾寂寥未聞熏灼自待之意何其偉歟賞延之典茲用歉鬱屬有虛位先求舊人俾升喉舌之官以申帶礪之旨爾其服我寵光為吾心腹侍衛巡警勉於在公佇聞恪居下闕敕具官王知道等我有寶臣作鎮邠土伯氏仲氏鼎峙於列藩乃子乃孫吻合於當代宣彼忠力屏豫沖人方將仗之冀靜紛擾開懷以待有請必俞今復上章來陳內舉願以屬郡俾知道分憂推其赤心請知勳入衛言觀爾志式慰我心況聞訓勗甚嚴砥礪甚正既孝以事父必忠以事君忠孝存焉君臣一也良二千石與大將軍榮爾閨門列吾禁旅並兼揆路仍亞台司吾於勳賢斯謂臻極唯爾父子享吾恩榮慎圖始終以保富貴可依前件敕具官齊遵謀等官之設所以育材勸能也苟不當其選安闕一字以假吾所器而滯爾來者今命爾遵謀命爾瑤冠蟬冕橫佩刀為左右龍武將軍所以昭勳庸之嗣而用其無瑕者也浩與齊虔久聞罷免各旌勤瘁且振淹滯並升環衛之嚴俱委腹心之寄用明激勸往服恩榮勉務進修以圖光大可敕具官王牘等朕聞王者之子在襁褓中置三公以教訓之由古道也我思成人以來遘此多難師訓之義蔑焉闕聞南面稱尊愧於寡昧由是言念諸子用疚厥心因擇正人為之傅導今丞相言爾牘等並老於文學雅有德行明君臣父子之道知禮樂詩書之源可使高步承華入參望苑琢磨羽翼朕有冀焉或授正卿或加峻級宜旌優典往傅童蒙邪蒿鮑魚勿俾登俎胄筵講肄為惜分陰使其知東平為善之規喜王褒洞簫之賦承萬代之業固磐石之基斯賴於老成人也可依前件敕具官郭保嗣等資相法儀宣明號令序鴛鸞之行綴整珩珮之威容蕆事申嚴罔不賴爾豫聞舊制常俾兼官用奬勤勞以示優假今保嗣等其勤至矣厥官罷焉宜舉彞章許之序進矧大勳之後舊將之家尚鑒寐以求思豈淹回之不恤兼八座以傅豫愛子亞九卿而立我明庭勉揚休聲茂對殊寵可
