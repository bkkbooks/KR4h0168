front:
  text: 全唐文欽定全唐文卷六百九十七李德裕二
  hash: sha256:ec5652d871e5c1da6006c102cc6e44925908dc7bdb46b3a3c7de08aac7cfe575
body:
  text: 余所居精舍前有山石榴黃躑躅春晚敷榮相錯如錦因為小賦以狀其繁麗焉鷤鴂鳴矣衆芳已衰美嘉木之並植惜繁榮之後時觀其擢纖柯以相糾糅鮮葩而如織金散裊蹄之輝玉耀雞冠之色一則含情脉脉如有思而不得類西施之容冶服紅羅之盛飾復似朱草發其英蕤長離奮其羽翼一則凝思悵悵若將翺而未翔疑嬴女之性情媠鬱金之薄粧又似黃星爛於霄漢瑞鵠來於建章彼紅榮之日昱日昱麗幽叢而有光其舒焰也朝霞之映白日其含彩也丹砂之生雪床彼緗蘂之燦燦隱衆葉而間芳其繁姿也時菊之被秋霜其秀色也鳴鸝之集荑楊由是楚澤放臣小山遊客厭杜蘅之靃靡忘桂花之潔白玩此樹而淹留倚幽巖而將夕嗟衰老之已遽念流芳之可惜况鱗悲失浪羽畏虛彈有楊朱之危涕無越石之暫歡豈獨琴感猗蘭之曉詩嗟蕙草之殘思欲揖金膏而駐魄扳珠樹而輟餐顧人間之華艷何足幽賞而盤桓乙卯歲孟夏余俟罪南服自歷陽登舟五月屆於蠡澤當隆暑赫曦之候涉潯陽不測之川親愛聞之無不揮淚今明主祝網幸得生去炎方或有勉余改轅而陸者因答此賦余以軒冕來寄廟堂非據賀客旋軫弔賓在戶自淮服而載馳貫岷山而上泝歊氣溢於大浸溫風發於中路於時行潦猥至百川皆注望九派而無際橫扁舟而徑度非如漁父之勇已忘胥靡之懼神將駭而還伏蛟欲絶而自去豈有幼安之感幸無杜侯之慮訪潯陽之故里懷靖節之舊居陳一樽以遙奠悲三徑之久蕪當其辭簪組返蓬廬逸妻賓敬稚子歡娛臨流賦詩臥壑觀書對南山之幽靄蔭嘉木之扶疏不為軒冕之纍焉得風波之虞何夫子之早悟居一世之不如然代有覆舟之子皆由任其智力比鷁舳為輕禽以席帆為快翼載已重而皆積途既遠而未息志擾擾以爭先日冥冥而作慝既而戕風鼓怒氛祲改色深則困於巨浪淺則觸於危石雖有神人莫能拯溺談者未知患難之所來常以川流為怵惕今余所謂畏途且作蠡澤敬仲以為闕二字蒙莊以為袵席苟能慮於幾微又何畏於行役古人稱山林之士往而不能返朝廷之士入而不能出先哲所以趨舍異懷隱顯殊迹蓋兼之者鮮矣今余自春秋至西漢取其卿大夫進能知止退不失正者綴為此賦觀春秋與漢冊求知止之大夫魯莫高於柳惠衛莫貴於寧俞吳乃得於延州楚乃尚於於菟雖至聖無軌超然不拘猶歎行藏以與顏稱卷舒而善蘧則由聖門而進退者豈不勇於知止乎在漢留侯與道為徒厭華屋而不處思赤松以遊娛清則兩龔美則二疏父子欣以相顧衰老至而歸歟祁祁青襟載負經書藹藹元冕祖我城隅歎冥鴻之不及皆雪涕以漣如嗟余生之疲病念寄世之須臾曾涉險而知懼痛摧輪之不虞諒難復於玷缺原注韋元成作詩自著復玷缺之艱難且覃思於元虛聊揮金於餘日乃回駕於迷途况乎託北阜以為宅原注應璩書曰南臨洛水北據邙山托崇岫以為宅因茂林以為蔭就東山而結廬原注左思徙居洛城東著經始東山廬詩仲既得於清曠原注仲長統論曰欲卜居清曠以樂吾志陶豈歎於將蕪其遠眺也則伊出陸渾北繞皇居度雙闕之蒼翠若天澤之逶迂少室東映於原隰鳴臯西對於林閭其近玩也則檻泉流於一壑嘉木盈於萬株徑被芳蓀沚映芙蕖聽求友之鳴禽見自樂之鯈魚徙奇樹於台嶺隱翠葉而垂珠得怪石於震澤聳青岑而韜瑜昔有淮侯種瓜陶相灌蔬竊比君子亦能荷鋤或引蔓於長坂或遵流於清渠傲情人世之外寄迹羲皇之初望夕景於平林眺寒烟於故墟鹿君麚遠而騰倚鳧雁去而相呼酌盈樽而自慰賴鳴琴而不孤懷綺皓而披素卷想瀛洲而觀畫圖何必尚遍遊於名嶽蠡長往於五湖嗟夫世於知止之道若存若無李斯忘於稅駕惠子疲於據梧盡生涯以自若何智力之有餘庶收光之未晚期終老於桑榆丙辰歲孟夏月余屆途豐城弭楫江渚問埋劍之地則有池存焉感其至靈之物亦有淪棄非遇識者無由振發雖人亡劍去而故事可悲因維舟俄頃以為此賦天地神物龍泉太阿光耀時促沉埋日多往者紫氣衝星時人莫識吳已亡而氣存寶乃隆於敵國既精感而上達當龍變而不息未遭風雨之會尚假雷生之力豈通塞之有時何顯晦之難測我不自振掘之而得雖潛朽壤之中每受莓苔之蝕誠宜英主用之提擕指揮內以靖諸侯外以服四夷為東序之祕寶備有國之光儀一見留於邑長一獲珮於台司始謂伸於知已終乃屈於不知既而長鳴玉匣躍入漣漪化鋒鍔兮奮迅煥晶光兮陸離垂尾滄波斷鯨鯢之族矯首清漢讋江海之祗昔時在獄今成廢池寶常棄於茲地人載懷而孔悲况乎耶溪水涸赤堇山閉巧冶既沒作者曠世風胡已遠壯武復逝斯物倘存知之者誰氏惟人代兮去不留嗟雙劍兮焉可求滄湖口北望匡廬二山影入澄潭峯連清漢江水無際烟景相鮮沿流而東若在世表因懷遠公陸先生悵然成賦春水湖平霽天景旭眇赴海之清瀾映干霄之翠嶽波鱗爛而勢微帆雁引而相續輕烟冒於爐峯若香散於空谷飛流灑於星灣疑虹飲於曾曲想遠公之平昔比孟綽之不欲談精義於松間原注東林寺有遠公與殷仲堪說易松猶在寄虛懷於巖足喜濯纓而旋返悲負鼎而放逐恥隨屈賈之波不同宗雷之躅整襟帶於瑤席望元師於林麓原注余受法於茅山無師則傳法祖師也徒珮紫青之書未脫朱丹之轂感明主之嘉惠荷天地之覆育既復扶陽之爵又剖專城之竹被金組於薄躬昭皇明於荒服豹文忽變蔚然以姿蟬緌更新然而脫雖澡身於滄浪終有愧於玷辱念大福兮不再來歸東臯兮供黍粟余剖符淮甸道出蠡澤屬江天清霽千里無波點大孤於中流升旭日於匡阜不因佐官豈遂斯遊謝康樂尤好山水嘗居此地竟闕詞賦其故何哉彼孤嶼亂流非可儔匹因為小賦以寄友朋川瀆巇道人心所惡必有穹石禦其橫騖勢莫壯於灔澦氣莫雄於砥柱惟大孤之角立掩二山而磔豎高標九派之衝以捍百川之注耽若虎視蚴如龍據靡搖巨浪神明之所扶不倚㣥山上元之所固必迤邐而何多信嶷然而有數念前世之獨立知君子之難遇如介石者袁楊制橫流者李杜觀其側秀靈草旁挺奇樹寧憂梓匠之斤豈有樵人之路想江之乍遊疑水仙之或駐嗟瀛洲與方丈蓋髣佛如煙霧據神鰲而臲卼逐風濤而沿泝未若根連坤軸終古而長存迹寄夜川負之而不去雖愚叟之復生焉能移其咫步丙辰歲孟夏余息駕烏江晨登荒亭曠然遠覽因覩太尉清河公刻石美項氏之材嘆其屈於天命且曰漢祖困厄之時生計非蕭張所出余以為不然矣自古聰明神武之主未嘗不應天順人以定大業項氏縱火咸陽失秦中之固遷主炎裔傷義士之心違天違人霸業隳矣漢皆反是故能成功據秦遺業東制區夏數敗於外常有關中為舊主縞素以義動天下雖項氏猶存而王業基矣若乃蠖屈鴻門龍潛天漢始降志於一人終申威於四海則蕭張之計不亦遠乎余嘗論之漢祖猶龍項氏如虎龍雖困而其變不測虎雖雄而其力易摧一神一鷙宜乎敻絶然舟羲舟不渡留騅報德亦可謂知命矣自湯武以干戈創業後之英雄莫高項氏感其伏劍此地因作賦以弔之登彼高原徘徊始曙尚識艤舟之崖焉知繫馬之樹望牛渚以悵然嘆烏江之不渡想山川之未改嗟斯人之何遽思項氏之入關按秦圖而割據恃八千之剽疾棄百二之險固咸陽不留王業已去將衣錦於舊國遂揚旌而東顧雖未至於陰陵誰不知其失路恥沐猴之醜詆乃烹韓而泄怒謂天命之可欺何霸王之不寤嗟乎楚聲既合漢圍已布歌既闋而甚悲酒盈樽而不御當其盛也天下侯伯自我而宰制及其衰也帳中美人寄命而無處季數遁而不亡羽一敗而終仆豈非獨任於威力不由於智慮追昔四隤之下風烟將暮大咤雷奮重瞳電注叱漢千騎如獵狐菟謝亭長而依然愧父兄兮不渡既伏劍而已矣彼㣥帥兮猶懼雖霸業之無成亦終古而獨步周視陳迹緬然如素聽喬木之悲風感高秋之零露因獻弔於茲亭庶神靈之可遇廣陵東南有顏太師猶子舊宅其地即孔北海故臺豫因晚春夕景命駕遊眺忽覩奇木植於庭際枝似柳松葉如瞿麥迫而察之則翠葉金貫粲然有光訪其名曰金松詢其所來得於台嶺乃就主人求得一本列於平泉今聞封植得地枝葉茂盛敘其所自作此賦焉青春已暮白日將夕經顏子之故巷訪孔公之舊宅美珍木之在庭得嘉名於樵客曩擢本於台嶺近徙根於簷隙其柯肅肅可比於貞松其葉纖纖實侔於瞿麥風入葉而成韻露垂柯而流液不受命於嚴霜諒同心於寒柏含春靄而葱蒨映夕陽而的皪疑翠尾之㣥翔若金潭之旁射雜爽籟於篁竹混晶光於瑤碧奇樹以垂珠而擅名金松以潛㯋而莫覿亦猶處子在於隱淪奇才遺於草澤我有衡宇依山岑寂類仲長之清曠如蕭宰之窮僻託根此地似在崖壁殊橘柚之不遷同甘棠之可惜庶封植於園林永愛玩而無斁豫林居西嶺平壤出泉廣不逾尋而深則盈尺自東鄰故丞相崔公至谷口故丞相司徒李公凡別墅五六皆謂之平泉實發源於此觀其湧不勝沸淡然冽清冬溫夏寒明媚可鑑其靈泉之蘊也豫往歲獲戾放逐再罹謗傷泉必變色久而後復昔傅長虞庭有湧泉以其色在夏則冷涉冬而溫乃為神泉賦况潛靈蘊異美過神泉因效長虞所作偶成此賦山下出泉厥壤非石隨淺深而見底實秋毫之可析其瑩若纖埃之映琉璃微蟲之潛琥珀玉瑕瑜而不掩鏡妍女而盡覿且夫動則廣大止則虛明如君子之絶德乃望表而見情發源而東百谷皆盈既處高而就下雖遇坎而亦平曩者方騁康衢俄驚覆轍泉色暫晦含晶不發又如塵掩懸黎霧昏秋月纍夕而翳盈旬乃徹爾其脉引清泚環匝荊扉淪漣寫照物色殊暉孕蘋藻為蒼碧涵沙礫為珠璣歷長坂而鱗爛度小山而雪披若乃砥石於宇析波入沼凝虛白而逶迤浮縹清而繚繞氣潤蘅蘭色滋松篠含逸響於桐林動孤光於溪鳥於是列植芳菊華艷芊綿漬漪蘭而更馥搖霽景而相鮮葉凝夕露叢靄秋烟美楚人之餐英慕胡公之飲泉况復自亭徂溪夤緣數里懸瀑溜於碧潭散浮湍於清沚乘鷁舳以晨泛聽菱歌而夜起見蒹葭之始香疑沅湘之在此重曰原隰既平泉流既清三徑未荒萬木向榮感棣華之零落愴時鳥之相鳴况閲水兮日逝且歸來兮養生昔潘嶽寓直騎省因感二毛遂作秋興賦况余百齡過半承明三入髮已皓白原注自中書舍人及今三參掖垣清秋可悲尚書十一丈鵷掖上寮人文大匠聊為此作以俟知音露華肅天氣晶碧空無氛霽海清明當其時也草木陰蟲皆有秋聲自虛無而響作由寂寞而音生始蕭瑟於林野終混合於太清出哀壑而憤起臨悲谷而怨盈朔雁聽而增逝孤猿聞而自驚此聲也異桐竹之韻非金石之鳴足以動羇人之魄感君子之情况乎臨淄藻思薛縣英名遽興華屋之嘆預想曲池之平豈待琴而魂散固聞笛以涕零亦有毀家蔡女降北李卿聽朔吹之夜動見霜鴻之曉征既慷慨而誰訴獨汍瀾而流纓雖復蘇門傲世秦青送行詎能寫自然之天籟究吹萬之清泠客有貞詞瀏湸逸氣縱橫賦掩漏卮之妙文同蟠木之精聊染翰以寫意期報之以瑤瓊余觀前賢之賦草木者多矣靡不言託植之幽深採斸之莫致風景之妍麗追賞之歡愈至於體物良有未盡惟牡丹未有賦者聊以狀之僕射十一丈蔚為儒宗詞賦之首聲氣所感或能相和又見陳思王賦序多言命王粲劉楨繼作今亦效之邀侍御裴舍人同作青陽既暮鷃鴠已鳴念蘭若之方歇嘆桃李之陰成惟翠華之艷爚傾百卉之光英抽翠柯以布素粲紅芳而發榮其始也碧海霄澄驪珠躍出深波曉霽丹萍吐實煥神龍之銜燭皎若木之並日其盛也若紫芝連葉鴛雛比翼奪珠樹之鮮輝掩非烟之奇色倏忽摛錦紛葩似織其落也明艷未褫紅衣如脫朱草柯折珊瑚枝碎霞既爍而轉妍紅欲消而猶綷爾乃獨含芳意幽怨殘春將獨立而傾國雖不言兮似人觀其露彩猶泫一作泣日華初照煜其晨葩情若微笑色雖美而自艷類河濱之窈窕逮乎的皪含景離披向風鉛華春而思蕩蘭澤晚而光融情放縱以自得凝若煥之冶容既而華艷恍惚繁華遽畢驚寶雉之乍回想江而復出望獻璫之玉俄以蔽光感懷珮之川悵然如失客顧余曰勿謂淑美難久徂芳不留彼妍華之閲世非人壽之可儔君不見龍驤閈閎池臺御溝堂挹山林峯連翠樓有百歲之芳叢原注今京師精舍甲第猶有天寶中牡丹在無昔日之通侯豈暇當飛藿之時始嗟零落且欲同樹萱之意聊自忘憂清霜始降上命中使賜宰臣等朱橘各三枚蓋靈囿之所植也臣伏以度淮而枳由地氣而不遷吹谷生黍信陽和之所感昔漢武致石榴於異國靈根遐布此西域柔服之應也魏武植朱橘於銅雀華實莫就乃吳人未格之兆也考於前史昭晰可知豈非天地和同靈物效祉去蠻夷之陋獲近太陽感王化之盛更承膏露草木尚爾况乎人心漢宣帝宮館山澤意有所感必詔近臣賦之臣幼學為文忝列樞近敢稽首獻賦曰美南州之嘉樹受烈氣於炎德固一志於殊方遂不遷於上國貞枝凝碧蔚湘岸之夕陰華實變黃動江潭之秋色雜丹楓於溪畔映緑篠於巖側翡翠以之列巢鵷雛於焉棲息雖同霑於雨露竊自得於雕飾終獲譽於皇明豈因人而羽翼感洪鈞之獨運斡造化之元力思六合之同風採孤根而移植播元氣之茂育諒英靈之不測逮乎霜飛文囿風落秦川金莖炫耀於朝日玉樹青葱於霽天峩方壺之翠島列靈沼之清漣上鬱松柳下秀蓀荃赩朱草與屈軼華靈芝與賓連靈卉畢植而嘉橘在焉冰心獨潤金衣更鮮天漢之華星焜耀閬風之珠樹粲然香若團於野露色疑炫於江烟既而大官獻新奇果列筵非厥包之自遠何菲陋之莫傳樹隱方塘比丹萍之初實盤映皎月與赤瑛而共妍東鄙孤臣謬陳三事既乏和羹之用猶霑可口之味並食不割竊愧晏嬰之知捧之以拜重感桓榮之賜庶不朽於雪霜永酬恩於天地敕昔秩訾獻籌歸忠於大國日逐避禍納欵於明庭宣帝嘉其一心寵以優禮或存故王之印綬或賜歸德之美名爰舉舊章式崇新命回鶻嗢沒斯特勒倜儻慕義深沉有謀駃騠之生超千里鷙鶚之擊厲九秋屬獻欵誠布於邊將尋執醜虜不遺君親戢其餒殍之徒曾靡秋毫之犯旋觀所履大節甚明朕與回鶻代結和親久敦鄰好念其乖亂義在固存莫若撫其酋豪顯其大順使諸蕃知我招擕之禮更逾往昔之恩仍加帶礪之封俾授爪牙之寄服茲休寵可不敬哉敕回鶻代雄絶漠名振北蕃而乃厭金革之強慕朝廷之禮願襲冠帶思覩漢儀蟬蛻自致於潔清豹變獨蔚其文彩不有豪傑孰啓壯圖嗢沒斯稟氣陰山降精斗極生知忠孝神授兵鈐自強之心隱如敵國衛上之氣森若戈矛果能因亂布誠覩幾立節深叶懷柔之志不因告諭之詞昔者取士殊鄰秦能致霸得賢異壤晉實用材是用優以寵光處之權貴褒納忠之顯效錫歸義之美名俾建斾於新軍示絶席於諸將勉修臣節服我官常可檢校工部尚書兼左金吾衛大將軍同正充歸義軍使懷化郡王敕國家與回鶻久修鄰好重以姻親視其酋豪猶吾赤子屬本蕃乖亂種落未安君長之間自相疑阻窮而歸欵得不撫寧况爾等生戴斗之鄉精能貫日負射鵰之藝氣乃凌雲忠而善謀勇則能斷率其驍騎來附北邊願削袵以圖全且櫜弓而俟命矢其一志之死靡他既投我以誠則招之以禮昔徐盧欵塞即受漢封比能入朝仍疏魏爵今則解其被毳榮以彯纓爰嘉介石之心式寵銜珠之命秺侯忠孝可保於克終安上子孫方期於必貴勉茲師律為我信臣昔項伯歸義奉春建策賜之劉氏列在漢宗爰寵茂勳仰惟前典嗢沒斯代雄沙漠勇冠天山早稱良將之材常佩明王之紱附於絶塞歲已再期秉是一心竟全大節今則解其毳服始列牙旗自我加恩益聞厲志驥登吳坂感顧盼而長鳴劍出豐城因拂拭而增煥朕以漢北平太守李廣北狄避之號為飛將顧其苗裔頗在龍庭美瓜瓞之所興因而命氏念棣萼之方韡當使同榮夫思在無邪忠為令德嘉其立志用以錫名爾宜念之無替休命自古軍制必有佐二逮至漢氏亦循舊章既得將材俾參戎政實資謀策用正紀綱愛耶勿往在龍庭常為貴相乘其乖亂遂投迹於殊鄰加以懷柔竟歸心於上國而又推誠所奉果協良圖每獲異謀必來獻欵旋觀深志可為竭情昔戎狄請盟良由孟樂呼韓率服始自秩訾言念茂功所宜異等因其請族錫以嘉名漢錫秺侯尚採祭天之義魏親程昱用疇捧日之心寵以貂璫冠於裨校服茲新命宜保厥終可檢校右散騎常侍兼歸義軍副使仍賜姓李名宏順敕新授金紫光祿大夫檢校太子賓客使持節都督銀州諸軍事兼銀州刺史充本州押蕃落使及度支銀州監牧馬副使何清朝漢用駱甲則灌嬰副於騎將魏得關羽則張遼挾以前驅故能挫強楚之鋒芒取顏良於麾蓋爾夙負智勇備嘗艱難精誠發而石開志氣作而虹貫朕以思忠仗義倜儻秉心堅正且聞誓剪讐寇不以賊遺君父委之兵柄庶展拘原舉駭電之鋒期於盡敵得射鵰之騎未足稱功宜勉一心成豫九伐俾參環衛用壯軍聲可檢校太子賓客兼左衛將軍侍御史散官如故仍領河東道蕃渾兵馬赴振武界取思忠指揮門下朕近因載誕之日展承顏之慶太皇太后謂朕曰天子之孝莫大於丕承人倫之義莫重於嗣續穆宗睿聖文惠孝皇帝厭代已久星霜屢遷禰宮曠合食之禮惟帝深濡露之感宣懿皇太后長慶之際德冠後宮夙表沙麓之祥實茂河洲之範先朝恩禮之重中壺莫偕况誕我嗣君纘承昌運已協華於先帝方延祚於後昆思廣貽謀庶宏博愛爰遵舊典以慰孝思當以宣懿皇太后祔太廟穆宗睿聖文惠孝皇帝之室率是彞訓其敬承之朕祗奉慈旨載深感咽宣示中外咸使聞知主者施行王者照臨萬㝢名豈尚於難知敬順五行理宜避於勝伏徵諸前史義實炳然昔炎漢之興洛旁去水所都名號猶乃避之况我國家運昌土德豈可以王氣勝於君名所以憲宗繼明之初實已捨水必有冥數叶於禎祥漢宣帝柔服北夷宏宣祖業功德之盛侔於周宣御歷十年乃從美稱朕遠惟大漢之事近稟聖祖之謀爰擇嘉名式遵令典敬承天意永保鴻休宜改名為炎仍令所司擇日分命宰臣告天地宗廟其舊名中外奏章不得更有回避布告遐邇咸使聞知門下定天下者致風俗於大同安生人者齊法度於畫一雖晉之欒趙家有舊勳漢之韓黥身為佐命至於干紀亂律罔不梟夷禁暴除殘古今大義故昭義節度劉悟頃居海岱嘗列爪牙屬師道阻兵王師問罪三面開網一境離心乘此危機遂能歸命憲宗嘉其誠欵授以南燕穆宗待以腹心委之上黨招致死士固護一方逮於末年已虧臣節劉從諫生禀戾氣幼習亂風因跋扈之資以專封壤恃紀綱之律以襲兵符暫展執圭之儀終無上綬之請隙駒為喻魏豹始務於絶河井蛙自居孫述頗聞於恃嶮誘受亡命妄作妖言中伺朝廷潛圖左道接壤戎帥屢奏陰謀顧苕卵之可矜豈泉魚之自察暨乎沉痼曾靡哀鳴猶駐將盡之魂恣行邪僻之志罔惑舊校樹立狡童中使挾醫莫覩其朝服近臣銜命不入於壘門逆節甚明人神共棄其贈官及先所授官爵並劉稹在身官爵並宜削奪成德軍節度使王元逵魏博節度使何宏敬或姻連王室或任重藩維懇陳一志之誠願揚九伐之命吳漢任職受詔而初無辦嚴卜式朴忠未戰而義形於色况成德軍嘗以驍騎橫衝首破朱滔士氣方酣再回魯陽之日鼓音不息三周不注之山魏博軍亦以大斾涉河竟殲師道建十二州之旗鼓以列降人削六十年之厲階盡歸王化士賈餘勇軍有雄心必能稟酇侯之指縱成葛亮之心伐咨汝二帥朕尤注懷成德軍節度鎮冀深趙等州觀察處置等使金紫光祿大夫檢校司徒兼鎮州大都督府長史御史大夫駙馬都尉雲騎尉元逵宜守本官充北面招討澤潞使餘如故魏博等州節度觀察處置等使銀青光祿大夫檢校戶部尚書兼鎮州大都督府長史御史大夫上柱國何宏敬守本官充東面招討澤潞使餘如故潞府曩者烈祖在藩先天啓聖符瑞昭晰綵繢煥於泗亭鑾輅巡游金石刻於代邸實為可封之俗久為仁壽之鄉艱難以來頗著誠節必非同惡咸許自新其昭義軍舊將士及百姓等如保初心並赦而不問昭義軍舊大將等如能舍逆效順以州郡兵衆歸降者必厚加封賞如能擒送劉稹者別受土地以振勳庸其村鄉百姓如所在團結歸順者亦加爵賞劉悟下鄆州舊將校子孫及劉從諫近招致將士等喻以善道宜聽朕言凡秉義立名須明大順未有忠於所奉上悖君親昔郤至有言受君之祿是以聚黨有黨而爭命罪孰大焉田橫能得士心人多致命伏於海島莫敢猖狂及漢高召之奔走向闕豈嘗違拒漢使留止田橫唯慕殉以成仁不相挺而作亂故得其主歿延殊寵光顯令名爾等既有義心宜思改悔如能感喻劉稹束身歸朝必當待之如初特與洗雪爾等舊校亦並甄酬仍委陳夷行劉沔王茂元各務進兵同力攻討其諸道進軍並不得焚燒廬舍發掘丘墓擒執百姓以為俘囚桑麻田苗皆許本戶為主罪止元惡務安生靈於戲藩維大臣抗疏於外髦俊舊老昌言於朝戒朕以祖宗之法不可私一族刑賞之柄所以正萬邦宜用甲兵陳於原野雖朕以恩不聽㣥臣以義固爭詢自僉謀諒非獲已布告中外明體朕懷主者施行
