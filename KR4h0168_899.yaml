  text: 全唐文欽定全唐文卷八百九十九光庭吳興人吳越時官國子博士
  hash: sha256:0c47f18078c12d32194dcf0b4f49c1369e38f152b9642e47e18fd6f08a55e247
  markers:
  - {type: head, offset: 14, content: 邱光庭, id: KR4h0168_NFKB_899-h1, level: 1}
body:
  text: 夫元功美宰神物混成不可以智知不可以情詰者聖人皆置之度外略而不論而後之學者獨以不論海潮為闕事多著文以窮之今其遺文得見者三數家山海經以海鰌出入穴而為潮王充論衡以水者地之血脈隨氣進退而為潮竇叔蒙海濤志以月水之宗月有虧盈水隨消長而為潮盧肇海潮賦以日出入於海衝擊而為潮斯乃俱無據驗各以其意而為言也然而潮之所生元矣尋其源而不可究其極覩其末而不可窺其端苟或是非無所勘會唯其近理則謂得之今觀諸家之説咸盡乎善不可備陳其短輒以管見自立一家之言名曰海潮論其意以為水之性祇能流溼潤下不能乍盈乍虛靜而思之直以地有動息上下致其海有潮汐耳乃立漁翁隱者更相答凡四十問分為十篇成一卷冀其窮理盡性多言或中者也又以析理之書不宜染尚文字但以理明義白為善也故今之所論直言其歸趣而已所貴精微朗暢覽讀無煩者焉東海漁翁訪於西山隱者曰余生於海上若風雨雲霞雷電霜雪之自自者所從來之謂也余皆略知宗旨矣至於海潮之來朝聞夕見終莫曉其所由然也遐觀竹帛古者未有紙或書於竹簡或書繒帛故呼經史為竹帛博考古今海經夏禹治水之時記山川百物其書名山海經也論衡之文後漢王充著書考論物理其書名曰論衡竇氏浙東處士竇叔蒙著海濤志盧侯之説袁州刺史盧肇著海潮賦雖多端指諭咸於義未安聞吾子志學能文精智辨物願為余明白而陳之西山隱者曰僕巖居林處遙海遠江安能知濤潮之所起乎且天地廣大誰能覩其根源請為子遠取諸經近取諸物以考之雖其至廣至大亦不能逃於理矣今按易稱水流溼周易乾卦之文書稱水潤下尚書洪範之文俱不言水能盈縮斯則聖人之情可見矣水既不能盈縮則海之潮汐音夕潮之落也今人呼為澤不由於水蓋由於地也地之所處於大海之中隨氣出入而上下音暇後意同者皆倣此氣出則地下氣入則地上地下則滄海之水入於江河地上則江河之水歸於滄海入於江河之謂潮歸於滄海之謂汐此潮汐之大略備矣問曰古今言潮汐者多矣皆以海水盈縮而為之未有言由地之上下者也子之獨見深得其源然其必非海水之盈縮從何理以知之答曰視百川則知之矣百川亦水也不能盈縮此破竇氏言月為水之宗水隨月盈縮者海豈獨能盈縮乎假令海異百川獨能盈縮則海水既盈地亦隨盈而升百川隨地而上彼此俱上則無潮矣海水既縮則地亦隨縮而降百川亦隨地而下彼此俱下則無汐矣固以百川居地之上地居海之上地動而海靜動靜相違則潮汐生矣以斯知非海水之盈縮也漁翁問曰中庸云禮記篇名也地之廣厚振河海而不泄鄭元注云振收也則是海居地上子云地浮於海中何也答曰作記之人作禮記之人也欲明積小致大極言地之廣厚非實也中庸云今夫地一撮土之多也及其廣厚載華嶽而不重振河海而不泄萬物生焉為其意言積小致大地從撮土之多遂能收河海而不泄此立教之文非窮理也按洪範五行一曰水水曰潤下潤下作鹹指言海水水之本位位在北方自北直南以土及火水在北土居中火在南也推而立之從南推起而立之則火上土中水下也亦如人之五臟心上脾中腎下也心屬火脾屬土腎屬水也故志曰志者古書之通稱天以乘氣而立地以居水而浮由是而論地居海之上亦已明矣問曰地必居海之上則是地浮而不沈今將土塊置之於水則沈何也答曰地含氣塊不含氣故也且子不見陶器乎陶器瓦器盆甕之屬夫陶之於水也全之則雖重必浮含氣故也片之則雖輕必沈片之者打一小片置之於水則必沈者不含故也質性同而浮沈異者氣之所存則浮氣之所去則沈子曰土塊之不浮亦猶器片之沈矣問曰如子之言地則浮矣然則海中洲島其獨立乎其居於地乎答曰地形中聳而邊下海中洲島猶居地之垂處也問曰若如所論則是天下一海而地浮於中然經史有四海之文何也答曰經史之文據其所由而為言也居之中而指四方故言四海其實一耳漁翁問曰吾聞地道安靜子曰隨氣出入而上下何也答曰周易云坤元亨利牝馬之貞彖曰牝馬地類行地無疆然則乾象以龍坤象以馬觀其所象地非不動之物河圖括地象云地常動而不止地周遊於八紘之中未嘗暫息也春東東方木氣時曰少陽所以暄和夏南南方火氣時曰太陽所以暑熱秋西西方金氣時曰少陰所以淒涼冬北北方水氣時曰太陰所以嚴凝冬至極上夏至極下其故何哉由於氣也夫夏至之後陰氣漸長陰氣主閉藏則衰於上而盛於下氣盛於下則海溢而上陽氣歸於海下氣多故溢而上也故及冬至而地隨海俱極上也從夏至後陽氣漸退陰氣漸長地亦漸上陰進故也及至秋分地面與天不齊故晝夜等也秋分之後及至冬至地面上過天心上之極也所以晝短而夜長也冬至之後陽氣漸長陽氣主舒散則衰於下而盛於上氣盛於上則海斂而下陽氣散出於海上氣少故斂於下故及夏至而地隨海俱極下也冬至之後陽氣漸長陰氣漸退地亦漸下陰退故也及於春分地面與天不濟故晝夜等也春分後及於夏至地面下過天心下之極也所以晝長而夜短也此一年之內動息上下也問曰其一日之內動息上下可得聞乎答曰繫辭云夫坤其靜也翕韓康伯注云翕斂也止則翕斂其氣也其動也闢注云動則開闢以生物也翕者物之收斂闢者氣之散出氣收斂則地上氣散出則地下何異人之呼吸歟又莊子云大塊噫氣大塊地也其名曰風彼言噫氣亦呼吸之類也問曰一晝一夜兩潮汐則是一晝一夜兩闢兩翕將何驗之哉答曰驗魚獸之皮則知之矣魚獸出海中形如牛按毛詩蟲魚疏云魚獸之皮乾之經年每天陰及潮來則毛皆起若天晴及潮還則毛伏如故雖在數千里外可以知海水潮然則潮之來去與天之陰晴相類氣散出則天陰氣收斂則天晴即知是氣散出則潮來氣收斂則潮落故知魚獸之毛起伏者非識天之陰晴及潮之來去自應氣之出入耳毛起者氣出也氣出則地下地下則潮來毛伏者氣入也氣入則地上地上則潮落故魚獸之毛一晝一夜兩起兩伏足以驗其氣之兩闢兩翕矣問曰此翕闢之氣是何氣也答曰地中之氣也故此氣一出一入則地獨上獨下不由於水也若一年之氣則是天之元氣其氣周於水故水隨於氣而地隨於水也問曰地之廣厚不知幾千萬里也今算術之家言地之里數皆虛妄也何者地之四面垂入海中不可知其涯際也言能隨氣動息不亦誣乎答曰神無方豈論巨細且天大於地逾數倍焉尚能空中旋運也况地比於天殊為小者豈不能隨氣動息哉但人自不思之耳吾子視日月之回則信天之能旋而視濤潮之至不信地之能動日月東行天體西轉今日月西回者天運之也水性本靜為潮汐者地使之然此理昭然但人不思之耳豈不冥哉豈不昧哉冥者無知之貌昧者暗晦之辭問曰若如所論則地有動息上下矣然則人不覺之何也答曰不覩日月則不覺天之旋不覩濤潮則不覺地之動故河圖括地象云夫人居大舟之中閉牖而坐則不知舟之動也且人居大舟中尚不知舟動而况地之廣大曾不覩其邊何以知其上下哉且子不聞南中之潮雞乎出山海經雞鳴則潮至雞不覩潮之至而先鳴者蓋覺地之動也是知物有所長人或不及問曰地震人則覺之何也答曰動安和而震戰悚也震甚則人覺微亦不覺也昔張衡作地震儀以龍銜銅丸地震則丸落張衡後漢人也儀者狀貌之稱也其形如酒樽外鑄銅為八龍龍銜銅丸各置一方其機關在樽內東方地震則東龍丸落他皆倣此也嘗一丸落而不覺震人皆以為無驗經數日而隴西奏地震與丸落時同人始服其工妙然則震微人尚不覺况闢翕上下微而和者乎問曰地震何為者也答曰亦氣也周語云陽伏而不能出陰迫而不能升則有地震此伯陽甫之辭也伯陽甫老子也言陽氣伏於下而陰氣迫於上故陽氣不能升出而地為之震其言陽伏陰迫皆迫伏於地中焉推此而言是知地中之氣能使地之上下也漁翁問曰若如所論則是地自上下水乃去來而為之潮何也答曰潮者朝也潮音朝廷之朝潮本無名強名之曰潮至江漢之流自歸於海而夏書謂之朝宗於海尚書禹貢文也其意言百川之赴海如諸侯之朝天子也古人見海來朝百川亦名之曰潮如天子出而見諸侯亦謂之朝故明堂位云明堂位禮記篇名昔者周公朝諸侯於明堂之位意同於此矣周公周成王之叔父也成王年幼周公攝行天子之事而受諸侯之朝也問曰謂之汐何也答曰汐者水歸於海如臣夕見於君然早見於君曰朝晚見於君曰夕故左傳曰國家無事則朝音朝廷之朝也而不夕務間也詩云邦君諸侯莫肯朝夕小雅雨無正篇此其義也問曰謂之濤何也答曰濤大波也凡風之駕水皆謂之濤不得專於潮也考其義理則竇氏盧侯謂潮為濤失之矣漁翁問曰潮來有大小何也答曰二月八月陰陽之氣交月朔月望天地之氣變交變之時其氣必盛氣盛則出甚如人行步則喘急氣出甚則地下甚下音暇意同者倣此地下甚則潮來大其非交變之時其氣安靜則出微氣微則地下微地下微則潮來小故二月八月其潮遂大於諸月月朔月望其潮遂大於諸潮問曰大不正當朔望之日常於朔望之後何也朔大於初二初三初四望大於十六十七十八答曰凡物之動先感而後應先微而後盛朔望之氣雖至而地動之勢猶微故潮來大常於朔望之後也問曰何知二月八月陰陽之氣交者答曰陽氣生於子謂十一月也出於卯謂二月也浮於午浮者盛於地上謂五月也入於酉謂八月也陰氣生於午出於酉浮於子入於卯子午卯酉皆謂月建也故曰卯酉者陰陽出入之門戶也二月陽氣出而陰氣入八月陰氣出而陽氣入是知二月八月陰陽之氣交也問曰何知月朔月望天地之氣變者答曰日天倫也俱陽物也月地類也俱陰物也朔形交焉日月周旋故曰形交望光偶焉月望光滿故曰光偶光偶者團圓盛大與日相對光偶形交其變如一所以朔望之時天地之氣皆有變動朔望無異故曰如一也故陰陽書占正月之朔知一嵗之祥祥者善惡之通變今人占嵗旦雲物風氣知一年之內水旱豐荒也又稱五月十一月望為天地牝之辰牝者陰陽交接之名也彼其諸月猶此一隅言諸月之朔望皆於正月十一月之朔舉此二月則諸月可知故曰猶此一隅猶如也隅角也是知月朔月望天地之氣變也故洪範云星有好風箕星好風星有好雨畢星好雨詩云月離于畢俾滂沱矣離麗也麗著也月之從星則以風雨然則月從箕畢之星天地尚為之風雨豈其交接而氣不變者乎漁翁問曰潮來或午或未漸差何也答曰晝夜繫日翕闢隨月月臨子午則地闢故潮之來月皆臨子臨午夜潮月臨子晝潮月臨午天體西轉日月東行日遲而月速每二十九日過半而月及日日月同會謂之月朔故月朔之夜潮日月俱臨於子晝潮日月俱臨於午自此之後月速漸東至午漸遲故潮亦漸遲也天體西轉日月東行月速而日遲從月朔之後月去日漸遠初二初三日至未而月方至午故潮來在午後未時也所謂晝夜繫日翕闢隨月者也又夜於海下而論則天體東轉日月西行月速漸西至子漸遲故潮來亦漸遲月朔夜半潮來者日月俱在子至初二初三月去日漸遠日己至丑而月方至子故潮來在子後丑時也是以晝潮入夜一日午時二日午後三日未時四日未後五日申時六日申後七日酉時八日酉後此謂晝潮入夜也問曰何謂月臨子午夜潮入晝一日子時二日子後三日丑時四日丑後五日寅時六日寅後七日卯時八日卯後所謂夜潮入晝也則地闢乎答曰禮運云禮記篇名地秉陰竅於山川播五行於四時鄭元云竅孔也言地持陰氣出內於山川以舒五行於四時也和而後月生也言此氣和乃月生也是以三五而盈三五而闕則是月為地類也易説陽氣生於子陰氣生於午易説者周易之義也故月臨子午則地氣生地氣生則闢而出也問曰説卦云周易下繫也離為日坎為月則是月為水類而禮運月為地類與説卦不同何也答曰地水皆屬於陰俱主於月故禮運説卦互而言之以相顯也且日為㣥陽之精非獨專於火也月為㣥陰之精非獨專於水也何以言之按五行天一生水於北地二生火於南是故火為雌水為雄也若以日專主火月專主水則亦日雌而月雄也今按禮説云禮記之義日為君象月為臣象觀其所象正與水火相違故知日非專火月非專水也易曰乾天也有君父之道焉周易説卦云乾為天為君為父坤地也有妻臣之道焉坤文云地道也妻道也臣道也然則日象與乾同日為君象月象與坤同月為臣象故曰三五而盈三五而闕三五者水一火二木三金四土五此五行生數也合其數為十五滿十五而盈月望也盡十五而闕月晦也既與坤道同象總五行之氣非地類而何地亦總五行也與説卦參而求之足表㣥陰之義問曰陽燧開而火出陽燧者五月丙午日午時鑄銅錫為之其形如鏡舉之照日以艾得其火也陰鑒舉而水流陰鑒者用十一月壬子日子時鑄銅錫為之其形如蚌殼舉之照月以物取之得水者也則似月專於水矣何以釋之答曰所言不專於水豈謂全無水也但其兼主諸陰水亦在其中矣舉陰鑒而得水與掘地而得泉何以異也問曰五行云陽數奇陰數偶水一土五奇數子云皆屬於陰何也答曰水成數六土成數十然則水之與土屬陽而終屬於陰陰極則陽陽極則陰之義漁翁問曰浙江之潮特大何也答曰諸江淮河發源皆遠其水多按楚江出岷山淮出桐柏山河出崑崙山江水既多則海水入少水入既少其潮皆小也而浙江發源獨近其水少浙江之源近者三四百里遠者不過千里江水既少則海水入多水入既多故其潮特大也問曰潮來有頭何也答曰地勢廣遠垂入海中今人見海岸謂之海際非也殊不知地勢漸低為海水所漫其際不可見也地下則潮生下音暇潮生於地際自際湧湧則蹙蹙則奔奔則有頭水之常勢也漁翁問曰浙江之潮或東或西何也答曰夫水之性攻其盈而流其虛沙隨其流而積其虛積而不已變虛為盈盈則受攻終而復始所以或東或西也問曰何故浙江之水獨能攻其盈乎答曰大川皆然非獨浙江也凡水之回折之處涯岸皆迭盈迭虛或三十五十年而一變水勢使之然也今黃河及諸大川之岸皆有移易是也易曰地道變盈而流謙此之謂也漁翁問曰子言氣盛於下則海溢而上氣盛於上則海斂而下則是海之下有氣從何理以知之答曰抱朴子云葛洪所著書名從地向上四千里之外其氣剛徑居物不落以此推之則周天之氣皆剛非獨地之上也是知日月星辰無物維持而不落者乘剛氣故也內物既不能出而外物亦不能入則日月星辰雖從海下而回莫得與水相涉此言乃見盧氏所言出入於海衝擊而為潮之謬也若其海下無氣則日月星辰並入於水按星月無光假日光而明若日夜入於水則星月無由明矣故知日居元氣之內光常周遍於天雖當夜半之時天中亦不昏黑日在上則光照下在下則光照上故雖通夜光常遍於天所以星月明也以斯知海之下有氣必矣故人之氣海亦在水藏之下其取象於天地焉氣海在臍下問曰海之下既有氣海之邊際則如何答曰亦氣也海之外際無涯岸皆剛氣捍其水所謂周天之氣皆剛者也氣之外有天天周於氣氣周於水水周於地內地而外天天地相將形如雞卵黃即地也白即水也膜即剛氣殼即天也問曰虞書謂東方之地曰暘谷西方之地曰昧谷尚書堯典文也則似日之出入皆從地穴中也今子言日居元氣之內而與虞書不同何也答曰易離卦彖云日月麗乎天麗著也言日月之行附著於天也則所言日居元氣之內無乃是乎而虞書所稱暘谷者皆在九州之域此乃指其所見而為言也凡平地以望日出日入皆如近在山谷間故以谷言之耳問曰周易虞書俱為正典安知易是而書非乎答曰視日月之行則知之矣按日月右旋而天左轉日月行遲而天轉速故日月隨天皆西邁非著天而何故知易是也問曰前篇云日遲而月速此云日月遲而天轉速何也答曰日行三百六十六日而一周天月行不及三十日而一周天天則一日一夜而轉一周是月行速於日遲於天也比日言之則月速比天言之則月遲與前篇非相矛盾也矛盾者相違背之辭矛鎗也盾干杆也今人謂之傍牌事見列子漁翁問曰如子所謂是用渾天為説也蓋天軒天宣夜之是否可得聞乎答曰此三者之説皆非自古説天地之形者都有七家一曰渾天二曰宣夜三曰蓋天四曰軒天五曰穹天六曰安天七曰方天諸説既繁難以備舉今略舉四者也蓋天者言天形如車蓋也軒天者言天勢南低北軒也宣夜者言天唯空碧無形質也唯渾天言天地之形如雞卵北聳而南下南小北大故終日旋運而不離其所故北極常不沒南極常不見其轉如車軸以車軸喻雞卵之轉非真如車軸也日月星辰皆不回故先儒皆以渾天為得也問曰何知渾天為得乎答曰按周易乾下坤上為泰其彖曰天地交而萬物通也又震下坤上為復其彖曰復其見天地之心陽氣在下推此則見渾天之形也昔張衡作渾天儀儀者狀貌之稱鑄銅為之雕鏤日月星辰於上於密室之中以儀浮於水上滴水而轉之以視日出月沒昏中曉中正月之節昏昴中曉心中於室內唱之與室外觀之天不差晷刻由是論故知渾天為得也問曰何知蓋軒之屬非乎答曰彼蓋軒者皆言天轉如磨盤日月星俱北回如人把火夜行遠則不見故先儒咸以其説為非也凡把火夜行漸遠漸小然後不見今日落之時尢大故知非遠不見也又以破鏡之狀辨其日落之時益見北回之謬何以言之若日落之時如竪破鏡即是日回於北今日落之時如橫破鏡故知日入於下也且月之生明向日為始若月從北明即日回於北今月從下起得非日居其下乎看月之初明即日之所在是知蓋軒之論無所取裁在易卦坤下乾上為否問宣夜之説其理如何答曰亦非也易曰天行健周易乾卦象辭既稱行健則有形矣道經云天無以清將恐裂老子五千言之文也又史書每稱天開天裂史書者史記以下之通稱漢孝惠二年天開東北二十餘丈天若無形將何開裂宣夜言天無形質謬矣問曰天必有形其形之外可得聞乎答曰列子云天地者空中之一細物有中之最巨者也然則天形之外但空而無物漁翁問窮作而喜曰問少得多問潮聞汐又聞天地之元理也昭昭乎若夜之且曉夢之醒矣非奧學精識其孰能臻此哉大中年中毛詩博士沈朗進新添毛詩四篇云關睢后妃之德不可為三百篇之首蓋先儒編次不當爾今別撰二篇為堯舜詩取虞人之針為禹詩取大雅文王之篇為文王詩請以此四詩置關睢之前所以先帝王而後后妃尊卑之義也朝廷嘉之夫沈朗論詩一何狂謬新添四詩為風乎為雅乎為風也則不宜歌帝王之道為雅也則不可置關睢之前非唯首尾乖張實亦自相矛盾其為妄作母乃甚乎先儒言詩序并小序子夏所作或曰毛萇所作明曰非毛萇所作也何以知之按鄭風出其東門序云民人思保其室家經曰縞衣綦巾聊樂我員毛傳曰願其室家得相樂也據此傳意與序不同自是又一取義也何者以有女如雲者皆男女相棄不能保其室家即縞衣綦巾是作詩者之妻也既不能保其妻乃思念之言願更得聊且與我為樂也如此則與序合今毛以縞衣綦巾為他人之女願為室家得與相樂此與序意相違故知序非毛作也此類實繁不可具舉或曰既非毛作毛為傳之時何不解其序也答曰以序文明白無煩解也勝字公敵晉陵人仕吳越忠懿王為功德判官令咨爾獨步王江殊江瑤之文名鼎鼐仙姿瓊瑤紺體天賦巨美時稱絶佳宜以流碧郡為靈淵國追號玉柱仙君稱海珍元年令章邱大都督忠美侯滄浪頭章舉隱浪色奇入甌稱最杜口中郎將白中隱車螯負乃厚德韜其雄姿殊形中尉兼靈甘尹淡然子蚶菜體雖詭異用實芳鮮玉德公季遐蝦魁純潔內含爽妙外濟滄浪頭可靈淵國上相無比白中隱可含珍大元帥豐甘上柱國兼脆尹淡然子可天味大將軍遠勝王季遐可清綃內相頡羹郡王令多黃尉權行尺一令南寵蟲截截然居海天付巨材宜授黃城監遠珍侯復以爾專盤處士甲藏用蝤蛑素稱蟲截副衆許蟹師宜授爽國公圓珍巨美功臣復以爾甘黃州甲杖大使咸宜作解蘊中蟹足材腴妙螯德充盈宜授糟邱常侍兼美君復以爾解微子彭越形質肖祖風味專門咀嚼謾陳當置下列宜授爾郎黃少相令合州刺史仲扃蛤蜊重負雙宅閉藏不發既命之為含津令升之為慤誠君矣粉身功大償之實難宜授紫暉將軍甘鬆左右丞監試甘圓內史令靈蛻先生文外無排脅之皴內無鯁喉之亂宜授紅鐺祭酒清腴館學士令惟爾清臣鱸銷酲引興鱗鬣之鄉宜授橙虀録事守招賢使者令珍曹必用郎中時充鰣鐺材本美妙位無高宜授諸衙效死軍使持節雅州諸軍事令惟爾白圭夫子鱭貌則清臞材極美俊宜授骨鯁卿令甘鼎黿究詳爾調鼎之材咽舌潮津宜封醉舌公令甲拆翁鱉挾彈於巾巧也負擔於外禮也介胄自防不問寒暑智也步武懦緩不逾規繩仁也故前以擐甲尚書榮其迹顯其能宜授金丸丞相九肋君令長尾先生鱟惟吳越人以謂用先生治醬華夏無敵宜授典醬大夫仙衣使者令元鎮石首區區枕石子孫德甚富焉宜授新美舍人令和羹長朱子房石決明酒方沈酣臭薰一座挑筯少進神明頓還至於七孔賦形治目為最宜授懷奇令史令甘盤校尉烏賊吐墨自衛白事有聲宜授噀墨將軍令元介卿龜爾卜灼之效吉凶了然所主大矣宜授通幽博士令惟爾借眼公水母受體不全兩相藉賴冝授同體合用功臣左右衛駕海將軍令李藏珍真珠照乘走盤厥價不資斑希玳瑁裁簪製器不在金銀珠玉之下藏珍宜授圓輝隱士斑希宜授點花使者令房叔化牡蠣粉厠湯丸褁護丹器屈突通梵響振聲遠聞可知佛樂阮用光砑光螺運體施功物皆滑瑩羅幼文珂類乎貝孫點綴鞍勒粲然可觀小有文采叔化可豪山太守樂藏監固濟突通可曲沃郎梵響參軍攝玉塔金舍用光可檢校大輝光宜充掌書記幼文可馬衣丞令惟爾田青螺螄微藏淺味無所取材世或烹調以為怪品申潔蛙蒼皮癮疹矮股跳梁江伯夷鱁鮧宋帝酷好鰾則別名屯江小尉江豚漁工得雋亦號甘肥田青授具體郎申潔宜授濟饞都護行水樂令伯夷宜授宋珍都尉南海詹事屯江小尉宜授追風使試湯波太守令以爾錦袍氏鱖骨疏肉緊體具文章宜授蘇腸御史仙盤遊奕使以爾李本鯉三十六鱗大烹允尚宜授跨仙君子世美公以爾鮮於羹鯽斫鱠精妙見稱杜陵宜授輕薄使銀絲省饜德郎以爾楚鮮白魚隱釜沈糟價傾淮甸宜授傾淮別駕以爾縮項仙人鯿鬼腹星鱗道亨襄漢宜授槎頭刺史以爾食寵侯鱘鰉支節斑駁標致高爽宜授添廚太監以爾單長福鱓曲直靡常鮮載具美宜授泥蟠掾以爾管統蔥管省象菜伯可備煎和宜授長白侯同盤司箸局平章事以爾備員居士東崇腥粗無狀見取俗人宜授鍊身公子以爾唐少連崇連池塘下格代匱充庖宜授保福軍節度使令黃薦可河魨爾澤嫩可貴然失於經治敗傷厥毒故世以醇疵隱士為爾之目特授三德尉兼春榮小供奉令新餐氏鰒爾療飢無術清醉有材莽新妖亂臨盤肆餐物以人汚百代寧洗爾之得氏纍有由矣宜特補輔庖生令蓋頑生乎泥沙薄有可采宜授表堅郎
