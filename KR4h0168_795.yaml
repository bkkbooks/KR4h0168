front:
  text: 全唐文欽定全唐文卷七百九十五孫樵二
  hash: sha256:9e3092295da9e15b8a1525135640ffd02a7d1dadb0c05b538041e5cbffcccf18
body:
  text: 孫子病痁其友踵門請曰始則栗縮撼懷有若仆子於嚴冰者終則憤胸爍肌有若置子於烈爐者子知動作皆鬼耶余試為子逐之以文樵應之曰余病誠鬼也然樵居平亦有不自了事者抑有鬼乎樵嘗思委質以事君則有若刳心而死者立於旁曰當如此諫樵嘗思不入於危難則有若結纓而死者立於旁曰當如此忠樵嘗欲不固其窮則有若拜拒饋粟者立於旁曰當如此廉樵嘗欲苟違其期則有若擁梁汨死者立於旁曰當如此信樵嘗欲與人美言則有若教豫訐談而鯁人耳者樵嘗欲與人市交則有若教豫違熱而去勢者樵嘗欲趨權豪以冀得則有若牽豫裾而躓豫足者樵嘗欲忍汗赧以自媒則有若縛豫舌而膠豫口者豫之不得專也如此以故學勤而吾道愈窮業修而知己日消是殘吾生於痁鬼也子并為吾逐之吾聞有陳萬年者射利乘機迎顏作怡愈愈便便阿意奉歡死而有靈是為諂鬼此鬼依人使人蒙福人見輒喜擺去不得復有公孫宏者刻己沽名飾情釣聲內苞禍心外示舒宏死而有知是為矯鬼此鬼憑人使人有聞上信於君下喜於民復有司馬安者攘義盜仁縛舌交脣柔聲婉顏狐媚當權死而有知是為巧鬼此鬼依人辭枯即榮長劒華纓高步天庭復有和長輿者巨萬藏家貫腐鏹一作仄磨鱗差螭縮陳陳腥止死而有知是為錢鬼此鬼憑人使人氣豪意適交歡販祿買曲成直此四鬼者苟與吾遊吾必快所求是資吾生於他鬼也子并為吾招之其友不對退而歌曰窮吾知其所羞達吾知其所求此不當逐而彼不當遊君乎君乎誠有激於中乎吁長安寓居闔戶諷書悴如凍灰癯如稿柴志枯氣索恍恍不樂一旦有曾識面者排戶入室吒駭唧唧且曰憊耶餓耶何自殘耶則對曰樵天付窮骨宜安守拙無何提筆入貢士列抉文倒魄讀書爛舌十試澤宮十黜有司知己日懈朋徒分離矧遠來關東士冖柘裝銷空一入長安十年屢窮長日猛赤餓腸火迫滿眼花黑晡西方食暮雪嚴冽入夜斷骨穴衾敗褐到曉方活古人取文其責蓋輕一篇跳出至死馳名今人取文章章貴奇一句戾意全卷鮮知言念每歲徂春背暑洗剔精魂澄拓襟慮曉窗夜燭上下雕斫托言必高儲思必深字字磨校以牢知音况榮辱撓其外得失戕其內機穽在乎足鋒刃在乎背吾非檻豖籠雛其能窮而反諛乎客退遂書几作歌曰肥於貌孰與肥其道求於人孰與求其身處乎出乎孰為得而孰為失乎孟秋暮天當庭布筵有瓜於盤有果於盆拜而言若祈於神者從而問之對曰七夕祈巧祀也若有求乎樵應之曰吾守吾拙以全吾節巧如可求適為吾羞彼巧在言便便翻翻出口簧然媚於人間革白成黑蠱直殘德譽跖為聖譖回為賊離間君親瀆亂家國彼巧在文摘奇搴新轄字束句稽程合度磨韻調聲決濁流清雕枝鏤英花鬬窠明至有破經碎史稽古倒置大類於俳觀者啓齒下醨沈謝上殘騷雅取媚於時古風不歸彼巧在官竊譽假善齚舌鉗口媚竈賂權忍恥受侮愧畏如鼠望塵掃門指期九遷君納於違贊唱菲菲玩世偷安敗俗紊官彼巧在工狷詭不窮唾古笑朴雕鎪錯落憑雲亘天目隻霍延綿窮侈殫麗越禮踰制繡文錦幅雲綃霧縠若出鬼力大蠧婦織遂使俗尚浮華名溺於奢雕家磨國未騁胸臆蠱於化源戕此民力由此觀之巧何足云吾寶吾拙雖與事闊優遊經史臥雲嘯月九衢喧喧夾路朱門曉鼓一發車馳馬奔豫方高枕偃然就寢腹坦一作搖鼻息夢到鄉國槐花撲庭鳴蜩噪晴懷軸囊刺門門買聲豫方屏居詠歌吾廬對松攲石莫知其餘上天付性吾豈無命何求於巧以撓吾靜吾方欲上呌帝閽以窒巧門使天下人各歸其根無慮無思其樂怡怡耕食織衣如上古時巧乎巧乎將何所施為孫樵謂陸長源唐春秋乃編年雜録因掇其體切峭獨可以示懲勸者擲其叢冗禿屑不足以警訓者自為十八通書號孫氏西齋録起高祖之初洎武皇之終首廟號以表元首日月以表事尚功力正刑名登崇善良蕩戮凶回有所鯁避則微文示譏無所顧栗則直書志慝所謂高祖殺太子建成者何黜功循愛譏失教也李績立皇后武氏者何忘諫贊慝懲廢命也起王后已廢之魂上配天皇者何登嫌黜冢不可謂順豫懼後世疑於褅裸也條天后擅政之年下繫中宗者何紫色閏位不可謂正豫懼後世牽以稱臨也崔察賊殺中書令裴炎者何詭諛梯亂肇殺機也張守圭以安祿山叛者何貸刑怫教稔禍階也稱天下殺者何罪暴天下示衆與殺也稱天下殺者何死非其罪示衆不與殺也臣或不書卒者何不以直終去卒以示貶也君或不書葬者何不以正終去葬以示譏也懼怠去瑞示戒志沴尚德必書賤尸位則黜貴皆所以驅邪合正俾匯大義操實置例以示懲勸嗚呼宰相升沈人於數十年間史官出沒人於千百歲後是史官與宰相分挈死生權也為史官者不能抃忠骨於枯墳臠諂魄於下泉磨毫黷札叢閣飽帙豈國家任史官意耶樵既序其略授其友高錫望傳之矣武皇帝得利劒於希夷之間提攜六年而四用之宜其庶績暉如哉往者北戎猖狂渝盟盜疆大出虜門戍卒屢奔武皇赫然奮雷霆之威驅貔武之師靖胡塵於塞垣復帝子於虜庭非武皇一用其劒耶賊鎮阻兵邀爵山東劫衆以濟其姦擘險以扞其誅王師萃之屢戰無功兵衄將稽賊勢益張并醜乘之遂萌梟心乃劫吾兵乃固吾城反書既聞卒愕京師輿人謠曰上宜亟以節假之且赦其辜俾守北門以伐虜謀不然并且東連潞兵北合戎師分卒以趨太行卷甲以下河東國家其能甘心於潞寇耶武皇曾不逗撓於其衷亟發武符按言誅之羽檄朝馳夕擒并頑非武皇再用其劒耶并部既平潞守益堅王師告勞國用告虛內外咨嗟訛言沸騰飛言上聞上為不聞誅潞之心益牢責戰之詔日嚴卒能克大憝於山東梟渠魁於國門非武皇帝三用其劒乎浮屠之流其來帛丿糸帛丿糸根盤蔓滋日熾而昌蠱於民心蠶於民生力屈財殫民恬不知武皇始議除之女泣於閨男號於途廷臣辨之于朝褻臣爭之於旁㣥疑膠牢萬口一辭武皇曾不持疑卒詔有司驅㣥矒而髮之毀其居而田之其徒既微其教僅存民瘼其瘳國用其加風雨以時災沴不生非武皇四用其劒耶今者嗣皇帝纂武皇之耿光傳武皇之遺劒宜乎銛其鍔不使其挫寶其刃不使其泥而又硎之以義淬之以智匣之以禮苞之以仁持之以信與天下終始天下幸甚何易于嘗為益昌令縣距刺史治所四十里城嘉陵江南刺史崔朴嘗乘春自上遊多從賓客歌酒泛舟東下直出益昌旁至則索民挽舟易于即腰笏引舟上下刺史驚問狀易于曰方春百姓不耕即蠶隙不可奪易于為屬令當其無事可以充役刺史與賓客跳出舟偕騎還去益昌民多即山樹茶利私自入會鹽鐵官奏重榷管詔下所在不得為百姓匿易于視詔曰益昌不征茶百姓尚不可活矧厚其賦以毒民乎命吏剗去吏爭曰天子詔所在不得為百姓匿今剗去罪愈重吏止死明府公免竄海裔耶易于曰吾寧愛一身以毒一邑民乎亦不使罪蔓爾曹即自縱火焚之觀察使聞其狀以易于挺身為民卒不加劾邑民死喪子弱業破不能具葬者易于輒出俸錢使吏為辦百姓入常賦有垂白僂杖者易于必召坐食問政得失庭有競民易于皆親自與語為指白枉直罪小者勸大者杖悉立遣之不以付吏治益昌三年獄無繫民民不知役改綿州羅江令其治視益昌是時故相國裴公刺史綿州獨能嘉易于治嘗從觀其政導從不過三人其全易于廉約如此會昌五年樵道出益昌民有能言何易于治狀者且曰天子設上下考以勉吏而易于考止中上何哉樵曰易于督賦如何曰止請常一作貸期不欲緊繩百姓使賤出粟帛督役如何曰度支費不足遂出俸錢冀優貧民饋給往來權勢如何曰傳符外一無所與擒盜如何曰無盜樵曰余居長安歲聞給事中校考則曰某人為某縣得上下考某人由上下考得某官問其政則曰某人能督賦先期而畢某人能督役省度支費某人當道能得往來達官為好言某人能擒若干盜反若干盜縣令得上下考者如此邑民不對笑去樵以為當世在上位者皆知求才為切至於緩急補吏則曰吾患無以共治膺命舉賢則曰吾患無以塞詔及其有之知者何人哉繼而言之使何易于不有得於生必有得於死者有史官在背臨卭南馳越二百里得嚴道郡實與沈黎越巂俱為邊城逼於㣥蠻田在賓將軍刺嚴道三年能條悉南蠻事為樵言曰巴蜀西逼於戎南逼於蠻宜其有以制之者當廣德建中之間西戎兩飲馬於岷江其衆如蟻前鋒魁健皆擐五屬之甲持倍尋之戟徐呼按步且戰且進蜀兵遇鬬如植橫堵羅戈如林發矢如虻皆折刃吞鏃不能斃一戎而况陷其陳乎然其戎兵踐吾地日深而疫死者日衆即自度不能留亦輒引去故蜀人為之語曰西戎尚可南蠻殘我自南康公鑿青溪道以和㣥蠻俾由蜀而貢又擇㣥蠻子弟聚於錦城使習書算業就輒去復以他繼如此垂五十年不絶其來則其學於蜀者不啻千百故其國人皆能習知巴蜀土風山川要害文皇帝三年南蠻果大入成都門其三門四日而旋其所剽掠自成都以南越巂以北八百里之間民畜為空加以敗卒貧民持兵㣥聚因緣劫殺官不能禁由是西蜀十六州至今為病自是以來㣥蠻常有屠蜀之心居則息畜聚粟動則練兵講武而又俾其習于蜀者伺連帥之間隙察兵賦之虛實或聞蜀之細民苦於重征且將啓之以幸非常吾不知㣥蠻此舉大劒以南為國家所有乎且每歲發卒以戍南者皆成都頑民飽稻飫豕十九如瓠雖知鉦鼓之數不習山川之險吾嘗伺其來朔風正嚴緩步坦途日次一舍固已呀然汗矣而况歷重阻即嚴程束甲而趨挾戟而鬬耶加以為將者刻薄以自入餽運者縱吏而鼠竊縣官當給帛則以楛而易良當賑粟則以沙而參粒如此則邊卒將怨望之不暇又安能殊死而力戰乎此巴蜀所以為憂也樵曰誠如將軍言苟為國家計者孰若詔嚴道沈黎越巂三城太守俾度其要害按其壁壘得自募卒以守之且兵籍於郡則易為役卒出於邊則習其險而又各於其部繕治美地分卒為屯春夏則耕蠶以資衣食秋冬則嚴壁以俟寇虜連帥即能督之歲遣廉白吏視其卒之有無劾其守之不法者以聞如此則縣官無餽運之費姦吏無因緣之盜兵足食給卒無胥怨於將軍何如田將軍曰如此何患言卒遂書裦城驛號天下第一及得寓目視其洛則淺混而茅視其舟則離敗而膠庭除甚蕪堂廡甚殘烏覩其所謂宏麗者訊於驛吏則曰忠穆公嘗牧梁州以裦城控三節度治所龍節虎旗馳驛奔軺以去以來轂交蹄劘由是崇侈其驛以示雄大蓋當時視他驛為壯且一歲賓至者不下數百輩苟夕得其庇飢得其飽皆暮至朝去寧有顧惜心耶至如棹舟則必折篙破舷碎鷁而後止漁釣則必枯泉汨泥盡魚而後止至有飼馬於軒宿隼於堂凡所以汙敗室廬糜毀器用官小者其下雖氣猛可制官大者其下益暴橫難禁由是日益破碎不與曩類某曹八九輩雖以供饋之隙一二力治之其能補數十百人殘暴乎語未既有老氓笑於旁且曰舉今州縣皆驛也吾聞開元中天下富蕃號為理平踵千里者不裹糧長子孫者不知兵今者天下無金革之聲而戶口日益破疆場無侵削之虞而墾田日益寡生民日益困財力日益竭其故何哉凡與天子共治天下者刺史縣令而已以其耳目接於民而政令速於行也今朝廷命官既已輕任刺史縣令而又促數於更易且刺史縣令遠者三歲一更近者一二歲再更故州縣之政苟有不利於民可以出意革去其甚者在刺史曰明日我即去何用如此在縣令亦曰明日我將去何用如此當愁醉醲當飢飽鮮囊帛櫝金笑與秩終嗚呼州縣真驛耶矧更代之隙黠吏因緣恣為姦欺以賣州縣者乎如此而欲望生民不困財力不竭戶口不破懇田不寡難哉豫既揖退老氓條其言書於褒城驛屋壁樵曩於襄漢間得數十幅書繫日條事不立首末其略曰某日皇帝親耕籍田行九推禮某日百僚行大射禮於安福樓南某日安北諸蕃君長請扈從封禪某日皇帝自東還賞賜有差某日宣政門宰相與百僚廷爭十刻罷如此凡數十百條樵當時未知何等書徒以為朝廷近所行事有自長安來者出其書示之則曰吾居長安中新天子嗣國及窮虜自潰則見行南郊禮安有籍田事乎况九推非天子禮耶又嘗入太學見叢甓負土而起若堂皇者就視得石刻乃射堂舊址則射禮廢已久矣國家安能行大射禮耶自關以東水不敗田則旱敗苗百姓入常賦不足至有賣子為豪家役者吾嘗背華走洛遇西戍還兵千人縣給一食力屈不支國家安能東封從官禁兵安所仰給耶北虜驚嚙邊氓勢不可控宰相馳出責戰尚未報功况西關復警於西戎安有扈從事耶武皇帝以御史竊議宰相事望嶺南走者四人至今卿士齚舌相戒况宰相陳奏於仗乎安有廷奏爭事耶語未及終有知書者自外來曰此皆開元政事蓋當時條布於外者樵後得開元録驗之條條可復云然尚以為前朝所行不當盡為墜典及來長安日見條報朝廷事者徒曰今日除某官明日授某官今日幸於某明日畋於某誠不類數十幅書樵恨生不為太平男子及覩開元中事如奮臂出其間因取其書帛而漫志其末凡補缺文者十三正訛文者十一是歲大中五年也孫樵既黜于有司忽恍乎若病酲之未醒茫洋若癡人之暝行據牀隱几悶然不寐二僮以樵尚甘於眠偶語戶間且曰吾聞他舉進士者有門吏諸生為之前焉有親戚知舊為之地焉走健僕囊大軸肥馬四馳門門求知所至之家入去如歸閽者迎屈引主人出取卷開讀喜歡入骨自某至某如到一戶口口附和不敢指破親朋扳聯聲光爛然其於名達進取如掇今主遠來關東居長安中進無所歸居無所依忿割口食以就卷軸冒暑觸雪攜出籍謁所至之門當關迎嗔俯眉與語受卷而去望一字到主人目且不可得矧其開口以廷乎時或不棄而遇主人推心於公是者當開緘引讀苟合心曲又曰彼何人耶彼何自耶况所為幽拙大與時闊凡為世人婉顏巧脣望風趨塵以售其身則必淡面鈍口戇揖癡步昧於知幾買嫌於時凡為讀書東獵西漁粗知首尾則為有餘則必燈前月下寒朝暑夜磨礲反覆期入聖域徒苦其神孰裨其身凡為文章拈新摘芳鼓勢求知取媚一時則必擺落尖新期到古人上規時政下達民病句句淡止讀不可入徒乖於衆孰適於用凡為造謁去冷附熱大求其力小求其得則必權門掃迹寂寞是適所至之處雀羅在戶人皆嫌去愈恭好慕凡為結交搜羅傑豪相醉以酒相飫以庖則必屑去溫燠膠牢淡泊時或叢處凍冷徹曙晨起散去潔腹出戶逮暮如故學獵古今不為衆譽文近于奇不為人知九試澤宮九黜有司十年輦下與窮為期一歲之間幾日晨炊飢不飽菜寒無襲衣此皆自掇何怨於時浪死無成孰與歸耕言始及是樵聞起喜二僮遽匿呼諭不得遂敲几而歌曰彼以其勢我專吾勤彼以其力我勤吾學學之不修骨肉如仇學之苟修四海何讐噫吾之所貴僮之所薄吾之所惡僮之所樂僮何知吾豈獨無時會昌元年漢波逾堤陸走漂民襄陽以渚於是天子曰戶部侍郎盧某前為廣州治稱廉平家無餘儲府有羡財耕夫無所徭舶賈無所征蠢茲海隅賴之而安其以襄陽之殘民屬治之盧公既來襄陽始用李從事允之畫能成新堤即問可以為治狀對曰天子以襄陽飢氓寄活於公宜有以休養之者襄陽之屬城為唐州唐州之支邑為泌陽泌之東有二流走出斷堤嚙道而西派於二流南別為溝壤高岸頺水不得行昔召信臣嘗為南陽能為民障水泉廣溉灌世賴其利俗用蕃富嘗披地圖北盡南陽故地豈古所謂召堰者耶代邈時移功不加修堤豁於流浸泄為波自泌陽以南平陵以西居民甚逋墾田甚雕公則能復信臣舊規真民十世利者盧公立召管田部將出卒與穀率以聽命李從事即為條分程度指畫經略且使即其故堤以鯁二渠鑿其枯溝析為南流水門既陳百瀆脈分蔓蔓于原支支於屯數百里間野無隙田旱無枯苗召堰既成秋田大登八州之民咸忘其飢范陽盧庠能道李從事佐盧公事且曰盧公自南海至襄陽再以李從事參畫軍事凡其所居鏗耀有聞及為潞州聲光削然發戍卒甲興而譁盧公駭吒謂他從事曰使李從事我寧及此耶是時李從事陷於讒言獲譴當奪權自盧公黜留洛陽如此則李從事前佐盧公宜何如哉李從事去襄陽五年召堰之利益大於民歲增良田頓至四萬樵惜李從事之迹不為人知作復召堰籍赤帝子火熾四百年天厭其熱洎獻燼矣武侯獨憤激不顧收死灰於蜀欲噓而再燃之艱乎為力哉是以國稱用武岐雍間地不尺闊抑非智不周天意炳炳然也夫以武侯之賢寧靡籌其不可耶蓋激備隆中以天下託不欲曲肱安穀終兒女子手將馳驅死備志耶由是核武侯之所為殆庶幾矣然跨西南一隅與吳魏抗國提卒數萬綽綽乎去留無我枝者是亦善為兵矣史壽以為短於應變真抑武侯哉俾武侯不早入蜀地曹之君臣將奔走固圉之不暇鍾鄧寧能越巖縣兵決勝指取耶是井絡之野與武侯存亡俱矣天殲武侯其不受劉愈明白矣其薑維何力焉曩蟠南陽時人不與仲毅伍洎受社稷寄擅刑賞柄曾心不愧畏人不疑黷何意氣明信之卓卓也武侯死殆五百載迄今梁漢之民歌道遺烈廟而祭者如在其愛於民如此而久也獨謂武侯之治比於燕奭彼屠齊城合諸侯在下矣帝承天休纂堯之勳啓宮於蒲守不以城帝守以城孰守不城阻湖為池限華為門波非不狂巖非不崇守不以仁社為周遷將蒙監扶理土朔方萬里扞胡貽謀子孫始訖其功阿房已墟帝豈不城城在民和自華洎夷罔不順同屹為國垣以藩有虞其堅如金其厚如坤蕩蕩巍巍牢不可屠四罪雖頑莫敢來攻一家熙熙相視而安帝配商均不私以城帝死蒼梧授之夏家太甲不修帝城乃頺唯此帝城哲王獨知求之民心乃見其基帝城雖隳築之不難無寧無荒帝城復高不識不知相傳峻隅其版雖崇其築雖堅非帝之心孰為帝城唐尚書倉部郎中姓康氏以咸通十三年月日薨於鄭州官舍其年月日前左拾遺陳晝寓書孫樵曰與子俱受恩康公門今兆還有期其孤徵志於子子其無讓樵哭之慟已而揮涕敘平生公諱某字某會稽人曾祖諱某贈某官祖諱某贈某官父諱某贈某官公幼嗜書及冠能屬辭尢攻四六文章援毫立成清媚新峭學者無能如自宣城來長安三舉進士登上第是歲會昌元年也其年冬得博學宏詞授祕書省正字明年臨桂元公以觀風支使來辟換試祕書郎五年調再授祕書省校書郎大中二年復調授京兆府參軍其年冬為進士試官峭獨不顧雖權勢莫能撓其與選者不逾年繼踵升第故中書侍郎高公璩尚書倉部郎中楊嵓太常博士杜敏求今春官二卿崔公殷夢尚書屯田郎中崔亞前左拾遺陳晝及樵十輩皆出其等列也明年授大理評事兼監察御史戶部巡官明年改鹽鐵巡官天付介直不能諂言故丞相河東公休使鹽鐵轉運公或請計事將入門裴公謂謁者曰必康君也裴公始以直知終以直廢明年去鹽鐵詔授大理司直或有所讞宰相莫能回其筆明年授試大理司議郎兼侍御史度支巡官明年改授檢校戶部員外郎兼侍御史轉運推官明年換判官今華州刺史李公訥拜鹽鐵轉運使將蒞事且召㣥吏曰二十年以前推官判官誰為廉乎可以助吾治者㣥吏皆以公塞問李公曰吾得之矣公由是不去職咸通元年改檢校禮部郎中兼侍御史充轉運判官李公始以廉平知終以章奏加厚常稱于班行間曰康公宜掌帝制或與宰相言必慰薦之明年詔授海州刺史廉而不刻明而不抉案牘符檄公一以口授之㣥胥輩徒搦管捉紙字字書出蓄縮汗栗何暇為姦犯耶以故老吏猾胥畏之如神明秩罷退居淮陰咸通八年詔拜大理少卿明年遷尚書倉部郎中充西川宣諭制置鹽鐵法使兼西川供軍使賜紫金魚袋公馳驛至西川不浹旬而鹽無二價蜀氓至今賴之會西川節度使劉公以疾薨戍兵日至軍儲不給糗無常價而度支有定估遂乘傳詣闕且請與度支計事無何詔以竇滂代公公遂守倉部郎中會竇滂逗遛不以時之任朝廷欲以警之其年十一月遂貶公為澧州刺史明年移鄭州長史朝廷或有繁難之任議莫不以公為言宰相且將用之嗚呼天殲正人誠疲民之不幸非公之不幸也公娶長樂馮氏故給事中纍贈太尉諱審第三女也公十二男八女長曰齊鄉貢進士次曰顏鄉貢進士次曰言明經及第次曰某云某長女適鹽州防禦判官試大理評事高遲七女未笄夫人自京師攜其孤奔喪於管城其年九月三日以公之喪權窆于孟州河陰縣某鄉里銘曰會稽之英斗牛之靈并鍾德門公實挺生月中搴桂日下馳名藝閣清秩牢盆美聲出牧東海二卿寺鵷行望郎錦川星使騏驥蹀足蛟龍得水富貴可期煙霄漸邇謫非其罪天道寧論不復雙闕遂歸九原圃田發紖河陰封樹勒石載銘庶幾終古咸通十一年十一月五日友人孫樵謹遣家僮犀角鴈兒具時羞之奠敬祭于故友滁州刺史贈諫議大夫高公叶卜之靈嗚呼與君定友不謝古人為分日牢為道日親二十五年彼我一身人謂我愚君謂我賢人欲我後君欲我先我為一善君喜見顏我為一失君慍形言意我尚華布衣禦寒意我苟進蓑笠當軒我蟠濁泥君躡青雲不以升沈塹隔其間誨我如兄煦我如春我何敢忘銘骨書紳君之文章可動鬼神君之器業可活生民我之賴君如倚華山庶寡我過期大我門君牧滁氓我從邠軍方恨綿邈凶訃遽聞東嚮慟哭痛貫心肝三日麻衣朝晡忘餐百身莫贖何裨往魂嗚呼痛哉杵臼死義比干死仁君殞賊手為怨難論嗚呼痛哉君殯喬谷我歸咸秦試發舊篋君書盈千辭旨重重墨色如新苟非相諫即是慰安填臆悲來淚如迸泉嗚呼痛哉天喪吾友吾何望焉誰拯湮溺孰開頑昏嗚呼痛哉世人結交違寒集溫如我不易如君固難嗚呼痛哉敬薑晝哭嵇紹幸存輤車其東歸骨洛川遠備醪饌告辭柩前嗚呼哀哉尚饗大中十八年七月九日鄉貢進士孫樵再拜獻辭張君靈座之前樵實頑民不知鬼神凡過祠廟不笑即唾今於張君信有靈云會昌五年夜躋此山凍雨如泣滑不可陟滿眼漆黑索途不得跛馬慍僕前仆後踣樵因有言非燭莫前須臾有光來馬足間北望空山火起廟壖焰焰逾丈飛芒射天瞑色斜透峻途如晝樵謂廟奴苦寒爇薪取溫曉及山巔鎖澀廟門餘燼莫覩孰知其然大中四年冒暑還秦午及山足猛雨如雹樵復有言神誠能神反雨為晴曩火乃靈斯言才闋回風大發始自馬前怒號滿山劈雲飄雨使四山去茲山巍巍輕塵如飛訖四十里雨不沾衣顧樵當時嘉神不欺與神心期神其自知今過祠宇其敢默去觴酒豆脯捧拜庭下神其歆此
