front:
  text: 全唐文欽定全唐文卷九百三十二杜光庭四
  hash: sha256:29cc8243f368ddfd4bf9a638d304c0af795baa0567eaef569c3aa1ca257fdb22
body:
  text: 墉城集仙錄者紀古今女子得道昇仙之事也夫去俗登仙超凡證道駐隙馬風燈之景享莊椿蟾桂之齡變泡沫之姿同金石之固長生度世代有其人綿歷劫年編載經誥元圖祕籙燦然可觀神仙得道之蹤或品昇上聖或秩豫高真或統御諸天或主司列嶽或騎箕浮漢或隱月奔晨或朝宴九清或迴翔八極開皇已往劫運之前三洞寶書多所詳述洎九皇三古之後服牛乘馬已還皆輟天府而下拯生靈由仙曹而暫司宰制垂法立教秉國佐時儒籍史臣備顯其事至有韜光混迹駕景登晨或功著巖林遡煙霞而輕舉或身離囂濁控鸞鶴以沖虛或躬替帝王或樂居甿俗陰功克就元德昇聞使雞犬以俱飛拔庭除而共舉光於簡冊何世無之昔秦大夫阮蒼漢校尉劉向繼有述作行於世間次有洞冥書神仙傳道學傳集仙傳續神仙傳後仙傳洞仙傳上真記編次紀錄不啻十家又名山福地之篇括地山海之說搜神博物之記仙方藥品之文旁引姓名別書事跡接於聞見詎可勝言則神仙之事煥乎無隱矣常俗之流或言神仙者必俟身形委謝魂識成真而後謂之神仙非是骨月昇翥此蓋愚瞽未達之甚也何者真經云得道去世或隱或顯證道雖一修習或殊故云神仙之道百數非一途所限非一法所拘也或為真人之友或為天帝之賓倏忽而龍駕來迎參差而雲駢遐邁者則谷希長里青光赤松之例是也或受書稟籙陰景鍊形靈肉再生前功克懋者則五老上帝四極真王之例是也或精誠不易試難不移目注崑邱心朝大帝而得道者黃觀韋道微傳君之例是也况復大洞七變八稟三圖胎精斑符隱芝曲素玉精金液黃水祕符赤樹青英環剛絳實白羽皇象九轉八瓊服之而化鳳化龍餌之而為金為玉復有金璫玉珮之訣三皇八景之文華丹素奏之靈神虎金真之要飛行之羽超虛攝空流金之光攝神制逆翱翔則翠羽元翮控御則飛葢曲晨七十四方之所修靡虧毫髮三十七色之所授漸備羽儀至或降九錫以騰淩踐七試而貞介資師祕訣證自我心歷象不能易其堅雷霆不能駭其聽富貴不能惑其志聲色不能誘其衷此則我命在我長生自致故古今得者詎可殫論南真云功滿三千白日昇天宏道無已自致不死此之謂也夫神仙之上者雲車羽葢形神俱飛其次牝谷幽林隱景潛化其次解化託象虵蛻蟬飛然而沖天者為優尸解者為劣又有積功未備累德未彰或至孝至忠至貞至烈或心不忘道功未及人寒棲獨鍊於己身善行不加於幽顯者太上以其有志太極以其推誠限盡而終魂神受福者得為善爽之鬼地司不制鬼錄不書逍遙福鄉逸樂遂志年充數足得為鬼仙然後昇陰景之中居王者之秩積功累德亦入仙階矣如此則善不徒施仙固可學功無巨細行無洪纖在立功而不休為善而不倦也修習之士得不勗哉又一陰一陽道之妙用裁成品物孕育㣥形生生不停新新相續是以天覆地載清濁同其功日照月臨晝夜齊其用假彼二象成我三才故木公主於震方金母尊於兌澤男真女仙之位所治昭然觀夫誥籍之中圖傳所述混同載錄未有解張今按上清七部之經存注修行之事日月五星之內空常飛步之篇元父元母以兼行陽號陰號而具著纂彼眾說集為一家女仙以金母為尊金母以墉城為治編紀古今女仙得道事實自為墉城集仙錄上經曰男子得道位極於真君女子得道位極於元君此傳以金母為主元君次之凡十卷矣廣成先生杜光庭撰怪力亂神雖聖人不語經誥史冊往往有之前達作者述異記博物志異聞集皆其流也至於六經圖緯河洛之書別著陰陽神變之事吉凶眹兆之符隨二氣而生應五行而出雖景星甘露合璧連珠嘉麥嘉禾珍禽珍獸神芝靈液卿雲醴泉異類為人人為異類皆數至而出不得不生數訖而化不得不沒亦由田鼠為鴽野雞為蜃雀化為蛤鷹化為鳩星精降而為賢臣嶽靈升而為良輔今古所載其徒實繁又若晉石莘神憑人幻物鳥血魚火為災為異有之乍驚於聞聽驗之乃關於數歷大區之內無日無之聊因暇辰偶為集錄或徵於聞見或採諸方冊庶好事者無忘於披繹焉命曰錄異記臣光庭謹敘乾坤既闢清濁肇分融為江河結為山嶽或上配辰宿或下藏洞天皆大聖上真主宰其事則有靈宮祕府玉宇金臺或結氣所成凝雲虛構或瑤池翠沼流注於四隅或珠樹瓊林扶疎於其上神鳳飛虬之所產天驎澤馬之所棲或日馭所經或星躔所屬含藏風雨蘊蓄雲雷為天地之關樞為陰陽之機軸乍標華於海上或迴竦於天中或弱水之所縈或洪濤之所隔或日景所不照人迹所不及皆真經祕冊敘而載焉太史公云大荒之內名山五千其間五嶽作鎮十山為佐又龜山玉經云大天之內有洞天三十六別有日月星辰靈仙宮闕主御罪福典錄死生有高真所居仙王所理又有海外五嶽三島十洲三十六精廬七十二福地二十四化四鎮諸山今總一卷用傳好事之士其有宮城處所得道姓名洞府主張仙曹品秩事條繁廣不可備書聊紀所管郡縣及仙壇宮觀大數而已天復辛酉八月四日癸未華頂羽人杜光庭於成都玉局編錄讚詠之作始於天地之初三景既分五行生化於是五行三景之氣流行太無之中感激凝結浮於太空之內氤氳交錯而成文字非霧非氣非烟非雲號曰天章亦名天書輪囷不散垂芒耀彩煥乎虛空之間蓋三景之精英五行之華秀也太上大道君命天真皇人依形模寫迴環曲折謂之天篆亦名真文以五氣所凝者為五帝之篇以八會所成者為八天之篆其文在空中為天風飄泛自然生八會之音聞之者神襟明暢飄然有飛躍騰淩之意聽之則神和於內氣逸於外可以致道可以延齡所圖寫之文自諧音韻勾度高妙出人意表今所存靈寶赤書大梵隱語上清大洞三十九章三皇內文洞神大字九鳳篆蓬萊龍書及三洞寶籙金符玉章皆本文也故能保制劫運召役鬼神招真集靈通神達妙無所不能萬魔覩之以摧伏百神仰之以朝宗謂之信符乃天地神明之信也其成音曲章句者即上清歌詠之曲六甲靈飛之章靈寶步虛之篇玉檢龜山之頌或高聖之述或上真所裁或指修真之門或敘長生之訣或敷揚靈奧或宣讚深冥或祕在上京或降於前古所以天真遊宴眾聖會朝陳鈞天廣樂奏靈章萬舞即其事也今九等齋法傳授軌儀始自初階至於畢籙隨品升降各有讚誦之篇散在諸經不可周覽依所傳品目合而序之醫門廣博脈理元微凡稱診脈之流多昧死生之理儻精心於指下必馳譽於寰中可療者圓散宜投難起者資財慎取免沈聲迹圖顯功能余幼訪明師徧尋奇士粗研精於奧義敢緘祕於卑懷謹傍難經畧依訣證乃成生死歌訣一門非敢矜於實學欲請示於後昆焉西晉之末中原亂離饑饉既臻瘟癘乃作金壇馬跡山道士王纂常以陰功濟物仁逮蠢類值時有毒瘴殞斃者多閭里凋荒死亡枕藉纂於靜室飛章告天三夕之中繼之以泣至第三夜有光如晝照耀庭中即有祥風景雲紛馥空際俄而異香天樂下集庭中介金執銳之士三十餘人羅列如有所候少頃之間珠幢寶旛霓旌絳節紅旗錦旆相對前迎白鶴交飛朱鳳齊舞又二青衣持花捧香又四侍玉女擎持玉案地舒錦席前立巨屏左右龍虎將軍侍衞官吏各二十餘人立屏兩畔如有備衞焉復有金甲將軍諸大神王等各數十人次龍虎二軍之外班列肅如也須臾笙簫駭空自西北而下五色奇光灼爍豔溢有一人執簡佩劍而前告纂曰太上道君至矣於是百寶大座自空而來即見道君乘五色飛龍蓮花之座去地丈餘有二真人二天師侍立焉纂遂拜手跼蹐迎奉道君曰子憫生民形於章奏刳心泣淚感動幽明地司列言吾得以鑒盼於子矣纂匍匐禮謝畢道君曰夫一陰一陽化育萬物稟五行為之用而五行互有相勝萬物各有盛衰代謝推遷間不容息是以生生不停氣氣相續億劫以來未始暫輟得以生者合於純陽昇天而為仙得以死者淪於至陰在地而為鬼鬼物之中自有優劣強弱剛柔善惡與世人無異也玉皇天尊慮鬼神之肆橫災害於人常命五帝三官檢制部御之律令刑章罔不明備然而季世之民澆偽者眾淳樸既散妖氣萌生不忠於君不孝於親違三綱五常之教自投死地繇是六天故氣魔鬼等與歷代敗軍死將聚結成黨戕害生民駕雨乘風因衰伺隙為種種病中傷甚多亦有不終天年罹於天枉昔在杜陽宮中出神呪經授真人唐平等使其流布以救於人世間無知愚俗見有王翦白起之名謂其虛誕此蓋從來將領者生為兵統死作鬼帥積功者遷為陰官殘暴者猶拘魔屬乘五行敗氣為札為瘥然陽威憚之神呪服之自當殄戢矣今以神呪化經復授於子按而行之以拯護萬民也即命侍童披九光之韞以經及三五大齋之訣授之於纂曰勉而行之陰功克充仙階可覬也言訖道君及侍衞眾真皆西北而舉遂按經品齋科行於江表生民康乂疫毒消弭自晉及今蒙其福者不可勝紀在乎蠲潔莊敬惟精惟勤明誠感通應猶響答若怠慢輕泄自速罪尢修奉之人慎遵斯戒又况此經浩博元皇之金口親宣其理淵深太上之微言密示若有冥心誦持真靈立感神兵騎吏應時而電埽姦妖猛馬天騶隨處而風消毒癘裨寶祚之延洪更超周卜祝聖年之遐永克廣堯齡車軌混於普天正朔覃於率土贊大道威神之德助國朝惠育之恩洪福元休浩浩無極道之為用也無言無為道之為體也有情有信無為則任物自化有信則應用隨機自化則冥乎至真隨機則彰乎立教經曰善者吾善之不善者吾亦善之德善此明太上渾其心而等觀赤子也書曰不獨親其親天下皆親不獨子其子天下皆子此明聖人體其道而慈育蒼生也惡不可肆善不可沮當賞罰以評之經曰人之不善何棄之有故立天子置三公此聖人教民捨惡從善也又曰為惡於明顯者人得而誅之為惡於幽闇者鬼得而誅之又曰為善者善氣至為惡者惡氣至此太上上垂懲勸之旨也書曰惟上帝不常作善降之百祥作不善降之百殃此聖人法道福善禍淫之戒也由是論之罪福報應猶響答影隨不差毫末豈獨道釋言其事哉抑儒術書之固亦久矣宣王之夢杜伯晉侯之夢大癘恭世子之非罪渾良夫之無辜化豕之報齊侯結草之酬魏氏良霄之殂駟帶鄭元之捽劉蘭直筆不遺良史攸載足可以為罪福之鑒戒善惡之準繩者也况積善有餘福積惡有餘殃幽則有鬼神明則有刑憲斯亦勸善懲惡至矣大道不宰太上好生固無責於芻狗而示其報應直以法宇像設有所主張真文靈科有所拱衞苟或侵侮必陷罪尢故歷代已來彰驗多矣成紀李齊之道門集驗記十卷始平蘇懷楚元門靈驗記十卷俱行於世今訪諸耆舊採之見聞作道教靈驗記凡二十卷庶廣慎微之旨以宏崇善之階直而不文聊記其事神州之內有名山五嶽列於五方山海經所謂五嶽各領名山三百六十凡一千八百有神仙洞室福地靈墟顯於仙經載於方志其山皆上應列宿傍係星官上帝俾正神所居以司善惡邦國祥沴咸所主焉亦猶太山為角宿之根咸池為方城之險嶓冢應於井絡魁首屬於井陘者也自方圓肇基融結定位眾山波屬以鎮一隅則蜀之山近江源者通謂之岷山連峯接岫千里不絕青城乃第一峯也按漢書及傳記言岷山之下沃野有蹲鴟焉靈寶經亦云地出美芋名曰蹲鴟闞駰十三郡記稱蜀郡西盡岷山華陽國志稱蜀郡北接岷山斯則青城峨眉為坤維之巨鎮也岷山導江但導其流非謂江源出於岷山矣福地記云青城山高三千六百丈周迴五千里有甘露芝草天池醴泉玉匱經云黃帝封為五嶽丈人乃嶽瀆之上司尊仙之崇秩一月之內㣥嶽再朝六時灑泉以代晷漏一名赤城山一名青城都一名天國山亦為第五大洞寶仙九室之天對之西北在岷山之南㣥峯掩映牙相連接靈仙所宅祥異甚多任豫益州記云崗巒巖㟧連亘千里上有仙都地理志云西徼之外江水所出天彭青城連峯下絕李膺記云入山七里至赤石城有羊馬臺三師壇上五里至瀑布水澗二百步有二石梯有一石笋高三丈過二石門絕崖數百丈下起常道觀高峯下有水六時灑落東北有二石室名龍宮可容百餘人從龍宮過至石室名龍橋又有一梯洞穴深淺莫知所極西北有石室宛然見存又有黃帝壇石天地上圓下方濶一丈二尺有十二角觀東有石日月各濶五尺厚一尺二寸相對柱上烏兔爍煒方圓磅礡可覩焉五嶽真形圖云洞天所在之處其下別有日月分精以照其中龍橋處二山相去二百餘步其峯危竦相對橋在峯首其橋中半漸漸促小可六寸長一丈五尺兩邊懸崖俯臨不測山傍有誓石天師張道陵與鬼兵為誓朱筆畫山青崖中絕今嶮斷石並丹色濶二十丈深六七丈望之赩然福地記曰青城山有赤石如鹿形今誓石多有如野獸之狀者又云天師居赤城崖舍中即今石室也觀北上十餘里有亭臺孤聳獨秀霞表名曰軒轅臺下望諸山如蟻垤焉連抱之樹有若薺也此臺非得仙之人不可居之觀前有靈燈齋日必見或五或三亦無定數常因元宗皇帝勅道士王仙卿就黃帝壇修醮其燈遍山僖宗皇帝幸蜀之年山中修靈寶道場周天大醮神燈千餘輝灼林表其山逸士高人多所憇息葛稚川神仙傳云仙人李阿朝遊成都市暮宿青城山宋大明中道士楊超遠秀才費元規亦居此山唐有逸士馮廓王仙柯於此修道皆有感降玉真公主肅宗之姑也築室丈人觀西嘗詣天下道門使蕭邈字元裕受三洞祕法籙遊謁五嶽寓止山中就拜靈峯於寶室洞前有仙雲五色元鶴翔舞焉此山前號青城城峰後名大面山其實一耳同體異名猶岱之天台亦謂之桐柏也東北臨皁水西南亘平川西枕黑溪北拒洄水洄水今在蕃界大面之頂去平地七十二里為茲山之主非常人所到靈禽異獸奇花仙草靡不有焉其上瓊樓仙室金闕玉堂得道之人造之乃見非凡俗所窺也有七十二小洞應七十二候有八洞應八節第一太乙洞第二九仙寶室洞第三娑羅洞第四高臺玉室洞第五麻姑洞第六寶園洞第七聖母洞亦名聖主洞第八都督洞亦應八卦以通八水其中五大洞上應五星之宮乃五行五常所化也瑤林寶樹金沙玉田水清而甘草靈而秀上清記云神仙王方平領仙士萬五千人以鎮茲山又云洪崖真人隱居其內昔封先生栖於栖北巖之上黃帝師焉請問三一之道先生曰吾聞天真皇人被太上勅近在峨眉達三一之源可師而問之也因以龍蹻經授黃帝黃帝受之能策雲龍以遊八極乃築臺其上拜甯君為五嶽丈人使川嶽百神清都受事乃入峨眉北巖受皇人三一之道周旋海嶽車轍存焉又有得道仙民遊散未受職者分居諸洞之中絕峯之頂烟雲常覆之每日晴霽才六七度四面山峯各有名字載於圖經矣真誥云大天之內有十大洞天中有日月伏根三辰之精光照洞中明並二景皆金城玉闕真仙所都青城即第五寶山九室之天也君居之黃帝乘飈車受龍蹻之道拜君為五嶽丈人司掌㣥嶽轍迹壇址於今尚存嶽神於絕巖之上六時灑水以代晷漏西極總真王君又領萬仙鎮茲洞府自然神燈照燭林壑值雨增焰因風散化其峭壁複崖矗如雉堞赩若飄霞謂之赤石城亦名為天國同體異稱蓋一山耳昔漢祚陵遲人鬼交雜鼓氛吹毒代殺生靈太上命正一真人三天張君自渠亭鶴鳴頓駕茲嶺行明威之法清滌林澤折衝萬里拔鬼城鬼市刻石為天地日月羊馬臺三師壇命魔幢以誓鬼神各司晝夜丹筆畫山青崖中斷筆跡在焉經圖攸載絕頂曰上清宮首冠諸峯秀出雲表傍有天池旱潦如一下曰接龍橋石梁懸架信靈仙之窟宅也常道觀頃為僧所奪開元十二年甲子特勅移歸山內舊所御碑存焉詔賜丈人真儀以祠宇為觀是日仙雲成葢甘泉泫空洎天寶西巡望山禱醮卿雲散郁靈蛇効祥中和辛丑嵗僖宗駐蹕成都封希夷嘉號驛騎降止龍吟澗中尋以靈應謺申齋薦神鐘自響仙炬遍山肉角金蛇具於壇上枯椶再茂六幹重生符瑞駢羅咸編青史景福元年壬子址峯之上石逆泉飛危殿巋然當流不壞自此一派隆冬弗衰注於中廚無煩汲引非造化至神孰能與於此也山中有丈人常道威儀洞天諸觀嵗祀綿遠頹毀者多前宰博陵崔正規渤海吳廷休並加繕飾將復舊基旋屬輦輅省方部邑供億不遑締葺漸至斁隳雖芝檢奔馳星車旁午十年之內無所增修癸丑嵗縣令南郡莫公廷乂奉勅常醮躬行奠禮閱其勝異痛此榛蕪不率私財不侵公用二年注意兩觀鼎新福地山祠各設其位刻石為像用圖永年觀其虹繚迴廊翬飛廣殿明綴烏兔色籠烟霞雲棟風牕金碧交映虬簷鴦溜丹翠相輝俱斥淫奢克全大壯復命賜紫大德張素卿圖九江五嶽之主十山四瀆之神妙極丹青彌加煥麗或周天展醮或黃籙開壇報國為時惟嚴與敬固可以會真靈而福邦國也又老君觀宸容暴露棟宇傾摧示懋厥功創為興置夫自然之化無為之風宏之者至人也勤之者上士也勤宏不怠惟公得之初相國司徒王公安撫副使張公僉以青城處二江上游為一川劇縣賦輿殷會水陸兼資非能政全才難膺慎擇飛上章奏而授於公既至則恤孤惸撫嫠弱懲奸宄戢豪強冤訟平逋竄服彰善癉惡徇公滅私期月而人稱公理亦猶卓茂在密仲由為蒲之化也剽燔之餘廨宇未立經始營創惟新其謀工以子來用以農隙曾不越月巨勣告周大厦森沈虛庭宏敞不踰制以僭上不媟卑以偪下非務矜後允執厥中亦猶叔孫一日必葺之志也縣臨大江嵗有水患漂泛昏墊常人苦之公遐眺波心揆諸水脈截為堰移江趣東數載之中無復浸溢亦猶金堤竹落之防也常年渠埭修必後時擁耒將耕尚俟培築公方冬授矩甫臘罷功元正大田潏流闕注家有積穀境無惰農亦猶任延墾田龔遂佩犢之勸也列邑租賦此縣居多菽麥炭竹之征糧帛芻薪之稅事無虛月納不曠旬每嵗所徵半為逋欠雖捶扑交至靡能濟之公嚴令其下始自局吏後及居人常限未終先期已畢禁束胥屬不入鄉閭里有謌民門絕喧鵲至於遐鄉遠部細戶貧民必設法代輸不施檟檚時相國師九隴摩壘逾年飛輓芻糧輪檝相望督發泉貨絡繹道途辦無後期動必成集亦猶公沙穆神明之政也闢荒招戶政務所先讞獄祥刑國章斯重公懷人以德決獄以情襁負胥來盡墾將蕪之地幽冤坐雪再生就戮之魂亦猶鄭渾誘民虞經審法也溫恭待士南北如歸謙敬下賓吐握不倦由是輕車高葢爭趨義風芰服鶉衣共奔仁惠亦猶鄭元之門孔融之席也夫功德者在道則功及幽明德兼覆育在儒則功捍大患德禦大災公修於道則如彼行於政則如此功德盛矣廣矣加以廉潔明達立事立功瑞麥兩歧則抑而不顧嘉禾盈畝則蔽而不言方之於今罕侔全德必俟回翔雲路步武明庭下福烝黎上贊昌運豈止銀章朱紱百里一同而已哉光庭早熟馨芳初窺崇葺輒書事實非敢諛詞乾寧二年乙卯九月二十日癸酉杜光庭記
