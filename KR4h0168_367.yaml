front:
  text: 全唐文欽定全唐文卷三百六十七賈至二
  hash: sha256:843e470ce8bc9df6c59fc814b806046f5e9f514d68d642ea32e752ab6148a6f9
body:
  text: 門下權判文部郎中崔器閑邪存誠公而不黨有欒枝貞慎抱史輶正直歷踐清列名與實偕今豺狼未寧中外多故㣥才雜用則哲惟將肅其準繩舉其憲則俾不仁者遠邪佞以悛爾其留心宜專糾正可守御史中丞餘如故勅朝議郎行監察御史敬昭道等見素為質懷清守道學以潤身文能比事自乘驄曉謁縶隼秋飛或出稟王綸或入持天憲傅使者之命往則有功按罪人之贓居而不撓因其績用採以聲華宜叶歲遷允符時議可依前件門下監察御史第五琦南海長史楚璆等吏才貞固公心諒直可佐軍師歷試艱難必聞其政南越留務西憲準繩是擇髦傑用康厥任俾膺寵命欽乃攸司第五琦可殿中侍御史楚璆可守南海長史兼衛尉少卿餘如故勅京兆府長史高岑修詞立誠好古博雅策名早從於吏道當劇亟聞其政聲人而多艱脫豺狼之肆虐士也有節逃戎寇之逆命貞心峻操無忝前修宜超柱史之列用激忠臣之志岑可行殿中侍御史勅大理司直盧虛舟閑邪存誠遯世頤養持操有清廉之譽在公推幹蠱之才大理評事權臯臨難思義守死善道見危必履其臣節在困能變於人謀憲簡繩違紀綱斯屬宜擇髦士俾肅周行虛舟可殿中侍御史臯可監察御史勅汾州司馬董晉恪慎勵精詳於吏事飲冰將命克有成績準繩之地舉直任能俾彰善於使車宜即真於憲簡可殿中侍御史門下前宏農太守李煜體正心和操端行潔或政能茂異所涖必聞或忠孝兼全避權勤讓咸推公議多負卿才官惟其人用必有適宜欽爾職以弻予教可守宗正卿門下守衛尉少卿充朔方經畧副使吳仲孺心溫而直識敏而和習韜鈐之祕旨知孫吳之大畧久副戎幕克濟謨猷伊茂勳之可嘉俾寵光而宜及昇其階序列在正卿可中大夫試光祿卿勅左金吾衛大將軍馬承進能以勇幹久於戎旅勳勤克著獎命宜加俾列九卿仍參八命可特進試衛尉卿勅前太子洗馬向昌鑾三品子昌釬等代業忠貞死於王事能遵先志常著貞誠稽彼典謨賞延於代俾超秩次是用旌善昌鑾可試衛尉卿昌釬可通事舍人勅前左金吾衛大將軍員外置同正員敬令琬陳力戎事忠勇有謨入九軍之副獻七戰之獲嘉其誠節錄乃茂功俾列卿士是司馬政可太僕卿員外置同正員充朔方經畧副使勅金吾大將軍許誡言心和志堅訥言敏行被服禮義嗣圭組之資策名委質試文武之任課績斯著公勤無斁警其晝夜顧乃執金之勞象其河海寵以列棘之位可檢校太僕卿門下守廣陵長史李成式貞白儉約履歷清貫前鳳翔太守薛景仙忠義慷慨憤激危時靖鎮藩條咸有成績遞遷中外宜登卿士成式可試大理卿景仙可少府監勅左驍衛將軍李光進行已莊肅臨戎果斷有卞莊之勇懷孟明之材屢獻奇功益聞幹畧克副難兄之業能摧強寇之鋒允武允文宜加美秩光進可鴻臚卿同正門下堂姪守太子家令開國男椿恭儉溫良宗枝擢秀敏於從政勤以在公宜換儲闈之職俾居亞卿之任可守光祿少卿同正封賜如故勅始安充經畧使張光奇忠肅周敏懷其利用歷試中外累有能名嶺嶠地遐方隅寄重威懷之政惟爾悉舉宜參榮於卿士俾兼鎮於藩條可兼光祿少卿勳封如故勅百里之長九卿之亞參於軍事職比廷評必舉才能以匡庶政荊南奏事官守太子僕同正向萼等咸膺推擢俾在茲任可守光祿少卿同正勅國備其官則庶務理官得其人則善政舉廷尉所以執刑柄御史所以糾不法掖垣崇諫諍之職郎署當草奏之煩皆朕注心柬求髦士守保定太守崔器諒直忠肅才行周敏登於清列庶績其凝可守大理少卿勅蜀郡司馬裴藏之等果行育德忠肅溫良或持憲握蘭譽流臺省或分憂共理政洽藩條咸在清貫備聞茂績寇難初息庶尹擇才宜任能於雋選俾分職於中外可守司農少卿門下宮相之位亞卿之職朝廷所精擇必惟其人守西河太守蕭晉陽城太守嚴向等歷踐中外皆聞政理涉於艱難尤著誠節宜司長府之劇式備儲闈之選晉可守太府少卿向可太子左庶子門下圖書之府掌天人之際禮義之柄繫風化之元為官擇人必舉髦士行禮部侍郎蕭昕文質彬彬學於舊史行給事中韓液恭儉莊敬藏器於身咸有令名昇降朝列正我墳典懋乃直清昕可守祕書監液可守太常少卿門下守司農少卿高忠良植質溫恭持操端慤每恪慎於公道尤精詳於吏事刃有餘地人無間言亞我九卿既聞條理典斯六尚允謂僉諧可守殿中少監門下壽王府司馬王震立志恒新在公惟恪雍容散地未愜其才亮采百工宜欽乃職可將作少匠主者施行勅衛尉少卿嗣道王鍊簡約忠諒即直而溫鎮守南服黎人用乂且三峽艱阻四方多虞按撫緝熙宜分權總俾爾攬轡固茲磐石可充雲安夷陵南浦南平巴東等五郡節度採訪處置防禦等使勅京師初復宮室始清可擇宗臣俾之居守銀青光祿大夫守太子少保嗣虢王巨惠和忠諒貞幹含宏嘗處節度之權更居師傅之任嘉猷允塞茂績居多可以固我維城殿茲邦國可權充西京留守餘如故勅襄陽太守韓洪左補闕韓紘等令德之後象賢而立克光前業不墜家聲或謀府沖深才膺鎮禦或文律典麗詞叶絲綸今寇虐未清邦家多事用武之地宜徵奇傑掌翰之職故擇英髦洪可山南東道防禦使紘可考功員外郎知制誥門下永王傅竇紹侍御史崔伯陽等強學立名檢身從政實有忠貞之操仍兼鎮禦之才荊州上遊襄陽衝要北據漢沔利盡南海連綴吳蜀非才勿居永思諸葛之謀佇振祖生之任紹可江陵防禦使伯陽可襄陽防禦使餘並如故勅前蜀郡長史李廣璨閑邪存誠貞固幹事或因旁累往從遷謫凶逆未翦江介多虞式遏寇戎是仗才傑建康巨鎮長洲右苑使臣之選咸曰其難勗乃謀猷佐斯旄鉞可守丹陽太守勅成允成功者才也確乎不拔者節也惟才與節可以戡禍亂定邦家南陽太守魯炅忠肅懿文仁而能武歷危難之際見貞固之誠自翰守南陽載罹寒暑城孤師寡負戶以汲虜不得進江漢賴寧古之忠賢無以加也夫功崇者則授以高位才大者必委之厚權漢水方城國之要害宜加亞相之任兼收禦眾之功可依前件勅荊吳之交撫之以連率貢賦所入董之以使臣非通才多可曷稱斯任守職方員外郎元載識度明允幹能貞固懷龍泉之利器抱鴻羽之榮姿彌綸典章能練南宮故事精詳政理嘗聞五府交辟豫章雄鎮襟帶江湖干戈始寧安人是切俾爾藩守緝熙厥政可豫章太守勅憲部侍郎房琯清識雅量工文茂學秉忠義之規靡憚艱險挺松筠之操寧移歲寒宜承賜劍之榮式允濟川之望可文部尚書同中書門下平章事制昔伊尹與湯合傅說與高宗合尚父與周合故哲后良臣莫不至合非賢不乂有開必先久大之業也公上畧宏才惇信明誼受我旄鉞輯寧區夏典器銘勳高視前古實邦家之傑豈獨為予社稷之衛可獨弻子節制咨謀安危斯屬懼朕之不稱也往欽哉司空子儀可兵馬副元帥主者施行勅逆虜未平師旅淹歲軍用匱乏常賦莫充所以稅畝於荊吳校練於淮海從權救弊蓋非獲已夫法明則吏不欺斂均則人不怨輯事無擾繫乎使臣度支員外郎鄭叔清貞固幹事節用愛人考績視成所錯斯枉宜以本官兼侍御史充江淮東西及淮南道宣慰使勅厄運者天地之時也理亂者人君之政也是以軒轅不能止蚩尤之患帝舜不能無有苗之征蓋在於人君修德刑以除之也頃者羯賊開釁亂常干紀誘脅戎卒竊弄邊兵九有之人罹其凶害當戰爭之地則肌骨多斃於鋒鏑在遐僻之方則杼軸其空於征賦離鄉去邑棄業拋家契濶凍餒飄颻畏逼朕每永念心折涕零是用嚴奉睿謨恭行天討躬被甲冑大率戎夷掃清中原誅斬蛇豕豈朕薄德能建功業蓋人心竭節於本朝而戮力於寇難也所以給其優復減其賦稅省其聚斂息其征徭賑其匱乏宥其罪戾實其倉廩捨其逋懸養其傷痍賵其死事將使萬姓永登仁壽猶慮撫字尚闕疾苦未除於是分遣使臣親訪閭里夫人君高居大位非可以目徧四海耳周八極必仗賢能以廣其視聽而今使臣咸未稱職多僶俛經畧未盡至公致令遠人冤不上達而獘不下去今擇朝端忠貞仁惠之士飲冰乘驛巡撫四方其有政教煩苛勅令不便妨於耕稼害於蠶桑徵斂於人無踰小大咨爾兆庶必聞於使又有官吏邪虐豪猾侵漁擾於黎甿冒於貨賄上無隱也當悉懲之朕方以萬姓心為心蒼生壽為壽不欲獨賢自聖而為理捨暴惠姦而墮人率土之濱宜知朕意自寇戎猾夏干戈不戢涉三載矣而忠臣義士死王事者何可勝言茲朕痛悼於厥心若挾瘡痏是用枕戈寢冑親惣六師恃神祇之直憑宗廟之靈亦冀剋清載造京邑近者諸軍告捷屢摧賊眾天意人事若將叶符而戰士陣亡多委溝壑已令收瘞猶慮或遺撫存哀歿朕之所切宜令節度使與郡縣長官計會悉收骸骨埋塟致祭仍勘責姓名續行奏聞將裦贈其官爵優恤其妻子仍仰本道使者郡縣勿差科其家庶乎幽明慰懷知王師之不得已也惟天寶十五載歲次景申七月戊子朔皇帝若曰咨爾漢中王瑀暨御史中丞魏仲犀王室多難凶逆未誅是用建爾子姓以為藩屏命爾忠良以攝傅相安危繫是舉可不慎歟夫王侯之體則以任能從諫為本親賢仗信為則好問樂善為心安仁容眾為節然後能建其功業夾輔王室是以漢之宗王多委政守相故能享祚長久令聞不已朕聞汝瑀能寬大儉約樂善好賢敦悅詩書動必由正而久於高簡未習政途又聞仲犀才幹振舉憂勤庶績必能固爾磐石匡補闕漏軍旅之事必委其專訟獄之煩必與其決簡賢任能必使其舉懲惡勸善必任其斷惟協惟睦其政乃成同德合義何往不濟於戲瑀其鎮撫黎人莊肅守位仲犀其悉心戮力贊我維城則瑀有任賢之名犀有忠勤之績匡復社稷戡定寇讐在此行也勗哉其無替朕命維天寶十五載歲次景申八月癸未朔十八日已亥皇帝若曰咨爾元子某惟天為大惟人君則之順乃德故舜禹揖讓而履皇極咈乃道故丹朱商均不能保鴻業是以啟有惠迪而夏嗣焉隋有亂紀而唐受焉五聖之御極皆以勤儉兢業日慎一日故能享祚長久垂慶無窮洎予六葉恭位四紀厭於勤倦緬慕汾陽當保靜怡神思我烈祖元元之道是用命爾元子某當位嗣統於戲爾有忠孝之誠極於君父爾有友愛之義信於兄弟爾有仁恕之行通於神明爾有戡難之才彰於兆庶予懋乃懿績嘉乃神武天之歷數在爾躬汝惟推誠禍亂將冀爾永清汝惟從諫宗社將冀爾復寧佞言惟疵直言惟師任賢勿貳去邪勿疑民非后孰治后非賢罔與守邦欽哉慎乃有位無忝我祖宗之丕烈矣維至德二年歲次丁酉十一月某日皇帝若曰夫定禍亂者曰武建功名者曰義惟武與義是謂明德回紇毗伽可汗生而英姿邁越前古代濟威赫主祀北天與唐唇齒奕葉姻好安祿山竊弄邊兵暴亂函夏誘脅戎卒毒蠧黎人而可汗感激義動天地爰命葉護統率銳帥叶贊官軍驅除凶逆或掎其足或角其首一旬之內雍洛掃清振古以來義莫斯大朕是用式遵典禮封崇徽號敬冊可汗為英武威遠可汗每載賞絹五萬匹於戲陰陽和而天地泰四時和而萬物阜北土不靖有唐封而固之中原多故可汗義而赴之惠好和洽與日月永子孫百代克享鴻休欽哉其無替朕命臣某言伏奉某月日制除臣汝州刺史捧荷恩私違離軒陛專城之寄則厚魏闕之心斯切即以今月至州上訖臣某誠惶誠恐頓首頓首臣遭遇艱難謬忝近侍扈巡巴蜀朝覲朔方崎嶇三年恒伏輿軫而才微智淺內不能申奇謀異畫外不能預武毅崇勳掌翰承榮日以為愧屬陛下神武戡難再搆乾坤動植生靈濟於塗炭臣以庸劣績用無聞生覩中興以為殊幸官登列守彌覺叨榮汝墳之人久罹殘賊閭閻凋弊萑蒲未靜闡陛下慈恤之旨承陛下雷霆之威緝理疲人畏懷亡命均其賦役勉其農桑庶憑睿謀迄可厎定敢勵鉛刀之割終於犬馬之戀不任慺慺之至謹奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言臣某言伏見宰臣奉宣聖旨將軍王去榮擅打殺富平縣令杜徽其罪將合寘殊死緣新收陝郡防遏要人特宜免死削除在身官爵白身配陝郡展効者臣等既忝職司主在行下伏以聖人誅暴亂定王業必先明法令崇禮義於是百姓戮力賢愚悅隨是以漢祖之始入關約法三章殺人者死不易其則然後能戡定秦項而帝天下今陛下將欲清雲雨之屯掃欃槍之寇不自約其法恐異漢祖向時之事將何以成功業哉謹按王去榮是富平縣百姓朔方偏裨無專殺之權有犯上之逆且擁數千之眾不能整齊行列外攻強寇翻乃無狀挾怨內殺縣尹易曰臣弒其君子弒其父非一朝一夕之故其所由來者漸矣若縱去榮可謂生漸矣臣聞去榮善放拋石能守城邑曩者陝郡初復非其人不可守之李光弻太原程千里上黨許兼靈昌魯炅南陽賈賁雍邱張巡睢陽無去榮拋石之能未聞賊能下之也其糧不足者自拔矣何獨陝郡非去榮不可哉陛下若以拋石一能所犯上者復何止之若曰且貸去榮而誅將來之犯者則是法令不一而招罪人也今惜一去榮之才而殺十倍去榮之才者不亦其傷益多乎夫去榮亂逆之人也焉有逆於此順於彼亂富平而治於陝郡悖於縣尹而不悖於君乎况今之律令太宗之律令也陛下不可惜小才而廢祖宗之法也伏惟明主棄瑣瑣之能全其遠者大者則禍亂不日而定師旅因茲整齊矣天下幸甚臣等不勝云云臣見素言伏奉某月日制書封臣豳國公食邑五百戶仍特加金紫光祿大夫兼與一子五品臣次男諤又特授五品官者臣才術寡薄操行無取幸因資序謬陟台衡不能燮理和氣裨補德化致使四凶搆慝天下震驚鑾輿南巡函谷失守語曰焉用彼相易曰負且乘致寇至由此言之臣雖殺身不足補過且臣值祿山干紀不能制其命臣與國忠同儕不能正其惡尸忝厚祿竊位多時一昨扈從之初不即死者蓋以翠華歷險牧圉無扞駑馬思効且伏轅輿候至蜀城自拘司敗豈謂渙汗大布網豁江河茅土猥加恩迴日月當今天下未定忠義驅馳封賞之行不宜踰濫借如翼從行李操執鞭轡臣子職分何名為功以此受封不可以訓貪榮冒寵非臣所圖伏願俯垂矜憫捨此階爵不使臣父子得罪於公議見嗤於有識微臣幸甚不任懇迫之至
