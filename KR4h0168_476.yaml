front:
  text: 全唐文欽定全唐文卷四百七十六行儉建中時人
  hash: sha256:09d63aac5ebc41209de49f6e20d66207b78d87ba579b113783b7fcd6636d496d
  markers:
  - {type: head, offset: 14, content: 韋行儉, id: KR4h0168_NFKB_476-h1, level: 1}
body:
  text: 太室為九州之險五嶽之冠孕靈生賢作鎮地中自漢武聞萬歲之呼令祠官加增其祠厥後元魏徙廟于嶽之東南開元十八年元宗徵元封故事再飾祠宇天寶初又命秩視王禮封為中天王編在祀典每歲六月天子遣河南尹至嶽下潔齋具牲牷圭幣以行事祝史執籩豆樽俎以陳辭望秩之祭以崇配天之敬歲無違者而年祀穴㓎久其土偶木偶及東序西序南嚮北嚮圖形象者皆風落之日暄之雨濡之塵敗之或墉垣缺陊彩繢漫滅不怒之威蓋闕如也漢南元戎滎陽鄭公由滎陽守而尹洛邑用端密溫文宣明教化為導人之道聆其積弊俾革其故自中天王洎夫人纓緌冕服首飾步搖間以金翠彰用五色旁羅四嶽四瀆施於啓母少姨之倫其餘交乎戶室立于階闥操大屈注僕姑執殳秉鉞環列廡下由四墉周于壖垣過祠及門瞻其容衛者首如鎮目如瞚臂如戟吻如相稽擎巳心屏息若交門之有鄉坐拜者焉夫古之牧人事神必交修之人仰神之正直神依人之明德以享豐福以荷百祿真為政之本也前代五嶽視三公皇家之制寵逾五等今徵鄭公崇飾肅祗之旨蓋所以奉國典尊君命也庚申歲行儉作吏承命蕆事宮庭因欵識於石播美厥後云損字至無博陵人大歷末進士中博學宏詞科授祕書省校書郎纍擢右諫議大夫貞元十二年以本官同中書門下平章事賜金紫轉門下侍郎十九年卒贈太子太傅諡曰靖大饗之禮明水攸先其水也所以本太古之淳朴其明也所以享至敬之昭宣從朗月之潛化應陰燧而通元暗度晴空泛銀河而色靜曉臨清廟浮玉露而光鮮既潤下以功博亦就濕而義全冥兆朕於至理契幽微於自然加五齊而致獻首三酒而告虔觀其象在乎天德包乎坎類影響之相召協陰陽之應感其禮斯節其色斯潔不假縮於包茅復何施於麴蘖將汙樽而並用與越席而齊列或異乎勿幕有孚豈比夫不食而泄皛皛熒熒清清泠泠明德惟馨神人是聽從無味而有味自無形而有形深源莫測實資造化濯桂影於遙天洗蟾光於永夜懿夫昭潔著贊溉賞常蒸宜玉斚之見貯匪金盤之見承若乃鼎俎備設嘉羞衆夥苾苾芬芬名之莫可尚其本也知享獻而靡他貴其新也諒斟酌而在我於維巨唐穆穆皇皇崇初祀異蒸嘗元酒乃薦至誠允臧天降其福地出則祥醴泉洋洋明水是將徹慶雲之色映瑞日之光㣥臣作頌歌孝治之無疆杲杲兮日景于彼朝陽萋萋兮桐葉于彼高岡來儀者鳳允叶禎祥瑞四靈之嘉號煥五彩之文章既和其音爰翥其翼淒唳響暢徘徊綢直旁應元律調十二管於四時上陵紫煙擊九萬里而一息非丹穴勿處非蒼竹不食小鵬起於扶搖卑鸞棲乎枳棘若夫雞冠燕頷心遠貌間雖衆禽之纍百諒比德而難攀故其發聲也瞻白日以俯仰其餘響也順清風而往還浮泛泛以出谷靜泠泠而滿山既飄颻於有際遂遼敻於無間故曰鱗之有龍鳥之有鳳偶時而見如哲士之間生取類而言同君子之異衆若乃拂杳冥而直上臨峻極而孤鳴虛籟相和陰深以䆗窱霏煙動色紛郁而隨迎六合為之澄朗八風於是揚清川不波而昭其德地不翳而感其聲足使俗登仁壽化洽休平且夫朝陽者象明時之有漸鳳鳴者匹賢人之惟信鳳集朝陽以輕舉賢遇明時而易進整羽翮以回翔望青雲以奮振有若秉節操而貞白垂竹替纓而敬慎鳳兮鳳兮何德之威鏘鏘于飛應有道而歲貢敻無文而代希飲必玉池之津遊必神仙之府矯翮則㣥族咸從和樂而百獸率舞巢阿閣以應昌期棲丹闕而壯天宇載圖牒以傳記必表靈於聖主包衆美以流芳固難得而覼縷聖人推有功擇賢佐武義舉湛恩播所謂君良臣忠上唱下和鬼方難制敢稱亂以蕩搖遐夷恃險不恭命而朝賀然後興以戈矛伐其怠惰自彼曲而我直必義勇而遙破有若霸由一戰晉文伐國以定功師興七旬有苗崩角而自挫然後成大禮廣庶績乃公乃侯左賢右戚一人有慶必偃武修文四海無虞乃銷鋒鑄鏑宰夫供其牢醴樂人陳其戛擊英英之士爵勞先以伐謀仡仡勇夫寵命嘉其勦敵惟我后貫三古之睿哲繼百王之絶紐用伊呂則舉無遺策扶衛霍則功稱不朽每懷遠以賞功因勞軍而獻壽坐朝飲至同魯史之策勳在泮獻馘恥漢家之斬首遠方安而猶慎多壘靜而不有及夫殊勳既答王澤斯崇勞還師以杕杜賜侯伯以彤弓勇爵勸能懦夫增氣於無敵拔卒為將武臣誓心於有功然後寰海遠闢天下大同教化無外昭明有融覩班師之盛禮莫不勵志而飭躬粵若聖唐之御極也寰宇克清鴻業再創纘功臣之烈紀重閣之上圖照日而增明閣凌煙而益壯勳庸自表威儀可望昭昭兮藻繪之容灼灼兮丹青之狀遠而視疑列仙之臺逼而察識公侯之相縹眇兮映空色而遙徹咫尺兮近天顏而內向稽其義知聖君之膺時覩其象知忠臣以應期叶雲龍之潛會合魚水之相資覽炎漢之前規寧或比矣徵大魏之往制何可尚之懿夫容彩彰施氣肅端儼風存正直色形恭儉若進忠以欲諫如率禮而有檢處其高也方取貴於功高居其險也固非同於履險則知君策勳兮旌於賢臣在圖兮參於前名位雍雍就丹楹而成列衣冠楚楚煥藻井而相鮮美繪迥超於雲閣崇勳豈比夫燕然是以皇心斯遠聖慮惟遐謀猷是念貞忠是嘉不然者豈徒飾藻繪之功悅輝煥之像對重欒之宏麗玩峻宇之宏敞而已也所以作其炯誡激乎勸賞有以讚丕績之奕休有以念前勳而存想徒觀乎岧亭天半巃嵸雲中容止有作光芒有融廓宇宙而翼聖配丹青而紀功藹城闕之佳氣被君王之德風仰之彌高星辰正拱於紫極望之不及謂申甫將降於維嵩豈不遇聖明之主建公忠之節石有時而泐水有時而竭茲閣也不騫不崩表功臣之盛烈至哉土德光含五色其色也辨五方以建侯其德也發萬物以生植自夏禹而作貢在徐方而自職王者立社以封疆諸侯苴茅而有國於赫巨唐德之皇皇實乘土而化康采大漢強幹之宜裂地以爵法有周維城之制分土而王各班其位各正其方用甲日而靡忒建陰氣而允臧定五方而式序分五色而有章平野煙消發卿雲之瑞彩高天雨霽浮麗日之重光衆色環封所以示外共其方職正色居上所以表內附於中黃觀其儀則知大君之有弼稽其旨則知邦伯之有秩列三才則惟數在五參十端則惟德居一既明既麗可以比乎天文不騫不崩所以保乎陰隲配皇王之永久齊天地而終畢矧夫經邦理社必土是封光昭聖德叶贊時雍將尊天以親地在侯土與國社既蕃翰乎四海實砥寧乎天下若然者君立社以布政臣受土而宣威象君臣之同理知社土之相依是以成百王之則作萬邦之憲圭璋玉帛莫不因我而執公侯伯子莫不因我而建土之德也斯美社之義也奚擬其色也匪同五星而乍連乍散其質也各表一方而嶽立山峙有以崇國祚於我皇有以同磐石於宗子夫如是則其義廣矣豈斯文之所能盡紀倬垂象以昭回惟帝居之曰斗壯魁台以立極建衡杓而為首齊七政而均序五行臨四海而橫制九有所以附乾樞壓坤紐攜龍枕參左槍右棓總列宿而環衛中宮體㣥臣而輔弼元后範圍六合紀綱四維其道不昧其照無私若乃銅渾作式未央取則其變可考其動可測履端於始當獻歲以指南舉正於中在陰方而主北觀夫崢嶸纚聯若綴若懸冰散珠圓乍似拔長劒而倚天揭西柄以戒滿拱北辰而處偏乘三台而斡運齊七曜而回旋酌天地之心豈酒漿之可挹分寒暑之氣較鈞石而罔愆足廠田坴次靡失歷數斯在晝其隱也不爭曜於太陽昏必見焉寧藏暉於真宰照萬國兮猶魚從網宗百川兮比朝於海參差北斗闌干太清環帝座之焜耀薄河漢之縱橫不應豐以中見每居次而自明總五緯於天統行四時而歲成非止雄橋梁於巴蜀壯都邑於咸京而已於是萬人攸仰萬物取象實星之長炯乎太陽之精玉有真質冰則貞清我君子象諸溫如皎如正其色兮非真不克峻其節兮非貞不居爾其製盤盂訪結緑瞻白虹之氣詠生芻之束乃賦於他山攻此良玉剡之成器錯以成壺信以旁達忠不掩瑜以虛而受用當其無及乎嚴律閉陰氣升氛霧結河海凝沙驚雁塞雪滿崤陵於是天景初夕玉壺始冰臨象筵而孤映對金鏡而相澄爾其淋漓未泮溫潤而瑳纖光不隱毫末不過豈爾瑕之可匿玷之可磨不然珉之衆矣貴玉者何心之潔矣飲冰則那莊氏寓論宣父式談夜光奪魄明月懷慚豈比夫立概生操激清勵貪伊至人之比德同貞士之司南夫以物象所鑒精明所蓄霜華晨清月影寒宿故覽之者魂竦憑之者慮惕逮北風之已壯幸西陸之未覿客有撫而歎曰猗歟猗歟吾無是易且漏巵無當兮歎諸古大圭不瑑兮聞諸昔曷若茲器之可佳諒君子之宏益然後宣其烈贊其意抽毫命簡賦冰壺之盛事天地之氣嚴凝為霜候高秋於玉琯體正色於金方表肅殺而順時戒節協變化而開陰闔陽激清風而增厲淨皓月而浮光驚鴻雁之嗷嗷落蒹葭之蒼蒼所以從地而升應律而降詠團扇而見託班姬豈恨於長門履堅冰以是階袁安欲驚於陋巷達重陰而首出啓沍寒以先期陰與律而相感寒與氣而相資百工由是休矣萬物於焉成之原夫日次於氐月窮於戌當青女以紀候從白露以受質洞庭之葉驚波豐山之鐘應律詩人可比庶欲徹於玉壺大國是資亦將慙於凌室凌於地也似和光以同塵凋於木也類去華而取實其進也則有俟於清宵其退也則見晞於旭日若乃林有擊隼野有祭豺翻繽紛之稿葉宿莽蒼之枯荄烈女覩之而壯志羈人對此而感懷皚皚其姿皎皎其彩既無惡於菅蒯亦何情於蘭茝佐昊天之有成參神功而不宰笳聲乍拂怨楊柳之衰兮劒鍔可封發芙蓉之厲乃國家順乾坤之德法天地之制布澤如春肅物成歲申其令以敦乎風俗宣其威以殄厥災沴服用有度修典禮而罔差稻熟可羞先寢廟而攸祭名籍籍於憲府法稜稜於司寇却炎蒸而克敘四節淒金石而率舞百獸客有惜歲星之屢遷傷志業而未就獨沉吟於軒屏望泬寥於宇宙聞萬戶之輕砧聽九重之永漏近瞻庭樹空聞槭槭而有聲緬想澗松誰惜青青而獨秀夫如是則可知霜降之候目長空以流思偉繁霜之獨異雖變露而成形不憑雲以自致向朝陽而既滅逢夜晴而又墜候暖而止乘寒則飛當鷹隼之始擊值鴻鴈之初歸稜稜作氣凜凜生威比齊紈之顏色奪楚劒之光輝及其降池塘被原陸衰衆草落㣥木萎南澗之白蘋碎東籬之紫菊梧桐為之失影蕖荷為之銷馥豈直若斯而已徒美其威不妄作動隨物情因其死者而死保其生者而生雕芝蘭而無怨色拂松竹而不傷榮譬大聖行刑必順於時序通賢用法不害於堅貞至若蒲海之居桑河之汭侵戰士之馬蹄封將軍之狐毳沾翠幕而生冷凍朱旗而自脆助陰氛之肅殺壯堅冰之體勢三冬閨閣兮貯相思萬里江山兮苦留滯不私於已觸物而止疑薄霧之初覆似輕塵之未起陵厲自然嚴凝莫擬故能發揮司寇光揚御史明忠臣之無事承君子之所履仰參造化之理俯察宇宙之功既希微而不測亦要妙而無窮至如殷雷發谷激電流空石燕飛而迎雨銅烏振而驚風已而懸溜不止空庭積水對滂沱而歷覽見浮漚之邐迤瑩映澄徹內明外美倏往忽來乍滅乍起含卷舒之度得行藏之軌其柔也則隨波以為心其剛也乃觸物而忘已諒潛運之恍忽孰能察其終始浮漚之義大矣哉俯而觀之錯落煌煜若明珠之出合浦遠而望之的皪旁羅若衆星之列長河爾其因水發色以空成相懷清潤之秀氣負圓通之雅量信天澤以成姿豈人圖而為狀且夫勢有萬端形無定質或繁小而爭涌或希大而間出從下流而守謙託上善而非溢冀輝彩于當年故韜光于晴日天輔聖德配極而崇帝者祖兮神行慈旨布澤而洽人之父兮叶命高嶽喻壽其齊招靈祜兮飛文孤標灑翰又類使物覩兮騰雄激烈交天聲芬偃上古兮發潤飄清總此光氣覆下土兮探異閲妙意力猶懸空作短兮徵往到今辭聽相授無與伍兮維貞元十二年月日朝議郎右諫議大夫崔損大中大夫行給事中徐岱朝議郎給事中趙宗儒正議大夫守中書舍人高郢宣德郎守駕部員外郎知制誥權德輿起居郎韋丹起居舍人楊馮左補闕熊執易右補闕歸澄崔邠韋渠牟左拾遺李肇王中書右拾遺蔣武等謹以庶羞之奠敢昭告于門下平章事贈太子太傅成紀公之靈龍為輔臣虞闢四門殷宗審象説代豫言建中皇明崔為文貞嗣德同風俾公登庸運配我唐忠昭我皇君臣合契聖賢同方乃序五行乃調三光乃作舟楫乃作棟梁溫裕內淑矜嚴外莊暖若冬日肅如秋霜錯磨瑚璉黼藻文章鼎不耀彩蘭非振芳疏封慶遠輔族流長祖服既纂孫謀更昌迹如泥蟠勢漸雲翔繡衣持斧錦帳含香曾建隼旟廉察三湘亦倅龍節和柔北荒左曹駁正中臺紀綱績徹宸扆恩深廟堂東西掖垣左右輔弼獻納忠讜訐謨慎密嘉猷必告內言罔出清廟承天圓丘捧日宣子制典酇侯定律有倫有要惟精惟一功讎必舉愛犯斯黜保正懲邪損虛勵實儉能防侈恭能戒逸假寐寢門宣力王室鈞軸是秉樞機所發先平其心後宰於物赫赫天子萬方稟朔寄公鼎鼐授公帷幄方資燮贊更致淳朴從藉千畝侍巡五嶽福悲下壽忠惜永圖勃也厲疾倏焉夢殂皇心軫慟人望嗟呼賻贈恩篤裦崇禮殊騎吹咸京龜兆鼎城緱山舊隴太傅先塋其等相府僚屬禁闈分職敢辱陶冶愧生羽翼馬孛容誤龍鱗愛直孔雖不言辛亦有力徹帷啓殯執紼俟門奠薄單醪羞輕特豚悲實懷德忠何顧恩清風令範子子孫孫嗚呼哀哉伏惟尚饗既濟蘇州吳人楊炎為相薦其有良史才召拜左拾遺史館修撰炎得罪坐貶處州司戶參軍入為禮部員外郎卒伏以陛下今日之理患在官煩不患員少患在不問不患無人且中書門下兩省官自常侍諫議補闕拾遺總四十員及常參待制之官日有兩人皆備顧問亦不少矣中有二十一員尚闕人未充他司缺職纍倍其數陛下若謂見官非才不足與議則當選求能者以代其人若欲廣務聰明畢收淹滯則當擇其可者先補闕員則朝無曠官俸不徒費且夫置錢息利是有司權宜非陛下經理之法今官三十員皆給俸錢幹力及厨料什器建造廳宇約計一月不減百萬以他司息利準之當以錢二千萬為之本方獲百萬之利若均本配人當復除二百戶反覆計之所損滋甚當今關輔大病皆為百司息錢傷人破産積於府縣實思改革以正本源又臣嘗計天下財耗斁之大者唯二事焉最多者兵資次多者官俸其餘雜費十不當二事之一所以黎人重困軸杼猶空方期緝熙必藉裁減豈俾間官復為冗食藉舊而置猶可省也若之何加焉選舉之法三科曰德也才也勞也然安行徐言非德也麗藻方翰非才也纍資積考非勞也今乃以此求天下之士固未盡矣臣謂五品以上及㣥司長官宜令宰臣進敘吏部兵部得參議焉其六品以下或僚佐之屬許州府辟用其或選用非公則吏部兵部察而舉之加以譴黜則衆才咸得而官無不治矣今擇才於吏部而試職於州郡若才職不稱責於刺史則曰命官出於吏曹不敢廢也責於侍郎則曰量書判資考而授之不保其往也責於令史則曰按由歷出入而補之不知其他也若牧守自用則換一刺史則革矣況今諸道諸使自判官副將以下皆使自擇縱有情故十猶七全則辟吏之法已試於今但未及於州縣耳或曰按國家甲令凡貢舉人本求才德不選文詞故律曰諸貢舉人非其人者徒注云謂德行乖僻者也居州郡則廉使升聞在朝廷則以時黜陟用茲懲勸足為致理有司因循不修厥職寢以訛謬使其陵頽今但修舊令舉舊政則人服矣焉用改作答曰州郡濫孰與吏部多請較其優劣且州牧郡守古稱共理政能有美惡之迹法令有殿最之科分憂責成誰敢濫舉設如年多人怠法久弊生天網恢疏容其姦謬舉親舉舊有屬有情十分其人五極其濫猶有一半尚全公道如吏部者十無一焉請試言之凡在銓衡惟徵書判至於補授秪校官資善書判者何必吏能美資歷者寧妨貪戾假使官資盡愜刀筆皆精此為吏曹至公之選則補授之際官材匪詳或性善緝人下闕史氏之作本乎懲勸以正君臣以維邦家前端千古後法萬代使其生不敢差死不忘懼緯人倫而經世道為百王準的不止屬辭比事以日繫月而已故善惡之道在乎勸誡勸誡之柄存乎裦貶是以春秋之義尊卑輕重升降幾微髣佛雖一字二字必有微旨存焉況鴻名大統其可以貸乎伏以則天皇后初以聰明睿哲內輔時政厥功茂矣及宏道之際孝和以長君嗣位而太后以專制臨朝俄又廢帝或幽或徙既而握圖稱籙移運革名牝司燕啄之蹤難乎備述其後五王建策皇運復興議名之際得無降損必將義以親隱禮從國諱苟不及損當如其常安可橫絶彞典超居帝籍昔仲尼有言必也正名故夏殷二代為帝者三十世矣而周人通名之曰王吳楚越之君為王者百餘年而春秋書之為子蓋高下自乎彼而是非稽乎我過者抑之不及者援之不以弱減不為僭奪握中持平不振不傾使其求不可得而蓋不可掩斯古君子所以慎其名也夫則天體自坤順位居乾極以柔乘剛天紀倒張進以強有退非德讓今史臣追書當稱之太后不宜曰上孝和雖迫母后之命降居藩邸而體元繼代本吾君也史臣追書宜稱曰皇帝不宜曰廬陵王睿宗在景龍以前天命未集徒稟后制假臨大寶於倫非次於義無名史臣書之宜曰相王未宜曰帝若以得失既往遂而不舉則是非裦貶安所辨正載筆執簡謂之何哉則天廢國家歷數用周正朔廢國家太廟立周七廟鼎命革矣徽號易矣旗裳服色既已殊矣今安得以周氏年歷而列為唐書帝紀徵諸禮經是謂亂名且孝和繼天踐祚在太后之前而敘年製紀居太后之下方之躋僖是謂不智詳今考古並未為可或曰班馬良史也編述漢事立高后以續帝載豈有非之者乎答曰昔高后稱制因其曠嗣獨有分王諸呂負於漢約無遷鼎革命之甚況其時孝惠已歿孝文在下宮中二子非劉氏種不紀呂后將紀誰焉雖云其然議者猶為不可況遷鼎革命者乎或曰若天后不紀帝緒缺矣則二十二年行事何所繫乎曰孝和以始年登大位以季年復舊業雖尊名中奪而天命未改足以首事足以表年何所拘閡列為二紀昔魯昭之出也春秋歲書其居曰公在乾侯且君在雖失位不敢廢也今請併天后紀合孝和紀每於歲首必書孝和所在以統之書曰某年春正月皇帝在房陵太后行某事改某制云云則紀稱孝和而事述太后俾名不失正而禮不違常名禮兩得人無間矣其姓氏名諱入宮之由歷位之資才藝智略年辰崩葬別纂録入皇后傳列於廢后王庶人之下題其篇曰則天順聖武皇后云開元以後四海晏清無賢不肖恥不以文章達其應詔而舉者多則二千人少猶不減千人所收才百一禮部員外郎沈既濟論曰初國家自顯慶以來高宗聖躬多不康而武太后任事參決大政與天子並太后頗涉文史好雕蟲之藝永隆中始以文章選士及永淳之後太后君天下二十餘年當時公卿百辟無不以文章因循遐久浸以成風以至開元天寶之中上承高祖太宗之遺烈下繼四聖理平之化賢人在朝良將在邊家給戶足人無苦窳四夷來同海內晏然雖有宏猷上略無所措奇謀雄武無所奮百餘年間生育長養不知金鼓之聲烽燧之光以至於老故太平君子唯門調戶選徵文射策以取祿位此行已立身之美者也父教其子兄教其弟無所易業大者登臺閣小者任郡縣資身奉家各得其足五尺童子恥不言文墨焉是以進士為士林華選四方觀聽希其風采每歲得第之人不浹辰而周聞天下故忠賢雋彥韜才育行者咸出於是而桀姦無良者或有焉故是非相陵毀稱相騰或扇結鈎黨私為盟歃以取科第而聲名動天下或鈎托隱慝嘲為篇詠以列於道路迭相談訾無所不至焉計近代以來爵祿失之者久矣其失非他在四太而已何者入仕之門太多代胄之家太優祿利之資太厚督責之令太薄請徵古制以明之管子曰夫利出一孔者其國無敵出二孔者其兵不詘出三孔者不可以舉兵出四孔者其國必亡先王知其然故塞人之養隘其利途使人無遊事而一其業也而近代以來祿利所出數十百孔故人多歧心疏瀉漏失而不可轄也夫入仕者多則農工益少農工少則物不足物不足則國貧是以言入仕之門太多禮曰天子之元子士也天下無生而貴者則雖儲二之尊與士伍同故漢王良以大司徒位免歸蘭陵後光武巡幸始復其子孫邑中徭役丞相之子不得蠲戶課而近代以來九品之家皆不征其高蔭子弟重承恩獎皆端居役物坐食百姓其何以堪之是以言代胄之家太優先王制士所以理物也置祿所以代耕也農工商有經營作役之勞而士有勤人致理之憂雖風猷道義士伍為貴其苦樂利害與農工商等不甚相遠也後代之士乃撞鐘鼓樹臺榭以極其歡而農工鞭臀背役筋力以奉其養得仕者如升仙不仕者如沈泉歡娛憂苦若天地之相遠也夫上之奉養也厚則下之徵斂也重養厚則上覬其欲斂重則下無其聊故非類之人或沒死以趣上構姦以入官非唯求利亦以避害也是以言祿利之資太厚語曰陳力就列不能者止昔李膺周舉為刺史守令畏憚覩風投印綬者四十餘城夫豈不懷祿而安榮哉顧漢之法不可偷也自隋變選法則雖甚愚之人蠕蠕然第能乘一勞結一課獲入選敘則循資授職族行之官隨列拜揖藏俸積祿四周而罷因緣侵漁抑復有焉其罷之日必妻孥華楚僕馬肥腯而偃仰乎士林之間及限又選終而復始非為巨害至死不黜故里語謂人之為官若死然未有不了而倒還者為官如此易享祿如此厚上法如此下斂如此重則人孰不違其害以就其利者乎是以言督責之令太薄既濟以為當輕其祿利重其督責使不才之人雖虛座設位置印綬於旁揖而進授之不敢受其征徭安其田里使農商百工各樂其業雖以官誘之而莫肯易如此則規求之志不禁而息多士之門不扃而閉若上不急其令下不其徭而欲以法術遮列禁人姦冒此猶坯土以壅橫流也勢必不止夫古今選用之法九流常敘有三科而已曰德也才也勞也而今選曹皆不及焉何以言之且吏部之本存乎甲令雖曰度德居官量才授職計勞升秩其文具矣然考校之法皆在判書簿歷言詞俯仰之間侍郎非通神不可得而知之則安行徐言非德也麗藻芳翰非才也纍資積考非勞也苟執此不失猶乖得人況衆流茫茫耳目有不足者乎蓋非鑒之不明非擇之不精法使然也先朝數人以下言之詳矣是以文皇帝病其失而將革焉夫物盈則虧法久終弊雖文武之道亦與時張弛五帝三王之所以不相沿也是以王者觀變以制法察時而立政按前代選用皆州府察舉及年代久遠訛失滋深至於齊隋不勝其弊凡所置者多由請託故當時議者以為與其率私不若自舉與其外濫不若內收是以罷州府之權而歸於吏部此矯時懲弊之權法非經國不刊之常典今吏部之法蹙矣復宜掃而更之無容循默坐守刓弊伏以為當今選舉人未土著不必本於鄉閭鑒不獨明不可專於吏部謹詳度古制折量今宜謂五品以上及㣥司長官俾宰臣進敘吏部得參議焉其六品以下或僚佐之屬許州府辟用則銓擇之任悉委於四方結奏之成咸歸於二部必先擇牧守然後授其權高者先署而後聞卑者聽版而不命其牧守將帥或選用非公則吏部兵部得察而舉之聖王明目達聰逖聽遐視罪其私冒不慎舉者小加譴黜大正刑典責成授任誰敢不勉夫如是則接名偽命之徒菲才薄行之人貪叨賄貨懦弱姦宄下詔之日隨聲而廢通計大數十除八九則人少而員事詳而官審賢者不獎而自進不肖者不抑而自退除隋權道復古美制則衆才咸得而天下幸甚或曰當開元天寶中不易吏部之法而天下砥平何必外辟方臻於理既濟以為不然夫選舉者經邦之一端雖制之有美惡而行之由於法令是以州郡察舉在兩漢則理在魏齊則亂吏部選集在神龍則紊在開元天寶則理當其時久承升平御以法術慶賞不軼威刑必齊由是而理匪用吏部而臻此也向以此時用辟召之法則其理不益久乎夫議事以制不以權當徵其本末計其遐邇豈時得時失之可言耶或曰帝王之都必浩穰輻輳士物繁合然後稱其大若權散郡國遠人不至則京邑索矣如之何又甚不然自古至隋數百千年選舉之任皆分郡國當漢文景武帝之時京師庶富百廛九市人不得顧車不得旋侈溢之盛亦云極矣豈待選舉之士為其助哉又夫人有定土土無賸人浮冗者多則地著者少自隋罷外選招天下之人聚於京師春還秋往鳥聚雲合窮關中地力之産奉四方遊食之資是以筋力盡於漕運薪粒方於桂玉是由斯人索我京邑而謂誰索乎且權分州郡所在辟舉則四方之人無有遐心端居尊業而祿自及祿苟未及業常不廢若仕進外絶要攢乎京惜時懷祿孰肯安堵必貨鬻田産竭家贏糧糜費道路交馳往復是驅地著而安為浮冗者也夫京師之冗孰與四方之實一都之繁孰與萬國之殷況王者當繁其天下豈廛閈之中校其衆寡哉或曰仕門久開入者已衆若革其法則舊名常調不足以致身使中才之人進無所容退無所習其將安歸乎既濟以為人繫賢愚業隨崇替管庫之賢既可以入仕則士之不肖寧愧乎出流從古以然非一代也故傳云三后之姓於今為庶今士流既廣不可強廢但鍵其舊門不使新入峻其宦途不使濫登十數年間新者不來而舊者耗矣待其人少然後省官夫人之才分各有餘裕自為情欲所汨而未嘗盡焉引之則長縈之則短在勉而已故凡士族皆稟父兄之訓根聰明之性蓋以依倚官緒無湮淪墊溺之虞故循常不修名義罕立此教使然也若惟善是舉不才決棄前見爵祿後臨塗泥人懷憤激孰不騰進則中品之人悉為長材雖曰慎選捨之何適孺之廣平人官司封員外郎遷京兆少尹設教以防禮不逆矣遇長不敬患至掇焉苟訓典之不修乃朴撻而何害相彼解式誠謂狡童五人㣥居且聞異席十年以長則必肩隨不恭辟咡之儀致闕升高之禮惑其所視吾何以觀之哉杖以作威固當斯害也已小人文過肆以薄言君子詰姦無從長傲歸諸司敗足示陵尊成以調人可徵犯齒且州司以刑頗均短綆會府是糾且異長鞭伊小大之以情庶猛以相濟
