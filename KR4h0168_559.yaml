front:
  text: 全唐文欽定全唐文卷五百五十九韓愈十三
  hash: sha256:254aa42672463d9e09efe0d9cf48aa7646c1550d0dc0e27ed2e72c7e7d350d38
body:
  text: 左右前後皆正人也欲其身之不正烏可得邪吾觀李生在南陽公之側有所不知知之未嘗不為之思有所不疑疑之未嘗不為之言勇不動於氣義不陳乎色南陽公舉措施為不失其宜天下之所以窺觀稱道洋洋者抑亦左右前後有其人乎凡在此趨公之庭議公之事者吾既從而游矣言而公信之者謀而公從之者四方之人則既聞而知之矣李生南陽公之甥也人不知者將曰李生之託㛰於貴富之家將以充其所求而止耳故吾樂為天下道其為人焉今之從事於彼也吾為南陽公愛之又未知人之舉李生於彼者何辭彼之所以待李生者何道舉不失辭待不失道雖失之此足愛惜而得之彼為歡忻於李生道猶若也舉之不以吾所稱待之不以吾所期李生之言不可出諸其口矣吾重為天下惜之元和元年六月十日愈自江陵法曹詔拜國子博士始進見今相國鄭公公賜之坐且曰吾見子某詩吾時在翰林職親而地禁不敢相聞今為我寫子詩書為一通以來愈再拜謝退錄詩書若干篇擇日時以獻於後之數月有來謂愈者曰子獻相國詩書乎曰然曰有為讒於相國之座者曰韓愈曰相國徵余文余不敢匿相國豈知我哉子其慎之愈應之曰愈為御史得罪德宗朝同遷於南者凡三人獨愈為先收用相國之賜大矣百官之進見相國者或立語以退而愈辱賜坐語相國之禮過矣四海九州之人自百官以下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國之知至矣賜之大禮之過知之至是三者於敵以下受之宜以何報况在天子之宰乎人莫不自知凡適於用之謂才堪其事之謂力愈於二者雖日勉焉而不近束帶執笏立士大夫之行不見斥以不肖幸矣其何敢敖於言乎夫敖雖凶德必有恃而敢行愈之族親鮮少無扳聯之勢於今不善交人無相先相死之友於朝無宿資蓄貨以釣聲勢弱於才而腐於力不能奔走乘機抵巇以要權利夫何恃而敖若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也雖有讒者百人相國將不信之矣愈何懼而慎歟既累月又有來謂愈曰有讒子於翰林舍人李公與裴公者子其慎歟愈曰二公者吾君朝夕訪焉以為政於天下而階太平之治居則與天子為心膂出則與天子為股肱四海九州之人自百官以下其孰不願忠而望賜愈也不狂不愚不蹈河而入火病風而妄罵不當有如讒者之說也雖有讒者百人二公將不信之矣愈何懼而慎既以語應客夜歸私自尤曰咄市有虎而曾參殺人讒者之效也詩曰取彼讒人投豺虎豺虎不食投有北有北不受投有昊傷於讒疾而甚之之辭也又曰亂之初生僭始既涵亂之又生君子信讒始疑而終信之之謂也孔子曰遠佞人夫佞人不能遠則有時而信之矣今我恃直而不戒禍其至哉徐又自解之曰市有虎聽者庸也曾參殺人以愛惑聰也巷伯之傷亂世是逢也今三賢方與天子謀所以施政於天下而階太平之治聽聰而視明公正而敦大夫聰明則聽視不惑公正則不邇讒邪敦大則有以容而思彼讒人者孰敢進而為讒哉雖進而為之亦莫之聽矣我何懼而慎既累月上命李公相客謂愈曰子前被言於一相今李公又相子其危哉愈曰前之謗我於宰相者翰林不知也後之謗我於翰林者宰相不知也今二公合處而會言若及愈必曰韓愈亦人耳彼敖宰相又敖翰林其將何求必不然吾乃今知免矣既而讒言果不行或問行孰難曰捨我之矜從爾之稱孰能之曰陸先生參何如曰先生之賢聞天下是是而非非貞元中自越州徵拜祠部員外郎京師之人日造焉閉門而拒之滿街愈嘗往閒客席先生矜語其客曰某胥也某商也其生某任之其死某誄之某與某何人也任與誄也非罪歟皆曰然愈曰某之胥某之商其得任與誄也有由乎抑有罪不足任而誄之邪先生曰否吾惡其初不然任與誄也何尤愈曰苟如是先生之言過矣昔者管敬子取盜二人為大夫於公趙文子舉管庫之士七十有餘家夫惡求其初先生曰不然彼之取者賢也愈曰先生之所謂賢者大賢歟抑賢於人之賢歟齊也晉也且有二與七十而可謂今之天下無其人邪先生之選人也已詳先生曰然愈曰聖人不世出賢人不時出千百歲之閒儻有焉不幸而有出於胥商之族者先生之說傳吾不忍赤子之不得乳於其母也先生曰然他日又往坐焉先生曰今之用人也不詳位乎朝者吾取某與某而已在下者多於朝凡吾與者若干人愈曰先生之與者盡於此乎其皆賢乎抑猶有舉其多而缺其少乎先生曰固然吾敢求其全愈曰由宰相至百執事凡幾位由一方至一州凡幾位先生之得者無乃不足充其位邪不早圖之一朝而舉焉今雖詳其後用也必粗先生曰然子之言孟軻不如或問曰堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及於堯與舜也歟曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂後世爭之之亂也堯舜之利民也大禹之慮民也深曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人慮其患而不傳者禹也舜不能以傳禹堯為不知人禹不能以傳子舜為不知人堯以傳舜為憂後世禹以傳子為慮後世曰禹之慮也則深矣傳之子而當不淑則奈何曰時益以難理傳之人則爭未前定也傳之子則不爭前定也前定雖不當賢猶可以守法不前定而不遇賢則爭且亂天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢爭傳諸子得大惡然後人受其亂禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也與其傳不得聖人而爭且亂孰若傳諸子雖不得賢猶可守法曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以為聖人不苟私於其子以害天下求其說而不得從而為之辭鄠有以孝為旌門者乃本其自於鄠人曰彼自剔股以奉母疾瘳大夫以聞其令尹令尹以聞其上上俾聚土以旌其門使勿輸賦以為後勸鄠大夫常曰他邑有是人乎愈曰母疾則止於烹粉藥石以為是未聞毀傷支體以為養在教未聞有如此者苟不傷於義則聖賢當先眾而為之也是不幸因而致死則毀傷滅絕之罪有歸矣其為不孝得無甚乎苟有合孝之道又不當旌門蓋生人之所宜為曷足為異乎既以一家為孝是辨一邑里皆無孝矣以一身為孝是辨其祖父皆無孝矣然或陷於危難能固其忠孝而不苟生之逆亂以是而死者乃旌表門閭爵祿其子孫斯為為勸已矧非是而希免輸者乎曾不以毀傷為罪滅絕為憂不腰於市而已黷於政况復旌其門始吾讀孟軻書然後知孔子之道尊聖人之道易行王易王霸易霸也以為孔子之徒沒尊聖人者孟氏而已晚得揚雄書益尊信孟氏因雄書而孟氏益尊則雄者亦聖人之徒歟聖人之道不傳於世周之衰好事者各以其說干時君紛紛藉藉相亂六經與百家之說錯雜然老師大儒猶在火於秦黃老於漢其存而醇者孟軻氏而止耳揚雄氏而止耳及得荀氏書於是又知有荀氏者也考其辭時若不粹要其歸與孔子異者鮮矣抑猶在軻雄之閒乎孔子刪詩書筆削春秋合於道者著之離於道者黜去之故詩書春秋無疵余欲削荀氏之不合者附於聖人之籍亦孔子之志歟孟氏醇乎醇者也荀與揚大醇而小疵鶡冠子十有九篇其詞雜黃老刑名其博選篇四稽五至之說當矣使其人遇時援其道而施於國家功德豈少哉學問篇稱賤生於無所用中流失船一壺千金者余三讀其詞而悲之文字脫謬為之正三十有五字乙者三滅者二十有二注十有二字云余嘗苦儀禮難讀又其行於今者蓋寡沿襲不同復之無由考於今誠無所用之然文王周公之法制粗在於是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度邪於是掇其大要奇辭奧旨著於篇學者可觀焉惜乎吾不及其時進退揖讓於其閒嗚呼盛哉儒譏墨以上同兼愛上賢明鬼而孔子畏大人居是邦不非其大夫春秋譏專臣不上同哉孔子泛愛親仁以博施濟眾為聖不兼愛哉孔子賢賢以四科進裦弟子疾歿世而名不稱不上賢哉孔子祭如在譏祭如不祭者曰我祭則受福不明鬼哉儒墨同是堯舜同非桀紂同修身正心以治天下國家奚不相悅如是哉余以為辯生於末學各務售其師之說非二師之道本然也孔子必用墨子墨子必用孔子不相用不足為孔墨周之政文既其弊也後世不知其承大敷古先遂一時之術以明示民民始惑教百氏之說以興其言曰天下可為也彼之政仁矣反於誼此之政敬矣戾於忠何居我其周從乎曰周不及殷其殷從乎曰夏曰虞曰陶唐曰三皇氏曰遂古之初暴孽情飾淫志枝辭琢正紛紊糾射以僻民和以導民亂嗚呼道之去世其終不復矣乎長民者發一號施一令民莫不悱然非矣謂不可守遽變而從之譬將適千里及門而復後雖矻矻决不可暨原其始固有啟之者也聞於師曰古之君天下者化之不示其所以化之之道及其弊也易之不示其所以易之之道政以是得民以是淳其有作者知教化之所繇廢抑詭怪而暢皇極伏文貌而尚忠質茫乎天運窅爾神化道之行也其庶已乎詩曰大邦維翰書曰以藩王室諸侯之於天子不惟守土地奉職貢而已固將有以翰藩之也今人有宅於山者知猛獸之為害則必高其柴楥而外施窞穽以待之宅於都者知穿窬之為盜則必峻其垣牆而內固扃鐍以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於倔強之閒而不知為之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力為有不足歟蓋以謂不足為而不為耳天下之禍莫大於不足為材力不足者次之不足為者敵至而不知材力不足者先事而思則其於禍也有閒矣彼之倔強者帶甲荷戈不知其多少其帛丿糸地則千里而與我壤地相錯無有邱陵江河洞庭孟門之關其閒又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乘吾之便此其暴於猛獸穿窬也甚矣嗚呼胡知而不為之備乎哉賁育之不戒童子之不抗魯雞之不期蜀雞之不支今夫鹿之於豹非不巍然大矣然而卒為之禽者爪牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人司徒北平王家貓有生子同日者其一死焉有二子飲於死母母且死其鳴吚吚其一方乳其子若聞之起而若聽之走而若救之銜其一置於其棲又往如之反而乳之若其子然噫亦異之大者也夫貓人畜也非性於仁義者也其感於所畜者乎哉北平王牧人以康伐罪以平理陰陽以得其宜國事既畢家道乃行父父子子兄兄弟弟雍雍如也愉愉如也視外猶視中一家猶一人夫如是其所感應召致其亦可知矣易曰信及豚魚非此類也夫愈時獲幸於北平王客有問王之德者愈以是對客曰夫祿位貴富人之所大欲也得之之難未若持之之難也得之於功或失於德得之於身或失於子孫今夫功德如是祥祉如是其善持之也可知已既已因敘之為貓相乳說云余始得李生於河中今相遇於下邳自始及今十四年矣始相見吾與之皆未冠未通人事追思多有可笑者與生皆然也今者相遇皆有妻子昔時無度量之心寧復可有是生之為交何其近古人也是來也余黜於徐州將西居於洛陽汎舟於清泠池泊於文雅臺下西望商邱東望修竹園入微子廟求鄒陽枚叔司馬相如之故文久立於廟陛閒悲那頌之不作於是者已久隴西李翺太原王涯上谷侯喜實同與焉貞元十六年五月十四日昌黎韓愈書維茲之旱兮其誰之由我知其端兮風伯是尤山升雲兮澤上氣雷鞭車兮電搖幟雨寖寖兮將墜風伯怒兮雲不得止暘烏之仁兮念此下民閟其光兮不鬬其神嗟風伯兮其獨謂何我於爾兮豈有其他求其時兮修祀事羊甚肥兮酒甚旨食足飽兮飲足醉風伯之怒兮誰使雲屏屏兮吹使醨之氣將交兮吹使離之鑠之使氣不得化寒之使雲不得施嗟爾風伯兮欲逃其罪又何辭上天孔明兮有紀有綱我今上訟兮其罪誰當天誅加兮不可悔風伯雖死兮人誰汝傷韓愈退之李翺翔之孟郊東野柳宗元子厚石洪濬川同登韓愈李景興侯喜尉遲汾貞元十七年七月二十二日魚於溫洛宿此而歸昌黎韓愈書愈同樊宗師盧仝謁少室李拾遺處士石洪濬川吏部員外王仲舒宏中水部員外鄭楚相叔敖洛陽縣令潘宿陽乾明國子博士韓愈退之前試左武衞冑曹李演廣文前杭州錢塘縣尉鄭紘文明元和三年十月九日同遊元和四年三月二十六日與著作佐郎樊宗師處士盧仝自洛中至少室謁李徵君渤樊次玉泉寺疾作歸明日遂與李盧道士韋濛僧榮並少室而東抵眾寺上太室中峯宿封禪壇下石室遂自龍泉寺釣龍潭水遇雷明日觀啟母石入此觀與道士趙元遇乃歸閏月三日國子博士韓愈題河南尹水陸運使杜兼尚書都官員外郎韓愈水陸運判官洛陽縣尉李宗閔水陸運判官伊闕縣尉牛僧孺前同州韓城縣尉鄭伯義元和四年九月二十二日大尹給事奉詔祠濟瀆回愈與二判官於此迎候遂陪遊宿愈題淮西宣慰處置使門下侍郎平章事裴度副使刑部侍郎兼御史大夫馬總行軍司馬太子右庶子兼御史中丞韓愈判官司勳員外郎兼侍御史李正封都官員外郎兼侍御史馮宿掌書記禮部員外郎兼侍御史李宗閔都知兵馬使左驍衞將軍威遠軍使兼御史大夫李文悅左廂都押衙兼都虞候左衞將軍兼御史中丞密國公高承元和十一年八月丞相奉詔平淮右八日東過華陰禮於嶽廟總等八人實備將佐以從
