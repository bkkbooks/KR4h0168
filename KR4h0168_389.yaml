front:
  text: 全唐文欽定全唐文卷三百八十九獨孤及六
  hash: sha256:810d2564ecaeb437b77e410f92ef19f6f219fee2763c6601c041572518720756
body:
  text: 太微五帝星座後十五星曰郎位秦漢之君則而象之乃建郎官至魏世祖分尚書曹為六郎各六人今之吏部魏之選曹也掌選舉銓核以正公卿大夫士㣥吏之品位凡廢置之柄官府之序歲終令天下郡縣會計致事而郎官起草立議操而成之然後尚書受成於郎中郎中之選非楚金百鍊玈弓六鈞弗與也故居官者不由選曹而進罔以見其才之餘地亦猶劍刀之刃未嘗刲大軱切大玉則雖曰我且必為鏌鎁人猶疑之由其途而升必驟周三臺翰飛兩掖登喉舌秉刀尺者什六七諸曹郎莫敵也歲在乙已河南賀若公用貞幹諒直實蒞厥位往歲公為員外郎也東曹朗然如得水鏡治餘杭也吳人熙熙若逢陽春今也來斯八法在手操割成務彌綸舊章悉如初政嘗以前哲軌躅我之韋弦而武德以來廨署鼎新者數官曹易名者五若姓不表年不紀是廢德也將來何觀故謹而列之俾我曹之春秋存乎座右其選部司列天官文部之目各因其所革時之先後冠於其首以為志云此寺居吳西神山之足山小多泉其高可憑而上山下靈池異花載在方志山上有真僧隱客遺事故迹而披勝録異者賤近不書無錫令敬澄字深源以割雞之餘考古案圖葺而築之乃飾乃圬有客竟陵陸羽多識名山大川之名與此峯白雲相與為賓主乃稽厥創始之所以而志之談者然後知此山之方廣勝掩他境其泉伏涌潛泄潗孴舍下無沚無竇蓄而不注深源因地勢以順水性始雙墾袤丈之沼疏為懸流使瀑布下鍾甘溜湍激若釃醴乳噴發於禪牀周於僧房灌注於德地經營於法堂潺潺有聲聆之耳清濯其源飲其泉能使貪者讓躁者靜靜者勤道道者堅固境淨故也夫物不自美因人美之泉出於山發於自然非夫人疏之鑿之之功則水之時用不廣亦猶無錫之政煩民貧深源導之則千室襦袴仁智之所及功用之所格動若響答其揆一也豫飲其泉而悅之乃志美於石太常掌玉帛鐘鼓等威文物以報本乎天地神祇人鬼凡吉凶賓軍嘉之禮唐虞謂之秩宗周謂之宗伯秦謂之奉常漢謂之太常其掌一也後魏太和十五年始建少卿官少小也用別二卿大小之序亦猶宗伯有小宗伯列國有上卿下卿郡有守丞亦位亞一等以少參長而佐其成務焉故事自御史中丞給事中中書舍人遷秩為亞卿者必於是司故官因職雄地以人貴餘八卿不敢與太常齒廣德中上尤審官注意禮樂其選也以才能不以資以恩澤不以勞謂李公卿材也是用超拜公將以忠孝敬慎肅恭神人且懋其官府政令俾無不恪方議酌前賢之遺塵而損益之乃瞻屋壁所記漫滅於是夏五月已丑皆姓而名之使如珠之貫盱衡指顧儼若對面曰賢者吾得而師之不賢者吾韋而絃之賢遠乎哉既進牘然後命博士河南獨孤及為之志古者國有史氏君舉必書倚相董狐史鰌史嚚即其人也秦已來國化為郡史官廢職策牘之制寖滅記事者但用名氏歲月書於公堂而春秋檮杌存乎屋壁其來舊矣是州也在荊之域於潯之陽江從岷山東注渤澥洪濤至是派分為九而廬山湓水周於雉堞洞庭彭蠡為之襟帶故自晉元康訖於梁陳出入五代四百餘載世稱雄鎮且曰天府匪親匪賢莫荷其寄唐有天下六合一軌設險斯廢惟民是恤則命官擇任與列郡等矣至德已來戎馬生而楚氛惡猶以是邦咽喉秦吳跨躡荊徐而提封萬井歧路五裂每使臣計郡縣之財入調軍府之儲峙璽節旁午羽書絡繹走閩禺而馳於越必出此路而防虞供億功倍他郡故亦大其任而難其人今年春渤海封公繼踐厥位夫為政猶工之攻木也得於手應於心則盤曲擁腫迎刃而解況美材乎故公以發硎之利導勝殘之俗布政三月而人從乂每歎曰茫茫舊壤千載在目觀乎版築則灌嬰之業朗而存焉披乎圖牒則溫太真庾元規之車塵若可窺焉義寧已來百四十有九載纂斯位者風聲相聆軌躅相躡前賢後賢纍纍如貫珠善惡成敗我之元龜酌而行之吾師存焉於是徵諸故老鳩其名氏之存者凡若干人揭而書之以為九江郡國志古者國野之道十里有廬廬有飲食三十里有宿宿有路室於是乎賓客有止息羈旅有寄寓而是邦也與兩越七閩犬牙其疆守官者以為地遐途窮而瑣瑣行邁之罕到也則殺其禮而闕其物焉無修除之備無井樹之設及客至則候人不為導里不授館而盤飧薪芻之貺弆如也由是途而往者僉曰陋如之何是歲也台司審縣尹之寄擢王公昕為南城公至之日則制其事典陳其藝極視年之上下去民之疾苦凡三月而南城之人和於是飾廏置以候賓客葺旅次以待羇旅夏六月築其館辨其域於道周作新亭於館之陽廈屋耽耽俯瞰濬壑賓位在左主位在右然後剷磽確堙坎窞以為大逵屬之於溪設雙船於清津以備徑渡每將之迎之則自郊勞至於致餼無曠禮無違物而茲亭之經始也取廢徹之材以利用用乃有節入鞭撲之贖以庀工工忘其勞崇棟宇之製以禮賓賓至如歸三者不愆於素功是以懋政是以立若行者有犯軷之祭居者修飲餞之好登斯臨斯釃酒以贈之溪雲竹風生於棟牖而緑野青山為之亭障三爵之後可以送千里之目可以道四方之志焉茲又勝會之佳境也凡砥績以興利革故以謀始修禮以備物僝功以成務政之大者宜其刊作者之茂實以示後嗣不然他山之石何以在此是歲廣德二年也鳳凰鵷雛翔於碧霄非梧竹不下而食賢人君子有四方之志非樂國不適其土豫章郡左九江而右洞庭接苗氏之遺墟非觀風按郡參事蒞職者則長者車轍莫由至也歲次辛丑春正月東諸侯之師有事於淮西是役也以蜂蠆竊發華夷震驚執事者匪遑啓居亦既播越我都督防禦觀察處置使兼御史中丞韋公元甫克振遠略殷為長城且修好於鄰侯從交相見敦同盟戮力之義圖靖難勤王之舉故三吳舟車八使冠蓋名公髦士㣥后庶尹輻輳鱗集其來如歸於是戶部尚書兼御史大夫李公峘至自廣陵越州刺史兼御史中丞杜公鴻漸至自會稽潤州刺史試鴻臚少卿韋公儇至自京口蘇州刺史韋公之晉至自吳廬州刺史前尚書右丞徐公浩至自合淝由是越人吳人荊人徐人以其孥行絡繹薦至大江之涯於是乎宏舸巨鷁舳接艫隘輶車鸞鑣轊挂轂擊每講射合禮賓主好會峨星辨執象笏雁行而揖者五十有九人凡處八座者一歷中司者三尚書司轄者二建隼旟者九冠獬豸者十一其載筆掖垣曳裾廷寺分曹環衛典校蓬閣者印綬纍然若差肩駕於宇下翼如也夫衛甸侯也以多君子而誇列國梁孝王漢寵弟也有鄒枚嚴馬之盛而焜耀後世孰與以一郡之狹五湖之阻而濟濟俊乂馳軒冕而就客位者殆九州多士之半則鵷鳳㣥翔而萃止不若也彼昔人所稱方斯其陋乎歲二月楚氛掃除江介砥定然後皆整歸斾分鑣言旋縶維莫從音徽將遠不頌不述後嗣何觀公於是謹而目之且列其爵里名氏於館俾來世知衆君子之車塵在此境也古者半夏生木槿榮君子居高明處臺榭後代作者或用山林水澤魚鳥草木以博其趣而佳景有大小道機有廣狹必以寓目放神為性情筌蹄則不俟滄洲而閒不出戶庭而適前尚書右司郎中盧公地甚貴心甚遠欲卑其製而高其興故因數仞之邱伐竹為亭其高出於林表可用遠望工不過鑿戶牖費不過翦茅茨以儉為飾以靜為師辰之良景之美必作於是憑南軒以瞰原隰沖然不知錦帳粉闈之貴於此亭也亭前有香草怪石杉松羅生密篠翠竿臘月碧鮮風動雨下聲比簫籟亭外有山圍湓城峯名香爐歸雲輪囷片片可數天香天鼓若在耳鼻是其所以誇逋客而傲漢貂也百里奚爵祿不入故飯牛而牛肥盧公恬智相養於是竹亭構而天機暢嘗試論亭之趣夫物不感則性不動故景對而心馳也欲不足則患不至故意愜而神完也耳目之用繫於物得喪之源牽於事哀樂之柄成乎心心和於內事物應於外則登臨殊途其適一也何必嬉東山褉蘭亭爽志蕩目然後稱賞公欲其迹之可久故命余為志物不終靜必授之以動當純坤用事陰疑於陽則飛龍戰大朴已散聖盜並起故戎馬生乃有力吞八荒爭截九有大者天柱折地維絶小者作慝盧山負阻中冀上帝憑怒下土是恤乃眷武德黃帝受之始順殺氣以作兵法文昌以命將於是乎征不服討不庭其誰佐命曰元老風后蓋戎行之不修則師律用爽陰謀之不足則凶器何恃故天命聖者以廣戰術俾懸衡於未然察變於倚數握機制勝作為陳圖夫八宮之位正則數不夭夭心神不忒故八其陳所以定位也衡抗於外軸布於內風雲附其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢所以致用也至若疑兵以固其餘地游軍以按其後列門具將發然後合戰弛張則二廣迭舉犄角則四奇皆出必使陷堅陳拔深壘若星馳天旋雷動山破魏之鶴列鄭之魚麗周武之熊羆昆陽之虎豹出匪以律我異於是既而圖成樽俎帝用經略北逐獯鬻南平蚩尤戡黎於版泉省方於崆峒砥定萬國旁羅七曜鼎成龍至去而上仙於是遺風冥冥時亡而圖存焉於戲聖迹長往神機未昧酌其流者猶足以決勝三軍禦侮萬里故項籍得之以霸西楚黥布得之奄有九江漢孝武得之攘胸奴服甌越東收獩貊西拓大夏然則聖圖幽贊未始有涯天寶中客有為韜鈐者得其遺制於黃帝書之外篇裂素而圖之勝敗之眹在我指掌天地之心見於毫末議欲獻諸策府用廣武事會天子以不戰為師無為為寶則是圖也興於多難廢於升平堙淪不書盛德其沒乃旌諸圖側以為三皇之故事六藝之餘伎云謹按季子三以吳國讓而春秋裦之余徵其前聞於舊史氏竊謂廢先君之命非孝也附子臧之義非公也執禮全節使國篡君弒非仁也出能觀變入不討亂非智也左邱明太史公書而無譏余有惑焉夫國之大經實在擇嗣王者所慎德之不建故以賢則廢年以義則廢卜以君命則廢禮是以太伯之奔勾吳也蓋避季歷季歷以先王所屬故纂服嗣位而不私太伯知公器有歸亦斷髮文身而無怨及武王繼統受命作周不以配天之業讓伯邑考官天下也彼諸樊無季歷之賢王僚無武王之聖而季子為太伯之讓是徇名也豈曰至德且使爭端興於上替禍機作於內室遂錯命於子光覆師於夫差陵夷不返二代而吳滅以季子之閎達博物慕義無窮向使當壽夢之眷命接餘昧之絶統必能光啓周道以霸荊蠻則大業用康多難不作闔廬安得謀於窟室專諸何所施其匕首嗚呼全身不顧其業專讓不奪其志所去者忠所存者節善自牧矣謂先君何與其觀變周樂慮危戚鐘曷若以蕭牆為心社稷是恤復命哭墓哀死事生孰與先釁而動治其未亂棄室以表義掛劒以明信孰與奉君父之命慰神祇之心則獨守純白不干義嗣是潔已而遺國也國之覆亡君實階禍且曰非我生亂其孰生之哉其孰生之哉蜀之先曰蠶叢兮縱其目以稱王當周室陵頽兮亂無紀綱洎乎杜宇從天而降鱉靈泝江而上相禪而帝據有南國之九世蜀本南夷人也皆左其衽而椎其髻及通乎秦也始於惠王之代五牛琢而秦女至一蛇死而力士斃二江雙注㣥山四蔽其地卑陋其風脞脆蠻貊雜處滇僰為鄰地偏而兩儀不正寒薄而四氣不均花葉再榮秋冬如春暮夜多雨朝旦多雲陽景罕開陰氣恆昏以暑以淫一作溼為瘵為厲氣浥蟄以中人吾知重膇之疾兮將嬰爾身蜀之不可往北客歸去來兮其東則有大江澐澐下絶地垠百谷相吞出於荊門突怒吼劃附於太白渤潏硼砰會於滄溟跳噴浩渺上濺飛鳥蹙縮盤渦下漩黿鼉三峽兩壁亂峯如㦸山義岈屹崒澒洞劃圻高於天霓雲外水積晝日無光其下黑窄瞿塘無底淺處萬尺啼猿哀哀腸斷過客復有千歲老蛟能變其身好飲人血化為婦人衒服靚裝遊於水濱五月之間白帝之下洪濤塞峽不見灔澦翻天蹙地霆吼雷怒亦有行舟突然而去人未及顧櫂未及舉瞥見陽臺不辨雲雨千里一歇日未移午須臾黑風暴起拔樹震山石走沙飛波騰浪翻舟子失據摧檣折竿漩入九泉沒而不還支體糜散蕩入石間水族砑砑拔刺爭餐蜀之東不可往北客歸去來兮其西則有高山萬重峻極屬天西有崑崙其峰相連日月回一作巡環閡於山巔巒崖盤嶔天壁敻絶陽和不入陰氣固閉千年層冰萬古積雪溪寒地坼谷凍石裂夏月草枯春天木折一作冬天水折蒼烟凝兮黑霧結人墮指兮馬傷骨江水噴激回盤紆縈棧壁緣雲鉤連相撐繩梁嶫虛傍沓杳冥下不見底空聞波聲過者矍然亡魂喪精復引一索其名為窄人懸半空度彼絶壑或如鳥兮或如玃倏往還來幸不落或有豪豬千㣥突出深榛努鬣射人寒熊孔碩登樹自擲見人則擘巨麋如牛修角如劍餓虎爭肉吼怒闞闞復有高崖墜石兮聲若雷之軯轟上敲下礚似火迸兮滿山流星澗溪忽兮倒流林岸一作崖為之頽傾碎騰狖與過鳥駭木魅兮山精飛石壓人兮不可行西有犬戎與此山通形貌類人言語不同氊廬隆穹毳裘蒙茸啜酪啖肉持鎗挾弓依草及泉務戰與攻其聲如犬其聚如蜂中國之人兮或流落於其中豈只掘鼠茹雪以取活終當鈹其足而纍其胸泣漢月於西海思故鄉於北風蜀之西不可往北客歸去來兮其南則有卭笮之關天設險艱少有平地連延長山橫亘廬江隔閡百蠻吁彼漢源上當漏天靡日不雨四時雱然其人如魚爰處其泉終年霖霪時復日出斤斤諸犬向天吠日人皆濕寢偏死腰疾復有陽山之路毒瘴下凝白日無光其氣瞢瞢暑雨下濕黃茅上蒸南方之人兮不敢過豈只走獸踣兮飛鳥墮吾不知造化兮何知此方些蜀之南不可以往北客歸去來兮其北則有劍山巉巉天鑿之門二壁谽谺高崖嶙峋上柱南斗傍鎮於坤下有長道北達於秦秦地神州中有聖人左右伊皋能致我君雙闕峩峩上覆慶雲千官鏘鏘朝於紫宸玉樓鳳皇金殿麒麟布德垂澤搜賢修文皇化欣欣煦然如春蜀之北兮可以往北客歸去來兮作繢精至於藝懸解擬公德容與化同製獨立正色神和氣邁婉兮清揚若聞嘉話公綽不欲仲山匪懈形於懿範觀者目駭百城仰止㣥吏警戒成務安民亦猶此畫侍御史韓公至一作志清以學藝書畫之美聞於天下辛丑歲三月以王事靡盬館於豫章與前尚書右丞徐公同舍於慧命寺之淨室嘗以暇日裂素灑翰畫徐公之容陳於公之座隅而美目方口和氣秀骨毫釐無差若分形於鏡入自外者或欲擎跽曲拳俯僂拜謁不知其畫也衆君子嗟歎之不足則言以贊其美及亦繼唱於後乃贊之曰哲匠運思天姿是具假之筆精實以神遇居然成象豁若披霧瞻仰神鋒如窺武庫婉婉高識昂昂獨步絶頂孤松空陂白鷺不犯之色匪躬之故孰知其一作造化亦在毫素道在毫末神凝意注闖然雷生千歲古樹龍蠖屈盤精魅固護霜封雪埋翠幄如故宜構大廈胡為中路豈猶有待公輸之顧落落貞姿傳之繪素堂堂乎張洵美且恭執法柱下分形畫工玉立天姿霜淬神鋒武庫森㦸寒山徑松方彈獬豸以佐夔龍他年雲臺與古同風道無形相心離文字非言無以導引故諸法生於假名非智無以調伏故大音傳於密教茫茫五濁客塵覆之根識相緣生滅相隨世王有為之牢獄二乘求慧而著空十地見性而弗了微我智印侯誰司南故如來以大悲自定之慧力示總持無畏之祕藏雲覆世界雷震㣥有淨除我垢令入法性設字根本假文以筌意也足聲齒舌因音以見法也以十四音攝一切智雖入無漏而不捨有為即色以證空也奉之者惡趣固可使關閉黑業必為之清淨况勝緣乎初太保韓國苗公以兩朝秉鈞所積廩賜顧命宗子家老曰喪祭之餘以庀功德於是我相國潁川公將演成公宏誓之果也是以樹因此幢韓公生代天工德本植焉歿無鬼責惠牙滋焉而潁川公猶興哀於絶絃之地將乞靈於無我之法庶俾法雨雨公身田故琢真石以刊微言仰之贊之如揭日月嗚呼墨點之界有極鐵圍之山有壞惟梵音與法印等空虛而無窮則公之前際疇可彌度其辭曰六趣輪轉根塵相刃死生變化如響如瞬何用拯溺總持祕印道罔不在宏之者人乃經靈幢公子之因贊持大力啓迪迷津天魔遁形地獄開門拔箭解縛如日破昏韓公善根與石長存元年建寅月前相州安陽縣令何昌系以是月甲子當受生之辰痛欲報而罔極哀現在之無住顧非大雄之慈法雲之悲則莫能救拯我無明苦果敷佑我宏誓願力乃彰施五色以刺繡成文寫菩薩之真相等觀音之全身於是乎諦觀睟容瞻仰聖位知海潮之梵音不遠蓮花之法座可識將令功德池水溉灌其三業菩提根芽發生於一雨至哉安陽之樹善也宏矣欲廣其善利以偈贊云法雲垂蔭光破黑業五眼周視四魔怖懾以色觀空於相見法永植慈緣恆沙億劫陰陽開闔元氣變化泄為百川凝為崇山山川之作與天地并疑有真宰而未知尸其功者有若巨靈贔屭攘臂其間左排首陽右拓太華絶地軸使中裂坼山脊為兩道然後導河而東俾無有害留此巨跡於峯之顛後代揭厲於元蹤者聆其風而駭之或謂詼詭不經存而不議及以為學者拘其一域則惑於餘方曾不知創宇宙作萬象月而日之星而辰之使輪轉環繞箭馳風疾可駭於俗有甚於此者徒觀其陰步馬無眹未嘗駭焉而巨靈特以有跡駭世世果惑矣天地有官陰陽有藏煆鍊六氣作為萬形形有不遂其性氣有不達於物則造物者取元精之和合而散之財而成之如埏埴爐錘之為瓶為缶為鉤為棘規者矩者大者細者然則黃河華嶽之在六合猶陶冶之有瓶缶鉤棘也巨靈之作於自然蓋萬化之一工也天機冥動而聖功啓至精密感而外物應故有無跡之跡介於石焉可以見神行無方妙用不測彼管窺者乃循跡而求之揣其所至於巨細之境則道斯遠矣夫以手執大象力持化權指揮太極蹴踏皓氣立乎無間行乎無窮則捩長河如措杯擘太華若破塊不足駭也世人方以禹鑿龍門以導西河為神奇可不為大哀乎峩峩靈掌仙指如畫隱轔磅礡上揮太清遠而視之如欲捫青天以掬皓露攀扶桑而捧白日不去不來若飛若動非至神曷以至此唐興百三十有八載余尉於華陰華人以為紀嵫勒之罘頌嶧山銘燕然舊典也元聖巨跡豈帝者巡省伐國之不若歟其古之闕文以俟知言歟仰之歎之斐然琢石為志其詞曰天作高山設險西方至精未分川壅而傷帝命巨靈經啓地脈乃眷斯顧高掌遠跖砉如剖竹騞若裂帛川開山破天動地坼黃河太華自此而闢神返虛極跡挂石壁跡豈我名神非我靈變化翕忽希夷杳冥道本不生化亦無形天何言哉山川以寧斷鼇補天世未覩焉夸父愚公莫知其蹤屹彼靈掌懸諸巃嵸介二大都亭亭高聳霞赩烟噴雲抱花捧百神依憑萬峰朝拱長於上古以閲㣥動下視衆山蜉蝣蠛蠓彼邦人士永揖遺烈瞻之在前如揭日月三川有竭此掌不滅王者建邦經野觀象立極於是有重門擊柝以待暴客故封略土宇守在關塞山川邱陵為之城池天作崤函俾屏京室崇山回合連岡藂倚長河屈盤萬里來束崖奔嶺蹙谷抱溪鬬崛起重險為秦東門截函夏於閫閾鎖天府於戶牖外扼九州之咽喉故百二形焉內擁六合之奧區故霸王出焉當其周原鹿駭戰國蝟起嬴氏建瓴山東擇肉宇內持㦸百萬連衡此關是時也開門而九國師遁振策而二周鼎入奄有大寶遂吞中區洎江返秦璧天祐漢祚高皇帝提劍而西以遏亂略斬白帝紲降王舉漢中平咸陽廓金城以建都活萬姓以三章取威定功此焉是保粵若詢事國牒聆風仙籙則真氣靈蹤起乎其中柱史一去流沙萬里留玉函於舊宅傳寶圖於本枝豈上帝乃眷興王是感不然何錫羡開國如此其大耶歲在大火余適下陽停驂塞門憑覽舊國襟帶如故世道不留秦餘空山漢遺茂草恐復舟失於壑岸化為谷萬載之後昧者不知乃刻頌此石以示來裔其詞曰天地雷雨英雄交爭設險守國作藩於京姓易時移山空塞平千秋陵谷想見精靈仙駕長往雄圖杳冥於以志之勒銘巖扃參變化孕律呂和神人莫疾於聲故天地以雷震萬物聖人以樂節八風佛土以鐘警六時天造聖作同符異貫自真乘開設其輪三轉像教不墜而法鼓之制存焉彤彤蓮宮於江之濱萬井在其前善惡興乎人將欲誕敷我法音啓迪我善根我是以作萬鈞之鐘大其器所以昭其度也侯誰尸之長者杜海洎此方上士精法觀釋法鸞與比邱衆百三十有五人實果其願將辦所作於時火官金工循厥戒令範陰陽九六之數以合造化均薄厚侈弇之齊以諧清濁聚精會神鳩工於其間宏誓既達昏疑皆破故衆心如城施者如市大悲之感與萬靈接況祝融回祿髣佛交應越五日辛丑新鐘成於是此邦民大和會膜拜縱觀川塞衢溢億兆諦聽鯨魚乃發訇然如扶搖號而萬竅怒霹靂作而崇山破在坑滿坑在谷滿谷金界岌峇若震若蕩既而拗怒散渙與回飇俱激度越大千周流六虛經於禁城入於梵宮徘徊乎霜天淩厲乎清夜千門徹萬戶警魚龍皆奮蟲豸不蟄於是聆其音者貪騃遷善聾盲知方識浪安流地獄清涼吒王解刑刀輪摧藏嚴乎心者聞聲以知受觀受以悟法若露清耳根鏡照身業彼金鼓聲氣木鐸徇路整衆孚號方斯陋矣蓋聖人宏道以勸善因善以建法作法器以為天下利利者教之果法者教之因善者教之宗也作銘曰我鐘乃懸是訓是崇世界有極大音無窮八音之列數者金為長金聲之動物者鐘為大相彼創制本乎無心隨輕重之所考遇洪纎而必應其體妙乎其幾神乎故帝庭用之以和樂梵宇作之而助道其有旨哉伊本願道場昔鬼土所卜即輪王建塔之地有隋氏因而緝焉皇唐統天增壯厥構雖臺殿有赫而鐘簴未雄曰都維那某等顯允令德鬱為紀綱洞三學之奧府張二嚴之巨翼以為是聲聞則有以敷衆美不則無以遍十方乃同寅叶恭倡議改作我心匪石彼應如雲緇流輔仁而或勤或懋清信委施而為岡為陵於是乎遠貿金精博召良冶鳧氏宰陶人翼鎔範修林朴植火正叱咤以啓號風師䦧怒而陳力巨扇咆哮洪爐赫曦焮奪清夜光連紫微旁通竇以決注下潛成於數圍察夫陰未凝陽為烈爙爆泉沸氣憤雲泄既旬而後實既堅而後發轉於隧漸於堂混乎其輪圓洞然而博暢仙獸勒於下驪龍踏於上蓄精誠含寥亮乃神工之既濟而寶器之大壯也且夫作有度而體有經侈弇均厚薄中則不播不石不鬱不柞雖鴻音未揚識者已知其妙矣故緇衆咸躍善願克充而縣之衣冠里之髦彥聚捨珍玩翕營層臺崚嶒百常沆瀣一色然後插雲柱倚天梯駢轆轤綰修索攢畾力力以下拔軋豐容而上升雄以筍鱗顛以交扛猛以簴權作以離立大器斯屬洪椎乃鏗威音潼溶而一吼虓響岌嶪乎三界上極有頂下彌空輪飛行天仙海陸神識莫不警革塵滯褰開冥蒙滌曠劫之瑕滅長夜之苦使浩福潛潤冥機坐融其諸佛神通之用乎不然者千鈞之聲一杵之播則曷以臻於是矣允釐僧務本三勢而克終式遏劍輪後四爰而長擊故初起細而促漸登鍠以舒既鋭而入微又增而復壯於是壯也乃而畢為八字有誤若是者何皆皇覺啓導抑揚之深思也實欲普其念周乎仁張皇慈音引曳悲韻使萬物咸若六時登聞不惕不惶以安以樂或謂霆鬬雷裂山傾河泄靈祇殲走猛毅僵蹶皆恐怖殺傷之事我大雄氏慈制又悲乎然哉五字有誤若乃禺禺聖賢翼翼龍象以之懺薩以之引宣微妙其心精進厥德有秩有序不差不忒住持我象教洋溢我元風洞達我幽明清寧我邦國神之不可以已其在茲乎皇唐十有八年春仲月八日是鐘也既成即其秋孟月上弦茲臺也復構他方聖衆咸飛來而讚揚地中菩薩咸踊出而瞻仰於是陳巨會以落之張梵樂以考之煌煌乎休哉越寶庭之能事畢矣而宏範莫紀又八稔於斯河南史凜然文林之秀也尉於右邑攝茲銅章惠化一清於灌壇希聲重美於洪器命我昭述式副㣥心之望焉而主簿宏農楊量新尉楊光朝等并高幹才敏力懋於道勉奉天秩允恭仁祠輔營樂石贊就厥美雖默者果得不言乎銘曰靈鐘上空儀法天體道內虛含至圓雄威蓄育時乃宣震擊鏗鍠流大千十萬調御及聖賢應我真聲開梵筵一切苦輪悲熾然聞我真聲咸息肩虛空有盡福無邊神用廣大莫與先隴西李幼卿字長夫以右庶子領滁州而滁人之飢者粒流者占乃至無訟以聽故居多暇日常寄傲此山之下因鑿石引泉釃其流以為溪溪左右建上下坊作禪堂琴臺以環之探異好古故也按圖經晉元帝之居琅琊邸而為鎮東也嘗游息是山厥跡猶存故長夫名溪曰琅琊他日賦八題題於岸石及亦狀而述之是歲大歷六年歲次辛亥春三月丙午日述曰自有此山便有此泉不濬不刊幾萬斯年造物遺功若俟後賢天鍾靈奇公潤色之疏為回溪削成崇臺山不過十仞意擬衡霍溪不袤數丈趣侔江海知足造適境不在大怪石皚皚涌湍潺潺洞壑無底雲興其間仲春氣至草木華發亘陵被坂吐火噴雲公登山樂樂者畢同無小無大乘興從公公舉觴酒酒酣氣振溪水為主而身為賓捨瑟詠歌同風舞雩時時醉歸與夕鳥俱明月滿山朱轓徐驅石門松風聲類笙竽嗚呼人實宏道物不自美向微羊公遊漢之涘峴山寂寞千祀誰紀彼美新溪維公嗣之念茲疲人繄公其肥後之聆清風而歎息者挹我於泉乎已而洪州牧刑部尚書兼御史大夫魏公身挂元冕心冥真如昔嘗奉般若法以宏正見雖顛沛造次心與經俱十有若干年矣皇帝中元年冬十月車駕有避狄之師百僚倉皇南馳商於公為盜所攘而亡其經其往也匪家之念惟經是悼行與其獲七寶也寧見經生與其亡四句也寧捨身明年王正月大駕返正公為京兆尹痛宏誓之未從也則惟經是圖末於元法寺之藏藏人以送公發函披卷乃商於所亡之本也問守藏者亦曰不知其所自而能得公瞻禮悲喜捧持而泣然後知精專感達故隨心而至昭報肸蠁其疾若答顧謂孟子太常博士友順志之或曰得與喪偶然爾何必謂誠感乎及對曰誠於此者形於彼故出其言善千里之外應之此仁義忠信感於物者也況第一義諦超貫仁義自在慧力不啻忠信則因發而果從心誠而經還是法味幽贊非思議所可及豈佛以般若之雨啓公善牙使因相以次獲願進啓乎無願法之法歟不然何心境元合若律呂相召歲在乙酉公以異見告及跪而述之曰上士勤道精應若馳願形於心報亦隨之至感無礙經斯來歸護公身田俾公斷疑公之善根疇可度思
