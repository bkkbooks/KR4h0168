front:
  text: 全唐文欽定全唐文卷二百六十七琬中宗朝官監察御史
  hash: sha256:b3a0c718cbc0c6acefe2f41dd1c1707d06511afd658e2c2544be6e5cbbe73f59
  markers:
  - {type: head, offset: 14, content: 崔琬, id: KR4h0168_NFKB_267-h1, level: 1}
body:
  text: 臣聞四牡項領良御不乘二心事君明罰無赦謹按兵部尚書同中書門下三品宗楚客侍中紀處訥等立性險詖志越溪壑幸以遭逢聖主累忝殊榮承愷悌之恩居弼諧之地不能刻意砥礪憂國如家微效涓塵以裨川嶽遂乃專作威福敢樹朋黨有無君之心闕大臣之節潛通獫狁納賄不貲公引頑凶受賂無限醜問充斥穢行昭彰且境外之交情狀難測今娑葛反叛邊鄙不寧由此賊臣取怨中國論之者懼禍以結舌語之者避罪以鉗口但晉卿昔居榮職素闕忠誠屢抵嚴刑皆由黷貨今又叨忝頻沐殊恩厚祿重權當朝莫比曾無悛改苟徇贓私此而可容孰不可恕臣謬參直指義在觸邪請除巨蠹用答天造楚客處納晉卿等驕恣跋扈人神同疾不加天誅詎清王度並請收禁差三司推鞫識元武后朝官魏州刺史後為兵部郎中洪波振海終不到於蓬瀛流電促人詎有固於金石無不魂遊北斗水閱東川咸促半夜之山共盡明朝之露聞人不幸一去無歸洛川之風雪共銷陽臺之雲雨俱霽泉門永閉但聞松柏之聲繐帳空懸無復綺羅之色惜乎丈夫獨立親屬蔑如秋蘭匪植於庭砌春華詎榮於棣萼眷言為主寂寞無人切哀痛於仁兄慟悲涼於本正爭承即禮競執喪儀未終白鶴之榮詎盡青蠅之哭縣司直申情理非究禮經徒開弄法之門未杜簿書之路竊尋州斷實允公途以鄰主喪雅叶春卿之禮捨兄於罰殊乖秋典之文惟天子主萬邦家六合內有百揆四岳外有州牧侯長所以奉若天道綏厥兆人潤飾宏業光發徽頌昔漢宣帝憫嘆息之聲晉武皇緝垂拱之化以為統世御俗政平訟理與我共此者其惟良二千石乎於戲楊公德邁其職振文翁黃霸之風粹迪郭賀賈琮之道精厎慎財賦而行其禮典肅恭明神而敬事耆耋旌別淑慝俾克畏慕可謂其庶乎博施於人而能濟眾者公諱志本字文範宏農華陰人也其先出自周姬有伯僑者享封於晉食邑於楊命氏立宗權輿自此矣夫浤源濬泉則派流括地盤基窮麓則峯岑入天是以德富者其冑露繁英多者其族雲蔓故朱輪渥彩通侯震於十人白環深慶太尉傳於四葉天才雄逸自得曹植相推地望增華恥與王珣為比曾祖晉陳內使舍人臨海王府長史開蓬蔣遂交愛等九州刺史武康節公隋贈上開府儀同三司青冀等五州刺史有集行於代有詩入文會集精詞偉賦詭豔瑰音偶鄒陽之曳門代徐邈之居省割珪符於比景異俗知歸聞鼓吹於中霄累朝加贈大父林甫陳貞威將軍廣州都督隋上開府儀同三司渠芳等五州刺史上郡北平等五郡太守皇朝營州總管絳州刺史上柱國宜春郡公邑五千戶自吳飛楚聲軼湛盧從趙入秦價先和氏江南舊國委崇章於大樹關右新君延茂秩於開府既而隋綱就弛唐讖行徵公坐聽虵分暗期龍躍同荀彧之去紹來議深根等馬援之辭囂歸陳聚米高祖神堯皇帝深多決勝實念疇庸冊命且隆法三光而析壤循良是屬寄千里以專城烈考琮皇朝秦王府庫直太宗文武聖皇帝贈感舊賦一道詩三篇歷茂梓二州長史沔綏二州刺史上柱國叶贊經綸預參康濟耿純自結早申獻帛之誠吳質舊遊時蒙枉騎之眷幡旗長㦸門巷紛紛芝蘭玉樹階庭韡韡公吸太和之英液稟高明之淑氣松骨始萌早抱淩霜之操瑤精在璞更爍成虹之彩岐嶷自深惟友惟孝蒸蒸然純至日茂豈待乎浸潤之功而後滋也年甫六稔即丁內艱號不輟聲泣下成血絕漿絕粒毀劇成人大連少連曷云克邁自是名韻激射藝實汪洋希風者刮聽而彌仰挹道者洗矚而欣契杜安登學貴戚咸遺其書王粲在門中郎遽倒其履格不期峻而且高標削成量不期深自有天琛水怪施之於夏屋則可以灑桷編櫨排之於大川則可以衝濤截波矣年三十以右親衞調補石州司法參軍鵬圖未聘鴻漸初升惟敬五行以成三德習于公之待封憲陳氏之特寬樓煩之南咸知審克離石之境自以無冤轉桂州都督府法曹參軍清犴察梧囚明慎用法而不留獄都督周道務以公冰襟同潔石性渾堅庇惡木而深恥飲貪泉而不易奏充嶺南市閹闕一字珠玉使侁侁五嶠皇皇百越路窮南服境淑西屠握水衡之錢權御府之產歷剖蚌泣鮫之巨漲窺結綠珊瑚之怪穴自異時魁傑之士以事而臨其地罕有聲背於黷節全其貞將軍北旋猶見猜於薏苡大夫南使亦受遺於金裝而公散國財市蠻寶混之不濁而不緇易生人之所難凜然有伯夷之風矣以外憂去職百里而趨三年無改長輿哀苦國主念以增憂次翁服竟郡守逼而方釋服闋授始州司法參軍公九章惟精故三政居里小大必察洽於人心紫蒙軍大使駙馬周道務奏充營田判官考菑畬相墳衍申李悝盡力之教行商鞅急耕之賞候采落花動深曳棘故軍賴滋殖人無阻饑轉揚州高郵縣令加朝散大夫遷雍州吳原令道德齊禮風移俗易野翟依馴災蝗折去鑠庫兵以為器彈鳴琴以坐堂淮海之邦眾斯悅矣奏雍州司士闕邑人斯附矣遷卭州司馬兼平戎軍靈關道支度運糧使七羌九兵時間暴梗徵師練卒式張威防密徑通蜀窮關抵駹歷嚴道之卭崍緣漢嘉之折坂滑壤沮塗且疑泉覆淫澍不開莫殊天漏公審量中算廣蓄邊儲率擔夫竦餽卒膺隒墮腹陘危魚頡鳥頏轠轤不絕軍戎以濟豈慙流馬之功才幹方申猶兼展驥之任轉始州長史限以劍閣阻以石門張載勒銘之所范睢通棧之地邑戶遷逃厂墨里疎寂版籍徒紀征賦缺如公綏之斯懷集之斯至墳無輟享之鬼家有戀本之夫邦國不空既賴王祥之績吾無憂矣實惟蔣濟之能制公檢校棣州刺史俄而東胡叛換北狄猖狂鶚鈔虎飛海蹙雲沸殘破城邑殺略吏人激傷血於燕冀鋪割胔於恒碣兩河之土崩矣百姓之心搖矣則天皇后有命分麾寘懷撲燎班告㣥后時惟念哉公拜書雨泣杖節雷敺申畫郊圻慎固封守威以震敵惠以保甿故得境內無柝聲野外無塵影猶祭彤之有勇虜不敢窺若李廣之能飛寇恒警避賊平授使持節蘄州刺史蘄州蕪迥楚風輕亟磯連黃石之山江帶青林之浦公敷國典灑朝恩斟化源撰猷懿鎮動以德闔郡知方息競以義眾事攸敘貪殘盡去自使乳虎浮江災疫不生即有牽牛入界尋除都督潭衡等七州諸軍事潭州刺史建麾涉境先求異行停輿決訟應變如神興廢唯降其一書得失每詢於三老且青陽舊城白鷺通浦控引江嶺括集山谿交貿所競冠葢斯雜示之以無欲盜子悅化以歸農激之以至淳浮客感攜而請賦故年景未及於周次風化穆著於衡湘矣公以老浸生危官疲神耗深惟退身之誡頻奏乞骸之表制曰潭州都督楊志本歷官歲久懸車禮及宜遂請老之誡以就歸閑之美可聽致仕於是高謝方鎮卷懷條察俶圖輕舸特去江潭言念安車展游田里而災禽集舍息馬歸山長沙捐壽昊天不弔維長安四年秋八月十七日薨於州館享年七十有七號黎沸境慟庶蔞庭莫不若喪慈親願行衰絰雖倉慈既歿激深慕於圖形郭伋云亡注隤思於配社亦蔑茲尚矣惟公姿範端凝精符朗秀器含經濟而緯以斯文才抱圓通而幹以洵直宏虛受以廣納資用晦以沖謙遊其域則童幼警其卑野賤忘其窶泳其波則驕伐以酌損剛戾以克柔瑰節霜明偉尚煙竦橫德輝以爍邦族鏘嘉聞而滿區縣學成淵海隔風雨而恒觀辨若奔濤鑄鍵機而不發常慕汲黯寧為管仲維迹在公匪懷私已率誠任道深祈利物位愈高而魂益厲績既凝而心更勤食不貳味居不重席俸祿必散於孤親車馬共敝於同友實漢元以來未有可若斯人也夫人昌寧郡君河南長孫氏周尚書左僕射鄶國公儉之孫也體備柔閑道鍾清懿言而可式動必由禮纖累不挂於心浮偽豈迴其首肅侍巾櫛勉執紘綖邈邈承姑獲茝蘭而必獻拳拳訓子見俎豆而斯寧義渥旁周仁光下逮允釐中事載穆其序端儀麗軌抑不可選歟悲夫朝露未晞雲無處所同辟司徒之室初得賜封在季武子之階終聞許合以大足元年卒於蘄州官舍春秋六十九粵神龍元年八月二十五日合祔於咸陽舊塋禮也田疏畢陌樹鬱平陵立石前傾依然哭鳥之象野墳旁野別為埋鹿之標有子前永州司功景前左勳衞鉉等鳳毛齊整麟角早成孝思既深觀行無缺勤兼叔度遙迎蜀漢之喪潔比濬沖不受源州之贈封樹畢矣晨昏已矣永言報之誠罔極矣將憲乎銘鼎景鍾之迹茲所以昭德紀功之義迺虔集洪懿俾勒於翠石敢旌不朽焉其詞曰龜文爍電龍友先風三軍可指千里易窮疇克光配洪惟我公侯宗磊落襄系豐融世有象賢門傳清白牧守連起采章重赫義叶奉圖寵深同席德邁不匱慶流斯積昭哉嗣服穆穆厥聲恪慎克孝資忠以貞回涯江匯朗節霜橫儒林直秀吏道旁精爰視決曹志清叢人有哀淚形無慍色肅傳皇皇飲冰翼翼屢酌貪水寧罹譖薏典農燕塞轉食卭郵稔應銅雀卭來木牛自此康海旋移蔣州人安偉化虜懾雄謀昔離蘄服去思猶詠今鎮湘潭來歌轉盛府吏歸殖江神斷娉辭懇今行恩愈謝病如何迅息不享期頤鷹隨牽旐虎送還輀短矣清室孤魂久嫠既詢鄒母雙棺合茲漭昧真宅穹崇邱冢客土新封行椒舊拱惟哲嗣兮精孝泣昊天兮思重仰構代兮昆吾琢貞石兮岑竦嶠新唐書作嶠之字維嶽贈吏部侍郎師道子歷趙湖洛潤三州刺史入為中書舍人大理寺卿贈左散騎常侍臣聞昌容駐齡入遊恒岳觀香飛解受道緱山皆名列仙下闕咎繇之懋功承元元之上德故真氣全於乙妹道闕一字播於下闕高宗天皇大帝之孫睿宗大聖真皇帝之女我開元下闕彤闈夙承訓於姒則生知女範少協成人兌悅其儀居無下闕先帝之龍潛藩邸公主以王女受封蓋齠齔之時下闕先帝尚其誠心不奪雅志以丙午之歲度為女道士闕一字衣下闕姜鳳凰樓中聞學簫之秦女屬先帝席圖御極翼下闕邇鄰鳳城銅闕巍峩豈惟南裔之域銀題赫奕何間西州之宮下闕氣將巽風不散故得佩王母之秘籙呼玉女之闕一字辰既下闕邑一千四百戶雖湯沐增賦貴盛當時而珠玉滿堂賤之莫闕一字獨下闕彰寶歷而應天極麗窮神以宴以處豈不謂高其節行寵其下闕委氣大塊休躬天鈞齊彭殤於不夭泯貴賤以同塵冥下闕至如元母七寶之王母四童之藥咸摽上訣不闕一字停下闕形於東都開元觀春秋卌有四主上以天倫之闕二字傷下闕葬踰於吳國闕一字筮年尚遠權窆伊洛今龜言既闕一字陪葬下闕喜縣開國男裴允初備監護之儀銀青光祿大夫將作大匠上柱國下闕紫氣迎於函谷白鶴送於緱山瓊鳳哀鳴咽薤歌而欲絕黛雲下闕留跡徒聞闕一字斗而飛去幾劫仙羅之拂石乃為銘曰敤首虞妹娥皇帝子傳載封陳詩歌穠李葳蕤九闕一字崑耀百里比下闕水豈學平陽二章育性閑婉韞暉元默匪傲榮貴常棲道德闕一字縣下闕降月元女排煙㣥遊瓊圃序業金編四章二京樂土雙闕一字蘂下闕大數萬物同束次韭整奄示長息翛然解攜圍棊柯爛椿菌年齊六章慟切旒下闕伊洛之閒歲叶先遠陪葬橋山東辭鼎邑西度函關巽風下闕靈妃時過仙侶九章泉燈一門下兮無光壽陵萬古兮相望金鼎玉闕一字兮下闕春首餘寒惟闍梨動止安隱弟子虛乏謬承榮寄蒙恩獎擢授洺州一歲三遷自南徂北既近都邑忝竊彌深戰懼之時慙惶失據便即祗命末由頂謁瞻望山門但增悽斷願珍重怱怱不宣弟子徐嶠和南羲字伯華侍中文本孫第進士累遷太常博士神龍初拜中書舍人坐為敬暉草疏請削諸武之為王者左轉祕書少監進吏部侍郎右散騎常侍同中書門下三品睿宗立出為陝州刺史復歷刑戶二尚書遷侍中先天元年坐預太平公主謀逆誅臣暉等言臣聞神器者天下之至公必歸於有德皇極者域中之大寶必順乎天命歷考前古詳觀帝業皆不並興莫不更王故三皇氏沒而五帝氏興夏殷氏衰而周漢氏作何則帝王之歷數必應乎五行水盛則火衰木衰則金盛天地之運也必合乎四時春往則夏來暑退則寒集則知五行之數帝王不可違違之則宗社不安生人不理四時之序天地不能變變之則霜露不均水旱交錯自有隋失御海內崩離天歷之重歸於唐室萬方樂業荷撥亂之功三聖重光布生成之德可謂有功於四海有德於蒸人自宏道遏密生靈降禍百姓哀號如喪考妣則天皇帝臨御帝圖明目達聰躬親庶績則有讒邪凶孽誣惑叡德搆害宗枝誅夷殆盡英藩賢戚百不存一餘類在者投竄荒裔冤酷人神感傷天地忠臣義士實所痛心自天授之際僭稱改革武家子姪咸樹封建十餘年間實亦榮極時唐室藩屏豈得並封故知事有升降時使然也今則天皇帝厭倦萬務神器大寶重歸陛下百姓謳歌欣復唐業上至卿士下及蒼生黃髮之倫童兒之輩莫不歡欣舞抃如見父母豈不以唐家恩德感幽祇之心陛下仁明順天下之望今皇業重搆聖祚中興神祇之道有助於先德矣黎人之誠無負於陛下矣臣又聞之業不兩盛事不兩大故天無二日土無二王前聖之格言先哲之明誡自皇明反正天命惟新武家諸王封建依舊生者既加茅土死者仍追賦邑萬姓失望卿士寒心何則開闢以來罕有斯理帝王之道實無此法陛下縱欲開恩以行私惠豈可違五行之歷數乎乖四時之寒暑乎又海內眾情朝廷竊議為武氏諸王身計亦適將有損何則處之未得其所居之實恐不安陛下雖欲寵之翻乃陷之不遵古典故也且唐歷有歸周命巳去爵重則難保祿薄則易全又則天皇帝親政之時武氏諸王亦分外職今並居京輦不降舊封天下之心竊將不可陛下縱欲敦崇外戚曲流恩貸奈宗廟社稷之計何奈卿士黎人之議何伏願陛下為社稷之遠圖割私情之小愛內崇經邦之要外順遐邇之心豈不固宗廟之本允人靈之願則陛下巍巍之業貫三光而洞九泉親親之義上有倫而下有序臣等特承榮寵思竭丹衷既為唐臣實為唐計伏乞聖慈俯垂矜納俌中宗朝為右補闕遷祕書少監開元時為修圖書副使臣聞有虞咸熙苗人逆命殷宗大化鬼方不賓則戎狄交侵其來遠矣漢高帝納婁敬之議與匈奴和親妻以宗女賂以巨萬冒頓益驕邊寇不止則遠荒之地凶悍之俗難以德綏可以威制而降自三代無聞上策今匈奴不臣擾我亭障皇赫斯怒將整元戎臣聞方叔帥師功歌周雅去病耀武勳勒燕山則萬里折衝在於擇將春秋謀元帥取其說禮樂敦詩書晉臣杜預射不穿札而建平吳之勳是知中權制謀不在一夫之勇其蕃將沙吒忠義等身雖驍悍志無遠圖此乃騎將之材本不可當大任且師出以律將軍死綏秦克寸長平趙括受戮胡去馬邑王恢坐誅則棄軍有刑古之常典近者鳴沙之役主將先逃輕挫國威須正邦憲又其中軍既敗陣亂矢窮義勇之士猶能死戰功合紀錄以勸戎行賞罰既明將士盡節此擒敵之術也臣聞以蠻夷攻蠻夷中國之長算故陳湯統西域而郅支滅常惠用烏孫而匈奴敗請購辯勇之士班傅之儔旁結諸蕃與圖攻取此又掎角之勢也臣聞昔置新秦以實塞下宜因古法募人徙邊選其勝兵免其行役次廬伍明教令則狃習戎事究識夷情其所虜獲因而賞之近戰則守家遠戰則利貨趨赴鋒鏑不勞訓誓朝賦楊柳夕歌枤杜三年之後可以久安臣聞漢拜郅都匈奴避境趙命李牧林胡遠竄則朔方之安危邊域之勝負地方千里制在一賢其邊州刺史不可不慎擇得其人而任之蒐乘訓兵屯田積粟謹設熢燧精飾戈矛來則懲而禦之去則備而守之此又古之善經也去歲亢陽天下不稔利在保境不可窮兵使內郡黔黎各安其業擇其宰牧輕其賦徭事無過舉爵不以私愛人之財節其浮役惜人之力不廣臺榭察地利天時以趨耕穫命秋獮冬狩以教戰陣則數年之後有勇知方帑藏山積金革犀利然後整六軍絕大漠雷擊萬里風掃二庭斬蹛林之酋懸藳街之邸使百蠻震怖五兵載戢則上合天時下順人事理內以及外綏近以來遠以惠中國以靜四方臣少慕文儒不習軍旅奇正之術多愧前良獻替是司輕陳瞽議牧伯之命非不古也洎漢襲秦罷侯置守方制萬里以綏兆人令出王庭威行郡國南海興利東海詳刑人以阜安其流多矣至漢武帝初置刺史秩六百石掌察墨綬以下其黃綬以上則不察焉所以全長吏之威行不擾之政也至漢成帝改置州牧秩二千石遂以秩高自守而功業不著於是罷州牧又置刺史及東漢之時復置州牧王綱不振浸以陵夷則事之汙隆詳乎典策今天下諸州分隸都督專生殺之柄典刑賞之科若委非其人授受有失權柄既重疵釁或生又非強幹弱枝經邦軌物者也其新置都督事恐不便今巡察御史秩卑任重御史之流也委以時巡奸宄自禁伏請慎考古道率繇舊章法乾元之簡易守前王之令典俾夫化洽昇平務依貞觀制度矣帝王是宅河洛之陽雲闕巖巖列綺城之萬雉環途隱隱分體國之九經重閈交關樓臺相距屬陰風迴扇累日沈輝灑洪雨於四溟布族雲於千里煙凝萬井萍汛中衢半露官牆坐見室家之好全頹環堵行瞻湫隘之居且揆務黃圖參榮赤縣理雖謹察故典遵牧黎人必使溝洫廣開垣牆甚厚因茲法令正叶隨時坊人以東里北郭則邑居各異黔婁猗頓乃家產不侔奚事薄言佇遵恒式既資眾力須順人心垣高不可及肩板築何妨當面彥伯名洪以字顯亠兊州瑕邱人對策高第累擢職方員外郎奉迎中宗房州既踐位進太常少卿修武后實錄封高平縣子歷衞州蒲州刺史擢修文館學士工部侍郎轉太子賓客開元二年卒維帝唐八十有五載鴻徽鑠於縣㝢騰陽精握機矩還攝提以產氣配神明而作主倬四后之在天伊萬物之胥覩左日壑右星圃吹烈火於炎邱覿堅冰於委羽莫不匍匐我聲教駿奔我珪組納大荒之管鑰伏堪輿之扃戶茲可以孩黔羸扶盤古苞混茫而首出亦奚云於三五哉於穆我皇纂戎而昌青氣搖社白雲入房與天地合契與日月齊光杖太一敺㣥剛共工戮兮河嶽正旬始滅一作三苗格兮星辰張輯稽古之禮物懸象魏之舊章雖配天復禹繼嗣興湯者不其恧歟肇允神聖浸發葆命芬德馨香崇庸祗敬吟蓼蕭以游渥合枲桑而蘊正關石龢鈞飛沈翔泳擇明居之全法撰蒼渠之闕令則太階平而玉衡正也庶績洪凝賡歌浩作陰騭於下有孚煥若恢負勝之圖賁昭功之籥是以元龜遊乎湍瀨丹鳥吟於觀閣芝房菌蠢而玉英景雲璀璨而金萼雙觡共抵之獸躑躅苑山一稃二米之穎紛拏畎壑邦誦中和甿歌小毖歲合作噩日交長至遘朔旦之明期擇純陽之正地欲陳大旅展時事告紫宙之成功定皇天之寶位蜃鷩司典鳲鳩蕆職崇泰壇考星翼畫八卦以通道錯五行而辨域對越精祇森羅正直木巽火而殷薦豫乘雷以罔極載師清野土訓掃廛繚垣虹合參途電聯籠組帷以艾景覆皇邸以慶煙宮伯糾其禁內饔烹其鱻周廬攢搆以戢孴列纛抗莖而翩綿繩繩都人濟濟多士九牧之守百蠻之子莫不挈鴈提羔攢驂噎軌紛鴻溶以騰逗叛遹皇而佁儗或駢肩而側足候吾君之戾止若葵藿之傾離光同江河之赴溟水也然後啟端門警仙蹕雙鳳矯首六龍齊膝青斾雲紅旌彗日鏘玉鸞之鳴車羲按金雞之廣術傳畫角以啾嘈曳朱旗以駢坒呵風伯令戒道制元冥使司律此靈祇所以保綏皇天所以宥密於是闢龍次幸蜺幬鶉鳥司襄熊羆奉收皇帝乃彰畫黻襲大裘端玉珽肅珠旒翼翼穆穆遂臻於圜邱躬孝享擁神休設天宗之六席援長發之二球盥以明水薦以香羞陳蒼璧而咸事藉白茅而闡幽絜騂旄之泔淡酌元瓚之觩䚧盛哉坤極順天樞見邸乳祥開曾沙業薦赫禮數於彤壺布徽音於紫縣率先於金簿之蠶謹覆以瑤筐之鷰皇后介禮恭茲亞奠凝億兆之歡心注穹蒼之景眄紫微開兮天香滿神之來兮軒星纂黃鍾兮雪飛調大呂兮風煖戛雲和之寶瑟吟孤竹之清管石麟夭矯團翠煙而上征蕤鳳曶霍迓鴻釐之無算瑞氣蜿蜒於藪甸祥光熠爚於旄䍐三觶終獻萬祇呈醺昇羽節導靈㣥凝肆夏以青晷颺登歌而咽雲徽鸞鷖之颯沓致戩穀之絪縕禮畢功成天旋日轉宸儀允穆后庸胥展引大火之流旂迴夷庚之翠輦倪三巒之崇構御六氣之遙辨覽太元之神策張集靈之瑞典草木亨兮雷雨霶霈湛恩灑兮雲霄霮䨴壽觴霞舉兮絲竹龢筐篚岳立兮駢嵳峩天子方合符於大庭之國錯事以梁父之阿岱崱嶷兮青嶂汶泓澄兮紫波屯千轂以霆轉整萬轡而星羅則述易象者獻風行之繇談比興者奏時邁之歌蕩蕩乎巍巍乎無得而名言矣遂作頌曰煌煌靈臺告成功兮我君孝享亞坤宮兮純嘏布濩延皇穹兮惟策代表靄升中兮享壽千億傳無窮兮賢者徹侯求人之莫分帝之憂以為冀方輪轉病於行輈乃乘素秋鏡清流假道於河伯息肩於吳牛因去彼以取此遂舍車而造舟革故鼎新裁規創制通子房之妙畧運宏羊之潛計測淺深之量將載沉而載浮陳去就之宜則既濟而未濟懿夫席帆錦纜蘭橈桂檝不日而成嘉謨允叶蒲且罔設寧勞漁子之家財用無虧不奪農人之業水之積也厚船之動也捷迴翔並騖識波上之雙鳧忽孤飛見天邊之一葉伊負重以致遠非卬否而人涉及夫安卑委順外靜中虛混泥沙而閉矣象智者之居諸逐便乘流排難觸物泛波濤之不屈狀勇者之拂鬱船之時義吉無不利向之為材也標挺特之材今之為器也作殊常之器若往若來無顛無躓奢淫自戒厭殷帝之酒池遊戲無虞恥丹朱之陸地鷁首翩然魚鱗比川映汾陰之寶鼎參漢武之樓船當秋風之櫂唱明月以扣舷載廩儲而奉國達方物以朝天可以通河渭可以泝涇斯漸勞而永逸將冠古而爭先且知君子攸作務於遠大美利亟行莫不繫賴厥聲載路賡歌濟巨川之功史不絕書考課獲疇庸之最別有荷為衣兮蕙為帶鼓輕枻兮張翠蓋杳渺煙波之末夷猶區域之外願一涉於龍門接神仙之嘉會班孟堅輟編史閣掌記戎幕坐燕阜之陽覽秦城之作喟然而嘆曰傅翼下鞲視人則媮鯨吞我寶鼎蠶食我諸侯鞭撻我上國動搖我中州所以二世而隕職此之由乎當其席卷之初攻必勝戰則克因利乘便追亡逐北自以為功勤三王威懾萬國重鉄鑕干戈於仁義輕詩書禮樂於殘賊然後馳海若以為梁斷陽紆以為藪犀象有形而採掇珠玉無脛而奔走朝則貪豎比肩野則庶人鉗口負關河千里之壯言帝王一家之有神告籙圖亡秦者胡實懵蕭牆之嬖濫行高闕之誅鑿臨洮之西徼穿負海之東隅猛將虎視焉存綱紀謫戍勃興鈎繩亂起連連塢壁岌岌亭壘飛芻而輓粟者十有二年塹山而堙谷者三千餘里黔首之死亡無日白骨之悲哀不已猶欲張伯翳之絕允馳撐犂之驕子曾不知失全者易傾逆用者無成陳涉以閭左奔亡之師項梁以全吳趫悍之兵夢驂徵其敗德斬蛇驗其鴻名板築未艾君臣顛沛六郡沙漠五原旌斾運歷金火地分中外因虐主之淫愎成後王之要害則知作之者勞而居之者泰歲次單閼我行窮髮眇默雞田幽陰馬窟土色紫而關迴川氣黃而塞沒調噪鼓於海風咽愁笳於隴月試危坐以側聽孰不消魂而斷骨哉況復日入青波堅冰峩峩危蓬隕蔕森木靜柯㣥峯雪滿聯峴霜多龍北臥而銜燭鴈南飛以渡河載馳載驟彼亭之唯見元洲無春陰壑罷晝鷙隼爭擊哀猱直透饑鹿夜咆乳虎晨鬬蟄熊舐掌寒龜縮殼悲壯圖之夭遏憫勞生之艱遘昔者韓信猜叛李陵拘執望極燕臺山橫馬邑戰雲愁聚衝飈晦急莫不陵地脈以扣心望天街以隕泣亦有王昭直送蔡炎未還路盡南國亭臨北蠻貯漢月於衣袖裛胡霜於髻鬟雖寵盈氊幄而魂斷蕭關至若趙王遷逐馬融幽放去家離土渝沙歷障夢蠨蛸之戶側坐蠮螉之塞上桃李夕兮有所思綺羅春兮遙相望登毀垣以擗摽坐頹隅以惆悵是以衞青開幕張遼闢土校尉嫖姚將軍捕虜薙垣鋪障鉏亭伐鼓斬元於鐵防之門流血於金河之浦張虎牙以泄憤糺蝟鬚以蓄怒及夫中郎殉節博望踰邊取劍仆地尋河際天幽海上而萬里竄胡中而幾年銀車洊出玉節仍旋南向國以樂只北違沙以莞然嗚呼長城之設載逾九百古往今來巋然陳迹窮海戰士孤亭戍客登峻墉陟穹石嗟故里而不見感殊方以隕魄者亦何可勝道哉嗟我羈淪南庭苦辛長懷壯士永慕忠臣經百戰之戎俗對三邊之鬼隣徐樂則燕北書生開偉詞而諭漢賈誼則洛陽才子飛雄論以過秦歲崢嶸而將暮實慷慨於窮塵維景龍四年歲次庚戌六月辛巳朔二日壬午大行應天神龍皇帝崩於神龍殿旋殯於太極殿之西階粵景雲元年十一月二日乙酉將遷座於定陵禮也畫攢毀帟雕轀肅軔縞紼霜迴丹旂雪引御穸臺之眇默背天閤之崇峻皇帝瞻在原之墜響感聯萼之凋陰禮奠收兮泣遺迹同氣訣兮悲聖心爰命下臣式揚鴻懿咨睿烈於金牒刻明猷於玉字其詞曰少典之子重元之孫珠聯寶系海浸昌源鳳鳥鳴國蛟龍守門於鑠皇朕赫應成命青靄南浮彤雲北映掃刷中㝢光亨累聖欽若應天纘戎前慶身佩星斗掌提曦鏡克明克睿允武允文就之如日望之如雲聲中律呂辭含典墳道懋登庸榮膺繼體位擁青陸業移朱邸春誦夏絃冬詩秋禮復子明辟固天攸啟鵬舉提象鸞飛鑿乾蘿圖已御芝璽仍傳拱默當宁賡歌撫絃堯親更睦媯德逾羶萬寶阜成四門光闢宵衣若厲道風猶戹野接翹車殿橫儒席留連鎬讌婉孌辭客潤洽泉草一作魚恩周卉毳鞮譯騖輪要荒走幣削觚反樸寬刑薄稅俗富京坻人忘疵癘帝圖廣運天意難誣旖旎祥籙張皇瑞符仙芝抱砌神萐搖廚龜負綈檢麟銜斗樞孝思罔極崇庸克賽親幸國陽式陳昭配翠輦容與蜺幬晻曖蒼璧森羅明祇肅對元經備典洪範盈疇將竦華蓋遙封岱邱厭紫宙之阨僻追白雲之豫遊時若慕於喪妣道空存於委裘嗚呼哀哉惟幾在辰穆卜違吉仍几虛座綴衣空室景沴攝提悲厂田坴翼日㣥臣奉於末命天下悲乎晏出嗚呼哀哉宗伯莅典同軌赴辰龜謀入兆犀鞟移輴喝苦挽於香掖咽酸笳於曙旻彤堦皛皛兮露驚月玉座微微兮花掩塵嗚呼哀哉列綺城之哀仗引滋橋之渡幰朔飈急兮御道寒愁日晦兮雲郊晚駐石馬之新塗下金天之舊坂見疎杏之原長覺深松之路遠嗚呼哀哉伊昔睿喆光謀壽宮猗那我后復幸方中委冠劍於泉穸保明靈於昊穹山有移兮海有變道無闕兮聲無窮嗚呼哀哉書曰唯口起羞惟甲冑起戎又云齊乃位度乃口易曰慎言語節飲食又云出其言善千里應之出其言不善千里違之禮亦云可言也不可行也君子不言也可行也不可言也君子不行也嗚呼先聖知言之為大也知言之為急也精微以勸之典謨以告之禮經以防之守名教者何可不修其詁訓而服其糟粕乎故曰言語者君子之樞機動則物應物應則得失之兆見也得之者江海比鄰失之者肝膽楚越然後知否泰榮辱繫於言乎夫言者德之柄也行之主也志之端也身之文也既可以濟身亦可以覆身故中庸鏤其心右階銘其背南容三復於白圭箕子九疇於洪範良有以也是以掎摭瑕玷詳黜躁競審無恒以階亂將不密以致危利生於口森然覆邦之說道不由衷變彼如簧之刺可不懼之哉其有識暗邪正慮微形眹破金湯之籥封禍亂之根用詀讘為雄辯以號詉為令德至若梧宮問答荊齊所以奔命韓魏加肘智伯所以危殘蔡侯繩息媯也亟招甲兵之罰鄭曼圖宋卿也而受鼎鑊之誅史遷輕議終下蠶室張紘詭說更齒龍泉凡此過言其流匪一或穢猶糞土或動成刀劍或苟且其心或脂膏其吻挾邪作蠱守之而不懈往輒破的去之而彌遠亦何異韓盧聚音尨也㣥吠得死為幸何修名之立乎雖復伯玉沮顏追謝於元凱蔣濟遺恨失譽於王陵犀首沒齒於季章曹瞞齚舌於劉主當何及哉孔子曰子欲無言又云終身為善一言敗之惜乎老子亦云多言數窮又云聰明深察而近於死者議人者也何聖人之深思偉慮杜漸防萌之至乎夫不可言而言者曰狂可言而不言者曰隱鉗舌拱默曷通彼此之懷括囊而處孰啟謨明之訓則上言者下聽也下言者上用也睿喆之言猶天地也人覆燾而生焉大雅之言猶鐘鼓也人考擊而樂焉作以龜鏡周公之言也出為金石曾子之言也存其家邦國僑之言也立而不朽臧孫之言也是為德音諧我宗極滿於天下貽厥後昆殷宗甘之於酒醴孫卿諭之以琴瑟闕里重於四時郢郡輕其千乘豈不韙哉豈不休哉但懋探大猷克念丕訓審思而應精慮而動謀其心以後發定其交以後談不蹙趨於非黨不屏營於詭遇非先王之至德不敢行非先王之法言不敢道翦其纍纍之緒撲其炎炎之勢自然介爾景福錫茲純嘏則悔吝何由而生怨惡何由而至哉孔子曰終日行不遺已患終日言不遺巳憂如此乃可以言也戒之哉戒之哉美原北澗有神泉生焉裕明子明臺子尋故人韋炟因遊之烏戲泉潭虛融派流徑復信造化之極神明之儁也裕明子乃盥焉明臺子乃潄焉相視而笑曰異哉豈太平殊感而循化有助邪則韋子蓋文章之雄也昔投雅興諒無言而不酬云仁諝聖歷中官司禮博士臣等謹按經史正文無天子每月告朔之事唯禮記玉藻云天子聽朔於南門之外周禮天官太宰正月之吉布政於邦國都鄙干寶注云周正建子之月吉朔日也此即玉藻之聽朔矣今每歲首元日於通天宮受朝讀時令布政事則京官九品以上諸州朝集使等咸列於庭此則聽朔之禮畢而合於周禮玉藻之文矣而鄭元注云玉藻聽朔以秦制月令有五帝五官之事遂云凡聽朔必特牲告其時帝及其神配以文王武王此鄭注之誤也故漢魏至今莫之適用按月令云其帝太昊其神勾芒者謂宣布時令告示下人其令詞云其帝其神耳所以為敬授之文欲使人奉其時而務其業每月有令故謂之月令非謂天子每月朔日以祖配帝而祭告之其每月告朔者諸侯之禮也故春秋左氏傳曰公既視朔遂登觀臺又鄭注論語云禮人君每月告朔於廟有祭謂之朝享魯自文公始不視朔是諸侯之禮明矣今王者行之非所聞也按鄭所謂告其帝者即太昊等五人帝其神者即重黎等五行官雖並功施於人列在祀典無天子每月拜祭告朔之文臣等謹檢禮論及三禮義宗江都集禮貞觀禮顯慶禮及祠令並無天子每月告朔之事若以為代無明堂故無其告朔之禮則江都集禮貞觀禮顯慶禮及祠令著祀五方上帝於明堂即孝經宗祀文王於明堂也此則無明堂而著其享祭何為告朔獨闕其文若以君有明堂即合告朔則周秦有明堂而經典正文並無天子每月告朔之事臣等詳求今古博考載籍既無其禮不可習非望請停每月一日告朔之祭以正國經竊以天子之尊而用諸侯之禮非所謂頒告朔令諸侯使奉而行之之義也謹議
