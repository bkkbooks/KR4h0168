front:
  text: 全唐文欽定全唐文卷八百六十四昭字潛夫本名昭遠避漢祖諱止稱昭仕後唐累遷禮部侍郎入晉歷尚書右丞漢初為吏部侍郎乾祐二年加檢校禮部尚書周廣順初拜戶部尚書顯德元年遷兵部恭帝即位封舒國公入宋開寶五年卒
  hash: sha256:a807a6fe7deae27e34c0e2a9cdbabf9f5d82c2109c162ae2c58e0e3de6cdc5c5
  markers:
  - {type: head, offset: 14, content: 張昭, id: KR4h0168_NFKB_864-h1, level: 1}
body:
  text: 臣本書生不嫺武藝空忝穰苴之位慙無卻縠之能遽捧綸言令纂兵法雖彊三宮之說何稱九天之謀伏惟陛下玉斗纘戎金樓聚學九舜十堯之典不足揣摩三門五將之書無煩接要而猶申旦不寐乙夜縱觀畱連於尺籍伍符探賾於楓天棗地以為人情貴耳而賤目儒者是古而非今以韓白之智有餘英衛之才不足寧悞滋水釣翁之學今迺椎輪圮橋神叟之言已為糟粕無足師模於鈐算聊可挹酌於源流爰命下臣撮其樞要臣逖觀前代兵家所著篇部頗多自唐末亂離圖書流落今蘭臺秘府目錄空存其餘討論固難詳悉今秖據臣家所有之書摭其兵要自軍旅制置選練教習安營結陣命將出師詭譎機權形勢利害賞罰告誓攻守巧拙星氣風角陰陽課式等都四十二門離為十卷管窺蠡測莫知穹渤之高深獸走犬馳且副蒐苖之指使既成卷部須有籤題臣伏見前代奉詔撰論皆目為制旨今輒準故事題為制旨兵法臣畱司都下不敢輒去班行謹差私吏齎詣行闕陳進臣前月中預都省集議宗廟事伏見議狀於親廟外請別立始祖一廟近奉中書門下牒再令百官於都省議定聞奏者臣讀十四代史書見二千年故事觀諸家宗廟都無始祖之稱惟殷周二代以稷契為太祖禮記曰天子七廟三昭三穆與太祖之廟而七鄭元注云此周制也七者太祖后稷及文王武王與四親廟也又曰殷人六廟契及湯與二昭二穆也夏后氏立五廟不立太廟唯禹與二昭二穆而已據王制鄭元所釋即殷周以稷契為太祖夏后氏無太祖亦無追諡之廟自殷周以來時更十代皆於親廟之中以有功者為太祖無追崇始祖之例共引今古即恐詞繁事要證明須陳梗概漢以高祖父太上皇執嘉無社稷功不立廟號高帝自為高祖魏以曹公相漢垂三十年始封於魏故為太祖晉以宣王輔魏室有功立為高祖以景帝始封於晉故為太祖宋氏先世官閥卑微雖追崇帝號劉裕自為高祖南齊高帝之父位至右將軍生無封爵不得為太祖高帝自為太祖梁武帝父順之佐祐齊室封侯位至領軍丹陽尹雖不受封於梁亦為太祖陳武帝父文讚生無名位以武帝功梁室贈侍中封義興公及武帝即位亦追為太祖周閔帝以父泰相西魏經營王業始封於周故為太祖隋文帝父忠輔周室有大功始封於隋故為太祖唐祖神堯祖父虎為周上柱國隋代追封唐公故為太祖唐末梁氏朱氏有帝位變四廟朱公先世無名位雖追冊四廟不立太祖朱公自為太祖此則前代追冊太祖不出親廟之成例也王者祖有功而宗有德漢魏之制非有功德不得立為祖宗殷周受命以稷契有大功於唐虞之際故追尊為太祖自秦漢之後其禮不然雖祖有功乃須親廟今亦粗言往例以取證明秦稱造父之後不以造父為始祖漢稱唐堯劉累之後不以堯累為始祖魏稱曹參之後不以參為始祖晉稱趙將司馬卬之後不以卬為始祖宋稱漢楚元王之後不以元王為始祖齊梁皆稱蕭何之後不以何為始祖陳稱太邱長陳寔之後不以寔為始祖元魏稱李陵之後不以陵為始祖後周稱神農之後不以神農為始祖隋稱楊震之後不以震為始祖唐稱皋陶老子之後不以皋陶老子為始祖唯唐高宗皇帝則天武后臨朝革唐稱周更立七廟仍追冊周文王姬昌為始祖此蓋當時附麗之徒不諳故實武立姬廟乖越以來曲臺之人到今嗤誚臣遠觀秦漢下洎周隋禮樂衣冠聲名文物未有如唐室之盛也武德議廟之初英才間出溫魏顏虞通今古封蕭薛杜達禮儀制度憲章必有師法夫追先祖之儀起於周代據史記及禮經云武王纘太王王季文王之緒一戎衣而有天下尊為天子宗廟享之周公成文武之德追王太王王季祀先公以天子之禮又曰郊祀后稷以配天據此言之周武雖祀七世追為王號者但四世而已故自東漢以來有國之初多從四廟從周制也況殷因夏禮漢習秦儀無勞博訪之文宜約已成之制請依隋唐有國之初創立四廟推四世之中名位高者為太祖謹議以聞文武常參官每日於正衙立班閣門使宣不坐後百寮俱拜舊制唯押班宰相押樓御史通事舍人各緣提舉贊揚所以不隨庶官俱拜自唐天成末議者不悉朝儀遽違舊典遂令押班之職一例折腰此則深忽禮文殊乖故實且宰相居庶寮之首御史持百職之綱嚴肅禁庭糾繩班列慮於拜揖之際或爽進退之宜於是凝立靜觀檢其去就若令旅拜旅揖實恐非宜況事要酌中恭須近禮人臣愛主不在於斯其通事舍人職司贊導比者兩班進退皆相其儀今則在文班武班之前居一品二品之上端笏齊拜禮實未聞其押班宰相押樓御史通事舍人並請依天成三年以前禮例施行無至差忒撰漢書者先為項傳編蜀記者首序劉璋所貴神器之傳授有因歷數之推遷得序伏緣漢隱帝君臨在太祖之前其歷試之績並在漢隱帝朝內請先修隱帝實錄以全太祖之事功又梁末主之上有郢王友珪篡弒君位未有記錄請依宋書劉劭例書為元兇友珪其末主請依古義書為梁廢帝其書曰後梁實錄唐末主之前應順帝在位四月出奔亦未編記請書為前廢帝清泰主為後廢帝其書並為實錄兼請於諸道搜索圖記今月十二日伏蒙宸慈召對面奉聖旨以每年祀祭多用太牢念其耕稼之勤更備犧牲之用比諸豢養特可愍傷令臣尋討故事可以他牲代否臣仰稟綸言退尋禮籍三牲八簋之制五典六樂之文著在典彞迭相沿襲累經朝代無所改更臣聞古者燔黍捭豚尚多質畧近則梁武麥丏牲笋脯不可宗師雖好生之德則然於奉先之議太劣蓋禮主於敬孝本因心黍稷非馨鬼神饗德不必牲牢之巨細籩豆之方圓苟血祀長保於宗祧而牲俎何須於繭栗但以國之大事儒者久行易以他牢恐未為便以臣愚見其南北郊宗廟社稷朝日夕月等大祠如皇帝親行事備用三牲如有司攝行事則用少牢以下雖非舊典貴減犧牛汴州在梁室朱氏稱制之年有京都之號及唐莊宗平河南復廢為宣武軍至明宗行幸之時掌事者因緣修葺衙城遂挂梁室時宮殿門牌額當時識者或竊非之一昨車駕省方暫居梁苑臣觀衙城內齋閣牌額一如明宗行幸之時無都號而有殿名恐非典據臣竊尋秦漢以來寰海之內鑾輿所至多立宮名近代隋室於揚州立江都宮太原立汾陽宮岐州立仁壽宮唐朝於太原立晉陽宮同州立長春宮岐州立九成宮宮中殿閣皆題署牌額以類皇居臣伏准故事請於汴州衙城門權挂一宮門牌額則其餘齋閣並可以取便為名庶使天下式噡稍為宜稱者內銓見行用十道圖除舊雒都並都外有新昇京都及節度防禦團練等名目不一又自明宗已來迴避廟諱所改州縣名多未結入十道圖銓司入官之時格式旋簡元勅施行未曾添入十道圖無所準的請下當司改定侍御史知雜事張湜等九人奉詔編集刑書悉有條貫兵部尚書張昭等一十人參詳旨要更加損益臣質臣溥據文評議備見精審其所編集者用律為主辭旨之有難解者釋以疏意義理之有易了者畧其疏文式令之有附近者次之格勅之有廢置者又次之事有不便於今該說未盡者別立新條於本條之下其有文理深古慮人疑惑者別以朱字訓釋至於朝廷之禁令州縣之常科各以類分悉令編附所冀發函展卷綱目無遺究本討源刑政咸在其所編集勒成一部別有目錄凡二十一卷刑名之要盡統於茲目之為大周刑統欲請頒行天下與疏律令式通行其刑法統類開成格編敕等採掇既盡不在法司行使之限自來有宣命指揮公事及三司臨時條法州縣見今施行不在編集之數應該京百司公事逐司各有見行條件望令本司刪集送中書門下詳議聞奏昔周公相成王制禮作樂殿庭徧奏六代舞所謂雲門大咸大韶大夏大濩大武也周室既衰王綱不振諸樂多廢惟大韶大武二曲存焉秦漢以來名為二舞文舞韶也武舞武也漢時改為文始五行之舞歷代因而不改貞觀作樂之時祖孝孫改隋文舞為治康之舞武舞為凱安之舞貞觀中有秦王破陣樂功成慶善樂二舞樂府又用為二舞是舞有四焉前朝行用年深不可遽廢俟國家偃伯靈臺即別召工師更其節奏今改其名具書如左祖孝孫所定二舞名文舞曰治康之舞請改治安之舞武舞曰凱安之舞請改為振德之舞貞觀中二舞名文舞功成慶善樂前朝名九功舞請改為觀象之舞秦王破陣樂前朝名為七德舞請改為講功之舞其治安振德二舞請依舊郊廟行用以文舞降神武舞送神其觀象講功二舞請依舊宴會行用昔周朝奏六代之樂即今二舞之類是也其賓祭常用別有九夏之樂即肆夏皇夏等是也梁武帝善音樂改九夏為十二雅前朝祖孝孫改雅為和示不相沿也臣今改和為成取韶樂九成之義也十二成樂曲名祭天神奏豫和之樂請改為禋成祭地祇奏順和請改為順成祭宗廟奏永和請改為裕成祭天地宗廟登歌奏肅和請改為肅成皇帝臨軒奏大和請改為政成王公出入奏舒和請改為弼成皇帝食舉及飲宴奏休和請改為德成皇帝受朝皇后入宮奏正和請改為扆成皇太子軒懸出入奏成和請改為允成元日冬至皇帝禮會登歌奏昭和請改為慶成郊廟俎入奏雍和請改為騂成皇帝祭享酌獻讀祝文及飲福受胙奏壽和請改為壽成祖孝孫元定十二和曲開元朝又奏三和遂有十五和之名凡制作禮法動依典故梁置十二雅蓋取十二天之成數契八音十二律之變輒益三和有乖稽古又緣祠祭所用不可盡去臣取其一焉祭孔宣父齊太公廟降神奏宣和請為師雅之樂三公升殿會訖下階履行奏祴和請廢同用弼成享先農耕耤奏豐和請廢同用順成已上四舞十二成雅樂等曲今具錄合用處所及樂章首數一一條例在下昔帝鴻氏之制樂也將以範圍天地協和人神候八節之風聲測四時之正氣器之清濁不可以筆授聲之善否不可以口傳故鳬氏鑄金伶倫截竹為律呂相生之算宮商正和之音乃播之於管絃宣之於鐘石然後覆載之情訢合陰陽之氣和同八風從律而不奸五色成文而不亂空桑孤竹之韻足以禮神雲門大夏之容無虧觀德然月律有旋宮之法備於太師之職經秦滅學雅道陵夷漢初制氏所調惟存鼓舞旋宮十二均更用之法世莫得聞漢元帝時京房善易別音探求古義以周官均法每月更用五音乃立準調旋相為宮成六十調又以日法析為三百六十傳於樂府而編懸復舊律呂無差遭漢中微雅音淪缺京房準法屢有言者事終不成錢襃空記其名沈重但條其說六十律法寂寥不傳梁武帝素精音律自造四通十二律以鼓八音又引古五正二變之音旋相為宮得八十四調與律準所調音同數異侯景之亂其音又絕隋朝初定雅樂㣥黨沮議歷載不成而沛公鄭譯因龜茲琵琶七音以應月律五正二變七調克諧旋相為宮復為八十四調工人萬寶常又減其絲數稍全古淡隋高祖不重雅樂令儒官集議博士何妥駮奏其鄭萬所奏八十四調並廢隋氏郊廟所奏惟黃鐘一均與五郊迎氣雜用蕤賓但七調而已其餘五鐘懸而不作三朝宴樂用縵樂九部迄於革命未能改更唐太宗受命舊工祖孝孫張文收整比鄭譯萬寶常所均七音八十四調方得絲管竝施鐘石俱奏七始之音復振四廟之韻皆調自安史亂離咸秦盪覆崇牙樹羽之器掃地無餘戛擊搏拊之工窮年不嗣郊廟所奏何異南箕波蕩不遷知音始絕臣等竊以音之所起出自人心夔曠不能常泰人亡則音息世亂則樂崩若不深知禮樂之情安能明制作之本陛下心苞萬化學富三雍觀兵耀武之功已光鴻業尊祖禮神之致尤軫皇情乃睠奉常痛淪樂職親閱四懸之器思復九奏之音爰命廷臣重調鐘律樞密使王朴採京房之準法練梁武之通音攷鄭譯寶常之七均校孝孫文收之九變積累黍以審其度聽聲詩以測其情依權衡嘉量之前文得備數和聲之大旨施於鐘虡足洽簫韶臣等今月十九日於太常寺集命大樂令賈峻奏王朴新法黃鍾調七均音律和諧不相凌越其餘十一管諸調望依新法教習以備禮寺視用其五郊天地宗廟社稷三朝大禮合用十二管諸調竝載唐史開元禮近代常行廣順中太常卿邊蔚奉勅定前件祠祭朝會舞名樂曲歌詞寺司合有簿籍伏恐所定與新法曲調聲韻不協請下太常寺檢詳校試如或乖舛請本寺依新法聲調別撰樂章舞曲令歌者誦習永為一代之法以光六樂之書臣聞安不忘危治不忘亂者先儒之丕訓靡不有初鮮克有終者前經之至戒究觀例辟莫不以驕矜怠惰有虧盛德恭惟太宗貞觀之初元宗開元之際焦勞庶政以致太平及國富兵消年高志逸乃忽守約之道或貽執簡之譏陛下以慈儉化天下以禮法檢臣鄰絀姦邪之黨延正直之論務遵純儉以節浮費信賞必罰至公無私其創業垂統之規如貞觀開元之始願陛下有始有終無荒無怠臣又伏念保邦之道有八審焉願為陛下陳之夫委任審於材器聽受審於忠邪出令審於煩苛興師審於德力賞罰審於喜怒毀譽審於愛憎議論審於賢愚嬖寵審於奸佞推是八審以決萬機庶可以臻至治太祖初鎮太原每年打鹿於北鄙先帝在位暇日射雁於近郊此蓋軍務之餘畋遊自適洎先帝膺圖啟祚嚮明御宇則宜易彼諸侯之事肅乎萬乘之儀而猶因習舊風失其威重馳逐原獸殆無虛日臣愚以為事有可畏者四焉洛都舊制宮城與禁苑相連人君宴遊不離苑囿御馬來往輦路坦夷不涉荒郊何憂蹶失今則驅馳驂服涉歷榛蕪此後節氣嚴凝徑塗凍滑萬一有銜橜之變陛下縱自輕柰宗廟社稷何所可畏者一也又陛下新有四海宜以德服萬邦今則江嶺未平淮夷尚梗彼初聞陛下革先朝之失政還太古之淳風御物以慈節財以儉有典有則不矜不驕彼必有三苗率服之心七旬來格之意如聞陛下暫遊近甸彼即以為復好畋遊所可畏者二也臣又聞作法於涼其弊猶貪作法於貪弊將何如且打鹿射雁之事新敗軌傾輈之轍在常宜取鑒不可因循所可畏者三也臣又聞作事可法貽厥孫謀若以陛下齊聖廣淵之機聰明神光之量奚可以宴遊蒐狩之事少累聖明所謂城中好廣眉城外加半額為法之弊靡不由茲所可畏者四也伏望陛下居高慮遠慎始圖終思創業之艱難知守成之不易念老氏馳騁之戒樹文王忠厚之基約三驅之舊章定四時之遊幸始出有節後不敢違謹奏臣聞周家創業七百年漢氏延洪四百載非惟天命抑亦人謀臣雖至愚粗聞其要叨居諫列備敢奏陳古者人君即位之後立嫡以為儲闈列土而封子弟既尊之以名品復教之以訓詞則驕奢淫逸不萌於心仁知賢明以習其性良繇擇正人以為師傅聞善事益其聰明假使中材亦成良器凡人善惡之性多因染習而成將創無窮所宜重甚竊以元良宗子邦國本根或陛下未欲封崇先宜教導所貴識古今之成敗知稼穡之艱難使驕縱不期於心正道嘗聞於耳輒條芻管仰瀆冕旒事具於後一帝王之子生長深宮爰自幼沖便居逸樂目厭雕華之翫耳煩絲竹之音所謂不與驕期而驕自至倘非天生聰惠神授賢明持此驕盈焉能無惑苟不預為教導何以致之盤維臣竊見先帝時皇弟皇子盡喜俳優聞無稽玩物之言則娛心悅耳告致理經邦之說則俛目嚬眉入則務飾姬姜出則思參僕馬親賓滿座無非優笑之徒食客盈門罕有賢能之士以此知識以此宗師必若託以維城付之主鬯無難亡之國無不破之家其則非遙可謂殷鑒臣請諸皇子各遵古議置師傅之官如陛下厚之以渥恩課之以訓導令皇子屈身師事每日講說善道一日之中但記一事一歲之內所記漸多每至月終令師傅具錄聞奏或皇子上謁之時陛下更令侍臣面問十中得五為益良多何必讀書自然博識既達安危之理兼知成敗之繇主鬯維城何往不可臣雖識短事繫遠圖伏乞陛下詢於公卿以為可否一臣聞古之人君即位而冊太子封拜諸王究其所繇蓋有深旨一則欲尊儲闈而作磐石繫我宗枝一則欲分嫡庶而辨親疎各歸名分使庶不亂嫡疎不間親禮秩有常邪慝不作臣竊見近代聖后賢君或有失於此道以此邦家搆患釁隙萌生昔隋祖聰明煬帝亦傾於楊勇太宗睿聖魏王終覆於承乾臣每讀古書深悲其事願於聖代無此厲階其於卜貳封崇在臣不敢輕議臣請諸皇子於恩澤賜與之間婚姻省侍之際依嫡庶而為禮秩據親疎而定節文示以等威絕其僥倖保宗之道莫大於斯一臣聞上聖之才不修崇而合道中人之性隨染習而無常是故告以話言束之名教猶蹈覆車之轍不師銘座之言而況左右全闕正人染習不聞善事欲求賢行其可得乎伏見近代師傅之官所設備員而已未聞調護太子訓導諸王坐食俸錢誠為尸祿臣請皇子中當為儲位者雖未封拜先要切磋應在朝官寮師傅之官請每日謁見皇子或講論時政或習熟禮容日增月修有益無損在臣愚識以此為憂伏乞陛下付公卿詳議以為可否伏惟皇帝陛下仁深拜善道在勵精行慈儉而愛生靈正賞罰而激貞濫內外皆無闕政左右盡是賢臣諫者無以措詞多士惟期自勵臣豈合遽陳狂瞽輒犯宸嚴但以恩未報於君親事實關於國本庶裨萬一聊罄再三臣聞江海不讓於細流所以成其大山岳不讓其撮土所以成其高王者不倦昌言所以成其聖臣歷觀前代乃至近朝遍閱聖君無不好學故楚靈王軍中決勝不忘倚相之書漢高帝馬上爭衡猶聽陸生之說遂得宸謀益治宗社延長伏惟皇帝陛下纘禹丕圖受堯成法春秋鼎盛四聰不惑於咨詢廊廟謀深六藝何妨於講習古者或立儒宮或開文館旁求巖穴之士延納草澤之才雖有前規伏恐未暇況國家設官分職選賢任能有輔弼講其國經有師傅啟其言路可以談天人之際可以陳理亂之繇但能屬耳於典謨何必服膺於卷軸伏望陛下聽政之餘數召近臣討論經義所冀熟三綱五常之要窮九疇八政之源縱無取於儒冠猶冀賢於博奕臣聞諫官進言御史持法實人君之耳目正邦國之紀綱自本朝以來尤重其任今之選授莫匪端良然則彈奏之間尚未申於才用使諫諍之道或未罄於箴規俾七人徒歷於清華三院但循於資級考其志業孰測短長臣請依本朝故實許御史以法冠彈事諫官逐月給諫紙政事有所不便並許陳聞所冀履班行者不負於君親有才業者自分於涇渭庶幾舉職免有曠官昔唐初劉洎馬周起於徒步太宗權用為相其後柳璨朱朴方居下僚昭宗亦加大用此四士者受知於明主然太宗用之而國興昭宗用之而國亡士之難知如此臣願陛下存舊法而用人當以此四士為鑒戒
