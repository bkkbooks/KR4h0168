front:
  text: 全唐文欽定全唐文卷五百四十八韓愈二
  hash: sha256:280e97cf7c23c0dbeb928caa996e625d7655acff766bff7bdaa3a7231fbf08fd
body:
  text: 臣某言伏奉今日制書以臣為朝議大夫守中書侍郎同中書門下平章事承命驚惶魂爽飛越俯仰天地若無所容臣某誠惶誠恐頓首頓首臣少涉經史粗知古今天與朴忠性惟愚直知事君以道無憚殺身慕當官而行不求利已人以為拙臣行不疑元和之初始拜御史旋以論事過切為宰臣所非移官府廷因佐戎幕陛下恕臣之罪憐臣之心拔居侍從之中遂掌絲綸之重受恩益大顧己益輕苟耳目所聞知心力所逮及少關政理輒以陳聞於裨補無涓埃之微而讒謗有邱山之積陛下知其孤立賞其微誠獨斷不謀獎待踰量臣誠見陛下具文武之德有神聖之姿啓中興之宏圖當太平之昌運勤身以儉與物無私威怒如雷霆容覆如天地實㣥臣盡節之日才智效能之時聖君難逢重德宜報苦心焦思以日繼夜苟利於國知無不為徒欲竭愚未免妄作陛下不加罪責更極寵光既領臺綱又毗邦憲聖君所厚凶逆所讐闕於防虞幾至斃踣恩私曲被性命獲全忝纍祖先玷塵班列未知所措祗自內慚豈意陛下擢臣於傷殘之餘委臣以燮和之任忘其陋汚使佐聖明此雖成湯舉伊尹於庖廚高宗登傅説於版築周文用呂望於屠釣齊桓起寧戚於飯牛雪恥蒙光去辱居貴以今準古擬議非倫陛下有四君之明行四君之事微臣無四子之美獲四子之榮豈可叨居以彰非據方今干戈未盡戢夷狄未盡賓麟鳳龜龍未盡遊郊藪草木魚鱉未盡被雍熙當大有為之時得非常人之佐然後能上宣聖德以代天工如臣等類實不克堪伏願博選周行旁及巖穴天生聖主必有賢臣得而授之乃可致理乞回所授以叶㣥情無任懇款之至臣某言伏奉正月十四日敕牒以收復淮西㣥臣請刻石紀功明示天下為將來法式陛下推勞臣下允其志願使臣撰平淮西碑文者聞命震駭心識顛倒非其所任為愧為恐經涉旬月不敢措手竊惟自古神聖之君既立殊功異德卓絶之迹必有奇能博辨之士為時而生持操筆從而寫之各有品章條貫然後帝王之美巍巍煌煌充滿天地其載於書則堯舜二典夏之禹貢殷之盤庚周之五誥於詩則元鳥長發歸美殷宗清廟臣工小大二雅周王是歌辭事相稱善并美具號以為經列之學官置師弟子讀而講之從始至今莫敢指斥嚮使撰次不得其人文字曖昧雖有美實其誰觀之辭迹俱亡善惡惟一然則茲事至大不可輕以屬人伏惟唐至陛下再登太平剗刮㣥姦掃灑疆土天之所覆莫不賓順然而淮西之功尤為俊偉碑石所刻動流億年必得作者然後可盡能事今詞學之英所在森列儒宗文師磊落相望外之則宰相公卿郎官博士內之則翰林禁密遊談侍從之臣不可一二遽數召而使之無有不可至於臣者自知最為淺陋顧貪恩待趨以就事叢雜乖戾律呂失次乾坤之容日月之光知其不可繪畫強顏為之以塞詔旨罪當誅死其碑文今已撰成謹録封進無任慚羞戰怖之至臣愈言臣伏見六月八日敕以狂賊傷害宰臣擒捕未獲陛下悲傷震悼形於寢食特降詔書明立條格云有能捉獲賊者賜錢萬貫仍加超授今下手賊等四分之內已得其三其餘兩人蓋不足計根尋蹤迹知自承宗再降明詔絶其朝請又與王士則士平等官八日之制無不行者獨有賞錢尚未賜給㣥情疑惑未測聖心聞初載錢置市之日市中觀者日數萬人巡繞瞻視咨嗟歎息既去復來以至日暮百姓小人重財輕義不能深達事體但見不給其賞便以為朝廷愛惜此錢不守言信自近傳遠無由辨明且出賞所以求賊今賊已誅斬若無人捉獲國家何因得此賊而正刑法也承宗何故而賜誅絶也士則士平何故與美官也三事既因獲賊獲賊必有其人不給賞錢實亦難曉假如聖心獨有所見審知不合加賞其如天下百姓及後代久遠之人哉况今元濟承宗尚未擒滅兩河之地大半未收隴右河西皆沒戎狄所宜大明約束使信在言前號令指麾以圖功利况自陛下即位以來繼有丕績斬楊惠琳收夏州斬劉闢收劒南東西川斬李錡收江東縛盧從史收澤潞等五州威德所加兵不汚刃收魏博等六州致張茂昭張愔收易定徐泗濠等五州創業已來列聖功德未有能高於陛下者可謂赫赫巍巍光照前後矣此由天授陛下神聖英武之德為巨唐中興之君宗廟神靈所共祐助勉強不已守之以信則故地不足收而太平不難致如乘快馬行平路遲速進退自由其心有所欲往無不可者於此之時特宜示人以信孔子欲存信去食人非食不生尚欲捨生以存信况可無故而輕棄也昔秦孝公用商鞅為相欲富國強兵行令於國恐人不信立三丈之木於市南門募人有能徙置北門者與五十金有一人徙之輒與五十金秦人以君言為必信法令大行國富兵強無敵天下三丈之木非難徙也徙之非有功也孝公輒與之金者所以示其言之必信也昔周成王尚小與其弟叔虞為戲削桐葉為圭曰以晉封汝其臣史佚因請擇日立叔虞為侯成王曰吾與之戲耳史佚曰天子無戲言言之則史書之禮成之樂歌之於是遂封叔虞於晉昔漢高祖出黃金四萬斤與陳平恣其所為不問出入令謀項羽平用金間楚數年之間漢得天下論者皆言漢高祖深達於利能以金四萬斤致得天下以此觀之自古以來未有不信其言而能有大功者亦未有不費小財而能收大利者也臣於告賊之人本無恩義彼雖獲賞了不關臣所以區區盡言不避煩黷者欲令陛下之信行於天下也伏望恕臣愚陋僻憃之罪而收其懇款誠至之心天下之幸非臣之幸也謹奉表以聞臣愈誠惶誠恐臣某言伏以佛者夷狄之一法耳自後漢時流入中國上古未嘗有也昔者黃帝在位百年年百一十歲少昊在位八十年年百歲顓頊在位七十九年年九十八歲帝嚳在位七十年年百五歲帝堯在位九十八年年百一十八歲帝舜及禹年皆百歲此時天下太平百姓安樂壽考然而中國未有佛也其後殷湯亦年百歲湯孫太戊在位七十五年武丁在位五十九年書史不言其年壽所極推其年數蓋亦俱不減百歲周文王年九十七歲武王年九十三歲穆王在位百年此時佛法亦未入中國非因事佛而致然也漢明帝時始有佛法明帝在位才十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏以下事佛漸謹年代尤促惟梁武帝在位四十八年前後三度捨身施佛宗廟之祭不用牲牢晝日一食止於菜果其後竟為侯景所逼餓死臺城國亦尋滅事佛求福乃更得禍由此觀之佛不足事亦可知矣高祖始受隋禪則議除之當時㣥臣材識不遠不能深知先王之道古今之宜推闡聖明以救斯弊其事遂止臣常恨焉伏惟睿聖文武皇帝陛下神聖英武數千百年已來未有倫比即位之初即不許度人為僧尼道士又不許創立寺觀臣嘗以為高祖之志必行於陛下之手今縱未能即行豈可恣之轉令盛也今聞陛下令㣥僧迎佛骨於鳳翔御樓以觀舁入大內又令諸寺遞迎供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以年豐人樂徇人之心為京都士庶設詭異之觀戲玩之具耳安有聖明若此而肯信此等事哉然百姓愚冥易惑難曉苟見陛下如此將謂真心事佛皆云天子大聖猶一心敬信百姓何人豈合更惜身命焚頂燒指百十為㣥解衣散錢自朝至暮轉相倣效惟恐後時老少奔波棄其業次若不即加禁遏更歷諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也夫佛本夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣之義父子之情假如其身至今尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出之於境不令惑衆也况其身死已久枯朽之骨凶穢之餘豈宜令入宮禁孔子曰敬鬼神而遠之古之諸侯行弔於其國尚令巫祝先以桃茢祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用㣥臣不言其非御史不舉其失臣實恥之乞以此骨付之有司投諸水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉豈不快哉佛如有靈能作禍祟凡有殃咎宜加臣身上天鑒臨臣不怨悔無任感激懇悃之至謹奉表以聞臣某誠惶誠恐臣某言臣以狂妄戇愚不識禮度上表陳佛骨事言涉不敬正名定罪萬死猶輕陛下哀臣愚忠恕臣狂直謂臣言雖可罪心亦無他特屈刑章以臣為潮州刺史既免刑誅又獲祿食聖恩宏大天地莫量破腦刳心豈足為謝臣某誠惶誠恐頓首頓首臣以正月十四日蒙恩除潮州刺史即日奔馳上道經涉嶺海水陸萬里以今月二十五日到州上訖與官吏百姓等相見具言朝廷治平天子神聖威武慈仁子養億兆人庶無有親疏遠邇雖在萬里之外嶺海之陬待之一如畿甸之間輦轂之下有善必聞有惡必見早朝晚罷兢兢業業惟恐四海之內天地之中一物不得其所故遣刺史面問百姓疾苦苟有不便得以上陳國家憲章完具為治日久守令承奉詔條違犯者鮮雖在蠻荒無不安泰聞臣所稱聖德惟知鼓舞歡呼不勞施為坐以無事臣某誠惶誠恐頓首頓首臣所領州在廣府極東界上去廣府雖云才二千里然往來動皆經月過海口下惡水濤瀧壯猛難計程期颶風鰐魚患禍不測州南近界漲海連天毒霧瘴氛日夕發作臣少多病年才五十髮白齒落理不久長加以罪犯至重所處又極遠惡憂惶慚悸死亡無日單立一身朝無親黨居蠻夷之地與魑魅為㣥苟非陛下哀而念之誰肯為臣言者臣受性愚陋人事多所不通惟酷好學問文章未嘗一日暫廢實為時輩所見推許臣於當時之文亦未有過人者至於論述陛下功德與詩書相表裏作為歌詩薦之郊廟紀泰山之封鏤白玉之牒鋪張對天之閎休揚厲無前之偉績編之乎詩書之策而無愧措之乎天地之間而無虧雖使古人復生臣亦未肯多讓伏以大唐受命有天下四海之內莫不臣妾南北東西地各萬里自天寶之後政治少懈文致未優武剋不剛孽臣姦隸蠧居棊處搖毒自防外順內悖父死子代以祖以孫如古諸侯自擅其地不貢不朝六七十年四聖傳序以至陛下陛下即位以來躬親聽斷旋乾轉坤關機闔開雷厲風飛日月所照天戈所麾莫不寧順大宇之下生息理極高祖創制天下其功大矣而治未太平也太宗太平矣而大功所立咸在高祖之代非如陛下承天寶之後接因循之餘六七十年之外赫然興起南面指麾而致此巍巍之治功也宜定樂章以告神明東巡泰山奏功皇天具著顯庸明示得意使永永年代服我成烈當此之際所謂千載一時不可逢之嘉會而臣負罪嬰亹自拘海島戚戚嗟嗟日與死迫曾不得奏薄技於從官之內隸御之間窮思畢精以贖罪過懷痛窮天死不閉目瞻望宸極魂神飛去伏惟皇帝陛下天地父母哀而憐之無任感恩戀闕慚惶懇迫之至謹附表陳謝以聞臣某言臣伏聞宰相公卿百官及關輔百姓耆耋等以陛下功崇德巨天成地平宜加號於殊常以昭示於來代陳請懇至于再于三陛下仰稽乾符俯順人志乃以新秋首序令月吉辰發揚鴻休膺受顯册天人合慶日月揚光環海之間含生之類歡欣踴躍以歌以舞臣某誠歡誠喜頓首頓首臣聞體仁長人之謂元發而中節之謂和無所不通之謂聖妙而無方之謂神經緯天地之謂文戡定禍亂之謂武先天不違之謂法天道濟天下之謂應道伏惟元和聖文神武法天應道皇帝陛下子育億兆視之如傷可謂體仁以長人矣喜怒以類刑賞不差可謂發而中節矣明照無私幽隱畢達可謂無所不通矣發號出令雲行雨施可謂妙而無方矣三光順軌草木遂長可謂經緯天地矣除剗寇盜宇縣清夷可謂戡定禍亂矣風雨以時祥瑞輻湊可謂先天而天不違矣國內無飢寒四夷皆朝貢可謂道濟天下矣衆美備具名實相當赫赫巍巍超今冠古方當議明堂辟雍之事撰泰山梁父之儀三代之逸禮補百王之漏典時乘六龍肆覲東后微臣幸生聖代觸犯刑章假息海隅死亡無日瞻望宸極心魂飛揚有永棄之悲無自新之望曾不得與鳥獸率舞蠻夷縱觀為比銜酸抱痛且恥且慚無任感恩戀闕懇迫倣徨之至謹奉表陳賀以聞臣某言臣以去年正月上疏論佛骨事先朝恕臣愚直不加大罪自刑部侍郎貶授潮州刺史伏遇其年七月十三日恩赦至其年十月二十四日準例量移改授袁州刺史以今月八日到任上訖臣某誠歡誠喜頓首頓首伏以州小地狹稅賦及時人安吏循閭里無事微臣惟當布陛下維新之澤守國家太平之規勸以耕桑使無怠惰而已臣以愚陋無堪纍蒙朝廷獎用掌誥西掖司刑南宮顯榮頻煩稱效寂蔑又蒙赦其罪纍授以方州德重恩宏身微命賤無階答謝惟積慚惶無任感恩慚惕之至謹差軍事副將郝泰奉表陳謝以聞臣某言伏聞皇帝陛下以閏正月三日虔奉遺詔昭升大位天地神祗永有依歸華夏蠻貊永有承事神人交慶日月貞明臣某誠歡誠喜頓首頓首臣聞王者必為天所相為人所歸上符天心下合人志然後奄有四海以君萬邦伏惟皇帝陛下承列聖之丕績當中興之昌運爰自主鬯春宮齒胄國學孝友之美實形四方英偉之姿久動㣥聽及初嗣位遐邇莫不歡心爰降詔書老幼或至垂泣舉用俊乂流竄姦邪雖虞舜之去四凶舉十六相不能過也天下翹首以望太平天下傾心以觀至化臣某誠歡誠喜頓首頓首臣聞昔者堯舜以吁嗟君臣相戒以致至治周文王以憂勤日中不食以和萬民故能澤流無窮名配日月伏惟皇帝陛下儀而象之以永多福天下幸甚天下幸甚微臣往因言事得罪先朝守郡遠方拘限條制不獲奔走稱慶闕庭無任欣歡踴躍感恩戀闕之至謹奉表以聞臣某言伏奉二月五日制書大赦天下常赦所不原者咸蒙除罪與之更始令得自新恩浹幽明慶溢寰海臣某誠歡誠喜頓首頓首臣聞王者必於嗣位之始降非常之恩所以象德乾坤同明日月伏惟皇帝陛下文思聰明聖神睿哲發號出令雲行雨施懼刑政之或差憐鰥寡之重困知事久之滋弊慮法訛之益姦罪人悉原墜典咸舉生恩既及於四海和氣遂充於八紘臣某誠歡誠喜頓首頓首微臣往因論事獲譴海隅旋沐朝獎待罪山郡未離貶竄之地忽逢曠蕩之恩踴躍欣歡實倍常品限以官守不獲隨例稱慶闕庭無任感恩戀闕之至謹奉表陳賀以聞臣某言伏承閏正月二十七日皇太后光膺令典受册宮闈歡心始自於內朝孝理遂形於寰海臣某誠歡誠喜頓首頓首皇太后夙贊先皇弻成至化誕生明聖纘繼鴻庥華胥實贊於軒圖文母有光於周道恭惟懿德克配前芳皇帝陛下出震承乾垂衣御極式展臣子之志以明教化之源禮命載崇華夷同慶臣待罪外郡不獲隨例稱賀闕庭無任踊躍欣歡之至謹奉表陳賀以聞臣某言臣所領州今月十六日申時有慶雲見於西北至暮方散臣及舉州官吏百姓等無不見者五彩五色光華不可遍觀非煙非雲容狀詎能詳述抱日增麗浮空不收既變化而無窮亦卷舒而莫定斯為上瑞實應太平臣某誠歡誠喜頓首頓首謹按沈約宋書云慶雲五色者太平之應又據孝經援神契曰王者德至山陵則慶雲出故黃帝因之以紀事虞舜由之而作歌又按季夏六月土王用事其日景戌亦主於土西北方者京師所在土為國家之德祥見京師之位既徵於古又驗於今伏惟皇帝陛下德合覆載道光軒虞嗣位之初禎祥繼至升平之符既兆仁壽之域以躋微臣往在先朝以論事得罪身居貶黜之地目覩殊常之慶抃躍欣幸實倍常情伏乞宣付史官以彰聖德所致瞻戀闕庭心魂飛馳無任欣抃踊躍之至謹差某官奉表陳賀以聞臣某言伏奉正月二十七日詔書大行皇帝奄棄萬國承詔哀惶號踊無地伏惟聖情何可堪處大行皇帝功濟寰區仁霑動植奉諱之日率土崩心凡在臣子不勝殞裂伏惟陛下痛貫宸極聖情難居臣拘守遠郡不獲匍匐奉慰瞻望闕庭且悲且戀謹奉表陳慰以聞臣某言臣得所管國子太學廣文四門及書算律等七館學生沈周封等六百人狀稱身雖賤微然皆以選擇得備學生讀六藝之文修先王之道粗有知識皆由上恩今天子整齊乾坤出入神聖經營乎無為之業遊息乎混元之宮不謀於庭不戰於野坐收冀部旋定幽都析木天街星宿清潤北嶽醫閭神鬼受職地彌天區界軼海外舜之十有二州周之千七百國章亥所步禹契所書四面輻輳各修貢職西戎之首北虜之渠怛威愧德失據狼狽收其種落逃遁遠去來獻羊馬千里不絶功既如此德又如彼爰初嗣位首去姦嬖隨所顧指應時清寧哀天下之鰥寡釋四海之鬱結左右前後莫匪俊良小大之材咸盡其用無所誅詰一和以仁由是五穀歲登百瑞時見六府三事惟序惟歌昔者媧皇殺黑龍以濟冀州堯誅九嬰以定下土血兵刓刃僅就厥功以方吾君一何遠也堯之在位七十餘載戒飭咨嗟以致平治孔子之聖自云三年有成今自嗣位以來歲有餘耳臻此功德其何捷哉置郵傳命未足以諭以非常之功襲尋常之號以冠古之美屈守文之名臣子之誠闕而不奏天號人稱不滿事實斯亦搢紳先生之過也謂臣官居師長不言謂何考其所陳中於義理天人合願不謀而同非臣之愚所敢隱蔽輒冒死以聞伏乞天恩特允誠志令公卿大夫得竭心慮取正於經以定大號有司備禮擇日以頒天下幸甚天下幸甚臣某誠惶誠恐臣某言臣聞聖人之德與天地通誠發於中事應於外始聞其語今見其真臣誠歡誠喜頓首頓首伏以季夏以來雨澤不降臣職司京邑祈禱實頻青天湛然旱氣轉甚陛下憫茲黎庶有事山川中使才出於九門陰雲已垂於四野龍神效職雷雨應期嘉穀奮興根葉肥潤抽莖展穗不失時宜人和年豐莫大之慶微臣幸蒙寵任獲覩殊祥慶抃歡呼倍於常品無任踊躍之至謹奉表陳賀以聞
