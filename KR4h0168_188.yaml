body:
  text: 歲已殫夜向闌風威勁霜氣寒月斜臨於棟首河半落於簷端心耿耿而不寐魂焭丶焭丶而未安乃振衣危坐隱几太息繹思於今古之津佇懷於天地之域粵若天分地開古往今來物之播焉成萬品人之生也配三才伊生人之為貴咸賦職於靈臺彼靈臺者含粹而起惟神所止想四大之樞機執五成之端揆統精靈之往復括性命之終始坎憑慧而宣聽離假明而暢視六儀竦而承尊百骸運而為使若眾星之拱璿極猶列國之宗玉扆夫其鼓動陶甄範圍涵育質微用廣如土圭之準盈縮精靈器要譬灰琯之調涼燠撫二儀之斡運必用此而休復閱庶類之區分亦俟茲而大畜奧室資明於洞戶飛軒寄轉於輕軸靈筠挺防露之篁孤穎秀捎雲之木其高也巍乎峻峙傑爾孤標上干日月迥冠雲霄其深也如海之渟如淵之邃窅萬仞兮沈以清潛九重兮隱而閟其平也周道如砥君子之夷局其險也蜀門若劍小人之跂躅彌性場而極覽溥情囿而環矚鮮開曠而閒凝多鬱堙而窘促萌一緒而千變兆片機而萬觸無半刻而恬想乃終年而汨欲大木百圍而窾竅長河九支而屈曲怒則烈火扇於衝飈喜則春露融於朝旭懼驚懷其若墜憂結念其如束或漫漫而川浮或迢迢而山屬繁襟霧合而烟聚單思鍼懸而縷續其騖時也似飛蛾淩亂而投明燭其趨利也若饑烏聯翩而爭場粟力方躓而猶騁量已傾而未足吹劍首而聒虞韶握砆碔而衒荊玉纖埃不讓於山阜巨海見排於井谷沈浮兮靡定去就兮多途乍排下而進上忽出有而入無轉息而延緣萬古迴瞬而周流八區形寥寥於衽席慮淼淼於燕娛乃榮乃華如馳如驅甚飛猱之蹻喬木遇奔兕之逸修衢雖杼軸而無已吾未知其所圖爾其清濁兩資臧否兼司有縵者而密者幾附之而益之勇怯於焉競爽明晦所以相欺或外靜而中躁或情慍而顏怡或趣暌而迹偶或言信而誠疑眉睫兩連而相對山河萬重而在茲莫覩其深沈之實抱徒見其俯僂之虛姿類陰陽之不測匹神鬼之難期不可審之以權量不可卜之以蓍龜爭度長而自我各守勝而為師設皇綱而懸帝制張地絡而舉天維雖眾條之所檢轄在斯軔而不能持徵善惡於遙祀訪賢愚於㣥冊軒昊用之而司契堯舜守之而光宅湯武任之以為王桓文仗之而作伯宏聖道者謂之周孔肆凶德者攝為桀跖體仁成曾史之行毓智舉良平之策六國起爭交之端三方構鼎峙之跡政焚書而騁暴巨誦典而崇僻嚭讒胥而獲誅靳譖原而受斤軻發匣而揮匕如睨楹而抗璧蕭朱始諧而末釁餘耳初好而終隙寵包詐而眤躬牢蘊邪而附石究迴穴於今古鬱繽紛於載籍匪外物之所嬰諒乃心之攸敵若乃無損無益不盈不沖湛虛明其若鏡坦宏量其如空靜凝神而合道動應物而收功得至無於象外垂妙有於寰中既脗合而懸解且兼忘而大同象罔之珠易索士冖䂞籥之用無窮入窅冥而超宇宙翔寥廓而矯樊籠斯上聖之神理邈先幾而感通諒凡情之靡得徒仰止於余衷至於宅義依仁棲貞履順崇禮讓之扃闥聳溫恭之牆仞赴角是壑而全忠處龍鄉而執信情居損而能酌時處遯而無慍一作道在恒而不振遊書圃而摭芳挹文河而澡潤循雅度而成則服嘉言而遣吝乃懿士之清規實吾人之所徇持弱操而知勉飭微躬而底慎思不忮而不求絕相靡而相刃慨投筆而長想聊綴音於末韻粵若天生五材兮一不可棄水包六府兮萬人攸利汙樽抔飲兮變其淳樸鑿井汲泉兮興其繪事六十四卦兮表其名二十八宿兮列其位伯益創而功立重華浚而德備故有神邱玉檻仙苑銀牀浪華浮潤醴泉味芳永康則金精化鳥曲阜則土怪成羊感至誠於漢將通瑞氣於吳王若乃懸繘下垂抽缾上出窮百丈之幽祕極九重之邃密由中夏而浹外區自帝王而周庶匹接壤鄰甸駢閭比室咸賴此以資生必待斯而養質隨大小而周用任多少而取實環終始兮歷古今積歲時而帛丿糸月日湯七載而無減堯九年而不溢一家曠兮靡寧寸路虛而有䘏運其功兮信廣收其利兮焉畢及夫欄傾甃毀土陷泉沈滋液中耗汙泥上侵古桃顦顇兮無色枯桐零落兮罷陰霜霰積兮空園冷荊棘攢兮荒徑深昔時之所趨挹疇日之所窺臨皆指新而競往䍐存舊而來尋豈唯見嗤於射鮒諒亦興歎於無禽如使崩壞重修堙泉更渫澄汰汙滓鑒觀清冽擬畫處之蓮房除哭者之茅絰近類濟人之井遠分夏后之穴若澗溪之始注猶泛濫之初決當給養之不窮寧酌甘而先竭亂曰有通有塞兮道之恒時用時舍兮業方宏疏而洩兮甘潤騰壅而竭兮汙泥增彼幽涸兮如重啟濟窮渴兮良所能文明垂拱後執政者未滿歲率以罪去大抵皆惡逆不道夫構大厦濟巨川必擇文梓艅艎若亟毀而敗則是用朽木乘膠船也臣謂陛下求賢之意切而取人之路寬故一言有合而付大任夫以堯舉舜猶歷試諸艱况庸庸者可超處輔相以百揆萬機畀小人哉臣承慶言伏以殿下國之儲貳主器承祧百姓繫心萬方延首行一事天下所瞻出一言天下所聽動靜不可以不慎進退不可以不思固須數引正人詢謀得失使忠言日聞於耳善事每關於心所為合度必自知其過如此則正心起邪心息德業日新聲聞彌廣福祿可以長守榮位可以久安若諂諛在側忠良不進意有所向則合詞稱善言未出口則同聲稱美有非莫悟有過莫知便自為神睿聰明超絕今古驕溢之漸常必由之伏願特留睿情每存規誡聞過必改見善必行朝夕孜孜常恐不及則邦家是賴天下幸甚進德修業大易垂文說禮敦詩春秋所貴尚書云念終始典于學禮云玉不琢不成器人不學不知道孔子曰吾嘗終日不食終夜不寢以思無益不如學也殿下昔在藩邸耽讀典墳論道觀書匪朝伊夕自升儲貳已歷炎涼侍讀承言稍以稀簡雖睿姿天挺神明生知器業自然非求外獎然更加研勵彌益風猷伏願數召儒生勤修學藝縑緗不離於左右披閱無捨於光陰使日知所未知月聞所未聞凡在匹夫苟能強學猶可以高取名譽坐致簪纓况殿下以儲后之尊而能留心於學德音之美固無得而稱焉畋獵馳騁敗德之源必須順動不可以盤遊無度至於從禽逐獸絕野馳原駿足雲飛輕弧電舉當其適意豈憚艱危無險不陵無深不赴忽然奔馬委轡猛獸逸㣥致驚駭之憂貽顛墜之患雖有所悔如何可及夫以千金之子猶且坐不垂堂况在萬國之貞豈可不思重慎殿下初升儲位養德春闈理宜靜默自居文史為務不可數為遊縱以損德音尚書云內作色荒外作禽荒酣酒嗜音峻宇雕牆有一於此未或不兦伏願詳覽古今以為鑒戒殿下驅使之人每於北門召入如此等色皆是憸利小人緣得供奉祗承自謂別蒙恩幸外則妄為威福內則專事諂諛巧媚百端以求顏色日為一事時進一言漸漬纖微遂成瑕累此之浸潤最難覺察特須斥遠屏黜不宜親近左右殿下皇儲國嗣帝子天孫府庫充盈宮室崇麗但使不為鄙僻不作奢淫凡所營求有司畢備何藉此等別有祗承今南衙官寮皆是搢紳士子或耆年舊德博識洽聞或雅望英材修身潔行莫不策名委質奉事殿下自非陪扈法仗不得一奉宸顏豈有僕隷輿臺而可特承恩盼伏願一皆杜絕勿許更至宮闈所見者唯端士正人所聞者唯詩禮典誥則邪孽無由而起咎悔無從而生睿德彌高休聲日遠伏見今年六月三十日令書以崇文館中學士極少令賓客庶子詹事及宮官五品以下各舉所知令出已來日月已久官寮所舉咸已進名迄至於今更無進止殿下敦崇學藝廣訪時英天下四方莫不欣悅文學之士飭躬待問而淹歷時序未有指歸朝中搢紳咸謂殿下徒有其聲而無其實私談竊議頗盈眾口但令出惟行理非虛設舉能進善其事不輕一降令書終年寂寞天下英髦誰不解體此乃欲益反損應是更非伏願與賓客庶子等量宜早為處分事或不可專決亦須速以聞奏不可淹延致招誹議今關隴之外蕃夷寇竊國家將申弔伐大興師旅轉輸給用糜費日多聖上內恤黎元外憂疆埸宵衣旰食惕慮兢懷殿下在國為儲君在家為長子事兼家國何以自寧至於居處服翫飲食聲樂並請務從省約以助聖上憂勞不可每事豐華自為安逸儲副之尊士庶瞻仰雖宮闈務簡不資每日坐朝至於朔望之辰諸王賓客咸萃皆欲親承睿旨肅奉宸儀伏見秋冬以來累月不曾一坐恭已之義竊謂有虧伏願每至此朝特臨法仗則殿下無晏安之逸㣥寮有趨奉之歡臣聞體寬裕之德者在乎納諫懷忠貞之極者期於盡節是知君以不諱昭其羙臣以無隱達其誠固君臣之大義古今之通道伏惟殿下挺叡研幾凝貞毓照處帝王之元子為億兆之副君當其冊命之初天下含齒戴髮童兒牧䜿莫不歡忻踴躍抃舞謳歌者以殿下至德至仁克忠克孝故能上當天意下應人心雖夏邦建啟周朝立誦不之及也但能行之以道守之以仁居安慮危在滿防溢一日三省一事九思知稼穡之艱難省宮苑之遊翫正辭雅誥每關心術女于聲亂色不留聰明忠讜者引而親之便佞者屏而遠之則可以長主宗鬯永在國本照黃離以保元吉居蒼震而享利貞臣出自膠庠即參藩邸微班再易馳年十變短才弱翰濫蒙甄獎書記文章特受恩寄洎乎嗣登銀牓復得忝侍銅闈俯存簪履之餘仰攀鱗羽之末蕩蕩鴻澤霑濡不已區區淺志答效無階所以輸罄心源瀝盡肝血奉芻蕘之片議獻狂瞽之一言庶輕露馳聲薄滋於少海纖塵驟影微助於瑤山逆耳儻伸觸鱗甘罪無任悾款之至謹奉啟以聞臣聞太子者君之貳國之本也所以承宗廟之重繫億兆之心萬國以貞四海屬望殿下以仁孝之德明睿之姿岳峙泉澄金貞玉裕天皇升殿下以儲副寄殿下以監撫欲使照無不及恩無不覃百僚仰重曜之輝萬姓聞洊雷之響夫君以人為本人以食為命君非人無以保其位人非食無以全其生故孔子曰百姓足君孰與不足百姓不足君孰與足自頃年以來頻有水旱菽粟不能豐稔黎庶自致煎窮今夏亢陽米價騰踴貧窶之室無以自資朝夕遑遑惟憂餒饉下人之瘼實可哀矜稼穡艱難所宜詳悉天皇所以垂衣北極殿下所以守器東宮一作朝為天下之所尊得天下之所利者豈惟上元之幽贊亦百姓之倚命也百姓危則社稷不能獨安百姓亂則帝王不能獨理故古之明君飽而知人飢溫而知人寒每以天下為憂不以四海為樂今關隴之外凶寇憑陵西土邊甿凋喪將盡干戈日用烽柝荐驚千里有勞於饋糧三農不遑於稼穡雖蜂蠆之小毒亦足以煩師旅而擾邊隅矣殿下為臣為子乃國乃家為臣在於竭忠為子期於盡孝在家不可以自逸在國不可以自康一物有虧聖上每留神念三邊或梗殿下豈不兢懷况當養德之秋非是任情之日伏承北門之內造作不常翫好所營或有煩費倡優雜伎不息於前鼓吹繁聲亟聞於外既喧聽覽且黷宮闈兼之僕隷小人緣此得親左右亦既奉承顏色能不恃賴恩光作福作威莫不由此若不防慎必有愆非倘使微累德音於後悔之何及書云不作無益害有益此皆無益之事固不可躭而悅之臣又聞在上不驕高而不危制節謹度滿而不溢高而不危所以長守貴滿而不溢所以長守富是知高危不可不慎滿溢不可不持易曰君子終日乾乾夕惕若厲無咎敬慎之謂也在於凡庶能守而行之猶可以高振聲華坐致榮祿殿下有少陽之位有天挺之姿片善而天下必聞小能而天下咸服豈可不為盡善盡羙之道以取可久可大之名哉伏願博覽經書以廣其德屏退聲色以抑其情靜默無為恬虛寡欲非禮勿動非法不言居處服玩必循節儉畋獵游娛不為縱逞正人端士必引而親之便僻側媚必斥而遠之使惠聲溢於遠近仁風翔於內外則可以克享終吉長保利貞為上嗣之稱首奉聖人之鴻業者矣臣昔參朱邸忝膠東之藩吏晚侍清宮叨望苑之儲寀每得親承睿盼側奉宸規出入銀牓之前旦暮銅樓之下小人頂戴無以勝恩區區淺誠竊不自已古人恥其君不及堯舜臣亦願陛下超於啟發是以進狂言庶有裨於萬一微生萬死實無限於三泉謹啟訥言儀鳳時人此製酌古沿今無以加也然古傳之已久多失本源差之一畫詎惟千里見炙從肉莫究厥由輒意形聲固當從夕及其晤矣彼乃乖斯若靡馮焉他皆倣此傾佩經之隙沐雨之餘楷其紕繆疇茲得失銀鉤創閱晉豕成㣥盪櫛行披魯魚盈貫遂徵金篆遐泝石渠略題會意之辭仍記所由之典亦有一文兩體不復備陳數字同歸惟其擇善勿謂有增有減便慮不同一點一畫咸資別據其有類雜並為訓解傳之不謬庶埒箋云審禮徐州彭城人貞觀中歷左騎衞郎將遷工部尚書檢校左衞大將軍儀鳳三年副中書令李敬元討吐蕃敗被執卒於吐蕃贈工部尚書諡曰僖一竊見王者尊敬神祇神祇之類尊佛弟子是以明其遠致尊其所尊抑從拜禮愚謂未可一比見官人承詔不拜王師非是師賤下人乃以敬其主教出家僧眾染衣除髮異俗標形承佛綸言為國崇福君父致敬不禮其身僧披法衣不拜君父一竊見神象所立因人作形形已作成人還返敬豈以因人所立則不致尊若不致尊立之何用佛以遺教付囑國王王之所立王還尊敬如王不敬立之何益一竊見承先代之後者立居百王之上道士等身披老君之法服口傳老君之法言同俗致拜恐乖其禮謹議大隱太學博士公彥子儀鳳中為太常博士終禮部侍郎臣竊準秦漢皇太后臨朝稱制并據禮經正文天子七廟諸侯五廟蓋百王不易之義萬代常行之法未有越禮違古而擅裁儀注者也今周悰別引浮議廣述異文直崇臨朝權儀不依國家常度升崇先之廟而七降國家之廟而五臣聞皇圖廣闢實崇宗社之尊帝業宏基實等山河之固伏以天步多艱時逢遏密代天理物自古有之伏惟皇太后親承顧託憂勤黎庶納孝慈之請垂矜撫之懷實所謂光顯大猷恢崇聖載其崇先廟室合同諸侯之數國家宗廟不合輒有移變臣之愚直並依正禮周悰之請實乖古儀
