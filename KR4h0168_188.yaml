  text: 全唐文欽定全唐文卷一百八十八承慶字延休贈幽州都督思謙子舉進士補雍王府參軍累遷太子司議郎長安初為司僕少卿轉天官侍郎修國史拜鳳閣侍郎同鳳閣鸞臺平章事神龍初坐附張昌宗配流嶺表起授辰州刺史入為祕書員外少監以修武后實錄功封扶陽縣子又撰武后紀聖文加銀青光祿大夫遷黃門侍郎未拜卒贈祕書監諡曰溫
