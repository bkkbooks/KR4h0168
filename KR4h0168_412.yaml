front:
  text: 全唐文欽定全唐文卷四百十二常衮三
  hash: sha256:ca0b8e538cd5cc341fae4ae9e69f47e6662b60cbfc44156dc209a5f60f13782d
body:
  text: 門下舜以伯夷作秩宗漢以列侯掌郊廟至於圜丘大射之制禮官博士之論莫不綜詳得失而折衷焉故事職尊冠九卿之首朝議大夫守國子祭酒兼修國史賜紫金魚袋楊綰常在於道亦周於仁文以君子之言生知聖人之意司我載籍鴻聲不泯常典選舉後之法程乃者崇進名儒俾其宣明師訓講求三代稽合五經濟濟諸生誨之不倦飽於道德之富成其禮讓之風況恭儉忠信恪守而彌固一時模表清議所高固可以處楊震桓榮之位領曲臺太府之重勉思厥服以稱任賢可守太常卿依舊兼修國史散官如故主者施行門下堯親九族禮重於敦序漢睦諸劉秩存乎宗正內姓之選豈伊異人三從叔祖銀青光祿大夫前婺州刺史本州團練守捉使上柱國荊國公琬才秀本枝挺此公器忠敬達順簡廉向方飭禮樂於身文詳典刑之政體夙所任遇久於歷階勳勞理行當亦兼書思有補察義深肺腑固可以居宗室大臣之位敘文昭武穆之親懷德任賢敬茲休命可宗正卿散官勳封如故主者施行門下古之上卿次公一等至於西漢每與列侯參決朝議今之秩望亦謂之崇朕方修文德以撫區外則重譯象胥之事九儀相贊之職正用髦碩俾之典領銀青光祿大夫檢校刑部尚書知省事上柱國汝南縣開國公蔣渙顏子之德行張仲之孝友能積其厚以叢於身恭儉之訓可以軌俗學通文變高視一時非得喪之可干亦剛柔之相濟服在通列且踰二紀精於憲章舉有倫要東雍居部近郊移風以禮除暴人安其業俾京師之河潤守經術之循吏司秋會府訓夏議刑以之弻教能用中典時屬四夷之敘參授大賓之任韓暨以宿德而拜陳紀以至行而遷求舊任賢正當此選待遇諸國宜約故事使有準以明等威也可檢校刑部尚書兼鴻臚卿散官勳封如故主者施行門下國有大農實司金穀茲惟古官之重難於正卿之拜朝散大夫試祕書監兼侍御史上柱國賜紫金魚袋鄭賁通敏良才沈詳雅識明斷臨事貞修奉公所更秩序必著聲績早參幕畫在樽俎而止戈自董軍儲有京坻之足食適時多可選衆攸歸爰藉變通主其出納務殷任切倚辦當仁宜膺理粟之命佇繼康成之美可守司農卿散官勳賜如故門下九卿之重參理於佐邦六府孔修頒貨於列藏歷代右職莫非高選開府儀同三司行太子賓客上柱國公呂崇賁忠謹良實居向方能用晦於精辨亦體微於剛貞峻節孤立清心確然以長才之有餘應㣥務而多適擁旄乘塞周歷大藩薄於戰功經以事典用明既富之教必厚豐財之德自頃艱阻有司曠廢府寺寂寥卿少虛設寖成其弊朕甚懼焉今再舉舊章各歸其局出納之地眷求惟精兼領三尚之煩以榮四至之列可行太府卿散官勳如故敕銀青光祿大夫前亳州剌史本州團練守捉使上邽縣開國男李瀚識精於理才辨於政祗服禮訓甄詳事經振麟趾之芳更隼旟之命馴致其道達於家邦慈惠之化洽於黎老以親九族乃立二卿宜敘周文之昭用毗劉德之任可行宗正少卿散官封如故敕試王府司馬兼福州都督府別駕占闕攝寧海軍副使賜紫金魚袋周若冰氣識沈和風儀端偉秉心以正蒞事惟明法以言揚久參朝序頗有聞望洽於縉紳自佐法方州兼領戎事政術尤著勳勞亦深俾踐亞卿之列仍兼題輿之任可試光祿少卿兼福州都督府別駕占闕餘如故敕銀青光祿大夫前潤州刺史上柱國馮翊縣開國男韋損識清行理強學自輔服於禮而中節居其業以全忠識能有餘階歷頗久京江按部終始六年勤職惠人風化一變循吏之稱去而益彰天下之平屬於廷尉乃立其二方求直清俾之弻教敬爾繇獄可行大理少卿散官勳封如故敕朝議大夫前守河南少尹騎都尉景延之業擅文儒行資忠信推令望於公器著能名於吏途久踐周行夙彰聲實詳刑之地稱職其難任在孚選兼勤舊宜參河海之亞俾副朝廷之舉可守大理少卿散官勳如故敕正議大夫試太常卿兼左領軍衛將軍上柱國賜紫金魚袋侯希超溫良植性藝業修身有臨事之幹能彰適時之才用班資久踐職務非親內舉自於元戎正名從於亞列宜成風俗之美俾展多方之效可行太府少卿散官勳賜如故敕昔劉向父子代典文籍今之祕室豈曰避親再從叔正議大夫守光祿卿員外置同正員嗣澤王潓幼嗣藩國夙彰忠孝素風自遠清識彌高傳魯恭之古文稟吳季之知樂早承先顧嘗歷大僚秉彞端潔流問休茂自合搢紳之望況推宗室之良寧止於敦族以恩固在於敘賢以位周稱外史晉謂內臺俾領儒官是崇禮秩可守祕書監餘如故敕大司成以三德行教國子所以明詩書禮樂之宗立忠信孝友之本使方領矩步敬業樂㣥繫於化成舊選尤重參其事任今亦難之開府儀同三司行內侍監兼充監門衛大將軍觀軍容宣慰處置使仍兼知處置神策軍兵馬事內飛龍廏內弓箭庫等使兼檢校鴻臚禮賓上柱國韓國公魚朝恩國之純臣忠以事朕竭誠宣力義貫神明有兩朝侍從之勤監六師征伐之事雅達名理參尚儒元遠涉源流旁通訓詁自頃右武未遑勤學方宏闕里之教用誡子襟之詩以其達俎豆之禮嘗亦委膠庠之事能以德義導其諸生國之俊選其貴遊子弟摳衣鼓篋歌詠先王之道春誦夏絃服勤師氏之訓而恭敬退讓抗疏纍辭重奪勞謙之志權遂由衷之請今三千之徒資於學術思卒其業懷之益深用宏儒風式允公望可兼檢校國子監餘並如故敕朝散大夫前守絳州別駕本州團練守捉副使李永慶自相門才推公器武子之德所謂在人元成之經不忘肄業早從清秩備著聲華頃佐近藩衆稱淹滯俾參榮於祕府仍二職於名都可檢校祕書少監兼揚州大都督府司馬散官如故敕中散大夫諫議大夫賜紫金魚袋馬錫躬服禮義處之以厚膺用多才動而濬發歷官有政居必修明擢登諫列屢獻忠讜言皆展意事亦主文勤職且淹以時敘進周之內府漢之尚方典掌服御任當親重輟我侍臣俾其參二可守少府少監散官賜如故敕前澧州刺史薛伯高昔楊洪公孫賀皆以儒術居於少府國朝監寺之列亦通稱顯二於其長所任非輕以爾伯高早踐臺閣亟頒詔條勞績有聞聲譽不替因其秩寵置在周行宜以廉潔自居用司所藏之職可守少府少監餘如故敕左補闕陸鼎終始于學以致其道先儒未詳多所究博秉南史之遺直補東觀之闕文左右諫曹所宜迭處鴻都講藝亦在論思可左補闕充史館修撰敕處士荀尚昔荀卿荀悅並有著書而尚遠承儒史之業深得述作之意思精大體經通王道慨然論事來自山東灼見古今之宜熟數理安之策嘉樂賢俊副于懷人春秋一字使之潤色結綬京輔進而録之行成乎身不患無位可華州下邽縣尉充史館修撰敕二品子衛輝漢制有任子之令國朝二千石理行尤異者賞亦及之況幼有令聞服於經訓校書祕閣以獎其才可宣義郎試祕書省校書郎敕將我南軍秩高中尉以禁戎之重任委舅氏之同心具官吳湊塗山介祉章武雅才言而有宗儉而能廣達禮樂政刑之要存忠信孝友之誠艱虞歷年府寺失職素以賢戚之望職司太子之家清心奉公庶務悉理擅美春儲之寀流芳秋實之詠固可以首當裦進大勸官曹俾執金吾用彰貴任可左金吾將軍餘如故敕古者選孝悌閎博有道術者輔翼太子今以宗室之老處賓師之位亦親親而教敬也光祿大夫檢校工部尚書兼宗正卿上柱國嗣吳王祇文昭之慶蔚于公族楚元之後繼有忠賢達道虛懷寬厚廉謹藩翰舊德人倫憲行更於內外職事頗修年在華皓未嘗衰惰參會府而百工時敘掌宗卿而九族益親每託肺腑深加優禮宜以冬官之重仍在春儲之列可兼太子賓客其檢校工部尚書及散官勳封如故門下正於宮僚以視邦憲務兼內外選重古今銀青光祿大夫守太子賓客上柱國太原郡開國公郭曜丞相之子夙聞禮訓孝悌信讓清公仁厚端莊慎獨如有大賓之容沈靜少私淡然儒者之行濟以才識達於公方素多歷職之稱用叶居家之禮士林推重朝野洽聞待以客禮既任賢於調護委之官事更持綱於彈糾可守太子詹事散官勳封如故主者施行敕中散大夫前守潭州刺史本州團練守捉使上柱國河內縣開國子賜紫金魚袋張謂往以鴻筆麗藻列於近侍典謨訓誥多所潤色較然素節鬱有盛名言念華山之巡不忘潁川之從俾之領郡亦謂理平而孝悌宏博禮容循謹宜在公選首茲正人旌書課第之目參相春坊之重可守太子左庶子散官勳封如故門下銀青光祿大夫前行給事中上柱國隴西縣開國公李廙德崇業廣多識前言究典墳之至精考禮樂之所極時有著述贍而不流其在家邦率由忠儉歷位要重秉茲諒直久以病免淡然自居混冥元和屏絶外務每制度未決質文或差常亦處正大議冠諸宗室儲宮綜事可謂優間豈迫以朝議且頒其祿賜煩於贊相寄在親賢可行太子左庶子散官勳封如故主者施行敕朝議郎試太子司議郎賜緋魚袋許從之學究儒流文推策府行能優敏政事通明公勤之效備彰於履歷遲暮之年固資於頤養俾遷階秩仍遂休間可朝散大夫守太子右諭德致仕敕關內河東副元帥隨軍要籍朝議郎試祕書省著作郎賜緋魚袋王寅業繼儒門才通吏術嘗踐清秩不渝素檢自參戎府更展文韜進職宮僚用嘉勤績可試太子左諭德餘如故敕朝議大夫前舒州別駕直中書師良久直禁垣參典書命既精文理尤達事經常遠其私亦過於慎夙夜有恪歲時積勞顧班列而頗淹在朝章而可舉藩僚之選以序而進可守太子左贊善大夫依前直中書散官勳封如故敕福建節度孔目官朝議郎試左金吾衛長史上柱國賜緋魚袋王幹文林郎壽州録事上柱國郭皎等貞以幹事敏于在公掌戎門之條目精詳著稱董方州之財賦底慎惟勤宜懋乃官以疇其效幹可試太子左贊善大夫餘如故皎可朝議郎行鄂州武昌縣尉勳如故敕滑亳節度都知兵馬使銀青光祿大夫試殿中監孫朝俊父朝議郎行原州司戶參軍上柱國孫履暉器韞黃中行敦素尚勤於學藝守以謙光頃踐班資未申才用顧其允嗣積有勤勞宜列宮僚俾光庭訓可試太子右贊善大夫散官勳封如故敕朝散大夫前守彭王府咨議參軍充內飛龍廏驅使賜紫金魚袋張崇俊敏行資身良才適用列官朱邸早陪文學之車從事玉臺久佐飛黃之皂強力匪懈清心不渝忠效見稱器能可録王門傳道允藉純臣仍進榮階俾超彞序可銀青光祿大夫韓王傅餘如故敕攝郡牧都使判官朝議大夫行王友上柱國衛元圭頃以勤勞爰從獎授紀官之號有犯聞名俾更他職式叶彞典可守蜀王府咨議參軍餘如故敕正議大夫試祕書監前吉州刺史上柱國蕭縣開國男賜紫金魚袋李友信往以剖符閩徼頗守官常移鎮廬陵稍遷秩序而晦明生疾寒暑經時久淹海隅尋易藩寄使臣所鞫情實用彰宜降常資之授俾申頤養之適可試蜀王府司馬散官勳封賜如故門下天府惟雍神皋作京當四海之會同在三輔而尤劇漢以郡國二千石高第入守而轂下稱之今因其制而選用亦陟明於辨理也正議大夫守汝州刺史兼御史中丞知本州營田上柱國平昌縣開國男賜紫金魚袋孟皞端一亮外寬內肅兼文行忠信之美達禮樂刑政之要在割能斷見事風生歷踐通列侃然處正自守梁宋化行山東承大軍荊棘之餘當析骸易子之後苦心精慮夙夜思職淳鹵載作豈止十千之耦流人自占實踰八萬之數可謂大郡表率一時理平移鎮汝墳不易其操懋茲聲績堪委重煩京師化源庶尹之則承平無事統正猶難或多毀傷失名數月輒罷況寇難未靖邊備尚勞率西之師取給畿內戎衣軍餉困竭閭閻姦人豪奪吏氣傷沮屢有申敕未懲其弊思得至公明斷之才曠然大變其俗是用命爾典司劇任勉修先父之職以繼緇衣之好肅清權右扶養元元無俾趙張專美有漢可守京兆尹依前兼御史中丞仍充勾當神策軍糧料及木炭等使散官勳封賜如故門下方外甫定惟新制度必於根本源流正之以丕式於十有三牧縣內之御萬邦所瞻將自中刑外致一其政化若獨任辨吏何以模楷故前代尹京多用經術之士翟方進雋不疑皆首參此選稱於轂下今亦因其制而進用也正議大夫行尚書兵部侍郎信都縣開國男賜紫金魚袋賈至高文典誥合於韶雅五經大義會於宗極識略精技輔之以仁全節致命形於危難歷階要重淡然虛懷宗伯以和人神夏官以糾邦國久於參二多所發揮省理持綱亦既詳當朝有大議訪求所得於公卿大夫之間舉漢魏名臣之奏不失其正有補於時加以經務大才堪任煩劇艱虞一紀曠廢百度有司失職京邑尤甚頻有賑救差可條緝今京府九卿率由舊典大變風俗以明朝綱統尹之重益難其任仗賢立政參領南臺懋乃休績慎乃出令以懲強猾以惠困窮舉能其官則理稱匪其人則敗端本靜末爾其誡之可守京兆尹兼御史大夫散官勳封賜如故門下肅清風俗糾正朝廷必求蹇諤之才式總綱紀之任金紫光祿大夫行京兆尹上柱國巨鹿郡開國公魏少遊直方其行亮在躬有玉壺之清澄兼龍泉之斷割通變可以成庶務精密可以舉人倫中外纍更風聲益振法無所避姦不能欺二職司徒實平邦教三尹京邑備洽人謠不有兼官豈云重寄宜授趙堯之印俾雄張敞之職可檢校御史大夫餘如故門下域彼四海尹茲東郊分其三川式是中憲加以舟車之會轉輸之殷參二保責成播殖總此庶務屬於兼才銀青光祿大夫行中書舍人上柱國河東郡開國公張延賞相府餘慶儒門濟美德行文學修身於四科忠肅恭懿齊名於八族綽有純性淡然素懷凡所歷職必聞異政推之以誠信明恕守之以廉能簡約既精練於典常亦陶融於理本故左曹之駮所為平當南臺之綱斯焉振舉自參紫垣之列頗擅黃縑之妙然以素更中外可任煩劇河洛凋殘其來自久迭用良吏庶康疲人典領之重眷求無易勞徠安集往哉汝諧可檢校河南尹兼御史中丞充東都副留守河南水陸轉運使仍充諸道營田副使專知都畿營田事散官勳封如故敕四方取則千里分圻實惟卜洛之都咨爾尹京之任御史中丞東都畿內觀察使李勉才茂宗枝名推公器風標自肅操履愈高智略可仗於安危忠貞克同於休戚親賢是賴中外必聞屬肆覲觀風三川展義來蘇望積處劇才難實資模楷之良共緝保之政可守河南尹兼御史中丞勳封如故敕中散大夫守太子左庶子兼御史中丞充關內副元帥判官路嗣恭蘊其才略資以幹能中外纍更政聲尤異龍樓諭善載實春華烏府持綱克平霜憲三王佐理九扈劭農宜升亞尹之秩兼資大田之務可兼京兆少尹敕朝散大夫前守諫議大夫兼侍御史內供奉賜紫金魚袋黎幹經遠良圖宏通敏識典墳聚學風雅成文操守甚貞行歸於正早登近掖見重中朝俊德用彰嘉言罔伏頃有歸間之志益存難進之誠亞彼尹京眷求公器宜膺獎命俾展多方可京兆少尹散官勳封如故敕朝散大夫殿中侍御史內供奉充河東支度判官上柱國賜緋魚袋賈耽燕趙王褱奇之士儒雅之才循良秉懿沖用經遠著安邊之上策佐分閫之中權行達理體精詳法度論兵契要先務於止戈饋運惟艱且聞於足食纍書嘉績備洽令猷素推兼濟之能允叶至公之舉固可以二其尹正副我保釐俾參臺閣之寵仍賜采章之命可檢校尚書膳部員外郎兼太原少尹侍御史充北都副留守河東支度副使仍賜紫金魚袋散官勳如故敕朝議大夫守鳳翔府天興縣令張增平以清心直方以慎行積於政理擅於文詞字人晉陽大變風俗更秩陵邑不阿貴強迭居右輔其政如一屬府兼戎號歲聚軍儲允濟率西之師且無大東之刺賞以勸善官惟任能二我藩畿仍參邦憲可守鳳翔少尹兼侍御史散官如故
