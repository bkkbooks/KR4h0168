front:
  text: 全唐文欽定全唐文卷八太宗五
  hash: sha256:6480d36efde292b1348e2bb0605f531730cf7efa6db102ed99f5f896b12a47a5
body:
  text: 太原之地興運所階全晉之人義深惟舊自朕恭膺寶歷二紀於茲何嘗不御扆長懷想崤陵之風雨臨軒遠感念大麓之雲雷當於此時乃忘身而拯溺實賴同德並贏糧而樂推役不踰年遂清區域諒繇成都之衆謳訟闡虞帝之功戰牧之徒歌舞興周王之業仗茲協力竟至升平懷彼勤勞何忘晷刻既因垂拱之暇再省創業之方周歷郊原宛如疇昔訪其父老巳多長謝不見所識魏后遂以興嗟恤彼故人漢皇因而式宴前王是日哀樂交懷在朕深衷義符於此是用具陳廣樂共申高宴取譬還譙之賞同彼幸代之情仍曲赦并州管內大辟巳下繫囚見徒皆赦除之常赦所不免者不在赦例朕粵自眇年時逢道喪懷生之類盡塗原野是用痛心疾首攘袂救焚以戰場為俎豆以干戈為章服夕不遑息寧濟四方饑不及餐推移一紀幸賴上元幽贊下土宅心承天嗣歷勵精求政蠲百王之積弊振千祀之頽綱旰食宵衣百齡行半洎乎至道方泰荼蓼遽侵自十九年以來亟罹哀恤又屬高麗逆亂毒被韓夷微物不安無忘隱惻遂復躬行弔伐遠涉遐荒時歷暄寒體親風雨雖復澄氛海外有慰深衷久倦征途乃多虛弊方今兆庶殷阜六合廓清垂拱無為允在茲日而皇太子治令德遠彰所有機務可令斷決百辟卿士咸宜受其節度朕當親調五藥暫屏萬機三數月閒且自怡攝朕拯溺師旋省方禮畢四海無事百揆多閒遂因暇日詳觀典府考龜文於羲載辨鳥冊於軒年不出巖廊神交千祀之外穆然旒纊臨睨九皇之表是知右史序言繇斯不昧左官詮事歷茲未遠發揮文字之本導達書契之源大矣哉蓋史籍之為用也自沮誦攝官之後伯陽載筆之前易代史臣皆有刪著仲尼修而採檮杌倚相誦而闡邱墳降自西京班馬騰其茂實逮於東漢范謝振其芳聲蕞爾當塗陳壽敷其國志眇哉有宋沈約裁其帝籍至若梁陳高氏朕命勒成惟周及隋亦同甄録莫不彰善疸惡振一代之清芬褒德懲凶備百王之令典惟晉氏膺運制有中原上帝啓元石之圖下武代黃星之德及中朝鼎謝江右嗣興並宅寰區纍重徽號足以飛英麗筆將美方書但十有八家雖存記注而才非良史書虧實録榮緒煩而寡要行思勞而少功叔寧課虛滋味同於畫餅子雲學海涓滴堙於涸流處叔不預於中興法盛莫通於創業洎乎干陸曹鄧略紀帝王鸞盛廣松才編載記其文既野其事罕傳遂使典午清塵韞遺芳於策金行曩志闕繼美於驪騵遐想寂寥深為歎息宜令修國史所更撰晉書詮次舊文裁成義類俾夫湮落之誥咸使發明其所須可依修五代史故事若少學士亦量事追取朕聞獯獫強暴歷代憑陵結晦關都凝氛大漠家山宅野時獸聚而禽分幕毳廬氊乍屯而蟻集退因利飽進為財饑前王弊其貪殘中夏憚其荐食然而三策短慮非為禦寇之方千里長城豈謂靜邊之計故以百王靡服千古不賓種落實繁奸回孔熾武德之際飲馬渭濱貞觀之初敢恣凌逼朕載懷慷慨命將出師旗鼓一臨沙漠大定雪涇陽之周恥報白登之漢讎截瀚海以開池籠天山而築苑其餘醜類自巳羈縻勞我邊氓軫余遐念將奮鈇鉞受命上元延陀惡積禍盈今日夷滅醜徒內潰凶黨外離契苾送款來降其餘相率歸附惟僕骨同羅猶懷假息冰消雹碎匪夕伊朝豈朕威德所懷故乃蒼旻之惠觀賊此勢何能自全今不乘機恐貽後悔故欲暫往靈州親自招撫安邊靜亂下固氓基一軌同文永宏家業使萬里之外不有半烽百郡之中猶無一戍永絶鎮防之役豈非黎元樂見雖復去歲東征士馬勞倦甫旋京邑曾未踰年今秋復行理多疲頓但以良藥苦口非病者甘焉而必飲之思去膏肓之疾私種弊力豈農夫樂焉而必履之求其倉庫之益斯皆忍小惡而成大美就輕害而得殊功朕積疾纍時今尚虛惙必欲牽疴就路以赴天機百辟士庶幸勿辭也遼東從兵皆不差發布告天下悉朕意焉高明之天資星辰以麗象博厚之地藉川嶽而成形況於帝王體元立極臨馭萬物字養生靈者乎所以致治之君遠讒佞近忠良屈己以伸人故能成其化為亂之主親不肖疏賢臣虐下以恣情用能成其亂明君遵彼以興國暗主行此以亡身是以馭朽臨冰銘心自戒宵興旰食側席思賢庶欲博訪邱園搜採英俊弼我王道臻於大化焉可令天下諸州明揚側陋所部之內不限吏人其有服道棲仁澄心礪操出片言而標物範備百行以綜人師質高視於琳琅人不閒於曾閔潔志邱園揚名里閈或甄明政術曉達公方稟木鐸於孔門受金科於鄭相奇謀閒發明略可以佐時識鑒清通偉才長於幹國或含章傑出命世挺生麗藻遒文馳楚澤而方駕鉤深覩奧振梁苑以先鳴業擅專門詞高載筆或辨雕春囿談瑩秋天發研機於一言起飛電於三寸蓄斯奔箭未遂揚庭並宜推擇咸同舉薦以禮將送具狀表聞限以今冬並與考使同赴庶使焚林之舉咸矯翼於巖廊尺木之階方振鱗於遊霧翹心俊乂稱朕意焉省書具悉來意法師夙標高行早出塵寰泛寶舟而登彼岸搜妙道而闢法門宏闡大猷蕩滌衆罪是故慈雲欲卷舒之而蔭四空慧日將昏朗之而照八極舒朗之者其唯法師乎朕學淺心拙在物猶迷況佛教幽微豈能仰測請為經題非己所聞新撰西域記者當自披覽周室姬公陪於畢陌漢庭蕭相附彼高園寵錫墳塋聞諸上代從窆陵邑信有舊章蓋以懿戚宗親類同本之枝幹元功上宰猶在身之股肱哀榮之義實隆始終之契斯允今宜聿遵故實取譬拱辰庶在鳥耘之地無虧魚水之道宜令所司於昭陵南左右廂封境取地仍即標志疆域擬為葬所以賜功臣其有父祖陪陵子孫欲來從葬者亦宜聽允朕勞形育物盡敬承天蠢動不安櫛風而罔倦荒隅未靜救焚而靡息獨運方寸貫徹上元凝想冕旒化行戎狄是知惟天為大合其德者弗違謂地蓋厚體其仁者光被故能彌綸八極輿蓋兩儀振絶代之英聲畢天下之能事彼胸奴者與開闢以俱生奄有龍庭共上皇而並列僭稱驕子分天街於紫宸仰應旄頭抗大禮於皇極公犯帝座流殃搆禍乃於運初憑陵障塞連年壓境射雕馳騎亟飲灞川逐鹿騰氛頻驚渭汭貽先皇之動色俾黎庶之塗原社稷為虞軫情何巳自朕御天下二紀於茲曩者聊命偏師遂擒頡利今茲始宏廟略巳滅延陀雖則麾駕出征未踰郊甸前驅所轥才掩塞垣長策風行巳振金微之表揚威電發遠讋沙場之外遂使鴈山之北無復單于龍燭之南大開封域其契苾車必俟斥及鐵勒諸姓迥紇胡祿俟利發等總統百餘萬戶散出北漠遠遣使人委身內屬請同編列並為州郡引領翹足暴十日而行油雲延首求哀沈九泉而請營魄朕當暫幸靈州親撫歸附宏茲肆赦加以施生頒惠天隅曜威雲朔收其瀚海盡入提封解其辮髮並垂冠帶混元以降殊未前聞無疆之業永貽來裔古人所不能致今既吞之前王所不能屈今咸滅之斯實書契所未有古今之壯觀豈朕一人獨能宣力蓋繇上靈儲祉錫以太康宗廟威靈成茲克定即宜備禮告於清廟仍以大慶頒示普天俾與黎元同茲有賴朕聞物之順也雖異質而成功事之違也亦同形而罕用是以舟浮楫舉可濟千里之川轅引輪停不越一毫之地故知動靜相循易為務曲直相反難為功況乎上下之宜君臣之際者矣朕以無明於元首期託德於股肱思欲去僞歸真除澆反朴至於佛教非意所遵雖有國之常經固弊俗之虛術何則求其道者未驗福於將來修其教者翻受辜於既往至若梁武窮心於釋氏文鋭意於沙門傾帑藏以給僧祇殫人力以供塔廟及乎三淮沸浪五嶺騰烟假餘息於熊蹯引殘魂於雀鷇子孫覆亡而不暇社稷俄頃而為墟報施之徵何其繆也而太子太保宋國公瑀踐覆車之餘軌襲亡國之遺風棄公就私未明隱顯之際身俗口道莫辨邪正之心修纍葉之殃源祈一躬之福本上以違忤君主下則扇習浮華往前朕謂張亮云卿既事佛何不出家瑀乃端然自應請先入道朕即許之尋復不用一回一惑在於瞬息之閒自可自否變於帷扆之所乖棟梁之大體豈具瞻之量乎朕猶隱忍至今瑀尚全無悛改宜即去茲朝闕出牧小藩可商州刺史仍除其封高麗餘燼謂能悔禍故遣停兵全其巢穴而凶頑成性殊未革心前後表聞類多不實每懷詭誑罪極難宥見朕使人又虧蕃禮所令每云莫擾新羅口云從命侵淩不止積其姦惡嘗包禍心蓋天攸棄豈宜馴養自今巳後勿聽朝貢朕因東行憂勞幸靈州綏撫冒寒來往稍覺疲弊今欲至歲暮以來怡攝宜暫靜其祭祀及諸方表疏蕃客兵馬宿衛應行魚契給驛授五品以上官及五品以下官降解斷死罪等事依常式奏聞自餘並取皇太子治處分朕念遠役初寧頗須休息深知所請甚合機宜即事省方恐生勞擾俟百姓閒逸可徐議之朕遐觀哲王煥在方冊功既成矣咸禮備以升中道既行焉必奉符而告禪所以發揮天命昭報上靈其有建顯號以創鴻徽施尊名而騰茂烈者莫不揚輝於鏤玉絢景於塗金昭昭然麗三辰而並運滔滔焉播四溟而極深朕誠寡德良深景慕曩者氓俗凋弊國步甫安勉致隆平日不暇給而槐卿守闕請繼美於云亭嶽牧叩閽祈踵武於梁岱自惟菲薄至道未凝抗禮皡穹實懷疑懼緬尋幼齒運鍾交喪忘其家以徇天下委其體以濟寰中翊戴先皇削平諸夏出於萬死首導五橫之源不顧一身先錫兆人之命越自爐炭獲返營魂拔於鬼録並登仁壽竊惟天地之大德存於施生朕以徑寸之小心襲於造育降斯休泰諒或繇茲不然者何能致於此也遂得池隍象浦苑囿龍沙置一於鶼林同六爻於鰈水實資天眷賁以咸亨豈朕微庸而能及此今茲列辟卿士鴻生碩儒各述靈徵纍陳丹款既迫㣥議當事敬從朕聞堯舜之君自愚而益智桀紂之主獨智以添愚故異順逆於忠言則殊榮辱於帝道朕登躡宇宙字育黔黎恐大德之或虧懼小瑕之有纍候忠良之獻替想英傑之謀猷而諫鼓空懸逆耳之言罕進謗木徒設悸心之論無聞唯昔魏徵每顯余過自其逝也雖有莫彰豈可獨非於往時而皆是於茲日故亦庶僚苟順難觸龍鱗者歟所以虛己外求披衷內省言而不用朕所甘心用而不言誰之責也自斯巳後各悉乃誠若有是非直言無隱門下朕聞天大地大首播黎元媧皇燧皇肇恭元籙是知施生為德處崇高而不言亭毒攸資委欽明以司契洎乎三正迭建五運相遷休烈存乎典墳至道流乎雅頌歷茲十代咸宅九州逖聽風聲抑可知矣其有仰齊七政俯會百神察靈眷於祥符報元功於昭告莫不罄情梁岱繼踵云亭對越兩儀盡先聖之能事揚蕤三統垂曩哲之尊名懸鏡天衢罔不繇於此也自中陽絶紐堙白水於窮流宮孽紹興阻黃星於天塹永嘉東播化金馬以為牛道武南徂飛蒼鵝以登祚周吞嶽裔逮三葉而巢傾隋并舜後及二帝而舟覆莫不以凶易亂譬畏迹而橫奔以暴代昏同抱薪而止燎咸資攸斁之道冀及淳化之源各肆巨壑之心規享上靈之佑卻行求進其可得乎繇是寂寥千祀無懷之風不嗣泯棄七經子長之言殆絶遂使成山日觀久闕升中之儀汶上明堂疇聞類帝之義顧瞻禮樂深有可嗟朕幼踐危機愍斯窮運上同附翼下靡息肩化感天狼虔劉帝㝢鴻波蕩嶽溺橫流而罔訴大浸稽天墊重昏而莫拯惴惴黔夏各垂餌於鯨鯢籍籍僵尸並糜肌於猰窳上靈慈惻爰啓朕心景命潛通秉其仁育之性陰符煥發導以戡翦之功於是負荷休徵援旗鞠旅肅恭儲祉吟雲躍鱗順朱鳥以行誅鶱丹鳳而遐舉射九烏而懸日月區品物以煦陽和練五石以造乾坤濟厥角以全眉壽於是尊奉先帝凝旒於廟堂躬履兵鋒憂勤於燮輔既而仰逼威命俯順樂推越自唐侯言膺下武深惟憂責之重自勗若厲之懷遂致靈貺無涯翦旄頭而降錫遊魂削袵盡窮髮以開疆東苑蟠桃西池昧谷咸覃正朔並充和氣較凝旒於往代窮今古而罕聞考光宅於前皇罄油緗而莫覩方今六合之表擊壤傳聲四海之隅菑畬歲稔食氣者靡乖其性稟命者相賀其生豈朕眇身勤勞所逮諒繇高明垂鑒祚此隆平今茲三事大夫百僚庶尹各述天人之意請躡封禪之蹤顧惟寡薄推而不有杜絶㣥言至於數四中外之情尤切企佇之望逾深朕又詳思荷財成於穹昊自古賢哲並歸功於大帝迫斯至理弗獲固辭展禮上元實增慙懼可以貞觀二十有二載仲春之月式遵故實有事於太山諸內外臣僚嶽牧卿士既相敦喻將事告成各罄乃心無虧政道恪居所職務協時雍所司宜與縉紳先生載筆圓冠之士詳求通典裁其折中深加嚴敬稱朕意焉其今年朝集使宜集洛陽宮應朝集依十五年三月八日敕諸王並聽來朝其北蕃自磧以南大首領赴會仍令天下諸州明揚仄陋其有學藝優洽文蔚翰林政術甄明才膺國器者並宜知日申送限以來年二月一日總集太山庶令作賦擲金不韞天庭之掞被褐懷玉無溺屠釣之閒務得英奇當加不次主者施行左邱明卜子夏公羊高穀梁赤勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭元服虔何休王肅王弼杜元凱范寧等二十有一人並用其書垂於國胄既行其道理合褒崇自今有事太學可與顏子俱配享孔子廟堂隋末喪亂邊疆多被抄掠今鐵勒並歸朝化如聞中國之人先陷在蕃內者流涕南望企踵思歸朕聞之惕然深用惻隱宜遣使往燕然等州知見在沒落人數與都督相計將物往贖遠給程糧送還桑梓其室韋鳥羅護靺鞨等三部被延陀抄失家口者亦令為其贖取朕聞上代無為簷茅而砌土中季華用戺玉而臺瓊燥濕之致雖同奢儉之情則異朕承皇王之緒執造化之綱包萬類於心端圖八紘於目際夷夏一軌區宇大同雖則德有劣於難名道方參於至義若乃制服垂裳之后服牛羈馬之君弦弧剡矢之奇運車浮舟之制濟時為美功亦大焉至若浩浩九齡炎炎七載融山坼地滔天襄陵生人之艱勞亦極矣彼數德者功莫高乎吞狄此兩災者勞又甚乎裁宮今雖菲食卑宮有慙於曩哲安人濟難不恧於前賢然而人皆輕見重聞貴耳賤目德雖微也以其古而為大功雖巨也以其今而成小不亦謬哉每流鑑於前經嘗披懷而自勗思所以收驕間逸卷欲除華而頃年巳來憂勞頓結暨至茲歲風疾彌時嗟乎濟世之威患攢躬而靡制回天之力痛沈己而難移重以景熾流金風揚溽暑邅回几席旭暮增勞俯仰巖廊寢興添弊雖冀廓景延涼蕩茲虛惙近因㣥下之志南營翠微本絶丹青之工才假林泉之勢峯居隘乎蚊睫山徑險乎焦原雖一己之可娛念百僚之有倦所以載懷爽塏爰制玉華故遵意於朴淳本無情於壯麗尺版尺築皆悉折庸寸作寸功故非虛役猶恐遐邇乖聽方輿怨咨非其樂勞人而竭力好峻宇而雕牆但以養性全生不獨在私在己怡神祈壽良以為國為人比者屢有征行非無疲頓前歲問罪遼左去秋巡幸靈州皆以翦害除凶懷柔服叛豈欲矜轍迹騁盤遊而巳哉今復土木頻興營繕屢動永言思此深念人勞一則以為慚一則以為愧何則胸奴為患自古弊之十月防秋人血丹於水脈千里轉戰漢骨皓於塞垣當此之疲人不堪命尚興未央之役猶起甘泉之功今則毳幕穹廬取為郡縣天山瀚海分為苑池去巳往之長勞成將來之永逸譬回一年力役創此新宮想志士哲人不以為言也布告黎庶明此意焉門下朕聞探元賾者先實而後賓體至公者本仁而末禮名歸於己往哲存而弗務德利於人前聖徇而為急是用範圍天地權輕重以會時宜取則陰陽適通變以從衆欲繇是古之封禪無奪事機所謂奉天咸資務隙朕仰窺前志歷選哲王無懷有巢緬逾繩契之表龜文鳳紀越在俎豆之先扣寂寞以傳疑故可略而言也至如三元立統百物正名步驟之軌非遙損益之源可挹雖堯心廣運局疆域於流沙禹跡遐宣限要荒於碣石猶且先宏即敘次展玉帛之儀首創賓門方備云亭之典告成之義罔弗繇茲況朕奄有方輿閫域該於千古仰承靈眷降福超於百王巨海所環莫非臣妾長河攸括並入封疆日者夷夏同文貞符狎至謂可鳴鑾日觀勒牒仙閭許以來春親行告禪而今延陀一姓流竄西陲控弦萬計初歸正朔亡其沙塞之地游魂戴斗之鄉一物之微猶驚心於夕惕九夷乃陋豈忘懷於施生新就縶維理須安置又以朕往歲躬勤拯溺至於炎月沿比不安公卿庶僚各陳誠請遂有翠微之役非無版築之勞既而山谷阻深朝宗有礙重披丹懇請建玉華朕以寸心經綸億兆冒茲隆熱貽朝野之深憂允乃誠忱副率土之僉望遂復頻有興造恐致勞煩兼聞河北數州頗傷淹潦朕為人父母思濟黎元順動升中理無兼遂其介邱大禮宜且權停前追諸王及四方嶽牧并蠻夷酋長令以明年二月會泰山者今並宜停其朝集使及選舉人等前令詣洛陽宮可依常年集限並赴京師諸為封禪事舉人營造轉運等亦宜並詔停其玉華宮所立制度前巳下詔務從菲薄今乃庶事減省更令卑陋示免風雨稱朕意焉可分道馳驛散頒天下主者施行皇天理物蓄嚴厲於積陰大塊厚生騰殺氣於秋序故霆霓震曜聲懾八紘繁霜凝肅威加萬類朕既承茲介福超上皇玉憂責在躬情兼列代昆蟲不理猶且納隍戎羯未寧豈宜安席逖矣西土自古遊魂昔與北場本同根蒂乘戎致䦧遂爾攜離雞田戴斗是其祭天之地鴈塞干雲上應分術之野疆逾瀚海局距塞垣總其銜燭之鄉並為征賦之俗惟有烏孫舊境罝罘所漏本既先拔末豈能全皮尚不存毛將安附侵軼旅獒之壤剽掠巨雀之藩播此凶荒歷年茲久積其愆禍崇凶貫盈凡厥氊裘不勝焦爛蠢茲板屋盡苦侵漁膜拜錦車思拯溺以延首重譯蠻邸叫嚴閽而委命裂裳裹足驟請天誅朕乃眷西顧深悼於懷捨此弗圖孰祗靈命是以求衣待旦對懸亡食哀彼綴旒義增投袂雖臨軒而獨對慮疑謀之罔從乃命鼎司陰籌遠略言才出於脣吻應巳昭於上元昧旦臨朝太史奏曰昨宵甲夜纖阿蝕昴考靈臺之祕徵渾象之舊文月者陰精用刑之兆也星躔胡分數終之效焉是知天道雖高去人非遠至誠仰達應不踰時奉以恭行理當無惑今便躬行推轂制詔夏官禡社出車發明秋令殲斯巨猾救彼蒼黎可遣使持節崑邱道行軍大總管左驍衛大將軍阿史那社爾副大總管左驍衛大將軍契苾何力金紫光祿大夫行安西都護郭孝恪司農卿清河郡公楊宏禮行軍總管左武衛將軍李海崖等總挈黿斬蛟之士帥曳牛佩豕之曹莫不感義長驅誓探巢穴之志循躬距躍將謝肉骨之恩又發鐵勒兵牧十有三部突厥侯王十餘萬騎沸湧動沙場之地呼吸振廣漠之風道自金微會於葱嶺又遣吐蕃君長踰元菟而北臨步搖酋渠絶昌海而西騖齊飛白羽周設天羅鏦金懸米之源掩河津而電擊沫赭崦山之嶠驅日域以雷奔取彼渠魁委於司寇拯其萌隸賜以營魂俾夫六吂月馬凡泛駕免覆車而伏皂十角摧鋒與共抵而俱獻豈非有名動衆本為除殘以義出師貴能懲惡是以倒戈必宥事表於前經輿櫬不誅理昭於往誥其有去危投款悔禍求哀毳幕酋豪宜錫長纓之寵韋韝種落惠以飲喙之娛且夫察微興事者機也勞巳安人者義也天與則取可謂乘機衆欲斯從是名敦義踐機而必作戴義以行之今此一勞永康四表折兵難再或失時宜以朕之懷速頒天下昔平仲云亡齊后深股肱之慟太真既沒晉君悲社稷之臣故悼往飾終義存追遠褒忠録舊事本因心故開府儀同三司上柱國申國公士廉德範宏深風猷遠著道高廊廟望重勳賢職在銓衡穆九流而馳譽位居端右總百揆而騰芳班職台儀具瞻允集忠謀令範遇物必彰造膝危詞類多宏益瞻風力以齊軌軼伊呂而長騖朕爰在弱齡早敦姻戚綢繆眷遇多歷年所方期翊茲景化永贊隆平曾不憗遺忠良奄及感惟永往震動厥心儀形莫追徽音日遠宜崇禮命式表哀榮可贈司徒使持節都督并汾箕嵐四州諸軍事并州刺史給班劒四十人及羽葆鼓吹賻絹布二千段米粟二千石陪葬昭陵令攝鴻臚卿監護昔周武應天克寸瑤臺而靡處漢高作極獲萯陽而不居散服桃林革命先於卜雒既遷枌社創制肇於疏龍朕御九成有乖斯義以茲撫事尤須改作何者文營仁壽概日臨雲煬起乾陽銜珠帶璧比阿房而競爽猶且有加擬傾宮而騁麗全為具體隋德云謝其徵在茲朕悼於懷為日既久故違其侈義顯茲令辰加以心懷濟育事切於肌膚亟犯風霜疾纏於腠理每至隆曦屆序大火摛芒雖對寒泉如升頭痛之坂式居珍簟若涉炎火之林繇是嶽牧憂惶公卿駭懼纍陳丹懇請建山宮歷載既深竊愛百金之費詳其至理宜順萬姓之心朕往冒兵凶為黔首而忘己今茲清暑豈勞人而取安但以上奉宗祧下寧兆庶身非己有不可自輕敬思休攝之方兼履古先之道發明二指創此一宮即㵎疏隍憑巖搆宇土無文繢木不雕鎪矯金鋪以荊扉變綺窗於甕牖負扆協幽貞之賞垂纊嘉遁世之情振此沖規方垂帝範今既成之不日賴洽普天宜順發生宏茲霈澤可曲赦宜君縣官及百姓并督作官人丁匠等大辟罪巳下常赦所不免者不在赦例其營造監當官人量加品秩及衛士以上並節級賜物先在宮苑內住移出外者給復三年悼往飾終實惟茂典高班縟禮允屬名臣故特進宋國公瑀稟粹挺生含章秀出慶傳積德道映搢紳登朝膺務多歷年所出綜機揆雅道光於廊廟入司綸綍讜言聞於帷扆行歸恭儉志存靜退輔德無閒逝川奄及緬惟既往震悼良深宜錫寵章式光幽穸可贈司空使持節都督荊峽嶽朗澧五州諸軍事荊州刺史官封如故陪葬獻陵宜令使人持節冊命贈絹布五百段并賜東園祕器輟膳流哀悲深棟幹徹懸興感悼切股肱是知縟禮飾終道先彞冊贈章追遠事本因心故司空梁國公元齡蹈義挺生資忠秀出功宣翼贊誠著艱難推轂代藩參六飛之馭沃心皇極均十亂之重恪居端揆亟積暄寒九功繇其日用百辟於焉仰止若乃恭儉周慎之心奉國忘私之志足以抗衡上列獨映終古方申倚寄永贊隆平曾不憖遺摧梁奄及永惟良輔是用震慟於厥心宜加寵靈式旌泉路可贈太尉使持節都督并箕嵐勝四州諸軍事守并州刺史所司備禮冊命給班劒四十人及羽葆鼓吹賻絹布二千段米粟二千石陪葬昭陵賜東園祕器仍令工部尚書閻立德攝鴻臚卿監護昔隋季失御天下分崩四海塗炭八埏鼎沸朕屬當戡亂躬履兵鋒亟犯風霜宿於馬上比加藥餌猶未痊除近日巳來方就平復豈非福善所感而致此休徵耶京城及天下諸州寺宜各度五人宏福寺宜度五十人朕聞以德下人者昌以貴高人者亡是以五嶽淩霄四海亘地納汙藏疾無損高深志沖欲以匹夫解位天子朕若有罪是其直也若當無罪是其狂也譬尺霧障天不虧於大寸雲遮日何損於明今卿等皆欲致以極刑意所不忍可更詳議任流遠方皇太子治業隆三善道兼四學惟忠孝是資寬仁在慮興言獄犴每切於懷以春陽方動請行寬宥惻隱之辭屢聞旒扆宜順其所請曲流恩降雍州長安萬年兩縣及諸司見禁囚徒三年巳下差降杖罪並放免徒罪巳上徵銅未輸者亦從降例昔興殷解網動嘉惠於生靈惟堯肆赦播深仁於四海撫名嶽登甘泉疏長河揖儀鳳惟皇祚惠此為常範朕敻越前古祗膺寶位雖復十角之寇久變衣冠而乃三韓之野尚興車甲言念艱勤無忘鑒寐兼以去冬無雪獻歲愆陽陳尊俎於四衢免租田於百郡昔成湯七載始聞兢惕朕今三月實懼於懷是以政令除殘商羊繼舞昭回停詠纖阿銜畢密雨高飛傾河驟瀉至誠無爽天意非遙宜布寰瀛同滋愷澤可大赦天下大辟罪巳下無輕重咸赦常赦所不免者不在赦限其有亡官失爵宜量收敘八十巳上各賜粟帛鰥寡惸獨及篤疾者量加賑貸昔晉羊公云逝名都為之罷市鄭子産斯亡在機於焉投杼故開府儀同三司上柱國衛國公李靖蘭畹騰芳釣川揚佐氣淩關外志溢戎場興言締搆十角將三吳咸偃披勳王府閩禺與渾塞同揮澄妖氛於下瀨闡皇猷於高門舟楫遐宣台儀近曜官稱載靜休有餘芳蘊茲高志歸乎樂善遊赤松於艾服之年訪黃綺於杖鄉之歲語默之趣儔今罕匹進退之道對古為朋逝川東馳高舂西靡眷言永往情深哀悼昔帷堂始事荀公有追贈之文郊平既穸祭遵致容車之禮式旌泉壤以備哀榮可贈司徒使持節都督并汾箕嵐四州諸軍事所司備禮冊命給班劒四十人及羽葆鼓吹陪葬昭陵賜東園祕器仍令攝鴻臚寺卿享監護羽儀送至墓所吐蕃醜類背約孤恩卿等同嫉寇讎為國展效深入賊境久冒艱危至於勤勞豈不知委頃聞在彼小有喪敗卿等非不盡力自是主將無謀古之用兵在於責帥王昱緣此亦巳貶官卿等但須悉心不可因茲阻氣遞相激勵以保功名戰亡之人深可憫惜並申弔祭用慰幽魂其病醫及陳亡之家宜委陳繇與州縣相知優恤
