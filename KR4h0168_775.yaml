front:
  text: 全唐文欽定全唐文卷七百七十五李商隱五
  hash: sha256:e2d59f726ec5ff9995146bd8b7f5f7ce3dc2b7621b629ae722f576b3cf251752
body:
  text: 伏見恩制相公以五月十九日登庸清廟降靈蒼生受福動植之內歡呼畢同某下情不任忭賀踴躍之至相公稟潤咸池承光太極業傳殷相族預周盟為㣥生之司南作九流之華蓋自頃文場鞠旅冊府揚鑣坐奮英詞折班馬之方駕入陳嘉話納晁董之降旗百家無抗禮之人六藝絕措詞之士一昨秋官分寵風憲兼司克揚典刑肅整嚴裁重以潞潛逆孽帝命遄征賁赫之告變雖來蒯徹之說詞未巳人懷顧望師有逗留相公斂笏忘家單車就路明宣朝旨密授兵機謀窮遁甲之精辯得鈐經之要遽使戎臣釋位謀士資忠兇渠計盡而就誅逆黨死前而知悔太行九折復連洛宅之封疆啟聖千門更降明皇之歎息寧聞伐善愈恐書勳魯司寇三日之間戮正卯於兩觀之下漢司隸一旬之內取張朔於合柱之中並罪得匹夫功非方面苟將擬議良匪同途而又代朔舊戎沙陲小梗既謀元帥果在賢王相公復以全謀副司戎重遠揚威畫尋以懷柔牋函屢獻於懿宗氈罽亟征於內府雖西京哲輔例有重封東晉元僚率多兼領亦罕有下韝必中投刃皆虛曠百代以求人誰一日而爭長今果允扶下武顯踐中樞贊光宅之大猷調復古之元氣往者傅巖佇相唯升版築之夫渭水載占正獲竿緡之叟又豈若相公本枝分慶出自疑流輝襲康叔之親賢稟太邱之道德蕭何家諜不聞代有鼎司鄧禹外門詎是族傳宰匠苟非君子之澤寧光史氏之書佇見扶祐休期修明盛禮南鶼東鰈徒頒饗帝之羞魯甸梁山待瘞事天之檢某嘗因薄伎猥奉深知麟角何成牛心早啖及茲沈滯獲廕燮調瞻絳帳以增懷望台星而興歎昔吳公薦賈非宜銓管之司孔子鑄顏未是陶鈞之力比誼恩重方淵感深嗟覩奧以未期但濡毫而抒懇崔氏之乃心紫闕陳生之思入京城千古揆懷一時均慮臨風託使指景依人柱礎成潤於興雲轍鮒何階於泛海下情無任忭賀踴躍攀戀感激之至不審近日尊體何似彼州是號奧區又稱勝㮣羊叔子之事業方為用武之邦庾元規之風流更是徵文之地人彊而壽氣厚且深伏計戎律既貞詔條盡舉峴山同峻漢水俱清遠想亭皋如飛木葉柳宮務間蓮幕才多杜鎮南魯史之餘山太守習池之宴非留車允即送范雲歌郢中繞雪之妍舞江上弄珠之態樂而不極歡且無荒况彼親鄰又其令季當時鈞軸已相推於弟瘦兄肥此日藩方復共慶於家齊國理外威諸夏內屏明廷昔晉室簪纓宋朝人物謝萬已稱富貴孟昶尋處威權而安石東山尚為士彥重白屋猶是布衣未有鴻雁成行鶺鴒接翼入共鏘金鳴玉出聯大邑高封擁甲多踰萬人列土盡方千里政同魯衛地則冉康方將稟慶於高廟之靈誰敢不忠於大君之側某爰初筮仕即奉光塵接班固於蘭臺陪束皙於東觀悲歡三紀契濶四朝算存歿之途數弔慶之問永惟庇賴獨在高明而方限山川遠違門館嚮風慕義鏤骨銘心儻蒙識以後凋知其不讇敢以尊主安人之誓遠承左提右挈之恩下情無任瞻望攀戀之至伏奉別紙榮示伏承以所撰武宗一朝冊書誥命并奏議等一十五軸編次已成爰命庸虛俾之序引捧緘汗下揣已魂飛久自安排方見髣髴作春秋而救亂由有素臣刪風雅以刺時寧遺小序式蒙善誘安敢固辭伏惟武宗皇帝英斷無疑睿姿不測綠疇緝美瑞鼎刊規太尉妙簡宸襟式光洪祚有大手筆居第一功在古有夙搆之疑食時之敏片辭相炫小道可嗤將以擬人固不同日榮示中所引國朝文字實炳儒林然其間有行實非優附會成累終衰鳳德或露圭瑕豈若世顯華宗代光相座潔隨武之家事纂鄧傅之門風廟戰之權風行於萬里國儉之禮日聞於四方言不失誣事皆傳信固合藏於中禁付在有司居微誥說命之間為帝典皇墳之式某更祈旬月庶立紀綱先深鄙陋之慙已望優容之德甘瓜苦蔕必興歎於墨子羔裘豹袖足貽刺於詩人荷戴之餘兢惕又積伏惟特賜照察不審近日尊體何如尚書居敬行簡自誠而明踐履華資彰灼休問頃者廉居察俗露冕臨人當分陜水旱之餘控二京舟車之會空懸竹使不坐棠陰閉閤而四民自安移書而百城向化爰歸司會是總掄材且去四總八達之謠鄙拔十得五之少不容私謁大闢公途論辯有光訾相無失蔡廓之不署紙尾王惠之莫發書封欲以儗人實在異日固合便登台座光贊帝謨蓋以德水名都條山巨鎮北控并代東接周韓作皇都之股肱擁朔方之兵甲是以蹔勞大斾惠此一方浹以仁聲先之和氣昔何武之揚州入輔黃霸自潁川登庸今古一時賢哲相望側聆後命是亦非遙某早獲趨承常深奬眷末由祇謁無任馳誠伏承旌幢尋達忠武二十五翁尚書克有懿德允叶休期式揚扞屏之功嘗在重難之地頃者河橋作鎮當街亭失律之初上谷受符值卿子喪元之後折簡之誥單車繼來致伊臲卼之邦服我平明之化况茲間歲亟立殊勳虜帳夷妖壺關伐叛旁資巨拔遙藉聲言十萬橫行樊噲長思破敵三千有勇仲由且使知方實兼文武之全才以處親賢之重寄今者靈臺偃伯衢室歸尊永言台鉉之司合屬間平之允豈令歲序久滯藩維潁水云清許田斯闢汝南古多賢士維揚舊號勁兵政令既明歡娛多有投壺雅宴祭遵豈以為妨望月登樓庾亮祇應不淺載懷往歲屢奉初筵今則貧病相仍起居未卜遠思鄒馬方陪密雪之遊遐望荀陳尚阻德星之會瞻望恩顧不任下情王十二郎十三郎扶引靈筵兼侍從郡君今年八月至東洛訖聲塵永已門館依然仲宣非女之才昔慙劉氏安仁當國士之遇今感戴侯仰計交情良深軫悼下情不任感慟之至昨者伏蒙恩造重有霑賜兼假長行人乘等以今月十日到上都訖既獲安居便從常調成茲志願皆自知憐伏以無褐無車古人屢有饋飧受館諸侯不常皆才可持危扶顛辯或離堅合異尚有歷七十國而不遇其主曠五百歲而方希一賢道之難行運不常會苟至於此知如之何某始在弱齡志惟絕俗每北窗風至東皋暮歸彭澤無絃不從繁手漢陰抱甕寧取機心巖桂長寒嶺雲鎮在誓將適此實欲終焉其後以婚嫁相縈弟兄未立陽貨有迷邦之誚王華生處世之心靡顧移文言從初服幸李公之閽者不拒孔融讀蔡氏之家書未歸王粲麤聞六蔽聊翫九流行與時違言將俗背方朔雖彊於自舉匡衡竟中於丙科駕鼓未休搶榆而止然竊觀古昔之事遐聽上下之交有合自一言奬因片善不以齒序不以位驕想見其人可與為友近古以降斯風頓微處貴有隔品之嚴於道絕忘形之契中間柳澹年猶乳抱李北海因與結交裴逖跡困泥塗王右丞常所前席時之不可人以為悲愚雖甚微頗嚮斯義自頃昇名貢籍厠足人流未嘗輒慕權豪切求紹介用脅肩謟笑以競媚取容袁生之門但聞有雪墨子之突曾是無烟每虞三揖之輕畧以千鈞自重閤下念先市骨志在采葑引以從游寄之風興玳筵高敞畫舸徐牽分越加籩事殊設醴憐賈生之少恕禰衡之狂此際舉觴而恨異漏巵對案而慙非巨壑謝家東土延賓而別待車公王令臨卭為客而先言犬子彼之榮重殊謂寂寥伏聞聲塵已移弦晦隋王朱邸方同故掾之心燕地黃金更落他人之手追攀未及結戀無任瞻望門牆若在霄漢伏惟始終識察某頃以聲跡幽沈音輝懸邈空滅許都之刺竟乖梁苑之遊於服義而徒深顧歸仁而尚阻今幸假塗奧壤赴召遐蕃越賈生賦鵬之鄉過王子登樓之地豈期此際獲奉餘恩而又詢劉苑之世親問欒卻之官族優其通舊降以清談言念古人重難兄事季布始拜於袁盎蕭何近下於周昌將用比方彼有寥落徒迫於祇役嘗抱沈疴空思韋曜之茶莫及孔融之酒遂不得仰霑美祿一中聖人歌山簡倒載之歡暗定國益明之量草慼上道徘徊樂鄉况蒙衛以武夫假之駿馬前騰郢路却望漢皋俯緣逐逐之姿翻阻遲遲之戀封牋寫邈下筆難休尚書三兄鎮靜上游儀刑㣥后平南讓勇征北推能固當已注宸襟即歸台席夫歲星降氣嵩岳生神苟鼎飪之可逃則天爵而何寄伏惟特以蒼生為慮也某材誠漏薄志實辛勤九考匪遷三冬益苦引錐刺股雖謝於昔時用瓜鎮心不慙於前輩倘得返身湖嶺歸道門牆麤依鳴益之餘以奉陶鎔之賜則尚可濡毫抒藝殺竹貢能記錄咎繇之謨注解傅巖之命庶於此日不後他人伏惟始終識察某疾穢餘生偶存晷刻豈期妻族亦搆禍凶故司徒公內行政聲鬱為人傑一昨奉辭伐罪克壯其猷躬節鼓旗親臨矢石家財給於公用子弟散於行間始退舍以致師終設奇而覆寇敢問古之名將何以加焉安知垂立大功遽茲薨落伏弦撫斂實有遺音行路之人莫不相弔某窮辱之地早受深知遂以嘉姻託之弱植雖冶長無罪堪成子妻之恩而呂範久貧莫見夫家之盛今則車徒儼散棟宇蕭衰撫歸旐以興懷弔病妻而增歎酸傷怨咽敢類他人伏以姻懿年深交游跡密遠味復圭之美當追命駕之恩謁叙末由悲慨無地不審跋涉道路尊候何似伏計不失調護先皇以倦勤厭代聖上以睿哲受圖系萬國之往居集兆人之悲慶况二十五翁尚書望兼勳舊地屬親賢績久著於藩垣任合歸於陶冶今者果應急召咸副僉諧凡在有心莫不延頸竊料皇闈入謁紫殿承恩覩山邱之端容睠鼎角之殊相便當講惟新之政備爰立之儀伏惟促動前騶速光後命發仲父新柴之井運留侯前箸之籌允贊昌圖亟登壽域天下幸甚某猥以庸薄厚沐恩憐荏苒光陰纒綿詞旨難屯少裕違奉淹時家艱頻臻人理中絕未經殞訴莫獲祈迎仰望清光實動丹款伏惟特賜恩照某行己及鄧州迴望門闌如隔霄漢感知佩德不任血誠某揣摩莫聞疎拙有素侍郎奬其薄伎夙降重言而時亨命屯道泰身否屬茲淹躓不副提攜今者萬里銜誠一身奉役湖嶺重復骨肉支離交廣之歎袁忠荊蠻之悲王粲思人撫事古亦猶今惟當幽禱鬼神明祈日月伏願榮從司計入贊大猷鼓長檝以濟時運洪鈞而播物則某必冀言還上國來拜恩門一吐漢相之茵一握周公之髮斯願畢矣伏惟圖之伏計亦賜念察薛郎先輩早敦分好實慕風䂓是敢託以緘題致之几案就有心懇資其口陳攀戀之誠輸罄無地不審近日尊體何如伏計不失調護昔周以冡宰治國用漢以丞相領軍儲典故具存選倚為重侍郎自膺新寵益副僉諧竊計旬時便歸樞務某幸因科第受遇門牆辱累已來孤殘僅在牋封曠絕歲序淹遐棄席遺簪託誠無地伏許亦賜哀察至冬初赴選方遂起居未間下情不任攀戀某文非勝質黠不半癡辛勤一名契濶九品獻書指佞遠媿南昌懸棒申威近慙北部竊思頃者伏謁於遊梁之際受知於入洛之初彭羕自媒率多徑進禰衡懷刺幸不虛投爾後以地隔仙凡位殊貴賤十鑽槐燧一拜蓮峰眄睞未忘吹噓尚切已吟棄席忽詠歸荑倘或求忠信於十室之間感意氣於一言之會聖人門下不聞互鄉童子車中匪輕壯士則猶希薄伎獲蔭清光雖曠闕於門牆長髣髴於旌棨驥疲吳坂已逢伯樂而鳴蝶過漆園願入莊周之夢下情無任攀戀感激之至不審自到鎮尊體何如德修於身功及於物伏料福履常保康寧皇帝體上聖之姿膺下武之慶爰從近歲式建崇功岱北清夷山東靜謐雖神謀獨運首開樽俎之間而國用取資終賴江湘之入今者方體三革欲鑄五兵燧火庖犧鴻名肇建明臺衢室鳳歷將新固當繁省以正幽明更中外而化勞逸有周室分陜之相有漢庭就國之侯則必夢想外藩東來㣥后以文武兼資者持政柄以理行尢異者講化原實惟明公合首列辟伏惟為國自重某叨蒙恩顧頗漸歲時瞻賴之誠造次於是伏惟特賜信察今早七弟遠衝風雪特迂車馬伏蒙榮示兼重有䘏賚謹依命捧受訖某才不足觀行無可取徒以四丈頃因中外最賜知憐極力提攜悉心指教以得內誇親戚外託友朋謂於儒學而逢主人謂於公卿而得知已竊當負氣因感大言豈謂今又獲依門牆備預賓客禮優前席貺重承筐欲推讓而不能顧負荷而何力倘或神知孔禱師恕柴愚玉真而三獻不疑女貞而十年乃字麤期率勵以報恩知伏惟特賜鑒察不審自拜違後尊體何如二十五翁尚書挺生公族作範儒流踐履道義之門優遊名教之樂伏計頤衛無爽康寧此蓋人所禱祠神保正直下情伏增忭賀之至富平重鎮成皋巨防自頃太守非魏尚之才司馬失穰苴之令坐隳戎律乾沒軍租誰謂殷若長城翻見盡為敵國二十五翁允膺宸眷出總藩條心作靈臺潛運黃公之畧手為天馬暗開元女之符單車以馳杖節而入盡覊駭獸先殪捷猿然後蘇彼疲羸惠此鰥寡免飛芻輓粟之弊除橫征擅賦之門昨者故侯實有逆子敢因微策密有他圖人得而誅天奪之魄盡窮餘黨半在中權此際誠合絕洹水之波腥長平之草二十五翁曲分蘭艾大別淄澠飛魂不冤枯骨猶媿此真所謂仁者之勇無敵丈人之師以貞名冠百城功高一代而又梁園竹苑素多詞賦之賓淮浦桂藂廣集神仙之客以思柔之旨酒用順氣之和聲初筵有儀一石不亂某才非擲地辯乏談天著撰不工王隱文寧逮意嬾慢相會嵇康志有所安而早預宗盟又連姻媾曲蒙賞會畧過輩流况拔自州人昇為座客將何以詠歌盛德祗奉深恩靦冒不容顧瞻自失伏以仍世覊宦厥家屢遷占數為民莫尋喬木畫宮受弔曾乏獘廬近以親族相依友朋見處卜鄰上國移貫長安始議聚糧俄霑厚賜衣裾輕楚疋帛珍華負荷不勝推讓何及雖婁公說漢不問乎褐衣帛衣而孔子觀周亦資於一車二豎策微往哲事過前修倘非因不失親愛忘其醜退惟蹇薄安所克堪白露初凝朱門漸遠西園公子恨軒葢之難攀東道主人仰館穀而猶在丹霄不泯白首知歸伏惟終始憐察祗承人迴伏奉誨示并賜借騾馬及野戎館熟食草料等將遠燕昭之臺猶入鄭莊之館退自循揣實踰津涯况又䘏以長途假之駿足一日而至借車非類於東方千里以遙乘騾更同於薊子拜違漸遠負荷彌深還望恩光不勝攀戀學士長離耀彩仁壽含明奮詞鋒而赤堇慙鋩鈞雅音而泗濱韜響纔踰壯室榮入禁林况自近年仍多大政藩方逆豎夷虜饑戎於雷霆赫怒之時在朝夕論思之地謀惟入獻事隔外朝載觀掃蕩之勳密見發揮之力便當輟於內署錫彼庶方推禹謨殷誥之文贊堯日舜風之化伏惟為國自重某早遊德宇嘗接恩門童冠相隨陪舞雩於沂水星灰未幾隔高宴於柏梁蘭薄懷芳瑤波佇潤竊期光價微借疎蕪濡筆臨牋不勝丹慊二十一翁儒學上流簪纓雅望自還郡印復坐卿曹激水摶風匪伊朝夕不謂復行萬里又擁再麾竊料徵還不出歲杪馬伏波遠征交阯去歷三年葛丞相深入不毛時當五月苟夙夜匪懈即福祿無疆區區下情誠望在此某方臥疴一室收跡他山仰望伏熊但羨飛鳥下情不任結戀之至舍人發揮帝業潤飾王言三代典謨燠然明具兩漢文雅庸可比儔今者運屬長君理當哲輔固以復中書之典法舉政事之本根贊助嘉猷裨成睿化則書辭典冊乃綸閣之餘事也况舍人以至公御物盛德當官率周廟之駿奔極漢庭之議論佇見顯司樞物允致昇平况在諸生倚望猶切某淹滯洛下貧病相仍去冬專使家僮起居今春亦憑令狐郎中附狀伏審職業殷重朝直頻繁雖榮翰之未臨豈遺簪之或忘某疎愚成性采和難移徒以頃蒙舍人奬以小文致之高第果成荒棄上負維持無田可耕有累未遣蓆門晝永或曠日方餐蓬戶夜寒則通宵罷寐懷書竊媿拂硯增悲違奉音徽若隔霄漢量陂結戀但傾鳧藻之誠德宇近心尚阻燕泥之託下情無任攀戀感激之至違闕稍久結戀伏深前月獲望門牆值有賓客吐辭未盡受顧如初某孤僻寡徒嬾慢成性虞生治易眾論同侵揚子草元當時共笑因緣一命覊絏三年常賴恩知免至顛殞伏以士之營道抱器處世立名誠宜俟彼時來亦在申於知者內惟庸薄切有比方陳蕃甚貧未欲掃除一室孟光雖醜已嘗偃蹇數夫倚望光輝實在造次伏惟終始念察伏奉榮示伏蒙賜及麥粥餅啖食易酒等謹依捧領訖某慶耀之辰早蒙抽擢孤殘之後仍被庇庥獲於芟薙之時累受珍精之賜恩同上客禮異編氓桑梓有光里閭加敬負米之養雖無及於終身求粟於人幸不慙於往聖下情不任感恩隕涕之至伏承中元進受治籙兼建妙齋十二叔叶潤靈津凝華霄極既窮理於多能之聖復格神於眾妙之門固以紫簡題名黃寧虛位合兼上治式統高真况齊直是因符圖載演敕地官而校善合天眾以標虔湯谷傳經當同昔日寨林合唱復現今時信九館之靈遊實三清之盛會某常憑元慶屬預嘉招今者遐啟雲裝且縈塵累不獲觀光鶴嶺贊禮鹿堂空吟有待之詩徒鬱非才之恨伏惟亦賜鑒察昨者累旬陪侍坐下賚賜稠謺宴樂頻仍雖曾參不列於四科昔嘗為恨而徐穉再升於上榻今實為榮庥廕光塵激切誠抱嚮望門館不任下情伏惟特賜恩亮陳尊師至伏承紫極宮中大延法眾遷受治職加領真階景氣晏清章辭御徹此固誠通無始跡契自然不然者又安能於憧憧四達之衢建眇眇三清之事某良緣夙薄俗累多縈夏秋已來疾苦相繼仰瞻道會有間初心悔責之來夙宵斯積然但以望恩憐所至乘濟度之因期於異時必獲覩奧則燕昭雖乏於靈氣陶君亦覬於頑仙伏惟照察某十月初始議西上續勒家僮齎狀起居諸具後幅諮謹狀不審近日尊體何如伏計不失調護去冬二十八叔拜迎軒騎已託從者附狀起居及二十三叔歸闕之時某適有私故淹留他縣阻拜清光自春又為鄭州李舍人邀留比月方還洛下以此久闕附狀用抒下情頃者二十三叔固辭內廷屈典外郡避榮之心有素頒條之績又彰今則假道選曹復登綸閣光揚星次煥發天聲為一代之宗師留萬古之謨訓凡在儒墨孰不歡忻况某早奉輝光猥至成立下情豈任抃賀踴躍之至前者伏奉指命令選紀紫極宮功績某自還京洛常抱憂煎骨肉之間病恙相繼章詞雖立點竄未工已懷鄙陋之憂復有淹延之罪更旬日始獲寄上伏惟寬察紫極刊銘合歸才彥猥存荒薄蓋出恩私牽彊以成尢累非少遠蒙寵奬厚賜縑繒已有指揮即命鐫紀文詞所得妙非幼婦之碑惠賚踰涯數過賁園之帛下情無任捧授戴荷之至比者伏承尊體小有不安今已平退下情無任欣抃時向嚴冽伏惟特加頤攝某已决取此月二十一日赴京東望門牆違遠恩顧寄誠誓款實貫朝暾伏計亦賜識察舍弟羲叟苦心為文十二叔憫以弟兄孤介無徒辛勤求巳唯當明祈日月幽禱鬼神願令手足之間早奉陶鈞之賜下情不任倚望感激隕涕之至不審近日尊體何如伏想冲慮真筌融心妙域神明是保戩穀來成滎上淹留軒車已曠圭律井德無改玉音愈清此固擺脫常懷秉持極摯去關鍵於寵辱忘階阯於高卑彼殷浩空函幾勞開閉仲文枯樹屢歎婆娑比之清光實有慙德今春華以煦時服初成竹洞松岡蘭塘蕙苑聚星卜會望月舒吟羊偘接賓共其醒醉謝安諸子例有風流優游名教之間保奉希夷之道伏思受遇素異諸生去歲陪遊頗淹樽俎今茲違奉實間山川曲水氷開章臺柳動子牟豈忘於魏闕嚴助蓋厭於承明仰望恩憐豈任攀戀况某冗煩有素刻畫難施韓信少時罕蒙推擇揚雄終歲唯有寂寥向非月旦貽評陽春獲賞則孤根易拔弱羽難飛答賓戲以那停草客嘲而莫暇撫躬誓款委已銜詞下筆難休戀柯何極龍門不見將同故椽之心麟史可傳徒立素臣之位祗迎榮誨遲慰孤誠伏紙臨風杳動心骨伏承尋到東洛不審尊體何如伏計不失調護近數見崔芻言協律伏承已卜江南隱居轉貼都下舊宅道心歸意貫動昔賢然外以安危所注內以婚嫁之累竊惟時論或阻心期况古之貞棲固有肥遁衣食不求於外藥物自有其資乃可謝絕塵間棲遲事表儻猶未也或撓修存若更駐歲華稍優俸入向平無家事之累葛洪有丹火之須然後拂衣求心抗疏乞罷東都帳飲見疎傅之云歸勾曲樓居樂陶公之不返亦可以光昭紫籍振動元門留孤風以動人垂雅裁以鎮俗飲德歸義之士所望在茲伏惟更賜裁度某識雖蒙騃業繼元虛一官一名祗添戮笑片辭隻韻無救寒饑實於浮泛之中早有潛藏之願異時仰陪仙裝去聲歸從元遊庶或收楊許之靈文纂成真誥按烏張之藥法薄駐流年丹赤之誠造次於是其他並令羲叟口啟不敢繁有諮具不審至今來尊體何如伏以冬年例寒不並常歲伏惟善加攝護下情所望十七郎文華質氣掩軫輩流便當一鳴以赴眾望舍弟介特好退龍鍾寡徒獲依彊宗頓見榮路忻慰之至遠難諮陳伏計亦賜鑒察十二叔淹留伊洛巳變炎凉龍蟄存神鳳翔鑒德賢人事術益以彰明忝預生徒敢用為賀某覊官書閣業貧京都徒成拜遠門闌違奉恩教東望結戀夙宵匪寧至來歲專欲求假起居未間伏惟特賜榮誨謹狀伏承榮加寵命伏惟感慰舍人文苞雅誥道叶皇猷爛雲藻以敷華叶天聲而應律載遷星次爰奉夏官煥綵服於蘭堂耀瓊枝於粉署女侍使虛薰錦帳中謁者方奉芝泥聊用望郎以為假道佇當仰承睿旨近執化權侶四輔以燮和合萬錢於供養某厚承恩顧未獲趨承欣賀莫任瞻戀斯極某簪組末流邱樊賤品倏忽三載邅迴一名豈於此生望有知巳亠兊海大夫時因中外嘗賜知憐給事又曲賜襃稱便垂延納朱門纔入歡席幾陪辱倒屣於蔡伯喈合先王粲枉開罇於孔文舉宜在禰衡豈伊庸虛便比叨幸今者方牽行役遽又違離躡履食魚兼預原嘗之客御車登榻俱參陳李之門生死之寄皆深去住之誠並切伏惟特賜亮察不審近日尊體何如考履納祥為善降福伏料寢味常保康寧給事顯自璅闈出臨鼎邑登茲周甸訓此殷頑鋒芒不鈍而月月自分桴鼓稀鳴而囊橐輒露方今惟新庶政允佇嘉謀載考前人聿求往躅袁司徒入膺論道杜鎮南出授專征並資尹正之能適致超昇之拜伏惟特為休運善保起居下情所望某頑魯無堪退縮有素賦成誰薦食絕唯歌上累門牆頗淹星律屬人生之坎坷逢世路之推遷浮泛常多違離蓋數臨風仰德伏紙含誠緬洛方清瞻嵩比峻敢同上客曾疑樂廣之弓惟羨小民慙倚庾雲之碣下情無任瞻戀感激之至保定賢弟昨至纔獲披承已欽夷雅是觀玉季如對金昆陸有機雲劉惟繇岱豈惟昔日獨有齊名况不羞小官無辭委吏一枝桂既經在手五斗米安可折腰候館屈才固難維縶前籌佇美即議轉遷端公厚賜眷知又聯姻好今茲折簡復輟吹箎此時敢曰恩門他日便為世故永言欣會難以諮陳伏惟亮察伏以華省名曹南臺雜事秩雖亞於獨坐事實同於二丞向非十九兄貌可窒邪名堪鎮俗即孰得允膺邦直顯副帝俞在望實之猶歸固選倚而為重竊惟後命且踐中司詎比晉臣獨號一臺之妙豈同梁代先資八幅之詳某被沐恩知淹延歲序徒嗟却埽久曠升堂望赤棒以兢魂想絳紗而增戀下情無任抃賀之至杜秀才翺至奉傳旨意以遠追先德思耀來昆欲俾虛蕪用備刊勒承命揣已悲惶莫任伏思太和之初便獲通刺昇堂辱顧前席交談陳蔡及門功稱文學江黃預會尋列春秋雖跡有合離時多遷易而永懷高唱嘗託餘暉遂積分陰俄踰一紀今弟克承堂搆允紹家聲將欲署道表阡繼志述事必在博求雄筆鴻生豈謂愛忘忽茲謀及悚怍且久辛酸不勝欲遂固辭慮乖莫逆表嚴平於蜀郡誰不願為叙郭泰於介休亦惟無愧庶磨鉛鈍聊慰招扃伏紙向風悲憤交積前狀中啟述事比者與杜秀才商量只謂卜於下邽克從先次所以須待相國意緒方敢遠應指揮今狀聞便龍門仰遵遺令事同踴塔兆異佳城敢於不朽之文須演重宣之義則不敢更稽誠意俟命強宗敬惟照亮
