front:
  text: 全唐文欽定全唐文卷六百三十四翺字習之涼武昭王之後貞元十四年進士元和末累官廬州刺使大和時歷刑戶二部侍郎拜山南東道節度使會昌中卒諡曰文
  hash: sha256:ed93c006afbb1960c853200697d78ba402681cd09710abf0ce0b91949cb539b7
  markers:
  - {type: head, offset: 14, content: 李翺, id: KR4h0168_NFKB_634-h1, level: 1}
body:
  text: 貞元九年翺始就州府之貢舉人事其九月執文章一通謁於右補闕安定梁君是時梁君之譽塞天下屬詞求進之士奉文章造梁君門下者蓋無虛日梁君知人之過也亦既相見遂於翺有相知之道焉謂翺得古人之遺風期翺之名不朽於無窮許翺以拂拭吹噓翺初謂面相進也亦未幸甚十一月梁君遘疾而歿翱漸遊於朋友公卿間往往皆曰吾久籍子姓名於補闕梁君也翺乃知非面相進也當時意謂先進者遇人特達皆合有是心亦未謂知巳之難得也梁君歿於茲五年翺學聖人經籍教訓文句之旨而為文將數萬言愈昔年見於梁君之文弗啻數倍雖不敢同德於古人然亦常無怍於中心每歲試於禮部連以文章罷黜聲光晦昧於時俗人皆謂之固宜然後知先進者遇人特達亦不皆有是心也方知知巳之難得也夫見善而不能知雖善何為知而不能譽則如勿知譽而不能深則如勿譽深而不能久則如弗深久而不能終則如勿久翺雖不肖幸辱於梁君所知君為之言於人豈非譽歟謂其有古人之風豈非深歟譽而逮夫終身豈非久歟不幸梁君短命遽歿是以翺未能有成也其誰能相繼梁君之志而成之歟巳焉哉天之遽喪梁君也是使翺之命久迍邅厄窮也遂賦感知巳以自傷其言怨而不亂蓋小雅騷人之餘風也其辭曰戚戚之愁苦兮思釋去之無端彼眾人之容易兮乃志士之所難伊自古皆嗟兮又何怨乎茲之世獨厄窮而不達兮悼知音之永逝紛予生之多故兮愧特於世之誰知撫聖人教化之旨兮洵合古而乖時誠自負其中心兮嗟與俗而相違趨一名之五稔兮尚無成而淹此路岐昔聖賢之遑遑兮極屈辱之驅馳擇中庸之難蹈兮雖困頓而終不改其所為苟天地之無私兮曷不鑒照於神祇心勁直於松栢兮淪霜雪而不衰知我者忽然逝兮豈吾道之巳而朋友有相歎者賦幽懷以答之其辭曰眾囂囂而雜處兮咸嗟老而羞卑視予心之不然兮慮行道之猶非儻中懷之自得兮終老死其何悲昔孔門之多賢兮惟回也為庶幾超㣥情以獨去兮指聖域而高追固簞食與瓢飲兮寧服輕而駕肥望若人其如何兮慙吾德之纖微躬不田而飽食兮妻不織而豐衣援聖賢而比度兮何僥倖之能希念所懷之未展兮非悼巳而陳私自祿山之始兵兮歲周甲而未夷何神堯之郡縣兮乃家傳而自持稅生人而育卒兮列高城以相維何茲世之可久兮宜永念而遐思有三苗之逆命兮舞干羽以來之惟刑德之既修兮無遠邇而咸歸當高祖之初起兮提一旅之羸師能順天而用眾兮竟掃寇而戡隋况天子之神明兮有烈祖之前規剗弊政而還本兮如反掌之易為苟廟堂之治得兮何下邑之能違哀予生之賤遠兮包深懷而告誰嗟此誠之不達兮惜此道而無遺獨中夜以潛歎兮匪吾憂之所宜讀黨錮傳哀直道之多尢不容作釋懷賦其辭曰懷夫人之鬱鬱兮歷悔吝而不離吾心直以無差兮惟上天其能知邪何德而必好兮忠何尢而被疑彼陳辭之多人兮胡不去眾而訊之進藎言而不信兮退遠去而不獲弗驗實而考省兮固予道之所厄昔師商之規聖兮德既均而行革惟肝腸之有殊兮守不同其何責願披懷而竭聞兮道既塞而巳行路非險而不通兮人忌我而異情王章直而獄死兮李固忠而陷刑自古世之所悲兮矧末俗之衰誠哀貞心之潔白兮疾苗莠之紛生令農夫以手鋤兮反剪去乎嘉莖豈不指穢而語之兮佯瞪矒而不肯聽歎釋去而不忍兮終留滯亦何成當晨旦而步立兮仰白日而自明處一世而若流兮何久永而傷情樂此言而內抑兮壯大觀於莊生拔馨香之茝蘭兮樹蒿蔚以羅列斥通道而使蕪兮戀棘徑之中絕置春秋而詢心兮羌與此其奚別昔誓詞而約交兮期共死而皆居嗟所守之既異兮乃汗漫而遺初心皓白而不容兮非市直而望利忠不顧而立忘兮交不同而行棄悲夫不徇巳而必仇兮諒非水火其何畏獨吾行之不然兮直愧心而懼義嘉山松之蒼蒼兮歲苦寒而亦悴吾固樂其貞剛兮夫何尢乎小異欲靜默而絕聲兮豈不悼厥初之所志抑此懷而不可兮終永夜以噓唏問初定兩稅時錢直卑而粟帛貴粟一斗價盈百帛一匹價盈二千稅戶之歲供千百者不過粟五十石帛二十有餘匹而充矣故國用皆足而百姓未以為病其法弗更及茲三十年百姓土田為有力者所併三分踰一其初矣其輸錢數如故錢直日高粟帛日卑粟一斗價不出二十帛一匹價不出八百稅戶之歲供千百者粟至二百石帛至八十匹然後可為錢數不加而其稅以一為四百姓日蹙而散為商以遊十三四矣四年春天子哀之詔天下守土臣定留州使額錢其正料米如故其餘估高下如上供百姓賴之以比兩稅之初輕重猶未相似有何術可使國用富而百姓不虛遊人盡歸於農而皆樂有力所併者稅之如戶而士兵不怨夫豈無策而臻於是耶吾子盍悉懷以來告問吐蕃之為中國憂也久矣和親賂遺之皆不足以來好息師信其甘言而與之詛盟耶於是深懷陰邪乘我之去兵而欺神虐人係虜卿士大夫至茲為羞備禦之耶則暴天下數十萬之兵或悲號其父母妻子且煩饋餫衣食之勞百姓以虛弗備禦之耶必將伺我之間攻陷城邑掠玉帛子女殺其老弱係累其丁壯以歸自古帝王豈無誅夷狄之成策耶何邊境未安若斯之甚耶二三子其將亦有說乎右臣等無能謬得秉筆史館以記注為職夫勸善懲惡正言直筆紀聖朝功德述忠臣賢士事業載奸臣佞人醜行以傳無窮者史官之任也伏以陛下即位十五年矣乃元年平夏州二年平蜀斬闢三年平江東斬錡張茂昭遂得易定五年擒史憲誠得澤潞邢洺七年田宏正以魏博六州來受常貢十二年平淮西斬元濟十三年王承宗獻德棣入稅租滄景除吏部十四年平淄青斬師道得十二州神斷武功自古中興之君莫有及者而自元和以來未著實錄盛德大功史氏未紀忠臣賢士名德甚有可為法者逆臣賊人醜行亦有可為誡者史氏皆闕而未書臣實懼焉故不自量輒欲勉強而修之凡人之事迹非大善大惡則眾人無由知之故舊例皆訪問於人又取行狀諡議以為一據今之作行狀者非其門生即其故吏莫不虛加仁義禮智妄言忠肅惠和或言盛德大業遠而愈光或云直道正言歿而不朽曾不直叙其事故善惡混然不可明至如許敬宗李義府李林甫國朝之奸臣也其使門生故吏作行狀既不指其事實虛稱道忠信以加之則可以移之於房元齡魏徵裴炎徐有功矣此不惟其處心不實苟欲虛美於所受恩之地而巳蓋亦為文者又非游夏遷雄之列務於華而忘其實溺於辭而棄其理故為文則失六經之古風記事則非史遷之實錄不如此則辭句鄙陋不能自成其文矣由是事失其本文害於理而行狀不足以取信若使指事書實不飾虛言則必有人知其真偽不然者縱使門生故吏為之亦不可以謬作德善之事而加之矣臣今請作行狀者不要虛說仁義禮智忠肅惠和盛德大業正言直道蕪穢冊不可取信但指事說實直載其詞則善惡功跡皆據事足以自見矣假令傳魏徵但記其諫爭之詞足以為正直矣如傳叚秀實但記其倒用司農寺印以追逆兵又以象笏擊朱泚自足以為忠烈矣今之為行狀者都不指其事率以虛詞稱之故無魏徵之諫爭而加之以正直無秀實之義勇而加之以忠烈者皆是也其何足以為據若考功視行狀之不依此者不得受依此者乃下太常并牒史館太常定諡牒送史館則行狀之言縱未可一一皆信與其虛加妄言都無事實者猶山澤高下之不同也史氏記錄須得本末苟憑往例皆是空言則使史館何所為據伏乞下臣此奏使考功守行善惡之詞雖故吏門生亦不能虛作而加之矣臣等要知事實輒敢陳論輕黷天威無任戰越謹奏臣翺言臣素陋幸得守職史官以記錄是非為事夫通前古治亂安危之大本者實史臣之任也臣雖愚敢懷畏罪之心而不修其職竊見陛下即位以來招懷不廷之臣誅寇賊十餘事刷五聖之憤恥為後代之根本自古中興之盛孰有及者自臣得奉詔朝謁以來親見聖德之所不可及亦巳多矣至如淄青生口夏侯澄等四十七人皆所宜誅斬者也陛下知其逆賊所逼脅質其父母妻子而驅之使戰其陷惡逆非其本心赦而不誅因詔田宏正隨材任使其欲歸妻子父母者縱而不禁臣竊聞夏侯澄等既得生歸淄青賊兵聞之莫不懷陛下好生寬惠之德而遂無拒戰官兵之心矣劉悟所以能一夕而擒斬師道者以三軍之心皆以苦師道而思陛下之德故能不費日而成大功也此聖德之所不可及者一也今歲關中夏麥甚盛陛下哀民之窮困特下明詔放夏稅約十萬石朝臣相顧皆有喜色百姓歌樂遍於草野此聖德之所不可及者二也韓宏獻女樂陛下不受却而賜之昔者魯用孔子齊人恐懼遺之女樂季桓子受之君臣共觀而三日不朝故孔子去魯陛下超然獨見遂以歸之此聖德之所不可及者三也出李宗奭妻女於掖廷以莊宅却賜沈遵師聖朝寬恕億兆欣感者不可備紀若下詔出令一一皆類於此武德貞觀不難及太平可反掌而致矣臣以為定禍亂者武功也能復制度興太平者文德也非武功不能以定禍亂非文德不能以致太平今陛下既以武功平禍亂定海內能為其難者矣若革去弊事復高祖太宗之舊制用忠正而不疑屏邪佞而不近改稅法不督錢而納布帛絕進獻以寬百姓稅租之重厚邊兵以息蕃戎侵掠之患數引見待制官問以時事以通壅蔽之路故用忠正而不疑則功德成屏邪佞而不近則視聽聰明改稅法不督錢而納布帛則百姓足絕進獻以寬百姓租稅之重則下不困厚邊兵以息蕃戎侵掠之患則天下安數引見待制官問以時事以通壅蔽之路則下情達凡此六者政之根本太平之所以興陛下既巳能行其難者矣又何惜不速其易為者乎以臣伏覩陛下上聖之姿也如不惑近習容悅之詞選用骨鯁正直之臣與之修復故事而行之以興太平可不勞而功成也若一日不以為事臣恐大功之後易生逸樂而㣥臣進言者必曰天下既巳太平矣陛下可以高枕而為宴樂矣若如此則高祖太宗之制度不可以復矣制度不復則太平未可以遽至矣臣竊惜陛下聖質當可興之時而尚謙讓未為也臣謹條疏興復太平大畧六事別白於後若行此六者五年不變臣必知百姓樂康蕃虜入侍天垂景星地湧醴泉鳳凰鳴於山林麒麟遊於苑囿此無他和氣之所感也詩曰先人有言詢於芻蕘伏惟陛下明聖思博聞天下之事以助政理故臣敢忘其懦愚而盡忠焉無任感恩激切之至謹奉表以聞臣誠惶誠恐頓首頓首謹言臣聞國之所以興者主能信任大臣臣能以忠正輔主故忠正者百行之宗也大臣忠正則小臣莫敢不為正矣小臣莫敢不為正則天下後進之士皆樂忠正之道矣後進之士皆樂行忠正之道是王化之本太平之事也今之語者必曰知人邪正是堯舜之所難也焉得知忠正之人而用之耶臣以為察忠正之人蓋有術焉能盡言憂國而不希恩容者此忠正之徒也夫忠正之人亦各自有黨類邪臣嫉而讒之必且以為相朋黨矣夫舜禹稷契之相稱贊也不為朋顏閔之相往來也不為黨皆在於講道德仁義而巳邪人嫉而讒之且以為朋黨用以惑時主之聽從古以來皆有之矣故蕭望之周堪劉向謀退許史竟為邪臣所勝漢元帝不能辨而終任用邪臣漢室之衰始於元帝此不可不察也故聽其言能數逆於耳者忠正之臣也雖任之雜以邪佞之臣則太平必不能成矣文宣王曰十室之邑必有忠信如某者焉故忠信之人不難有也在陛下辨而用之各以類進之而巳臣故曰用忠正而不疑則功德成臣聞孔子遠佞人言不可以共為國也凡自古奸佞之人可辨也皆不知大體不懷遠慮務於利巳貪富貴固榮寵而巳矣必好甘言諂辭以希人主之欲主之所貴因而賢之主之所怒因而罪之主好利則獻蓄聚斂剝之計主好聲色則開妖艷鄭衞之路主好神仙則通燒鍊變化之術望主之色希主之意順主之言而奉承之人主悅其不違於巳因而親之以至於事失怨生而不聞也若事失怨生而不聞其危也深矣自古奸邪之人未有不如此者也然則雖堯舜為君稷契為臣而雜之以奸邪之人則太平必不可興而危事潛生矣所謂奸邪之臣者榮夷公費無極太宰噽王子蘭王鳳張禹許敬宗楊再思李義府李林甫盧裴延齡之比是也奸佞之臣信用大則亡國小則壞法度而亂生矣今之語者必曰知人邪正是堯舜之所難也焉得知其邪佞而去之耶臣以為察奸佞之人亦有術焉主之所欲皆順不違又從而承奉先後之者此奸佞之臣也不去之雖用稷契為相不能以致太平矣故人主之任奸佞則耳目壅蔽耳目壅蔽則過不聞而忠正不進矣臣故曰屏奸佞而不近則視聽聰明臣以為自建中元年初定兩稅至今四十年矣當時絹一匹為錢四千米一斗為錢二百稅戶之輸十千者為絹二匹半而足矣今稅額如故而粟帛日賤錢益加重絹一匹價不過八百米一斗不過五十稅戶之輸十千者為絹十有二匹然後可况又督其錢使之賤賣者耶假令官雜虛估以受之尚猶為絹八匹乃僅可滿十千之數是為比建中之初為稅加三倍矣雖明詔屢下哀恤元元不改其法終無所救然物極宜變正當斯時推本弊乃錢重而督之於百姓之所生也錢者官司所鑄粟帛者農之所出今乃使農人賤賣粟帛易錢入官是豈非顛倒而取其無者耶由是豪家大商皆多積錢以逐輕重故農人日困末業日增一年水旱百姓菜色家無滿嵗之食况有三年之蓄乎百姓無三年之積而望太平之興亦未可也今若詔天下不問遠近一切令不督見錢皆納布帛凡官司出納以布帛為准幅廣不得過一尺九寸長不過四十尺比兩稅之初猶為重加一尺然百姓自重得輕必樂而易輸不敢復望如建中之初矣行之三五年臣必知農人漸有蓄積雖遇一年水旱未有菜色父母夫婦能相保矣若稅法如舊不速更改雖神農后稷復生教人耕織勤不失時亦不能躋於充足矣故臣曰改稅法不督錢而納布帛則百姓足臣以為自建中以來稅法不更百姓之困巳備於前篇矣今節度觀察使之進獻必曰軍府羨餘不取於百姓且供軍及留州錢各有定額若非兵士闕數不填及減刻所給則錢帛非天之所雨也非如泉之可涌而生也不取於百姓將安取之哉故有作官店以居商賈者有釀酒而官沽者其他雜率巧設名號是皆奪百姓之利虧三代之法公託進獻因得自成其私甚非太平之事也比年天下皆厚留度支錢蓄兵士者以中原之有寇賊也今吳元濟李師道皆梟斬矣中原無虞而蓄兵如故以耗百姓臣以為非是也若選通達吏事之臣三五人徃諸道與其節度使團練使言每道要留兵數以備鎮守責其兵士見在實數因使其逃亡不補自可以每年十銷一矣告之以中原無事蕃夷可虞每道宜配兵若干取其衣糧以賜邊兵而召戰士使邊兵實則蕃夷不足慮也夫錢帛皆國家之錢帛也宜作明法以取之是也若使通達吏事之臣往使焉雖其將帥之不盡誠者亦不敢有所隱矣今受進獻則節度使團練使皆多方刻下為蓄聚其自為私者三分其所進獻者一分也是豈非兩稅之外又加稅焉百姓之所不樂其業而父子夫婦或有不能相養矣父子夫婦不能相養而望太平之興雖婦人女子皆知其未可也臣故曰絕進獻以寬百姓稅租之重則下不困臣以為方今中原無事其慮者蕃戎與北虜而巳議者以為邊備尚虛皆可憂矣兵法有之曰不恃敵之不來恃此之不可勝今國家威武達於四夷其不敢犯邊為寇雖巳明矣然蕃戎如犬羊也安識禮義而必其不為寇哉且去歲犯邊足以明矣臣以為使緣邊諸節度使特共召戰士十萬人每歲不過費錢一百萬貫則邊備實矣邊上有召戰之聲達於四夷四夷心服不敢為盜矣四夷不敢為盜邊鄙之人得無兵戰之苦則京師可高枕而視矣古人有言君之視臣如犬馬則臣之視君如國人君之視臣如土芥則臣之視君如仇讐上之所以禮我者厚則我之所以報者重故豫讓以眾人報范中行而漆身吞炭以復趙襄子之讐其所以待之各不同也閣下既嘗罰推官直矣又將請巡官狀矣不識閣下將欲為能吏哉將欲為盛德哉若欲為能吏即故江西李尚書之在江西是也閣下如此行之不為過矣若欲為盛德亦惟不惜聽九九之說或冀少以裨萬一閣下既罰推官直又請陸巡官狀獨不慮判官輩有如穆生者見醴酒不設遂相顧而行乎陸巡官處分所由不得於使院責狀科決而於宅中決地界虞候是初仕之未適中也閣下既與之為知巳矣召而教之可也不從退之可也若判令通狀但恐閣下之所失者無乃大於陸巡官乎翺受恩於閣下也深而與陸巡官之交尚淺其所深者誠欲閣下之為全德也若信其所言即伏望使人收取元判召而語之闔府賓寮孰不幸甚如以為小生之言不足聽也我富貴人也何為而不可哉即敢不惟公命翺再拜伏見修寺疏閣下出錢十萬令使院共出十萬以造石門大雲寺佛殿翺性本愚聞道晚竊不諭閣下以為斂錢造寺必是耶翺雖貧願竭家財以助閣下成如以為未必是耶閣下官尊望重凡所舉措宜與後生為法式安可舉一事而不中聖賢之道以為無害於理耶天下之人以佛理證心者寡矣惟土木銅鐵周於四海殘害生人為逋逃之藪澤閣下以為如有周公仲尼興立一王制度天下寺觀僧道其將興之乎其將廢之乎若將興之是符融梁武皆為仲尼周公也若將廢之閣下又何患其尚寡而復率其屬合力建置之也院中判官雖副知巳之命然利祿遠仕亦不以貪也豈無覉孤親友由未能力及賙之歟何暇出錢以興有損無益之務眾情不厭但奉閣下之命而為耳拳拳下情深所未曉伏惟憫其拙淺不惜教誨若閣下所為竟是翺亦安敢守初心以從而不為也若其所言有合於道伏望不重改成之事而輕為後生之所議論意盡辭直無任戰越率修寺觀錢事前後已兩度咨聞伏請停罷前奉處分云要與換寺觀家人院蒲葵屋以為火備此後任停既巳計料支給訖後奉處分又云且更待一兩月者伏以前件錢於公家無補但實置稅名公議所非為日固久不厭尚實但苟思壯麗城池開化源孰大於此若閣下尚不改易則弊終無巳何特愛於此因循未革自仲尼既歿異學塞途孟子辭而闢之然後廓如也佛法害人甚於楊墨論心術雖不異於中土考教迹實有蠧於生靈浸溺人情莫此之甚為人上者所宜抑焉閣下去年考制策其論釋氏之害於人者尚列為高等冀感悟聖明豈不欲發明化源抑絕小道何至事皆在巳而所守遂殊知之不難行乃為貴况使司稅額悉以正名幸當職司敢不備舉伏見朝廷故事一人所見或不足以定是非者即下都省眾議則物情獲申眾務皆理倘翺見解凡淺或未允從院中㣥公皆是材彥伏乞令使院詳議惟當是從理屈則伏不敢徇巳實下情所望屢有塵黷無任戰慄翺再拜故度支李尚書之出妻也續有勑停官及薨亦無追贈當時將謂去妻之狀不直明白無可疑者故及此近見當使采石副使劉侍御說朝廷公議皆云李尚書性猜忌甚於李益而出其妻若不緣身病即合左降翺嘗從事滑州一年有餘李尚書具能詳熟李尚書在滑州時收一善歌婦人陶芳於中門外處之於後陶芳與主鑰廳子有過既發李尚書召問廳子既實告之曰吾從若父所將若來故不能杖若吾非怒而不留若既犯此即自於軍中不便若遠歸父所慎無他往遂斥陶芳於家而不罪也當時翺為觀察判官盧侍御憲曰此事在眾人必怒而罪之在中道即罪之而不怒大夫雖未足以為教然亦可謂難能也推此以言即性猜忌不甚於河南李少尹詳矣劉侍御又說朝廷公議云李尚書之在滑州也故多畜媵遂斷送其妻入京以遂所欲翺又能明其不然李尚書有二子仕於京師奏請至滑納妻德宗皇帝勅奏事將軍張璀曰與卿本使無外往告卿本使可令妻及新婦家來就上都為婚亦有手詔李尚書遂發二新婦及妻入京以奉詔二男既成婚其妻遂歸滑州自陶芳之外更無妾媵况李尚書將畜媵女不假令妻入京推此以言即與朝廷公議之不同也如此翺以為古人之逐其臣也必可使復事君去其妻也必可使復嫁雖有大罪猶不忍彰明必為可辭以去之也故曾參之去妻也以蒸梨不熟孟子之去妻也以惡敗鮑永之去妻也以叱狗姑前此皆以事辭而去之也李尚書於此二事外猶有他過即非翺所知也若公議所責祗如劉侍御之傳則翺據所目見而辨也章然如前所陳矣凡人家中門內事外人不可周知偏信一黨親族之言以為公議即不知是議之果為公耶私耶未可知也以閣下所聞倘猶有加於是者不惜示及如或祗如前兩說伏望不重改既往之論而明之於朝廷使非實之謗罷傳說於人間既歿之魂不銜寃於泉下幸甚幸甚翺於李尚書初受顧惠及其去選也客主之義亦不得如初歡矣茲所陳者但樂明人之屈而正之耳伏冀不以為黨謹狀右臣近得前件馬樣以其圖寫諸家稍殊試為短屏備以文采觀其體閑色浮氣逸神駿練影吳浦指山川而不搖花攢上林若雨露之新洗或屈膝千里或長鳴九霄昔以負圖為寶今願捍蔽成功形影不殊効用何別謹裁成十二扇隨狀奉進若以時從啟閉猶足靖於塵埃倘將用以馳驅庶可効其筋力輒敢輕冒戰懼伏深徵事郎守國子博士史館修撰臣李翺等謹獻議曰國語曰王者日祭禮記曰王立七廟皆月祭之周禮不載日祭月祭惟四時之祭禴祠蒸嘗漢朝皆雜而用之蓋遭秦火詩書禮經燼滅編殘缺漢乃求之先儒穿鑿各伸巳見皆託古聖賢之名以信其語故其所記各不同也古者廟有寢而不墓祭秦漢始建寢廟於園陵而上食焉國家因之而不改貞觀開元禮並無宗廟日祭月祭之禮蓋以日祭月祭既巳行於陵寢矣故太廟之中每歲五享六告而巳不然者房元齡魏徵之輩皆一代名臣窮極經史豈不見國語禮記有日祭月祭之辭乎斯足以明矣伏以太廟之享籩豆牲牢三代之通禮是貴誠之義也園寢之奠改用常饌秦漢之權制乃食味之道也今朔望上食於陵寢修秦漢故事斯為可矣若朔望上食於太廟豈非用常褻味而貴多品乎且非禮所謂至敬不享味而貴氣臭之義也傳稱屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祭薦芰屈建命去芰而用羊饋籩豆脯醢君子是之言事祖考之義當以禮為重不以其生存所嗜為獻蓋明非食味也然則薦常饌於太廟無乃與薦芰為比乎且非三代聖王之所行也况祭器不設俎豆祭官不命三公執事者惟宮闈令宗正卿而巳謂之上食可也安得以為祭乎且時享於太廟有司攝事祝文曰孝曾孫皇帝臣某謹遣太尉臣名敢昭告於高祖神堯皇帝祖妣太穆皇后竇氏時維孟春永懷罔極謹以一元大武柔毛剛鬣明粢薌萁嘉蔬醴齊敬修嘉薦時享以申追慕尚饗此祝詞也前享七日質明太尉誓百官於尚書省曰某日時享於太廟各揚其職不供其事國有常刑凡陪享之官散齋四日致齋三日然後乃可以為祭也宗廟之禮非敢擅議雖有知者其誰敢言故六十餘年行之不廢今聖朝以弓矢既櫜禮樂為大故下百僚使得詳議臣等以為貞觀開元禮並無太廟上食之文以禮節情罷之可也至若陵寢上食采國語禮記日祭月祭之詞因秦漢之制修而存之以廣孝道可也如此則經義可據故事不遺大禮既明永息異論可以繼二帝三王而為萬代法與其黷禮越古貴因循而憚改作猶天地之相遠也謹議夫說法則不曾敷座而坐相打則偏袒右肩領來向佛前而作偈言各笞小杖十五以勵三千大千七嵗童子二十受戒君王不朝父母不拜口稱貧道有錢放債量決十下牒出東界
