front:
  text: 全唐文欽定全唐文卷四百八十六權德輿四
  hash: sha256:47320e11263c7090637184b6787c4e1beb6d954b968e069f5a4580ded9598329
body:
  text: 八月日將仕守左補闕臣權德輿謹昧死頓首上疏皇帝陛下臣聞書曰百僚師師百工惟時又曰理亂在庶官然則獻替之司任當耳目所以達下人之利病廣君上之聰明惟野人炙背之微齊士九九之賤獎其誠心不致於罪伏惟皇帝陛下以大中大和武功文德亭育天下十有四年車書所至聲教大備微臣生逢明代官忝諫曹既當不諱之辰敢陳無隱之直伏以人為邦本食為人天或陰陽之候暫水旱之沴小至匹夫匹婦未安其家納隍之心則有所軫臣伏見自去年六月已來關東多雨淮南浙西徐蔡襄鄂等道霖潦為災者二十餘州皆浸沒田疇毀敗廬舍而瀕淮之地為害特甚因風鼓濤人多墊溺其所存者生業半空江東諸州業在田畝每一歲善熟則旁資數道春雨連夏農功不開人心既駭亡者則衆幸者京師歲稔夏麥又登誠為根本之固以保斯箱之慶然賦取所資漕挽所出軍國大計仰於江淮以陛下憂勞萬務勵精為理之若是而天災尚至者將使陛下聖慮日新又日新而警戒之耶不然臣所未喻也誠災不勝德賦有定制倘又留聖念因而拯之斯實代天理物為人父母之明徵也伏望與元老台司定議速下德音遣使臣之有明識通方者將恤隱之命盡勞徠之方訪其疾苦蠲其租入與連帥守長講求所宜鰥寡幼艾周知其病詔令所下自如豐年休嘉感通疵癘銷散況賦無工拙加取於人不若藏於人之為固也盍俾有司析量入之數節經用之源務求便安以去冗費縱災害不甚陛下過而憂之無乃益聖德之光大乎元元皇帝之三寶曰慈曰儉曰德明皇帝之昌言曰在知人在安人此陛下已行之效在恆久而已在敦固之而已臣每讀漢書至賈誼谷永之徒數陳理道痛言得失漢朝不以受之為貶數子不以言之為罪我太宗文皇帝之有天下也魏徵王圭等危言正詞上裨大化無疆之祚實兆於斯伏惟陛下遠覽西漢之風近師文皇之德則凡百臣庶敢盡其詞臣鄙賤頑固不識忌諱既竊官命豈敢愛身蓋有所聞則合上獻雖蹈鼎鑊猶生之年不勝懇欵惶恐之至伏惟陛下裁擇謹奏陛下齊心減膳閔惻元元告於宗廟禱諸天地一物可祈必致其禮一士有請必聽其言憂人之心可謂至已臣聞銷天災者修政術感人心者流惠澤和氣洽則祥應至矣畿甸之內大率赤地而無所望轉徙之人斃踣道路慮種麥時種不得下宜詔所在裁留經用以種貸民今茲租賦及宿逋遠貸一切蠲除設不蠲除亦無可斂之理不如先事圖之則恩歸於上矣十四年夏旱吏趣常賦至縣令為民毆辱者不可不察漕運本濟關中若轉東都以西緣道倉廪悉入京師督江淮所輸以備常數然後約太倉一歲計斥其餘者以糶于民則時價不踊而蓄藏者出矣大歷中一縑直錢四千今止八百稅入加舊則出於民者五倍其初四方鋭於上獻為國掊怨廣軍實之求而兵有虛籍剝取多方雖有心計巧歷能商功利其於割股啖口困人均也比經絀放者自謂抆拭無期坐為匪人感傷和氣而冬薦官踰三年未受命衣食既空溘然就斃此亦窮人之一端也近陛下洗宥絀放者或起為二千石其徒更相勉知牽復可望惟因而宏之使人人自效臣德輿言臣聞堯之為君也百工允舜之官人也九德咸事伏惟陛下文明御宇建用大中德厚侔於二儀利澤施及四海中外庶政寢興求思舉一事必稽於禮法命一官必詢其望實故朝無虛授時絶幸人厲精萬樞超冠前古可封之俗比屋相歡詩曰嗟我懷人置彼周行言思其才也又曰翹翹錯薪言刈其楚言選於衆也蓋在旌別能否循責功實以爵祿為砥礪以㣥才為鋩創則舉不失職人效其能左右掖垣首承詔命奉行詳覆各有攸司然後下於中臺頒於海內誠至重也彌綸政事侍奉軒墀分曹十員今則殆絶昔衛多君子晉有卿材況巍巍聖朝淳化所被濟濟多士豈謝古人要重之司曠闕既久則事有所壅吏得為非亦慮四方聞知謂朝廷乏士事關理道豈止官常臣以凡庸過蒙慈渥塵汙清近超越等倫前後對揚備承獎飾德音顧問魂爽震驚而朴訥孱微不能自達又去年四月三日面奉進止令臣有所見即條疏奏來者輒以愚管手疏上陳干黷宸嚴伏待罪責無任兢懼隕越之至謹奉表以聞十一月十二日將仕郎守右補闕臣權德輿謹昧死頓首上疏皇帝陛下臣聞建官惟賢任人以器細大畢效轅輻無遺蓋就其所長以求至當古人所以有憂於趙魏而劣於滕薛敗於栗邑而理於頻陽誠才各有所極也伏見司農少卿權判度支裴延齡早以文學纍居官次固而似守刻而少通徒有專謹之心且非適時之器往者二大農之卿長司太倉之出納號為稱職蓋有恆規陛下急於獎能切於賞善權委邦賦冀有成績且度支所務天下至重量入為出從古所難使物無遺利而不可竭竭則害生類使姦無隱情而不可刻刻則傷人和調其盈虛制其損益上繫邦本下繫元元苟非全才通識則有所壅自延齡受任已近半載㣥議紛然皆曰非宜且權其輕重固與守之之才不同邊儲經費之功懋遷移用之法貴無留事以酌乎中簿領簡書周行郡國失於毫釐利病相萬一物未理所軫皇情而延齡切於感恩昧於量力思有以效強所不通則有枉尺直尋之心多方自固之計吏伺其隙人售其姦因緣蒙蔽觸類滋長致遠恐泥學製實傷異時其敗罪之何補伏料聖意久未正授延齡職名似觀其能否以為進退官司閭里衆口一心評議喧譁所不可遏伏望與一二宰臣時有裁議或詔問度支郎官使得以事實條對苟言者謬妄蓋有以辨之或才實未稱恐難久處倘擇能代命以他官以全延齡以便天下上副求理之意下遂陳力之宜則事任交修職業不廢臣忝備員陛下諫諍之官常服師訓緘默自負無以為容阮嗣宗口不言人之短臣心常師之但以束帶立朝則異於是職當獻納豈敢顧身耳有所聞目有所見義在無隱以奉聖明言而獲戾臣之死所不勝愚瞽悃欵之至伏惟陛下裁擇謹奏臣伏以爵人於朝與衆共之況經費之司安危所係延齡頃自判權逮今旬歲不稱之聲日甚於初㣥情衆口喧于朝市不敢悉煩聖聽今謹略舉所聞多云以租賦正額支用未盡者便謂之剩利以為已功又云破官錢買常平先所收市雜物遂以再給估價用充別貯利錢又云邊上諸軍皆至懸缺自今秋以來並不支糧伏以疆埸之事所虞非細誠聖謨前定終事切有司陛下必以延齡孤貞獨立為時所抑醜正之黨結此流言何不以新收剩利徵其本末令分析條奏又擇朝賢信臣與中使一人巡覆邊軍察其資儲有無虛實倘延齡授任以來精心勤力每事省約別收羡餘于正數各有區別邊軍儲蓄實猶可支身自斂怨為國惜費自宜更加優獎以洗㣥疑明書厥勞昭示天下如或言者非謬罔上實多豈以邦國重務委之非據臣職在諫曹合採㣥議正拜已來今已旬日道路云云無不言此豈京師士庶之衆愚智之多合而為黨共有讎疾陛下似宜稍回聖鑒俯察㣥情竊以董溪等當陛下憂山東用兵時領糧料供軍重務聖心委付不比尋常敢負恩私恣其贓犯使之萬死不足塞責宏大之典流竄太輕陛下合改正罪名兼責臣等疏略但詔令已下四方聞知不書明刑有此處分竊觀衆情有所未喻伏以自陛下臨御已來每事以誠實與天地合德與四時同符萬方之人沐浴皇澤至如于董所犯合正典章明下詔書與衆同棄即人各懼法人各謹身臣誠知其罪不容誅又是已過之事不合論辨上煩聖聰伏以陛下聖德天姿度越前古頃所下一詔舉一事皆合理本皆順人心伏慮他時更有此比但要有司窮鞫審定罪名或致之極法或使自盡罰一勸百孰不甘心巍巍聖朝事體非細臣每於延英奏對退思陛下求理之言生逢盛明感涕自賀況以愚滯朴訥聖鑒所知伏惟恕臣迂疏察臣丹懇右件人名儒史官之家積成教義至性誠孝感動人倫母患風狂心緒乖亂無辜榜箠常至僵仆或凍於積雪之下或曝於赫日之中腐爛皸瘃略無完體見其楚毒方肯飲食敦儒蘇而復起常懼人知承順恬然不覺疾痛因心之道貫於神明欲蓋彌彰事久方著蒸蒸不匱十有六年貞元二十年留守韋夏卿具狀奏聞奉其年八月二十九日敕宣付史館旌表門閭臣至洛都具詳事實聞諸族類布在風謠今又十年不改其養飢寒所迫衣食闕然晨昏所奉朝不繼夕伏以底祿筮仕資蔭多門至行絶人尤可嘉獎伏望天恩特授一解褐京官使分司就養則私計可給寸祿為榮庶厚時風以宏孝理伏乞聖慈允臣所奏謹録奏聞伏候敕旨臣某等言伏奉今日進止卿等朝列是常或陰雨不聞鼓聲則不免奔波走馬忽有墜損深軫朕懷自今已後縱鼓聲差池亦不得走馬并時暑稍甚及雨雪泥潦亦量放朝參者伏以夙興趨朝辨色就列臣下之制則惟其常陛下特降殊私上煩深慮當宵衣之際念陳力之臣或恐鼓聲差池登車奔迫至憂暑雨遂及祁寒俯戒馳驅特朝請曲成周於萬物厚澤浹於四時恩出非常事超前載臣等謬居樞近首奉德音無任欣忭感戴之至謹奉表陳謝以聞臣某言伏奉十月二十四日詔命除臣太常卿統和神人典司禮樂臣實庸菲謬叨寵榮臣某誠惶誠恐頓首頓首臣以書生凡輩懦薄無堪生遇昌期纍膺爵秩四掌誥命五居列曹遂叨禮卿乃佩相印竟無微效上答皇明自罷宰司再履宗伯旋忝保釐之任屬當優寄之時淮甸多虞周郊接壤上勞聖慮下輯戎師臣不敢愛身不敢避事頻抗手疏備陳物宜苟披肺肝莫識忌諱自承詔旨許募新軍實使懦夫增氣輒思仁者有勇繕修器甲招集驍雄每竭一心敢有二事陛下憂臣不逮全度特深出於殊私遽降新命沐浴皇澤從容大僚量力無庸庇身何幸況太常者伯夷叔孫通之職臣豈其人五六年間再居此地感恩知懼循分難任即以今月三日進發瞻望闕庭踴躍欣忭謹奉表陳謝以聞無任感戴喜懼之至臣某誠惶誠恐頓首頓首謹言臣某言伏奉今月三日制命授臣檢校吏部尚書兼御史大夫充東都留守判東都尚書省事以今月二十四日到東都上訖榮渥特加寵光備至俯仰印綬慚懼交懷臣某中謝臣才不出衆祿期代耕因緣文字進越名級自聖明臨御特沐鴻私歷五曹之二居九卿之長遂叨大任忽涉四年智慮孱愚言辭朴訥徒淹歲月莫展涓埃雖竭匪躬之誠竟乖陳力之效自免樞務猶忝春官才經半歲復授今任前後所歷皆不因人無非睿獎以至崇大況留守所寄東夏式瞻在君陳畢公之選兼天官府憲之重面辭之日親奉聖謨式遏匪人整訓戎事用資竊發必資兼材豈臣懦薄所宜負荷今兵力至微武備不足此皆天鑒所察臣不敢纍黷聰明杜其姦情亦在早計必冀磨礪鉛鈍罄竭肝心忠以事君死而後已違離宸眷感戀闕庭以陛下注意之恩誓微臣捐軀之節無任荷戴屏營之至謹差押衙試殿中監成黨奉表以聞臣某誠惶誠恐頓首頓首謹言臣德輿言昨日中使劉履謙至伏奉聖恩批答令臣即斷章表者臣以庸薄無他材能先朝䘪策謬掌文誥因緣荏苒纍踐班榮每自尋省常憂顛覆至於經理代務非所克堪伏以陛下推擇宰司萬方觀德謀猷化本宜得全才此臣所以尤不自安披瀝肝膽冀徇由衷之請不傷則哲之明鴻私猥加愚懇靡遂雖盡忠極慮不敢愛身而孱滯顓蒙難逃其責伏讀詔命焚灼在懷誓心畢命難酬萬一無任感恩荷戴戰懼之至謹奉表陳謝以聞臣德輿誠惶誠恐頓首頓首謹言臣德輿言伏奉今日恩制臣亡父贈太子少傅先臣某追贈太子太保寵靈所及徽數特加捧承命書感奉酸咽臣某誠惶誠荷頓首頓首伏以先臣在天寶末年筮仕幽朔艱貞特立忠孝兩全名節冠於古今風聲激乎天下以執憲載筆逮事肅宗稟命不融早違昭代臣齠齓之歲孤苦零丁遭逢昌運漸履名級過叨睿獎忽至台司無能受祿莫與臣比以先臣之名器未稱餘慶或鍾以陛下之寵秩逾涯此生何幸所建家廟實稽國章時及春祠禮從祔饗豈謂聖慈曲被孝思是崇當啓櫝題主之時有告第漏泉之命感深霜露禮盛蒸嘗自葉流根實荷非常之澤摩頂至踵難酬不次之恩幽明交感山嶽非重無任祗荷隕越之至謹奉表陳謝以聞臣某誠惶誠荷頓首頓首謹言臣德輿言伏奉今月十九日制命臣亡祖右羽林軍録事參軍倕追贈尚書禮部郎中號捧詔書欽承追錫聖慈孝理輝耀幽明流根漏泉感涕嗚咽臣某誠惶誠荷頓首頓首亡祖德風自振才命不倫人文推於士友天爵茂於仁義微臣虔守家法祗荷門風逮事之養不申貽謀之慶斯集纍叨將相備極名器臧孫有後豈臣敢當陳㣥慙德在臣為甚乃者以改卜封樹輒披肺肝因先人之祖載加亡父之徽命乞上印紱以延哀榮豈謂微誠竟回聰聽德音煥發贈典裦優飾郎位以彌綸被大夫之物采儀曹縟禮幽壤生光恩波曲臨負戴無力將誓畢命以答殊私無任感恩哀荷之至謹差進奏官某乙奉狀陳謝以聞臣某誠惶誠恐頓首頓首謹言右臣亡祖仕於開元天寶之際文行聲實推重士林稟命不融竟沉下位與當時清名之士席建侯包容蘇源明友善特深唱酬文章各在集録義方流澤以及先臣忠孝名節聞於天下纍蒙追錫備極哀榮逮至微臣實荷祖訓猥以瑣劣過叨鴻私今檢校官兼官並至三品勳官及爵並至二品玷冒斯甚曠敗是憂況臣本官興元尹足領當道使務理戎撫俗不假他官其檢校吏部尚書兼御史大夫并散官勳爵並乞削免回充亡祖追贈則殘生展霜露之感幽壤荷日月之光今先臣改葬輤裧就路亡祖舊域松檟是依倘因此事特沐恩禮使貽厥之報俯遂良誠罔極之懷下申先志聖朝孝理橫絶古今慺慺肝血敢此披瀝無任哀懇迫切之至謹遣進奏官押衙朝議郎前金牛縣主簿張儇奉狀陳乞以聞謹奏臣德輿言伏奉今月五日手詔以臣亡祖裦贈自是典章豈必更回官秩已詔追榮良增嘉歎者渥澤滂濡詔旨嘉獎捧戴哀絶感恩失圖臣某誠惶誠恐頓首頓首臣叨逢聖明付授踰量常慮顛墜不任驅策況以藩方之重豈假臺省之兼昨因遷祔輒有陳乞所願少減名器獲申哀榮仰塵黈纊懼在鼎鑊豈謂天道下濟懇誠上通三復詔命五情震駭儒飾備至發於聖心弱質無膺既玷聿修之德湛恩難報益馳匪懈之誠無任哀惶感荷之至謹遣進奏官押衙朝議郎前行興元府金牛縣主簿張儇奉表陳謝以聞臣某誠惶誠荷頓首頓首謹言右臣先臣在元宗朝筮仕河朔忠孝名節冠於當時至德乾元之間歷監察御史起居舍人著作郎在代宗朝早違聖代臣幼丁荼蓼不及義方過蒙渥恩祿秩崇厚按開元禮文合立私廟三室永懷怵惕思展吉蠲已於通濟坊修建擇用二月二十日祔饗臣位忝台司時逢孝理事循彞典禮展私誠感戴恩榮不敢不奏聞伏聽敕旨右臣亡父取七月十五日於東都遷祔贈官是一品準式合有鹵簿幔幕人夫等謹録奏聞伏聽敕書山南西道節度觀察處置等使銀青光祿大夫檢校吏部尚書兼興元尹御史大夫上柱國扶風郡開國公臣權德輿右臣亡祖松柏先在東都臣幼年流寓江都夙釁鍾罰亡父母於潤州安厝今歲在丁酉是商姓通年取四月二十日於潤州啓舉七月十九日於東都遷祔臣孤單零丁早失嚴訓寵榮纍集霜露感深至於歲時難遇吉便常恐忽先犬馬莫展私誠伏以守土理戎不敢自求營護欲遣子弟專往不敢不先事上聞謹録奏聞臣德輿言伏奉今月十五日手詔許臣遷祔并令子弟專往營護者捧承詔書曲遂私志感泣嗚咽激於肝心臣德輿誠惶誠荷頓首頓首臣以童齓之年遭家不造壤樹所寄權在江南纍經追崇常異徽數今龜筮叶吉月日有時伏蒙聖慈伏賜鑒察恩詔下降特允懇誠孝理所覃幽明知感松楸改卜永異事於九原蒲柳餘年冀酬恩於萬死無任感戴悚惕之至謹遣押衙朝議郎前興元府金牛縣主簿張儇奉表陳謝以聞臣某誠惶誠荷頓首頓首謹言臣某伏奉去二月十五日詔命許臣遷祔起四月二十日至七月十五日合在準式假內使事請令攝節度副使檢校尚書水部員外郎兼殿中侍御史樊宗師勾當其府事請令少尹王士郎勾當其間四使各有判官若事關師旅錢穀稍要重者并須有聞奏者臣自躬親不敢闕事謹録奏聞伏聽敕旨元和十二年四月十日使奏右伏準去二月十五日詔命許臣遷奉自四月二十日至七月十五日合在假內今準假滿以今月十六日勾當軍府公事謹録奏聞謹奏臣某言生逢聖時獲事陛下以臣戅朴備位將相幸免罪戾實無裨補福過災生二年以來月八人口疾痺緩近自旬日咽喉氣痛漸就危惙慮不支持永辭聖明涕流嗚咽伏惟皇帝陛下繼十一葉休運承二百年景祚平吳定蜀掃蕩淮夷巍巍功德與天地準今縱有疥癬不足平夷伏惟以愷悌之仁宏大之本為九州自愛使萬古同福則臣幽冥之下同生物受賜無任感恩攀戀悲激之至
