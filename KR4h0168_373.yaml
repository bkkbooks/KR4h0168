body:
  text: 唐天寶十有一載歲次壽星陳留改文宣王宮郡守河南道採訪處置使元公彥沖所以崇德樹風敬教勸學也初公以三務之隙分命有司修廢功舉墜禮而此堂也舊規偪陋下宇將壞我是以有經始之制冬十月丙午新宮成凡天下有道則文教大洽為政者克廣舊典以尊先聖禮也浚儀令河東裴勝叶恭大猷祗奉成績乃立石於廟廷以旌盛德所庇云有三才然後有剛柔剛柔交而利害作乎其中於是橫目蚩蚩天不能節黃帝堯舜氏始以仁義拯溺其流及乎夏商而周監二代有明堂之禮樂教之首也逮周德下衰王室卑而五霸起彞倫墜而六學缺天將持其木鐸以授後聖繇是周公沒五百歲而夫子生雲從龍風從虎大道既作天下化成故夫子修詩書以酌虞夏殷周之損益而國風帝典備約魯史記以書二百四十二年之廢興而亂臣賊子懼嗚呼不有大壞何以見聖人之全功乎粵若中都之制立民極也以匡頹風防不為曲兩觀之法用重典也以去奸宄政不為苛夾谷之會誅無禮也以尊兩君刑不為僭三預是邦之政而魯至於道向使鳳鳥來河圖出東周之化其在魯乎嗚呼明王未興亢龍無輔運匪我與德兮何衰蓋宏其教以救物處其順以安時行藏屈伸與化推移其世衰也揭仁義於天下其世平也啟土宇於身後出入百代波流萬方孰不日用聖猷欽若祀典然後知素王之德與天地並或曰夫子栖栖於魯衞陳蔡之閒或者其未智歟君子曰是智也聖人與時消息同彼憂患不有匡蒲之難麟鳳之感何以戒苟合安蒙求使達者順時窮者知命然則卷舒之迹其可究乎奕奕新廟庶人成之有以建誕敷之德勿亟之化蓋黝堊其楹元端其服加釁器之等正當宁之位王命所以寵舊章也兩楹之下四科以班亠兊公東序西向費侯鄂一作酇侯薛侯徐侯衞侯齊侯黎侯吳侯魏侯西序東向其餘未入室者畫衣冠于四一作西墉配祭所以辨等威也議者謂我邦君於是乎建宏規而播新命修令典而崇明祀講義以度功懋功以從時訓人以成德昭德以合禮六者禮之善物而時有遷邑有改不銘考父之鼎紀奚斯之功是廢名也何以示後嗣遂命客卿前封邱縣丞泗上陳兼志之章甫開元中進士某叩頭伏地上書吏部員外孫公階戶己伏惟拔英苗而佐明主奉盛德而居要路亦光天衢樹桃李之秋也僕非敢隱籍名實昨聞戶部檢報似有參差嗚呼雖有周孔之才無所施也矧茲虛陋能勿非乎但僕一臥嵩邱二十餘載既不能學許由巢父務光伯成終至青雲高謝堯禹而乃棄藜杖脫草衣薦頌雲壇陪科岳牧此已孤負芝桂損辱高風矣若緣籍有誤蒙袂而歸亦何面目垂見巢由舊邱光成隱路耳公言泉百氏腹笥九經前古取人應所多見至於傅說無姓殷后致鹽梅之地屠羊隱名楚王延三旌之位未聞徵籍也范睢折脅於魏改名為張祿先生秦用之為相張良報仇變名姓而亡漢祖因之實取天下何必考名也是知善收賢者不以小瑕棄大美今若以籍名有誤便廢其人僕恐蔽賢之議在有司矣夫籍者所以編戶口計租稅耳本防㣥小不約賢路若人有大才不可以籍棄苟亡其德雖籍何為謹按周禮鄉大夫職曰國中自七尺以及六十皆征之其捨者為賢也貴也服公事也注捨謂若今復除其計耳所以優賢能也三歲則考其德行道藝㣥吏獻賢能之書於王王再拜而受之登於天府鄭司農云若舉孝廉茂才由此觀之乃舉賢之餘事爾比來天下此道都喪無論賢貴宜被籍書所以風俗不淳賢能不勸由此故也公為官擇才務協於治典進賢輔政何拘於版圖且古之招賢降蒲輪束帛卑辭厚禮猶恐不來今乃坐徵籍書務在駮放此所謂嫉賢也若將古不足法謂時無賢才經邦致治非籍勿用於是僕也鞭骨自悔裹足而亡雖分國如錙銖終不敢望於臣仕也漢官儀郡主簿秩四百石綱紀一郡糾整不法岳牧無政蒼生有瘼則天子責我汙吏侵人姦聲載路則使臣責我吏不述職曹有留事則二千石責我役奪人時官有虐典則黎元怨我由此觀之錄事參軍待責之府也所以天官署吏獨難其人觸邪外臺禮隆其秩由斯賞拔多至重官譙亳都上應星火禹貢屬徐州分野隴西李公負王佐之才所以顧盼廳壁歎曰官猶四序功成者去屋壁無記吾將安仰始編舊政令余敘之天寶九載七月十日記漢成帝時綱紀頹壞先生以書諫天子者再三夫火政雖去而劒履閒健者猶數百位尚不能為國家出力以斷佞臣頭復何南昌故吏憤憤於其下得非南昌遠地也尉下寮也苟觸天子網突倖臣牙止於殛一狂人噬一單族而已彼公卿大臣有生殺喜怒之任有朋黨蕃衍之大出一言作一事必與妻子謀苟不便其家雖妾人婢子亦攖挽相制而況親戚乎況骨月乎雖有憂社稷心亦噤而不吐也嗚呼寵祿所以勸功而立大者不語朝廷事是知天下有道則正人在上無道則正人在下余讀先生書未嘗不為漢朝公卿恨今南游復過先生里吁何以為道之多也遂碑光先鄧州新野人官御史遷吏部員外郎安祿山之亂不受偽署遁去後事肅宗官至吏部侍郎國正封畧甿編邑閭定要荒之制莫非王土開版圖之職司於封人甲唯常流迹齒編庶居先零之地早及戎風近燒當之俗久覃宏化既因流寓終是播遷失延州之故鄉隸鄯部之外郡亦猶宰嚭辭宋陶朱去越蓬飄萍轉曾何足以少留維桑及梓固不忘於祗載省司既定誠合三緘甲且有詞須分二里至若軍落關右地濶流沙總六郡之兵馬當三邊之要害戎羯時抄邊人屢聳事資捍禦安可輒移如或身列榮班苟非規免情有深於懷土人何繫於匏瓜叩其兩端宜不然矣煚右率府冑曹參軍開元時被詔與馬懷素等校正祕籍達士尊德至人榮道金圖玉自勤鄒壁之書綠綬青章不樂漢庭之貴申公括囊墳史養道衡門洞曹曾之書倉擬任永之經苑知尚仁乎跡重任吾德以逾高聞里俗之事乖杜茲門而不出仲舒之帷屢下太邱之眾增多適光闡於邦儒遽辭興於里訟況詩宗傳府馬鄭之徒鴻儒碩生游夏之黨周人紀律不覩於前科鄭國鑄書未彰乎舊法庶惟先哲謂合通方聲同律和氣合形比度遼捨雁門之守獨揖書生中郎捐座客之談方迎處士吁惟小吏職在含香光逸有著於美名李斯果昇乎列位神期暗許能紆長者之歡精義其同何廢達人之話功曹望慙樂廣才謝范滂空嫌倨見之輕遂啟黜賢之責不省諸已翻欲退人巡覆再三匪聞其可磁石非曲鍼之取武魄無俯芥之收捨凡就能幸從其議宗廟崇儀禴嘗明祀先王有以尊祖考歷代所由追饗敬惟甲趨名奠奉烝羞與於蜡賓非喟然之有歎侍於邦祭聞立者之無跛接神旌而下御來盡肅恭送靈驛而方行去昇微滅眇威儀之奕奕期降福之穰穰已而往辟云除笙鏞則闕罷儀於國休事於家致胙以歸奉其親乎則可既餘為餕因設祭而何乖永言禮經瞻彼祀典匪伊天降寧惟地出有誤於事貽謗何逭竊以經墳浩廣史圖紛博尋覽者莫之能徧司總者常苦不多何暇重屋複牀更繁其說若先王有闕典上聖有遺事邦政所急儒訓是先宜垂教以作程當闡規而開典則不遑啟處何獲宴寧曩之所修誠惟此義然體有未愜追怨良深於時祕書省經書實多亡闕諸司墳籍不暇討論此則事有未周一也其後周覽人閒頗覩闕文新集記貞觀之前永徽已來不取近書採長安之上神龍已來未錄此則理有未宏二也書閱不徧事復未周或不詳名氏或未知部伍此則體有未通三也書多闕目空張第數既無篇題實乖標牓此則例有所虧四也所用書序咸取魏文貞所分書類皆據隋經籍志理有未允體有不通此則事實未安五也昔馬談作史記班彪作漢書皆兩葉而僅成劉歆作七畧王儉作七志踰二紀而方就孰有四萬卷目二千部書名目首尾三年便令終竟欲求精悉不其難乎所以常有遺恨竊思追雪乃與類同契積思潛心審正舊疑詳開新制永徽新集神龍近書則釋而附也未詳名氏不知部伍則論而補也空張之目則檢獲便增未允之序則詳宜別作紕繆咸正混雜必刊改舊傳之失者三百餘條加新書之目者六千餘卷凡經錄十二家五百七十五部六千二百四十一卷史錄十三家八百四十部一萬七千九百四十六卷子錄十七家七百五十三部一萬五千六百三十七卷集錄三家八百九十二部一萬二千二十八卷凡四部之錄四十五家都管三千六十部五萬一千八百五十二卷成書錄四十卷其外有釋氏經律論疏道家經戒符籙凡二千五百餘部九千五百餘卷亦具翻譯名氏序述指歸又勒成目錄十卷名曰開元內外經錄若夫先王祕傳列代奧文自古之粹籍靈符絕域之神經怪牒盡載於此二書矣夫經籍者開物成務垂教作程聖哲之能事帝王之達典而去聖已久開鑿遂多苟不剖判條源甄明科部則先賢遺事有卒代而不聞大國經書遂終年而空泯使學者孤舟泳海弱羽憑天銜石填溟倚杖追日莫聞名目豈詳家代不亦勞乎不亦弊乎將使書千帙於掌眸披萬函於年祀覽錄而知旨觀目而悉詞經墳之精術盡探聖哲之睿思咸識不見古人之面而見古人之心以傳後來不愈其已釋滯銷壅一日之利暫佳瘠氣侵精終身之累斯大獲益則歸功茶力貽患則不為茶災豈非福近易知禍遠難見玭蘄州黃梅人開元中元宗夢神人自稱廬山使者因為立廟下詔所在學士製碑文作者六百八十一人獨玭文合旨召不赴伏稽諸大易曰一陰一陽之謂道陰陽不測之謂神惟道也生三混成洞微於變化惟神也得一而妙蓄祕於恬冥欽若太元遐徵妙有運陶甄之極不獨尊歟后唐累聖光華大明終始陟曦陽之午廓照瑤京操元命之符銘昌鼎算白雲孤峙時望嵩邱紫㤅千齡日飛函谷我開元神武皇帝圓靈受睠方輿寵祕握元珠之妙捐可寶之珍演至道於希刊雜法之凝滯乃聖一也於穆祀典清廟皦皦孝友光明天地冥洽乃神二也劒㦸之器返於三農弧矢之威神斷六合乃武三也察時變者觀乎天文人習凡庸無階測聖乃文四也故沖精象外高視鴻名昴薦河圖靈朝海若堯心攝照顧言筌於几蘧軒目司明屈旌乘於茨隗所以虞環益地夏玉從天納殊賮於西王展告成於東后五龍推紀邁梁甫之高曾八駿巡遊陋崑墟之轍跡昭回上轉山嶽下騰列聖攸居通仙福會文皇質義武帝佩圖至道之興其來尚矣自華封獻壽聖德祈年金格傳書珠鎏味液公主以天慈入道挹化芙蓉祕監以王子出家調芳芝朮北方著列仙之籍南州希至學之因聖緒無為斯其有作乃睠㣥嶽真君道府光啟祠室幽贊神宗青城廬嶽二山者佐命㣥峰之望也丈人仙籙祕諦真君使者靈司孔昭冥察名書五法舉亞三魔滀洩崇巒冀弗騫於物阜寒暑穹谷將必順於人時開元十九年八月二十一日降明旨曰青城山丈人廟廬山使者廟宜準五嶽真君廟例抽德行道士五人焚修供養仍委所管揀擇灼然道行者安置具年名申所由敕置廟使內供奉將使者真圖建立祠廟并章醮行道設齋使大宏道觀法師張平公粵自秦京宣猷江服煥丹青之節賜元牡之儀驛傳光臨雲巖皎色使持節江州諸軍事守江州刺史獨孤禎重鎮柴桑孚謠枳棘時觀武庫代服文雄經始干城全摹益厲崇規逸麗壯思逾分朝散大夫行長史楊楚玉行司馬皇甫楚玉潯陽縣令魏昌等恭惟聖善式議靈場道俗虔精冥休推異爰初築土則雨霾烟嶂俄頃佇立而色霽霞標寶龜奠臬之辰金虬驛程之際陰濛洊密黮晦遄交注想元空肅思皇道芬芳載潔章醮翹襟六虛窈冥一夕融朗半空之上忽吐神輝綴灼九徼熲揚千仞寮寀率抃人吏並觀昔天靈降周以雲門舞奏神光燭漢以太乙登禋然北陸氣交南州燠變物委霜霰人嗟沍寒使法師恬懇仙庭憑威國命故元冬易煖朱景敷暉暢於幽明優乎力役並利攸往咸欣子來使茲勝郊遂臻靈域騰赬桂嶺鬱翠松巖召斲郢門僝材荊岫疏峻墄繚長垣紅壁列錢丹楹繡礎三閒四表炳繪文八維九隅懸鎪鏤檻虹梁亘欂風牖承楣冽井蕖鮮芳壇竹埽銀鋪月曉瑤簴霜開至若聖理全幽真容罕測夫其祕狀遠降使司蓋考三仙之圖不於九牧之鼎皦姿粉堊備質光妍符彩冥標侔靈瑞表工徒罄想殊思感通齋室盟祠既優如在霓旌霞斾時颺羽儀列冠名山禮均行潦覃薰紫極供養黃冠玉釜常煎金罏永牲牷革享鸞鳳于飛露挹神翁星臨婺女清吹洞唱天注匏瓜之津匹水仙宮海曲蓬萊之島龍驤鳳翥飄亶羽淨戒之庭師子辟邪趯躍精思之地珠幡衞筤瓊蓋擁輿法供大廚六時朝念真經雲帙萬劫精修弗翦茅茨明代久彰於克儉經營梓匠神理邈尊於寵光聖渥堂闈靈棲窟宅朅來禔福不亦宜乎冬十有二月司存式命畢鉤繩也元門道士章沖寂等挹教五千齊懽億兆歷仙階而仰止攀睿算以驤誠天使願奉於雕鐫心存魏闕法眾希憑於苕琬道在吳岑春水桃花迷源遂遠幽林杏塢勝地非遙伏荷天休敢述頌曰道祕重冥神幽福庭三景運極五嶽棲靈其真有物厥妙無形理則怳惚功惟泰寧於赫皇極昭融亭造睿握元珠祥丕大寶蒼垠集貺紫雲宗道致享百神探因五老乃睠崇山嶽靈之祕三象浮精十華仙使威畜雲雨神存天地法象昭凝真圖炳粹幸明德之嘉運降幽祠之寵章扈仙儀兮肅肅煜瑞彩兮煌煌爍琳宮之夕照拂琪木之神光雕輝兮翠輦玉釜兮調香擷五芝於秀崿搴八桂於飛梁龍吟鳳舞天路長青雲衣兮白霓裳節空歌於瑤磬臻羽斾於瓊漿冥激兮福宇飄眇兮神極牽匹水之布流睨香鑪之綺色留鶴語於千載翥鸞兮一息絳河真母將易逢碧海仙姑淼難測恭至道兮三五奉休符兮萬億紀貞石於名山壯洪規於帝力源明京兆武功人初名預字弱夫天寶中進士更試集賢院累遷太子諭德出為東平太守召拜國子司業安祿山陷京師以病不受偽署肅宗復兩京擢考功郎中知制誥終祕書少監草莽臣某言臣實陋微素乏才業將遂長往守此無用天鑒孔明澤覃幽僻伏奉今年正月五日制詣闕自舉不次之私無限於物豈伊庸菲所當膺荷伏惟開元神武皇帝陛下道密旒扆德孚天地忝在草木幸均雷雨朝夕微命虛受臣生偃臥窮藪詎知帝力展義介邱肆覲㣥后得列庶人之閒不在役夫之上王者能事邦家烈光耳未前聞目所畢覩載懷涵育無答造化孰謂聖恩曲貸巖壑顧慚庸近何階對敭臣聞明主臨下也務求才以自輔賢臣事上也當量能以自進臣才非令問譽寂鄉黨志尚庸寡理絕聞知縣令臣柳國狀臣於編戶之中刺史臣柳絳諭臣以明制之意且臣山東一布衣耳在昇平之時徵求之日非自察者難審其可苟欲避嚴令發困蒙心靈震越寢寐驚悸無任承恩喜躍之至臣等今月四日及七日上言車駕幸東京不便籲天而訴稽首而祈竭誠不精留中不下臣等自咎自毒若惛若狂以為雨淫孟冬霖積季秋道路且泥甚不可一也從春大旱方始秋苗田農之閒十已耗半方且斂穫猶未收入先之以清道之役申之以祗頓之苦水欲澄而撓之人欲靜而棼之甚不可二也臣等每立廊下竊見旌旗之下盡是餓夫執殳仆于行門者日見一二市井之中半是餒人或求食死於路傍者日見四五甚不可三也姦人連牆盜兒接棟磨礪以須陛下出爾前麾凌於灞上兇人肆於城中御史大夫必不能愊而禦之甚不可四也臣等伏料之殷鑒不遠近在天寶十五載季夏爾聖皇巡蜀後大都內府財貨朝臣富民資產盡在道路之手有乘馬駛驢入宣政紫宸殿者擾亂如此一至於是況陛下復二都有四海日淺錢穀滿蓄不及曩時者必為利而行此賊臣作計誘掖陛下而已詩曰三星在罶臣不勝嗚咽為陛下痛之宜速下詔書罷東幸不然窮隸樂禍已扼腕爾甚不可五也方今犯王畿者河洛驛騷侮侯服者江湖叛渙詩曰中原有菽庶人采之彼思明康楚元者采菽之庶人也陛下何遽輕萬乘而媒孼速成之邪甚不可六也自河南北盡為盜境淮東江西又見修阻王公已下未給廩祿將士已來且支日月陛下中官冗食不減往年梨園雜伎有盛今日陛下未得穆然高枕用此奚為中官指使太常正樂外一切放歸仍給長牒勿事待郎五六年後隨事進退今聚而仰給甚不可七也司空李光弻能拔河陽尚書王思禮應下晉原中丞衞伯玉勁卒接焉耆過析支不日且至御史大夫王元志壓巫閭臨幽都汝州刺史田南金乘闕口遏二室揚州長史鄧景山凌長淮餼梁汴然而狂賊失身蹙於緱氏山北不敢逾孟津東不敢過甖子只待反接耳陛下不坐而受之而欲親征徇一朝之怒甚不可八也王者於天地神祇第付之有司享之牲幣則已夫何求哉記曰不祈土地今方士憃愚巫祝淫瀆妄有閑說甚不可九也天子順動人皆幸之之謂幸人皆病之之謂不幸不幸之謂虐臣等見陛下否而弗聽聯伏赤墀之下頓顙流涕而出陛下或容而免之或毀而罪之凡百之臣如昌言於朝有萬之口必錯謗於外甚不可十也臣聞子不諫於父且焉得為孝乎臣不諍於君又焉得為忠乎不孝不忠而苟榮冒祿圈牢之物不若也臣等至賤不能委身圈牢之中使樵夫共指而笑之不勝大願陛下留神元微養和淡泊天下幸甚傳曰理亂相糺質文相化亂極則先乎太易文弊則從乎巨包聖人以遺也賢人以發也易始乎乾文之昭也以行包起於坤質之用也以靖行者所以動天下之務靖者所以默天下之機太陰太陽潛相貞也少陰少陽潛相成也巟廾莫默地之輿也顛盈天之冒也仍而通之極乎三十六全而劘之窮乎六十四其旨微其體正語其義則矗然而不誣觀其辭則夽然而不及棿一以布氣藏萬以植言斯道君子之幾也夫至誠君之為也夫於戲流於睿監講於太學伏而惟之使自怡之深而極之使自測之歸人於至和示人以太璞已矣傳曰五行者陰陽之精氣造化之本源德贊三才功濟萬物在乎天也謂之五星據乎地也謂之五嶽行於人也謂之五材若天無五星則辰宿錯滅地無五嶽則山澤崩竭人無五材則性命勦絕故知天以五星為政地以五嶽為鎮人以五材為用三正之立五行所成也人者上稟五星之氣下居五嶽之分中受五材之助故天地之閒惟人最靈則知人者五行之瑞五行之秀是以包五藏蘊五神全五體備五事合而行之有五德皆本於五行然則色不以五行雖有離婁之明不能定其文彩聲不以五行雖有師曠之聰不能定其音律味不以五行雖有俞跗之術不能定其性命氣不以五行雖有老耼之道不能定其噓吸言不以五行雖有尼父之德不能定其詞理歷數不以五行雖有重黎之算不能守其敘陰陽不以五行雖有犧炎之聖不能定其吉凶萬物無不由五行以定包者定也定之為義博矣哉夫不定而眎則五色亂於目矣不定而聽則五音亂於耳矣不定而食則五味亂於口矣故五色令人目盲五音令人耳聾五味令人口爽鼻不定而吸則不能理五氣心不定而語則不能敷五教志不定而行則不能修五德身不定而動則不能用五事夫有一不定則人不畏有一不定則人不信是以君子定其目而後視定其耳而後聽定其味而後食定其氣而後吸定其心而後語定其志而後行定其身而後動定其數而後算定其意而後占故無失矣夫至人不占者何以其定也占者所以定美惡至人無惡占者所以定吉凶至人無凶占者所以定休咎至人無咎占者所以定嫌疑至人無疑夫惟定矣又何假於占哉在昔哲王受明命皆能變文質順陰陽大矣哉此帝王之能事也古者天生人而未樹之以君上下交雜品位紛錯陰陽初分文質未作庖犧之王天下也畫八卦定三才而一之質斯尚文之代也自黃帝暨乎堯舜垂衣裳而天下理蓋取諸乾則尚文也取諸坤則尚質也通其變而使民不倦神而化之使人宜之是以自天祐之吉無不利後夏有連山殷有歸藏周有周易皆卦次不同而算術各異斯文質之更變也仲尼有言其或繼周者雖百世可知也斯則百王不易之道明矣自茲以降代歷千禩人非一性窮奢極麗飫欲厭心不能正本澄源反文歸質若河傾海覆汎濫平陸流盪無依迄至今日而莫之變也夫王者之有天下必改正朔易服色以其既往者廢將來者興是以三皇之王五帝之理樂不相沿禮不相襲且物極則反理有固然文質之體其將變矣喆人觀象立言垂範作則將以究索厥理匡贊皇極推吉凶於卦象陳理亂於邦家廣論易道冀裨帝業蓋時尚質之書也嗚呼采世人之訂述作者之意焉爾顥開元中進士自盤古畫天地天地之氣艮於西南劒門上斷橫江下絕岷峩之曲別為錦川蜀之人無聞則已聞則傑出是生相如君平王裦揚雄降有陳子昂李白皆五百年矣白本隴西乃放形因家於綿身既生蜀則江山英秀伏羲造書契後文章濫觴者六經六經糟粕離騷離騷糠粃建安七子七子至白中有蘭芳情理宛約詞句妍麗白與古人爭長三字九言鬼出神入瞠若乎後耳白久居峩眉與丹邱因持盈法師達白亦因之入翰林名動京師大鵬賦時家藏一本故賓客賀公奇白風骨呼為謫仙子由是朝廷作歌數百篇上皇豫游召白白時為貴門邀飲比至半醉令製出師詔不草而成許中書舍人以張垍讒逐游海岱閒年五十餘尚無祿位祿位拘常人橫海鵾負天鵬豈池籠榮之顥始名萬次名炎萬之日不遠命駕江東訪白遊天台還廣陵見之眸子炯然哆如餓虎或時束帶風流醞籍曾受道籙於齊有青綺冠帔一副少任俠手刃數人與友自荊徂揚路亡權窆迴棹方暑亡友麋潰白收其骨江路而舟又長揖韓荊州荊州延飲白誤拜韓讓之白曰酒以成禮荊州大悅白始娶於許生一女二男曰明月奴女既嫁而卒又合於劉劉訣次合於魯一婦人生子曰頗黎終娶於宋閒攜昭陽金陵之妓迹類謝康樂世號為李東山駿馬美妾所適二千石郊迎飲數斗醉則奴丹砂撫青海波滿堂不樂白宰酒則樂顥生平自負人或為狂白相見泯合有贈之作謂余爾後必著大名於天下無忘老夫與明月奴因盡出其文命顥為集顥今登第豈符言耶解攜明年四海大盜宗室有潭者白陷焉謫居夜郎罪不至此屢經昭洗朝廷忍白久為長沙汨羅之儔路遠不存否極則泰白宜自寬吾觀白之文義有濟代命然千鈞之弩魏王大瓠用之有時議者奈何以白有叔夜之短儻黃祖過禰晉帝罪阮古無其賢所謂仲尼不假蓋於子夏經亂離白章句蕩盡上元末顥於絳偶然得之沈吟累年一字不下今日懷舊援筆成序首以贈顥作顥酬白詩不忘故人也次以大鵬賦古樂府諸篇積薪而錄文有差互者兩舉之白未絕筆吾其再刊付男平津子掌其他事跡存於後序
