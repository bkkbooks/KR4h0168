front:
  text: 全唐文欽定全唐文卷三百七殷賢開元七年進士
  hash: sha256:8e58c62894499f6be755bd970ca9bc400952f02d4a1b6bcfb78796c4f16ff0b6
  markers:
  - {type: head, offset: 12, content: 彭殷賢, id: KR4h0168_NFKB_307-h1, level: 1}
body:
  text: 遐觀邃古逖聽前聞北辰居正南面為君莫不茅茨土階以恭儉而為度上棟下宇避燥溼以為文聲芳訏謨乎五典德廣兆映於三墳逮乎纘戎天秩啓迪人㣥以為百堵仄陋不足以光先正九筵迫狹不足以垂景勳於是資奧區而寫城闕憑大壯而列宮棼梓庀匠於季稚林衡僝木於毫分既而工用其法人來以子鼛鼓逢逢版築擬擬離婁督繩以為度般輸削墨而為砥侔造化以制作越埃而資始珠網滴瀝而露垂丹刻翬飛而霞起危簷矗以露斷高閣立而雲倚遠而望之莫測其端倪迫而察之但驚其峻峙仰鵾鵬之不逮豈燕雀之能擬於是發禮以釁之勵樂以樂之可謂休以令聞垂之億秭者也既而馮陳就閒是游是縱笑語卒獲聲色攸重邀觀則環拜興舞命賞則夾道羅從以為一生之歌斯笑斯千載之善禱善頌豈知海縣則天下所有帝王則黔黎攸共固惟不節之嗟蓋不知其所用也豈與夫明主君臨邊鄙靜謐儉以足用貴在無佚尚菲陋卑宮室為無為以自保事無事以終日故得國家載寧帑藏充實福祚乃於萬斯永子孫則百而逢吉屢降哀矜之詔頻優耆老之秩斯可謂皇哉唐哉唐哉皇哉而天地長久何三五之能匹也問朕聞至道雖微不言而化皇天陰步馬相叶其彞信寒暑而生成施雲雨而沐潤垂範作訓樹君育人時有澆淳教垂繁略成湯既聖禹道云亡桑扈谷風屢動詩人之刺塞門反坫時遺宣父之嫌我國家拯彼頽綱開茲盛業朕以不德襲號乘時而皇極之道未敷謨明之軌尚闕思宏厥理其義安從至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要又四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋余疑對臣聞孔子云大道之行與三代之英某未之逮也而有志焉又顏回對孔子云回願得明王聖主而輔相之此二者皆傷不可得而見也況臣生大道淳風之運屬聖主立政之秋不能有所建明以佐大化此微臣夙心愧恥竊有慙焉日者聖敕頒宣遠覃幽隱振廢滯收介特本州徵臣充賦於王庭陛下溫顏屢賜宴見司饔行食㣥事頒冰亦可謂厚德矣自顧性識愚駑智術微淺既蒙清問敢不具素所聞乎臣聞伏羲神農氏往黃帝堯舜氏作莫不體道以育物立德以興化用闡無為之教以宏不宰之功齊飲啄於鶉居絶往來於犬吠豈不以我清淨而人自正我無欲而人自朴乎逮乎政及三王君臨萬國亦承奉天地燮贊陰陽順四時之氣理五行之敘惣仁義以安庶類先博愛以悅㣥生使人遷善遠惡而不知其所以然也觀夫三王之為君也謹其所好惡而已故君好之則下為之上行之則下效之莫不清心以率物正身以御下九女序列於內三公分職於外度數有恆徭役不作其取人賦也薄而役人力也寡其育物也廣而興利也厚故征伐有道大明詠其功什一而稅大田歌其事所以家給人足而理安興矣易曰聖人久於其道而天下化其斯之謂乎爰及末俗政漸澆僞而禮樂彌煩姦盜滋起桀紂昏亂於上幽厲縱逸於下崇臺榭之峻恐其不高也廣宮室之居恐其不大也聚淫色之美恐其不多也窮聲音之巧恐其不樂也其斂人財也厚而使人力也衆其害物也博而興利也寡其後興役無常桑柔病而嘆之故其詩曰自西徂東靡所定處蓋言其役之甚也徵發無度下人勞病南山疾而刺之故其詩曰赫赫師尹不平謂何蓋言其政之亂也自茲厥後強淩弱衆暴寡千官樹姦於朝廷百賈窮僞於市邑財用匱竭寇攘不止大東又刺之曰小東大東杼軸其空言小大俱盡也又云東人之子職勞不來西人之子粲粲衣服孰有為人上者不平若此而可久安天下哉此則上失其道政逐多門故天下敗而不之覺乃至所以為夏者轉而為殷也所以為周者轉而為秦也詩云高岸為谷深谷為陵三代之後於今為庶此史墨所載社稷無常奉君臣無常位自古以言及秦始皇平定六國隋煬帝富有四海不務廉恥唯存戰伐內造阿房繼以驪山之作外征林邑重以遼東之戍鑿馳道則隱以金椎通鴻溝則樹以柳役及閭左人不聊生曲泛龍舟聲多哀思傾天下之賦不足以周其事殫帑藏之財不足以盈其欲是以衆怨難犯人自為戰所以陳勝吳廣奮挺以撻之王充李密揚聲以逼之釁起郊壘而禍生左右望夷宮中不免閻樂之難江都城內卒死裴通之手故易曰天之所助者信也人之所助者順也此二君者動而之險不由信順失天人之所助能無及此乎然則合大中之道者如彼失皇極之用者如此古之興敗備在典謨逮隋室道消數鍾百六衣冠禮樂掃地無餘賢人君子稽天並浸此乃大人利見之日聖主驅除之時我太宗志在救焚心存拯溺因茲感激投袂而起車及於平陽之郊劍及於盟津之會既而戡翦多難克清中夏建非常之功定不拔之業洎位登九五富有萬國制禮以示其讓作樂以興其和兼愛以厚其仁節用以崇其義非先王之服不敢服非先王之言不敢道言必本於風雅行務去乎枝葉明刑賞嚴號令賞當其功則勞臣勸勉罰當其罪則姦人畏懼名器不忘假必俟其能爵祿不虛授必先有德是以四海之內靡然向風我太宗以至道之心為天下也所征無不克所向無不成孝弟通於神明易簡合於天地如此則天地德之鬼神祐之使風雨以序災害不作萬國莫不歡心四夷莫不咸賴良由不僭不濫無怠無荒所以享國久長多歷年數陛下稟天然之姿定不伐之略披肝膽以決大計殄宮闈之氛祲除詐僞之昏狡日月載廓宗社以安深思禍亂之原乃皇天所以開聖人也自南面臨天下九年於茲封堠無警干戈再戢置鼓以招諫設木以待賢故得近臣盡規遠人獻政出宮女則使心不亂屬大旱則引咎自責蓋禹湯之罪已實堯舜之用心詩云一人有慶兆人賴之其斯之謂歟深合太宗之宏略遠符貞觀之故事賜愚臣制策云朕以不德襲號乘時而皇極之道未敷謨明之軌尚闕者微臣何以識陛下之深遠而輒欲議之或恐日月有遺照聖智所不及故略陳其愚伏惟陛下留聽臣聞書云惟先格王正厥事言災害之起事有不正者也去歲水旱不時咎徵屢作胸奴侵軼邊將氣沮天其或者正訓我也欲令陛下知爵祿之虛授冗散之職多歟樂蕩志歟服失度歟何皇極之不建遂至於此也臣聞省官不如省事省事不如清心誠能克己復禮正身率物表有功而彰明德復古而貴能變禁異服革慢聲遠便佞近忠讜斷斷之士必擢於廟堂九九之術不遺於管庫可謂虛其心而衆象應正其本而萬事理焉書云天既孚命正厥德言正德以順天也若捨此道是不知其所從矣制策曰視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者臣聞易曰崇高莫大乎富貴備物致用立成器以為天下利莫大乎聖人古之王者享聖人之資乘大寶之位北辰居正南面而理亦可謂富貴乎當須存至公之行立大中之道覆燾同於天地通明合乎日月志遠邇之化存易簡之功庶徵順序五紀和叶百穀用成六畜遂字者無不由焉傳曰皇建其有極其斯之謂矣若貌之不恭是謂不肅厥罰雨其極惡若得其道則攸好德以應之言之不從是謂不乂厥罰晹其極憂若得其道則康寧以應之視之不明是謂不哲厥罰燠其極疾若得其道則壽以應之聽之不聰是謂不謀厥罰寒其極貧若得其道則富以應之思之不睿是謂不聖厥罰風其極凶短折若得其道則考終命以應之皇之不極是謂不建厥罰陰其極弱故經曰嚮用五福威用六極斯之謂矣臣聞貌言視聽以心為主故有正心者必有正德正德臨人猶樹直表而望影之曲也得乎大雅云儀刑文王萬邦作孚此之謂矣有邪心者有枉行枉行臨人猶樹曲表而望影之直也得乎孔子云詩三百一言以蔽之曰思無邪蓋戒此也故王者修身以道修道以仁仁也者親親為大義也者尊賢為大是以君子先正身而後及於天下如此則六沴不作五福相生貽厥孫謀永無極矣制策曰夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要者臣聞撥亂反正之主繼體守文之君撫馭之道雖殊禮樂之用為急自土鼓蕢桴之後始自無聲汙樽壞飲之初彰乎有用既而莫不曲諧九變信合四時是知大樂與天地同和大禮與天地同節移風易俗義切乎鐘鼓安上理人事寖乎揖讓既而祀歷三王時更七國經籍道息揚宣榭之烟埃儒生數窮赴秦坑而歇滅逮乎斷蛇立極乘牛設位紀綿蕝之儀鳴鼓舞之節必欲樂宣怗懘禮釋回邪取其不肅而成必在既富而教我唐功高邃古德邁往聖坐宣室而訪道登明堂以思政六樂為馭利則不爭五禮有經思而無犯思聞同異下訪芻蕘臣聞古之明君之御天下也身坐九重心遍四海禮以導其志樂以防其淫樂以理內為同禮以修外為異禮樂之不悖內外之相親可以感於神明通於天地矣詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也既敬且和何事不行其斯之謂矣制策曰四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋豫疑者臣聞皇王御宇步驟相仍莫不作樂以饗其德立諡以明其行此五帝之常道百王之所不易也且咸池六英韶濩兩聽盡善盡美竊無間然自秦失盛位漢雜霸道文景相襲刑措不用武宣承統華夷再清樂舞居功可略言也武德舞者高祖作之定禍亂也四時舞者孝武作之示和平也五行者本周曲也文始者本舜舞也孝景採武德為昭德以尊太宗也孝宣採昭德為盛德以尊武帝也昭容禮容猶古韶夏紹之於漢祖備之於樂志矣臣材非多士不遊六合之間夢異趙君總覩九天之上啓處無地戰汗不寧況承謏問敢以輕議謹對象字緯卿汶水人開元中由前進士補祕書郎轉右衛倉曹掾擢左補闕河南府録事遷司勳員外郎左遷歷齊邠鄭三郡司馬入為膳部員外郎安祿山之亂受僞署貶永州司戶起為主客員外郎惟甲受茲明命允膺舊德公侯之勳著在盟府恩澤不泯傳之子孫錫圭田以厚賢在王制而無稅徵斯什一頗涉無稽之言議以三章終發有孚之訟先生紫陽真人闕一字耳河目神氣有異年八十六而道心益固時人方之赤松子去年寢疾纍日冥然如夢長男曾子求於神鬼長請於天竊司命之籍與鬼物相競而角抵焉而告真人乃泠然而歸於是表請辭官乞以父子入道俱還故鄉仍以山陰舊宅為觀焉皇帝嘉尚其事尋而見許擇日度公與男田時公卿大夫觀者如堵皆曰賢才也正月五日上令周公邵公洎百僚餞別青門之內元鶴摩於紫霄吹笙擊鼓盡是仙樂聞者莫不增歎輕軒冕焉余與真人相知不以年不以位俱承太公之後見賞王粲之詞悠悠此別不覺流涕輒贈古歌辭一首庶為真人傳用之爾縚叔夏之子開元時歷集賢修撰光祿卿遷太常卿終太子少師臣謹按周禮以㽬辜祭四方百物祭法曰能出雲為風雨者皆曰神龍者四靈之畜亦百物也能為雲雨亦曰神也禮有公食大夫饗之文即生曰食亦曰饗矣其饗之日合用仲春之月易曰震為龍震者東方春用事於二月也饗之法請用二月有司筮日池傍設壇官致齊設籩豆如祭雨師之儀以龍致雨也其牲用少牢其樂用鼓鐘奏姑洗歌南呂鄭元云風師雨師及小祀用此樂凡六變者三變而致鱗物今饗龍亦請三變舞用帗舞尊用散酒以一獻周禮曰凡祭㣥小祀用之也謹按儀禮喪服舅緦麻三月從母小功五月傳曰何以小功以名加也堂姨舅舅母恩所不及外祖父母小功五月傳曰何以小功以尊加也舅緦麻三月並是情親而服屬疏者也外祖正尊同於從母之服姨舅一等服則輕重有殊堂姨舅親既疏末恩絶不相為服親舅母來承外族同爨之禮不加竊以古意猶有所未暢者也且為外祖小功此則正尊情甚親而服屬疏者也請加至大功九月姨舅儕親既無別服宜齊等請為舅加小功五月堂姨舅疏降一等親舅母從服之例先無制服之文並望加至袒免臣聞禮以飾情服從義制或有㳂革損益可明事體既大理資詳審望付尚書省集衆官吏詳議務從折衷永為典則禘祫二禮俱為殷祭祫謂合食祖廟禘謂締序尊卑申先君逮下之慈成㣥嗣奉親之孝事異常享有時行之然而祭不欲數數則黷亦不欲疏疏則怠故王者法諸天道制祀典焉蒸嘗象時禘祫如閏五歲再閏天道大成宗廟法之再為殷祭者也謹按禮記王制周官宗伯鄭元注解高堂所議並云國君嗣位三年喪畢祫於太廟明年禘於㣥廟自爾已降五年再殷一祫一禘漢魏故事貞觀實録並用此禮又按禮緯及魯禮禘祫注云三年一祫五年一禘所謂五年而再殷祭也又按白虎通及五經通義許慎異議何休春秋賀循祭議並云三年一禘何也以為三年一閏天道小備五年再閏大備故也此則五年稱殷通計其數一祫一禘迭相乘矣今廟禘祫各自數年兩歧俱下不相通計或比年頻祫或同歲成序或一禘之後併為稱祫或五年之後驟有三殷法天象閏之期既違其度五歲稱殷之制數又不同求之禮文頗為乖矣說者或云禘祫二禮大小不侔祭名有殊年數相舛祫以三紀殺小而合禘以五斷至十而周有茲參差難為通計竊以三祫五禘之說本出禮緯五歲稱殷之數同在其篇會通二文非相詭也蓋以禘後置祫二周有半舉以全數謂之三年一閏只用三十二月也其有禘祫異稱各稱四時秋冬為祫春夏為禘祭名雖異為殷則同譬如礿祠蒸嘗其體一也鄭元謂祫大禘小傅咸謂祫小禘大夫肆陳之間或有增減通計之義初無異同蓋象天之法相傳不失惟晉代陳舒有三年一殷之議自五年八年歷十一十四年尋其議文所引亦以象閏五年一禘又奚所施矛盾之說固難憑也夫以天之度既有指歸稽古之禮若茲昭著禘祫二祭通計明矣今請以開元二十七年己卯四月禘至辛巳年十月祫至甲申年四月又禘至丙戌年十月又祫至己丑年四月又禘至辛卯年十月又祫自此五年再殷周而復始又禘夾之說非惟一家五歲再殷之文既相師矣法天象閏之理大抵亦同而禘後置祫或近遠盈縮之度有二法焉鄭元宗高堂則先三而後二徐邈之議則先二而後三謹按鄭氏所注先王之法約三祫五禘之文存三歲五年之序以甲年既禘丁年當祫己年又禘壬年又祫甲年又禘丁年又祫周而復始以此相承祫後去禘十有八月而近禘後去祫三十二月而遙分析不均粗於算矣假如攻乎異端置祫於秋則三十九月為前二十一月為後雖有小愈其間尚偏竊據本文皆云象閏二閏相去則平分矣兩殷之序何不等耶且又三年之言本數全數二周有半實準三年於此置祫不違文矣何必拘滯遂隔三年乎蓋千慮一失通儒之蔽也徐氏之議有異於是研核周審最取為可憑以為二禘相去為月六十中分三十置一祫焉若甲年夏禘丙年冬祫有象閏法豪不偏三年一祫之文既無乖越五歲再殷之制疏數又均較之諸儒義實長久今請依據以定二殷預推祭月周而復始禮有禘祫俱稱殷祭二法更用鱗次相承或云五歲再殷一禘一祫或云三年一祫五年一禘法天象閏大趣皆同皆以太廟禘祫計年有差考於經傳微有所乖頃在四月已前禘享今指孟冬又申祫儀合食禮頻恐違先典伏以陛下能事畢舉舊物咸甄宗祏祗慎之時經訓申明之日臣等忝在持禮職司討論輒據舊文定其倫序請以今年夏禘便為殷祭之源自此之後禘祫相代五年再殷周而復始其今年冬祫準禮合停望令所司但行時享即嚴禋不黷庶合舊議宜城王士源者藻思清遠深鑒文理常遊山水不在人間著亢倉子數篇傳之於代余久在集賢嘗與諸學士命此子不可得見天寶中忽獲浩然文集乃士源為之序傳詞理卓絶吟諷忘疲書寫不一紙墨薄弱昔虞坂之上逸駕與駑駘俱疲吳竈之中孤桐與樵蘇共爨遇伯樂與伯喈遂騰聲於千古此詩若不遇王君乃十數張故紙耳然則王君之清鑒豈減孫蔡而已哉余今繕寫增其條目復貴士源之清才敢重述於卷首謹將此本送上祕府庶久而不泯傳芳無窮
