front:
  text: 全唐文欽定全唐文卷四百三十四定字梅臣太子太保瑀曾孫以蔭起家陝州參軍事擢右司郎中外歷袁州潤州刺史大歷中遷戶部侍郎轉太常卿朱泚反變姓名為張誕不汙賊事平擢太子少師興元元年卒年七十七贈太子太師
  hash: sha256:cc442835250f9f07cf27642434ad8acfd2f294b8fdc1733fe269092a8a81c552
