body:
  text: 於戲大朴既往淳風不扇天將以夫子為木鐸而大賚于生人天縱夫子以聖德而誕敷于文教不然則禮樂墜于地憲章弛而不張忠信薄于家人其被髮左衽矣周德既衰諸侯擅命君非堯舜其能以天下讓於聖人道在先天其能違天命要於富貴故夫子屈身以行道而道濟天下邁德以立訓而訓被家邦向使夫子為有土之君南面而治則大道洽于㣥物而况于人乎大化行於蠻貊而况於華夏乎夫天運之陵夷下人之昏墊若虞泉之不可畫也故夫子鬱厄於當時生人之未窮世數之相變若長江之不可竭也故夫子道行乎千載觀乎有國有家者微夫子之教其何以行之哉夫子之教也修身以及家自家以刑國而治道備矣是以治萬人如治其身治天下猶治其家使君君臣臣父父子子之道粲然明白若日月之照臨光於上下是故用其大者其治大用其小者其治小不用而能治者未之有也且三代之主皆聖君也而猶社稷與世數存沒祀典將子孫廢興則其餘皆可得而知矣夫子官為司寇道冠百王歷萬古而彌尊與四時而並運生徒滿天下祠宇充郡國與生人終始同天地盈虛非天下之至聖孰能與於此乎稽夫兩楹坐奠惟夫子疇昔之夜夢之尊為人君惟開元御歷之辰應之則開元叶明王之符夫子播人君之化矣大歷元祀定自尚書左司郎中試祕書少監兼此州刺史祗膺典禮式展誠敬入夫子之庭廡美盛德之形容高堂巋然垣墉半落俎豆斯在榱桷全朽靈像頽容門人虛位乃謀及寮吏撰日增修府寮從胄子從龜從筮從是之曰大同敢徵良匠祗敬蕆事改造夫子及四科之像兼畫七十二子之容江鄉土卑垣墉多隙以板易竹以粉代圬廊廡庭除四顧交葺籩豆簠簋罔不畢陳入其室若聞講誦之音升其堂如聆金石之響冀夫袁江之上將宏洙泗之風袁山之人能傳鄒魯之學儒行充於比屋中庸化而為俗矣非曰能之也冀能者賡之述而不作識之可已時大歷二年疆圉協洽歲律中無射之月兼刺史蕭定記有吳之興也泰伯讓以得之有吳之衰也季子讓以失之為讓之情同而興衰之體異何哉泰伯之讓讓以賢也故周有天下而吳建國焉季子之讓賢以讓也當周德之衰而吳喪邦焉或曰非所讓而讓之使宗祀泯絶而不血食豈曰能賢斯可謂知存而不知亡者矣夫治亂時也興亡運也故至至而不可却終終而不可留黃河既濁阿膠無以正其色鹽池斯鹹弊箄不能匡其味與夫當濁亂之世召力勝之戎讓與爭孰賢乎易曰知幾其神則季子之見可謂知幾矣季子之明可謂知進退存亡而不失其正矣至於聽樂辨列國之興亡審賢知世數之存沒挂劍示不言之信避國保無欲之貞故有吳之祀寂寥而延陵之饗如在元風可想至德興歎美之詞哲人其萎表墓著嗚呼之篆向微德仁兩至則夫子不復歎焉詳其精義被物鉤深致遠之旨烏可究其津涯而窺其墻仞哉是知讓之為德在於生靈不獨其子孫明矣國有祀典人懷永思定忝列藩條欽崇懿範于以加敬嚴乎閟官別閨壼之內外正衆臣之序位舊以泰伯之廟在於蘇臺而制季子之祠像設東面非由典禮諒無取焉必也正名於是乎在祈報獻奠贄幣宜列于軒廂春秋禮薦俎豆當陳于正寢俾觀像者識賢人之遺風可律審度者知經德之禮秩無差末學陋詞不足頌其休烈寒來暑往敢用同於紀年時大唐大歷十四年歲在己未八月戊戌朔二十七日甲子正議大夫使持節潤州諸軍事守潤州刺史上柱國賜紫金魚袋新拜尚書戶部侍郎蘭陵蕭定字梅臣記獻誠輔國大將軍守圭子天寶末陷安祿山授偽署後事史思明將兵守汴州東都平史朝義走還汴獻誠不納藉所統兵以州降詔即拜汴州刺史封南陽郡公改寶應軍左廂兵馬使更封鄧國公擢山南西道節度使兼節度劍南東川大歷三年疾歸京師以檢校戶部尚書知省事臣聞在滿防溢則無其咎知進忘退是必凶終聞之往賢深以為誡微臣獲宥政于茲六年猥蒙驅策委以心膂總戎持憲按俗宣風皆匪因人率繇睿獎每用刻骨內訟于心何德于天何功至此誓期死節上報生成不謂去歲以來風痺成疾而聖恩益厚光寵愈深俾堂弟獻功代臣節制授臣右職復檢校戶部尚書渥恩蟬聯晝日三接臣以寢瘵之故竟不得趨拜軒墀授官纍日又不得入曹視事多所曠廢職臣之繇今形貌支離精魂蕩越竊自診視慮不終朝大懼祿位逾涯以速顛沛伏願察臣丹懇罷臣此官消臣滿盈之禍延臣晷刻之命倘光天下照曲遂愚衷粉骨糜軀死將不朽元甫初任滑州白馬尉纍遷蘇州刺史浙江西道都團練觀察使大歷初徵為尚書右丞授揚州長史兼御史淮南節度觀察等使六年卒臣某言中使楊華林至伏奉敕書宣慰臣及將士者祗奉寵靈進退兢惕臣某中謝臣本書生素非公器恭守憲令所期自勉總司戎律實非所長頃者宣州用兵皆以詔書從事但悉所管兵馬稟副元帥文符幸隨衆軍克有成績皆王縉指蹤之力袁傪致命之功㣥帥成之在臣何有今又曲承霑澤特賜天書任重材微恩深效淺拜舞之下戰汗無從不任歡喜踴躍之至臣某言中使鎮軍大將軍行左威衛大將楊宗敬至奉敕宣慰臣等清問俯臨兢懼交集臣某中謝臣識非務大才不逮人依日月之末光叨藩條之重寄臣之薄劣實負寵榮頃年以來寇賊漸息時將休泰人自康寧臣誕布皇風恭行憲令待罪而已致理無聞曠官之責未書偏照之榮已及再三循省何以克堪蹈舞徘徊唯增戰越不任欣躍之至臣某等言中書門下奉宣進旨緣天寒常參官放朝者伏惟皇帝陛下憂勤致理惻隱無遺節應祁寒仁深潤下宵衣之際天意逮於周行挾纊之恩㣥臣照於堯日無任欣荷感銘之至臣某言臣亡兄某頃於興平縣界遇賊劫死臣辱司京尹職在肅清不能屏息姦回乃令害及骨肉既負曠官之責仍積私門之恨此賊漏網臣亦何顏况以私讎上貽聖德臣弛慢之罪哀臣死喪之戚頻降德音容臣追捕又恐事端皆知巢穴緣是行營官健未敢懸有追擒計會往來遂淹旬日以今月某日於某縣界捉獲所射臣兄賊某軍行官某并同伴若干人此乃天意除害轅門奉法不然則萑蒲之盜安得盡誅冥漠之魂猶將永恨擒姦摘伏仰荷聖威雪憤申寃俯獲私願生死蒙施無階上答無任臣某言伏奉去年月日制特加銀青光祿大夫跪奉詔書震驚心腑恩深益懼喜極成悲臣某中謝臣肄業儒門出身聖代始服勤於州縣遂竊位於臺省每自兢惕常憂滿盈一從效官三十餘載不敢受鍾釜之祿不敢敘節級之階中朝舊人咸所知悉非唯懼速訕謗實亦有畏神明屬頃歲姦宄亂常中原多故聖皇委臣以武關方城之任賜以章服監護七軍先帝委臣以荊南江西之寄特加朝散兼察兩道今陛下又録臣駑駘薄效超授銀青三朝荷榮百生何報仰天局地自省無能撫本循涯罔知攸措便當門施棨戟綬綰銀黃車服有加子孫蒙福禽鳥飛動不知天地之功草木芬華空滋雨露之澤誓將輕命上答生成冀效涓埃以裨萬一瓘博陵人纍官至澧州刺史風化大行優詔特加五階至銀青光祿大夫移潭州兼御史中丞充湖南都團練觀察處置使大歷五年兵馬使臧玠搆亂遇害鳥鳴亳社燕死吳宮屋室坐焚營魂溘盡下堂待傅嘗聞宋女之貞上國同盟亦曰諸侯之義情深怛化事急災分介之旌綿何嗟及矣求也攝帛如可贖兮豈澶泉之無歸固匍匐而將救斂怨為德容或干刑贈死及尸昧非懵禮覽公羊之大傳自有明文考縣象之舊章了昧非法人且無罪事固絶論伯陽肅宗朝御史中丞坐鞫天興令謝夷甫誅盜為侍御史毛若虛所搆貶高要尉高郵西北有湖名甓社近歲夜見大珠其光屬天嘗問諸漁者言或遇於他湖中有竊謀之者則風輒引船而去終莫能至賦曰鑠高郵之經治裂揚州之故部有湖隸旁將三十所大或萬頃小亦千畝穹山大野溪谷郊藪晝夜走險越千里而來赴者莽不知其幾千百處壓東南之湠漫勢膠轕而無涯溉灌乎民田漕引乎國家間乃省貢書考圖編所陳者特盤餐之微固不聞有把握之貴為當世之所傳發詠乎川珍翺翔乎水邊爰有虎人漁子相語而來前曰先生之念者貨也若夫川澤之精理則不然不寶於人獨寶於天今此有夜光之珠産於深淵其始也天和景晴湖波夜平煙冉冉以四收萬籟息而無聲則知珠也凜氣將之若海月之升含彩吐耀周隅皆明呀紺石而為宮被緑苔以垂纓挹奔星之光芒吸沆瀣之精英木散景兮扶疏草露實兮紅青林鳥驚而移枝㣥犬愕兮爭鳴於是卭人徐來上流俱起撫鴻罿以先趍領罾笱之已試連徽挺扠灑網持紲嗟雖鑑其眉睫疑未曉其機器方詭置之漸張果造形而已逝而況伏見靡時倏彼倏此與蛟龍之為朋曾風雨而作衛彼能三足而在籞鱉九肋而充饋漢蛟鮓之青骨鄭黿美之異味勍牛悅水而黃奪澤馬玩繩而足躓犀狎偶而解角翠因媒而折翅江使被執於行役巨魚為臘於貪餌文貝瑁出禍其腸腹金華玉英坐窮於淘縋蠯蜃胎寒熠耀自喜忲絶意於遐引適足殺其軀而已矣是故數者我固謂之貨也能不為珠之笑耶子曰嗚呼噫嘻信子言也既明且哲則大雅君子者耶不常所居擇利害而去就者耶用以晦明知在已者耶色斯舉矣學孔子之徒者耶薄泥塗而不辱不恥下賤者耶川不涸岸不枯有德鄉里者耶久而不聞其遁世者耶既而復曰嗚呼噫嘻照魏王之乘耶燭隋侯之室耶謂上幣耶飾冠冕而佩耶客有聞者亦矍然而興曰嗚呼噫嘻吾聞諸石室之書曰王者得之長有天下四夷賓服然則得之者或非其心獨王者之心也滉字太沖宰相休子以蔭授左威衛騎曹參軍至德初纍遷祠部考功吏部員外郎大歷中遷太常卿拜鎮海軍節度使封南陽郡公貞元元年拜檢校左僕射同平章事進封鄭國公二年改封晉國加度支諸道鹽鐵等使三年以疾薨年六十五贈太傅諡曰忠肅臣頃進漫生鹽故老相傳已稱靈瑞今乳鹽新出特表非常伏請薦於清廟編之史册吐蕃盜有河湟為日已久大歷以前中國多難所以肆其侵軼臣聞其近歲以來兵衆寖弱西逼大食之強北病回紇之衆東有南詔之防計其分鎮之外戰兵在河隴者五六萬而已國家若令三數良將長驅十萬衆于涼鄯洮渭並修堅城各置三萬人足當守禦之要臣請以當道所貯蓄財賦為饋餫之資以充三年之費然後營田積粟且耕且戰河隴二十餘州復之可翹足而待也佛本無形有形非佛泥龕塑像任日崩頽銅鐵之流各還本性正法何曾執具空門不積餘財白日既能賭博通宵必醉樽罍強説天堂難到又言地獄常開並付江神收管波中便是泉臺維貞元二年歲次景寅十一月丁亥朔十二日戊戌大行皇后崩於兩儀殿旋殯於西階越期一作三年歲次丁卯三月景辰朔二十九日甲申大行昭德皇后將遷座於陵臺禮也長秋宵闢靈轀夙備哀笳候曉咽挽增欷容衛儼然祖庭愔邃動常情以自失矧孝思之天至哀子皇太子痛鳳翣之將引哀雲陵之永訣號遣奠以登餕臨凱風以泣血臣滉奉詔式揚懿烈其詞曰坤厚載物乾道由儀成象大矣貞徽纂之芳聞在郃俔表天施風宏王雅慶發明離靜恭之德斯贊庶方之教聿熙誠軒星之降彩何玉華之遽萎嗚呼哀哉桂館纒哀椒塗燎寢翬衣卷玉龍扛綢錦內朝遽閟公宮曷稟彤管空貽黃桑罷紝宸衷悼深於故劍儲二痛絶於勺飲惟華宗之遠派實統業於周王猗烈祖之上仙固命氏之靈長沙麓之徵爰契筮華之慶載洋穆嘉猷於洲涘躋盛德之任薑居內輔以同體飾芳音以融光賦樛木以逮下鄙脫簪以自彰夙著當熊之績早膺靈鳳之祥布一德以蕃衍貞萬國以元良將順以柔克奚震蝕而靡常掩圓魄以就晦絶坤維而不張嗚呼哀哉臣妾何恃宮壼安仰湊永巷以晨謁瞻蘭殿以凝想庭寥寥以增曖繐襜襜以不敞激號唱以俱發達蒼冥以振響嗚呼哀哉通靈甫搆天京啓阡壽原春慘新宮晝元珠襦已襚玉座將遷哀嬪負璽泣御收筵鷖輅徐轉鸞旗導前慟皇情以餘渥下北極以辭天想衣練以崇儉絶傾筐而詠賢嗚呼哀哉瑤齋永閉鞶鑑長委靈仙眇邈母儀在紀媯汭同風塗山繼美配祗薦號騰英流祉惟皇儲之孺慕方銜恤以頓毀掩禮經之前蹤達天下之孝理遵睿懷之慘怛昭天行之終始垂千古而自揚豈臣詞之足擬嗚呼哀哉造字元宰深州安平人纍官左司員外郎擢給事中貞元二年同中書門下平章事罷為太子右庶子卒年五十一造白僕嘗以道喪日久罕見君子間者奉睹得聞循上之方體仁之度言發理契心朗目明涉道之誠若乘川而得舟楫其慰盛也寤寐自賀竊思前賢心感之重義叶之固或約之以朋友或申之以婚姻聚之以望閭悅之以宴好俾一日之合為纍世之歡裔嗣承流清風自遠克成貞素之業永稱道德之門即潁川荀陳蓋其事也僕不揆鄙固景行行之早年嘗與二三情友約誠同此世物多故志為事奪存沒有間通塞殊尚今中年已及此心猶阻永懷愧歎怵怍如厲幸以罪廢貶秩向終法尚放還歸齒田里追懼前失澡勵愚衷咨諭弟兄導率妻子甘與時絶永安邱樊息女二人姿性及義以靜約為尚以琴書為適庶可以承君子之好備有道之室長女先約故司徒元子宏農楊宏微幼女未笄願繼德嗣北歸之日敬俟嘉命夫人之生母道之動也動而能靜是謂返本僕婚嫁既畢退身巖阿靜以營神虛以順命與骨肉姻戚蹈道為期還復之中庶乎返本未審足下以為何如遠布所懷跂聞雅論造頓首鎣肅宗朝監察御史七馬坊押官盜掠人天興令謝夷甫殺之鎣鞫其獄直夷甫帝怒流播州南華真人立元古恣探討折罔兩之喻明希夷之道將欲侔三光之懸為百代之寶其始也若乃天清氣明長雲如掃呈纎微之虛質揚太陽之杲杲莫不以影為典以形為則動靜委任濃纎合德欣禦寇之輕盈恥壽陵之匍匐遇夫明也有似夫亨通遇夫陰也何異於否塞罔兩責於影曰子實傷躁吾之甚微謂為無也雖微而必有謂為有也雖可名曰希吾將舍子而去子復何所歸影乃假詞而諭曰夫鴻鈞造物其道大夷至精者不思而立得懵昏者役慮而不知則吾之與爾皆形之陰也焉得以自頤亦可以含天地之大德承日月之無私幸文明之宣照故纎毫而不遺罔兩於是欣然而應曰此乃邇其身居其神靜躁匪肅吉凶由人雖讒搆不能以相間安繩墨之竟爾相因懿夫行高道潔煦然慈仁規行矩步和光同塵志存禮義上奉君親是以吾之與爾俱得其真無終日之見舍同不孤之有鄰豈比夫共體嚚頑本枝險詖隨誇競以馳騁靡道德之浸漬務呫囁之委曲疲趦趄之巧偽騰浮薄而為名竟顛蹶以俱纍豈與盛明之光燭希薦能而比義
