front:
  text: 全唐文欽定全唐文卷六百十四澣宰相餘慶子本名涵避文宗故名改貞元十年進士長慶中累遷中書舍人文宗朝拜刑部尚書充山南西道節度使大和四年以戶部尚書徵未拜卒年六十四贈尚書右僕射諡曰宣
  hash: sha256:8593165602e6dab5f898ed0f914ac79cedde9511171aae392f216ebd19a36c64
  markers:
  - {type: head, offset: 13, content: 鄭澣, id: KR4h0168_NFKB_614-h1, level: 1}
body:
  text: 伊昔隋氏不綱海水㣥飛必有真人乘弊而起我高祖太宗提劍義動謐寧亂略釐天緯紐地維叱咤而日月貞風雲動壹戎而帝道光將材出神祇奔讋不復後符命謳歌盼響所以叶嗜欲元合岐陽之蒐高捐盟津之會墜塗炭者戡定塞壺漿者勞徠煌煌乎天人之表以蘇品彙或哲而謀或幽而明陶埏陰步馬用啟眷佑矧草昧之中睿作已張化而為大猷而布後嗣意者廓天統扶土德神功不能戢其貺靈鑒不得遁其形理可明徵道邁先覺時則霖沴方作饋餫不給曠若彗掃霅然鏡開華髮逶迤告語濟師佳里社鳴濁河清秦星聚素靈出擬諸斯瑞不是過也噫桀有昏德三苗亂常逮於逐蚩尤掃攙搶幽贊不違咸是物也故能吉蠲之明祀視諸侯之徽數赫赫天寶於以報功澣曩時官謬紫微郎將命大鹵霍鎮之下壽宮不騫敢鏤菲詞以恢王業其銘曰崇山巖巖晉分所瞻唐風泱泱景祚悠長俯僂白衣契幽洞微揭日無私我建義旗昔告趙符今導六龍干戈之兆脫劍之幾勒諸崢嶸以永光輝陽源貞元中進士江漢之流始滔滔乎楚澤雖導源而則異必朝宗而來格故能吞別派而且千壅細流而累百初謂發岷山之濺濺出嶓冢而涓涓忽洊至以盈坎遂同歸於巨川洋洋不窮驅迅波以來注浩浩何足走驚浪而方前沸渭迸瀨崩奔爭會過東陵而更長歷南國而彌大引汲清濁并包畎澮始逶迤於域中終委輸於區外雙流淼淼並鶩悠悠滈汙乎萬里經營乎數州靜委極深且無驚於海若潛盈巨壑亦何怒於陽侯彼宏納之無際信為長於百流爾其揭厲莫從深淺無必絕地脈於飆駛透天池而箭疾善下以潔乎龍堂流謙更清乎鮫室就其深矣誰識濫觴之源不可方思空想觸舟之實終始齊赴周流不違似有待而俱進何經始之相依演漾紆餘必遠分而邇合洄澓激射雖異出而同歸則知海之為量也虛而有餘水之趨本也道亦相於二派既朝於滄海眾星如拱於辰居漢之廣兮明委積之有所江之永矣表靈長之在諸是俾涵虛之狀益深浮天之容斯在苟歸塘之不息諒納汙而惟倍大矣哉誰究其廣深空有望於靈海元理可得真宗可尋惟虛舟之不繫同大道之無心每悠悠而去住恆泛泛而浮沈寂慮為徒必澄淡而方息在物無競信風濤而莫侵體合道樞來憑積水本流謙以處順寧遇坎而斯止類善行之無跡似至人之虛己或沿或沂非假功於檝師載沈載浮亦奚勞於舟子若乃景絕遊氛川息波文蕩漾無阻逍遙不㣥則鼓枻者未足與議摧撞者不得而云故曰動以貞勝而靜為躁君觀其浮廣川之洋洋混長瀾之浩浩不拘同放曠之懷無著體希夷之道殊青翰之見重等元珠之為寶惟斯道全誰曰不然任東西之漂蕩隨風水之推遷中含虛而自若外守正以無偏逢流則行靡驚黿鼉之穴安波自往空思李郭之僊動息靡常去留不禁以虛而受殊乎小器易盈可濟不通非曰不勝其任處靜安卑乘流任時浩然獨逝邈矣誰追想好風於曲岸避巨浪於中坻且沒跡於寂寥檝棹何從喧矣是無爭於觸擊紼纚焉得維之是則虛其舟川得以寧虛其心人寡於欲既與道而合契亦無情於相觸苟思理之未忘諒無驚於寵辱大矣哉海浩漾尋之無際望之無象利萬物以成德總㣥川而為長柔能善下稟巨壑以包涵挹而朝宗覩眾流之歸往是以臨不測者未足言其濟深思利涉者孰可詠其河廣究其所由得之在柔濫觴之初因一勺而畎澮循環無際想三歲之周流伊昔洪水方割夏禹是理既濬崑崙之輸爰標南國之紀故導之逾遠非壅之可止將虛受之為德諒成大而有以且明乎避高之義自得乎潤下之旨始將就濕想浩浩而其來終類沃焦見滔滔之未巳原夫水反於壑海不厭深其有也靡患夫泛濫其細也不逆於浸淫是知眾流同歸異源將合注而不竭但見乎川流滿而不盈更因乎海納廣哉巨瀛莫之與京萬里波委四時砥平灌以涇不能混其濁注以渭不能溢其清不涌浪而跳沫獨持盈而守成故得萬穴爭赴九河自同類夫雲之從龍鳥之附鳳又似一人立國萬方入貢願以含垢之體為納汙之諷因知夫海為川谷之王以寬而得眾太極經始純坤傾東勢以嶽鎮氣以川融於是靈闢襄華象開鴻濛橫大野以中豁夾洪河而北崇爾其沓嶂無際連波方永噴激萬里迴合千嶺總崤函之氣象壓秦晉之封境山以河潤上騰雲雨之祥水與時清下倒巖巒之影若乃騁遠望馮層城秋爽元氣朝昇大明偉連天之浩汗壯發地之崢嶸翠岫屏擁澄瀾砥平疑白虹飲壑而半隱似寒雲抱塞而初撗及夫俯臨迫察詭麗雄悍峻勢危而不騫靈源注而常滿積陰騰氣與嵐色而相鮮爍日生霞連榮光而不斷觀其畜含精秀孕育風霆應會昌運發揚炳靈茂賢傑於間出翊邦家而永寧况乎山積鴻休川流景福明徵祥瑞幽贊化育此其所以配乾坤此其所以稱嶽瀆豈徒翫夫縈帶委注蓮開翼張巍巍峩峩滔滔湯湯干天之峻極赴海之靈長而已士有圭竇強學金門獻賦困陶侃之無津恥孫宏之不遇覽襟帶而增氣追聖賢而遐慕想劉公之歎微禹其魚感吳子之言在德為固義由景行仰高山而自慙志切朝宗與大海而同注儻餘潤之波及期變化於雲路傳正字西老南陽順陽人舉進士博學宏詞書判皆登甲科累擢宣歙觀察使憲宗朝改光祿卿以風恙卒贈左散騎常侍為君者莫大乎求賢審賢者莫先乎進善不立表以取則何勗人於自勉故我后纂唐德酌堯典爰揭旌以建標若懸鑑而攸選其制惟新難乎所陳寘於朝懼來而有阻樹於野慮獻之無因於是施之五達之陌以招四遠之人乃折羽上插綴旄傍委映旭日之曈曈隨長風而靡靡孤標迥出中立無倚將舉事以舉言在率土而率俾儀神都聳康衢或斂衽以下過或峩冠以來趨善或可聞豈持之而有怍德苟未進敢欺之而自誣旌因名而助順士修業以求進小人斯遠實曰不怒而威君子必臻可謂不言而信瞻之者其行勵仰之者其心慎非表善之為崇亦懲惡而能峻故得有善者不壅無媒者自通所以導人之志達帝之聰豈比夫舞干兩階徒有格苗之用繁纓七就何旌進善之功亭亭不撓奕奕斯設招一善而百善知歸納一人而萬人胥悅諒厥裁之為美與恆用而有別施之行馬豈得耀於朱門授乃元戎何貴偶夫全節藏器以待時與斯而若期惟事匪細惟賢是司儻片善可錄至公不疑願佇立於旌下幸因茲而進之風為氣兮溥暢簫在物而虛受何相會於自然合無情於妙有泠泠斯韻習習能久如聞松葢之巔寧比土囊之口颯爾而至鏘然輒隨響纔度以俄遠聲成文而不虧其虛其實是可披襟而納以條以暢何煩鼓腹之吹彼孔雀下降鳳凰來儀雖見美於格物豈不慚於有為彼簫之韻惟風所借或激越於清曉或淒涼於永夜寂寞之內爰生不考之音希夷之間是合不言而化謂越客乍流其遺響謂秦女遙度其僊駕散彼寥敻復於沈潛被治國之風以安以樂在敬心所感乃真乃廉動有輕重應無洪纖解慍且和可並鼓琴之唱不姦而順亦具從律之占若乃聽其所以察其所感蓋有符於元漠豈惟契於閒澹籟之所之智之所知誠萬殊之舛錯終一貫而逶迤風從虎兮飄忽簫象鳳兮參差何體異之如彼而音同之若斯豈不以宮商所合唱和為稱類霜鐘之暗叩同灰管之潛應時然後起風匪躁求激而乃揚簫為靜勝彼鈞天之音肸蠁洞庭之樂虛無豈比風簫之感召亦由律呂之相須異搜奇於蔡笛鄙濫吹於齊竽徵顏成南郭之言浩然難究擬宋玉王襃之賦庶或同塗天一濬靈多原於西岷山導江禹績可稽民生之初惟水利賴夫既利之胡忍貽害運有推遷事有因革保制安危神實任責於穆英惠藩屏坤維於赫仁祐駿烈四馳自秦徂漢禩以千計維王父子蜀境是庇江源自蜀王鑿其阻蜀溉餘波厥施乃溥江趨而東勢通蜀山春夏暴漲橫潰是閑既遏其沖又決其支以漫以灌惟堰是資昔王受命司我芻牧為茲惠利以阜我蜀今我蜀民作堰歲勞殫智疲力以扞江濤僉憲有謀將息斯患王實誘之肯遺以難吏籲於王願受指教王繇之詞繼導之珓詢謀允孚百役以興厥志無二惟土之憑象鼻之漲茫無津涯涌為淺瀨有藥有沙匠陟彼巘言鑿其堅山夜發洪穴不待穿匠取彼石既磊既砢撝椎運斤惟右惟左蜀山不雲蜀日且出涉冬屆春民就愛日彼犍彼菑昔水今石其崇言言永固爾墌民聽鼕鼓追思往年富民醵錢耕者廢田今茲永逸孰究我圖顯允二神作我蜀郛聖神在御懷柔百神封章來上亟命詞臣錫以徽稱華以晝命以旌王功以致朕敬渙號於庭揭虔於詞朕命不褻神惟顯思登瀛有臣復請誄賜俞音自天寵命薦至嗟彼嬴民百郡列署惟茲蜀守勳烈昭著異趨殊歸惟德與力王初庇民顧盡乃職豈謂異世猶濯厥靈俾王初至炳乎丹青王不恃力務德是勤有偉斯績益光前聞詞臣作歌守吏眂刻江流沄沄昭彼無極騏驥筋力成意在萬里外歷塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翅別島空留大名人亦有之故左拾遺翰林學士李公之謂矣公名白字太白其先隴西成紀人絕嗣之家難求譜諜公之孫女搜於箱篋中得公之亡子伯禽手疏十數行紙壞字缺不能詳備約而計之涼武昭王九代孫也隋末多難一房被竄於碎葉流離散落隱易姓名故自國朝已來漏於屬籍神龍初潛還廣漢因僑為郡人父客以逋其邑遂以客為名高臥雲林不求祿仕公之生也先府君指天枝以復姓先夫人夢長庚而告祥名之與字咸所取象受五行之剛氣叔夜心高挺三蜀之雄才相如文逸王褱奇宏廓拔俗無類少以俠自任而門多長者車常欲一鳴驚人一飛沖天彼漸陸遷喬皆不能也由是慷慨自負不拘常調器度宏大聲聞於天天寶初召見於金鑾殿元宗明皇帝降輦步迎如見園綺論當世務草答蕃書辯如懸河筆不停綴元宗嘉之以寶牀方丈賜食於前御手和羹德音襃美褐衣恩遇前無比儔遂直翰林專掌密命將處司言之任多陪侍從之遊他日泛白蓮池公不在宴皇歡既洽召公作序時公已被酒於翰苑中仍命高將軍扶以登舟優寵如是布衣之遇前所未聞公自量疎遠之懷難久於密侍候間上疏請還舊山元宗甚愛其才或慮乘醉出入省中不能不言溫室樹恐掇後患惜而遂之公以為千鈞之弩一發不中則當摧撞折牙而永息機用安能傚碌碌者蘇而復上哉脫屣軒冕釋羈韁鏁因肆情性大放於宇宙間飲酒非嗜其酣樂取其昏以自豪作詩非事於文律取其吟以自適好神仙非慕其輕舉將以不可求之事求之其意欲耗壯心遣餘年也在長安時祕書監賀知章號公為謫僊人吟公烏栖曲云此詩可以哭鬼神矣時人又以公及賀監汝陽王崔宗之裴周南等八人為酒中八僊朝列賦謫僊歌百餘首俄屬戎馬生郊遠身海上往來於斗牛之分優游沒身偶乘扁舟一日千里或遇勝境終年不移時長江遠山一泉一石無往而不自得也晚歲度牛渚磯至姑熟悅謝家青山有終焉之志盤桓庀居竟卒於此其生也聖朝之高士其死也當塗之旅人代宗之初搜羅俊逸拜公左拾遺制下於彤庭禮降於元壤生不及祿歿而稱官嗚呼命歟傳正共生唐代甲子相懸常於先大夫文字中見與公有潯陽夜宴詩則知與公有通家之舊早於人間得公遺篇逸句吟詠在口無何叨蒙恩獎廉問宣池桉圖得公之墳墓在當塗邑因令禁樵采備洒掃訪公之子孫將申慰薦凡三四年乃獲孫女二人一為陳雲之室一乃劉勸之妻皆編戶甿也因召至郡庭相見與語衣服村落形容朴野而進退閒雅應對詳諦且祖德如在儒風宛然問其所以則曰父伯禽以貞元八年不祿而卒有兄一人出遊一十二年不知所在父存無官父歿為民有兄不相保為天下之窮人無桑以自蠶非不知機杼無田以自力非不知稼穡况婦人不任布裙糲食何所仰給儷於農夫救死而已久不敢聞於縣官懼辱祖考鄉閭逼迫忍來告言訖淚下余亦對之泫然因云先祖志在青山遺言宅兆頃屬多故殯於龍山東麓地近而非本意墳高三尺日益摧圯力所不及知如之何聞之憫然將遂其請因當塗令諸葛縱會計在州得諭其事縱亦好事者學為歌詩樂聞其語便道還縣躬相地形卜新宅於青山之陽以元和十二年正月二十三日遷神於此遂公之志也西去舊墳六里南抵驛路三百步北倚謝公山即青山也天寶十二載敕改名焉因告二女將改適於士族皆曰夫妻之道命也亦分也在孤窮既失身於下俚仗威力乃求援於他門生縱偷安死何面目見大父於地下欲敗其類所不忍聞余亦嘉之不奪其志復井稅免徭役而已今士大夫之葬必誌於墓有勳庸道德之家兼樹碑於道余才術貧虛不能兩致今作新墓銘輒刊二石一寘於泉扃一表於道路亦峴首漢川之義也庶芳聲之不泯焉文集二十卷或得之於時之文士或得之於公之宗族編緝斷簡以行於代銘曰嵩嶽降神是生輔臣蓬萊譴真斯為逸人晉有七賢唐稱八僊應彼星象惟公一焉晦以麴糵暢於文篇萬象奔走乎筆端萬慮泯滅乎罇前臥必酒甕行惟酒船吟風詠月席地幕天但貴乎適其所適不知夫所以然而然至今尚疑其醉在千日寧審乎壽終百年謝家山兮公之墓異代詩流同此路舊墳卑庳風雨侵新宅爽塏松柏林故鄉萬里且無嗣二女從民永於此猗歟琢石為二碑一藏幽隧一臨歧岸深谷高變化時一存一毀名不虧明德宗時人臣琳言伏奉今月七日制書贈亡兄特進汝陽郡王太子太師澤下天中寵被哀次昭告且畢摧絕失圖臣某中謝臣自掇咎釁復此悲苦更蒙飾終之恩倍盈先遠之痛無任屏營猥塞之至敖建中二年進士官太常博士地絡之紀莫宗於河陰潛之功光啟於匯既略太華浸淫中條嶽瀆宣精融為巨肇有元命元珪告成惟其潤下乃生舄鹵鹽池之數有九七在幽朔二陂河東皇穹陰步馬兆人眷祐中土因飲食以致其味節和齊以調其心溟溟天池實曰鹽澤幅員百里澄澈萬頃元極積數太鹹為鹺其墟實沈其宿畢昴其漕砥柱其關巔軨后祗寶之設以重險謙順成量澗溪攸鍾涵風蓄雷終古不息漫若山外連為海門所以帝乙建社而臨之王豹遷都而據之執其重輕以曜富有在昔山澤委於虞衡周制無征漢方盡幹務其尊穡蓋用抑商少府所尸均其權量㣥族自占築廬環之業傳祖考田有上下旱理其埤水營其高五夫為塍塍有渠十井為溝溝有路臬之為畦釃之為門漬以渾流灌以殊源陰陽相蒸清濁相孕動物潛舄蠢為陶工曶孚而凝莫見其眹雪野霜地積如連山羨漫區域歸於塗潦泉貨之廣沒於齊人皇家不賦百三十載元宗御國四十三年姦闕葪邱爟火通鎬嗣聖受命以兵靜之擊鼓崤洛封屍燕趙去獫狁於絕漠走昆夷於窮荒亶其宸威風動八極調發之費仰於有司雖田征益加而軍實不足遂收鹽鐵之算置榷酤之官以權合經以貨聚眾畫野摽禁壍川為壕西籠解梁左繚安邑乃滌場圃乃完廥倉畢其場功以謹秋備度土定食止於中州濟於橫汾爰距隴坂東下京鄭而抵於宛艘連其檣輦擊其轂終歲所入二百千萬供塞垣盡敵之賞減天下大半之租然後傳於甸人納於醢人有形有散以宴以祀每仲夏初吉為墠而饗之懿夫明徵厥有前誌中宗反政崇朝而復醎大歷窮霖巨漲而不淡誠宜命袟視彼封君先皇帝薦靈慶以號神索氤氳而建廟拖諸侯之法服鏘泮懸之清樂籍二郡之版六百隸於司池故得浮榮光結顥氣沖其德正其味粒重英以表稔花四出而呈瑞陳陳相因非秭載可能計矣貞元九年冬天子親祀明堂大裘而郊孝道升聞百蠻頓首粟帛之賚及於鰥惸庶政惟和達於遐邇戶部尚書裴公延齡奠三壤之差九州之賦鐵鼓之貢林鹽之饒凡晉人是輸以河中為會府遂表職方郎中兼侍御史馮公興推其全材委以大計詔曰俞興往哉汝諧乃駐車蒲城以馭㣥吏分命前永樂縣丞張巨源前鄭縣丞蕭曾率屬而臨之洎十一年秋九月裴公薨今戶部侍郎蘇公弁繼之以馮公成績有聞禮任如舊度支又以前詹事府司直陸位知解縣池前大理評事韋縱知安邑池惟職方領地官之外權惟評直守制使之成算姦氣不作阜財有經十三年四月五日兩池官吏及畦戶等請勒豐碑揚茲利澤感和羹之訓心游傅氏之巖稽近盬之詞氣對郇瑕之邑微臣作頌式贊新宮頌曰浩浩靈池冠於水行蒼茫太陰滲漉純精惟澤在闕與時為程禍貪而竭福儉而盈巨唐君臨坤順乾貞冥勤其官坎德效靈海眼通波河源伏脈千里一氣瀦為廣雲漢照臨玉繩下直曰雨曰風以凝以積自我天產惟其口食斯皇元后乃聖乃神既潔浮沈亦修明禋大禮畢舉大樂畢陳馮公員來克諧神人登牲廟壖瘞幣池瀕既醉既飽馮公則欣蕭張行優陸韋德鄰有闕有屬伊馮之賓仰彼元造垂於無垠皇運天長頌聲日新叔平官盧龍節度掌書記監察御史公諱仲堪字仲堪其先太原人也奕世珪鼎紛綸葳蕤國史家譜詳之備矣十九代祖西晉京陵公渾位極台司功格帝室冑允枝散遍於九州五代祖沖徙居幽州安次縣子孫家焉今則又為邑人也為郡右族繼生才賢曾祖掞王父幹儒墨傳家以孝悌自任故時君不得而官之矣皇考令僊蘊孫吳之術好立奇功累以勳伐稍遷大理評事公即評事府君之元子生而岐嶷體備剛柔越在齠年便志於學逮乎弱冠乃為燕趙聞人經史該通詞藻艷發本道廉察使賢而薦之自鄉賦西遊太學㣥公卿士聆其聲而交之所居結轍名動京邑大歷七年進士擢第稽古之力自致青雲所謂拔乎其萃為山九仞者也解褐授太原府參軍事居無何丁太夫人憂服闋本道節使奏授幽州大都督府戶曹參軍以能轉兵曹參軍事雍容府寮名檢摽舉局無留事庭宇生風節使嘉之俟其碩畫乃奏充節度參謀拜監察御史盧諶本郡未足稱榮買臣居鄉豈云顯達我相國彭城王方任以參佐宏贊廟謀略邁韓彭幕繼袁伏矣以為諸侯聘問歲惟其常妙選行人以通兩君之好十二年冬十一月公奉使於蒲春二月旋車自蒲經途遙遙旅次雲鄙以貞元十三年二月三日不幸暴殂於望巖之傳舍享年六十有四嗚呼哀哉自古有死人誰不終公有厚德而壽不永公有全材而位不高則梁竦悲乎州縣馮唐老於郎署可以言命矣以貞元十三年二月十七日殯於薊東之別墅從權也以其年四月六日遷神於薊縣燕夏鄉甘棠原禮也不祔舊塋從先志也次弟仲坰季弟僧法源等悲摧鴈序痛折連枝嗣子存次子較方在幼童茹慼過禮子壻前鄉貢明經清河張存義感於情眷深國士慮絕故老永遺志業刊石紀德銘而旌之所謂沒而不朽者矣銘曰易水湯湯兮燕山崇崇有斐君子兮穆如清風簪筆拽裾兮佐我上公直哉惟清兮允執厥中奉使於蒲兮自西徂東天胡不仁兮如何道終丹旐戾止兮啟茲元宮青松森列兮永翳我宗悲壯圖兮已矣惟芳名兮不窮諷貞元十年進士歷官金部吏部司勛郎中惟哲王儲精庶務示人降衷冀一善之咸覩俾㣥情而大同抗以高旌式觀於五達萃茲多士以聞乎四聰是用去疵厲而達幽仄和上下而宣德風邦有道而無隱善如流而必通原夫創自堯心變昭漢列參夫析羽之制有類干旄之設名既匪於司常用有殊於掌節多通達之要會集寰海之賢哲每聞致主之言時得興邦之說足以見王臣之謇謇聖德之孜孜示人有作虛已無私旌非善而罔進國非賢而不釐遵道員來懋德音而親問擇陰斯止備獻替以陳詞敷一德而見答俾兆人而賴之徒美夫因事立名教人示信略孤表以遙集掩㣥才而得雋無勞負笈而來豈必繫轅而進於以光啟帝道輝映天衢陋燕昭之尊隗小齊景之招虞正以居中表宏道之在我直而端本知立德之不孤於是野絕遺賢朝無闕典仰崇標而勸義臨廣術而來善豈比夫周聆木鐸之謠漢尚石渠之選方今酌憲前古肇康有人將葑菲而並采俾弓旌而是陳故野無逃名之士朝有俾象之臣舉善陟明振遺芳於虞帝率心敗德矯覆轍於嬴秦然則庶績交修遐邇率俾儻片善之可錄庶無疑於室邇惟薰風之生物有穠李之表禎合連枝於異榦符一姓於嘉名交影齊密均和共榮諒全德之通感豈元和之曲成族堅附離訝生植之異氣質殊合體識天地之幽清考彼祥經珍茲善價昭一人之有慶表四夷之嚮化體符通理黃中之象攸存義用成蹊不言之道斯備蓋夫靈根得地聳質齊芳分條表異合榦呈祥膚含玉潤文蔚龍章雲交翼比影附枝強庇本根於僊族挺孤秀於仁鄉始則分形謂陰陽之偶數終而一貫表遐邇之通方是知元本靈種暗符神用諒翦伐之為重合拱連條允孚歌謠固耳目之所昭並甘棠而價掩比叢桂之香遙則知瑞以感生祥由仁致覩政分而脈會契人事與天意將德茂而精通故駢疎而合異於以昭化警俗示人不二豈比夫草生堯砌空有紀於歷官芝產漢宮徒用彰於祀事洎夫元律發春東風薦臻齊敷連萼之影共沐陽和之津想雙枝於棠棣感合體於君臣四海為家豈必移根於上苑五色敬用固亦發瑞於仁人彼晉得華林漢生廣殿諒崇功而間出豈謙德而來見願棲託之見容恐光陰之不薦元侯以制敵之雄略期方隅之永清得奔衝之故地創備守之新城四合分形見岡巒之表裏百堵定制變勝負之虛盈崒雲屯而霞起忽虎踞而龍行倚蒼壁以中絕粘頳壤而外明將伐謀伐力制敵投兵馭亭障於振策摧氐羌於矯衡是知地利攸歸兵家大福我有巨防師無遺鏃神謀洞啟而機張天險載興而板築於以巒披岡削嶺門崖谷雉堞霜皜麗譙雲矗連山上捧鬬士以之增威峭壁初嚴戎王於焉慟哭矧夫勢雄形固師嚴令肅數萬落於屈指睇連營於寸目何暫費於經營永無虞於敗覆故能功圖彀內智出謀先高厚不愆乎上命規模必合於中權俾夫登埤荷㦸憑墉控弦虜魄暗褫漢烽不然仰峻隅而已僨望懸門而不前懼摧鋒於百勝敢踏伏於三邊者哉是知奇功不詐俾殊俗而向化善守以威即死士而知歸不然者戎輕無常獸困猶鬬安能使犬羊埽跡烽柝寢候仰新壘以投戈覆故巢而罷寇是知威服德綏不獨遠夷彼或不讋我則成城以耀武彼能懷惠我則蹈道以貞師庶扃鐍而惟永顧咽喉而在茲彼周城朔方漢得赤坂無制勝之明術徒疲人以勤遠豈比夫修武備清文苑將鳳沼以酬勳佇靈臺之伯偃申伯官司勛員外郎遷司封郎中天地之德至大非風雷日月之用不能贊其化育而致生乎萬物釋氏之教至精非聰達惠覺之士不能揚其妙道而化度乎㣥疑天生法師克契斯義用安一世以垂化後云法師諱空姓任氏弱而神清幼而不㣥年八歲心已嚮佛誠請既行緣愛自去遂授經於惠雲闕一字學景鸞耳所一聞亦既懸解目所一覽又若夙習跪陳精奧師皆歎異知闕一字其法非天縱之孰能與斯法師常謂弟子曰我靜觀眾生或瞽或聾嗷嗷嗤嗤溺於狂妄若智者不能扷仁者不之慈雖獨揭厲於清源則大聖之教又將安施於是張善惡報應驅僻邪於中正導真如之理解拘縛之勞登高抗音化所不化侍代宗則聲仁王之文言發而歸於大中理貫而合於至正故君聞而仁臣聞而忠推而廣之夙化斯變詔法師與天竺三藏譯六波羅密經功畢上獻天子感歎錫賚有加雖異方之奉斯學者知有所本矣由是人教揚溢於海內惠風漸漬於人心朝廷垂衣刑措於下其或有助乎嗚呼時將不幸人其無依以貞元十年正月十五日告行於興唐寺報年六十一弟子惠見等與俗侶白衣會葬服纕者千人以其年二月四日弟子智誠等共起塔於畢原高岡既相與號慕不逮自諮鄙人刊銘於石述其妙道用慰永懷銘曰佛有妙法使皆清淨世界罕聞色塵皆盛其一心逐於闕一字情亂於性扇為頹風蕩然莫正其二大哉我師降厥慈悲開示寂樂破摧昏疑其三法相既圓色空自離千萬大眾歎泣而隨其四大教既揚威德闕一字光除彼煩闕一字化為清涼其五功成身去自契自藏銘於塔石與天俱極其六
