body:
  text: 形鹽似虎岐峙山立虎則百獸最威鹽乃萬人取給合二美以成體何衆羞之能及厥貢惟錯將蛤蜃以俱來充君之庖與昌歜而齊入麗哉其義可嘉其美可頌魯崇宴賞周公實來殷作和羹傅説登用向若美景初霽奇狀不遙映金盤以皎皎臨象筯而光昭遠則雪山出地近則白虎戲朝瞿瞿其肉威而且猱耽耽其目視而不恌立而成形也白黑相對融而司味也鹹酸必調厥味伊何物不可並水火相濟為君子以成八珍上下協諧具公餗而登五鼎利我者則衆成我者幾何備物象形即賤不干貴皆可適口豈同而不和至如大君式宴樽俎充盈形鹽具矣以為賓榮意者取則國君文足昭德武以弭兵時之所貴物莫能京故天官敘其職春秋美其名必也見遺則陸沉於懷土如或可用當濟代之和羹儻有裨於家國在吾道之應行殷瀛州人後唐同光末為華州馬步軍副使天成中移授靈武都指揮使清泰中授祁州刺史晉天福中改憲州刺史少帝嗣位纍遷奉國右廂都指揮使漢乾祐末領夔州節度使周太祖即位授天雄軍節度使加同平章事後被誅臣為末將出處無損益於國家臣本燕人值鄉國離亂少罹偏罰因母鞠養訓導方得成人不忍遽釋苴麻遠離廬墓伏願許臣終母喪紀言廬陵人仕楚文昭王馬希範為辰州刺史恭孝王希草口咢立權武平留後徐威之亂言遂盡取湖南故地奉表於周除武平節度使同平章事後為靜江指揮使王逵所殺臣聞域中至大須歸正統之君海內稱尊合奉真明之主事既緣其道阻機且務於從權關河之信使不通戎鎮之箋章未達實為暌越罪屬稽留臣前年以馬氏弟兄交相魚肉是希崇之失禦致邊鎬之侵疆當道節度使馬光惠早副㣥情方施庶政遽多耽惑將亂紀綱三軍商量乃行廢黜臣謬居上將忽被衆推尋且奉表東吳所冀且安西土不謂湖南節度使邊鎬多行間諜嘗畜陰謀致半年未降於新恩而中使遽來於急詔而又縱橫肆意説誘五溪暗行文書廣齎金帛將謀會合欲舉攻狀臣請節度副使王進逵行軍司馬何敬真別差指揮使周行逢朱全琇張倣等慮其姦計恐致危亡乃舉兵師去平凶寇自十月三日水陸發兵順水至五日收下沅江九日又下益陽十四日克復湖南越池邊鎬見其危迫陸路奔逃見發奇兵掩後追逐料行狼狽必恐收擒臣素昧兵鈐曾無將略幸處軍中之長叨司閫外之權念臣節以徒堅望堯階而尚敻既復瀟湘之土宇永依日月之照臨幸成破竹之功敢慢傾葵之懇且馳單介徑達皇都謹差節度押牙張崇嗣奉表以聞當道去年以湖南馬希草口咢弟兄傷蹇家國陵夷淮南差邊鎬潛入長沙便為據守扶風一族楚水萬家並押送東吳固無留者當道有兵士二千來衆亦被括將纍乞放回意未允許今春前節度使馬光惠耽荒稍甚僭侈非常三軍商量乃行廢黜臣以位居簉二衆意推崇辭讓既難藩方無主此際以馬光惠早歸東國纍降頒宣臣等例奉甄升未遑回變方思述職鄰道可明不謂湖南頻行間鬬彼衆將行討伐當軍須舉兵師冀先定於熊湘復歸明於象闕東吳早以臣權知戎閫未降明恩尋有急徵並令歸國其邊鎬唯懷詭詐多畜姦謀況五溪八州是武陵管屬邊鎬暗齎金帛密與鈎連計料加兵欲謀攻逼於界首益陽縣下寨聚食屯師自謂士卒精強壕塹牢固當道節度副使王進逵行軍司馬何敬真指揮使周行逢朱全琇蒲公益等去十月三日部署大齊雲截波魚龍戰棹等三百餘艘計三萬人並陸路指揮使張倣董從德等押馬步兵士二萬餘人同日進發五日收下沅江縣獲賊都監劉承遇其賊將李師德等五百餘人並束甲歸降至九日到益陽寨賊衆一萬餘人堅守抵扞攻擊自辰至未其寨自潰殺戮八千餘人捉得都指揮使夏昌活擒八百餘人至十一日橋口湘陰數處相次歸降至十三日當軍水陸俱上經長沙城下邊鎬見其兵勢不敢拒張當夜取東路奔逃至十四日進逵敬真差發五千餘人追襲除鎬先次奔竄外掩殺賊衆五百餘人即日進逵敬真入湖南城安撫軍民訖其東吳嶽州刺史宋德權尚倚孤壘亦聚強兵探知搬下舟船亦無鬬志十月十八日差指揮使蒲公益押戰船五十隻兵士三千人到嶽州城下其宋德權即時城而竄便令蒲公益權主嶽州招撫生衆其潭州上江諸郡邑見差守宰撫安道字可道瀛州景城人天祐中事劉守光為幽州掾歷晉王從事後唐同光中充翰林學士遷中書舍人戶部侍郎明宗入洛纍拜中書侍郎同中書門下平章事封始平郡公末帝嗣位出為同州節度使拜司空晉滅唐又事晉守司空同中書門下平章事加司徒兼侍中進魯國公少帝朝加太尉進燕國公罷為匡國節度使徙鎮威勝契丹滅晉又事契丹為太傅漢祖立又歸漢以太師奉朝請周滅漢又事周廣順初拜太師中書令顯德元年卒年七十三贈尚書令追封瀛王諡文懿維長興元年歲次庚寅四月甲午朔二十五日戊午金紫光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事充太徵宮使宏文館大學士上柱國始平郡開國侯食邑一千五百戶食實封一百戶臣馮道銀青光祿大夫門下侍郎兼吏部尚書同中書門下平章事監修國史判集賢院事上柱國天水郡開國伯食邑七百戶臣趙鳳及文武百官特進太子少傅上柱國酒泉郡開國侯食邑一千戶臣李琪等五千八百九十七人言臣聞天不稱高而體尊地不矜厚而形大厚無不載高無不覆四時行乎內萬物生其間總神祇之靈叶帝王之運日出而星辰自戢龍飛而雷雨皆行元氣和而天下和庶事正而天下正伏惟皇帝陛下天授一德時歷多艱翊太祖以興邦佐先皇而定難拯嗣昭於潞困救德威於燕危遏思遠而全鄴都誅彥章而下梁苑成再造之業由四征之功洎纂鴻圖每敷皇化去內庫而省庖膳出宮人而減伶官輕寶玉之珍卻鷹鸇之貢淳風既洽嘉瑞自臻故登極之前人皆不足改元之後時便有年遐荒旋斃於戎王重譯往來於蠻子東巡而守殷殪北討而王都殲破契丹而燕趙無虞控靈武而沙並復近以饗上元而薦太廟就吉土而配昊天輅己降而雨霑事欲行而月見燔柴禮畢作解恩覃帝命咸均人情普悅非陛下有道有德至聖至明動不疑人靜惟恭己常敦孝禮每納忠言則何以臨御五年澄清四海時久纒於災害民驟見於和平休徵備載於簡編徽號過持於謙讓三年不允衆志皆堅天不以上帝自崇日不以大明自貴於蒸民有惠於元后同符列聖皆然舊章斯在今以明庭百辟列土諸侯中外同辭再三瀝懇臣等不勝大願謹奉玉寶玉册上號曰聖明神武文德孝恭皇帝伏惟皇帝陛下體堯舜之至道法日月於太虛威於夷狄恩及蟲魚奉國者繼加榮寵違天者咸就誅鋤典禮當告成之後夙夜思即位之初千秋萬歲永混車書臣等聞大電繞樞哲后繼犧農之運五星聚井真人啓文景之基昌圖允洽於千年嘉號宜光於載誕不有稱述曷顯休明伏惟皇帝陛下玉律調元金華啓旦上帝錫九齡之夢遒人聞下武之詩德協無為民知有慶當大雨時行之日乃常星不見之辰將歡宇縣之心竊效華封之祝臣等不勝大願望以六月二十七日為啓聖節著於甲令告彼萬方使地角天涯望南山而祝壽九州四海仰北極以傾心誠垂致主之功輒敢稱君之美先以中外同詞華夷叶慶敬尊往制特上徽名天眷未回王言疊降過持謙柄尚拘㣥情將永顯於洪休須再陳於丹素伏惟皇帝陛下中興纘祀下武應期務華去實還浮返朴有聞善必行之聖有無幽不燭之明以神武戡定四方以文德懷柔八極惟恭與孝繼祖承祧臣等考尋帝載奉揚休烈請上尊號曰聖明文武恭孝皇帝約就望而臆談堯德敘聲身而首贊禹謨此際陛下以郊禋未展於泰壇帝饗未修於清廟易水之殘妖未殄江陵之闔境未寧堅違丹赤之誠更待和平之日今則乾坤大定書軌混同北暨幽陵南窮丹徼東踰滄海西越流沙率梯航者願布腹心俟干羽者已陶聲教圜丘報本顯陳燔燎之儀宗祏告虔親奉雲韶之薦而況萬邦胥悅百穀順成天垂上瑞之文人樂繇庚之化雞竿作解鳳紀維新野喧擊壤之歌兵入櫜弓之詠人祇欣合日月重光明哉康哉美矣盛矣臣等生逢景運仰纘丕圖是將億兆之心虔貢再三之請冀茂實永光於圖史徽猷式冠於古今上契天心下從人欲凡厥臣庶恭俟允俞粵以惟帝奉天惟臣奉主就陽展禮一人虔報本之心揆德宏猷萬國切歸尊之願載揚明號思稱洪休瞻旒冕以獻言望昊穹而垂允臣等頓首臣聞德所以誕敷四海名所以馳裕萬邦苟黼藻之頌不傳則就望之容何著故質文迭用賓實相符禮有常尊臣子合遵於舊典功無與讓君親當協於至公伏惟皇帝陛下清明在躬純德受命宏要道於天下暢貞風於域中通達無方淵源不測此所謂聖以合道也外宣百度上法三光銅渾昭乾健之規玉燭朗陽舒之景無幽不燭有感皆通此所謂明以燭遠也至如用姬公之典以御十倫敬孔子之祠以興四教觀書乙夜徇鐸孟春遠服殊鄰王道無偏而蕩蕩親平叛壘天網不漏而恢恢虜帳以是銷魂并土以之脅息此所謂文以興教武以宅功也又若煦嫗萬物昭蘇九圍協天載以無聲恢帝猷而有截涵如東海固比南山此所謂仁以阜成德以順正者也皇帝陛下聖廣造化明均照臨同文班黼黻之章常武蓄雷霆之勢仁兼孝以並率德與道而相權總集衆方光揚茂實臣等不勝大願謹上尊號曰聖明文武仁德皇帝恭惟雍熙之代開泰之朝君臣崇相正之規天地無不交之象書曰一人有慶當皇極之盛隆詩曰萬國作孚在鴻名之遠逮臣等幸逢景運獲事朝廷表端位而列㣥司各承豐澤章至尊而舒盛德敢怠前規瀝懇傾輸望恩俞允臣等聞乾文上布嘗居莫大之尊坤體下凝克闡無疆之道以是發生悠久亭育運行人識元功遂配高明之號世詳陰德爰標博厚之名皆彰得一之靈盡合通三之義帝王繼統古今同符皇風愈至於治平㣥願並虔於將順伏惟聖明神武文德恭孝皇帝陛下乾坤正氣日月並明千年廣出震之期萬乘發承祧之日寬仁大度映惇史於前王儉德淳風契徽猷於太古而自削平多難纂紹洪基視兆庶以如傷致八紘之丕變蠻夷率服稼穡豐登普天揚溢美之聲當寧固持謙之旨夙堅衆志久抑鴻名洎展禮祖宗告虔天地乃從人而降命獲奉册以陳誠紀述聖謨但務屬詞之實申明邦典方諧得理之宜郊祀以來日新其化四年益理九土咸寧惡黨挺妖伏天威而悉殄遠藩效順感帝德以皆來塞外休兵域中無事保深根而固蒂延地久以天長臣等輒據㣥情虔徵故事合增加於徽號免漏略於宸猷伏以道為廣大之宗天布生成之惠仰惟一德宜總二名臣等伏請於尊號內加廣道法天四字庶得彰明典禮若傾翊戴之心輝煥簡編永表雍熙之運竊以樞密使創自前朝置諸近侍其來己久所便尤多頃歲樞密使劉處讓偶屬家艱爰拘喪制既從罷免暫議改更不曾顯降敕文永停使額所願各歸職分豈敢苟避繁難伏請依舊置樞密使臣聞惟睿作聖千年乃契於貞期大德曰生萬國咸思於令節將詮懿號仰慶休辰傾心未出於常名近意有塵於嘉會伏惟皇帝陛下應天順人握圖御宇拯寰瀛於否極俾動植以泰來允符鳴社之祥方顯繞樞之瑞而況斗柄正卯律吹仲春當帝王出震之方是天地同和之月斯辰誕聖衆靈咸歸顧前代而罕同在舊章而宜舉垂諸不朽簡編既溢於徽猷必也正名稱謂須符於景貺伏願以來年二月二十八日為天和節庶夫觴稱萬壽稍申將順之心節配四時永洽好生之德宰臣朝見辭謝在朝堂橫街之南逮至餘官則悉於崇元門內夫表著之列豈可踰之故古先明王必正其位服此實事因偶爾習以為常又入閣禮畢之時㣥官退於門外定班如初俟宣放仗唯翰林學士前任郡守等不隨百辟即時直出二者禮僭序失其使正之臣為河東掌書記時奉使中山過井陘之險懼馬蹶失不敢怠於御轡及至平地謂無足慮遽跌而傷凡蹈危者慮深而獲全居安者患生於所忽此人情之常也余世家宗族本始平長樂二郡歷代之名實具載國史家牒余先自燕亡歸晉事莊宗明宗閔帝清泰帝又事晉高祖皇帝少帝契丹據汴京為戎二主所制自鎮州與文武臣僚馬步將士歸漢朝事高祖皇帝今上顧以久叨祿位備歷難危上顯祖宗下光親戚亡曾祖諱湊纍贈至太傅亡曾祖母崔氏追封梁國太夫人亡祖諱景纍贈至太師亡祖母褚氏追封吳國太夫人亡父諱良建祕書少監致仕纍贈至尚書令亡母張氏追封魏國太夫人余階自將仕郎轉朝議郎朝散大夫朝議大夫銀青光祿大夫金紫光祿大夫特進開府儀同三司職自幽州節度巡官河東節度巡官掌書記再為翰林學士改授端明殿學士集賢殿大學士太微宮使再為宏文館大學士又充諸道鹽鐵轉運使南郊大禮使明宗皇帝晉高祖皇帝山陵使再授定國軍節度同州管內觀察處置等使一為長春宮使又授武勝軍節度使鄧隨均房等州管內觀察處置等使官自攝幽府參軍試大理評事檢校尚書祠部郎中兼侍御史檢校吏部郎中兼御史中丞檢校太尉同中書門下平章事檢校太師兼侍中又授檢校太師兼中書令正官自行臺中書舍人再為戶部侍郎轉兵部侍郎中書侍郎再為門下侍郎刑戶吏尚書右僕射左僕射三為司空兩在中書一守本官又授司徒兼侍中賜私門十六戟又授太尉兼侍中又授戎太傅又授漢太師爵自開國男至開國公魯國公再封秦國公梁國公燕國公齊國公食邑自三百戶至一萬一千戶食實封自一百戶至一千八百戶勳自柱國至上柱國功臣名自經邦致理功臣至守正崇德保邦致理功臣安時處順守義崇靜功臣崇仁保德寧邦翊聖功臣先娶故德州戶掾褚諱濆女早亡後娶故景州弓高縣孫明府諱師禮女纍封蜀國夫人亡長子平自祕書郎授右拾遺工部度支員外郎次子吉自祕書省校書郎膳部金部職方員外郎屯田郎中第三亡子可自祕書省正字授殿中丞工部戶部員外郎第四子幼亡第五子義自祕書郎改授銀青光祿大夫檢校國子祭酒兼御史中丞充定國軍衙內都指揮使職罷改授朝散大夫右春坊太子司議郎授太常丞第六子正自協律郎改授銀青光祿大夫檢校國子祭酒兼御史中丞充定國軍節度使職罷改授朝散大夫太僕丞長女適故兵部崔侍郎諱衍子太僕少卿名絢封萬年縣君三女子早亡二孫幼亡唐長興二年敕瀛州景城縣莊來蘇鄉改為元輔鄉朝漢里改為孝行里雒南莊貫河南府雒陽縣三川鄉靈臺里奉晉天福五年敕三川鄉改為上相鄉靈臺里改為中臺里時守司徒兼侍中又奉八年敕上相鄉改為太尉鄉中臺里改為侍中里時守太尉兼侍中靜思本末慶及存亡蓋自國恩盡從家法承訓誨之旨關教化之源在孝於家忠於國口無不道之言門無不義之貨所願者下不欺於地中不欺於人上不欺於天以三不欺為素賤如是貴如是長如是老如是事親事君事長臨人之道曠蒙天恕纍經難而獲多福曾陷蕃而歸中華非人之謀是天之祐六合之內有幸者百歲之後有歸所無以珠玉含當以時服斂以籧篨葬及擇不食之地而葬焉以不及於古人故祭以特羊戒殺生也當以不害命之物祭無立神道碑以三代墳前不獲立碑故無請諡號以無德故又念自賓佐至王佐及領藩鎮時或有微益於國之事節皆形於公籍所著文章篇詠因多事散失外收拾得者編於家集其間見其志知之者罪之者未知衆寡矣有莊有宅有㣥書有二子可以襲其業於此日五盥日三省尚猶日知其所亡月無忘其所能為子為弟為人臣為師長為夫為父有子有猶子有孫奉身即有餘矣為時乃不足不足者何不能為大君致一統定八方誠有愧於歷職歷官何以答乾坤之施時開一卷時飲一杯食味別聲被色老安於當代耶老而自樂何樂如之時乾祐三年朱明月長樂老序云清泰中道初領鎮之時遍謁廟之際再拜宣聖久立荒祠後臨街而地位窮前逼城而日光少羊觸藩而來者衆豕負途而去者多雨信納汙風知逐臭顧以濫為子弟忝作公侯得富貴而因詩書擁旌旄而輕俎豆何以為漢相何以見魯人遂申如在之誠別卜維新之所乃移於通衢之北在馮翊縣之西龜筮相從官吏相合不煩隧正不擾里胥不妨農不害物畚鍤者楨幹者斧斤者藻繪者一無闕垣墉棟宇榱桷階序門屏一無闕自山龍已降至絺繡一無闕河自海口堯頭舜項之像亦依然其文也布在四方其教也傳於萬代依其教者順而正違其教者逆而邪德與天地齊明與日月等昔賢云自生民以來未有如夫子者也非此心此口而可稱讚時以拙於為政昧於立功民未蘇而責躬廟才成而赴闕別離七縣忽十年今又此來固非所望手持龍節顯奉新恩目覩象環虔瞻舊制於漆沮之地有洙泗之風念伯魚之學詩可知家法想祖龍之焚處自墜皇圖今逢下武之時無失上丁之節公卿沕穆侯伯皆忠將戢干戈永安宗社文武之道邦家之基共分宵旰之憂同保車書之運老夫之幸明神所知謹以崇儒移廟之懇紀於公門南之左時開運三年正月十五日記
