front:
  text: 全唐文欽定全唐文卷八百五十七穎太原人駙馬都尉永德之父纍為藩郡列校由內職歷諸衛將軍晉祖時為壽王重乂莊宅使周廣順初自華州行軍司馬歷郢懷二州刺史遷安州防禦使為部曲所殺
  hash: sha256:2dfb9daf067878152e365d4b0ea594dbc0f3531b5c6ddce8a188d39ea469e4b0
