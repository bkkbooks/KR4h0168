front:
  text: 全唐文欽定全唐文卷一百六十三有功名宏敏避諱以字行國子博士文遠孫舉明經補蒲州司法參軍襲封東莞縣男武后朝累轉司刑少卿改司僕長安二年卒年六十二贈司刑卿中宗立加贈越州都督
  hash: sha256:2920ba7e2febebf7e21246d4c9eb0ceae00b427c3003186d03b33fd0a05564c0
  markers:
  - {type: head, offset: 14, content: 徐有功, id: KR4h0168_NFKB_163-h1, level: 1}
body:
  text: 臣有功言自陛下即位已來海內官員一定而天下選人漸多掌選之曹用舍不平補擬乖次應留即放應放飜留囑請公行顏面罔懼遂使囂謗滿路怨讟盈朝浸以為常殊無媿憚又往屬揚豫搆禍時多逆節鞫訊結斷刑獄至嚴革命以來載祀遽積餘風未殄用法猶深今推鞫者猶行酷法不依律文妄稱異端建立證據構為罪狀捨法用情格律昭然無心遵奉斷事則不依款占不據條章狀表生情法外構理率心任意輕重自由天下稱冤莫不緣此陛下九重嚴祕萬機事總何能一一躬覽事事親詳近臣畏罪而不言大臣重祿而不奉遂令刻薄之吏弊法未悛士子朝臣屏氣累息皆不自保恐墜網羅又陛下所令朝堂受表設匭投狀空有其名竟無其實並不能正直各自防閑延引歲時拖曳來去叫閽不達撾鼓不聞抱恨銜恩吁嗟而已至誠所感和氣必傷豈不由受委任者不副天心是陛下務欲使申其冤是有司務在增重其枉塵垢聖德隱蔽宸聰者是臣等不勝死罪死罪臣今請考選官銓注不平致令在外怨讟者臣即察訪糾而彈之獲其曲狀望貶考奪祿以媿其心罪仍依法其刑獄推斷之官有行酷法妄加詰斷臣即按驗奏而劾之獲其枉狀請即付法斷罪亦準前條奪祿貶考以慙其德其三司受表及理匭申冤使不速與奪致令擁滯有理不為申者亦望準前彈奏貶考奪祿凡在百僚咸蒙委任君臣之際義在無猜寄託之隆無過考選今人監視全無付信徒為證見飜使有詞不知每事委之使臣得搖霜筆其監考選御史望請總停然臣昔處法司緣蒙獨用臣愚無以上答至造願以執法酬恩無縱詭隨不避強禦猛噬鷙擊是臣之分如天恩允臣所奏請降敕施行庶不越旬時亦可以除殘革弊刑措不用天下幸甚踐言踐忠良嗣之子緣其父逆並合絞刑但為敕稱屈法申恩特降非常之霈又言念勞志切惟舊情深特免斲棺之刑寬其籍沒之典兩節皆具特字信知恩是非常父免斲棺之刑子無緣坐之死既寬籍沒之典理絕收錄其家按名例律云因罪人以致罪若罪人遇恩原減亦推罪人原減法又云即緣坐家口雖以配沒罪人得免者亦免斲棺為其父逆因父致其絞刑父既特遇殊恩子便不拘常律踐言等並即不合緣坐處盡錄奏言謀反大逆罪極誅夷殄其族未足以謝愆污其宮寧可以塞責今據餘慶罪狀頗共虺沖交涉為沖理債違敕是情於沖致書在反為驗既屬永昌恩赦在慶罪即合原狀據永昌元年赦曰其與虺貞等同惡徒黨魁首既並伏誅其支黨事未發者特從赦原謹詳魁首兩文在制非無所屬尚書曰殲厥渠魁名例律曰造意為魁首即其帥首乃元謀魁帥首謀已露者既並伏法支派黨與未發者特從原宥有伏誅既標並字足明魁首無遺餘慶赦後被言發覺即為支黨必其慶是魁首當時尋已伏誅若從魁首逃亡亦應登時追捕進則不入伏誅之例退則又異追捕之流將同魁首結刑何人更為支黨况非常之恩千載空遇莫大之罪萬死蒙生豈令支黨之人飜同魁首應坐之伍更入死條嫉惡雖臣子之心好生乃聖人之德今赦而復罪即不如無赦生而又殺則不如無生竊惟聖朝伏當不爾餘慶請依後斷為支黨處流邱勣之弟兄反弟合沒官憑狀以推事迹可驗在於繼結理固難逾羊羔稱投荊河幷作兩箇皁襖假令事實終在赦前况乃涉虛何以為據往時縱犯今日方告准赦據敕不合更推使人為鼎著皁衣將為叛逆曹司以燒卻文狀處以叛謀竊尋此塗頗傷苛酷且衣之五彩隨人好尚武夫一著豈限元黃燒書雖匪赦前推勘須窮窟穴或言周易作道卜書既元拋諸廁中又云鼎自裂破書既著摽便非反書必是反書論何事為是簿帳為是職讖圖竟不甄明遂無承疑即處以斬乃沒其家請更審詳務令允當者赦前縱實合免恩後謀狀未誠不反何為燒書法家無文臆度使人的知是反鞫案何不具言當時撫狀朦朧奏後方便略人命至重一死不可再生王法須平居輕無宜入重恐乖泣辜之惠方虧祝網之慈在愚所窺請更商度者謀危社稷罪人反條自述休徵坐當妖例反依斬法妖從絞論言著成文犯標定狀狀在事難越狀文存理無棄文若違狀以結刑捨文而斷獄則乘馬何俟銜勒遏流豈用隄防今判官處以反謀句司批從妖說不恥下問竊欲當仁李思順解大雲經韋秀稱共竊語私解明非眾說竊語不合人知處實惟出秀辭是非更無佗証縱解三五年少只是自述休徵既異結謀之蹤元非背叛之事即從叛逆籍沒其家便是狀外棄文豈曰文中據狀請依程仁正批妖不眾處流三千里者思徵芳部宣條懷節宕州分竹爰因羌叛奉使討除暫見思徵屏人共語即疑懷節與徵同謀同謀須述謀由共語當論語狀語既無狀謀反無由思徵伏誅一無牽引薛璟陷辟方始告言璟元共徵同情節復與徵連結節當共徵私語語狀在璟合知徵在不知語由徵死誰明反狀寧有比州刺史奉勅討羌白日入州官人參謁暫與思徵相見遂即平章反謀察獄以情未聞此理羌走出界無賊可擊所領之兵更留何用為此放散例將為反節實擬反更須發兵成集之兵何須卻放非謀之狀於此更明懷節據狀無反請差使推鞫無反為發兵遲斷為官當赦總免推之所告反由元於子產處得奉敕勘當且狀是誣付法科繩已斷處斬奏盡臨決恩旨遣停聖上為子產引虛則將奏之枉死但令教告事律者正文告者為首教者為從若其事虛受責推之合當重科如其反實論功子產纔霑薄賞律開此制本防避罪爭功在於憲司固當守文奉法案律謀反者斬處斬本為身存身亡即無斬法緣坐元因處斬無斬豈合相緣緣者是緣罪人因者為因佗犯法已法例是因所緣之人先兦所因之罪合減合減止於徒坐徒坐頻會鴻恩今日卻斷沒官未知據何條例若情狀難捨敕遣戮屍除非此塗理絕言象伏准逆人獨孤敬同柳明肅之輩身先殞歿不許推尋未敢比附敕文但欲見其成例勘當尚猶不許家口寧容沒官元淑里正無得人戶緣祖紛爭因相言告或以反逆相喚或將奔叛相牽反逆須有同謀奔叛寧無叶契無謀天契口語口陳即以實論頗亦以苛酷搶擀元無影響星文李自參差縱使實有反言只恨換其宗姓因恨稱有正是口陳徒侶絕無明非實反賊盜律云口陳欲反之言心無真實之計流三千里疏云口陳欲叛者杖八十准依告狀並是口陳之言原究犯情皆非心實之計忝居商度用此當宜如是使推請從鄙見如將未允終須重推行珪永徽中官華州鄭縣尉臣行珪言臣聞結繩以往書疏薎然文字之初教義斯起記言之史設襃貶之迹聿興書事之官置勸誡之門由啟於是圖版稠疊謨訓昭彰唱讚之道以宏闡揚之理茲暢德業彌縟英華日新雕琢性情振其徽烈逮乎周文作聖鬻子稱賢意合道同實申師傅鬻子以文王降已大啟心期明宣布政之方廣立輔成之策足使萬機留想一代咸休稽古有宗發明耳目尋其著述之旨探其匡救之辭莫不原道心以裁章研神理而啟沃彌綸彞訓經緯區中不徒讚說微言務於遺翰而已鬻熊為諸子之首文王則聖德之宗熊既文王之師書乃政教之體雖篇軸殘缺提舉猶備紀綱譬彼盤盂發揚有愈臣家傳儒素積習忠良覩明主奉師之蹤覽賢者盡義之道循環徵究妙極機神敢率至愚為之注解研覃析理以敘私情翦截浮辭用申狂瞽伏惟陛下則天垂訓越極宣風稽太上之至和興帝王之烱誡股肱諒直獻替無疑大舉賢良寧濟區宇四海革面八表宅心務本修文垂拱無事臣以草萊卑賤識度庸淺荷堯沐舜擊壤謳歌周施政教之端屬聽太平之詠志存綴輯以述矢言簡牘難周辭意斯拙謹以繕寫奉獻闕庭庶日月照明布餘暉於漏隙時雨咸洎灑餘潤於纖枯望希塵露之資豈議沈舟之楫天威咫尺神魄震驚謹上表以聞伏聽慈旨謹言鬻子名熊楚人周文王之師也年九十見文王王曰老矣鬻子曰使臣捕獸逐麋已老矣使臣坐策國事尚少也文王師之著書二十二篇名曰鬻子子者男子之美稱賢不逮聖不以為經用題紀標子因據劉氏九流即道流也遭秦暴亂書記略盡鬻子雖不預焚燒編秩由此殘缺依漢書藝文志雖有六篇今此本乃有十四篇未詳孰是篇或錯亂文多遺闕至敷演大道銓撰明文闡域中之教化論刑德之是非雖卷軸不全而其門可見然鄧林之枝荊山之王君子餘文可得觀矣鬻子博懷道德善謀政事故使周文屈節大聖諮詢情存帝王之道辭多斥救之要理致通遠旨趣恢宏實先達之奧言為諸子之首唱織組仁義經緯家邦垂勸誡之風陳宏濟之術王者覽之可以理國吏者遵之可以從政足使賢者勵志不肖者滌心語曰詩三百一言以蔽之曰思無邪言而不朽可為龜鏡鬻子論道無邪之謂歟幸以休務之隙披閱子史而書籍實繁不能精備至於此子頗復留心尋其立迹之端探其闡教之旨豈如寓言迂恢馳術飛辯者矣亦乃字重千金辭高萬歲聊為注解略起指歸心馳於萬古之上寄懷於千載之下庶垂道見志懸諸日月將來君子幸無忽焉藏器徐州彭城人高宗時為侍御史稍遷比部員外郎監察御史出為宋州司馬卒問易稱議獄書載恤刑人命所繫於茲為重然姬旦制三典之宜蕭何定九章之律漢文除肉刑之科孝景減笞箠之令互相沿革雖復不同志在明威終資慎罰今既道符太古德侔往初化越可封時當刑措專欲道德齊禮纔畫衣冠反樸還淳肌膚不慘復恐隨時之義草艾不足懲其揆事立方赭墨無以防其偽歷代輕重捨用之規幸為陳之何者便俗對結繩以往闕文字而不傳觀跡以來煥圖書而可矚日溫月冷既暢之以陰陽左春右秋亦效之以生殺方之四序取則二儀震雷霆以曜威象天討而明罰至如赭衣艾筆之制用於唐虞之朝劓刖宮割之刑施於夏殷之日既申之以三刺亦放之以五流鄭產鑄書呂侯訓贖秦炊鼎鑊漢調葅醢變三章而制九章減五百而笞二百歷當途而且用涉典午而兼行今德冠往初功高邃古既反直淳之俗還歸仁義之衢解網泣辜惟刑是恤斷而難續夙采緹縈之言議獄緩刑久納溫舒之奏不輕不重非省非繁既合時宜無勞橫議謹對問象五星七宿法壅水勝金是何刑焉深惑其義賣爵緍錢之令越官朝會之律見知腹誹之法直指夏蘭之使不知誰制莫委所由因戲加杖其人絕命解鬬觸刃從子殞躬有若此流將欲何斷夫杖妻面致大辟之科婦搏姑耳從減死之論斯之所決於禮安乎鮑昱泣東海之殺人陳忠縱潁川之請代如其得失亦可聞諸對某聞弧矢以威用刑之迹遂兆雷電皆至折獄之義仍明乃有金朴異儔行乎舜日劓刖殊類施於姬年莫不疏密隨時輕重沿事語其數各有像焉土壅水而不流宮條斯準火勝金而逾墨黥法是依放七宿異節之精實惟臏罰則五星應改之變爰在劓科上郡罹旱孝景復循賣爵南畝不出武帝遂下緡錢越官起自張湯朝會興於趙禹公孫生見知之漸顏異為腹誹之初直指夏蘭之輩出於慘刻之日斯並虐主所行佞臣攸致至若因戲杖而絕命觸鬬刃以兦身既有誤致之由斷取罰金之議妻則為室夫亦稱天雖云杖面詎容大辟良為情疑後主肆其不敬由斯之故方致極刑婦之承姑嚴於子道豈此陵辱以從減論然則鮑昱之科於義失矣仲遠之駁與禮符焉赦子母之情非無高趣縱昆季之代已在前譏謹對問乾靈著象聖人仰則左生右殺天之道也先寬後猛王之度焉何則反魯刪詩下車而誅少正入關約法締構而封雍齒為往迹之浮言為後塗之令則若云刑法不施於淳朴殺戮必用於凋訛則感電前皇不應染刃望雲後帝方示草纓沈吟久之未知孰是至於宜獄宜犴五刑九刑清室黃沙之肇基執秩僕區之創迹墨幪抵罪點服記刑誤法理而揮刀謬刑名而伏劍咸晦胎祖側佇根由方聽安于之言復迓溫舒之奏景慕埋桐之術欣聞觀璧之規欲揆何人得階斯理鍾繇王朗尚且相持叔向鄭僑猶疑競爽度長絜大誰最指南勝躅高蹤何代為是對天道未醨混彼我於非馬上德云失迫聚散於驅雞所以聖照幾先賢圖事始創禮崇敬攸開揖讓之端設法明威用度姦邪之路然則昌戶受歷斬凶殘於鳳墟壽邱馭圖翦姦回於鹿野將銜勒以控奔馬興隄防以給㣥流既繫事以慘舒亦隨時而賞戮遂使仲尼反魯先誅少正高祖入秦遽封雍齒上如黃神攝運丹陵纂歷步驟之軌髣髴殊途亭毒之規依稀一致况乎時屯競逐理便於干戈道泰讓夷義歸於玉帛斯則銅兵玉玦固可舉於軒皇艾服草纓豈謬施於唐帝至於宜獄宜犴詩人因賦以誡時五刑九刑晉臣貽書以訓俗卯金啟漢詔請室以懲姦典午承曹建黃沙而肅物晉疏執秩楚設僕區令尹之調馭長安點服化探丸之子唐侯之光宅天下墨幪致鑿頂之夫法或謬加李離伏劍刑疑濫及勾踐揮刀屬以安于絕簡之詞溫舒緩刑之奏候埋桐以察理擬觀璧以照姦擅彼高蹤雖云可尚自我作古夫復何遠且魏朝御史議駁鍾繇之疎晉室大夫書譴鄭產之醜荷校滅耳迷悔吝於六爻騁轍荒心垂欽恤於三鍰欲允時須議將安屬未若踐咎陶之勝躅詔于公以度長詳彼刑書無溺情於愛惡揣茲心稱不撓法於重輕自然束影還淳並三皇以比迹削彫歸朴並五帝而遐蹤謹對
