body:
  text: 相彼鳶矣亦飛戾天問何能爾風之力焉余因稽於造物知不得於自然原其始也謀及小童徵諸哲匠蔡倫造紙公輸獻狀理纖篾以體成刷丹青而神王殷然而矒彼羽翼邈然而引夫圓吭膺繫纖縷趾續長繩俯劇驂之七達挂高臺之九層形全而和似鬬雞之養紀渻目大不覩若異鵲之在雕陵因所好而毛羽思有遇而騫騰鄙宋都之退鷁慕溟海之摶鵬於是扇以扶搖縱諸寥廓絢練倏閃翕赫忽霍瞬息而上千尋咄嗟而遊大漠翔鶤仰而不逮况青鳥之與黃雀彼都人士瞻佇城隅初指沖天之鶴遠言拂日之烏望有塵埃謂翻形而載斾聽無音響疑避影以銜蘆始回翔於元氣終出入於高衢所以羽翮既成雲霄自致期上騰以奮激何中路之顛墜力不培風勢將控地感魚龍之失水冀蚊虻之附驥比畫虎之非真與芻狗之同棄寧待時而蓄力信因人以成事吁嗟鳶兮適時與我兮相期知我者使我飛浮不知我者謂我拘留啄腐鼠兮非所好嘯茅棟兮增至愁才與不才且異能鳴之雁適人之適將同可狎之鷗我於風兮有待風於我兮焉求幸接飛廉之便因從汗漫之遊當一舉而萬里焉比夫榆枋之鷽鳩者哉延壽世居相州貞觀中纍補太子典膳丞崇賢館學士轉御史臺主簿兼直國史遷符璽郎卒臣聞史官之立其來巳舊執記言必資良直是以典謨載述唐虞之風尤著誥誓斯陳殷周之烈彌顯魯書有作鹿門貽鑒於臧孫晉乘無隱桃園取譏於趙孟斯蓋哲王經國通賢垂範懲誡之方率由茲義逮秦書既煬周籍俱沒子長創制五三畢紀條流且異綱目咸張自斯新以後皆所取則雖左史筆削無乏於時微婉所傳唯稱班范次有陳壽國志亦曰名家並巳見重前修無俟揚榷洎紫氣南浮黃旗東徙時更五代年且三百元熙以前則總歸晉著述之士家數雖多多泛而商略未聞盡善太宗文皇帝神資睿聖天縱英靈爰動沖襟用紓元覽深嗟蕪穢大存刊勒既懸諸日星方傳不朽然北朝自魏以還南朝從宋以降運行迭變時俗汚隆代有載筆人多好事考之篇目史牒不少互陳聞見同異甚多而小説短書易為湮落脫或殘滅求勘無所一則王道得喪朝市貿遷日失其真晦明安取二則至人高迹達士宏規因此無聞可為傷歎三則敗俗巨蠧滔天桀惡書法不記孰為勸奬臣輕生多幸運奉千齡從貞觀以來屢叨史局不揆愚固私為修撰起登魏國元年盡隋義寧三年凡三代二百四十四年兼自東魏天平元年盡齊隆化二年又四十四年行事編為本紀十二卷列傳八十八卷謂之北史又起宋永初元年盡陳真明三年四代一百七十年為本紀十卷列傳七十卷謂之南史凡八代合為二書一百八十卷以擬司馬遷史記就此八代而梁陳齊周隋五書是貞觀中敕撰以十志未奏本猶未出然其書及志始末是臣所修臣既夙懷慕尚又備得尋聞私為抄録一十六年凡所獵略千有餘卷連綴改定止資一手故淹時序迄今方就唯鳩聚遺逸以廣異聞編次別代共為部秩除其冗長捃其菁華若文之所安則因而不改不敢苟以下愚自申管見雖則踈野遠慙先哲於披求所得竊謂詳盡其南史刊勘巳定北史勘校粗了既撰自私門不敢寢默又未經聞奏亦不敢流傳輕用陳聞伏深戰越謹言府君曰先生説卦皆持二端朗曰何謂也府君曰先生每及興亡之際必曰用之以道輔之以賢未可量也是非二端乎朗曰夫象生有定數吉凶有前期變而能通故治亂有可易之理是以君子之於易動則觀其變而玩其占問之而後行考之而後舉欲令天下順時而進知難而退此算所以見重於先王也故曰危者使平易者使傾善人少惡人多暗主衆明君寡堯舜繼禪歷代不逢伊周復辟近古亦絶非運之可變也化之不可行也道悠世促求才實難或有臣而無君或有君而無臣故全之者鮮矣仲尼曰如有用我者吾其為東周乎此有臣而無君也章帝曰堯作大章一夔足矣此有君而無臣也是以文武之業遂淪於仲尼禮樂之美不行於章帝治亂之漸必有厥由而興廢之成終嘆所遇易曰功業見乎變此之謂也何謂無二端府君曰周公定鼎於郟鄏卜世三十卜年八百豈亦二端乎朗曰聖人輔相天地準繩陰陽恢皇綱立人極修策整馭長羅遠羈昭治亂於未然算成敗於無兆固有不易之數不定之期假使庸主守之賊臣犯之終不促巳成之期於未衰之運乎故曰周德雖衰天命未改聖人知明王賢相不可必遇聖謀睿策有時而弊故考之典禮稽之龜策即人事以申天命懸歷數以示將來或巳盛而更衰或過算而不足是故聖人之法可貴也向使明王繼及良佐踵武則當億萬斯年與天無極豈止三十世八百年而巳哉過算餘年者非先王之功即桓文之力也天意人事豈徒然哉府君曰龜策不出聖謀乎朗曰聖謀定將來之基龜策告未來之事遞相表裏安有異同府君曰大哉人謀朗曰人謀所以安天下也夫天下大器也置之安地則安置之危地則危是以平路安車狂夫審乎難覆乘奔馭朽童子知其必危豈有周禮既行歷數不延秦法既立宗祧能踰乎噫天命人事其同歸矣孝孫荊州人隋大業末為王世充弟王辨行臺郎中辨降歸國貞觀六年遷著作佐郎吳王友歷咨議參軍遷太子洗馬未拜卒釋教之為義也大矣哉智識所不能名言視聽所不得聞見馬鳴龍樹宏聖旨於前慧遠道安闡微言於後至於紹高蹤而孤引踵逸軌以遐征誰之謂歟慧淨法師即其人矣法師淳和稟氣川嶽降精神解內融心機外朗髫年對日丱歲參元擢本森梢干雲階乎尺木回瀾渺漫浴日導乎蒙泉而慧炬夙明禪枝早茂臨閲川而軫慮眷定水以怡神彼勞生悟茲常樂三乘奧義渙矣冰消二諦法門怡然理順俄而發軔東夏杖錫西秦至於講肆法筵聆嘉聲而響赴剖疑析滯服高義而景從明鏡屢照而不疲洪鐘待叩而斯應窮涯盈量虛往實歸誠佛法之棟梁僧徒之領袖者也豫昔遊京輦得伸景慕寥寥淨域披雲而見光景落落間居入室而生虛白法師導豫以實際誘豫以真如挹海不知其淺深學山徒仰其峻極嘗以法師敷演之暇商榷翰林若乃園柳天榆之篇阿閣綺窗之詠魏王北上陳思南國嗣宗之賦明月彭澤之摛微雨逮乎顏謝摛藻任沈遒文足以理會八音言諧四始咸遞相祖述鬱為龜鏡豈獨光於曩代而無繼軌者乎近世文人才華間出周武帝震彼雄圖削平漳滏隋高祖韞茲英略龕定江淮混一車書大開學校溫邢譽高於東夏徐庾價重於南荊王司空孤秀一時沈恭子標奇絶代凡此英彥安可闕如自參墟啓祚重光景曜大宏文德道冠前王薖軸之士風趨林壑之賓雲集故能抑揚漢徹孕育曹丕文雅鬱興於茲為盛余雖不敏竊有志焉既而舟壑潛移悼陵谷而遷貿居諸易晚惻人世之難常固請法師暫回清鑒採托詞實耘剪繁蕪蓋君子不常矜莊刪詩未為斯玷自劉廷尉所撰詩苑之後纂而續焉潁川庾幼孫學該墳索行齊顏閔京兆韋山甫耿介有奇節弋獵綜㣥言與法師周旋情逾膠漆覩斯盛事咸共贊成生也有涯庾侯長逝永言怛化不覺流襟頃觀其遺文久為陳迹今亦次乎汗貽諸後昆法師式遵舊章纂斯鴻烈豫聊因暇日敬述芳猷俾郢唱楚謠同管絃而播響春華秋實與天地而長存遂使七貴揖其嘉猷五衆欣其慧識凡預能流家藏一本蘊古相州洹水人自幽州總管府記室直中書省上大寶針以諷擢大理丞以治李孝德獄為權萬紀所劾誅今來古往俯察仰觀惟辟作福為君實難主普天之下處王公之上任土貢其所求具寮陳其所倡是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄固以聖人受命拯溺亨屯歸罪於巳因心於民大明無私照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事出警而入蹕四時調其慘舒三光同其得失故身為之度而聲為之律勿謂無知居高聽卑勿謂何積小就大樂不可極樂極生哀欲不可縱縱欲成災壯九重於內所居不過容膝彼昏不知瑤其臺而瓊其室羅八珍於前所食不過適口惟狂罔念邱其糟而池其酒勿內荒於色勿外荒於禽勿貴難得貨勿聽亡國音內荒伐人性外荒蕩人心難得之貨侈亡國之音淫勿謂我尊而傲賢慢士勿謂我智而拒諫矜巳聞之夏后據饋頻起亦有魏帝牽裾不止安彼反側如春陽秋露巍巍蕩蕩恢漢高大度撫茲庶事如履薄臨深戰戰栗栗用周文小心詩之不識不知書之無偏無黨一彼此於胸臆捐好惡於心想衆棄而後加刑衆悅而後行賞弱其強而治其亂伸其屈而直其枉故曰如衡如石不定物以限物之懸者輕重自見如水如鏡不示物以情物之鑒者妍蚩自生勿渾渾而濁勿皎皎而清勿汶汶而暗勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲縱心乎湛然之域遊神於至道之精扣之者應洪纖而效響酌之者隨深淺而皆盈故曰天之清地之寧王之貞四時不言而代序萬物無為而受成豈知帝力而天下和平吾王撥亂戡以智力民懼其威未懷其德我皇輔運扇以淳風民懷其始未保其終爰述金鏡窮神盡聖使人以心應言以行包括治體抑揚詞令天下為公一人有慶開羅起祝援琴命詩一日二日念茲在茲惟人所召自天祐之諍臣司直敢告前疑挺雍州萬年人高祖平京師署隴西公府祭酒貞觀朝歷吏部黃門侍郎拜御史大夫封扶風縣男貶象州刺史卒年五十八臣聞父母之恩昊天罔極創巨之痛終身何巳今衣冠上族辰日不哭謂為重喪親賓來弔輒不臨舉又閭里細人每有重喪不即發問先造邑社待營辦具乃始發哀至假車乘雇棺槨以榮送葬既葬鄰伍會集相與酣醉名曰出孝夫婦之道王化所基故有三日不息燭不舉樂之感今昏嫁之初雜奏絲竹以窮晏歡官司習俗弗為條禁望一切懲革申明禮憲古之王者富有四海而不朝夕上膳於宗廟者患其禮過也故曰春秋祭祀以時思之至於臣有大功享祿其後子孫率禮潔粢豐盛禴祀蒸嘗四時不輟國家大祫又得配焉所以昭明其勳尊顯其德以勸嗣臣也其禘及時享功臣皆不應預故周禮六功之官皆配大蒸而巳先儒皆以大蒸為祫祭高堂隆庾蔚之等多遵鄭學未有將為時享又漢魏祫祀皆在十月晉朝禮官欲用孟秋殷祭左僕射孔安國啓彈坐免者不一梁初誤禘功臣左丞何佟之駮議武帝允而依行降洎周齊俱遵此禮竊以五年再殷合諸天道一大一小通人雅論小則人臣不預大則兼及有功今禮禘無功臣誠謂禮不可易決渠濁流屬渭清津流亦毒晉靈嘗祟秦播蒲州河東人貞觀初進士授太子校書再遷太子司議郎永徽初拜諫議大夫給事中出為越州都督府長史龍朔三年卒昆季孔懷天倫雖重比於父子性理巳殊生有異室之文死有別宗之義今有高官重爵本蔭唯逮子孫祚土錫圭餘光不及昆季豈有不沾其蔭輒受其辜背禮違情殊為太甚必期反茲春令踵彼秋荼創次骨於道德之辰違深文於措刑之日臣將以為不可儀字遊韶陜州陜人幼度為沙門貞觀初舉進士授宏文館直學士纍遷起居郎高宗朝遷祕書少監加銀青光祿大夫西臺侍郎同東西臺三品許敬宗誣與梁王忠謀逆下獄死中宗時追贈中書令秦州都督楚國公東臺朕儲祉上元嗣膺景祚獵先聖之闕踐至公之道底罰行賞御物同歸房州刺史梁王忠居庶孽之地在髫丱之辰柳奭遂良闕結無忌頻煩進説勸立東朝朕以副宮之位宜遵周道苟非其人不可虛立正以宗臣之寄仰在諸公旦夕勤懇難違其意及正嫡升儲退居列屏樂善之事紊於賓僚窺怨之詞日盈牀第婦女阿劉遠有陳告迹其罪狀蓋非一塗乃偽作過所入關云欲出家逃隱又令急使數詣京師覘候兩宮潛問消息自説妖夢戴通天冠喜形於色以邀非望每召經師祀龍作福畫千菩薩願升本位每於晨夕著婦人衣妄有猜疑云防細作又嗟嘆柳奭稱其為悼傷韓瑗情發於詞朕初見此言疑生怨謗故遣御史大夫闕理及中書官屬相監推鞫證見非虛然其地則人臣親則人子懷姦匿怨一至於斯擢髮論罪良非所喻考之大義應從極罰皇后情在哀矜興言垂涕再三陳請特希全宥朕戚屬之中頻虧國典緬維前載匪往茲子屬懷於此猶深愧歎特宜屈法降為庶人主者施行維顯慶五年歲次庚申某月某朔某日甲子皇帝若曰於戲南紀之津上躔翼軫西浮之路旁帶巴巫信形勝之大澤是英靈之奧府恤隱之寄懿親攸屬頒條之美良翰爰歸左衛大將軍澤州刺史上柱國紀王慎漸天漢而含潤資日觀以摛文藝重三雍道優二陜梁池挺秀燕館趨賢位表銜珠入光蘭錡職華分竹出美棠陰惠以孚聲績斯邵是用命爾為使持節都督荊峽嶽朗等四州諸軍事荊州刺史大將軍上柱國紀王勳封並如故往欽哉夫道德齊禮允布政之化踐孝依仁誠立身之本必宜周旋勿墜雅譽彌高勉修乃職對揚休命可不慎歟維龍朔元年歲次辛酉十月癸亥朔十七日巳卯皇帝若曰夫騰華星苑崇名器於藩維憑暉日御峻寵章於侯服故本枝增蔚鴻緒滋繁而汾陽奧區鎮龍山而控遠冀方腴壤接雁塞而疏疆連率之寄親賢攸屬咨爾洛州牧上柱國周王顯風則開秀器彩靈明識表魏舟之象詞掩漢臺之駕西園孤月委心鏡而齊明小山叢桂偃情田而並烈溫恭夙邵業尚日新棣萼交芬圭璋具美是用命爾為使持節都督並汾箕嵐等四州諸軍事並州刺史牧及勳封並如故爾其克修天爵聿苞地義方資化敷大夏惠漸京陵必宜缺社鳴桴褰帷廣聽懋宣聲績克壯其猷長綏福履光膺顯命可不慎歟維龍朔二年歲次壬戌十二月景戌朔六日辛卯皇帝若曰於戲夫握鏡黃道經邦盛於建侯司契紫宸體國昭於宗翰故乃祚延邳鼎之業歷峻豐社之基惟爾第四子旭輪流景星躔遵源天漢亞重離而接耀承少海而分瀾秀質挺華芳聲金潤天人之望夙彰髫綺大雅之規遽形襁絡幼智該於元表潛識冠於黃中舟象垂風方慙性與封蟻宣譽終謝生知是用命爾為殷王上柱國往欽哉將用齊衡兩獻比迹二南雕藻圭璋粉澤仁義竹池逾浚棣屏增輝受茲茅土可不祇慎維麟德元年歲次甲子正月巳酉朔二十一日巳巳皇帝若曰於戲剪商胙邑寵秩盛於隆周懲秦錫社徽名崇於有漢况乎爵窮五等榮總六條乃茂德之攸升固非賢之罕擇沁州刺史上柱國虢王鳳履局端嚴襟神秀整道光懿戚望重宗維恭慎之心符小言而緝譽虛凝之度包大雅而揚聲體備剛柔藝殫文武騰芳桂巘動貞韻而鏘金寫照荷池響清文而振玉若乃淄源回跨岱址斜臨人被萊風俗兼齊舊布中和之化申惠之風觀政所先建邦斯在是用命王為使持節青州諸軍事青州刺史勳封如故往欽哉王其克邁十倫稽往賢之峻躅勤宣九德蹈前哲之英規絶浮競之津廣真淳之路光昭淑問可不慎歟維麟德元年歲次甲子正月巳酉朔二十二日庚午皇帝若曰於戲列爵開基資連屬而敷化班條馭宇藉蕃衛而裁風是以光闡帝猷發揮人極固宗庶而兼列必親賢而並建鄧州刺史上柱國江王元祥識尚間偉體局貞凝履順而居真沖撝而持物梁臺既啓背淮之裾爰萃燕館載闢發洧之駕相趨甄綜掩於河書精通符於沛易道無糾察政叶寬平包吐茹之奇遞弦韋之用至乃地鄰宗翊俗備於五方壤密洄封潤沾於九里是用命主為使持節鄜州諸軍事鄜州刺史勳封並如故往欽哉懋德惟忠持盈在約思勤躬而景問無弛度以虧名宗正之規邁安常之節祇膺寵命可不慎歟維麟德元年歲次甲子二月巳卯朔九日丁亥皇帝若曰於戲帝子之星憑紫潯而啓耀天孫之嶽峙青路而摛光故慶表裁梧德成觀梓皇跗睿屏聲孚地軸之西儲秀英藩飈偃宸街之北冀州大都督上柱國殷王旭輪金楨挺秀玉穎層敷姿表淹凝符彩間雅淮南之鏡混沖照於髫辰睢陽之藻齊洪輝於綺日緑車就駕朱邸洞開榜道昭英賜田期彥蕙獵清風宣芳於大雅蓋承流日澄華於高義固以聯崇躅於河楚疊茂軌於酆郇是用命爾為單于大都護大都督勳封並如故往欽哉爾其緘訓趨庭兢懷履薄方資威橫雁塞惠漸龍沙光膺朝奬可不慎歟於戲王官用乂弻化佇於丹青宅揆代工成材資於新槱軼紀龍而遐翥排命扈而增官奉玉劍於副車儼金璫於重席使繁斯在問望攸歸咨爾左常侍檢校左相兼行太子右中護上柱國平息縣開國公許圉師箕峯搆勢橫渚派源幹業峻其家風象賢益其門慶神機朗照靈府洞開識宗三篋敏該韋佩列幹雲敷升漢臺而協彩揮毫波偃懸魏帳而均輝習武經文綢繆於丹扆履忠蹈義悱惻於元墀石室蘭房彯華纓而振迹通闈綸閣飛若綬而盱衡揚歷㣥能執鈞伊寄是用命爾為左相勳封如故往欽哉爾其燮諧帝載用著克固之躅恢融王道式茂如仁之規削荼止奬茹茅期於上賞纂先烈而騰懿裕後昆而垂則祗膺朝奬可不慎歟皇帝若曰於戲望重韜鈐藉董戎之戒志齊金石膺禦武之求用闕聞鼙之慮式著銜珠之象惟爾右金吾將軍朔方郡開國公薛孤吳仁志局開爽貞規久濟日契絳官之術宜符玉帳之機賈勇三軍闕折關之效誠輸八陳標斬將之奇功樹績方隅書勳王府出茂於分閫入隆於文戰騰此師訓既穆朝經錫以徽章久疇僉議是用命爾為金吾衛大將軍封如故往欽哉其勵乃忠貞恭茲奬飾祇承寵命可不慎歟皇帝若曰於戲總務文昌司會之名尤重升榮建禮內史之任彌隆自非才氣兼洽聲望允成何自式管榮辱對揚綸爵惟爾大司憲護軍竇元德門烈克彰地華合緒踐中和而立性資文德以含章禮固騰芳儒彌擅寶寵謀動於簪紱令範光於廊廟攝官憲府勵俗而挺嘉猷受委王京匪躬而輸懿績效宣朝任誠著周行申其寬直之規三攝捐益之任是用命爾為兼司元太常伯勳官如故往欽哉爾其供奉彞倫式昭王度勉爾忠正之誠無忝恪共之表納吉之寄可不慎歟
