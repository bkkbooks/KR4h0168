  text: 全唐文欽定全唐文卷一百五十四譽贈華州刺史志誠父官右衛副帥慈汾二州刺史諡曰靜
  hash: sha256:b0a38a5ebf8dca91234321930c84f175c4642108d76b16905ca2d5fb8fef0486
