front:
  text: 全唐文欽定全唐文卷八百八十七徐鉉十
  hash: sha256:eeade8fd529dd1b50f3bd0387695c348c4331d612cdf635d895cdd0ddc410837
body:
  text: 天地之靈氣發為賢人邦家之積慶鍾於公族其或富老成之智促殤子之年感㣥情者自出於天資垂英聲者非由於事業是以蒼舒軫悼於魏祖表行曰哀夏王鍾愛於明皇錫名為一中興在運代有人傑見於岐王矣王諱仲宣今上之第二子也文武儲慶日月輸祥實太妣之子如魯桓之貴天資秀發神機內融亦既免懷未遑就傅問安長樂視膳寢門承歡愛於瑤齋極友悌於朱邸成人之量宛由生知三嵗受封為宣城郡公假大司馬之秩維城之望日以光矣不幸遘疾甲子嵗冬十月二日薨於閣內年四嵗主上痛幼敏之異極天慈之懷詔輟朝七日册贈司徒追封岐王既而感上聖之忘情遵先王之從儉節哀簡禮以厚古風即以其月十有八日備鹵簿鼓吹葬於江寧府某縣某里之原有司諡曰懷獻禮也惟王以襁褓之年蘊金玉之度異迹昭灼可得而言至於禁中娛侍常在左右或異宮一日則思戀通宵翌旦未明必親至御幄須奉顏色然後即安其孝也如此上每罷朝稍晏莊色未回王則儼然侍立不妄言笑須天顏悅懌則趨就膝下怡怡稚戲不失其儀中宮以上之鍾愛恐漸於驕故撫字之方威克於愛每加教訓過於嚴厲而王凜然祗畏初不壞容退或見上乃啼而自悔其敬也如此始二嵗上親授以孝經雜言雖未盡識其字而每至發端止句之處皆默記不忘至於寢疾近數千言矣時聽奏樂必振袂擊節咸中律度工人試中變其曲王輟止之曰非前曲也雖周郎之顧何以加焉其慧也如此受封之日見於內殿音詞宣朗容止間習觀之者咸歎重焉其敏也如此凡玩好之物意有欲者瞬目賞譽未嘗求索或識其意持以與之必再三推却不肯即受其毅也如此上曰昔人謂王績為神仙童子今此兒近是乎及其薨也悼念之甚曰吾見他人賢子弟猶惜之豈惟父子之性乎中宮哀慟至於加疾自非英姿感動孰能臻此哉議者以為列宿淪精高真降迹表瑞王室今復還矣嗚呼凡我臣庶暨乎藩戚瞻飛蓋之何期慨神理之難測寧盡美於稱讚庶騰芳於簡册詞臣奉詔謹勒貞石其銘曰粵我仙源流光慶延公族之異惟王生焉禮詩仁孝斯之謂賢夙昔非學生知自天既與之智胡奪其年瞻庭蘭刈顧掌珠捐孟冬寒氣京兆新阡鼓吹蕭蕭旌旐翩翩踠逸躅於稚齒閟藩房於夜泉已焉哉庶彭殤之一夢豈沒世之無傳嗚呼庭蘭伊何方春而零掌珠伊何在玩而傾珠沈媚澤蘭隕芳馨人猶沮恨我若為情蕭蕭極野寂寂重扃與子長訣揮涕吞聲噫嘻哀哉又銘一首至尊所作上省庭蘭掌珠之句謂得比興之實遂廣其意發為斯文親迂宸翰批於紙尾足以厚君親之義行慈孝之風是用勒石永光泉戶謹記太嵗癸卯五月十有九日大行皇帝諸妃平昌郡君沒於大內之別院享年四十有三嗚呼哀哉昔天保未定大東啓其疆魯道有蕩三桓紀其政實始孟氏代為強宗德厚流光之符祥發慶膺之效宜乎來裔生此淑人曾祖某祖造父及皆以含道居貞遁世無悶克家垂訓式永門風郡君麗窈窕之容秉肅雍之德遊依漢水氣兆河間乃膺八月之求入預良家之選璧門受職彤管服勤恭順之心奉坤儀而得禮明惠之智導宮教而無遺爰屬造邦遂崇封邑路寢之後柔芳載揚既而千載上仙宮車晏駕號遺弓於萬國感餘香於九御沈哀共極美疹獨縈不延幽穸之期重惻上宮之念嗚呼哀哉即以其年六月日葬於江寧縣安德鄉德信里之原禮也青烏既吉覆斧斯營永光烈女之風盡紀他山之石詞臣奉詔謹勒銘云杳杳平野蕭蕭一邱原松積靄隴吹臨秋吁嗟淑女於此藏舟委貞質兮厚夜奉靈駕兮仙遊惟惇史兮未泯豈餘芳兮不休嗚呼哀哉天子建內官必先令德九嬪掌婦學以教六宮是故壼則成風漢濱流化者矣昭容吉氏麗瑤姬之質富班女之文治絲枲以服勤宮功有序徹粢盛以舉職祀禮無愆用能妙簡皇心光膺盛典頃錫粉田之賦因開左輔之封嗣服之初日不暇給視月卿而命秩近正朝恩閲逝水以成川俄悲異物春秋三十有三保大三年秋七月二日薨於別宮皇帝悼之廢朝一日遣奠之禮有加等焉即以其年月日葬於上元縣龍城鄉之原禮也昭容諱某字某東海胊山人也曾祖徵朗州龍陽縣令祖黨壽陽縣令父彥輝海州懷仁縣令咸膺鄉里之選屈從州縣之勞有利物之能不享其位垂積善之慶克茂其宗著籍金門移家戚里昭映惇史不其美歟詞臣奉旨式揚懿德庶使高深自改長延丹砌之恩金石無虧仰慰璧臺之念其詞曰吉甫作頌穆如清風儲慶炳靈實生昭容史曰明智詩云肅雍內職以理柔芳有融閲川宵奔然膏曉滅西陸移景涼風殺節虞殯流聲遣車成列苕華不磨蘭菊無絶夫人太原祁人也因官徙籍遂居豫章自緱嶺肇基晉陽錫壤光靈繁祉蔚為大宗圭組簪纓與世升降聖歷中否我亦不彰故祖考某皆蘊道居貞流謙育德夫人有金玉之質桃李之姿柔順睦姻以奉慈訓組紃織紝聿勵家風宗族里閭莫不稱美先公司徒纘戎嗣服實臨我邦夫人誕昭四德之華用光九女之選門內之理實皆聽之家人尚嚴婦道貴順主饋以敬均養以慈契濶夷險始終若一邦君內則皆取正焉嗚呼昊天不庸路寢即順夫人棘心蓬首實由舊章素尚空元益所明習常齋居晏處諷誦真文雖祁寒盛暑未嘗廢也又以恭儉孝悌文學道義訓勵子弟皆成其名保大年詔封太原縣太君從子貴也二子長曰懷建由校書郎歷東府掾以㣥從百口家於豫章於是辭祿公朝歸綜司政因除洪州都督府司馬次曰蒨以屬詞敦行從事戚藩纍登臺郎為集賢殿學士會中令齊王避親讓寵受鉞臨川朝廷慎選英僚以光幕府除撫州觀察判官檢校屯田郎中既拜而夫人疾亟交泰元年春二月十八日卒於京師嘉瑞坊之官舍享年七十有五即以某年月日歸葬於洪州某縣某里之原禮也嗚呼富壽戩穀天所以祐善也金石銘撰世所以垂範也二者無愧可謂賢哉鉉早奉世親晚連姻好景行懿德敢用直書其銘曰緱山不傾清淮不湮故我王氏實生令人衛姬之智孟母之仁光裕祖禰垂慶來雲西山之陽章江之濱靈仙攸宅松檟相因遐壽歸全以反吾真夫人麗窈窕之容蘊幽間之德孝敬肇於天性明惠本於生知光乎六姻是謂賢女初我大父殷考遇皆立功興運蔚為將臣婚姻之盛冠彼當代故夫人既筓歸於我府君君諱承進壽州節度使相國公之第三子也二族斯睦百兩是將婦禮之嚴家道爰正府君性踈直喜賓客理劇如簡不以世務嬰心行已取適不以家財為重鐘鼎之族化為簞瓢夫人雅性冥符怡然自足慈和待物恭儉飭躬子孫以之而克家僕御以之而服教及罹蓬首之痛誓全柏舟之節柔芬方遠景命不融春秋四十有九戊午夏六月某日終於京師濱江坊里第子某等俯就成制號奉靈輀即以某年月日葬於某鄉祔府君之塋禮也鉉幸參諸壻獲從外姻載陳執紼之儀仍奉懷鉛之託敢書懿範以鏤貞珉其詞曰嗟淑女兮仁慈肅雍伊君子兮亮簡踈通合二姓兮五侯之宗垂內則兮素士之風悲秋霜與冬霰摧女蘿與青松念光塵之倏忽獨天長兮無窮夫人諱某字某其先太原人故左司郎中贈太府卿諱潛之孫今太弟洗馬裔之第三女也伯仲世父皆踐歷臺閣抑揚聲實相糾以孝相高以讓芝蘭桃李閨庭粲然夫人襲圭組之英發為秀色鍾姻睦之氣凝為淑性柔而有則愛而不驕紃組之工翰墨之妙稟自天性能必過人及長歸於李君君名俯故楚州刺史諱承嗣之孫今禮部尚書度之少子也舅甥之親齊魯之匹好合之美潘楊之風夫人移天睦族率由典禮不恃舊以廢職不矜能以怠敬門內之理清芬穆然嗚呼嚴霜春零蕣華朝墜享年二十有五某年月日卒於京師某里之寓居二族悲慟六姻悽愴仁而不壽古則有之以其年某月日葬於江寧縣某鄉里之原禮也東海徐鉉以世親之舊實維私之敬執紼永悼列石為銘銘曰天之命兮不可知生此賢女兮鍾淑姿嬪於盛族兮昭令儀與之才兮不與之壽永凋落兮芳時儼黼翣道靈輀小江村兮長江湄千秋萬代兮草離離空餘初月如蛾眉夫人諱畹字國香其先太原人今為廬江人也祖潛左司郎中贈太府卿考坦禮部郎中皆以貞幹純懿見稱於時夫人麗窈窕之容秉明慧之性幼失所恃事繼親以孝聞在家不違於姆師移天不失於婦順初先姑之治家也嚴而有惠通而得禮夫人觀刑稟教莫不率循故三十餘年門風家法凜然如舊性尚靜退不樂世喧始愚之在要職也夫人憂形於色及其居貶所反欣然忘貧此其所以為異也雖門族素盛而世途多故祿賜所入賙給無遺豐約同之親踈如一至於浣濯之儉組紃之勤蘩藻盡敬儒元勵操環佩中節始終不渝少善秦聲長亦捨棄每晨興誦五千言而已享年五十戊辰嵗八月一日終於京師舜澤里之官舍其年十月二十三日歸窆於西山洪崖鄉鸞岡里從先姑大塋禮也有子曰夷直女曰神華林華嗚呼愚常以體道委命為懷而情之所鍾不知其慟銜涕秉筆庶不泯其聲塵焉銘曰緱嶺之靈生此淑人洪崖之濱寄此新墳生與道俱沒與仙鄰悠悠精爽豈或為塵嗚呼吾信積善之必爾故攄恨於斯文曾祖某不仕祖浤邠州宣祿縣令考修成都府戶曹參軍京兆府萬年縣洪固鄉曹貴里常夢錫字孟圖年六十一嵗公宇量恢宏識度寬廣質重有氣博學多聞初舉秀才值世亂不克隨計西州㣥后羔雁交辟纍為秦隴諸郡判官岐王茂貞據有扶風傳國二世承制除公寶雞縣令兼監察御史是時京洛屢變幕府驟更公審擇木之所宜乃瞻烏而來止烈祖肇基王業物色異人得公甚喜授大理司直今上初秉機務慎求賓從公實預焉允塞時望既受禪選殿中侍御史改禮部員外郎寓直中書預聞機密周慎詳敏冠於當時烈祖深器之擢拜給事中封駮奏議無所顧憚由是始為當塗者所疾今上嗣位恩禮甚優公以發號之初四海瞻望幾微所慎宜在斯時盡規極言如恐不及於是大忤權貴貶佐池州明年徵為戶部郎中復拜給事中仍充翰林學士知貢舉天子以典司詔命最宜親密乃別置宣正院於內庭以先朝選授公為稱職俾以內任專掌是司秋霜之操嵗寒不易凡敢言之士皆依賴焉甲辰嵗諫臣皆貶公亦罷院事公深惟君臣之義思全進退之禮稍儲伏臘將卜優遊又除吏部侍郎領御史臺事上復置文理院為司聰之寄以公為文理院學士承旨公以椒蘭不雜絳灌方隆從容中道守正而已明年以疾固辭乃遷戶部尚書領商州刺史上以公問望夙重足以坐鎮雅俗強起令知省事而病久不覆公私廢失為宰相所劾坐貶饒州上以羸瘵憂之詔留東都以便醫藥踰年小愈徵為吏部侍郎翰林學士改禮部尚書戊午嵗冬十一月方與客談奄然而逝主上念藩邸之舊追亮直之誠罷朝悲悼贈送優渥以嗣子方幼詔中使監護其喪惟公誠純性剛文高學富詞賦典麗而執筆甚稀名理精核而吐論甚簡多識故事洞明政體自升元中至保大之初便蕃密勿有犯無隱門絶私謁出則詭辭獨見先覺邈然靡及政先古義而時方尚權論舉大體而人工捷給彼衆我寡故不能克主恩方重莫果歸田之心世路未夷竟鬱濟時之用恥為狷介之行以邀皎察之名畜伎樂飲醇酒怡然自得聊以卒嵗啓手足之際無呻呫之聲古之達者正當此耳丕以名法之學獲選邱門固非良史之才曷記賢人之德庶為實録以俟易名謹狀此文與門生樹丕作維顯德六年太嵗己未九月癸卯朔四日丙午文獻太子薨於東宮延春殿以其年十有二月壬申朔十三日甲申遷座於文園禮也象輅差階龍樓向曙肅仗衛以將引儼樽罍而不御主上感深守器念極賓天痛玉符之靡召悲銀榜之空懸詔下臣於信史載盛德於瑤篇其詞曰於昭我唐誕受帝祉舊邦維新令問不已亦有積慶載生賢嗣平王之孫吾君之子越在綺紈芳若蘭蓀緑車表慶寶玉疏恩東平錫壤南昌啓藩耉老咨訪邱墳討論文以行禮時然後言敬愛表於天性信厚由於自然運屬重熙地惟明兩古尚達節吾先德讓剖符分陝居東作相封燕禮縟副戎業廣績著保釐道高寅亮敬亭南屏浙水東馳是惟關輔以衛京師乃移節鉞建此藩維擇其令典導以由儀仁薰俗厚化洽風隨國步中艱文身怙亂鎮以高臥制之長算取彼鯨鯢戮為京觀吳門載同輿詞協從天之眷命我豈矜功乃正皇統斯惟至公爰撫軍而監國亦納揆而登庸業彌盛而學彌廣望益高而禮益恭不言而信有感則通多壘以之而罷警四門以之而除凶反淳和於國儉致符瑞於年豐天亦難諶胡寧不惠枉矢流蒼震之野火耀奄前星之次捨內豎之問安進浮邱而把袂九重增慟萬邦銜涕冥茫少海之波寂歷洊雷之肆嗚呼哀哉感神飇之遠至嘆芳嵗之云徂違太學之齒胄啓佳城而下居建采章於綢練儼備物於塗芻經武帳之峛崺據青龍之鬱紆嗚呼哀哉苦霧閉塗窮陰殺節重雲之旭日如晦大壑之層冰似雪指京口而不臨背都門而永訣萬目愁而斾旌慘㣥心感而笳簫咽嗚呼哀哉瞻榣山之落木聽元圃之回風臺思子以何極宮長男而遂空集荊門之故吏會商嶺之悲翁淚淋浪而灑袂氣怨結而盈胸嗚呼哀哉歷邃古以遐觀考令猷於三善孰仁孝之昭著復功名之丕顯惟筆史與氓頌配長天而日遠寧騁麗於東田豈較能於文選嗚呼哀哉維年月日天策上將軍太師尚書令臨川牧齊王薨於臨川府之正寢主上追先皇付託之意表叔父遜讓之風乃下明詔册贈太弟即以其年十一月日葬於江州某縣某鄉廬山之原從理命也綃幕夕陳虞歌曉引改兔園之賓館設龍樓之梐楯閴靈儀以愈遠窮哀端而靡盡愴永恨於宸襟俾誕揚於令問其詞曰皇天眷佑錫唐良輔時惟宗英裔自文祖孝悌敦慤機神穎悟昔在中興爰當就傅申畫宛水錫茲茅土德望日躋邦家是毗鉤陳宿衛宮籥攸司於惟淮甸實始皇基導之以禮董之以威俗賦甘棠之頌人歌樂職之詩運屬繼明業隆二聖首輯瑞玉來參大政乃為左相其班上台乃封夏口其賦千乘赫矣元后蒸哉古風不私其子天下為公並命叔仲奮茲顯庸或踐我舊藩或陟爾青宮辭不獲命處之益恭晉鄭之勛推而更融臧札之操久而彌崇若泰伯之讓異周公之東京江汝水旄節從容皇統既正靈符允答國步清謐㣥生欣洽復大道於三台永文昭於萬葉越我嗣君尊尊親親極以呂望之高位崇以貞觀之舊稱賜書不詔贊拜不名曰豫小子實繄叔父維藩維翰宗社之故永錫難老日新王度謂天蓋高命亦靡常台階隕宿河月沈光慟東堂之哀臨輟南國之舂相與聖賢而共歎獨天地之何長嗚呼哀哉知生若寄臨凶闕奢於蜃炭舉士庶而均哀頌聲猷於無間嗚呼哀哉歸虎節於王府靡鸞旌於雉門間西園之風月慘緱嶺之煙雲象輅回兮遵塗遠歸帷整兮逝水奔賓友散兮霰雪積巾箱故兮經籍殘嗚呼哀哉身歿壤存道悠運促贈今日之典册閟當年之寶玉全大義以經國激清風而被俗昭遺烈於千齡寄元堂於陵谷嗚呼哀哉維年月日嗣國主臣某再拜稽首言臣聞體厚德而毋萬物存乎尊位騰耿光而蕃百世繫乎鴻名繼統廣業莫斯為重顧惟小子懼忝貽謀對越祖宗敢揚公議伏惟大行聖尊后薑任顯族皇英茂德作合元聖長發祥符秉婦禮於儲闈正嬪則於四海孝心天賦惠問川流祚啓重熙尊歸理內率循陰教欽若皇猷順承利坤元之貞輔佐流周南之化慈撫公族仁懷六宮清淨廣於真風戒慎刑於外戚用能永錫繁祉宏濟多難保佑沖人克荷丕緒某仰繄慈訓方恢景福靈臺告祲永樂長違罔極之懷觸緒荒殞恭惟尊名節惠之典載考儒臣禮官之稱咸以為光大孝悌之懿肅雍賢德之盛昭映前烈垂示無窮列辟承式弗敢失墜謹奉玉册琮寶上尊諡曰光穆皇后伏惟威靈如在鑒茲縟禮延九廟之積慶與二儀而長存嗚呼哀哉謹言臣以寡昧叨嗣慶基對越上元申養長樂側身恭己靡敢荒寧而聖尊后自夏秋已來寢膳違豫醫藥備竭禱祠必至數月於是有加無瘳憂勞之誠不知所措敢陳蠲潔仰告威靈伏惟精懇上通元恩錫佑哀臣烏鳥之志憫臣欒棘之心使六氣惟和百祥薦降冀於旦夕速就康寧臣內顧眇躬弗明於道方深慈訓之益欲報劬勞之恩蒸蒸之懷區區於是隳瀝肝膽以俟鑒臨稽古靈命造圖伊始聖人既生萬物咸理元功格而高謝令問垂而不已通玉帛於無外執豆籩而萃止蓋百代之不易言皇猷之至美恭惟盛德乃聖乃神爰初纘服舊邦維新瞻顧函夏實始經綸三驅示禮四載彌勤濟之以武守之以文降鑒回慮全國庇民既戢兵而禁暴或服義以歸仁功成理定返朴還淳㣥賢在位百度惟貞方將致宣王之薄伐焚老上之龍庭還師衽席檢玉云亭何祝壽之無感忽綴衣之在辰嗚呼哀哉神祔軒邱化流南國率感義以孺慕共銜哀而腷臆日月以之匿曜煙雲為之改色痛輯瑞之長違恨攀髯而不得嗚呼哀哉永惟下國獲嗣餘基奉天光而不早順文告以何遲仰霆電之震以警其失賴陽春之澤以赦其迷既賓禮之加厚亦恩情之過私大信有千齡之固承歡無再稔之期覽訃書而慟絶捧遺賜以漣洏嗚呼哀哉集同軌於七月遏八音於四海喬山之冠劍長掩灞涘之川源不改敢薦忠信敬陳脯醢庶有感而必通願降神而如在粵惟上天降鑒我李文昭武穆神孫孝子赫矣謨訓昭哉圖史以濟時屯以永千祀恭惟盛烈仰屬尊靈惟精惟一克長克君有信厚之風以睦公族有孝敬之德以奉天經避寵崇讓以正流俗主留分陜以樹風聲惠下之政為民慈父平戎之際為國長城聳多士之耳目煥萬古之丹青儲闈既正鴻猷允塞雖主器而納揆更承顏而養德四海無波百官成式光昭興運允答靈心宗祊之所託者重蒼生之所望者深何國步之已泰忽神儀之永沈陽光為之而晝晦萬籟為之而哀吟惟恩信之所洽孰憂傷之可任某等迹備三千義深凡百或選自朝廷或仰由推擇或方列於宮府或常陪於賓席分曹著位有先後之差辱顧推誠無高卑之隔徒嵗月以滋深愧涓塵之靡益今也徒御分散軒墀閴寂摧傷於望苑之前慟絶於華池之側實邦家之不幸豈臣吏之空惜嗚呼哀哉寢園斯啓遠日將從儼象輅以帷白建鸞旗而旐紅聽寂歷以無覩視杳冥而遂空撫躬弔影涕雨號風敢寓誠於籩豆庶寫恨於心胸願賓天之下降鑒永慕之無窮嗚呼哀哉尚饗維年月日廣平遊簡言隴西李貽業清海張緯東海徐鉉謹以清酌庶羞之奠敬祭於故翰林學士江公君章之靈眇眇元造茫茫萬有若明若晦為夭為壽顏子不幸仲宣無後豈同概之能量實令名之不朽惟公之生俊德高名一日千里三頃五城乃邦之彥乃時之英藹然臺閣存此風聲惟公之沒音容倏忽二子繼夭高堂結髮有女垂髫摧心裂骨門館秋風階庭夜月哀從中來云誰能遏簡言固陋夙奉光塵廟朝之舊豈無他人西垣並入禁署相因二十年中心同道親曾無間隟靡或緇磷貽業不才依仁仰德晚獲同舍因成近戚形忘纍遣情深分密杯酒痛飲光陰一擲豈料歡遊遽分今昔緯在三川論交早年才力工拙詞場後先與之聲價借以騰騫徒欣踐迹敢曰差肩他鄉胥會舊分依然倍成感嘆轉奉周旋鉉實後生幸為同族聯事之好友于之睦以道相許以義相勗官路迍邅天涯遣逐千里關山他鄉心曲自帝里連歸周行並復稅駕未安捨我何速嗚呼君章魂遊何方非巫陽之可招非祖洲之可望平時笑語舊日顛狂何夢覺之不識何悲歡之不常惟四友之分義成終天之感傷雖山公之無託豈延陵之可忘有肴在御有酒盈觴死生之會終於此堂願公如在來為我嘗長號有慟迸淚無行薄奠云畢哀情未央嗚呼哀哉尚饗維開寶三年太嵗庚午九月己亥朔七日乙巳東海徐鉉謹以清酌庶羞之奠昭祭於故中書侍郎贈相國昌黎韓公之靈天佑下民必生賢人數有治亂道或亨屯君子處之全名保真窮不易節達不私身嗚呼明公與道為鄰其本也忠其動也仁折而不撓屈而能伸懋此成績揚於王庭名聞天下道合明君宜若張公上應台星宜如衛武享茲百齡如何不淑與世同塵城郢遺忠感深紫宸黔婁之衾賜從御府季子之印佩入泉扃知與不知孰無悲辛嗚呼哀哉某惟不佞早奉光容傾蓋之交繾綣相從公之知我如我知公何義不協何言不同寧懼觸鱗之忤豈防羸角之凶先號後笑無初有終霰雪既消陽光乃融海郡山城幾憐煦沫南宮西掖近見摶風豈主恩之可報幸吾道之非窮今也嵗月遒邁悲歡一空平生氣宇夙昔心胸極視聽而無所與造化而冥蒙露泫門柳霜凋井桐物感於外悲來自中生芻表德絮酒申恭願貞魂之降鑒庶丹懇以斯通維年月日朝議郎行祕書省祕書郎直門下徐鉉謹以庶羞之奠昭告於故郎中丈人之靈惟公立身行己之規理職奉公之節聞於士友著在官司今以銜悲豈容繁述伏思頃嵗獨奉深知獲承子妻之道追序通家之舊雍和二族出入十年情不間於初終義實敦於骨肉去嵗天恩舉善右掖登賢幸以王事僅同省垣不隔陪侍靡違於旦夕興居常在於見聞雖無光益之期且慰因依之望豈謂悲歡迭代光景須臾才周旬嵗之間奄搆終天之痛追攀靡及哀慕何窮嗚呼哀哉昨聞訃之初方當臥病不得親臨易簀躬奉遺言徒掩淚於漳濱但痛心於夜壑嗚呼哀哉家存餘慶念屬帝心有後之期自符公議不孤之任豈在他人嗚呼哀哉故國方遙良時未卜王畿寓殯遠日將臨霧昏而丹旐悠揚日落而繐帷蕭索涼風助慘行路同悲瞻望靈筵酸辛無地敬陳薄奠少道深懷髣佛明靈一賜臨降尚饗惟靈氣稟沖和志推廉潔白璧蘊孚尹之美朱絃含清越之音操行純深性克全於天爵襟懷宏遠譽早播於人龍頃自奮迹清朝策名近侍既保後凋之節終諧貞退之心道因損而益光名以謙而更著優遊自得忠孝歸全求之古人我復何愧某等幸承事舊况預姻連眷分過私襟期莫逆歷嵗時而彌固經夷險而不回挹淡水以無厭仰高山而何極今則佳城將啓遠日有期光容有隔於重泉盞斚聊申於薄奠仰惟貞魄俯鑒丹誠尚饗
