front:
  text: 全唐文欽定全唐文卷八百九十八鶚南康人唐末舉進士事吳越武肅王
  hash: sha256:f18e5b8445922ff2dac8769010f852112cf7ca88b5f9d442b0dacee83ff2a692
  markers:
  - {type: head, offset: 14, content: 謝鶚, id: KR4h0168_NFKB_898-h1, level: 1}
body:
  text: 府君諱行先字蘊之吳郡人也曾祖憑皇不仕祖真皇不仕父敬端皇不仕妣陳留阮氏太夫人揚名立身光於祖宗者惟府君耳府君少親戎律長習武經有摧鋒破敵之堅蘊戡難濟時之策猿臂燕頷完備將才始隸職於建寧都從高公彥所在征討纍有功績尋高太傅分符霅渚府君亦隨於治所太傅用為心膂或鄰境有寇總握兵柄仗劍前驅無不望風瓦解減竈之謀投醪之義備盡其妙以是聞於聖聽謺被寵嘉荐歷珥貂纍升八座益為霅守所重自渤海公厭世高澧亂行府君奮臂一呼率衆歸國時天下都元帥吳越國王親統全師撫寧郡縣以有功者宜加爵賞遂封協力勤王功臣尋封佐正匡國功臣加封右僕射仍委之靜海劇鎮府君之屯細柳也鉏耰荊棘版築城壘不日而就不恃其寵不勞於民卒乘輯睦鎮縣和同商農工賈不改其業親載耒耜遍植桑麻以備祗奉使臣供承南北十五年內外無間言蓋恩威並行寬猛得所矣以寶大元年夏四月得疾弗興至秋七月二十三日終於靜海鎮之官舍享年七十有二府君娶汝南周氏隴西彭氏清河張氏三夫人皆肅雍和鳴內外婉順主喪祭者惟彭氏張氏居其右焉有子八人長曰從訓耽味雲泉不樂仕宦侍膳於周氏之側次曰智銘在方袍之下次曰元晟節度使正散將為人溫恭尢尚儒雅娶諸暨鎮遏使楚牧韓章司徒愛女次曰元杲節度正散將銀青光祿大夫檢校太子賓客兼監察御史狀貌瑰偉智略出衆識量宏博不拘小節親族間咸曰有父風娶聞人氏次曰元升節度闕將獷悍好勇直將軍之器娶鄭氏次曰元寶娶章氏次曰元勝元贇未娶皆堂堂之軀或親弓馬或閲詩書分掌家事無不幹濟女三人長適潁川氏西都軍將都知兵馬使明川羅闕使陳師靖僕射之子某先府君逝次適清河氏建寧都虞候張全尚書之子某次適上亭鎮遏使翁錫尚書之孫節度討擊使上亭鎮遏將元昉之子繼貞弟三人行存行勤行忠初府君之寢疾也殿下遣中使三賜湯藥及啓手足命侍臣持祭奠厚加賻贈內外親戚莫不感泣有以見君親之道始終兩全矣明州都侯太傅奠贈尢異焉府君世墓在湖州烏程縣不克歸葬續致桑梓在開元府海鹽縣以其年嵗次甲申十一月乙未朔六日庚子厝於本縣德政鄉通福里澉墅村之原禮也鶚與府君幸同王事備熟德美洎有葬日令子元晟元杲泣血而拜請豫撰銘志堅免不從遂命筆聊紀年代安敢飾詞乃托實而為志銘曰挺生英特邈爾奇形素蘊豹略能精武經戈鋋再舉氛祲廓清從茲勇冠大播家聲盛績既彰威名遂振靜守謙敬動知逆順惟此侯王賞其忠信不有殊功疇遷劇鎮匡吳志大佐越功全一人注意百辟推賢方務剖竹宜分重權孰謂梁木俄題逝川生作忠臣沒留遺策眷彼令嗣恭承帝澤丹旐斯引元宮已闢萬嵗千秋芳塵永隔瑗事吳越武肅王錢鏐纍官至司空出鎮華亭執伎以事嚴師為難束修既行誨訓無倦惟庚業茲曲藝就彼師資隅際摳衣已稱弟子席間函丈須稟先生妄有燕朋之詞而違成例之訴以算非伎斯為妄矣在三如一其若是乎既虧北面之禮須受西鄰之責光業字文通世為襄陽竟陵人父日休唐末為蘇州軍事判官遂家焉吳越武肅王辟置幕府纍署浙西節度推官天寶九年使梁梁特賜光業進士及第仍賜祕書郎授右補闕內供奉使還兼兩浙觀察使文穆王襲位命知東府事天福二年國建拜丞相八年卒年六十七諡貞敬粵以唐長興三載壬辰春季蓂凋十三莢天下兵馬都元帥尚父守尚書令吳越國王棄捐宮館以是嵗明宗皇帝降太常博士段容定諡議曰武肅詔尚書工部侍郎楊凝式撰神道碑文宣翰林待詔張季恭至吳越書於刊石後二年嵗在敦牂天下兵馬都元帥嗣吳越王建廟貌於始封之越國禮與境內樂之罔極孝思也蓋聞神道設教莫大於郊社嚴禋明德惟馨無逾於祖考孝享是以百代相襲六籍盛稱報劬勞則天保是徵展欽若則王假是訓又况建除難靖亂之業揚武烈之威名振剛德義氣之風成肅恭之懿號陳力四紀光奉八朝生為有土之君薨立象朝之廟是可睢盱召畢齷齪桓文聲華永而日月齊簡册編而古今在矧夫堂成王構家繼國祧壓璧寶以知來出玉林而嗣位高陽號里無愧前賢夏屋登山常遵治命爰自鄭緇始襲晉墨未除不忍一日之離遂立千年之祀金鎔陽邁已成像於吳城香刻旃檀復附神於越國恭惟先天下兵馬都元帥吳越國武肅王殷朝籛祖仙萼分枝唐代鄛公靈源真派簪裾軒冕禮樂詩書謺慶連華交光翊業應劭七世纍爵重官羅企一門惟忠及孝其降神也虹飛蜀國始見殊祥魚躍汾河是生奇表赤光耀室黃氣浮空石龜隕下於官山胡人來歸於寶器此二事安國縣父老言也其英姿也鳳文龍藻敻出精神白琥蒼圭琢為標格加之薛璘整峻謝安風流俯仰可觀進退有度慕容德偃月日角光彩爍人李子堅匿犀龜文威儀鎮俗其辭韻也音容灑落智辨鏗輷元善抑揚張暢詳雅至若討論國計談畫兵籌接對使伻撫御將下所謂五河奔注百谷崩騰玉虹起而雲霧銷金虎嘯而風飇動揣摩勝負赫連勃口授懷慚捭闔興亡蘇季子舌端有愧其氣度也志高建木量等大瀛含垢匿瑕罔知邊際求賢接士無怠寅昏重仁義若邱山視玉帛如咳唾翹翹車乘唯在得人憧憧往來皆鍾和氣所以羔皮豹舄鶴列犀渠咸願殺身用酬大惠變家為國誠由萬化生身以德聚民所謂八風從律其英雄也能知否泰善俟雲雷動必有成舉無遺策蛟龍得雨莫測變通雕鶚出林可知意度其間文武迭用仁義宏敷平阿一作常平之亡戟得矛一作列戟持矛並能取捨元協之搦蛇騎虎不覺艱難奄有具區廓開霸業設使庾翼復出必不妄譽於桓溫阮籍重生安敢輕言於廣武其文學也家承儒範世尚素風侍絳紗帳於先生授白綸巾於神女才通夢寐鳳吐方來志在典經龍鬬不顧所以博覽七緯精究三元盡得津涯皆升堂奧其於篇韻尢著功夫思風起而繡段飄言泉淘而金沙見其札翰也花隨腕下星逐毫飛靄若遊雲細凝垂露鈎刀向背未饒索肉芝筋點畫方圓高掩崔肥趙瘦就中濡染碑額益見呈露鋒鋩四方仰之神蹤一代稱之墨寶王逸少若見甘避雁行蕭子雲如逢大慚蟬翼其建大功也唐季乾符之末中和之初海鳧乍揚天龜初伏塵飛野馬四郊之壘漸多霧暗騰蛇五賊之機共構其始者王仙芝結釁中土首搆禍階雖已誅夷猶殘支黨自此藂祠烏合草澤蜂飛輕薄者固自披攘謹厚者亦為慓悍江南則朱直叛亂於唐山孫端寇孽於安吉西侵宛水東患苕溪郡縣則終日登陴生民則長時伏莽王時郊居葛圃嘉遁茅山即葛仙公種之地故曰葛圃與茅山相接在臨安縣城東二里方當枕石潄泉尚是裦衣博帶覩茲多事慨然究懷顧謂朋友曰丈夫須當撥亂平姦豈可懷安端坐是日乃奮茲戎服挂彼儒冠大散家財廣招勇士申令才舉行伍肅然手仗義旗身當勍敵一月之內二寇殄平靖千里之山川救兩郡之塗炭是王之初功也其次黃巢來從五嶺直下三衢展梟翅則雹布星羅張鯨牙則山連嶽峙所遭蹂踐並作塵灰王乃獨領偏師橫行險地既逢大憝遂設奇兵敵望草木叢林皆是戈矛旌幟獲敵人之言也我則左右翼陳默化如神當下追奔尚賈餘勇長蛇封豕便出他疆新市下江保安數邑是王之功也其次彭城劉漢宏據南鎮之重地守東越之名區黃巢既犯兩京僖皇乃巡二蜀漢宏不思奔問便廢貢輸恃險阻於浙河一作江潮欲覬覦於江岸一作浙岸先於漁浦黿石翼張下營蕭山西陵鱗次列寨烽燧交應鼙鼓相聞時我諸軍實有難色王乃潛趨間道夜濟長江仰告昊天乞昏朗月當下寒雲布野殺氣凝空楚廟陰兵旁隨霧合晉臣黑幔暗與山連我師忽震於雷霆彼寨俄摧於魂夢風號貔虎爭傳破竹之聲陳卷龍蛇競集建瓴之勢賊將殷輪不暇漂杵有餘僅身免以奔歸乃塞門而自守爾後大小百戰首尾四年方清鏡水之波始有蘭亭之地弔其生聚大布仁慈誅彼渠魁不須天討是王之功也次則有薛朗逐出周寶自據朱方南襲毗陵西侵建鄴恣其剽掠務在殺傷將承中國之危擬扼長江之險王乃命二麾上將期一月報功指其山川授以韜略蹄轂並舉水陸兼行曾不旬時討平窟穴裹南宮萬於犀革視以囚人梟崔慧景於鰌籃彰其叛主是王之功也次則有徐約比是六合鎮使遽忝三吳郡符玉帛是求徵斂無度長時習戰齊民因被雕黥比屋為軍魯儒亦遭翦削惟王聞其暴虐奮激神威發上谷之精兵命下江之賢將授以九天九地之訣傳以訓辭訓典之規扼斷咽喉清其郊野任約之龍果睡王彌之豹徒飛食窘朝飢無由撫士計窮宵遁遂至潰圍松陵之煙水重清香徑之黎元再活是王之功也次則有孫儒恃有數萬兵甲不守淮南直欲別遷土疆遂奔江左刲人民為糧食隳舍宇為薪蘇餓鶻飢鷹飛揚京口貪狼乳虎踐踏吳門漸逼由拳將窺霅水王乃張天網於阻險闢地穽於要衝發水犀之驍雄設燧象之奇計青雀摩壘赤兔致師將持久以待之俟勢窮而必取守陴皆哭無食何為鳴鼓而攻脫身遂去向使不施神略不振王威則翼翼生靈皆成膏血茫茫勝概盡作煙煤所謂劬勞為時廣大及物是王之功也次則有董庶人始鎮石鏡便牧杭州因破漢宏遂居越土自形成象從纖至洪並是王之擐甲執兵左提右挈以至手持旄節身爵王侯既滅頂於彞倫乃垂涎於神器銅符金匱祥瑞亂興玉璽珠袍妖訛競起王以早同楚歃夙共晉盟書尚緘縢血猶濡匙箋函旁午誘勸交馳諫既閉於屬垣禍遂成於覆族是時兩河倔強三輔紛紜萬象雖拱於北辰一人不遑於南顧王請奉行天罰所統便是國兵不費上供資財不役諸道將帥果見桓元計窘抽玉導以求生王莽勢窮轉銅威而厭勝喉既摏於富父骨復棄於會稽瀦其故宮焚其法物復我正朔清我寰瀛五石補而天鏡明六合完而地維正是王之功也王以平妖立霸時之業戡難建蓋世之功律呂宮商鏘洋史籍丹青金玉煥爛國華所以僖宗天子仰我文昭眷我武烈龍光壓謺急使星馳綸綍便蕃大王風起尋以耿純試理盧植兼才披錦衣以耀家鄉握圭符而光松梓洎於昭皇飛升大寶禮遇元勳龍悅召雲鳧欣得藻嘉功賞德金鳳之詔連飛表異旌優玉麟之符遂刻移南徐之藩翰就錢塘之江山節竦靈犀帳開神虎三千珠甲光爛星辰十二牙旗文生組繡碧幢才建黃閣又開乃兼鎮於越藩遂對持於漢節中天辰象雖分牛斗之疆夾岸煙嵐映出東西之宅四縣既食萬戶纍加棨戟立門赤油羅列山河誓券丹字熒煌生祠之籩豆鏘鏘衣錦之城隍黯黯而又特逾漢制封我吳王茅分夏社之心桐翦周王之手昔也龍蛇起陸蹈湯火以戰爭此際山川出雲見君臣之際會逮夫濟陰王既傳天寶梁太祖遂應元苞於王不易范張之故情請結秦晉之嘉好恨無殊禮得展異恩於是追呂望之高風擬山甫之美躅師尚父統攝三老作帝股肱尚書令總務萬幾為天喉舌仍頒瑞節復踐高壇建牙兼鎮於揚州分閫遙臨於楚甸尋命兵部姚尚書洎躬持鳳册遠泛鯨波備周官之典儀封越國之土宇八鸞四馬耀鏤鍚以振鈎膺三節一王秉桓圭而垂元玉及龍德嗣君即位禮稱伯舅尊曰父師寅茲烈光虔奉顧命是時遣吏部李尚書燕捧持綸誥諭曉湖湘授天下兵馬都元帥洞庭彭蠡漸無不順之臣北狄西戎將有後豫之嘆昔韓信對漢高祖曰陛下能將將臣能將兵是知元帥非人臣之職曹蓋帝王之兵柄推於前代隋煬帝自晉王淮南行臺尚書令祗為行軍元帥無天下之號國朝肅宗皇帝駐蹕靈武因命代宗皇帝自廣平王而為之德宗皇帝自魯王而為之梁太祖授九錫後而為之斯天下元帥之故實也其後龍德帝復命兵部崔侍郎協齎持簡册浮泛風帆揚往典於明庭促及時而建國奉召康公之命得以專征授唐叔虞之封良由吉夢未久金行運息土德中興莊宗皇帝鵲起并汾龍飛宋汳當寧不逾於旬朔臨軒宣諭於公卿曰吳越國王五十年來常作搘天之柱三千里外每為捧日之雲今若將致小康實在敬尊元老於是鸞臺進擬麟趾摛詞典瑞獻功琢白圭而册文粲爛職金供命鎔紫磨而印篆盤珊重封吳越國王再授天下元帥馬遷十代史內固是絶倫柳萬卷書中必無往例其建國也大君有命明試以功自癸未而至壬辰備戰器而修王道先是中朝名士在野遺人或負笈擔簦來投霸府或折襦為袴面詣軍門奮袖於嘉納一作務堂中曳履於靈鈞臺上至此水鏡裁鑒金稱等量並列庭臣皆居省署簪裾列侍文物齊光張伯仁陳宗廟之儀鄭子産獻公侯之禮豈謂難窮者大數莫究者彼蒼俄脫屣於具區遽徹縣於正寢金山霧掩誰知帝召王喬玉海波空實痛神辭李廣况十三州疆場百萬戶黔黎咸長養於恩膏悉生成於化澤淚灑而晴空散雨愁凝而杲日沈雲鳥獸悲哀草木慘怛明宗皇帝宣太常而定諡法召二卿而撰誄文鸞輅龍旗贈禮優於鄧禹梓宮黃屋異數等於霍光得謂盡始盡終極榮極貴享九九之仙壽近帝位於一爻感萬萬之人心歆神道於千祀有後如此又何觖焉我天下兵馬元帥吳越王當燕族之多奇承趙宗之後世嵩衡泰華秀氣俱騰淮濟江河榮光共結是時允主誕我國祥紹經文緯武之基襲積德纍仁之業開襟奮臆伏雄傑於周瑜誓衆臨戎統人豪於張袞風儀則懸星溢眥紫電揚目盧霜雪凝肌魚龍入髮仙應有分貴不可知宋辨聲姿尢間進對竇融詞氣惟是卑恭加以青雲常在於言談畏日不離於顧盼徐行緩步褚彥回却是趨蹌散幘斜簪王文憲殊非蘊藉智略則鮑叔錐矢應手而成德業則顧和圭璋遇機方露遠者大者一剛一柔靜則心照鏡而貌懷冰含和六氣動則火炎山而湯湧海懾懼萬人機變則管葛才高孫吳術妙身文虎豹隱見不常義府戈矛短長迭用五雋才既為己任六奇策固是無遺郤縠詩書經綸國計項羽雷電振動兵籌徐睇而莫測金泉旁窺而罔知珠岸詞藻則清霜皓月絡繹綵箋芳草落花飄揚鏤管織成夢錦散出神霞英變屢奇張融之言信矣淩顏轢謝元稹之論宜然札翰則早受義方曾傳掣筆鸞回鵲反氣勢驚人金錯銀鈎縱橫入目案牘無非筆陳宮寺爭耀寶牌崔宏之本草無光張育之折蒲失色立功則我王初離太學始統親兵鄭世子方欲平齊汝陰王正思安漢屬鄰國侵軼命將曰李濤僅二萬兵下百里寨圍逼安國涎喙餘杭我王虔奉訓辭遂升上將清風授武黃石傳書親承韓奕之黃羆躬伏封文之白虎攻東南而備西北事在機先掩五壘而出三門別馳神算於是崩摧大陳擒獲萬人道路隘於俘囚山川積於戈甲餘敵作氣既竭方遁於潛我則乘勝追奔又平廣德未出一百里之境復降五千一作十乘之戎唱凱歌而喜氣連郊整班師而雄風掠地尋即大統龍艦遠泛鼇溟巡江陰而收東州一作川入海門而觀北固彼境遂陳舟楫遠出枝梧我則陳二廣於浪港沙前設三覆於石牌灣內零陵石灰風便爭投於蛟蜃窟中沁水火筏油燃盡葬於鯨鯢腹裏一戰定霸二紀無虞寰海具瞻將相迭耀聲光丕顯裴松為廊廟之人功業升聞段襄居骨鯁之任爰自嗣承國構纘奉王基况當跪箭之初又在寢苫之內芝蘭龍鳳三千餘口之家風鐵石虎貔二十萬人之軍府誠難撫御豈易輯綏我王以孝為模用仁作範無所不可唯言是從嘉惠寵靈供承花萼油雲膏雨潤澤閨門此外習武益兵輕刑慎罰德無脛而遠屆名無翼而遐飛果動天朝繼鍾異寵三年之內兩册連封雙龍之金節齊行四馬之寶車並驟玉具冠劍見王者之尊崇織文旗常覩國容之貴盛我王因茲顯赫益動孝思無以答先后之恩無以報昊天之德且曰武肅王有大功及天下大名振寰中庇生民而百萬有餘築城壘近五十來處豈可不建廟貌不像真容為星紀之福宮作地戶之神主爰命興武中直都虞候姚敬思於馬臻湖畔勾踐城中選闉闍形勢之中區得顯敞高平之勝址於是鍬杵俱下畚鍤齊興隱隱雷聲轟轟嶽振不十旬而展役匝千丈之陰基大梓文楠匪自泰山伐得宏梁巨棟非因漳水漂來雕鐫者王母元圖甃砌者赫連繡石斤揮斧運削出銀葩水鏨砂磨方成玉磶符元武一作玉之嘉兆應神蓍之吉辰始乃架險梯虛雲構山屹陰虬回抱陽馬奔趨虎牙銜而枅栱連龍脊裊而欒櫨轉瓊瑤耀壁丹漆明簷鴛鴦之瓦縫界成芙蓉之磚文印出即以丙申嵗秋八月十有七日我王備鹵簿鼓吹車輅旗常北司侍臣南班舊列奉迎真像而入祠宮白檀雕出聖容黃金縷成寶座儀形酷類神彩如生鳳目龍章顏猶不改垂旒被衮人見興悲禮器則俎豆犧樽軒懸則柷敔鐘磬後殿則翬衣雉服文母賢妃露幔珠屏蝦簾象榻不異昔時祕寢皆同曩日深宮前則廣厦交陰芳亭對構紫石伏狻猊之影朱欄交菡萏之光正啓重門並列神將侍衛兵仗戈戟森然文武官班簪裾肅列直出甬道千步有餘河枕投醪波通射的蓮芰繞於水閣桐桂夾於星橋左則回抱粉廊連延綺棟並圖曹署各列司存乃至早世勳臣無祿公子皆塑儀像並配薦羞右則修廡飛甍緑窗丹牖陰兵神馬見雷電而沒風雲明竈淨廚備粢盛而烹肥腯景物則高杉矮檜粉竹金松夾砌名花連階瑞草煙嵐蓊蔚便是陰宮雲霧朦朧居然神府我王昔以致君之業纍殄寇戎今立顯考之祠用修孝敬所以天朝繼封王爵以耀國章黃金印印宇內徵呼都元帥帥天下侯伯卓絶殊勳洪業所謂炙地薰天設使書剡溪九萬之箋不能盡紀勒華山五千之仞亦恐難窮光業也詞不夢於王椽才匪量於曹斗擬奚斯之頌或恐粗心對豫章之碑豈合措手但以二紀幕客十載庭臣不求孫綽擅名豈望楊修絶妙所希編述用答恩知追感先王恭為銘曰嵩高嶙峋是生哲人上天師子出澤麒麟籛尊殷祖鄛允唐臣衣冠表裏文武經綸廣運將新大盜斯起雁象歘驚鳧毛亂委紫蓋蒙塵黃巾多壘既斁憲章又裂文軌武肅英王提劍東方龍行雲雨虎變文章孛氣沃酒妖雪歸湯洗滌星紀整頓天常告功狼居圖形麟閣桐圭聯編茅土續索三道犀幢八朝鳳諾丹券家門錦衣城郭元帥天下國王具區六瑞琢册三品鑄符尚父四履尚書萬樞峗峩高壽曦赫霸圖我王奉天為時而出傳寶應金繼明照日國士無雙風華第一削樹平戎夢禾受秩功既挺世德又動天襲封二册嗣位三年金印國寶元帥兵權忠無瑕纇孝絶雕鐫未褫墨縗乃建清廟臥龍之城會稽之嶠嵐界回廊粉明周㙩廣殿霞開重門嶽峭瑞玉禮器香檀聖容民之祀主我之神宗秉翟執籥特磬編鐘燃蕭燔膟置幣輸琮於穆祠宮煥焉陰府五齊恆馨六佾常舞肴薦房蒸歌隨路鼓令子懿孫光今顯古軍墓志銘將軍姓屠氏諱王褱智字寶光其先河東人晉將軍屠擊之後也大父某避地於吳家於澉川之青山遂世為蘇州海鹽人太夫人吳郡顏氏夢抱璧有光生將軍遂以王褱智名焉將軍生而姿貌偉杰鷹揚虎視少負勇略更善屬文纍舉不第歷遊名山見疆宇幅裂復還故鄉吳越國王初起鄉兵拒黃巢將軍從之時時以籌畫進遂與幕府謀議董庶人昌僭號將軍首勸討賊昌誅以功授指揮使乾寧四年丁巳同顧全武王弟鎮自海道救嘉禾生擒賊驍將楊勝頓金等二十餘人計功將軍得中上遙領常州刺史職明年春再遷越州指揮使光化元年十一月衢州刺史陳岌叛將軍又同全武等討平之三年調守湖州授制於同郡高公彥天復二年壬戌武勇都指揮使徐綰許再思叛於府城將及內城刺史高公聞之遣子渭與將軍同赴難渭曰今日不利彥曰赴急難何以吉辰為將軍按劍曰違主之命不忠畏縮不前無勇死忠死勇丈夫分也偕渭直抵靈隱山賊壘賊勢甚盛合圍數重二人自朝戰至於日晡身創百處奮力一呼手縛賊魁數人即馬上刃之矢盡援絶為賊伏兵所害王念將軍徒步從戎卒死國難以衣冠歸葬於開元府海鹽縣南三十六里澉川之青山德政鄉歸仁里開化村今天寶五年特贈忠義軍匡國功臣武康節度使銀青光祿大夫檢校尚書右僕射開府儀同三司上柱國將軍生於唐宣宗大中五年辛未死在於昭宗天復二年壬戌八月庚寅享年五十有二娶錢氏子三長龍驤授澉川鎮遏使娶聞人氏次子昱節度使銀青光祿大夫娶都虞候鎮遏使鄭公良女三曰晟吳興刺史高公掌書記判官娶同里許氏諸孫皆幼公嘗有詠志詩曰輕身都是義徇主始為忠至是竟符其讖云初未有志至是龍驤屬豫為之而復系以銘銘曰山河育瑞帶礪鍾英徒步奮迹赫聲濯靈么髍梗闕九首憑陵磨牙王國吮血蒼生公怒飇發撻伐擊膺矢屠猰㺄以身殉君功高盟府猷壯干城光啓前烈垂裕後昆忠孝纘襲勳土裦旌連岡崇窆妥綏義魂桓赳世選焜耀貞珉仁紹吳越衣錦興國軍安國縣西市看守宏聖王大邱陵客衣錦興國軍安國縣西市看守宏聖王大邱陵客程仁紹右仁紹戶稅係衣錦北鄉每年先次送納並足且仁紹翁祖去乾寧二年蒙太祖武肅王給帖巡看大邱陵并及四面山林年前後並無闕失戶內所雜色差配夫役從前蒙押太祖武肅王批命放免并本軍台命其祖王批命見在今縣司不委從前看守官中宏聖王大邱陵衮同一例差點不敢辭論且仁紹戶內鹽稅米等先次送納不敢逋欠正限其戶內雜色差配夫役甲頭等伏乞元帥大王鴻恩特降批命念以看守大邱陵年深不同別事故戶日夜巡看尚憂闕違許容下縣準前蠲免冒犯明庭伏候王旨下縣指揮十月日安國縣西市看守宏聖王大邱陵客程仁紹上狀
