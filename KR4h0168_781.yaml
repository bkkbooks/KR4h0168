front:
  text: 全唐文欽定全唐文卷七百八十一李商隱十一
  hash: sha256:d47db2f775c4ce152417271770157b687b583296c851776a7bfe0eeecc64dd17
body:
  text: 年月日鄭州刺史李某謹請茅山道士馮角禱請於水府真官伏以旱魃為虐應龍不興困杲日於詩人苦密雲於易象生物斯瘁民食攸艱某叨此分憂俯慙無政爰求真侶虔禱陰靈減哺表勤褰帷引咎伏乞下通滎播上達天潢合為膏澤之原用息蘊隆之患其於效信或敢逡巡暴露託詞焦勞結慮泉間候氣樹杪占風惟望玉女之披衣敢駭商羊之鼓舞竊希元感聽察丹誠謹按禮經云諸侯得祭名山大川之在其地者今刺史乃古之諸侯太行實介我藩部險雖天設靈則神依豈可步武之間便容孽豎磅礡之內久貯妖氛今忠武全師河橋鋭卒指賊庭而將掃望寇壘以爭先神其輔以陰兵資之勇氣使旌旗電耀桴鼓雷奔一麾開天井之關再舉復金微之地然後氣通作限雲出降祥長崇望日之標永作倚天之柱酒肴在列蔬果惟時敢潔慮以獻誠冀通幽而寫抱年月日致祭於城隍之神四民攸居是分都邑五兵未息爰假金湯惟神受命上元守職斯土擁長雲之壘提却月之營主張威靈彈壓氛祲某方宣朝旨來總藩條帳中之列既安幕下之籌敢失神其守同石堡護等玉關長令崒若岸焉無使復於隍也年月日致祭於城隍之神某謬蒙朝獎叨領藩條熊軾初臨虎符適至敢資靈於水土冀同固於金湯况彼潞人實逆天理因承平之地以作巢窠驅康樂之民以為蟊賊一至於此其能久乎惟神廣扇威靈劃開聲勢俾犯境者望飛烏而自遁此滔天者聽唳鶴以虛聲崇墉載嚴巨塹無壅今來古往永無川竭之因萬歲千秋莫有土崩之勢神其聽之無易我言年月日觀察處置使兼御史中丞鄭某謹遣全義縣令韋必復以酒牢之奠昭賽於漢伏波將軍新息侯馬公越城舊疆漢將遺廟一泒湘水萬重楚山比潁川袁氏之臺悲同異日方汝水周公之渡感極當時嗚呼昔也投隙建功因時立志隗將軍坐談西伯棄去無歸梁伯孫自降王姬雖來不起以若畫之眉宇開聚米之山川扶風里中詎守錢而為虜德陽殿下寧相馬以推工悵望闕西趨馳隴右事嫂冠戴誡姪書成龍伯高之故人出言有所公孫述之刺客相待何輕鳶泊啓行蠻溪請往銅留鑄柱革誓裹尸男兒自立邊功壯士猶羞病死灕湘之滸祠宇依然豈獨文宣之陵不生刺草更若武侯之壠仍有深松向我來思停車展敬一樽有奠五馬忘歸及申望歲之祈又辱有秋之澤雲興柱礎電繞牆藩何煩玉女之投壺方聞天笑不待樵人之取箭已見風回敢忘黍稷之馨用報京坻之賜屬以時非行縣不獲躬詣靈壇詞託煙波意傳天壤既謝三時之降兼論千載之交勿負至誠以孤元契惟大中元年歲次丁卯六月甲午朔十四日丁未都防禦觀察處置等使桂州刺史兼御史中丞鄭某謹遣登仕郎守功曹參軍陸佚以庶羞之奠祭於城隍之神夫大邑聚人通都設屏將英雄走集必假高深不惟倚仗風雲兼用翕張神鬼某初蒙朝獎來佩藩符既禦寇於西原亦觀風於南國始維畫鷁將下伏熊屬楚雨蔽空湘雲塞望晦我中軍之鼓溼豫下瀨之師遂以誠祈果蒙神應速如激矢勢等却河及茲報薦之期敢怠馨香之禮神其干霄作峻習坎為防合烽櫓以保民導川塗而流惡使言言堅壘侔地道以無疆活活深溝如井德之不改勿違孔禱以作神羞尚饗都防禦觀察處置等使兼御史中丞鄭某謹差理定縣令某具酒肴昭賽於縣城隍之神日者穴蟻不封商羊未舞爰憂即日將害有秋我告於神神能感我雲才作葉雨已垂絲既開豐稔之祥敢怠馨香之報神其無羞小邑勿替元功永作蔭於城郭溝池長想報於禾麻菽麥守臣奉職孰敢不虔維大中元年歲次丁卯八月甲午朔二十七日庚申桂州管內都防禦觀察處置等使正議大夫使持節桂州諸軍事守桂州刺史兼御史中丞上柱國賜紫金魚袋鄭某謹遣直官攝功曹參軍文林郎守陽朔縣令莊敬質謹以旨酒庶羞之奠敬祭於城隍之神濬洫崇墉所以固吾圉春祈秋報所以輔農功今露白雷收蟲壞水涸念時暘而時雨將乃積而乃倉敢以吉辰式陳常典神其保茲正直歆彼馨香聿念前修勿虧明鑒昔房豹變樂陵之井味任延易九真之土風豈獨人謀抑由冥助今猶古也神實聽之年月日賽於靈川縣城隍之神高壘深溝用資固護興雲泄雨諒俟威靈惟神能感至誠將成大稔逐清泠之耕父不使揚光回沮澤之蟠龍皆令灑潤式陳微報願鑒惟馨年月日賽於荔浦縣城隍之神嗟我疲民每虞艱食寒耕熱耨始望於秋成鑠石流金幾傷於歲事遠資靈顧式布層陰無煩管輅之占不待欒巴之噀竊陳薄奠用答豐年神其據有高深主張生植同功田祖比義雨師無假怒於潛龍勿縱威於虐魃守茲縣邑富我京坻年月日賽於永福縣城隍之神夫考室立家先立戶竈聚人開邑首起城池固有明靈降而鑒治惟神克揚嘉霔廣育黎民聊為茨梁少申肴醞神其節宣四氣扶佑三時勿使畢星但稱於好雨無令田祖獨擅於有神永馨蘋藻之忱長挾金湯之勢年月日賽於城隍之神惟神據雉堞以為雄導溝池而作潤果成飄注以救惔焚敢吝斯牲用報嘉種神其永通靈感長懋元功導楚子之餘波霈晉國之膏雨苟能不昧報亦隨之年月日賽於堯山之廟伏以帝巡遐徼天作高山既比敬於軒臺亦分功於農井是留遺廟以慰斯民昨者時雨忽愆秋陽稍亢永言嘉霔實自元恩大驅蟠澤之龍盡發潛泉之蜧倉箱興詠將慶於農夫灌呈功不愆於豎子敢茲昭報冀降明靈年月日昭賽虞舜之祠伏以帝狩南荒神留下土翠華莫返積怨慕於他年大麓不迷烜威靈於終古比憂嘉種少冒愆陽抗簡陳詞潔樽引咎果蒙憑離掣電跨巽揚風布霑渥於九皋起焦枯於一瞬敢陳瑤席輒事蘭羞帝其罷奏南琴停吹西琯使東皇太乙兼預於靈遊俾山鬼江婓無藏於沴氣庶將善政以奉明輝年月日賽於越王之神惟神輝焯殊姿抑揚奇表秦魚既爛則聊帝南荒漢鹿有歸則稱臣北闕覽英雄之載籍信王霸之朋遊言念遺祠猶存屬邑尚興甘雨以救公田敢陳沼澗之毛用報京坻之積神其永司茲土長庇吾人福佑柔良驅除疫癘今來古往常教威著越城萬歲千秋勿使魂歸真定神乎不昧來鑒斯言年月日賽於北源之神惟神雖臨南服實號北源湘浦降神近驚於騷客滮池浸稻遠協於詩人果能橐籥風頭索綯雨腳不資畎澮將致倉箱聊申信於澗毛庶通靈於水府神其抑揚蘭佩麾掉桂旗拍川后之肩攬波神之袂共來於此饗報留思年月日賽於曾山蘇山之神惟神守在出雲職惟通氣果從望歲載潤嘉生將申昭報之儀敢闕馨香之獻神其遐瞻惟嶽廣納遊塵勉揚少女之風勤詠曾孫之稼無令渥澤盡歸涇水之湫泉勿使威靈不及歷山之仙室我辭有激神儻聽焉年月日賽於白石之神惟神載烜明靈克標懿號軒珠耀彩儻非瑤水之源荊璞流輝即是玉山之路昨者俯憂旱歲俾禱遺祠果能愛我大田貺余膏澤不俟于公之雪獄無煩洛令之曝身敢命子男爰修蘋藻神其仰濟天澤俯佑歲功無萌可轉之心以負惟馨之禮尚饗年月日賽於龍蟠山之神惟神降治山川流恩縣道龍幡鳳蓋克懋於靈司蟻穴鸛巢式揚於利澤至誠有達昭報無虧神其叱吒飛廉鞭驅屏翳尚令吾土屢有豐年不無行潦之羞以謝油雲之會年月日賽於陽朔縣名山之神惟神受命上元奠茲南服雲臺日觀遠讓於高標蓬島崑邱遐通於爽氣峻若藏刀之嶺崇如倚劍之門是宜銓管陰司拘囚異物為神仙之下府開龍虎之殊庭屬歲不寧旱既太甚馳誠謺嶂託意通波果聞雷出地中電流巖下既茲霑足敢薦香芬願終如響之靈無怠孔明之鑒尚饗年月日賽於海陽之神頃傷多稼將困驕陽未逢玉女之披衣空見土龍之矯首式祈嘉霔果降明輝神其享彼蘭羞挹茲桂酒輔成於多黍多稌助施於好風好雨庶厲業官以酬元澤年月日賽於古欖之神惟神爰因碩果遂啓靈祠瓜美邵平且傳舊志李標朱仲亦茂前經昨者疸暑為災油雲不起式存心禱慮作神羞神能感氣蜧泉傳祥鸛垤使宋生抒賦始悅於雄風高氏讀書忽驚於暴雨化太甚旱為大有年將見助於歡康敢忘懷於昭賽惟神越嶠分雄魯嵒學峻慰農夫之望歲揚少女之微風變俾枯荄化為嘉穀將期大稔敢薦惟馨神其貺我秋成羡余民食無俾董生之説空閉陽門勿令夷水之風屢鞭陰石苟歲既登矣則神永歆焉夫神必依人山惟鎮地式融靈命必建元司前者憂切蘊隆念深流鑠詎言膏澤忽致有秋敢備杯盤粗陳肴蓛神其留歡屏翳通意馮夷叶時雨於東皋卷陽雲於南裔我民奉事無或不虔惟神克扇明靈居余屬邑能作殷臣之雨欲豐唐叔之禾輒以良時爰陳薄奠神其俯臨上席少解靈衣舞朱鳳於南方召元龍於北極永調和氣無易至誠惟神化洽虙琴享存欒社銅章墨綬應非百里之才嘯虎吟龍猶續三時之雨余也謬當廉部未及行春飛鳧懷鄴令之庭沸井想延陵之廟神其論交異代降福斯民常俾旗雲庇我嘉穀聊茲薦報庶或感通年月日祭於蘭麻之神頃者杲日揚威融風扇暴禾乃盡偃人何以堪神能倏忽應時逡巡布潤雲旗直集不資秦地之決渠雨陳斜飛更甚成都之救火永懷靈祐敢薦嘉肴神其與蕙同芳為蓬扶直勿虛嘉號以纍豐年年月日惟靈泰嶽繁祉安平望族潤地勢於長源構堂基於修麓藍田之産宜有良玉徂徠之林宜無凡木昔我待子松玉之間冀十城之得價望千尋而可攀大年不登逸足方駛松欲秀而先蠧玉將攻而遽毀聞問之時歎悼何已惟我承乏受命南征一言相許攜手同行敻絶萬里飄泊雙旌念兩婢之價倍愧五羖之酬輕地接殊鄰風移中土五嶺三江炎風瘴雨釣犀之潭跕鳶之渚席上從容幕中宴語先防載苡之謗更示投香之所因使庸虛不罹罪罟越井之酋甘綏之女時清則銅鏑納廚歲稔則銀簪叩鼓豈我之自惟子是與相從來覲又往於涇風埃古戍霜雪孤亭偏裻之服縵胡之纓塞迥而晨嚴刁斗沙平而夜警兜零指吾以虜隙勉吾以武經正慰窮邊俄還京邑北庭減價南轅雪泣章臺辟掾方喜趙嘉之來棘署選丞仍見譙元之入是焉踐歷更俟飛翻况乎鳳沼又接鴒原何釁成乎燥溼而厲結乎寒暄未及西山之藥旋為東嶽之魂憶昔舊許員歸青門出餞樂作而歎起杯行而淚泫但容與於風波共沈吟於鐘箭揮袂如昨郵書甚頻雖遙道里未濶聲塵孰謂念歸之日翻為有慟之晨嗚呼哀哉髣佛荒阡依稀古陌徐動丹旐永歸元宅願執紼而身遠想移舟而莫及迥夜秋思㣥山暮色恨白髮之衰翁哭青雲之舊客聊茲寄奠莫寫西悲巳乎崔子為吾歆之惟爾業傳元女胄自青陽三河設辨五郡推良廉用苞含立節柔將恭謹摧剛伊昔頑民實鄰舊許豺終覆族犬猶戀主從諸侯之鈇鉞逐大將之旗鼓任重前馳衆才一旅許伯則摩壘而旋曹仁亦逢溝不渡舉無遺算仕匪遭時何茲皓首不識丹墀劍折而空留玉匣馬死而猶挂金羈刮骨瘡深通中毒作昔夢膏肓之豎靡效君臣之藥休拔趙幟空張衛幕塵凝而筆聚先投蟲蠧而書攢舊閣余方守職爾欲埋魂想鬚視虎料臂看猿泉驚夜壑草變寒原荒陌是永歸之里老松無重啓之門嗚呼聽挽心傷覩鼙目眩苟公忠之義著雖古今而情見冀幽壤之是聞饗臨棺之一奠至道之世君臣聖明必有才賢為之挺生昭昭我公得一居真窺神靈之壼奧涵天地之淳精胸襟洞達方略縱橫文房啓而風雅斯在武庫開而禍亂乃平甲子之歲逆泚變節河海沸騰宗社杌隉孤軍隴上勢窮援絶激臨危之肝肺成曠世之勳烈帝有寵命擁旄蜀川威聲烜赫德禮昭宣家有美政人無冗賢熙熙穆穆二十餘年機謀內發英明獨照頓挫西戎經營南詔通驃國之幽阻導彌臣之䆗窱咸屈膝於君王信萬古之榮耀方期驅兵率乘覲謁帝庭承汪濊之殊澤陳訏謨之大經如何尊重遘茲殞靈地偃喬嶽天沈輔星昨者疫瘳之日咸望再起頻造屏內候公動止憂國慷慨請立太子事苟未行歿而後巳今上嗣位人神交喜哀傷大賢不見如此某謬以菲薄監臨此軍參蕭曹之議論覩伊霍之功勳凄涼門館顧慕風雲非百身之可贖寄一慟於斯文維年月日祭於某官之靈聖歷應數今古同風五百年間運屬我公長河噴射太華穹崇鬱起生人之表獨棲皓氣之中往者鯨鯢蕩海波濤洶洶京洛風塵人神震恐公遂屹立天授智勇斬刈師徒扶持汧隴逆黨憔悴心摧計擁繇是安危繫之輕重天子報功禮數乃殊既握龍節亦執金吾國之西南實曰成都夷夏混合山川盤紆苟非哲人莫起令圖咨我賢達付之方隅公乃厭坤維以厚德注㣥生以和氣應變參乎杳冥布政歸乎簡易剗風俗之姦窳平人心之險詖肅貔虎以雲屯禮英髦而鹿君至蠲萬疴於藥草新百貨於鄽肆綢繆賓客之歡肅穆鬼神之祀補前人之漏略極當時之能事道尊而獷俗承風聲烜而殊鄰慕義狺狺犬戎背約報仇疆場蠆毒大邦寇讐公動機權控扼咽喉闢其陬落係其魁酋峨和窣雲大度橫流伏不敢動垂二十秋伊昔南蠻嚮化虔奉朝旨將率非良撫綏失理興兵戰伐深入邊鄙十萬之師蕩為癘鬼公以誠往彼由感起拜新詔於皇都歸舊封於越巂提攜椎髻之類簉列青襟之齒驃國之與彌臣伏聯蹤而謺軌臣製樂以奉聖聖裁文以敘美考一德之輝光諒有德而已矣方期五福之壽享九命之尊致雍熙於宇內相玉帛於天門何至業之堙鬱逢逝水之迅奔竭涸滄海摧頽崑崙精靈一去徽烈空存嗚呼哀哉錦城秋暮北郊長路寂寞山川蕭疏草樹雖蘋藻之屢薦終轜車而不駐慟軍府之悲涼增煙霞之思慕某等俱以孱鈍獲事旌旄庇蓮府之光彩無汗馬之勳勞戴恩愧厚顧位慚高問沈痛之何有與二江以滔滔年月日惟靈傳芳華胄稟慶靈源漢朝輔相之流輝梁室帝王之遺懿克生俊德彰我休期高表百尋澄波萬頃及春闈獻藝會府試才騏驥出塵蛟龍得水頓纓而駑駘盡喪乘風而鱉蜃皆空憑陵遠天躞蹀長道是將筮仕光乎縉紳侯國從知大朝就選祕寶宜陳於東序朱紱必降於上元錦幔而居青縑以覆建禮推盡瘁之績明光多伏奏之勤亦既遷榮乃司論駁高居青瑣封還紫泥使明時無失政之機大邦無不便之詔暫辭朝籍往分郡符借寇莫從徵黃甚急方將啓乎良友進彼令人志豈愛身誓將許國不謂疏網猶漏斯民未康作礪為鹽正俟理平之運依城憑社深懷翦滅之虞上蔽聰明內求媟近故鴻猷不得而協贊睿化莫可以輔成藐是流離有窘陰雨嗚呼令惟逐客誰復上書獄以黨人但求俱死銜冤遽往吞恨孤居目斷而不見長安形留而遠託異國屈平忠而獲罪賈誼壽之不長才易炎涼遂分今昔粵自東蜀言旋上京郭泰墓邊空多會葬鄧攸身後不見遺孤信陰步馬之莫知亦生人之極痛某等頃同班列獲奉周旋分結死生地兼族類依仁既切慕德方深始驚南浦之悲俄軫下泉之訃今則年良月吉筮協龜從顧埋玉之難追歎焚芝之何及牲牢粗潔酒醴非多聊寫丹忱以伸永訣伏惟曾構高基往修峻址俯為明時載生奇士杜林舅族本富文理楊惲外孫素多圖史朱檻有裕括羽成美逸足輕從東之道巨背狹圖南之水匡生明習董氏精專魯壁墜簡汲冢遺編坐忘流麥出記懷鉛淹中莫敵稷下誰先朝有曲臺時推奧學明博士之高選資衆儒之先覺殷周損益夔夷禮樂既得根源盡除踳駁粉闈假道諫署揚輝吾寧訐訕時好依違周舉上章惟求主悟賈生草疏豈畏人非用之則至捨之則歸旋領藩符俄司國計鋤革煩冗修明課第鄙晉室之鬻綀小漢朝之造幣前籌未借斂笏還家再北非罪三黜何嗟淮陽徑兵潁水豪族既佩新印仍推舊轂杜當陽何嘗跨馬雄士爭推祭征虜不廢投壺師人自睦夷門地古梁苑藩雄雙旌大斾二矛重弓無忌御車惟求隱者相如謝病乃慕高風方將副帝注心從時大願率周廟之奔走總漢庭之議論人之不幸今也則亡莊子孰分其魍魎秦醫莫救其膏肓雁沼波瀾空聞悲咽兔園臺榭祇見荒涼某獲顧尢深蒙知甚早公昔分茅愚嘗視草於劉向論思之時贊孟舒長者之號及茲出守實介親鄰音徽繼好寤寐依仁常期異日克奉清塵何言永慟屬此嘉辰訃哀如昨歸轍攸遵林薄莽蒼川原隱轔想諸葛之旗鼓空還舊壘念伯喈之書籍已付何人候館攸開丹幡遽至瞻望衛幕連帛丿糸秦畤寄奠申訣緘詞寫意終阻願於躬親徒加哀於殄瘁嗚呼哀哉尚饗伏惟靈佐商宣業朝薛傳規門崢層構堂嶫崇基玉生藍岫芝産銅池梧高佇鳳蓮馥停龜有美令人再稱清劭訓在詩書樂惟名教王謝標格曹劉才調清如濯熱之風明若觀朝之燎靈臺委鑒虛室融和秋水望春臺上多鄉孰掉鞅文林厲戈硯橫河漢紙落煙波澤宮貍首棘場楊葉箭去星慙弓懸月怯兩書上第五辟名公馬卿賦雪陳琳愈風平臺竹苑淮山桂叢營分細柳幕染芙蓉顯備臺僚榮從憲秩冠峨鐵徑衣明繡密霜下簡端風生落筆庭夜烏回天秋隼疾帝念充職任於諫垣依違絶想從容敢言攀檻而空留迹在削藳而不見書存女史護衣大官供食伏奏多可分曹著績帳暖錦麗闈明粉白既題柱以如田亦償金而類直漢榮出牧晉議州兵廉袴歌送劉錢贈行濟南之誅巨猾揚州之試諸生虎去江靜珠來岸明神豈好謙天寧秩禮蠹華國之明品喪士林之模楷使為善者奪氣求仁者解體已不駐乎卿雲竟何窺於伏濟長洲樹古茂苑山春橘稅既集茶征是親鷁度霅而去遠鵠下亭而唳頻翟虜氛興殷楹夢起帳入飛鵬牀驚鬬蟻鄭元知數阮瞻無鬼終自膏肓傅於骨髓嗚呼哀哉丹霄萬里建木千尋坦坦清路曈曈翠陰三襲臺迥九重禁深中懸旒扆下集華簪無非東箭盡是南金或扶傾作棟或望旱為霖顯允明公宜膺百福夜暗神昧天長景促青女變霜羲和納旭悄隨掌以銷璣慨周間之喪騄永惟清族本富才人有弟則陸無兄不荀原鴒奕奕沼雁馴馴珩奇動楚璧貴傾秦永矣彼蒼胡然人事但續椿壽徒高鶴位摧壓光價掩淪聲味潁不濁而殄灌宗淮未絶而傾王氏某因承中外獲奉恩知通孔李道德之舊兼盧劉姻戚之私鑄顏有契全趙為期靜龍門之風水剷羊腸之嶮巇空欲銘恩何酬樹德庇孤根於高援許嘉姻於弱植將歡宋子俄放湘南綬黃楚徼鬚白昭潭歸止未卜棄豫是甘許靖之悲方極王粲之憂不堪猶辱重言將敦故約玉無改行金不如諾勗大義於幽沈軫遐心於漂泊使者尚在凶書已來雁足空遠魚腸不回淚和峽雨哭振巴雷孰澆枯鮒誰熱寒灰今則言去彬江當移澧浦稍脫疑網猶罹罪罟念申慟以無期豈沈冤之可吐嗚呼哀哉執紼路阻佳城望賒凌空乏翼上漢無槎或期他日式返中華認楊公之石鳥撫周苞之辟邪况良冶規存遺經業在臧孫有後魏萬必大敢期陋質終託餘光韋平之紹續無望秦晉之婚姻豈忘絮酒無幾生芻是將辭多失次淚數無行冀桂旌之不遠降蘭佩之餘芳嗚呼哀哉尚饗始虞命夏暴於元穹功垂刊木德協堙洪洎帝相之難作誕少康於竇中由屯獲吉因生受封降及後代傳勳繼庸西京則嬰為外戚東漢則融居上公愍陽城之不享始移籍於扶風源遠更清基高自峻有焯明靈靄然休問陋巷不憂坦途方進月遠標儀霞高映論玉寧韞櫝錐安處囊宜伸尚屈將集猶翔潛師大易謙尊以光誓安老氏債少易償爰紆銅墨是宰濠梁宓琴時奏潘樹逾芳入贊朝儀言揚事舉圭璧蠻夷辨冕文武吐辭含韻知今博古進抑退揚從規合矩復陶啓位殿省承榮孔門之束帶無忝叔孫之帛丿糸蕝難更君子信讒小人道長未暇閉關難期稅鞅暫持竹符遠出羅網誰識卑飛因成利往銅梁改秩錦里經時人去而琴臺壞棟文移而石室摧基劉宏之重銘葛廟王商之更立嚴祠隴首云歸端溪遽逐角豈觸藩臀終困木海濶天盡山深霧毒許靖他鄉有名無祿馬超正色宜歌反哭何為善之無憑而降災之甚速某欽惟教義夙所依因在昔家世勤王實殷高旌大斾結駟飛輪慶豈遺於自出榮實萃於外姻一紀以來艱凶遄及嗟宅相以無取懼堂構之不集詎言渭水之乖離竟絶西川之出入嗚呼哀哉違京背闕古陌荒阡松門積靄隴首停煙祖庭是日乞墅何年淚有眥而皆裂憤無膺而可填况玕剖郡符璟持使節塞遠城迥河窮路絶顧後瞻前形孤影孑長號出次重拜臨穴酒醴清濃肴羞羅列庶有鑒於斯文冀不同於虛設嗚呼尚饗伏惟靈天枝挺秀帝系傳芳材高梓價重圭璋蘭芷斯茂先以馨香干鏌將用不銼鋒鋩始備千牛俄仕諸衛逸意方起絶足猶繫爰佐㣥僕亦掾神京邑惟二宅曹實五兵地峻流急官間政清嵩少曉霽伊洛秋明侶能吟之謝客伴作賦之賈生遂擢堯廚曾調湯膳位列大朝名參內殿朱紱輝華銀龜蒨粲漢有宗正委之親賢二彼惟月人寧我先外夷求騁天子憂邊皇華始賦紫綬俄懸雄其出塞之任假以中臺之權不拜無慙於蘇武去節寧類於王焉銜鬚誓死齧雪獲全帝仗使者吾無愧旃既返中華止同屬國蒼蠅難袪貝錦方織好丹非素點白為黑遭時不知非豫有戚既失志於絳灌遂不容於欒卻竟陵山水鍾離控扼名貴隼旟時瞻熊軾人以功遷吾由謗得其明若神其惠如春先除黠吏且活疲民汙萊盡闢邑室重新草祥木瑞獸去鳥馴方候徵還俄嬰美疢積微而桓侯竟晚達命而徐公待盡恍恍空驚遲遲未信誰知泉路之高低孰測夜臺之遠近永惟良配亦實女師庶薑尢效君子是宜異室無怨同穴有期河魴著詠皎日裁詩嗚呼哀哉龜筮協從日時斯卜將去荒郊言辭華屋草樹縈帶川原回復白髮孤弟臨棺慟哭失慈撫於終身宛聲容之在目心摧則冰炭交集血下而綆縻相續萬古永訣百身何贖酒滿未御肴乾未臨己矣伯氏來慰哀心
