front:
  text: 全唐文欽定全唐文卷八百三十二錢珝二
  hash: sha256:e9ade113e92ce87e869025830f1650b2254d04688a24128184db1ff5161f1289
body:
  text: 勅具官李儔等王者之居率先警衛將軍之令必勝戒嚴儔與繼美皆以絳服青綬常立於西序矣在列甚謹其勤亦多戎容頗稱於抱材家食且聞其處困故以左右領軍之命並而進之兼罷秩已來為日斯久咸從遷陟用舉滯淹可勅拊琴瑟者其聲不諧尚或改而張之況軍旅大事利害可論姑務變通且期寧謐具官楊承襲素以材力聞於朝廷昔屬興師乃思致勇而時惟黷武未足經邦每念殘人遂能屈已既從休息何必訓齊爾其罷彼戎機來歸環衛職親任重假寵甚多無懷逆命之謀宜奉徵還之召況參宿衛亦在促裝可勅具官牟崇厚等罷行部者入則率執刀之屬以居其官去宿衛者出則賞賣劒之人以成其政中外迭用典故甚明崇厚嘗分吾憂知其理之急善有聞也漢謩能闕爾職戒有備之嚴勤可稱也家食皆久賦祿甚宜勿墮勿媮以期無咎可勅具官劉崇文等漢家總率禁軍有南軍北軍之號今羽林領軍之職蓋近之矣崇文廷美常以赳赳之材對濟濟之列稱夫環衛立在西階今復命之俾無遺者勉揚威烈勿怠警巡桂林屬城頗參戎俗以若納久當官次多達物情分我遠憂資其惠政入居出守各慎所為懸法甚明賞善斯至可勅具官王知遠堯之克明周有懿德推恩而舉其有遺於親戚者乎如得其才匪曰私舉知遠禀訓於父且勵事君在官不違設爵何恡將軍使爾備宿衛尚書使爾進秋官且示兼榮則宜竭力報吾推恩之道無所私於親戚也可勅具官陳班朕求理未濟厥心匪寧實在庶位之間皆欲必獲其所況爾克繼勳籍通知武韜許國之誠忘身靡憚受爵而每期無忝檢身而唯恐有瑕雖秉郡符莫食公廩退居而處沈靜可嘉陟以執金仍兼端右俾承閥閱且耀寵章可依前件勅具官高彥宏朕每視朝執金吾率其仗衛陳於陛前退則與大京兆禁暴詰姦以清轂下其職如是非細任也以爾進在周行常為環尹實於巡警素積勤勞比授郡符將觀為政屬在節制有所薦聞方資宣力之臣難奪舉材之請未能出守遂至罷居暫解印於外臺復彈冠於近列勉思有寵善戒不虞可依前件勅國家之道文武相須故帶綬簪冠而處將軍之位者必求雄俊之材以對我卿大夫具官楊約智則好謀勇而知禮臨戎之用以律甚明具官焦敬復莅事多能理煩益辦舉其成效可以在庭俾就環衛式昭奬勸使號令有嚴於宿衛威名皆稱於職官副吾雄俊之求以濟相須之道可依前件勅具官安宏度等吾以大柄付丞相日行於堂上唯文武之士參用其才耳凡觀公舉亦必可之今具列爾名來請吾命將軍佐吏循次而遷且稱所能兼授貴秩罔有不信往宜思之可依前件勅環尹之設皆得以親宿衛時警巡而羽林之名自天垂象有拱宸之貴擇人匪輕具官郭師簡頗負雄材仍懷勇氣堅秉事君之禮深知用武之權載感時艱因思已立禦寇而隄防甚謹提兵而號令必行善復流亡多謀完葺率先陳力誓不去於京師望幸傾心志有同於父老難能之節臨事始明方資制撫之勤遂假陟遷之寵宜乘激勸更集功庸猶懸受賞之期重在平戎之日可依前件勅具官徐棨等陳力諸吏曳長組於西階之下而參將軍之位者況假地官之秩兼騎省之名仕蓋顯矣惟棨暨岊皆嘗立朝自効之勤所聞甚著使之遷擢乃用舊章道隣有勞於公亦宜賦祿郡佐漸優之命勉進爾途可勅具官李璠等朕每據法座命百辟四夷大和會於朝能率其屬建黃麾飛驎之旗立於陛前者有衛將軍之盛職也璠以忠謹之職周旋於藩邸之中以久得遷常為貳金吾矣武弁有列乃命陟居儔以壯勇之材率陳扈蹕之力以功可進來立於朝既曉玉鈐俾登環衛尚書之秩光寵並行可勅具官王存禮等朕於文武之士雖用之有殊而覈之不異以材濟用者是所求也以志立功者是所嘉也至於免官去職寄食屏居言念艱難益多愧歎執政能舉我心允同且以爾等負濟用之良材立守身之素志又復免官寄食安得置而不圖各敬所遷以揚厥職可勅典職之重本於調護之名者非端厚自守練達有聞焉可罷而復居當我為官之選具官王牘始以剛方之氣嘗失志於策名受聘塞垣通籍朝序致強學之力不廢半途恥巧宦之謀罔違公道利多開物優實在邦戒滅裂以能勤知蒲盧之可化頃因將命遂乃去官爰陟崇階俾還舊秩勉來辨色無墮盡忠可依前件勅具官某等習與性成至哉夏書之訓也故近則相習習則相成國有儲君戒之在習於其附近實屬上僚盈孫學本六經遂達四教出言行事常得指歸是以宮相命之且欲近吾元良利於所習其爾必疑荷聞前為博士官竟不就列堅求縣長務供養之資圖樂退居爾能千祿載典而興有所嘉焉可依前件勅具官凝吉承執政之門知循法之道升在郎署不忘公家多稱抱材足以集事今京師尹正之大藩后兼之甚理矣貳茲善政期爾必能舉而任之無浼吾命貽範精明不匱宏博可觀嘗佐鉅賢愈修茂行敏求所至通籍必華遠牧罷民朝皆思用都曹郎總率之職次管轄焉吾今舉典用人孰云匪重來居斯秩無効淺為官或有聞何求不達可依前件勅具官某慎行於家能養其親也慎言於朝能保其身也士大夫有是二者列於周行善用恬和且聞淹恤循於常典安可滯遷屬京縣寓理之難度材云急流亡未復賦斂猶虛以爾所慎之多必當克集其事錫茲銀印耀彼綵衣承寵而將慶問安思報而勉圖為政可依前件勅具官某士大夫不能理其身而能理於人未之有也爾嘗以文行進取科名列在華資詎非素志一旦身退朝實多之所謂能理其身固可理於人矣加之朱綬用表積中寧無所操施為善政可依前件勅旁據汧陽橫當隴首地有提封之盛軍多帶甲之雄既用良材宜膺正秩具官李繼文久從戎旅深達機謀忠信交修德刑並務御衆而推勞必報徇公而約法甚明元帥上聞朝章可舉兼進祝鳩之命更揚建隼之威夫牧伯之居憂寄實重使功名之充位在富貴而可圖已列諸侯勉為政事可依前件勅書云若網在綱有條而不紊故國家化條施於天下者牧伯謹而舉之政不紊矣具官王敬蕘始學司馬法克礪諸侯劒奮之以果敢之氣濟之以練達之謀自握郡符頗圖成績闕四字潁水則清年數且深理濟彌遠耕桑滿野不奪農時卒乘在軍未忘武備遂得見稱元帥是當善舉化條保民之崇增秩甚貴吾用漢家之典爾登循吏之名更務克終斯為守貴可依前件勅歷下名地也司空貴秩也處名地而增貴秩者非夫稱推擇洽物情焉得獨受寵章重宣王化具官朱玭當年思立學武有經固忠順之根本以機權為枝葉且能刺部兼務睦隣酌寬猛以守常就變通而處衆為善難掩不伐愈彰見求福於自謀信唯人之可召乃行茂典用叶公言可依前件勅有土之寄帶夫一作虜鄣者不其難乎鞠旅所以謹提防揚威所以遏淫蕩試材既可正秩無疑具官李太直昔爾伯氏嘗居五原以塤箎相和之勞致邊境無虞之樂而天倫有戚戎律可歸乃自人情繼臨軍政勇則匪怒智必好謀知金湯不在乎城池而耳目不專於旗鼓勤於宣力別用壯心去假守之舊名當諸侯之高位更圖善最無恃寵休勿使漢家獨稱魏尚可依前件勅李襃等醫一郡之疾苦既藉良能理四方之滯寃必資明慎二者生人之本也深詔執事精其選求以爾襃瞳洎荊或清識雅裁為時雋才或檢操修身累居繩準所至必畱其風範當官克勵於霜標而承休前理蜀川頗聞嘉績是可以分我符竹光於省闈虢畧巴梁地清俗富刑曹粉署務劇望高往副分憂勉思伏念襃可虢州刺史韋瞳崔荊並可刑部員外郎承休可果州剌史勅具官傅德昭等建隼在旟畫熊當軾以物彰貴出守者兼而得之故用武以來惟功是賞厚為寵報多在勤勞以德昭淬礪雄鋩利若太阿之劍以昶展張勁力強於繁弱之弓以贄馳騁茂駿比於渥洼之馬而皆藏勳有籍秉節無尤既當行賞之倫宜受分憂之命勉為善政無病遠人可依前件勅具官劉玉等傳曰夫舉無他唯善所在吾閱二帥臣舉知之狀善則可甄而天下諸侯咸當共奬王室有以忠而告我我必信而與之以玉勇望明堂用苞武庫訓士則專於齊一理人必去其煩苛嘗莅南康且畱遺愛以潛好謀不惑任智能通仍懷恤隱之心頗慕徇公之節因以牧養必致惠和是以復委詔條兼資禦遏或進寵移之秩或臨舊理之邦以玉之勇主於任以潛之智立於事則吾南極之地又何憂乎黎庶哉可依前件勅具官成希戭等泝峽而上踰嶺而出其人多處險而錯居處險難制錯居難齊非嘗試其才素習其俗未可為其理也希戭以敏知變而不矜雄勇之材嘗試於忠人皆便之統帥上言乃命真守師長之秩諸侯所榮進誠自戎入華久處遐徼之地習南方之俗思還其居勳帥舉之刻印而當吾委寄咸被寵光處險錯居各懋為理可依前件勅具官房仁寶等國朝作相之重在文皇帝時以偉德景躅布於史策者有吾太尉焉爾仁寶裔孫始以文進不得其志無所成名今用牋奏符檄之才職居藩服乘傳而至善達戎機思賢之心欲招後嗣春官假秩儒者斯榮且激爾曹勉佐元帥可依前件勅具官李東序凡諸鎮陪臣至自其幕府者或計事言功或舉職請命未嘗不召之便殿假以寬言且使鋪陳皆見臧否爾能用儒術佐吾列藩敷揚可取於詳明條貫必由於忠信嘉善之道增秩所宜乘寵而還永觀爾類可依前件勅具官范惟乂等軍興以來四方之政益煩矣而負才抱術之士參於武幄者吾嘗授之好爵用表嘉賓復勉其左右聽從始終同奬爾負才甚直抱術且深自有忠謀共贊戎畧故加寵於紱冕之上報勞於師旅之間爾其計事出言必公必信更圖保大無或告勞可依前件勅具官竇回等漢詔子弟理郡國必擇諸儒有材行者以左右之故韓安國王尊之徒皆能守法相導烱然可觀而顯位高名終亦自得今朕以汧岐奧壤而輔京師推擇統臨重在藩邸用乃命丞相選賓介於朝而回以術業克官丞相先緒澄以禮義端已實稟天成偓致用於文甚多強力舉是三美濟於一方苟務同心必聞善政吾欲保任親戚表率諸侯往贊理聲日當傾聽爾等亮直勤敬如在諫省郎署時則安國王尊之賢與古相望遷秩命服誠未足多可依前件勅具官鄭晦等吾鄜畤帥臣盛有忠力於王室其所以輔成勳烈者蓋俎豆之設召置得人言善必行計奇必用而爾等克荷代祿載揚家聲或端敏有為學術自飾尊奬之志斯不忘於善言奇計之聞信有輔成之道爾故八座諸郎銀章朱紱加於幕府遂被薦聞更推共濟之誠茲亦未多之寵可依前件勅具官崔洎等朕以左輔雄近復加節制之權而帥臣舉彼賓寮分其授任且聞洎等各抱美材見善必遷存誠甚直每竭用長之智以匡保大之謀郎署金章吾又何愛噫論兵有畧為政有經參佐不渝寵光自至可依前件勅具官張處休等夫以忠謀直道佐諸侯之善以乂一方而致其誠節卒歸王室者則陪臣得其職矣於慎獄勸農便百姓之欲而利一邑則令長得其官矣爾等博達吏道善事知己而處休以文學自進枌於勳緒有承閱拔嘉杼遂可其奏皆用訓汝爾其圖之可依前件勅具官田光嗣等從事之任卒以策謀文翰往參諸政能則政舉否則政墮故有慘舒繫乎能否安得以一談一笑媚於所從維揚控淮海之會邕南雜夷獠之居各引良材往佐其理而光嗣潛殷之善必有以稱其授聘者咸來被寵無忝爾知可依前件勅具官某等凡臨戎有勇知其能為將成務有材知其能為吏然則有勇有材者置之不遷使其興旅食之歎非所以激為將勸為吏也各命敘升無忽吾典可依前件勅具官某等任人其難古有試可之說爾等為吏嘗試於魏中矣今藩臣信正其秩是必有試可之材皆命與之亦惟常典可依前件勅王制之重列爵惟先開國之名徹侯斯貴具官某自河而北地闊兵賦之大實在鄴中而又以雄傑之材統臨有政爾以忠孝全道副貳其權嚴訓所資美譚甚遠不作威而人自畏能處順而事必行理戎每贊於公家秉禮無違於私室更廣疏封之寵以分勸善之章勿怠象賢是為守貴可依前件
