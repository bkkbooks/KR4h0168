front:
  text: 全唐文欽定全唐文卷三百三十賞開元中官御史歷右補闕戶祠二部員外郎
  hash: sha256:9bb812360f5199316e34d026d1ed81ca37874ffb6d0cb27807ef7cda6f222508
  markers:
  - {type: head, offset: 13, content: 韓賞, id: KR4h0168_NFKB_330-h1, level: 1}
body:
  text: 惟廿七祀孟秋右補闕韓賞敢昭告於泰華府君祠廟惟天地生於人惟山川主乎神人有識而神有靈人貴聰而神貴明於昭靈山與天窈冥載在祀典鎮於上京自古帝王徵應不一荒淫者神降之凶聖哲者神授之吉惟茲臣庶鑒乎得失今予小子造於神祠將有所盟神其聽之人有嗜好各為私禱顧無所求唯道是憂今者內禱於身外盟於神如有一心公朝戮力生人惟神是福崎嶇世道僶俛在位惟神所殛必將忘身奉國為本圖憂國濟人為已任明明泰華昭鑒於茲瞻彼牲牢抑惟常禮神嗜正直意存精誠正直以享神精誠以享意拳然跼慮瞿然改容益靈山之嵯峨增壽宮之肅穆歷階趨庭髣髴其形尚饗渙開元十三年官告成尉序昔者混元既闢生法世始舟車莫用言教不施愛憎之心未生爭奪之源未起則昔闕一字劫如來無為而化者矣其後人懷惡念資變淳風刀俎遍於三界生死繁於六道我慈氏大憐庶品宏茲祕藏甘露正法爰啟闕一字石之資身宍手足竭其負擔之用披地輿而考勝列龜謀而定域或陟在巘或降在原倘佯焉仿徨焉而得於夏城之隅闕二字觀其後背增巖前臨平野居然曠望四時有霜雨遞來直置孤標千里與雲虹競秀信安神之妙境有塔之宏闕一字者焉越闕一字開元十一年十月十七日已酉奉迎律師全身寧於茲塔寺主昔承灌頂今為闕則天偉之乃移法服授以榮班拜游擊將軍非其好也寺主道風素遠天爵自高朱紱方來雅操難奪固讓朝命願復緇衣則天多之闕一字特闕一字敕授善才寺主并賜內府絹一百匹雜綵三十段仍許至寺大闕一字法會以光其業寺主常以為徒宏願衣服臥具甘闕一字明昏拯溺雖報如來之恩蕪沒塋園未盡師資之禮於是撞鐘定策糺面闕門恆沙眾生咸從頂受其有位階十地身現四生守遮制之科宮牆莫測闕運慈悲並行廣大難思者其惟我律師乎俗姓藥氏河南密人也闕一字正見家含天仁性清心自樂宴坐窮年納芥而㣥有頓無觀身而眾妙皆盡若是乎律師常持金剛經心禪口誦不捨須臾闕二字則天樂自鳴中夜則異香頻降故為道俗之所欣然人天之所歸仰也春秋七十有五以大唐開元七年五月九日夜闕二字悟色相之皆空示生滅而警眾嗚呼風雲昏闇眾鳥悲鳴朝野悽慘神龍震驚以其年五月十一日權殯於夏城闕一字有大弟闕一字寺主八智俗姓張氏清河郡人德業宏深風神秀遠所作巳辦在邦必聞證聖中則天聞而嘉焉召見於同明殿因陳濟國安人之道闕一字神足復於塔右置立香園率諸門徒闕三字掃手植松柏千有餘株寺主早悟色空念茲生滅觀石火之非久歎芭蕉之不堅預於下層自託終制誡門弟子曰吾自幼出家奉事和上和上者則我慈父生我法身吾欲萬劫歸依兩肩負荷既沒之後無背吾言故其塔下層即寺主之所宅也至矣哉寺主之為道仁不忘本孝極尊師自非六行總持十力無畏安能預於斯乎次有弟子延祐等三十人闕一字嵩潁名家法門闕一字寶戒珠清靜心猨調伏咸能叶贊封樹同規祠塔僉共謀可久之迹垂無窮之紀恐汗簡之難存勒高碑而播美銘粵至哉聖覺淵乎調御開拓慧境昭融昏趣演偈孤園全功雙樹魔風不競法流長注其一猗歟碩德像教護持禪薰廣被戒靜難思經窮貝葉劫盡天衣高燈正朗墜露俄晞其二爰有上人心源猛利擯落朝組周旋了義邱首垂仁駢胝答施尊師踴塔如佛無異其三岌岌孤秀迢迢削成金繩闕一字綴寶鐸風鳴香烟作雨伏檻流星房廊遶護花藥經行其四夏后城池至今猶在此闕三字千里豈改有道貧賤浮生危殆託遺跡於後賢儻斯文之可采承節萬歲通天元年充河南道察訪使元宗初官邢州刺史夫囊括宇宙者文字發明道業者墳典是以聖人作而萬物覩賢人述而百代通禮樂得之以昭明日月失之而心忒宣尼彰刪緝之功始皇速燒焚之禍迨乎㣥儒在漢傳註瑤闕一字莫不珠玉交輝纖微洞迹同見集於芸閣獨有綴於環林豈若經教奧義圖緯深術兼行者多無如我鄭公也公諱元字康成北海高密人也八世祖崇哀帝時為尚書僕射公少為鄉嗇夫不樂為吏遂造太學師事第五元始通京氏易公羊春秋三統歷九章算術又從東郡張欽祖受周官禮記左氏春秋韓詩古文尚書攝齋問道摳衣請益去山東而入關右因盧植而見馬融考論圖緯乃召見而升樓精通禮樂以將東而起嘆三載在門十年歸邑及黨事起遂杜門不出隱修經業於是鍼左氏之膏肓起穀梁之廢疾而又操入室之戈矛發何休之墨守陳元李育校論古今劉王褱范升憲章文議何進延於几杖經宿而逃袁隗表為侍中緣喪不起孔融之相北海屣履造門陶謙之牧徐州接以師禮比商山之四皓鄉曰鄭公類東海之于公門稱通德漢公車徵為大司農給安車一乘所過長吏迎送公乃以病自乞還家董卓遷都長安公卿舉公為趙相道斷不至會黃巾寇青部乃避地徐州建安元年自徐州還道遇黃巾賊數萬見公皆拜相約不敢入縣境時大將軍袁紹總兵冀州遣使邀公大會賓客乃延上坐身長八尺飲酒一斛秀眉明目儀容溫偉客多豪俊并有才說見公儒者未以通人許之競設異端百家互起公依方辯答咸出問表皆得所未聞莫不嘆服時汝南應劭亦歸於紹因自贊曰故太山守應仲遠北面稱弟子何如公笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慚色門人相與撰公答諸弟子問五經依論語作鄭志八篇公所注周易尚書毛詩儀禮周官禮記孝經尚書大傳中候乾象歷又著天文七政論魯禮禘祫義六藝論毛詩譜駮許慎五經異義答臨孝存周禮難凡百餘萬言經傳洽熟稱為純儒其所撰注今並通習是知書有萬卷公覽八千也齊魯間宗之公後嘗疾篤自慮以書戒其子益恩書曰吾家舊貧為父母㣥弟所容去厮役之吏遊學周秦之都往來幽并亠兊豫之域大儒得意有所受焉遂博稽六藝麤覽傳記時觀祕書緯術之奧年過四十乃歸鄉假田播殖以娛朝穸後舉賢良方正有道辟大將軍三司府公車再徵比牒併名皆為宰相唯彼數公懿德大雅克堪王臣故宜式敘吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶幾以竭吾才故聞命罔從而黃巾為害萍浮南北復歸鄉邦入此歲來已七十矣宿素衰落仍有失誤桉之禮典便合傳家今我告爾以老歸爾以事將閒居以安性覃思以終業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾煢煢一夫曾無同生相依勗求君子之道研鑽勿替敬慎威儀以近有德顯譽成於僚友德行立於已志若致聲稱亦有榮於所生可不深念耶可不深念耶吾雖無紱冕之緒亦有讓爵之高自樂以論贊之功庶不遺後人之羞凡某所憤憤者徒以吾親墳隴未成所好㣥書率皆腐敝不得於禮堂寫定傳與後人日西方暮其可圖乎家今差多於昔勤力務時無恤飢寒菲飲食薄衣服節夫二者尚可令吾寡恨若忽忘不識亦已焉哉五年春夢孔子告之曰起起今年歲在辰來年歲在已既寤以讖合之知命當終有頃寢疾年七十有四以其年六月卒遺命薄葬自郡守以下嘗受業者衰絰赴會千餘人乃葬於高密縣城西北一十五里礪阜山之原嗚呼哀哉有子益恩孔融在北海舉為孝廉及融為黃巾所圍遂赴難捐身有遺腹子公以其手文似已名曰小同精通六經鄉人尊之時為侍中嘗詣司馬文王文王有密疏未之屏也如厠還問曰卿見吾密疏乎答曰未見文王曰寧我負卿勿卿負我致鴆而卒悲夫自夫子沒後大道方喪公之網羅遺典探賾今猶特立鬱然時季途迍志不苟變全身遠害猗歟美歟及范史作論有曰王父豫章君每考先儒經訓常以為仲尼之門不能過也及傳受生徒專以鄭氏家注云晉中興戴逵字安道以雞卵汁溲白瓦屑為公作碑手自書寫文闕三字語亦妙絕年代古而碑闕兦德音敻而詩書在承節以萬歲通天元年奉敕於河南道訪察觀風省俗激濁揚清行至州界見高密父老云鄭先生漢代鴻儒見無碑記不以庸妄遂託為文往以會府務殷闕一字無暇景歲序遷貿執筆無由今者罷職含香忝居分竹屬以閒隙乃加修撰耆舊者唯聞其名後生者不覩其事今故尋源討本握槧懷鉛無疏本傳之文並序前言之目發九泉之冥昧播千載之闕二字翦以繁華不為雕飾銘曰煥乎人文圖稽典墳煩亂事翦定自孔君中途湮沒秦帝沮焚漢興儒教鄭氏超㣥膏腴美地簪紱宏規嗇夫罷署京兆尋師中候乾象左氏韓詩雖稱積學殆若生知公之挺生大雅之懿囊括墳典精通奧祕六藝殊科五經通義小無不盡大無不備好學慕道深思遠慮來往周秦經過亠兊豫侍中不仕司農罷署盧植東遇孔融西去作者謂聖述者謂明躬違三辟門傳五更周官東部漢韙西京白玉遍地黃金滿籝占卜潛橋行途過沛陶謙師友孔融高葢山啟黌扉草生書帶七十歸老三千赴會經傳洽熟齊魯攸宗爵祿不受贊論為功禮樂今去吾道皆東類於標德比皓稱公閹尹擅貴禁錮連年乃逢宥罪方從舉賢南城避難東萊假田誕膺五百中覽八千今年在辰來年在巳嗚呼不憗吁嗟到此勞我以生息我以死道該八表神交千祀濰水之曲礪阜之陽通德為里鄭公為鄉雲愁廟古月暗墳荒舊碑先歿新石再彰詞愧黃絹心淒白楊名譽不朽終古騰芳常清蒲州猗氏人為都知兵馬使高仙芝判官累以軍功授鎮將果毅折衝天寶十一載擢安西副大都護攝御史中丞持節充安西四鎮節度經略支度營田副大使知節度事十四載為范陽節度使募兵討安祿山兵敗奔陝郡削官爵白衣從仙芝軍效力與監軍邊令誠不協奏其逗撓誅之中使駱奉仙至奉宣口敕恕臣萬死之罪收臣一朝之效令臣卻赴陝州隨高仙芝行營負斧縲囚忽焉解縛敗軍之將更許增修臣常清誠懽誠喜頓首頓首臣自城陷已來前後三度遣使奉表具述赤心竟不蒙引對臣之此來非求苟活實欲陳社稷之計破虎狼之謀冀拜首闕庭吐心陛下論逆胡之兵勢陳討捍之別謀酬萬死之恩以報一生之寵豈料長安日遠謁見無由函谷關遙陳情不暇臣讀春秋見狼瞫稱未獲死所臣今獲矣昨日者與羯胡接戰自今月七日交兵至於十三日不已臣所將之兵皆是烏合之徒素未訓習率周南市人之眾當漁陽突騎之師尚猶殺敵塞路血流滿野臣欲挺身刃下死節軍前恐長逆胡之威以挫王師之勢是以馳御就日將命歸天一期陛下斬臣於都市之下以誡諸將二期陛下問臣以逆賊之勢將誡諸軍三期陛下知臣非惜死之徒許臣竭露臣今將死抗表陛下或以臣失律之後誑妄為辭陛下或以臣欲盡所忠肝膽見察臣死之後望陛下不輕此賊無忘臣言則冀社稷復安逆胡敗覆臣之所願畢矣仰天飲鴆向日封章即為屍諫之臣死作聖朝之鬼若使歿而有知必結草軍前迴風陣上引王師之旗鼓平寇賊之戈鋋生死酬恩不任感激臣常清無任永辭聖代悲戀之至峻開元末為四鎮節度使夫蒙靈詧判官舉賢無私惟善所在苟利社稷無恤其他故德能佐時彭仲超於令尹才堪禦敵觀父統於三軍唯得其人似已何爽且魏獻舉代祁奚薦讎將利國是資不阻親怨以進賢為務寧問回邪故能建彼一官成乎三物先賢所尚君子韙之事以類分云胡不可瞻言丙也直指是稱舉爾所知何敢沒沒良才眾矣多舉何妨御史繡服霜華驄威電發將違執秩言寘僕區曾不知獄也放紛刑乎頗類淫刑以逞誰則無辜得善誠則可嘉糾桉斯為戾也東美少詹事佺期子初為府掾天寶中除膳部員外郎舉善惟微知人則哲妙聞音者識窮山之竹能追芳者賞幽徑之蘭甲位登八命才高四岳言刈其楚有異錯薪載縶其駒屢聞驤首文舉之昇一鶚陶洪之披二龍曷足思齊寧將比價懿茲擢桂便請錫弓自伐誠則躁求議功何妨懋賞稽諸漢史軌躅昭然名器不可假人升降固宜合禮爵土互錫理或酬功弓矢斯張雅符謬請六卿司過三適胡為比年三年殷見時見大會正殿小會東堂典禮序以鬯珪建官司其鍾鎮瞻言光祿式遵古典且爾公酬匪無彞倫功沽之巧先資於麴糱水泉既香必潔於湛饎瑟彼玉瓚黃流在中挹彼注茲酌以大㪷我客戾止嘉賓式宴呦呦鹿鳴酒正斯舉振振鷺舞兕觥其觩俾爾戩穀永錫難老式夷式已以引以翼方得古人之禮寧虧聖主之私郎署雖欲深文卿寺豈宜甘罪匡朝開元末官御史遷左司員外郎擢翰林學士夫何卜晝之不暇以清夜之方久垂玉漏之未窮賴金樽兮有酒霜入室兮夜何長樽含霜而醴澈霜覆醴而金光適足勁乎玉性亦何傷乎酒香夫如是樽既可賞霜亦可觀味資蘭桂影奪綃紈疊華彩於銀燭散餘光於玉盤況東堂清敞北斗闌干在公載宴廢寢相歡心飲冰兮猶熱酒飛霜兮豈寒斯蓋為上台之式百辟少宰之設九流明命充選俾士全謀五權立而㣥才入鏡三人行而一人同舟並錯薪於翹楚異攀桂之淹留每賞崇乎夜隙故樽列而霜浮於時星歲遒盡地有寒沍引颺風烏徘徊玉兔杯上霧起鑪前香覆對樽影而霜含況霜姿而粉傅非兕觥其觩粲乎自舉會心絜矩凝然抱素於是執簡為名比玉同貞結而能白沖而不盈光露寢之舊席刻神鐘之遠聲豈獨坐中藏器酒上含情者哉暠太原景皇裔孫解褐枝江縣丞擢監察御史歷工兵吏三部尚書東都留守加太子少傅開元二十八年卒年五十八臣至邢州雨降盈尺臣切問野老皆云往十二年春夏大旱六月下旬方始降雨其歲河朔大熟粟斗五錢今年得雨雖晚猶早於前歲百姓欣然咸有秋望臣受命之日祈雨恆山玉幣未陳明靈已應實陛下至誠元感先天不違恆贈兵部尚書嗣立子開元初為碭山令擢殿中侍御史歷度支左司員外太常少卿轉給事中二十九年為隴右道河西黜陟使時河西節度使蓋嘉運恃左右為非法恆劾奏之出為陳留太守卒元象垂文星辰作範休咎之徵斯在吉凶之跡可明祕以人倫得之邦國既河長而山久亦自古而迄今尚有不遵典刑默習推步眷茲所學幸遇休明慕劉氏之高蹤仰張衡之舊業既而秋槎將泛知河漢之明梭太白初高識將軍之出戰雖災祥之屢犯在徵應之可憑若彞典以斯違亦公途而難舍有司情惟糾慝志切繩違告為祅訛事恐乖於五聽科其犯禁誠有叶於三章憕并州文水人舉明經開元時累官河南少尹天寶中封酒泉縣侯為京兆尹改光祿卿東京留守安祿山反憕繕城壘訓勵士卒遏賊西鋒擢禮部尚書城破為賊所害詔贈司徒諡曰忠懿河洛平再贈太尉再覽來封皆如一面秋熱未解所履如何某拙疾但昧於理耳崔子日月漸遠弟故人情多一慟深衷豈易論也委曲具悉待彼官到若有商量與申後意彼有人作主人否承郎欲還豈不能一至此也外郡感別情不易言道路無留滯朝廷待士論屈日深佇聞鳴躍勿至斷絕弟多才博識言成楷模某棄廢之人何能為也言談次可吹噓之令不負公私亦親故之情耳千萬千萬不具李憕諮據字德鄰三十餘始遊京師舉進士累官司勛員外郎天寶十三載卒窮陰殺節流歲云暮將舉祀典必參故實無忘報本之始敬用伊耆之禮聚百物以饗息人大義為一日之蜡非賜所知瞻言所司是為之祭八神降止一國期集於焉觀德必也知古迎貓無闕言除碩鼠之患司嗇不預且有若敖之餒雖祭能如在樂已吹豳而禮尚有疵人多歎魯有鬼或爽誣神若何事乃違經儻受嗤於草服國有報憲宜見繩於繡衣顥開元中進士累官司勛員外郎天寶十三載卒夫相州者先王之舊都西山雄崇足是秀異竊見縣人樊衡年三十神爽清悟才能絕倫雖白面書生有雄膽大略深識可以軌時俗長策可以安塞裔藏用守道實有歲年今國家封山勒崇希代罕遇含育之類莫不踴躍況詔徵隱逸州貢茂異衡之際會千載一時君侯復躬自執圭陪鑾日觀此州名藩必有所舉當是舉者非衡而誰伏願不棄賢才賜以甄獎得奔大禮升聞天朝衡因此時策名樹績報國榮家令當代之士知出君侯之門矣顥不勝區區敢聞左右俯伏階墀用增戰汗某官至辱垂下問令公舉一人可管記之任者愚以為軍中之書記節度使之喉舌指事立言而上達思中天心發號出令以下行期悅人意諒非容易而可專據竊見前進士高陽齊孝若考叔年二十四舉必專授文皆雅正詞賦甚精章表殊健疏睂目美風姿外若坦蕩中甚畏慎執事倘引在幕下列於賓佐使其馳一檄飛一書必能應馬上之急求言腹中之所欲夫掇芳刈楚不棄幽遠況孝若相門子弟射策甲科家居君侯之宇下且數年矣不勞重幣而獲至寶甚善甚善雄都大府多士如林最所知者斯人也請為閤下記其若此唯用與舍高明裁之謹再拜煜字雲卿鄧州穰人開元中舉進士連擢科第授大理評事乾元初累拜左補闕遷祕書少監建中四年卒追贈華州刺史天垂象聖人則之故星有執法職有持憲皆鐵冠繡衣直指不阿俾在位者肅如也日者天子在鎬庶官分守於是乎有留臺所以上至中司鶚峙都邑夫洛陽有明堂辟雍太倉武庫郊廟百祀邦畿百域有不如法得舉劾之至若密網峻威微文深詆眾所嚴憚愈於京師蓋由臨之者專也奉之者一也專則權有獨斷一則政無多門前達以之立名於此暨皇運中興與人休息雖風移代變煩簡則殊而舉直錯枉典型猶在殿中侍御史河東嶭公朝之望也復修舊職凜然生風秦官漢儀斯不替矣乃篆石題記使人不遺聊紀於近庶昭厥德始自乾元歲掌留務者次而書之以垂於後大歷八年月日記
