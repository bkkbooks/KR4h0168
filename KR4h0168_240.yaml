front:
  text: 全唐文欽定全唐文卷二百四十之問字延清一名少連虢州宏農人武后朝與楊炯分直內教授洛州參軍纍轉尚方監丞左奉宸內供奉坐諂附張易之兄弟左遷隴州參軍未幾逃還匿洛陽人張仲之家仲之與駙馬都尉王同皎謀殺武三思之問發其事起為鴻臚主簿景龍中再轉考功員外郎中宗增置修文館學士之問首膺其選尋轉越州長史睿宗立以舊附張武配徙欽州先天中賜死
