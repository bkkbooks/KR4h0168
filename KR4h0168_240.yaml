body:
  text: 粵若公主誕生皇家太平徵郡國以選號叶時雍之美名孕靈娥之秀彩輝婺女之淳精虹美電熠蘭香玉清稟金后之元訓係列聖之聰明厭綺羅與絲竹愛瑤池及赤城搆仙山兮既畢侔造化之神術其為狀也攢怪石而岑崟其為異也含清氣而蕭瑟列海岸而爭聳分水亭而對出其東則峯崖刻劃洞穴縈回乍若風飄雨灑兮移鬱島又似波沈浪息兮見蓬萊圖萬重于積石匿千嶺于天台荊門揭起兮壁峻少室叢生兮劍開削成秀絶蓮華之覆高掌獨立窈窕神女之戲陽臺爾其樵溪釣浦茅堂菌閣祕仙洞之瑤膏隱山家之場藿煙岑水涯繚繞逶迤翠蓮瑤草的爍紛披映江潯而爛爛浮海上而纍纍乃之罘與衡霍豈吾人之所為向背重復參差反覆翳薈蒙蘢含青吐紅陽崖奪錦陰壑生風奇樹抱石新花灌叢向若天長地久兮苔蘚合古往今來兮林㵎空始燕秦而開徑訪靈藥乎其中其西則翠屏嶄巖山路詰曲高閣翔雲丹巖吐緑惚兮恍涉弱水兮至崑崙杳兮冥乘龍梁兮向巴蜀壯岷嶓兮連屬鬱氛氳兮斷續巖虛兮谷峻藏清兮蓄韻含珠兮蘊玉衆彩兮明潤芳園暮兮白日沈爽氣浮兮黛壑深風泉活活兮鳴石葛藟青青兮蔓岑羅八方之奇獸聚六合之珍禽別有復道三襲平臺四注跨渚兮交林蒸雲兮起霧鴛鴦水兮鳳凰樓文虹橋兮彩鷁舟山池成兮帝子遊試一望兮消人憂召七賢集五侯棹浦曲席巖幽鳴玉佩兮登降列金觴兮獻酬未窮觀而極覽忽雲散而風流於是乎上客既旋重扃嚴閉榜童儼而齊發綵女分而為衛牽水葉兮張水嬉摘山花兮詠山圻燕姬荊艷兮代所稀鳳舞鸞歌兮儼欲飛披煙弄月兮宵未歸桂枝清霧兮濕羅衣奕奕濟濟夜旋玉邸隱隱崇崇朝趨帝宮銀爐翕習烟生霧集絳節繽紛揚光吐文行軒節水去馬騰雲鏘鏘翼翼兮馳丹闕超超遙遙兮向紫氛寵極兮慈掌情勤兮幽賞戀宸扆兮出入憶幽山兮來往採朱萼兮山之側步蘭庭兮候顏色掇緑蘋兮於㵎潦宜室家兮叶仇好既而貞心內潔淑則遠傳詼談者聞之而必勸薄者聞之而凜然況復淮王招隱秦主隨仙弄紫房之琴瑟馳碧落之風烟賓屈宋於珠履引鄰枚於玳筵秋葉飛兮散紅樹春苔生兮覆緑泉春秋寒暑兮歲榮落林巒沼沚兮日芳鮮吾君永保南山壽車騎往來千萬年天授元年敕學士楊炯與之問分直於洛城西入閣每雞鳴後至羽林仗閽人奏名請龜契佇命拱立于御橋之西玉池清泠紅蕖菡萏謬履扃闥自春徂秋見其生視其長覩其盛惜其衰得終天年而無夭折者良以隔礙仙禁人莫由窺向若生於瀟湘洞庭溱洧淇澳即有吳姬越客鄭女衛童芳心未成採擷都盡今委以白露順以涼風榮落有期私分畢矣斐然願歌其事久之乃述秋蓮賦焉若夫西城祕掖北禁仙流見白露之先降悲紅蕖之巳秋昔之菡萏齊秀芬敷競發君門閟兮九重兵衛儼兮千列緑葉青枝緣溝覆池映連旗以搖艷輝長劍兮陸離疏瀍兮裂穀交流兮相沃四繞兮丹禁三匝兮承明曉而望之若霓裳宛轉朝玉京夕而察之若霞標灼爍散赤城既如秦女艷日兮鳳鳴又如洛妃拾翠兮鴻驚足使瑤草罷色芳樹無情復道兮詰曲離宮兮相屬飛閣兮周廬金鋪兮璧除君之駕兮旖旎蓮之葉兮扶疏萬乘顧兮駐綵騎六宮喜兮停羅裾仰仙遊而德澤縱元覽而神虛豈與夫溪㵎兮沼沚自生兮自死海圻兮江沱萬里兮烟波泛漢女遊湘娥佩鳴玉戲清渦中流欲渡兮木蘭楫幽泉一曲兮採蓮歌江南兮峴北汀洲兮不極既有芳兮莎城長無依兮水國豈知移植天泉飄香列仙嬌紫臺之月露含玉宇之風煙雜葩兮照燭衆彩兮相宣鳥翡翠兮舟青翰樹珊瑚兮林碧鮮夫其生也春風晝蕩爍日相煎夭桃盡兮穠李滅出大堤兮艷欲然夫其謝也秋灰度琯金氣騰天宮槐疏兮井桐變搖寒波兮風颯然歸根息艷兮八九月乘化無窮兮千萬年越人望兮長巳矣鄭女採兮無由緣何深蒂之能固何穠香之獨全別有待制揚雄悲秋宋玉夏之來兮玩早紅秋之暮兮悲餘緑禮盛燕臺人非楚材雲霧圖兮蘭為閣金銀酒兮蓮作杯落英兮俳徊風轉兮衰穨入黃扉兮灑錦石縈白蘋兮覆緑苔寒暑茫茫兮代謝故葉新花兮往來何秋日之可哀託芙蓉以為媒臣某言伏奉今月二日制書除臣忠武將軍守右羽林將軍五色無主如驚葉縣之龍千秋來歸似對遼門之鶴中謝臣聞為官擇人先辟之成務陳力就列古人之用心臣家本關西衣冠河曲素業將墜莫嗣英靈朱輪載輝謬承恩渥未盈一紀連刺九州西涼本六部之樞南荊乃九州之會蒲藩關左之重鎮魏郡山東之奧區宣城襟帶於吳郊許昌密邇於周室每恥政逾期月乏來暮之歌候易星霜無去思之詠隼旟回復日忝恩榮熊軾往還多慚道路出居嶽牧負尸祿之譏入計河都待曠官之責不意天私俯宥睿獎曲成擢之以心膂之官賜之在爪牙之地非常之澤捧戴失圖天衛凝嚴北軍清切風霜劍騎頓元武之仙闈龍鳥旌旗環紫微之帝座掌斯嚴祕必屬親賢臣也何顏敢膺殊寵當今鵷鴻接翼文武周身咸皆實已過名位未充量臣內求諸巳外愧妨賢若使愚臣苟安於私懷聖授不允於清議陶鈞雖廣無路自容懼實由衷讓非飾跡伏乞垂收渙汗更授王褱材軍司得人臣謂報國無任傾幸愧負之極謹詣朝堂上表陳讓以聞臣某言伏奉今月一日制書除臣使持節懷州諸軍事守懷州刺史成命俯臨兢魂自失妨賢不退無德而升恩屢錫而知慙祿彌高而轉懼中謝臣聞國經選士有一善而不遺天爵與能從九徵而可試臣薄遊憲府纍踐禮闈衣繡無執之才起草愧含香之列移官望苑日月其除驂駕梁園涓埃莫效剖符南峴既恧民謠作鎮西河未寬人隱二邦為政撫熊軾而無功八使回軒同鶴鳴而有薦遂乃謬霑束帛猥賜褒揚頓掩前瑕更延今寵山陽大郡河內名區桑竹映淇水之西井田雜邙山之北將何以潤通京邑化接神州雖勉三載之勤何補一年之借封畿之要歷選稱難臣也胡顏敢膺斯寄伏乞再求遺玉更網潛珠庶使賢才申共理之心聖主得分憂之地無任叨竊之至謹詣朝堂奉表陳讓以聞臣所讓人別狀封進臣某言伏奉今月二十二日制除臣殿中監依舊押干騎特降鴻私超加等數足臨鯨壑未偕聞寵之憂首抃鼇山豈踰承恩之重臣某中謝臣聞欲成大厦必寄於王褱材將適遠途理歸於駿足未有闕公輸之巧輒事揮斤無良樂之能謬令市骨臣藝術無取名檢莫聞叨承任遇遂階通顯再趨武禁誠恪未聞三入文昌涓埃莫效剖符為郡山東無勿翦之謠握節和戎北漠有不賓之虜而制書涵育猥錫褒揚天造曲成更延今授臣知不可清議難容推賢讓能列聖之明範量力審分先覺之讜言當今運屬升平朝多俊乂伏乞精求稱職以代不能遂愚臣由衷之詞全聖王至公之道授受無失臣免妨賢無任悚懼忝竊之至謹詣朝堂奉表陳讓以聞臣所讓人別狀封進謹言妾言妾聞天與才多地居外戚理乖謙益患在寵盈妾亡夫三思頗讀聖賢之書夙知止足之分在先朝錫漢藩之社位亞上台陛下流渭陽之思室嬪愛主常恐官高祿厚福極禍來閨門之談顛覆存戒但以願施塵露之效尚鬱山林之遊詎謂吳楚指有寵為名父子以無辜同枉良以崇高取忌退讓未形事雖噬臍言猶在耳妾夫埋黃壤子夭青春唯知哀訴神明號泣天地妾之殘命稱曰未亡更何心顏享茲豐厚況三思久謀謙退人所未知實恐士庶遊談是非相半既未能辨明高義豈復忍貪吝餘資雖則伯宗已亡獻誡者聞乎奸盜尚冀黔婁宿意見知者因乎寡妻今墳土未乾繐帷猶設妾所以廢寢忘飱瀝款披誠未允前祈更陳後請伏願俯矜賤妾遠念幽魂收彼白茅之封表其赤松之節光陛下有任賢之德明三思無冒寵之譏妾之區區意盡於此無任感切之至謹遣某詣朝堂上表以聞再黷威嚴伏深戰越妾死罪謹言臣攸暨言臣聞力微任重無德者履之必危功薄賞隆有識者陋其非據臣地因外戚器實中庸顧慙蓬艾之姿謬忝葭莩之末則天大聖皇后敦睦九族崇念六姻曲申猶子之情爰垂降主之澤禮優築館恩洽錫圭拔自堂姪之流光以親王之位臣嘗再瀝誠懇已蒙賜等諸昆今陛下龍德嗣興鴻基紹復㣥萬物而改旦宅千齡而配永洛讖河圖允叶純深之義雲行雨施載流寬大之恩追奉先慈將覃後命外家諸子降等猶誓於山河主第增榮在臣更超於等數陛下雖渭陽情重沁水恩多凡是封冊王公終須憲章堯舜以濯龍之戚今乃方於五侯緣駙馬之姻古未封於四履私親越禮聖人之孝理載光冒寵延災微臣之官謗斯久又以班參禁內秩比侍中自非德邁應璩識侔慶忌將何以對揚顧問規獻文章況臣位以恩升寵非才進無脛而至凡姿簉於珠玉無翼而飛睿澤借其毛羽未貽身譴幸庇容光臣亡兄攸寧循榮增懼以臣叨鳬繹之貴日夕魂兢負鼇抃之恩歲時力盡屬纊之夕再受懇言憂臣愚蒙令臣退讓倘陛下俯遂勤請照察冥心納臣揆分之言置臣獲全之地去茲王號降以公名爰食封邑同諸兄弟賜改散職即望參朝實冀家福惟新朝章咸序天德更逾於造化神理不責於滿盈臣無任懇款靦懼之至臣聞富貴者易象謂之崇高滿盈者至人誡其顛覆臣在非次久冒殊恩所以輟寢思危廢飱懷懼嫌疑之極載陳前表備瀝中誠之訴實非外飾之詞而聖鑒未回寵章仍舊戴嶽之重何憚力疲阽原之隍日憂身墜臣某中謝臣雖學慚敦史而塗聽前言尸位者必會短期冒榮者難為長守豈有外戚尚主異姓封王男皆公侯女食郡縣佩服五等輝耀一門湯沐山河家踰萬戶耕夫織婦凡有幾人役彼有勞之人供臣無億之用縱蒙聖心垂假其如神理不容自先后臨朝攀榮巳久聖皇纂極沐澤惟新自古迄今如臣流輩苟進者速禍勇退者獲全且王者所以強幹弱枝為藩作屏封必李氏無闕漢章伏乞陛下降河渚之姻感渭陽之族賜臣軀命永守蒸嘗得同昆季之流望捨郡王之號臣以日為歲以榮為憂希回三舍之光允臣萬死之請無任靦冒之至臣僧某等言臣伏見某日月敕以今月十九日將幸長安東都道俗不勝攀戀伏惟應天皇帝陛下重興靈命再造黎元域中懷三聖之恩天下識吾君之子關西帝宅渭北神皋思切園塋未謁長陵之樹貴為天子不歷咸陽之宮宜應萬乘巡遊展鎬池之新慶三秦故老覩漢家之舊儀率土喁喁孰不欣躍但以先后神寢夏首方成太子仙墳秋中未畢王主倍奉更促工徒雖力以子來而頗妨農事倘千官扈輦同費太倉之粟萬國來庭共索長安之米將何給用以濟公私且東都有河朔之饒食江淮之利九年之儲已積四方之賦攸均誠宜宅幸三川寬徭八水稍登稔歲方事歸鑾以欲從人孰不幸甚則天皇后久成佛果俯應輪王冀發無邊之巨願光有為之妙福經始大像年籥滋深愧緇流之淨財念蒼生之苦力俯從㣥議莫遂聖情陛下孝感旁通沖襟獨斷追成先志上合天人故得蓮礎未施為停風雨梅梁鬱起若有神明施其力者萬殊莫分龍鬼捨其財者干計豈辨人祇岌已干雲程之匪日實冀金輿近幸玉輅親臨禮如來之大身畢先聖之遺旨然後載詣京輔馳謁山陵即付囑無違情禮兼極無任懇款戀慕之至僧某等言某聞住持真教先憑帝力導誘將來遠屬能者伏見月日敕遣使迎玉泉寺僧道秀陛下載宏佛事夢寐斯人語程指期朝夕詣闕此僧契無生至理傳東山妙法開室巖居年過九十形彩日茂宏益愈深兩京學徒㣥方信士不遠千里同赴五門衣鈸魚頡於草堂菴廬鴈行於邱阜雲集霧委虛往實歸隱三楚之窮林繼一佛而揚化栖山好遠久在荊南與國有緣今還豫北九江道俗戀之如父母三河士女仰之猶山嶽謂宜緇徒野宿法事郊迎若使輕來赴都遐邇失望威儀俗尚道秀所忘崇敬異人和衆之願倘得焚香以遵法王散花而入道場則四部銜恩萬人生喜無任懇款之至謹詣闕奉表請與都城徒衆將法事往龍門迎道秀以聞輕觸天威伏深戰越臣某等聞行至公者莫先於發揮茂實垂不朽者不若於刊紀鴻名伏惟應天神聖皇帝陛下一德披圖五精乘運先天地而利用依鬼神以制法無思不服有感必通日者變起心膂禍生肘腋弄兵指闕敢忘下濟之恩犯門斬關遂激上靈之憤陛下近幸元武傍顧紫微鳳翔而梟獍失圖龍見而鯨鯢就戮順天翊聖皇后配乾積德從帝居尊佐莫大之英猷參非常之妙略親紆寶思式頌元猷椒掖之文久垂河漢甘泉之石已入京都伏惟陛下卑奉聖躬謙保神器惜其國用念彼人艱有命且停含靈失望臣等容光壽域竊位明朝不蠶而衣無裨塵露不耕而食有負靈祇陛下寢有道之豐碑臣等享無功之厚載亭育雖廣何所自容且天惠不可以闕書神功不可以久寂臣等請各減所俸以勒殊休庶同子來成之匪日無任光開垂裕之至臣亡母屬在外戚夙忝末姻不蔭慶雲早先朝露臣髮膚遺體是亡母所生金紫通班乃聖朝所賜臣每服一輕妙嘗一甘鮮何曾不遠愧劬勞近慚榮寵又見同列有太君拜邑命婦入朝臣早孤偏不勝感羡母因子貴幸者何多祿不及親臣獨含恨明年某月改葬有期私門大事莫逾於此臣內寡材術謬忝朝恩外無愆尤夙承母訓郡縣之號翻及臣妻哀榮之禮不霑臣母臣生不侍養歿未追榮若懼不敢祈恩偷生以安厚祿儻歸泉壤何對慈顏臣死罪死罪臣準某年月日制令加一階伏乞回臣此階追贈亡母又臣身死之後合有鼓駕出郊在臣何顏存歿叨僣亦許臣亡母用臣威儀臣身當以蘧蒢存榮死足所祈越禮罪實干誅伏惟陛下孝理寰瀛仁及草木皇室之戚軒冕盛於前朝太后之親恩澤踰於曩日臣幸遇非常之主敢祈不次之恩伏乞陛下少念葭莩垂哀犬馬回臣休寵以慰營魂則今日以前報恩於亡母自茲以後盡命於聖朝無任慊懇悲慕之極謹進狀陳請以聞拙自謀衛降黜炎荒杳尋魑魅之途遠在雕題之國風搖木饑鼬宵鳴毒瘴橫天悲鳶晝落心憑神理實冀生還關號鬼門常憂死別事未瞑目豈在微身先君業粹中和才光文武志道游藝名動京師出谷入朝事多宏益雖崇班去巳而陰德被人清議所尊何減驃騎恐耆舊咸謝竹帛儻遺使盛烈湮沈下情感痛自昔逸㣥之器曠俗之才譽雖冠于人倫祿不躋于卿士南史之筆漏美不書東岱之魂與名俱滅故史遷述許由云不遇青雲之士焉足道哉惟君侯禮樂山高文華海濶古一千歲聞聖人之書今五百年知作者之運山甫拾遺於中路時謂得賢蔡雍揮翰於詞林誰其不許往送家狀蒙啓至公之恩希果實言深蓄自私之感下官久辭榮擢夙慎禍胎內無負於明祇外冀申於知已豈謂一人相毀衆口爭喧遂以虛聲乃加真罪賴皇明昭宥腰領賜全空荷再生無階上答恃子以松竹之操期子以金石之堅幸無雷同懸納謗議見危不易是所望焉遠識古人之懷敢申窮鳥之請如季布之諾乃重於黃金延陵之許竟懸於寶劍生負食花之惠死效結草之誠刺血為書萬不抒一往年恩貸許惠為看起居注實録江融別録使不錯漏國史及高明所撰唐史春秋等六處並乞逸遺事跡不翳聲塵代業有光實在吾子遠佇來札以當招魂秋冬凝寒惟動履休勝青時至願想窮愁白雲遙來希訪生死珍重珍重
