  text: 全唐文欽定全唐文卷四百八十次字文編莒國公儉從孫建中初進士貞元八年為開州刺史韋皋鎮蜀表為副使德宗密諭皋罷之次為書三篇曰辨謗略上之德宗怒改夔州刺史憲宗立召授禮部郎中知制誥終中書舍人
