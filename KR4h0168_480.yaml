body:
  text: 維年月日謹以清酌之奠敢昭薦於公孫帝之靈帝以雄傑之度遇雲雷之屯思翼中夏遂荒南土覽江山之積岨總威武以鎮衛高築雉堞遂城於茲憑秋方肅殺之名厄硤口崩騰之險邦人敬仰永飾閟宮水旱之災每歲祈禱闕而斯應福及黎庶今大火已流商風始至時方旱暵稼穡如燔敢以精誠用祈明哲庶滂沱大霔匪夕而朝酬報之盛冀填瑤席維年月日謹以清酌之奠致祭於清江石門之龍潭曰惟龍圖全其軀以安其居庇祐蠙獺馴擾龜魚龍之道也興致雲雨鼓動雷霆稔此蒸人助我發生龍之用也全其軀莫若靈茲潭安其居莫若庇茲土龍生雲霧雲能施雨雨雲感召黎元鼓舞既慶成熟而無厲疵也今歲旱暵金石將流水不潤下江不勝舟穜稑皆萎稂莠滿野雷隱隱而有聲雨垂垂而不下名山大澤颻疑浮野馬唯龍獨潛茲潭澒洞泓澄水面如紙纖雲不生邃宮固護重門晝扃不克民望不歆我誠若旱氣滌滌秋成莽鹵自利深淵乖張懶旅我當涸龍之潭露龍之處跨龍之脊鞭龍之股俾之揚雲而大其雨是則人役龍也非龍德於人若果我懇懷酬報當極投以金虀增以石玉潛鼉皆血翔燕盡炙其餘馨美亦滿瑤席嗚呼初薦至誠中告直詞末當肆力以用其奇惟龍惟靈念茲擇茲急急如律令年月日某官謹遣某乙以清酌之奠敢昭薦於蜀先主之靈惟靈開業保疆始終此土英聲厚德實冠於時知人拔才橫出千古仁深運促徂落於茲宮觀雖平廟貌猶在歲時水旱皆薦馨香德惠於人人仰其德氓心吏意小大皆虔今夏潦逾旬洪波四漲邑屋有墊溺之懼麥禾有淹浸之危而急浪奔流漸襄高嶺某奉詔守郡政化未敷懼其災沴以病稼穡敬奠元醴又燔薰香庶以精誠感於明德使神明之佐騁其智英雄之將奮其怒以遏雷霆之震以滅漂蕩之聲鏡洗層霄百物蓁茂濕雲不泄陰霓潛收開此晴霽以欽神化祈而有應大報牲牢伏惟尚饗惟年月日姨兄開州刺史唐某以清酌庶羞之奠敬祭于楊判官八弟之靈平生懿密重以嘉姻四海之內惟君一人發自總角逮于知命遨遊宴寢一歌一詠周流俯仰得君輝映野寺孤亭松門竹徑接襟援手和神繕性霜鶴唳天玉音在聽空室閒齊枯棊爛柯自非偉生受勝相磨坐隱終日進亦多歷歷犮言其言若何歡事勝遊皆隨逝波事均榮戚心冥貴賤骨肉為交肝膽相見嗚呼哀哉婉豫幼妹爰居爾室既結其褵載和琴瑟何年齡之脆促乃貞美之先失悼手足之零落又吾人之凋歿以君之才以君之義合蹈豐福合居上第行與命違道將時背遏此仁厚天胡不惠博雅裴君鎮此南土大招儶髦鵷鴻作侶曾未纍月中茲炎毒百藥無驗頽齡愈促悵悵旅魂淵淵鰥目目雖瞑而有恨魂強招而可復加有傷怛況惟我親涕淚橫隨遍乎衣巾想容色兮如在覽毫翰兮猶新嗚呼哀哉神理昭然幽途可覿悲心自攢痛淚血瀝何疇日之歡愜變今辰之空閴歸葬猶緩俟君冢嫡魂兮歸來安此幽宅嗚呼哀哉尚饗參師事獨孤及建中元年為中書舍人三年以兵部郎中為舒王誼元帥府掌書記或曰漢高帝僞遊雲夢以擒韓信果哉其智足稱也豫以謂漢祖不思宏遠之規而務一時之計於是乎失政刑矣聖人貴正不貴幸與律不與臧昔者明王五載一巡狩令諸侯各朝于方嶽大明黜陟故無德者削地有功者進律漢時君臨萬國示人以偷僞遊之名不可以訓且當此之時韓信未有逆節一朝繫信而生諸侯之疑天下皆疑則所利者少而所失者多矣昔崇伯之方命圯族共工之靜言庸違帝堯以則哲之明而未有去者蓋以其行僞象恭且有四嶽之舉故也向使堯惡四凶之行拒四嶽之舉不待試用加之誅放天下必以為戮不辜矣夫刑一人使天下知其罪則服賞一人使天下知其賢則勸若賞而不勸刑而不服堯所不為也漢祖不能斟酌古典卒用陳平之言執信而歸於京師一二年間韓王信反馬邑趙相貫高謀柏人陳豨反代地彭越黥布盧綰之徒悉以叛渙豈非服勸用刑之失歟傳曰君人執信臣人執忠古之盟主恥襲侵之事況光有天下者乎於戲悠悠千載變詐萌生使天子不復言巡狩諸侯不敢議朝覲大者自嫌強盛小者懼於囚執是恩信不流于下而忠孝不達於上王者之澤寖以凌遲自雲夢始矣恭官太原節度副使檢校右散騎常侍汾州刺史敘曰皇甫士安志好閒放不榮軒冕導情適志作高士傳贊記遺韻風猷尚在而公早從釋氏義理生知結意為文志在於此言談語笑常所切劘心在一乘故敘釋氏最為精博與皇甫士安之所素尚亦相放焉則今天台大師元浩之門弟子也摳衣捧席與余同焉故能知其景行收其製作編成二十軸以為儒林之綱紀云若夫明是非探得失乃作西伯稱王議宗道德美功成作磻溪銘四皓贊釣臺碑圯橋碑潔當世激清風作先賢贊獨孤常州集序觀講論語序美藝文善章句作李補闕集序隱士李君遺文序備教化彰諷詠作中書侍郎贈太子太傅李公集序開國公包君集序總名實樹遺風作常州獨孤公遺愛頌太常卿常山郡開國公崔公神道碑惡戎醜思康濟作兵針敘宗系思祖德作述初賦病流濫悅故居作過舊園賦明大道宗有德作受命寶賦其餘言志導情記會敘別總存諸集録歸根復命一以貫之作心印銘住一乘明法體作三如來畫贊知法要識權實作天台山禪林寺碑達教源周境智作荊溪大師碑大教之所由佛日之未忘蓋盡於此矣若以神道設教化源旁濟作泗州開元寺僧伽和尚塔銘言僧事齊律儀作過海和尚塔銘幽公碑銘釋氏制作無以抗敵大法將滅人鮮知之唱和之者或寡矣故公之文章粹美深遠無人能到此事可以俟於知音不可與薄俗者同世而論也余之仰止未盡其善蓋釋氏之鼓吹歟諸佛之影響歟余所不者道其窮歟常懷不言之歎杳冥之恨爾後之人識達希夷意通響象知我之言之不怍耳若以敘人倫正裦貶則人皆知之非獨情至而稱其製作也大約公之習尚敦古風閲傳記硜硜然以此導引於人以為其常米鹽細碎未常挂口故鮮通人事亦賢者之一病也夫子所謂君子多乎哉不多也故無適時之用任使之勤余故以皇甫士安比之若管夷吾諸葛亮留心濟世自謂棟梁則非公之所尚也所謂善古而不善今知賢而不知俗故論贊碑頌能言賢者之事不能言小人之稱享年若干以某年月日終于長安某里朝廷尚德故以公為太子侍讀國尚實録故以公為史館修撰發誥令敷王猷故以公為翰林學士三職齊署則公之處朝廷不為不達矣年過四十士林歸崇比夫顏子黃叔度不為不壽矣其碌碌者老於郎署白首人世又何補哉於達者不可以夭壽之歎而病於促數焉公遺孤歿後而生今已成立則友朋之知臧孫之後存於此也稔魏州人天下郡縣悉有文宣王廟而范陽郡無者何范陽本幽州之屬右碣石左督亢流水經其前後有林麓陂池之利至于闤闠井肆之大關梁襟帶之固自河達燕其北不過一二先朝次列縣之級第為望領戶萬流庸附占者如之兵興人片茲又獨阜且倍幽之南百里而遙居鄚之陰二百里而近磅礡周廣隱然名區大歷初詔剖幽之范陽歸義固安為州因涿郡之地題為涿第為上以范陽為治所縣遂為州治矣然此為邑者率以多故未遑建置春秋釋奠蓋伺州之已事假籩豆寄升降於故階逮今幽州盧龍節度觀察等使工部尚書御史大夫彭城劉公建中初假道州縣操長是邑覩茲遺闕喟然嘆息顧其僚曰學所以知君臣父子之義者昔在三代皆鄉里有教兩漢以降罔不述用三德矧今朝廷頒宗祀之詔郡縣畢置清廟溥崇明祠今州廷大張縣署悉陳而至聖先師時享無所豈導人重道之意乎彼劉昆創祭器為禮范寧養生徒興化皆所以達萬類而朝宗至禮也吾宰三百里作人父母必權輿斯廟以為人紀乃視縣前近里之爽塏心規其制口劃其地度廣狹之量平廬舍之區發其居人直以官俸給以瓦木丹鐵之費匠人作徒之要又以家財散之人不知役廟倏云構聖賢之像備饋奠之器具庭除肅然黎元翕如皆不待施而悅不待教而變於是置食錢二百萬徒三千員洙泗之風集於期月時公年始弱冠方剛之日克明古訓君子是以知公奉若典謨其將來者大矣令廣平宋晙方介直之士也倚法不削憂公如私以能名自薊縣而來遷政率由舊履公之躅守而弗失覩公之為政而不及學舍異文翁之後罔或繕修琴堂挹子賤之風恆餘局蹐歌詠不足願言發揚見求微詞以載貞石其所書者止於創州置廟之實即夫子懋緒隆德蓋存諸史冊且溢於古人之口豈余頑童敢記頌焉銘曰振頽周室警寐殷楹曠千百年炯作世程大唐御極治致升平咸五登三是孰與京聖王既興夫子乃貴苴茅列爵建廟崇位蘋蘩截海聾瞶革思春誦夏絃於焉辨志惟范之陽巍巍建邑朝命有作州廷乃立廟革新題堂升故級縣寀寄奠生徒罷習崇崇大賢昔歲臨茲匪頒勞役克就嚴祠美矣像設森然具儀風化之源一至雍熙斷斷伊人恪居所職食蘖苦志戴星任力瞻我宏規闡我明德爰琢琬玉阼階之側頌德宗時官左司郎中臣某言伏奉去年月日制書禮展郊禋告成上帝恩霑動植道洽幽明東風變而四海春聖帝作而萬物覩懷生庶類罔不歡忭中賀伏惟皇帝陛下體元立極撫運受圖御一氣以乘乾飛六龍而出震德合天地明齊日月叶三光之幽贊承八聖之睿謀頃者國步未康王室多難兵廠田坴禍結害及生人塵飛寢園燧燭郊甸陛下乘時順動鑾駕南巡凡在食土之毛圓首之類莫不號天向闕望風瞻星遂得猛士雷奔義旗雲合西戎自效北狄爭驅一舉而氛掃清暫勞而寰宇大定則知千年降聖天命有歸六合奉尊神器斯在今農郊罷戰邊徼無虞九有偃戈八方同軌荷皇慈之覆育知聖祚之靈長匪人革心罔不咸率陛下勤禹湯之罪已法堯舜以為心肅恭神明虔奉宗廟損抑徽號憂濟黎元始自迎長之初大申報本之禮冊勳旌舊列爵分官宥死緩刑掩骼埋胔粟帛周于耆老奠酬及於幽冤天覆海渟與人更始釋羸俘於死地俾異域而生還赦枯木之嚴刑蠲執殳之常賦臣及三軍百姓蠻夷酋長等伏讀制書沐浴元澤莫不喧呼抃躍蹈舞徘徊絶徼窮荒盡沐生成之造翾飛蠢動俱承雨露之恩臣限以藩守不獲稱慶闕庭無任踴躍慶抃之至臣某言伏奉去年某月日恩敕授臣使持節都督黔州諸軍事守黔州刺史兼御史中丞臣某中謝臣以今年某月日到所部上訖螢爝之光無裨日月螻蟻之垤謬厠邱山臣素以凡庸幼乏師訓遭逢聖代志業無聞往昔建中之初佐戎南海屬陛下飛天御極拔異搜能臣謬居朝謁之中嘗備對揚之末臣於延英殿獻大禮賦一首特奉恩旨令臣自讀天顏咫尺芻鄙必聞一覽繁詞三蒙眷獎宣付史館列在圖書此微臣之榮一也尋屬賊臣希烈上表臣奉詔奔馳因茲淪陷臣忍死效節偷生竭忠分士伍以弱枝獻土地以強幹當元凶授首之際亂兵害帥之時玉石不分生殺未定初則傳臣及禍後乃知臣僅存陛下分命宰臣念形于色始臨軒而出涕終省表而再歡君上之慈古今未有此微臣之榮二也妖氛即殄飛詔追臣就拜銀青仍加金印授官華省列位聖朝萬死之中再肉白骨九泉之下獨見青天此微臣之榮三也去歲季春陛下與太子諸王賦詩見宴中書宣付遍示百寮凡在臣下無不奉和擢居第一唯臣一人獨荷殊旌乃蒙厚鍚光生御札榮溢天衢百辟具瞻萬人傳誦此微臣之榮四也臣本書生謬登清秩始詳刑政旋改轄司陛下不念愚蒙擢臣非次草奏之地忽降旌旄郎署之間遽遷方鎮此微臣之榮五也臣聞受寄崇者其勳大荷恩重者其感深今臣無迹可稱無功可紀纍承睿渥叨冒寵章草木逢春罔答陽和之煦昆蟲啓蟄寧知天地之仁將何以受陛下非次之恩答陛下殊常之造臣伏以黔巫遠僻山洞阻深地極荒陬人多逋梗不生五穀不識桑蠶迫之則鳥獸同㣥緩之則木石為伍臣謹當申明朝典宣布皇慈扇以仁義之風諭以君臣之道俾知教化或漸庶幾誓安遠人永清殊俗臣無任荷恩寵之至臣某言中使至伏奉某月日敕書及所部將吏僧道百姓等伏蒙聖恩慰勞并賜臣手詔及春衣兩副金縷牙尺一面大將衣若干者天眷遐臨恩波洊及跪承寵賞以懼以慙臣某中謝伏惟陛下德配二儀恩覃九有雖雲雨之施在物無遺而渥澤所加於臣為幸誠以任叨藩鎮才本庸虛威略不足以暢皇風政術不足以裨朝政顧慙曠職常用疚懷今又特降寵臣俯延殊獎頒以尺度承春令之溥臨賜以衣裳荷天慈之遠覆榮均將校慶被蒸黎歡心積于萬靈喜氣盈于五嶺臣往塵近掖負敗已彰洎守炎陬恩禮彌厚實懼無功之賜敢安逾分之榮仰戴鴻私捐軀寧報無任感恩瀝懇之至臣某言中使至伏奉敕書手詔并賜臣冬衣一副大將衣兩副者九霄垂露忽降天文萬里飛軺更頒盛服臣某中謝臣凡庸淺劣才不逮人謬荷國恩猥居方鎮自宣風撫俗猶未周星朝章已布于蠻夷聖澤載覃于遠道將士等干戈久戢歲月空深曾無橫草之功纍授賜衣之慶伏以陽和生植不隔薰蕕日月照臨寧分遠邇喜溢要荒之外榮均將校之中蚊蚋力微邱山難荷無任感戴兢惶屏營之至臣某言中使至伏奉某月日敕書慰問將士官吏僧道并賜臣手詔及冬衣兩副大將衣五十副者清禁絲綸特臨遠鎮中天雨露忽灑炎州感戴殊私抃躍無據臣某中謝臣頃踐臺司已招負敗洎分戎閫又寡威謀陛下黈纊闕遺含宏尸素恩深全宥德邁生成地偏而頒賜每臨節換而授衣先及王人宣勞降自烟霄宸翰昭融如瞻日月綢繆睿眷咫尺天顏三軍激踴躍之誠五嶺溢謳歌之響皇慈溥洽顧品物而均榮寵渥謬加在微臣而增懼非勤勞以受賜徒局蹐以祗恩灰壤為期豈云上報無任感恩荷懼屏營之至臣某言中使至伏奉詔書并賜臣衣一副金花銀碗二枚百索一軸大將衣兩副者大明生東無遠不照時雨潤物有形必霑臣某中謝伏以朱明屆節端午良辰寶歷叶於重離聖壽齊於兩曜臣凡愚賤質草木微軀謬居藩鎮之榮獲守黔巫之地豈意聖慈天覆不隔遐荒珍物出於九重麗服延於萬品臣與將校等雖備戎旅素乏勳庸當蠻徼廓清之時霑普恩頒賚之慶榮分閫外喜溢行間仰戴殊私罔知所報不勝抃躍之至臣某言中使某至伏奉敕書手詔并賜臣臘日藥物及銀合等千年聖歷忽降遐荒萬里天書更臨下土臣某中謝臣駑駘賤質草木微生謬荷國恩擢居方鎮按俗闕澄清之任臨戎無毫髮之功纍授殊私薦霑芳澤況靈長上藥列在仙方芬馥蘭膏出于中禁豈臣庸陋宜此寵榮感戴天恩不勝抃躍臣某言中使某至奉宣聖旨賜臣臘日香藥口脂等宸私曲被殊賜薦加祗奉恩榮荷戴惶灼臣某中謝陛下德施周普蠟百神而魚蟲不遺慈澤旁流錫㣥下而細微皆及謬承良藥之貺豈當同體之榮龜手既沐其芳馨香膏又霑于脣吻賁飾之道備幸于臣澤浹肌膚恩深骸骨撫心揣分慙厚施於天休賤質庸軀荷曲誠於元造實為僥幸何以克堪涓埃無補于綱維濡渥有加于蓬賤邱山惠重螻蟻命輕靦厚顏于死生覬忘軀而徇節臣某言中使某至伏奉宣賜臣紅雪口脂各一合降自重霄賚于賤品承旨慶抃省躬慙惶臣某中謝臣謬處準繩遂更律候每慙效薄常懼食浮豈謂特荷鴻私猥霑殊賜時當蠟臘澤浹幽微彩雪蠲邪無虞于美疢芳膏盡飾有愧于陋容徒罄丹誠不知上答無任感戴之至臣某言中使某至伏奉敕書慰諭并宣進止賜臣紅雪紫雪口脂等慶賜以時寵光逮下捧詔心悚承恩汗流臣某中謝伏以元律送寒清霜戒臘九天布惠萬類發生臣以庸虛謬當任使觀風未久按部無能而陛下俯念守臣恩同勳舊詔垂御札藥稟仙方降蘭澤以傳馨頒玉歷以示慶實慙固陋忽被光輝撫躬循已終夕愧厲謹當訓整師旅牧養黎氓敷雨露之恩宣日月之照俾瘡痍漸復江湖安流庶于涓毫上答山嶽伏惟皇鑒俯照丹誠臣某言去貞元五年於延英殿賜面辭之日親奉進止令臣一考即來者臣謬承聖獎猥守方隅自到黔中首末三年更入新正即及四載臣素以微生叨居重鎮恭行朝旨宣諭皇恩種落遠人庶幾於理伏以遐荒僻阻控帶諸藩溪洞蠻夷性本生梗木石為伍鳥獸同㣥寬之則伏匿山林不遵王命迫之則結聚蜂蠆害及邊陬臣于撫馭之間酌其中道示以威惠諭以憲章以清靜臨人以不擾為政開設學校令知君臣父子之道勸勉稼穡令知生成衣食之原減其征徭蠲其力役今國恩遠及夷落大安萬里勤王一方無事臣管內素多瘴癘山峽重深毒霧蒸雲常在窗戶四時多雨不識霜雪終歲陰昏少見天日出門無路舉目唯山猿鳥之心如在籠檻臣從去年冬初忽染腳疾膝脛頑痺行步艱難絶無醫人素乏藥物深山窮谷無處市求任重命輕何可言疾臣先奉進止一考令歸又準敕文二年與替臣今歲月以久疫癘交侵況奉綸言難堪更住臣久辭天闕戀切龍顏瞻望天門不勝涕隕無任攀戀切迫之至臣某言臣去貞元五年面辭之日親奉進止令臣一考即來臣謬荷聖恩擢居方鎮炎瘴之地首末四年恭守廟謀宣布皇澤唯以靜理惠恤遠夷今縣道宴清干戈罷戢雕題左袵萬里勤王溪洞之人無不樂業此皆聖上之恩豈是微臣之力臣從前年六月患腳膝行立艱難秋深以來更染風疾又從去年六月直至今日不見三光山谷昏昏終日陰雨吞茹瘴毒實所難堪伏奉敕文二年與替況奉進止一考令歸臣疾癘所侵氣力衰敗素無醫藥恐不支持臣伏見近日以來楊悅孫誠李速裴腆皆在遐裔相次喪亡特乞聖恩全臣性命許臣準敕歸赴闕庭再覩龍顏灰粉無恨臣去年十二月已進表陳乞情有至切再瀆宸聰伏乞天慈救臣疾苦不勝懇迫憂塞之至右臣伏以大電繞樞千年感聖神光照室六合歸尊恭惟降誕之辰實啓乾坤之祚普天稱慶率土同歡仰舜日而徘徊望堯雲而抃躍前件光明砂等金丹上品著在仙經願因不朽之姿永固長生之壽右臣伏以上元降聖之時皇帝出震之日天垂景曜繞北斗以呈祥人竭歡心願南山而為壽前件光明砂丹等管內所出服餌所尚生依仙谷誠有驗于仙方貢自蠻夷幸得充于御府臣藩守有限不獲稱慶闕庭某啓伏見詔書相公拜上台之位寅亮天工登翊王室弼成大化佇致和平叶一人夢卜之求副四海具瞻之望凡在中外孰不慶幸方今聖主文明天下思理兵革不舉于茲十年黎元有再安之望戎馬有歸牧之勢夫物應有兆機生其微制動者守乎靜求直者端乎表秉鈞者慎始而圖其終也相公天實生德錫我皇家禺禺蒼生延首以望蠻夷左袵亦仰無窮某受任遐荒職在邊鎮瞻戀欣抃無任下情某啓伏見某月日詔書伏承相公膺啓沃之心登輔弼之任人望已久天意下從休聲飇馳浹洽海內凡在士庶不勝慶幸伏以陛下文德聿修武功克靜祲沴不作升平漸階正可乘天時以創制因人事以立法天其或者必以相公乘啓聖之運致仁壽之期自然百度以貞九流式敘霜露所墜罔不開化蠢動含生皆遂其性致君堯舜何獨古人某受命荒服職在天涯瞻望喜躍無任下情某啓男元曜蒙恩授襄州參軍又奉七月初四日敕書令隨父準例支給料錢者恩生不次事出非常仰戴天慈伏荷仁德以欣以懼戰越交并伏以國朝故事及古名臣惠及黎元勳高社稷則有賞延于代祿及于家或總角腰章或垂髫結綬綺紈拜命襁褓分榮自葉流根蓋超彞典某繆承聖獎猥守方隅政教無聞典禮多闕男尚幼小濫厠班榮相公念以遐荒將與便近更許隨父仍給料錢榮超流輩之中賞過彞章之外退循涯分喜躍伏深限以所守拜謝末由下情伏增戰灼
