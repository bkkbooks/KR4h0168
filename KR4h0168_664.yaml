front:
  text: 全唐文欽定全唐文卷六百六十四白居易九
  hash: sha256:f9c5e896d8fbc1b949d564ca7302f7172c36dcd60b728e4f6f0d119ebf39a177
body:
  text: 勅王承宗朕臨馭天下及此五年三叛誅夷四方清泰不以功武自負常推恩信為先爾父云亡即欲命卿受詔而遠近方鎮內外人情紛然奏陳皆云不可朕以卿累代積勳賢之業一門有忠義之風功著艱危恩連姻戚雖中心是念而眾請難違可否之間久不能決然亦欲觀卿進退之禮察卿忠孝之心卿自罹閔凶屬經時月待使臣而動皆得禮奉章疏而言必由衷請獻官員願輸貢賦而又上陳密遠達深誠潔身而謀出三軍損已而讓推二郡斯有以得臣子之大節知君親之大恩卿心既然朕意亦定特加新命仍撫舊封今授卿起復左金吾衞大將軍檢校工部尚書充成德軍節度使恒州刺史恒冀深趙等州觀察等使兼御史大夫仍賜上柱國幷賜告身旌節等件想卿忠孝哀感兼深其德棣兩州以卿進讓元欲於卿親屬之內選授一人在法雖有推恩相時亦恐非便今所以除薛昌朝德棣兩州觀察使昌朝昔嘗事卿先父今又與卿親隣卿宜具以誠懷令報昌朝知悉卿今受命之後足得節制三軍使其不失事宜方見卿之忠藎昨者眾情易惑非卿不能効此誠㣥議難排非朕不能斷此意所宜保持大義勉勵遠圖深念斯言永副予望其當軍大將已下各宜特與改轉卿即條錄聞奏其官健等亦宜量加優賞想宜知悉勅茂昭盧校等至省所奏恒州事宜幷別論情陳獻者具悉卿望重勳賢寄崇藩鎮謀參廟算寵接國姻累上表章繼陳誠永言智畧已見匡濟之才載念公忠益表感知之志若非勞瘁憂國義勇忘家則丹赤之心不能至此想風興嘆至於再三所緣恒州事宜朕亦思之甚熟但以武俊率身仗順於國有功忠勳所延宜及後嗣承宗又密陳深遠獻忠誠既念舊勞已降成命計其奉詔必合感恩如或乖違續有商議卿宜以睦隣為事體國為心想卿誠懷當悉朕意勅師道省表具悉卿業重相門位崇戎閫忠輸於國行著於家久而益彰嘉嘆無已所奏亡兄師古請列於私廟昭穆者此乃心推孝友誠切恭敬覽表見情深足嘉尚但以祠廟所見貴於禮成師古雖則始營至卿方行祔禮即卿為廟主固合其宜况師古爵位尊崇宏選自合祔廟別立祠宇使其主之奉以蒸嘗亦非乏祀也已令有司重議如此頗謂得中且叶禮經卿宜知悉勅師道朱何至省所奏當道赴行營兵馬取正月過渡河逐便攻討幷奏兵馬出界後請自供一月糧料又奏待收下城邑若有軍糧一月已後續更支計幷陳謝慰問者具悉卿文武間生忠貞特立動有所効知無不為昨獻帛助軍極盈數於萬匹今又賫糧出境減經費於三旬此乃力之所任無不罄竭慮之所及無不經營因時見憂國之心臨事識忠臣之節詔書慰諭未盡朕懷章疏謝陳益嘉乃志再三興嘆寤寐難忘其所奏聞竝依來表想宜知悉勅於陵省所賀安南破環王國賊帥李樂山等三萬人者具悉卿蠻夷犯疆方鎮致討兇徒喪敗荒徼清平卿素蘊忠誠又連封壤疾既同於山藪勢益壯於輔車想聞捷書當倍慰愜載省所賀深見乃懷勅希朝省所奏請自部領當道兵馬一萬五千人取蔚州路赴行營幷奏土門及承天軍各添兵士備禦者具悉卿武毅雄才忠貞大節出為良將倚作信臣約已徇公忘身許國忿違命不恭之寇激勤王自効之心親統銳師率先㣥帥况又周知要害備設防虞計其威聲已振兇醜有臣如此朕復何憂佇建殊功以副深望所有動靜宜數奏聞想當知悉勅劉濟李臯至省表及露布十二月十七日劉緄部領當道行營兵馬收下饒陽縣城破賊眾三千人幷擒斬將校收獲馬畜器械等兼送賊將朝履清等四人又進所收饒陽縣等者具悉卿盡忠伐叛發漁陽精銳之師緄仗順臨戎討冀方昏狂之寇詔下而父子戮力鼓行而將卒齊心先㣥帥以啟行首諸軍而告捷連擒逆將亻併下賊城歸獻罪之俘囚進已收之縣邑可謂忘身徇國盡禮事君疾風知偃草之心大雪見貞松之節况表章之內益嘆恭勤而眷想之間如觀風采計茲兇醜當已震驚破竹之勢可乘覆巢之期非遠佇清大憝重副深懷其饒陽縣卿宜且令鎮守稍加存撫用勸將來宋常春卿所密奏具委事情且宜叶和以體朕意故令宣慰想當知悉勅季安省所奏當道行營兵馬今月十七日已收棗強縣其賊棄城夜走者具悉卿輸忠報國嫉惡忘家遣無敵之師伐不襲之寇軍聲遠屆先路以風行逆黨潛知棄城而宵遁已收縣邑益振兵威此皆卿訓練所加指麾有素永言明効實屬深懷固可乘勢應機逐便進討以卿忠藎當副朕心勅希朝張嘉和至省所奏前月二十六日破逆賊河湟鎮六千餘人具悉卿親領統師誓誅逆黨張軍心以吞敵奮士力而指蹤潛戒偏裨先攻險阻伐謀而事有成算剋日而動不愆期果敗兇徒遂據要地况殺傷既重收獲頗多益壯軍威可奪虜氣佇聞掃蕩以慰衷懷勅從史曹公乂至省所奏今月三日柏鄉縣南破賊眾約三萬人幷擒斬首級收獲器械及馬等又奏當軍所傷士馬數幷量事優卹事宜具悉卿外揚武畧內竭忠謀率有名之師深入其阻遇無狀之寇大挫其鋒兵刃屢加捷書頻至殺傷數廣績効居多非卿悉力摧兇誓心報國則何能指麾之下動必成功表奏之間事皆審實既光重委益副深懷嘉嘆再三不忘寤寐所奏承璀出軍合陣幷續發露布事宜具委所陳想當知悉勅季安許峯至省所奏具悉卿勳親重德台輔元臣竭誠信以戴君宏識度而體國謀能竭慮言必盡忠周覽表章益增寤嘆吳少陽自參軍務頗効恭勤豈待奏陳已有處分想宜知悉勅昭義軍節度下將士等卿等當軍將士與諸道不同自經艱難多易將帥而忠順之節未嘗有虧朕每思之無時暫忘盧從史為卿主將作朕藩臣權位尊崇恩寵優厚而乃外示恭順內懷姦邪刻削軍中暴殄境內朕以君臣之道未忍發明為之含容頗有年月近又苟求起復請討恒州與賊通謀為國生患自領士馬久屯行營收當軍賞設之資加本道芻粟之估不為公用盡入私家此則主將之恩於卿何有臣子之分負朕日深卿等辨邪正之兩端識逆順之大義抱忠勇者恥居其下守名節者憤發於中失三軍之心已聞大去犯衆人之怒果見不容遠察事宜備知誠興言嘉嘆至於再三其當軍將士等賞設己有處分上自將校下及士卒各勵爾志再思朕言卿等承前以來常保忠貞之節自今以後永為心腹之軍宜念始終副茲矚望故令宣慰宜竝悉之夏熱卿等各得平安好遣書指不多及勅承璀卿總領禁軍控臨戎境見敵每張其勇敢因事益表其忠勤言念在懷發於寤嘆昭義軍將士等去邪遠惡仗義保忠統其成師宜得良帥孟元陽夙懷武毅累著功庸威名甚彰人望所屬以之為帥必愜軍情以之討賊必有勳績今授元陽檢校尚書右僕射充昭義軍節度等使未到行營間其昭義軍卿宜切加宣撫務使安寧烏重允職在偏裨保於忠正宜從獎擢以表殊恩今授烏重允河陽節度使兼御史大夫卿亦宜諭此恩意令知朕心兼恐河陽無人速宜進發想當知悉勅元陽澤潞全軍方討恒冀盧從史虧失大節包藏二心姦迹邪謀日已自露軍情物議俱所不容尋追赴朝今已在道朕以昭義將士忠順成風况在行營久勤戎事今欲使其戰者奮發居者悅安共成大功必在良帥以卿有澱水之勳効有河陽之政令思之甚熟無以易卿宜領重藩仍遷宗秩今授卿檢校尚書右僕射充澤潞節度等使幷賜旌節告身等往卿宜速發先到潞府上訖便赴行營慰安軍心宣諭朕意烏重允徇忠守節宜加獎用今便授重允河陽節度使兼御史大夫想宜知悉勅昭義軍節度下將士等卿等久在行營乍無主將而士旅輯睦軍壘安寧足彰守正之心尤見盡忠之節以此嘆矚勞於寢興孟元陽是朕信臣為國良將威畧可以攝兇孽慈和可以牧師人累著忠勤克諧朕命為其主帥必副㣥情况卿等同嫉姦邪久困貪暴宜以仁賢之帥撫卿忠義之軍靖思元陽無出其右今授元陽檢校尚書右僕射充卿等當道節度使勉同王事以慰朕懷烏重允特効忠誠深宜獎擢今便授河陽節度使兼御史大夫故令宣慰竝宜知悉勅師道林英至省所陳奏幷進王承宗與卿書者具悉王承宗童騃無知兇囂有素雖藉祖父之寵曾微分寸之勞但以武俊勳在冊書姻連戚屬朕獨排㣥議特降殊私未卒父喪使承祖業即加新命仍撫舊封則朕於承宗恩亦至矣而偽陳誠款欺誑使臣假託軍情拒違詔命則承宗於朕罪莫大焉悖理亂心暴於天下此乃承宗千國家之紀非朕忘武俊之功遂至用師蓋非獲已仍開生路許以自新而梟音不悛鴟張益熾人情共棄國典不容在於朕心安敢輕捨卿既膺注意義感酬恩所獻表章具已詳覽慮深遠計詞切讜言在忠謀而則然於事體而未可誠嘉勤志難允懇懷今諸道將帥親領士馬深入寇境頻奏捷書四面合圍一心旅進窮迫已甚覆滅非遙况卿同遣司徒已收縣邑冀清氛孽佇建功名勉於令圖副此矚望勅師道任文質至省表具悉盧從史頃者請率全師誓清妖孽推誠待物許之不疑而背恩於上結怨於下邪謀貳志日以彰聞虧大節而自絕於君積㣥怒而不容於眾因以邀命幸而脫身屈法申恩已有處分昨者詔旨已明示卿卿體國為心事君盡力固宜有聞必薦有見必陳竭其忠諒之誠濟其獻替之美省閱章奏嘉嘆良多勅執恭王克謹至省所奏今月八日進收平昌縣已令鎮守幷奏劉濟欲與卿約義事者具悉卿奉辭伐罪仗節啟行指顧偏裨收復城邑已令鎮備兼務緝綏威惠之方既明弔伐之義斯在永言倚任彌注衷情劉濟將相大臣與卿先父同列欲求契約固合允從豈惟繼好私情亦足叶心王事載省來奏深鑒乃誠至於寢興不忘嘉矚勅承宗頃者盧從史包藏姦詐矯示公忠下誣物情上惑朝聽使卿陷於違命使朕至於用兵交亂君臣罪有所在今從史已正刑典遠棄驩州搆亂者既就屏除誘陷者自宜明白况卿代連姻戚朕豈不思祖有功勞朕豈不念事不得已勢至如斯棄絕以來常懷憫惻卿今既陳章疏懇獻衷誠請進官員願修貢賦誓心以納歸罪而責躬情可哀憐法存開釋朕託於人上及茲六載體天地含宏之德厚君臣終始之恩常以人安為心豈欲物失其所今所以開獨見之路降非常之恩卿及將士等已具制書竝從洗滌卿仍復舊官爵便充恒冀深趙德棣等州節度觀察等使幷賜旌節告身等往爵土仍舊君臣如初想卿中懷當自知感所宜追補前悔勉勤後圖夙夜思之永副朕意想當知悉勅吉甫韓用政至省所奏陳謝具悉卿忠貞立身文武為德志惟經國謀不忘君才可以雄鎮方隅故委之外閫智可以密參帷幄故任以中樞而能一其衷心再有沖讓雖勞謙彌切每陳丹府之誠而憂寄方深難輟紫垣之務勉諭己伸於前詔忠勤載露於來章今征討己停方隅稍泰克清之日雖則不遙難奪之心亦宜且抑重此宣慰當體朕懷是推至公煩有陳謝勅劉濟省所謝男紹及孫景震等授官幷謝賜器仗弓甲刀斧等者具悉卿文武全才將相重任本於忠諒成此勳勞尚德尊賢位已極於台輔念功懋賞寵宜及於子孫時論允歸朝章斯舉至於出茲戎器賜我元臣但可以申朕恩私未足以表卿功績載覽來表備見乃誠併此謝陳益嘉勤藎勅鄭絪省所奏邕管黃少卿及子弟等事宜具悉卿望重中朝寄深南服誓敷惠政佇化遠人言念忠勤不忘監寤山洞夷落易擾難安比來撫之未及其道覽卿所奏頗合其宜歲時之間當革前弊勉於招諭以副朕心勅劉總卿業繼將門才兼武畧累臨軍郡悉著良能襲以弓裘宜加旌鉞仍舉奪情之典以昭延賞之恩今授卿起復雲麾將軍檢校工部尚書充范陽節度等使幷賜旌節官告往想宜知悉勅茂昭王日興至省表陳讓檢校太尉者具悉卿文武大僚勳戚重望累展朝宗之禮足表恭敬之心况多戰伐立功彌彰勤藎言念及此每用嘉焉宜加寵榮已降新命何至謙讓仍辭舊官眷倚之懷竝具前詔想宜知悉勅劉總康志安至省所奏陳具悉卿之先父為朕元臣大節殊功沒而不朽宜加恩禮俾洽哀榮故命宰臣為之撰錄卿義深報國孝重承家既感顯親之恩願竭戴君之節遠有奏謝益用嘉之想宜知悉勅房式卿以良才尹茲東洛公忠無怠聲績有聞嘉嘆之深寧忘寤寐宣城重寄深在得人藉卿政能往就綏撫今授卿宣州刺史兼御史中丞充宣歙等州都團練觀察處置等使幷賜告身往卿宜便起赴本道勉修所任以稱朕懷想當知悉勅盧恒卿累登朝序皆著公方自領藩條益彰理行恪恭而奉上勤儉以牧人不加寵榮何勸來者朕以擢管漕運軍國所資其務甚殷所寄尤重以卿有忠勞之前効幹濟之長才常簡朕心宜授此職今除卿尚書刑部侍郎充諸道鹽鐵轉運使幷賜告身往宜即赴闕庭想當知悉勅薛萃楊君靖至省所陳謝具悉卿勤王之節徇公滅私事主之誠移忠資孝苟非襃贈何以顯揚且清白之風既自家而刑國則寵旌之澤宜因葉以流根式遵追遠之經用表教忠之訓是為禮典煩致謝章勅嚴礪薛光朝至所陳謝具悉卿徇公竭誠臣節克著揚名濟美子道有光教忠既本於義方追遠宜崇於禮命俾優襃贈爰慰孝思秩貴冬官以表過庭之訓封榮石窌用旌徙宅之賢雖示新恩允符舊典遠煩陳謝深見懇誠勅餘慶省所謝陳具悉卿累居袞職時謂盡忠自尹洛師日聞報政臣節既彰於宣力子道莫大於揚名俾光孝思爰舉禮命榮襃冡宰寵賁幽靈式是彞章豈為私渥有煩陳謝深見誠懷勅從史楊幹至省所奏今月七日到潞城縣降雪尺餘兼奏耆老等詣闕請欲立碑幷手疏通和劉濟本末事宜者具悉卿分朕之憂求人之瘼時降大雪豐年表祥豈惟澤及土田將使物無疵厲休慶斯在慰望良深耆老等遠詣闕庭請立碑記尋已允許當體誠懷以旌政能無至陳讓知卿洽比其隣翼戴為意陳此手疏發於血誠忠懇彌彰嘉嘆不已永言臣節何日忘之想宜知悉勅韓皋省所陳賀具悉卿朕自守睿圖每思寬政慮先禁暴念在措刑李錡負國反常阻兵干紀未勞師旅已就誅夷卿宣力納忠秉心嫉惡遠陳慶賀深見懇誠想宜知悉勅元衡卿立身許國竭力匡君人之具瞻予所嘉賴凋殘是恤遠藉宣風之能利澤所資暫輟為霖之用慈和既敷於兵後惠信當洽於言前永念忠勤豈忘寤想計卿行邁已到西川涉遠冒寒固甚勞頓勉加綏撫以副朕懷想宜知悉勅顏証戴岌至省所賀及謝王國清充五嶺監軍具悉卿職在撫綏任兼備禦公勤夙著聞望日彰言念於懷豈忘寤寐乾象昭感壽星垂文與時相膺有道則見顧慙非德何以當之卿戎旅事殷宜有監領蓋為常例煩至謝陳想宜知悉勅從史省所陳謝追贈亡母幷舉薦韋悅具悉卿推誠奉國積慶成家既彰盡節之忠宜洽流根之澤雖祿難逮養已閟靈於九原而孝在顯親宜旌賢於三徙俾崇封贈以極哀榮韋悅既有才能又所諳委卿即發遣令赴闕庭卿之忠誠朕所識察豈待陳露然後知之載覽來章益嘉懇切想宜知悉勅季安省所陳請具悉卿朕纂成鴻業司牧蒼生僅致小康未臻大化實慚薄德未稱崇名而華夷兆人內外㣥后屢有勤請難於固違卿遠獻表章明徵典訓納忠於上歸美於君勉從懇誠良用愧悵儲貳者上繼宗祖下貞邦家心豈暫忘事或未暇尚阻來請當體所懷勅高固卿奉國戴君必竭忠節統戎護塞克著勳勞自領藩垣委之心膂忠慤之志久而益彰欽嘆在懷何嘗暫忘以卿一從軍旅多在邊陲歲月積深勤勞滋久所宜出入中外周旋寵光今授卿檢校尚書右僕射御史大夫兼右羽林軍統軍以端揆之崇兼環衞之帥遂卿望闕之戀表朕念功之心仍賜卿官告卿宜即赴闕庭想宜知悉勅茂昭盧校至省所奏請上尊號及建儲闈賀誅李錡竝進馬者具悉卿朕以寡德祗嗣丕圖雖至小康豈稱大號迫於人望遂抑予懷永惟強名實愧虛受儲貳者上繼宗祖下貞邦家心非暫忘事或未暇尚阻來請宜體所懷李錡包藏禍心奮發兇德不勞征討自就誅夷想卿忠誠倍以為慰所進馬馴良可尚服御且閒取其戀主之心足表為臣之節再三省覽嘉嘆久之想宜知悉勅柳晟卜英琦至省所奏慶雲幷進圖者具悉昌運將開祥符先見發自和氣聚為慶雲捧日而五色相宣垂天而萬物咸覩斯為嘉瑞宜契昇平朕方致小康未臻大化受茲方貺祗惕良深卿以誠事君推美奉上獻輪囷於圖畫陳懇款於表章披閱再三彌增嘉嘆卿久鎮邊防初膺閫寄式旌勤効俾洽恩榮裦德念功故進封以示寵忠誠亮節宜因實而錫名既表新恩亦惟舊典今改封卿丹陽郡王仍改名忠亮勉勤乃事以副所懷想宜知悉勅崇文段良玭至省所謝亡妻邑號具悉卿有濟時之勳寵居袞職士政承積善之慶列在王官俾洽恩光故加襃贈念梧桐之早落不及夫榮追芣苢之遺芳宜從子貴式崇寵命以賁幽靈省茲謝章良用嘉嘆勅希朝劉忠謹至省所奏沙陀突厥共一千八百七十人幷駝馬器械歸投事宜具悉卿以將帥之才鎮華夷之要憂勞為國忠勇忘家聲動寇戎塵清封畧突厥等嚮風輸款率屬來賓雖慕我懷柔遠無不至亦因卿威惠導之使來念其歸投宜有優賜今賜衣服及匹段等自首領已下卿宜等第給付其部落家口等遠經跋涉宜稍安存以勸歸心用副注意勅元衡省所奏當管南界外生蠻東凌六部落大鬼主苴春等以所管子弟百姓等二千餘戶請內屬黎州幷奏南路蕃界消息者具悉卿以文武之才兼將相之任仁和下布黎庶獲安威惠旁流蠻夷率附勳勤所著倚賴彌深欽矚之懷豈忘寤寐生蠻部落苴春等久阻聲教遂此歸投願屬黎州請通縣道勉於撫慰以勸將來所奏蕃界事宜具已知悉戎虜雖聞喪敗封疆不可無虞亦宜隄防用副憂矚勅陸庶省所奏當管新開福建陸路四百餘里者具悉卿望重周行寄分越徼嘉聞素著茂政累彰况勤可使人智能創物廢驚波之路開砥石之途舍舊謀新以夷易險財力不費商旅斯通惠既及人動非擾下績用可尚欽嘆良深勅宗儒卿邦家楨幹班列羽儀嘗作股肱弼諧無怠及司管籥鎮靜有方欽重之懷寢興不捨春官之長非賢不居既簡朕心亦符人望今授卿禮部尚書幷賜官誥往除餘慶東都畱守卿宜便與交割即赴上都想宜知悉勅希朝省所奏党項歸投事具悉卿邊隅寄重閫外事繁威行而軍聲外揚信及而戎心內附動皆展効進必盡忠勞績彌彰倚望尤切党項拓跋忠敬等頃雖為盜今已經恩懼而歸投情可容恕計其後効以補前非卿宜安存無使疑懼其磨梅部落等尚能繼志亦許自新宜加招諭令知朕意勅韓宏任光輔至省所陳請具悉卿文武全畧邦家重臣自居大藩厥有成績輯寧百姓嚴整三軍使予無憂惟爾之力省茲章奏懇願朝宗誠嘉深衷難遂勤請朕以梁宋之地水陸要衝運路咽喉王室藩屏人疲易散非卿之惠不能安師眾難和非卿之威不能戢今眾方悅附人又知歸鎮撫之間事難暫輟雖戀深雙闕積十年而頗勞然倚為長城捨一日而不可勉卿忠力布朕腹心宜體所懷即斷來表勅嚴礪省所奏進蒼角鷹六聯具悉卿任重列藩寄兼外閫事皆奉上動必竭誠時屬勁秋致茲鷙烏調習成性進獻及時取其効用之能足表盡忠之節勅韓宏卿苦心奉國極慮撫人惠彼一方於茲十載歷展勤王之効累陳戀闕之誠才以任彰節因事著不加殊寵何表成功夫外擁旌旄爪牙之任重內參台袞股肱之寄深以爾一心授茲二柄永言倚賴當副誠懷今除卿同中書門下平章事依前宣武軍節度等使餘竝如故幷賜官告往想宜知悉勅季安劉清潭至省所奏貝州宗城縣百姓劉宏為母病割股充祭事宜具悉卿任重弼諧寄深鎮守勤撫綏之政贊燮理之功至使部人忘身展孝雖因心有感誠化我之時風而率下可知足表卿之理行省茲陳奏欽嘆良深勅茂昭盧校至省所陳奏具悉卿翼戴君親出入將相久專戎閫累覲王庭忠勞必竭其智謀誠懇每形於章表近者志在憂國慮及安邊請率精兵親防黠虜朕以卿當管軍鎮寄重事殷實藉撫綏用安封部雖未允所請而深嘉乃誠今又密奏恒州具申事體曲盡忠勤之節備知丹赤之心言念再三發於嗟嘆眷重之至併在予懷想宜知悉勅孟陽卿夙懷才畧早振聲猷歷踐班行累彰績效自守關輔克舉藩條惠及蒸黎威行軍鎮永言所任未展其能朕以東川蜀門重鎮弊承軍後雄壓險中思得忠勤之臣撫此凋殘之俗量才注意無以易卿今授卿劍南東川節度觀察使幷賜官告往想宜知悉勅韋丹竇從直至省所陳賀竝奏江饒等四州旱損其所欠供軍畱州錢米等竝巳放免又奏權減俸及修造陂堰並勸課種蒔粟麥等事宜具悉朕頃緣時旱慮害農功雖推咎己之心敢望動天之德而未逾浹日膏澤霈然仰荷元休俯增祗惕卿喜深稱慶忠切分憂既覽賀陳兼詳奏請至如蠲逋以卹人隱減俸以濟軍須抑末業而移風務茲菽麥防旱年而歉雨修利陂塘皆合其宜竝依所奏非卿公勤奉上仁惻發中則共理之心不能至此再三興嘆一二難申勉於始終以副朕意想宜知悉勅從史史澣至省所陳謝具悉卿亡父早踐班榮久著偉績永言襃贈自叶典常况卿孝友承家勤勞事國念茲忠節皆稟義方將慰匪莪之心宜流自葉之澤豈為殊渥頻至謝章勅孫璹劉德惠至省所進隴右地圖兼進戰車陣圖車樣及奏陳收復河湟事宜者具悉卿尹茲右輔固乃西疆創制戎車繕修軍實思收故地誓立殊勳載覽陣圖兼詳所奏誠得開邊之畧益加報國之心斯謂盡忠彌增注意眷言所至無忘於懷勅李良僅卿久在軍門習知邊事居常恭恪動必忠勤眷乃才良可分憂寄今授卿延州刺史兼安塞軍使幷賜官告往延州既兼軍鎮且雜蕃戎防遏撫綏兩須得所宜勉所任用副朕懷勅崇文卿忠廉立身簡直成性董戎長武邊候久安授律西川兇徒蕩滅是以寵崇外閫秩進上公而能省事安人多方撫俗諭朕念功之旨勉其師徒宣朕卹隱之心慰彼黎庶威力無暴功成不居累陳表章懇請朝覲雖殿邦之寄重誠欲藉才而望闕之戀深固難奪志且嘉且嘆彌感於懷屬時候嚴凝山川修阻永言跋涉當甚勤勞佇卿來思副朕誠望想宜知悉冬寒卿比平安好遣書指不多及
