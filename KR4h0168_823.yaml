front:
  text: 全唐文欽定全唐文卷八百二十三黃滔二
  hash: sha256:f90849064e327e8489f86e3b8c49f940b125eef684b7cd79ad4a084aa14e4ff9
body:
  text: 謹獻書狀元先輩聖人之道沒必假後賢以援之故天將假後賢以援之必先否其人之數而後克亨其道苟知厥理繇是得而言之且咸通乾符之貢士其有德行文學人地如先輩而在舉場則其舉罕再而先輩在舉場逮二十年何哉是知天否先輩當年之數以亨今日之道假於春官天官之網首冠㣥彥基我中興使天下之人翕然嚮風奔走慕義以偃干戈豈不然乎今俾天下之人奔走瞻之為龍門管鑰宗伯之處士也莫不俟我之啓某頃者頻試於小宗伯姓名罔為人之所聞然多受知于前輩故安州鄭郎中江陵蔣校書謂所業賦偶公道必為宗師之薦宗伯之求某佩斯言十有五年矣幸蜀之後東蟄閩越洎前年榜伏覩先輩榮登逮王先輩希龍之還敬話先輩之道某熟得而知勉某提攜所業直扣門仞昨某之來也朝及京師暮期刺謁今幸于此遽獲贄投果蒙先輩逾涯越等加之賞録更許薦拔充宗伯之所求則二賢之言斯驗矣若某則已登選於今日也某草澤單寒無門報德且世之感恩謝知罔不率以殺身為之辭夫殺身之期是待知己於患難某今感先輩之恩知謹唯銘刻肌骨故獻書於座右以陳露之伏惟始終憐察焉不宣某再拜蒙示盛文拜納之日焉可無言滔不業文誠可儷偶其辭以贄方寸既再而思夫儷偶之辭文家之戲也焉可齎其戲於作者乎是若揚優喙干諫舌啼妾態參婦德得不為罪人乎是乃掃降聲律直寫一二強名曰書幸垂聽覽頃越之苧工遊蜀之錦肆錦工以之示肆人皆哂越工曰誠紝雪之與梭霞異諸然其經緯之如此文章之若彼咸言其極滔今獲閣下之文雖莫我知亦庶幾於越工之言蜀錦至如典謨之比寧敢輒言若復韓校書兩寓沈先輩永崇高中丞安邑劉補闕己上十篇書指陳時病俗弊敘述飭躬處己講論文學興廢指切知已可否雖常人俗士聞見之亦宜感動況吾曹乎則知綿十舉而未第者抑有由也夫以唐德之盛而文道之衰嘗聆作者論近日場中或尚辭而鮮質多閣下能揭元次山韓退之之風故天所以否其道窒其數使若作騷演易皆出於窮愁也復何疑焉今之人皆謂番禺駢寶貨遊者或務所獲滔之來也得閣下之文為至寶奇貨充所獲豈不厚於它人哉願閣下脂轄躍轡薦計貢闈高取甲乙然後使人人知斯之寶貨異於是也元次山韓退之之風復行於今日也無令鄭濬孫泰李瑞閔廷言陳嶠數公寂寞而已幸惟志之不宣滔再拜隔違之久每思陸凱之風雅馨香故人秦樹吳江梅花一枝為之寓滔無陸君之風雅有古人之馨香越山台嶽去年輒以詩八首為之贄昔陸氏蔑范君之報今滔切希畋之瓊瑤不知何以勝據焉況四始六義之莫備匪萌是望伏蒙希畋錫以長箋飾以過詞不勝其驚悸而後踴躍也敢一一陳之滔始者匠故交之為詩希劉咸通季初貢於小宗伯試禹拜昌言賦翼日罷特持斯賦於先達之門忽叨見錢之目原注俗云以詩為末錢而市物以賦為持錢而市物是時張喬許彬林希劉皆咸有詩名而退飛不己滔既竊其目尤疹二三子落空拳之所不敢俟終日遂更以賦數年以賓榻之無才畫勝景之多餘暇不能忘情於舊輒薦披榛焉於以寓誠敢期希畋之是知乎錫以長箋飾之過辭初捧之而驚悸旋諷之而踴躍踴躍之會如見古賢焉何也希畋示以先立行次立言言行相扶言為心師志之所之以為詩斯乃典謨訓誥也且詩本於國風王澤將以刺上化下苟不如是曷詩人乎今以世言之者謂誰是如見古賢焉況其籠絡乎天地日月出沒其希夷恍惚著物象謂之文動物情謂之聲文不正則聲不應何以謂之不正不應天地籠萬物物物各有其狀各有其態指言之不當則不應由是聖人刪詩取之合於韶武故能動天地感鬼神其次亦猶琴之舞鶴躍魚歌之遏雲落塵蓋聲之志也琴之與歌尚爾況惟詩乎且降自晉宋梁陳己來詩人不可勝紀莫不盛多猗頓之富貴謺隋侯之珍不知百卷之中數篇之內聲文之應者幾人乎大唐前有李杜後有元白信若滄溟無際華嶽於天然自李飛數賢多以粉黛為樂天之罪殊不謂三百五篇多乎女子蓋在所指說如何耳至如長恨歌云遂令天下父母心不重生男重生女此刺以男女不常陰陽失倫其意險而奇其文平而易所謂言之者無罪聞之者足以自戒哉逮賈浪仙之起諸賢搜九仞之泉唯掬片冰傾五音之府只求孤竹雖為患多之所少奈何孤峯絶島前古之未有咸通乾符之際斯道隟明鄭衛之聲鼎沸號之曰今體才調歌詩援雅音而聽者懵語正道而對者睡噫王道興衰幸蜀移洛兆於斯矣詩之義大矣哉若滔也誠未足與言而已矣自向叨希畋珠邱金穴口諷心降之言其復家傳奧言身周雄文者乎乃惶惕銘戴之無窮伏惟察而憐之不宣滔再拜故表丈遺文盛敘古人之重存歿爰捧諾金感涕之誠實刻肌骨然以郎中十五兄相逢京輦得志金蘭雖備熟於行文恐未周於平昔而滔以內外之戚始終所詳敢以小才為之前敘誠以麟經下筆諸生不合措辭而馬史抽毫漢代還陳別録伏惟慈造必踐前言西望禱祈可以鑒料滔體物非工屬詞無取每欲效顰於越女常思裂撰於靈光今者先輩提江筆以雲飛擲孫金而羽化賢愚塞望遠近騰聲凡是懷刺來人操觚學者莫不競為市詣爭作鏡窺所以恥不遊門勇於執鞚遂投鄙拙上瀆精奇佇聆架屋之譏莫俟披沙之諭豈料蔑聞撫掌翻獲知音林先輩至伏話仁恩超越涯分對彼鶯遷之侶當於鳳集之時遽起蘭言爰開金口大垂激發曲賜吹噓榮邁序都事逾折簡傾身聳聽局影瞻風如飛冰雪以清心若韻笙簧而到耳感深旋泣喜極增憂未知腹蟹行踪巢蚊寓跡獲采片言於叔向何酬一字於仲尼雖切朝暾尤如夕惕然而伏念近世以科網英髦榜張取捨雖例從都試實採自衆聞故其負藝而來懷才以至是皆閽投哲匠神拜先鳴苟有所稱便馳殊譽然後方冲桂月遞躡蓬山如滔今則有此遭逢受此奬録來從特異出自非常便可釋疑永將去惑雖慙陋質粗抱丹心既得地以戴邱倍推誠而倚玉在面陳而莫盡於筆寫以寧周攀感依投不任榮懼謹詣宅祗侯起居陳謝滔學異生知才非夙搆雖叨進取莫俟遭逢郎中模楷詞林梯航名路每慮或遺於片善常憂不採於一言比者伏蒙曲念虛蕪榮流咳唾誨以磨鉛未至刻楮非工冥心於雪夜花朝空徵六義屬意於國風王澤罔造二南將令罷課緣情回從體物伏自穰城去騎灞岸歸蹄時邁青陽景融朱火於是凝神扣寂閉跡探幽蓋希副非次之恩知非敢切平生之志業昨者伏遇南宮拜命北闕朝天豈惟上賀於高翔仍喜旁陳其末藝永期指教畢願攀依而以淺近懷慙雕鐫積愧前而復卻決以還疑空眷戀於門牆竟遲回於書幕今則難逃皎鏡須詣平衡冀分妍醜之姿式定重輕之品伏惟特固朝暾之旨俯憐夕死之心薦賜發言重將辨惑臨風股栗伏紙心忡傾寫依投不任激切試賦一軸謹詣宅祗候陳獻伏惟郎中樂府至音儒家上瑞既負雄文於卓絶仍搜律韻於精微始者袖入名場騰於人口以謂若生逢孔氏偃商則失於四科出值毛萇周召乃慙於二雅實己當千莫讓而又恥一不能復以餘波濡於體物字字竝凌雲之勢篇篇皆擲地之聲大使前哲懷慙專工積愧滔業非精至藝本雕鐫猥蒙仁恩曲賜借示自旬日己來齊心繕寫沐髮吟哦愈盡頭風沉成心醉且杞國回船之妙千古所稀而泥金為寶之奇三篇不偶是何摛華若是翻驚失手於斯則知用兵而管仲三奔射策而孫宏十退豈戰之過蓋時所違此乃今古元機聖賢定數契日月虧盈之理等陰陽升伏之期用以否其道而泰其身窒於前而通於後逮今一人側席四輔求才則煥爛除書飛入雲山之裏昭彰懿德馳歸省闥之中徒恨傷麟終幾失馬若無往歲焉有茲辰遂使一換寒暄三更揚歷頭居東署首列西曹皆是重難無非清顯既明前事因卜將來佇當潤色絲綸翺翔近密輝飾於典謨訓誥啓陳於堯舜禹湯鎮壓澆風恢張吾道凡居進取皆切攀祈況處恩知豈任禱祝所歸公望非自私誠賦集謹詣宅起居陳納滔伏念高為碧落詎側管以能窺深作滄溟固持蠡而莫測焉可爰齎瑣智直杖小才敘昴宿之鍾蕭述尼山之降孔既將越禮誠可加刑然則有曠代之遭逢獲千年之際會設若旁扄辨囿內遏言泉不惟上負於良時抑亦下辜於卑志是致齊身搦管沐髮裁辭伏惟尚書象外三山人間七寶體天地方圓之製法陰陽升伏之機自從見作人龍翔為鳥鳳騰輝瑞牒流慶皇家文章則游夏固遷事業則伊臯周召飛揚天上踐履朝端且自古六官所重莫先於吏部逮今二職所難無出於侍郎而尚書五陟東西兩司銓管矧復品量庶彙選度㣥材載萬乘之安危繫四方之休戚晉魏則大難斯地國朝尤不易其人歷數除書少聞再命朝廷不欲止於鴛省便入鳳池須加分閫之尊用飾作霖之盛特以番禺巨壤南越名區外控蠻陬旁通番貨昔者石門酌泉之事合浦還珠之風日月遷綿規程革易以尚書勵辭玉留錢之節執投香載土之心用將揭二賢廉潔之波新五嶺崎嶇之俗俾以佩豹韜而直下建龍節以遐征非止鎮臨且申龜鏡昭然足驗儼若可觀然後飛驛騎以徵黃降鵠書而命說恢張帝道陶冶生靈所以知高祖創基太宗纂業更得無疆之祚仍歸有截之風何以言之伏以尚書萬頃包含千尋峭拔膺嶽峻河清之數切飲冰食蘗之誠識洞古今居無喜慍將以鏘履聲而朝紫殿擴心稱而啓洪鈞自然道臻於堯舜羲軒時復於禹湯文武百蠻向化萬國歸心雖在愚蒙亦能辨識而滔器同魏瓠凡若莊樗握無蛇口之珍額有魚身之點今者遽持幽賤獲覲旌幢兢營方忝於拂塵奬遇旋叨於薦賦且凡開場試士就鋪屬詞從物外之課虛向燈前以應限縱若仲宣閣㣥公之筆長卿量陳后之金空有所長或聞未至況滔雖勤篆刻且昧精奇張平子固合陋都陸士衡所宜撫掌寧期尚書親回嚴重庭賜褒稱變泥沙為丹雘之姿植菅蒯作芝蘭之秀魯史驟榮於一字晉庭俄採於片言超越尋常震驚流輩況方今武功草偃文教風行計奔歲貢於九州榜擢詞人於都省至如生於草澤來自溝塍或能中甲乙求登殊尤選蓋止於同人延譽先達吹噓未嘗有聖日名侯大朝重德面開金口首借丹梯以此推言便宜自賀瑤枝玉幹虛扄皓月之中羽駕雲裝寧遁碧霄之外己知蹇步可造遙程藉以宇內跡單天涯親老一旦有茲殊遇得此吉祥買臣何愧於負薪毛義實榮於捧檄感深唯泣喜極翻驚瀝膽隳肝空寓鄭莊之驛糜軀碎首何裨元禮之門攀謝兢惶罔知所措下情無任戰越悚惕屏營之至伏念鬻雞為鳳有識咸驚投礫參瓊良知足鄙豈可高懸皎鏡逈揭平衡而乃呈六極之陋容掛一絲之蔑質得不臨風扇面對景忡心然巧冶開爐莫遺鉛鐵精工執斫不問圓方又安可內鑰言樞上辜德宇是敢因依借喻一二披誠某蜩甲薄姿蟻封微狀學雖勤於刻汁藝則愧於鏤冰徒以獻豕辭遼賫花躬魏稅駕而旋同飲鱉操弧而果異麗龜遂至千仞禹門額蒙點鋭兩朝楚國足被刖空竟於豐獄以沉埋誰以蜀桐而激發伏惟博士鳴岐瑞質歌郢至音蔥蘢而張柳風垂逈拔而稽松雪峭自提攜江筆鏗擲孫金投身而傾動龍宮揮手而震驚蟾窟時爭墊角俗竟顰眉今則珠履賓階玉京羽駕欲高飛於魏闕先下歷於虞庠故得槐市三千杏壇七十依於考擊竊彼飾褫而某邱錦小才路蒲末學既非禰鶚大懼溫犀固當絶望趨隅甘心滅刺然則嘗彈流水罔協鍾聰曾躡浮雲莫回樂顧是亦難參雅調不號逸㣥矧其器乏正聲價懸駿骨苟叨明試不偶至公則異時何路以致身他日無門而振跡坐為棄物立謝明時是乃洞寫血誠仰祈風鑒伏以博士曲垂厚顧猥降隆私將憐其蚌蛤剖胎只自回旋於皎月螳蜋奮臂無辭殞碎於高車非敢染黿所希留馬干瀆清嚴下情不任惶惕屏營之至昨輒以近試賦輕黷門牆韻匪擲金理宜誚石豈期轉禍為福以寸獲長戶部鄭郎中伏話員外仁恩大賜奬録拜聆嘉耗跪對吉辭感惕兢惶進退失措實以從古干時之道至今取第之由莫不路邈鼇頭程懸驥尾苟非先鳴汲引哲匠發揮縱或自強行將安適伏以員外斷籯積學計斗負才龜鏡詞林梯航陸海是故門駢鄭市俗墊郭巾爭俟栽培互希丹飾而滔牛涔淺狹燕戲微茫豈合攀投徒為激切員外燕中市駿稷下館人皆使有歸不言無取猥流厚旨曲降隆私滔是敢引事推言徵文借喻且傑如韓信未歸漢祖以誰知美若西施不入吳宮而孰驗所以蟄劍而凌虛吐耀焦桐而駭耳飛聲然後感動良知遭逢至鑒事雖小異理或大同伏惟稍降尊嚴俯垂惻隱如滔昧為貢士淺作丈夫方今不右武功大先文教矯辭人於鶯谷鑰宗伯於龍門其有負馬之文華韞顏之德行或栖栖以至或嶽嶽而來未嘗不坐馳日下之名立貯彀中之望是何謝茲振發而處彼幽沉頻年厠角逐之場衆口蔑殊尤之譽齊國篲禿荊山眼枯漸覺途窮虛云舌在豈可堅期御李確慕依劉志空切於投林醜難逃於測管伏惟員外魏車委照軒匣揚光儻憐其刻意探幽焦心體物則雖異於披沙之說然略幾於架屋之談許列書筠令參撰杖今者或因薦士敢乞編名所希從數仞牆伴二三子增輝瑣質擅價主人皆由一顧之仁翹竚百金之諾含毫汗下伏紙魂驚非切覬覦所憂誅戮叨越干犯下情無任戰懼屏營之至滔口諷雄詞心祈藻鑒在他處則早逾一紀來上國則己逮二年常測管以推誠每持蠡而注念豈期御李非敢希顏所以竊贄荒蕪薦塵牆仞聳蟻封於邱嶽疏蛙渚於陂湖敢望吹噓佇聆誚責昨日進士林郁忽傳尊旨遽話殊私伏惟博士曲降恩知俯回奬録不置蓋甌之地爰興讀霓之言事邁常倫榮過始望傾身拜命局影瞻風若聽咸韶如吞甘醴敢便認為知己蓋將决定胸襟實以當今文教風行詞人輻輳莫不俱陳素業各務所歸而博士負擲地鴻名標掞天逸勢吐揚雄之五藏陋班固之兩京故其接踵望塵駢肩執刺爭為稱挂互作鏡窺或聞由也升堂賜之入室是則千門改觀萬戶飛聲若瑤璧之飾來類金絲而振作所謂功侔造化言繫慘舒作詞林培植之家為陸海梯航之主必當不私其一顧誤彼衆聞以滔數載辛勤一生疑惑唯傾丹懇翹矚重言冀將卜以妍媸斷其可否今則出於門館發自齒牙事既殊常道方自信㭊音倏同寐覺敻若神通呈材之獲般窺鬻馬之蒙樂顧已逢哲匠肯愧他人蜀壁端居管牀兀坐既佩茲謦咳益勵彼顓愚苟無疑於鏤冰則求工於刻楮忭躍兢悚罔知所裁下情無任感恩激切之至滔自違門仞尋達家山拜慈親而聚族生光述宏造而一時泣下蓋以生平事業出自宗師豈惟持異之恩知仍契非常之事分昨者賫持惡賦刺謁清塵本期劉子駿家待以蓋甌之地陸士衡處置於撫掌之間豈期以寸獲長鬻駑竊價伏蒙校書先輩驚人賞録越等褒稱篇篇而喻作金聲一一而讀為霓字逈施異禮謺錫嘉言及門則倒屣於仲宣侍座則授經於左氏周旋許與覼縷指揮畢令如蘿附松更使以膠投漆俾從秋賦首出門牆顯示輩流別加援引且古人之慕元禮才獲御車學者之師仲舒未曾識面以斯修省莫有比倫永言遭逢得謂卓絶矧國朝之設科待士較文取人往歲主司則斷於獨鑒近時公道則採自衆稱由是重望朝賢有名先達得以主張斯道梯級將來至若有負兼才且非所業或文章而稱詞賦或律韻而談古風猶自彼唱此傳影隨響答其況專功與善本面說人又若校書先輩鳳藻禀夭鴻名傑俗今時賈馬昔日班張猶在場中多士便瞻於咳唾既行天上一言何啻於興衰當以調啞使鳴吹寒令暖伏自歸寧膝下駐跡江干白日思惟中宵起坐既名為得路當別議感恩況緣家邈東閩路遙北闕一回逐計數載違親頃者纍繕蕪詞歷投碩匠或蒙開口少值動心以此鼓勇無門自疑不暇今則從大藩之賓榻得當代之主人豁如釋氏之破迷醒若神醫之愈疾一家相賀舉目增輝進取有茲肺肝可察伏以上京迢遞難於獻歲支離須俟新春方議假道進發藝馨酷烈連幄清虛昨陪侍於遊從今綿隔於煙水別無言語併陳於殷浩函中空有夢魂常繞於燕昭臺下滔伏念希逸知名於靈運不作門人左思擅價於士安非為弟子雖則清風凜若懿範昭然得將為千古高談未免是一時闕事翻思到此因敢形言滔賫持淺蕪塵觸門仞遽竊披沙之諭爰蒙折簡之知事實驚時榮將越望而又謂前賢之未至垂厚意以特殊將令別議依投用堅恩德資今日顧憐之旨作它時汲引之由苟開如此之懷豈是偶然之事赫赫昭代鏘鏘衆人榮持哲匠之發揮薦向良時而角逐則何患龍宮之杳杳何憂蟾月之高高足以雪曩歲之煙沉恢張禰刺壯平生之意氣棄擲終繻如此若不激切擎邱凄凉誓劍豈謂修文學古何名勵節砥躬伏自虔侍清塵仰叨殊遇未嘗一夕不將心禱於神明縱極千言難以筆書於丹赤攀謝感激罔知所容滔驟持末學遽竊殊知伏自豫章數旬湓浦一路扃旅舍而夜唯假寐逐征帆而日但沾衣蓋以虔戴遭逢仰思情旨先輩主中興之文學作來者之蓍龜伏蒙採滔所業異於等倫憫滔所舉困於曩昔大張金口精發瑤函且午火燒空一陰司月面泉石或病乎炎毒處城池而奈彼鬱蒸況土風則竹屋玲瓏烟水則葉舟蕩漾才曉而烏光赫透欲風而魚沫腥飄雖付於醴酒酕醄或亡壞混又屬其羽書重謺時觸高明誠知不乏餘波爭奈罕聞暇日豈可更抽祕思別運真蹤每摛一幅之霞箋咸滴千痕之雨汗雖才高倚馬曾無起草之詞而字悉如蠅幾若生胝之筆未知單賤何補生成賫行而便自金丹舉步而即升雲漢矧復公言私論要訣神方一一指蹤頭頭傳授將克周於頂踵俾無失於毫釐以此推恩而前古所稀以此行道而方今誰比士林名路一朝有知己如斯白日青天萬世唯子孫為誓下情無任感恩泣淚悚謝之至伏念石甫受知於途中鬷蔑申言於堂下既情非曩舊復地隔尊卑尚能感動至公遭逢殊禮而某神資所向天受其時獲曠代之因依得千年之幸會豈可永緘丹赤上負陶鈞伏惟相公特降恩慈俯垂惻隱昔年羽化曾陪鶯谷之春今日雲飛俄隔鳳池之路信鶴雞之果異諒牛驥之終懸徒增倚玉之榮幾積續貂之愧況相公負英才而作礪持碩望以登庸始者四海傾心一人側席朝聞坐幄暮見飛霖扇澆薄為淳風激讒邪歸直道均施爐冶高揭權衡使鉛汞之不參令錙銖之各等故得方圓任器高下隨宜黜陟無偏賢愚有序某早甘退跡忽喜逢時遽從學省之前銜爰踐蘭宮之峻級己為塵忝誠合揣循竊思頃年九陌秋天都堂雪夜常容披霧每許參瓊逮夫片玉升科兼金列榜雖登龍㣥彥同戴邱山而附鳳一心偏投膠漆既以宗盟屬意仍從知舊留情重謺依投綢繆奬録遂使慶鍾末路福逮今辰既預門牆仍從埏埴宛得御車之便無煩擁篲之勞但以某弱羽難高么絃易斷始自筮仕及於登朝未嘗暫識清途略遊華貫亦人地之所拘限何窮通之切咨嗟洎夫郢俗褰帷穰城建隼連叨竹使尤愧棠陰雖皂蓋紅旌別過素望而霜臺粉署終繫丹心今則榮竊握蘭幸當襆被馮唐歷踐誠知戴白之年貢禹棲遲且有彈冠之地伏以天覆地載縱鬼神之奧皆臻陰伏陽升雖鱗介之微必動道既如此人焉忽諸伏惟相公持重器以為霖負英才而坐幄傳丹青於直道扇爐冶於至公致一物之無遺使萬方之有賴某顧惟瑣陋獲忝鈞鎔既契之於無私固施之於不報豈宜遽賫感激竊拜門牆但以事出非常恩從特異若不披於丹赤終有負於神明伏惟俯降尊嚴暫垂聽察某才非敏幹性本顓愚自從振跡春闈投身宦路徒綿歲月莫致飛馳卻則窮途前皆散地是亦用之則未為國士舍之則蓋類腐儒因自揣循每加退縮然而竊念古人不遠賢路非遙皇朝自科擢英髦爵升品秩其或來從草澤生匪簪裾亦常列入清途參為盛觀所以益持孤孑尤切兢修節勵松筠心傾葵藿常注目於烟霄之上每馳魂於省闥之中逮夫元鬢雕空壯心折盡曾無影響空極瞻攀豈期相公才揭權衡便垂採掇俾遭逢於聖日令允愜於平生所謂材並得宜物無遺性信造化之功不及豈推遷之令能侔義貫古今恩逾卵翼況相公峻於埏埴切彼弼諧當今士號如林朝稱不乏足得廓其公選擇以良才而某己懷耕釣之心近閉雲林之跡設令漏網未曰遺賢是何特達開懷周旋軫念青山在目方將魚鳥以同歸鴻渥連天忽歷烟霞而曲被從杏壇之舊籍踐蘭署之清資豈是常情諒非小事伏自榮叨幞被幸竊含香未嘗一夕暫安片時不感常若千鈞之在頂每將孤劍以誓誠但以有地受恩無門瀝懇只眄高車而激切空持敝帚以屏營淚則汍瀾心唯恐悚瞻風拜賜對景懷仁涸彼言泉固申陳而未盡託於筆札豈寫載以能周攀謝兢惶罔知所措某今月四日轉授刑部郎中伏蒙相公仁恩特賜寵誨事從非次言異常倫感激兢惶進退失措伏以某材非可採藝不足稱出自門牆樹為梯級才榮地部復陟秋曹持鷦鷯决起之姿到鸑旅鳥曾棲之地相公憐其拙滯忽此騫翔謺降恩輝薦留手筆指今忝幸敘昔經過始者九遷曾假虞邦之道向來一字爰垂魯史之褒義極生成彩逾丹雘拜窺垂露跪捧隆私汗浹背流淚盈眥下未知順風弱力撮土微形獲參一日之高蹤何報千鈞之重意唯謹緘於篋笥常誇向於縉紳為官路之遭逢作仕流之卓異攀謝懇切不任下情
