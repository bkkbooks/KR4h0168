front:
  text: 全唐文欽定全唐文卷一百三十八世南字伯施越州餘姚人歷官陳隋復事竇建德入唐為秦府參軍纍轉祕書監封永興縣子年八十一卒贈禮部尚書諡曰文懿圖像淩烟閣
  hash: sha256:26bc8e717fccf15f39459f1c35c228a9c1a3b70d559901873f91d791cab8aaa6
  markers:
  - {type: head, offset: 14, content: 虞世南, id: KR4h0168_NFKB_138-h1, level: 1}
body:
  text: 惟皇王之盛烈表帝德之休符有金方之瑞獸乃曜質於名都既馴洽於郊甸亦騰倚於山隅素毳呈彩霜毫應圖宴嘉賓於雅什偶仙客於天衢故能著美祥瑞流名典謨觀四時之代序對三秋之爽節雲既淨而天高潦將收而水潔凝珠露之淒冷鏡青山之滉徹燕違幕而巢空雁驚㣥而行絶於斯時也登綺閣臨飛觀開霧縠之踈幌褰輕綃之碧幔映金波之皎潔明玉繩之燦爛看夜鵲之繞枝望牽牛之隔漢蓮尚香於江浦草猶青於河畔惟皇王之御歷乃承天而則大洽至道於區中被仁風於海外通鳳穴以文軌襲龍庭以冠帶舍夷言於藳街陳萬物於王會渺渺地角悠悠嶂表有絶域之神獸因重譯而來擾其所居也巖磴深阻盤紆絶峻翠嶺萬重瓊崖千仞馬頓轡而莫升車摧輪而不進聚方服之君長召積風而奉進爾乃發烏弋過白狼踰絶巘跨飛梁越流沙而遙集超積石而高驤其為狀也則筋骨糾廠田坴殊姿異制濶臆修尾徑毫柔毳鉤爪鋸牙藏鋒蓄鋭弭耳宛足伺閒借勢暨乎奮鬣舐脣來忽往瞋目電曜發聲雷響拉虎吞貔裂犀分象碎遒兕於齦齶屈巴蛇於指掌踐藉則林麓摧殘哮吼則江河振蕩是以名將假其容高人圖其質罄其威以淩厲美其風而贊述鑒倚伏以榮身乃有識之高軌彼白猿之騁妙終取斃於弧矢雖元豹之幽棲亦捐軀於巖趾並同亡而異術豈行藏之足紀何茲獸之明智獨出處以殊倫雖奮武以馴摯乃知機而屈伸去金方之僻遠仰元風之至淳服猜心與猛氣遂感德以依仁同百獸之率舞共六擾而來馴斯則物無定性從化如神譬鱗羽變質於淮海金錫成器於陶鈞當是時也兆庶欣瞻百僚嘉歎悅聲教之遐宣屬光華之在旦臣載筆以叨幸得寓目於奇玩順文德以呈祥乃編之於東觀若夫巢木為金門之始轉蓬乃玉輅之先斯蓋前古之朴略而後代之精研是以鼉鼓質而罕聽葦籥輕而莫傳笛不為於商律瑟見毀於繁絃此皆白圭玷以成疾嗟近者之莫言歎知音之不述惟皇御極書軌大同鑠矣文教康哉武功既象舞之載設亦夷歌之遠通乃定八音論六樂成均弦誦之藝制氏鏗鏘之學辨新聲於變徵研奇操於清角鏞管咸奏絲桐畢陳有琵琶之妙曲乃越衆而超倫器便時而適用節每段而逾新謐四座以傾耳歎和聲之入神爰詔百辟備序厥因於是大司樂進而稱曰臣以末學聞諸前志尋斯樂之所始乃絃鼗之遺事強秦創其濫觴盛漢盡其深致爰有達人演茲奇器參古今而定質擬神明而攄思慰遠嫁之羇情寬絶域之歸志既而班爾運能鉤繩相設求嘉木於五嶺取殊材於九折析文梓而縱分剖香檀而橫列木瓜貞柘盤根錯節或錦散而花開或絲縈而綺結徒觀其為狀也則象形斗極殊姿巧製隨良朴之修短任規模之巨細既異材而合體亦刓方而就鋭惟適道以從宜故無取乎凝滯若乃琢玉範金之巧雕文鏤采之奇上覆手以懸映下承絃而仰施帖則西域神獸南山瑞枝屈盤犀嶺回旋鳳池開寶撥以更運帶文綬而旁垂聲備角商韻包宮羽橫却月於天漢寫回風於洛浦始聞絃之既調乃長弄而徐撫應緩步之疏節隨輕身之妙舞悲紫塞之昭君泣烏孫之公主季倫歡金谷之宴仲容暢竹林之聚至如七德昭備六軍凱旋諧戎麾而威遠合金奏而功宣詠燕山之巳勒美瀚海之方鐫亦有飛梁邸游楚館聞促柱之再調聽鳴絃之疏彈叶高文而自遠飛羽觴之無算又如長河草緑高樓月下入小苑而看花游上蘭而藉野泛澄波而轉鷁息長松而繫馬臨清流而揮絃與殊方而俱寫其奇趣則抑揚嘈囋聯帛丿糸斷續紆餘雙鶴之吟清壯三秦之曲望南山之遙翠見西江之始緑少年有長命之詞倡女有可憐之調願百齡兮眉壽重千金之巧笑逮乎嘉客既醉高宴將闌浮觴劇飲披襟極歡乃摧絃而急調交酬獻之無端若以河而注海亦柸來而始彈蓋感物動神和心悅耳豈振木之為輩奚繞梁之足擬夫道以易為尊物以精微為貴嗟四絃之巳約乃包含於元氣叶笙鏞之律呂參鍾石之經緯於是鳳簫輟吹龍笛韜吟元雲掩影白雪藏音故以暢皇風之威武悅大雅之神心者也臣聞古之聖帝明王所以薄葬者非不欲崇高光顯珍寶具物以厚其親然審而言之高墳厚隴珍物畢備此適所以為親之纍非曰孝也是以深思遠慮安於菲薄以為長久萬代之計割其常情以定之耳昔漢成帝造延昌二陵制度甚厚功費甚多諫議大夫劉向上書其言深切皆合事理其略曰孝文居霸陵悽愴悲懷顧謂㣥臣曰嗟乎以北山石為槨用紵絮斫陳漆其閒豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石槨又何戚焉夫死者無終極而國家有廢興釋之所言為無窮計也孝文寤焉遂以薄葬又漢氏之法人君在位三分天下貢賦以一分入山陵武帝歷年長久比葬陵中不復容物霍光暗於大體奢侈過度其後至更始之敗赤眉賊入長安破茂陵取物猶不能盡無故聚斂百姓為盜之用甚無謂也魏文帝於首陽東為壽陵作終制其略曰昔堯葬壽陵因山為體無封無樹無立寢殿園邑為棺槨足以藏骨為衣衾足以朽肉吾營此不食之地欲使易代之後不知其處無藏金銀銅鐵一以瓦器自古及今未有不亡之國無有不發之墓喪亂以來漢氏諸陵無不發掘至乃燒取玉匣金鏤骸骨並盡豈不重痛哉若違詔妄有變改吾為戮尸於地下死而重死不忠不孝使魂而有知將不福汝以為永制藏之宗廟魏文此制可謂達於事矣向使陛下德止如秦漢之君臣則緘口而巳不敢有言伏見聖德高遠堯舜猶所不逮而俯與秦漢之君同為奢泰捨堯舜殷周之節儉此臣所以尤戚也今為邱隴如此其內雖不藏珍寶亦無益也萬代之後人但見高墳大冢豈謂無金玉也臣之愚計以為漢之霸陵既因山勢雖不起墳自然高顯今之所卜地勢即平不可不起宜依白武通所陳周制為三仞之墳其方中制度事事減少事竟之日刻石於陵側明邱封大小高下之式明器所須皆以瓦木合於禮文一不得用金銀銅鐵使後代子孫並皆遵奉一通藏之宗廟豈不美乎且臣下除服用三十六日巳依霸陵今為墳隴又以長陵為法恐非所宜伏願深覽古今為長久之慮臣之赤心唯願萬歲之後神道常安陛下之孝名揚於無窮耳漢家即位之初便營陵墓近者十餘歲遠者五十年方始成就今以數月之閒而造數十年之事其於人力亦巳勞矣又漢家大郡都五十萬戶即曰人衆未及往時而工役與之一等此臣所以致疑也臣聞秋獮冬狩蓋惟恆典射隼從禽備乎前誥伏惟陛下因聽覽之餘辰順天道以殺伐將欲躬摧班掌親御皮軒窮猛獸之窟穴盡逸材於林藪夷凶翦暴以衛黎元收革擢羽用充軍器旌旗較獵式遵古典然黃屋之尊金輿之貴八方之所仰德萬國之所繫心清道而行猶戒銜橛斯蓋慎重防微為社稷計也是以馬卿直言於前張昭變色於後臣誠微賤敢忘斯義且天弧星罼所殪巳多頒禽賜獲皇恩亦溥伏願時息獵車且韜長㦸不拒芻蕘之請降納涓澮之流袒裼徒搏任之㣥下則貽範百王永光萬代若夫神妙無方非籌算能測至理凝邈豈繩準所知實乃常道無言有著斯絶安可憑諸天縱窺其窅冥者乎至如五門六度之源半字一乘之教九流百氏之目三洞四檢之文苟可以經緯闡其圖詎可以心力到其境者英猷茂實代有人焉法師俗姓陳潁川人晉司空㣥之後也自梁及陳世傳纓冕爰祖及伯纍葉儒宗法師少學三論名聞朝野長該衆典聲振殊俗威儀肅穆介節淹通留連清翰發摘微隱比地方春藏用顯仁之量如愚若訥外暗內明之功固能智周測海道亞彌天豈止摻類山濤神侔庾亮而巳爾其文情乃典而不野麗而有則猶八音之並奏等五色以相宣道行則納正見於三空拯㣥迷於八苦既學博而心下亦守卑而調高實釋種之梁棟生人之羽儀者矣加以賑乏扶危先人後巳重風光之拂照林牖愛山水之負帶烟霞願力是融晦迹肥遁以隋開皇之末隱於青溪山之鬼峪洞焉迥構巖崖則蔽虧日月空飛戶牖則吐納風雲其閒採五芝而偃仰游八禪而寢息餌松术於溪㵎披薜荔於山阿皆合掌歸依摩頂問道經行恬靜十有餘年然其疊嶂危岑長松巨壑野老之所棲盤古賢之所游踐莫不身至目覩攀穴指歸仍撰青溪山記一卷見行於世太史令傅奕學業膚淺識慮非長乃穿鑿短篇憑陵正覺將恐震茲布鼓竊比雷門中庸之人頗成阻惑法師愍彼後昆又撰破邪論一卷雖知虞衛同奏表異者九成蠅驥並驅見奇者千里終須朱紫各色清濁分流訶以凡測聖之舋責以俗校真之咎引文證理非道則儒曲致深情指的周密莫不轍亂旗靡瓦解冰銷入室有操矛之圖厥角無容頭之地於是傳寫不窮流布長世若披雲而見日同迷蹤而得道法師著述之性速而且理凡厥勒成多所遺逸今散採所得詩賦碑志讃頌針誡記傳啓論及三教系譜釋老宗源等合成三十餘卷法師與僕情敦淡水義等金蘭雖服制異儀而風期是篤輒以藤綆聯彼圭璋編為次第其詞云爾客有通元先生好求古迹為余知書啓之發源審以臧否曰豫不敏何足以知之今率以聞見隨紀年代考究興亡其可為元龜者舉而敘之古者畫卦立象造字設教爰置形象肇乎倉史仰觀俯察鳥跡垂文至於唐虞煥乎文章暢於夏殷備乎秦漢洎周宣王史史籀循科斗之書採倉頡古文綜其遺美別署新意號曰籀文或謂大篆秦丞相李斯改省籀文適時要號曰小篆善而行之其倉頡象形傳諸典策世絶其迹無得而稱其籀文小篆自周秦以來猶或參用未之廢黜或刻於符璽或銘於鼎鐘或書之旌鉞往往人閒時有見者夫言篆者傳也書者如也述事契誓者也字者孳也孳乳寖多者也而根之所由其來遠矣先生曰古文籀篆曲盡而知之愧無隱焉隸草攸止今則未聞願以發明用袪昏惑曰至若程邈隸體因之罪隸以名其書朴略微奧而歷祀增損迄以湮淪而淳喜之流亦稱傳習首變其法巧拙相沿未之超絶史游制於急就創立草藳而不之能崔杜㭊理雖則豐妍潤色之中失於約伯英重以省繁飾之銛利加之奮逸時言草聖首出常倫鍾太傅師資德升馳騖曹蔡倣學而致一體真楷獨得精妍而前輩數賢遞相矛盾事則恭守無捨儀則尚有瑕疵失之斷割逮乎王廙王洽逸少子敬剖㭊前古無所不工八體六文必揆其理俯拾衆美會茲易制成今體乃窮奧旨先生曰於戲三才審位日月爥明固資異人一敷而化不然者何以臻妙無相奪倫父子聯鑣軌範後昆先生曰書法元微其難品繪今之優劣神用無方小學疑迷惕然將寤而旨述之義其可聞乎曰無讓繁詞敢以終序文字經藝之本王政之始也倉頡象山川江海之狀蟲蛇鳥獸之跡而立六書戰國政異俗殊書文各別秦患多門定為八體後復訛謬凡五易焉然並不述用筆之妙及乎蔡雍張索之輩鍾繇王衛之流皆造意精微自悟其旨也辨應心為君妙用無窮故為君也手為輔承命竭股肱之用故為臣也力為任使纖毫不撓尺丈有餘故也管為將帥處運動之事執生死之權虛心納物守節藏鋒故也毫為士卒隨管任使跡不拘滯故也字為城池大不虛小不孤故也指意用筆須手腕輕虛虞安吉云夫未解書意者一點一畫皆求象本乃轉自取拙豈成書耶太緩而無筋太急而無骨側管則鈍慢而多肉豎管則乾枯而露骨及其悟也粗而不鈍細而能壯長而不為有餘短而不為不足釋真筆長不過六寸捉管不過三寸真一行二草三指實掌虛右軍云書弱紙強筆強紙弱筆強者弱之弱者強之也遲速虛實若輪扁斫輪不徐不疾得之於心而應之於手口所不能言也拂掠輕重若浮雲蔽於晴天波撇勾截如微風搖於碧海氣如奔馬亦如朵鉤變化出乎心而妙用應乎手然則體約八分勢同章草而各有趣無問巨細皆有虛散其鋒員豪蕝按轉易也豈真書一體篆草章行八分等當覆腕上搶掠豪下開牽撇撥走歷鋒轉行草稍助指端鉤距轉腕之狀矣釋行行書之體略同於真至於頓挫磅礡若猛獸之搏噬進退鉤距若秋鷹之迅擊故覆筆搶豪乃按鋒而直引其腕則內旋外拓而環轉紓結也旋豪不絶內轉鋒也加以掉筆聯豪若石璺玉瑕自然之理亦如長空游絲容曳而來往又似蟲網絡壁徑實而復虛右軍云游絲斷而能續皆契以天真同於輪扁又云每作點畫皆懸管掉之令其鋒開自然徑健矣釋草草則縱心奔放覆腕轉蹙懸管聚鋒柔豪外拓左為外右為內起伏連卷收攬吐納內轉藏鋒既如舞袖揮拂而縈紆又若垂藤樛盤而繚繞蹙旋轉鋒亦如騰猿過樹逸虯得水一作躍鯉透泉輕兵追虜烈火燎原或氣雄而不可抑或勢逸而不可止縱狂逸放不違筆意也右軍云透嵩華兮不高踰懸壑兮能越或連或絶如花亂飛若強逸意而不相副亦何益矣但先緩引興心逸自急也仍接鋒而取興興盡則巳又生族鋒仍豪端之奇象兔絲之縈結轉剔刓角多鉤篆體或如蛇形或如兵陳故兵無常陳字無常體矣謂如水火勢多不定故云字無常定也契妙欲書之時當收視返聽絶慮凝神心正氣和則契於妙心神不正書則欹斜志氣不和書則顛仆其道同魯廟之器虛則欹滿則覆中則正正者沖和之謂也然字雖有質跡本無為稟陰陽而動靜體萬物以成形達性通變其常不主故知書道元妙必資於神遇不可以力求也機巧必須以心悟不可以目取也字形者如目之視也為目有止限由執字體也既有質滯為目所視遠近不同如水在方圓豈由乎水且筆妙喻水方圓喻字所視則同遠近則異故明執字體也字有態度心之輔也心悟非心合於妙也借如鑄銅為鏡非匠者之明假筆傳心非毫端之妙必在澄心運思至微至妙之閒神應思徹又同鼓琴輪指妙響隨意而生握管使鋒逸態逐毫而應學者心悟於至妙書契於無為苟涉浮華終懵於斯理也自古賢哲勤乎學而立其名若不學即沒世而無聞矣且會稽之竹箭湛盧之斷割不括而羽之不淬而礪之終不見利用之材耳羲之云耽玩之功積如邱山張芝學書池水盡墨當其雅趣求彼真意無圖其形容而滯於體質此貴乎志意專精必有誠應也余中宵之閒遂夢吞筆既覺之後若在胸臆又因假寐見張芝指一道字用筆體法斯源也足明至誠感神信有徵矣故羲之於山陰寫黃庭經感三台神降其子獻之於會稽山見一異人披雲而下左手持紙右手持筆以遺獻之獻之受而問之曰君何姓字復何遊處筆法奚施答曰吾象外為宅不變為姓常定為字其筆迹豈殊吾體耶獻之佩服斯言退而臨寫向逾三歲竟昧其微況乃不學乎羲之云自非通靈感物不可與談斯道夫道者學以致之飽食終日而無所用心則去之逾遠矣不得其門而入雖勤苦而難成矣今立以君臣之體類以攻戰之勢將以近而喻遠必因筌而得免務欲成其體要啓其戶牖庶將來君子思而勉之世南聞大運不測天地兩平風俗相承帝基能厚道清三百鴻業六超君壽九宵命周成算元無之道自古興明世南賢兄處見臨樂毅論便是青過於藍欣忭無巳數願學耳世南近臂痛發書不堪覼縷也虞世南呈十三日遣書謹空得書為慰可言也疲朽未有東顧之期惟增慨歎今因使人指申代面必公力也鄭長官致問極真而其三人恆不蕩蕩將如何故承後時有所異責弟子早年忽遇重患當時運心差愈之日奉設千人齊今謹於道場供千僧蔬會以斯願力希生生世世常無疾惱七世久遠六道怨親並同今願微臣屬書東觀預聞前史若乃知幾其神惟睿作聖元妙之境希夷不測然則三五迭興典墳斯著神功聖跡可得言焉自肇立書契初分爻象委裘垂拱之風革夏翦商之業雖復質文殊致進讓罕同靡不拜洛觀河膺符受命名居域中之大手握天下之圖象雷電以立威刑法陽春而流惠澤然後化漸八方令行四海未有偃息鄉黨棲遲洙泗不預帝王之録遠跡胥史之儔而德侔覆載明兼日月道藝微而復顯禮樂弛而更張窮理盡性光前絶後垂範於百王遺風於萬代猗歟偉歟若斯之盛者也夫子膺五緯之精踵千年之聖固天縱以挺質稟生德而降靈載誕空桑自標河海之狀才勝逢掖克秀堯禹之姿知微知章可久可大為而不宰合天道於無言感而遂通顯至仁於藏用祖述先聖憲章往哲夫其道也固以孕育陶鈞包含造化豈直席卷八代并吞九邱而巳哉雖亞聖鄰幾之智仰之而彌遠亡吳霸越之辨談之而不及於時天歷寢微地維將絶周室大壞魯道日衰永歎時囏實思濡足遂乃降跡中都俯臨司寇道超三代止乎季孟之閒羞論五霸終從大夫之後固知栖遑弗巳志在於求仁危遜從時義存於拯溺方且重反淳風一匡末運是以載贄以適諸侯懷寶而游列國元覽不極應物如響辨飛龜於石函驗集隼於金櫝觸舟既曉專車能對識罔象之在川明商羊之興雨知來藏往一以貫之但否泰有期達人所以知命卷舒惟道明哲所以周身羑里幽憂方顯姬文之德夏臺羈紲弗纍商王之武陳蔡為幸斯之謂歟於是自衛反魯刪書定樂贊易道以測精微修春秋以正褒貶故能使紫微降光丹書表瑞濟濟焉洋洋焉充宇宙而洽幽明動風雲而潤江海斯皆紀乎竹素懸諸日月既而仁獸非時鳴鳥弗至哲人云逝峻嶽巳隤尚使泗水却流波瀾不息魯堂餘響絲竹猶傳非夫體道窮神至靈知化其孰能與於斯乎自時厥後遺芳無絶法被區中道濟天下及金冊斯誤玉弩載驚孔教巳焚秦宗亦墜漢之元始永言前烈褒成爰建用光祀典魏之黃初式遵古訓宗聖疏爵允緝舊章金行水德亦存斯義而晦明匪一屯亨遞有筐筥蘋蘩與時升降靈宇虛廟隨道廢興炎精失御蜂飛蝟起羽檄交馳經籍道息屋壁無藏書之所階基絶函丈之容五禮六樂翦焉煨燼重宏至教允屬聖期大唐運膺九五基超七百赫矣王猷蒸哉景命鴻名盛烈無得稱焉皇帝欽明睿哲參天兩地乃聖乃神允文允武經綸云始時維龍戰爰整戎衣用扶興業神謀不測妙算無遺宏濟艱難平一區宇納蒼生於仁壽致君道於堯舜職兼三相位總六戎元圭乘石之尊朱戶渠門之錫禮優往代事踰恆典於是在三眷命兆庶樂推克隆帝道丕承鴻業明玉鏡以式九圍席蘿圖而御六辨寅奉上元肅恭清廟宵衣食視膳之禮無方一日萬幾問安之誠彌篤孝治要道於斯為大故能使地平天成風淳俗厚日月所照無思不服憬彼獯戎為患自古周道再興僅得中算漢圖方遠才聞下策徒勤六月之戰侵軼無厭空盡二師之兵憑淩滋甚皇威所被犁顙厥角空山盡漠歸命闕廷充仞藳街填委外廄開闢以來未之有也靈臺偃伯玉關虛候江海無波熢燧息警非烟浮漢榮光莫河楛矢東歸白環西入猶且兢懷馭朽興眷納隍卑宮菲食輕徭薄賦斫雕反朴抵璧藏金革舄垂風綈衣表化歷選列辟旁求遂古克巳思治曾何等級於是眇屬聖謨凝心大道以為括羽成器必在膠雍道德潤身皆資學校矧乃入神妙義析理微言厲以四科明其七教懿德高風垂裕斯遠而棟宇弗修宗祧莫嗣用紆聽覽爰發絲綸武德九年十二月草九日有詔立隋故紹聖侯孔嗣哲子德倫為褒聖侯乃命經營惟新舊址萬雉斯建百堵皆興揆日占星式規大壯鳳甍騫其特起龍桷儼以臨空霞入綺寮日暉丹檻窅窅崇邃悠悠虛白圖真寫狀妙絶人功象設巳陳肅焉如在握文履度復見儀形鳳跱龍蹲猶臨咫尺口完爾微笑若聽武城之絃怡然動色似聞簫韶之響襜襜盛服既覩仲由侃侃禮容仍觀衛賜不疾而速神其何遠至於仲春令序時和景淑皎潔璧池圓流若鏡青葱槐市總翠成帷清滌元酒致敬於茲日合舞釋菜無絶於終古皇上以幾覽餘暇遍該㣥籍乃製金鏡述一篇永垂鑒戒極聖人之用心宏大訓之微旨妙道天文煥乎畢備副君膺上嗣之尊體元良之德降情儒術遊心經藝楚詩盛於六義沛易明於九師多士伏膺名儒接武四海之內靡然成俗懷經鼓篋攝趨奧並鏡雲披俱餐泉湧素絲既染白玉巳雕資覆簣以成山導涓流而為海大矣哉然後知達學之為貴而宏道之由人也國子祭酒楊師道等偃元風於聖世聞至道於先師仰彼高山願宣盛德昔者楚國先賢尚傳風範荊州文學猶鐫歌頌況帝京赤縣之中天街黃道之側聿興壯觀用崇明祀宣文教於六學闡皇風於千載安可不贊述徽猷被之雕篆乃抗表陳奏請勒貞碑爰命庸虛式揚茂實敢陳舞詠乃作銘云景緯垂象川嶽成形挺生聖德實稟英靈神凝氣秀月角珠庭探賾索隱窮幾洞冥述作爰備邱墳咸紀表正十倫章明四始繫纘羲易書因魯史懿此素王邈焉高軌三川削弱六國從衡鶉首兵利龍文鼎輕天垂伏鱉海躍長鯨解黻去佩書燼儒坑纂堯中葉追尊大聖乃建褒成膺茲顯命當塗創業亦崇師敬胙土錫圭禮容斯盛有晉崩離維傾柱折禮亡學廢風頽雅缺戎夏交馳星分地裂蘋藻莫奠山河巳絶隋風不競龜玉淪亡樽俎弗習干戈載揚露霑闕里麥秀鄒鄉修文繼絶期之會昌大唐撫運率繇王道赫赫元功茫茫天造奄有神器光臨大寶比蹤連陸追風炎昊於鑠元后膺圖撥亂天地合德人神攸贊麟鳳為寶光華在旦繼聖崇儒載修輪奐義堂宏敞經肆紆縈重欒霧宿洞戶風清雲開春牖日隱南榮鏘耾鐘律蠲潔齍明容範既備德音無斁肅肅升堂兟兟讓席獵纓訪道橫經請益帝德儒風永宣金石維貞觀九年歲次癸未五月乙未朔六日庚子大行太上皇崩於大安宮殯於前殿之西階粵十月甲子朔二十七日庚寅將遷座於獻陵禮也九天落構七曜沉暉引鷺翿於雙闕駕龍轜於六飛哀子嗣皇帝諱劈踴崩心攀號泣血悲慕望其如在痛音顏之巳絶去昭景而不留即幽途而永訣孝以追遠哀惟慎終爰詔史冊敘德宣風其詞曰元覽載籍逖聽皇王立德可久應運斯昌天基崇峻帝系悠長虹暉降祉真氣呈祥葱珩朱紱熊軾龍章契叶禎符誕生睿聖彤雲晝聚黃星夕映舒卷潛躍幾深道性地載天臨日暉川鏡歷試藩嶽風移俗正火德云謝㣥龍戰野蚩尤曜旗王良策馬拔山曀日滔天泯夏蕩析黎元阽危宗社提劒創業仗鉞專征風驅雲動海運天行伐謀上略制勝神兵尊王踐土復帝夷庚職惟上相任隆㣥辟六階巳平四門咸闢殊物顯命彞章典冊錫重介圭禮優乘石烟雲改色鏞管變音觀圖受命負扆君臨仁霑動植化感飛沉殷輅周冕禹迹堯心削觚返朴抵璧藏金商俗未改遺氛阻亂沙塞虔劉伊叛渙應變雷動乘機電斷十角雲消三川冰泮漸以文教致諸王道制禮和樂尊儒養老翠鳳栖桐丹魚在藻水浮元貝階榮朱草威加海外澤被區中要荒合軌鞮譯遐通沒羽沈浪飛輪駕風眷言釋負有懷高謝爾櫟陽杳同姑射趨詩禮以承天稟義方以成化聿應景福方期大年玉几奄及金縢遂騫絶五日之晨省遽千齡而上仙攀幃扆以孺慕抱劒舄以廠田坴綿嗚呼哀哉虔奉顧託式遵遺志捐珠玉而不藏即陶甄以成器貽儉德以為謨垂風聲於後嗣嗚呼哀哉永去天邑言遵地市背沃野於神臯越通川於渭涘懷岐下之前跡眷新豐之舊里笳哀噎以留思旐聯翩而顧指悲風急而古木吟平野晦而愁雲起嗚呼哀哉惟綴衣之如昨忽馳光之不駐亟時遊而節改俄涉新而履故野蒼蒼以日衰歲凜凜而行暮感物悲於氣序銜哀踐於霜露泣川水之東流動商山之風樹蹐厚地而無感仰高天而何訴嗚呼哀哉曰聖與仁誰前誰後炎昊無金石之固勳華異松喬之壽孰歷世而長存惟令名之不朽矧元功與至德冠列辟而為首俾軼五而登三與造化而長久嗚呼哀哉維貞觀十年歲次甲申六月巳未朔二十一日巳卯大行皇后崩於立政殿粵九月十一日丁酉將遷座於昭陵禮也殯宮夕啓靈轜曉前儼帷帟於空殿肅陛衛於靈筵皇帝親臨宵載義深追遠瞻青蒲而永絶悼玉階之莫反蜃輅將引犧樽巳徹爰詔記言式揚徽烈其詞曰二儀合德兩曜齊光列聖觀象邦家克昌猗歟華族英靈降祉比齊越姜匹宋踰子育德高門騰芬素里體仁將聖披圖閲史造舟為梁嗣徽前德履和思順自家刑國淑問不巳柔風允塞紃組執勤王匆珩垂則時逢昌聖運屬休徵代邸膺歷唐侯嗣興紫宮並曜黃道階升化宣風始業贊丕承比德無競凝神不測應物達理撫機先識體備賢能暉無朓側績苞九亂恩加八極性道希夷言容莊敬戒奢處約懷沖履正景曖風暄霜嚴冰淨領略三古針規六行源濬流遠時昌祚延國貞誕睿皇支挺賢談高辨日學貫通元慈訓所及懿德光前五福云備千齡方永地紀絶維月輪韜景晨興弗豫德音彌整馬鬣無封鶴珠斯屏嗚呼哀哉異人神於忽變容服於平生改清蹕以哀挽易朱旗以素旌昔照朝景響環珮於增城今冥永夜吟松柏於山楹嗚呼哀哉氣變灰飛暑退寒襲烟觸樹而凝慘露分枝而泫泣聞哀雁之夕飛聽悲風之曉急仰雲霄而永慕慟陵寢其何及嗚呼哀哉背元武而北轅絶牽牛而橫度途去去而逾遠馬駸駸而不駐想渭水之貫都歎黃山而隱霧嗚呼哀哉嗟人生之浮促若飄風之過牖牖何風而暫停人何生而能久惟承天與載物邈慈深而德厚邁任姒之高蹤播英聲而無朽嗚呼哀哉
