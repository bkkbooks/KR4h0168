front:
  text: 全唐文欽定全唐文卷一百七十七勃字子安絳州龍門人未冠應幽素舉及第授朝散郎沛王賢聞其名召為沛府修撰是時諸王鬬雞戲為文檄英王雞高宗覽之怒斥出府久之補虢州參軍官奴曹達犯罪勃匿之既懼事洩殺達滅口事覺當誅會赦除名上元二年渡南海墮水卒年二十八謹按新書作二十九
