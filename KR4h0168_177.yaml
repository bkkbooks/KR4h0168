body:
  text: 九成宮東臺地接閒曠面山臨水爾其松峯桂壑紅泉碧磴金石千聲雲霞萬色侍郎張公雅思沈鬱永懷梓匠式侔仙造聿構靈廛纎波成止水之源拳石儼干霄之狀雖流波覆簣俯藉人機而布葉攢花妙同天繪僕因夏日濫奉清埃敢抽南畝之才聊敘東山之事云爾辭曰若夫金臺妙境玉署仙居酌丹墀之曉暇候青禁之宵餘驟沖情於月道飛峻賞於煙墟指山楹而思逸懷水鏡而神虛既而仰瞻赬嶠傍窺黛壑複嶂煙迴攢溪霧錯偉沈用之兼濟想神功之可作規謺巘於盤龍憲飛泉於挂鶴覆簣而營巖磴浮芥而環洲堮采拳石於溪濱搴纎珠於綺薄萍徙楚江之蔕花轉崑墟之萼岫蘊玉而虹驚浦涵珠而星落美仁智之同歸信高深之縱托爾其危岑漏影曲渚留寒高松偃鶴清篠吟鸞被蘭邱而結佩照蓮服而披冠激坳堂於別漵引膚寸於危巒若乃嶺橫雞秀波連鳳液花鳥縈紅蘋魚漾碧綠衣元衽赬鱗翠額在林藪而同驩望江湖而齊適每至景沈西㟧月下東濱峰深夜久潭靜秋新荷抽水葢薜引山茵雪芝獻液露菊傾津嗣南商之逸興有東海之遐賓保林泉而肆賞混簪紱而同塵何濯纓之有地如攀桂之無因咸亨二年余春秋二十有二旅寓巴蜀浮遊歲序殷憂明時坎壈聖代九隴縣令河東柳太易英達君子也僕從遊焉高談胷懷頗洩憤懣於時春也風光依然古人云風景不殊舉目有山河之異不其悲乎僕不才耿介之士也竊稟宇宙獨用之心受天地不平之氣雖弱植一介窮途千里未嘗下情於公侯屈色於流俗凜然以金石自匹猶不能忘情於春則知春之所及遠矣春之所感深矣此僕所以撫窮賤而惜光陰懷功名而悲歲月也豈徒幽宮狹路陌上桑間而已哉屈平有言目極千里傷春心因作春思賦庶幾乎以極春之所至析心之去就云爾若夫年臨九域韶光四極解宇宙之嚴氣起亭皋之春色况風景兮同序復江山之異國感大運之盈虛見長河之紆直蜀川風候隔秦川今年節物異常年霜前柳葉銜霜翠雪裏梅花犯雪妍霜前雪裏知春早看柳看梅覺春好思萬里之佳期憶三秦之遠道澹蕩春色一作風悠揚懷抱野何樹而無花水何堤而無草於是僕本浪人平生自淪懷書去洛抱劒辭秦惜良會之遒邁厭他鄉之苦辛忽逢邊候改遙憶帝鄉春帝鄉迢遞關河裏神皋欲暮風煙起黃山半入上林園元灞斜分曲江水玉臺金闕紛相望千門萬戶遙相似昭陽殿裏報春歸未央臺上看春暉水精却掛鴛鴦幔雲母斜開翡翠幃競道西園梅色淺爭知北闕柳陰稀斂態調歌扇迴一作端身整舞衣銀蠶吐絲猶未暖金燕銜泥試學飛妾本幽閨學歌舞寧知漢代多巡撫前年齋祭謁甘泉今歲笙簫祠后土桃花萬騎喧長薄蘭葉千旗照平浦見原野之秀芳憶山河之邃古長安路狹遶長安公子春來不厭看杏葉裝金轡蒲萄鏤玉鞍聳葢臨平樂迴笳出上蘭上蘭經鄠杜揮鞭日將暮白馬新臨御溝道青牛近出章臺路章臺接建章垂柳復垂楊草開馳馬埒花滿鬬雞場南鄰少婦多妖婉一作婉娩北里王孫駐行幰乍怪前春節候遲預道今年寒食晚傷紫陌之春度惜青樓之望遠紫陌青樓照月華珠帷黼帳七香車蛾睂畫來應幾樣蟬鬢梳時半欲斜恨雕鞍之届曉痛銀箭之更賒行行避葉步步看花因狂夫之蕩子成賤妾之倡家狂夫去去無窮已賤妾春眠春未起自有蘭閨數十重安知榆塞三千里榆塞連延玉關側雲間沈沈不可識葱山隱隱金河北霧裏蒼蒼幾重黑色忽有驛騎出幽幷傳道春衣萬里程龍沙春草遍瀚海春雲生疎勒井泉寒尚竭燕山烽火夜應明聞道河源路遠遠誰教夫壻苦行行君行塞外多霜露為想春臺一作園起煙霧遊絲空罥合歡枝落花自遶相思樹春望年年絕幽閨離緒切春色朝朝異邊庭羽書至都護新封萬里侯將軍稍定三邊地長斾猶銜掃雲色寶刀尚擁干星氣昨夜祁連驛使還征夫猶在鴈門關君度山川成白首應知歲序歇紅顏紅顏一別成胡越夫壻連延限城闕羌笛橫吹隴路風戎衣直照關山月春色徒盈望春悲殊未歇復聞天子幸關東馳道煙塵萬里紅析羽搖初日繁笳思曉風後騎猶分長樂館前旌已映洛陽宮洛陽宮城紛合沓離房別殿花周匝河陽別舍抵長河丹輪紺幰相經過戚里繁珠翠中閨盛綺羅鳳移金谷舞鶯引石城歌向夕天津洛橋暮爭驅紫燕黃牛度閒居伊水園舊宅邙山路武子新布金錢埒季倫欲碎珊瑚樹復道西墉春霧寡更值南津春望寫入金市而乘羊出銅街而試馬葉抱露一作草犯春而爭密花牽風而亂下錦障縈山羅幃照野司空令尹之博物二陸三張之文雅新年柏葉之樽上巳蘭英之斚春來併是春何啻兩違秦忽逢江外客復憶江南春羅衣乘北渚錦袖出東鄰江邊小婦無形迹特怨狂夫事行役鳳凰山上花無數鸚鵡洲中草如積春江澹容與春期無處所春水春魚樂春汀春鴈舉君道玉門關何如金陵渚為問逐春人年光幾處新何年春不至何地不宜春亦有當春逢遠客亦有當春別故人風物雖同候悲歡各異倫歸去春山恣間放蕙畹蘭皋行可望何為悠悠坐惆悵比來作客住臨卭春風春日自相逢石鏡巖前花屢密玉輪江上葉頻濃高平灞岸三千里少道梁山一萬重自有春光煎別思無勞春鏡照愁容盛年耿耿辭鄉國長路遙遙不可極形隨朗月驟東西思逐浮雲幾南北春蝶參差命儔侶春鶯綿蠻思羽翼余復何為此方春長歎息會當一舉絕風塵翠葢珠軒臨上春朝昇玉署調天紀夕憩金閨奉帝綸長卿未達終希達曲逆長貧豈剩貧年年送春應未盡一旦逢春自有人原夫佛者覺也神而化之修六年而得道統三界以稱師帝釋梵王尚猶皈闕一字老宣父寧不參隨昔如來下兜率天生中印土降神而大地搖動應跡而諸天擁護九龍吐水滿身而花落紛紛七寶祥雲舉足而蓮生步步葢以玉輦呈瑞金輪啟圖恩霑九有行洽三無寶殿之龍顏大悅春闈之鳳德何虞方知灌頂之靈心興王後嗣必為萬類之化主作帝中樞豈不知海量無邊天情極廣厭六宮珠翠之色惡千絲竹之響雪山深處全拋有漏之身心海月圓時頓悟無為之法相莫不魔軍振動法界奔驚覺閻浮之日出覩優鉢之華生十方調御皆來圓光自在六趣含霛盡喜金色分明暨乎萬法歸空雙林告滅演摩訶般若之教示阿耨多羅之訣普光殿裏會十地之華嚴耆闍山中投三乘之記別是知靈覺無盡神理莫聞芥子納三千之國藕絲藏百萬之兵目容修廣於青蓮寒生定水毫相分明於皓月照破迷雲㣥機而不覩靈蹤萬世而空留聖迹嗟釋迦之永法將盡仰慈氏之何日調伏我今回向菩提一心歸命圓寂鳳兮鳳兮來何所圖出應明主言棲高梧梧則嶧陽之珍木鳳則丹穴之靈雛理符有契誰言則孤遊必有方哂南飛之驚鵲音能中呂嗟入夜之啼烏况其靈光蕭散節物淒清疎葉半殞高歌和鳴之鳥也將托其宿止之人也焉知乎此情月照孤影風傳暮聲將振耀其五色似簫韶之九成九成則那率舞而下懷彼衆會罔知淳化雖璧沼可飲更能適於醴泉雖瓊林可棲復相巡於竹榭念是欲往敢忘晝夜苟安安而能遷我則思其不暇故當披拂寒梧翻然一發自此西序言投北闕若用之銜詔冀宣命於軒階若使之遊池庶承恩於歲月可謂擇木而俟處卜居而後歇豈徒比跡於四靈常栖栖而沒沒若夫乾靈鵲讖之端地輔龍驂之始憑紫都而授歷按元邱而命紀鳳毛鍾桂閫之祥麟角燦椒庭之祉馳朱軒於九域振黃麾於萬里抗芝館而星羅擢蘭宮而霞起則有皇慈霧洽聖握天浮庭分玉禁邸瞰金樓翦鳧洲於細柳披鶴籞於長楸啟魚鈐而分帝術授虹璧而控神州擁黃山於石磴洩元灞於銅溝列瑤窗而送燠闢銀牓而迎秋君王乃排青幌搖朱舄戒鵷輿靜鸞掖繞震廊而轉步傃雲阡而縱跡嘯陳客於金牀命淮仙於桂席翔翠䍐於雲甸迎簫吹於鳳驛佇靈匹於星期眷神姿於月夕於時玉繩湛色金漢餘光煙淒碧樹露濕銀塘視蓮潭之變彩睨松院之生涼引驚蟬於寶瑟宿孏燕於瑤筐綠臺兮千仞赩樓兮百常拂花筵而慘惻披葉序而徜徉結遙情於漢陌飛永睇於霞莊想佳人兮如在怨靈歡兮不揚促遙悲於四運詠遺歌於七襄於是虯檐晚靜魚扃夜飭忘帝子之光華下君王之顏色握犀管展魚牋顧執事招仲宣仲宣跪而稱曰臣聞九變無津三靈有作布元氣於浩蕩運太虛於寥廓辨河鼓於西壖降天孫於東堮循五緯而清黃道正三衡而澄紫落海人支石之機江女穿鍼之閣鄙塵情於春念擬仙契於秋諾於是光清地岊氣斂天標霜凝碧宙水瑩丹霄躍麟軒於霧術褰羽斾於星橋徵赤螭而架渚漾青翰而乘湖停翠梭兮卷霜縠引鴛杼兮割冰綃舉黃花而乘月艷籠黛葉而卷雲嬌撫今情而恨促指來緒而傷遙既而丹軒萬栱紫房千籥仙御逶遲靈徒擾弱風驚雨驟煙迴電爍媧皇召巨野之龍莊叟命雕陵之鵲駐麟駕披鸞幕奏雲和汛霞酌碧虯玉室之饌白兔銀臺之藥荷葉赬鮫芙蓉青雀上元錦書傳寶字王母瓊箱薦金約綵襻魚頭比目縫香鍼燕尾同心縛羅帳五花懸珉砌百枝然下芸幬而匿枕弛蘭服而交筵託新歡而密勿懷往眷而潺湲於是羈鸞切鏡旅鶴驚弦悲侵玉履念起金鈿儼歸裝而容曳整還葢而遷延洞庭波兮秋水急關山晦兮夕霧連謂河漢之無浪似參商之永年君王乃背彤砌陟元室沖想自閑神情如逸痛靈之稀偶嘉沈思之可畢荊豔齊升燕佳並出金聲玉韻蕙心蘭質珠櫳綺檻北風臺繡戶雕窗南向開響曳紅雲歌面近香隨白雪舞腰來掩清琴而獨進凌絳樹而輕迴盧女黃金之盌張家碧玉之杯奉君王於終夕夫何怨於良媒俄而月還西漢霞臨東沼鳧氏鳴秋雞人唱曉玉關控鶴瓊林飛鳥君王迺馭風殿而長懷俯雲臺而自矯矜雅範而霜厲穆沖衿而煙渺迎十客召三英香涵蔗酎吹肅蘭旌娃館疎兮綠草積歡房寂兮紫苔生聳詞峯於月殿披翰藪於雲扃方絕元凱而高視應與梁楚而駢聲元武山西有廟山東有道君廟葢幽人之別府也長蘿巨樹梢翳雲日王子御風而遊泠然而善葢懷霄漢之舉而忘城闕之戀矣思欲攀洪崖於煙道邀羨門於天路仙師不存壯志徒爾俄而泉石移景秋陰方積松柏㣥吟背聲四起背鄉關者無復向時之榮焉鳴乎有其志無其時則知林泉有窮路之嗟煙霞多後時之歎不其悲乎遂作賦曰陟彼山阿積石峩峩亭皋千里傷如之何啟松崖之密蔭攀桂岊之崇柯隔浮埃於地絡披顥氣於天羅爾其綠巖分徑蒼岑對室菌軒丹絢蕙場翠密俯泉石之清泠臨風飈之䫻瑟仰紺臺而攜手望元都而容膝於是躡霞岡於玉砌步雲岊於金壇懷妙童與真女想青螭及碧鸞情恍恍而將逸心迴迴而未安見丹房之晚晦忘紫洞之宵寒既而霧昏千嶂煙浮四野恨流俗以情多痛飛仙之術寡驅逸思於方外跼高情於天下使蓬瀛可得而宅焉何必懷於此山也亂曰已矣哉吾誰欺林壑逢地煙霞失時託宇宙兮無日俟虬鸞兮未期他鄉山水祇令人悲海上兮雲中青城兮絳宮金山之斷鶴玉色之驚鴻謂江湖之漲不足憩謂宇宙之路不足窮終銜石矢坐觸金籠聲酸夕露影怨秋風已矣哉何氣高而望闊卒神顇而智癢徒騖迹於仙遊竟纏機於俗網未若茲禽猶融泛想慚丹邱之麗質謝青田之逸響與道浮沈因時俯仰去非內懼馴非外獎夫勁翮揮風雄姿觸霧力制煙道神周天步鬱霄漢之宏圖受園亭之近顧質雖滯於城闕策已成於雲路陳平負郭之居韓信昌圖之寓似達人之用晦混塵濛而自託類君子之含道處蓬蒿而不怍悲授餌之徒懸痛聞弦之自落故爾放懷於誕暢此寄心於寥廓昔之賦芙蓉者多矣雖復曹王潘令之逸曲孫鮑江蕭之妙韻莫不雜陳麗美粗舉採掇豈所謂究厥豔態窮其風謠哉頃乘暇景歷睹衆製伏翫累日有不滿焉遂作賦曰非登高可以賦者惟採蓮而已矣况洞庭兮紫波復瀟湘兮綠水或暑雨兮朝霽乍涼飈兮暮起黛葉青跗煙周五湖紅葩絳蘤電爍千里尤見重於幽客信作謠於君子爾其珍族廣茂淑類博傳藻河渭之空曲被沮漳之淪漣燭澄灣而爛爛亘修漲之田田豈直水區澤國江漘海壖是以吳娃越豔鄭婉秦妍感靈翹於上節悅瑞色於中年錦帆映浦羅衣塞川飛木蘭之畫楫駕芙蓉之綺船問子何去幽潭採蓮已矣哉誠不知其所以然賞由物召興以情遷故其游泳一致悲欣萬緒至若金屋麗璇宮佚女傷鳳臺之寂寞厭鸞扃之閒處侍飲南津陪歡北渚見磯岸之紆直覿旌旄之低舉上苑神池芳林御陂樓陰架沚殿彩乘漪張燕洛之容衞備橫汾之羽儀簫鼓發兮龍文動鱗羽喧兮鷁首移咸靚妝而麗服各分騖而並馳蘋縈槳礙荇觸船危視雲霞之沃蕩望林泉之蔽虧洪川泱泱兮菡萏積綠水湛湛兮芙蕖披惜時歲兮易暮傷君王兮未知折紺房與緗菂攬紅葩及碧枝迴綃裙兮竊獨歎步羅韈兮私自奇莫不驚香悼色畏別傷離復有澤宮年少期門公子翠髮蛾睂赬脣皓齒傅粉蘭堂之上偷香椒屋之裏亦復銜恩激誓佩寵緘愁承好賜之珍席奉嬉游之彩斿繡棟曛兮翠羽帳瑤塘曙兮青翰舟搴條拾蕊沿波泝流池心寬而藻薄浦口窄而萍稠和橈姬之衞吹接榜女之齊謳去復去兮水色夕採復採兮荷華秋願承歡而卒歲長接席而寡仇於時薊北無事關西始樂霧靜江垠氣恬海漠寢怪氣於沅湘照榮光於河洛殊方異類舞詠相錯王公卿士歌吹並作則有侯家瑣第戚里芳園穿池灞岸之曲蓄水河陽之源隄防谷口島嶼轘轅嘉木畢植靈草具繁沈桂北之丹藕播荊南之紫根鬱萋萋而霧合燦煜煜而霞翻洎乎氣徹都鄙景華川陸麥雨微涼梅飈淺燠命妖侶於石城嘯娛朋於金谷乃使綠珠捧棹青琴理舳樽芳醪藉珍餗汎玉潭之瀰漫遶金渠之隈隩石近水而苔濃岸連山而樹複排芰末而爭遠託蘆間而競逐赴汨凌波飛袿振羅風低綠幹水濺黃螺上客喧兮樂未已美人醉兮顏將畏蓮色之如臉願衣香兮勝荷徘徊郢調悽慘燕歌念窮歡於水涘誓畢賞於川阿結漢女邀湘娥北溪蕊尚密南汀花更多恨光景兮不駐指芳馨兮謂何若乃南鄢義妻東吳信婦結褵整佩承筐奉帚忽君子兮有行復良人兮遠征南討九真百越北戌雞田鴈城念去魂駭相視骨驚臨春渚兮一送見秋潭兮四平與子之別煙波望絕念子之寒江山路難水淡淡兮蓮葉紫風颯颯兮荷華丹翦瑤帶而猶欷折瓊英而不歡既而緣隈逗浦返栧歸木虜睠芳草兮已殘憶離居兮方苦延素頸於極漲攘皓腕於神滸惜佳期兮末由徒增思兮何補又若倡姬蕩媵命侶招㣥淇上洛表湘皋汝墳望洲草兮翡翠色動浦水兮驪龍文願解珮以邀子思褰裳而從君悲時暮愁日曛鳴鐶釧兮響窈窕豔珠翠兮光繽紛憐曙野之絳氣愛晴天之碧雲櫂巡汀而柳拂船向渚而菱分掇翠莖以翳景襲朱萼以為裙艇楫凌亂雲流雨散鳴榔絡繹霧罷煙釋狀飛虯之蜿蜿若驚鴻之奕奕艇怯奔潮篙憎淺石絲著手而偏遶刺牽衣而屢襞迺有貴子王孫乘閒縱觀何平叔之符彩潘安仁之藻翰稅龍馬於金隄命鳧舟於石岸錦纜翻灑銀檣照爛日側光沈風驚浪深紆北渚之新贈恣東溪之密尋鴛鴦繡彩之文履瑁瓊華之寶琴扣舷擊榜吳歈越吟溱與洧兮葉覆水淮與濟兮花冒潯值明月之夕出逢丹霞之夜臨茱萸歌兮軫妾思芍藥曲兮傷人心伊採蓮之賤事信忘情之葢寡雖迹兆於水鄉遂風行於天下感極哀樂聲參鄭雅是以緬察谷底窮覽地維北盡豐鎬勞潏南究巴沱越沂莫不候期應節沿濤汎湄薄言采之興言服之發文扃之麗什動幽幌之情詩使人結眷令人相思宜其色震百草香奪九芝棲碧羽之神雀負青冄龜之寶龜紫帙流記丹經祕詞豈徒加繡柱之光彩煜文井之華滋已焉哉向使時無其族代乏厥類獨秀上清之境不受中國之地學鸞舞而時來與鶼鰈而間至必能使衆瑞彩沒㣥貺色沮湯武齋戒伊皋延佇豈俾夫楚童趙僕倡姬豔女狎而翫之擷而採之乎時有東鄙幽人西園舊客常陪帝子之輿經侍天人之藉詠綠竹於風曉賦彤管於日夕暑往寒來忽矣悠哉蓬飄梗逝天涯海際似還卭之寥廓同適越之淫滯蕭索窮途飄飄一隅昔聞七澤今過五湖聽菱歌兮幾曲視蓮房兮幾珠非鄴池之宴語異睢苑之歡娛况復殊方別域重瀛複嶂虞翻則故鄉寥落許靖則生涯惆悵感芳草之及時懼修名之或喪誓將剗跡潁上棲影渭陽枕箕岫之孤石汎磻溪之小塘餐素實兮吸絳房荷為衣兮芰為裳永潔已於邱壑長寄心於君王且為歌曰芳華兮修名奇秀兮異植紅光兮碧色稟天地之淑麗承雨露之霑飾蓮有藕兮藕有枝才有用兮用有時含香婀娜華實移為君何當藻鳳池梓州之東南涪江之所合有潭焉周數十步青壁絕地綠波澄天常有孤鳧棲蕩其側飛沈翻唼而天性不違嗟乎宇宙之容我多矣造化之資我厚矣何必處華池之內而求稻粱之恩哉遂作賦曰靈鳳翔兮千仞大鵬飛兮六月雖憑力而易舉終候時而難發不如深澤之鳥焉順歸潮而出沒迹已存於江漢心非繫於城闕吮紅藻翻碧蓮刷霧露棲雲煙迫之則隱馴之則前去就無失浮沈自然爾乃忘機絕慮懷聲弄影乘駭浪而神驚漾澄瀾而趣靜恥園雞之戀促悲塞鴻之赴永知動息而多方屢沿洄而自省故其獨泛單宿全真遠致反復幽溪淹留勝地傷雲鴈之嬰繳懼泉魚之受餌甘辭稻粱之惠焉而全飲啄之志也歲八月壬子旅遊於蜀尋茅谿之澗深溪絕磴人跡罕到爰有松焉冒霜停雪蒼然百丈雖崇柯峻穎不能踰其岸嗚呼斯松託非其所出㣥之器何以別乎葢物有類而合情士因感而成興遂作賦曰惟松之植於澗之幽盤柯跨嶮沓柢憑流寓天地兮何日霑雨露兮幾秋見時革之屢變知態俗之多浮故其磊落殊狀森梢峻節紫葉吟風蒼條振雪嗟英鑒之希遇保貞容之未缺攀翠崿而形疲指丹霄而望絕已矣哉葢用輕則資衆器宏則施寡信棟梁之已成非榱桷之相假徒志遠而心屈遂才高而位下斯在物而有焉余何為而悲者吾之旅遊數月矣憩乎荒澗覩青苔焉緣崖而上迺喟然而歎曰嗟乎苔之生於林塘也為幽客之賞苔之生於軒庭也為居人之怨斯擇地而處無累於物也愛憎從而生遂作賦曰若夫桂洲含潤松崖祕液繞江曲之寒沙抱巖幽之古石汎迴塘而積翠縈修樹而凝碧契山客之奇情諧野人之妙適及其瑤房有寂瓊室無光霏微君子之砌蔓延君侯之堂引浮青而泛露散輕綠而承霜起金鈿之舊感驚玉筯之新行若夫弱質帛丿糸羃纖滋布濩措形不用之境託跡無人之路望夷險而齊歸在高深而委遇惟愛憎之未染何悲歡之詭赴宜其背陽就陰違喧處靜不根不蔕無華無影恥桃李之暫芳笑蘭桂之非永故順時而不競每乘幽而自整廣漢山谷有竹名慈生必向內示不離本修莖巨葉攢根沓柢叢之大者或至百千株焉而縈結踰乎咫步好事君子徙為堦庭之翫焉吁嗟非此土所有乃有厭流俗之譏動鄉關之思者葢撫高節而興歎覽嘉名而思歸遂為賦曰有竹猗猗生於高陂左連瑤帶右雜瓊枝恨幽客之方賞嗟君侯之不知徙蔚丹谷遷榮綠池氣凜凜而猶在色蒼蒼而未離屈巖壑之容貌充堦庭之羽儀爾其畫疆分域駢陰抗趾謺幹龍迴攢根鳳峙防碧露於霄末翳紅光於暈始崇柯振而雲靄生繁葉動而風飈起擁涼砌之晨肅屏炎扃之晝滓至若白藏載謝元英肇切塞北河堅關南地裂觀衆茂之咸悴驗貞輝之獨潔抽勁綠以垂霜總嚴青而負雪葢同類之常稟非殊方之異節若乃宗生族茂天長地久萬柢爭盤千株競糾如母子之鈎帶似閨門之悌友恐孤秀而成危每㣥居而自守何美名之天屬而和氣之冥受嗟乎道之存矣物亦有之不背仁以貪地不藏節以遁時故其貞不自炫用不見疑保夷險之無易哂榮枯之有期俄蓬轉於岷徼遂萍流於江汜分兄弟於兩鄉隔晨昏於萬里撫貞容而骨愧伏嘉號而心死庶因感而長懷將策情而勵已
