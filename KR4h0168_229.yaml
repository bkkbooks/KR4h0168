front:
  text: 全唐文欽定全唐文卷二百二十九張説九
  hash: sha256:e8ad5b5ec38552dcd88ea8bbd20d93d5b338ab877b8df361b1dcffd40692dfa3
body:
  text: 若夫孝在揚名忠歸令德事因感激氣概生焉時逢屯難勳業成焉桃李灼灼不自言於蹊徑松柏青青不受令於霜雪窮獨善而無撓達兼善而無矜子曰君子哉若人斯吾河東公之謂也公諱執一字某宏農華陰人也司徒觀王雄之曾孫鄆州宏農公續之孫潞州胡城公思止之子戶部尚書相國執柔之弟觀公侍中恭仁公之伯父也安德公尚書令師道公之叔父也在隋則二代五公在唐則一門三相公台輔積慶稟清明之識河嶽會靈資磊落之氣體剛毅深於城府蘊規略長於襟帶戲為軍陳敵國之勢幼成請學兵書長城之望早集年甫十六先君捐館七日絶飲三年泣血縞綅有制儒家歎其從禮柴棘加等議者憂其死孝清門祖德勢胄能貧太夫人在堂有致力之養非躬藝黍稷不以供甘旨非手樹桑麻不以薦絺纊年逾一紀勤不知勞既極安親之心方展事君之節乃濯纓璜渚獻策金門干當代之聖君論天下之成敗秦皇覽奏屏左右而與謀漢帝聞言膝前席而不覺一見拔玉鈐倉曹再見取尚食直長三見置典設郎驟進直詞深觸權嬖為易之兄弟所嫉左授伊州府果毅又上封章帝用嘉納加遊擊將軍右衛郎將歷左清道率換右衛中郎押千騎使總統貔武便繁肘腋故得協心五王戡勦二豎奮飛北落推戴中宗嗣唐配天不失舊物以匡復勳拜雲麾將軍右鷹揚將軍封宏農縣公賞未充庸且有後命增冠軍大將軍右威衛將軍進河東郡公邑二千戶賦四百室俾之鐵券恕其十死又賜天馬瑞錦珠盤瑤爵綵紋五百縑素三千分三土之上腴處五等之高列雕戈紫綬環衛於鈎陳玉瓚黃流侍祠於清廟豈知釁結梁魯政出艷哲里克納惠而為戮萇叔城周而見咎彼五績之摧穨此三黜之屯躓出為常州刺史以太夫人羸老乞避卑濕特降中旨轉牧晉州駙馬都尉琅琊王同皎親賢地切休戚圖深安劉之策未遂鍾室之災先及吏扇紛嶽公陷關通貶徙沁州刺史不知事仍長任夜魂九逝非北首而無歸晝戶重扃異南冠而同縶果能推分榮辱忘懷生死人不堪其憂公不改其操久之盡削官封放還侍母梁山雨雪不隔曾氏之思王畿風景來就潘園之養尋而大勳不廢天道復反歸既奪之井邑起故時之將軍擢衛尉卿復初封爵巖巖劍山蜀之險要嗷嗷飛鴈人未安居飢渴仁明輯綏凋弊又授公劍州刺史蔚彼黍苗樂我膏澤內憂遠訃殞絶逾時於是搏膺星奔徒跣永路雨不接乘夜不解縗因心通禮朝流欽歎有命奪情除汾州刺史知團結兵馬哀訴不允金革無違中國稽而有備單于遁逃而遠迹詔徵為涼州都督兼左衛將軍河西諸軍州節度督察九姓赤水軍等大使公富以農政和以師律彰信蕃部赫怒軍容斷胸奴之臂磧路安而不警張漢家之掖雪山開而無寇遂攝御史中丞璽書勞徠縟賞稠疊又牧原州未發復授涼州都督改右衛將軍使悉如故尋移許州刺史未到以單于款關授右衛將軍檢校勝州都督兼處置降戶使懷柔以德種落宜之徵還本官又兼原州都督旋屬降戶翻叛河朔俶擾邊城聳蹙諸將無功強修連率夏州按察關內羽書日夜俾還郡牧公按甲待敵確乎不動虜騎畏威竟無來掠向使回避行於一步則攘竊啓於萬端十將耗五數年未復既而強公追愧朝端延賞徵拜右威衛大將軍進檢校右金吾大將軍尋而即真禁衛肅然異於他日也皇上哀庶戮之不辜念㣥胡之自孽大軍之後荊棘生焉乃命公攝御史大夫為朔方元帥公剛腸疾惡擒姦摘罪曩將之所彌縫宿吏之所乾沒匿贓散廩一徵百萬矯枉過正衆口囂然改右衛大將軍無何復右金吾大將軍金刀更新骲鞘仍舊巖廊益峻徼道增清改金紫光祿大夫鄜州刺史人寬吏急猶前政也享年六十有五開元十四年正月二日薨於官舍闔境發喪列城望祭古之遺愛何以加焉天子傷之下詔曰故官某夙負名義早著勳庸居內外之職備文武之任忠勤匪懈誠節無渝忽焉徂沒情深悲悼可贈戶部尚書歸賵成喪有加恆數惟公以孝敷聞以忠特達以幹述職以能典兵凡領郡十四將軍十二再杖節鉞三執金吾一至九卿二兼獨坐儼有直道侃無媚辭銀艾復乎舊德圭爵傳乎祚允全忠節於夷險與福祿而終始諡曰忠公朝之令典也夫人新城郡夫人獨孤氏左威衛大將軍贈益州都督卿雲之女也婦德母儀中外師範開元四載先公即穸以今十五年六月合葬於咸陽之洪瀆川禮也其孤濯汪等銜恤靡訴託詞疇識感稱伐之垂文哀劬勞之罔極銘曰堂堂楊公神密氣雄苦身難孝正國危忠落彼狡童樹此帝功昔稱關西今也河東觀王之裔珠華玉麗重葉尚主三朝嬪帝韡韡七德侁侁六藝公之亢宗鬱為世濟涼鎮西隅朔臨北胡天子授鉞將軍剖符青入笥白獸銜珠去持玉節來執金吾轉豫爪士守於鄜畤明察號神仁恩名子武都石折文昌星死素蓋歸飛黃泉巳矣卜葬卷阿哀榮孔多尚書鼓吹太平虞歌碑流雨迹松引風過獨封茅土長誓山河維大唐開元十五年閏九月二十三日庚申右羽林大將軍持節河西隴右兩道節度使營田九姓轉運十副大使兼赤水大使專知節度事攝御史中丞判涼州都督上柱國晉昌伯薨於鞏竹屯亭故也夫事君效命之謂忠殺敵榮親之謂勇干星襲月之謂氣逐日拔山之謂力有一於此名猶蓋代矧兼其四人何間焉是晉昌所以錯落將星崢嶸山嶽者也公諱君奐比字威明州常樂人也父壽因公建績致位九卿臨難守死褒贈特進審塞翁之倚伏達蒙叟之浮休老而益壯沒而立名者矣公威聲發於雷泉武毅標於洞嶺小頭鋭上猿臂虯鬚龍劍摧百勝之鋒蛇矛得萬人之敵拔自行陳果有呂蒙之才拜於壇場不爽韓信之用始任鎮戍列班外府及郎將中郎至軍副率雖驟移官守而恆在疆場郭知運推轂河源握符隴右公未登一命事主將之旌麾不出十年代總戎之節鉞慷慨之士以為美談於是自驍衛將軍遷羽林大將軍既督隴右兼統河西綰塞垣之十軍佩節制之兩印大田多稼而屯廩百億搜乘籍馬而鐵騎數萬乃蹈赤山焚罽幕獵青鳥驅犛牛喑嗚則七戎辟易烜赫則千里震動亭恃其長城廟堂賴其神將月獻戎捷歲行軍賞王侯無種屠狗起於將軍戰伐有功爛羊超於都尉前後翻飛幕下奮躍行間跨軍典郡腰金冠玉者數十百人矣每至入朝奏謁升殿論邊山川險易立成於聚米攻守方略一決於前籌遙詔置兵先合漢光之旨新書從事暗同魏武之心故得延譽上騰風雲鬱其氣色恩榮下沓日月借其光輝當斯時也躊躇攘袂三垂可以氣壓百蠻可以力制即敘者老生之常談和親者豎儒之怯計安足為神武非常之主道哉誓請先拔犬戎次繫獯鬻盡區域於西海闢郡縣於北荒燀皇靈於天外圖壯節於雲閣其事如果曠古未儔惟君知臣保斯言之可復何神與善負厥志而無成是年秋八月吐蕃犯邊州失守盜憎我將執致其親公以為背父立威非孝也頓兵從敵非忠也大義逼而忘家方寸亂而供國其定計也成列而出討賊盡狄而退殺身忠在孝先將之道也公馳驛要諜而回紇內叛以八九之從人當數百之強虜然猶虓噉擊射殺傷略半亭孤兵盡流矢橫及所謂仆而餘威折而不撓矣嗟乎嘗膽之憤空結噉肝之怨莫讎天子聞之黯然興歎人言以命許國夫豈忘其言哉苟收必死之忠焉問不虞之過至矣蓋聖主推仁恕於天下懸大信於後人愛欲其生懲晉侯再克之喜惡傷其沒抱秦伯猶用之誠婉獨見之端豈常情所逮謀臣飲恩於望表猛將感德於事外然後任人之固衆可知也乃下詔追贈特進荊州大都督禮命窀穸加常二等死事之經也公之伉儷曰武威郡夫人夏氏韓母築城之智孟光舉臼之材拔棘解圍三軍懾其健婦崩城慟哭四海傷其孝妻此又間代之一竒一家之兩絶者也嗣子尚衣奉御承榮天奬賜蘭星祥名寶禮義形於橋梓哀戚過於縗麻稟訓帷堂克持門戶特奉恩旨收其二蔭飾柩玉關歸魂上國以十六年十月詔葬於萬年縣見子之原鹵簿齊列方相雙引京尹護喪史官頌石千乘送葬觀驃騎之威儀十里開塋識龍驤之邱墓銘曰合衆在仁正兵惟義將為天目國命所寄曲乃老師輕實兒戲安我封略才難不易赳赳將軍貔貅絶㣥超騰白地騫翥青雲朝盛勇爵家榮戰勳衆聲飛譽帝曰豫聞豫聞伊何甲兵繕肅屯積萬庾馬量百谷甘心犬戎指掌獯鬻大畢當跐單于可掬壯計先達王師未張城隳孤塞寇及高堂忠先孝後取敵而亡外仇易復內變難防克日將戰呼天不假岑彭詐客張飛帳下流鏑何人交錢去馬蒼皇反復哀哉命也美殮姑臧寵歸芷陽東都門外南登路傍高墳纍纍列樹行行父子同兆何殊故鄉詔刻金石義形意氣隱善必書殤魂不諱事棄忠在生輕節貴嗟爾明靈銜恩永慰仁以度心施物義以由道利貞孝以養志安親慈以教忠有後舉四行之尤善成百代之餘慶蓋得之於蕭府君矣公諱灌字元茂蘭陵人帝高辛之苗裔也元鳥受命敬敷五德白雲入房網開三面微子封宋樂叔居蕭氏族之始也相國下秦大夫師漢門閥之宗也大齊以肅竹膺期踐皇帝之位大梁以木刃興運張天地之圖傳寶祚於一家易鴻名於兩漢青蓋入洛重南國之衣冠白馬朝周盛西雍之賓客公即梁宣皇帝之元孫明皇帝之曾孫大父南海王珣入隋封梁國公纂德乾坤承靈睿哲舊邦雖改見周鼎之時輕新社仍封知晉圭之必大考鈞中書舍人率更令宏文集賢兩館學士學窮祕賾文標宗匠廣博幽深契神無迹溫良恭儉與道為徒是謂啓迪後昆而焜耀前烈者也公總山河之粹氣注日月之末光心根孝友器包禮樂動躡思後故口無擇言照在機前故身無擇行加以啓蓬山之塞路入藏室之元關四科得遊夏之門六藝取鍾王之雋年十八明經高第補代王功曹王升儲改通事舍人又換內直監曳裾西苑擅文士之場束帶東朝首正人之列尋以外艱去職王戎死孝時論憂之閔子免喪哀心未盡乃不就祥縞不撤几筵者久之或曰懷其寶迷其國行其志約其親可乎哉公曰吾過矣不得巳而外除不擇官而祿仕拜國子監丞以婚姻之故出為甘州司馬徙集嵐二州司馬轉渝州長史其從政也反身以惠下推誠以敬上老吾老以施教幼吾幼以子人執是心也何往不濟故歷佐之郡必僻陋知方戎蛋變俗狠戾馴軌貪叨寡欲迎新者望風而歌來暮送故者計日而戀不足詩云淑人君子正是國人能長人之謂也太夫人在堂有羸老之疾公因使入計得扶侍還京下巫峽之波上當陽之坂展轉在側殷憂歷時席不安枕衣不解帶及板輿長稅遂扶杖不起子春視疾加損徒勤石建執喪悲哀自絶永淳元年八月寓居穰縣終於苫蓋春秋五十有七先君之服也三年有終公過時不釋聖善之喪也五十不毀公戀親滅性君子曰禮也夫可謂至矣夫人京兆韋氏祖雲起兵部尚書父師實秦州都督公卿令族蘭杜齊芬鳳凰飛鳴始正家道珠玉秀色終高母儀年五十有四長壽元年十月逝於京師布政里粵以二年二月辛卯合葬於少陵原之先塋禮也其孤嵩克戴聖君以宰天下大福再成於身後湛恩廣運於泉路開元十七年仲冬癸丑詔曰中書令嵩父某育粹沖和降靈神象言入精微之奧迹登聖賢之軌位不充量道足庇人松檟雖幽音徽不昧宜承追遠之慶俾崇冢宰之榮可贈吏部尚書同日詔曰嵩母韋氏門傳一經行包四德才淑冠乎邦族言範光乎母師誕茲寶臣作豫良弼封其石窖俾承土宇之榮表以金章永閟珩璜之飾可贈魏郡夫人於是建宗廟修禮物榮君後命告我前人遠哉心乎一恩一敬之感會也如是垂裕立訓克家揚名遺愛至矣慎終備矣東武公之子孫共連塋闕南城侯之夫婦同刻碑銘詞曰維蕭係宗出宋之子天命齊歷河圖梁紀纍帝重王雍容文史是生邦俊世濟其美仁義孝慈中和庸祗文章鳴鳳禮樂元龜碣館枚馬儲闈潘賈人望國華風流儒雅歷佐列郡政成休問行立時法言垂後訓沒而益榮追位冢卿哀感有情事傳無聲墓門松平碑字金生不知千古誰遊九京金之為寶百鍊而惟精玉之稱德久幽而不昧聖人美焉君子比焉可鑠也不可奪其剛可毀也不可污其潔偉哉馮公秉斯操矣公諱昭泰字遇聖長樂人也説學於古史豈不聞舅氏之厥初乎畢公建德於周畢萬大名於魏別封之裔遂氏馮城秦則丞相並時漢則將軍重世積仁鍾慶王者鬱興間晉南浮因燕北號家變成國為天下雄勳業競五伯之先子孫齊二王之後公即昭成皇帝之十代孫也高祖大將軍隨州刺史長山公謙以寇恂之才翊戴周武曾祖兵部尚書左僕射魏國公世基以曹參之力經濟隋文大父尚書左丞檢校御史大夫少府監揚州長史安昌公長命以佳吏之名勤勞王室考仁高亮無祿子道不究故公幼而襲安昌公焉清明激徹標格峻豎夏翟耿介無矯飾於韋絃寒松青冥不受令於霜雪專經覩奧習法精理起家左奉裕改讓賢府果毅換文州司馬為酷吏所陷罷官久之調榮州長史屬城慢法按而繩之入計會府仇家橫訟明敕杖其訴者遷公宋州司馬朝廷翕然知有王法復假右臺侍御史江南道廉察使類會高等加朝散大夫進潞州長史堆岸受湍獨醒見嫉轉湖州長史公束濕不回聚蚊交訕貶為饒州司馬未行降使詳覆拜鄂州刺史制曰卿志氣剛徑操履貞潔歷佐藩條咸有聲稱詰姦糾繆不避強禦苦節清威若淩霜雪頃因讒毀遂有貶降使者案問皎然明白俾從優奬特加寵命其在江夏異政風行入為太子家令兼知內外鑄錢事國泉是殷盜鋊乃絶河朔淫雨帝思作乂俾公檢校邢州刺史散有賙無人忘歉歲帝乃璽書勞焉其旨曰卿忠於事君以臨下忘私徇公之美歌謠所載擒姦摘伏之竒吏人攸仰雖陳朔之貶黜邪慝王業之斥除貪殘無以加也一郡清靜副朕意焉其後以戚纍移睦州刺史復為㣥小所譖左授泉州司馬未之任又貶榮州司馬公砥節荒服天高聽卑旋除溫州長史俄復舊階拜括州刺史水國瀐洳告疾言歸景龍三年六月十三日終於蘇州之逆旅春秋六十有五正人歎息舊蒞傷感公清白傳家信義高世門有竒士室無長物夫其善於鈎距長於襟帶法嚴令峻人寬吏急當官而行不避讒慝之口除惡務本不求愷悌之譽出入從宦十有六職以謗獲貶者五洗謗特遷者四不曰忠乎將無悔於九死不曰直乎焉往而不三黜故人謝而名益著迹遠而風可懷也皇上志其持法不撓贈大理卿本其坐樹無言諡之曰節窀穸之事一以官供哀榮之禮被於存沒是時天子嚴謁山陵訓人追孝推恩庶物瀉澤幽泉公長子少府監紹正次子給事中紹烈並構層堂仰延榮贈乃贈公工部尚書君子曰孝必錫類忠則不墜臧孫達其有後乎鄭公業為不亡矣夫人琅琊君左相邢公及善之女垂拱二年三十六而夭後夫人彭城君鴻臚卿善因之孫女景龍三年五十有五而逝所謂齊薑昭前邦媛輝後碧樹先落悲同孫楚之妻紅蘭漸苞貴在馮勤之母以開元十八年十月壬寅葬我節公於長安縣高陽原夫人王氏劉氏祔焉禮也長子紹正少府監第四子紹忠未仕第五子紹烈御史中丞孝乎二連之心思崇三絶之美魏主來顧賞幼婦之碑秦師不侵尊死士之壠揚名稱伐道遠乎哉銘曰古之志士忠不違難倬哉馮公矯此雲翰囂囂㣥小彼何足算屢困忠直天下改觀經用百年窮達相半貽慶二子雙承天渙嚴嚴大理人命是懸聖朝表贈王道無偏六卿冬官百工攸序韓稜雖沒龍泉可許邱陵鼓舞兮改谷移山歲月奔波兮有去不還惟德音與頌石傳不朽於人間蛟龍蟠乎沼無雲雨而不翔君子志於道無運命而不彰然則變化者是神靈之末富貴者非德行之本守其真樂其分不其至矣世有人焉君諱漪字某博陵安平人在唐為薑姓炎帝之孫也在周為崔氏齊侯之允也遙源長發洪河之水接於天層盤列秀太行之山拒於海東觀所以美其文宗北州所以貴其清族魏冀州刺史公諱纂君之高祖也齊散騎常侍諱觖君之曾祖也隋大理少卿諱世立君之大父也故祁陽令諱抗君之皇考也承百代之隆慶總五德之清淳孝友忠肅宣慈恭儉好古博雅鄰幾亞聖盈而若虛漠而無象非夫入周公之廟升孔子之堂則憲章禮樂鮮得其門而覩矣弱冠以門胄入國學舉進士母弟汲以明經同年擢第大理卿張公文瓘人倫之表也目君曰昔兩劉並舉以為騁二龍焉今兩崔齊飛可謂儀雙鳳矣縉紳景慕憧憧往來徙宅就居投刺成市若衆流之赴壑也及親而仕盤桓利貞解褐澤州晉城尉降為光州安樂尉換蘄州黃梅尉轉河間丞凡更三尉佐四邑體公綽之不欲勵伯夷之高操臨事以御人以寬雖為小政必有可觀故八使巡風再薦清白河上遺老江濱舊吏吟咏餘聲祖述前事人到於今稱之若夫碧樹煙藹於江潭紅荷藻耀於澤畔寶貝炯光於空浦美玉明潤於斷岸不為珍輿瑤輦之飾前殿後池之玩誠自得焉必將有賞心之所歎也況乎殿邦光國之寶樽俎柱石之器道為帝王師言為天下利巳而稅遠駕於窮轍頓高才於下位亦無懵焉固將有知音之所欷也垂拱元年奉使上都遘疾終於時雍里之旅館享年六十有二夫人河東裴氏湖州治中懷儉之孫滁州司馬昉之女也稟訓華室作合高門嗣徽先姑克和娣婦德容之盛圖傳罕有喪親過毀蕣華朝落儀鳳中卒於鄭春秋二十有八長安三年春二月合葬於金谷鄉邙山之陽禮也北據高岡連隴南面大道禁林上國皇州川原指掌仙門宰樹碑闕相望元靈嘉之是安是宅嗣子日用景龍中爵安平縣子職兵部侍郎夙遭閔凶不承誨誘慎終追遠克家用譽蒙聖主拔竒賞異絶等超倫三顧赤墀之下一舉青雲之上祿廩所資吉蠲致美實先人宥十世降百祥之所及也永惟官不達者身不登乎明堂行不夸者名不書乎史册則韜光隱德之緒俾後代將何述焉夫銘景鍾稱茂伐彼大夫之事篆豐石揚令名此孝子之志辭曰維嶽建國厥生炎皇維師尚父諒彼武王古人言曰必齊之薑齊之丁公後有崔子因邑命族世濟其美黃鵠倚歌雕龍擅史倬哉嗣武含章挺生以蒙養正用晦而明混之不濁人莫能名學以崇道文以慰志垂其雲翼坦然卑位祿逮吾親榮非我仕皇皇上帝建官惟賢有人在下胡寧捨旃孰云輔德曾不永年展矣邦媛宜其家室友如樂諧皎如月出重壤既兆終天偕畢北陵墳邱松檟千秋金碑石樓祇令人愁東都城郭通澗瀍洛飛橋連閣金管迭作人世之轉然兮山川之宛然兮德音之緬然兮或稱達性命者齊死生之域違憂怯者一修短之數斯蓋無心之倫耳焉足與議於情哉何則雲虹滅影詞人於是詠謠華秀從風君子為之歎息豈不以對仙麗之景懷變化而遺戀在韶蕊之節悼零落而偏憤吾見豆盧氏之子於其伉儷有焉縣主諱字姓薛氏河東汾陰人也大父駙馬都尉奉宸將軍諱瓘尚城陽公主考駙馬都尉散騎常侍諱紹尚鎮國太平公主其在昔也夏有車正先封周有薛侯爭長其在今也五宗姻於帝里重葉母於王姬河水經天上積星辰之氣霍山震地下多珠玉之林縣主幼而敏惠長而洵淑貞義孝烈之傳吉凶賓祭之儀一聞成誦紘綖絢組之製湆芼醞羞之品一見懸解至乃鶴回清泛蠶聚崩雲月韻玫砧花穠綵樹婦人能事咸臻妙焉大聖天后鍊石補天有王母之神器分茅列土啓弄孫之美邑封猶有禮義引而親天授三年四月內封萬泉縣主天愛下流日親上乘龍之舉和鳳為難絡八紘以選門奄千官以求俊夫以龍圖帝寶析步搖之華源虎戟侯門襲京燕之雄胄人之信美帝用嘉焉以萬歲登封元年仲春既望歸於豆盧氏六官送行百僚供事迓以鑾輅遣以翟車環珮冕旒璆然在馭黼藻朱黛爛其盈門詔婚之禮於焉為盛爾乃移其愛敬以事舅姑伸其友恭以諧公妹舉宗洽比如鼓瑟琴每至婚姻會同少長咸集珩璜節步金翠耀首有婉嫕之心無驕矜之色睎眄睞者若遲日之映漣漪瞻詞氣者猶光風之轉蘅蕙加以引納懷和饋分周賑踈屬自附窮歸忘窘故蘭行彰信於閨門而蕙風滿盈於邦國諒惟琬玉之性自美抑亦劬勞之訓致焉中宗孝和皇帝雲回南土龍見東京二儀更闢九族咸敘望我兄兮公主贊陶鈞之力曰吾甥也縣主開邑井之賦神龍元年春加實封三百戶縣主既通籍門闌奉御又尚司殿省天子巡遊宮觀觴樂池臺我有周親無時不從主家外幸比齊后而聯恩子壻中參與趙王而均理或醉飽踰度寒燠未平何嘗不御藥在門王人接路當時厚澤莫之尚也景龍四年二月以奉御出為丹延二州刺史保傅下堂隨朱轓而同去輜軿入郡與皂蓋而齊飛辭宮闕而歲闌戀庭闈而日遠肥泉永歎邪氣攻衷楚祝招而不來秦醫來而不及景雲元年八月二十一日傾逝於延州之廨舍春秋二十有四美玉褫顏明珠晦色平陽舊宇遂無望於歸寧懷縣新文空留連於永逝有子三人西華南容東里等或齔或岐呱呱而泣天何以罰神其忍之冬十有二月五日歸葬於長安之洪瀆原窀穸營護有命加等器服祖遣率由舊章生之也榮葬之也禮若夫柔嘉好合善之元也肅雍降貴謙之道也山河其德容潤廣也熊羆其祥祚允大也總衆美於修嫮馳落暉於小年此所以哀中之又哀也昔袁亡馬氏蔡筆斯奮鄭喪曹姬潘文亦作矧茲內範事華無愧砥望夫之石以表崇邱緝幼婦之詞將傳終古銘曰薛之重祖胄軒國禹相殷侯周氏其土宇英英白雲鬱彼河汾公門蕃衍銘鼎氛氳則仁則義則戚則勳餘慶介祉誕靈女士中宗之甥鎮國之子皎如霜雪華如桃李舜族爰序堯封咸秩萬泉開源三百其實守盛以儉居沖不溢亦既鳴鴈宜爾家人謙恭下下撫納親親傾財致客對饁如賓我有邸第前臨黃道我有池塘去望青草漢輦停暮秦簫拂早歲月易忘歡愈難保良人出守將命北徂與子偕往飲別東都望母腸斷辭家淚枯露萎莖草霜酸衆雛魂兮何歸京兆之野葬於何處杜陵之下巖巖雙闕列列行檟勒是徽音以觀來者公諱志誠字某宏農華陰人也厥初生人為姬伯之祖因邑命氏有楊侯之允其後東陵奮而開國西漢盛而移關門廬隱隱亘連桃塞之上碑闕巖巖蔽滿華山之下明德之後世有人焉大王父隋直閣將軍岷蔚撫豪道五州刺史邢國公諱貴大父故右衛副率慈汾二州刺史靜公諱譽考故常州刺史工部侍郎鴻臚卿金紫光祿大夫散騎常侍太子少師贈儀同三司上柱國鄭國懿公諱崇敬若夫家聲代業纍德積仁故以克隆前統光啓來葉矣公稟純嘏之粹靈漸軌物之名教端操以正已崇讓以與人勵精以探道善問以育德學無不達藝無不周成童有傾矚之望既冠為宗匠之表年十三調太宗挽郎尋補潞王典籤大夫門子執紼橋山王國詞人曳裾睢苑皆一時之選也明慶中詔郡國舉賢良公對策天朝無能出其右者遷太子通事舍人再舉高第徙國子監丞坊監清流才地兼擇東朝束帶銀榜增華西序彯纓環林益潤高宗接千歲之統嗣百王之業封岱嶽禪云亭稽於舊章俟茲通博乃除公禮部員外郎祀事克明大典攸序建邦分職得人者昌吏曹居六官之首郎官盡一臺之妙又轉公吏部員外郎準的文昌羽儀丹地丁太夫人憂去職公至行純篤幾於滅性雖杖絰外除而柴瘠加等門人記其喪禮天子憂其死孝服闋授豳州三水令曳尚方之舄鳴單父之琴志道不矜其大才勤政無陋其小邑美聲流於豳籥惠化匝於周原又應文擅詞場舉策試為天下第一敷陳聖謨啓沃明主究天人之際建皇道之極如有用我者其為東周乎朝廷納賈生之言排汲直於外乃拜公隴州司馬未及赴官遘疾卒於長安之私第春秋若干王祥未施於邦政陳實近終於邑長位不充德其如命何神龍初中宗克復丕業格於文祖乃眷從臣緬懷先正以公二子在章綬之列追贈公使持節太州諸軍事太州刺史非夫立言不朽陰德陽報安有藐諸孤而隆家既沒世而榮號者哉夫人天水趙氏殿中監武權公某之女也受訓公宮作合君子言容賁於圖史德行循於法度六姻之內宗焉始有輔佐之力卒延門戶之寄初公之捐館也九子呱呱哀縗喪位賴夫人是顧是復日就月將徙宅依仁門為門成訓三十年內八子登朝廷交虎綬之華門接魚軒之軫某年月日封梁國太夫人景龍二年五月七日終於長安之延壽里間者遭家遷播几筵靡託而今蒙國昭洗情禮獲申以先天元年十月二十五日合葬於少陵原禮也第二第三子夫人在堂而沒長子第八子夫人在殯而亡今並列於塋兆用嘉魂魄長子故兵部郎中徵中子前武衛將軍泚永懷徽烈思勒銘頌郎中昔嘗緒言意感延州之許將軍今復哀託情深舊館之悲高迹難名短詞莫逮採諸故老恭存梗槩其詞曰昂昂楊君秉心泉懿大河靈嶽含光育粹學妙研精文遒逸思行為時範言為故事存蘊令德沒揚虛位善慶克家哀榮乃備嗣姑稱姒敬妻曰冀後有母儀千載一致貞墳土壟同封此地芳烈悠哉金生碑字公諱貞慎字密一字間從燕國薊人也蓋晉之公族有韓國者列於世家韓之餘子食平邑者因為氏姓有漢丞相改造繡衣在魏薊侯宅茲元社故瓞帛丿糸於三輔枝葉盛乎兩燕魏齊之間世濟其美公即北齊司空公鑒之曾孫祕書郎子敬之季孫故偃師令直容之叔子鍾積慶之洪允包太和之粹靈敦龎沈靜直方易仁義根心政理率性度以禮義文以詩書戶部尚書清河崔知悌朝望人倫公之文友深賞延譽遠近宗焉始以司成館進士補盧州慎縣尉刺史盧寶允舉器藏下僚轉冀州大都督府曲沃縣尉換晉州洪洞縣主簿北平陽道昕氣尚標舉河東裴知禮鑒裁精拔陽推以孝友資身裴亦薦以經邦興化徙雍州新豐縣尉盧少儒引為檢點判官差卒選校小大推允休議登聞擢監察御史裏行奉使黔中監選有牂柯謝鳳節仁奏罷漢官專任首領公上其挾姦樹黨俶擾蕃落天子悟焉再使置吏遠夷騷而旋定舊貫改而復完又駉牧在野攘竊是繁耗以歲月莫之禁禦公軺車上隴㣥慝畢露表監官斛斯果之輩奪職者九人沒贓者萬計牧圉知禁思無邪矣開耀間吐蕃侵境師旅不給乃購運酬勳募耕入選利之所在詐亦居焉公與大理正王守一於河蘭鄯廓四州推獲僦糴王希古盧種王誕其徒二千餘人正處其罪爰得我直授監察御史內難去職居喪過毀死孝貽憂光宅初肇建兩臺分典百郡服闕授右臺監察御史巡察河南澄清郡邑升賢弊罪能執其中類功最加兩階拜右肅政殿中侍御史郎官法天古難其選具美斯在再拜司勳員外郎永昌中遭凶黨網羅為周興所奏貶溫州固安令州特舉清白改鴻州櫟陽令邑多猾人屢宰敗駕公威有素誠結無欺率是而行人用不擾獄犴自靜狼戾反慤詔書嘉譽加朝散大夫又羅密徒貝錦為河內所鞠降括州員外司倉尋而事白進吉州司馬神龍中興官反舊政窮鱗沛而縱壑墮羽翼而順風拜司門郎中兼衛王司馬無何正除衛王司馬拜太子左庶子以節愍之禍出為涪州刺史未往又轉盧州司馬致仕久之景龍中復起左諭德兼榮文館學士詔曰公縉紳書彥操履清淳令譽播於始終嘉績宣於中外儲闈諭論雅望尤高宜申朝典俾加徽服可銀青光祿大夫又攝詹事東都留守拜常州刺史居歲餘優詔致仕享年八十先天元年仲冬薨於河南之正平里第遺令近地便葬斂以終服開元二年冬卜葬於伊闕之西夫人河東縣君柳氏祔焉禮也公出入四朝歷官二十其進也皆擇能録勤惟德是與其退也必含垢受屈在涅不淄子文之量從可知矣凡撰淳孝友悌傳各一篇以匡儲后撰先君親友傳十卷以篤故舊撰家譜家志各十卷以明系本撰河南巡察記十卷以辨風俗非通理博物立誠錫類其孰能見志以著書因事以設誡若斯之盛也有文集十卷行於代初公侍祠清廟有髦士之宜而先考偃師贈蒲州長史自祖考三葉塋無碑記公咨諸通儒而追建銘碣幽趙之士以為美談夫為子則頌德以尊祖飾終以榮親孝之大也為臣則不枉毫髮以顧私不避豺狼以撓法忠之至也潔志則利不涉口欲不萌心清之源也履道則不俯眉以悅勢不屈色以苟容正之方也詩曰仲山甫舉之公有其德傳曰左邱明恥之公有其直總是四善遠齊二賢於是芬苾令問優遊眉壽惠風激於勝流丕績敷於哲后然以忤彼權貴保茲介特不登三階以正四國貞白之士慨焉太息其孤總授充窮泣血靡所置懷俾豫作頌布哀豐石恭惟先人之寮友常奉長者之話言公雅珍確實不尚華靡敬慎風規直紀行事業廣詞褊萬無髣佛少子授八分之妙獨善當時公平日惠愛故存之刊刻詞曰峩峩淑德克生休命履孝蹈忠含清體正如玉之潔如金之鏡高明洵美學以潤之官方正事靜以鎮之嚴嚴憲府公三峻之赫赫儲宮公三訓之道有行廢時有泰否三入三出無慍無喜鼓缶而歌懸車致仕全歸葬儉允也君子西山幽幽東川悠悠雲過墳闕風薄松楸人亡道存榮往哀留貽世作則行歸於周
