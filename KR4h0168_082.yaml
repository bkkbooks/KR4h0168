seq: 82
front:
  text: 全唐文欽定全唐文卷八十二宣宗四
  hash: sha256:e41f34e39791b711ee0b5cea4db8e5a7fe56e6d307672a4f47f3238f48410763
body:
  text: 皇帝若曰我國家誕膺天命光宅中土君臨九有包舉八荒聲教所加冊命咸及而況回鶻北方之強代濟其烈惠行鄰境俗慕華風立國以來嘗效臣節代為甥舅每歲通和推誠不疑為我與國當會昌之際自屬天災人罕粒食上下離散牙帳為墟地多種落所侵國甚黍離之歎朕自登寶祚每軫素懷爰發使臣訪其後嗣軺車既出蕃使爰來咨爾回鶻可汗挺此雄材生於貴族能收既絶之燼常存再振之心願嗣天驕載歸地著發使請命誠辭可哀夫親仁善鄰國家之寶興滅繼絶王者之宜況朕布德滂仁施於海外爾乃堅誠勵節行乎域中所以公侯子孫道在必復華夏屏衛理宜長存既將還定舊封式承墜緒克紹崇構允膺鴻休今遣使臣朝議郎檢校祕書監兼衛尉少卿御史中丞上柱國賜紫金魚袋王端章副使臣朝議郎檢校尚書工部郎中兼國子禮記博士御史賜緋魚袋李潯持節備禮冊命為九姓回鶻嗢祿登里囉汨沒密施合俱録毗伽懷建可汗爾其服我恩榮膺茲位號勉修前好恢復故疆宜克己於蹛林長歸心於魏闕無怠爾志永孚於休維大中十三年歲次己卯八月甲申朔十三日景申皇帝若曰眷彼羣生必有司牧纘承丕構允屬元良故命嗣惟賢立長則順夏禹惟公於聖子漢文終守其成規茲乃萬國攸同百王不易之道也朕以菲薄獲奉宗祧十有四年未臻至理惟天示譴降疚於躬藥石無功彌留斯迫歷數云在天命有歸咨爾皇太子朕之元子幼有聖質孝敬溫文宏博慎敏稟天地之仁厚含日月之貞明承訓嚮方秉禮抱義是用命爾陟於元后宜令攝中書令中書侍郎兼禮部尚書平章事蕭鄴奉冊即皇帝位邦家以寧統緒以正惟嚴恭祗畏可以事天地惟寬明睿哲可以御臣下惟慈惠欽和可以撫黎庶惟道罔咈惟賢必親實爾生知豈俟訓誨著於典冊文事無詞懋昭耿光紹休前駕於戲敬之於戲戒之天分四時必始發生之德帝臨九有是先蕩滌之恩故雷雨作而萬物滋榮慶澤行而兆人悅服皇王之典今古所遵朕以眇身獲纂丕業上承宗社之眷佑下繫生靈之安危夙夜祗勤庶臻於理永惟黎元之困賦役之繁干戈未寧輸發尚急流移未復冤滯猶多刑獄未平姦詐斯起進獻無度淫巧競生思與蠲除俾從開泰將以導迎和氣咸致歡心載因大慶之晨式舉惟新之令可大赦天下門下執大象者導陰陽之和帝率土者茂生植之化粵自軒昊暨於唐虞側身皇階虛己大位懸金鑑之朗耀致玉燭之融明惠中國以綏四方欽上元而育兆庶所謂至德勞深企懷朕荷先帝之眷求奉祖宗之成憲獲撫萬國統和三靈兢嚴丕構惕勵神器實賴昊穹嘉饗神祇降休蠻夷戎狄之聿來鳥獸草木之咸若真宰潛運元功啓光麥禾豐登兵革偃息物不疵癘人無夭亡發揚氤氳敷祐寡昧夙夜祗戴訏謀經紀尚懼德教之未宣黎元之未泰貪虐之害政朋邪之敗風永念困窮思臻富庶每興赤子之歎不知黃屋之尊爰因首正克舉彞典告受命之纂緒展嚴配之盛儀柴燎升聞馨香殷薦羣祀昭答百神來享精誠既達感慶良深是用肆眚恤刑改元建號利時者不廢便人者必行俾覃在宥之恩以順發生之氣與之更始咸使維新可大赦天下改會昌七年為大中元年自大中元年正月十七日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不原者咸赦除之唯犯十惡五逆巳上及故殺人並不在免限官典犯入己贓兼情涉巨蠹及持仗行劫縱不殺人並不在免限左降官量移近處巳經量移者更與量移如巳至刺史者準刺史月限例處分諸色官未復資者有司條疏聞奏如復資者五品巳上中書門下速與處分六品巳下依常調選丁憂去任服闋日亦與量移如有親故在上都任所司陳狀便與處分不必更待本州府申請從九月二十二日降郊禮敕後流貶及引決妄稱冤人等并重推覆囚徒並不在此例別敕因責授降資正員官及曾因痕纍停免未經引用者並與進改流人及降死從流者與移近地如有收敘者量才録用并僧尼道士移隸者亦與放還其情狀難容者更不在量移及放還之限流貶人如巳亡歿家口欲還及須歸葬者聽隨所便如緣葬事幼弱饑窮不能自濟者委所在長吏量給棺櫬優恤發遣左降官流人先有官者如巳亡歿各還本官亡官失爵痕纍禁錮者並從洗滌諸色流貶人元敕內云雖逢恩赦不在量移限者自去年五月五日赦文後巳經量移者五千里外更與量移千里三千里外者更與量移五百里情狀難容者不在此限常參官及諸色刺史先停替及以病解免并終制未授官者委中書門下量才進擬勿令稽滯國家與吐蕃舅甥之好彼此無虞自今後邊上不得受納投降人并擒捉生口誓著山河勳銘鼎鼐恩延後裔義在勸人故尚父汾陽王贈太師晟太尉秀實司徒顏杲卿贈太師顏真卿許遠張巡南霽雲子孫中未經甄獎者每家與一人正員官元和以來河朔節制以土地朝者各與其家一子正員官回鶻殘寇尚慮窺邊諸道防秋固是常例如或別有徵發久未放還念其辛勤須議存恤應緣回鶻別徵集防戍人等宜令中書門下節級量事賜物仍即具數聞奏歉沴頗甚巳議賑恤冀免流亡自今巳後所在時雨稍愆有傷農畝即仰長吏當時聞奏如涉隱蔽必節級處分古者郎官出為邑宰公卿外領郡符所以重親人之官急為政之本自澆風興扇此道稍消頡頏清途便至顯貴理人之術未嘗經心欲使救百姓之艱危通天下之利病不可得也朕為政之始思厚時風軒墀近臣蓋備顧問如不周疾苦何以膺朕訪求自今巳後諫議大夫給事中中書舍人未曾任刺史縣令及縱曾任有敗纍者並不在進擬限守宰親人職當撫字三載考績著在格言貞元元和頻有詔縣令五考方得改移近者因循都不遵守雖諸州縣令或得三考兩府畿內亦罕及二年以此字人望其成化轉書案牘寧免姦欺道路有迎送之勞鄉里無蘇息之望自今以後刺史縣令除授後一例須滿三十六個月方得替換其責授遷擢即不在此限其受替後量其在任課效作三等聞奏其在第一等委中書門下及吏曹優與處分第二等依資改轉第三等量加降黜其受替後委刺史録事參軍比驗等第申觀察使與觀察判官勘驗詣實申奏後因事考核有不如所奏觀察判官刺史録事參軍據人節級懲罰觀察使奏聽進止其刺史委觀察使判官具考課聞奏雖去任巳久但因事發露合懲合獎並準元敕處分其合拔擢貶黜者則不拘此限長吏舉薦縣令録事參軍雖有近敕如涉請託是啓幸門其諸州府縣令録事參軍吏部所注之官雖與替亦須具所替人罪犯及不勝任事狀聞奏所舉之人須前任曾有殊考不然課績尤異分明有據者方得論請此外中書門下不得與進擬河東振武易定京西北等道官吏料錢過聞寡薄省司注擬罔不固辭承乏之由其新收闕官料錢戶部不用收管便令本府少尹與司録參軍勾當并舊給課料數額添給見錢在官無少尹即仰觀察判官與録事參軍同勾當使司輒不敢妄有借貸支用如違本州官量加貶責長吏別議處分仍委所在鹽鐵度支院判官參訪中書門下如違院官準本州官例處分諸色入仕近者轉多內外官員無不填塞蓋因州府論請多用虛銜軍師論功或未托實自今巳後無正官及無出身者並不在奏州府縣官限縱有出身亦須去避稍近方得奏請諸軍將非有殊功者不在奏兼州縣官限素非吏部注擬之處即不在此限仍委中書門下準此處分京畿之內荊南數州或頻歲辛勤或遭罹歉沴須免租賦以慰疲人京兆府今年夏青苗錢及元和十五年巳後至會昌三年終巳前應有諸縣缺日掌間並宜放免荊南管內應遭旱損農戶赦書下後新年夏隨地稅錢宜並放免塞上置兵本防戎虜苦寒之地尤要撫綏如聞軍中小有所須舊例不無科率或有逋缺必載簿書給衣散糧之時剋折略盡永言此弊積有歲年爰因慶澤須使蠲改自今巳後邊上兵士除本分差役外輒不得妄有科配春冬給衣及每月糧米並須當時分付如依前剋折本判官本將並重加貶責長吏別議處分仍從前應有此色缺負不問多少更不得科校徵索所在鹽鐵度支院切加訪察申中書門下如違院官與判官同議貶責榷酤之例諸道權宜如聞所設科條過有嚴酷一分抵罪連坐數家或沒入資財或身處極刑里閭之內遂至無聊豈有疲人堪此陷穽宜令中書門下商量停罷續作條疏聞奏州府拆寺瓦木堆積多時風雨所侵朽蠹將盡所在出賣雖有敕文百姓畏懼嚴刑莫敢投狀巡檢防護豈免勞人自今巳後百姓要買者任二年續徵納價錢州縣輒不得暴有校科私茶鹽雖要止絶法或連坐則害平人自今巳後但科犯茶鹽闕要人罪其買茶糴鹽及經過食宿之處並不要勘問差役不時妨農為甚古者用人之力歲不過三日蓋為此也如聞所在修築動踰數月事非甚切所妨即多自今巳後所在州縣如要修理者任和雇諸色人役使仍須據時價給錢闕方今就使農戶輒不得追擾遇忙時五月六月九月事非切時屋宇城壘不在修築限如違官吏並節級貶責仍令御史臺及所在度支鹽鐵院檢舉申中書門下如涉隱蔽本御史及本院官並準前處分君以人為國人以食為天有國有家捨此無急如聞州府之內皆有閒田空長蒿萊無人墾闢與其虛棄曷若濟人宜令所在長吏設法召募貧人課勵耕種所收苗子以備水旱及當處軍糧其初建置或鎮小力微不辦營備任量常平義倉粟充糧食種子及耕農具仍各任本道自詳軍便條疏處分訖申奏每年所收營田苗子除給耕種人牛量事填補所借常平義倉本物所冀野無荒田災有儲備觀察使刺史起營田二年巳後據見穀為殿最泉重貨輕當今最甚氓庶捐瘠莫不由斯輸納租征須從利便應天下百姓所出土貨幸是官中每年收市之物即所在州府具色目先下文貼指揮令據官中收市價輸納不得一一徵納見錢切不得令所由妄納耗剩如違本判官録事參軍重加貶責鹽鐵度支院官不加檢舉亦準此處分諸道藩方牙門將校不獨資以武略亦在拔其幹能近門下商量停罷續作條疏聞奏近年隨使人多冗食要職傾奪占位勳舊無依慮不均平例有停解如聞或有自遠招收或因其投募人材武藝要籍轅門或因類能擢處右職軍中巳著勞績選衆又合甄升一例勒停實乖至當其應隨使軍將及驍勇官健等有超軼輩流者並許待使到後選驗處分設法施禁固在長人訪姦去邪尤繫胥吏若紀綱不漏上下相同雖損益懸殊功利百倍度支戶部鹽鐵三司吏人皆主錢穀去留之際切在類能若一概節以年勞衆職從何條舉必資獎誘明示勸懲其中如有才用智識昭然獨見自期展效建立事功或剔抉疵瑕或糾正案牘發明巳往之咎條理將來之規宜委本司便與奏論特有選授仍與勾當依前本司驅使如守職多年無事可稱但循默自容者一例準舊年限勒赴選不得妄訴事故留在本司其案牘中或有過犯並不用追理貴許自新以示宏貸磐石維城本支祚慶親賢之義寵渥宜申文武庶官中外執事皆肅恭職任祗奉郊禋俾洽推恩同沾霈澤亞獻福王綰終獻撫王紘等各賜物百匹夾侍正衣進圭捧圭各賜物五十匹亞獻正衣各賜物四十匹內外文武見任及致仕官三品以上賜爵一級四品巳下加一階合入三品及五品缺考未敘者考足日聽敘魯聖儒風虞賓前典必須展敬允叶國章文宣王之後及二王三恪各與一子官其祠廟委所司量加修飾孝惟資愛禮著事親屬當布澤之辰用覃睦族之慶太皇太后皇太后二等巳上親皇三等巳上親委中書門下合擇有才行者量與改官無官者與出身皇五等巳上親三品巳上賜爵一級五品巳上加一階六品巳下及前資常選散官選日優與處分未有出身陪位者準會昌五年正月三日赦文處分應陪位皇五等巳上親及太皇太后皇太后三等巳上親三品巳上賜爵一級四品巳下加一階諸親四等五等并諸色人陪位官五品巳上加一階六品巳下及白身並賜勳兩轉其前資及有出身各減一選孝弟之道王教所先哀慶之禮人倫所重常參官及諸州府長官父母見存未有官封者並量與五品致仕官及階并邑號如有官者量與進改如官巳至五品巳上即與五品階父母亡歿未經追贈者量與追贈官及邑號義深心膂寄重藩垣俾命追崇延恩存歿用酬勳效豈吝寵私中書門下及節度使帶平章事宜與一子正員八品官祖父母先亡歿各與追贈巳經追贈者更與改贈節度使各與一子正員九品官東都留守度支鹽鐵觀察處置都團練都防禦經略招討使及神策金吾六軍將軍大將軍上將軍統軍威遠營鎮國軍等使皇城留守各與一子出身父母先亡歿未經追贈者各與追贈禮儀使京兆尹各與一子正員九品官昭宣典冊寅奉郊禋宜普恩光以答公幹應郊廟升壇升殿行事官普恩之外中書門下尚書省御史臺三品巳上特加一階四品巳下各賜一階如合入三品者量減三考入五品者減兩考仍待考足日聽敘其合選人與減一選內行事官三品巳上賜爵一級四品巳下加一階內侍省及內坊官四品巳上各賜勳五轉五品巳下各賜勳三轉應從駕上郊廟者普恩之外三品巳上各賜爵一級四品巳下各加一階白身賜勳兩轉禁營兵仗列衛爪牙言念勤勞宜頒慶賚神策六軍威遠營左右金吾及皇城將士應緣大禮移仗宿衛御樓立仗等普恩之外三品巳上賜爵一級四品巳下各加一階仍準舊例賜物有差其神策將士應在京畿內諸縣者亦各有賜物應緣大禮職掌行事官并修撰儀注及留守副留守守倉庫卿等普恩之外三品巳上賜爵一級四品巳下各加一階琛賮來朝梯航入貢藩方陳奏職業無虧或禁署策名或官司效用俾同沾渥各示加恩鴻臚禮賓院應在城內蕃客等各有賜物諸道知上都進奏院官在城者各賜勳三轉應緣大禮四方進表疏及賀正官各賜勳三轉翰林待詔供奉并諸色直見任及前資并員外試官三品巳上賜爵一級四品巳下各加一階無官者賜勳兩轉掌贊禮儀祗奉郊廟理宜優獎用洽恩華郊廟行事齊郎減二年勞室長掌座禮生贊者減一年勞無勞可減者便放出身崇文館行事學生及齊郎禮生番考巳滿所司緣大禮卻遣入行事各減一選國子監學生陪位者賜勳一轉中書門下專知儀制官各特加一階應緣祗奉供作官直司長上諸州行綱考典兩縣耆壽諸色番役當上在城并量留十二月番者各賜勳兩轉飛龍間廄宮苑典引掌扇內園掌總監栽接少府將作內作中尚武德軍內外弓箭庫等諸司使下白身及無品直司定額長上雜匠巧兒黃衣長上監門直長雜仗三衛七色引駕細行執扇角手弩手彍騎武士天文觀生漏生典鼓典鐘工人樂人主衣主膳主酪典食胡食手宰手間幕士御士醫士獸醫門僕藥僮御書手楷書手流外行署等各賜勳兩轉立敬之本在敦於耆老勸俗之道莫先於節義天下百姓九十巳上各賜絹三匹八十巳上各賜絹兩匹仍委長吏齎帛就家宣賜孝子順孫義夫節婦旌表門閭終身勿事先巳旌表者量加優恤嶽瀆孕靈公侯列位助宣景化利及含生宜委本州府長吏備禮致祭皇王應期賢哲濟代式遵令德用達明誠名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭自會昌元年後赦文及諸色條疏有不便於人者委有司及外州府長吏條疏聞奏亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具條疏聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行門下我國家披皇圖以立極執大象以升中睿父嗣孫重熙纍盛逮豫稽古聖孝紹復中興洗滌宿氛廓開昌運天命不易賜豫元符荷宗社之耿光致寰瀛之小泰干戈載戢風雨順時北狄來賓西戎效職豈豫菲薄汔此肅清皆中外元僚文武多士同心協贊而使之然益用兢慙以戒盈滿而乃纍陳丹懇願上鴻名牢讓不從瀝誠彌切於戲昔賢有云舜何人也我何人也苟或讓之不遂豫亦敢不思齊今百執事謂豫曰聖敬敢忘湯武日躋之詩謂豫曰文思敢忘放勳欽明之典謂豫曰和武敢忘保大之功謂豫曰光孝敢忘繼志之義以是自勗庶無悔焉浮實之名既不獲巳乘春之澤當務惟新可大赦天下自大中二年正月三日昧爽巳前大辟罪以下巳發覺未發覺巳結正未結正繫囚見徒罪無輕重咸赦除之惟正犯十惡五逆以上故殺人及官典犯贓不在此限持仗行劫必欲害人苟遇支敵即行殺戮捍逆追捕肆意奸凶不懲此流無以除惡并故殺人者雖巳傷未死巳死更生欺冒老小以取財物者意欲殺傷偶得免者並以殺人法處分不在赦原之限闕自今以後稍更廣求如有未曾任刺史縣令居然有誠略才術為衆所推者亦任於諸色人中選擇為兩省官周之宗盟實惟封建漢之子弟亦謂犬牙廣磐石之宗增維城之固當今源流遠大枝葉蕃昌王室子孫不合布素宜令本司檢尋譜牒明驗房從貧窮不濟未有身名者每房放一人出身如有父見在朝門蔭可自補身名者即不在此限應諸州府縣等納稅只合先差車牛優長戶近者多是權要及豪富之家悉留諸縣輸納致使單貧之人卻須雇腳般載從今巳後須令有車牛豪富人戶送太倉及州府輸納其留縣並須先饒貧下不濟戶如有違越節級官吏重加科殿所在逃戶見在桑田屋宇等多是暫時東西便被鄰人與所由等計會推云代納稅錢悉將砍伐毀折及欲歸復多巳蕩盡因致荒廢遂成閒田從今巳後如有此色勒鄉村老人與所由并鄰近等同點檢分明分析作狀送縣入案任鄰人及無田産人且為佃事與納稅錢如五年內不來復業者任便租佃人為主逃戶不在論理之限其屋宇桑田樹木等佃人逃戶未歸五年內不得輒有毀除砍伐如有違犯據根口量事情科責并科所由等不檢校之罪諸道州府應缺開成三年終巳前因水旱不熟貸借百姓及軍用缺闕借便度支戶部鹽鐵錢物斛斗積缺相承日月既久百姓或無本戶長吏纍又改更全無本色可以支填所司徒有徵索之名終無送納之日虛繫簿書宜並放免三公僕射不常除官每至上時須有聚會委以府縣即須擾人宜令度支戶部勾當局席便取京兆府本色錢充不得令府司差配百姓吏部去年冬選人如聞多緣文字差錯所司駮放既添員闕亦可矜容若非身名踰濫及缺選缺考并準格不合收外其餘委吏部與重磨勘量收待殘闕比遠注擬上巳重陽曲江宴會自有本色五百貫錢費用之閒不合缺闕每聞差配百姓不免擾人從今巳後宜令京兆府先與度支鹽鐵計料據所用一物巳上除以本色錢物外如有缺少即委度支鹽鐵據數均給府縣不得輒配百姓其所市易並須先給付價錢如有妄配百姓買物不給價錢官吏等並準此同枉法贓例處分仍令御史臺切加察訪天下州府有官吏犯贓皆遞相蒙蔽不肯發明縱有申聞百無一二自今巳後管內縣令有犯贓事發州司不舉者連坐録事參軍有贓犯刺史不舉者坐刺史其刺史有贓事發觀察使不舉者連坐廉使則遞相檢轄功過可明各務清廉悉心為政度支鹽鐵戶部三司茶綱缺負多年積弊斯久家業蕩盡無可徵索虛繫簿籍勞於囚繫者復委本司各條流疏理聞奏如先將茶賒賣與人及借貸人錢物若文帖分明的知詣實即與帖州縣徵理如組織平人妄有指射推勘了後重加決責釋氏之教清淨為宗將悟昏迷實資善誘上都除先置寺外每街更各添置寺五所東都除先置寺外更添置寺五所每寺各度五十人每處僧寺三所尼寺二所西川荊南揚州潤州汴州太原河中襄州巳上八道除先置寺外更各添置寺二所每處置僧寺一所尼寺一所諸道節度觀察使府除先置寺外更各添置寺一所其所置僧寺各度三十人諸道管內州未置寺處宜各置寺二所僧寺一所尼寺一所每寺各度三十人五臺山置寺五所如有見存寺便令修飾充數每寺度五十人數內置尼寺一所巳前添置寺宜並先度僧尼漸漸教化建造寺宇不得遽有勞役其僧尼年幾限約并諸條流準會昌六年五月五日赦條事例處分道濟生靈功成克伐晦明雖隔禮敬宜加唐功臣墳墓無子孫者不許砍伐委所在長吏差人巡檢爰念農耕是資牛力絶其屠宰須峻科條天下諸州屠牛訪聞近日都不遵守自今巳後切宜禁斷內外文武任及致仕官三品巳上賜爵一級四品巳下加一階仍賜勳兩轉神策六軍金吾威遠皇城將士普恩之外各賜勳兩轉道宗魯聖禮洽虞賓式舉舊章以榮後嗣二王三恪及文宣公各賜物五十匹環衛星陳華夷雲集眷茲勞效俾示恩華神策六軍金吾威遠皇城等諸軍將統軍以下各有賜物其將士等長行立仗并守營者各賜物有差鴻臚禮賓院應在城內蕃客等并節級有賜物澤貴流根宜頒祿秩義隆追遠用慰孝思常參官及諸州府長吏父母見存未有官封者并量與五品致仕官及階并邑號父母亡歿未經追贈者量與追贈官及邑號攝侍中讀寶官攝中書令讀冊官各賜一子出身撰冊文官賜一子正員官奉寶綬官書玉冊官書寶官各加兩階進寶綬進冊進中嚴外辦禮儀贊導押冊押寶綬舉舁寶冊官各加一階其餘應職掌行事官太常修撰儀注禮官并內行事官三品巳上賜爵一級四品巳下加一階仍並賜勳一轉鐫造玉冊官各賜物五十段中書門下儀制官特加一階禮崇養老道貴旌賢爰示優恩以宏教化天下百姓年九十巳上委所在長吏量加存問孝子順孫義夫節婦旌表門閭終身勿事先巳旌表者亦量加優恤川嶽元功聖賢幽贊宜因霈澤用薦馨香五嶽四瀆宜委本州長吏備禮致祭名山大川自古聖帝明王忠臣烈士委所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相言告者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行王者之御天下也莫不懋建皇極惟懷永圖先德禮以導人用政刑以佐理順四時者並施其化育萬物而各遂其宜然後闢土開邊遠柔邇悅衆享美利斯為大寧我國家以仁義有乾坤以道德撫夷夏其高祖太宗經綸之列聖繼體守文之重光纍洽延闕景鑠及於憲考文明武英剗稂莠於甫田振威靈於殊俗肅清澄廓庶績其凝實推中興歷十五年今豫小子大構是承祗奉宗祧敬若天命遐慕唐堯恭讓之德常勵漢文菲薄之躬懍乎憂勤懼忝負荷每念河湟之壤陷為戎虜之疆百有餘年一失莫復元和中將雪前憤嘗振睿思方除孽臣未就成業永懷道訓明發疚心近者祖禰降靈中外協一不煩攻伐不費財儲六郡連收七關盡復削袵解辮樹頜乞降犬羊竄亡億兆鼓舞厥庸有功繼志克成仰襲丕休聊用無愧臣下欲歸美譽強我鴻名斯實先聖神功因顧追尊加諡牢讓乃遂孝思獲申頒告寰區同茲媺慶且慮蒸黎之困猶疑獄犴之冤是用獻歲之辰乃行在宥之典可大赦天下自大中四年正月一日昧爽巳前大辟罪以下巳發覺未發覺巳結正未結正繫囚見徒罪無輕重咸赦除之惟犯十惡官典犯入巳贓不在赦限天將發生萬物也則必假以暄妍潤以風雨王者之在宥四海也期必滌其瑕穢施以渥恩固頻啓於幸門豈無彰於皇澤朕以菲德獲纘丕圖常慕唐堯之無為漢文之恭儉旰不暇食乙夜觀書萬務靡有不親一夫尤慮失所兢兢業業不敢荒寧十有四年至於茲矣每懼風俗之未厚賦役之尚繁政令之未明刑獄之多濫思用克濟浩無津涯上荷昊穹垂休宗社深祐下賴股肱翊化嶽牧懋功五稼屢登四夷內附懷仁庶同於行葦納諫無愧於從繩疵癘不生飛翔遂性日月所燭庶為小康顧豫寡昧何以臻此近者藩方之任撫理或乖潭廣宣俶擾相次雖興師殄寇本於為人而惡殺好生良多愍納而又緣河數郡暴水成災念其蕩飄深自憂軫乘此三元之慶宜宏肆眚之恩可大赦天下自大中十三年正月一日昧爽以前大辟罪以下罪無輕重咸赦除之唯十惡叛逆故殺人官典犯贓不在此限
