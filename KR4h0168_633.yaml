front:
  text: 全唐文欽定全唐文卷六百三十三冕京兆武功人德宗朝為京兆士曹參軍因弟辨以腐粟給邊貶信州司戶參軍
  hash: sha256:4eb0ac51215f8453e0b8a63db6bd2c151ddeb49f71f10058915172e74698f132
  markers:
  - {type: head, offset: 14, content: 蘇冕, id: KR4h0168_NFKB_633-h1, level: 1}
body:
  text: 臣某言伏奉今月日制書以臣職理粗進加正議大夫朝命遠臨天慈曲被感戴殊造震驚失圖臣某中謝臣出自書生謬分旌鉞拙直無援孤貞少徒雖封域乂安恭憑理化而涓塵靡效實懼素飧屬瘴癘為災私門多釁愧無烈士之死志而有犬馬之貪生輒狀表章陳乞骸骨遇陛下寬一戮之責起將廢之魂因請退之誠增進秩之典宸光獨照枯朽頓榮况堯舜在上蒸人自理日月既出爝火何光加以無左右之容無龔黃之政猥蒙天地之德載於金玉之音是則陛下切思理之心以風海內而臣受分憂之寄謬竊寵榮成命巳行不敢固讓受恩益厚期於殺身無任感戴屏營之至表微字子明隋郿城公元禮七世孫纍擢中書舍人知制誥拜戶部侍郎卒年六十贈禮部尚書長慶二年春翰林院學士缺穆宗皇帝顧謂左右曰孰可充是任者皆曰恭恪可以奉密命通敏可以肆皇猷有若內謁者藍田季溫可上曰俞洎四年夏院使缺敬宗皇帝顧謂近臣曰孰可補是職者皆曰博覽以好古清白以奉公有若奚官局令衛元璨可上曰俞是以授金紫之賜承侍從之榮典司禁闈參掌詔令嘗因暇相與議曰夫宮室臺觀蓋有宜稱苟失其制人何法焉內署與集賢史館祕書省皆號圖書府而內署最為密近故學士之登將相踐崇顯者十有八九焉彼三署不可同年而語矣而庭宇逼庂屋室卑陋非聖朝待賢之意豈㣥彥養德之所於是梧桐高則可以栖靈鳳巖嶺秀則可以韞美玉是宜革作以新其居乃同詞上聞詔命惟允錫以材布假其工徒心匠始形於事先物境潛運於度內乃撤小屋崇廣廈揭飛梁於層構聳危樓於上楹重簷翼舒虛牖霞駮甍棟豐麗欄檻周固三門並設雙閣對啓延清風於北戶候朗月於南榮積其典墳藏於扃鑰因討閲之際資登眺之娛若乃前瞰雲山傍窺臺觀仰丹霄於咫尺納皓氣於襟抱八表殊望四時異境觸類生趣隨方散懷其下廊廡對序階陛四匝中創小亭以候宴語卉木駢植松竹交蔭折高標於棼橑散餘芳於戶庭信可久之宏規不泯之盛迹也經構之始侍講崔學士出拜小宗伯樓成之月學士韋公秉國鈞旬日侍講高學士拜夕郎明年正月學士路君遷小司馬為承旨表微洎王宋二舍人皆遷秩加職院使復以成績並命遷內常侍夏四月中書鄭舍人駕部郎中皆以鴻文碩學為侍講學士有詔賜宴始觴於斯中外之知者朝昏皆賀豈興作之會契於陰陽之運乎而土木之動應於福慶之數乎表微學愧鏤氷文慙畫虎秉筆視草於茲六年備歷規度之謨詳觀新舊之制承命為記實慚菲詞時太和元年某月日記夫聖人作然後王道明王道明然後瑞應至靈貺感通理合冥數昔殷道剝喪民罔攸歸於是文王以有位之聖嗣成湯之德神人咸乂故鳳鳴於岐洎周德凌遲道靡所屬由是仲尼以無位之聖述文武之法憲章聿修故麟見於魯於時王室無主禮法盡去天子之尊存乎位號魯周公之所封用四代之禮樂遺風故典鬱而未發仲尼以天縱之德生乎其中居周公之邦志文武之道觀廢興之運知作者在巳位不得以庇生民權不得以司刑賞是天將喪斯民也而未喪斯文也乃綴絶緒申舊章變其禮文約為典憲攬五常之龜鏡正三綱之軌轍帝王之道幽而復明盛德大業於是乎在天錫嘉瑞光照厥功故周敬魯哀不得而有也由此觀之蓋春秋為王法之器魯國為王法所寄在其所寄以舉其器鼓仁義為舟航權褒貶為篙楫乘橫流之波濟天下之溺上無列國之輔下無陪臣之助故道不信於天下而信於智者法不著於當時而著於後代向使仲尼有滕薛之土得三家之衆興我王澤霈及蒸民則麟出其郊得其所矣豈復厄於虞人哉故麟不見則孔子之道不彰麟不死則周室之亂不極於戲聖人之生也得其時則化行乎江漢不得其時則道屈於季孟靈瑞之出也得其時則名薦於郊廟不得其時則身罹於殘天是聖人能順時以濟人不能反時以自聖靈瑞能因時以應感不能反時以自靈被厄於陳蔡獲麟於大野影響之應其符著矣春秋傳曰有以告者曰有鹿君而一角者何孔子曰孰為來哉孰為來哉夫豈不知乎蓋殺之而不敢有故示人以疑之故也元和五年冬十一月表微以滑之從事使乎鄆陽停驂訪古經獲麟之舊壤且曰後之人築臺於此以旌厥路感先聖之不遇俾麟出而非時徘徊道周乃作銘曰二儀既闢三象乃垂聖道堙鬱人心不開上無文武下無定哀吁嗟麟兮孰為來哉周雖不綱孔實嗣聖詩書載刪禮樂大定懲惡勸善反邪歸正吁嗟麟兮克昭符命聖與時合化行位尊苟或乖戾身窮道存於昭豐邑栖皇孔門吁嗟麟兮孰知其昏運極數沒德至時否楚國寖廣秦封益侈牆仞迫厄崎嶇闕里吁嗟麟兮靡有攸止世治則麟世亂則鹿君出非其時麋鹿同㣥孔不自聖麟不自神吁嗟麟兮夫復何云審字退思贈吏部尚書宿從弟貞元十二年進士開成中纍遷諫議大夫擢桂管觀察使入為國子祭酒咸通中終於祕書監臣某言今月日本道監軍使內侍省宮闈令劉某至伏奉某月日敕書并賜臣手詔奉宣口敕特加獎諭將士官吏百姓僧道等并蒙宣慰存問者王人旋鎮宸藻自天敷德澤於藩維被恩波於動植爰及介胄逮於搢紳祗寵若驚交抃無措臣某中謝伏惟睿聖文武皇帝陛下恭承寶圖奄宅區宇一物失所必軫於憂勤一善可稱無忘於獎勗義深共理務在擇人升平之運實遇今日臣以儒流賤品生遇聖明雖力罄駑駘而效無絲髮皇明鑒徹撫勞再三黎氓既荷於生成尸素稍寬於罪責揣循涯分木石增慙又降殊私曲沾睿渥慰諭之意稠疊於頒宣藻飾之榮昭彰於綸綍無微不録無遠不該地里雖介於炎荒天威如在於咫尺所期俗阜以洽雍熙臣某言某月日度支急遞到伏奉某月日敕追臣赴闕庭者鴻恩曲被宸翰忽臨來自天衷出於望表抃躍無地光輝在身臣某中謝伏惟睿聖文武皇帝陛下以至仁格物元德統乾臣孤立愚直素空器藝朝無瓜葛之援外絶朋黨之私以苦抱忠自託明代神理照鑒天聰自仁遂忝再領近州一居方鎮前歲延英面辭之日親受聖慈百身何答三復在心銘肌鏤骨恐不負荷洎祗恩赴任陳力在公海隅黔黎日樂皇化至於軍州經諸道往來但守官司不虞謗讟以丹心奉上仰侍宸威亟經二年首陟三載幸無罪戾皆荷生成陛下聖慈優柔皇鑒明朗不遺一物信若四時果降中詔特令赴闕恩崇感極義切戀深顧親族而生輝望雲霄而有喜以今月五日發離本鎮克寸期兼道計日趨程魂馳軒階心注晷刻朝天既近承雨露而增榮向闕匪遙望恩光而稱慶孔子廟堂碑是太宗皇帝建立睿宗皇帝書額備稱唐德具贊鴻猷文翰顯然貞石斯在洎武后權政國號潛移竊於篆額中間謬加大周二字豈可尚存偽號以紊清朝疑誤將來傳流僭謬其大周兩字伏乞天恩許令琢去謹録奏聞計貞元時人臣某言中使至奉詔兼宣口敕以彰義軍節度使吳少陽不起所疾奄謝明時聖情追念藩臣良深軫悼少陽男元濟不待朝旨自領軍戎陛下尚念舊勳特頒詔命冀其追悔未即加兵以臣謬列方隅俯賜宣示絲綸遠降天使荐臨祗奉睿謀仰荷元澤亮臣微賤素無識知猥蒙恩私訪以去就其於利害臣所難言以臣旋觀誠在天斷伏以陛下內有輔弼外有勳賢資廟算可以叶宸衷審政議可以正天下如臣庸瑣備位藩屏為將非衛霍之儔在朝無絳灌之列徒以虛承重寄苟竊明時每荷寵光載懷兢惕豈敢輕塵聖聽以冒天威倣徨靡寧進退惟谷臣有愚懇思欲上達况承天問敢不奏陳伏惟陛下光有萬方子育兆庶安危所繫實在陛下忠於陛下者則獻弭兵之謀諂於陛下者則獻用兵之計臣性本專直心願竭忠苟徇㣥情是惑宸聽臣若勸陛下韜兵匿甲則淮西受賜又慮多士橫議微臣以臣私情有何阿黨二途之內伏俟聖裁臣於藩閫之中名位最下雖陳鄙見豈副天心其有不載表章附李誠義聞奏伏希元造俯賜明鑒限守戎律不獲陳露闕庭夔貞元十二年宏詞及第元和初官吏部員外郎寶之至者金實難儔何混質於微細每隨沙以沉浮不耀其光誠觀而莫辨退藏於密故披而可求元鑒在人至誠斯保察晶熒於磧礫視隱映於潭島淡以冥搜靜而窮討翻混濁酌澄浩得之為利雖云貨以藩身揀必于精終是不貪為寶道以之至行無越思研精既辨取舍奚疑浩浩同流詎謂衆難分矣專專匪惑盡可汰而出之信多雜而不混何在小而見遺故得方以選才比諸振藻符至人和光之德明君子知微之道豈止匪固於窮思濫於中懷至寶竊元功披隤沱而不厭積貨産以未豐則情惟盜比而業與商同也徒觀夫敷彩汙塗涅而不渝外濁如汨中明自殊養正以蒙潛雖伏矣從人之欲道豈遠乎彼荊山採玉河上求珠刖雙足而未偶冒萬死而爭趨匪曰能智是為至愚曷若隱而自彰微而可辨常保質於堅重匪淪精而展轉以是為德則和而不同以是求賢則舉不失選况今至珍必見朗鑒恆開細無不察大無不該在深潛而未耀求揀鍊而斯來亦何必披鄱陽之沙方見為寶覽士衡之賦然後稱才道貴乎朴物疵於妄為謀者必定於前執技者可以事上繄郢人與匠石能器合而神王堊復在鼻將欲表微揮拂以斤何其用壯既分庭以離立亦持刃而相向於是算錙銖慎取舍運之於手將匪疾而匪徐愜之於心寧我欺而爾假志而必中同引滿於彀中妙不可傳猶斫輪於堂下况乎器也利工也良壯前趾耀雄鋩以力運臂兮臂可使以彼契此兮此可忘迫其勢則成風舍響激其石乃飛電分光欲臻夫妙在慎其相故受刃者不為股栗執柯者無聞手傷向使受刃者震懾執柯者劻勷則必滅爾鼻而剠爾面豈惟破我斧而缺我斨亦猶朋儕見知工用可稱藝成道得合調諧應豈同夫衆人遇我狂夫阻之璅璅庶匠丁丁在茲得離婁督繩而尚失以公輸削墨而猶疑安能霜刃投虛必在乎蠅翼圓柯在握不失乎毫釐是吾質也實惟何其知者可託無乃後時客有多才博雅好奇尚異糟粕既得頗讀古人之書鑿枘可規願行夫子之志將求輪扁之術以廣運斤之事乃歌曰彼二子兮以藝相崇得一理兮其心則同運斤在手誠可懼堅立不動神之雄豈運斤者妙其術堅立者知其工幸見遇於郢匠無輟響於成風冬實窮節日為至陽節窮而栗冽凝慘陽至而焜耀舒光方傷竹雕松之嚴物無不懼覩麗天出地之旭愛何可忘觀其升曭朗以自東蕩沉陰於有北不赫矣以難向誠溫然而可即依巢之鳥感微煦而和鳴帶雪之林假餘光而改色所以就之稱堯帝之聖比之成晉臣之德彼谷隱巖居之子無衣無褐之人照臨導夫和氣偃曝得夫天真慘怛潛收戚戚之容咸革溫仁遠被熙熙之化斯淳故得廓開曀霾洞達遐徼融液氷渚依稀雪嶠散九陌以無氛委千門以通照彼繩樞甕牖既臨砌而樂我無私雖熊席狐裘亦舍爐而欣夫有曜且四月歌其烈烈雨雪苦其瀌瀌既飄風而忽至何見晛而聿消豈若儲精在於宣明舒德本乎洪畼異春晝暄妍之色無夏天赫曦之狀微溫椒寢之中稍暖秦樓之上是知當時則慘物鮮其歡非愛景而斯出處窮冬而固難躔次不留志士徒爭於短晷輝光可附小人寧怨於祁寒故曰太上化人德之為貴咸欣欣而可悅不炎炎以求畏當垂煦嫗之仁以釋幽陰之氣所以賦冬日之事歌德政之謂康佐第進士又登宏詞科纍官禮部尚書卒年七十二贈吏部尚書喤喤樂聲瞻言闕里視之不見聽之盈耳宮牆如在可配於鏗鏘德音不忘曷間於年祀猗歟原至樂之作異凡音之起靜而疑深絶而復尋繹如迭奏嘒若同音豈幽通於元造異中出於人心聆其節奏相夫擊拊發和鳴於閫域應流韻於墀廡既嗟乎可得而聞又思乎其所不覩疑一唱之歎且至於三比衆音之和不容於五莫不動心而駭耳感今而懷古鏘若在懸哀如在絃筍簴無形異和戎之二四聲詩合雅同鼓篋於三千事寧同於想像理實閟於言筌爾其融泄克諧肅雍清越通明洞幽變化翕忽激數仞以徐來觸兩楹而靜發憑合莫以方奏流元間而未闕故能動心導和嚮皆順正德有符於解慍教實倍於施令式彰乎不測之神以見乎多能之聖俾恭王之是驚聞斯行諸稽太師之所謂始作翕如且遺音於棟宇寧假手於元虛於是辨清濁節疾徐知笙簧之迭和訝鐘鼓之相於其變無方其來不極靜好交至激揚未息簡子夢中之遇其志則流靈公濮上之音其聲多慝曷若舒嘽緩遵肆直俾夫音聲之道感通咸聽此而知德堯佐禮部尚書康佐弟第進士官太子校書郎終諫議大夫王者為邦實先學校不有載籍何以垂教必由乎文字使知乎忠孝東序西序取乎遊焉息焉八索九邱俾其是則是效粵我后矣聖哲者歟命儒官兮至公以居所崇惟學所寶惟書搜㣥言而斯在立重閣以藏諸觀其結構孤高軒扉對啓飾不及侈儉而中禮刮楹之上標銀榜之煌煌峻宇之前閲子襟之濟濟於是六籍咸萃百代無遺恭儉之教比事之詞虞夏商周之五典國風雅頌之四詩既精微之與廣博莫不森羅而在茲文移科斗之質字別魚魯之疑軸星攢而花散帶霓舒而草滋櫺檻風來動藝香之苾苾綺疏日映見鉛槧之纍纍覽彼縑緗請披記傳或崇其臺以邀非望之福或邃其榭以逞荒怠之宴未若事惟師古政以化成斫朴之勤毋弛怠於儒學黼藻之飾不加賁於簷楹由是事美德風人歌懿績校則同於天祿藏乃異於魯壁左平右墄雖有陋於明堂上棟下宇乃不踰於大易別有名繫庠序身衣縫掖覩茲閣之岧嶢諒吾道之宏益河之並濟兮惟秩其平濟之貫河兮勢若相傾非剛克無以見其柔立非甚濁無以彰其至清是以靈源濬發柔德兼呈徒觀其流波委注秀色澄徹沖融而濁水遙開鼓怒而洪流直截遂使還淳之士疑二氣之初分策功之臣驚一帶兮中裂既處濁而不染每含貞而自潔苟與和光者殊致寧與淈泥者無別是以霍濩波激崩騰勢翻濟水與河水相輝光容易識清流與濁流不雜質性難論苟徵之於變化可察之於本源於以表德於以辨類方九折而橫流啓重泉而直至故以盤渦渾曉日之輝疊鏡寫晴峯之翠絶河而去孰與我爭先導沇斯來孰謂我奚自若乃沖虛是玩迅激難儔廣可涉兮思杭葦於寒渚清可挹也欲濯纓於夕流貫長川之浸浸委清浪之悠悠然下流帛丿糸邈願表清而不濁上善昭融故守和而不同故可扶正直之純志助潤澤之成功動漣漪於回浦萃光景於微風且淮之清兮濱於夷江之遠兮界於楚豈若貫大川以揚波臨大都而分渚含清濁而獨秀求匹敵而誰與苟河清之可期願朝宗而為侶彼塤篪兮謂何同律呂兮相和苟論功於衆樂孰有德而同科遂使手之足之候清音而屢舞伯氏仲氏諧雅韻於升歌疾徐共節長短同旨感肅雍兮一貫伺戛擊兮雙起為合雅而諧聲故殊形而共理然則大篪諧奏美矣德音之音鳴塤獨聞同乎以水濟水是故變通可象節奏斯呈爾韻方舒我則厲之以疾我音斯濁爾必懲之或清苟同方而助化故異氣而成聲信可以發揮韶夏協贊和平故得舞獸呈姿豈繫於拊石嘉賓展禮不讓於吹笙且塤資土以辨類篪假竹而成器土容質可以符素心竹聲清可以滌煩志是則相從以和律相因以成事苟洋洋而在聽諒醇醇而自致且彼鼓鐘于宮未足論乎異同鳴琴自手且何議乎先後豈若宮商並奏律呂相宣調五聲不資於繁細應八佾無違於折旋樂則既爾臣亦宜然塤之得篪載期於有輔臣之奉主必致乎無偏唱和之功備矣獻替之道存焉故能振三代之風合九成之樂彼衆器之雕飾此㣥聲之煩數又安足擬塤篪之純質論聲音之清濁聖德上通陽精下贊經太虛之寥廓赫流光之耀煥皇矣廣運德用邁於陶唐日歟載中瑞克符於炎漢其始也升扶桑以昭晰拂若木兮氛氳灼麗景開祥雲羲仲命官敬導之功式著夸父整策競驅之勢斯分雖馳騁於靈馭終感通於聖君故歌休明者徵於陽位察符瑞者觀乎天文於是翠煙澄霽白日增麗流景弭節飛輪頓勢踆烏矯翼而却翔驤龍擁駕而回逝端乎晷遽乖測景之司表乎祥必俟垂衣之帝蓋所以應仁聖叶昌期曾泉既逾異晨陽之杲杲昆吾再舍嘉日馭之遲遲是則天垂象兮不昧日輔德兮無私既載中呈瑞亦太和效時遠以變化同諸掌握苟夙夜而致理在禎祥而欲數伊靈氣之潛通豈天聽之元邈日之為美也無德而言歟日之為瑞也有時而效諸運行必隨乎圓蓋昏曉式經乎方輿昃而復中在明君兮則爾中而斯昃雖壯士兮焉如我皇播德於彼表瑞於此不肅而康哉無為而樂只足廠田坴次可覿豈假垣平之片言昭明有融寧匹魯陽之三徙然鑒於人事兮諒天道而伊邇大師諱熙怡姓曹氏桂陽人也舊勳前烈垂休積慶史氏詳之矣夫真如不遠其要在乎無垢妙理不深其要在乎見性本於真實畼於虛空俾聆芳咀潤孜孜請益則大師之教也大師體識深靜風度端敏受具戒於南嶽修律儀於東林常趺坐一室而四方學者差肩繼踵發此柔軟納其歸依嘉言玉振微文氷釋故崇德雅美臨壇持法垂五十年嘗以至德初隸東林寺居耶舍塔院數逾二紀而信心長者懷甘奉贄紛然並進監廚守藏不遑祗受既而悉歸精舍頒於衆僧大師率門人布衣糲食而巳故推巳以見相因相而歸空搜閲精微鑽研旨要常若背悶而針石不能及也故中夜纍歎有神人撫背殊形駭物斯須乃去自知窮討經論切磋心要加以律儀端靜受持勤至感通之應固難盡書至於山鹿歸仁林鳥效祉大師之室不足駭也大歷五年躋五老峯望彭蠡臨瀑布乃構凌雲精室為經行之地旁引泉竇以滌塵垢近躡松壑以求清涼丹崖雲岫勢若屏牖然趨風望景攀危輦重翼如而至者難以數計積十餘年乃止大林精廬杖屨衣巾屏居一室行住坐臥無非道場乃淬法刃燃慧炬俾夫恂恂圍繞者割其縛導其迷洗然而自得也貞元中歸東林戒壇院以為吾道巳成吾教巳行十二年丙子嵗秋七月二十七日召門弟子曰吾隨化還須臾寂滅僧臘五十報齡七十一州閭赴弔道路銜悲宗師既沒法教疇依蓮沼蕪涸禪林凋折以其年八月十四日遷座於香谷原從人欲也大師精貫六藝旁達百氏常與故太師魯國公顏真卿故丞相天水趙公憬故鄭滑節度兼御史大夫范陽盧公㣥今吏部侍郎宏農楊公於陵為參禪之侶幽鍵洞發宏言兩得門人法粲道鏡道寧道深道琛道建利等並三明繼軌四禪紹迹緣起皆泯空有兩詮卜商傳闕里之教龍樹演迦維之法其旨一也咸以夙承甘露願勒貞珉銘曰演暢微妙經行道場昭昭大師啓迪無方孰云虛空不可思量普滌緣念永清心地異物幽贊靈鳥效瑞景行如存追思不匱白日在水澄虛則明至人臨池無垢則清信而不渝沖而不盈宛彼堂廡空留法象門人紹德禪燈繼朗式播芳塵以慰瞻仰六度既修三明未分英英大師執濯就焚青蓮挺秀朗日開昏學者歸心邦人居敬既去塵緣乃知真性追思精室如懸法鏡音容永祕瞻仰疇依門人掩泣寶炬藏輝北望松阡其誰與歸洗字濯纓貞元時官朝散大夫河南濟源縣令有唐六葉海內宴然偃革闕二字崇乎祀典封茲瀆為清源公建祀於泉之初源也置瀆令一員祝史一人齊郎六人執魚鑰備灑掃其北海封為廣澤王立壇附於水之濱矣天子以迎冬之日命成周內史奉祝文宿齊毳冕七旒五章劍履玉佩為之初獻縣尹加繡冕六旒三章劍履玉佩為之亞獻邑丞元冕加五旒無章亦劍履玉佩為之終獻用三牲之享邦之大事先在祀乎濯纓不才謬領茲邑下車入廟每事皆問主者有云俎豆素闕弊難悉數其尢者有五北海望壇臨事壘土杇鏝一歲而費數金為勞之甚其弊一也二所祭器凡百有二十二事至時請於上寮轉轂八洛去來三百餘里仍以稅緍酬之積有嵗時不知窮極其弊二也沈幣雙舫又以車取池河渡口之舟往返之勞結綵之飾其弊三也兩壇位席百領有餘戶至誅求為擾非潔其弊四也牀榻乃至七著用之類門到斂索事終存亡大半其弊五也既革前弊輒為之銘銘曰寤寐求思如神有知大風離披壞木於斯人吏驚馳念茲悟茲為余有意廟中無備沈幣雙舫二壇祭器子來悅使所借皆遂觀者闐闐事無闕焉刻之于石以待後賢是時也貞元十有三年
