front:
  text: 全唐文欽定全唐文卷六十二憲宗七
  hash: sha256:f5b4d09be10190c65025390c7244fda1efea751835ebb89afeb46762d048ff86
body:
  text: 敕文城柵將士百姓等脅汙之中同心效順率此危疑之俗盡為忠義之人言念乃誠思加獎異爰圖改邑之制用表移風之美其蔡州行吳房縣宜改為遂平縣仍於文城柵南新城內置便為上縣權隸唐州泉貨之設故有常規將使重輕得宜是資斂散有節必通其變以利於人今繒帛轉賤公私俱弊宜出見錢五十萬貫令京兆府揀擇要便處開場依市價交易選清強官吏切加勾當仍各委本司先作處置條件聞奏必使事堪經久法可通行近日布帛轉輕見錢漸少皆緣所在壅塞不得通流宜令京城內文武官寮不問品秩高下並公郡縣主中使等下至士庶商旅等寺觀坊市所有私貯見錢並不得過五千貫如有過此許從敕出後限一月內任將別物收貯如錢數較多處置未了任便於限內於地界州縣陳狀更請限縱有此色亦不得過兩月若一家內別有宅舍店鋪等所貯錢並須計用此數其兄弟本來異居曾經分析者不在此限如限滿後有違犯者白身人等宜付所司痛杖一頓處死其文武官及公主等並委有司聞奏當重科貶戚屬中使亦具名銜聞奏其賸貯錢不限多少並勒納官數內五分取一分充賞錢數其賞錢止於五千貫此外察獲及有人論告亦重科處並量給告者左降官等考滿量移先有敕命因循日久都不舉行遂使幽遐之中恩澤不及自今以後左降官及量移未復資官亦宜準此處分如是本犯十惡五逆及指斥乘輿妖言不順假託休咎反逆緣纍及贓賄數多情狀稍重者宜具事申奏聞其曾任刺史都督郎官御史并五品以上常參官刑部檢勘具所犯事由聞奏並申中書門下商量處分如未滿五考以前遇恩者準當時節文處分其復資度數準元和二年六月二十七日敕文處分敕伐叛興師久勞於外饋軍給費固巳為煩獻賀之儀諒非朕志務從約式表憂勤其今年冬至及來年元日諸司諸道進奉宜停記事記言史官是職昭其法誡著在典常如聞近者難得詳實思有釐改用存舊章舉而必書朕所深望自今以後每坐日宰臣及諸司對後如有事可備勸誡合紀述者委其日承旨宰相宣示左右起居令其綴録仍準舊例每季送史館以為常例崔祝抵犯刑章宜加貶逐緣其身居憂服未可授官宜且於康州安置待服滿日處分其贓充進助者仍令度支收管本道觀察使覺察不早特宜釋放李師道潛包禍心僞布誠懇緣自淮西用兵巳後愆釁屢彰纍有疏陳請捨凶逆當道租稅頻年不送陰通信使數致帛書又逆黨訾嘉珍等蓄聚凶徒謀燒洛邑所圖不軌臨發事彰又使其徒燒劫河陰庫倉沮國大計中使李重秀宣諭到本道又縱官健淩暴況又元和十年六月傷害宰相事之端本實啓潛謀凡此罪名皆當不赦朝廷以新平淮寇貴且息人素為含容令其獻效師道自知過咎難掩羣言纍遣崔承寵王元同自將表陳請令長子入侍兼獻沂密海三州林英續來又獻三州圖印并奏其男發日國家每務宏貸屈法招綏今忽翻然盡變前意應所陳列無非妄言其師道并軍將健兒表共三道詞頗悖慢宜出示百寮議可征可捨以聞應同司官有大功巳上親者但非連判及勾之官並官長則不在回避改授之限況國朝故事不少敕令明文具存其官署同職異司雖父子兄弟亦無所嫌起今巳後宜準天寶二年七月六日敕處分敕魏博及義成軍節度送到擒獲逆賊李師道下都知兵馬使夏侯澄兵馬使朱澄等共四十七人附麗凶黨拒抗王師國有常刑悉合誅戮朕以其久居污俗皆被脅從況討伐以來時日未幾縱懷轉禍之計未有效款之由情似可矜朕不忍殺況三軍百姓孰匪吾人詔令頒行罪止師道方欲拯於塗炭是用活其性命誠為屈法庶使知恩並宜特從釋放仍令却遞送至魏博及義成軍各委節度收管驅使如緣父母血屬猶在賊中或羸老疾病情切歸還者仍量事優賞放去務相全貸何所疑留寇孽背恩自取誅翦黎元不幸久陷凶殘王師有征義先拯物苟加殘暴諒匪豫懷況諸軍討伐巳來百姓歸投相繼既足嘉恤尤宜撫存時屬春陽各務農業陶我惠化當令便安其淄青四面諸道兵馬應入賊界收城邑所至百姓明加曉諭任其營生輒不得妄行傷殺及有拘繫焚燒廬舍掠奪資産開發墳墓等事並宜禁斷詔下之後巳有處分今更申敕切在遵行王承宗與三軍將士輸忠效力叶志同心恭守典章誓除寇虜俗化丕變風猷特高如聞水旱之餘供費未贍務令優濟保洽恩和宜賜綾絹布共萬端匹如聞諸道州府長吏等或有本任得替後於當處置百姓莊園舍宅或因替代情庇便破除正額兩稅不出差科自今巳後有此色並勒依元額為定京畿之內供億所叢雖年穀比登而人食尚寡俾其存濟實在優矜其京兆府及諸縣今年夏稅大麥等共九萬四千六百九十四石並宜放免江漢分流各有港路兩界但合論此不合勞人築隄今水潦為虞則慮先及低下其鸕鷀港宜令孟即與決開其師子港塞來年月深久更委兩道計會詳盡本末事理劉闢招誘外蕃用資叛亂四蕃顧盟竟無助逆雖使在其閒而義無所失其吐蕃並分散送赴本界以其寒沍涉遠各給衣物糧食發遣淄青營田副使兼齊州剌史嚴纂頃在賊中頗聞惡迹比於流類自合加刑況昔歲赴官便道潛竄凶狂之狀物議不容投彼遐荒尚謂宏貸除名配流雷州伏以高祖太宗接千載之統垂無疆之休太上皇承九聖之烈傳莫大之慶嗣德纘業允文允武宏帝堯之欽明宗元元之清淨付朕天下頤神保和至道光於唐虞至仁合於天地卿等虔述休德祗獻鴻名循省再三允符朕意朕獲守寶位丕承睿訓雖虔恭寅畏不敢怠遑而澤未洽於羣生理未臻於皇極遽言徽號何以當之雖嘉乃誠難遂來請其上獻太上皇尊號宜依所奏凡百卿士當體至懷省表具知朕獲承丕緒以撫萬邦照臨無日月之明膏潤無江漢之浸常恐吉蠲雖備未享於天心教道雖勤未諧於人欲諒慙匪德敢議鴻名而宰臣羣公宗后庶尹上引祖宗之丕矩下述黎獻之誠心誡豫以處泰而思勞告豫以愛名而務實陳以懇迫至於再三先典不可以固違羣情不可以屢阻與其牢讓而繁飾不若納規而徇公遽抑至懷勉從來請顧惟不稱兢惕殊深朕以負荷至大惕厲每深常所憂勤豈敢暇逸雖卿等竭忠獻替匡救之益既多而朕亦追想聖明諫諍之規是渴所以列其事迹文以丹青嘉乎匪躬凜然在目庶以發揮寡昧辨察正邪置之坐隅所期於外獎示於卿等但表於衷懷詠之清風企以從政豈惟斯美得在前人卿等道極致君才周濟物弼違義激於金石成務功格於神祇事合公忠言形將順周省陳敘深覽誠明所賀知省表具知建崇名加大號必自盛德而因全功苟非其時難以擬議朕紹十聖之統緒尊百代之憲章冕而事天憂栗不暇乃者忠臣敦化良將策勳有寇難而必殄必平用兵戈而不蝗不旱此乃多士叶力成茲小康豈豫一人獨運而致卿等四陳章疏每瀝肺肝同士庶之誠心徵朝廷之故實願飾虛美皆為過談諭而復來勢不可止雖重煩典禮殊不自安而深念奏陳亦當從欲勉依所請良用愧懷朕聞王者大孝本於無違故由於禮則不替慎於終則歸厚國有大事付豫沖人永言營奉哀惶靡措雖仰遵先旨巳從儉於因山而俯徇度荒實載勤於復土況七月之會萬方畢臻有供億之繁有車騎之雜賴上天垂祐庶務肅成文物盡哀敬之容道路無風雨之氣粵自遷座至於返虞人之叶從禮無違者此皆一二輔弼洎左右之臣至於庶寮罔不盡力朕所嘉歎不忘於懷宜酬厥庸以序功次其山陵使宜與一子七品正員官山陵禮儀使及陵所攝太尉行事官與一子八品正員官山陵副使兵部侍郎判度支李選禮部侍郎崔頒按行山陵地使並賜一級挽郎代哭諸司職掌工巧雜設人夫車牛並詢其勞績秩以等級賜官及出身賜勳爵進階減勞選各有差天地之德佐助者忠良鬼神之靈斃踣者盈貫故有無狀之釁顛越以敗常則有不奪之誠感慨以明節易所謂功業見乎變書所謂不善降百殃積惡必至於滅身見幾寧俟於終日應若影響昭然著明李錡受恩三朝授任千里勺水拳石以至高深潤草塗原豈酬亭毒而棄我厚德稔其姦心滔天以肆其逆謀擢髮未窮其醜行乃者式舉戎斾申嚴國刑將鼓雷霆之威以誅梟獍之罪鎮海軍左廂兵馬使兼御史中丞子良等外宏智慮內激精忠擐甲執兵取凶人之柄瀝肝嘗膽懷徑草之風迥戈以掩其羽毛竟夕遂擒其魁首天府無一金之費巳靜江流王師無一戰之勞巳除人害莫大之節卓然無倫非常之功斯謂不朽高位重賞豫何愛焉殊加榮寵用顯旌勸其張子良等超異酬賞並從別敕處分其立功將士等並準平西川節度例優賞甄敘其左廂官健等素聞效順亦宜霑賞並從別敕處分王淡趙錡等仗節死義殺身成仁無罪罹辜受茲殘酷所宜褒表並勸忠貞即加追贈仍令州縣致祭收葬其王淡如有子弟服滿日與一子八品正員官如更無辜受戮及脫身效順者亦委元素具事聞奏當有褒贈及加甄録如受戮之中有長行官健勿停糧賜優給其家浙西管內官吏及職掌人若被逼脅驅使者但情非同惡一切不問每念疲氓久羅虐政而又迫於逆命驅以饋軍攫斂則灌以漏巵傷殘則烈於猛火永言於此如納諸隍宜申蠲貸之恩冀息呻吟之苦其潤州今年秋稅未徵納者一切放免其管內諸州縣如李錡作亂之後橫加徵剝委元素審加勘責具色目聞奏其榷酒錢亦宜處置聞奏應討伐之師如未出本界者委本道量加賞給如巳出界者仰具聞奏朕惟前王之訓欽慎典刑今為惡者就誅而建勳者巳録庶將橐弓偃革遂物之生成力穡勸功致人於富壽覆車垂永鑒之轍端扆扇無為之風咨爾萬方宜知朕意承天理物莫尚於愛人謝譴弭災必先於咎己朕臨御萬國逮今五年亦常勵精罔敢暇逸誠雖勤而未妥於事澤雖布而未浹於人吳蜀建功關輔屢稔羣生咸若荒服會同將何以答昊穹之顧懷承宗社之眷祐固宜示以災眚警豫增修自去冬以來時雪微降及此春暮積為陽宿麥不滋首種未入東作慮違於農西成何望於歲儲為人父母甚可憂憫況江淮之閒歉饉相屬物力疲耗人心無聊雖存救之術巳行而凋傷之弊猶切是用輟食而嘆中夜以興得非刑獄之冤滯未申貨財之聚斂未息忠鯁之言未盡達不急之務未盡除有一於茲即傷和氣居高莫喻愧悼是懷爰命禱祠豈答神祇之望空勤惕厲豈為恤隱之方莫若側身推誠循政務實法乾坤易之理贊天地茂育之仁將以塞違庶孚於道屬陽和之序品彙敷榮俯念繫絏俾從寬減其京城內見禁囚徒犯死罪非殺人降從流流巳下罪遞減一等鹽鐵使下諸鹽院舊招商所由缺貞元二年四月巳前鹽稅錢及永貞元年變法後新鹽利經貨折估錢共二十八萬七千七百五十六貫文並宜放免除此錢外諸色所由人戶及保人有積缺錢物或資産蕩盡未免禁身或身巳死亡繫其妻子雖始於冒沒而終可哀矜宜委鹽鐵轉運使即據狀事踈理具可徵可放免數聞奏度支京西京北諸院榷鹽使并畿內在城諸色所由人戶缺負從貞元十一年以後至貞元十五年終主保逃亡攤徵保人并保人又逃亡及身在貧窮非家業見存姦滑延引者所缺錢物斛斗柴草等項亦宜放免亦委度支續具合放數聞奏諸道兩稅外據榷率比來創制敕處分非不丁寧如聞或未遵行尚有此弊永言奉法事豈當然申敕長吏明加禁斷如剌史承使牒擅於界內榷率者先加懲責仍委御史臺及出使郎官御史察訪聞奏夫制事立程必根源本未有上敦節儉而下有困窮上好豐盈而下獲安輯顧財用之所出念耕織之為勞自中原宿兵調賦尤廣更修無名之貢獻必有無藝之徵求或稱出於羡餘或稱不破正稅相因慕效寖以成風革弊立防何切於此其諸道進獻除降誕端午冬至元正任以土貢修其慶賀其餘雜進除旨條所供及犬馬鷹隼時新滋味之外一切勒停如違越者所進物送納藏庫仍委御史臺具名聞奏如諸道停進奉後尚務因循或有聚斂亦委出使郎官御史察訪聞奏政理之本在於約由內及外以示率先昨者六宮內人量巳放出猶慮內廣既之馬其數稍多委飛龍使等詔令作郎條流減省續具聞奏嶺南黔中福建等道百姓雖處遐俗莫非吾人多罹掠奪之虞豈無親愛之戀以茲興念良用憫然應緣公私買賣奴婢宜令所在長吏切加捉搦并審細勘責委知非良人百姓然許交關有違犯者準法條處分朕理國濟人以義為利務於當者必舉詢其弊者必除其在卿士叶心方嶽宣力勉修爾職以惠黎元慎守彞章咸悉朕意敕王者本憂人之心有順時之令故及發生之必宏利澤之規以此惠人期於阜俗今三陽布和萬物遂性惟人之窮乏者或不能自存朕所以愍然省憂議所賑救如聞京畿之內緣舊穀巳盡宿麥未登尚不足於食陳豈有餘於播種勸其耕植固在及時念彼徵求尤資寬貸京兆府宜以常平義倉粟二十四萬石貸借百姓其諸道州府有乏少糧種處亦委所在官長用常平倉米借貸淮南浙西宣歙等三道元和四年賑貸米並宜停徵容至豐年然後填納編戶之徵既有藝極字氓之要當恤有無苟徵歉之不時則困弊之無日近緣諸州送使錢物回充上供合送使者使司又立程限所以每至歲首給用無資不免量抽夏稅新陳未接營辦尤難委觀察使宜以供軍錢方圖借便輒不得量抽百姓夏種夏貢有差先乎任土周幣殊等實在便人近日所徵布帛並先定物樣一例作中估受納精粗不等退換者多轉將貨賣皆致損折其諸道留使留州錢數內絹帛等但有可用處隨其高下約中估物價優饒與納則私無棄物官靡逋財其所納見錢仍許五分之中量徵二分餘三分兼納實估匹段錢以準貨本約重輕制之不均遂權百物由是競為蓄聚漸爽流通粟帛轉賤農桑益廢若無釐革其弊難堪公私交易十貫錢巳上即須兼用匹段委度支鹽鐵使及京兆尹即具作分數條流聞奏茶商等公私便換見錢亦須禁斷自定兩稅以來刺史以戶口增減為其殿最故有折戶以張虛數或分産以繫戶名兼招引浮寄用為增益至於稅額一無所加徒使人心易搖土著者寡觀察使嚴加訪察必令詣實朕嗣守丕圖於茲七稔每念萬方所奉唯在一人百姓未康豈安終食故所以賑贍優貸思致乂安方鎮牧守誠宜遵奉如有違越委御史臺及出使郎官御史訪察以聞宣示中外明悉朕意孝本因心自天子而下達禮當從祔由聖人而設範朕以寡祐夙罹憫凶追攀弓劒閉橋山而未幾永慕褘翟合源陵於此時昊天罔極追感無盡俾竭誠敬用申哀懷而冢臣大僚庶尹羣吏靡不夙夜展其勤勞備物之容既陳嚴奉之敬斯在始終罔替差次宜勞式舉彞章俾新渥澤山陵所攝太尉行事官與一子七品正員官山陵禮儀使與一子八品正員官山陵副使賜爵一級其下優賜各有差園陵所供役為勞憫茲充奉之勤宜頒施舍之令其富平縣今年夏稅除折諸色價及巳徵納青苗錢除捐外並宜放免朕聞天地之於萬物也道深煦育而雷電震曜時警其不庭帝王之臨九有也德尚撫綏而原野陳師必加於有罪是以將伐而捨義在止奸禍召由人孽固難逭朕嗣膺寶歷恭守丕圖自靖亂巴庸除妖海浙戡翦羣慝將期理平全保太和非欲生事逆賊元濟蓄奸稔惡憑固阻兵擅釋父喪悖違君命行虧天性義絶人倫厲殘忍之聲豺狼是類忘生成之德梟獍為心大告屢加逆謀轉甚是用宜社至於出軍猶宏弔伐之方必兼討諭之命元臣統護授幃幄之深謀上宰專征運廟堂之成算羣帥畢力萬旅一心戰以力摧襲由奇勝李訴全師直進堅壁洞開凶徒就執於城池餘孽奔降於草莽霧廓冰泮淮濆水清斯皆宗社垂休人神協贊仰荷靈眷俯嘉衆誠共協勤勞豫用惕然衷懷載益之厲頒爵授賞豫何愛焉其收蔡州擒吳元濟節度及諸大將等宜從別敕處分諸立功將士等委韓宏裴度行營諸道節度使速條流等第聞奏即有甄升其賞物等巳令節級優厚支遣具別敕處分其投降將士亦委韓宏裴度與諸道節度使計會條流聞奏其中有是親差百姓子弟兵便放歸營農仍具數聞奏其淮西諸州縣官吏將健等雖被脅汙皆非本心除同惡巨蠹者一切不問其淮西百姓等陷此凶逆久罹殘傷莫匪吾人寧忘優恤宜準元敕給復二年仍委州縣長吏設法安撫其近賊四州自王師問罪供億實繁頻有優矜放其稅賦尚慮人多困極務俾昭蘇其來年夏稅亦宜放免比來諸州府供行營勞役尤甚宜令放免委有司條流聞奏即議優恤自經戰伐所有傷痍至於徇國捐軀效忠立節每加憫歎寤寐是懷官軍陳亡將士並委韓宏裴度與諸軍審勘具名銜事跡申奏即與褒贈其家口等並委本軍優賞仍五年不停衣糧并所在州縣速為收葬仍量事致祭於其家將士有因戰陳傷損以致殘廢者各委本軍厚致優恤仍勿停衣糧其陷在賊中官吏將士百姓等應有節義著明無辜受戮者宜令州縣府長吏致祭收葬仍委節度使具名跡聞奏當有褒贈仍優賞其家先巳褒贈者委長吏訪其子孫聞奏當與甄録其家亦準例優賞於戲制理垂規每思去殺而亂常作逆多自干誅爰念興師至於殄寇纍年之內徵役靡寧除害雖本於愛人敷化終慙於用鉞宵衣永歎良所愧焉咨爾萬方宜諒豫志門下朕聞三光下燭懷忠秉義者其節必彰四海有君作逆崇奸者其禍必大況乎恩有負於覆載禮自悖於君親罪盈而神怒既加惡稔而人謀乃發衆所共棄誅何可逃逆賊李師道苞慝稔凶背德蔑義動皆干紀言必欺天固海嶽之山川為蛇豕之窟宅忘寵祿於纍代恣殘忍於一方阽亂自至於滅身冒戮難窮於擢髮朕祗臨寶位仰奉丕圖除暴本務於好生用武尚慙於耀德肆命羣帥會兵龜蒙旗鼓相望城壘連下淄青都知兵馬使金紫光祿大夫試殿中監兼監察御史劉悟義勇中激沈謀外通攄三軍嚮順之誠申列郡受汙之憤迥戈首唱萬旅響從渠魁就殲梟獍同戮載馳闕馹函首上聞氛祲廓清方隅砥定功有卓異理當優崇旌善勸能用昭必信其劉悟所酬官賞並從別敕處分其同立功將士等賞物巳處分支遣委宣撫使楊於陵與本道計會速條流功效等第聞奏續加甄獎魏博以全軍濟河俯壓賊壘摧攝凶狡導致良闕叶謀祚為保授既翦逆豎宜甄茂勳諸道行營咸盡忠力至於攻取克寸捷既聞應緣討伐將還之際合有宴勞賞賜等並從別敕處分委各本道條流有功將士聞奏當議甄録其淄青管內州縣官吏軍鎮將健及諸色職掌人等久罹脅污自拔無由撫事量情亦可矜恕除同惡巨蠹者其餘一切不問其淄青道百姓等陷此凶逆久被殘傷昨因阻兵尤肆暴虐吾人是念豈忘優矜宜給復一年仍委本道州縣長吏設法撫綏其管內有高年廢疾并鰥寡惸獨貧弱尤甚者委觀察到日差官存問並量與粟帛訪聞比者賊中應有百姓㪷斛皆被收納今春農時貧乏者衆恐不辨耕桑失生業者宜令存問如有此色取所舊貯斛㪷量事給與令充種食俾得存濟其賊中雜差點子弟夫役便放還本處其中有不能自存者量事優恤百姓商旅諸色人中有被分外無名賦斂者並當勒停自興討伐言念傷痍扞患捐軀納忠徇國良深隱憫寧捨寤懷其官軍有陳亡將士等委本軍審勘具名銜事跡申奏即與褒贈仍令本軍優賞其家三年不停衣糧并委所在州縣速與收葬量事致祭其將士有因戰陳傷損尤甚以致殘廢者各委本軍厚加優恤仍勿停解其陷在賊中官吏百姓等應有節義著明無辜受戮者宜令州府長吏致祭收葬仍委節度使到日具名跡聞奏當有褒贈仍優賞其淄青封域歷稔氛昏管內名山大川在祀典者宜令宣撫使與本鎮計會差官備禮致祭其祠廟中應緣陳設器服等物是賊中所置者並宜廢撤特加修換用致虔誠於戲朕恭已嚮明撫御九有推情以恕出令在寬而叛逆反常自貽天討迷於告諭速彼誅鋤轉禍必有忠臣為亂同於覆轍既除逋寇庶洽大和偃戢干戈諒從此始布告遐邇咸使聞知主者施行
