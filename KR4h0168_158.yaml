body:
  text: 夫清濁剖判上下攸分三才肇基五行俶落萬物淳朴無得而稱燧人氏出觀斗極以定方名始有火化伏羲氏作因之而畫八卦立庖厨滋味既興疴瘵萌起大聖神農氏愍黎元之多疾遂嘗百藥以救療之猶未盡善帝受命創制九針與方士岐伯雷公之倫備論經脉旁通問難詳究義理以為經論故後世可得依而暢焉春秋之際良醫和緩六國之時則有扁鵲漢有仲景倉公魏有華陀並皆探賾索隱窮幽洞微用藥不過二三灸炷不逾七八而疾無不愈者晉宋以來雖復名醫間出然治十不能愈五六良由今人嗜欲太甚立心不常淫放縱逸有闕攝養所致耳余緬尋聖人設教欲使家家自學人人自曉君親有疾不能療之者非忠孝也末俗小人多行詭詐倚傍聖教而為欺紿遂令朝野士庶咸恥醫術之名多教子弟誦短文構小策以求出身之道醫治之術闕而弗論吁可怪也嗟乎深乖聖賢之本意吾幼遭風冷屢造醫門湯藥之資罄盡家産所以青襟之嵗高尚茲典白首之年未嘗釋卷至於切脉診候採藥合和服餌節度將息避慎一事長於巳者不遠千里服膺取决至於弱冠頗覺有悟是以親鄰中外有疾厄者多所濟益在身之患斷絶醫門故知方藥本草不可不學吾見諸方部帙浩博忽遇倉卒求檢至難比得方訖疾厄不救矣嗚呼痛夭枉之幽厄惜墮學之昏愚乃博採㣥經刪裁繁重務在簡易以為備急千金要方一部凡三十卷雖不能究盡病源但使留意於斯者亦思過半矣以為人命至重有貴千金一方濟之德踰於此故以為名也未可傳於士族庶以貽厥私門張仲景曰當今居世之士曾不留神醫藥精究方術上以療君親之疾下以救貧賤之厄中以保身長年以養其生而但競逐榮勢企踵權豪孜孜汲汲惟名利是務崇飾其末而忽棄其本欲華其表而悴其內皮之不存毛將安傅進不能愛人知物退不能愛躬知已卒遇風邪之氣嬰非常之疾患及禍至而後震慓身居死地蒙蒙昧昧戅若遊魂降志屈節欽望巫祝告窮歸天束手受敗齎百年之壽命將至貴之重器委付庸醫恣其所措咄嗟暗悔歎身已斃神明消滅變為異物幽潛重泉徒為一悲痛夫舉世昏迷莫能覺悟自育若是夫何榮勢之云哉此之謂也原夫神醫祕術至賾參於道樞寶餌凝靈宏功浹於真畛是知關籥元牝駐歷之效已深轡策天機全生之德為大稽炎農於紀籙資太一而反營魂鏡軒后於遺編事岐伯而宣藥力故能嘗味之績鬱騰天壤診體之教播在神寰醫道由是濫觴時義肇基於此亦有志其大者高密問紫文之術先其遠者伯陽流玉冊之經擬斯壽於乾坤豈伊難老儔厥齡於龜鶴詎可蠲疴茲乃大道之真以持身抑斯之謂也若其業濟含靈命懸茲手則有越人徹視於府藏秦和洞達於膏肓仲景候色而驗眉元化刳腸而湔胃斯皆方軌疊跡思韞入神之妙極變探幽精超絶代之巧晉宋方技既其無繼齊梁醫術曾何足云若夫醫道之為言實惟意也固以神存心手之際意析毫芒之裏當其情之所得口不能言數之所在言不能喻然則三部九候乃經絡之樞機氣少神餘亦針刺之鈞軸况乎良醫則貴察聲色神工則深究萌芽心考錙銖安假懸橫之驗敏同機駭曾無挂髮之淹非天下之精其孰能與於此是故先王鏤之於玉板往聖藏之以金匱豈不以營壘至道括囊真賾者歟余幼稚蔑聞老成無見才非公幹夙嬰沈疾德異士安早纏尫瘵所以志學之嵗馳百金而購經方耄及之年竟三餘而勤藥餌酌華公之録帙異術同窺採葛生之玉函奇方畢綜每以為生者兩儀之大德人者五行之秀氣氣化則人育伊人禀氣而存德合則生成是生由德而立既知生不再於我而處物為靈可幸蘊靈心頤我性源者哉由是檢閲祕幽搜求今古撰方一部號曰千金可以濟物攝生可以窮微盡性猶恐岱山臨目必昧秋毫之端雷霆在耳或遺玉石之響所以更撰方翼三十卷共成一家之學譬輗軏之相濟運轉無涯等羽翼之交飛摶搖不測矧夫易道深矣孔宣繫十翼之辭元文奧矣陸績增元翼之說或沿斯義述此方名矣貽厥子孫永為家訓雖未能譬言中庶比潤上池亦足以慕遠測深稽門扣鍵者哉儻經目於君子庶知豫之所志焉余歷觀遠古方書僉云身生羽翼飛行輕舉者莫不皆因服丹每詠言斯事未嘗不切慕於心但恨神通懸邈雲跡疏絶徒望青天莫知升舉始驗還丹伏火之術玉醴金液之方淡乎難窺杳焉靡測自非陰德何能感之是以五靈三使之藥九光七曜之丹如此之方其道差近比來握玩久而彌篤雖艱遠而必造縱小道而亦求不憚始終之勞詎辭朝夕之倦研窮不已冀有異聞良以天道無私視聽因之而啓不違其願不奪其志報施功效其何速歟豈自衒其所能趨利世間之意意在救疾濟危也所以撰二三丹訣親經試練毫末之間一無差失並具言述按而行之悉皆成就然人之志所重者性命其危春露其脆秋霜俯仰之間相顧如失榮華貧賤誠為不住之客憂悲娛樂並是難留之事以此而言深可歎矣余比讀諸方故亦不少觀其梗概例多隱祕味之者翻增其惑說之者返益其迷遂使修鍊之流不見成功之處豈其古人妄說耶抑由學道之輩目不能考其旨趣也余所陳方意於文記間如視掌中一試披尋莫不洞照相知之士通鑒名人有所不同心之取證故列為三篇耳夫禀氣含靈惟人為貴人所貴者蓋貴為生生者神之本形者神之具神大用則竭形大勞則斃若能遊心虛靜息慮無為服元氣於子後時導引於間室攝養無虧兼餌良藥則百年耆壽是常分也如恣意以耽聲色役智而圖富貴得喪恆切于懷躁撓未能自遣不拘禮度飲食無節如斯之流寧免夭傷之患也余因止觀微暇聊復披覽養生要集其集乃錢彥張湛道林之徒翟平黃山之輩咸是好事英奇志在寶育或鳩集仙經真人壽考之規或得採彭鏗老君長齡之術上自農黃以來下及魏晉之際但有益於養生及招損於後患諸本先記録今略取要法刪棄繁蕪類聚篇題分為上下兩卷卷有三篇號為養性延命録擬補助於有緣冀憑緣以濟物耳夫養生繕性其方存於卷者甚衆其或幽微祕密疑未悟之心至於澄神內觀遊元採真故非小智所及常思所尋設能及之而志不能守之事不從心術即不驗誠由前之誤交切而難遣攝衛之道賒遠而易違是以混然同域絶而不思者也嵇叔夜悟之大得論之未備所以將來志士覽而懼焉今所撰録並在要典事雖隱祕皆易知易為以補斯闕其學者不違情欲之性而俯仰可從不棄耳目之玩而顧盼可法旨約而用廣業少而功多余研核方書蓋亦久矣搜求祕道略無遺餘自非至妙至神不入茲録誠信效始冠於篇取其宏益以貽後代苟非其道慎勿虛傳傳非其人殃及三世凡著五章為一卷與我同志者寶而行之云爾聖人體其道而不為也賢人知其禍而不欺也達人斷其命而不求也信人保其信而靜守也仁者守其仁而廉謹也士人謹其士而謙敬也凡人昧其理而苟非為也愚人執其愚而不憚也小人反其道而終日為也福者造善之積也禍者造不善之積也鬼神蓋不能為人之禍亦不能致人之福但人積不善之多而煞其命也富貴者以輕勢取為非分也貧賤者以妄盜取為非分也神而記之人不知也亦不可一二咎而奪其人命也亦有爵被人輕謗及暴見貶黜削其名籍遭其橫病者多理輔不法所致也理輔不正不死者其壽餘祿未盡也正理輔而死者算盡也貧者多壽富者多促貧者多壽以貧窮自困而常不足不可罰壽富者多促而奢侈有餘所以折其命也乃天損有餘而輔不足亦有貧賤饑凍曝露其尸不葬者心不吉之人也德不足是以貧焉心不足是以死焉天雖然不煞自取其斃也不合居人間承天地之覆載戴日月之照臨此非人者也故有官爵之非分車馬之非分妻妾之非分已上謂之不仁者非分也有屋宇之非分粟帛之非分衣食之非分貨易之非分已上謂之不儉者非分也則神而記之三年五年十年二十年不過此過此神而追之則死矣官爵之非分者崎嶇而居之賄賂而得之德薄而執其位躁求而竊其祿求其躁取而必強強而取之非分也即有災焉病焉死焉神已記之人不知也車馬之非分市馬吝其價而馬欲其良水草而不時鞭勒過度奔走而不節不知驅馳之疲不知遠近之乏不護嶮阻之路畜不能言天哀力竭此非分也神已記之人不知也妻妾之非分者所愛既多費用必廣淫泆之道必在驕奢金翠之有餘蘭膏之有棄惡賤其文綵厭飫其珍羞人為之難余為之易人為之苦余為之樂此非分也神又記之人不知也童僕之非分者以良為賤以是為非苦不憫之樂不容之寒暑不念其勤勞老病不矜其困憊鞭打不問其屈伏陵辱不間其親疏此非分也神又記之人不知也屋宇之非分者人不多而搆其廣厦價不厚而罰其工人以不義之財葺其無端之舍功必至闕必明斤斧血力木石勞闕神不知環堵之貧蓬戶之陋此非分也神已記之人不知也粟帛之非分者其植也廣其穫也勞其農也負其利也倍畜乎巨廪動餘嵗年盜賊之羇縻雀鼠之巢穴及乎困農負債利陷深寃此非分也神已記之人不知也衣服之非分者紋綵有餘餘而更製箱篋之無限貧寒之不施不念倮露之凌寒布素之不足以致蠧魚鼠口香黤腐爛此非分也神已記之人不知也飲食之非分者一食而須其水陸一飲而聚其絃歌其食也寡其費也多民之糠糲不充此以膻膩有棄縱其僕妾委擲泥塗此非分也神已記之人不知也貨易之利厚不為非分利外克寸人此為非分接得非常之利者祥也小人不可以輕而受之其所鬻者賤所價者貴彼之餘而我之賊賊而得之者禍也幸而得之者災也分而得之者吉也屈而得之者福也夫人之死非因依也非痾瘵也蓋以積之不仁之多造不善之廣神而追之則闕矣人若能補其過悔其咎布仁惠之恩垂憫恤之念德達幽冥可以存矣尚不能逃其往負之災不然者其禍而多其壽而促金之得盈福之已竭且無義之富血屬共之上之困焉下之喪焉如此者於我如浮雲不足以為富也人若奉陰德而不欺者聖人知之賢人護之天乃授之人以悅之鬼神敬之居其富而不失其富居其貴而不失其貴禍不及矣壽不折矣攻劫之患去矣水火之災除矣必可保生全天壽也夫身為神氣之窟宅神氣若存身康力健神氣若散身乃死焉若欲存身先安神氣即氣為神母神為氣子神氣若俱長生不死若欲安神須鍊元氣氣在身內神安氣海氣海充盈心神安定定若不散身心凝靜靜至定俱身存年永常住道源自然成聖氣通神境神通慧命命住身存合於真性日月齊齡道成究竟依銘鍊氣欲學此術先須絶粒安心氣海存神丹田攝心靜慮氣海若具自然飽矣專心修者百日小成三年大成初入五時後通七候神靈變化出沒自在峭壁千里去住無礙氣若不散氣海充盈神靜丹田身心永固自然回顏駐色變體成仙隱顯自由通靈百變名曰度世號曰真人天地齊年日月同壽此法不服氣不咽津不辛苦要喫但喫須休即休自在自由無阻無礙五時七候入胎定觀夫學道之人入有五時第一時心動多靜少思緣萬境取舍無常忌慮度量猶如野馬常人心也第二時心靜少動多攝動入靜心多散逸難可制伏攝之勤策追道之始第三時心動靜相半心靜似攝心常靜散相半用心勤策漸見調熟人若勞於形百病不能成飲酒忌大醉諸疾自不生食了行百步數將手摩肚睡不苦高枕唾涕不遠顧寅丑日剪甲理髮須百度飽則立小便飢乃坐漩溺行坐莫當風居處無小隟向北大小便一生昏羃羃日月固然忌水火仍畏避每夜洗腳臥飽食終無益忍辱為上乘讒言斷親戚思慮最傷神喜怒傷和息每去鼻中毛常習不唾地平明欲起時下牀先左腳一日免災咎去邪兼辟惡但能七星步令人常壽樂酸味傷於筋辛味損正氣苦則損於心甘則傷其志鹹多促人壽不得偏耽嗜春夏任宣通秋冬固陽事獨臥是守真慎靜最為貴財帛生有分知足將為利強知是大患少欲終無纍神氣自然存學道須終始書於壁戶間將用傳君子安仁太宗時禮官夫祭天作樂本謂神聽高遠聲臭難接所以歌詠文辭依倚絃管滌蕩宣暢冀其來格今瘞玉燔柴於岱宗之下播聲昭告請降圜丘之上夫神聽聰明不可濫假如依樂聲應臨國內而泰山之下其神可得祀乎又毛詩周頌郊祀歌昊天封禪歌時邁二篇各別足是證明謂宜採周頌創新篇告精誠於上天請皇陵於東嶽於事合古仁軌字正則汴州尉氏人武德初補息州參軍貞觀時纍遷青州刺史百濟歸順留仁軌勒兵鎮守超加六階正授帶方州刺史乾封元年遷右相封樂城縣男咸亨元年拜太子左庶子同中書門下三品拜左僕射兼太子太傅武后臨朝加特進進封郡公垂拱元年從新令改文昌左相同鳳閣鸞臺三品薨年八十四冊贈開府儀同三司并州大都督諡曰文獻臣蒙陛下曲垂天奬棄瑕録用授之刺舉又加連帥材輕職重憂責更深嘗思報效冀酬萬一智力淺短淹滯無成久在海外每從征役軍旅之事實有所聞輒具狀封奏伏乞詳察臣今覩見在兵士手腳沈重者多勇健奮發者少兼有老弱衣服單寒唯望西歸無心展效臣因往問海西見百姓人人投募爭欲征行乃有不用官物請自辦衣糧投名義征何因今日兵士如此儜弱皆報臣云今日官府與往日不同人心亦別貞觀永徽年中東西征役身死王事並蒙敕使弔祭追贈官職亦有回亡者官爵與其子弟從顯慶五年以後征役身死更不惜問往前度遼海者即得一轉勳官從顯慶五年以後頻經渡海不被紀録州縣發遣百姓充兵者其身少壯家有錢財賂與官府任自東西藏避即並得脫無錢用者雖是老弱推皆令來顯慶五年破百濟勳及向平壤北口戰勳當時將士號令並與高官重賞百方購募無種不道洎到西岸唯聞枷鎖推禁奪賜破勳州縣追呼求住不得公私困弊不可言盡發海西之日已有自害逃走非獨海外始逃又本為征役蒙授勳級將為榮寵頻年征役唯取勳官牽挽辛苦與白丁無別百姓不願征行特繇於此陛下再興兵馬平定百濟留兵海外經略高麗百姓有此議論難為成就功業臣聞琴瑟不調改而更張布政施化隨時取適自非重賞明罰何以成功臣又問見在兵士舊留鎮五年尚得支濟爾等始經一年何因如此單露並報臣道發家來日唯遣作一年裝束自從離家已經二年在朝陽瓮津又遣來去運糧涉海遭風多有漂失臣勘責見在兵士衣裳單露不堪度冬者大軍還日所留衣裳且得一冬充事來年秋後並無准擬陛下若欲殄滅高麗不可棄百濟土地餘豐在北餘勇在南百濟高麗舊相黨援倭人雖遠亦相影響若無兵馬還成一國既須鎮壓又置屯田事藉兵士同心同德兵士既有此議不可膠柱因循須還其渡海官勛及平百濟向平壤功效除此之外更須褒賞明敕慰勞以起兵士之心若依今日已前處置臣恐師老且疲無所成就臣又見晉代平吳史籍具載內有武帝張華外有羊祜杜預籌謀策畫經緯咨詢王濬之徒折衝萬里樓船戰艦已到石頭賈充王渾之輩猶欲斬張華以謝天下武帝報云平吳之計出自朕意張華同朕見耳非其本心是非不同乖背如此平吳之後猶欲苦繩王濬賴武帝擁護始得保全不逢武帝聖明王濬不存首領臣每讀其書未嘗不撫心長嘆伏惟陛下既得百濟欲取高麗須內外同心上下齊奮舉無遺策始可成功百姓既有此議更宜改調臣恐是逆耳之事無人為陛下進言自顧老病日侵殘生能幾奄忽長逝銜恨九泉所以披露肝膽昧死奏陳臣聞屋漏在上知之者在下愚夫之計擇之者聖人是以周王詢於芻蕘殷后謀於版築故得享國彌久傳祚無疆功宣清廟慶流後葉伏惟陛下天性仁愛躬親節儉朝夕克念百姓為心一物失所納隍軫慮臣伏聞大駕欲幸同州教習臣伏知四時搜狩前王恆典事有沿革未必因循今年甘雨應時秋稼極盛元黃亘野十分才收一二盡力刈獲月半猶未訖功貧家無力禾下始擬種麥直據尋常科喚田家已有所妨今既供承獵事兼之修理橋道縱大簡略動費一二萬工百姓收斂實為狼狽臣願陛下少留萬乘之恩垂聽一介之言退近旬日收刈總了則人盡暇豫家得康寧輿輪徐動公私交泰謹詳衆議條目雖廣其大略不越數途多欲使嘗選之流及負譴之類遞立年限如不令赴集便是擁自新之路塞取俊之門或請增置具僚廣授官之數加習藝業峻入仕之科亦恐非宏奬之通規乖省員之茂躅徒云變更實恐紛擾但升平日久人物滋植解巾從事抑有多人頃嵗以來據員多闕臨時雖有權攝終是不能總備望請尚書侍郎依員補足高班卑品准試分銓則留放速了限速則公私無滯應選者暫集遠近無聚糧之勞合退者早歸京師無索米之弊既循舊軌且順人情如更有不便隨事釐革其殿負及初選其選踐自知未合得官等色情願不集即同選勞曹司商量久長安穩往者百濟先王迷於順逆不敦鄰好不睦親姻結託高麗交通倭國共為殘暴侵削新羅剽邑屠城略無寧歲天子憫一物之失所憐百姓之無辜頻命行人遣其和好負險恃遠侮慢天經皇赫斯怒恭行弔伐旌旗所指一戎大定固可瀦宮汚宅作誡來裔塞源拔本垂訓後昆然懷柔伐叛前王之令典興亡繼絶往哲之通規事必師古傳諸曩冊故立前百濟太子司稼正卿扶餘隆為熊津都督守其祭祀保其桑梓依倚新羅長為與國各除宿憾結好和親恭承詔命永為藩服仍遣使人右威衛將軍魯城縣公劉仁願親臨勸諭具宣成旨約之以婚姻申之以盟誓刑牲插血共敦終始分災恤患恩若兄弟祇奉綸言不敢失墜既盟之後共保歲寒若有背盟二三其德興兵動衆侵犯邊陲明神鑒之百殃是降子孫不育社稷無守禋祀磨滅罔有遺餘故作金書鐵券藏之宗廟子孫萬代無敢違犯神之聽之是享是福
