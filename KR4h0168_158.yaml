front:
  text: 全唐文欽定全唐文卷一百五十八思邈京兆華原人周宣帝時隱居太白山隋文帝輔政徵為國子博士稱疾不起太宗登極召詣京師授以爵位固辭高宗立召拜諫議大夫又辭以疾請還永淳元年卒
  hash: sha256:90baeaf5126ec9d4456567125cf92eb4b25668265d2df1b6b422d32ea315243e
  markers:
