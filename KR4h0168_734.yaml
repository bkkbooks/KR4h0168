body:
  text: 往者某值宴於鄭衛之侯坐與客序樂作堂下行舞男女紛雜交貫率以百品而觀者蓋矍然既罷升鼓堂上絃吹大奏命為柘枝舞則皆排目矢座客曰今自有土之樂舞堂上者惟胡部與焉而柘枝益肆於態誠足以賦其容也因顧余序之以洗客念賦曰昔神祖之克戎賓雜舞以混會柘枝信其多妍兮命佳人以繼態撼隆冠之繁珂兮披文纓於大帶跪閃舉以揮獝兮拖旋襟之襜曳騖遊思於情杳兮注橫波於穠睇顧巧度之無窮兮將多變而若雲揚厲唱於鼉鼓兮儷蘭露之芳津汨旁俯以裊影兮蕩風蕖於橫茵愕兮若驚弛兮若懶歘然逴姹翔然嫣婉振修裦以拋拂兮韜纖肱以糅綰差重錦之華衣俟終歌而薄袒既而抑倚昂开蹈節振臂驅捷蹀以促碎盡戎儀於弱媚見孫律於武姓入西河之劍氣曲響未遒邊風襲吹聞代馬之清嘶發言禽於詠類客曰若此之狀也以鄭衛而前陳吾固知其將墜挹清臣之嘉思兮信竦豫以峭孤回補籍之暇筆兮賦他山於遺圖擲琨瑤於訥口兮若含采以咀蘭惟古工之包化兮啓㣥峯於無間勢蹙巘以特起互騰排而上干翠參差以玉立俱竦竦以攢攢於是澒以長瀾森以怪木瑟汨栗飀淒煩蕩燠浸平潦於楚澤冶妖韶於陽谷低霾橫瞑兮陳半腹夢雨神雲兮淡而不歸怨扯惹乎巖曲縹蘚青蘺兮事幽澀細澗帛丿糸流兮洄噴噎山之人兮夕忘寐而坐忘興帷紺枝兮帶黃葛暖草被崖兮垂緑髮翺鸞翔翠相追征兮振錦舒繡錯以明兮啼羈酸雌裂眥吻兮風號穴怒寥而清兮山中之木何雕榮兮余昔夜夢寓遊一方樂態甚適覺而作賦題之夢遊仙其辭曰杳漠漠兮升絶垠雲轡九天兮越崇門星赩曉以淡白瀾咽潾於錦礫石榴笑而織娥喜閽導余而就將止襲烈蕙之芳風送麗音於遼耳目恣邁而多適吾超超其樂此銀墉兮桂箱差瑤踏兮上玉堂卷紅幕兮發繡戶中有人兮結清處語嫣延兮情綽扯命余廕於蘭之厦回穠顏以一顧矕嬌眸而融冶煙津兮玉盤火桂兮炮鸞鼎娥司味和苦酸嬴吹既調戛湘絃合吾飲食兮樂吾後園乃稱詩曰白日低兮春塘滿紅華芬兮草芽短菱結帶兮荇含絲設遨遊兮遵佳期又詩曰穠光醉兮昏帛丿糸帛丿糸焉與久兮樂萬年春留連兮其未央吐芳意於荃言忽發寤以無覩魂迷念兮情牽既諒人生之皆夢孰云夕非而晝是馳詠想之悠悠兮軸吾情於萬里問昔者秦襄公舉秦鄙之人逐犬戎於西河之外因其險而塞焉後代無敢逾始秦方列為小國而東有諸侯窺地之兵西有強戎不忘之怨未聞當時秦嘗籍卒於外而屈於敵也此一侯者之志尚爾况臣天下之大哉今西邊制戎起隴黃花輔兩關自黃花拒塞倚漢中南逾山帛丿糸阻極巴蜀自開縈隴西北會彈箏杠于河塹于朔方夾河而東倚豐而角有天障居其西以控戎者凡七師邐迤數千里之間壁衝扼要之戎百有餘城若此足以流威而謹塞乎且戎之力不能加古昔之患而邊防與地之兵方秦之多倍百矣猶以不足於用即東取卒於淮南吳越東南取長沙至於衡山臨江更歲以易卒彼其土之人逾寒不纊而投之積冰之地役其所不習用其所不能非獨饋挽之不勝於費也及聞墮指裂膚之事父母妻子聚而興哀今欲疏罷徵之請則邊臣有失助之告如存乎舊規則贅疣而無用得失之端幸稱其當問時皆曰縣令之官為能以化親於人矣訊其變化寵最之法曰歲益氓幾室賦隨而息之是令之誨人曰勞氓其來我者遂其所而保之吾能使吏不侵決不渝一歲曰僑人籍而不賦再歲曰僑人賦而不役誠著而不衰四鄰之人逋而來者屬袖於道歲告籍於其郡達於連帥即遷之逋人之邑亦且虛籍以自蔽纍賦於所存四鄰之邑更教誨以召之賦纍而不能反者更往而逋之四土之人環遊不絶輕去其鄉閭猶脫垢耳雖恩書亟降為之濯煦然猶虛籍為祖日增而不止豈褒尤寵最之謬哉不然其咎安在衆君子皆含智負能惟其不吝嘉謀竚聞通理問夫才之居人也自中正降短長之不相侔甚矣今士非列於朝請者必仰於吏部故歲調試千餘人即假疑於事使對書決之亦有冒買其書者莫有所禁其取捨之程考於字句耳夫櫨甍軛輻之具也細不掩短狹不模撓隨用有輳於今士一規而選授於殊執豈果盡其性哉欲去書判之選則有司者無以為准約未知何以而得其中也惟陳必中之言以程斟酌之度問教化賞罰政之大端固並行而不相悖在交修而底于道漢文以恭默致理式合古風鄭産以刑鼎興譏是稱叔代昭然薄厚豈俟敷陳然則馭時自有宜急禮云不從其所行斯不亦教化之功乎又云使人有所愧恥斯不亦賞罰之羞乎若曰澄其源而清其流端其本而正其末陶然而臻福壽薰然而化暴戾體則盛矣如寬舒何是黜幽陟明為瞰察也其或舉一善而衆皆勸懲一惡而衆皆懼進猶加膝辱過撻市效則有矣如削刻何是道德齊禮為虛說也今聖上思理股肱宣力有司登選茂異同觀材器酌時而行必有所先原始要終行能精辨幸陳其要無或蔓詞對賞罰所以禁弊也不可使其弊也夫太寬則上逸而下偷太急則上勞而下怨下偷則怠慢生下怨則暴亂作故殷周之王因其弊而更張之因人利而改作之是以不相襲制而秦驕霸嗜利吞天下以入咸陽鞭百國之貨以富宮室當是時秦法行乎四海天下之人側足而立漢興悉蕩其煩苛與天下更始樹可守之法使賞必能刑必罪至於文帝漢天下已四十年矣文帝躬節儉務簡易因其時而若子産者當微諸侯爭霸禮讓流喪盜賊㣥起鑄鼎著刑以救時耳今可法之理於近莫如太宗龍興革亂隋之殘政修法度立中庸圖堯舜為鏡於前用以為明白之理使房杜為之相以輔不及當時之風一化天下流乎開元井閭之人反朴若先古然夫既理之代理之在中而已矣猛則救以仁寬則輔以毅孔子亦曰從容中道聖人也亞之雖不肖然讀其書見三代之作如此秦漢亦如此太宗中庸之理又如此且貞觀之來非遠而鄉中之老往往猶有咏其事者伏惟明徵之可從容言於上前問文武之道布在方策博通具舉惟君子能之是知超乘穿札非謂武也搜章摘句非謂文也苟不通乎源流而徒習乎藝事工則工矣是謂末節者終軍班超奮于文儒有請纓投筆之志壯圖急病何代無之乃有淮右小醜久稽天憲聖上深覆燾之念極綏懷之仁網開三面武引七德而鼠盜蜂結趦趄未賓忠臣義士有以憤激今明詔既下王師鼓行視彼凶殘坐見殲蕩誠泰山洪河壓卵注螢不足以喻然衆君子備詳前志多綜流略必有善師善戰之術七縱七擒之方一為指陳悉徵備要將求其可上達宸聰如或出乎奇祕亦當明密以聞對亞之提筆之士也區區討論之間迷失聖意究未能得安足與論攻伐之事歟雖然亞之前歲覽古於濠梁從容觀魚之地而濠人有習知蔡兵舉止者嘗謂亞之曰自吳少誠叛以來王師曾會德宗尊仁宥罪詔天下悉罷襲蔡之人雖蒙恩旨然日夜益訓兵卒堅城深塹芻食盈倉積至今十五年餘未嘗一日忘戰非有他居反側之間惟恐為所襲耳而四海之郡備禦已罷雖數更其守未嘗聞一守留心下人牧愛百姓皆能名虛軍畜肥私狗馬田園陂池之利用以自入務行金繒卜射幸臣祈遷乎善地而蔡益知其境之虛果因喪而橫前日壽州失利則固然也今又欲兵徵四方使來會用於小醜蔡即北取趙魏燕齊西取寧隴邠岐西南巴漢南取甌閩東取吳越皆是提遠趣而萍合相容於其山川險易曾不影響又未聞其將軍稱者使其士卒一有父母妻子之念是寧能死志一方安所為耶且勞給非所為也爭鋒則失利坐守則厚費今議者或以為不足於練皆非也而屯集師旅亦非也今必欲不計時而誅之獨有使才人為近境之郡至則籍其郡人父子昆弟五十以下十五以上除習兵務農無得自用者如是不日而兵足用賊可滅矣其餘未可利也如其擒縱之法出於一時者不可先以悉數謹對問贍軍國給公上出於物力其賦稅之謂耶煩則擾罷黎省則乏經用縉紳多士之論及此也莫不曰擾農困商敦本抑末知倚市者為弊樹稼者誠勞必在乎慎擇臨長之官加重耕織之出今牧宰非不選也而富庶未至衆貨非不制也而粟帛猶輕用何方可以致龔黃蒲密之理以惠康吾人用何術可以均衣食緡錢之饒以利澤南畝斯上心所注亟以延問觀光之士期為指明對百姓之貢輸賦患不在重而在於勞逸不均也今自謀叛以來農勞而兵逸其租稅所出之名不一猾吏撓之後期而輸者則鞭體出血若聲仍終不得蒙不忍欺故豪農得以蠹奸賈倍之而美地農産盡歸豪奸益其地資其利而賦歲以薄失其産者吏督其不奉而賦歲以重是以割姻愛棄墳井亡之他郡而不顧亡者之賦又均焉故農夫蠶婦蓬徙塵走於天下而道死者多矣由是商益豪而農益敗錢益貴而粟益輕也今返之法必在刺史長吏而擇其良者使久留於任一年政成者一階之官一歲一加之三年而政成者歲加之異政纍聞者五年而后遷之連率不如法者削其本不得齒則庶幾乎化矣謹對問皇帝若曰蓋聞舜禹之有天下也起於側微積德纍勤多歷年所夫經盛聖之慮豈有遺哉然猶好問察言勤求賢士蓋以承天之任重憂人之志深也况朕長於深宮涉道日淺繼列聖之鴻緒撫萬㝢之蒸人夙夜嚴恭不敢有懈實懼燭理未究省躬未明所以詳求讜言以輔不逮子大夫是宜發所蘊蓄沃豫虛懷極意正詞勿有隱諱昔王政之興必臻於康泰霸道所立猶致於富強我國家提封溢於三代酌憲兼乎百王無堯湯之災積祖宗之理而人未蕃庶俗尚雕訛家無蓋藏公闕儲蓄卒乘之數貨幣之資統而較之莫繼前代豈率土生植變於古歟將阜時政令戾於今歟固已揣摩必窮利病明徵末失之漸具陳興盛之謨且文武兼學以成功士農迭居以豐業故家給足以戀本才周可以應時近古各循一端不相資用致令從事異心難成考課去秩無守輕為惰游指明共貫之方斯合二途之利永言化理期酌厥中施為或差得失斯遠將修睦勸義則在下難知將任數馭情則人心益僞思聞指要得合誠明旌別比周之情敷詳忠厚之道知人則哲從古攸慎九徵恐泥五事難精或望可服人而才非周物或言皆詣理而行則乖方宜陳取舍之端用明真僞之辨至於朝廷之闕四方之弊詳延而至可得直書退有後言朕所不取子大夫其勉之對臣伏念目之包明其在昏夕之時則與盲等及屬日蒙光乃能寤元黃披萬類傑智之材其處濁俗之中則為愚者混非遭聖偶時安能樞陰陽育萬物其理一也盲者雖蒙光莫能視愚者雖蒙聖莫能賢其理一也故舜禹翔其光於上益稷之徒周其視於下其由懸白日而省離婁也三代以降君之光微臣之智狹見其手而迷其足觀其前而昧其後其由舉燭螢而臨庶目也今陛下神光洞天鑒被幽塞猶懼理有未至故親省㣥言而臣瞽愚非能逾於智傑副陛下之清問臣以相與貢臣以賢良應詔微臣所冒非任當伏竄棄之尤不足以塞罪乃輒伏進所言臣伏讀睿問周視聖旨見陛下思天災之病也臣愚以為皆由尚書六曹之本壞而致乎然也今請統而條指之睿問有念人俗之凋訛及於卒乘之數貨幣之資臣請以今之戶部兵部之壞舉之睿問有思才周於文武本固在於士農臣請以禮部工部之壞舉之睿問有欲以辨行之真僞臣請以吏部之濫舉之睿問有朝廷之闕臣請以刑部之失舉之睿問有四方之弊臣請以山東隴右之急奏之伏願陛下詳臣之言察臣之志無以臣微而忽其奏也臣聞周設六官以統百辟立國八百年其由綱之不絶於所制故也太宗龍興革魏晉之殘政修法度立中庸設尚書六曹以序班文武以條系天下號令既布而萬方從矣愛其人若愛己之德保其黎庶若保幼子恐其有墜也明四目以先其視指其未見者也達四聰以先其聽喻其未聞者也尊賢之言而為視聽視聽先張則黎庶不陷於災害而康泰矣後代雖有盜臣姦黨而終不患其亡由綱之不絶於所制也夫尚書六曹之設猶人之有六腑也耳目口鼻之樞系於元首手足之用關於肘膝其血氣根脉皆統於六腑符而命之然後能動用失其用者非邪則眩夫人莫不尊其首故足司其所履指司其所執百體之司各勤其用則首安其尊而不勞首之處身猶君之居上也百辟以位則君安其尊而不勞明矣今尚書六曹外雖備其官而中實繆今之俗凋訛者其由戶部之綱不理也昔戶部其在開元最為治平當時西有甘凉六府之饒東有兩河之賦仰給之卒不過四五帥其餘利殖所入盡與齊人四十年間富庶滂洋之若是及一日上恃升平之功相肆威驕之狠直言得死諛色獲進轉掌之間清蹕巡於巴蜀矣今西凉為虜兩河為兵盡開元天下之兵不過當今數郡之卒勝衣之農而百徭出矣鞭役重繁不勝於籍榷之不顧其害刑之不問其深吞危衆多欲無凋訛不可得也兵部之選武士益繆矣武夫試射百中為重騎射次之騎戈亦次之此武夫賤者之宜業也而真者百無一焉其餘盡買豪奸之革役者以俟冒入奮戈戲馬者亦得中名則估肆富人之子弟彼安能致武之所用顧欲占籍自恃以逭徭於鄉閭耳而欲卒乘貨幣之充強臣未見也今兩河之間至於幽薊連屬西邊北邊而仰給之卒多於其土之齊人十丸在兵部者所操曾不能制一校尉而况紐其綱乎古者兵農之一體也三時務農一時習兵故春耕而夏植秋藏而冬講武誠願使兵部之綱紀根於古道之要兵部之令加於將帥之臣則本久益大矣何卒貨不充於古哉今禮部之得進士最為清選而以綺言聲律之賦詩而擇之及乎為仕也則責之不通天下之大經無王公之重器今取之至微而望之甚大其猶擊陋而望曲齊於韶濩也今仕進之風益壞矣必以陰詐為朴陽明為狂顧以武為汙矣而况兼學乎陛下何不令禮部之臣督其所業考其所能則人可化矣夫惟博大之士為能兼學耳夫持綱舉維非博大之士不能也夫求博大之士非竭誠不能也故殷宗之竭誠於神神感於夢而得傅說周文之竭誠於氣氣感於兆而得太公陛下如能用殷周之誠而求之何患用才之不至矣今工部之綱不舉其由百工之不條理焉且務於捷濫則能速壞惑於邪巧則多改作速壞相仍改作無已欲使財費之不窮工力之不竭臣未見也夫堯之功與天比覆居於土階之上蔭於茅茨之下土簋而具禹親勤理水而卑宮室是二君者非不能極巧侈之端故處陋而無厭蓋欲使天下之人自然而儉易從也而周官百工之職載於六職之書詳矣其後昏君亂主未有不極遊觀之娛窮巧侈之樂恣羅紈之靡雖有生植之衆不足充虞人之裁雖盡隴畝之農不足塞百工之役雖竭蠶婦之勞不足給綺綵之貢秦隋之末君不如此不足以隳宗社今仕家不著籍於鄉閭亦已久矣則農夫惟恐他業之不容於趨也安肯顧隴畝而戀其本哉伏願陛下仰堯舜禹之聖敬畏秦隋之敗奢念漢文之節儉凡在百工之用關於將作內作技同者必使統於工部以觀制作之度使費勞之怨不起於下人則堯聖禹明周規漢儉惟陛下擇耳何止士農之固業哉今吏部之補吏歲調官千餘其試以偶文儷語之書程以二百字為准考其能否以定取捨直使其人真能然尚何以補况十九皆僞人乎以此而求其賢不可得也且昆吾之利莫邪之才雖巧用不能雕咫尺之木鷙鳥之羅雖善掩者不能拘蚊蚋如使恢宏博大之士裁心鏤舌以為此辭而其道安可見乎陛下何不命㣥官立於朝者歲各貢所知各以其所長試之各以其器任之不勝其任者罪罔上闕其貢者罪蔽賢而洽聞者爵逾次禮部吏部以時舉籍刑部督其不察如此則人人爭好賢人人務克己何患乎真僞不可辨哉今朝廷之闕衆多其最急者刑部刑部之綱不舉其由賞罰之不信敕命迭降而其旨相違故有行之於今日而廢之於明日罪之於此而赦之於彼是謂慢易詐欺之藪耳欲無枉撓不可得也誠願斥其煩苛去其相逾則人人易守難犯然後命儒賢充掌之不明於此者不得為刑部之官無令猾賊之徒輕身重貨竊法以自弄如此則清矣賞信刑果則遠罪修已之風序今非止於闕蓋將病且痼矣夫病者其在皮膚則易也六腑已繆氣非所經而其體痼不亦危乎臣請以醫方之言諭國之病伏惟陛下察焉臣聞良醫之理痼也陳以奇方進以猛餌外以針火導其血絡藥病相攻戰於其中及痼解病瘳六腑亦憊於是竭良藥以材調德膳以味從而補之然後六腑平百體正內強而外和矣夫近代之愚醫則不然必使病勝而形羸不危其身者稀矣三公六曹國之六腑也果刑信賞國之筋絡也九州百郡國之四體也四夷八蠻國之外膚也驕荒淫佚國之痼病也嘉謨良算國之奇方也強將徑兵國之針火也禮樂法度國之德膳良藥也夫百骸居於外六腑列於內相假而成生相致而動息本為一身也及一腑失理容而不攻其久日大攻而不除其久為痼除而不補其久復發為瘵難矣臣以為天寶貽痼始於一支久而容之浸及百體幾危其形元宗肅宗除而不終痼及興元德宗之時又無良臣可進內強之術而攻不就先皇攻於除而不攻於補今乃復發於幽冀居國之左右又有西戎之厲居於右掌之膚涉腕逾肘今已及肩何以知其自掌而及肩也以安西至於涇隴一萬三千里其間嚴關重阻皆為戎有由此知其及肩也則王畿界戎無五百里此肩之去喉能遠乎奈何容而不除也此皆發於中朝之闕而流其病也若四方之弊莫若山東隴右之急莫若武備之不至又請詳舉之夫聖人之母萬物必體天地之功故以陽為文教極其光明也以陰為武備盡其肅厲也夫陽盈則韜而陰藩之陰盈則復而陽濟之故能相理而不亂五月陽盈使一陰居其間明正陰之有位而盜陰不生故聖人因之修武備至於十一月陰盈包將來之陽可大可久也故外作霜雪以厲之恐夭夭心陽之道也內密燠而養之使其為文為光也故聖人因之求賢以為輔雹凍霜雪禁其煩蕪陰用也故聖人因之以正刑雷風為前驅蕩其所不通溫光從而舒之陽德也故聖人因之以文宥是以聖人之德文雖先而武備不去前年淮夷擒齊魯滅常山死幽燕歸臣未見制馭有方法也而議者且以為兵可戢也遂用羸將守常山滯儒臨薊北不旋踵而賊氣復作矣伏願陛下慎勤誡盈無傷陰之大候且行化在便人舉兵在立勢夫百斛之車百蹄之牛不能搖其轂如措之峻坂之上授之力者不盡數牛及轟然而遷則牛足之運不及輪奔矣此立勢之樞也今幽薊之兵其猶病者之再病也乘虛而強履獨有立勢而誅之立勢之急在於聚威於深棣實力於滄定然後以趙魏臨常山環兵而攻之則冀馬之蹤不望合於燕蹄矣以太原之師入薊邱則易水之東左臂不能傍運矣此拘燕囚薊之方也如其擒縱之法出於一時者則在名將而用耳如其威不聚於急力不實於危雖有名將不能為也陛下見西制戎北制虜壁壘之勢盤連交錯兵甲之多賞勞之厚以為戎虜之畏此而不敢犯塞今以刑賞之不信也而戎臣以自入士卒虛名占籍者十五不啻日夜飛金璧走銀繒市言惟恐田園陂池之不廣也簪珥羽鈿之不侈也洞房綺闥之不邃也不如此不足以積怨勞卒及寇來則必固壁閉兵無敢出擊者如一日戎戈東刃陛下將安倚乎今北虜猾夏猶已事嫁矣而西戎之虛盟安足信之不可無虞也夫人性有勇怯地形有險易勇怯可以習制制之以刑則亡怯樂之以利則亡怯借之以勢則亡怯假如涉險利強弩以持重者據之平陸利騎戈以捷手健蹄者兼之此得勢而亡怯也今士卒之獲戎者得其馬牛羊雜畜及衣裝寶賂皆與之無令有所奮奪此顧利而亡怯也蒙兵失律者皆誅此畏刑而亡怯也如此而用勇倍百矣臣嘗仕於邊又嘗與戎降人言自瀚海已東神鳥燉煌張掖酒泉東至於金城會寧東南至於上邽清水凡五十郡六鎮十五軍皆唐人子孫生為戎奴婢田牧種作或聚居城落之間或散處野澤之中及霜露既降以為歲時必東望啼噓其感故國之思如此陛下能不念之臣意西戎今冬當逾河拒北虜明年必大入靈武寇西城先擊監宥誠能因此時詔寧隴邠涇及南梁皆會兵計事獨得以老弱留謹城其他少壯及騎士皆持裝佩鹽糗令邠寧涇原軍皆出平凉道彈箏邠寧軍北固崆峒守蕭關涇原軍西遮木硤關鳳翔軍逾隴出上邽因臨洮取鳳林南關南梁軍道鳳逾黃花因狄道會隴西得其利則擊因其牛羊足以供具各以輕騎入河蘭撫喻其遺人飛聲流勢延而益西則故道盡可得也如此則王畿之內安有警烽之虞哉臣故曰四方之弊莫若山東隴右今策臣之目曰直言極諫則言無所不直直不懼於罪也若諫無不極者今百不盡臣之一二焉何者答問之所及或未利於國臣雖欲漏之而不解則懼執事之臣不寤也睿問之所不及者當臣之言實有利於國臣雖欲奏之臣懼罪言於非宜也而况短晷之晨奔光馳曜之下筆之條奏拘以文陳乎臣所以憤悶之誠百不及於一二也豈無異日而顧問哉伏惟陛下察焉謹對問朕聞古先哲王之治也元默無為端拱司契陶氓心以居簡凝日用於不宰厚下以立本推誠而建中繇是天人通陰陽和俗躋仁壽物無疵癘噫盛德之所臻敻乎不可及已三代令王質文迭救百為滋熾風流寖微自漢以降足徵蓋寡朕顧唯昧道祇荷丕構奉若謨訓不敢怠荒任賢惕厲宵衣旰食距追三五之遐軌庶紹祖宗之洪緒而心有未達行有未孚由中及外闕政斯廣是以人不率化氣或堙厄災旱竟歲播植愆時國廩罕蓄乏九年之儲吏道多端微三載之績京師諸夏之本也將以觀治而豪猾踰檢太學明教之源也期於變風而生徒惰業列郡在乎頒條而于禁或未絶百工在乎按度而淫巧或未息俗隳風靡積訛成蠹其擇官濟治也聽人以言則枝葉難辨御下以法則恥格不形其阜財發號也生之寡而食之衆煩於令而鮮於治思所以究此繆盩致之治平茲心浩然若涉淵水故前詔有司博延㣥彥佇啓宿懵冀臻時雍子大夫皆識達古今志在康濟造庭待問副朕虛懷必當針治之闕辨政之疵明綱條之致紊稽庶富之所急何施革於前弊何澤惠於下土何修而古理可近何修而和氣克充推之本源著於條對至若夷吾輕重之權孰輔於治嚴尤底定之策孰叶於時元愷之考課何先叔子之克平何務惟此龜鑒擇乎中庸斯在洽聞朕將親覽對臣聞古者君天下之心也上降下應還若影響夫以身而養人者下以父尊之雖衰而無怨此神農之俗也以道而覆人者下則欣戴之雖衰莫得離其下此黃帝帝堯之俗也以義教人者下以神敬之雖衰而無慢此舜禹之俗也以刑戮而驅人者下以刑戮而畏之不俟衰而刑戮復矣此桀紂之俗也今陛下廓神睿之宇臨天下將三歲矣索舉賢良待問之士聚而俯告悉徵所達以輔于明臣幸得見墀級之嚴陳百王由戶之道臣之所奏善戶有三神農唐虞之化是敗戶有一桀之亂是彼三善之戶其門甚闢皆可循轍而進惟在陛下命車而已矣制策曰厥聞古先哲王之理也元默無為端拱司契陶氓心以居簡凝日用于不宰厚下以立本推誠而建中繇是天人通陰陽和俗躋仁壽物無疵癘噫盛德之所臻敻乎其莫可及已三代令王質文迭救百為滋熾風流寖微自漢而降足徵者蓋寡問以古先元默無為之化及三代質文迭救之法易難相殊者臣請指數而奏之夫數之始生起于其一而歷乎多數在盈十之間雖童子且能屈指而數也及延乎億兆塞乎天地雖明大人猶難舉籍而造其極夫叨者始生魄于嬰而蠢于蒙蒙嬰之時不俟更乳而飫矣及形具氣周設肥牛之肩加百品之佐不足以塞其饜也是則太古之人衆庶之俗其由數之奇寡叨之蒙嬰乎無越無踰蠕然濡之無營無慮塊守俟煦為之君者易其化五帝主之何以異賁育之材舉一毫而趨也三代以降衆庶之情譎變之俗其由數之億兆叨之周壯也君之者廣法制以御之飾禮義以導之明賞罰以齊之然猶不能使不表夸無益也臣聞聖人高明而道中庸者法常制定使人無加踰于節度猶恐其久而為弊即以日新之言以勸誨使不違常也如其臨理有常制豪猾何致踰檢乎講習師受有常學儒者何致廢墮乎黜陟幽明有常令列郡何敢干禁乎車服室屋有常度工者何致淫巧乎易問先迷失道之常也然照育之神不測者以其既弊于夕而能更興于晨使其光日日新也伏惟陛下觀日新之道以張化源復何俗恬風靡積訛成蠹之患乎制策曰其擇官濟理也聽人以言則枝葉難辨御下以法則恥格不形其阜財發號也生之寡而食之衆闕煎無已臣恐鑠於所制也伏願陛下修日新之德察善政之臣行剋己之令以拯其弊然後可以垂衣而化也制策曰故詔有司博延㣥彥佇啓闕也陛下如能用其道可以澤惠下土也如使古理可近者其在明禮樂仁讓也若使和氣克充者其本在和人心之抑慍在理之雅正也其理怫者衆氣滯其理明者衆氣洽夫衆庶之情和平慍抑之氣吁而散之太空還會于風雲合于水土包聲于陶埴之器每歲附陰而伏乘陽而升衆庶之氣雜于陰陽陶于變化者由麴糱乎慍氣居于中則戾戾則悲悲則水潦敗抑氣居於中則悖悖則亢亢則螟蛾生平氣居于中則序序則得常得常則風雨節寒暑時和氣居于中則泰泰則有餘有餘則交讓於變化涵而為休寶流而為精神洋衍乎祥光沛濊乎佳澤臣故曰充和氣者在調人心也制策曰若至夷吾輕重之權孰輔于理嚴尤底定之策孰叶于時元凱之考課何先叔子之剋乎何務維此龜鏡擇乎中庸期在洽聞朕將親覽者夫廩畜之所賢者在乎賤入而貴出使人無所困飢於凶災傷勞於豐賤也夷吾之權微不可也從古以來西事戎者或辱于盟而困于嫁非有他由擾其鋒而侮其醜也及為所窘搏則啁物以其兵矣戎夷之生無以異也故聖王備而不擒也嚴尤之言亦可徵也自長慶寶歷已來金紫銀朱之佩盈于朝溢于郡國有紀何者今日布令明日而隳使人無所守是以紀綱不振也且教令所以設備為防也綱紀所以制物樞用也是皆虞患難拯困也人有赤子沈于水火者為之父母必將奔往而拯之使免於苦及無為救者則必坐悲而泣望也為救之具必在長綆之鈎修竿之抉乎有備而防者父母之人也無具徒手者雖悲不信也今陛下之赤子亦以困於是矣陛下亦將拯而免其苦乎今法制委弛維綱不樞則是修竿長綆之鈎抉不為也陛下居于九重臨于兆庶得無有坐悲泣望之恨乎臣竊為陛下懼不仁之尤於後代也伏願陛下擇忠言以廣其明察智謨以周於用一刑賞以信於令薄賦斂以息其勞慎禁奪以省其犯審獄訟以愛其生如此水火之陷不牽於瞽瞶之俗矣多濟之防充列于無患之朝矣若是又以為不理不康不惠不仁非臣所知也謹附聖條陳寫大略冒黷之罪臣何敢逃謹對某伏念傑木之生大長越倫足谷肩山而大谷不足以室其根長霓不足以帷其華天之所惜其體若此豈不使皆獲其所安而輳乎用及其不偶也徒見摧風枯霜蒙烟老雲而已夫尋常之材也幹不丈枝不尺而葉縱其根不能躪土之膚生不十年各獲斤斧之製以就用何者受乎庶氣故易長於極成為衆用故易售於工其在林居相扶策木意自得仰視傑木不見其末相與笑其牙枿而無用及一旦遭遇得升賢工之所思採而飾之跨二礎而百棟賴負若是修材巨幹非易自致也賢工良匠非易能容也今閣下抱多能之強德動與智諧可謂遭時也負難戴重橫於所安可謂得任也如能察出類之材異日處之然後次衆材備於百常如此則賢工之名可以自有古者賢士之居位也沐垢不終湯充饑不竟飯中輟而起畏日不足是皆探善於衆能思致其爵養良士之道也今則不然為公卿大臣者必嚴居深視以自養重其所進者惟柔氣緩言瞽視而巧諛然後謂之厚德故以多識為誣博知為狂遷善為流立節為詐是皆斥而莫得稱也及一旦操尺墨樞物機茫乎不知其所從使左右庸胥因得侮而役之彼非不欲自勝也蓋事業之所報固然今西戎邀嫁移兵寇邊仍歲不已山東盜卒殺辱守吏未聞其歸誠可嗟也即如主上求其往而為理者閣下度之公卿大臣而誰擇乎某誠不肖七歲再官不逾九品之列陶心研慮謨古臣智輔之所以為化至於樂慕賢哲亡其私而不回此則得之於性矣酌巖賢旅聖之所以立言至於書得失備理亂敘往紀來此則得之於文矣學名將霸帥之所以整暴亂至於奮旅陳師圜會百變之狀離如驚鳥合如凝雲此則得之於師矣是三者皆業於根然後緒其末非無所望也亦思願為一從材戴橫傑之梁立巨礎之上顧世持斧之士安足以摹哉某聞戎鏡包陽當日而矚之則能延燧興火處陰而視之何異一規之幽銅耶而誰寤者而誰寤者夫氣應則生某亦蒙矚於光下以發所抱書詞多鄙又不盡志忤觸清嚴罪無所逭謹再拜月日將仕郎守祕書省正字沈亞之再拜貢書諫議閣下某常有混類之悲不能自致其拙也甚矣故祥禽之類凡羽而凡羽混之神芝之類腐菌而腐菌混之嘉蕙之類棼芻而棼芻混之非獨混之而已亦且蒙其芳而奪其美何則善寡而凡多故也况世俗之目幾能於此而別白之者寒暑易轉是皆非金石安能自永於時哉一失其顧以為類混則終從風雨而老矣可不痛之輒假所喻願賜終說幸甚楚王之鼎食十有餘年而王體不肥左右皆懼王曰膳者不能味吾之鼎也國人亦曰膳者不能味王之鼎也更逐膳者凡十輩益不味王恥乃令國中曰有能使吾鼎之味調和以安吾體者寡人爵之三公楚里之處士賢聞之應令而起耆老屬袂而送之曰往矣即鼎也然王者即味於君君何以塞之對曰王必以鼎授我我力甚優夫治鼎之職約水燥薪爨火以觀文武之用而已其輳味則有椒桂梅醯鹽醢之品在吾總衆力而調於心此其功也王之體不肥何待楚老曰斯固也夫真僞雜鬻循戶而唱祈其售者僞十九焉是椒桂之質類而馨辛不為也梅醯之質類而苦酸不為也鹽醢之質類而鹺鹹不為也皆具而不為茲一旦集而會之鼎則必空虛矣君焉能總是之力以成於王也前膳之所以得逐者由庶品之任非其任歟然則君之明足以察僞惑君之智足以區物才誠能儲其真蓄其當以給其用則後之辛馨之才醯醢之具必越海逾陸而趨君之指矣斯百代之准也豈但肥楚王之體然今閣下既以游泳道德蓄儲助味之具必有素也然紛紛之真僞而清悟能無勞乎小子誠不足奉應對不得謁見久矣願因左右者召稍延於前獲進所語幸甚伏惟降察不臯謹再拜上人足下辱書指問將望於僕人謂有解達可以為梯進之級必慮過意幸聽畢說昔之有善煆者火五金而別器一日化百狀而智用不極然常薄産自窘弟子相率而笑之曰夫子之於業工矣然而市售之富不能當陶之饒何也對曰夫陶者淺勞而薄利與俗相用彼朝市而夕壞失其用復從而市之無虛日故能饒且吾之業搜矩而軸模及其成功與世終始彼匹居之人又安能罄其室而市吾之工哉故當饑亞之誤學為黃金煆且已困矣上人無乃襲饑於此哉非敢自重誠以陷其所從耳幸熟慮焉亞之頓首再拜後還坐賓舍中有小吏持吏書來其語曰帛十匹吏置帛書於亞之前曰閣下所以貺客也其敬之誠則厚矣然有所未滿者敢為閣下道之夫虬能興水濟物故佐天如臣草木仰其澤苗方秀而望其成有乏一日之雨而不及其實者則仰告斯臣以求之得一日足矣若才潤於枯槁則已且猶將困之今亞之往復道路三千餘里禺禺之誠於苗之旱甚矣而千鍾之祿於水之用又大焉亦何惜一日之澤而不給其涸哉亞之狂愚當其困涸不知所為乃復枯苗仰澤之說再敢煩告且閣下寧能不憐之亞之再拜昔者燕昭以千金市駿骨而百代稱之非直朽骨之可貴也意必在將來之良而已矣今亞之仰閣下之風而進於前恭聞閣下又不以朽鈍而顧之寧鄙人之宜顧也其名得無將來乎是鄙人之價冒千金也幸甚幸甚今有傍偟之誠敢露肝膽伏惟聽察之亞之前應貢在京師而長幼骨肉萍居於吳無咫尺地之居以自託其食給旦營其晝晝營其暮如是凡三黜禮部得黜輒歸自二月至十一月晨馳暮走使僕馬不以恙即且碌碌如有一日霜露得欺氣體失理則一室向門之心無望矣今忘辛勤之勞扶挈長幼丐食而西雖已及哺口然猶困其所儲不能自給但涕泣語空無有所仰又度天下王公希可以此言告者乃閣下耳伏惟分一日之澤以濡之無使亞之復為朽骨所笑謹再拜
