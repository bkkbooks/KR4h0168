front:
  text: 全唐文欽定全唐文卷六百三十呂溫六
  hash: sha256:ea0c0fbd61c2db23510d81c9a82541c0a05d060b7d34b90bcb9ed67928e8108f
body:
  text: 昔殷高宗恭默思道至誠動天天將報之以說為瑞王在於寢降神夢中審形旁求實得於此曾不待敷奏以言明試以功脫刑人之衣被公衮之服授受之際君不疑臣不慚大哉邈乎殷之所以興也若非武丁之心同乎天地傅說之德通乎神明何感動訢合如此其易厥後惟文王以兆用太公自漁父而登國師白旄一麾光定天下抑其鄰歟由茲而還莫不先顯後幽右資左德勒以漢秩束於周行使特達自致之士無聞焉吁可歎也夫以天驥之才而造父馭之則必翼輕軒淩高衢風翔電邁一日千里若制非其人服非其車志權奇務牽束挫盛氣頓逸足使遵乎循常之躅則終歲疾驅望駑駘而不及矣遇與不遇又何疑哉嗚呼見賢非難知之難知之非難用之難用之非難特達難君人者苟以特達為心假無殷宗之夢必自得說不然則雖使咎夔稷契盡入其庭亦葉公之見龍反疑懼矣况氤氳之中乎恍惚之際乎貞元九年予自鎬徂洛息駕於虞虢之間升墟瞰原髣髴其地遠跡雖昧清風若存想說命三篇幾墮秦火百代之後德音如何乃作銘曰赫赫湯德如日不滅滔滔商祚如海不竭發祥播氣世祚聖哲國誕武丁野生傅說說始胥靡武丁即祚德通神交忽夢如悟若帝導我期於顥素有無之間邂逅相遇宵衣而起爰得其人貌符心冥如舊君臣飛龍在天山川出雲感激自致其間無因捨築傅巖脫鱗鵬升作霖時和奮檝川澄金在吾礪木從吾繩君何言哉殷道中興元凱攀堯微舜曷階阿衡要湯抱鼎徘徊會合之際厥惟難哉何如夢中天授神開惟賢是登道貴特達匪次勿用才其壅遏高宗得說乃在恍惚揭銘摛光萬古不沒望思臺者漢武帝思戾太子之所建也事具漢書夫立人之道本乎情性生而知曰性感而動曰情性雖生情情或滅性是以聖人患其然而為之節誠而明之中而庸之建以大倫統以至順倫莫極於父子順莫先於慈孝然而全之者正也慈不得其正則失子孝不得其正則失親救失之術存乎善教昔者三王之教世子也如周公乃為太傅如召公乃為太保如太公乃為太師左右前後罔非端士禮以專其目樂以一其耳仁以制其氣義以凝其情故非僻之心無自入也讒慝之口莫能間也父子君臣之道所以全也漢則不然世子非三代之賢保傅無二南之老左右前後惟刑餘罪人目流於靡慢耳溺於惉滯氣溢於寵渥情蕩於驕奢於是非僻之心得以入矣讒慝之口得以間矣父子君臣之道所以離矣向使太子師友尊嚴左右端肅雖江充之詐豈敢以不義而加之耶向使太子孝德彰聞仁聲茂著雖武帝之惑豈遽以大逆而疑之耶向使太子早服師訓少知教義豈忍一朝之忿棄其親而忘其身耶由是言之其所以陷於此者漸矣殆哉當時之勢也國亡冡嗣武老昭弱京師喋血天下疑動若無霍光受負圖之寄秉不奪之節斥昏建明鎮翊鴻業則必庶孼尋戈起商參之禍姦臣乘釁行羿浞之事漢家之祀豈及三七哉此有社稷者之所宜深戒也乙亥歲予經於湖登茲荒臺望古太息以為遇夫一物有可以垂訓於世者秉筆之士未嘗闕焉乃作銘曰人倫大統天性是寶雖曰自然亦資斧藻漢皇父子一失其道四海為家不能相保荒臺巋而千古之悲悔目空斷冤魂不歸疑生於微禍積於基苟有明義誰其間之嗣維邦本本動邦危於呼後王鑒茲在茲芒芒大野萬邦錯峙惟正守國設險於此呀谷成塹崇巔若纍勢軼赤霄氣吞千里洪河在下太室傍倚岡盤嶺蹙虎伏龍起鎖天中區控地四鄙出必由戶入皆同軌拒昏納明閉亂開理昔在秦亡雷雨晦冥劉項分險扼喉而爭漢飛鎬京羽斬東城德有厚薄此山無情維唐初興時未大同王於東征烈火順風乘高建瓴擒建係充奄有天下斯焉定功二百年間大朴既還周道如砥成臯不關順至則平逆來惟難敢跡成敗勒銘山孱頑魯昭公三十二年周萇宏合諸侯之大夫城成周晉女叔寬曰天之所壞不可支也萇宏違天必受其咎異歲周人殺萇宏左氏明徵以為世規俾持顛之臣沮其勝氣非所以勵尊王垂大順也予經其地而作是銘文武受命肇興西土周公作洛始會風雨居中正本拓統開祚盛則駿奔衰則夾輔平王東遷九鼎巳輕二伯之後時無義聲大夫萇宏言抗其傾坐召諸侯廓崇王城雖微遠猷實被令名宜福而禍何傷於明立臣之本委質定分為仁不卜臨義不問無天無神惟道是信國危必扶國滅必振求而不獲乃以死徇興亡理亂在德非運罪之違天不可以訓升墟覽古慨焉遐憤勒銘頹隅以勸大順夏后氏遏洪水驅龍蛇能禦大菑以活黔首周文王城朔方逐玁狁能捍大患以安中區若非高岸峻防重門擊柝雖有盛德曷觀成功然則持璿璣而弛張萬象昊穹之妙用扼勝勢以擒縱八極王者之宏圖道雖無外權則有備變化消息存乎其人三受降城皇唐之勝勢者也昔秦不量力北築長城右扼臨洮左馳碣石生人盡去不足乘障兩漢之後頹為荒邱退居河滸歷代莫進矯亡秦之弊則可矣盡中國之利則未然唐興因循未暇經啟有拂雲祠者在河之北地形雄坦控扼樞會虜伏其下以窺域中禱神觀兵然後入寇甲不及擐突如其來鯨一躍而吞舟虎數步而擇肉塞草落而邊甿懼河冰堅而羽檄走爰自受命至於中興國無寧歲景龍二年默啜強暴瀆鄰構怨掃境西伐漢南空虛朔方大總管韓國公張仁愿躡機而謀請築三城奪據其地跨大河以北嚮制胡馬之南牧中宗詔許橫議不撓於是留及瓜之戌斬姦命之卒六旬雷動三城嶽立以拂雲祠為中城東西相去各四百里過朝那而北闢斥堠迭望幾二千所損費億計減兵萬人分形以據同力而守東極於海西窮於天納陰山於寸眸拳大漠於一掌驚塵飛而烽火燿孤雁起而刁斗鳴涉河而南門用晏閑韓公猶以為未也方將建大旆提金鼓馳神竹卞鞠虎旅看旄頭明滅與太白進退小則貢琛賮受厥角定保塞一隅之安大則倒狼居竭瀚海空苦塞萬里之野大略方運元勳不集天其未使我唐無北顧之憂乎厥後賢愚迭任工拙異勢剛者黷武柔者敗律城隳險固寇得淩軼或驅馬飲河而去或控絃劘壘而旋吾知韓公不暝目於地下矣今天子誕敷文教茂育㣥生戢兵和親北狄右衽然而軍志有受降如敵大易有安不忘危崇墉言言其可弛柝亦宜鎮以元老授之廟勝俾述舊職而恢遺功外勤撫綏內謹經略使其來不敢仰視去不敢反顧永讋猛氣無生禍心聳威馴恩禽息荒外安固萬代術何加焉敢勒銘城隅庶儆復隍而光烈不昧銘曰韓侯受命志在朔易北方之強制以全策亘漢橫塞揭茲雄壁如三鬬龍躍出大澤並分襟帶各閉風雷俯視陰山仰看昭回一夫登陴萬里洞開日晏秋盡纖塵不來時維韓侯方運神妙觀釁則動乃誅乃弔廓乎窮荒盡日所照天乎未贊不策清廟我聖耀德罷扄北門優而柔之用息元元曷若完守推亡固存於襄於夷永裕後昆呂和叔曰祭先之禮自天子至於庶人節文名物差等雖繁然以禮事親其義則一寢廟雖不崇而修除不可不嚴牲物雖不腆而享饎不可不親器皿雖不備而濯溉不可不潔禮雖不得為而誠意不可不盡故齋宿薦徹致愛與恭豈可徇流俗燕褻之常同鄙陋不經之事然雖未能方古亦當略舉春秋之薦旬日具修三日齋戒務在躬親誠潔而已近世祭多及旁親雖近愛而無義禮惟殤與無後始祭於宗子家自餘祭皆為祭非其鬼蓋致隆祖者不得不然士大夫止當祭五祀耳山川百神皆國家所行不可得而祀近世流俗妄行祭禱黷慢莫甚豈有受福之理哉水旱之災止可相率祈禱里社至誠齋潔奠以酒脯可也若妄行望祀合聚㣥小喧呼鼓樂非士君子所宜為原夫法起於無色生於妄求離於色者未得皆空徇念於無者斯為有著也是以至人心無所念念無所求利未動而誰安本不然而何滅然而利根難植頓詣罕聞不有舟梁孰宏濟度匪因陛級莫踐堂塗必在極力以持其善心惠念以奪其浮想不以身率誰為教先誰能宏之則南嶽大師其人也師諱承遠漢州帛丿糸竹縣謝氏之子積修妙性宿起冥因乘報現身應期宏道自天鍾美因地稟靈七尺全軀峨岷與瞻敬之狀九漏懸解江漢資清淨之源殊相夙成隱照潛發甫志學始遊鄉校驚禮樂之陷阱覺詩書之桎梏忽忽不樂未知所逃俄有信士以尊勝真言質疑於學怡然聳聽宛若前聞識契心冥神動意往遂涕訣慈顧行徇幽緣初事蜀郡唐禪師禪師學於資州詵公詵公得於東山宏忍堅林不盡祕鍵相傳師乃委質僮役服勤星歲旁窺奧旨密悟真乘既壯遊方沿峽東下開元二十三年至荊州玉泉寺謁蘭若真和尚荊蠻所奉龍象斯存歷劫方契其幽求一言懸會於靈受愛從剃毀始備緇錫昂然古貌森映高松真公南指衡山俾分法派越洞庭浮湘沅息於天柱之陽從通相先師受聲聞具戒三乘之經教四分之紀律八正之倫要六度之根源莫不更贊神機遞歸心術聞京師有慈敏三藏出在廣州乃不遠重阻星言覩謁學如不足求所未盡一通心照兩捨言筌敏公曰如來付受吾徒用宏拯救超然獨善豈曰能仁俾依無量受經而修念佛三昧樹功德劫以濟㣥生由是頓息諸緣專歸一念天寶初歲還於舊山山之西南別立精舍號彌陀臺焉薙草編茅僅蔽經像居靡童侍室無斗儲一食不遇則茹草而過敝衲莫完而歲寒自若奉持贊嘆苦劇精至恒於真際靜見大身花座踊於意田寶月懸於眼界永泰中有高僧法照者越自東吳求於廬阜尊遠公教跡結西方道場入觀積旬至想傍達見彌陀座下有老比邱焉啟問何人答曰南嶽承遠願告吾土勝緣既結真影來現照公退而驚慕徑涉衡峰一披雲外之塵宛契定中之見因緣昭晰悲喜流涕遂執摳衣之敬願承入室之顧大師德因感著道以證光遠近聆風歸依載路於是大建法宇以從人欲輪奐雲起丹刻化成走檀信於十方盡莊嚴於五會香花交散鐘梵相宣火宅之煙焰皆虛慾海之波瀾自定加以寶裝祕偈建幢於臺前玉篆真文揭碑於路左施隨求之印以廣銷業累造輪轉之藏以大備教典勸念則編牓於崖谷勵學則兼述於縑緗其欲人如身慈惠懇至皆此類也大師峰栖木下六十餘年苦節真修老而彌篤夙開戶牖久啟津途法界之尊重在焉天人之瞻仰如是常陋處方丈志行平等食不重味寒不兼衣王公之珍服盈廂甿庶之金錢布地莫不迴修佛事贍養孤老凡言施者以是報之期頤將及志力無替早鐘會食到必先眾夕磬虔念居恒達晨其克巳練心慎終如始皆此類也大歷末門人法照辭謁五臺北轅有聲承詔入覲壇場內殿領袖京邑託法雲之遠蔭自感初因分慧日之餘光寧忘本照奏陳師德乞降皇恩由是道場有般若之號貞元歲某獲分朝寄廉問湘中近照德輝獲探眾妙况靈嶽直午先皇本命宜有上士斯焉護持表求興崇詔允誠願臺雖舊號其命維新寺由是有彌陀之額度生二七會供千人中貴巡香守臣視饌瑤圖花捧寶字煙開寵降九天暉映三界師亦建不壞之塔以壽君親修無邊之功以福邦國梵王之能事畢矣法門之榮觀備矣貞元十八年孟秋既朢顧命弟子申明教戒掃室趺座恬然化滅報齡九十有一僧臘六十有五先是忽告門人曰國土空曠各宜勉力數月而災火梵寺周歲而吾師解形此蓋寶去山枯龍移水涸空曠之旨乃明前知法眾崩慟若壞梁木邦人號赴如失舟航以其年九月七日還神於寺之南岡即安靈塔教也前後受法弟子百有餘人而全得戒珠密傳心印者蓋亦無幾比邱惠詮知明道偵超然等皆奧室之秀者以瞻奉將遠經行坐蕪永懷於極見託碑紀移有道於物外真無愧詞比遺愛於人間誠當墮淚銘曰浩浩清塵茫茫逝川大雄作矣救物為先能明大教非師有緣不宰功立忘機智全誰其宏之南嶽命代習識虛受應身圓對理則歸空教惟不昧末搖本靜行苦神泰雲跡一滅天星六周熱惱就濯童蒙來求攝以尊念驅之力修我法有戶誰能不由甘露晨稀香雲夕卷彼岸方濟慈舟忽遠鑪煙如在塔樹勿翦刊勒豐碑永想正眼山之大者匿峰巒含氣象積高無倪而不見其險孕粹有物如不知其神此其所以為大也德之全者毀圭方黜皎厲靈機密運而智不驚愚遐標特立而迹無變俗此其所以為全也然則泰山高而可陟全德近而難知我求其倫見之於少保公矣公諱某字某京兆杜陵人其先帝堯光宅讓德儲慶建國命氏列於夏商相冑卿族繁於漢魏代濟不殞煥焉盛門大王父諱某皇朝主客郎中萊濟商三州刺史王父諱某倉部郎中太原少尹贈祕書監烈考諱某檢校都官郎中嶺南節度行軍司馬贈同州刺史或以瑚璉之器纔施郡政或以巖廊之姿僅及戎佐與時俱息從道而汙屈不試於當年啟莫京於身後公生而岐嶷弱而老成渾粹不散清明虛映朱絃遺音而宮商自韻大圭不琢而符彩溢發邈矣天爵爛乎人文鼓鐘之聲日遠鄉曲之譽來逼釋褐太子正字與仲弟正卿以賢良偕徵策入異等冥鴻雙舉當代榮之授高陵主簿遷監察御史改殿中內供奉東都留守判官即拜東臺殿中侍御史參畫惟允持繩不回河洛之間風聲尚在德宗躬決庶政本於尚書責成曹郎綜練材實薦出方伯時超貳卿二十年間斯為極選公由是前後遷刑部吏部員外郎吏部郎中奏議推美彌綸成績南宮之故事存焉於時戡復日近勳勤者眾都市惰游盡垂金組邦畿豪奪半賜丹書輕禽逸於疎網悍馬駭於柔轡上思懲抑必假良能公由是前後歷奉天長安二縣令仁護鰥惸智鈐豪右輿人之道詠在焉望由實濟任以望重選曹未幾遷給事中既居駮正之司不撓當官之論屬東南歲歉俾乂惟難出為常州刺史天寶之後中原釋耒輦越而衣漕吳而食一隅重困五紀於茲公臨之清貞結以忠恕固存惠寡務嗇勤分一法以去其侵漁多方以備其災患以逸道而使繕完允濟以與道而取賦入先期聲聞天朝考績連最轉蘇州刺史二境之間百里而近靈源自出殊派共清膏澤所霑異壤同潤下車期月報政如初加秩賜金借留累歲無何彭沛喪師兵驕地偪安危所繫朝論難之乃以公檢校祕書監兼御史中丞賜紫金魚袋充徐泗節度行軍司馬重其威望將委旄鉞而未命程伯徐方之軌既同不見賈生宣室之徵遽至擢吏部侍郎倫品甄明通簡節適勢有探湯之熱我以靜濯眾有鼓簧之喧我以心聽馴致其美闇然日彰不求無失職之人人自以為不失職矣輟拜京兆尹德刑交修寬猛相濟匪設鉤距物無遁情匪曜鋒鋩機無滯斷浩穰之理不肅而成不求無不欺之吏吏自以為不能欺矣俄改太子賓客辤劇就閒圖南之勢一息選德求舊居東之命惟重遷檢校工部尚書兼御史大夫充東都留守東都畿汝州都防禦使自盜起幽陵兵屯諸夏涉淮而北軍國異容分陝以東古今殊寄公講信修睦外張保釐之政完備訓戎內寓折衝之令矛㦸不露德耀藹然遐邇頓首以承風強暴革心而知懼今上嗣統就加檢校吏部尚書方入諧僉屬毗贊大化不幸嬰疾表求退頤優詔除太子少保冀其休復將有後命神祇竟昧藥禱無真以元和元年三月十二日薨於東都履信里之私第享年六十有四寵贈尚書左僕射輤車西歸制使賻弔太常裦議諡曰某公哀榮備矣夫人河東裴氏侍中耀卿之孫給事中臯之女德門鍾美淑問充塞蕣華早落蓍兆叶期即以是年五月二十一日合葬於萬年縣高平鄉少陵原禮也公孝悌天至行有餘力仁義性德匪俟服膺不飾表以近明每縱心如中矩清虛簡淡而應物不倦通曠夷易而及門無雜不尚意氣而然諾篤志不好臧否而鑒識超倫與故相國齊江西映穆宣州贊贊弟侍御史員為文章道義之友可以視其所親矣今吏部郎中扶風竇㣥抗迹毗陵退身進道公三揖郡榻之上一振天墀之下不數歲間蔚為重器可以視其所與矣分正東郊開府辟土則有今右司郎中燉煌叚平仲倉部員外郎安定皇甫鎛禮部員外郎清河張賈洎京兆尹韋詞隴西李景儉中山衞中行平陽路隨皆㣥彥之秀出一時之高選可以觀其所任矣加以志尚幽遠冥搜好古所居第必有松石之致退公暇日常以圖籍自娛一字愜心金玉不顧片言同趣布褐無間亹亹然若見道之所存陶陶然不知歲之云晏於戲策名從事四十餘年朋友罕聞得喪之言家人莫見喜慍之色坦懷以處推分而行無怨於人人亦無怨無猜於物物亦無猜履信順以優游保福祿而終始其名教之大雅者歟有九子長曰元貿前常州義興縣尉次曰穀前邠州司倉次曰璋鄉貢進士能修詞立誠克家致美茂揚風訓休有令聞其次某某皆殊資異識登於童齡慶善之餘也以某獲窺墻仞見託篆述究賢人之業信而無愧申孝子之志直而不文其詞曰利建於商介圭作寶爰立於漢緇衣改造克昌厥允奕世載考亞尹擅名郎中懷道莫躋貴仕莫享難老蘊靈儲休以啟少保丕顯少保其德愔愔有綽遐姿曠哉靈襟顯仁山立藏用淵沈煦如冬陽藹若春陰白圭三復克保明心黃鐘九變莫匪和音靜專動直謙進柔克宜踐公輔以楨王國促路頓軌中天墮翼少陵右原拱樹寒色窮壤可敝唯名不失金石垂之以慰罔極武有七德以先九伐聖王所以經邦也戰有六器以先五兵賢侯所以述職也然德威並運仁勇相宣功業見乎禮義之門將帥出乎詩書之府若有覽古成敗與時行藏道惟忠貞權利變化兵機生於盡性師律本乎修身飾怒之鈇鉞有歸當仁之壃場不讓考諸名實何代無人公諱澭字某其先帝堯之允事夏后者曰累隨會之子處咸陽者為劉秦滅六雄遷於豐沛漢有四海別封河朔公即孝景帝子中山靖王勝之後也遭晉喪亂流寓幽平舊燕趙之朝不絕如綫十一代祖後魏尚書左僕射燕郡公靈助始有大功建茲元社遂為范陽人焉厥後逶迤世有潛德詳在家牒略而不書曾祖特進檢校司衞卿臨洮軍使贈宋州刺史諱宏遠恢持重之姿撫寧洮罕王父特進檢校右金吾衞大將軍太常大斗軍使贈揚州大都督諱貢厲摧堅之氣震疊互羌烈考開府儀同三司幽州大都督府長史帶正省兵吏刑戶四尚書左右僕射平章事兼御史大夫幽州盧龍軍節度使累贈太師太保諱怦以正有功以寬得眾書伐盟府擁旄本邦於戲以二特進之志略用而不貴以太保之忠勳貴而不壽水積而深縱壑之鱗躍風積而厲垂天之翼奮慶靈久鬱必有勃興公即先太保之次子今侍中之介弟伯也嗣職幽都仲也揚威隴坻虎旂龍節交萃於一門開國承家並登於九陟倬絕天下輝動人倫勃焉之興斯可信矣公長源濬發自天鍾美直尾箕之下別稟精英生峘崵之間得其全氣顯仁藏智勤孝樸忠大略小心寡言敏行虎抱崖屈莫能象其深沈鶚聲青冥未足擬其超遠幼挺奇節長有雄姿森武庫之鋒鋩錯文昌之光色悅禮之別惇詩之和觀易象之元得春秋之正申商之法摭實而除苛孫吳之書取權而去詐行有餘力則遣詞比興多中於雅音材之旁通則騎射劒擊皆窮其妙用真所謂多能博識允武允文者也公弱冠之歲朱滔敗歸幽陵狼顧未定先太保時為行軍司馬用公之策與滔定計戢兵徹警洗舋歸誠致父於曲突之動拯人於墜塗之難由是山東侯伯始聞其名是歲孟秋滔卒於鎮幽人懷德推奉太保方執謙志未允誠求公以為幽燕本負氣之鄉豪傑陷失節之地自新無路從亂如歸安危生於俯仰逆順決於指顧權必有濟不可以假人貴不為榮豈嫌於在巳趨庭諍諭決策指麾正頹波於眾心迴白日於王命重氛載廓闔境昭蘇由是漢庭公卿始重其節太保既嬰危疾侍中時鎮莫州公總兵中權嘗藥內寢弛張在手上下宅心而見利不回臨事能斷推至公於門內度德惟鈞申大義於軍中以長則順於是陟崗長望飛馹潛迎勸輟哭於創巨之晨託理命於綱紀之僕軍府立定家國乂安然後退就喪廬而泣柴毀三軍感歎四鄰聳慕子之道弟之道備矣孝之難友之難至矣既而侍中泣曰金華無避吾豈獲巳手足相衞爾何自安遂奏起公為涿州刺史未幾轉領瀛州東負滄海南馳諸夏地饒俗雜久號難理公乃簡其約束峻其隄防均其有無一其勞逸心聽而方斷身踐而後言令下於流水之源化行於偃草之勢盜奔他境人復先疇亦既富庶聿觀禮讓日用吾道於何不臧其年兼御史中丞充本道節度瀛州兵馬留後又兼御史大夫行軍司馬丁越國夫人憂至性繼酷終天窮感杖而後起殆不勝喪軍士泣留王人逼諭起復舊職敬恭新命孝在方寸能盡其哀政有典刑不愆於素服闋加銀青光祿大夫餘如故公高視前代志齊古人疾沒世不稱之徒慕其次立功之義見去病無用家為卷常三復聞耿弇不以賊遺坐惜分陰必欲懸旌黑山飲馬西海氣定百勝身先七擒討冒頓之慢書復犬戎之侵地有懷未果若恥在躬爰因大閱乃告於眾曰吾剖符別統行已十年訓齊之士不下一方而靡衣鮮食銷銳刓鋒徒籍父兄之資莫申絲髮之效永言及此何以為容且東胡之強吾兄既雄其式遏西醜之類鄙志必期於殄殲一家勤王萬里同力遊於地下無負先公誰居誰行吾計決矣於是七營四校一呼三躍童兒奮臂女子褰裳奏章朝下牙旗夕出彀騎八百組甲五千次舍案部周旋成列雲鳥遞引龍虵相追夜度關而不囂晨涉川而如貫加以羸糧自給假道無煩歷百城而饋餼皆辤居一夕而牆宇必葺憩林適去墜果猶存徑由疾趨滯穗不犯軍容之整故老莫傳自燕抵秦扶路瞻歎初公躬率將士以先啟途夫人撫其妻孥別次繼進爰自建旆迄於解鞍行不接塵上不通問元帥去裘葢之逸小君罷膏沐之容在樵蘇而必親歷寒暑而無替雖古名將未之能行德宗備禮勞迎虛襟相待一見升殿目送傑人之姿三接論邊心許成君之事即日拜秦州刺史兼御史大夫充隴西經略軍使割扶風之普潤縣以處之倚為長城鎮我近輔羽儀鼓吹等西夏之雄藩屝屨資糧同北軍之寵士而猶未賜齊履不拜漢壇抑為偏師所以觀自致之效假領僑郡所以激必取之心先皇將將厥有深旨公由是感悟神動精誠涕流荷知臣之明思求已之報砥礪壯節激昂雄圖而地狹一同眾纔十旅偪介塞垣之下崎嶇山谷之間因深為隍即險增壘翦蓬伐木以立營署鑿石墾草以開屯田俸祿不入於私家子弟必從於公役縑緗之尋尺咸在軍裝金鐵之錙銖盡歸兵器無歌僮舞女之玩而講訓為娛絕良鷹異犬之求而驍果是務加以推誠待下愛士如身視疾臨喪輿厮必至字孤養老骨肉何先遂令千夫一心積感思奮各捐軀而唯恐後死未見敵而爭為前登公曰眾知吾深其可用也於是馳使闕下請牧隍中出自凶門入於死地袵席過兵之處咽喉制敵之衝威懷啟閉之方耕戰疾徐之節莫不封章定計裂素成圖德宗覽之廢食興歎屬戎渠悔禍朝議許盟至誠達而允孚全策知而未用失機緩寇雖負於雄心違命有功且非其雅志爾乃慎固封守掩抑歲時獮狩蒐苗以寓軍政拔拒投石以攄士憤櫪馬待騁夜風起而長鳴匣劍有靈秋氣來而自動感物興慨可勝言哉然而十五年間烽燧無警數千里內兵防倚重志雖不獲賴則有餘篆跡圖形我無愧色况又敦尚儒學慕親賢才其妻子食淡而賓膳豐珍居室安卑而後館華峻風聲所及日月繼至觀夫危冠大帶雜於介冑之間春詠夏弦不改膠庠之樂光名四達固有由焉貞元二十一年順宗嗣統中外增級就加檢校工部尚書崇陵晏駕之初太上傳歸之際公嚴兵近服警衞公室擒摘姦黨黜遏邪謀人心不搖國隟遂閉流公妙簡祕莫得聞帝嘉厥誠手製裦諭珍裘寶帶文馬雕弓以將殊恩不可勝竹卞明年秩進武部封啟彭城建保義之雄名益良原之重眾知始賜節鉞許之專征爰承寵靈得以入覲鑾聲戾止庭燎有輝縟禮繁錫率加恒數然後詣便殿奉溫顏訴先朝未展之謀陳西疆必復之志膝馬虛納指期決行旋鎮歲餘不幸遘疾猶能籍士馬封府庫表請新帥輦歸京師天惠寇讎奪我忠武以元和二年十二月日薨於岐山縣之行次享年四十有九皇上震悼廢朝徹樂未伺子明之疾遽迎任虜之喪愍冊極詞法賻優等贈尚書右僕射諡曰景公以三年十月日列簫鼓虛儀賜溫明祕器卜兆十里會車千乘葬我景公於萬年縣之少陵原備哀榮也夫人河東柳氏某官某之孫某官某之女清門華冑媚德馨行輔佐君子蔚為時禎撫訓諸孤繼立家道二南所美無以尚之有子五人長曰銳朝議太子洗馬周旋經訓斧藻身文確有端操雅多奇略有識之士知其大成次曰師貞前右武衞倉曹參軍次曰師禮前商州司倉參軍次曰稅前欽王府參軍次曰兌門子出身桂殊姿而共芳珪璋異質而同潤百祥之慶其在茲乎洗馬等相與謀曰夫步星氣者無出於馮相之官考鐘律者必求於伶倫之族我先人之業非志士不知以某早纂功名常窺閫奧辨用心之所至識行事之會歸俾垂斯文以示來哲銘曰至精氤氳為勇為仁將昭文德有此武臣猛而不殘靈而能馴情厲秋霜氣含陽春源由堯興派自漢啟承光祖考致美兄弟通刑練政達樂知禮行歸有方用入無體中襟湯湯應變弛張開則雷電閉為金湯能求敵情善用已長威不可犯惠不可忘靜言未賓忠憤慷愷翻翻燕海固護秦塞車無停軌衣不解帶勤王萬人瞻我大旆左汧右涇克壯其聲目盡西極塵沙不驚行人如歸戰士且耕隴首烽斷原川草生方提金鼓振國威武建銘赤山恢復舊宇促運僭奪奇功莫覩歿而不瞑足感明主詔葬九原寵昭幽魂介士班劍送於都門草陳霜來樹拱煙昏萬物有盡唯石獨存
