front:
  text: 全唐文欽定全唐文卷二百二十六張說六
  hash: sha256:8c52fc2f249450f318be0d156b98a2f942b5a276019c72bb841cf0c34400f5af
body:
  text: 兵部尚書同中書門下三品修文館大學士韋公體含真靜思協幽曠雖翊亮廊廟而緬懷林藪東山之曲有別業焉嵐氣入野榛煙出俗石潭竹岸松齋藥畹虹泉電射雲木虛吟恍惚疑夢閒關忘術茲所謂邱壑夔龍衣冠巢許幸溫泉之歲也皇上聞而賞之廼命掌舍設帟金吾劃次太官載酒奉常抱樂停輿輦於青靄佇翬褕於紫氛百神朝於谷中千官飲乎池上緹騎環山朱旆焰野縱觀空巷途歌傳壑是日即席拜公逍遙公名其居曰清虛原幽棲谷景移樂極天子賦詩王后帝女宮嬪邦媛歌焉和焉以寵德也加以中宮敦序謂我諸兄引內子於重幄見兒童於行殿家人之禮優棠棣之詩作於是實其筐筥下以昭忠信之獻賁其束帛上以示慈惠之恩朝野歡并君臣義洽夫飛翠華歷茨嶺至道之主也紆紫綬期赤松素履之輔也千載一時難乎此遇故兩曜合舍衆星聚德雅道光華高風允塞寒谷煦景窮崖潤色猗歟盛事振古未有篆之元石貽代厥後易曰利涉大川濟乎難也詩曰造舟為梁通乎險也域中有四瀆黃河是其長河上有三橋蒲津是其一隔秦稱塞臨晉名關關西之要衝河東之輻湊必由是也其舊制橫絙百丈連艦十艘辮修笮以維之繫圍木以距之亦云固矣然每冬冰未合春沍初解流澌崢嶸塞川而下如礎如臼如堆如阜或摐或掍或磨或切綆斷航破無歲不有雖殘渭南之竹仆隴坻之松敗輒更之罄不供費津吏成罪縣徒告勞以為常矣開元十有二載一作九年十二月皇帝聞之曰嘻我其慮哉乃思索其極敷祐於下通其變使人不倦相其宜授彼有司俾鐵代竹取堅易脆圖其始而可久紓其終而就逸受無疆惟休亦無疆惟恤於是大匠蕆事百工獻藝賦晉國之一鼓法周官之六齊飛廉煽炭祝融理爐是煉是烹亦錯亦鍛結而為連鎖鎔而為伏牛偶立於兩岸襟束於中潬鎖以持航牛以縶纜亦將厭水物奠浮梁又疏其舟閒畫其鷁首必使奔澌不突積凌不溢新法既成永代作則原夫天意有四旨焉濟人仁也利物義也順事禮也圖遠智也仁以平心義以和氣禮以成政智以節財心平則應諧百神矣氣和則感生萬物矣政成則乂文之經矣財節則豐武之德矣故天將儲其禎地將阜其用人將盈其力聖皇之道乾乾翼翼觀藝而無窮詠功而無極一面昭仁三驅示武走則發射伏則不取寒兔滅沒疾鷹逞巧鳴鏑洞飛失雋亡狡狡兔雋犬力奔勢迫持圓駷飛捨拔先獲獸殪山豪鳥落雲雋貫三謺兩血不瀐刃夜鳴之鳥是謂獯狐除人之惡應箭而鋪趯趯牙麞寒草同色隔馬百步一縱而側天子省斂薄狩岐陽躬射五十以奉蒸嘗我將獻鮮從禽於野一日百中以威天下霜兔斗迴雲龍矯過天旋月滿舍矢如破有芃者狐起帝之右分騣遠發應踣於手驚鳶上飛鷙隼橫撲矯箭爭中紛然旋落雙鹿並出一箭橫連上思陵寢以獻時鮮帝入靈囿數百麀鹿射其四十頒諸㣥牧猗歟杜侯發揮孔聖春秋既立王道以正列國行事君子莫之他人有心予忖度之推凡見例定罪原詞開我後學從祀先師廓哉中山靈宇朗徹逸韻豪爽達音妙絕孝盡思成忠全見節優游宮侶蕭條禪悅白髮傳貌青松拂雪要之歲寒是望邦傑詩云哀哀父母生我劬勞欲報之德昊天罔極是傷不可止之戀而懷無所及之感其有飾聖以資親修法以展慕豈非孝子持明之心哉武擔山靜亂寺盧舍冄丈六鐵像者沙門履徹為先妣用無價黃金之裝也徹師俗姓劉氏青城真人知古之弟道門釋種守律護戒了如來廣大之心達如來加持之力見虛空界劃縵茶壇知定慧手結金剛印過去不悟因後行而追福當來未聞指前緣而證道覩佛相者成一切智承佛光者壞無始業張說聞其事而懌之乃合掌西南遙禮偈曰大雄盧舍冄妙法甚深祕神變加持力普昇不動位孝乎彼沙門愛母而錫類法財裝妙色空色不相異慧日破金山慈光觸寶地善來金剛手一一見佛事法池西三歸院二法堂茲寺長老初上禪師所造也禪師俗姓彭名知至性篤孝執親之喪七日不食微言密行志道探元究易老莊太一之旨善正書擅鍾王品格其精至點畫一作點畫婉秀毫縷必見如折槁荷磨文石筋理灑颯固非人力之所致也中朝名士山藪高尚法流開勝遠近慕焉及晚年專意於禪誦平生藝業脫若遺塵矣嘗歎曰帝王父母許我出家雨露生成恩惟一揆依如來教創是功德萬一乎獻福二宮潛祐七祖將與一切咸登道場於是三歸堂以長安元年辛丑子月望日癸未立善法堂以開元元年癸丑丑月望日戊辰建禪師母弟仁琬弟子沙門啟疑及沙彌令哲左右斯業實有力焉而作贊曰敬告諸佛子一心清淨觀欲求正真道當從信根入是佛虛空相是法微妙光定慧不相離是僧和合義人空法亦空二空亦復空住心三空寶是名三歸處至哉初上人建立善法堂彩翠三世佛莊嚴清淨眼能運無礙心普入於一切見若不染色知若不取識是名真實見亦名解脫知佛觀離生滅諸法等如是蜀山劉尊師上清品人也兄學儒弟奉佛廼畫三聖同在此堂煥乎有意哉達觀之一致也張說聞其風而樂之作天尊贊正氣生神結虛為實上清尊帝中黃首出華彩衣裳虛無宮室紫氣乘斗赤爐鍛日十天從化萬靈受律蓮花釋門麟角儒術法共不二心同得一道心惟微守而勿失官有決曹掌茲法獄匪惟議罪亦以防欲所貴仁恕非矜窘束吏苟吹毛人安措足古之為主是戒是勗茫茫率土蠢蠢㣥生賢愚中雜真偽相傾若魚之駭如鳥之驚不能無犯宜持以平或大或小時重時輕無以快志期乎得情孰曰非重國之政令孰曰非輕人之性命虐則招咎寬則納慶宜慎宜恤可畏可敬為獄則固為牢則幽晨嚴管鑰夜密更籌寂寂圜土纍纍繫囚求食搖尾見吏垂頭自昔立名此為非所逼隘狹室敧傾漏宇冬有祁寒夏多隆暑焉可失入焉可妄處勿謂無妨勿謂無傷匹婦含怨三年亢陽匹夫結憤六月飛霜可以安危可以興亡敢告司憲無輕國章東山少連曰元冥氏之子曰壬夫妻祝融氏之女曰丁俱學水仙是謂溫泉之神焉帝命之救萬靈盪滯結腑臟達膚腠泄下人多賴之上帝是崇忤飛廉氏之佚女嫉之常欲大慁其功故入溫泉必齊肅洗心戒以防患恕以利物含生之疾我願除祓二神嘉之吹湯激邪珠連漚累潏汨揚華此其効也若入溫泉僻心穢行惡言淫形居食失節動出躁輕二神醜之不匡人命飛廉佚女以裾人是生疰芒風瘍眩齵之病夫有意之醫照合神理無恒之醫身為慾使莫之益傷之者至矣是以君子慎其微也杳杳深谷森森喬木天與之才或鮮其祿君服六藝道德為尊君居百里風化之源才勿驕恡政勿苛煩明神是福而小人無冤畏其不畏存其不存作誥茲酒成敗之根勒銘其口禍福之門雖有韶夏勿棄擊轅豈無車馬敢贈一言玉梁架迥碧沼涵空石鞭海上鎖鍛河中橫漢飛鵲規天拖虹仙聖來往風雲路通安萬國禮百神放鄭聲遠佞人筆硯之閒聖心必察青蠅導赦震言漏洩筆鋒曉凍墨池夜結香炭潛然推寒致熱國子祭酒韋公好遊山水器珍雅素因適湯泉見楩梓枌榆良材滿谷乃命山工作為盤盂盎甖樽觶呈其文理素而不飾還都分遺好事者說受賴盤盂二事以銘之云爾幽山之木無心世路器為盤盂制以法度匪丹匪漆惟真惟素理直防毀節全思固多用必傷處盈招惡嗟嗟君子鑒微在悟實是天然貽我朋故錢味甘大熱有毒偏能駐顏彩澤流潤善療飢寒困戹之患立驗能利邦國汙賢達畏清廉貪婪者服之以均平為良如不均平則冷熱相激令人霍亂其藥采無時采至非理則傷神此既流行能役神靈通鬼氣如積而不散則有水火盜賊之災生如散而不積則有飢寒困戹之患至一積一散謂之道不以為珍謂之德取與合宜謂之義使無非分謂之禮博施濟衆謂之仁出不失期謂之信入不妨已謂之智以此七術精鍊方可久而服之令人長壽若服之非理則弱志傷神切須忌之父教子忠古之善訓祁奚舉午義不務私至如潤色王言章施帝道載參墳典例絕常功恭聞前烈尤難以任豈以嫌疑敢撓綱紀考以上下周禮校人掌王馬之政天子十二閑馬六種閑為一广既馬二百一十六應乾之策也六广既成校五良一駑是之謂小備校有左右閑成十二合月之道也駑馬三良馬之數凡三千四百五十六是之謂大備秦并一海內六萬騎之國馬盡歸之帝家則周制陋矣漢孝武當文景儉約之積雄衞霍張皇之勢勒兵塞上广既馬有四十萬匹及東漢魏晉國馬陵夷不可復逮武帝時矣後魏以胡馬入洛蹴蹋千里軍陣之容雖壯和鑾之儀亦闕大唐接周隋亂離之後承天下征戰之弊鳩括殘燼僅得牝牡三千從赤岸澤徙之隴右始命太僕張萬歲葺其政焉而奕代載德纂修其緒肇自貞觀成於麟德四十年閒馬至七十萬六千匹置八使以董之設四十八監以掌之跨隴西金城平涼天水四郡之地幅員千里猶為隘狹更析八監布於河曲豐曠之野乃能容之於斯之時天下以一縑易一馬秦漢之盛未始聞也張氏中廢馬官亂職或夷狄外攻或師圉內寇垂拱之後二十餘年潛耗大半所存葢寡開元神武皇帝登大寶受靈符水瑞感而河龍出星精應而天駟下二年春帝乃心腑善畜之將卜福祐宜生之長俾領內外閑广既使焉即開府霍國公其人也公名毛仲姓王氏開元佐命之元勳東國亡王之後裔四伯輔禹與治水之謨四七興漢在經星之列清明虛受察含冰鑑籌謀先覺慮出蓍龜竭無私之忠而善歸天造輸不懈之力而元同日用故得騰躍風雲攀附日月策功第一承恩莫二庭羅魏絳之鐘鼓第賞堂邑之山林文馬蕃錫於晉侯御衣亟分於韓信庶姜如玉則降榮彤管衆子垂髫則抱拜朱茀聖人之見也必猶爾為之四顧而滿志聖人之不見也乃恤然若無與樂其天下仲尼所謂是必才全而德不形者也夫其處身則立無跂正也視無還端也聽無聳誠也言無遠慎也國有憂未嘗不戚國有慶未嘗不怡其御下則明利害之鄉阜財求之務使之趨善而避惡懷德而畏威身不離於闕庭令遠行於坰牧亦有不學而暗合於古未更而懸辨其事然其從政必問於遺訓而資於故實者也若夫春祭馬祖夏祭先牧秋祭馬社冬祭馬步敬其本也日中而出日中而入禁原燎牧除蓐釁广既時其事也潔泉美薦庌涼棧濕翹足而陸交頸相靡宣其性也攻駒教駣講馭臧僕刻之剔之羈之策之就其才也不反其性故親人樂藝節樂如舞之心自生不窮其才故闉扼鷙曼竊轡詭銜之態不作爾乃舉其神異則有騊駼騕褭乘黃茲白來儀外广既呈伎內櫪朝刷閬風夕洗天泉聖皇一馭長壽萬年別其種類則有妍蹄繁鬛小領遠志曰龍曰騋曰戎曰驥差其毛物則有蒼白驪黃騂紫驈皇騅駓驒駱駰騢駵雒駂駮驓駩騧騏騽騝豪骭足狼尾魚目宗廟齊豪戎事齊力田獵齊足罔不畢有元年牧馬二十四萬匹十三年廼四十三萬匹初有牛三萬五千頭是年亦五萬頭初有羊十一萬二千口是年乃亦二十八萬六千口皇帝東巡狩封岱岳輦輅既陳羽衞咸備大駕百里煙塵一色其外又有閑人萬夫散馬千隊骨必殊貌毛不離㣥行如動地止若屯雲百蠻震聳四方抃躍威懷紛紜壯觀揮霍迴衡飲至朝廷宴樂上顧謂太僕少卿兼秦州都督監牧都副使張景順曰吾馬幾何其蕃育卿之力也對曰帝之福也仲之令也臣何力之有因具上其狀帝用嘉焉霍公口無伐辭貌無德色朝髦庠齒歆以多之於是明威將軍行右衞郎將南使梁守忠忠武將軍行左羽林中郎將西使馮嘉泰右千牛長史北使張知古左驍衞中郎將兼鹽州刺史鹽州監牧使張景遵隴州別駕修武縣男東宮監牧韋衡都使判官果毅齊琛總監韋績及五使長戶三萬一千人僉曰自開府庇我十三年矣畜有娩息人無乏匱克厭帝心莫匪嘉績且如停西南兩使六頓人夫藳穀計八十萬工圍石以息人約費其政一也納長戶隱田稅三萬五千石以儉私肥公其政二也減太僕長支乳酪馬錢九千三百貫以窒隙止散其政三也供軍筋膏膠十萬七千斤以收絹繕工其政四也蒔茼麥苜蓿一千九百頃以茭蓄御冬其政五也使監官料舊給庫物新奏置本收分其利不喪正錢二萬五千貫以實府宜官其政六也賈死畜貯絹八萬匹往嚴道市僰僮千口以出滯足人其政七也五使長戶數盈三萬墾田給食糧不外資以勸農却輓其政八也敢問監收之事孰能加於此乎然則稱伐計功前典所貴上以美聖主擇才之得人下以贊忠臣受任之盡節末以道官屬承風之成事竟以示後代昭前之令聞是四烈者不可廢也既而大君有命舊史書功吟咏王褱竒篆刻金石秦汧渺渺尚想非子之風魯野區區猶傳史克之頌試從此而觀彼夫何足以言哉頌曰皇天考牧兮聖之君四十三萬兮馬為㣥壍汧渭兮垣隴坂飛黃皁兮昆蹄苑山崆峒兮水嗚咽泉噴玉兮草汗血聚如花兮散如雪性既馴兮才亦絕維國家之大事駕時龍兮祭天地和鑾發兮文物備維皇帝之七德總戎馬兮威萬國彩髦翻兮金介冑有霍公之掌政擇張氏之舊令天皇駕兮仗黃麾太僕驂兮展輅儀舞月駟兮蹀雲螭神倜儻兮態權竒騏驥溢野兮牛羊日多子孫榮位兮恩寵如何頌皇靈兮篆石鼓萬斯年兮㣥玉府觀夫廣大無相者虛空也四輪倚之而住精微無體者佛性也萬法因之以生聖人有以見三界成壞皆有為殼故剖之以戒觜聖人有以見六趣輪迴是無明網故決之以定刃爍寶光之慧炬沛善利之慈舟返迷路率於中道徛橫流登於彼岸以言乎真實之要總攝一乘以言乎天地之閒曲成萬物大矣哉道心包舉等太虛而無際法教流通彌曠劫而常在則有乘如來方便出應化門用大士因緣處帝王位俾庶類咸若謂之光宅天下令衆生修善名為莊嚴佛國龍興寺者皇帝即位之歲溥天之所置也唐祚中微周德更盛歷載十六奸臣擅命伯明氏有盜國之心一闡提有害聖之跡皇上操北斗起東朝排閶闔運扶搖張目而叱之殷乎若震雷發地歘虩翕響以克彼二凶赫然若太陽昇天晞熙仰象以復我萬邦返元后傳國之璽受光武登壇之玉尊祖繼宗郊天祀地之禮既洎修舊布新改物班瑞之典又備乃考出世之法鼓大雄之事入無功用之品住不思議之力一光所燭庶兆為之清涼一音所宣大千為之震動雲蒸風靡不崇朝而壞衣涌塔徧天下矣陳州者上古太嘷之虛近代淮陽之地置守則列為郡封王則建為國本其風俗豪侈靡麗舊矣翿東門之下接袂成帷觴宛邱之上袨服成市信豫州之郊一都會也剌史南陽韓府君名琦其為邦也勝殘去殺聖主之得賢臣別駕彭城郡王名隆業其從政也能肅而恭高陽之有才子長史南陽張齊賢儒林之選也司馬河南雲盈公族之良也士曹從事八人錄事參軍于璆為稱首六屬官人二十五人宛邱縣令崔修已為稱首或以藝榮或以門進高車一轍美利同人禮舉刑清於是乎在因邦甸積稔之蓄偶日月再旦之初欽若王言建立靈寺上畧其趾下務其終百工不勸而亟庶役不徵而會經始如雲成之不日夫其帶四郭五衢之陌踞重墉闤闠之端福地砥平長垣雲矗高門有閌大厦斯飛連廊曲閣交軒對霤木磨而不雕土塗而不飾壯無僭侈以約費為功儉無偪陋以靜居為寶法王宮殿近寶花之城菩薩伽藍住金燈之地亦猶是也上座處元寺主真度維郍守慎等戒珠如月獨潔麒麟之行法寶如山普聞獅子之吼克諧善衆厎定神居甘露飽而滿盈天香醉而圍繞於時陳項之老襃衣而博帶皤皤然相造而諏曰久矣吾黨之惑也倥侗顓蒙情嗜橫放恚愛我業聰明不開日有忘其生生月無覺其滅滅一息之漏可勝言哉而今舉足至于道場申臂及于淨土晝則目禪誦之事夜則耳鍾梵之音何悟是生晚臻斯樂豈不思天子之至仁乎惻下人之昏墊遹上聖之昭軌假有相之途詣無生之理灑冥澤於巳滅蔕元根於未始百靈之所歸依萬宇之所欣喜非獨陳而巳矣葢神闢天聖開地代之祖也纂帝寶基皇統孝之主也殄僪狂破魔孽威無外也廣正典紹度門德無大也通幽洞明兼麤該精滂洋而行混濩厥成一收功而四善舉一推心而㣥願立咨如是則龍興之化曷有量矣夫業可大而蕪沒焉不貽於後事可尊而苞蘊焉不述於代臣子之罪也敢請圖之然言語之不到者心識心識之不到者真如二乘聞之而不見十地見之而未了而我云何能知能說竊比六時之鳥七寶之樹是出乎和雅音聲是讚乎微妙功德記其在處長者之金園銘其事因育王之石柱其詞曰聖皇在上於昭于天唐雖舊邦其命維新龍興返政滅二暴臣少康非儗於舜為鄰皇王蒸哉其一於廓元教生人戶牖神化洒心小大稽首掌擎萬域潛移仁壽三代之前葢未曾有最上乘哉其二泱泱陳服韓侯道之奕奕寶坊邦人造之天龍護持賢聖熙熙受福維祺帝心則怡至理興哉其三粵以長壽二年十月十七日改窆於衞縣苑樓之西北原夫令德所庥餘慶末也神龍紀歷皇運中興天子嚴祀清廟緬懷前哲乃下制曰朝議大夫守衞王府司馬上柱國平元昚父故偃師令某公門襲慶士林成則名教羽儀道德泉藪輔仁冥昧早謝昌辰積善洋溢垂休茂允時光祀夏慶屬配天錫類之恩俾覃於卿士哀榮之典宜旌於泉路可贈蒲州長史君子謂成其子而植乎身義方也愛其臣而及其祖孝理也孝以行惠惠以察忠義以立慈慈以昭順君臣父子於是形焉神功元年十月乙丑陽鴻卒於雩都縣友人沛國朱敬則清河孟乾祚范陽盧禹等哀鴻抱德沒地繼體未識考行定諡葬於舊域鴻字季翔平恩人也其先著族右北平郡大父真陽宰適茲樂土爰定我居維桑與梓既重世矣鴻倜儻竒傑王褱瑋博達貫涉六籍百家之書其要在霸王大畧竒正大旨君親大義忠孝大節而巳章句之徒不之視也嘗陋漢史地理志周禮職方志時異虛記心不厭焉乃攀恒岱浮洞庭窺河源踐岷衡稽四海之風俗筭九州之險易與趙國貫高圖獻其議遇火焚盪天下壯其志而痛其事養徒閭里不應賓辟儀鳳中河北大使薛公舉鴻行厲貪鄙天子喜之用寘于吏乃尉汲曲阿主簿龍門雩都夫其屏居十年一方化德歷佐四邑諸侯觀政惜乎有大才無貴仕命也初鴻遊大學有書生山東李思言物故南館鴻傷其終遠家屬有喪無主乃駕柩車送歸東土及在曲阿敬業作難潤州籍鴻得人歷旬堅守城既陷而猶鬬力雖屈而蹈節寇義而脫之因偽加朝散大夫即署曲阿令鴻貞而不諒詭應求伸既入邑則焚服闔門而設拒矣故得殿邦奮旅一境賴存淮海厎績勳荅効功卒不言賞賞亦不及君子以為急友成哀高義也臨危抗節秉禮也矯寇違禍明知也保邑匿勳近仁也義以利物智以周身禮以和衆仁以安人道有五常鴻擅其四武有七德鴻秉其二大慮克就之謂貞好廉自克之謂節粵若夫子可諡為貞節也巳於是紀名垂迹表墓勒石其詞曰倬良士縱自天辨方物覈山川厥志大哉峻剛節殷義聲返旅櫬宴窮城厥德邁哉哀斯人命莫贖德不朽溫如玉軌來世哉公諱令一字令一太州仙掌人也隋司徒觀王之元孫周孝明高后之歸孫今司衞卿之元子維有隋接三統建萬國我高祖以同姓為王維皇周敦九族敘百官我諸楊以外戚而貴公體元黃之純粹承河山之丕緒孝乎內炳忠焉外均性與天和道合仁愛收恤孤老分產踈屬泰於周施約於妻子加以樂善而好學降尊而容衆能辯樂和思柔酒德容止可度溫溫如也文章可觀彬彬如也泉英皎穆當世碩士與之游焉而曰君子若夫漢魏舅族有恩澤之封公卿門子有良家之侍公浮雲世祿匪石儒風究乎王道之紀綱明乎人事之終始年十九舉進士高第授潞州參軍轉干牛冑曹遷洛陽尉從班次也居無何拜朝散大夫行通事舍人俄而加太中大夫檢校天官員外郎夫行人之在周禮方國是接公修其政令帝曰余嘉郎官之著漢儀列宿是應公司其典故時稱邦則國家左賢右戚一武一文以公地望羽儀寄深虎旅除宣威將軍行右衞翊府郎將僶俛從事非其好也初公時為郎也遼戎悖虐作患幽冀皇上燠休下人故我有神兵之役選達權靡盬之吏佐猛毅維城之師乃下制以公為兵曹焉實有密贊軍政獨飛長策豈云卒乘輯睦戎機式序若此而巳哉俾雷霆飈動剿慝殿邦威元菟懷黃龍馬未汗而狄盡人未疲而兵戢者公與有力也及班師振旅冊勳踰時帝用咨有司之違古念有功之未祿將迂德命霈多勤有日矣方當翼大化增三光之明熙天秩垂九德之聲昊天不惠厲氣流行如何斯人胡不睂壽年四十一聖歷元年夏六月辛丑遘疾而卒嗚呼哀哉梁木未施予道不究呱呱稚嗣仰號蒼穹哀哀嚴親惴臨泉谷遐邇寮舊暨乎欽風未識之徒罔不盡朋悲而輩欷矣天子憫焉弔之以玉冊贈之以錦衾㣥公傷焉誄德於素旆圖休於青史粵乙卯假葬於合宮縣平樂鄉之北阜郭門十里邙山西岡巒萬古之阡都邑九原之地隧寄新隴魂懷故域藐是諸孤未遑歸葬平生志事孰巳焉哉厥弟五人比才連譽曰踐一獻一循一惟一尚一等因心則友世稱萬石之閨門死喪之戚吾見伯淮之兄弟僉曰我圖後事日月除乎哉龜云此地陵谷居乎哉乃布哀友生記詞懷舊迹德表墓示之來昆其銘曰洪河南注少華西峙氤氳靈會生此君子生此君子維國之紀宣慈惠和禮樂文史敦錫宗類汲揚媺否勤然濟物若不由已克明從訓誕敷厥美修詞北闕潤色東里揮翰文昌列星順晷交㦸禁衞為王爪士允文允武翁歸是比疇曰禦寇諗軍北鄙攘狄黃龍濟師蒼兕將王元默繄公是恃帝懿乃勳將圖膴仕仇仇執憲不我力以役役大勞未受多祉景命無祿洪基中父兮葆鬢孤兮稚齒孔懷靡及凡伯萃止陟彼邙山邱墟歲磥荒草無際㣥哀所起于嗟楊侯託居此矣沕潏帛丿糸曼德音之美久客思鄉永懷桑梓維唐御天下九十有八載蒼生賁乎海隅元澤漫乎荒外天子念窮鄉之僻陋徼道之修阻吏或不率不馴人或不康不若乃命舊相廣平公宋璟鎮茲裔壤式是南州篤五管之政教總三軍之旗鼓幅員萬里馴致九譯詔書下日靡然順風曷由臻斯威名之先路也公曩時執白登瑣闥推誠謇諤不私形骸忤英主之龍鱗蹹奸臣之虎尾挫二張之銳則聲怛寰域折三思之角則氣葢風雲由是極有四星維帝之輔地有五嶽維天之柱其入宰也君之股肱其出守也人之父母至於此邦之長人也飲食有節衣服有常清心而庶務正色而㣥下一瑟兮僩兮赫兮喧兮固以不怒而威不言而信雖有文身鑿齒被髮儋耳衣卉麥丏木巢山館水種落異俗而化齊言語不通而心喻矣其率人版築教人陶瓦室皆斁塈晝遊則華風可觀家撤茅茨夜作而災火不發棟宇之利也自今始祖國之舶車海琛雲萃物無二價路有遺金殊裔胥易其迴途遠人咸內我邊郡交易之坦也有如此故能言之士舉為美談葢微子去殷以後王者襄公伐楚將得諸侯尚書東漢之雅望黃門北齊之令德宋氏世名公其濟美詩所謂無念爾祖聿修厥德廣平有焉若夫往者屈也來者伸也往來相召而哀樂繼之鴻飛遵渚於汝信處龍章衮衣以我公歸鬱陶乎人思嗟歎之不足廣府司馬譚王褱番禺耆老某乙等相與刻石傳徽斯文子春秋之徒也豈將苟其辭哉雅敬宋公王臣之重次嘉譚子贊德之義遙感耆舊去思之勤越裳變風知周公之才之美吉甫作頌見申伯于藩于宣觀政將來惡可廢也頌曰降王宰兮遠國靈歌北戶兮舞南溟酌七德兮考六經政畫一兮言不再草木育兮魚鼈寧變蓬屋兮改籬牆魚鱗瓦兮鳥翼堂洞日華兮皎夜光火莫炖兮風莫颺事有近兮惠無疆崑崙寶兮西海財幾萬里兮歲一來舟如鳥兮貨為臺市無欺兮路無盜旅忘家兮扃夜開越井岡兮石門道金鼓愁兮旌旆好來何暮兮去何早犦牛牲兮菌雞卜神降福兮公壽考
