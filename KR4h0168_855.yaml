front:
  text: 全唐文欽定全唐文卷八百五十五準漢乾祐元年官吏部員外郎
  hash: sha256:7714390aad6b1e5bd5f17316c4da1d3620dcbcc61db75a1d9aa3b10b09d4c0b2
  markers:
  - {type: head, offset: 14, content: 常準, id: KR4h0168_NFKB_855-h1, level: 1}
body:
  text: 臣以國家選擇令佐或從銓注或是敕除立考課以校政能驗貪廉而行黜陟如斯條貫尚有闕遺近者諸道州府多署攝官以代正授既不拘於考績唯掊斂於資財致使戶民轉為蠹耗臣請示諸道州府長吏如令佐正官月限己滿除替未到不限時月切不得以攝官衝替須待正授替官即令對面交割縣務然後本州使出給解由批書歷子如此則承真命者守文畏法求攝任者退亦悛心周魏州人事後唐明宗以戰功拜刺史晉天福中歷貝州涇州節度使遷武勝保義義武成德四鎮杜重威降契丹欲自引決家人迫以出降授武勝軍節度使檢校太師漢祖入立徙鎮武寧加同平章事乾祐元年卒贈中書令蚋子之下有蟆子蟆子之下有浮塵子三者異乎皆狀小而黑世云巴蛇鱗介中微蟲所變耳三伏間畫飛夜息咂啄人肌膚動為瘡痏能飛不見其翼能囓不見其口微眇之極雖縝密衣服亦可通透莊生焦螟之說近之也至微之蟲豸詩獨無蚋故作賦以廣之蟲之至微名之曰蚋信乎蟣之別品復為蝨之餘裔㣥巢蚊之異類結搏牛之深契附諸鬱蒸産彼蕪穢張華之識何以辨其兩翼離婁之明何以見其長喙伺暑絺之漏露啐豐肌而睥睨默然而至暗然而噬人之至靈何闕爾之所衛人之至剛何反爾之所制狀斯咄咄籲於造物何不恣蛇虺之毒必當與之為避何不張虎豹之口不敢與之為忽豈其食人之膏血資己之肥腯念膚體之何毀痛瘡痏之難沒吾將擷楸葉以為焚俾爾之銷骨者也鼎字公度徐州蕭縣人起家為大理評事歷殿中侍御史起居郎後唐清泰中出為渾州廉判入為刑部郎中改吏部郎中兼侍御史知雜事漢乾祐初拜諫議大夫卒年五十五臣見建中元年正月敕中外文武臣僚授官上任後三日舉一人自代事下中書如除官用人選所薦多者擬議多事以來此道久廢今後乞復施行允鎮州束鹿人後唐同光中纍遷宏文館直學士水部員外郎知制誥清泰初改給事中轉左散騎常侍晉天福五年遷禮部侍郎改御史中丞轉兵部侍郎知制誥充翰林學士承旨漢乾祐初授吏部侍郎卒年六十五明君側席雖切旁求貢士觀光豈宜濫進竊窺前代未設諸科始以明經俾升高第自有九經五經之後及三禮三傳已來孝廉之科遂因循而不廢縉紳之士亦緘默而無言以致相承未能改作每歲明經少至五百已上多及一千有餘舉人如是繁多試官豈能精當況此等多不究義唯攻帖書文理既不甚通名第豈可妄與且當年登科者不少相次赴選者甚多州縣之間必無貢闕輦轂之下須有稽留怨嗟自此而興謗讟因茲而起但令廣場大啓諸科並有明經者悉包於九經五經之中無出於三禮三傳之內若無釐革恐未便宜其明經一科伏請停廢國家懸科待士貴務搜揚責實求才須除訛濫童子每當就試止在念書背經則雖似精詳對卷則不能讀誦及名成貢院身返故鄉但刻日以取官更無心而習業濫蠲徭役虛占官名其童子一科亦請停廢作者之謂聖述者之謂明苟非聖明焉能述作若運因革故則事乃惟新或改正朔而變犧牲或易服色而殊徽號是以五帝殊時不相沿樂三王易世不相襲禮止於近代率由舊章比及前朝日滋其目多因行事之失改為立制之初或臣奏條章君行可否皆表其年紀以姓名聚類分門成文作則莫不悉稽前典垂範後昆述自聖賢歷於朝代得金科玉條之號設亂言破律之防守而行之其來尚矣皇帝陛下運齊七政歷契千年爰從創業開基莫不積功纍德所宜直筆具載鴻猷若備録前代之編年目作聖朝之政統此則是名不正也夫名不正則言不順而媚時掠美非其實矣若翦截其詞此則是文不備也夫文不備則啓事端而禮樂刑政於斯亂矣若改舊條而為新制則未審何門可以刊削何事可以編聯既當革故從新又須廢彼行此則未知國朝能守而不失乎臣等同共參詳未見其可況臣等學慙該古識昧折中當君上順道師古之時無臣下亂名改作之犯則天下幸甚天下幸甚管子云凡赦者小利而大害久而不勝其禍無赦者小害而大利久而不勝其福又漢紀云吳漢疾篤帝問所欲言對曰唯願陛下無為赦耳如是者何蓋行赦不以為恩不行赦亦不以為無恩為罰有罪故也竊觀自古帝王皆以水旱則降德音而宥過開獄牢以放囚冀感天心以救其災者非也假有二人訟一有罪一無罪若有罪者見捨則無罪者銜寃銜寃者彼何疏見捨者此何親乎如此則是致災之道非救災之術也自此小民遇天災則喜皆相勸為惡曰國家好行赦必赦我以救災如此則是國家教民為惡也且天道福善禍淫若以捨為惡之人而便變災為福則又是天助其惡民也細而災之必不然矣或曰天降之災蓋欲警戒人主節嗜欲務勤儉恤鰥寡正刑罰不濫捨有罪不僭殺無辜使美化行於天下聖德聞於上則雖有水旱亦不為沴矣豈以濫捨有罪而反能救其災乎彰其德乎是知赦之不可行也明哉明哉承翰漢乾祐初官兵部郎中奉使吳越觀其驕僭形於譏誚錢宏俶托其過奏之責授慶州司戶員外置伏見都下衢街窄狹人物殷繁其有步履艱難眼目昏暗老者幼者悉在其間車馬若縱於奔馳生性必見於傷害況律禁無故走馬傷人殺人素有嚴典臣竊恐功勳之子軍伍之人向來偶昧於憲章此際忽思於馳騁害人者死是殺二人殺人既多亦傷至化臣以為不若令之在前使民知禁臣乞特降明詔示諭內諸司以下及諸軍巡於街衢坊曲並不得走馬兼乞指揮逐界金吾司所由及軍巡所由常切止約如有故違走馬者不問是何色目人並捉搦申所司請依律科斷若所由不切止約致走馬害人者逐界分所由與所犯人同罪科斷其或自內中急傳宣旨者即請賜銀牌或牙牌令以手持之俾路人及所由辨認易為奔避上行其令而下不敢違非惟得罪者無同抑亦所犯者應少守貞河陽人晉天福中纍遷宣徽使少帝即位授滑州節度使兼侍衛馬軍都指揮使改侍衛都虞侯開運元年授亠兊州節度使加同平章事二年契丹南下以為北面行營都監還為侍衛副都指揮使移鎮宋州代高行周為侍衛親軍都指揮使移鎮鄆州契丹寇邊以為北面行營都部署軍敗降契丹授司徒依前鄆州節度使從契丹至汴尋歸本鎮漢祖入立授太保封魯國公移鎮河中乾祐二年以叛誅臣之先世乃唐遠裔錫侯命將代不絶人茂績殊勳著於簡冊昔日巢寇犯闕僖昭失御宗社板蕩為人所有臣雖生於梁末幼失怙恃零丁孤苦遭世多難逮能執戈捐身事晉征討攻伐粗立戰功高祖見擢俾典禁衛頗著勞績尋屬顧命出守蒲津洎少主厄運遂沒戎虜晉鼎覆餗天下橫流疆宇無主臣不勝忿惋痛心疾首欲效愚忠誅鉏蛇豕恢復先業庶安宇內功未及立凶黨俄臨衆寡不敵遂罹危迫臣雖躬當矢石以帥㣥下悉力固守冀殄犬羊殞首不顧臣之分也然預防不虞有備不敗古之善教也臣遠聞君王霸有江左雄跨淮甸禁暴弭亂推亡固存有王者之風將繼巨唐有土者非君而誰況臣忝宗盟敢罄誠苟君王察臣忠勇憐顧本支救患恤鄰遏強拊順爰遣偏將出為東援則五霸之風不讓桓文之主苟獲全濟實君之惠守瓊漢乾祐二年官右拾遺有國通規無先擢士論選既當綱紀必陳而縣令宇人最親理道若宰大邑難用小才一同皆繫於慘舒百姓咸關於利病實賴勤恪以恤孤惸吏若不臧人當受弊近年銓司注擬藩府薦論只循資歷而行不以年顏為念且少年宰邑鮮有廉勤不執公方惟貪娛樂以臣愚見凡朝廷選親人之官年未三十請不授縣令少年授任必慮因循振漢乾祐二年官右補闕臣伏見汴河兩岸隄堰不牢每年潰決正當農時勞民功役以臣愚管沿汴水有故道陂澤處置立㪷門水漲溢時以分其勢即潦歲無漂沫之患旱年獲澆溉之饒庶幾編氓差免勞役巽漢乾祐二年官司封郎中國家郊廟社稷百神祀祭皆在雒陽臣每見差官行事諸神壇墠多無齊宿之所以三公之職衣冠於旅舍田家狼籍凶穢無所不有恐非精誠蠲潔展敬之道也臣請下河南府於京城四郊聊葺屋宇充齊宿神厨之所倫漢乾祐二年官國子司業游惰之民多歸僧舍朝廷用兵須豐軍食請三五年間止絶僧尼戒壇兼禁私行剃度文贊漢乾祐二年官戶部員外郎臣竊見諸道州府力及人戶廣置田園不勤耕稼惟為無利以事末遊臣慮因循以成漸染請量為條教以塞源流臣請在官處官吏搜求此色戶民令出代耕錢納官以督農務欽明漢乾祐二年官司勳員外郎臣伏以百姓轉食餽運舟車之利苦樂相懸臣竊見蔡水嘗有漕運多是括借舟船破溺者棄在水邊不許修葺又不給付以臣愚見乞容陳許蔡三州人戶制造舟船不用括取以備差雇水路可至合流鎮及陳州蔡水未及水匱十數里水小岸狹或時乾淺臣伏請開決汴水取定力禪院西一半并港穿大城向南至㪷門可費三五千工自水匱蔡水路才五六里水勢便於開決陳蔡漕運必倍常年私下往來更豐財貨此之利便實益轉輸伏見天下戶民大半家貧産薄征賦之外差配尤繁豈宜寒耕熱耨之人供游手惰農之輩臣近以簡苖外縣遍歷鄉村緇侶闕居精舍輝赫每縣不下二十餘處求化齊糧不勝飽飫寺家耕種又免征稅臣竊知淮南不度僧尼不滋醫卜己六十年矣兼不許外求者入境此輩遺留蠹耗幸我國困民貧古語云一夫不耕一婦不織必有受飢寒者即自聖化之內且約十萬僧尼每人日米一升十萬人日費二十石以日繫月其數可知每人春冬服裝除綾羅紗縠外一僧歲中須絹五匹綿五十兩十萬僧計絹匹五十萬綿兩五百萬此輩不耕不農皆出於蠶織無裨至化實斁大猷臣以為聚僧不如聚兵僧富不如民富昔秦皇帝并吞六國虎視天下以兵多民富故也僧何預焉經曰聖人在上國無幸民民之多幸國之不幸臣嘗三復此言為之扼腕詡漢乾祐三年官禮部郎中臣聞致理之方咸資稽古多聞之道詎捨㣥書歷代已來斯文不墜石渠蓬閣今則闕於藝編百氏九流在廣頒於搜訪唐朝並開三館皆貯百家開元之朝㣥書大備離亂之後散失頗多臣請國家開獻書之路凡天下文儒衣冠舊族有收得三館亡書許報館進納據卷帙多少少則酬之以緡帛多則酬之以官資自然五六年間庶幾粗備文紀字子持京兆萬年人少舉進士事梁為刑部侍郎集賢殿學士後唐明宗時為御史中丞遷工部尚書末帝即位拜中書侍郎同中書門下平章事晉祖入立罷為吏部尚書纍遷太子少保致仕周祖入立即拜司空於家卒年七十六贈司徒臣聞聖列九皇必禀嚴慈之訓貴為萬乘彌懷顧復之恩所謂生我劬勞昊天罔極故漢昭帝承祧御歷奉尊諡於雲陽魏文帝繼體守文思外家於甄館則追崇母后祔享廟庭愛親之道克隆敬本之文斯洽臣等嘗覽國史見元宗大聖孝明皇帝母昭成皇太后竇氏作嬪初奉於相王歷位才終於藩孺及至上皇傳國聖子臨朝則追尊配享於閟宮儷極攸先於冡后臣又見代宗睿文孝武皇帝母章敬太后吳氏入宮才侍於忠王短世難登於命婦及寶祚爰歸於聖嗣追尊將祔於陵園則㣥臣歷懇於封函嚴配請崇於徽號舊章斯在闕禮未伸臣等叨備鼎司合伸茂典伏惟聖母魯國太夫人夢梓興周望雲佐漢亶河洲之懿範契沙麓之休祥三母俱賢周武最承於天統四妃有子唐侯光啓於帝圖仰惟當寧之懷彌軫寒泉之思伏望配陵祔廟法地則天君親實殺於義方恩禮宜歸於聖善母以子貴乃春秋之格言孝以尊親固禮經之明義久虛時薦慮損皇猷俾秦官載顯於玉符魏寢永光於金冊則華夷大願臣子遑寧臣等謹案諡法聖善周聞曰宣施而不私曰宣博聞多能曰憲聖善周達曰憲謹上尊諡曰宣憲皇太后請依昭成章敬二太后故事擇日備禮冊命故事禮合配陵祔廟臣等再詳儀注備有典彞伏恐朝廷且務於便安司局貴期於辦集酌於故事更司簡詳臣等伏聞先太后舊陵未祔於先朝則都下難崇於別廟既追尊諡合創閟宮臣等謹案漢故事園寢不在王畿者或在陵所便立寢祠禮文雖異於國朝事理可循於權道臣等商量太后上尊諡後權立祠廟以伸告獻配祔之禮請俟他年一人御宇百職交修則四時無水旱之災萬國有樂康之詠頃屬中原多事三紀不寧廉平因此而蔑聞賞罰繇茲而失序所以梟鸞並起駘驥難分有援助者至濫必容守孤貞者雖賢莫進遂使居官僶俯奉職因循唯思避事以偷安罔效輔時而濟物伏惟皇帝陛下削平九有收復八紘承乾興萬代之基出震應千年之運櫛沐風雨手足胼胝勤勞大集於聖功華夏畢歸於睿略雖遠柔邇伏咸知臨照之鴻恩而旰食宵衣尚念生靈之久困纍頒絲綍典訪芻蕘恐天災之流行因皇風之擁隔臣不揆庸短輒冒宸聰臣請告諭內外文武臣寮凡守一官責其舉職公清奉上勤恪為心每歲秋冬明定考較將相則希回御筆班行則悉委司存外則州牧縣寮具以真虛比較儻聞共推異績便宜特示甄酬如其衆謂曠官固可明行黜責所冀免懷竊位俱效竭誠上則輔佐於大君下則精專於庶務高卑不濫功過無私官既清廉則民無愁歎勸課之方得所則生靈之賦樂輸故可以進賢良退不肖安生聚實倉箱使和氣遠敷德澤廣被顧惟穹昊必降休祥永致太平竚期混一臣叨逢明聖謬列班行既奉德音合申所見常朝辭謝官常朝則南班橫行與百官齊拜入閣日敷正門外序班亦伏南橫行百官雖不拜候喚伏時辭謝官便展拜儀今伏見每內殿起居日先於文明殿庭序班百官固不設拜只候宰相至便入起居固不傳宣命若有南班辭謝稍似非儀請自今後其日不許辭皆令次日候有常朝即得辭謝若遇急切公事即准舊例令隔門辭謝或於閣門祇候宣放其文武兩班不更於文明殿序立至於中興殿門外立班祇候宰臣到便依次第入起居又准故事常參官每日趨朝不合無故請假如實疾病不朝參間不得私行人事新官未謝不合私人事到宰相宅每月請假不得過三日吏部南曹郎中請以鎖院前五日免朝若遇起居入閣參假追朝御樓謝賀行香城外班並合到不到書罰三司河南府職事帶正員官如南曹例臣近蒙召對面奉天旨凡軍國庶事利害可否卿等位居輔弼並合盡言臣等仰承詔諭退自省循時遇休明名叨輔弼才器不能經綸庶務智術不能康濟大猷致陛下宵旰於丕圖憂勤於治道有靦面目待罪巖廊尚沐宸慈猶寬冊免莫不兢心自勵俯首深惟願竭愚鄙之諴少副昭回之鑒臣聞古先哲王樂聞己過道塗立誹謗之木門庭樹告善之旌從諫如流聞議能服祈以卜年長久享祚無窮陛下自纘邦家克敦慈儉守先皇仁政遵列聖彞章人樂和平政皆畫一天無祲沴之象地無變怪之妖日月無爽於虧盈星緯不差於纒次襞諫紙者無詞可措持皂囊者無過可規凡百庶寮奉職不暇臣伏覽貞觀故事見魏徵馬周之章疏王圭劉洎之奏論或講貫古今或鋪陳政術皆萬代之長策非一介之狂言苟異經謀何名獻納臣等伏計宸算圖度者必以嶺嶠未平島夷猶梗巴梁恃險井絡纒妖鮮卑尚撓於邊陲將帥未施於方略臣等以為非獨人謀未至亦恐天意使然聲教苟孚廓清何晚臣略以前事明之何者即如漢高前代之英主也一劍初奮於彭城五年方誅於項籍洎南平英布北扞胸奴解白登之圍避柏人之難凡十餘年親當矢石乃混車書如太宗文皇帝本朝之聖祖也自起義太原佐命高祖乃定江南之草竊殄隴右之陸梁禦突厥於便橋擒公祏於京口凡十餘年櫛風沐雨命將出師方得華裔向風寰區無撓伏念陛下爰從踐祚才歷一朞雖乃聖乃神不下於漢高文祖而且耕且戰更詳於人事天時俾武王一舉蕩平體句踐十年教戰若治兵之至要御衆之大端攻必取而守有餘戰必勝而卒無怠發號出令保大定功俾軍戍咸憚於機權部校皆存於信義驅之可以蹈湯火使之可以為蟲沙此則聖謀懸料於彀中神策己包於術內何假芻蕘小輩草野凡生持蠡妄測於滄溟側管強窺於穹昊不量事體虛費莠言故論語載仲尼治衛必也正名言順事行勿容苟且名言之際聖哲攸艱況在凡常豈宜容易思出其位古人所非臣等謬處台衡奉行制敕但緣事理互有區分軍戎不在於職司錢穀非關於局分苟陳異見即類侵官況才不濟時識非經遠因五日起居之例於兩班旅見之時略獲對揚兼承顧問此際衛士周環於階陛庶臣羅列於殿庭四面聚觀十手所指臣等苟欲伸愚短此時安敢敷陳韓非昔懼於說難孟子亦憂於言責臣竊惟本朝故事肅宗初平寇難再復寰瀛頗經涉於艱難尤勤勞於委任每正衙奏事則泛咨訪於㣥臣及便殿詢謀則獨對揚於四輔自上元元年後於長安東置延英殿宰臣如有奏議聖旨或有特宣皆於前一日上聞及對御之時只奉冕旒旁無侍衛獻可替否得曲盡於討論捨短從長故無虞於漏泄君臣之際情理坦然伏望聖慈俯循故事或有事關軍國謀而否臧未果決於聖懷要詢訪於臣輩則請依延英故事前一日傳宣或臣等有所聽聞切關利害天形文字須面敷揚臣等亦依故事前一日請開延英當君臣奏言之時祇請機要臣寮侍立左右兼乞稍霽嚴顏恕臣荒拙雖乏鷹鸇之效庶盡葵藿之心恭惟陛下睿略縱橫天機沉邃臣等以愚智而干聖智以凡情而測聖情如螢爝比耀於烏蟾畎澮爭流於江海然而天覆地載君義臣行持祿取容即見議於物論有犯無隱慮不愜於聖懷既顯奉德音俾令奏對合披愚先瀆宸聰奉四月十四日敕喪葬之儀本防踰僭若容錦繡難抑奢豪但人情皆重於送終格令當存於通理宜令御史臺除錦繡外并庶人葬更檢詳前後敕格子細一一條件分析奏聞冀合人情永著常令者今臺司再舉令文及故實條件如後凡銘旌三品已上長九尺五品已上長八尺六品已上長七尺諸輀車三品已上許使油幰施襈兩廂畫雲氣男子幰襈旒蘇皆使素婦人使綵又諸官五品已上許使三梁六柱輿車輿上有結絡三品已上帶將相者有鳳臺自諸品官及郡守升朝官者羚羊山華餘平幰諸棺槨不得雕鏤彩畫施戶窗欄檻棺內不得有金寶珠玉諸喪葬不得備禮者貴得同賤賤不得同貴准元和六年十二月刑部兼京兆尹鄭元狀奏條流文武官及庶人喪葬三品已上明器九十事四神十二時在內不得過二尺五寸餘人物並不得過一尺園宅方五尺下帳高方三尺共置五十舁挽歌三十六人輀車使閙轍車油幰朱絲絡網兩廂畫龍虎幰竿朱未垂旒蘇緭幃襯幕及額帶等其幰竿長二丈六尺帶五重旒蘇十八道並不得使綾羅錦繡泥銀帖金彩畫及結鳥獸香囊等物四使引四披六鐸六翣挽歌並練布深衣輴車志石任畫雲氣不得置幰竿額帶等方相車闕載方廂外及魂車除幰網裙簾外皆不得更別加裝飾並使合轍車纛竿長九尺不得安大朱帖金銀立鳥獸旗幡等五品己上明器六十事四神十二時在內園宅方四尺下帳高方二尺共置三十舁減志石車輀車幰竿減四尺長二丈二尺流蘇減二道使十六道帶減一重使四重披引鐸翣各減二使四挽歌一十六人並無朱絲網絡方相使魌頭車纛竿減一尺使八尺幃額魂車准前九品己上明器四十事四神十二時在內園宅方三尺共置二十舁減輴車幰竿減三尺使一丈九尺旒蘇減二道使十四道披引鐸翣各減二使二帶減一重使三重挽歌一十六人纛竿減一尺使七尺其幃額魌頭魂車准前明器並使瓦木為之四神不得過一尺餘人物等不得過七寸並不得用金銀雕鏤帖毛髮裝飾臣聞事君盡忠孔子激揚於直道無功受祿周書譏諷於曠官敢因災沴之時輒貢傾輸之懇臣伏見比年以來朝廷多故人事則兵喪禍亂天時則水旱蟲霜若非陛下拯溺救焚移災作福則生靈受弊宗社何依今則區宇甫安人神胥悅但以自夏愆陽及秋霖雨雖勞聖慮過切閔傷蓋屬當否數之辰尤費消禳之力雖民斯鮮福亦天道使然為君之難實見於此臣聞沉潛剛克高明柔克是君宜執柔以御下臣當剛正以報君則冀上下和平君臣欣合臣思德宗初置學士本不以文翰是供蓋獻納論思朝夕延問至於給諫遺補之職是曰諫官月請諫紙時政有失無不極言望陛下聽政之餘時召學士諫官詢謀政道俾獻讜言明書黜陟之科以責語言之效書云乂時暘若肅時雨若以洪範言之係於君德臣請嚴禋於宗廟社稷精禱於嶽瀆神祇進忠良退不肖除寇盜恤惸嫠慎刑章明舉選任賢勿二去邪勿疑王道砥平無偏無黨中外除改請守舊規長興四年以前敕命繁碎者請重選擇如新敕不及舊章便請卻依前代如舊章不如新敕便請釐革施行倘不阻於奏陳庶漸臻於理體
