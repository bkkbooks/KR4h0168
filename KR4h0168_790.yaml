front:
  text: 全唐文欽定全唐文卷七百九十籌宣宗朝官觀察使
  hash: sha256:c0aa8748f68fe063cfe598962e116884b4c068db1dc4b47788e67a4ce52b5a47
  markers:
  - {type: head, offset: 13, content: 許籌, id: KR4h0168_NFKB_790-h1, level: 1}
body:
  text: 籌僅童知佛業儒雜老嚴德慕元空靡極營儒身及進士第一年尉告成明年遊是嶽謁律德惟珙上人引將布覽至圭大師影堂珙公曰子嘗識圭公覺否曰未云圭公覺道靈感莫可周名獨有嶽神為大師移植松柏於東巖事碑塔所不書圭公之誡杜從祅也且佛説㣥經事又焉可徇圭公謙勝哉珙欲頌之患辭不文子進士也矧僅童知佛尚信圭公謙勝乎籌惟藏惑偶得嵩陽居士喻應真與洛陽處士陳惟復書言嶽神為圭公植樹事甚備曰大師法諱元圭俗姓李氏伊闕縣人也太宗朝甲辰歲生高宗代癸亥歲具戒元宗帝丙辰歲化滅歷年七十三始隸間居寺習律安少林味禪後廬龎塢將化謂其徒仁素曰吾始志間居寺東嶺我滅爾必塔吾骸於茲開元十一年素力允師之志喻陳二高士曰大師嘗寂定結廬戔山巖時嶽神輕步謁大師大師覺精神不世謂曰仁者胡來而復何往神曰師寧識我耶大師曰吾觀佛於衆生等吾一目之豈分別識耶神曰我斯嶽神也能以怪死痛害生死於人師安得一目我哉大師曰汝能生於人吾本不生汝焉能死吾視身與空等視吾與汝等汝能壞空與汝乎苟能壞空及壞汝則不生不滅也汝上不能若是又焉能生死吾也神稽首禮曰我亦聰明正直於餘神而謂是神豈知師有廣大過空之知辨也願授以正戒梯拔世間大師曰神既乞戒即既戒也所以者何戒外無戒又何戒哉神曰此理也非濟岸梯杭之事止求師戒我身為門弟子大師辭不獲即為張座焚香秉燭正几曰付汝五戒汝能奉持即應曰能不能即曰否神曰敬奉戒大師曰汝能不淫乎神曰亦娶也大師曰非為此也謂無羅欲也神曰能大師曰汝能不盜乎神曰何乏我也焉有盜取哉大師曰非為此也謂嚮取而福淫不供而禍善也神曰能大師曰汝能不殺乎神曰正柄在吾焉曰不殺大師曰非為此也謂有濫誤混疑也神曰能大師曰汝能不妄乎神曰我本正直焉能有妄乎大師曰非為此也謂先後不合天心也神曰能大師曰汝能不遭酒敗乎神曰能大師曰如上是為佛戒也又言以有心奉持而無心拘縶以有心為物而無心想身如能是則先天地生不為精後天地死不為老跳身為帝王不為崇高命子為輔相不為富貴終日變化而不為動畢竟寂默而不為休悟此則雖娶非妻也雖嚮非取也雖柄非權也雖作非故也雖醉非惛也若能無心與萬物則羅欲不為淫福淫禍善不為盜濫誤混疑不為殺先後違天不為妄惛荒顛倒不為醉是為無心也無心則無戒無戒則無心無衆生則無我無我則無汝孰能戒哉神又曰我神通亞佛大師曰汝神通十句五能五不能佛神通十句七能三不能神竦然避席跪啓曰可得聞乎大師曰汝能拔上帝東天行而西七曜乎神曰不能又曰汝能奪地祇融五嶽而結四海乎神曰不能大師曰是為五不能也佛能空一切相皆滅萬法而不能即滅定業佛能知㣥有性窮憶劫事而不能化導無緣佛能度無量有情而不能盡衆生界是為三不能也定業亦不能牢久無緣亦謂一期衆生界本無增減恆無一人能主有法有法無主是謂無法有主無法是謂無心如我悟佛亦無神通也但能以無心通達一切法爾嶽神頓首作禮曰我誠淺昧未聞空義大師指我戒我我當化矣更何業因何拘塵界我願報慈德效我所能大師曰我觀身無物觀物無常法窟塊然更有何欲神曰師必命我為世間事展我小神功使巳發心初發心未發心不信心必信心五等人目我神蹤知有佛有神有能有不能有自然有非自然者也大師曰無為是無為是神曰佛亦使神護法師寧隳叛佛耶須請告我大師意不獲遂言曰東嶽寺之障也莽然無樹北岫有之而能屏擁汝能神力移北樹於東嶺乎神曰謹奉命矣又陳我假昏夜風雷擺搖震運師無駭即作禮辭去大師門送且觀之見儀衛逶迤如王者之狀又復碧煙紅霞紫風皓氣錯散四遠幢幡鉞珮淩高寢空其夕果有迅風吼雷奔雲震電大壯棟宇岌業將圯定僧瞻動牙捉仆叫大師安衆曰無怖無怖神與我相契矣啓旦和霽則北巖松檜盡移東嶺森然行植焉而大師謂其徒曰吾歿有塔我者有碑我者無紀是事人將祅我也籌得開元中喻陳二居士狀師之行因珙公請為影堂記遂捃而書之將軍晉永嘉初守萊種德藝政萊人恩之既歿諸劉將西扶葬洛萊人曰我萊不降數萬家將軍豫視我我父母戴之將軍於諸劉天戚也於我人戚也天之戚也寡而邈人之戚也衆而邇安有捨邇衆而歸邈寡哉敢以數萬家之命請於諸劉遂之於是散捧封土趨持樹本既墳於此饗用春秋禱災徼祜餘靈影響大中十一年四月癸巳太守辛公肱去太守姚公琯未臨籌以當道觀察支使奏承空闕到郡之三日軍吏疏拜歷祠㣥望即日將軍祠在郡署之東端簡肅入而見廟寢卑狹畫像雕暗既違有德豈謂祭恭乃命押衙兼修造使李公霸度木戒工新此殿搆想像塑繪居月而成心非貿福者將使有德者垂昆無窮無德者警改操行萊人受裕當稔於茲大中十一年五月二十三日記滌武功人大中四年自尚書右丞充翰林學士知制誥五年遷兵部侍郎進尚書議曰伏以皇天平分盛王全用施雷雨之廣澤則庶物生成務恩威之至仁則四海亭育遂使含靈受泰觸類知懷美諡大名固當稱謂伏惟大行皇帝爰自盤維膺茲九五行越今古仁被黔黎孝惟生知略不代出以天下為己任視宇內於掌中坐朝而不問風霜弭亂而不悕府帑動惟思古慮必歸周聞善若驚去疾務盡前王之美事列聖之令典必擴而行之加以講信修睦任賢興能思念勳庸則發凌煙之彩繪敦序友于則置雍和之宴錫俯閲才彥則命法官諫官之次對愛憫生育則禁三月五月之採捕一物之不得其宜納隍在慮四方之稍有未泰降食為心命將則千里坐知指縱則三邊克定是以人並為便物得自安加以西平羌戎南殄蠻寇三州七關之地坦然無虞四鎮際海之氓晏然自靜然後賑廩恤人蠲農命使遠無不肅邇無不安姦宄戢心權豪屏息京輦絶桴鼓之響邊陲無烽爟之虞可謂超三躋五度契踰繩者也故有識曰佇其云亭齊人已臻於仁壽不享堯運不升軒雲豈獨唐俗有喪考之悲人懷崩天之怨而已謹按諡法敬祀享禮曰聖闢土斥境曰武聰明睿知曰獻經天緯地曰文慈惠愛親曰孝先皇帝肅祇禋祀非禮不行得不謂之聖乎收復舊疆誅鋤梗驁得不謂之武乎好文樂賢興善不倦得不謂之獻乎虔奉天道鋭意典法得不謂之文乎五十而慕問安不懈得不謂之孝乎謹上尊諡曰聖武獻文孝皇帝廟號宣宗謹議薰字子溥亡鄉里世系第進士歷考功郎中翰林學士出為宣歙觀察使以清力自將牙將素驕逐之奔揚州貶棣王府長史分司東都懿宗立召為太常少卿纍擢吏部侍郎以太子少師致仕顏魯公既用貞鯁為元載所忌由刑部尚書貶夷陵郡別駕大歷六年又以前秩轉廬陵郡道出宣州之溧水縣縣之南經古烈士左伯桃墓節概交感即於墓下作詩一首自題於蒲塘之客舍詞韻淒激點畫嶄壯窮國藝之奇事厥後洎於大中之丁丑歲八十七年矣孤宇敻閴扃縢不固久為飄暴薪牧所困一挑半剔往往汙缺余作鎮到此有客謂余者惜之立召工將王少儒領其部匠鑿垣復匣移窞於北望樓之西隅且以為郡居之勝絶鐫石其下俾後之觀者知改置之意無忽大中十二年十一月十九日宣歙池觀察使檢校右散騎常侍兼御史大夫鄭薰記運巨壑者必資帆楫之便以鼓其波濤築廣廈者必堅柱石之材以完其結構故明王聖帝立國保家莫不求竭忠宣力之臣配帆楫柱石之用懋崇基業宏濟艱難百代通規千載相遇孰稱全德其故開府儀同三司內侍監致仕楚國仇公乎公諱士良字匡美海豐興寧人也宋大夫牧以忠烈正直書於春秋公實其裔焉其後香以文雅仕於東漢儒以議論貴乎北燕蟬聯圭冕暉映簡册代著奇節率多令人史編家譜一二詳焉顯公之曾祖考皇朝正議大夫內給事賜緋魚袋諱上客府君忠昭事任績懋聲猷躬行正途克嗣先業烈祖皇朝朝議大夫內常侍賜紫金魚袋諱奉詮府君名以才彰功由道著王氏教讓羲之巳行于公高門定國方大皇考諱文晟府君精持貞廉高挹塵俗位以命屈慶因善餘厥惟楚公克振勳德追贈特進左監門衛將軍賜紫金魚袋申公之誠孝也公年未弱冠入仕東朝是時憲宗皇帝主器承華體元儲兩親奉再飯共歡九齡助澄少海之瀾更闡前星之耀永貞十年授掖庭局宮教博士賜緋魚袋元和初以舊恩本固新渥彌隆既頒侍從之勤首舉寵遷之命加宣徽供奉官賜紫金魚袋檢身極敬奉輦施勞勵自牧於撝謙表無私於應對閏六月轉朝散大夫內侍省內給事宣徽供奉官如故材力彰於省局周旋美於禁闈驟議甄升更加命秩冬十月拜內常侍餘如故未周星紀三歷顯途既洽謳謠且明恩澤彼虞卿再見為趙上卿荀爽九旬登漢三事允膺時議彼或多慚三年以本官充內外五坊使尋或遷宣徽供奉官發彼五豝輔騶虞之仁化殪此大兕詠吉日於春搜外撫之暴橫自消中野之井閭知感十年加大中大夫內侍省內常侍尋以本官充平盧軍監軍使全齊舊壤繼代邀恩甲兵盛充貢賦不入公聞其叛渙諭以忠貞爰革非心幾至效順明年詔徵又以內侍依前宣徽供奉官吳寇據淮天兵在野逗遛不進沮敗為憂求使臣往諭中旨遂命公以本官及職充淮西行營宣慰使至則大布皇澤益勵軍威四遠瞻風萬夫振氣而又盡得機要既還奏聞竟至成功期為顯效十五年遷雲麾將軍右監門衛將軍充內外五坊使仍賜上柱國又進封南安縣開國男食邑三百戶驅獸而無害五穀充庖而有事三田蕙圃蘭塘落飛駐走助開三面之網勤施一目之羅鄙長楊之大誇胡人笑上林之務矜楚使條令既肅巡遊盡歡其冬復加冠軍大將軍長慶初罷五坊使以本縣進封開國子尋進侯爵食邑一千戶宣徽供奉官皆如故二年除鳳翔監軍使又進封開國公食邑一千五百戶亶父舊疆繆公遺政郡邑則武安留守扶風則馬謨擅名雜於版屋之郊號為難治之俗公攬轡即路下車撫戎三軍畏威百姓懷惠寶歷二年徵復為宣徽供奉以本爵進封郡公食邑二千戶尋除鄂嶽監軍使傍連荊楚南接湖湘閭閻皆土著之安貨貝有山積之富兵不堅利人皆惰遊公深贊訓齊同為勗勉知方有勇自我而能太和元年入為宣徽供奉官轉內坊典內侍省秩清事簡優逸自娛莫展長才鬱於㣥論俄拜右神策軍副使公於是端肅以二戎政廉讓以播軍聲屏衛益嚴暴悍知禁二年擢為右領軍衛將軍內外五坊使講事一時農不易隴選徒百隊人不告勞鮮扁而布青林行事而無遺亠兊貙貗古法搜獮新規指顧之間莫非盡善六年真拜內侍知省事餘如故明年轉大盈庫領染坊依前知省事恩澤浹於寰瀛寵賜周於藩服綺羅萬段錦繡千筐每極珍華曾無濫惡又元黃朱紫染彩文章靡不精鮮悉中程度以賞能陟於飛龍使本官並仍舊御間二六天驥三千異骨峯生深溝血溢親習盡馳驅之妙㣥分多駔駿之奇芻秣尢精稿秸常羡九年五月拜左神策軍中尉兼左街功德使將軍知省事如故練達戎機總親護禁典理爪牙之衛左右心膂之師寬不喪威簡不曠務氣勵熊羆之勇手持虎豹之韜恩由忠深士以誠感張孺驂乘孝宣乃安趙喜宿衛顯宗加厚轉左驍衛將軍餘如故既而鄭注挺妖李訓附會列奏偽瑞固邀鑾輿圖害腹心漸逞姦毒公先機立斷禁旅遽齊坐遏凶渠保護帝輦指名魁首俄頃追擒其餘躁競進取之徒枝連葉著之黨或志諧狂計罔自正身或迹比頑童居然就禍莫不盡苞恢網同抵國章由是宗社乂寧中外協睦非夫忠謀天假廣業神通其孰能如此乎及於廟堂議功公在第一優詔加特進本衛上將軍中尉知省事如故位輕於德賞不配勳難許沖謙終升峻級尋遷驃騎大將軍開成五年加開府儀同三司左衛上將軍封楚國公食邑三千戶食實封三百戶頒恩常例非私受也會昌元年又加食實封二百戶尋擢為觀軍容使兼統左右三軍獎舊常儀昭異渥也公每念禍伏福中祿為身纍將持盈滿莫過退休三年夏以寒暑內侵針鑿罕效因求散秩用遂素懷乃除內侍監將軍知省事如故尋又連表陳讓固辭恩榮優詔以本官致仕其年六月二十三日薨於廣化里之私第享年六十有三嗚呼身隨運往名寄勳留一代推雄九原表傑天子悼之罷朝兩日贈揚州大都督公弱冠以辨智取位強仕以幹蠱居官及蒞大政以機略致勳勞臻於貴壽以恬退保終始事在簡册爵極天人出入七朝顯揚三紀秩以功藝進道由忠直彰擊鞠廣場則馳先百馬彎弧迥野則飛落雙雕故得侍娛遊則三領五坊承顧問則八加供奉元和中盧從史倚上黨兵徑陰結叛臣憲宗皇帝命護軍中尉吐突公統戎專征密勿神算誘至幕下縛送闕庭是時公適在軍助成丕績其或揚鑣宣命電掃雷驚每播深恩親當橫陳兩河平殄頗預其功雖不自矜實傳衆口而多材多藝強記博聞舉策畫若應神明閲簿書無逃心目而又精鑑冠絶當時門館賓僚薦延功行必求明德用輔聖朝則有秉忠正之心荷匡贊之任才表正佐出為國楨康濟㣥生輝華四海者矣然後知衛將軍七擊胸奴封侯九國崔驃騎六征絶塞列將八人特美高勳豈膺賢弼以今方古我德為優以四年正月二十三日歸葬於萬年縣寧安鄉鳳栖原社季村夫人安定胡氏祔焉禮也夫人故開府儀同三司檢校太子賓客兼御史大夫贈戶部尚書承恩之女性德天才儀標冠族叶組紃之懿範彰圖史之貞規法度所以正家柔間所以遵道洎祥開鳳兆德協鵲巢芳徽溢於閨闈令則洽於姻族以公勳位峻重纍封至魯國夫人壬戌歲先公而歿有男五人長宣徽使銀青光祿大夫行內侍省內給事賜紫金魚袋曰從廣次光祿大夫檢校散騎常侍持節曹州諸軍事守曹州刺史兼御史中丞上柱國南安縣開國公食邑一千五百戶曰亢宗次閣門使朝散大夫行內侍省內府局丞賜緋魚袋曰從源次邠寧監軍使中散大夫行內侍省內侍局丞賜緋魚袋曰從渭幼曰從潩皆稟訓過庭早通詩禮承恩入仕共效忠勤為明庭之羽翰作私室之符瑞不忘素業自致青雲宜乎懿德有後信不誣矣大中紀號五年克平四裔東南款化西北開疆三耀舒光八紘無事皇帝念功軫慮録舊申恩惟楚公永貞時祖宮有翼戴之勞元和時宣徽有委遇之渥今則已悲封樹未刻松銘乃命舉其殊庸勒在貞石用傳不朽昭示將來特詔詞臣俾其撰述臣薰恐惶直敘不敢虛美謹為銘曰仇氏之先本宋大夫就義輕死名昭册書厥後聞人漢香燕儒乃生楚公前修不渝其一焯焯楚公俊乂邁德克抱才器必循典則天資忠孝神助正直高揭勳名幾摧姦慝其二從史負力潛通鎮郊上將授詔縛歸天朝楚公佐成衆不敢搖東國大定塵氛自消其三蔡寇不庭誅行原野㣥校傷敗師無進者楚公銜命汗血波瀉貔貅鼓氣城壘連下其四注訓勃戾妖淩北宮和鑾在御狂祲來衝楚公奮臂甲士趨風克殲渠孽乃建殊庸其五五坊三居公畋有節宣徽八人密議攸竭再監戎閫將校感悅一牧郊垌驊騮敻絶其六佐佑帝室手提禁師士伍胥附皇心勿疑持滿先戒居高不危懸車告謝彭薛肩隨其七駭起截飇哀纏逝水空留洪烈永載青史精爽何之壯猷已矣京兆開阡壽堂在此其八仕承泰運歿偶昌期徽音不泯令嗣銜悲聖念既勤爰斫豐碑事功難究有靦色絲其九川常不移松楸已列元室雖閉清風靡歇作皇代之英臣期終古兮無絶其十維大中十二年歲次戊寅十月己丑朔二十一日己酉中散大夫守棣王府長史分司東都上柱國鄭薰謹齊沐馳心請前潮郡軍事押衙兼孔目院知勾汪玕以清酌庶羞之奠致祭於敬亭山梓華府君之靈薰以丙子歲自河南尹蒙恩擢受宣歙觀察使至止之後修祀府君愚以為聖朝愛人上有堯舜藩方重任體合捐軀直誠徑行仰託神理遂不顧姦豪之黨惟以貧病為心疲人受屈必與伸雪有押衙李惟真者家道巨富久為橫害置店收利組織平人薰召看店行人痛加科責其子自長姦穢狼籍都押衙崔敬能頻來相見懇請科懲以惟真年齒甚高特為容庇乃自疑懼潛蓄姦謀討擊使余雄置石斗門絶却一百三十戶水利自取此水獨澆已田推鞫分明止於退罰其子余悅公然殺人方繫獄中尚未斷割遂為同惡以出其兒小將康全泰凶賊無賴被妻告言屠狗盜驢罪戾頻發兩度決杖止於笞臀過皆不輕斷悉非重而乃不顧恩義侮易朝章同謀翻成白刃脅逐薰此時深念謂無神理雖乏良術且是苦心猖狂若斯靈祈不救其後一家百口同時出郭之後首有百姓前潮郡押衙汪玗走來相接扇蓋畜乘便濟危途秀才薛復尋亦同到汪生又招舟船初則未有來者汪生乃大呼曰李惟真康全泰等交扇凶黨迫逐大夫口云怨大夫護惜百姓今者無船可發豈得不救舟船遂來得以即路至山莊後有百姓姚元貞饋饌兼錢二緡續有前宣郡衙前虞候胡政借船兩隻及食物之輩兼與汪生同在船中慰安引接及夜分到水陽南數里有長樂氏子其名曰康借一大船供給食物兼贈粥藥與錢五千殷重慰安分逾骨肉當此之際凶徒充熾白刃如雨冤聲震地此五人者乃致其性命繼來相救雖義心所激亦神理潛施自此北去一路順風若有牽持更無阻滯將取蕪湖去路已過丹陽湖口聞一人語聲云不如丹陽湖過即便回船數里却取丹陽湖路丹陽湖水淺草深過者多須兩日此時緊風吹渡食頃百里及到當塗乃知蕪湖路尋被賊黨把斷不許船過方悟言者得非神歟入江路後四面雷電惟有此船更無風浪兩日兩夜遂達揚郡然後知如此之事皆非人力固是神靈暗助念其朴愚直守章程以理訛弊昭昭之報事實不誣今則中丞溫公以忠孝明誠嘉猷碩畫遠稟宸算親臨亂邦凡曰凶徒皆就梟戮各通手狀自謂不冤玉石大分黑白無誤立功將士等聽溫公之激勵受溫公之指撝共成勳庸皆傳史册薰陰蒙府君救導之德顯沐溫公披雪之恩遠將血誠冀達神鑒惟馳懇到用代馨香觴酒豆肉一願歆受伏惟尚饗洵大中時官廬江縣尉真如至言大仙妙説一句一偈千帙萬緗殷勤破煩惱之門曉了示慈悲之行尊勝陀羅尼經者光揭日月功貫生靈闕四字與京得彼岸於斯為盛昔如來為諸天説善住消七返之殃帝釋親啓德音波利傳乎祕密粵有內侍省衆寮等悟佛知見信佛勝因虔是念於有為冀我躬之無咎謂貝葉之速朽不足紀其言謂卷石之至貞可以刻其字於是捨清俸鳩金錢徵良工琢貞堅鎚丁丁以火發刃戛戛以冰裂以元和歲在單閼月臨太蔟十有五日庚戌之所建也從此幢前香起石上塵飛落輕衣以拂災歷諸境而戩穀元功不測銘曰大覺妙力尊勝其強增壽益齡夷災殄殃六趣之闕七返之闕聞我一言熱得清涼火為蓮池獄作天堂邇言非謬證自梵王元謨大中時人大唐大中五年五月二十日河南府永樂縣中條山陽道靜院有道士姓侯名道華修道升仙時年三十四芮城人也真人生而如愚默悟真道是非泯絶笑傲雲水初常庶人之服師事道靜院主周悟仙以其器貌鈍懦遇之以施力之儔常役之以農耕勞之以樵採悟仙弟子十餘輩共輕而賤之真人內自敏曉外貌咍咍然口亦咄咄而吟言道也者不可離也又鷃安知一舉九萬乎悟仙聞而奇之及授之冠帔雖服道衣執勞無替師役之暇則採藥草鍊五粒松脂子及根葉或湯而飲之或丸而吞之莫識其術一旦暴疾如中惡毒久而乃活因而不食鹽米之氣好作詩歌獨吟朗詠人或覺其聲音清暢亦或覩其鬚髮清光肌骨洞徹真人曾省兄歸芮之故里經進士崔珵墅居書齋之壁有一芝草真人看而笑指一芝曰曾於五老峯側得而食之其年夏之清旦有一羽客并一童子從忽至廬中真人異而禮敬及坐曰吾居且非遙聞君至道故相訪耳君道已成仙籍有名其期不遠天人來迎言訖而去真人送行北升山坂數里仍令侯君改姓與名為李內芝名繫上清宮善進院真人曾為尊殿之前松林暗翳三光耀蔽啓其師請削去繁枝松百株皆真人手植而高聳忽有范陽盧穎自蒲罷幕寄居永樂間遊道靜因詰削松枝者誰曰道華盧君詬責欲請邑宰治之真人曰得非宿殃乎乃詣道士姚黃中請筮及卦成姚曰兆之無吝有喜自天卜何也真人笑而不答姚乃飲以巵酒而歸及中途遇一老人衣破敝與之俱行忽覺喉中塞而且癢老人開口乃折桑樹枝攪其喉遂吐其蟲出約有三升頭黑身白長寸餘行數里喉又癢老人方潄口掬澗流而潄復出蟲三升狀若前者逡巡失其老人是夜歸院來旦師令出刈麥三十畝不終日而擔負積院路有山櫻桃食之曰此後永不再食也是夜同院道流但見沐浴以為收牟因熱夜之及半烈風雷雨折樹驚人及曉道華之戶尚閉衆開而覓之不知所從房中惟有燒書之燼其尊殿有一喬松六丈下鋪一席上有香爐煙火未絶及並所靸雙履在地其冠帔繫結松梢不可得而取之房中鏡子帶上有詩曰鍊得大還丹多年色不移前宵盜喫却今夜碧空飛慚愧深珍重珍重鄧尊師師與司馬山人燒得大丹封在尊殿內未服而謝多時鍊得藥留著待內芝吾師知此術速鍊莫為遲三清專心待大羅的有期於是具聞廉察廉察上奏於時官吏士庶瞻禮稱歎焚香供養日有千衆歲餘不絶元謨宰芮之日備聞斯實欲旌顯之事力未及恩命除替固遺恨也果有河東薛公詢牛刀割雞利刃多暇有惡必懲聞善必舉乃於縣西北約二里古道之石即真人降生之地築臺刻石永傳不朽彥遠桂管觀察使文規子乾符中官大理卿夫畫者成教化助人倫窮神變測幽微與六籍同功古先聖王受命應籙則有龜字效靈龍圖呈寶自巢燧以來皆有此瑞庖犧氏發於滎河中典籍圖畫萌矣軒轅氏得於溫洛中史皇蒼頡狀焉是時也書畫同體而未分象制肇創而猶略無以傳其意故有書無以見其形故有畫按字學之部其六曰鳥書在幡信上書端象鳥頭者則畫之流也顏光祿云圖載之意有三一曰圖理卦象是也二曰圖識字學是也三曰圖形繪畫是也又周官教國子以六書其三曰象形則畫之意也是故知書畫異名而同體也洎乎有虞作繪繪畫明矣既就彰施仍深比象於是禮樂大闡教化由興故能揖讓而天下治廣雅云畫類也爾雅云畫形也説文云畫畛也象田畛畔所以畫也釋名云畫挂也以采色挂物象也故鐘鼎刻則識魑魅而知神姦旗章明則昭軌度而備國制清廟肅而尊彞陳廣輪度而疆理辨以忠以孝盡在於雲臺有烈有勳皆登於麟閣見善足以戒惡見惡足以思賢故陸士衡云宣物莫大於言存形莫善於畫此之謂也彥遠家傳法書名畫自高祖河東公收藏珍祕河東公書迹俊異尤能大書本傳云不因師法而天姿雄徑定州北嶽碑為好事所傳曾祖魏國公少稟師訓妙合鍾張尺牘尤為合作大父高平公幼學元常自鎮蒲陝迹類子敬及處台司乃同逸少書體三變為時所稱金帛散施之外悉購圖書古來名迹存於篋笥元和十三年憲宗纍訪珍迹當時不敢緘藏遂皆進獻長慶初又於豳州散失傳家所有十無一二先君尚書少耽墨妙備盡楷模彥遠自幼至長習熟知見竟不能學一字夙夜自責然而收藏監識有一日之長因採掇自古論書凡百篇勒為十卷名曰法書要録又別撰歷代名畫記十卷有好事者得余二書書畫之事畢矣豈敢言具哉大歷初彥遠曾祖魏國公留守東都兼河南尹洛陽當孽火之後寺塔皆為邱墟迎致嵩山沙門澄沼修建大聖善寺沼行為禪宗德為帝師化滅詔諡大即東山第十祖也洎鎮於蜀皆有崇飾在淮南奏三祖大師諡號與塔額刺史獨孤君為之碑張從申書字夫稟儒道以理身理人奉釋氏以修心修性其揆一也會昌天子滅佛法塔與碑皆毀像雖毀而法不能滅是法也不在乎塔不在乎碑大中初塔復置而碑未立咸通二年八月遂與沙門重議刊建舒州刺史河東張彥遠遂書於碑之陰彥遠家有馮承素蘭亭元和十三年詔取書畫遂進入內今有承素樂毅論在並有太宗手批其後張彥遠記夫識書人多識畫自古蓄聚寶玩之家固亦多矣則有收藏而未能鑒識鑒識而不善閲玩者閲玩而不能裝褫裝褫而殊亡銓次者此皆好事者之病也貞觀開元之代自古盛時天子神聖而多才士人精博而好藝購求至寶歸之如雲故內府藏書謂之大備或有進獻以獲官爵或有搜訪以獲錫賚又有從來蓄聚之家自號圖書之府蓄聚既多必有佳者妍蚩混雜亦在銓量是故非其人雖近代亦朽蠧得其地則遠古亦完全其有晉宋名迹煥然如新已歷數百年紙素彩色未甚敗何故開元天寶間蹤或已耗散良由寶之不得其地也夫金出於山珠産於泉取之不已為天下用圖畫歲月既久耗散將盡名人藝士不復更生可不惜哉夫人不善寶玩者動見勞辱卷舒失所者操揉便損不解裝褫者隨手棄捐遂使真迹漸少不亦痛哉非好事者不可妄傳書畫近火燭不可觀書畫向風日正餐飲唾涕不洗手並不可觀書畫昔桓元愛重圖書每示賓客客有非好事者正餐寒具以手捉書畫大點汚元惋惜移時自後每出法書輒令洗手人家要直一平安牀褥拂拭舒卷觀之大卷軸宜造一架觀則懸之凡書畫時時舒卷即免蠧溼余自弱年鳩集遺失鑒玩裝理晝夜精勤每獲一卷遇一幅必孜孜葺綴竟日寶玩可致者必貨敝衣減糲食妻子僮僕切切口某蟲口某蟲或曰終日為無益之事竟何補哉既而歎曰若復不為無益之事則安悅有涯之生是以愛好愈篤近於成癖每清晨間景竹窗松軒以千乘為輕以一瓢為倦身外之纍且無長物惟書與畫猶未忘情既頽然以忘言又怡怡然以觀閲常不得竊觀御府之名迹以資書畫之廣博又好事家難以假借况少真本書則不得筆法不能結字已墜家聲為終身之痛畫又迹不逮意但以自娛與夫熬熬汲汲名利交戰於胸中不亦猶賢乎昔陶隱居啓梁武帝曰愚固博涉患未能精苦恨無書願作主書令史晚愛楷隸又羡典掌之人人生數紀之內識解不得周流天壤區區惟恣五欲實可愧恥每以得作才鬼猶甚頑仙此陶隱居之志也由是書畫皆為精妙况余凡鄙於二道能無癖好哉珝宣宗朝知制誥門下天垂星而分將帥北極是尊地列嶽以體藩垣四方乃定自古王者因而法之旁求俊髦應彼形象前振武節度檢校刑部尚書李丕天資壯勇代習韜鈐追奔而不務前茅處已而常慚背水頃者壺關不順方事阻兵爾能蹈白刃而來推赤心向國洎纍更符竹咸布謳謠陟其所明以邊事首遂著平戎之效遙張破虜之威致使黃河陰山寇盜皆息朕以燒羌作梗朔塞成榛禍結兵連兩經春夏是用輟爾代北委之雕陰作吾金湯翼衛邦甸所宜以伐謀為上策以無戰為奇功禁暴安人克靖烽驛秋曹二憲再飾旌旄往惟欽哉順我休命門下擁旄作鎮授任分憂訓師旅以恢武經厚風俗以闡文教膺茲重寄允屬勳臣正議大夫守河南尹柳仲郢清嚴草泣職禮樂承家動惟執中居必慎獨稟端慤之正氣抱通濟之宏才早踐華資備揚懿業會府著彌綸之美諫垣留謇諤之規洎領郡符亦茂休績出入十載尹正兩京堅貞不回沉毅有斷歷試斯久聲猷疑闕必能克終令圖副我專委是用付以戎律登茲將壇乃眷左綿實為右屏控壓夷落保衛皇都非慈惠博施不可以乂安黎庶非威懷並舉不可以綏靖封疆所宜膏潤一方澄清八郡簡條章以檢郡吏齊法令以肅三軍大宗伯大司憲兼而寵之以表殊獎勉承新命無怠前修簡言字欲訥福清人大中時第進士官漳州刺史人有儒其業與孟軻同代而生不遂師於軻不得聞乎道閣下豈不謂之惜乎又有與揚雄同代而生不遂師於雄不得聞乎道閣下豈不謂之惜哉有習於琴者問其所習必曰吾師於某某所傳師曠之道也習於弧者問其所習必曰吾師於某某所傳濯孺子之道也脫二人未至於古然亦無敢是非者以所習有據故也儻曰吾自能非授受於人也必知其音俚音也其能庸能也嗚呼聖人之道與琴弧之道相遠矣而琴弧尚能自習之如此况聖人之道乎去夫子千有餘載孟軻揚雄死今得聖人之旨能傳説聖人之道閣下耳今人睎閣下之門孟軻揚雄之門也小子幸儒其業與閣下同代而生閣下無限其門俾小子不得聞其道為異代惜焉仲尼以季氏旅於泰山為僭漢武封泰山為僭歟抑聞無其位無其德為事僭也有其位無其德為事亦僭也又聞封泰山報成功也斯皆德稱乎位者為之若伏羲神農者也若軒轅顓頊者也若堯舜禹湯者也漢武封禪奚慕哉秦乎伏羲乎堯舜乎秦封禪二代而秦滅固不可慕也若以伏羲堯舜為心亦宜訪伏羲堯舜之道與所以行之道侔之乎不侔之乎彼茅茨不翦而木不呈材豈曰侔哉彼舞於兩階而黷武窮邊豈曰侔哉彼用夔典樂而李延年進豈曰侔哉彼設謗木而捕人誹者死豈曰侔哉凡所舉雖厮養之人亦知不侔矣在漢武計宜罷去不侔行其侔者已行之則卿大夫行之卿大夫行之則國人行之夫如是雖不封禪而伏羲堯舜之德之美自至矣奈何不遵此道取司馬相如諛佞遺草內欺於方寸外欺於千古矯名竊德冒煙雲躡凌兢封泰山禪梁父好商辛夏癸之好迹伏羲堯舜之迹季氏之僭安可逃乎昔齊桓公議封禪管夷吾用他辭以罷之以其無帝王位故也無德與無位相去幾何儻漢朝有人如管夷吾應用三脊茅以籍固不使其君與季氏等長慶壬寅歲簡言賃居善和里貧窶濩落交親罕至無何一日門有扣聲合申疾薄部疑得何紹姓字延乎賓客具酒為誠再至亦如之既熟至之又至之乃至於日至嘗從容談及忠孝之道無位無陳力之所無聞非過也孝之道以色為至難貧如黔原無聞非過歟豫聆其詞得其心知其孝道篤也後曰吾違親久矣趨庭之意無曠日時今越七日歸古有贈言豈無曠乎曰慈烏返哺孰謂禽也吳起不歸孰謂人也東渭橋有賈食於道者其舍之庭有槐焉聳幹舒柯布葉凝翠若不與他槐等其舍既陋主人獨以槐為飾當乎夏日則孕風貯涼雖高臺大屋諒無慚德是以徂南走北步者乘者息肩於斯稅駕於斯亦忘舍之陋長慶元年簡言去鄜得息其下觀主人德槐之意亦高臺大室者也洎二年去夏陽則槐薪矣屋既陋槐且為薪遂進他舍因問其故曰某與鄰俱賈食者也某以槐故利兼於鄰鄰有善作梟鳴者每伺宵晦輒登樹梟鳴凡側於樹若小若大莫不懍然懼悚以非鬼物之在槐也不日而至也又私於巫者俾於鬼語槐不去梟不息主人有母者且瘵慮禍及母遂取巫者語後亦以稀賓致困簡言曰假為梟鳴滅樹殃家甚於真梟非聽之誤耶然屈平騫諤非不利於楚也靳向一梟鳴而三閭放楊震訏謨非不利於漢也樊豐一梟鳴而太尉死求之於古主人亦不為甚愚
