front:
  text: 全唐文欽定全唐文卷六百二十七呂溫三
  hash: sha256:e0ad65bd6b65832084cf1510a4c4cf1060ecb30fe4e4db02b879c06e2e105e6e
body:
  text: 當州舊額戶一萬八千四百七除貧窮死絕老幼單孤不支濟等外堪差科戶八千二百五十七臣到後團定戶稅次簡責出所由隱藏不輸稅戶一萬六千七百伏緣聖恩錄臣在道州微效擢授大郡令撫傷殘臣昨尋舊案詢問閭里承前徵稅並無等第又二十餘年都不定戶存亡孰察貧富不均臣不敢因循設法團定簡獲隱戶數約萬餘州縣雖不增徵科所由已私自率斂與其潛資於奸吏豈若均助於疲人臣請作此方圓以救凋瘵庶得下免偏苦止不闕供門㦸十二竿右今日中使某乙至臣私第奉宣聖旨賜臣前件㦸者臣伏以國朝之制名器尤慎吏考三十始秩銀青戰勳十二乃號柱國必資具美方錫殊榮於是有命服以朝加㦸於戶將勸勞而責實亦馭貴而崇名上無謬恩下不虛受臣迹非奇致擢自諸生先皇以廉謹賜知密勿踰於一紀陛下以勤憂過聽委遇首於㣥僚叨據樞衡亟移星歲雷霆用武曾無犬馬之勞日月垂文豈有螢燭之助徒以侍祠清廟拜舞鴻名累逢慶賚驟假勳秩禮異其數物盛其容新其閈閎賜之棨㦸衡門燕雀乍相賀於朱楹武庫龍蛇忽追飛於陋巷焜燿當代寵靈自天聚族知慚殺身匪報無任荷懼屏營之至謹奉狀陳謝以聞右臣伏以陛下降誕之辰率土蒙幸臣於含氣之內獨受深恩思所以稱慶南山獻心北極遂割骨肉之愛俾歸空寂之門結幽願於金仙奉勝因於寶壽冒昧上請精誠匪他陛下以釐革初行渙汗無反憐臣罄至之分事與恩違念臣愚魯之忠貸於法外特降中使俯加慰諭臣忝居端右之地首干畫一之科誠雖奉上義乖率下合當嚴譴忽被殊私震驚失圖慚跼罔據荷降鑒之明原情斯在蒙曲全之澤為感則深輒凟宸嚴伏增隕越謹奏右臣聞化人成俗莫大於禮樂垂統建中必資於制度然而忠敬有弊質文異數㣥儒之得失蜂起歷代之沿革絲棼或榮古而陋今名實交喪或違經而便事本末相忘或煩雜以為詳或濶略以為要未聞折衷以叶通方國家與天惟新改物視聽太宗拯焚溺之餘麤立統紀元宗承富庶之後方暇論思爰敕宰臣將明睿旨集儒賢於別殿考古訓於祕文以論材審官之法作大唐六典三十卷以道德齊禮之方作開元新禮一百五十卷網羅遺逸芟翦奇邪亘百代以旁通立一王之定制草奏三復祗令宣示中外星周六紀未有明詔施行遂使喪祭冠婚家猶異禮等威名分官靡成規不時裁正貽弊方遠伏惟睿聖文武皇帝陛下恢纂鴻業允升大猷雷霆奮有截之威日月廓無私之照三叛就戮四夷來賓牛馬放於農郊兵革藏於武庫嚴禋上帝祗受鴻名惟懷永圖不自滿假昧爽聽政子夜讀書處成功而弗休率至理若不及每懷經始則知貞觀之難言念持盈思復開元之盛臣謬忝密務兼掌圖籍無能輔弼已負於恩私有所建明豈先於典禮伏見前件開元禮六典等聖朝所制鬱而未用奉揚遺美允屬欽明然或損益之間討論未盡或張弛之際宜稱不同將貽永代之規必俟不刊之妙臣請於常參官內選學藝優深理識通遠者三五人就集賢院各盡異同量加刪定然後敢塵睿覽特降德音明下有司著為恆式使公私共守貴賤遵行苟有愆違必正刑憲如此則職官有制將興濟濟之詩風俗大同坐致熙熙之詠見可而獻知無不為輒凟宸嚴伏增隕越謹狀右臣前月十四日至清水縣西吐蕃舍人郭至崇來迎便請將書詔先去臣以二十一日到薄寒山西去蕃帥帳幕二十餘里停止至二十三日方見尚綺里徐撥布論乞心熱奉宣進止兼付賜物莫不祗奉聖恩感悅過望部落歡抃道路謳歌加以接待殷勤供億豐厚竭誠歸化形狀可知臣親覩蕃情不勝慶躍綺里徐等固欲令臣與薛伾領蕃使卻歸奏事臣當時苦爭請赴衙帳自辰及午意竟不移今日再見懇論盡詞往復勢既難拒恐失事宜即於今月五日令臣與張荐分背便發彷徨中路憂懼實深心魂震驚進退無據謹勒某官某乙陳奏以聞謹奏右臣伏以前件官操履有恆吏事精舉處繁簡肅折獄詳明尤於撫綏實著效績今道州賦稅畢集流亡盡歸虔奉公程日至清淨委心於理古人不如衡州凋敝累年常積逋欠實籍財用以安疲黎伏望除衡州刺史臣職當廉察上奉詔條觀善薦能臣合竭節七州之事敢不精詳前件官小心理務夙夜奉公才識出人效績尤著况道州風俗獷猾前後難為緝綏自溫條理已來疲人盡皆蘇息觀其能政堪為表儀臣輒舉所職上達聖聰伏望天恩允臣所請昔衞蒯聵以竊國之詐盟其陪臣服冕乘軒三死無與近代惑者因為口實於是乎有功臣恕死之典考諸古訓其異端歟稽諸時事其亂本歟何者有國之柄莫大乎刑賞人生有欲不可以不制天討有罪不可以不刑蓋刑者聖王所以佐道德而齊天下者也功濟乎物不可以不賞賞勸乎功不可以不信蓋信者聖人所以一號令而惇天下者也然則恕死之典棄信而廢刑何以言之夫立功者自八元十亂之後非盡能賢或有起屠販壟畝行陣之間乘帝王應天順人之勢用力無幾遂貪天功超騰風雲各得變化率勞怙寵崛強自負僭冒無厭見利忘義是宜崇威峻法大為之防而反丹書鐵券許以不死其功大者可以五作亂而十犯上孰不以暴為無傷乎且人君之言如渙汗不反既與之要天地誓山河卒一旦失馭有黥韓之罪神怒人怨不得已而誅是棄信也若恣行兇險隳突憲綱或姦鋒將發釁逼宗社乃念斯言之玷忍而不誅是廢刑也向者纔得其塵涓之勞螢燭之助而信棄刑廢將焉用之使賢而有功驚寵懼滿自居無過之地何恕死為使愚而有功小人不幸又告以無死是增驕而啟奸適所謂賞之禍也雖恕之死其能免乎夫其賢如太公忠如伊尹惟君知臣可以勿貳而遽宥以罪死是逆其不忠非所以待之以誠而盡君子之心也若乃猾如狗盜庸如黥徒未有罪而先恕之死是不許其慕生廉恥自固名節非所以道之以德而勸小人之善也以為明君之處勞臣也安之以爵祿拘之以紀律明之以好惡聳之以禍福使得遷善遠罪保勳全名剖符傳慶與國終始恩斯勤斯是亦極矣奈何撓權亂法以罪寵人墜信賞必罰之典虧昭德塞違之道恐非哲王經邦軌物之制也謹議議曰先王賞以飾喜罰以飾怒喜必待功而賞不僭行怒必得罪而罰無輕赦其來尚矣漢室雜霸道而隳王制昧宏規而狃小利俾人納粟除罪拜爵以罰人則廢法以賞人則廢功以儲蓄則廢本是阻勞惠奸而怠棄南畝也何以言之惟名與器不可假人而班爵於兼并之家析圭於滯積之室使屠沽賤隸陵駕英豪苟有懷廉恥之心豈復致患難之死雖月要天地日誓山河而賞不足以勸矣天討有罪刑茲無赦而撓權於殘賊之徒屈法於奸宄之黨使兇人酷吏言暴無傷苟開必免之門孰懲罔極之惡雖臨以斧鉞驅於鼎鑊而刑不足以威矣且朝縻好爵以粟授受國有常刑以粟出入貪利愛生之夫孰不願空壟畝而貨圭組竭倉廩而救死亡拜爵者坐等封君遂忘其本業免罪者室如懸磬曷保其生聚雖使三公九卿躬執耒耜而嗇不可以務矣於戲賞罰者君人之大柄農嗇者為國之永圖忽而棄焉曾不是念而利乎國儲之蹔實兵食之僅濟其何補歟然而漢承秦弊中國耗弱高惠務厥完輯孝文守以恭儉德未浹於海外威未行於四夷邊候猶聞擊柝戎士不得解甲晁錯是以有權宜之對救弊之術偷利於當代幸成於一時雖曰有因而為終貽識者之誚國家體元御極繼天而作騰軼殷周紹休唐虞率我蒸人登於壽域王一變至於帝帝一變至於皇非大道之謨不聽非聖德之猷不問焉有襲近古之失策采庸臣之詭論者哉必患國廩猶虛邊餽未繼莫若興李悝之平糴務充國之屯田練將簡兵以省軍費輕徭薄賦以悅人心東作一興西成再秩則太倉之蓄如京矣塞下之稼如雲矣亦何必虧昭德塞違之道墜信賞必罰之典恐非聖唐經邦軌物之制也謹議右臣謹桉地圖舜陵在九嶷之山舜廟在太陽之溪舜陵古者已失太陽溪今不知處秦漢以來置廟山下年代寖遠祠宇不存每有詔書令州縣致祭奠酬荒野恭命而已豈有盛德大業百王師表沒投荒裔陵廟皆無臣謹遵舊制於州西山上已立廟訖特望天恩許蠲免近廟三五家令歲時埽灑以為恆式豈獨表聖人至德及於萬代實欲彰陛下元澤被於無窮謹錄奏聞某經術無取邱園自屏所期全拙豈敢近名二十五丈汎愛博容不遺孤陋申以通家之好遇以國士之禮分慚入堂契辱忘年猥蒙吹噓謬假鱗翼遂得價重江左名聞天朝起家拾遺再命柱史時丁變故命偶屯艱孤鱗方困於蹄涔窮鳥思歸於仁德果蒙奏領列郡擢倅三軍不汝疵瑕見容於歲月同我休戚每形於話言身計皆奉良規家事悉資全力然後表達宸聽推致周行南宮劇曹踐不終歲憲府雄秩拔於常倫內顧庸虛敢云自致魏賢子夏宣尼之道彌彰漢用淮陰相國之言始重徒以才負知已名懸古人致遠之效莫彰貽羞之責斯及敢不砥礪微分激昂前途以明主今日之恩資大賢積時之譽庶乎有立少答所知豈敢以尺素為榮而負平生之論伏惟有以鑒察郡榻諸生戎旃故吏推獎恩重生成感深瞻望門闌未獲拜謝銘戴兢惕莫知所裁拳拳下情紙墨難具某再拜僕射稟天全才受國重寄控全蜀咽喉之地當狂寇奔侮之衝治瘠土而其材甚豐訓羸師而其武可畏少分麾下潛運掌中再開劍閣之扃繼獻鹽亭之捷應接制使先假地征犄角王師且為鄉道削叛臣之跡釋梓州之圍勞實居多功無與讓聖上神武睿斷注意西南一校之善否必知一夫之勞逸必察况閣下效彰朝論事布人謠精誠貫於神祇茂伐懸於日月豈復聽簿書之微巧詆笙簧之濫音來示所虞無足介意某以寡薄謬膺重任舉關國計動屬軍期夙夜憂慚未知所濟過蒙稱獎愧惕良深惟托方岳至公共守王度物估小事固無二三許共遵行亦如受賜佩荷之至無喻下情某再拜奉別紙示諭眷待殊異規略端明究忠義之苦言暢經通之雅旨皆足以感動朝野光映古今一字之貴可懸於千金終身佩之何啻於三復甚善甚善伏以尚書才膺間出識蘊生知地承勳德行在詩禮自家達國移孝為忠受任先朝克荷崇構控喉襟之地成節制之師動必勤王志皆憂國忠實彰於行事義聲感於旁鄰布在人謠溢於時論鳴鶴有和鼓鐘必聞聖上神武聰明維新覆幬勵精戎事注意藩隅方仄陋以旁求况勳賢之自著何患乎誠不上達道不大光宣太阿之利用窮彞鼎之盛烈者乎某以寡薄謬膺寄任成賦之重撫事知慚徒欲盡愚衷悉陳鄙見策朽磨鈍庶效涓埃竭誠捐軀少酬恩遇知我者寡同志實難頃在江西過辱厚意常懷慕仰頗歷歲時昨者以私鹽干禁漸耗公利汴州滯運屢稽軍期忝當職司每積憂負輒率誠懇麤申條例網羅盜販節宣通渠實托眾賢敢專獨見果蒙宏至公之量推急病之心率先侯伯首贊王度許以別設方略大為隄防究絕姦源通利國漕神之聽之言可復於天地有始有卒事必立於邦家佇觀莫大之功以成不朽之美諸侯師表天子腹心千載一時誠無以讓某奉職之分受賜宏多拳拳寸誠夙夜欣企幸甚幸甚徐傪宜並在使者口述伏惟照悉某性質鄙昧智能無取承藉門緒早蒙驅策盡瘁軍府備嘗艱險徒竭犬馬之勞詎濟弓裘之美家構未克國恩未酬而謬典禁司職惟侍衞良時自晚宿志莫申憤血猶剛憂髮先白加以稟性寡合知音實難甘心此生長鳴靡託豈料尚書推宏深之量啟特達之心愛念不遺眷知益重昨者四牡來覲萬乘虛襟旁求將帥之臣佇清至公之鑒然則蕭何之稱必在韓信孝文有問宜薦雲中而丹墀對敭首及庸瑣敷陳本末獎飾逾涯達其忠義之誠許其遠大之致雖躬論志業自瀝肺肝纖悉周詳豈能及此遂使鬱堙之志允達於宸聰樗朽之材式孚於帝念言發九天之上聲聞四海之中行得舟航坐生羽翼雖管鮑在齊載深知我之感王貢仕漢有切彈冠之善方諸今日未足為喻不圖知己之至於斯義激血誠恩纏骨髓每一念至不覺涕流殞首糜軀豈能報德唯當竭誠砥節服義懷仁奉以周旋居之造次貞松得地方見於歲寒皦日在天願明其心誓死生幸甚幸甚屬有負薪之疾未申拜賜之禮瞻荷之至感懼兼深拳拳下情未知所措稍任行李即冀趨謁伏惟照察某以非才謬當重任事關國計動限軍期撫事知難夙夜憂積蓋以運路擁滯私鹽撓法力非有司所及唯託方鎮至公伏惟司空文武全才勳德茂著朝廷毗倚中外具瞻勤王則知無不為憂國則言皆可復今春過日獲拜旄麾眷私之餘已列此事蒙許同志立法叶力徇公對敭之初便具聞奏所以遣裴郎中往申朝旨議立規模悉令諮託大賢非敢專行鄙見昨得巡院狀報伏承司空德量旁通忠誠感發急公家之病同職司之憂鹽法隄防已行文牒斗門開塞許有商量率先諸侯首贊王度義形九牧忠動三軍意開而遠近承風言發而神明知感况某奉職之分承眷之深受賜懷仁豈同常等銘戴所至無喻下情大尹叔父閤下某聞水官修而龍至官失其方物乃坻伏以文章而言則先進為後進之官也亦宜正襃貶別雅鄭宣六義合三變以修其官使後進之徒靡然向風皦然知方能者勸不能者止於是乎文章之可見也如掃除氛昏澄定波濤穹天清而日月耀滄海晏而蓬壺出今夫先進之廢官久矣文猶龍也其可見乎伏惟叔父蘊特進之明哀雅頌之缺常欲以三代制度訓斯文前罷鎮南服入侍東掖詞林聳仰如日登觀莫不結轍連駟懷編捧軸差池道路奔走光塵人人自以為齊公之遇矣及乎昌言金馬高議承明懸大雅之衡以權後進則乃以小子為稱首達勾萌而茂以柯葉翼鶵而使之頡頏先達改觀同類駭聽譽動朝端聲馳轂下循顧反覆誠非所堪竊料叔父之意豈不欲使濫音竊吹者聞士會而西逃秦境敦行守正者望郭隗而北首燕路夫如是則小子敢賀天下文章廢而復興不敢自當其遇也然大匠雖哲不能化擁腫之材大風雖壯不能起凝滯之物曩充鄉賦薦辱公議昨詔賢良猥塵清舉叔父以唱高寡和小子以名浮易喪間關堙鬱卒用無成取笑薄徒貽羞左右雖失鵠而知反終胡顏而敢安愧懼慚惶夙夜若厲叔父蹈中庸之德遭兼濟之運荷深知於明主懸大望於蒼生一朝秉唐之鈞埏埴萬物而高明不奪於獨見鄙分克彰於日新茫茫前途未敢自料豈遽以一第為得喪哉由是思之勃焉增氣遂欲攝迹聲利潛心道藝窮六籍之統紀盡三變之形容使學通天人文正雅俗然後抗衡當代為叔父之榮雖知其難志不可奪謹獻近文七首徒跂聖人之域未臻作者之方姑務自強式酬與進伏願特紆省覽光賜教誨指以遠蹤責以大成惠何加焉非敢望也儒風不振久矣某生於百代之下不顧昧劣凜然有志翹企聖域莫知所從如仰高山臨大川未獲梯航而欲濟乎深臻乎極也凡學之道嚴師為難師資道喪八百年矣自鳳鳥不至麒麟遇獲血流戰國火發暴秦先王之道幾隕於地賴漢氏勃焉而拯之釃糟粕揚煨燼披雲霧揭日月夫子文章滅而復耀與火德俱朗者四百餘年當時大教中興去聖未遠學士非師說不敢輒言鴻儒碩生樂以善誘宏道雖為公卿教授不輟其徒大者至千餘人小者亦數百人或升乎堂或入於室洋洋濟濟有古風也夫學者豈徒受章句而已蓋必求所以化人日日新又日新以至乎終身夫教者豈徒博文字而已蓋必本之以忠孝申之以禮義敦之以信讓激之以廉恥過則匡之失則更之如切如磋如琢如磨以至乎無瑕故兩漢多名臣諫諍之風同乎三代蓋由其身受師保之教誨朋友之箴誡既知己之損益不忍觀人之成敗也魏晉之後其風大壞學者皆以不師為夭縱獨學為生知譯疏翻音執疑護失率乃私意攻乎異端以諷誦章句為精以穿鑿文字為奧至於聖賢之微旨教化之大本人倫之紀律王道之根源則蕩然莫知所措矣其先進者亦以教授為鄙公卿大夫恥為人師至使鄉校之老人呼以先生則勃然動色痛乎風俗之移人也如是是以今之君子事君者不諫諍與人交者無切磋蓋由其身不受師保之教誨朋友之箴規既不知已之損益惡肯顧人之成敗乎而今而後乃知不師不友之人不可與為政而論交矣且不師者廢學之漸也恐數百年後又不及於今日則我先師之道其隕於深泉是用終日不食終夜不寢馳古今而慷慨抱文籍而太息吾兄亦曾以是為念乎小子狂簡實有微志蘊童蒙求我之願立朝聞夕死之誓所與者不唯鴻碩之老博洽之士與我同志者則為吾師與兄略言其志也其所貴乎道者六其詩書禮樂大易春秋歟人皆知之鄙尚或異所曰禮者非酌獻酬酢之數周旋裼襲之容也必可以經乾坤運陰陽管人情措天下者某願學焉所曰樂者非綴兆屈伸之度鏗鏘鼓舞之節也必可以厚風俗仁鬼神熙元精茂萬物者某願學焉所曰易者非揲蓍演數之妙畫卦舉繇之能也必可以正性命觀化元貫眾妙貞夫一者某願學焉所曰書者非古今文字之舛大小章句之異也必可以辯帝王稽道德補大政建皇極者某願學焉所曰詩者非山川風土之狀草木鳥獸之名也必可以警暴虐刺淫昏全君親盡忠孝者某願學焉所曰春秋者非戰爭攻伐之事聘享盟會之儀也必可以尊天子討諸侯正華夷繩賊亂者某願學焉此外非聖人所論不與於君臣父子之際雖欲博聞不敢學矣吾兄達者也可不曰然乎嘗閱雅論深於春秋其間所得實曰淵正竊不自揣願以春秋三傳執摳衣之禮於左右童蒙求我兄得辤乎朝聞夕死某可逆乎無以流俗所輕而忽賢聖之所重也其餘五經當今孰可為某師者幸詳鄙志而與擇焉
