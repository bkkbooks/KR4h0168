front:
  text: 全唐文欽定全唐文卷五百二十七冕字敬叔集賢學士芳子貞元中官御史中丞福州刺史充福建觀察使卒贈工部尚書
  hash: sha256:93b0caaf4b107a37583c86857e6aff7c72ba611ce99653bf711c5ced56d2da57
  markers:
  - {type: head, offset: 14, content: 柳冕, id: KR4h0168_NFKB_527-h1, level: 1}
body:
  text: 臣某言臣備位方面守鎮海隅顧無理平之績猥受增秩之榮而不自愧者顏之厚也竊感江漢朝宗之義鹿鳴君臣之燕頌聲之作王道之始也國家自兵興之後不遑議禮方嶽未朝宴樂久缺臣限以一切之制例無朝集之期目不覩朝廷之禮耳不聞宗廟之樂足不踐軒墀之地十有三年於茲矣犬馬齒衰益深戀主葵藿將暮空仰太陽古人云日雖不為葵藿回光然向之者誠也臣職在戎馬身辭日月願因朝謁一見漢儀亦臣之誠也傳曰朝以正班爵之義會以訓上下之則朝會者禮之本也臣安敢忘之故㣥后四朝以明黜陟唐虞制也五歲一見以考制度殷周制也三載上計以會課最兩漢制也其或不朝則以禮讓之故孟子曰諸侯之朝天子曰述職一不朝則黜其爵再不朝則削其地三不朝以六師移之然則諸侯朝會尊王室也可以廢會不可以廢朝洎秦滅古制罷侯置郡漢立王侯並建守相聖唐稽古兼而用之故天下朝集三考一見皆以十月上計至於京師十一月禮見會於尚書省其朝覲也應考績之事至元日也陳筐篚之貢集於朝堂唱其考第進賢以興善不肖以黜惡穆穆濟濟靡然成風太宗之遺政也自安史亂常始有專地者矣四方多故始有不朝者矣戎臣恃險未有悔過者矣臣忝閫外之寄竊憤不朝之臣故每忘寢與食思一入覲庶因微臣率先天下則君臣之義親而不疏朝覲之禮廢而復舉臣之幸也常恐負薪之疾溘先朝露覲禮不展歿於下泉臣之憂也又臣四年以來頻乞骸骨聖恩哀憫許為擇替無德而祿殃釁荐臻臣雖上恃天慈不殞瘴癘而下悲骨肉繼以死喪及聞諸將帥亡歿亦衆臣自悼何德以堪久長昔公子牟身在江海之上心馳魏闕之下則鄉國者人情不忘也闕廷者臣子之戀也朝覲者國家之大禮也是三者人之大願伏乞陛下憫臣丹懇許臣入朝再謁聖顏萬舞稱賀斯願畢矣無任懇歀屏營之至準開元禮子為母齊縗三年此王公以下服紀皇太子為皇后喪服國禮無聞昔晉武帝元皇后崩其時亦疑太子所服杜元凱奏議曰古者天子三年之喪既葬除服魏氏革命亦以既葬為節故天子諸侯之禮嘗已具矣惡其害已而削去其籍今其存者唯士喪禮一篇戴勝之紀錯雜其內亦難以取正皇太子配二尊與國為體固宜卒哭而除服於是山濤魏舒並同其議晉朝從之歷代遵行垂之不朽臣謹按實録文德皇后以貞觀十年九月崩十一月葬至十一年正月除晉王治為并州都督晉王即高宗在藩所封文德皇后幼子據其命官當已除之義也今請皇太子依魏晉故事為大行皇后喪服葬而虞虞而卒哭卒哭而除心喪終制庶存厭降之禮天子受命之君諸侯始封之祖皆為太祖故雖天子必有尊也是以尊太祖焉故雖諸侯必有先也亦以尊太祖焉故太祖以下親盡而毀洎秦滅學漢不及禮不列昭穆不建迭毀晉既失之宋又因之於是有連五廟之制於是有虛太祖之位夫不列昭穆非所以示人有序也不建迭毀非所以示人有殺也連五廟之制非所以示人有別也虛太祖之位非所以示人有尊也此禮之所由廢也謹按禮父為士子為天子祭以天子葬以士今獻祖祧也懿祖亦祧也唐未受命猶士禮也是故高祖太宗以天子之禮祭之不敢以太祖之位易之今而易之無乃亂先王之序乎昔周有天下追王太王王季以天子之禮及其祭也親盡而毀之漢有天下尊太上皇以天子之禮及其祭也親盡而毀之唐有天下追王獻懿二祖以天子之禮及其祭也親盡而毀之則不可代太祖之位明矣又按周禮有先公之祧有先王之祧先公之遷主藏乎后稷之廟其周未受命之祧乎先王之遷主藏乎文王之廟其周已受命之祧乎故有二祧所以異廟也今獻祖以下之祧猶先公也太祖以下之祧猶先王也請築別廟以居二祖則行周之禮復古之道故漢之禮因於周也魏之禮因於漢也隋之禮因於魏也皆立三廟有二祧又立私廟四於南陽亦後漢制也為人之子事大宗降其私親故私廟所以尊本宗也太廟所以尊正統也雖古今異時文質異禮而知禮之情與問禮之本者莫不通其變酌而行之故上致其崇則太祖屬尊乎上矣下盡其殺則祧主親盡於下矣中處其中則王者主祧於中矣伏尋漢制諸王母稱王國太后晉宋以降則曰王國太國朝酌前代典故從晉宋之儀王母命為太著在程式謹按封爵及大唐六典王母為太妃高祖宇文昭儀生韓王元嘉後為韓國太太宗燕生越王貞後為越國太位號所崇存於册其長公主之母歷代故事並無稱案六典內命婦有六儀位次三秩正三品公主母既因女貴伏請降王母一等命為太儀各以公主本封加太儀之上其品位同儀者取母儀之盛太者請因子而尊庶辨等威以宏敦睦冕白昔仲弓問為政子曰先有司有司之政在於舉士是以三代尚德尊其教化故其人賢西漢尚儒明其理亂故其人智後漢尚章句師其傳習故其人守名節魏晉尚姓美其氏族故其人矜伐隋氏尚吏道貴其官位故其人寡廉恥唐承隋法不改其理此天所以待聖主正之何者進士以詩賦取人不先理道明經以墨義考試不本儒意選人以書判殿最不尊人物故吏道之理天下天下奔競而無廉恥者以教之者末也閣下豈不謂然乎自頃有司試明經奏請每經問義十道五道全寫疏五道全寫注其有明聖人之道盡六經之義而不能誦疏與注一切棄之恐清識之士無由而進腐儒之生比肩登第不亦失乎閣下因從容啓明主稍革其弊奏為二等其有明六經之義合先王之道者以為第一等其有精於誦注者與精於誦疏者以為次等不登此二科者以為下等不亦善乎且明六經之義合先王之道君子之儒教之本也明六經之注與六經之疏小人之儒教之末也今者先章句之儒後君子之儒以求清識之士不亦難乎是以天下至大任人之衆而人物殄瘁廉恥不興者亦在取士之道未盡其術也誠能革其弊尊其本舉君子之儒先於理行者俾之入仕即清識君子也俾之立朝即王公大人也一年得一二十人十年得一二百人三十年得五六百人即海內人物不以盛乎昔唐虞之盛也十六族而已周之興也十亂而已漢之王也三傑而已太宗之聖也十八學士而已豈多乎哉今海內人物喁然思理推而廣之以風天下即天下之士靡然而至矣是則由於有司以化天下天下之士得無廉恥乎冕頓首冕再拜上書相公閣下昨得蔣起居書伏承相公以冕論房杜二相書并答江西刑政論共四本以付史館冕惕然自失懼辱相公之厚意遂取舊本刪改數處愧無運斤之妙徒有傷手之責謹隨狀獻上退而自慚去年又續奉相公手疏以國家承文弊之後房杜為相不能反之於質誠如高論又以文章承徐庾之弊不能反之於古愚以為不然故追而論之以獻左右且今之文章與古之文章立意異矣何則古之作者因治亂而感哀樂因哀樂而為詠歌因詠歌而成比興故大雅作則王道盛矣小雅作則王道缺矣雅變風則王道衰矣詩不作則王澤竭矣至於屈宋哀而以思流而不反皆亡國之音也至於西漢揚馬以降置其盛明之代而習亡國之音所失豈不大哉然而武帝聞子虛之賦歎曰嗟乎朕不得與此人同時故武帝好神仙相如為大人賦以諷之讀之飄飄然反有凌雲之志子雲非之曰諷則諷矣吾恐不免於勸也子雲知之不能行之於是風雅之文變為形似比興之體變為飛動禮義之情變為物色詩之六義盡矣何則屈宋唱之兩漢扇之魏晉江左隨波而不反矣故蕭曹雖賢不能變淫麗之體二荀雖盛不能變聲色之詞房杜雖明不能變齊梁之弊是則風俗好尚繫在時王不在人臣明矣故文章之道不根教化別是一枝耳當時君子恥為文人語曰德成而上藝成而下文章技藝之流也故夫子末之是以四楊荀陳以德行經術名震海內門生受業皆一時英俊而文章之士不得行束修之禮非夫兩漢近古由有三代之風乎惜乎繫王風而不本於王化至若荀孟賈生明先王之道盡天人之際意不在文而文自隨之此真君子之文也然荀孟之學困於儒墨賈生之才廢於絳灌道可以濟天下而莫能行之文可以變風雅而不能振之是天下皆惑不可以一人正之今風俗移人久矣文雅不振甚矣苟以此罪之即蕭曹輩皆罪人也豈獨房杜乎相公如變其文即先變其俗文章風俗其弊一也變之之術在教其心使人日用而不自知也伏維尊經術卑文士經術尊則教化美教化美則文章盛文章盛則王道興此二者在聖君行之而已冕再拜昨暮辱問兼示所寄宇文生書憂深思遠推仲尼之道見天地之心甚善來書之意遠者大者斯盡善矣其愚之所諭者輒備聞見以獻左右宇文生云仲尼因舊史修春秋所記不過二百四十二年今子長乃軼孔氏而修數千年荒絶之書助以黃老寓託之説仲尼之所二子長之所一仲尼之所難子長之所易美則美矣愚以為未盡昔大雅喪然後頌聲寢王澤竭然後詩不作諸侯放恣處士橫議孔子懼作春秋以一王法於是記言事以為裦貶盡聞見以為實辭舉凡例以為異同此夫子之所見也故書之所聞異同此夫子之所聞也故書之所傳聞異同此夫子之所傳聞也故書之非此三者夫子不書此聖人之志也非當十二公之事聖人以為易過十二公之事聖人以為難明矣六經之作聖人所以明天道正人倫助治亂苟非大者君子不學苟非遠者君子不言學大則君子之德崇言遠則君子之業廣故仲尼歎曰大哉堯之為君也惟天為大惟堯則之巍巍乎其有成功也煥乎其有文章也又曰周監於二代郁郁乎文哉吾從周於是敘書即起堯典稱樂則美韶武論詩即始周南修春秋則繩以文武之道然後樂正雅頌各得其所至於幽厲桓莊逶迤陵頽斯不足徵也故曰夏禮吾能言之不足徵也殷禮吾能言之宋不足徵也足則吾能徵之矣是以三千之徒無道桓文之事者豈不教尊而後道高師聖而後功倍者也曾子曰尊其所聞則高明矣行其所知則光大矣又來書罪子長自序云夫子沒五百年而史記作非聖人而修聖人之名者素王之篡臣也美則美矣愚以為未盡昔周公制禮五百年而夫子修春秋夫子沒五百年而子長修史記遷雖不得聖人之道而繼聖人之志不得聖人之才而得聖人之旨自以為命世而生亦信然也且遷之沒已千載矣遷之史未有繼之者謂之命世不亦宜乎噫遷承滅學之後修廢起滯以論天下之際以通古今之變而微遷敘事廣其所聞是軒轅之道幾滅矣推而廣之亦非罪也且遷之過在不本於儒教以一王法使楊朱墨子得非聖人此遷之罪也不在於敘遠古示將來也足下豈不謂然乎夫聖人之於春秋所以教人善惡也修經以志之書法以勸之立例以明之恐人之不至也恐人之不學也苟不以其道示人則聖人不復修春秋矣不以其法教人則後世不復師聖人矣故夫求聖人之道在求聖人之心求聖人之心在書聖人之法法者凡例裦貶是也而遷捨之春秋尚古而遷變古由不本於經也以遷之雄才奮史筆不虛美不隱惡守凡例而書之則與左氏並驅爭先矣苟知聖人之法則知春秋之可興知春秋之可興則君子乎哉宇文生近之矣昔者仲尼門人得其門者然後見宗廟之美升其堂者然後見雅頌之聲入其室者然後見道德之奧雖道有汚隆性有深淺然當其所得莫不有聖人之道故言而為經動而為教者學也不學而至者無焉故曰不登高山不知天之大也不臨深溪不知地之廣也不遊聖人之門不知道德之富也今大雅既隱賢人隨之苟非君子孰能知道宇文生居於今之世行於古之道君子以為難前志之所遺此子之所得君子以為難為僕謝之夫言大道者不可以小説應黃鐘者不可以末音師聖人者不可以無法三者知之斯為難文之為難斯又難之僕智不足而強言之頓首頓首別後九年年已老大平生好文老亦興盡日為外事所撓有筆語兩大卷或不得已而為之或有為而為之既為頗近教化謹録呈上望覽訖一笑夫文生於情情生於哀樂哀樂生於治亂故君子感哀樂而為文章以知治亂之本屈宋以降則感哀樂而亡雅正魏晉以還則感聲色而亡風教宋齊以下則感物色而亡興致教化興亡則君子之風盡故淫麗形似之文皆亡國哀思之音也自夫子至梁陳三變以至衰弱嗟乎關雎興而周道盛王澤竭而詩不作作則王道興矣天其或者肇往時之亂為聖唐之治興三代之文者乎老夫雖知之不能文之縱文之不能至之况已衰矣安能鼓作者之氣盡先王之教在吾子復而行者鼓而生之冕頓首文章本於教化形於治亂繫於國風故在君子之心為志形君子之言為文論君子之道為教易云觀乎人文以化成天下此君子之文也自屈宋以降為文者本於哀豔務於恢誕亡於比興失古義矣雖揚馬形似曹劉骨氣潘陸藻麗文多用寡則是一技君子不為也昔武帝好神仙而相如為大人賦以諷帝覽之飄然有凌雲之氣故揚雄病之曰諷則諷矣吾恐不免於勸也蓋文有餘而質不足則流才有餘而雅不足則蕩流蕩不返使人有淫麗之心此文之病也雄雖知之不能行之行之者惟荀孟賈生董仲舒而已僕自下車為外事所感感而應之為文不覺成卷意雖復古而不逮古則不足以議古人之文噫古人之文不可及之矣得見古人之心在於文乎苟無文又不得見古人之心故未能亡言亦志之所之也猥辱來問曠然獨見以為齒髮漸衰人情所惜也親愛遠道人情不忘也大哉君子之言有以見天地之心夫天生人人生情聖與賢在有情之內久矣苟忘情於仁義是殆於學也忘情於骨肉是殆於恩也忘情於朋友是殆於義也此聖人盡知於斯立教於斯今之儒者苟持異論以為聖人無情誤也故無情者聖人見天地之心知性命之本守窮達之分故得以忘情明仁義之道斯須忘之斯為過矣骨肉之恩斯須忘之斯為亂矣朋友之義斯須忘之斯為薄矣此三者發於情而為禮由於禮而為教故夫禮者教人之情而已丈人志於道故來書盡於道是合於情盡於禮至矣昔顏回死夫子曰天喪豫子路死夫子曰天喪豫是聖人不忘情也久矣丈人豈不謂然乎如冕者雖不得與君子同道實與君子同心相顧老大重以離別况在萬里邈無前期斯得忘情乎古人云一日不見如三秋兮况十年乎前所寄拙文不為文以言之蓋有謂而為之者堯舜歿雅頌作雅頌寢夫子作未有不因於教化為文章以成國風是以君子之儒學而為道言而為經行而為教聲而為律和而為音如日月麗乎天無不照也如草木麗乎地無不章也如聖人麗乎文無不明也故在心為志發言為詩謂之文兼三才而名之曰儒儒之用文之謂也言而不能文君子恥之及王澤竭而詩不作騷人起而淫麗興文與教分而為二以揚馬之才則不知教化以荀陳之道則不知文章以孔門之教評之非君子之儒也夫君子之儒必有其道有其道必有其文道不及文則德勝文不知道則氣衰文多道寡斯為藝矣語曰文質彬彬然後君子兼之者斯為美矣昔遊夏之文章與夫子之道通流列於四科之末此藝成而下也苟言無文斯不足徵小子志雖復古力不足也言雖近道辭則不文雖欲拯其將墜末由也已丈人儒之君子曲垂見裦反以自愧冕再拜辱前月十二日書問文章之道將帥之事朋友之義有君子之道三甚善甚善夫文章者本於教化發於情性本於教化堯舜之道也發於情性聖人之言也自成康歿頌聲寢騷人作淫麗興文與教分為二不足者強而為文則不知君子之道知君子之道者則恥為文文而知道二者兼難兼之者大君子之事上之堯舜周孔也次之遊夏荀孟也下之賈生董仲舒也夫日月之麗仰之愈明金石之音聽之彌清故聖人感之而文章生焉教化成焉哀樂形焉逮德下衰文章教化掃地盡矣噫聖人之道猶聖人之文也學其道不知其文君子恥之學其文不知其教君子亦恥之老夫從君子久矣雖欲學之未能文之不足以當君子之裦然詠乎堯舜之道舞乎沂泗之風庶乎與同也將帥三軍之師萬人之命子實為之矣今國家之患患在師老足下之患患在勢分且天下大勢也善為將者乘天下之勢苟變化在人則用之如神彼勢合者驅而盟之使其擾從桓文是也勢分者力以傾之使其削弱申商是也則遇非常之時不可以尋常之事邀萬代之勳明矣今足下據億丈之城仗大順之衆有桓文之志苟不修其軍政合其大勢制其死命則不足以輟東顧之憂故老夫前書開陳古義以激壯心而猥辱遠示以為聽道路之説甚不然也傳曰諸侯有相滅亡者桓公不能救則桓公恥之今子為大將實制東夏為不義而強力不能制者春秋亦恥之國不富而昌兵不教而強敵不謀而亡是管仲無功於齊商君無能於秦子房無謀於漢矣蓋求天下之智盡天下之才成天下之務此將帥之本也較短長定曲直乃匹夫之為爾古者自天子至於庶人未有不須友以相成者僕雖老矣辱君子之遊同君子之道見君子之榮三十年矣子之善猶僕之善也得不相成乎且百年之壽人誰及之歲月有窮天地有終惟立德立言立功斯為不朽彼聖賢救世死而後已氣有所感也故天下有樂賢人樂之天下有憂賢人憂之樂毅所以徇弱燕之急復強齊之讎韓信所以感推食之恩申戰勝之感意氣所感天地相合况於人乎天方授子子實為將得不憂之乎噫德與言僕無望矣立功立事在吾子為之璧可求也時不可再也是以古人惜時之過已昔者仲尼以大聖之德不免為旅人之身斯無時也賈生以希世之才而無佐命之勳斯無位也今足下遇非常之主統桓文之師時與位泰矣苟功成於身則義動天下使天下之人受其賜不亦休哉既書慨然心馳旗鼓之下某頓首來書論文盡養才之道增作者之氣推而行之可以復聖人之教見天地之心甚善嗟乎天地養才而萬物生焉聖人養才而文章生焉風俗養才而志氣生焉故才多而養之可以鼓天下之氣天下之氣生則君子之風盛古者陳詩以觀人風君子之風仁義是也小人之風邪佞是也風生於文文生於質天地之性也止於經聖人之道也感於心哀樂之音也故觀乎志而知國風逮德下衰風雅不作形似豔麗之文興而雅頌比興之義廢豔麗而工君子恥之此文之病也嗟乎天下之才少久矣文章之氣衰甚矣風俗之不養才病矣才少而氣衰使然也故當世君子學其道習其弊不知其病也所以其才日盡其氣益衰其教不興故其人日野如病者之氣從壯得衰從衰得老從老得死沈綿而去終身不悟非良醫孰能知之夫君子學文所以行道足下兄弟今之才子官雖不薄道則未行亦有才者之病君子患不知之既知之則病不能無病故無病則氣生氣生則才勇才勇則文壯文壯然後可以鼓天下之動此養才之道也在足下他日行之如老夫之文不近於道老夫之氣已至於衰老夫之心不復能勇三者無矣又安得見古人之文論君子之道近先王之教斯不能必矣冕白專使至辱書并歸拙文如見君子所裦過當無德以當之幸甚門人云夫子之文章可得而聞也夫子之言性與天道不可得而聞也即聖人道可企而及之者文也不可企而及之者性也蓋言教化發乎性情繫乎國風者謂之道故君子之文必有其道道有深淺故文有崇替時有好尚故俗有雅鄭雅之與鄭出乎心而成風昔遊夏之文日月之麗也然而列於四科之末藝成而下也苟文不足則人無取焉故言而不能文非君子之儒也文而不知道亦非君子之儒也逮德下衰其文漸替惜乎王公大人之言而溺於淫麗怪誕之説非文之罪也為文者之過也夫善為文者發而為聲鼓而為氣真則氣雄精則氣生使五彩並用而氣行於其中故虎豹之文蔚而騰光氣也日月之文麗而成章精也精與氣天地感而變化生焉聖人感而仁義生焉不善為文者反此故變風變雅作矣六義之不興教化之不明此文之弊也噫文之無窮而人之才有限苟力不足者強而為文則蹶強而為氣則竭強而成智則拙故言之彌多而去之彌遠遠之便已道則中廢又君子所恥也則不足見君子之道與君子之心心有所感文不可已理有至精詞不可逮則不足當君子之裦敬叔頓首辱還答知朝廷之事事無大小難易一切言之言之輒從從乃中變故吾子言有進退之心誤矣夫言之不入諫而怒之國之患也言之輒從從而中變是可諫也又何患乎故下之説上患其志不固不患無時謀合於天即天為之時謀合於人即人為之時天且不違况於人乎伊尹負鼎俎五説於湯其道乃行天為之時也商鞅以強國三説孝公其功乃立人為之時也譬如為山纍土過於九仞然後功就苟待天時功不成矣愚公者志欲移山必能移山故天地之心與人不遠人能感天在於心耳昔犬戎滅周申甫復之無知亂齊管仲霸之晉室中絶王導興之太平干紀姚宋挫之彼謀之如神即用之如神故賢人君子匡救時運有其才必有其志有其言必有其事事至而退君子不為今一言未行其志乃衰是無志也故君子白刃可蹈也鼎鑊可赴也其志不可奪也今有其位有其時一不動再言之再不動三四言之即天地可動况於人乎天地氣合即君臣氣合又何患乎冕白叔雍德宗朝東川觀察使得遂州刺史韋昉狀別駕崔位緣自憲官除此郡佐心懷怨望意不徇公潛搆軍人欲為背叛雖姦謀未成今惡迹已彰伏請聞奏者臣伏以崔位官居別乘恩獎不輕而乃長惡不悛肆其姦忒州牧舉覺事迹昭然伏望特誡㣥僚庶彰明典孟陽禮部侍郎炎子登博學宏詞科元和初為大理卿終左散騎常侍贈兵部尚書諡曰康本清陽而左旋浩浩其天播二氣而仁均亭育分四序而德溥陶甄不見為元乃悠也久也不言而化遂行焉生焉萬物得以資始五材稟以功全美利有常則寒暑之候節著明莫大則日月之象懸仰居諸之罔息知變化之不昏明不差於晝夜次舍互循於軌躔大無不包可定於握規投矩遠無不至可則於持衡執權於是律中夾鐘辰次太皡羽毛振於萬族勾萌達於百草布交泰於發生降氤氳於元造俾其動植之庶彙罔不和同於至道若乃景丁統日祝融撫運扇風氣而何物不溫在朽木而何榮不奮盛既極明時即遷行當蓐收之整轡乃夷則之司聲消埃鬱於九野降肅殺於八紘候可藏冰隸人歡瞻於北陸時將納稼農人乃望於西成蓋藏冰之節斯近嚴凝之氣方盈命之暢月是曰元英夫寒暑順序則陰陽不爭稽諸天道雖謂之通正感於帝德實彰乎太平至矣哉聖人體元於是乎立制大儀斡運於是乎成歲惟王者之則哲諒公士之贊睿在陽和之陶蒸庶不遺於淹滯
