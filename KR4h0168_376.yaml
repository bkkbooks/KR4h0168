  text: 全唐文欽定全唐文卷三百七十六華元宗時官祕書省校書郎出為桂州刺史參佐
  hash: sha256:9e22d825733dcd8399ac37dbb6c905f22b5b521f43a08ea9a09094ae9fa740a4
  markers:
  - {type: head, offset: 14, content: 任華, id: KR4h0168_NFKB_376-h1, level: 1}
body:
  text: 粵若稽古巨唐千靈纍聖二葉重光思文烈以宗祀象天地之圓方考遺訓建明堂俯南端之赫赫㨖北極之鏘鏘盤螭黝糾捧神珠而高翥遊鵾翕習仰層檻以回翔星辰出納於疏牖虹霓縈帶於軒廊遠而望之若扶桑吐日生高岡近而察之若叢雲轉蓋陵昊蒼屹崢嶸以岑立漫披離而翼張其奧祕也懿濞退概靈仙髣佛肅枚枚以實實窅眇清爽日月來往赫昈昈以煌煌階陛嶙峋而分據欒櫨磊落以相望實造化之難測非翰墨之所詳吾君正冠冕垂衣裳佩玉璽腰干將猛簴列崇牙張百揆時序萬國來王敦行尚年既在南而近夏貴仁親族乃居東而曰陽中主尊於太室西導德於總章務兢兢之孝理匪晏晏之樂康然後知嚮明之位正隨時之教盛因方備色乘五運以順行選士養賢崇四學而敷令豈直若斯而已哉其宮十二以象辰行水四周而為海堂筵楣徑可以見乾坤之籌策暑往寒來可以知六九之變改室也州之數窗也卦之在高得黃鍾之實柱懸列星之彩畢千古之能事終一人之不宰至有虞之總期夏后之太室殷重屋以五周太廟以七伊數君之餘制各殊途而並逸雖信美於當年是無取於今日別有清河絆鳥長沙求贄討論公玉之圖錯綜伯喈之議儻繡桷之有漸庶青雲之可致中丞閣下公久在西掖聲華滿路一昨遷拜中憲臺閣生風甚善甚善華竊有所怪請試言之何者華自去冬拜謁偏承眷顧幸辱以文章見許以補衮相期衆君子聞之當信矣華頃陪李太僕詣闕廷公乃謂太僕曰任子文辭可為卓絶負寃已久何不奏與太僕丞華也不才皆非所望然公之相待何前緊而後慢若是耶豈華才減於前日而公之恩遇薄於茲辰退思服念良增歎惋耳況華嘗以三數賦筆奉呈展手劄云足下文格由來高妙今所寄者尤更新奇公言之次敢忘推薦朝廷方以振舉遺滯為務在中丞今日得非公言之次乎當公言之次曾不聞以片言見及公其意者豈欲棄前日之信乎華本野人常思漁釣尋常杖策歸乎舊山非有機心致斯扣擊但以今之後進咸屬望於公公其留意焉不然後進何望矣任華頓首中丞閣下僕常以為受人恩不易何以言之昔辟陽侯欲與朱建相知建不與相見無何建母喪家貧假貣服具而辟陽侯乃奉百金往裞焉及辟陽侯遭讒而竟獲免者建之力也其後淮南王以諸呂之故誅辟陽侯而建以曾往來亦受其禍是知相知之道乃是禍福存亡之門固不易耳僕到京輦常以孤介自處終不能結金張之援過衛霍之廬苟或見招輒以辭避所以然者以朱建自試一昨不意執事猥以文章見知特於名公大臣曲垂翦拂由是以公為知已矣亦嘗造詣門館公相待甚厚談笑怡如僕由是益知公懿德宏遠必能永保貞吉而與人有終始之分不然何乃前日輒不自料而有祈丐於公哉若道不合雖以王侯之貴親御車相迎或以千金為壽僕終不顧肯策款段崎嶇傍人門庭開強言乎矧僕所求不多公乃曰亦不易致即當分減然必若易致則已自致矣安能煩於公且凡有濟物之心必能輟於已方可以成濟物之道公乃曰分減豈輟已之義哉況自蒙見許已經旬日客舍傾聽寂寞無聲公豈事繁遺忘耶當不至遺忘以為閒事耶今明公位高望重又居四方之地若輕於信而薄於義則四方無所取惟公留意耳任華頓首大夫閣下昔侯嬴邀信陵君車騎過屠門而信陵為之執綏此豈辱公子耶乃所以成公子名耳王生命廷尉結襪廷尉俯僂從命無難色此豈辱廷尉耶亦以成廷尉之名耳僕所邀明公枉車過陋巷者豈徒欲成君之名而已哉竊見天下有識之士品藻當世人物或以君之才望美則美也猶有所闕焉其所闕者在於恃才傲物耳僕感君國士之遇故以國士報君其所以報者欲澆君恃才傲物之過而補君之闕宜其允迪忠告惠然來思而乃躊蹰數日不我顧意者恥從賣醪博徒遊者乎觀君似欲以富貴驕僕乃不知僕欲以貧賤驕君君何見之晚耶抑又聞昔有躄者恥為平原君家美人所笑乃詣平原君請笑者頭平原君雖許之終所不忍居無何賓客別去過半平原君怪之有一客對曰以君不殺笑躄者用君為愛色而賤士平原君大驚悔過即日斬美人頭造躄者門謝焉賓客由是復來今君猶惜馬蹄不顧我況有請美人頭者豈復得哉僕亦恐君之門客於是乎解體僕解體者也請從此辭任華頓首逸人姓任名華是曾作藝省校書郎者輒敢長揖俾三尺之童奉箋於御史大夫嚴公麾下僕隱居巖壑積有歲年銷宦情於浮雲擲世事於流水今者輟魚釣詣旌麾非求榮非求利非求名非求媚是將觀俯仰察淺深何也公若帶驕貴之色移夙昔之眷自謂威足凌物不能禮接於人則公之淺深於是見矣公若務於招延不隔卑賤念半面之曩日回親眼於片時則公之厚德未易量也惟執事少留意焉且君子成人之美僕忝士君子之末豈不敢成公之美事乎是將投公藥石之言療公膏肓之疾未知雅意欲聞之乎必欲聞之則當先之以卑辭申之以喜色則膏肓之疾不勞扁鵲而自愈矣公其善聽之何者當今天下有譏諫之士咸皆不減於先侍郎矣然失在於倨闕在於怒且易曰謙謙君子卑以自牧論語曰君子之道忠恕而已矣公之頃者似不務此道非恐乖於君子亦應招怒於時人禍患之機怨讎之府豈在利劒相擊拔㦸相撞其亦在於辭色相干拜揖失節則潘安仁以孫季獲罪嵇叔夜為鍾會所圖古來此類蓋非一也公所明知之又安可不以為深誡乎必能遇士則誡於倨撫下則宏以恕是可以長守富貴而無憂危矣成人之美在此而已矣念之哉任華一野客耳用華言亦唯命不用華言亦唯命明日當拂衣而去矣不知其他華州汝州兩京股肱郡也朝廷以股肱之郡非有股肱之才者則不可造次任焉是以命華州牧兼御史中丞李公亟乘轅於汝所以輟於華而急於汝者何蓋由華已致理而汝久缺人久缺者何不易其遷故也然則州有兵而刺史為之使使不可以獨理爰命前監察御史李公為之副清泗上朝周之路絶漢東封汝之心屹然長城蕃我王室亦在副二之力也且御史仲兄金吾將軍嘗處中司之雄職鎮於上洛之要地招我於藝閣之上假我以柏臺之榮與華甚厚同於骨肉華見侍御如見金吾方將遠別值余有犬馬之疾不遂攜酒灞岸賦詩河梁魂消暮雲心折秋草而已矣汝潁自古頗多奇士荀陳令族豈無子孫君其善待之無忘推遷至如公堂間坐對三十六峯或青雲半收或新月初挂當有佳句時時寄來太子舍人王良輔時人覩之呼為玉人我心重之有如瓊枝今隴西公即舍人談公之親也公尤哀而憐之情義同於長兄禮秩優於諸弟夫如是豈得為萬里之別乎蓋以舍人急於倚門之期切以趨庭之戀若之何因留之贈言贈言伊何莫過於勤孝立身伊何莫過於守正而已秋天壓溟海白波走洞庭後期何日悵惘猿聲自武陵守擁旄分閫有唐已來李公一人而已自非忠義特達有文武才略者曷以致茲公以黔巫之地西控微瀘彭濮東接桂林象郡北漸巴峽南馳滄溟蓋蠻夷獷俗罕遵聲教必藉於幕畫而詳延祖生豈伊異人即我府主隴西公之嘉客也方將表於金闕而加之鐵冠適會有黔中之命相繼而至夫天下之寶當與天下共之況黔中桂林兄弟之國又何閒然哉俾朝廷知黔中得人與桂林得人何異出餞何許舜亭峩峩憑檻窺黿鼉之窟酹酒滴魚龍之背金石絲竹雖有秦聲青山白雲恨非吾土華承命製序因贈以言不慮吾子以忠貞為本又當指蹤不選地感恩不顧身死見賢良則引而薦之勿憚勿疑見仇怨則報之以德勿瑕勿疵吾常以此為終身之寶今以終身之寶贈君以為何如也吾見驥子齠齔之時愛其神清知其才清今果爾也頃漂淪荊楚既孤且貧求食於誰託身於誰四海茫茫未獲所寄及遇我隴西公獲所寄矣公以故人之子憐而收之去溝壑而寄乎南山罷轉蓬而蔭於桃李君子曰隴西公在正字為不孤已今離叔父頗久暫歸阮家之巷感知已厚恩尋赴李膺之門華與臨別撫其背曰高門積慶無忘乎聿修厥德大名難繼宜其自彊不息念哉昔者黃帝生於壽邱文王生於岐陽數千年閒以為盛美況我明主感龍而生如鳳之鳴黃河為之清率土為之寧豈壽邱岐陽足云哉是以四方牧守咸獻方物用賀南山之壽長居北極之尊今此邦使乎誰膺慎擇則司馬溫曥其人也曥相門子溫其如玉五德備焉堅其如金百鍊成焉既出車彭彭㣥公追餞於北郭草草亭巃嵷㣥峯謺出青石逶迤秋水下藏碧沙對此為別飲酒而已大丈夫其誰不有四方志則僕與宗衮二年之閒會而離離而會經途所亘凡三萬里何以言之去年春會於京師是時僕如桂林衮如滑臺今年秋乃不期而會於桂林居無何又歸滑臺王事故也舟車往返豈止三萬里乎人生幾何而倏聚忽散遼敻若此抑知已難遇亦復何辭歲十有一月二三子出餞於野霜天如掃低向朱崖加以尖山萬里平地卓立黑是鐵色鋭如筆鋒復有陽江桂江略軍城而南走噴入滄海橫浸三山則中朝㣥公豈知遐荒之外有如是山水山水既爾人亦其然衮乎對此與我分手忘我尚可豈得忘此山水哉桂林秦所置郡也南臨天池東枕滄溟西馳牂牁北走洞庭地方三千里帶甲數萬卒實五府一都會矣連帥之任朝廷難其人往年命御史中丞張公公號為稱職去年又命我以佐之初張公受命之日以為五嶺荒服不同於他邦百蠻獷俗不可以獨理乃薦武功蘇浣自祕書省校書郎除金吾掾攝監察御史以佐焉浣在幕中多所匡輔洎張公家艱去職浣統其留務凜其正色操持紀綱而十州之地晏如也洎我公至止觀其迹而美其政將表請焉浣辭以久辭墳墓不見兄弟已六年願得生入武關一到闕下足矣公從之或筵於西堂或樽於東樓或饌於亭皋凡飲餞之盛未有若此之綢繆者也且豫有善公為揚之豫有功公為敘之豫有患公為排之豫有屈公為伸之亦何異脫騏驥於鹽車擲秋鷹於天畔乃騰騁難料擊搏在即亦足以快意矣且爾兄吾兄也爾身吾身也雖萬里為別何別之哉雖然不能不愴恨儻見二相國當為深陳江嶺安危之體焉料子必見潘庶子因登高把酒南望千峯白雲離披橫在山畔與我疇昔所見豈有異乎由是益令人思北歸士莫不伸於知已屈於不知已頃姜生以調集不偶薄言東歸乃告辭於吏部徐公公素知其才惜其去竟不與之別無何授宣城掾得不謂少伸於知已乎秋天晚晴碧色如掃橫度一鳥時時行雲益令姜生有懷吳會況還家有循陔之慶趨府有牒辟之命哉僕與斯人曾未覯止其友人姜正範與余善邀余序之範誠以我筆家流則不知姜意以為何如也宗室後進有以學術辭藻著稱者彞也少好學通九流百家之言善屬文頗有大節去年制舉不捷無何以書歷抵二相國論安邊術由是召試西掖凡數十百人彞與莊若訥高郢同入高等何垂翅於制舉而奮翼於西掖哉蓋道之屈伸命之通塞各有時也執政以彞大人在蜀故授新都以榮之彞豈不欲高步臺省時時與朝廷㣥公談笑所以俯就遠縣蓋為大人屈耳秦雲滿天倏聚忽散與子分飛亦爾也古人別遠貴於贈言子昔為什邡令蓋鳴琴不下堂而理今領新都則異於彼焉蓋以廬井灰於焚之後氓庶瘡於刀箭之末樹立存育洪惟艱哉況奔衝填湊晝夜風雨誅求供應旬晦山嶽其親庶務則宜戴星而出戴星而入焉其接賓客則宜一沐三起一飯三吐焉此朋友之望也如月照雪峯花飛錦江當有新詩時時復寄來念之哉李生吾嘗以忠孝禮義清慎此六者士君子立身從政之道而兼之者稀涪城兼之矣何以知之嘗糾余郡又宰吾邑每升其堂以觀其政況不以編戶遇我而以國士待我情願交深貫於金石自我不見於茲五年長安相逢如自天落而喜可知也公以時命未偶駕言于歸南山巖巖分我鄉之南北秦雲日暮類吾徒之聚散況公之仲兄季弟與余為忘年友涪水春風巴山秋月靡游不同久阻山陽之歡又此河梁之別二事交戰祗醉我心今紫微郎常公朝廷之詞伯而公之舊也君其請賦一詩以大誇西蜀父老矣一昨渭北節度工部尚書臧公表薦辛嶼尉洛郊蓋知嶼事親以孝聞與朋友以信聞於吏道以幹聞不然非所聞也秋七月將之官乃胥命於此寺後庭蓋所以破臨歧之妄想銷操袂之煩惱也僧院少客蒼苔滿地終南曉晴洗然黛色日暮飲罷鐘聲傍山贈言曰子之叔父以清白著稱歷踐臺省官至二千石子其克已自勵無墜叔父之風平西原之歲隴西李審自湘東來才甚清氣甚和節甚奇心甚高僕是以恨相知晚也秋九月又言歸於湘東衆君子出餞於北郭碧峯巉巉出於柏梢有如虎牙夾天而立加以白日欲落挂在巖半橫照灘水月帶微明操袂於茲揮袂於茲恨無崑山片玉以相贈贈君桂林之一枝審再拜曰幸甚吁嗟乎蒼梧之片雲或隨風而東或隨風而西片雲既如是孤客亦如是昨日李生言歸湘東今日李生將赴南海昨日今日豈有二李生乎亦猶前日蘇秦與今日蘇秦不殊耳所以然者何耶蓋乘流則進見機而作明有志於四方非凝滯於一途其中或有不得已之事亦不怪有也昔孔某嘗為東西南北之人張儀亦為燕趙齊楚之客其已乎滄波遠天混和暮色孤舟一去曷日而旋歸哉南嶽有大比邱其名曰道標性聰惠㯋悟通於禪門精於律儀善於說法該於儒術是以禪師伯之律師仰之法師宗之儒流服之自登戒壇凡四十餘夏致弟子彌漫於江嶺閒不下萬二千人不然安得前後連率新舊嶽牧莫不嚮風稽首焉屬我中司隴西公方崇東流之法化南越之俗是以惠然杖錫而公待之禮敬甚厚前隴西公曰維摩經不云乎法無往來常不住故金剛經不云乎應無所住而生其心每念雙林樹下將歸乎湘東郡又憶王舍城中當詣於漢北闕公難違其意悵然久之乃命幕中樂安任華為之序序云彼上人者甚為稀有方以般若為舟而浮於洞庭以大乘為車而游於京師皇帝深信釋氏必將延入內殿問以祕藏豈唯將相得歸依之地王侯發回向之心而已乎王疑曰如吾言焉圖書所載名山如天台者鮮矣故老萊游於斯應真游於斯虔上人亦游於斯老萊崇於孝者也應真崇於道者也二公之美上人兼而有焉上人緇侶之澄肇詞場之沈謝讀盡貝葉能了於空淨如蓮花不著於水不然安得衆君子禮敬若是焉言歸膝下則孝名為戒將遊物外而朗詠長川豈徒蔭長松以隱身承瀑布以洗足是將採掇靈藥搜訪仙經歸獻北堂永同西母也鏡湖秋月當見色空稽山片雲能引詩興剡溪白鳥知爾無機雲門疏鐘訝君來暮豈不謂然耶今朝贈別桂林花洞庭白烟濕袈裟上人與君各在天一涯此邦詞客往來亦云多矣其有論詩則為詩人對酒則為酒徒如魏秀才元稹者不可多得況爾兄殿中侍御史萬成吾友將為遠別豈同他人江亭暮天勿辭一醉醉後解纜則月照滄海猿啼碧山其奈爾何今年東都秀才登第者凡十數人隴西李玕為之稱首且宗伯方以拔淹滯愍勤舊為務而玕則年甫二十餘豈張公意耶其如考舊文則上等試文策又上等欲以年少棄可乎不可也朝廷由是翕然謂張公之用心也周選才也當不膠柱於一途耳夏五月李玕將歸於鄭我中司李公惜明晨東郊之別成此夜西園之會桐葉滴其疏雨竹枝鳴其夕風夜酒既醉俾我小為之序我本師說教務存饒益會因啓聖方有激揚則大梵懷愍念之心如來演神妙之句使無願不滿有求則隨故此經標之為其品題矣夫大自在者天之王陀羅尼者咒之目蓋以憑神咒威力同天王自在且咒有八首除八難也經惟一軸明一乘也若聽受講誦若書寫帶持即是金剛之身便作如來之眼是知煩惱大海本從妄想中生業障高山亦因覺悟而破則頸邊瓔珞衣中寶珠未足比其珍矣懿夫能摧他敵不假韓信之登壇能致甘雨乃同傅說之作相此則有功於國矣至若火坑成水刀刃為塵毒龍生慈夜義作禮此則有功於人矣及乎泥黎自苦阿旁驚怪人便生於天上塔猶在於城南此則有功於鬼矣非我有九十九億那由他諸佛同心同德安樂天人曷致於此矣粵有雅和尚者誕生中土如從西域而來不讀外書只說東流之法丙午歲訪余於景城西巖之蘭若從容曰此咒有不可思議之力竟無序述謂之何哉華答曰唯然和尚謹聞命矣將欲無垢之咒可驗淨居之言足徵豈獨施於信者亦將悟彼疑者若可信而不信不應疑而疑則三途之中不出入此輩略述少言耳亦乃勉旃諸仁離一切相修諸善法夫如是乃得菩薩心心所感者為應夫如是乃膺多福道無上者歸極感罔極者報親在心佛在相唯心與相唇齒相依二事同源百行宗孝蔣氏兄弟惟孝也哉前殿中侍御史蔣鍊鍊弟前右拾遺鎮鎮弟前無錫尉鏑鏑弟前千牛鏠鏠弟前協律郎錡等泣血三年哀過乎禮願西方上聖永福先人故尚書左丞贈太常卿汝南侯大祥敬畫妙法蓮華變一鋪惟此經開佛知見授聲聞記如來祕藏菩薩上緣始發乎鍊也伯仲之心見乎法如來大士之相終成乎太常無餘之度孝矣哉太常盛德公才師訓天下朝廷遂謙沖之德後生興祿士之歎邦國殄瘁元元安仰華太常故吏也侍御以華情之拳拳見示經變泣對靈相祗感遺仁侍御女弟潤州長史京兆王宙妻次前信州刺史高陽齊䎖妻季前拾遺東海徐閟妻哀禮兼極此道也古所難況衰俗乎敬為讚曰大孝尊親其次用勞其次用力蔣氏之子三者備極誠哉孝德匱竭精素哀空上慈乃繢靈相光儀既備景福隨之並無衡量
