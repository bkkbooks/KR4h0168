  text: 全唐文欽定全唐文卷二百五十九璿字希琢長壽元年自營繕大匠遷夏官尚書同鳳閣鸞臺平章事九月流嶺南長安中召為殿中監檢校奉宸令賜紫封開國子
  hash: sha256:b188a654d7e7a560e2dfb3ca8d88f3e51abe5c528c7b5ae6e71d9d2fc355f861
