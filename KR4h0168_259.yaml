body:
  text: 大周撫歷歲在癸卯皇帝以至聖之明宏正直之道稽一乘之貝牒崇七寶之花臺堯曦將佛日齊懸閶闔與招提相拒大哉神聖無得而稱金紫光祿大夫行殿中監兼檢校奉宸令琅琊縣開國子王璿安住寶心體解塵跡思法橋之永固願聖壽之無疆爰於七寶臺內敬造石龕阿彌㢮像一鋪相好圓明威儀具足金蓮擁座寶樹低陰同日月之光輝若山河之靜默所願上資皇祚傍濟蒼生長齊北極之闕一字永奉南薰之化膺福曹州寃句人懷州刺史敦實子武后朝官太子中舍人先天中歷左散騎常侍宏文館學士蓋聞在天成象懸啓運以著明在地成形奠山闕一字以播氣百億日月未窮破暗之功三千世界豈究無邊之境況乎言議所及通變之閒哉然而往古來今前賢後聖研幾宗於無往契化本於宮端不測稱神彌綸止於天下運成曰道為大存乎域中名與無名未染常樂色及非色俱淨皆空生生不停念念成環極數觀變求而不得真為妙覺於闕三字則我釋尊之教為盡之矣察夫大雄利見應運挺生欲度王宮發祥天廟首出聖仙之表獨攬調御之尊壽豈難思妙色無盡四天劫網有類浮雲萬梵光明猶如聚墨降魔佛樹高轉淨輪不有不無因無住而生法非相見相假相緣以會真廣度濟之門宏汲引之路世七品闕八字為助道之因隨迎莫辨其去來循環不知其終始移山納芥變海成穌無非誘掖之權皆由慈善之力廣大同於法界究竟等於幻空所作既辨能事斯畢於闕十字銀疊珠函大作依止貫花羅葉宣暢元宗四無量心普覺㣥有六波羅密廣祘金菩提德盛者流光功宏者施博正法逝其已遠象設由是鬱興泡影揚光教被龍鬼持珠獻色跡遍天人闕八字金莖闕二字掩映相望玉剎淩虛參差接影豈惟淨居天界爭開紫紺之園娑倡神宮共起琉璃之塔而已河內大雲寺者本隋文皇帝所置長壽寺也三河奧區一方都會闕八字平野周畇斜鄉夏甸鎮以大行之險繞以洪河之流極眺闉闍百雉霞起曠瞻井邑萬室雲平俗垕人淳既富而教乃吉祥之福地信招提之淨域經營之始麗及當時大業淪闕十三字封豕長薦食上國洪水方割劫火洞然乃眷福海翦焉傾覆有唐立極宏闡勝因揆日占星增飾崇麗自隆周鼎革品彙光亨天瑞地符風揚月至在璿機而齊七政御金輪以正萬邦闕六字千聖菩薩成道已居億劫之前如來應身俯授一生之記大雲發其遐慶寶雨兆其殊禎赤伏祚劉得自書生之獻黃星表魏聞諸瞽史之談猶播美於緹緗且騰徽於史冊闕十一字中興是改千秋之邑梵王勝殿爰崇善法之堂矧乎冠絶天人度越今昔焉可拱嚜靈貺抑而不揚乃下明制順天休命肅昭鴻烈用定厥祥易長壽之前名旌大雲之佳闕十字麗雕楹鏤檻迥出氛埃松踈桂深隔閡寒暑千花綺帳金絡浮空四柱珍臺珠纓獨化龍池漱玉韻寫七言樂樹吟風聲諧九奏因地精舍未或能儔尸利空林孰云斯擬闕十一字者纍世衣冠高尚不仕行符曾閔義烈金石往屬漢東失御巨猾憑陵盜跖暴於泰山蚩尤盛於中冀人怨神怒甫鍾遷鼎之期父出子孤奄洎闕二字之酷溫序之營魂莫返千方之闕一字感网寧闕六字聖道痛三途之長遠識四苦之輪回於是伽落俗塵歸依妙覺仰祈宏誓之佑少酬顧復之恩於此伽藍聿興寶閣審曲面勢置臬持繩徵玉西崑求金南海刊木少室闕一字山林中徙石太行闕四字弄姿鷲嶺角壯天宮於時貞觀之十八載也島夷拒險不率王略龍韜授律肅將天威太白出高行師利於中國王良策馬車騎滿於遼陽勒兵待邊深涉胸奴之地飭軍成禮親勞細柳之營闕五字垂劍客聲高六郡選盡百金將犂穢白之庭途出懷覃之境覩斯福會以挈檀冉各分輕出之資共徹裹糧之費人以心兢物以願盈寶貨泉流淨財山積寺有神昉法師者禪支夙茂智鑑闕二字勤求善巧之方志窮輪奐之美不遠千里百舍忘疲乃於維揚之郊得茲長樂之制規摹允備績用丕成高閣洞開層軒傑竦瓊階切漢徑直天門珠柱橫空光侵星殿落去日於綺綴納行月於庭除闕四字而孫騫雲爵踶甍而遐翥列仙承宇整霓裳而欲飛天女窺窗開玉顏而競笑提洹下集即此安居迦葉飛來茲焉戾止加以圖真寫妙刻玉雕檀相好圓明威神自在總持之象並繞㫋檀功德之稱聲聞薝蔔方諸妙喜一切莊嚴辟彼淨名入未曾有至矣哉一都之壯觀也上座元爽寺主什行都維冉慶宗及寺內名德等慧炬外揚明珠內護深入法性妙達真詮闕一字求無相之因丕闕一字宏通之業戒定交養空慧兩修咸以為悠悠俗諦皆苦皆空擾擾浮生無人無我致喜園勝殿終傾四大之風巨海須彌畢燼三災之火非夫願力堅固法惟圓常孰能迥拔愛欲之流超升波若之岸是以虔誠偈頌闕十字篆刻緬維畫石之旨尚想刊柱之蹤爾乃攻玉他山式建隆碣俾夫披文相質恆傳法鼓之音輪雨風灰永值金剛之際前刺史臨川郡王諱嗣宗今刺史河內郡王諱懿宗好賢樂善明德茂親資孝為忠自家形國北門之寄朝選尤難右戚之英帝念斯屬迭紆緑車之重纍膺朱襮之榮西河吏人歌馮君之繼踵潁川士女喜寇公之重逢威震百城名馳九牧政優魯衛道裕閒平列郡以為表儀京師并蒙其福長史河東薛俊司馬宏農楊履言貴公子孫聲名籍甚七業貂珥金張謝其寵光十代公卿荀汲推其閥閲敏以仁廉長於理劇荊河稱仲舉之賢沇沂頌休徵之美我有懿德闕二字伍之州縣寮寀等如圭如璋公才公望滄溟未運散逸翰於池籠刀筆薄遊屈雄才於掾吏並薰修在念喜捨裝懷恭惟付囑之慈久積住持之想承行聖教守護大乘弟子先君敦實早膺朝寄調露之際出牧茲邦昔因定省屢入官舍近從休告言踐舊遊盛德不渝尚覩坐棠之化窮心靡逮徒深風樹之哀眷山川以疚懷盼邑里而增欷吾昆伯仲材標幹蠱恭承綸渙宏道作宰下車爰始耆幼相歡鳴絃在辰謳歌屬路曾未朞月風化大行固惟先德在人抑亦析薪克荷凡我門生故吏邦彥時英見託為文闕一字當勝事雖則不敏其可已乎乃為銘曰太極播氣流炭甄形四緣七識萬品千名有為有漏隨滅隨生危同水沫幻等乾成其一天中之天最尊最勝寄跡宏道隨緣示聖寶聚凝姿慈山表稱天龍歸仰人祇協應其二拂衣祗樹安住三天闕四字花疊斯然正真寂滅象教照宣莊嚴剎士宏被大千其三瞻彼淇澳時惟勝壤營室分躔中樞括象惟皇乃眷淨居攸敞福宇隆崇祥符肸蠁其四隆周建極烈惟無競化緝萬靈德參㣥聖慈日升東闕三字慶爰錫嘉名光昭寶命其五偉哉妙域赫矣奇工比崇天廟掩麗龍宮珍臺戒迥玉宇臨空網綴交露鐸韻和風其六肅肅應真詵詵開士捐生為法濟物成已大地登果彌天擅美勝境永傳妙因靡巳其七懿茲邦牧維周之藩持寬濟猛以臨煩仁風依扇膏澤隨軒凝懷至覺寂想祇園其八郡邑英僚宏才廣度州閭俊逸居貞履素願力成就偕修堅固咸罄身心永代宏護其九勒名貞石宣功讚揚道契方廣業茂圓常資陵為谷變海成桑金剛際斷盛烈無忘其十審幾隴西人垂拱元年官懷州河內縣主簿原夫巢燧上皇之代逖矣難詳胥庭太古之日悠哉莫紀研精甄曜空聞糟粕之言覃思運樞詎見權輿之跡洎乎軒嚳唐虞聖主也德未寢於闕一字戈禹湯文武明君也功尚勞於任戰爰及秦皇虐政漢高霸術區區曹馬之事業蕪穢緗圖瑣瑣齊梁之聲教膏肓翠牒我大唐鑿乾開運出震乘時月照瑤光搆顓頊之昌緒雲浮玉葉啓咎繇之慶胄高祖受元符而革命仰迪天心憲紫極以疑旒俯從人欲濡足在念濟四海於橫流授手置懷闕一字萬邦於炎嶽息麟鬬而開日月兩曜貞明靜龍戰而叶陰陽二儀交泰文武聖皇帝功彌締搆道冠財成夙光玉理之符載挺珠衡之表初開鳳節巳賦小言之詩既襲龜謀即用大橫之繇修文德而有苗格詎待七旬運武略而獫狁平匪勞六月大帝含樞降祉曜魄垂精景命列於河圖鴻名昭於洛字湛鶉居之化不肅而成凝鷇飲之風不嚴而理憲五材而躋聖四時將玉燭同和齊七政以窮神六氣與金渾共順若乃重十家之産仍罷露臺輕千里之足匪登雲廄茅茨可以庇風雨無從璿室之奢陶匏可以合炎涼有戒玉杯之侈禁難得之貨詎惜雉頭絶遠方之物豈甘龍眼此聖人之淳德也設謗木待逆耳之謀懸諫鼓佇沃心之誥元纁是用聘耿潔於邱園圭組斯班賁英奇於仄陋聞一言之善管庫無遺見一行之高輿臺必採此聖人之任賢也麟膠鳳卵之野梯翠巘以混車書槐江穟穴之鄉航紫溟而奉正朔蚩尤之棄楓木更若近郊番禺之流蒟醬還猶內府韋韝毳幕月支日逐之長削袵於藳街雕題鑿齒鏤膚攢髮之酋稽顙於魏闕此聖人之懷遠也功格圓清甘露凝而景星出德通方濁蓂莢植而芝草生魚尾之禽既騫翥於阿閣狼題之獸亦騰躍於平原金鼎不爨而自盈銀甕不汲而恆滿此聖人之休徵也江茅鄗黍表望幸之期紫鰈青鶼昭告成之應採無懷之逸軌始創宏儀托有熊之懿躅爰修大禮壇浮青氣映芝谷以氤氳封聚白雲帶松山而爛漫周王射牛之祭未足執殳漢帝訛麟之祠詎堪扶轂此聖人之升中也豈言八駿之御未宴瑤池五龍之紀驟移璿律崦山騖景痛堯日之先沈夜壑飛湍惜舜河之奄竭仰惟闕二字先顧闡闕二字之徽音皇帝嗣守隆基光武丁之睿道補天維而鍊采石彈壓媧皇踰地角而獻碧砮牢籠姬后洛州濟源縣宗姓前河陽令李儒意雲騎尉李公協騎都尉李德異等二百五十人去隴西而違故里冠冕之風尚傳就河朔而客他鄉箕裘之業無替譬夫長江巨海不乏虬龍沃野廣都自多鸞鶠爰以霑濡渥澤家無雜賦之勞沐浴湛恩門有蠲修之泰耕田鑿井荷亭毒之平分鼓腹含哺喜優游而自逸想攀髯於湖邑戀德徒勤眷飛羽於泮林懷音何極粵惟元元皇帝遠垂聖緒回膺仙籙惟恍惟忽師方羲農之際不皎不昧卷舒虞夏之辰乘日月而駕風雷攝鬼神而包天地推之於妙非常名之可名引之以真即上德之不德魯司寇之作者北面闕一字入室之徒尹大夫之真人西遊應出關之侶隆周季業巳求咨於五千皇唐本枝方延休於七百奉為高宗天皇大帝於奉仙觀敬造老君石像一座并夾侍二真人鏤琬鐫金寫黃中之瑞色塗丹繪粉摹皓首之珍容日角晨開羲和恧扶桑之景月弦夜滿望舒韜仙桂之暉精誠感造化之功鋭思得沖元之力山連王屋即是清虛之天邑帶福庭更似瀨鄉之地仙官侍衛紫煙開而鶴駕輕神媛歸依碧落淨而龍輈遠所冀蓬萊變海元元之介福長存竹箭移川大帝之神功不朽惟金昭而玉粹俾天長而地久乃為銘曰粵若皇唐諟天明命瑤光襲祉闕一字雲垂慶納麓弗迷陟元惟聖隤綱更紐折柱還正其一高祖光宅聖文纂圖九瀛懷惠萬國來蘇捐金抵玉破璽焚符粃糠栗陸草芥尊盧其二惟皇題象握契循機舍樞流氣曜魄分暉時凝卷領化軼垂衣乾坤交泰書軌同歸其三道冠登三功包得一斥彼峻宇安此卑室獄靜棘闕一字刑寬艾韡有斯補無文咸秩其四元穹效祉黃牝輸禎月開蓂莢雲覆芝英龜龍呈象麟鳳飛聲燕闕一字鏤績梁岑告成其五能事云備神功不宰奄陟九仙俄悲四海文物終謝英威如在至德方凝孝思無改其六少卿遠裔元禮來昆俱迷帝力共沐皇恩號弓瀝膽捧劍銷魂敬惟仙系邀福元門其七奇表既開真儀式像五字見足千文曜掌日角晨融月弦夜朗害馬巳去猶龍可仰其八歸山曾鎮沇水清瀾險疑巫谷流似渦湍既銘功而握槧亦頌德以濡翰期翠石之永固庶鴻名之不刊其九子布博學有才年十七為左衛長史登封時卒原夫陽之化陰之融功斯元理斯妙故沈凝者顯象清貞者流曜惟茲光之焴爚闢重昏以臨照夫其明滅靡定虛無罕測道叶神氣功侔夜力寄方圓以分影逐元黃以變色鑑無隱而不彰狀雖空而可識類至人之虛已同日月於元德若夫丹烏啓旭彤曜麗空藻晨霞而飛綺曛晚靄而生紅發菱花於元鏡轉蕙葉於清風故其稱物咸燭呈形被景逗幽隙而露纖埃漏疏林而分細影從盈空而不積雖駿奔其如靜至如銀河披曀金颸送清孤圓上魄飛鏡流明汛露文而委淨浮冰浪以搖輕雖視之若溢而攬之不盈亦有鳬燈焰吐蘭缸彩發煙奪銀燭輝淩練月破錦幬之宵晦假瓊璧之餘晰況復玉關秋燧紫塞涼烽開暗空於千里徹夜宮之九重代羽書而揭警豈飛驛而齊蹤且夫遇蒙則戢因通則揚乘物無眹適變無方大則彌於橐籥小則細於毫芒寧雨露之不潤匪寒暑之能傷歷衆妙而校德固莫善於斯光想貴和於聃叟咸稱葆於蒙莊悟燭無之見獲誡投暗之不臧鏡茲道之用舍乃君子之行藏惟貞字叔堅曲阜人天授元年判入高第授衢州參軍歷溫州永昌長安三尉遷太子文學拜薛王友君諱思亮字孔明蘭陵人也公侯緒慶鍾鼎華宗遠則文終翼漢功侔於二八近則武皇祚梁業光於三五英賢繼踵簪紱駢輝詳乎史諜可略言矣曾祖翹梁貞毅將軍郢州刺史新興侯祖季符皇朝尚食奉御員外散騎常侍贈光祿卿洪鄂等八州諸軍事洪州刺史武昌縣開國公並才兼文武秩榮中外郢中歌雪畫隼翻旟騎省連雲豐貂曜冕象河咨嶽禮備於飾終列爵疏封寵隆於利建父溫恭修文館學士渝州司功參軍事譽光黌序位屈巴賨未騁高衢先摧逸足君資靈上善稟性中和言為士則行成物範張華雅思掞奇藻於鷦鷯終軍洽聞標敏識於鼮鼠好學不倦綜涉㣥言手自繕寫盈於素解褐補益州金堂縣尉歷雍州同官縣尉武功主簿乾封縣尉長安主簿歲滿為丞再歷畿甸三遷京邑職事填委剖之如決流爭訟紛拏鑒之若懸鏡嗟乎道長運促時亨命屯未施搆廈之材俄軫奠楹之夢以景雲二年歲次丁亥正月二十日終於京崇化里第春秋六十有七嗚呼哀哉即以其年二月景子朔十五日庚寅遷窆於神和原禮也夫人譙郡熊氏故左金吾將軍元逸之女柔婉成性言容具美以景龍二年九月十三日寢疾而終嗚呼哀哉龍門之桐始半生而半死襄城之劍竟先沈而後沈同穴有歸雙魂是祔嗣子逖孔門之鯉幼即能詩楊氏之烏童而擬易未極庭幃之養處纏屺岵之悲劈厚地而崩心訴高穹而泣血期我以先執託我以斯文僕也不才義深寮舊追感平昔承瞼無從敬述芳猷志於幽隧銘曰元鳥降祥克生於商枝分葉散源濬流長載誕明哲如圭如璋夷險共貌寵辱齊忘文含綺繢學富縑緗朅來卑位其道彌光孰云與善奄歎殲良馬鬛開隧龜謀允臧松門蒿里兮斂雙魂於此地春蘭秋菊兮歷萬世而逾芳敬淳貝州臨清人貞觀末官申州刺史垂拱四年官宏文館學士蓋聞元圃青宮仙客於焉來往丹邱紫府羽人之所棲集徵祕籙於淮王時逢八老採神奇於魏帝取覿雙童子喬控翮翺翔赤霄之上琴高擾鱗游泳淥波之下斯並心符寂蔑神契窈冥匪塵俗之能羈簪纓之所屈者矣茲有皎容雅質貞規淑態韞真氣於閨房挺仙才於閫閾嫦娥採藥奔月朏以含精靈媛投壺日昱電光而吐耀漢皋游女持珠對南國之賓洛浦神妃鳴玉俟東藩之后莫不名芬紫翠道標黃白列真非一往往致焉魏夫人者即是晉劇陽侯任城魏陽元之女也本傳曰夫人年二十四適南闕一字劉幼彥幼彥為修武令善為德政仁風惠著時夫人隨在修武之館焉雖魏同舍縣內常齊於別寢季冬之月夜半聞空中有鐘鼓笳簫之聲羽旗光耀降夫人之靜室輿輦被服非人所聞見有四真人告夫人曰大帝敕我來教子以神真之道注子於玉札應為紫虛元君上真司命名山之號封南嶽夫人後為洛陽山成真人因為立祠土俗號阿夫神原夫鎬京疏社公高克勤於小物參墟命族畢萬連休於大名丞相之匡翌漢庭比蹤蕭邴司空之弻諧晉室方譽裴山積德攸鍾餘慶斯在況復彤雲授彩衍豐谷之靈苗白水開源導舂陵之茂族乘龍合好鳴鳳於飛結大義於絲蘿諧佳音於琴瑟劉氏絃歌作吏銅墨臨人惟彼外持爰資內輔服勤纂組良毗製錦之工肅事蘋蘩且佐烹鮮之術猶以為六法四行豈離夢幻之場九轉三仙方出塵勞之境朱庭翠閣事甚樊籠元鬢紅顏理同泡沫於是撥煩疏黷練志凝魂潔成道室之階列竟師門之宇悠悠永夕紫烟升而庭院虛凜凜窮陰元霜冽而池館靜乃有仙鐘簇韻如發漢鯨法鼓揚音似棲吳鶴簫聲寥亮仍符弄玉之臺笳奏凄清有異文姬之殿緑軺朱節真衛相趨霞佩雲裾仙儀在列昔安公之冶叶冥契於升龍木羽之鄉應祥期於御馬眷茲元感異代同符故能迥騖三清高超八會持法印而含元氣合真符而升太極金記五千職隸九元之史玉言十萬名彰八素之書足使上元夫人恧其嘉號元妙玉女愧其芳聲豈與夫障日巫山薦枕席而通寢順風江澳懷環珮而申贈復有躍魚酬惠愛鳥遺災清溪白岸之姑阮氏絃生之儷若斯而已矣夫以王母既集西漢列其宵筵帝子斯臻北渚歌其夕漲是用恢勝宇創祠壇想希夷其若存庶恍忽其無昧建立之始年代莫詳爾其周晉名區覃懷奧壤蘇子攢茅之域寇君剖竹之郊孟津南注控河流於馬頰太行北指啓山路於羊腸川原相屬風烟交會鬱彼仙觀揭焉中立綵之以丹青陳之以藻繪效靈妃之啓齒圖殷女之練色行亭三襲俯瞰川湄茅欄四注却連山阜巨石崔嵬像蓮峯而特秀奔泉瀄灑瀉松㵎以飛湍微靄觸而流津清飈激而成韻瓊桃仙棗散緑垂紅珠實金條含緗佩紫八林芳桂淩冬霰以揚葩五株仙杏負春晞而布葉莫不夾戶羅生垂簷接蔭可以返魂駐寄忘憂愈疾至若吉日良辰高人勝士黃冠紫綬忘貴賤而同歸白屋朱門混榮枯而畢萃敬而不黷誠稟訓於懷柔感而遂通諒虔心於正直於是採蔬東海折果西山傾玉酒而泛流霞酌金漿而挹甘露神交妙有想白鳳之來儀道契虛無佇黃雀之為使丹梯可躡必超上漢之闕一字練馭斯闕二字越無生之浪誠洞真之苑囿靈寶之區域者焉秋官尚書檢校懷州刺史南陽鄧府君道光天爵慶登地靈跖泰階而高視實木蓍天而騁力題劍升朝秉刑之寄攸重佩金增秩仰福之任逾隆長史隴西李知人司馬南陽鄧楷河內縣令巨鹿耿仁惠或展驥亨衢化康邦國或割雞遊刃功茂邑民思靜力於回天厭勞生於寂地識明元牝跡寄道樞半㓨毗藩則晨趨飛其鶴嶺一同作宰則元會降其鳬舄每慮陽軼再旬具虔馨於斯谷陰衢潔朔薦行潦於茲巒縣令仁惠稟氣孝恭祭則神饗天然感物祈必靈歆所請甘霖未回車而降澤但求膏液迎舉意以零滋彌愧神之厚恩故勒銘而旌德而碧落清窗顯在百城之次椒庭桂門近臨千室之中瞻石梁而靡濶仰瑤臺而何遠夫降仙成宅西嶽紀桓談之賦尋真起詠南溪聞郭璞之詩是以輕率下民仰追前列寄諸貞炎題其頌云畢筮初占係復其始寧門有相甥膺廟美珠胎孕寶玉仙昭祉實唯靈媛作嬪君子取譬鸞鳳言邊魴鯉早明八素夙晤三元呪神爭術餐蓬募仙紫書題記白開編暫遊芝圃焂見華田輕飛起月高訓垂煙戒遵靈壇載規神宇却倚巖壁前臨㵎浦偃蹇雲棟清泠風戶怪石奇木鳴蟲嘯羽居茲他聖坐同天柱犢妃去魏弄女辭秦陽臺之下暮雨稱神洛川之側朝霞韞真窈冥高蹈寥廓上賓思闕一字道業用述微塵詵字廷言雍州武功人宰相王褱子舉賢良方正高第補汾陰尉遷祕書詳正學士纍轉給事中出為徐州刺史卒贈禮部侍郎石崴嵬兮山崖崖嶔崟岝崿兮相蔽虧槎崒屼兮莽芊芊噫茲路兮不記年大聖作兮萬物覩惠吾人兮道復古役斯來兮力其成石既攻兮山可平懷荒服兮走上京通萬商兮重九譯車屯軌兮馬齊跡招孔翠兮來齒革伊使臣之光兮將永永而無斁嘉之河朔人天冊中進士擢第久視初又中拔萃科解褐蜀州新津縣主簿開元二十七年卒問卦分江使圖演天文文籍於是濫觴書契以之抽緒皇墳帝典述紀言以聯鑣五傳六經佇禮樂而齊騖斯並懸諸日月煥乎文章至如諸子相騰小說奔競有慚屑玉之化無異雜鉛之寶請用於火恐招博奕之譏將扇其風復爽芟夷之義二塗交戰一為解環百兩之篇孰關其善七分之術孰著其能誰求天下之書誰決冢中之籙識二者何子觀四轍者何人京兆耆舊之篇起於何代陳留神仙之傳創自何人誰先孝子之圖誰首逸人之記倘無談於雕棘將有薦於拔茅對自龍馬出河爰分八卦靈龜薦洛乃見九疇文字以興典謨斯起即有姬公秀出制禮樂以匡周宣父挺生刪詩書而反魯莫不憲章文武祖述唐虞開兆庶之心靈啓㣥生之耳目洎乎尼山落構梁木興歌大義云亡諸子爰起於是墨承清廟儒繫司徒文子開教於五神范蠡逞能於千樹孫武絢其韜略蒙叟混其鵬蜩葛洪述內外之篇劉安論黃白之祕楊託思於全性鄒鋭想於談天商君既擅於刑書尹文亦諒於名實呂韋博識載摛懸市之文鬼谷多才爰創飛箝之作自茲以後其流甚繁雖云有異於微言闕一字亦可觀於小道或激揚仁義或囊括政刑或富國成家或懲惡勸善進既資於助國退亦取於理身實翰墨之泉源信文章之隆藪故馬遷修史列之九流班固敘書著之七略今欲議其刪削語以芟夷便是絶學者之多聞爽國家之廣略學雖不敏未敢從命謹對
