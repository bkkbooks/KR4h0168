front:
  text: 全唐文欽定全唐文卷二百七十三沔京兆長安人應制舉對策為天下第一纍遷祠部員外郎睿宗朝轉著作郎開元中歷祕書監太子賓客二十七年卒年六十七贈禮部尚書諡曰孝
  hash: sha256:a9c64c0844dc140ab7dc074b47a6857ab5ae44573a5e7549427c17e8599316c0
