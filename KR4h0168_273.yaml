body:
  text: 元氣初變有形既闢稟清明之表者騰為星辰受重濁之資者降為土石肇經綸於邃古蓋常久而不易詭哉靈物爰始混成參夫元象麗於太清彼在天也何譴奄淪落於邊城其在地也何幸復推遷於上京爾其蘭臺廣廡藝閣修除飛軒廓落邃宇崇虛芳草旖旎珍木扶疏邇九重之宮闕藏萬古之圖書地禁務政和禮舒貞而不黷其清有餘意棲間之得所形變化其焉如徒觀其隱淪皛昭疑蓄縮光芒體硉矹以難動氣埋冥而不揚擬於規矩既不合於圓方徵其彩飾又無復於元黃匪處匪出不識於行藏匪榮匪悴不達於炎涼夫其靜也何必徐生百祥夫其重也何必能鎮百殃庶永終而知弊蓋抱璞而襲常彼無用也亦至人之所謂允臧臣某言前纍表自陳披歷肝膽懇誠所守期在不移而天聽邈然未垂矜納屏營局蹐罔措心顏臣竊觀帝王支庶進以寵私雖假恩靈必詒一作招禍咎親如梁孝尚非正議所容才同季札猶為長亂之本況臣朽懦將何忝竊且承先建極當可推恩作範惟親宜崇以正伏願陛下雄略潛明皇威誕發燻逐狐鼠梟翦鯨鯢上慰祖宗之心下保元元之命大位既定丕業重光再造四海之基方流萬代之福至於守器允屬元良非聖賢無以厭天下之心非典禮無以為後嗣之法臣地非冢嫡才實昏庸一旦干冒大倫亂越皇統近為身患遠成國恥將何以措身闕庭將何以歸骨山陵是用專固不回繼之以死特希慈造俯垂聖諒臣某中謝臣迹非飾讓言實由衷區區之心敢不披罄素所蓄積塵黷上聞嗟臣不天夙遭險釁哀惸孤藐百罹是攻嗣聖之後天步艱難逼迫崎嶇措身無地既冒儲二又塵尊極正名罰罪合當萬死忝曰臣子豈所宴安殞首滅身無以塞責臣某中謝臣當此際之心豈貪生而憂死誠以身居不容之地命盡危疑之辰上適可以增國羞下未足以明臣節是用冒罪假息忍死苟全尚祈宗廟之靈庶覩反正之運使臣得退保先朝所命歸死藩邸之下則雖灰滅良無遺恨惓惓所守神明知之既而天啓聖期興運伊始明兩出震九二在田臣克遂誠祈獲返舊國私願雖果而皇猷未泰每以釁萌城社將傾宗稷常慮奄忽禍出非常夙夜憂惶罔知攸濟幸屬陛下光啓休烈克復中興長信高居供養有地明堂正位欣戴知安抃舞謳歌稱慶未已不意陛下復將置之非據迫以奪宗前憂未忘後懼仍及臣之膚剝胡寧斯甚今天地交泰朝野歡娛獨在微臣殷憂昭代念及同氣願垂憐察臣某言伏奉某月日制書除臣洛州長史勳封如故伏荷殊私祗承重任屏營夕惕無以自寧臣某中謝臣實凡材素無遠量書生問道未探經術之精俗吏隨班僅見章程之末官資命達榮與時來謬齒周行誤升官秩挈瓶之智守職何功盈缶之誠蹈常斯在冀免罪戾以紓微生仍賜寵章胡寧始望服忝三命階踰九列子孫蒙澤宗黨被恩榮遇既深隕越何答豈雨露之潤沐浴無涯而日月之明昭晰不已更承中旨作尹下都王城嚴門洛師殷雜實四海之朝市據三河之樞要鎮俗移風方資舊德剸繁理劇必藉良能臣亦何人濫膺斯授如觀渤澥未測淺深若負蓬萊無任施重云云臣某言今月日進瓷器官某郎行河南尹鞏縣主簿蔣清還伏奉墨敕仍賜臣衣一副瑞錦一端恩垂北闕榮照東園捧戴殊私載兢載惕臣某中謝伏惟開元天寶聖文神武應道皇帝陛下兼上聖之姿運大明之照雨露萬國陶甄百靈履無為而撫域中躬自然而化天下猶復勤勞睿念祗奉宗祧以億兆為心慈儉為寶臣曲延休盼叨據天官上報無階致身惟谷任土修貢臣子率由之禮自天降祐君父非常之恩宸翰昭回聖慈稠疊寧期水土之淺上乾坤之心天下幸甚復淳風於大古小儉德於前王特垂懸象之明俯賜名臣之服恩銘骨髓澤被宗門不勝慶幸且重錦之賜取貴春秋解衣之賞見高漢代服以宮中之製耀其機上之文潢潦獻微邱山報重又臣所進新米特奉手詔更聞豐歲知萬國之至和式潔秋嘗明一人之孝理無任手足蹈舞之至伏準今月十八日恩赦節文宗廟致享務在豐潔禮經沿革必本人情籩豆之薦或未能備物服制之紀或有所未通者謹案太常奏狀陸海所産鮮美之味隨所有者皆充祭用今既須豐理應加數宗廟之奠每座籩豆各加十二者臣竊聞識禮樂之情者能作達禮樂之文者能述述作之義聖賢所重禮樂之本古今所崇變而通之所以久也所謂變者變其文也所謂通者通其情也祭祀之興肇於太古人所飲食必先嚴獻未有火化茹毛飲血則有毛血之薦未有麴糵汙樽杯飲則有元酒之奠施及後王禮物漸備作為酒醴伏其犧牲以致馨香以極豐潔故有三牲八簋之盛五齊九獻之殷然以神道至元可存而不可測也祭禮主敬可備而不敢廢也是以血腥爓熟元樽犧象靡不畢登於明薦矣然而薦貴於新味不尚褻雖則備物猶存節制故禮云天之所生地之所長苟可薦者莫不咸在備物之情也又曰三牲之俎八簋之實美物備矣昆蟲之異草木之實陰陽之物備矣此節制之文也鉶俎籩豆簋簠樽罍之實皆周人之時饌也其用通於燕饗賓客而周公制禮咸與毛血元酒同薦於先晉中郎盧諶近古之知禮者也著家祭禮觀其所薦皆晉時常食不復純用禮之舊文然則當時飲食不可闕於祠祭明矣是變禮文而通其情也我國家由禮立訓因時制範考圖史於前典稽周漢之舊儀清廟時享禮饌畢陳用周制也而古式存焉園寢上食時膳具設遵漢法也而珍味極焉職貢來祭致遠物也有新必薦順時令也苑囿之內躬稼所收搜狩之時親發所中莫不割鮮擇美薦而後食盡誠敬也若此至矣復何加焉但當申敕有司祭如神在無或怠勗增虔誠其進貢珍羞或時物鮮美考諸祀典有所漏略皆詳擇名目編諸甲令因宜而薦以類相從則新鮮肥濃盡在是矣不必加於籩豆之數也至於祭器隨物所宜故大羹古食也盛於㽅㽅古器也和羹時饌也盛於鉶鉶時器也亦有古饌而盛於時器故毛血盛於盤元酒盛於樽未有薦時饌而追用古器者由古質而今文便於事也雖加籩豆十二未足以盡天下美物而措諸清廟有兼倍之名近於侈矣昔魯人丹桓公之楹又刻其桷春秋書以非禮御孫諫曰儉德之恭也侈惡之大也先君有恭德而君納諸惡無乃不可乎是不以越禮而崇侈於宗廟也又據漢書藝文志墨家之流出於清廟是以貴儉由此觀之清廟之不尚於奢舊矣太常所請恐未可行又按太常奏狀今酌獻酒爵制度全小僅未一合執持甚難不可全依古制猶望稍須廣大者竊據禮文有以小為貴者獻以爵貴其小也小不及制敬而非禮是有司之失其傳也固可隨失釐正無待其議而後革然禮失於敬猶奢而寧儉非大過也未知今制何所依準請兼詳令式據文而行又案太常奏狀外祖父母服請加至大功九月姨舅加至小功五月堂姨舅舅母服請加至袒免者竊聞大道既隱天下為家聖人因之然後制禮禮教之設本為正家家道正而天下定矣正家之道不可以二總一定義理歸本宗父以尊崇母以厭降豈忘愛敬宜存倫序是以內有齊斬外服皆緦尊名所加不過一等此先王不易之道也前聖所志後賢所傳其來久矣昔辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣貞觀修禮時改舊章漸廣渭陽之恩不遵洙泗之典及宏道之後唐隆之間國命再移於外族矣禮亡徵兆儻或斯見天人之際可不誡哉開元初補闕盧履冰嘗進狀論喪服輕重敕令僉議於時㣥議紛拏各安積習太常禮部奏依舊定陛下運稽古之思發獨斷之明至開元八年特降別敕一依古禮事符故實人知向方式固宗盟社稷之福更圖異議竊所未詳願守八年明旨以為萬代成法夫國之有錢時所通用若許私鑄人必競為各徇所求小如有利漸忘本業大計斯貧是以賈生之陳七福規于更漢令太公之創九府將以殷貧人況依法則不成違法則有利謹按漢書文帝雖除盜鑄錢令而不得雜以鉛鐵為他巧者然則雖許私鑄不容姦錢錢不容姦則鑄者無利鑄者無利則私鑄自息斯則除之與不除為法正等能謹於法而節其用則令行而詐不起事變而姦不生斯所以稱賢君也今若聽其私鑄嚴斷惡錢官必得人人皆知禁誡則漢政可侔猶恐未若皇唐之舊也今若稅銅折役則官冶可成計估度庸則私錢無利易而可久而難誣謹守舊章無越制度且錢之為物貴以通貨利不在多何待私鑄然後足用也仙州四面去餘州界雖近若據州而言則元遠土地饒沃戶口稀疏逃亡所歸頗成淵藪舊多劫盜兼有宿寇所以往年患之置州鎮壓今興役幾年主司粗定纍年成規一朝廢省前功盡棄後弊方深今廢州則生患置州則稱煩所以武德巳來迭為廢置足明利害不專一途至於田疇勞損即與許蔡何殊寧為卑位獨當廢省若以州管皆新戶驛長難供唐許州路僻戶少均出旁州非無成例州以鎮俗官以利人所在皆然嘗憚其廢然自創置未盈十年州將員寮屢卒於位天道性命聖人罕言而共理分憂朝寄尤切視死亡而不恤何以得其歡心計不自安政必苟且下承斯弊為傷必多變而通之則可永久州東新置舞陽縣則漢樊噲之舊國噲豐沛故人又高祖之婭惟勳惟舊且親且賢亦既受封亦稱吉土保全良史庶在茲邦又南接白羊川口村聚幽僻妖訛宿肖此為根柢自置縣來十減七八今若移州鎮之亦可杜絶其仙州望且未廢至今年十月移向舞陽置仍為緊州刺史司馬銓頗聞守法公勤望稍加慰勞使其説以成務庶其益於公家問隆周御歷多士如林揚已露才干時求進寧知媒衒之醜不顧廉恥之規風馳景軼雲集霧委攘袂於選曹盱衡於會府吏員仍舊人物實繁優遊窘於退飛聲最疲於點額量能受職無闕以供料官列位擇才斯衆欲令九流式敘一藝不遺佇聞芳話宏茲盛烈且夫署行議年殷姬取人之道門調戶選魏晉持衡之術因宜適變何者為先對昔者賢良方正之士應務之際沔雖固陋嘗亟聞之莫不修詞立誠難進易退言不苟合道不苟容捨之則藏義然後取安肯負媒衒之醜棄廉恥之規若此之類其可多乎至夫揚已露才干時求進盱衡攘袂以徇速者斯皆小子趨附之徒豈足以廁我周行置於多士屏而勿用夫何疑哉主上欽若庶官明揚沈隱是使㣥英露委多士景軼而秉鈞當軸之雋察言觀行之風不能審樞機定名實懲魯儒之虛服辨齊竽之濫吹至令纍最為偽名交戰謬功與實效相參而謂滯才由乎少官無位供乎有德嗟乎事有大謬一至於此明主昧旦丕顯每歎才難而㣥工揚於王庭反憂多士君臣之同德其若是乎天子有司談何容易今懿綱遐布淳風殷流家識廉隅人知禮節苟能上尊王制下絶吏姦閉請託之源塞虛詐之路使得懷才見用以道周旋無令椒蘭信芳獨屈樵夫之手騏驥雖駿不貴屠者之門則虛位待人猶持固讓懷寶深藏何患不達九流式敘庶莫遠焉一藝罔遺諒其所也沔又聞人能宏道非道宏人有濟治之臣無不弊之法往古雖載其陳迹行用實在乎主司觀夫署行議年殷姬令典門調戶選魏晉良圖無非致遠之規咸有理亂之兆所以允釐百揆銓綜百官及讒虐官朝則君子在野貪佞竊柄則以貨售才典故雖存而官政以紊然則隨時通變觀象因宜近取諸身一言斯蔽遠求於古兩無適從所以輕進狂言猶冀或逢善聽謹對問屠釣關柝之流鳴雞吠犬之伍集於都邑蓋八萬計然一作象則人無求備物各異宜十哲殊科八能異術咸資對策則絳灌之器或沈必俟公求則許郭之才難遇選賢取士應有良規對傳曰文以足言言以足志言或可察志隱於漠是知文者言之藻繪志之筌蹄有貞實者或忘藻繪得魚兔者必棄筌蹄則存言捨文合於淳古以言考德必洞精微故書云明試以言蓋用此道也今之對策其試言之流歟昔姬氏既衰先王道喪秦政虐戾亂彼天綱廢古燒書以愚黔首窮兵騁詐時無文焉故絳灌之徒韓彭之佐雄姿雖茂而道法不足向使伊人薄見方策早聞師範當亦略通大體抑揚宏議豈止決勝於境外而不能專議於君前乎故抱朴子曰古之試良將者亦問以策即其義矣國家樹萬世之基遷九流之弊墳索奧業洋溢於時縉紳先生蘊藉無缺安有倜儻之傑瑰瑋之才承明主之渥恩逢生人之大慶而不能抽其祕思效其長策歟然則謀而不行信而不用者抑可知也今之考言取士者必以綺飾為工視學論文者暗於心而必升曉政達幽者失其數而咸退譬千金之璧以微瑕而毀之百丈之材覩小節而棄之亦良可悲矣誠理達而義舉者勿以文害言詞婉而論深者勿以言害意則可以包括㣥品網羅衆途察微知彰以文用武矣昔許子將郭林宗徒以布衣之交俯仰之際而能拔奇旌異因言揣心況乎擅英博之姿受明試之寄享厚祿居尊官而不能撫踠足於吳阪指潛璧於荊山至使有公輔之才而無許郭之鑒者斯則卿士之罪也小子何足以知之至如懷一異能負一偏技鳴梭抗履之彙聲律鼎飪之儔事雖易於縑緗功不資於翰墨則方以類聚各有司存謹對問至於衢室總期一作章重屋陽館姬氏明堂之制炎靈汶上之規三雍五室之名清廟容臺之目蔡雍之論袁準之談庶幾繁省之儀前賢是非之説咸宜詳釋以判㣥疑對我皇帝慈理廣運文思稽古紹興絶典重光大壯合宮雲構明庭天聳列辟軌儀㣥工制度可以即事而見觀象而察今猶遠訪先典曲垂下問者豈不欲揣其敏思徵其博物臣實菲薄何足當之昔哀公問儒而仲尼請更僕況此大體其可率爾言乎雖敢略談之然未臻其極也若夫堯之衢室舜之總期一作章夏之重屋殷之陽館皆所以取象天地昭配陰陽致孝於先布政於下歷運雖改此道不移八窗四達上圓下方度堂以筵度室以几周之制也崑崙茅屋周流璧水漢之圖也明堂辟雍靈臺三雍也太廟青陽總章明堂元堂五室也取其宗祀祖考則曰宗廟取其修飾禮物則曰容臺蔡雍之論所以合異説袁準之談所以別重事歷代繁省其儀不一先賢是非其書甚衆非斯須之述所能盡非造次之言所能精自我皇創制之前今臣定議之外教明禮備得繁省之中者其姬宗乎詞寡理舉處是非之要者其蔡氏乎謹對問不其才難於今所歎知人未易自古病諸以貌取言此其不可觀聲考度又或非宜故皇帝清問有司藻核公孫異之於天子朝錯褒然為孝廉賢才訓迪其道宏矣多歷年所茲率典常國家謁報上元展禮中嶽降非常之制求希代之寶將以潤色雲封增輝柴燎龍門既陟方縱鱗於巨壑鴻干斯漸忽垂翅於風路良由夢石之木猶參杞梓之行冠玉之姿尚忝琳琅之序更令憲府重托詞林承鳳紼之明威俟龍泉之斷割其何以搴秀長楚審詞衆好辨是與非懲忿窒欲聊耳陳事冀獲嘉謀至若柳莊黜殯用事之差也石建闕馬為字之失也尋其後句末韻或犯於前聲覽以終篇答難不倫於次序一之內貧富不侔三道之中妍媸頓別取瑕則頗慙於卞氏擢用則致嫌於葛龔贈孟孫之言膏肓莫愈學嗣宗之默長短何分進退之禮奚宜用捨之方安在又旁求流議紛披風謠威勢壓於權衡黷貨通於主守不同吾黨無嫌小子之詞翻乃倩人云竭老夫之思始令行而詐起終策出而姦生何方可以靜流兢之來何法可以杜訛謬之入佇裨不逮無吝話言對夫鉛刀均鋒劒之恥也蹇驢齊足驥之恥也朗璞蒙垢玉人之過也鳴絲絶絃伶官之罪也借如承明旨獻嘉猷而愚智糾紛臧否錯揉斯亦士君子之所恨豈獨為政之憂哉沔實陋才良不足算憑藉休慶謬偕旌拔狂言雖立鄙道未孚蘊雜薰蕕沈蔽玉石重參㣥彥之末再承議賢之問進思自勵其何補歟退欲鳴謙豈獲無咎審詞衆好儻或擇善而行辨是與非請思即事而對策曰柳莊黜殯用事之差也石建闕馬為字之失也竊謂議人者貴知其心論道者務存其意心懼未信則援古以自明道隱未光即託文而後顯故事以明心為本字以顯道為公事有小差而心術著矣字有小失而道數存焉斯則夜光之瑕明月之類固不可得而棄也事與類相反字與義相違證乖而心不可宏象毀而道不可見一至於此亦無取云策曰尋其後句末韻或犯於前聲覽以終篇答難不倫於次序竊謂明試以言古之道也徵言以策今之制也言有聲韻蓋其浮飾策之次序固非典要切問存於答難次敘豈效謀謨精義盡於對揚聲韻何尋獻替稽之於古揣之於情末韻或犯於前聲其來久矣答難不倫於次序為病良深策曰一之內貧富不侔三道之中妍媸頓別取瑕則頗慙於卞氏擢用則致嫌於葛龔竊謂萬有一失聖人不免捨過舉能先師是訓道不可以純備才不可以周給斷可知矣是以國家稽通塞之迹列甲乙之科亦不可廢善以取瑕疑於擢用矣策曰贈孟孫之言膏肓莫愈學嗣宗之默長短何分進退之禮奚宜用捨之方安在仲尼有言不在其位不謀其政進退之禮用捨之宜允非小人之所及也然則覽古昔之遺事敢不薦其聞乎竊謂日中必熭操刀必割懲姦以察何俟贈言致身於朝不可以默固當參刑禮以定枉直體明智以辨情偽見利不虧其分見死不更其守屬聰明不諱之時居執憲繩違之任何至持疑於果斷逡巡於正色哉策曰旁求流議紛披風謠威勢壓於權衡黷貨通於主守不同吾黨無嫌小子之詞翻乃倩人云竭老夫之思始令行而詐起終策出而姦生甚矣誠哉不期所以然也今所慮怙威黷貨者其類猶存假手借詞者其人不遠但能察其言象揆而度之精核問試優而柔之則竊寶之名自分濫吹之竽自遁矣其道甚著人焉廋哉策曰何方可以靜流競之來何法可以杜訛謬之入竊謂任良在主宏道在人以執事之明遵大君之惠敷明智以考往迹揚清機以鑒㣥情則知訛謬不興流競永息俯慙謏議良非話言謹對原夫道之所運坦乎大方情之所鍾慟非恆數積善餘慶則吳有延陵喪子於嬴博闕壽則魯有下闕哀詞載感行路況乎華歲陽止摧蘭秀於謝庭望月融明落珠暉於隨掌元成象闕上闕茂宏闕其下闕海層搆蕃於夏業克生俊彥必復公侯圖勳烈而載旗常席寵闕而紆圭組闕諸下闕嗣祖善意皇朝銀青光祿大夫硤州刺史雋闕二州都督長沙縣開國男贈下闕翼子於三台歿為貴人榮親於八座父崇紫微令兼兵部尚書梁國公開府儀同三司乂下闕也稟五常之精粹含六氣之淳和幼而韶明長而英達學禮而立行中準闕學詩以言文闕黼藻下闕警衛升雲陛以周旋惟彼儲闈聿求端士出納初命尤藉正人乃除君太子通事舍人敷奏詳闕詞令下闕國所資尤重符節大夫元服天子信臣妙年兼之可謂殊寵遷都水使者考闕之宜下闕勝暫迂令望言佐近藩出為延州司馬雖屈我直闕蹭蹬栖闕而安乎卑位從闕默闕遷齊州下闕晉城寶利將有范金軍國所儲於是為大乃除君隴州長史未到官入轉為下闕以清白升進朝廷休之封虢縣開國子食邑四百戶奄宅方國傳之子孫策名清時下闕穰鄧之境乃拜鄧州刺史兼檢校商州運漕武關之外方城所臨下闕就役將何克堪況奠川滌源疏山通道盡賦不足以供郵傳下闕使人勞而無怨義然後取均不患貧咸用康寧莫敢闕窳刊濬畢闕不闕之功歟下闕恂會稽之辭劉寵不是過也上以形於遠方尤杖能吏竟抑而不許海濱廣厚瀉鹵下闕命坐為泉藪亂繩易擾棼絲不綱君褰帷到官乘傳按部威令預振仁風先翔闔境肅然良下闕豪傑知禁專任誠恕而人不忍欺大削煩苛而物皆遂性朝廷嘉之徵拜光祿少卿海州人下闕厥政二金鼎之重司玉食之珍課行職修名劭身泰於時令公光輔興運丕承睿下闕兒無驕盈之色九班留滯四載不遷方於朝賢校闕族未有若斯之比者也允所謂謙謙君子無競惟時溫溫恭人下闕祐粵以開元四年歲次景辰八月草六日遘疾終於東都慈惠里第春秋卌上初聞闕有疾頻遣使問下闕藥奉御李宗乘驛就療嗟乎異方靈草不植中原近古名香無聞今日營魂莫返賦命何言主上聞之下闕夭促而禮備哀榮以其年十一月癸酉朔十八日庚寅葬於東都萬安山之南原禮也平生闕衛下闕存惟君至性過人少而純闕宦於外遊必有方恆營闕服玩動下闕實因心闕邀浮名尤慎內行題飾後進賞接名流纖能不下闕疾衆賢闕歎庶士憂惶咸則由衷有逾恆禮亭闕羇闕之人下闕公以是子闕為家之寶存不伸其用歿必揚其名不闕遺烈沔忝闕儒闕然下闕邁德流允錫瑞離疆祚分虞后績著闕王施於帛丿糸載闕誕生忠良其一下闕門子沖年解巾侍從丹禁優遊縉紳闕總方嶽惠我蒸民闕為名臣其三竭誠下闕其四闕宸扆感徹台庭郊原寂寂埏冥冥夜臺不曉泉戶長扃式闕百行流範千齡其五
