front:
  text: 全唐文欽定全唐文卷五百三十二觀字元賓檢校吏部員外郎華從子貞元中舉博學宏詞授太子校書郎卒年二十九
  hash: sha256:c4068d7f9c2b757141ad51c2858d6ab60330e5d1186675bf84d6e7603b01885e
  markers:
  - {type: head, offset: 14, content: 李觀(一), id: KR4h0168_NFKB_532-h1, level: 1}
body:
  text: 殷之哲王唯政是恤夜分而寢夢獲良弻雖神悸而若驚冀形求而勿失爰徵營匠刻乎獨見之真乃俾庶僚訪其唯似之質當厥夢也神馳無方未訖永夕如躋彼蒼怳其神兮以浮偃其體兮若亡形接乃夢斯人甚良側身徘徊於已之傍將舉趾以趨附又伸眉而抑揚言霏霏而無瑕目矎矎而有光觀其儀可用為列辟之式察其志不獨稱百夫之防升降咸若周旋允臧寂乎昭昭既寢不忘斯后克明承天之賚謂濟川之器而投足不濡履大覺之端而遊夢無閡其中蕩蕩其表曖曖雖助用理於一人實候清平於千載於是武丁夢於宮而上與天通傅說築於外而中合神契持緡向老諒殊渭水之涯負畚將疲久困傅巖之際說匪丁而空山長往丁匪說而大位斯替如魚水之相因保君臣之雙麗惟說也策名歸主惟丁也受命於帝帝何言哉邈以元造陰推吉士以佐有道說之居兮山之幽雲峩峩兮水浩浩彼人兮何斯歘中心兮夢之如渴兮在茲如饑兮在茲想遺眷兮索隱撫空懷而歎思思之未得端扆沈默其夢也則誠其寤也則惑其收之於野而寄之以國有唐時雍上明下恭君與之同日臣與之比蹤事不惟舊今之斯從斐而成章有愧雕龍異哉天地之樂其可聞乎美矣盛矣神夫至夫謂其有不見其有謂其無不見其無是惟德盛者能感匪詞工者足愉故昔秦穆之寐也去乎人閒即乎天上豁如有遇杳若無妄大音嘈兮交作上帝儼以延望百神紛紜而齊赴萬變合沓而殊狀日月正其東西星辰分其背向乃有地祗上謁天仙下朝奕奕翩翩霓裳羽蓋之洊集砰砰磕磕撞鐘擊鼓之相囂舞之者傞傞而中節歌之者洩洩而匪驕其疾武足畏其徐文足昭遇之以神殊季札之觀魯樂而忘味類宣尼之聽韶是知窮深極厚於何不有罕究其真莫尋其首德聲及於無外協氣積於虛受駭矣乎樂以和和之至而天用作天之神而樂克宣其動也與元氣迭運其靜也與太虛相全噫乎哉不可階升者天道但見夫乘虛躡浩乍如周文之夢實異季路之禱獲覩天樂之和羅神工之擊考是天之所合道不虛行九奏未終初疑八佾三歎既退方異六英徒觀夫鏜鎝之內響優柔之正聲六幽為之震魄七曜為之垂精而莫識其曲達其情既覺既悟如喜如戚天樂之遺音在耳天神之仿像猶覿顧何德而承之受祉於天錫者也我思西來兮猶前日之未賒歲迴復兮倏歷五稔如一息歟咄嗟我道甚直兮志甚迂若陟景之無所涉川之無涯今雖非乎乘車而輹除道亦庶乎執笏而還家我之家兮逼江湄而臨海澨其地則古有吳王之夫差十代之風兮但傳乎稽古數畝之宅兮不樹乎桑麻親之慈兮兄之友與予之弟悌常澣衣而菲食吾安得以夫役役此還之為華乃命僕以詰朝而必上道問何有則曰始來之寶刀經笥其外則毫末而無加於是乃出國門而東騖乃賦其言曰東還兮直書吾意而罔差風蒼茫兮候入八月灞上之日西南斜城中之人或持酒肉以送我覩夫車馳馬顛兮無非別者之為邪繇是酒不飲兮肉不御咸回回兮一泣而歌苟天下之人兮離合之若此矧吾高堂為念之謂何乃三肅而行順彼長道忘自東西之相遐窮秋之月寒露既降陽精既衰陰氣初壯川流清迴天宇寥曠觸物易悲幽懷難狀於時元鳥已逝白駒迅奔枯木盡落愁雲正昏於是輕裘公子長纓王孫隕如雨之涕驚離憂之魂絕朱炎之盛夏想冰紈之微溫匪一腋之克成償千金而靡論則有征人之戍遊客遠道蕭條萬里葉下如埽展轉百年志何能保纖絺未蔑華髮先老責頹光之不駐歎凉吹之云早繫帛書於勁翮秣戰馬於征草蘭閨少婦瑤琴徐擊散凉風於幽幔流皓月於遙夕生不工於機杼意頗妙於刀尺忘其圍帶忖以疇昔青泥密封紅箋淚滴庶因夢寐遂達行役則有如賢非賢烈心悢然茹菜郊墟被褐不全方覩飛礫振野遊氛翳天海上斷鴈林閒獨蟬使我躑躅不進捫心自憐忽遇翰林大夫揚眉奮鬚叱僕問曰幾年業儒衣不完縷體無肌膚豈不為連蹇雌伏邅迴守株今欲邀之以同袍策之以並驅審將焉如僕謂曰道之未行節曷可渝請俟天命汝無我虞帝何為乎何謫歲何為乎何祥水何為乎競火陰何為乎乘陽易曰大人者與天地合其德日月合其明今則反矣所謂合德者變化合其序所謂合明者進退合其常今則反矣夫君德行乎下天德行乎上行乎上者下合行乎下者上讓今世則反矣謂之合德則非應謂之合明則迷嚮豈大人之德有時而不合天地之德有時而用罔堯之代九州淪胥湯之代天下焚如彼二后者帝矣王矣其有所不合者乎蓋所以天道遠人道邇不可以知約不可以知窮已乎客曰非也夫堯之德合天以仁天合亦以仁夫湯之德合天以時而天合亦以時故堯曰惟天為大惟堯則之湯曰伊尹相湯伐桀升自陑堯所以為帝湯所以為王其與天地合其德與日月合其明矣子誣聖人吾不取矣由是堯之水堯民不悲湯之旱湯民不饑故誌曰聖人在上雹不為災其是之謂乎子何陋矣曰噫吾聞之存不忘亡安不忘危人君之知也又聞一夫不獲其所則曰時予之辜人君之仁也今霪雨彌月莫覩天符雨陰氣也陰疑於陽必戰其水乎其兵乎下民有不獲者乎予豈若商之患利農之憂苗而已乎誠有已念也夫堯之水而人不悲者舜禹稷契之在朝也夫湯之旱而民不饑者伊尹仲虺之為臣也是雖八年之水賢乎三季七年之旱賢乎二世所謂有德者災非其眚無德者吾見其無災而為害也故神降於莘虢之災也熒惑守心宋之祥也二國者厥猶然也堯湯之德孰曰不動天地乎郊祭古先之重禮復古之令主惟郊非我無以暢明祀惟我非郊無以踵三五於是睿言下諏曰爾庸我謀謀協不違官乃交修居天之陽掘起虛丘於斯時也歲在子月在子日短之宵漏未盡而皇帝翼翼告祀於丘之上先一日法駕致齋於丘之下天地之神會於無閒陰陽之祗立於寂寞以觀我之儀以歆我之饗八方之靈各以位焉祥光促明和氣解嚴石無觸雲木無緒風獻羞飫神烘燎歷天神下於蓋高樂作於無聲昂昂巍巍大繇之英洋溢乎帝心肹蠁乎萬靈是用報盛德於上申洪緒乎後為茂世之績紹允之程也㣥公常伯相揖而言曰我元后父戴天所以象為子子不私其能天視我元后所以象為父父不有其仁子不私其能莫大於郊天之義父不有其仁莫富於生物之遂元哉二者之為德與變化而終始溥湛恩於崇朝焯懿式於永年蔑堯於華封小舜於泰山遠斯懷邇斯安兆人從龍一人下觀其文昭昭其武桓桓實歌者可歌實言者可言斯文也有以見聖理願書之不刊草莽賤臣某再拜上言臣伏思太學之為道也厥惟大哉實所以德宇於國家教源於萬方辨齊於人倫親親而尊尊誠宜歲勅崇嚴日致肅祗工度木不俟乎榱桷崩朝命官取稱乎師氏當然後乃可以陳四代之禮興無窮之風開素王之堂削青衿之篇人懋廉隅俗捐爭端天下之仁人相則焉是以德由此澤教由此流若水之潤下洚涌植物利不浩哉今覩斯壞甚不然乎嗚呼在昔學有六館居類其業生有三千盛侔於古近年禍難寖用耗息洎陛下君臨宿弊尚在執事之臣顧不為急升學之徒罔敢上達積微成慝超歲歷紀賤臣極言誠合要道具六館之目其曰國子太學四門書律算等今存者三亡者三亡者職由厥司存者恐不逮修輿人有棄本之議㣥生有將壓之虞至有博士助教鋤犂其中播五稼於三時視辟雍如農郊堂宇頹廢磊砢屬聯終朝之雨流潦下渟既夕之天列宿上羅㣥生寂寥攸處貿遷而陛下不以問學官不以聞執政之臣不以思所謂德宇將摧教源將乾先聖之道將不堪猶火之炎上燄燄至焚其為不利也豈不畏哉日者聖朝以武夷時屯有風牧建帝庸今者聖朝以文象天經有臯衡宣皇猷實四三六五之君子閒無足以閒之然事不為加理人不為加安歲貢之夫不能應請問晏罷之勤無以悟元機天下有倒懸之悲諸侯有安忍之懷執柄之臣深惟無從但勞心於無益全身於因循是了不知長國之術在乎養士養士之方在乎隆學夫學廢則士亡士亡則國虛國虛則上下危上下危則禮義銷禮義銷則狂可姦聖賊可凌德聖德逶迤不知其終今觀執事之臣之心必以修太學為害時而他害者千之養士者為費財而他費者萬之殊不知此費無費而他費為費也此害無害而他害為害也諺所謂溜之細穿石綆之細斷榦斯言損益有漸非聰喆靡察也今乃不明徵於儒書欽若於權輿繼統於易俗恢業於純風而望海內俊傑靡然踵武於雲龍之庭不知其可也禮稱虞夏殷周天下之盛王也蓋以其有庇民之德祚國之仁且太學之興本於有虞達於三王踰至於漢魏以降特盛於我太宗文皇帝重聖遵之無以增洊興於先皇而延於聖朝此乃古帝王慜醇醨亂崩故用教於人百代奉之以宏長國家廣之以存濟元元陛下不宜忽之而已今四君德以相高八聖幽而不炤風聲隨而凋落焉夫四君之民古猶易制陛下之民猾且難矣易制之民古猶或遺之難制之民得不重慎乎昔春秋書太室壞傳曰書不恭也臣今懼聖朝之史書太學廢使萬代之嗣無法矣今聖朝聚國中之兵守塞下之壘殫織婦之機悉農夫之儲豈其惡民而賤物誠為社稷之謀也假一旦農夫死織婦病兵壘充郊粟帛不輸陛下此時其暇勸學乎則禮義之心不素蓄於人亦難以致天下之和矣且四方之學太學之枝葉也天子之教諸侯之本也未有本之顛而枝葉之存天子之亡而諸侯之興夫為國者亦猶治一身京師人之心四方人之體諸侯體之四支心平則體之患易除體平則四支之患不除而愈今不嗇神於心體而竭資於四支時變於外氣虛於中則為不起之人矣伏惟陛下察弛張之會觀損益之圖減無用之府崇有裕之源廢闕修而百度明庠序昌而教化行經邦於悠久熙載於登閎顧夫周營靈臺魯修泮宮於陛下萬分之一焉伏惟遽令職司不至於不可持天下幸甚維初乾之精坤之靈播五行為五常而中華之人得之離四氣為四方而蠻夷胡貊得之五行合而成至和故宅中四氣偏而為匪人故在邊是亦太極造物之智元黃冥成之心者乎故聖人乘五行而允釐作九圍而外之五帝三皇禹湯已來不聞深入之征不紀薄伐之師殆繇鴻龎之風未甚流沖漠之澤未甚醨周秦之閒天下始勞前有涇陽之侵踵有長城之徭周人逐之而已不常為心秦人罔知天命連兵謷謷至於逆三靈掊生人元元蜩蜋魁傑駿奔始圖備胡之術卒覆守邦之人秦之事萬祀鏡哉漢孝武承業之盛負才之雄隘函夏鮮黎蒸將郛窮荒而㝢不鄰揚威四臨霆發電溢歷載五六而功患相儔誓詘慮殫兵老釁仍於時乃交和親之問還奔命之勤然已天下懸磬君臣與謀遂有鹽鐵車船搉酤六畜之租興危矣哉不居之地不牧之人何苦如是哉矧乃乘秋之虜常存討虜之賦不除漢之事亦萬祀鏡哉噫惟皇唐操璇璣馭民而統天將二百齡朝更九聖運開中興縱橫六合上下天淵蜚馳之倫莫不被仁獨犬戎跳梁猾我右陲儒之策曰和親武之議曰宿兵和親則易攜宿兵則厚亡九聖之君前後病之然屬三方乂安悉力一隅則右臂可斷六吂月馬凡可俘太宗元宗之時也厥後內寇數動國家一罷虜滋新謀土失舊封伊頃迄今有加無瘳豈負鼎虧折衝之資推轂無封疆之忠志士仁人是以累息而長歎且周曰獫狁秦曰胡漢曰匈奴然實非二蓋隨國而名之於今則曰吐蕃則正居庚方涉河而北履海而西宇宙絕徼羌戎全區亦不可得而制可斥而遠之觀今不能制也信矣斥之則何宜橫戎所向不廣千里扼盜之衝不越十處擇一虎臣練萬虎賁使制得自專權得自縱夫兵有專制則畢力將無分權則成功是則陰山可復泣虜陽關可復隔戎何邊之不安焉今聖人朝在明堂晚在法宮左右進退焉得知安邊之要哉雍熙大臣苟以小者近者為懷遑復思崇九廟之原哉且國家思復三方之民得以養之區區然如懼不周而忿生然寒卒饑徒終自有之愚竊恐戎無卻年矣邊無安期矣財有盡朝矣何者今國家一垂控戎累所暴兵兵不問堪將不擇良當守者爭險易當攻者避後先寇之來則棄民而相保寇之去則冒賞而稱庸此所謂戎無卻年矣夫戰陣多將則勢離攻守多將則不支以其勝不得盡有敗不得獨受故也至今聞有築城於虜蹊遷民於虜濱城適罷而寇窬民未居而囚拘彎弓者卻行蒙甲者退趨此所謂邊無安期矣且虜不可以無兵而威兵不可以不戰而歸故明主得下征蒼蒼之產將軍得外娛悠悠之師此所謂財有盡朝矣然三患始萌一言尚平欲戎之可却也不願多分節與人願擇一人敢以近言之則開元朝哥舒翰之將是也欲邊之可安也不願歲更四方之兵願因其兵敢以古言之則漢晁錯之策是也欲財之不盡也不願衣食供給山東願開邊田敢以古言之則趙充國之奏是也此則兵不得娛無功虜不得候相膠國不得殫下民胡不得用周漢之策範孫子之謀哉又竊覩與北狄和親帝女下嫁實國家思往年之績垂不臣之姻然聞烝報且數貪惏無厭而主上年必遣使使必備珍得無費乎得無勤乎不知將尋鄭人伐胡之誼復採賈生五餌之言邪愚竊以為無知之俗不可以歲辱大命天子之使不可以日臨穹廬是手足倒懸夷夏相侔復何以南面而聽天下穆穆然而觀諸侯愚敢以棄同即異而言且定西之危有若前之說申北之恩有羈縻之文不願國家曠兵於茲汙命於茲斯者皆巖廊之亟扆旒之虞而㞕㞕狂夫亮違孔父不謀之經庶陪公車敢諫之儔俾委輅輸貲求試屬國之官而後觀焉某再拜觀在朝無近屬當路無至親藉父兄之餘慶為篤信義以立志雲雨未泰其節彌固才命非厚欲彊不能哀鳴吳坂之側翹思魏闕之下自絕絃知音遂稀今之王公大人朱其門肅其衞見貴要子弟則前席見貧約等輩則不容曳裾何嘗覺非相效為善且士有才與藝而不北入洛西入秦終棄之矣觀嘗言向同道勉而速行昨日遂有白衣少年掉臂而往連牆數子祖離於吳閶門外忽見巨舫齊軸危旌卷旒橫於古河周以翠幕因詢路人曰處州使君移病屆此曾歷京尹瑯琊大夫觀曩固聞矣乃屏息而走退還陋居寫誠於紙持以上謁伏惟十叔使君覽之十叔典縉雲之日美聲溢海內嘉話滿人口開閤延士如水赴壑財無積實賓至如歸時觀寓於浙右即欲馳造反覆而念薄言介懷何者十叔之門芝蘭競茂後臭味恐不蒙植是一也又以十叔之客諛媚而進觀為性愚訐慮有詭勝之禍是二也又慮十叔所重以權勢所受以論囑脫若轗軻祈益得損是三也又畏十叔重扉羅㦸而不獲俯仰取人以貌而不遭遘遇是四也故躊躇而止却入圭竇尋聞表以辭疾詔以養閑觀慙失其計慷慨內責初謂駑足既劣龍步難追若何歧路之隅霄漢觸目深冀榮及於弱植渥流於本根則照乘之末輝九重之浸潤十叔巖廊英幹府藏珍器孤秀不雜增瀾無涯常披腹心不隱胷臆道之偶矣人咸附之觀名雖未彰日用捧慰願備灑埽不知曷如闚見天下弊事尤要刪革以十叔令望方宜擅之豈可逡巡也世閒嗤彼曠職不知是行也將何所之詣朝廷乎游山水乎朝廷正納諫山水不足樂十叔早覲皇上無滋淹滯執政渴賢不亦勤久觀久負百丈氣表五車筆鋒而困於艱窶不克奮發坐被愁役動為病侵勞生未安壯歲能幾每藿食不飽窮居若酲不知蒼蒼天可階而問十叔異日得用鴻恩庇之斐然成章以代木訥庶降憐惠許無戰惶觀再拜觀羈旅之人也運會未合汲汲不暇無由謁王公令望瞻仰已久公之政理自以何如枉直之閒孰可苟且觀非在位敢有所論議至是非仰由執事願傾耳目少尋鄙談夫朝廷憲章懸之柱史一郡綱目非君而誰錄事參軍者所以兼弱攻昧奉上肅下眾司之重器外劇之利權揣量得失操舉凝滯使閭閻息其訟封畧播其美一曹一局淒然凉風無小無大煦若春景事均勞逸人緘怨讟則齧肥乘駿不有靦揣作誠此作者之展用也孰可俯同散吏屈比庸材上官之政不能佐下僚之事不能達令願言者吞舌欲視者俛眉立貽伊戚坐受流議竊所惡之且公之明幹少與為侔威亦震矣要且奇迹尚隱芳聲未聞不度疎頑遙託機牘萬一相統終無恨焉前此邑貳朱利見多年遠客非累削官公豈不悉微祿未畢沈疴殆絕公豈不知此生真木人石心得及今日側聞州將撫之甚厚言與津致事猶陵阻觀與朱生胡越之閒耳但念同類非私用字猶祁奚為言朱博代訟以彼方此今猶昔也且朱生有三寸之喙近百中之手交必盡節義能捐軀才名之人多與為友嘗見此生見說區區慕公之尺書編次盈握動息寤寐著之襟懷仍謂觀曰王公奇士豈不憐我因覽公翰墨測公淺深公眷朱生豈不親密未審執事竟將如何嗚呼噓嘻此生抱屈心破積憂頭白泣盡垂血慟餘失聲意不可盡之於文言不可窮之於筆如觀之拙何能具陳且公任當其要刃有餘地不察舉寃塞周贍困窮使移理就人植德歸已此亦公之所職誰曰不然嗟乎忍遣一人龍鍾無托濩落至死而素餐之輩怡怡自安觀輒為拊髀長歎且於執事其能快乎嘗聞刺史委公利害納公可否朱生漸弊願公早圖之觀兼有拙書致於專城論朱生之事便投公狂驚遽啟言不畢志志亦可見何能盡言言雖不嘉慎勿貽辱觀再拜觀天授之器而不受之辨是以每拜於前若不能言及還旅居嘗懷所恨亦欲默已懼未之知故申其愚淺望加省覽觀之心與天下之人心異其所務亦異觀小子方讀書學古受嚴師心訓屬文厲志立可久之譽年二十六七之側始合遊人閒求隨武子郭林宗之儔以為行媒豈畏鳴不驚人舉不戾天者乎今天下之人則不然哉學止膚受或文得泛濫有崔盧之親戚有酒肉之費給往還依倚而得之罷便已是與人之異也又言所務亦異者如觀之務非為已也有親而貧旨養不充僑處江介無素基業所以冀願速遂薄名寸祿以給晨夕之膳也而今之人所慕未必為貧若孝行但欲身上有片光耳是所務亦異也十丈試凝意察之其事豈不然也觀之舅與十丈日與相善古人之分也始命觀曰吾有故人某光大威重人之傑者必能倜儻成爾况爾我之甥觀虔拜舅之言比伏下風知非不深也禮非不厚也倜儻之分未之有得不以觀形甚么麼文不穎脫恐言之為有累耶近者竊審高意愈見其志也何者十丈賞常人文與觀之文同所賞常人之情與觀之情同而觀獨務刻鵠之末希有因驥之力亦何異弋者守空罝行路喜遺契哉噫吁哉是命屯歟時屯歟文屯歟如三者必有一未泰不爾豈知者不言言者不知乎今甚痛者莫若羈旅曷有帝城之下薪如桂米如瓊僕人不長三四尺而僦瘦驢以求食有時不食人畜問日曛黑未還則令憂駭一日不為則便失飡第五倫靈臺中靈輒翳桑下不甚於此觀寄國子監時又聞舉子其艱苦憔悴者雖有鏗鍧其才不如齧肥躍駿足黨與者雖無所長得之必駃觀是以益憂之加復如此月夏草盡綠朔風之情起白華之戀切無衣之累歎偏在遙夕倚廬之永念頻入愁夢乃既明發氣淚嗚咽十丈得不惕然視之而忍高觀於營營之子夫營營之子者觸目千萬待觀其閒將何望焉昨者有放歌行一篇擬動李令公徼數金之恩不知宰相貴盛出處有節埽門之事不可復跡俯仰吟惋未知見由邂逅不動亦虛棄也今去舉已促甚自激發其有未知已者大可畏也俾未知之有聞非十丈誰哉鵬飛九萬一日未易料耳觀長跪聽命
