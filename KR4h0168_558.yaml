front:
  text: 全唐文欽定全唐文卷五百五十八韓愈十二
  hash: sha256:4b4481c090d69deedeed93d3a56a985f142598e722a803e3dd701ac6616b0df3
body:
  text: 愈與李賀書勸賀舉進士賀舉進士有名與賀爭名者毀之曰賀父名晉肅賀不舉進士為是勸之舉者為非聽者不察也和而唱之同然一辭皇甫湜曰若不明白子與賀且得罪愈曰然律曰二名不偏諱釋之者曰謂若言徵不稱在言在不稱徵是也律曰不諱嫌名釋之者曰謂若禹與雨邱與蓲之類是也今賀父名晉肅賀舉進士為犯二名律乎為犯嫌名律乎父名晉肅子不得舉進士若父名仁子不得為人乎夫諱始於何時作法制以教天下者非周公孔子歟周公作詩不諱孔子不偏諱二名春秋不譏不諱嫌名康王釗之孫實為昭王曾參之父名皙曾子不諱昔周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱呂后名雉為野雞不聞又諱治天下之治為某字也今上章及詔不聞諱滸勢秉機也惟宦者宮妾乃不敢言諭及機以為觸犯士君子言語行事宜何所法守也今考之於經質之於律稽之以國家之典賀舉進士為可耶為不可耶凡事父母得如曾參可以無譏矣作人得如周公孔子亦可以止矣今世之士不務行曾參周公孔子之行而諱親之名則務勝於曾參周公孔子亦見其惑也夫周公孔子曾參卒不可勝勝周公孔子曾參乃比於宦者宮妾則是宦者宮妾之孝於其親賢於周公孔子曾參者耶龍噓氣成雲雲固弗靈於龍也然龍乘是氣茫洋窮乎元閒薄日月伏光景感震電神變化水下土汨陵谷雲亦靈怪矣哉雲龍之所能使為靈也若龍之靈則非雲之所能使為靈也然龍弗得雲無以神其靈矣失其所憑依信不可歟異哉其所憑依乃其所自為也易曰雲從龍既曰龍雲從之矣善醫者不視人之瘠肥察其脉之病否而已矣善計天下者不視天下之安危察其紀綱之理亂而已矣天下者人也安危者肥瘠也紀綱者脉也脉不病雖瘠不害脉病而肥者死矣通於此說者其知所以為天下乎夏殷周之衰也諸侯作而戰伐日行矣傳數十王而天下不傾者紀綱存焉耳秦之王天下也無分勢於諸侯聚兵而焚之傳二世而天下傾者紀綱亡焉耳是故四支雖無故不足恃也脉而已矣四海雖無事不足矜也紀綱而已矣憂其所可恃懼其所可矜善醫善計者謂之天扶與之易曰視履考祥善醫善計者為之談生之為崔山君傳稱鶴言者豈不怪哉然吾觀於人其能盡吾性而不類於禽獸異物者希矣將憤世嫉邪長往而不來者之所為乎昔之聖者其首有若牛者其形有若蛇者其喙有若鳥者其貌有若蒙倛者彼皆貌似而心不同焉可謂之非人耶即有平脅曼膚顏如渥丹美而很者貌則人其心則禽獸又惡可謂之人耶然則觀貌之是非不若論其心與其行事之可否為不失也怪神之事孔子之徒不言余將特取其憤世嫉邪而作之故題之云爾世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱於奴隸人之手駢死於槽櫪之閒不以千里稱也馬之千里者一食或盡粟一石食馬者不知其能千里而食也是馬也雖有千里之能食不飽力不足才美不外見且欲與常馬等不可得安求其能千里也策之不以其道食之不能盡其材鳴之而不能通其意執策而臨之曰天下無馬嗚呼其真無馬耶其真不知馬也古之學者必有師師者所以傳道授業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎是故無貴無賤無長無少道之所存師之所存也嗟乎師道之不傳也久矣欲人之無惑也難矣古之聖人其出人也遠矣猶且從師而問焉今之衆人其下聖人也亦遠矣而恥學於師是故聖益聖愚益愚聖人之所以為聖愚人之所以為愚其皆出於此乎愛其子擇師而教之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者非我所謂傳其道解其惑者也句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則㣥聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近諛嗚呼師道之不復可知矣巫醫樂師百工之人君子不齒今其智乃反不能及其可怪也歟聖人無常師孔子師郯子萇宏師襄老聃郯子之徒其賢不及孔子孔子曰三人行必有我師是故弟子不必不如師師不必賢於弟子聞道有先後術業有專攻如是而已李氏子蟠年十七好古文六藝經傳皆通習之不拘於時學於余余嘉其能行古道作師說以貽之麟之為靈昭昭也詠於詩書於春秋雜出於傳記百家之書雖婦人小子皆知其為祥也然麟之為物不畜於家不恆有於天下其為形也不類非若馬牛犬豕豺狼麋鹿然然則雖有麟不可知其為麟也角者吾知其為牛鬣者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿惟麟也不可知不可知則其謂之不祥也亦宜雖然麟之出必有聖人在乎位麟為聖人出也聖人者必知麟麟之果不為不祥也又曰麟之所以為麟者以德不以形若麟之出不待聖人則謂之不祥也亦宜國子先生晨入太學招諸生立館下誨之曰業精於勤荒於嬉行成於思毀於隨方今聖賢相逢治具畢張拔去凶邪登崇畯良占小善者率以録名一藝者無不庸爬羅剔抉刮垢磨光蓋有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公言未既有笑於列者曰先生欺余哉弟子事先生於茲有年矣先生口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鉤其元貪多務得細大不捐焚膏油以繼晷恆兀兀以窮年先生之業可謂勤矣抵排異端攘斥佛老補苴罅漏張皇幽尋墜緒之茫茫獨旁搜而遠紹障百川而東之回狂瀾於既倒先生之於儒可謂有勞矣沈浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易奇而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣少始知學勇於敢為長通於方左右具宜先生之於為人可謂成矣然而公不見信於人私不見助於友跋前躓後動輒得咎暫為御史遂竄南夷三年博士冗不見治命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼饑頭童齒豁竟死何裨不知慮此而反教人為先生曰吁子來前夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之工也玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也昔者孟軻好辨孔道以明轍環天下卒老於行荀卿守正大論是宏逃讒於楚廢死蘭陵是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇於世何如也今先生學雖勤而不繇其統言雖多而不要其中文雖奇而不濟於用行雖修而不顯於衆猶且月費俸錢歲靡廩粟子不知耕婦不知織乘馬從徒安坐而食踵常途之促促窺陳編以盜竊然而聖主不加誅宰相不見斥茲非其幸歟動而得謗名亦隨之投間置散乃分之宜若夫商財賄之有亡計班資之崇庳忘己量之所稱指前人之瑕疵是所謂詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其豨苓也今之人以一善為行而恥為之慕達節而稱夫通才者多矣然而脂韋汨沒以至於老死者相繼亦未見他之稱其豈非亂教賊名之術歟且五常之教與天地皆生然而天下之人不得其師終不能自知而行之矣故堯之前千萬年天下之人促促然不知其讓之為美也於是許由哀天下之愚且以爭為能乃脫屣其九州高揖而辭堯由是後之人竦然而言曰雖天下猶有薄而不售者况其小者乎故讓之教行於天下許由為之師也自桀之前千萬年天下之人循循然不知忠易其死也故龍逢哀天下之不仁覩君父百姓入水火而不救於是進盡其言退就割烹故後之臣竦然而言曰雖萬死猶有忠而不懼者况其小者乎故忠之教行於天下由龍逢為之師也自周之前千萬年渾渾然不知義之可以換其生也故伯夷哀天下之偷且以彊則服食其葛薇逃山而死故後之人竦然而言曰雖餓死猶有義而不懼者况其小者乎故義之教行於天下由伯夷為之師也是三人俱以一身立教而為師於百千萬年閒其身亡而其教存扶持天地功亦厚矣嚮令三師恥獨行慕通達則堯之日必曰得位而濟道安用讓為夏之日必曰長進而否退安用死為周之日必曰和光而同塵安用餓為若然者天下之人促促然而爭循循然而佞渾渾然而偷其何懼而不為哉是則三師生於今必謂偏而不通者矣其可不謂之大賢人者哉嗚呼今之人其慕通達之為弊也且古聖人言通者蓋百行衆藝備於身而行之者也今恆人之言通者蓋百行衆藝闕於身而求合者也是則古之言通者通於道義今之言通者通於私曲其亦異矣將欲齊之者其不猶矜糞丸而擬質隨珠者乎且令今父兄教其子弟者曰爾當通於行如仲尼雖愚者亦知其不能也曰爾尚力一行如古之一賢雖中人亦希其能矣豈不由聖可慕而不可齊賢可及而可齊邪今之人行未能及乎賢而欲齊乎聖者亦見其病矣夫古人之進修或幾乎聖人今之人行不出乎中人而恥乎力一行為獨行且曰我通同如聖人彼其欺心邪吾不知矣彼其欺人而賊名邪吾不知矣余懼其說之將深為通解火泄於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災矣水發於深而為用且遠能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反為患矣言起於微而為用且博能不違於道可化可令可告可訓以推於生物及其縱而不慎反為禍矣火既我災有水而可伏其焰能使不陷於灰燼矣水既我患有土而可遏其流能使不仆於波濤矣言既我禍即無以掩其辭能不罹於過者亦鮮矣所以知理者又焉得不擇其言歟其為慎而甚於水火博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德仁與義為定名道與德為虛位故道有君子小人而德有凶有吉老子之小仁義非毀之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所為德德其所德非吾所謂德也凡吾所謂道德云者合仁與義言之也天下之公言也老子之所謂道德云者去仁與義言之也一人之私言也周道衰孔子沒火於秦黃老於漢佛於晉魏梁隋之閒其言道德仁義者不入於楊則入於墨不入於老則入於佛入於彼必出於此入者主之出者奴之入者附之出者汙之噫後之人其欲聞仁義道德之說孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其說樂其誕而自小也亦曰吾師亦嘗云爾不惟舉之於其口而又筆之於其書噫後之人雖欲聞仁義道德之說其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盜也古之時人之害多矣有聖人者立然後教之以相生養之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣饑然後為之食木處而顛土處而病也然後為之宮室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其土凶土鬱為之政以率其怠倦為之刑以鋤其強梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之害至而為之備患生而為之防今其言曰聖人不死大盜不止剖斗折衡而民不爭嗚呼其亦不思而已矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無爪牙以爭食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也君不出令則失其所以為君臣不行君之令而致之民則失其所以為臣民不出粟米麻絲作器皿通貨財以事其上則誅今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清靜寂滅者嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也帝之與王其號名殊其所以為聖一也夏葛而冬裘渴飲而饑食其事殊其所以為智一也今其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責饑之食者曰曷不為飲之之易也傳曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外天下國家滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之進於中國則中國之經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荊舒是懲今也舉夷狄之法而加之先王之教之上幾何其不胥而為夷也夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賓主昆弟夫婦其服麻絲其居宮室其食粟米果蔬魚肉其為道易明而其為教易行也是故以之為已則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼享曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與揚也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其說長然則如之何而可也曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡孤獨廢疾者有養也其亦庶乎其可也性也者與生俱生也情也者接於物而生也性之品有三而其所以為性者五情之品有三而其所以為情者七曰何也曰性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而已矣其所以為性者五曰仁曰禮曰信曰義曰智上焉者之於五也主於一而行於四中焉者之於五也一不少有焉則少反焉其於四也混下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也情之於性視其品孟子之言性曰人之性善荀子之言性曰人之性惡揚子之言性曰人之性善惡混夫始善而進惡與始惡而進善與始也混而今也善惡皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為大戚知若敖氏之鬼不食也人之性果善乎后稷之生也其母無災其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎堯之朱舜之均文王之管蔡習非不善也而卒為奸瞽瞍之舜鯀之禹習非不惡也而卒為聖人之性善惡果混乎故曰三子之言性也舉其中而遺其上下者也得其一而失其二者也曰然則性之上下者其終不可移乎曰上之性就學而易明下之性畏威而寡罪是故上者可教而下者可制也其品則孔子謂不移也曰今之言性者異於此何也曰今之言者雜佛老而言也雜佛老而言也者奚言而不異古之君子其責己也重以周其待人也輕以約重以周故不怠輕以約故人樂為善聞古之人有舜者其為人也仁義人也求其所以為舜者責於己曰彼人也豫人也彼能是而我乃不能是早夜以思去其不如舜者就其如舜者聞古之人有周公者其為人也多才與藝人也求其所以為周公者責於己曰彼人也豫人也彼能是而我乃不能是早夜以思去其不如周公者就其如周公者舜大聖人也後世無及焉周公大聖人也後世無及焉是人也乃曰不如舜不如周公吾之病也是不亦責於身者重以周乎其於人也曰彼人也能有是是足為良人矣能善是是足為藝人矣取其一不責其二即其新不究其舊恐恐然惟懼其人之不得為善之利一善易修也一藝易能也其於人也乃曰能有是是亦足矣曰能善是是亦足矣不亦待於人者輕以約乎今之君子則不然其責人也詳其待己也廉詳故人難於為善廉故自取也少己未有善曰我善是是亦足矣己未有能曰我能是是亦足矣外以欺於人內以欺於心未少有得而止矣不亦待其身者已廉乎其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者已詳乎夫是之謂不以衆人待其身而以聖人望於人吾未見其尊已也雖然為是者有本有原怠與忌之謂也怠者不能修而忌者畏人修吾常試之矣常試語於衆曰某良士某良士其應者必其人之與也不然則其所疏遠不與同其利者也不然則其畏也不若是強者必怒於言懦者必怒於色矣又嘗語於衆曰某非良士某非良士其不應者必其人之與也不然則其所疏遠不與同其利者也不然則其畏也不若是強者必說於言懦者必說於色矣是故事修而謗興德高而毀來嗚呼士之處此世而望名譽之光道德之行難已將有作於上者得吾說而存之其國家可幾而理歟形於上者謂之天形於下者謂之地命於其兩閒者謂之人形於上日月星辰皆天也形於下草木山川皆地也命於其兩閒夷狄禽獸皆人也曰然則吾謂禽獸人可乎曰非也指山而問焉曰山乎曰山可也山有草木禽獸皆舉之矣指山之一草而問焉曰山乎曰山則不可故天道亂而日月星辰不得其行地道亂而草木山川不得其平人道亂而夷狄禽獸不得其情天者日月星辰之主也地者草木山川之主也人者夷狄禽獸之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉遠有嘯於梁從而燭之無見也斯鬼乎曰非也鬼無聲有立於堂從而視之無見也斯鬼乎曰非也鬼無形有觸吾躬從而執之無得也斯鬼乎曰非也鬼無聲與形安有氣曰鬼無聲也無形也無氣也果無鬼乎曰有形而無聲者物有之矣土石是也有聲而無形者物有之矣風霆是也有聲與形者物有之矣人獸是也無聲與形者物有之矣鬼神是也曰然則有怪而與民物接者何也曰是有二有鬼有物漠然無形與聲者鬼之常也民有忤於天有違於民有爽於物逆於倫而感於氣於是乎鬼有形於形有憑於聲以應之而下殃禍焉皆民之為之也其既也又反乎其常曰何謂物曰成於形與聲者土石風霆人獸是也反乎無聲與形者鬼神是也不能有形與聲不能無形與聲者物怪是也故其作而接於民也無恆故有動於民而為禍亦有動於民而為福亦有動於民而莫之為禍福適丁民之有是時也作原鬼
