body:
  text: 諸道節度觀察使置店停上茶商每斤收搨地錢並稅經過商人頗乖法理今請釐革橫稅以通舟船商旅既安課利自厚今又正稅茶商多被私販茶人侵奪其利今請強幹官吏先於出茶山口及廬壽淮南界內布置把捉曉諭招收量加半稅給陳首帖子令其所在公行從此通流更無苛奪所冀招恤窮困下絶姦欺使私販者免犯法之憂正稅者無失所之歎欲究根本須舉綱條夫血氣之屬必有知凡有知者必同體所謂真淨明妙虛徹靈通卓然而獨存者也是衆生之本源故曰心地是諸佛之所得故曰菩提交徹融攝故曰法界寂靜常樂故曰涅槃不濁不漏故曰清淨不妄不變故曰真如離過絶非故曰佛性護善遮惡故曰總持隱覆含攝故曰如來藏超越元閟故曰密嚴國統衆德而大備爍㣥昏而獨照故曰圓覺其實皆一心也背之則凡順之則聖迷之則生死始悟之則輪回息親而求之則止觀定慧推而廣之則六度萬行引而為智然後為正智依而為因然後為正因其實皆一法也終日圓覺而未嘗圓覺者凡夫也欲證圓覺而未極圓覺者菩薩也具足圓覺而住持圓覺者如來也離圓覺無六道捨圓覺無三乘非圓覺無如來泯圓覺無真法其實皆一道也三世諸佛之所證蓋證此也如來為一大事出現蓋為此也三藏十二部一切修多羅蓋詮此也然如來垂教指法有顯密立義有廣略乘時有先後當機有淺深非上根圓智其孰能大通之故如來於光明藏與十二大士密說而顯演潛通而廣被以印定其法為一切經之宗也圭峯禪師得法於荷澤嫡孫南印上足道圓和尚一日隨衆僧齊於州民任灌家居下位以次受經遇圓覺了義卷未終軸感悟流涕歸以所悟告其師師撫之曰汝當大宏圓頓之教此經諸佛授汝耳禪師既佩南宗密印受圓覺懸記於是閲大藏經律通唯識起信等論然後頓轡於華嚴法界宴坐於圓覺妙場究一雨之所霑窮五教之殊致乃為之疏解凡大疏三卷大鈔十三卷略疏兩卷小鈔六卷道場修證儀一十八卷並行於世其敘教也圓其見法也徹其釋義也端如析薪其入觀也明若秉燭其辭也極於理而已不虛騁其文也扶於教而已不苟飾不以其所長病人故無排斥之說不以其未至蓋人故無胸臆之論蕩蕩然實十二部經之眼目三十五祖之骨髓生靈之大本三世之達道後世雖有作者不能過矣其四依之一乎或淨土之親聞乎何盡其義味如此也或曰道無形視者莫能覩道無方行者莫能至况文字乎在性之而已豈區區數萬言而可詮之哉對曰噫是不足以語道也前不云乎統衆德而大備爍㣥昏而獨照也圓覺也蓋圓覺能出一切法一切法未嘗離圓覺今夫經律論三藏之文傳於中國者五千餘卷其所詮者何也戒定慧而已修戒定慧而求者何也圓覺而已圓覺一法也張萬行而求之者何衆生之根器異也然則大藏皆圓覺之經此疏乃大藏之疏也羅五千軸之文而以數卷之疏通之豈不至簡哉何言其繁也及其斷言語之道息思想之心忘能所滅影像然後為得也因不在詮表耳嗚呼生靈之所以往來者六道也鬼神沈幽愁之苦鳥獸懷獝狘之悲修羅方瞋諸天正樂可以整心慮趣菩提唯人道為能耳人而不為吾末如之何也已矣休嘗遊禪師之閫域受禪師之顯訣無以自效輒直讚其法而普告大衆耳其他備乎本序云經云文字性空又曰無離文字而說解脫必曰捨文字然後見法非見法者也圭峯禪師誕形於西充通儒於遂寧業就將隨貢詣有司會有大德僧道圓得法於洛都荷澤大師嫡孫南印開法於遂州大雲寺師遊座下未及語深有所欣慕盡取平生所習捐之染削為弟子受心法他日隨衆僧齊於州民任灌家居下位以次受經遇圓覺了義卷未終軸感悟流涕歸以所悟告其師師撫之曰汝當大宏圓頓之教此經諸佛授汝耳行矣無自滯於一隅也師稽首泣奉命北去抵襄漢會初有自京師負雲花觀大師華嚴疏鈔至者師一覽升座而講聽者數千百人遠近大驚然後至京師詣雲花寺修門人之禮北遊清涼山回住於呼縣草堂寺未幾復入寺南圭山所至道俗歸依者如市得法者數百人注圓覺大小二疏華嚴金剛起信唯識四分律法界觀皆有章句自是圓頓之教大行於世其他原人道之根本會禪教之異同皆隨扣而應待問而答或徒衆遠地因教誡而成書或門人告終為安心而演偈或熙怡於所證之境告示初心或偃仰於所住之山歌詠道趣其文廣者其理彌一其語簡者其義彌圓門弟子集而編之成十卷昭昭然定慧之明鏡也禪師以法界為堂奧教典為庭宇慈悲為冠蓋衆生為園林終日贊述未嘗以文字為念今所傳者蓋荊山之人以玉抵鵲而為行路之所寶也余高枕於吾師戶牖之間久矣知者不言則後代何以仰吾師之道乎於是粗舉其大節以冠於首裴休序有大禪師法諱希運住洪州高安縣黃檗山鷲峯下乃曹溪六祖之嫡孫西堂百丈之法嗣獨佩最上乘離文字之印唯傳一心更無別法心體亦空萬緣俱寂如大日輪升虛空中光明照耀淨無纎埃證之者無新舊無淺深說之者不立義解不立宗主不開戶牖直下便是動念即乖然後為本佛故其言簡其理直其道峻其行孤四方學徒望山而趨覩相而悟往來海衆常千餘人豫會昌二年廉於鍾陵自山迎至州憩龍興寺旦夕問道大中二年廉于宛陵復去禮迎至所部安居開元寺旦夕受法退而紀之十得一二佩為心印不敢發揚今恐入神精義不聞於未來遂出之授門下僧太舟法建歸舊山之廣唐寺問長老法衆與往日常所親聞同異如何也時唐大中十一年十月初八日序圭峰禪師集禪源諸詮為禪藏而都序之河東裴休曰未曾有也自如來現世隨機立教菩薩間生據病指藥故一代時教開深淺之三門一真淨心演性相之別法馬龍二士皆宏調御之說而空性異宗能秀二師俱傳達摩之心而頓漸殊稟荷澤直指知見江西一切皆真天台專依三觀牛頭無有一法其他空有相破真妄相攻反奪順取密指顯說故天竺中夏其宗實繁良以病有千源藥生多品投機隨器不得一同雖俱為證悟之門盡是正真之道而諸宗門下通少局多故數十年來師法益壞以承稟為戶牖各自開張以經論為干戈互相攻擊情隨函矢而遷變法逐人我以高低是非紛拏莫能辨析則向者世尊菩薩諸方教宗適足以起諍後人增煩惱病何利益之有哉圭峯大師久而歎曰吾丁此時不可以默矣於是以如來三種教義印禪宗三種法門融瓶盤叉釧為一金攪酥酪醍醐為一味振綱領而舉者皆順據會要而來者同趨尚恐學者之難明也又復直示宗源之本末真妄之和合空性之隱顯法義之差殊頓漸之異同遮表之回互權實之深淺通局之是非莫不提耳而告之指掌而示之嚬呻以吼之愛軟以誘之乳而藥之憂佛種之夭傷也腹而擁之念水火之漂焚也挈而導之懼邪小之迷陷也揮而散之悲鬬爭之牢固也大明不能破長夜之昏慈母不能保身後之子若吾師者捧佛日而委曲回照疑曀盡除順佛心而橫亘大悲窮劫蒙益則世尊為闡教之主吾師為會教之人本末相扶遠近相照可謂畢一代時教之能事矣或曰自如來滅後未嘗大都而通之今一旦違宗趣而不守廢關防而不據無乃乖祕藏密契之道乎答曰佛於法華涅槃會中亦已融為一味但昧者不覺故涅槃經迦葉菩薩曰諸佛有密語無密藏世尊讚之曰如來之言開發顯露清淨無翳愚人不解為之祕藏智者了達則不名藏此其證也故王道興則外戶不閉而守在戎夷佛道備則諸法總持而防在魔外不當復執情攘臂於其間也嗚呼後之學者當取信於佛無取信於人當取證於本法無取證於末習能如是則不孤圭峯劬勞之德矣法界者一切衆生身心之本體也從本已來靈明廓徹廣大虛寂唯一真之境而已無有形貌而森羅大千無有邊際而含容萬有昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分非徹法之慧目離念之明智不能見自心如此之靈通也甚矣衆生之迷也身反在於心中若大海之一漚爾而不自知有廣大之威神而不能用觳觫而自投於籠檻而不自悲也故世尊初成正覺歎曰奇哉我今普見一切衆生具有如來智慧德相但以妄想執著而不得證於是稱法界性說華嚴經令一切衆生自於身中得見如來廣大智慧而證法界也故此經極諸佛神妙智用徹諸法性相理事盡修行心數門戶真可謂窮理盡性者也然此經雖行於世而罕能通之有杜順和尚歎曰大哉法界之經也自非登地何能披其文見其法哉吾設其門以示之於是著法界觀而門有三重一曰真空門揀情妄以顯理二曰理事無閡門融理事以顯用三曰周遍含容門攝事事以顯元使其融萬象之色相全一真之明性然後可以入華嚴之法界矣然此觀雖行於世而罕能入之有圭山禪師歎曰妙哉法界之門也自非知樞鑰之淺深識閫闑之廣狹又何能扣其門而入之哉於是直以精義注於觀文之下使人尋注而見門得門而入觀由觀以通經因經以證性朗然如秉炬火而照重關矣或問曰法界真性超情離見動念則隔彊言則乖世尊欲令衆生悟自身之法體何必廣說而為華嚴答曰吾聞諸圭山云法界萬象之真體萬行之本源萬德之果海故如來演萬行之因華嚴以本性而顯示諸佛證法性之萬德也故九會之經品品有無量義或剎塵數因地行願或恆沙數果位德用行布差別無閡圓融故佛身一毛端則遍一切而舍一切也世界爾衆生爾塵塵爾念念爾法法爾無一法定有自體而獨立者證此本法故能凡聖融攝自在無閡納須彌於芥中擲大千於方外皆吾心之常分爾非假於他術也原注世人見說諸佛菩薩神變必謂假於他術或謂虛誕之辭此二疑皆非也若言假於他術者豈可聖人動不合理而假妖怪以惑人哉若言虛誕之辭者魔妖精魅尚能神變况法身聖人獨不能為之哉由是觀之則吾輩從來執身心我人及諸法定相豈非甚迷甚倒哉然則華嚴稱法界而極談猶未為廣也問曰華嚴理深而事廣文博而義元非法身大士不能證入今數紙觀文豈能盡顯之哉若觀門以文略義廣為得則大經以文繁義局為失矣答曰吾聞諸圭山云夫欲覩宗廟之邃美望京邑之巨麗必披圖經而登高臺然後可盡得也不登高而披圖則不可謂真見不披圖而登高則眊然無所辨故法界具三大該萬有性相德用備在心不在經也原注如宗廟京邑之美麗在城中不在圖上明因果列行位顯法演義勸樂生信備在經不在觀也原注如宗廟之遠近街衢之闊狹在圖不在臺觀者通經法也原注入觀通經以證性如登高臺披圖而望京邑也文者入觀之門也原注如高臺下有門得其門然後可升也注者門之樞鑰也原注臺高門深非善用樞鑰者不能開也故欲證法界之性德莫若經原注性德廣大非經備說不能盡也通經之法義莫若觀原注法義雖廣不出三重法界非觀不能入也入觀之重元必由門原注觀境幽深無門不可入也闢三重之祕門必由樞鑰夫如是則經不得不廣門不得不朿矣然則其門何以為三重答曰吾聞諸圭山云凡夫見色為實色見空為斷空內為筋骸所梏外為山河所眩故困踣於迷塗局促於轅下而不能自脫也於是菩薩開真空門以示之使其見色非實色舉體是真空見空非斷空舉體是幻色則能廓情塵而空色無閡泯智解而心境俱冥矣菩薩曰於理則見矣於事猶未也於是開理事無閡門以示之使觀不可分之理皆圓攝於一塵本分限之事亦通遍於法界然後理事圓融無所罣閡矣菩薩曰以理望事則可矣以事望事猶未也於是開周遍含容門以示之使觀全事之理隨事而一一可見全理之事隨理而一一可融然後一多無閡大小相含則能施為隱顯神用不測矣問曰觀文有數家之疏尚未能顯其法今略注於文下使學者何以開心目哉答曰吾聞諸圭山云觀者見法之智眼門者通智眼今見法之門初心者悟性之智雖明不得其門則不能見法此文即入法之門矣但應以智眼於門中觀照妙境若別張義目而廣釋之是於門中復設門也又此門中重重法界事理無邊雖百紙不能盡其義徒以繁文廣說蕪沒真法而惑後人爾且首標修字者欲使學人冥此境於自心心慧既明自見無盡之義不在備通教典碎列科段也然不指而示之則學者亦無由及其門故直於本文關要之下隨本義注之至其門已則使其自入之也故其注簡而備不備則不能引學者至其門不簡則不能使學者專妙觀夫觀者以心目求之之謂也豈可以文義而至哉問曰略指其門誠當矣吾恐學者終不能自入也答曰吾聞諸圭山云夫求道者必資於慧目慧目不能自開必求師以抉其膜也若情膜未抉雖有其門亦焉能入之哉縱廣何益問曰既遇明師何假略注答曰法界難覩須依觀以修之觀文難通須略注為樞鑰之用也惑者稽首讚曰入法界之術盡於此矣圭峯禪師號宗密姓何氏果州西充縣人釋迦如來三十九代法孫也釋迦如來在世八十年為無量人天聲聞菩薩說五戒八戒大小乘戒四諦十二緣起六波羅密四無量心三明六通三十七品十力四無畏十八不共法世諦第一義諦無量諸解脫三昧惣持門菩薩涅槃常住法性莊嚴佛土成就衆生度天人教菩薩一切妙道可謂廣大周密廓法界於無疆徹性海於無際權實頓漸無遺事矣最後獨以法眼付大迦葉令祖祖相傳別行於世非私於迦葉而外人天聲聞菩薩也顧此法衆生之本源諸佛之所證超一切理離一切相不可以言語智識有無隱顯推求而得但心心相印印印相契使自證之光明受用而已自迦葉至達摩凡二十八世達摩傳可可傳王祭王祭傳信信傳忍為五祖又傳融為牛頭宗忍傳能為六祖又傳秀為北宗能傳會為荷澤宗荷澤於宗為七祖又傳讓讓傳馬馬於其法為江西宗荷澤傳磁州如如傳荊南張張傳遂州圓又傳東京照圓傳大師大師於荷澤為五世於達摩為十一世於迦葉為三十八世其法宗之系也如此大師本豪家少通儒書欲干世以活生靈偶謁遂州遂州未與語退遊徒中見其儼然若思而無念朗然若照而無覺欣然慕之遂削染受教道成乃謁荊南荊南曰傳教人也當盛於帝都復謁東京照照曰菩薩人也誰能識之復謁上都花嚴觀觀曰毗盧花藏能隨我遊者其汝乎初在蜀因齊次受經得圓覺十三章深達義趣遂傳圓覺在漢上因病僧付花嚴句義未嘗聽受遂講花嚴自後乃著圓覺花嚴及涅槃金剛起信唯識盂蘭法界觀行願經等疏鈔及法義類例禮懺修證圖書纂略又集諸宗禪言為禪藏總而叙之並酬答書偈議論等凡九十餘卷皆本一心而貫諸法顯真體而融事理超㣥有於對待冥物我而獨運矣議者以大師不守禪行而廣講經論遊名邑大都以興建為務乃為多聞之所役乎豈聲利之所未忘乎嘻議者焉知大道之所趣哉夫一心者萬法之總也分而為戒定慧開而為六度散而為萬行萬行未嘗非一心一心未嘗違萬行禪者六度之一耳何能總諸法哉且如來以法眼付迦葉不以法行故自心而證者為法隨願而起者為行未必常同也然則一心者萬法之所生而不屬於萬法得之者則於法自在矣見之者則於教無礙矣本非法不可以法說本非教不可以教傳豈可以軌跡而尋哉自迦葉至富郍奢凡十祖皆羅漢所度亦羅漢馬鳴龍樹提婆天親始開摩訶衍著論釋經摧滅外道為菩薩唱首而尊者闍夜獨以戒力為威神尊者摩羅獨以苦行為道跡其他諸祖或廣行法教或專心禪寂或蟬蛻而去或火化而滅或攀樹以示終或受害而償債是乃法必同而行不必同也且循轍迹者非善行守規墨者非善巧不迅疾無以為大牛不超過無以為大士故大師之為道也以知見為妙門寂靜為正味慈忍為甲盾慧斷為劒矛破內魔之高壘陷外賊之堅陳鎮撫邪雜解釋縲籠遇窮子則叱而使歸其家見貧女則訶而使照其室窮子不歸貧女不富吾師恥之三乘不興四分不振吾師恥之忠孝不並化荷擔不勝任吾師恥之避名滯相匿我增慢吾師恥之故皇皇於濟拔汲汲於開誘不以一行自高不以一德自崇人有依歸者不俟請則往矣有求益者不俟憤則啓矣雖童幼不於敬接雖驁佷不怠於叩勵其以闡教度生助國家之化也如此故親大師之法者貪則施暴則斂剛則隨戾則順昏則開墮則奮自榮者慊自堅者化徇私者公溺情者義凡士俗有捨其家與妻子同入其法分寺而居者有變活業絶血食持戒法起家為近住者有出而修政理以救疾苦為道者有退而奉父母以豐供養為行者其餘憧憧而來欣欣而去揚袂而至實腹而歸所在甚衆不可以紀真如來付囑之菩薩衆生不請之良友其四依之人乎其十地之人乎吾不識其境界廷宇之廣狹深淺矣議者又焉知大道之所趣哉大師以建中元年生於世元和二年印心於圓和尚又受具於拯律師大和二年慶成節徵入內殿問法要賜紫方袍為大德尋請歸山會昌元年正月六日坐滅於興福塔院儼然如生容貌益悅七日而後遷於函其自證之力可知矣其月二十二日道俗等奉全身於圭峯二月十三日茶毗初得舍利數十粒明白潤大後門人泣而求諸煨中必得而歸今悉斂而藏於石室其無緣之慈可知矣俗歲六十二僧臘三十四遺戒深明形質不可以久駐而真靈永劫以長存乃知化者無常存者是我死後輿施蟲犬焚其骨而散之勿墓勿塔勿悲慕以亂禪觀每清明上山必講道七日而後去其餘住持法行皆有儀則違者非我弟子今皇帝再闡真宗追諡定慧禪師青蓮之塔則塔不可以不建石不可以不斫且使其教自為一宗而學者有所標仰也門人達者甚衆皆明如來知見而善說法要或巖穴而息念或都會而傳教或斷臂以酬德或白衣以淪跡其餘一禮而悟道終身而守護者僧尼四衆數千百人得其氏族道行可傳於後世者紀於別傳休與大師於法為昆仲於義為交友於恩為善知識於教為內外護故得詳而叙之他人則不詳銘曰如來知見大事因緣祖祖相承燈燈相燃分光並照顯說密傳摧邪破魔證聖登賢漸之者入頓之者全孰紹孰興圭峯在焉甚大慈悲不捨周旋以引以翼恐迷恐顛直示心宗傍羅義筌廣收遠取無棄無捐金湯魔城株杌情田銷竭芟伐大道坦然功高覺場會盛法筵不染而住淤泥青蓮性無去來運有推遷順世而歎衆生可憐風號曉野鐘摧夜川舍筏而去溺者誰前巖崖荊榛阻絶危懸輕錫而過踣者誰肩不有極慈孰能後先吾師何處復建橋船法指一靈徒餘三千無負法恩永以乾乾元祕塔者大法師端甫靈骨之所歸也於戲為丈夫者在家則張仁義禮樂輔天子以扶世導俗出家則運慈悲定慧佐如來以闡教利生捨此無以為丈夫也背此無以為達道也和尚其出家之雄乎天水趙氏世為秦人初母張夫人夢梵僧謂曰當生貴子即出囊中舍利使吞之及誕所夢僧白晝入其室摩其頂曰必當大宏法教言訖而滅既成人高顙深目大頤方口長六尺五寸其音如鐘夫將欲荷如來之菩提鑿生靈之耳目固必有殊祥奇表歟始十歲依崇福寺道悟禪師為沙彌十七正度為比邱隸安國寺具威儀於西明寺照律師稟持犯於崇福寺升律師傳唯識大義於安國寺素法師通涅槃大旨於福林寺崟法師復夢梵僧以舍利滿琉璃器使吞之且曰三藏大教盡貯汝腹矣自是經律論無敵於天下囊括川注逢原委會滔滔然莫能知其畔岸矣夫將欲伐株杌於情田雨甘露於法種者固必有勇智宏辨歟無何謁文殊於清涼衆聖皆現演大經於太原傾都畢會德宗皇帝聞其名徵之一見大悅常出入禁中與儒道議論賜紫方袍歲時錫施異於他等復詔侍皇太子於東朝順宗皇帝深仰其風親之若昆弟相與臥起恩禮特隆憲宗皇帝數幸其寺待之若賓友常承顧問注納偏厚而和尚符彩超邁詞理響捷迎合上旨皆契真乘雖造次應對未嘗不以闡揚為務繇是天子益知佛為大聖人其教有大不思議事當是時朝廷方削平區夏縛吳斡蜀瀦蔡蕩鄆而天子端拱無事詔和尚率緇屬迎真骨於靈山開法場於祕殿為人請福親奉香燈既而刑不殘兵不黷赤子無愁聲蒼海無驚浪蓋參用真宗以毗大政之明效也夫將欲顯大不思議之道輔大有為之君固必有冥符元契歟掌內殿法儀録左街僧事以摽表淨衆者凡一十年講涅槃唯識經論位處當仁傳授宗主以開誘道俗者凡一百六十座運三密於瑜伽契無生於悉地日持諸部十餘萬遍指淨土為息肩之地嚴金經為報法之恩前後供施數十百萬悉以崇飾殿宇窮極雕繪而方丈匡牀靜慮自得貴臣盛族皆所依慕豪俠工賈莫不瞻嚮薦金寶以致誠仰端嚴而禮足日有千數不可殫書而和尚即衆生以觀佛離四相以修善心下如地坦無邱陵王公輿臺皆以誠接議者以為成就常不輕行者唯和尚而已夫將欲駕橫海之大航拯迷途於彼岸者固必有奇功妙道歟以開成元年六月一日西向右脅而滅當暑而尊容若生竟夕而異香猶鬱其年七月六日遷於長樂之南原遺命茶毗得舍利三百餘粒方熾而神光月皎既燼而靈骨珠圓賜諡大達塔曰元祕俗壽六十七僧臘四十八門弟子比邱比邱尼約千餘輩或講論元言或紀綱大寺修禪秉律分作人師五十其徒皆為達者嗚呼和尚果出家之雄乎不然何至德殊祥如此其盛也承襲弟子義均自政正言等克荷先業虔守遺風大懼徽猷有時堙沒而閣門使劉公法緣最深道契彌固亦以為請願播清塵休嘗遊其藩備其事隨喜讚嘆蓋無愧辭銘曰賢劫千佛第四能仁哀我生靈出經破塵教網高張孰辨孰分有大法師如從親聞經律論藏戒定慧學深淺同源先後相覺異宗偏義孰正孰駮有大法師為作霜雹趣真則滯涉僞則流象狂猿輕鈎檻莫收柅制刀斷尚生瘡疣有大法師絶念而遊巨唐啓運大雄垂教千載冥符三乘迭耀寵重恩顧顯闡讚導有大法師逢時感召空門正闢法宇方開崢嶸棟梁一旦而摧水月鏡像無心去來徒令後學瞻仰徘徊寶月清涼寂照法界以沙門相藏世間解澄湛含虛氣清鐘鼎雪沃剡溪霞橫緱嶺真室寥敻靈嶽崔嵬虛融天地峻拔風雷離微休命實際龎鴻奉若時政革彼幽蒙炯乎禹質元聖孕靈德雲冉冉凝眸幻形谷響入耳性不可為青蓮出水深不可窺才受尸羅奉持止作原始要終克諧適莫鳳藻璝奇遺演祕密染翰風生供盈二筆欲造元關咽金一象逮竟將流龍飛千揚疏新五頂光銜二京躍出法界功齊百城萬行芬披華開古錦啓迪㣥氓與甘露飲燮讚金偈懷生保乂聖主師資聿興遐裔貝葉翻宣譯場獨步談柄一揮幾回天顧王庭闡法傾河湧泉屬辭縱辨元元元元紫衲命衣清涼國號不有我師孰知吾道九州傳命然無盡燈一人拜錫統天下僧帝網沖融潛通萬戶歷天不周同時顯晤卷舒自在來往無蹤大士知見允執厥中西域供牙梵倫遽至奏啓石驗嘉風益熾勑俾圖真相即無相海印大龍蟠居方丈哲人去矣資何所參即事之理塔鎖終南
