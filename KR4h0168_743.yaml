front:
  text: 全唐文欽定全唐文卷七百四十三休字公美孟州濟源人長慶中登第又舉賢良方正異等歷諸府解署入為監察御史右補闕史館修撰會昌中自尚書郎歷典外郡大中初纍官戶部侍郎充諸道鹽鐵使轉兵部侍郎遷御史大夫六年以本官同平章事纍轉中書侍郎兼禮部尚書十年罷為宣武軍節度使封河東縣子守太子少保分司東都十一年充昭義軍節度使十三年徙河東十四年徙鳳翔又徙荊南咸通初入為戶部尚書徙吏部加太子少師卒
