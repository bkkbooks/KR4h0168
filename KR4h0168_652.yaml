  text: 全唐文欽定全唐文卷六百五十二元稹六
  hash: sha256:97cc9d981c6b6d1d4e48071ec538143cd1083720e99550233919fc903c9d951c
body:
  text: 右臣伏見中書門下牒奉進止以錢重物輕為病頗甚宜令百寮各隨所見作利害狀類會奏聞者臣備位有司謬總邦計權物變弊職分所當固合經心自思上達豈宜待問方始啓謀臣伏以作法於人必求適中苟非濟衆是作不臧所以夙夜置懷重難其術伏奉制旨旁採庶寮臣實有司敢不知愧既不早思所見上沃聖聰今乃備數庶官肩隨奏議無乃失有司奉職之體負尸位素餐之責况道謀孔多是用不集盈庭之言自古所知至於業廣即山稅徵穀帛發公府之朽貫禁私室之滯藏使泉流必通物定恆價㣥議所共指事皆然但在陛下行之有司遵守利害之說自足可徵若使將廣引古今誕飾詞辨有齊畫餅無益國經恐重空文不敢輕議謹議謹按禮官以順宗至德大聖大安孝皇帝神主升祔則中宗大和大聖大昭孝皇帝神主為代數當遷之廟議者云中宗復辟中興當為百代不遷之廟臺省官等又議云則天為居攝則中宗非中興之主不得為不遷之廟以愚所裁皆非得禮之中也案禮官與臺省官等議但以為中宗非中興故不得為不遷之宗曾不知雖實為中興亦不得為不遷之廟何則祖有功而宗有德蓋謂始有功者為祖始有德者為宗非謂後代有功有德者盡為祖宗也禮緯云唐虞立二昭二穆與太祖之廟為五夏不立太祖之廟四廟而已至後代以禹為宗亦立五廟其餘仲康復厥位少康代寒浞豈非嗣夏中興哉竝無祖宗之號至殷以契為始祖初立五廟後代以湯為宗遂立六廟太戊武丁之徒雖有中宗高宗之名蓋子孫加之懿號而已亦無不祧之說周人以后稷為始祖後代又祖文王而宗武王遂立七廟唐虞夏殷周雖立廟之數不同其實親親之廟皆以四為准禮記王制云天子七廟三昭三穆與太祖之廟七蓋后稷文武三廟為不遷其餘成康已降盡為祧廟故周禮守祧注云先公之祧祔於后稷之廟先王之祧祔於文武之廟若以為後代有功有德者盡為不遷之廟則成康刑措宣王中興平王東周之始王並無不祧之說豈非有功有德哉蓋以為七廟之數既定若親盡之廟不毀則親親之昭穆無所設矣故不得不祧耳至漢承秦滅學之後諸儒不通大義匡衡貢禹之徒遂建議云高帝為太祖孝文為太宗孝武為世宗孝宣為中宗惠景已下為遷廟適值漢祚不永昭成已降德不逮於四君向若漢有八百之祚繼德之君有若孝文孝武者七人盡為不遷之廟豈可後代遂不祀其祖禰哉不經之言孰甚於此又有以七廟之外別立祖宗之廟為說者以理推之尤為不可假如聖朝以景皇帝為太祖神堯大聖大光孝皇帝為高祖文武大聖大廣孝皇帝為太宗別列昭穆之廟六合不遷之廟為九蓋以為積厚者流澤廣故以增親親之廟六矣夫傳無窮者為萬代計國家以聖生聖以明繼明無非有德之宗盡為有功之祖則百祖千宗盡居別廟於禮又可乎必若俟其褒貶然後定祧遷則是臣子有輕議之非萬代無可傳之法考殷周則無據言情理則兩乖考古宜今孰云可者曷若削漢朝不經之說徵殷周可久之文從親盡則遷之常規為萬代不朽之定制不易親親之祀終無惑惑之疑誠一王之盛典也謹議問曰朕觀古之王者受命君人兢兢業業承天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徵極諫而文學稍進匡時濟俗罔不率繇厥後相循有名無實而又設以科條增求茂異捨斥已之至論進無用之虛文指切著明罕稱於代茲朕所以歎息鬱悼思索其真是用發懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間歡然相與子大夫得不勉思朕言而茂明之我國家光宅四海年將二百十聖宏化萬邦懷仁三王之禮靡不講六代之樂罔不舉浸澤於下升中於天周漢已還莫斯為盛自禍階漏壞兵宿中原生人困竭耗其大半農戰非古衣食罕儲念茲疲氓未遂富庶督耕植之業而人無戀本之心峻榷酤之科而下有重斂之困舉何方而可以復其盛用何道而可以濟其艱既往之失何者宜懲將來之虞何者當戒昔主父懲患於朝錯而用推恩夷吾致霸於齊桓而行寓令精求古人之意啓迪來哲之懷眷茲洽聞固所詳究又執契之道垂衣不言委之於下則人用其私專之於上則下無其效漢元優游於儒學盛業竟衰光武責課於公卿峻政非美二途取捨未獲所從豫心浩然蓋所疑惑子大夫孰究其旨屬之於篇興自朕躬無悼後害對臣方病近古之策不行而陛下幸及之是天下人人之福也微臣其敢忍意而不言乎且臣聞之古者以言賦納豈虛美哉蓋用之也是以益贊禹而班師說復王而作命斯皆用言之大略也洎漢文帝羞不若堯舜始以策求士乃天下郡國有賢良之貢入焉塞詔者朝錯而已至武帝然後董仲舒出然而卒不能選用條對施之天下夫用其策不棄其人以其利於時也得其人而棄其策又何為乎若此則徒設試言之科而不得用言之實矣降及魏晉朝成而暮敗之不暇又惡足言其策哉我唐列聖君臨策天下之士者多矣異時莫不光揚其名聲寵綏其爵祿然而曾不聞天下之人曰某日天子降某問得某士行某策濟某功抑不知直言之詔屢下而直言之士不出耶亦不知直言之士屢出而直言之策不用耶今陛下肇臨海內務切黎元求斥已之至言責著明之確論實命說代言之盛意也微臣何足以承之然臣所以上愚對皆以指病陳述而為典要不以舉凡體論而飾文詞事苟便人雖繁必獻言苟諧理雖鄙必書固不足以副陛下懇惻之誠庶可以盡微臣體用之目耳伏願陛下以臣此策委之有司苟或可觀施之天下使天下之人曰惜哉漢文雖以策求士逮我明天子然後能以策濟人則臣始終之願畢矣如或言不適用策不便時則臣有瞽聖欺天之罪將置於典刑陛下固不得而宥之矣亦臣之所甘心焉臣伏讀聖策乃見陛下悼禮樂之寖微恤黎人之重困責復盛濟艱之術酌推恩寓令之宜斯皆當今之急病也微臣敢不別白而書之昔我高祖武皇帝撥去亂政我太宗文皇帝鞬櫜干戈被之以仁風潤之以膏露戢天下之役而天下之人安省天下之刑而天下之人壽通天下之志而天下之氣和總天下之衆而天下之衆理理故敬讓之節著和故歡愛之化行是以革三王之所因兼六代之盡美稱至德者舉文皇以代堯舜豈異事哉有誠信以將之也明皇帝即位實號中興方其任姚宋而右賢能也雖禹湯文武之俗不能舉焉四十年間刑罰不試人用滋植四海大和於是奉升中告禪之儀則封泰山而秩嵩華念歲巡時邁之典則去咸鎬而朝洛陽禮既畢行物亦隨耗天寶之後徭戍作興氣盛而微理固然也曩時之乳哺而有之者一朝為兵殲之兵興以來至今為梗兵興則戶減戶減則地荒地荒則賦重賦重則人貧人貧則逋役逃征之罪多而權宜之法用矣今陛下躬親本務首問㣥儒念禮樂之不興歎升平之未復斯誠天下之人將絶復完之日也微臣何幸而對揚之微臣以為將欲興禮樂在先富黎人將欲富黎人在先息兵革息兵革之術臣請略言之夫古所謂銷兵革者非謂幅裂其旗章銷鑠其鋒刃而已也蓋誠信著於上則忠孝行於下敬讓立於內則夷狄和於外夷狄和則邊鄙之兵息敬讓立則爭奪之患銷爭奪之患銷則和順之心作和順之心作而禮樂之道興矣此先王修政輯兵興禮樂富黎人之大略也陛下必欲責臣以詳究之術臣又請指事以明之夫食力之不克雖神農設教天下不能無餒殍之人矣是以古之不農而食之者四而已矣吏有斷獄之明則食之軍有臨敵之勇則食之工有便人之巧則食之商有通物之智則食之是四者率皆明者勇者巧者智者之事也百天下之人無一二焉苟不能於此者不農則不得食不織則不得衣人之情衣食迫於中則作業興於外是以游食者恆寡而務本者恆多豈強之哉彼易圖而此難及也今之事則不然吏理無考課之明卒伍廢簡稽之實百貨極淫巧之工列肆盡兼并之賈加以依浮圖者無去華絶俗之貞而有抗役逃刑之寵假戎服者無超乘挽彊之勇而有橫擊詬吏之驕是以十天下之人九為游食蠢朴愚謹不能自遷者而後依於農此又非他彼逸而易安此勞而難處也以惰游之戶藏富而耕桑之賦愈重曩時之十室共耕而有不給者今且聚之於一夫矣雖有慈惠之長仁隱之吏尚不能存若憯斷擊搏之則將轉移於溝壑矣今之課吏者以賦斂無逋負為上以臣觀之足陛下之賦者誠所以害陛下之人耳若然則農桑之賦既如彼惰遊之衆又如此耕桑之賦重則戀本之心薄惰遊之戶衆則富庶之道廢此必然之理也今陛下誠能明考課之法減冗食之徒絶雕蟲不急之功罷商賈兼并之業潔浮圖之行峻簡稽之書薄農桑之徭與耕戰之術則惰遊之戶盡歸而戀本之心固矣戀本之心固則富庶之教興矣而貞觀開元之盛復矣若此則既往之失由前將來之虞由後在陛下悠久戒之慎之而已至於主父偃乘七國并吞之後將分裂而矯推恩管夷吾當諸侯爭奪之時先詐力而行寓令皆一時之權術也豈可謂明白四達與日月齊明於聖朝哉臣雖賤庸尚不敢陳王道於帝皇之日况權術乎此臣之所甚羞也故不及詳究言之臣伏讀聖策又見陛下以為執契則㣥下用情躬親則庶官無黨以漢元尚學而衰盛業謂光武課吏職而昧通方以臣思之皆不然也夫委之於下而用其情蓋考績之科廢而清濁之流濫也尚儒術而衰盛業蓋章句之學興而經緯之文喪也課吏職而昧通方蓋苛察之法行而會計之期速也臣請條列而言之夫神農之斫耒耜教耕耨所以墾良田而殖嘉穀也然而不能遏稂莠之滋焉其所以遏之者芟夷錢鏄之而已唐堯之闢朝廷宅百揆亦所以植禹舜而種臯陶也又不能遏共工歡兜之逆焉其所以遏之者放棄殛誅之而已神農不以稂莠滋而廢耒耜之用故能存用器之方唐堯不以四罪進而奪舜禹之任故能終任賢之道若此則陛下之所任顧何如耳豈可謂任之必不可哉至於考績之科廢章句之學興經緯之道喪會計之期速皆當今之極弊也幸陛下反漢元光武之事臣遽數以終之今國家之所謂興儒術者豈不以有通經文字之科乎其所謂通經者又不過於覆射數字明義者才至於辨析章條是以中第者歲盈百數而通經之士蔑然以是為通經固若是乎至於工文自試者則不過於雕詞鏤句之才搜摘絶離之學苟或出於此者則公卿可坐致郎署可俯求崇樹風聲不由殿最連科者進速纍捷者位高拱默因循者為清流行法蒞官者為俗吏以是為儒術又若是乎哉其所謂課吏職者豈不以朝廷有遷次進手叐之用乎臣竊觀今之備朝選而不由文字者百無一二焉夫施衆網而加一禽尚不能得况張一目以羅萬品而望其飛者走者大者小者盡出其間其可得乎哉以此察㣥吏㣥吏又可察乎苟或不可察又可任之而絶其私乎哉此所以陛下將執契而歎用情念垂衣而懼不理蓋臣所謂課察之道不明也陛下誠能使禮部以兩科求士凡自唐禮六典律令及國家制度之書者用至於九經歷代史能專其一者悉得謂之學士以環貫大義而與道合符者為上第口習文理者次之其詩賦判論以文自試者皆得謂之文士以經緯今古理中是非者為上第藻繢雅麗者次之凡自布衣達於未在朝省者悉得以兩科求士禮部第其高下歸之吏部而寵秩之若此則儒術之道興而經緯之文盛矣吏部罷書判身言之選設三式以任人一曰校能之式每歲以朝右崇重者一人與禮部郎校天下㣥吏之理最在第一至第三者校定日據其功狀而登進之牧宰字人之官藉之為理者則上賞行焉若此則遷次之道明而遲速之分定矣二曰任賢之式每歲內自僕射至於㣥有司之正長外至於廉問節制者各舉備朝選者一人外自牧守內至於百執事之立於朝者各舉吏郡縣者一人因其所舉而授任之辨其考績而賞罰之不舉賢為不察舉不賢為不精不精與不察之罪同若此保任之法行而賢不肖之位殊矣三曰敘常之式其有業不通於學才不應於文政不登於最行不知於人則限以停年課資之格而役任之若此則敘用之典恆而尺寸之才無所棄矣兩科立則㣥材遂三式行則庶官當陛下乃執左契以御之總樞極以正之委庶官如心目之運支體豈支體運而無效於心目乎察㣥材如明鏡之形美惡豈美惡形而逃隱於明鏡乎然後陛下闢四門使可言之路通明四目以天下之目視達四聰以天下之耳聽不私其心以百姓心為心端拱巖廊高居宸極以冕旒自蔽而秋毫必察以黈纊塞耳而聲響必聞則彼漢元章句之儒光武督責之術又烏足為陛下言之哉且臣聞之聖人在上人不天札若臣者生未及壯戴陛下為君仁壽歡康未始有極何忽自苦墮肝膽而言天下之事乎臣以為國家兵興以來天下之人慘怛悲愁五十年矣自陛下即位之後戴白之老莫不泣血而話開元之政臣恐此輩不及見陛下功成理定之化而先飲恨於窮泉此臣之所以汲汲於心者陛下能不憐察其意乎謹對文奏或差本虞行詐此例可辦必有原情苟異因緣之姦則矜過誤之罰丁也方將計簿忽謬正名曾不戒於爰毫遂見尤為起草然以法存按省誤有等差倘以百為千比賜縑而難赦若當五而四縱闕馬而何傷苟殊魚魯相懸宜恕甲由未遠按其非是雖懷三豕之疑訴以可行難書一字之貶請諸會府棄此小瑕非愚訴人在法當爾四營成易本用窮神三代演圖孰云疑衆甲志敦素履學洞青囊不言非聖之書忽招誣善之告雖九六布卦我則背於周經而七八為占爾盍觀於殷道徒驚異象曾是同歸辨數雖冠履相暌得意而筌蹄可忘且穆姜遇艮足徵麟史之文尼父得坤亦驗歸藏之首以斯償責可用質疑善防既畢固合程功柔木載施亦將補敗乙之亟請誰謂過求隱椎之役雖終列樹之思尚切有司見阻無備實難苟吝養材之資蓋非長利遠求為揵之用豈不重勞當有取於繕完顧何煩於藝植且十年可待五步足徵防在未萌著之先甲因而致用庶無瓠子之災言之不從恐纍匏瓜之繫天回地旋陽生陰息玉衡指孟冬之野促績鳴寒金昴臨短景之昏厥人當隩相彼同色疑作邑懋哉惟時戒坐孰之里胥稽其既入率同巷之衆婦績以相從素緒霜柔其紛如於永漏紅光炎上俱省費於餘輝夜兼功以日多日存課而年最若廉叔之勸蜀襦袴興謳類古公之居豳茅綯斯誦故令風俗翕習家室乃宜有未得其所然或心傷而發詠則摽梅求吉編王化之音采芑懷征列雅章之內行人掌乎宣布載在搜揚得詠言於此邦將遐徇以遒邁太師典樂允被克諧之恭按察觀風何為失職之禁先王制法寧罰有詞百草麗地在物雖佳五稼用天於人尤急乙姑勤樹事頗害農收列植有昧於環廬播穡遂妨於終畝雖椅桐梓漆或備梓人之材而黍稷稻梁宜先后稷之穡苟虧冒隴焉用成蹊縱有念於息陰豈可侔於望歲植之場圃合奉周官置在田疇殊乖漢制既難償責無或順非要會有期誠宜獻狀籍斂未入何以稽功戊也將俟農收方明績用三時罔害然有別於耗登五稼未終安可議其誅賞當從責實寧俾課虛苟欲考於歲成姑合畢其田事雖賢能是獻比要宜及於計偕而稼穡其難收功當俟於協入詳徵著令固有常規農扈之政不乖蘭省之非斯在感物而動樂容以和苟氣志憤興則琴音猛起倘精察之不昧豈情狀之可逃况乎乙異和鳴甲惟善聽克諧清響將窮舞鶴之能俄見殺聲以屬捕蟬之思憑陵內積趨數外形未平君子之心翻激小人之慍既彰蓄憾詎爽明言詳季札之觀風尚分理亂知伯牙之在水豈曰譸張斷以不疑昭然無妄宜加黜職用刺褊心八風從律氣必順時五音迭奏和則變節絲桐之妙苟極寒暑之應或隨甲務以相宜因而牙動和飯牛之唱白露乍結於東郊授舞鶴之聲青陽忽生於南呂鼓能氣至藝與天同且異反常之妖何傷應感而起惡夫典樂曾是濫科涼風徐動於鄭奏遽云失節寒谷倘移於鄒律何以加刑克叶之薰無令置棘聲樂皆具以奉常尊名位不同則難踰節辛也榮沾五命始用判懸僭越三人終乖儀制非道不處多備何為苟耽盈耳之繁遂過粲兮之數廣張女列徒效尤於馬融內顧何功欲思齊於魏絳罔循唐令空溺宋音雖興一部之詞其如隔品之異請懲擾雜以償人言夙夜惟寅雖無捨業琴瑟在御誰謂溺音苟未爽於克諧亦何傷於不撤已也良因釋卷雅尚安絃期青紫於通經喜趨槐市鼓絲桐之逸韻叶暢薰風好濫既異於文侯和聲豈乖於曾子欲科將落合辨所操儻雜桑間之淫須懲煩手若經杏壇之引難責平心未詳緑綺之音何速青襟之刺忝司綿蕝當隸國章載考繩違恐非善教教以就賢雖無黷下俾其容衆則在毀方太學以將務發蒙宜先屈已君子不器須懷虛受之心至人無方何必自賢於物爰因善誘式念思恭將戒同塵之誠遂申合土之譽况卑以自牧仲尼嘗述於為儒禮貴用和子張亦非於拒我義存無傲道在可嘉長善之本不乖成均之言何懵力施南畝屠則干刑祭比東鄰理難逢福冠帶縱勤於侍疾鋩刃寧同於彼祆壬憂或滿容殺非無故愛人以德未聞易簀之言獲罪於天遂抵椎肥之禁志雖行孝捨則亂常父病誠切於肺肝私禱豈侔於繭栗且宋人皆用或免乘城之虞魏郡不誅終非棄市之律令不惟反政是以常縣恐漏魚州符佩犢蠻夷鹿君至潔牛羊以宴私弓矢載張備鳥鳶之鈔盜苟饋食而則爾豈薦饗之獨然况乎要服在庭舌人委體方示懷於犒飲胡廢職於驅除且賓主恪恭須防墜鼠之穢牲牢備禮寧無攫肉之虞曾是闕於弦弧復何徵於擊豕周禮盡在既專分鳥之司陳力自乖宜憚乘驄之劾獻其介物雖合疑年驗以生蓍則當有數戊得茲外骨藉自幽叢嘗聞見夢之神將期百中况察退藏之所足辨千齡冀令僂句不欺誰謂蜉蝣興惑盍徵幽贊寧罪矯誣居蔡於家則吾豈敢遊蓮有歲視子非無科之蓋有不知獻者此宜無罪沙漠實來供宜必備澤梁有禁殺則以時信能及於鯤鯢化方行於蠻貊彼卿之屬得禮之中雖諭以象胥或聞彈鋏而徵諸獺祭未可振緡既懷及物之虞遂阻烹鮮之請辭不失舊事必有初是曰國之典常焉用隨時之義且駒支昧禮信未習於華風里革當朝返有迷於夏濫矜其異俗責在有知合恕過求姑懲輕議燕以示懷鱉於何有姑宜飲德豈誚水煩責外骨之不豐顧褊心之奚甚甲大將展禮旋遇過求水潦方塗且乏大為貴者壺餐苟備何必長而食之我惟敬於上賓爾寧貪於介物小不能忍禮何以觀儻羞南澗之毛尚當遺味詎勞東海之鱉然後合歡詞未爽於少施怒難信於堵父扇以仁風阜財為急教之畜擾利俗則多甲位列憑熊政同佩犢將除饑餒之患用先蕃息之資俾爾生生非豫擾擾二彘既侔於龔遂五㹀足驗於陶朱訓養雖勤割烹斯利既符孳貨庶罔食貧使荷蓧之夫不空為黍倚杖而牧豈獨刈葵人無見卵之思俗皆掩豆而祭實惟務本焉用他規且異米鹽之煩寧懼糾繩之諫畜狗不馴傷人必罪有標自觸徵償則非既懸迎吠之書寧忘慎行之道癸非用犬乙豈尤人防虞自失於周身齧噬尚貪於求貨有牌記而莫慎則欲請庚無標識而或傷若為加等徵詞可擬往訴何憑
