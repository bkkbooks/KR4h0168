  - {type: head, offset: 4685, content: 乙修隄畢復請種樹功價有司以為不急之務乙固請營繕令諸候水隄內不得造小隄及人居其隄內外各五步并隄上種榆柳雜樹若隄內窄狹地種擬充隄堰之用, id: KR4h0168_NFKB_652-h9, level: 2}
  - {type: head, offset: 4798, content: 夜績判, id: KR4h0168_NFKB_652-h10, level: 2}
  - {type: head, offset: 4798, content: 得縣申歲十月入人里胥使婦人相從夜績每月課四十五功聽其歌詠行人善之徇於路按察禁之太師以失職致詞, id: KR4h0168_NFKB_652-h11, level: 2}
  - {type: head, offset: 5002, content: 田中種樹判, id: KR4h0168_NFKB_652-h12, level: 2}
  - {type: head, offset: 5002, content: 乙於田中種樹隣長責其妨五穀乙乃不伏, id: KR4h0168_NFKB_652-h13, level: 2}
  - {type: head, offset: 5107, content: 屯田官考績判, id: KR4h0168_NFKB_652-h14, level: 2}
  - {type: head, offset: 5107, content: 戊為營田使申屯田官考課違常限省司不收辭云待農事畢方知殿最, id: KR4h0168_NFKB_652-h15, level: 2}
  - {type: head, offset: 5217, content: 怒心鼓琴判, id: KR4h0168_NFKB_652-h16, level: 2}
  - {type: head, offset: 5217, content: 甲聽乙鼓琴曰爾以怒心感者乙告誰云詞云粗厲之聲, id: KR4h0168_NFKB_652-h17, level: 2}
  - {type: head, offset: 5341, content: 迴風變節判, id: KR4h0168_NFKB_652-h18, level: 2}
  - {type: head, offset: 5341, content: '甲鼓琴春叩商秋叩角樂正科[:#AS-8FBB:●]時失律訴云能迴風變節', id: KR4h0168_NFKB_652-h19, level: 2}
  - {type: head, offset: 5460, content: 五品女樂判, id: KR4h0168_NFKB_652-h20, level: 2}
  - {type: head, offset: 5460, content: 辛為五品官有女樂五人或告於法訴云三品已上有一部不伏, id: KR4h0168_NFKB_652-h21, level: 2}
  - {type: head, offset: 5562, content: 學生鼓琴判, id: KR4h0168_NFKB_652-h22, level: 2}
  - {type: head, offset: 5562, content: 已為太學生好鼓琴博士科其廢業訴云非鄭衞之音, id: KR4h0168_NFKB_652-h23, level: 2}
  - {type: head, offset: 5690, content: 毀方瓦合判, id: KR4h0168_NFKB_652-h24, level: 2}
  - {type: head, offset: 5690, content: 太學官教冑子毀方瓦合司業以為非訓導之本不許, id: KR4h0168_NFKB_652-h25, level: 2}
  - {type: head, offset: 5800, content: 對父病殺牛判, id: KR4h0168_NFKB_652-h26, level: 2}
  - {type: head, offset: 5800, content: 壬父病殺牛祈禱縣以行孝不之罪州科違法, id: KR4h0168_NFKB_652-h27, level: 2}
  - {type: head, offset: 5918, content: 對弓矢驅鳥鳶判, id: KR4h0168_NFKB_652-h28, level: 2}
  - {type: head, offset: 5918, content: 詔賜蕃官宴有司不以弓矢驅鳥鳶御史劾之詞云非祭祀之事, id: KR4h0168_NFKB_652-h29, level: 2}
  - {type: head, offset: 6026, content: 千歲龜判, id: KR4h0168_NFKB_652-h30, level: 2}
  - {type: head, offset: 6026, content: 問戊獻千歲龜有司以欺罔舉科訴云得之於叢蓍之下, id: KR4h0168_NFKB_652-h31, level: 2}
  - {type: head, offset: 6119, content: 對蕃客求魚判, id: KR4h0168_NFKB_652-h32, level: 2}
  - {type: head, offset: 6119, content: 蕃官(一作客)至鴻臚寺不供魚客怒辭云獺未祭朝議失隨時之義, id: KR4h0168_NFKB_652-h33, level: 2}
  - {type: head, offset: 6242, content: 對宴客鼈小判, id: KR4h0168_NFKB_652-h34, level: 2}
  - {type: head, offset: 6242, content: 甲饗客羞鼈小客怒其不敬辭云水煩非傲, id: KR4h0168_NFKB_652-h35, level: 2}
  - {type: head, offset: 6351, content: '對養雞[:#AS-8274:⿰⺨者]判', id: KR4h0168_NFKB_652-h36, level: 2}
  - {type: head, offset: 6351, content: '甲為郡守令百姓養母[:#AS-8274:⿰⺨者]及雞督郵諫其擾人不許', id: KR4h0168_NFKB_652-h37, level: 2}
  - {type: head, offset: 6475, content: 對狗傷人有牌判, id: KR4h0168_NFKB_652-h38, level: 2}
  - {type: head, offset: 6475, content: 癸家養狗傷人乙論官請償辭云有牌記行者非慎, id: KR4h0168_NFKB_652-h39, level: 2}
