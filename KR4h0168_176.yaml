front:
  text: 全唐文欽定全唐文卷一百七十六元忠宋州宋城人本名真宰以避則天母諱改高宗時為太學生上封事授祕書省正字令直中書省內供奉再遷殿中侍御史監李孝逸軍事以討平徐敬業功擢司刑正稍遷洛陽令再陷罪流嶺表還授御史聖歷二年擢拜鳳閣侍郎同鳳閣鸞臺平章事遷左肅政臺御史大夫長安中副相王為並州元帥突厥吐蕃犯塞加為大總管以張易之昌宗譖下獄貶高要尉中宗即位驛召授衛尉卿同中書門下三品遷兵部尚書進拜侍中中書令封齊國公神龍四年拜左僕射武三思之黨宗楚客紀處訥證元忠及子升與節愍太子同謀構逆請夷三族中宗不許元忠懼上表固請致仕手制聽解左僕射以特進齊國公致仕仍朝朔望又以姚庭筠劾貶渠州員外司馬又左遷思州務川尉行至涪陵卒年七十餘景龍四年追贈尚書左僕射齊國公本州刺史開元六年諡曰貞
