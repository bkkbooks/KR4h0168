body:
  text: 臣本書生藝業無取徒以服膺儒教頗踐禮經忠義所獎思固名節每見危臨難輒即忘死昔事大帝以謹密見稱名位雖微預參顧問中事則天皇后緣委質先朝以屨屢之末特存恩盼往事陛下又預官寮攀附之情無忘造次遇讒邪興謗欺罔天聰暫生投杼之疑遠放不毛之地屬龍興啓運寶命惟新以臣再沐先慈遽令追入一承恩幸百日屢遷無翼而飛坐升霄漢濫承茅土之賜猥登衡石之司而名忝大臣不能緝諧中外致使禍生輦轂釁起儲闈空懷報國之誠而無死節之效又誠慙知子禮失義方男升踐蹈凶邪莫分逆順因招流議歸責於臣賴陛下保明獲存今日若非天地覆育臣已久從灰粉所以偷生僶俯感德躊蹰犬馬戀恩未遑辭退頃因自思念舉措無顏豈可更踐樞機苟貪祿位請解尚書右僕射中書令知兵部事及監修國史並除齊國公封爵如蒙聖恩憫察矜茲微款乞一散秩罷還私第得參朔望之謁時拜闕庭即進退有歸生死知足臣聞理天下之柄有二事焉文與武也然則文武之道雖有二門至於制勝御人其歸一揆方今王略遐宣皇威遠振建禮樂而陶士庶訓軍旅而懾生靈然論武者以弓馬為先而不稽之以權略談文者以篇章為首而不問之以經綸而奔競相因遂成浮俗臣嘗讀魏晉史每鄙何晏王衍終日談空近觀齊梁書才士亦復不少並何益於理亂哉從此而言則陸士衡著辨亡論而不救河橋之敗養由基射能穿札而不止鄢陵之奔斷可知矣昔趙岐撰禦寇之論山濤陳用兵之本皆坐運帷幄暗合孫吳宣尼稱有德者必有言仁者必有勇則何平叔王夷甫豈得同日而言哉臣聞才生於代代實須才何代而不生才何才而不生代故物有不求未有無物之歲士有不用未有無士之時夫有志之士在富貴之與貧賤皆思立於功名冀傳芳於竹帛故班超投筆而歎祖逖擊楫而誓此皆有其才而申其用矣且知已難逢英哲罕遇士之懷琬璧以就埃塵抱棟梁而困溝壑者則悠悠之流直覩此士之貧賤安知此士之方略哉故漢拜韓信舉軍驚笑蜀用魏延㣥臣觖望嗟乎富貴者易為善貧賤者難為功至於此也亦有位處立功之際而不展其志略身為時主所知竟不能盡其才用則貧賤之士焉足道哉漢文帝時魏尚李廣並身任邊將位為郡守文帝不知魏尚之賢而囚之不知李廣之才而不能用之常歎李廣恨生不逢時令當高祖日萬戶侯豈足道哉夫以李廣才氣天下無雙胸奴畏之號為飛將爾時胡騎憑陵足伸其用文帝不能大任反歎其生不逢時近不知魏尚李廣之賢而乃遠想廉頗李牧故馮唐曰雖有頗牧而不能用近之矣從此言之疏斥賈誼復何怪哉此則身為時主所知竟不能盡其才用晉羊祜獻計平吳賈充荀勗沮其策祜歎曰天下不如意恆十居八九緣荀賈不同竟不大舉此則位處立功之際而不得展其志略而布衣韋帶之人懷一奇抱一策上書闕下朝進而望夕召何可得哉臣請歷訪內外文武職事五品已上得不有智計如羊祜武藝如李廣在用與不用之間不得騁其才略伏願降寬大之詔使各言其志無令汲黯直氣臥死於淮陽仲舒大才位屈於諸侯相臣聞帝王之道務崇經略經略之術必仗英奇自國家良將可得言矣李靖破突厥侯君集滅高昌蘇定方開西域李績平遼東雖奉國威靈亦其才力所致古語有之人無常俗政有理亂兵無強弱將有能否由此觀之安邊境立功名在於良將也故趙充國征先零馮子明討南羌皆計不空施機不虛發則良將立功之驗也然兵革之用王者大事存亡所繫若任得其才則摧凶而扼暴苟非其任則敗國而殄人北齊段孝元云持大兵者如擎盤水傾在俯仰間一致蹉跌求止豈得哉從此而言周亞夫堅壁以挫吳楚司馬懿閉營而困諸葛亮俱為上策此皆不戰而卻敵全軍以制勝是知大將臨戎以智為本漢高之英雄大度尚曰吾寧鬬智魏武之機神冠絶猶依法孫吳假有項籍之氣袁紹之基而皆泯智任情終以破滅何况復出其下哉且上智下愚明暗異等多算少謀衆寡殊科故魏用柏直以拒漢韓信輕為豎子燕任慕容評以抗秦王猛謂之奴才即柏直慕容評智勇俱亡者也夫中材之人素無智略一旦居元帥之任而意氣軒昂自謂當其鋒者無不摧碎豈知戎昭果毅敦詩説禮之事乎故李信求以二十萬衆獨舉鄢郢其後果辱秦軍樊噲願得十萬衆橫行胸奴登時見折季布皆其事也當今朝廷用人類取將門子弟亦有死事之家而蒙抽擢者此等本非幹略見知雖竭力盡誠亦不免於傾敗若之何使當閫外之任哉後漢馬賢討西羌皇甫規陳其必敗宋文帝使王元謨收復河南沈慶之懸知不克寸謝元以書生之姿拒苻堅天下之衆郗超明其必勝桓溫提數萬之兵萬里而襲成都劉真長期於決取雖時有今古人事皆可推之取驗大體觀其鋭志與識略耳明者隨分而察成敗之形昭然自露京房有言後之視今亦猶今之視古則昔賢之與今哲意况何殊當事機之際也皆隨時而立功豈復取賢於往代待才於未來也即論知與不知用與不用夫建功者言其所濟不言所起言其所能不言所籍若陳湯呂蒙馬隆孟觀並出自貧賤勳濟甚高未聞其家代為將帥董仲舒曰為政之用譬之琴瑟不調甚者必解絃而更張之乃可鼓也故陰陽不和擢士為相蠻夷不龔拔卒為將即更張之義也以四海之廣億兆之衆其中豈無卓越奇絶之士臣恐未之思也夫何遠之有臣聞賞者禮之基罰者刑之本故禮崇則謀夫竭其能賞厚則義士輕其死刑正則君子勗其心罰重則小人懲其過然則賞罰者軍國之綱紀政教之藥石綱紀舉而衆務自理藥石行而文武用命彼吐蕃蟻結蜂聚本非勍敵薛仁貴郭待封受閫外之寄奉命專征不能激勵熊羆乘機掃撲敗軍之後又不能轉禍為福因事立功遂乃棄甲喪師脫身而走幸逢寬政罪止削除國家網漏吞舟何以過此天皇遲念舊恩收其後效當今朝廷所少豈此一二人乎且賞不勸謂之止善罰不懲謂之縱惡仁貴自宣力海東功無尺寸坐玩金帛瀆貨無厭今又不誅縱惡更甚臣以疏賤干非其事豈欲間天皇之君臣生厚薄於仁貴直以刑賞一虧百年不復區區所懷實在於此古人云國無賞罰雖堯舜不能為化今罰不能行賞亦能信故人間議者皆言近日征行虛有賞格而無其事良由中才之人不識大體恐賞賜勳庸傾竭倉庫留意錐刀將此益國徇目前之近利忘經久之遠圖所謂錯之毫釐失之千里者也且黔首雖微不可以欺得志瞻望恩澤必因事而生心既有所因須應之以實豈得懸不信之令設虛賞之科比者師出無功未必不由於此文子曰同言而信信在言前同令而行誠在令外故商君移木以表信曹公割髮以明法豈禮也哉有由然也自蘇定方定遼東李績破平壤賞絶不行勳仍淹滯數年紛紜真偽相雜縱加沙汰未至澄清臣以吏不奉法慢自京師偽勳所由主司之過其則不遠近在尚書省中不聞斬一臺郎戮一令史使天下知聞天皇何能照遠而不照近哉神州化首萬國共尊文昌政本四方是則軌物宣風理亂攸在臣是以披露不已冒死盡言且明鏡所以照形往事所以知今臣職不稽古請以近事言之貞觀年中萬年縣尉司馬元景舞文飾智以邀乾沒太宗審其姦詐棄之都市及征高麗也總管張君乂擊賊不進斬之旗下臣以為偽勳之罪多於元景仁貴等敗重於君乂向使早誅薛仁貴郭待封則自餘諸將豈敢失利於後哉韓子云慈父多敗子嚴家無格虜此言雖小可以喻大公孫宏有言人主病不廣大人臣病不節儉臣恐天皇病之於不廣大過在於慈父斯亦日月之一蝕也又今之將吏率多貪暴所務唯狗馬所求唯財物無趙奢吳起散金養士之風縱使行軍悉是此屬臣恐吐蕃之平未可旦夕望也凡人識不經遠皆言吐蕃戰前隊盡後隊進甲堅騎多而山有氛瘴官軍遠入前無所獲不積穀數百萬無大舉之資臣以為吐蕃之望中國猶孤星之對太陽有自然之大小不疑之明暗夷狄雖禽獸亦知愛其性命豈肯盡死而後進哉由殘迫其人非下所願也必其戰不顧死則其兵法許敵能鬬當以智算取之何憂不克哉向使將能殺敵橫尸蔽野斂其頭顱以為京觀則此虜聞官軍鐘鼓望塵卻走何暇前隊皆死哉自仁貴等覆師喪氣故虜得跳梁山谷又師行必藉馬力不數十萬不足與虜爭臣請天下自王公及齊人挂籍之口人稅百錢又弛天下馬禁使民得乘一大馬不為數限官籍其凡勿使得隱不三年人間畜馬可五十萬即詔州縣以所稅口錢市之若王師大舉一朝可用且虜以騎為強若一切使人乘之則市取其良以益中國使得漸耗虜兵之盛國家之利也楚客陳郡人神龍中官酸棗縣尉今皇帝新服厥德任官惟賢才左右惟其人君為元首臣作股肱可布大化以利朝廷存古道以正天下去邪佞使小人之道消進忠良使君子之道長豈得安其榮寵守其循默者哉若以此為常非所以愛人治國矣傳曰苟利社稷專之可也君侯念之哉昔漢成帝時王氏擅權劉向諫曰臣聞公族者國之枝葉枝葉落本根無所庇蔭方今同姓疏遠母黨專政排擯宗枝孤弱公族非所以保守社稷安固國嗣也其言甚切多所稱引成帝雖悲傷歎息而不能用此非帝不知之而不贊者臣之罪也其後王氏竟假周公之事而起田常之亂此乃大臣循默之失也惟君侯戒之哉夫利萬物者道也惟君子能行之害萬物者邪也惟小人固為之以道心濟物則上天祐之雖履危而必安矣以邪心害物則明神殛之雖居安而必危矣何則勢使之然也故濟物者其心廣矣害物者其心褊矣心廣者所務不專於身心褊者所利不及於物哲人知其若此必守道以廣其心屈已以利其物行道於身而必全其身行道於國而必全其國帝王失道之正大臣必以道化之昔伊尹有言曰豫弗克俾厥后為堯舜其心愧恥若撻於巿獲覽伊尹之説非堯舜之君但以道佐之亦可致之堯舜也既食人主之祿而憂人主之事光贊其美規救其惡建功於當年可謂無負於天下惟君侯志之哉夫欲安天下者先正其本本正則天下必固不正其本則天下必危國之興亡實在此矣師丹曰太子者天下之本也譬之大樹無本則枝葉零瘁國無太子則朝野不安先王必立之者以儲君有次立之勢故令師保教以君人之道用蘊崇其德所以重宗社而安天下也今皇子既長而未定嗣是天下無本可謂危矣猶大樹無枝葉何以存乎願君侯以清宴之間而盡言於上擇其賢者而立之此乃安天下之道也書曰一人元良萬邦以貞斯之謂也而使春宮久曠豈謂宜乎此則朝廷之失君侯不正誰正之哉又聞古之封子弟建侯伯者將以籓屏王室安固邦基垂永代之業為磐石之宗也又聞女有內則男有外傅男女有別剛柔分矣內外斯隔陰陽著矣豈可濫哉然而幕府者丈夫之職非婦人之事今諸公主並開建府僚崇置法官秩若親王以女處男職所謂長陰而抑陽也而望陰陽不愆風雨無爽其可得乎竊謂非致遠之計乖久長之策書曰事不師古以克永代匪説攸聞此之謂也此則朝廷之二失君侯不正誰正之哉又聞人之生也有禍有福有貴有賤此並稟之於前業當受之於此身然崇佛教者特以資彼來生鮮有益於見報若求之理國恐不在此矣然三教俱設各有所務而行之者不可過也行釋教者修身之本行儒教者理國之源修身是來生之資理國乃即代之務然則即代至近來生至遠捨近求遠不亦乖乎存彼棄此不亦謬乎今度人既多緇衣滿路率無戒行寧有經業空齎重寶專附權門取錢奏名皆有定價昔之賣官也錢入公府今賣度也錢入私家以茲入道實非履正詭情不變徒為遊食使法侶有失而流俗生厭名曰度人其實頽矣今主上雖希心聖教專想泯空奈社稷何奈蒼生何君侯不以中庸之義悟大聖之志但能致一代於仁壽之域斯亦至尊之道也此則朝廷之三失君侯不正誰正之哉又聞古人有言曰唯名與器不可以假人書曰天工人其代之故知代天工非才不可若有所濫必失天意而無患禍者未之有也今不專精庶政而留心於奇伎至於倡優之輩因其耳目之好遂升之以位授之以官豈非輕朝廷而亂正法邪然人君無私賞此上天之化人私怒者害物私賞者恐費財古人此之尤慎豈得私人以官乎若以此為政何以答皇天之命也此則朝廷之四失君侯不正誰正之哉又聞賢者邦家之光也任之可以致理棄之足能生亂三仁去而殷亡百里入而秦霸有國家者固須擇也昔者戰國之代得士者昌失士者亡莫不以求賢為急務霸者仗之以命諸侯况巍巍唐國明天子苟存斯道則三皇五帝可緩步而越也近者有制搜揚廣求賢俊戔戔束帛賁於邱園翹翹車乘訪及山谷此我皇勤之之至也雖有好賢之名竟無得賢之譽非皇情之不眷諒有司之過也何則聖主求賢訪諸草澤及有司選士多是親黨若非有賄必以勢求上失天心下違人望既非為官擇吏所謂為人擇官蠧政之源敗國之甚書曰治亂在庶官孔安國曰得人則理失人則亂葛洪曰舉秀才不知書察孝廉濁如泥高第賢良吝如蠅古人規職勤誦經今人圖家勉營生此之謂也此則朝廷之五失君侯不正誰正之哉又閹豎者給宮掖之事供掃除之役上古皆備此職但以奴隸畜之豈及於官次中古以來大道乖喪不重賢哲唯親近習或委以事或授以權遂使豎刁亂齊伊戾敗宋君側之人衆所畏懼葛洪所謂鷹頭之蠅廟垣之鼠無拳無勇職為亂階者也洎乎後漢用事尤甚時君乃不知其失大臣又畏罪不言所以害及生靈毒流天下至於晚節竟亂中朝各相黨餘屠害良善此時也忠臣義士覩斯慷慨不得不權行殺戮至於無鬚而橫死者不可勝言豈非結禍之深自危之速易曰小人用壯斯之謂也自大君受命中興成務獨有閹豎坐升班秩既無正闕多授員外舉其全數向滿千人苟綰青紫蠶食府庫既非致理之道實為長亂之階書曰人無於水鑒當於人鑒觀往古之成敗亦可見今之得喪故曰前事之驗後事之師此則朝廷之六失君侯不正誰正之哉又聞自古聖帝卑宮菲食茅茨不翦采椽不斫將以儉約遺子孫亦所以愛惜人力也書曰酣酒嗜音峻宇雕牆有一於此未或不亡况於臣下安得以肆屠為務乎若有僭濫必生患禍患禍之來可翹足而待也今之公王凡有所賞將以傾府庫所造私宅皆是官供觀其疏鑿池亭崇峻廊宇山無木石必他山以致之木無因近必窮遠以採之珍館出雲畫堂赫日造之竟歲功用不絶自開泰以來未之有也而行者見之僉曰非國戚不得如此非貴人不得若斯僕每聞斯言將有以譏於君矣何者為君所以養人非所以害人今外戚不助養人反害於人豈有益於吾君乎然堂上遠於百里君門隔於九重人主既不知之君侯又不言之豈使人主虛受謗於天下也此則朝廷之七失君侯不正誰正之哉又聞官者將以理人將以安人非以亂人非以害人故先王欲人理必選材以理之欲人安必省事以安之不欲人於亂必撥亂以整之不欲人有害必去害以全之若此誠欲於天下同憂矣人有樂君共之君有樂人慶之可謂同樂矣如此則上下無間君臣合德同於一體也若下有懷憂之人上無同憂之主欲求人理不可得也今天下窮困海內虛耗復以州牧縣宰選授多不得人自餘僚佐鮮有稱職不務公謹專於割剝人不聊生安肯懼死既不懼死是能生變下有憂而上不知也比之馬也必除其害牧狀之羊也必去其亂㣥此道尚有所闕而反更員外置官所謂助桀為虐足以速禍也夫人之情自知員外恐人不畏必峻法以懼之恐財之不足必枉道以奪之以有限之物供無厭之用欲其不亂豈可得哉古人有言十羊九牧羊既不得食人亦不得息唐虞之代建官惟百夏商官倍亦克用乂書曰官不必備惟其人孔子譏管仲曰官事不攝焉得儉據此雖正員之官猶不欲其備况其員之外更置員外乎此則朝廷之八失君侯不正誰正之哉又聞英主開基以定天下者將以傳之於萬代也繼明之帝豈得隳之哉有所下廢則政出多門政出多門大亂之漸也近封數夫人者皆先朝之宮女賞其勤勞加之邑號若備內職則不當知外不備內職自可居外安得出入內外往來宮掖者哉若下創革內言必出外言必入內外互言禁衛何施必弄君之法縱而不禁非所以重宗廟固國家也孔子曰彼婦之口可以出走彼婦之謁可以死敗戒之哉戒之哉此則朝廷之九失君侯不正誰正之哉又聞以正道事君者將以安天下也以非道事君者所以危天下也臣不可不任之正道者行仁義以補君之過非道者行蠱媚以成君之惡補過者國之幹也成惡者國之賊也今代或有不修忠正以事君引鬼神而惑主然則鬼神之事冥寞難知故非道之人因此自致其詐售其賂遺必據非材之位必食非德之祿此國賊也書曰官不及私眤惟其能爵罔及惡德惟其賢又曰與治同道罔不興與亂同事罔不亡傳曰國之將興聽於人將亡聽於神豈近是乎此則朝廷之十失君侯不正誰正之乎此十失者誠國之巨蠧粗而言之以有言於君侯者將以扶危去蠧救蒼生之命願君侯稍垂意微有所採此亦君侯自安之道也庶幾無忽勔勃兄武后朝官涇州刺史上闕似風竿而揭起荷春光之餘煦託陽山之峻趾比萱莢之能連引芝芳而自擬固其布葉相從潛根必重示不孤於日用欣有叶於時雍嗤五葉之非偶陋三花之未濃亦藐兮不可長辰兮不可逢恐鶗鴂吟兮衆芳晚幸左右之先容
