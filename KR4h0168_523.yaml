front:
  text: 全唐文欽定全唐文卷五百二十三怦幽州昌平人纍遷涿州刺史朱滔稱大冀王僞署怦范陽留守貞元二年滔死軍中推怦總軍事詔授幽州大都督府長史兼御史大夫幽州盧龍節度副大使知節度事彭城郡公死年五十九贈兵部尚書諡曰恭
  hash: sha256:1a0e4a4d06052e4e1befa51856190d13792df3f941603d68cf8298147771a394
