body:
  text: 司徒位崇太尉尊居宰相恩寵冠藩臣之右榮遇極矣今昌平故里朝廷改為尉卿司徒里此亦大夫不朽之名也但以忠順自持則事無不濟竊思近日務大樂戰不顧成敗而家滅身屠者安史是也暴亂易亡今復何有怦忝密親世荷恩遇默而無告是負重知惟司徒圖之無貽後悔也於陵字達夫宏農人舉進士穆宗朝戶部尚書拜太常卿東都留守寶歷二年授太子少傅封宏農郡公以左僕射致仕大和四年卒年七十八贈司空諡貞孝臣某言伏奉月日制書奉太上皇后尊號曰皇太后坤儀鎮定孝德昭升大義冠於人倫盛德光於史冊凡在臣子不任抃躍中賀臣聞周室興王文母同其經理漢皇嗣聖明德贊其徽猷伏惟陛下宏闡睿圖誕膺昌歷皇太后宣明懿範超邁前修家國慶靈慈孝交感堯門薦祉延寶祚於無疆長信頤神播歡心於率土由我愛敬致茲雍熙何幸萬邦之人親逢千載之運臣叨承獎任職守藩條阻拜彤庭雖違於常典載馳丹懇倍過於恆情臣某言送赦書使某人至伏奉月日恩制大赦天下臣聞獻歲之初也惟天所以布和將以發生萬類故降之春雨俾澤及㣥品也明后始立也惟君所以施令將以昭蘇萬國故降之以大赦蓋與人更始也伏惟陛下道叶千齡克膺聖嗣光乘八葉式纂鴻休則高天以布和法文明以施令故大赦天下殊澤霈然德及㣥生宥加殊死薄賦棄債恤孤養老不頒瑞物所以戒驕也節省其用所以防侈也卑宮菲食所以昭儉也黜邪去佞所以懲惡也任才用能所以勸善也賞勞録效所以報功也睦親敦族所以明孝也招諫納言所以聞過也尊賢容衆所以興化也三事用殷六府孔修九功既備無得而稱四海乂安斯為盛矣矧夫省不急之務損太官之膳外廢五坊內減六宮釋鷙鳥於長林縱猛獸於深谷俾鳥獸咸若黔黎用康舉五常之闕遺行三皇之聖化自三皇兩漢以來無可比也臣權叨連帥職守藩隅備位明朝幸逢昌運不獲與千官接武稱慶闕庭無任臣某言臣得當道進奏官高振報夏州叛將楊惠琳庸賊匹夫凶頑習性憑依壁壘竊弄干戈陷我邊鄙之人將流蜂蠆之毒伏惟陛下道包覆育威貫風雷乃命戎人恭行討罰文告才布已見其攜離天誅未加倏從於梟戮革車不頓餽餉靡勞宸算不遺於指蹤王師蓋本於無戰雖巴庸醜類樂禍一隅顧其巢幕之危因同破竹之勢妖氛坐掃仁壽可期臣職忝藩條任分師旅遠承慶捷倍萬恆情無任踴躍之至臣某言伏見正月二十九日制書以劉闢擢於非次授任節旄不立朝章擅有侵軼詔命左右神策行營節度使高崇文領馬步將士嚴礪李庸等計會討伐臣又得上都進奏院官高振報嚴礪下告捷官嚴公貺奏正月二十二日復收劒門破賊五千斬僞授劒州刺史武德昭訖又夏州叛將楊惠琳援絶城孤勢窮力屈王師進襲計已克平凡在遠邇不勝慶幸臣某中賀伏惟皇帝陛下誕敷元德廣被文明寰海乂寧戎夷款附蕞爾狂狡敢縱姦凶藉方伯任用之資乘軍城變故之際阻兵拒命肆虐讎鄰陛下志在安人尚為含垢頃令申諭許以自新誠以改過感恩迷而知復而乃恣情干紀長惡不悛既慝稔而禍盈俾人怨而神怒今戎臣授律睿略遐宣迫脅者知有所歸忠義者得以自效因利乘勢犄角攻驅固無遺鏃之勞佇見輿尸之變臣職忝藩服授任偏師憤激之誠倍百常品無任踴躍之至臣伏奉八月二十四日敕陛下以江淮旱歉軫念蒸黎命度支鹽鐵轉運使戶部侍郎兼御史中丞潘孟陽宣諭慰安蠲除疾苦以今月二十九日到臣本州頒賜詔書以示恩化臣及官吏百姓等咸蒙聖慈特加存問爰自城邑達於里閭喜氣浮川歡聲被野臣忝守藩服恭承德音荷載寵光局蹐無地中謝臣聞天覆無私雖幽必燭人心有係惟聖能通伏惟皇帝陛下德冠君臨澤均子愛一物失所如軫於納隍一人不獲載懷於馭朽敷求至理懋建大和明命施行率土欣戴臣實庸瑣叨領方隅奉陛下亭育之仁當海濱旱歉之後人多遷徙賦亦逋懸夙夜憂兢冰炭交戰忽承慈旨特降使臣優貸俯及於藩條勤恤遍加於凋瘵以制國用思致於均平以勗庶官俾甄其課效發號而生靈交暢先春而和氣導迎宇雖廣而煦嫗必周天雖高而感通寧遠臣幸逢昌運薦沐殊私誓將罄竭駑駘上裨萬一無任激勵踴躍感恩之至謹遣討擊副使曹序奉表陳謝以聞臣某言押領日本國朝貢使回伏奉宣聖旨并賜臣手詔寵私纍降荷載難勝臣某中謝伏惟皇帝陛下重光嗣聖元德升聞九有來王萬方率職以日本國使遠獻琛贄畢事旋歸言念梯航之勞厚其行李之費恭承詔旨伏見天慈臣當道發遣素有舊例今則稍加豐備上副懷柔已具別狀分析聞奏臣某言奏事官戴誠回伏奉墨敕慰問臣並以臣所進助山陵材木收納訖及吐蕃東道都元帥尚乞悉羅與臣及邵崇政等信物並蒙聖慈許令收領者殊私纍降感抃難勝臣某中謝臣以庸鈍叨膺任寄憑奉聖略藩守疆陲而亭障無虞戎夷獻款每示綏懷之德願輸臣妾之心昆夷喜附於漢疆禮物遠通於邊將陛下以覆載之廣延納是宏假其專受之名外示不疑之禮仰承宏貸俯積兢慙今臣及邵崇政所與回答信物並準詔據舊例量事發遣訖其敬國清已牒本鎮令勘待報到續具文奏又蒙宸慈特賜答蕃書本宣威示信體遠懷人俾無飾詐之虞實感曲成之道誓當戮力以俟一時永絶虛名乃臣職分無任感荷屏營之至臣某言中使馮仙鶴至伏奉手詔兼宣口敕慰撫臣及將士等聖恩曲被戴荷無階臣某中謝臣謬承驅策蕩滅凶殘役未踰時恩無曠日九天之上詔下斯須千里而遙威如咫尺示臣攻守之勢勗臣進取之期斷敵用奇皆憑睿略指蹤制勝盡出宸衷但當戮力悉心捐軀致命冀申微效仰答鴻私臣某言監軍使判官馬某至伏奉敕書奉宣口敕慰撫臣及將士等恩獎殊常寵驚無地臣某中謝臣幸承朝命叨佐戎旃無借筯之謀詎申微效有挈瓶之智備守成規戮力彼軍悉心留務雖事皆關白旌斾非遙而職在防虞城池是切豈謂常憂罪戾忽降綸言每驚寵辱特荷恩私聖澤載覃不遺於細物天書忽降曲賜於賤臣手捧紫泥心馳丹闕以欣以抃戴荷無階上答殊恩百生多幸俯慙微命萬死難酬臣伏以銓選之司國家重務根本所繫在於簿書承前諸色甲敕等緣歲月滋深文字凋缺假冒踰濫難於辨明因循廢闕為弊恐甚若據見在卷數一時修寫計其功直煩費甚多竊以大歷以前歲序稍遠選人甲歷磨勘漸稀其貞元二十一年以後敕旨尚新未至訛謬縱須論理請待他時臣今商量從大歷十年至貞元二十年都三十年其閒出身及仕宦之人要檢覆者多在此限之內且據數修寫冀得精詳今冬選曹便獲深益其大歷十年向前甲敕請待此一件修畢續條貫補緝臣內省庸薄又忝選司庶效涓埃以裨朝典謹具量補年月及應須差選官吏并所給用紙筆雜功費用分析如前園寢非三代制自秦漢以來附陵置寢或遠或邇則無聞焉韋元成等議園陵於興廢初無適語且寢宮所占在柏城中距陵不遠使諸陵之寢皆有區限故不可徙若止柏城則故寢已燔行宮已久因以治飾亦復何嫌或曰太宗創業寢宮不輒易是不然夫陵域宅神神本靜今大興荒廢囂役密邇非幽穸所安改之便維元和十四年歲次己亥七月丁丑朔六日壬午尚書戶部侍郎兼御史大夫上柱國宏農郡開國公楊於陵謹以旨酒庶羞之奠敬祭於故相國贈尚書左僕射權公之靈伏以世濟明德天資上才默識中照襟靈洞開言成典誥筆落風雷扣寂窮妙神交思來百代遐騖九流兼該傾詞人之藪澤為作者之杓魁粵自童年飛聲天下論交請益莫非賢者荏苒藩服發揮文雅遽徹明庭難留諸夏騏驥之步騁於康莊鸞鳳之舞暢於朝野望九霄於瞬息指千里於尋常遵曲臺之講肄修諫省之封章帝曰絲綸代豫言語詞之頗僻政亦乖阻爾其專掌爾必師古亟換官榮屢移星序春泉涌溢彩翰飛舞丕變澆訛裁成訓詁六官之二我踐其五朗鏡高懸時髦盡取陶鈞之柄義利求分詭情異態抑有前聞公之雅素迥拔㣥倫知以藏用忠惟愛君將所以懲止誇競儀刑搢紳豈獨辨是非於毫髮較輕重於逡巡而已哉日居月諸或處或出分陜東之憂寄統漢上之師律懋官之典雖荷於朝章福善之徵尚期於陰步馬如何不淑大禍俄鍾方佇朝天之慶翻成夢奠之凶歎人倫之殄瘁哀令子之疚窮幸斯文之不泯將千載之為宗於陵爰自壯年獲承嘉惠以蕭蘭之菲質荷松柏之深契鍾陵攜手禁掖連袂講德談元依仁遊藝平生之恨常嗟離別之多零落之悲何堪衰暮之際嗚呼謀及龜策言旋洛師風凄晚籟霧偃靈輀收淚舉酒升階致詞儻交情之不昧實神鑒之來思尚饗貞伯貞元中官御史中丞貞元七年冬以京兆府踰濫解選已授官總六十六人或有不到京銓試懸受官告又按選格銓狀選人自書試日書跡不同即駮放殿選違格文者不復驗及降資不盡或與注官伏以承前選曹乖謬未有如此遂使衣冠以貧乏待闕奸濫以賄賂成名非陛下求才審官之意元翰名鵬以字行博陵人舉進士應博學宏詞賢良方正直言極諫科三舉皆甲第纍遷禮部員外郎知制誥終比部郎中臣燧言臣聞享其名者必有其實受其賞者必有其功臣以往年奉詔東征田悅尋又伏奉恩命加臣魏博節度使方將收其土地撫彼黎人致天誅以伸威布王澤而施惠不得不居其任何事而辭其後摧敗雖多剪滅則未其賊偷延數刻獨保孤城田悅以潰亂殞身田緒以窘迫歸款聖恩復加宏貸悉復舊封以臣有擒制之所係縲綏懷之所降附人徒之衆將吏之多特敕別置保寧軍節度仍以臣兼充其使臣又方以勞來為事實且慰安其心尋屬西討河中內清關輔事殷任重勞力焦神正在憂虞未遑辭讓今臣舉軍還鎮解甲息師况當歉歲未康疲人方困若復虛兼二使別創兩軍職任既繁祿廩逾倍且臣非有收郡邑壁壘之實不宜復加名位非有保城池封略之才不宜別開軍府而乃妄為繁費謬積恩榮在私心懷苟得之羞於國典為虛受之失伏乞罷保寧節度停臣此使以保寧軍兵馬隸屬河東節度則聖朝有省約之利愚臣減盈滿之憂且臣尊爵大官窮榮極寵何待加茲一職乃為被以鴻私今保寧河東軍兵馬久同征行以相和協有同一體不必異名頗亦便安伏希裁擇無任悃款之至臣某言為臣之道臣實聞之有難則授命而不敢辭事君無苟安之責已安則避位而不敢處量己無昧進之譏况福過忌於滿盈任重憂於顛覆臣之所懼孰以為宜臣少無材能進非經術因逢屯難遂效驅馳陛下每録微功纍加高秩皆緣恩澤備盡寵光名列台司位兼宰輔總戎巨鎮居守舊都比又以東討魏州招降頗重伏奉恩命別以為保寧軍節度又以臣兼充其使重以四征㣥寇總帥諸軍加臣河東保寧奉誠等軍節度并管內諸道兵馬副元帥臣亦欲懷來款附統一攜離以此因循不即辭避今者寇戎剪掃區宇混同方將撫綏無事征伐則臣不宜復居副元帥之任保寧軍將士與河東將士久同居處並以和寧不必別為節度伏請停此二使許臣但以河東節度使鎮守北藩猶有尊官又兼寵祿已為厚甚不可復加雖尚偷榮近於量力豈將飾讓於外實為陳請於中伏乞聖慈俯垂照鑒臣無任懇款屏營之至臣燧言某月日中使某乙至伏奉手詔復以收河中功賜臣實封五百戶通前為七百戶功微賞重恩積生輕報效何階祗懼惟甚臣某誠惶誠恐稽首頓首臣頃奉詔與諸道同討逆賊上稟謨算克致誅夷越升官榮真食戶邑且有後命再荷殊私伏以聖德結於人心皇威加於物表將帥克宣其力凶逆盡伏其辜此皆國之福也至若分閫作藩秉旄仗節扞禦患難翦掃寇讎此固臣之職也幸無獲戾何以為功爵秩既崇封賞又重絲髮未效涓塵莫施雖復捐軀豈能上答無任感荷恐懼之至臣等言臣竊觀前代之盛列辟之英咸保鴻名而崇明號或配其德或昭其功蓋所以揚耿光彰淳懿而示遠也其有暗然不耀後嗣何觀蔽而不揚㣥臣之罪伏惟皇帝陛下由正統而臨祚承聖緒而受圖稟高明之姿於天侔博厚之德於地端教化之本制刑禮之中聲震八區威加六合運造化之柄靡有不通成陰步馬之功衆莫能測是用光膺聖神文武之號其後雖逢厄運尋睹昌期誠我武之掃清猶自咎而抑損同罪已之義明愛人之仁㣥臣等上順聖心以成恭德而退懷大懼謂掩全功五年於茲若墜冰谷方今百職皆理庶績其凝人用咸和俗惟丕變陳師鞠旅無犯塞之虞封疆畫界無專地之患四海寧謐萬類蕃滋薄刑溢不寃之聲逋賦蒙勿收之惠西成有穰歲之報南極見壽星之祥靈貺屢加天恩允答豈宜固為菲薄以掩盛明尊號之崇願復如舊况臣等親奉平明之理久蒙覆露之恩恥德美之不彰憂罪戾之將及伏惟陛下復循舊典俯徇㣥心誠天地神祗內外臣庶之所望也臣等無任屏營悃款之至謹詣朝堂奉表陳請以聞臣某等誠勤誠懇頓首頓首謹言臣某等言臣等前詣朝堂上表伏願復加尊號奉被還旨未遂懇誠拳拳禺禺不勝大願臣等伏以崇明號昭盛德爰自中古實為上儀以至於我祖宗莫不膺茲典禮伏惟皇帝陛下有廣運之德宏覆載之仁燭幽以明威遠以武惠澤之被誠浹洽於八方英聲之揚宜越軼於千古而乃久為抑損以守謙恭事有曠而不遵禮有缺而未備臣等又以為不私與已是謂至德有美之而莫敢辭有非之而莫敢隱必推於物而順於人既以徇於㣥心又思叶於古帝此皆聖王之事也且夫虛而失實則夸耀而誣質而不華則朴略而固而王度資於潤飾帝者務於恢崇蓋將以法日月之昭明配天地之廣大聳遠人之觀聽兼前代之軌模然後表其全功謂之盡善不可以方當陛下臨位㣥臣在庭而使鴻名不彰盛典猶闕既無以光昭衆美又無以丕承舊儀則臣等蒙恥於今獲罪於後實為大懼敢忘盡規尊號之崇願從㣥議伏惟陛下俯回宸眷察納愚誠不惟臣等受恩天下幸甚無任區區懇迫之至謹昧死重詣朝堂奉表固請以聞臣等誠懇誠勤頓首頓首謹言臣某等言臣等前再上表請加尊號實以功德俱茂典禮宜崇然而不能鋪陳無以動寤愚誠雖竭天鑒未回臣某等誠懼誠恐頓首頓首臣某等謹按白武通曰號者功之表也神農有教田事之勤燧人有興火食之利伏羲正五始祝融續三皇人為之名以美其事其後帝王之盛洎我祖宗之明咸因人心而慎古道雖損益或異其於表功明德一也臣等所以遵有國之令典采上古之遺文察人志於謳謠觀天意於符瑞敢以為請纍表陳誠曩者運丁艱難時或順動陛下思成湯之罪已念周宣之側身去徽號而不稱垂炯戒而自警應天以德示人以恭聞於蠻貊戎夷告於天地宗廟是故咸知陛下之志慕義而歸仁潛感陛下之誠垂靈而助順今者君臣和德上下叶心百職畢修庶官以序法令明具教化流行方內歡康天下寧一四人遵業萬類樂生嘉應休徵神物靈貺形於草木著於星辰而辭之以仁壽未臻至化猶鬱遂使德誠可絶名號未崇不告於明神不示於殊俗將何以知陛下之戡難將何以表陛下之致平下無以威於四方上無以報於九廟其不可一也淳古之至化邈而不追烈祖之威儀廢而不續其不可二也庶正㣥官宗室支屬西土耆老太學諸生黃冠之倫緇衣之侶萬衆伏闕彌旬織路而乃不從人心以違公議其不可三也守謙恭卑讓之志忽光大宏遠之圖臣等誠雖至愚以為大謬伏以恆久之德貞夫一也元始之義善之長也并包覆露天之大也清淨元默道之妙也睿智之周物不可以不稱夫聖也妙算之無方不可以不稱夫神也行仁義修典法歌詩頌考文章不可以不稱夫文也攘却戎夷戡翦暴逆邊兵以整禁衛以嚴不可以不稱夫武也而合於唐堯乃聖乃神乃武乃文之德臣某等謹稽之乾符叶於古帝侔德澤之廣配功業之崇昧冒萬死伏請上尊號曰貞元大道聖神文武皇帝臣等竭其精誠發於交感庶以回日其能動天無任屏營懇悃之至謹詣朝堂奉表固請以聞臣某等誠惶誠恐頓首頓首謹言及大會議戶部尚書班宏又請加奉道字故又改其文博施不息而萬物以生推功不宰而萬化以成又合於書之奉若天道之義伏請上尊號曰聖神文武奉道皇帝臣某等言臣等去年九月三度詣闕上表請復上尊號懇悃雖竭精誠未通又懼於纍塵聖聽是用中輟大願未畢㣥心靡寧臣某等誠勤誠懇頓首頓首臣等生逢昌運早列清朝獲睹文明繼迹賢俊亦嘗考前載於史氏訪遺儀於禮官至於保鴻名尊號之榮昭茂功盛德之美皆烈祖之垂法為纍代之成規子孫之所宜丕承臣下之所宜崇奉陛下纂聖緒而臨下遵令典而制中則亦俯從公卿大夫之請尤膺聖神文武之號閒者陛下以禍亂之故特貶損而自警以從一時之宜信為恭也今乃欲遂變更而不復以廢先祖之典則若專焉豈陛下或未之思然臣等實以為懼雖欲行陛下之志奈先祖之典法何伏惟陛下因於憂勞深自咎責命祝史告於天地陳圭幣祠於祖宗布於㣥臣聞於兆庶固能降開祐之福致感悅之誠咸和以叶心盡瘁而畢力弻成神造康濟艱難寇逆掃除暴強擾順侯衛奉守屏之職夷狄為來庭之賓兵戎不興邊鄙不聳文軌同於四海貢賦修於九州至若時候將必惟思而內省皇情微軫遂交感而潛通陰陽和而風雨時年穀熟而財用足休祥數見福應屢臻此皆天地祖宗垂靈錫祉以成陛下之志明無不答不享之咎也陛下宜承天意以悅神心增修盛儀再加明號崇昭報之禮表恢復之功而辭以仁壽未臻至化猶鬱則若尚懷不足以要天地祖宗雖有固讓之勤而非重請之義且夫號者其來尚矣燧人神農各旌其事湯以甚武而曰武王逮我祖宗亦崇高古道垂著新法陛下獨為辭讓以守謙沖則皇王將有愧於前祖宗將不悅於後而帝德是非之辨固有所歸國典異同之文後難以守且陛下本為炯誡以示敬恭誠謙德也今以先王之道而不敢不法烈祖之訓而不敢不承又謙德之大也若乃守獨善而遺公議執小讓而忽宏規違臣庶之心廢祖宗之典乃所以失陛下之恭德又徒以掩陛下之全功臣等雖誠至愚竊所不取輒敢徵之國典酌於經義取貞者事之幹元者善之長以配聖謨神化之盛文德武功之崇叶紀年之嘉名遵舊號之美稱以如開元故事謹昧冒萬死請上尊號曰貞元聖神文武皇帝伏惟皇帝陛下沛然回慮俯徇㣥情然後聖德之光昭元功之茂著後代得揚盛美而鏡至清是㣥臣之願也不勝懇迫之至謹復奉表詣闕固請以聞臣某等誠勤誠懇頓首頓首謹言臣頎等言臣等伏以尊號未復纍表陳情伏奉詔旨固守謙恭臣頎等上援天地神靈次奉祖宗典法列經義而順古因人心以從時詞繁而不能陳明誠竭而未蒙察納德美盛而猶蔽憲度缺而莫修罪戾是憂冰炭交集臣頎等誠惶誠恐頓首頓首臣頎等伏以先王之道由大中而可久近古之化以彌文而益彰則守謙而為恭不如立中而垂法表朴而禮略不如文明而化光况於文質異時而國家自有制度豈直為一王之法固以過三代之文其於規模信為宏遠陛下嗣訓先祖貽謀後聖當踐修以纂承奚變更而廢墜臣等又伏讀詔書曰遐想哲王則自燧人神農殷湯之時有其事也又曰欽若典訓則自代宗肅宗元宗而上有其儀也又曰所誡者滿所尚者謙守之以誠期於終始臣等以為去鴻名而貶損謙之始也遵舊典而奉承謙之終也造次而未嘗違於禮守之以誠也敬恭而無或蹈於專所誡者滿也又曰虛美崇飾所不敢當伏惟皇帝陛下恤人之心動天之德致理之文教戡難之武功著於頌聲光於史氏上有其實無虛美之謙下盡其誠非崇飾之僞又曰勉一乃心共康庶政曩者公卿大夫侍御攜僕或從扞牧圉或備持戈矛蓋有同力之誠而無離德之閒今者四嶽㣥后九土庶邦外自藩維內及宗室黃髮耆老青襟諸儒或僉以同辭或遠而抗疏一心之效也㣥材序進百職交修烽燧不驚兵戎以息鑽鑿不用獄訟以衰六氣和而風雨時五穀昌而倉廩實庶政之康也誠由教化以致雍熙自當冠於皇王寧復謝於堯禹宜加明號以表成功陛下雖以為辭臣等未知其說又伏奉詔旨令臣等斷表伏以君親一致臣子一例而春秋之義以王父命辭父命不以父命辭王父命則臣頎等得遵先帝之典以違陛下之詔謹冒昧萬死伏請復上尊號如前不勝惶懼懇迫之至謹復詣朝堂奉表固請以聞臣頎等誠惶誠恐誠勤誠懇頓首頓首謹言臣頎等言臣等今月七日所上表昨十五日下詔旨如初辭讓愈固臣等感謙沖於盛德而私有舊典隳廢之憂懼煩瀆於聖聽而內懷微誠懇迫之切進退兢惕不知所措臣頎等誠惶誠恐頓首頓首臣頎等伏以為事貴舉其中立名惡浮於實得其中不宜變之而失正有其實不必避之以為恭况以祖宗之矩儀國家之典制陛下道尊教備德博化光奚取於貶損而自卑朴略而太者也昔漢宣帝謂元帝曰我漢家自有制度諸葛孔明誡其主曰不宜妄自菲薄前史載之詳矣幸陛下思之臣等又為執小讓之賢不足以方得禮合度之善去鴻名之敬不足以補變法改作之專陛下行之將何所守伏以高祖受茲明命歷代承以聖德至陛下又有下武繼文重熙纍盛之美不可謂德之不嗣也躬上聖之資合至神之化戡禍亂制夷狄之武修禮樂垂憲度之文不可謂實之不孚也比年以來俗化斯厚人少犯法吏無舞文獄犴將空桎梏不用可謂人皆遷善豈曰俗未勝殘若固辭之所未悟也况於尊號之美陛下已受於初去之既由於艱虞復之宜因於康靖若示其罰不旌其功何以知區宇之削平何以知宗廟之紹復似非陛下之本意但自欲改先祖之遺儀耳內外臣庶跋履山川思報主恩誓雪讎恥亦欲攄其宿憤表其成勞陛下猶掩鴻名不彰其事則此等有如未盡不以為歡倘陛下以自咎責之心尚或未弭則㣥臣不能匡輔之罪是亦未除將何以蒙陛下之恩私將何以受陛下之爵賞君猶含垢臣以偷榮㣥下之情必深反側又無以示於萬古無以威於四夷皆非遠圖且乖大體臣等懷此數者悢悢而不能自安謹冒昧萬死重違詔旨伏請復上尊號以如前表伏惟皇帝陛下思聿修無念之言顧屈己從人之義再膺大典俯徇㣥心因來月謁太清宮太廟郊祀上帝遂以告祠實臣等之至誠實臣等之厚幸不甚惶懼懇迫之至謹復詣朝堂奉表固請以聞臣等誠惶誠恐誠勤誠懇頓首頓首謹言及大會議國子祭酒韓洄請歷數近日徵應祥瑞故又改其文如後表又伏見陛下以今年四月以來方當雩祭之修而有旱備之請才期而未害於物深軫念而將恤其人氣潛通而交感以和澤旋流而滂霈思遠由是風雨時而霜雹不降稼穡茂而蝗螟不生農功以成年穀大熟休祥數見福應屢臻仁木連理而垂陰嘉禾同穎而挺秀壽星舒景炎之盛芝草布葩英之重白麞凝彩而雪暉蒼烏取象於天色將遍於郡國相繼於歲時右具如表臣某等言伏見舒州奏懷寧縣界天柱山東南谷寺降甘露今月五日下尚書省者臣等謹按皇王以來圖牒所載皆以為天地之合神靈之精感中和之茂育彰太清之至理故鶡冠子曰聖人之德上及太清下及太寧中及萬靈則甘露下禮曰天不愛其道地不愛其寶則甘露降伏惟皇帝陛下元化醇茂沐澤汪洋合覆幬持載之功配高明博厚之德恩加㣥物禮及百神可謂同符實如前載又據舒州刺史宇文適所奏云天柱山者柱石之象也表山嶽之靈懷寧縣者寧謐之義也表懷柔之理伏以遠夷懷恩輔臣納忠觀其所言信而有理臣等親聞聖政獲覩殊祥無任月日崔元翰再拜上書郎中使君閣下天之文以日月星辰地之文以百穀草木生於天地而肖天地聖賢又得其靈和粹美故皆含章垂文用能裁成庶物化成天下而治平之主必以文德致時雍其承輔之臣亦以文事助王政而唐堯虞舜禹湯文武之代則憲章法度禮樂存焉臯陶伯益伊傅周召之倫則誥命謨訓歌頌傳焉其後衛武召穆吉甫仍叔咸作之詩並列於雅孔聖無大位由修春秋述詩易反諸正而寄之治而素臣邱明游夏之徒又述而贊之推是而言為天子大臣明王道斷國論不通乎文學者則陋矣士君子立於世升於朝而不繇乎文行者則僻矣然患後世之文放蕩於浮虛舛馳於怪迂其道遂隱謂宜得明哲之師長表正其根源然後教化淳矣閣下紹三代之文章播六學之典訓微言高論正詞雅音溫純深潤溥博宏麗道德仁義粲然昭昭可得而本學者風馳雲委日就月將庶幾於正若元翰者徒以先人之緒業不敢有二事不遷於他物而其顓蒙朴騃難以為工抗精勞力未有可採獨喜閣下雖處貴位而有仲尼誨人不倦之美亦欲以素所論撰貢之閣下然而未有暇也不意流於朋友露其嗤鄙而乃盛見稱歎俯加招納顧惟狂何以克堪今謹別貢五篇庶垂觀察儻復裦其一字有踰拱璧之利假以一言若垂華衮之榮不宣元翰再拜古之上賢必有祿秩之給有烹飪之養所以優之也漢時尚書諸曹郎太官供膳春秋時齊大夫公膳日雙雞然則天子諸侯於其公卿大夫蓋皆日有饔餼有唐太宗文皇帝克定天下方勤於治命庶官日出而視事日中而退朝既而晏歸則宜朝食於是朝者食之廊廡下遂命其餘官司洎諸郡邑咸因材賦而興利事取其奇羡之積以具庖廚謂為本錢雜有遺法列曹掾史之於郡上丞諸曹郎推本其位又諸侯大夫之比其有食也於古義最為近之凡聯事者因於會食遂以議政比其同異齊其疾徐會斯有堂矣則堂之作不專在飲食亦有政教之大端焉越州號為中府連帥治所監六郡督諸軍視其館轂之衝廣輪之度則彌地竟海重山阻江銅鹽材竹之貨殖舟車包篚之委輸固已被四方而盈二都矣其人處險而怙富易擾而難理事之紛錯差於他州而亞於荊揚幽益諸府舊矣故其設官之制劇曹皆二人而紀綱之職亦分為兩以統其事以其府署之內建旆設旄之盛飛纓薦紳之衆堂皇閈閎之壯而食堂之制陋而不稱期年故太子少師皇甫公來臨是邦始更而廣之居麗譙之西偏背崇墉以南嚮而其棟梁梠桷則皆松柏楩楠縱施五筵衡容八几洞以二門挾以四窗有爽塏之美無濕燠之患頤神寧體君子攸處後二歲而御史大夫崔公為之備食器增食物虞人之獻禽者必分焉故其鼎俎有芻豢之羊豕田獲之麋鹿鱉蜃鮐魚比之異橘柚筍蒲之新庶物豐矣由飲食以觀禮由禮以觀禍福由議事以觀政由政以觀黜陟則書其善惡而記其事宜在此堂乃列其名氏繫以年月敘之於後各以其職相從云唐右補闕翰林學士皇太子諸王侍讀史館修撰梁君諱肅字寬中其先安定人繇漢魏已降至於隋氏世有爵位家貴門盛刑部尚書邯鄲公曰毗君之五代祖以至於唐朝散大夫右臺侍御史趙王行臺記室宜春公曰敬實公之高祖朝散大夫右臺侍御史曰愕君之曾祖祖昱終於莫州任邱令父逵止於司禦率府兵曹參軍事安卑於燕薊避亂於吳越故其世少衰焉君嘗為司禦府君靈表以表其墓自敘其世系甚備公建中初以文詞清麗應制授太子校書請告還吳相國蘭陵蕭公薦之擢授右拾遺修史以太夫人羸老有沉痼之疾辭不應召其後淮南節度使吏部尚書京兆杜公表為殿中侍御史內供奉管書記之任非其所好貞元五年以監察御史徵還臺於是備諫諍而侍於大君傳經術而授於儲后典文章於近署垂勸戒於東觀授赤紱銀印之錫聞者榮之九年冬十有一月旬有六日寢疾於萬年之永康里享年四十有一詔贈禮部郎中賻以布帛十年春正月二十八日葬於京師之南小趙村之原子徽之宏之俱未冠嘗學文矣幼子未名小字振振夫人京兆韋氏抱之以縗從其輤車哀感行旅嗚呼君之寓於江南年十六而先府君歿事祖母以至孝聞在羈旅之中當離亂之際貞固而未嘗忘於道廉讓而未嘗虧於義年十八趙郡李遐叔河南獨孤至之始見其文稱其美由是大名彰於海內四方之諸侯洎使者之至郡更遣招辟而賓禮之其升於朝無激訐以直已無逶迤以曲從不爭逐以務進不比周以為黨退則淡然而居於一室傲遺乎萬物貫極乎六籍旁羅乎百氏考太史公之實録又考老莊道家之言皆覩其奧而觀其妙立德玩詞以為文其所論載諷詠法於春秋協於謨訓大雅之疏達而信頌之寬靜形焉博約而深厚優游而廣大其三占之遺有文集三十卷為學者之師式嘗著釋氏止觀統例幾乎易之繫辭矣前後五歲職必更於清顯擢必首於俊造歿之日位未及於裦贈之典然而天子憯怛悼痛恩有加焉假之以壽則將有器使之寄柄用之重是直屈於短夭而無命非不遇也執友博陵崔元翰哀之乃為銘於墓門識其邱隴銘曰懿文德垂典則以藻身又華國命之短哀何極
