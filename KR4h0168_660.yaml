front:
  text: 全唐文欽定全唐文卷六百六十白居易五
  hash: sha256:34bee75555c688d69bc7d3e261e2a5c6baa99ab76a3750f5bc851167881156d4
body:
  text: 門下王者重輔弼之任明進退之宜見可即升知否則捨茲朕所以推誠不惑與物無私者也銀青光祿大夫守門下侍郎同中書門下平章事兼宏文館大學士上柱國賜紫金魚袋陽武縣開國侯鄭絪早以令聞入參禁署永惟勤績出授台司期爾有終匡豫不逮歲月滋久謀猷寖微罔清淨以慎身每因循而保位既乖素履且鬱皇猷宜副㣥情罷茲樞務朕以其久居內職纍事先朝思厚大臣貴全終始俾就優間之秩用申寬大之恩可太子賓客散官勳封如故主者施行門下職參揆務權總戎麾必唯其人乃授斯柄自非望崇垣翰功著旗常則何以副儀形之求稱節制之任我有休命爾其敬承銀青光祿大夫檢校兵部尚書使持節滄州諸軍事兼滄州刺史御史大夫橫海軍節度支度營田滄景等州管內觀察處置等使上柱國邢國公食邑三千戶程執恭義勇立身忠賣心成性聚為事業發為勳猷歷事先朝久專外閫殿邦而山嶽比鎮奉國而金石為心動修武經居有循化洎執圭入覲班瑞言旋忠懇內激於心誠恭順外形於詞氣爰舉酬庸之典稍增命秩之榮方圖前勞且有後命朕思安封域望在勳賢任既切於腹心位猶輕於喉舌以守土勤王之效雖進官封念來朝述職之忠未加寵數特升右揆俾在中樞勉終永圖無替成績可檢校右僕射餘並如故門下靜邊之要選將為先夫有統馭之才然後授以節制之任有撫備之略然後鎮以夷夏之衝期乎攘遏寇虞慎固封域今子命爾時謂得人開府儀同三司檢校刑部尚書兼右衛上將軍寧塞郡王食實封二百五十戶王佖忠厚立誠果斷效用慎始終而行有枝葉踐夷險而道無磷緇早練武經果從軍職頃逢多壘實佐元戎節著臨危功參定難位由勞致名以忠聞自列六卿且司七萃星霜屢變金石彌堅宜申命於北轅俾遏戎於南牧進地官以崇新命極勳秩以褒舊功中簡朕心外諧僉議况五原重鎮諸夏長城修戎政莫先於威聲牧邊民莫尚於惠實師雜昆夷之悍訓必在和地為獯虜之鄰撫宜以信勉率是道往分朕憂歲時之間期於報政委望斯在爾其聽之可檢校戶部尚書兼靈州大都督府長史御史大夫充朔方靈鹽定遠城節度副使知節度事管內支度營田觀察處置押蕃落等使仍賜上柱國散官食實封並如故主者施行門下華夷要地實為蕃漢鈇鉞重柄必授忠賢况乎犄角諸軍金湯中夏有坐甲護邊之旅任切於拊循有引弓犯塞之虞寄深於備禦內作心腹外張爪牙苟非信臣不在茲選奉天定難功臣開府儀同三司檢校尚書右僕射兼羽林軍統軍御史大夫上柱國定襄郡王食邑一千三百戶閻巨源備知虜態明練兵符永惟頗牧之能宜授郇邠之寄長南宮而遷左揆壯西郊而委中權既圖前勞且佇來效於戲十聯之帥可以觀政萬夫之長可以樹勳勉宏令猷副我休命可檢校尚書左僕射使持節邠州諸軍事兼邠州刺史御史大夫充邠寧慶等州節度管內支度營田觀察處置等使散官勳封並如故主者施行門下議事以制擇善而行是適變通庶臻康濟此王者所以宏德而息人也况閫外重寄淮右成師建有德以統藩方擇有才以領留府仰惟令典今舉行之彰義軍馬軍先鋒兵馬使正議大夫檢校右散騎常侍使持節申州諸軍事申州刺史兼御史大夫會稽郡王吳少陽忠勞許國貴介成家蓄武略於韜鈐宣吏能於符竹屬元戎既歿謀帥其難朕將選衆以升試可而用推掌戎務已逾歲時而能和輯師人勤修土貢布寬簡有恆之政動悅人情守恭順不踰之心靜俟君命有嘉大節可假中權宜進列於貂蟬俾增威於貔武仍加勳秩式茂寵章嗚呼重觀其能我故委之留事載佇其效爾宜勉於後圖敬思是言往率乃職可銀青光祿大夫檢校左散騎常侍依前兼御史大夫使持節蔡州諸軍事權知蔡州刺史充彰義軍節度管內支度營田申光蔡等州觀察處置等使留後仍賜上柱國封如故主者施行門下臣之節極乎忠功君之柄先乎爵賞欲忠者之克懋也故爵有加等欲功者之速勸也故賞不踰時古先哲王實用茲道今我命爾因其舊章橫海軍節度支度營田滄景等州觀察處置等使起復冠軍大將軍左金吾衛大將軍員外置同正員檢校兵部尚書使持節滄州諸軍事兼滄州刺史御史大夫上柱國邢國公程執恭業傳將略名在勳籍蘊天爵以修已忠孝兩全竭臣節而事君夷險一致紀綱我列郡節制我成師動揚休聲靜著茂實自合符徵旅奔命出疆暴露歷於三時供億出於二郡整衆而身作師律伐謀而心為戰鋒服金革而無辭當矢石而有勇雨晦識雞鳴之信風高見隼擊之威遠略既申茂勳方集朕以恆陽之衆蠢爾無知驅彼生人致之死地每一念至惻然久之與其傷和而濟功曷若含垢而修德既罷師旅爰圖勤勞效且居多賞宜從重俾自夏官之長特升右揆之崇獎忠勸功於是乎在承我休命爾其欽哉可檢校尚書右僕射餘並如故主者施行漢宣帝云與我共理者其惟良二千石乎誠哉是言朕每三復安得循吏副吾此心今之臺郎一時妙選嘗經任歷率有才用雖典曹庀事其務非輕而恤隱分憂所寄尤重是用並命分牧吾人歲時之間期於報政戶部郎中某可某州刺史兵部員外郎某可某州刺史云云朕高懸爵賞佇期酬效咨爾夙夜其念之哉無俾龔黃專美前代門下夫佐佑天子燮理陰陽平章法度登進賢哲外撫夷狄內安元元使百官修其職一物不失其所此宰相之任也朕思得良弼馴致此道咨子命汝其殆庶乎某官張宏靖惟乃祖乃父代居相位咸有成績書於旗常爾有忠正恭肅文以禮樂日濟其美振揚家聲一時之人謂之才子亟登清貫益著令聞洎出刺陜部移鎮蒲坂政不苛細甚得人心寮吏將卒皆樂為用清簡之化聞於京師由是鄭風緇衣之好漢庭元成之美朝望時議翕然與之人謀既同朕志亦定乃用登爾於佐輔授爾以大政尚克欽乃嘉命業乃代官竭其股肱服我前訓嗚呼三代為相邦家之光爾其念哉無替乃前人之徽烈門下閶闔風至太白星高謀帥護邊國之大計具官范希朝忠貞勤儉以為質惠和智勇以為用一代名將三朝信臣朕以西邊列鎮三四若有總統則易成功思得良帥有威名者並護諸將歲一巡邊乘秋順令揚其威武則南牧之馬引弓之人知我有備不戰而去誰其任者無如希朝以爾有朔方之榮有振武之效功在疆場名聞羌戎惟實與聲皆副是選今拜爾為大將尊爾為司徒節制進退一令咨稟倚望如右可不慎歟可充京西都統敕某官李吉甫出入將相逮今七載而能修庶職敘彞倫毗豫一人以底於道夙夜不怠厥功茂焉夫忠於君者教本於親寵其身者賞延於嗣於是乎有飾終之命有任子之恩所以感人心而勸臣節也惟茲舊典可舉而行門下昔在堯舜聰明文思尚賴良臣實相以濟况朕薄德不逮先王是用急疾於求賢置之於左右俾承弼納誨以匡不逮言雖逆耳必求諸道事苟利人咸可其奏茲足以宣股肱之力成天下之務歷選多士爰得良輔乃降厥命其聽之哉某官李絳齋莊嚴重內明外直進退舉措有大臣體自參內職每備顧問忠讜之操終然不渝及二地官專領財賦未逾周月亦有成績歷試多可人望攸歸俾登中樞無易絳者於戲爾以文學入仕以正直奉上才膺大用職亦屢遷十年之間位至丞相何以報國在乎匪躬欽哉懋哉無忝朕命梁宋之交水陸合會人雜難理軍暴難戢因變肆亂往往有焉唯此一方朕嘗憂慮今有良帥鎮而撫之政立功成宜舉賞典某官韓宏以長材大略作我藩臣本於忠力輔以政理自分閫寄在浚之郊嚴貞師律恭守朝憲訓兵積粟明罰信賞軍和食足禮節並行河南晏如於茲一紀是則有大勳於國有大惠於人會課議功無出其右夫有過人之效則有加等之命古之王者所以賞一人而天下勸者用此道也可不務乎是用建於上公授之真食以示殊寵以旌殊績欽我休命子孫其保之司勳郎中知制誥裴度以茂學懿文潤色訓誥體要典麗甚得其宜施之四方朕命惟允况中立不倚道直氣平介然風規有光近侍臺郎滿歲班列當遷綸閣之職所宜真授可中書舍人敕左補闕翰林學士蕭俯頃居諫列職司其憂夙夜孜孜拾遺左右朕嘉乃志選在內庭自參密近益見忠讜始終不替尤足多之記事之官一時清選俾膺是命以宏勸獎可守起居舍人依前件庫部郎中知制誥翰林學士崔㣥端厚和敏飾以文學溫良忠敬得侍臣之風自列內朝兼司誥命事煩而益密職久而彌精六年於茲勤亦至矣况小大之事常所訪問盡規極慮宏益居多所宜寵以正名式光禁職敬乃嘉命其惟有終考功員外郎史館修撰獨孤郁為人沉實敏行寡言粲然文藻秀出於衆纍升諫列再秉史筆洎掌功論率以直聞求之周行不可多得而掖垣近職綸閣重選俯詢時議爾宜居之京兆府鄠縣尉沈傅師庶職之重者其史氏歟歷代以來甚難其選非雄文博學輔之以通識者則無以稱命今茲命爾其有旨哉昔談之書遷能修之彪之史固能終之惟爾先父嘗撰建中實録文質詳略頗得其中爾宜繼前志率前修無忝爾父之官之職可左拾遺史館修撰昔吳公袁安為河南尹守皆能以廉平清肅馭吏教人孰能繼之我有良吏某官許孟容才志甚大言論甚高在臺閣間藹然公望嘗尹京邑觀其器用臨事能守當官敢言不吐剛以茹柔不附上以急下政無煩碎甚合衆心及是轉遷頗有遺愛河洛千里都畿在焉凡所選任必歸望實考言詢事非爾而誰不忘舊政可立新績仍以騎省申而寵之隋州刺史李程頃以詞學入參訓命旋以才用出領詔條漢東大郡委之共理勵精為政三年有成中外序遷朝之彞典尚書郎缺爾宜補之華陰令卒非選補時調租勉農政不可缺前鎮國軍判官試大理評事裴克諒久佐本府頗有勤績屬邑利病爾必周知宜假銅墨試其才理待有所立方議正名故尚書右僕射高郢立身從事皆有本末在亂不汙可以言忠守官不撓可以言直以道佐主可以言正以年致仕可以言禮有一於此人鮮克舉况備四者不亦君子乎天不憗遺深用軫悼宜加褒贈以旌其風仍俾善人聞而知勸可贈某官中書舍人于尹躬其弟臯謨贓汙狼籍雖無從坐之法合當失教之責然以典職詔命恭勤五年我即念勞爾宜思過俾居近郡茲謂得中故太子賓客裴垍忠正恭慎佐豫為理事君盡禮徇國忘身積憂與勞搆成疾恙以致淪逝念之惻然頃屬多故未申禮典永惟褒飾寧忘於心今則命數之間宜從加等庶使忠於君者有以勸焉可贈某官金方之氣凝為將星王者法天選命豪傑授之以鈇鉞拜為將軍以威西戎以護中夏而倚望若是安可非其人哉某官某出忠入孝仗信抱義行有餘力學劍讀書鬱然將材用兼文武自領軍衛為我爪牙夙夜警巡不懈於位材官知訓環列增勳服勤五年茲為成績可以移用使之守疆郇邠大藩控扼胡虜若得良將則無外虞知臣者君非爾不可仍加副相以重是行勉樹勤勞式光寵擢門下周宣漢宣繼體之主一得申甫一得魏邴咸克致理號為中興朕嗣位以來永監前烈惟是賢俊寤寐求思歷選周行乃獲時彥宜以政柄舉而授之具官韋貫之溫重明正國之公器當官必守臨事能斷簡在朕志逮今纍年乃者擢居諫司以觀其直出領符竹以觀其理煩之劇務以觀其用訪之大政以觀其體歷試必中衆望允屬倚之為相僉曰宜哉可中書侍郎同中書門下平章事夫臣事君以忠后從諫則聖靡不有始鮮克有終理化不成恆由於此今我與爾永終是圖雖休勿休以臻其極嗚呼二宣之業吾有望焉渭南縣尉庾敬休等咸文行清茂士之秀者宜從吏列擢在朝行各隨才用分命以職司諫執憲佇有可稱古之諸侯三載考績選其賢者命為長率所以勸功行而興理化也蘇州刺史范傳正文學政事二美具焉選自郎署出分符竹江南列郡連領者三所至之部悉心為理明諭朝旨恭守詔條謹身省事以臨其下政簡而肅意誠而明吏不能欺人是以息而去思之歎來暮之謠往復有政聞於人聽雖古循吏蔑以加之朕以陵陽奧壤土廣人庶其地有險所寄非輕迹其前效可當此選况黟歙之遺愛尚在吳興之新政方播升車便道足慰人心固當望風自安計日而理倚注於爾往宜欽哉執親之喪三年禮也聖人不得巳而奪之金革之事無避權也忠臣不得已而從之某官某握我兵要守在塞門忠勇威惠合以為用師人悅附戎虜畏服逮彼諸部聞其姓名况歲廣屯田日討軍實載陳遠略方集大勳自罹家艱遽致公政茹荼銜恤已過旬時而軍旅不可以無帥疆場不可以無主且慮人慢或生戎心蓋臣節大於孝思王事急於情禮捨輕從重徇公滅私變而通之正在於此俾加戎秩用護邊封往復舊職無違朕命書曰德懋懋官功懋懋賞此先王所以匡飾天下也其有忠勞輸於國惠澤及於人高位厚賞朕無所愛某官任迪簡頃以本鎮元戎來朝俾佐師律實掌留務屬偏裨不軌誘動軍部亂行忤命至於再三而迪簡冒白刃於戎首置赤心於人腹挺身誓衆罔不率從㣥情既歸因命為帥况閭閻蕩析倉廩匱竭野有餓莩軍無見糧又能推恩信以結衆心率勤儉以勸生業士旅悅附流庸思歸周月之間泰然安堵開置幕府叶和親鄰俾豫無憂時乃之力夫為將守立功如斯不加爵賞何勸來者建官惟百端揆長之自非勳賢不在此選以是加等之命寵乃殊常之績俾增威於閫外仍就拜於軍中爾其欽哉無替厥命某官某往以強毅剛正見稱於時擢在左曹俾之駮議旋以言動小有過差左遷遠藩亦聞有政雖經三黜僅歷二紀而堅直之氣終是不渝人之所難亦足嘉尚宜可束帶立之於朝正色讜言時有所取俾登西掖仍珥右貂從容前後以備顧問敕聚九州之賦辨百貨之名按其度程謹其出納孰為主者外府上卿務殷秩崇不易其選某官裴武有通敏之識有倚辦之才以茲器用早膺任使小大之務罔不勵精纍有勤績存乎官次而受藏之府國用所資若非使能何以集事俾升顯列仍委劇務爾宜率其官屬欽乃職司會帑藏出入之要修權量平校之法以遵成式無使改易謹而守之斯為稱職敕盡悴事君明哲保身進退始終不失其道自非賢達孰能兼之司徒同平章事杜佑以長才名略為國元臣歷事四朝殆逾三紀出專征鎮為諸侯帥入贊台袞為王室輔嘉猷茂績中外洽聞寵任既崇勤勞亦至頃以年登致仕退請懸車方深倚注久未得謝勉就牽率逮茲纍年今抗疏披誠至於數四敦諭頗切陳乞彌堅期於必遂理不可奪守沖知止佑實有焉賢哉大夫今古同道宜從優異之命式表褒崇之禮尚資耆望俾傅東朝可太子太師致仕如天氣晴和亦任朝謁昔祁奚申叔皆就請老國有大事入議否臧忠臣愛君豈必在位永觀前事期副茲懷某官鄭涵等並早以文行久從吏職輩流之間頗為淹滯况雅有學識進修不已禮官方缺宜當此選凡朝廷禮制或損益有宜中外諡議或褒貶不決爾為博士皆得正之所任非輕各敬乃事並可太常博士國之都府半在東州未遑時巡方委留鎮非位望崇盛加之勳舊者則不足以允僉屬而副重寄也刑部尚書韓臯名德之後鬱然公才正行通規貫乎始終纍遷臺府連鎮藩維入修職業出樹風聲故多遺愛著聞中外况一登朝序殆三十年舊德耆望無居其右俾乂東夏僉以為然乃加冡卿以示崇寵敬服嘉命永孚於休可檢校吏部尚書東都留守敕典郊祀之禮獻賢能之書今小宗伯實兼二事非直清明正者不足以處之中書舍人韋貫之沉實堅峻文以禮樂行成於內移用於官公直之聲滿於臺閣頃以詞藻選登禁掖秉筆書命時稱得人久積勤勞宜有遷轉可使典禮以和神人可使考文以第俊秀儀曹之選僉議所歸往修乃官無替厥問可禮部侍郎餘如故敕庶官之政得人則舉况中執憲準繩之司所以提振紀綱端肅內外蓋一職修者其斯任之謂歟給事中薛存誠選自郎署列於左曹居必靜專言皆讜正章疏駮議多所忠益可以執憲立於朝端况副相方缺臺綱是領糾正百官爾得專之夫直而不絞威而不猛不附上而急下不犯弱以違強率是而行號為稱職敬服斯命往其懋哉可御史中丞餘如故羔除戶部郎中制前長安縣令許季同前萬年縣令杜羔等頃自郎署分宰京邑而長吏待之小乖常禮雖同辭托故動未得中然遠恥以退道不失正各從免職亦既踰時况文行政能皆推於衆詢諸時議宜有遷授尚書郎缺方選才良憲部人曹俾膺並命季同可刑部郎中羔可戶部郎中京兆少尹辛祕頃守吳興時逢擾亂安人殄寇節效可稱出倅戎車入二京輦亦有政績著於官常今以汝汾軍郡之大方求良吏委之分憂詢事考能爾當其選往即乃土以舒吾人可汝州刺史
