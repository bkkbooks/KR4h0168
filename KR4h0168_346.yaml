front:
  text: 全唐文欽定全唐文卷三百四十六國忠太真妃從祖兄本名釗元宗為改今名因諸女弟得召擢金吾兵曹參軍間廏判官纍遷京兆尹兼兵部侍郎自請領劒南節度俄加本道兼山南西道採訪處置使拜御史大夫領吏部代李林甫為右相兼文部尚書集賢院大學士監修國史崇元館大學士太清太微宮使封魏國公徙封衛册拜司空安祿山反以誅國忠為名元宗幸蜀國忠從至馬嵬兵士爭刃之梟首以徇
  hash: sha256:87a4fb417b743a310560915fb5307a3f5a737f4934d4c48149f73a62169e4570
  markers:
  - {type: head, offset: 14, content: 楊國忠, id: KR4h0168_NFKB_346-h1, level: 1}
body:
  text: 臣國忠言頃以南蠻閣羅鳳敢背皇恩吐蕃與其潛謀欲於瀘南結聚窺窬越巂草竊昆明繇是西山諸郡及八國子弟知其狡計同請討除臣當戎行祗奉睿略破吐蕃雲南救兵六十餘萬屠拔隰州等三所大城擒俘虜六千三百臣以劒山迢遞不可盡來遂簡丁壯千餘并投降首領昨三日於勤政樓奉獻已降殊恩臣又以男女口二百人六日於躍龍門進納陛下以生成之德不限華夷詔臣曰夫王者之義子育為先每行干紀之誅嘗軫在豫之念吐蕃遺孽頻有負恩其君則然其人何罪且全其生理遂彼物情其所獻口并宜釋放遞還本國以直報怨於是乎在微臣於是何幸親奉德音聞所未聞以欣以感伏惟陛下含宏庶品康濟㣥生大敷恩信下格昏迷自皇王以來未有如今日者也天下幸甚豈惟諸戎特望宣付史官頒示中外鉷太原祁人開元時纍除戶部員外郎天寶中拜御史中丞遷戶部侍郎加銀青光祿大夫封太原縣公兼殿中監十一載因邢縡謀逆詞連鉷弟銲賜鉷自盡草土臣鉷言伏奉制書復臣御史中丞餘並如故恭承睿獎五情震越臣中謝臣弱喪所生不能自立慈親撫育得以成人所恨終身號慕無及今才踰卒哭寧冀生全聖澤曲流天光特照記臣於苫之下起臣於風憲之前知臣轉深萬死難謝誓將糜粉上答殊私豈固禮經輒稽嚴命但臣自丁艱疚日漸尫羸竊料形體未堪驅策徒招謗議無振紀綱伏乞聖恩舍憐俯矜靦冒容臣歲月抱釁私門稍能支持不敢辭訴無任感懼荒迫之至謹詣朝堂路左奉表陳乞以聞草土臣鉷言臣迫以私情銜恤上訴曲垂聖禮敦喻彌深恩重難移心孤易殞哀榮之極肝腦何酬中謝臣伏在糞土之中苟偷朝夕之命殊私薦及特蒙收獎授以風憲委以澄清臣雖至愚豈不知天慈所屬使臣即蹈湯火若登雲霄安敢固辭輒拘常限但緣荒瘵忽忝衣冠自審殘生必招官謗謹冒死重請不勝戰越無任哀懇荷戴之至謹詣朝堂路左奉表陳乞以聞臣聞道本無為虛而必應行之者時乘六氣得之者壽越二儀伏惟開元天地大寶聖神文武應道皇帝陛下高居衆妙深契重元降自三清元君俯為萬方聖主竊見朝之上宰是曰大賢首學真宗先開道觀奉揚慈旨布淳化於蒼生恭啓福因延休祐於皇極臣昧於聞道不敢思齊瞻言報恩寧忘竊比且臣孤立明主所知竭力效官義惟守死捐軀奉國誓不偷生所賜榮寵所蒙任使不因人力特出聖衷加以前後糾彈頻闕抵忤公言成謗恐不自明直道招愆甘為已分陛下聖明先覺真偽立分燕客上書遙知是詐漢臣引過逾察其忠蒙獨照於聖心免獲罪於浮議嘗憂萬死翻致九遷伏念殊私將深罔極徒申答效無補萬分臣舊宅在城南安化門內道東第一家祖父相傳竹樹猶茂已更數代垂向百年同蕭何之買田誠為偏僻異晏嬰之近市稍遠囂塵臣於此中選其勝處減兼官之祿俸回纍賜之金帛盡除遺堵創建遵堂廊宇既成功德將畢伏乞俯矜丹懇特降皇慈因誕聖之辰充報恩之觀捧迎仙榜光映敝廬每至三元八節之時天長乙酉之日臣得澡雪紛垢奉持齋戒一心至願稽首尊容獻福聖躬永資寶算千生頂戴萬劫歸依雖螻蟻之負細塵豈能裨嶽而鳥鵲之銜微毳有志填河儻蒙睿澤曲流愚誠俯遂仰望許臣諸處招灼然有行業道士二十七人常修香火無任感恩荷德之至進明開元十六年進士肅宗朝歷北海太守移南海太守攝御史大夫充嶺南節度使旋正授御史大夫河南節度使後貶秦州司馬琯昨於南朝為聖皇制置天下乃以永王為江南節度潁王為劒南節度盛王為淮南節度制云命皇子北略朔方命諸王分守重鎮且太子出為撫軍入曰監國琯乃以支庶悉領大藩皇儲反居邊鄙此雖於聖皇似忠於陛下非忠也琯立此意以為聖皇諸子但一人得天下即不失恩寵又各樹其私黨劉秩李揖劉彙鄧景山竇紹之徒以副戎權推此而言豈肯盡誠於陛下乎臣欲正衙彈劾不敢不先聞奏我巨唐天寶之敦牂歲月壯旬八日而四郊不雨赤擢穎而始花素稻含英而未吐心有螟節有賊根有蟊葉有螣噫十數載間荐傷於稼穡居則懸磬散為浮食千里百城老農老圃奔走於道路相顧而言曰昔者災由是也今未及闕一字為災也謂之何哉進明聞而避正堂以自咎即齋次以詢謀乃命參軍王皓之告於伯王之廟十九日辛亥初拜恍兮若有所見忽兮若有所聞風闕一字雲蒸雷吼電缺鞭頂視之魃斫翰飛之蛇殄熅蟲闕三字停闕一字玉而煎砂水刑溪盈川本名刑溪兮闕十一字而隘陌君闕三字兮整衣冠以闕十字其闕三字而環周膏塗於疆場之內闕一字禦闕三字祀闕一字有闕三字虎踞龍蟠鸞鳳之所翔集闕一字梧修竹青翠崢嶸濬湯池稜石城停午無影虛聞籟聲雙闕霞張閟宮有侐徒三萬車千乘二矛重弓朱英緑縢虹旌日羽鐃歌劒舞若昭震於岡陵烏呼嬴政焚燒詩書胡亥繼之以昏虐當是時也豪傑並起而攻秦王以蓋代之才拔山之力喑啞叱吒橫行於天下破釜沈舟隳城坑卒沛公謝罪子嬰伏誅豈樓煩之徒轅門諸將目不敢視手不能發而已生則伯主歿為貴神山川出雲天降時雨善長嘉會事幹義和羞爾肴蒸聿求多福災蝗癘鬼飛遁於犬牙之外雖上德不德而好是正直皇皇彼天孚祐下國春秋匪懈享祀不忒適變無窮永代作則銘曰雷為戈兮雲為斾天殷殷兮雷聲口蓋光明下濟兮澤雱霈廙新唐書作廙業平陽人官華陰縣尉景雲中殿中侍御史內供奉開元初官大理評事集賢院修撰遷直學士坐事左遷餘杭令夫神其止也虛其行也直是以感生焉夫祀其事也大其馨也德是以福生焉維嶽有高尸立兌曰華天作峻極厥仞五千降靈集祉密邇上國故風雨時若必應休明玉帛之享亦豐其報致天人之和者功莫大焉歲在涒灘我皇帝以開元嗣極今八載也文德被武功成垂拱而天下理纘服而庶邦正於戲聖之配天不逆災祥之數而務修其德天之降福或彰譴告之符而終與其善是以成湯興而炎暵遘周宣懼而頌聲作間自日在奎雷始電逮乎畢春氣達萌芽山川如焚密雲不雨千耦適野胥病於失時百室崇墉將空於成歲我皇畏昊天之命憫蒸人之艱自郊徂宮靡神不舉乃分命舊相尚書許國公蘇頲以瑞祝之辭旅於西嶽將以蒙嘉氣獲豐年公時膺保衡代修袞職克永先正對揚王休天子以才難九人允歸同德公是用僉諧八座懋廣疇咨有文章焉有禮樂焉既享冢位乃司宗伯實佐和邦敬恭明祀爰屆爰處威儀孔將閟是亭廟有來斯啓州命長史河東嶭縉俾焉協事於外宗人相禮展器執書告備於內肅雍萃止蕭艾並作幣尊六號王用兩圭焚燎舉而禮容祗若昧爽交而神光有粲粵三月庚申陳薦請也公已事復命式遄其歸時厥翌日旋於闕下車轔轔而響止履鏘鏘而聲入則已淹周四溟澍洽千里拜獻純嘏天臨在歡嘉公克誠神用影響制書裦賚束帛有差既禱而祠古之義也吾不與祭帝有吅必焉乃申命秩宗寵終厥事則有牲牷樂奏之備以昭配焉癸卯告賽如前禮夫陰陽不測至妙也因變感情至教也六府三事大功也四望六宗大禮也后王卿士如彼歲月其道不易時維康哉蘇公乃言曰惟我后之德格於上下神哉其霈令茲巨人既可述已於是重費以謀始因物以書伐倬彼金石載刊其陰俾夫後之敬事者知景福之攸在其辭曰於鑠太華降神西峙惟王荒之配天有祀雲雨成物馨香叶祉明明天子禱於愆陽肅肅蘇公王命是將克誠攸享離畢其滂年之用康祀事惟政非昵非假禮崇其敬祠而報焉以永終慶惟靈感和幽贊而生有豐者石刊之則貞蘇公作頌孔碩其聲長卿字文房河間人開元二十一年進士德宗朝為監察御史檢校祠部員外郎轉運使判官知淮南鄂嶽轉運留後終隨州刺史水無心而清冰虛已而明始則同體終然異名水之動我變以靜水之柔我變以貞任方圓而能處其順在高下而不失其平北陸初凝結而為冰東風始起融而為水與時消息隨物行止水也不知其所然冰也莫知其所以何推運而有恆乃忘情而合理觀乎外示貞堅內含虛徹無受染以保其素無納汙以全其潔比玉而白不為蠅玷比月而明不為蟾缺瓊樹色奪瑤池光發變寒日之清瑩帶陰天之肅殺爰自止水遍於山川萬穴俱閉長波寂然皎皎彌靜峩峩遠連如雪覆地若雲披天雲之凝兮佇長風而可掃雪之積兮向太陽而莫全豈同夫氣之所感物莫能遷徑飇夕寒我力增壯晴景朝暖我心猶堅其堅伊何履霜斯至其薄伊何臨泉是畏君子用之以馴致其道覩之而不驕於貴二之日始鑿命虞官三之日始納享司寒天子陳禮容賦豳風大啓冰室獻於王宮氣肅雲陛寒生袞龍闢九門於月下列千官於鏡中頒衆位取飲以受命御至尊得象於朝宗若君莫之求臣莫之見則深山窮谷詎可得而加薦苟藏之不周用而不遍則災霜害雹如有待而為變人或愛我清人或愛我淨既潔其迹亦堅其性水之冰生於寒人之冰生於正無棄其道吾將何病山海經曰洞庭之山帝之二女居之郭璞云天帝之女處江為神即列仙傳所謂江妃二女也劉向列女傳曰帝堯之二女長曰娥皇次曰女英堯以妻舜于媯汭舜既為天子娥皇為后女英為妃舜死於蒼梧二妃死於江湘之間俗謂之湘君湘中記曰舜之二妃死為湘水神故曰湘妃韓愈黃陵廟碑曰秦博士對始皇帝云湘君者堯之二女舜妃者也劉向鄭元亦皆以二妃為湘君而離騷九歌既有湘君又有湘夫人王逸以為湘君者自其水神而謂湘夫人乃二妃璞與逸俱失也堯之長女娥皇為舜正妃故曰君其二女女英自宜降曰夫人也故九歌謂娥皇為君女英為帝子各以其盛者推言之也禮有小君明其正自得稱君也按琴操有湘妃怨又有湘夫人曲今年春王正月皇帝居紫宸正殿擇東南諸侯以我公為少光祿自姑蘇行春於東陽愛人也頃公之在吳值欃槍構戾南犯斗牛波動滄海塵飛金陵公夷險一心忠勇增氣四面皆敵姑蘇獨靜臥甲霜天洗兵寒水竟使浙西士庶不見煙塵公之力也朝廷聞而多之以為姑蘇之人已理東陽之人未化是拜也宜哉卿月既明仁風載清出入數藩從容九棘在虞秦而皆智豈滕嶭而異名頌聲洋洋實此行矣于越便道金華前山梅花過時槐色猶在白雲芳草盡入詩興公實秉文律將為詞雄逶迤退公知八詠之有繼作矣皇帝臨軒旰食憂濟在人擇良二千石與之共理民有疾苦得以安之吏有侵漁得以去之為風化之本繫黎元之命不其難哉故內外闕官自卿大夫以下多責成元輔唯剖竹分符決在禁中又以政貴有成化難數易至於理行超異公論當徵但增秩錫金或移典大郡而已由是我蕭公建隼茲地化成五年漢庭㣥公方待以右職而竟有南徐之命蓋天子憂遠人而緩徵拜也公才可以濟物德可以化人五行之用備四時之氣足不立法而去弊不示禁而止姦寒者有衣飢者有食百城萬井若百草之得陽春不知其所以然而然也詔書既至公乃向闕北拜腰章遂行南徐之人望公如歸此邦之人去公如失千騎照路出於東郊男女滿野壺漿輻湊泣涕以送邀遮以留或攀我車或維我舟臨風鳴笳慷慨高秋君子是謂有古人之遺愛矣凡工文者能無詩乎天竺僧畫像者梁直閣將軍張僧繇之真迹也張公繪事之始厥有二僧後屬侯景師至金陵江南喪亂此畫流離散落多歷年所遂遭剖割分而為二其一在唐故右常侍陸堅處即此僧也陸公常嬰篤疾殆將屬纊忽於夢寐覩此胡僧謂公曰我有同侶一人自從離析已百餘年今在洛陽故城東李君家深所寶玩舉世莫知若能為我求之再得會合當以法力扶助令爾無憂陸公既寤遂以求訪果如夢中之旨獲見斯人而僧亦俱在乃以俸錢十萬購而合焉即日陸公疾瘳勿藥有喜信知造思之妙通於神祇識者以為干將鏌鎁散而復合亦其類也嗟乎陸公已沒子孫不守有故姬鬻之於市為校書郎宋儋所得開元中儋服藥過度因而喪明其李氏之僧復失所在惟入夢者巋然獨存儋卒傳故人劉傑傑隱居少室不求聞達天寶末遭祿山之難避地淮陰與道士魏審交深相結納無何傑以老卒傳於審交審交傳楚州刺史李湯湯傳睦州司馬劉長卿今為劉氏之寶藏矣有唐大歷十三年九月二十一日睦州司倉參軍范陽盧公夫人鄭氏終於所寓之官舍享年四十八以其月二十九日盧公受命於元龜權厝於津德縣佩犢鄉之東原禮也夫人滎陽人也曾王父松皇朝魏州莘縣令王父行恩晉州臨汾縣令父叔衛州新鄉縣丞鄭氏之先家牒詳矣元魏以衣冠人物首出諸族之右者五姓我居其一世濟厥美史不絶書夫人即新鄉府君第五女天姿淑德早有令聞中外推之難於擇對年十九以束帛墨車之禮遂歸於公在滎陽家號女師入涿州縣人稱婦道恭儉以事上柔順以逮下服浣濯躬勤勞山東士風於是乎在嗚呼偕老斯闕從秩猶卑不及中年梧桐半死安仁悼亡之歎人皆代而痛之一子一孫訴於彼蒼泣血而已銘曰新鄉積善遂生淑媛詞邁克修乃光好仇母儀婦德萬古千秋新安江水已矣東流維某年月日殿中侍御史劉長卿謹以清酌庶羞之奠敬祭於故江州刺史相公蕭公之靈天降全德俾居元輔獨立堂堂高視前古和氣同積英姿外舉草木陽春山川時雨纍葉當國同心事主業繼韋平世生申甫龍潛少海公佐儲闈朝有姦臣動履危機十年調護不處嫌疑非以智免則將禍隨國移大盜公陷虜圍忍受拘逼誓酬恩私苟無所成雖死何為果翻賊黨來赴王師懿夫川實朝宗雲亦成龍天地再開君臣相逢獨持一心翊戴兩宮明略戡難丹誠徇公輔國佞幸敢亂朝經潛申讜言請奪禁兵謀泄隙開反為所傾倉卒之際播遷無名東出招邱南浮洞庭寄身滄江泛若流萍水國生疾炎洲促齡瓊樹先落金丹未成長卿自奉周旋於今五年才微顧重迹近位懸即之溫如望之儼然獎飭何厚招尋亦偏春山彩擷秋水洄沿候月舒嘯臨風扣舷懷舊如昨承歡眼前素業遂空清風獨遠哀哀孝子行哭而反託體山阿古來誰免湘流垂釣楚挽空吟明主思絶蒼生愛深江南春草自古傷心想像生平猶聞德音嗚呼哀哉去旌搖搖送馬蕭蕭長江遠山暮暮朝朝山有歸雲江有回潮公之逝矣一言寂寥挂劒於此魂兮可招尚饗維年日月某乙謹以清酌之奠敬祭於故道州刺史相國崔公之靈唯嶽降靈唯公佐時大國梁棟中朝羽儀清迥玉立峩峩冰姿秋水見底寒松無枝天步艱難海內崩離六合恟然一言安之帝憂南方公實載馳江漢之人惟公是依持衡署吏按節臨師三軍感恩多士如歸何名高而難恃翻寄重而先疑旋剖竹於滄海罷調梅於赤墀公頃歸朝時逢出震體道而處忘機於進淡然一心獨立千仞望重元老恩深顧問言必至公行惟周慎守孤直以見疾觸姦邪而結釁公之為善匪近於名公之在貴匪貪其榮人皆畏黜公猶不驚飛鳥無迹白雲何情拜手魏闕退身楚城北渚在途南風掩扃顧婆娑之樹老歌滄浪之水清雖優間而適性終卑溼而傷生嗟乎若以神之輔德將未喪其正直若以天之愛人當復佐於陶鈞棄蒼生而不起留清風以益振長卿昔忝初秩公之一顧謬廁當時之選敢忘國士之遇旅櫬還鄉危旌啓路弔湘水而自波望長沙而空暮嗚呼萬古兮歸舟千里兮東流過洞庭而搖落出夏口而夷猶月蒼蒼兮江渺渺人不見兮猿獨愁徒髣佛兮如在竟寂寥而若休尚饗維年月日某乙謹以清酌之奠祭於故睦州刺史閻公之靈猗歟我公誕靈中和盛德茂才如山如河玉立清迥冰姿峩峩獨鶴不㣥孤松無柯班氏九流孔門四科總而懷之巨海長波遭時艱難避地江沱浙水之源剖竹來過百城風偃萬室星羅感恩具存賞罰無頗帷褰訟止襁負肩摩俗謠蔽芾庭顧婆娑沈侯高詠謝客疲痾人之云亡天意若何故鄉道阻旅殯山阿哀哀孝子霜露滋多常懼流年邱隴陂陀乃告元龜是宅是他嗚呼我公所悲則那今去也哭昔來也歌引發東郊攀恩皤皤銘旌夕沒漭滄寒莎緬懷生平持奉仁和感恩臨奠悲如之何尚饗維某年月日某乙謹以清酌之奠祭於故睦州刺史閻公之靈天縱厚德曜於當代天與盛才宏夫濟世經綸萬類磅礡六藝禮樂詩書自中形外玉山迥出瓊樹無對秦鏡洞開吳鉤新淬青春立節白首彌勵五府交爭辟書相繼九州分按無遠不屆所居則理其去懷惠燋心苦形興利除害運屬橫流道猶未濟一麾出守萬里長逝故林之下永閉龍泉埋沒於此經今幾年藹藹豐里油油原田田則有稼公之闢焉里則有桑公之植焉我衣我食公實賜焉人亡物在事往名傳滄海則變清風不愆長卿昔尉長洲公為半刺一命之末三年伏事愛我以文獎我以吏禮變常儀恩生非次懷舊如在感今斯異身辱良知情依令嗣中原多梗旅櫬猶寄挂劒傷心看碑墜淚東風應律草緑川媚陽和發生物性咸遂冥冥逝者獨翳茲地空對一枝音容髣佛尚饗維年月日某乙謹以清酌之奠祭於故鎮守兵馬使董公之靈溫溫董公純厚謙恭忠孝因心禮樂在躬薄伐襄漢言從征東遠將偏師獨當㣥凶朱旗薄霄白羽生風彼衆我寡兵盡矢窮手張空弮力殫氣雄孟明失律李廣無功有志不遂飲恨而終落梅笛怨細柳營空猶嘶戰馬永挂良弓銘旌悠悠此去何從寶劒埋沒黃泉幾重尚饗維年月日某乙謹以清酌之奠祭於故吏行官某乙之靈生也有涯天之常理悲夫逝者不得其死瞻彼行潦兮一勺之水嗟爾浮生兮千齡已矣憶昨金陵喪亂宣城危逼王師有征將破殘賊我事戎旃爾為羽翼實執鞭弭豈辭筋力熊羆失利豺狼反顧衣冠四散余之南渡白刃向人黃塵欲暮平生門闌皆巳行路唯爾臨危秉心益固一身相依千里徒步嗚呼故鄉何在旅櫬何歸蔓草春緑孤魂夜飛心存簪履淚滿裳衣空餘旨酒以慰泉扉
