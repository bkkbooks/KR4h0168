front:
  text: 全唐文欽定全唐文卷二百四十五李嶠四
  hash: sha256:0e0be15351e9270f55e7bac542f62407d4e71ca5325839bae8d2388ce48ebcc8
body:
  text: 臣嗣宗言臣學藝無稱才德兼闕幸延慈蔭遂歷通班花萼同榮依上林而發彩鶺鴒交賀仰大厦而相歡恩比邱山效微塵露叨榮席寵荷愧承羞臣嗣宗中謝臣嗣宗夙奉皇明巳忝銜珠之秩兄懿宗近承天澤又當執金之位弟兄齊列伯仲分曹咸典禁戎並參宸衛匪惟官崇祿厚思滿盈而增憂固亦秉勢操權顧章程而自惕況臣素抱愚拙更纏疴恙牽羸引憊竊位妨賢內懷尸素之慙外負朝廷之謗豈可以多塵聖化久纍能官伏乞收迹丹墀歸骸素里庇堯雲之光彩浴舜海之波瀾柳蔚桃濃聽南鄰之鍾磬茅舒桂滿陪北闕之竹替纓餐厚渥而忘饑樂太平而愈疾則涵養之德聸大造而斯宏靦冒之譏在微臣而知免輒陳固陋輕黷威嚴授紙彈毫驚魂悚魄臣嗣宗誠惶誠恐頓首頓首死罪死罪謹言臣某言伏奉恩制以臣為揚州大都督府長史光寵載臨震悸交集臣某誠惶誠恐頓首頓首死罪死罪臣蒙蔽有素非陶染所移磨礪無成豈鑽仰能及斯並久塵聖鑒不逮更伸愚款陛下降猶子之愛忘具臣之譏乘以軒車佩以璽綬射榮席寵瞻歲月而徒深結課疇庸在涓埃而莫取何曾不外慙赤紱內負素餐是以前布腹心辭禁衛之重後竭誠懇歸殿省之榮豈欲娛志養高實願遺身體國不謂聖情重疊恩旨綢繆更錫隆章重紆顯命刷燕雀之毛羽求其奮飛飾駑駘之銜轡徵其滅沒雖願盡智力而終難勉強陛下宵衣待旦仄席思賢必欲無曠庶官克諧共理臣智慙一割政乏四科豈足以恭副虛求宏宣美績況三楚舊壤一都之會永言作鎮匪易其人伏願遵尚德之彞躅杜推恩之妄舉以公滅私才授職則武皇得士不慙於曩歲文王能官復在於茲日無任慙悚之至謹詣朝堂奉表以聞臣所讓人具如別狀臣道力言臣叨緣幸會謬奉渥恩隨竹替笏之九班列山河之三土王言如綍敢不欽承人好惟星願披誠款道力本厭囂滓夙耽間曠潛形草澤不將皋鶴並聞浪性雲霞惟慕海鷗相狎十步徒歡於飲啄一官匪尚於榮華幸屬聖期謬回天獎承軒冕之賜列是樊籠踐繩墨之途更成維縶尺鷃但慙於鍾鼓鶢鶋空費於牲牢故欲瀝膽輸肝披誠進款倘蒙却收匪服改命如絲不以尸曠之交免其負乘之責則物情輿論誰不謂宜如將衆例難違微功必敘仍優附鳳之賞遂假濡鵜之衣則望賜以官名還其道服仲虞懷八座之祿未入朝廷之推列五等之封尚居山藪所冀資此俸秩永修齊供庶玉清垂貺增寶祚於三元金籙開祥固珍圖於萬劫上隆紫極之統下遂清溪之遊在於微生實為幸甚道力昨巳陳請未蒙處分重此干祈伏增戰越道力誠惶誠恐頓首頓首死罪死罪謹言臣妾言伏承聖慈以妾居處褊狹欲開拓宅北更起新第恭聞睿旨不勝慚惕陛下骨肉之愛天至而溟深敦敘之風日隆而月厚乃復推心連萼結念同胞方欲廣沁水之庭除增常山之版築雖殊恩曲獎惠澤實浸於肌膚而妨公害私謗訕恐盈於道路況臣妾承靈天妹藉寵王姬輿服亞於椒宮土田方於茅社甲第之當衢向術並列三區別廬之帶水連山將盈萬畝深埒則可乘騏驥高樓則惟待鳳凰常憂瞰室之易災實懼滿堂之難守寧可更求輪奐別構崇深擾閭里之氓黎傾國家之府藏且鬼神所福常矜於缺隅賢聖垂針必誡於豐屋孫叔辭良沃之土晏嬰求湫隘之居妾雖愚蒙頗聞訓典實願歸師老氏以止足自防仰慕周公將逸豫為戒但希安分於容膝非敢攀榮於潤身且坊為要衝地當貴里畝賃二三十貫居人四五百家奪其近市之門閭生其破家之怨讟雖下人之不語豈愚妾之能安又妾之平生每存捨施屈身濟物心所願為益己害人情豈能處今麥苗雖盛穀價未豐家少糧儲人多菜色但可勸耕耘之業未宜興土木之功伏乞俯察愚誠傍詢衆望體東作之尤要知西第之非急收茲霈澤惠被黎蒸則天下蒼生孰不欣幸無任悾款屏營之至謹遣某官詣朝堂奉表陳請以聞謹言臣妾等言妾聞賢相防微杜盈門之車騎通人酌損忌滿堂之金王尚子平之讀易富不如貧孔宣父之立言奢也寧儉永言故實此為明鑒妾等並承靈坤載荷蔭中樞或天妹申慈忝扶桑之瑞萼或王姬藉寵竊襛李之奇秀開沁水之園苑賜常山之湯沐榜懸金字分衢離巽之宮路夾銀河並列星辰之位通祕籍於龍廷之內枉仙輿於鳳樓之下殊私曲獎以日而繫年縟禮崇徽夸今而邁昔兼復別隆朝旨猥存家務輿臺供隸之衣食棧廣既豢牢之秣養並回中府俱出大農聚終歲之儲但憑絲紱供闔門之費不煩機杼仰祗鴻澤退省微躬生以地高徒竊雲霄之幸寵非德進曾微纖芥之勞何義而虛受渥恩何功而謬延賞賜是用每積慙悚常憂顛沛敢忘周公逸豫之誡深念老氏止足之言乞留聖慈俯鑒愚懇使榮無過㥏滿不至溢國邑田租之常料既巳豐殷馬牛陪隸之雜供並希停減庶得無耗府實稍清朝謗長轂遠馭不逢於致寇之人高門洞開無怯於害盈之鬼不任兢悚愧懼之至謹遣某官詣朝堂奉表陳請以聞臣某言臣聞善則歸君臣之報主功推於父子所榮親臣本愚賤幸承門閥擢自弱齡得尚公主耀宗榮黨何巳七疑十年成名效能曾未之有得是以昧死旒扆陳情控告臣某中謝臣聞隱情而言不吐者事君之罪人心孝而迹未行者事親之逆子臣擢自泥滓起登上第受國之寵負親之恩情所隱而言未吐者敢奏於今日臣門閥少薄冒因遺緒父叔昆弟忝列朝班惟臣一身特拜都尉然駙馬之位因天所封寺卿之階何功受賞富過宗祖榮過棠棣無德而祿將何以堪臣父正議大夫前太子少詹事臣居士夙預周行早規陳力頃以天波溥洽許順懸車然朝命先霑巳三十載纍年效職復十數遷金紫末階爰從致仕桑榆尚早實願榮班臣亦何人獨多勳賞臣聞父子罪不相及而官獨踰於父雖爵因天假不限高卑而官入私門自多伊愧每用責躬晨省靦面朝端臣子之情祗所不忍伏乞以臣在身三品并見在進讓臣父本品降賜於臣貴得秩祿相次承寵朝聞夕死實所甘心伏願陛下容臣恭讓允臣愚懇非直聖朝高孝理之風抑亦微臣盡為子之道臣禎等言臣聞謠誦必採而風俗可觀舞咏既陳而德音不泯伏惟金輪聖神皇帝陛下金口屈道璿樞正辰慶徽號於法宮撫懷生於淨國元猷再闡紫極重光天地合德而同休黎氓改視而易聽萬方欣戴百寮抃舞臣等備列下藩豫承大慶三年入計行趨玉帛之禮五日賜酺即奏雲天之宴覩光靈之赫奕接恩貺之綢繆酬報何階空誓心而銘骨嗟嘆不足遂抽毫而授非效狂而貢斐實有感而求音同盍各於二三冀揄揚於萬一并題序引式光鴻造雖戴天辨日誠不窺於兩童而講德陳詩庶無慙於四子不量踈野輕敢薦聞繕寫畢功進上如別擊轅之陋輒簉響於雲門化草之微遂馳光於日谷旋顧庸鄙追增悚汗臣禎等無任云云臣某言奉墨敕令臣家所有書法並將進來但臣家書法屬隋季亂離並多墜失臣十代再從伯祖羲之書先有四十餘紙貞觀十二年太宗文武皇帝購求遺跡臣亡父先臣私直並將奉進一不敢留今之所存惟有一卷并臣十一代祖導巳下書一帙十卷謹隨狀進上但臣弓冶不嗣堂構缺然雖奉納楹多逢壞壁亡失之外所餘無幾私珍緹襲方遺子孫不謂兩曜回光九霄俯聽曲延採拾遂登旒扆使千載遺寶重增於光價九泉深隧更奉於恩渥寵被私門榮霑異代懷恩慕遠感佩兼深臣方慶誠惶誠恐頓首頓首死罪死罪謹言臣某言臣家有齊帝臨軒圖是南齊袁倩下手所畫私門傳寶以為妙絶伏惟聖情兼尚睿鑒旁周稽古軼於虞聰幽求過於魏覽萬幾多暇百代可知或厭遊娛儻存觀省臣暮年多幸得奉休明竊謂珍奇無容隱默近從京宅取到不獲早以上聞今謹詣闕隨狀奉進輕塵旒扆伏用慙惶屏營之至臣某言臣聞五氣殊方元龜列於元武四靈異稟神蔡遊於紫泉用能藏往知來發祥祚聖大禹之永終天祿文薦九疇隆姬之乃命帝庭兆成三吉永言祕寶録存縑伏惟金輪聖神皇帝陛下蘊靈沙劫屈道璿樞推正覺而御彞倫宏大悲而撫㣥俗雲行雨施之澤下漏三泉春生夏長之仁曲成萬物恩洎草木惠覃飛走天澤感氣而延和神靈應德而呈瑞伏見所部錢塘縣人聶幹於市內水中獲毛龜一枚修尾長頭元甲緑毳名掩於楚宗狀奇於靈繹雖六眸在首未足尚其禎祥五色成文詎能齊其詭異伏叢蓍而自久下芳蓮而暫出美兼曠代休踰㣥祉謹案孫氏瑞應圖曰王者德澤湛潰漁獵從時則靈龜出禮含文嘉曰內外之制各得其宜則山澤出靈龜陛下解網收宏天地之大德創制改物窮帝王之能事宜其膺受冥貺克享珍符且益有十朋表賢才之入用壽踰千祀彰聖歷之無疆嘉祉不召而自臻乾象無祈而潛應臣謬當重寄親奉洪庥靈異爰臻既駭於常觀抃舞胥屬實兼於恆品無任慶躍之至臣晉卿言昨於宿羽亭子園內捉得赤觜山鵲一枚其鳥有三足中足有五指近人相託爪上有毛儀觀非常精彩特異雖貌在禽類而名高羽族鮮毛孕碧徑觜含丹三足呈休與黔烏而比孝五指為瑞共白麟而同德填河未足方其美繞樹無以儷其珍故使緑衣翠襟羞言辨惠藻翰錦臆憚稱奇偉將明天子之德遂入虞人之羅自非睿感潛通禎符顯應豈能殊祥畢湊異物咸臻曠千古而難逢超百王而獨異臣謬參簪笏忝列葭莩抃躍之情實倍恆品無任喜慶之至謹奉表稱賀以聞其山鵲謹隨表同進臣某言臣昨輕率愚下進瑞牛一頭今蒙恩賜良馬一匹伏惟陛下道超萬古化穆三神故得天壤薦成幽明歸奉植物動類變形質而呈休羽族毛㣥革音容而表貺萬為盈數化成於大武之元白者粹文煥炳於純離之畜斯乃自天靈命曠代殊祥實上聖之元符在微臣而何力猥蒙宸獎曲被皇慈移滅沒於帝間降權奇於御皂漢宮流赭遂出於玉臺軒后飛黃俯回於馳道豈直衣冠同羡固亦妻子相驚臣亦何人冒斯殊寵惟當附茲驥尾希自勵於疲駑託此龍媒庶長承於驅策無任悚戴之至謹奉表陳謝以聞臣某言聞京兆萬年縣大寧坊宅內有桑樹一株暮秋生子初冬椹熟今謹取得專輒進奉伏惟陛下惠覃區宇仁洎草木故得神蠶之樹發秀於寒露之辰帝女之林結實於繁霜之下出於萬年之界彰一人萬歲之符生自大寧之坊表㣥生大安之慶鴟梟巳革見夷貊之懷音絲繭行豐知府藏之逾實殊禎荐委絶貺仍臻凡在含生孰不欣慶無任抃躍之至謹奉表陳賀以聞臣禎等言臣聞式宴為歡易著需雲之象晞陽展敬詩有湛露之歌伏惟金輪聖神皇帝陛下功掩大千化高明一憑五乘而馭㣥品秉六度而宏萬機俯順人心仰膺佛記尊名大號與日月而齊光凱澤歡酺共雷雨而俱作舞詠溢於三界聲名殷乎四天臣等備守外藩幸欣入計聸衢路而躑躅望闕庭而悚躍歡情未展空思側辨之娛聖造不資仍賜合醵之禮三元告始萬品惟新陽進而君道載昌景延而聖壽彌固具寮稱賀率土同欣願申在藻之心輒效獻芹之志謹上禮食五十輿具如別狀和殊九沸美異八珍有慙殷鼎之滋豈益堯廚之膳輕薦蔬菲追增悚怍臣禎等誠惶誠恐臣某等言伏以壇場既畢文物惟新寰區被雷雨之恩宴樂動雲天之曲元髫黃髮式舞遍於康衢車馬衣冠追賞窮於勝境聸鳳闈而列鼎抗龜浦而開筵風光滿佳麗之城煙霧上神仙之閣傾罍倒斚盡百辟之歡娛伏檻憑軒延九霄之眺矚五日開十旬之賞千齡逢萬歲之期固以慶軼朝門抃深天造無任喜躍之至謹上禮食若干輿不恥獻芹之陋方期在藻之歡旋顧單菲追增悚怍臣某言伏惟陛下至德動天深仁被物光輝格乎上下神化行乎中外故能使明祇叶贊景貺駢臻承靈命於九元錫禎圖於萬祀高秋在律重九御辰陳法駕而展皇儀升紫壇而奠蒼璧欽告類之典盡祗敬之容咸秩㣥神允釐百福然後玉鑾回軫金鈸戒塗發雷雨之恩私展雲天之宴樂百寮竹替笏承愷悌而沐沈濳四海氓黎欣復除而荷優貸瑤圖載永鼎命維新抃舞同於十方歡娛邁於千古臣謬當維翰忝屬葭莩敢申慶躍之情願奉宴私之澤謹上禮食若干輿野人何識徒致誠於獻芹天獎曲成倘俯歡於在藻無任區區之至謹昧死奉表以聞臣誠歡誠喜頓首頓首謹言臣攸寧言伏奉恩制起臣為春官尚書曲降芝泥俯收草土承命哀震扣心號絶臣攸寧誠惶誠恐頓首頓首死罪死罪誠孝莫紀咎殃所鍾過隙永辭倚閭奚望不自灰滅偷視光陰尚何心靈得齒人類陛下愛結敦敘慈深宴逸免之苫塊錫以衣竹替葭莩之恩飲澤誠厚荼蓼之戚胡顏以寬況天地同節宗伯是經尊卑共儀達喪有典使臣外掌邦禮內虧庭訓何以奉宣名教克弭訕謗臣之愚蒙夙夜揆鑒平居疇日廢職曠官況識亂匪莪情荒植柏寧可儀刑八座損益萬機虛玷元猷上穢清鑒伏冀哀其窮懇惠以至德用伸犬馬之願獲遂烏鳥之情則地義所宏彌文於永錫人倫所詠實光於孝理無任荒迫之至謹奉表陳請以聞臣攸寧誠惶誠恐頓首頓首臣嶠等言伏以靈駕遵途聖恩攀從國計非便㣥臣不安冒昧上祈未蒙哀允跪對還旨載深惶惕臣嶠等中謝臣聞古者天子上法天心不極私情違衆欲以順人理國為孝以克已制心為禮是故凡聖異禮公私殊制私心獨展凡人之孝也萬姓咸若聖人之孝也陛下行堯禹之事以萬姓為心奈何守曾閔之節懷獨展之願臣等囂囂竊所未曉且永淳巳後關輔流散近適旋定人猶未足今山陵起築役徒惣萃彌春涉夏為費宏多若陛下此行㣥司畢從於人取給臣實難之水旱小農慮非淺東都則水漕淮海易資鹽轂之蓄陸走幽并近壓戎夷之便朝命新復人望安在宜應靜鎮未可移動陛下若俯順㣥願留撫都人則其安如此若不勝私情攀奉靈駕則其慮如彼況扈從兵馬既不豫集行宮廩蓄又未先備發期俯邇支計闕然倉卒敦迫必不敢辦若待陵寢安厝霜露終感三農歲稔萬乘時巡奉郊廟以展虔聸日月其何遠今固將抒私戀棄㣥言忘人力蔑國用此實非陛下安集新業之故亦非先后憐憫遺人之意且朝廷故事典章猶在獻陵追遠太宗不至於三元昭陵上遷高宗不至於九嵕豈先帝私懷不堪故事㣥臣公議之所奪也伏願仰遵舊訓顧定新基屈至情而順㣥心抑小節而成大孝使軍國長算函洛皆安邦甸窮人賦斂少減萬姓翹望實深至願百寮結誠期於死請無任悲迫之至謹詣朝堂奉表固請以聞臣嶠等言臣聞天下皆春而燕谷有析一作祈暄之律日中並照而彭澤有隨陽之禽豈非承光飲和仰德延慶深於戀者其往若不親渴於求者其來如不足以圭表既宅關河馳怨思之誠鑾和未巡樊鄧切謳歌之慕帝車北指宸駕西臨槐檀聿歷於四時綪茷猶淹乎八水耆老延頸竹替裾企望戴天有分徒嗟京兆之遙捧日無階竊恨長安之遠臣嶠等中謝伏以載祀七百卜年非豐鎬之地乘時九五啓聖由瀍洛之鄉所以受龍圖龜書所以朝雨師河伯叶祥符於讖籙採謀議於人鬼萬靈幽贊百物阜昌是曰天地之心實興帝王之祚方使四夷為守西賓屈無外之談六合為家東土壯居中之業況復圓丘方澤神祇之兆域以安復廟重檐昭穆之尊卑既敘定社而立稷建邦而設都是萬年長王之郊誠億載不遷之宇寧可久曠中壤即安偏據詠山河於漢舊訪宮室於秦餘五載時巡曾無告至之禮四方述職仍以不均之患臣等庸愚竊所未達今三秋告稔萬寶巳成陰陽所和稼穡遍茂却連澤潞汾曲敘廟疑荊揚海隅萬庾同殷千箱並詠禾萌九穗未曰休祥穀石五錢詎名豐穰加以舟車並湊水陸交衝物産尤多觀聽胥悅衆庶有來蘇之冀神靈翹望幸之心伏願陛下俯察氓謠仰祗天意因銅省疑之稔歲命玉鑾之仙軫涓時擇日屯萬騎而出函秦省俗觀風撫四人而還鞏洛逍遙乎九阿之阻容與乎八表之路回輿駐蹕觀十月之圃場闢纊凝旒問百年之疾苦然後歸格造乎九廟明堂衆星拱列長居辰極之尊萬㝢駿驅載詠朝宗之府光輝將日月齊殷德澤與江河比潤致乾坤之景福盡億兆之歡心凡在人祇孰不欣幸臣等限以所守不獲親詣闕庭無任區區之誠謹附洛州奏事使朝議郎行洛州司兵參軍盧正言奉表陳請以聞臣及善言臣愚款頻薦心隨言盡而睿旨彌隆禮以恩酬固辭則成命有廢勉進則私情不堪惟此憂惶坐交冰炭臣及善中謝臣志均駑馬知眷戀於軒櫪生比瘣木懼零落於風霜思十駕之驅馳迫四時之代序辭稻粱之惠寧是宿心乞桑榆之年但緣量力昔者主父未達常健羡於陳鼎孔某遭難每殷勤於執鞭或排擯於中朝乍栖遲於列國況臣叨恩竊幸非待營求尸祿效官不假才藝獲當年之榮貴無曩世之艱虞豈應輕物傲時薄優游之寵官陳辭抗疏循耿介之名節直以頽齡向盡衰疹踰加二首六身甲子催其歲月百骸九竅寒溫煎其骨髓無仙童之却老有災豎之侵年志力昏沈精神耗竭心巳迷於方寸目久暗於元黃鳩杖扶危且猶不逮鵷池養望孰云非罪竊畏衆多之口顧思庸短之纍昔之少壯猶不如人今也耄期詎堪經國是用披肝蹐地拜手祈天方登月制之辰庶免夜行之咎言非飾請理實誠陳陛下厚眷殊私尚留陪於竹替屨老臣餘喘微息終絶望於軒墀空荷不資之恩實無自強之地伏望俯矜疲劣微賜含容免其折鼎之憂假以懸車之樂倘殘骸未擯尚齒不遺猶望俎豆几筵接虞庠之庶老歲時朔望陪周行之末班更得拜奉官闈聸覩日月則生涯兼足死將不朽伏蝸廬而獻款仰龍闕而翹魂心往形留授增欷無任拙疾衰老戀慕屏營之誠謹遣息清廟臺主簿溫重詣朝堂奉表陳情以聞臣某言臣以相王旦發彩璿萼承流寶派雖班彞錫瑞既同於伯叔之封而食菜苴茅不逮於子男之國敢緣敦敘之義輒獻由衷之誠而葵藿傾心徒希皇矣之鑒雲霄絶望不流霈然之澤惝恍如失徘徊增佇臣某誠惶誠恐頓首頓首死罪死罪臣聞命以車服錫之土田實將共安邦家永固宗祏炎漢之開藩樹屏廛閈七十城隆姬之書社建侯封疆四百里故知業隆者基大本盛者末豐涯涘濶而潤澤深枝條繁而庇蔭遠伏惟皇帝陛下握河開歷截海凝圖化帛丿糸於商夏之朝地廣於唐虞之域裁舊典之損益補前王之闕漏萬官咸事百度以貞雖穆穆之風具宣於政理而親親之道或廢於挹謙至今骨肉禮薄藩維業曠曲阜之特高才藝仍減附庸平臺之深篤孝慈僅留湯沐徽章空列於五等祿秩不踰於九命曦舒兼曜之德久被於寰中雲雨曲成之恩翻遺於膝上異強幹弱枝之道違先親後踈之意非所以上宗王室下睦帝姻況天垂後星承髮膚者蓋鮮卦膺習坎奉晨昏者非衆荷圓穹之寶覆藉厚載之珍腴若令寵數不加等威無辨便是卑萬乘之尊蔭闕四海之遐聸蠻貊荒陬猶知不可衣纓士庶孰謂其宜伏念天倫深惟國體情實存於天道理不涉於私求伏願曲降聖慈俯收愚懇愜久遠之大義抑沖撝之小節疇咨故實申命有司劃以山川優其井賦剖符開國依希魯衛之親盤石居宗髣佛應韓之躅明鳲鳩均養之惠慰鶺鴒同氣之心使麟趾式安犬牙愈固則洪恩所被允及於萬方靈貺所覃豈惟於九族無任悃款屏營之至謹遣某官某奉表陳請以聞妾某言妾生涯有緣仰繫皇極孝行無感上傾乾蔭號天罔極扣地不追集蓼崩心茹荼泣血自攢開東洛紼下西秦氣朔遄移光靈浸遠怨晨昏之易隔悲節敘之難留舉目摧傷觸途殞裂今橋山巳祔灤水還封二曜停臨九天絶仰慟遺弓於此日思稅駕其何年追想平居永惟曩載粵自襁褓迄於成立鍾慈結愛殆欲蒙攜於掌中色承顏何嘗暫離於膝下方倚南山之固長承北極之尊豈圖就養之歡遽乖於扇枕問安之地翻類於過隙念凶妨而自咎思顧復以何酬所冀扶杖墳塋結廬山隧聸奉觴奠依憑園寢終三年之禮企及通喪轉一切之經庶邀冥福上以資未來之果下以攄罔極之心伏惟陛下孝通神明仁洎草木乞體荒疚特垂憐許使烏鳥微志獲與耘禽致哀犬馬孤誠得從耕象申慕則窮喘無恨餘生知幸無任哀切之至謹附使具官某奉表陳請以聞沙門臣某等言竊聞加隆園寢漢道以光潔誠宗廟周卜惟永斯但禮極崇奉事昭嚴配未能尊揚七覺酬顧復於前生幽贊三途樹津梁於後劫伏惟聖母神皇陛下中天構極截海凝圖懸法日而貞觀泛慈舟而利涉天經地義之德率禮因心奉先追遠之誠宅緣證果宏濟深於冥境薰修入於梵門天子之孝感陰陽而通鬼神聖人之心刑萬邦而被千祀乃者深發睿思永懷遺躅襜帷轍跡之所盡建寶坊南北東西之域咸修法宇佛剎周於天壤寺名因於國號自崇陽改諡奉明增邑雖配天盛典巳革於常數而淨境大名尚題於舊額是以稻麻衆侶葵藿微心願宏金石之名思降瓊瑤之札愚言聖擇已蒙昭許日往月來未遑迎致今望以九秋嘉節七月良辰當蓂莢之初滿屬盂蘭之始獻勝幡香蓋延寶字於金門法鼓天花奉鸞書於象闕俾夫道路聸仰虛空唄讃高懸銀榜豈惟天地之宮列署瑤房遠邁神仙之宅某等或枌榆故社或桑梓舊京謬參龍象之筵豫奉衣冠之列白雲千里聸帝鄉而極目朱門九重望宸陛而延首倘皇慈曲被人願不違則八部式歌四海知幸無任懇佇之至妾獨孤氏言妾早罹艱罰終鮮急難門構傾頽宗緒斷絶零丁在疚微眇何依賴母氏劬勞顧存鞠撫漸離尫瘵以至成立犬馬含識烏鳥有情空懷返哺豈曰能養枯鮮何幾隙駟不追劈地扣心仰天泣血應門乏五尺之嗣當室無三年之主衣衾之舉誰則始終奠酹所存實寄惸眇今日月斯邁龜策告期將安窀穸或從遷祔妾亡祖唐右衛大將軍溧陽縣公彥雲跡參締搆功勒鼎彞亡父唐某府折衝都尉襲溧陽縣公臣某寵懋戎行嗣守藩服咸得託基橋嶽陪瘞穀林杜氏階前雖云非古齊君牖下義彰自昔儻蒙返魂舊塋合骨先壟則存沒榮幸幽明感戴妾百罹兼至六極備嘗雖送往飾終無資石槨之厚而傾家破産不贍塗車之費先臣苴茅舊封食菜遺業頒諸同族散在別房相彼誓河事憑先德永言書社宜奉大宗伏望哀此孤微惠以絲紼回一歲之邑入助千齡之宅兆豈惟裒多益寡有叶典經固亦勸義篤親實允觀聽妾生輕茨藿地接葭莩承夏禹之致孝屬唐堯之敦敘荒情謬款輕敢上祈天造曲成儻蒙哀遂無任窮懇之至謹詣朝堂奉表以聞穢黷冕旒伏增戰越臣某等言臣某沐道昌期承榮休歷或叨恩獎擢謬隨州縣之班或收拙罷歸行戢邱園之影徒懷闕庭之感終絶雲霄之望不謂幽誠上達卑聽下臨太陽之暉遠鑒於傾藿油雲之澤俯潤於纖荊俱延鶴板之恩遂忝龍闈之召雖秦君入夢暫喜登天晉士披心長祈捧日豈足方其榮幸匹此歡泰今三軍凱入邊境廓清五室恭禋靈祇配享介胄承策勳之禮衣冠陪執豆之儀萬辟同趨百蠻在列有識搖心而竊抃含靈廓背而延頸臣等鞠躬天闕待命帝閽馳心目於九霄隔門庭於萬里企悚之至徘徊罔極伏望俯垂矜察曲賜參陪使得接影蹌蹌充鳥獸之前列隨肩濟濟望夔龍之後塵則夕死朝聞有欣於服道千齡一遇無憚於灰骨不任延佇企悚之至
