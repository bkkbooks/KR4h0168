front:
  text: 全唐文欽定全唐文卷三十一元宗十二
  hash: sha256:a501f67402107690f7d4bd0a9bcbdc7b4e802c25879795df5a879015cd898a38
body:
  text: 王者經略以正區夏武夫干城式固封域將以戢兵禁暴安國庇人朕所以選擇忠良鎮守疆埸念踐更之役有徭戍之勤備以武守示之威惠故得夷狄款附靡然順風九有晏如四方無事雖備豫之誡不可暫闕而鰥煢之徒思有矜憫其天下諸州鎮兵募及健兒等或年月巳久頗亦辛勤或老疾尫羸或單弱貧窶或親老孤獨致闕晨昏言念於斯深用矜嘆宜委節度使及軍州擇有如此色一切放還咸宜精審以稱朕意致理興化必在得賢強識博聞可以從政且今之明經進士則古之孝廉秀才近日以來殊乖本意進士以聲韻為學多昧古今明經以帖誦為功罕窮旨趣安得為敦本復古經明行修以此登科非選士取賢之道也其明經自今巳後每經宜帖十取通五巳上免舊試一帖仍案問大義十條取通六巳上免試經策十條令答時務策三首取粗有文性者與及第其進士宜停小經準明經例帖大經十帖取通四巳上然後準例試雜文及策考通與及第其明經中有明五經以上試無不通者進士中兼有精通一史能試策十條得六巳上者委所司奏聽進止其應試進士等唱第訖具所試雜文及策送中書門下詳覆其所問明經大義日仍須對同舉人考試庶能否共知取舍無愧有功者達可不勉與宰輔之任在朕心亦既同德是為一體其有惡直醜正以私害公結搆讒慝圖議離閒隳我軌度莫甚於斯御史中丞盧怡纍登清密爰委繩準宜遵國典以正朝綱而乃妄起猜嫌輒為朋黨交通小吏傾側大臣潛求罔極之言欲陷無辜之善雖浸潤之譖縱盈篋而不疑而回邪之端若燎火而難近宜從遠貶以戒具寮可潮州司馬員外置且清淨者政之本和平者國之福朝多君子可不務乎如或妄動以干時矯舉以違道遞相好惡便作比周斯為亂常必有明罰凡厥在位知朕意焉鄂王瑤妃韋氏時標令德作配藩邸夫義巳薄婦道惟勤規誡之言無繇見納輔佐之道空竭乃誠但恭肅以奉上每柔明以撫下周旋禮度固所未聞不有家風何至於此今因罪纍例如本族有善不紀何以勸下其韋氏不須為纍自天下一統方隅底平交趾西界於庸岷流沙東洎於遼碣烽亭既廣徭戍轉增朕永念征夫無忘旰食是用懷柔悍俗賓禮戎臣降子女以適其氈裘捐繒玉以申其惠好二十五年於茲矣而情周萬㝢信結㣥蠻羌狄為父子之邦甌貊成冠帶之國海內無事邊方砥寧加以志道而一理得清心而庶務和氣來應穰歲以臻㣥生樂業而自怡有司措刑而不用今欲小康戎旅大致升平減停征徭與人休息諸方將相三事公卿宜協朕心勉成良算宜令中書門下與諸道節度使各量軍鎮閒劇審利害計兵防健兒等作定額委節度使放諸色征行人內及客戶中召募取丁壯情願充健兒長任邊軍者每歲加於常例給田地屋宅務加優恤便得存濟每年逐季本使具數報中書門下至年終一時録奏長駕遠馭事藉經久無害始慮之謀以規苟且之利緋紫之服班命所崇以賞有功不得踰濫如聞諸軍賞借人數甚多曾無甄別是何道理自今巳後除灼然有戰功餘不得輒賞近聞諸軍兵募逃喪者多儻或臨戎如何破敵自今巳後每致交兵之時令御史分住諸軍與節度使計議括奏聞隨事褒貶以存勸戒至公之用本無偏黨唯善所在豈隔親踈四從叔知政等咸有才名見推公族秉惟清之操兼致遠之資朕每慮同盟不勤於德嘗懸右職以勸其徒先委宗卿精為內舉量能考行歷載踰時名數則多升聞蓋寡光膺是選諒在得人固可擢以清要遷於臺閣將觀志於七子冀齊名於八人宜各悉行佇聞成績書不云乎九族既睦平章百姓冀繇內而理外必自近而及遠凡今懿戚可不慎歟違道慢常義無私於王法修身效節恩豈薄於他人期於率先勵我風俗深宜自勉以副明言周公聖人攝行王政誡伯禽曰無以魯國驕人朕方聖雖慙豈忘誡子聊示廷訓何足以宣布中外耶大河南北人戶殷繁衣食之原租賦尤廣頃年水旱廒庾尚虛今歲屬和平時遇豐稔而租米所入水陸運漕緣腳錢雜必甚傷農務在優饒惠彼黎庶息其轉輸大實倉儲今年河南河北應送含嘉太原等倉租米宜折粟留納本州河東陝運兩使每年常運一百八十萬石米送京近巳減八十萬石訖今據太倉米數支計有舒務在息人不欲勞弊其今年所運一百萬石亦宜停同華兩州精兵所出地資輦轂不合外支自今巳後更不得取同華人充兵防卿文勒石誠為可重故令兒子題額及陰何所發揮而勞致謝毬場宴樂咸睦深慈豈伊斐然少能申寫卿為宗子欲名教有歸記之史冊亦隨卿意官之為法法有其官寄以深仁能行禁令日者叢棘之地烏鵲來巢今結諸刑名才逾五十雖化源自遠亦欽慎使然其鄭少微等一十七人各賜一中上考仍兼賜少物以存勸賞屯官敘功以歲豐凶為上下鎮戍地可耕者人給十畝以供糧方春令屯官巡行謫作不時者城之還我乃復其初天意神心自常幽贊克濟軍旅湧出雙泉不假梅林有過疏勒編諸竹帛任卿意焉禮貴正名法無虛美朕以薄德嗣守丕圖常恐不逮安敢自足今㣥嶽稱引衆善勞加榮號聞之增惕奚可當仁惟聖與文焉得輕議況太宗睿宗俱稱聖諡豫末小子安敢同之宜斷來表古之聖王先禁左道為其蠧政犯必加刑至如占相吉凶妄談休咎假託卜筮幻惑閭閻矜彼愚蒙多受欺誑宜申明法令使有懲革自今巳後緣婚禮喪葬卜擇者聽自餘一切禁斷宏我王化在乎儒術能發揮此道啓迪含靈則生人以來未有如夫子者也所謂自天攸縱將聖多能德配乾坤身揭日月故能立天下之大本成天下之大經美政教移風俗君君臣臣父父子子人到於今受其賜不其猗歟於戲楚王莫封魯公不用俾夫大聖才列陪臣棲遲旅人固可知矣年祀寖遠光靈益彰雖代有褒稱而未為崇峻不副於實人其謂何朕以薄德祗膺寶命思闡文明廣被華夏時則異於今古情每重於師資既行其教合旌厥德爰申盛禮載表徽猷夫子既稱先聖可追諡為文宣王宜令三公持節冊命其文宣王陵並舊宅廟量加人灑掃用展誠敬其後嗣褒聖侯宜改為文宣公至如辨方正位著自禮經苟非得所何以示則昔緣周公南面夫子西坐今位既有殊坐豈依舊宜補其墜典永作成式自今巳後兩京國子監夫子皆南面坐十哲等東西列侍天下諸州亦準此且門人三千見稱十哲包夫衆美實越等夷暢元聖之風規發人倫之耳目並宜褒贈以寵賢明顏子既云亞聖須優其秩可贈亠兊公閔子騫可贈費侯冉伯牛可贈鄆侯冉仲弓可贈薛侯冉子有可贈徐侯仲子路可贈衛侯宰子我可贈齊侯端木子貢可贈黎侯言子游可贈吳侯卜子夏可贈魏侯又夫子格言參也稱魯雖居七十之數不載四科之目頃雖參於十哲終未殊於等倫允稽先旨俾循舊位庶乎禮得其序人焉式瞻宗洙泗之丕烈重膠庠之雅範布告中外咸使知聞道可褒崇豈限今古追贈之典旌德存焉夫子弟子十哲之外曾參等六十七人同升孔門博習儒術子之四教爾實行之親奉微言式揚大義是稱達者不其盛歟欽若古風載崇元聖至於十哲亦被寵章而曾子之倫未有稱謂宜亞四科之士以疏五等之封俾與先師咸膺盛禮頃欲渭北近遊夢中有命神不守職事不可行出必有名何容易也賴元聖垂告靈應果然朕夙夜驚懷福慶斯在春秋記異況在此乎所請宜依不離於精不離於真以天為宗以道為門兆於變化謂之聖人吾祖也太上元元皇帝嘗從事於斯矣惟穹昊厥初則配神明饗天地育萬物惟皇受命則師列辟熙以大一利澤施於四海不言所利德教加乎萬姓不稱其德將晦迹也安乎守藏柱下將行道也適乎流沙罽賓所謂神無方而道無體沖用可見矣流長者慎其源蒂固者深其根猗歟那歟克開厥後翳我列祖光啓大中豈元元私乎有唐惟元元邁乎種德豈元元式受唐命惟元元存乎其人是以纍聖緝熙重光纘茂大化漸被乎八表淳德殷流乎萬國則與天地有與立焉惟小子多於前功夙夜敬止上承祖宗之餘慶下膺侯王之樂推惕然深居凜若馭朽以為道德者百家之首清淨者萬化之源務本者立極之要無為者太和之門恭承垂裕之業敢忘燕翼之訓故詳延博達講諷精微求所以理國理身思至乎上行下效亦云久矣夫使天下萬姓飲淳德食太和靡然回心而向道豈豫寡薄獨能致此蓋凡百在位所以咸熙書曰元首康哉股肱良哉又曰股肱惟人良臣惟聖斯一德而共理也豈至於今盩乎昔長纓紫衣猶聞慕向廣眉高髻且云變俗何至道之難明而元珠之久喪古人有云王者之於天下猶一堂之上也蓋謂同心同德化流四裔是誠在乎擊豕垂踵之惑革面向隅之哀故往年布令各家藏道德冀德立而風靡道存而日用則朕之承祖業尚家書出門同人無愧於天下矣易曰象也者像此者也經曰窈冥中有精則窈冥之精可以尋象求不可以名言得也故考圖史凡聖祖降代出處之迹敢立象以盡其意焉將自家而刑國由中而及外也庶乎知道者盈量而歸迷方者不遠而復云蠧政之深左道為甚所以先王設教犯者必誅去其害㣥蓋非獲己自今巳後輒有託稱佛法因肆妖言妄談休咎專行誑惑諸如此類法實難容宜令所在長官嚴加捉搦所聞不如所見故引卿等觀之頒示寰中俯依來請兩殿巢禽其義一也但有慙德深謝仁慈頒示四方隨卿所請如聞徐泗之閒絲蠶不熟雖庸課巳納慮百姓艱辛今年地稅特宜放免先聖文宣王春秋釋奠宜令攝三公行禮著之常式古之送終所尚乎儉比來習俗漸至於奢苟炫耀於衢路復何益於泉壤又凡庶之中情理多闕每因送葬或酣飲而歸及寒食上墓之時亦便為宴樂在於風俗豈成禮教自今巳後其緣葬事有不依禮法者委所由州縣并左右街使嚴加捉搦一切禁斷其有犯者官人殿黜白身人所在決一頓凡士庶人不兼二業或有衣冠之內寡於廉隅專以貨殖為心商賈為利須革其弊以清品流有犯者委京都御史臺及諸道採訪使具以狀聞當別處分宣布中外咸使知聞朕所求才待之若渴既旌於巖穴亦賁於邱園片善必收冀無遺逸然士人藏器衆何以知豈若父子之閒自相推薦昔祁奚之舉祁午謝安之任謝元良史書之咸以為美賢彥之士何代無人寧限嫌疑致有拘忌其內外官有親伯叔及弟兄并子姪中灼然有才術異能風標節行通間政理據資歷堪充刺史縣令者各任以名薦其卑官所舉人聽於所繇長官處通狀一時録奏其考試通人任用之後如後有虧犯典憲名實不相副者所舉之人與其同罰如政績著聞終始廉謹為衆所知者其所舉人與其同賞夢之正者是謂通神於惟聖容果以誠應豈朕德所及而大道是興再省神靈言猶在耳將貽福業代紀彌多初告以行宮乃置於內殿兼之大慶允屬朕躬稽之道經以茲為寶當慈育萬姓永答神明卿等宗臣宜同朕意願揚嘉應安敢讓焉三皇之時兆庶淳朴蓋由其上以道化人自茲厥後為政各異我烈祖元元皇帝稟大聖之德蘊至道之精著五千文用矯時弊可以理國家超夫象繫之表出彼明言之外朕有處分令家習此書庶乎人用向方政成不宰慮茲下士未達微言是以重有發明俾之開悟期弱喪而知復宏善貸於無窮兩京及諸州各置元元皇帝廟一所每年依道法齊醮兼置崇元學生徒於當州縣學生數內均融量置令習道德經及莊子文子列子待習業成每年準明經舉送至省置助教一人委所由州長官於諸色人內精加訪擇補授仍稍加優獎大道混成乃先於天地聖人至教用明其宗極故能發揮妙品宏濟生靈使秉志者悟往迷方者知復以此救物故無棄人其孰當之莫若我烈祖元元皇帝矣朕纂承寶業重闡元猷自臨御以來罔不夙夜每滌慮凝想齊心服形禮謁於尊容未明而畢事將三十載矣蓋為天下蒼生以祈多福不謂微誠上達睿祖垂鑒頃因假寐忽夢真容既覺之後昭焉以觀瞻奉踰時殊相自然與夢相協誠謂密降仙府永鎮人寰告我以無疆之休德音在聽表我以非常之慶靈貺有期乃昊穹幽贊宗社儲休豈朕虛薄能致茲事若使寢之乃乖祗敬宜令所司即寫真容分送諸道採訪使令當道州轉送開元觀安置所在道士女冠等皆具威儀法事迎像到七日夜設齊行道仍各賜錢用充齊慶之費自今巳後常令講習道德經以暢微旨所置道學須倍加敦勸使有成益是知真理深遠宏之在人不有激揚何由勵俗諸色人等有能明道德經及莊列文子者委所由長官訪擇具以名聞朕當親試別加甄獎至如道有三寶慈居一焉欽若至言爰茲宥過天下見禁囚徒其十惡罪者及造僞頭首并謀殺故殺祆訛宿宵人等特宜免死配嶺南官人犯贓據情狀輕重事貶降餘一切免且夫愛人之義長之育之務存清淨合於易至如州縣造籍之年因團定戶皆據資産以為升降其有小葺園廬粗致儲蓄多相糾訐便被加等朕情為敦本義在勸農欲使野絶游人國無曠土安可得也自今歲巳後且三五年閒未須定戶其中或有家資破散檢覆非虛不可循舊差科須量事與降今者真容應見古所未聞福雖始於邦家慶宜均於士庶其親王公主郡縣主及內外文武官等並量賜錢至休假之辰宜以素餐用伸慶樂諸道節度使及將士等亦宜準此其兩京及諸州父老亦量賜錢同此歡宴其錢以當處官物充伊爾公卿逮乎黎獻宜勉崇元化共復淳源宣布遐邇明知朕意三載考績以鑒吏能八使觀風因求人瘼茲事體大致理之繇朕受命昊穹臨御寰夏慮乎一物有所不安遍於萬方無忘軫念而宇宙之內官吏至多倘有政失其宜即萬人受弊崔翹等或文學有稱或貞白流譽通於理道勵是公心俾爾澄清或當委寄至於黜陟之道國之所務苟有不當將何勸人頃年使臣例皆通狀其盡善者以多有請託求選調之資不善者以凡碎見輕貴奏課之數若此銜命豈副虛懷卿等所到之州宜具宣朕意其百姓閒事或有須釐革者宜與所繇長官商量處置回日聞奏其官吏中有貪冒贓私干犯名教或衰老疾病無政理者刺史巳下宜停務奏聞其守職公清為政尤異事堪激勸遠近知者具以名聞其諸道有遭損下人應須賑給先頻有處分猶慮艱弊豈忘矜恤亦宜審與州縣商量務令周濟又聞河堤穿決致有漂流諒繇州縣寬踈不時修塞亦便行處置勿使更然其天下道學固巳有置者并鄉學等此並切於生人比來興置蓋為教導各宜敦勸使有成益其征鎮之閒或有單貧老弱不自存濟者宜令所繇倍加優賞其浮寄逃戶等亦頻處分頃來招攜未有長策又江淮之閒有深居山洞多不屬州縣自謂莫徭何得因循致使如此並與州縣商量處置一時録奏卿等既當巡按受委非輕是宜勉爾良圖以副朝選無或致有回避不竭公忠朕之責成深宜自效暉素是妄庸幸承資地早升清列爰典大藩不能勵彼公心少申答效而恣其鄙識莫顧廉隅黷貨無厭蠧政斯甚或增加賦斂或減截官錢入己之贓六百餘貫自外所犯數倍於茲況又役使人工殆三十萬復有何要輒作為勞慢法徇私觸類非一朕志存撫育情切好生特寬斧鑕之誅俾從放流之典可長流富州為百姓與朕共理伊爾列城自頃以來每加優異凡在遠近固合周知豈有受恩而不盡節照鑒若此咸宜勉之無或效尤自投於網先置陸驛以通使命苟無闕事雅適其宜如聞河南江淮兼有水驛損人之費驛甚覺勞也且使臣受命速赴程期豈有自求閒安故為勞擾其應置水驛宜並停諸軍行人皆遠離鄉貫扞彼疆場動即逾年言念艱勞豈忘優恤有疾病老弱不堪鬬戰者委節度揀擇放還凡所祭享必在躬親朕不親祭禮將有闕其皇地祇宜就南郊乾坤合祭移風易俗王化之大猷掩骼埋胔時令之通典如聞江左百姓之閒或家遭疾疫因而致死皆棄之中野無復安葬情理都闕一至於斯習以為常乃成其弊自今巳後宜委郡縣長吏嚴加誡約俾其知禁勿使更然其先未葬者即勒本家收葬如或無親族及行客身亡者仰所在村鄰相共埋瘞無使暴露庶叶禮經諸道有此同者亦宜準此化之原者曰道道之用者為德其義至大非聖人孰能章之昔有周季年代與道喪我烈祖元元皇帝乃發明妙本汲引生靈遂著元經五千言用救時弊義高象繫理貫希夷非萬代之能儔豈六經之所擬承習前業人等以其卷數非多列在小經之目微言奧旨稱謂殊乖自今巳後天下應舉除崇元學生外其餘所試道德經宜並停仍令所司更詳擇一小經代之其道經為上經德經為下經庶乎道尊德貴是崇是奉凡在遐邇知朕意焉古之宗盟異姓為後王者設教莫遺其親殿中侍御史李彥允等奏稱與朕同承涼武昭王後請甄敘者源流實同譜牒猶著雖子孫千億各散於一方而本枝百代何殊於近屬況有陳請所宜敦敘自今巳後涼武昭王孫寶巳下絳郡姑臧燉煌武陽等四房子孫並宜隸入宗正編諸屬籍以明尊本之道用廣親親之化古之教人蓋有彞訓必在勸學使其知方故每月釋菜之時常開講座用以發明聖旨啓迪生徒待問者應而不窮懷疑者質而無惑宏益之致不其然歟或有凡流矜於小辨初雖論難終雜詼諧出言不經積習成弊自今巳後除問難經典之外不得輒請宜令本司長官嚴加禁止仍委御史糾察善利萬物莫先乎大道孚佑兆庶實賴於尊經朕每念黎庶無忘惠養嘗冀盡登富壽之域永無凍餒之虞所以去年具有處分令天下諸觀轉本際仙經逮至今秋果聞有歲自非大聖昭應孰臻於此宜令天下道士及女道士等待至今歲轉經訖各於當觀設齊慶讃仍取來年正月一日至年終巳來依前轉本際經兼令講說其所設齊度慶亦宜準此庶使遠近蒙福知朕意焉
