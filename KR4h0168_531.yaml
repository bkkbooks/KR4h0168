body:
  text: 伊昔炎漢功高化洪樂率土之暨阜築通天而且崇初一簣以發地終百尋以隱空構之以楩梓飾之以丹紅浮彩外爍流光內融赫兮烜兮獨出煙雲之表壯矣麗矣迥標天地之中柏梁不同井榦非匹勢岌嶷以山峙體曈曨而景軼中邃窅窕入之者當晝而居昏上跂崚嶒登之者先曙而觀日偓佺於是乎晏處安期於是乎暇逸月上壁而旁飛雲緣梯而下出粲粲彩彩靈仙兮所在若瑤臺之雲棲冠鼇山於溟海炳炳彪彪天子兮共游若瓊樓之霞蔚照龍燭於崑邱光玉樹而葱翠影甘泉以沈浮於是孝武皇帝紹祚䘏允登眺遠騁高揖八極俯窺萬井拂軒楯之宛虹步檐楹之倒影乃言曰可以臨萬國可以游九垓凡厥層構莫先斯臺窺地底以豁險羾天門以崔巍謂四夷不遐將拓跡以開統見百神咸在則祈禠而禳災既玉女之下視復金烏之上迴既而裦雲獻賦文質彬郁且曰陛下承天啟聖聿膺多福排玉戶於玉堂颺金鋪於金屋亦可以上憂宗社下恤惸獨何峻極於臺榭恣歡娛於耳目將乘奔而獨懼矧長途而中宿至矣哉斯言也我皇德循楷式帝錫純嘏儻茅茨而是陋堯何事乎光宅天下叔齊德宗時人城之西北維有山曰獨秀宋顏延之嘗守茲郡賦詩云未若獨秀者峨峨郛邑閒嘉名之得蓋肇於此不藉不倚不騫不崩臨百雉而特立扶重霄而直上仙挹石髓結而為膏神鑿嵌竇呀而為室囂滓可遠幽偏自新勝概岑寂人無知者大歷中御史中丞隴西公保障南服三年政成乃考宣尼廟於山下設東西庠以居冑子備俎豆儀以親釋菜雖峻止可尋而叢薄未翦公乃目常從以上每指荒榛而授事為力無幾得茲穴焉閎而外廉隘以傍達立則艮其背行則躓其腓於是申謀左右朋進畚鍤壤之可跳者布以增徑石之可轉者積而就階景未移表則致虛生白矣豈非天賦其質智詳其用乎何暑往寒襲前人之畧也譬猶士君子韜迹獨居懿文游藝不遇知已發明則蓬蒿向晦畢命淪恨鹽車無所伸其駿和氏不得成其寶矣篆刻非寵庶貽後賢建中元年八月廿八日記元衡字伯蒼河南緱氏人舉進士德宗朝遷御史中丞元和二年由戶部侍郎拜門下侍郎同中書門下平章事檢校吏部尚書充劒南節度使封臨淮郡公八年復知政事王承宗上疏請赦吳元濟使人白事中書元衡叱其悖慢承宗怒使盜害之贈司徒諡忠愍臣某言伏奉今月九日聖恩以元和殿前所降甘露宣示百寮者伏聞聖德至而和風應元氣滋而靈液降不有上瑞曷彰盛時况甘惟旨味露則仁澤豈無外野故呈祥於禁中不於別殿特表慶於元和光凝棲鳳之林氣浥傳香之樹將使五靈集祉奕葉流芳伏惟陛下先天奉時王道立極不言而風雨咸若無為而正祥荐至故得蒸雲降液覩陽不晞如脂如飴珠連星綴可以彰聖感可以保豐年漢致金盤魏稱瓊爵方茲冥貺固有慙德臣遇斯鴻造幸偶昌期希代稱符微生畢覩載欣載賀徒竭犬馬之誠舞之詠之共樂華胥之俗無任臣某言臣聞至德有感嘉瑞必呈非汪洋霶霈不能動神靈非葳蕤合遝無以彰明盛伏惟陛下登建皇極二紀於茲情無忘於一日德彌新於萬載懷徠反側優容直諒至仁所漸潛銷於毒螫大賚所及無閒於忽荒故得正祥荐臻策填委迨於今日不可勝書此實上天所以丁寧俟登封告成也今又見許州長社縣劉斌地內連理棠樹圖徐州彭城縣陽守志園中合歡瓜圖又進白兔并圖等伏以甘棠符於國號連理表於邑中瓜瓞頌於詩人合歡守於園內兔居卯位白順金色金者取象於武臣白者明資於義邑足表巍巍宗社長慶於大同赫赫天枝永崇於皇度俾秉旄節必効精誠縣象告人焯乎明著竊覽前志歷考休徵積彼千載之祥無茲一歲之盛臣忝私恩覩所未聞抃舞之誠倍百恒品無任臣某言中使至奉宣進止賜臣新火及春衣等熒煌自天纖麗同降束帶歛衽盡飾之道已加捧炬迴光照臨之榮荐及臣某中謝臣以薄才濫居臺憲曠官尸祿驟涉歲年陛下未責前過尚容舊職忝陪班列兢惕每多載冒簪纓慙惶益甚今時惟清明律中姑洗當改燧火既荷惟新之恩未去縕袍更沐衣輕之賜猥霑鄙陋曲被幽微臣雖至愚豈不知愧伏以先皇之德未報陛下之澤又深揣分循涯過叨獎遇將仰申裨補俯効涓埃惟當以火燭心焚灼不忘於盡瘁以衣勵已曳婁常誓於糜軀嫉惡觸邪進賢推善有死莫貳知無不為伏冀聖慈鑒臣丹慊無任踴躍屏營之至臣某言中使至奉宣聖旨賜臣新茶二斤者慈澤曲臨恩波下浹光燭閭里榮加賤微驚歡失圖荷戴無力臣某中謝臣庸瑣無堪謬參風憲曠官尸祿已涉歲年竊位妨賢心知不可陛下宏上天之私覆迴白日之餘光錫貢頒榮布芳新於令節鑽燧改火燭幽昧於蓬門既荷惟新之恩更沐時珍之賜將何以仰申裨補俯効涓埃惟當焚灼丹誠激勵愚魯况先朝之恩未報陛下之澤又深省分循涯伏增隕越無任感戴屏營之至貞元二年御史中丞竇參所奏凡諸使兼憲官者除元帥都統節度觀察都團練防禦等使餘並在本官之位其後蘇弁于碩以度支郎中兼御史中丞鄧泳以易州刺史兼御史大夫皆奉進旨令在同類之上伏以前後異同遵守不一臣謹議伏請自今常參官兼御史大夫中丞者準省官立在本品同類之下前件等司近起十月至來年三月稱在選舉限內不奉朝參令式無文禮敬斯闕一年之內半歲不朝準貞元十二年中丞王顏奉勅釐革載在明文尋又因循輒自更改若以兵部禮部選舉限內事繁即中書門下御史臺度支京兆府公事至重朝請如常而况旬節已賜歸休常參又許分日一月之內纔奉十日朝參其閒甚熱甚寒皆蒙頒放臣以為王顏舉奏甚詳當時勅文處分甚備請準貞元十一年四月勅旨自今以後永為常式他年妄改前條請委臺司彈奏庶使班行式序典法無虧伏以先王制禮皆有著定之文後聖沿情或徇一時之敬過猶不及遂至於煩詢於有司兼酌禮意若無釐改有黷舊章其太廟諸陵日遣使臣等商量每歲除太廟時饗及太廟朔望上食諸陵朔望莫親陵朝晡奠外餘饗食及忌日告陵等並請停其果實甘橘蒲萄菱棃等皆遠方進奉陵邑所無並請遣使於諸陵薦獻果實之中甘瓜特異亦謂至時上薦其餘瓜果及四時雜物並望委陵令與奉陵縣計會及時供薦其專遣使亦請停庶宏聖敬之心不虧嚴潔之祀本置前件官以備顧問比來多不奏事有問虛設又貞元七年更有次對官雖議兩置去歲已停今惟以六品已下清官前例恐非盡善伏請自今已後兼以中書門下省御史臺拾遺監察御史及尚書省六品諸司四品已上職事官東宮師傅賓客詹事及王府諸傅等每坐日兩人待制正衙退後令於延英候對以為常式天運地轉剛柔生焉禮辯樂形文章出焉天之文莫麗乎日月地之文莫秀乎山川聖人觀象立言用稽述作發乎情性形於咏歌大則明天下政途彌綸王化小則舒一時幽憤刺見國風故子夏云在心為志發言為詩聲成文謂之音也固可動天地感鬼神則正始之道存焉有唐文士彭城劉公諱商字子夏眷予一先後之輩睦予兩中外之親緣情所鍾愛亦加等顧惟遭幸秉國樞重燮贊台衡之務統臨井絡之人其孤乃緘鐍遺文提捧萬里猥期序引將佐詞林予感悼故知惻覽華藻珠玉綴錯清泠自飄皆素所狎聞也泫然涕下不能自收矧公遐情浩然酷尚山水著文之外妙極丹青好事君子或持冰素越淮湖求一松一石片雲孤鶴獲者寶之雖楚璧南金不之過也晚歲擺落塵滓割棄親愛夢寐靈仙之境逍遙元牝之門又安知不攀附雲霓蛻迹巖壑超然懸解與漫汗游乎無閒邪著歌行等篇皆思入窅冥勢含飛動滋液瓊王褱之朗潤濬發綺繡之濃華觸境成文隨文變象是謂折繁音於孤韻貫清濟於洪流者也今所編錄凡二百七十七篇及早歲著胡笳詞十八拍出入沙塞之勤崎嶇驚畏之患亦云至矣有若太原王緒河東裴茂茂弟薦河南豆盧峯馮翊嚴紳紳弟綬及余伯舅洎於子夏咸以儒業相資冠冑㣥族雄詞麗句遍在人閒予與司空嚴公親結義深相與編葺恨不得繼采詩之末播於樂章且傳諸名士庶幾不朽忝以宿姻舊好撫事追書故言之不讓也維元和九年月日某官謹遣某以清酌之奠敬祭於故中書侍郎同中書門下平章事贈司空趙國公李公之靈元精之和變乎絪縕升為星辰播為賢哲當四序迭運克成歲功九德咸宜用彰聖道惟公鍾茂閒氣誕靈中和圭璧鎮於巖廊宮商備於韶濩經文緯武覩奧知微究理亂之源流極天人之涯際洎濯纓清漢鳴珮天墀出入三朝徘徊二紀論思禁掖潤色王猷屬元聖御極之初昊天降休之日公內參密命外正戎機竭心膂以振皇綱勵精誠以輔元化故得三光離朗九有澄清南定句吳西殲卭僰默運宏畧宏宣大猷及公亮采登庸予忝台階接武翊戴元首弻諧神人論道罔違恩波共浹及公推轂淮海予亦仗鉞坤維俱荷寵驚各從藩翰陰步馬庶彙惠洽顓蒙化啙窳之人變澆漓之俗聲應義激契重情申信誓之言期於沒齒隋宮井絡相去萬里山水澄鮮煙帛丿糸錯峙風傳麗句緘開素鯉金石相投鏗然在耳再徵黃霸繼入丹墀啟沃同心歲寒共期運屬休明道濟無為星霜八變交態不移或乘春賞花或對酒吟詩音容不閒讌語忘疲宜保太和克享期頤報功於岱岳侍宴於瑤池庭菊有芳朝露尚滋交臂遽失瞥如飇馳惜乎時方泰而壽不與噫道行而數奇復淮夷之成算雖人亡而事遺軫悼皇情哀纏冊誄瞻彼洛土青烏爰止千里申奠九原同寄撫嵇紹而不孤銘太邱而無愧嗚呼哀哉尚饗貫之名純避憲宗諱以字行舉進士貞元初登賢良科授校書郎永貞時累遷尚書右丞以本官同中書門下平章事遷中書侍郎罷為吏部侍郎穆宗朝為工部尚書卒年六十二贈右僕射諡曰貞後更諡曰文唯聖奉天刑奮神武振起隆平之運者非得臣無以成其業唯賢抱英畧任艱難垂鴻不朽之績者非偶聖無以展其材故欲理之主興則佐命之臣出天人之際厥有明祗應期感發若合符契皇唐十一葉明天子受位將懲禍於四方天錫以忠武之臣登翊鈞衡贊揚威烈此聖賢相遇者以其天人合發之運歟侯誰膺之則南平王其人也公諱崇文其先齊太公之冑自敬仲得姓而望於渤海及容止奔燕或家於范陽今則為幽潞人也奕世以禮義傳家法至公七葉無分居異財化行於鄉黨開元降制使存慰及旌表門閭者咸至於再曾祖藝朝散大夫試汴州長史祖夔試梁州司馬贈梁州都督考行暉正議大夫試懷州別駕贈戶部尚書咸晦名垂裕慶不在其身公鍾天之靈發地之秀膺時之傑起聖之期幼觀儒書不㞕章句雅尚義節志存功名遂學兵鈐習騎射術窮祕要藝擅國能天寶末胡夷之難因投筆硯事平盧軍偏裨隨鎮淮右寶應中代宗避狄陜服公從戎師又赴難行營扈蹕還京策勳居最其後智光之稱亂陰晉靈曜之俶擾大梁崇義之負固襄漢常率別部為前鋒功冠諸軍累官執金吾太常貞元初始授陳許節度都候及領所部隨韓全義鎮長武城神策淮南陳許浙右四軍同戍公總其侯奄之任臨下肅士眾悅而歸之尋加開府儀同三司始受蒲璧啟封渤海五年敗犬戎於寧州軍師書勳授節制之號公亦遷職而進封為王及全義還朝委以留務四遷至御史中丞十四年遂為長武城大使卒伍貫於素隸紀律明於先令劃壤為寨風塵不驚徹田為糧榛荒盡闢訖五六載昆夷不敢東顧邊城晏閉二十一年就遷御史大夫自至德已還天下多壘擁旄守土者至五十餘鎮每主帥就世將吏有得其柄者多假眾怙力以求代襲朝廷每不得已因而命之是歲也西蜀戎帥相國韋公其佐劉闢將踵武前事乃拒詔命逼脅使臣圍逼梓潼爭據劒門之險今上深惟宿弊將一戎衣以正四方謀於廟堂宰臣杜公黃裳贊定其策因薦公可任大事元年正月拜工部尚書右神策行營節度總護諸將便道南征公之在鎮繕甲兵勵士卒常如待敵及奉詔而至即日進路三革五刃無不完具前軍剋劒閣遂解重圍危城載邑失地全復即授東川節制轉兵部尚書左丞奮師敗衂之餘當芟夷焚之後拊巡創痏懷輯逋離敷愷悌之仁起常傷之氣義勇爭奮羸餓者來蘇賊眾退保鹿頭我師進至羅江縣相距半舍自五月至於仲秋小戰則小利大戰則大利奪其險要挫其銳氣賊乃堅壁不敢爭鋒然而憑高阻深帛丿糸亘十里我攻彼守眾寡相懸候便宜曠歲月則傷財留費稽我靈誅乃表請濟師以圖大舉及軍繼至則分命勇銳入其心腹絕其餱糧介於連壘之中而軍焉且俾申輸前詔開約降之路其大將仇良輔等執送闢子方叔及壻蘇強眾四萬餘人束手候命公乃俘二孽以獻釋將卒之縳復授以兵俾還龍壘無彼我之虞軍吏咸有獻疑謂非受降之道公曰彼逆以迫兇威父母妻子為其劫質今既窮歸貰死夫何懼哉遂使降眾先驅連營旅進闢率餘黨奔於西山公遣大將高霞寓酈定進以輕騎追捕及位疑於陽灌田闢棄馬投江二將倒㦸而出之遂擒以至械送闕下行獻告之禮而戮焉公入成都申嚴禁令無敢侵掠巿不改肆農不易畝百姓感悅如霽重陰而熙愛日也又以天子恩澤布於一方脅從詿誤者咸宥其罪斬賊將邢泚以徇曰莫如此偽効誠款陰持兩端三軍接龢如振塵埃而濯江漢也粵以十月遷檢校司空領全蜀十有三州外達諸蠻成泉安武賜實封三百戶封南平王侍從之臣紀功篆石建碑於鹿頭之下蓋今相國裴公之詞斯為不朽矣是役也師人貲費皆仰給有司量估僦直歸於幕府凡計緡百四十餘萬其用未半而寇難平主者請私贏公曰有土實可以奉軍國財非所宜隱盡命列上歸之縣官時蜀之府藏竭無以賞功佐吏請重稅編戶公曰恩未及而遽徵斂人將不堪但命閱簿書籍逋責得以備用甿不益賦吏無敢欺公常欲斥西戎復涼隴自居益部亟以急病為請願守邊陲天子壯其忠且將付以一面之寄乃授相印仗鉞於邠京西諸軍都受統制邊城動洽威惠故以不約而信不令而嚴居三歲戎政允理將朝於京既而有疾猶扶強首路則以展軨効駕而大病至焉以元和四年九月二十有五日薨於官享齡六十有四軍府哀慟如喪親戚皇情震悼不聽朝者三冊贈司徒賵以米粟布帛有加常等禮官考行諡曰威武明年正月二十日葬我司徒南平王於萬年縣設奠於國門之外百官成位弔哭以送君臣之義厚矣哀榮之禮備矣夫人董姓汝州長史同珍之女正位中閫佐佑仁賢翟茀未榮鵲巢空在春秋三十有一以大歷十有四年五月一日終元和三年追封郇國洎茲啟殯淮右從公於居嗣子金紫光祿大夫行思王傅上柱國上谷郡開國公食邑二千戶士政次子檢校祕書監兼御史中丞士榮季子左衞率府冑曹參軍士明漸漬義方事由忠孝保持門戶克纘家聲君子知南平之業為不忘矣惟公氣勇烈行易直內器劒距外不矯飾其治戎也持重有節制信賞以勸之明罰以齊之嚴不近苛奇必合正每臨敵制變勵如猛鷙迅如風雨啟行助雷霆之威斷後保河山之阻故攻無不剋守無不固其牧人也使之蠶而衣稼而食不奪其時不竭其力載其清淨一與休息故不能親譽而潛飲其德蜀川隆富首冠藩服我以功而居有之是宜保尊榮安暇豫矣然而不㞕寵利徇國捐躬振高風激時弊子文逃祿去病辭第訂之於我彼何瑣細四紀事軍旅百戰成勳庸遭逢盛明升受鼎鉞有賢人可大之業張盛后神武之威獨立一時我無慙德自迴旆南藩作扞西鄙朝廷以之倚仗四國以之瞻仰貪亂稔禍者竊視惕息徹其邪謀嗚呼天不憗遺奪我何速公之冢嫡以貫之常學斯文謬掌書命授以不刊俾傳信詞採遺烈於世家無慙實錄奉孝思之誠託有愧當仁式表新阡永昭神道銘曰幽朔之都浸遼鎮碣氣象盤鬱英靈峻發克生南平挺為人傑幼秉忠壯蹈茲武節韜畧懸解藝能冠絕天寶季歲胡夷猖獗爰執干櫓遂從征伐屢僨豺牙頻探虎穴勳名克樹爵祿有列惟天因人惟人奉天惟賢傒聖惟聖資賢靈命陰步馬有開必先自昔多難方隅擅權操兵襲位四紀之年光爍我后雄斷精堅將致武訓俾夫頑遷蠢爾庸蜀負險專地帝謂南平總戎為帥式遏亂畧輔成吾志南平秉鉞如火烈烈取彼凶孽獻於天闕式其怙亂必寘夷滅萬邦震驚九截荒札樂土全蜀任雄一方南平蒞止匪居匪康我懷急病整守西疆帝庸嘉信於邠斯鎮受委戎統登榮相印鼎餗方餁干戈未衅任重道遠時行運窮舟移巨壑日下高舂摧藏壯氣惻愴遺忠縟禮歸厚明思有融哀哀令嗣克孝惟終篆記樂石昭明世功奮乎千載式是英風需德宗朝為兵部郎中伏以吉州長史盧杞外矯儉內藏奸邪三年擅權百揆失序惡直醜正亂國殄人天地神祗所知蠻夷華夏同棄伏惟故事皆得上聞自杞為相要官大臣動踰月不敢奏聞百寮惴惴常懼顛危及京邑傾淪皇輿播越陛下炳然覺悟出棄遐荒制曰忠讜壅於上聞朝野為之側目由是忠良激勸內外歡忻今復用為饒州刺史眾情失望皆謂非宜臣聞君之所以臨萬姓者政也萬姓之所以戴君者心也儻加巨奸之寵必失萬姓之心乞迴聖慈遽輟新命盧杞蒙蔽天聽隳紊朝典致亂危國職杞之由可謂公私巨蠧中外棄物自聞再加擢用忠良痛骨士庶寒心臣昨者瀝肝上聞冒死不恐冀迴宸睠用快㣥情至今拳拳未奉聖旨物議騰沸行路驚嗟人之無良一至於此伏乞俯從眾望永棄奸臣幸免誅夷足明恩貸特加榮寵恐造禍階臣等忝列諫司今陳狂瞽仲儒代德閒人與韋執誼相善立於水成於氣以位天地勇於震奮於乙是生萬物天地之大萬物之多若無聖人誰與準繩故能範而不過類而不遺者也然則乘時設教必生大聖以首之庖羲氏甄才煥文君人子天神農以之首於皇而體至道也軒轅氏推筴命官度方順紀顓頊奉之首於帝而法元德也夏后氏奠山通川因地制賦殷湯繼之首於王而明大化也理亂相資質文代變洎有周而衰焉平桓以還鴻流蕩然非聖人之述易羲農之道消矣非聖人之辯問軒轅之帝衰矣非聖人之刪書夏殷之王微矣非聖人之作春秋周室卑而諸侯僭矣故夫子彰皇繫帝敘王尊周首於儒而開大教也是知前聖之遺風將絕夫子不得不生中古之彞訓將興夫子不得不作故禮云百代以俟聖人而不惑也有天下者遵其易遡其元命可以致於清靜遵其廣大宏其覆載可以致於雍熙遵其禮讓蹈其夷曠可以致於和平苟或失常滔滔淫源德滋非而霸功作矣代易於上教尊於下運否於既往位崇於將來形於國而達於家萬樂和而百禮成郁郁洋洋與日月而終矣巨唐教本六經德懷三古拯大道於既溺復醇源於已醨追諡文宣顯用王禮太學之制形於四方貞元五年秋仲上丁元帥司空侍中咸寧王渾公有獻於先師退而言曰斯廟也左廛右署前軍後府晨暮之閒諠闐四起非肅雍致敬之地爰命畧址於城得南端安焉出退食之中財任閑人之餘力屬役如素十旬而成祠庭有閑薦設有嚴衅落之禮行饗獻之儀具是則賈之囂薄師之閱習吏之譏訶寂寥於茲矣噫我公以身柱國竭力戴君齊心孔門稟奉如在易曰化而裁之默而成之公氣和陰陽德會幾義又曰其靜也專其動也直公志尚純一行必中正語曰文武之道未墜於地公有全社稷之勳合經緯之用又曰學之無倦行之以忠公有遵理化之勤及人民之信古訓是式新廟奕奕尊異顯赫舉集其門也至哉小子明朝退飛幕府獲祐歎息徘徊敢揚頌聲其辭曰昭昭五星元文之經浩浩五行元氣之形維上紀下災昏祥明聖人居中百化適成五星九元醇朴不曜降及堯舜存乎典誥文王既沒孔子乃紹質文異時日月代照肇自開闢澒洞無跡考於六籍窮古盡昔微禹之功水土共融微儒之風華夷濛濛大聖同德垂訓作則山川九州禮樂萬國羲軒之道夫子明之百王纘焉仰而營之夫子之教巨唐興之皇帝奉焉式而宏之皇帝之化藩翰揚之司空行焉敬而將之肅肅新祠煌煌盛儀祀享不失弦誦以時儒風載揚天地同期仲周京兆人徙居汲郡中進士甲科以大理評事攝監察御史臣佑言伏奉恩制封臣小男母李氏密國夫人臣某中謝伏以禮經明文婦人本無爵命秦漢以降優賢以寵閨門固無謬及有紊彞典臣小男母李氏本非主饋若貴云因子臣男尚自賤微禮有從夫臣妻又早逝歿豈伊末品忽被殊私此蓋陛下念臣齒髮漸衰賓祭無主俾立家而有裕遂開國以疏封詩美鵲巢懼無德而自處禮榮翟茀恐負乘以貽災瞻上天而以懼以慙顧中閫而載榮載躍不任荷懼屏營之至右臣素乏器能謬司方鎮敗公之責夙夜惟憂延世之榮雨露覃及顧老臣以增懼念童子以何知恩私忽臨負荷無力不勝感恩惶恐屏營之至臣某言伏見某月日制除臣男憑御史中丞捧讀綸音驚慙無據臣頃戰伐河北男亦隨身救援李忠頓軍易定屬陛下遷幸聞及河南臣留與論婚娶然得引軍關右堅保渭橋承算畧於皇明摧凶醜於都邑事關聖運功匪眾人陛下特以微功錄其小子年未登於弱冠官已及於中司若以忠孝而升且無往例若由臣闕二字授是紊國章臣初沐殊私即將陳讓但緣李忠在外方遏寇戎已行之恩難可追止柔遠之體或要順從勉承不次之榮益荷無窮之惠君親垂施並居踰等之官父子同心各獲捐軀之地不勝感荷屏營之至右伏以楚俗遺風素傳角黍野人之志每願獻芹上件衣服裁製實昧於上國鍼縷多慙於天造懇誠所至庶備祝堯謹遣某官隨狀奉進右伏以垂衣聖代角黍良辰述職之誠願有所獻器用非寶寧備下陳之儀縑帛至微庶同長命之縷前件銀器花紗等謹遣某官隨狀奉進右臣伏以千年昌運屬在聖朝五日佳辰方臨仲月臣謬司垣翰不獲稱慶闕庭對東海竊慕於朝宗望南山輒思於上壽前件銀器花紗等謹遣某官隨狀奉進右伏以聖壽千年不假封人之祝嘉辰五日用申臣子之誠前件器物紗絹等不敢法外徵科皆積軍中餘羨遠塵旒扆伏用兢惶謹差某官隨狀奉進右伏以淑氣牧人運歸聖德天臨日照慶集嘉辰瞻太極之肇分仰濛汜之初浴歡忻感戴踴躍屏營臣限守方隅不獲稱賀上件銀器等隨狀奉進右伏以紫氣充庭黃河變色用符昌運式表誕彌雖聖壽齊天不假封人之祝而獻芹為禮空馳野老之誠上件銀器帛丿糸錦綾綺等謹遣某官隨狀奉進右伏以厥日誕祥惟天降聖歡連率土慶集茲辰前件器物雖竭愚誠欲申上獻顧惟薄難備下陳伏以陛下勤恤為心慈儉成德是用恭行聖旨為禮不寶遠物為珍臣限以跼守遐藩不獲申慶天闕竊同纖草長傾向日之誠願比封人遠獻如山之壽無任戀慕歡躍之至右伏以四月孟夏千年聖期社鳴表祥河清叶慶臣於是日限守列藩不獲望南山以獻觴聞擊石以率舞屏營戀慕不知所裁上件器物等謹遣某官隨狀奉獻右伏以代理宏道三教同歸聖誕佳辰萬靈叶慶上件女道士無名尼或早授畢法已聞具戒願編僧道之錄永遂修持之心今因降誕日伏乞賜其正度右件驍將自貞元年身亡其妻行服三年情禮畢備去歲秋首已及祥除素習真經志願入道伏以草野之人能修柏舟之誓義足以勸志不可移今因聖誕之辰願崇景福請度充女道士法名真元仍請就潤州道林觀賈蒲州人憲宗朝官兵部尚書衡稱物以致用誠至精以作孚惟衡也表正直之有則惟誠也俾輕重之不踰是將默運乎規矩顯微乎錙銖齊日月於七政協天地於三無且衡之德也權以相扶正之道也禮以為樞權得其誠而物無不應禮歸於正而奸不可誣是知大德所感小人是慘舉輕為重彼於信而自虧犯正以邪將畏禮而罔敢衡之用也可大衡之設也無欺既有別於高下固非差於毫釐懿夫設爾而倚坦然而夷其大不讓其細不遺始執謙而益矣終忌滿而損之必盈縮而得度乃中正而自持宏於道深可均於五則遵乎信宜作配於四時原夫衡為器之軌禮為邦之紀宰物者必察其所持為政者必視其所以均則無怨是將施德於人審乃不欺故曰為仁由巳彼天下之至精實至人之用情衡持平而固本權應變而定傾俾廉者之中節抑貪夫而不爭虛而受鈞石不能以為重進而就圭撮不足以為輕惟合德之為美故進退而有程我有司以守職操持㣥才所奉秉正直之權衡察善敗之輕重此所以振千古之貞範副大君之垂拱者也稽元氣之成歲察時運於上元其始也黃鍾之律中其終也招搖之星旋不見而彰斯強名以稱道無為而化故易知以成乾陰陽推以在位日月貞其所躔運之而五行不息成之而四序罔愆萬物被仁咸遂性以生植聖人取則將設教以昭宣於以體和而配德於以奉時而後天厥惟至化實資元造天以默運其時后以財成其道形於變化知否極而受通著以始終見物壯而終老故天道之不紊必惟命之有分俾陰陽以周環同聖神而廣運原夫為功不宰為道永貞成之以肅殺煦之以發生節乃歲經在一寒而一暑氣為物母自無名而有名且居高而濟下諒無跡而能行天地以和於焉運泰德刑既備然後功成豈止配五緯而定數叶三辰而為正是知天有常規道有彞制諧一德以佐主通四時而輔歲至仁所感思歌造化之功測管以窺寧究天人之際
