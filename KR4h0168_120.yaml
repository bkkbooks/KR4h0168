body:
  text: 朕方以勤儉一身輯和庶政未嘗枉費所切安人今則重威未賓契丹尚擾必多添於戰騎期大振於軍威言念煩勞事非獲巳卿燕臺大族唐室懿親作鎮方隅既多善政應時制置素有嘉謀實兼文武之才比擅方圓之譽惟卿之身久從迫脅居胡土而當全骨肉還漢疆而近脫鋒鋩浮沈祗係於虜情舒卷非繇於巳意想其扼腕常所吞聲朕猥以眇躬式隆丕構承皇天眷命副羣后樂推方救阽危用拯塗炭昨契丹見華人不附尋巳促還今酋長為神物所誅俄聞暴卒興亡之兆其理昭然其永康王遁入鎮州與卿顯相疑惑今月一日於待賢館內巳被縶俘所有寮屬將校並遭誅戮冤聲遙聽慘性可量想計聞之必多酸楚卿一門忠孝三代王公須自雪家冤當共清國難於我則既明向日於彼則無與同天自然燾土分茅長居爵位重茵列鼎永慶來雲孟津之會宜先塗山之期勿後況車駕按幸巳及晉州無致他人別邀富貴臨軒眷注寤寐不忘所有諸道申奏蕃賊等逃遁事繇表章文狀等並同封往其三軍官吏僧道百姓等別降敕曉示撫問用符卿意當體朕懷古者詢芻蕘之言採歌詩之風冀求利病以省是非況濟濟盈朝謇謇就列懷才抱器博古知今苟無宏益之辭曷表翊扶之力起今後文武百寮每遇後殿起居日仰具利濟上章以聞次第循環周而復始嘉謀嘉猷之告庶得聞知可大可久之規期於曉達亦聆此事向來巳行但率皆浮言鮮克忠告良由時或拘忌人有依違遂使急務慎於指陳浪語盈於章奏有名無實阿旨取容今則不然所宜改作凡有封事並可直言無用飾詞務存確論輔此不逮稱朕意焉杜重威猶貯禍心未悛逆節梟音不改虺性難馴昨朕小有不安罷朝數日而重威父子潛肆凶言怨謗大朝扇惑小輩今則顯有陳告備驗姦欺既負深恩須置極法其杜重威父子並處斬所有晉朝公主及外親族一切如常仍與供給盧擢忠勤奉職讜直立言貢以封章舉其墜典詳觀宏益尤切歎嘉宜下所司並令舉奏朕祗膺景命肇啓鴻圖適當建號之初宜舉正名之典夫名以制義義以出禮禮以體政政以養民載考格言抑有彞訓顧惟寡昧敢忘率循但君父之名貴於易避臣子之敬難以斥尊苟觸類以妨言必迂文而害理況宗廟方建禋祀非遙祝嘏將期於正辭稱謂所宜於稽古爰從改革庶叶典章凡百臣寮當體朕意今改名皓故茲札示想宜知悉朕自副推崇敢忘寅畏及物必加於恩信任人無間於親疏期區宇之大同俾蒸黎之小泰洎朕始臨梁苑畢會藩侯蓋當再造之期用普維新之命莫不駿奔入覲率俾爭先旌旄之寄咸遷帶礪之盟益固魏博杜重威負釁雖重在朕含垢亦深盡捨前非只期後效是以授之真秩換彼名藩而禍胎巳成妖氛復作北勾賊虜南拒朝章若不加誅何以為法黷我天憲勞我兵威今則大進梯衝克收壁壘重念一夫作孽百姓何辜雖巳推祝網之仁尚宜軫納隍之慮必恐孤城既拔衆怒猶深儻驚飇更迅於雷霆即烈焰寧分於玉石朕所以軫傷在念想慮尤深將親勞於六師宜再詢於順動豈辭櫛沐須議省巡取今月二十九日車駕起離闕下暫幸澶魏已來凡百士庶宜體朕意王者興膏雨之師所以蕩瑕穢下哀痛之詔所以弔傷夷朕頃自晉朝俾乂并土屬戎夷兆亂致干戈日尋每懷如燬之憂嘗竭扶顛之力旋以金行失馭天驕縱暴北陷河塞南踰官渡盜據宮闕淩辱衣冠蹂踐我京畿虔劉我生聚田不易壠人不聊生犬羊布於四郊腥穢聞於千里人既思主朕實疚心遂乃建彼義旗整斯戎輅雪萬民之枉抑期九土之和平求理之端惟刑是恤況時當養物仁在好生爰覃解網之恩用廣泣辜之道應天福十二年六月十五日昧爽巳前諸道州府見禁人等巳結正未結正巳發覺未發覺除十惡五逆外其餘罪無輕重咸赦除之三司地征六營軍費素懸數額皆有限程但以兵革屢興旱蝗相繼蓋督吏不能開許致疲民無以供輸苟不蠲除轉成困敝天福十一年巳前諸道州府應係殘欠稅租並特除放朕昨夙駕河汾薄狩陝虢洎及京邑周覽神臯禾黍廢為間田牆屋毀為平地凄涼滿目指顧傷心且農夫不耕廩食何取蠶婦不織府帛何輸言念流離諒宜矜恤況朕頃在藩翰備諳稼穡自臨大寶首念蒼生常久困於蕃戎欲盡蠲其租賦又以干戈未弭士馬方繁月無見糧歲無常給特於經費須此減除其東西兩京畿道遭契丹蹂踐暴苦處人牛俱喪蠶麥不收雖近復田園固無可輸納其東西兩京一百里內今年夏稅及沿徵物色並與蠲放其一百里外曾有契丹經過劫掠之處委本處官吏躬親恤問如實被契丹蹂踐不虛其今年夏稅大小麥苗子沿徵物色等各放一半其京城內先遭張彥澤明行拷捶劫掠資財兼被契丹毀拆屋舍括率緡錢久屬艱危併罹殘虐爰符望幸用慰來蘇其京城內今年廛稅與減一半雨露之恩豈宜有間文武之吏咸與維新應內外臣寮及京百司并諸官吏將校等各具名銜申奏當與加恩應有契丹除授諸道節度觀察防禦團練使刺史及令録賓寮將吏等並各安職任不議改更勉思共理之規更俟維新之命或曾經謫宦又念投荒苟亡惻隱之恩何示照臨之德應巳前貶降官未量移者當與量移巳量移者便與敘録應該徒流者與放還近因獫狁猖狂萑蒲充斥交相劫剽不問官私遂令王事之人空有係官之數應屬省務局錢穀曾經契丹及草寇般擎處據巳勘到實數仰三司具指實條奏當議別有指揮應係欠省司錢物尚令逐處徵催全放則因便生姦加罪則困窮可憫宜下三司據見有家業抵當外如實無充折者特貸餘生更無任使亡命不逞之徒殘民蠧物之類或隱藏山谷或畏懼典刑及今日巳前結集為非者並不問罪仍令所在長吏丁寧曉諭如願在軍都者量材安排如不願在軍都者即任歸農業與限兩月明示招攜如限滿依前結集為非不議寬恕即嚴加捕捉復罪如初浚都重地汴水名區控襟帶於八方便梯航於萬國眷言王氣允稱皇居其汴州宜仍舊為東京朕以肇興寶歷克嗣炎精遐追雍雒之宏規仰仗高光之盛烈其國號宜改為大漢朕始事晉以至開國雖易服建號固有通規念舊懷恩未忍改作其年號仍舊稱天福於戲帝王之道亭毒為先黃老之言清靜為本用示滌瑕之典宜敷作解之恩矧惟臨馭之初方屬艱難之運當欲盡除疾苦漸致康寧用遵置器之方庶減納隍之慮凡在遐邇宜體朕懷自古聖帝明王開基創業輯寧庶彙康濟四方行寬大之恩不遺遐邇布含宏之德無隔華夷頃屬前朝季年中原失馭蒸黎板蕩宇縣分離寰區為戎虜之鄉宮闕作腥羶之地百萬家之生聚俱陷虎狼數千里之人煙頓成荊棘朕屬茲多難思庇生民憫晉祚之覆亡憤胡塵之紛擾繇是痛心疾首躍馬提戈慕大業於高光起義師於汾晉胸奴運盡魁首天亡殘孽遺妖奔巢走穴繼平凶醜再造乾坤盡復諸華不失舊物顧惟眇質獲荷寵靈怵惕於懷憂勤在念朝野亂離之後國家開創之初每慮德澤未優照臨尚狹懼一夫之不獲恐一物之乖宜思濟艱難靡遑宵旰大河之北易水之南久困兵戈聚成瘡痏男孤女寡十室九空念此興懷澘然出涕近者北地州府相次歸明覩千里之坦夷顯羣心之忠順今則方當展義爰用省方宜宏及物之恩用廣惟新之澤應鄴都管內及邢洺慈相衛鎮深趙貝冀博滄景德易定祁泰等州管內應見禁罪人取十月五日昧爽巳前巳結正未結正巳發覺未發覺常赦所不原者咸赦除之自契丹為患巳來逆虜所至之處劫掠之外殺害實多方布仁慈豈限存沒應河北曾經契丹殺害處所有無主骸骨並仰所在長吏勤加指揮收斂埋葬其有官員將吏歿於王事及曾被契丹脅從指使反遭殺害者並可搜訪逐人子孫及親嫡骨肉具名聞奏當與量材任使必令存濟捨過録功方務含垢捕亡服叛惟切推誠契丹節度使麻答見在定州自前曾輸款誠欲來歸順巳降詔諭想計聞知當俟傾心別加殊渥幽燕瀛莫舊屬蕃戎惟彼生靈久遭屈辱近知軍民憤激志願歸明苟能密設機謀審圖禍福必然成事終享功名上郡雄藩當用酬奬鎮州殺僇契丹之時軍人百姓並立勳效其軍都將校員寮巳行恩澤訪知百姓鬬敵之際死傷甚重聽聞巳來傷歎尤切其逐人本家宜令本道常加優恤向者有漢地諸色人員隨契丹北徙未能歸還去國離鄉益加憫念其本人骨肉仰所在存恤倍加安撫先有諸色人曾伏事著契丹官員者一切放逐穩便所在不得動搖於戲上天悔禍黔首愛生敢忘兢慎之心冀合升平之運凡在黎庶當體朕懷昔我藝祖神宗開基撫運以武功平禍亂以文德致升平澤潤生民慶流長世淳耀之德不泯延洪之業無窮肆豫沖人猥集大命荷上穹之眷祐揚列聖之耿光底定四方奄有萬國纘堯承緒欽若永圖嗣夏配天不失舊物乃者有晉失馭羯賊亂常蛇虺肆毒於寰區豺狼暫穴於宮闕虔劉我生聚俘掠我吏民戎馬所經人煙殆絶海內無主天下騷然朕方在躍潛遇茲屯難秉旄誓衆憤其家國之仇冒暑出師雪彼生靈之怨皇天后土悔禍誘衷胡虜喪亡遼羯潰亂腥羶屏氣屬縣歸心按六轡而嚴屬車克寧西道走空函而飛折遂定中州旋以王業尚艱魏郊斯梗當思康濟爰議省巡一方既靜於煙塵九野漸期於清晏今則巳旋魏闕正屬王春三陽布和四序更始宜宣德澤以順發生紀號易年式顯鼎新之祚宥過懋德載覃渙汗之恩可大赦天下改天福十三年為乾祐元年自正月五日昧爽巳前犯罪除十惡五逆外罪無輕重巳發覺未發覺巳結正未結正咸赦除之諸貶降官未量移者特與量移巳量移者與復資敘用諸色配流人並放還鄉里其除名不齒者量與敘録諸處散闕場院官自前有因繇欠折節目並無抵當灼然無可徵督者宜令三司勘覆聞奏豐阜之道耕種為先宜伸勸課之條以重衣食之本應天下戶口夏稅見供輸頃畝稅賦外一任人戶開墾荒地及無主田土五年之內不議納稅亦聞自前有此指揮始即許其開耕旋乃却行括既非誠實顧失輯綏朕以化理域中信敷天下必無改易庶廣耕桑宜令所在長吏明行曉示自中原板蕩編戶瘡痍凶歉薦臻逋逃未復加以徵賦煩重差配頻仍言念疲羸宜伸撫恤比聞州縣調役未甚均平秋夏供輸不依條制生靈受弊胥吏成姦宜警尤違俾循軌度所有逐處戶口宜令觀察使刺史縣令設法招輯除宣省指揮外不得非理差配其合充色役人戶不許官吏州縣影占務均苦樂其秋夏輸納只依朝廷指揮受納不得有加耗取覓若或差人察訪不虛其主者監官必加深罪更在藩侯郡牧共理分憂嚴設科條以副委任一昨親征鄴部暫駐野營周覽鄉川備觀凋瘵所宜優恤以召和平其鄴都四面人戶去城三十里內所有天福十二年賦稅并緣徵一物巳上并可特放其無主破毀墳墓仰差官吏如法掩瘞兵荒之際寇盜連羣自朕始及京師巳宣赦宥尚聞結集未復家園豈非告諭之未嚴慰撫之未至今則陽春資始東作將興雨雪及時耕桑有望所宜各歸營養自取安全式敷在宥之恩載啓自新之路應諸處有前自為非惡迹之人一切放罪不問便可安家樂業各歸營農所在不得動搖赦書到後仍與限一月若不歸本家復罪如初當令緊切擒捕必無矜恕仍別有條理指揮恭惟列祖園陵諸聖祠廟桑田變海當時之弓劒猶存精爽在天終古之威靈不泯載惟追感誠切永懷其雍州西京及諸州府應有諸帝陵廟仰所在修奉務令完葺國家大事惟祀與戎苟蘋藻之不虔則神祇之安享起今後凡有祠祭所供用之物務在豐潔宜令有司精細點檢向者桀虜亂華或有抱幽冤而沒地王師薄伐或有徇忠節以隕身念彼遺魂宜覃霈澤自國家舉義巳來應有將校臣寮沒於王事及晉朝臣寮枉遭契丹屠害者並與追贈如追贈爵秩未高者更與贈官仍令搜訪子孫量材敘録朕昨展義省方討違伐叛適當平定且録勤勞應扈從鄴都城下內外文武臣寮及馬步諸軍將校并在京都署巡檢官員職掌諸軍將校等升除巳行恩命外所有未曾加恩者宜令中書門下條舉聞奏兼鄴都巳來沿路州縣迎奉大駕供饋宿頓糧草無遺闕處其職掌及州縣官吏並可等第甄録天下名山大川聖帝明王忠臣烈士祠廟墳墓委所在量事修葺自唐莊宗後來應有文武大臣功德昭著者其陵替子孫量與敘録其有先曾仕契丹并有骨肉見在契丹者其本人本家所在切須安存不得妄有恐動朕昔在藩邸頗熟臣寮文武之才常備觀其梗概方員之用宜更察於精微俾取質於衆多庶無遺於俊造應文武常參官仰準唐建中年故事上任後三月表舉一人自代軍國之費務在豐財關市之征資於行旅所宜優假俾遂通流應天下商旅往來所在並須饒借不得妄有擾勒卑宮菲食前代之令猷革舄綈衣哲后之明德至於損上益下惜力愛人冀息煩苛漸期富庶所有乘輿服御後宮費用大官常膳一切減損在京及內諸司並天下州府除應奉軍期急切外其餘不急之務非理營造並皆停罷免致勞役徵聘邱園免遺邦彥恢張名教俾厚人倫應有蘊蓄器能精通理道文理該博武略縱橫而退遁於家高尚其事者委所在訪尋當俟徵用義夫節婦孝子順孫仰具聞奏即議旌表於戲創業惟難守成非易敢忘馭朽思致偃戈更賴文武股肱藩后同心康濟勠力弼諧永冀隆平共臻仁愛凡在戴履宜體朕懷赦書有所未該者委有司舉奏赦書日行五百里敢以赦前事言者以其罪罪之
