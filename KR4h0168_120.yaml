front:
  text: 全唐文欽定全唐文卷一百二十帝姓劉氏諱皓初名知遠其先沙陀部人唐乾寧二年生初事唐明宗後事晉高祖天福六年授北京留守八年進中書令開運二年封北平王四年二月少帝北遷羣臣勸進即皇帝位改今名在位二年年五十四諡曰睿文聖武昭肅孝皇帝廟號高祖
  hash: sha256:6ad022f7e47cf21e839ee7c62d3fdbf4a08ed02bd049a764095b28958bb20f4c
