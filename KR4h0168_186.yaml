front:
  text: 全唐文欽定全唐文卷一百八十六君綽高宗朝官左戎衛大將軍封懷寧縣公
  hash: sha256:a8729cf857ccc16fb7e8c75925b0e092c09f14a83522cbb2de29d153103ef21e
  markers:
  - {type: head, offset: 14, content: 杜君綽, id: KR4h0168_NFKB_186-h1, level: 1}
body:
  text: 竊以至道沖虛釋教凝寂津梁庶品導引㣥生銷鄙行於未萌發慈心於已悟然而後身濟物雖假於名言勸善懲非無資於賞罰信乃善開方便冥助政道伏維皇帝陛下德合乾坤恩霑動植含靈稟氣俱荷曲成僧尼之俗誠宜拜跪但不拜君父著在經文臣以為道或可存則言不可廢且君父尊極事絶擬倫在於臣子敬非緣拜既殊道俗無嫌傲誕以臣愚見不拜為宜謹議善才上元中左金吾衛大將軍上柱國開國侯竊以釋道二門津流自遠求諸典實崇敬斯宏至若皇繫所宗實光華於萬祀漢室惟啓亦紛郁於千載且君親在三儒有不臣之禮元寂居二致無一拜之儀義不師古請循惟舊謹議志約高宗朝官太常博士禮部郎中竊以凡百在位雖存敬上之道當其為師尚有不臣之敬况佛之垂法事超俗表剔髮同於毀傷擁錫異乎簪紱出家非色養之境離塵豈榮名之地功深濟度道極崇高何必破彼元門牽斯儒轍披釋服而為孔拜處俗塗而當法禮存其教而毀其道求其福而屈其身再三研核謂乖通理又道之為教雖全髮膚出家超俗其歸一揆加以遠標天構大啓皇基義籍尊嚴式符高尚並仍舊貫無點彞章如必改作恐非稽古雖君親崇敬用軫神衷道法雖虧還留睿想既奉詢芻之詔敢罄塵嶽之誠懼不愜允追深戰惕謹議蓋聞天地之大德曰生運陰陽以播物含靈之所保曰命資亭育以盡年蟄穴棲巢感物之情蓋寡范金揉木逐欲之道方滋而五味或爽時昧甘辛之節六氣斯沴易愆寒燠之宜中外交侵形神分戰飲食伺舋成腸胃之眚風濕候隙遘手足之災幾廠田坴膚腠莫知救止漸固膏肓期於夭折暨炎暉紀物識藥石之功雲瑞名官窮診候之術草木咸得其性鬼神無所遁情刳麝剸犀驅泄邪惡飛丹鍊石引納清和大庇蒼生普濟黔首功侔造化恩邁財成日用不知於今是賴岐和彭緩騰絶軌於前李華張吳振英聲於後昔秦政煨燔茲經不預永嘉喪亂斯道尚存梁陶宏景雅好攝生研精藥術以為本草經者神農之所作不刊之書也惜其年代浸遠簡編殘蠧與桐雷衆記頗或蹐駮興言撰緝勒成一家亦以雕琢經方潤色醫業然而時鍾鼎峙聞見闕於殊方事非僉議詮釋拘於獨學至如重建平之防已棄槐里之半夏秋採榆人冬收雲實謬粱米之黃白混荊子之牡蔓異蘩蔞於雞腸合由跋於鳶尾防葵狼毒妄曰同根鈎吻黃精引為連類鉛錫莫辨橙柚不分凡此比例蓋亦多矣自時厥後以迄於今雖方技分鑣名醫繼軌更相祖述罕能釐正乃復採杜蘅於及已求忍冬於絡石捨陟釐而取草別藤退飛廉而用馬薊承疑行妄曾無有覺疾療多殆良深慨歎既而朝議郎行右監門府長史騎都尉臣蘇恭托陶氏之乖違辨俗用之紕紊遂表請修定深副聖懷乃詔太尉揚州都督監修國史上柱國趙國公臣無忌大中大夫行尚藥奉御臣許孝崇等二十二人與蘇恭詳撰竊以動植形生因方舛性春秋節變感氣殊功離其本土則質同而效異乖於採摘乃物是而時非名實既爽寒溫多謬用之凡庶其欺已甚施之君父逆莫大焉於是上稟神規下詢衆議普頒天下營求藥物羽毛鱗介無遠不臻根莖花實有名咸萃遂乃詳探祕要博綜方術本經雖闕有驗必書別録雖存無稽必正考其同異擇其去取鉛翰昭章定㣥言之得失丹青綺煥備庶物之形容撰本草並圖經目録等凡成五十四卷庶以網羅今古開滌耳目盡醫方之妙極拯生靈之性命傳萬祀而無昧懸百王而不朽仁約字思謙以近武后父嫌名遂以字行鄭州陽武人第進士纍調應城令擢監察御史高宗朝纍遷尚書左丞進御史大夫轉司屬卿右肅政大夫封博昌縣男同鳳閣鸞臺三品轉納言以太中大夫致仕卒贈幽州都督遂良賤買地宅睿册準估斷為無罪然估價之設屬國家所須非關臣下之事私自交易豈得準估為定睿册舞弄文法附下罔上罪在當誅宏義高宗朝庭州刺史賀魯寇庭州詔使宏義佐弓月道行軍總管梁建方經略之臣聞安中國以信馭夷狄以權理有變通事無嘗準今有降胡來言賀魯獨據一城深溝高壘用以自固云今正祁寒積雪漢兵必不遠來誠宜乘其此便一舉可以除勦若遷延待春恐事久生變縱不能結援諸國必應遠迹遁逃且兵馬此行不誅賀魯處密已許款誠處木昆等各思免禍皆知大兵欲至庶望安全淹留不至慮更烏合然嚴冬風徑馬瘦兵寒瘃墮之憂難量進退又不可久停兵馬虛費邊糧見我不前成其黨附伏望且寬處月處密之罪以誅賀魯為名除禍務絶其原未可先取其枝葉但此兩姓見其坐奪不示招攜必自深據如棄而西過則近有後憂先事誅夷未可即克捨而勿問則感義前驅事定從宜除申弔伐此乃威恩兼舉遠懾邇安向使兵馬早來賀魯久已懸首前機雖失須為別圖望請於射脾部落及發處月處密契苾等兵六千人各齎三十日糧往掩襲大軍頓於憑水秣馬畜兵以為聲勢此則驅率戎狄攻彼豺狼失則無損國家利則功歸社稷且番人行動須約漢兵東西犄角又資趐翼簡胡騎以率其前率漢兵以躡其後賀魯進退無路理即可擒百勝之謀在斯一舉臣恐建方至日為計不同軍謀乖舛後悔無及德元岐州平陵人始為高祖丞相府千牛高宗以舊臣自殿中少監為御史大夫遷司元太常伯麟德初進檢校左丞封巨鹿男卒年六十九贈光祿大夫幽州都督諡曰恭肖形二氣嚴父稱莫大之尊資用五材元后標則天之貴至於擎跪曲拳之禮陶化之侶同遵服勤就養之方懷生之倫共紀凡在君父理絶名言而老釋二門出塵遺俗虛無一旨離有會空瑞見毗耶闡慈悲之倡氣浮函谷開道德之篇處木雁之間養生在慮罷色聲之相寂滅為心執禮蹈儀者靡窮其要妙懷忠履孝者未酌其波瀾理存太極之先事出生靈之表故尊其道則異其服重其教則變其禮爰自近古迄乎末葉雖沿革暫乖而斯道無墜洎哀廠田坴雙樹慟結三號防後進之虧風約儒宗以控法故當輔成舊教豈應裁制新儀誠宜屈宸扆之嚴申方外之旨委尊親之重縱寰中之遊愚管斟量遵故為允謹議敬貞麟德時羅含府果毅淮南子云方諸陰燧大蛤磨拭令熱以向月則水生以銅盤受之下水數石王充論衡云陽燧取火於日方諸引水於月相去甚遠而火至水來者氣感之驗也漢舊儀云八月飲酎車駕夕牲以鑒方諸取水於月陽燧取火於日周禮考工記云有六齊金錫相半謂之鑒燧之齊鄭元注云方鑒陽燧取水火於日月之器也準鄭此注則水火之器皆以金錫為之今司宰有陽燧形如圓鏡以取明火陰鑒形如方鏡以取明水從比年祠祭皆用陽燧取火應時得之陰鑒取水未有得者常用井水代之請準淮南論衡以方諸取之則禮神之物備矣萬石太常卿挺之子上元中纍遷太常少卿知吏部選事據貞觀禮郊享曰文舞奏豫和順和永和等樂其舞人著委貌冠服並手執籥翟其武舞奏凱安其舞人並著平冕手執干戚奉麟德三年十月敕文舞改用功成慶善樂武舞改用神功破陳樂並改器服等自奉敕以來為慶善樂不可降神神功破陳樂未入雅樂雖改用器服其舞猶依舊迄今不改事既不安恐須別有處分者謹按凱安舞是貞觀中所造武舞準貞觀禮及今禮但郊廟祭享奏武舞之樂即用之凡有六變一變象龍興參野二變象剋靖關中三變象東夏賓服四變象江淮寧謐五變象獫狁讋伏六變復位以崇象兵還振旅謹按貞觀禮祭享曰武舞準作六變亦如周之大武六成樂止按樂有因人而作者則因人而止如禮云諸侯相見揖讓而入門入門而懸興揖讓而升堂升堂而樂闋是也如著成數者數終即止不得取行事賒促為樂終早晚即禮云三闋六成八變九變是也今禮奏武舞六成而數終未止既非師古不可依行其武舞凱安望請依古禮及貞觀禮六成樂止立部伎內破陳樂五十二遍修入雅樂祗有一遍名曰九功上元舞二十九遍今入雅樂一無所減每見祭享日三獻已終上元舞猶自未畢今更加破陳樂兼恐酌獻已後歌舞更長其雅樂內破陳樂慶善樂及上元舞三曲並望修改通融令長短與禮相稱冀望久長安穩破陳樂有象武事慶善樂有象文事按古六代舞有雲門大咸大夏大韶是古之文舞殷之大頀周之大武是古之武舞依古義先儒相傳國家以揖讓得天下則先奏文舞若以征伐得天下則先奏武舞望請應用二舞日先奏神功破陳樂次奏功成慶善樂先奉敕於圓丘方澤太廟祠享日則用上元之舞臣據見行禮欲令天皇酌獻降復位已後即作凱安六變樂止其神功破陳樂功成慶善樂上元之舞三曲待修改訖以次通融作之即得與舊樂前後不相妨破若有司攝行事日亦請據行事通融破陳樂舞者是皇祚發迹所由宣揚祖宗盛烈傳之於後永永無窮自太皇臨御四海寢而不作既緣聖情感愴㣥臣不敢開言臣忝職樂司廢缺是懼依禮祭之日天子親總干戚以舞先祖之樂與天下同樂也今破陳樂久廢㣥下無所稱述將何以發孝思之情臣望每大宴會先奏此舞以光祖宗之功烈明堂大享帝準古禮鄭元義祀五天帝王肅義祀五行帝貞觀禮依鄭元義祀五天帝顯慶已來新修禮祀昊天上帝奉乾封二年敕祀五帝又奉制兼祀昊天上帝者伏奉上元三年三月敕五禮行用已久並依貞觀年禮為定又奉去年敕顯慶已來新修禮多有事不師古其禮並依周禮行事者今用樂須定所祀之神未審定依古禮及貞觀禮為復依見行之禮臣以去年十二月録奏至今未奉進止所以樂章不定敬之河南人官江寧縣令惟軒轅有道之君時著順風之美姑射凝神之主爰標讓位之芳斯皆遠鏡遺編遐希蠧册豈若道包千古業映百王先天而天弗違後天而奉天時化洽無遺仁含有截青溪之館闕四字紫府之鄉言招若士乃下螭紱佇霓裳希停絳闕之遊暫輟丹田之賞謹命終南山萬福觀道士麴元敬祇召先生之闕辰先生霞裝奄俶麥曲法師痛徽音之永隔收蕤松澗弟子祁行則丁元亮等悲陟岵之長往采絢芝巖共勒豐碑同甄盛烈先生姓王諱軌字洪範一字道模琅琊臨沂人也耀質珠川分枝璿萼姬儲下鳳周書美其輕舉葉宰飛鳧劉史記其神異綿聲遠系奚在言歟曾祖筠散騎常侍太府卿度支尚書文括辭林義殫學府既飛華於楚塞誠育德於梁州大父銛梁簡文太子洗馬招遠將軍洎陳大中正光祿大夫晨趨鶴禁夕侍龍樓出入兩朝聲猷纓侶從容二代譽掩珩流父瑜陳著作佐郎鄱陽國常侍蓬嶠含章乍增輝於蘭閣梧宮載筆時揚香曷於桂山抽簪陪置醴之賓偶乘簉脂車之彥竭誠以奉上鳴謙以接下常刷坐忘之宇乃秀行念之允先生養質鯤波終搏鵬羽遣之又遣元之又元志合天倪情含地籟施妍厲醜泯之而為一梃橫楹從混之而無二年甫八歲早喪所天痛彼髫年志符曾孝哀思丱日性掩柴仁屬陳運告終人神靡託玉炎鍾岫芝焚楚郊萬始之劫正墮背飛之淚三荊之樹唯下分條之葉萍流不定蓬轉無依賴乎祖父故人攜養寄諸包氏一經憩廡五載方離先生業契自然道通縣解貞心粹質有符天縱蘊靈和之茂範流太虛之芳潤弱齡去俗高步歸真太平觀法主王遠知踐三清之隩隅遊六學之津要翹心丹訣警慮元波既毀網於迷途乃分燈於暗室清規素論一代偉人先生頓轡元門思宏妙旨仍隨法主卜居茅谷為香瓶弟子一十六年夜寢夙興劬勞匪懈晨供沆瀣夕進流霞服義忘疲依仁無斁想朱公而思聖懷紫素以尋真浪情泉石披襟蘭杜抗巢由而狎鳥轥莊惠以觀魚每至風靚春山月華秋水猿啼危嶠虎嘯幽溪未嘗不警思緣情抽毫寫慮先生爰及冠年虔受經法養谷神於元牝遊浩氣於黃庭初在法主座下聽老子西升靈寶南華真人論退席之際即為人講説五行俱覽一字無遺辨若建瓴詞同炙輠法主歎而言曰吾道東矣何獨康成洎隋氏握圖物色巖穴旁求俊異旌賁英翹王法主美孕三仙芳踰七聖爰降絲渙追赴東都先生此辰從遊京洛朝陪瑣闥夕侍銅池出入兩宮聲華四部若匪體符真智志叶虛舟豈可應彼弓旌允茲綸召當時奉敕玉清元壇行道豐廚享膳既饌玉而漿金供帳芳華亦鋪霞而藉錦隋後主薄伐元菟先生扈從黃龍車駕凱旋陪還洛邑大業十一年有詔特委先生於河南二十四郡博訪緇素有道術異能雜技德行講説灼然堪供養者及精通道法之徒並具狀追送駕所以茲銜命言歸舊廬俄而炎運道消蒼靈失馭黃巾赤眉之侶蟻聚挺妖緑林青犢之儔蜚肆蠆關河路絶因即避亂名山遂歷天台赤城四明桐柏金庭蔡隩縉雲若耶悟一息之難追知百年之易往乃隨時石室或逆旅曲枝折桂紉蘭潄流自樂日月居諸復淹十載而黔黎塗炭縣命有歸我大唐鳳舉晉陽龍興渭涘掃欃槍以居南面除猰㺄以正北辰御極紫微負圖黃屋靜稽天之大浸滅炎崑之燎火包日月以為扃牖苑溟渤以作池隍列圭璧於長安大禮儀天地之軌陳簨簴於清廟大樂節天地之音先生既屬文明遂動思歸之引整虬馭振霓裳背天台還地肺入轘轅而迎法駕遊郟鄏而謁真人太宗文皇帝遊心寥廓之津開玉京於碧落凝神杳冥之境敞金闕於絳宮睿哲於是照臨至聖以之綿邈而亭生母之私宏遠然隨迎之道未臻遇崆山之順風仰瀨鄉之微旨於時法主尚承恩梓澤未果言之柳汧故遣法師先還修葺許陶遺址此觀梁武皇帝於許真人舊宅為陶隱居建立號曰朱陽皇明啓運更以華陽為目按真誥云華陽第八洞天之名也其山則崇巖隱天入雲逵而上竦盤基括地帶風溪而旁屬東連林屋飛九轉以遊仙南控羅浮開五便而納聖西通峩嶠遠屬犀津北振岱宗遙翻鶴駕固靈祇之窟宅誠羽客之留連者也而舊基夷漫餘迹淪蕪先生更翦棘開場肇茲崇構敬造正殿三間兩廡並及講堂壇靖房宇門廊飛桂棟於煙衢則黯然雲布架梅梁於霄路則赫爾霞舒虬簷軒舉征鶤度而嘹唳鳳甍孤峻賀雀仰而聯翩豈止蟭羽生風胡人竦貌而已抑靈光之易接何景福之難酬者歟又於內殿奉造元始天尊像一軀光趺八尺左右真人夾侍神儀肅穆法相希微圖面影於月元寫毫精於日亮柱光雙彩表瑞金經掌耀十文摛祥玉札遂使天華聖伎睎菌閣而來儀羽斾雲軺睋蕙樓而戾止先生於是排翠扆而扇元風遊赤墀而宣衆妙運慈舟而濟有待揚智炬以照無明惠澤與鯨壑同深勝躅媲龜峯比峻大哉美矣信無得而稱焉法師往於名山福地感遇真經晚居華陽又摹寫上清尊法洞元洞神符圖祕寶並竭鍾魏之模楷盡班倕之剞劂緘封靜室永鎮山門先生自幼及長恆味松朮平生齋講傳授所有信施並入功德賙救貧無乾封二年歲在丁卯十一月丁巳朔旦朝禮畢乃顧命門人曰吾昨五更倣佛夢中見有三人羽衣嚴整手執簡策進於房內告云華陽天宮素已品藻用師為神仙萬人主者兼知校領省官且法師才德清高宜居此任今重奉命邀迎請當行矣吾昔在桐柏山中已感斯夢辭不獲免須應此召遂戒勗門人示以修道要訣經書法事各有付囑其月八日頻索香湯沐浴改易冠帶更服新衣九日寅時異香入室整褐端笏奄從解化春秋八十有八粵十七日癸酉以符竹託祔於華陽觀雷平山西陶貞白墓右悲夫重惟先生德叶二儀情包六氣生而岐嶷長符規矩黃中表稱丹穴凝姿白鳳遊豪掞華文於翰苑碧雞飛辨析妙理於談叢體共神俱性與道合皎貞心於松路棲苦行於雲衢固乃鵬鷃齊區彭殤一致西山五色空想仙童淮南八公徒聞鴻烈弟子戴慧恭包方廣吳德偉王元熠等十有餘人並價逸楚材聲超稽箭承音闕里服道緇闈皆痛甚摧梁悲逾臨谷挹金華而結欷尋玉輪而增耿日月逝矣而清猷尚存見課摛文乃為銘曰至人無待上德難名心凝丹竈神遊玉清搏風鵬羽擊水鯤瀛青溪孕質碧落蜚聲其一質茂松筠氣芳蘭芷性同濠上情符闕里爽節川停高風嶽峙徘徊林壑放曠文史其二元珠已得白雲可馭目牛無全害馬斯去黃庭育德紫宸欽譽爰紆渙璽俄悲漬絮其三照雪崆洞凝霜姑射雲虬散弭雷軿徙迹乍看埋劍還睎留舄眷言宏誘其方孔碩其四重惟芳靄再美成功災延絳闕火浣丹宮開榛剃草餘基永隆虹盤鳳翥有類神功其五柳谷思陶芝田揖許四朝愈欣三茅宴語野調霞軒山情月舉亭臨霜嶠池連風溆其六猗歟法侶聲猷業邃智境未窮勝因先墜將鄰埏埴功虧覆簣素標真宰寧資美諡其七倏睹龍姿俄觀蟬蛻釋謝星隕任委天折吁嗟應真示同生滅紀仙官於紫府勒貞徽於翠碣其八
