front:
  text: 全唐文欽定全唐文卷三百六利文河南告成人
  hash: sha256:c3b498057dc2caffae41559041403f0e14f6555a46ef4d485750ca1a16783b4c
  markers:
  - {type: head, offset: 12, content: 王利文, id: KR4h0168_NFKB_306-h1, level: 1}
body:
  text: 陛下往在藩邸扈從三陽在臣宅上休憩臣宅北坂之下陛下以為毬場自夏徂秋往來遊賞其地因感聖氣今有瑞麥生苗或六穗分榮或一莖數秀方圓縱橫不離場邊自非至德潛通豈有瑞應若此義龍元宗時人大哉乾健者斗極鄰影洽於梵宮至柔者坤貞山河載於賢劫是闕四字域闕二字有闕三字風闕一字釋提闕四字而凝浩氣雖復道應形器鴻罏為滯有之因理涉名言㣥籟起談空之亹況七覺元猷三明奧旨體權實而兼遣鑒闕一字內而闕一字忘闕一字彼闕五字之可察方茲罔象豈神妙之或闕一字故百億須彌三千剎土仰天津而引派則業火咸消瞻覺路之元門則情塵共偃闕四字斯見闕六字大矣乎至聖闕一字仁固無得而稱巳豈不以闕二字日月德配乾坤闕一字其賾者逾深討其源者闕二字開業寺者育王達羅闕十二字當地闕三字龍交會闕一字所七闕一字元明之地遂立淨觀至大闕一字五年天水公衛尉卿冀州刺史趙郡闕一字趙闕一字靈根入淨慧闕六字以間邪闕一字乾域而入室闕三字紺並遺修多齊服冰紈咸歸妙藏觀其湮滅數百餘年通徹宗祊闕一字繼不絶至後魏延昌武闕二字族闕十一字育王之聖闕三字帝之英聲撫事興言起葺寺觀初名偃角復易名隱角及至隋末唐初闕四字姚義闕二字之所出闕十一字土恆華闕一字其闕三字以永建望形勝疊障千尋列香罏而吐霧雲樓萬室舉綺袂以成帷闕三字眠樹福闕一字廣遠闕十四字觀其地勢爽塏周神師聿修淨業花臺寶剎架回浮空層閣步檐飛丹列紫如化城之壯麗譬闕二字之闕一字高闕一字氣桃闕四字陽闕三字者窺上忍之門入其闕一字者踐菩提之域總法門之交際者其在徹寺主焉諱徹俗姓郭闕一字族闕二字原歷官闕七字為闕一字氏縣人也闕一字祖諱貴齊岐州刺史贈輔國大將軍氣陵闕一字表威鎮燕垂靈臺不新神襟自逸祖諱炎闕十五字小闕六字臺之高闕三字好闕一字下揚閣而三闕一字家積賜書門闕三字命賞次祖諱平唐初闕二十三字聖於白虹練湯文於青闕一字大邱鳴雁德星之應可期闕六字之符斯在父諱闕二十二字紀闕一字歷帳內親軍授綏戎副闕四字許州行參軍息闕九字雅闕二十字為闕四字陸縣令闕三字落闕二字拂衣高蹈騖三垂之正路尋八闕二十八字與闕二字維那四輩及道俗等為國敬造淨土石人堂臺所未能周備寺主闕二字餘闕二十九字宿之分暉闕二字志以董修罄虔心而孝養旁求郢匠廣召山闕二字魯殿之新成采闕二十五字刻文闕一字於闕一字砌闕二字柱於瓊階龍角爭騰翻闕一字照室風輪闕三字八會而闕二十三字居闕七字俗由乎闕二字寺主僧闕一字正上坐僧惠隱前都維那闕一字慧周闕一字都維那闕二字武闕二十六字門徒等闕一字高堂之闕三字有遺音睹讓坐之雙尊非纏闕一字滜闕一字空階於十闕二十五字鶴樹闕一字心闕六字此大施主令君之子娛金素里命駕青闕二字見石髓之闕一字驟聽蘇門之曲空山闕二字乍闕十七字祗闕八字襲緇衣之果豈非法王錫類遠被孫謀者哉下官闕二字樂闕一字忝謬闕一字膠藉孔李之通家闕三字之至傶闕二字所闕四字而多慙筆札見知在三軍而無愧人稱顏冉器惟圭璧敢相質天書庶芳名於帝石其詞曰法身不凋寶相闕四字他闕八字北闕三字西嶺形寫鷲山闕一字如雞白駒常縶紺卉恆萋魔精夜落惠日晨隮聿修靜觀來坐菩提狐池繞砌闕二十三字跡嗣闕一字重闕一字爰有惟孝地蔣闕一字慈咸從五養俱稱大悲銀樹開闕一字金沙映絲猗闕一字上德折檾承訓林闕四字觴秋闕十六字嶠杖節圖真闕二字寫妙福緣遊觀俯抑廊廟喁喁俗侶躋躋僧徒心驚夢幻思闕二字湖鳳剎闕二字鯨鐘夜闕一字孝珠冰淨智刃霜潔闕六字龜碣寒暑闕一字謝徽塵無絶彥雄開元十三年官正字禪月西隱戒燈東照談真利俗稀代稱賢智炬增輝法師一人矣法師諱象字淨業趙姓族著天水代家南陽冠冕相輝才名繼美因官徙屬今為京兆人也父辿天馬監沈默攸博安適務時英閒出奕於儒門從法化生獨鍾於釋子法師即監之仲子也器宇恢嶷風儀宏偉長河育量汪然括地之姿秀嶽標形峻矣干天之氣髫年慕法弱冠辭榮高宗忌辰方階落彩帔緇七日旋登法座觀經疑論剖析元微念定生因抑揚理要法師夙棹元津早開靈鍵入如來之密藏踐菩薩之空門凡所闡揚無不悅可嘆未曾有發菩提心稟其歸戒者日逾千計法師博濟冥懷沖用利物嘗以大雄既沒法僧為本每至元正創啓周飾淨場廣延高僧轉讀真誥洊興勝會法服精鮮受用道資出於百品預茲位者應其成數所施之物各發一願願力宏博量其志焉風雨不已草餘載菩薩以定慧力而大捨法財此之謂也無適非可住必營建厥功居多思力如竭粵延和元年龍集壬子而身見微疾心清志凝夫依風以興隨烟而散來既無所去復何歸夏六月十五日誡誨門賢端坐瞪視念佛告滅嗚呼生歷五十有八即以其年十月草五日陪窆於神禾原大善導闍黎域內崇靈塔也道俗闐湊號惋盈衢不可制止者億百千矣門人思頊等乃追芳舊簡托美遺編永言風軌思崇前迹空留鎖骨之形敢勒銖衣之石其銘曰佛日既隱賢雲乃生傳持正法必寄時英時英伊何猗嗟上人捐軀利物愛道忘身磨而不磷涅而不緇博濟㣥有是真法師定慧通悟檀那上施願力宏廣成無住義應真而來代謝而往哀哀門人撫膺何仰靈德若在休風可想敢勒遺塵銘徽泉壞憑官左威衛録事參軍古之所謂列仙者執大全以御於自然遊無有以至於不死旁午衆妙而登夫太元蓋著自元元成於天師備諸簡寂而詳乎貞白得貞白之道者曰升元升元以授於體元自三真在天㣥學無主主道之柄必將有人天以司馬真人為木鐸歟不然元標靈符遹駿若是尊師族司馬氏世居溫晉彭城王權之後隋親侍都督晟之孫皇代襄滑二長史仁最之子夫軒冕奕代是謂令緒忠賢繼出必生異人故子阿推惠許真於以降跡初成行慈茅君所以升道抑有由也宗師諱承禎字子微法號道隱生而能言幼而知道天錫奇表神仙正性老莊大旨也引而伸之楊許內學也默而存之潔其行聳其德識窮精微思入虛極議者謂冥冥之翮不可屈而致年二十一始服巾褐入道師體元先生先生中嶽之隱几者也尊師神凝用簡情汰事落其秉操不可瀆其執勤不知倦體元乃灑然異之他日以金根上經三洞祕籙許真行事陶公微旨盡授於我尊師高悟獨得虛融大通發揮道真出入元奧嘗夢有鳳鳥銜璽置於法案刻曰授君東華上清真人由是寶其壽神其行聽於氣息於踵則七日而外物三月而遺形一年而遊於無有矣且鑿坯而遁其隱跡非應物也狂歌而遊其內修非教人也吐騰奇術其眩愚非保真也偃仰下位其容身非高代也尊師是以務宏道不滯其用方善救不寧其居入覲聖上九重肅廣成之謁出應時賢㣥公交子訓之請故行而無迹事而無傳虛受以曲成廣照以吹萬或外符能鼓其動或內楗善閉其關或燕處而潛偶㣥真或冥升而密行上界斯則不可測已而後遊句曲步華陽之天棲桐柏入靈墟之洞尋大霍采金瓶之實登衡山窺石廩之祕皆山鬼貢藥天真授經猛獸護門野禽繞座若此又不可備論也開元十二年天子修明庭之思接萬靈動汧水之駕獎邀四子乃徵尊師入內殿受上清經法仍於王屋山置陽臺觀以居之師以王屋小有之天總真之府景氣幽欻神祗會昌矧吾道苟行奚適不可翻飛投足遂有終焉之志更於觀之乾維高邱之午窮極絶界得中巖臺上直大壇下繚大阜巨木圓抱鳴溪中落每養龍大谷相鶴中峯燎金洞之衆香吸石窗之鮮氣有日矣初隱居抄撰道書為證真隱訣其存修之道率多闕文尊師乃著修真祕旨十二篇見行於世至如發晨蘊以陳呪步宵壇以飛章回冥威於三官走故氣於百鬼一以皇極增峻息金革水旱之虞一以人寰載清無流庸疵癘之警亦尊師之力也抱一守寂反道歸根之理既盡洎鍊景回元乘飈蹈氣之術又備可以逶迤造物保合大均觀變化而沖和其心撫陰陽而寥廓其視豈兩儀之細而同其濁質萬化之雜而拘其清神哉歲乙亥夏六月十八日顧謂近侍曰吾已受職元都不復得住遂部署封檢將若遠適逮昏有赤雲繚繞摩地而來簫聲泠然乘空而去衆咸驚駭謂必上升遽奓戶而入已蛻形矣越二十一日㣥弟子相與瘞杖舄於西北之松臺制贈銀青光祿大夫諡曰貞一并上自製碑申寵章也門人曰尊師之生也五百年甲子矣常見體如寒松心若明鑑居絶憂喜生無嗜欲昔住嵩嶂則後阜松生及移台嶺則東壁泉湧幽居於南嶽則元鶴蔽野坐忘於茲山則綵雲滿室若乃高姿逸軌近類華陽俄聞偉藝遠齊抱朴其善誨善誘則常以為已任若性與天道亦不可得而聞宜其馳轅於妙門遊刃於真宰邁元德而同世恤宣至理而障㣥僞及揮斥萬仞翺翔四空凝冰者理順捕影者心伏於戲豈古登天遊霧而不死者夫河東郡寶鼎縣主簿司馬綱師之猶子也餐味密訓倘佯精廬禦侮道門翹足仙事乃恢張遺寢制造新廟將謂靈仙不妄且以虔奉有所考室也侈而大之立主也尸而祝之徒見反宇蘧蘧高松杳翠靈響虛應圓光夜燭亦神異也僉惟昔之得道者智有如江如海惟深也我師則無不在德有如邱如陵其高也我師則不可升故塞於瀛縣馨於圖史豈遊其門者能象其迹而綴其美乎誠以立祠者表靈之道刻石者宏教之端思存乎阜鄉之遺風景行乎靁平之故事若述作之奇偉見於萃集感應之幽微存乎內傳云爾乃作頌曰大元混茫上境遼廓沖用斯應翰飛是託道其深微人孰營度不有真匠疇能係作偉哉真匠乘運挺生超乎長存隱乎無名元退首出道再演成潤色大象猗那之精至精伊何能修體妙大象伊何能勤廣照周麾後學緣飾垂教弱喪知歸晞光胥效從道於中以克大道終處其厚奄荒無有七域昭賁百靈奔走夫生在命此身能久且曰無待著名列仙嗣武貞白齊明稚川解玉何地回旌幾年靈廟之下空瞻洞天仲昌字曼卿太子賓客魏國公元炎子以通經為修文生調河陽尉開元中對策第一授蒲州法曹參軍判入異等遷監察御史坐纍為孝義令徙下邽終吏部郎中伏奉去月二十七日敕太常卿韋縚奏稱正月十八日恩赦節文籩豆之薦或未能備物服制之紀或有所未通宜令禮官學士詳具奏令諸馨香之物甘旨新鮮肥濃之味陸海所産皆充祭用每座籩豆各加十二酒爵制度亦令廣大者褊學固陋嘗聞於師猥參廷議之末思答守官之用謹按禮曰夫祭不欲煩煩則黷亦不欲簡簡則怠又鄭元云人生尚褻食鬼神則不然神農時雖有黍稷猶未有酒醴及後聖作為醴酪猶存元酒示不忘古春秋曰蘋蘩蘊藻之菜潢汙行潦之水可羞於王公可薦於鬼神又曰大羹不致粢食不鑿此明君人者有國奉先敬神嚴享豈肥濃以為尚將儉約以表誠則陸海之物鮮肥之類既乖禮文之情而變作者之法皆充祭用非所詳也易曰樽酒簋二用缶納約自牖此明祭存簡易不在繁奢所以一樽之酒二簋之奠為明祀也抑又聞之夫義以出禮禮以體政違則有紊是稱不經薦肥濃則褻味有登加籩爵則事非師古與其別行新制寧如謹守舊章又漢家園陵八節上食自茲以降代行其典國初貞觀之後禮法刊定今陵寢見有八節之奠兼朔望常食聖心追遠每物加薦不敢黷於宗廟請施之於園陵愚忝主司顧非知禮布之執事惟裁擇焉又外祖父母請加至大功九月姨舅齊類加至小功五月堂姨舅舅母并請加至袒免者謹按儀禮曰外親皆緦又曰外祖父母以尊加從母以名加并為小功五月其為舅緦鄭文貞公魏徵已議同從母例加至小功五月訖今之所加豈異前旨雖文貞賢也而周孔聖也以賢改聖後學何從堂舅堂姨舅母并升為袒免則何以祖述禮經乎如以外祖父母加至大功則豈無加報於外孫乎如以外孫為報服大功則本宗庶孫何同等而相陵乎儻必如是深所不便竊恐內外乖序親疏奪倫情之所沿何所不至理必然也昔子路有姊之喪而不除孔子問之子路對曰吾寡兄弟而不忍也子曰先王制禮行道之人皆不忍也子路聞而遂除之此則聖人因言以立訓援事而抑情是明例也禮不云乎無輕議禮明其蟠於天地并彼日月賢者由之安敢小有損益也況乎喪服之紀先王大猷奉以周旋以匡人道一詞寧措千載是遵涉於異端豈曰宏教伏望各依正禮以厚儒風太常所請增加愚見以為不可謹議考工建官匠人營國既匡政本將懋彞倫惟彼京師式模大壯三門烟竦九軌繩列殷稱重屋周曰明堂必有以懸之工理資置臬之審晝規日景夜考星躔陽不遁來月焉藏往屬吾君稽古庶政文明將太朴為城池用無私為宮闕凡諸奢靡咸悉棄捐瞻言主司雖設何有況典同之務隸在宗伯雖舉公道全非守官輒相奪倫焉以逃責望貽出位之誡以厚正名之典師貞以律大易微言㣥吏聽誓先王垂則僕氏致躬厮役頗事戎昭似乘邱之總立寧執御而無勇遂使秋一作狄還塞北介胄慙容日暮城南鼓鼙傷氣監軍執簡而往操刀必割冀圖賞罰以制忠邪但授綏匪流矢斯驗嘉赴敵以徇節亦議功而何妨禮經孔昭誄德惟允實僕也之非罪宜捨諸而無惑陟字殷卿宰相安石子十歲授溫王府東閣祭酒朝散大夫肅宗朝為吳郡太守會永王璘兵起委陟招諭乃授御史大夫江東節度使事平除御史大夫拜吏部尚書卒年六十五贈荊州大都督永泰元年贈尚書左僕射諡忠孝淮西節度使兼御史大夫瑱江東節度使御史大夫陟淮南節度使御史大夫適銜國威命各鎮方隅糾合三垂翦除凶慝好惡同之無有異志有渝此盟隊命亡族無克生育皇天后土祖宗神明實鑒斯言楚初仕為臨淄掾調長安尉轉起居舍人遷禮部員外郎出歷司馬長史治中善乎庖丁之養刃也鋒不鈍鋭不衄橫爽氣以凜凜頓霜威之肅肅內則道協於心外則手應於目三年之後不見全牛於是手以之發刃以之投其虛其徐刃以吻合所倚所觸血自潛流牛之間兮稱有刃之厚兮云無以無厚之刃入有間之軀與切泥而不別將委土而何殊忘其骨節之難易未嘗肯綮其斯須以天合天騞然響然目不視矣手有存焉之導兮自大卻之批兮自穿始以一剖終以萬全匠石代之以運斤未可爭長孔闕一字殺之而用劒難乎同年則說屠羊以淺術望鼓刀以戰栗期百發而百中笑無固而無必乃知丁之道也可久丁之伎也難有利推百鍊不愧於太阿聲中八音自合於經首日居月諸勇其賈餘君欲口傳等文惠之相好我方神遇覺良庖之不如若然者遊合逍遙之事刃合虛白之意儻遊必有方刃何不利冉冉兮雖不可知恢恢兮常有餘地方將解千牛然後躊躇以滿志問朕聞至道雖微不言而化皇天陰步馬相叶其彞信寒暑而生成施雲雨而沐潤垂範作訓樹君育人時有澆淳教垂繁略成湯既聖禹道云亡桑扈谷風屢動詩人之刺塞門反坫時遺宣父之嫌我國家拯彼頽綱開茲盛業朕以不德襲號乘時而皇極之道未敷謨明之軌尚闕思宏厥理其義安從至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要又四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋余疑對臣聞昔在上皇之撫運也政寬事明法簡心一仰察天道中順人情至於不言混然而化故上元所以眷命罔違於德下人安定厥居俾獲其利暑往寒來以信之雲行雨施以從之於是乎疫疾不生禎祥洊至巍巍蕩蕩蓋無德而稱焉自大道既隱淳原且散或救弊以忠敬亦隨時而損益成康已往頌聲不作俗薄禮廢政荒人亡故其詩曰交交桑扈率場啄粟習習谷風以陰以雨此則刺上不能行政者也仲尼生周末傷道不行乃刪詩書定禮樂立君臣上下之節明奢儉揖讓之序尚不敢救當代變於陪臣而稱曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮者矣自茲厥後頽波浸流有聖哲之君聰明之后豈能振彼凋弊張其紀綱不有我唐興建鴻業乂寧黔首則掃地將盡求野多遺陛下統皇綱纂休運德澤汪濊仁風洋溢不寶遠物則遠人格所寶惟賢則邇人安勸農桑恤刑獄不奪三時之務且惜十家之産左右伊呂郡縣龔黃是以驅俗於雍熙納人於軌物者也豈不徵賢良論政要所以達四聰也臨前殿察㣥言所以收九術也梓匠舒幕所以禮賢也凌人散冰所以救渴也臣竊以自古求賢之盛未若今日者矣賜臣制策曰皇極之道未敷謨明之軌尚闕思宏厥理其義安從者臣實見可久可大之規非有未敷尚闕之事此陛下讓之至也愚臣安敢奉之若乃考前古之庶徵究禮樂之同異辨皇王之制度詳宗廟之禮儀此則陛下懸鏡九流常覽百氏索隱探異鈎深致遠已在聖斷豈有韙而疑者歟今下問愚臣遠議其事陛下豈不欲廣於明試察臣微才臣幸對揚敢不悉情以對制策曰視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者臣聞王者立極必本於天天事著於上人事應於下昔者禹平水土天告成功錫之以洪範九疇彞倫攸序又皇天降其有極皇大極中也言王者能行大中之道則陰陽和風雨時百穀用成俊乂用章也如是則視曰明聽曰聰貌曰恭言曰從則無恆若之生自去咎徵之應矣今天瑞降地靈集所有動作光孚化先則一以貫之道斯不遠矣制策曰禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要者臣聞夫禮由陰作樂以陽來樂與天地同和禮與天地同節誠能感神動物安上移風或以理內為同或以修外為異率由和敬靡不從之者乎施之人俗靡不盡善者乎制策曰四時武德制自何君五行文始本之誰代昭德武德莫辨所尊昭容禮容未詳所出者臣聞嬴政失御漢皇乘極文景致刑措之美武宣當雄富之盛故有四時武德之樂五行文始之舞昭德盛德因之而尊昭容禮容自茲而備臣才識愚陋學業虛淺猥當聖問茫然有失謹對恆山臨代惟嶽降神趙主藏其寶符武侯圖以兵勢是稱靈鎮且在祀典眷此宗伯用祭祁寒黍稷惟馨德之是賴牲牢不識職爾之由苟失沈埋之規何班咸秩之禮匪黷而慢宜其不歆自孽致尤將欲誰咎請從直指之按以塞曠官之責公橫海殊量干霄偉材鬱為能賢時負公望雄筆麗藻獨步當時峻節清心高邁流俗其為御史也則察視臧否糾遏姦邪其任郎官也則彌綸舊章發揮清議其拜舍人也則專掌綸綍翺翔掖垣其遷侍郎也則綜核才名規模禮物良由心照明鏡手握純鈎龍門少登鵬翼孤運猶且謙能下士貴不易交頃辱音書恍若會面眷顧之重宿昔不渝執玩徘徊緘藏反覆伐木之詩重作採葵之詠再興何慰如之幸甚幸甚僕誠鄙陋素乏異能直守愚忠每存然諾背憎噂少小不為蘧蒢戚施平生所恥故得從遊君子厠跡周行歡會之間常多企慕聊因翰墨輒寫芻蕘公往在臨淄請僕為曹掾喜奉顏色得接徽猷美景良辰必然邀賞㪷酒臠肉何曾暫忘分若芝蘭堅逾膠漆時范穆二子俱在屬城僕濫同人見稱四友嘗因醉後遂論晚慕官資衆職許公榮陽勃然不顧公誠相期於下郡咸及為榮志氣之間懸殊久矣今范郎中永逝穆司直尋殂唯僕尚存得觀榮貴此疇昔之情一也尋應制舉同赴洛陽是時春寒正值雨雪俱乘款段莫不艱辛朝則齊鑣夜還連榻行邁靡靡中心搖搖及次新鄉同為口號公先曰太行松雪映出青天僕答曰淇水烟波半含春色向將百對盡在一時發則須酬遲便有罰並無所屈斯可為歡此疇昔之情二也初到都下同止客坊早已酸寒復加屯躓屬公家豎逃逸竊藏無遺賴僑裝未空同爨斯在殆過時月以盡有無巷雖如窮坐客常滿還復嘲謔頗展歡娛公詠僕以衣袖障塵僕詠公以漿粥和酒復有憨嫗提攜破筐頻來掃除共為笑弄此疇昔之情三也公授鄭縣歸迎板輿僕已罷官時為貧士於焉貰酒猶出荒郊候得軒車便成野酌留連數日款曲襟懷旋愴分離遠行追送他鄉旅寓摻袂悽然雖限山川常懷夢想此疇昔之情四也公在畿內僕尉長安多陪府庭是稱聯吏數遊魏十四華館頻詣武七芳筵婉孌心期綢繆宴語應接無暇取與非他車公若無悒然不樂黃生未見鄙丨吝偏形此疇昔之情五也公遷侍御僕忝起居執法記言連行供奉舉目相見為歡益深煥爛玉除之前馥郁香爐之下仰戴空極盡覩朝儀若在鈞天如臨元圃此疇昔之情六也僕轉郎署先在祠曹公自臺端俯臨禮部昔稱同舍今則同廳退每得陪行就食尋常接坐攀由鴻鵠倚是蒹葭咫尺餘光環回末職官連兩載事同一家此疇昔之情七也復考進士文策同就侍郎廳房信宿重關差池接席掎托之務仰山彌高於時賢郎幼年詞翰公以本司恐謗不議祁奚僕聞善必驚是敬王粲驟請座主超升甲科今果飛騰已遷京縣雖云報國亦忝知人此疇昔之情八也凡人有一於此猶有可論況僕周旋若斯足成深契所以具申前好用呈寸心非欲稱揚故為繁冗今公全德之際願交者多昔者未達之前欲相知者少於多甚易在少誠難則公居甚易之時下走處誠難之日本以義分相許明非勢利相趨早為相國所知纍遷官守其在銓管也用僕為京兆掾其在台衡也用僕為尚書郎隻字片言曾蒙激賞連讒被謗備與辨明察於危難之情知在明教之地後緣疏惰自取播遷顧三省而多慙甘一黜而何贖歷司馬長史再佐任治中萬里山川七周星歲從閩適越染瘴纏疴比先支離更加枯槁盡作斑鬢難為壯心常情尚有咨嗟故舊能無歎息非辭坎壈但愧揶歈遍觀昔人沈淪多因推薦其有超然却貴自達十不二三以管仲之賢須逢鮑叔以陳平之智須遇無知以諸葛之才見稱徐庶以禰衡之俊見藉孔融如此之流不可稱數其於樗散必待吹噓如公顧盻生光翦拂增價豈忘朽株之事而輕連茹之詞乎即有言而莫從未有不言而致世稱王陽在位貢禹彈冠彼亦何哉非敢望也復恐傍人疏間貝錦成章僕既無負於他人人豈有嫌於僕愚之竊料當謂不然彼欲加諸復難重爾嘗試疑大抵如之或在蒼黃或於疑似都由聽授不至分明便起猜嫌俄成釁隙廉藺獨能生覺蕭朱杳不深知備出時談可為殷鑒且今之執政必也擇人若非文儒祗應吏道僕於藻翰留意則下筆成章僕於幹蠱專精則操刀必割歷官一十五任入事三十餘年夫琢玉為器者尚掩微瑕僝木為輪者猶藏小節僕縱有短身還有長至如高班要津聽望已久小郡偏州常才為之嗟乎不與其間益用惆悵要欲知某郡太守以示子孫未知生涯幾何竟當遂否天不可問人欲奚為然則同時郎官及餘親故自僕貶黜之後亡者三十餘人皆負聲華豈無知已不與年壽相次歿於泉扃有若范宣城等就中深密最與追從亦思題篇匪朝即夕索然皆盡非慟而誰不奈吾儕多從鬼録獨求榮進實愧無厭向前借譽於公是謬自頃探釋氏苦空之說覽莊生齊物之言寵辱何殊喜慍無別希求速進者示必以前有永甘棄廢者未必以後無倚伏難知吉凶何定朝榮暮落始富終貧范卷簀而後榮鄧賜錢而餓死當黥而貴折臂猶亨翻覆何定闕二字波瀾飄飄風雨任運推轉何必越性干祈但以鄴城最當官路使命來往賓客縱橫馬少憩鞍人當倒屣俸祿供幣蓋不足云筋力漸衰故難堪也儻少乖阻即起憾詞誠兼濟之義存若屢空而理在加以物務牽率形役徒勞幸有田園在於河內控帶泉石交映林亭密邇太行尤豐藥物數千卷足覽古今子姪五六人薄嫺詩賦兼令佐酒何處生愁更引圍碁別成招隱風來北牖月出東岑往往觀魚時時夢蝶唯開一徑懶問四鄰潘嶽於是閒棲梁竦由其罷歎行將謝病自此歸耕儻不遂微誠明神是殛遠陳本末之事庶體行藏之心秋中漸涼唯納休謐出處方異會合無期願以加餐匪唯長憶不具張楚白
