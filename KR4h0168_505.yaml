front:
  text: 全唐文欽定全唐文卷五百五權德輿二十三
  hash: sha256:c3eef33e4d7d71c5ae34281b3ee05ddd83df4840c7ab96aae489c3b85034ac4e
body:
  text: 惟元和四年夏五月丁卯冢宰趙郡公巽寢疾薨於永崇里享年六十三天子憫然不視朝追命右僕射冬十月乙酉返葬於洛師緱氏縣芝田鄉之大墓公字令叔趙郡贊皇人曾祖知讓皇河南府長水縣主簿祖承允江州別駕贈太府少卿父嶷右武衛録事參軍飾終四加至尚書右僕射代載德善至公昌大始以明經筮仕為華州參軍試言超絶補鄠縣尉登朝為監察御史殿中侍御史由美原縣令課最為刑部員外郎由萬年縣令課最為戶部左司二郎中由常州刺史理刑第一徵為給事中以御史中丞領潭州刺史湖南觀察使就加右散騎常侍以右散騎常侍領洪州刺史江西觀察使就加御史大夫由二府報政入為兵部侍郎在塗加度支鹽鐵副使至止踰月代今司徒岐公為使明年遷兵部尚書閒一歲轉吏部尚書總八柄平九賦左右理道以紓元元天子方推心竦意倚以為相奄然大病斯可痛也公溫重方嚴愷悌忠清得洪範之正直稟大雅之明哲強志特立為儒門吏師中臺草議左曹還詔法程之下無尢違分畫之下無差失其為二方循班制建長利布以休和樹之風聲大凡都府歲杪使刻深吏周行支郡鈎托泉貨二千石不相聊生如梏拲然公至分命部從事覽觀禮俗問人疾苦廉吏善否而已至有經用之羡使郡自為理得以蠲乏用補庸亡府無私焉四履之內遇凶旱水溢捐有餘以均不足農里無大乏官司無宿憂而邦鄉碩生勸學講藝道彼輕僄率循教化皆有聲詩揭於康莊其制國用也調盈虛御輕重阜齊人之業而地不加賦佐公家之急而利無所滯先是池澤之稅因緣為奸牢盆以私幣貨寖濫公則去一朝之便質終歲之成變其苦窳以寬物力盈入之數不可勝條上嗣位之歲發武庫禁兵以誅劉闢三蜀之饋不乏於軍千金之費不征於人揚天聲於井絡斷戎首於齊斧是皆謀猷大績經理大本豈止於漢庭桑大夫耿中丞區區然商功利析秋毫而已哉其為天官已嬰寢患猶與郎吏切劘奏書去繳繞之科禁絶私回於胥吏士之得調者多受賜焉內外掃除之際精爽不亂與上介言職業雖康寧宴閒之不若君子以為難自解巾褐至捐館舍凡歷官十六利刃觸虛大車以載文理聰明卓冠出倫規為密靜矩度章灼大吏之所表的諸公之所嚴重其文采精實循道體要而不為曼辭其術學博洽折中定疑而不理章句喜士尊賢開懷盍簪絲桐博奕談笑嗢噱每有餘裕而無留事志在端正百度儀刑四方以謨明宏濟為已任而績用未究斯吾君所以當寧流歎而衆君子失聲怛化豈虛也哉凡三合姓初曰范陽盧夫人太子賓客幼平之女次京兆韋氏二夫人潁州刺史勺洎膳部員外郎襄之女以從祖妹而繼室焉皆以華腴淑哲不幸凋落長子紹左衛兵曹參軍鳳翔節度巡官專謹有馴行嗣子繼京兆府參軍飭躬彊學幼子紵編皆以門廕在仕紹繼等泣次先公官簿事業請書墓石且以理命見託故不得讓焉銘曰太行之東全趙古風鍾懿美兮左車武毅元禮文事叢慶祉兮天官冢卿莊重廉清大君子兮精金斷割良玉特達視所履兮表率二邦鰥孤惠康斯樂只兮均齊八政砥慎徽令有經紀兮宜登上台以賦㣥才命遄已兮緱原厚地追琢款識神在此兮有唐元老太保岐公諱佑字君卿年七十八以得謝之歲歲十一月辛未啓手足於京師安仁里皇帝恤然不視朝三日冊贈太傅弔祠加恩明年夏四月乙酉返真宅於少陵原大墓公之先自漢建平侯晉當陽侯而下忠賢輩出積厚昌大以至曾王父行敏皇銀青光祿大夫荊益二州大都督府長史南陽郡公王父慤皇中散大夫尚書右司員外郎詳定學士父希望皇銀青光祿大夫鴻臚卿恆州刺史西河郡太守飾終三加至尚書左僕射公總中和之粹靈蹈明哲之大方體仁以長人厚德以載物器周代資材為國華程功積事博達宏裕在元宗朝以門子筮仕解巾有聲在肅宗朝以郡掾廷吏賢侯交辟俄以臺郎御史二千石事代宗以六職之二十聯之重兵符相印事德宗初自度支郎歲中拜小司徒時當艱急政有均節持權者排陷改蘇饒二州刺史以亞丞相顓征南方入居左轄出典侯服旋委節旄貞師淮海凡居鎮十五年歷禮刑二尚書乃進左揆燮和大政拜章來朝兼理公台綢繆樞極在帝左右順宗諒暗公攝冢宰因山復土專護其任進掌五教乃平九賦永貞內禪公奉典策今上繼明真授司徒備物采飾裦優章灼推致四時之和茂明萬物之宜初公來朝之明年年及懸車抗章告老三上不允厥後詔公每旬一朝訪決重務以公年與德耆尊禮不名後八歲天子憫煩公以官職之事恩遂堅請禮優師臣大雅稱方叔元老且非宰政東漢之胡公中庸不理藩服曷若公都將相之重兼文武之全三代論道兩朝總已縉紳瞻仰者凡六十年致仕就第極其榮號嚮用五福暗然得之在臨川有愷悌之化涖南海有威懷之略自淮而南興事任力三邦之人類其聲詩炳如嵩華刻在金石公既當安危注意之重一人倚賴急宣密啓多所交感嘉保太平承寧諸侯或灑其煩言或導其善氣損怨服義日用不知至有執介圭朝象魏冠功臣之表近天子之光為時龜龍公所樞極喜士容物㣥而不黨理遣情恕犯而不校一言定交死生以之趨人之急唯恐不及不徼福不乞靈物怪氣焰不接於心術誠明坦蕩自得於天理中正之外無自入焉國門南出杜陵故地畎清流疏灌叢觴斚引滿金絲合奏時賢俊人結轍在門極謝安之林墅異陸賈之橐鄉耆時會鷗鳥不驚又以見公放懷推仁無不逮也至若閲天下之義理究先王之法志著通典二百篇誕章宏議錯綜古今經代立言之旨備焉凡推轂之士繇幕廷而奮迅者近於百輩將相六職左右曹臺以至列藩二千石不可勝書夫人安定郡梁氏蘇州常熟縣令幼睦之女也專柔淑慎動有儀矩先於公歿幾三十年矣嗣子司農少卿師損與其弟昭應縣令式方駕部員外郎從郁等皆以材能孝謹為卿大夫元士推擇之際以吏資廕庥之下有淑聲儼然摧剝相視無怙誠信哀敬實加於人以德輿常忝府辟晚聯台座每荷同升之義盍陳無愧之辭直書德輝以鏤幽礎銘曰君子之用可以大受斤斤岐公祗事三后謨明盛時其道甚夷乃將乃相乃公乃師六府和平五福叢滋齊之溫良商之慈愛推本性術發舒光大宣力中外勤勞翼戴縣車乞身知進知退歲在大梁月生一陽以佚以息忽乎茫茫廞襚納書禮優職喪智氣在上昭明光揚少陵鬱鬱蓍蔡協吉宰木號風虞泉落日吁嗟岐公居此元室德宗皇帝享國二十有七年注意於將相之臣惟魏國賈公諱耽字敦詩始則四握兵符保釐節制終乃再踐師長燮和樞極文武致用實寧斯人景鐘書伐金鼎和味咸有一德用平泰階奉綴衣之詔公始感疾先復土之期公乃捐館屬太上皇重公耆碩進加司空今皇帝憫公徽懿追命太傅春秋七十六佩相印十三年前史稱賈生通達國體其孫嘉好學世其家其曾孫捐之建議深切漢元帝為之罷珠崖郡皆其先古之有議論風節者也曾王父遠則皇長河尉生王父知義沁源主簿贈揚州大都督都督生烈考炎之燕居不仕贈尚書左僕射皆代德安貞延耀於後公忠正仁恕極深研幾究今古於百氏窮地域於九譯乾元初寰海未靜褐衣危言始尉太平連辟大府三入御史府再為尚書郎亞尹北都剖符西河嘉猷循行所蒞居最大歷十四年冬十月繇大鴻臚貞師於梁協力㣥帥平夷江漢青綬大封烜然光明進參六職節制襄峴載會兵車撫征淮右徵詣行宮真拜冬官明年以三后之任分正洛師加地進律察廉唐鄧復總賦輿鎮於靈昌政成八稔愷悌清靜於是膺審象之寄贊格天之業中外授受勤勞王家易坤之說曰地道也臣道也惟公有博載之量露生庶物書洪範之說曰強弗友剛克燮友柔克惟公推寬信之誠弻亮時化故其撫封也不尚禁厲不施皎察扶導善氣折銷未萌使貪者讓躁者靜四鄰敬之如神明闔境愛之如父母其作相也當先皇帝洪覆陰步馬財成造化宗工舊老但以忠厚承清光故公之揚庥德輝涵泳無際藹然和平之運恬然易之道至若匪躬詭詞勞謙不伐者亦何可勝言坦夷而周密廣大而潔靜從善虛已求天下之才博聞強識通天下之志斯不可及已所著梁懷王傅碑先君子碑陳祖德以自况載家聲於可久體要閎達邁乎㣥倫撰海內華夷圖及論次地理之書凡五十有五篇貢在中禁傳於域內言方志者以公名家被病更時屏絶醫術且曰吾以忠信為孔禱死生為天理一氣聚散斯焉順之美檟壽堂自為終制隤然委化以啓手足雖從古知命之士所難能焉夫人武功蘇氏駕部郎中守忠之曾孫處士珣之女有柔儀淑行歿於中身二十有五年矣嗣子疇太常寺協律郎早夭次子疄太子司議郎少子㽥京兆府參軍事馴行孝謹號咷毀瘠奉二尊裳帷合於九原刻茲樂石以永終古銘曰麟之儀儀鳳之師師有倬魏公發輝清時外總方國掃除螟螣入居公台左右皇極於學無不通於士無不容穆如和風叩若華鐘偉材閎議信以發志中行循性其道易易始初清明紀號永貞維陽月之朔日兮返智氣於冥冥下旬逮半兮祖載於庭神休古原兮閟此音形前直國門兮旁邇梁傅不忘本兮公之素笳簫啓路歸此壤樹嗚呼有唐元老兮魏公之墓析木之下幽陵碣石融結絪縕誕靈熊渾乃生元臣以翼大君惟彭城郡王宣力三代撫封四紀在德宗朝纂服舊勞以亞丞相得顓征伐冬官夏卿再踐六職乃列台宰乃居師長在順宗朝論道進律就加司空又拜司徒今皇帝聰明齊聖裦厚功德擢侍中中書令綢繆樞衡臨長諸侯元衮赤舄崇其物采九命二伯極其名器勳猷備於贊書終始焯於代家五年秋七月寢疾薨於莫州之廨舍享年五十四冬十月歸全於涿州良鄉縣之某原追錫太師不視朝三日命諫議大夫弔祠法賻廷尉卿持節禮冊又詔宰臣德輿銘於壽堂所以加恩報勞始終滲漏之澤也公姓劉氏諱濟字濟之蜀昭烈皇帝二十一代孫曾祖宏遠皇檢校司衛卿臨洮軍使襲彭城郡公贈宋州刺史祖貢皇特進左金吾衛大將軍贈揚州大都督父怦皇幽州盧龍節度觀察等使御史大夫贈司徒恭公公承是覆露生而岐嶷深而通直而和宏毅忠肅端明溫重固已蘊絶人之姿挺希代之器始以門子橫經游京師有司擢上第參幽州軍事轉兵曹掾歷范陽令考績皆為府中最興元初以太子家令為莫州刺史以御史中丞為行軍司馬凡吏理之慰薦輿師之拊循如良庖之無肯綮良農之無滅裂司徒即代有詔奪情節哀順變講信修睦先公之封畛盡在長帥之威惠畢舉比歲大旱蝝蝗為災潔齊蔬菲默以心禱甘雨祁祁嘉生莓莓因其豐登示以班制古諸侯之令典靡不具焉貞元初烏桓誘北方之戎幸吾阻饑大聳邊鄙公先計後戰陳兵於郊乃遣單車使者誘掖教告繇是諸戎皆為公用幹不庭方厥猷茂焉明年鮮卑墨乙之犯古漁陽其後啜利寇右北平公分命左右軍異道並出然後以中堅衡擊士不離傷師不留行冞入其阻抵青都山下捕斬首虜以萬級獲橐駝馬牛羊以萬數十九年林胡率諸部雜種浸淫於澶薊之北公親統革車會九國室韋之師以討焉飲馬灤河之上揚旌冷陘之北戎王棄其國遁去公署南部落刺史為王而還登山斫石著北伐銘以見志自太行以東懷和四鄰或歸其天倫或復其地理警急則解其顛沒居常則納諸矩度兵興以來氣俗相因或以奓敗度或以美沒禮比屋之人被縵胡而揮孟勞不知書術公乃修先師祠堂選幼壯孝悌之倫春秋二仲行釋菜鄉飲酒之禮生徒俎豆若在洙泗私門耽耽公署沈沈自從事掾史逮紀綱之僕稟稍有倫采章不紊接士必下以詞氣推賢而容其出處隴西李益樂安任公叔皆以賓介薦延至郎吏二千石為近臣良守此又烈丈夫大君子曠度卓犖之為也其於勤身裕物生聚教訓祁寒則頒以絮帛大歉則振其倉廩一方之人蒙被惠和嘉祥交於動植孝順浹於州壤美化周行無不及焉去年冬王師問罪於常山公率先蹈厲纍上功捷引義慷慨賦詩以獻詔宰司序引百執事屬和以美大之師次瀛州既圍樂壽又遣支兵急攻安平三旬未下武怒益奮命其子總以騎士八千先登公親鼓之士皆殊死戰亭午而拔誅屠無噍類蓋所以宣威制勝於可必也天子賜以寶劒金甲彤弓盧矢方董諸侯之師將覆其巢俄感厲氣隱機口占署總軍司馬曰無以吾故而稽天誅悉召戲下以須王命俄而下霈然之詔宥罪班師加公寵渥已至大病遺章悃款不及家事天下之人偉其忠勞總以君命起於倚廬之中委重戎事由御史大夫為工部尚書凡軍師之節制封部之廉察盡如恭公太師之命焉茹荼雪泣祗服丕矩以國僑之遺愛知公業之不亡生極榮號沒有愍冊揚名以繼志善訓以克家君臣父子之道斯為至矣裦大臣所以尊王命懿武事所以恢天聲敢攄馨香以識冥漠銘曰帝在法宮推心懋功洸洸彭城秉義納忠幽都朔易賜履來宅便藩渥命焜耀嘉績北戎病燕從古以然懷徠蕩定勇略昭宣燮和之重公作霖雨師律之嚴公為齊斧廓開祲沴振奮威武保大定功庇人尊主卻縠敦悅乃主成師善經義府公實似之北伐刻銘西征賦詩播於工歌列在鼎彞壯猷未極大暮如斯華首童牙辛酸涕洟義方紹續君命吉祿孝在無改恩延必復參差輅葆澶漫陵谷勒石下泉幽元照燭元和五年冬十二月戊寅太尉兼中書令延德郡王自河中來朝明年春二月景子發瘍薨於京師務本里第春秋五十皇帝不視朝五日冊贈太師冬十月乙酉歸全於萬年縣少陵原嗣子檢校工部尚書兼右金吾衛將軍克讓毀瘠號慕沒於倚廬之中追命尚書右僕射次子太僕少卿克恭檢校右散騎常侍駙馬都尉克禮等泣遵理命用誠信襄事舉書公之大績大烈請刻石以識云公諱茂昭字豐明其先燕人九代祖奇北齊右北平太守因封其地代襲王爵違難出疆雄於北方曾祖遜乙失活部落刺史祖謐皇開府儀同三司平州刺史贈太子太傅父孝忠皇義武軍節度易定等州觀察處置等使檢校司空同中書門下平章事上谷郡王贈太師諡曰貞武惟公承太傅貞武之遺烈受嚴凝溫厚之全性戴翼其代撫征其人戎容山立盛氣玉色英風義聲燀耀光明調鼎七歲秉圭三覲爰立於明廷考終於會朝卓爾拔乎倫類沛然滿乎觀聽凡異姓而王真食其封於三公備司空司徒太尉之任於三師歷太子太保太傅之秩纍階宰職乃於中書令名器始終與勳伐俱初公生當上元寶應之閒天下兵興感激代故閒關力用始自掾曹宮衛以至卿寺臺閣金艾采飾祗庸顯明寶臣物故成德不靖公以弱冠偏師破朝鮮於束鹿禁旅急病薊人挻災公以中權衡擊脫西平於清苑此其裕蠱宣力之章章者貞元七年貞武公薨於位朝廷以公狎貫戎重可輯寧一方繇定州刺史起領留府禮服外除策勳懋官統節制之師修方伯之職纍丁趙國魏國二太夫人憂喪祭情理一其哀敬凡三奪齊斬以從王事孝文當陽考禮述職瞻斧扆於法座順宗繼明保乂齊信執壤奠於翌室今上報本侍祠肅事奉圭幣於泰壇至於浹洽邴魏優游平勃錯綜事典習通儀制樹善於廟堂陳謨於穆清迥出功臣之表實行宰相之事矣前年冬詔武庫禁兵會諸侯之師於常山分道並出鹵帥絶太行越飛狐是日北道以公為主於是創廏置以闢磽陋悉芻米以給賦輿軍尉裨校待之滿志供具宴餼無非加等亦既壓境士皆賈餘公與㣥帥屈指環城有日矣恆人以步騎二萬踰木刀溝為從衡七里之陳來薄於城公擐甲出壁門徑當其鋒俾其子克讓與猶子克儉甥陳楚等分捔之設左右翼以待之出奇決命凡數十合取巧於七縱蓄鋭以三捷席勝鼓行橫尸如陵方申盡敵之算俄奉班師之詔因喟然曰自五十年閒兩河多壘縣官以在宥含垢懷和萬方推恩息人延代賜履或恃長轂且踰短垣至有相依若輔車相求若市賈雖有長智不能自還大丈夫亦當排氛雺而翔慶霄出樊籠以羾閶闔行之自我仁遠乎哉姑請軍司馬於朝使人狎其理然後以一方之地圖戶版三軍之駟介伍符授焉子文告令尹之政士蒍傳太傅之法拜章撰日盡室就途舉代得請然後有河內之命麾幢才至於理所劒履遽來於轂下沃心體國指掌論邊慷慨行義涕洟交感方受面命以班詔條嶷然持重為守臣表率其或行不俟駕幹不庭方清昆夷掃獯狁然後銷五兵為農器驅一代為壽域此公之心也噓夫以析木之下將相代家按節股肱郡在諸侯王上而薦紳文吏擁旄山東廉風俗於武旅之地修班制於戰爭之後是一舉也而二美行焉君子以為元和理平之嘉瑞雖西漢之白麟黃龍不若也始公割符三年而分閫又四年而進律以州為都府而為長吏又七年而為公明年作相最凡盛大幾三十年君臣極其感會天下仰其風采詔葬法賻率用汾陽王咸寧王故事所不至者歿於中身豈造於物者不與其全歟此吾君所以當寧流慟而歎其用之未極也夫人衛國夫人李氏滄州刺史兼御史中丞陵川郡王固烈之女閥閲慶祉淑明柔嘉由內外音徽以大凡所顧復皆為善良克讓以勞而貴以毀而歿克恭以才能歷卿士克禮以淑令儷夫人克禮之季曰沙門宏信宏信之季曰太子舍人克從少府丞克勤光祿丞克正等稟訓尚義執喪知禮閨門積厚名教多之德輿久辱深知謬參大政疇庸之命親奉聖謨撰德之詞式藏厚載銘曰太尉兵柄中書理本桓桓令君宣令分閫行旆搖搖馬鳴蕭蕭華衮九命介圭三朝乃率賦輿乃頒詔條先台諒暗氛霾蔽晦詞極切劘義形風槩皇明光宅績用章大恆碣之閒革車所會蹈厲策勳推授交代皇用疇庸遍登三公毅然舉宗來自山東周有申伯漢稱竇融乃陟其明於河之中行道有福為仁由己哀榮思福冠耀終始少陵為谷幽宅在此中南如礪令聞不已刻銘泉壚與天壤俱序曰陰陽和而萬物得君臣合而九功敘內竭忠力外修班制匡戴藩輔勤勞王家安危注意終始尊任明德大烈為信臣龜龍者其惟太保馮翊王乎太保諱震字遐聞本馮翊人後徙家於梓潼曾祖豐皇劒州司馬大父和本雙流縣尉贈遂州刺史仍代貞晦以至皇考審綱天爵內充聘問不屈蓋君平湛冥之遺烈也四追命至尚書左僕射公少有風節忠厚閎大學涉古今之變器包王佐之略三命官至合州刺史嚴黃門武時領方任置諸牙門副軍攘寇威望大著又三徙至太常卿秩銀青光祿大夫黃門既沒公亦居息常以智免不為利疚李僕射叔明之至也以前後功勞上聞起家拜渝州刺史公曰李公中外之姻也今茲推達無乃誘於私乎義無所苟移疾罷去是歲遷鳳州刺史充本道節度副使攝侍御史先是兵火未戢州壤蕭然庸亡斃踣數閭無幾公乃翦其荊棘弔其傷痍毀家以佐軍約已以裕人精力不懈視之如子未周月而四郊襁負感甚以泣曰嚴公之仁父母不若也尋丁內憂詔復厥職充興鳳兩州都團練使血涕拜章三上不允就加殿中侍御史至於御史中丞爵馮翊郡公進封鄖國階極儀同賞亦推恩居部十四年考課為天下最教訓盡其物宜編人有以質俚之詞攄其肝膈刻巖石而頌公者雖古之善頌不能加焉建中三年陟報政之尢修連帥之職拜梁州刺史御史大夫山南西道節度觀察等使後二歲皇帝以避狄之亂狩於是邦加戶部尚書馮翊郡王公以漢中形束壤制邇於京師陳謨主斷咫尺三接清蹕既駐皇心乃夷大僚法從儲峙肅給事不乏於上人不勞於下於是師期四合士氣百倍神武陰步馬諸侯鼓行丹水即戎乃申恢復之略塗山執玉克備聲明之禮夏六月詔梁州為興元府公為尹遷尚書左僕射真食二百室其於先事備戎贏糧積甲北達於駱谷成功翼從除道執靮西至於散關屬車以安重險斯濟明智一德合於宸衷仍歲來朝命賜備厚溫室宴見圜丘侍祠事業焯於功令形容繪於麟閣時所難能而公沛然常以同谷陰平備邊要害乃建堡壘新廩庾禦寇有金湯之固焉積粟有水火之饒焉出輿師以會漢南之討而人不知役操量鼓以濟中都之歉而敏必有程盡慮以幹王事多方以佐百姓而又精於鑒裁敏於推擇能樹善於幕庭終翰飛於公朝率由慰薦而後光大至於為宗工近臣賢大夫良二千石者列於中外書曰慎乃僚又曰俊人用章惟公有焉貞元十二年同中書門下平章事崇德報功於是乎在純誠積戀亟請朝謁上以一方戎重優詔止之十六年六月癸巳感疾薨於理所春秋七十六追贈太保廢朝三日弔祠法賻率有加數乃有兵符命書授公從祖弟代之才既得於官下恩實彰於身後及輤車之至也又詔有司備禮冊命以其年十月丁酉葬於長安縣居安鄉之某原前夫人武功郡夫人蘇氏劒州長史束之之女繼夫人沂國夫人王氏試左千牛衛長史舟之女咸具柔德以宜家道長子悈河中府士曹參軍次子協殿中侍御史劒南西川節度推官嗣子公弼以文學克家仕至國子監主簿以似續疏土封會稽縣男幼子公貺亦以修詞為州黨所薦祗服義方綽綽有裕哀敬誠信之禮備焉初公從父兄侁以含章好義歷中執法剖符盧山同氣曰堅曰霽曰霔皆卿才也堅為盛山咸安二郡守霽以殿中侍御史介於岷峨霔四為尚書郎猶子雅皆用文雅筮仕有名於時信乎致義貽訓知人之全也弼以德輿職忝司言知大臣之功行捧持官簿哀託銘篆是用論次藏諸九原銘曰憲憲馮翊平康正直柔嘉強毅允是三德端誠啓迪有大勳力河池理平物遂其生漢中經武人悅是舉智能扞患忠以衛主謀猷既臧翼戴以恭黃道捧日卿雲從龍梁山斯峻碩德斯鎮雕戈金鉉戎輅相印時惟元老克叶昌運方壯其猷天胡不憖塗芻即遠金石傳信作銘元堂永識休問
