front:
  text: 全唐文欽定全唐文卷六百十二鴻大和三年官尚書主客郎中
  hash: sha256:f220fa1060698f257b53804296c7c26bed606f4cf9b4d2f05addfc10692f64fc
  markers:
  - {type: head, offset: 13, content: 陳鴻, id: KR4h0168_NFKB_612-h1, level: 1}
body:
  text: 敘曰臣聞日月星辰紀乎天也山嶽江河紀乎地也歷數正朔紀乎帝也正氣為帝帝天號也統倫㣥生冠耀元符牢籠乾坤之精彈壓山川之靈威武薄乎八紘文明光乎百代功格皇天名在祀典以揖讓而登皇極者乃可言矣開歷垂統自始皇焚書為煙燼史官廢紀失傳其本後代儒者鑿天地心胸造生人聞見故諸緯書及皇甫謐譙周之徒得肆言上古之事恃無可驗競開異說臣少學乎史氏志在編年貞元丁酉歲登太常第始間居遂志乃修大紀三十卷正統年代隨甲子紀年書事條貫興廢舉王制之大綱天地變裂星辰錯行興帝之理亡后之亂畢書之通諷諭明勸戒也七年書始就故絶筆於元和六年辛卯自太易至太昊年代史傳無正說且書皇甫謐似是之言昔太昊氏迎日推策造甲子臣以為天地立於水成於氣氣萌萬物冒甲而生生主寅帝首太昊歲起攝提故書太昊首甲寅皇甫謐云太昊在位一百一十年又云子孫五十九姓傳世五萬餘歲又有循蜚等九紀亦無定年陶宏景云欲以數紀之生求知百代之上誠可笑矣臣非知古者亦不敢強為發正自太昊至炎帝世歷無明文存首而已舜行天子事八十年孔安國注云舜在位五十年三十而徵庸三十年在位歷試二年攝位二十八年服堯喪三年其一在三十之數為天子五十年凡一百一十一歲崩堯帝天下七十載得舜試舜三年一在徵庸正月上日受終於文祖二十八載帝乃殂落堯二十八年合入舜歷通計在位八十一載堯在位七十二載即舜元年丙子帝摯元年乙卯帝嚳元年乙巳顓頊元年丁亥少昊元年癸亥黃帝元年癸未炎帝元年癸未以是推之伏子賤最可憑也諸家年代歷不分出益三年當禹薦益於天七年而崩益行天子事三載禹喪畢讓於啓啓賢諸侯歸之益避於箕山之陽禹之聖啓之賢益之讓豈可廢而不明今以大唐元和六年太歲辛卯上推之炎帝元年癸未凡三千六百九年自軒轅至夏殷約世本以文宣王太史公堯典舜典商書夏書為實録周秦以降則桉本朝國史春秋緯書云炎帝子孫帝臨至帝罔又有八代四百餘年據太史公黃帝與炎帝戰於阪泉之野易稱神農氏沒黃帝堯舜氏作今臣依周易史記以黃帝代炎帝緯命歷敘又稱少昊子孫相承十代四百餘年驗緯書起漢哀平間前代儒者好記異聞新進後學耳目固不可驗皇甫謐劉伯莊皆以舜為戊寅年即位在位二十年遂使神農已來甲子相承錯謬桉漢書舜生三十徵庸三十在位五十陟方乃死通服堯喪三年禹崩啓未立使三年何繫今出益三年成禹志且堯禪舜二十八年而崩益行天子事三年為益之事可也大道之行以天下為家何必私三年於啓或云有窮伊尹周公共和如何當夏后相不恢於夏家羿為相臣篡相自立后相奔死商邱浞又殺羿自立少康長乃復夏政自是之後備見於諸家年歷云合肥郡城南門東上曰同食館梁柱朽蠧軒戶欹傾斷枅委階椽落棟折風雨雪霜賓不可宿太守陽平路君刺郡之明年冬十月歲向熟民且間陶瓦於原伐木於山磨舊礎築新墉乃豐賓堂乃峩前軒怒桷蚪蚪層櫨牙牙中回洞深高檐騰掀階間容揖讓楹間容賓盤柱間容樂工屏間容將吏左右為寢食更衣之所朱戶素壁潔而不華東西廂復廊直澍又西開下閣作饔舍廄屋宏大中敞作南門容旌旗駟馬北上作丁字亭亭北列朱檻面城墉其下淤溝開導通水因古岸植竹樹為風月晏遊地東南自會稽朱方宣城揚州西達蔡汝陸行抵京師江淮牧守三臺郎吏出入多遊郡道是館成大賓小賓皆有次舍開元中江淮間人走崤函合肥壽春為中路大歷末蔡人為賊是道中廢元和中蔡州平二京路復出於廬西江自白沙瓜步至於大梁斗門堰埭鹽鐵稅緡諸侯榷利駢指於河故衣冠商旅率皆直蔡會洛道路不茀賓至授館亦諸侯之事路君以家行文學知於朋友以端方沈默官御史府以詳明典故為尚書郎以通知政術為合肥郡太守質平言為心風俗丕變民知敬道吏不敢欺先時郡米數萬石輸揚州軸轤相繼出巢湖入大江歲為風波沈溺者半乃於湖東北岸士冖䂞皋里作廥廩三十九間州東二邑人米輸於此由申港出新婦江至白沙人不勞水無害復他邑館舍次於同食無私利人人皆樂成昔左邱明傳經因事書事鴻因蔡州道及諸侯之稅因同食館及路君之政亦春秋之旨傳曰自廬已往賑廩同食大和三年太歲己酉正月壬午朔二十日辛丑記元宗幸華清宮新廣湯池制作宏麗安祿山於范陽以白玉石為魚龍鳧雁仍以石梁及石蓮花以獻雕鐫巧妙殆非人功上大悅命陳於湯中仍以石梁橫亘湯上而蓮花才出水際上因幸華清宮至其所解衣將入而魚龍鳧雁皆若奮鱗舉翼狀欲飛動上甚恐遽命撤去而蓮花今猶存又嘗於宮中置長湯數十門屋環回甃以文石為銀樓谷船及白香木船致於其中至於楫棹皆飾以珠玉又於湯中壘瑟瑟及沈香為山以狀瀛洲方丈津陽門詩注曰宮內除供奉兩湯外而內外更有湯十六所長湯每賜諸嬪御其修廣於諸湯不侔甃以文蟲密石中央有玉蓮捧湯泉噴以成池又縫綴錦繡為鳧雁致於水中上時往其間泛鈒鏤小舟以嬉遊焉次西曰太子湯又次西少陽湯又次西長湯十六所今惟太子少陽二湯存焉其窮奢而極欲古今罕匹矣㣥字敦詩貝州武城人舉進士又登制策甲科元和初為翰林學士中書舍人拜中書侍郎同中書門下平章事罷為湖南觀察使穆宗立官兵部尚書出為荊南節度使改檢校右僕射兼太常卿大和五年檢校左僕射兼吏部尚書六年卒年六十一贈司空維元和十四年歲次己亥七月丁丑朔十三日己丑攝太尉金紫光祿大夫檢校司空兼太子少保上柱國鄭國公食邑三千戶臣綬及文武官五千七百一十八人等臣聞惟天惠人惟元后作人父母大寶曰位至公者名帝皇尊稱肇自三五其義尚矣堯舜禹湯文武成康垂於典籍為萬代法非名歟殷有天下武丁大其業周有天下宣王嗣其訓在漢七葉亦稱盛強中興之美與我不類皇唐統天二百有二載祖宗重光四海一家禮文憲矩章卓大備元符昌歷畀付有在洎我后之握圖也齊心於穆清垂意於大寧文昭武烈冠今邁古始負固不若者莫匪顛踣輸忠來附者克保蕃祉天寶之季孽臣干紀靈誅亟掃餘氛未弭兵不得戢六十五年於茲矣元和致理思櫜弓矢睿謀前定所向風靡兩河既清泰階砥平戴白之老欣感出涕不其盛歟伏惟睿聖文武皇帝陛下德配天地明並日月嚴薦於宗廟盡敬於郊禮孝通於神祗仁浹於動植內睦於九族外懷於四夷乙夜觀書日昃聽政恤刑懋賞劭農勸學歷選列辟英聲茂實其何以加焉日者顓不龔告讓罔悛疑任下推誠出師徂征玉壘金陵之遐阻懸匏營邱之險闕或肆於都市或懸於藳街其餘瑣細蓋不足紀上以攄列聖之憤下以叶千齡之慶然後闢四門貞百度會㝢縣之玉帛旅梯航之貢篚咸曰不圖貞觀開元之化復睹於今日矣陛下勞謙祗畏不自暇逸讓德於上天推功於㣥臣訪闕政修墜典不以龜龍為瑞以賢俊為瑞不以珠玉為寶以慈儉為寶卓哉煌煌信可假元穹而蟠厚載者已是宜尊徽名膺顯號以光於典冊以順於人心以答於天意不可辭也臣又聞之居安思危納諫盡下遠讒慝旌讜直愛養黎庶敦尚朴素斯皆高祖太宗順宗之遺訓也而陛下躬行之造次必於是寤寐必於是實萬姓之福無疆之休僉曰功成而禮不崇德廣而名未稱臣子之罪也於是百辟卿士藩衛耆耄稽首上言至於四三陛下深秉謙沖詔諭往復不得已而從之伏以紀年之盛冠於大號厥有舊典書不云乎乃聖乃神乃武乃文傳曰惟天為大惟堯則之則法也王者昭事上帝取法於天道德經曰天法道道生一唯上聖至德兼則利物行清淨自然之道為能應之臣等不勝大慶謹奉玉冊玉寶上尊號曰元和聖文神武法天應道皇帝伏惟陛下景福是膺如日之升雖休勿休翼翼兢兢對越鴻名丕赫成能萬壽百祥罔不豐登天祚聖唐惟聖丕承臣綬等誠歡誠躍頓首頓首謹上門下王者司牧黎元紹膺統緒必建儲二以貞家邦故春秋垂冢祀之文易象著震方之位朕屬承景運嗣守丕圖稽前王之令謨奉列聖之彞訓上以嚴宗祧之顧下以繫億兆之心無疆之休用崇主鬯祗荷承憲敢怠於懷皇太子恆忠孝溫文率義由禮寬粹莊重自誠而明慶靈所積姿器夙茂能辦南陽之牘允符東海之貴承華載啓命以居之撰吉展儀神人允洽舉是典冊授之軒墀百辟在庭四方來賀以言承序所感則深永惟國本為慶滋大宜宏欽恤之令亦覃命賜之恩與衆共之無遠不被可大赦天下自元和七年十月七日昧爽巳前天下應犯死罪非殺人者遞減一等左降官流人并與量移如因流貶所亡歿及得罪之人并任歸葬文武常參官及諸州府長官子為父後者賜勳兩轉應緣冊皇太子行事加階賜勳爵有差文武常參官及陪位官并宗子諸親賜勳一轉遂王府量與進官春闈育德肇錫嘉名磐石聯華義深敦序禮王寬宜改名惲深王察宜改名悰洋王寰改名欣絳王寮改名悟建王密改名恪夫習近遷性聖賢所慎詳觀古昔輔正元良必惟其人朝夕講訓然後明君臣父子之道通禮樂教化之情自非學究宗源行可師範則無以膺茲茂選式是儀刑其皇太子及諸王侍讀宜委中書門下精擇二人具名奏聞天下孝子順孫先旌表門閭者及高年廢疾者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭祀布告遐邇咸使聞知頃以蔡孽未平遂割前件三縣及徐州將士一千四百人權置宿州扼其奔軼事關備禦非務便人今寰宇無虞封圻罷警權創支郡理合併除其宿州伏請卻廢三縣各還本州安危在出令存亡繫所任元宗初得姚崇宋璟盧懷慎蘇頲韓休張九齡則治用宇文融李林甫楊國忠則亂故用人得失所繫非輕人皆以天寶十四年安祿山反為亂之始臣獨以為開元二十四年罷張九齡相專用李林甫此理亂之所分也願陛下以開元為法以天寶為戒則社稷之福也旄頭光明垂三十載不習俎豆化為侯王者十有八九焉由是隱逸憔悴羔雁不行蒼山沈沈側陋不顯建中初有峨嵋客符君發六籍棹三湘深入匡廬絶迹半紀學窺顏子之門閾文紹陳君之骨鯁逸慕嚴光之垂釣志效管寧之不欺結廬熙熙人不知其然也頃豫奉命江西三年往復彭蠡未嘗不詠湖月潄天倪造符君雲扃宿五老峰下動更晦朔不理還櫂偶丹霄至人白鶴羽客搴靈芝跪天壇相顧永息乎蓬瀛豈復又縈於塵網覩君超淡愴興舊遊雖笑語飲食如常終忽忽若居大夢君家在岷蜀展愛高堂將聖賢典籍充人子幣帛斯所以激衰俗扇清風方伯地君不以厚禮遲吾子豫未之信秋九月楚人歌采蘭以送之惟靈天姿秀異才稱雋傑蚤著嘉名遠播芳烈惣六藝之要妙踐九流之清切鏌鎁鋒利浮雲可決騏驥逸步飛塵可絶閉匣不用伏櫪何施才命罕並今古同悲五嶺三湘寒暑潛推樂道忘憂襟靈甚夷掞藻揮毫鶱翔是期奈何終否神也我欺嗚呼雕飛半空羊角中戾彼蒼難詰善人斯逝㣥宿受交分行敦情契遺文在篋贈言猶佩撫孤追往泫然流涕孑孑丹旐翩翩素帷鵩弔是月龜從有時路出長阡將赴京師旨酒一觴哭君江湄往矣子厚魂期來斯尚饗滂德宗朝官鹽鐵使忤裴延齡左除伏以去秋水災詔令減稅今之國用須有供備伏請出茶州縣及茶山外商人要路委所由定三等時估每十稅一價錢充所放兩稅其明年已後所得稅外收貯若諸州遭水旱賦稅不辦以此代之諸州府公私諸色鑄造銅器雜物等伏以國家錢少損失多門興販之徒潛將銷鑄每銷錢一千為銅六斤造寫器物則斤直六百餘其利既厚銷鑄遂多江淮之間錢實減耗伏準建中元年六月二十六日敕令準大歷七年十二月十五日敕文一切禁斷年月深遠違犯尚多臣請自今已後應有銅山任百姓開采一依時價官為收市除鑄鏡外一切不得鑄造及私相買賣其舊器物先在人家不可收集破損者仍許賣入官所貴銅價漸輕錢免銷毀伏請委所在觀察使與臣屬吏會計處置㣥字丹列京兆金城人貞元中以薦為左拾遺憲宗朝纍遷御史中丞出為湖南觀察使元和九年卒於容管經略使年五十五贈左散騎常侍元和二年五月三日重遊此寺獨覽舊題二十年矣當時三人皆登諫列朱遐景方詣行車王晦伯尋卒郎署余自西掖纍遷外臺復此躊躇吁嗟存歿朱拾遺詩云歲月人間促煙霞此地多殷勤竹林寺更得幾回過可謂得詩人之思也因命題壁以志所懷山南道節度副使檢校兵部郎中兼御史中丞賜紫金魚袋竇㣥記
