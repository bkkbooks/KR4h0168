front:
  text: 全唐文欽定全唐文卷九百九十一闕名三十二
  hash: sha256:a3c76b2ddfa4a376c2ea5ccb79a20391fabc80fc1fae550b29887427ddf10178
body:
  text: 蓋聞經邦致治必資輔相之士折衝禦侮實賴將帥之臣是以尚父鷹揚闕三字於闕九字於闕二十三字聲稱頌騰芳史冊存與日月爭暉沒與金石不朽至於拔萃著美搴旗馳譽繼雲闕五字驊騮闕二字軌其唯忠壯公乎公諱闕一字字志元闕二字郡闕二字人也若夫闕一字宗隱嶙崇基冠於衆邱長河浩汗洪源導於積石是以庭堅作士西周闕一字伯陽之教干木作師東海闕一字經明之績煥乎方策豈不闕一字歟祖闕七字州闕一字字德元闕一字俗政洽唯良考偃師散騎常侍益都縣開國公贈洪州都督八州諸軍事諡信公勤邁闕二字功闕三字公闕二字極之秀氣闕十字孝闕一字踐闕一字基於忠烈闕一字表王褱奇器量宏遠峩峩焉猶曾峯之跱嵩霍滔滔焉若清流之澄江漢故能齠年立志冠歲闕一字名質性方直闕二字於汲黯交結闕九字隨大業闕一字薄伐遼左公占募從征年始十四夫兵戰凶危也遼碣遐阻也童牙而從兵戰忘闕一字而涉遼碣闕三字識基於是矣高祖道踰湯武闕四字今上地兼魯衛爰始登庸公附翼方舉攀光旭旦委質邁奔走之臣就列踰蜀漢闕五字頭朝散大夫從上破西河闕一字朝闕五字破闕一字老闕一字於霍闕一字遷銀青光祿大夫昔舞陽策名從沛邑而力戰子衛效命臨昆陽而先登永闕一字茂勳方駕前烈闕一字與闕二字劉元靜破闕三字屈突通纍遷闕一字光祿闕七字濟縣侯食邑闕一字千戶又從上討薛舉劉武周以功授樂遊府驃騎將軍進封武安郡公食邑并前二千戶公勇冠三軍氣高闕一字戰闕一字馬電發則闕二字必闕五字則闕四字是以紆金章於巖廊苞舉樊酈分桓圭於奧壤牢籠寇鄧君子以為宜哉又從上闕一字王世充闕三字第一闕三字授闕四字尋闕七字上初踐少陽無忘惟舊除左虞候率及膺寶命言念嘉庸拜左驍衛將軍若乃盡闕十五字召於往闕十字令孰能恩隆善賞禮優夜拜者哉俄賜別食封四百戶遷左驍衛大將軍又為梁州闕二字使雍岐闕一字州闕四字進封闕二字公食邑闕一字千戶闕二字食封闕二字戶通前闕一字百戶又以闕一字官檢校原州都督又統承風道行軍討吐谷渾丁父憂未幾起復本任文德皇后山陵檢校闕二十一字於闕一字府加等進秩闕一字寵歲重於周行而司勳授冊天下所以勸善良史執簡後昆所以欽風闕二字覽前書闕一字惟近代闕五字貽闕十八字特闕一字金闕一字諸軍事金州刺史子孫承襲改封褒國公食邑如故與司徒趙國公等同受冊命從闕三字陵闕一字檢校武闕一字大將軍尋遷闕一字衛大將軍闕十四字齊聲內典鈎陳與辛趙而方軌非聖帝不能疇茂績非奇才不能取高位於是見君臣之合契唱和之如闕一字焉又丁母憂闕四字本闕八字禮闕一字著闕一字劍闕一字錡懷蓼莪而疚心泣血苫廬瞻几筵而增絶銜恤成疾致毀遽漸中使結轍於闕一字問闕三字奇於藥劑闕三字心膂慈深覆育親闕一字鑾闕四字同既班闕一字貴又詣所言公銘戴恩私對揚忠到城郢之志豈惟楚臣慎赦之言寧慙漢相既而子輿日闕一字平仲不闕一字類彼劉闕三字宗闕十三字以貞觀十六年闕一字月十八日薨於京師之醴泉里第春秋卌五上情深悼傷舉哀於別次雖闕二字之痛闕一字孫闕一字君之悲仁祖方之蔑闕八字之闕三字於念功勸善之闕一字實深於追往故鎮軍大將軍右衛大將軍褒國公段志元器宇敦確風略沉毅委質運始宣力闕二字效勇闕一字於麾闕二字勤闕十二字方闕二字歷永寄心膂與善冥默奄焉殞喪震悼之情倍深傷惜哀榮之典宜加恆數可贈輔國大將軍使持節都督揚和闕一字潤常闕二字七州諸軍事闕五字官闕四字於昭陵闕四字塋地并東園祕器葬事所須並宜官給賻布絹五百段米粟一千石四品一人監護其儀仗送至墓所仍送闕一字事上又追懷功烈乃詔司存圖形於戢武閣太常考行諡曰忠壯公禮也惟公氣岸崇峻闕一字宇闕一字深闕一字樹幡旗闕一字懷闕十四字猛志闕二字托貔貅而靡懼高節邁俗觸雷霆而不驚逮乎河出馬圖腰佩闕一字紐爵兼千乘裂闕二字之膏腴位闕四字漢庭之榮寵闕十字之道克闕一字於家國仁義之風不愆於出內懷公孫之不伐慕考甫之循牆行戒剛強晦其扛鼎之力言思木訥韜其涌泉之慮加以敦睦宗族闕十二字鄉黨闕四字恕已以及物仁心天發輕財以濟貧豈非朝廷之爪牙人倫之領袖者已故吏闕一字名等慨徽音之遂往懷遺愛而闕三字請書闕八字之闕四字碑於闕六字猶勒銘於江表況乎誠著草昧功參征伐顧灌絳而俯視軼寇賈而長驅豈可使改名之闕一字有闕六字之闕十字為闕一字頌曰方叔詠周條侯稱漢東都御録昭伯翦亂西晉握圖闕一字治作翰美矣人傑於焉闕二字奇節自然王褱姿闕一字發闕十二字方闕一字日月氣薄霄漢闕一字高雲闕王業肇建帝道既融策名若水披荊漢中腰鞬靖難提㦸臨戎斬良賈勇括羽定功鑄闕二字職刑馬闕六字入闕十三字之榮超張闕一字許志大心小位隆德盛奉國忘身惴惴畢命事親竭力蒸蒸表行蒞事以勤臨下以敬銜恤在疚奪情闕一字職瘡闕一字愈遲毀闕九字盡闕一字藏舟難闕一字奔羲易昃冕旒興哀縉紳掩淚恩踰九列禮亞三事何以贈之戎章闕一字備何以送之鉦車按轡勒銘貞石義兼庸器闕三字之所興分八闕一字邱為闕二字墨闕一字所至闕一字三者闕四十八字含闕五字紀情以闕二字之闕二字繼闕一字董之良筆綢石室之記勒金簡之書闕二字揚名闕二字服闕二十一字公諱德棻字季闕一字敦煌人也闕四字肇開層闕二字侯居闕四字緒闕四十二字蹈縹垂丹銘闕三字曾闕一字虬魏龍驤將軍闕九字開國子闕四十五字正卿上大夫始豐二州刺史彭陽縣開國公闕六十一字公闕一字上開府儀同三司兼吏闕三十四字智峰闕三十字典籍闕二字之術昭茂於中臺闕十九字自闕六字英爽闕一字忠特異常童闕一字夕之闕二十二字不闕八字矩意闕二字知機達妙摛闕二字菀生闕十七字隨文帝闕一字而善之因曰公闕三字代闕六字覩卿闕四字清闕三字才子闕六字內艱未及敘闕二字以闕二字丁此闕二字絶漿闕一字粒殆不闕二字尋闕一字父憂闕四字率由闕一字極議者稱之服闋闕一字家授游騎尉大業中闕七字又闕十字公以闕十九字史養素韜闕一字俄而日鬬星亡山淪闕一字沸㣥孽肆慝懷闕一字罹禍我高祖受圖誕命闕三字師闕三字以推亡指容闕一字之殄暴淮安王神通式瞻闕一字野載切闕四字雄闕四字力闕一字公闕九字參軍專掌詞翰兵闕一字進闕一字咸以委之禮盛闕二字恩深入幕以從闕一字京城之闕一字加銀青光祿大夫大丞相府記室武德之始拜起居舍人闕四字特蒙闕二字記闕十七字仍闕三字供奉闕九字禁闕一字憩麟臺闕一字遊於文雅搢紳之侶咸以闕四字以本官攝尚書左丞闕一字幾封彭陽縣開國男食邑二百戶闕二十六字機闕一字攝闕三字尋授闕二字侍郎及詔修五代史書命公專撰周史公博贍多聞工於著述詳録典闕一字有闕四十二字修新禮成進爵為子加邑百戶賚物闕一字百卌段頃之又命公與吏部尚書高士廉刊定成闕一字事畢闕四十字太宗以業定功成時康歲稔迫於㣥闕一字將事闕四十二字志闕四字其禮闕二字天闕一字以為故事尋授以正議大夫行右庶子正闕二字之敦厚闕二字元之闕二字繼闕一字比位闕二字於公闕一字儲君闕十二字公闕十四字州闕三字雅州刺史闕一字車露冕緝化宣風獷俗蠻闕一字懷恩闕二字以公事闕十四字房元齡闕三字許敬宗等闕七字實闕十四字段闕二字大闕四字少監闕一字帛一百五十匹今上正位以公守禮部侍郎闕十六字事闕十五字此闕一字今闕十三字之闕五字永徽二闕六字宏文館學士仍監修國史闕五字尋改授闕五字太常少卿依舊修史闕四字抑揚闕四字纓闕十八字之闕四字之闕四字之闕八字抗表去位優詔不闕一字進闕一字通闕十字如闕四字之思闡闕一字素闕四字謝闕三字戴闕十六字太宗實録闕七字食邑闕八字明闕三十四字皇帝實録闕四字公增邑一千闕五十七字於是闕一字仰邱闕一字翱翔林壑抗跡闕六十二字春秋八十有四遺闕一字薄葬闕四字塗闕六十五字茂風韻清闕一字輯顏闕四字保性闕七十二字被冊網羅闕六十七字嬖寵以孤直之操尤憚權闕十八字保闕一字華闕四十五字卅卷並行於時長子太子右司議闕九字上闕一字軍闕四字在闕一字充闕三十五字周王御時肇開闕十五字摽闕四十五字公惟闕一字之彥質邁南銑材踰東箭闕十四字靡闕三字吞闕二字城闕四十二字功隨業暢位逐名尊蒿柱闕二十字人爵風闕四十四字冕酬功載緝王言裁成帝闕二十四字善闕二字公闕四十字隧漠漠窮泉山光慘日闕十九字上闕執闕一字結繩八闕一字與四均齊致闕一字幽陵之闕一字服闕二字陰之烈闕三字擁衆罕闕之闕九字之闕十三字猷闕二字嬴而被有截辨方正位踰亥步而極無垠罄域輸闕一字傾闕三字若乃器藏於用幾動於闕十六字聖人而闕十五字孫吳以高闕七字應運闕一字出在闕一字薛國公矣公諱忠字義節其先代人今為京兆萬年人也鬱矣曾基克承大禹闕四字茂業奄有幽都之地洪源共昌海分流崇闕一字與闕四字曾祖闕十二字強盛闕二字正闕二字干闕一字於龍闕一字境窮西夜騁萬騎於雞闕一字威讋東胡父蘇皇朝左驍衛大將軍寧州都督懷闕七字是日闕一字金之允闕一字該逆順恭惟闕二字之闕十三字揚闕一字聖宏候闕四字丹墀不闕一字以貴闕四字愷澤異姓而闕一字埒長沙闕二字祚公丕承昌緒允闕一字潛禎上分列緯應天街之祕象下屬闕一字山闕三字之闕四字則英闕五字則闕十五字風闕二字知闕一字之心彌遠闕一字將甫成闕二字之奇可察豫章闕一字拱闕一字蠲闕二字先彰素懷不羈之節載蘊非常之志及隋季崩離中州板蕩我大唐撥亂反正闕二十五字軒之闕一字公闕三字言歸咸承繡闕一字之賞石奮父子共沐朝恩秺侯仁孝式流家祉時以漠南未靜委公作鎮頡利可汗乘閒內侮闕一字遣張闕一字利闕一字齎闕二字公闕十二字利以闕五字以闕二字兵刃不加凶渠底定大夫之闕三字嘉謨斯在介子之闕一字樓蘭英風可躡竭誠之跡基於此矣詔授左屯衛將軍仍令闕一字門宿衛闕一字甲第闕二字降闕九字貞觀闕一字四年闕二字御闕一字軍闕三字之睿闕一字去闕三字動吹簫之妙曲望闕二字戚譽浹遐邇俄丁元闕一字憂尋起復職寢苫結慕集蓼廠田坴哀善喪能毀枲貌悲於行路奪闕一字即戎柴形闕一字於朝序闕一字年詔闕三字公闕八字檢校長闕一字都督闕六字四豪之闕二字任隆式闕二字十闕一字之新闕一字克清邊壒言旋京邑檢校左屯營既而句麗百濟互相侵逼處月焉耆各為脣齒闕二字邪於荒裔闕二字伐闕一字皇情闕十六字綏邊闕二字詔公闕一字域安撫闕四字之寄右地礱闕一字加授上柱國草年遷右武衛大將軍復屬延闕一字縱慝鐵勒怙亂乘壯月以控弦候朔風以鳴鏑闕一字膺分闕十六字以德闕二字翹闕一字而闕二字侯之以刑闕三字以闕二字廓清柳塞繄公是賴賜金銀器物數十事繒綵五百匹錢草萬馬五十匹霍氏辭第竟收絶漠之功荀父闕一字錫實闕一字剋狄之效俄而闕八字出闕五字巖廊而逾謹宸闕六字而殆絶天皇