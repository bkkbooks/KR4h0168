front:
  text: 全唐文欽定全唐文卷二百八十六張九齡四
  hash: sha256:d06fb7e0dd9afd59be7fa80ebfb28a60321964fe8fceb6b984d94e0ca6aa73df
body:
  text: 敕王斛斯吐蕃與我盟約歃血未乾已生異心遠結凶黨而甘言緩我欲待合謀連衡若成西鎮何有卿能先覺有以待之觀釁而行適是軍法且屯苗既受踐暴軍人亦被拘囚如李混之所言不反何謂然則此蕃姦計頗亦陰深外示存約內實伺便事儻不濟即云無負卿還須知其變詐隨事交當使其退不得以此為詞進不得成其凶計如此設拒乃為上策若事巳侵軼兵見交鋒即當率勵驍雄盡敵乃已秋冷卿及將士已下並平安好遣書指不多及敕王斛斯卿在西鎮軍務煩勞皆能用心處置不失頃與突騎施攻戰歷涉三年降虜生俘所獲過當懸軍能爾朕甚嘉之行官已有賞勞在卿固合優獎今授卿重職兼彼領護且復褎進終為後圖吐蕃此來意不徒爾所有計較前己略言先覺預防無能為也萬里之外三軍之宜一以委卿勿失權斷秋後漸冷卿及將士已下並平安好遣書指不多及敕蓋嘉運卿久在邊鎮庶事用心又去年出兵冒遠入賊諸下皆賞卿豈無功言念忠勤不忘褎進今授卿雄要仍兼舊官宜知朕心當重寄也突騎施雖請和好其意不真近敕彼軍與天山計會當審觀事勢遠著候人若有形勢事資先據如無應會不可虛勞勢在臨時固難遙斷秋後漸冷卿及將士已下並平安好遣書指不多及敕瀚海軍使北庭都護蓋嘉運突騎施凶逆犯我邊陲自夏以來圍逼疏勒頃得王斛斯表見屯邊城張羲之等入據此城屢與之鬬將士效節逆虜破傷已不敢攻圍而頓兵不去但邊城糧少或為其所知持久則難不可不早為計也卿可練驍武揚聲大入仍有所保據以防不虞用解邊城之圍以挫逆賊之勢臨機適變委卿裁之仍與王斛斯審籌形勢取萬全也今故令內謁者監王尚客往一一口具冬中甚冷卿及將士已下並平安好遣書指不多及敕四鎮節度副大使安西副大都護王斛斯及將士已下萬里懸軍屬此狂寇屢有攻戰能挫凶威遠聞義勇孰不增氣卿等激勵將士為國盡誠決命寇讐成名當代奇功壯節何謝古人矢石之閒見危致命良深嗟嘆重其忠烈又聞朱惠中箭今復何似善須救療使得不殂前令具奏陳亡將士欲加褎贈卿宜識此意即以實聞近日與賊交鋒臨陳殺敵事須優賞亦即奏來所云賊等請和仍尚頓兵北嶺此虜姦詐首尾百端外示求和內將誘我卿所防慮皆中其心然則蓋嘉運北庭近亦深入頗有所獲想彼知之虜庭乍聞當合驚駭務須分兵守境諸處防虞烏合之胡豈堪勞役必將自潰勢亦不久蘇祿儻或覺此革心請和亦復量宜以時開納仍與嘉運計會必取良圖近所加兵且應支用臨事制變豈待言之今將緋紫袍各二十領若有殊功應須速賞並委卿量事賜之冬中極寒卿及將士已下並平安好遣書指不多及敕四鎮節度副大使安西副大都護王斛斯蘇祿忘我大惠敢作寇讐屢犯邊城將肆其惡雖禽獸是似而天地不容卿等義心固所發憤朕已敕河西節度使牛仙客令河西於諸軍州及在近諸軍練驍健五千人並十八年應替兵募五千四百八十人即相續發遣卿可與蓋嘉運計會取彼道便隨事進討使此賊救首救尾形勢分離本既烏合勞則自潰若以計取可不戰而擒若守而不攻益為後患卿彼諸將皆是舊人既諳山川又能料敵兼與北庭並力事亦可圖無為端然連年受弊所緣邊鎮要切委卿臨事籌之可與蓋嘉運審量勿為彼此之計也所緣兵募行賜則令所由支遣已別敕牛仙客訖四鎮蕃漢健兒並委卿隨所召募可得幾許仍具數奏聞史震襲父可汗即令彼招輯兼與卿計會並臨事處置無失所宜冬中甚寒卿及將士已下並平安好遣書指不多及敕王斛斯纍得卿表知賊等肆惡終冬不去又聞將士與鬬數有殺傷諸胡攜離將自此始朕比為料亦以為然卿受寄遠方悉心奉國撫巡將士皆得輸誠萬夫一心以少擊衆雖有狂寇固無遠憂朕所懸官爵惟賞忠義苟能盡節亦豈忘功卿可慰勉將士知朕此意若有殊效即具狀以聞且蘇祿凶徒本是烏合今其師老必有怨嗟至如骨咄王子來投已是其效何國胡不受處分亦是明徵其下離心已至於此可令閒諜更誘其餘此賊敗亡將從內潰且四鎮絶遠皆是孤軍卒欲益兵頗難救急近巳敕牛仙客且送五千人其餘驍勇亦即繼發並敕北庭計會卿可與蓋嘉運相知張皇國威誠在此舉俘滅醜虜今也其時勉樹邊勳以成不朽冬中甚寒卿及將士比並如何遣書指不多及敕北庭都護蓋嘉運近得卿表知舊疾發動請入都就醫欲遂來表慮有邊要萬一失便雖悔何追且蘇祿猖狂方擬肆惡邊城經冬不去西州近復燒屯亦有殺傷想所聞也此賊諸頭抄掠虜衆巳疲亦無能為正可取便至如西州近者有賊其數無多烽候若明密與兩軍作號首尾邀擊立可誅翦何為當軍自守信賊公行來有損傷去無關鍵豈是邊鎮之意也且西庭雖無節度受委固是一家有賊共除有患相救萬里之外何待奏聞自此之後必須用意今遣醫人將藥往可善自將療春初餘寒卿及將士並平安好遣書指不多及敕瀚海軍使北庭都護蓋嘉運及將士已下蘇祿爰自今夏連犯西陲犬羊之㣥屯結不散誠欲出其不意乘虛以入凶黨聞此必自解圍卿識朕心有符成料比王尚客至聞已出師窮冬絶漠荷戈冒險又聞有所擒獲張我國威言念忠誠良深賞嘆在此行也四鎮狂虜必應抽退彼既有效應合效勞兼云擒獲人當優賞宜具實狀一一以聞然此賊為惡勢將未已若困窮蹙實則不知安西近亦加兵卿彼士馬自足可與王斛斯計議逐要圖之春初餘寒卿及將士已下並平安好遣書指不多及敕契丹知兵馬中郎李過折等卿比在蕃中已知才略一此行事十倍所聞既立殊勳又成大節何其壯也可突于狡算翻覆人面獸心事其酋長不忠不義處其種落無信無恩專持兩端隨事向背而屈烈愚蔽與之同惡卿比觀變實為遠圖誅元凶而存一蕃行權宜而合正道所全者大所慮實深今諸部怗然皆卿之力也且頃者攜叛又甚崎嶇羊馬不保於孳生田疇不安於耕種寄命山谷並力干戈總由頑凶致此勞苦向若無卿此舉信彼所行以疲弊之殘人當驍雄之巨衆彼則朝夕奔命此方歲月攻守而衆寡不敵殲滅有期賴卿先見之明遽為轉禍之計以救萬人之命以成萬代之名豈獨大功真為上智今將疇其井賦異姓封王以旌厥庸且有後命在彼初有變故乍應驚擾百姓既知想當安怗卿可與張守圭量事處置務逐便宜今既一家愛同赤子惟其所欲隨事撫存春初尚寒卿及衙官刺史縣令並百姓已下並平安好遣書指不多及敕突厥苾伽可汗比數有信知彼平安良足慰也自為父子情與年深中閒往來親緣義合雖云異域何殊一家邊境之人更無他慮甚善甚善此是兒可汗能為承順副朕之所親厚人閒恩好無以過之長保此心終享福祿子孫萬代豈獨在今比秋氣漸冷卿及平章事首領部落並平安好遣書指不多及敕兒登利突厥可汗天不福善禍終彼國苾伽可汗頃逝聞以惻然自二十年閒結為父子及此痛悼何異所生又聞可汗繼立蕃落並得寧靜良深悲慰且知無他朕與可汗先人情重骨肉亦既與朕為子可汗即合為孫以孫比兒似疏少許今修先父之業復往時之好此情更重只可從親若以為孫漸成疏遠故欲可汗今者還且為兒義結既深當熟思此意人情終始固亦可知葬事所須並依來請即與弔祭使將往必令及期言念宿昔深懷感愴春初猶冷可汗及平章事與首領部落並得如宜遣書指不多及敕劒南節度使益州長史王昱近得卿表知蒙歸義等效命出力自討西蠻彼持兩端宜其殘破苟非生事定是輸忠亦卿等指麾更張遠略諸部所請朝貢及蒙歸義等立功並委卿料若合行賞豈有不來時尚炎蒸路且修阻郵傳之弊公私可知亦云重勞非是有惜想卿臨事思其所宜緣蠻落初寧當須計議若欲入奏亦任暫來春晚極暄卿比如宜遣書指不多及敕突厥登利可汗日月流邁將逼葬期悲慕之心何可堪處朕以父子之義情與年深及聞宅兆良以追悼前哥利施頡斤至所請葬料事事不違所以然者將答忠孝故喪紀之數禮物有加道之所存地亦何遠今又遣從叔金吾大將軍佺持節弔祭兼營護葬事佺宗室之長信行所推欲達其情必重其使以將厚意更敦前約且以為保忠信者可以示子孫息兵革者可以訓疆場故遣建碑立廟貽範紀功因命史官正辭朕亦親為篆寫以固終始想體至懷春初尚寒可汗及平章事部落並平安好遣書指不多及敕兒突厥可汗朕與先可汗結為父子及兒紹續情意日深至於國計亦欲無別兒去年東討雖有先言然兩蕃既歸國家亦即不合侵伐朕既與兒無閒終不以此為懷契丹及奚諸蕃窮者土地不足以放牧羊馬不足以貪求遠勞師徒兼冒鋒鏑勝不為武不勝亦危以此言之當務其大者突騎施本非貴種出自異姓惟任姦數誑誘㣥胡十數年閒又承國家庇廕因其荒遠遂得苟存近日以來敢茲背德又知兒意亦欲破之前與先可汗舉哀其使不肯就哭當時辭拒彼使具知兒若總兵西行朕即出師相應安西瀚海近已加兵欲以滅之復何難也儻事捷之日羊馬土地總以與兒子女玉帛別有優賞信是長策可熟思之與兒情親故言及此耳今有少信物至宜領取春初尚寒兒與平章事首領百姓已下並平安好遣書指不多及敕突騎施毗伽可汗天地有正位鬼神有正主敢此違犯必有禍殃不信朕言但試看取可汗雖為君長實在幽荒陰陽之氣偏僻如此縱欲自大其如天何往年可汗初有冊立以我國家常為勢援諸蕃聞此不敢動搖是我有大惠於可汗行陰德於彼國自爾以後二十餘年情義相親結為父子可汗身自不覺豈不知彼之大援而戎俗少義見利生心故闕俟斤入朝行至北庭有隙因此計議即起異心何羯達所言即是彼人自告蹤跡已露然始行誅邊頭事宜未是全失朕以擅殺彼使兼為罪責北庭破劉渙之家仍傳首於彼可汗縱有怨望亦合且有奏論朕若不依舉兵未晚而乃總無來狀即起凶謀侵我西州犯我四鎮連年纍月馬死人亡於㣥胡已聞怨嗟於國家豈能大損中閒使哥德都耽及安胡數半泥臨河來此求和朕亦信受故遣使相逐具宣往意其後審觀形勢全是詐欺故密敕半道令回豈是元心有負自爾之後侵犯不絶可汗有何兵衆遂此憑陵諸國聞此豈不得計約算已西諸國未敵我一兩大州可汗亦應先知何煩遂爾為惡況安西北庭將士皆是鐵石為心可汗具諳不煩更道此則承前輕舉彼自無義却以我為失無乃重其過乎可汗向若有禮以理論奏闕俟斤下羊馬數雖稍多欲為補答亦何足難惟費一州庸調酬還則已大多而乃無義為讐暴我邊鎮孤城小堡倉卒見危大率而言其數非少彼若計索馬價我亦須得此物忝是有識之類可不自解思量又可汗正為寇敗闕伊難如從我界過葱嶺捕獲並物奏來所有蕃書具言物數朕皆送還贊普其中一物不留可汗亦以此為詞謂言朕留此物且蕃中貧薄所見不廣銀瓶香子將作珍奇黑毯赤縻亦為好物我中國雖在貧下固不以此為貴可汗宜識此意勿妄生詞且闕伊難如越界可汗復邊頭作梗如此不捉更捉何人適是邊軍明其用命觀可汗求和之意似未有真心只擬誘引國家乘便取利如此等事何用為之我國守信如天終不欺物謂天無信物自無知然於四時終不差也可汗若遂能為惡朕當別有處分三二年內試看若為必其自省前非更思恩舊朕即棄捨大過父子如初可汗更有何憂百姓皆得安樂一任可汗自料朕亦不復多言一一在使者口具秋中漸冷可汗及公主衙官纛官首領百姓並平安好遣書指不多及敕兒可汗比來和市常有限約承前馬數不過數千去歲以兒初立欲相優賞特勒欲谷前至納馬倍多故總與留著已給物市買中閒蘇農賀勒兼領堅昆馬來朕以一年再市舊無此法哥解骨支去日丁寧示意又移健達干後到亦以理報知不遣重來須存信約遂乃不依處分驅馬直來無禮無信是何道理朕緣兒義重深為含容論其無知豈能不怪計兒忠孝必無非理未委此等何故而然念其遠來磧路艱苦勒令却退去似不相親令覲都賜蘇農賀勒下及堅昆使下總二萬匹絹任其市易想兒知之其馬今並勒令却去至彼之日以理告示也夏末甚熱兒及平章事並平安好遣書指不多及敕兒突厥可汗道路既遠使命復稀近日已來音信斷絶朕每多懸念想所知之與兒情義既深庶事無閒父子之國直往直來何異一家真無別也蘇農賀勒處刺達干等去歲將馬其數倍多又有諸蕃馬來亦是兒所發遣往者先可汗在日每年約馬不過三四千匹馬既無多物亦易辦此度所納前後一萬四千緣兒初立可汗朕又約為父子恩義相及不可却回所以總留計物五十萬匹兼屬國家大禮並放天下租庸用度無窮非特和市緣此馬價通容稍遲處剌達干未還不是故為留滯念悉此意當復寬心今見續續市易不久望了即當發遣回日非賒在此還如當家去住亦何異也此後將馬來納必不可多還如先可汗時約有定準來交易發遣易為事須久長不是限隔今故令趙惠琮往並有少信物別具委曲至宜領取秋氣漸冷兒及平章事首領百姓並平安好遣書指不多及敕突厥兒可汗內侍趙惠琮從彼還一一口具深慰遠懷兒表中猶言前年退馬多兼云蘇農賀勒處羅達干三年在此與兒更無閒外庶事一家所以趙惠琮去時皆以實報今者來報尚未體悉且去年所將馬來前後數倍常歲至於好惡未必皆以兒知其中老弱病患及軀格全小不堪駕馭如何總留所以略多少仍是十退一二是於兒處大為存情何故來章尚嫌多退必若留售惡馬亦恐諸蕃笑人兒既君長北蕃復與朕為父子須存分義使遠近知之勿信下人專由利動蘇農賀勒處羅達干等續續市買甚有次第雖校遲少許物並好於往時不久當回亦勿怪也所欲遣使來者既為父子之國來往乃是尋常須知平安復申朝覲佇聞來使用慰朕心冬中極寒兒及平章事首領百姓並平安好所有委曲皆使至口具遣書指不多及皇帝問贊普緣國家先代公主既是舅甥以今日公主即為子壻如是重姻何待結約遇事足以相信隨情足以相親不知彼心復同然否近得四鎮節度使表云彼使人與突騎施交通但蘇祿小蕃負恩逆命贊普既是親好即合同嫉頑凶何為却與惡人密相往來又將器物交通賂遺邊鎮守捉防遏是常彼使潛行一皆驚覺夜中格拒人或死傷比及審知亦不總損所送金銀諸物及偷盜人等並付悉諾一作付悉諸勃藏却將還彼既與贊普親厚豈復以此猜疑自欲坦懷略無所隱縱通異域何慮異心又西南諸蠻元是異類或叛或附恍惚無常往年被略彼蕃率種歸我緣李知古處置失所又即翻然改圖彼此之閒有何定分而彼有來者乃云此先舉兵以蠻為詞未知孰是今既無外當以此思之緣彼州鐵柱前書具報一言不信朕豈厚誣更以相仍便非義也鐵柱書唐九徵所作百姓咸知何不審之徒勞往復至於邊將在遠下人邀功變好為惡誠亦有此非獨相規亦當自誡如此覺察更有何憂萬事之閒一無所限隔所以細故無不盡言想所知之體至懷也晚春極暄贊普及平章事首領並平安好有少信物別具委曲遣書指不多及敕磧西支度營田等使兼知長行事殿中御史章仇兼瓊近聞卿手足風緩頗有所廢而不敢言病竭心在公良用嗟稱有古人之節西庭既無節度緩急不相為憂藉卿使車兼有提振不獨長行轉運營田而已事務方劇氣候又偏將攝之閒自須得所今遣醫人將藥就彼看療可與之商量隨病所宜冬寒卿比平安遣書指不多及敕金城公主異域有懷連年不捨骨肉在愛固是難忘彼使近來且知安善又聞贊普情義是事叶和亦當善執柔謙永以為好前後所請諸物其中色種不違仍別有條録可依領也春晚極暄想念如宜諸下並平安好今令內常侍竇元禮往遣書指不多及
