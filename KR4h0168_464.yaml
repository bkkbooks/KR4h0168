front:
  text: 全唐文欽定全唐文卷四百六十四陸贄五
  hash: sha256:ca59b871a36936e1f8682170a121a56f8137d37c2650dbdfd107caa0271d49a6
body:
  text: 四鎮北庭將士官吏僧道耆壽百姓自祿山首亂中夏不安蕃戎乘舋侵敗封略道路梗絶往來不通哀我士庶忽如異域控告無所歸還莫從朕未嘗一夕忘懷而事勢不及相恤興言軫念忽以涕流卿等咸蘊忠誠誓死不屈或早從征鎮白首軍中或生在戎行長身塞外克奉正朔堅保封疆援絶勢孤以寡敵衆晝夜勞苦不得休息歲時捍禦不解甲胄勳高百戰義叶一心介然孤城獨守臣節日來月往三十餘年奉國之誠久而彌勵求諸今古忠烈莫儔義激人倫名光史册蠢動知感況於朕懷朕嗣守洪業君臨宇內思安兆庶以絶戰爭遂與贊普約定好和集蕃漢士庶告天地神祗設壇會盟永息邊患疆埸罷警于今六年近以賊臣朱泚背恩驚犯宮闕贊普又遣師旅助討姦凶兩國交歡事同一體北庭去此遙遠信使難通於西蕃既非便宜在國家又絶來往永念士庶隔在殊方歸路無因親戚永訣為人父母實所感傷已共西蕃定議兼立誓約應在彼將士官吏僧道耆壽百姓等並放歸漢界仍纍路置頓供擬發遣待卿等進發然後以土地隸屬西蕃今故遣太常少卿兼御史大夫沈房及中使韓朝彩等往彼宣諭仍便與西蕃交割卿等宜遞相慰勉叶力同心互相提攜速圖進路復歸鄉井重見宗親生人之情莫重於此一勞永逸固不合辭卿等誠節昭宣勳閥茂著到此之後當特甄升仍給田園以贍生業必令優厚用答忠勞如有資産已成不願歸此亦任便住各遂所安宜勉良圖副我勤想夏熱卿等各平安好遣書指不多及皇帝敬問可汗弟兩國和好積有歲年申之以昏姻約之以兄弟誠信至重情義至深頃因賊臣背恩構成嫌釁天不長惡尋已誅夷使我兄弟恩好如舊周皓及踏本啜黑達干等至得弟來書省覽久之良以為慰弟天資雄傑智識通明親仁善鄰敦信明義罷戰爭之患宏禮讓之風保合太和用寧區宇惟茲盛美何以加焉朕之素懷與弟叶契為君之道本務愛人同日月之照臨體天地之覆育其於廣被彼此何殊況纍代以來繼敦姻戚與弟俱承先業所宜遵奉令圖自茲以還情契彌固垂之百代永遠無窮緬想至誠當同此意所附踏本啜奏請降公主姻不失舊頗叶通規待弟表到即依所請宣示百寮擇日發遣緣諸軍兵馬收京破賊頻立功勳賞給數多府藏虛竭其馬價物且付十二萬匹至來年三月更發遣一般餘並續續支付弟宜悉也安西北庭使人入奏並却歸本道至彼宜差人送過令其速達弟所寄馬並到深愧厚意敕尚覽鑠論莫陵悉繼等至省所陳奏朕具悉之國家與大蕃親則舅甥義則鄰援息人繼好固是常規朕嗣位君臨思安兆庶常以信讓為事不以爭競為心區域雖殊覆育寧別贊普天資仁德好生惡殺與朕同心重修舊好會蕃漢將相告天地神祗約誓之言至嚴至重大信一立義無改移所請奉天盟書勒於清水碑石審詳事理頗甚乖違往歲賊臣稱兵竊據城闕尚結贊志惟嫉惡義在救災頻獻表章請收京邑朕以宗廟社稷悉在上都但平寇戎豈惜酬賞遂許四鎮之地以答收京之功旋屬炎蒸又多疾疫大蕃兵馬便自抽歸既未至京有乖始望奉天盟約豈合更論朕欲苟徇彼情便令鐫刻則是非務實信不由衷欺天罔神莫大於此凡曰通好貴於推誠將垂百代之名豈顧一時之利但以事之去就須定是非若不辨明便成姑息親鄰之義豈所宜然故遣使臣與卿詳議卿是大蕃輔佐必當智識通明事理昭然不足疑惑儻有他見宜具奏聞審細研窮須歸至當所論先許每年與贊普綵絹一萬匹段者本來立約亦為收京然於舅甥之情此乃甚為小事二國和好即同一家此有所須彼當不吝彼有所要此固合供以有均無蓋是常理贊普若須繒帛朕即隨要支分多少之間豈拘定限假使踰於萬匹亦當稱彼所求朕之所重者信誠所輕者財利思與率土同臻太和想卿深體至公務存大義安人保境垂美無窮勉思令圖以副朕意今遣倉部郎中兼侍御史趙聿與來使同往書中意有不盡並令趙聿口宣尚結贊論莽羅等嘗總師徒遠來赴難功雖未就義則可嘉其所領將士等朕先許與賜物一萬匹段並已排比許卿所商量指定此使却回即發遣往今各賜卿少物至宜領之敕尚結贊卿天資材術作輔大蕃識通古今志奉忠信義聲積著遠近流傳比聞入典樞衡近知還總戎務二國所定和好首末是卿商量得卿却來深以為慰昨者邊軍狀奏彼國兵馬踰越封疆朕以畫界立盟先有定分贊普素敦仁義卿又特稟純誠背約侵漁必無此理但敕邊城自備不令輒動干戈若使效尤恐成交惡初疑界首遊奕少有乖宜不謂大發師徒漸加侵軼興兵動衆必合有名蕃軍此行未測其故朕自嗣膺寶位即與贊普通和敦以舅甥結為鄰援懲戰爭之弊知禮讓之風彼此大同務安衆庶乃於境上建立壇場契約至明誓詞至重告于皇天后土諸佛百神有渝此盟殃及其國朕敬奉誠約分毫不移信使交歡歲時無絶碑文具在可以明徵豈有一事不行一言不守一作信頃令趙聿專往近方從彼却回兼聞彼蕃使同來至今獨在道路卿所論奏朕並未知待詳事由乃可商議既稱和好理絶相疑未合輕舉甲兵便踰境界盟誓之語忽焉如遺天地神明豈其可罔卿智識明達朕所深知頃年猶舉義師救此災患今豈不存大信遂棄令名故專遣使見卿欲得審知來意佇聞還奏以副所懷趙聿及蕃使合到待覽表中意旨續即商量報卿卿涉遠而來當甚勞頓今賜卿某物至宜領之秋冷卿比平安好將士並存問之趙聿及論拱熱等至得卿表奏具見懇誠省覽言辭即稱和好及覩事迹唯務侵凌矛楯若斯將何取信審察書中之意蓋求四鎮北庭如此事宜足得商議既言通好理絶相疑未合輕舉甲兵便踰境界盟誓之語忽焉如遺天地神祗豈其可罔又聞放縱兵馬蹂踐禾苗邊境之人大遭驅掠在此未為深損於彼殊非遠謀卿之用心何乃至是國家利害計須久長和好之道既虧仁義之風何在卿智識明悟朕所深知頃年猶發義師救此災患今豈不存大信遂棄令名故遣使見卿欲得審知來意必若守其盟誓務在同和即收斂兵車速歸本界所掠百姓一切放回然後可表卿直心信卿來奏續即遣使與論拱熱同往諸事並有商量交歡必令得所或密懷他意將欲別謀彼雖未説實情此亦略為準擬但緣誓約本重朕意不欲先違以此勤勤合有相問佇聞來奏以副朕懷敕尚結贊蕃使論拱熱等與趙聿同到卿所陳奏朕具悉之誠意勤勤志敦和好上以成舅甥之義次以結鄰援之歡外以彰禮讓之風內以息戰爭之患兼此數事昔賢所難非卿材越等倫識通今古豈能匡輔大國宏宣遠圖施美利於當時傳盛名於不朽眷懷明略歎尚良多然以贊普來書務於叶睦卿之所奏亦貴通和初覽其言實嘉德義及觀其事頗訝乖違以卿賢明朕所信重棄義踰約計必不然未測事由因何至此頃年所定和好言約頗謂分明至如四鎮北庭元不割與蕃國及朱泚悖逆作亂上都卿仗義興師請收京邑遂許四鎮北庭之地將以報答成功旋屬炎蒸蕃軍便退奉天之約豈可更論事甚分明固無疑惑凡言結好所貴和同通體商量有何不可大蕃必若要四鎮北庭之地即合直以情言彼但露其誠心此亦自有分義豈假曲徵前事廣起異端仍發師徒務張威勢蕃使猶未至此蕃軍早已越疆或稱欲自赴朝或云更定言誓既虧盟約且失禮儀言與事乖將何取信夫人君立國必不徒然惟漢與蕃各受天命勝負固有定分強弱寧由力爭卿欲以衆相侵以威相脅謂天地可罔謂盟誓可渝即當肆意所為不必更論和好儻欲守其前約敦以親鄰去就之間固宜有禮遣使來往足得商量張皇師徒是何道理和好者禮義之事甲兵者爭奪之由二端懸殊理不並用今欲以用兵之勢定和好之辭事必不成縱成何益卿識見通敏器宇沉詳如此事宜不言可悉未知來意竟擬如何且首末論和是卿商議清水會盟之日卿又親發誓辭將期去殺好生修文偃武永安兆庶垂法子孫天下稱嗟以為盛美未經數歲遽有變移非獨見誚於四方亦將取笑於千古以此思度甚欲通和彼雖小有侵陵朕亦未即交惡故遣某官與卿更審籌量卿若必務同和更無他意即宜便歸本界遣使具述本情所須四鎮北庭朕當自有推議如或託稱繼好志在別圖依前縱兵不即歸國惟利是視亦識彼懷和與不和於茲決定書中事有不盡並令某官某口宣宜令速回佇望來奏所獻方物深表遠誠今賜卿某物至可領也秋冷比平安好朕失德致寇再經播越郊廟乏主禋祀曠時感憤㥽中憂愧形外日月以冀庶補前修賴天地降休祖宗儲慶再新景命祗復皇都自秋涉冬已遷於律候因心致享未展於孝思而公卿上言邀豫以備物都鄙興誦諷豫以勞人禮將俟於他年卜不先於近日永懷感慕情實未安雖則嘉話重違其如至誠難抑所宜參會㣥彥更擇近期無或因循以增不德朕再經播遷久曠禋祀不惟霜露之感實貽墜失之憂賴先澤在人上帝臨我克平大難再復舊京朕之失德非曰能補旋欲請罪宗廟展敬郊丘迫以㣥情俟于獻歲今滌牲撰吉甫及近期齋心永懷明發不寐忽覽來表良深矍然雖嘉備慮之誠實乖昭事之意朕志先定期於必行即斷來表也國之大事首在祀典所宜嚴奉以達至誠況今之所懷又異常日不克嗣守馴致寇戎淪陷國都震驚園寢幸憑元祐再續鴻休播越三時久虧禋祀之禮旋歸半載未申告謝之誠感愧積中若墜泉谷坐而待曙跂及上春庶乎天地靈祗以歆精意胡乃股肱卿士尚執疑謀出既不及告辭入又廢於朝獻罔極之慕何心自安宜潔乃誠以祗所奉副豫懇切勿復頻煩三省來表深體乃誠明孝敬之大端陳安危之上計祗率嘉話夫豈不懷永言思之固亦難抑進退慙惕罔知所裁中宵求衣當饋忘食且聿修祀事所貴專精苟未至誠則如勿祭今近期甫及當齊潔敬之心而輿誦紛然猶執異同之論禮既虧于嚴奉事奚展于孝思以義制心勉依來請重豫不德愧歎良深珍木呈祥允符靈貺顧惟不德何以當之朕聞人事聿修天休乃答今則凶渠尚在戎役方殷虐旱妨農飛蝗害稼諒咎徵之未弭曷嘉瑞而復臻所冀公卿大夫交匡不逮覩茲稱述益用懷慙嘗覽典謨每嘉儉德愛人惜費是朕素懷況大兵之餘繼以荒饉軍儲國計資用皆空凋戶疲氓膏澤已竭致人於此過實在豫內懷憂慚躬自損貶今凶渠殘滅粟麥豐成皆祖宗垂休非寡薄所致矧乎邦畿之內餒殍尤多役戍之徒傷夷未復孜孜訓戒克巳增修猶懼辱守寶圖罔答元祐豈宜暇逸以厚厥躬卿等誠在致君將順其美顧惟虛缺非所宜然頃者大勞不息至化未孚雨澤愆期蟲蝗為害朕以銷災謝譴莫大於修誠節用愛人必先於克已顧慚愆咎躬貶膳羞下以均衆庶之憂上以答昊穹之警至誠或感嘉應遂臻宿麥方成元凶已殄慶深德薄惕厲彌加忽覽表章過為稱述雖將順其美則曰乃誠而戒慎不忘諒惟朕志未喻來請深體此懷夫人事失於下則天變形於上咎徵之作必有由然自去歲已來災沴仍集雨澤不降延歷三時蟲蝗既臻彌亘千里穀糴翔貴稼穡卒癢嗷嗷蒸人聚泣田畝興言及此實所痛傷遍祈百神曾不獲應方悟禱祀殊救患之術言詞非謝譴之誠憂心如焚深自刻責得非刑法舛謬忠良鬱堙暴賊未蠲勞師靡息事或無益而重為煩費任或非當而橫肆侵蟊有一於茲足傷和氣本其所以罪實在豫百姓何辜重罹殍餒所宜出次貶食節用緩刑側身增修以謹天戒朕避正殿不御百寮奏事並於延英處分尚食進膳宜更節減百司不急之務一切且除諸軍將士外自餘應食官糧人及諸色用度等並委本使長官商量權行停減以救荒饉仍限十日內具元額及所釐革條件聞奏待至豐稔却令依舊畿內百姓委京兆尹切加慰撫除正稅正役外徵科差遣並宜禁絶非交相侵奪尋常訴訟不須追擾務且息人京畿內外及京兆府諸縣見禁囚徒死罪降徒流以下一切放免畿內及河中同州界應有因戰陳殺戮遺骸暴露者各委所在長吏隨時薶瘞咨爾卿佐實惟股肱所當一其誠心同恤災患勉修厥職副我憂勤維貞元二年歲次丙寅十一月丁亥朔十一日丁酉皇帝若曰乾坤合德聖人則之惟帝承天惟后配地嗣續百代母臨萬邦位定于中而尊加于外德修諸已而化被于人御於家邦所繫斯在三代崇替靡不由之豫是以詢衆採賢重難茲命中壼虛位於今歷年陰儀或虧宗事無主缺於典禮朕甚愧焉稱是徽章聿歸全德咨爾淑妃王氏天與純粹氣鍾元和含章在中發秀于外卓爾風操穆然容輝周旋中規進退有度仁愛共儉稟于生知詩書禮樂成自師氏竭其孝敬祗事先朝承事無違克諧尊旨往居桂苑淑問已彰洎奉椒塗謙光載路言無伐善志在匿瑕柔嘉自持喜慍莫見六宮攸序九族以親嘗屬艱迍纍從行幸思賢才以輔佐知臣下之勤勞庶績伊凝頗資內助永念頃筐之志且懷求劍之情崇位長秋永懷盛典矧惟元子貞我萬邦稽以舊章是宜從貴今遣攝太尉某官某持節册命爾為皇后嗚呼敬哉王教之端始於內範風美關雎之化雅詠思齊之德罔懈厥位忝于前修克念有終庶無後悔奉承休命可不慎歟維貞元元年歲次乙丑六月甲子朔十二日乙亥皇帝若曰王者以義睦宗親以禮敦風俗義之深實先於友愛禮之重莫大於婚姻故春秋書築館之儀易象著歸妹之吉豫是用祗考令典率由舊章咨爾嘉誠公主孝友柔謙外和內敏公宮稟訓四德備修疏邑啓封命為公主徽章所被禮實宜之今遣光祿大夫檢校司徒同平章事汧國公勉持節册命爾惟欽哉下嫁諸侯諒惟古制肅雍之德見美詩人和可以克家敬可以行已奉若茲道永孚于休懋敦王風勿墜先訓光膺盛典可不慎歟維建中二年十一月某日皇帝若曰夫茂建親戚以敦族固本明慎選納以厚別蕃嗣實人倫之始王教之端也朕奉若謨訓允求淑哲賢必有象鍾慶於令門姻不失親載光於戚里故某官駙馬都尉田擇交第若干女生稟柔惠習知禮則容德純備孝睦洽聞可以叶美好逑輔成樂善是用使某官某持節册命為蜀王妃嗚呼敬之哉備禮以崇其好合起家而居其爵位非義信不固非溫順不親克恭匪懈則罔攸悔朕言必復可不慎歟維建中二年十一月某日甲子皇帝使某官持節册命某官竇兟第若干女為王妃曰於戲禮以大婚崇繼嗣本人倫之教詩言淑女配君子繫王化之綱蓋率人成風由內及外得不采嘉耦以固盤石刑閨門以御家邦詳求惟難歷選茲久時乃之擇得於舊姻柔婉稟乎天和禮樂成于家法明章婦順虔奉姆儀克茂鵲巢之規叶宣麟趾之美其祗膺嘉禮欽率內教淑慎厥心無替於後嗚呼可不慎歟維興元元年歲次甲子正月癸酉朔二日甲戌皇帝咨爾具官某嗚呼君者所以撫人失於所撫則叛下者所以奉上失於所奉則刑各當其理德用不擾各違其分亂於是生朕德薄化淺昧於君道罔知省已姑務責人是以徵師徂征連歲靡息惟爾以誠志之不達反仄於厥衷阻衆興戎結黨拒命豈非上失於所撫而下失於所奉與書曰萬方有罪罪在朕躬我實不德兆人何咎俾廢其生業離於室家陷於困窮死於戰陳老疾廢養孤惸靡依怨結蒼生感傷和氣朕為人父母得不愧於心哉晨興以思夕惕以悼粵自嗣位迄今六載天將悔禍朕方覺悟爾亦知衆心之厭亂思所以保安叶於朕懷若應符契非天地合德人神合謀將茂育㣥生則何以臻此朕是用上順天意俯從人心滌爾疵瑕復爾爵位坦然靡阻君臣如初功載鼎彞名藏王府子孫代代為國勳臣河山帶礪傳祚無絶朕方布大信承天子人若食其言何以享國嗚呼其祗若明命用保無疆之休維貞元二年歲次丙寅八月丁巳朔三日已未皇帝若曰咨爾四鎮節度管內黃姓纛官驃騎大將軍行左金吾衛大將軍員外置同正員兼試太常卿頓啜護波支惟爾乃祖乃父代服聲教勤勞王家勳書于鼎彞族列于藩籍爾克紹先祖之烈而重之以忠貞嗣守職官祗若朝化率其種落保我邊陲丹誠向化萬里如近是用稽諸令典錫以券書若金之堅永代無變子孫繼襲作我藩臣爾其欽承勿替休命皇帝若曰朕承祖宗之鴻烈獲主神器任大守重懼不克堪思與賢士大夫共康理道虛襟以佇側席以求而㣥議紛然所見異指或牽古義而不變或趨時會而不經依違以來七年于茲矣國制多缺朕甚恧焉今子大夫博習墳典深明教化褎然充舉咸造于庭其極思精心以喻朕之未寤仲尼敘禮樂刪詩書修春秋廣易道六經之教所尚各殊豈學者修行理當區別將聖人立意本異宗源施之於時孰為先後考之於道何者淺深差次等倫指明其義夫知本乃能通於變學古所以行於今今之教人則異於是工祝陳禮樂之器而不知其情生徒誦禮樂之文而不試以事欲人無惑其可得耶將革前非固有良術堯舜率天下以義比屋可封桀紂率天下以暴比屋可戮然則上之化下罔或不從而三仁四凶較然自異有教無類豈虛言哉作樂移風聞諸昔典夫至雅必淡至音希聲文侯列國之賢君猶曰則惟恐寐矧彼流俗其能化乎將使天地同和災沴不作黎人丕變姦慝不萌何施何為以致於此王者制理必因其時故忠敬質文更變迭救三代之際罔不由之自秦剗古法漢雜霸道紛綸干祀王教不興國家接周隋之餘俗未淳一處都邑者利巧而無恥服田畝者朴野而近愚尚文則彌長其澆風復質又莫救其鄙俗立教之本將安所從自昔哲王惟以三正互用後之術士乃言五運相生以漢應火行則周為木德禮稱尚赤義例頗乖永言於茲莫識厥理九流得失之論歷代興亡之由王鄭識理之異同公穀傳經之優劣必精必究用沃虛懷皇帝若曰朕遐觀典謨詳求理道三代之際粲然可徵未嘗不文武並興農戰兼務故能居則足食動則足兵兵足則威食足則固威則暴亂息固則教化行理國之本實在於此秦漢已降王制不修選士廢射御之儀教人無搜狩之禮即戎者不知其稼穡力本者罕習于干戈於是異文武之人分農戰之道守則乏食征則鮮兵歷茲千年竟莫能復抑知者蓋寡將行之惟艱歟朕念之甚勤思繼前躅良以軍旅之士役戍靡寧勳庸既多爵秩咸貴俾服田畝慮興怨咨仰給縣官不可勝計由是版圖日減阡陌歲荒水旱小愆廩餉咸竭欲使軍人悅歸於耒耜儒者兼達於韜鈐田萊盡耕攻取必勝誘人孔易其術安施王者之師本於立德兵家之法方務出奇德以信成奇以詐勝理有違反將何適從宋襄成列而敗軍見嘉魯策韓信決囊以摧敵取貴漢朝然則喪國亡身豈霸王之道冒危乘厄非仁誼之心所宜討論以定裦貶夫衆寡不敵克必以謀樂生下齊孫子破楚魏武之勝袁紹宋高之滅姚浤成敗之由備陳本末古人有言曰誅伐不可偃於天下又曰善為國者不師二端異焉其有深旨子房序次兵法任宏論撰軍書指明異同詳録名氏想聞商略擇善而行
