front:
  text: 全唐文欽定全唐文卷二十四元宗五
  hash: sha256:01efe0e2de39585aa33fafc13c1943247f7377e307aff552cc86bb0fea08275a
body:
  text: 自今巳後每年立春之日朕當帥公卿親迎春於東郊其後夏及秋常以孟月朔於正殿讀時令禮官即修撰儀注既為常式乃是常禮務從省便無使勞煩也存有懿範沒有寵章豈獨被於朝班故乃亞於施政可以垂裕斯為通典故惠妃武氏少而婉順長而賢明行合禮經言應圖史承戚里之華胄升後庭之峻秩貴而不恃謙而益光以道飭躬以和逮下四德粲其兼備六宮咨而是則法度在己靡資珩珮躬儉化人率先絺綌夙有奇表將加正位前後固讓辭而不受奄至淪歿載深感悼遂使玉衣之慶不及於生前象服之榮徒增於身後可贈貞順皇后宜令所司擇日册命湯沐建封古今通典豈獨貴於寵數亦兼崇於美名第二女性與柔和生知法度率以師氏之訓成其天然之質有行之禮將及於笄年備物之恩俾開於井賦可封臨晉公主食實封一千戶猶子之恩特深於情禮睦親之義必備於哀榮同安郡王珣稟氣淳和執心忠順邦國垣翰宗枝羽儀磐石疏封將期永固逝川不捨俄歎促齡悼往之懷因心所切宜增寵命用飾幽泉可贈太子少保葬事官給陪葬橋陵皇王之化載籍所陳將奉天而育物必順時而行政雖禮文則著而親祠蓋闕朕自膺寶歷且踰二紀承宗社之降祉賴公卿之叶心萬物阜成庶務易思以黎獻臻夫仁壽是用敦本復古將必稽於月令謀始作則先有事於春郊宜因展禮之辰式布惟新之澤其天下見禁囚應犯死罪者特宜免死配流嶺南巳下罪並放免朕每念黎氓弊於征戍親戚多別離之怨關山有往復之勤何嘗不惻隱於懷寤寐增嘆所以別遣召募以實邊軍錫其厚賞便令常住今諸軍所召人數向足在於中夏自可罷兵既無金革之事足保農桑之業自今巳後諸軍兵健並宜停遣其見鎮兵並一切放還京畿之內雜役殷繁言念劬勞豈忘優恤頃以櫟陽等縣地多鹹鹵人力不及便至荒廢近者開決皆生稻苗亦既成功豈專其利京兆府界內應雜開稻田并宜散給貧下及逃還百姓以為永業書不云乎不作無益害有益語不云乎奢則不遜儉則固緬懷前古嘗折在心將斫雕以為朴期上行而下效自今巳後王公不得以珍物進獻所司應緣宮室修造務從節儉但蔽風雨勿為華飾至於金玉器物諸色雕鏤朕緣蕃客所要將充宴賞今流俗之間遞相倣效既損財於無用仍作巧以相矜敗俗傷農莫斯為甚并一切禁斷以絶浮華古者鄉有序黨有孰將以宏長儒教誘進學徒化人成俗率繇於是斯道久廢朕用憫焉宜令天下州縣每一鄉之內別各置學仍擇師資令其教授其諸州鄉貢明經進士每年引見訖并令就國子監謁見先師所司設食學官等為之開講質問疑義且公侯之裔皆稟義方學禮聞詩不應失墜容其僥幸是瀆化源其於貴胄子孫如聞近來宏文館學士多有不專經業便與及第深謂不然自今巳後宜一依令式考試朕之爵位惟待賢能雖選士命官則有常調而安卑遁迹尚慮遺才其內外八品以下官及草澤間有學業精博蔚為儒首文詞雅麗通於政術為衆所推者各委本州本司長官精加搜擇具以聞薦發生之月實在於行仁利物之心莫先於作善先斷捕獵令式有文所繇州縣宜嚴加禁止其每年千秋節日仍不得輒有屠宰道釋二門皆為聖教義歸宏濟理在尊崇其天下觀寺有絶無道士女冠僧尼者宜量觀寺大小度六七人擇灼然有經業戒行為鄉閭所推仍先取年高者凡百卿士朕之同德宜勉所職以合時令禮有時施惠義兼行賞實為其時固不可缺亞獻忠王璵宜賜物一千匹終獻潁王璬賜物五百匹邠王守禮寧王憲各五百匹慶王琮巳下及長公主郡縣主二王後京文武官賜帛各有差天下諸州侍老宜令所繇長官量賜酒肉務在優養今朝廷無事天下和平美景良辰百官等任追勝為樂宜即布告中外咸使聞知古之封建誓以山河義在疇庸故無虛授西南蠻都大酋帥特進越國公賜紫袍金鈿帶七事歸義挺秀西南是稱酋傑仁而有勇孝乃兼忠懷馭衆之長材秉事君之徑節瞻言諸部或有姦人潛通犬戎敢肆蜂蠆遂能躬擐甲胄總率驍雄深入長驅左縈右拂凡厥醜類應時誅翦戎功若此朝寵宜加俾膺胙土之榮以勵捍城之士復遣中使李思敬齎册書往册焉王者立法所貴無私有過必懲古之令典太子太師蕭嵩纍踐清資嘗居重任身寵茅土家榮姻戚人臣之貴莫二止足之分當知曾不是思乃行非道城南別業地即膏腴畝直千金蓋謂於此遂將數頃輒遺仙童名位若斯恩遇亦甚昵於庸豎更欲何求靜言其情深所未諭但久經任使措在朝廷自不飾觀良用驚聽豈可輔導太子頡頏正人宜從貶出以肅紀綱可青州刺史張守圭本自戎行夙承任遇去歲軍務失實乃命謁者監牛仙童宣諭朕意輒便結託凡細令其詭詞賂以百金兼之數口恐懼邊塞或容苟求遣謁軒墀何不早自披露用茲奉國曷以為顏猶念舊勳俾從寬典可括州刺史此城儀鳳年中羌引吐蕃遂被固守歲月既久攻伐亦多其城巖險非力所制朝廷㣥議不令取之朕以小蕃無知事須處置授以奇計所以行之獲彼戎心歸我城守有足為慰也德以柔遠兵以威敵服而捨之古之制也突騎施吐火仙可汗骨啜弟葉護頡阿波等背化乘邊阻兵恃衆雖蟻聚為梗或擾疆場而王師所向盡搗巢穴憫其束身就戮歸命而朝宜加宥過之典載洽覃恩之命俾厥弟兄並膺光寵或分茅土復列鉤陳骨啜可左金吾衛員外大將軍仍封為循義王頡阿波可右武衛員外大將軍分命本枝列於庶位博考方册斯為大猷皇太子之子俶等觀其器識日以通敏仁和之性自然忠孝之誠克備率由禮度能稟義方學既著於崇儒材可使於從政爰茲拜職宜從紫綬之榮勉爾修身式副緑車之寵可封俶為廣平郡王儋為南陽郡王倓為建寧郡王佖為西平郡王僅為新城郡王僩為潁川郡王又封慶王之子儼為新平郡王伸為平原郡王棣王之子僎為汝南郡王僑為宜都郡王榮王之子俌新唐書表作俌傳作俯舊唐書傳則又作佩為濟陰郡王偕為北平郡王儀王之子侁為豫章郡王按新書傳作鍾陵郡王世系表作臨川郡王舊書傳作供鍾陵郡王並其名亦復互異矣健新書傳表俱作僆舊書傳作健為廣陵郡王潁王之子伸與慶王之子同名新舊書皆同為滎陽郡王永王之子易新書傳表俱作易舊書傳作瑒為襄城郡王壽王之子伾新書表傳俱作伾舊書傳則作徑為濟陽郡王延王之子倬為彭城郡王濟王之子傃為永嘉郡王故洪州人塢元崇往者來應嘉詔次於虢略忽睹元元皇帝俾之升雲空中與言使戒天后表國祚中興之運示寶歷無疆之期遂能不顧其身來傳此旨竟遭幽縶諒可傷嗟自非竭節本朝孰克犯顏茲日宜加追贈用慰幽魂可贈棣州刺史古之為理必順時行令獻歲發春仁氣育物直叶陽和之德以勤播種之務天下諸州委刺史縣令加意勸課仍令採訪使勾當非灼然要切事不得妄有追擾其今月諸色當番人有單貧老弱者所司即揀擇量放營農至春末巳來並宜準此用嘉成德將及推恩疏封錫號禮典攸在第二十女資身淑慎稟訓柔明克備肅雍之儀允彰圖史之德而方營魯館宜啓沁園俾承寵於中闈復增榮於列賦仍食實封一千戶王者作樂古之大猷蓋以殷薦上帝嚴配祖考況順天地之理開山川之風發揮雅音導達和氣揖讓而理不其盛歟自戰國以來此道隳壞但紀鏗鏘之節寧探述作之深歷代因循莫之改革朕嘗以聽政之暇緬尋前典雖舊制之空存而正聲之多缺將何以列彼祠祀感於靈明斯事體大諒資合度是用躬親有以裁校定六律而為本避五行之相克寸哀慢淫過去其弊也清濁剛柔適其中也亦既協應頗為成文或得之於自然乃不知其本故豈上元幽贊俾正缺遺者哉方於六代之作亦各一時之義也乃命奉常陳於祀事用昭誠敬且敦風俗而王公卿士爰及有司頻詣闕上言請以唐樂名斯至公事朕安得而辭焉然則大咸大韶大頀大夏皆以大字表其樂章今之所謂宜曰大唐樂能以位讓為吳泰伯存則用成其節歿則當表其名非常之稱旌德斯在故太尉寧王憲誕含粹靈允膺大雅孝悌之至本乎中誠仁和之深非因外獎率由禮度雅尚文儒謙以自牧樂於為善比兩獻而有光與二南而合德自出臨方鎮入配台階逾勵忠勤益聞周慎實謂永為藩屏以輔邦家曾不憗遺奄焉殂沒友于之痛震慟良深惟王朕之元昆合升上嗣以朕奉先朝之睿略定宗社之阽危推而不居請豫主鬯又承慈旨焉敢固違不然者則宸極之尊豈歸於薄德茂行若此易名是憑自非大號孰副休烈按諡法推功尚善曰讓德性寬柔曰讓敬追諡曰讓皇帝宜令所司擇日備禮册命神之降休禮無不答永言禋祀必在躬親朕粵自君臨載宏道教崇清淨之化暢元元之風庶乎澤及蒼生時臻壽域積以歲月未嘗懈怠豈謂微誠感通烈祖降見乃昭靈命是錫寶符因而求之應言而獲亦既至止果表殊徵諒惟祕詞不可詳説然邦家大慶何以過焉是知神仙所緘造化同固爰初有待經韞櫝而多時潛應改元若符契之相合景福攸介祗畏良深而㣥官宗室抗疏於外元良諸子屢請於中逮夫緇黃兼彼耆老以至懇誠不巳前後相仍願加天寶之名用易開元之號顧惟菲薄曷以當之然則元訓在乎欽承人心難以推拒順天從衆義協至公敬依所請實用多愧斯蓋上元厚載爰及百神孚佑效靈協於睿祖幽贊惟新之歷克彰永代之祥宜遵祀典式陳昭報可以來月十五日祔元元皇帝廟十八日享太廟二十日有事於南郊宜令中書門下與禮官等即詳定禮儀具録聞奏應緣行事及較官等各委有司不須別差人執當其北郊宜差公卿擇日祭五嶽四瀆及名山大川各令所在長官備禮陳祭務申誠敬副朕意焉大道先於兩儀天地生於萬物是以聖哲之後咸竭其誠今後應緣國家致命表疏簿書及所試制策文章一事巳上語指道教之詞及天地乾坤之字者並一切半闕宜宣示中外庇生人者必崇於大道受成命者實賴於前烈恭惟大聖祖元元皇帝道光太極首出混元宏敷妙門廣運真化雖乘時御氣既超升於上清而儲祉發祥每孚祐於來裔祚我寶運格於皇天爰自創業逮於茲歲頻彰嘉貺屢覩真容使夫天清地寧物阜人庶六氣時若四夷來王皆聖祖之感也至道之應也成功不宰豈假於強名降福無疆敢忘於昭報是用薦徽號增禮册蠲潔以盡敬躬親以致誠意既昭格良深感慶宜因展事更廣揚名夫聖人之生乃先天地應變無體其德猶龍雖窅冥之初不知誰之子而誕靈之後亦必有先聖祖父母著在圖牒母益壽氏巳崇徽號曰先天太后父周正御大夫敬追尊為先天太皇仍於譙郡置廟自餘一事以上準先天太后廟例昔契敷五教殷以為祖稷播百穀周以配天況咎繇邁種黎人懷德我之本系千載彌光敬追尊為德明皇帝涼武昭王朕十一代祖也積德右地炳靈中葉奄有萬國兆先帝功敬追尊為興聖皇帝其陵側近仍並禁樵牧春秋二時備禮致祭且聖祖所理本在諸天將欲降靈固宜取象況為帝號豈可名宮其元元宮宜為太清宮西京改為太清宮東京改為太微宮天下諸郡改為紫極宮兩京宮內道士宜先擇有道行者一七人自餘於新度人中擇取添滿三七人為定額仍各賜近城莊園各一所並量賜奴婢等其道士女道士先令司封較不須更隸宗正寺所置崇元署宜停古人制禮祭用質明義既取於尚幽情實緣於既歿我聖祖湛然嘗在為道之宗既殊有盡之期須展事生之禮自今巳後每聖祖宮有昭告宜改用卯時巳前行禮朕深唯復朴將致無為嘗恐至理難明元風未暢不有時習焉能化成自今巳後每至三元日宜令崇元館學士講道德南華等諸經㣥公百辟咸就觀禮庶使軒冕之士盡宏南郭之風寰海之內咸為大庭之俗其崇元館大學士宜賜物一百匹學士賜六十匹直學士四十匹宮內先配住道士各二十匹宣布中外令識朕懷故開府儀同三司使持節大都督雞林州諸軍事兼持節寧海軍使新羅王金承慶弟憲英奕葉懷仁率心嘗禮大賢風教條理尤明中夏軌儀衣冠素襲馳海琛而遣使準雲呂而通朝代為純臣纍效忠節頃者兄承土宇沒而絶嗣弟膺繼及抑惟常經是用賓懷優以册命宜因舊業俾承蕃長之名仍加殊禮載錫漢官之號可襲兄新羅國王開府儀同三司使持節大都督雞林州諸軍事兼充持節寧海軍使禋祀者所以展誠敬之心薦新者所以申霜露之思是知先王制禮蓋緣情而感時朕承丕業肅恭祀事至於諸節嘗修薦享自流火屆期商風改律載深追遠感物增懷且詩著授衣令存休浣在於臣子猶及恩私恭事園陵未標典式自今以後每至九月一日薦衣於陵寢貽範千載庶展孝思且仲夏端午事無典實傳之淺俗遂乃移風況乎以孝道人因親設教感遊衣於漢紀成獻服於禮文宣示庶寮令知朕意朕永維聖道思闡儒風故尊崇先聖所以宏至教褒獎後嗣所以美前烈文宣王三十五代孫通直郎前守邠王府文學褒聖侯孔璲之纂承睿哲克履中庸三命益恭敦素憑於祖業百代必祀光寵被於朝恩積慶之餘既開於土宇盛德不朽宜傳於帶礪可襲封文宣公亠兊州長史遷都水使者食邑一千戶履端正名義取垂範體元設教在乎變通雖沿革從宜罔不稽古朕纘復興運恭守睿圖嘗恐至化猶微淳風尚薄未能臻華胥之俗登可封之人故未明求衣日昃忘食勵精為理思致雍和歷觀載籍詳求前制而唐虞之際煥乎可述用是欽若舊典以協惟新可改天寶三年為載今春事將興陽和布澤發號施令之日革故履新之時宜宏在宥之恩以助生成之化其天下見禁囚徒應雜犯罪死者宜各降一等自餘一切放免其十惡及造偽妖妄頭首官吏犯贓並姦盜等害政既深情難容恕不在免限凡諸郡縣仍令太守縣令勸課農桑其先處分太守縣令在任有增減戶口成分者所繇司量為殿最自今以後太守縣令兼能勾當租庸每載加數成分者特賜以中上考如三載之內皆成分所司録奏超資與處分其丁戶仍須案實不得取虛挂之名使親鄰代納受其姦弊凡在黎獻實資存恤一失生業則流庸不歸每軫於懷深可矜憫諸色當番人應送資課者當郡具申尚書省勾覆如身至上處勿更抑令納資致使往來辛苦從閏二月至六月巳來其當上人中有單貧老弱者委郡縣長官與所繇計會便放營農諸軍征鎮及在尫羸疾病者委節度使速擇放還中外庶僚勉修其職各副朕意宜布遐邇咸使知聞王者法天惠人順時行令是惟舊典用致和平朕臨御萬邦於茲三紀宵衣旰食思宏至化尚恐天下郡縣囹圄滯留不即疏決以傷和氣今三農在時宜助生育庶覃寬宥之澤以協上元之心其天下見禁囚徒應合死配流嶺南流巳下罪并見徒一切放免其責保在外及追捉未獲者并同見禁例處分其京城內宜令中書門下即分往疏決應合流人便配訖聞奏其東京及北京兼諸郡各委所繇長官準此處分即宣示中外咸使知聞惟神之主必恭禋祀率先之訓義在躬親朕欽若昊穹子育黎庶思通明靈之德以洽和平之理是修闕典咸秩無文如在之誠久陳於郊廟懷柔之至亦遍於山川況九宮所主百神之貴上分天極下統坤維陰騭生靈功深亭育故式昭新典肇建明祠將以為人載祈孚佑宜叶元辰之吉用申大祭之禮可以今月立春朕親祀九宮壇仍令中書門下與禮官等即詳定儀注奏聞呼韓來享位列侯王烏孫入和義通姻好懷柔之道今古攸同寧遠國奉化王驃騎大將軍阿悉爛達干志慕朝化誓為邊扞漸聲教而有孚勤職貢而無闕誠深內附禮異殊鄰爰錫嘉偶特申殊渥四從弟前河南府陽城縣令參第四女質稟幽間性惟純懿承姆師之訓導實宗人之光儀固可以保合戎庭克諧邦選宜膺遠好以寵名蕃可封和義公主降寧遠國奉化王肅雍稟德邦化所崇湯沐疏封古訓斯在第二十一女踐修閫則素承阿保之嚴砥礪嬪儀率由圖史之範璁珩既佩柔願無違蕙問充昭常華自著肇施綵級將具禮於輜軿載錫粉田俾申榮於井賦可封太華公主食實封一千戶闕之德教始宮闈湯闕皇帝二十二女二十三女誕膺闕發令姿頗沐公宮之訓遵師氏之則顧史瞻圖日將月就華宗叶慶方從下嫁之儀盛典申榮式備開封之制二十二女可封壽光公主二十三女可封樂成公主仍各食實封一千戶
