front:
  text: 全唐文欽定全唐文卷三百二十一李華八
  hash: sha256:1a5b3025016c9e5022009ec24729e87896df71c6776f639147dd37413b99a622
body:
  text: 嗚呼姑孰東南青山北址有唐高士李白之墓嗚呼哀哉夫仁以安物公其懋焉義以濟難公其志焉識以辨理公其博焉文以宣志公其懿焉宜其上為王師下為伯友年六十有二不偶賦臨終歌而卒悲夫聖以立德賢以立言道以恆世言以經俗雖曰死矣吾不謂其亡之也有子曰伯禽天然長能持幼能辨數梯公之德必將大其名也已矣銘曰立德謂聖立言謂賢嗟君之道奇於人而侔於天哀哉君姓權氏諱皋字士繇天水人苻秦尚書僕射翼之後世為著姓祖某某官父某某官咸有令德君既冠進士及第試臨清尉時節將兼本道使籍君高名表為薊縣尉充判官無何主將以逆節露君乃詐死扶親涉江既免禍纍知機其神先帝聞而歎之除評事御史方議大用屬太夫人病危將侍奉憂勞因中痼疾無何太夫人終君泣血三年厥疾用加服除遷起居舍人著作郎大歷元年四月某日不幸逝於丹徒因殯焉享齡四十二嗚呼識者慟哭聞者痛心君有大節不可奪大名不可掩大才不可及大行不可名天與之仁不與之年哀哉自開元天寶以來高名下位華方疾不能備舉然所憶者曰河南元君德秀元終十年而南陽張君有略張沒二年而君夭元之志如其道德張之行如其經術君之才如其聲望人倫其瘁乎公素與昌黎韓幼深京兆王鎮卿洎華友善韓評君曰可以為宰輔王評君曰可以為師保華評君曰可以分天下之善惡一人而已矣夫人隴西李氏仁賢有一子某生七年矣哀禮成人嗚呼有後哉朝廷贈君以祕書少監悼賢也華因病風扶曳而往哭之嘗聞師乙之言曰溫良而能斷者宜歌齊權君可謂溫良而能斷者也故為齊風表君之墓云忠於而國孝於而家潔而不滓瑜而不瑕仁胡不壽為善者何君不幸耶時不幸耶聖唐祖宗重光丕變萬國元宗肅宗今上三后繼明格於上下其輔弻之臣曰趙公奉先少師之訓有大功於王室少師諱景晊字某清河東武城人也惟成於姜水氏曰有呂德莫厚乎粒蒸人大庭之烈也勳莫盛乎除暴虎尚父之明也讓莫大乎推社稷季子之高也丁公之元子曰季克讓乞歸老於崔氏宜乎其盛也八代祖元孫宋度支郎中以忠烈見危致命夫人攜二子亮敬默依夫人之黨挺志羇孤之中安親危窘之際亮即公七代祖也八為尚書一為僕射孫肇師官至中書侍郎元子北齊安州總管府掾諱道淹公之曾祖也生萬年主簿臨洺令諱方騫公之大父也生武功主簿贈吏部尚書諱貞固公之考也郎中殉王事僕射利生人中書之名望安州之道德臨洺之愛人武功之體道荀淑以盛德及子陳實以素風及孫誠哉吾聞其語矣今見其人也公孩抱太夫人終童幼武功府君逝根於至性毀過乎哀鄉黨憐之皆曰純孝既除喪外從禮訓內積憂慕啜菽飲水勵志讀書誦無遺文釋無遁義皆一覽也年十七與親兄晙同舉明經調補梁州南鄭尉轉蜀州晉原尉前後使臣表公第一遷大理評事親纍貶利州葭萌丞歷梓州鹽亭丞樂天知命貞獨自晦君子哉改晉州司法參軍政尤一道刺史按察使皆以上聞充河東軍支使畢尚書構為連帥也假公判官仁者悅不仁者懼遘厲終於官舍春秋四十權厝於邙山元元廟西北原識與不識罔不相弔時人之安放後人之不幸夫人滎陽鄭氏皇朝兵部郎中衛州長史元升之女吏部侍郎平章事愔之妹終京兆崇賢里權殯於長安東南杜陵原夫人鞙佩紛燧以寧顏色闕澄羃酒以奉蒸嘗輔佐君子黔婁之室也撫導賢允孟軻之母也內訓傾謝婦儀無師嗚呼哀哉大歷四年龜筮從吉嗣子圓尚書右僕射趙國公哀奉先少師夫人之裳帷合祔於河南北邙山某原禮也趙公初為益州刺史屬逆羯內向天下兵起至尊出長安避狄未有岐下之都因奉表上迎保寧聖德遷為中書令翼大明復天下肅宗申養元宗申慈趙公之宣力也事今上鎮揚州為吏部尚書左僕射崔氏之門公盡善哉洪河在北清洛在南二室之下邙原高起是地也是宜君子幽宅寧於斯永保子孫昌於斯其文曰翼翼孝嗣銜哀不言祗感永思常試討論齊為霸國鄭甸闕姬姜協德貽慶後昆在昔貞烈爰有魏嶼疑播遷建都公將南轅造舟人便開漕利源宜有令允中書玉振安州榮道臨洺體順尚書葆光公以德鎮既輸典刑亦清維晉天不我遺時將疇師夫人之德柔善有則鼓鐘于宮聞于四國從夫訓子天下是式不及劬勞趙公罔極克誕趙公蓼莪孝思奉若先訓其貴如斯今日之祿先人之慈保寧幽宅天地無期公諱并字某趙郡高邑人也在昔咎繇謨明元元道德武安之功秦人息甲廣武之略淮陰東面魏則中書為藎臣齊則常侍參佐命左丞聲動鄰邦著明哲於周隋水部才冠時倫資訓迪於忠孝國朝則蒲州之仁政趙州之懿德趙州生晉陽尉諱希遠道崇位卑鍾慶身後官婚人物為山東上族五百餘年矣公少孤以經明行修登第直崇文館授雍邱尉屬國家升中泰山縣當馳道徵責萬計臨事無違居至卑而不折當大務而不撓外兄許公蘇尚書頲特親重之秩滿考六經覽㣥書手抄二百卷觀其大義歷交城尉無何丁內艱柴毀終禮授榆次尉裴尚書胄先為太原尹廉察河東引公在幕賢者知勸不仁者懼既而從調朝廷詔有司精求令長公以崇璧之姿鐘彞之重屈為蕭令邑臨古汴之衝每歲為害公因租之集兩稅一石置於水濱治之為防水不敗稼蕭人賴之徐方歌之則政之利人餘可知也選授太原府法曹參軍事大都阜殷嚚訟填積公鏡其詐實皆叶厥中太原國之北門枕扼夷夏屬狂胡首亂悉衆來攻公撫弦登陴左右軍師完城池潰凶醜有力焉詔加朝散大夫遷太子洗馬拜右諭德進階正議大夫東宮圖書亡逸有司命公留北部搜訪焉淮南節度故相崔尚書圓表公為揚州右司馬世系表作左司馬將任以州政方祖道遘厲而終享年六十六廣德二年六月十三日也長子規前刑部員外郎兼侍御史次子覲故沂州沂水縣丞次子覿故太原府榆次縣尉次子峴前汾州平遙縣丞幼子觀前左監門衛率府兵曹參軍事世系表稱長子峴廬江令次子規壽州刺史三子覲四子覿幼子觀官閥不同次序亦異泣血茹悲哀號萬里求仁者之助於江湖奉迎裳帷於太原歸安洛汭禮罔不備某年月日窆於某原禮也規有公遺風國之才臣嘗為晉州吏職中外宣力王室聞於天下公其不亡矣公有文有武簡而能肅不伐其勞推其美於人神明質高嶷如山阜味道於老莊還性於禪慧每涉危必免阽患無傷冥然禮順疑若靈助蓋德之所至者也嗚呼位不尊壽不遐時耶命耶華於公諸從鴈行為公所知感規之孝祗述盛烈以慰諸孤之心其銘曰貴為侯伯來日赫赫百夫之特所稱者德神錫純嘏道無違者淮南鎮揚為右司馬嘗蒞蕭人蕭人以淳嘗掾太原功宣北藩艾綬銀章大夫之尊春秋匪懈榮於寢門宜其永世天胡降戾仁而有子哀號萬里維嵩之隅維汾之涘我卜我筮壽宮修止與天無期寧極於斯子孫百代拜手於斯永泰元年四月戊子唐舊相太保韓國公薨天子輟朝㣥臣出次五月壬午贈太師七月丙子詔使中謁者蒞祭京兆少尹護喪龍旗輤車鹵簿哀導加於一等園塋封樹碑版垂後盛於當朝葬我韓國公夫人名本於宏才非此運不揚元勳出於忠烈萬死之中登諸日月九天之上乾坤閉而復闢鈞軸折而再駕故肅宗皇帝於行在見公曰欲求良弻其在茲乎公諱晉卿字元輔上黨壺關人祖襲夔贈太子太師父殆庶贈禮部尚書公成童好學弱冠工文二登甲科三入高等始自郡邑臺省之任終乎廊廟台輔之器至於牧四郡使四道在人為政之絶跡於公能事之常格故不足敘天寶之末胡羯亂常公身在陷穽心圖遼廓謁至尊於幕殿議大計於轅門天子壯之拜為左相公於時與兵部尚書汾陽郡王經略大業翊贊中興公撫於內汾陽營於外克二京復九廟尊先帝返上皇公之功也乾元二年元凶授首陳希烈等四十八人議在殊死公抗疏上論以四方猶虞罪當寬宥三司質定其事不行於戲慶緒之誅也不用公議使有思明之難朝議之減復行公計果令天下大安仁人之言不可已矣上元二年元宗升遐詔公攝政肅宗違代令公當國道合君臣時契雲龍於二主功高宇宙德鍾社稷於一身夫平計之勃安之總有平勃之勛伊攝之霍立之再當伊霍之任人臣貴極今古罕儔公晚嬰衰疾屬辭樞務遂得特紆聖眷俯降臣禮赤墀之下杖策來朝宣室之中肩輿入見此則明主上德而屈體忠臣感恩而忘形君臣之間斯為盛矣無何有詔冊授太保軍國大務仍咨訪焉公至和為心太素為體以虛舟應物世纍不能干其神以公器濟時江海不能開其慮故軒裳鐘鼎於我如浮雲大位遐年在生為逆旅享年七十有七歷仕二十有四順如也夫人韓國夫人博陵崔氏詩書之門金玉其度先公而歿今則祔焉嗣子發丕堅粲垂向呂稷望咸等並強學懿文保家繼代忠足以勵行孝足以揚名敘德立銘願昭先烈掌文之客敢忘大猷其詞曰有唐宗臣為國元老清明淳粹全德體道磊落臣節深沈廟謨智能逃難忠則忘軀幽薊弄兵咸秦振蕩舉族南棄拔身北嚮一見先皇其言甚壯指麾籌畫爰立作相天地反正蒼生之望伊昔南狩衣冠下從三司獻議萬乘將同諫書一出天下稱公二聖登遐萬方是荷聖皇在暗務輟宸坐稱政臨朝非公不可彼蒼不仁殲我鼎臣天歸說夢嶽降申神嵯峨碑版突兀封樹嗚呼相國韓公之墓梁國公諱峴字某其先隴西人曾祖曰吳王太宗愛子也父曰信安郡王元宗之大臣肅宗之軍佐也公年二十學道於大智禪師志深行苦禪師謂曰汝當為國家陳力緣不在此也自太子通事舍人五遷為魏州刺史化行河朔再遷為京兆尹歲大水至尊幸溫湯每冬為恆畿輔進奉萬計公止府縣無所獻上知其簡亮益以重之甸服千里饑不為害忠矣哉權臣所排出守零陵再遷御史中丞荊州等五道副元帥徵為宗正卿鳳翔太守時兵荒之後兩京未復公為政人不勞而公賦足智矣哉除尚書左丞禮部尚書御史大夫兼京兆尹公明賞罰而隱人過下吏不逮上延威伸令引自謝責而慰安之推德及人剛柔皆化仁矣哉平訟獄刑察以人情斷以古義正詞匡上直法伸下明矣哉遷吏部尚書平章事以正直進以正直退貶蜀州刺史遷為御史大夫兼江陵尹節度觀察使入為禮部尚書宗正卿加黃門侍郎平章事以道事君不可則止可謂大臣歟行垂益之道事堯舜之君公志不申元元失望除太子詹事又歷御史大夫禮部尚書遷吏部領遷當作選江西改兵部復命至南陽詔兼衢州刺史一州之人如得父母永泰二年八月薨於衢州一州之人如絶乳育天地痛心朝廷悲懷贈太子少師諡曰某兵部尚書少師同先父之職國家孝治追其世德乎周之興也內有周召外有伯禽康叔漢之盛也東平入輔聖德巍巍公為股肱衛侯之哭柳莊曰非寡人之臣社稷之臣也公可謂社稷之臣歟夫子稱閔子騫曰孝哉閔子騫稱史魚曰直哉史魚宣盛德者一言蔽之與公遊者詠公之德曰柱石天下儀刑縉紳宋韓房後惟公一人公享年五十五伯兄峘戶部尚書統江淮嘗與公並為御史大夫及公之逝伯季同齒哀哉仲兄嶧戶部尚書散騎常侍一門親賢繼美畢榮盛矣哉公嗣子大理司直孝孫孤女范陽盧浩妻哀有餘禮孝因其心孝矣哉哀奉世父尚書公之裳帷自信安歸於上都跣行號哭三千餘里以大歷二年某月日窆於某原禮也夫人河南獨孤氏祔焉夫人某官某之女以才淑禮法聞於邦族公為茂德崇勳之後享大名尊位有令兄弟有賢夫人有孝男有孝女全美如是雖古烈無之夫人趙郡李氏諱某字某號惠日自後魏義豐懿公璨七代至明經君元福道義德禮歸於一門魏史所謂事親孝謹風度審正是也年十三歸於貴鄉丞范陽盧公善觀姑崔夫人待子婦甚嚴年高多疾自未人奉養體氣日和姑視夫人愛子如也夫人奉養姑慈親如也撫下掩其小過因而誨之則大過無從生矣姑怒責幼賤夫人則跪請曰此誠違教尊宜降責新婦不安請引外懲恥既而輕罰復命姑或未厭則曰責誠未塞伏以尊慈恐他日追憐傷尊之心崔夫人撫而笑曰李新婦不唯安吾兼變吾性自是委以家政其柔明婉敏皆此類也盧公為宕州司法參軍夫人隨之官西南羌戎不知長幼之別夫人威儀敬順聞於殊俗羌戎化焉太夫人因疾喪明夫人奉衣則安奉膳則飽每曰此女在側吾忘失明及居憂泣血三年終身銜戚讀論語詩書禮傳古史針頌近世詞賦合於雅者盡諷之善鼓琴幽閒自娛志普門之教肸蠁符應六姻孤幼歸夫人者如不孤焉開元元年終春秋五十無子有女一人孝慈明惠如夫人之德歸於安邑令趙郡李公遺孤檢校吏部員外華不及逮事感慕罔極聞於外家十不存一哀書大略敢告史官或問曰德先生者奚氏余曰南陽張姓有略其名維之其字也或曰與古誰倫可以簉七十子乎余曰七十子或賢或恆人方於賢原憲宓不齊其比也或曰大哉余曰七十子親聖人之道者也維之追聖人之道者也七十子得聖人疆畛之際維之得聖人衣冠之潤向使獲親聖人則鱗差耕雍也或曰何咎而瞽余曰聖賢偕時故春秋之亂冉耕惡疾左邱明卜商皆瞽聖如夫子失司寇饑於陳蔡忠如萇宏謀尊王室而戮死君子道消故仁賢窮維之鄰道昌黎韓極亦以德聞與維之同病不幸二子不以病為僉而喪中明者也或曰夫如是得無誄之余誄之曰神胡病後之人而奪先生噫嘻哀夫德甫余將疇兄浩浩乎平沙無垠敻不見人河水縈帶㣥山糾紛黯兮慘悴風悲日曛蓬斷草枯凜若霜晨鳥飛不下獸挺亡㣥亭長告豫曰此古戰場也嘗覆三軍往往鬼哭天陰則聞傷心哉秦歟漢歟將近代歟吾聞夫齊魏徭戍荊韓召募萬里奔走連年暴露沙草晨牧河冰夜渡地闊天長不知歸路寄身鋒刃腷臆誰訴秦漢而還多事四夷中州耗斁無世無之古稱戎夏不抗王師文教失宣武臣用奇奇兵有異於仁義王道迂濶而莫為嗚呼噫嘻吾想夫北風振漠胡兵伺便主將驕敵期門受戰野豎旌旗川回組練法重心駭威尊命賤利鏃穿骨驚沙入面主客相搏山川震眩聲折江河勢崩雷電至若窮陰凝閉凜冽海隅積雪沒脛堅冰在鬚鷙鳥休巢征馬踟廣豆寸繒纊無溫墮指裂膚當此苦寒天假強胡憑陵殺氣以相翦屠徑截輜重橫攻士卒都尉新降將軍復沒尸踣巨港之岸血滿長城之窟無貴無賤同為枯骨可勝言哉鼓衰兮力竭矢盡兮弦絶白刃交兮寶刀折兩軍蹙兮生死決降矣哉終身夷狄戰矣哉暴骨沙礫鳥無聲兮山寂寂夜正長兮風淅淅魂魄結兮天沈沈鬼神聚兮雲羃羃日光寒兮草短月色苦兮霜白傷心慘目有如是耶吾聞之牧用趙卒大破林胡開地千里遁逃胸奴漢傾天下財殫力痡任人而已其在多乎周逐玁狁北至太原既城朔方全師而還飲至策勳和樂且閒穆穆棣棣君臣之間秦起長城竟海為關荼毒生民萬里朱殷漢擊胸奴雖得陰山枕骸遍野功不補患蒼蒼蒸民誰無父母提攜捧負畏其不壽誰無兄弟如足如手誰無夫婦如賓如友生也何恩殺之何咎其存其歿家莫聞知人或有言將信將疑悁悁心目寤寐見之布奠傾觴哭望天涯天地為愁草木悽悲弔祭不至精魂無依必有凶年人其流離嗚呼噫嘻時耶命耶從古如斯為之奈何守在四夷維乾元二年歲次己亥六月乙未朔三日丁酉趙郡李華祭於劉三兄之靈惟兄高韻曠度拔於時倫德契中和道符深仁泉明其照情性其文疏近無二心冥則親雅敦名教素遠權利夷險一節通塞一致有時不適與道偕醉跡隨沈浮量混同異白雲何遠清風自至人或知兄王佐之器豈人無福而兄夭年浙東幕庭喪此一賢識與不識辛酸泫然秦失五羖舂不相杵清標高志行乃動主繄我夫子列在中士職無所統談笑而已居室言善感於千里綿江越湖掩涕相視追懷晨夜道則同謨定交梁國周旋兩都更相默喜吾道不孤契闊艱難誰榮誰枯良願再諧握手東吳羇旅情倍天倫豈殊去歲季冬將膺使檄纍辱來召陵江挂席持酒歡酣憂懷頓釋攜手終日晤言竟夕無食不均無衣不易題序申餞情深義激贈言綢繆寵我行役涉泗而還遽承遘癘猶復垂念尺書相繼將慶有瘳俄哀永逝萎我盛德天胡不惠嗚呼痛哉華江濱憔悴風溼所侵疾不果問喪不果臨無由執紼從茲破琴異鄉之慟於此何心不言少別便為古今嗚呼痛哉光烈幕府親兄重兄恩深撫孤義感平生臨弔盡哀行路涕零躬護喪事推以信誠古風復存今見哀榮嗚呼痛哉孀妻晝哭弱子縗絰蕭蕭旅塋空對江月想像遊處心乎鬱結羽毛相依忍此凋缺寢門之悲悽斷吳越蘇門朗嘯於此長絶泣戒將命往申微醊此如不祭祗益酸咽兄性與道合棲心福庭故於是奠不列葷腥願垂惠照以濟幽靈值佛開法長為弟兄素心惟此敢告冥冥尚享維乾元三年二月十日孤子趙郡李華以清酌之奠敬祭於亡友故揚州功曹蘭陵蕭公之靈嗚呼茂挺平生相知情體如一歲月之別俄成古今天乎喪豫此痛何極華舋罰深重艱難所鍾殊方永慕觸目號裂途窮易感況哭故人以足下才為挺生名蓋天下道孤命屈淪厄終身避亂全潔忠也冒危遷祔孝也有王佐之才先師之訓而歿於道路何負於天乎痛哉華疇昔之歲幸忝周旋足下不棄愚劣一言契合古稱管鮑今則蕭李有過必規無文不講知名當世實類無人循環往復何日忘此存實等泣血千里羇旅相依聞其一哀心骨皆斷夫痛之至者言不能宣雖欲寄詞祗益填塞茂挺君其降靈尚享維年月日左補闕趙郡李華謹奉清酌微奠祭於故國子祭酒劉十六兄之靈痛矣夫時方刑措誼傅長沙運丁中興衍廢於家命與道乖末如之何先師微言行已堙塞續儒濟德俾世為則專門繼起人用不惑季孟叔仲並華於國文傾遷固理破楊墨濁斯渾清曲莫容直孤玉沈韻高鴻墜翼疇昔之年逆虜悖天帝命西平董戎於關上宰姦回蔽明怙權沮以監撫海內翻然督哥舒將盍不速轅兄在西陲飛章上言喻古引今易亡為存時憚姦邪不聞帝閽文武房公慷慨獨論迎吠狺狺竟寢斯文華忝諫官亦嘗披肝千里同氣寤寐永歎請受監牧請鎮豐安乞固上黨乞備太原心竭犬馬事屈㣥頑哥舒表華掌記轅門明明仁兄紹介三軍舉族在此懼為禍原竟迫方寸孤天負恩聖朝孝理未忍行戮爰詔三司伏念哀鞫網脫烏鳥恩開桎梏實賴仁人再春枯木房公介然明華於朝兄志提挈出泥登霄言於宰司大啓學徒陳沈洎華可備師儒堂堂昌言光我囚拘褚中不行何日忘諸功曹垂侍恩比天倫手足是比枯榮一人友愛惟深憐眷益親艱厄流離存永分冀遊門閫以慰酸辛誰謂凋落今惟二人嗚呼哀哉弟參邦憲兄鎮海夷誰云存歿共彼有期謂天無親胡與善違孺子攀號遠奉裳帷季氏呼天割我四支平生故人橫涕交頤寄窆空原時逮興師官尊地偏禮不成儀回望舊邦素車遲遲潯陽地古舉目悽悲執紼流慟誰堪此時余生易感況已衰羸泣薦潢汙魂兮臨之尚饗維永泰二年歲次庚午正月某朔日趙郡李華謹遣從姪詹事府丞廉以茶乳疏果之奠敬祭於亡友張五兄博士之靈嗚呼痛哉先生之終人倫不幸況乎小子最飽道風何悲如之先生以道為貴以德為富以樂天知命為壽則非其道而貴者賤也非其德而富者貧也不樂天不知命而壽者夭也然先生道貴德富加以樂天知命之壽固無恨矣所痛者仁而無後天道何以為善與神理何以為正直滔滔江水此慟何窮嗚呼哀哉華殘年衰病足不履地撫膺而哭欲往無由千里申奠不任酸咽仁兄先生俯鑒悲懷尚享
