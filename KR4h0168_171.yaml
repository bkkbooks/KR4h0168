front:
  text: 全唐文欽定全唐文卷一百七十一朱敬則二
  hash: sha256:1e0270359eeb54560f3153a6b46a9ecb49e25d218a81668a1f7fb9edd8e5c388
body:
  text: 梁高祖聰明文思寬厚通博生而神異動多奇怪此天表也永元之初㣥賢受命竭懷輔正盡力康衢細隟未開纖塵不動而雄圖英算孤識獨見審長河之將決知崑山之必焚理欲先天未遑後舉叫嘯龍虎合集風雲馳兩函以取荊州連五都以震都邑長流遠邁獨決方寸霜風飛掃雲雨霑沐白旄一麾頑童授首乃弔冤魂而謝牛酒昭筐篚而軾善人師不疲勞人無怨讟謳歌是逼獄訟攸歸代易德成眷命斯在然躬覽載籍備睹興亡留心求瘼勵精納善雖化未大道時亦小康也若尋其德音討其風俗尚根淺易拔源涸難流禍亂相仍蓋其宜矣且兵號義旗戰稱伐罪勝非已利功豈私成湯有慚德去道近也武無愧容其私厚也昔魏太祖兵鋒無敵神機獨行大戰五十六九州靜七八百姓與能天下慕德猶且翼戴弱主尊獎漢室降及宋高翦平偽孽安復王家義聲薄天高誠動日然更懸兵四嶽決勝五湖北靜燕塵西清秦霧宏勳不讓盛德見推備物滿庭猶存非望故晉帝今日之事本所甘心義士猶或非之通人尚為薄德况梁取天下又甚於斯南康主盟實稱齊帝奉之以成大順承之而動義兵國步既寧家怨又雪君稱主祭臣復何猜借人之名而不復命者也尋其錫文考其謙讓事同對面理非飾詞寧知悠悠江山相去千里矯情偽迹頓至於斯示人此心豈躬行事欲令節義行於比屋其可得乎夫君人者日月齊其明陰陽質其信江海同其量天地偕其容未有飾智驚愚衒材惑衆較武力於羊侃示腰腹於賀琛商略儒宗取異於章句變置官品無求於典實每事皆欲先人所唱復須稱贊父作子注君制臣歌受佞無厭進諂不倦浮華道長輕薄路開以天譴為嘉祥用妖怪為休祉聚斂俱極賞罰無章有識為之寒心㣥僚曾不先覺若言位是神物何須下殿走乎若言負重願休何勞受贖歸乎若言息人是務何須納叛臣乎若言吞伐有時何須中許和乎利器不藏姦夫得志然則侯景之兵我人也仗我器也驅我人揭我器而取雋者豈異術哉由上人之失教也君父幽辱宗廟傾危帝子王孫跨州連郡未有晉鄭齊心牟虛合契五侯九伯列海分山罕聞申包胥之頓哭秦庭茅夷鴻之幣謁吳國戶口徒衆不覩死戰之人寵遇雖多寧有報恩之士江淮無波瀾之阻城闕絶藩籬之固長州杜若一旦凋零稽山竹箭忽然摧折可不甚歟或問曰梁主不以黃屋為尊紫宸為貴離欲絶愛遣色歸空有湯武之憂勞若堯舜之臞臘享國五十若登春臺忽為羇旅叛臣鳴吠逋醜長戟指闕強弩臨城兵折意窮忿毒而沒善不可恃岐路何歸君子曰梁主之美誠如子言神無與善未敢聞命何者武帝暮年荒誕實甚殫守縣之力不充自縱之資盡丁口之租才足緇衣之費昔夏桀以九州之富秦皇以六合之尊造瓊室而天下土崩作阿房而寰中瓦解况地比一郡國乃三分外有征戍之勤內有雕靡之弊加以金剎寶柱煥爛雲霞至於銀榜珠簾的白歷星月神怒人怨禍積患生過往必來何足疑也且夫惡於齊而保於我何補也得一夫而亡一國非智也昔趙納馮亭有長平之禍梁受侯景成永福之災金甌忽傷悔之何及孔子曰夏道不亡商德不作商道不亡周德不作梁自侯景入寇蕭察外奔西鄰責言南風不競篡殺三帝覆沒兩都可謂亡矣但人痛既深天道亦悔是以大命集於有陳也武帝身長七尺垂手過膝蓋姚襄劉備之儔也惟寬以容物明以知人曠蕩不羈雄勇蓋世聲振嶺表功濟日南屬王室不綱大難未已江湖㣥盜日尋戈戎是以投袂而呼夕不待旦以梁大寶三年二月會王僧辨於白茅灣齊小白之合諸侯以謀王室臧子源之要天地惟討賊臣故戮力盡心有死無二義聲一發其從如雲端居不言神光滿室建牙將指飛龍在天其所志也叛而伐之伏而舍之伐叛刑也柔伏德也德刑既舉人知其心旦為仇讐暮為賓友文公指白水蕭王推赤心不足加也若乃侯瑱賊將也降無季布之疑安都敗帥也歸受孟明之任重孝穆之義待之如賓釋歐陽之囚惟賢是用故得㣥材畢用衆勇合威蕩遍地之橫流廓溥天之巨祿臠侯景於竹町執王偉於草間爰其息歸瞻烏遂止仍以新不間舊疏不間親高讓近臣方求別統昔魏推袁紹漢謝項王道貴能伸理不嫌屈及江陵不守喪君有君疆場無虞㣥臣輯睦足以攄三瞳疑之遺憤歇萬國之夙悲既上宰變圖假立非次晉出子圉秦納貞陽陵谷遷移對之長歎君臣易位但覺悲哉况乃居泛不歸焉用方伯在鄭未納誰曰勤王於是潛謀腹心陰召武旅囚杜陵於別室告文帝於臨時舟乘旦潮旗寢夜月掃重氛於絳闕反宸極於紫微役不浹辰區宇大定加以北挫蕭軌西拒王琳聖德日新元勳漸茂然後繼宋齊之丕業承舜禹之大名升壇而告上元分圭以揖㣥后大哉美哉人無間焉但雲雷尚屯邊塵未弭翌日告漸綴衣在庭楚之王孫歎布衣之未返燕之太子踐機橋而不歸悲夫長城公器識古人承平嗣主觀其求忠讜之士禁左道之人淫祀妖書鏤薄假物即古明哲何以加焉但強寇臨邊南國斯蹙禮義不舉苛刻日滋鄰好不敦驕傲是務嬖妾五十盡有珥貂之容麗服一千咸取夭桃之色加以貴夾坐狎客承筵玉貌絳脣咀嚼宮徵花箋綵筆吟詠煙霞長夜不疲略無醒日於時也隋德甫隆南被江漢厚待間諜羊叔子之傾敵人不伐有喪楚恭王之結鄰好加以賀若謀勇應變如神擒虎雄風臨機若電莫不迎刃自裂聽鼓爭奔斬張悌之守迷降薛瑩之知命紫殿正色不用袁憲之言白刃交前但為無社之計嗟乎龍盤虎踞之地露草霑衣千門雙闕之間風煙歇絶臨江離別之感赴洛嗚咽之悲五百里之俘囚纍纍不絶三百年之王氣寂寂長空一國為一人興前賢以後愚滅其來尚矣或問曰安樂公劉禪歸命侯孫皓溫國公高緯長城公陳叔寶並稱域中之大據天下之尊或銜璧送降或逃竄就繫必不得已何者為先君子曰客所問者具在方册請為吾子陳之任自擇焉若乃投井求生橫奔畏死面縛請罪膝行待刑是其謀也馬上唱無愁之歌侍宴索達摩之曲劉禪不思隴蜀叔寶絶無心肝對賈充以不忠之詞和晉帝以鄰國之詠是其才也縱黃皓嬖岑昏寵高壤狎江總是其任也剝面鑿眼孫皓之刑棄親即讐高緯之志其餘細故不可殫論聽吾子之懸衡任夫人之明鏡客曰入井下策也昔孫資陰謀晉宣入輔鄭譯矯制隋文受遺自此而有魏人從斯以遷周鼎蓋天厭亂德神誘其衷若妄指河冰遂成王業誤擊金鼓仍啓霸國也况體貌奇特儀表絶人周太祖之欽明異其風骨齊憲王之聰察憚以非常韋鼎一見以委誠趙公聞名而進女是以稱劉季之靈怪者不謀同詞説中興之應讖者往往偶語屬周多世故禍難荐臻始以后父之尊遂受託孤之寄騎虎不下掎角是因不利孺子非唯管叔之言社稷輸人寧止休公之對所以尉遲舉魏從亂如雲王謙據蜀其徒若市遂能驅駕豪傑委任忠良不下廟堂天下大定然後謳歌允集文物滿庭卿雲曉聚長星夜掃拱揖而朝㣥后升壇而類上帝紹舜禹之遺躅光漢魏之大名於是流曠蕩之元風浸淳古之膏澤削秋荼之繁令革亡國之哀聲加之以恪勤廣之以質素太陽滿昆蟲之穴湛露垂行葦之苕教人七年亦可以即戎矣俄屬陳朝喪德江海揚波自絶于天結怨于下乃以開皇八年十月承少昊之秋氣動文昌之將星下蜀漢之舟翩翩龍躍集幽並之騎蕭蕭馬鳴一葦而可以橫大江三令而可以陵湯火蔣山苦戰子文之魂魄飛揚建業大崩叔寶之金湯不守既遭岸上之虎非復水中之龍斬伯噽以謝陳人禮陸機而慰吳士春波暫洗汙俗咸新秋露一零弊化斯改乃下制曰今率土大同含生遂性內外職位遐邇黎人家家自修人人克念使不軌不物蕩然俱盡此乃憂勤之心見於動靜故使六合之中觀如曉日八紘之內若遇新晴况復盡力於人勵精為政躬親以率下因心以感物煙火萬里風雨四時野有擊壤之歌天無垂象之誡元闕一字丹徼煙燧不驚玉檻金河波瀾久息天子登雲臺而訪道實垂拱而無為公卿指日觀以推誠願升中而每竭可謂盡美矣未盡善也然天性既猜素無學術意不及遠政惟目前是以牝雞司晨讒人罔極剖符罕山河之固同盟多翦黜之悲恩不終於有功罰每深於無罪啓鬩牆之兆借實沈之兵楊素決其波張衡注其隟柳遠草制房陵尚遙穆子授戈豎牛仍在禍非天降釁是人謀是以知隋運之不永矣君子曰昔陸孟知中興之微宣帝始重儒術李通稱漢家之命世祖專信讖文時好既行其流遂廣故子雲符命尹敏偽言即其類也高祖少愛不經之談遂好迂誕之説所以王劭順旨袁充取容賞溢邱山恩深江海豈不弊乎又祥瑞者聖人之應也至若八百集於孟津六王至於陔下周人岐山之北晉衆江漢之南負樂就陳攜手適宋牛馬內向㣥盜外奔宗社乂安黎民不散此瑞之上也若乃連珠共軫的礫清漢之涯合璧齊輝光芒黃道之上四時不爽百穀用成家有孝慈人懷禮義此善之應也至如白鹿朱鴈璚露卿雲鳩雀異毛草木殊狀此並沐我皇澤煦我帝春聖人圓城之中天子生成之物豈足表太平之日顯休明之辰而隋主好之意不能盡遂令巧偽相半何其薄哉近石虎之有中原也羶胡臰羯牧馬驅羊子女歿於淫昏文物盡於鋒鏑猶得厭六馬駕四麟燃連理之材煮白雉之肉若天道不惑應降以災由斯而談斷可知矣隋之眷眷復何為哉問曰晉克金陵功多者屬吏隋平建業德俊者尤闕一字豈爭名於朝事必須此將廉恥道盡莫畏書乎君子曰曉兵之家因敵變化故有功成請罪之義君命不受之談今者王濬乘風賀若先戰苟有大利何細瑕方知責兵士之汙宮闈徵軍司之隱玉帛豈不狹乎始知范燮後入孟側不前郤克有詞馮異不語時無君子斯焉取斯豈與夫自伐無慚奮髯直出而相類乎又問曰王者初興必有佐命莫不同聲相應同氣相求白雲之鬱應龍清風之集雕虎不以夷險易志不以遠近隔心千載一時其來尚矣三代以前緬邈無際兩漢之後聲名可尋若乃庇俗匡時體國經野謀出心膂政待股肱但清濟之入濁河波瀾莫辨蚊虻之附驥尾遲速罔知既因論討之餘願示懸衡之末君子曰神人無功達人無迹張子房元機孤映清識獨流踐若發機應同急箭優遊淡泊神交太虛非諸人所及也至若陳平荀彧賈翊荀攸劉煜郭嘉田豐沮授崔浩張賓等可謂天下之菁英帷幄之至妙中權合變因敗為功爰自秦漢訖於周隋蘭菊相薰惟有此矣如蕭何之鎮靜關中寇恂之安輯河內葛亮相蜀張昭輔吳茂宏之經理琅琊景略之弻諧永固劉穆之衆務必舉揚遵彥百度惟貞蘇綽共濟艱難高熲同經草昧雖功有大小運或長短咸推股肱之材悉為忠烈之士若乃威以靜國謀以動鄰提鼓出師三軍賈勇置兵境上千里無塵內外兼材惟孔明景略也故崔浩云王猛是苻堅之管仲劉裕是德宗之曹瞞孫盛云孔明善輔小國子産之流也斯言中矣煬帝美姿儀性聰慧少好學善屬文故高祖獻后特所鍾愛矯情飾迹有曹丕之釣名傾承中使若子楚之仁孝况南平江左北靖塞垣楊素譽其賢桑和説其貌屬青宮失愛子掖流恩遂映前星乃升明兩衣冠雖偉入朝少四皓之賓公宴雖多言談止七子之客但姦心未露偽迹斯窮沐猴而冠輕薄之材不久祝虎為善爪牙之毒會施故無道於大漸之晨蒸淫於易簀之夕罕高宗之諒暗有丹朱之慢遊於時隋德在人㣥生樂業二十年之訓聚百萬衆之精強乘天下之盈驕海內之無事乃自以土廣三代威振百蠻恃才矜已傲狠明德內懷險躁外示寬平盛衣服以掩姦飾詞令以拒諫更乃荒淫無度法令滋章人力盡於穿築杼軸空於聚斂十室之內思亂者一二焉方始馭八駿建五牛穆天子之白雲更遠瑤池之外秦始皇之觀日方踐石梁之前或以衢路受刑或以滋味被戮死不可無罪而免賞不可有功而要相顧凜然莫知攸止十室之內思亂者五六焉於是斛斯外奔元感內逆兵陷遼水糧斷河黎月暈七重知髦頭之犯畢日光四散覺兆庶之分崩且選妖麗恣朋淫嘉㣥嫗之慢言樂少年之醜穢不軌不物無威無儀關梁不通賦役斷絶更乃逆取五年之課以充長夜之娛十室之內思亂者八九焉當此時也小人方興㣥盜孔熾大者剽州邑小者劫村閭擾擾四人俱靡息肩之處喧喧九土俱為鬬戰之場天子乃幸維揚泛舳艫驅虎賁之騎唱龍舟之歌以大江為天塹以長淮為地險周章至於戲下猶自未知閻樂入於廡前何不告我昔為天下之重今乃一夫所輕豈不惜哉彼煬帝者聰明多智廣學博聞豈不知蛟龍失雲漁父足得為害鯨鯢出水螻蟻可以為災忽乃棄崤函之奧區違河洛之重阻言賊者獲罪敢諫者受刑豈不是色醉其心天奪其鑒竄吳夷以避其地虛宮闕以候聖人蓋為大唐之驅除也君子曰小人之心猶火也火之性必須有所燒小人之心必須有所害當其受寵遇也排忠良庇道德辨足以移視聽辭足以結主心導之以淫奢引之以苛刻人用而不恤政荒而不修如螻蟻潰隄防不覺其敗如春風養草木但見其盛事至而未知禍搆而方懼素無材略不能以敗求全本自少恩豈能得衆成事進退唯谷無處容身或出奔以圖生或殺主而自解眇觀史策遍採興亡開役者多是愛臣害上者無非近習然庸君暗主莫肯遠之復何言哉昔秦廢五等崔實仲長統王朗曹冏等皆以為秦之失余竊異之試通其志云蓋明王之理天下也先之以博愛本之以仁義張四維尊五美懸禮樂於庭宇置軌範於中衢然後決元波使橫流揚薰風以高扇流愷悌之甘澤浸曠蕩之膏腴正理革其淫邪淳風柔其骨髓使天下之人心醉而神足其於忠義也立則見其參於前其於進趨也皎若章程之在目禮經所及等日月之難踰聲教所行雖風雨之不輟聖人知俗之漸化也王道之已行也於是體國經野庸功勳親分山裂河設磐石之固內守外禦有維城之基連結遍於域中膠葛盡於封內雖道昏時喪澤竭政塞鄭伯逐王申侯弒主魯不供物宋不城周吳徵百牢楚問九鼎小白之一匡天下重耳之一戰諸侯無君之迹顯然篡奪之謀中寢者直以周禮尚存書不隕故曰不敢失墜天威在顏自春秋之後禮義漸頽風俗塵昏愧恥心盡疾走先得者為上奪攘投會者為能加以八世專齊三家分晉子貢之亂五國蘇秦之鬬七雄苛刻繁興經籍道息莫不長詐術貴攻戰萬姓皆戴爪牙無人不屬觜距所以商鞅欺故友李斯囚舊交孫臏喪足於龎涓張儀得志於陳軫一旅之衆便欲稱王再戰之雄爭來奉帝先王會盟之禮昔時樽俎之容三代元風掃地盡矣况始皇削平區宇殊非至公李斯之作股肱罕循大道人無見德唯虐是聞當此時也主猜於上人駭於下父不能保之於子君不能得之於臣欲使始皇分土姦雄建侯薄俗若喻晉鄭之可依便借賊兵而資盜糧寄魚龍而助風雨不可行也是以秦鑒周德之帛丿糸深懼已圖之不遠罷侯置守高下在心天下制在一人百姓不聞二主直是不得行其世封非薄功臣而賤骨肉也高皇帝揭日月之明懷天地之量算材不足以分賞論功不足以受封邑皆百城土有千里人殷國富地廣兵強五十年間七國同反賈誼憂失其國鼂錯請削其地若言由大而反也不若召陵之師踐土之衆也若言有材而起也劉濞非王霸之材田祿無先管之略也且齊晉以逆禮為慙吳楚以犯上非愧釁由教起其所由來遠矣自此之後雜霸又衰中興不能改物創圖黃初不能深謀遠慮緬乎漢魏之際尋其經緯之初未有積德重光澤及萬物觀其教偷薄於秦風察其人豺狼於漢日故魏太祖曰若使無孤天下幾人稱帝幾人稱王明竊號諡者觸目皆是欲以此時開賜履之祚垂萬代之封必有通車三川以窺周室介馬汾隰而逐翼侯王司徒屢請於當時曹元首又勤於宗室皆不知時也
