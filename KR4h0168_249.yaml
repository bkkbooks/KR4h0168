front:
  text: 全唐文欽定全唐文卷二百四十九李嶠八
  hash: sha256:bdfbae522d5bbfd8e409505330b64eeb506ec2075e7fdfc10a1ce2813a15ccb3
body:
  text: 粵若太極始搆氤氳含五氣之精元胎既分鼓舞立三才之位由太朴而觀成象自流形而臻物備因乾坤之變化相后辟之經綸則知肇創雲雷非一聖之事奄荒區夏由浸昌之業是以岐酆受命武王戢商野之戈譙亳開基文后遷漢宮之鼎若乃提六合之樞紐扣二儀之鐍鑰日月既出方利見於通三風雲未和尚勞謙於初九蓄宏圖於緣鶴之邸垂慶緒於斷鼇之運屈伸應物而無累於時進退隨方而不違於道非聖人之睿智其孰能與於此乎大周無上孝明皇帝諱某字某太原文水人也其先出自周平王少子有文在其手曰武因以姓氏居沛之竹邑晉尚書僕射開府儀同三司薛侯陔其後也六代祖洽仕魏封於晉陽食采文水子孫因家焉夫其受氏中古開階上業軒轅以青龍進駕配永循機少昊以元鳥名官修方正度高辛之首戴干盾后棄之躬勤稼穡或四妃分孕隨肩執天下之圖或三聖連衡踵武司域中之契宗支繼明而襲嘉帝載重熙而累洽雖七百休祚暫遷於質文而九五尊名復光於歷數自非慶鍾長發神應遠期人鬼贊其謀猷乾坤扶其統緒豈能出入百代周旋萬朞至道淳風未昏而已旦洪鑪大寶既舊而還新家纂迎日之符門傳配天之業環三辰於斗極不足比其崇高灌四瀆於滄溟未能儔其深遠若夫振氓育德屈道不王舄奕於昭穆之閒頡頏於公卿之位葢詳諸惇史可得而畧高祖成皇帝宏才碩量經文緯武曾祖章敬皇帝達學通儒金聲玉振大父昭安皇帝心冥道德志挾九區顯考文穆皇帝理會幾神名高四海帝即文穆之第四子也母文穆皇后嘗祈晉祠於水濱得文石一枚大如燕卵上有紫文成日月兩字異而吞之其夕夢日入寢門光耀滿室已而懷孕遂產帝焉及載誕之宵夢人稱唐叔虞者謂后曰余受命於帝保護聖子驚寤而帝已生明日紫氣氛氳覆冒其城上俄而化為五色髣髴若文綉之衣左右親賓莫不駭異及長龍顏方面身長八尺背有黑子象北斗之形昔者禱於郊禖拾卵而興王業游乎溫洛吞珠而立帝期一作基譙宮誕而青氣發祥猗殿生而丹曦授彩亦有御蘭感夢皇天之命伯儵翦葉開封上帝之名太叔咸躋未然之兆並獲將來之應猶不能比蹤神貺埒美聖符況乃龍顏武肩有含良之骨法戴鈐懷斗似高密之容狀是故生而聖知幼而聰達敏給於論天之始徇齊於對日之初甫及勝衣究緹緗之賾逮乎束髮殫鞶帨之巧淳深孝悌之性闇發天機宏裕仁慈之風匪因師習太后嘗被重疾不愈經時帝扶侍起居品嘗藥物僅踰蒼舒稱象之歲未及子建誦詩之年履不正絇衣不解帶及丁荼蓼號慕嘔血七日無水漿之膳三年罷鹽酪之滋扶杖而行殆至毀滅雖孝文之服勤累載高宗之諒陰三祀無以加也常有大節罕營小方志立功名而不求苟得心重氣俠而動循常憲道德深富規模宏遠曠心將江海齊逸宏量與宇宙同寬是以單父通人識其殊異之表大梁奇士許以霸王之畧文穆皇帝則哲之鑒恒易其難惟幾之神每前其用嘗從容謂諸子曰吾家累仁千祀積德重葉餘慶所及宜在子孫今觀汝曹悉王佐才也然草創經綸之際聖賢馳騖之秋騰嘯而馭風雲叱咤而成功業其在士彠耳以如天之聖用知子之明櫽括所在錙銖不繆豈如趙邦謀嗣惟驗於藏寶楚國擇材更憑於埋璧及文穆之棄代也帝廬於墓塋負土成墳手植松柏喪紀之節復如居穆后之哀有芝草生於廬前㣥烏數萬銜土集於墳上山中舊多猛獸行李艱阻至是皆逃竄絕迹時人以為純孝之感焉隋高祖雅聞帝名屢加辟召友人同郡叔孫賀博通之士也陰陽術數無所不該謂帝曰公狀貌非常但玉理一作埋未發耳終居人上勿為事先帝亦知隋統將終乃稱疾不應漢王諒以戚藩之重作牧太原乃親率官僚造門致禮深加敦諭逼令進發帝不得已起應明敭至仁壽宮屬隋文帝寢疾有勅館於內史省以須後命帝高名宿望傾動當朝承風仰流揖拜無地衣冠如宗海之赴士庶均在田之覩司徒觀王雄左僕射楊素吏部尚書牛宏兵部尚書柳述咸與抗禮延登首席中郎之下迎王粲計吏之長揖袁逢千載風流復存斯舉帝風儀偉麗占對詳明朝端改容左右屬目雄等素欽才辯欲探閫奧爭出異同互興名理而洪鐘有虛受之量明鏡體不疲之德詞同炙輠應若扣機立定雌黃既堪嬴后前膝坐離堅白足使田巴杜口觀王既特相欽慕牛宏亦深加敬異並虛心降節投分申交而楊素負才恥己不若雖外示接引而內懷猜忌乃私謂觀王牛宏曰吾觀武氏風骨實有英雄之度今太平無事安用此人不如除之王等不荅而柳述又潛遣相工視帝帝知之深不自安會隋文帝崩因移病出外素等以為偽迹從此欲搆禍端賴觀王牛宏營護得免漢高以英威冠代取忌范增劉主以倜儻出㣥見疑曹操比方前事有若合符帝既脫網羅深自隱匿雖室家追訪猶見碭山之雲而廛里去還不就丹陵之日辭杜城之弋獵罷雷澤之漁釣獨覽前志長懷古人有行高於時有行濟於物輒慷慨擊節殷勤留想便欲冥道契於一朝託神交於千載塤篪唱和自多跗萼之親風景遊遨無乏林泉之興歲將晏也龍蟠鳳戢者久之大業七年煬帝徵天下精兵會於涿鹿將親授節鉞以伐遼左旌旗亘於千里轉運盈於萬軸閭閻失業郡縣不安帝謂諸兄曰夷狄不賓肇於上古自當置之度外耳未有紆萬乘而讐小忿擾㣥生而赴非急夫兵猶火也不戢自焚禍亂之萌從此始矣既而六師魚潰九野鴻飛竟兆天亡之徵卒成土崩之勢帝於是慨然有志方思濡足乃討論兵法商搉將率上自黃帝下訖有隋考其謀畧機權稽其成敗得失並列名氏為之贊論殫魚鈐武韜之術究元女黃公之符勒成一家凡三十卷名曰古今兵要制高秦肆事軼魯門可以刻祕牒而昇廟堂可以藏名山而懸日月聖人之心情見矣天下之能事備矣于時兵戈屢擾饑饉荐臻英傑懷逐鹿之心氓黎有瞻烏之懼期謝公之出處以卜興衰待韓王之從就而論勝負與能之託時議攸歸長吏猜焉數令相覘帝自惟人望懼發禍機欲混迹而同塵且韜光而向晦乃出應期命為河北道總管府司騎參軍智周變通道兼語默戢大鵬之舉逐集榆枋降應龍之神還游陷穽楊元感之作亂也後主方重討遼東元感進圍洛陽官兵頻戰不利城中大駭議欲出降時帝在東都懼其失計遽往見留守樊子葢為陳用兵形勢制敵權宜論元感必敗之徵說都城可守之策子葢大悅拜而從之爾後軍謀一皆諮稟卒擒元感帝之力焉後主歸自遼陽子葢方之行所邀帝同發擬相推薦帝知後主猜忌不願多取功名深自謙撝發言懇到子葢心悟歎息而罷於是汎以軍功奏授正議大夫遷晉陽宮留守司鎧參軍無忌之克敵讓封仲連之立功辭位比我休德曾何足云帝既博通㣥書兼善衆術拂龜端策未勞詢於詹尹推歷考度無假訪於山稽大業十二年後主幸江都宮帝私謂諸兄曰此行也不復還矣繇是鄉里宗族勸帝起義帝每自推算知時命未符又念叔孫賀之言故抑而不許初李密為楊元感謀主元感不能從及聞帝與樊子葢運籌所揣皆如密意乃歎曰天下奇才也遂遣書招帝帝笑而不從諸兄素聞密名勸帝帝曰密雖有才氣未能經遠欲圖功業終恐無成會唐高祖安撫太原便留鎮守帝觀之曰雄傑易聰明神武此可與從事矣投刺往謁焉賈文和之揣君酈食其之觀將翔而後集可謂明也高祖亦虛心結契握手推誠周文之得姜牙載以騑服成湯之逢伊尹告之宗廟便應爪牙之任即承心膂之託高陽賊歷山飛來寇帝從高祖擊之弧彎六鈞箭穿七札隨手必陷當皆靡亂神兵掩擊醜虜大殲熊山之破赤眉不比其捷犬邑之摧青犢未儔其儁高祖嗟嘆賞賜甚多軍師凱旋便過帝宅樂飲經宿恩情逾重其後數過輒宿遂以為常帝嘗夜行聞有稱唐公為天子者登遣尋索了無其人又夢從高祖乘馬登天俱以手捫日月於是具以狀白并獻所撰兵書高祖大歡益以自負置其書於箱篋後皆按以從事聞程昱之夢即以為名聽張良之言皆納其策所謂天授豈但人謀高祖將舉義兵令帝領徒於城內義旗建授中郎將兼司鎧參軍陪斬木之經始奉披荊之締構異中涓之受職同別校之分麾從破呂州進授右光祿師至霍邑隋將宋老生發兵拒險軍不得進㣥下多請引還者高祖將從之帝直入切諫高祖乃止決機於龍鬬之日定策於狐疑之辰笑裨諶之請車同子房之借箸實建王業事符天啟霍邑定拜壽陽縣開國公食邑一千戶屠城斬邑既憑帷幄之謀開國承家即啟山河之賦京師平遷光祿大夫賜宅一區錢三百萬綵五千段灌嬰之頻從征伐始拜大夫去病之累著勳庸方開甲第釋干戈而論俎豆起桴鼓而立君臣式是禮儀允歸通博義寧元年拜禮部侍郎餘如故儀刑斯在命服有輝肅事南宮雖懋於春典司言東掖更資於夕拜遷黃門侍郎餘並如故職參持葢位連負璽茂先之博覽圖籍譽滿玉堂務伯之提正綱維名高瑣闥錄前後功効改封義原郡開國公增邑一千戶賜良馬二百匹粟萬一無此字二千石爰膺嘉賞遂啟大邦解漢皇之驂寧比其惠分吳主之粟未齊其寵武德元年拜內史令帝累讓不受改授納言又固辭乃授上柱國金紫光祿大夫散騎常侍同中書門下三品兼檢校并越將軍賜田三百頃奴婢三百人綵物二萬叚黃金五百斤別食實封五百戶金章紫綬玉鼎黃扉柱國齊元相之班將軍比命卿之服膺上賞而平軍國坐中樞而議文武恩榮兼被時輩莫儔三年拜工部尚書餘並如故差肩八座配象七星以百揆之樞衡參萬機之損益德績兼備聲望日隆于時軍旅猶殷憲章未洽帝盡心翼亮推誠匡輔入有造膝之謀外宏匪躬之義興復乎九疇之敘彌綸乎百度之闕穨綱所以克振令典於是畢修高祖闕一字之禮絕㣥彥進封應一作晉國公加實封八百戶餘並如故高祖又謂帝曰朕在并州之日恒往卿家今欲使卿一門三公用微荅主人之意也是日封帝長兄司農卿士稜為宣城郡公次兄行臺左丞相士逸為安陸郡公並食邑一千戶歡比連席之舊契均同舍之游酬德踰於二錢報恩過於一笥闔門受邑寧惟吳漢之子孫舉宗畢侯豈直蕭何之兄弟爾後高祖行幸常令帝總留臺事兼知南北牙兵馬判六曹尚書相國之處秦中葢資鎮撫令君之住許下仍參籌畫具瞻惟允是謂國鈞時帝先缺中闈高祖親為求偶謂帝曰隋納言遂寧公楊達才為英傑地則膏腴今有女賢明可以輔德秦晉之匹不能加也於是特降綸言俾成姻對高祖自為帝婚主遣桂陽公主專知女家降六禮於璿樞指三星於金穴魯大夫之嫁女卿士送迎張公子之取妻乘輿供帳作儷於鳳凰之兆相從於孔雀之樓伐柯則歡其食魚流荇則美其巢鵲是配琴瑟爰宜室家欽若有行即孝明高皇后妃也始同媯水之聘終啟塗山之業永言好合若有神靈之契焉憬彼塗泥實惟淮海襟帶全楚咽喉勁越雖孫權故業久黜霸圖而劉濞餘妖仍多反氣杜伏威初行僭逆輔公祏繼以亂亡泉藪未懲萑蒲猶在帝思俾乂遂紆時哲以本官權檢校揚州大都督府長史賜錦袍寶帶一具爾乃撫之以誠恕經之以權畧鈎距闇施既問羊而知馬網羅潛設亦因魚而得鴻降北海之渠未踰期月盡一作剿南山之盜詎假旬時然後商旅安行農桑野次化被三吳之俗威行百越之境輶軒符節之使復下於蠻陬齒革羽毛之琛還輸於王國矣始高祖之餞帝也期以半年及江湖既平帝將入覲父老數百人詣闕上表乞更留一年潁川之還借寇恂臨淮之重祈侯霸儔功語德彼獨何人璽書褒焉復留鎮撫九年太宗以儲宮統事乃徵帝入朝寵賜頻繁事以殊禮荊河奧壤密邇瀍洛自昔股肱之郡由來戰爭之場飛水初澄雖免鯨吞之患叢祠未翦尚有狐鳴之妖受委共康非賢勿授使持節豫息舒道等四州諸軍事豫州都督賜黃金二百斤朱轓首途吏人抃舞而交謁皁葢臨府盜賊驚惶而請命傾巢咸附闔境肅然棄㦸捐矛既如張霸之政術含哺鼓腹更似岑熙之歌詠利州都督義安郡王孝常稱亂劍南扇動夷落孝常誅死餘黨分竄劫掠未息朝廷患之太宗博訪㣥寮咸以為非帝不可貞觀元年拜利隆始靜西龍等六州諸軍事利州都督郡惟遐徼地實偏陬尋蜀帝新開之途經漢主舊燒之棧渝人賨旅獸駭禽驚帝招輯叛亡撫循老弱賑其匱乏開其降首百城櫜弓而不用㣥盜束手而來歸宏以善貸之恩赦其既然之罪未移弦望郡境乂安制書褒揚增邑五百戶賜珍物服玩黃次公政稱長者裂壤開封杜伯侯動無閒然賜書增秩五年改授荊峽澧朗岳果松等七州諸軍事荊州大都督眷茲上流實惟舊楚接荊臺之跨跱連渚宮之形勝一都之會昔號難治帝仁化久覃威名先著褰帷而十部咸肅閉閣而萬殊皆理寬力役之事急農桑之業狴圄空而京坻實姦回息而禮義興市不倚門田多讓畔烝人罷訟詠河上之甘棠游女無思歌漢濱之喬木流化實同於二陝宣風寧止於六條先是微屬亢陽頗傷時稼帝乃親往長沙寺迎阿育王像而祈焉俄而油雲勃興大雨洪澍倏忽而四境滂霈須臾而千里霑洽申虔未踰於晷刻降福遄同於影響一州歎駭稱有神明是知元符未臻且列於公侯之位帝道潛契實冥於天地之德昔者姬文事紂行化始自於江沱晉武平吳樹勳實由於荊土誠作霸之基址乃興王之窟宅況復風烟氣色樓臺邇翔鳳之川邑里光輝阡陌通臥龍之境爰紆不世之主將建非常之業於是乎百物呈瑞三靈降休游殷朝之白狼止酆尹之丹爵含牙之獸遁迹於殊鄰同穎之禾垂苗於近甸惠愛之德著矣皇王之迹兆矣然後白氣流而聖人感黃河清而聖人生奄有六宮遂荒三象化千乘而為萬國撫四海而成一家起藩屏之會昌致寰瀛之景福大矣哉九年唐高祖崩帝奉諱號慟因以成疾太宗遣名醫診療道路相望醫以病候將深勸令進藥帝因舉聲大哭嘔血而崩敬想忠義之風緬惟臣主之分求諸古昔未之聞也時年五十九遺令歸葬文水因山為墳穿足容棺斂以時服灞陵之不藏金寶紀市之無變廛肆惟聖達節千載同風於是具僚失圖闔境哀慟農商號於野士女哭於衢三月停竽瑟之音再期深考妣之慕寧止東城故老安歌對陳氏之祠復見南峴吏人垂涕望羊公之碣太宗聞帝崩狀嗟悼久之曰可謂忠孝之士乃命史官書之追贈禮部尚書配食太上皇廟贈物八百叚米粟八百石官造靈轝送達故鄉仍委本州大都督英國公李勣監護喪事緣喪所須並令官給遣郎中一人馳驛弔祭諡曰忠孝公禮也天皇大帝嗣膺乾歷光闡帝猷思盛德而有懷念元功而載佇永徽元年改贈使持節都督并汾慈嵐四州諸軍事并州大都督餘並如故聖上肇開陰曜正位坤元永徽六年又下制贈司空餘如故顯慶元年又贈司徒改封周國公食邑四千戶咸亨元年贈太尉兼太子太師太原郡王食邑五千戶以文水三百戶充奉陵邑置令丞已下官夫源流廣而津派長枝葉繁而本根茂況立德之祀奄百代而全昌謀孫之基冠千齡而首出與夫東漢外戚西京異姓不同年而語矣文明元年皇帝臨朝追崇為魏王食邑一萬戶永昌元年㣥臣以名號不稱抗表固請於是上尊號曰忠孝太一作大皇及鐘石變聲謳歌有奉皇帝欽受終之茂躅御惟新之景命改正朔而營宗廟定郊邱而立社稷聿遵故實光啟鴻名乃奉冊尊太皇為孝明高皇帝陵曰昊陵廟曰太祖推大功而增大號奉先之義存焉享皇極而配皇天敬始之誠備矣仍以為千人起邑名未光於寢園萬戶陪陵班僅齊於令長思廣崇陽之稱更增奉明之秩聖歷二年乃下制改昊陵署為攀龍臺加置官屬佐吏灤水將九河齊濬橋山與四岳爭高然後肅敬之儀旁絕於恒數尊崇之志上申於罔極葢天子之孝也庸小人之可談乎初晉陽懿公既受田於文水有紫氣發於其地上衝太微占者以為當有聖人興於此邦至是而天下宗周符於所占矣帝神氣和雅天姿英邁率爾坦易而無廢務儼然威容實可親昵俾好賢而樂善博識而多聞游談者空慕其風鑽仰者不知其度若乃觀文察理覩奧鈎深推六畫而見三才覆四營而窮萬象斯乃風皇之所以際天人也敦本抑末納祜蠲邪探祕術於九門致成功於六府斯乃火帝之所以慈氓庶也語奇正縱橫之術論帝王仁義之兵教貙武熊羆作舟車器械斯乃軒后之所以張武功也溫良濬哲惇懿文明觀象乎藻火之衣聽言於宮商之律斯乃媯水之所以昭文德也聲為律而身為度勤於國而匱於家沐雨而櫛風卑宮而菲食斯乃夏王之所以求諸己也引罪讓德持尊下卑虛襟於藥石之言屈體於芻蕘之議斯乃商后之所以聽於人也不傲不逸多藝多才求賢審官興法立度通刑政之要達禮樂之情斯乃周公之所以勤王事也宮牆䍐測性道難聞筆削所裁㣥賢無措言之地憲章所綴百代成不刊之式斯乃孔宣父之所以正人倫也兼列聖之純懿總百王之事業時運未集東皐輟鴻鶴之心天衢既亨北面就人臣之禮似文命之匡虞歷都君之輔唐政終能與時俯仰隨運汙隆居位恒屈其身莅官必行其道是以參謀帷幄則消薄蝕而殞攙搶助理鹽梅則成雍熙而作舟檝名裕於八能之士德高於五聖之臣及賜瑞分珪牧州典郡其人變而衆化其政賢而㣥美入稱來晚謳歌迎節傳之車出有去思號泣擁襜帷之路豈惟南征而北怨固亦西泣而東悲仁覃於雞犬之鄉澤浸於蟻螻之穴用能摛光表之盛業啟格天之洪緒存膺顯位彤弓開九命之尊沒享大名紫籙登萬乘之貴豈非天道人事祐賢福善之徵歟皇帝念過隙之不留哀終天之䍐報欽致孝之前轍仰增名之舊式以為廟堂作頌功業纔播於朱絲書策勳德音不傳於翠玉將謀相質之事更宏丕顯之躅載紆中旨爰命下臣考泗水之遺風求弇山之故事奉天經而揚詞藻圖帝範而懸金石將使神功睿業配圖象而昭臨茂烈崇徽共方儀而永久跪承大命而為頌曰厥初剖判肇有君臣體國經野司天屬人二微遞襲五運相因惟德是輔惟乾罔親其一謙莊斯崇荒侈則替金鏡易失玉儀難繼於皇聖周獨與神契受籙千祀重光百世其二軒謝摯立辛遷稷升岐山光啟酆水丕承淳耀中缺靈符更興三才奄有八景時乘其三方隆慶基誕生睿德齊聖剛毅欽明柔克行為天經語成帝則文冠楊史學窮儒墨其四僶俛三聘觀光九重未交劉徹先揖袁逢路險難進才高不容言辭吠犬退保潛龍其五人忌英雄物疵孤直隨運出處與時消息遂汨泥沙爰栖枳擇木候主摶風舉翼其六披荊晉野借箸汾圻霍邑通路秦關啟扉策無遺兆慮必先機漢主分食蕭王解衣其七裂壤疇庸升朝致績勳刻彞鼎任司衡石玉鉉調梅金壇秉戚職備文武道光帷帟其八恩洎同胞禮加內主魚貫納幣鴈行分土外館施衿中臺曳組榮被親戚慶隆今古其九三事出牧九卿為守憂人急才屈道資祐淮水臥汲潁川借寇龔遂買牛宋均浮獸其十荊吳異俗梁豫殊鄉德績均被椒蘭共芳歌迎來軸泣送歸艎朝禮斯懋宸心孔臧其十一堯得聖臣納諸大麓舜讓才子止其枚卜況我皇明兼而韞櫝徒屈時命罔終天祿其十二戢耀南紀遷神北維二分齊德三馬同基漢曲圖像江沱立祠存流美化沒有餘思其十三欽若大君奄荒天位率由禮樂仰尊名器禋郊展禮升壇立諡祗敬已洽孝思無匱其十四衣冠軫慕園寢加隆祼擇殷士歌留沛童弇山垂裕濟水銘功流德音乎翠玉配貞觀於元穹其十五維神龍二年歲次景午夏四月甲戌朔二十三日景申懿德太子梓宮啟自洛邑將陪窆於乾陵禮也廞衣夕陳祖奠朝設蜃輅俄軫龍旗按節皇帝嗟蟻庭之寢籥惜鳳渚之韜簧撫萬乘而懷國本綏六姻而悼乾將情無輟哀禮有加數刻純懿乎金版播聲芳於玉裕其詞曰靈命將興元符是膺皇基茂立帝武丕承祥集畫堂慶流朱邸矢延貺桐圭備禮實惟天族載挺人英川寶岳秀虹輝電精舞象得元佩觿聞道刻舟敏遽牽衣慧早幾神闇體理識冥資心韜鍾律情含蔡蓍曰仁曰孝非訓非師寬惠深博溫良肅祗苞舉六爻網羅㣥籍詩接楚彥賦延梁客淮國傳騷雲臺對易樂善超輩多才掩昔乃崇匡衞實屏實藩乃列朝請為鴻為鵷揚聲北路振彩西園儀表姬戚光輝舜門恭事閫闈歡迎黨族怡色玉潤溫詞蘭馥中外克諧親踈允睦恒德有裕閒言無讟榮深出幸寵茂留中婉孌㣥辟綢繆二宮陪輿澤厚賜馬恩隆西蜀欽義南山向風禮縟天孫望高元嗣重海闕象前星虛位方輟頒彞行膺主器奄喪門軸俄催隙駟鳴呼哀哉鳳下朝陽龍收暝光瓊田滅彩桂苑淪芳國軫傾翰朝悲壞梁惟靈徵之寂寂怨天道之茫茫嗚呼哀哉元聖登朝恩榮下賁爰命典冊式昭名諡匕鬯雖崇粢盛不蒞闔壤同戚具寮增欷嗚呼哀哉築思臺兮竟不旋還作室兮復何年訪來人兮傷對日瞻去鶴兮感昇天惜明離之虛繇悵風樂之徒懸懟銀牓之留月泣銅樓之送煙嗚呼哀哉司兆獻占掌圖辨域挽鐸初驚帷㡛既飭引文衞之逶迤度繁笳之悽惻纏永慕於青府結餘酸於紫極嗚呼哀哉辭交風之近甸出避雨之層巒望八水而遙集懷三川而顧歎麥枯兮夏旱花落兮春殘林野晦而天無色烟雲愁而景欲寒嗚呼哀哉稅駕昭途即宮下土執斧供事揚麾按部藏日兮山門埋鐙兮地戶痛平生兮冥寞哀倏忽兮今古視不見兮呼不聞天無曉兮夜無分同變化兮光陰盡配陽秋兮蘭菊芬嗚呼哀哉
