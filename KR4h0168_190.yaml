body:
  text: 顯慶五年炯時年十一待制宏文館上元三年始以應制舉補校書郎朝夕靈臺之下備見銅渾之象尋返初服臥病邱園二十年而一徙官斯亦拙之效也代之言天體者未知渾蓋孰是代之言天命者以為禍福由人故作渾天賦以辨之其辭曰客有為宣夜之學者喟然而言曰旁望萬里之橫山而皆青翠俯察千仞之深谷而皆黝黑蒼蒼在上非其正色遠而望之無所至極日月載於元氣所以或中而或昃星辰浮於太空所以有行而有息故知天常安而不動地極深而不測可以為觀象之準繩可以作談天之楷式有稱周髀之術者囅然而笑曰陽動而陰靜天回而地遊天如倚蓋地若浮舟出於卯入於酉而生晝夜交於奎合於角而有春秋天則西北既傾而三光北轉地則東南不足而萬水東流比於圓首前臨胸者後不能覆背方於執炬南稱明者北可以言幽此天與而不取惡遑遑而更求太史公有睟其容乃盱衡而告曰楚既失之齊亦未為得也言宣夜者星辰不可以闊狹有常言蓋天者漏刻不可以春秋各半周三徑一遠近乖於辰極東井南箕曲直殊於河漢明入於地葛稚川所以有辭日應於天桓君山由其發難假蘇秦之不死既莫知其為説儻隸首之重生亦不能成其算也二客嘗亦知渾天之事與請為左右揚榷而陳之原夫杳杳冥冥天地之精混混沌沌陰陽之本何太虛之無礙俾造化之多端南溟玉室之宮爰皇是宅西極金臺之鎮上帝攸安地則方如棋局天則圓如彈丸天之運也一北而物生一南而物死地之平也景短而多暑景長而多寒太陰當日之衝也成其薄蝕衆星傅月之光也因其波瀾乾坤闔闢天地成矣動靜有常陰陽行矣方以類聚物以㣥分吉凶生矣在天成象在地成形變化見矣部之以三門張之以八紀其周天也三百六十五度其去地也九萬一千餘里日居而月諸天行而地止載之以氣浮之以水生之育之長之畜之亭之毒之蓋之覆之天聰明也聖人得之天垂象也聖人則之其道也不言而信其神也不怒而威驗之以衡軸考之以樞機三十五官為㣥生之繫命一十二次當下土之封畿中衡外衡每不召而自至黃道赤道亦殊塗而同歸表裏見伏聖人於是乎發揮分至啓閉聖人於是乎範圍可以窮理而盡性可以極深而研幾天有北斗杓攜龍角魁枕參首天有北辰衆星環拱天帝威神尊之以耀魄配之以勾陳有四輔之上相有三公之近臣華蓋巖巖俯臨於帝座離宮奕奕旁絶於天津列長垣之百堵啓閶闔之重闉文昌拜於大將大理囚於貴人泰階平而君臣穆招搖指而天下春東宮則析木之津壽星之野箕為傲客房為駟馬天王對於攝提皇極臨於宦者左角右角兩曜之所巡行陰間陽間五星之所次舍後宮掌於燕息太子承於冡社宗人宗正內外惇敘於邦家市樓巿垣貨殖畢陳於天下北宮則靈龜潛匿螣蛇伏藏瓠瓜宛然而獨處織女終朝而七襄登漸臺而顧步御輦道而徜徉聞雷霆之隱隱聽枹鼓之硠硠南斗主爵祿東壁主文章須女主布帛牽牛主關梁羽林之軍所以除暴亂壘壁之陳所以備非常西宮則天潢咸池五車三柱奎為封豕參為白虎胃為天倉婁為衆聚旄頭之北宰制其邊陲天畢之陰蓄泄其雲雨大陵積尸之肅殺參旗九斿之部伍樵蘇之地出入於園苑萬億之資填積於倉庾南宮則黃龍賦象朱鳥成形五帝之座三光之庭傷成於鉞誅成於鑕福成於井德成於衡執法者廷尉之曹大夫之象少微者儲君之位處士之星天弧直而狼顧軍巿曉而雞鳴三川之交鶉火通其耀七澤之國翼軫宇其精南河北河象闕於是乎增峻左轄右轄邊荒於是乎自寧乃有金之散氣水之精液法渭水之橫橋像昆池之刻石歲時占其水旱滄溟應其潮汐織女之室漢家之使可尋飲牛之津海上之人易覿日也者衆陽之長人君之尊天雞曉唱靈烏晝踆扶桑臨於大海若木照於崑崙太平太蒙所以司其出入南至北至所以節其寒溫龍山銜燭不能議其光景夸父棄策無以方其駿奔月也者㣥陰之紀上天之使異姓之王后之事方諸對而明水洽重暈匝而邊風駛裁盈蚌蛤則虜騎先侵適鬬麒麟則暗虎潛值五星者木為重華火為熒惑鎮居戊巳斯為土德太白土西辰星主北俯察人事仰觀天則比參右肩之黃如奎大星之黑五材所以致用七政於焉不忒同舍而有四方分天而利中國赤角犯我城黃角地之爭五星同色天下偃兵趨前舍為盈退後舍為縮盈則侯王不寧縮則軍旅不復或向而或背或遲而或速金火犯之而甚憂歲鎮居之而有福觀衆星之部署歷七耀而驅馳定天下之文所以通其變見天下之賾所以象其宜然後播之以風雨威之以霜霰或吐霧而蒸雲或擊雷而鞭電一旬而太平感膚寸而天下遍白日為之晝昏恆星為之不見爾乃重明合璧五緯連珠青氣夜朗黃雲晝扶握天鏡授河圖若曰賜之以福此明王聖帝之休符至如怪雲祅氛冬雷夏雪日暈長虹星流伏鱉陰有餘而地動陽不足而天裂若曰懼之以災此昏主亂君之妖孽昔者顓頊之命重黎司天而司地陶唐之分仲叔宅西而宅東其後宋有子韋鄭有裨竈魏有石氏齊有甘公唐都之推星王朔之候氣周文之視日吳範之占風有以見天地之情狀識陰陽之變通詩云謂天蓋高語云惟天為大至高而無上至大而無外四時行焉萬物生焉㣥神莫尊於上帝法象莫大於皇天靈心不測神理難詮日何為兮右轉天何為兮左旋盤古何神兮立天地巨靈何聖兮造山川螟何細兮師曠清耳而不聞離婁拭目而無見鵬何壯兮搏扶搖而翔九萬運海水而擊三千龜與蛇兮異其短長之質椿與菌兮殊其大小之年鐘何鳴兮應霜氣劒何伏兮動星足廠田坴列子何方兮御風而有待師門何術兮驗火而登仙魯陽揮戈兮轉於西日陶侃折翼兮登乎上元女何寃兮化精衛帝何恥兮為杜鵑爭疆理者有零陵之石聞絃歌者有蓋山之泉若怪神之不語夫何述於此篇以天乙之武也焦土而爛石以唐堯之德也襄陵而懷山以顏回之仁也貧居於陋巷以孔子之聖也情希乎執鞭馮唐入於郎署也兩君而未識揚雄在於天祿也三代而不遷桓談思周於圖讖也忽焉不樂張衡術窮於天地也退而歸田我無為而人自化吾不知其所以然而然在霖霪之可玩惟浮漚而已矣况曲澗兮增波復坳塘兮漲水霤滴瀝兮行注階潺湲而浪起寸步百川咫尺千里於是乍明乍滅時行時止排雨足而分規擘波心而對峙輕盈徘徊容與庭隈狀若初蓮出浦映清波而未開又似繁星落曙耿斜漢而將回合散消息安有常則來忽往不可為象雨密稠生風牽亂上若乃空濛采褰浩汗浮天流平舊沼派溢新泉分容對出吐映均鮮觸流萍而欲散礙浮芥而還連光凌虛而半動影倒水而分圓始參差而別趣終宛轉以同沿歷亂踟蹰漂沸縈紆細而察之若美人臨鏡開寶靨大而望也若馮夷剖蚌列明珠逐風波而淡蕩乃變化而須臾迹均顯晦妙合虛無同至人之體道亦隨時而不拘夫其得坁則止乘風則逝處上下而無窮任推移而不繫似君子之從容常卷舒而不滯故其在陽則隱在陰則出泄泄悠悠匪徐匪疾因自然以見體託行潦以凝質類達人之修身故不欺於暗室蕩薄畎澮鼓舞洲渚其生兮若浮其居兮若旅雲消雨霽寂無處所惟斯物之靡依獨含情而應機暫假有而示潔終淪空而匿輝苟無心以自纍夫何適而有違儒有傳經在乎致遠力學在乎請益士安號於書淫元凱稱於傳癖高眠孰可詎貽邊子之嘲甘寢則那寧恥宰豫之責伊國工而嘗巧度山林以為格既有奉於詩書故無違於枕席朴斫初成因夫美名兩足山立雙鈎月生從繩運斤義且得於方正量枘製鑿術乃取於縱橫功因期於學殖業可究於經明不勞於手無費於目開卷則氣雜香藝挂編則色聯翠竹風清夜淺每待蘧蘧之覺日永春深常偶便便之腹股因茲而罷刺膺由是而無伏庶思覃於下幃豈遽留而更讀其利何如其樂只且巾遂挂於簾幌履誰曳於階除每偶草元之字不親非聖之書比角枕而嗟若匹瑤琴而病諸爾其臨窗有風閉戶多雪自得陶潛之興仍秉袁安之節既幽獨而多間遂憑茲而遍閲讀易則期於索隱習禮則防於志悅倘叔夜之神交固周公之夢絶其始也一木所為其用也萬卷可披墨沼之前謂江帆之乍至書林之下若雲翼之新垂動靜隨於語默出處任於挽推必欲事於所事實斯焉而取斯因謂之曰爾有卷兮爾有舒為道可以集虛爾有方兮爾有直為行可以立德濟筆海兮爾為舟航騁文囿兮爾為羽翼故吾不知夫不可聊逍遙以宴息粵大周如意元年秋七月聖神皇帝御洛城南門會十方賢衆蓋天子之孝也渾元告秋羲和奏曉太陰望兮圓魄皎閶闔開兮涼風嫋四海澄兮百川皛陰陽肅兮天地窅掃離宮清重閣設皇邸張翠幕鸞飛鳳翔睒晹倏爍雲舒霞布翕赫曶霍陳法供飾盂蘭壯神功之妙物何造化之多端青蓮吐而非夏赬果搖而不寒銅鐵銀錫璆琳琅玕映以甘泉之玉樹冠以承露之金盤憲章三極儀形萬類上寥廓兮法天下安貞兮象地殫怪力窮神異少君王子掣曳兮若來玉女瑤姬翩躚兮必至鳴鷫鸘與鸑鷟舞鵾雞與翡翠毒龍拏兮赫然狂象奔兮沈醉怖魍魎潛魑魅離婁明目不足見其精微匠石洗心不足徵其奧祕繽繽紛紛氤氤氳氳五色成文若榮光休氣發彩於重雲蒨蒨粲粲煥煥爛爛三光壯觀若合璧連珠耿耀於長漢夫其遠也天台傑起繞之以赤霞夫其近也削成孤峙覆之以蓮花晃兮瑤臺之帝室赩兮金闕之仙家其高也上諸天於大梵其廣也遍法界於恆沙上可以薦元符於七廟下可以納㣥動於三車者也於是乎騰聲名列部伍前朱雀後元武左蒼龍右白虎環衛匝羽林周雷鼓八面龍旗九斿星戈耀日霜戟含秋三公以位百寮乃入鳴佩鏘鏘高冠岌岌規矩中威容翕無族談無錯立若乃山中禪定樹下經行菩薩之權現如來之化生莫不汪洋在列歡喜充庭天人儼而同會龍象寂而無聲聖神皇帝乃冠通天佩玉璽冕旒垂目紞纊塞耳前後正臣左右直史身為法度聲為宮徵穆穆然南面以觀矣八枝初會四影高懸上妙之座取於燈王之國大悲之飯出於香積之天隨藍寶味舍衛金錢麵為山兮酪為沼花作雨兮香作煙明因不測大福無邊鏗九韶撞六律歌千人舞八佾孤竹之管雲和之瑟麒麟在郊鳳凰蔽日天神下降地祇咸出於是乎上公列卿大夫學士再拜稽首而言曰聖人之德無以加於孝乎散元氣運洪爐斷鼇足受龍圖定天寶建皇都至如立宗廟平圭臬繡栭文楣山楶藻梲昭穆敘樽罍設以覲嚴祖之耿光以揚先皇之大烈孝之始也考辰耀制明堂廣四修一上圓下方布時令合蒸嘗配天而祀文考配地而祀高皇孝之中也宣大乘昭㣥聖光祖考登靈慶發深心展誠敬刑於四海加於百姓孝之終也夫孝始於顯親中於禮神終於法輪武盡美矣周命惟新聖神皇帝於是乎唯寂唯靜無營無欲壽命如天德音如玉任賢相惇風俗遠佞人措刑獄省遊宴披圖籙捐珠璣寶菽粟罷官之無事恤人之不足鼓天地之化淳作皇王之軌躅太陽夕乘輿歸下端闈入紫微惟幽蘭之芳草稟天地之純精抱青紫之奇色挺龍虎之嘉名不起林而獨秀必固本而叢生爾乃丰茸十步綿連九畹莖受露而將低香從風而自遠當此之時叢蘭正滋美庭闈之孝子循南陔而采之楚襄王蘭臺之宮零落無叢漢武帝猗蘭之殿荒涼幾變聞昔日之芳菲恨今人之不見至若桃花水上佩蘭若而續魂竹箭山陰坐蘭亭而開宴江南則蘭澤為洲東海則蘭陵為縣隰有蘭兮蘭有枝贈遠別兮交新知氣如蘭兮長不改心若蘭兮終不移及夫東山月出西軒日晚授燕女於春闈降陳王於秋坂乃有送客金谷林塘坐曛鶴琴未罷龍劒將分蘭缸熠耀蘭麝氛氳舞袖回雪歌聲遏雲度清夜之未艾酌蘭英以奉君若夫靈均放逐離㣥散侶亂鄢郢之南都下瀟湘之北渚步遲遲而適越心鬱鬱而懷楚徒眷戀於君王斂精神於帝女汀洲兮極目芳菲兮襲豫思公子兮不言結芳蘭兮延佇借如君章有德通神感靈縣車舊館請老山庭白露下而警鶴秋風高而亂螢循階除而下望見秋蘭之青青重曰若有人兮山之阿紉秋蘭兮歲月多思握之兮猶未得空佩之兮欲如何乃抽琴操為幽蘭之歌歌曰幽蘭生矣於彼朝陽含雨露之津潤吸日月之休光美人愁思兮採芙蓉於南浦公子忘憂兮樹萱草於北堂雖處幽林與窮谷不以無人而不芳趙元淑聞而嘆曰昔聞蘭葉據龍圖復道蘭林引鳳雛鴻歸燕去紫莖歇露往霜來緑葉枯悲秋風之一敗與蒿草而為芻粵若稽古聖皇重暉日光開博望之苑闢思賢之堂華館三襲雕軒四下地則經省而書坊人則後車而先馬相彼草木兮或有足言者吁嗟青苔今可得而聞也借如靈山偃蹇巨壁崔嵬畫千峰而錦照圖萬壑而霞開王孫逝兮山之隈披薜荔兮踐莓苔悵容與兮徘徊一去千年兮時不復來至若圓潭寫鏡方流聚玉苔何水而不清水何苔而不緑漁父遊兮漢川曲歌滄浪兮濯吾足桂舟橫兮蘭枻觸浦漵邅回兮心斷續別有崇臺廣廈粉壁椒塗梁木蘭兮椽玳瑁草離合兮樹珊瑚白露下蒼苔蕪暗瑤砌止瓊鋪有美人兮向隅應閉門兮踟蹰心震蕩兮意不愈顏如玉兮淚如珠請循其本也見商羊兮鼓舞召風伯兮電赴占顧兔兮離畢星雷闐闐兮雨冥冥浩兮蕩兮見潢汙之滿庭倏兮忽兮視苔蘚之青青爾其為狀也羃歷綿密浸淫布濩斑駁兮長廊夤緣兮古樹肅兮若遠山之松柏泛兮若平郊之煙霧春淡蕩兮景物華承芳卉兮藉落花歲崢嶸兮日云暮迫寒霜兮犯危露觸類而長其生也蕃莫不文階兮鏤瓦碧地兮青垣別生分類西京南越則烏韭兮緑錢金苔兮石髮苔之為物也賤苔之為德也深夫其為讓也每違燥而居濕其為謙也常背陽而即陰重扄祕宇兮不以為顯幽山窮水兮不以為沈有達人卷舒之意君子行藏之心唯天地之大德匪豫情之所任庭菊美貞芳也天子幸於東都皇儲監守於武德之殿以門下內省為左春坊今庶子裴公所居即黃門侍郎之廳事也其庭有菊焉中令薛公昔拜瑣闥此焉遊處今兼左庶子止於東廳甍宇連接洞門相向每罷朝之後未嘗不遊於斯詠於斯覽叢菊於斯歎其君子之德命學士為之賦是日也薛凱以親賢為洗馬田巖以幽貞為學士高元思張師德以至孝託後車顏強學沈尊行以博聞兼侍讀周琮李憲王祖英曹叔文以儒術進崔融徐彥伯劉知幾石抱忠以文章顯德行則許子豐耆舊則權無二駱縯則詁訓之前識張相則老莊之後興並承高命咸窮體物小子託於吹竽之末敢闕其詞哉遂作賦云日之貞矣於彼重陽菊之榮矣於彼華坊含天地之精氣吸日月之淳光雲布霧合箕舒翼張鬱兮蔓衍郁兮芬芳珉枝金萼翠葉紅芒其在夕也言庭燎之皙皙其向晨也謂明星之煌煌爾其萬里年華九州春色花的皪兮如錦草連綿兮似織當此時也和其光同其塵應春光而早植及夫秋星下照金氣上騰風蕭蕭兮瑟瑟霜刺刺兮稜稜當此時也弱其志強其骨獨歲寒而晚登雨還風去天長地久純黃象於后土故採桑而菊衣輕體御於神仙故登山而菊酒文賓採之而羽化康公服之而不朽東極於是長生南陽以之睂壽胡太尉之允誠光輔漢庭萬幾理三階平及暮年華髮垂肩秋菊落英蠲邪滌瘵於焉永貞鍾太傅之家聲彞倫魏室道合鹽梅功成輔弻降文星之命修彭祖之術保性和神此焉終吉君章請老歲久懸車秋風生兮北園夕白露濕兮前階虛佇間庭之曠邈對涼菊之扶疏人生行樂孰知其餘淵明解印退歸田野山鬱律兮萬里天蒼莽兮四下憑南軒以長嘯出東籬而盈把歸去來兮何為者若此窈窕重闈亘青瑣兮接黃扉深沈大壯通肅成兮連博望乃有鄉貴族薛縣名家共汾河之鼎氣同庶子之春華朝遊夕處徘徊顧慕歎搖落於三秋委貞芳於十步伊纖莖之菲薄荷君子之恩遇不羡池水之芙蓉願比瑤山之桂樹歲如何其歲已秋叢菊芳兮庭之幽君子至止悵容與而淹留歲如何其歲將逝叢菊芳兮庭之際君子至止聊從容以卒歲赫赫宗周皇天降休麗哉神聖皇天降命開綱布網發號施令河出圖兮五雲集天垂象兮三光映南極之庭老人之星煜煜爚爚煌煌熒熒秋分之旦見乎丙春分之夕入乎丁配神山之呼萬歲符德水之兆千齡晃如金粟粲若銀燭比秋草之一螢狀荊山之片玉渾渾熊熊懸紫貝於河宮奕奕暐暐曜明珠於漢水其光也如丹其大也如李稽元命之攸述按星經之所紀見則化平主昌明則天下多士經始靈臺嵳峩崔嵬星則唐都講藝氣則王朔呈材晝觀雲物夜察昭回覩南郊之炳耀欣北極之康哉三公輔弻庶官文武獻仙壽兮祝堯奏昌言兮拜禹瞻太霄而踊躍伏前庭而俯僂萬人於是和歌百獸於焉率舞穆穆神皇受天之祥邈矣台州之北窅然汾水之陽貞明也者日月同光貞觀也者天地為常有混成之獨立運元氣之茫茫若夫大虹流渚金天當寧大電繞樞軒轅受圖殷馗則黃星見楚雷煥則紫氣臨吳青方半月東井聯珠辰極之齊七政泰階之平六符雖前皇之盛德又何以加於此乎至若甘露溢醴泉出蓂莢生嘉禾實鳳凰丹彩騶虞白質南海無波東風入律比夫皇穹之錫壽何足以談其萬一聖上猶復招列仙擇㣥賢日慎一日元之又元兵戈不起至德承天臣炯作頌皇家萬年臣某等言司馬郎中王知敬至伏奉今月日手詔璿璣下照覩天象之三光玉檢前開見河洛之八卦發揮圭璧感召風雲不知手之舞之足之蹈之者也臣等稽之天地明山闢長男之宮步之日星樂府奏重光之曲三王所以立教者天子為先萬國所以稱貞者元良是寄伏惟天皇御中道踐平階對揚文武之休命紹述古先之大業洛京朝巿義協於省方秦地山河事資於監守皇太子一物三善四方繼明孝以承親顯於直城之路明以照下驗於長壽之街虔奉絲綸躬親政事德刑詳矣既遠安而邇肅博愛先之亦塗歌而里詠固以禮成恭敬道洽溫文知寶歷之無疆信蒼生之幸甚臣等竊循愚蔽謬荷恩私或位聯輔弻職在台衡希少陽之末光自韜螢火洽重海之餘潤已息牛涔不謂殊獎曲覃真文俯及載之睂首奉以周旋聽葛天氏之歌方慚此慶聞有虞氏之石未均斯喜但知懷璧之罪不可越鄉豈敢貪天之功以為已力傾誠每積候朱鳥於南宮拜德無因限蒼龍於左闕臣無任云云古者太昊庖犧氏仰以觀象俯以察法造書契而文籍生次有黃帝軒轅氏長而敦敏成而聰明垂衣裳而天下理其後數遷五德君非一姓體國經野建邦設都文質所以再而復正朔所以三而改夫改正朔者謂夏后氏建寅殷人建丑周人建子至於以日繫月以月繫時以時繫年此則三王相襲之道也夫易服色者謂夏后氏尚黑殷人尚白周人尚赤至於山龍華蟲宗彞藻火粉米黼黻此又百代可知之道也今蘇知機表奏請立節文改章服奉付禮官學士詳定是非者謹按虞書曰豫欲觀古人之象日月星辰山龍華蟲作會宗彞藻火粉米黼黻絺繡由此言之則其所從來者尚矣夫日月星辰者象聖王光照下土也山者布散雲雨象聖王澤霑下人也龍者變化無方象聖王應時布教也華蟲者雉也身被五彩象聖王體兼文明也宗彞者虎蜼也以剛猛制物象聖王神武定亂也藻者逐水上下象聖王隨代而應也火者陶冶烹飪象聖王至德日新也粉米者人恃以生象聖王為物之所賴也黼者能斷割象聖王臨事能決也黻者兩已相背象君臣可否相濟也逮有周氏乃以日月星辰為旌旗之飾又登龍於山登火於宗彞尊神明也於是乎制袞冕以祀先王也九章者法陽數也以龍為首章袞者卷也龍德神異應變潛見表聖王深識遠知卷舒神化也又制鷩冕以祭先公也鷩者雉也有耿介之志表公有賢才能守耿介之節也又制毳冕以祭四望也四望者嶽瀆之神也虎蜼者山林所生明其象也又制絺冕以祭社稷也社稷者土穀之神也粉米由之而成象其功也又制元冕以祭㣥小祀也百神異形難可遍擬但取黻之相背昭異名也夫以周公之多才也故治定制禮功成作樂夫以孔宣之將聖也故行夏之時服周之冕先王之法服乃此之自出矣天下之服能事又於是乎畢矣今知機表狀請制大明冕十二章乘輿服之者謹按日月星辰者已施於旌旗矣龍山火米者又不踰於古矣而云麟鳳有四靈之名元龜有負圖之應雲有紀官之號水有盛德之祥此蓋別表休徵終是無所比象然則皇王受命天地興符仰觀則璧合珠連俯察則銀黃玉紫盡南宮之粉墨不足寫其行狀罄東觀之鉛黃無以紀其名實固不可畢施於法服也雲也者從龍之氣也水也者藻之自生也又不假別為章目也此蓋不經之甚也又鸞冕八章三公服之者鸞者太平之瑞也非三公之德也鷹鸇者鷙鳥也適可以辨刑曹之職也熊羆者猛獸也適可以旌武臣之力也又稱藻為水草而無法象引張衡賦云蒂倒茄於藻井被紅葩之狎獵謂為蓮華取其文彩者夫茄者蓮也藻者飾也蓋以蓮飾井非謂藻為蓮若以蓮代藻變古從今既不知草木之名亦未達文章之意此又不經之甚也又毳冕六章三品服之者按此王者祀四望服之名也今三品乃得同王之毳冕而三公不得同王之袞名豈惟顛倒衣裳抑亦自相矛盾此又不經之甚也又黼冕四章五品服之者考之於古則無其名驗之於今則非章首此又不經之甚也國家以斷鼇鍊石之功今上以緯地經天之德漢稱文景周曰成康講八代之樂搜三王之禮文物既行矣尊卑又明矣天下已和平矣萬國巳咸寧矣誠請順考古道率由舊章弗詢之謀勿庸無稽之言勿聽若夫禮惟從俗則命為制令為詔乃秦皇之故事猶可以適於今矣若夫義取隨時則出稱警入稱蹕乃漢國之舊儀猶可以行於代矣亦何取於變周公之軌物改宣尼之法度者哉謹議
