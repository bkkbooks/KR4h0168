front:
  text: 全唐文欽定全唐文卷一百九十炯華陰人舉神童授校書郎為崇文館學士俄遷詹事司直武后時坐從祖弟神讓犯逆左轉梓州司法參軍秩滿授盈川令卒中宗以舊僚追贈著作郎
  hash: sha256:f4dd320647549b02c4d640fc0df4fe5f68969238d241a72d94586e89e9019bcd
