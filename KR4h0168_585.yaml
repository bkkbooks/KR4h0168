seq: 585
front:
  text: 全唐文欽定全唐文卷五百八十五柳宗元十七
  hash: sha256:72e1ae2253ccf5fe91d52f05a32c7d8e755a6ff08102d0fe844225c30cb002ea
body:
  text: 古之傳者有言成王以桐葉與小弱弟戲曰以封汝周公入賀王曰戲也周公曰天子不可戲乃封小弱弟於唐吾意不然王之弟當封耶周公宜以時言於王不待其戲而賀以成之也不當封耶周公乃成其不中之戲以地以人與小弱弟者為之主其得為聖乎且周公以王之言不可苟焉而已必從而成之耶設有不幸王以桐葉戲婦寺亦將舉而從之乎凡王者之德在行之何若設未得其當雖十易之不為病要於其當不可使易也而况以其戲乎若戲而必行之是周公教王遂過也吾意周公輔成王宜以道從容優樂要歸之大中而已必不逢其失而為之辭又不當束縛之馳驟之使若牛馬然急則敗矣且家人父子尚不能以此自克况號為君臣者耶是直小丈夫者之事非周公所宜用故不可信或曰封唐叔史佚成之劉向古稱博極㣥書然其錄列子獨曰鄭穆公時人穆公在孔子前幾百歲列子書言鄭國皆云子產鄧析不知向何以言之如此史記鄭繻公二十四年楚悼王四年圍鄭鄭殺其相駟子陽子陽正與列子同時是歲周安王四年秦惠公韓烈侯趙武侯二年魏文侯二十七年燕釐公五年齊康公七年宋悼公六年魯穆公十年不知向言魯穆公時遂誤為鄭耶不然何乖錯至如是其後張湛徒知怪列子書言穆公後事亦不能推知其時然其書亦多遭增竄非其實要之莊周為放依其辭其稱夏徂公紀渻子季咸等皆出列子不可盡紀雖不㮣於孔子道然其虛泊寥濶居亂世遠於利禍不得逮於身而其心不窮易之遁世無悶者其近是歟予故取焉其文辭類莊子而尤質厚少為作好文者可廢耶其楊朱力命疑其楊子書其言魏牟孔穿皆出列子後不可信然觀其辭亦足通知古之多異術也讀焉者慎取之而已矣文子書十二篇其傳曰老子弟子其辭時有若可取其指意皆本老子然考其書蓋駁書也其渾而類者少竊取他書以合之者多凡孟管輩數家皆見剽竊嶢然而出其類其意緒文辭义牙相抵而不合不知人之增益之歟或者眾為聚斂以成其書歟然觀其往往有可立者又頗惜之憫其為之也勞今刊去謬惡亂雜者取其似是者又頗為發其意藏於家或問曰儒者稱論語孔子弟子所記信乎曰未然也孔子弟子曾參最少少孔子四十六歲曾子老而死是書記曾子之死則去孔子也遠矣曾子之死孔子弟子略無存者矣吾意曾子弟子之為之也何哉且是書載弟子必以字獨曾子有子不然由是言之弟子之號之也然則有子何以稱子曰孔子之歿也諸弟子以有子為似夫子立而師之其後不能對諸子之問乃叱避而退則固嘗有師之號矣今所記獨曾子最後死予是以知之蓋樂正子春子思之徒與為之爾或曰孔子弟子嘗雜記其言然而卒成其書者曾氏之徒也堯曰咨爾舜天之歷數在爾躬四海困窮天祿永終舜亦以命禹子小子履敢用元牡敢昭告於皇天后土有罪不敢赦萬方有罪罪在朕躬朕躬有罪無以爾萬方或問之曰論語書記問對之辭爾今卒篇之首章然有是何也柳先生曰論語之大莫大乎是也是乃孔子常常諷道之辭云爾彼孔子者覆生人之器者也上之堯舜之不遭而禪不及已下之無湯之勢而已不得為天吏生人無以澤其德日視聞其勞死怨呼一作乎而已之德涸焉無所依而施故於常常諷道云爾而止也此聖人之大志也無容問對於其間弟子或知之或疑之不能明相與傳之故於其為書也卒篇之首嚴而立之元冀好讀古書然甚賢鬼谷子為其指要幾千言鬼谷子要為無取漢時劉向班固錄書無鬼谷子鬼谷子後出而險盭峭薄恐其妄言亂世難信學者宜其不道而世之言縱橫者時葆其書尤者晚乃益出七術怪謬異甚不可考校其言益奇而道益愜使人狙狂失守而易於陷墜幸矣人之葆之者少今元子又文之以指要嗚呼其為好術也過矣司馬遷讀晏子春秋高之而莫知其所以為書或曰晏子為之而人接焉或曰晏子之後為之皆非也吾疑其墨子之徒有齊人者為之墨好儉晏子以儉名於世故墨子之徒尊著其事以增高為己術者且其旨多尚同兼愛非樂節用非厚葬久喪者是皆出墨子又非孔子好言鬼事非儒明鬼又出墨子其言問棗及古冶子等尤怪誕又往往言墨子聞其道而稱之此甚顯白者自劉向歆班彪固父子皆錄之儒家中甚矣數子之不詳也蓋非齊人不能具其事非墨子之徒則其言不若是後之錄諸子書者宜列之墨家非晏子為墨也為是書者墨之道也太史公為莊周列傳稱其為書畏累亢桑子皆空言無事實今世有亢桑子書其首篇出莊子而益以庸言蓋周所云者尚不能有事實又况取其語而益之者其為空言尤也劉向班固錄書無亢倉子而今之為術者乃始為之傳注以教於世不亦惑乎予讀賈誼鵩賦嘉其辭而學者以為盡出鶡冠子予往來京師求鶡冠子無所見至長沙始得其書讀之盡鄙淺言也唯誼所引用為美餘無可者吾意好事者偽為其書反用鵩賦以文飾之非誼有所取之決也太史公伯夷列傳稱賈子曰貪夫殉財烈士殉名夸者死權不稱鶡冠子遷號為博極㣥書假令當時有其書遷豈不見耶假令真有鶡冠子書亦必不取鵩賦以充入之者何以知其然耶曰不類皆知敵之仇而不知為益之尤皆知敵之害而不知為利之大秦有六國兢兢以強六國既除訑訑乃亡晉敗楚鄢范文為患厲之不圖舉國造怨孟孫惡臧孟死臧恤藥石去矣吾亡無日智能知之猶卒以危矧今之人曾不是思敵存而懼敵去而舞廢備自盈秪益為瘉敵存滅禍敵去召過有能知此道大名播懲病克壽矜壯死暴縱欲不戒匪愚伊耄我作戒詩思者無咎吾恒惡世之人不知推己之本而乘物以逞或依勢以干非其類出技以怒強竊時以肆暴然卒迨於禍有客談麋驢鼠三物似其事作三戒臨江之人畋得麋麑畜之入門㣥犬垂涎揚尾皆來其人怒怛之自是日抱就犬習示之使勿動稍使麋與之戲積久犬皆如人意麋麑稍大忘己之麋也以為犬良我友抵觸偃仆益狎犬畏主人與之俯仰甚善然時啖其舌三年麋出門外見外犬在道甚眾走欲與為戲外犬見而喜且怒共殺食之狼籍道上麋至死終不悟黔無驢有好事者船載以入至則無可用放之山下虎見之龎然大物也以為神蔽林間窺之稍出近之憖憖然莫相知他日驢一鳴虎大駭遠遁以為且噬己也甚恐然往來視之覺無異能者益習其聲又近出前後終不敢搏稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳因跳踉大㘚斷其喉盡其肉乃去噫形之龎也類有德聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫永有某氏者畏日拘忌特甚以為己生歲直子鼠子神也因愛鼠不畜犬禁僮勿擊鼠倉廩庖廚悉以恣鼠不問由是鼠相告皆來某氏飽食而無禍某氏室無完器椸無完衣飲食大率鼠之餘也晝纍纍與人兼行夜則竊齧鬬暴其聲萬狀不可以寢終不厭數歲某氏徙居他州後人來居鼠為態如故其人曰是陰類惡物也盜暴尤甚且何以至是乎哉假五六闔門撤瓦灌穴購童羅捕之殺鼠如邱棄之隱處臭數月乃已嗚呼彼以其飽食無禍為可恆也哉智氏既滅范中行志益大合韓魏圍趙水晉陽智伯瑤乘舟以臨趙且又往來觀水之所自務速取焉㣥漁者有一人坐漁智伯怪之問焉曰若漁幾何曰臣始漁於河中漁於海今主大茲水臣是以來曰若之漁何如曰臣幼而好漁始臣之漁於河有魦鱮鱣鰋者不能自食以好臣之餌日收者百焉臣以為小去而之龍門之下伺大鮪焉夫大鮪之來也從魴鯉數萬垂涎流沫後者得食焉然其飢也亦返吞其後愈肆其力逆流而上慕為螭龍及夫抵大石亂飛濤折鰭禿翼顛倒頓踣順流而下宛委冒懵環坻漵而不能出嚮之從魚之大者幸而啄食之臣亦徒手得焉猶以為小聞古之漁有任公子者其得益大於是去而之海上北浮於碣石求大鯨焉臣之具未及施見大鯨驅㣥鮫逐肥魚於渤澥之尾震動大海簸掉巨島一啜而食若舟者數十勇而未已貪而不能止北蹙於碣石槁焉嚮之為食者反相與食之臣亦徒手得焉猶以為小聞古之漁有太公者其得益大釣而得文王於是舍而來智伯曰今若遇我也如何漁者曰嚮者臣已言其端矣始晉之侈家若欒氏祁氏郤氏羊舌氏以十數不能自保以貪晉國之利而不見其害主之家與五卿嘗裂而食之矣是無異魦鱮鱣鰋也腦流骨腐於主之故鼎可以懲矣然而猶不肯悟又有大者焉若范氏中行氏貪人之土田侵人之勢力慕為諸侯而不見其害主與三卿又裂而食之矣脫其鱗鱠其肉刳其腸斷其首而棄之鯤鮞遺允莫不備俎豆是無異夫大鮪也可以懲矣然而猶不肯悟又有大者焉吞范中行以益其肥猶以為不足力愈大而求食愈無饜驅韓魏以為㣥鮫以逐趙之肥魚而不見其害貪肥之勢將不止於趙臣見韓魏懼其將及也亦幸王之蹙於晉陽其目動矣而主乃慠然以為咸在機俎之上方磨其舌抑臣有恐焉今輔果舍族而退不肯同禍段規怨深而造謀主之不悟臣恐主為大鯨首解於邯鄲鬣摧於安邑胷披於上黨尾斷於中山之外而腸流於大陸為鱻薧以充三家子孫之腹臣所以大懼不然主之勇力強大於文王何有智伯不悅然終以不悟於是韓魏與趙合滅智氏其地三分柳子名愚溪而居五日溪之神夜見夢曰子何辱予使予為愚耶有其實者名固從之今予固若是耶予聞閩有水生毒霧厲氣中之者溫屯嘔泄藏石走瀨連艫糜解有魚焉鋸齒鋒尾而獸蹄是食人必斷而躍之乃仰噬焉故其名曰惡溪西海有水散渙而無力不能負芥投之則委靡墊沒及底而後止故其名曰弱水秦有水掎汨泥淖撓混沙礫視之分寸眙若睨壁淺深險易昧昧不覿乃合涇渭以自彰穢跡故其名曰濁涇雍之西有水幽險若漆不知其所出故其名曰黑水夫惡弱六極也濁黑賤名也彼得之而不辭窮萬世而不變者有其實也今予甚清與美為子所喜而又功可以及圃畦力可以載方舟朝夕者濟焉子幸擇而居予而辱以無實之名以為愚卒不見德而肆其誣豈終不可革耶柳子對曰汝誠無其實然以吾之愚而獨好汝汝惡得避是名耶且汝不見貪泉乎有飲而南者見交趾寶貨之多光溢於目思以兩手左右攫而懷之豈泉之實耶過而往貪焉猶以為名今汝獨招愚者居焉久畱而不去雖欲革其名不可得矣夫明王之時智者用愚者伏用者宜邇伏者宜遠今汝之託也遠王都三千餘里仄僻迴隱蒸鬱之與曹螺蜯之與居唯觸罪擯辱愚陋黜伏者日駸駸以遊汝闖闖以守汝汝欲為智乎胡不呼今之聰明皎厲握天子有司之柄以生育天下者使一經於汝而唯我獨處汝既不能得彼而見獲於我是則汝之實也當汝為愚而猶以為誣寧有說耶曰是則然矣敢問子之愚何如而可以及我柳子曰汝欲窮我之愚說耶雖極汝之所往不足以申吾喙涸汝之所流不足以濡吾翰姑示子其略吾茫洋乎無知冰雪之交眾裘我絺溽暑之鑠眾從之風而我從之大吾盪而趨不知太行之異乎九衢以敗吾車吾放而遊不知呂梁之異乎安流以沒吾舟吾足蹈坎井頭抵木石衝冒榛棘僵仆虺蜴而不知怵惕何喪何得進不為盈退不為抑荒涼昏默卒不自克此其大凡者也願以是汙汝可乎於是溪神深思而嘆曰嘻有餘矣是及我也因俯而羞仰而吁涕泣交流舉手而辭一晦一明覺而莫知所之遂書其對柳子以罪貶永州有自京師來者既見曰予聞子坐事逐予適將唁子今予視子之貌浩浩然也能是達矣予無以唁敢更以為賀柳子曰子誠以貌乎則可也然吾豈若是而無志者耶姑以戚戚為無益乎道故若是而已矣吾之罪大會主上以寬理人用和天下故吾得在此凡吾之貶斥幸矣而又戚戚焉何哉夫為天子尚書郎謀畫無所陳而㣥比以為名蒙恥遇僇以待不測之誅苟人爾有不汗栗危厲偲偲然者哉吾嘗靜處以思獨行以求自以上不得自列於聖朝下無以奉宗祀近邱墓徒欲苟生幸存庶幾似續之不廢是以儻蕩其心倡佯其形茫乎若升高以望潰乎若乘海而無所往故其容貌如是子誠以浩浩而賀我其孰承之乎嘻笑之怒甚乎裂眥長歌之哀過乎慟哭庸詎知吾之浩浩非戚戚之尤者乎子休矣或問曰朝廷以公且明進善退不肖未嘗不當然吾有一疑焉願有聞於子以釋予也曰何哉曰杜兼為濠州幸兵之亂殺無罪士二人蓄貨足慾吾以為唐檮杌饕餮者亡以異然而卒入為郎中給事中出由商至河南尹乃死夫何取於兼者若是幸也曰若子之言兼之罪吾雖不睹乎目然聞之熟宜廢而不用久矣然而吾有一取焉吾聞兼在濠州有鍾離令盧某者宰相戚也而讒且諛日狀其僚之過愆以致於兼且曰是過是愆我獨無有其僚因惴恐以俟謫怒於上令日施施自負曰州君將我陟也兼得之乃大怒罰令使僚也咸得自達以進乎善因擯令終不得面焉人由是不苟免而讒諛之道大息朝廷進兼於內則給事中於外則至河南尹蓋知兼有是善也歟誠然不為公且明耶或者曰兼凶狡人也恣殺以充已其為過章章者凡天下兒童後闕問曰遂古之初誰傳道之上下未形何由考之冥昭瞢闇誰能極之馮翼惟像何以識之明明闇闇惟時何為對曰本始之茫誕者傳焉鴻靈幽紛曷可言焉勿目黑晰眇往來屯屯龎昧革化惟元氣存而何為焉陰陽三合何本何化合焉者三一以統同吁炎吹冷交錯而功圜則九重孰營度之無營以成沓陽而九運轅渾淪蒙以圜號惟茲何功孰初作之冥凝元釐無功無作斡維焉繫天極焉加烏徯繫維乃糜身位無極之極漭瀰非垠或形之加孰取大焉八柱何當東南何虧皇熙亹亹胡棟胡宇宏离不屬焉恃夫八柱九天之際安放安屬無青無黃無赤無黑無中無旁烏際乎天則隅隈多有誰知其數巧欺淫誑幽陽以別無隈無隅曷懵厥列天何所沓十二焉分折篿剡筳午施旁豎鞠明究曛自取十二非予之為焉以告汝日月安屬列星安陳規燬魄淵太虛是屬棊布萬熒咸是焉託出自湯谷次於蒙汜輻旋南晝軸奠於北孰彼有出次惟汝方之側平施旁運惡有谷汜自明及晦所行幾里當焉為明不逮為晦度引無窮不可以里夜光何德死則又育燬炎莫儷淵迫而魄遐違乃專何以死育厥利維何而顧菟在腹元陰多缺爰感厥兔不形之形惟神是類女歧無合夫焉取九子陽健陰淫降施蒸摩歧靈而子焉以夫為伯強何處惠氣安在怪瀰冥更伯強乃陽順和調度應氣出行時屆時縮何有處鄉何闔而晦何開而明明焉非闢晦兮非藏角宿未旦曜靈安藏孰旦孰幽繆躔於經蒼龍之寓而廷彼角亢不任汨鴻師何以尚之僉答何憂何不課而行之惟鯀譊譊鄰聖而孼恆師龎蒙乃尚其后惟師之難矉頞使試鴟龜曳銜鯀何聽焉順欲成功帝何刑焉永遏在羽山夫何三年不施盜堙息壤招帝震怒賦刑在下而投棄於羽方陟元子以允功定地胡離厥考而鴟龜肆喙伯禹腹鯀夫何以變化纂就前緒遂成考功何續初繼業而厥謀不同氣孼宜害而嗣續得聖汙塗而蕖夫固不可以類胝躬躄步橋楯勩踣厥十有三載乃葢考醜宜儀刑九疇受是元寶昏成厥孼昭生於德惟氏之繼夫孰謀之式洪泉極深何以窴之行鴻下隤厥邱乃降焉填絕淵然後夷於土地方九則何以墳之從民之宜乃九於野墳厥貢藝而有上中下應龍何畫河海何歷胡聖為不足反謀龍智畚鍤究勤而欺畫厥尾鯀何所營禹何所成康回馮怒地何故以東南傾圜燾廓大厥立不植地之東南亦已西北彼回小子胡顛隕爾力夫誰駭汝為此而以慁天極九州何錯川谷何洿州錯富媼爰定於趾躁川靜谷形有高庳東流不溢孰知其故東窮歸墟又環西盈脈穴土區而濁濁清清墳壚燥疏滲渴而升充融有餘泄漏復行器運浟浟又何溢為東西南北其修孰多東西南北其極無方夫何鴻洞而課校修長南北順隋木其衍幾何茫忽不準孰衍孰窮崑崙縣圃其尸安在積高於乾崑崙攸居蓬首虎齒爰穴爰都增城九重其高幾里增城之里萬有三千四方之門其誰從焉凊溫燠寒迭出於時時之丕革由是而門西北辟啟何氣通焉辟啟以通茲氣之元日安所到燭龍何照修龍口燎爰北其首九陰極冥厥朔以炳羲和之未揚若華何光惟若之華稟羲以耀何所冬暖何所夏寒狂山凝凝冰於北至爰有炎洲司寒不得以試焉有石林何獸能言石胡不林往視西極獸言嘐嘐人名是達焉有虬龍負熊以遊有虬蜲蛇不角不鱗嬉夫元熊相待以神雄虺九首儵忽焉在南有怪虺羅首以噬倏忽之居帝南北海何所不死長人是守員邱之國身民後死封嵎之守其橫九里靡蓱九衢枲華安居有萍九歧厥圖以詭浮山孰產赤華伊枲靈蛇吞象厥大何如巴蛇腹象足覿厥大三歲遺骨其修巳號黑水元趾三危安在黑水淫淫窮於不姜元趾則北三危則南延年不死壽何所止僊者幽幽壽焉孰慕短長不齊咸各有止胡紛華漫汗而潛謂不死鯪魚何所鬿堆焉處鯪魚人貌邇列姑射鬿雀峙北號惟人是食羿焉彃日烏焉解羽焉有十日其火百物羿宜炭赫厥體胡庸以枝屈大澤千里㣥烏是解禹之力獻功降省下土四方焉得彼嵞山女而通之於台桑閔妃匹合厥身是繼胡維嗜慾不同味而快鼂飽禹懲於續嵞婦亟合胈離厥膚三門以不眡呱呱之不衋而孰圖厥味卒燥中野民攸宇攸暨啟代益作后卒然離蠥彼呱克臧俾姒作夏獻后益於帝諄諄以不命復為叟耆曷戚曷孼何啟惟憂而能拘是達皆歸射而無害厥躬呱勤於德民以乳活扈仇厥正帝授柄以撻兇窮聖庸夫孰克害何后益作革而禹播降益革民艱咸粲厥粒惟禹授以土爰稼萬億違溺踐垍休居以康食姑不失聖天胡往不道啟棘賓商九辯九歌啟達厥聲堪輿以呻辨同容之序帝以嬪何勤子屠母而死分竟墜禹母產聖何㽬厥旅彼淫言亂噣聰聝以不處帝降夷羿革孼夏民胡羿射夫河伯而妻彼雒嬪夷羿滔荒割更后相夫孰作厥孼而誣帝以降震皜厥鱗集矢於睆肆叫帝不諶失位滋嫚有洛之嫮焉妻於狡馮珧利決封豨是射何獻蒸肉之膏而后帝不若夸夫快殺鼎豨以慮飽馨膏腴帝叛德恣力胡肥台舌喉而濫厥福浞娶純狐眩妻爰謀何羿之射革而交吞揆之寒讒婦謀后夷卒戕荒棄於野俾奸民是臧舉土作仇徒怙身弧阻窮西征巖何越焉化為黃熊巫何活焉鯀殛羽巖化黃而淵咸播秬黍莆藿是營子宜播殖穉於邱於川維莞維蒲維菰維蘆丕徹以圖民以讙以都何由并投而鯀疾修盈堯酷厥父厥子激以功克碩厥祀後世是郊白蜺嬰茀胡為此堂安得夫良藥不能固臧天式從橫陽離爰死大鳥何鳴夫焉喪厥體王子怪駭蜺形茀裳衣褫操戈猶懵夫藥良終鳥號以游奮厥篚筐勿目漠莫謀形胡在胡亡蓱號起雨何以興之陽潛而爨陰蒸而雨蓱憑以興厥號爰所撰體協脅鹿何膺之氣怪以神爰有奇軀脇屬支偶尸帝之隅鼇戴山抃何以安之宅靈之邱掉焉不危鼇厥首而恆以恬夷釋舟陵行何以遷之要釋而陵殆或謫之龍伯負骨帝尚窄之惟澆在戶何求於嫂何少康逐犬而顛隕厥首澆嫪以力兄麀聚之康假於田肆克宇之女歧縫裳而館同爰止何顛易厥首而親以逢殆既裳既舍宜咸墜厥首湯謀易旅何以厚之湯奮癸旅爰以傴拊載厥德於葛以詰仇餉覆舟斟尋何道取之康復舊物尋焉保之覆舟喻易尚或艱之桀伐蒙山何所得焉妹嬉何肆湯何殛焉惟桀嗜色戎得蒙妹淫處暴娛以大啟厥伐舜閔在家父何以鰥堯不姚告二女何親厥萌在初何所意焉瞽父仇舜鰥以不儷堯專以女茲俾允厥世惟蒸蒸翼翼於媯之汭璜臺十成誰所極焉紂臺於璜箕克兆之登立為帝孰道尚之惟德登帝師以首之女媧有體孰制匠之媧軀虺號占以類之胡曰日化七十工獲詭之舜服厥弟終然為害何肆犬體而厥身不危敗舜弟眡厥仇畢屠水火夫固優游以聖而孰殆厥禍犬斷於德終不克以噬昆庸致愛邑鼻以賦富吳獲迄古南嶽是止孰期去斯得兩男子嗟伯之仁遜季旅嶽雍同度厥義以嘉吳國緣鵠飾玉后帝是饗何承謀夏桀終以滅喪帝乃降觀下逢伊摯何條放致罰而黎伏大說空桑鼎殷諂羹厥鵠惟軻知言日間焉以為不仁易愚危夫曷揆曷謀咸逃叢淵虐后以劉降厥觀於下匪摯孰承條伐巢放民用潰厥疣以夷於膚夫曷不謠簡狄在臺嚳何宜元鳥致貽女何喜嚳狄禱禖契形於胞胡乙鷇之食而怪焉以嘉該秉季德厥父是臧該德允考蓐收於西爪虎手鉞尸刑以司慝胡終弊於有扈牧夫牛羊牧正矜矜澆扈爰踣干協時舞何以懷之階干以娛苗革而格不迫以死夫胡狃厥賊平脅曼膚何以肥之辛后騃狂無憂以肥肆蕩弛厥體而充膏於肌嗇寶被躬焚以旗之有扈牧豎云何而逢擊牀先出其命何從扈釋於牧力使后之民仇焉㝢啟牀以斮恆秉季德焉得夫樸牛何往營班祿不但還來殷武踵德爰獲牛之樸夫唯陋民是冒而丕號以瑞卒營而班民心是市昏微循迹有狄不寧何繁鳥萃棘負子肆情解父狄淫遭慤以赧彼中之不目而徒以色視眩弟並淫危害厥兄何變化以作詐後嗣而逢長象不兄龔而奮以謀葢聖孰凶怒嗣用紹厥愛成湯東巡有莘爰極何乞彼小臣而吉妃是得水濱之木得彼小子夫何惡之媵有莘之婦莘有玉女湯巡爰獲既內克厥合而外弻於德伊知非伊之知臣曷以不識胡木化於母以蝎厥聖喙鳴不良謾以詭正盡邑以墊孰譯彼夢湯出重泉夫何辠尤不勝心伐帝夫誰使挑之湯行不類重泉是囚違虐立辟實罪德之由師憑怒以割癸挑而讎會鼂爭盟何踐吾期蒼鳥㣥飛孰使萃之到擊紂躬叔旦不嘉何親揆發足周之命以咨嗟授殷天下其位安施反成乃亡其罪伊何爭遣伐器何以行之並驅擊翼何以將之膠鬲比漦雨行踐期捧盎救灼仁興以畢隨鷹之咸同得使萃之頸紂黃鉞旦孰喜之民父有釐嗟以美之位庸芘民仁克莅之紂淫以害師殛圮之咸逭厥死爭徂器之翼鼓顛禦讙舞靡之昭后成遊南土爰厎厥利惟何而逢彼白雉水濱翫昭荊陷弒之繆迓越裳疇肯雉之穆王巧挴夫何為周流環理天下夫何索求穆懵祈招猖洋以游輪行九野惟怪之謀胡紿娛戴勝之獸觴瑤池以迭謠妖夫曳衒何號乎市周幽誰誅焉得夫褒姒孺賊厥詵爰檿其弧幽禍挐以夸憚褒以漁淫嗜薎殺諫尸謗屠孰鱗漦以徵而化黿是辜天命反側何罰何佑天邈以蒙人么以离胡克合厥道而詰彼尤違齊桓九會卒然身殺桓號其大任屬以傲幸良以九合逮孼而壞彼王紂之躬孰使亂惑何惡輔弼讒諂是服比干何逆而抑沈之雷開何順而賜封之何聖人之一德卒其異方梅伯受醢箕子佯狂紂無誰使惑惟志為首逆圖倒視輔讒以僇寵干異召死雷濟克后文德邁以被芮鞫順道醢梅奴箕忠咸喪以醜厚稷惟元子帝何篤之投之於冰上鳥何燠之何馮弓挾矢殊能將之既驚帝切激何逢長之棄靈而功篤胡爽焉翼冰以炎盍崇長焉既岐既嶷宜庸將焉紂凶以啟武紹尚焉伯昌號衰秉鞭作牧何令徹彼岐社命有殷之國伯鞭於西化江漢滸易岐社以太國之命以祚武遷藏就岐何能依踰梁士冖䂞囊羶仁蟻萃殷有惑婦何所譏妲滅淫商痡民以亟去受賜茲醢西伯上告何親就上帝罰殷之命以不救肉梅以頒烏不台訴孰盈癸惡兵躬殄祀師望在肆昌何志鼓刀揚聲后何喜牙伏牛漁積內以外萌歧目厥心瞭眡顯光奮力屠國以髀髖厥商武發殺殷何所悒載尸集戰何所急發殺曷逞寒民於烹惟栗厥文考而虔予以徂征伯林雉經維其何故何感天抑墜夫誰畏懼中譖不列恭君以雉胡螾訟蟯賊而以變天地皇天集命惟何戒之受禮天下又使至代之天集厥命惟德受之允怠以棄天又祐之初湯臣摯後茲承輔何卒官湯尊食宗緒湯摯之合祚以久食昧始以昭末克庸成績勳闔夢生少離散亡何壯武厲能流厥嚴光徵夢祖憾離以厲仿偟激覆而勇益德邁彭鏗斟雉帝何饗受壽永多夫何久長鏗羹於帝聖孰嗜味夫死自暮而誰饗以俾壽中央共牧后何怒蟻微命力何固螝齧已毒不以外肆細腰㣥螫夫何足病驚女采薇鹿何祐比至回水萃何喜萃回偶昌鹿曷祐以女兄有噬犬弟何欲易之以百兩卒無祿鍼欲兄愛以快侈富愈多厥車卒逐以旅薄暮雷電歸何憂厥嚴不奉帝何求伏匿穴處爰何云荊勳作師夫何長先悟過改更我又何言咨吟於野胡若之很嚴墜誼殄丁厥任合行違匿固若所吚嚘忿毒意誰與醜齊徂秦啗厥詐讒登狡庸咈以施甘恬禍凶亟鋤夷愎不可化徒若罷吳光爭國久予是勝何環穿自閭社邱陵爰出子文吾告堵敖以不長何試上自予忠名彌彰闔綽厥武滋以侈頹於菟不可以作怠焉庸歸款吾敖之閼以旅尸誠若名不尚曷極而辭
