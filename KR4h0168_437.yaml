body:
  text: 惟歲臨乎甲午余經蔡以遊陳見巋然之故臺沒路隅之荒榛側聞夫子於此問津敢問夫子何負於人栖栖夫子魯不容身乃泫然而出涕聊託辭以自申元黃之初萬物為銅形象既著造化無功匪伊無功不宰其中禮樂之初崩壞未正詩書既出夫子無命匪伊無命不耀其聖向使魯同季氏一作季孟齊等田常貪浮雲之不義忘夕露之瀼瀼豈無十室之邑亦有三家之堂奚自衛而反魯每困窮於路旁浩浩其天茫茫其野近不見於文武遠不逮於虞夏彼通津與直道故無得而知者已矣夫子時乎時乎進皆鳥獸之㣥退異沮溺之徒霜雪昏其大澤荊棘穢其通衢撫川陸之難險憫人世之崎嶇方太公迷殷遇文王伊尹迷莘遇成湯何夫子之不遇處昏濁而遂亡永追想於遺跡遂投弔於寒荒與元氣相合與太虛相雜此雲之所吐納巉巖奇峰蜿蟺真龍此雲之為形容其有含商咀徵節其行止以乖刺於天理然而天無情道無營四時感而運行萬物感而發生苟吾人之感激遂凝思於至精彼天地猶見應況白雲之英英繇是溉盥心術混和天倪權機不發正性不攜息真氣以足踵激清聲於瓠犀四氣既交五聲大戛以咽喉為管磬以唇吻為控揭忽頓挫而高歌遂盤跚於坱圠上如抗下如墜極高天蟠厚地魚奮鬐鳥騰翅混莽渺而清泠入虛無而密緻彼雲澶漫萬族連延一空出虛無以布濩淹寂寥而鴻濛既如蓋而如馬亦自西而自東歌者於是噬嗑其頤吮吐塤箎氣調萬象口運四時奏羽商而寒光冽冽動角徵而春色熙熙聲欲斷而復續若貫珠之纍纍一成而芳氣初振風篁未韻彼雲尚徘徊希微出入無依若往未定將行不飛再成而逸思奔壯正聲寥亮彼雲漸應曲往來從風下上三成而充塞人寰洋溢無閒在水遍水在山滿山彼雲忽應聲赴節雷奔霧集前者山立後者山岌力大不可以動搖噫氣不可以噓吸風北不北風東不東輪囷杳影泱漭長空矗如河漢屹若華嵩天輪轉而不動地籟寂而不窮沈悠悠之寒水浮習習之凉風浮沈異勢高下萬里願一致於青雲亦何階而望此及其調苦聲切歌長意深天乎有耳雲也無心果凝影而不散為歌者之知音是知志同則千里而應不同則造膝而悖谷為律而成暄日因戈而不沒苟精誠之激厲信感應於倏忽則有花裝袨服楚艷陳娥妖姿膩理慢臉橫波珊珊佩玉粲粲垂羅務淫哇之巧笑詫激楚之嬌歌曲未離於咫尺雲已邈於山河假使勢雖回天力雖拔山影則可望雲不可攀思欲騁庸音之靡曼遏仙雲之往還亦何難哉向使善亦遏雲否亦遏雲妍媸一貫邪正不分則善歌者望風而結舌肯闒茸於哀哇之㣥哉緯字文卿并州太原人舉明經以書判入等纍官彭州刺史檢校庶子兼御史中丞西川節度營田副使貞元中檢校工部尚書十四年卒年七十一贈太子少保臣某言臣伏聞陛下以某月日虔奉典冊允升寶位凡在㣥生孰不感慶中賀臣聞大人繼明品物皆照聖人首出萬國咸寧是以殷宗恭默纘成湯之業漢明聰哲繼光武之緒伏惟陛下並離開耀體乾成德神武著乎撫軍孝敬形于主鬯洎受遺嗣政正位居體以荷大業載緝重光布詔號於華裔慰人神於遏密此所以溥天之下食土之毛喜抃踴躍而不知其止者臣守職藩鎮不獲稱賀瞻望闕庭無任哀榮之至臣嗣恭言月日中使至伏奉敕書并賜臣冬衣一副李獻誠至奉宣聖旨重賜臣敕書一道并嶺南旌節及告身殊恩薦至列郡光生旌旄自天介胄增氣榮加慶外感在懼中臣某中謝臣幸承明命出鎮楚郊忽奉除書兼總閩徼捧彩牒而親承睿旨受命服而遠荷聖慈仰戴俯慙以歡為懼況臣名膺上將識昧中權豹韜無聞龍節見授但欲仗於百越震閫外之雷霆亦示勇於三軍壯轅門之鼙鼓光生澤國榮觀江城所恨荒服猶虞且有後命長安更遠未賜前期望丹闕而心魂共驚負鴻恩而灰粉何答不勝感激荷戴之至臣某言支使某官奏事回伏奉某月日手詔賜臣以皇太子所寫聖製麟德殿宴百僚詩序日月揚光風雲動色捧受之次震駭失常臣某中謝臣伏以經天緯地者聖人之文多才多藝者元良之美逖聽前修旋觀往冊考論盛事罕見全能故漢后詠歌有乖雅頌之旨周儲聰哲不聞翰墨之妙伏惟陛下道洽帝堯文趨繫表體陰陽之變化與雲漢而昭回皇太子德邁生知學資聖訓掩鍾張之筆札並虬鸞以飛動臣特承湛恩荷此殊錫集榮光於外府啓重寶於私庭班氏賜書既甚懸隔馬卿視草曾未比擬又臣所獻奉和詩事等賡歌情同率舞濫吹之音謬塵於天聽踰涯之賞忽降於絲言豈臣微力所宜負戴非臣捐軀所能效益無任榮荷感惕之至臣某言中使至伏奉手詔并賜臣皇太子所寫御製中和節詩序聖澤曲臨天文下降日月爛其光彩風雲蔚其氣色捧讀驚駭魂守失常臣某中謝臣伏以天地有常萬物必由其化陰陽不測聖人能為之節然後垂文章以鼓天下之動張宴樂以導天下之和三五以還盛美斯在伏惟陛下以道御物以文成化立言盡經緯之本秉筆節陽和之中雖天旨元深理絶於彌度而睿詞煥洽義歸於德劭文輝三象諧同六律邁殷湯之晨露掩虞舜之薰風皇太子以聰哲之姿篆隸之妙鸞鳳之勢鍾王莫儔臣備守外藩獲承殊獎荷此非常之賜實唯希代之寶窺觀則河漢無極負戴則山嶽為輕沈族捐軀何階上答不勝欣感之誠謹獻應制詩一首章句疏蕪義理鄙淺君唱臣和歡逢宴鎬之時濫吹徒歌輒效鈞天之末塵瀆旒扆伏深戰懼無任祗惕之至滉懲人吏皆是罰錢格式正贓流徒合免況多雜罰身已當辜縱有缺繫僅存家資估賣蕩盡以滉至苛至切比年猶徵不得臣自發上都煩言載路及到所部有所傳聞臣謬寄方隅特蒙天造奉辭之日親承德音今臣開闢田疇安輯黎庶豈敢流毒無告勤人自容特請停徵以綏下土霜露孝思朔月殷祭申其爵祿格以祖考苟或違經是同匹嫡相彼庶子命為大夫體異承祧位踰齒族固令奉其常祀從以大宗獻上牲於歲時稱介子於工祝使僾然之歎不絶於聲如在之義復存於目乃黯於祀典越我顛毛恃肥腯之牲牷或將或肆繄豐盛之黍稷于豆于登假祖禰之恩二重實疑於夫子竊蒸嘗之薦三廟奚取於私家仍聞就賤之辭豈聽如流之責實誣之祭人何以觀禮以制人命以防欲是彰品秩無取僭差苟豐約之不踰於德義而斯美乙周行已置忝曰王臣班列尚微蓋為元士曾靖恭其位不虧莊敬之文當官而行既不越於時式執禮以動亦何恤於人言屬霜露既零春秋匪懈爰修饗祀載展牲牷近彼庖廚雖則踐於血氣潔茲犬豕頗亦薦於夫疑膏既稱有故而殺難議不經之科或人詞游宜以麗法賓實有禮將存執贄之儀相在於堂爰司主進之務惟彼縣尹是亦為政詩愷悌以字人需飲食而肅客宓琴多暇偃室常間將有四方之賓用致萬錢之賀彼吏人而迭進伊或者以員來財非托實詞則誇誕稽諸漢史且曰大言詳乃呂刑寧聞黷貨哂無狀而即可驗受贓以謂何正已字子寬初名元裕代宗賜今名元宗幸蜀命典通義唐安二郡纍遷成都尹劍南節度採訪使太子賓客大歷五年卒贈太子少保準式制敕與一頓杖者決四十重杖一頓者決六十無文至死式內自有殺却處盡等文即明重杖只合加數京城先因處分決殺者多一死不可復生望準式文處分或決痛杖一頓者式文既不載亦請準杖六十例不至死元璨新唐書無璨字上元三年官太常博士按禮緯三年一祫五年一禘公羊傳云五年而再殷祭兩文雖互其義略同禮記正義引鄭元禘祫志云春秋僖公三十三年十二月薨文公二年八月丁卯大事於太廟公羊傳云大事者何大祫也是三年喪畢新君二年當祫明年當禘於㣥廟僖公宣公八年皆有禘則後禘去前禘五年以此定之則新君二年祫三年禘自爾已後五年而載殷祭則六年當祫八年當禘又昭公十年齊歸薨至十三年喪畢當祫為平邱之會冬公如晉至十四年祫十五年禘傳云有事於武宮是也至十八年祫二十年禘二十三年祫二十五年禘昭公二十五年有事於襄公是也如上所云則禘己後隔三年祫祫已後隔二年禘此則有合禮經不違傳義謹議勉字元卿鄭惠王元懿曾孫從肅宗於靈武擢監察御史纍遷京兆尹兼御史大夫拜嶺南節度使大歷中進工部尚書封汧國公德宗立加檢校吏部尚書同中書門下平章事建中元年檢校左僕射充汴宋滑亳河陽等道都統四年以司徒平章事徵罷為太子太師卒贈太傅諡貞遇知已而用者匪唯於人物亦有之初廚院因前池餘派浸潤坳堂數步及霤才供廚飪滌器而已邑大夫南陽范愔跡纍人㣥心在遐曠每休沐之暇訪道山林見其有天造池沼之形而遂為溝瀆乃命黃冠等頤指廣袤鑿周宇下駢石以涯之蓄流以深之清瀾忽平秋陰滿院執爨無欲清之僕挈瓶無汲深之勞不造機事而功贍於物范公實所謂新池知已矣靜勝則道純境幽則神完豫與吳天師采真洞府朝夕窺臨瑩徹心膽滑昏潛遁事苟愜於心則與登姑蘇望五湖而齊矣故因碑籀餘地刻而志之猶詩人有泌泉之作大歷五年歲號上章閹茂八月一日記滑臺舊驛天寶丙申歲逆臣盜國師競而焚滑臺四衢通於四海夷貊奉聘諸侯覲王有謺騎擊轂填郛翳術之日也或寒沍凝血或炎赫鑠肌疲心躁憤駢立無寄剛塞者多氣奮盱衡溫願者猶神忿吐息雖遠馨醪膳腐積菽槀小吏夏執輕箑冬備重裘獻用無所曷補餒殆常惕惕祇懼終湑湑議繁亦有吟憤作誣口吻震發者幕客請余構驛傳以備政縣吏請余廣驛傳以息責遂命試光祿卿兼同州別駕裴萬以恪以幹俾主剞劂圬墁之工授其意曰無尚雕木之異無榮飾土之奇揆時勿奪詳費就惟疏楹棟將違暑也廣庭廡將達風也取寧體之用去娛目之奢彤彩為文刻剸像物有益勞費豈利蔭庥況玩巧蕩神誇麗踰度乎及息役休工閲成度費則萬祇懍不墮余誠素不違乘軺之賓無或嗤余不效徐湛之風亭月觀之盛也大歷甲寅歲八月二日記陽冰字少溫趙郡人寶應元年官當塗令終將作少監司馬之職懸政一時封君之富比竹千畝高標魏闕事昭晰於周官近數渭濱理詳明於漢典所以平邦國之度通貨殖之宜傳稱百王其道不易著乎三代厥義難渝方今區宇乂寧刑辟不用百工以理庶績其凝實由懸法有孚執古以道寧從變俗之禮以紊守官之政斂在浹日孰云其非至如什一而取井田遺制九穀之外均輸未聞苟修篁之可率且丹橘其何賦金吾不許實懵大猷乙也有云雅符舊典兩端是扣片言斯折陽冰志在古篆殆三十年見前人遺跡美則美矣惜其未有點畫但偏傍模刻而已緬想聖達立制造書之意乃復仰觀俯察六合之際焉於天地山川得方圓流峙之形於日月星辰得經緯昭回之度於雲霞草木得霏布滋蔓之容於衣冠文物得揖讓周旋之禮於鬢眉口鼻得喜怒慘舒之分於蟲魚禽獸得屈伸飛動之理於骨角齒牙得擺拉咀嚼之勢隨手萬變任心所成可謂通三才之氣象備萬物之情狀者矣常痛孔壁遺文汲冢舊年代浸遠謬誤滋多蔡中郎以豐同豐李丞相將束為宋魚魯一惑涇渭同流學者相承靡所遷復每一念至未嘗不廢食雪泣攬筆長歎焉天將未喪斯文也故小子得篆籀之宗旨皇唐聖運逮茲八葉天生剋復之主人樂惟新之令以淳古為務以文明為理欽若典謨疇茲故實誠願刻石作篆備書六經立於明堂為不刊之典號曰大唐石經使百代之後無所損益仰明朝之洪烈法高代之盛事死無恨矣陽冰年垂五十去國萬里家無宿舂之儲出無代步之乘仰望紫極遠接丹霄若溘先犬馬此志不就必將負於聖朝是長埋於古學矣大夫銜命北闕撫寧南方苟利國家專之可也伏望處分令題牘及到主人寒天已暮暗燭之下應命書之霜深筆冷未窮體勢儻歸奏之日一使聞天非小人之已務是大夫之功業可否之事伏惟去就之陽冰再拜李白字太白隴西成紀人凉武昭王皓九世孫蟬聯圭組世為顯著中葉非罪謫居條支易姓與名然自窮蟬至舜五世為庶纍世不大曜亦可歎焉神龍之始逃歸于蜀復指李樹而生伯陽驚姜之夕長庚入夢故生而名白以太白字之世稱太白之精得之矣不讀非聖之書恥為鄭衛之作故其言多似天仙之辭所為著述言多諷興自三代以來風騷之後馳驅屈宋鞭撻揚馬千載獨步惟公一人故王公趍風列嶽結軌㣥賢翕習如鳥歸鳳盧黃門云陳拾遺橫制頽波天下質文翕然一變至今朝詩體尚有梁陳宮掖之風至公大變掃地併盡今古文集遏而不行唯公文章橫被六合可謂力敵造化歟天寶中皇祖下詔徵就金馬降輦步迎如見綺皓以七寶牀賜食御手調羹以飯之謂曰卿是布衣名為朕知非素畜道義何以及此置於金鑾殿出入翰林中問以國政潛草詔誥人無知者醜正同列害能成謗格言不入帝用疏之公乃浪跡縱酒以自昏穢詠歌之際屢稱東山又與賀知章崔宗之等自為八仙之遊謂公謫仙人朝列賦謫仙之歌凡數百首多言公之不得意天子知其不可留乃賜金歸之遂就從祖陳留採訪大使彥允請北海高天師授道籙於齊州紫極宮將東歸蓬萊仍羽人駕丹邱耳陽冰試絃歌於當塗心非所好公遐不棄我乘扁舟而相顧臨當掛冠公又疾亟草藳萬卷手集未修枕上授俾余為序論關雎之義始愧卜商明春秋之辭終慙杜預自中原有事公避地八年當時著述十喪其九今所存者皆得之它人焉時寶應元年十一月乙酉也城隍神祀典無之吳越有之風俗水旱疾疫必禱焉有唐乾元二年秋七月不雨八月既望縉雲縣令李陽冰躬祈於神與神約曰五日不雨將焚其廟及期大雨合境告足具官與耆耋㣥吏乃自西谷遷廟於山巔以答神休天作巨塹險于東南岌邱㘚呀蒼山黑潭殷雲填填怒虎甝甝一道白日四時青嵐鳥不敢飛猿不得下舟人聳棹行子朿馬知雄守雌為天下蹊烜赫如此人將畏之水德至柔狎侮而死畏而不死寧取於彼賢哉宮相牧此滁上政成務心閒跡放探幽近郭選奇謺嶂疏石導泉飛流瀉漲蓄泄潭洞嶔空演漾澄注縣瀑千名萬狀能諧吏隱吻合意匠退食自公爾和豫唱遺檢捨局體逸神王勒銘層崖來者斯尚謺嶂回抱中心翠微隔山見川溝塍如棊環溪石林春迷四時曲成吏隱可以忘歸荀藐古之良宰也榆次碣之庾公今之賢百里也龔邱頌之姑無其能孰闕三字議者謂庾公之政尤矣公初告㣥吏曰昔孝宣憂元元以為經國致理先乎令長乃擇郎官御史出宰縣邑我自任城尉驟居五百石非才何以當之誓務整蘇疲人祇若明命乃崇禮讓省刑罰紓力役闢土田宣慈務寬訓儉示德潤作時雨和為春風於是齊魯丕變井閭咸復三載考績一方歸最都督兼侍御史清河張公曰昌牧伯之賢也訓俗馭官勸直沮枉述職之地類能稱之曰方諸爽氣日暮更清比之松筠歲寒轉茂題以上下之目出乎㣥萃之表百城千里異聲同歡曰以伯達之良牧賞次孫之茂宰宜矣公名賁字文明其先潁川人成周之時世為掌庾因以命族公其胄焉公之考曰欽嗣為亠兊州別駕王父曰元汪為尋陽令曾王父曰師則為蜀王文學楷模繼代龜麟接武大歷中邑老彭滔等三十五人以公亡柔之大咸願刻石裦美申於元戎元戎允答縣人以陽冰與公周旋備詳德行俾之作頌多愧能文辭曰於穆庾公宰字之良化洽百里風卥一方邑老上請願言頌德元戎嘉之金石乃刻
