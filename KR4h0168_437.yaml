front:
  text: 全唐文欽定全唐文卷四百三十七防字子慎襄州襄陽人第進士歷佐幕府入為職方員外郎代宗朝拜左散騎常侍從德宗幸奉天進禮部侍郎封東海郡公授工部尚書卒年六十九贈太子少保諡曰宣
  hash: sha256:926926b1cb6162815d3427b6a49f3c5122ed8c4e663475d3d8f4ce10fa1251f8
