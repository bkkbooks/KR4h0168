front:
  text: 全唐文欽定全唐文卷五百七十二柳宗元四
  hash: sha256:f6ded73424bbfb9bfb43c02eb2036309d38c6bc240550033bdaf21c0e0c20401
body:
  text: 右臣所部貞節坊百姓某妻産三男者臣詳究往例實謂休徵已量事給絹三十匹充其乳養者伏以陛下勤恤黎元感動天地靈心昭答景福已興方使億兆繁滋區夏充牣故表祥於字育是啓運於升平事杳化源慶延邦本鱗羽之瑞曾何足云臣幸列藩維嘗叨樞近私賀之至右臣得管內台州奏月日五色雲見者一州官吏僧道耆老悉皆瞻覩已具奏聞并寫圖奉進者伏以景雲上瑞王者祉符煥彩彰之在天知聖德之昭感伏惟陛下化孚有截道洽無垠承天地之貞明導陰陽之和氣遂使紛紛郁郁自東而徂西若煙非煙一旬而再至徵諸古諜事罕前聞伏乞宣付史官以昭簡册右今月四日雍管奏事官嚴訓過稱押衙談叔向等與黃家賊五千餘人謀為翻動雖已誅斬猶未清寧臣當時差本道同十將試光祿卿雷繞至雍管界首賓州以來迎探事宜兼為聲援昨得雷繞十四日狀并嚴訓狀報同到其黃家賊並已退散各歸洞穴訖伏以鼠竊狗偷非足為患陛下威靈遠被神化旁行遂使姦狡之謀先期而自露回邪之黨不戮而盡夷伏恐飛章已達吉語未聞上軫天心猶煩廟算臣謬居方鎮忝接疆界所得事宜不敢不奏右臣伏準名例律諸官與父祖諱同者不合冒榮居之臣祖名察躬今臣蒙恩授前件官以幼年逮事王父禮律之制所不敢踰臣不勝進退惶恐之至謹詣光順門奏狀以聞伏聽敕旨右臣謬領京畿已逾兩月政術無取誠懇莫申遂使雨澤愆時田苗微損夙夜兢懼寢食靡遑今長安二十四縣並準常年例全徵其昭應等九縣臣各得狀並令詳審各絶隱欺謹具別狀封進臣當府夏稅通計約二十九萬石以上據所損矜免秪當三萬石有餘恤人則深減數非廣伏以聖慈宏貸憫念蒸黎臣忝職司不敢不奏無任慚懼之至謹録奏聞伏聽敕旨右臣亡父至德之歲死節睢陽陛下每降鴻恩必加裦寵臣自七歲即忝班榮垂五十年常居祿秩再守遐郡績用無成終貽官謗甘就嚴譴無以負荷先志報效殊私以慚以懼隕越無地伏見某月日敕以王承宗負恩干紀命將徂征雷霆所加殄滅在近臣竊不自揆思竭忠誠願預一卒之任以答百生之幸庶得摧鋒觸刃摩壘搴旗冀獲盡於微誠儻不墜於遺烈踊躍之至夙夜不寧敢希皇明俯鑒丹懇臣聞周官考藝國子置車甲之司漢道推恩孤兒備羽林之用千秋思奮於事越仲孺期死於奔吳義激君親名高竹帛臣雖無似有慕昔人雖身塗草野死而不朽披肝瀝血昧死上陳無任懇迫忠憤之至謹録奏聞伏候敕旨右伏奉某月日敕宜以二月一日為中和節所司進農書永以為恆式者臣伏以平秩東作虞書立制俶載南畝周雅垂文此皆奉天時以授人盡地力而豐食自陛下惟新令節益勵農功既立典於可傳每陳書而作則耕鑿之利敷帝力於嘉謨稼穡之難動天心於睿覽勤勞率下超邁古先凡在率土不勝幸甚前件農書謹函封進謹奏瓷器若干事右件瓷器等並藝精埏埴制合規模稟至德之陶蒸自無苦窳合太和以融結克保堅貞且無瓦釜之鳴是稱土鉶之德器慚瑚璉貢異砮丹既尚質而為先亦當無而有用謹遣某官某乙隨狀封進謹奏右伏準從前赦文常參官上後舉一人自代者伏見前件官頗有才行長於政術久歷嶺南使職臣之所知敢舉自代無任懇迫之至右今月三日得知進奏官某報前件賊以前月九日克就梟戮者伏以天啓聖期神資良弻必有懲討以致升平蠢爾凶渠敢行悖亂締交於雷霆之下效逆於化育之辰逞豺聲以欺天恣狼心而犯上嘉謨克協威命旁行破竹寧比其發機走丸未喻於乘勝濁河清濟曾無溝洫之虞大峴琅邪不聞崖岸之阻天兵四合賊衆屢摧然後赦劫脅之辜許其歸復寬詿誤之典期以撫循外怛皇威中感聖德雖在梟獍豈不知歸是以未極誅鋤遽聞內潰鯨鯢已戮見東海之無波氛沴盡銷仰太陽之普照功格於天地化合於陰陽一德方繼於商書降神自同於周雅遂使垂白遺老再逢天寶之安縉紳諸生遠期貞觀之理某特承朝獎謬列藩臣常以突刃觸鋒未為效節膏原潤草豈足酬恩寤寐撫心不遑寧處今則削平之際慙無尺寸之功開泰方初徒受邱山之寵無任憤激屏營之至忭舞歡慶倍百恆情右伏奉二月二十二日德音以淄青削平慶賜大洽率土之內忭躍無窮伏惟周滅三監但明誅放之罰漢平七國更嚴斬殺之科未有翦覆凶渠撫存疑類威暫行而德洽誅才及而恩加操兵者悉獲歸休秉耒者更聞優復與之種食豐以貨財疾苦盡除鰥孤咸育葬戰死之骨增以賞延憐刃傷之肌存其廩給滌山川之舊污申節義之餘冤功多受三事之榮節著有十連之寵較然逆順益以彰明和氣遠周罷七旬之干羽仁風溥暢收六月之車徒寰海永康夷夏均慶某忝司戎旅獲奉升平當伊尹無恥之辰見咎繇惟輕之德忭躍之至倍萬恆情無任慶賀之至右某伏見某月日制分淄青諸州為三道節度都團練觀察等使者害氣盡除和風溥暢裂壤既分其形勝經野必正其提封河濟異宜海岱殊服八命作牧無開威福之源十國為連已肅澄清之政鼠無夜動梟變好音惠澤豈俟於崇朝仁化寧期於必代遂使琅邪即墨田生無慮其異謀聊攝姑尤晏子但聞其善祝恭以相公謨參禹績制出蕭規光輔聖神永康黎獻某獲逢開泰忝守方隅忭躍之誠倍百恆品右伏以逆賊李師道克就梟擒已具中書門下狀賀訖某忝居末屬特受深恩踊躍不寧輒復披露竊以自古中興之主必有命代之臣一德同功以叶休運故申甫方召成宣王復古之勳吳鄧寇耿致光武配天之業此皆上下齊志中外悉心雖成功則多而陳力甚易豈若閣下挺拔英氣邁越常流獨契聖謨以昌鴻業廟略初定異議紛然詆訕盈朝萋斐成市閣下秉心不惑定命彌堅討淮右之凶則下車而授首服恆陽之虜則馳使而革心况師道惡稔禍盈鬼怨神怒恣行悖慢敢肆欺誣天兵四臨所至皆捷次又捨其將校許以歸還罪止一夫恩加百姓豺狼感化梟獍懷仁自致誅夷以成開泰萬方有慶四海無虞遂令率土之人盡識太平之理盛德大業振古莫儔然則布政明堂勒功東嶽光垂後祀輝映前王神化永屬於聖君崇勳實歸於宗衮慶賀之至倍萬恆情右伏以左降官是受責之人都不釐務戶部錢是準敕收貯不合別支又所授員外官亦非舊制宗元在永州日見百姓莊宅公驗有司戶李雍判給處足明皆是正官今請悉依故事為準並廢員外所置凡在貶黜授以正員責其成功俾無虛授貯錢既免支用加數足應軍須實冀貨不濫分官無曠職謹狀右奉牒準律文處分者已帖縣準牒待秋分後舉處分訖伏以中丞慈惠化人孝悌成俗屬吏所見皆許申明至公之下敢竭愚慮竊以莫誠赴急而動事出一時解難為心豈思他物救兄有急難之戚中臂非必死之瘡不幸致殂揣非本意桉文固當恭守撫事亦可哀矜斷手方迫於深衷周身不遑於遠慮律宜無赦使司明至當之心情或未安守吏切惟輕之願况俟期尚遠稟命不遙伏乞俯賜興哀特從屈法幸全微命以慰遠黎則必闔境荷慈育之恩豈惟一夫受生成之賜儻以律文難變使牒己行則伏望此狀便令廢格輕賜一作肆塵黷惶戰交深謹録狀上奉聽處分某材質無堪授任非次當有事之日忠懇莫施遇成功之辰慙憤空積陳力之志誓死不逾伏惟仁恩終賜展效今者中華寧謐異類服從唯此南方尚餘寇孽伏以黃少卿等憑培塿以自固合莝脆以為強劫脅使臣侵暴列郡雖狐鼠之陋無足示威而蜂蠆之微猶能害物必資翦伐方致和平庶盡駑蹇之勞以答恩榮之重撫心踊躍夙夜不寧私布丹誠敢期明鑒無任感激屏營之至右某幸遇文明叨承委寄理戎典郡十有四年瞻戀闕庭神魂飛越頃在雍州纍陳誠懇謬尸進律之寵未遂執圭之願相公膺賢輔聖大敘倫彞中外之臣出入更踐某自領桂管又逾再周企鸞鷺於紫霄獨無羽翼仰星辰於黃道徒竭丹誠况正月會朝遠夷皆至六歲來見要服有期豈使班超之望長懸子牟之戀空積伏乞特申微願録受冗員徵故事而不遺揆夙志而斯畢入天子之國願附禮於小侯拜丞相之車敢希榮於上客無任懇禱屏營之至輕瀆威重戰汗伏深謹狀右伏以越敗夫差多會稽納官之子趙摧栗腹即長平死事之孤何者義烈之餘色氣猛厲上將效於國用下欲濟其家聲所以憤激悽愴常思致命者也某先父死難睢陽事在簡册纍降優詔榮及子孫爰自襁褓超升品秩肉食廩給未嘗暫停頃守涪州屬西蜀遘逆將致死命以盡夙心寢戈嘗膽志願未究會刀筆之吏置以深文首級之差今復誰辨薏苡之謗不能自明猶賴舊勳謫居樂土食人力之粟守無事之官拳拳血誠無所陳露伏見明制興師討伐恆冀蔑爾小醜尚欲逋誅某才非古人志慕前烈願得身當一隊效死戎行竭平生之忠懇申幽明之冤痛撫劒心往發言涕零嘗聞漢法有奮擊胸奴者諸侯不得擁遏又况丞相總軍國之重定廊廟之謀固當宏獎無所棄捐伏乞哀憫收撫以成其心無任懇迫惶恐之至右伏準元和六年十月十七日敕常參官授上後三日內舉一人以自代便具所舉人兼狀上中書門下者今奏請前件官自代謹連狀長安等縣耆壽某乙若干人右某等伏以生長明時遊泳皇澤鼓腹且知於帝力食毛敢忘於君恩竊見近者祥瑞所呈周於百郡豐稔之報均於四方有以知上元降靈誕告嘉應彰我君文明之化仁育之恩大道既行鴻名未舉是以殷勤昭著如斯而不已者也某皆陶煦純仁成此耉老生既無補死而何求唯願上聞帝閽復建尊號用彰聖德以報皇慈披露血誠伏守天闕糜軀碎骨猶生之年謹以今日詣光順門輒進表訖伏惟相公贊翊明主共致太平而使名號尚鬱天人失望草野愚鄙竊有惑焉伏望敷奏之際開陳其要俾下情允達大願克從退就泉壤樂而無恨輕黷國相一作相國伏待典刑謹狀長安縣耆老某乙等若干人右某等幸以羸老獲覩升平蹈舞薰風謳歌壽域譬之草木何以報天寤寐焦勞不知所措伏見聖君臨御元化升聞瑞應匝於萬方豐報窮於四海神祇注意天地傾心覺悟生人必有為者蓋以挹損徽號近二十年盛德益光大名未復致遠邇積慮幽明憤懷故自古以來嘉瑞之至未有如今歲之盛也斯乃上元深旨下人懇誠勤勤相符正在於此某等眷戀明時朝夕是切唯願早復大號以契天心庶得聖政益光鴻化彌遠少遂踊躍之甚今請詣光順門進表昧死上陳伏以侍郎道合君臣惠敷黎庶儻遂收采愚慮致貢天庭俾草萊微誠得達萬乘非所敢望惶懼伏深謹狀晉文公既受原於王難其守問寺人勃鞮以畀趙衰余謂守原政之大者也所以承天子樹霸功致命諸侯不宜謀及媟近以忝王命而晉君擇大任不公議於朝而私議於宮不博謀於卿相而獨謀於寺人雖或衰之賢足以守國之政不為敗而賊賢失政之端由是滋矣况當其時不乏言議之臣乎狐偃為謀臣先軫將中軍晉君疏而不咨外而不求乃卒定於內豎其可以為法乎且晉君將襲齊桓之業以翼天子乃大志也然而齊桓任管仲以興進豎刁以敗則獲原啓疆適其始政所以觀視諸侯也而乃背其所以興迹其所以敗然而能霸諸侯者以土則大以力則強以義則天子之册也誠畏之矣烏能得其心服哉其後景監得以相衛鞅宏石得以殺望之誤之者晉文公也嗚呼得賢臣以守大邑則問非失舉也蓋失問也然猶羞當時陷後代若此况於問與舉又兩失者其何以救之哉余故著晉君之罪以附春秋許世子止趙盾之義臣伏見天后時有同州下邽人徐元慶者父爽為縣尉趙師韞所殺卒能手刃父讎束身歸罪當時諫臣陳子昂建議誅之而旌其閭且請編之於令永為國典臣竊獨過之臣聞禮之大本以防亂也若曰無為賊虐凡為子者殺無赦刑之大本亦以防亂也若曰無為賊虐凡為治者殺無赦其本則合其用則異旌與誅莫得而並焉誅其可旌茲謂濫黷刑甚矣旌其可誅茲謂僭壞禮甚矣果以是示於天下傳於後代趨義者不知所向違害者不知所立以是為典可乎蓋聖人之制窮理以定賞罰本情以正褒貶統於一而巳矣嚮使刺讞其誠偽考正其曲直原始而求其端則刑禮之用判然離矣何者若元慶之父不陷於公罪師韞之誅獨以其私怨奮其吏氣虐於非辜州牧不知罪刑官不知問上下蒙冒籲號不聞而元慶能以戴天為大恥枕戈為得禮處心積慮以衝讎人之胸介然自克即死無憾是守禮而行義也執事者宜有慚色將謝之不暇而又何誅焉其或元慶之父不免於罪師韞之誅不愆於法是非死於吏也是死於法也法其可讎乎讎天子之法而戕奉法之吏是悖驁而凌上也執而誅之所以正邦典而又何旌焉且其議曰人必有子子必有親親親相讎其亂誰救是惑於禮也甚矣禮之所謂讎者蓋以冤抑沈痛而號無告也非謂抵罪觸法陷於大戮而曰彼殺之我乃殺之不議曲直暴寡脅弱而已其非經背聖不亦甚哉周禮調人掌司萬人之讎凡殺人而義者令勿讎讎之則死有反殺者邦國交讎之又安得親親相讎也春秋公羊傳曰父不受誅子復讎可也父受誅子復讎此推刃之道復讎不除害今若取此以斷兩下相殺則合於禮矣且夫不忘讎孝也不愛死義也元慶能能一作既不越於禮服孝死義是必達理而聞道者也夫達禮聞道之人豈其以王法為敵讎者哉議者反以為戮黷刑壞禮其不可以為典明矣請下臣議附於令有斷斯獄者不宜以前議從事謹議貞元十五年正月日故銀青光祿大夫右散騎常侍輕車都尉宜城縣開國伯柳公從孫將仕郎守集賢殿正字宗元謹上尚書考功伏以魯史褒貶虞書黜陟彰善疸惡王教之端自周公以來諡法未改謹桉柳公纍歷清貫茂著名節貞亮存誠潔廉中禮納忠為諍臣之表出守乃牧人之良刺舉必聞澄清可紀冒危而大節不奪更名而純誠克彰遂踐鼎司以匡王國奉上盡陪輔之志退迹有推讓之高圭璋聞望洽於人聽所以聳厲在位關於政教聲聞王者其事實繁褒善勸能固將不廢宗元既當族屬且又通家傳信克備其遺芳考行敢徵於故事謹具署其懿績布以慤詞定諡之制請如律令謹狀
