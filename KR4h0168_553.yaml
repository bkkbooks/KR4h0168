front:
  text: 全唐文欽定全唐文卷五百五十三韓愈七
  hash: sha256:db3105e3f96ebae1837afb4892ce3f7d8bc33cebc0c015961e7276c244c8e2b8
body:
  text: 大受足下辱書為賜甚大然所稱道過盛豈所謂誘之而欲其至於是歟不敢當不敢當其中擇其一二近似者而竊取之則於交友忠而不反於背面者少似近焉亦其心之所好耳行之不倦則未敢自謂能爾也不敢當不敢當至於汲汲於富貴以救世為事者皆聖賢之事業知其智能謀力能任者也如愈者又焉能之始相識時方甚貧衣食於人其後相見於汴徐二州僕皆為之從事日月有所入比之前時豐約百倍足下視吾飲食衣服亦有異乎然則僕之心或不為此汲汲也其所不忘於仕進者亦將小行乎其志耳此未易遽言也凡禍福吉凶之來似不在我惟君子得禍為不幸而小人得禍為恆君子得福為恆而小人得福為幸以其所為似有以取之也必曰君子則吉小人則凶者不可也賢不肖存乎己貴與賤禍與福存乎天名聲之善惡存乎人存乎己者吾將勉之存乎天存乎人者吾將任彼而不用吾力焉其所守者豈不約而易行哉足下曰命之窮通自我為之吾恐未合於道足下徵前世而言之則知矣若曰以道德為已任窮通之來不接吾心則可也窮居荒涼草樹茂密出無驢馬因與人絶一室之內有以自娛足下喜吾復脫禍亂不當安安而居遲遲而來也愈再拜以擊毬事諫執事者多矣諫者不休執事不止此非為其樂不可捨其諫不足聽故哉諫不足聽者辭不足感心也樂不可捨者患不能切身也今之言毬之害者必曰有危墮之憂有激射之虞小者傷面目大者殘形軀執事聞之若不聞者其意必曰進若習熟則無危墮之憂避能便捷則免激射之虞小何傷於面目大何纍於形軀者哉愈今所言皆不在此其指要非以他事外物牽引相比也特以擊毬之間之事明之耳馬之與人情性殊異至於筋骸之相束血氣之相持安佚則適勞頓則疲者同也乘之有道步驟折中少必無疾老必後衰及以之馳毬於場蕩搖其心腑振撓其骨筋氣不及出入走不及回旋遠者三四年近者一二年無全馬矣然則毬之害於人也決矣凡五臟之繫絡甚微立坐必懸垂於胸臆之間而以之顛頓馳騁嗚呼其危哉春秋傳曰夫有尤物足以移人苟非德義則必有禍雖豈弟君子神明所扶持然廣慮之深思之亦養壽命之一端也愈恐懼再拜辱示初筮賦實有意思但力為之古人不難到但不知直似古人亦何得於今人也僕為文久每自則意中以為好則人必以為惡矣小稱意人亦小怪之大稱意即人必大怪之也時時應事作俗下文字下筆令人慚及示人則人以為好矣小慚者亦蒙謂之小好大慚者即必以為大好矣不知古文直何用於今世也然以俟知者知耳昔揚子雲著太元人皆笑之子雲之言曰世不我知無害也後世復有揚子雲必好之矣子雲死近千載竟未有揚子雲可歎也其時桓談亦以為雄書勝老子老子未足道也子雲豈止與老子爭強而已乎此未為知雄者其弟子侯芭頗知之以為其師之書勝周易然侯之他文不見於世不知其人果如何耳以此而言作者不祈人之知也明矣直百世以俟聖人而不惑質鬼神而不疑耳足下豈不謂然乎近李翺從僕學文頗有所得然其人家貧多事未能卒其業有張籍者年長於翺而亦學於僕其文與翺相上下一二年業之庶幾乎至也然閔其棄俗尚而從於寂寞之道以之爭名於時也久不談聊感足下能自進於此故復發憤一道愈再拜執事好賢樂善孜孜以薦進良士明白是非為己任方今天下一人而已愈之獲幸於左右其足迹接於門牆之間升乎堂而望乎室者亦將一年於今矣念慮所及輒欲不自疑外竭其愚而道其志况在執事之所孜孜為己任者得不少助而張之乎誠不自識其言之可採與否其事則小人之事君子盡心之道也天下之事不可遽數又執事之志或有待而為未敢一二言也今但言其最近而切者爾執事之與司貢士者相知誠深矣彼之所望於執事執事之所以待乎彼者可謂至而無間疑矣彼之職在乎得人執事之志在乎進賢如得其人而授之所謂兩得其求順乎其必從也執事之知人其亦博矣夫子之言曰舉爾所知然則愈之知者亦可言已文章之尤者有侯喜者侯雲長者喜之家在開元中衣冠而朝者兄弟五六人及喜之父仕不達棄官而歸喜率兄弟操耒耜而耕於野地薄而賦多不足以養其親則以其耕之暇讀書而為文以干於有位者而取足焉喜之文章學西京而為也舉進士十五六年矣雲長之文執事所自知其為人淳重方實可任以事其文與喜相上下有劉述古者其文長於為詩文麗而思深當今舉於禮部者其詩無與為比而又工於應主司之試其為人溫良誠信無邪佞詐妄之心強志而婉容和平而有立其趨事靜以敏著美名而負屈稱者其日已久矣有韋㣥玉者京兆之從子其文有可取者其進而未止者也其為人賢而有才志剛而氣和樂於薦賢為善其在家無子弟之過居京兆之側遇事輒爭不從其令而從其義求子弟之賢而能業其家者㣥玉是也凡此四子皆可以當執事首薦而極論者主司疑焉則以辨之問焉則以告之未知焉則殷勤而語之期乎有成而後止可也有沈杞者張宏者尉遲汾者李紳者張後餘者李翊者或文或行皆出㣥之才也凡此數子與之足以收人望得才實主司疑焉則與解之問焉則以對之廣求焉則以告之可也往者陸相公司貢士考文章甚詳愈時亦幸在得中而未知陸之得人也其後一二年所與及第者皆赫然有聲原其所以亦由梁補闕肅王郎中礎佐之梁舉八人無有失者其餘則王皆與謀焉陸相之考文章甚詳也待梁與王如此不疑也梁與王舉人如此之當也至今以為美談自後主司不能信人人亦無足信者故蔑蔑無聞今執事之與司貢士者有相信之資謀行之道惜乎其不可失也方今在朝廷者多以遊宴娛樂為事獨執事眇然高舉有深思長慮為國家樹根本之道宜乎小子之以此言聞於左右也愈恐懼再拜愈再拜布衣之士身居窮約不借勢於王公大人則無以成其志王公大人功業顯著不借譽於布衣之士則無以廣其名是故布衣之士雖甚賤而不諂王公大人雖甚貴而不驕其事勢相須其先後相資也今閣下為王爪牙為國藩垣威行如秋仁行如春戎狄棄甲而遠遁朝廷高枕而不虞是豈負大丈夫生平之志願哉豈負明天子非常之顧遇哉赫赫乎洸洸乎功業逐日以新名聲隨風而流宜乎歡呼海隅高談之士奔走天下慕義之人使或願馳一傳或願操一戈納君於唐虞收地於河湟然而未至乎是者蓋亦有説云豈非待士之道未甚厚遇士之禮未甚優請粗言其事閣下試詳而聽之夫士之來也必有求於閣下夫以貧賤而求於富貴正其宜也閣下之財不可以遍施於天下在擇其人之賢愚而厚薄等級之可也假如賢者至閣下乃一見之愚者至不得見焉則賢者莫不至而愚者日遠矣假如愚者至閣下以千金與之賢者至亦以千金與之則愚者莫不至而賢者日遠矣欲求得士之道盡於此而已欲求士之賢愚在於精鑒博采之而已精鑒於己固己得其十七八矣又博采於人百無一二遺者焉若果能是道愈見天下之竹帛不足書閣下之功德天下之金石不足頌閣下之形容矣愈也布衣之士也生七歲而讀書十三而能文二十五而擢第於春官以文名於四方前古之興亡未嘗不經於心也當世之得失未嘗不留於意也嘗以天下之安危在邊故六月于邁來觀其師及至此都徘徊而不能去者誠説閣下之義願少立於階墀之際望見君子之威儀也居十日而不敢進者誠以左右無先為容懼閣下以衆人視之則殺身不足以滅恥徒悔恨於無窮故先此書序其所以來之意閣下其無以為狂而以禮進退之幸甚幸甚愈再拜某聞木在山馬在肆遇之而不顧者雖日纍千萬人未為不材與下乘也及至匠石過之而不睨伯樂遇之而不顧然後知其非棟梁之材超逸之足也以某在公之宇下非一日而又辱居姻婭之後是生於匠石之園長於伯樂之廄者也於是而不得知假有見知者千萬人亦何足云今幸賴天子每歲詔公卿大夫貢士若某等比咸得以薦聞是以冒進其説以纍於執事亦不自量已然執事其知某如何哉昔人有鬻馬不售於市者知伯樂之善相也從而求之伯樂一顧價增三倍某與其事頗相類是故終始言之耳某再拜月日愈再拜天池之濱大江之濆曰有怪物焉蓋非常鱗凡介之品彙匹儔也其得水變化風雨上下於天不難也其不及水蓋尋常尺寸之間耳無高山大陵曠途絶險為之關隔也然其窮涸不能自致乎水為獱獺之笑者蓋十八九矣如有力者哀其窮而運轉之蓋一舉手一投足之勞也然是物也負其異於衆也且曰爛死於沙泥吾寧樂之若俯首帖耳搖尾而乞憐者非我之志也是以有力者遇之熟視之若無覩也其死其生固不可知也今又有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎其哀之命也其不哀之命也知其在命而且鳴號之者亦命也愈今者實有類於是是以忘其疏愚之罪而有是説焉閣下其亦憐察之愈白進士劉君足下辱箋教以所不及既荷厚賜且愧其誠然幸甚幸甚凡舉進士者於先進之門何所不往先進之於後輩苟見其至寧可以不答其意耶來者則接之舉城士大夫莫不皆然而愈不幸獨有接後輩名名之所存謗之所歸也有來問者不敢不以誠答或問為文宜何師必謹對曰宜師古聖賢人曰古聖賢人所為書具存辭皆不同宜何師必謹對曰師其意不師其辭又問曰文宜易宜難必謹對曰無難易惟其是爾如是而已非固開其為此而禁其為彼也夫百物朝夕所見者人皆不注視也及覩其異者則共觀而言之夫文豈異於是乎漢朝人莫不能為文獨司馬相如太史公劉向揚雄為之最然則用功深者其收名也遠若皆與世沈浮不自樹立雖不為當時所怪亦必無後世之傳也足下家中百物皆賴而用也然其所珍愛者必非常物夫君子之於文豈異於是乎今後進之為文能深探而力取之以古聖賢人為法者雖未必皆是要若有司馬相如太史公劉向揚雄之徒出必自於此不自於循常之徒也若聖人之道不用文則已用則必尚其能者能者非他能自樹立不因循者是也有文字來誰不為文然其存於今者必其能者也顧常以此為説耳愈於足下忝同道而先進者又常從遊於賢尊給事既辱厚賜又安得不進其所有以為答也足下以為何如愈白某月日愈頓首辱賜書周覽纍日竦然增敬蹙然汗出以慙愈於進士中粗為知讀經書者一來應舉事隨日生雖欲加功竟無其暇遊從之類相熟相同不教不學悶然不見已缺日失月亡以至於老所謂無以自別於常人者每逢學士真儒歎息踧踖愧生於中顏變於外不復自比於人前者蒙示新注公羊春秋又聞口授指略私心喜幸恨遭逢之晚願盡傳其學職事羈廠田坴未得繼請怠惰因循不能自強此宜在擯而不教者今反謂少知根本其辭章近古可令敘所著書惠出非望承命反側善誘不倦斯為多方敢不喻所指八月益涼時得休暇儻矜其拘綴不得走請務道之傳而賜辱臨執經座下獲卒所聞是為大幸况近世公羊學幾絶何氏注外不見他書聖經賢傳屏而不省要妙之義無自而尋非先生好之樂之味於衆人之所不味務張而明之其孰能勤勤綣綣若此之至固鄙心之所最急者如遂蒙開釋章分句斷其心曉然直使序所注挂名經端自託不腐其又奚辭將惟先生所以命愈再拜愈白辱惠書語高而旨深三四讀尚不能通曉茫然增愧赧又不以其淺弊無過人知識且喻以所守幸甚愈敢不吐情實然自識其不足補吾子所須也齊王好竽有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾鼓瑟合軒轅氏之律呂客罵之曰王好竽而子鼓瑟雖工如王不好何是所謂工於瑟而不工於求齊也今舉進士於此世求祿利行道於此世而為文必使一世人不好得無與操瑟立齊門者比歟文雖工不利於求求不得則怒且怨不知君子必爾為不也故區區之心每有來訪者皆有意於不肖者也略不辭讓遂盡言之惟吾子諒察愈白愈白行官自南回過吉州得吾兄二十四日手書數番欣悚兼至未審入秋來眠食何似伏惟萬福來示云有人傳愈近少信奉釋氏此傳之者妄也潮州時有一老僧號大顛頗聰明識道理遠地無可與語者故自山召至州郭留十數日實能外形骸以理自勝不為事物侵亂與之語雖不盡解要自胸中無滯礙以為難得因與來往及祭神至海上遂造其廬及來袁州留衣服為別乃人之情非崇信其法求福田利益也孔子云某之禱久矣凡君子行已立身自有法度聖賢事業具在方策可效可師仰不愧天俯不愧人內不愧心積善積惡殃慶自各以其類至何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎愷悌君子求福不回傳又曰不為威惕不為利疚假如釋氏能與人為禍祟非守道君子之所懼也况萬萬無此理且彼佛者果何人哉其行事類君子耶小人耶若君子也必不妄加禍於守道之人如小人也其身已死其鬼不靈天地神祇昭布森列非可誣也又肯令其鬼行胸臆作威福於其間哉進退無所據而信奉之亦且惑矣且愈不助釋氏而排之者其亦有説孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不明則三綱淪而九法斁禮樂崩而夷狄橫幾何其不為禽獸也故曰能言距楊墨者皆聖人之徒也揚子雲云古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢且將數百年以至於秦卒滅先王之法燒除其經坑殺學士天下遂大亂及秦滅漢興且百年尚未知修明先王之道其後始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乖隔不合不公二帝三王㣥聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何補然賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左袵而言侏離矣故愈嘗推尊孟氏以為功不在禹下者為此也漢氏以來㣥儒區區修補百孔千瘡隨亂隨失其危如一髮引千鈞帛丿糸帛丿糸延延穴㓎以微滅於是時也而倡釋老於其間鼓天下之衆而從之嗚呼其亦不仁甚矣釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在旁又安得因一摧折自毀其道以從於邪也籍湜輩雖屢指教不知果能不叛去否辱吾兄眷厚而不獲承命惟增慚懼死罪死罪愈再拜愈白惠書責以不能如信陵執轡者夫信陵戰國公子欲以取士聲勢傾天下而然耳如僕者自度若世無孔子不當在弟子之列以吾子始自山出有朴茂之美意恐未礱磨以世事又自周後文弊百子為書各自名家亂聖人之宗後生習傳雜而不貫故設問以觀吾子其已成熟乎將以為友也其未成熟乎將以講去其非而趨是耳不如六國公子有市於道者也方今天下入仕惟以進士明經及卿大夫之世耳其人率皆習熟時俗工於語言識形勢善候人主意故天下靡靡日入於衰壞恐不復振起務欲進足下趨死不顧利害去就之人於朝以爭救之耳非謂當今公卿間無足下輩文學知識也不得以信陵比然足下衣破衣繫麻鞋率然叩吾門吾待足下雖未盡賓主之道不可謂無意者足下行天下得此於人蓋寡乃遂能責不足於我此真僕所汲汲求者議雖未中節其不肯阿曲以事人者灼灼明矣方將坐足下三浴而三熏之聽僕之所為少安無躁愈頓首
