front:
  text: 全唐文欽定全唐文卷三百四十二顏真卿七
  hash: sha256:09728e92247bfd3fc680076904fda7cfd305557e5bbf720dd9cbf210ca09f06c
body:
  text: 公諱懷恪字貞節東莞人其先出於魯孝公之子彄字子臧大夫得祖諸侯其孫以王父字為氏僖哀二伯既納忠於魚鼎文武兩仲亦不朽於言哲丈人成功而遁迹子原抗節而舍生義和辭金飾之器榮緒奮陽秋之筆賢達繼軌紛綸至今曾祖滿隋驃騎將軍祖寵皇朝通議大夫靈州都督府長史父德朝散大夫贈銀州刺史咸務遠圖克開厥後恤允之慶世祀宜哉公即銀州之第三子也身長六尺一寸睂目雄朗鬚髯灑秀雅善騎射尤工尺牘沈靜少言寬仁得衆奇謀沖邈英勇冠倫友于弟兄謹爾鄉黨每敦詩而執禮不茹柔以吐剛莅事而剖判泉流臨戎而智略鋒起古所謂文武不墜高明有融者焉少以勳勞亟紆戎級開元初嘗遊平盧屬奚室韋大下公挺身與戰所向摧靡繇是發名元宗聞而嘉之拜勝州都督府長史銳精佐理絜矩當官朔漠不空邊隅用乂俄拜左衞率府左郎將轉右領軍中郎將兼安北都護中受降城使朔方五城都知兵馬使戎事齊足十萬維㣥我伐用張軍威以肅由是深為節度使王晙所器奏充都知兵馬使嘗以百五十騎遇突厥斬啜八部落十萬餘衆於狼頭山殺其數百人引身據高環馬禦外虜矢如雨公徒且殲遽而紿之曰我為臧懷恪敕令和汝何得與我拒戰於時僕固懷恩父設支適在其中獨遮護之諸部落持疑不肯公刲羊以盟之杖義以責之衆皆感激由此獲免遂與設支部落二千帳來歸後充河西軍前將盤禾安氏有馬千駟怙富不虔一族三人立皆毆斃軍州悚慄疇敢不祗又為節度相國蕭嵩所賞後充河源軍使兼隴右節度副大使關西兵馬使拜右武衞將軍吐蕃不敢東向者累年俄封上蔡縣開國侯開元十二年歲次甲子春二月二十有六日薨於鄯城之官舍享年五十六某年八月二十三日詔曰故具官某頓以幹能亟承任使操行愈謹勞効未酬不幸遷殂良增追悼可贈右領軍衞大將軍即以其年冬十月庚戌遷窆於京兆府三原縣北原禮也嗚呼公兄左羽林軍大將軍平盧副持節懷亮以方虎之材爪牙之任孔懷斯切致美則深公七子游擊將軍崇仁府折衝希崇豐州別駕贈宋州刺史希昶左武衞將軍朔方節度副使贈太子賓客希忱右衞左郎將劒南討擊副使贈汝州刺史希愔右驍衞郎將靜邊軍使贈祕書監希景寧州刺史左金吾衞將軍贈揚州大都督希晏開府儀同三司行太子詹事兼御史大夫邠寧山南觀察使集賢待制工部尚書渭北節度使魯國公希讓等夙漸詩禮恭承教義芬潤挺蘭玉之姿英威矕虓谷闞之質而希讓識度宏遠器謀沈邃仁親以孝殿國以忠綽裕冠於人倫勳勞懋於王室至德中今上為元帥東伐肇允押牙從收兩京陟降左右入侍帷幄既崇翼戴之功出擁麾幢載叶澄清之寄加以篤睦㣥從糺綏宗族吉凶贍恤終始無渝行道之人孰不嗟尚肅宗以公有謀翼之勤乾元三年春三月贈魏州刺史寶應元年冬十月又贈太常卿廣德元年冬十月詔曰孝以立身可揚名於後代忠能事主故追榮而及親開府儀同三司兼御史大夫元帥都虞侯魯國公臧希讓亡父贈太常卿懷恪業茂勳賢地華簪紱佩忠信而行已包禮樂以資身守節安卑幽貞自適養蒙全正聲利不營雖與善無徵促齡悲於逝晷而積善垂祐餘慶光於後昆故得業濟艱難功參締構出有藩條之寄入多爪牙之任位以德遷禮宜加等父由子貴贈合超倫宜登八座之榮式慰九原之路又贈工部尚書裦異之典於斯為盛臧氏自驃驍而下世以材雄朔陲尚書既還特以功懋當代兄弟子姪勳賢間出自天寶距開元乘朱輪而拖珪組數百人迨於今茲繁衍彌熾綰軍州而握兵要者相望國都有後之慶固殊異於他族者矣真卿早歲與公兄子謙為田蘇之游敦伯仲之契晚從大夫之後每接常寮之歡故公之世家竊備聞見敢述遺烈將無媿辭銘曰魯史裦者臧孫有之陳魚則諫納鼎以規歿貴言立時稱聖為仁昭典墳知叶蓍龜世濟忠肅道光羽儀以至夫公英明雄毅鶚視騰彩龍驤作氣鋒淬霜稜妙窮金匱謀猷泉寫翰墨風駛儒勇是兼勳庸以位介馳戎馬猛奮虓虎絕漠援孤連兵戰苦萬虜鳴鏑紛紛如雨一身抗詞諤諤連柱精貫霜日氣雄鉦鼓狄人義激僕固誠全眇漫窮裔隨降幾千野靜沙雪風恬塞煙我騎如雲我旗連天牧無南向凱有北旋天子休之命侯開國謂福而壽康衢騁力奚命之邅幽扃是即十城玉折萬里鵬息陣雲蒼蒼日暮無色令人趨奉天眷孔明九原不作八座哀榮勇列徽範芳時懿名里成冠葢族茂簪纓萬古千祀瞻言涕零昔宗周之中興也時則有若方叔召虎總師干肇敏之業南威蠻荊東截淮浦以左右宣王詩人歌之列在風雅我皇唐之反正也時則有若臨淮汾陽秉文武忠義之姿廓清河朔保乂王室翼戴三聖天下之人謂之李郭異代同德今古一時公諱光弼京兆萬年人也曾祖皇左威衞大將軍幽州經略軍副使府君諱令節祖鴻臚卿兼檀州刺史府君諱重英父雲麾將軍左領左羽林二軍大將軍朔方節度副使薊郡開國公贈幽州都督司空諱楷洛皆以英果沈勇累葉將邊憺威稜於幽碣公即薊國公之第四子也體渾元之正性秉宏毅之高躅天子純嘏生知禮度謨謀炳邃默識沖深傑出經武之才鬱為興王之佐故能東征北伐厭難康屯挺草昧不世之功允蒼生具瞻之望社稷威寶公之謂歟初天后萬歲中大將軍燕國公武楷固為國大將威震北陲有女曰今韓國太夫人才淑冠族嘗鑒之曰爾後必生公侯之子因擇薊公配焉後果生公公年六歲嘗撫鹿而遊薊公視而誨之曰兒勿更爾公振手而起遂絕不為童戲未冠以將門子工於騎射能讀左氏春秋兼該太史公班固之學開元中起家左衞左郎將歷豐夏二都督府長史尋遷別駕加朝散大夫丁父憂以毀聞終喪不入妻室太夫人高明整肅有慈有威公下氣怡聲承順而每竭其力雖巳官達小不如意猶加譙讓之責故能濟其勳業天寶二年拜寧朔郡太守四載加左清道率兼安北都護仍充朔方行軍都虞侯五載充王忠嗣河西節度兵馬使加游騎將軍守右領軍賜紫金魚袋仍充赤水軍使八月襲封薊郡開國公八載遷右金吾衞將軍充節度副使以破吐蕃及招討吐谷渾加雲麾將軍左武衞大將軍十一載拜單于副都護十三載為安思順朔方節度兵馬使思順慕公信義請為婚姻公辭不獲免遂託疾罷官西平王哥舒翰聞而韙之奏歸京師遂守道屏居杜絕人事十四載冬十一月安祿山反范陽天下驛騷朝廷旰食聿求虓谷闞之將爰統鷹揚之師明年春正月起公為銀青光祿大夫鴻臚卿兼雲中郡太守攝御史中丞持節充河東節度支度營田副大使知節度事仍充大同軍使二月拜攝御史大夫魏郡太守充河北道採訪使俄除范陽郡大都督府長史充范陽節度使初公以朔方馬步八千人出土門其月既望收常山郡前是太守顏杲卿臮長史袁履謙殺祿山土門使李欽湊擒其心腹高邈何千年屬太原尹王承業不出救兵杲卿履謙為史思明所陷戰士死者跆藉於滹沲之上公親以衣袂拂去其口上沙塵因慟哭以祭之分遣恤其家屬城中莫不感激一心史思明正圍饒陽馳來拒戰公屢摧陷之詔拜公兼御史大夫俾今尚書令汾陽王郭公子儀悉朔方之衆與公合勢南收趙郡又敗之於沙河夏六月戰於嘉山大敗之斬獲萬計思明露髮跣足奔於博陵窮蹙無計歸節於祿山祿山大恐逆徒幾潰屬潼關不守肅宗理兵於靈武盡追朔方之師加公太原尹公以麾下及景城河間之卒數千人至秋八月拜戶部尚書同中書門下平章事史思明既有河北之地與蔡希德悉衆來攻累月不剋而退公自賊逼城於東南角張帳次居止竟不省視妻子每過府門未嘗回顧是後決遣事務信宿方歸至德二載拜司徒冬十二月十五日肅宗既還京師策勳換司空兼兵部尚書封鄭國公食實封八百戶公弟光進亦以懋功同制封拜乾元元年八月拜侍中其年冬十月與九節度圍安慶緒於相州明年春三月史思明至滏陽屢絕我糧道衆咸請公簡精銳以擊之交鋒竟日思明奔北於百里之外公反斾而歸烟塵亘天諸將皆以為賊軍大至遂南渡黃河公至則無見矣迺歸於太原是年夏五月除范陽節度使尋代汾陽王為朔方節度使秋八月充天下兵馬副元帥以數千騎東巡追兵馬使張用濟會於氾水用濟獨來上謁公數其罪而斬之因追都知兵馬使御史大夫僕固懷恩懷恩中夜馳赴魚貫而前再宿遄至秋毫不敢犯公趣河而東及滑州聞史思明已過河遂迎強旅以至東京移牒留守及官吏等悉皆迴避公獨與麾下趣河陽橋城賊先鋒巳下倒懸坂公至石橋命秉燭徐行一夜方達賊望之不敢近思明來至城下請見公公於城上謂之曰我三代無葬地一身必以死國家之患爾為逆虜我為王臣義不兩全我若不死於汝手汝必死於我手將士聞之無不激勵相持凡八月思明暴露不敢入東京乾元二年冬十月甲申賊將周贄悉河北之衆萃於河陽城北思明以河南之衆頓於河陽南城之南南北夾攻表裏受敵公設奇分銳襲其虛而大破贄軍臨陣擒其大將徐璜玉殺獲略盡贄僅以身免收軍資器械不可勝數思明心悸氣索烟火不舉者三日官軍大振初公以為戰者危事勝負難必每臨陣嘗貯伏突於靴中義不受辱至是登城西向拜舞因欷歔不自勝三軍見之無不淚下三年春正月遷太尉兼中書令其年改元上元冬十一月攻拔懷州擒其偽節度安太清二年春二月統僕固懷恩自河陽趨河清與史思明合戰於邙山屬風雨晦冥王師不利公收合餘軍屯於垣縣遂引過請罪懇讓太尉肅宗不能違之二月拜開府儀同三司中書令兼河中尹節度使夏五月十有一日復拜太尉兼侍中充河南副元帥都知河南淮南淮西山南東荊南五道節度行營事出鎮臨淮時史朝義乘邙山之捷圍逼申安等一十三州自領精騎圍李岑於宋州公之將吏皆兇懼議南保揚州公謂之曰臨淮城池卑陋不堪鎮遏不如徑赴彭城俟其東寇躡而追之賊可擒也遂趨徐州因召田神功宴慰與同寢宿以宋州之難告祖道郊外俾先飲以寵之分麾下隸於其將喬岫仍令兵馬使郝庭玉與岫犄角而擊之賊遂一戰而走使來告捷公已屈指俟報俄而吉語至焉今上登極寶應元年夏五月進封臨淮郡王廣德元年秋七月加實封三百戶通前後凡二千戶賜鐵券名藏太廟仍圖畫於凌烟閣冬十一月上在陝州以公兼東都留守制書未下久待命於徐州將赴東都屬疾痢增劇公知不起使使齎表奉辭廣德二年秋七月五日已亥薨於徐州之官舍初將吏等問以後事公曰吾久在軍中不得就養今為不孝子矣夫復何言因取已封布絹各三千匹錢三千貫鬻麥以分遺將士衆皆感痛不自勝及公云亡遂以其布為公製服庚申哀問至上都上痛悼之輟朝三日太夫人一慟而絕終夕方蘇上使開府魚朝恩就宅敦諭京兆尹第五琦監護喪事九月巳未追贈太保十一月闕二字太常議行諡曰武穆夫人嶭國夫人太原王氏臮長子太僕卿義忠並先公而逝次曰太府少卿太僕卿象殿中丞彙等皆保家克荷備聞詩禮無忝燕翼過庭之訓冬十一月廿七日庚申泣而咨於王母虔窆公於富平縣先塋之東禮也於戲公以吉甫文武之姿兼樊仲將明之德王國多難㣥胡搆紛藉朔方偏師之旅入井陘不測之地思明銼銳於恆定祿山絕望於江淮守太原而地道設奇保河陽而雲梯罔冀破周贄於溫沇擒太清於覃懷走史朝義叛渙之衆於梁宋救僕固瑒巳危之軍於瀛莫皆意出事外虜墜計中天下有闕二字之闕一字國家無贅旒之患此皆公之力也公兄遵直遵行仕至將軍臮弟光炎並不幸早世次曰光顏特進鴻臚卿皆以將略見稱時輩季曰光進開府儀同三司太子太保兼御史大夫渭北節度使涼國公清識表微沈謀絕衆剛亦不吐柔而能立與公並時仗鉞分閫闕二字淩霄翼聖既有戴天之功華原統師獨聞禁暴之德方當會同正至榮曜君親入侍黼帷峨二貂乎泰階之上歸聯綵服頓雙節於高堂之下斯歡未劇遺恨何居昔斛律丞相與弟幷州同務烈於北齊賀拔行臺與兄雍州亦宣力於西魏咸稱義烈各懋勳庸而風樹寂寞偏隅隘陿比之我族事則不侔真卿昔守平原困於兇羯繄公莅止獲保餘生束帶興居空想北平之禮操觚論撰敢墜中郎之辭銘曰羯胡猖狂俶擾皇綱降生臨淮佐我興王惟此臨淮萬夫之望爰初發迹罔或弗臧出入忠孝人倫激昂其心鐵石其行珪璋天寶末造河朔恇攘天子命公經營朔方沙河嘉山我伐用張思明歸節祿山震惶潼關勿帥醜虜其亡肅宗有命大鹵於襄應變如神兇徒靡亢介珪入覲台座用光俾公東征北國是皇長圍鄴下望入河陽擒斬渠魁霆擊龍驤淮濆鎮定徐土翺翔服田蠖屈料瑒鷹揚不有神筭疇戡暴強弟兄同時秉鉞煌煌方期凱旋雙映旗常晨趨法座夕慶高堂如何不辰愆此不祥素輀反葬白驥跼箱簫鼓悲鳴羽儀分行萬乘致祭千官送喪生榮死哀身歿名揚渭水川上壇山路旁唯餘豐碑突兀連岡往來必拜萬古沾裳昔周武以二公股肱王室然而允釐西土師保萬民者其惟召公乎漢室以二傅羽翼儲宮然而亮采東朝儀型百辟者其惟蕭傅乎則九德之師六行之傅親賢既美亦何代無其人哉隴西公才為國之垣翰位為天之喉舌德為朝之元老行為帝之信臣葢所謂宗室之間生士林之傑出者也公諱齊物字道用隴西成紀人自若水導其靈源而聖人作高邱峻其層構而才子生元元為宋帝之先興聖有勤王之舉盛德彌於百祀靈根固於千葉太祖景皇帝功高佐魏慶始封唐家崇八柱之勳地半三分之業亦猶殷人之祖契周室之宗文公即景皇帝之五代孫也鄭王亮之元孫淮安王神通之曾孫淮安王皇朝開府儀同三司尚書左僕射贈司空磐石開府介圭錫瑞成周之晉鄭西漢之勃平祖孝銳鹽州刺史父璟隴州司倉贈宏農太守並清白貽範仁賢繼軌連華公族濟美專城公稟乾剛之正性體坤順之中德爰自岐嶷特鍾美秀儼然王公之量鬱有台鼎之姿固巳超等夷而出㣥萃矣神龍初起家左右千牛備身歷尚輦直長許州司馬華州司兵時方振拔勢已飛騰此則江漢之濫觴華嵩之覆簣也丁太夫人憂公有至性毀瘠過禮扶杖於家哭不絕聲者累月倚廬於墓衣不解帶者終喪天子特降璽書就廬慰勉非常之澤近古未聞服闋授鴻臚丞除尚輦奉御遷北都軍器監事太原為一都之雄鎮軍器掌五庫之禁兵故乾沒之贓一徵百萬繕完之利費省巨億少尹嚴挺之連奏課最擢拜長安令陸海殷湊五方浩劇公以威禁暴以恕用刑邑里之人陶然大化遷將作少匠殿中少監太府少卿懷陝二州刺史雖漢之宗室不典三河而周之懿親先分二陝惟良之寄實在於公嘗以黃河經砥柱之艱有覆舟之患遂奏疏九派鑿三門屬役而堅冰大合興功而烈火潛熾不愆於素若有神焉人皆以公至誠之所感也又於石獲古銘曰平陸遂以名縣焉元宗異之賜貂裘一領絹三百匹特加銀青光祿大夫鴻臚卿并公之先隴州府君專城之贈上嘗賜公玉尺一詔曰謂之尺度可以裁成卿實多能故為此賜識者知公必將金玉王度代天之工豈惟從容九列而已拜河南尹仍水陸運使屬左相李公適之尚書裴公寬京兆尹韓公朝宗與公為飛語所中公遂貶竟陵郡太守時陸羽鴻漸隨師郡中說公下車召人吏告之曰官吏有簠簋不修者僧道有戒律不精者百姓有泛駕蹶弛者未至之前一無所問而今而後義不相容數年間一境丕變熙然若羲皇之代矣哀孤重老有隱逸好道者常騎馬於里巷之中親自恤問量移安康即日上道老幼遮擁不得發者三辰轉漢陽蘄春其政如一公虛中自牧接下愈恭與物盡推誠之心正身無氣燄之忌每上春行令大戶閱農輕裏餱糧重煩縣道化流江漢如時雨焉故郡歷數四課事第一去思之感人到於今稱之天寶末徵拜將作監重授鴻臚卿縱壑巨鱗還游舊浦淩風勁翮俄返故林時國忠包藏於內下闕竭誠奉主之謂忠率義忘躬之謂勇忠勇不犯則名登於明堂子仕教忠之謂義戰陣能勇之謂孝孝慈有裕則道存乎方冊兼此四者其惟清河公之族乎公諱阿義屈達干姓康氏柳城人其先世為北蕃十二姓之貴種曾祖頡利部落都督祖染可汗駙馬都知兵馬使父頡利發墨啜可汗衞衙官知部落都督皆有功烈稱於北陲公即衙官之子也正直忠鯁以信行聞為國人所敬長於謀略工騎射其弓十鈞年二十三為阿史那頡佚施默啜等九可汗宰相秉心顓一立言無二不吐剛以茹柔必蹈道而履義可汗每有過失未嘗不極言切諫蕃落中重焉以比國家之丞相宋璟初默啜弟拔悉密時勤嘗擎藥弒可汗公竊而藏之密持示默啜默啜大怒將誅之公以為請但令歸於部落默啜知公至忠繇是益加親信同列四人莫與公比其後公以孤直屢見疑譖遂請退歸可汗察公非罪尋復追為宰相先是毗伽可汗小殺為其大臣梅錄啜所毒小殺覺之盡滅其黨既卒國人立其子伊然可汗無何病卒又立其弟登利可汗華言登利猶果報也其母暾欲谷之女與其小臣飫斯達干預國政登利從叔父因左殺右殺東西分掌其兵馬登利與其母誘斬西殺盡并其衆左殺懼及乃攻殺登利自立為烏蘇米施可汗拔悉密擊敗之脫身遁走國中大亂天寶元年公與四男及西殺妻子默啜之孫勃德支特勒毗伽可汗女大洛公主伊然可汗小妻余塞匐登利可汗女余燭公主及阿布思阿史德等部落五千餘帳幷駝馬羊牛二十餘萬款塞歸朝朔方節度使王忠嗣具以上聞秋八月至京師元宗俾先謁太廟仍於殿庭引見御花萼樓以宴之仍賦詩用紀其事拜公左威衞中郎將屬范陽節度使安祿山潛懷異圖庶為已用密奏公充部落都督仍為其先鋒使公既不得已僶俛從之四載以破契丹功遷右威衞將軍俄拜范陽經略副使五載又破契丹功居多拜左武衞大將軍仍充節度副使元宗嘉之璽書慰勉盈溢篋笥十四載冬十一月九日甲子安祿山反范陽公以天子有命陷身凶逆舉家見質自拔莫由既至東歸公泣血籲天次於夢寐欲與諸子逃歸國家為賊邢州刺史康節所告遂被收繫傔奏被誅者二十餘人公之四子各奔於外賊恐衆情不安貰之而後出至德二載闔門二百餘口被安慶緒脅至安陽屬今上為天下兵馬元帥統今尚書令汾陽王郭子儀朔方之師諸節度回紇之衆東收二京公率四子及孫姪等十餘人冒死南奔至汲郡為從者所告家人殲焉二子歿野波英俊挺身行前二子屈須彌施英玉持滿殿後歿野波妻阿史那氏為公控馬登於西山至高平界遇賊蔡希德以精騎三百遮路邀擊歿野波英俊策馬奔之殺四十餘人生擒四人冬十有一月七日投今上行營至焉先帝聞而嘉之欲以開府儀同三司處公仍加實封公固辭乃受因以為金吾大將軍加特進增封清河郡開國公食邑三百戶策勳闕十二字衞大將軍闕二字卿闕三字射闕四字開府儀同三司太常卿殿前衙前射生兵馬俄加上柱國姑臧縣開國子歿野波雲麾將軍左金吾衞大將軍上柱國射生散騎常侍驃騎大將軍左武衞大將軍兼鴻臚卿上柱國殿前射生使清河郡開國公英俊等官秩各有差因留公及屈須彌施英玉供奉射生以歿野波英俊勇冠三軍並令東隨故太尉李光弼於太原後鄴郡瓦窑陣官軍與安慶緒相逼王思禮為其所敗賊勢既盛太尉與思禮相顧氣索歿野波英俊勃然奮怒遂直抵薄河當鋒擊之殺獲二千餘人賊衆方退太尉諸公覩而駭之賞雜綵百匹並以轉分麾下一無所納三軍欣羨焉歿野波居常謙謹臨事勇銳戰則先鋒前無強敵捉生遊奕所向必摧九節度之圍安陽也史思明悉衆來救歿野波以十五騎過河逆擊之并馬刺倒者數人生擒數十人後擊懷州思明又自來救勿目爽之際侵軼柴籬歿野波領甲騎三十禦之賊軍三千人一時摧敗真卿之棄平原也歿野波為賊騎將緩策不追及聞渡河然始奔躡是以得脫於難平原人至今稱之英俊瞪視眈眈姿氣雄果發勁矢持大槍嶷然萬衆之中左右馳突無不辟易而退嘗隨太尉討思明於河陽賊驍騎萬餘於中闡城索鬬將莫敢應者英俊挺身奔擊之應槍落者二十餘人英俊被槍刺頰貫喉而出擺首而去之猶殺二人而還太尉壯焉遂以從父兄子妻之故天下之言勇者以歿野波英俊兄弟為稱首廣德元年上幸陝州公之諸子皆當扈從公以體貌王褱碩難於舉動方與之死訣歿野波妻為公介馬扶奔華州公慮不免謂左右曰我若為賊所得無累我兒子乎汝曹何不殺我衆人感懼叫然皆哭遂竭力舁公至於行在上深嗟賞之方極尊榮以終宴喜上天不惠以二年青龍甲辰冬十有一月二十日甲寅感肺疾薨於上都勝業坊之私第春秋七十有五親事左右莫不剺面截耳以哭初淩霄之難公實援立滻水之屯公親總統上之反正父子從焉帝疇厥功遂有開府儀同三司兼夏州都督之贈夫人清河郡太夫人交河石氏左衞中郎將珍之孫左金吾衞大將軍三奴之女溫敏淑惠柔明端雅有女師母儀之德克懋於家不幸遘疾以天寶十五載春三月八日先公而薨永泰元年春二月十日壬申與公合祔於萬年縣之長樂原禮也嗚呼公以沈果之姿抗英威之志降精昴宿炳粹天街忠肅表於生知義勇形於造次屬國家多難淪胥以痡壯一心而來事我君貫四時而不改柯葉義方懇到相攜於契闊之中臣節激昂三見於危亡之際天子感焉既受腹心之託禁旅資焉俱列爪牙之地勳庸克茂聲問攸歸叢綵衣於玉帳之前羅五戟於一門之內不其盛矣昔蕭相國舉宗佐命金日磾七葉珥貂望古儔今可謂同德其孤等窮人孺慕靡所寘哀聿求不腆之辭庶播無疆之美銘曰北方之強歟十有二姓強哉矯部落之雄者康執兵柄緬乎眇特進誕生兮實登邦政德不擾暾女滅國兮烏蘇不竟慍㣥小三濱九死兮舉族致命丹心皦一門萬石兮彰厥誠敬皇恩暸生為忠臣兮後有餘慶其不夭家有孝子兮嚴親翊聖王之爪乃立豐碑兮百代遺詠鴻名表忠孝之際兮於斯為盛遠圖窅
