  text: 全唐文欽定全唐文卷九百五十四
  hash: sha256:02814ee8915d9da7cc6a30db17c110fd01e10b1c66b144555aeb6055277966df
  markers:
  - {type: head, offset: 14, content: 劉珣, id: KR4h0168_NFKB_954-h1, level: 1}
body:
  text: 昔我先王肇修人紀乃建邦國以立都鄙或處沃而稱奧或宅中而為美周分景臺之測用會陰陽之擬漢據鶉首之分實為山河之理故右扶風而左馮翊距涇川而浮渭水潼函襟帶酆鄠巍峨下則崇岡於地險上乃取範於天河城雉周環而斗設宮觀駢互而星羅轉曲江於前岸俯冀闕於中波車馬喧豗渾泒聲之交錯風塵日夕與津霧而相和蓋聖人垂則必天之象王者都會大洽斯享運璇衡以齊玉燭法露盤以崇金掌四方輻湊萬國攸仰風雲以之吸合日月於焉澄朗苟禎祥而應會則乾元之攸往何必河出圖洛出書然後為卜食之華壤者也懿哉作者元后中興後嗣同天之道順人之意橫橋乃牽牛之設素滻則飲龍之謂晚光淡灩接鳳苑之祥煙曉色清明連斗城之佳氣樓臺傍而津涯隱伏鐘鼓作而波濤汩沸不覩斯焉以取斯寧復知王者之貴不察所由於所以又安明坎德之靈而主乎渭徒觀其遠界汧隴橫截秦川沃長安之霞日浮京兆之雲天都邑傍於左右舟楫來而泝沿上林之煙開霧卷建章之戶萬門千朝而望兮蓬瀛若留乎岸側夕而臨也河漢宛在乎目前是以婁敬云被山帶河四塞為固豈不謂天道無親惟德是輔祥符不及瑞圖斯遇以登仁壽之理用表坤靈之喻請謂東周安處先生之徒與須知西都翰林主人之作賦其始穿竹田以行崎嶇詰曲十餘里而後至草木幽異猱猿下來空谷無人水流花開寺門東向趾古構新茅茨接於碧瓦畫牆見乎苔侵青山淡乎吾慮潭影空乎人心噫豫何來之晚也寺之東南山氣森肅泉名虎跑石泓萬斛色若漬藍聲如戛王下注三坎雷奔雪觸懸崖赴壑而不危附川到海而氣足嗚呼奇哉古人之文流出肝肺混混而不竭者甚有似於斯而今也不在於僕舊聞有昭明太子此曾養晦讀書於此安得起九原而與之言哉忽然天風吹衣林木清嘯仙邪鬼邪萬竅叫邪客有五人者攜壺促豫披雲上征求所謂讀書臺而弔之立孤峰以展眺探古洞而搜異拂蘚文之半封悵石章之滅既雲冉冉以間飛松颾颾而晴吹驚怪木之如龍悅鳥語之禪味悟我生之無始卑佛書之揭諦假使昭明之猶在將謂此語之不易彼既與未死而俱往吾故乘元化而再至臺之上兮多月明臺之下兮古道不可行茅山青兮練湖平美人不復兮我心如縈遂與客躡雲根緣鳥道踞磐石而坐焉煙霞極目其平如席殘陽一片萬屋露脊參蒼間赭如畫如織閲大塊之文章歎斯遊之奇迹己而悲風淒其四起暝色合乎寒城客待豫而俱返別遣謝乎山靈以功受賞繼統承嗣父不食於周粟子罕取於吾餘乙家尚隱淪素行貧賤固知鶴鳴子和配幽貞以就間安得孤侵父名苟僥幸而求庇傳業且違於父志請蔭寧沐於君恩昔傲天書不脫薜蘿之服今從地勢難依桃李之陰所由不許誠哉此見崇山作鎮峨峨秀絶暑氣潛蒸夏雲孤泄其稍進也間古木以深沈其上升也鏤太陽而明滅其質散漫其光氛氳抱翠石而留影入明水以寫文粲粲爛爛摩太虛而歷漢郁郁紛紛從皓景而橫汾美其任運高下與時消息似大道之無心同達人之有識時康則應伴雨足於一旬主聖乃浮變歌聲於五色俄頃萬里不資天地之功膚寸九霄豈假陰陽之力爾乃舍精飄揚逐吹低舉周遊散適不常其所出塞邐迤暮為陰山之陳入夢嬋娟朝是陽臺之女別有孤陋沉淪文章日新既非淩雲之賦未為天子之臣聖教因親人事有禮春秋祭祀以時思之眷言於甲慎終追遠祫父志高展於孝敬將序昭穆以列尊卑神明始交哀樂兼半祝史陳信曾無愧詞彼或何為忽乎興訟然則五廟諸侯大夫此之等差非無典誥儻貴通五爵甲稱固則有憑如位列萬人或告不宜無當請責名品方正刑書伊祁氏之有天下也十日並出或明或晦不唯差乎歷象抑亦紊乎覆載留一陽永照俾九日潛退羿操弓而進挾矢而前曰彼赫赫帛丿糸帛丿糸如珠之連爍我下土暨我上元今當盡臣術之微妙協君德之昭宣於是和容體正審固心虔張六鈞之在手期九烏之應弦弓既無雙矢惟用九一發而弦上霆激再發而空中雷吼三發而輪震乾坤四發而輝流星斗五發六發而煜煜霞散七發八發而離離電走九矢皆中訝妖氛之忽無一曜高懸望邪明而何有蓋帝所惡天所嫌始騰淩而翕赩倏而殄殲貫忘歸而自消難彰變化落園陵而盡死永契沉潛瑞景將明彤弓尚彀百辟仰觀乎黃道孤光下燭乎清晝莫不由藝之就神之授混燭滅而平權衡晷運正而分刻漏然後職羲和之任司掌御之圖位寅賓於東極宅昧谷於西嵎故得萬國謳歌迥覩重輪之日九天寥亮長飛三足之烏則知道潛會而發必中神自通而何再控鏡四海而弓罷張亘萬古而誰敢當設使堯德不聖羿技不臧則蒼蒼茫茫終亂紀綱又安得廓六合定三光故曰天無二日民無二王善本身修名由道長惟君子之所履遇同人而遂往不修其正誡邪枉於出門既叶於心視野郊於指掌守柔以處亦何後而何先秉健而行諒無偏而無黨蓋以居謙不躁應上潛通欲垂文於天下須立志於胸中雲合霧開孰無機於豹變聲馳響答皆有意於雷同必使量統含宏義資探討包利貞而共濟顧言行而相保情田波注將符若水之時德宇馨香用法如蘭之道乃言六二是乘柔之主九五為行健之資乘乎柔而何剛敢奪行乎健而何往不之況能辨方知類視險如夷念同氣以遵彼實忘言而在茲於以審吉凶較能不始居中而體正終處上而為首理方求友喻伐木以攸宜義在同心於斷金而誰有所期利比浮雲悠然莫分光於身者曰道聲於教者曰文故得退無失位進得其㣥將果行以育德候移忠而事君則知福應無他元亨由已理契和順心惟知止不然何以風雲偶會咸為得路之人悔吝不生盡似同舟之子別有勵志彌久勞謙已多既考之於六位亦化之於四科且如今日之進也道如之何吾嘗文戰將北羇遊極西覩吳嶽之孤峭計㣥山之莫齊由是邈崖谷遂攀躋入雲靄出塵泥既臻頂上用視天倪雁塞殊小峩眉甚低蓋以氣壯神扶雄標國祚揖白帝兮不見抱皇城而自固嵐光擁翠拓開霄漢之心岫色橫空鎖斷戎夷之路嵽嵲旁竦岧嶢上干碧草春合清風夏寒遙瞻魏闕迥立煙巒疑超洞府謂在天壇中隱深溪日月之光不到外連層阜龍蛇之勢斯蟠當其區宇正寧氛埃初見覽造化之宏制識乾坤之設險汧水縈盈而線走隴山峛崺而螺掩西窺劍閣霜地表之千鐔東瞰蓬萊黛波間之數點遐徵衆嶽式並山隆崇彼皆受封於百代此獨不視於三公森筍立以削成寧慙太華黯雲凝而化出豈讓維嵩況乎萬仞淩虛千里倒影虎踞華裔鯨吞虜境謺巘攢壁回巖列屏捍絶域以增隘固中原之甚永直使以禮賓九有仁服八荒臂賢以為輔弼宅道以作封疆亦須假我嚴衛憑我巨防邇藩垣於都邑遠隔閡於氐羌吾唐重其功崇其鎮爰升成德之號用補極天之峻小儒是以竟日興感抽毫賦韻登詠畢兮嶔岑指長安而後進詹何以迹繫魚舟心遊水府樂垂釣以放志存大川而為主是故傍遙汀依極浦下纖鈎而任運念紅鱗而必取原夫綸抽獨繭鈎屈芒針綴香餌半粒裊荊篠數尋泛萬頃之濶投百丈之深不爭之以手而爭之以心蓋以釣於魚也無情魚於釣也奚懼斯不中而有中信難遇而終遇自得鈎深之旨誰明引重之故觀其躍濤戲瀨掉尾揚鰭視吾釣而非釣觸吾絲而非絲果審之以無物遂吞之而不疑所以入其口挂其頤據洪津而曾不暫驚靜宜剋也恐巨力而難乎連制動心隨之欲舉未舉相去幾所牽之默計於輕重縱之潛知其出處且以弱制強者道之宏以剛鬬柔者死之徵不然則焉得綸甚微而不斷魚至大而不勝勢窮則龜龍莫之衛護氣作乃波瀾為之沸騰我體正而方逸爾力盡而何能此達守柔彼休用壯沈鈎才出於水面斃質已充於舟上圖大且異於任公識時固同於呂望設使專情待物切有於無則手也縱操於釣餌魚也終樂於江湖吾常不操不撓不馳不趨垂竿於仁義之域鼓楫於道德之衢然後憐玉兔惜金烏當盡釣於人間之盛事豈獨盈舟而已乎天子握乾符之六歲末秩臣羽皇客於南裔水浮溟波陸上青山或時晝短宿在林壑繇是嵐溪煙嶠之勝得湞陽之石室焉兩崖卷束勢合如屋孱顏百間開待朝旭峭然嵐壁宛矣仙躅羽容霓色霏繞瑤局加以上戴霄峰中流晴溪碧瀾之下寸寸秋色若夫崆洞見月於半夜翠竇有雲於朝日乳枝凝斷而磬落松籟疏風而琴續不書其奇可知矣於戲斯室斯溪也與敻古同出野夫樵子無日不到冠劍百族代誰知之使靈室煙霞寂寞無主龜山挹玉堂之會瑤池宴王母之觴彼何人邪秋九月有釋氏子智捷聞於聚落持律第一探得是室亟言於上谷侯君侯君名著字伯昭德門之裔也宰於湞陽蟹筐范緌之政行焉事歸條貫官有餘日初與三四賓客遊焉既升於室皆踞盤石注目峭絶壑形渠渠忽驚呀豁危起騰立背倚青壁久而不寧掬溪飲水稍稍神定噫乎古之王文考何平叔不值斯室也向使值之必為之賦廣言磅礡洞蕩垂文雄傑則靈光景福不得獨豪矣大凡人間局束難有間日瞻彼石室嗣豫之到者誰邪上谷交親同辭舊山者京兆韋君長文時為南郡曹掾手持密轄杳在蓮府緬昔泉石俱為逸人張琴寫古以彈操語默不歌而飲酒簪纓軒冕浮雲也今日煙霞林壑思同甚難故礱室琢壁顧余以到難命篇上以俟㣥仙之降次將遲京兆之遊些京兆韋長文上谷侯著河南史傑清河崔存慶存範蘭陵蕭及上谷侯從直清河張君奭張甫釋澄雅智捷明則成文後一月琢石又一月儒釋侶十四人同遊立之乙在夢蘭生逢集蓼岐嶷繼體戀弓冶之餘徽詩禮無聞想山河之舊業望九原而不作松石增哀思五等之崇班茅封闕嗣同夫嵇紹未有識於巨源類彼叔敖亦無言於楚相當今封比干墓式商容閭豈可使諸葛之苗隨時歇滅樂毅之後沒代湮淪況乎血屬詳明宜存必復之始手文昭著須傳幹父之能討以前聞義何殊於仲子酌其故事迹頗類於周文則知奠藻獻誠禮不乖於大柄析薪克荷事可優於小同禹制初闢周疆肇建蕭收漢閣益掌虞邦井田有差徑遂無紊順陽和以肅事映秋霜以畢力四時得業萬邦作一作永孚豈容吉泰愚駑致心誣妄析言興盜亂名改作革公田以入己自犯嚴科移私籍以安居不知天憲往聞匡子今覩吉生幸付司刑以議其罪問夫貿遷化居資貨以通守位聚人理財為用故龜貝贍於夏殷金幣富於周漢頃國弗崇侈而府無盈儲賦不加厚而黎庶彌貧實由貨重物輕以臻斯弊若有單子推權之宜賈生斂散之術其具陳之對臣聞哲王之統俗也陳貨洪範通有無之用取市噬嗑致交易之所至乎九府立其法資幣諒其宜蓋理本救人而輕重隨代故周景鑄金穆公規其實漢文造幣梁傅議其違雖貫朽費濫而市非物輕粱肉不匱而家非貨重何者淳朴既散澆偽成俗惰農奪其歲功徇利昧其日用所以負販盈廛分穀布野崇朝思餐則物不得貴爭利因阜則貨不得賤故弋綈雖御國之所先蒸人乃乂邦之攸本故賈誼慷慨陳力農之戒仲舒殷勤明重穀之説今宜思五土之宜勤三時之務教養殖人常課田畯重遊適之賦輕力穡之役師李悝於魏邦式蔡癸於漢代用能遺穗委畝紅粟露積垂拱巖廊擊壤衢巷詠歌升平豈不盛歟臣學不師古識昧政化勉酬枉問敢獻瞽言死生有命男女大綱於其不天可以往唁惟乙之妹華而無實始窈窕以適人桃夭斯美俄惸獨以處室荼毒何深生無託於偕老死奄赴於同穴言念夫族曾何孑遺嗟兮鄰人復已湮滅乙以骨肉之戚匍匐而來據親則可奔喪執義不合襄事況臨窀穸復引銘旌諒天窮之人請里尹為主決曹雖詰於禮無違風響清韻錦明色絲閲攢花之麗綵當偃草之驚時拂褒而起翻光益滋始暉暉之展也俄習習以動之且爛兮則舒爰假不周之力及斐然而異誠同絶妙之詞爾其黼黻宏開浸淫遠度蘊鳴梭之巧思比擲地之麗賦暉光亂起如蕩漾之波翻彩狀間飄若逶迤之霞布觀夫引曳交映彰施煥盈當大塊之初發遇回文之已成奪雲彩耀日晶激飀飀而愈疾動獵獵而增明向水而搖似挂帆之欲去當軒而列謂施障之將行況復入座輕泠橫空掣曳當蜀郡之新濯擬潘文而更麗絪縕乍舉時牽素手之中煦嫗潛來遠自青蘋之際晚映花戶暗臨洞房簸煙暉之照灼騰藻豔而飄揚裊輕吹鑠流光扇涵和而回觸攄炳麗而前當五色相宣喻體物之詞彩八風迭起駭織文之鳥章且蕭颯初戾紅明正舒照瑣窗而粲矣煥雲幄以暉如彩曜克宣諒本因於翦飾精華可玩終亦藉其吹噓是知修詞者莫貴其精微製錦者莫尚其綺靡善染翰之瑰麗狀臨風之旖旎懿哉文之義也諒發明之在此美玉於斯兮韞櫝未揚閟其質韞其光寧處幽而遂久將發蒙之可望貞必俟時奚甘其隱伏寶實稀代安得而蓋藏勿謂愛之而不見願使暗然而後彰比事詎同乎剖蚌契已可侔乎釣璜其始也不琢而成效珍可喜絢彩旁射寒煙溢起辭礦璞而山輝乍無受緘縢而虹氣未已同被褐之內朗類守墨之中美君方固扃鐍彼孰得而沽諸君儻力提必同茲而出矣於是至寶將啓良工肯來目力深昧心源獨裁念孤貞之特達聊徙倚以徘徊將發蒙之是思玉不得不發苟開物以為務櫝不得不開既而真質騰精孤光盈手貞非受采明不容垢希成器而入用因此德而見厚荷拂拭於惟新忘沈淪之永久溫其朗潤動有清輝知照廡而識之者異將抵鵲而用之者非用如之何規模之下為環而循理不盡製佩而流韻相借在昔退藏於密何敢稱珍幸今顧盼生光終希善價乃知良玉之比也重出櫝之義也深雖寓言於彼而察人在今欲使出處有節貞方其心無毀櫝之嗟誠非肆志起生芻之詠寧懼陸沈則有報匪瓊玖器慙瑚璉儻雕琢之見嘉庶英華之獨善凡諸嶽瀆年則一祭祭當何日五郊迎氣之辰祀用何官千里宣風之職只如無閭峻嶠作鎮邊方營州刺史須崇望秩自合禺若觀盥率由舊章豈容祀匪其時身不預祭自貽厥咎何逭其行暌奠祭之規坐招法司之議準法科附仍下營州死棄水中人告之惟甲與景殊途異致或行因負甕頗類漢陰之賓或家有役僮不讓江陵之樹既而甕被蕩倒奴則云殂鑿坯無返於在甄丹籍忽辭於白日原其情理核以根由責之以陪未盡其意棄之以水何太不仁但法貴從寬事或通誤必也康莊廣陌甲負乙乘矜其輕肥故此行突將徵其價尚或未懲如其狹路稠人風昏日暮邂逅而損知欲何傷若取全陪恐乖設律至如畜生之罵猶慮其慙靦犬馬之微不棄其帷蓋藏諸廣柳之內託義彌深葬以江魚之腹在情焉取既為人告不可無辜請施懲罰輕科以符捨事誅意封襲大典存乎嫡嗣公侯榮胄貽厥後昆陳乙以代先崇班天賜重爵嗣業相繼家聲遠傳不好榮身克遵於謙讓欲求封弟乃致於佯狂祖業斯廣友于多稱法雖有乖恆典事則不爽人情昔元成見氶非妨入仕今陳甲為襲難可置刑
