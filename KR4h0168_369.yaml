body:
  text: 四鎮北庭既治涇州無險要可守隴山高峻南連秦嶺北抵大河今國家西境盡潘原而吐蕃戍摧沙堡原州居其中間當隴山之口其西皆監牧故地草肥水美平涼在其東獨耕一縣可給軍食故壘尚存吐蕃棄而不居每歲夏吐蕃畜牧青海去塞甚遠若乘間築之二旬可畢移京西軍戍原州移郭子儀戍涇州為之根本分兵守石門木峽漸開隴右進達安西據吐蕃腹心則朝廷可高枕無憂矣自古建大功者未嘗不用天因地故高祖保關中光武據河內深根固本以制天下臣等考天地之心本聖人之意驗古往之事切當今之務則莫若建河中為都隸陝虢晉絳汾潞儀隰慈石等十城為藩衛長安去中都三百里順流而東邑居相望有羊腸底柱之險濁河孟門之限以轘轅為襟帶與關中為表裏劉敬所謂扼天下之吭而撫其背即此之謂推是而言則建中都將欲固長安非欲外之也將欲安成周非欲捨之也將欲外制蠻夷非欲懼之也將欲定天下非欲弱之也河中之地左右王都黃河北來太華南倚總水陸之形勢壯關河之氣色每歲白露既降涼風已高陛下據金城湯池內綏華夏登信臣驍將外馭戎狄出於仲秋還於農隙有漕運泛舟之便無登高履塗之虞不傷財不害人得養威而時狩如此則國有保安之所家無係虜之憂矣維永泰元年十有二月甲子開府儀同三司尚書右僕射兼御史大夫劒南節度支度營田觀察使成都尹定襄王薨於靈池兵故也夫懿文德者非謂禮君臣正上下其謂經綸大難乎鑠武功者非謂鞠師旅威戎夷其謂翼贊中興乎公名英乂字元武贈伊州刺史旰公之烈祖也隴右節度攝御史中丞贈太子太傅知運公之皇考也産雲赤亭樹勳青海世傳良將載在國史公河嶽之粹將相之器學劒輕短後曼纓讀書重金版玉匱天寶二載方筮仕轅門纍授左武衛大將軍節度涼國公見之曰代我節制者必此子也其後十年纍代涼公為節度矣祿山之亂中原也二聖偽遊三秦賊據汧岐重鎮非公不可制授公秦州都督兼御史中丞隴右採訪使未幾賊將高嵩長驅幽燕深入汧隴公外申郊勞內設庭宴饗未屬厭兵已合圍賊黨數千應時翦滅繇是虜鏑不鳴於隴外皇輿始都於雍上至德二年詔公為鳳翔太守轉西平太守加隴右節度兼御史大夫吐蕃之逼西河也諸寇以堅甲乘城我以偏師遇敵勝在於戰利當用奇選驍騎以襲虛張疑兵以應鋭前衝未及於隴島後徑已覆於梟巢邊捷晝至虜圍夜潰進封西河郡公思明之陷成周也南入陳蔡詔公兼御史大夫統淮南節鉞東捍陝虢詔公兼陝州刺史主關外旌麾寶應之歲上乘龍躍之運寵虎臣之績進戶部尚書加開府儀同三司仍總戎職朝義之走河北也公雷震勇略風摶徑騎驅熊虎之師開龍蛇之陳一戰而穀水破再戰而邙山拔十年逋寇萬里如掃朝廷壯之詔領東京留守又兼河南尹俄拜尚書右僕射封定襄王加實封三百戶永泰元年兼集賢待制夏五月天子以劍門巨鎮推擇攸難歷選朝廷惟公是授即日加成都尹東西兩川節度兼御史大夫僕射如故是時也入承日月之光出擁風雲之氣以孫吳為老生以韓彭為兒戲千里為之震動百蠻為之懾畏秋七月西蕃犯境公戎馬驟捷軍人擅還裨將懼誅乘間謀叛公擐甲擊鼓單車入深引西山之數騎望東川之外援短兵未接追寇橫及雖刃以通中而氣猶激射疆吏乘遽聞乎京師上投袂而驚仍加悼惜有以見聖主之深仁重武臣之壯節不問輿尸之過爰旌折首之功以大歷三年正月二十七日詔葬於武公之先塋夫人鄭國夫人龎氏禮歸敬仲誡及伯宗生則六珈受寵歿則九原同祔嗣子將作少監嘉珍憤積嘗膽哀廠田坴泣血飾櫬蜀門歸魂秦隴力樹祁連之冢思崇峴上之碣以載職在史臣業專文律琢石旌美俾奮大猷其辭曰否遘天地運鍾雲雷煜煜定襄與時而來躬赴兵難志清國災推轂隴西士卒雲屯擁旄陝東㣥寇雷奔五開幕府七鑿凶門以寡擊衆以亡易存六踐柏臺南憲是張再登八座右揆有光同盟錫土異姓封王勳崇業大位重名揚召對蓬萊作鎮梁益秋霜發令春雨流澤望在股肱變生肘腋南圍既合短兵未進單騎驟奔㣥凶競振血殷朱輪首碎白刃魂歸萬里悲慟三軍疏松蔽日孤冢參雲身歿冤氣名高戰勳王者纂大業以拯時難君子合天符以成聖功在殷之傅説周之申甫漢之博陸其類也臨大事首大謀君子正位邦國是憲其道也琬圭火龍元社朱戶其祿也古之人遇其時行其道濟其業受其祿嗚呼裴公斯近之矣公諱冕字章甫河東大族著於系譜曾祖澧州刺史諱懷感祖滑州司馬諱陟考長安丞贈司空諱紀自司空而上世纍清德公全朴以受其形器混冥以養其精和隤然大不為纍方駕前古其禮容誠敬可陳於蠻貊施於鬼神宜乎吉凶變幽而偶聖君精義致用而審天道天寶十四載皇上避狄於華陽肅宗偽遊於幽朔公以御史中丞奉詔翼贊元良釋位濟河會於靈武與侯伯卿士官師亞旅考大德除殘之運唱靈祇億兆之心負金璽玉旒為人請命於西土維天意㣥謀是告而蒼生災害是懷於時册禮既畢公乃自左庶子拜中書侍郎平章事從時望也帝曰豫欲教熊羆食猰㺄公於是乎請搜於岐陽朝於酆宮以干鏚陳師以蠻夷誅暴公定大業運開中興帝曰豫欲端百揆詔典司乃命公為尚書左僕射於是乎綱理庶工四方來同左右始終十有三祀初自縣聯屬署監察御史嘗有姦蠧吏公按之時寵權臣之戚也黨其犯而請於公公竟正刑書不為勢屈時論以公有不可奪之節故肅然由是歷侍御史尚書郎者五其中以直遇坎牧蠻溪者二以時當任兼憲臺鎮梁益各一以勳封冀真食五百戶以秩開府儀同三司大歷四年冬十一月今上念伊尹之一德思孔光之再起詔復入相旬有二日兼河南江淮副元帥東都留守是月辛酉薨於長安年六十七翼日册贈太尉明年二月葬於京城南畢原詔京兆尹護喪事贈布八百段凶儀葬具俾出有司昔在天寶之季公嘗為御史大夫王鉷讒毀無何鉷弟銲坐大逆有詔庭辨而凶首詞引及鉷公自下列抗其矯誣朝廷謂之不黨其後程元振僭用威柄有道從虎賁公停車致詰面折及霤在黜無慍德仁遂行君子謂公誠盡於忠者在於禮外其身故臨難不惑一其守故當事則明磅礡乎死生之間逍遙乎晦明之境公嘗北使殊俗班命氊裘單于君長稽顙屈膝覩王商而知懼從魏絳而來服以言尚其直以動尚其順以成事尚其濟物以進退尚其得中孝弟愛敬格於天地惇信明義通於鬼神帝王得之以奉天時百官得之以修典憲佐命者二后歷事者三朝皤皤華皓為國元老執璧奉圭在君之堂生食邑土歿垂惠愛豈祿以為尊者其孤正授辭家老請志於石以代三鼎林鍾之義銘曰元精降靈建乎人極邈矣冀公順帝之式鴻造覆育大鈞埏埴業濟功成保和居直帝念髦碩二登輔翼為時養賢以及萬國昔在上帝降命元老以仗愷元以明至道唐歷中否亦命我公順人戴天戡黎伐共德謝星隕仁沈海竭大廈梁崩崇山玉折領袖前古綱緯來轍幢幢豐碑耿耿鴻烈永傳億祀遺芳不滅皇帝正位建元之二年巡狩至陝郊季冬旋軫鎬京乃春王正月臨前殿延㣥臣制詔太常卿衛公鴻漸研機味道國翰人師俾時不迷倚以為相史臣載與公同官西掖聯務中樞入則並金門躋玉堂出則偕車輿馳廣路好我不淺德公亦深逮於薨殂得入公之室睹公之奧節以危難而固義以顛沛而彰故得復公之道察公之行開而當名品物定辭觀公之辨政消煩解結逢機立斷試公之與物天樂失和猶陪行止彌留方殆嘗參藥禱名者世人之所重終不為夭適見公之不居死者有情之至哀賢於貴生益知公之能達古史之流美而不揚乃廢職書而或略亦近誣若然者則刊盛德於山阿藏茂勳於王府可也公帝堯之允家於京兆春秋末諸侯耗盡炎黃唐虞之苗裔鮮有存者范宣子猶廣稱世閥盛誇穆叔而經秦涉漢百王千載名公大人駢衡繼武元宗朝叔考暹門下侍郎平章事以清節居東府垂拱中大父慎行荊州長史以文武式南邦開元之際皇考鵬舉安州都督以大名涖淮浦公杜陵男子遼廓不羈性與道合旁通多可思挹溟海自涯皆返將窺語默杳然難究輒孩時人不屑下位歷揚州參軍華縣尉大理評事司直關內度支副使虛已而不疵於物存誠而受汙於俗天寶末將相交隙海內寒心家有襄陵之憂人懷崩角之懼公以為期死不勇必生非任莫肯念亂誰無父母於是始有濟難勤王拯溺定傾之意祿山果憑豺豕凌虐京畿鞏洛成隴荒崤函為障塞命信臣捽扼二華之險守河渭之隘以挫其鋒分河隴材官據南陽當宛葉以遏其勢朔方節度中書令汾陽王發緣邊利兵略雲中出井陘以制其後汾陽拔公為戎副倚公以幕畫公議無返顧計不旋踵戒器搜乘接食饋軍斯須決機間暇辦劇故佩鐸凶徒未鼓而破恆陽逆守先聲而屈時大兵深入後計在完敕公西歸本軍鎮撫喻告調發兵食保綏華戎會哥舒翰出師桃林以不計合戰既而從散約解形離勢沮六軍折北而莫濟上將授元而不歸強胡犯關長戟指闕元宗西巡巴蜀駐蹕槐里俾肅宗不從詔馬下受辭徵兵朔方東向問罪付以神器之重勗以興復之謀肅宗承命感咽北馳惶怖邠郊無館穀之犒安定絶薪芻之餼始誅二守物情尚疑衆才一旅邊郡猶驚遂踰平涼出蕭關直趣豐安阻河為固公乘疾西上奏謁於白草頓請借前箸以圖安危靈州四臨兵車之會長安新破人心正搖姦豪竊窺雜種圜目衆情一呼而可潰危機視景而斯發北轅未改舍此奚之豐安僻界西陲北臨沙漠候吏不至疲兵徑渡儻軍門晏關回舟未具蒼皇朔裔蹈據無所非策之上也因條列市租計入幕府文書攻守便宜山川要害肅宗撫公背曰靈武即我之關中河內卿亦吾之蕭何寇恂虜在目中凶讎不足殄也即日大駕移幸靈州守則完郛戰有全兵伐鼓舉麾下令風生東極榆溪西洎先零莫不裹飯而趨揭弓而走重足揮汗惟恐居後肅宗雖受傳國之誥平戎之約謙讓未發守持益固願以撫軍討賊賊盡歸報遙稟威略不正位號公與御史中丞裴冕率呼韓單于羌戎君長校尉部曲塞翁老將頓首勸進封章十上肅宗深自閉絶留中寢答公獨排闥及霤披誠見意哀辭扣玉瀝血灑地以為命不得廢讎不可玩稽天後時物駭人散文武之業墜而莫振非天子之孝也上亦躊躇感動回慮遷思公乃陳儀撰吉登帝大位於是義徒推轂回紇橫厲蹴踏咸陽網羅關外救楚請命夷凶滌穢收秦復洛翊帝霸世皆公之力也定策之初既以大功推裴郭疇庸之際竟以常資為侍郎達者多公之遠名明主善公之能讓披我荊棘在主簿而難忘張良布衣固封留而已足五涼四戰之郊荊州用武之地會稽浙河之險二都初定九服猶虞傾側動搖三方尤急東西萬里出入十年仗節擁旄更居迭撫公之在鎮河西無盜邊之警洞庭息三苗之禍海寇不動甌閩順軌得公之效也如彼公之罷守袁朝陷山越康元燒夷陵犬戎奪酒泉胸奴舒右臂失公之患也如此今上即位以公先帝大臣明於治亂漢庭儒雅習於制度往踐常伯登於相府禮崩樂缺自公綴之國綱天憲實公持之為上從容論天下事甚衆潛迹密啓明可否者非一慎深於削藳功隱於詭詞永泰中西南大將暴很淫虐腹心坐離師衆四潰雖事迫理順而形疑勢拒皇帝憫百姓之不辜哀㣥校之罹毒公奉辭受鉞單車詣蜀辨邪正於一言安萬夫之反側始公未至皆鴟張內恐狼顧外視及公申令則飽德飲和且舞式歌岷峨既平雙流已清衛公告成乃眷以寧帝曰丞相善謀能權蹈難履危勤略憂邊雕弓弭斾策勳勞旋公拜稽首天子萬年公有濟世戡難之才遺物離人之政自深根以寧柢每乘流而汨波及位極台衡勳高梁益未脫羈鎖終悲晚暮雖陳乞已屢而優眷愈深來朝之明年首夏初吉以東都河南吳越荊楚保釐之任分鎮之務俾公居中總統遙領是歲仲冬月朔羸憊遜位及乎既望生涯告盡留誡諸子申約道侶罷塗車芻靈之送黜聚僂腞楯之飾捐牢廢禮不封不樹解綬脫紳稅囊親土待久客而稽變是留歸而隔至從吾所好示祛俗纍乃隱几喪偶知常委蛻恬然而終晏然而逝非合氣於漠得全於天駭形而無損心旦宅而無情死者其孰能至此極也惟公學奧九流技括衆藝忘象遺數達者知禮存於身而致於用也吉凶悔吝散徽破詭應於化而鮮於物也技經肯綮理悟神對宜其翼宣大政左右明聖位冠㣥后聲施來裔載不虞非據偶得纍公責重憂深心昏意擾公則宏我以命起豫以道未嘗不體平神清忽在世表以過必告我躬是保實欲依公戮力仰答元造然後乞恩歸印相誓將老今左相齊公與子雙拜齊公全才稀售懷寶鄙試塵垢粃粳陶鑄名器頡頏委運俯仰隨俗及乎培風撫翼立朝當國則骨鯁魁壘奮揚蹈厲端莊寤主飢渴憂世執邪尊法起墜振廢方知達觀無早計月固不勝火逢指就而知人折大木而惟我時稱並用房杜所謂同登管樂式是百辟惠余小子為新非故服我甚忘散帙未卷高秋已行唯余與王相顧永傷鄙夫誄德齊公灑翰終愧強名何慙蔡篆系之以詞曰陽驕必折陰勝亦邪剛柔雜居聖賢之家堂堂衛公含和用中為保自易當難不逢首陽誠拙柱下非工餔糟末位致命危邦自西徂東足趼頭蓬簡稽衣食賦政理戎經營指揮雲合風從定計翊帝革暴鋤凶退殊獨潔進不爭功出征入輔計文經武洗蕩三蜀雍容兩府神邁形局思深志違封禪留草東山不歸台光拆耀白晝徂暉依仁孔夙履信不暮自天之佑宜無悔怒天之薦瘥時丁耗斁如魚思涉若廢網或歲大旱孰為霖雨生公則惠喪公何苦形有必待魂無不之誰存封域誰制喪期平臯漫澶野蔓離披延陵已達弋者何知元宗再受命宅帝位三十有五載兵加幽都討平胸奴大將軍戢戈稅弓來朝獻功天子勞旋告成回慮西戎乃制詔丞相御史咨爾朔方河東節度支度採訪使安北單于大都護御史大夫清源公王忠嗣統我六師萬方皆全磔裂單于封狼居山歸馬漠南列郡祁連撫茲北荒厥功茂焉犬戎睚眥作虐西裔攘據石堡漁獵青海皇天震怒以時致罪公拜稽首敢留王誅猖狂先零國怨家讐建牙榆溪樹羽河源東綴飛狐西蹶陽關本天下徑兵制緣邊萬里徂長轂動雷駟旌旄轡捶干雲蔽地款流沙而瞰烏弋岋崑崙而瞵濛汜方且繕完補缺勸穡戒車圖全遺近功盡敵非一戰陳章立論別白甚明以孤特之姿失貴臣之意安祿山保姦伺變忌公宿名李林甫居逼示專嫌公不附寢營平之奏沮樂毅之謀內隙外讒陰中交訕卒從吏議竟罹大獄雖釗溫肆爪牙之毒而哥舒有折檻之爭辨牙門之至冤逢匡石之排妬黜守沔上沒於漢東涸我橫海鱗年終四十五羯胡得力并雲朔荏禍幽燕縱鳴騎於兩都投大艱於區宇悲夫父龍顏之英主感風雲之早契散禍於微圖堅在脆乾坤改施忠邪易地謫放隳落離披困畏人之云亡邦國殄瘁狩皇輿於巴蜀劫宮廟於蛇虺如倒持而授柄豈天意與人事今上撫軍用公舊校士留殘憤將有餘雄謂諸葛之猶生走仲達而知懼及肅清東土正位北辰傷聞鼓鞞載感風烈追贈兵部尚書太子太師邊吏增氣三軍激節蓋念功悼枉國之經也義明運詘神所勞也公本太原祁人六代祖仕後魏為青州刺史北齊為白道鎮將五代祖隨周武帝入關署馮翊掾因徙家於鄭今為華陰人也皇考諱海賓九原太守安撫朔方諸蕃部落兼豐安軍使開元二年七月以騎士屯蕭關盛秋臨坰牧禿髮舉卅萬衆東踰狄道郭知運節制隴右委稼噉寇嬰城不動遂得踐圍西使驅掠馬牛爟火照平涼羽書驚朔塞公召將校計事皆曰衆寡不敵利病相懸濟河外之兵徵涼州之援公以為羌虜入盜吞噬腹心掃國馬而西歸不崇朝而事去方為四夷恥終遺大漢羞職守封疆身為障蔽辭難就易進熟偷安而無後咎餘責者微諸公誰不樂此乃拔勇簡材輕齎益馬有氣敢往不滿千人雷動飇移自辰徂亥垂六百里突掩賊營縱吾奇兵乘彼不意披猖受戮橫潰宵馳終夜追奔遲明會食勦歸師於壕口殲困獸於達毗蹂轥之所殘戈矛之所斃積尸將崆洞侔厚漂血與洮河爭流氣盛忘銜橛之虞戰酣無存變之意蒼黃顛仆落於戎手亦足以暴威武於天下憺洪稜於蠻貊五十年間犬羊遷迹不敢覘邊以取當咸皆失地而遠客勳映古烈名垂壯籍初元宗省書廢朝問故流悼偉其心而大其節哀其沒而念其忠裦贈開府儀同三司安北大都護俾給事中倪若水乘馹弔祭命許國公蘇頲為之文以致意焉輕車介士麾兒屬將飾柩護喪封墳寵葬公之遘閔年初九歲詔復朝散大夫尚輦奉御特令中貴扶入內殿意苦而羸形絶地辭哀而迸血沾衣左右動容上亦歔欷因撫而謂曰此去病之孤吾當壯而將之萬戶侯不足得也衣之以朱紱錫名曰忠嗣部曲主家後宮收視每隨諸王問安否獨與肅宗同臥起至尊以子育儲后以兄事公亦惟專惟直不傾不墮未嘗忤目孰云有過每歲天子練戎整旅冬狩秋田翼轡奉車越莽淩阡格麟長楊掩兔黃山蹴履輕狡流離往還斫纍益奮搏捷無前出而有獲多不自賢上既知公有日磾之純固加李廣之材氣義形於主確然秉志少而侍中慮不省事乃試守代州別駕大同軍戎副干法大豪閉門自斂賣功老將俯伏聽令涼秋八月桑乾草腓方佯白登外馳突長城下單戈指虜輕騎犯胡有向必摧能當輒破往往射雕者居公掌握中胸奴憚邊不敢抵當肅宗為上泣曰王忠嗣負材敢戰必恐亡之即日徵還守未央衛尉入侍之歲時方就冠元獻皇太后降家人之慈盛擇配之禮命之主饋恩情甚厚公以讐恥未雪激憤愈深每對案忘餐或獨居掩涕元宗雖欲大其伸而全其屈終亦觀其志而感其衷俾以中郎將官從徐公蕭嵩出塞但使通知四夷事飽習軍陳容不得先啓行無令當一隊且有後命虞其夭閼枕戈假寐如詔三年及徐公將入覲京師改轅張掖公曰無以歸報願一甘心乃候月乘風卷旗鞭馬精兵七百弩深入鬱標川遇贊普牙官踐更角武戈鋋山立介馬雲屯霧雨忽開旌旗相接將校失色猶欲引馳公謂一足未移追射且盡無敢妄動觀我破之乃超乘貫羌當前皆廢吐蕃大將臨高整旅公陷胸走腹曲折回旋取白馬於衆中捨大黃而益振肩倚膝踦蹈藉蹙圯軼機駭㣥擠亂墜提刀四顧如土委地綱決網漏逋誅久矣既伐且弔當而勿喜芟夷之又蘊崇焉係纍之亦焚燎焉執訊獲醜何啻數千牽羊縶駒殆將萬計擁戎州以入塞積京觀而徐回幕府上功二師奏狀上益歎息詔令凱旋天子御勤政樓親閲軍實太常稽憲度獎授執金吾上亦多元戎因為右丞相仍令圖寫置於座隅自茲厥後恆當重任趙承先之敗於怒皆也隻輪不返公度桑乾河虜其全部復失亡之車重杜希望之輯鹽泉也戎侵宇下三帥受擒公獨潰堅圍護經時之板築信安王之臨遼碣也用武於盧龍塞朝鮮盛刊壘之功韋光乘之征駱駝峽也會援於李陵臺河朔受全軍之惠初佐戎關隴分鎮河湟一之歲拔新城走莽布夷烽壘燒積聚二之歲開九曲奪三橋梁洪河泝西海摐雷鼓勇士厲指蹴振耀傍偟塞裔開元之末擁旄汾代天寶之始兼統朔方獯鬻內離九姓橫叛大單于控弦度漠聲言來附拔悉蜜引弓乘後克寸日會師中使遽聞帝思沷蕩受降盡狄屈指猶遲亟決急天書百下公以為出疆之任得守便宜冒頓北方之強未當屈折叛胡畏服大種不輕用兵勢濶言甘可虞他變盛師臨木刺致餼出蘭山含垢并容兩存視隙全威持重閉壁堅營無名王大人到轅門受事絶單車匹馬報候吏前期防密慮周詐窮情見果穹廬桀黠將侵鎬及方右地郅支已解仇交質幾欲圖成大禍寧唯嚮化未醇於是設間以散其從肆諜以離其約二虜不合遁逃遠舍天子使繡衣御史問後將軍不念中國之費乘機之速其上畏懦優遊之故且陳支解戎醜之謀苟事得其中如將軍素料又胸奴何時可滅公條對不羈之虜易以計破難以兵碎彼有乖離之漸我知貪利之戒威加幽荒武暢陰海土崩歸德不二三歲因白逗遛未決之狀備列平戎一十八策璽書還報從公所畫突厥前有畏漢之逼後有事讐之恐縮衄遷徙散亡貧破遭罹瘃墮之患傍緣諭告之辭朝不及夕以徯王師受言而去者什二三委辮而降者五千帳明年秋引軍度磧定計乘虛至多羅斯壞巢焚聚涉汨昆水下將降旗皆倒戟自殘輿尸請命斬白眉可汗之首傳置藳街繫葛督祿娑匍可敦獻於闕下阿波達干持愛妾宵遁乘六吂月馬凡突圍嘯聚東蕃迫脅小種立烏蘇為君長自尊任為賢王保薩河仞山據丁零古塞謂中國有磧鹵之限官軍無可到之期按甲休徒擊鮮高會思歸故地卒復大名間歲方暮嚴冬仲月公出白道誓衆自單于北伐俾僕固懷恩阿布斯為鄉導覘視井泉命王思禮李光弻為遊軍收羅服聽顧萬里若俄頃過山川如枕席豈百舍之敢休不再旬而履狄夜驅胡馬暗合戎圍自丑至辰頭驅面縛乘無物故士蓄餘怒羈虜全國永清朔土告類上帝薦功皇祖三代之盛獫狁孔熾方叔吉甫驅之而已勤霍倦衛蒙亦終斃傾秦築怨縻漢償費雖張願列三城衛公擒頡利才遏乘冰之勢但雪涇陽之恥則自命將以來肅將天刑誅而不伐素定廟勝陳而不戰龍荒絶貴種大漠無王庭恢武節而振天聲未有如公之比公始以馬邑鎮軍守在代北外襟帶以自隘棄奔衝而蹙國河東乃城大同於雲中徙清塞橫野張吾左翼朔方則并受降為振武築靜邊雲內直彼獯虜巨防周設崇墉萬堵開陽閉陰拓迹爰土藏山掩陸磅礡固護西自五涼東暨漁陽南並陰山北臨大荒聯烽接守乘高掎要塞風揚沙絶漠起鳥悉數於瞬息傳致於晷刻元黃不得雜其象秋毫無以逃其狀矧襲侵與牧馬敢凌遽而南向冰河風壯車甲鱗萃誰何疆理千長百帥秦將隸於降虜漢卒羈於戎騎公乃衡懸華裔勢分衆寡由中制外長御遠駕恢我朔邊有如彼圖難於易又如此當秉鈞之顓國也巧文傷詆網密事藂借公為資動搖國本諷操危法言酷意誣雖丞相置辭猶驚獄吏而貫高長者竟出吾王成公謫居人無不恨方逆胡之兆亂也意并河東偽築雄武常山臨代飛狐扼塞制夷夏之吭撫崤函之背徵鄰請助邀公赴會將欲詭遇買歡冀得兵留鎮廢公先期應詔未覯而退奏論本末之難指切未然之戒危辭泄漏凶黨交害摘抉排折俾公終敗公之始仕也自家移孝孤童被識策慮奮發義勇逼億其受任也厲三軍之氣同萬夫之力致誅則百蠻竦振武則暴強服支離約已盡悴事國嗚呼哀哉惟公明邁激朗信廉仁勇機敏神速內和外重處盛權不得以非理撓臨大節不可以危亡動道將世忤器與時屯折衝厭難之臣旋踵及身不淄不磷之堅挫於刀筆之前此慷慨義烈之士所以掩泣而流漣矧我依仁受賜託姻逮豫守官秉策司勤運厄功在誠存理冤明沒河渭蒼邁古原左掌太華邪睨鴻門刊銘路隅庶慰精魂其詞曰古人有言兵者凶器戰實危事三代為將道家所忌得非好勝樂殺欺降嗜利絶域剄李杜郵悲起每原始而要終吾固知其所以溫溫清源幼寤聖君勇必顧禮質而能文摧剛為柔塞兌解紛破虜忘闕平戎讓勳肅致天討義誅不順密謀神斷四回六奮火烈風掃霆馳電震捨服解網知成示信胥膾歸堯三苗格舜有守矜功謂之不克井堙木刊孰云非賊惟後將軍古訓是式先計後戰貴和賤力哀勝不敢持全制極遭罹闕故頗僻反側蒼鷹厲吻雛鶩爭食顛倒靜邁汨陳白黑威暴都賴功隳即墨浩歌滄浪飲恨南國希仁聖之遐暢兮亦管誅而蔡殛謂賢哲之悔亡兮顏與冉又不得桓尊周而滅項猶存功而掩慝苟思人以愛樹將十世而宥直如為虜而報讐使伏讒而失職顧汧城以流慟投潘誄而太息賈生徒驚於糾纆北叟焉知其倚伏松凋玉缺直罔貞蹶竟埋干將終碎明月宿草陳根蕪沒蒼墳垂清風於頌石與終古而存存昂出自戎旅以軍功遷河中尹充河中節度使永泰元年檢校刑部尚書知省事後充荊南節度觀察使尋復如故時元載秉政與載深相結託載誅貶連州刺史墜硤江卒問西自臨洮東洎滄海延袤萬里控扼三邊林胡不賓犬戎猶梗守之衝要備其窺窬聚多則戍卒不充布少則敵人莫禦用捨之理揚榷而言立鎮屯兵其來非久懸道分列自昔猶安李牧守邊胸奴竄伏魏尚為郡郊壘乂寧今欲悉罷軍城委之牧宰敬達嘉話將獻吾君對昔者大刑甲兵陳諸原野次刑鞭撲致之市朝將以間邪防淫禁暴禦亂乃覿千古茲率厥常我后光膺寶命誕敷文德建皇王之中協時雍之化聲教遠洎無思不洽猶恐至道未孚邊亭或聳爰招集謀畫之士議諸疆塞之虞斯誠居安慮危之深策也顧以蒙陋庶能無聞將何以副沈祕之求奉對揚之列恭承清問敢不薦其聞矣臣聞夫為國之道必在任賢保境之方必先擇將國家授武秩設邊防東自榆林西連蒲海可謂制度祕遠典章大備而猶以遼靄未清湟烽或照者但未得其人耳今若垂旌揚之期崇獎激之道用不求備任惟其材舉吳起則捨其貪推穰苴則略其賤務升智術弗限資年則將得其人矣既得其衆必能撫其人必能盡其力將得其材以之東鎮則林胡清以之西征則犬戎息何憂乎制禦之不足多少之為患也若乃布化宣威實資牧宰守全保固亦在城池則知牧者邦國之先而疆埸之主也疆埸無主則啓戎心戎心之生人慢其政國之患也今者選建良牧委之臨人修緝軍城足以禦敵則可以捍我中宇綏彼邊氓何以廢城然後為得謹對問用兵制敵先資良將搜奇掇異昔賢病諸厚貌深情最為難辨受金善盜終而有益至如清言要理行之則違強力暗通口不宣意臨問定職何以分之李將軍簡易便人程不識刁斗嚴衛張飛勤於禮士關羽接於常流四子所施幸甄優劣兩適為用何斯短長今邊烽未亡善將懸急試可淹於歲月拔萃昧於元黃子其直言以袪未悟且三全五事十過九差何所廢興何所施用理國之貴何首愛人之道何為各書名數佇濟邦國對登壇分閫之傑行已應物之際顧雖愚蒙嘗聞之矣莫不蹈仁履義以修其身奉公滅私以樹其政但人無求備用各有宜十哲分科八能殊術吳漢則訥於詞理衛玠則善於清言今若取陳平之謀須捨盜金之行用杜預之智豈資穿札之能雖厚貌深情古人所病而收長棄短先達格言伏願徵之以九徵求之於五德甄其操履行以智謀雖言貌難分而華實不昧擇能而用斯則可矣亦何憂良材之採掇官職之不分者哉夫簡以臨人嚴以應物嚴則勞而後濟簡則逸而能通勞逸既殊得失斯在翼德擇士而禮雲長接於常流為道不廣固宜劣於張飛出門重禮誠合優乎關羽各隨時而用夫何擇於先後當今邊隅尚警征役未息必資良將方立奇功若拾奇傭保之中拔異淪滯之位則元黃可辨衛霍斯在夫兵之術語聖人所止後代故作譎書以寄勝於天道也故曰天地鬼神視之而不見聽之而不聞指虛無之行不足以制勝故人存而不務也則知吉凶之兆盡在乎人今若任皓皓之良收斷斷之善使明法審令貴功養勞則不時日而事吉不卜筮而事利亦何必訪韜鈐之謀孫吳之訣然後為得哉亦敢不陳其梗概至若軍國著三全之稱天地操五事之名勇急廉智將之十過也十百萬千一疑之九差也理國貴於仁禮愛人在於不勞昔霍驃騎不讀兵書猶言暗合項將軍素間兵法亦歎天亡况事涉元微藝殊經誥豈伊蒙淺所能詳哉謹對問料敵多途應變無算覽去病之對顧在方略讀孔明之書虞於備預至如烈風猛火煙焰赫然雨水奔流瀰漫無際修何人事以去天時或有暴兵卒來我則未暇敵人非遠靜然無聞何法以知敵情何方以收我衆如其爭先不遠我怯須勇列軍甚嚴彼強使弱善戰不陳抑有前人未戰屈人佇聽嘉話四輕二重於將謀而何施三禮五才於兵形而何要幸存升降曲盡所宜對觀夫古之良將之行兵也莫不救災恤患以和其人先謀後動而制其敵軍有渴而不飲軍未飯而不食舉不失德賞不失勞故人悅忘疲士感知死夫如是以之守則固以之戰則克安則不肯蹈茲烈火遏彼奔流斥侯素明暴兵安可卒至法制素習敵人何由能邇我將賈勇寧見士怯我固常勝安有敵強未戰屈人謀其所以善戰不陳夫何遠矣至四輕二重之施三禮五才之入所用斯並事關幽祕理絶探求徒罄蒙襟豈酬高問謹對
