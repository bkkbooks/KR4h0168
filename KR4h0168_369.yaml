  text: 全唐文欽定全唐文卷三百六十九載字公輔鳳翔岐山人天寶初舉明莊老列文四子學高第補新平尉肅宗朝纍遷戶部侍郎同中書門下平章事代宗立進中書侍郎封許昌縣子大歷十二年以貪猥收賜自盡興元元年詔復爵諡曰荒後改諡成
