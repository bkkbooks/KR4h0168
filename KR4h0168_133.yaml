front:
  text: 全唐文欽定全唐文卷一百三十三叔達字子聰陳宣帝第十六子封義陽王歷都官尚書入隋授絳州通守高祖義師至絳以郡歸款纍官侍中封江國公貞觀中拜禮部尚書九年卒諡曰繆後贈戶部尚書改諡忠
  hash: sha256:0c8dd4d3fcdc4ee2898573b863c546bde1334327a56d5cd388ab2a2c7a6f6cd3
