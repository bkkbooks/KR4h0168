body:
  text: 賢弟千牛及家人典琴至頻辱芳翰索下官所撰隋紀雖承厚眷悶然自失誠恐持郤克之質入邯鄲之墟奏曹鄶之音歷莖英之肆所以遲回牘伏念旬時輒揆短懷仰違前命今奉來札誨責逾深既以驕鄙相訶又以緘縢致誚欲加之罪其無辭乎正當要使必致耳了不知賢兄芮城有隋書之作足下既圖繼就須有考尋謹依高旨繕録馳送然僕雖不佞頗聞君子之論矣嘗以謂為國以禮君舉必書故左史記言右史記事言者申立德立功之意也事者敘立德立功之迹也所以明勸沮所以別是非自非可以關社稷之安危涉天人之興廢古之君子何嘗取諸褒貶之作有由然也自微言泯絶大義乖墜三代之教亂於甲兵六經之術滅於煨燼君人者尚空名以夸六合史官者貴虛飾以佞一時下及馬遷爰逮班固咸有述作庶幾聖賢其於斟酌典謨表章微絶曾不能觸其藩籬者也魏晉之際夫何足云中原板蕩史道息矣然國於天地有與立焉苟能宅郊禋建社稷樹師長撫黎元雖復五裂山河三分躔次規模典式豈徒然哉是賢兄文中子知其若此也恐後之筆削陷於繁碎宏綱正典暗而不宣乃興元經以定真統蓋獲麟之事夫何足以知之叔達亡國之餘幸賴前烈有隋之末濫尸貴郡因霑善誘頗識大方至若梁魏周齊之閒耳目耆舊所接風流人物名實可知衣冠道義謳謠尚在頃者皇建其極君子道亨憑藉時來妄叨近侍廟堂多暇典墳自娛覽後魏周齊之紀傳考下官之所聞見曾不喜怒隨意曲直任情敘致浮雜褒貶阿黨述時望者以爵祿為榮談陳國紀者以狙譎為能事至於密會王道濳濟生人既昧於知音咸寢而不記貪敘寫其祖父冠冕子嗣婚姻以為譜牒之證耳豈不痛哉風俗之壞一至於此雖人倫王化備列元經而恢談碩議或不可捨是以薛記室及賢兄芮城常悲魏周之史各著春秋近更研覽真良史焉古人云過高唐者學王豹之謳遊睢渙者學藻繪之功竊惟隋氏之王三十六年成敗否泰目所親覩誠懼後之作者復習向時之弊焉故聊因掌壺之暇著隋紀二十卷騁辭流離則愧於心矣書事要則嘗有志焉孔子曰我欲載之空言不如附之於行事儻近是乎謹恃疇眷以塵清覽當積兼金以購黜竄耳又恐足下紀傳之作須備異聞今更附王胄大業起居注往眇矣靈化元哉妙門飛形九府鍊氣三元黃庭祕籙金格微言玉京留記金竈還魂揚塵東海問道西崑物色函關抒容清廟建標伊始層壇雲峭綺井虹伸風窗電笑元都正律帝臺仙召挹髓捫星餐霞引照豁虛罔象無名至要高廂久縣清泉餘療宅心勝侶游息衆妙絶壁翠微潀流丹竅鞠草如結周原甚奧聖道將宏重光顯曜明明我后積德纍功陶埏㝢縣叱咤雷風庸稽太室禮盛酆宮時乘正位道配元穹四維載仰百世斯隆有截於外無思自東祥符浹遠瑞采澄空百神咸秩千齡是崇宗元壯觀詔蹕康莊雲行輦道吹發山梁飛文協玉接禮神皇五旌回首六轡齊驤宸儀展敬享福無疆巍然高碣播此遺芳收字伯褒蒲東汾陰人隋司隸大夫道衡子道衡為煬帝所殺收不仕隋高祖入關授秦府主簿遷金部郎中東都平授天策府記室參軍封汾陰男以本官兼文學館學士武德七年卒年三十三貞觀七年贈定州刺史永徽六年又贈太常卿惟茲器之為宗總㣥樂而居妙應清角之高節發號鐘之雅調處躁靜之中權執疏密之機要遏浮雲而散彩揚白日以垂耀爾其狀也龜腹鳳頸熊據龍旋戴曲履直破觚成圓虛心內受徑質外宣磅礡象地穹崇法天候八風而運軸感四氣而鳴絃金華徘徊而月照玉柱的歷以星懸世充據有東都府庫填積其兵皆是江淮精鋭所患者在於乏食是以為我所持求戰不可建德親總軍旅來拒我師亦當盡彼驍雄期於奮決若縱其至此兩寇相連轉河北之糧以相資給則伊洛之閒戰鬬不已今宜分兵守營深其溝防即世充欲戰慎勿出兵大王親率猛鋭先據成臯之險訓兵坐甲以待其至彼以疲弊之師當我堂堂之勢一戰必克建德即破世充自下矣不過兩旬二國之君可面縛麾下若退兵自守計之下也蓋聞運無常寧治窮則亂教不終廢人存則闡故曰天下有道制作歸乎帝王斯文或墜財成寄乎明哲才之不可以巳其在茲乎周道竭而孔子興隋風喪而夫子出五常為之式序三綱為之無昧道沖而用故無德而名功足化成故匪爵而重於稽其類其生物之匠乎夫子諱通字仲淹姓王氏太原人初高祖晉陽穆公自齊歸魏始家龍門焉若乃門風祖業之舊鴻儒積德之胄事賁家諜名昭國史今可得而略之粵若夫子洪惟命世盡象緯之秀鍾山川之靈爰在孺年素尚天啓亦既從學家聲日茂偉容貌肅風神以孝悌為心極以人倫為巳任步中規矩響諧音律術無遠而不窮理無微而不詣故夫要道之本中和之節九疇六藝之能事元亨利貞之至美悉備之矣豈惟行為世範言成士則而巳哉十八舉本州秀才射策高第十九除蜀州司戶辭不就列大業伊始君子道消達人遠觀潛機獨曉步烟嶺臥雲溪軒冕莫得而干羅網莫得而逮時年二十二矣以為卷懷不可以垂訓乃立則以開物顯言不可以避患故託古以明義懷雅頌以濡足覽繁文而援手乃續詩書正禮樂修元經讃易象道勝之韻先達所推虛往之集於斯為盛淵源所漸著録踰於三千堂奧所容達者幾乎七十兩加太學博士一加著作郎夫子絶宦久矣竟不起矣朝端闕聲節天下聞其風采先君內史屈父黨之尊楊公僕射忘大臣之貴漢侯三請而不覿尚書四召而不起盛德大業至矣哉道風扇而方遠元猷陟而逾密可以比姑射於尼岫擬河汾於洙泗矣夫教思之宗聖達之節形氣之域古今同盡六經既就一德時成拂衣啓手其天意乎以大業十三年五月甲子遘疾終於萬春鄉甘澤里第春秋三十二嗚呼哀哉天不憖遺吾將安仰以其年八月遷窀穸於汾水之北原棺木衣衾以從中制不封不樹是遵上古門人考行諡曰文中子禮也收學不至穀行無異能奉高跡於絶塵期深契於終古義極師友恩兼親故遭世道之衰微屬衣冠之板蕩將以肆力王事思存管樂不獲躬守孔塋自同游夏攀昊蒼而不達俯元堂而巳隔敢揚徽烈而作銘曰兩儀既位三才式甄器象雖顯神機未筌匪聖孰作匪明孰傳文王逝矣孔子出焉顯允經籍作為邦紀天之未喪載誕夫子奄有㣥言遂荒精理百氏銜璧九流齊軌濳龍勿用鳴鶴在陰我有宏德人靈是欽摳衣遞進鼓篋相尋七十成列三千若林煥乎經濟沖乎典則教思風行徽猷允塞庶幾克饗匡此王國如何不祐殲我明德嗚呼喪亂胡及我長嗚呼哲人胡棄我往王室方厲帝邦無象梁木斯壞蒼生奚仰綢練既設披崇既張野寒川曠泉深路長盛德無沒嘉言孔彰永為洪範於何不臧綱字文紀觀州草修人初名瑗字子玉讀後漢書張綱傳慕而改之初為周齊王憲參軍入隋為太子洗馬拜尚書右丞為楊素蘇威所惡以屬吏會赦免賊帥何潘仁署為長史高祖義師至京城授丞相府司録封新昌縣公纍拜禮部尚書兼太子詹事進太子少保貞觀四年拜太子少師五年卒年八十五贈開府儀同三司諡曰貞臣綱言臣伏見武德五年之後四海初定陛下自負太平日就驕侈傷於酒德稍怠萬機專與幸臣旦夕遊宴所重唯聲樂所愛唯鷹犬夷夏進送道路不絶又斥辱功臣多所輕侮或發其微時細過或加捶撻於殿庭德澤漸虧下將疑懼而戚藩公主皆踰憲式嬪媛之家多違法度不加禁止頗有侵漁行路之閒非無喧籍又皇太子令及秦齊二教共詔敕並行唯計日之先後州郡之職無所的從授官分賞任意所欲不復論功伐才行矣加以每歲秋冬田遊無度王公主雜糅其閒或時逢考選皆在原野至於歷時不返京邑略無居人億兆失望陰懷歎息朝之綱紀漸以弛紊而陛下不悟政教日頽在內不許論事當朝略無諫者愚臣竊懷栗畏誠有危亡之慮臣不敢不盡言伏待刑憲臣謹按周禮均工樂胥不預於仕伍雖復才如子野妙等師襄皆身終子繼不易其業故魏武使禰衡擊鼓衡先解朝服露體而擊之云不敢以先王法服為伶人之衣唯齊高緯封曹妙達為王授安馬駒為開府既招物議大斁彞倫有國有家者以為殷鑒方今新定天下開太平之基起義功臣行賞未遍高才碩學猶滯草萊而先令舞人致位五品鳴玉曳組趨馳廊廡故非創業垂統貽則子孫之道也伏惟陛下聽察之綱耄矣日過時流墳樹巳拱幸未就土許傅聖躬無以酬恩請效愚直伏願殿下詳之竊見飲酒過多誠非養生之術且凡為人子者務於孝友以慰君父之心不宜聽受邪言妄生猜忌謨秦州上邽人隋大業末為晉陽長高祖建義引為司功參軍從平京城除相國兵曹參軍封長道縣公拜秦州刺史改守隴州貞觀元年卒贈岷州都督諡曰安天人之望誠有所歸願早膺圖籙以寧兆庶老夫犬馬暮齒恐先朝露得一覩升紫殿死無所恨瑀字時文後梁明帝子封新安郡王入隋纍官河池郡守高祖入京師遣書招之以郡歸唐封宋國公拜民部尚書進右僕射貞觀中圖形淩烟閣進太子太保同中書門下三品罷為商州刺史二十一年卒年七十四詔贈司空荊州都督太常諡曰肅帝以其性忌改諡貞褊生而必死理之常分氣絶後可著單服一通以充小斂棺內施單席而巳冀其速朽不得別加一物無假卜日惟在速辦自古賢哲非無等例爾宜勉之大亮雍州涇陽人隋末署韓國公行軍兵曹與李密戰敗賊帥張弼異而釋之高祖入關自東都歸國授土門令超拜金州總管府司馬太宗立封武陽縣男復以功進爵為公領太子右衛率兼工部尚書十八年卒年五十九贈兵部尚書秦州都督諡曰懿六義垂訓有國風之詞焉十翼發揮有震雷之體焉雷也者一同法雷而分地風也者萬井宣風以代天周列子男之班漢疏令長之任銅墨彰其美製龜蛇寵其旐斿中都之男女異途灌壇之風雨不作魯仲康之仁恕作踐三台常伯魏之清貞終居九列雕瓊鏻琬謂之不忘翼子謀孫謂之不朽傳芳播美其在茲焉公諱璠字伯玉其先琅琊人也系文武之遙源紹靈仙之慶緒導揚前烈垂裕後昆秦則三將登壇漢則五侯通軌迪哲踵武論道槐庭邦淑國華慶興椒掖奕葉不泯非共筮蓂室家君王無虧礪嶽曾祖岌隋任北海郡長史德表題輿材稱展驥襲海沂之謙讓為慶源之重望祖德皇朝義陽郡義陽縣令龎水生金崑峯産玉撫桐鄉之耆老先問百年靜蒲邑之階庭巳聞三善父知皇朝潁州郡襄城縣令上柱國桂林一枝鳳毛五色龍泉出匣彩發珠星鵲繞臨臺精含滿月擅子游之文學政洽絃歌伏門豹之英雄人懷畏愛公稟粹辰象降靈海嶽歲方童丱子將為其題目未及志學士季識其非凡天與聰明帝資㯋悟班孟堅之文彩黃叔度之波瀾精微之書殆將三絶溫柔之旨蔽在一言儕輩挹其多能敏悟嘉其才對洞張華之博識升朝錯之甲科以國子監太學明經擢第輝揚授上黨郡長子縣主簿又任北京樂平縣主簿長子望邑樂平帝畿黃綬班雄朱絲抗直秩滿授此縣令河東士女不忘遺恩灃北編氓首欣來晚此土分晉餘境全趙名都覆釜前通登僧後鎮風烟臨代斜望寶符郊壤連邢傍臨玉井冀州既載陶唐帝都士庶殷繁桑麻條暢公下車宰邑視俗施教先之以敬讓示之以好惡明察則俗無幽枉正誼則吏不忍欺聲調子賤之琴塵覆史雲之甑妾不衣帛有類季孫父對霜縑雅同胡質或讓魚留犢辭玉謝金不之過也公之清潔也如此建初啓運先皇陵寢聖上虔恭之所㣥下肅雍之地崇奉塋域發自宸衷裒建美名實由天旨改象城而為昭慶貴先祖而創嘉聲郡之與縣俱同十望國資孝理寄在循良妙帝心授公此令至若公卿巡謁夙夜祗共物有備而無虧俗惟勤而不覺公之幹蠱也如此欲求忠臣出於孝子公仁慈惻隱纍代同居幼子童孫家無異爨每志攝享竭力禋誠陵側居人數餘千戶或旁聖疑英傑或招復逃遷茂陵陽陵之儔三徙七遷之邑並加撫育有同赤子公之異化也如此鶬鶊春囀勗之以耕桑鴻鴈秋飛敦之以收穫田夫執耒蠶妾承筐鳳粟遍於郊原鵷綺盈於杼柚遂得冰絲委筐露積如山婦子饁而無辭田畯悅而相賀勵朽勉惰載酒勞勤公之勸農也如此縲索繩犯降綏志偷伺繩而執凶徒焚飾而擒賊煞境絶探丸之客途逢守劒之夫不假埋梧無煩候稻豺狼自屏鉤距無施巳除梁上之奸詎用史瞞之木率公之明略也如此孝弟者人之本慈愛者化之先道協五常倫分十等蟹筐蠶績蟬冠范緌既革知人之非方識宰君之化人同李郭俗齊曾閔境無鹿犯塊有鳥銜感應通誠公之孝理也如此地邇幽燕境連趙魏土多剽悍人尚櫜鞬自戎馬在郊鳴鼙接響騎射馳逐罕習詩書公撫教以仁崇文備武斌斌雜半君子道存開設學校檢閲庠孰人如顏閔俗同鄒魯公之興學也如此大君有命中使巡風激濁揚清旁求俊彥昭慶闔境以公清平感恩申狀使司覽奏尋以名聞總衆美而為最擇其義而臨之撫字才周芳聲滿歲昔甘棠勿翦歎羡詩人伐枳興謠見稱輿頌緇黃道路率有雅詞兒齒台背願旌其善四子講德尚著篇章百姓預謀宜刊厥績莫不他山採石異邑求文請鐫無愧之詞用紀非常之德大亮精非吐鳳思盡懷蛟過談見推辭不獲免其詞曰偉哉聖賢生德自天山澤通氣孕育雲仙凝禎沙禁稟粹沂川英俊之地黻冕相連王孫公子令聞不巳西北玉璽東南箭美傳家蘭桂司徒繼軌松竹堅貞霜霰難毀挺生良佐望重州端恤人以惠濟猛以寬化消蜂蠆俗比鵷鸞不異邦國齊氓共歡資父事君以配祖考忠為令德不貪為寶義陽襄城異邑同道上以化物猶風靡草仕為時須天工人代下車作宰吏懷畏愛肅高潔庶氓仰賴正直清平百城之最虔奉陵廟惟精惟一公仰巡謁以兢以栗良宰攝享神歆元吉明德惟馨芳猷秩秩務嗇勸分不愆穮蔉兆人勤藝惟邦之本禁令嚴刻鮮不為則雖賞不竊罕用徽纆刑賞無差教化之柄寧僭不濫用恤人命我有針規孝弟恭敬君子萬年室家相慶下之從政猶泥在鈞不敢暴虐不敢違仁道兮不遠德兮有鄰吾君敷化可書諸紳臣聞欲綏遠者必先安近中國百姓天下根本四夷之人猶於枝葉擾其根本以厚枝葉而求久安未之有也自古明王化中國以信馭夷狄以權故春秋云戎狄豺狼不可厭也諸夏親昵不可棄也自陛下君臨區宇深根固本人逸兵強九州殷富四夷自服今者招致突厥雖入提封臣愚稍覺勞費未悟其有益也然河西氓庶鎮禦藩夷州縣蕭條戶口鮮少加因隋亂減耗尤多突厥未平之前尚不安業胸奴微弱以來始就農畝若更勞役恐致妨損以臣愚見請停招慰且謂之荒服者故臣而不納是以周室愛人攘狄竟延七百之齡秦王輕戰事胡故四十載而絶滅漢文養兵靜守天下安豐孝武揚威遠略海內虛耗雖悔輪臺追巳不及至於隋室早得伊吾兼統鄯善且既得之後勞費日甚虛內致外竟無所益遠尋秦漢近觀隋室動靜安危昭然備矣伊吾雖巳臣附遠在蕃磧人非中夏地多沙鹵其自樹立稱藩附庸者請羈縻受之使居塞外必畏威懷德永為藩臣蓋行虛惠而收實福矣近日突厥傾國入朝既不能俘之於江淮以變其俗乃置於內地去京不遠雖則寬仁之義亦非久安之計也每見一人初降賜物五匹袍一領酋長悉授大官祿厚位尊理多靡費以中國之租賦供積惡之凶虜其衆益多非中國之利也歆武德中官右衛將軍王在州之日多出微行常共竇誕遊獵蹂踐穀稼放縱親昵公行攘敓境內六畜因之殆盡當衢而射觀人避箭以為笑樂分遣左右戲為攻戰至相擊刺毀傷至死夜開府門宣淫他室百姓怨毒各懷憤歎以此守城安能自保仁均滑州白馬人武德時授員外散騎常侍除太史令卒官其一曰昔洛下閎以漢武太初元年歲在丁丑創歷起元元在丁丑今大唐以戊寅年受命甲子日登極所造之歷即上元之歲歲在戊寅命日又起甲子以三元之法一百八十去其積歲武德元年戊寅為上元之首則合璧聯珠懸合於今日其二曰堯典為日短星昴以正仲冬前代造歷莫能允合臣今創法五十餘年冬至輒差一度則卻檢周漢千載無違其三曰經書日蝕毛詩為先十月之交朔日辛卯臣今立法卻推得周幽王六年辛卯朔蝕即能明其中閒並皆符合其四曰春秋命歷序云魯僖公五年壬子朔旦冬至諸歷莫能符合臣今造歷卻推僖公五年正月壬子朔旦冬至則同自斯以降並無差爽其五曰古歷日蝕或在於晦或在二日月蝕或在望前或在望後臣今立法月有三大三小則日蝕常在於朔月蝕在望前卻驗魯史並無違爽其六曰前代造歷命辰不從子半命度不起虛中臣今造歷命辰起子半度起於虛六度命合辰得中於子符陰陽之始會歷術之宜其七曰前代諸歷月行或有晦猶東見朔以西朓臣今以遲疾定朔永無此病宋代祖沖之久立差術至於隋代張胄元等因而修之雖差度不同各明其意今孝通不達宿度之差移未曉黃道之遷改乃執南斗為冬至之恆星東井為夏至之常宿率意生難豈為通理夫太陽行於宿度如郵傳之過逆旅宿度每歲既差黃道隨而變易豈得以膠柱之說而為斡運之難乎又案易云治歷明時禮云天子元端聽朔於南門之外尚書云正月上日受終于文祖孔氏云上日朔日也又云季秋月朔辰不集于房孔氏云集合也不合則日蝕隨可知矣又云先時不及時皆殺無赦先時為朔日不及時也若有先後之差是不知定朔之道矣詩云十月之交朔日辛卯又春秋日蝕三十有五左邱明云不書朔官失之也明聖人之教不論於晦唯取朔耳自春秋以後去聖久遠歷術差違莫能詳正故秦漢以來多非朔蝕而宋代御史中丞何承天微欲見意不能詳究乃為太史令錢樂之散騎侍郎皮延宗抑止孝通今語乃是延宗舊辭承天既非甄明故有當時之屈今略陳梗概申以明之夫理歷之本必推上元之歲日月如合璧五星如連珠夜半甲子朔旦冬至自此以後既行度不同七曜分散不知何年更得餘分普盡還復總會之時也唯日分氣分得有可盡之理因其得盡即有三端之元故造經立法者小餘盡即為元首此乃紀其日數之元不關合璧之事矣時人相傳皆云大小餘俱盡即定夜半甲子朔旦冬至者此不達其意故也何者冬至自有常數朔名由於月起既月行遲疾無常三端豈得即合故必須日月相合與冬至同日者始可得名為合朔冬至耳故前代諸歷不明其意乃於大餘正盡之年而立其元法將以為常而不知七曜散行氣朔不合今法唯取上元連珠合璧夜半甲子朔旦冬至合朔之始以定一九相因行至於今日常取定朔之宜不論三端之事皮延宗本來不知何承天亦自未悟何得引而相難耶奕相州鄴人隋開皇中以儀曹事漢王諒高祖踐位召拜太史丞遷太史令貞觀十三年卒年八十五臣奕言臣聞犧農軒頊治合李老之風虞夏湯姬政符周孔之教雖可聖有先後道德不別君有沿革治術尚同竊聞八十老父擊壤而歌十五少童鼓腹為樂耕能讓畔路不拾遺孝子承家忠臣滿國然國君有難則殉命以報讎父母有疴則終身以側侍豈非曾參閔子之友庠序成林墨翟耿恭之儔相來羽翊乃有守道含德無欲無求寵辱若驚職參朝位荊山鼎上攀附升龍緱氏壇邊相從駕鶴瑤池王母之使具禮來朝碧海無夷之神周行謁帝所以然者當此之時共遵李孔之教而無胡佛故也自漢明夜寢金人入夢傅毅對詔辨曰胡神後漢中原未之有信魏晉夷虜信者一分笮融託佛齊而起逆逃竄江東呂光假征胡而叛君跱立西土降斯巳後妖胡滋盛大半雜華搢紳門裏翻受禿丁邪戒儒士學中倒說妖胡浪語曲類蛙歌聽之喪本臭同鮑肆過者失香兼復廣置伽藍壯麗非一勞役工匠獨坐泥胡撞華夏之鴻鐘集蕃僧之僞衆動淳民之耳目索營私之貨賄女工羅綺翦作淫祀之幡巧匠金銀散雕舍利之冢粳粱麥丏米橫設僧尼之會香油蠟燭枉照胡神之堂剝削民財割截國貯朝廷貴臣曾不一悟良可痛哉伏惟陛下定天門之開闔更新寶位通萬物之迍否再育黔黎布李老無為之風而民自化執孔子愛敬之禮而天下孝慈且佛之經教妄說罪福軍民逃役剃髮隱中不事二親專行十惡歲月不除奸僞逾甚臣閲覽書契爰自庖犧至於漢高二十九代四百餘君但聞郊祀上帝官治民察未見寺堂銅像建社寧邦請胡佛邪教退還天竺凡是沙門放歸桑梓令逃課之黨普樂輸租避役之曹恆欣效力勿度小禿長揖國家自足忠臣宿衛宗廟則大唐廓定作造化之主百姓無事為犧皇之民臣奕誠惶誠恐謹上益國利民事十有一條如左謹言武德四年六月二十一日上謹按益國利民事十一條其文巳佚惟釋氏書所引尚存梗概謹裒集于後一曰衆僧剃髮染衣不謁帝王違離父母非忠孝者夫父母之體不可毀傷何故沙門剃髮去髭反先王之道失忠孝之義易曰男女搆精萬物化生此則陰陽父子天地大象不可乖也今衛壯之僧婉孌之尼失禮不婚仇匹內通衣形外隔夭胎殺子違禮逆天減損戶口不亦傷乎今佛家違天地之化背陰陽之道未之有也請僧尼六十巳下令作丁則兵強農勸尋老子至聖尚謁帝王孔某聖人猶跪宰相況道大無取德義未隆下忽公卿抗衡天子如臣愚見請同老孔弟子之例拜謁王臣編于朝典者二曰西域胡旦末國兵三百二十人小宛國兵二百人戎盧國兵三百人渠勒國兵三百人依耐國兵三百五十人郁立師國兵三百三十一人單相國兵四十五人孤胡國兵四十五人凡八國胡兵合有一千八百九十一人皆得紹其王業據其土地自相征伐屠戮人國況今大唐丁壯僧尼二十萬衆共結胡法足得人心寧可不預備之哉三曰諸州及縣減省寺塔則民安國治者蓋聞釋迦生於天竺修多出自西蕃名號無傳於周孔功德靡稱於典謨實遠夷所尊敬非中夏之師儒廣致精舍甲第當衢虛費金帛福利焉在西域胡人因泥而生是以便事泥瓦塔像今猶毛臊人面而獸心道人土梟驢騾四色皆是貪逆之惡種佛是妖魅之氣寺是淫邪之祀由妖胡虛說造寺之福庸人信之爭營寺塔小寺百僧大寺二百以兵率之五寺強成一旅總計諸寺兵多六軍侵食生民國家大患寺驍僧衆妖孽必作如後趙沙門張光後燕沙門法長南涼道密魏孝文時法秀太和時惠仰等並皆反亂自餘凶黨至今猶在請必除蕩用消胡氣浹旬之間宇宙廓清維是寺舍請給孤老貧民無宅義士三萬戶州惟置一寺草堂土塔以安經像遣胡僧二人傳示胡法銷像而絶鐫鑄貨泉可以無損毀經以禁繕寫廢僧以從編戶竊謂益國利人興家多福也四曰僧尼衣布省齊則貧人不饑蠶無橫死者臣聞佛戒僧尼糞掃衣五綴鉢望中一食獨坐山中清居禪誦此佛之章法也若殺蠶作衣佛戒不許今則知佛理虛故生違犯五曰斷僧尼貝居貯則百姓豐滿將士皆富禮佛不得尊豪設齊不得富貴六曰帝王無佛則大治年長有佛則虐政祚短者自庖犧巳下爰至漢高二十九代父子君臣立忠立孝守道履德生長神州得華夏正氣人皆淳朴以世無佛故也秦起秦仲三十五世六百三十八年漢明之時佛法始來有之為損無之為益故未有佛法之前人皆淳和世無篡逆佛法來到多興悖亂天道無親頓成虛闡禍淫福善胡其爽歟因何損替者翻享遐齡崇道者無終厥壽計應蘊福延慶積惡招殃何乃進退矛盾情狀皎然去取自乖若為酬對七曰封周孔之教送與西域而胡必不肯行八曰海內勤王者少樂私者多乃外事胡佛內生邪見翦剃髮膚回換衣服出臣子之門入僧尼之戶立謁王庭坐看膝下不忠不孝聚結連房且佛在西域言妖路遠拾親逐財畏壯慢老重富強而輕貧弱愛少美而賊耆年以幻惑而作藝能以矯誑而為宗旨然佛為一姓之家鬼也作鬼不兼他族豈可催驅生漢供給死夷賤此明珠貴彼魚目違離嚴父而敬他人何有跪十箇泥夷而為卿相置一盆殘飯得作帝王據佛邪說不近人情欲求忠臣孝子佐世治民惟孝經一卷老子二篇不須廣讀佛經佛滑稽大言不及旃孟奢侈造作罪深桀紂入家破家入國破國者九曰隱農安近市㕓度中國富民饒者十曰帝王受命皆革前政者十一曰直言忠諫古來出口禍及其身者龍紀火官黃帝廢之咸池六英堯不相沿禹弗行舜政周弗襲湯禮易稱巳日乃孚革而信也故曰革之時大矣哉有隋之季違天害民專峻刑法殺戮賢俊天下兆庶同心叛之陛下撥亂反正而官名律令一用隋舊且懲沸羹者吹冷齏傷弓之鳥驚曲木況天下久苦隋暴安得不新其耳目哉改正朔易服色變律令革官名功極作樂治定制禮使民知盛德之隆此其時也然官貴約夏后官百不如虞五十周三百不如商之百又曰夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑衛鞅為秦制法增鑿顛抽脅鑊烹等六篇始皇為挾書律此失於煩不可不鑒佛在西域言妖路遠漢譯胡書恣其假託故使不忠不孝削髮而揖君親遊手遊食易服以逃租賦演其妖書述其邪法僞啓三途謬張六道恐嚇愚夫詐欺庸品凡百黎庶通識者稀不察根源信其矯詐乃追既往之罪虛規將來之福布施一錢希萬倍之報持齊一日冀百日之糧遂使愚迷妄求功德不憚科禁輕犯憲章其有造作惡逆身墜刑網方乃獄中禮佛口誦佛經晝夜忘疲規免其罪且生死壽夭由於自然刑德威福關之人主乃謂貧富貴賤功業所招而愚僧矯詐皆云由佛竊人主之權擅造化之力其為害政良可悲矣案書云惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害於而家凶於而國人用側頗僻降自羲農至於漢魏皆無佛法君明臣忠祚長年久漢明帝假託夢想始立胡神西域桑門自傳其法西晉以上國有嚴科不許中國之人輒行矒髮之事洎於苻石羌胡亂華主庸臣佞政虐祚短皆由佛教致災也梁武齊襄足為明鏡昔褒姒一女妖惑幽王尚致亡國況天下僧尼數盈十萬翦刻繒綵裝束泥人而為厭魅迷惑萬姓者乎今之僧尼請令匹配即成十萬餘戶産育男女十年長養一紀教訓自然益國可以足兵四海免蠶食之殃百姓知威福所在則妖惑之風自革淳朴之化還興且古今忠諫鮮不及禍竊見齊朝章仇子他上表言僧尼徒衆糜損國家寺塔奢侈虛費金帛為諸僧附會宰相對朝讒毀諸尼依託主潛行謗讟子他竟被囚執刑於都市及周武平齊制封其墓臣雖不敏竊慕其蹤
