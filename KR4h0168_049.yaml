front:
  text: 全唐文欽定全唐文卷四十九代宗四
  hash: sha256:ade30410694e866f7f11cbd1ba5184d0fc994d720bd6e03e3baa7d62b57400f1
body:
  text: 卿門傳儒行代挹公才忠義在躬幹蠱從政頃升八座式昭水鏡之規往鎮兩河能鳴風雨之晦比雖因事見貶今則念舊錄功然以地官務殷惟才是屬周行所舉殊愜朕懷所謝知卿鬱然詞宗雅有朝望高標勁節歷霜霰而不渝握鏡懸衡鑒人倫而式敘是用特加命數光乃純臣復銀青之舊階鳴水蒼之雜佩佇聞密啟以定九流舉其朝綱僉曰惟允所謝知卿明邁偉才忠貞壯節夙推公器累踐周行專城高魏尚之勛會府著山濤之績而七澤交帶三江要衝式資統尹之方雅屬旌旄之寄人存政舉其在茲乎所謝知維大歷二年歲次丁未五月己酉朔十三日辛酉皇帝若曰帝乙歸妹表於易象魯侯築館列在春秋咨爾第某妹雲漢之姿聯華宸極河洲之德著美公宮整玉笄於錦車題銀牓於毳幙善修嬪則載叶蕃情實資輔佐之功廣我懷柔之道烏孫下嫁巳申飾配之儀紅綬增榮爰寵䟽封之命是用冊曰某公主敬承徽禮可不慎歟維大歷三年歲在戊申二月景子朔十日乙酉皇帝使某官某持節冊命曰於戲子承家嗣作藩輔之臣母加尊號蓋春秋之義咨爾新羅王金乾運母素推勳閥雅有華風其德可尚其儀可則鑒於圖史式是禮容儷東方君子之國處中壼貴人之位事上以敬接下以仁睦我親隣亦資內助有教子之明訓膺繼代之新命固可以崇峻徽章光昭盛禮是用冊為新羅王太妃修乃慈範撫其嗣君永懷前人無改其道欽承典冊可不慎歟維大歷三年歲次戊申月日皇帝遣使某官某冊命曰於戲位亞長秋坐論婦道聽天下之內治序人倫之大端御于邦家式是風化惟爾贈禮部尚書獨孤穎長女祥會鼎族行高邦媛體仁則厚履禮維純有沖敏之識不資姆訓有淑慎之行自成嬪則蘊此貞懿灼其芳華選躬之初奉承先命肅恭之儀克稱尊旨鑾輿比幸侍從勤誠祗事壽宮備申哀敬能盡其節實同我心久奉椒塗載揚蕙問勤於道藝每鑒圖書動有箴規必脫簪珥進賢才以輔佐知臣下之勤勞謙讓益勤記功惟最聲流彤管道洽紫庭克副宮教敬修壼職眷求賢淑用峻等威百辟抗辭六宮歸美宜崇禮冊俾舉彞章是用冊曰貴妃往欽哉無或居上而驕無或處貴而逸降情以逮下誠事以防微潔其粢盛服其澣濯敬循禮節以率嬪御膺茲嘉命可不慎歟維大歷四年歲次己酉三月壬申朔五日景子皇帝若曰漢家舊制諸女皆封儀服比於藩王膏腴封其井賦咨爾第某女承徽自遠誕秀增華仁孝才明夙有天資之慶言容法度成於壺教之慈敏達知微周旋中節肅雍是憲婉靜流芳雖僅在齠年禮未主於同姓而載揚淑問德巳冠於成人宜錫典章用䟽國邑是用冊曰某公主欽承徽命可不慎歟維大歷五年歲次庚戌三月丁巳朔十六日壬申皇帝使某宮乙持節冊命曰於戲昔武德貞觀之際親賢兼敘中外大寧多以藩王委之方面元宗震耀威武外攘夷狄亦選建明德時維鷹揚予之珪瑞並賜旌鉞祗奉前訓敢忘夙夜爰命小子統茲元戎某英茂有才寬彰信豈孝恭之外至亦禮讓而中發能辨雅樂尤精善書言表於微獨有所得事迫於悔未嘗復行時因講義之餘兼達理戎之要固可總以文武屏於家邦屬河外名都方缺上將難於大任歷選中朝雖慙知子之明不忝安邊之寄錫以戎輅分以兵符撫其四封式是羣帥仍求素望俾副新軍爾其保靖疆土惠安氓俗服我明訓永孚于休維大歷六年歲次辛亥五月壬辰朔十六日丁未皇帝使某官某乙持節冊命曰於戲周之藩翰選用宗盟則懷德惟寧大邦惟屏也漢之郡國分建子弟則燕代邊遼齊趙漸海也莫不賦兼千乘土過數圻賜鈇鉞以專征參卿士而夾輔拜之於廟命之於庭俾其外合羣后同獎王室是用師古率由至公鄭王邈幼奉君親之訓兼承保傅之戒罔敢失墜勤而行之忠肅孝恭資其令德溫良聰達輔以多才辨正五經之儒采述三雍之樂不自矜尚過於謙沖周旋體仁恒久其道懿此休問流於四方朕往統藩旄嘗親戎略諸子侍從或有所聞時與之言頗詳其旨必能當我朝制叶予師貞仍選輔車委闕留府錫以彤弓之寵稱其綠車之尊爾其大訓六師以率諸夏敬茲厥服無廢朕命維大歷七年歲次壬子七月庚辰朔十六日乙未皇帝若曰於戲春秋之義下嫁之禮主于同姓送以上卿克明大倫協用彞典咨爾普寧公主孝敬閑婉朗然夙成法度言容資於內訓詞禮是則令淑增華封魯之榮巳開湯沐適齊之美更洽肅雍寵爾有行舉茲成命今遣使金紫光祿大夫門下侍郎同中書門下平章兼宏文館大學士知館事充太清宮使上柱國齊國公王縉持節禮冊爾其奉公宮之教和邦族之姻載揚夙徽永作來範敬承明誡可不慎歟維大歷十四年歲次己未五月辛丑朔二十三日癸亥皇帝若曰於戲昊天有命皇王受之立嫡以賢春秋之義傳歸於子漢氏成規宗廟社稷實賴其慶咨爾皇太子适稟天地之仁合日月之耀道光三善孝著十倫頃者國步多艱委以戎律理軍靖難保大定功克復帝圖廓清妖孽既表建侯之業俾承守器之重仁孝之德夙夜惟寅朕天命有終弗興弗寤非至公無以主天下非至德無以臨四海是用命汝陟於元后嗣守皇業上繼宗祧下安羣望其令門下侍郎同中書門下平章事常衮奉冊即皇帝位於戲宜遵太宗之法度肅宗之儉約任賢勿貳去邪勿疑與衆守邦祗敬予訓高宗嗣興諒闇成受終之禮康王承統翌日奉顧命之書況萬事尚殷蕭牆有釁蒼生佇理社稷謀安教雖達於通喪禮有變於金革順人聽政僶勉從權朕頃侍鑾輿率彼西夏佐成草昧俾掌戎車國步艱難睿圖廣運再清㝢縣崇復宗社稟成命以受律敢貪天以為功聖慈宏深冊踐明兩奉若庭訓敢有怠心嗚呼不弔昊天殃咎荐至皇祖之哀未釋閔凶之罰奄鍾攀號罔極若無天地誓終喪紀企及前王百辟抑予俾恭遺訓俯遂衆望嗣膺丕烈欽茲大寶懼不勝任若蹈春冰如集喬木邇日者先聖哀損朕在問安而䦧牆搆災陵長成禍閫闈作孽閽寺滔天職為亂階潛置巫蠱將行竊弄覆我邦家賴良弼翊戴爪牙同德天道助順神理害盈昭此共工之心終貽管蔡之辱舍彼有罪咸伏其辜廢於離宮寘於城潁今天衢雖泰率土未康式協公卿之心仰遵易月之命奉時斯在先甲未孚宜允人神覃茲渙汗可大赦天下自寶應元年五月十七日昧爽巳前大辟罪巳下巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者罪無輕重咸赦除之自開元巳來所有諸色犯累者並宜雪免左降官並諸色流人及罰鎮効力配軍團練等一切即放還其中有見任刺史縣令及正員者並依本任其四月十五日巳後諸色流貶者與量移近處逆賊史朝義巳下有能投降及率衆歸附者當超與封賞天下禁囚不得過五日所有推劾不得分外拷掠亦不得信支證便結罪名諸色文武官應在淩霄門內謁見者并飛龍射生等並宜以寶應功臣為名諸州刺史與一子官刺史縣令入五品減兩考內外文武官三品巳上賜爵一級四品巳下各加一階諸州刺史父母在無官者與致仕官及父母邑號巳亡歿者追贈諸州防禦使并停天下子為父後者各賜勳一轉州縣官自今巳後宜令三考一替太官饔膳等特宜減省有涉奢侈一切宜停天下百姓逋租懸調貸糧種子諸色欠負官物一切放免開元乾元等錢並宜準一文用不須計以虛數益昌郡王邈進封鄭王延慶郡王迥進封韓王故庶人皇后王氏故庶人太子瑛鄂王瑤光王琚宜並復封號棣王炎永王璘及應安祿山詿誤反狀人等並宜昭雪建昌王追封為齊王崇恩王追封為衞王靈昌王追封為鄆王其有明於政理博綜典墳文可經邦謀能制勝及孝悌力田諸州刺史並宜搜揚聞薦投匭者不須勘以停處姓名務招直言以副朕意惟高祖太宗敷大德於天下覆載之內湛恩茂育累聖同道用康兆人寶位重光深其德澤被服漸漬洽於生靈者百有五十年之閒兵不作而刑將措矣自寇虐橫厲山東不開釁起渠魁毒流區宇三軍七萃之士豪傑忠良之徒制在風波遭其驅劫繇是干戈不息征賦寔煩哀我人斯並罹災患憫茲有犯無罪萬方朕上戴皇天下臨黔首奉先聖之成命集一切之大勳元惡既誅羣生思乂是欲鏡清六合網決八紘庶齊大道之時克復太平之理至化猶鬱兵嚴初解百辟卿士中外衆臣並進昌言請上徽號曰寶應元聖文武孝皇帝朕涉道日寡慚德良多恐沮樂推之心自增神器之重俯膺典冊敬受鴻名便欲謁報昊天展事郊廟又以孟秋多稼垂及西成王畿之閒人實勞止輟茲大禮式元冬切為踰年改元之制纉承洪業敢廢舊章博採羣公之義乃貞協用之紀其寶應二年改為廣德元年爰屬履端乃宏肆眚救茲湯火俾雲行而雨施滌其瑕穢將玉振而金聲宜廣更始之恩用明嚮勸之福可大赦天下自廣德元年七月十一日昧爽巳前大辟罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之左降官即量移近處亡官失爵各與收敘諸色流人罰鎮効力安置配隷等一切放還其安祿山史朝義親族應在諸道一切原免並無所問天下所有諸色結聚羌渾党項但能悔過自陳各歸生業一切並捨其罪其中有頭首能勸率并束手來歸者并加官賞仍令本道防禦使并管刺史縣令分明曉諭所有到者各具名錄奏諸道百姓逋租懸調及一切欠負官物自寶應元年十二月三十日巳前並放免一戶之中有三丁放一丁庸調地稅依舊每畝稅二升天下男子宜二十五成丁五十五入老應徵租稅刺史縣令據見在戶徵科其逃亡死絕者不得虛攤隣保河北百姓復三年應是回紇行營經歷處免今年租稅內外文武三品巳上賜爵一級四品巳下加一階仍各賜兩轉天下兵馬元帥雍王智謀夙成忠孝純至恭行討伐親統元戎撫外蕃以仁訓羣帥以義班師獻捷勳茂武成宜兼尚書令加實封二千戶迴紇可汗冊為頡咄登密施合俱錄英義建功毗伽可汗可敦冊為娑墨光親麗華毗伽可敦可汗及左右內外宰相巳下共加實封二萬戶令御史大夫王翊持節就衙帳冊禮左右殺胡祿都督等並封為王諸部督並封國公河北副元帥懷恩宜兼太保仍與一子二品官一子四品官並階更加實封五百戶河南副元帥光弼與一子三品官並階更加實封三百戶幽州節度使懷仙與一子三品官並階加實封二百戶李抱玉郭英乂辛雲京侯希逸田神功孫志直白孝德令狐彰並各與一子五品官並階加實封二百戶李寶臣薛嵩田承嗣張獻誠等各與一子五品官並階仍加實封二百戶魚朝恩寄崇師律程元振勳高佐命各加實封二百戶仍與一子五品官並階僕固瑒高彥崇渾日進李建義李光逸楊崇光李懷光張如岳白元光溫如雅拓拔澄泌高暉盧欽友成惟良曹楚玉等各與一子五品官加實封一百戶仍各賜鐵券以名藏太廟畫像於凌烟閣并寇難巳來將相勳業高者其名籍圖畫亦準此子儀與一子四品官并階加實封二百戶苗晉卿劉晏裴遵慶元載各與一子四品官並階加實封一百戶儀王及彰王巳下男未官者並準舊例與官及封永穆並長樂巳下長公主及郡縣主嗣王郡王等各與一子官皇親五等巳上諸親三等巳上各與一子出身二王後各與一子官諸道節度觀察使立功將士其父兄在無官者依子文武與官巳歿者追贈陣亡將士襲父官爵河北河南有懷材抱器安身守節素在邱園不仕為衆所知委所在長官具名聞薦應授偽官等並巳昭洗矜才宥過宜有甄收委所繇勘本官名銜資歷聞奏量才處分文武正員常參官並諸州刺史父母無邑號官者宜與致仕官及邑號贈者更與改贈刺史縣令自今以後改轉刺史三年為限縣令四年為限員外及攝試官一切不得釐務諫官每月上封事無所迴避河南河北偽度僧尼道士女冠並與正度天下刑獄須大理正斷刑部詳覆不得中書門下即便處分諸色人中有孝弟力田經術通博文詞雅麗政理優長本州各以名薦惟我高祖太宗之有邦罔不昭事於上帝嚴恭敬畏與神合符七聖在天眷命永固朕嗣守鴻業敢忘奉先尚質貴誠聿修盛典頃以四方多難責在朕躬建侯行師日不暇給東擒羯胡之首西禦犬戎之患元元告病社稷阽危內定外攘不遑展禮雖高明未達而精意惟勤克通至誠以錫純嘏番戎即敘弓矢載櫜虔奉泰壇鑒寐接神祇之顧永保宗社歲時結霜露之思近又百辟在庭儼然而進奉請元子以居少陽冊命乃行匕鬯攸主按風雨之清道乘星火之仲春朝於元元格於藝祖躬執珪奠祗見南郊天何言哉神所勞矣敷兆人之戩穀廣四達之聰明式重燔柴之經益申解網之惠可大赦天下自廣德二年二月二十一日昧爽巳前大辟罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之左降官即與量移近處亡官失爵放歸不齒之類並官巳復資未得本階者各量與收敘諸色流人及量移人並罰鎮効力配隷等一切放還自兇孽亂常王室多難干戈不息今巳十年軍國務繁關輔尤劇念茲疲耗久困徵科其京城諸司諸使應配彍騎官散官諸色丁匠幕士供膳音聲人執祭齋郎問事掌閑漁師並諸司門僕京兆府騎丁屯丁及諸色納資人每月總八萬四千五十八人數內宜每月共支二千九百四十四人令河東關內諸州府配不得偏出京兆府餘八萬一千一百一十四人并停所須衞役使宜撙節定數官給資錢不得干擾百姓其寶應元年十二月三十日巳前諸色欠逋在百姓腹內者并放免天下戶口宜委刺史縣令據見在實戶量貧富作等第差科不得依舊籍帳據其虛額攤及鄰保其天下諸州府長史及縣令有清白著聞善政稱最能招輯逃亡編附復業戶口增多者具狀聞奏朕當差人按覆與所舉狀同者超資進改天下所有諸色結聚及羌渾党項等能悔過自陳各歸生業一切并捨其罪其中有能率先來降者仍特加官賞征人不息勤戍斯久丁壯疲弊老弱困窮光武有言頭鬚為白戢藏鋒刃牧養元元方面重臣宜悉朕意應諸州團練將士等委本道節度及諸防禦使等審與州府商議如地非要害無所防虞其團練人等並放營農休息寇戎以來積有年歲徵求數廣彫弊轉深自今巳後除正租稅及正勅并度支符外餘一切不在徵科限內外文武官三品巳上賜爵一級四品巳下各加一階仍並賜勳兩轉武德元從功臣勳業特崇子孫沈翳者委所司勘責各與一人官成都靈武元從普恩之外三品巳上更賜一級四品巳下更加一階寶應功臣普恩之外三品巳上各與一子六品官賜爵一級四品巳下各加兩階更賜勳兩轉五品巳上官子為父後者賜勳兩轉副元帥光弼子儀各與一子三品官并階諸道節度使各一子五品官并階都防禦使及經略等使各與一子六品官并階去歲行幸陝州六軍英武威遠威武寶應射生衙前射生左右步軍等并內外文武百官扈從到行在者三品巳上與一子官四品巳上各加兩階自陝州至上都巳來置頓使及州府長官普恩之外各與一子出身置頓使判官巳下緣路縣令及專知置頓官各加一階其六軍神策寶應射生衙前射生及左右步軍英武威遠威武等諸軍左右金吾將士緣大禮扈從及在城留後者共賜錢五萬貫鴻臚蕃客共賜錢一千貫儀王及彭王巳下諸王男未有官者並準舊例與官其巳封為郡王國公者及永穆長樂巳下長公主及諸郡縣主並嗣王郡王各與一子官皇親五等巳上諸親三等巳下各與一子出身二王之後各與一子官臺省之官事資履歷刺史縣令任在親人職務所更是為理本其左右丞侍郎御史中丞等取曾任刺史者郎官亦取曾任縣令者并所選御史亦宜於錄事參軍縣令中擇仍須資歷稍深者其有官非累歷才行特堪任用者自布衣巳下任所在聞薦委中書門下尚書省考試堪任者不在此限尚書省政理所繫左右丞綱轄攸歸比來百司職事皆廢宜令明徵式令各舉所職百官有論時政得失并任指陳事實具狀進封必宜切直無諱有司白身人亦宜準此任詣匭使進表朕將親覽必加擇用朕每思素儉敦以淳風必約嚴章以齊侈俗其珠玉器玩寶鈿雜繡等一切禁斷諸道攝官頻有處分一切盡停尚聞因循其弊未革即宜申明舊勅勒停三年之喪謂之達禮自非金革不可從權其文官自今巳後并許終制一切不得輒有奏請緣大禮應升壇殿行事者普恩之外更與一子官應在太清宮郊廟諸色職掌者及冊皇太子行事官撰冊并書文及較造冊官普恩之外三品巳上賜爵一級四品巳下加一階仍賜勳一轉天下耆老九十巳上版授刺史七十巳上版授上佐縣令孝子順孫義夫節婦旌表門閭終身勿事五嶽四瀆名山大川今古聖帝明王忠臣義士宜令所管致祭叶五紀者建號以體元受四時者布和而順氣天心可見人欲是從爰立大中之道式受惟新之命朕嗣膺下武獲主多方顧以薄德乘茲艱運戎麾問罪今巳十年飲至策勳雖兇渠之授首勞師黷武豈人主之用心況乃軍役屢興干戈靡定茫茫士庶斃於鋒鏑噫皇穹以朕為子蒼生以朕為父至德不能以被物精誠不能以動天俾我生靈擠於溝壑非朕之咎誰之過歟朕所以馭朽懸旌坐而待曙勞懷罪己之念延想安人之策亦惟羣公卿士百辟庶寮咸聽朕命叶宣乃力務履清白之道還興淳素之風率是黎元歸於仁壽君臣一德何以尚茲廼者刑政不修惠化未洽既盡財力良多抵犯靜惟哀矜實軫於懷今將大振綱維益明懲勸肇舉改元之典宏敷在宥之澤可大赦天下改廣德三年為永泰元年自永泰元年正月一日昧爽巳前大辟巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之僕固懷恩戰伐有功訏謀任重不終臣節輒肆姦凶妄誘異蕃同為不軌朕惟務責己情重舊勳如能翻然來歸必從寬宥其下偏裨等因被驅率不獲巳者及所在山谷草竊反側未安者如能束手而來一切並無所問自廣德元年巳前天下百姓所欠負官物一切放免在官典腹內者不在免限其百姓除正租庸外不得更別有科率刺史縣令與朕分憂彫瘵之人切須撫字一夫不獲情甚納隍有能招輯逃亡平均賦稅增多戶口廣闢田疇清節有聞課效尤著者宜委所在節度觀察具名聞奏即令按覆超資擢授其有理無能政迹涉贓私必當重加貶奪永為殿累農政本也食人天也方春之首重於東作除軍興至急餘一切並停令百姓專營農事其逃戶復業及浮客情愿編附者仰州縣長吏親就存撫特矜賦役全不濟者量貸種子務令安集孝弟力田懷才抱器遺逸未經薦達者各委州府聞奏親當策試量能敘用應見立仗諸軍將士等宜共賜錢五萬貫書稱咸秩詩美懷柔仰惟衆靈念茲多祐其五嶽四瀆名山大川宜令所管牧宰精誠致祭中外寮吏各揚其職無或曠官克副朕意王者欽若昊天誕受丕命莫不協五紀而乘運稽三微以體元上齊璿衡下立人極乃頒歷於惟歲更覃恩於率土朕嗣守鴻業恭臨寶位頃以時當寇難運屬干戈誓衆興師為人除害實賴宗社降福寰宇小康用興淳樸之風庶洽雍熙之化乾坤敷祐大庇生靈文武協心同力王室豈朕薄德而臻於此乃者金革所聚綿歷歲時征賦頗繁人猶彫瘵是用疢心疾首當宁而興懷罪以在予馭朽而貽懼每思宏濟之道用拯黎元之弊月纏星昴律中黃鍾合天正之符承日至之永祥雲在矚既當伯趙之司惠澤布和宜順一陽之氣建元發號革故維新俾及履長之節用深行慶之典可大赦天下其永泰二年宜改為大歷元年自大歷元年十一月十二日昧爽巳前大辟罪巳下巳發覺未發覺巳結正未結正繫囚見徒罪無輕重常赦所不免者咸赦除之長吏犯贓不在免限夫從之道大易至言薄賦之規前王令範朕志遵儉約務欲息人徵歛無期誠為勞弊天下百姓除正租庸及軍器所須外不承正勅一切不得輒有科率國以人為本人以農為業頃繇師旅征稅殷繁編戶流離田疇荒廢永言牧宰政切親人其刺史縣令宜以招輯戶口墾田多少用為殿最每年終委本道按察使節度等使案覆聞奏如課績尤異當加超擢或政理無聞必置科貶逃亡失業萍泛無依特宜招撫使安鄉井其逃戶復業者宜給復三年如百姓先貨賣田宅盡者宜委州縣取逃死戶口田宅量丁口充給仍仰縣令親至鄉村安存處置務從樂業以贍資糧王畿之閒賦歛尤重百役供億當甚艱辛哀我疲人良深憫念盍徹之稅著自周經未便於人何必行古其什一稅宜停周徵俊造漢辟賢良垂之典謨永代作則天下有安貧樂道孝弟力田未經薦用者委所在長官具以名聞奏朕當親自策試量才敘用其立仗將士等定賜物五萬匹五嶽四瀆名山大川祀典攸存神理昭著宜以禮致祭自古帝王順時行令當北至之炎燠應南風之長嬴必事無刑解網申惠敘麥秋之氣而代天理物矣朕獲奉珪璧虔恭郊廟一紀有餘承累聖之鴻業為兆人之父母戰戰兢兢恐不克濟而天地幽賛陰陽化育關輔之內農祥薦臻嘉穀豐衍宿麥滋殖閭閻之閒倉廩皆實百價低賤實曰小康此皆上帝報貺烈祖儲祉卿士存誠黎元盡力之效思與萬方百辟咸共樂之而未能也況或抵常憲纍然就拘辨對官曹幽閉獄戶永惟械繫之慘追復冒犯之繇皆自王化之未醇風教之多闕俾民忘恥格俗虧禮讓陷在刑典久於狴牢當順陽助生之時積冤蔽感傷之氣百姓有過在予一人顧諟欽恤誠切傷痛用申在宥之旨庶洽惟新之令自大歷八年五月二十五日昧爽巳前天下繫囚見徒及巳發覺未發覺巳結正未結正死罪並降徒流巳下罪並宜放免敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初夫承天之敘則三時有成自中形外則四海蒙福嗟爾庶士諒悉予懷朕誕膺天命以撫方夏兢兢多惕保祐惟人懼庶獄之未孚俾一夫之不獲思用哀恤與之和寧頃屬夷夏多虞干戈是務徵賦頗重黎元不康內迫艱窮外乘師旅因行盜竊自陷典刑纍然圜土之下佇剿視陰之命永念愚惑惻焉疚心而寰宇之閒舉類斯衆今火中惟夏長嬴及時鬱然沈繫致傷和氣萬方有罪在予一人將洽至淳之化更布惟新之理其大歷九年四月二十四日昧爽巳前大辟罪巳下巳發覺未發覺巳結正未結正罪無輕重一切並宜放免敢以赦前事相言告者以其罪罪之其在軍將士有刀箭所傷久嬰沈疾者勠力疆場致身鋒刃各委所繇量給藥物厚加優賞其陣亡將士仰本路隨事優恤妻子各申錫賚其百姓鰥寡孤獨不能自存者困窮無主誠可哀傷仰所在州府長官每事以諸色官物量加贍恤令其得所亡命山澤挾藏軍器百日不首復罪如初在宥之典既周動植純嘏之錫庶延子孫凡在品類各宜遷善宣示中外諒悉朕懷皇矣至覺子於元元截有海以般若之舟翦稠林以智慧之劒綿絡六合羅罩十方宏宣也深志廣也大自權輿天竺泳沫漢庭行無緣之慈納常樂之域信其博施傾芥城而逾遠仰夫湛寂超言象之又元五始不究其初一得罔根其本以彼取此何其遼哉朕忝嗣鴻休丕承大寶軫推溝以夕惕方徹枕而假寐夫其鎮乾坤遏寇虐和風雨著星辰與物無為乂人艱止不有般若其能巳乎嘗澡身定泉宅心祕道緬尋龍宮之藏稽合鷲峯之旨懿夫護國實在茲經竊景行於波斯庶闡揚於調御至若高張五忍足明惻隱之深永袪衆難實惟化清之本名假法假心空色空推之於無則境智都寂引之於有廼津梁不窮思與黎烝共臻實相而緹紬貝葉文字參差東夏西天言音訛謬致使古今翻譯清濁不同前後參詳輕重匪一其猶大輅終繼事而增華譬彼堅冰始積水而非厲先之所譯語質未融披讀之流臨文三覆凡諸釋氏良用慨然先聖翹誠玉毫澹慮真境發揮滿教搜綴缺文詔大德三藏沙門不空推校詳譯未周部卷三藏學究二諦教傳三密義了宗極伊成字圓褰裳西指汎杯南海影與形對勤將歲深妙印度之聲明洞中華之韻曲甘露沃朕香風襲予既而梵夾遠賚洪鐘待扣佇延吹萬之籟率訓開三之典朕哀纏欒棘悲感霜露捧戴遺詔不敢怠遑延振錫之羣英終為山之九仞開府朝恩許國以身歸佛以命弼我真教申夫妙門爰令集京城義學大德良賁等翰林學士常衮等於大明宮南桃園詳譯護國般若畢並更寫定密嚴等經握槧含毫研精賾邃曩者訛略刊定較然昔之沈隱鉤索煥矣足可懸諸日月大燭昏衢潤之雲雨橫流動植伏願上資仙駕飛慧雲於四天迥出塵勞躡金蓮於十地朕理昧幽關文慚麗則見推序述惋撫空懷聊紀之於首篇庶克開於厥後將發皇永永可推而行之時旃蒙歲木堇榮月也朕聞西方有大聖人焉演不言之言垂無教之教啟迪權實發披聾瞽遷其善者不疾而速階其益者即聖自凡擊蒙求于娑婆邱陵示達觀于密嚴世界匪染淨在我實是非游而楚越生于念中盈缺頓于目下彼魚藏鳥逝其若是乎欽哉密嚴迹超三有量同乎法界相離于極微非聲聞之所聞豈色見之能見嘗潔己至妙允恭付囑是欲泉靜識浪珠清意原窮賴邪能變之端照自覺湛然之境深詣心極其惟是經夫翻譯之來抑有由矣雖方言有異而本質須存此經梵書並是偈頌先之譯者多作散文蛇化為龍何必變於鱗介家成於國寧即改乎姓氏矧訛略輕重或有異同再而詳悉可為盡善大興善寺三藏沙門不空像教棟梁愛河舟楫戒珠在握明鏡入懷雪涉雲征窮鹿野之真諦帆飛海宿究馬鳴之奧旨聲該八轉言善兩方足可窺鑒闕如抑揚了義詔令集京城義學沙門飛錫翰林學士柳抗等詳譯斯文及護國經等對執貝多翻諸簡牘憑其本夾依以頌言太羹之味不遺清月之魄恒滿豈不美歟豈不美歟朕詞乏清華文非遒麗志流衍於祕賾將布濩於無窮聊課虛懷序之篇首云爾
