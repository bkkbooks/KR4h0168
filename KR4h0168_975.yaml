front:
  text: 全唐文欽定全唐文卷九百七十五闕名十六
  hash: sha256:5fe6219071e4b18ee4d032e57edaf918d95abe0d6bac1f89adca2e7c29b98d68
body:
  text: 謹按王者正位作為人極朝有公卿之列室有嬪御之序內政修而家理外教和而國安爰自周代洎乎漢室名號損益時或不同然皆寤寐賢才博採淑令非唯德洽宮壼抑亦慶流邦國近代以降情溺私寵掖庭之選有乖故實或微賤之族禮訓蔑聞或刑戮之家怨憤充積而濫吹名級入侍宮闈即事而言竊未為得臣等伏請今日以後後宮及東宮內職員有闕者皆選有才行充之若內無其人則旁求於外采擇良家以禮聘納七廟觀德義冠於宗祀三祖在天式章於嚴配致敬之情允洽大孝之道宜宣是以八佾具陳肅儀形於綴兆四懸備展被鴻徽於雅音考作樂之明義擇皇王之令典前聖所履莫大於茲伏惟皇帝陛下天縱感通率由宜極孝理昭懿光被於八埏愛敬純深追崇於百葉永言錫祚斯宏頌聲鐘律革音播鏗鏘於饗薦羽籥成列申蹈厲於蒸嘗爰詔典司乃加隆稱循聲核實敬闡尊名竊以皇靈滋慶濬源長委邁吞燕之生商軼擾龍之肇漢盛韜光於九二漸發迹於三分高祖縮地補天重張區宇反魂肉骨再造生靈恢恢帝圖與二儀而合大赫赫皇道共七曜以齊明雖復聖跡神功不可得而窺測經文緯武敢有寄於名言敬備樂章式昭彑範皇祖宏農府君宣簡公懿王三廟樂請同奏長發之舞太祖景皇帝廟樂請奏大基之舞世祖元皇帝廟樂請奏大成之舞高祖大武皇帝廟樂請奏大明之舞文德皇后廟樂請奏光大之舞七廟登歌請每室別奏舅服同姨小功五月而今律疏舅報於甥服猶三月謹按旁尊之服禮無不報已非正尊不敢降之也故甥為從母五月從母報甥小功甥為舅緦麻舅亦報甥三月是其義矣今甥為舅使同從母之喪則舅宜進甥以同從母之報修律疏人不知禮意舅報甥服尚循緦麻於例不通理須改正今請修改律疏舅報甥亦小功禘祫二禮俱為殷祭祫謂合食祖廟禘謂禘序尊卑申先君逮下之慈成㣥嗣奉親之孝事異常享有時行之然而祭不欲數數則黷亦不欲疏疏則怠故王者法諸天道制祀典焉蒸嘗象時禘祫如閏五歲再閏天道大成宗廟法之再為殷祭者也謹按禮記王制周官宗伯鄭元注解高堂所議並云國君嗣位三年喪畢祫於太祖明年禘於㣥廟自爾已後五年再殷一祫一禘漢魏故事貞觀實録並用此禮又按禮緯及魯禮禘祫注云三年一祫五年一禘所謂五年而再殷祭也又按白虎通及五經通義許慎異議何休春秋賀循祭議並云三年一禘何也以為三年一閏天道小備五年再閏天道大備故也此則五年再殷通計其數一祫一禘迭相乘矣今太廟禘祫各自數年兩歧俱下不相通計或比年頻合或同歲再序或一禘之後併為再祫或五年之內驟有三殷法天象閏之期既違其度五歲再殷之制數又不同求之禮文頗為乖失說者或云禘祫二禮大小不侔祭名有殊年數相去祫以三紀抵丸而合禘以五斷至十而周有茲參差難為通計竊以三祫五禘之說本出禮緯五歲再殷之數同在其篇會通二文非相詭也蓋以禘後置祫二周有半數以全數謂之三年一閏只用三十二月也其禘祫異稱各隨四時秋冬為祫春夏為禘祭名雖異為殷則同譬如礿祠蒸嘗其體一也鄭元謂祫大禘小傳或謂祫小禘大肆陳之閒或有增減通計之義初無異同蓋象天之法相傳久矣惟晉代陳舒有三年一殷之議自五年八年又十一十四尋其議文所引亦以象閏五年一禘又奚所施矛盾之說固難憑也夫以法天之度既有指歸稽古之禮若茲昭著禘祫二祭通計明矣今請以開元二十七年巳卯四月禘至辛巳年十月祫至甲申年四月又禘至丙戌年十月又祫至巳丑年四月又禘至辛卯年十月又祫自此五年再殷周而復始又禘祫之說非唯一家五歲再殷之文既相師矣法天象閏之理大抵亦同而禘後置祫或近或遠盈縮之度有二法焉鄭元宗高堂則先三而後二徐邈之義則先二而後三謹按鄭氏所注先三之法約三祫五禘之文存三歲五年之位以為甲年既禘丁年當祫巳年又禘壬年又祫甲年又禘丁年又祫周而復始以此相承祫後去禘十有八月而近禘後去祫三十二月而遙分析不均粗於算矣假如攻乎異端置祫於秋則三十九月為前二十一月為後雖小有愈其間尚偏竊據本文皆云象閏二閏相去則平分矣兩殷之序何不等耶且又三年之言本舉全數二周有半實准三年於此置祫不違文矣何必拘滯隔三正乎蓋千慮一失通儒之蔽也徐氏之議有異於是研核周審最為可憑以為二禘相去為月六十中分三十置一祫焉若甲年夏禘丙年冬祫巳年夏禘辛年冬祫有象閏法毫釐不偏三年一祫之文既無乖越五歲再殷之制疏數又均校之諸儒義實長矣今請依據以定二殷豫推祭月周而復始伏以師古雖是師道親兄師古身存之日先未祔廟今廟因師道而立即師道便合是百世不遷之宗謹按封爵令傳襲之制皆子孫以下相繼並無兄弟相繼為後之文則明師古神主不合入師道之廟若師古男自有四品三品官兼有封爵准開元禮合待三年喪終禮祭畢後別立廟宇設師古神主座行祔祭之禮自承宗祀庶合禮經王者崇高以配天廣大以法地章明以象日月誠信以合四時謂之令王諡以全德所以名盛烈昭至公堯舜禹湯文武成康是也伏惟大行皇帝由疏封以繼明自前星而受命以四海為養以萬乘問安稽古古法天自家刑國穆穆峻德煌煌大明煥乎人神塞乎天地國家天寶之季宿兵中原強侯專地往往而有號令不一朝廷包羞元和燀威霆擊篲掃戡夏翦蜀擒潞殄吳夷蔡取齊朝滄納定開千載之期運平六葉之梗俗動也用軒轅之干戈靜也戢武王之弓矢聖神之道其至矣乎以無方之能行不宰之用濟天下之務施天下之仁夷狄之情僞遐邇之虛實揣其變化權其後先屈指前算若合符契多士濟濟任其器略文武俊傑畢力致用綱目張而萬化具斟酌明而百事宜委庶務於廟堂之上壽百姓於循良之府開直言之路庶無蔽聽闕廣大之恩物無違性宥恕刑獄哀惠困窮省薄徭賦尊禮耉老約已恭儉推心平明公卿大夫任德終耆近狎貴寵畏忌守法採納㣥正聽斷精慎忠直樹立讒邪不行巍巍成功赫赫在上春秋左氏傳曰武有七德禁暴戢兵保大定功安人和衆豐財之謂也殲夷姦宄災害訖息禁暴也淮河底定大赦疵人戢兵也歸馬於汝南漢南散卒於齊梁淮楚保大也封有勞爵有德定功也寬天下之蠶絲舉域中之方正安人也赦生致之寇虜爵拒命之戎將和衆也乘輿服御儉而有制賜與供給惠而中節豐財也神武不殺之德其若是焉不登軒年不享舜壽百姓思慕如喪考妣同軌畢至昭庭有時敢奉官常尊名稱德謹按諡法兵禁殘暴曰聖應變無方曰神洪度大明曰章為人除害曰武慈惠愛親曰孝戮鯨鯢而清四海不曰聖乎裁造作而刑一德不曰神乎洞明哲而貞百度不曰章乎推仁義而服萬物不曰武乎戴尊親而諧五典不曰孝乎書曰惟天聰明惟聖時憲法也敏也謹酌之諡法質諸六經謹上尊諡曰聖神章武孝皇帝廟號憲宗謹議臣祐議曰夫垂天人之盛美庖犧建其極含昊穹之正氣金天侔其稱仁聖或異號諡則殊至於兼包二體昭宣一德有自來矣我今因之爰徵克類以騰茂實伏惟大行皇帝睿鑒通微神智周物平由藩邸式踐儲闈誕膺眷命用建皇極纘承丕緒克紹洪勳允釐帝載光被王度以易簡凝庶績以仁和壽蒸人明遂事而虛受進昌言而不咈清廟嚴薦中壼問安彰愛以誠因心則著永言恭默思致雍熙敷祐庶氓宗承古訓徵特牲之盛禮蘊祈穀之至誠親率公卿祇奉郊祀爰舁大輅俯及端門休祥告應非烟在上輪囷五色回復半空六轡時按百辟稱賀逮圜丘展敬天感樂和柴燎告終人神胥悅於是雷雨作解惠及萬方布乘春之煦育行惟新之頒賜詳延莊彥敷納正辭納哀敬之書用寬大之典鮐背是恤虐繆斯平優賚困窮矜蠲逋賦三光增耀㣥物昭蘇葳蕤汪濊之澤不可得而名也東寇猖狂在浚為畔有征之日殲厥渠魁此所謂王者之師不戰而克也昆夷恃衆崆峒騁武亟為邊患時漸睿謨煩戊巳之戍勞癸庚之修自我新命咸歸舊封款叩旁午求成修好俯從坎血之懇猥加築館之榮弓矢載櫜亭障罷警倚成輔弼清一區宇無私之覆既均不宰之功遽化矧乃優游乎文史之內精窮乎草隸之源崇杖席而選文儒設官司而尊侍從所以講求為務聽納居多遵三代之盛猷垂億載之休烈雖疾留聖體而慮發宸衷每求衣夙興太陽但出沒金是請方事撝謙憑玉俄聞奄承末命年冀踰於堯舜時忽從於軒鼎六龍飛蓋以上升萬姓號天而靡及今因山既卜同軌將臻爰究德威式循典禮周書曰睿作聖又前儒闕睿聖也謹按諡曰敬禮祀享施為於人皆曰聖大行皇帝虔恭郊廟軫志黎元教尚不嚴化行無眹不為聖歟又慈惠愛人道德博聞皆曰文赦三就之刑採百氏之奧仁恕育物寬明致理不為文歟又慈仁好與柔質虛受皆曰惠溥錫貧窶哀及鰥寡開延納之路容讜直之言不為惠歟又曰秉德不回慈惠愛親皆曰孝文以繼明聖資統御服勤不替就養無方不為孝歟考古諡而符德教請上尊諡曰睿聖文惠孝皇帝廟號曰穆宗謹議伏奉四月二十八日敕前同州朝邑縣尉韓約進狀請祔亡父故金紫光祿大夫守尚書左僕射贈太子太保皋神主付禮院議定聞奏者謹按禮經諸侯二品以上祠四廟五品以上祠三廟今據韓皋祖休先已立先祖廟三室今子孫見繼昭穆享祭皋父滉是衆子官至二品身歿後長子㣥官至國子監司業已別立禰廟祔滉神主入廟今子孫承襲自為一宗皋是滉次子官雖一品身歿無升祔廟文伏惟禮記云別子為祖繼別為宗繼禰者為小宗若皋子約官至五品清資即合別置禰廟祔皋神主自列昭穆庶合禮經定罪者必原其情議事者必究其本庾威均稅之法情實擾人顧其施為必有工拙工者何也富戶業廣以資自庇産多稅薄歸於羸弱威能盡簡并包者加籍取均困窮者蠲減取濟稅既頓異法亦稍嚴事歸平一人無寃訴此所以威之工也其拙何也五縣土廣人姧徵簿書即隱占居多簡田苗即驚擾為慮散亂村野胥徒千人雖成功於已事之時而受斃於作法之始豈無他術用以周知竟此紛紜斯所以威之拙也大凡為郡止於四過一者私加公稅二者逃失黎氓三者虐害平人四者富潤私室庾威改張稅額賦不加徵聯帛丿糸歉灾人悉安業刑甚峻而下無屈祿不厚而賞無濫顧茲四者威無一焉而以擾人均稅投荒黜遠是使循常守故者得以稱功革斃去姧者坐以招譴誰能自苦納諸刑名勸沮之風於斯何在官職黜削本自庾威罪既無名官吏所宜牽復臺司所勘定稅本謂有害於人事既無私理當免復若因其案驗舉察細微以法吏合置科條在衆議須明本未郡人遠訴益表事情幸遇聖明合從昭雪按春秋新宮災三日哭傳曰新宮宣公廟也三日哭禮也按國史開元五年正月二日太廟四室摧毀時神主皆存迎奉於太極殿安置元宗素服避正殿寶應元年肅宗還京師以宗廟為賊所焚於光順門外設次向廟哭歷檢故事不見百官奉慰之儀然上既素服避殿百官奉慰亦合情禮竊循故事比附參詳恐須宗正寺具宗廟焚毀及神主失墜事由申奏皇帝素服避殿受慰訖輟朝三日下詔委少府監擇日依禮新造列聖神主如此方似合宜伏緣採栗須十一月漸恐遲晚比令五日內殿起居慮百司有事論奏中外或為擁隔至於朔望入閣亦是朝廷舊儀李琪自領憲綱每循故事備官條奏頗叶國章望依所奏盧文紀踐履清華昭彰問望行巳每聞於端慤操心動絶於阿私以為將聳效官莫先較考欲明書於殿最冀顯示於勸懲況將相兩途尤為重委慮無報國最要聞天欲迂宸毫親書常課誠有塵於聖德亦是責以佐君直道不欺忠規可尚至於所陳黜陟並叶規繩以此責成庶求良吏事無疑礙理可施行據太常禮院申明宗聖德和武欽孝皇帝今月二十日祔廟太尉合差宰臣攝行緣馮道在假李愚十八日私忌在致齊內今劉昫又奏見判三司事煩請免祀事今與禮官參酌諸私忌日遇大朝會入閣宣詔尚赴朝參今祔饗事大忌屬私齊日請比大朝會宣召例差李愚行事李自倫義居七世準敕旌表門閭先有鄧州義門王仲昭六代同居其旌表有廳事步欄前列屏樹烏頭正門閥閲一丈二尺二柱相去一丈柱端安瓦桶墨染號為烏頭築雙闕一丈在烏頭之南三丈七尺夾街十有五步槐柳成列今舉此為例則令式不該今詳前後敕條凡母皆太字存歿並同此即是父歿母存即敘封進封內加太字母歿追封亦加太字故云存歿並同若是父在據敕格無載為母加太字處若以妻近敕因子貴與父命官父自有官則妻從夫品可以封妻父在不合以其子加母太字若雖有因子之官其品尚卑未得廕妻亦不合用子廕之限
