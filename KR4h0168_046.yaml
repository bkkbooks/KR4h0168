front:
  text: 全唐文欽定全唐文卷四十六帝諱豫肅宗長子開元十四年生初名俶年十五封廣平王至德二年進封楚王乾元元年改封成王四月册為皇太子改今名寶應元年四月即位二年上尊號寶應元聖文武孝皇帝在位十八年年五十三諡曰睿文孝武皇帝廟號代宗
  hash: sha256:5b93e74bc4bb4af27880e6f715c47931e21aa4468b065929f9cce7fde13d0c26
  markers:
  - {type: head, offset: 12, content: 代宗皇帝, id: KR4h0168_NFKB_046-h1, level: 1}
body:
  text: 門下國之大事戎寄為先朝有舊章親賢是屬故求諸必當用制於中權存以至公豈慚於內舉特進奉節郡王適天資淳懿夙表岐嶷深謀祕略可謂生知樂善近仁非由外獎檢身以禮率性惟忠將有事於四方且申爾志俾啓行於十乘式佇其能故可敬慎厥猷勤宣乃力克奉君親之命載清寇孽之餘允副僉諧宜從茲授可天下兵馬元帥餘如故論道之官兼平水土神化之本皆屬陶鈞仗以勳賢執茲大政開府儀同三司行兵部尚書判元帥行軍司馬間廣既等使上柱國尚父李輔國先聖同德皇家保衡經綸雲雷負揭日月佐命之義格於蒼穹親必造膝言皆投水功高彌損任重不矜芟夷內難義形於色姦邪黜伏宗社獲安大廈再崇九鼎增重肆豫小子繼守萬方頃以寡薄賴於營救巖廊是倚舟楫可乘且名冠雲臺未登公輔績參天造猶缺苴茅久遂推挹恐乖彞典朝廷百辟屢進昌言乃申弼亮之謨式副羣公之請主茲空土拜以專車更誓山河用加井賦宜俞往諧之命永叶褒優之禮可司空兼中書令兵部尚書食實封八百戶三年之喪天下達禮苟或變革何以教人朕遘茲閔凶攀號罔極公卿固請俾聽朝務斬焉縗絰痛貫心靈豈可便議公除遽移諒暗昨見所司儀注今月十三日大祥十五日從吉仰憑遺制又欲抑豫竊惟哀思深謂未可其百寮並以此釋服朕將繼武丁之道素冠之詩恭默再周不忍權奪凡庶在位宜悉哀懷功崇望重加以服章德厚流光延其懋賞爰益苴茅之典並明幹蠱之才副元帥太尉兼侍中都知河南淮南淮西山南東道諸節度行營事上柱國臨淮郡王李光弼元勳濟代公輔推賢宣大化之神明總專征之師律自出征移鎮距海負河連率百城旌旗千里東郊誓衆雅繼魯侯之功北伐擁旄首稱漢將之略高牙罷設重鼎斯調尤知武庫之寶實在雲臺之右疇其真食美以保家僉議永諧舊章斯舉敬哉有土更載丹書之盟鯉也趨庭宜升紫綬之寵可加食實封二百戶仍與一子官階三品餘並如故搆廣廈者審象於宏材經萬邦者注意於良弼自非道符夢卜名冠簪裾何以永副虛求式諧時望銀青光祿大夫國子祭酒兼御史大夫京兆尹判度支充勾當度支等使上柱國彭城縣開國伯劉晏應期生德維嶽降賢文為君子之儒器蘊通人之量學苞前典志在於直方詞蔚古風義存於比興自兼京劇職總均輸變而能通宏適時之務居難若易多濟物之心頃者戎事方殷軍賦惟錯率皆倚辦每務推誠寇難初夷皇猷咨弼周王佐國必自於天官漢代登台咸由於亞相宜應選衆之舉用成亮采之功可金紫光祿大夫吏部尚書平章事勳及度支等使並如故門下建爾茅社所以親諸侯加以金紫所以封異姓蓋章敘之舊制必選功而茂賞開府儀同三司檢校工部尚書兼江陵尹御史大夫充荊南節度觀察處置等使上柱國芮國公衛伯王性與宏毅識資沖遠公直不撓智謀尤深忠厚可移文武是憲幼讀墳典素知名於國庠晚藉韜鈐因效策於戎幕纍膺將帥之重積有艱巨之勳竭力事邊乃誠王室伏波料敵每合我心司馬理軍差強人意自荊門作鎮式是南邦九江孔殷三楚之會澄清節制實得專征而謀求政理開示恩信既愛人而省刑將息馬以論道寬而有制令協於師貞則易從風行於刺舉疆事寧晏厥功茂焉二等之榮允茲馭貴宜錫褒封之命俾光優異之禮可封城陽郡王食邑三千戶餘並如故治道同歸師氏為上化人成俗必務於學俊造之士皆從此途國之貴遊罔不受業修文行忠信之教崇祗庸孝友之德盡其師道乃謂成人然後揚於王庭敷以政事徵之以理任之以官置於周行莫匪邦彥樂得賢也其在茲乎朕志承理體尤重儒術先王設教敢不虔行頃以戎狄多虞急於經略太學空設諸生蓋寡絃誦之地寂寥無聲函丈之間殆將不掃上庠及此甚用閔焉今宇縣乂寧文武並備方投戈而講藝俾釋菜而為禮一作俾釋耒以行禮使四科咸進六藝復興神人以和風化浸美日用此道將無間然其諸道節度觀察都防禦等使朕之腹心久鎮方面眷其子弟為奉義方修德立身是資藝業恐干戈之後學校尚微僻居遠方無所咨稟山東寡問質疑必就於馬融關西盛名尊儒乃稱於楊震負經來學宜集京師其宰相朝官及神策六軍諸將子弟欲得習學者自今巳後並令補國子學生欲其業重籝金器成琢王日新厥德代不乏賢其中身雖有官欲附學讀書者亦聽其學官委中書門下選行業堪為師範者充其學生員數多少所習經業考試等并所供糧料及緣學館破壞要量事修理各委本司條件聞奏務須詳悉稱朕意焉敕合體者君臣之分二心者天地同誅搆茲亂階與衆共棄開府儀同三司行太僕卿兼御史中丞神策軍兵馬都虞淄川郡王劉希暹幸以微謬闕榮秩典司禁戎作我心膂外雖承命內不盡忠泄漏朕言幾危吾事念常任使冀以自新分委戎柄授之經略而干冒貨賂溪壑無厭恣以苛刻師人積怨輒懷顧望潛蓄異圖假談咎徵上悖天理誘吾忠良之士妄言禍亂之端惡狀巳彰情在難恕賴勳賢竭力沮發姦凶遂命公卿兼之法吏再三訊鞫情款昭然戮尸市朝未云塞責氂纓盤水尚許歸全特從寬典宜使自盡朕臨馭萬邦於茲九稔每以外攘夷狄未戢干戈常亦推食解衣躬撫將校義均休戚期保終始明神所知誠契未負禁網踈闊小過必遺豈虞姦臣有此干紀罪成惡稔以置嚴科天下之法不可私也刑其無捨良用憮然文武庶寮宜悉朕意巴南諸州仍歲水旱迫於凍餒或至流離因有剽竊苟全性命懼刑網之所及姑嘯聚以相依抑有繇焉蓋非獲巳永言其弊用軫於懷如能相率來歸各安生業並無所問咸許自新宣示中外咸使知悉淮南數州夏秋無雨朕精誠奉天誡懼臨下唯恐明有所不照聽有所不達百辟卿士咸弼豫違宣示百姓令知朕意敕大將在外勤勞有功或未進秩必當加賦更書侯社益茂朝章四鎮北庭行軍兼涇原等州節度使開府儀同三司檢校工部尚書兼御史大夫上柱國扶風郡王馬璘以牧人御衆之才膺方叔召虎之任理事詰禁以屏西郊撫和其人一乃心力智謀濬發忠義侃然武能用典師在制命紀逖伐叛服柔示懷懲密人之不恭執戎子以數罪務於禮德以濟威刑關右寧謐賴其鎮定社稷之衛豫嘉乃勳厚其田租式寵戎閫可加實封二百戶餘如故周漢之儀湯沐之制車服次於王后容衛榮於戚藩其淑德竟夭於茂年成禮未主於同姓則加其懋榮舉於前典是以東漢追平原之封西晉崇宸獻之命故第五公主天縱柔和性成聰敏爰自辨識秀於人倫仁義切於衷誠怡順適於師訓先意承旨不待明言省醴適饌每加豐潔送迎匪憚於寒暑溫扇無待於傍人甘去繁奢樂聞禮教將有詞請必溫顏或遇憂勞輒形焦色周旋六行諷詠七篇霽威怒以拯危伺歡愈而進善常求惠下聚請求賢而齠齔之辰清羸多疾沈綿袵席彌歷紀年針艾嬰身藥餌在口異在殊常之命實有兼愛之慈與之名都假以榮號闕築館之盛乃從受邑之期優典未彰幼齡巳謝追懷既往痛悼滋深方展禮於舊章稍申哀於備物叶豫素志厚爾飾終可追封華陽公主因親之愛存則均慈緣情之禮歿而逾厚故第六公主敏識沖和韶姿婉秀純孝之性自合於天經柔順之心夙成於閫則動惟中禮言必知徽承夙烈之元風悟道家之真籙方開魯館甫往有行未啓漢封遽幽長往念其早夭倍軫哀情用追湯沐之榮載錫靈仙之號可追封玉虛公主門下侍郎同中書門下平章事王縉附會姦邪阿諛讒佞據茲犯狀罪至難捨矜以耄及未忍加刑俾申屈法之恩貸以嶽牧之秩可使持節括州諸軍事守括州刺史宜即赴任於戲朕恭己南面推誠股肱敷求哲人將弼豫理昧於任使過在朕躬無曠厥官各慎厥職平章事制體國經務亮采惠疇以遂萬物之宜以刑四方之禮彌縫衮職金玉王猷平景緯於台階濟鹽梅於鼎飪必先時俊允膺旁求朝議大夫守太常卿兼修國史賜紫金魚袋楊綰贍學懿文崇德廣業表微藏用適務知章朝議郎守尚書禮部侍郎集賢院學士上柱國賜紫金魚袋常衮志業貞諒理識宏深守正居中確乎難奪頃以戎車未戢方事仍殷永言庶政有乖彞敘今將本俗刑教澄源振綱宣九德以阜成張四維而翼贊洽於僉論咨爾具瞻往副審象之誠懋緝時雍之化綰可中書侍郎同中書門下平章事集賢殿崇文館大學士修國史散官勳賜如故衮可門下侍郎同中書門下平章事太清太微宮使崇文宏文館大學士散官勳賜如故朕在藩邸理兵西夏建於元子受律東郊時更否泰再同休戚可贈禮部尚書門下關內河東副元帥左廂兵馬使同朔方節度副使開府儀同三司試太常卿兼御史中丞上柱國庸國公京杲文武成器公忠立節副旌麾於戎閫戒士馬於轅門縱橫有謀沈毅多勇守能重固戰必先登宏變通以制用崇取勝之嘉績勤王憂國歷險不渝奉職在公始終無替封建之制率由舊章以功詔爵議賞從重宜分茅於二等俾有國於千乘可封晉昌郡王食邑三千戶朕不德不明俾大臣憂疑朕之過也朕甚自愧公勿以為慮工部尚書兼御史大夫隴右節度觀察等使大寧郡王僕固懷恩經武大才濟時良具今以寇窘河雒思用討除宜輟務於西陲俾廓清於東夏可充朔方行營節度使本官封如故推薦之道必務於至公賞罰之間亦資於不濫其諸色舉人等須有處分令薦所知實佇才能用施政理自宜慎擇以副虛懷古者效官三歲考績善惡既著褒貶斯存舉之得人必受旌能之賞舉之失選亦加懲過之罰賞罰之典期於必行凡百具僚宜知朕意前襄州刺史裴茙性本頑踈行惟狂悖頃因試用爰委軍戎守在要衝無聞方略所以申命來瑱重撫漢南即宜奔赴闕廷謝其曠職而乃顧惜名位輕圖異端誣構忠良妄興兵甲遽令追召敢欲逗留是有無君之心不唯罔上之罪又轉輸之物軍國所資擅為費用其數甚廣據其抵犯合置嚴誅但自朕登極巳來屢施恩宥肆諸朝市所未忍為宜寬殊死之刑俾就投荒之謫宜除名長流費州春秋之義貴在於必書君臣之間法存於無赦沮勸式遵於前典進退莫非於至公惡稔既彰明罰難貸開府儀同三司行兵部尚書中書門下平章事充山南東道節度觀察處置等使上柱國穎國公來瑱謬當任用素乏器能亟歷班榮纍經節制蒞職蔑聞於成績登朝虛美於崇名頃者分閫頒條久淹江漢或頻徵不至或移鎮遲留實乖堂陛之儀爰及干戈之忿朕以舊臣宿將道在含宏會其來庭用甄後效超登宰輔光拜夏卿列在三台掩其一眚山陵先遠事委近臣謀謨素闕於大猷卜祝頗聞於私議實虧周慎且間樞言何以輔弼鼎司儀刑簪紱據其所犯合置殊科以嘗侍軒闥用存寬免之辜緬範舊章兼膺黜削之譴其身官爵一切削除教宗清淨禮避嫌疑其僧尼道士非本師教主及齋會禮謁不得妄託事故輒有往來非時聚會並委所繇官長勾當所有犯者準法處分亦不得因茲攪擾分明告示咸使知悉道釋二教用存善誘至於像設必在尊崇如聞州縣公私多借寺觀居止因茲褻黷切宜禁斷務令清肅其寺觀除三綱并老病不能支持者餘並仰每日二時行道禮拜如有弛慢並量加科罰知人則哲堯舜猶難類能而舉古今常式自頃中原多故汔未小康州縣屢空守宰多闕攝官承乏者頗無舉職之能懷才抱器者或有後時之嘆朕所以宵夜不寐側席未遑思宏政理之規冀及大中之道而庶尹卿士列於朝廷豈無協贊之心以助旁求之義其內外文武官中如有堪任刺史縣令及出身前資人中有堪任判司丞尉者宜令京常參官各慎擇所知具狀奏聞諸州刺史縣令既藉寮屬亦宜準此古者得人受賞曾不踰時增秩賜金有國通典其或任非稱職舉不當才顧多附下之心非無不適之罰其所舉人授官後如政能尤異清白著聞三兩考後仰本道觀察使具狀奏聞其舉主及所舉官人並量加進改如懦弱不舉及暴政處置乖宜並冒犯贓私等議罪論刑當亦連坐宣示中外知朕意焉凡在生靈合登仁壽自逢艱阻多致傷殘或寇盜為災斃於鋒鏑或歲時不稔道殣相望枯骨轉尸多未埋瘞朕為人父母良深憫惻將何以示掩骼之禮昭葬骨之仁永念前修豈忘古訓其京城內外應有舊骸骨宜令京兆府即勾當收拾埋瘞仍令中使與所由計會致祭卿等謨明廟堂夾輔王室請正長嫡以崇儲副稱元良之貞固天下之本此調主鬯誠哉是言但以黎庶不康甲兵久頓憂勞旰昃姑務息人與衆共守斯為急務册命之禮輟而未行方俟有年用申盛典高秋元月平秩不遙因其萬物之成繼以重離之照子孫逢吉是謂大同佇至此時依卿所請宜悉朕懷朕嗣守洪名欽承丕搆克清多難奄甸四方聖靈在天元德敷佑南面恭己朕何有焉巨猾削平非豫之武言念海內生人至艱兵鋒猶虞暴骨未掩日旰忘食宵分疚懷遽稱成功良謂虛美元宮甫畢豈宜即及改元寶位至尊何以更言加號宰臣之任職在輔弼勸進之詞深所不取朕內省德薄在於人上紹高祖太宗之天下承上皇先聖之丕業惕然南面常懼君難豈因樂推亦自光大況山陵甫爾濡露增懷宇縣凋殘薰風未暢遽行古制虛受鴻名是用繹思未宜獻可五始之義誠在體元三年之道取其無改所陳徽號亦有舊章若更尊崇得非自聖股肱輔弼惟欲致君空勤誠請之詞未副昌言之理年叶五紀成歲以授時君臨萬邦向明而聽政體元不潤其色處實不為其賓朕若昔大猷允懷恭己務於易豈曰崇高常深負荷之憂敢忘祖宗之烈卿等總括羣議昭升舊章周爰典籍之文鉤校天人之理對揚耿命進勸皇圖請踰年而改元益正位以加號敢廢春秋之義用諧啓沃之心敬允乃誠良多慚德理道同歸求賢是急非人不乂辟士是勤招以弓車設其壇席且優薖軸如待神明朕臨御多方誕敷至化慮遺巖穴載佇雲津知白珩之非寶降元纁於下體一自鳴鑾關外駐驛陝郊每念明揚深勞寤寐聽正言以蘇國疾思碩德以定人訛而猶高士鴻冥幽人豹隱將朕之不德而禮或有遺望干旄之忠告仰少微以嘆息眇然惕勵顧覽河山藿食薇歌往而不返永懷賢者朕甚恧焉今將意達巢居誠通卜兆一麾必起四皓爰來敦其素風成我王道宜令行在側近府州長官搜舉遺逸其有懷才抱器高蹈不仕精加訪擇必以名薦仍須以禮資遣送赴行在賁於邱園待以郎署務令申勸悉朕意焉族談錯立法尚不容同惡陰謀議當從重有一於此情實難原程元振性惟凶愎質本庸愚蕞爾之身合當萬死頃以寬其嚴典念以微勞屈法伸恩放歸田里仍乖克己尚未知非既忘含煦之仁別貯覬覦之望敢為嘯聚仍欲動搖不令之臣共為睥睨妄談休咎仍懷怨望束兵裹甲變服潛行罔顧君親將圖不軌按驗皆是無所逃刑首足異門未云塞責朕猶不忘薄效再捨罪人特寬斧鉞之誅俾正投荒之典宜長流溱州百姓委京兆府差綱遞送路次州縣差人防援至彼捉搦勿許東西縱有非常之赦不在會恩之限凡百寮庶宜體朕懷立嫡以長繼統惟賢三代成規百王令典惟爾元子敬而溫文孝叶天經學深義府克奉趨庭之訓遂成麟趾之才頃總元戎式平巨猾外蕃受律羣帥叶謀咸推兔苑之賢允副龍樓之拜宜膺德舉勿用勞謙卿之伯氏天下文宗位歷先朝名高希代抗行周雅長揖楚詞調六氣於終篇正五音於逸韻泉飛藻思雲散襟情詩家者流時論歸美誦於人口久鬱文房歌以國風宜登樂府旰朝之後乙夜將觀石室所藏歿而不朽柏梁之會今也則亡乃眷棣華克成編録聲猷益茂歎息良深歲之不易征賦繁興河南蕭然江外尤劇供上都之國用給諸道之軍須庶務徵求未遑小息火耕水耨夏葛冬裘充饋運而屢空支戎衣而不足農人少而轉困編戶流而罕歸自北之化未淳大東之詞方切君為心也朕甚痛焉今區宇漸寧凋殘巳甚惕然恭己姑務息人懼惸嫠之無告思省方以親問時邁未可日昃增勞載懷鴻鴈之詩用解吾人之慍必資循行悉以周爰皇皇者華申諭朕志宜令太子賓客兼御史大夫劉晏往諸道宣慰應百姓有徵科煩重人戶逃亡及水旱所損不能支濟者並與本道節度使計會蠲削安存逐便處置訖具狀聞奏官吏之政在邦必聞知無不為公道斯在其租庸使及刺史縣令録事參軍有精於政理及賦役均平州縣之間稱為良吏者具名聞奏別有甄異如或殘忍慢法貪汙敗官有害於人不應時務者亦具狀以聞仍與本道觀察節度使會計舉按四海至廣九重至深思使下情上通嘗令上旨下達務以審慎稱朕意焉為政者宣之使言作事者稽之於衆切於求道務以從人將明目而達聰亦理煩而去惑經國之體庶無闕言文武百官及諸色人等有論時政得失上封事者狀出後宜令左右僕射尚書及左右丞諸司侍郎御史大夫中丞等於尚書省詳議可否具狀聞奏其所上封事除常參官外有時辭理可觀或幹能堪用者亦宜具言詳議官中或見不同者即任別狀奏聞佐命大臣自天所授納於將相委以腹心休戚實同始終無易太保兼中書令靈州大都督府長史單于鎮北副大都護充朔方節度關內支度營田鹽池押諸蕃部落副大使知節度事六城水運使兼河北副元帥上柱國大寧郡王懷恩朕之元輔上帝賚豫道備五才能包三傑長策制敵精誠感神夙奉先朝志平多難援旗朔野扈蹕岐山前驅啓行所指皆克收關河之襟帶復都邑之衣冠以義斷恩毀家徇國躬擐甲胄驅馳十年遇戰則酣逢堅必脆總統戎旅通和夷狄決策東向殲厥渠魁掃清妖氛芟剃逋梗海隅萬里一舉蕩平遂欲息馬投戈坐而論道當朝大政並以咨之聽賡載之歌為千古之式移軍汾上方欲凱旋疑隙之端搆於羣小浮言初起且以強大自嫌邪説又生或謂功高不賞以茲淹恤因而沈猜撫之若驚諭之未解朕以白日旌信明神鑒心若有負功臣是大欺天下為人君者豈有此乎尋聞聚族而謀知欲垂士冖柘入覲其子猶懷反側更有遷延少年輕佻操履非正私庭跋扈違背君親朔方義師心如父子怒其懷二遂共梟懸凶子既誅大軍方擾倉皇奔竄遠在邊州察其深衷本無他志蓋緣憂懼遂至於斯眷念之下無忘鑒寐況勳書盟府像列雲臺録功念勞豈以小而纍大君臣之義情實如初厚祿榮班固宜仍舊但以河北諸將自竭忠誠朔方三軍巳有管屬不可更置統領復為節制其先任靈州都督府長史單于鎮北副大都護及河北副元帥朔方節度等使宜並停其太保兼中書令上柱國大寧郡王並如故但當詣闕更復何疑再三言提庶早牽復欲令方寸懸示萬邦爾無我虞朕言不再久勞於外終必無成收之桑榆殊未為晚甘言之誘王者不為危而悔之將何及矣切令宣示遠副朕懷爵土之封以酬勳德故受之者適當其分使賞在必行而得之者不讓其餘使人有可繼國之彞憲在乎至公往者寇逆亂常京闕失守太尉兼侍中充河南副元帥都知河南淮西山南東道諸節度行營事上柱國臨淮郡王光弼首奉師律翊佐先朝克殄氛祲砥寧宗社自朕纘承丕緒又置大功扶顛履危勤恤於外可謂忠存王室道濟生人則食邑所加抑惟常典小因疾故遽有懇詞不伐茂勳請歸實食覽其章奏增用惘然且福壽之理期於勿藥井賦之錫傳於無窮豈宜暫以微瘵便思獨善將使在其下者何顏受封用阻深誠蓋存大體然謙撝有素志義可嘉足以激厲名節光昭退讓宣示中外咸使聞知卿秉德資忠懿文經武內凝庶績外定羣凶為社稷之元勳實台陛之良輔爰升太尉以冠百寮六府益明九鼎增重而懇守沖讓至於再三確乎丹誠貫彼白日范宣辭位馮異不言雖成功而勿居固時望而無易用旌懇至俯遂乃懷所讓者依優崇之命所以報功總領之司期於賦政卿入居台鉉出統戎旃爰自先朝纍匡多難靖羣氛於海表凝庶績於天階敏事而寡言居敬而行簡人難其易爾易其難所以命掌六聯首茲百辟顧循時議僉謂允諧而纍拜封章懇懷讓挹守淳素之道語政理之源無待禮成曲從德讓宜宣示於外編之史册卿道高王佐才茂國楨敘百揆於中台調四時於元氣乃眷東夏至於海隅爰咨相府之謀出總兵車之會受彼師律主其載書禮有優崇昭茲寵命黃樞受秩元社加封咸重分麾俾光推轂用申彞典何至勞謙即斷來表常伯之任元戎之權自非大臣孰允僉望齊梁郡國淮楚方隅必資相府之賢式統軍司之務爰從益邑懋厥官常朝典巳行何至固讓即斷來表以卿叶宣廟謀綱統戎律軍國大務咸以咨之禮命優崇古今通制爰進珥貂之秩用加書社之封纍表陳情固辭寵數言多激切志益堅貞雖尚德任賢務於褒進而勞謙退讓宜有允從暫紓所懷俯順誠情所讓侍中郡公者宜依鄭州原武尉盧甫亡妻李氏汴州尉氏尉王泛妻裴氏等懿範傳家柔明植性頃因寇難克彰義烈或請代父死表因心之孝或誓逐夫亡標難奪之節宜膺贈飾俾光休美李氏可贈孝昌縣君裴氏贈河南縣君仍編入史册瀾渤亦贈官秩如聞自東都至淮泗緣汴河州縣自經寇難百姓雕殘地闊人稀多有盜賊漕運商旅不免艱虞宜委王縉各與本道節度計會商量夾河兩岸每兩驛置防援三百人給側近良沃田令其營種分界捉搦白鹿白兔王者嘉瑞和平之應朕以寡德詎敢當焉卿及將士等務切軍儲克勤農畝上元眷祐爰獲禎符所請付史館者依竭忠之臣歿不廢命奉上之節行固無私言念飾終抑惟恆典故金紫光祿大夫吏部尚書兼御史大夫充東京留守兼判留司尚書省事東京畿觀察處置使上柱國郇國公韋陟敦敏直方端嚴峻整宏敷典禮表正人倫學冠通儒文合大雅頃者詢謀舊德保釐成周眷彼郊圻資其慎固而凶胡殘醜密邇河洛命居陝虢時俟翦除才加喉舌之榮遽嬰霜露之疾方期克享眉壽冀其有瘳奄此殂歿良深震悼升車而復以申三襚之恩在牖加紳宜崇八座之寵可贈尚書左僕射卿蘊經國之文懷濟時之略軍儲是切轉運攸難勵以公勤適於通變遠疏溝洫績顯京坻爰獎勤勞是明賞勸俾遷六職兼綜九流益用撝謙切陳懇讓宜從雅旨所請者依古者量其國用而立稅典必於經費由之重輕公田之籍可謂通制履畝而稅斯誠弊法所期折中以便於時億兆不康君孰與足故愛人之體先以博施富國之源必均節用朕自臨宸極比屬艱難嘗欲闡淳朴之風守沖儉之道每念黎庶思致和平而邊事猶殷戎車屢駕軍興取給皆出邦畿九伐之師尚勤王略千金之費重困吾人乃者遵冉有之言守周公之制什而稅一務於行古今則編戶流亡而墾田減稅計量入之數甚倍征之法納隍之懼當寧軫懷慮失三農憂深萬姓務從省約稍冀蠲除用申勤恤之懷以救惸嫠之弊京兆府今年合徵八十二萬五千石數內宜減放一十七萬五千石青苗地頭錢宜三分取一在京諸司官員久不請俸頗聞艱辛其諸州府縣官及折衝府官職田據苗子多少三分取一隨處糶貨市輕貨以送上都納青苗錢庫以助均給百官京諸司官等自艱難巳來不請祿料職田苗子又充軍糧頗聞艱辛須使均濟其諸州府縣官及折衝府官職田據苗子多少三分每年宜取一分依當處時價回市輕貨數內破腳差綱部領送上都納青苗錢庫其闕官職田據數盡送仍青苗錢與本道節度觀察都防禦等使會切勾當從今年職田並依此數徵收發遣其送物綱典計數準輕貨綱典例處分求瘼恤隱諒在憂勤罷賦省徭與之休息況因師旅供億頗繁故孝武悔征伐之事魏文隆田租之復同華兩州百姓等頃以賊臣背叛制在凶威淫刑以逞厚斂無度閭閻之內杼軸其空朕旰食增懷納隍自咎將問干紀之罪遂興無戰之師哀我斯人困於日費有牛酒壺漿之犒有資糧屝屨之供凋殘之餘何以堪此言念雕弊豈忘優矜宜給復二年一切蠲免放仍委刺史縣令勞徠安集庶可小康宣示百姓使知朕意三品詔春秋以九命作上公而謂之宰臣者三公之職漢制中書令出納詔命典司樞密侍中上殿稱制參議政事魏晉以還益重其任職有關於公府事不係於尚書雖陳啓沃之謀未專宰臣之稱所以委遇斯大品秩非崇至於國朝實執其政當左輔右弼之寄總代天理物之名典領百僚陶鎔景化豈可具瞻之命恩數不加固當進以等威副其僉屬其侍中中書令宜升入正二品門下中書侍郎升入正三品
