front:
  text: 全唐文欽定全唐文卷一百六十七盧照鄰二
  hash: sha256:0991d62aeb0fdfbe7f51cb4da5d89315fca43adecbde7b3ffd8263a96f8bded8
body:
  text: 余羸臥不起行已十年宛轉匡牀婆娑小室未攀偃蹇桂一臂連踡不學邯鄲步兩足匍匐寸步千里咫尺山河每至冬謝春歸暑闌秋至雲壑改色煙郊變容輒輿出戶庭悠然一望覆燾雖廣嗟不容乎此生亭育雖繁恩已絶乎斯代賦命如此幾何可憑今為釋疾文三篇以貽諸好事蓋作易者其有憂患乎刪書者其有栖遑乎國語之作非瞽叟之事乎騷文之興非懷沙之痛乎吾非斯人之徒歟安可默而無述故作頌曰粵若稽古帝烈山兮遠矣大矣臣太嶽兮欽哉良哉有太公兮卷舒龍豹奄經營乎四履有先生兮乘騎日月期汗漫乎九垓尚書抗節兮屬炎靈之道喪中郎含章兮遇金行之綱頽彼聖賢之相續信古往而今來人何代而不貴代何人而不才鬱律崛岉兮似崑陵之玉石泮渙粲爛兮象星漢之昭回爾其為廣也碧海雲蒸而地合爾其為峻也赤城霞起而天開暨中朝之顛覆家不墜乎良箕紹金柯而玉秀穆蘭馨而菊滋彌九葉而逮余兮代增麗以光熙清風振乎終古妙譽薰乎當時皇考慶豫以弄璋兮肇錫豫以嘉詞名余以照鄰兮字余以升之余幼服此殊惠兮遂閲禮而聞詩於是裹糧尋師搴裳訪古探舊篆於南越得遺書於東魯意有缺而必刊無文而咸補入陳適衛百舍不厭其栖遑纍繭重胝千里不辭於勞苦既而屠龍適就刻鵠初成下筆則煙飛雲動落紙則鸞回鳳驚通李膺而竊價造張華而假名郭林宗聞而心服王夷甫見而神傾俯仰談笑顧盼縱橫自謂明主以令僕相待朝廷以黃散為輕及觀國之光利用賓王謁龍旗於武帳揮鳳藻於文昌先朝好史豫方學於孔墨今上好法豫晚受乎老莊彼圓鑿而方枘吾知齟齬而不當是時也天子案劒方有事於八荒駕風輪而梁弱水飛日馭而苑扶桑戈船萬計兮連屬鐵騎千㣥兮啓行文臣鼠竄猛士鷹揚故吾甘栖栖以赴蜀分默默以從梁其後雄圖甫畢登封禮日方欲訪高議於雲臺考奇文於石室銷兵車兮為農器休牛馬兮崇儒術屢下蒲帛之書值余有幽憂之疾蓋有才無時亦命也有時無命亦命也時也命也自前代而痛諸道之乖也則賢人君子伏斧鑕而不暇時之來也則屠夫餓隸作王侯而有餘三仁猖狂兮為奴為戮八子狼狽兮為醢為葅長劒以撝尚想華亭之鶴孤舟欲近遙憶閶門之魚史遷下於蠶室鄧艾徵於檻車康既幽而愧孫登宣屢困而慚寧蘧固其閉門少事蹈滄海而辭組開卷獨得歸茂陵而著書起清流之浩漫長願嗟乎靈胥重曰積怨兮纍息茹恨兮吞悲怨復怨兮坎壈乎今之代愁莫愁兮侘傺乎斯之時皇穹何親兮誕而生之后土何私兮鞠而育之何故邀余以好學何故假余以多辭何余慶之不終兮當中路而廢之彼有初而鮮克兮賢者其猶不欺况陶鈞之象物胡不貞而諒之豈其始終爽德蒼黃變色無心意乎簪履有悲哀乎楊墨已焉哉天蓋高兮不可問地蓋廣兮不容人鐘鼓玉帛兮非吾事池臺花鳥兮非我春寂兮寞歲歲年年長少樂慌兮惚朝朝暮暮生白髮愴恍懭悢兮無所見宛轉聯踡兮獨向隅狀若重狴圓扉之受絏又似乾池涸井之相濡鸞鳳之翮已鎩兮徒奮迅於籠檻騏驥之足已蹇兮空悵望於廷衢龍門之桐半死鄧林之木全枯苟含情而稟氣兮孰能不傷心而疾首乎歌曰歲將晏兮歡不再時已晚兮憂來多東郊絶此麒麟筆西山祕此鳳凰柯死去死去今如此生兮生兮奈汝何悲夫事有不可得而已矣是以古之聽天命者飲淚含聲而就死推不言兮焚於介山妃不偶兮跂於嶷水仰天而歎員憤骨於吳江下淚交頤卿悲歌於燕市天無雷兮聞蟻聚於牀下家非牧兮見牂生於奧裏支離疏之五官已敗哀駘它之六骸不美求時夜兮求梟炙何逼迫之如此為鼠肝兮為蟲臂何煆煉之如彼鬱拂沕滑兮中瞀亂蟠薄煩冤兮長恨惋出戶庭兮遊息千萬里兮無極杳兮靄川綿曠兮水如帶㟹兮籟山崴山纍兮雲似蓋萋兮緑春草生兮長河曲試一望兮心斷續晚兮晼夕鳥沒兮平郊遠試一望兮魂不返蘼蕪葉兮紫蘭香欲往從之川無梁日云暮兮涕沾裳松有蘿兮桂有枝有美一人兮君不知氣欲絶而何為孟夏兮恢台楊柳散兮芙蓉開葉初成兮蠶宛轉花落盡兮燕徘徊望夫君兮不來形枯稿兮意摧頽天何為兮愁苦麥將秀兮多風梅將黃兮屢雨日色旰爛兮流金而爍石地氣燠煜兮滿室而充戶神翳翳兮似灰命綿綿兮若縷一伸一曲兮比艱難乎尺蠖九生九死兮同變化乎盤古萬物繁茂兮此時余獨何為兮腸邅回而屢腐圍棋廢兮時不可兮再來鳴琴停兮人何時以重撫秋風起兮野蒼蒼蒹葭變兮露為霜蟬悲翳兮聲斷雁迷雲兮路長摧折蕭條兮林寡色憔悴藝黃兮草不芳停劒兮懷舊友天外兮思故鄉願一見兮終不得側身長望兮淚浪浪遙兮遠山谷縈回兮屢轉狀若登薊門兮望胡苑斷兮連井邑邱墟兮知幾年又似登隴首兮見秦川木葉落兮長年悲紅顏謝兮鬢如絲王孫來兮何遲遲思公子兮涕漣洏風嫋嫋兮雨淒淒螢火飛兮烏夜啼牽牛西北兮星已轉織女縱橫兮河欲低秋夜迢迢兮秋未極愁人耿耿兮愁不息有所思兮在天漢欲往從之兮無羽翼鬱金栧兮木蘭舟青莎裳兮白羽裘戲緑波兮坐芳洲歡不停兮人不留悵容與兮徒離憂元冬慘兮陰氣凝沸泉結兮炎洲冰郊野昏兮寒沙漲河海暗兮繁雲興嚴風急兮密雪下墐戶閉兮無留者盼城郭兮瓊為樹兮玉為樓瞻通路兮駕素車兮乘白馬時眇眇兮歲冥冥晝杳杳兮夜丁丁庭有霜兮月華白室無人兮燈影青披重衾兮魂悄悄臥空牀兮目熒熒御燻爐兮長不暖對巵酒兮憂恆滿悲繚繞兮從中來愁纏綿兮何時斷重曰四時兮代謝萬物兮遷化聽春鳥於春朝聞秋蟲於秋夜花覆地兮無待河傾天兮不借無靈草兮駐朽質乎千年無雕戈兮回踆烏乎三舍夏日長兮繩繩炎風暑雨兮相蒸草木扶疏兮如此余獨蘭單兮不自勝元月兮祁寒窮急景兮摧殘霰雪氛氛兮長委積人事寥寥兮悵漫漫春秋冬夏兮四序寒暑榮悴兮萬端春也萬物熙熙焉感其生而悼其死夏也百草榛榛焉見其盛而知其闌秋也嚴霜降兮殷憂者為之不樂冬也陰氣積兮愁顏者為之鮮歡聖人知性情之紛糾故歎之曰子欲無言吾將焉往而適耳箕有峯兮潁有瀾歌曰歲去憂來兮東流水地久天長兮人共死明鏡羞窺兮向十年駿馬停驅兮幾千里麟兮鳳兮自古吞恨無已命曰昊天不傭兮降此鞠凶昊天不惠兮降此大戾不先不後兮為瘥為瘵痛之撫兮孰知其厲木之柔兮緡之絲之人之溫兮黼之藻之自天佑之兮無不利一者之來兮云何二野有鹿兮其角兟兟林有鳥兮其羽習習余獨何為兮悲攢欒兮憂戢孴南山巃嵸兮樹輪囷北津清泚兮石嶙嶙天之生我兮胡寧不辰少克已而復禮無終日兮違仁既好之以正直兮諒無負於神明何彼天之不弔兮哀此命之長勤百罹兮六極橫集兮我身長攣圈以偃蹇永伊鬱以呻嚬天道何從自古多卬為臧兮匪祐匪仁兮覆庸蹻狠戾兮南汜跖叛渙兮東峯並強大兮薰赫咸壽考以從容勛則天兮朱已矣韶盡美矣均忽焉公侯之系兮必復堯舜之後兮何干執諫兮辛載蕃抗議兮靈年忠於貞兮何仇俱不得其死焉牛一變而為虎鱉三化而作鵑觸氏居蝸而爭地龍伯釣鼇而訴天何變化之殊俗而大小之相懸長無述焉將不死而為賊賢哉回也今不幸而早亡明夷何辜兮羑里洪範何恃兮佯狂我視於天兮亦孔之將孔與溺兮殊貫單與張兮相詭紛紜總總兮若茲羌未得其元已盛之孝兮姚何感而遂開合之恭兮昆何嫌兮不起聖人不議姬旦憤於鴟梟君子無憂周南歌於芣苡五鹿云折退守平陵之田三都已成歸入宜春之里乾不穆兮一為戍一為辰坤不恆兮三成田三成水何斯柱之危脆一夫觸之而云折東西眇其既傾西北豁其中裂有者國竟未掬其烏蟾有歷其都奄以成其魚鱉共何壯兮而損其盈媧何神歟而補其闕天且不能自固地且不能自持安得而育萬物安得而運四時彼山川與象緯其孰為之主司生也既無其主死也云其告誰何必拘拘而局局固可浩然而順之吾知惡之不能為惡故去之曰㣥生之所蠧吾知善之不能為善故就之曰有生之大路雖粉骨而糜軀終不改乎此度重曰子既昧此杳冥兮迷之不知其所屆將寄命於六師訪真訣乎遐外建流星以為期邀白雲而為蓋玉虬紛其旖旎青鸞儼其容裔霓為裳兮羽為旗雷為車兮電為斾噂噂兮上馳遙遙兮橫厲忽若夢兮有覺與巫陽兮相會巫陽為豫兮潔龜龜告豫以雙支朱雀搖而金躍青龍發而火馳蛇登樓兮雞入穴雲北走兮水西垂巫陽曰反兮覆兆不告靈蔡誠不能知造化之心數朽骨焉足以定古今之倚伏請導列缺之前旌陪豐隆之後轂披上帝之元鍵考中皇之祕籙於是排雲旌兮叫諸闕登紫翠兮伏瑤壇靈烏杲其將駕東皇釐其既觀余敷袵而未決兮東皇頷而不言玉女申之以瓊蘂靈妃貺之以琅玕悵容與而不駐肅雲軿於南軒窈窕徘徊邈矣悠哉下臨兮星雨上絶兮氛埃倣徨兮三清之館縹眇兮八風之臺俯觀兮故國洞崢嶸兮無極長懷兮故人涕潺湲兮霑軾橫天苑歷北辰經瑤樓兮一息停余車之轔轔涉明河之清淺過織女而問津巫陽曰左招搖兮右天駟太一之居兮無不利其道也楓為天兮棗為地盍往從之兮導君意太乙方握髯低睂右手拄頤或以日臨命以歲加時再轉兮再考三命兮三推華蓋微明兮君子居貞之位太陽陰主兮天人厄運之期若夫一氣鴻濛萬化緇釐此星精與木局又何足以知之巫陽曰太上有老君焉其名曰伯陽遊閬風之瓊圃處倒景之琳堂披拂日月咀嚼煙霜撫千載兮為朝為暮濟萬物兮若存若亡古之聰明博達而不死者將與君子造崑崙之大荒逮而容與弭節翺翔俄參元而下降濟弱水之湯湯瞵軒臺而右轉對玉檻之鏘鏘伯陽欣然見豫曰升之來何遲何故疲憊之如是何故枯稿之若茲吾適以爾小別今將千二百期昔者爾為翟吾固知爾潔潔焉無益其後爾為舟吾欲告爾休休焉不留名已登乎仙格爾身尚蹇乎中州噫哉甚可痛甚可哭多智也命之斧斤多才也身之桎梏爾形體之在地也每矍矍然求媒精魂之於天也又遑遑焉訪卜何異儀丹鳳於膠柱飼元魚於森木何晚悟之逶迤何早計之觳觫嗚呼何異喪其親也揭竿而求諸海失其子也擊鼓而訪諸道途之遠矣曷其云蘇與影捕逐可不謂悲乎夫道之動也翂翂翐翐靜也若喪若失曭兮不以死生為二塊兮若以天地為一生於萬物之後不為緩死於太古之前不為疾弊萬類也不謂之凶利四海也不謂之吉夫如是則巨浸稽天而不溺鴻災冶地而不然生死不能為其壽夭變化適足寄其騰遷化而為魚也則躍龍門而橫碣石化而為鳥也則培羊角而負青天為社也則長無斤斧之患為瓠也則汜乎泱漭之川物無可而不可何必守固以拳拳余於是乎口答然而喪其偶倏爾而失其知思故池之淥水憶中園之桂枝栩栩然若有得茫茫然若有亡歎倣佛兮覺悟魂已歸乎北鄉其往也人皆為之避席其返也鳥不為之亂行歌曰茨山有薇兮潁水有漪夷為柏兮秋有實叔為柳兮春雨飛倏爾而笑泛浪兮不歸龍集荒落律紀蕤賓余自豐鎬歸於五津從王事也丁丑屆於升仙橋上送客亭即相如所謂不乘高車駟馬不出汝下者也遇蜀父老皤然龎睂華髮者休於斯謂余曰子非衣冕之族歟文章之徒歟飾仁義以干時乎懷詩書以邀名乎吾聞諸夫子曰邦有道貧且賤焉恥也當今萬方日照九有風靡主上垂衣裳正南面而已矣庸非有道乎而子爵不登上造位不至中涓藜羹不厭裋褐不全庸非貧賤乎吾視子形容憔悴顏色疲怠心若涉六經眼若營四海何其無恥也何其不一干聖主效智出奇何栖栖默默自苦若斯吾聞克為卿失則烹何故區區冘冘無所成名余笑而應之曰井魚不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也蓋聞智者不背時而徼幸明者不違道以干非是以聖賢馳騖莫救三家之轍匹夫高抗不屈萬乘之威道在則簞瓢匪陋義存則圭組斯違或立談以邀鼎食或白首而甘布衣或委輅而事屬論都之會或射鉤以相遇匡霸之機亦有朝為伊周暮為桀跖當其時也襲珩珮之鏘鏘失其時也委溝渠而喀喀故使龍邱先生羞聞擁篲雁門太守不知縫掖孟軻偃蹇為王者師范睢匍匐為諸侯客富貴者君子之餘事仁義者賢達之常迹來不可違類鴻雁之隨陽去不可留同白駒之過隙行蘇張之辨於媧燧之年則迂矣用彭韓之術於堯舜之朝則舛矣守夷齊之節於湯武之時則孤矣抱申商之法於成康之日則愚矣彼一時也此一時也易時而處失其所矣大唐之有天下也出入三代五十餘載月竁來庭風邱款塞華旌已偃羽檄已平雖有廉白之將孫吳之兵百勝無遺策千里不留行無所用也社首既禪介邱既封創明堂立辟雍雖有闕里之聖淹中之儒叔孫通之蕝公玉帶之圖將焉設也咸英並作韶武畢用奏之方澤而地祇登升之圓丘而天神降雖有伶倫伯夔延陵子期操雅曲則風雲動激悽音則草木悲又何施也畫衣莫犯囹圄不修雖有咎繇仲甫之器釋之定國之儔金科在握丹筆如流非急務也人歸東戶家沐南薰山澤無蹊隧雞犬不相聞雖有文翁黃霸之述職子遊子賤之絃歌政成禮讓俗被雍和固無取也干戈已戢禮樂已興刑罰已措梁父已升公卿常伯庶政其凝雖有鴻才大略麗句豐詞發言盈乎百代濡翰周乎四時略無益於今日而適足以怫之是故天子恭己㣥臣演成攘袂而陵稷契撫掌而笑阿衡無為而萬物皆遂不言而品彙咸亨莫不稱贊鴻烈揄揚頌聲言殊者招纍行危者相傾效智者輟談於草澤出奇者裹足於山楹許由去而堯臣不少善卷逃而舜德不輕夫周冕雖華猿猴不之好也夏屋雖崇騏驥不之處也載鼷以車馬不如放之於藪穴也樂鷃以鐘鼓不如栖之以深林也此數物者豈惡榮而好辱哉蓋不失其天真也若余者十五而志於學四十而無聞焉詠羲農之化玩姬孔之篇周遊幾萬里馳騁數十年時復陵霞泛月搦札彈絃隨時上下與俗推遷門有張公之霧突無墨子之煙雖吾道之窮矣夫何妨乎浩然今將授子以中和之樂申子以封禪之篇終眇慚乎指地竊所慕乎談天於是蜀父老再拜而謝曰鄙夫瞽陋長自愚惑習俗遐陬不遊上國聞王人之休旨聽皇猷之允塞亦猶獻雉而遇司南御龍而光有北請終餘論永告卭僰若夫三清上列瑤關控日月之圖八洞深居貝闕吐山河之鎮雖復扶桑大帝傳赤字於東華安寶神君受青符於南極猶未能發揮不宰復歸無物之功開鑿妙門言謝有為之業其馮馮翼翼百姓存焉而不知杳杳冥冥萬族死之而無慍獨為衆化之宗者其惟元始天尊乎暨乎蹩蹩為仁跛跛為義鴻臚傳小儒之具緘縢為大盜之術堯禹生而天下火馳姬孔出而㣥方鼎沸則有氤氳帝祖發皓鬢於東周兆朕皇輿飛紫雲於西道鳳交開景返徐甲之營魂龍光照天杜宣尼之神氣得一吹萬有大造於蒼生把十蹈五樹靈基於寶祚能使秦皇東指見赤舄而長懷漢帝北遊望青煙而下拜於是靈山水府俱為鍊玉之場甲第離宮多入空歌之地青牛道士按錦節於中都白鹿仙人列瑤壇於八表乃劒門西拒卭關南望星橋對斗像牛漢之秋橫月硤縈城疑兔輪之曉落武騎遷升之路冠蓋雲飛文翁講肄之堂英靈霧聚巖開菌桂蘊金碧之祥光澗吐夭桃積神仙之粹氣至真觀者隋開皇二年之所立也尋屬煬帝驕淫蜀王奢僭冕旒多事有慙七聖之遊几杖不朝未遑八仙之術紫臺初構霜露霑衣碧洞新開蓬萊變海仙居制度與雲雷而共屯象帝威儀將市朝而猶梗皇家纘戎牝谷乘大道而驅除盤根瀨鄉擁真人之閥閲高祖以汾陽如雪當金闕之上仙太宗以洞山順風屬瑤京之下視武皇帝凝旒紫閣懸鏡丹臺運璇極而正乾坤坐闓陽而調風雨變銅渾於九洛鱗羽登歌鳴玉鑾於四清煙霞變色焚符破璽更聞繩燧之初剖斗折衡重覩人倫之制銀書紀岱登日觀以論功玉牒封梁下雲邱而校美千齡胎化申以駕羽之期萬歲巖音獻以華封之壽耕田鑿井者不知自然鼓腹擊壤者不知帝力嗚呼豈非道風幽贊之效歟乃回輿詔蹕親幸樵谷奉策老君為太上皇帝仍令天下諸州各立觀一所於是碧樓三襲上接虹霓絳闕九成下交星雨乘雲御氣日夕於關山薦璧投金歲時於嶽瀆此觀地當極要任切會昌南鄰覆錦之城西逼吞珠之界使星連注皇華結轍既而緑地榛蕪朱宮板蕩非夫位膺金策名載瓊軒為紫帝之㣥賓列黃庭之上格孰能居此棟梁平圃丹雘長樓大開流電之庭廣制明霞之宇觀主三洞法師姓黎諱某廣漢雒人也金天命秩即有天地之官火正分司實掌羲和之任夏殷之際代為伯相或食邑於魯或書社於衛故魯之黎城衛之黎陽即其地也魏晉之交或立功於吳剖符於蜀在吳者其後封於壽春黎將故城有黎氏之墓石文石闕之字在焉在蜀苻堅時奉為蜀郡太守北齊時練山為益州刺史故子孫因家於蜀法師練山之六代孫也祖宗父泉並為州郡都主簿平正七職之任蜀文公之好智固讓朝恩秦子整之多才終從郡辟禮儀體制鄉校取式於公曹獄訟章程府主責成於平正時無留事復聞坐嘯之談野有讓耕重聽行歌之樂元珠結慶剖江漢之圓流紫胞貽祉動岷精之垂曜豫章七歲非復常材朝陽五色豈云凡鳥初登小學笑孔墨之神勞一見元書以彭聃為已任玉笈雲囊之術龍緘鳳蘊之圖莫不吞楚夢於胸中指魯城於掌上臨長水而飲犢不就堯徵臥巨澤而牧羊徒勞漢使冥邱聳駕左肘符觀化之辰諄壑停橫目傳栖真之地貞觀之末有昭慶大法師魁岸堂堂威儀肅肅裂圓冠而焚俗制橫大帳而抗山谷聲若坻頽辨均濤發仲尼河目飛電驚人子貢斗脣連環動坐昂昂不雜如獨鶴之映㣥雞矯矯無雙狀真龍之對芻狗於時三蜀耆老咸相謂曰興大道者其在茲乎初襲羽裙且蒞真陽小觀才麾玉柄已馳天下大名尋而廣漢士人固請法師為靈集觀主去長桑之故苑臨隱弅之新邱經之營之既雕既斫銀臺中天而孤出珠樹匝地而叢生同赤城之建標有黃房之貞構觀中先有天尊真人石像大小萬餘區年代寖深儀範凋缺沈沈寶座積萬古之埃塵邈邈瓊顏被千齡之苔蘚法師睹斯而流涕曰不圖先聖尊容零落至此乃重趼即路無胈永哀櫛沐幾於四時栖遑周於百舍誓將崇輯事畢然後寢食為期鄉曲爭持錢物競施珍寶費餘巨萬役不崇朝還開紫翠之容更表圓明之色行益州刺史駙馬都尉喬君主壻懿親勳門盛族任高方面寄切西南法師道叶半千神疑正一而至真福地荒涼日久不有上德其誰振之又表請師為至真觀主法師升堂慷慨吐納元科攝齊嘹喨分明紫訣詞峯雲鬱觸劒石以飛揚義壑泉奔橫玉輪而浩蕩入其門者披煙霧於九天聞其音者聽咸韶於三月由是戶外之履魚貫江水堂下之賓鴻行關塞黃老之學復於今矣則有王孫之黨都公之倫名亞春陵氣高韓魏鸘裘玉劒散圓庭以陸離驥子銀鞍委山衢而沛艾法師以茲衆施即於天宮後起大講堂并造長廊二十餘丈琳堂鬱其峙起星闈忽以環周仰䆗窱以嶙峋下崢嶸以廣朗陰娥假道窺玉女於南軒陽烏回轡照青禽於北閣又於觀內鑄銅鐘一口重七十斤立石壇三級周回一百步懸黍璣於碧落明月流光建瓊乳於元都飛霜蓄韻壇開錦砌類江浦之澄霞庭列瑤階疑崑邱之積雪每至三辰法會八景真遊霓裳蕩耀魄之華羽蓋轉風雲之路通天亘景兼造化之全模帶鳥銜虹連飛動之奇勢可謂德光而功濟道勝而名揚者也前長史范陽公一代羽儀門傾四海前長史譙國公兩朝肺腑威動百城並屈銀黃俱伸元素法師雍容坐鎮嘯傲行藏雖郭先生之禮峻晉侯蒙莊子之身輕梁相不能尚也若夫言出於口龍驥所不能追行成於心王公所不能及悲懷徇物風雨晦而逾勤苦節橫秋冰霜急而逾固戶居環堵而歲計有餘道周稊稗而日用無竭又於學射靈山別立仙居一所即至真之珠庭也栽松蒔柏與月樹而交輪刻角雕甍共星樓而接翼蒼郊卻倚猶太行之北登錦肆前通似灞陵之南望華表千年之鶴未見成都津亭八月之龍時歸鄉里法師出家入道三十餘年弟子所得襯施不可稱量盡入修營咸供衆用見諸疾苦便開五色之囊遇彼飢寒輒有千金之費巾拂之外餘無所留凡所經過洪濟多矣法師又於咸亨二年正月十八日寢疾之際聞空中有聲曰天上今欲相煩為玉京觀主法師辭以至真功德未就固請不得行少選之間所疾便愈左右侍者無不同聞自是遠近道俗咸共驚嗟曰天上知余不肖將棄余矣上座監齋某等並回流左映策地景於丹田浩氣中升養天倪於紫室雖復同班玉籍並列仙宮每屈宗師之道仍修弟子之敬亦猶披衣齧缺同德而相尊雲將鴻濛比肩而相下大弟子並仙庭十哲道家童師閉門鍊火陪嘯父之高煙卜肆驅筠記壺公之遠御咸用輯瓊臺之墜典正搴樹之頽風散在人間敷揚道教可謂庚桑畏壘致大壤以匡時范相鴟夷行計然而濟俗僉曰吾師也整萬物而不以為義利萬代而不以為仁逍遙乎有無之表仿偟乎塵垢之外東郭順子無擇存而不論伯昏瞀人禦寇論而不議豈使為山九仞道不列於珠庭築館三休功未書於瑤版下官迷方看博邀赤斧於禺山失路乘槎問君平於蜀郡汾陽處子目擊而言忘漢陰丈人德全而機謝是用搜奇井絡題片石於靈邱觀藝協晨見乘雲之飛將蒼蒼中野同銷地媼之魂眇眇太初獨昧天師之化其詞曰象帝之先其誰之子徒觀其妙莫究其始果而勿代為而不恃強為之名謂之道紀其一太朴云季孝慈已彰邈邈帝祖繩繩帝鄉曰神曰聖為龍為光千年受籙萬古稱王其二於鑠帝唐丕承天秩道風吹萬元猷配一五載乘雲三山禮日薦璧延士投金訪術其三地分輿井城連劒闕錦瀨開霞嵋峰吐月白雲舒卷青山回沒菌閣香飛桃源花發其四紫宸高映丹宮洞開巖舒金碧地起樓臺鶴飛龍度鸞歌鳳回星雨交接風煙去來其五寶龜涵影玉顏乃眷神劒九光華冠萬變日軒朝敞雲歌夕轉紫樹瓊鐘元壇竹院其六偉與上士昭哉至人笙簧道德粉澤人倫汾陽處子箕山外臣遂荒白屋奄有元津其七玉扃將墜金階無主草滋紅壁苔凝繡柱式佇賢才崇其彠矩福庭霞煥仙徒霧聚其八縹眇四真雍容十哲俱升紫宇並邀清節松子排煙焦君臥雪辨雲懸宇神遊朗徹其九玉壘庭紳珠鄉勝踐鍾鼎紛藹江山悠緬薛縣池平萊州水淺懸日月於鼇極播天人於鳳椽其十若夫蒼精授邑載杓西鄰之際赤鳥告祥方崇北面之尊海內奔波三分與二分交競寰中同會七百與八百相符故能安地軸之傾輪補乾絃之落紊如砥平道諸侯遵卜洛之郊似石磐基宗子紹維城之固大矣哉周之有天下也年將慶遠葉帶枝繁鄭國桓公宣王母弟水雙河濟泄雲雨以開封臯二成平連古今而錫類犬牙晉楚鼎定齊秦時遇鬬蛇之餘乍進牽羊之弊雖地承負黍國祚彌而無窮天錫香蘭家風邵為逾遠太子壽者康公之子桓公之二十代孫也聰明神智暉映當時涯涘清深指鱉川而激量圭璋特達與龍輅而齊光因以運逢陽城敗我鄭次辛亥之歲崩山蕩岸餒鋭氣於韓兵降志辱身欽盟符於晉血邑封千戶官具百僚今之壽城斯其地也享年七十八薨於晉葬於天陵南靈原超忽永深埋玉之悲荒隴淒其誰識生金之字玉京觀道士鄭大量家長鄭君則合宗並太子之後勝業孤揚清暉競遠逍遙林外放曠煙霞凝皓素於黃庭養神氣於元宇以為霓旌揚漢猶尋朽骨之靈鶴駕停空尚謁先人之墓於是芟荒剃蔓徙植延陰豐碑下鹿盧高墳疏馬鬣得青烏之舊地臨絳邑之新田於是大唐總章元年歲次戊辰五月甲申之一日也爾其表裏山河極目原野九京以送其往二水以流其惡山巖霜雪邀處子以同嬉奮衣冠似㣥仙而共遠窺晉臣於泉路依希夏日之光思漢帝於雲衢髣佛秋風之咏雖復相望絶代固可氣類同年豈使素烈景風清猷淡味金石之美堙滅而無聞乎故式紹前範傳之永代將日月以居諸邈宇宙而長久詞曰周封懿族鄭國開疆始連高華終帶崇芒東西橘徙人物絳鄉蕭條河曲憑車余榮陽戎馬生郊兵車亂轍衆雄相競郡公未絶煙塵四起縱橫四結園寢成泣逼陽成血家聲已潰出質而來西光未謝東府行開鄉關寂寞城邑徘徊三鄉二鄙風月池臺廣陽已失年其不朽魄散東山魂歸北郟披榛卜葬分晉獻絳露泫仍泣雲屯即愁川源遽徙居處不留源既號靈城猶名壽摧殘剪樹零落為邱碑失黃礱銘摧白楸猗歟積善克昌後孕丹竈九飛清溪千仞眷茲幽隴清風丕振勒石揚聲聞之陳信左右原野表裏山河析城王屋汾川帝歌新城樹少故絳人多悠悠萬代見此如何
