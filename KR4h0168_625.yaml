body:
  text: 麗乎天者曰漢紀乎地者惟河居上善以利物順朝宗而致和時否則為災而獨昏墊運至則呈瑞以叶謳歌豈徒列四瀆以居貴與百川而隨波者乎當其布德惟新儲慶茲始濁色既變榮光乃起乍若燭龍噴焰上騰鍾嶺之雲又似陽烏回翔下落咸池之水增華一代振耀千祀信能陵晏海而比崇蔑浴日而專美時則纖埃不驚和風充盈大野初霽圓靈始清皎且潔兮孤明不雜煥其炳兮五色斯呈祥煙斂彩瑞日韜晶掩輕雲而旁屬拂薰風而上征百辟具瞻孰云其相照一人乃眷自合於皇明庶品昭蘇衆幽光被大哉有國之慶赫兮為君之瑞朣朧元黃熠爚丹翠洞鑒龍官之人朗見馬圖之字昔在溫洛致美化於陶唐復效靈於我皇先後叶德今古和光比屋觀其自化遐荒望以來王詎比流景集壇獨作郊天之應赤光照室空稱誕帝之祥而已哉客有目觀榮河心傾聖日儻餘光而見及庶幽谷之可出夏后氏奠山疏滯拯溺開泰元圭錫命既成天下之功黃龍發祥始耀域中之大當其駐軫江甸舟羲舟洪川天行健而時有未濟地設險而瞻之在前思利涉以撫俗遂精誠而告虔於是雲氣滃起神光爛然奮角於勿用之窟驤首於或躍之泉安波澄瀾奉天意以禺若拖尾垂鬣夾王舟而負焉合靈符於百代表聖運於千年徒偉夫出無情馳不測如驅風雷若有羽翼觀竭誠以效用似就列而陳力電目流光金鱗耀色天吳奔走陽侯屏息巨險汔濟孰假剡木之能潛怪莫逢寧資畫鷁之飾應變化以昭盛出沈潛而剛克其慶惟大賴祉福者兆人其觀惟榮執玉帛者萬國若非平土堙水泣辜罪已菲飲食以昭儉卑宮室而思理德掩乎生成之初功齊乎開闢之始安有非常之神物不召而萃止濟其不通而彰其具美者也至若漢橫汾水秦抵滄溟實逞心欲匪崇德馨蒼生之虛瘁靡念方士之空言是聽始幸免於覆溺夫何望乎炳靈於戲動罔軌模言非善教則人雖愚弱或使之而不效其志惟純其德孔殷則龍雖神化將不役而自勤信矣哉國家俾人其蘇在理無鬱超乎大禹不務舟車之勞蜿彼黃龍但為宮沼之物而已道無象天無聲聖人不有作曷以觀化成由是鼓吹大塊鏗鏘元精因乎心而式是理本形乎器而強為樂名以齊五方之俗以厚萬物之生始積中而發外率充性而養情樂與心冥則所謂固天之縱心由樂理亦得夫自明而誠至若樂在朝廷君臣叶義一發而陽唱陰和九變而雲行雨施上以見為君之難下以知為臣之不易有國者理心以此必獲儀鳳之嘉瑞若乃樂在闥閫父子靜專蓋取諸無荒而樂有節而宣和以嚴濟愛由敬全有家者理心以此必返天性於自然且夫樂之作也一動一息心之理也惟清惟直然後在聽而必聰無入而弗克節有序觀貫珠而匪珠聲成文見五色而無色其或惟邪是念惟慝是廋則雖琴瑟在御管絃聿修立樂之方既失理心之術何求亦焉望變淳風之浩浩致和氣之油油徒觀其心尚元通樂資交暢明則贊天地之化育幽則索鬼神之情狀會節有極象之則發而時中應變無方擬之則貞而不諒大矣哉至樂希夷侯其禕而聽之以思固不資於子野作必在德亦無俟於后夔方今敦和統同反本復始別六律以分聽納八風而齊軌洪鐘虛受我則開其直言朱絃遺音我則戒夫專美此吾君之以樂理心也宜乎貴為天子水止矣靜之其徐物鑒矣久而益虛既無情於美惡又奚議夫親疏委質由來所期乎上善同利忘筌已悟寧患乎至清無魚若乃回塘月皎高岸環合泥滓湛而自沈金沙炯其不雜同道德以虛而受異川澤唯汙是納有斐君子此焉明徵氣隨浪息心與源澄端形赴影如木從繩其表微也挂金鏡而當晝其索隱也隔玉壺而見冰爾其色必洞徹光無滉漾不蒸蓊鬱之氣不激潺湲之響百丈在目千仞指掌惡每自乎中見美實非乎外獎鑒形之始方似以身觀身得意之間乃同求象忘象觀其下倒星漢上披煙雲守其常而性將道合居其止而物以㣥分君鑒之以平心臨下必簡臣鑒之以勵節在邦必聞妍蚩無形兮惟人所召物我兼進兮水無不照廉士以之洗心至人以之觀妙豈比夫流若激矢波如建瓴不舍晝夜爭輸滄溟徒乖躁靜之理莫辨真偽之形者哉邦家以道為止水鑒有餘裕㣥形鱗集萬景雲附濫巾竊吹者十手所指研精托實者千載一遇夫如是姑自攝其威儀亦何憂而何懼和而出者樂之情虛而應者物之聲或洞爾以形受乃泠然而韻生去默歸喧始兆成文之象從無入有方為飾喜之名其始也因妙有而來向無間而至披洪纖清濁之響滿絲竹陶匏之器根乎寂寂故難辨於將萌率爾熙熙亦不知其所自故聖人取象於物觀民以風闢嗜欲之由塞決形神之未通欲使和氣潛作元關暗空與吹萬而皆唱起生三而盡同自我及人託物於未分之表蟠天極地開機於方寸之中於是淡以無倪留而不滯有非象之象生無際之際是故實其想而道升窒其空而聲蔽洞乎內而笙竽作刳其中而琴瑟制波騰悅豫風行於有道之年派別商宮雷動於無為之世杳杳徐徐周流六虛信闐爾於始寂乃譁然而戒初鏗鏘於百姓之心於斯已矣鼓舞於一人之德知彼何如是則垂其仁有其實樂因之祖述究其形實其質聲因之洞出理在無二情歸得一塞雲谷而響絶疏天籟而音逸未隨於物絪縕乎七政八風忽變其和剖判於五聲六律由是遷為草木散作笙鏞㣥分自此而焱起九奏因之而景從道薄風漓莫究簫韶之本聲消韻息空傳干戚之容今則素扆垂休清懸繼響平心已立於皇極率舞猶虛於睿想如是則薰然泄泄將生於象罔昔齊人饋魯傾城者十八人瑰艷絶代綺羅嬌春洞橫波於慢臉回流風於嫋身蓋以仲尼定魯禮樂制齊君臣斬倡優於夾谷之會復土田於汶水之濱故遏雲與回雪實內圖而外親將敗魯之政弱齊之鄰魯君臣果不端操迷不先覺聞進淫哇之聲皆忘聖人之學城南於是考雷鼓黕雲幄結齊魯之歡受鄭衛之樂感煩音之惉滯成正聲之蹖駮夫子則不可救其失復其迷望龜山以命操觀鳳凰而銜悽痛王綱之蕩蕩順天命之栖栖魯侯若盛德是樹古道是稽抑麗靡而不納見聖性以思齊知季孫之僭惟仲尼是與足以受無疆之休足以振將墜之緒何敵國之敢抗良霸功之可佇悲夫任權臣之傾國納文馬與美女薦神祇之所歆誘耳目而不拒荒笑語之啞啞溺衣裳之楚楚由是齊日以長魯日以微見鄰國之侵地聞志士之沾衣雖代祀則遠而德音不違往者不可諫來者猶可追若鑒魯道之有蕩放鄭衛而不歸則可以得域中之大致天下之肥者矣貞元丁卯歲豫南出襄樊之間遇野人縶鹿而至者問之答曰此為由鹿由此鹿以誘致㣥鹿也備言其狀且曰此鹿每有所致轍鳴嘷不飲食者纍日豫喟然嘆曰虞之即鹿也必以其類致之人之即人也亦必以其友致之實繁有徒古之然矣嗟乎鹿無情而猶知痛傷人之與謀宴安殘酷者彼何人斯彼何人斯物微感深遂作賦曰鹿之生兮亦秉亭毒備齒角以無競循性情而自牧姑有昧於行止尚焉知乎倚伏捨爾崇林輕遊近麓偶巧網之生致蒙主人之全育飲以泄井飼於芳庭寢臥荃柔騰倚蘭馨露往霜來日安月寧雖矯性而非樂終感恩而不驚曾不知養非玩物用有深意命曰由鹿俾陷其類涼秋八月爽景清氣羈致山阿縻於蹊遂設伏以待翳叢而伺同氣相求誘之孔易將必慕侶豈云貪餌呦呦和鳴麌麌狎至彼泯慮於猜信此無情於誠偽孰是倉猝禍生所忽毒鏑歘以星貫潛機劃其電發或洞胸而達腋或折足而碎骨望林巒兮非遠顧町疃兮未滅風嘷澤而北迅日掩山而西沒走駭侶於巖煙叫飢麛於澗月苟行路之聞者孰不心摧而思絶相爾由矣野心而仁望純束兮驚惋顧獲車兮逡巡視鼎中之消爛觀機上之剖分忽哀鳴以感類若沈痛之在身雖復處之密邇享以豐珍比檻猿之駭躍同海鳥之愁辛敢擇音而後死思走險其何因痛無知以相陷含惋毒而莫伸客有感而言曰物誠有諸人亦宜乎托事或比原心則殊借如淮陰構禍冤在神理通説且拒豨謀寧起堂堂蕭公實曰知已紿致鍾室胡寧忍此呂祿之難誰非漢臣交則不義賣亦不仁彼美酈生既為交親誘襲軍印豈無他人於戲微獸傷類如不自容忍人賣友而享其功滅交道兮墜義風曾麋鹿之不若何仁信之可宗已焉哉諒此世之茫茫吾未見其始終管實圓通豹稱奇質將竊窺以無視果遇文而得一言如立信初云必有可觀美在其中終荷守而勿失奚執虛而莫見諒衡空而有窺注目每思夫破竹專心常切於主皮故得精神靡怠盼睞無虧辨或未分豈敢因小人所視言如有準安得謂童子何知事不可輕智難相短瞻夫隱霧之獸乃用窺天之管豈文質之不伸獨孤明之所滿分形既內識規規視遠惟中央坦坦然後知虛心可達小智攸同毫釐必遠長短皆通投迹儻遇於東周孰辨犬羊之鞟有文而比夫西伯豈殊縲絏之中是謂祈進奚為求知不倦將希國士之察用當君子之變羅因一目期所視之無偏利絶一源專向明之獨見乃知蔚文者道不足攀俯視者智或防間何微明之有辨果偶中之無難謂容止可觀且殊窒隙同邂逅相遇更喜通班信專美之獨嘉諒生知而何教流睇已假夫觀止審像乃知其是效十年之學自分西晉之賢一管之明更識南山之豹夫如是則履中不昧應手無疑冀覬覦之有以得專精而所之亦何必誇久視騁一時然後知求仁之可驗惟智者之念茲臣聞光宅大寶茂育㣥生神而明之必在上聖然則所同者道所異者時或以垂拱仰成或以勵精自致及乎俗躋仁壽理洽時雍弛張之政不殊勞逸之功則倍我皇帝體至化含元精苞乾剛履坤順誕膺駿命恢纂鴻休宣八聖之重光集百靈之奧祉如天之燾如地之容鼓義為雷霆奮仁為風雨幹璇衡而轉七曜懸金鏡而納九圍廓氛沴而川澄沓禎祥而山委昔軒轅氏斬蚩尤滅火帝功至大矣若非仗風后之助受元女之符未能克寸也陶唐氏誅四罪定水災德至厚矣若非大舜之登庸伯禹之盡力未能成也湯以伊尹為相始定殷功武以太公為師乃康周道高宗紹復資傅説啓沃之言宣王中興賴山甫將明之政今陛下太康四海雄軼二紀百姓不知其日用㣥臣無望於清光而乃業邁乎前王功高乎古烈聖作物睹孰知其源竊以管窺天倪蠡挹溟量庶乎大略可得而言焉陛下自代天統物之初則以屈已濟人為意虔臨庶政窮總萬樞四册賢良六親郊祀勤恤於理本盡瘁於生靈詳曠代之所未詳慮列辟之所未慮夏景晐而方食寒星在而求衣寸陰不捨於論思子夜猶觀乎啓事除一物之患而品類以安伸匹夫之冤而庶獄自直棄瑕而録用含垢而宥過小善可紀必拔於宸衷片言有孚不忘於睿聽至如天時之豐約地利之險夷邦賦之盈虛師律之貞暴閭閻之疾苦稼穡之艱難人風之情偽吏理之得失莫不密歸神算潛納皇明雖陰陽不能以氣欺雖神鬼不能以形遁何細而不及何大而不苞何祕而不彰何難而不就猶復登臺念在險之慘聞樂思向隅之情御裘感裋褐之寒臨膳憂簞食之餒日慎一日既泰而不自泰既安而不自安兢兢乎業業乎此其所以廣運而有成全功之克舉者也然而感覆燾之恩者欲天之彌高荷容載之德者欲地之彌厚仰照臨之明者欲日月之彌光微臣被淳風飲元澤親挹行事親睹升平憂勞誠難願陛下勉之而已美善誠盡願陛下保之而已若夫雖休勿休元默優柔君上之體也遹觀厥成蹈舞頌聲臣下之職也為而不有德莫至焉知而不稱罪莫大焉臣某敢昧死再拜稽首獻皇帝親庶政頌一首其詞曰士師邁德元元儲慶幽而復曜高祖受命貞觀致理開元殷盛艱而復康皇帝親政受命維何邈萬斯年親政維何夕惕朝乾天道福謙我則奉天生人在勤我則率先憂堯之心勞禹之形求人之瘼思國之經年亦豐止御膳不馨夜如何其皇寢未寧修文偃武太和氤氳海不揚波天無纖氛鳥章之長椎吉之君會朝明庭其從如雲巍巍崇崇於穆昭融宜播大樂以宣皇風鏗鏘盛德蹈厲神功下臣作頌永示無窮臣某言六月十六日入蕃告哀使左金吾將軍兼御史中丞田景度至吐蕃別館伏承皇帝陛下以正月二十六日明德奉天纂臨宸極重光升耀百化惟新澤被幽遐慶覃動植中賀臣聞和氣既蒸勾萌畢達時雨將降柱礎猶知臣從役單車閉留絶域天臨日照而別處幽陰雷動風行而兀為聾瞶伏願陛下義敦柔遠禮及窮荒始獲虔奉德音仰霑聖澤具寮就列無階蹈詠之初庶物效靈獨在飛沈之後舛薄鍾命恥玷自躬疚心厚顏罔知攸措今月七日自別館回至河州大夏川即以十二日進發星言夕惕莫敢遑寧瞻望闕庭載深感躍無任喜忭屏營之至臣某等言臣等自管窺天以凡揆聖虔奉徽號罄陳至誠而再降謙光未回宸眷慚局罔據倣徨失圖臣等誠感誠懼頓首頓首臣聞強名曰道莫體混元之功推大於天豈報生成之德徒以定物視聽示人津涯俾其會歸有所則象伏惟皇帝陛下克廣睿圖紹休聖緒順考古訓茂宣重光亭毒以佐天和震曜以除人害性與道合身為化先神行六幽威動九服求珠赤水觀妙用於無方檢玉名山告成功而有日豈可過損盛德不昭鴻休棄臣子瀝血之誠阻華夷傾首之望當仁必受乃曰至公與物無私寧嫌在已安卑者地山嶽之峻豈慚好謙者天日月之光何讓道貴傳繼禮從宜稱邦家之舊典不可以廢天人之合應不可以違臣等謬服官常親承至化一披肝膽三黷宸嚴殞越為期俯伏俟命實望陛下隨時立教以欲從人遊神於不宰之鄉屈巳於有名之域潤色大寶發揮皇猷古今一時天下幸甚無任懇迫屏營之至謹奉表陳請以聞臣某言伏見十月十二日敕伏承皇太子以四月二十一日册命禮畢光紹前典惟懷永圖神人允諧動植咸賴臣某誠歡誠忭頓首頓首臣聞燕翼貽謀帝王之大孝立嫡主器禮易之明訓伏惟皇帝陛下克明峻德恢纂鴻休武功有成文理既定然後宏三王之教諭建萬國之元良凡在生靈孰不慶幸臣守官荒服稱賀無階竊忭嶺隅倍萬恆品無任感悅屏營之至謹奉表陳賀以聞臣某言伏奉今月二日制書改元元和大赦天下新雲雷之澤重日月之光仁被幽遐慶覃動植三元經始萬化惟新臣某誠歡誠忭頓首頓首臣聞羲軒馭宇堯舜為君德莫盛於好生政莫宏於在宥然而事資體要理極精微百王所難千載斯遇伏惟皇帝陛下纂臨大寶光啓睿圖當獻歲之元順陽和之氣朝前殿御正門發德音布慈旨明大孝之本裦至忠之後省役輕稅以清疾苦之源蕩纍滌瑕以厚廉恥之俗往典之所未舉前代之所未該莫不悉出宸衷咸歸聖政坐開仁壽之域行見雍熙之朝凡在生靈孰不慶幸况臣陳力滋久受恩最深而蒲柳餘年犬馬多疾不獲奉觴丹陛蹈詠康衢猶蒙天眷留聖慈曲至特降中使俯加慰勉衰憊增氣枯朽生光施重邱山感深骨髓闔門灰粉豈足上報無任喜忭屏營之至臣某言伏見高崇文奏以九月二十二日官軍入成都府逆賊劉闢走出見勒兵追捕者臣聞夏震秋落乃觀成物之功善陳有征方見勝殘之理然則殺之所以生之也動之所以綏之也氣和則歲功早就德盛則廟算先期無遺鏃而巨盜窮奔不血刃而全蜀底定奔走夷裔鼓舞生靈騰瑞氣而躍祥風披慶雲而捧白日伏以陛下纂臨宸極惟新庶政拓迹開統之始作法定制之初而賊闢敢犯天威首干大紀恃嶮與遠窮凶極暴雖禍淫助順誠天道之必然而制勝舉全皆聖謨之自出一昨諸軍既集鋒鏑爭先陛下以為方暑用兵觸冒害氣與勦人而欲速寧全衆以功遲遂令緩螻蟻之誅抑貔貅之鋭休養磨礪以須秋期由是感恩而思奮者萬心如一又高崇文疾惡太甚殺傷小過陛下推弔伐之義宏覆燾之慈狂寇是誅吾人何罪遂令逐北者生致為上脅從者獲則捨之且諭鴻私仍加宴慰由是飲澤而向化者十室而九加以聖慈曲被大信有孚當挾纊之時賜戰士悉出內府開食黮之路賞降者曾不踰辰遂使昏迷革心義勇增氣江山自拔雷雨長驅渠魁假息而逃威士衆順風而捨仗市不易肆巷無驚犬人蒙骨肉戶解倒懸旌旗導長養之風金鼓動發生之氣然後知至仁能殺睿略無方大典用彰神武可畏全苞形氣之內有罪必誅旁行天地之間無思不服臣謬膺重寄親奉昌期坐觀氛祲之清目視鯨鯢之戮手舞足蹈倍萬恆情無任慶忭之至臣某言臣得某官某乙狀報伏承今月十二日夜浙西將士張子良等相率效順生擒李錡者天討有罪國無稽誅夷夏同歡飛沈咸躍臣某中賀臣聞炎氣方蒸伏陰不能藏其沴必疑戰發泄以彰正陽之功至化方融大姦無所隱其慝必陵犯誅夷以耀聖人之武沴不盡消生德不遂姦不盡發聖功不成蓋自然之明徵而必至之恆理伏惟皇帝陛下光膺峻命恢纂鴻休仁育㣥生義征不譓無與讓而誕修文德不得已而有此武功日者周歲之間大刑再舉朔陲叛將獻首於九廟之庭益部凶渠伏鑕於萬人之目被髮左衽且猶知懼肖斤含氣孰不革心賊錡身齒人倫家承國籍三朝任遇五族光輝而獨藏禍謀密聚姦黨梟琳之牙旗尚在忽巳發狂戮闢之刃血未乾敢茲拒命陛下重難戎事深愍遠人先示招諭後加討伐方伯嚴兵有司調食經略才下形勢巳張果得義勇叶心鬼神假手大斾回指長戟合圍兵火之氣天運金鼓之聲海動曾不終夜遂擒元凶巷有居人市無改肆滔天之逆踰月而平去歲西征則善陳不戰今茲東伐則善師不陳有以見睿略天縱神武日新聖道久而投刃皆虛德澤深而用力彌寡從此氛窮沴盡俗變風移百蠻成冠帶之鄉五兵為耒耜之器溥天同軌比屋可封古今一時堯舜何遠臣謬膺重寄時荷殊恩載逢河海之清三睹鯨鯢之戮志深除惡義切同休歡忭之誠倍萬恆品無任手舞足蹈屏營之至謹奉表陳賀以聞
