front:
  text: 全唐文欽定全唐文卷二百十三陳子昂五
  hash: sha256:cf27f2f01c2fe42dc956fc014bbd9e7ed67dd5d5e796f9b1ff9f36ba468024fc
body:
  text: 承務郎守右衛曹參軍臣陳子昂謹頓首昧死上言臣聞昔者聖人務理天下者美在太平太平之美者在於刑措臣伏見陛下務太平之理而未美太平之功賤臣頑微竊惑下列臣前蒙天恩召見恩制賜臣曰既遇非常之主何不進非常之策臣草木微品天恩降休伏刻肌骨不敢忘捨今陛下創三皇之業務三皇之理大統已集神化光明雖伏羲神農昔有天下誠未足比臣敢不竭節以效愚忠臣聞自古聖王謂之大聖者皆云尚德崇禮貴仁賤刑刑措不用謂之聖德不稱嚴刑猛制用獄為理者也故周有天下八百餘歲而惟頌成康漢有天下四百餘歲而獨稱文景皆由幾致刑措者也何則刑者政之末節非太平之資臣竊考之於天天貴生成驗之於人人愛生育旁稽於聖聖務勝殘皆不云以刑為德者然則聖王養天下者固當上務順天下務濟人不天不人不可謂理故曰惟天為大唯堯則之又曰唯天地萬物父母唯人萬物之靈亶聰明作元后元后作人父母然則為人父母固當貴於德養不可務於刑殺臣伏惟陛下聖德至大矣應天受命有三皇之功順人正位有三皇之業拜圖巡洛有三皇之符專名顯號有三皇之冊明堂神構萬象宣威風雨順時百穀昌熟可謂足為萬代之規也今天下百姓抱孫弄子鼓腹以望太平之政矣陛下為天地父母固將務德以順養之登於太和以協皇極今陛下之政雖盡善矣然太平之理猶屈於獄官何以言之太平之朝務上下樂化不宜亂臣賊子日犯天誅比者大獄增多逆徒滋廣愚臣頑昧初謂皆實乃去月十五日陛下特察詔囚李珍等無罪明魏真宰有功召見高正臣又重推元萬頃百寮慶悅皆賀聖明臣乃知亦有無罪之人掛於疏網者陛下務在寬典獄官務在急刑以傷陛下之仁以誣太平之政臣竊私恨之賴陛下又獨決天斷寬蕩㣥刑死囚張楚金郭正一弓彭祖王令基等以凶惡之罪特蒙全活朽骨更肉萬死再生天地人祇實用同慶何以知之臣伏見去年八月以來天苦霖雨自陛下赦李珍等罪天朗氣晴又九月十八日明堂享會慶雲抱日五彩紛郁龍章竟天萬品咸觀宇宙同慶又其月二十一日恩敕免楚金等死初有風雨變為景雲司刑官屬皆所共見臣聞陰慘者刑也陽舒者德也慶雲者喜氣也臣伏考之洪範驗之六經聖人法天天亦助聖休咎之應必不虛來陛下法天垂仁天助陛下仁化獄吏急法則慘而陰雨陛下赦罪則舒而陽和君臣歡娛則喜而見慶雲天意如此陛下豈可不承順之夫刑者怒也不可以承喜氣今又陰雨臣恐過在獄官況陛下明堂之理本以崇德配天之業不以務刑今垂拱法宮且猶議殺布政衢室而未措刑賤臣頑愚尚疑未可況巍巍大聖光宅天下哉今者繫獄囚徒多極法者道路之議或是或非陛下何不悉召見之自詰其罪罪真實者顯示明刑罪有濫者嚴誅獄吏使天下咸服人知政刑以清太平之基用登仁壽之域豈非至德克明哉昔鄧太后以天降旱親決洛陽獄囚徒良史書之而以為德況陛下大聖億萬超於鄧后者乎夫獄吏不可信多弄國權自古敗亡聖王所誡陛下萬代之業千載之名固不可使竹帛書之有虧於此也伏願熟察以美太平之風賤臣不勝愚懇忠憤之至輒投諫匭昧死上聞月日梓州射洪縣草莽愚臣陳子昂謹冒死稽首再拜獻書闕下臣子昂西蜀草茅賤臣也以事親餘暇得讀書竊少好三皇五帝霸王之經歷觀邱墳旁覽代史原其政理察其興亡自伏羲神農之初至於周隋之際馳騁數百年雖未得其詳而略可知也莫不先本人情而後化之過此已往亦無神異獨軒轅氏之代欲問廣成子以至道之精理於天下臣雖竒之然其說不經未足信也至殷高宗亦延問傅說然才救弊未能宏遠自此之後殆不足稱臣每在山谷有願朝廷常恐沒代而不得見也豈知霑沐聖化未夭天年幸得遊京師覩皇風親逢大聖之詔布於天下問於賢士大夫曰何道可以調元氣賤臣孤陋誠未足知然臣竊觀自古帝王開政之原備矣未有能深思遠慮獨絶古今如陛下者也故賤臣不勝區區願竭固陋以聞見言之雖未足對揚天休然或萬一有可觀者敢冒昧闕庭奏書以聞伏惟皇太后陛下少加察焉臣聞之於師曰元氣者天地之始萬物之祖王政之大端也天地之道莫大乎陰陽萬物之靈莫大乎黔首王政之貴莫大乎安人故人安則陰陽和陰陽和則天地平天地平則元氣正矣是以古先帝代見人之通於天也天之應乎人也天人相感陰陽相和災害之所以不生嘉祥之所以遂一作並作則一作遂觀象於天察法於地財成天地之道輔相天地之宜以左右人於是養成㣥生奉順天德故人得安其俗樂其業甘其食美其服陰陽大和元氣以正天瑞降地符升風雨以時草木不落龜龍麟鳳在郊藪矣洎顓頊唐虞之閒不敢荒寧亦克用理故其書曰百姓昭明協和萬邦黎人於變時雍乃命羲和欽若昊天歷象日月星辰敬授人時和之得也至夏德衰亡殷政微喪桀紂昏暴亂於天道殺戮無罪放棄忠良遂竭天下之力殫天下之貨作為瑤臺起乎瓊室極荒淫之樂窮耳目之玩傾宮之女至數千人竒伎淫巧以億萬計信巫鬼聽讒邪遂為糟邱酒池炮烙之刑一朝牛飲者三千人龍逢不勝其憂諫而死箕子不堪其憤囚為奴是以陰陽大乖天地震怒山川鬼神發見災異疾疫大興妖孽並作而桀紂不悔卒乃滅亡和之失也逮周文武創業順天應人誠信忠厚加於百姓德澤休泰興乎頌聲成康之時刑措三十餘年天人之道始和矣幽厲之末復亂厥常苛慝暴虐詬黷天地百川沸騰山冢崒崩人以愁怨疾厲為作故其詩曰昊天不傭降此鞫凶昊天不惠降此大戾不先不後為瘥為瘵天地生人之理復悖於茲矣嗚呼豈不哀哉豈不哀哉近者有隋氏亦不克終厥初隋高帝之有天下也以六合為家方將對越天人傳之萬代至煬帝承平自以貴為天子富有四海欲窮宇宙之觀極遊宴之樂以為人主之急務也於是乃鑿御渠決黃河自伊洛之閒而屬之揚州生人之力既弊天地之藏又泄煬帝方欣然以為得計將後宮綵女數百千人遂泛龍舟遊三江五湖之閒當其得意也視天下如脫屣爾其後百姓騷弊災變數興吏人貪暴其政日亂陰陽感怒彗孛以出煬帝不悟自以為天下安於泰山方率百萬之師而有事於遼東當時山東父子不得相保也天厭暴政人懷亂亡故遼東之役未歸而中國之難已起身死逆手宗廟以隳其故何哉逆天人之理也是以臣每察天人之際觀禍亂之由跡帝王之事念先師之說昭然著明信不欺爾不意陛下以大聖之慮見天人之心將欲調元氣之綱返淳和之治自非陛下合天地之德有日月之明誰能眇然遠思欲求大和於元氣哉此昔者伏羲氏之所以本天人而為三皇首也愚臣暗昧不勝大願願陛下為大唐建萬代之策恢三聖之功傳乎子孫永作鴻業千百年閒使繼文之主有所守也非甚無道不失厥嗣陛下可不務之哉臣伏見天皇大帝得天地之統封於泰山盛德大業與天比崇矣然尚未建明堂之宮遂朝上帝使萬代鴻業今猶闕然臣愚意者豈非天皇大帝知陛下聖明必能起中興之化留此盛德以發揮陛下哉不然何所與讓而未作也今陛下欲調元氣睦人倫躋俗仁壽興風禮讓捨此道也於何理哉故臣不勝區區螻蟻之誠思願陛下念先帝之休意恢大唐之鴻業於國南郊建立明堂使宇宙黎元遐荒夷貊昆蟲草木天地鬼神粲然知陛下方興三皇五帝之事與天下更始不其盛哉昔者黃帝合宮有虞總章唐堯衢室夏后世室㣥聖之所以調元氣理陰陽於此教也臣雖未學竊嘗聞明堂之制也有天地之則焉有陰陽之統焉二十四氣八風十二月四時五行二十八宿莫不率備故順其時月而為政則風雨時寒暑平萬物茂暢五穀登稔元氣不錯陰陽以和逆其時而為政也則水旱興疾疫起蟲螟為害霜雹成災陰陽不和元氣以錯故昔者聖人所以為教之大業也是以臣願陛下為大唐建萬代之策者意在茲乎意在茲乎陛下若不以臣微而廢其言乞以臣此章與三公九卿賢士大夫議之於庭倘事便於今道不違古即請陛下徵天下鴻生巨儒賢良豪傑之士博通古今皇王政理之術者與之按周禮月令而建之臣必知天下庶人子來不日而成也乃正月孟春陛下乘鑾輿駕蒼龍載青旗佩蒼玉從三公九卿賢士大夫鴻儒碩老衣冠之倫朝於青陽左個負斧扆憑玉几南面以聽天下之政於是遂發大號宣布四方使各順十二月之令無敢有違乃命太史守典奉法司天日月星辰之行無失經紀以初為常陛下遂躬藉田親蠶以勸天下之農桑養三老五更以教天下之孝悌明訟恤獄以息天下之淫刑除害去虐以正天下之仁壽修文尚德以止天下之干戈察孝興廉以除天下之貪吏矜寡孤獨疲癃羸老不能自存者賑恤之後宮美人非三妃九嬪八十一御女之數者出嫁之珠玉錦繡雕琢技巧之飾非益於理者悉棄之巫鬼淫祀誑惑良人者禁殺之陛下務以至誠躬服質素以為天下先愚臣以為不出數年之閒將見太平之化也天人之際既洽鬼神之望允塞然後作雅樂潔粢盛宗祀天皇於明堂以配上帝使萬國各以其職來祭豈不休哉臣伏惟陛下至德明聖未有能越行此道者也故臣竊以為此化一成則人倫之道自睦刑罰之原自息兵革之事不興還淳之途可見仁壽禮讓稼穡農桑不言而自致也是以賤臣未得為陛下一二論之何者聖人之教在於可大可久者故臣欲陛下振領提綱使天下自理也然臣竊獨有私恨陛下方欲興崇大化而不知國家太學之廢積歲月矣堂宇蕪穢殆無人蹤詩書禮樂罕聞習者陛下明詔尚未及之愚臣所以有私恨也臣聞天子立太學可以聚天下英賢為政教之首故君臣上下之禮於是興焉揖讓樽俎之節於此生焉是以天子得賢臣由此道也今則荒廢委而不論而欲睦人倫興禮讓失之於本而求之於末豈可得哉況君子三年不為禮禮必壞三年不為樂樂必崩奈何天子之政而輕禮樂哉臣所以獨竊有私恨者也陛下何不詔天下胄子使歸太學而習業乎斯亦國家之大務也臣愚蒙所言事未曲盡者恐煩聖覽必陛下恕臣昏愚請賜他日別具奏聞將仕郎守麟臺正字臣陳子昂謹頓首冒死詣闕上疏臣本蜀之匹夫宦不望達陛下過意擢臣草莽之下升在麟臺之閣光寵自天卓若日月微臣固陋將何克負然臣聞忠臣事君有死無二懷佞不諫罪莫大焉況在明聖之朝當不諱之日方復鉗口下列俯仰偷榮非臣之始願也不勝愚惑輒奏狂昧之說伏惟陛下少加察焉臣聞古之御天下者其政有三王者化之用仁義也霸者威之盛權智也強國脅之務刑罰也是以化之不足然後威之威之不變然後刑之故至於刑則非王者所貴矣況欲光宅天下追功上皇專任刑殺以為威斷可謂策之失者也臣伏覩陛下聖德聰明遊心太古將制靜宇宙保乂黎人發號施令出於誠慊天下蒼生莫不想望聖風冀見神化道德為政將待於陛下矣且臣聞之聖人出治必有驅除蓋天人之符應休命也日者東南微孽敢謀亂常陛下順天行誅罪惡咸服豈非天意欲彰陛下神武之功哉而執事者不察天心以為人意惡其首亂倡禍法合誅屠將息奸源窮其黨與遂使陛下大開詔獄重設嚴刑冀以懲創觀於天下逆黨親屬及其交遊有跡涉嫌疑辭相逮引莫不窮捕考訊枝葉蟠拏大或流血小禦魑魅至有奸人熒惑乘險相誣糾告疑似冀圖爵賞叫一作刑於闕下者日有數矣於時朝廷偟偟莫能自固海內傾聽以相驚恐賴陛下仁慈憫斯危懼賜以恩詔許其大功已上一切勿論時人獲泰謂生再造愚臣竊亦欣然賀陛下聖明得天下之機也不謂議者異見又執前圖比者刑獄紛紛復起陛下不深思天意以順休期尚以督察為理威刑為務使前者之詔不信於人愚臣昧焉竊恐非三皇五帝伐罪弔人之意也臣竊觀當今天下百姓思安久矣曩屬北胡侵塞西戎寇邊兵革相屠向歷十載關河自北轉輸幽燕秦蜀之西馳騖湟海當時天下疲極矣重以大兵之後屢遭凶年流離饑餓死喪略半幸賴陛下以至聖之德撫寧兆人邊境獲安中國無事陰陽大順年穀纍登天下父子始得相養矣故揚州搆禍殆有五旬而海內晏然纎塵不動豈非天下蒸庶厭凶亂哉臣以此卜之知百姓思安久矣今陛下不務元默以救疲人而反任威刑以失其望欲以察察為政肅理寰區臣愚暗昧竊有大惑且臣聞刑者政之末節也先王以禁暴整亂不得已而用之今天下幸安萬物思泰陛下乃以末節之法察理平人臣愚以為非適變隨時之議也頃年以來伏見諸方告密囚纍百千輩大抵所告皆以揚州為名及其窮究百無一實陛下仁恕又屈法容之傍訐他事亦為推劾遂使奸惡之黨決意相讎睚眦之嫌即稱有密一人被訟百人滿獄使者推捕冠蓋如雲或謂陛下愛一人而害百人天下喁喁莫知寧所臣聞自非聖人不有外患必有內憂物理之自然也臣不敢以遠古言之請借隋而況臣聞長老言隋之末代天下猶平煬帝不龔窮毒威武厭居皇極自總元戎以百萬之師觀兵遼海天下始騷然矣遂使楊元感挾不臣之勢有大盜之心欲因人謀以竊皇業乃稱兵中夏將據洛陽哮闞之勢傾宇宙矣然亂未踰月而首足異處何者天下之弊未有土崩蒸人之心猶望樂業煬帝不悟暗忽人機自以為元惡既誅天下無巨猾也皇極之任可以刑罰理之遂使兵部尚書樊子蓋專行屠戮大窮黨與海內豪士無不罹殃遂至殺人如麻血流成澤天下靡然始思為亂矣於是蕭銑朱粲起於荊南李密竇建德亂於河北四海雲搖遂並起而亡隋族矣豈不哀哉長老至今談之委曲如是臣竊以此上觀三代夏殷周興亡下逮秦漢魏晉理亂莫不皆以毒刑而致敗壞也夫大獄一起不能無濫何者刀筆之吏寡識大方斷獄能者名在急刻文深網密則共稱至公爰及人主亦謂其奉法於是利在殺人害在平恕故獄吏相戒以殺為詞非憎於人也而利在己故上以希人主之旨下以圖榮身之利徇利既多則不能無濫濫及良善則淫刑逞矣夫人情莫不自愛其身陛下以此察之豈能無濫也冤人吁嗟感傷和氣和氣悖亂㣥生癘疫水旱隨之則有凶年人既失業則禍亂之心怵然而生矣頃來亢陽僭密雲不雨農夫釋耒瞻望嗷嗷豈不由陛下之有聖德而不降澤於下人也倘旱遂過春廢於時種今年稼穡必有損矣陛下何不敬承天意以澤恤人臣聞古者明王重慎刑罰蓋懼此也書不云乎與其殺不辜寧失不經陛下奈何以堂堂之聖猶務強霸之威哉愚臣竊為陛下不取也且愚人安則樂生危則思變故事有招禍而法有起奸倘大獄未休支黨日廣天下疑惑相恐無辜人情之變不可不察昔漢武帝時巫蠱獄起江充行詐作亂京師致使太子奔走兵交宮闕無辜被害者以千萬數劉氏宗廟幾傾覆矣賴武帝得壺關三老上書廓然感悟夷江充三族餘獄不論天下少以安爾臣讀漢書至此未嘗不為戾太子流涕也古人云前事之不忘後事之師伏願陛下念之臣不避湯鑊之罪以螻蟻之命輕觸宸嚴臣非不惡死而貪生也誠恐負陛下恩遇臣不敢以微命蔽塞聰明亦非敢欲陛下頓息刑罰望在恤刑爾乞與三事大夫圖其可否往者不可諫來者猶可追無以臣微而忽其奏天下幸甚臣子昂誠惶誠恐死罪死罪臣聞古人言為國忠臣者半死而為國諫臣者必死然而至忠之臣不避死以諫主至聖之主不惡直以廢忠臣幸逢陛下至聖大明好忠愛直每正言極諫特見優容今陛下方御寶圖以臨陽館崇闡元化寧濟蒼生固臣精心潔意願陛下至德與三皇比矣然臣伏見陛下有至聖之德左右無至忠之臣使上下不通內外壅隔臣竊懼之恐後代或以為聖朝無至忠之臣故臣敢冒萬死越職上奏伏乞天恩寬臣喘息畢盡忠言臣聞上有聖君下無枉臣昔舜誅四凶堯不罪舜周公誅管蔡成王不罪周公霍光誅燕王昭帝不罪子孟何者此數公皆為國討賊為君殄讎假雖擅權猶不可罪況奉君命而執法者乎臣伏見宗人嘉言有至忠之誠抱徇公之節執法不撓為國殄讎頃者逆子賊臣陰搆禍難潛圖密計將危社稷當時逆節初露朝野震驚賴陛下神武之威天機電斷得奉聖決恭順天誅不顧軀命不避彊禦唯法是守唯惡是讎幸能察罪明辜窮奸極黨使伏法者自首情實天衢得以清泰萬國得以歡寧誠是陛下神斷之明抑亦盡忠之效陛下所以自監察御史擢拜為鳳閣舍人者豈不以表其臣節報其竭誠使天下之人知其忠懇者也當此之時忠必見信行必見明自謂專一事君無二也今乃遭誣罔之罪被搆架之詞陷見疑之辜困無驗之告幽窮詔獄吏不見明肝血赤心無所控告母年八十老病在牀抱疾喘息朝不保夕今日身幽獄戶死生斷絶朝蒙國榮夕為孤囚臣竊痛之頃者至忠而今日受賂辜負聖主憂及慈親誠足痛恨臣比者固知不免此禍不能度德量力貪榮昧進以訟受服誰能免尤向使辭寵讓榮陳力就列雷同衆輩勤恪在公與全軀保妻子之臣恭默聖代臣固知今日未招此患何者古人云盜憎主人被堯誅者不能無怨頃來執法誅罪多是國之權豪父讎子怨豈可勝道親黨陰結同惡相從假使為脯肉為菹醢宗誅族滅肝腦塗地彼凶讎也未足以快其心況蒙國寵榮位顯朝列凶讎切齒怨黷何窮臣竊恐今日之辜已是讎怨者相結搆矣陛下至聖明察豈不為之降照哉倘萬一讎誣濫罪使凶嚚者得計忠正者見辜為賊報讎豈不枉苦夫孤直者衆邪之所憎至公者㣥惡之所疾寡不敵衆孤不勝㣥㣥誣成罪聖不能救自古所有非止於今古者吳起事楚抑削庶族以尊楚君楚國既強吳起蒙戮商鞅事秦專討庶孽以明秦法秦國既霸商鞅極刑鼂錯事漢諸侯威彊七國驕奢將淩王室錯削弱其勢以尊漢景帝不悟惑奸臣之說遂族滅鼂氏以此三臣豈不盡忠願保其君然而身死族亡為讎者所快皆當代不覺而後代傷之聖主明君可不謂之痛傷邪臣以嘉言雖無三子之智竊恐獲罪或與之同伏惟陛下仁慈矜憐憫察其忠且臣聞漢高祖謀楚與陳平四萬金及其為帝不問金之出入何者立大功者不求小疵有大忠者不求小過所謂聖主之至道者也陛下豁達大度至聖寬仁觀於漢祖固已遠矣齷齪小吏何足為陛下深責哉伏願天恩矜愚赦罪念功補過乞將終養老母獲盡餘年豈非聖主之恩仁君之惠有禮有訓善始善終哉臣於嘉言親非骨肉同姓相善臣知其忠然非是邱園之賢道德之茂大雅明哲能保其身假使獲罪於天身首異處蓋如一螻蟻爾亦何足可稱然臣念其曾一日承恩蒙聖主驅使而不以赤誠取信今乃負罪見疑臣實痛之恐纍聖主之明傷其老母之壽身污明法為後代所悲臣知其忠豈能無惜所以敢冒萬死乞見矜憐臣若言非至忠苟有僥幸請受誅斬伏表惶怖魂魄飛揚臣伏見詔書發懷遠軍令郎將曹仁師訊勒以征凶醜臣聞古之天子方建大禮必先振兵釋旅以告成功故漢孝武皇帝將封禪乃徵精卒十萬北巡朔方略地而還此蓋遵古先哲王之禮也今神皇陛下應天受籙將欲郊祭天地巡拜河洛建明堂朝萬國斯邁古之盛禮也誠合式遵舊典耀武塞上畢境而還臣猶慮曹仁師未識典禮肆兵長驅窮極砂磧不恤士馬專以務得為利不以全兵為上今朝廷百寮雖有疑者無敢言之臣誠愚昧不識忌諱曾聞事君之道所貴盡心心以為非安可不言臣料仁師到雲內城發兵之日合至九月初到突利城回兵之日合至十月初胡地隆冬草枯泉涸南中士馬不耐祁寒計仁師所將之馬從靈州常時所發之處去回到雲內城已行四千餘里雲內城中又先未支度馬既疲瘦經冬無粟以臣愚算十不存二若送南中散就諸州路程益遠疲瘦更極以臣愚算十不存五紫蒙之軍類例相似且仁師此行計遲發速至於應會不甚精備以臣計料恐未成功脫若功未克成士馬先喪盡中土求市卒又難得且自古與胸奴戰非士馬相資不可臣恐馬既虛用致盡賊又竄遠未平但慮後之謀臣悔於今事且古來絶漠多喪士馬非臣臆度輒敢陳聞昔漢室以衛青出塞是時漢馬三十萬匹旋師之日唯餘四萬四十年不得事胸奴蓋由此也臣願陛下考驗前古取臣愚誠望與三公大臣審更詳議臣伏見同州下邽人徐元慶者父爽為縣吏趙師韞所殺卒能手刃父讎束身歸罪議曰先王立禮所以進人也明罰所以齊政也夫枕干讎敵人子之義誅罪禁亂王政之綱然則無義不可以訓人亂綱不可以明法故聖人修禮理內飭法防外使夫守法者不以禮廢刑居禮者不以法傷義然後能使暴亂不作廉恥以興天下所以直道而行也竊見同州下邽人徐元慶一作徐君光先時父為縣吏趙師韞所殺元慶鬻身庸保為父報讎手刃師韞束身歸罪雖古烈者亦何以多誠足以激清名教旁感忍辱義士之靡者也然按之國章殺人者死則國家畫一之法也法之不二元慶宜伏辜又按禮經父讎不同天亦國家勸人之教也教之不苟元慶不宜誅然臣聞昔刑之所生本以遏亂仁之所利蓋以崇德今元慶報父之仇意非亂也行子之道義能仁也仁而無利與亂同誅是曰能刑未可以訓元慶之可顯宥於此矣然則邪由正生理必亂作昔禮防至密其弊不勝先王所以明刑本實由此今儻義元慶之節廢國之刑將為後圖政必多難則元慶之罪不可廢也何者人必有子子必有親親親相讎其亂誰救聖人作始必圖其終非一朝一夕之故所以全其政也故曰信人之義其政必行且夫以私義而害公法仁者不為以公法而徇私節王道不設元慶之所以仁高振古義伏當時以其能忘生而及於德也今若釋元慶之罪以利其生是奪其德而虧其義非所謂殺身成仁全死無生之節也如臣等所見謂宜正國之法置之以刑然後旌其閭墓嘉其徽烈可使天下直道而行編之於令永為國典謹議
