body:
  text: 臣日休以文為命士所至州縣山川未嘗不求其風謠以頌以文幸上發輶軒使得採以聞六年至壽之駢邑曰霍山山故岳也邑贅於阯至之二日離邑一舍望乎嶽將頌之文也及見之則目乎戇手乎嚲心乎聳神乎瞀始欲狂其文寫其狀如丹青之不差也頌其風文其謠如金石之永播也既而其精怯然搏敵躁然械囚紛然棼絲怳然墮空浩然涉溟幽然久疹則知才智之劣如髦而加疾將杖而奔者於戲霍山之靈哉霍山之靈哉將閼於神而愚之邪抑有所達而托之邪其辰既浹其精忽渝怯然而勝躁然而適紛然而靜怳然而安浩然而濟幽然而愈如壯而能決將陣而敵者於是狂其文寫其狀其詞曰太始之氣有清有濁結濁為山峻清為岳其山厥臣其岳惟君惟南之鎮曰霍為尊岳之大與地角壯與天勍勢荊豫華嵩青沂兗岱如垤而秀如塊而銳岳之高千仞萬仞蒼蒼茫茫日月相避其光望之數百里外為天棟梁岳之尊端然御極聳然正位靜然而聽凝然而視其體當中如君之毅其屬者如駢其拇如枝其指若卑其儀若肅其位岳之氣其秀如春其清若秋其翠如雲雲不能麗其色如烟烟不能鮮若雨收氣爽丹青滿天岳之靈其神不眹其報如響若雨用岳能霽之若歲用旱岳能澤之岳之德生之育之煦之和之開蘤染卉萋萋迷迷藻繪數百里岳之形有雲騖騖其勃如怒有泉烈烈其來如決叱豐隆奔列缺轟然霹靂天地俱裂岳之異狀其勢如危或不可支若不可維或仰而呀有如吮空或俯而拔有如攫地其曉而東有如冠日其暮而西有如孕月有水而脉有石而骨有洞而腹有堮而節或銳而勵或斷而截或迴而馳或低而折其經之怪之祥之詭之千種萬類繄不可得而詳記因神狂不能自主殆而寐夢一人絳衣朱冕怪貌魁形曰余祝融之相也夫霍山余君之故治也爾賦之誠形矣勝矣怪矣典矣然義有不備帝俾余莅夫古有五岳霍居其一所以五岳相邇者唐虞之帝五載一巡狩一載而徧上以覲侯下以存民侯有治者陟不治者黜民有冤者平窮者濟洎唐虞以降皆燔柴於霍我帝用饗其禮至周旦策而命我與諸岳星列中國自漢之後乃易我號而歸於衡故祝融遷都命余守霍今聖天子越唐邁虞而廢巡罷狩余之封內有可陟可黜可平可濟者是聖天子無由知之爾能以文請於執事之達者易衡之號以歸於我請天子復唐虞陟黜之義故爾之將賦余閉遏爾懷而不爾文帝曰有衡既遠有狩必勞惟霍之邇斯號可復賦者能言胡不俾傳帝俾命爾錫爾文爾無忘也臣曰惟請神貺既覺而書嗚呼異哉草茅臣日休見南蠻不賓天下徵發民力將斃乃為賦以見其志詞曰上有太古粵有民族顓若混命愚如視肉當斯時也雖三王之道不能化五帝之澤不能沐迨乎混沌欻起覘視騞分其形也有精有神其心也有偽有真既凋其質又秀其純有智有機有義有仁有怨有懟有悲有辛居人靈府者總屬於神神之生也攝爽孕精胎意嬰情不迹不眹無臭無聲不居於愚不侵於嬰先物而動先人而行不注而溢不絲而縈神之居也填胸塞臆冥冥默默靜如寐魔將語不得其遇如噎其飲如食其輕者膌其重者殛神之行也其居幽幽其行悠悠來不可抑去不可留其情如剸其緒如抽其剛為憤其弱為羞其子為恨其孫為愁入人之心也如毒如螫如虔如劉不綸而漁不兵而蒐其堅也龍泉不能割其痛也萆荔不能瘳入人之懷也倘倘佯佯隱隱遑遑牢然不勝悒若有亡威能制佚力可摧剛乖人之性反天之常不喪而戚不役而忙不觸而醉不馳而狂是知食鯈魚者不能巳樹萱草者不可忘倘懷如嚄唶者其人立傷入人之神也昧人之精爍人之英癡然而作如病宿酲雖有王澄之色必俛樂廣之神不清入人之首也欻從內熱鬱而上結不勞膏沐自清其髮有久而釋者則其人也冠絲簪雪入人之睂也於悒摧頹思不自裁動如葭灰飛上睂來顰然無力自落金盃有積而未巳者雙睂之翠如一月不開入人之目也端坐日晏凝然忘倦注睫直視外象不遍雖有斧藻之繡毛嬙驪姬到於前昏如有事入人之耳也希希夷夷俯而不思殷然滿耳其身如尸雖師曠之善聽苟入之也迅雷烈風亦不聞之入人之齒也噤其齒牙淡其含咀悲嗟既巳哆如餓虎雖有膹炙餫修堆其前糲不可茹入人四枝也如縶如維如勞如疲其力如柳弱不可支苟甚者消骨枯髓奪色削肌其人也立不勝衣噫嘻嗚呼憂之甚也如斯向其入之也臣皆有之然猶未憂何實為師既憂其身須憂其時苟肉食者謀失而藿食者殃罹可不憂歟可不憂歟夫於政而疲於祿而尸王道不宣皇綱不維元惡作矣大盜乘之是臣憂也后之際陰教規矩夏德塗山周贊文母牝鷄無晨中饋有主苟奇衺而不黜乃神器之可取宮掖紊亂姦邪麀聚文信為相而私后董偃作庸而尚主其甚也漢成母以國循姓周宣后將權授父是臣憂也儲后之選實賢與良少海增潤重離益光輔導不至乃為猖狂歎戾園之思子嗟臨江之憫王斯愛是即惡乃易彰其甚者愍懷死而晉亂房陵易而隋亡是臣憂也封宗王嫡所以貴親茅土足以繼其後印綬足以飾其身至乃割域中之土宇半天下之黎民王猶未足亂以遄臻其甚者篡則王倫孫秀殺則清河萬人是臣憂也輔之而王在忠與良致叔父於折木取太公於釣璜寵之極也其化為權權之極也其化為強其甚者曹操以兵而上殿高澄抑帝而勸觴是臣憂也內豎之臣乃寵而綏豎刁亂齊之日伊戾禍宋之時西漢則中令扇迹東京則鄛卿構基舉手天轉切齒國危其甚者陳蕃以賢而陷矣何進用忠而僇之是臣憂也賈誼愛時仕止於國傅桓譚非讖官止於郡丞是臣憂也將在於軍君命不復知魏絳之法行見條侯之令肅郭開受諫李牧就誅范睢一言武安被僇是臣憂也王臣蹇蹇言須逆耳治亂終書善惡必紀趙盾終屈於董狐崔杼竟書於太史至有陳象極言以族滅李雲上書而身死是臣憂也懸官待賄命相取資崔烈作司徒之日曹嵩為太尉之時未搜巖穴莫訪茅茨秦繆既誅於五羖桓魋將退於仲尼是臣憂也法令如網隨而補之肺石之上落人涕洟公孫鞅恢令之法嚴延年掃墓之期是臣憂也命將興師夸力四夷既侵嶺徼又定邊陲以無用之沙漠竭有限之民資是以先王謂之荒服後嗣謂之羈縻豈可使親帥武旅躬揮戰陣故漢高有白登之辱隋煬有鴈門之圍是臣憂也出警入蹕以示嚴肅非有事於名山即展義於㣥牧故昭王遊漢水以無歸宣帝幸中山而不復是臣憂也功作非宜奪民農時我簠不粢我黍阻飢傾宮既作阿房又施人既怨矣鬼其泣之是臣憂也頭會箕斂關征市賦民之胥怨無所赴愬人厭進修家為積聚卜式出於富人宏羊拔於賈豎是臣憂也外戚之貴上公是列西漢則王根為玉山東京則郭况製金穴國步將移天澤未歇不師殷鑒尚遵覆轍是臣憂也大樂既沒淫聲是起宋都已改行人貪賄如斯陳國一時雄玉樹後庭花至死是臣憂也先之而昌後之而亡先之者堯興唐舜興虞後之者癸喪夏辛喪商故王之憂國者而日旰不食士之憂位者而載贄出疆鶉居食者何汲汲孔席墨突者何遑遑故臣之憂也盡此而巳矣願陛下憂之治可致樂康道可躋羲皇則天下幸甚咸通癸巳歲日休遊河橋觀橋之利不檝而濟美其事著河橋賦其辭曰西荒之外有崑崙山帝都之下豐隆在焉其表無際其高破天河漢極北昭回相連分其坎德遂有河源其出綿綿其流涓涓如帶是也濫觴信然始礐石以作注終裂地以成川迨乎放勛之世重華之年其水懷山其波浸天鼇怒則蹴翻五嶽鯨激則掉破百川迅澓欻而似曝湧湍濆而若煎漬地軸以摧矣爛天輪而缺然草木則尾閭之外日月則沃焦之巔人民死而為介倮蟲化而為蠙有桑不績有麻不田此則乘塏望萬里之淵且夫天地之前有河生焉則盤石之神不能導而使歸海朴父之力不能疏而使為川豈非元命未降抑自上元大聖未出大功未宣天之作矣抑有由焉於是堯之心惻然惘然咨其四岳舉爾所賢天之元命不自於鯀鯀雖作矣其功不全果殛於山其罪昭然天之元命降而自禹禹既作矣其功如天於是禹之心憂然勞然股既無胈過不入門以已為下以物為先既乘橇以即檋又隨山而濬川導自積石至於龍門裂岝山客以風響斬嶄巖而晝昏破靈怪窟斷天地根分其注使不可潰修其流使不可吞然後千巖萬壑雷吼電奔抉逆流而並瀉入渤海以猶渾天下安流昏墊無憂禹功既大舜禪克修其功也與天優優其績也與河悠悠兆庶其安九河如箭濁不可鑒嶮不可見渦若驚風浪如狂電若此帝媯之世則其流也如絲如綫在昔典午之世也其君實良其臣孔臧念濟者之太勞乃致功而去航子產之濟也不足比充國之奏也胡可方於是督斤斧於梓匠下材幹於豫章造其舟也乃絙乃杠乃輿乃梁功既奪於利涉力可侔於巨防如禦黿鼉者以妖為德聚魚鼈者以怪為祥觀其步高於空履險於深其形也若劒倚天外其狀也若龍橫水心其高也若大虹之貫天風吹不動其壯也若巨鼇之壓海浪泛不沈曙色霍開濟者相排如川失水一物時來蹄響如雨車音若雷有賢有俊有隸有臺有貧有窶有貨有財噫前王之道深有旨哉在水則河橋曉濟在陸則四關盡開水之與陸一貫而來所以大同其軌廣納其材豈梁之防乎抑聞三代之橋也不斤不斧不徒不杠以道為水以賢為梁濟民者民不病溺濟世者世不頹綱開之也通仁流義閉之也關限荒夏之梁也曰湯殷之梁也曰昌周之梁也曰旦漢之梁也曰光自漢之季國竊主折為水者以洚以強及隋之世為梁者唐故能濟民於萬方同軌於八荒是知河橋之義也可以獻於天王余嘗慕宋廣平之為相貞姿勁質剛態毅狀疑其鐵腸石心不解吐婉媚辭然睹其文而有梅花賦清便富豔得南朝徐庾體殊不類其為人也後蘇相公味道得而稱之廣平之名遂振嗚呼夫廣平之才未為是賦則蘇公果暇知其人哉將廣平困於窮厄於躓然強為是文邪日休於文尚矣狀花卉體風物非有所諷輒抑而不發因感廣平之所作復為桃花賦其辭曰伊祁氏之作春也有豔外之豔華中之華衆木不得融為桃花厥花伊何其美實多儓隸衆芳緣飾陽和開破嫩艹口咢壓低柔柯其色則不淡不深若素練輕茜玉顏半若夫美景妍時春含曉滋密如不幹繁若無枝妦妦婉婉夭夭怡怡或俛者若想或閒者如癡或向者若步或倚者如疲或溫黁而可薰或婑媠而莫持或幽柔而旁午或撦冶而倒披或翹矣如望或凝然若思或奕偞而作態或窈窕而騁姿日將明兮似喜天將慘兮若悲近榆錢兮籹翠靨映楊柳兮顰愁睂輕紅拖裳動則裊香宛若鄭袖初見吳王夜景皎潔鬨然秀發又若常娥欲犇明月蝶散蜂寂當閨脉脉又若妲巳未聞裂帛或開故楚艷艷春曙又若息媯含情不語或臨金塘或交綺井又若西子浣紗見影玉露厭浥妖紅墜濕又若驪姬將譖而泣或在水濱或臨江浦又若神女見鄭交甫或臨廣筵或當高會又若韓娥將歌斂態微動輕風婆娑暖紅又若飛䴏舞於掌中半霑斜吹或動或止又若文姬將賦而思丰茸旖旎互交遞倚又若麗華侍宴初醉狂風猛雨一陣紅去又若褒姒初隨戎虜滿地春色堦前砌側又若戚姬死於鞠域花品之中此花最異以衆為繁以多見鄙自是物情非關春意若氏族之斥素流品秩之卑寒士他目則目他耳則耳或以昵而稱珍或以疎而見貴或有實而華乖或有花而實悴其花可以暢君之心目其實可以充君之口腹匪乎茲花他則碌碌我將修花品以此花為第一懼俗情之橫議我曰不然為之則巳我目吾目我耳吾耳妍蚩決於心取捨斷於志豈於草木之品獨然信為國兮如此孔父稱惟小人與女子為難養也夫女子之忠貞義烈或聞於一時小人之奸詐暴亂不忘於一息使千百女子如小人奸詐暴亂者有矣使千百小人如女子忠貞義烈者未之有也則安國侯之母也不以項強而劉弱俾子事項不以子背君別事而有忿色對暴君而抗大節捨其生而踐死地嗚呼春秋書解揚致晉君之命漢史稱周苛拒項籍之爵方諸陵母誠未為忠何者男子少服教壯行忠貞義烈雖死不辱鼎鑊在前而不懼鑕笮被體而無怨乃男子之常事也至夫女子少隱帷薄壯執箕箒豈嘗熟於忠貞義烈哉是女子之有是者由百物之有瑞者矣豈易為哉豈易為哉三年秋徐卒無狀叛兵逐其帥不再日剽公私財析盡異時卒有不平者至是皆門抗之監戎者以聞上赫然大怒命大將職正其罪卒有首叛者前後累刼其將曰銀刀至是命皆僇之無赦將至先令徐裨將曰銀刀族無老幼強者斬之弱者幽之及徐之枝邑派聚捕銀刀族且盡或僇而梟者或拲而送者不浹日其族無餘或有詐弱懼僇皆論幽於牢迨六七百人且俟大將命業兵之居無何上愍徐卒盡死中或有不干其謀者偕僇降內貴人於徐詔曰銀刀族詔至未死者貰之六七百人分屬數郡未至屬所途亡為盜四年夏盜推其率鼓而徐入火里舍將縣令誅制使係虜民輜而掠貨徐守閉中城竟不命偏將禦之盜得志徐去四年秋進士皮日休之白門道逢徐民之耄者泣曰翁世富於徐子孫嗣其業祈二百年前日以徐卒亂翁之資已竭劫於兵矣獨存者居第而已為殘燼翁以為天子命將盡殺之且銀刀族無三千人耳遇聖天子在上四境無征伐重糧其屬厚衣其身有餔兒啜孫至死手不執干戈體不被鎧甲者上於徐卒厚矣今乃忘上恩叛主帥逐天子命將殘天子兆民如此逆之甚也上又活其半今反盜而寇徐前日翁之亡獨賄與產耳今子孫為賊隸妻女為賊室餘骸殘齒溘然無取嗚呼皇天仁於數百人反不仁於一郡豈得言者過耶且兵者聖王不能免其征仁帝不能無其伐是以逆者必殺順者必生所以示天下不私也往年數萬之卒逐天子命將自樹其便者國家以不忍盡殺因聽之皆賊而不貢兵而不從死而輒代名為列藩實一州之主也故春秋譏世卿得專公祿者以春秋小國尚貶而不空况今聖天子在上百執事稱職萬方雀息以無虞四夷駿奔而入貢哉前日徐卒幸活而為盜於民特苦國家無辱或不盡僇而赦之則自樹其便者日休曰翁其力之賢者耶吾知夫今之食其食者未必有翁之是心也幸以文貢而未得入上言列固不合陳便宜事因採翁之說為表庶天子召直言極諫者得以遺之徵君足下行奇操峻捨明天子賢宰相退隱於陵陽踞見青山傲視白雲得喪不可搖其心榮辱不能動其志桎拲冠冕泥滓祿位甚善甚善苟與足下同道者必汲汲自退名惟恐聞行惟恐顯老死為山谷人矣或名欲遺千載利欲及當今者聞足下之道可以不進其說耶日休聞古之聖賢無不欲有意於民也苟或退者是時弊不可正主惛不可曉進則禍退則安斯或隱矣有是者世不可知其名俗不能得其教尚懼來世聖人責乎無意於民故也此謂之道隱其次者行不端於巳名不聞於人欲乎仕則懼禍欲乎退則思進必為怪行以動俗詼言以矯物上則邀天子再三之命下則取諸侯殷勤之禮甚有百世之風次有當時之譽此之謂名隱其次者行有過僻志有深傲飾身不由乎禮樂行巳不在乎是非入其室者惟清風昇其牖者惟明月木石然糜鹿然期夫道家之用以全彼生此之謂性隱然而道隱者賢人也名隱者小人也性隱者野人也有夫堯舜救世湯禹拯亂之心者視道隱之人由夫樵蘇之民耳况名與性哉今天下雖無事河湟有黠虜之患嶺徼有逋蠻之虞主上焦心灼思晏詢夜謀宰相戰慄於巖廊百執事奔走於朝右然尚未復貞觀開元之大治有致君於唐虞躋民於仁壽者其人則鮮其求則勤元纁之聘屢降於山林少微之星但明於霄漢此真足下之所高視也嗚呼斯時也山林之間宜倒衣以接禮重趼以應命赴明天子千年之運成大丈夫萬世之業勳銘於鐘鼎德著於竹帛可不盛哉夫主上知足下之道久矣加以郡守薦之宰相譽之雖錫命屢頒而高風轉固接物日簡入山益深且足下將為道隱乎則道隱者世不可知其名俗不能得其尚足下之名尚矣丹青於世矣豈謂道隱哉將為名隱乎則名隱者以怪行動俗以詼言矯物足下之道伸之而伊夔屈之而夷齊豈謂名隱哉將為性隱乎則性隱者飾身不由乎禮樂行巳不在乎是非足下頃薦名於有司客位於侯伯豈所謂性隱乎然三隱者足下皆出其表復何為而高臥哉如終臥陵陽而不起是廢乎古人之道者也仲尼曰素隱行怪後世有述焉吾弗為之也君子遵道而行半途而廢吾弗能巳矣君子依乎中庸遯世不見知而不悔夫前二者聖人之所不為足下之學楊墨乎申韓乎何其悖於道也如遯世不見知而不悔則舜不為高蹈也舜不為真隱也足下其亦有意乎如納僕之言翻然而起醒然而用朝庭必處足下於大諫次用足下於宰輔其在大諫也以直氣吹日月之翳以正道立天地之根先黜陟於朝廷次按察於侯國其在宰輔也外以道寧四夷內以法提百揆俾天地反妖為瑞使陰陽易愆為穰然後以元菟樂浪為持節之州崑崙崦嵫作駐蹕之地又不知房杜姚宋何人也果行是道罄南山之竹不足以書足下之功窮百谷之波不足以注足下之善以足下之風可以知僕之志以僕之道可以發足下之文故不遠千里授書於御者用以吐僕臆中之奇貯也僕之取舍自有方寸異時無望於足下發函之後但起無疑不宣日休再拜於戲聖人之道不過乎求用用於生前則一時可知也用於死後則百世可知也故孔子之封賞自漢至隋其爵不過乎公侯至於吾唐乃策王號七十子之爵命自漢至隋或卿大夫至於吾唐乃封公侯曾參之孝道動天地感鬼神自漢至隋不過乎諸子至於吾唐乃旌入十哲噫天地久否忽泰則平日月久昬忽開則明雷霆久息忽震則驚雲霧久欝忽廓則清仲尼之道否於周秦而昬於漢魏息於晉宋而欝於陳隋遇於吾唐萬世之憤一朝而釋倘死者可作其志可知也今有人身行聖人之道口吐聖人之言行如顏閔文若游夏死不得配食於夫子之側愚又不知尊先聖之道也夫孟子荀卿翼傳孔道以至於文中子文中子之末降及貞觀開元其傳者醨其繼者淺或引刑名以為文或援縱橫以為理或作詞賦以為雅文中之道曠百世而得室授者惟昌黎文公焉公之文蹴楊墨於不毛之地蹂釋老於無人之境故得孔道巍然而自正夫今之文人千百世之作釋其卷觀其詞無不裨造化補時政繄公之力也公之文曰僕自度若世無孔子僕不當在弟子之列設使公生孔子之世公未必不在四科焉國家以二十二賢者代用其書垂於國胄並配享於孔聖廟堂其為典禮也大矣美矣苟以代用其書不能以釋聖人之辭箋聖人之義哉况有身行其道口傳其文吾唐以來一人而巳死反不得在二十二賢之列則未聞乎典禮為備伏請命有司定其配享之位則自茲以後天下以文化未必不由夫是也臣聞聖人之道不過乎經經之降者不過乎史史之降者不過乎子子不異乎道者孟子也捨是子者必戾乎經史又率於子者則聖人之盜也夫孟子之文粲若經傳天惜其道不燼於秦自漢氏得其書常置博士以專其學故其文繼乎六藝光乎百氏真聖人之微旨也若然者何其道奕奕於前而其書沒沒於後得非道拘乎正文極乎奧有好邪者憚正而不舉嗜淺者鄙奧而無稱耶蓋仲尼愛文王嗜昌歜以取味後之人將愛仲尼者其嗜在孟子矣嗚呼古之士以湯武為逆取者其不讀孟子乎以楊墨為達智者其不讀孟子乎由是觀之孟子之功利於人亦不輕矣今有司除茂才明經外其次有熟莊周列子書者亦登於科其誘善也雖深而懸科也未正夫莊列之文荒唐之文也讀之可以為方外之士習之可以為鴻荒之民安有能汲汲以救時補教為志哉伏請命有司去莊列之書以孟子為主有能精通其義者其科選視明經苟若是也不謝漢之博士矣既遂之如儒道不行聖化無補則可刑其言者夫居位而愧道者上則荒其業下則偷其言業而可荒文弊也言而可偷訓薄也故聖人懼是寖移其化上自天子下至子男必立庠以化之設序以教之猶歉然不足士有業高訓深必詘禮以延之越爵以貴之俾庠聲序音玲瓏以珩珮鏘訇於金石此聖人之至治也今國家立成均之業其禮盛於周其品廣於漢其詘禮越爵又甚於前世而未免乎愧道者何哉夫聖人之為文也為經約乎史贊易近乎象詩書止乎刪禮樂止乎定春秋止乎修然六籍儀刑乎千萬世百王更命迭號莫不由是大也其幽幽於鬼神其妙妙於元造後之人苟不能行決句釋者猶萬物但被元造之化者耶故萬物但化而巳不知元造之源也六藝於人又何異於是故詩得毛公書得伏生易得楊何禮得二戴周官得鄭康成摫其微言釽其大義幽者明於日月奧者廓於天地然則今之講習之功與決釋之功不啻半矣其文得不弊乎其訓得不薄乎嗚呼西域氏之教其徒日以講習決釋其法為事視吾之太學又足為西域氏之羞矣足下出文閫生學世業精前古言高當今洸洸乎洋洋乎為諸生之蓍龜作後來之帛丿糸蕝得不思居其位者不愧其道處於職者不墮其業乎否則市大易負乘之譏招詩人伐檀之刺矣奚不日誡其屬月勵其徒年持六籍日決百氏俾諸生於盛典也洞知大曉猶駕車者必知康莊操舟者必知河海既若是矣執其業者精者進而墮者退公者得而私者失非惟大發於儒風抑亦不苟於祿位足下之道被於太學也其利可知矣果行是說則太華之石峨峨於成均之門者吾不頌於他人矣足下聽之無忽日休再拜法言孝至之篇曰周公以來未有漢公之懿者說者以為楊子遜偽新之美又以為稱其居攝之前云嗚呼日月豈卒能遜莽乎未若無阿衡之稱也噫既有其文不能無其論吾得之矣在美新之文乎則雄之道於茲疵也詩有六藝其一曰比比者定物之情狀也則必謂之才才之備者於聖為六藝於賢為聲詩噫春秋之後頌聲亡寢降及漢氏詩道洊作然二雅之風委而不興矣在詩有三言四言五言六言七言之作三言者曰振振鷺鷺于飛是也五言者曰誰謂雀無角何以穿我屋是也六言者我姑酌彼金罍是也七言者交交黃鳥止於桑是也九言者曰泂酌彼行潦挹彼注茲是也蓋古詩率以四言為本而漢氏方以五言七言為之也其句亦出於周詩五言者李陵曰攜手上河梁是也七言者漢武曰日月星辰和四時是也爾後盛於建安以降江左君臣得其浮艷然詩之六藝微矣逮及吾唐開元之世易其體為律焉始切於儷偶拘於聲勢詩云覯閔既多受侮不少其對也工矣堯典曰聲依永律和聲其為律也甚矣由漢及唐詩之道盡矣吾又不知千祀之後詩之道止於斯而巳即後有變而作者不得以知之夫才之備者猶天地之氣乎氣者止乎一也分而為四時其為春則煦枯發枿如棄如濩百物融洽酣人肌骨其為夏則赫曦朝升天地如窰草焦木暍若燎毛髮其為秋則涼颸高瞥若露天骨景爽夕清神不蔽形其為冬則霜陣一淒萬物皆瘁雲沮日慘若憚天責夫如是豈拘於一哉亦變之而已人之有才者不變則已苟變之豈異於是乎故才之用也廣之為滄溟細之為溝竇高之為山嶽碎之為一九冫礫美之為西子惡之為敦洽壯之為武賁弱之為處女大則八荒之外不可窮小則一毫之末不可見苟其才如是復能善用之則庖丁之牛扁之輪郢之斤不足謂神解也噫古之士窮達必形於歌詠苟欲見乎志非文不能宣也於是為其詞詞之作固不能獨善必須人以成之昔周公為詩以遺成王吉甫作誦以贈申伯詩之酬贈其來尚矣後每為詩必多闕二字為闕一字咸通七年今兵部令狐員外在淮南今中書舍人闕二字公守毘陵日休皆以詞獲幸悉蒙以所製命之和各闕二字軸亦有名其守者十年大司諫清河公出牧於吳日休為郡籨事居一月有進士陸龜蒙字魯望者以其業見造凡數編其才之變真天地之氣也近代稱溫飛卿李義山為之最俾生參之未知其孰為之後先也天隨子為漁具詩十五首以遺余凡有䱷以來術之與器莫不盡於是也噫古之人或有溺於漁者行其術而不能言用其器而不能狀此與澤沮之䱷者又何異哉如吟魯望之詩想其致則江風海雨槭槭生齒牙間真世外漁者之才也余昔之漁所在浻上則為庵以守之居峴下則占磯以待之江漢間時候率多雨唯以籉笠自庇每伺魚必多俯籉笠不能庇其上由是織蓬以障之上抱而下仰字之曰背蓬今觀魯望之十五篇未有是作因次而詠之用以補其遺者漁家生具獲足於吾屬之文也咸通丙戌中日休射策不上第退歸州來別墅編次其文復將貢於有司登篋叢萃繁如藪澤因名其書曰文藪焉比見元次山納文編於有司侍郎楊公浚見文編歎曰上第污元子耳斯文也不敢希楊公之歎希當時作者一知耳賦者古詩之流也傷前王太佚作憂賦慮民道難濟作河橋賦念下情不達作霍山賦憫寒士道壅作桃花賦離騷者文之菁英者傷於宏奧今也不顯離騷作九諷文貴窮理理貴原情作十原大樂既亡至音不嗣作補周禮九夏歌兩漢庸儒賤我左氏作春秋決疑其餘碑銘讚頌論議書序皆上剝遠非下補近失非空言也較其道可在古人之後矣古風詩編之文末俾視之粗俊於口也亦由食魚遇鯖持肉偶皮子世錄著之於後亦太史公自序之意也凡二百篇為十卷覽者無誚矣子暇日曾作酒具詩三十首有引曰咸通中皮襲美著酒中十詠其自序云夫聖人之誡酒禍也深矣在書為沉湎在詩為童羖在禮為豢豕在史為狂藥余飲至酣徒以為融肌柔神消沮迷喪頹然無思以天地大順為隄封傲然不恃以洪荒至化為爵賞抑無懷氏之民乎葛天氏之臣乎噫天之不全余也多矣獨以麴糵全之於是徵其具悉為之詠以繼東臯子酒譜之後而有酒星酒泉酒篘酒牀酒爐酒樓酒旗酒樽酒城酒鄉之詠以示吳中陸魯望魯望和之且曰昔人之於酒有注為池而飲之者有象為龍而吐之者親盜甕間而臥將實舟中而浮者徐景山有酒鎗嵇叔夜有酒杯皆傳於世故復添六詠予覽之慨然歎曰予亦嗜酒而好詩者也昔退之有言送王含曰少時讀醉鄉記私怪隱居者無所累於其世而猶有是言豈誠旨於味耶及讀阮籍陶潛詩然後知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也雖然尚未有盡者中古之時未知麴糵杜康肇造爰作酒醴可名酒后近世以來人徒酣酗李白一斗為詩百篇自名酒仙酈食其辨士也初見沛公稱高陽酒徒杜根賢者也逃難宜城為酒家傭保鄭廣文貧而好飲蘇司業送酒錢杜子美無錢賒酒而詩言酒債周官有酒正則掌之者必有其人以法式授酒材則醞之者必有其物翰林詩曰鸕鷀杓鸚鵡杯夫杓者勺也勺酒而錯之杯中者也杜工部詩曰莫笑田家老一九冫盆自籨盛酒長兒孫夫盆者槃也載酒而寘之座中也韓奕詩云顯父餞之清酒百壺壺便提挈故陶令掛之於車上呂公負之於仗頭遇興則傾之鴟夷之異名者耳詩云兕觥其觩旨酒思柔觥為爵罰而于定國飲至一石不亂劉伯倫既醉以五斗解酲快飲痛嚼則用之蓋觚角之出者耳注云觚受二升觶三升角四升散五升而觥七升又兕角為之形器特異於是更作酒后酒仙酒徒酒保酒錢酒債酒正酒材酒勺酒盆酒壺酒觥一十二詩而附益之庶古今同志而始終相成之義耶
