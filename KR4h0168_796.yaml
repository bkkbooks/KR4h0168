front:
  text: 全唐文欽定全唐文卷七百九十六日休字襲美一字逸少居鹿門山自號間氣布衣咸通八年登進士授著作佐郎遷太常博士乾符中為毘陵副使黃巢之亂陷賊中偽署學士使為讖文疑其譏巳遂害之謹按宋尹師魯作皮子良墓誌云曾祖日休避廣明之難徙籍會稽依錢氏官太常博士贈禮部尚書與該聞錄文獻通考諸書所載不同
  hash: sha256:b762cac52ce1b5edf7304329059e0591549aa265c2ae82d2735d9edd01347682
