  - {type: head, offset: 3162, content: 對字詁判, id: KR4h0168_NFKB_403-h37, level: 2}
  - {type: head, offset: 3162, content: 甲書字詁所由計功不及日請科罪不伏訴云紙類不同, id: KR4h0168_NFKB_403-h38, level: 2}
  - {type: head, offset: 3248, content: 趙子餘, id: KR4h0168_NFKB_403-h39, level: 1}
  - {type: head, offset: 3259, content: 對薦賢能判, id: KR4h0168_NFKB_403-h40, level: 2}
  - {type: head, offset: 3259, content: 甲薦賢能之士三詣公車試皆高第表請錫彤弓矢廷尉致詰詞云三適有功, id: KR4h0168_NFKB_403-h41, level: 2}
  - {type: head, offset: 3382, content: 褚廷詢, id: KR4h0168_NFKB_403-h42, level: 1}
  - {type: head, offset: 3393, content: 對習星歷判, id: KR4h0168_NFKB_403-h43, level: 2}
  - {type: head, offset: 3393, content: 得甲稱人有習星歷屬會吉凶有司劾以為妖款云天文志所載不伏, id: KR4h0168_NFKB_403-h44, level: 2}
  - {type: head, offset: 3493, content: 潘文環, id: KR4h0168_NFKB_403-h45, level: 1}
