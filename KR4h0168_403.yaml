  - {type: head, offset: 3504, content: 西陸朝覿闕肜繹之供御史劾之云非其時不合禮, id: KR4h0168_NFKB_403-h47, level: 2}
  - {type: head, offset: 3589, content: 對澤宮置楅判, id: KR4h0168_NFKB_403-h48, level: 2}
  - {type: head, offset: 3589, content: 甲司澤宮將祭而習禮所由置楅不設中御史劾之訴云自邦國以下則有名制王者之式未之前聞, id: KR4h0168_NFKB_403-h49, level: 2}
  - {type: head, offset: 3699, content: 敬讓, id: KR4h0168_NFKB_403-h50, level: 1}
