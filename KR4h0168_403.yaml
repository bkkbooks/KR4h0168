  - {type: head, offset: 2671, content: 對舉似已者判, id: KR4h0168_NFKB_403-h27, level: 2}
  - {type: head, offset: 2671, content: 丙充使舉似已者御史糾按丙稱但成三物唯善能之, id: KR4h0168_NFKB_403-h28, level: 2}
  - {type: head, offset: 2775, content: 對毀濯龍泉判, id: KR4h0168_NFKB_403-h29, level: 2}
  - {type: head, offset: 2775, content: 輿人毀濯龍泉或失其利楊氏因形勝興廢業邑人訴勞役不服事, id: KR4h0168_NFKB_403-h30, level: 2}
  - {type: head, offset: 2843, content: 裴幼卿, id: KR4h0168_NFKB_403-h31, level: 1}
  - {type: head, offset: 2854, content: 對藏冰不固判, id: KR4h0168_NFKB_403-h32, level: 2}
  - {type: head, offset: 2854, content: 所司藏冰不固訴云採冰家戶不依尺樣, id: KR4h0168_NFKB_403-h33, level: 2}
  - {type: head, offset: 2976, content: 對鬯酒不供判, id: KR4h0168_NFKB_403-h34, level: 2}
  - {type: head, offset: 2976, content: 太常申博士請鬱鬯酒光祿以久無匠人且金草不知所出不造祠部亦以為禮有沿廢不允所請寺執見著唐禮豈得不行祠部云籍田准令兼給廩犧籍田今或不供犧亦廢用酒無鬱鬯於事何闕寺猶固執, id: KR4h0168_NFKB_403-h35, level: 2}
