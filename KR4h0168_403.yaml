  - {type: head, offset: 4035, content: 對糞田判, id: KR4h0168_NFKB_403-h53, level: 2}
  - {type: head, offset: 4035, content: '或以齋月屠犬縣科殺生曰為輕[:#AS-FBEF:●]([:#AS-FED2:●]', id: KR4h0168_NFKB_403-h54, level: 2}
  - {type: head, offset: 4166, content: 對道路判, id: KR4h0168_NFKB_403-h55, level: 2}
  - {type: head, offset: 4166, content: 乙主路三十里置候館州按其違古制詞云險陸相半, id: KR4h0168_NFKB_403-h56, level: 2}
