  text: 全唐文欽定全唐文卷四百三居中元宗時人
  hash: sha256:98b9c3aa963f08b6e7ab7fa9ba5eca88249f1185666c832d9117570913bce8a1
  markers:
  - {type: head, offset: 12, content: 岑居中, id: KR4h0168_NFKB_403-h1, level: 1}
body:
  text: 山壤獻靈融結推功穹隆石梁飛雲架空懸流下激絕岸旁通烟華溟濛矯矯翔龍旭日曈曨蜿蜿騰虹願接天孫以助登封兼天寶時進士狡吏畏威妖狐破膽好錄政聲聞於御覽光允天寶元年官祕書省正字歸心者在乎信崇教者貴乎敬離情者在乎施故勇施則有慈能敬則知讓敦信則晤道大聖之善誘也如彼㣥生之惠明也若此勤而行之則近矣何遠乎哉天官曹乩徵㣥材選任庶職闕七字也求而聚之謂之會府銓以審其能曹以覈其實而後闕二字實難其任所以置卅人皆時秀幹理者得之至於人吏殷湊考課繁積則分掌而決之矣有濮陽摯宗太原王彥昇廣平宋希朝扶風馬闕五字倩天水尹謙光等意珠獨照心鏡常明人貴其舊德順於下發自我清淨之智也與同人朗徹之性也善起真念福生願力相率以道相應以義將以為善之於人也勸石之為物也堅善可常住石可不壞闕八字琢以成之建幢題經依教護法於交露精舍為七寶闕二字每烟爐焚香沃罐澡水果因心舉誠以感通所以明空神持告天地有請以大威力宏誓願茲乃闕一字之像教導之浮生也衆君子義以相闕十一字府醴泉縣丞尹公才學特舉聲明早著作頌以美之匡祚天寶元年官醴泉縣丞昭昭象教懸大千兮藹藹吉人悟勝緣兮存質覩相周無闕一字兮即色知空闕三字兮惟彼天官是司衡鏡闕七字正闕六字無競發彼清信歸於善性梵音留祕重譯題經福惠生死罪除幽冥寶臺初揭鎮地以寧仰止遷善施於有形莫紀匪言莫堅匪石載闕一字載闕一字既闕一字釋近闕三字遠闕一字宏闕十字萱天寶時官渝州太守大唐天寶十五載歲次丙申正月乙卯朔十八日壬申半江砥石出見於外表時和而年豐也君聖而龍鳳祥形臣忠而庶物昭著雖圖記不載而跡遠相傳太守清河張公自承下車宣布皇化邦俗一變江月雙明自置州郡以來未之有也有茲樂事敢事記云鈞河南聞喜人天寶時官右監門衞長上龍集協洽月闕一字于臯朔巳亥日辛酉君奄然卒於西京太平里之第春秋廿八惜也人到於今悲之草木衰日月逝覩天地之蕭瑟感幽冥之慘慼欲見之不可得將捨之不可得爰起茲塔因誌於行是謂百二之論也君諱良佐字堯臣河東聞喜人蓋上古軒皇之華裔經國諸侯之令緒具在諸譜吾將畧焉曾祖待聘皇右千牛通事舍人祖麟朝散大夫皇北都司法父諤朝散大夫行右監門衞長史竝疑謀必割亂政斯理覆車之後當革前弊文翰以飾之道術以華之賢良代有秀異間出誕我君子克彰前聞君即長史之次子也纔逾捧雉之年已有食牛之氣始過龍女之歲早懷成佛之因乃乘軒靜邊為國侵地胡寇載殄皇恩是班以功授官勳焉由是日崇法門專精釋誥行深般若而種善根五陰皆空六塵不染無上之士君其謂乎不然者何以子時右脅而沒月維徂暑日在東井寒泉沸歲木乾君小斂在牀自蓂生而盡三旬乃出膚不改常百日開空色不渝舊信有金剛之堅豈無我淨之理由前劫之未覩塈闕一字代之一聞者也昆良道季良史痛三武之喪偉節哀五常之凋白眉敬崇法因乃遵所請以來年閏二月十四日建塔於終南山施陀林善知識之次其實天寶二祀也銘曰闕二字東注流景西馳天長地久逝者如斯焱從悟發惠逐闕一字為塔建何所終南之垂忻天寶十二年官通直郎右武衞騎曹參軍君諱元尚字元尚彭城人也出自軒皇之後繼乎光武之允長源遠派闕一字裔於公焉祖高道不仕父居心物外混迹人間絕粒歸真澄神息念公稟靈闕一字得風雲之氣感嶽瀆之精茂歲有奇與同年而特異弱冠從仕於闕一字衞而超功簡在帝心於斯為美解褐拜掖廷監作大食市馬使燕王市於駿骨伯樂顧之龍馬遂使三軍迎送萬里循環榮寵是加超公內寺伯也復為骨利幹市馬崎嶇百國來往三春追風躍而奔騰逐日迴而來獻遂加公謁者監奚首領屈突于侵擾候亭攪亂軍旅公密奉綸誥勒兵討之則知聖澤推賢軍容得士公有坐帷之策剋日摧鋒立討之謀應時瓦解特拜內侍答公之德也北庭使劉渙躬行悖逆委公斬之又瀚海監臨宣慰四鎮兵士畏愛將帥威懾無何遷雲麾將軍左監門衞將軍攝省事寵恩極也仍知武德中尚五作坊使國家寄重珍翫不輕妙眩工輸巧從班氏能為悅豫幹得公心出入肅清內外皆美向一十五載考績踰深何必上標下闕一字能無有闕一字况招冤謗徒有鑠詞聖上委公清慎特令無事雖去官祿而不離家得預懸車於茲足矣未錫樓船之號俄聞梁木之歌惟公以天寶十二載八月十一日遘疾薨於金城里之私第春秋六十有八皇情悲悼朝野增傷以天寶十三載十有一月二十九日窆於龍原府夫人舊塋合祔禮也勢搞長原氣連秦岫崗巒藂倚宮闕崢嶸嗣子守義常選蘇期內給事上柱國守志宮教博士竝泣血茹荼哀厂田坴觸類氣添哽咽痛感號咷哀笳斷絕於長空楚挽喧闐於廣陌克誠克信有度有章用展飾終記之金石銘曰帝軒之允光武傳家盈門金紫寵幄榮華夫盛必衰有會克離聖人既則神道何為物慮推遷迹存不朽勒石題銘同天地久子真天寶時官四門助教楊妃容州楊衝人也離城一十里小名玉娘父維母葉氏維嘗謂先人云葬其祖去此十里許逢一術士忘其姓名云此墳若高數尺必出貴子惜太低生女亦貴妃母懷娠十二月始生初誕時滿室馨香胎衣如蓮花三日目不開夜夢神以手拭其眼次日目開眸如點漆抱出日下目不瞬肌白如玉相貌絕倫後軍都置楊康見之以財帛啖其父求為女妃家素窶不獲已與之康有二子讀書妃三歲日夜同坐聽其誦讀漸長通語孟康夫婦惜如珠玉楊長史炎攝行帥事聞之左右令與母偕來一見大奇私謂厥妻曰此女姿質異常貌有貴相吾二女遠未逮也遂給以金帛與康求為女康不從乃脅取之舉家號泣送去居無幾何長史秩滿攜歸長安與二女同教惟妃性昭慧諳音律明經史後進入壽宮開元二十四年明皇詔入內號太真大被寵遇天寶間冊為貴妃云承斐天寶初官金部員外郎烝嘗有儀霜露是感必先金石之序以降神祇之福故潔粢豐盛年和登也博碩肥腯人力存焉三獻克終九成斯辨堂上堂下咨樂正而為節載拊載擊播頌聲而有倫大管或虧小攸闕既齊楚以引過奚韶濩以合雅宜寘法司以應服念執古以道格人其經捨而或逾動則奚軌况承家繼體之重義存乎冢嗣絕嫡立庶之命禮資乎象賢是用弓裘必榮鐘鼎以赫斯列侯之恒典豈下愚而足度彼已之甲惟秩何也德未昭寵過符恒禁有子誰立固晉侯之不經擇幼為先類楚王之有嬖俱曰神命仍虧拜璧欲議刑章誰謂無玷况太室之禮僭已淩於殷廟薄言之狀位匪列於周官欲按科條得悉名器此而服念終謂疑刑齊宣字正衡宏農人天寶六載官天王左史余內弟東京處士何超字令升之所纂也令升即仲舅商州府君之子惟我仲舅實蘊多才彊學懿文紹興門範剖符行節宏闡帝猷雖望位兼崇大名猶鬱而增修益振餘慶方鍾確爾專精深期克復時之未與衣冠之嗣曷沈道在則聞儒素之風自遠不隕其業於斯為得與處士弟約以優閒溺於墳史嘗訝晉室之典未昭其音思欲發揮前人啟迪後進由是博考諸傳綜覽㣥言研覈異同撰成音義亦足以暢先皇旨趣為學者司南式敍其由勸成其美三都尚隱思旌擅洛之文五等迴封遠愧平吳之績巨唐天寶六載天王左史宏農楊齊宣字正衡序超東京處士先朝所撰晉書帝紀十志二十列傳七十載記三十合一百三十篇令升此音紀志共為一卷其列傳載記各自區分都成三軸件目如左仍依陸氏經典釋文注字竝以朱暎服勤編簡頗涉暄寒凡此訓釋必求典據庶無牆面疇敢師心如或未周敬俟來哲爾春卿天寶朝官司勛員外郎歷太子中允受命觀風光膺耳目停車輟駕是牧翹楚知之不遠十步自得於芝蘭行之有鄰千里方聞於應會惟彼舉善誠為好德出門無爽於同人投士遂多於似已類祁奚之直道有范滂之遠心建一官而三物克成舉十室而四方知勸皇華允美所謂伊人白簡以聞徒為此糾水德利物在乎泉源農功以時資於灌沃必欲壅畜無泄將以瀦防有用輿人何者輒起訟於漚菅楊氏不爭更有興於負鍤詎謝王尊之堰重開方進之陂既以樂成何徵役本幼卿天寶時擢書判拔萃科習坎居卑履霜為漸始衆流而就濕終積溜而成冰於是歲約星迴時遵月令啟淩雲之室享司寒之神山人縣人即分官而有典北陸西陸將候日以無差乃採沍寒必於窮谷豈可未終見晛遽此晞陽望朝覿而未開與隆冬而共盡主司先標尺樣輸納當有程期豈三令之莫申何一言之匪効既乖守職詎可逃刑郊禘有常春秋匪懈人神足以叶祕禮物於焉致和薦黍惟馨徵茅有典為酒為醴將見供於鬯人或廢或存具主文於甲令至如氣交陰臭法變周因始有襲於焚蕭竟將申於酌鬱灌以香草陳於卣尊備一獻之登歌知百神之受職固當所習寧越禮經况乎祀典有崇太常攸掌制經具陳斯品著令元削此條光祿不供自覺缾之罄矣籍田為喻誰云井有人焉舊章無替於執文王典豈新於改作三覆華省徒見慚於有司再覽太常實未乖於彞典騰字士舉天寶朝官戶部郎中底祿致位職司在公登朝庶官無廢一命甲也遊學效於文字工彼汗簡嘗觀太史之書臨諸墨池能妙右軍之筆徵乎考績在日課而有違何以曠官俾月將而不及寧使微言有絕古訓無傳誠計功而致科豈多言而獲免子餘天寶時擢書判拔萃科建官惟材言刈其楚為政以德行歸於周甲徽華國章夾輔王室允茲好德是用進賢禮盡異能裒然登於漢室策選巖穴咨爾寘於周行既三適於公車宜九錫以觀國且得臣敗楚失在子文夷吾霸齊功歸鮑叔寵錫既頒於彤弓將命必議於太常致詰豈煩於廷尉儻任刑而廢禮猶越祝以代庖既見侵官未能唯命廷詢元宗時擢書判拔萃科和氏命官疇人繼職裁度歷數辨正陰陽雖日月星辰無幽不燭而吉凶性命象在其中所以班固題篇編而作志馬遷著史取以成書安可私議災祥公違典憲仰秦儀而雖隔瞻漢綱而斯存豈得日用不知都勞帝力天文妄習仍委國刑宜峻典彞以申平反文環天寶時擢書判拔萃科將祭司寒必從朝覿自上下下頒亦有宜惟彼乙兮是稱主者獻羔而啟自仰天王之禮愆陽不興果叶藏冰之道且祭之明日曰繹曰肜既區分於禮經亦隨時而用舍有何乖制而致繩愆請寬執憲之刑庶免不辜之罪祭以訓恭射唯觀德出正中質將定於賢愚備物致用是昭其典禮瞻言爾甲司此澤宮張熊侯以示威酌貍步而遵美飲筭初列爰立豐以表儀射器斯存亦置楅而供命然以高卑異等名位殊倫若事屬諸侯固宜同於相圃而舉非王者爰可論於設中既無供職之愆寧懼守官之劾讓贈秦州都督暉子開元時官魏州長史臣某言臣聞事君事親率由之道斯一為臣為子資敬之途無二臣實不才累昇榮級徒以家承勳舊地分茅土寵命優渥實此之由非臣妄庸所堪獎拔臣未登壯歲乾蔭先傾逮於強仕毋氏為育欣欣而就祿者希祿養之及親也臣雖愚鄙妄佩朝簪臣毋王夙侍巾櫛久經憂苦一厂田坴風疾二十餘年今秋已來所苦增劇板輿周覽近在於家園綵服承歡久違於膝下臣謬居藩佐累變炎涼瞻望庭闈五情紆結雖王臣蹇蹇匪躬之故而孝道烝烝因心罔極伏惟陛下聖明統業孝理天下文軌同於八荒德教加於百姓况臣沐浴皇化差池班列塵忝滋久臣復何言臣兄弟之中臣又居長五起三省是臣微志視膳嘗藥非臣而誰臣之愚誠天地神祇所共昭鑒伏乞天恩少留哀察臣請解所職侍養京都冀烏鳥之情俯遂終食犬馬之報希酬萬一臣雖死之日猶生之年無任惶悃迫切之至良玉天寶時擢書判拔萃科囟一火所用國著九賦農分三壤將助鳴鳩之稔是用磔犬之法時惟上月德在發生爰取則於周官遂興功於魯胥使我疆我理開膴膴之郊原如京如坻藹芃芃之稼穡蓺或若此業乃可憑彼何為政義守常典徒嚴止殺之方豈曰利人之術且成物之急濟時攸重苟能敦本孰謂不經禮合時宜尚廢犬羊之歎農為政本爰停屠殺之罰國有郊鄙道有室廬是崇委積以待羈旅眷夫惟乙則曰司存掌彼康衢順帝之則修其候館虧古之制公家之事為之式可舊章不率誰敢允從且十里有廬五十里有館典經攸著龜玉是司徒以險陸為詞其如專擅之罪益天寶時擢書判萃科淩人納室獻羔開冰取時寒而腹堅用覿朝而首出在於賓祭則有彞倫况肜繹之禮既施水土之品必設盈缶或存乎禺若藏冰更闕於陳焉乙忝主司實為失守無恒之迹且類於南人有常之儀宜在於西陸未能引過猶謂非時於禮何觀在刑不妄蒙天寶時擢書判拔萃科冰以風壯縣人初傳寒乘春消王命是出韙夫彼乙能業其官豈炎涼之或愆調乎四氣將潢汙之同薦利於百神滌意爰卜於吉蠲闕容乃稱於肜繹曾是獲麟之史西覿靡逾孰謂冠豸之雄南臺妄糾若五經之訓奉以守官乃或擊無成曷為知禮深源天寶時擢書判拔萃科先王制禮將使田賦有經中古從權亦由國用不足履畝而稅侵農實多小東作詩見刺於譚后大桀為論甫聞於魯臣既繁杪歲之征同起祁寒之怨徒欲附上焉能服人且已効忠未為干典當採議於中尉諒無嫌於所司承先天寶時擢書判拔萃科先王制禮造次以之君子奉行威儀無選鄭太門承通德代有象賢處異域之圍全其使節受良田之廣儉以家貞華軒懸示後之車密石表奉先之廟舋鐘亡祖哀疚謀孫奉硯攀悲輿屍入廟大夫銜命神雖幽而已往使者迴車身不幸而必告魯使以為有美漢臣猶且不非況太恭事廟門展行祖德尊靈髣髴瞻棟宇而風生喪紀綢繆備衣裳而日遠太之此舉必有為之人雖薄言詎成狂怪進天寶時擢書判拔萃科白駒易往素蓋俄歸長沙空庚日之災北海奄巳年之夢鄭太留轝永慕捧硯長悲通德之門露厂田坴書草承明之殿塵絕履聲且周設冢官孔演師卦戰亡猶令幽兆輿屍豈宜廟謁雖理殊觀蜡同賜也之云狂而義異亂神乃夫子之稱怪竊尋古制合寘今繩廷實一作賓天寶時擢書判拔萃科祭神如在肅事以敬求之髣髴望反諸幽持以精誠同夫嘗日甲司小職謬乎大義盥而從事情初寓於夙興燭以終歌理乃失於明發獻牲雖奠禮玉未陳苟蘋藻之可嘉將琮璧而何用雖氣均通正自調風雨之期若歲徧祈禳將從雲漢之祀入刑自通於抵玉論罰不假於鈞金重成天寶時擢書判拔萃科饁彼南畝田畯興至喜之歌平秩西成丁壯起務農之事國家風雷順動黍稷惟馨幸春籍於三推佇年登於百穀野雞五色先呈必稔之期銅鵲再鳴即告將豐之驗千箱萬庾實所荷於聖人土鼓汙樽徒有祈於田祖况祠祀禮也考擊修焉司察即是妄稱惟甲固應無罪震天寶時擢書判拔萃科職司其居官以物辦苟失其道孰當其憂杲杲重城上列雲霞之氣昭昭洞闔傍連紫翠之宮所以崇邃高深隔閾中外所以呵執異服驚讋非良鐘鼓司時自可密而善閉烟光滅景翻乃虛而不關扃鍵空施隄防靡寄且此之職守用備非常放而不嚴誰曰其誤宜致繩愆之責以儆慢官之罰晦天寶時擢書判拔萃科昔在軒后棟宇維新摹諸大壯賴及萬人修宮室以齊列起窗戶而相因然後橫高階於左右次危級之相巡上嵯峨而山起下崱屴而龍鱗生蓂莢於堯日舞干戚於舜辰亦可以望聖帝升降觀享頤賓若乃憶趙妃之嬌妒窮漢武之寵慾昭陽特起麗飾繁縟梁厂田坴藻繡窗綴丹綠砌釦黃金階闐白玉使宮女而攢望聊優游以自足下朱履而影亂參差度羅衣而香飛斷續亦有珍物旁秀王褱奇四燭珊瑚碧樹弄晴風明月隨珠耀初旭及夫陳后長信獨遭棄捐塵駮紫蘚庭鋪綠錢望金屋而魂絕對玉階而愁連至其戰國云亂七雄相足厂田坴秦兵大起圍邯鄲而已合趙楚同會運籌策而未宣嗟兩君之不決歎毛公之獨賢歷高階而直上挺長劒而無前豈不以斯階之見陟光厥事而能全既而衆狀叢開奇勢難纂或干天而上峻或盤空而不斷望之則意悅升之則步緩對謝庭而玉樹中榮臨兔園而芳薇上滿睹臺殿之要者實莫過於茲階美崢嶸之壯麗故作賦以攄懷鳳凰集於梧桐鷦鷯巢於枳俱順時以適理盡攝生以自得豈如雕梁禖燕葺高巢以安息既開珧戶逐仙羽以長生或在玉筐馴主人而含識質有稟於元造妙無方兮何極頡頏金屋差池翠宮銜泥繞棟度勢巡空憐綺窗之華影愛羅幌之春風得地相賀分飛就功廣狹殊軌規模不同散彩彬斑攢文潗孴疊輕蕊而矜暖布重泥而訝濕跡似連珠形如聚粒霽光分曉出虛竇以雙飛微陰合暝舞低檐而竝入我室既真虛白自生逼之不懼撫之不驚故鳥鵲可循而窺也龜鱗協瑞於太平余所以觸物而作興惟燕雀之一鳴開物議制興化擾人務先適時權貴合道甲為正典欲遵救弊決其澤障成我井疆冀茨梁有作藨蓘無嫌何已日未孚率籲斯戚然在釐變俗必觀習土與其芋羹豆食黃鵠興謠曷若池陽谷口白渠作頌自邑告命當反古以順今代天救人奚愎衆而從已謂莫益或擊須移轍知方成既無終往何難復雖聞言不信將降戾乎齊甿而有怨是叢請懲忿於鞭扑迪天寶時擢書判拔萃科景遵貍步張是熊侯地武茍合於舊儀下綱未踰於先制賓則有藝執射多功舒卷寧懼於出正發縱每聞於破的彤弓既彀與明月而合規白羽纔飛狀流星而遂貫然而禮成揖讓不獨主皮徒矜袒決之容未覩奠豐之事作而非法不足書能人而無儀誠須寘罰承暉天寶時擢書判拔萃科淹中闡教總三墳以昭彰稷下馳聲籠百家而紛糾是以陶冶代俗脂粉寰中事鬱不刊之書理貫無疆之美惟慎與接契叶情忘忽遇諸途乃相問道探賾致遠飛辨交馳索隱鉤深元談競瀉如磋如切頻登更僕之筵無體無方屢動起予之對公超山北吞八九於辭場伯起關西咀數千於辯囿孰謂寡識莫測高人輒此拘之誠為未可
