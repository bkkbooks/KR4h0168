front:
  text: 全唐文欽定全唐文卷四百十四常衮五
  hash: sha256:33996c40faca035d4730b770b6370b1a4591ef709002b5e8e7c438d02b6d46a5
body:
  text: 勅土宇服章以敘其德田租帖食以答元勳故寇鄧兼四縣之封張陳加萬戶之數開府儀同三司檢校尚書左僕射使持節汴州諸軍事兼汴州刺史御史大夫充汴宋等州節度使觀察處置等使上柱國信都郡王食實封五百戶田神功閒生河朔性與忠厚嘗秉大節服勞王家凡所委遇必當要重竭其公私益用親信入居百揆之右外作四方之屏自河而南戎鎮斯大總兵車之所會賜鈇鉞以專征考禮正刑豐財禁暴敬事節用老安少懷懋乃丕績肆於時夏服我休命敬茲分土可加實封一百戶餘竝如故勅懋策勳之賞則啟封邑賜真食之命方入田租故采地以處其子孫書社以尊其侯伯開府儀同三司檢校尚書左僕射兼魏州大都督府長史御史大夫兼魏博等州節度觀察處置及管內支度營田等使上柱國鴈門郡王食實封二百戶田承嗣出自河朔挺茲才器公忠有素文武是經行惟高簡言必誠信委之腹心實所親重內列端揆外當藩翰距河作鎮瀕海撫封貞一以奉上明恕以臨下謀出韜鈐之外功成戰伐之前專精牧人盡瘁事國政刑必中都鄙有章訓以農耕之業課其蠶織之事家給而禮讓攸興氣和而札瘥不作舊章咸舉厥貢惟殷來東人之職勞首循吏之行理嘉命休績允茲裦勸食其井賦用協典常可加實封二百戶餘並如故勅輦轂之下封畿之內承前戶口五千餘萬京兆祿廩不過二百石俸錢不過三十貫降至下吏差次可知自頃艱虞且踰星紀歲有事邊之役人多盡室之行閭井蕭然百不存一而府縣之俸十倍平時官高者因其使名數處請受位卑者假以職掌恣加優給致令所典之務移在他曹雖齊等倫頓異豐薄皆自常稅之外重斂而供浸獘則宏因循未改減我軍國之用困其疲耗之人豈計人置官之意度農制祿之法也四方取則其若是乎比下詔書務於勤恤將求致理切於澄源遂委中書門下條錄奏聞而躬親括巨細精詳覽其名實之狀深歎過差之極革其既往制在惟新爰據高卑以之均節使人足以奉闕吏足以資家務有不急悉皆除去仍量閑劇權省官員胥徒厮役亦有蠲減費用既少困窮自安唯出正租更無徵率其京兆府及縣官月俸除正斷外不得輒有增加如判司參軍丞簿尉等有犯科錄事參軍及縣令如令長及錄事參軍及少尹有犯坐京尹畫一之令當在必因勸百之義固非末減各儆於位無近於刑勅方伯連帥能修其職則勞之以璽書載之於正典式是㣥岳歸於至公以勤其職頌聲興矣周禮以孟春之月懸法布令採詩觀俗亦褎理行之時也其有惠訓一方吏之表率朗然明舉固可首之某官某受任藩閫三年有成清節獨立以身率下化在於言前風行於疆外遠清西南之氛齊一華夷之俗憂國如家上下同體屬關輔連雨去秋非穰以豐財節用之餘資備邊出師之費雖給馬官渡足食成臯勤王助邊何以加此誠則垣翰之寄奉上無私亦將廉吏清風夙夜相勉也寐期休績至於再三詔書諭懷宣示方鎮勅天下既定萬里寧一豈王者獨運而臻此耶實賴文武將守腹心之臣宣力強任捍禦於外也往以蕃戎並暴縱毒邊表乘舋伺隙連兵累年城門晝閉王師遐阻遮殺漢使盜取節印恣睢橫厲甚逆天理而國朝未暇襲遠置於度外實五京二庭存亡危急之秋也河西節度使周鼎安西北庭都護曹令忠爾朱某等義烈相感貫於神明各受方任同獎王室率辛李之將用甘陳之謀與羌騎校尉王后君長以下自金城玉關至於南北戊午踰流沙跨西海蒲類破白山戰爭致命出於萬死賴天之靈以戰則剋不動中國不勞濟師橫制數千里有輔車首尾之應以威以懷張我右掖稜振於絕域烈切於昔賢微三臣之力則度隍踰隴不復漢有矣每有使至說令忠等憂國勤王誠徹骨髓朝廷聞之莫不酸鼻流淚而況於朕心哉遐想攸攸耿歎何已或恐凶醜狡譎反復離閒妄說國難搖動人心今所以疏其事實一以相報近有流落蕃中十數年者至闕庭知犬戎惡稔上疑下阻日就殘滅加之疾疫灾及羊馬山谷填委天亡之時及酋奴自速其禍諸蕃連衡以助進取力屈氣衰亡逃於苦寒之地西北邊患蕩然以清至於九夷南盡百越玉帛來朝於魏闕苞茅入貢於王祭黨項內附回中大寧天下郡國一其教理王畿征調漸復平時子儀移鎮於邠郊抱玉進攻於天水士馬百萬當令悉西方垣翰之寄所宜協心戮力抗厲威武同赴戎會也勉卒志業以時康功慶流子孫永久無替高映勳典豈不休哉每念戰守之士十年不得解甲白首戎陣忠勞未報心之惻怛不忘終食要當候大師所指窮荒蕩定懸爵位以相待傾府庫之所有以答西州賢士大夫忘身報國之誠遣詔諭意非一二所能盡也勅書曰元后作人父母又曰一夫不獲則曰時予之辜政或不平訟或不理則人受其弊氣生其災噢咻連聲愁苦無告州縣長吏莫之省憂念茲疚懷中夜三歎朕以不德託於人上永言理道敢不勵精然自兵亂一紀事殷四方耕夫困於軍旅蠶婦病於餽餉欲求無事豈可得乎致令戶口減耗十無一二而河南淮南又甚諸道得非蒐乘補卒之數急賦橫稅之煩致使遑駭匪寧流庸不復兼亦親人之職少有政術稱者其於賦役多患不均靡室靡家皆籍其穀無衣無褐亦調其庸雖節制廉察皆務令條理而貪官冒法未絕姦源誅求無厭鰥寡重困永歎遐想過實在予巡撫之寄資於碩德某官某相府之舊道在安人自河之南天下之半底慎財賦衣食京師久於倚任多所宏濟因其旋南將命攸屬所至之處宣示詔書撫將校之勤勞問黎元之疾苦事有未便法或不行委之革歸於允當或假其征徭私有聚斂或託以貢獻公然乾沒厚取於人歸怨於上虧損時化朕實懼焉宜委某與節度觀察切加疎理勿令寃濫以副憂勞其官吏有犯便禁身推問具狀聞奏當峻刑典以息貪殘門下河朔一隅地方千里外捍夷狄內輔成周撫勤王之師脩任土之貢顧其方鎮可謂崇重眷我侯伯是有勳勞且將相國之股肱兆庶君之支體事同休戚寧忘鑒昧思撫巡而未獲念征鎮而永懷爰命宗臣往申旨諭銀青光祿大夫行尚書左丞襄武縣開國公李涵朕之茂親腹心攸寄純固所以致命文質所以經邦溫恭禮讓誠信易直勵匪躬之節秉憂國之心美其公才嘗所任委再令宣撫皆合事經既述謙誠之詞兼陳理化之績慰我憂念意甚嘉之今秋冬在候徭戍勤止將校有介冑之勞黎元有賦稅之役代予親問詔爾使臣仍兼副相之榮式重登車之務可兼御史大夫充河北宣慰使本官勳封如故勅書有施命以誥四方禮有誦志以巡邦國明王所以垂拱而天下理者非家至而日見之也實賴腹心耳目之臣審訓命於外俾德澤教化敷於四海情有所達事適其宜上下交暢則天地之和應矣喻我朝旨寄於宗英銀青光祿大夫行尚書兵部侍郎襄武縣開國公李涵志以足言學於古訓安和好敬慎靜尚寬服居大僚常所親信每授重寄必揚休聲往以幽薊渤碣之閒戎府方州之大俾付王命以親諸侯至於再三秉此純一盡人臣之節罔或辭難徇國家之利豈憚勤遠信以協誠惠以交福周爰咨度不遑啟處朔陲寧晏敬賴親賢今以侯伯之勳勞師人之戍守顧其忠効宜有撫巡高選中朝允茲僉論加以丞相之副增其原隰之華時維懋哉無替厥服可兼御史大夫充河北宣慰使餘如故勅元帥都虞候臧希讓沖明在躬質重成性閱禮樂以經武秉公忠而濟時夙傳金匱之符久總牙璋之律勳高坐樹業茂分茅中外洽其嘉聲始終全其勁節嘉乃公望於朕心惟彼朔方久罹邊患地即興王之所人推奉上之誠言念勤勞豈忘慰恤宜應使乎之選式副往哉之寄勅理天下者先務於遠安本人情者必令其上達或刑罰不中德信未孚則生怨咨是有申諭朕以服嶺之表方隅之大南盡百越專制萬里擇將置守常亦難之至於臨遣屢有明誡俾施惠政以息疲人而長吏議法不平作威以逞因其猜阻陷我忠良馮季康何如暎等南方右族累代純臣協其義烈之心積有艱危之効惑於所譖虐用其刑無狀致辟遂生邊患朕自託人上每勞日昃法天地之生成宏父母之慈愛聞此濫罰惕然疚懷尋亦辯明特令昭雪如聞溪洞尚有紛擾哀我庶士勞於甲兵豈不求安良有以也所以更謀良帥先用舊德兼御史大夫徐浩歷典中外長於撫馭素所親信俾其鎮輯元冬之首當至彼方必能大布風化永清麾管仍命尚書比部員外郎莫藏用往嶺南宣慰問以疾苦弔其死喪其季康等遇害之家躬自存撫切加贍恤務令得所以慰孤遺其軍州所有結聚申明中旨懸示大信但能歸附即是平人豈惟復業安居亦當隨才命職兼至桂州宣慰應水旱所損或須蠲免宜與觀察使商量處置勉膺朝寄以慰朕懷勅震澤之南數州之地頃以水澇暴至沱潛潰溢既敗城郭復瀦原田連歲大歉元元重困餒殍相望流庸莫返加之以師旅煩之以賦役哀我矜人何以堪命朕君臨之道猶鬱牧養之政未宏咎之所降諒在於此雖天災流行則有恒數而夕惕若厲豈忘責躬夫振人育物大易之明義也自漢魏以來水旱之處必遣使巡問以安集之國朝因其制焉亦命近臣慰撫俾喻求瘼之意用舒科泛之急宜令中散大夫給事中賀若察往湖南宣慰處置其百姓遭損不能自存者應須賑給蠲免宜與本道觀察使商量處置訖聞奏仍齎詔書體問周恤宣示郡邑令悉朕懷勅夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也故謂之天下中正而頌聲作矣迺者因三代之制定其稅典務於行古庶以便人屬外攘四夷歲會戎事軍國用度公儲匱乏役費荐至近於倍征而吏或奉法不謹失我字人之意孤惸者恣其厚斂豪富者貸以輕徭動而生姦浸以流弊謂之什一其實太半致有去父母之邦甘保傭之役流離逋蕩靡室靡家或阽於死亡而莫之省每一念至良深憫惻頃亦革從其便安量沃瘠之差寬賦斂之重今邦畿之內宿麥非稔去秋墾田又減常歲昨者徵稅其數頗多朕以萬姓不安三農將廢憂勤鬱悼中夜以興思有康濟未臻其道每欲悉免量入息其重困而未解兵嚴猶資日費用蠲恒數以恤疲人其京兆府今年所率夏麥宜於七萬碩內五萬碩放不徵二萬碩容至晚田熟後取雜色斛㪷續納仍委京兆尹崔昭差少尹李椅于頎等分縣巡撫必躬親宣示朝章令知朕意勅天之所命俾朕字人豈敢怠荒期於康濟勞精極慮十有四年務崇省約以訓天下訪其疾苦屢有蠲除公稅之差僅從盍徹宮衞之備仍罷踐更兼損服御用資軍國大去煩弊以休邦畿遊食之人悉歸南畝墾田之數漸復平時神降嘉生歲乃大熟震於珍物景福紛委蓋上元列聖之儲祉也豈寡昧之德而臻此耶夙夜祗惕永懷增懼然以令有緩急物有重輕故粟輕而易散錢重而難聚古人所謂糴之至賤與貴其傷一也如聞閭閻未免疾苦至乃以粟數斛易錢一緡雜以他徭難以償費轉用所寶念之惻然深可重惜所宜節省其京兆應諸色番役等訪聞諸司或有徵課比緣時儉資數稍多估折皆賤不仍舊價其掌閑彍騎三衞及橋堰丁匠等如本司須徵資竝納錢三千米六㪷其青苗地頭天下諸州每畝率錢十五頃以京師煩劇供應頗多苟從權宜遂倍其數自今以後宜準諸州例徵率朕以帝王之教人如父母之訓子所以至纎至悉必躬必親苟或便之豈憚煩也宣示百姓知朕意焉勅三代之時籍而不稅降及近古或至倍征承平則省於經入有事則煩於荐費亦古今之常也朕勵精憂人夙夜勤約至如王制之定國用人曹之制地征必視豐穰與之上下然以邊未徹警十年於茲連五兵七卒之屯有賦輿調食之重徵求橫作空耗吾人所以征地之數有踰常典頃者躬自節儉勵於三軍斂從其輕以減太半今舊穀既沒宿麥未登尚使餒殍相望流庸不返邦畿千里編戶六殘慮有自存之人未喻詔書之意臨時科率或恐增加以茲躊躇多不墾闢行及春暮田萊益荒屬膏雨霈然慮失農候故重明朝旨更減田租蓋畿內移運所餘全少山東加運其助頗多朕又親統六師大閱戎籍事必精實自然蠲省京兆府夏麥上等每畝稅六升下等每畝稅四升荒田開佃者每畝稅二升秋稅上等每畝稅五升下等每畝稅三升荒田開佃者每畝稅二升比者百姓不安皆因稅重據其減數漸復平時頗有優當兼罷徭役加之誡勅又絕侵漁所宜鑿井耕田各勤生業自今已後必致康寧仍委京兆尹及令長分明宣示以勸東作躬親慰撫稱朕意焉勅王者承天命以養人也愛之如身豈止如子餒者食之寒者衣之猶恐仁之不至愧悼之心惻隱於內而不能已也故天下有道藏於百姓古之使人不過三日可以長孺齒可以養孤老蓋太平至理之化何施而集於此乎朕承奉大業於茲八年不能恢宏至道被之六合雖德之寡昧未燭於理常亦憂勤損節以濟元元豈不知乾坤以易成物帝王以惇儉守位從賦斂之薄省哉然時或多故事非獲已屬外攘夷狄連歲備邊兵車之會不下十萬餉饋耗竭邦畿大殘又郊社宗廟之祀府庫賜與之用庶事之費皆仰給焉急賦暴征日益煩重加以水旱相乘歲非豐熟方冬之首穀已翔貴又宿豪大猾橫恣侵漁致有半價倍稱分田劫假於是棄田宅鬻子孫蕩然逋散轉徙就食行者甚眾念之疚心夫安土重遷人之常性向非誅求之數豈去父母之邦哉蓋以朕不敏不明鬱於教化德之寡薄以至於斯傳曰百姓不足君孰與足書曰民非后何戴后非眾罔與守邦今縣內告病流亡不已失於撫育之道得不愧於心乎哀痛勤約明發不寐在予之情懼惕良深宜有蠲除以惠貧弱其京兆府今年秋稅於所徵數內減十萬石百姓應納諸色物等比緣朔方軍糧轉輸勞獘又時方收斂務從便省其草粟等並於中渭橋東渭橋納仍各隨當縣道路穩便如法般入苑南及於苑北面貯積及檢納等宜委中書門下與所由計會處置百官及府縣官職田歲月深久多被換易縱有本主皆是蒿荒虛配戶人令出苗子閭閻之內其獘至深今年宜四分徵一餘並放免其諸司諸使丁役及夫匠掌閑三衞彍騎等戶多非正丁皆率貧弱頃雖減省猶慮艱辛宜委中書門下即各與本司計會如灼然須役正身者具所要色目事由聞奏除此之外商量和雇并百姓先出資者並官出錢充資畿內至來年五月已來一切停差遣來年准旨及勅并度支符應年支諸色雜物合各徵科百姓等宜據所由供數並官出錢置使依市糴供所徵百姓宜停應供往來郵遞從來年正月至麥熟以來並官出給百姓應有負欠一物已上及諸雜夫役庸課未酬納者一切容至麥熟填還所由不得輒有干擾如官典隱盜在腹內及有欠負者不在免限且風化之由繫於長吏黜陟之典所宜大明宜令御史臺切加糾察其戶口有減田萊不除或流庸稍歸農畝加闢即宜具名條奏當峻刑賞庶使凋瘵之人僅予蘇息憂勤之志上達神明宣示詔書令知朕意勅王者以冢宰制國用以司會質歲成必視豐荒之年以均輕重之數自近古以來天下郡縣或有水旱之處則亦減其田租休其力役不急之務不便於時亦皆節省以惠窮乏上天眷命屬朕元元敢不敬承勵於勤儉躬自菲薄刑於邦家非上薦宗廟下資師旅未嘗私於所奉更有徵求藏之於人孰謂不足迺者屢減邦賦以勸耕農而四時罔愆九扈皆敘近自關右達於海隅溥其百穀之穰寧止三年之積非朕寡德所能臻茲蓋祖宗景靈被此嘉貺仰荷殊慶兢懷益深而淮南數州獨罹災患秋夏無雨田萊卒荒閭閻難食百賈皆震永念於此尤增憮然我心憂傷終夜不寐宜有蠲貸用安流亡其淮南今年租庸地稅所支米等宜三分放二楊洪宣等三州作坊往以軍興是資戎器既屬歲歉頗殘吾人徵材役工荐費尤甚惟務省約以息困窮亦宜并停宣示百姓知朕意焉勅頃以蕃寇猶虞王師未戢所資軍費皆出邦畿征調荐興日加煩重閭閻困竭人轉流亡念之疚懷旰食增懼近者省月更之役減歲入之租務於惠養冀有蘇息尚聞告病終未安居深用悼懷更思優䘏今關輔諸屯墾田漸廣江淮轉漕常數又加在一年之儲有太半之助其於稅地固可從輕其京兆府來年秋稅宜分兩等上下各半上等每畝稅一斗下等每畝稅六升其荒田如有能開佃者宜準今年十月二十九日勅一切每畝稅二升仍委京兆尹及令長明申詔旨分牓鄉閭一一存撫令知朕意勅守位聚人有賦有稅所以奉宗廟之祀備水旱之災事之大經古今不易國家計其戶籍俾出泉貨著在令典謂之兩稅天下通制行之久矣自師旅荐興征調煩數法度多峻遂廢其名近舉舊章用遵薄賦施於中外其法一也屬歲會戎事聚於邦畿以鰥寡困窮之人當征徭力役之重久於供費皆至匱竭蕩然流散言念傷懷比之四方此實尤甚宜思蠲貸庶令蘇息其京兆府見差科百姓今年秋稅錢特宜放免勅周以司會立經制漢以丞相校簿書量其國用差其稅典必以省費由之重輕公田之籍可謂通範履畝而稅斯誠弊法將期折中以便於時億兆不康君孰與足故愛人之體先於博施富國之源必在均節朕自臨宸極比屬艱虞亦嘗慕淳樸之風守沖儉之道每念黎庶思致和平而邊事猶殷戎車屢駕軍興取給皆屬邦畿九伐之師尚勤王畧千金之費重困吾人乃者遵冉有之言守周公之制什而稅一務於行古今則編戶流亡墾田減耗計量入之數甚倍征之法納隍之懼當宁軫懷慮失三農憂深萬姓務從省約稍冀蠲除用申勤䘏之旨以救惸嫠之弊其京兆府所奏今年秋稅八十二萬五千石斛㪷數內宜即減一十七萬五千石委黎幹據諸縣戶口地數均平放免仍分明榜示百姓令知當戶所減斛㪷數訖聞奏其應徵青苗地頭錢亦宜三分放一其先欠永泰元年地頭錢一十四萬九千一百四十一貫並宜放免除丁匠掌閑正番外至來年麥熟以來府縣一切更不得輒有科稅朕當躬儉節用以贍黎元中夏漸寧庶有康濟宣示百姓知朕意焉
