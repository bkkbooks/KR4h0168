front:
  text: 全唐文欽定全唐文卷四百五十九公叔大歷十二年進士
  hash: sha256:670621ecedd9d1185d4e19ee3a3ae6c6b04c1e65569bc18c1d851eda59ebd737
  markers:
  - {type: head, offset: 14, content: 任公叔, id: KR4h0168_NFKB_459-h1, level: 1}
body:
  text: 武皇起雲陽之宮致崇臺於爽塏就山谷之交會得神明之所在近瞰八極周臨四海將端冕而不二必垂衣而有待是用回載天路高標地遊依稀元圃想象丹邱磴道邈以特立通天赫其無儔託神靈於秦甸結元氣於雍邱白日旁轉青雲上浮八垓可接於咫步萬象無逃於寸眸是獻歲春衆靈咸秩天子乃舉㣥祠撰吉日郊上元禮太乙風伯陪乘蚩尤扈蹕向甘泉以整像屆通天而挺出既而越氛霧之塗近星辰之境背麟衍之五畤面長安之萬井岐陽太華雙標象闕之形秦嶺終南遙樹軒墀之屏蹈煙霞而有慕潔齋戒而思眚奉寶位之虔恭佇神仙於光景當其宵衣待曙暘谷未開鈎陳匝乎營衛天漢列其昭回爟火周起神光迥來暨三山之遍登當仰候於斯臺靄靄高躅神祇煜煜喜氣周旋慶雲回復召安期於滄海降王母於黃屋樹翠玉以青蔥草靈芝以芬馥上結綵幟高居耳目斯覽物以懷柔非取愛于幽獨觀乎層構陵空形勢作雄風起而纖埃不致雨過而瀑溜潛通其載惟厚其覆惟洪所以大起於皇祚豈獨峻極于蒼穹是以擁帶休徵感通純嘏會歌童之曲節彰從臣之風雅立極人望叶靈王者將大漢之可追願侍祠於臺下司馬遷世掌天官才稱良史探禹穴之遺迹紀吳國之舊軌乃憮然而歎曰登此姑蘇之墟淹留兮躊躇感斯宇之基為沼而仲雍之祀忽諸我聞周道既衰諸侯狎主中無霸王蠻夷振旅始闔閭以信威終夫差以極武左與徑越同壤右與強楚為鄰內有高臺之築外有遠略之勤積如莽而暴骨亦如讎而視人是以疆埸日駭版築未弭方五載而厥成造中天而特起因土纍以臺高宛嶽立而山峙或比象於廬巫之峯或倒影於滄浪之水悉人之力以為美觀厚人之澤以為侈靡斯實纍卵於九層夫何見夫三百里俚語有之曰川壅則潰月盈則匡善敗由巳吉凶何常矧謀主之賜劒若涉川兮無梁以為棲越以求霸卒見豢吳而受殃客自南鄙觀乎江濆徘徊舊德惆悵前聞試遊目於寥廓曾巋然而參雲聽逆虐而翳諫竟麋鹿而為㣥高天放曠平湖泱漭奕奕孤嶼茫茫極浦悲早鴈於海風嘯高鴟於江雨況復關梁坐隔羈旅增愁山木將落汀葭亂秋思美人兮何處獨懷邦兮遠遊彼名遂以身退顧與范蠡而同舟東吳王孫有晬其容因少為唱曰中心不必兮子胥何為懷直道而驟諫遭重昏之見危將漁父以抗節且垂釣於江湄高臺既傾夕露沾衣感蒞國之不及冀來人之與歸者也淙大歷十四年進士大儀設象下土是保作炯戒於人主垂吉凶於穹昊咎厥失政休厥有道盈縮之分足推進退之心可考或主德而有功必祐或主法而有罪必討為天之佐兮融融作乾之緯兮杲杲若乃縱橫天宇經緯星足廠田坴光芒井口煜耀斗邊乍聚乍散或離或連分道則熒熒冰散周流則點點珠圓其動也直其靜也專道濁則失位時清則色妍豈比夫二使獨能承命七紀徒為麗天者也今我后運乾之符握坤之紐表正萬方肇康九有啓土繼聖乃人和而歲阜順時立政故天長而地久所以有倫有次不淫不守光光兮作邦之孚崇崇兮作聖不朽故我后修五禮偃五兵君臣一德歌舞以行斯倉斯廩如坻如京玉衡正泰階平遂使金也水也不能知白而守黑木也火也不能全曜而自貞乃並用而丕變與黃中而同明東為四方之首胡不與歲而同色水為五行之長胡不助神以同榮翳土也是我皇之休運乃昊天而有成且玉燭常明霜天若鏡鄰月魄而璀璨落天津而隱映朝臨日道助我后夙興之勤思暮入天樞表聖皇夜寐之勤政有以見日月之貞觀有以見天地之寶命暫逢急景之時更作重暉之詠璀博陵人代宗時為澶州刺史不為煩苛人便安之戶流亡還歸居二年增戶萬數詔特進五階以寵異政仕終湖南觀察使科其罪文兄遂投匭請追弟試敕付太史試訖甚為精妙未審若為處分精心凝寂綿思洞幽既訊水之如符亦言天而若印昔聞其事今睹斯人馮文儒術圓冠識均方士恥蒼蠅之迷夜重鳴雞之唱晨由是微神穿石流觀刺井探九元之微妙察五緯之綱維眷彼傾河言不乖於暝雨循茲險澗罪已挂於秋霜鄰人嫉深始求資於魏闕友于情切方辨過於堯年由是皇旨鑒微刑不阿附既令付法須裁典憲按其所犯合處深刑但以學擅專精志希供奉事頗越於常道律當遵於異議即宜執奏伏聽上裁上卿代宗時擢書判拔萃科恤祀惟聖頒官有典三冬索饗以蠟昭報日孚皇澤非木賜之知歲勸農功首炎帝之奠所司恪謹成式厥圖斯永豳詩土鼓且奏和音表貉昆蟲固茲咸秩雖田惡鼠之食在禮遵以迎豈可獨忘播時見遺司嗇伊耆氏之作蓋不易然大宗伯之聽孰云能守御史以冠雄鐵柱糾繆是彰彼以口異金人飾詞猶費徒稱君子必報曷若明神處前古而強授使亦奚據請從白簡以奏彤廷賁大歷朝官左司員外郎王者無外寰中有截邊鄙不聳邦國以寧蠢爾蠻夷遽相攻伐異荀息之假道且欲涉虞殊申舟之是行無聞聘晉屬四月維夏三農聿興麥已熟於東皋人未饁於南畝瞻言縣宰重化黎氓彈琴自娛宓子賤之多暇戴星以出巫馬期之克勤過齊魯之相持觀邊徼而皆警是割是穫雖美或人之謀我疆我理須從宰君之法何者食曰人天苟求食而忘恥農為政本有惰農以自安候其觀舋之生將欲不耕而穫惡未可長患實預防百里正且得中六條恐為虛讓藏用代宗時擢書判拔萃科善教者為政有聞適權者在邦必達能臨事而當斷非不詢而作謀茍或越官是稱專欲屬王風不振霸業衰陵蠻夷假道於上國丁壯就功於下土我承其弊肆毒宜縱於貪狼爾無令聞為患亦同於蟊賊思營負戶議發懸門雖師將入郛而人未及麥茂宰施令黔黎酌心能操製錦之刀不紊在綱之網禮先敦義政貴有恆盡地必資於勸分滌場或存於禁末我疆有畔須務材而訓農他人越思豈瘠魯而肥縣大夫之立法於豫何誅郡符竹之薄言將子無怨且人有食色師非及耕宜從宣父之存信不讓勾吳之棄鼓況縣道駢雜寇衝錯聯若從穫於或人是亂行於田畯則輕賫者先於望歲剽劫者多於服勤革其虛求亦謂盡善季龍代宗時擢書判拔萃科大為之防自我王度動不失實為爾政方苟消息之乖宜諒子惠之無取相茲邊邑正曰寇衝務時訓農猶溫麥而雖盛利兵秣馬假虞道而方深實慮欺天之凶寧顧如雲之稼或人行險以徼幸將馮河以請收縣宰觀變以咨諏固下關而不許度其危亂之際想其爭奪之源恐服田者不得自專而遊手者坐乘其利則不收不穫誠虛力穡之功而惟一惟精實杜無知之俗臨下以簡示人不偷得仲康馴翟之風符子賤彈琴之化何剖竹之虛讓掩烹鮮之異能歸裕代宗時擢書判拔萃科備豫不虞古之善教防萌是禁今也難易惟彼邊邑賴斯良宰行化使尊其五教務穡不奪其三時屬夏麥已熟秋成未幾丁壯愍焉望歲農父期於有年甸人未進於絳君鄭師何傷於周野豈謂東夷有事南蠻是襲烽火驚候於甘泉虜騎振武於沙塞固當因茲料敵無乃啓戎縱彼所取肆其所穫則愚人每渴於僥求空思寇盜田畯獨嗟於苟得欲罷耕耘誠百里之良謀豈一同之紊政況慮深知遠而智在窮微雖為郡長之讓應免士師之罰軼代宗時擢書判拔萃科疆埸之事先於慎守田農之業在乎克勤必資禮以防之是謂政有經矣國家臥鼓荒徼偃伯靈臺干戈既戢雖息犯邊之慮蠻夷相攻尚無假道之禮今者大田既稼滯穗未收邊邑常近于寇讎或人且慮其蹂踐請皆出穫成此有年欲使功見於多安能義然後取邑人爭出必盡室以行我倉既盈或不耕而穫豈伊恤病實長幸災惟彼前修邑宰之化斯得徵諸故事郡長之讓頗乖昕代宗時擢書判拔萃科於從政乎務知遠者苟施小惠是紊大倫惟彼邊邑地雜華裔允茲賢宰政協良能雲雨之施既行蒲密之風斯得屬麥秋已至農事方殷不虞蠻夷聿相寇虐豺狼猖獗且迷假道之心原野馮陵得無犯苗之患遂使我疆我理不復如茨如梁將從皆穫之詞是利不耕之願雖或思苟得從效單父之氓而宰絶妄求式光宓子之教末哉郡長昧此令圖雖為責人無難其如有孚室惕賞代宗時擢書判拔萃科許郡長讓之云恐為不耕者所得蟊賊尋戈聳我邊鄙穡人是溷曠茲割穫且蠻方不率夷德無厭贄幣不通范宣止其預會攻取何有楚子莫得同盟乃類乎齊有魯師晉假虞道俾我原田亂轍麥隴啓行川上芃芃豈遑出穫邑中惴惴時有登陴明宰道不忍欺弦歌斯洽以為不耕而穫負胡取之義有備而舉徵牽復之辭百里此勤信徵我有咎六條所讓伊不明謂何潤之代宗時擢書判拔萃科四人有業天下同歸理在營生方光潤屋貨賄山積是往來於五都珍奇海輸乃森羅於九市眷言商子實職貿遷襲弦高之風為絳侯之事經途所亘多跋涉之勞飲宿乖宜爽陰陽之候野廬所掌井樹是修何得曠於主司致有損於行李遂使銀牀罷汲無郝子之投錢碧樹摧榮聞茅生之危坐盍歸司敗以正刑書懲其已犯之愆永息將來之弊運代宗時擢書判拔萃科玉有環珮所以節威儀圭璋所以應朝覲朝覲貴乎特達威儀在乎淑慎則珮之為用以德聞珮之為服以禮進既取堅以縝密亦體柔以溫潤其彩炯明涵黼黻之華其聲清越諧金石之韻豈止法先王之服戒乎大夫抑以觀古人之象原之帝舜由是表尊卑之飾彰朝覲之美佩山元而抱水蒼搖搖兮耿光左宮羽而右角徵鏘鏘兮垂委非徒抑其進退亦以制其容止則裂石破玉靡顏膩理清清泠泠作羽儀於君子思我王度服之衷已珩韍相煥品命不渝貫以桃花之綬錯以明月之珠時也朝北極歷天衢明玉殿耀金鋪徽音生於矩步繁響起於風趨濟翼為君臣之榮觀逶迤乃賢哲之令圖亦何必搴修蘭於長坂折瓊枝於遠區然後為美乎別有楚臺神媛越國名姝嬌羅豔縠秀色鮮膚振鳴玉以響亮踐瑤階以踟蹰聲珊珊兮若有無睇帛丿糸帛丿糸兮意愈愈翩躚躚兮望坐隅欲從君兮禮之拘乃歌曰佩玉蕊兮德音發中規矩兮聲不歇馳畋獵兮思敬慎壽考不忘兮長歲月端法服兮臨魏闕㣥后覲兮萬方謁學以道尊禮為教首事克師古人焉生惑眷言彼甲惟德潤身敦詩説禮奉守先王之訓博聞強識能為君子之儒是以生徒駿奔負笈雲集橫經紛其滿席執禮爛其盈門故能春秋匪懈享祀不忒教胄子之威儀陳鄉人之揖遜登以素品射從薄物稽諸匏葉有若蘩蘋桑弧不類於桃弧兔首豈齊於貍首同劉昆之故事習俎豆於私室異祭遵之前式陳禮容於軍旅古則無議今亦何傷徒小有言責其行禮欲崇北海之術謹遵東觀之詞確代宗時人雎南太守靈德大君死國曰忠死家曰正夫婦雙節萬古芳名天子錫葬崇榮厚死骸莫同封神妥於此鬱鬱洛塘龍蟠鳳翔巍乎泰峙地久天長羽林繁祉其福無疆自古文體變易多矣梁簡文帝及庾肩吾之屬始為輕浮綺靡之詞名曰宮體自後沿襲務於妖豔謂之摛錦布繡焉其有敦尚風格頗存規正者不復為當時所重諷諫比興由是廢缺物極則變理之常也聖唐受命斫雕為朴開元之際王綱復舉淺薄之風茲焉漸革其時作者凡十數輩頗能以雅參麗以古雜今彬彬然燦燦然近建安之遺範矣南陽岑公聲稱老著公諱參代為本州冠族曾太公文本大父長倩伯父羲皆以學術德望官至台輔早歲孤貧能自砥礪遍覽史籍尤工綴文屬辭尚清用意尚切其有所得多入佳境回拔孤秀出於常情每一篇絶筆則人人傳寫雖閭里士庶戎夷蠻貊莫不諷誦吟習焉時議擬公於吳均何遜亦可謂精當矣天寶三載進士高第解褐右內率府兵曹參軍轉右威衛録事參軍又遷大理評事兼監察御史充安西節度判官入為右補闕頻上封章指述權佞改為起居郎尋出虢州長史又改太子中允兼殿中侍御史充關西節度判官聖上潛龍藩邸總戎陝服參佐僚史皆一時之選由是委公以書奏之任入為祠部考功二員外郎轉虞部庫部二正郎又出為嘉州刺史副元帥相國杜公鴻漸表公職方郎中兼侍御史列於幕府無幾使罷寓居於蜀時四川節度因亂受職本非朝旨其部統之內文武衣冠附會阿諛以求自結皆曰中原多故劍外小康可以庇躬無假向闕公乃著招蜀客歸一篇申明逆順之理折挫邪佞之計有識者感歎姦謀者慚沮播德澤於梁益暢皇風於卭束束火旋軫有日犯軷俟時吉往凶歸嗚呼不祿歲月逾邁殆三十年嗣子佐公復纂前緒亦以文采登名翰場有公遺文貯之筐篋以確接通家餘烈忝同聲後輩受命編次因令繕録區分類聚勒成八卷倘後之詞人有所觀覽亦由聆廣樂者識清商之韻遊名山者仰翠微之色足以瑩徹心府發揮高致焉京兆杜確序萬大歷中官員外郎庸功制爵以國俾侯司勳是職太常是紀錫周官之彞器分漢家之茅土古之成憲今也則殊乙之所封義符分陝介圭入覲盛君子之威容家田無征備優賢之榮寵何縣道之為僭宜有司之見劾徒用多言是為害政光大歷時官硤石主簿大邦列土畫有則齊氓分利割據必書苟非躬田無或編版功以受錫人其捨諸吉泰攝生明代志事耕鑿率情暗昧固貪井屋官未聞於三命謨亦乏於九功匡救本無封賞何有輒將均輸之地以載充家之籍則宏羊藏事今也雖存劉盆祝食此而安取既黷常典合置常刑江代宗時官郾師尉包之為言也廣大含宏三才悉備言乎天道有日月焉有雷雨焉言乎地道有山澤焉有水火焉言乎人道有君臣焉有父子焉理國理家為政之尤者昔文質更變篇題各異夏曰連山殷曰歸藏周曰周易而唐謂之元包其實一也包者藏也言善惡是非吉凶得失皆藏乎其書也觀乎囊括萬有籠罩八紘執陶鑄之鍵啓乾坤之扃孕覆育載通幽洞冥窮天人之祕研造化之精推興亡之理察禍福之萌與鬼神齊奧將日月並明謂六五經而四三易雖太元莫與之京然文字奇詭音義譎怪紛而不釋隱而不明者得非遭於離亂與易曰作易者其有憂患乎蓋所謂憂亂世而患小人也故其辭危衛先生近之矣祕書少監武功蘇源明洗心澄思為之修傳解紛以釋之索隱以明之帝王之道昭然著見有以見理亂之道有以見成敗之端江考於訓詁耽於講習輒演元義庶傳於學者焉延光代宗時人視瞻無回在於往記周旋有禮著之前聞惟彼長年與茲解式行將望遠豈伊升高之能賦悠然目極寧復登山而送歸且平原坦夷回首超忽苟不從其所視欲何詳於切問式之立身誠未謂之學矣長者加杖蓋亦尤而效之則不慍不知君子之通論如怒如祉詩人之美述既墻面而斯責於情恕而安施薄訴之由其文有以雖鬬論敕法頗欽於州見而失入在宥請遵乎省科嵩高陽人代宗朝官殿中侍御史元宗季年濟陽廢而東平兼領之所稱河東裴公即故郡守名序所題趙郡李卓即今臺長棲筠頃歲馬公炫自郎官出牧少與臺長交契莫逆嘗勤爾於廟不覩所記逌搜李文以勒貞石每歎曰所謂經過疑文章者其在茲乎未及畢而謝病言歸今二千石郭公岑尚德是務踵成厥美句曹掾韋騰戎曹掾俞黃中郡之良也承命集事殿中侍御史高陽齊嵩聆而嘉之故紀云唐大曆八年七月十五日建
