front:
  text: 全唐文欽定全唐文卷八百四十七翹舜卿從子梁貞明中為翰林學士後唐天成中為給事中
  hash: sha256:716f491d3121989bc038de88a317c351cd18e65a5cc70473e64bf13a94017c4a
  markers:
  - {type: head, offset: 14, content: 封翹, id: KR4h0168_NFKB_847-h1, level: 1}
body:
  text: 竊見五日轉對於事太繁所見或有短長不當空煩聖覽請此後祇於入閣者依刑法待制官例次對天地之經陰陽之數莫不上規帝道旁體物情儻國人偶有其咨嗟則時令必為之差忒如陛下英明御宇勤儉臨朝推泣辜罪己之心行解網納隍之道無偏無黨憲章不濫於雷霆克寬克仁霈澤嘗均於雨露致君己及於堯舜勃興尋竝於禹湯則合災星退於三移瑞日呈於五色焉有自冬徹臘啓歲經春陰雲多蔽於長空滯雨頻霑於連日豈是未臻聖政不降靈休既難喻於元穹須更增於隆德伏乞稍留聖念明下所司俾郊壇祠祭之儀簠簋馨香之料尤加清潔倍致敬恭罪非劫殺旋令疏放亡歿卿士希加賻贈農桑藉力之時務蠲大役禽鳥營巢之際禁斷網羅恭祈十雨五風以卜千秋萬歲詔付所司詳酌施行臣聞立愛惟親教民以睦實大朝之重事乃有國之通規是知維城為國本之資磐石作安宗之計所以興隆鴻業保定皇家伏惟陛下天祚丕基日新聖德使九功之咸敘致百度以維貞墜典皆修遺文必舉獨於封建未覩宣行既尚抑於龍樓宜且遵於麟趾乞命親賢以資夾輔星辰合度風雨應時將修賽謝請以御前香一合聖上親一炷餘者即令分於所謝答廟中焚之貴表精至庶賢聖感通澄後唐明宗朝官大理少卿楊漢賓早列偏裨曾分茅土事若先於恕己理不在於尤人豈可忘姻婭之舊情憑官資之威力遽因毆擊顯致訟論自歸有過之門須舉無偏之道合該議減亦舉律文其漢賓前任黔南節度使是三品使關入議准律減一等杖九十准名例律官少不盡其罪餘罪收贖罪少不盡其官留官收贖其楊漢賓所犯罪杖九十准律贖銅九斤准格每斤納錢一百二十文臣聞安危得失治亂興亡誠不繫於天時固匪由於地利童謠非禍福之本妖祥豈隆替之源故雊雉升鼎桑穀生朝不能止殷宗之盛神馬長嘶玉龜告兆不能延晉祚之長是知國家有不足懼者五深可畏者六陰陽不調不足懼三辰失行不足懼小人訛言不足懼山摧川涸不足懼蟊賊傷稼不足懼此不足懼者五也賢人藏匿深可畏四民遷業深可畏上下相徇深可畏羞恥道消深可畏毀譽亂真深可畏直言蔑聞深可畏此深可畏者六也伏惟陛下尊臨南國奄有八紘蕩三季之澆風振百王之舊典設四科而羅俊彥提五柄以御英雄所以不軌不物之徒咸思革面無禮無義之輩相率悛心然而不足懼者願陛下存而無論深可畏者願陛下修而靡忒加以崇三綱五常之教敷六府三事之歌則鴻基與五嶽爭高盛德共磐石永固彥惲後唐長興元年官禮部尚書伏以三年祫而五年禘邃古通規祖有德而宗有功前王令範始封為百代之主親盡從㣥廟之祧繇是昭穆罔差尊卑式敘標諸前典是謂格言我國家土德中興瑤圖再造既展郊禋之禮爰崇禘祫之儀典冊備陳孝思無極恭以本朝尊受命之祖景皇帝為始封之君百代不遷纍朝頻議自貞觀至於天祐無所改移聖祖神孫左昭右穆洎經兵革久廢蒸嘗蕪沒宮庭陸沉園寢逮中興國祚重立宗祊議出一時制行七廟遂致太祖景皇帝在祧廟之數不列祖宗伏惟聖明神武文德恭孝皇帝陛下紹復鴻圖不失舊物欲尊太祖之位將行東向之儀爰命㣥臣畢同集議伏詳本朝列聖之舊典明皇定禮之新規開元十年特立九廟子孫遵守歷代無虧今既行七廟之規又以祧太祖之室昔德宗朝行禘祫之禮顏真卿立議請奉獻祖神主居東向之位景皇帝暫居昭穆之列考之於貞元則以為誤引之說行之於今日雅得其變禮之宜今欲請每遇禘祫之歲暫奉景皇帝居東向之尊自元皇帝已下敘列昭穆㣥寮聚議貴在酌中臣等周行咸非博識循其故事庶叶典章衍後唐長興元年官給事中當省給納諸州銅魚勘問本行令史狀稱內庫每州有銅魚八隻一隻大七隻小兩隻右五隻左其右銅魚一隻長留在內留一隻在本州庫逐季申報平安左魚五隻皆鐫次第字號每新除刺史到郡後即差人到當省請領左魚當司覆奏內庫次第出給左魚一隻當省責領分付到州集官吏取州庫右魚契合卻差人送左魚納省如別除刺史州司又請次第左右周而復始臣以州司差人請魚往來須有煩費請此後所除刺史在京受命或經過都城者可令自牒當省請左魚齎歸本郡契合然後差人納省所冀稍免煩勞唐宰相綮諸孫光化中舉進士歷官監察御史入梁纍遷禮部侍郎貞明中拜中書侍郎同中書門下平章事後唐莊宗入汴貶萊州司戶參軍復召為太子賓客明宗即位拜平章事尋以開府儀同三司行尚書左僕射致仕長興初卒贈司空恭以皇帝陛下特降睿慈俯詢輿議尊歷朝之正典允多士之虔祈廣溥天孝治之風慰萬國仁親之道臣聞自古英主入紹洪基莫不慎固遠圖凝思往事敬宗尊祖追養存誠廣殊號於園陵展異儀於璽紱春秋殷薦霜露永懷又聞兩漢以諸侯王入繼帝統則必易名上諡廣孝稱皇載於諸王故事孝德皇孝仁皇孝元皇是也伏冀聖慈猥從人願許取皇而薦號兼上諡以尊名改置園陵仍增兵衛都鄴中人赴鄉薦時鄭知貢舉都納賂於遂登第無以有威以自大無以足兵以自安無以奇技悅情無以淫聲惑志非社稷之功乞不加於厚賞非股肱之力乞不近於凝旒審內帑之豐虛削無名之經費左右處卑者乞見之有節伶倫濫吹者乞減於盈廷至於畋遊馳騁之娛蹴踘飛馳之樂伏乞大寶大位戒以奔車嚴幽州人本名讓坤初仕燕為刺史後唐同光中為客省使三年奉使於蜀知蜀可伐贊成其謀及伐蜀為三川招討使蜀平遷泗州防禦使兼客省使如故長興初授西川兵馬都監為孟知祥所害伏自朱溫肆逆運屬昭宗三年痛別於西秦一旦逼遷於東洛誅殘南北焚宮闈雖列藩悉是其唐臣無一處不從其僞命由是大唐中興皇帝念高祖太宗之業爾隳弛憤朱溫崔允之徒同謀篡弒遂乃神機迥發心鼎獨燃掘滄溟而誓戮鯨鯢芟林莽而決除虎兕十年對壘萬陳交鋒慮久困於生靈而選挑其死士才過汾水縛王鐵槍於馬前旋及夷門斬朱友貞於樓下劍霜未匣槍雪猶輝段凝統八萬雄師倒戈伏死趙嚴知一人應運引頸待誅遂使賊將寒心謀夫拱手取乾坤只勞於八日救塗炭遂定於四方備振皇威咸遵帝力今則秦庭貢表兩浙稱臣淮南陳附拜之儀回紇備朝天之禮才安宇宙便息干戈未盡梟夷方議除翦豈謂大蜀皇帝柔遠懷邇居安慮危嘉我帝祚中興㣥妖悉滅特遣蘇張之士來追唐蜀之歡吾皇回感於蜀皇復禮遠酬於厚禮臣則叨承元造獲奉皇華載馳得面於天顏戰汗不任於局地臣無任感恩荷聖踴躍屏營之至琪字台秀河西燉煌人少舉進士天復初應博學宏詞居第四等纍遷殿中侍御史入梁為戶部侍郎翰林承旨貞明龍德中歷兵禮吏侍郎遷御史中丞纍擢尚書左丞中書門下平章事罷為太子少保後唐同光初授太常卿吏部尚書三年為國計使明宗即位為御史大夫除尚書左僕射天成末明宗自汴遷洛為東都留司官以太子太傅致仕長興中卒年六十伏以陛下暫違清廟才過周星初平作孽之守殷次戮不臣之庭琬今者敗契丹之凶黨破真定之逆城大振皇威咸繇睿算臣等久違宸極俱戀聖恩恨不隨獸舞於汴郊拜龍顏於梁苑豈可只於清洛坐俟回鑾願於次舍之間得展會同之禮庶傾就望咸竭歡呼臣等今乞於偃師東排班迎駕稱賀後先赴雒陽東祇候奉八月二十八日敕以大理寺所奏見管四部法書內有開元格一十卷開成格一十一卷故大理卿楊遘所奏行僞梁格并目録一十一卷與開成格微有差舛未審祇依楊遘先奏施行為復別頒聖旨令臣等重加商較刊定奏聞者今未若廢僞梁之新格行本朝之舊章遵而守之違者抵罪奉九月二十八日敕宜依李琪所奏廢僞梁格施行本朝格式者伏詳敕命未該律式伏以開元朝與開成隔越七帝年代既深法制多異且律有重輕格無二等若將兩朝格文允行復慮重謺差舛況法者天下之大信非一人之法天下人之法也故謂一成不變之制又准格文後敕合破前格若將開元與開成格之行實難檢舉又有大和格五十一卷刑法要録五十卷格式律令事類四十卷大中刑法格後敕六十卷共一百六十一卷久不檢舉伏請定其與奪奉敕宜令御史臺刑部大理寺同詳定一件格施行者今衆集商量開元格多是條流公事開成格關於刑獄今且請使開成格臣聞王者富有兆民深居九重所重患者百姓凋耗而不知四海困窮而莫救下情不得上達㣥臣不敢指言今陛下以水潦之災軍食乏闕焦勞罪己迫切疚懷避正殿以責躬訪多士而求理則何思而不獲何議而不臧止在改而行之足以擇其善者臣聞古人有言曰穀者人之司命也地者穀之所生也人者君之所理也有其穀則國力備定其地則人食足察其人則徭役均知此三者為國之急務也軒黃己前不可詳記自堯湮洪水禹作司空於時辨九等之田收什一之稅其時戶口一千三百餘萬定墾地約九百二十萬頃最為大平之盛及商革夏命重立田制每私田十畝種公田一畝水旱同之亦什一之義也洎乎周室立井田之法大約百里之國提封萬井出車百乘戎馬四百匹畿內兵車萬乘馬四萬匹以田法論之亦什一之制也故當成康之世比堯舜之朝戶口蓋增二十餘萬非他術也蓋三代以前皆量入以為出計農以立軍雖逢水旱之災而有凶荒之備降及秦漢重稅工商急關市之征倍舟車之算人戶既以減耗古制猶以兼行桉此時戶口尚有千二百餘萬墾田亦八百萬頃至乎三國並興兩晉之後則農夫少於軍衆戰馬多於耕牛供軍須奪於農糧秣馬必侵於牛草於是天下戶口只有二百四十餘萬洎隋文之代兩漢比隆及煬帝之年又三分去一我唐太宗文皇帝以四夷初定百姓未豐延訪㣥臣各陳所見惟魏徵獨勸文皇力行王道由是輕徭薄賦不奪農時進賢良悅忠直天下粟價㪷直兩錢自貞觀至於開元將及一千九百萬戶五千三百萬口墾田一千四百萬頃比之堯舜又極增加是知救人瘼者以重斂為病源料兵食者以惠農為軍政仲尼云百姓足君孰與不足臣之此言是魏徵所以勸文皇也伏惟深留宸鑒如以六軍方闕不可輕徭兩稅之餘猶須重斂則但不以折納為事一切以本色輸官又不以紐配為名止以正耗加納猶應感悅未至流亡況今東作是時羸牛將駕數州之地千里運糧有此差徭必妨春種今秋若無糧草何以贍軍臣伏思漢文帝時欲人務農乃募人入粟得拜爵及贖罪景帝亦如之後漢安帝時水旱不足三公奏請富人入粟得關內侯及公卿以下散官本朝乾元中亦曾如此今陛下縱不欲入粟授官願明降制旨下諸道合差百姓轉倉之處有能出力運官物到京師五百石以上白身授一初任州縣官有官者依資遷授缺選者便與放選千石以上至萬石不拘文武明示賞酬免令方春農人流散斯亦救民轉倉贍軍之一術也每月文明殿入閣及百官五日一赴中興殿等事伏准故事每月百官入閣所司排儀仗金吾勘契入後有待制次對官各舉論本司公事左右起居分記言動以付史館編修帝録此本朝經久之制也昨陛下初膺大寶思致治平遂降綸言特申聖旨百官除常朝外依宰臣每五日一度入內起居所貴得預敷陳俾凝庶績此蓋陛下切於百司各言於時政特令五日一面於天顏雖眷眷以丁寧限朝儀之拘束序班而入拜手而回縱有公事要言亦且卷行須出百司何由舉職兩史無以記言外則因此廢待制次對之官內則無以分延英衆人之別以臣愚見竊有所陳欲乞陛下每月一日十五日兩度出御文明殿排入閣之儀諸司依前轉對奏論今司公事其百官就食謂之廊餐則中外既有區分禁庭亦更嚴察如陛下切於㣥臣所有敷陳即乞因宰臣五日一度延英之際班行內有要奏事者臨門狀到便許引入此又於旅進旅退事理不同言路既開別彰聖德如或以山陵日近朔望不坐即取次日亦合舊規候過陵園還如法制臣叨司邦憲獲典朝儀儻遇事而不言即奉公而何取乞宣付中書門下商量曾獲經久者蒙恩賜臣前件硯者伏以記室濡毫於楯鼻刀佩非多史臣染翰於螭頭筒形甚小尚或文章煥發言動必書為號令之詞非典謨之訓如臣者坐憂才短行怯思遲自叨金馬之近班常愧玉蟾之舊物豈意又頒文器周及禁林製作泓渟規模廣滑閉宮苔而色古連沼石以光凝敢不致在坐隅酣茹筆陳餘波浸潤便同五老之壺終日拂磨豈但一丸之墨如承重寶倍感深恩殿下宗室勳賢立大功於三世一朝雨泣赴難安定宗社撫事因心不失舊物若別新統制則先朝便是路人㷀㷀梓宮何所歸往不惟殿下感舊君之義㣥臣何安請以本朝言之則睿宗文宗武宗皆以兄弟出繼即位柩前如儲后之儀可也伏以別制四廟徵漢室以定儀崇上尊名詳諡法以取證伏覩歷代以來宗廟成制繼襲無異沿革或殊伏惟陛下應運開祥體乾覆物纘紹之德咸頌聖於鴻圖孝思之心乃垂光於帝範馬縞所奏禮有桉據乞下制令馬縞虔依典冊以述尊名祖令西來尺葦盡包於沙界聖圖南渡巨楹兩創於覺筵自迦葉正法眼之單傳有壁觀婆羅門之故址翩翩隻履去少林未有千年翼翼精廬徙滁口才逾二紀圯於兵燼莽為礫區旃檀化聚棘之林鯨象失棲禪之地旋更七稔未辦三椽潛庵老師五葉派下中興百尺竿頭進步得皮得髓面壁正是前身利物利人當機勇施毒手非有遼天之作略豈能掃地以更新再續天聖之遺規喜遇登師之同里衆緣自合紛艫筏之川流㣥役並興環斧斤之雷動要使宗風之峻立首圖雲衲之安居練吉日以鳩工峙閎模而復古於茲大作爐鞴皆令直造根源展鉢鋪單不離日用鍛佛煉祖總在堂中摩尼峯前突見飛翬之在目菩提橋畔會逢立雪之齊腰既新高廣明曠之基當知淨智妙圓之體不立文字痛著鈴槌連牀上跳出栗棘蓬柱杖下敲得麒麟子味永安之記常思紐草之高風造雪峯之門必契流香之妙趣聊陳六詠助舉雙梁東衮衮長江一葦通再續千燈融佛日依然五葉振宗風南十方禪雋總包含認得老胡真鼻祖各尋慧可結同參西飛櫩危棟接雲霓重成鷲席檛禪鼓永洗狼煙罷戰鼙北回龍山繞煙林碧雙手翦除荊棘場空拳擎出瞿曇宅上參天喬木元無恙非臺鏡照大千機無繞塔高三百丈下葱嶺路頭連緑野室裏俱承刮膜方板頭誰覓安心者伏願上梁之後叢林萬指之安棲蘭若千年之不壞人人自心見性箇箇與佛齊肩蘆葉飛花認的的祖師之旨淮流成帶祝綿綿宗祏之休維有梁之撫運也皇靈闡乎區外大禮升於土中元亨利貞飛龍據在天之位聰明神武流烏當受命之符山川出雲河洛開奧夔魑魍魎懾夏鼎以奸銷檮杌窮奇格舜干而心服於是南踰駱越北暨辰韓東極滄湄西臨黑水莫不來庭捧贄厥角獻琛譯有外邦貢無虛月谷風嘯虎膠庠奏樂職之詩山䃭射牛封禪草禮官之議皇帝尚或謙沖至德兢畏萬幾日昃忘勞宵分輟寐弗矜弗伐恆以百姓為心雖休勿休能使三時不害務敦其實所寶惟農以麟鳳龜龍為下科用黍稷稻粱為上瑞君倡臣和草偃風行克勤之心率勵於邦國固本之德浹洽於吏民天下翕然頌聲斯起越五年夏四月上坐便殿顧謂翰林學士守尚書右司郎中知制誥臣李琪曰朕有寶臣國之巨棟加地進律雖圖伯舅之功嚴像立祠尚慊緇黃之願去歲杭越等州軍府將吏士民耆艾列狀以吳越王錢鏐惠及於物恩結於人願立生祠式光異政今我俞允顯其勳勞汝為好辭以永嘉聞微臣俯伏奉詔兢兢莫圖懼玷厥庸弗任其職臣伏聞高辛氏得天之道實舉龎鴻伊耆氏象日之明亦詢朱虎況乎戎衣定國革路興邦非哲后無以建丕圖非偉人無以康大業灌壇風雨佐聖室之宏規莘鼎鹽梅集商王之景命吳芮起鄱陽之衆竇融興隴右之師並翊天飛咸開帝緒其有連衡接武並駕齊驅昭昭然為國元勳合符英佐者即今啓聖匡運同德功臣淮南鎮海鎮東等軍節度使淮南浙江東西等道觀察處置營田招討安撫兼鹽鐵制置發運等使開府儀同三司尚父守尚書令揚杭越等州大都督府長史上柱國食邑二萬戶食實封一千七百戶吳越王即其人也公名鏐字具美其先本彭城人也緬維英緒實肇遐源或標舉精神擅表儀於晉魏或元通夢想冠雄勇於齊梁餘烈具存洪源遂廣大王父諱沛纍贈尚書左僕射王父諱宙纍贈太師烈考諱寬纍贈中書令並稟粹地靈騰英嶽秀百祿是荷為積慶之家五世其昌啓莫京之裔誕茲人傑貽厥孫謀公即中書令之嫡長子也幼而通理有岐嶷之姿長而不㣥抱清明之德雷泉英概金宿精光洪鐘非戞擊之音大玉非磨礲之器鷹瞵八表虎視三江魏帝目為人雄晉后謂之王佐屹風稜於氣表華嶽五千豁宇量於胸中雲夢八九厥初以永嘉東渡世德繼昌分京公暨日之枝襲憬祖涵雲之派緬惟浙右邑號臨安西連天目之岑東接秦巒之勢雙川噴雪徑石鏡之清光萬岫參寥孕官山之王氣公克膺靈秀載誕雋賢始囊螢於桑蓋之陰終奮劍於漚麻之地時屬唐朝季末歷數將移戎馬生郊蜚鴻滿野公遂相時而動憫物興嗟為國平凶與民定亂散家財而養士訓父子以為軍楚卒八千徒矜組練梅鋗十萬浪號熊羆指揮而立致風雲叱咤而坐移山嶽復值江南搔擾溪洞興妖鄰凶則極目朱眉巨憝則滿郊白幟小則倪知新朱實之輩據險隘以蜂屯大則黃巢尚讓之徒掠藩方而虎噬公乃旋分驍鋭密運機鈐抉鼠穴以梟夷突豺牙而破軫自此軍威益振號令愈明輔本郡之政經統八都之紀律然而辛勤百戰平定四凶方澄兩浙之波瀾盡掃十州之氛積田穰苴之威望峻郤元帥之雄名故能大建勳庸榮超崇極頃歲浙東觀察使劉宏者萑苻害馬齊亠兊逋氓脫身㣥盜之中潛寵察廉之位妄以金刀自讖潛蓄奸謀忽萌吞并之心繼犯青疆之地先焚漁浦次劫九鄉或聚犬衆於七州或恃狐鳴之數萬公躬臨矢石手運戈矛一呼而瓦振長平屢戰而尸填濉水連擒昆弟悉斬魁渠或跋寨以全坑或單衣而夜逸中和五年公統領兵士遠過重山築壘進軍攻圍日蹙逆首望風逃遁尋於巡管收擒公乃手劍旗亭以謝戎庶其次光啓三年春鎮海軍節度使周寶以釁生親戚旄節播遷公憤其黜逐帥臣志期翦戮於是大陳卒乘徑赴朱方迎請藩侯敬事如舊而薛朗巢危食盡遂就活擒牲於靈柩之前以雪幽明之憤此際蔡寇孫儒鯨吞黟歙蝟磔泃川楊行密窘甚析骸乞師救命公乃三路餽食兩面助兵克清霧市之妖逐解晉陽之急乾寧三年威勝軍節度使董昌是公匡戴坐擁節旄不遵良佐之針規遽惑妖人之詭譎而又淫刑虐殺人神不容興羿浞之逆謀僭羅平之僞號公往回百諫竟拒忠言遂奉前朝詔書委其討伐鄰凶行密見利忘義怙亂朋奸廣裔豺狼攻圍城壘公仗順討逆奮一當十戮梟獍於近郊破鯨鯢於檇李挫行密而奔仁義走陶雅而竄田頵然後徑赴稽山親平禹穴出軍民於湯炭灑士庶以膏霖騰萬口之歡聲溢千門之喜氣前朝乃就加公掌武之秩錫地之榮分四騎之碧油佩兩藩之金印周旋二紀翦落四凶始得安吳越之封疆泰牛女之耕織若夫天下有急王孫遂立於壇場日中而趨司馬亟頒於符節其間水深則蛟産林大則蠧生提封漸廣於支巡牧守難齊於忠藎其有如霅川李師悅雙溪王壇新定陳詢瀫水陳章溫江張惠縉雲盧佶蘋渚高澧及外都叛將徐綰許再思之輩或軍行末校或草澤逋民發跡戎轅素無顯效蒿艾豈棟梁之器犬彘懷噬主之心悉被淮甸回邪潛為誘煽負本藩之提挈辜解縛之深恩竊弄干戈自貽覆餗公山苞朽壤海納昏波許雍齒以自新待樊崇以不死俟其惡盈貫滿不得已而用兵才舉偏師處處摧拉皆是公臨機獨斷決勝萬全威飇震懾於江濤勳格抗崇於山阜固已書於甲令列在世家處台鉉而彌光受彤玈而不愧矣公宣慈稟性明粹在躬五精妙察於次足廠田坴六蔀旁該於歷數帝師劉向懸知白水之符國士殷馗預識黃星之瑞是以高梧傾鳳大厦占烏拱牲幣以宗堯率謳歌而戴舜先是上在藩邸公潛輸大義密奉上交溯九萬里之靈飇挺三十年之神契豈比河西已定尚興遊帝之談陔下將平始拒狂巫之說不然則何得印方似斗言出如綸適拜前恩仍加後寵皇帝踐祚之元年夏五月定封賞之數報締搆之勳命右金吾衛大將軍安崇隱馳傳進封公為吳越王秋八月以克震天威屢陳戎捷授公兼淮南節度使二年皇帝肅郊禋之禮灑雨露之恩奠玉燔柴所以昭事上帝疏爵燾土於是宏奬諸侯以公為守中書令復命刑部尚書姚洎持節行吳越王冊禮春三月以公奉菁茅之貢遠述職方陳玉帛之儀恆先宰旅進公為守太保秋八月以公解長洲之圍復震澤之郡用匡九合宜總五兵拜公為守太尉兼中書令五年以公儀表藩垣經緯文武當呂望四征之重居伊尹百揆之先召公為守尚書令朝廷復以公纍朝碩量開國宏勳有同心同德之功著十亂八元之業威略主列藩盟歃忠貞為社稷金湯昔周文王得渭水之賢猶尊極品我國家倚扶天之柱宜峻殊恩遂冊拜公為尚父仍加井邑實封以崇異禮昔杜元凱之平吳會止鎮一州昆陽侯之定淮夷不階三事未有光昭大典卓犖鴻恩輶軒相襲於道途簡冊交馳於冕辨三十二人之畫像旌顯非多五十四縣之疏封回旋尚小羅旃設㦸誓嶽盟河廊廟之鄰哉臣哉勳名之大矣神矣公以富強之俗訓驍勇之兵戈艦三千旌門百萬水犀鮫革甲光照互父之山秋鴈魚麗陳勢駭蚩尤之國加以竹頭木屑之用鹽田滬瀆之饒有益軍須莫先戎費愛人若已決事如神嚴明有拔薤之功聽察得分縑之理除殘去弊守正申威畫冠不犯於四封列貨羞談於二價遂使江湖之上棹有歌聲斗牛之間獄無寃氣矧又敬崇穹昊虔奉緇黃百靈輸戩穀之祥萬庾洽京坻之稔用天分地務穡勸農保慈儉以律身變舄鹵而收利穰穰多稌人為萬石之家膴膴良田戶有千金之堰風謠逸豫禮讓興行君子謂之樂郊神人稱其福地豈可使燕山車騎空銘幕府之勳齊國相君不頌祠堂之美微臣仰膺睿旨俯扣庸音敢書無愧之詞用紀不磷之績庶使披文相質與日月而俱懸積德纍功共江山而更遠是旌民愛式表君恩謹為銘曰彼穹初圓補石而正下土未乾決河而定我后創業惟公佐命內贊皇極外綏戎柄雄雄偉人元象降神山海其度麟鳳其身地開茅土天授經綸謺封異姓屢委洪鈞多藝不矜好謀而懼養士分甘尊賢吐哺歷數該博襟靈穎悟識辨彤雲先知聖祚昔之未遇始用英才淩松渡浙拂電縈雷宏昌瓦解儒密冰摧狼精夜隕虎幄晨開今也元勳擁旄三鎮劍騎山積戈船海振冊以車輅賜之膰脤烈烈威風專征仗順惟公之明間世而生片言折獄半面知名吏絶巧詆人無匿情政刑一概如水之平善誘黎氓服勤耕稼攜稚就豐佩牛歸化再熟粱稻八蠶桑柘足食足兵述方而霸軍民感惠易世於茲哀矜耆艾撫養惸嫠如母之愛如父之慈告於天子願啓生祠厥祠既崇邃宇加飾彰民之心表公之德上帝錫祉諸侯取則取之伊何勿擾勿亟絲綸有命琬炎徵文爰馳上列式奬鴻勳浚義才子安陽令君永標今古名播萬春
