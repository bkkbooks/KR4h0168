front:
  text: 全唐文欽定全唐文卷七百十二渤字濬之洛陽人勵志不仕隱嵩山元和初以山人徵為左拾遺不赴九年召為著作郎穆宗朝纍遷諫議大夫敬宗立轉給事中出為桂管觀察使太和五年以太子賓客徵卒年五十九贈禮部尚書
  hash: sha256:b0fe7572d2a798c8451972378dc98338b00976dae9980584f74c0ddeafdd8acd
  markers:
  - {type: head, offset: 13, content: 李渤, id: KR4h0168_NFKB_712-h1, level: 1}
body:
  text: 臣渤言臣伏見今月一日赦聞中外僚例應有策略可濟時者悉許上陳無有所隱臣竊以陛下登極已來擢自巖野者惟一人而已臣感殊獎不合私身身既不私豈宜愛死若臣者得死於義則榮於生遠矣以元和九年十二月二十六日奏平賊三術並皆請不捨元濟其上是感其次是守其下是戰又言感不成不失為守守不成不失為戰此求廟戰為陛下萬全之謀也其直言必戰者是見無禮於君如鷹鸇之逐鳥雀奮不顧身真陛下義勇之臣也昔漢代先零羌反趙充國守屯田辛武賢請討襲宣帝兩行之雖各成本功豈如陛下雄邁獨斷竟斬滅凶虜則微臣前者上言為國之道也今掃清淮西是陛下之聖也社稷之福也臣獨不勝懇款願朝廷增修德政以享外寧之功輒復自忘幽朴遠獻芻言冀以塵露少裨海嶽竊以陛下天縱生知又嗜學不倦故臣敢依託經史敷陳下情特乞聖慈容其迂繁曲賜終覽則疏退小臣死骨不朽矣臣某中謝臣昔負薪偷暇讀書至周禮見春官外史掌三皇五帝之書即楚靈王所謂三墳五典是也書敘又云三墳言大道也五典言常道也然則三五之君君之至者矣臣曾學易見三皇之道加之以書見五帝之德加之以詩禮見三王之仁加之以春秋見五霸之義尋戰國策極於隋史見沿代得失參以百家統以九流又遺其繁華托其精實收視黜聽順其所自故遊涉中理也髣佛三皇之化自冥於天天法道者不疾而速不行而至範圍天地曲成萬物易稱先天而天不違又云鼓萬物不與聖人同憂是三皇在上至朴未散天下大同無思無為逍遙而已五帝之教自冥於地地則天者其德廣運乃聖乃神乃武乃文書曰天聰明自我人聰明天明畏自我人明威孔子曰唯天為大唯堯則之是也五帝在上惟精惟一允執厥中百姓不知其德至矣三王之政自冥於仁仁效地者不識不知無思不服本以六德六行文以五禮五樂孔子曰以仁理人又曰克已復禮天下歸仁焉是也三王在上上仁下義仁義相感天下太和故行葦天保之詩作成康襲政刑措四十年至於五霸力義統盟功過糅駮傷壞王猷秦政賊隳周法剗去井田殘蝕六國知及之仁不能守之故二世而亡漢高帝寬仁大度與人同利任能使善聽納竟甸萬國孔子曰其或繼周者雖百代可知也彼蕭曹輩生於秦長於秦習於秦惑於秦不盡刷秦惡特見制度與夫三代聯輝此其未至也然皆根於忠朴與清靜其世代長久者亦在此文帝躬約素德罷搆露臺卻千里馬熙然與刑措無異賈誼尚以為皇號甚美論德不稱豈非兼以造程裁範未抵大中歟景武昭宣亦各有美皆以樂賢從諫風流無窮元成哀平過有輕重皆以黜賢嬖佞稔謺亡國光武皇帝躍白水乘舊德賊莽百萬且潰且溺又平赤眉銅馬隴蜀諸寇非項氏等夷其佐命與三傑亦異挍其武蹤功次高祖若乃稽古宅周勳臣壽儒學光教化浹洽躬踐理平自牧以謙自勤以勞兢兢若不及過矣無次也明帝孝思敦九族旰食以達幽枉無幸私無矜色章帝性仁厚行春令建胎養法賦貧人以苑地和帝抑符瑞省貢獻有明章餘風皆洛都之令主自殤已下不足徵也桓靈不道㣥醜侵政誅滅賢俊流毒蒸人鬻官於朝列肆於內㣥盜大起腥聞在上赤帝之祚其亡也忽焉蜀先主任託孔明有仁人風烈魏文帝席父業擅妄大言輕議舜禹摧末疏本其昏塞劇矣然災眚罪已罷劾三公終制省薄亦足稱也此外無他勝略繼以荒允鄰豪敵臣奸雄延數代而亡實為幸矣晉武承三葉權力通一淮海焚怪服讓泥金容劉毅直辭輝光藹然然違欽言嶠議使黼衣左袵數百年華風不振者罪杇疑矣南北分朝質文術背造邦者挺雄才騁奇算約之以勤儉必有夏呂之功焉殘國者皆淫逸其心猜毒溺私移之以務禽奢奔必有共鯀之敗焉嗣主善惡紊駮三者擬諸二漢凶或逾之美不及者也大概吳風巧其失也浮虜俗愚其失也鄙滯名不勝質故陳滅於隋昔漢世祖帝隴蜀更詔以書貴服其心恥以虛為勝也何以造以島夷索虜相濟得不愧顏於讓畔通樂乎自隋沒唐祚十一帝頒春嚮二百年矣革土垂號亞姬敵劉但房杜病同蕭曹祖述秦漢憲章周隋使周邵得擅美於前代者龜玉毀於櫝中矣乃元宗中興崇敏璟直敏未達直不深皆輔理名才不宜責以經國也李林甫元載媚君以佞諛迷君以嗜好引同誅異封其邪志致逆羯啓釁燎原不滅者非二子而誰異代同夭夭心共汙三紀遂使朝多忌諱俗尚苟容波驚雲撓蕩動未息易曰通其變使人不倦神而化之使民宜之窮則變變則通通則久自天祐之吉無不利竊聞至德以來天下常思太平君臣之心非不懇切迄於今來未稱者是人倦而不知變雖君儕堯禹臣越伊周詔如尚書典誥日下既不行之行之亦何由得通且久乎易曰化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行天祚聖唐以變通之數遺陛下順而革之則悠久大歷必自此而更始矣臣觀前代嗣帝功未有如陛下今日之盛也宜乘今戮淮寇之勢以德制恆亠兊則恩威兼暢矣恩威兼暢而又加之以捨小過舉賢才則陛下雖欲讓太平之勳美臣知必不得明矣伏望廓開聖德以撥亂意自兼劇秦滅政志於炎昊間再造鴻業與天地惟新馳之於無窮昔舜禹以匹夫宅四海其烈如彼今聖代以五朝營太平其難如此臣又竊聞之陛下使工伎必能是不欲其兩傷也如此推而進之則建皇極致雍熙如指諸掌乎臣疑宰相公卿蘊其略但啓沃之次第未及使陛下翹思文武凝望殷湯主憂臣辱孰不憤歎今陛下蹈道據德安仁存義則三皇五帝三王五霸之美兼矣與人同利從諫如流尚約素斥珍奇則漢高孝文之美兼矣尊儒學兢兢若不及幽枉必達無幸私無矜色則光武孝明之美兼矣任託不惑容受直言則蜀先主晉武之美兼矣約以高祖太宗之善訓貫以陛下之明聖總萃前美混論消息融而為至德發而為元化以王道為尺以大中為刀度時之宜裁酌古今引知蕩寃驅末還本正六官敘九疇舉王制倣月令調兵食崇孝悌敦九族闢諫路顯儒學退文華黜選舉復俊造定四人省道釋明刑以行令理兵以禦戎然後經之以禮樂緯之以道德推誠信以化之播風雅以暢之坐明堂登靈臺休息乎祥氣之間陛下襲羲軒於上公卿儕稷契於中黎元歡鼓腹於下挹甘露潄醴泉禽畜四靈不為難矣臣愚寡聞不識遠大伏望下宰相公卿大夫議之如瞽言可採伏乞搜巖封野博引海內巨儒耆德元識明斷之士大開學館與朝賢參講令其稽古應時據經更俗仍使切磋周洽復出精義重作制度使合乎宣父繼周之旨夫正氣振彼承家鼠寇戎狄裔夷若槁葉迎霜輕冰涉暑瞥然已去閒然已亡固不足塵於聖慮矣今臣謹竭管見獻五事如後是非疏密懸在天鑒蕞爾昏塞何能自分若乃沿革次第時政所切伏計宰輔必已詳奏亦不敢更言臣今幸生聖代又曾謬處諫垣逢中興將啓之期知太平必成之術實懼不言為罪也狂瞽微臣不勝感恩中憤之過謹勒祇承人某奉表被露丹懇以聞臣渤誠惶誠恐應進狀人論事大者請分析聞奏次者請申中書門下小者請各牒諸司諸司若處理不當復來投匭者即請具事繇聞奏如投匭人有欺枉責問得情狀請本罪之外更加一等又寶應元年六月敕如有告密人登時進狀分付金吾留身待進止今緣匭院無械繫之具忽慮凶暴之徒難以理制請勒安福門司領付金吾仗留身然後牒送御史臺京兆府冀絶凶人喧競事君之義有犯無隱陳誠啓沃不必擇辰今㣥臣敷奏乃候隻日是畢歲臣下覩天顏獻可否者能幾何宰臣蕭俯段文昌崔植等當陛下君臨之初首任宰相安危理亂決在此時況陛下思天下和平敬大臣禮切固未有昵比左右侈滿自賢之心而宰相之權宰相之事陛下一以付之實宣化理千載一遇之時也此時若失恐更無時而俯等上不能推至公申炯戒陳先王道德以沃君心又不能正色匪躬振舉舊法復百司之本則教化不立矣臣聞政之廢興在於賞罰俯等作相已來未聞獎一人德義舉守官奉公者使天下在官之徒有所勸又不能黜一人職事不理持祿養交者使尸祿之徒有所懼如是則刑法不立矣邪正莫辨混然無章教化不行賞罰不設天下之事復何望哉一昨陛下畋遊幸驪山宰相與翰林學士是陛下股肱心腹宜皆知之俯等不能先事未形忘軀懇諫而使陛下有忽諫之名流於史冊是陷君於過也孔子曰所謂大臣者以道事君不可則止若俯等言不行計不從須奉身疾退不宜尸素於化源進退戾也何所避辭其蕭俯段文昌崔植三人並翰林學士杜元㯋等並請賜考中下御史大夫李絳左散騎常侍張惟素右散騎常侍李益等諫幸驪山鄭覃等諫畋遊是皆恐陛下行幸道途漸遠自此恣情無度又思馬有銜橛不測之變風寒生疾之憂急奏無所詣國璽委婦人中幸之手絳等能率御史繼以兩省官大諫於朝有懇激事君之禮可以誡無言者其李絳張惟素李益三人請賜上下考外特與遷官以彰陛下優忠賞諫之美其崔元略冠供奉官之首合考上下緣與于翬上下考于翬以犯贓處死准令須降請賜考中中大理卿許季同任使于翬韋道沖韋正牧皆以犯贓或左降或處死合考中下然頃陷劉闢之亂棄家歸朝忠節明著今宜以功補過請賜考中中少府監裴通職事修舉合考中上以其請追封所生母而舍嫡母是明罔於君幽欺其先請賜考中下伏以昔者宰夫入寢擅飲師曠李調今愚臣守官請書宰相翰林學士中下考上愛聖運下振頽綱故臣懼不言之為罪不懼言之為罪也今其三品官考伏緣限在今月內進輒先具如前其四品已下官續具條疏聞奏今日入閣陛下不時見㣥臣㣥臣皆布路跛倚夫跛倚形諸外則憂思積諸內憂倦既積災釁必生小則為旱為孽大則為兵為亂禮三諫不聽則逃之陛下新即位臣至三諫恐危及社稷也伏奉詔敕云度支使所奏令臣設計徵填當州貞元二年逃戶所缺錢四千四百二十貫臣當州管田二千一百九十七頃今已旱死一千九百頃有餘若更勒徇度支使所為必懼史官書陛下於大旱中徵三十六年前逋懸臣任刺史罪無所逃臣既上不副聖情下不忍鞭笞黎庶不敢輕持符印特乞放臣歸田縣令不合曳中人中人不合毆御囚其罪一也然縣令所犯在恩前中人所犯在恩後中人橫暴一至於此是朝廷馴致使然若不早正刑書臣恐四夷之人及藩鎮奏事傳道此語則慢易之心萌矣臣自出使力求利病竊知渭南縣長源鄉本有四百戶今才四十餘戶閿鄉縣本有三千戶今才有一千餘戶其他州縣大略相似其弊所自起于攤逃約十家內有一家逃亡即攤賦稅使九家共出稅額長定有逃即攤似投石井中不到底不止攤逃之弊戶不盡不休此皆聚斂之臣競剝下以奉上惟思竭澤不慮無魚伏乞詔書絶其攤逃以見在戶家産錢數為定其餘有缺且特恩免之計不數年人必歸於農矣夫農者國之本本立然後可以議太平若不由此而云太平者是佞邪之臣也伏乞陛下察而逐之右臣伏準建中元年正月五日制觀察使臣後三日舉一人自代者前件官曾任容管經略使行朝廷威恩得蠻夷畏愛可以備方隅之任總廉察之權使其處臣之官代臣之職必能獷悍柔服溪洞乂安伏乞聖慈允臣所薦臣某不任誠懇之至臣伏詳敕文本救荒歉忽有危切貴及其時當州去京往來萬里奏回方給豈及饑人臣請所管忽遇災荒量事賑貸訖續分析聞奏庶使遠人速活聖澤遐流臣之所管僻在嶺外迫以山賊人尤難理若令數改必困蟊食常平義倉本救災害向為歉沴擢臣處之方鎮臣宜竭力上答皇明伏乞聖恩允臣所奏庶使皇靈遠被獷俗知恩水經云彭蠡之口有石鐘山焉酈元以為下臨深潭微風鼓浪水石相搏響若洪鐘因受其稱有幽棲者尋綸東湖沿瀾窮此遂躋崖穿洞訪其遺蹤次於南隅忽遇雙石欹枕潭際影淪波中詢諸水濱乃曰石鐘也有銅鐵之異焉扣而聆之南聲函胡北聲清越枹止響騰餘韻徐歇若非潭滋其山山涵其英聯氣凝質發為至靈不然則安能産茲奇石乎乃知山仍石名舊矣如善長之論則瀕流庶峯皆可以斯名冠之聊刊前謬留遺將來貞元戊寅歲七月八日白鹿先生記客有遊曲江者始入境則望韶石之山既至郡則瞻張公之祠以謂吾韶之美盡於此而已未知直韶之西北四十里有桂山之峻有侯公之偉豫請言其略山之肇迹自荊山南走千餘里至於衡山陡起為炎帝國又自衡山南走千餘里至於桂山鬱然為祝融神區山之盤薄方廣幾八百餘里峻極崇高幾五千仞青峯碧嶂雲霞所棲丹崖紫壑神仙之宅山下之廟則司空侯公故家也公名安都字師成本末具南史工隸書能鼓琴長於五言詩善騎射為邑里豪雄陳武帝時強梗數起惟與公定計稱為侯郎未嘗名平侯景擒王僧辨破徐嗣徽刺齊將降蕭孜所向必克其智勇之大略如此始封富川縣子次授南徐州刺史又進爵為侯進號平南將軍改封曲江縣公又加開府儀同三司又遷司空又進爵為清遠郡公又加侍中征北大將軍其功烈之盛如此始武帝崩朝議未知所立公獨翼戴臨川王是為文帝何其壯哉公起布衣提義衆乘風雲之會依日月之光位極人臣書勳竹帛所謂豪傑之士也侯師成以功烈為陳將軍張子壽以德業為唐宰相韶之曲江所謂將相之鄉也惜乎功大主疑盛名之下難乎其終而子壽最為稱顯也余嘗東遊泰山西登華嶽南觀衡廬顧未有以韶之桂山而不列祀五嶽者蓋其遠在南裔自古帝王耳目之所不接故也今里中習俗流風慷慨猶存時或旱潦四遠來祈未旋輒應公之族有登進士第者名晉升字德昭託子記之豫既作記又作迎神送神之詩以遺其鄉人使歲時祈恩報德以長言而歌之歌曰天作高山兮去天幾何翠岫巉巉兮與天相摩紫桂千尋兮上拂金波飛瀑萬丈兮倒傾銀河宅靈氣兮鬱嵯峩降生司空兮此山之阿入拔臺城兮親提義戈百射百中兮戰功居多爵位崇極兮人誰我過威名震主兮莫豫敢歌齊中會客兮舉趾逶迤擘箋點翰兮掉頭吟哦昔時門巷兮今已張羅當年富貴兮恍若南柯哀江南兮淚滂沱弔故里兮影婆娑空餘古祠兮白雲東坡緬想陳迹兮清風荔蘿奠桂酒兮伐鳴鑼折瑤草兮席輕莎靈紛起兮舞傞傞首紅帊兮足繡鞾神之來兮楊玉珂芳菲菲兮雜芰荷神之去兮朱顏酡杳冥冥兮駕蛟鼉西風瑟瑟兮吟黍禾暮雨瀟瀟兮濕釣蓑此方之氣兮神人以和此方之物兮天無薦瘥我作此詩兮匪商之那俾爾遺俗兮慷慨而歌今道門以經籙授受所自來遠矣其昭彰尤著使縉紳先生不惑者自晉興寧乙丑歲衆真降授於楊君楊君授許君許君授子元文元文付經於馬朗景和乙已歲敕取經入華林園明帝登極殳季真啓還私廨簡寂陸君南下立崇虛館真經盡歸於館桉黃素方因緣值經准法奉修亦同師授其陸君之教楊許之胄也陸授孫君孫君授陶君陶君搜托許令之遺經略盡矣陶授王君王君又從宗道先生得諸勝訣云經法祕典大備於王矣王授潘君潘君授司馬君司馬君授李君李君至於楊君十三世矣楊許並越漢登真許令亦終獲度世馬殳幸會而不業自陸君已降則帝者無不趨其風矣此皆史有明文或遺迹可訪又世世從事於斯者其支裔焉且知理而不知神非長生之士也超理入神混合於氣無為而無不為者我真宗之道也道無否泰教有通塞塞而通之者存乎其人故豫述真系傳其同源分派者録名仙籍不緝於此時貞元乙酉歲七月二十一日於廬山白鹿洞棲真堂中述少室山天標中氣吐潁浸洛潛盍神洞別輝日月為靈人正府府有伯太清正中蒞之故劉北臺光其前王法主襲其後法主琅琊人諱遠知陳揚子牧曇選一作曇首子母丁感鳳化胎年七歲日識萬言宅華陽師陶宏景臧矜鏃羽元業遂能精融道數弛張化機降真易髭延竇氏殂魄疑其統天與真宰為徒矣涉陳越隋暨我唐皆宗之語門弟子潘師正曰吾被署少室仙伯沐浴加冠衣而化享齡一百二十六高宗追贈太中大夫諡升真先生闡道也貞元癸未鄙人至自廬嶽棲託㶏溪牽蘿踐危深入丹窟潄挹璚水感仙儲洛游禮空投誠銘辭於石銘曰道結元氣神機真精玉膏金芝凝質自靈跡散霞岫思激霜飈浮邱往矣光塵寂寥吳荊牧陶濬七代孫名宏景字通明丹陽秣陵人也初娠母夢日精在懷并二天人降手執香爐覺語左右曰當孕男人非凡人亦恐無後及生標異幼而聰識成而博達因讀神仙傳便有乘雲馭龍之志年十七與江斆褚炫劉俁為宋升明四友仕齊歷數王侍讀皆總記室箋疏精麗為時所重師法及清溪宮成獻頌宣旨裦贊兼欲刻石王儉議異乃止年二十餘服道後就興世館孫先生咨稟經法精行道要殆通幽洞微轉奉朝請乃拜表解職答詔優歎賜與甚厚公卿祖之征虜亭供帳甚盛咸云自齊以來未有斯事遂入茅山又得楊許真書遂登巖造靜自稱華陽隱居書疏亦如此代名特愛松風庭院皆植每聞其響便欣然而樂至明帝欲迎往蔣山懇辭得止然敕命餉賚恆為煩劇乃造三層樓先生居其上弟子居中接賓於其下令一小豎傳度而已潛光隱曜內修祕密深誠所詣遠屬霞人可謂感而遂通者也身長七尺八寸為性圓通謙謹心如明鏡遇物斯應少憂戚無嫉競滅喜怒淡哀樂或有形於言迹者是顯事廣物深慕張良之為人率任輕虛飄飄然恆有雲霞氣其所修為皆自得於心非傍識能及尤長於銓正僞謬地理歷算文不空發成即為體造渾天儀轉之與天相會其纂真誥隱訣注老子等書二百餘卷至永元二年深託向晦及梁武帝革命議國號未定先生乃引諸讖記梁是應運之符又擇郊禪日靈驗昭著敕使入山宣旨酬謝帝既早與之遊自此之後動靜必報先生既得祕訣以為神丹可成恆苦無藥帝皆給之又手敕咨迓先生畫兩牛一牛散放於水草之間一牛著金籠頭有人執繩以杖驅之帝笑曰此人無所求欲效曳尾龜豈有可致之理時有大事無不前已奏陳時人謂為山中宰相以大通獻刀二一名善勝二名成勝為佳寶梁帝金樓子云於隱士重陶貞白士大夫重周宏正其於義理精博無窮亦一時名士也先生常作詩云夷甫任散誕平叔坐談空不信朝陽殿化作單于宮其時人事競談元理不習武事侯景之難並如所言大同二年告化時年八十五顏色不變屈伸如常屋中香氣積日不散詔贈中散大夫諡曰貞白先生仍遣舍人監護喪事弟子數十人唯王遠知陸逸沖稱上足焉真人姓楊名羲晉咸和五年九月生於句容似吳人潔白美姿容善言笑攻書好學該涉經史性淵懿沈厚幼而通靈與二許皂結神明之交二許映與穆思元薦於相王用為公府舍人以永和初受中黃制虎豹法六年又就劉璞傳靈符璞即魏夫人長子也君淵沈應感虛抱自得若燥濕之引水火冥默幽欻相襲無朕矣年三十六以興寧乙丑歲衆真降授有若上相青童君太虛真人赤君上宰西城王君太元茅真人清靈裴真人桐柏王真人紫陽周真人中茅君小茅君范中候荀中候紫元夫人南嶽夫人右英夫人紫微夫人九華安妃昭靈夫人中候夫人莫不霓旌暗曳神轡潛竦紛紛屬乎煙霄淪蹤收於俗蹊宴聲金響於君月無曠日歲不虛矣君師魏夫人儷九華而朋于諸真故安妃云明君受質虛閒祕構玉朗蘭淵高流清響金宮必高佐四輔承制聖君主察陰陽之和氣為吳越鬼神之君後二十二年將乘龍駕雲白日升天今若不耐風火之煙可尋劍解作告終之術也真誥算以太元十二年丙戌去世弟子許翽先師告翽父穆亦因君偶真故許氏九人雖道慶自先數至神發如塵鑒凝照輝瑩之功並歸于君矣真人許翽字道翔小名玉斧父穆晉護軍長史真位上清左卿母陶氏名科斗入易遷宮真人幼獨標挺含真淵嶷長史器異之郡舉上計掾主簿並不赴清秀瑩潔糠粃俗務如泉去蒙盈其科而自進居雷平山下師楊君傳三天正法曲素鳳文後定録真人授其上道告之曰學道當如穿井井愈深土愈難出若不堅心正行豈得見泉源耶真人常願早遊洞室不欲久停人間遂詣北洞告終即居方隅山洞方源館中常去來四年方平臺故真誥云幽人在世時心樂居焉又楊君與長史書亦云不審方隅幽人設座於易遷戶中朱真人化後十六年當度東華受書為上清仙公上相帝晨二録太和二年丁卯時年二十七歲咸康七年辛丑生自太和三年已後無復顯跡世譜年三十則庚午年去世耆舊傳云在此洞石壇上燒香禮拜因而不起明旦視形如生壇今猶存真誥云從張鎮南授衣解法蓋夜於壇上去耳娶建康令黃演女生男黃民乃還家臨沮令許仙人名黃民字元文上清仙公翽之子上清左卿穆之孫以升平五年辛酉生時掾年二十一仕郡主簿察孝廉石頭倉丞南蠻參軍臨沮令永興三年京畿紛亂令乃奉經入剡為馬朗所翹朗從父弟牢亦相周給時人咸知許先生得道又父祖皆有名稱各加崇敬元嘉六年欲移居錢塘乃封其真經一付朗靖中語此是仙靈之跡非我自來縱有書亦勿與人及至杜道鞫家停少時而終時年六十九真誥言黃民及伯祖邁姑婆娥皇伯聯與黃民子榮弟孫女瓊輝並得度世馬朗敬經若君父每有神光靈氣見於堂宇朗妻數見有青衣玉女空中去來其家皆保富壽朗忿何道敬竊書泄意乃洋銅灌籥敕家人不得復開朗終子洪殳季真猶共尊尚景和元年婁惠朗諷殳季真啓取季真善道術為當時所知及至奉呈於華林園既見真跡王褱異朱黃煥赫不敢窮覽至明帝登阼季真乃啓還私廨陸簡寂南下立崇虛館經亦歸于館何神真巧運既閟於馬又發於殳終授於陸君殳馬猶巾几負籍冪之榮而無容入其妙焉先生吳興懿族陸氏之子諱修靜道降元氣生而異俗其色怡怡其德熙熙明以啓著虛以貫幽少宗儒氏墳索讖緯靡不總該以為先天撫化混一精氣與真宰為徒者載在金編玉字不形于此遂收跡寰中冥搜潛衡熊湘暨九嶷羅浮西至巫峽峩嵋如雪映松風麗乎山而映乎水功成扣元感神授靈訣適然自得通交於仙真之間矣宋元嘉末因市藥京邑文帝味其風而邀之先生不顧及太初難作人心駭疑遂沂江南遊嗜匡阜之勝概爰構精廬澡雪風波之思沐浴浩氣挹潄元精宋明皇帝襲軒皇淳風欲稽古化俗虛誠致禮至于再三先生固稱幽憂之疾曾莫降眄天子乃退齊築館恭肅以遲之不得已而蒞焉於是順風問道妙沃帝心朝野識真之夫若水奔壑如風應虎其誰能禦之先生撥霧開日汰沙引金指方以倒之中人以上皆自盈其分司徒袁粲之流是也既立崇虛館殳氏所寶經訣並歸于我焉初先離山有熊虎猿鳥之屬悲鳴擁路出谷而止及天子不豫請事塗炭之齊是夜卿雲紛郁翌日乃瘳先時洞真之部真僞混淆先生刊而正之涇渭乃判故齊戒儀範至于今典式焉桂陽王構逆暴白骨遍野先生具棺櫬收而瘞之其陰德密運則無得而稱也逮元徽五年春正月謂門人曰吾得還山可整裝衆感訝詔旨未從而有斯說至三月二日乃偃臥解帶膚理輝爍目瞳映朗但聞異香芬馥滿室而已後三日廬山諸徒共見先生霓旌靄然還止舊宇斯須不知所在相與驚而異之顧命盛以布囊投所在崖谷門人不忍遂奉還廬山時春秋七十二所謂鍊形幽壤騰景太微者矣有詔諡曰簡寂先生以故居為簡寂館宗有道也凡撰記論議百有餘篇並行於代門徒得道者孫遊嶽李果之最著稱首後孔德璋與果之書論先生云先生道冠中都化流東國帝王稟其規人靈宗其法而委世潛化遊影上元微言既絶大法將謝法師稟神定之資居入室之品學悟之美門徒所歸宜其整緝遺蹤提綱振紀光先師之餘化纂妙道之遺風可以導引末俗開曉後途者矣有吳裔子孫名遊嶽字㯋達東陽人也幼而恭長而和其靜如淵其氣如春甄汰九流潛神希微嘗步赤松澗縉雲堂遂卜終焉之地宋太初中簡寂先生至自廬嶽雲遊帝宅先生乃摳衣而趨嗣承奧旨授三洞并所祕楊真人許掾手跡因茹术卻粒服穀仙丸六十七年顏彩輕潤精爽秀潔暨簡寂上賓方旋舊室捃托道機斷核真假與褚章朱四君交密齊永明二年詔以代師并任主興世館於是搜奇之士知襲教有宗若鳳萃于桐萬禽爭赴矣孔德璋劉孝標等爭結塵外之好後頻謝病歸山朝命未許至永明七年五月內以揮神託化沐浴稱疾怡然而終門徒弟子數百人唯陶宏景入室焉自恭事六載義貫千祀唯貴知真故特蒙賞識經法誥訣悉相傳授方欲共營轉鍊已集藥石將就治合事故不遂琅琊王遠知陳揚州刺史曇首之子外祖丁超梁駕部郎中其母因夢靈鳳有娠又聞腹中啼寶志曰生子當為神仙宗伯也年七歲日覽萬言博總㣥書心冥至道年十五入華陽事貞白先生授三洞法又從宗道先生臧矜傳諸祕訣陳主召入重陽殿特加禮敬賞賚資送還茅山先生乃於洞西北嶺上結靖室以居研味元祕大建末靖室中忽有一神人醉臥嘔吐先生然香禮候神人曰卿是得道之人張法本亦甚有心吾欲並將遊天台山石橋廣闊可過得彼多散仙人又常降甘露以器盛之服一升可壽得五百歲卿能去否先生便隨出上東嶺就法本至山半忽思未別二三弟子付囑經書背行三十步回望神人化為鶴飛去隋晉王廣鎮揚州王子相柳顧言相續奉請先生既至斯須而鬚髮變白王懼而歸之少選復舊王踐阼敕崔鳳舉咨迓帝親執弟子禮敕城都起玉清元壇以處之仍令代王越師焉高祖龍潛時先生嘗密告符命秦王與房元齡微服就謁先生迎謂曰此中有聖人秦王因以實告先生曰方作太平天子願自愛也秦王詣先生授三洞法及登極將加重位固請歸山至貞觀九年敕潤州於茅山置太平觀并度七人降璽書曰朕昔在藩朝早獲問道眷言風範無忘寤寐近覽來奏請歸舊山已有別敕不違高志所令置觀用表宿心先生浩氣虛懷語默一致涵照如鏡應物無私時有竇德元先經揚州遇司命使者言其有重祿以九九數當終命德元求哀於使者云真人王法主是少室仙伯檢録人鬼之任關奏天曹無不即應德元遂懇祈於先生先生不得已因與請命使者報曰更延十三年至高宗朝德元為左相捐館舍之日言皆如之故舉世呼先生為法主又知已授仙職後謂潘師正曰吾昨見仙格以小時誤損一童子吻不得白日升天署少室仙伯將行在近翌日沐浴加冠衣焚香而寐告化時年一百二十六歲潘師正徐道邈同得祕訣為入室弟子陳羽王軌次之其餘各棲洞府終身無替高宗調露二年贈太中大夫諡曰升元先生乃敕置太平觀度滿四十九人天后嗣聖初又贈金紫光祿大夫改諡升真先生明皇天寶中敕李含光於太平觀造影堂寫真像用旌仙跡焉中嶽道士前有天師次稱潘先生先生名師正趙州贊皇人少喪母廬於墓側以至孝聞先生真氣內融輝光外發如隋珠荊玉不假於飾而人自寶之隋大業中入道王仙伯盡以隱訣及得符籙相授棲於太室逍遙谷積二十年但嚼松葉飲水而已高宗皇帝每降鑾輦親詣精廬先生身不下堂接手而已及問所須答言松樹清泉山中不乏帝與武后共尊敬之留連信宿而返尋敕於所居造崇唐觀嶺上別起精思院以處之敕置奉天官令於逍遙谷口特開一門號曰仙遊門復於苑北面置尋真門太常奏仙樂又以祈仙望仙翹仙為曲皆謂先生名焉前後賜詩五百首先生每歎曰大丈夫業道不能滅影雲林以煩世主吾之過也遂欲東求蓬萊孤舟入海屬帝敦篤斯道祈歎愈加踟蹰山隅輟策未往以永淳元年告化時年八十九帝追望不止贈大中大夫諡曰體元先生先生神標仙骨雅似隱居夫階真韜冥練景遊化者其有類乎弟子十八人並皆殊秀然鸞姿鳳態眇映雲松者有韋法昭司馬子微郭崇真皆稟訓瑤庭密受瓊室專玉清之業遺下仙之儔矣時陳子昂又作頌云云後周琅琊公司馬裔元孫名承禎字子微河內人也少事體元先生傳其符籙及辟穀導引服餌之術體元特相賞異謂曰我自簡寂傳授正法至汝六葉矣先生是後因浪遊遠詣於天台山武太后聞其名召至都降手詔贊美及將還敕李嶠餞於洛橋之東景雲二年睿宗令其兄子承褘就山迎至京入宮中問以陰陽數術先生對曰經云為道日損損之又損之以至於無為且目所見者損之尚未能已豈復攻乎異端而增其智慮哉帝曰治身無為則清高矣治國無為如何對曰國猶身也老君曰遊心於淡合氣於漠順物自然而無私焉而天下理易曰大人與天地合其德是知不言而信不為而成無為之旨理國之道也帝歎曰廣成之言何以加此因固辭還山乃賜寶琴一張及霞文帔中朝詞人贈詩者百餘首開元九年明皇又遣使迎至京帝親授法籙前後賞賜甚厚十年駕入都先生又請歸山帝賦詩於王屋山自選形勝置壇宇以居之先生因上言今五嶽之神祠皆是山林之神非正真之神也五嶽皆有洞府各有上清真人降任其職請別立齊祠帝從其言因置真君祠其形像制度皆請先生推桉道經創為之焉先生頗善篆隸寫三體道德經刊正文字著五千三百八言為真本又撰修真祕旨窺之者得其門矣敕於先生所居置陽臺觀帝自書額并相續賜賚甚厚至二十三年告化時八十九制贈銀青光祿大夫諡曰貞一先生又御製碑文先生門徒甚衆唯李含光焦靜真得其道焉靜真雖稟女質靈識自然因精思間有人導至方丈山遇二仙女謂曰子欲為真官可謁東華青童道君受三皇法請名氏則貞一也乃歸而詣先生亦欣然授之宏孝威者晉陵人家本純儒州里號貞隱先生避敬宗皇帝諱改為李氏其子曰含光年十三辭家奉道端視清霄慈向蠢類暗室之中如對君親時人見之情色皆斂幼攻篆隸或有稱過其父者一聞此義終身不書後事貞一先生雲篆寶書傾囊相付既而目之曰真玉清之客也抱虛無而行功者於道不窮託幽阜而滅跡者於德亦淺承之自遠宜且救人是引後學升堂稟元訓也先生元氣不散瑤圃虛映達靈久矣晦輝為常動非用開靜非默閉當吹萬之會若得一之初應跡可名常道不可名也孕育至化虛融物心心一變至於學學一變至於道同淑氣自來得之不見所以摳衣而進者仰範元和若秋芳之依層巘夏潦之會通川也先生忘情於身而慈於人禎祥屢應視同衆象士庶咨詢色受其意常令章壇閉院醮火擇薪精微誠敬率皆類此開元末明皇禮請先生而問理化對曰道德君王師也昔漢文行其言仁壽天下次問金鼎對曰道德公也輕舉公中私也時見其私聖人存教若求生徇欲乃似繫風耳帝加元靜之號以尊之無何固以疾辭東還句曲山敕於其所居造紫陽觀以居焉自後天書繼至資奉相續及公卿祈請往來無虛月卒使元門之中轉見真操持慈儉之寶歸羲皇之風至矣哉先生之教也所撰仙學傳及論三元異同又著真經并本草音義皆備載闕遺窮賾精義矣以大歷四年冬十一月顧謂入室弟子韋景昭孟湛然曰吾將順化神氣怡然若坐亡長往時年八十七靈雲降室芝草叢生執簡如常和色不去據真經斯乃秉化自然仙階深妙者也景昭授皋洞虛洞虛授李方來皆嗣德不墜時柳識又頌先生云古有強名元精希夷黃帝遺之先生得之縱心而往與一相隨真性所容太元同規日行仙路不語到時人言萬齡我見常姿明皇仰止徵就京師紫極徒貴白雲不知遐方後學來往怡怡空有多門真精自持順化而去人焉能窺元科祕訣本有冥期
