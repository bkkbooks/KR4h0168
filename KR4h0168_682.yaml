  text: 全唐文欽定全唐文卷六百八十二僧孺字思黯隋僕射奇章公宏之裔第進士元和初登賢良方正制科長慶三年以戶部侍郎同中書門下平章事敬宗立加中書侍郎銀青光祿大夫封奇章郡公罷為武昌節度使文宗立復以兵部尚書同平章事加門下侍郎出為淮南節度使召拜左僕射武宗朝進太子太傅貶循州長史宣宗立還為太子少師卒年六十九贈太尉諡曰文簡
