body:
  text: 諸道節度觀察等使請在臺御史充判官臣伏見貞元二年敕在中書門下兩省供奉官及尚書省御史臺見任郎官御史諸司諸使並不得奏請任使仍永為常式者近日諸道奏請皆不守敕文臣昨十三日已於延英面奏伏蒙允許重舉前敕不許更有奏請謹案周禮天子七廟三昭三穆與太祖之廟合而為七尚書咸有一德篇亦曰七代之廟可以觀德荀卿子曰有天下者祭七代有一國者祭五代則知天子上祭七代典籍通規祖宗功德不在其數國朝九廟之制法昔周之文太祖皇帝始為唐肇基天命義同周之后稷也高祖神堯皇帝創業經始化隋為唐義同周之文王也太宗皇帝神武應期造有區夏義同周之武王也其下三昭三穆謂之親廟四時常饗自如禮文今以新主立廟元宗明皇帝在三昭三穆之外是親盡之祖雖有功德禮合祧遷祫禘之歲則從合食天下刑獄苦於淹滯請立程限大事大理寺限三十五日詳斷事申刑部限三十日聞奏中事大理寺三十日刑部二十五日小事大理寺二十五日刑部二十日一狀所犯十人已上斷罪二十件已上為大事所犯六人已上所斷罪十件已上為中事所犯五人已下所斷罪十件已下為小事其或所抵罪狀若所結刑名並同者則雖人數甚多亦同一人之例比來刑獄淹滯亦緣官吏人稀今請刑部四覆官並大理六丞每月常二十日入其廚料牒戶部准例加給又近日所斷刑獄多稱緣元推節目不盡移牒勘覆致此淹滯今日以後如臺推覆節目不盡致令所司須更盤勘元推官書下考本典轉選日量殿三選右臣得張紹妻盧氏狀其張紹寵婢花子每令無禮相陵臣推問有實者伏以張紹忝跡衣冠幸陶德化不敦二姓之好敢瀆三綱之經嬖惑女奴蔑侮妻室非特衣服飲食貴賤渾同兼亦待遇等威袵席顛倒款招明白愆尤至多縱稟性庸愚靡及於教義而歷官州縣合聞於憲章逞其邪心曾不懼法顧茲醜行恐玷大猷臣職在觀風事先按俗有關政理敢不申聞伏乞明示罪名流竄遠地使人知家道以誡士林謹具奏聞伏聽敕旨吐蕃疆土四面萬里失一維州無損其勢况論董勃才還劉元鼎未到比來修好約罷戌兵中國禦戎守信為上應敵次之今一朝失信戎醜得以為詞聞贊普牧馬茹川俯於秦隴若東襲隴坂徑走回中不三日抵咸陽橋而發兵枝梧駭動京國事或及此雖得百維州亦何補也僧孺嘗讀嵇康養生論曰導養得理以盡性命下可數百年至於調節嗜欲全息正氣誠盡養生之能者僧孺以養身之於養生難與易相遠也所以康能著其論而陷大辟蓋能其易而不能其難者也且天地稟生之道衆而貴之者寡然而貴乎生以有用於道也生而無用焉貴其生矣而又况康不能養乎哉且康居於是世能忘名利之名而不能使人忘其名能忘其情欲之情而不能自忘其情能忘已喜怒於內而不能防人之喜怒於外雖其名利情欲喜怒之心不改乎內而能致其康寧焉碩大焉猶善豢者之犬彘肥腯適足使屠儈之刃促乎已矣出而處語而默是養其生者也處而語出而默生其喪矣沮焉溺焉道無邪行無詭言中規行中矩而得其時是養生於出處者也孔焉孟焉可而仕否而退是養生於出處語默之間者也若中散者棲乎下不可謂出揚其名不可謂默非出處則在用中於禮義人倫之道也禮者道之器也而肆情傲物蔑棄冠服是禮之大喪也禮喪而道喪則鍾會欲無惡晉王欲不刑之不可得也然康之為人區區不列於中人豈欲引而論之哉以折文垂論則人之中者引而惑必衆故不得不明也先人無求生以害仁有殺身以成仁又有患難以相死此則得死此則得道得死而為壽不以非道得生而為壽也仁如比干而剖死直如屈原而溺死廉如介推而焚死忠如蕭望之而藥死而道存洋洋乎不已豫謂所存之生至遂大是能養生者若碌碌愚生不以五常之道為人豫焉知其壽歟焉知其昆蟲歟木石歟靈蛇千年豫不知其壽也石有時而泐豫不知其久也葵能衛其足豫不知其全也若康之養生有類是也適為下矣又况不能類之者哉嗚呼能養生於道者生死長短可也易曰積善之家必有餘慶積不善之家必有餘殃則其善惡之積俱無餘也不者善人之子不必皆惡若慶必加於善人殃必加於不善人豫恐慶殃之謬加也力人而已余固曰善惡慶殃俱無餘也餘慶勸人之善餘殃誡人之惡則善人之子能不有恃慶怠於善者乎惡人之子能不有恣惡俟其殃者乎末代之君世祿之人先見萬乘之尊我八音之娛我五味之飽我黃金白璧之富我不知父兄得道而傳之已行不善而失之乃至乎萬乘為匹夫世家為皂隸烏謂餘慶之可恃乎父善及子乎子不善而父伐之石碏是也兄善及弟乎弟不善而兄殺之周公是也父母與兄弟不能令子弟之不善又可以恃餘慶於天下乎父惡殃子乎父出之而堯貴之虞舜是也母惡殃子乎母惡之而父好之鄭莊公是也兄惡殃弟乎兄伐之而齊立之桓公是也父母兄弟不能攻子弟之善而况餘殃可纍於天下乎且善者天下好之常道也惡者天下惡之亦常道也豈有將好惡必先稽其所自哉必不然矣若以勸善懲惡為意則當懲報復於身猶慮其不信况欲遠懲於身後而取人之信者乎又不然矣昔夫差信伍員初善也任宰嚭終惡也初善霸天下終惡滅全吳前慶後殃者皆身也太甲放桐宮初惡也任伊尹終善也初惡受拘囚終善復天下前殃後慶亦身也吳之嗣可以前慶後殃殷之嗣可以前殃後慶乎豫固謂殃慶皆復於身也不復乎子孫也然豫敢謂善必慶而貴惡必殃而賤也所以貴者道貴也所以賤者道賤也道之貴乎孔父素王也道之賤乎殷辛獨夫也餘慶餘殃則吾不信之矣傳曰古者天子守在四夷蓋言能令四夷不侵咸自守境洎周漢迄隋多不知守身但欲令四夷自守殊不知四夷自守國內皆成四夷也因著論以明之何者夫守之大旨以防攻也善防其攻者莫若防其敗善防其敗者莫若防其亡夫四夷不守境不過於略地侵城是有敗無亡也若王者之貴如天如地苟落一星伐一樹不足損天地之光輝蓋帝王之權能殺人能生人能達人能窮人能貧人能富人故四國之人思親之必伺君好而贊之雖似親之其實攻之王者守大道淪非道是則不見敗而有亡也况四夷之攻至難者有四國人之攻至易者亦有四四夷之攻以白刃國人之攻以巧言四夷之攻以鼓鼙國人之攻以祕隱四夷之攻以兵相害國人之攻以矯相親四夷之攻以兵相侵國人之攻以矯相益故觀白刃則懼而思守也聆巧言則甘而思受也聽鼓鼙則警而思備也遇祕隱則懵而思述也逢相害則恚而思讐也見相親則感而思近也值相侵則忿而思報也得相益則和而思鄰也攻邊則人人思守也攻身則人人思受也抑人情之常非所鑽鑿而異也且王者之守有六失守之不固則非道攻之守之不貞則色攻之守之不約則聲攻之守之不廉則聚斂攻之守之不儉則奢侈攻之守之不正則邪佞攻之守之不仁則征伐攻之夏捨淑德而嬖妹喜是色攻而亡也殷捨德音而耽愔愔是聲攻而亡也周厲捨廉節而悅榮夷公是聚斂攻而亡也秦始皇捨節儉而起阿房是奢侈攻而亡也漢靈捨正直而近刑人是幸佞攻而亡也隋煬捨慈仁而事遼東是征伐攻而亡也自三王百代無四夷之攻而亡者皆以守身不謹為嗜欲所攻故也雖得四夷自守復何益哉或云幽王為犬戎所滅僧孺以為幽王自以守道不固頻舉僞烽嗷嗷天下空於杼軸加以褒姒以色攻俾諸侯不信而敗非獨由於四夷也至於晉之十六國稽其本則禍於惠帝也賈后以色攻賈謐以佞攻致令八王並興生人減半然後戎夷乘間敢為窺窬可謂四夷先起於內不由四夷不守於外也故有德者必先守身而後四夷無德者不先守其身但令四夷自守曾不防戎狄在其國中故攻秦之胡者二世也豈必東夷南蠻西戎北狄哉沈尹戌雖舉守四夷之言而不書守身之道是載華而略實非垂範之旨也敢因文字以附簡書之闕史記商鞅見孝公以為鞅說之以帝王道公曰安得待數十百年以伯說之欲而未能以強國之術說之而公甚歡也似云強國非帝王之道又若云帝王之道必成於數十百年余愈恐後之為政者捨強國富人而別求帝王之道則潰潰然無指歸矣請榷而論之且君道無定名便國利人則君之道也然豫所謂鞅之政必可以強國富人也而鞅之傳曰令不十年而人大悅家給而人足怯私鬬而勇公戰豫則不知皇帝王伯捨此何為君道也且帝如軒轅虞舜乎斬蚩尤而格有苗是不欲強其國歟王如夏啓周文乎滅有扈而伐有崇是不欲強其國歟伯如齊桓晉文乎修內政而搜被廬是不欲強其國歟况秦之患者六國若不先富其人而強其國又可以高枕無為而成君道歟况皇帝王伯同位而異名者也孰謂皇帝之名優乎哉王伯之名劣乎哉君人者當務乎道適時不務乎名飾位也故捨名而就時者日昌捨時而就名者日亡宋襄之亡慕伯之名而失時者徐偃之亡慕仁之名而失時者魯隱之亡慕讓之名而失時者若使秦居六國之衡不先富人強國而別求皇帝王伯之道豫謂就帝王之名而失時者又安得君於天下乎嗚呼天地不分於皇人帝人王人伯人政利於人皆君也秦始可以弱其國而有天下皇矣乎子曰足食足兵民信之矣又曰既庶矣繼曰富之若此則夫子之政亦先強國富人也庸可謂夫子之道非帝王之道歟又曰如有用我者朞月而已可也若如此又不可謂帝王之道必成於數十百年也或曰子云如有王者必世而後仁百年亦可勝殘去殺矣如此則帝王之道久而成者也豫又不知其然矣且堯之有道乎生丹朱焉舜之有道乎生商均焉則堯之道宜成於朱也舜之道宜成乎均也又何堯舜之道末成於身而不成於朱均之世也且危邦之人思治甚於饑人之思食也若以數十百年之道導危邦是猶強柔嘉之食遠其期而給饑人邦危人饑此何以安之乎飽之乎豫故曰政有富生人強國家皆安得不謂之君道也不知皇帝王伯之名升降也又不知數十百年而成何待也近古之人所謂私者謂苟牟於利苟處於逸苟潤其屋者也僧孺以為斯皆小人之私非聖人之私也夫聖賢無私而不自知其私也何者必公其身以利於人是不私一身而使天下私之也胡以言之夫嬰兒見保傅之母則咤然而識非有知而親之利其乳哺而私之也櫪馬見厠養之夫則奮然而嘶非有知而親之利其芻粟而私之也夫天下之人非復乳孩櫪馬之愚也苟有公其身而利之者孰不利而私之乎故賢君良臣必私天下而公其身故天下之人皆私而親之暗君愚臣必公天下而私其身故天下之人皆公而疏之人疏之者多故天下任其亡也親之者多故天下欲其昌也昔大禹之手足胼胝是公其身於理水也咎繇之謨明弼諧是公其身於規諫也傅說之對揚王庭是公其身於輔佐也周公之吐握勤拳是公其身於禮賢也宣父之作春秋刪詩書是公其身於垂教也故有夏之人思大禹之功有虞之人思臯陶之直有殷之人思傅說之政有周之人思周公之勤有道之人思宣父之教或開國尊其嗣而私之或建祠崇其像而私之至於殷辛之聚財鹿臺是以天下之利私於已也故天下公而疏之秦始皇之廢棄諸侯是以天下之爵私於身也故天下亦公而疏之故武王公天下之財而散之而天下之兆庶皆私而親之高皇帝公天下之爵而封之而天下之英雄亦皆私而親之是以自私者人公而亡也自公者人私而昌也夫聖賢非必公其身私在其中不得不公也天下非必私於一人公在其中不得不私也余謂亡國之君亡家之臣亡身之人俱不得私之道也非聖賢之無私也周衰至秦漢大道根蠧詐源派別姦稔剃紛不可救止往往見強國質小國子弟天子有疑於諸侯亦邀子質之以為膠固春秋之時晉懷質秦而逃歸自立也六國之時燕丹質秦而怨由生也兩漢之時隗洵質而囂再叛也頽風蕩蕩事難殫記豈不由信不以信信之而以質質之以信信人而人信之以疑疑人而人疑之且彼以信矣而我要其質是疑無信矣我以疑疑之彼固不信則質無有矣故記曰殷人作誓而人叛也周人作會而人疑也作誓會勸人叛疑也人疑誓會而叛之况質其子而人疑之則非誓會之比也且君臣之道恩義也禮義結其外父子之道天性也慈孝結其內離其內求其外割其天性拘其恩義是不若兩全其道內外恩親雙得矣若空知彼不得親其親而固結之是不知彼不親其親而怨矣是又質之無益矣昔有孝如曾參者不思離其親豈可以割之慈如卜商者哭以喪明豈可以奪之忍如樂羊者能食其羹又何以質之夫天下愛義者少愛親者多能從人者少能從欲者多故質而求誠我之利少因質以生怨辭者多矣昔樂毅下齊人有告其叛者燕昭猶能備禮送其妻子何也燕昭信毅毅必不叛也苟或以叛質之無益而生怨也奈何秦漢之時不能以至信信之王道導之導之不能奉順以討之討之不服退加修德以柔之而務質其子脫御之失所則賈怨而生禍御之得所猶以離其親親非孝者治也於戲秦漢所以至誠不浹於天下矣春秋周大夫萇宏之城成周也晉女叔寬謂宏違天不免也國語衛彪徯又云長叔支天有咎也支天壞違天也人道補天反常也誘人城周誑人也左邱明皆然其言某以為一言喪邦其例由斯矣若是則帝王不務為政而務稱天命下不務竭忠而務別興衰矣雖欲不亡其亡固翹足而俟矣必謂天壞不支自古無中興之君乎衰運不補自古無持危之臣乎殷太戊周宣王胡以承天壞而興乎殷傅說周吉甫胡以持衰運而壽乎二君二臣天豈私之乎且彪徯謂臣謀其君為違天則危而不扶為順天乎人道補天為反道則舍人徵天為合道乎誘人勤王為誑人則勸人叛王為信人乎辭之悖亂有至是者夫人道邇也忠者人倫紀綱也天道遠也談者人倫虛誕也假天道以助人倫猶慮論誣於失也况舍人事徵天道棄邇求遠無裨於教者也又謂不得終果由支天壞也則趙高秦之助壞者也董賢漢之助壞者也曹爽魏之助壞者也賈謐晉之助壞者也咸家族身戮者天不壽之夫天之所與豈有親者以道承天則天無壞者以亂承天則天無支者故支壞非天也興衰由人也但有人不支而敗無天不可支也嗚呼宏無殷宗周宣以任之位卑大夫不為王卿士卒令強晉迫脅非道殘勦士死難於宏為得矣奈何邱明不譏周殺忠臣所以國危也晉殺王臣所以國分也但紀宏之戮死是神彪徯叔寬反常之說也謹按魏子賞賈辛以定王室也夫子曰其命也忠當有後於晉國也賞忠有後則身忠不謂反天戮也是知邱明謬聞偏見失聖之旨甚遠恐史冊久謬誣惑為臣者將求事之得不以文字申訟哉為獸捕鼠啖饑性也鼠好害物食之是於人為爪牙於獸職為刺姦也所以伊祁氏季春疑日迎然則人假借蓄之義盡矣僧孺常學大小戴禮知迎之利攝饗者悉辭以苦鼠之竊請迎蓄之僧孺因允其言是貓也非不壯大屈狨而為之蠧踰鼠族者性懶不捕善伺饔人戶隟搜蓋覆器挈蓋隱器如智有十手百目者而猶家人割兼食三時加哺不敢輟嗚呼鼠伏隱處也人蓄食之也鼠竇原垣深窖也安薦茵堂室也鼠出恍獲畏怕也遊安緩舒閒也既伏隱處也則出可伺之也既竇厚垣深窖也何地可空之也既出恍獲畏怕也掘搖之可怛之也惟甚不易也僧孺嘗讀晉漢二史見更始元年赤眉擾秦中崤函岐雍大苦之以更始宜制之而人又苦之是意亂君之猶竊者也晉太康末趙厥亂岷蜀漢銅梁大苦之以羅沖征之而人又苦之是意亂臣亦竊者也向使更始非仗漢則秦人皆得擒之矣羅沖非仗晉則蜀人皆能捕之矣非仗於人則庖人皆得戮之矣然三者皆知仗之苟竊也曾不知人甚苦之矣以至於逐之以至於戮之故有為國者有知兵者有防盜者有仗而皆亂者則踰於盜也踰於亂也思饔人迎不可不慎也象龍禱雨三月不應巫病民咨王甚愁孺有言者王無愁也象之誤也夫龍善化雨而時在乎天天使雨龍得化不使雨龍不得化聖人象龍而救民是乃象其化者也龍之性善學者人之心故象性莫若心而已使性非心可象則鳲鳩之性均而木刻鳲鳩足以象均邪獬豸之性觸而瑰飾獬豸冠足以象觸邪龍以性善化而龍於化人者衣衮則其象不以土木亦明矣湯是以龍其聰而深無不聞也龍其明而高無不見也言若出為雲而物仰之有陰智若躍乎淵而物觸之有潤天而不雨百姓視王為雨也雖七歲炎炎不聞有咨者而况三月哉僧孺見仙翁兄深仰其為真人也僧孺讀史傳嘗病仙者能上升鄙見也斯不然僧孺聞胡國西胡法至其將歿之日必大會族黨州里衆其人齊其食人則飄飄而發地焉數百里外而墜窮谷中國中人咸謂曰化豫焉知非胡國之幻乎今兄不離世間而離世間浩蕩乎嗜欲之境蹂躪乎人情之囿三事五侯躬擁篲於門獲禮仙翁者為榮不獲禮為羞况雙眸炅然紅膚若花迅駭無羈竦步飄飄然豫安謂其非至人乎昔昌黎韓公侍郎掌國子裴李二相府皆命世之大賢與兄文字不曰師則曰丈豫又焉測兄之壽耶嵇君著養生一篇以中才用心養其性命斯為勝矣腥者吾食諸稔者吾食諸憊於我者食諸又不測兄之元妙也至於煮鍊金石妙至先覺若指手掌不為能事賄利軒冕故無不明於心劉郎之骨非凡目所測太和三年秋九月偶拜兄於夏口眷豫塵俗授之元記又約僧孺為道弟所訝真步超遙白雲無繫要他日為拜會之資僧孺抽毫以敘離恨題文曰別志且用契異時之語焉鄠杜之郊人有雞大不農齊類剛勇百鶚之特疾視促步內斷外果雖狺狺猛犬桓桓壯士伺釁潛搏胥為驚蹶則前後背血流朱殷者數四以降咸以彼恃長嘴利距也失恃則力不能擊宜仁柔矣乃因跧側樹枝目不能視瞻以長纓羈繫使彼莫得旅拒即求砥礪錯斂其長嘴使禿枿不能害物錘鈐敲折其利距使撾擊不能痛物然後縱其逸也雞不省猶張拳勢瞪瞋眸咬咬爭鳴剛獝突如鄰童咸操荊礫弄調笑喜曰昔吾畏其搏我啄我每至此則心悸狂亂視若左右紛錯百千雞之衆矣今彼啄擊不能為害則雖茲雞在前後若不見豈雞之異矣君子於是歎至剛自折者若此不度力取笑者又如此且其職也宜司晨而鳴風雨不移縱有專場妒敵之志亦爭鳴於族類非宜於怫人矣爾依於人人即爾主輕肆其勇而悖於主所以雖有長嘴利距不能久恃已失所恃乃以踵擊者取鄰童之笑所宜然矣僧孺常思度謂欲移人之事當有類其雞者嗚呼宜誡夫剛哉齊威王謂阿大夫曰汝能願吾左右哉曰近吾君者也王曰吾以阿民寄汝是則割吾憂於心者而謂給吾使於宮者為近耶夫宮中之近不過為吾折枝矣吾體有所貴是亦有所賤豈以反貴於心乎故入宮之職非近也入心之職為近也順顧走指出入無方者藝之至也授印於外不必在宮者信之至也汝在吾所以信而比吾所以藝不愧冕衣裳哉今則戮汝使卿大夫識遠近之正於是㣥臣快賀而國大治君子曰正室之明莫盛乎午者左右陰不至也如齊威安有不明乎憲宗元和十四年詔右相中書侍郎平章事清河郡公立家廟於長安崇業里廟三室粵五月二十二日天子命以羊一豕一助奠太常出博士一人相禮儀即日加贈烈考金部公尚書左僕射極顯親之榮錫教忠也先是丞相清河公諏日卜牲致齊盥洗朝服立於阼階之東司儀告辨宗祝贊事奉贈鄭州刺史府君神主祔於第一室夫人樂平郡太夫人王氏配座室曰皇考廟奉懷州刺史贈太子少師府君神主祔於第二室夫人魏國太夫人李氏配座室曰王考廟奉今贈太尉府君神主祔於第三室夫人齊國太夫人盧氏晉國太夫人王氏配座室曰考廟始迎嚴嚴卒事兢凌俯興舒於愈愈勿勿瞻虔俯慕肹蠁交格逮暗質明禮既勿違君子於是觀卿大夫之孝而知周德之所在矣廟第一室曰鄭州公諱湛字湛然以德門清閥冠當代之疑作以宏度茂質儀搢紳以全用具業職文武釋褐常州武進縣主簿纍選潁川滎陽二長史動必中禮遷必以庸治官將私皎皎矩矩歲終上能宰相啓公為壽州刺史未被詔而公捐館為有德者之所哀痛第二室曰懷州公諱朝字守忠即鄭州公第二子也純粹凝秀發為菁華臨涖不耀舉適大當蜀屬天寶羯起虎臣扞難視得士為勇弱公以辟三府由試大理寺直攝監察御史四遷檢校倉部郎中兼侍御史知鄭潁兩州節度使觀察留後録刺史事時副元帥梁國公抱玉以全師軍岐下餼饋廩食悉責於公急須草草一呼三索應卒尤翔了辨綽綽移試國子司業兼懷州刺史內殿召問賜金紫寵之以基址大用未幾改檢校左庶子充河西隴右糧料使是以志將疇謀陟岵以不及致詔恩重此露前能優贈祕書監大夫家風行孝具於貞元中右相司徒滎陽鄭公餘慶神道碑文第三室曰贈太尉公諱稹字實方懷州公之嗣子也善史書五言詩為文而敏政建中年德宗狩梁漢九州歲貢瑟縮不集上在巡責賦稅急租庸包大夫表公嘗從二府事澄磨割剔以靳靳於當時纍請公以祕書丞殿中侍御史為判官居廣陵揚子運江南以趨行在公號憂國厄晡旦自力蹄馳楫飛職貢填路寇平謝免翛然脫履雖蹤希象外而功行羶灼為時須速遂適無容矣三遷檢校金部郎中司自陜以東水陸運會其年失仲弟哀踰於禮遂嬰疾不起其後寵章七告身自司徒公冊贈太尉至於初終密行具於舊相今太常趙郡李公絳神道碑文夫以鄭州之厚仁懷州之器業金部之忠孝三良百行施豈無集元和年清河公竟以全德文武恭忠溫直相憲宗外綏華戎內接萬幾條綱品例疏貫折折不質不要天下瞻信立言者識丞相之輔理而知三廟之遺憗遠矣古者道施於仁則鏤於鐘彞書於簡編其或行浮而實未稱者史氏闕逸乃必噫哀於諡誄發揮於文辭寄金石存景行以備紀事者以之補採今清河公禎祥聖代庸跡焯闡推始反本以崇宗祧規方豐菲一中於度牲牷豆斚無有闕時春秋禘嘗盡忠盡敬猶以丕烈耿光未克篆籀泣奉家老狀請隴西牛僧孺傳而誄之銘曰昭昭成廟櫨松桷柏斫之磨之謹古不飾二門耽耽瞻東應南周匝壖垣庭植冬陰三室峙扃肅槭嚴深濟濟孝孫以時饗之簋斚豆籩既具而宜恪恭聲聞如見如疑明德馨香百福已來厥初大風齊太之遺支允茂秩纍纍而賢滎陽之仁河內之才太尉植行將開以先丹穴感靈乃儀鳳凰丞相厥生輔我唐章忠孝懋宣興時太平耀榮祖宗以尊顯親既祭則禮以敬如存牲牢具肥祝史贊神宗婦宗工整整平平祉祚之傳若火移薪於萬斯年爰有記云辛氏於隴西為望家其後因官從帝或雍或洛源濬派洪將微復張以及於僕射皇考璿璿益以儒業自喜優遊高放不樂取求制科高第乞官山水朝廷除處州遂昌令嗜不念歸再移仍南及亡纍贈至左散騎常侍僕射諱祕字藏之即常侍府君第四子也以能通五經開元禮三命至華原主簿書判入等為長安尉太常卿故丞相渤海高郢以唐制盡將禮樂委博士奏乞用公朝廷與之不能得去訖六年再為祠部兵部員外博士猶如故朝有禮天地奉山原之使既謝上必奏曰臣唯乞得辛某自副幾不以禮樂纍陛下上高之連可故公再為禮儀使判官雖當時耆年鴻生語及禮即唯曰辛某在若不敢出口元和皇帝初元年高選刺史公出為湖州時觀察使李錡不奉詔舉江南六州兵獲京口窺采石渡臨江索留因命心腹將率壯士高職重賄鈎其膽且約曰若等當以其日同起取五刺史欲斬以號令在錡鎮實多年交有素故刺史不得隸兵馬及難作顏防用李雲驅巿人舉當一戰敗走李素受縛於蘇頊釘船艎唯公以儒雅賊未急迫公乃夜起撫左右曰使若等有父母妻子成其家皆天子恩也若能隨李錡為賊乎左右皆泣曰唯公命乃開羅城門收湖下子弟得人數百公親以衣衣之以食食之蒸里掩出劘壘始呼大戰川東斬將屠營值旦悉先殲登城號令中外恬然於是時武功冠江南錡為之失勢就縛天子親命使以金印紫綬賞公急詔徵為河東軍司馬兼御史中丞其實將以大將節與公以故未畢就拜為左司郎中更京兆汝州刺史本州防禦諫議大夫出為常州刺史治職檢身專疑問昭升改河南尹時天子大舉伐趙既釋復征司空度率五諸侯取蔡連戰四年伊瀍之間屬刻百役公撫困應須怛怛寧寧上大喜出少府節以豹竿㦸纛驛走就授先一日立百辟於朝讀白紙詔命公以昭義軍節度使潞州大都督府長史檢校工部尚書兼御史大夫公褒衣儒冠帶劍持節潞自盧從史不稟不供急斂自守人已大罷及柏鄉連營三歲決死公之至止開城入府量倉數藏酸寒濩落公私之具盡可哀痛左右前後計於公請乞救於上公曰天子以兵定殘賊空內府賞死士於今數年矣吾不能如卜式輩以家助獻詎敢復以請求苦上耶於是約出入嗇用度俸不入家聘不賚金宴不侑樂食不兼豆更四年詔徵府有貫十七萬食倉有斛七十萬刃銛函堅幟赤幕青十五年冬行於洛及關以疾不任朝覲天子命中貴人郊勞歸第以十二月己卯薨享年六十四上憫惜震悼罷朝贈尚書左僕射贈賵有加公於得入仕以業儒書於得著名以典禮樂於得勳賞以立武功於善終始以謙退勤儉於中外親既有名而貴於屬且近者餉給無所加疏而賤雖千百里曠不相面頒與無所吝大官十五年居不易宅死亡之日家不歲計公之於孔門可謂成人矣子男八人少穆少逸少恭長順仲扈行質仲和行檢或儒或文仕遍侯國夫人河東裴氏先公而卒將葬而公嘆曰人之居無常而墳墓因焉吾家之兆及於四代三卜矣且使吾死有吾豈止墓而守者焉吾死無吾於地固無擇而已矣他日吾死於此亦遂葬而無用遷焉遂定乎萬年縣洪原鄉少陵原及將亡前為文自志其墓又重前說歿有書一通緘置几上既開之即送往飾終之制具盡於此既儉而周於禮不違時之名人無不多其能終而達其不撓耳諸孤恭命無敢墜失既葬會謀曰先人德行官業宜刻於石以聞不朽隴西牛僧孺時號專業文陳郡殷台書迹絶妙且其人吾家之壻且練吾先人行事敢不告求僧孺實紀録而台實書既序而銘曰禮災秦漢於綿蕝存晉卑胡僭俎豆臊腥慕古惟唐求野據經公嘗博士綴緝搜羅三代之儀濟濟復興祗職六年區別嚴兢儒道克施亦志武事憑江錡反公實郡吏掉棘張空以出不防萬馬周網血赫湖塘江南之功焯出有光鄒魯諸生因功張皇憂公慎法奉守王度入郎出牧尹洛將潞茹剛撫弱銷剔人蠧居不易地服不易初財分先族以儉遺孤恬於將終執筆自志男良女淑既壽而貴謂之為人易此而何詩以備傳不刻不磨
