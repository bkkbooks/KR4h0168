front:
  text: 全唐文欽定全唐文卷一百三十二王績二
  hash: sha256:03277fe5f72c7512fb93babc527fc7e3cae81e481f0609cf13da7bebd9c8c368
body:
  text: 醉之鄉去中國不知其幾千里也其土曠然無涯無邱陵阪險其氣和平一揆無晦明寒暑其俗大同無邑居聚落其人甚精無愛憎喜怒吸風飲露不食五穀其寢于于其行徐徐與鳥獸魚鱉雜處不知有舟車器械之用昔者黃帝氏嘗獲遊其都歸而杳然喪其天下以為結繩之政已薄矣降及堯舜作為千鍾百壺之獻因姑射神人以假道蓋至其邊鄙終身太平禹湯立法禮繁樂雜數十代與醉鄉隔其臣羲和棄甲子而逃冀臻其鄉失路而道夭故天下遂不寧至乎末孫桀紂怒而升其糟邱階級千仞南向而望卒不見醉鄉武王得志於世乃命公旦立酒人氏之職典司五齊拓土七千里僅與醉鄉達焉故四十年刑措不用下逮幽厲迄乎秦漢中國喪亂遂與醉鄉絶而臣下之愛道者亦往往竊至焉阮嗣宗陶淵明等十數人並遊於醉鄉沒身不返死葬其壤中國以為酒仙云嗟乎醉鄉氏之俗豈古華胥氏之國乎其何以淳寂也如是今豫將遊焉故為之記晉侯棄舊功臣永吟情隨地遠怨逐山深追兵斷谷烈火焚林抱木而死誰明此心銜易水報秦皇精心貫日匕首橫霜欲持兩間生擒一王惜哉智淺琴聲不防項羽慷慨臨江問津馬贈亭長侯封故臣何為不渡自取亡身八千子弟今無一人秦人市寶厥價從名藺生詭説其心則貞清齊抱憤身睨兩楹卒全尺璧仍邀十城陳公主社割肉頒生心忘厚薄信若權衡風期有素父老無驚儻安天下還如此平君平不仕賣卜窮年日裁數局常收百錢道實兼濟功非獨全用吾言者今過半焉寧生不遇商歌飯牛夜長難曉人生若浮寧惟石爛觀覩金流世無堯舜誰當見求老萊父母白首同歸欣欣愛養慊慊無違宛轉兒戲斑襴綵衣篤哉孝思心精且微孟光得擇梁鴻有妻琴書自逸邱壑同棲五噫絶賞雙眉獨齊績匡采具相將共攜隋侯報德矜傷育鱗靈蛇感惠效力輸珍月華浮吻星光曜脣此猶知報而況吾人嵇康自逸手鍛為娛曲池四繞垂楊一株銅煙寒竈鐵焰分爐箕踞而坐何其傲乎伯牙揮手奇聲絶倫鍾期妙聽是謂窮神六馬仰秣丹魚聳鱗崇山流水知音幾人棲遲養老寂寞何為地接皇澗溪連灞池釣舟始泊漁竿半垂君王先兆還應見知王績者有父母無朋友自為之字曰無功焉人或問之箕踞不對蓋以有道於已無功於時也不讀書自達理不知榮辱不計利害起家以祿位歷數職而進一階才高位下免責而已天子不知公卿不識四十五十而無聞焉於是退歸以酒德遊於鄉里往往賣卜時時著書行若無所之坐若無所據鄉人未有達其意也嘗耕東臯號東臯子身死之日自為銘焉曰有唐逸人太原王績若頑若愚似矯似激院止三徑堂唯四壁不知節制焉有親戚以生為附贅懸疣以死為決疣潰癰無思無慮何去何從壠頭刻石馬鬣裁封哀哀孝子空對長松東臯子始仕以醉懦罷鄉人或誚之東臯子不屑也退著無心子以見趣焉無心子寓居於越越王不知其大人也拘之仕無喜色泛若而從越國之法曰有穢行者不齒俄而無心子者以穢行聞於王王黜之無慍色退而將遊於茫蕩之野適績之邑而遇機士機士撫髀而歎者三曰嘻子賢者而以罪廢無心子不應機士曰願受教無心子曰爾聞蜚廉氏之馬説乎昔者蜚廉氏有二馬一者朱鬣白毳龍骼鳳臆驟馳如舞終日不釋鞍竟以藝死一者重脛昂尾駝頸貉膝踶齧善蹶棄而散諸野終年肥遁是以鳳凰不憎山棲蛟龍不羞泥蟠君子不苟潔以罹患聖人不避穢而養生東臯子聞之曰善矣盡矣不可以加之矣昔者文中子講道於白牛之溪弟子捧書北面環堂成列講罷程生薛生退省於松下語及周易薛生嘆曰不及伏羲氏乎何詞之多也俄而有負笭者皤皤然委擔而息曰吾子何嘆也薛生曰叟何為者而徵吾嘆負笭者曰夫麗朱者丹附墨者黑蓋纍漸而得之也今吾子所服者道而猶有嘆是六腑五臟不能無受也吾是以問薛生曰收聞之師易者道之蘊也伏羲氏畫八卦而文王繫之不逮省久矣以為文王病也吾是以嘆負笭者曰文王焉病伏羲氏病甚者也昔者伏羲氏之未畫卦也三才其不立乎四序其不行乎百物其不生乎萬象其不森乎何營營乎而費畫也自伏羲氏泄道之密漏神之機分張太和磔裂元氣使天下之智者詭道迸出曰我善言象而識物情陰陽相摩遠近相取作為剛柔異同之説以駭人志於是智者不知而太朴散矣則伏羲氏始兆亂者也安得羸嘆而嗟文王乎負其笭而行追而問之居與姓名不答而去文中子聞之曰隱者也先生諱子光字不曜自云洛陽人也往來河東傭力自給無室廬絶妻子開皇末始結庵河渚間以息身焉十餘年賣藥為業人莫知之也汾陰侯生以筮著因遊河渚一睹而伏曰東方朔管輅不如也由是顯重守令至者皆親謁先生辭以瘖疾未嘗交語著獨遊頌及河渚先生傳以自喻識者有以知其懸解也人有請道者則書老易二字示之彈琴餌藥以終其世文中子比之虞仲夷逸有五斗先生者以酒德遊於人間有以酒請者無貴賤皆往往必醉醉則不擇地斯寢矣醒則復起飲也常一飲五斗因以為號焉先生絶思慮寡言語不知天下之有仁義厚薄也忽焉而去然而來其動也天其靜也地故萬物不能縈心焉嘗言曰天下大抵可見矣生何足養而嵇康著論途何為窮而阮籍慟哭故昏昏默默聖人之所居也遂行其志不知所如歲月日鄰人王績謹以魚醴之奠敬祭仲長先生之靈曰明道若昧進道若退鳥飛知還龍亢必悔嗟嗟夫子理融其內不忮不求無憎無愛古人有言微妙元通藏用以密養正以蒙嗟嗟夫子允執其中不見其始孰知其終蕩蕩心迹悠悠默語周覽人事退居河渚何去何從誰求誰與聊同聚散亦均寒暑大矣夫子其生若浮至矣夫子其死若休鄉黨不懼朋友不憂素琴猶在黃經尚留老萊不婚梁鴻難偶筵無饋奠室無箕帚嗟嗟夫子豈圖其後金玉滿堂莫為之守凡我故人素服臨旃葛巾從窆桐棺以遷墳不易隴坎不及泉苟無怛化於何問天道性既喪仁義鋒起祭非古也禮之為始吾從其俗敢告夫子清尊薄奠神其歆止歲月日謹以清酌之奠敬祭夏忠臣關生之靈曰聖貴達節賢貴識時興亡有運用捨有期憑河暴虎前哲所嗤身滅主喪如何勿思我因行役歷子荒祠壯山河之舊壤歎墳隧之餘基松枯柏悴草密苔滋託深悲於薄醑魂有靈而饗之懷二子之高烈背嵩嶽而來遊挹千載之遐軌登箕峯而少留昔時慷慨神輕九州今來寂寞魂辭一邱英蹤落落而猶在精誠冥冥而遂幽山荒廟僻地古松秋吾鄙懷之有素仰前哲之清猷同聲必感異代相求如至誠之見接庶蘋蘩之可羞伏惟尚饗歲月日敢以清酌之奠敬祭先生之靈曰兩儀判闢萬象森羅都邑未建鳥獸獨多茹毛飲血巢居穴窠天地不交人靈未和智哉先生爰作甘醴上配百牢下主五齊以晏以禱為樽為洗萬神以降三獻成禮法成必弊文盛則華奚仲斫輪焉知覆車桀紂亡國羲和喪家周公作誥乃防厥邪我聞古時王道正直賢人君子澡身浴德降及中世昏主作式刑罰不中讒淫罔極吁嗟世道一至於此達人大觀貴和其禮與制於物寧在於已乘流則逝遇坎則止眷茲酒德可以全身杜明塞智蒙垢受塵阮籍遂性劉伶保真以此避世於今幾人我瞻前説功高受賞嗟嗟先生其義可想肇基麴糵光開祀饗大禮斯備㣥賢就養敢依河曲建爾靈祠前臨極岸卻就長磯茅茨不翦采椽不治掃地而祭神其享之寂字元真蒲州桑泉人隋大業中為晉陽宮副監高祖留守太原與寂情契最密太宗與劉文靜建大計因寂以白高祖既登極拜尚書右僕射封魏國公進司空貞觀初卒年六十贈相州刺史工部尚書河東郡公臣聞天下至公非一姓之獨有聖人達節與萬物而推移故五運遞興百王更王春蘭秋菊無絶終古玉疏石記筆舌紛綸垂統有光煥乎寶籙伏惟陛下資靈種德稟慶至真固縱惟神生知乃聖量包乎宇宙智周乎品物㣥生塗炭躋之仁壽逢百六之厄創業雲雷追三五之蹤財成天地仲夏之半龍躍晉陽孟冬伊始鳳翔灞上鴻志蝟毛之反者霧委來庭觸柱拔山之大盜風馳獻欵三晉子弟共獯獫而陪麾咸秦豪傑連巴蜀而響應英聲西被懋德東漸南諧交趾北燮幽都躬未戎衣手不提劒機務成於雄斷人傑得於才子威加四海功出一門計極萬安戰窮百勝小往大來算無遺策時未期月業倍前王今古代興膺斯撥亂若茲之舉如茲之速載籍以來未之前聞也臣等誠歡誠喜頓首頓首死罪竊以陛下承家開國積德纍功世濟擬於高陽纘緒盛於周武載誕燭神光之異儀形表玉勝之奇白雀呈祥丹書授歷名合天淵姓符桃李君堯之國靡不則天星紀云周奉時圖始甲子之旦不俟而脫起兵西北勢合乘乾我來自東位當出震至八井深水之圖讖堂堂李樹之謠歌固以備在人謠無德而稱者也且夫體非常之道立非常之功實非常之人有非常之事不時正位人神佇式天命不常惟德是與遷虞事夏抑有前規臣等敢録舊典奉上尊號當今萬機曠主九有困窮伏願降鑒回慮憂世外已上順天心祗膺允執俯從人願屈就樂推變黎庶於時雍配上帝於宗祀勿以王者兼濟之功而為匹夫獨美之操昔之堯佐咸代天工績尤著者允饗稷坰人坰播穀之都餘慶商周臯陶好生洽人今興陛下盛德有後其若是乎四相三王齊名踵武千年得一相繼風聲符命所鍾有自來矣願納縉紳慺慺之情允副億兆欣欣之望率土更生含靈幸甚臣等誠惶誠恐昧死以聞頓首頓首死罪死罪大雅字彥宏太原祁人仕隋為東宮學士高祖起義引為大將軍府記室參軍主文檄纍拜陝東道大行臺工部尚書太宗立轉禮部封黎國公卒諡曰孝永徽五年贈尚書右僕射頃者崑山火烈海水㣥飛赤縣邱墟黔黎塗炭布衣戍卒耰鋤棘矜爭帝圖王狐鳴起翼翼京洛強弩圍城膴膴周原僵尸滿路主上南巡泛膠舟而忘返胸奴北熾將被髮於伊川輦上無虞㣥下結舌大盜移國莫之敢指忽焉至此自貽伊戚七百年之基窮於二世周齊以往書契以還邦國淪胥未有如此之酷者也則我高祖之業幾墜于地吾雖庸劣幸承餘緒出為八使入典八屯位未為高足成非賤素餐當世僶俯叨榮從容平勃之間誰云不可但顛而不扶通賢所責主憂臣辱無義徒然等袁公而流涕極賈生之慟哭所以仗旗投袂大會義兵綏撫河朔和親蕃塞共匡天下志在尊隋以弟相機而作一日千里雞鳴起舞豹變先鞭御宇當塗聿來中土兵臨郟鄏將觀周鼎營屯敖倉酷似漢王前遣書屈為唇齒今辱來旨莫我肯顧天生蒸民必有司牧當今為牧非子而誰老夫年踰知命願不及此欣戴大弟攀鱗附翼惟冀早應圖籙以寧兆庶宗盟之長屬籍見容復封於唐斯足榮矣殪商辛於牧野所不忍言執子嬰於咸陽非敢聞命汾晉左右尚須安輯盟津之會未暇卜期今日鑾輿南幸恐同永嘉之勢顧此中原鞠為茂草興言感歎實疚於懷脫知動靜遲數始報未面虛衷用增勞軫名利之地鋒鏑縱橫深慎垂堂勉茲鴻業君彥齊僕射孝徵子隋大業中調東都書佐檢校宿城令李密逼東都君彥為之草檄移郡縣密敗為王世充所殺與兄派流雖異根系本同自惟虛薄為四海英雄共推盟主所望左提右挈勠力同心執子嬰於咸陽殪商辛於牧野豈不盛哉久藉英風末由披覽其為眷佇夢想增勞寒勢轉嚴比當清吉久事昏朝無乃勤悴夫福善禍淫實上天之常道兼弱攻昧乃往哲之成規自昏狂嗣位棄德崇姦疲苦生民塗炭天下是以暴骨滿於原野積惡比於邱山莫不奮白旄而誅獨夫仗朱旗而勦二世孤為海內豪傑共推盟主百萬義師大會河洛因苦秦之衆乘厭紂之機共救蒼生大造區夏振茲長策濟此橫流義勇如林雲合響應東窮海岱南徹江淮三分宇宙二為我有公早發風雲之志獨宣王佐之才理追寇鄧之名當慕韓彭之氣何乃頓為殘賊迷復成凶竭力昏亂之朝盡節危亡之國同扶纍卵如坐積薪靜言思之可為長歎秦則楊熊李由並從顯戮晉則苟晞王浚悉見殲亡詎若微子去殷伊生歸亳擅榮寵於當年傳功名於後代知公素有赤誠思來歸義見機而作不容淹久今授公上柱國東平公告身隨送至宜檢納脫更遲疑必為人制王世充自守西洛前後四度摧翦死在朝夕翹足可見薛雄比從涿郡欲赴黎陽竇建德逆往邀擊隻輪無返公之羸卒其數非多北顧西瞻何所憑賴然白馬之津諸軍雲合船車下粟艫艦相尋足食足兵如貔如虎四面攻圍千里援絶地不可入天不可登兵戈一臨何處逃死吉凶二理幸自圖之故遣使指以宣往意自元氣肇闢厥初生人樹之帝王以為司牧是以羲農軒頊之后堯舜禹湯之君靡不祗畏上元愛育黔首乾乾終日翼翼小心馭朽索而同危履春冰而是懼故一物失所若納隍而愧之一夫有罪遂下車而泣之謙德軫於責躬憂勞切於罪已普天之下率土之濱蟠木距於流沙瀚海窮於丹穴莫不鼓腹擊壤鑿井耕田致之升平驅之仁壽是以愛之如父母敬之若神明用能享國多年祚延長世未有暴虐臨人克終天位者也隋氏往因周末預奉綴衣狐媚而圖聖寶胠篋以取神器及纘承負扆狼虎其心始曀明兩之暉終干少陽之位先皇大漸侍疾禁中遂為梟獍便行鴆毒禍深於莒僕釁酷於商臣天地難容人神嗟憤加以州吁安忍閼伯日尋劒閣所以懷凶晉陽所以興亂甸人為磬淫刑斯逞夫九族既睦唐帝闡其欽明百世本枝文王表其光大況復隳壞盤石勦絶維城脣亡齒寒寧止虞虢欲其長久其可得乎其罪一也禽獸之行在於聚麀人倫之體別於內外而蘭陵公主逼幸告終誰謂果支首之賢翻見齊襄之恥逮於先皇嬪御並進銀鐶諸王子女咸貯金屋牝雞鳴於詰旦雄雉恣其㣥飛衵服戲陳侯之朝穹廬同冒頓之寢爵賞之出女謁遂成公卿宣淫無復綱紀其罪二也平章百姓一日萬幾未曉求衣昃晷不食是以大禹不貴於尺璧光武不隔於支體以是憂勤深慮幽枉而荒湎于酒俾晝作夜式號且呼甘嗜聲伎常居窟室每藉糟邱朝謁罕見其身㣥臣希覩其面斷決自此不行敷奏於是停壅中山千日之飲酩酊無知襄陽三雅之杯留連詎比又廣召良家充選宮掖潛為九市親駕四驢自比商人見要逆旅殷辛之譴為小漢靈之罪更輕內外驚心遐邇失望其罪三也上棟下宇著在易爻茅茨采椽陳諸史籍聖人本意惟避風雨詎待金玉之華寧須綈錦之麗故璿室崇構商辛以之滅亡阿房崛起二世是以傾覆而不遵古典不念前章一作前車廣立池臺多營宮觀金鋪玉戶青瑣丹墀蔽虧日月隔閡寒暑窮生人之筋力罄天下之資財使鬼尚難為之勞人罔知不可其罪四也公田所徹不過十畝人力所供才止三日是以輕徭薄賦不奪農時寧積於人無藏於府而科稅繁猥不知紀極猛火屢燒漏巵難滿頭會箕斂逆折十年之租杼軸其空日損千金之費父母不保其赤子夫妻相棄於匡牀萬戶則城郭空虛千里則煙火斷滅西蜀王孫之室翻同原憲之貧東海糜竺之家俄成鄧通之鬼其罪五也古先哲王卜征巡狩唐虞五載周則一紀本欲親問疾苦觀省風謠乃復廣積薪芻多備饔餼年年歷覽處處登臨從臣疲弊供頓辛苦飄風凍雨聊竊比於先驅車轍馬迹遂周行於天下秦皇之心未巳周穆之意難窮晏西母而歌雲浮東海而觀日家苦納秸之勤人阻來蘇之望且夫天子有道守在海外夷不亂華在德非險長城之役戰國所為乃是狙詐之風非關稽古之法而追蹤秦代板築更興襲其基墟延袤萬里遂使尸骸蔽野血流成河積怨滿於山川號哭動於天地其罪六也遼水之東朝鮮之地禹貢以為荒服周王棄而不臣示以羈縻達其聲教苟欲愛人非求拓土又強弩末矢理無穿於魯縞衝風餘力詎能動於鴻毛石田得而無堪雞肋啖而何用而恃衆怙力強兵黷武惟在并吞不思長策夫兵猶火也不戢將自焚遂令億兆夷人隻輪莫返夫差喪國實為黃池之盟苻堅滅身良由壽春之役欲捕鳴蟬於前不知挾彈在後復矢相顧髽弔成行義夫切齒壯士扼腕其罪七也直言啓沃王臣匪躬惟木從繩若金須礪唐堯建鼓思聞獻替之言夏禹懸鞀時聽針規之美而愎諫違卜蠧賢嫉能直士正人皆由屠害左僕射齊國公高熲上柱國宋國公賀若弻或文昌上相或細柳功臣暫吐良藥之言翻加屬鏤之賜龍逢無罪便遭夏癸之誅王子何辜濫被商辛之戮遂令君子結舌賢人緘口指白日而比盛射蒼天而敢欺不悟國之將亡不知死之將至其罪八也設官分職貴在銓衡察獄問刑無聞販鬻而錢神起論銅臭為公梁冀受黃金之蛇孟他薦蒲萄之酒遂使彞倫攸斁政以賄成君子在野小人在位積薪居上同汲黯之言囊錢不如傷趙一之賦其罪九也宣尼有言無信不立用命賞祖義豈食言自昏主嗣位每歲行幸南北巡狩東西征伐至如浩亹陪蹕東都守固閿鄉野戰鴈門解圍自外征夫不可勝紀既立功勳須酬官爵而志懷翻覆言行浮詭危急則勳賞懸授克定則絲綸不行異商鞅之頒金同項王之刓印芳餌之下必有懸魚惜其重賞求人死力走丸逆坂匹此非難凡百驍雄誰不讎怨至於匹夫蕞爾宿諾不虧況在乘輿二三其德其罪十也有一於此未或不亡況四維不張三空總瘁無小無大愚夫愚婦共識殷亡咸知夏滅罄南山之竹書罪未窮決東海之波流惡難盡是以窮奇災於上國猰㺄暴於中原三河縱封豕之貪四海被長蛇之毒百姓殲亡殆無遺類十分為計才一而巳蒼生懍懍咸憂國之崩赤子嗷嗷但愁歷陽之陷且國祚將改必有常期六百殷亡之年三十姬終之世故讖籙皆云隋氏三十六年而滅此則厭德之象已彰代終之兆先見皇天無親惟德是輔況乃欃槍竟天申繻謂之除舊歲星入井甘公以為義興兼以朱雀門燒正陽日蝕狐鳴鬼哭川竭山崩並是宗廟為墟之妖荊棘旅庭之事夏氏則災釁非多殷人則咎徵更少牽牛入漢方知大亂之期王良策馬始驗兵車之會今者順人將革先天不違大誓孟津陳命景亳三千列國八百諸侯不謀而同辭不召而自至轟轟隱隱如霆如雷彪虎嘯而谷風生應龍驤而景雲起我魏公聰明神武齊聖廣淵備七德而在躬包九功而挺出周太保魏公之孫上柱國蒲山公之子家傳盛德武王承季歷之基地啓元勳世祖嗣元皇之業篤生白水日角之相便彰載誕丹陵天寶之文斯著加以姓符圖緯名協歌謠六合所以歸心三靈所以改卜文王厄於羑里赤雀方來高祖隱於碭山彤雲自起兵誅不道赤伏至自長安鋒鋭難當黃星出於梁宋九五龍飛之始大人豹變之初歷試諸艱大敵彌勇上柱國司徒東郡公翟讓功宣締構翼亮經綸伊尹之佐成湯蕭何之輔高帝上柱國總管齊國公孟讓柱國歷城公孟暢柱國絳郡公裴行儼大將軍左長史邴元真等並運籌千里勇冠三軍擊劒則截蛟斷鼇彎弧則吟猿落鴈韓彭絳灌成沛公之基寇賈吳馮奉蕭王之業復有蒙輪挾輈之士拔距投石之夫冀馬追風吳戈照日魏公屬當期運撫茲億兆躬擐甲胄跋涉山川櫛風沐雨豈辭勞倦遂起西伯之師將問南巢之罪百萬成旅四七為名呼吸則河渭絶流叱吒則嵩華自拔以此攻城何城不陷以此擊陳何陳不摧譬猶決滄海而濯殘螢舉崑崙而壓小卵鼓行而進百道俱前以今月二十一日屆於東都而昏朝文武留守段達等昆吾惡稔飛廉姦佞久迷天數敢拒義兵驅率醜徒衆有十萬回洛倉北遂來舉斧於是熊羆角逐貔虎爭先因其倒戈之心乘我破竹之勢曾未旋踵瓦解冰消坑卒則長平未多積甲則熊耳為少達等助桀為虐嬰城自固梯衝亂舞徒設九拒之謀鼓角將鳴空憑百樓之險燕巢衛幕魚遊宋池殄滅之期匪朝伊暮然興洛虎牢國家儲積我已先據為日久矣既得回洛又取黎陽天下倉廩盡非隋有四方起義萬里如雲足食足兵無前無敵裴光祿仁基雄才上將受命專征遐邇攸憑安危是託乃識機知變遷殷事夏袁謙擒自藍水張須陀獲在滎陽竇慶戰沒於淮南郭詢授首於河北隋之亡候斷可知也清河公房彥藻近秉戎律略地東南師之所臨風行電擊安陸汝南則隨機蕩定淮安濟陽則俄然送欵徐圓朗巳平魯郡孟海公又破濟陰於是海內英雄咸來響應封民瞻取平原之境郝孝德據黎陽之倉李士雄虎視於長平王德仁鷹揚於上黨滑公李景考功郎中房山基發自臨渝劉興祖起於北朔崔白駒在潁川起方獻伯以譙郡來各擁數萬之兵俱期牧野之會滄溟之右函谷以東牛酒獻於軍前壺漿盈於道路諸君等並衣冠世胄梓良才神鼎靈澤之秋裂地封侯之始豹變鵲起今正其時鼉鳴鱉應見機而作宜各鳩率子弟共建功名耿弇之赴光武蕭何之奉高帝當以金章紫綬華蓋朱輪富貴以重當年忠貞以傳奕葉豈不盛哉若隋氏官人同夫桀犬尚荷王莽之恩仍懷蒯瞶之祿審配死於袁氏不如張郃歸曹范增困於項王未若陳平從漢魏公推以赤心當加好爵擇木而處令不自疑脫其猛虎猶與舟中敵國夙沙之人共縛其主彭寵之僕自殺其君高官上賞即以相授如暗於成事守迷不反崑岡縱火玉石俱焚爾等噬臍悔將何及黃河帶地明余旦旦之言皎日麗天知我勤勤之意布告海內咸使聞知
