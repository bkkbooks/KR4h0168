front:
  text: 全唐文欽定全唐文卷五百八十七柳宗元十九
  hash: sha256:5ca1c486074852d96173084315d217e84ad1e6051e0d47f10ed2767d1d6ef169
body:
  text: 凡大人之道有三一曰正蒙難二曰法授聖三曰化及民殷有仁人曰箕子實具茲道以立於世故孔子述六經之旨尤殷勤焉當紂之時大道悖亂天威之動不能戒聖人之言無所用進死以併命誠仁矣無益吾祀故不為委身以存祀誠仁矣與亡吾國故不忍具是二道有行之者矣是用保其明哲與之俯仰晦是謨範辱於囚奴昏而無邪隤而不息故在易曰箕子之明夷正蒙難也及天命既改生人以正乃出大法用為聖師周人得以序彞倫而立大典故在書曰以箕子歸作洪範法授聖也及封朝鮮推道訓俗惟德無陋惟人無遠用廣殷祀俾夷為華化及民也率是大道藂於厥躬天地變化我得其正其大人歟於虖當其周時未至殷祀未殄比干已死微子已去向使紂惡未稔而自斃武庚念亂以圖存國無其人誰與興理是固人事之或然者也然則先生隱忍而為此其有志於斯乎唐某年作廟汲郡歲時致祀嘉先生獨列於易象作是頌云蒙難以正授聖以謨宗祀用繁夷民其蘇憲憲大人顯晦不渝聖人之仁道合隆汙明哲在躬不陋為奴沖讓居禮不盈稱孤高而無危卑不可踰非死非去有懷故都時詘而伸卒為世模易象是列文王為徒大明宣昭崇祀式孚古闕頌辭繼在後儒謹桉某年月日儒師河東薛公伯高由尚書刑部郎中為道州明年二月丁亥公用牲幣祭於先聖文宣王之廟夜漏未盡三刻公元冕以入就位於庭惕焉深惟夫子之祀爰自京師太學徧於州邑遐闊僻陋咸用斯時致奠展誠宿燎設懸罇俎旂章粲穆布列周天之下嗚呼夫子之道閎肆尊顯二帝三王其無以侔大也然其堂庭庳陋椽棟毀墜曾不及浮圖外說克壯厥居水潦仍至歲加蕩沃公蹙然不寧若罔獲承既祭而出登墉以望爰得美地豐衍端夷水環以流有頖宮之制是日樹表列位由禮考宜然後節用以制貨財乘時以僦功役逾年而克有成廟舍峻整階序廓大講肄之位師儒之室立廩以周食圃畦以毓蔬權其子母贏且不竭由是邑里之秀民感道懷和更來門下咸願服儒衣冠由公訓程公攝衣登席親釋經旨丕諭本統父慶其子長勵其幼化用興行人無爭訟公又曰夫子稱門弟子顏回為庶幾其後從於陳蔡亦各有號言出一時非盡其徒也於後失厥所謂妄異科第坐祀十人以為哲豈夫子志哉余桉月令則曰釋奠於先聖先師國之故也乃立夫子像配以顏氏籩豆既嘉笙鏞既成九年八月丁未公祭於新廟退考疑義合以燕饗萬民翼翼觀禮識古於是春秋師晉陵蔣堅易師沙門凝助教某學生某等來告願刻金石明夫子之道及公之勤惟夫子極於化初冥於道先㣥儒咸稱六籍具存苟贊其道若譽天地之大褒日月之明非愚則惑不可犯也惟公探夫子之志考有國之制光施彞典革正道本俾是荒服移為闕里在周則魯侯申能修頖宮詩有其歌在漢蜀守文翁能首儒學史有其贊今公法古之大同於魯化人之艱侔於蜀盍銘茲德以告於史氏而刊之茲碑銘曰荊楚之陽厥服惟荒民鮮由仁帝降其良振振薛公惟德之造赤旗金節來莅於道師儒咸會嘉有攸告吉日丁亥獻於頖宮庭燎伊煌有煥其容公升於位心莫不恭爰念聖祀徧於海邦服冕陳器州邑攸同感忻以欷思報聖功卜遷於嘉惟吉之逢畇畇其原既夷且大渙渙其流實環於外作廟有嚴昭祀顯配潔茲器用觀禮斯會布筵依位作廩伊秩以豐其儀以壯其室新宮既成崇報孔明於古有經公粹厥誠邦民之良弁服是纓公躬講論虔默以聽公降酬酢進退齊平柔肌洽體莫不充盈歸懽於心父子弟兄欽惟聖王厥道無涯世有頌辭益疚其多公斯考禮民感休嘉從於魯風祗以詠歌公錫於天眉壽來加公賚於王休命是荷師於辟雍大邦以和侑酳申申王道式訛諸儒作詩思繼頖水丕揚厥聲以告太史仲尼之道與王化遠邇惟柳州古為南夷椎髻卉裳攻劫鬬暴雖唐虞之仁不能柔秦漢之勇不能威至於有唐始循法度置吏奉貢咸若采衞冠帶憲令進用文事學者道堯舜孔子如取諸左右執經書引仁義旋辟唯諾中州之士時或病焉然後知唐之德大以遐孔氏之道尊而明元和十年八月州之廟屋壞幾毀神位刺史柳宗元始至大懼不任以墜教基丁未奠薦法齊時事禮不克施乃合初亞終獻三官衣布洎於贏財取土木金石徵工僦功完舊益新十月乙丑王宮正室成乃安神棲乃正法庭祗會㣥吏卜日之吉虔告於王靈曰昔者夫子嘗欲居九夷其時門人猶有惑聖言今夫子去代千有餘歲其教始行至於是邦人去其陋而本於儒孝父忠君言及禮義又况巍然炳然臨而炙之乎惟夫子以神道設教我今罔敢知欽若茲教以寧其神追思告誨如在於前苟神之在曷敢不虔居而無陋罔貳昔言申陳嚴祀永永是尊麗牲有碑刻在廟門貞元十二年夏洎秋不雨穡人焦勞嘉穀用虞皇帝使中謁者禱於終南申命京兆尹韓府君祗飭祀事考視祠制以為棟宇不稱宜有加飾遂命盩厔令裴均虔承聖謨剏制祠堂乃徵土工木工石工備器執用來會祠下斬板榦礱柱礎陶瓴甓築垣墉恢度舊制立三筵六尋既興功元雲觸石霈澤周被植物擢茂期於豐登神道感而宣靈人心歡而致和嘉氣充溢忭蹈布野於是邑令僚吏至於胥徒黃髮耆艾野夫版尹僉曰蓋聞名山之列天下也其有能奠方域產財用興雲雨考於祭法宜在祀典惟終南據天之中在都之南西至於褒斜又西至隴首以臨於戎東至於商顏又東至於太華以距於關實能作固以屏王室其物產之厚器用之出則璆琳琅玕夏書載焉紀堂條枚秦風詠焉今其神又能對於禱祝化荒為穰易沴為和厥功章明宜受大禮俾有憑託而宣其烈也非我后敬神重穀則曷能發大號尊明靈非我公勤人奉上則曷能對休命作新廟人事既備神用一作明時若豐我公田遂及我私粢盛無虞儲峙用充厥猷茂哉遂相與東向蹈舞拜手稽首願頌帝力且宣神德永著終古辭曰皇帝垂德制定統極神道泰寧祀典修飾禳祈禜雩皆有準程顧惟終南祠位庳陋不稱顯名爰降制詔充大厥宇啟寤誠明昭感神衷道宣天休獲此利貞篤災愆陽化為豐穰實我粢盛人賴蓄給鼓腹而歌以樂其生巍巍靈山興利產材作固鎬京擁其嘉休眷佑於人永宅厥靈奕奕新廟整頓端莊神位密清後祀承則潔心勤禮導暢純精邑吏嗇夫鮐背鯢齒願垂表經頌宣聖德篆刻金石永世飛聲元和九年八月二十日湘源二妃廟災司功掾守令彭城劉知剛主簿安邑衞之武告於州刺史御史中丞清河崔公能祗栗厥戒會㣥吏洎眾工發開元詔書懼廢守祀搜考贏羨均節委積咸執牘聿大典作筆英華作律至於祠下稽度既備傭役惟時斬木於上游陶埴於水涯迺桴迺載工逸事遂作貌顯嚴粲然而威十有一月庚辰陳奠薦辭立石於廟門之宇下惟父子夫婦人道之大大哉二神咸極其會為子而父堯為婦而夫舜齊聖並明弻成授受內若嚚瞽上承輝光克艱以乂德罔不至帝既野死神亦不返食於茲川古有常典敺祓戾孼恢宣淑靈敢或失職以奸大刑有翼其躬有苾其馨沈牲爰告即石是銘銘曰淵懿承聖舜妻堯女德刑媯汭神位湘滸揆茲有初克碩厥宇唐命秩祀茲邑攸主毛牷既㽬椒馨爰糈允於萬年期保伊祜潛火煽孼炖於融風神用播遷時罔克龔邑令㣥吏告於郡公廉用積餘以就爾功桴木負埴載流於江既夷以成崇宇峻墉絜嚴清閑左右率從神樂來歸徒御雍雍神既安止邦人載喜奉其吉玉以對嘉祉南風湑湑湘水如舞將子無讙神聽鐘鼓豐其交報邦邑是與刻此樂歌以極終古雍州西南界於梁其山曰太白其地恆寒冰雪之積未嘗已也其人以為神故歲水旱則禱之寒暑乖候則禱之厲疾祟降則禱之咸若有答焉者貞元十二年孟秋旱甚皇帝遇災悼懼分命禱祀至於茲山又詔京兆尹宜飾祠廟遂下令於甸邑邑令裴均臨事有恪革去狹陋恢閎棟宇階室之廣三倍其初翌日大雨黍稷用豐野夫讙謠欽聖信神願垂頌聲刻在金石時尹韓府君諱皋祗奉制詔發付邑吏令裴府君諱均承荷君公之命督就祠宇莅事謹甚克媚神意用獲顯貺邑人靈之其事遂聞詔書嘉異勞主者甚厚乃刻茲石立於西序右階之下肆列裴氏之政於碑之陰惟君教行於家德施於人撫字惠厚柔仁博愛之道洽於鰥嫠廉毅肅給威斷猛制之令行於強禦獄訟不私於上罪責不及於下農事課勵厚生克勤徵賦首入而其人益贍創立傳館平易道路改作甚力而其人彌逸韓府君每用嘉褒稱其理為甸服最今茲設廟位神神歡而寧宜為君之誠敬克合於上用啟之也不可以不志饒娥饒人饒姓娥名世漁鄱水娥為室女淵懿靖專雖小家未嘗出游治絺葛供女事循整鄉閭敬式娥父醉漁風卒起不能舟遂以溺死求屍不得娥聞父死走哭水上三日不食耳鼻流血氣盡伏死明日屍出黿魚鼉蛟浮死萬數塞川下流鄱旁小民悲感怨號以為神奇縣人鄉人會錢具儀葬娥鄱水西橫道上追思不足相與作石以詔後世其辭曰生德無類氣靈而休嗟茲孝娥惟行之周淵懿含貞好靖不游纖葛絺紵克供以修蒸蒸在家其父世漁飲酒不節死乎風濤匍匐來哭號天以呼顏目耳鼻膏血交流三日頓踣氣竭形枯父屍既出孝質已殂龜鼈黿鼉有蛟洎魚充流溢岸旁出仰浮見怪形異適與我謀鄱民哀號或以頌歌齊女色憂傷槐罷誅趙姬完父操棹爰謳肉刑不施漢美淳于烈烈曹娥水死上虞娥之至德實與為儔恆人有言惟教是圖懿茲德女家世不儒奇行特出神道莫酬窮哀罔泄終古以畱鄉人好禮爰立茲邱建銘當道過者下車急病讓夷義之先圖國忘死貞之大利合而動乃市賈之相求恩加而感則報施之常道睢陽所以不階王命橫絕兇威超千祀而挺生奮百代而特立者也時惟南公天與拳勇神資機智藝窮百中豪出千人不遇興詞鬱尨眉之都尉數奇見惜挫猨臂之將軍天寶末寇劇憑陵隳突河華天旋虧斗極之位地圯積狐狸之穴親賢在庭子駿陳謨以佐命元老用武夷甫委師而勸進惟公與南陽張公巡高陽許公遠義氣懸合訏謀大同誓鳩武旅以遏橫潰裂裳而千里來應左袒而一呼皆至柱厲不知而死難狼瞫見黜而奔師忠謀朗然萬夫齊力公以推讓且專奮擊為馬軍兵馬使出戰則㣥校同強入守而百雉齊固初據雍邱謂非要害將保江淮之臣庶通南北之奏復拔我義類扼於睢陽前後捕斬要遮兇氣連阻漢兵已絕守疏勒而彌堅虜騎雖強頓盱眙而不進賊徒乃棄疾於我悉眾合圍技雖窮於九攻志益專於三板偪陽懸布之勁汧城鑿穴之奇息意牽羊羞鄭師之大臨甘心易子鄙宋臣之病告諸侯環顧而莫救國命阻絕而無歸以有盡之疲人敵無巳之強寇公乃躍馬潰圍馳出萬眾抵賀蘭進明乞師進明乃張樂侑食以好聘待之公曰敝邑父子相食而君辱以燕禮獨何心歟乃自噬其指曰噉此足矣遂慟哭而返即死孤城首碎秦庭終懵無衣之賦身離楚野徒傷帶劍之辭至德二年十月城陷遇害無傅燮之歎息有周苛之慷慨聞義能徙果其初心烈士抗詞痛臧洪之同日直臣致憤惜蔡恭於累旬朝廷加贈特進揚州大都督功定為第一等與張氏許氏並立廟睢陽歲時致祭男在襁褓皆受顯秩賜之土田葬刻鮑信之形陵圖龐德之狀納官其子見勾踐之心羽林字孤知孝武之志舉門關於周典徵印綬於漢儀王猷以光寵錫斯備於戲睢陽之事不惟以能死為勇善守為功所以出奇以恥敵立慬以怒寇俾其專力於東南而去備於西北力專則堅城必陷備去則天討可行是故即城陷之辰為克寸敵之日世徒知力保於江淮而不知功靖乎醜虜論者或未之思歟公諱霽雲字某范陽人有子曰承嗣七歲為婺州別駕賜緋魚袋歷施涪二州服忠思孝無替負荷懼祠宇久遠德音不形願斲堅石假辭紀美惟公信以許其友剛以固其志仁以殘其肌勇以振其氣忠以摧其敵烈以死其事出乎內者合於貞行乎外者貫於義是其所以奮百代而超千祀者矣其志不亦宜乎廟貌斯存碑表攸記洛陽城下思鄉之夢儻來麒麟閣中即圖之詞可繼銘曰貞以圖國義惟急病臨難忘身見危致命漢寵死事周崇死政烈烈南公忠出其性控扼地利奮揚兵柄東護吳楚西臨周鄭婪婪㣥兇害氣彌盛長蛇封豕踊躍不定屹彼睢陽制其要領橫潰不流疾風斯勁梯衝外舞缶穴中偵鈐馬非艱析骸猶競浩浩烈士一作列土不聞濟師兵食殲焉守逾三時公奮其勇單車載馳投軀無告噬指而歸力窮就執猶抗其辭圭璧可碎堅貞不虧寇力東盡兇威西恧孤城既拔渠魁受戮雷霆之誅由我而速巢穴之固由我而覆江漢淮湖㣥生咸育倬焉勳烈孰與齊躅天子震悼陟是元功旌褒有加命秩斯崇位尊九牧禮視三公建茲祠宇式是形容牲牢伊碩黍稷伊豐虔虔孝嗣望慕無窮刊碑河滸萬古英風扶風公廉問嶺南三年以佛氏第六祖未有稱號疏聞於上詔諡大鑒禪師塔曰靈照之塔元和十年十月十三日下尚書祠部符到都府公命部吏洎州司功掾告於其祠幢葢鐘鼓增山盈谷萬人咸會若聞鬼神其時學者千有餘人莫不欣踴奮厲如師復生則又感悼涕慕如師始亡因言曰自有生物則好鬬奪相賊殺喪其本實誖乖淫流莫克返於初孔子無大位沒以餘言持世更楊墨黃老益雜其術分裂而吾浮圖說後出推離還源合所謂生而靜者梁氏好作有為師達摩譏之空術益顯六傳至大鑒大鑒始以能勞苦服役一聽其言言希以究師用感動遂受信具遁隱南海上人無聞知又十六年度其可行乃居曹溪為人師會學去來嘗數千人其道以無為為有以空洞為實以廣大不蕩為歸其教人始以性善終以性善不假耘鋤本其靜矣中宗聞名使幸臣再徵不能致取其言以為心術其說具在今布天下凡言禪皆本曹溪大鑒去世百有六年凡治廣部而以名聞者以十數莫能揭其號乃今始告天子得大諡豐佐吾道其可無辭公始立朝以儒重刺虔州都護安南由海中大蠻夷連身毒之西浮舶聽命咸被公德受旗纛節㦸來莅南海屬國如林不殺不怒人畏無噩允克光於有仁昭列大鑒莫如公宜其徒之老乃易石於宇下使來謁辭其辭曰達摩乾乾傳佛語心六承其授大鑒是臨勞勤專默終揖於深抱其信器行海之陰其道爰施在溪之曹厖合猥附不夷其高傳告咸陳惟道之褒生而性善在物而具荒流奔軼乃萬其趣匪思愈亂匪覺滋誤由師內鑒咸獲於素不植胡根不耘胡苗中一外融有粹孔昭在帝中宗聘言於朝陰翊王度俾人逍遙百有六祀號諡不紀由扶風公告今天子尚書既復大行乃誄光於南土其法再起厥徒萬億同悼齊喜惟師教所被洎扶風公所履咸戴天子天子休命嘉公德美溢於海夷浮圖是視師以仁傳公以仁理謁辭圖堅永允不已在代宗時有僧法照為國師乃言其師南嶽大長老有異德天子南嚮而禮焉度其道不可徵乃名其居曰般舟道場用尊其位公始居山西南巖石之下人遺之食則食不遺則食土泥茹草木其取衣類是南極海裔北自幽都來求厥道或值之崖谷羸形垢面躬負薪槱以為僕役而媟之乃公也凡化人立中道而教之權俾得以疾至故示專念書塗巷刻谿谷丕勤誘掖以援於下不求而道備不言而物成人皆負布帛斬木石委之巖戶不拒不營祠宇既具以洎於德宗申詔褒立是為彌陀寺施之餘則與餓疾者不尸其功公始學成都唐公次資川詵公詵公學於東山忍公皆有道至荊州進學玉泉真公真公授公以衡山俾為教魁人從而化者以萬計初法照居廬山由正定趣安樂國見蒙惡衣侍佛者佛告曰此衡山承遠也出而求之肖焉乃從而學傳教天下由公之訓公為僧凡五十六年其壽九十一貞元十八年七月十九日終於寺葬於寺之南岡刻石於寺大門之右銘曰一氣迴薄茫無窮其上無初下無終離而為合蔽而通始末或異今焉同虛無混冥道乃融聖袖無跡示教功公之率眾峻以容公之立誠教其中服庇草木蔽穹隆仰攀俯取食以充形遊無極交大雄天子稽首師順風四方奔走雲之從經始尋尺成靈宮始自蜀道至臨洪咨謀往復窮真宗弟子傳教國師公化流萬億代所崇奉公寓形於南岡幼曰宏願惟孝恭立之茲石書元蹤乾元元年某月日皇帝曰予欲俾慈仁怡愉洽於生人惟浮圖道允迪乃命五嶽求厥元德以儀於下惟茲嶽上於尚書其首曰雲峰大師法證凡莅事五十年貞元十七年乃沒其徒曰詮曰遠曰振曰巽曰素凡三千餘人其長老咸來言曰吾師軌行峻特器宇宏大有來受律者吾師示之以為尊嚴整齊明列義類而人知其所不為有來求道者吾師示之以為高廣通達一其空有而人知其所必至元臣碩老稽首受教髫童毀齒踴躍執役故從吾師之命而度者凡五萬人吾師冬不燠裘飢不豐食每歲會其類讀㣥經俾聖言畢出有以見其大又率其仵伐木輦土作佛塔廟洎經典俾象法益廣有以見其用將沒告門人曰吾自始學至去世未嘗有作焉然後知其動無不虛靜無不為生而未始來歿而未始往也其道備矣願刻山石知教之所以大其詞曰師之教尊嚴有耀恭天子之詔維大中以告後學是效師之德簡峻淵默柔惠以直渙焉而不積同焉而皆得茲道惟則師之功勤勞以庸維奧祕必通以興祠宮遐邇攸從師之族由虢而郭世德有奕從佛於釋師之壽七十有八惟終始罔缺丕冒遺烈厥徒蒸蒸維大教是膺維憲言是徵溥博恢宏如川之增如雲之興如嶽之不崩終古其承之佛法至於衡山及津大師始修起律教由其壇場而出者為得正法其大弟子曰日悟和尚盡得師之道次補其處為浮圖者宗世家於零陵蔣姓也和尚心大而行密體卑而道尊以為由定發慧必用毗尼為之室宇遂執業於東林恩大師究觀祕義乃歸傳教不視文字懸判深微登壇莅事度比邱眾凡歲千人者三十有七而道不慁以為去凡即聖必以三昧為之軌道遂服勤於紫霄遠大師修明要奧得以觀佛浩入性海洞開真源道場專精長跪右遶不衡不倚凡七日者百有二十而志不衰初開元中詔定制度師乃居本郡龍興寺肅宗制天下名山置大德七人茲嶽尤重推擇居首師乃即崇嶺是作精室闢林莽刳巖巒殿舍宏大廊廡修直不命而獻力不祈而薦貨凡南方人顓念佛三昧者必由於是命曰般舟臺焉和尚生十三年而始出家又九年而受具戒又十年而處壇場又三十七年而當貞元二十年正月十七日化於茲室嗚呼無德而修故念為實相不取於法故律為大乘壞衣不飾揣食不味覆薦服役凡出於生物者擯而勿用不自知其慈攝取調御凡歸於正真者動而成㣥不自知其教萬行方厲一性恆如寂用之涯不可得也有弟子曰景秀嗣居法會欲廣其師之德延於罔極故申明陳辭俾刊之茲碑銘曰像教南被及津而尊威儀有嚴載闢其門吾師是嗣增濬道源度眾逾廣大明㣥昏乃興毗尼微密是論八萬總結彰於一言聲聞熙熙遐邇來奔如木既拔有植其根乃法般舟奧妙斯存百億冥會觀於化元同道祁祁功庸以敦如水斯壅流之無垠帝求人師登我先覺赫矣明命表茲靈嶽於彼南阜齋宮爰作負揭致貨時靡要約袒奮程力不呼而諾是刈是鑿既塗既斲層構孔碩以延後學出不牛馬服不絮帛匪安其躬亦菲其食勤而不勞在用恆寂縱而不傲在捨恆得洪融混合孰究其跡懿茲遺光式是嘉則容貌往矣軌儀無極其徒追思賡薦茲石儒以禮立仁義無之則壞佛以律持定慧去之則喪是故離禮於仁義者不可與言儒異律於定慧者不可與言佛達是道者惟大明師師姓歐陽氏號曰惠聞唐開元二十一年始生天寶十一載始為浮圖大歷十一年始登壇為大律師貞元十三年十一月十一日卒元和九年正月其弟子懷信道嵩尼無染等命高道僧靈嶼為行狀列其行事願刊之茲碑宗元今掇其大者言曰師先因官世家潭州為大族有勳烈爵位今不言大浮圖也凡浮圖之道衰其徒必小律而去經大明恐焉於是從峻洎侃以究戒律而大法以立又從秀洎昱以通經教而奧義以修由是二道出入隱顯後學以不惑來求以有得廣德二年始立大明寺於衡山詔選居寺僧二十一人師為之首乾元元年又命衡山立毗尼藏詔選講律僧七人師應其數凡其衣服器用動有師法言語行止皆為物軌執巾匜奉杖屨為侍者數百翦髮髦被教戒為學者數萬得眾若獨居尊若卑晦而光介而大灝灝焉無以加也其塔在祝融峰西趾下碑在塔東其辭曰儒以禮行覺以律興一歸真源無大小乘大明之律是定是慧丕窮經教為法出世化人無量垂裕無際詔尊碩德威儀有繼道徧大洲徽音勿替祝融西麓洞庭南裔金石刻辭彌億千歲凡葬大浮圖無竁穴其於用碑不宜然昔之公室禮得用碑以葬其後子孫因宜不去遂銘德行用圖久於世及秦刻山石號其功德亦謂之碑而其用遂行然則雖浮圖亦宜也凡葬大浮圖其徒廣則能為碑晉宋尚法故為碑者多法梁尚禪故碑多禪法不周施禪不大行而律存焉故近世碑多律凡葬大浮圖未嘗有比邱尼主碑事今惟無染實來涕淚以求其志益堅又能言其師他德尤備故書之碑陰師凡主戒事二十二年宰相齊公映李公泌趙公憬尚書曹王皋裴公冑侍郎令狐公峘或師或友齊親執經受大義為弟子又言師始為童時夢大人縞冠素舄來告曰居南嶽大吾道者必爾也已而信然將終夜有光明笙磬之音眾咸見聞若是類甚眾以儒者所不道而無染勤以為請故末傳焉無染韋氏女世顯貴今主衡山戒法佛之生也遠中國僅二萬里其沒也距今茲僅二千載故傳道益微而言禪最病拘則泥乎物誕則離乎真真離而誕益勝故今之空愚失惑縱傲自我者皆誣禪以亂其教冒於嚚昏放於淫荒其異是者長沙之南曰龍安師師之言曰由迦葉至師子二十二世而離離而為達摩由達摩至忍五世而益離離而為秀為能南北相訾反戾鬬狠其道遂隱嗚呼吾將合焉且世之傳書者皆馬鳴龍樹道也二師之道其書具存徵其書合於志可以不慁於是北學於惠隱南求於馬素咸黜其異以蹈乎中乖離而愈同空洞而益實作安禪通明論推一而適萬則事無非真混萬而歸一則真無非事推而未嘗推故無適混而未嘗混故無歸塊然趣定至於旬時是之謂施用茫然同俗極乎流動是之謂真常居長沙在定十四日人即其處而成室宇遂為寶應寺去於湘之西人又從之負大木礱密石以益其居又為龍安寺焉尚書裴公某李公某侍郎呂公某楊公某御史中丞房公某咸尊師之道執弟子禮凡年八十一為僧五十三朞元和三年二月九日而沒其弟子元覺洎懷直浩初等狀其師之行謁予為碑曰師周姓如海名也世為士父曰擇交同州錄事參軍叔曰擇從尚書禮部侍郎師始為釋其父奪之志使仕至成都主簿不樂也天寶之亂復其初心嘗居京師西明寺又居岣嶁山終龍安寺葬其原銘曰浮圖之修其奧為禪殊區異世誰得其傳遁隱乖離浮游散遷莫徵旁行徒聽浮言空有互鬬南北相殘誰其會之楚有龍安龍安之德惟覺是則苞并絕異表正失惑貌昧形靜功流無極動言有為彌寂而默祠廟之嚴我居不飾貴賤之來我道無得逝耶匪追至耶誰抑惟世之幾惟道之微既陳而明乃去而歸象物徒設真源無依後學誰師嗚呼茲碑維某年月日岳州大和尚終於聖安寺凡為僧若干年年若干有名無姓世莫知其閭里宗族所設施者有問焉而以告曰性吾姓也其原無初其冑無終承於釋師以系道本吾無姓耶法劍云者我名也實且不有名惡乎存吾有名耶性海吾鄉也法界吾宇也戒為之墉惠為之戶以守則固以居則安吾閭里不具乎度門道品其數無極菩薩大士其眾無涯吾與之戚而不吾異也吾宗族不大乎其道可聞者如此而止讀法華經金剛般若經數逾千萬或譏以有為曰吾未嘗作嗚呼佛道逾遠異端競起唯天台大師為得其說和尚紹承本統以順中道凡受教者不失其宗生物流動趣向混亂惟極樂正路為得其歸和尚勤求端愨以成至願凡聽信者不惑其道或譏以有跡曰吾未嘗行始居房州龍興寺中徙居是州作道場於楞伽北峯不越閫者五十祀和尚凡所嚴事皆世高德始出家事而依者曰卓然師居南陽立山卒葬岳州就受戒者曰道穎師居荊州弟子之首曰懷遠師居長沙安國寺為南嶽戒法歲來侍師會其終遂以某月日葬於卓然師塔東若干步銘曰道本於一離為異門以性為姓乃歸其根無名而名師教是尊假以示物非吾所存大鄉不居大族不親淵懿內朗沖虛外仁聖有遺言是究是勤惟動惟默逝如浮雲教久益微世罕究陳爰有大智出其真門師以顯示俾民惟新情動生變物由湮淪爰授樂國參乎化源師以誘導俾民不昏道用不作神行無迹晦明俱如生死偕寂法付後學施之無斁葬從我師無忘真宅薦是昭銘刻茲貞石無姓和尚既居是山曰凡吾之求非在外也吾不動矣宏農楊公炎自道州以宰相徵過焉以為宜居京師強以行不可將以聞曰願間歲乃往明年楊去相位竄謫南海上終如其志趙郡李萼辯博人也為岳州盛氣欲屈其道聞一言服為弟子河東裴藏之舉族受教京兆尹宏農楊公某以其隱地為道場奉和州刺史張惟儉買西峰廣其居凡以貨利委堂下者不可選紀受之亦無言將終命其大弟子懷遠授以道妙終不告其姓或曰周人也信州刺史李某為之傳長沙謝楚為行狀博陵崔行儉為性守一篇凡以文辭道和尚功德者不可悉數宏農公自餘杭命以行狀來懷遠師自長沙以傳來使予為碑既書其辭故又假其陰以記
