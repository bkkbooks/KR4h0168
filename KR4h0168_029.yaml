front:
  text: 全唐文欽定全唐文卷二十九元宗十
  hash: sha256:fa1c6c34f4c6bfd6dab3a9411a5b401fe5ec25750b73f5e48a58b9092dd8fde5
body:
  text: 王者承事天地以為主郊享泰尊以通神蓋燔柴泰壇定天位也瘞埋泰折就陰位也將以昭報靈祇克崇嚴配爰逮秦漢稽諸祀典立甘泉於雍畤祠后土於汾陰遺廟巋然靈光可燭朕觀風唐晉望秩山川肅恭明神思致禋敬將欲為人求福以輔升平合此神符應於嘉德宜以來年正月北巡狩行幸至汾陰以二月祠后土所司準式朕巡狩晉陽觀風問俗肆覲㣥后存問百年諸侯待於境者抑惟故事今停蹕潞州勞以牛酒其外州刺史及迎駕父老道士僧尼等遠來至此頗亦艱辛宜併令預會刺史賜物四十匹父老巳下各賜物三匹國之三典令于四方歲終則巡聽其獄訟頃因水旱貨食不足或徭稅徵逸多不折衷或租調蠲除事涉欺隱皆吏之不稱政之不修是用命茲使臣委其詳覆徐楚璧等並清白自立茂有政聲必使事合權宜刑無冤濫不損於物有益於公往敷厥休副茲推擇並可攝監察御史勾當租庸地稅兼覆囚神農嘗草以療人疾岐伯品藥以輔人命朕銓覽古方永念黎庶或榮衛內壅或寒暑外攻因而不救良可歎息今遠路僻州醫術全少下人疾苦將何恃賴宜令天下諸州各置職事醫學博士一員階品同于録事每州寫本草及百一集驗方與經史同貯其諸州子録事各省一員中下州先有一員者省訖仰州補勳散官充近日漏刻失時或早或晚宜令太史謹修盡職勿使更然如有愆違委御史彈奏朕君臨宇內子育黎元豈以黃屋為尊實以蒼生為念何嘗不日旰忘食未明求衣雖身在九重而情存六合恐至道猶鬱大化未孚昨因展義河東祈穀脽上肆覲㣥后親問高年舉滯賑窮旌善黜惡緝其墜典酌于古訓今省方告至禋祀云畢思乂庶官務崇易河南河北去歲水損人或竊盜吏或侵抑不防害馬何以安人或令御史分道案行量加賑給諸州府馬闕數稍多既合官填復須私備貧兵力致實以為難宜令所司即勘會闕數與間廄使計會取監牧馬充其行過處緣頓及營幕損百姓青苗並令本州勘以正倉酬直懷澤兩州巳免地稅潞州太原府亦有給復其汾晉蒲絳同華京兆河南供頓戶並宜免今年地稅鄭衛雒相宜沁慈隰等州佐助夫役雖日不多終是往還辛苦各免戶內今年差科緣頓所築宮牆內今並空間任本主耕種緣路州縣有表薦官僚及上書獻頌者中書門下審覆奏聞量加進賞發都試及諸色召募行從人遠將巡省須收才用並令所司即作條例處分內外官職田恐侵百姓先令官收慮其祿薄家貧所以別給地子去歲緣有水旱遂令總停如聞卑官頗難支濟量事優恤使得自資宜準元敕給其地子朱紫貴品皆豫考勞人臣事君忠無二節至如泛階溥及義取平均豈獨清官偏得減考自今巳後如泛階應入五品以十六考為定入三品以三十考為定其有名賢宿德及異迹殊狀雖不逢泛階或因選改之次年考與節限同者咸以名聞仍為永例今之刺史古之諸侯會玉汾脽豫陪祀禮宜令中書門下商量奏聞方今萬類發生春事方起所司宜敬敷五教敦勸三農議緩刑獄禁傷胎卵罷妨農不急之務減額外不要之官各委長官量事處分宣示遠近副朕意焉大酺之會與人同歡或慮遠方觀者來往狼狽其四夜併宜開坊門府縣金吾嚴加捉搦如聞在外官人罕遵法式孤弱被抑冤不獲申有理之家翻遭逼迫侵刻之吏務欲加誣州縣有好長官同寮豈敢違法御史執憲綱紀是司多惜人情未聞正色內外同此何致至公宜令刺史縣令嚴加捉搦御史按其有犯彈奏公主出降蕃王本擬安養部落請入朝謁深慮勞煩朕知割恩抑而未許思加殊惠以慰遠心奚有五部落宜賜物三萬段其中取二萬段先給征行遊奕兵及百姓餘一萬段與東光公主饒樂王衙官刺史縣令契丹有八部落宜賜物五萬段與燕郡公主松漠王衙官刺史縣令其物雜以絹布務令均平給訖奏聞河南河北去歲雖熟百姓之閒頗聞辛苦今農事方起蠶作就功宜令御史分往巡行其有貸糧未納者並停到秋收文武選人十月下解既逼銓注勘難周不能自親並委猾吏恣成姦濫為蠧尤深自今巳後兵吏兩司專定員外兩人判南曹事每年選畢起五月一日所是文狀即預勘責關判南曹官親自就覆每包攢作簿書對本司長官連署印記不得委其胥吏勘責畢各具人數奏聞其判南曹官所司即進名朕自擇緇黃二法殊途一致道存仁濟業尚清虛邇聞道僧不守戒律或公訟私競或飲酒食肉非處行宿出入市廛罔避嫌疑莫遵本教有一塵纍深壞法門宜令州縣官嚴加捉搦禁止有國者必以人為本固本者必以食為先先王於是務其三時前聖所以分其五土勸農之道實在於斯朕撫圖御歷殆踰一紀旰食宵衣勤乎兆庶故兢兢翼翼不敢荒寧頃歲以來雖稍豐稔猶恐地有遺利人多廢業游食之徒未盡歸生穀之疇未均墾以是軫念臨遣使臣恤編戶之流亡閲大田之衆寡至如百姓逃散良有所繇當天冊神功之時北狄西戎作梗大軍之後必有凶年水旱相仍逋亡滋甚自此成弊於今患之且違親越鄉蓋非獲己暫因規避旋被兼并既冒刑網復損産業居且常懼歸又無依積此艱危遂成流轉或因人而止或庸力自資懷土之思空盈返本之途莫遂朕虔荷丕搆子育萬姓立德非宜而茲弊未革納隍馭朽實切於心既深在豫之責思宏自新之令其先是逋逃並宜自首仍能服勤壟畝肆力耕耘所在間田勸其開闢逐土任宜收稅勿令州縣差科徵役租庸一皆蠲放若登時不出或因此更逃習俗或然非以為法且阻我誠信是紊我大綱爰及所繇須加嚴限且天下風壤多有不同地既異宜俗亦殊習固當因利制事不可違人立法宜令兵部員外郎兼侍御史宇文融兼充勸農使巡按人邑安撫戶口所在與官寮及百姓商量處分乃至賦役差科於人非便者並量事處分續狀奏聞務令安輯勿使勞繁當行賞罰之科各竭忠公之力所到之處宣示百姓達我勸人之心懷遠夷納款附國家常事也邊塞嚴甲兵備軍旅本職也雖萬方和同不可薄其武備百蠻朝貢不可輕其疆場今年十月東幸雒京西北二邊倍宜嚴警其河西隴右朔方太原幽州平盧諸節度咸宜裹糧坐甲秣馬利兵明教隊伍遠為偵使風塵預知邀截有所安我邊鄙威加戎狄賞罰在茲各宜砥礪可汗慕義向風益以嘉尚我國家金帛子女務通和親然一為婚姻將傳永久契約須重禮數宜周今來人既輕禮亦未足所以未定日月令其且還如和好不移誠信無改凡有所請必當不違國家信若四時恩同天地一言則定何誓如之必能結之神明彌表彼之誠契既無猜阻任擇其宜諸所有商量今巳親語哥解更欲遣使恐致勞煩令寄可汗錦袍鈿帶銀盤胡鉼至宜領取蒲同兩州自春偏旱慮至來歲貧下少糧宜令太原倉出十五萬擔米付蒲州永豐倉出十五萬擔米付同州減時價十錢糶與百姓為國之道莫不欲家給人足令行禁止而族談者苦邊疆之戍役偶語者傷戶口之凋殘且夫懷土重遷人之常性離邦去里孰無其情或委非其材或政非其要致令父不保子兄不寧弟井邑有流離之怨道路有吁嗟之聲靜言思之良可嘆息是以晝分不食夜不安寢庶息彼弊政就此涼風故發使車以巡郡縣其承前處置不便不利於人即宜當處商量隨事釐革其緣邊兵士等或遠辭鄉壤久事戎旃饑寒而衣食不充疾病而醫藥不拯邊烽忽警將何以堪宜令使人各親勞苦其有年齒衰暮或抱病羸弱即與軍司選擇給糧放還行人之家委州縣優恤所到宣撫稱朕意焉夫登封之禮告禪之儀蓋聖人之能事明王之盛業也朕以眇身託王公之上夙夜祗懼恐不克勝幸賴㣥公以保宗社至於休徵符瑞皆先帝遺愛朕何賴焉豈可以禮百神覲㣥后備岱亭之禮展封祀之儀者哉雖誠請是違而宿心未暇夫理定然後制禮功成然後作樂朕承奉宗廟恐不克勝未能使四海乂安此理未定也未能使百蠻效職此功未成也焉可以揚景化告成功雖欲答於神祇終安於兆庶再省誠懇惻怵良深自中朝有故國步艱難天祚我唐大命集於聖真皇帝朕承奉丕業十有餘年德未加於百姓化未覃於四海將何以擬洪烈於先帝報成功於上元至若堯舜禹湯之茂躅軒后周文之懿範非朕之能逮也其有日月之瑞風雲之祥則宗廟社稷之餘慶也天平地成人和歲稔則㣥公卿士之任職也撫躬內省朕何有焉難違兆庶之情未議封崇之禮自古受命而王者曷嘗不封泰山禪梁父答厚德告成功三代之前率繇斯義自魏晉巳降迄至周隋帝典闕而大道隱王綱弛而舊章缺千載寂寥封崇莫嗣物極而復天祚我唐武文二后應圖受籙洎于高宗重光纍盛承至理登介邱懷百神震六合紹殷周之統接虞夏之風中宗宏懿鑠之休睿宗穆粹清之道巍巍蕩蕩無得而稱者也朕昔戡多難稟略先朝虔奉慈旨嗣膺丕業是用創九廟以申孝敬禮二郊以展嚴禋寶菽粟於水火捐珠玉於山谷兢兢業業非敢追美前王日慎一日實以奉遵遺訓至於巡狩大典封禪鴻名顧惟寡薄未遑時邁十四載於茲矣今百穀有年五材無眚刑罰不用禮義興行和氣氤氳淳風淡泊蠻夷戎狄殊方異類重譯而至者日月於闕庭奇獸神禽甘露醴泉窮祥極瑞者朝夕於林籞王公卿士罄乃誠於中鴻生碩儒獻其書於外莫不以神祇合契億兆同心斯皆烈祖聖考垂裕餘慶故朕得荷皇天之景祐賴祖廟之介福敢以眇身而顓其讓是以敬承㣥議宏此大猷以光我高祖之丕圖以紹我太宗之鴻業永言陟配祗感載深可以開元十三年十一月十日式遵故實有事泰山所司與公卿諸儒詳擇典禮預為備具勿廣勞人務存節約以稱朕意所緣封禪儀注兵馬陪集並皆條奏布告遐邇自古明王仁及萬物今助天孳育方將告成其緣祀祭及在路供頓犧牲餼牢禮不可闕除此之外天下諸州並令斷屠及漁獵採捕駕回至京都依常式朱紫貴服所以分別班品自非有德有功不可輕為賞借自今以後諸軍節度大使灼然有知功勞須權行給賞任量借色及魚袋仍俱狀奏大德曰生至重曰命緬觀前典惟刑是恤比來犯盜先決一百雖非死刑大半殞斃言念于此良用惻然自今巳後抵罪人合杖敕杖者並宜從寬決杖六十一房家口移隸磧西其嶺南人移隸安南江淮南人移隸廣府劒南人移隸姚巂州其磧西姚巂安南人各依常式布告遐邇使知朕意陽和布氣庶物萌芽仁者用心無遺枯朽自開元元年以來諸軍兵士殞歿骸骨不歸墳壠者宜令軍使為造棺遞送本貫委州縣府助其埋殯河曲隴外往歲戰場殂歿無歸陰雨猶哭言念於此良用惻然亦委朔方隴右河西節度使聚斂骸骨就高燥處同葬祭以酒脯高大築墳使久遠標識乘塞守邊義不可輟遠征久戍人亦告勞朕身處九重心在四遠因時遇物無日不思亭障有行役之勤室家無杼軸之用不少優恤何以為安方春發生須急農事其諸軍長征人家單貧乏無力者宜令本管州縣勸率其家助其營種使有秋望元率地稅以置義倉本防儉年賑給百姓頻年不稔逋租頗多言念貧人將何以濟今獻春布澤務叶時和自開元十二年閏十二月以前所有未納懸缺地稅宜放免御史出使舉正不法身苟不正焉能正人如聞州縣祗迎相望道路牧宰祗僮僕不若作此威福其正人何自今以後宜申明格敕不得更爾違者州縣科罪御史貶降身體髮膚受之父母不合毀傷比來有訴競之人即自刑害耳目自今以後犯者先決四十然後依法孔宣父誕聖自天垂範百代作王者之師表開生人之耳目朕增封岱嶽回鑾泗濱思闕里之風想雩壇之詠逖矣遺烈慨然永懷式遵祀典用申誠敬宜令禮部尚書蘇頲以太牢致祭仍令州縣以時祀享復近墓五戶長供掃除孟夏麥秋尚決小罪況天時漸熱深愍繫囚宜令中書門下巡城內囚徒量事處置畿甸徒囚赤縣縣令疏理斷決勿滯禁人如聞道俗之閒妄有占筮誑惑士庶假說災祥兼託符咒遂行左道先令禁斷不合更然仍慮愚下未能悛改宜令所司申明格敕嚴加訪察時屬正陽事殷蠶穡愍彼囹圄或多冤濫宜宏慎恤之恩俾助生育之德其所有囚徒除死囚巳外所司長官即疏決處分朕為人父母撫有海內以百姓為心恐一夫失所至於兵募尤令存恤去給行賜還給程糧以此優矜不合辛苦如聞比來兵募年滿者皆食不充腹衣不蔽形䭾幕什物散落略盡既不能致便流浪不歸丁壯減耗實繇於此自今巳後諸鎮兵募每準額至交替時所司預勘兩月前奏聞當差御史分道察若涉欺隱委御史彈奏其有衣資盡者量以逃死兵衣給三兩軍使得支濟如病患者遞給驢乘令及伴侶五嶽視三公之位四瀆當諸侯之秩載於祀典亦為國章方屬農功頗增旱暵虔誠徒積神道未孚用申靡愛之勤冀通能潤之感宜令工部尚書盧從願祭東嶽河南尹張敬忠祭中嶽御史中丞兼戶部侍郎宇文融祭西嶽及西海河瀆太常少卿張九齡祭南嶽及南海黃門侍郎李皓祭北嶽右庶子何鸞祭東海宗正少卿鄭繇祭淮瀆少詹事張晤祭江瀆河南少尹李暈祭北海及濟瀆且潤萬物者莫先乎雨動萬物者莫先乎風眷彼靈神是稱師伯雖有常祀今更陳祈宜令光祿卿孟溫祭風伯左庶子吳兢祭雨師各就壇壝務加崇敬但羞蘋藻不假牲牢應緣奠祭尤宜精潔朕撫有天下寅畏上元思保太和用康庶類頃秋夏之際水潦不時懷鄭許滑衛等州皆遭泛溢苗稼潦漬屋宇傾摧有切納隍之憂良深在豫之責宜令右監門衛將軍知內侍省事黎敬仁速往宣慰如有遭損之處應須營助賑給並委使與州縣相知量事處置及所在堤堰不穩便者行其利害奏聞頃秋夏之閒水潦方降閭閻損壞稼穡漂淪嘗恐一物之違況乃數州之弊故發中使巡于外臺章奏屢聞州鄉稍輯朕視之如子若納諸隍于再于三情猶馭朽審求人瘼更遣信臣中丞兼戶部侍郎宇文融忠文竭誠夙夜匪懈當安人之任有利之能眷彼使乎宜膺其選可往河南河北道遭水諸州宣撫仍審察有不支濟者宜更量加賑貸若屋宇損壞牛畜俱盡及征人之家不能自存立者量事助其修葺其有官吏縱捨賑給不均亦須糾正回日奏聞朕夢想賢才咨謀列嶽遂因封祀發詔搜揚昨所臨御道場親加策問不稱所薦其數則多乃聞膏粱之人遞相招致邱園之俊罕見褒升豈朕勞求之意也宜令都督刺史審更訪擇具以名薦開府儀同三司兼太常卿寧王憲秉德夷遠體道淳深頃以茂親典司宗社禮經之文既備鍾律之度巳和成而不居謙以自牧固辭兼領情所重違宜遂雅懷俾停劇務近聞河南宋沛等州百姓多有㳂流逐熟去者須知所詣有以安存宜令本道勸農事與州縣檢責其所去及所到戶數聞奏陳州刺史李樂詐盜受贓其數甚廣法司斷死國有常刑時屬發生特申寬典宜免死貶為欽州道化縣尉員外置長任同州鄜州近屬霖雨稍多水潦為害念彼黎人載懷憂惕宜令侍御史劉彥回乘傳宣慰其有百姓屋宇田苗被漂損者量加賑給河南河北諸州去年緣遭水潦雖頻加賑貸而恐未小康言念于茲無忘鑒寐爰自春夏雨澤以時兼聞夏苗非常茂好既即收穫不慮少糧然以産業初營儲積未贍若非寬惠不免艱辛其貸糧麥種榖子回轉變造諸色缺負等並放豐年以漸徵納蠶麥事畢及至秋收後並委刺史縣令專勾當各令貯積勿使妄有費用明加曉諭知朕意焉河北州縣水災尤甚言念蒸人何以自給朕當寧興想有勞旰昃在豫之責用軫于懷宜令所司量支東都租米二十萬擔賑給仍令魏州刺史宇文融充宣撫使便巡撫水損應須優恤及合折免并存閭舍一事巳上與州縣相知逐穩便處置務從易勿致勞擾
