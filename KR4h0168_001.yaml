front:
  text: 全唐文欽定全唐文卷一帝姓李氏諱淵字叔德其先隴西成紀人後徙長安祖虎佐周有功為柱國追封唐公帝生襲封隋大業十二年十二月為太原留守明年五月舉義兵十一月入長安尊立恭帝自為大丞相進爵為王義寧二年戊寅五月受禪建元武德在位九年八月傳位太子年七十一諡曰大武皇帝廟號高祖追尊神堯大聖大光孝皇帝
  hash: sha256:352a3af390097cf8d6a202e9c89d03eb1f746395fda27c265f3e4abf0611c70c
  markers:
  - {type: head, offset: 10, content: 高祖皇帝, id: KR4h0168_NFKB_001-h1, level: 1}
body:
  text: 乞言將智事屬高年耄耋杖鄉禮宜優異老人等年餘七十匍匐壘壁見我義旗懽踰擊壤筋力之禮知不可為肉帛之資慮其多闕式加榮秩以賙其養節級並如前授自外當土豪雋以資除授義兵取人山藏海納逮乎徒隸亦無棄者及著勳績所司致疑覽其所請可為太息豈有矢石之閒不辨貴賤庸勳之次便有等差以此論功將何以勸黥而為王亦何妨也賞宜從重吾其與之諸部曲及徒隸征戰有功勳者並從本色勳授義旗撥亂庶品來蘇類聚㣥分無思不至乃有出自青溪遠辭丹竈就人閒而齊物從戎馬以同塵咸願解巾負茲羈緤雖欲勿用重違其請逸民道士等誠有可嘉並依前授嘉禾為瑞聞諸往策逮乎唐氏世有茲祥放勳獲之於前叔虞得之於後孤今糾合復逢靈貺出自興平來因善樂休徵偉兆何其美歟顧循虛薄未堪當此呈形之處須表天休送嘉禾人興平孔善樂宜授朝散大夫以旌嘉應義旗濟河關中響應轅門輻湊赴者如歸五陵豪傑三輔冠蓋公卿將相之緒餘俠少良家之子弟從吾投刺咸畏後時扼腕連鑣爭求立效縻之好爵以永今朝大業巳來巡幸過度宿止之處好依山水經茲勝地每起離宮峻宇雕牆亟成壯麗良家子女充牣其閒怨曠感於幽明糜費極於民產替否迭進將何糾逖馳道所有宮室悉宜罷之其宮人等並放還親屬李密趦趄鞏洛自許當塗王城如燬憂心孔棘東都危逼有若倒懸西人之子理本奔命其左右大都督府所統諸軍並宜戒嚴以時式遏有征無戰是謂義師招諭不從勿難還也初年孟月春作方興不奪農時宜知其速大業喪亂兵革殷繁天下黔黎手足無措孤所以救焚拯溺平此亂階蜀道諸郡深思蘇息遠勤王略誠有可嘉方一戎衣靜茲多難而薛舉狂僭吞噬西土隴蜀道途恐相侵暴今便命將授律分道進兵其衝要諸郡縣宜率勵各募部民隨機底定斯則暫勞永逸貽厥子孫守國刑家同享安樂比年寇盜郡縣饑荒百姓流亡十不存一貿易妻子奔波道路雖加周給無救倒懸京師倉稟軍國資用罄以恤民便闕支擬今岷嶓款服蜀漢沃饒閭里富於猗陶菽粟同於水火曩者儲蓄徵斂實繁帑藏猶殷宜垂拯濟木牛流馬非可轉輸樂土重遷理無從薄則窮通之道將由革變外內戶口見在京者宜依本土置令以下下官部領就食劒南諸郡所有官物隨至糴給明立條格務使穩便秋收豐實更聽進止論道經邦任惟勳德分陝作伯實寄親賢尚書令雍州牧右武大將軍上柱國秦王世民器宇沖深智謀英果義師云舉首賛奇謀親率熊羆搴旗斬將廓清區夏忠孝克彰狡寇逋誅虔劉西土總戎薄伐戡翦無遺策尚權遠謀猷沈密宜在鼎司肅清槐路今區宇方緝鞏洛猶蕪鎮俗治戎允資望實可太尉使持節陝東行臺其蒲州河北諸道總管及東討諸府兵並受節度餘官悉如故京室殷阜鉤陳嚴祕肅遏警巡職務尤重然而玉門遐阻控禦垂荒金城衝要尉攸屬宣風作牧親賢是寄太尉尚書令雍州牧陝東道行臺右武大將軍上柱國秦王世民地實藩枝任惟心膂職參三事功著二南識度優閒性理濟闕典戎敷化聲績備舉宜攝九門總司八校撫莅河右允兼望實可左武大將軍使持節涼甘瓜鄯肅會蘭河廓九州諸軍事涼州總管其太尉尚書令雍州牧陝東道行臺右武大將軍上柱國王如故蜀郡沃野曰惟井絡控馭邛筰臨制巴渝求瘼宣風朝寄尤重總司岳牧是屬懿親太尉尚書令陝東道行臺雍州牧左武大將軍使持節涼州總管上柱國秦王世民器宇沖深體識明允專征閫外茂績克宣敷政京畿嘉聲巳著鎮撫岷漢僉論攸宜可益州道行臺尚書令德懋懋官功懋懋賞經邦盛則哲王彞訓是以華衮龍章允洽希世之勳玉戚朱干實表宗臣之貴太尉尚書令雍州牧左武大將軍陝東道行臺尚書令涼州總管上柱國秦王世民締搆之始元功夙著職兼內外文教聿宣薛舉盜寇秦隴武周擾亂河汾受朕專征屢平妖醜然而世充僭擅伊洛未清建德憑陵趙魏猶梗總戎致討問罪三川馭以長算兇黨窘蹙既而漳濱蟻聚來渡河津同惡相求志圖抗拒三軍爰整一舉克定戎威遠暢九圍靜謐鴻勳盛績朝野具瞻申錫寵章實允僉議宜崇徽命位高羣品文物所加特超恒數建官命職因事紀功肇錫嘉名用標茂實可授天策上將位在王公上領司徒陝東道大行臺尚書令增邑一萬戶通前三萬戶餘官並如故加賜金輅一衮冕之服玉璧一雙黃金六千斤前後鼓吹九部之樂班劒四十人汪華往因離亂保據州鄉鎮靜一隅以待寧晏識機慕化遠送款誠宜從襃寵授以方牧可使持節總管歙宣杭睦婺饒等六州諸軍事歙州刺史上柱國封越國公食邑三千戶禦侮折衝朝寄尤切任惟勳德實佇親賢天策上將太尉領司徒尚書令陝東道大行臺益州道行臺尚書令雍州牧涼州總管左右武大將軍上柱國秦王世民宇量凝邈志識明劭爰始締搆功參鼎業廓清秦隴茂績以彰戡定周韓戎威遐暢河朔餘寇取若拾遺濟代逋誅克同振朽宣風都輦綜務朝端政術有聞綱目斯舉宜加襃寵式兼常秩總攝戎機望實惟允可領左右十二衞大將軍餘並如故飾終定諡往代通規追遠增榮前王令典第三子元霸幼挺岐嶷早茂珪璋第五子智雲結髮仁明勝衣敏惠冀其成立訓以義方未被趨庭遽同過隙興言夭枉震悼於懷今王業初隆慶賞伊始既式遵於利建宜稽古於哀榮元霸可追封衞王諡曰懷智雲可追封楚王諡曰哀絲綸樞祕寄任闕二字帷扆獻納職惟顯要望實兼隆親賢斯屬天策上將太尉兼司徒尚書令陝東道大行臺尚書令雍州牧十二衞大將軍秦王世民宇量沖深風神爽悟任兼文武聲績著聞司徒并州大都督稷州刺史左領軍大將軍右武大將軍上柱國齊王元吉器懷淹密業紹英茂闕二字內外政務克舉用加蟬珥朝典攸宜世民可中書令元吉可侍中餘如故舜禹殊時禪代存乎揖讓殷周異世革命事乎干戈至於據龍圖握鳳紀統御皇極撫輯黎民奄有四方朝宗萬國垂法作訓其揆一焉朕以寡薄屬彼澆季大業末年綱維廢弛三光改耀九服移心既戡定時難輯和庶績一匡海內再造黎元隋氏以天祿永終歷數攸在敬禪厥位授於朕躬顧惟慙德屬當景運懼甚履冰凜乎御朽上答蒼靈之睠俯順億兆之心寶歷初基普天同慶所宜布茲寬惠咸與惟新可大赦天下改隋義寧二年為武德元年自五月二十日昧爽以前罪無輕重巳發露未發露皆赦除之子殺父奴殺主不在赦限百官及庶人賜爵一級義師所行之處給復三年自餘給復一年孝子順孫義夫節婦旌表門閭孝悌力田鰥寡孤獨量加賑恤革命創制禮樂變於三王修廢繼絕德澤隆於二代是以鳴條克寸伐杞用夏郊牧野降休宋承殷祀爰及魏晉禪代相仍山陽賜號於當塗陳留受封於典午上天迴睠授歷朕躬隋氏順時遜其寶位敬奉休命敢不對揚永作我賓宜開土宇其以莒之酅邑奉隋帝為酅公行隋正朔車旗服色一依舊章仍立周後介公共為二王後近世以來時運遷革前代親族莫不誅絕歷數有歸實維天命興亡之效豈伊人力前隋蔡王智積等子孫並付所司量才選用秦以不聞其過而亡典籍豈無先誡臣僕諂諛故弗之覺也漢高祖反正從諫如流洎乎文景繼業宣元承緒不由斯道孰隆景祚周隋之季忠臣結舌一言喪邦良足深誡永言於此常深歎息朕每惟寡薄恭膺寶命雖不能性與天道庶思勉力常冀弼諧以匡不逮而㣥公卿士罕進直言將申虛受之懷物所未諭萬年縣法曹孫伏伽至誠慷慨詞義懇切指陳得失無所迴避非有不次之舉曷貽利行之益伏伽既懷諒直宜處憲司可治書侍御史仍頒示遠近知朕意焉前政多僻人不聊生怨讟如讎嘗無控告黎民易子而食郡縣猶有餘糧遂使聚斂無厭窮兵不巳忠良屏跡邪偽當塗慶妖怪為禎祥稱希旨為奉法至於亡滅上莫之知靜言其事可為太息者也朕恭膺寶歷救斯兆庶思革前弊念茲在茲起軍以來於今期月軍書羽檄日有百數一言一事皆親覽焉未明求衣中夜不寐恐一物之失所慮一理之有屈但四方州鎮習俗未懲表䟽因循尚多迂誕申請盜賊不肯至言論民疾苦每虧實錄妄引哲王深相佞媚假託符瑞極筆阿諛亂語細書動盈數紙非直乖於體用固亦失於事情千里佇於一言萬機湊於一日表奏如是稽疑處斷不知此者謂我何哉宜頒告遠近知朕至意隋政不綱行止無度東西奔騁靡歲獲寧遂使父子乖離室家分析親老絕晨昏之養嬰孩無撫育之恩人懷戀本之心家有望鄉之歎朕上膺靈命下字黔黎一物失宜情深軫悼思俾惠澤逮於鰥寡其隋代公卿巳下爰及民庶身往江都家口在此不預義軍者所有田宅並勿追收若有窮困糧食交絕具錄名簿速加賑贍隋太常卿高熲上柱國賀若弼並抗節不阿矯枉無撓司隸大夫薛道衡刑部尚書宇文㢸左翊衞將軍董純並懷忠抱義以陷極刑宜從襃飾以慰泉壤熲可贈上柱國郯國公弼贈上柱國杞國公各令有司加諡道衡贈上開府臨河縣公㢸贈上開府平昌縣公純贈柱國狄道縣公隋右驍衞大將軍李金才左光祿大夫李敏並鼎族高門元功世冑橫受屠殺朝野稱冤然李氏將興天祚有應冥契深隱妄肆誅夷朕受命君臨志存刷蕩申冤旌善無忘寤寐金才可贈上柱國申國公敏可贈柱國觀國公朕起義晉陽遂登皇極經綸天下實仗㣥材尚書令秦王世民尚書右僕射裴寂等或合契元謀或同心運始並蹈義輕生捐家殉節艱辛備履金石不移論此忠勤特宜優異官爵之榮抑惟舊典勳賢之議宜有別恩其罪非叛逆可聽恕一死其太原元謀勳効者宜以名聞安人靜俗文教為先禁暴懲凶武略斯重比以喪亂日久黎庶凋殘是用務本勸耕冀在豐贍而人蠧未盡寇盜尚繁欲暢兵威須加練習今農收巳畢殺氣方嚴宜順天時申曜威武可依別敕大集諸軍朕將躬自循撫親臨較閱國初草創日不暇給凡厥禮儀鮮能盡備且生人未乂彫弊日多至於畜產思致蕃息祭祀之本皆以為身窮極事神有乖正直殺牛不如禴祭明德即是馨香望古推今祭神一揆其祭圜丘方澤宗廟以外並可止用少牢先用少牢者宜用特牲待時和年豐然後克循常禮安康郡公襲譽我之同姓派別枝分惟厥祖考世敦恭睦襲譽部率宗人協同義舉立功巴蜀誠節頻聞宜有襃榮用超階序特聽合譜宗正恩禮之差同諸服屬朕祗膺靈命撫字氓黎方緝隆平躋之仁壽田畝之賦一切蠲除錙銖之律悉皆停斷是以特建農圃本督耕耘思俾齊民既庶且富鍾庾之量冀同水火宜置常平監官以均天下之貨市肆騰踴則減價而出田穡豐羨則增糴而收觸類長之去其泰甚庶使公私俱濟家給人足抑止兼并宣通壅滯隋德下衰政荒民散九州幅裂四海瓜分元元無辜困豺狼之吻惵惵黔首罹兵革之災朕祗膺寶圖救其危墜一物失所情深納隍今趙魏之人俱承大化海岱之境思稟朝章然而尚迫寇戎受拘凶暴經途遐阻末繇自達宣風布教必佇循良柔服招攜事資明恕右翊衞大將軍上柱國淮安王神通地惟近屬功參運始杖節建旟允當重寄可山東道安撫大使其山東諸軍事並受節度逸遊損德昔賢貽訓玩物喪志前典格言西旅獻獒召公於是作誡東齊饋樂尼父所以離心隋末無道肆極奢靡內騁倡優之樂外崇耳目之娛冠蓋相望徵求不息公私擾遽徭費無窮朕受命君臨志在儉約日旰忘食昧爽求衣纂組珠璣皆云屏絕雕琢綺麗久從抑止其侏儒短節小馬庳牛異獸奇禽皆非實用諸有此獻悉宜停斷宣布遠邇咸使聞知朕受終揖讓君臨四海普天之下同加惠澤宗緒之情義越常品宜有旌異以明等級諸宗姓官宜在同列之上未有職任者不在徭役之限每州置宗師一人以相管攝別為圖伍所司明立條式釋典微妙淨業始於慈悲道教沖虛至德去其殘殺四時之禁無伐麛卵三驅之化不取前禽蓋欲敦崇仁惠蕃衍庶物立政經邦咸率茲道朕祗膺靈命撫遂㣥生言念亭育無忘鑒寐殷帝去網庶踵前修齊王捨牛實符本志自今以後每年正月五月九月及每月丁齋日並不得行刑所在公私宜斷屠殺赦過宥罪哲王彞訓錄舊念功有國通典汾晉之地王迹所基勠力齊心夷凶靜亂惟彼士庶義越常倫犯禁陷刑宜從洗滌其并州浩州石州介州賈胡堡以北自武德二年二月二十四日以前犯辟罪巳下巳發覺繫囚見徒悉從原放酒醪之用表節制於懽娛芻豢之滋致甘旨於豐衍然而沈湎之輩絕業忘資惰窳之民騁嗜奔慾方今烽燧尚警兵革未寧年穀不登市肆騰踴趣末者衆浮冗尚多肴羞麴糵重增其費救弊之術要在權宜關內諸州官民宜斷屠酤隋末道消運為陽九盜賊蜂起饑饉薦臻四海之民墜於塗炭是以上天降鑒爰命朕躬綏靜黎元克定凶醜府庫倉廩所在開發流冗之民隨加鎮撫言念亭育監寐匪忘然年穀不登民多困乏一物失所有甚納隍宜加存問救其疾苦可令皇太子建成巡京城側近諸縣秦王世民巡京城以東右僕射裴寂巡京城以西詣彼閭閻見其耆老觀省風俗廉察吏民乏絕之徒量加賑給如有冤滯並為申理高年疾病就致束帛畫野分疆山川限其內外遐荒絕域刑政殊於函夏是以昔王御世懷柔遠人義在羈縻無取臣屬渠搜即敘表夏后之成功越裳重譯美周邦之長算有隋季世黷武耀兵萬乘疲於河源三年伐於遼外搆怨連禍力屈貨殫朕祗膺寶圖撫臨四極悅近來遠追革前弊要荒藩服宜與和親其吐谷渾巳修職貢高句麗遠送誠款契丹靺鞨咸求內附因而鎮撫允合機宜分命行人就申好睦靜亂息民於是乎在布告天下明知朕意朕恭膺寶命綏靜氓黎思俾宇躋於仁壽而河湟之表比罹寇賊勾連凶醜壅隔朝風元元之民匪遑寧宴夙興軫慮旰食忘疲重勞師旅不令討擊馭以遐算且事招懷而慕化之徒乘機立效兵不血刃費無遺鏃今凶狡即夷西垂克定遠人悅附政道惟新宜播惠澤與之更始可曲赦涼甘瓜鄯肅會蘭河廓九州自武德二年五月十六日以前罪無輕重巳發繫囚見徒悉從原免桀犬吠堯非無前喻棄瑕蕩穢列聖通規有惡言不順及邪謀惑計者並從洗滌一無所問民稟五常仁義斯重士有百行孝敬為先自古哲王經邦致治設教垂範莫尚於茲叔世澆訛民多偽薄修身克已事資誘勸朕恭膺靈命臨馭遐荒愍茲弊俗方思遷導雍州萬年縣樂遊鄉民王世貴孝性自天力行無怠喪其所怙哀毀絕倫負土成墳結廬墓側鹽酪之味在口不嘗哭泣之聲感於行路安福鄉民宋興貴立操雍和主情友睦同居合爨累世積年務本力農崇讓履順宏長民教敦睦風俗宜加襃顯以勸將來可並旌表門閭蠲免課役布告天下使明知之盛德必祀義存方策達人命世流慶後昆建國君人宏風闡教崇賢彰善莫尚於茲自八卦初陳九疇攸敘徽章既革節文不備爰始姬旦匡翊周邦創設禮經大明典憲啟生人之耳目窮法度之本源化起二南業隆八百豐功茂德冠於終古暨乎王道既衰頌聲不作諸侯力爭禮樂陵遲粵若宣父天資睿哲經綸齊魯之內揖讓洙泗之閒綜理遺文宏宣舊制四科之教歷代不刊三千之徒風流無斁惟茲二聖道濟㣥生尊禮不修孰明襃尚朕君臨區宇興化崇儒永言先達情深紹嗣宜令有司於國子學立周公孔子廟各一所四時致祭仍博求其後具以名聞詳考所宜當加爵土天生五材司牧資其器用武有七德撥亂所以定功故黃帝垂衣尚有阪泉之戰放勳光宅猶稱丹浦之師禁暴安人率由茲道創業垂統莫此為先是以周置六軍每習蒐狩漢增八校畢選驍雄故能化行九有威震百蠻姦宄不萌虔劉息志自季葉淩替軍政湮亡行列不修旌旗舛雜部伍符籍空有調發之名逗撓乏興竟無討襲之用遂使戎狄放命盜賊交侵戰爭多虞黔黎殄喪朕受天明命撫育萬方爰自義師克成帝業至如超乘之士莫匪百金彀騎之才豈惟七萃今雖關塞寧謐荒裔肅清伊雒猶蕪江湖尚梗役車未息戎馬載馳武備之方尤宜精練所以各因部校序其統屬改授鉦鼓創造徽章取象天官定其名號庶使前茅後勁類別區分玉帳絳宮刑德允備蹈茲湯火譬彼椒蘭大定戎衣止戈斯在世充僭逆拘逼黎元向化之徒無繇自達朕惡煩百姓不欲興戎久戢兵戈未窮征討然而縱溢彌甚暴虐不悛愍彼方隅久遭塗炭賊既糧盡計竭衆叛親離惡稔貫盈亡徵巳見今則分命驍勇步騎齊趨直指雒濱衝其巢穴招納降附拯救阽危務在安人豈實求利兵馬所到有因事立功擒敵制勝者重頒爵命厚加襃賞其金玉府藏分賜將士酬賞之科仍依別格宜明申布咸使知聞太常樂人今因罪謫入營署習藝伶官前代以來轉相承襲或有衣冠世緒公卿子孫一沾此色後世不改婚姻絕於士類名籍異於編甿大恥深疵良可哀愍朕君臨區宇思從寬惠永言淪滯義存刷蕩其大樂鼓吹諸舊人年月巳久世代遷易宜得蠲除一同民例但音律之伎積學所成傳授之人不可頓闕仍依舊本司上下若巳仕官見入班流勿更追呼各從品秩自武德元年以來配充樂戶者不入此例昭德以爵前王令範功懋懋賞有國遺訓使持節幽州總管上柱國燕公藝早悟機權夙展誠節革運之始立功燕代鎮守邊要馭控遐荒忠績既宣宜加寵昵可賜姓李氏上籍宗正封燕郡王食五千戶朕祗膺靈命君臨區宇承凋弊之餘拯橫流之難雖復蠲除徭賦督課耕農安集黎元與之休息然而鯨鯢未翦四海多虞師旅洊興事不獲巳及其士卒浮惰苟求逸樂憚於征役離其營伍因此逃竄潛匿崎嶇盜竊為資規免朝夕良繇勸勵不明部署失所弛慢之責在於朕躬琴瑟不調巳云變革多墜刑網情兼軫悼宜從寬宥許以自新其義士募人有背軍逃亡者自武德二年十月二十日巳前罪無輕重皆赦除之饑寒困弊不能自存者所在官司隨事賑給士非素厲難以應敵設法垂憲期於不犯自今巳後有背軍鎮征役者隨即科處必無容貸宜明宣告咸使知聞
