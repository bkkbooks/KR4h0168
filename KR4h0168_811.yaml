front:
  text: 全唐文欽定全唐文卷八百十一皓宜春人咸通進士僖宗幸蜀擢倉部員外郎龍紀中遷集賢殿圖書使自稱碧池處士
  hash: sha256:9d5077601cb3edc2d1590bd3e62ed9506b4807a74693ea00e29e533b94ae3939
  markers:
  - {type: head, offset: 13, content: 袁皓, id: KR4h0168_NFKB_811-h1, level: 1}
body:
  text: 孫室季壞其相更相語曰不日不月吾其晉臣乎有客前而語曰相君不聞物之化者耶蛇化為龍龍之孫見蛇而笑之謂吾祖之世龍焉殊不知蟒之腥尚存乎大澤之畔家化為國國之孫見家必笑之謂吾祖之世國焉殊不知耕稼之具未朽於歷山之下蓋由知龍而不知蛇知國而不知家噫堯舜聖人也丹均而不能嗣而况吳以干戈而得耶相君喻而泣吟篁怨桐天其聲乎鏘石鏗金天其文乎擊革鳴絲天其暢乎匏土之韻天其和乎天有至音寄斯八物先生不生斯音鬱鬱先生既生斯音在律嗚呼先生之耳時可求也先生之心不可得也天全樂乎先生之無神乎愚固狂而不可攄先生之有神乎愚堅誠而乞其圖先生之耳有神乎化為天下之耳先生之心有神乎化為天下之心者可以舒於今然後家家知舜琴齊祖受宋禪大宴卿士顧謂丞相曰子不肖幸有天下非百執事羽翼小子共拯宋人之溺也然子不敢易時而侮器使不十逾載致黃金與土同價朝臣稱賀內外喧歡快喜相聲日走天下齊封父聞而慶曰宋人生矣而告鄉處士處士聞而泣曰捨虎逢狼改時而亡吾為宋人幸未死果塗炭於齊矣新主之言豈成聖人之道耶君王知黃金貴於土不知百姓視土貴於黃金吾聞古者土地之封在於民阜而國殷土有林木民時而取土有鹹滷民時而煮土有禾黍民時盈庾金玉在山桑麻在原聖人不禁無私無官死者有土生者有田聖人樂而百姓同百姓憂而聖人然句絶秦傳亂國之疾百姓之苦莫痊漢壤既廣百姓饒矣土地之利百姓莫得而窺之金玉在山鹹滷在田取塊土者犯禁而死生無土而可以田歿無土而及乎泉生則稅蠧而郡蠶邑剋而吏齧吾視宋人之萍久矣未見宋人有寸土者君王苟欲致民於生地不若薄民之賦貽民之利知百姓貴土於黃金則其民受福於齊矣封父敬而謝曰吾將聞執政可乎處士曰否是欲急挈吾於禍矣惟父勿施吾將往鵠豫章人咸通舉進士不第穆宗皇帝臨大朝與㣥臣言奏政事㣥臣退而宰臣奏曰陛下問及乎政事此三皇五帝之所徽美也陛下不問及史臣此三皇五帝之所弭已也徽美者將有乎聞也弭已者將有乎亡也以聞之而又亡之則陛下徒有宵衣旰食之名規天條地之績與㣥臣言後若飈然拂冠過冕湮時銷日無得用於後譬如十夫樹楊一夫拔之無得以成其大也政事㣥臣得陛下日問之是十夫樹楊也史官執筆為陛下日遠之是一夫拔楊也使後之人訝聖朝空晨虛夕間殿曠廷無君臣咨謀洋溢之言乏社稷安危強讜之説是不亦遠史臣致不載其事如拔去其楊將弭已之謂乎臣伏念貞觀永徽之代百官之有耳目但聽視天子而已故言事者安論紓詞無疑權慮勢史官執筆於階之下天子側旒於殿之上奏者發誠於廷之中是以正衙一開則臣誠前而啓之帝旒近而鎮之史筆隨而録之由是君臣謀國圖政之事俞機都要之言託業發神豐編照物偕籍於堯典差光於天陽至今見太宗文德若三皇五帝之所徽美也自永徽之後宰執不正窺伺是忌針棘前後阻越對揚狼噬虎餐持膏衒肉蓋以言多為己惠不致君內荏失中畏使人聽乃奏史官與百僚俱退然後宰臣請事由是君有問而宰臣知之史官不得與於聞君有舉而宰臣謀之史官不得記其事次第周行檢録制誥與冗吏同工而已臣嘗涕泣以嘆豈有以一己之細一性之忌於黍晷圭景之間苟嗜急須回天遮上使聖緒神績有嘉揚善諷罔得聞於千萬年枉有謂明朝空晨虛夕間殿曠廷無君臣咨謀洋溢之言乏社稷安危強讜之説若今踵而承之則不惟臣有障聰蔽睿之刺抑陛下雖有三皇五帝之所徽美而若遠史臣則三皇五帝之所弭已也抑又有一夫拔楊之謂歟臣請史官執筆當㣥臣奏事隨日撰録號為聖政紀臣立朝荷祿幸甚穆宗皇帝動扆頷旒憮然歎曰吁朕罔敢粉名厥後乃罔知厥後然聖人存簡策者亦非以粉名也蓋存乎大國之典鴻祖之業我國有典我祖有業業在於典典在於史遏厥史不書是尸余於祖涸業於典也朕纘承聖緒恭惟恪思將念厥政未嘗不離安廢酣馳荒騖遠是以每與宰臣言如簇天下一巡省每見宰臣退而展天下盡聞知豈圖臣蓄猾謀公無同事欲弄尾舌先衛巖穴隔斥史臣占佞明后致懿搜嘉訪不存堯典之書善諷名猷莫出清廟之什史臣負我不舉其官宰輔盡忠厥聞有此由是詔史職執史筆立於庭之下録君臣臚句之必行載剛毅進退之敢議題其篇目曰聖政紀也至上之即位三年有鄉校小臣來鵠居山澤間常私心重惜史臣以其史臣者是當國之鏡千億代之眉目也因窺穆宗實録得解憤釋嫉於立史官為聖政紀者追而頌出其事以鑒今之廷列故拜獻其頌曰三皇不書五帝不紀有聖有神風銷日已何教何師生來死止無典無法頑肩奡比三皇實作五帝實治成天造地不昏不圯言得非排文德聖齒表表如見者莫若乎史是知朴繩休結正簡斯若君誥臣針觚編毫絡前書後經規善鑒惡國之大章如何寢略嗚呼貞觀多叶永徽多俞廷日發論殿日發謨牙孽不作鳥鼠其除論出不蓋謀行不紆楹然史臣蛇然史裾瞪瞪而視逶逶而婁翹筆當面決防納污不梏爾智不席我愚執言直注史文直敷故得粲粲朝典落落廷謇聖牘既多堯風不淺頒編坦軸君出臣顯若儼見旒若俯見冕無間殿曠廷無尸安素晏三皇不亡五帝不翦太宗得之史焉斯展暨乎後相圖身天子專問我獨以言史不得近邱明見嫌倚相在擯秉筆如今隨班不進班退史歸惘然疇依奏問莫覩嘉謨固稀取彼誥命祿為國肥炯哉時皇言必及章德室五帝道奧三皇如何翊臣饞肉嗜衁觜距磨快福衡物長控截僚位占護陽光垣私藩已遠史瘐唐俾德音嘉訪默縮暗亡咽典噤法蓋聖籠昌曷以致此史文不張後必非笑將來否臧謂乎殿空扆逸朝懵廷荒不知姦蔽文失汪洋有貞觀業有永徽綱亦匿匪見亦寢匪彰賴有後臣知言不佞伊尹直心太甲須聖事既可書史何不命乃具前欺大陳不敬曰遂史之喻請以物並且十夫樹楊一夫欲競栽既未牢拼豈能盛帝業以栽逐史似拼穆宗憮然若疚若醟何昔臣斯隱我祖正不傳親問不寫密諍孰示來朝以光神政由是天呼震岌徵奔召急史提筆來叱廷而入端耳抗目不撝不挹獬豸側頭螭虯擺溼握管絶怡當殿而立君也盡問臣也倒誠磊磊其事鏜鏜其聲大何不顯細何不明語未絶緒史已録成録成謂何書政紀名伊紀清芬可昭典墳古師官鳥昔聖官雲方之我后録里書分録有君法書有君文君法君文在聖政紀云殿無間時廷無曠日雲諏波訪倦編刓筆君劬臣勞上討下述惟勤惟明在聖政紀出至德何比至教焉如孰窺孰測外夷內儲謂君有道乎臣有謨歟有道有謨在聖政紀書一體列秩同力翼戴祈福去祅絶防無礙國章可披唐文可愛善咨不偷嘉論不蓋不偷不蓋在聖政紀載諒夫總斯不朽可懸魏闕愚得是言非訕非伐實謂醫臣渾沌開君日月妖物氛死天文光發惟我之有頌兮奚斯躍而董狐蹶隋儒林有説高祖謂㣥臣曰自古天子有女樂否楊素以下莫知所出遂言無之房暉遠進曰臣聞窈窕淑女鐘鼓樂之此即王者房中之樂著於雅頌不得言無隋文悅噫而史不刊者朝與職俱無人也夫秦齊晉皆有女樂由余去孔子行錫魏絳之謂也漢祖唐山夫人能楚聲又舊云祭天用女樂魏武有盧女能鼓琴特異於諸妓則女樂秦齊晉漢魏俱有之而楊素以下皆不能言者豈以所問是古天子耶若是則有太昊使素女鼓五十絃瑟悲哀帝禁不止後之帝王遂能有之㣥臣不能以是言但賢暉遠之説暉遠引詩臆對終為博古通知殊不明恣率一時之言頗昧二南之旨且詩曰參差荇菜左右芼之窈窕淑女鐘鼓樂之説者謂后妃有關睢之德乃能供荇菜備庶物以事宗廟盛德者宜有鐘鼓之樂也故琴瑟在庭荇菜羞之上下樂作以盛其禮耳謂以樂樂淑女非謂淑女執其樂也淑女謂后妃也安有后妃執樂也荇菜謂在宗廟用也安有謂王者房中樂耶是皆乖謬之甚暉遠瞽詩而終對欺朝而罔君蓋由隋日無人浪言至是女樂之對猶可君道之問若何上下相蒙履霜於此悲夫天下之命修文士曰儒士其言書曰儒書是謬久矣夫儒者可器之士號也何者以其不達於事濡滯焉且以詩書之法未嘗言以周易春秋之文未嘗載斯明矣惟論語言當為君子儒母為小人儒禮記儒行篇如是非仲尼之言也夫聖人言君臣父子夫婦兄弟朋友賓主之法而已矣是儒者無定不約其事而制之何必曰儒苟若是則曰儒曰佛曰道何怪耶夫士之出也進道德行禮樂以治其身心能語言明仁義則曰儒士不善而為武夫夫控弦荷戈賤隸之徒也苟修其文而不知武烏得為君子孔子曰有文事者必有武備有武備者必有文事夫文所以導乎忠孝若武所以戢乎畔逆二事之用以求於是而已某是知古今之人慮或未精故也輒建斯議以為世式孟子之愛人也細緣其言而不精以為習而有利則心唯恐不利至於傷人則曰術不可不慎也嗚呼術焉得慎慎則情背也心則可慎慎則唯術之惡而不利其傷也為仁人之心由術使之可動則咎繇之術治黥割也而咎繇豈利人之刑周公之術治縗絰也而周公豈利人之喪以為愛人者必有其備故也術善可以化其心歟則師之術所以導善也潘崇因師以殺楚子醫之術可以治生也晉人因醫以鴆衛侯是師醫之所術豈不慎歟然而亦何嘗心之善歟果以利能固小人心而唯禁其術則函不衛無敵之體是亦利其敵也巫不祝非病之人是亦果利其病也豈矢匠之心而已矣既以不為利而動心則矢匠人之利亦不欲殺函人之利亦不欲死已有心矣然良其工不得不有時而利其殺與死也以弧矢所以威天下則征不義而後可殺也棺槨所以封中野降殺有禮而後死可利也嗚呼為臣而倍叛為臣而倍葬其家人之心畏其情背也故術烏可使民慎古人濟其備所以教天下之愛也故尊生送死愛道盡此而孟子之愛也細為誅矢匠之意歟聖人所以使匠人也愛盡其道何如語曰民生於三視之如一父生之師教之君食之惟其所在則致死焉孔氏之徒回聖也賜辨也商賢也子我才也曾閔孝也及諸子言志夫子皆信而從之惟由教而勵之以成也故夫子訓由而功倍始衣戎服則攝齊始衛以劍則衛以仁為蒲宰勞民以簞食壺漿孔子恐私以食饋民是明君之無惠使子貢止之其於教亦至矣由也誠宜葆死焉以俟乎致保身以全乎用何取臨於衛門非召忽之死而至衋聖人之心嘆曰自吾有由惡言不入於耳嘗圍於陳蔡胡以不如衛之於夫子耶且諸侯有相滅亡者桓公不能救則恥之夫諸侯有塹壘以遏寇有甲兵以禦侮而小白猶能為辭其恥而終為霸主以救之矧夫子纍然若喪家之狗無塹壘無甲兵脫載為宋衛所暴匡季陵劫則由也不得施其後浪死於燔臺何齊桓能救異侯之恥而由反不能終緩夫子之窮使夫子以由在則曰惡言不聞於耳今日沒豈惡言不日聞乎又奚用白羽若月赤羽若日之多為哉祭法曰捍大患則祀之素王道窮患非大乎由不終捍豈為祀乎賜曰商汝何無罪今由也而汝亦何無罪宜貶其祀以觀來者或曰揚子雲不思堯舜成康之世而自論以不遭蘇張范蔡之時豈儒者之為耶曰雄誠得素臣之事矣夫居四海之安處九層之高上鑒沖漠下瞰苑囿既其靜息則必思事云亭追軒穆者矣列多士之朝齒無用之秩才略不用名表莫聞既其靜息則必思征虜功效雍邱者矣斯皆君臣居位之高下而所思則治亂亦不同蓋位之極者思沖漠而欲無為也位之下者思功伐而欲有為也無為誠君之體有為誠臣之事如孔子曰大道之行也與三代之英某未之逮也而有志焉揚雄則自論以不遭蘇張范蔡之時噫孔子真素王揚雄真素臣哉孔子思三代之英是猶處尊位而道極事云亭追軒穆者也雄之論不遭蘇張范蔡之時是猶居散秩而才間思征虜功效雍邱者也素王誠得王體素臣誠得臣事然臣事何事也曰子貢使吳越孟軻闢楊墨皆事也今不知雄思蘇張范蔡之時者其欲自為蘇張范蔡之人耶其欲折以正道使弭兵擴文歸吾域耶苟自為蘇張范蔡之人則叛矣又何臣事哉翦腐帛而火焚者人聞之必遞相驚曰家之何處燒衣耶委餘食而棄地者人見之必遞相駭曰家之何處棄食耶燒衣易驚棄食易駭以其衣可貴而食可厚不忍焚之棄之也然而不知家有無用之人廄有無力之馬無用之人服其衣與其焚也何遠無力之馬食其粟與其棄也何異以是焚之以是棄之未嘗少有驚駭者公孫宏為漢相蓋布被是驚家之焚衣也而不能驚漢武國恃奢服晏子為齊相豚肩不掩豆是駭家之棄食也而不能駭景公之廄馬千駟農民將有事於原野其老曰遵故實以全其秋庶可望矣乃具所嗜為獸之羞祝而迎曰鼠者吾其貓乎豖者吾其虎乎其幼戚曰迎貓可也迎虎可乎豖盜於田逐之而去虎來無豖餒將若何抑又聞虎者不可與之全物恐其決之之怒也不可與之生物恐其殺之之怒也如得其豖生而且全其怒滋甚射之擭之猶畏其來况迎之耶噫吾亡無日矣或有決於鄉先生先生聽然而笑曰為鼠迎貓為豖迎虎皆為害乎食也然而貪吏奪之又迎何物焉由是知其不免乃撤所嗜不復議貓虎聖人神疲力盡以行道開禮展樂以告人欲天下不忘乎溫良忠慤敬讓之心也後之明王又增以設學校立廟祀籩豆時修衣冕屢製其天下之書則牆帙整整林軸麗麗斯可謂教道之備者也如是猶有不率其勤不由乎道者所以聖人憂其窳墮乃曰三年不為禮禮必壞三年不為樂樂必崩何訓之示之之至而訓之示之之難也鬼谷子者鬼谷先生之書也六國時所作其教人容動色理氣意之間以詭紿激訐恌固呼哩離合揣測反覆憸滑之術悉備於章旨余讀之知六國之時得術是書者惟秦儀而已亦盜祿入國之祕經然自六經已降至於漸醨之後其中有數篇者乃今之粉兒乳子亦可與秦儀齒也至如捭闔飛箝實時之常態是知漸醨之後不讀谷之書者其行事皆得自然符契也嗚呼聖人之道設禮樂詩書之多學校廟祀之盛孜孜矻矻則何易壞易崩入人之心難耶鬼谷之書三卷而已代不家有則何自然符合奧妙契人心之易耶使天下用聖人之道學溫良忠慤敬讓之心得如自然符契鬼谷之書者則吾見聖人無恨矣抑余瞑目放已陶陶入太古風是不可得也昔倉頡文字鬼為之哭不知鬼谷作是書鬼何為耶吾今不覺毛磔膽寒者是疑今之復有鬼谷新書而壞之者則吾不知其備曾邵陽人咸通中舉進士不第嘗為漢南從事伏以相公承家業峻開國勳高術妙六奇圖精八陳生民皎日聖主迅雷才成破趙之功旋告下齊之捷故得威宣破竹力號拔山弛張七德之中舒卷五車之內東周士庶咸居沸鼎之中西蜀蒸民悉在春臺之上蓋由人事豈屬天時昔漢得韓信而興楚失陳平遂滅今者江騰海沸山動嶽搖荊門告纍卵之危淮楚陳剖胎之難赤眉卷地黃巾滔天公侯無匡合之才藩鎮乏縱擒之術若不預咨賢哲早托英雄則無異魚遊宋池燕巢衛幕崑岡火發玉石俱焚歷陽水來智愚同陷雖思嘗膽何補噬臍且擘斷華山宜假巨靈之力決平洪水須憑大禹之才是以上自一人下同百辟僉云非相公不能定荊楚非相公不能綰貨泉既無異於肩堯遂有成於命説伏計即離犀浦遽赴龍山銷唐堯旰食之憂解黎庶倒懸之急某家在湖外即出關中遂假道於荊關獲起居於梅鼎仰將軍之大樹敢議營巢窺丞相之巨川唯希在藻伏惟照鑒某啓某蓽戶庸人荷衣賤子道慚墨妙業愧筆精俲枚叟之文章雖憐七歲感潘生之歲月已歎二毛失路腸回迷邦足刖蟻棲培塿蛙伏潢汙自笑柴愚誰憐參魯尚思逐鹿未分牽羊將趨渙汗之程詎學邯鄲之步但以才非逈出性乏孤標雖勤測管之窺終類正牆之視有心吐鳳無夢懷蛟不痊曹操之頭虛刺蘇秦之股誠宜世棄敢望時來方嗟碌碌之生忽忝戔戔之幸朽株委地永甘夫子之捐枯骨凝塵豈料昭王之市遍身德澤滿目恩輝寧止負嵩仍兼戴華既蒙蜀顧敢望秦留即遂面走鹿頭背馳鶉首如升青昊似入元都不知劍閣之艱豈覺刀州之遠伏惟相公神資重器天縱偉才邦國金城朝廷玉燭文高庾月詞峻謝山才見紫髯便居黃閣陶鈞百辟啓沃一人議平吳皓之時雖云推局報破秦堅之日不廢圍碁故能早執化權久司政柄今則暫辭龍闕來鎮龜城將軍之細柳雖新丞相之鹽梅仍舊不煩壯士自伏雄圖揚麾而氛祲晨銷按節而妖星夜落劉焉原野昔為纍卵之鄉杜宇山河今作覆盆之地曾實慚孤陋叨沐招延鄭驛將窮燕臺漸近那能倚馬妄竊攀龍仰天上之程途已親台席指人間之歧路尚感客星披霧非遙拜塵在即無任云云曾啓曾業謝懸頭道非刺股未能入洛安可下遼空懷逐鹿之心莫遇斬蛇之世囚拘翰墨困厄塵泥虛費宣毫枉銷蜀縹不救鋤蘭之禍詎禳伐樹之災自歎龍鍾誰知牛鐸又以山東藩鎮江表節廉悉用豎儒皆除迂吏胸襟齷齪情志荒唐入則粉黛繞身出則歌鐘盈耳但自誅求白璧安能分減黃金雖設朱門何殊亡國徒開玉帳無異荒墟遂使寧戚無扣角之歌鄒陽乏曳裾之地伏惟相公英風獨振偉量孤標推葛亮之稱心負薑維之斗膽內安宗廟外却蠻夷魚水賢良塤箎骨肉桃李滿於衢路金帛遍於風塵六合之中一人而已是以昨者不度庸陋輒有干祈方虞按劍之勃然敢望夢刀之管爾俄頒清俸遽恤白衣朝乏半千夕盈五萬豈期庸蹇忽忝遭逢不是孟嘗詎聽馮諼之鋏若非趙勝那知毛遂之錐遇既重於西河知亦深於北海感恩泣處未成泉客之珠撫已哭時空抱荊山之玉限以程途陳謝末由感激生成不任死所牒前件木夾萬里離南一朝至北開緘捧讀辭藻煥然獎飾過多欣慰何極實以昨同邊鎮才到藩籬且按此朝之舊儀未委彼國之新制不知鶴拓惟認苴咩尚呼南詔之佳名豈見大朝之美號要從微耗且是所宜伏承驃信王化風行君德雲被雕題屈膝鵙舌折腰卉服來庭毳裘入貢蓋以深明豹略精究龍韜波伏西天草偃南土者然侵軼我華夏無乃不可乎將謂我皇帝有所負於彼邦邊臣有所負於彼國慮彼直我曲獲罪於天是陳木夾申懷用貯榮報及披回示已見事根止於囚繫使人放歸彼國始乎小怨終此深讎吞噬我朗寧虔劉我交址取我越巂犯我益州若報東門乃及再四夫物居中者尊也處外者卑也是以衆星拱之北辰百谷趨之東海天地尚不能違而况於人我國家居天之心宅地之腹四方八表莫不輻輳亦由北辰之於東海也誠知土地山河歸於有德雖云有德亦須相時苟無其時安可妄動明公博識多聞豈不見仲尼乎仲尼之聖踰堯舜顏子之賢過夔龍六合茫茫無立錐之地者蓋無其時也適使孔子生於秦末乘胡亥之亂用顏回閔損為宰相子路冉有領將軍子貢宰我充行人子夏言偃典書檄雖六合鼎沸可期月而定也當此之時劉項只可都頭韓彭不過部將耳聖人雖有帝天下之德而無帝天下之時終不妄動及子路欲使門人為臣以為欺天乎及自嘆曰鳳鳥不至河不出圖吾已矣夫止於負手曳杖逍遙倚門告終而已王莽不識天時符堅不知歷數妄恃強富爭帝乾坤莽以百萬統師來襲後漢光武以五千之旅破於昆陽堅以六十萬精兵寇於東晉謝元以八千之卒敗於壽春豈不為欺天罔地所致者也國富兵強何足恃之周王仗箠於岐山漢祖脫褐於泗水我高祖起自隴州蓋明公只知其一未知其二見其形未知其兆也今與明公陳之望審參焉昔周公承公劉之德遇殷紂之暴刳剔孕婦塗炭生靈剖賢人之心斷朝涉之脛三分天下而二歸周文王率諸侯而朝之至武王觀兵孟津八百諸侯不期而會尚曰彼有人焉未可圖也退歸修德觀乎聖人去就豈容易哉及微子去比干剖箕子奴民不聊生皇天厭之國人棄之武王方援旗誓衆一舉而滅紂者蓋天奪殷而與周也我皇帝宵衣旰食肩堯踵舜父事三老兄友百僚推赤心於比干腹中懸白日於微子頭上諸侯合德百姓歡心天下有人聖如周王家有姬旦戶生呂望者乎漢祖承帝堯之德遇秦皇無道併吞六國恃宇宙一家焚燒詩書坑滅賢哲築長城於紫塞造阿房於皇州鬼母哭蛇人臣指鹿民不聊生皇天厭之國人棄之是以陳勝一呼天下響應漢祖西入五星都聚者蓋天奪秦而與漢也我皇帝方崇詩書任賢哲卑宮室恤黔黎野無歌鳳之人朝有問牛之傑天下有人英如漢祖家有韓信戶生張良者乎我高祖承元元之德遇隋煬荒淫徭役不均征斂無度竭民生之財産為巡幸之資糧虎噬㣥賢猱蒸庶母浮沈遼海疏鑿汴河今年東征明年西伐民不聊生皇天厭之國人棄之是以我高祖應天順地奄有四海者蓋天奪隋而興唐也我皇帝方淡泊聲色杜絶巡遊夢卜宰輔倚注藩屏思成垂拱惡習干戈皇天方贊國人方歡天下有人雄如唐祖家有敬德戶生元齡者乎僕雖自絳紗素耽黃石既探師律亦識兵機奉詔鎮壓三巴撫安百姓思敦禮樂恥用干戈每傷虞芮之爭田念姬周之讓路苟不獲已即須訓戎且蜀地數千里郡列五十城戶口之多士卒之衆可以揮汗成雨吐氣成雲蓋緣從前元戎皆是儒者有昧見機而作但守升平之元規雖分常憂不教民戰是以彼國得以深入無備故也僕示之以三令教之以八陳鼓聲而進鉦動而退甘與之共苦與之均義等塤箎情猶瓜葛悅禮樂而敦詩書務耕桑而聚穀帛使家藏甲胄戶貯干戈賞罰並行公私共貫既識三略便可七擒不惟喝倒不周亦可劈開太華况彼國自長慶以來搔擾益部殺人之父孤人之子掠人之妻鰥人之夫焚人之廬舍使人暴露翦人之桑麻使人寒凍蜀人怨恨痛入骨髓僕乘其衆怒之勢示其暴怨之門况抱雞搏貍不繇人教乳犬敵虎自是物情既仗宗廟之威靈兼統華夏之精鋭若乘流縱棹下坂推車豈勞心哉僕官是宰衡位當侯伯披堅執鋭雖則未曾濟河焚舟平生所貯彼國將帥之強弱邦國之盈虛坐可酌量何煩詢誘且六合之外舟車不至聖人不言彼國在聖人不言之鄉舟車不及之地縱主上英哲人臣俊乂亦猶燭龍銜耀只可照於一方春雷振聲不能過於百里天與不取談何容易夫天有五賊見之者昌彼國縱曉六韜未嫻五賊而欲泥封函谷水灌晉陽何其謬哉五賊者夏桀張羅殷湯祝網是以仁而賊不仁也殷紂剖生人周文葬枯骨是以德而賊不德也齊國厚徵薄貸魯國厚貸薄徵是以恩而賊不恩也項羽殺義帝高祖舉哀是以義而賊不義也陳後主驕奢隋文帝恭儉是以道而賊不道也能行五賊兼曉六韜方可奪人山河傾人社稷我朝未有五失彼國徒自陸梁以此推之興亡可鑒何勞遠離庭戶始識安危久習韜鈐方明勝負而妄要姑息不務通和回示荒唐一何乖戾罔念孔顏之知命翻效莽堅之覆車交址喪亡可知人事新都失律足見天時若望降尊便希抗禮但百谷不趨東海衆星不洪北辰則不可議也苟未如是則不可改圖昔管仲入周不受上卿之禮蘇武在北無虧中國之儀事有前規固難更易况小不事大春秋所誅若彼直我曲恐招天殃既彼傲我謙何患神怒見已訓齊士卒調集糗糧或玉露垂槐金風動柳建鼓數里命車指南涉巂弔民渡瀘會獵繼齊魯之夾谷紹秦趙之澠池便是行人豈遺佳策皇帝聖旨已具前緘奉聞臣下不復多談恐乖忠告謹牒
