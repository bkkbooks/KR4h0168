body:
  text: 齊州長史至得所上奇策一篇理智優長文采密麗覽而味之嘉玩無已夫天地閉賢人隱少微光處士見是以崆洞之上軒轅問於廣成汾水之陽唐帝從於齧缺是知肥遁為美齊物攸歸雅節與蘭桂俱芳高風共雲霞競遠孤門承世胄地藉餘緒平生大志豈圖富貴只為時逢板蕩代屬艱虞厭海水之㣥飛憫蒼生之塗炭便與二三人傑百萬武旅欲受降於軹道將問罪於商郊未遇元女思逢黃石詎有啓沃謀猷弻成韜鈐者也仙師學究本原術苞奇正八風五星之候玉臺金匱之書莫不洞曉於心若指諸掌今龍戰於野鶴翔寥廓或出或處且變且更濡足援手是曰仁人除暴靜亂方稱君子贊我興運今也其時師宜躡屩擔簦用虞卿之禮披榛挽輅襲婁敬之風引領瞻望拂席相待遲聽酈生之談方聞左車之説桂樹山幽歲云暮矣桃花源穴想見其人冬首薄寒比如宜也想攝養有方當無勞慮庶不遠千里早赴六軍孤已勒彼州令以禮相送冀面非遙遣此不多及銑後梁宣帝曾孫隋煬帝時以外戚擢授羅川令大業十三年嶽州校尉董景珍雷世猛等同謀叛推銑為主入嶽州築壇城南燔燎告天自稱梁王建元鳳鳴義寧二年僭稱皇帝武德元年遷都江陵高祖詔夔州總管趙郡王孝恭率兵討之銑降於孝恭高祖數其罪斬於都市年三十九我之本國昔在有隋以小事大朝貢無闕乃貪我土宇滅我宗祊我是以痛心疾首無忘雪恥今天啓公等協我心事若合符節豈非上元之意也吾當糾率士庶敬從來請績字無功絳州龍門人隋大業中應孝弟廉潔舉授揚州六合縣丞棄官還鄉里躬耕於東皋時人號為東臯子貞觀十八年卒余以大業四年獲遊京邑暮春三月暫騁娛遊新停隱士之船即赴㣥工之席賞間興洽接袂方轅西望昆池東臨灞岸帷屏竟野士女盈川寶馬香車星流雲布氣鮮風暖誠如褚爽之詞絡繹繽紛正是張衡之説不能默爾聊為賦焉同博奕之猶賢取波流之順俗終非白王未可抱之而悲近等黃花猶當嗑然而笑云爾年去年來已復春三月三日倚河漘正是地名為褉飲辰傾兩京之貴族聚三都之麗人自須祓穢非徒解紳潘尼已向天淵渚袁紹應過薄洛津舊嫌晦日年芳早情知上已風光好誰家園裏泛紅花何處堤傍無緑草翠幕臨流灞池曲朱帷曜野橫橋道橋石岸而誅茅入砂場而藉稿艷艷風光欣欣懷抱南鄰戚屬北里豪家舊來常蕩平居自奢逢上林之卷霧直章臺之吐霞塵半濕而街靜氣全收而野華蒲梢果下之龍騎繡軸朱輪之犢車錦則鳳凰銜葉綾則鴛鴦戴花粉色傾新市衣香滿處斜歷酆城而轉蓋臨渭浦而停笳坐帷撑犀角行床鋪象牙洛都故事陳留風俗障額鈎枝金義梁填粟玉盤盛果金瓶泛醁案列萬錢杯流九曲戲分㣥聚人多座促爭梟帝女之壺鬥彩曹王之局六博退而梟盡摴蒱停而馬足新投素卵始泛元醪洞簫徐引仙瑟對操喧趙琴而絃急促秦箏而柱高連歌合舞節鼓鳴鼗方響銀纒架琵琶金屑槽席闌賞洽情盤樂恣徙榻渠邊回筵水次臨石砧而爭洗倚橋欄而半醉浪動鳬移沙平鴈萃萍著浦而偏密荇連汀而漸穊樹泊漁舟莎侵釣地沉玉轄而初設貫銀鈎而欲墜網飾茱萸竿裝翡翠振鱗掉尾穿腮約鼻金門舊學玉署新賢修太元於暮齒擅中黃於早年校書藝閣之上射策蘭臺之前鳴儔北闕合集東川暫疑林竹徑真成都柳泉琴尊促賞少長同筵九班麟角之仙筆五色魚羅之綵箋杜篤題新賦張華掞雅篇問東晢而知博談子房而著元李膺猶捧手王澄偃仰眠羽林名騎期門謁者勇振行間聲高帳下鐵骸文鏃銀鞍鏤瓦新彎柘月之弧始被蘭池之馬既措杯而水緑亦鳴鞭而汗赭射堂高望修衢迥尋弓聲中絶箭道平臨暈張堋滿塵驚埒深始銅穿而石漏終鴈斷而猿吟帶周遭王鞘縫恰金大堤諸絶艷中城之少女總角當壚初筓弄杼臨鏡臺而憶昔出香街而嘯侶錦袖爭垂花鈿半舉浮絳棗而相逐槧紅蘭而延佇照影窺潭湔衫傍渚新開避忌之席更作招魂之所相呼攜手共留連著晚風光最可憐棠梨別館祗斜日鳷鵲重樓含暮煙樹下遺香粉砂頭送紙錢尋春須得遍但任莫言旋紫騮停策青牛駐幰看射雉於平臯送乘羊於御坂帳望原隰徘徊林畹詎念城遙寧知伴遠聞烏啼而訝夕憶蠶飢而慮晚別有公子盛光儀羽蓋相將連騎馳出入芙蓉苑經過連勺陂爭傳塞下梅花在強報閨中桑葉萎聞雞宣曲路泛鷁昆明池浪影文青雀泥光濺緑羆若非五陵遊俠少定是三秦輕薄兒玉笛吹楊柳金冠飾夋鳥鸃念此日之嬉戲亦無窮之賞託但是津傍悉泛舟若箇山頭不投幕俎席交時煙霞綺錯何縣何州無林無壑俗非溱洧風成鄴洛年年歲歲傾城傾郭祗為春光動性靈剩使娛遊不暫停南渡橋邊無數醉東流水上幾人醒隱士船中藥秦王劒裏銘若嫌鄭國桃花浦為向山陰蘭葉亭吾周人也本家於祁永嘉之際扈從江左地實儒素人多高烈穆公感建元之恥歸於洛陽同州悲永安之事退居河曲始則晉陽之開國終乃安康之受田墳隴寓居焉五葉桑榆成蔭俄將百年績南山故情老而彌篤東陂餘業悠哉自寧酒甕多於步兵黍田廣於彭澤皇甫謐之心事隴畝終焉仲長統之規模園林幸足獨居南渚時遊北山聊度日以為娛忽經年而忘返西窮馬谷北達牛溪邱壑依然風煙滿目孫登默坐對嵇阮而無言王霸幽居與妻孥而共去窗臨水石砌繞松篁類田園之去來亦已久矣望山林之故道何其悠哉詩者志之所之賦者詩之流也式抽短思即為賦云天道悠悠人生若浮古來賢聖皆成去留八眉四乳龍顏鳳頭殷憂一世零落千秋暫時南面相將北遊玉殿金輿之大業郊天祀地之洪休榮深責重樂不供愁何況數十年之將相五百里之公侯兢兢業業長思長憂昔怪燕昭與漢武今識圖仙之有由人誰不願直是難求聞鼎湖而欲信怪橋山之遽修玉臺金闕大海水之中流瑤林碧樹崑崙山之上頭不得輕飛如石燕終是徒勞乘土牛已矣哉世事自此而可見又何為乎惘惘棄卜筮而不占余將縱心而長往任物孤遊遺情直上覺老釋之言繁恨文宣之技癢彼事業之遷斥豈明神之宰掌物無往而咸章一作物無待而成章生有資而必養嗟大道之泯沒見人情之委枉禮費日於千儀易勞心於萬象審機事之不息知澆源之寖長鳥何事而攖羅魚何為而在網生物詭隔精靈惚恍莊周三月而不朝瞿曇六年而遐想有是夫況吾之不如先達乎請息交而自逸聊習靜而為娛遂披林樾進陟佹區連峯雜起復嶂環紆歷丹危而尋絶徑攀翠險而覓修塗聳飛情於霞道振逸想於煙衢重林合沓以齊列崩崖磊砢而相扶覩森沉於絶澗視晃朗於高嵎自謂搏風飇而出埃瓂邈若朝元宮而謁紫都碧巒之下清溪之曲望隱隱而才通聽微微而不屬眷然引領茲焉頓足步擁石而邅回視橫煙而斷續古藤曳紫寒苔布緑洞裏窺書巖邊對局髣佛靈蹤依稀仙躅竈何代而銷金杯何年而溜玉石室幽藹沙場照燭松落落而風回桂蒼蒼而露溽月未側而先陰霞方升而已旭喜方外之浩蕩歎人間之窘束況乃幽谷藏真傍無四鄰紫房半掩元壇尚新逢閬風之逸客值蓬萊之故人忽據梧而策杖亦披裘而負薪荷衣薜帶藜杖葛巾出芝田而計畝入桃源而問津昆山若礪渤澥揚塵栽碧奈而何日種瓊而幾春自然詭異非徒隱淪乃有上元仙骨太清神手走電奔雷耘空蒔朽河間之業不齊貫淮南之術無虛受咒動南箕符回北斗偓佺贈藥麻姑送酒青龍就食於甲辰元牛自拘於乙丑永懷世事天長地久顧瞻流俗紅顏白首儻千歲之可營亦何為而自輕昔時君子曾聞上征忽逢真客試問仙經談九華之易就敘三英之可成拭丹爐而調石髓裛翠釜而出金精珠流玉結雪耀霜明咸謂刀圭暫進足使雲車下迎紛吾人之狹見攪㣥疑而自拂使投足而咸安亦何為乎此物彼赤城與元圃豈憑虛而搆窟但水月之非真譬聲色之無佛過矣劉向吁嗟葛洪指期繫影依方捕風誰能離世何處逃空假使遊八洞之金室坐三清之玉宮長懷企羡豈出樊籠徒勞海上何事雲中昔日蔣元詡之三徑陶淵明之五柳君平坐卜於市門子真躬耕於谷口或託閭閈或濳山藪咸遂性而同樂豈違方而別守余亦無求斯焉獨遊屬天下之無事遇山中之可留聊將度日忽已經秋菊花兩岸松聲一邱不能役心而守道故將委運而乘流伊林澗之虛受固樵隱之俱託逢故客於中溪遇還童於絶壑雲峯龜甲而重聚霞壁龍鱗而結絡水出浦而潺潺霧含川而漠漠是欣是賞爰遊爰豫結蘿幌而迎宵敞茅軒而待曙爾其雜樹相糾長條交茹葉動猿來花驚鳥去起公子之殊賞談王孫之遠慮山水幽尋風雲路深蘭窗左闢菌閣斜臨石當階而虎踞泉度牖而龍吟月照南浦煙生北林閲邱壑之新趣縱江湖之舊心道集吾室風吹我襟松花柏葉之醇酎鳳翮龍脣之素琴白牛溪裏峯巒四峙信茲山之奧域昔吾兄之所止許由避地張超成市察俗刪詩依經正史康成負笈而相繼根矩摳衣而未已組帶青襟鏘鏘擬擬階庭禮樂生徒梓山似尼邱泉疑洙泗吾兄通字仲淹生於隋末守道不仕大業中隱於此溪續孔子六經近百餘卷門人弟子相趨成市故溪今號王孔子之溪也忽焉四散於今二紀地猶如昨人多已矣念昔日之良遊憶當時之君子佩蘭蔭竹誅茅席芷樹即環林門成闕里姚仲由之正色薛莊周之言理此溪之集門人常以百數唯河南董恆南陽程元中山賈瓊河南薛收太山姚義太原溫彥博京兆杜淹等十餘人稱為俊穎而姚義多慷慨同儕方之仲由薛收以理達稱方莊周薛實妙言理也觸石橫肱逢流洗耳取樂經籍忘懷憂喜時挾策而驅羊或投竿而釣鯉何圖一旦邈成千紀木壞山頽舟移谷徙北岡之上東巖之前講堂猶在碑石宛然想問道於中室憶橫經於下筵壇場草樹院宇風煙昔文中之僻處諒遭時之喪亂局逸步而須時蓄奇聲而待旦旅人小吉明夷大難建功則鳴鳳不聞修書則獲麟為斷惜矣吾兄遭時不平歿身之後天下文明坐門人於廊廟瘞夫子於佳城死而可作何時復生式瞻虛館載步前楹眷眷長想悠悠我情俎豆衣冠之舊地金石絲竹之餘聲沒而不朽知何所營吾兄仲淹以大業十三年卒於鄉館時年三十三門人諡為文中子及皇家受命門人多至公輔而文中之道不行於時余因遊此溪周覽故迹蓋傷高賢之不遇也臨故墟而掩抑指歸途而歎惜往往溪橫時時路塞忽登崇岫依然舊識地迥心遙山高視直望煙火於桑梓辨溝塍於鄉國斜臨姑射之西正是汾河之北悵矣懷抱悠哉川域憶昔過庭童顏稚齡何賞不極何遊不經弄春風於澗戶詠秋月於山扃北窗照雪南軒聚螢綵衣扇枕緇布問經何斯樂之易失銜哀而茹恤天未悔禍遭家不秩子敬先亡公明早卒余自此而浩蕩又逢時之不仁天地遂閉雲雷漸屯與沮溺而同趣共夷齊而隱身幸收元吉坐偶昌辰容北海之嘉遁許南山之不臣養拙辭官含和保真豈若馮敬通之誹世趙元淑之尤人殷憂恥賤憔悴傷貧操井臼而無樂歷山河而苦辛豈如我家生事都盧棄置不念當歸寧圖遠志坐青山而非隱遊碧潭而已喜舊知山裏絶塵埃登高日暮心悠哉子平一去何時返仲叔長遊遂不來幽蘭獨夜之琴曲桂樹淩晨之酒杯邱園散誕窟室徘徊坐等枯木心如死灰亦有山羞野饌蘭漿木麨葉煎羹松根溜醥既採藥而為食諒隨情而不矯負鍤春前腰鐮歲杪草漸密而饒獸樹彌深而足鳥地寂寞而森沉路縱橫而窈窕野亭鶴唳山梁雉鷕遠遊之所幽棲之次或抱犢而新來乍聞雞而始至藋畦一兩茅齋數四山為險而無人嶺時平而有地石菌抽葉金芝吐穗鏡厭山精刀驅木魅泉繞砌而魚躍樹橫窗而鳥萃天網何寬人生豈難飲河知足巢林必安亦何榮於拾紫亦何羡於還丹紅藜促節之杖緑籜斑文之冠野餐二簋園蔬一盤送阮籍而長嘯得劉伶而甚歡曉入柴戶暮歸藥欄老萊地僻鄒生谷寒楊柳則條垂鍛沼杏樹則花飛坐壇賦成鼓吹詩如彈丸攜始睟之鳴鶴對新婚之伯鸞我有懷抱蕭然自保古人則難與同歸紛吾則此焉將老澗溪沼沚之蘋艾邱陵阪隰之桑棗接果移棠栽苗散稻不藏無用之器不愛非常之寶抵玉驚禽揮金剃草接朋友於杯桉弄兒童於襁褓樂山澤之浮遊笑江潭之枯稿戒非佞佛齋非媚道無譽無功形骸自空坐成老圃居然下農身與世而相棄賞隨山而不窮披衣竈北逐食墻東儻有白頭四皓龎眉八公小童乘日仙人馭風鄉老則杖頭安鳥邦君則車邊畫熊心期暗合道術濳同解來相訪愚公谷中龍星掌歲鳳律移灰弱條垂柳殘花落梅鶯候暖而初囀燕排寒而始來驚玉戶之全掩喜珠簾之半開出入金龍殿瞻視銅雀臺何茲會之微薄識自然之寒暑恆連栖兮並處繞翠檻而對語還將擇木之意自覓安巢之所昔年居屋桂棟蘭芬今來舊地谷變陵分若非歷陽隨水沒定是吳宮遭火焚逢海上之新伴憶秋前之故㣥頡頏鶱翥差池羽翼漢黨胡朋丹頭素臆並忘情而馴擾俱順時而動息止隩延貺依廬表德避戊巳而銜泥接雲霞而求食壁深巢暗簷高路直匪陋蓬宇誰矜杏梁網羅是避鷹是防彼宗類之繁衍實軒庭之末光若乃漢家溫室秦帝阿房紫樓青觀金閨玉房何歲不集何年不翔縈趙女之歌肆狎燕姬之舞行聲喧葉序影亂花牀故能翦爪蒙識風詩入喻傳石璽而無疑宿瑤筐而不懼位列司分之職名擅高禖之賦亂曰昔窺前殿花飛絮回今過上苑鴈度鴻來光陰遞代搖落悲哉眼看巢戶還應北開久承所撰隋紀繕寫咸畢前舍弟及家人往並有書借咸不見付豈連城之珍俟楚文而乃進崩山之操待鍾期而後發應以左貂右蟬榮冠東省掌壺負璽望重南宮朝夕丹墀揖讓增價往來青瑣步頓生光豐屋華榱顧蓬蒿而徙眷鳴鐘列鼎想藜藿而移交不與驕期遂忘昔時之好耳僕遭逢明聖棲遲邱壑幸悅堯舜之風得全箕潁之操雖心期所託吾道遙存而出處離異儀刑難接所以願憑鱗羽宛若承顏望觀述作欣然得意足下裁成國典褒貶人倫欲使明鏡一時覆車千祀故當貽諸好事豈擬唯傳子孫方復固其緘縢嚴其扃鐍天下之望豈如是乎僕亡兄芮城嘗典著局大業之末欲撰隋書俄逢喪亂未及終畢僕竊不自揆思卒餘功收撮漂零尚存數帙兆自開皇之始乞於大業之初咸亡兄點竄之遺迹也大業之後言事闕然僕雖欲繼成無可憑採以此尤思見足下之所作也還使請致無再三王績白月日博士陳龕至奉處分借家禮并帙封送至請領也又承欲相招講禮聞命驚笑不能已已豈明公前眷或徒與下走相知不熟也下走意疏體放性有由然兼棄俗遺名為日已久淵明對酒非復禮義能拘叔夜攜琴唯以煙霞自適登山臨水邈矣忘歸談虛語元忽焉終夜僻居南渚時來北山兄弟以俗外相期鄉閭以狂生見待歌去來之作不覺情親詠招隱之詩唯憂句盡帷天席地友月交風新年則柏葉為樽仲秋則菊花盈把羅舍宅內自有幽蘭數叢孫綽庭前空對長松一樹高吟朗嘯挈榼攜壺直與同志者為㣥不知老之將至欲令復整理簪屨修束精神揖讓邦君之門低昂刺史之坐遠談糟粕近棄醇醪必不能矣亦將恐芻狗貽夢櫟社見嘲去矣君侯無落吾事月日佐史楊方至奉報書兼枉別帖垂問家禮喪服新義五道度情振理探幽洞微誠非野人所敢酬析但先人遺旨頗曾恭習雖困於荒晏猶憶於異聞謹因還使條申如左夫三年之喪情理之極有正有義因事之作也正服縗三升而已至於義服加其半焉豈非義有離合之理情無遷奪之法然親尊罔極冠受可均切至或殊縗加其半微以見志有何怪焉至如父為長子獨施斬服蓋以所承者重情寄特深非唯親親且尊尊也至於庶子已不承尊雖有長子無預祖禰不為服斬義亦可知但古之君臣有國有家相承繼體血祀長存大宗小宗較然有別繼祖繼禰由茲可推故曰天子不絶國諸侯不絶家貴人之宗也故別子為祖父繼之為大宗百代不遷之宗也已父為禰兄繼之為小宗此四代則遷之宗承百代之重且得不為其長子斬乎為四宗之祖亦且得不為其長子斬乎唯繼禰之弟無預祖禰庶子之義施此而已自秦漢以來家國道廢雖有其禮將安所行逮乎晉末中原大亂骨肉至親尚不相保祖禰之序知何以明故僕先君獻公因事起義欲使無逆於古且令可行於今以為今之封爵頗存古號雖無其實而尚有其名故以始受封者猶古之諸侯諸侯之庶子即古之別子也別子之庶子即古之小宗也雖國破家亡朝遷市變譜牒存録宗次可推咸可一依古禮行之私室至如沉沉耕者悠悠黔首族姓猶不能自辨何暇及於宗庶之事乎此古之先王所以不下禮於庶人也有何不可而乃疑乎至若夫妻之道誠為義合而家道之睦斯為首焉故傳曰妻至親也一體之名均於天性故妻之於夫也其服曰斬蓋移於父母之重焉夫之於妻也期而有杖則踰於兄弟之功焉前賢往達曾無異議故曰妻者齊也一齊而不易如至失禮而出違妻之道終喪而嫁棄婦之義也違道棄義又何述焉苟全道義則天親也天親之服有何異乎列之正服斯為當矣此先君獻公探記傳之旨明後來之失敦人倫之源睦伉儷之道也夫何病哉明公又云君臣夫妻俱以義合而妻為正服臣為義服則君臣之際不如夫婦之情乎斯不然矣何者夫禮有以情作者父子夫婦之類是也有以義作者君臣夫妾之類是也情義之極俱終於斬此其無升降明矣但禮之為用緣情以至理因內以及外情者人之深心愚智之所共也孰有愚者而忘其妻子乎理者人之大節凡聖之所異也孰有凡生而忘其臣妾焉故情者正也此妻子所以荷深心而執夫父以正服也理者義也此臣妾所以存大節而申君主以義服也故夫正義之作殊情而共禮也孰謂君臣之義而謝夫婦之情乎孰謂夫婦之情而厚君臣之義乎古之君子常度情以處斷義而行矣義可奪情衛石碏不能存其子情不害義宮之奇得以其族行故曰情義殊也情義均也故情義之服有正焉有義焉正義之禮無厚焉無薄焉此妻為正服所以無害於君臣臣為義服所以不傷於夫婦有倫有要夫何稽疑至如三殤之服禮有明文鄭與王杜各申本見由茲紛雜後莫能定然詳諸記義王杜為長某昔在隋末又嘗見諸賢講論此矣近者家兄御史亦編諸賢之論繼諸對問今録此篇附往幸詳之也至如衆子服期其妻小功兄弟之子猶子也其服亦期先儒以為其妻亦小功惟王肅以為喪服之例旁尊皆執明公以為重於子妻之服失禮之差此則袁準之義也夫禮雖緣情亦為義屈故有從無服而有服者亦何嫌乎兄弟之子婦越已子之妻乎故曰兄弟之子猶子也蓋引而致之故不嫌於與已子同服矣旁尊不敢以厭降蓋避正尊而自執也故不嫌於越已子之妻矣輕陳末學豈能詳究又於楊方奉口處分借王儉禮論門庭所蓄先無此書往於處士程融處曾見此本觀其制作動多自我周孔規模十不存一恐不足以塵大雅君子之視聽也尋問儻獲當遣祗送王君白乖別甫爾已十餘年誦采葛之詩增其慨咏夫人生一世忽同過隙合散消息周流不居偶逢其適便可卒歲陶生云富貴非吾願帝鄉不可期又云盛夏五月跂腳北窗下有涼風暫至自謂是羲皇上人嗟乎適意為樂雅會吾心吾河渚間有先人故田十五六頃河水四繞東西趨岸各數百步古人云河濟之濱宜黍況中州之腴乎家兄鑒裁通照知吾縱恣散誕不間拜揖粳粃禮義錙銖功名亦以俗外相待不拘以家務至於鄉族慶弔閨門婚冠寂然不預者已五六歲矣親黨之際皆以山麋野鹿相畜性嗜琴酒得盡所懷幸甚幸甚近復都盧棄家獨坐河渚結構茅屋并廚廄總十餘間奴婢數人足以應役用天之道分地之利耕耘穮蔉黍秫而已春秋歲時以酒相續兼多養鳧鴈廣牧雞豚黃精白术枸薯蕷朝夕採掇以供服餌牀頭素書數帙莊老及易而已過此以往罕嘗或披忽憶弟兄則渡河歸家維舟岸側興盡便返每遇天地晴朗則於舟中詠大謝亂流趨孤嶼之詩渺然盡陂澤山林之思覺瀛洲方丈森然在目前或時與舟人漁子分潭並釣俯仰極樂戴星而歸歌詠以會意為巧不必與夫悠悠之間人相唱和也孤住河渚傍無四鄰聞雞犬望煙火便知息身之有地矣近復有人見贈五加地黃酒方及種薯蕷枸等法用之有效力省功倍不能暇修渾沌並常行之裴孔明雖是異名教物然風月之際往往有高人體氣兼特受巧性思若有神自作素琴一張云其材是嶧陽孤桐也近攜以相過安軫立柱龍脣鳳翮實與常琴不同發音吐韻非常和朗吾家三兄生於隋末傷世攖亂有道無位作汾亭操蓋孔子龜山之流也吾嘗親受其調頗為曲盡近得裴生琴更習其操洋洋乎覺聲器相得今便留之恨不得使足下為鍾期良用耿耿吾所居南渚有仲長先生結菴獨處三十載非其力不食傍無侍者雖患瘖疾不得交語風神肅肅無俗氣攜酒對飲尚有典刑先生又著獨遊頌及河渚先生傳開物寄道懸解之作也時取玩讀便復江湖相忘吾往見薛收白牛溪賦韻趣高奇詞義曠遠嵳峩蕭瑟真不可言壯哉邈乎揚班之儔也高人姚義嘗語吾曰薛生此文不可多得登太行俯滄海高深極矣吾近作河渚獨居賦為仲長先生所見以為可與白牛連類今亦寫一本以相示可與清溪諸賢共詳之也亂極則治王途漸亨天災不行年穀豐熟賢人充其朝農夫滿於野吾徒江海之士擊壤鼓腹輸太平之稅耳帝何力於我哉又知房李諸賢肆力廊廟吾家魏學士亦申其才公卿勤勤有志於禮樂元首明哲股肱惟良何慶如之也夫思能獨放湖海之士才堪濟世王者所須所恨姚義不存薛生已歿使雲羅天網有所不該以為嘆恨耳吾比風痺發動常劣劣不能佳然煙霞山水性之所適琴歌酒賦不絶於時時遊人間出入郊郭暮春三月登於北山松柏㣥吟藤蘿翳景意甚樂之箕踞散髮與鳥獸同㣥醒不亂行醉不干物賞洽興窮還歸河渚蓬室甕牖彈琴誦書優哉遊哉聊以卒歲首夏漸熱足下何如也願動息多宜黃頰之聚何時暫忘偶因南風略示所懷敬願珍厚不一一王君白徐道士至獲書詞義懇切具受之也吾嘗讀書觀覽數千年事久矣有以見天下之通趨識人情之大方語默紛雜是非淆亂夸者死權烈士殉名貪夫溺財品庶每生各是其所同非其所異焉可勝校哉故吾師曰莫若俱任而兩忘仲尼所以無可否於人間莊周所以齊大小於自適是謂神而化之使人宜之百姓日用而不知也夫君子所思不出其位道有不同不相為謀蓋為此也足下欲使吾適人之適而吾欲自適其適非敢非足下之義也且欲明吾之心一為足下陳之昔孔子曰無可無不可而欲居九夷老子曰同謂之元而乘關西出釋迦曰色即是空而建立諸法此皆聖人通方之元致宏濟之祕藏實寄沖鑒君子相期於事外豈可以言行詰之哉故仲尼曰善人之道不踐迹老子曰夫無為者無不為也釋迦曰三災彌綸行業湛然夫一氣常凝事吹成萬萬殊雖異道通為一故各寧其分則何異而不通苟違其適則何為而不閡故夫聖人者非他也順適無閡之名即分皆通之謂即分皆通故能立不易方順適無閡故能遊不擇地其有越分而求皆通違適而求無閡雖有神萬將獨奈何故曰鳬脛雖短續之則悲鶴脛雖長截之則憂言分之不可越也夢為鳥唳於天夢為魚沒於泉言適之不可違也吾受性潦倒不經世務屏居獨處則蕭然自得接對賓客則恭然思寢加性又嗜酒形骸所資河中黍田足供歲釀閉門獨飲不必須偶每一甚醉便覺神明安和血脈通利既無忤於物而有樂於身故常縱心以自適也而同方者不過一二人時相往來並棄禮數箕踞散髮元談虛論兀然同醉悠然便歸都不知聚散之所由也昔者吾家三兄命世特起先宅一德續明六經吾嘗好其遺文以為匡扶之要略盡矣然嶧陽之桐以俟伯牙烏號之弓必資由基苟非其人道不虛行吾自揆審矣必不能自致台輔恭宣大道夫不涉江漢何用方舟不思雲霄何用羽翮故頃以來都復散棄雖周孔制述未嘗復窺何況百家悠悠哉去矣程生非吾徒也若足下者可謂身處江海之上心遊魏闕之下雖欲行志不覺坐馳若以此見輕議大道將恐北轅適越所背彌遠矣吾頃者加有風疾劣劣不能佳但欲乘化獨往任所遇耳不能復使離婁役目契后勞精木心蔽焉以物為事也勗哉夫子勉建良圖因山僧還略此達意也王君白
