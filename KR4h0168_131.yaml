front:
  text: 全唐文欽定全唐文卷一百三十一密字元邃一字法主其先遼東襄平人父寬隋上柱國封蒲山郡公遂家長安大業九年楊元感舉兵黎陽以密為謀主元感敗以策干東郡賊翟讓讓令別統所部號蒲山公十三年二月推密為主建號魏公改元永平越王侗稱帝遣使授密太尉尚書令東南道大行臺行軍元帥魏國公武德元年為王世充所敗歸唐拜光祿卿封邢國公以賞薄怨望高祖使領本兵經略東都行至桃林復徵之大懼謀叛熊州副將盛彥師斬之
  hash: sha256:525551a53e26962af2b4414d814abcc0a554863eba592dc3917ff677e07c7974
