front:
  text: 全唐文欽定全唐文卷三十三元宗十四
  hash: sha256:7ea7d64393c1148d77f726e7d768740a0b6bde0c5daf4eaf30a3024c97dc3b6b
body:
  text: 百辟叶心交修皇極所以天降休命寶祚維新今郊廟精禋大禮克舉萬方無事九有忻心屬獻歲芳春上元望日既當行慶之序式廣在鎬之恩自今後非惟旬休及節假百官等曹務無事之後任追遊宴樂三王繼統質文既不相襲五德承時服色遵於所尚至於旗常改制騂翰異宜所以表軍國之容合聲名之度事之大者安可因循而巳焉國家膺樞紐之期纂黃中之歷憲章垂範運既屬於維新旗幟同色義必在於革故頃者俯納㣥議式明統緒故得天人致和風雨時若豈朕躬菲德克廣睿圖實累聖鴻休允膺景運稽古之大既有昭明文物所資理宜詳正其諸衞應隊仗所用緋色幡等並改為赤黃色庶克遵於通變諒有叶於從宜其諸節度使并管內軍使等亦宜準此朕齋心大同緬覿真蹟豈精誠遠感而休應薦臻今九華之鐘三清徹響聲聞金石氣含虛無是知紫宸之宮雲軿降集青童之府烟景來遊將合律於雲璈表同和於陰則靈仙坐接福壽昭然永惟嘉祥良深慶慰所請依朕躬承丕業稟訓元宗霜露永懷感思罔極伏以三清設教五聖在天克奉先靈同心薦福今玉版瓊章傳之洞府雲囊縹帙列在仙宗庶以展永慕之心兼以播淳風之化編於冊實用愧焉枳橘之性惟任土不遷陰陽之和實在感能致且寒谷吹律猶氣變燕郊則中樞化源故物備京邑今黃柑數株丹實盈條裛露迎風香逾江劒金光珠澤秀溢林庭豈斯果之足珍喜元和之必應故合天道信何遠焉所賀巳知仍依來請禮神以玉者蓋取其精潔表心溫潤合德為器有象正辭乃信以達馨香其在珪璧頃來禮神六器及宗廟奠玉自馮紹正奏後有司並用珉禮所謂君子貴玉而賤珉不可用也朕精禋郊壇嚴敬宗廟奉惟新之祚庇太平之人則人力普存備物以享安可以珉代玉惜費事神況國家之祈福有萬方之助祭闕典必修無文咸秩豈於天地宗廟奠玉有虧自今巳後乾坤六器宗廟奠玉並用真玉諸祀用珉如以玉難得大者寧小其制度以取其真經邦論道允屬於賢才保大定功聿求於長策不有兼領孰張寵賢開府儀同三司行尚書左僕射兼右相崇元館大學士集賢院學士太清太微宮使修國史上柱國晉國公林甫器惟國楨材乃人範文標楷式學究精微沃啟之誠罄嘉猷於造膝清貞之節盡公心於匪躬自登於三事式是百辟具瞻惟允茂緒居多任總廟堂既賛雍熙之化智高帷幄更資決勝之謀宜因公輔之重兼受元戎之寄可兼安北副大都督持節朔方節度關內支度營田鹽池押諸蕃部落副大使知節度事六城水運節度管內軍郡採訪處置等使餘並如故政理之源實惟選士銓綜之道必在至公比來文武選人調集者及於留放末日引通甄鑒匪周或紀綱不一以資取舍詎免流言須議事以制法亦因時而革弊自今巳後吏部選人宜審定格限頒示令集銓之日各量官資書判狀迹功優據闕合留對衆便定豈惟免淹時日抑亦共表公平見收者既無溢升被放者亦當歛分則自近及遠以絕倖求其有宏詞博學或書判特優超越流輩者不過限以選數聽集其武部選人試日較等功優亦對衆便從留放仍永為常式並作條件處分周有均土之宜漢存墾田之法將欲明其經界定其等威食祿之家無廣擅於山澤貿遷之伍罕爭利於農收則歲有豐穰人無胥怨永言致理何莫繇茲如聞王公百官及富豪之家比置莊田恣行吞併莫懼章程借荒者皆有熟田因之侵奪置牧者惟指山谷不限多少爰及口分永業違法賣買或改籍書或云典貼致令百姓無處安置乃別停客戶使其佃食既奪居人之業實生浮惰之端遠近皆然因循亦久不有釐革為弊慮深其王公百官勳蔭等家應置莊田不得踰於式令仍更從寬典務使宏通其有同籍周朞以上親俱有勳蔭者每人占地頃畝任其累計某蔭外有餘如舊是無勳蔭地合賣者先用錢買得不可官收限勅到百日內容其轉賣其先不合蔭又蔭外請射兼借荒及無馬置牧地之內并從合蔭者並不在占限官還主其口分永業地先合買賣若有主來理者其地雖經除附不限載月近遠宜並却還至於價值準格並不合酬備既緣先巳用錢審勘責其有契驗可憑特宜官為出錢還其買人其地若無主論理不須收奪庶使人皆摭實地悉無遺百姓知復於田疇蔭家不失其價值此而或隱罪必無容又兩京去城五百里內不合置牧地地內熟田仍不得過五頃巳上十頃巳下其有餘者仰官收應緣括共給授田地等並委郡縣長官及本判官錄事相知勾當並特給復業並無籍貫浮逃人仍據丁口量地好惡均平給授便與編附仍放當載租庸如給未盡明立簿帳且官收租佃不得輒給官人親識工商富豪兼併之家如有妄請受者先決一頓然後準法科罪不在官當蔭贖有能糾告者地入糾人各令採訪使按覆具狀聞奏使司不糾察與郡縣官同罪自今巳後更不得違法買賣口分永業田及諸射兼借公私荒廢地無馬妄請牧田併潛停客戶有官者私營農如輒有違犯無官者決杖四十有官者錄奏取處分又郡縣官人多有任所寄莊言念貧弱慮有侵損先巳定者不可改移自今巳後一切禁斷今所括地授田務欲優矜百姓不得妨奪致有勞損客戶人無使驚擾緣酬地價值出官錢支科之閒必資總統仍令兩京出納使楊國忠充使都勾當條件處置凡在士庶宜悉朕心人臣無將有必誅之義王制所禁在難捨之刑銀青光祿大夫御史大夫兼京兆尹殿中監閑廄使隴右㣥牧監使及天下戶口色役和市和糴坊作園苑長春宮栽接并京畿及關內採訪等使鉷性本兇愎行惟艱險徒以早膺擢用累踐崇班持憲尹京委重斯大八閑六尚寵寄惟深殊不知外飾公忠干冒非據內懷奸詐包藏不測任海川狂愚不逞妖惑無良而乃潛與通情仍希非望及覺彰露便令滅口韋會聞此事跡話於私庭遽令追掩殞於縣獄邢縡久懷逆謀專搆惡黨其弟銲始終結約常與交通託云弟職其由巳令神明所殛兇黨伏辜縱刑且踈欲逃其罰然天地雖廣何所容身宜賜自盡戶部郎中王銲蓄積梟獍之心包藏狂悖之計與逆人邢縡久託深交供其資糧同為兇惡自申款暱十載於茲所有逆謀咸供謀畫此而不罰其若法何猶寬殊死之典俾從杖刑之責宜於朝堂集衆杖殺王者制軍詰禁師旅惟貞飲至勞旋賞罰必信易曰在師中吉承天寵也傳曰賞不失勞俾人勸也若黷前典何以化成諸軍節度使等委任尤重雖奉謀受律去則捷歸而甄賞敘勳率多非實且為君者以信御下為臣者以忠奉上信不可失忠不可虧朕保而行之庶能激勵且往前立功皆令覆至於敘錄亦委別人朕以將者國之腹心朝之方嶽舍此不任誰則竭誠所以每一立功咸委錄敘推心之道斯亦極矣近來諸軍滋弊尤甚乃至奏蕃中事意爰及破敵錄功觸類憑虛皆非摭實或久在行陣反被棄遺或不踐軍戎虛霑爵賞銀章紫綬無汗馬之勞厚錄崇班皆親援而致使戰士失望僥倖競馳靜言其繇實在於此且古者士農異處軍國殊容所以國學上庠以教冑子撰車表貉用訓戎師豈有家襲弓裘身參卒伍斯乃假名取進其理昭然皆因主將有私遂乃公行囑託巳往之過朕亦不言將來自新必期革弊自今巳後朝要並監軍中使子弟一切不得將行先在軍者亦即勒還破敵敘功事歸案實且虛妄事君靦冒行惠不懼於法不畏於神凡在庶僚亦宜自戒宣示中外令知此懷詢諸贈典繫乃彞章啟有厥由於何不舉淮浙宣歙管內道門威儀逍遙大師問政先生為國焚修大德賜紫聶師道早通元理夙契真風野鶴不㣥孤雲自在昔太祖創基之際巳命焚修及元勳匡國之初早曾瞻敬眷言道行實冠元關雖昇遐屢歷於光陰而遺懿益隆於寰宇況教門一請台輔奏陳且將啟元墟即迴故里是用加之峻秩錫以崇階式表休恩庶昭往行可贈銀青光祿大夫鴻臚卿問政先生河東及河淮閒諸郡去載微有澇損至於乏絕巳令給糧如聞郡縣尚未賙恤方春在農事將興或慮百姓艱難未能存濟宜每道各令御史一人即往宣撫應有不支持者與所繇計會隨事賑給如當郡無食及不充聽取比郡者分付務令勝致以副朕懷為臣之道貳則有辟事君之致將而必誅故左僕射兼右相吏部尚書上柱國晉國公贈太尉廣陵大都督李林甫爰因宗室獎以班序逮履清貫尤持矯飾鄙誠患失狡迹多端朕待以勿疑任當殊重恩私踰分崇高至極乘據樞衡二十餘載豈知外表廉慎內懷兇險籌謀不軌覬覦非望昵比庸細譖害忠良悖德反經師心蘊慝禍福生於喜怒榮辱由其愛憎使縉紳箝口行路側目淫祀夜禱於神祇厭勝家崇於蠱道尊空養素實繁有徒既畢禬禳旋勦其命阿布思振降塞上委於綏緝敢行交結輸竭深衷嚴室焚香要之誓信指期撤警縱以叛離且肆犬羊之㣥侵軼我疆埸方申犄角之契圖危我宗社可隱之狀所不忍言以親黨薦引咸歸闕子息蕃多曾無教誨貪叨納賄依倚成奸䦧牆屢聞敗官相次作偽滋久晚節頗彰含垢在予猶示宏蔽鬼得誅而溢盡惡布露而難容逮從訊鞫事皆昭著殲夷噍類曷足懲愆鞭斵屍棺未云責塞但以常經任使特寬恒典其在身所有官秩並追除削俾同凡庶許其殯掩男前將作監岫率由下劣不承闕勗驕恣越度過失彌深且配流嶺南及黔中延德郡前司儲郎中㟧配流蒼梧郡前太常少卿嶼配流臨封郡仍並除名即綱馳驛領送自餘男有官者令所司即勘會亦除名各配流嶺南及黔中送惡郡女在室并男未有官者取其情願任隨兄弟朕念其驅策尚懷仁恕既貸生成之恩赦其殞嗣之罰仍每房各乞奴婢三兩人并與緣身衣服糧食使其存濟自餘資產一切官收男孫有官者解却無官者勒隨父并家口並續遞途流所至捉搦勿許東西縱會恩赦不在量移之限其林甫男女妻等有罪非妄惟其子婿諫議大夫楊齊瑄覩其不善尋有薄闕跡異同惡頗申誠款并自餘至親應合累者續有處分噫堯謂達聰四凶在列周稱盛德三監俶擾知人之美誠愧前言明罰斯加非無累歎凡任咸自誡焉循名責實所以激㣥吏也懲惡勸善所以務至公也苟黜陟之非當何考課之足徵其內外文武官員外同正員并判試不釐務者既無別效兼有多年比來因循或與進考據額既標節限緣此遂多踰越致令課最者見棄無功者獲升獎勸之門殊非允當自今巳後並不在進考之例其內外官初效亦不在與限臺省官考各委長官比類才能功課襃升不得一例申送俾僥競息心功能勵節國之載籍政之本源故藏於蓬山緘以芸閣者以為義府之代謩三五以還皆率茲道也故每加求購冀補逸遺四部名目悉索而來七略條流兼該頗盡豈直羽陵之蠧汲冢之殘編如聞頃者以來不存勾當或詮次失序或鉤校涉踈或擅取借人或潛將入己因循斯久散失遂多思革前弊允資盛德宜令左相兼武部尚書陳希烈充監祕書令省圖書爰假丹青之餘以振鈆黃之美則金華侍講足繼寵於班伯石渠司籍方嗣徽於劉向至公之選可不務乎王者出師登壇擇將忠臣受任幹蠱成功則君賞其勤父成其訓名教斯在寵秩是崇銀青光祿大夫鴻臚卿員外置同正員兼廣陽郡太守同范陽節度副使上柱國柳城縣開國男安慶緒門傳忠孝之義庭稟韜鈐之略志氣剛決固敵是求遂使榆塞息警柳城罷鋒百勝深謀舉無遺策可旌上將之功用叶中行之吉可特進行衞尉卿兼廣陽太守餘如故如聞嶺南州縣近來頗習文儒自今巳後其嶺南五府管內白身有詞藻可稱者每至選補時任令應諸色鄉貢舉仍委去使準式考試有堪及第者具狀聞奏如有願赴京者亦聽其前資官并常選人等有詞理兼通才堪理務者亦任此選及授此官陽和布氣庶類滋長助天育物須順發生宜令諸府郡至春末巳後無得弋獵採捕嚴力禁斷必資杜絕嘉穀不登古今薦有勸分之義皇王善經且豐熟以來歲時頗久豈有餘糧棲畝誠恐極賤傷農所以積之京坻用防水旱爰自二載稍異有年粟麥之閒或聞未贍比開倉賤糶以濟時須雖且得支持而價未全減餱糧種子尚慮不充是用賙恤俾之寬泰在於處置須均有無今更出倉務令家給俾其樂業式副朕心宜於太倉出糶一百萬石分付京兆府與諸縣糶每升減於時價十文河南府畿縣出三十萬石太原府出三十萬石滎陽臨汝等郡各出粟二十萬石河內郡出米十萬石陝郡出米二萬石並每升減時價十文糶與當處百姓應緣開場差官分配多少一時各委府郡縣長官處置仍令採訪使各自勾當其太倉含嘉出粟兼令監倉使與府縣計會處分其奉先同官華原等縣與中部郡地近宜準諸縣例數便於中部請受其餘縣有司者仰準此其天下府縣百姓去載有損交不支濟者仰所繇審勘責除有倉糧之外仍便據籍地頃畝量與種子京兆府及華陽馮翊扶風等郡既是近輔須別優矜雖非損戶或有乏少種子者亦仰每鄉量宜準給并委採訪使與府縣長官計會即與處置使及營農使其種子既須好粟仍取新地稅分付京畿府郡京草雖巳加價尚聞難辦宜委度支各與所繇計會支料得至今載終巳來用足之外應未送者量事停減賑給糶倉矜貧濟乏務從撫實無使隱欺如官人及富有之家典正并僦攬諸色輒私侵糶兼有乞取或虛著人名詐來請受者其自五品巳上官蔭人等錄奏當別有處分六品巳下并白身者便決一頓仍準法科繩所繇等官不能覺察及自抵犯者亦與同罪關輔郡邑霈澤屢施京城在近時雨未降是用軫慮匪寧於懷其諸郡壇雖巳勤請攸資遍祭庶達誠心宜令吏部侍郎蔣烈今月二十五日祭天皇地祇給事中王維等分祭於五星壇務申虔潔以副朕懷踐更之役固是循常限約之閒必資通變雖載滿合替而處置隨時況巳在軍中復諳戎務功名未遂何必往來其今載諸軍應文武士等宜並延留一載仍準式給賜式外更加賜物兩段近日以來時雨未降在於宿麥慮有所傷雖憂勤之心不忘於黎庶而精誠之至冀展於靈祇宜令太子太師陳希烈祭元冥光祿卿李憕祭風伯國子祭酒李麟祭雨師仍取今年二十三日各申誠請務令蠲潔如朕意焉朕永念蒸人祈穀上帝而陰陽式序風雨不愆今獲稼穡阜成允賴神明幽賛也頃者虔心精享巳申昭告其五嶽四瀆及天下諸郡山川近令秋後展祭收穫既就農畝事隙報功咸秩抑惟其時宜令所在郡縣長官即擇良辰以崇明祀太中大夫澧陽長史員外置同正員吉溫頃因任使輒肆威福行刻物之法人殆不堪奮自賢之心士無敢忤況徇私傾險公行毀譽飾偽言而售詐崇詭行以釣名離貳朝廷猜攜倫伍近皆發露薄從貶黜而作孽未弭隱慝更彰且縱姦非逼人子女復受賄賂莫懼彞章或侵漁田宅取納口馬尚恐誣謬當令按劾及尋枝葉咸悉根源人之無良乃至於此國有常憲合寘極刑時屬陽生特從寬議宜謫遐裔以戒庶寮可晉康郡端溪縣尉員外置長任所在馳驛發遣黃軒撫運既統蚩尤之旅炎漢應期亦有陳豨之伐雖德合仁覆或震雷霆之威功侔載物匪容原野之罪蓋所以除殘救暴伐罪恤人聖帝賢君孰能無此朕以菲薄纉承丕搆乘時御宇慙繼統於百王旰食宵衣軫納隍於一物多歷年所億兆咸知安祿山本自細微擢之行伍進小忠而自售包巨猾以貪天予每含容冀其遷善列在衣冠之右授之師旅之權賜予無涯邀求罔極凡經寵任中外畢聞今遂竊我干戈欺我將士妄宣密旨假託妖言人畏兇威苟從逼脅稱兵向闕殺掠無辜此而可原孰不可忍前所出師命將足以除兇去孽仍聞阻兵西路左次南轅朕義在救焚情存拯溺雖螗蜋舉斧自當屠潰而蜂蠆有毒必藉討除今親總六師率衆百萬鋪敦元惡巡幸洛陽將以觀風因之掃殄太山壓卵未可喻其輕重洪波注螢不暇收其光焰宜令所司即擇日進發其河西隴右朔方除先發番漢將士及守軍郡城堡之外自餘馬步軍將兵健等一切並赴行營各委節度使統領仍限今月二十日齊到既緣剪除兇逆暫赴東京宮掖侍從並令減省至於供擬都無所須其扈從文武官及飛騎閑廄馬家并諸色人等應食公糧者並以官物支供仍從此身齎鍋幕緣路並不須置頓在於黎庶固免勞煩布告遐邇宜知朕意通三立極正維之業大明兩作離繼照之功博是以貞我萬國必在元良弼予一人歸之上嗣將寄丈人之律實資長子之師亦既戒嚴當除㣥慝皇太子亨仁明植性孝友因心稟上德之粹靈宅中和之正氣恭敬之虔豈伊橋梓剛柔之適無取韋絃韞公忠而事君總文武而行己既不絕馳之美可稱問膳之勤以三善之明助百揆之務邇安遠肅天平地成屬兇險負恩稱兵向闕人神同憤命爾撫軍將徼福於宗祧以保安於社稷憑天之德何嚮不濟順人之心所戰必克寸庶清彼氛沴以寧我國家宜令太子監國仍即親總師徒以誅叛逆取今月二十三日先發所司準式務從省便無使勞煩布告遐邇咸令知悉元子亨睿哲聰明恪慎克孝才備文武量吞海嶽付之神器僉曰宜然今宗社未安國家多難宜令即皇帝位朕稱太上皇且天下兵權宜制在中夏朕據巴蜀應卒則難其四海軍權先取皇帝處分然後奏朕知待克復上京朕將凝神靜慮偃息大庭也皇帝自幼仁孝與諸子有異朕豈不知往十三年巳有傳位之意屬其歲水旱左右勸朕且俟豐年爾來便屬祿山搆逆方隅震擾未遂此心昨發馬嵬亦有處分今皇帝受命朕心頓如釋負勞卿等遠去勉輔佐之多難興王自古皆有卿等乃心王室以宗社為念早定中原吾之望也
