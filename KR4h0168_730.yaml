front:
  text: 全唐文欽定全唐文卷七百三十仲郢字諭蒙兵部尚書公綽子元和十三年進士累拜京兆尹改右散騎常侍大中初擢劍南東川節度使入為刑部尚書咸通時封河東縣男檢校尚書左僕射東都畱守為天平節度使卒
  hash: sha256:50305ed46a136af2a132048256f078874af4dab50473b768b5f9ec4ff83cf32a
  markers:
  - {type: head, offset: 13, content: 柳仲郢, id: KR4h0168_NFKB_730-h1, level: 1}
body:
  text: 伏以聖王作憲殺人有必死之令聖人在上當官無壞法之臣今李材犯殺人之科愚臣備監決之任此賊不死是亂典章臣雖至微豈敢曠職其李材未敢行決望別降勅處分宗師字紹述河中寶鼎人始為國子主簿元和三年擢軍謀宏遠科授著作佐郎歷金部郎中紓州刺史徙絳州進諫議大夫未拜卒絳即東雍為守理所稟參實沈分氣蓄兩河潤有陶唐冀遺風餘思晉韓魏之相剝剖世說總其土田士人令無磽雜擾宜得地形勝瀉水施法豈新田又蕞猥不可居州地或自有興廢人因得附為奢儉將為守說致平理與益侈心耗物害時與自將失敦窮華終披夷不可知陴而孤顛可倔元武踞守居割有北自甲辛包太池泓橫硤旁潭中癸次木腔瀑三丈餘涎玉沬珠子午梁貫亭曰洄漣虹蜺雄雌穹鞠覷蜃礙佷島坻淹淹委委莎靡縵蘿薔翠蔓紅刺相拂綴南連軒井陣中湧曰香承守寢晬思西南有門曰虎豹左畫虎搏立萬力千氣底發彘匿地努肩腦口牙快抗電火雷風黑山震將合右胡人鬅黃夗巾纍珠丹碧錦襖身刀囊鞾撾縚白豹元斑飫距掌胛意相得東南有亭曰新前含曰槐有槐尸貝護䨴鬱蔭後頤渠決決緣池西直南折廡赴可宴可衙又東騫渠曰望月又東騫窮角池研雲曰柏有柏蒼官青士擁列與槐朋友巉陰洽色北俯渠憧憧來刮級面西巽㬂間黃原玦天汾水鈎帶白言謁行旦艮間遠岡青縈近樓臺井閭點畫察可四時合奇士觀風雲霜露雨雪所為發生收斂賦歌詩正東曰蒼塘遵瀕西漭望瑤翻碧瀲光文切鏤棃深撓撓收窮正北曰風堤乘攜左右堤埶北迴股努墆捩蹴墉銜渠歆池南楯楹景怪爥蛟龍鈎牽寶龜靈蠯文文章章陰欱墊咸欠烟潰靄聚桃李蘭蕙神君仙人衣裳雅冶可會脫赤熱西北曰鼇虫豕原開咍儲虛明茫茫嵬眼澒耳可大客旅鐘鼓樂提鷳挈鷺亻舀池豪渠增乖憐圍正西曰白濱薈深憐棃素女雪舞百佾水翠披目郭目郭千幅迎西引東土長崖挾橫埒日卯酉樵途塢徑幽委蟲鳥聲無人風日燈火之晝夜漏刻詭姽絢化大小亭餖池渠間走池堤上亭後前陴乘墉如連山㣥峯擁地高下如原隰堤谿壑水引古自源卅里鑿高槽絕竇墉為池溝沼渠瀑潀潺終出汨汨街巷畦町阡陌間入汾巨樹木資土悍水沮宗族盛茂旁蔭遠映錦繡交果枝香畹麗麗絕他郡考其臺亭沼池之增葢豪王才侯襲以奇意相勝至今過客尚往往有指可創起處余退常吁後其能無果有不補建者池由於煬及者雅文安發土築臺為拒幾附於汚官水本於正平軌病井滷生物瘠引古沃浣人便幾附於河渠嗚呼為附於河渠則可為附於汚官其可書以薦後君子長慶三年五月十七日記石字中玉襄邑恭王神符五世孫元和十三年進士大和九年權京兆尹遷戶部侍郎以本官同中書門下平章事加中書侍郎集賢殿大學士罷為荊南節度使武宗朝檢校司空封隴西郡伯徙節河東會伐潞詔以太原兵助王逢軍亂逐石以太子太傅分司東都即拜畱守卒年六十二贈右僕射宰相上弼聖政下理㣥司若忠正無私宗社所祐縱逢盜賊兵不能傷若事涉隱欺心懷矯安雖有防衞鬼得而誅臣等願推赤心以答聖獎孟軻知非臧氏孔子不畏匡人其兩道所進糧並望停寢依前制置只以金吾司手力充引遇穆宗朝官忠武軍節度副使檢校尚書職方郎中兼御史中丞敬宗立除荊州刺史入為左常侍天垂四星環拱帝座降精成象崛起輔時內則銜奉絲綸伏勤夙夜外則監護統帥鎮靜邦家宜其榮冠貂蟬名香竹帛公諱孝誠字孝誠京兆三原縣人也自姬周分姓由小邾建家隱屠肆而名動諸侯居里閈而勢侔卿相雲博肆直于漢世然據曜文於吳庭綿綿不絕世有榮位皇祖游仙皇考珍並育德當年鍾慶於後公弱冠入侍以謹密見親咫尺天顏左右皇極克勤專對休有令聞貞元中德宗新平㝢縣戎臣專閫多不自安任非其人情則莫達使乎之選朝廷為難公時妙年早承恩渥累馳驛騎所至風從對揚王休眾高敏捷累踐要職官更局丞幹蠱之聲自茲益大尋加朱紱銀章以旌能也元和初張伯靖負固敘州嘯聚蠻落公銜命於俶擾之際撫諭於谿洞之中遂使投戈感恩斂袵向化掉三寸舌息數州兵古人所難公有餘裕拜宮闈令上護軍以寵勞也先皇深憂漠北慮啟邊患公密陳嘉謀請城天德許詔既下仰辦於公量財揆日躬先板築胡馬不敢南牧漢兵休懷西歸保護塞垣萬代之利攻心斷臂復覩於今授承議郎內侍省內謁者監以酬勳也屬元戎授鉞問罪淮西恩加朝散大夫內侍省內給事以護許軍公素懷忠果徇國忘身每竭家財以周軍用時經行陣或被傷痍親自撫巡問以疾苦布皇恩於閫外推赤心於腹中士皆感激人百其勇故能綿歷三歲終始一心克定淮夷翦除荊棘過合流下郾城功伐彰明上每嘉歎遷朝議大夫內常侍旋以內憂請從喪紀詔命不許遽令起復是歲李師道遘逆窺竊近郊憲宗移司空公光顏鎮守滑臺以行天討兩道全師委公監撫初入寇境方伺地形為賊埋伏乘我未備公行從之騎纔廿人決機方寸之中奮發倉卒之際策馬直進突其堅鋒左拂右旋所向風靡以少擊眾古昔無儔威聲益雄士旅爭進收斗門下臨濮皆公之力賊平還鎮寵詔繼至加寧遠將軍上柱國殷蔡牢落陳許瘡痍二年之中四更節將公撫新懷舊軍郡帖然既盡禦眾之方真得監臨之體享年五十一元和十五年七月廿日遘疾終於許州之官舍部曲表請歸葬長安有詔追贈曰故忠武軍監軍使寧遠將軍內侍省內常侍員外置同正員賜紫金魚袋朱孝誠祇事左右勤勞歲時言念忠誠常所委用出入內外迭為監臨廉以居貞和而得眾將我成命奉以終身憫以云亡是有追錫昇階進秩式慰營魂可贈雲麾將軍左監門衞將軍王人臨門哀榮備至公抱謙恭之性有適時之才備著勳勞曾無矜伐每受榮獎憂形於色午參之機變繆子之薦賢兼有之也驅馳二紀出入四朝送往事居物無橫議方將振翼天漢展步雲衢蒼蒼不仁摧我貞榦夫人王氏輔佐成家克修婦道中饋有譽偕老忽乖痛移天之禍盡晝哭之節嗣子富平鎮監軍朝議郎內侍省掖庭局監作上柱國士俛能襲弓裘善繼先志明時並侍甸服監臨榮闕六姻貴昭聖世次子士倫初從筮仕投迹要司皆蒸蒸之心願申罔極以遇久同王事備詳勳績桑田非久陵谷易遷傳之不朽在乎貞石銜悲紀序無媿乎詞銘曰入侍重閨出奉紫泥星躔往復驛騎東西伯靖負阻嘯聚五溪宣我威恩革彼昏迷北難獫狁侵擾黔黎乃城天德上干雲霓下視虜馬遠如醯雞桀黠態盡窺塞無蹊再監滑許滅蔡平齊智勇雙高功名日躋紫綬金貂恩寵極兮悲涼部曲嗚咽鼓鼙佳城白日草露淒淒公衡長慶中官吏部郎中習射觀德序賓惟賢苟為當仁實惟合禮甲爰展我嘉事將修爾和容射夫既同且盡志而就列君子攸屆宜展敬於初筵故主人揖升而實爵嘉賓立飲而不拜登降之際既匪於儀德藝可尊寧限之以數蓋恃多為貴者具不曠於禮夫存實字鎮之漳浦甘棠人元和十三年進士官戶部郎中左庶子累遷戶部侍郎晴天既曙峻嶽凝青仰熙熙之旭將吐見高高之掌呈形假彼晶光庶有分於清濁挺茲秀異示無雙於杳冥燠矣而昇岧然相射浮豔華之爛爛靡太虛之奕奕寫乾坤之麗色先覺曈曨廓煙霧之餘姿轉見明白疑叅若木似坼芙蕖杲杲之容漸積摻摻之狀不如下映而千巖共曉上照而丹霞共舒影曜人間每當瞻瞻之早跡居物外長承煦煦之初昭昭以臨峩峩莫匹向空凝彩若月下之對金莖繞指流輝異樓上之呈素質既炫晃之旁達亦孤標而獨出幸當清淨之晨免敵沈陰之日佳氣或爍朝雲不還發明媚於紫霄之際擎彩翠於碧落之間自彰和朗寧俟躋攀遙暉六龍迥臨萬有初分焜耀訝髣髴以成文俯掬清光信爛漫而入手則知事不自妍理資相鮮因流光德獲照金天想清風旁來宛其穆若視晴景中駐何媿拳然故得無私功博潤色道全當八極洞開之次明二儀交泰之先豈獨擘洪濛而干造化設形象以配神仙而已哉於是靈蹤長聳日華長捧不然何㣥山邐迤而相奉四君當齊楚趙魏之盛門客三千人聞者孰不慕之有未達則孰不曰一朝富且貴必然嗚呼自四君歿千載之間豈無貴於四君者豈無富於四君者而然者其誰既富貴則曰彼四子徒沽名爾三千之人何為哉悲夫人之貴也為身四君之貴也為人富貴皆知可及也而富貴之心與貧賤之心不相負者愚則未見其及也贊曰四人為身萬二千人為耳目四人為梁萬二千人為榱桷有危可平有死可生豈彼威憑實惟義爭嗟乎人之家或財不自與心不自是妻不睦夫父不慈子而况乎萬二千士懿哉恨目不覩此會得劒匣而不持或怪之乃答曰直不可媚善不可害仁不可暴苟好是則利不在鋒鋩矣遂為銘曰龍入泉星上天雄雄神器蓄在人間於戲動不仁靜不德雖百鍊之鋼於愛身也奚力凌字恭履太子詹事憑子官侍御史履端於始且正班爵之儀明試以言是陳敷奏之議觀其所會萬國來同相彼多士百僚咸列朝有著定失位有愆國明彞倫干進斯罰景以策名聖代忝跡周行初伏奏於青蒲遂來陞於丹陛舍車闕下升坐其幕帶劒君前旋棄於禮儻王有錫命同蕭何之寵章人多大功類霍光之舊制既不易於紀律固難措於典刑罪疑於人宜竭兩端之問劾雖當理方議片言之折造字簡輿河內人穆宗朝累拜御史中丞遷尚書右丞加大中大夫封祁縣子轉禮部尚書卒年七十贈右僕射十二月二十二日初聞宮中遺火緣妖賊並禁在臺恐有奸謀遂追集人吏設備隄防然後奔走入朝到稍在後兩巡使崔宜姚合其日臺中忽聞有火遂追集所領赴朝堂到稍在後臣等職列紀律之次庶寮動皆取則若不重罰難勵眾情自罰三十直宜合請各罰二十直瞿童字柏庭以字為名辰州辰谿人也華眉廣顙長準秀目勤事而寡言大歷四年西川潰將楊林為澧陽守不戢部下兵縱其黨賈子華帥千人假道武陵劫五谿五谿之人逃難四散時柏庭年十四侍母走武陵寓居崇義鄉烏頭里桃源觀道士黃山寶編宮柏庭因山寶願師事上清三洞法師黃洞源山寶引覿具道柏庭志洞源辭以柏庭奉母須甘旨山寶曰柏庭母在山寶廬幸有繼給儻蒙拾貧賤所望容納洞源許之後亦時給柏庭母衣食僅二周載六年正月柏庭喪母既葬服勤事洞源不懈凡是役力辦不俟勉棄惡食必與愛惜飼而飯之七月洞源買藥至襄陽每入市令柏庭持裝囊柏庭必閉目處中洞源讓曰處眾而睡人奪汝攜柏庭曰非有睡也悶眾之諠諠耳九月洞源南歸行及宜城去襄陽百餘里洞源遽曰香爐捐主人奈何柏庭請復取白洞源暫休以俟不頃刻持爐還洞源驚而問答曰尊師方在途恐畱滯故疾行洞源信然七年二月朗州刺史胡叔清招洞源下郡赴之畱柏庭山中植果藥踰一十日洞源來柏庭一不植詰之答曰見尊師去州祇於山林尋仙穴洞源曰汝所尋何見答曰見石室石牀石几洞源曰石室何許曰約去一里半洞源疑而不窮入旬日柏庭於蓺藥園中得一碁子捧呈洞源曰秦人碁子洞源異之曰誰為謂汝烏知其然復曰是誠秦人碁子洞源諦視之狀若小龜光潤如玉遂貯籙囊中後因閱籙開囊緘記如舊亡碁子矣夏四月忽白洞源願屈歸巖洞時久霖澍洞源既未決信竟不果行八年五月二十七日始昕洞源命柏庭河畔視舟往復不二里及午方迴洞源訶之曰來何遲柏庭曰觀西南十五步許有小橋橋上遇一老尊負杖掛物嘑令同去柏庭不敢由早朝禠常所繫布帶以一紙繩束腰跣足履草屨昇尊殿及洞源嚴修之處各焚香跪拜既而辭洞源又拜洞源凭几問曰汝辭吾安往答曰歸仙洞洞源曰吾隨汝可乎曰不可洞源曰何為不可柏庭曰前時尊師不決去迺今不可因諭洞源當以時遷棲洞源曰十年易居昔賢遺旨吾有志矣今汝去何時復見答曰期十八年洞源欲畱之不克即聲命同觀道士朱靈曰朱老師看仙人來靈睨柏庭曰童子今日顏色異常光輝洞源門人胡清鎬朱神靜童子陳景昕譚伯璡偕圜矚柏庭服短布衣烏繪巾逡巡郤行三移足忽然不見洞源與道徒皆愕眙庭際有一栗樹謂暫旁立洞源曰得無映樹乎求之無蹤即聲鐘集觀戶將徧索林莽觀戶至東北林際遇一大蛇當路而止十一年見仙信從辰州來聞弟登仙至桃源又師事洞源為道士巖薜兩茂遊嵩山失所止建中元年四月洞源遷居江州廬山貞元五年十一月復遷居潤州茅山十八年潤州郵檄人於延陵縣界見一少年前行行如人郵者促步期及竟不能迭延陵間茅山三十里郵人望見徐步入山闕蕭泠然在鶴臺見少年持小漆函闕及門舉一足履閾泠然問曰汝為誰答曰闕因問泠然黃尊師何在泠然指示路處髣闕柏庭名卒然不悟久之忽了辨即攝衣詣洞源問曰瞿柏庭來乎洞源唯唯不明諭秋八月既朔之旬洞源謂門弟子曰吾將蹈滄海為備裝或以未可行為請踰一日當午洞源化真造曰代人傳瞿童登仙之迹皆怪異可惑乎予自右史貶武陵守至之日則詳詢舊老迺妖詭加甚值暇日遊沅江觀滄浪合流聞之於漁人曰瞿柏庭同學陳景昕已五徙居今復為桃源觀道士易名通微又改正長始均執勞久練行事傳疑百說不若一見予得言忘食遂命迓之未獲至若不克見及期而朝門吏導景昕前庭冠青蘿冠畢籙衣冰顏雪膚皓髭蒼眉端簡促跡肅容陳詞予不知幸之喜之之至也既休館徐徐閱所惑景為具辨因裂牘直紀用祛後疑宏正字子強戶部郎中綸子元和末進士累拜工部侍郎大中初轉戶部充鹽鐵轉運使檢校戶部尚書出為武寧節度使徙宣武卒贈尚書右僕射毗沙門天王者佛之臂指也右扼吳鉤左持寶塔其旨將以摧㣥魔護佛事善善惡惡保綏斯人在開元則元宗圖象於旂章在元和則憲皇交神於夢寐佑人濟難皆有陰功自時厥後雖百夫之長必資以指揮十室之邑亦嚴其廟宇戢齊強暴無煩狴牢故敏以為政者必因而證樹之興唐寺僧道契者惠智之人也眄隟地得勝概肇基厥事始唱而求其和焉前刺史范陽盧公周仁薪骨塗肉以立之後刺史河南渾公鋒施丹凝素以完之終而司勳京兆韋公磻揮金致繢以美之窺三君子同心搆物之道顧斯人之肥瘠豈一朝一夕一手一足之功哉宏正惴惴兢兢大懼三賢相因之功由我或隳而已余視斯像且未有增一毫之力視斯人其獲有所施為耶撫事及政為之記云亞字子佐滎陽人元和十五年進士三中賢良方正直言極諫書判拔萃科累遷諫議大夫給事中出為桂管觀察使大中時貶循州刺史卒據禮院奏以為東都太廟既廢不可復修見在太微宮神主請瘞於所寓之地有乖經訓不敢雷同臣所以別進議狀請修祔主並依典禮兼與建中元年禮儀使顏真卿所奏事同臣與公卿等重議皆以為廟固合修主不可瘞即與臣等別狀意同但眾議猶疑東西二廟各設神主恐涉廟有二主之義請修廟虛室以太微宮所寓神主藏於夾室之中伏以六主神位內有不祧之宗今用遷廟之儀猶未合禮臣等猶未敢署眾狀蓋為闕疑綸綍之興載籍之始先王發號施令明罰勑法蓋本於此也唐虞之盛二典存焉夏殷之隆厥有訓誥自允征甘誓乃有誓命之書皆三代之文一王之法也虞夏之際代祀綿遠其代王掌制之名氏莫得而知至于成湯太甲則有仲虺伊尹為之訓誥高宗得傅說則有說命之篇周公召公相成王則有洛誥酒誥周官顧命秦始皇帝并一區宇丞相李斯實掌其言漢興當秦焚書之後侍從之臣皆不習文史蕭曹之輩又乏儒墨之用每封功臣建子弟其辭多天子為之縱委於執翰者亦非彰灼知名之士武帝使司馬相如視草率皆文章之流以相如非將相器也厥後寖以微長下於魏晉亦代有其人我高祖革隋文物大備在貞觀中則顏公師古岑公文本興焉在天后時則李公嶠崔公融出焉燕許角立於元宗之朝常楊繼美於代宗之代洎憲宗皇帝英武啟運雄圖赫張中興之業高映前古其時則先太師忠公翺翔內署有密勿贊佐之績平吳定蜀時唯其功及登樞衡作霖雨尊王室卑諸侯圖蔡料齊外定內理顯王言於典誥彰帝範於圖籍紀在徽冊播於無窮特進太子少保分司東都衛公長慶中事惠皇為翰林學士訓誥之業彰於前聞昭肅皇帝統握乾符寤寐良弼詔自淮海復升台庭盡付元機允厭神度每彤墀奏罷別承天睠帝亦講伊尹傅說之旨定元首股肱之契以太平之制度上古之文教咸屬於公焉會先太后懿號未立帝明發有永懷之痛公述沙麓神井之瑞贊繞樞懷日之慶懋遵聖緒光慰孝思於是承命有宣懿祔廟之制及武宗郊昊天拜清廟文物胥備朝廷有禮華夷述職河朔修貢乃顯神庥薦徽號奉揚一德以示萬方於是撰仁聖文武至神大孝之冊封域無虞天子翛然有求元之思乃範貞金模聖表隆準日角燭於宮庭中外臣僚咸欲以頌山河而裦日月也公於是有聖容之贊天街之北獯鬻攸居因饑憑陵怙眾強禦嚴之以刁斗而勃爾無懼申之以文告而腆然不率天子震怒旋命征之公獨運沈機上資宸斷萬里勝負決於帷中雷霆既震犬羊遂潰疣贅披抉腥羶解離遁其名王復我貴主公於是有討北狄之詔天寶末薊門為首亂之地瘡痏榛棘襲世未平至於漁陽帥師仲武掃除妖孽臧獲仇讐奉揚威神乃底康靖仍願勒石於盧龍之塞以敘聖功飛章上聞帝用允若公祇膺明命舒展格言呼嘯神祇吐納嵩華當晝而文星現不寐而白鳳來成諸侯不朽之勳尊元后無私之化公於是有幽州紀功之碑潞帥劉從諫死其子因關河之嶮恃甲兵之眾請爵爭地屢聞王庭中外疑迷互撓天聽帝將耀神武公累獻忠謀且言曰重耳在喪不聞利父雄渠受戮祇以拒君况明皇舊宮天井內地跨連河北脅倚山東豈可行有匪人坐為汚俗若是可忍孰不可容沃心無疑躡足乃定又曰上黨居天下之脊當河朔之喉今漳水雄兵常山勁卒是為脣齒實懼因依不若乘其未萌制其將動帝俞其奏乃妙選使臣以勞諭之嚴立刑賞以勸戒之魏侯鎮侯戮力從命絕壺關之右臂收泜水之上游獲茲渠魁在此成算又轅門叛將潢水餘兇竊上相之旌旗盜晉陽之管鑰帝怒斯赫人心愈疑咸以師老于郊梟巢尚固議罷兵者蚊聚請宥過者雷同公又揚笏而言曰彼地則義師帥分宗室是元祖勤商之邑后稷造周之邦瓜瓞具存堂構斯在苟虧策畫不襲仇讐則是獎彌牟逐主之風長冒頓射親之俗詩稱築室於道書謂疑謀勿成由是洞啟宸衷大破㣥議運籌制勝舉無遺策防微慮遠必契神機授鉞之臣伏膺承命謝安之圍碁尚劫曹參之飲酒方酣果有軍書繼聞戎捷砥磨周鉞水淬鄭刀萬里來袁尚之頭顱二塚葬蚩尤之肩髀歡聲雖震於朝市喜氣不見於形容何其纂立功勳鎮定風俗若是之重也公於是有伐上黨之制平晉陽之勅宗英可汗獻琛輸賮越自絕域通于本朝文畢伯仕之允呼韓谷蠡之師或執玉而朝靈囿或解辮而拜甘泉並垂於策書光被明命公於是有諭回鶻之命五慰堅昆之書四文章等於訓傳機事出於神明固將偃仰邳石之符傲睨鬼箝之錄聞之者可以祛聾瞶得之者可以弼邦國每牙管既拔芝泥將熟嘗於前席親授筆札公亦分陰可就落簡如飛時有急宣關於密畫內庭外制皆不與聞或勢切疾雷機難終日宣室未召武帳莫聞公則手疏封章達於旒扆當乙夜觀書之際未嘗不稱美再三此又豈可與傳洞簫而諷於後庭聞子虛而嗟不同世者論功校德耶歲在乙丑㣥公常伯以天子之道貫於神祇一年而風雨攸序災沴不作二年殲醜虜興北伐之詩四年誅狡童詠東征之歌而又移摩尼之風壞浮圖之俗偃兵反樸四海胥定思欲增鴻名光下武公乃觀東序之圖按西崑之諜鋪舒名實藻縟文采類於上帝為唐神宗公於是纂章天成功神德明道之冊文號位既畢華夷會同方將命禮官召儒者訪匡衡后土之議採公玉明堂之圖考肆覲之禮於梁生取封禪之書於犬子盡皇王之盛事極臣子之殊功而軒鼎將成禹書就掩然猶進先嘗之藥獻高手之醫藏周旦請代之書追漢宣易名之美作為大誥祈于昊天始終一朝紹續九德其攻伐也既如彼其制作也又如此故合武宗一朝冊命典誥奏議碑讚軍機羽檄凡兩帙二十卷輒署曰會昌一品制集紀年追聖德也書位旌官業也歲在丁卯亞自左掖出為桂林九月公書至自洛以典誥制命示於幽鄙且使為序以集成書尋元珠不究於倪域聽希聲莫窮於高下承命震恐幾移朝夕援筆而復止者三四念江陸修盪辭讓不及因齋潔以序焉夫全功難恃大名難兼日赫於晝而乏清媚月皎于夜而無溫煦冬之為候也則雪霜飄暴凍入肌髮夏之為用也則金流石爍火走膚脉如陽春高秋者希焉南則瘴風毒虺之為厲也北則獯戎黠虜之為患也如洛陽咸秦者幾焉雕鷲不傅之以馳騁驊騮不授之以鶱翥如應龍者鮮焉仲尼聖賢之宗也位止於司寇老聃道德之祖也官不過柱史如姬旦者幾焉是以保衡傅說佐佑殷宗召公畢公寅亮周室咸著大訓克為元龜書契以來未之多有李斯以刻石紀號之文勝而不在休明之運又何足數哉周勃霍光雖有勳伐而不知儒術枚臯嚴忌善為文筆而不至巖廊自是以降其類實繁惟公蘊開物致君之才居元弼上公之位建靖難平戎之業垂經天緯地之文萃於厥躬慶是全德蓋四序之陽春九州之咸洛品彙之應龍人倫之姬旦後之學者其景行之云爾展長慶時人白郎巖因神姓名也在天台山西東抵唐興縣三十里長慶四年秋風雨不應候土產之物焦乾幾七八農人愁毒相視不聊生自浙東數郡咸然縣令曰餘豐曰某竊長斯邑邑人愁毒猶吾愁毒也將禱於名山顧其遼遠某始至時經於白郎巖異狀深黑巍峭疑有神宅焉因探其端得寺記白郎神事因詣法師普耀所憇巖側虔祈禮請未及竟有異物自穴出黑首高眶素臆錦脊其顧視昂昂之勢若龍若蛇不驚不搖受祀而退其夕降甘雨居數日物反秀綠自寶歷元年更復旱縣令求去年之祥召邑居客與同往祝請其年六月十八日是物復自穴而出一如去年狀加四足焉足呈掌爪若欲挐矯是夕復降甘雨異哉其神明歟神必依山川山川不崛神不依焉受祝惟神禱不精誠神不歆焉天與神通神不正直天不應焉縣令與丞非尊官也能一精專於下而通天降神其應如射豈細事耶足以誨天下之慢易者展適在山野獲同觀焉因記其年月於是巖之側㣥字正夫魏州冠氏人累官中書舍人翰林學士承旨今月九日孟秋饗太廟攝太尉國子祭酒韓愈准式合令起今月六日于太廟致齋今于國子監宿有違格令
