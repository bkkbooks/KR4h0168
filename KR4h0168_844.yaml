front:
  text: 全唐文欽定全唐文卷八百四十四維岳後唐同光時人
  hash: sha256:c3f17ad946d97416f52be3b899efb13b11fa93d1c1b8583f502a5042cda26fdb
  markers:
  - {type: head, offset: 14, content: 許維岳, id: KR4h0168_NFKB_844-h1, level: 1}
body:
  text: 伏見新定格文三禮三傳每科只放兩人方今三傳一科五十餘人三禮三十餘人三史學究一十人若每年止放兩人及一人逐年又添初舉縱謀修進皆恐滯畱臣伏見長慶咸通年放舉人元無定式又同光元年春牓亦是一十三人請依此例以勸進修崇韜字安時代州鴈門人天祐中累擢中門副使加檢校太保守兵部尚書充樞密使梁亡以佐命功代豆盧革行中書事拜侍中領鎮冀州節度使進封趙郡公賜鐵券恕十死莊宗討蜀為招討使蜀平之後莊宗因讒密詔繼岌檛殺之臣聞底力辭封者貞臣之至節慢官速戾者有國之常刑其或任重材輕智小謀大縱君恩念舊闕一字貽覆餗之譏儻官業無章何顯陟明之道臣本轅闕小校樗朽凡姿在公雖歷於年深臨事莫聞於日益頃者皇帝陛下雄圖方運陽德初潛爰將整於規繩乃俾司於機務此際臣亦內循短淺累具退陳而陛下天睠不迴國權堅付在一時而難違重命許五年而別選通人邇來雖昧經綸強施勤拙至於戡夷巨孽纘紹鴻基雪三百年社稷深寃立十九葉宗祊大事皆謀從聖慮斷在宸衷兼列較之同心非微臣之獨計況今名昇台輔任處樞衡珥貂冕於朝端統龍旌於閫外恩榮有進功德無稱終憂即鹿之嫌寧抑懸貆之刺今則陛下功全報本禮極配天衣冠盡列於朝廷名器自推於碩德況臣才謨素寡齒髮漸衰以有限之精神當無窮之事務必須下傾肝血上告天聰冀勞逸之稍均庶初終之可保伏望陛下念臣不迨察臣繇衷其樞密使比列親班實為要執即復本朝規制宜選內官掌臨一則使權職有分一則免心力俱耗輒滋傾瀝非敢闇欺干犯冕旒伏增隕越臣以機務實繁智力俱困輒有聞天之請願辭密地之權豈謂聖旨俄宣皇情未允捧對而水湯滿腹揣修而芒刺盈軀臣以委質無材受恩踰等強展神扶之力每懷曠敗之憂自陛下委寄重難纒綿歲序臨事而退思補過竭力而知無不為陛下沿河料敵之時對寨交鋒之日臣若顧將丹素堅有讓陳不唯招避事之機抑亦顯不忠之罪況今元兇己殄丕搆彌隆圓丘陳報本之儀寰海被無私之化英髦星萃俊邁雲臻緬惟不迨之才豈掩旁求之命矧乃一身多疾三處持權捫心益懼於滿盈持懷每虞於忝據伏望陛下特迴睿照迺悉煩襟終乞輟此要樞歸於內列一則表大國有進賢之道二則免微臣有竊位之名干冒宸嚴無任迫切臣伏念朝廷起軍之際陛下決於宸斷撫臣背曰此去必盪寇讎可期清泰事了之後與卿一鎮臣仰奉成算固絕他疑果賴神謀尋平偽孽今乾坤交泰弓矢載櫜徽章以正於母儀嘉禮獲申於元子須傾血懇仰瀆宸嚴但以密近之權合歸重望鈞衡之柄宜屬通材至於所領節旌雖是陛下所許伏緣鎮州在北狂虜未除慮有奔衝須為控扼亦希付於上將所貴殿彼一隅伏望陛下道極照臨仁深覆載念臣久司繁重憫臣方在衰羸退放居閒俾從導養臣無任祈天瀝懇之至臣伏見今年三銓選人并行事官等內有冒名入仕假蔭發身或卜祝之徒工商之類既淄澠之一亂諒玉石之寧分蓋以偽朝已來蠧政斯久猾吏承寬而得計非才行貨以自媒上下相蒙薰猶同器遂使寒素者多遭排斥廉介者翻至湮沉不唯顯紊於官箴抑亦頗傷於治本近以注擬之後送省之間引驗而已有異同僭濫而果招論訟將敷至化須塞倖門臣欲請別降條流特行釐革許其潛相覺察互有告陳若真偽之能分即賞刑之必舉應見注授官員等內有自無出身入仕買覓鬼名告勅及將骨肉文書指改名姓或歷任不足妄稱失墜押彼公憑或假人蔭緒托形勢論屬安排參選所司隨例注官者如有人陳論勘鞫不虛者元論事人特議超奬如未合格人或無名駮放者便承偽濫人所授官資其所犯人下所司簡格處分如同保人知保內有冒名濫進之謀亦許陳首若遞相葢藏被別人論告並當駮放其銓司闕頭人吏如被形勢迫脅主張踰濫選人及自己不公亦許陳首並與放罪若被人論告當行朝典兼恐見任官及諸道選人身死多有不肖子孫將出身歷任告勅貨賣與人自今後仰所在身死之處並須申報本州令錄事參軍於告勅上分明書身死月日卻分付子孫兼每年南曹及三銓停滯多及周歲致選人廣作京債經費倍多致其到官必不廉慎此後至春來並須公事了絕若更逗畱當加責罰所有懼罪逃移者仰所司具錄名姓申奏請終身勿齒兼牒本貫州縣各令知悉或有條流未盡處仰所司簡長定格別具條奏伏以館司四庫藏書舊日數目至多自廣明年後流散他方宜示奬酬俾申搜訪伏乞委中書門下再行勅命遍下逐道或有人家藏能以經史百家之書進獻數及四百卷已上者請委館司點勘無脫漏於卷軸無重謺於篇題比外寫劄精詳裝飾周備當據部帙聞奏請量等級除官仍仰長吏明懸牓示即鄉校庠塾之業漸闡皇風金石絲竹之音無虞墜典陛下不櫛沐不解甲十五餘年欲雪國家讎恥今已正尊號始得鄆州尺寸之地不能守而棄之臣恐將士解體將來食盡衆散雖畫河為境誰為陛下守之臣嘗細詢康延孝以河南之事度已料彼日夜思之成敗之機決在今歲梁今悉以精兵授段凝決河自固恃此不復為備凝非將材不足畏降者皆言大梁無兵陛下若畱兵守魏固保楊劉自以精兵與鄆州合勢長驅入汴偽主授首則諸將自降矣不然今秋不登軍糧將盡大功何由可成諺曰當道築室三年不成帝王應運必有天命在陛下勿疑耳廷誨崇韜子崇韜被誅廷誨隨父死於蜀於糾禮官無辱祀典欽若天地肅恭神人如何有司失其頒誥將季氏之待暗失由也之質明致使槱燎不供難為魯祭爟火無設便乖漢典宗伯或差於三望太常乍闕於六宗職此之由而褻其守天秩有禮罔不克集寘以徒坐復何疑焉生也有涯死而必復苟或不率克有常憲故國備典訓禮陳等威虞人以具階崇壯士以奉職顯若禱其五祀則事始東榮或問以三號而復行左轂自適變通之要夫何過差之有惟甲何者以冕而復同鄶人之失德刺起素冠齊魯俗之虧喪僭彰元毳既非五等之列須異九儀之品何乃不類祇自塵兮非大猷是經而峻簡斯糾違失之禮其難捨諸延孝塞北部落人梁開平乾化中自隊長積勞至部校後唐同光中為捧日軍使兼南面招討指揮使檢校司空守博州刺史莊宗平汴以功授檢校太保鄭州防禦使賜姓名紹琛二年遷保義軍節度使三年討蜀以為西南行營馬步軍先鋒排陣斬斫等使蜀平以西平王朱友謙伏誅遂謀叛自稱西川節度三州制置等使都將何建崇擒斬之梁朝地不為狹兵不為少然主既暗懦趙張擅權內結宮掖外納貨賂段凝智勇俱無專率斂行伍以奉權貴梁主不能專任將帥嘗以近臣監之進止可否動為所制近又聞欲數道出兵令董璋趨太原霍彥威寇鎮定王彥章攻鄆州段凝當陛下決以十月大舉臣竊觀梁兵聚則不少分則不多願陛下養威蓄力以待其分帥精騎五千自鄆州直抵大梁擒其偽主旬月之間天下定矣夢徵同州人舉進士仕梁歷校書郎自拾遺召入翰林充學士以論錢鏐謫掾東州復召為學士後唐莊宗入汴貶沂州量移宿州天成初遷中書舍人復入為翰林學士工部侍郎卒贈禮部尚書嗚呼四海九州天迴睠命一女二夫人之不幸當革故以鼎新若金銷而火盛必然之理夫何足競頃字子澄京兆萬年人昭宗朝舉進士累遷吏部員外郎入梁歷給諫御史中丞禮部侍郎尋以吏部侍郎拜中書門下平章事後唐莊宗入立貶登州司戶量移濮州司馬遷太子賓客天成初以禮部尚書太常卿太子少保致仕卒年六十九贈太子少師歷代故事沿革不同蓋就所宜期於合禮事雖稽古理亦從長七廟之致享斯存萬世之承基靡絕禮分遠近事究否臧懿祖既遠於昭宗創業又非於已力儔諸列聖可議祧遷皇帝陛下道繼百王德符三代撥禍亂於艱難之際救蒼生於交喪之秋方啟洪圖是崇宗祏為四方之准的稱萬國之照臨中書所定祧遷於議為允請下所司施行伏見方冊所載聖概斯存將達蘋藻之誠宜新楶梲之制伏惟陛下以孝敬日躋之德上合穹旻秉恭儉罔怠之規再康寰宇爰臻至化難抑時思馬縞儒學優深禮法明練所奏果符於睿旨載詳固叶於典經臣等集議其追尊位號及建廟都邑則乞發自宸衷特降制命正言鄆州人賀德倫鎮青州表為推官改觀察判官後唐同光中累擢戶部尚書興唐尹尋遷租庸使守禮部尚書明宗即位求為平盧軍行軍司馬卒於任伏以宮室之制宗廟為先陛下卜雒居尊開基御宇龍樓鳳輦式當表正之初玉葉金枝悉在股肱之列事當師古神必依人北京先置之宗廟不宜並設竊以每年朝享固有常儀時日既同神何所據常聞近例禮有從權如神主已修迎之藏於夾室若廟宇已崇虛之乃為常制昔齊桓公之廟二主禮無明文古者師行亦無遷於廟主昔天后之崇鞏雒悉謂非宜漢皇之戀豐滕事無所法而況本廟故事禮院具明且雒邑舊都嵩邱正位當定鼎測圭之地乃居衝處要之方今則皇命承天握圖纂祀九州是務四海為家豈宜遠宮闕之居建祖宗之廟事虧可久理屈從長北京宗廟請停革同州人唐末避地中山唐亡為王處直掌書記轉節度判官後唐莊宗即位以宰相盧質薦徵拜行臺左丞相同光初拜平章事天成初諫官誣以縱田客殺人貶辰州刺史再貶陵州長流百姓二年詔逐處刺史監賜自盡大德欲要一居處畿甸間舊無田園鄜州雖有三兩處莊子緣百姓租佃多年累有令公大王書請卻給還人戶蓋不欲侵奪疲民兼慮無知之輩妄有影庇包役圜京兆三原人唐末依李克用歷代憲二郡刺史莊宗承制改潞州觀察判官累遷工部尚書兼真定尹北京副畱守明年郭崇韜兼鎮改行軍司馬充北面水陸轉運使同光三年入為工部尚書天成初拜平章事二年除太子少保致仕出居磁州為安重誨所害清泰中制贈太傅伏見蕃牧臣僚每正至慶賀例皆進馬臣以捧日之心貴申其忠孝追風之步必擇於馴良備乘奉於帝車資駔駿於天广既伏見本朝舊事雖以進馬為名例多貢奉馬價蓋道途之役護養稍難因此㣥方久為定制自今後伏請只許四夷番國進駞馬其諸道藩府州鎮請依天復三年已前許貢綾絹金銀隨土產折進馬之值所貴稍便貢輸不虧誠敬兼請約舊制選孳生馬分置監牧俾飲齕而自遂即騋牝之逾繁者
