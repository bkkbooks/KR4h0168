front:
  text: 全唐文欽定全唐文卷五百十三朝陽金陵人大歷中進士為潞州節度使薛嵩從事興元時官將仕郎守太子正字
  hash: sha256:799e680c7860c49658feafa9f9df15fc032b6531085e97819237e911bccc3891
  markers:
  - {type: head, offset: 13, content: 冷朝陽, id: KR4h0168_NFKB_513-h1, level: 1}
body:
  text: 楚江之陰巖壑重深參差遠岫掩映遙林帶殘霞之隱隱含暮景之沈沈聳孤峯之萬仞擢喬木於千尋仰之彌高倚青冥而直上瞻之彌遠凝黛色而旁臨窗微明而可見雲出沒而無心微雨新晴陽烏乍曉芊芊芳樹歷歷飛鳥森羅廣澤之閒半出重林之表天高地遠混煙靄而雖微虎踞龍盤等衡巫而不小形標回漢勢混全吳衆鳥所託㣥仙所趨林隔岫而相映岫依林以相扶幽蘭所生知其芳矣仁者所樂不亦悅乎春思感於春林遠情馳於遠岫心悠悠以遐想色遙遙而層構度材任土挺翹楚而敷榮蘊玉藏珍分巘崿而增秀信乾坤之覆載承雨露之繁茂當峻極於長空豈蔽虧於側陋蘭青青兮雨霏霏望鄉路兮吳山微折芳懷遠兮送將歸桂枝片玉兮生光輝元度為鳳翔隴右節度使張鎰判官營將李楚琳作亂死其難明則有禮樂幽則有鬼神並繫國移風助天成物我堯舜其德清明在躬詠南風之時光宅天下斬東萊之樂政事惟醇瞻彼有周誠為率土百姓樂業㣥黎向方而先彼藝能後其節目操茲雜弄存彼安絃承獎訓於鹿鳴冀成功於蟻垤州司以事乖易俗不識樂章既慙師乙之言有類文侯之問爰申禮閣欲置判懸供釋菜於賓社庶氓黎以觀習且是請也非所宜言昔子路居蒲文翁處蜀自有無聲之樂豈聞操縵為辭欲置爰書若何文過軒懸鹵簿徒飾詞於如簧郵罰麗事豈逃刑於聽棘與貞元時人謹按本州在禹貢為揚州之南境周為七閩之地秦漢為東南二粵之地漢武平粵為東會稽治縣并南海揭陽之地晉宋以來為晉安義安二郡之地皇唐垂拱二年十二月九日左玉鈐衛翊府左郎將陳元光平潮州寇奏置州縣敕割福州西南地置漳州初在漳浦水北因水為名尋以地多瘴癘吏民苦之耆壽余恭訥等乞遷他所開元四年敕移就李澳州置郡故廢綏安縣地也自初置州隸福州都督府開元二十二年四月二十二日敕割隸廣州二十八年敕復隸福州州本二縣一曰漳浦即州治也一曰懷恩二十九年十一月二十二日敕以戶口逃亡廢之併入漳浦又割泉州龍溪縣隸本州大歷十一年福建觀察使皇甫政奏割汀州龍巖縣來屬十二年五月二十七日敕從之天寶元年改為漳浦郡乾元元年復為漳州興元二年剌史柳少安請徙治龍溪福建觀察使盧惎録奏貞元元年十一月十六日敕從之遂以龍溪城為州定管龍溪漳浦龍巖三縣山川清秀原野坦平良山記董奉之遊九侯傳夏后之祀趙他故壘越王古城營頭之雉堞依然嶺下之遺基可識陳將軍忠貞冠代王使君勳烈標時周先輩之奇才潘侍郎之重德大同有九虬之瑞開元出祥雲之符靈跡應祈筋山屏盜遺芳未泯勝概可尋蔚為江外之名邦不特閩中之要地凡諸可紀悉具於後演貞元時人謹按李演見唐書者凡四一為江安元王祥九世孫一為讓皇帝十世孫一為憲宗孫封臨川郡王一從李晟收京攻朱泚於光泰門率騎士先登者東林寺碑作於貞元十一年惟江王孫及從李晟立功者時代相合天之高也日星垂其耀地之厚也山嶽鎮其維人資三才之靈挺五行之秀粵有邁德宏域融神惠境焯迦羅之絶照挹甘露之元津配名嶽而永崇晞扶桑而不息則慧遠法師其人也法師鴈門樓煩賈氏釋道安之門人其英姿朗韻清行素節詳諸舊碑及張氏傳固以杳映前秀鋪鑠令聞灰心土骸而神機天發金口木舌而法音雷震無取無捨而律儀冰徹不生不滅而禪性暉如抱德陽和而浩類洗心潛靈淵沼而遠方翹首修不共法而常軫大悲薰般若智而富諸梵行故能誘納衆善沙汰㣥疑萬流仰海而同歸一雨施物而咸潤可謂阿摩勒果實從中生分陀利花性非外染矣自晉氏太元年法師始飛錫南嶺宅勝東林世更七代年垂四百流芳遺潤金鏘玉振當一時之美虎溪為釋氏龍門挹千載之風匡阜擬搢紳闕里皇唐貞元十有一祀江州刺史馮翊嚴公士良秉明德以分符宣中和以述職上贊緝熙之化下臨擊壤之人以無為政克用其民巡穡外野指途中林敷衽禪關式瞻遺像喟然歎曰斯名也寒暑不能易其芳斯德也江海無以臻其極彼瑣行纖節尚崇植楹廡正位居室噫尊美若茲而隅形在壁俾珍儀掩翳清光不曜豈惇德允元之旨乎乃與寺之上首熙怡律師圖之將搆勝宇且示實相律師久儲於懷果協其素旌美樹善二謀同心悅徒勸工成之匪日繡甍翼其雲聳睟容儼以景彰觀至道者存妙像於鏡中味微言者得元珠於意表豈止惠議攝英姿而雨汗仲堪仰素風而心醉哉故非夫遠公之志德不能譯聖文服秀民非夫嚴公之徹識不能立清祀揚妙軌篆芳金石敬贊二美銘曰粹靈純綸是為至人含德摛曜升陽發春道光海域幽遁嶽濱六髦棄蔽八士辭巾緣徂物謝跡留事往百億神遊恆沙化廣昭昭遐軌泠泠末響慧日凝暉白雲翹想曠哉明牧遠味芳風思覿遺像求之列墉爰搆棟宇式是道宗旌休垂洪地久山崇公異吳人建中二年進士為李晟招討府掌書記官朝散大夫殿中侍御史與陸贄有隙貞元中贄為宰相奏公異無素行黜之繇是轗軻以卒臣某言今月五日寅時大理少卿馬炫至未時監軍使判官奚官局丞程仙望至纍承恩命宣慰臣及軍府將吏僧道百姓等半日之間二使連至六辰之內五奉詔書恩旨便繁顧問稠謺感懼交集兢隕失圖中賀臣聞元穹降災吉凶常數儲后繼立周漢舊儀伏惟陛下纂八葉之重熙叶千齡之廣運以為四海務重不可以一日而無君九廟禮崇不可以一朝而乏饗是以順先皇三日之詔允㣥臣五表之請克遵古訓虔奉國經俯抑聖情以臨寶位大頒新命再造寰區海內悲歡天下幸甚臣謬司節制職守方隅不得與萬計連行同參盛禮千官並列稱慶闕庭無任抃躍哀榮之至臣某言今月十七日衙官史萬頃奏事回伏奉手詔伏審聖躬頃暫乖理今悉康平凡在臣子不勝忭躍中賀伏惟皇帝陛下自天生德紹聖垂衣運啓握符已慶無疆之壽疾稱勿藥果從有喜之辭歡初洽於朝廷慶旋周於海內臣伏以天心恭慎庶政殷繁既當痊愈之初宜加頤攝之道然猶日旰對奏未明求衣理或至於憂勤事終干於思慮恐乖將候竊未遑寧伏乞朝廷之宜付之宰相討伐之任仗彼戎臣從容聖心消息元化為宗社自愛委諸有司幸甚幸甚臣蒙國寵榮輒露誠懇伏惟察納表臣愚衷臣某言今月七日中使至進伏奉敕書手詔慰諭臣者伏以聖躬頃乖頤攝少有不安景福無疆旋亦康泰屏營捧詔且喜且驚臣聞子之事親出告反面臣之事主移孝為忠君親之閒其體無異自宜問安內豎增憂寢門平居之時猶無闕禮乖理之後豈合遑寧又臣聞勤則近憂憂則生疾豈陛下以萬方黎庶尚未和平三輔甲兵猶從征討此皆臣下之過遂煩君上之懷臣特荷國恩超踰儕輩死生不係於己命休戚實同於國家况聖壽日躋皇符永固雖禎祥合慶祚必壽於南山臣子馳誠心豈離於北闕伏以聖謀思振邊徼正安輕騎無信宿之程郵館無兼金之費臣欲旬日之內輕行入朝陪列庶官恭承睿旨審聖質之安否布微臣之款誠伏乞矜允遂臣愚懇臣某言臣聞臣之事君盡於追遠子之事父禮在送終忠至苟全死且無悔臣某中謝臣本山東布衣耕於淇澳弓裘陵替無以庇身屬天寶中元宗聖明河海清晏臣始忝宿衛入侍丹墀合門歡榮長幼同慶洎祿山叛命慶緒西侵元宗以玉輅南巡肅宗以金輿北幸諸侯避狄天子蒙塵臣當此時有死無二於是執殳荷㦸漸拜偏裨逮肅宗克復兩京再安九廟臣遂東征西伐式遏蕃蠻荷寵承榮稍遷將帥先皇以臣頗經統領久鎮方隅天渙曲臨遐方授節一辭雲陛十載守邊空懸魏闕之心未展子牟之戀徒慙保障有愧繭絲肇自一官纍登三事兢惶罔措悲駭失圖荷戴恩榮不勝號絶且諸侯五月同盟至天子七月同軌至今先皇厭代已歷四旬臣妾攀號哀纏六合况臣一身授任九族霑榮華轂朱輪貂蟬滿路永惟恩寵答荷何階豈謂先皇升遐臣不得執紼陵隧陛下登極臣不得稱慶闕庭吉凶二途禮制皆闕伏乞皇慈曲被天澤俯臨許臣匍匐元堂稽首黃壤攀穹永訣局地長號獲申罔極之哀用畢終天之願無任隕絶崩迷之至臣某言某月日某至伏奉詔命以臣收復聖旨裦揚特為製東渭橋碑文皇太子書手詔賜臣及將士者驚拜捧荷魂神飛越臣聞霍光戴漢輔昭立宣鄧禹佐王寧人除暴或道扶衰運或功格皇天才聞麟閣之圖適及雲臺之紀未有事微賞厚用淺報崇回辰象之天文降明離之筆札跪捧尋繹慙惶失圖事出古今感深臣子雖百身殞越曾未賈於片言九族隳離實難酬於一顧臣某中謝伏惟皇帝陛下邁軒皇之武德續唐帝之文思六義不足以財成五聲徒表於宣暢躬親庶政而睿藻日新化洽萬方而宸章閒作頃屬凶徒扇結都邑震驚陛下克讓斯在推功勿居回天漢之文章賜光輝於臣下英聲茂實演奧窮微昭宣造化之情黼黻羲文之制顧乃上援彥範次述子儀此皆功贊中興道化來裔纂循前緒陛下實紹於耿光瞻慕勳庸微臣固無其影響此皆陛下特標文字曲降恩私激揚雅頌之風警厲人臣之節自家刑國垂範作程恩誠借於微臣道將周於天下足使懷忠服義爭死節以駿奔反側危疑望皇風而懲革史籍之所未有自此而書人臣之所未聞自臣而始雖年踰知命筋力尚全國家西有未賓之戎東有乘邊之寇每煩宸慮尚集王師顧此生涯未知死所庶損微瑣之質少益覆載之仁限以戎鎮不獲奔赴闕庭輕陳懇悃無任荷戴惶灼之極國家以來年正月五日告謁宗廟柴燎南郊率土同歡室家相慶臣已陳乞願奉大儀監使王敬親至陛下以西門式遏未蒙矜遂夙夜惶戀心如焚灼目覩漢儀猶傳故老况臣纍塵清貫謬處台司侍奉翠華未為失任亟承顧問亦近守官既違捧日之誠益慕告天之慶伏惟皇帝纂戎聖運光啓帝圖澤流亭毒之源化溢舟車之外今者以天地交泰華夷大同明發以展神宗陶匏而郊上帝紹前王之闕典納殊俗之始賓九域駿奔傾皇都而壯觀庶官少肅扈清蹕而徐驅臣於此時獨守藩鎮伏惟陛下以鳳翔密邇或多戎梗未可輕離臣酌事宜必無所慮何者吐蕃所有兵甲悉不在邊流沙已西才有烽戍况其畏威讋伏向化協和自安戎貊之邊敢犯漢家之塞吳說之居隴上李觀之處涇州既承聖謀各有成算以此制敵何憂撫封臣於鳳翔亦擇留後庶令軍務皆叶權宜又以州縣雖存黔黎未復徒御既衆供承則難臣當倍道兼行速於入侍謝車捐騎才取成容則歧路有載馳之章郵亭絶告勞之費以此利往未為擾人今者設壇場告天地尊嚴執禮陛下當元首之名贊拜陳儀臣子漏股肱之用臣且自愧人何以觀乞陛下特降洪私容臣朝聘俾汪洋皇澤亦霑戎屏之臣肅穆旌門粗識升平之禮既均情於故老庶無愧於子牟退入泉壑不為恨矣臣某言伏奉手詔聖躬頃暫違和旋亦康復鼓舞歡抃倍百常情然且爾來未有人到惶戀之至寢興無寧何者臣義忝寵榮恩當弻亮聖躬乖理股肱何安是以瑣瑣寸誠款款微志思陪朝列一解宜容之憂或從良醫待獻十全之藥頃以陳乞願得輕行未蒙還旨猶增戀慕且睿謀宏遠邊鄙方安春候轉深戎馬難動以此揣度固無憂慮伏乞聖慈許臣朝謁輟旬時於藩鎮候安否於宸顏臣之微願於斯畢矣臣某言自中使至伏奉手詔後行在所未有人至伏以巴梁既遠信使全希路有豺狼時當否塞東征西怨彼雖幸於南巡捧日望雲臣獨瞻於北極伏惟陛下以重慎為意以社稷為心每於寢膳必盡頤攝况朱明啓夏小暑屆時曾觀蜀漢之風小異函秦之氣尚衣侍膳之分莫敢侵官資父事君之誠空思入面違奉既久涕戀無從不任之至臣某言臣聞夏禹興師西戎即敘漢宣嗣位北狄稱藩則知自古帝王未有不先文德而後甲兵撫諸華而柔荒服然後列在墳籍號為升平伏覩今月某日吐蕃東道節度南奔息下吐蕃浪斯一作尚奔息下吐蕃浪斯多斯獵人并馬十五匹投降者此皆聖澤昭宣太和廣被夷狄左袵邊徼無虞臣某中賀伏惟皇帝陛下以至聖統業以大明乘時休戰伐於阪泉布風教於宣室化無不洽俗無不賓獨西蕃纍犯邊疆自為倔強多從戰敗少有生降今者之來實異於昔蓋以違天已久負約頗深竊盜河湟震驚邊鄙神既惡稔時將可誅漸開離析之端是叶恢張之運臣獲受榮遇方總藩維當臨斬戎王將置藁街之下提封漢境願窮葱嶺之西萌兆在茲不敢不賀無任喜抃之極臣某言自元誼亂常已經寒暑王師討逆久未凱旋臣待罪轅門若臨泉谷渠魁未滅寢食不寧臣某中謝臣自春初以來便為持久之計控引洛水環繞賊城築室反耕示其安堵冀憑廟略克翦凶徒臣所設隄防頗為堅厚秋來軍用又勝常年隴畝之閒不知賊在臣與第五守進商量且務撫綏蕞爾一城偷安晷刻今水勢滋漲營壘安間惟務訓師未嘗徹警賊城之內是物皆竭狡計已窮頻有降人審知實事臣若四面豁水一向取城量力校功計日當剋算其日數以待地乾須至冬中水凍然後可事集或慮亡命之賊伺隙奔馳兼恐猖狂之儔為之聲援若但以水力為灌澍不停旬月之閒賊城必壞中則促其急變外則伐其異謀不假梯衝不費戈甲竊思上策實為萬全况秋風漸高寒氣已至城中士健懸望冬裝其元誼等無可支持惟行誑惑既以迫其凍餒仍更苦其勤勞據此事情即當變潰昨者將軍劉南華等溺死臣已奏聞訖臣緣得城中款疏皆願歸降前後剋期非止一度臣若不使人接應有似拒其輸誠若不激其義心即何以勸其效命所以事須赴約有此差池伏惟聖鑒俯賜詳覽其城所與計會前後帛書謹録白并元本同封進所謀翻城人四面知敵副將李澄臣已補充衙前十將伏恐皇情憂軫要親問事宜臣謹令隨崔烈入奏云云右伏以獻歲首春元辰備饗內饔具品則有常珍野食擊鮮恐資兼味臣昨以軍中無事畋獵出城既臨戎虜之邊且試偏裨之藝縱橫必中豈謝麗龜俯仰無遺寧憂即鹿或堪上獻輒露衷誠前件物等謹狀奉進庶裨仙篋用愧野芹無任惶懼之至右伏以律應蕤賓節臨端午徵彼風俗盛陳續壽之儀爰念人臣敢闕致誠之禮况朝廷敘位海內來王咸因贄幣之資用表肅恭之節臣叨承恩顧獲守邊陲朝不及於良辰禮竊憑於外物輒以前件馬并鞍等進奉殊慙駿驥微露衷誠願承端午之祥長居得一之位不勝區區之極右臣得所由狀送前件物至臣所者輒令瑩拭非是常珍宜在升聞輒敢上獻陰陽造化神妙潛功㣥生既偶於昌期靈貺豈私於聖德伏惟皇帝陛下化通元默躬贊升平神功所以服不庭大孝所以尊清廟故天惟儲慶雲物表瑞於非烟地不韜珍寶玉騰光於內府陛下方宏至道爰紀殊祥仰聖德而彌高在天心而難讓至如此寶安敢無言觀其形製標奇非一時之物精輝旁射逾百鍊之珍臣輒比擬他金光芒獨映求之故事未或前聞表孝通誠美已彰於盈缶徵神録異慶常集於化鈞况其賦質堅剛肖形盞斚膺大雅獻酬之用告太平歡樂之符時佇休明潛躍久同於瓦礫道合交泰成器堪佐於樽罍况因封管而生似表微衷而獲儻從殊貨是更裦揚必取類於金堅至遂成於家寶期於銘刻傳在子孫長承聖主之恩使效微臣之節神策軍京畿渭北商華鄜坊丹延等州兵馬副元帥李晟於苑牆內神䴥倉東南連白苑破逆賊朱泚兵馬收復上都露布事尚書兵部臣聞春司生榮秋主殺伐若終始煦嫗則不能成歲功仁則順成暴則殘滅若一貫邪正則不能建大中是以春秋序行則通天和而充氣母德刑具舉則協王道而經彞倫亂由是除兵不可去堯舜禹湯之德統元立極之君或制五兵或張九伐蓋欲攘削姦寇乂安生靈補雍熙之未洽佐聲教之不暨有以然者抑實為何伏惟皇帝陛下溥博法於乾坤貞明侔於日月陶埏六合表正萬邦揚高祖太宗之耿光奉肅宗代宗之丕烈自纂承前緒高居穆清率土承有截之風懷生無不遂之性頃者邊鄙或聳干戈爰設有征無戰許蔡傒首領之誅陸梁背誕涇原生肘腋之變逆賊朱泚所以委身凶德假翮姦徒熒惑我生人僣賊我神器聚為起穢之物腥彼宮闈散作旬始之妖孛於躔次先皇帝懷柔河朔敷佑下人録其率化之績優以登賢之禮恩澤汪濊集凡庶之風名器燻灼加闒茸之質冀革桀跖將馴大和殊不知惡木生槎枿之荑猰狗吠豢牢之主頃屬鑾輿順動郊畿駐蹕而泚乃嘯凶命醜阻兵安忍長㦸指闕流矢射天穿高墉以鼠牙毒王師以蠆尾罪浮羿浞惡貫梟獍是以萬方憤怒九服囂騰思齒劒者投袂而興爭剚刃者不期而會屬賊臣伺釁陰貸凶謀既緩雷霆之誅遂延頃刻之命臣是用祗承睿算恭行天罰攝衣登壇明君親之大義禡牙饗社假神祇之幽贊以今月二十五日總領師徒直趨都邑略灞滻以揚旆瞰苑囿而下營土濠雲舒木柵林植養威蓄鋭直殄元凶臥鼓偃旗猶輕小利賊初陵犯略以芟夷謂其氣竭而來歸尚敢尸居而作固敵若可縱師多奚為至二十七日會諸將於中權占勝風於大旆未鼓而人心粗勵先庚而軍令凝嚴各懷報主之誠盡淬復讐之刃臣知其可用遂此疾驅五月二十八日寅時華州鎮國軍節度使駱元光神策行營商州節度使兼御史大夫尚可孤本軍副使都知兵馬使御史大夫吳詵都虞候兼御史大夫邢君牙京西行營都知兵馬使檢校刑部尚書孟涉右廂兵馬使御史大夫康英俊隴州節度右廂兵馬使郭審金權文成神策行營商州節度都虞候彭元俊等承命於牙旗之下分麾於轅門之外將士等超乘賈勇免胄啓行夾川陸而左旋右抽抵邱陵而浸淫布濩聲塞宇宙氣雄鉦鼓陳兵於光泰門外悉鋭於神䴥倉東繚垣坌以成塵滋水涸而為地左廣未歸於舊壘前偏已交於賊鋒若降於天若出於地賊將姚令言張廷芝等志懷僄狡心尚憑陵作忠盡謀力則不及怙亂賊義氣則有餘勢如飇馳衆若蜂集橫列堅陳勢連高岡猶張蹭蹬之鱗更舉螳蜋之臂衙前兵馬使兼御史大夫王佖知牙官兼刀斧將兼御史中丞史萬頃等自相誓約又合軍聲指麾而貔兕作威感激而風雲動色遂先登進擊深入合攻七擒連發而星馳兩翼旁張而雲合霜刃吐光而揮霍鼉鼓騰聲而隱轔賊方土崩我乃霆擊乘其踣藉遂至於上蘭取彼鯨鯢直通乎中禁假誠諫賊之心膂既就生擒沈厚運賊之羽毛終制死命顧其係頸求活投戈乞降崩騰於榛莽之閒震懾於旌麾之下臣以其今染汙俗昔實平人推赤心以如初敷王化而咸一姚令言等力扞王師退而復合惡烏將墜尚顧危巢妖狐就擒猶守舊穴自卯及申拒而復攻歡譟之聲山傾而河泄鼓鼙之氣霆鬬而電奔屏翳發向敵之風回祿扇燎原之焰馬逸不止人怒未舒既自北而徂南竟輿尸而折首又使決勝軍節度使工部尚書唐良臣右廂兵馬使御史大夫趙光銑義武軍兵馬使楊萬榮左步軍使御史大夫孟日華馬軍將田子奇霍去憞郝覲華州節度使左廂先軍兵馬使馬英華右先鋒兵馬使董泚神策行營商州節度兵馬使賈值金右廂左都虞候張望都等領馬步為副勢均破浪攻甚決河雖其恃武庫之五兵憑宮垣之萬雉及茲翦滅才欲乘陵曾無鐏刃之鋒已失籓籬之固遂生擒僞署侍中董泰中書侍郎平章事蔣鎮左僕射同平章事張光晟兵馬使李希倩敬釭等逆賊朱泚與同惡姚令言張廷芝等輕騎走出臣已遣兵馬使田子奇等追躡計即梟夷臣竊以此賊包藏逆謀參會凶德祲沴其氣豺武其心背先皇亭育之恩傷陛下元默之化漢之莽卓未足等夷晉有敦元自當超軼子暴其父陰於陽自古未有如泚之大者也或者上天之意申警於巨唐中興之期光啓於陛下然則王師奮伐勢無駐於建瓴醜類搶攘功有輕於折箠猶逃密網尚反隻輪誠當盡敵之時更發追亡之騎且稽分體未即燃臍快億兆之歡心蕩宗社之深恥即當梟戮用申刑典今已肅清宮禁祗謁寢園鍾簴不移廟貌如故蓋為宸極之所垂祐列聖之所雄都神扶業業之傾天降穰穰之福不然豈免於毀之患崩剝之虞者哉此皆上天降鑒睿慮潛施制兵要於事先規雄武於彀內再造可封之俗因櫜不戰之功左武右文銷鋒鑄鏑淡乎華胥之代冥然葛天之風臣謬寄台司幸當統帥乏吉甫之文武缺卻縠之詩書此皆諸衆叶心㣥帥宣力非臣庸瑣敢自矜大臣不勝慶快之極謹差監軍使王敬親牙官御史大夫符㣥王邵張少引謹奉露布以聞唐興元元年十月十一日國之元輔鳳翔隴右涇原四鎮北庭兼管內副元帥司徒兼中書令西平郡王李公晟有事於吳山之祠虎暢前驅鳥隼之旟升降林嶺不囂不呼縈雲拊嵐以屆於祠下公遂以神之所感告於座客公異忝備賓佐管文記之任操觚染翰恭而書之初相國涼公鎮鳳翔也常以中軍委公偉才雄名橫軼倫伍大歷四年屬天降災沴不雨踰時土山方焦大水成陸封內山鎮分官禳祈命公禱於吳山公於是氣肅體虔桂酒瓊筵公告神以災沴神享公之吉蠲明能通幽實在俄頃雲油雨霈霂優渥沃瘠膏枯公私必濡既皂且房歲穀大熟遽申報禮人咸異之由是公心有所奉動符冥應招神戶三十人拱灑掃之事其後仗王命提偏師救亂於蜀陲翦戎於卭僰曾不踰時招弓返旆繼以叛將擁衆兩河繹騷公鼓行而東且討且援洹水盡敵魏橋制勝兵未及而趙北圍解氣有餘而清苑凱旋壁渭川則殷若長城復皇都則劃如破竹冥符幽贊於是乎在無何優詔拜公上公極人臣之寵且以西門之務委焉公本之禮經山在封內者得崇祀典况吳山德於我乎具以上聞特請裦異詔使中使孟希價持傘賜神錦袍金帶夫人花冠等焜耀祠宇發揚幽昧山鎮之秩次於方嶽矣徵諸故事當開元二十八年詔使正議大夫內常侍竇元禮賜食致祭至天寶八年哥舒翰拔石堡破番蠻封神為成德公至德乾元之閒纍有裦賜加為天嶽王則神之宣力有自來矣人或以公曩之感神駭於視聽公異以為吳嶽者含蓄雲雨蟠厚地而柱蒼昊天地之山也李公持顛定傾蘇㣥生而戴天子社稷之山也與夫喬嶽巨鎮均功並用肸蠁氣合何其怪哉鐘鼓樂之苾芬薦之人神欣欣既晝斯夕宜矣山之廣袤載於方志略而不述所述者公之感通與其年月敢學舊史實而無華掌書記朝散大夫殿中侍御史內供奉于公異奉命為記
