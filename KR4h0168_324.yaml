front:
  text: 全唐文欽定全唐文卷三百二十四維字摩詰太原祁人徙河東開元九年進士歷右拾遺三遷吏部郎中天寶末為給事中祿山陷兩都為賊所得偽病瘖拘於普救寺迫以偽署賊平陷賊官三等定罪維以所為凝碧池詩聞於上肅宗嘉之會弟縉請削己官以贖兄罪乃責授太子中允乾元元年轉尚書右丞二年卒
  hash: sha256:18f935250fcaa4bbcbc31a12d2bed00aa8a758e0eed923121d10467255d11b62
  markers:
