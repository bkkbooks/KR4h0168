body:
  text: 若夫名依西域族本南海同朱喙之清音變綠衣於素彩惟茲鳥之可貴諒其美之斯在夫其入翫於人見珍奇質狎蘭房之伎女去桂林之雲日易喬枝以羅袖代危巢以瓊室慕侶方遠依人永畢託言語而雖通顧形影而非匹經過珠網出入金鋪單鳴無應隻影長孤偶白鷴於池側對皓鶴於庭隅愁混色而難辨願知名而自呼明心有識懷恩無極芳樹絕想雕梁撫翼時銜花而不言每投人以方息慧性孤稟雅容非飾含火德之明輝被金方之正色至如海燕呈瑞有玉筐之可依山雞學舞向寶鏡而知歸皆羽毛之偉麗奉日月之光輝豈憐茲鳥地遠形微色淩紈質彩奪繒衣深籠久閉喬木長違儻見借於羽翼與遷鶯而共飛謹按本限八韻賦止五韻郝名遠作亦同臣某言支使某官奏事迴伏奉某月日手詔賜臣以皇太子所寫聖製麟德殿宴百僚詩序日月揚光風雲動色捧受之次震駭失常臣某中謝臣伏以經天緯地者聖人之文多才多藝者元良之美逖聽前修旋觀往冊考論盛德罕見全能故漢后詠歌有乖雅頌之旨周儲聰哲不聞翰墨之妙伏惟陛下道洽帝堯文超繫表體陰陽之變化與雲漢而昭回皇太子德邁生知學資聖訓掩鍾張之筆札並虬鸞以飛動臣特承湛恩荷此殊錫集榮光於外府啟重寶於私庭班氏賜書既甚懸隔馬卿視草曾未比擬又臣所獻奉和詩事等賡歌情同率舞濫吹之音謬塵於天聽踰涯之賞忽降於絲言豈臣微力所宜負戴非臣捐軀所能效益無任榮荷感惕之至臣維言伏見今月七日中書門下敕牒道士申太芝奏稱伏奉恩旨令臣往名山修功德去載六月二十日於南海葛洪居處至誠祈請中夜恍惚見一老人云是茅山羅浮神人常於七曜洞來往昔曾於九疑山桂陽石室中藏天樂一部歲月久遠變為五野豬彼郡百姓捉獲汝可往取獻皇帝每祈祭但依方安置奏之即五音自和天仙百神應聲降福所求必遂壽命延長臣奉神言即往桂陽尋問百姓云天寶二載村人常見有五野豬逐之便走入石室就裏尋覓化為石物五枚眾共驚異臣取以扣之音律相和與神人言不異今將奉進者臣聞陰陽不測之謂神變化無方之謂聖唯神與聖感而遂通伏惟開元天寶聖文神武應道皇帝陛下居皇建之極中得混成之大道奉先天之聖祖元化協於無為育率土之㣥生至仁侔於陰步馬然猶精意不倦聖祀逾崇遍禮㣥仙思祐九服故得厖睂皓髮遙同入昴之人真訣元言來告馭風之客棲身七曜以俟唐堯藏樂九疑不傳虞舜留茲石室思獻玉墀憑野豕以呈形表洞仙之屬意且神物思變古亦有之龍躍平津實為寶劒鳬飛葉縣空餘素履器非上品人纔下仙猶能精誠聿修神變浚若況殊庭致貺天老效祥願授至尊以享上帝亦既考擊動諧律呂韶濩慙其九奏雲咸失其八音翠鳳入於洞簫殊非雅韻朱鷺傳於鼗鼓敢比仙聲天地同和神祇降福無窮之壽永撫寶圖無疆之休以康庶績實由至德斯感大道元通神人親告於休徵靈仙不祕其空樂稽之古昔實未見聞臣等限以留司不獲隨例抃舞不任踴躍喜慶之至臣維言伏見中書門下奏上黨郡奏啟聖祖大道元元皇帝玉石真容主上聖容今月十五日三元齊開光明其日戌後道士陳希玉等十三人同朝禮見內殿有光非常照耀及開殿門其光彌盛滿堂如晝久之方散其時檢校官及押官等皆共瞻覩者臣聞仙祖行化真氣臨關聖人降生祥光滿室固知仙聖必有景光伏惟開元天地大寶聖文神武應道皇帝陛下大道為心上元同體挾風雲之質敬想猶龍寫日月之儀欽承大象仍迴舊邸以奉清都真容聖容既明四目照殿照室忽類三光蘂宮自明初謂上天無夜桂殿如晝還疑就日而朝琪樹韜華瑤池奪暎實由陛下宏敷本際大啟元宗明君潤色於真源聖祖和光於帝載表文明之在御六合以清知臨照之無疆億載多慶臣等限以留司不獲隨例抃舞無任踴躍喜慶之至臣維等言伏奉中書門下牒伏見絳郡太平縣百姓王英狀稱去載七月於萬春鄉界頻見聖祖空中有言曰我以神兵助取石堡城當時具經郡縣陳說並有文狀申奏訖今載正月又於舊處再見云我昔於梓州威洞造一龕尊像在獨坐山東北公成山左側年代已遠其處傾陷像在土中可報吾孫令人往取斯乃蒼生之福國祚無疆者近奉進止差直省往彼求覓昨見梓潼郡奏稱去載某月二十六日郡縣官吏並道士父老百姓等一千餘人與直省李萬德依此尋求其日諸山盡皆晴朗惟公成山上雲霧暗合遍尋不知所在遂結壇齋戒祈請經宿至二十七日辰時有五色雲見於霧合之處遂即分人子細尋覓乃見山半腹有少土傾處其上竹樹非常蒙密並見一石角出土一寸便穿掘深三尺已來乃是一石龕龕中有尊像一左右真人六並師子崑崙各二遂以水洗沃儀相儼然事實吐符並如真誥其石龕重大非人力所能運轉今於龕上造屋宇便差精誠道士三人專修香火供養謹畫圖奉進者臣聞元德升聞與至降監必錫靈貺彰厥有成不祕祥符昭其克享伏惟開元天地大寶聖文神武應道皇帝陛下以道理國以奇用兵先天而法自然終日不離輜重故得仙君居九霄之上屢降中州聖祖在千古之前還臨後葉視之不見者今見聽之不聞者今聞仍敕神兵以助王旅天丁力士潛結鸛鵝星劒雲旗暗充貔虎遂殲逆命之虜果屠難拔之城加以言必有徵德無不報指尊像之所在為寶祚之休徵周流六虛言於晉而驗於蜀混成一氣出於有而入於無未達齋心初迷三里之霧既符真氣俄成五色之雲山腹洞開仙容儼若萬物今覩千刼未逢昔河啟綠圖山輸元女尚謂得天之助藏為受命之符況真誥人聞聖容神造照臨下土不住大羅之天保佑㣥生爰啟小有之洞實感明主縮地而來豈比漢時乘空而去元后欽崇之福遠至邇安聖祖昭報之心天長地久臣等限以留司不獲隨例抃舞不勝踴躍喜慶之至伏奉制書如右好生之德洽於人心奉天之時以行春令體元作則惟聖裁成伏惟乾元大聖光天文武孝感皇帝陛下道凝庶績功深廣運極孝敬於至誠致雍和於允穆狹其祝網陋彼畫衣寧失不經況乎輕繫大赦戮餘之罪益寬流宥之典人謂無寃何如捨而不問殺而有禮豈若至於無刑加以親減庶羞無祭肺之膳下除冗食贍餬口之人買櫝設楬藏彼無歸之骨歲取畝收本乎盍徹之稅巨猾止於一惡貧人免於十夫思折券者寬其暴征嘗書勳者貰其宿負道德齊禮成其有恥之心悔咎思愆開其自新之路道之一變將使比屋可封守在四大弓庶夫外戶不閉風俗忠厚禮讓興行六府孔修萬代永賴臣等忝居門下不任鳬藻抃躍之至臣維稽首言伏奉某月日制除臣太子中允詔出宸衷恩過望表捧戴惶懼不知所裁臣聞食君之祿死君之難當逆胡干紀上皇出宮臣進不得從行退不能自殺情雖可察罪不容誅伏惟光天文武大聖孝感皇帝陛下孝德動天聖功冠古復宗社於墜地救塗炭於橫流少康不及君親光武出於支庶今上皇返正陛下御乾歷數前王曾無比德萬靈抃野六合歡康仍開祝網之恩免臣釁鼓之戮投書削罪端袵立朝穢汙殘骸死滅餘氣伏謁明主豈不自愧於心仰厠㣥臣亦復何施其面跼天內省無地自容且政化之源刑賞為急陷身凶虜尚沐官榮陳力興王將何寵異況臣夙有誠願伏願陛下中興逆賊殄滅臣即出家修道極其精勤庶裨萬一頃者身方待罪國未書刑若慕龍象之儔是避魑魅之地所以鉗口不敢萌心今聖澤含宏天波昭洗朝容罪人食祿必招屈法之嫌臣得奉佛報恩自寬不死之痛謹詣銀臺門冒死陳請以聞無任惶恐戰越之至朝議大夫試太子中允臣維稽首言伏奉今月十八日敕令臣充集賢殿學士擢及無能恩加非望抃躍慙懼不知所裁且謂之集賢非賢莫集固當宣其五德列在四科逖聽眾推方紆聖鑒臣抽毫作賦非古詩之流挾策讀書無專經之業伏惟陛下文思超則哲之后書契踰畫卦之君龜圖不能比其詞龍甲不足究其義聞相如在蜀畏不同時徵枚乘於齊惜其已老急賢之旨欲賜追鋒如臣不才豈宜濫吹將何以編次漆簡刊定石經東堂賦詩將招不成之罰北面待詔必無善對之才以榮為憂席寵知懼無任感恩踴躍戰越之至謹詣延英門陳謝以聞臣維言伏奉今月某日聖札題集賢殿御書院額捧戴抃舞不知所裁竊以先聖微言前王令典所以興行禮義訓正人倫頃逆胡凶頑不識經籍恣行毀裂有甚焚燒伏惟陛下御極統天功成理定愍其墜簡旁搜古壁發求書之使置寫書之官於是九流百家韋編緗帙爛然虎觀盛彼鴻都加以親重儒門將為教首俯題金榜自運銀鈎龍鳳翔於烟雲日月照於天地曾無以喻誰敢強名況乎方丈之書七分入木仲將虛為白首羲之枉在墨池將使率土之人知陛下寵茲書府普天之下斆陛下敦彼儒風政化之原實始於此臣忝編次漆簡刊校石經載光載輝誠歡誠喜臣某言伏奉今月日制除臣某官拜命若驚稽首無地臣聞洪波迅流必盪其溷穢慶雲所潤不遺於荊棘伏惟陛下孝悌之至通於神明馨香之德格於天地故指旗而黑祲旋靜揮戈而白日再中豈臣蟲臂鼠肝所能談天述聖臣之本末強欲自陳擢髮數罪臣戮餘也剖心自明天知之矣臣素書生少為文吏折衝禦侮幾何不兦奉法守文一日之長當賊逼溫洛兵接河潼拜臣陝州催臣上道驅馬才至長圍已合未暇施力旋復陷城㦸枝义頭刀環築口身關木索縛就虎狼臣實驚狂自恨駑怯脫身雖則無計自刃有何不可而折節凶頑偷生厠溷縱齒盤水之劒未消臣惡空題墓門之石豈解臣悲今於抱釁之中寄以分憂之重且天兵討賊曾無汗馬之勞天命興王得返屠羊之肆免其釁鼓之戮仍開祝網之恩臣縱粉骨糜軀不報萬分之一況褰帷露冕是去歲之縲囚洗垢滌瑕為聖朝之岳牧臣欲殺身滅愧刎首謝恩生無益於一毛死何異於腐鼠謹當閉閣以思政酌泉以勵心親畢力於平人無煩八部誓不負於明主非畏四知用釋愆誅敢求課最臣某言總管關敬之至奉九月十五日敕吐蕃贊普公主信物金胡瓶等十一事伏蒙恩旨特以賜臣捧戴慚惶以抃以躍臣幸居無事待罪西門恭守嘉謨欽承成憲王師不戰無汗馬之勞堯屋可封何理人之有實無異效特降殊恩竊用勤以忘家志不顧命分膏草野以報萬一無任感戴戰越之至臣某言臣猥以賤伎得備眾工誤點屏風乏成蠅之巧偶持團扇無事牸之能徒以職官不敢貳事顧惟時論有慚三絕伏惟皇帝陛下撥亂反正受命中興俯協龜圖傍觀鳥迹卦因於畫畫始生書知微知彰惟聖體聖臣奉詔旨令寫功臣運偶鳳翔之初無非鷹揚之士燕頷猿臂裂眥奮髯髮衝鶡冠力舉龍鼎骨風猛毅眸子分明皆就筆端別生身外傳神寫照雖非巧心審象求形或皆暗識妍媸無枉敢顧黃金取舍惟精時憑白粉且如日磾下泣知其孝思于禁懷慚媿此忠節乃無聲之箴頌亦何賤於丹青宣父之似皋繇元子之類越石不待或人之說無煩故伎之言此又一奇誠為可尚臣得舐筆麟閣繼踵虎頭頻蒙獎教之恩益用精誠自勵勤以補拙雖未仙飛感而遂通實因聖訓況賜衣服累問官資中使相望屢加宣慰微臣戰灼無答恩私之至臣某言天幸微臣身逢大聖得為列卒以備戎行於臣一生已為萬足況建旗為將裂組受官蒙推食之恩辱賜衣之寵匹夫之勇雖不顧身長策無聞未能盡敵仰慙介冑俯愧櫜鞬加以弓不重於六鈞箭不穿於七札詎中雀目誠慙猿臂以劉琨而恨小非關羽之絕倫何以厠跡虎臣儀形麟閣伏惟皇帝陛下昭格天地懸超七十二家微臣託附風雲不如二十八將而蒙垂聖旨特命圖工畫植㦸之黃鬚圖石棱之紫色才如過隙顧侯已得其神不待臨淄鄒子自知其醜豈可藏之祕府以示後人將謂飛龍之時無俟貔貅之士寵過其效力不稱恩願死藝於伏弢誓殺身於鳴轂無任感激欣戴之至沙門惠幹言法離言說了言說即解脫者終日可言法無名相知名相即真如者何嘗壞相實際以無際可示無生以不生相傳非夫自得性空密印心地見聞自在宗說皆通者何以證玉毫之光辯金口之義伏惟乾元大聖光天文武孝感皇帝陛下高登十地降撫九天宏濟㣥生濡蓮花之足示行世法屈金粟之身心淨超禪頂法懸解廣釋門之六度包儒行之五常老僧空空復何語語以無見之見不言之言淺智勝疑冰之蟲微戒愈溺埿之象以自覺離念注先聖微言如人疑一作麻何足盡思食木偶然成字豈堪上塵慧眼仰稱聖心有命自天藏拙無地伏以集解仁王般若經十卷謹隨筆奉進無任慚惶然本注經先發大願釋第一義開不二門與四十九僧離一百八句六時禪誦三載懇祈俾廓祅氛得瞻慧日三千世界悉奉神王五千善神常衞樂土今果盪定無量安寧緇服蒼生不勝慶躍沙門僧某等言伏蒙聖札題二大師塔額及度僧抽僧等並畢伏喜天心俯從人欲恩光至重抃舞難勝臣聞聖者正也住正法者為聖人佛者覺也得覺滿者入佛慧伏惟光天文武大聖孝感皇帝陛下登滿足地超究竟天入三解脫門過九次第定見聞自在不住無為理事皆如終非有漏復皇國而御宇尊白法以教人百穀順成六氣時若不加兵而賊破不擾物以人和緇侶勝緣蒼生厚幸昨蒙書額度僧等龍騰金榜鳳轉銀鈎河漢昭回烟雲飛動韋誕恥其遺法梁鵠慚為古人降出天門升於寶塔玉繩綴於重級珠斗挂於露盤以方宸翰實多慚德又宿修梵行願在法流者覆以慚愧之衣落其煩惱之髮冀成寶器仁王為琢玉之因廣運佛心聖主受恆沙之祐沙門等叨承禪訓幸遇昌期御札賜書足報本師之德梵筵邀福願酬大聖之恩不勝戴荷之至僧某言天地之大未滿法身紺殿朱宮豈云光宅陛下尊崇像教大捨外財白法利人黃金布地不役一人之力不費一家之產崇崇寶坊雲構將畢所營某寺以某月日上佛殿梁伏望天恩內賜一繖庶使大千世界悉入葢中六合人天共歸宇下然後以無礙慧大化㣥物將使四生皆度豈惟比屋可封則中天之臺才留幻士畫雲之觀徒候神人以古況今前王何陋謹詣右銀臺門奉表陳請以聞臣維稽首言臣年老力衰心昏眼暗自料涯分其能幾何久竊天官每慚尸素頃又沒於逆賊不能殺身負國偷生以至今日陛下矜其愚弱託病被囚不賜疵瑕屢遷省閣昭洗罪累免負惡名在於微臣百生萬足昔在賊地泣血自思一日得見聖朝即願出家修道及奉明主伏戀仁恩貪冒官榮荏苒歲月不知止足尚忝簪裾始願屢違私心自咎臣又聞用不才之士才臣不來賞無功之人功臣不勸有國大體為政本原非敢議論他人竊以兄弟自比臣弟蜀州刺史縉太原五年撫養百姓盡心為國竭力守城臣即陷在賊中苟且延命臣忠不如弟一也縉前後歷任所在著聲臣忝職甚多曾無裨益臣政不如弟二也臣頃負累繫在三司縉上表祈哀請代臣罪臣之於縉一無憂憐臣義不如弟三也縉之判策屢登甲科眾推才名素在臣上臣小言淺學不足謂文臣才不如弟四也縉言不忤物行不上人植性謙和執心平直臣無度量實自空疎臣德不如弟五也臣之五短弟之五長加以有功又能為政顧臣謬官華省而弟遠守方州外愧妨賢內慚比義痛心疾首以日為年臣又逼近懸車朝暮入地然孤獨迥無子孫弟之與臣更相為命兩人又俱白首一別恐隔黃泉儻得同居相視而沒泯滅之際魂魄有依伏乞盡削臣官放歸田里賜弟散職令在朝廷臣當苦行齋心弟自竭誠盡節並願肝腦塗地隕越為期葵藿之心庶知向日犬馬之意何足動天不勝私情懇迫之至臣維稽首臣聞罔極之恩豈有能報終天不返何堪永思然要欲強有所為自寬其痛釋教有崇樹功德宏濟幽冥臣兦母故博陵縣君崔氏師事大照禪師三十餘歲褐衣蔬食持戒安禪樂住山林志求寂靜臣遂於藍田縣營山居一所草堂精舍竹林果園並是兦親宴坐之餘經行之所臣往丁凶釁當即發心願為伽藍永劫追福比雖未敢陳情終日常積懇誠又屬元聖中興㣥生受福臣至庸朽得備周行無以謝生將何答施願獻如天之壽長為率土之君惟佛之力可憑施寺之心轉切效微塵於天地固先國而後家敢以鳥鼠私情冒觸天聽伏乞施此莊為一小寺兼望抽諸寺名行僧七人精勤禪誦齋戒住持上報聖恩下酬慈愛無任懇款之至右某官宣口敕語看可否者臣愚何足以知謹與某等議竊以名為帝皇圖者葢龜可以卜也鏡可以照也以前代帝王行事善惡以卜後代以前帝王行事善惡以照後代可以知盛衰興兦故其行事似堯舜者必盛似湯武者必興似秦皇漢武者必衰似夏桀殷紂者必滅如卜之必知如照之必見故謂之龜鏡圖伏如所示之圖謂之自古帝皇圖即可矣謂之龜鏡圖伏恐稍乖名實又多不出於正經或取諸子之說又取曹植飛龍篇摯虞庖犧讚等是一時文章之語非正經本傳之事至如堯之茅茨不翦土階三尺就之如日望之如雲舜之逐竄四凶舉十六族臣歌九德君撫五絃等善事夏桀之瑤臺瓊室殷紂之肉林酒池等惡事葢畫如此之類乃成龜鏡之圖至於伏羲生時伏羲之墓女媧腸化搏土為人如此之流豈為龜鏡若記帝皇之事總載無妨若為龜鏡之圖恐須簡擇又論元氣已後其圖似重太初與太始無殊有形與有質不異易云乾元亨利貞即未有物者乾之始也乾者元之體也元者乾之用也上猶道家旨道生一一生二二生三三生萬物又近佛經八識是清淨無所有第八識即含藏一切種子第六識即分別成五陰十八界此圖從元氣已下名目稍多臣識用愚淺不知忌諱敢率鄙見無任戰越伏惟聖心裁擇謹狀右臣比見道路之上凍餒之人朝尚呻吟暮填溝壑陛下聖慈憐愍煮公粥施之頃年已來多有全濟至仁之德感動上天故得年穀頗登逆賊皆滅報施之應福祐昭然臣前任中書舍人給事中兩任職田並合交納近奉恩敕不許併請望將一司職田迴與施粥之所於國家不減數粒在窮窘或得再生庶以上福聖躬永宏寶祚仍望令劉晏分付所由訖具數奏聞如聖恩允許請降墨敕右臣之兄弟皆迫桑榆每至一別恐難再見匪躬之節誠不顧家臨老之年實悲遠道陛下均平布政中外遰遷尚錄前勞仍收舊齒使備顧問載珥貂蟬趨侍玉墀從容瑣闥不材之木跗萼聯芳斷行之鴈飛鳴接翼自天之命特出宸衷塗地之心難酬聖造不勝戴荷踴躍之至
