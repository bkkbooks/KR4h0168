front:
  text: 全唐文欽定全唐文卷三百六十四庭芳天寶時人
  hash: sha256:6d76bae4e1be926f12629029ab36a247f79efe023c402359f99885cee183f561
  markers:
  - {type: head, offset: 14, content: 張庭芳, id: KR4h0168_NFKB_364-h1, level: 1}
body:
  text: 嘗覽尊德敘能述古不作竊所企慕情發於中顧有闕於慎言誠見貽於尤悔者矣然夫禁雞雖謬周鼠徒珍猶遇兼金以答豈獨盧胡致哂頃尋繹故中書令李鄭公百二十詠藻麗詞清調諧律雅宏溢逾於靈運密緻掩於延年特茂霜松孤懸皓月高標凜凜千載仰其清芬明鏡亭亭萬象含其朗耀味夫純粹罕測端倪故燕公刺異詞曰新詩冠宇宙斯言不佞信而有徵於是欲罷不能研章摛句輒因注述思鬱文繁庶有補於琢磨俾無至於疑滯且欲啓諸童稚焉敢貽於後賢於時巨唐天寶六載龍集強圉之所述也晉用天寶五載武進縣主簿昭明為神神正直而已其或歆夫諂祭厄我生人則神道喪矣故明命鬼神以為黔首此神祠者有吳公子諱季札賢而能讓信必由衷聽樂彰於識微挂劍表乎心許故以生則君子敬而讓之沒則國人思而像之宜其精氣作神盛德為祀日者時暘不若澤國尢亢露苗則暵風葉其黃俗憂無年人慮艱食我明太守兼江南東道採訪處置漳潮等六郡經略使彭城劉公名同升惠恤人隱保釐東夏仗樂胥之德三英有粲飛遹駿之聲萬人所望故聖主委連率之任百姓獲名子之恩布常始於人和為政先於農祀瞻彼雲漢有事山川南畝徒勤西郊莫潤駿奔執豆殷薦明神不待諒輔之積薪用馨我公之禴祭肸蠁斯應屑窣有聲油乎蔚雲霈乎其雨嘗未信宿果諾願言甘液驟霔於崇朝飛潦雱流乎中夜豈只四境霑霂固亦千里昭蘇非神睿智聰明憫厥士庶非公之惠人勤稼豐我粢盛則不能鼓潤隨車結欣遺秉者矣詩不云乎無言不酬無德不報况神昭我忠信錫茲純嘏福應宜答則惟其常是用嚴恭祀事敬羞禮物歌未任薦蘋藻所用報也夫道有著而用光德可歌而宜頌若神之德皆可歌樂焉有享其利而不報其功乎江陰縣令竇修睦樹德惟儼立政惟明惠愛洽於人心操割駭於神用獲斯介祉潤我編氓爰加繪事用答靈祐丞敬安孝主簿盧泆尉麴靄抱幹時之具蓄兼濟之才發言勇於公忠祇事勤乎夙夜實勞跛倚其吐馨香不有君子安能輯事乃相與斫豐石揚神休是歲大唐天寶五載季夏六月壬午三日甲申記鴻漸字子選濮州濮陽人第進士解褐延王府參軍安思順表為朔方判官安祿山亂從肅宗至靈武授兵部郎中纍除河西節度使兩京平徙荊南封衛國公廣德二年以兵部侍郎同中書門下平章事進中書侍郎以宰相兼成都尹山南西道劍南東川副元帥劍南西川節度副大使入朝進門下侍郎大歷四年卒年六十一贈太尉諡文憲臣內顧微躬自量拙分無片善可取無一事可稱皆緣際會參務軍國尸榮竊位公責所歸且智小謀大鮮不敗事福過禍生常然之理一自嬰瘵旬朔未瘳大減服食晦明異候竊料氣力衰憊恐先朝露乞遂退間庶安形神且臣素以疵賤敢期貴遠嘗慮薄質不勝重任今祿位俱極過逾涯量致此沈疴得非害盈思自損益冀通神理又不親政事臥受寵榮廢公曠時益增慙懼所以塵黷旒扆至於再三情迫於茲敢有所隱愚朴之性陛下素知漸加危頓豈容矯飾伏望罷其所授貸以殘生昔漢魏近臣有暮年多疾則賜告就第或再起復位若大限未盡羸疴漸平聖慈不棄馳策非晚重得珥貂彤庭鏘玉紫墀則竭力之日長乞恩之時少也如或殆至深慮何必暫榮儻生遂其志沒無所恨矣實冀皇天聽用於上訴太陽回舍於至誠俯納誠祈退令攝衛衰年餘齒殊私曲全受賜則多生涯之幸冬至祀昊天上帝夏至祀皇地祇請以太祖景皇帝配享孟春祈穀祀昊天上帝孟冬祀神州請以高祖神堯大聖大光孝皇帝配享孟夏雩祀昊天上帝請以太宗文武大聖大廣孝皇帝配享季秋大享明堂祀昊天上帝請以肅宗文明武德大聖大宣孝皇帝配享臣與禮官學官憑據經文講求正義事皆明白理無可疑去年又與辥頎歸崇敬同見延英備承聖旨祖宗配祭宜以殷周為法昊天時祀一遵皇唐之禮德音詳定久未施行百家寺宿迹在太行山南我唐天子所主之邦盡中國中國山嶽以千數太行為靈長太行延袤且千里有巖焉肇自高齊爰立茲寺以其巖平易可容百室故命之曰百家也觀夫畫閣高懸寒玉亂瀉勢連重冥居淩太虛軼浮景以遠耀帶流霞而飛動信梵旅之寧處又何必花為宮而瓊為池乎周人滅齊初隆中廢隋氏踐位厥名乃復然而乾剛不周生人畢墜於水火佛日未明像法與時而銷滅物不可以終否故天命既集於皇家惟聖祖建元嗣及我后赫赫在上以整亂略天平海清庶物遂成敖遊其中則莫之夭閼巳雖闕二字蕞處同慕緇錫闕二字獸心追崇塔廟詩所謂自西自東自南自北無思不服矣况於邇者乎前此者禪師處忠身具律儀言為訓誨萬衆蒙益千里向風故能磨嶄嵒翦蘙薈搖木斯拔巨石必轉儲供外辦功費不資歷數十年以授於門人曇最最公則公之尚德也敬求留事懋迹先賢行細一塵誓深溟壑由是特啓宏宇易置高廊抔土樹芳貫石行水動有方略隨其便安終今以來假有尺塗片瓦之力蓋無足云爾記有之凝冬不沍永日清暑盈虛應期潄浣流惡廚北靈泉利用之極也傾崖前表飛潦遠激皎如晴霓噴若風雷寺西瀑布威儀之觀也雙峯坼雲對壁爭峻仰攀霄漢下冥煙雨巖上天門通元之階也一徑橫亘紆餘乍滅靜出猿鳴視臨河嵩隱見眉睫極遠之路也若夫奇擅修竹嵇竈孫臺鄧封遺堆玉仙餘水昔人之休寄此地者豈不宜哉上座如航寺主英俊都維那善等蓋嘗聚徒而言曰處寂默者而以了心資言説者亦以入義非山林境勝何以臻此內通非文字旨遠何以宣乎外法會議刻石來徵豫詞夫賢明之長有博陵崔圭焉其二佐也敦信之士有崔伯嵓韋無擇崔皋焉能成之俊有趙璘焉協無異謀其敢勞讓銘之曰巖巖太行縱橫千里環厚地兮寂寂梵宮懸處百仞乘皓氣兮毫光月滿照清三界破昏類兮石為可久文亦播揚行佛事兮宇元宗朝官左司郎中出為會稽太守加給事中肅宗朝以太子賓客副郭子儀節度河中終吏部尚書一人垂拱百官象物典禮不易威儀孔昭屬三朝會同萬國咸造列辟勿褻天威不違彼景何斯伏奏茲日若灌夫之傲禮且不釋劒異尚書之寵光徒聞曳履尊於朝聘雖古代之有文失於敬守乃今日之無懵必也位崇蕭霍榮極縉紳民具爾瞻備周官之九命馬錫蕃庶類康侯之三接不可議罪終然允臧禮備吉凶義存燕享苟嘉事之不體豈刑書之獲宥命夔典教虞經所重立政崇術王制攸先國家授才任能講信勸學鄭聲久放不效文侯端冕簫韶已陳足使孔宣忘味顧是胄子舞斯嘉樂不能請業且服拳拳之道而乃將撻以速青青之刺樂師巡列蓋亦司存賴先父之職官敢有二習為於豫之擊拊能間六律撻之不謹謂得其忠誠厚責而難逃奚薄言之妄訴將視瞭成訟孰曰知言以瞽皋為詞何居昧識德之不務失鵠自可求身過也必文溺人無宜反笑澥字堅水天寶中進士纍授左補闕監察御史奉使朔陲露奏安祿山逆迹反為所搆配流盧溪至德初起為江陰令徵拜祠部員外郎遷刑部郎中上元中加御史卒夫物有形而必纍影隨形以相保窮希微而歸真信罔兩之合道豈其取舍焉得醜好諒不由其運行實稟之於元造原夫不皎不昧無失無得寧在陽而必遷曷處陰而自默罔言成象合莊叟之深衷責影辨疑異田巴之見惑豈徒飾詞比事所以尊道貴德增於物或有知其長短察於人孰可分其白黑搏之則微聽之則希將去彼而取此由虛往而實歸明引喻混是非用之於身豈疾走可息行之於國則至道之肥方來莫逆故往無思吾有影而何患吾有色而可遺同焉皆得沒而不衰尋邊鄙之於罔象鑄扃鐍合之於希夷夫然則豈止持操自保納虛為鄰復歸無物夫何有云匪勞逸之足眩曷行藏之是親任皇人之化迹通天地之不仁况我國家道周寥廓德及純粹撝偽歸真絶聖棄智漢陰抱甕而匿影赤水遺珠而有愧罔兩難明慌惚無纍徒以知人藏化見得思義儻微陰之所及幸餘光兮不我祕察河東人第明經五遷殿中侍御史由大理丞出為興州別駕時齊浣請斥王毛仲察漏其語再貶皇化尉鄭遠納錢五百萬將女易官先朝以元忠舊臣操履堅正豈獨尚茲賢行實欲榮其姻戚遂起復授遠河內縣令遠子良解褐洛州參軍既連姻國相父子崇赫逮元忠下獄遂誘和離今日得書明日改醮且元忠官歷三朝榮躋十等雖金精屢鑠而玉色常溫遠胄雖參華身實凡品若言齊鄭非偶不合結縭既冰玉交歡理資同穴而下山之夫未遠御輪之已周無聞寄死託孤見危授命斯所謂滓穢流品點辱衣冠而乃延首闕陬宜從擯斥雖渥恩周洽刑罰免加而名教所先理資懲革請裁以憲網禁錮終身鼎官司勛員外郎聖人常夕惕而不寐懼時令之有失欲禦雹於明年必藏冰於是日深山窮谷於是收桃弧棘矢而後出蓋所以息天時之暴沴成國家之元吉不然者當純陽之用事有伏陰之相蒸炎雲際天而涷雨驟落芳草竟野而淒風暴興夫傷穀者莫大於雹禦雹者其在乎冰俾四時之事不悖信七月之詩有徵日臨下土時在北陸乃命凌人出斯冰谷威剌剌而正切聲沖沖而轉速雖暫勞而可倦終永寧以多福今國家酌於故實考於先王雖雹可以禦亦冰其是藏等至仁於天地曾何咎於陰陽斯道可久百王不改苟或失之四方何罪周官之禮是具魯史之言斯在抑為人者仰於食動於天者唯其德苟能用於天道自可忘其帝力夫如是用天與地自南自北寧有夭折之苦曾無凍餒之色若待反時以為災其何禦之能得殷其靁在南山之隈黑蜧翔雲暗天起黃雀驚風動地來飄忽兮霏煙驛霧拂樓臺慘烈兮飛砂走礫揚塵埃波濤翻而海水激樹根拔而山石摧於是陰陽交戰晦明相賊或擊或馳乍通乍塞望騰蛇之上下見飛龍之南北電光開而山澤紅雨氣合而原野黑威聲奮擊於霄漢逸響振動於都國爾乃隱軫徘徊謂高天壓而泰山頽鼓怒發泄謂厚地震而梁木折聲之所射者向無不碎氣之所奔者中無不絶值石則片片冰開當樹則重重瓦裂其為始也則赫赫奕奕若烈風猛火之燎崑崙其為終也砰砰轟轟若決水轉石之潰龍門擬戰鼓則三軍亂擊方戎車則百兩齊奔川嶽為之搖蕩天地為之晝昏豈直聞之者掩耳而奪氣見之者瞑目而埋魂若斯而已哉觀其咈鬱氤氳騰波磊落輝光之所倏閃聲氣之所噴薄豈在微而應必有感而作擊齊堂也識孝婦之懷冤震魯廟也哂佞臣之隱惡故導風伯從雨師以豐隆為號令以列為鞭笞洪崖飛霆以瀝液奔源走沫以流漦迫鯨鯢使蹭蹬怛蛟螭使躨跜蛙黽喪明於竈穴鱣鮪失路於庭墀當此時也別有迹履姦慝事兼狂狷想人孽之無逃慮天災之有譴各憂心而股栗咸戢驚而肉戰惟重華順之而不恚宣尼驚之而不變若乃依仁遊藝之伍含道養性之流心且靜而神逸名既揚而行修通人倚柱而坦蕩孝子繞墓而思柔苟有言而寡悔夫何懼而何憂亂曰我何憂兮憂天怒豈不欲往兮為多露我何懼兮懼天威豈不欲往兮露未晞素履直載時道善肥古而可作吾與同歸伊昔三方列峙惟魏宅中五都分設因鄴為宮北走邯鄲燕薊南馳鄘衛河潼於是聖武欽若啓戎締經國之初構立濟世之元功受命而創洪業取威而定㣥雄土德王始炎靈告終天滅漢歷國封魏公黃星徵於分野素秋建於茅社諏良日兮御靈壇坐千乘兮馳六馬錫彤弓兮張海外受金印兮安天下不飭不美無以壯哉營宮營室是為王者乃僝梓匠掄王褱材伺農隙悅子來六府垂象制文昌之廣殿百工獻藝造銅雀之高臺壯閶闔於昭回軼沆瀣於煙埃俯臨而漳滏水合仰觀而宇宙天開返道截梁兮漫延紅簃縞壁兮徘徊連雙闕於日表飛纍榭於雲崴崒如五嶽干霄而岌立山對若三山出海而崔嵬金雀踶甍而欲翥玉螭盤柱而將回召詞人於華屋留舞客於瑤杯登高必賦無遠不該洎乎鞠旅卭筰反斾咸洛雖納漢以吞江終頽山而擠壑遷神於建始之殿返葬於壽陵之郭慷慨遺文淒涼舊閣樽盈玉座燈映蘭幕婕妤妓人鼓舞歌唱當春月而朝臨悵日暮而西望見松柏之成行愁歌舞之相向異哉戰雖必克愛亦有捐戰可以力勝愛難以威全撫四子兮魂斷念六宮兮涕漣何壯圖之夭閼而閨思之嬋娟紆曲念於弊履昏盛德於繁絃非達人之所繫豈至尊之宜然歲月其除君王安在出入三國芟夷四海號諡殊徽質文異采及石氏之謀帝位高歡之竊神器雖修舊而增崇竟移時而改代銅龍噴水似落九天金鳳銜珠終淪五彩我君遑遑行指鄴旁弔古太息馮高獨傷東郊道兮蕪漫西原樹兮微茫露窟吒兮泣蒼蘚風蕭梢兮悲白楊妝樓歇豔畫閣銷香陂陀巖屼巋峞摧藏井幹滅兮有遺甃殿垣毀兮無華構但見蓁蓁蒿棘生復看觺觺飢鼯鬥雨嘯幽魕月哀離狖宿莽撑骨危巢覆鷇平皋晚兮拱木生寒紫陌昏兮黃埃奪晝人壽幾何留恨日多追士衡以投弔效明遠以作歌歌曰銅雀蒼蒼對古馗清風切切有餘悲試憶望陵三五夜便是西園明月時天何言哉信陽去而陰來器之形矣必虛往而滿止埏埴為質惟人為軌靡不有初方應物以虛已鮮克有卒因藏鏹而見圯其中也幽幽冥冥其外也青青熒熒積而不散持莫能久何始吉而終凶竟出無而入有豈獨夫魯廟欹器中則正而滿則覆周陛玉人和其容而端其口譬高流而岸圻等珠盈而蚌剖日中則昃月滿則虧故君子終吉以流誡天地勞謙而自卑別有孫宏舉賢不患於貧窶長倩投贈竊勵於風規苟欲全身而避害固可翹動而鑒斯聞夫日中則昃鼎折則傾月容守而忌滿神道福謙而害盈聖人察兩曜之度觀萬物之情知務進者危於不止擬貪取者敗於幾成爰制座右與人作程開其可誡之迹加以必覆之名然而不增不減能正能平考低昂而必應亦有效於權衡爾其顛沛是虞包藏自縱或益之而損故至其滿成覆餗之凶或損之而益故當其無為有器之用且聖人云其脆乃破其安易持則何不避禍於將盈之日圖全於未兆之時力小任重鮮不克敗滿而既溢傾必從之亦猶富不與侈會貴不與驕期若以馬而喻馬則念茲而在茲又曰積德不積財無為故無敗貪祿者致禍增高者致壞是以古人作則為今人之師前車覆軌誠後車之誡借如乃武乃文巖廊之君一生一死繁華之子故當觀其所由察其所以嗟乎福兮禍所伏禍兮福所倚既禍福之無門信吉凶之由已且喪道則貪邪貪邪至於喪生知足則不辱不辱在於知止苟欲圖安以遠害又宜去彼而取此則知欹器之器大哉吾將以為教始地惟洙泗人參鄒魯闕里之詩書斯在奄中之禮樂不渝孔叢子風樹搖悲寒泉動思霜露云惕日月其除是以君子為難子皋親喪而永慕先王制禮孟獻禫懸而不樂既祥絲屨見孔父之深譏行奏綺琴聞子輿之雅操且恩懷罔極五日樂禁於成聲哀貫終身踰月禮通於作樂去順效逆魯史稱其速禍朝祥暮歌鄒人據而興誚節哀順變雖殊念始之心以今况昔未悖送終之禮欲加之罪其如詞乎百王率由禮建方社六服咸若寄切維城列玉瑞以推尊錫圭田以表德綬分四色爵配五等開國稱孤彼既光於祖業列筵設奠此何昧於家聲言念庀牲空慙掩豆雖展敬於如在果見嗤於不毛葬以大夫禮既隔於問子爵為侯氏祭豈及於謀孫親牽之用頗乖受脤之名應缺自須聞義能徙何不以欲從人理歷明時創自軒邱之帝寅餞納日制彼丹陵之主散在國典鬱乎疇人甲以妙察五均工言三統雄管雌管候六間而靡差上生下生稽五行而得象乾坤並位律固聞於娶妻陰陽易方呂實號於生子豈曰三星之會何驚十月之祥顧不謀於白圭寧取信於緹幕如簧之口雖欲加人匪石之心安能引咎疑則合闕妖則謂何田園燕坐知陶潛之罷職冠冕已挂見疏公之出祖雖吏由推擇而道在雲山脫幘而行不顧棲鸞之局觸網嬰坐何逃建隼之司必也避譴韜光輒去無宜免幘况乃銷聲自逸既往不咎挂冠緬維晉史詎抵蕭章矧當堯舜之代宜縱巢由之隱欲加之罪其無詞乎棄高蹈而可嘉雖小吏而何失竊詳州斷未叶通規人生最靈魂變為物儀陳祭禮祀分物類品第有差等威是列秩牽朱綬雖登命於大夫廟闕丹楹未為能於孝子祭寢非約用牛是泰儉以逼下己闕晏子之節禮而僭上更知管仲之罪蘭臺陔履雖陳膳柏署彈違竟持霜古訓是則今令未裁且祭寢祭廟既有秩而分求牛索牛豈無故而殺劾而是誡誠窒惕而有孚訴者非辜終屨校而無咎光乘天寶九載官費縣尉費城之井昭然道周土缶舊得石幹今修徵大易之不改垂一善於千秋湜開元時人夫大易究天地之心老經遊道德之奧非先非後無始無終不行而至不疾而速跨億齡而超萬祀不以為長馳寸晷而迫分陰寧云是促寒暑乘之而斡運四時行矣動植稟之以資生萬物成矣若乃注元精而懸斗極皇運以興陶正氣以立乾維帝圖爰啓故軒后以道登於雲天唐后以德遜於尊位其餘法寶歷總璿衡皆以沖妙宰域中元通御天下逮秦皇慢德漢武驕真幸集靈之宮遊祈年之館心非至懇意屬無厭徒健羡於一時竟貽嗤於萬代眷言魏晉咸瑣瑣焉迄至陳隋並區區者是知道之昌也無為之化若斯道之喪也有纍之求若此然則否終則泰窮變乃通得之一朝必復昌運我大唐之御極也應盤古而開混沌法太乙而掃欃槍降靈元始之前提象太初之外乾坤翕闢飛龍之德在天河洛經通神馬之圖出地高祖神堯皇帝鑣宮授籙推亡懷負勝之圖太宗文武聖皇帝蘴戶收祥馭朽握瑤光之運高宗天皇大帝撫大鈞而司左契執大象而御中樞籠徽於七十二君飛英於萬八千歲中宗孝和皇帝小心恭孝大度寬仁上奉宗祧下安黎庶睿宗大聖真皇帝神功不宰聖謨廣運以由庚而安壽域以洪範而享昌年開元神武皇帝變代重光創業垂統撥亂反正應天順人知微知彰朝北辰而刊玉惟精惟一會九牧而鑄金惟幾也能使遐邇肅清惟神也能使幽明暢謐濛汜抵於暘谷同文同軌火坂際於冰邱一尉一候其公卿也則伊周贊翼其牧守也則邵杜綏懷文以化成虞庠有籯金之業法惟刑措夏臺鮮辨璧之疑爾其南畝澄清有如京如坻之積東山舉逸無在薖在軸之幽大樂舉而音律諧大禮備而威儀整俗知和樂人識訓章加以九苞六象之禽止庭巢閣雙觡五蹄之獸入囿馴郊慶雲舒玉葉之陰甘露灑金莖之潤海貝積而江珠滿山車至而澤馬來其餘絶瑞殊尢應圖合牒者不可勝紀焉由是赤駱青旗坐明庭而頒國政金繩玉版封日觀而紀天符曷以臻茲蓋皇上得玉真之要道也故能範圍三大陶冶六虛侯其禕而眄其美矣沖陽觀者梁普通三年刺史邵陵王奏置奉詔造焉其觀當置之際山頂常有雙鶴棲託每天氣清朗日色晴明西飛雲衢東至廬嶽其居也乃爽塏之層阜博敞之奧區南眺平原北臨激水松子之峯非遠王喬之嶺猶存左對崇巖右瞻穹岫排雲掩日背陰向陽狀若幃屏圖經之載數矣以其仙鶴沖翥居處向陽二美可嘉故有沖陽之稱矣其地也上躔景緯牛斗寓其精下料山澤廬江嶮其鎮徒觀其數峯朵壑浪水瀼階風被邃庭雲華鏤楶瑤林寶蘂髣佛三珠之麗邃宇崇堂依稀七寶之飾真容式備道氣殊高少華金童捧香爐而入侍太清玉女持真訣而來儀鑿沼營壇宛在風塵之外藥堂經藏蕭然松石之間此實元聖之殊庭列仙之遊館也逮於垂拱四年冬遂為野火所侵回祿揚光軒廊發焰昆山之火燎及芝田麋氏之災煙侵桂棟致令元門殆毀仙構俄傾迄至開元之初猶闕真君之院爰有北嶽先生洞元蘇慕道等凝真牝谷養素清溪長往之迹逾高幽貞之志彌遠多端濟物寡欲探微痛此荒蕪乘茲舍施衣布之外衾被罔留撫遺迹而興工想全摹而崇葺日役攸勸風匠是憑洞開妙門式圖真彙炳乎丹鋪翠幌奐若秋水春臺鏤度元關重莊昔像影升元籥更飾仙儀鳳憩龍盤宛然功備把十蹈五鉤繩極妙能事斯畢不其然矣刺史趙郡李訥弓傳虎石將軍橫北塞之勳構襲龍門司隸擅東都之望愷悌君子名教中人詞場則蘭桂叢生學海則蓬壺對出聲流宸扆道暢黎蒸風符三月之春人荷二天之福別駕趙郡李承允即州將之族父也長史京兆韋公允司馬滎陽潘公綬並題輿九派展驥二梁雅譽邁沂土之歌美政完荊南之價化宣千里無勞庾亮之書功贊六條自得應詹之佐司軍功參軍長孫子尚司倉參軍姚令珣員外司倉參軍江克勵司兵參軍孫司弻司法參軍張延祚參軍陳德直嚴幹等八音繼響以同舉五色聯暉而異趣鳳藻揚日鶯遷弄春梁竦深恥屈為州縣王彬博綜甫就典兵徐稚枉器於功曹楊珠屈聲於從事豫章擢七年之秀鷦鵬即六月之圖縣令黃撝主簿周暉尉宋不羇孫匪逸等並椅桐梓珠貝球琅禮樂專門詩書領藝家邦共理忠孝相資博通應時恭勤揆務嚴明既斷擲伏如神割滯豈異於解牛繩夭夭心不殊於逐鳥鄉人楊公定周仁珙等茂族高門魁岸豪傑或挂冠而從三樂或結轡而騁九衢咸捨淨財以追冥祐具題爵里勒在碑陰所冀證福今生銷災往劫某頃因祗役齊沐朝真躬謁崇祠覩茲勝躅悠然長想悵矣高風此際綱維道明祈請雖幼懷輕舉竊好神仙未逢太上之家不遇麻姑之席自惟庸鄙輕讚元功何敢述其天倪但且書其甲子昭宣不朽而為頌曰大哉元氣邈矣真圖寧窮妙象罔究鴻爐道氣方振澆風未敷發暉元籙何賢墨儒其一睢盱莫測肸蠁難名蟬蛻滓濁神遊太清沈尸載起枯骸更生韜光祕訣養正真經其二變相從雕驅淳入詐質文互起昏明遞謝燧火御圖觀龍演卦詭類千品殊形萬化其三鳴呼主唐異聖重光化吞邃古聲超上皇六幽允塞三靈再昌御九登運得一乘陽其四稟惟皇猷光宅天休張我元籥清我道流雙童晚憩四子晨遊山棲白鶴關度青牛其五至人有為重爻是考藝閣三襲琳鑒七寶海聖澄真天神御昊含潄靈液規模元老其六一人有慶萬姓攸資仰稽真宰式鍊精思往焚仙桂今植靈芝惟其嗣美賴我真師其七王命良臣作牧江曲英英佐二濟濟寮屬中和演化威恩動俗衆妙所歸㣥生是屬其八廬峯之右吳江之南仙居隱隱邃宇耽耽道原巨濟洞穴難探荃微思拙文何以堪其九荃官左羽林兵曹參軍直翰林學士內供奉上柱國遁甲開山以方色受土水行作鎮元枵司野截巨壑以波委指平陸而海清壓旄頭柱王國蔽虧日月棲泊雷電可久可大取諸恆也恆之靈藏往知來威遠懼邇陰陽不測之謂神神聰明正直害盈福謙裨我淳黎荒札不勃拯膏雨佐秋成再蠶獻功六擾呈逸有孚盈缶奚貴而無位哉古者天子望于山川遍于㣥神未嘗王五嶽而公四瀆大唐開元天寶聖文神武應道皇帝登泰山躡社首範圍天地幽贊於神明柔兆載上元庚寅詔曰五方定位嶽鎮總其靈萬物阜成雲雨施其潤上帝攸宅寰區是仰其岱宗西嶽先已封崇其中嶽三方典禮猶闕降神布澤同致福於生人肆類尊崇未齊名於禮秩永言光被同叶靈心其北嶽可封為安天王所司擇日奏聞龍集丁亥律中姑洗壬午錫以金檢玉册庪縣禮也夫聖人以天地為本陰陽為端五行為質北嶽水正也乙酉水命也大君有命如彼北嶽鼎然不渝受茲介福益無方也驃騎大將軍員外置同正員兼范陽郡長史柳城郡太守平盧節度支度營田陸運兩蕃四府河北海運兼范陽節度經略支度營田副大使採訪處置使兼御史大夫上柱國柳城縣開國伯常樂安公曰祿山國之英也八柱承天三門出將風順遼海霜明憲秋山戎朝鮮繫頸請命明威將軍守右威衛將軍使持節博陵郡諸軍事兼博陵郡太守北平軍使上柱國賜紫金魚袋武威賈公曰循時之傑也康侯分符師貞受律英略外斷沈謀內融清潭無私虛谷必應趙人化之如春陽也朝議郎攝別駕上柱國賞緋魚袋信都馮公承相中散大夫行長史上柱國賞紫金魚袋清河張公元瓚人之望也利物足以和義貞固足以幹事威搖商秋德湛行露通直郎行録事參軍滎陽鄭旻宣義郎行司功參軍汝南同王帝兟奉義郎行恆陽縣令高平郤懷玉吏之雄也貂蟬稱家冰水作吏箘簵方徑球琳有聲僉曰聖王先成其人而後致力於神國其祉也昔省方展禮於虞帝敬鬼尚祀於殷人未有加望秩之榮錫封崇之號斯蓋我皇之能事也燕山有石碩儒有文既述且刊超變陵谷銘曰維恆兮作鎮壬癸善利萬物兮德配諸水雄峯屹立而朝山邐迤閃電雷訴神鬼其神靈兮福之所履福善禍淫而正直如矢其一君恩覃兮流湯湯汨神道蕩鬼方四瀆為公兮五嶽王山戎臣首而犬戎北亡勒貞石以一固浮大海之三桑其二混之開元二十四年官鹿泉縣令我國家再誓山河重懸日月明罰敕法核名實之故典考績宣力甄象魏之舊章皇道煥炳而時承帝載緝熙而日用德惟善政政在養人若令長子男銅章墨綬而尤善最者可屈指而知宣父中都太公灌邑童恢責獸卓茂遷蝗男女別途鬼神息暴以今方古君何讓焉君姓龎氏名履溫字若水南安人也其先齊逢伯陵之裔曾祖卿惲元勳佐命功臣第一等左武侯大將軍封邾國公食實封四百戶贈幽平燕易媯檀等六州諸軍事幽州刺史諡曰肅歷數雖改雲雷尚屯披荊棘者馮吳佐元功者蕭鄧將盟帶礪畫象雲臺圖兼衛霍之容仕遂漢光之願疇庸賞懋食邑論封祖同福并州大都督府司馬饒州刺史左衛將軍安北都護外揆望殷銜珠寄重匪親不拜匪賢勿居皂蓋南臨尋振喬卿之譽紅旌北卷式標鄭吉之能考承訓通事舍人鄭州司馬贊善大夫率更令將作少監辭令抑揚綸鳳述旨題輿叶詠展驥治中洪洞方樟允供於邦造激揚少海贊裕於搖山君純德天資大材靈降龍章鳳彩凝脂點漆出忠入孝遊藝依仁荒蕪四壁寥廓千丈代陪豐沛親預葭莩翼鱗翰之闕二字風雲之會漢表有外戚恩澤周詩有申伯渭陽起家補昭文生從勳閥也長安二年明經擢第拜宣州參軍尋授莫州司功參軍事秩滿丁二親憂痛瘁塋枝哀酸鄰社往而不返杖而後行衰禫一年甫從常調開元十九年春會府遂拜公為此縣令魯子皋之為政禮變郕人漢原涉之舉能威行谷口庶矣富矣又何加焉導之齊之非君莫可君有善政者七風雹咸下於屬城樹稼獨滋於元氏其政一也頃以陽光暫亢陰液乖旬苗慮螣興人或狼顧公罄奠圭幣稽顙壇場俄而油雲四周膏雨百里其政二也闢土災畬用丁分地勸東作而播稼課西成之銍斂躬臨樹藝親載酒醪故使夏農服田秋得其實其政三也詢知疾苦所患虛丁撫狀上陳應時申削籍無闕稅人獲息肩其政四也修職奉符不為進越下有鬱滯必掣肘諭言每課田租時臨調賦寬為限約曾無再輸其政五也此地俗多懻忮跕屣彈絃素曰難持更承寬弛公整其銜策謫其權豪輒去害㣥悛心斂迹其政六也先縣館宅湫漏與百姓雜居公薄責人傭先抽已俸雖難與慮始而可以樂成其政七也是以廉平稱職西河知魯衛之風清儉當官南土變夷齊之俗可大可久是謂賢人之德惟幾惟深以成天下之務公儀如繪畫神若轉規聲以聞於震雷用無待於周月惠如春露吏人不能窺喜溫之容潔若冬冰貨殖不能動首陽之行蓄霜鐘於絳府有感必通棲月鏡於元臺觸形皆照邑老謝虔祐等並鄉庭積善掾吏安排行義以達其道隱居以求其志相與族談城府錯立康莊褱德匪舒宣風技癢或叫帝閽而抒美或邀使駕而論功衆志懇誠如寒附火於是圖徽翠琬託懿金聲其詞曰清風泛濫兮其來溥茂宰馳能兮超卓魯雞犬相聞兮人安堵一同仰之兮如父母聽謳謠兮詢疾苦踰屬城兮光趙部趙部遺風兮多懻忮君子為之屏姦偽化澆浮兮勗以義邑尊三兮市無二政勝殘兮仍博施如水火兮時不匱刊石鐫金兮遠傳懿直為循良兮守名器孚肅宗朝由司膳郎中擢給事中大歷中授銀青光祿大夫行兵部侍郎上柱國清河郡開國公有唐廣德二年八月五日朔左金吾衛將軍臧公薨於闕都安邑里之私第享年五十有三大歷五年十月十五日葬於三原縣長坳鄉禮也公諱希晏字恭靖先封受氏奕葉重光僖伯諫魚哀伯諫鼎文仲立德武仲立言傳慶闕三字之闕六字之際子孫有後大庇生靈述職因官今為京兆人也曾祖君寵通議大夫靈州長史祖善德銀青光祿大夫銀州刺史贈太子少師父懷恪右領軍衛將軍魏州刺史上蔡侯贈工部尚書重世將門一時人傑光臨舊圖非驚於守器繼登列郡載美於家乘元社白茅式旌餘烈爵明朝也握五兵之要漏幽泉也追八座之尊禮備哀榮澤覃存歿名器之重今古無儔而高門棨戟前庭鐘鼎谷量千駟之馬籯滿萬金之裝三武邁賈氏諸昆八元為高陽才子公幼負奇節長標雅操用武則武可畏學文則文足昭鬱為圭璋俯拾青紫常以為千戶侯力可取萬人敵才之餘故藝總九流射穿七札長纓係頸於閩越短兵斷臂於胸奴開元理兵之歲塵飛碣石烽照甘泉盧龍北陲胡馬南牧克貞師律闕二字親賢天子御正陽前殿乃命禮部尚書信安郡王建牙璋擁金節控弦草萬以專征之六郡良家公為特出而有征無戰闕二字勞旋公以為揚雄執戟阮籍步兵千古同年我無慙色其後出右地窮河源收堅城拔高壘戰勝攻取左旋右抽合變出奇智闕神遇以闕功纍遷至衛尉少卿尋加西受降城使河曲之間威聲載路屬三水之地五載未巡公侯腹心受委而拜遂以公為東闕皇城使遷左監門將軍兼麟州刺史無何轉慶州刺史去思來暮行古之道特拜太僕卿兼寧州刺史夫漢宣共理所以寄諸侯也周文以寧是用咨多士也故佩中朝之印褰外臺之帷抑有由矣屬親征振旅薄伐弔人駐蹕而萬姓來蘇迎鑾而百神望幸由是闕其列郡因為行宮頓六龍之旗儀雙鳳之闕擇能作牧匪易其人以政理殊尢拜左金吾衛將軍左街使任切爪牙寄崇心膂廣利功業亞夫闕名方欲鑿出師之門分制軍之閫未加明命忽閟幽泉故老泣於邊疆賢臣愴於冠劒將星夜落陳雲朝起凜然餘勇千載猶生故夫人贈燕國夫人劉氏百代舊封五公貽慶嬪則彰美姆訓垂芳生前已飾其闕井歿後更封於石窖先公早逝合祔同歸公之季弟希讓御史大夫工部尚書渭北節度贈太子太師往與公更執金吾同參玉帳王肅儀貌陳平智謀雄憲臺之一闕殿長城之萬里因心則友義切天倫嗣子睦王府長史叔獻次子郢州別駕叔雅季子河南府河清縣主簿叔清欒欒孝思攀號罔極羔柴泣血曾參絶漿喪過乎哀行過乎禮敬承副相之託式紀冠軍之銘銘曰臧孫有後千古立程才為將略道實人英出入三代光臨百城執金之寵闕二字之榮闕二字初授闕堂定傾闕六字嘉名陳氏父子荀家弟兄高碑之上長紀忠貞
