front:
  text: 全唐文欽定全唐文卷七百五十六杜牧九
  hash: sha256:5fc712187850f14a9656e228d5b5353c1a8c9a372fd1f7cbc69f1ce3ded67792
body:
  text: 灞陵駱處士名峻字肅之華州華陰人也當建中四年年二十遊京師值泚亂為其黨源休拘委以事處士逸一日夕行二百里拜親於華陰因啟度賊終不能東出百里間鄉里不足憂願得一見天子於艱危中遂入奉天至漢中屢以兵食干執事者後長安李懷光踵叛關中公私饑李馬渾兵十餘萬計日餉食有司因請授處士岳州巴陵尉繫職於饋運間後四遷至揚州士曹參軍至元和初以母喪去職哀哭濱死終喪因曰汚吾跡二十餘年者食豐衣鮮以有養也今可以行吾志也乃於灞陵東坡下得水樹以居之相國杜公黃裳在蒲津相國張公宏靜在并州大梁渾尚書鎬在易定潘侍郎孟陽在蜀之東川司徒薛公苹在鄭滑皆挈卑詞幣馬至門曰處士不能一起助我為治乎皆以疾辭長慶初桂府觀察使杜公凡兩拜章乞為梧州刺史詔因授之眾皆曰今黃家洞賊熾邕容兵連敗縮首不出猶鼎鼈耳交阯殺都護復旱亂相仍朝廷豈捐此三處不以公治之而久置公為梧守耶處士慘而讓祇以疾辭解訖不言其他爾後人知其堅不可復動矣田三百畝菓蔬占其一捽墾辛苦不受人一錢惠朝之名士多造其廬未嘗以栖退超脫之高露於言色溫敬畏下如勇於仕進者論及當代利病活人緩邊之策必亹亹盡吐冀達於在位者至於安危機鍵之語默不出口尢不信浮圖學有言者必約其條目引六經以窒之曰是乃其徒盜夫子之旨而為其辭是安能自為之善圖山水狀鑒者比之朱審王維之儔鄉里百家鬬訴吉凶一來決之凡三十六年無一日不自得也以會昌元年十一月某日卒年七十九以某月日歸葬於華陰縣先人之墓處士嘗曰相國劉公晏不急征不橫賦承亂亡之餘食數十萬兵者二十餘年斯過蕭何遠矣每長短校量今古富人強國之術我烈祖司徒岐國公丞相趙國公李公當貞元元和時儒學術業冠天下每與處士語未嘗不嗟嘆其才恨其尚壯不可屈以仕優禮接之嗚呼賢哉銘曰不見可欲使心不亂古之作者窮栖自斷子伯子至王霸久臥向栩相趙馬良車煥子夏高弟心中交戰處士之居落青門畔文駟連覊繡軒交貫危冠自喜前縈後絆言訖揖去一如不見我齒未衰誰知已知岐公主師見必迎喜語必移時論兵計食屈指無遺功名富貴不能釣之諸侯六辟南服一麾笑而不答亦無是非三百畝田百實滋繁三十六年食具衣完今其去矣誰知其端嗚呼賢哉憲宗皇帝即位八年出嫡女冊封岐陽公主下嫁于今工部尚書判度支杜公悰始憲宗時宰相權德輿有壻獨孤郁為翰林學士帝愛其才因命宰相曰我嫡女既筓可嫁德輿得壻獨孤郁我豈不得耶可求其比後丞相吉甫進言曰前所奉詔臣謹搜其人因名我烈祖司徒岐公曰有孫兒悰年始弱冠有德行文學秀朗嚴整臣嘗為司徒吏熟其家事官族世婚習尚守治臣一皆忖度疑悰可以奉詔帝即召尚書見與語大悅授殿中少監服章金紫以元和八年某月日主下嫁于杜氏上御正殿禮畢由西朝堂出節幡鼓鐸儀物畢備引就昌化里賜第上御延喜樓駐止主輪尚書及賓侍酒食金帛奏內樂降嬪御送行賜第堂有四廡繢椽藻櫨丹白其壁派龍首水為沼主外族因請願以尚父汾陽王大通里亭沼為主別館當其時隆貴顯榮莫與為比主實憲宗皇帝嫡女穆宗皇帝母妹敬宗皇帝今天子親姑尚父汾陽王子儀外曾孫太皇太后始以正妃事憲宗以太后太皇太后養愛三朝凡四十年德厚慈恕化充六宮主以一女之愛降于杜氏逮事舅姑杜氏大族其他宜為婦禮者不翅數十人主卑委怡順奉上撫下終日惕惕屏息拜起一同家人禮度二十餘年人未嘗以絲髮間指為貴驕始與尚書合謀曰上所賜奴婢卒不肯窮屈奏請納之上嘉歎許可因錫其直悉自市寒賤可制指者自是閉門落然不聞人聲尚書讀書考今古治亂主職婦事承奉夫族時歲獻饋吉凶賻助必親自經手池塞館陊闢毬塲種樹不數十年搢紳間雜然稱尚書有賢婦尚書旋出為澧州刺史主後尚書行郡縣聞主且至殺牛羊大為數百人供具主至從不二十人六七婢乘驢闒茸約所至不得肉食驛吏立門外舁飯食以返不數日間聞于京師眾譁說以為異事尚書在澧州三年主始入後出中間不識刺史廳屏尚書治澧州考治行為天下第一後為大司徒京兆尹鳳翔節度使朝廷屈指比數以為凡有中外重難非尚書不可主賢益彰雖至宮闈貴號亦加尊敬姑涼國太夫人寢疾比喪及葬主奉養蚤夜不解帶親自嘗藥粥飯不經心手一不以進既而哭泣哀號感動他人尚書後為忠武軍節度使所治許州創為節度府五十年南迫於蔡屋室卑庳主居無正堂處東支屋恬然六年許軍彊雄且撐劇寇自始多用武臣治各出己部曲家人疵政弛法習為循常有司用比邊障遠地擲置不問民亦甘心尚書再治之老民相率兩走闕下遮丞相馬叩頭乞畱請樹生祠及詔追去攀轅擕扶哭於道路尚書治外主治內尚書所至必稱崱崱為名公偉人主實有內助焉穆宗以太皇太后敬主尤為親信俯首益卑車服侍使愈自貶抑覲謁溫凊外口不言他事訖穆宗朝人不以親貴稱當貞元時德宗行姑息之政王武俊王士真張孝忠子聯為國壻憲宗初寵于頔來朝以其子配以長女皆挾恩佩勢聚少俠狗馬為事日截馳道縱擊平人豪取民物官不敢問戚里相尚不以為窮弱自主降于尚書壁絕外之初怒中笑後皆敬畏累聖亦指示主德以誡警之至于今以主尚書顯重于中外戚里亦皆自檢斂隨短長為善於是舊俗滅不復有尚書自許奉急追詔主有疾小愈強不肯畱曰去朝興慶宮縱死於道吾無恨以開成二年十一月某日薨於汝州長橋驛享年若干上廢朝三日其年十二月某日主喪至京師比及葬兩宮弔問相繼於道開成三年某月日上御正殿詔丞相嗣復攝中書令正衙宣冊諡曰莊淑大長公主某年某月日祔葬於萬年縣洪原鄉少陵原尚書先塋禮也生男二人長曰輔九年十歲次曰楊十始二歲女二人某於尚書為從父弟得以實銘銘曰章武皇帝唐中興主刑于正妃教及嫡女婉婉帝子下嫁時賢影逐響答隨順纒綿杜氏大族枝蔓蟬聯上有舅姑高堂儼然螭綬龜章玉佩金軒養色悅意待後承前人不我貴我敬我虔始終盡禮大小周旋餘二十年誰興間言貴不召驕富不期侈是此四者倏相首尾自古名士或泥於此孰謂帝子超脫擺棄婦職是勤夫言是指池荒館陊屏外不履淑德柔風天下傾耳宜乎壽考婦女婚子不錫全祉孰提神紀幽石有誌顯筆有史流于千祀浙江西道都團練觀察處置等使上柱國清河郡開國公食邑二千戶贈吏部尚書崔公行狀公曾祖綜皇任醴泉縣令祖佶皇任太子中允贈右散騎常侍父陲皇任檢校吏部郎中兼御史中丞袁州刺史贈太師公諱郾字廣畧威儀秀偉神氣深厚即之如鑒望之如春既冠識者知不容於風塵矣貞元十二年中第十六年平判入等授集賢殿校書郎陜虢觀察使崔公琮願公為賓而不樂之挈辭載幣使者數返公徐為起之且曰不關上聞攝職可也受署為觀察巡官後轉京兆府鄠縣尉遷監察御史殿中侍御史刑部員外丁邠國太夫人憂杖而能起人有聞焉外除拜吏部員外郎判南曹事千人百族必應進而進公親自挾格肖法必畱戾程必黜每懸牓舉牘富室權家汗而仰視不敢出口宿吏逡巡縛手係舌願措一奸不能得之凡二年遷左司郎中吏部郎中加朝散大夫旋拜諫議大夫兼知匭使穆宗皇帝春秋富盛稍以畋遊聲色為事公晨朝正殿揮同列進而言曰十一聖之功德四海之大萬國之眾之治之亂懸於陛下自山以東百城千里昨日得之今日失之西望戎壘距宗廟十舍百姓憔悴蓄積無有願陛下稍親政事天下幸甚誠至氣直天子為之動容斂袖慰而謝之遷給事中敬宗皇帝始即位旁求師臣今相國奇章公上言曰非公不可遂以本官充翰林侍講學士命服金紫旋拜中書舍人仍兼舊職侍帝郊天加銀青光祿大夫高承簡罷鄭滑節度使滑人叩闕乞為承簡樹德政碑內官進曰翰林故事職由掌詔學士上曰承簡功臣允也治吾咽喉地克有善政罷而請紀入人深矣吾以師臣之辭且寵異焉居數月魏博節度使史憲誠拜章為故帥田季安樹神道碑內官執請亦如前辭上曰魏北燕趙南控成臯天下形勝地也吾以師臣之辭且慰安焉居數月陳許節度使王沛拜章乞為亡父樹神道碑內官執請亦如前辭上曰許昌天下精兵處也俗忠風厚沛能撫之吾視如臂吾以師臣之辭而彰其忠孝焉是三者皆御札命公令刻其辭恩禮親重無與為比歷歲願出守本官辭懇而禮部缺侍郎上曰公可也遂以命之二年選士七十餘人大扺後浮華先材實轉兵部侍郎今上即位四年公亟請於丞相閤曰願得一方疲人而治之除陜虢觀察使兼御史大夫先是陜之官人人必月克寸俸錢五千助輸貢于京師者歲至八十萬公曰官人不能贍私安能䘏民吾不能獨治安可自封即以常給廉使雜費下至于鹽酪膏薪之品十去其九可得八十萬歲為代之官人感悅隨治短長不忍為欺萬國西走陜實其衝復有江淮梁徐許蔡之戍兵北出朔方上郡回中隴間踐更往來不虛一時民之供億吏須必應生活之具至于缾缶匕匙常碎於四方之手公曰此猶束炬以焚民也於是節宴賞截浮費凡金漆陶木絲枲之用悉為具之可饗數千人民一不知復有詔旨支稅粟輸大倉者歲數萬斛始斂民也遠遠近近就積佛寺終輸于河復籍民而載之民之巨牛大車半頓于路前政咸知之計不能出公曰管仲曰粟行五百里民有飢色斯言粟重物也不可推遷民受其獘况今迂直之計有不翅習試五百里乎公乃大索有無親執籌而計之北臨黃河樹倉四十間穴倉為漕下注于舟因隙賞直不敗時務自此壯者斛幼者斗負挈橐褁委倉而去不知有輸他境之民越逸奔走軿軫爭鬬願為陜民政成化行上國下國更口讚頌凡二年改岳鄂安黃蘄申等州觀察使囊山帶江三十餘城繚繞數千里洞庭百越巴蜀荊漢而會注焉五十餘年北有蔡盜於是安鎖三關鄂練萬卒皆傖楚善戰寖有戰風稱為難治有自來矣公始臨之簡服伍旅修理械用親之以文齊之以武大創廳事以張威容造蒙衝小艦上下千里武士用命盡得㣥盜公曰劫于水者以盡殺為習雖值童耉而無捨焉比附他盜刑不可等於是一死之內必累加之盜相誡曰公之未去勿觸其境然後黜廾奸冒用公法也升陟廉能用公舉也撫護窮約用公惠也豪商大賈不得輕役不得隱田父子兄弟不得同販于闔境之內有餘不足自公而均復建立儒宮置博士設生徒廩餼必具頑惰必遷敬讓之風人知家習八年秋江水漲溢公曰安得長堤而禦之言訖軍士齊民雲鍤雨杵一揮立就令行恩結有如此者千里之內如視堂廡雖僻左下里歲臘男子必以雞黍賀饋女子能以簪瑱相問遺富樂歡康肩於治古凡五年遷浙江觀察使加禮部尚書公曰三吳者國用半在焉因高為旱因下為水者六歲矣輕賦兵役不減於民上田沃土多歸豪強荀悅所謂公家之惠優於三代豪強之酷甚於亡秦今其是也於是料民等第籍地沃瘠均其征賦一其徭役經費宴賞約事裁節民有宿逋不可減於上供者必代而輸之誠禱山川歲獲大稔復曰衣冠者民之主也自艱難已來軍士得以氣加之商賈得以財侮之不能自奮者多栖於吳土遂立延賓館以待之苟有一善必接盡禮因訪里閭益知民之疾苦隨以治之纔逾朞歲而吳民復振開成元年十月二十日薨於治所多士相弔曰使公相天子貞觀開元之俗可期而見也豈公不幸實生民之不幸也主上痛悼輟朝一日贈吏部尚書公生得靈和自干名立朝為公卿為侯伯未嘗須臾間汲汲牽率欲顯名于合道而仁義忠信明智恭儉欝積發溢自然相隨不立約結而善人自親不設溝壘而不肖自遠不志於榮達而官位自及公內外閥閱源派清顯拔於甲族而復甲焉親昆仲六人皆至達官公與伯兄季弟五司禮闈再入吏部自國朝已來未之有也上至公相方伯下及再命一命幕府陪吏之屬徧滿內外皆公門生公俯首益恭如孤臣客卿惕惕而多畏也自為重鎮苞苴金幣之貨不至權門親戚故舊周給衣食畢其婚喪悉出俸錢不以家為在家怡然未嘗訓勉子弟自化皆為名人居室卑庳不設步廊賓至值雨則張葢躡屐而就于外位初鎮于陜或束挺經月不鞭一人至于驛馬令五歲幸全則為代之著為定制曰致一物於必窮之地君子不為其為仁愛而臻於此及遷鎮鄂渚嚴峻刑法至于誅罰未嘗貰一等後一刻或問於公曰陜鄂之政不一俱臻於治何也公曰陜之土塉民勞吾撫之不暇尚恐其驚鄂之土沃民剽雜以夷俗非用威刑莫能致理政貴知變蓋為此也聞者服焉嗚呼公之德行材器真哲人君子沒而不朽者也易名定諡為國常典敢書先烈達于執事附于史氏云爾謹狀公曾祖某皇任泉州司戶參軍祖某皇任婺州武義縣主簿贈屯田員外郎父某皇任尚書禮部員外郎贈太子少保公諱某字某明春秋能文攻書未冠知名我烈祖司徒岐公與公先少保友善一見公喜曰沈氏有子吾無恨矣因以馮氏表甥女妻之貞元末舉進士時許公孟容為給事中權文公為禮部侍郎時稱權許進士中否二公未嘗不相聞於其間者其年禮部畢事文公詣許曰亦有遺恨曰為誰曰沈某一人耳許曰誰家子某不之知文公因具言先少保名字許曰若如此我故人子後數日徑詣公且責不相見公謝曰聞於丈人或援致中第是累丈人公舉矣某孤進故不敢自達許曰如公者可使我急賢詣公不可使公因舊造我明年中第文公門生七十人時人比公為顏子聯中制策科授太子校書鄠縣尉直史館左拾遺左補闕史館修撰翰林學士歷尚書司門員外郎司勳兵部郎中中書舍人命服朱紫時穆宗皇帝親任學士時事機祕多考決在內必取其長循為宰相公密補宏多同列每欲面陳拜章互來告公必取規議用為進退歲久當為其長者凡再公皆逡巡不就上欲面授之公奏曰學士院長參議大政出為宰相臣自知必不能為凡宰相之任非能盡知天下物情苟為之必致敗撓况今百姓甚困燕趙適亂臣以死不敢當願得治人一方為陛下長養之因出稱疾特降中使劉泰倫起之公稱益篤故相國李公德裕與公同列友善亦欲公之起辭說甚切公終不出因詔以本官兼史職出歸綸閣久處密近思效用於外懇請於丞相不已由是出為湖南觀察使兼御史大夫凡二歲轉為人困事繁惡易滋長官人調授少得防寃疎通蹊徑人情物理無不曲盡吏欲為欺於此照驗之端必明於彼民有未伸於彼開張之路必在於此亹亹循環皆極根本尢重刑罰杖十五至死者每有一犯必具獄斷刑之後徧示幕府吏雖十人有一人以為小未可者必再詳究經費遊宴約事裁節歲有水旱不可減于常貢者必為代之江西宣州聯歲水災所貸萬計公善養情性自居方伯生殺之任喜怒好惡是四者閉覆渾然雖終歲伺之不見毫髮故黠吏欲賊公之所向高下其事終不可得每處一事未嘗不從容盡理故所至之處富庶懽康理行第一每去任人吏泣送出境不絕自宣城入為吏部侍郎二年考覈搜舉品第倫比時稱精能宰物之望屬於僉議公每願用所長復理於外及薨於位知與不知莫不相弔上悼惜輟朝一日贈吏部尚書公與先少保俱掌國史撰憲宗實錄未竟出鎮河南詔以隨之成於理所時論榮之公生得靈粹沛然而仁自幼及長未嘗須臾間汲汲牽率欲及於道溫良恭儉明智忠信內積外溢自然相隨自布衣至於達宦凡所交友皆當時名公奬美所長復救所不及三十年間無有攜間者公常居中雖有重名每苦於飢寒兩求廉鎮時宰許之皆先要公曰欲用某為從事可乎公必拒之至有怒者公曰誠如此願息所請故二鎮幕府皆取孤進之士未嘗有吏一人因權勢入嘗擇邸吏尹倫戅滯闕事寮佐皆患之因請易之公曰某出京師面誡倫曰止可闕事不可多事是倫適能如此受不虛矣故二鎮號為富饒凡十年間權勢貴倖之風不及於公耳苞苴寶玉之賂亦不至於權門雖有怒者亦不敢以言議公公然侵公其為守道自得皆如此類在家無杖笞呵責家人自化兄弟甥姪雖絕服者入門飲食衣服指使其奴婢無二等親戚故舊周給所得皆出俸錢不以家為於京師開化里致第價錢三百萬訖二鎮牽率滿之及在牀之日周身之飾易以任器京師士人雜然言議以為非今日之有指為異事嗚呼公之德行可以稱古君子矣牧分實通家義推先執復以孱昧叨在賓席幼熟懿行長奉指教泣涕撰記以備遺闕以附于史氏云爾謹狀新羅人張保臯鄭年者自其國來徐州為軍中小將保臯年三十鄭年少十歲兄呼保臯俱善鬬戰騎而揮槍其本國與徐州無有能敵者年復能沒海履其地五十里不噎角其勇健保臯差不及年保臯以齒年以藝常齟齬不相下後保臯歸新羅謁其王曰遍中國以新羅人為奴婢願得鎮清海使賊不得掠人西去其王與萬人如其請自大和後海上無鬻新羅人者保臯既貴於其國年錯寞去職飢寒在泗之漣水縣一日言於漣水戍將馮元規曰年欲東歸乞食於張保臯元規曰爾與保臯所挾何如奈何去取死其手年曰飢寒死不如兵死快况死故鄉耶年遂去至謁保臯保臯飲之極歡飲未卒其國使至大臣殺其王國亂無主保臯遂分兵五千人與年持年泣曰非子不能平禍難年至其國誅反者立王以報王遂徵保臯為相以年代保臯天寶末安祿山亂朔方節度使安思順以祿山從弟賜死詔郭汾陽代之後旬日復詔李臨淮持節分朔方半兵東出趙魏當思順時汾陽臨淮俱為牙門都將將萬人不相能雖同盤飲食常睇相視不交一言及汾陽代思順臨淮欲亡去計未決詔至分汾陽兵東討臨淮入請曰一死固甘乞免妻子汾陽趨下持手上堂偶坐曰今國亂主遷非公不能東伐豈懷私忿時耶悉召軍吏出詔書讀之如詔約束及別執手泣涕相勉以忠義訖平劇盜實二公之力知其心不叛知其材可任然後心不疑兵可分平生積忿知其心難也忿必見短知其材益難也此保臯與汾陽之賢等耳年投保臯必曰彼貴我賤我降下之不宜以舊忿殺我保臯果不殺此亦人之常情也臨淮分兵詔至請死於汾陽此亦人之常情也保臯任年事出於已年且寒饑易為感動汾陽臨淮平生抗立臨淮之命出於天子搉於保臯汾陽為優此乃聖賢遲疑成敗之際也彼無他也仁義之心與雜情並植雜情勝則仁義滅仁義勝則雜情銷彼二人仁義之心既勝復資之以明故卒成功世稱周召為百代人師周公擁孺子而召公疑之以周公之聖召公之賢少事文王老佐武王能平天下周公之心召公且不知之苟有仁義之心不資以明雖召公尚爾况其下哉語曰國有一人其國不亡夫亡國非無人也丁其亡時賢人不用苟能用之一人足矣烈女姓竇氏小字桂娘父良建中初為汴州戶曹掾桂娘美顏色讀書甚有文李希烈破汴州使甲士至良門取桂娘以去將出門顧其父曰慎無戚必能滅賊使大人取富貴於天子桂娘既以才色在希烈側復能巧曲取信凡希烈之密雖妻子不知者悉皆得聞希烈歸蔡州桂娘謂希烈曰忠而勇一軍莫如陳先奇其妻竇氏先奇寵且信之願得相往來以姊妹敘齒因徐說之使堅先奇之心希烈然之桂娘因以姊事先奇妻嘗間曰為賊兇殘不道遲晚必敗姊宜早圖遺種之地先奇妻然之興元元年四月希烈暴死其子不發喪欲盡誅老將校以卑少者代之計未決有獻含桃者桂娘白希烈子請分遺先奇妻且以示無事於外因為蠟帛書曰前日已死殯在後堂欲誅大臣須自為計以朱染帛丸如含桃先奇發丸見之言於薛育育曰兩日希烈稱疾但怪樂曲雜發晝夜不絕此乃有謀未定示暇于外事不疑矣明日先奇薛育各以所部兵譟於牙門請見希烈希烈子迫出拜曰願去偽號一如李納先奇曰爾父悖逆天子有命因斬希烈及妻子函匕首以獻暴其尸於市後兩月吳少誠殺先奇知桂娘謀因亦殺之請試論之希烈婦桂娘者但劫之耳希烈僭而桂娘妃復寵信之於女子心始終希烈可也此誠知所去所就逆順輕重之理明也能得希烈權也姊先奇妻智也終能滅賊不顧其私烈也六尺男子有祿位者當希烈叛與之上下者眾矣豈才力不足耶蓋義理苟至雖一女子可以有成大和元年予客遊涔陽路出荊州松滋縣攝令王淇為某言桂娘事淇年十一歲能念五經舉童子及第時年七十五尚可日記千言當建中亂希烈與李納田悅朱泚朱滔等僭詔書檄爭戰勝敗地名人名悉能記之聽說如一日前言竇良出於王氏實淇之堂姑子也譚忠者絳人也祖瑤天寶末令內黃死燕寇忠豪健喜兵始去燕燕牧劉濟與二千人障白狼口原注山名契丹路後將漁陽軍畱范陽元和五年中黃門出禁兵伐趙魏牧田季安令其徒曰師不跨河二十五年矣今一旦越魏伐趙趙誠虜魏亦虜矣計為之奈何其徒有超佐伍而言曰願借騎五千以除君憂季安大呼曰壯夫哉兵決出格沮者斬忠其時為燕使魏知其謀乃入謂季安曰某之謀是引天下之兵也何者往年王師取蜀取夏算不失一是相臣之謀今王師越魏伐趙不使耆臣宿將而專付中臣不輸天下之甲而多出禁甲君知誰為之謀此乃天子自為之謀欲將誇服於臣下也今若師未叩趙而先碎於魏是上之謀反不如下且能不恥於天下乎既恥且怒於是任智畫策仗猛將練精兵畢力再舉涉河鑒前之敗必不越魏而伐趙校罪輕重必不先趙而後魏是上不上下不下當魏而來也季安曰然則若之何忠曰王師入魏君厚犒之於是悉甲壓境號曰伐趙則可陰遺趙人書曰魏若伐趙則河北義士謂魏賣友魏若與趙則河南忠臣謂魏反君賣友反君之名魏不忍受執事若能陰解陴障遺魏一城魏得持之奏捷天子以為符信此乃使魏北得以奉趙西得以為臣於趙為角尖之耗於魏獲不世之利執事豈能無意於趙乎趙人脫不拒君是魏霸基安矣季安曰善先生之來是天眷魏也遂用忠之謀與趙陰計得其堂陽原注縣名屬冀州忠歸燕謀欲激燕伐趙會劉濟合諸將曰天子知我怨趙今命我伐之趙亦必大備我伐與不伐孰利忠疾對曰天子終不使我伐趙趙亦不備燕劉濟怒曰爾何不直言濟以趙叛命忠繫獄因使人視趙果不備燕後一日詔果來曰燕南有趙北有胡胡猛趙孱不可捨胡而事趙也燕其為予謹護北疆勿使予復挂胡憂而得專心於趙此亦燕之功也劉濟乃解獄召忠曰信如子斷矣何以知之忠曰潞牧盧從史外親燕內實忌之外絕趙內實與之此為趙畫曰燕以趙為障雖怨趙必不殘趙必不為備一且示趙不敢抗燕二且使燕獲疑天子趙人既不備燕潞人則走告于天子曰燕厚怨趙今趙見伐而不備燕是燕反與趙也此所以知天子終不使君伐趙趙亦必不備燕劉濟曰今則奈何忠曰燕孕怨天下無不知今天子伐趙君坐全燕之甲一人未濟易水此正使潞人將燕賣恩於趙敗忠于上兩皆售也是燕貯忠義之心卒染私趙之口不見德於趙人惡聲徒嘈嘈於天下耳唯君熟思之劉濟曰吾知之矣乃下令軍中曰五日畢出後者醢以狥濟乃自將七萬人南伐趙屠饒陽束鹿原注二縣屬深州殺萬人暴卒于師濟子總襲職忠復用事元和十四年春趙人獻城十二原注德州管平原安陵長河棣州管猒次滴河陽信蓨平昌將陵蒲臺渤海冬誅齊三分其地忠因說總曰凡天地數窮合必離離必合河北與天下相離六十年矣此亦數之窮也必與天下復合且建中時朱泚搏天子狩畿甸李希烈僭于梁王武俊稱趙朱滔稱冀田悅稱魏李納稱齊郡國往往弄兵者低目而視當此之時可為危矣然天下卒於無事自元和已來劉闢守蜀棧道劍閣自以為子孫世世之地然甲卒三萬數月見羈李錡橫大江撫石頭全吳之兵不得一戰反束縛帳下田季安守魏盧從史守潞皆天下之精甲駕趙為騎鼎立相視可為強矣然從史繞塹五十里萬㦸自護身如大醉忽在檻車季安死墳杵未收家為逐客蔡人被重葉之甲圓三石之弦持九尺之刃突前跳後卒如搏鶚一可支百者累數萬人四歲不北二三可為堅矣然夜半大雪忽失其城齊人經地數千里倚渤海墻泰山塹大河精甲數億鈐其阨可為安矣然兵折於潭趙原注地名鄆西六十里首竿於都市此皆君之自見亦非人力所能及蓋上帝神兵下來誅之耳今天子巨謀纖計必平章於大臣鋪樂張獵未嘗戴星徘徊顐玩之臣顏止不展縮衣節口以賞戰士此志豈須臾忘於天下哉今國兵駸駸北來趙人已獻城十二助魏破齊唯燕未得一日之勞為子孫壽後世豈能帖帖無事乎吾深為君憂之總泣且拜曰自數月已來未聞先生之言今者幸枉大教吾心定矣明年春劉總出燕卒于趙忠護總喪未數日亦卒年六十四官至御史大夫忠弟憲前范陽安次令持兄喪歸葬于絳常往來長安間元年孟夏某遇於馮翊屬縣北徵中因吐其兄之狀某因直書其事至於褒貶之間俟學春秋者焉會昌二年歲次壬戌夏四月乙丑朔二十三日丁亥皇帝御宣政殿百辟卿士稽首再拜敢上仁聖文武至神大孝尊號於皇帝受冊禮畢御丹鳳樓因大赦天下咸告天下刺史宜祭境內神祇有益於人者可抽常所上賦以備供具牧為刺史實守黃州夏六月甲子朔十八日辛巳伏准赦書得祭諸神因為文稱讚皇帝功德用饗神云皇帝嗣帝天飭天付前壬申年坐統大業慈仁寬恩聖明文武或曰誅殛曰我父母譬彼嬰兒豈不可恕或曰畋遊苑大林深喈嘐跳突千毛萬羽豹裂鵬擒其樂無伍皇帝曰不匪我不知言豈假汝未撫四夷未考百度天地宗廟未陳簋簠如寐未寤如痒未愈斥退狗馬未可以御或曰酒飲順氣完神奠習樂工自祖自父瑤簪繡裾千萬侍女酧以觥斚助之歌舞富貴四海不樂何苦皇帝曰不如聞四海蝗蔽田畝或曰亢旱或曰淫雨稚老孤寡未盡得所聞一有是首不能舉乃拔俊良乃登耆老夕思朝議依規約矩詳刑定法深刻不取標揭典制酌之中古遠師太宗近法憲宗怵慄思惟不治是懼四國既平六職攸序黍稷稻粱嘔啞俯僂父子供養嬰兒撫乳萬里齊俗實皇帝力繄眠而食罔知其故皇帝乃曰予見郊廟嚴法物旓旐旗五帝坐壇百神立坫嵬嶷肸蠁捧爵是醮海外天內戎狄蠻夷奇服異貌伏于除外懽喜呌噪迴御丹鳳大赦四海改元會昌減論有罪紹功嗣德搜剔幽昧寒暑合節風輕雨碎穀溢陳菌畜繁腯大東南西北限岸畺紀無有頓憚不識災害三事大夫邦伯諸侯曰皇帝德古不能侔謳歌謠詠安能可稱百工庶人亦有聚謀拜章口呼願上大號神聽天聞欲揚宏休皇帝曰無功不可虛受懇請不已出涕叩頭皇帝不能止曰予慚羞日因大赦惟新九州不窮不詐不飢不偷有窮有饑實吏之尢予實天吏許之省修約束教誡纖悉丁寧品類細偉各當源流皇帝曰俞股肱耳目誠示竭力寒暑風雨宜神是酬匪神之力其誰能謀凡爾守土各報爾望剝烹羹胾無愛羊牛天下聞命奔走承事牧實遭遇亦忝剌史齋齋惕慄淵谷臨墜視牲啟毛濯爵置羃不委下吏餚羞具潔罔有不備衣冠待曉坐以假寐步及神宇蹐足屏氣神實在前敬恭跪起詩不云乎皇天上帝伊誰云憎天憎罪人天可指視止殃其身豈可傍熾刺史有罪可病可死其身未塞可及妻子無作水旱以及閭里皇帝仁聖神祇聰明唱和符同相為表裏黃治雖遠黃俗雖鄙皇帝視之遠近一致洋洋在上實提人紀無負皇帝自作羞愧月惟孟夏日惟辛巳實神降祉神如有言我答皇帝寒暑風雨其期必致瘥癘水旱永永止弭爾為官人勉其爾治某敬再拜汗流霑地下土之人天實有之五穀豐實寒暑合節天實生之也苗房甲而水湮之苗秀好而旱莠之饑即必死天實殺之也天實有人生之孰敢言天之仁殺之孰敢言天之不仁刺史吏也三歲一交如彼管庫敢有其寶玉如彼傳舍敢治其居室東海孝婦吏寃殺之天實寃之殺吏可也東海之人於婦何辜而三年旱之刺史性愚治或不至厲其身可也絕其命可也吉福殃惡止當其身胡為降旱毒彼百姓謹書誠懇本之於天神能格天為我申聞牧為刺史凡十六月未嘗為吏不知吏道黃境隣蔡治出武夫僅五十年令行一切後有文吏未盡削除伏臘節序牲醪雜須吏僅百輩公取於民里胥因緣侵竊十倍簡料民費半於公租刺史知之悉皆除去鄉正村長強為之名豪者尸之得縱強取三萬戶中多五百人刺史知之亦悉除去蠒絲之租兩耗其二銖稅穀之賦斗耗其一升剌史知之亦悉除去吏頑者笞而出之吏良者勉而進之民物吏錢交手於市小大之獄面盡其詞棄於市者必守定令人戶非多風俗不雜刺史年少事得躬親苴抉其根矣苗去其莠矣不侵不蠧生活自如公庭晝日不聞人聲刺史雖愚亦曰無過縱使有過力短不及恕亦可也殺亦可也穉老孤窮指苗燃鼎將穗秀矣忍令萎死以絕民命古先聖哲一皆稱天舉動行止如天在旁以為天道仁即福之惡即殺之孤窮即憐之無過即遂之今旱已久恐無秋成謹具刺史之所為下人之將絕再告於神神其如何維會昌六年歲次丙寅某月某日某官敬告于木瓜山之神惟神聰明格天能降雲雨郡有災旱必能救之前後刺史祈無不應去歲七月苗將萎死禱神之際甘雨隨至稿然凶歲化為豐年仰神之靈感神之德願新祠宇以崇祭祀今易卑庳變為華敞正位南面廟貌嚴整風雷雲雨師伯必備侍衞旗㦸羅列森然惟神繫雲在襟貯雨在缶視人如子渴即與之不容凶邪不降疾疫千萬年間使池之人敬仰不怠伏惟尚饗維會昌五年歲次乙丑某月日池州刺史杜牧謹遣軍事押衙王鏶謹以清酌庶饈之奠敬致祭于亡友李君起居之靈憶昔相遇兩未生鬚京師眾中跡猶甚疎一言道合盡寫有無我於宣城忝跡賓吏君隨幕府東下繼至復與友人故薛子威邂逅適願如相為期放論劇談各持是非攻強討深張矛彀機怒或赩赫終成笑嬉於後七年君拜左史來蜀西川我官補闕云愧我先拜章請代蓋私我焉我有家事乞假南來循行里第君出離杯令弟在席恣為詼諧耳熱膽張觥聯相豕灰我歸墜馬一支幾摧君來我坐側倚旁偎持簡酸吟戲口猶開云君我殺以酒相加忌我之才及我南去君刺池陽我守黃岡葭葦之塲惟君書信前後相望辭意纖悉勉我自強律我性情補短裁長一函每發沈憂并忘幸會交代㳂檝若飛江山九月凉風滿衣為別幾時多少懽悲志業益廣不可窺知長人之術首為吏師縱酒十日舞袖僛垂語公之餘且及其私許以季女配我長兒莫云稚齒可以指期各負少壯輕後會時寓居宣城書札日馳一疾不起訃來猶疑嗚呼哀哉惟先僕射儉德冠古凡二十年四領茅土所至所治曰人父母官俸餘半委庫不取京師里第蓬茅數畝慶餘生君曰天酧補何聰明才智兮不使施為何付與之多兮折之何暴天陽地陰高厚相侔上有河漢鈲天橫流百刻晝夜平分不饒皎不陰晦一月幾朝二男三女俗率如此三男二女無有其地君子小人鼻目並列與小人校會無百一於百一中以秀奪實凡稟陰陽生於其間陽常不勝賢者宜艱自古皆然欲復何言撫孤一弔拍棺一哭咫尺不遂涕下相續期於沒齒盡力嗣子嗚呼哀哉伏惟尚饗維大和五年歲次辛未七月辛未朔八日戊寅故吏朝議郎知湖州諸軍事守湖州刺史杜牧謹遣軍事押衙司馬素謹以清酌庶羞之奠敬祭于故相國僕射贈司徒周公之靈伏惟相公之道徧於天下至如牧者受恩叢深爰自稚齒即蒙顧許及在宦途援挈益至會昌之政柄者為誰忿忍陰汙多逐良善牧實忝幸亦在遣中黃岡大澤葭葦之塲繼來池陽棲在孤島僻左五歲遭逢聖明收拾寃沈誅破罪惡牧於此際更遷桐廬東下京江南走千里曲屈越嶂如入洞穴驚濤觸舟幾至傾沒萬山環合才千餘家夜有哭烏晝有毒霧病無與醫飢不兼食抑暗偪塞行少臥多逐者紛紛歸軫相接唯牧遠棄其道益艱相公憐憫極力掀拔爰及作相首取西歸授之名曹帖以重職虢國太子絳市諜人死而復生未足為喻旌斾西去拜於都門賢士大夫無不攀惜皆曰相公事君盡忠保道輕位大張公室盡閉私門彼由徑者跛倚不進天下賢彥明知所趣重德壯年眾期再入牧守吳興繼奉手示但云休退不言疾恙訃問忽至慟哭問天嗚呼蒼生未濟而喪我相為蒼生慟豈獨私恩想像音容思惟恩紀期於令嗣可以効死吳洛相遠踰於二千無因拜柩見歸九泉哭送使者致誠奠筵伏惟尚饗維大中五年歲次辛未五月朔二日湖州刺史杜牧謹遣軍事十將徐良敬致祭于故龔秀才之靈死者生之極折脛而夭復死之極言於前定莫得而推出於偶然魂其寃哉鄉里何在骨肉何人卞山之南可以栖魂嗚呼哀哉伏惟尚饗
