front:
  text: 全唐文欽定全唐文卷五十帝諱適代宗長子天寶元年生至德元年封奉節郡王寶應元年五月進封魯王八月徙封雍王出鎮陝州廣德二年立為皇太子大歷十四年五月即位建中元年正月上尊號曰聖神文武皇帝在位二十一年年六十四諡曰神武孝文皇帝廟號德宗
  hash: sha256:88ed0cbef5bcdcc4c5c16dece1c414a3508efe88f927998a1214643ac9a233fa
  markers:
  - {type: head, offset: 11, content: 德宗皇帝, id: KR4h0168_NFKB_050-h1, level: 1}
body:
  text: 軒皇致治必資力牧虞舜為政實賴皋陶苟無師臣豈登仁壽故呂望輔巳成之業指揮致維師之名伊尹出空桑之中翼贊負阿衡之號司徒兼中書令河中尹靈州大都督單于鎮北大都護充關內河東副元帥朔方節度關內支度鹽池六城水運大使押蕃部及管內及河陽道觀察等使上柱國汾陽郡王山陵使食實封一千九百戶子儀氣膺台輔道佐經綸當乾坤交泰之時正君臣定位之禮我肅宗皇帝龍飛靈武翦滅鯨鯢公則揚斾宣威佐清六合我大行皇帝撫軍鞏洛收復都邑公則摧殄諸寇滌穢兩河而又獫狁犬戎共侵涇略公則挺身鋒刃獨立戰場叱退窮醜威雄七萃塞垣無警社稷永康朕遭閔凶爰在諒暗公又外釐百揆內舉四維委監山陵克修制度萬樞倚辦庶績其凝凡所詢謀必竭寅亮敬加從話則率土歡心寄以緝熙則彞倫式序宏宣五教訓洽生靈光昭七德威肅禍亂豈周武有尊師之道朕無崇德之名宵衣永歎夕惕增懷雖年耆益明轅門待鎮然復土寄重留籍倚毗可加號尚父兼太尉中書令山陵使勳封如故仍加實封通前滿二千戶每月給一千五百人糧料并給二百匹馬草料有司備禮以時冊命自艱難巳來徵賦名目繁雜委黜陟使與諸道觀察使刺史作年支兩稅徵納比來新舊徵科色目一切停罷兩稅外輒別率一錢四等官準擅興賦以枉法論其軍府支計等數準大歷十四年八月七日敕處分呂渭僭陳章奏為其本使薄訴官名朕以宋有司城之嫌晉有司曹之諱歎其忠於所事亦謂確以上聞乃加殊恩俾膺厚賞迅聞所陳少字往歲巳任少卿昔是今非罔我何甚豈得謬當朝典更厠周行宜佐遐藩用誡薄俗可歙州司馬同正自昔元后表正萬邦必兼聽以求聞乃選賢而自輔理亂之本繫乎其任授之以道將在之人朕嗣守丕圖運逢多難每虔心至理思致和平夕惕興懷納隍是慮今干戈甫戢而戎狄為虞豈誠信所未孚何聲教之不暨是以夢想良佐庶迪前聞云誰之思朕志先定前檢校禮部尚書陝虢觀察使李泌山河粹氣道德清英蔚為禎祥生我王國夷不雜高明有融深厚以致誠直方而可大識窮化本動會時中讜正居心謀猷允哲自膺分陝纍洽嘉聞宜其入掌中樞內司闕衮贊兩儀之化育貞百度之經綸協和神人參總廊廟咨爾才實惠於邦家往欽哉式佇成績可守中書侍郎同中書門下平章事乃者吐蕃犯塞毒我生靈俶擾隴東深入河曲朕以兵戈粗定傷夷未瘳務息戰伐之謀遂從通和之請亦知戎醜志在貪婪重違修睦之辭乃允尋盟之會果為隱匿變發壝宮縱犬羊凶狡之羣乘文武信誠之衆蒼黃淪陷深用惻然此皆由朕之不明致其至此既無德於萬衆亦有愧於四方宵旰貽憂何嗟而及今兵部尚書崔漢衡等皆國之良士朝之藎臣嬰縶穹廬眇然異域念其家室雖未周於屢空録以息男庶或資於薄俸漢衡宜與一子七品官司勳員外郎鄭叔矩檢校戶部郎中路沁殿中侍御史韓弇及大將孟日華辛榮李至言范澄王良賁樂演明陽昔權交成等各與一子八品官試左金吾兵曹參軍袁同直榆次尉裴頲及副兵馬使巳下各與一子九品官仍並與正員官餘將士各與一子官仍委本使即具名銜聞奏古之命將帥修封疆在於整軍非以耀武故繕理亭障訓齊車徒以申國威以固王略非誠節茂著無以分統六師非勳績彰明無以并護諸將副茲重任實在忠賢特進檢校右僕射兼右金吾衛大將軍充右街使成紀男范希朝有貞臣之節有良將之風識達武經學綜兵要臨事能斷好謀而成嘗領元戎鎮於朔野控河上之塞拒漢南之庭修其政刑諭以威德士吏向慕裔夷綏懷入覲京師策勳王府洎司警衛禁旅增嚴直道彌彰嘉庸茂著固可以總統北路節制西陲成魏絳和戎之勳振朝錯備邊之策俾異俗率化穡人成功師乘以和烽堠無警懋昭丕績時乃之休可開府儀同三司檢校左僕射兼右神策京西諸城鎮行營兵馬節度使勳封如故朕嗣守丕圖於茲七稔每念萬方所奉惟在一人百姓未康豈安終食故所以賑贍優貸思致乂安方鎮牧守誠宜遵奉如有違越委御史臺及出使郎官御史訪察以聞天工人代緝熙庶績所以達四方之志遂萬物之情王猷以穆在乎宰執君舉必書宏厥史職典領著作允資藎臣中散大夫守中書侍郎同中書門下平章事上柱國賜紫金魚袋齊抗文合大雅行歸中庸宏道而致遠含章而居業稽三王之法志酌千古之獻言積純粹而外發德輝自明誠而居為國器擢登密勿每竭訏謨察其忠諒多所宏益以序王道之端辨人事之紀勸懲教化在於春秋錯綜裁成必歸良直以中樞之餘力得東觀之全才思革前愆允資盛德山甫補闕巳彰於匪懈臧文立言佇聞於不朽修明策惟爾之休可兼修國史餘並如故主者施行書載堯典首稱睦族詩歌周德實美維城朕嗣統百王憲章三代義雖本於敘族道無愧於尊賢式遵舊章爰舉成命嘉王運循王遹恭王通等皆孝敬恭懿敏裕齊莊播蘭茝之清芬炳圭符之瑞采易淩沛獻詩掩楚元古人素風造次於是師氏典訓周旋以之固可以超金紫之貴階升台鉉之崇秩策勳詔爵以寵分茅並可金紫光祿大夫檢校司空賜上柱國仍依百官例給料錢輔弼之臣百辟是憲苟二其行則黷大猷守中書門下平章事鄭餘慶頃謂忠貞擢居台輔仍乖正直有涉比周棄法弄情公行黨比苟徇邪志頗紊彞倫謫佐遐藩以懲不恪朕擢於不次誠冀效忠乃自速辜亦所難逭凡百君子宜悉朕懷可郴州司馬置同正員雍府歲貢奴婢使其離父母之鄉絶骨肉之戀非仁也罷之朕聞禮貴緣情因心展孝高宗得說其代豫言今朝有股肱濟為舟楫出納惟允足以保邦況荼蓼在懷日時猶淺欲遂權奪抑就公除攀號痛心實所未忍朕將從禫服以終喪紀百辟卿士宜悉哀懷昔高宗諒陰三年舜為堯禹為舜亦服喪三年故禮曰三年之喪自天子達是知罔極之恩昊天難報朕虔奉遺詔又迫於羣議將欲從吉未忍割哀其百僚宜以今月十七日釋服朕以素服練巾銜哀聽政凡百在位知朕意焉天下有才藝尤著高蹈邱園及直言極諫之士所在具以名聞諸色人中有孝悌力田經學優深文詞清麗軍謀宏遠武藝殊倫者亦具以名聞能詣闕自陳者亦聽仍限今年十二月內到朕當親試律令格式條目有未折衷者委中書門下擇理識通明官共刪定自至德以來制敕或因人奏請或臨事頒行差互不同使人疑惑中書門下與刪定官詳決取堪久長行用者編入條格朕頃議山陵心方迷謬忘遵先旨遂有優厚之文卿聞見該通識達宏遠深知不可切以為言引古援今依經據理非唯中朕之病兼亦成朕之身今所以令朕免不子之名不遺君親於患者皆卿之力也敢不聞義而從收之桑榆奉以始終期無失墜嗟乎古之遺直何以加卿主器者莫若長子繼明者必建儲兩既以傳重亦以宗本則君親之大義帝王之宏範無先於此矣朕以眇身纘承丕緒夕惕祗畏惟懷永圖承八葉之耿光居四海而稱大則匕鬯之主粢盛之重樹元貴嫡有邦之先宣王誦生知古制既賢且長聰明敏博溫恭孝友不自滿假率由憲章慶發高禖兆申甲觀為子之道惟父能知審其觀志宜承大統固能總戎監撫載乎鼎實不絶馳道謙敬益崇問安必自於因心入學固知其讓齒升茲上嗣庶貞萬國可立為皇太子宜令所司擇日備禮冊命戶無主客以見居為簿人無丁中以貧富為差行商者在郡縣稅三十之一居人之稅秋夏兩徵之各有不便者三之餘征賦悉罷而丁額不廢其田畝之稅率以大歷十四年墾數為準徵夏稅無過六月秋稅無過十一月違者進退長吏令黜陟使各量風土所宜人戶多少均定其賦尚書度支總統焉東都河南江淮山南東等道轉運租庸青苗鹽鐵等使尚書左僕射劉晏頃以兵車未息權立使名久勤元老集我庶務悉心瘁力垂二十年朕以征稅多門鄉邑凋耗聽於羣議思有變更將置時和之理宜復有司之制晏所領使宜停天下錢穀委金部倉部中書門下揀兩司郎官準格式調掌朕以征稅多門郡邑凋耗聽於羣議思有變更將制時雍宜遵古制其江淮米準旨轉運入京者及諸軍糧儲宜令庫部郎中崔河圖權領之今年夏稅以前諸道財賦多輸京者及鹽鐵財貨委江州刺史包佶權領之天下錢穀皆歸金部倉部委中書門下兩司郎官準格式調理朕聞唐虞聖人之理三載考績黜陟幽明兩漢施教之君亦命八使澄清天下朕纘承大業思服訓謨雖王公卿士內勤夙夜藩嶽守將外盡公忠而兵革未寧戎狄未盡紀綱未振法令未敷封圻郡縣賦稅不一師旅上下勞逸不均所以終宵積憂寤寐增惕爰命羣士往代子言行乎四方以聽於理舉其百事以歸於正朕之深願可不勤副也尊師之道禮有所加議故之法恩有所掩張涉賄賂交通頗駭時聽常所親重良深歎息宜放歸田里王者事父孝故事天明事母孝故事地察則事天莫先於嚴父事地莫盛於尊親朕躬承天命以主社稷執圭璧以事上帝祖宗克配園寢永終而內朝虛位闕問安之禮銜悲內惻憂戀終歲思欲歷舟車之路以聽求音問而主茲重器莫匪深哀是用仰稽舊儀敬崇大號舉茲禮命式遵前典宜令公卿大夫稽度前訓上皇太后尊號冠婚之義人倫大經昔唐堯降嬪帝乙歸妹逮於漢氏同姓主之爰自近古禮教陵夷公郡法度僭差殊制姻族闕齒序之義舅姑有拜下之禮自家刑國多愧古人今縣主有行將俟嘉命俾親執棗栗以見舅姑敬遵宗婦之儀降就家人之禮事資變革以抑浮華其令禮儀使與禮官博士約古今舊儀及開元禮詳定公主郡縣主出降覿見之文儀以聞常參官及節度觀察防禦軍使城使兵馬使諸州刺史少尹赤令畿令并七品以下清官及大理司直評事等頃者令內外新授官人三日內上表舉一人自代欲於中選才堪者任用比來所舉少有托實殊乖素來求才之意自今以後每舉人皆令指陳其承前事跡如有政能行義藝業勞效各分析言之功勞近臣至親子弟既處繁劇或招過犯寬宥則撓法取責則虧恩不令守官仍為至當賈全等十人昨緣畿內凋殘親自選擇事非常制不令避嫌天地以四時成物元首以股肱作輔公台之任鼎足相承上以調三光下以象五嶽允釐庶績鎮撫四夷體元和之氣根貞一之德功至大而不伐身處高而更安尚父比呂望之名為師增周公之位盛業可久歿而彌光故太尉兼中書令柱國汾陽郡王尚父子儀天降人傑生知王佐訓師如子料敵若神昔天寶多難羯胡作禍咸秦失險河洛為戎公能扶翼肅宗載造區夏於國有患勞其戡定於邊有寇藉其驅除安社稷必在於絳侯定羌戎無踰於充國絳臺綏四散之衆涇陽降十萬之虜勳高今古名讋夷狄而勞乎征鎮二紀於茲頃以春秋既高疆場多事罷彼旌鉞寵在台衡以公柱石四朝藩翰萬里忠貞懸於日月寵遇冠於人臣尊其元老加以崇號期壽考之永養勳賢之德膏肓生疾藥石靡功人之云亡梁木斯壞雖賻禮加等輟朝增日悼心流涕曷可弭忘更議追崇名位斯極而尊為尚父官協太師雖爵秩則同而體望尤重斂以衮冕旌我元臣聖祖園陵所宜陪葬式墓表文終之德象山追去病之勳千載如存九原可作冊命之禮有司備焉可贈太師陪葬建陵仍令所司備禮冊命賻絹三千匹布三千端米麥三千石二庭四鎮統任西夏五十七蕃十姓部落國朝以來相奉率職自關隴失守東西阻絶忠義之徒泣血相守慎固封略奉尊朝法皆侯伯守將交修共理之所致也伊西北庭節度觀察使李元忠可北庭大都護四鎮節度留後郭昕可安西大都護四鎮節度觀察使其將吏巳下敘官可超七資尚書左僕射楊炎託以文藝纍登清貫雖謫居荒服而虛稱猶存朕初臨萬邦思宏大化務擢非次招納時髦拔自郡佐登於鼎司獨委心膂信任無疑而乃不思竭誠敢為姦蠧進邪醜正既僞且堅黨援因依動涉情故隳法敗度罔上行私苟利其身不顧於國加以內無訓誡外有交通縱恣詐欺以成贓賄詢其事跡本末乖謬蔑恩棄德負我何深考狀議刑罪在難宥但以朕於將相義切始終顧全大體特有宏貸俾從遠謫以肅具寮可崖州司馬同正仍馳驛發遣李惟嶽其父寶臣有忠勞於王室夷險之際猶全誠效而惟嶽隳其父業蔑棄國恩縗絰之中擅掌戎務矯陳款狀冀邀爵祿外結凶黨益固奸謀不孝不忠宜肆原野朕尚念其前緒容以自新俾護父喪以其屬歸闕待以好爵遇之如初告諭既勤罔有悛革蠢爾狂狡自詒滅亡除暴去邪國有恆典惟嶽在身官爵並宜削除罪止元凶餘無所問其屬將校能以所部兵馬州縣來降者便授以本職仍加封賞忠臣之事君也願隳家以奉國良將之養士也或均財以周惠爰自古昔其儔益鮮故竇嬰陳金於廟廡趙奢散財於部曲皆受之天府不取私門猶能垂名史冊遺芳千載而況執上將之旗鼓率先登之士卒將行命賞罄乃家財上以彰憂國之誠下以竭奉公之效不有褒美孰旌忠賢河東節度使馬燧誠美夙著宏略載宣克揚經武之規實重安人之寄屬河朔干紀磁邢當寇而能忠義奮發奉辭問罪出師之際宣布明誠誓將資産分給戰士故得三軍之衆相與感激百勝之績於茲競勸朕當遂其懇懷以成厥美殊常之迹古人所難舉而行之用明信賞仍班王府之貨式表忠臣之節宜令度支出錢充給將士其馬燧家資並却還之在昔聖王之御㝢也常修文德以勝威武故能協和神人撫寧方夏蓋有國之令圖也朕自君臨萬邦於茲三載明發求理中夜靡遑常懼祖宗之威靈顧惟黎元之未洽是用君臣之際推以腹心賞罰之道俾無僭濫每發一詔施一令罔不本之以德義後之以威刑期戢五兵思宏七教庶乎勝殘去殺之理有且格之道而眇身薄德肺腑未親四方諸侯義信猶阻近聞曹濮數州知加兵籍司馬採聽飛語容納奸謀交質往來邀結外援雖各在封略言備寇攘而汴郊士庶頗聞驚擾閭井奔散如避寇讎逮茲春中首種未入朕為人君父不能以誠明感達股肱之佐不能以慈惠覆育黔黎之類使其骨肉相去情義不通終宵咎責心用震悼亦以社稷之計億兆之命防危慮遠不得不然至於君臣之道進退之理雖以造次顛沛嘗所不忘也是以分命節制及集諸軍於汴宋懷鄭之閒使各屯守發令之日且常言誡非有侵軼不令議戰但田里服業農桑及時下無愁怨外絶師旅偃旗臥鼓朕願斯畢於戲惟天地日月實鑒我心山川鬼神尚弼豫志布告中外咸令知悉故尚父子儀有大勳力保乂於皇家嘗誓以山河琢之金石十世之宥其可忘也其家前時與人為市以子儀歿後或被誣搆欲論奪之有司無得為理故河西兼伊西北庭節度觀察使檢校工部尚書兼御史大夫贈太子太保楊休明故河西節度觀察使檢校工部尚書兼侍御史大夫周鼎故西州刺史兼御史中丞李琇璋故瓜州刺史兼御史中丞知河西節度留後張銑或寄崇方鎮或攝總留務時屬殷憂並抗貞節率勵將吏誓一其心固守西陲以俟朝命羌戎乘閒驟逼城池國家方有內虞未遑外救河隴之右化為虜場俾我忠良歿身異域彌歷年紀以逮於茲旅柩方旋誠深憫悼故遞加寵贈俾極朝榮式彰茂烈永賁幽壠休明可贈司徒鼎可贈太保琇璋可贈戶部尚書銑可贈兵部侍郎淮陽軍節度使李希烈頃以梁崇義叛逆使之專征即集勳庸大加恩禮名極台輔賞延子孫而乃負德棄身去忠效逆攻劫道路擅固鄧州而又圖陷汴州攘奪尉氏攻圍鄭圃暴犯汝墳巳敕神策汴滑河陽東畿汝州淮南山南荊南湖南劒南江西鄂嶽等道十五萬衆克寸日齊進弔人靖亂罪止元凶有能斬希烈歸降者四品巳上以希烈官爵授之五品巳上封異姓王實封四百戶諸軍將士斬獲希烈者亦準此例封賞以軍城降者便以其職授之賜其實封賊平後除供當道外百姓給復三年朕德之不明化有不洽未躋仁壽尚勞用兵中心咎悼無忘鑒寐故尚父太尉中書令汾陽王功格上元道光下土積其善慶垂裕無窮雖嫡長云殂支宗斯盛汾陽舊邑盍有丕承其男前左散騎常侍駙馬都尉食實封五百戶曖夙稟義方居忠履孝儷崇銀榜攄美金章繼撫先封允宜聽復曖兄檢校工部尚書守太子賓客趙國公晞并弟右金吾將軍祁國公食實封二百五十戶曙太子左諭德映等並休有令名保其先業宜允推恩之典以明延嗣之誠其實封二千戶宜準式減半餘可分襲曖可襲代國公仍通前襲三百戶晞可二百五十戶曙可五十戶通前三百七十戶映可二百三十五戶
