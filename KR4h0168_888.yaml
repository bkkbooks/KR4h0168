body:
  text: 敦牂御嵗蓐收宰時鄧王受詔鎮於宣城之地離宴既畢推轂將行時也宵露未晞凉月幾望苑柳殘暑宮槐半晴滄波起乎掖池零雨被於秋草皇上以敦睦之至聽政之餘逍遙大庭顧望川陸理化風物詠謝安高興之詩登山臨水嗟騷人送歸之景暫軔征軸宴於西清蓋所以申棣萼之至恩徵文章之盛會也絲簧輟奏惟擲地之鏘然組繡不陳見麗天之煥若將使宗英臨務知理俗之以文朝宰承恩識太平之多暇然則明明作則敦敘之德無疆濟濟維藩夾輔之功何已有詔在席進敘及詩下臣不敏職當奉詔謹賦詩如左三代之文既遠兩漢之風不振懷芬敷者聯袂韻音響者比肩子虛文麗用寡而末世學者以為稱首兩京文過其心後之才士企而望之嗟夫為文而造情汚準而粉顙若夫有斐君子含章可正和順積中而英華發外周旋俯仰金石之度彰摛簡下筆鸞鳳之文奮必有其質乃為之文其積習歟何其寡也有能一日用其本者文遠乎哉我欲仁斯仁至矣潁川陳表用今為晉安人也徧讀七經尢明三禮蟠極造化之說升降損益之文徙之不煩於輜車蓄之殫盈於腹笥發為詞令文之本歟昔之自遠而至者陸機以詞章言譙秀以隱論顯况以禮律者動足之蹊徑幹局者為政之權衡自入朝為太常博士八年動而不阿靜以有守議之所及書辭無頗禮者所疑援經以對酌於古而無悖施於今而易行君雖急賢位未充量道有悠久豈終否哉觀其條奏簡墨之文探索比詳之說證古者不訐救時者不諛簡而周約而舉信守官之善作伸道之名言知余直筆訪余為序保大丙辰嵗六月一日於集賢序之屯田郎中知制誥徐鍇述古之學者家有塾黨有庠術有序國有學此繫乎人者也聖王之處士也就閒燕孟母之訓子也擇鄰居元豹隱南山而成文章成連適東海而移情性此繫乎地者也然則稽合同異別是與非者地不如人陶鈞氣質漸潤心靈者人不若地學者察此可以有意於居矣潯陽廬山之陽有陳氏書樓其先蓋陳宜都王叔明之後曰兼為祕書少監生京給事中以從子褒為嗣至鹽官令生瓘至高安縣丞其孫避難於泉州之仙遊生伯宣著史記今行於世昔馬總嘗左遷泉州與之友善總移南康伯宣因來居廬山遂占籍於德安之太平鄉常樂里合族同處迨今千人室無私財廚無異爨長幼男女以屬會食日出從事不畜僕夫隸馬大順中崇為江州長史乾寧中崇弟勛為蒲圻令次弟玫本縣令能嗣其業如是百年勛從子袞本州曹掾我唐烈祖中興之際詔復除而表揭之旌其義也遂以為族既庶矣居既睦矣當禮樂以固之詩書以文之遂於居之左二十里曰東佳因勝據奇是卜是築為書樓堂廡數十間聚書數千卷田二十頃以為游學之資子弟之秀者弱冠以上皆就學焉自龍紀以降崇之子蛻從子渤族子乘登進士第近有蔚文尢出焉曰遜曰範皆隨計矣四方遊學者自是宦成而名立蓋有之於戲文如麻菽求焉斯至道如江海酌焉滿腹學如不及仁遠乎哉昔北海有邴鄭之風離騷有江山之助者皆古也門生前進士章谷嘗所肄業筆而見告思為之碣會陳氏之令子曰恭自南昌掾入仕至都下因來告別援翰以授之時太嵗己巳十一月九日記昔夫子禀天地之靈膺期運之數體山岳之成形合堯禹之宏度跨三五以傑出邈千載而高步豈惟民哉泰山之於邱垤鳳凰之於飛鳥也然而日月有薄蝕之運生民有淪胥之期老耼已逝蹈流沙而不返文王既沒顧天下而誰宗是以則天以化民屈已以濟物使夫子志在於為君也則當假道百里因基一成受祿以有民逆取而順守然後革命創物錫土苴茅布子姓於九州班正朔於四裔因王法以行禮假號令以濟人然而不屑意者以為堯湯既遠武有慚德樂則有司失其傳禮則孟孫病其儀風俗崩弛皇綱解散是以周流天下遑遑列國一車二豎疑訪萇宏而觀周廟四科十哲昭日月而播微言假陪臣以尊周公修春秋而正王室匡輔元精陶冶情性因國風而正樂順人情而定禮萬物既治我無位焉此則夫子所受老子之元言老子所以釋負而去之之義也至夫載贄諸境濡足當時止璠璵而救季孫斬侏儒而存魯國故令君臣懸解井樹不刊而地靡立錐權輕飛羽諭醯雞於道室譬喪狗於東門野餫弗糝門徒菜色坐席不煖炊突不黔其利物也甚豐其為巳也至約是以子貢有言夫子賢於堯舜遠矣豈不謂然乎夫近道者道亦近之遠道者道亦遠之是以七國冰解嬴秦灰滅所以夫子欲見於衞妃諸生發憤於陳涉有由然矣漢高甚武心涵帝度為舊君而袒哭望魯國而輟攻受天明命將半周室其遺言祠祀也則自闕里而徧寰區出壁中而寶東序蓋帝王之崛起大數之中興焉夫子非求祀於人而人皆祀之非衒書於人而人爭售之自非大庇生民其孰能至於此聖歷中否㣥雄大馳衣冠禮樂不絕如綫聖皇紹祚文思累洽掃大學之煨燼編羽陵之蠧簡濟濟焉煌煌焉民德歸厚矣猶慮隈隅未潤蓬艾未光慎彼觀風敬茲有土保大壬子嵗以樞密院副使兼尚書吏部郎中李君徵古有幃幄之効克定之謀俾守於袁下車視事解甲息兵巡省農功周行廬室以為導化有本振葉由枝而孔廟頺替誦堂風雨顧禮器而赩恧振儒衣而凄泫於是攷圖牒徵碑版蓋天寶中太守房公琯始立廟於州城北門之外五十步乾元中太守鄭公審始移之會昌中又遷於州東大中中復於房公之卜不常厥所於今四遷乃永奠陔次大興力役糞牆俱墁非宰我之難杇壞屋可炊知顏生之不惑迴廊月照接武雲征洞戶靜深重簷奄靄徵兩楹而正坐儼四科而列侍如嘗不寢似欲無言植以美材綷以藻泳靈衣兮披披華蘂兮蘘蘘黍稷令芳籩豆暜淖解危冠於季路見繪事於卜商足以目擊而道存不言而心喻矣昔魯恭壞宅於舊國廬陵伐木於孔門金石為鳴父老歎息然則夫子之道得其人而後行文翁之風感於心而自化是以袁江之上袁山之阿朝為崆峒夕成洙泗用此道也若夫敷孔業而無祠宇是猶棄筌蹄而待貌叩寂寞而求音盛趨翔而無至心是猶依猨狙為周公假詩禮而發冢也是以李君炳筠川之靈錫鍾陵之秀行出鄉里名聞京師題橋以起途懷綬而返國昔之去國而衣錦者蘇秦無守土之實終軍無表里之名君之兼總其稽古之謂故分符之際勅改君筠州萬載縣所居高侯鄉高城里曰懷舊鄉孕秀里君又以私財百萬代其鄉輸稅增閭里之氣為儒者之華功成不居無待刊紀而庠序之作所以聳善懲惡託予敘述吾師也故為之記至其遏寇虐浚溝湟則有底績之司書勳之府焉唐保大癸丑嵗正月二十日廟成之日也君字子隱義興陽羨人晉鄱陽太守魴之子少而跅弛任俠自處不護細行鄉人以為暴焉嘗感父老之言以南山之虎長橋之蛟幷巳為三害於是入山殺獸既而搏蛟浮沈三日竟斷之而出初里人以為君之沒也室家相慶既出始知人患巳之深也乃入吳尋二陸而師之學成義立以忠烈自處朞年而州府交辟嗟夫觀過知仁則向之所為非巨惡矣吳末為無難督及王渾平吳置酒高會調吳人曰諸君亡國之餘得無戚乎君曰漢室分崩三方鼎足魏滅於前吳亡於後亡國之戚豈獨一人渾有慚色荊楚之烈氣淩太原兵滅之餘折而不撓及為廣平太守積紀滯訟決之一朝君之果也於從政乎何有以母疾罷歸為楚內史徵拜散騎常侍君曰古人辭大不辭小乃先之楚化行俗易然後從徵及居近侍多所規諷遷御史中丞糾劾不避寵戚梁王肜違法君深文按之齊萬年反權臣惡君之強直以君討之移孝於忠有死無二賊策之曰周君才兼文武若專斷而來不可當也如受制於人此成擒耳嗚乎盜有道焉其知之矣及六陌之役梁王為帥軍人未食肜促令進而絕其後繼君自知必敗賦詩曰去去世事已策馬觀西戎藜藿甘粱黍期之克令終言畢而戰自旦至暮斬首萬計弦絕矢盡而援不至左右勸之退君以為鑿門而出義不旋踵遂歿焉夫梁王以宗戚之貴義兼家邦非不知良材為國之所憑蓋利欲之誘深而愛國之情淺也而况悠悠㣥品安足言哉由是而言君之所按非深文也夫奸臣之與直士其不合有三佞直不同嗜好亦異一也邪正相形才望相絕雖欲企尚不能效之撫心內愧遂成讎惡二也以小人之性度君子之心以為善人之進必來排已三也有此三者至於反兵賢人既殞遂及於國夫剖巢破卵鳳凰不翔殺犨損犢聖人亦逝將軍既歿此西晉之所以淪胥也二子繼德此東晉之所以光啟也君既除害鄉里稱之又嘗著陽羨風土記則精靈所留遊盼有在矣鍇以癸亥奉詔為祠官東禱山嶽歷將軍之廟貌想先賢之高風周旋徜徉欲去不忍惟君之見危授命當官必理雖百代之王者願以為臣焉郡縣既以時致祀敢即其圖像而為頌曰深山大澤實生龍蛇左湖右瀆君子之家烈烈周君國之爪牙梁摧國圯命也如何越在童齔所游非類見善則遷過而無遂眈眈白額擇肉朱殷矯矯長蛟噴沫飛涎摧斑碎掌潤草丹川無文曷行不學將落裹足時彥見機而作學成德備敭我王庭所居成政所歷傳名敏而應敵正以持傾亦既霜臺糾斯強禦自親及疎何吐何茹翩彼權倖假國之威妒賢醜正言遂其私取彼賢人委之豺虎君實致身曾無二慮恭聞仙誥惟忠是與仰料將軍解形而去遼東千嵗歸鶴來翔威加四海魂魄還鄉矧茲蘋藻在渚之陽斯文曷補實德無疆原夫性與天道夫子祕而不言神之格思詩人謂之難度况乎窮幽極奧鍊氣陶形而庸庸之徒交臂於遺金爽口於緣鵠涂窮於缺甃智極於轉丸奔馳莫逢視聽莫見真人隱而下士笑者又焉足怪乎宏之在人可得而言矣故茅山道門威儀鄧君啟霞字雲叟其先南陽人今為丹陽金壇人也開元時有鄧天師者道上聖屈乎下風光國垂勛隱景遁化君即其後也祖諱文考諱章皆不仕君性理和敬神識宏深咸通元年始詣茅山太平觀柏尊師道泉為弟子方羇丱六年乃披度為道士十二年詣龍虎山十九代天師參授都功正一法籙乾符三年詣本觀三洞法師何先生元通進授中盟上清法籙何即桃源黃先生洞元之弟子也與瞿仙童為同學之友焉其源流隱顯著自前聞固非末學所能談悉天祐四年吳太祖旌別元異始加署尋為本山道副九年為山門威儀再賜紫服華陽洞天仙聖游集太平觀即太宗文皇帝為昇真先生之所立也雖神真所處杳以靜深而外迹繫時與之崇替中和之際寇盜星馳人力所為翦焉將燼世之後學無所式瞻君誓高日月誠貫金石周流勸諭力與志幷人物感其精誠神明助其尋度荊棘隕蘀並為芝丹鴟梟革音復見鸞鶴像設嚴毖垣楹輪奐其所經始三百餘間山樓所須田疇帑庾什器等率皆稱是夫紫葢兆於建業茅山連於金陵君之纘修靈境光復而有唐中興之業亦自此而基神理幽通不期而會者矣義祖武皇帝作鎮江表特加禮異至誠所啟罔有不從是以力役復蠲樵蘇有禁梁懷王藩屏淛右親圖寫其像焉君既拱此元珠輕其尺璧內以宏道外以成人貞素先生王君理解清深牆宇高嶷未嘗不攝齊捧袂虛往實歸舒其憤悱致於夷曠偏得其道以居京師君於世學多所精詣體此敏博沖而用之既居其實而去其華養其內而遺其外故不復為稱矣夫流光迅馳道俗同在若竝轡半嶺而升降則殊及夫百齡有窮萬物將蛻眾自此淪厭君自此躋升真俗之間由是而判幽冥恍惚昧者不知春秋八十有五太和四年嵗在壬辰解化於山門君所傳經籙昭顯於時則故元博大師真素先生王君棲霞惠和大師康君可久茅山威儀王君敬真麻姑山威儀王君體仁表歎大德賜紫安君光美左街焚修大德張混成廬山道副重安寂竝被國寵翊於道風入室弟子故太平觀都監陳修一陳守一今茅山都監主教門事表歎大德鄧棲一監觀倪宏一等竝隨其性習間參道要山門教宇棲一有其勞君遺世雖遙貞石猶缺真迹未勒門人懼焉鍇之蒙淺雖晚聞道昔嘗逮奉貞素伏申之敬貞素之上清門人今右街章表大德劉君德光為啟霞之友鄧君棲一因而見托故鍇不為讓焉其銘曰大道汎兮物無不在人代有敝真風無改於鑠鄧君情遺所宰惟道是求惟道是采脫落畎畝超登雲海天作茅峯人作㙗壘君始從師逸而功倍教法遙邈君能復之一匡輪迹允洽昌期君既往矣誰能嗣之弟子棲一承茲道基敬仰高風刻石為碑俾爾後學高山仰之史字子正撫州宜黃人仕南唐官祕書郎入宋太平興國五年復登進士歷水部員外郎使兩浙巡撫判西京留司御史臺卒崇仁縣古巴陵之府隋開皇中降為縣縣之西北有祈真觀者山水迴合實列仙之攸館嵗月電謝碑石罹於兵火置觀之由不吾知也其所聞者耳目相接傳云太和年中住持道士杜仙興嚼玉蕤金髓燒五色藥望三素雲本郡杜使君師仁聞其名就觀修黃籙齋忽有仙鵝七隻下門外池中因是名曰仙鵝池逮仙興羽化僊磬響沈玉宇琳房鞠為茂草至保大初有道士劉道肱者亦精嚴法籙之流耳言慕幽迹賁然來思繇是斤斧雲峯放出杉松曾不崇朝化為靈宮紫篁清節一皆新之噫能拂凄凉之地重為朝禮之庭若非修道之輩孰至是哉悲夫自太和中至乾德初約四百十載而仙鵝一去池樹毿毿晴山似畫著水如藍非靈羽有不願之心蓋人世無至誠之感乾德元年嵗終癸亥四月彭城劉司直元載字能好奇之名士也製錦是邑詢故事得仙鵝之實翌日焚香覬靈禽之來願言之抱如影隨形是月十八日有仙鵝二百餘隻萃於觀之松篁一鵝殊偉若蜂蟻之有王皆玉衿絳趾丹觜霜翎不飲不啄宿而後飛二之年四月二十三日三之年四月二十八日有百餘隻而至於時五月初二忽㣥飛於縣邑盤旋久之如留戀焉是嵗劉君自南宮承制經於舊邑稅駕祈真東之佛舍明日有仙鵝五十隻於池南自茲一去又隔三年迨開寶三載嵗在庚午四月十九日有仙鵝三十隻現於池北於當月二十五日又百餘隻過於郊郭時扶風馬司空憲絃歌此邑馬君湘潭玉葉好事之君子也亦嘗命駕祈真祈禱真迹果一月中仙禽兩現余家於邑中熟諳本末已曾為能撰仙鵝記甚得詳悉今請告南歸道肱又以觀記見請不可不重道仙鵝之來去矣昔杜師住之日仙鵝少今劉師住之日仙鵝多由此而論劉之道緣優於杜也又念巴水之地名迹實繁自觀之東抵縣縣有景雲觀則蕭子雲侍郎書牌額之所觀東北接五峯山山前有百鳥湯觀之北近高富山山前有過至孝墓予惜其少於傳記恐隙駟不留將來之人不得知矣今染翰之次得以叢而附焉甚愧不文直書其事云耳景雲觀者皇唐景雲年中所建也在崇仁縣西北隅巴山翠其檻巴水潄其門山水周遮松蘿堆摐士君子賞為神仙之勝跡斯言不誣矣予家於觀之北童稚時聞耆老傳云往時觀碑額故將新之因中元節眾道士推能書者明日染翰是日晚有一道士形容羸衣褐荒栖栖焉人皆不物色自言攻篆隸請書之眾口囅然而阻截迨夜參半其道士於堂中張燈火動筆硯大書門扉上景雲觀三字有未睡者潛觀焉遲明觀其筆力遒健光彩射人目於時令佐至嘆訝者數四雖覺異人發問未暇請於新碑更書之而辭不能也齋罷告行行至三門令佐暨諸道士隨而且留自言曰吾是蕭子雲眾拜之舉首不見於是坼其門扉緣飾為碑至危太傅全諷為川將時人移於黃田寨上失之得非神仙之物容易而難留子雲者梁黃門侍郎於玉笥山得仙矣先有大鐘一牌額離後一夕風雨亡異時捕魚人見在觀南溪潭中取之不獲今有小鐘一存上題開元二十七年鑄又有香爐一上題許真君名號傳云真君化身來捨嵗月將永事不可尋今雖已亡又不可不存其梗㮣觀之屋宇自黃巢攘臂之際已赴灰燼今堂殿樓臺尚殘基址因知昔時締構壯麗不無洎後雖曾完葺具體而微一片衡茅四時風雨王孫之草幾犯於階庭金母之桃半歸於樵採顯德年中彭城劉司直元載慕道之高士也宰是邑惜其名迹無人尸之乃召請道士蔣道元者住持道元門傳金籙力學玉書不以艱難破其心不以荒凉役其意一味焚修俟其振發予昨自班行南歸故園每行樂於觀之溪岸道元以觀中元無碑記便以斯文見請且曰恐神仙之踪跡不聞於後人矣予聞斯言意甚嘉賞况居近仙館素欲揮翰今既會宿心得以直書其事乃為銘曰巴山四瞰巴水東流景雲觀者在巴水頭景雲年立仙境最尢有蕭子雲本梁公侯把琉璃盌上鳳麟洲鳳麟為駕駕言出遊觀額將故道士云修遇我蕭侯書蹤夜留組繡光動龍蛇勢浮鳥啼花落嵗月悠悠僊人銀鈎罹亂誰收空餘古觀松蘿一邱松風瀏瀏松雨颼颼古鐘尚存仙爐亦休道士好事恐墮其由請我揮翰金石千秋
