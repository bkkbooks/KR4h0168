front:
  text: 全唐文欽定全唐文卷八百八十八鍇字楚金與兄鉉齊名事南唐嗣主為祕書郎授右拾遺集賢殿直學士忤權要以祕書郎分司東都復召為虞部員外郎後主立遷屯田郎知制誥集賢殿學士及貶制度改拜右內史舍人兼兵吏部選事開寶七年卒年五十五贈禮部侍郎諡曰文
  hash: sha256:98b77162c79f452569fe09aa91b15179acc782823c6ed41fa8d5f92900274723
  markers:
