front:
  text: 全唐文欽定全唐文卷九百三海順俗姓任氏河東蒲坂人少依沙門道遜出家武德元年卒年三十
  hash: sha256:61602a5d95d13b4c74a77ac622590ca003cbeaf89418b440667b8cbdca8cca6f
  markers:
  - {type: head, offset: 12, content: 海順, id: KR4h0168_NFKB_903-h1, level: 1}
body:
  text: 敢稽首大師門下每欲理靜攝心山泉畢志但以無明大夜非慧炬不輝故栖寄法筵聽覽元旨至於人物聚集頗勞低仰况乃大限百年小期一念儻從風燭前路奚憑所以策駑駘之疲想千里之遠定門元妙輒希趣入逆其不逮益用盤桓伏願開含養之懷退人以禮我欲偃文修武身死名存研石通道祈井流泉君肝在內我身處邊荊軻拔劍毛遂捧盤不為則已為則不然將恐兩虎共鬬勢不俱全永存今好長絶來怨是以返迹荒徑息影柴門其一我欲刺股錐刃懸頭屋梁書臨雪影牒映螢光一朝鵬舉萬里鸞翔縱任才辨遊說君王高車反邑衣錦還鄉將恐鳥殘以羽蘭折由芳籠餐詎貴鈎餌難嘗是以高巢林藪深穴池塘其二我欲衒才鬻德入市趨朝四衆瞻仰三槐附交標形引勢身達名超箱盈綺服廚富甘肴諷揚絃管詠美歌謠將恐塵棲弱草露宿危條無過日旦靡越風朝是以還傷樂淺非惟苦遙其三法琳俗姓陳氏潁川人寓居襄陽出家荊州青溪玉泉寺隋季入關住京師濟法寺武德二年上破邪論以語涉謗訕下獄後徙益部行至百牢關菩提寺卒年六十九緬以八樹韜光兩河晦迹匿王戀仰鑄鑞而寫全身迦帝翹誠鎔金而圖真相乃洎乎青睛南度白馬東翻像教鬱興靈儀遍跱於是儼神姿以登松舟屈聖體而施明珠光烈張橋色流滬瀆示佩日於漢后感揮毫於晉君或顧步而躡萬山乍徘徊而遊夢渚禎祥嘉瑞兆自由來未有刺縷圖真援空範狀我大唐皇帝曩植四宏夙資五德神功邁於軒昊至治美於成康仁動上元力侔大造慶雲垂彩金鏡含七曜之輝瑞鳥呈祥玉燭和四時之氣素髮文身之長俱請命於王庭穿胸儋耳之酋共獻琛於魏闕加以留心八正篤意五乘廣運檀那聿修淨業永言善逝冥漠何追爰敕上宮式摹遺景奉造釋迦繡像一幀并菩薩聖僧金剛師子備摛仙藻殫諸神變六文雜沓五色相宣寫滿月於雙針託修楊於素手妍踰蜀錦麗越燕緹紛綸含七曜之光布濩列九華之綵日輪吐焰藹袁宏之絲蓮目凝輝發秦姬之縷隋侯百里之珠慙斯百福子羽千金之璧愧彼千輪華蓋陸離看疑涌出雲衣搖曳望似飛來何但思極回腸抑亦巧窮元妙以今嵗在庚寅月居太簇三元啓候之節四始交泰之辰乃降綸言於勝光伽藍設齊慶像四十九僧三七行道大秦紅粟備香積之餐周穆金膏陳梵王之供四等福田生生具足六因善報世世莊嚴劫石碎而寶歷長存芥城空而皇基永固不勝慶悅輒乃頌云於鑠上帝天策我君乃神乃聖允武允文就之如日望之如雲禎符輝煥美氣氤氳光宅天下攸敘彞倫體道回向式建福田針裁赤果縷制青蓮文含綺爛彩奪霞然華疑迥發蓋似空懸方諸涌地邁彼騰天嵗在提格時旅青陽奉遵徽命爰崇道場十科星聚八座霞張風回雅梵殿鬱名香鴻基盛業永永無疆緬尋曠古逖聽元皇時因作訓用智垂芳祈恩望秩報德蒸嘗唯崇小祀焉間大方未宏三教但佩九章膺期撥亂粵我聖唐明達因果端拱文昌化侔十號仁深百王律中仲月時登少陽下憐蠢蠢上答蒼蒼式陳金闕爰開道場日宮照曜星臺焜煌空懸珠影焰動輪光雲披玉宇烟散名香供疑飛下聲含鳳鏘麒麟表瑞甘露呈祥功隨劫遠德共天長恩霑有際澤被無疆命同元始體類金剛鴻基永永降福穰穰濟法寺釋法琳致書尚書右僕射蔡國公足下法琳草衣野客木食山人尢類曲針誠同腐芥不被知於當世合緘口以終身既德愧內充譽慚外滿非唯孤負慧遠實亦帶纍道安是以畢志青溪歸心紫蓋覆船巖下永味經書鬼谷池前長觀魚鳥豈謂復辭林藪更入囂塵久客秦川俄離楚塞萍流八水葉墜三陽口腹之弊已淹仲叔之情何寄臥靈臺而起恨游白社而興嗟南巢之戀倍增北風之悲逾切居生壈坎稟命迍邅空詠七哀徒吟九歎撫躬弔影運也如何加以病在膏肓風纏腠理纍年將息未覺有瘳至於照雪聚螢筋力已謝九流七略難甚緣山萬卷百家沓猶行海前因傅子聊貢斐然仍以未竭邪源今者重修辨正頗為經書罕備史籍靡充雖罄短懷罔知克就仰惟僕射公運籌策之才居阿衡之任知人之器遠邁山濤接士之心還方趙武風姿爽朗識度含宏既握靈蛇之珠爰佩荊山之玉所以弼諧庶績燮理文昌德鏡搢紳譽形朝野加以門稱筆海世號儒宗不忘素昔之懷曲賜憂憐之訪寒灰更暖朽木翻榮昔王粲閲書取資蔡氏相如達賦必賴楊侯意者但是諸子雜書及晉宋已來內外文集與釋典有相關涉處悉願披覽謹以別録仰呈特希恩許輕陳所請悚息何言邪見信心古來共有善人惡黨今日寧無前以傅子讇言略呈小論既蒙上達復荷褒揚戢在中心但知慚德昔三都賦未值張華無人見賞今破邪論不逢君子誰肯為珍比者海內諸州四方道俗流通抄寫讚詠成音回邪見之心發愚人之善者豈非明公之力也必能利物薄有冥功仰用莊嚴竝將回向耳請公為宏護檀越近覽所報辛中舍析疑論詞義包舉比喻超絶璨璀眩離朱之目鏗鏘駭師曠之耳固以妙盡寰中事殫辨囿譬玉衡之齊七政猶溟海之統百川煥煥乎巍巍乎言過視聽之外理出思議之表足可杜諸見之門開得意之路者也至如住無所住兼修之儀在焉為無不為齊應之功宏矣將令守雌厚顏獨善靦容乃理異之顯哉豈元同之可得夫立像以表意得意則像忘若忘其所忘則彼此之情斯泯非忘其不忘而小大之殊有異是知日月既出無用爝火之光時雨既降何煩浸灌之澤故云彼此可忘非無此也故吾去也因故去而辨無常新吾來也藉新來以談緣起非新非故熏修之義莫成無繕無剋美惡之功孰著蓋以生滅破彼斷常之迷寄因果示其中觀之路斷常見息則弱喪同歸中觀理融則真如自顯或談業理以明熏習乍開報分以釋自然意出情端旨超文外報分有在鳧鶴自忘其短長業理相因草蜂各任其飛化可謂於無名相中假名相說體真會俗豈不然歟詳中舍天挺之才未等若人盡理之說子期有慚於喪偶顏生有愧其坐忘可以息去取之兩端泯顛沛之一致楚既得之齊亦未為失也法師博物不㣥智思無限當今獨步即日梁棟既為衆所知識實亦名稱暜聞加以纍謁金門頻登上席扇元風於鶴籥振法鼓於龍樓七貴挹其波瀾五師推其神雋既聳垂天之翼又縱橫海之鱗支遁之匹王何寧堪竝駕帛祖之方嵇阮未足連衡用古儔今君之有矣琳謝病南山棲心幽谷非出非處蕩慮於風雲無見無聞寄情於泉石偶觀名作實遣繁憂乍覽瓊章用祛痼疾徘徊吟諷循環卷舒蘊蓄懷袖之中不覺紙勞字故略申片意謹此白書法琳啓緬尋三元五運之肇天皇人帝之興龜圖鳥策之文金版玉笥之典六衡九光之度百家萬卷之書莫不導人倫信義之風述勛華周孔之教統其要也未達生死之源陳其理也不出有無之域豈若五分法身三明種智湛然常樂何變何遷邈矣真如非生非滅而能道資萬有慈被百靈啓解脫彼岸之津開究竟無為之府拔㣥生於見海之外救諸子於火宅之中但化隔葱河千有餘載教流漢土六百許年龕塔相望禪人接踵所以道安登秦帝之輦僧會上吳主之車高座法師能陳八正浮圖和尚巧說五乘化洽九州福霑三世其為利物此之謂歟有隋褫運戎馬生郊災起四凶毒流百姓慧燈既隱法兩將收賴我大唐上應乾心下協黎庶補天以麗三象紐地以安五嶽生民蒙再造之恩釋門荷中興之賜方欣六茲五帝四彼三皇反淳朴之風行無為之化竊見傅奕所上誹毀之事在司既不施行奕乃公然遠近流布人間酒席競為戲談有纍清風實穢華俗長物邪見損國福理不可也伏惟殿下往藉三多久資十善赴蒼生之望膺大寶之期道叶隆平德光副后發洊雷之響則蟄戶俱開啓明離之輝則幽衢竝鏡赫矣允矣難得名矣固以漢光重世周卜永年復能降意福田回情勝境津梁在念牆塹為心伏願折邪見幢然正法炬像化被寄深幸茲乎不任憤悶惄焉之志謹上破邪論一卷塵黷威嚴伏增悚息謹啓武德四年九月十二日啓沙門法琳等啓琳聞情切者其聲必哀理正者其言必直是以窮子念達其言勞人願歌其事何者竊見大業末年天下喪亂二儀黲黷四海沸騰波震塵飛邱焚原燎五馬絶浮江之路七重有平壘之歌烽燧時警羽檄競馳關塞多虞刁斗不息道消德亂運盡數窮轉輸實繁頭會箕斂積尸如莽流血為川人不聊生物亦勞止控告無所投骸莫從百姓苦其倒懸萬物困其無主豈徒法輪絶響正教陵夷聖上興弔俗之心百姓順昊天之命爰舉義旗平一區宇當時道俗蒙賴華戎胥悅於是叶天地而通八風測陰陽而調四序和邦國序人倫功蓋補天神侔立極降雲雨而生育開日月以照臨發之以聲明紀之以文物恩霑行葦施洽蟲魚方欲重述九疇再敷五教興石渠之學布庠序之風遠紹軒羲近同文景功業永隆不知手之舞之足之蹈之者矣竊見傅奕所上之事披覽未遍五內分崩尋讀始周六情破裂嗚呼邪言惑正魔辨逼真猶未足聞諸下愚况欲上干天聽但奕職居時要物望所知何容不近人情無辜起惡然其文言淺陋事理不詳辱先王之典謨傷人倫之風軌何者夫人不言言必有中夫子曰一言合理則天下歸之一事乖常則妻子背叛觀奕所上之事括其大都窮其始末乃罔冒闕庭處多毀辱聖人甚切如奕此意本欲因茲自媒苟求進達實未能益國利人竟是惑弄朝野然陛下應天順時握圖受籙赴萬國之心當一人之慶扶危救世之力夷凶靖難之功固以威蓋前王聲高往帝爰復存心三寶留意福田預是出家之人莫不感戴天澤但由僧等不能遵奉戒行求報國恩無識之徒非違造罪致令傅奕陳此惡言劈踊痛心投骸無地然僧尼有罪甘受極刑恨奕輕辱聖人言詞切害深恐邪見之者因此行非按春秋魯莊公七年夏四月恆星不見夜明如日即佛生時之瑞應也然佛有真應二身權實兩智三明八解五眼六通神曰不可思議法號心行處滅其道也運衆聖於泥洹其力也接下凡於苦海自後漢明帝永平三年夢見金人已來像教東流靈瑞非一具在漢魏諸史姚石等書至如道安道昱之輩圖澄羅什之流竝有高行深解當世名僧盡被君王識知貴勝崇重自五百餘年已來寺塔遍於九州僧尼溢於三輔竝由時君敬信朝野歸心像教興行於今不絶者實荷人主之力也世間君臣父子猶謂恩澤難酬昊天下不報况佛是衆生出世慈父又為凡聖良醫欲抑而挫之罪而辱之不可得也仰尋如來智出有心豈三皇能測力包造化非二儀可方列子云昔商太宰嚭問孔子曰夫子聖人歟孔子對曰邱博識強記非聖人也又問三王聖人歟對曰三王善用智勇聖非邱所知又問五帝聖人歟對曰五帝善用仁信聖亦非邱所知又問三皇聖人歟對曰三皇善用時政聖亦非邱所知太宰大駭曰然則孰為聖人乎夫子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉若三王五帝必是大聖孔子豈容隱而不說便有匿聖之愆以此較量推佛為大聖也老子西升經云吾師化游天竺善入泥洹符子云老氏之師名釋迦文直就孔老經書師敬佛處文證不少豈奕一人所能謗讟昔公孫龍著堅白論罪三王非五帝至今讀之人猶切齒以為前鑑良可悲夫主上至聖欽明方欲放馬休牛式閭封墓興皇王之風開佛老之化狂簡之說尢可焚之若言帝王無佛則大治年長有佛則虐政祚短者按堯舜獨治不及子孫夏商周秦王政數改蕭墻內起逆亂相尋爾時無佛何因運短但琳豫居堯世日用莫知在外見不便事恐蕃國遠聞謂華夏無識夫子曰言滿天下無口過行滿天下無怨惡言之者欲使無罪聞之者足以自誡傅奕出言不遜聞者悉驚有穢國風特損華俗謹録丹款冒以啓聞伏惟大王殿下天挺英靈自然岐嶷風神穎越器局含宏好善為樂邁彼東平溫易自歡更方西楚加以阿衡百揆式序六條德既搴帷仁兼裂網開康莊之第坐荀卿之賓起修竹之園宴文雅之客莫不詩極緣情而賦窮體物信可譽形朝野美貫前英者焉但琳等內顧闕如方圓寡用念傅奕下愚之甚愧凡僧禿丁之呵惡之極也罪莫大焉自尊盧赫胥已來天地開闢之後未有如奕之狂悖也不任斷骨痛心之至謹録奕害事輒述鄙詞件答如左塵黷威嚴伏增殞絶謹啓寶星經梵本三千餘偈如來初證覺道度目連身子及降伏魔王護持國土說此經也自像化東漸帛丿糸歷嵗時三輪八藏之文四樹五乘之旨顯神光於石室流梵響於清臺雖鞮譯相尋尚多疑闕我大唐皇帝乃聖乃神允文允武乘機撫運拯溺救焚反上皇之風行不言之化去泰去甚既掩頓於八紘無事無為乃朝宗於萬國瀚海天山之地盡入提封龍庭鳳穴之鄉咸霑聲教仁踰解網治踵結繩大德間間外齊八則小心翼翼內整四儀臨赤縣而溢慈悲寄元扈而敷宏誓每以諸有非樂物我俱空眷言真要無過釋典有中天竺國三藏法師波頗唐言光智誓傳法化不憚艱危遠涉葱河來游震旦經塗所亘四萬餘里以貞觀元年景戌謹按丙戌為武德九年是年八月癸亥高祖禪位太宗此序以丙戌為貞觀元年當是八月後所作洎於京輦既登上席爰懋錦衣有詔所司搜揚碩德兼間三教備舉十科者一十九人於大興善寺請波頗三藏法師相對翻譯沙門慧淨等證義沙門元謨等譯語沙門慧明法琳等執筆承旨殷勤詳核審名定義具意成文起貞觀二年三月訖四年四月凡十一卷一作八卷十三品用紙一百三十幅總六萬三千八百八十二言般若燈論梵本有六千餘偈摩伽國種姓大士婆毗薜迦菩薩唐言分別明之所作也始夫萬物非有一心如幻心幻如故雖動而恆寂物非有故雖起而無生是以聖人說如幻之心鑒非有之物了物非物則物物性空知心無心則心心體寂達觀之士得其會歸而忘其所寄於是分別戲論不待遣而自除無得觀門弗假修而已入蕩蕩焉不在不離無往無依者也佛滅度後七百年間有出家菩薩厥名龍樹深達實相得無生忍為報佛恩開演中論付法藏云其人如像法中然正法炬折邪見幢外國傳云智慧日已頽斯人今再曜世昏寢已久斯人寤令覺中論凡五師注釋分別明菩薩即一人也此菩薩多聞總持智深志固以本願力不捨㣥生往修羅宮待見彌勒屬以去聖時遠衆論紛然致令雪山採藥多收毒草深水求珠競持瓦礫誠恐一理不窮反增邪見一言不盡翻起異端乃讚述龍樹偈文為茲般若燈論其為論也訶斥內外讚揚真俗窮無生理究實相源照無不寄寂名般若執無不破喻曰明燈蓋方廣之中心諸佛之行處矣嗟乎後之學者便息百城之遊永無五失之謬論凡二十七品為十五卷若內人立義皆標人名無名者例稱自部若外人立義亦標人名無名者例稱外人縛解品已前慧賾執筆觀業品已後法琳執筆於是起四年夏訖六年冬勘定既周繕寫云畢所司詳讀乃上奏聞夫禮懺法世雖同效事儀運想多不周旋或粗讀懺文半不通利或推力前拒理觀一無效精進之風闕入門之緒故言勤修苦行非涅槃因但禮念軌儀文非不委以散情昏重想運難成豫因天台再有詳補撮覽樞總使隨言作念隨念成想一一瞻視如對目前庶時刻不虛事法成辦依本文總歷十法結要事理有黃巾李仲卿學謝管窺智慚信度矜白鳥之翼望駭嵩華負爝火之光爭輝日月乃作十異九迷貶量至聖余慨其無識念彼何辜聊為十喻曉之九針誡之用指諸掌庶明達君子詳茲而改正焉有考古通人與占衡君子觀李卿誹毀之論閲開士辨正之談詳而議之發憤興歎欲使邪正異轍真僞分流定其是非以明得失冀後進者永無疑焉通人曰余觀造化本乎陰陽物類所生起乎天地歷三古之世尋五聖之文不見天尊之神亦無大道之像按靈寶九天生神章云氣清高澄積陽成天氣結凝滓積滯成地人生也皆由三元養育九氣結形然後生也是知陰陽者人之本也天地者物之根也根本是氣無別道神君子曰道士大霄隱書無上真書等云無上大道君治在五十五重無極大羅天中玉京之上七寶元臺金牀玉几仙童玉女之所侍衛住在三十二天三界之外按神仙五嶽圖云大道天尊治太元之都玉光之州金真之郡天保之縣元明之鄉定志之里災所不及靈書經云大羅是五億五萬五千五百五十五重天之上天也五嶽圖云都者覩也太上大道道中之道伸明君最守靜居太元之都諸天內音云天與諸仙鳴樓都之鼓朝宴玉京以樂道君推此謬談則道君是天之神明既屬州縣則天尊復是天之民伍如佛家經論三界之外名出生死無分段之形離色心境何得更有寶臺玉山州郡鄉里虛妄之甚轉復難矜但道家僞說無迹可觀習俗生常為日已久衆邪競敘至有不同如欲正名理須詳悉今略出緣起隨而判之按周禮自堯已前未有郡縣舜巡五嶽始見州名尚書禹貢方陳州號春秋之時縣大郡小以郡屬縣漢高已來以縣屬郡典誥所明九州禹跡百郡秦并是也縱有道在天上猶應觸事無為何因戶屬鄉居與凡不異既有州縣即有官民州牧郡守姓何名何鄉長里誰子誰弟竝是管學道士無識黃巾不悉古今未窺經史人間置立州縣亦言天上與世符同保僞為真良可羞恥其根脈本末竝如笑道論中委出也通人曰莊周云察其始而無生也非徒無生而本無形非徒無形而本無氣恍惚之間變而有氣氣變而有形形變而有生人之生也氣之聚聚則為生散則為死故曰有有無相生也萬物一也何謂一也天下一氣也推此而談無別有道高處大羅獨稱尊貴君子曰陽氣黃精經云流丹九轉結氣成精精化成神神變成人陽氣赤名曰元丹陰氣黃名曰黃精陰陽交合二氣降精精化為神精神凝結上於九天九天之氣下於丹田與神合凝臨於命門要須九過是為九丹上化下凝以成於人不云別有道神能宰萬物使之生也通人云古來名儒及河上公解五千文視之不見名曰夷夷者精也聽之不聞名曰希希者神也搏之不得名曰微微者氣也是謂無狀之狀無物之象故知氣體眇莽所以迎之不見其首氣形清虛故云隨之不見其後此則敘道之本從氣而生所以上清經云吾生眇莽之中其幽幽冥冥幽冥之中生乎空同空同之內生於太元太元變化三氣明焉一氣青一氣白一氣黃故云一生二二生三按生神章云老子以元始三氣合而為一是至人法體精是精靈神是變化氣是氣象如陸簡寂臧矜顧歡孟智周等老子義云合此三乘以成聖體又云自然為通相之體三氣為別相之體檢道所宗以氣為本考三氣之內有色有心既為色心所成未免生死之患何得稱常君子曰原道所先以氣為體何以明之按養生服氣經云道者所也保氣則得道得道則長存神者精也保精則神明神明則長生精者血脈之川流守骨之靈神精去則骨枯骨枯則死矣故莊周云吹欨呼吸吐故納新彭祖修之以得壽考校此而言能養和氣以致長生謂得道也通人曰縱使有道不能自生從自然出道本自然則道有所待既因他有即是無常故老子云人法地地法天天法道道法自然王弼之言天地王道立不相違故稱法也自然無稱窮極之詞道是智慧靈和之號用智不及無智有形不及無形道是有義不及自然之無義也君子曰易乾鑿度云昔燧人氏仰觀斗極以定方名庖犧因之而畫八卦黃帝受命使大撓造甲子容成次歷數五行九宮之說自此而興故說卦云陽數九者立天之道曰陰與陽陰二陽一則天有三焉立地之道曰柔與剛剛二柔一則地亦有三立人之道曰仁與義義二仁一則人亦有三三三合九陰陽相包以成萬物不聞別有道神處太元都坐高蓋天上羅三清下包三界居七英之房出九宮之上行神布氣造作萬物豈非惑亂陷墜人間耶校功則業殊比跡則事異沙門旌德而靡違道士言行而多過立不利之遐迹逮不朽之元猷洋洋乎弗可尚也其唯釋教歟豈以坳塘小水匹馮夷大波者哉非所類矣有李遠問舍人者曾讀斯論意所未詳便以示沙門法琳請更廣其義類琳乃答曰蒙示辛氏與淨法師齊物論大約兩問詞旨宏贍理致幽絶既開義府特曜文鋒舉佛姓平等之談別㣥生各解之說陳彼此之兩難辨元同之一門非夫契彼寰中孰能震斯高論美則美矣疑頗疑焉何者尋上皇朝徹始流先覺之名法王應物爰標佛陀之號智慧者蓋分別之小術般若者乃無智之大宗分別緣起所以強稱先覺無知性寂於是假謂佛陀分別既於外有數無知則於內無心於外有數分別之見不亡於內無心誘引之功莫匱甚秋毫之方巨嶽踰尺鷃之比大鵬不可同年而語矣莊生云吾亡是非不亡彼此庸詎然乎所以小智不及大智小年不及大年惟彭祖之特聞非衆人之所逮也况三世之理不差二諦之門可驗是以聖立因果凡夫有得聖之期道稱自然學者無成道之望從微至著憑繕剋而方研乘因趣果藉熏修而始見彼既知而故問余亦述而略答詳夫一音暜被弱喪由是同歸四智廣覃真如以之自顯自顯也者唯微唯彰同歸也者孰來孰去蓋知隨業受報二鳥不嫌其短長因溼致生兩蟲無擇於飛化不存待與無待明即待之非待矣請試論之昔闞澤有言孔老法天諸天法佛洪範九疇承天制用上方十善奉佛慈風若將孔老以匹聖尊可謂子貢賢於仲尼跛鱉陵於駿驥欲觀渤澥更保涓流何異蔽目而視毛端却行以求前路非所應也且王導周顗宰輔之冠蓋王濛謝尚人倫之羽儀次則郗超王謐劉璆謝容等竝江左英彥七十餘人皆學綜九流才映千古咸言性靈真要可以持身濟俗者莫過於釋氏之教及宋文帝與何尚之王元保等亦有此談如其宇內竝遵斯教吾當坐致太平矣尚之又云十善暢則人天興五戒行則鬼畜絶其實濟世之元範豈造次而可論乎中舍學富才高文華理切秦懸一字蜀挂千金法琳徒礪鉛刀何以當茲奇麗也不量管見輕陳鄙俚敢此有酬示麻續組耳李舍人得琳重釋渙然神解重疑頓消仍以斯論廣於視聽故得二文雙顯各其志乎琳聞至道絶言豈九流能辨法身無像非十翼所詮但四趣茫茫飄淪欲海三界蠢蠢顛墜邪山諸子迷以自焚凡夫溺而不出大聖為之興世至人所以降靈遂開解脫之門示以安穩之路於是天竺王種辭恩愛而出家東夏貴遊厭榮華而入道誓出二種生志求一妙涅槃宏善以報四恩立德以資三有此其利益也毀形以成其志故棄鬚髮美容變俗以會其道故去君臣華服雖形闕奉親而內懷其孝禮乖事主而心戢其恩澤被怨親以成大順福霑幽顯豈拘小違上智之人依佛語故為益下凡之類虧聖教故為損懲惡則濫者自新進善則通人感化此其大略也而傅氏所奏在司既不施行乃多寫表狀公然遠近流布京室閭里咸傳禿丁之誚劇設席上昌言胡鬼之謠佛日翳而不明僧威阻而無力於時達量道俗動毫成論者非一各疏佛理曲陳邪正皆是奕之所廢豈得引廢成興雖曰破邪終歸邪破智實俗姓邵氏雍州萬年人年十一出家京師大總持寺武德七年薛舉東逼僧法雅奏請京師翹勇僧千人充軍伍實致書止之雅不從實乃毆雅事聞敕令還俗後雅被誅復敕出家卒年三十八法常等言年迫桑榆始逢太平之世貌同蒲柳方值聖明之君竊聞父有諍子君有諍臣法常等雖豫出家仍在臣子之例有犯無隱敢不陳之伏見詔書國家本系出自柱下尊祖之風形於前典頒告天下無得而稱令道士等處僧之上奉以周旋豈敢拒詔尋老君垂範治國治家所佩服章亦無改異不立觀宇不領門徒處柱下以全真隱龍德而養性智者見之謂之智愚者見之謂之愚非魯司寇莫之能識今之道士不遵其法所著衣服竝是黃巾之餘本非老君之裔行三張之穢術棄五千之妙門反同張禹漫行章句從漢魏已來常以鬼道化於浮俗妄託老君之後實是左道之苗若位在僧尼之上誠恐真僞同流有損國化如不陳奏何以表臣子之忠情謹録道經及漢魏諸史佛先道後之事如別所陳伏願天慈曲垂聽覽沈俗僧智實白實懷橘之嵗涉清信之名採李之年染息慈之位雖淺智褊能然敢希先達竊見化度寺僧法雅善因曩世受果今生如安上之遊秦似遠公之入晉理應守護鵝之行持結草之心思報皇王之恩奉酬覆載之德乃於支提靜院但為宰殺之坊精舍林中鎮作妻孥之室脫千僧之服四海愴動地之悲謗七佛之經萬國嗟訴天之怨自漢明感夢摩騰入洛已來無所名人頗曾聞也皇帝受禪撫育萬方欲使王道惟清法海無穢公策名奉節許道亡身除甘蔗之災拔空腹之樹使禪林鬱映慧苑扶疏茂實家聲震於邦國寧可忍斯邪佞乃捧鉢於祗洹棄我貞廉絶經行於靈塔龍門深濬奉見無由天意高懸流問何日惟公鑒同水鏡智察幽微仰願拯驚翼於華箱濟涸鱗於窮轍輕以干陳但增悚懼與子同生像季共屬陵遲悲六道之紛然愍四生之未悟子每遊鳳闕恆遇龍顏理應灑甘露於帝心廕慈雲於含識何乃起善星之惡見鼓調達之惡心令善響沒於當時醜迹播揚於後代豈不以朝含安忍省納芻蕘恣此愚情述斯頑見嗟子可悲實傷其類且自多羅既斷終不更生析石已分義無還合急持衣鉢早出伽藍使清濁異流蘭艾殊列則使㣥臣息於譏論梵志寂於謗聲定水噎而更通慧燈晦而還照此言至矣想見如流
