seq: 61
front:
  text: 全唐文欽定全唐文卷六十一憲宗六
  hash: sha256:0b4cad64d43d18afec3c7f76c76f8ed95dbe3f8d62436b1b96556ad30bb1f1b3
body:
  text: 天覆至宏為惡者每聞於自絶國章具舉干紀者難逭其常刑元言致戒於佳兵丹浦本非其樂戰朕纘承鴻業祗奉睿圖居軫納隍動思濟物仗以大信御茲萬邦省躬靡忘於憂勤宏道必先於撫諭猶以庶政多缺至誠未孚兢兢之心豈自暇逸近者淮右致討宿兵纍年宗社降靈妖氛克殄方橐弓而匣刃期阜俗以息人旋議徂征諒非獲已李師道代荷寵榮謬居垣翰功不列於勳籍過難逭於簡書尚復潛包禍心果是僞布誠懇屬問罪蔡土徵師合圍助彼寇仇敢為影援陰通信使密致帛書纍抗表章請捨元惡所圖不軌事匪一端遂至伏聚奸凶震驚洛邑焚劫內庫擾動河陰皆欲撓軍旅之深機阻邦國之大計加以擅興兵甲侵軼徐方驅逼戎行淩脅中使惡逾滋蔓志益猖狂乃者盜發京師實啓端本又常賦不入自致愆違凡此罪名皆在不赦朕以新除淮寇務息征師素為含容豈令獻效而乃懷其積惡懼彼羣言將佐交馳頻疏謺至闕心首罪請命求哀特降使臣往加宣論而師道請令長子入侍闕庭願獻三州上歸圖印指期而發飛奏以聞詐為納地之謀翻稔滔天之逆凡所陳列無非怨妄露其悖慢之詞備在封章之內明示百辟衆怒一心咸請致誅以懲無上猶為伏念至於旬時又聞遽越封疆寇掠德棣焚爇村落縱暴挻灾大肆鴟張曾無畏忌斯則人神之所共棄天地之所不容罪惡貫盈理當撲滅宜令宣武魏博義成武寧橫海等軍節度兵馬分路並進同力攻討相為犄角其李師道在身所有官爵並宜削奪其淄青將士如能梟斬凶渠者先是六品巳下官授三品正員官其先是五品巳上官者節級超獎仍與實封五百戶莊宅各一區錢二萬貫於戲動衆興師誠有乖於至理養災蓄患懼流毒於生人敷信未化於窮凶格物深慙於菲德甫平寇難遄務討除宵旰在懷良深愧歎庶將去暴永用止戈宣示中外咸令知悉圖難忘死為臣之峻節顯忠旌善有國之令猷日者妖豎反覆侮我朝章而濮州刺史高沐劫在凶威潛輸忠款諷其不庭之咎將冀革心數其煮海之饒聿求利國伏奏必陳其逆節漏師常破其陰謀竟以盜憎遂死王事歿而不朽風聲凜然式表漏泉之澤且彰徑草之節可贈吏部尚書仍委馬總訪其遺骸以禮收葬優恤其家若有子孫具名聞奏李宗奭本以凶很自抵誅夷用戒猖狂合從孥戮顧其微細巳正刑章特示含宏載寬緣坐其妻韋氏及男女等先收在掖庭並宜放出朕以薄德嗣膺寶祚執圭璧以奉九廟垂衣裳以臨萬邦十有六年於茲矣賴天地敷祐宗社降靈內有百辟卿士外有州牧方伯文武並用忠賢叶心以弼豫一人以康彼兆庶戡翦羣慝廓清九圍方保和平共登仁壽而萬務所逼六氣或侵遘疾有加至于大漸用申顧命式合典謨皇太子恆天縱睿哲日躋誠敬惟孝惟友克寬克仁必能承祖宗之丕訓守邦家之鴻業宜令所司具禮於柩前即皇帝位仍以司徒兼中書令宏攝冢宰應諸道節度觀察防禦等使及諸州刺史寄任尤切並不須赴哀皇帝易月之制皆依舊典文武官等朝晡哭臨十五舉音其喪儀及山陵制度務從儉約嗚呼始終常禮奚可甚哀漢文至言朕所遵慕咨爾將相洎中外腹心爪牙之臣其敬保元子惟懷永圖以纘我高祖太宗之耿光無廢朕命敕朕聞為子之道莫大於寧親順色之方必先於養志此文王之孝曾氏之心每聆遺風常所景行伏以太上皇帝怡神閒館追想大庭將保靜延休滌慮寧體初陽變候舊恙愆和寢食之閒有不安節夙夜憂灼豈遑寧居而內奉庭闈冀承安否嘗藥視膳且不暇於衣冠一日萬幾固有虧於聽覽庶政關決遂闕躬親恐中外具寮未悉豫志起今月十六日以後權不聽政故茲宣示當體朕懷錢貴物賤傷農害工權其輕重須有通變比者銅鉛無禁鼓鑄有妨其江淮諸州府收市銅鉛等先巳令諸道知院官勾當緣令初下未盡頒行宜委諸道觀察等使與知院官切共勾當事畢日仍委鹽鐵使據所得數勘會聞奏李錡幸因宗屬早列方隅德宗藉有土之權委之以泉貨順宗重維城之寄授之以旌旄恩深兩朝榮溢當代朕恭承寶祚首命端僚君臣之分益親天地之恩無盡僞詞三上懇請入朝推以至誠許其重任曾不知居不疑之地懷不測之端有梟獍噬食之心恃牛羊項領之力久蓄亡命敢有亂常謂干戈可得而興江山可得而恃悖言肆口逆狀滔天滅身之辜擢髮難數國有大典與衆棄之為人除害非朕敢捨致茲用辟終所愧懷李琦并男師回準法處斬其餘支黨巳從別敕處分自今巳後州府所送進士如迹涉踈狂兼虧禮教或曾為官司科罰或曾任州府小吏有一事不合入清流者雖薄有詞藝并不得申送入如舉送以後事發長吏奏停見任如巳停替者殿二年本試官及司功官見任及巳停替並量事輕重貶降仍委御史臺常加察訪處分委御史臺諸道觀察使嚴加察訪不得容貸其諸司所奏官屬及有狀論薦人如有贓犯過惡亦請具名聞奏量加殿罰所冀人知所懼舉不妄行為官擇人得賢報國敕所納匹段並依中估明知加價納物務在利及疲人若更徵剝實錢即是重傷百姓自今巳後送省及留使匹段不得剝徵折估錢但委刺史縣令分明告諭令加意織造不得濫惡故違節級科貶其供軍醬菜等價直合以留州使錢充者亦令見錢匹段場納仍具每州每使合納見錢數及州縣官俸料納一半見錢數同分析聞奏仍便納入今年旨條以為常制餘依自古哲王有天下者懲其暴亂則法所宜加察其情狀則罪有不及況故太尉兼中書令武俊忠扶邦國節著艱難覽視冊書想見風概而承宗毀棄門戶違悖君親遽肆姦凶自貽討伐欒盈干紀寧忘武子之勳蕭延紹封無廢鄼侯之嗣矧忠而見節禮以議賢宜降深恩庶行中典載明樵採之禁兼茂歸降之制好生之德俾洽人心止殺之源用孚朕志其王士平士則並宜各守舊官其武俊實封仍特賜士則承襲鎮州大將昔著茂勳言念其勞每用增歎其有食實封者並宜依舊不須停給如領兵軍將以所領歸降者超二資與官賜實封二百戶仍賞錢一萬貫文其武俊士真松楸墳墓行營諸軍並不得輒有毀伐除暴勝殘事非獲巳布德施惠仁豈遠乎用彰弔伐之師式示皇王之道宣布內外宜悉衷懷刑部大理決斷罪囚過為淹遲是長姦幸自今巳後大理寺檢斷不得過二十日刑部覆下不得過十日如刑部覆有異同寺司重加不得過十五日省司量覆不得過七日如有牒外州府節目及於京城內勘本推即日以報牒到後計日數被勘司卻報不得過五日仍令刑部具遣牒及報牒月日牒報都省及分察使各準敕文勾舉糾訪如有違越奏聽進止其有獄情可疑須再三詳審非限內可畢者即別狀分析并寺司每月巳斷未斷囚姓名事由並申報中書門下復讎殺人固有彞典以其申冤請罪視死如歸自詣公門發於天性志在徇節本無求生之心寧失不經特從減死之法宜決一百配流循州黔中水災之後又辰漵初安如聞軍府之閒每事罄竭俾其存濟須有優矜其涪州緣屬荊南有供荊南節度錢二千四百貫令隨本州割還黔府兼於涪州送省錢三千八萬貫文內更取一千五百貫添賜黔府見在將士軍資立㦸官中大夫守京兆尹上柱國臨淄縣開國男賜紫金魚袋元義方朝議大夫守尚書戶部侍郎判度支護軍賜紫金魚袋盧坦立㦸雖令式所著似有闕文而臺閣相承久為定制盧坦元義方如有所見即合上聞造次而行殊乘審慎宜各罰一月俸料其㦸仍令所司收納左司郎中陸則勾之任發付不精禮部員外郎崔備工部員外郎元禮等或以禮許人或守官假器此於申請其過尤深各罰一季俸料緣兵興以來勳賞超越其所立㦸須有明文宜令所司準舊制待官階勳至三品然後申請仍編於格令永為常式河東河中鳳翔易定四道州縣久破俸給至微吏曹注官將同北遠在於理體切要均融宜以戶部錢五萬五千貫文充加四道州縣官課料公綽崔芃所進絹等所司奏聞各有缺少事緣進獻皆合精詳致使闕遺固非審慎柳公綽宜罰兩季俸料崔芃罰一季俸料李少和職奉察廉迹乖周慎除替巳後猶取公錢或交換未填或轉移私費今除巳填納贓數外尚缺三千七百餘貫身巳淪沒不可徵收宜放免吳憑曾佐史府忝履宦途自宜畏法慎身豈得為人掌貨事關非道理合懲愆宜配流韶州其付杜載錢物宰輔之任寵寄實深致茲貨財不能拒絶巳令勘問悉合徵收貴全終始之恩俾宏寬大之典其所用錢物特宜矜免杜載等並釋放僧鑒虛付京兆府決重杖一頓處死其財産奴婢官收張茂昭立功河朔舉族歸朝義烈之風史冊攸載如聞身歿之後家無餘財追懷舊勳特越常典宜歲賜絹二千匹春秋二時支給河南尹職在摘發奸盜隱伏無遺今河南府劫殺崔應家賊彰暴若斯收擒不獲致使漏網得非慢官其河南尹及本縣令捕賊官宜各罰一月俸料其捕賊官至較考日仍書下考其留守下本巡所繇宜委權德輿節級科罰佇虐下以慘訊罪違律至使饋餉皆絶瘐死非辜因其壅隔更令殘毀戕人及此良用憮然俾投禦魅之鄉以戒字氓之長可守雷州海康縣尉比緣諸司食利錢出舉歲深為弊頗甚巳有釐革別給餐錢其御史臺奏所勘責祕書省等三十二司食利本錢數內有重攤轉保稱甚困窮者據所缺本利並放其本戶中納利如有十倍以上者既緣輸利歲久理亦可矜量準前本利並放其納經五倍以上從今年十二月以前應有缺利並放起元和十年正月以後準前計利徵收其餘人戶等計其倍數納利非多不可一例矜放宜並委本司準前徵納其諸司所徵到錢自今巳後仍於五分之中常抽一分留添官本各勒本司以後相承收管其諸司應見徵納及續舉放所收利錢並準今年八月十五日敕充添修當司廨宇什物及令史驅使官廚料等用仍委御史臺勾當每常至年終勘會處分其諸司除疏理外見在本錢據額更不得破用如有缺失即便勒主掌官典所繇等據數填備其中書門下兩省及尚書省御史臺應有食利錢外亦便令準此條流處分其諸司除此食利錢更別有諸色本錢不得妄援此例敕張晏李惠嵩李㝢嚴清受命孽臣害我良弼凶虐之甚古今所無雖奸源不窮而天網難漏擒捕斯獲兵刃具存自相證明遂得情實宜從極法以快衆心并康少賁造端合謀不可異等宜處斬張公佐李少寧徐良季胡弟奴高志巡田再興楊日暉華季進胡抱直劉憲生闕奉詮及李惠嵩妻阿馬等並合從坐況乃同情定付京兆府決痛杖一頓處死蘇表藏蓄兵器衒耀軍謀朋遊悉無賴之徒取受多不軌之物屬當闕索爰得其人京輦之下豈容此輩宜決杖八十配流費州其妻阿康奴緑耳等不識陰情難書罪罰趙環等妻阿樊阿唐張晏女二初則不知終然同惡悉付京兆府各決二十放其鎮州進奏趙環并官健及王承宗行官家人魏升朝等一十八人並赴京兆府收管待後疏理處分侯倫李英雖言巳歸本道欲於何處逃刑待投獲日準例處分張晏趙環等七人如更有親族並合搜檢準今年八月敕處分其刀劒器械等並付所由準法處分敕天地至廣有自絶者不得容皇王至仁有當誅者不敢赦朕纘承丕業虔奉睿圖樂戰佳兵每思聖祖之誡納汚藏垢嘗佩先哲之言罪有難原事非獲巳成德軍節度管內支度營田恆冀深趙德棣等州觀察處置等使銀青光祿大夫檢校吏部尚書兼恆州大都督府長史御史大夫上柱國王承宗自滌疵瑕纍加獎拔列在維藩之重待以忠正之途謂懷君父之恩克勵人臣之節而動思棄命恣逞非心傲很反常橫厲無畏以其先祖常立忠勳每為含容庶聞悛革曾不知陰謀逆狀久則逾彰凶德禍機盈而自覆乃敢輕肆指斥妄陳表章潛遣奸人竊懷兵刃賊殺元輔毒傷憲臣縱其凶殘無所顧忌推窮事跡罪狀彰明周覽讞詞良用驚嘆今罪人咸伏首惡有歸雖當去害之誅猶軫録功之念宜令絶其朝貢使自懲省冀其翻然改過束身歸朝攻討之宜更俟後命儻或不能遷善即當續有處分所為指使蓋自承宗其事不在於三軍其辜闕延於百姓所以但絶朝貢未加討除如不自新止於有罪咨爾成德之衆勉於忠順之機博野樂壽之郊本范陽管界劉總自授朝寄常罄公忠既有繼於能勞則宜仍於舊服其博野樂壽兩縣並卻賜劉總收管大中大夫檢校左散騎常侍兼少府少監駙馬都尉賜紫金魚袋王承系亦由勳伐之後錫以姻戚之榮莫顧寵私用包淫慝交通謀慮叶比奸凶撫茲情狀合正刑典俾居遐遠猶示寬宏宜於黔府安置朝請郎守太子左贊善大夫賜紫金魚袋王承迪朝請郎守丹王府司馬上柱國賜紫金魚袋王承榮國有彞章亦宜從坐承迪宜於歸州安置承榮宜於通州安置仍並馳驛發遣各委本道具到州府月日奏聞雲麾將軍上護軍王士平忠武將軍守左神武將軍事兼御史大夫賜紫金魚袋王士則並志秉恭德家承茂勳既申闕惡之議亦以全功臣紹續之慶示朝典旌別之宜委中書門下即加獎授嗚呼朕方以五常之道刑於萬國之風猶有棄德而崇奸興穢以自臭惟訓導之不至顧菲薄而增慙尚欲依違務宏天網而公卿庶尹多士具僚繼有陳論咸請誅討沈吟軫慮未忍加兵屈法申恩乃茲懲絶迫於公議難徇衷懷宣示中外咸令知悉新授右散騎常侍任迪祕書少監獨孤郁等如聞疾患日久未在視事其俸料等宜令所司住給敕淮蔡未賓師人暴露而三朝元會萬國來庭舉樂稱慶有懷愧惕其來年正月朝賀宜權停止諸軍優賜並準例處分王遂令私屬吏人請兩池課料有乖慎守合示薄懲但緣頃年出軍南北置使頗聞約身奉國省費相懸每念前勞特寬常憲巳從別敕處分其韋從素柳季常各宜決四十其所請錢物委度支使準法據數徵納朕聞事親之禮問安雖限於晨昏為子之心就養在勤於左右斯實虞帝明訓周王遺風朕率而行之不敢有墜伏以皇太后母臨萬國子惠兆人存神保和養素全道屬韶陽改濡露感思舊恙有加常膳頓減夙夜惶惕不知所寧今當專奉庭闈躬嘗藥餌脫冠解帶且無暇於寢興負扆臨軒安能親於聽斷起今月三日以後權不聽政故茲宣示宜體朕懷蓋聞天地之德常存煦育之仁皇王之孝克念述遵之義朕纂承丕訓每務躬行而釁禍相延再罹煢疚大行太后慈顏永遠仙馭莫追遺旨丁寧俾親庶政祗奉號咽不知所措緬懷風樹之感俯追龜筮之期以復土方興役車未巳慮失農桑之或貽凍餒之憂惻然憫傷思獲均濟緣上陵所要車牛夫役等除官中自有外並須和雇仍先折本戶夏稅錢訖度支以不折估匹段充填如本戶所折稅錢巳盡即所司給付無令損折仍委山陵使與所司切加勾當不得輒令侵欺寇賊未平國用茲廣若加賦斂重困黎元行權取濟自今巳後應內外支用錢宜每貫除墊陌外量抽五十文仍於本道本使據數逐季收計其諸道錢便差綱部送副度支收管隨貯納以備軍需賊平後則依常例兩路兵戈尚未寧息眷言供億每慮勞煩將贍軍需必資省用其今年賀冬來年賀正進奉宜並停敕淮西賊中百姓窮困相率歸順其數甚多言念生人載懷哀憫必資綏撫始獲安存於許汝行營側近置行郾城委韓宏計議揀穩便處置又於唐州側近置行吳房縣仍令本界節度觀察使擇幹了官知縣事兼量置兵馬防護使免憂危河中觀察使趙宗儒所收管內諸州錢物等既有敕文所宜遵守縱緣軍用亦合奏陳宜罰一月俸料崔鄯所令勘覆頗未詳盡以茲奉職可謂慢官宜罰一季俸料
