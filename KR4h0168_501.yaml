front:
  text: 全唐文欽定全唐文卷五百一權德輿十九
  hash: sha256:8568795d69269954ef635ee19773afd2d50e1b1e948662a79c167f1be78e4fa4
body:
  text: 周道親親夾輔王室分唐叔以懷姓九宗職官五正故其後文侯受秬鬯之命文公受大輅之錫祿勳推恩惇敘昌大理道之所繇也國家憲章文武選建明德元功侯籍延耀本枝初祖景皇帝之支曰鄭王亮實生淮安王神通用親賢功德左右休運淄川郡王孝同淮安之昭也左衞一作右衞將軍燧淄川之穆也劒州長史贈太僕少卿廣業承祖禰積厚之慶而生尚書尹三王都總六師帥八命四履投艱難服勤勞有猷有守以至歿代禮賁於追命澤流於代官有由然也尚書諱國貞字南華天資風采為宗室儀矩洌如寒泉嶷若崇山修身筮仕動有休裕開元十三年明皇帝肆覲東后柴於岱宗以公族侍祠調補綿州參軍事暴雨忽至江流泛溢公自下位能禦其災既堅舊防仍復故道累遷岐州錄事參軍太師苗公太尉房公繼為二千石皆所引重御史大夫張倚採訪關中表為支使天寶末林胡覆三川犯秦關詔除殿中侍御史為襄陽郡司馬且分戎政公以侍板輿辭革車換房陵太守表課尤異徵拜長安縣令風政肅清改秦州刺史成命中止復為長安令尋遷汴州刺史未及行復輟為京兆少尹天子以公積有誠效可居大官累命為河南京兆成都尹劒南西川節度使其撫周郊猰㺄方熾公與太尉臨淮王議曰河洛為天下衝且無車賦比屋安堵寇將甘心焉不若虛其邑居挈以西去贏糧善地可俟師期繇是太尉壁河陽公次於陜伐謀銷患君子推其智其在京轂兵火之餘大命將泛物力亦屈而百役煩苦出於傷痍公曰元元愁歎受命惠養儻不能曠然丕變豈副明天子鬱悼之心耶列上蠲除悉蒙可報凡調於人者去其十九清靜愷悌百姓稱之其鎮岷峨裔人樂禍殺嘉榮二州刺史以開邊隙公命將疾攻舉無遺類明年昆戎圍我三城分遣銳師據便城壁戒嚴持重徼其極而擊之賈餘無前酣載盡殪悉獻虜獲軍無私焉鄰壤不靖偏師叛換將盜兵符已據城寺出車壓境指顧而平凡三整武經而巴蜀軌道拊循安置四封畏其威柄用者沮公勳猷徵為殿中監命書既下不俟駕行囊被單車無道里費取倍稱之息五萬甫達京師上嘉而賜之俾折其券寇有段子章者恣睢就戮方帥以告語聞詔公宴見前席嘉獎且曰利兵積穀皆卿之素也其無駭庈父之謂乎朝野嘉其首功而服其潔已臨淮王移鎮海岱長轂在郊西邊北朔合淮陽圻父五諸侯之旅主盟中權盡護諸將於是拜戶部尚書河中節度都統使又以職顓戎重則風俗不阜加管內觀察使權知絳州刺史公外總方畧內修班制當強弩之末無半菽之糧不忍加賦飛章未下猶以憲度為已任椎剽者斃之行師諸校譸張觖望至是夜暮變起或以跳驅諭公公曰吾之不敏當死節官下安敢貳偷以煩刑吏亂之剡也公竟及焉議者尚其絜矩而哀其不淑時上元三年建卯月春秋四十八是歲改元寶應至夏五月寧神於三原縣之北原詔以揚州大都督府印綬告第憫其勞也公本諱若幽上元中天子以特立之操為宗工表率錫嘉名以更焉公忠儉誠厚方嚴密靜用儒行憲令修明事功大玉不劌楚金必割凡歷官二十四自解巾至握節勤職十七其以內庭持書中執法亞丞相佩兩印以雄外服者又七命焉刺房陵之後五六年閒車不輟鞅賦職任功名聲章明及公以司徒總輿師令弟若水以內府司贊謁而太夫人福履所介日陳壽觴懷黃佩玉左右溫凊極魯侯之燕喜邁張仲之孝友宜錫壽寵為人倫龜龍曾未中身遭罹凶害前史稱霍去病亦有天幸然則命之所賦有幸焉有不幸焉斯不可問已夫人扶風郡君竇氏鴻臚丞光之女揚府長史御史大夫覦之妹也淑明柔順克叶公志家肥族睦抑有助焉公薨若干年而夫人歿有子四人長曰錡材器碩茂潔廉忠肅遵修訓則復大其門入作卿士出為侯伯貞元十五年以御史中丞剖符潤州宣風以宏禮俗成賦以殖財用大績茂焉中邦賴焉明年就加御史大夫十八年進禮部尚書撫封題劒如公渥命次曰鑑蘄州刺史次曰豐士鄠縣令幼曰豐器長安縣尉皆有幹裕而屈於年位今尚書永惟先公丕矩未刻金石以德輿嘗叨史職久掌贊書知王族大僚之事業見託論譔故不敢沒其美亦不敢溢其言銘曰堯睦九族漢封同姓烈烈淮安乘時佐命淄川而下三葉儲慶乃生我公紹續先正時惟宗英忠智廉清所至風行所居理平山元朱組既靖蜀京鏚鉞琱戈乃主夏盟交修藩衞纂服宏大陟降左右勤勞翼戴隱微之閒乃與禍會夷途始半白晝中晦桓楹羽葆久閟鮮原煌煌密章肅肅絲言盛德復祉藂茲後昆列郡是式价人維藩大江南服考禮修職五曹十聯克嗣先德董是經費陳之藝極本於教忠懋此宣力伊昔祭器實銘烝彞禮則有變魂遊在茲連岡陂陀宰樹參差悠悠終古永錫斯碑春秋時賢卿大夫皆敘其代功舊德章明似續蓋黃流玉瓚之寶產於深山清廟夏屋之材秀於中林其或為珩為珮為節為梲無非禮神用備崇構洪河之東裴氏在焉自魏晉迨今忠賢輩出士林以為領袖史臣被於策而又弈代降休且公且侯上嬪王姬出領方州者可得而言以刻金石曰君諱希先字某四代祖懷節皇給事中工部侍郎荊揚二州大都督府長史洛州刺史諡曰定曾祖昭歷司門度支二郎中衞尉太府二寺卿祖確歷左右衞左右金吾衞四大將軍太府卿太子詹事平陽郡開國公諡曰貞自定公至貞公皆銀青光祿大夫以至烈考怦仕至鄜州刺史太子僕贈絳州刺史凡四代貴仕左曹二千石四衞九列副冬官尹東朝禮及易名恩深追遠代修其業鍾美於君君寬裕博厚恭儉莊誠資性端直詞氣閑雅於經書泛為疏達而不窮章句於吏道通於理術而不求聞問自解巾至於捐館凡歷十一官無疵政無違德祗守家法奉以周旋仕於官朝始為僕寺進洗馬中允再為家令仕於王國歷濟陳蜀三府初為騎曹掾次為長史次為傅其初又為壽安丞後牧臨卭乃遷永嘉班宣六條撫柔二郡惠和所被夷越嚮方其在朝也以鼂錯之智王陽之道而滯於散地恬於久次其剖符也仁恕愛利而必易奉法循理亦不細苛居三年以疾受代貞元六年冬十一月歿於鍾陵之私第享年若干明年八月返葬於長安少陵原之舊塋以夫人永年郡主祔焉禮也惟郡主元宗之孫今皇帝之從祖姑也儲是慶靈生而洵淑窈窕德象婉娩聽從備柔嘉之行成肅雍之道初天寶十三年詔選資地才令以府君有安仁武子之美而下嫁焉齋莊以主中饋和樂以宜姻族作配君子禮同家人嚴祭祀服澣濯者三十六年而歿春秋五十八歲貞元五年也鍾陵之守臣以聞上不視朝率禮有加嗚呼以公之率履永年之仁淑宜其繁祉壽考子孫繩繩而生不極其道歿無主其後此伯道之痛碩人之詩所由作也遺命以兄之子某為嗣乃列其祖代官伐請刻豐碑辭之不獲乃繫詞曰河東右族蕃衍紹續代功世祿昌而熾兮乃生永嘉剖符承家實而不華喻於義兮二邦靜謐禮之善物朱轓赤芾以為貴兮有齊永年作儷仁賢佩玉鏘然四德備兮天漢之尊平王之孫爛其盈門恭祀事兮返彼元壤少陵之上終古悽愴金石識兮皇帝以文明御方夏以德禮序人倫貞元十二年秋九月詔侍臣德輿以故義武節度檢校司空同中書門下平章事贈太傅上谷郡王張孝忠夫人谷氏之淑行內則俾刻金石臣聞風有采蘋采蘩易曰中饋貞吉所以表柔明於內子昭節信於元侯宣力獻功抑有其助夫人之先魏郡昌樂縣人也在漢元成之代衞司馬吉以勳勞致命於絕域大司農永以文學盡規於本朝前史書之以勵臣節四代祖那律皇朝諫議大夫宏文館學士正直之道播於清時曾祖補衮左羽林軍長史祖倚相祕書省正字仍代藏器晦而不耀考崇義天寶末有行師北鄙之勞累書勳伐至左金吾衞大將軍兼殿中監贈特進夫人即特進府君之第八女也稟是門風鍾於女士淑閒之度中外宜之初太傅始自軍校建功河朔克彰婦順敬贊宗事正位於內尚柔有儀洎太傅自易部領常山遂分節旄以至公相上畧兼資於明智中壼載揚其惠和二姓有輝六姻是憲盡褕翟之飾動珩璜之聲建中元年封魏郡夫人三年進封鄧國夫人旌淑哲也鵲巢之均一家人之悔厲籩豆敬齋之色琴瑟靜好之儀夫人備有焉帷堂晝哭良弓繼志上慈下厚就養無方此又令嗣之能致其敬也貞元十一年冬以門承勳績之崇恩有選尚之貴方築外館聿來上京十二年二月丁卯以疾終於萬年縣安仁里私第年四十九遺章上陳敬而得禮皇情憫惻恩贈有加嗣子茂昭義武軍節度易定等州觀察處置等使起復左金吾衞上將軍檢校工部尚書定州刺史兼御史大夫延德郡王博陵上谷之師以續休緒戎車委重優詔抑情次曰茂宏雅王府司馬茂宣舒王府長史嗣雍王府諮議參軍嗣慶試將作少監兼御史丞幼曰茂宗銀青光祿大夫行光祿少卿員外置同正員駙馬都尉皆以純孝裕蠱居喪執禮以其年冬十月甲戌奉夫人之輤車葬於京師少陵原不祔舊封式遵古道恩延戚里有命從之初夫人之兄從政實傳戎韜之訓以中執法剖符定州有妹四人所天皆貴異姓之社從夫以尊公宮之教率性而中象服交映魚軒並馳其後婚親無非勳德故太尉中書令西平王今太尉中書令瑯琊王夫人之姻也納徵佐餕焜燿於一時此又閨門之盛而積善有類也柔正之風本於王化愷悌之澤洽於幽泉此臣之所以拜受德音銘諸樂石也銘曰在漢子雲偘然中正昌言獻可遠緒傳慶降及特進策勳斯盛乃生夫人如玉之溫婉彼淑質宜乎盛門金鉉石窌所從益尊亦既晝哭道彰訓育中權之貴克繼藩服下嫁之榮方承湯沐生也有涯壽胡不遐奄然冥漠喪此柔嘉遽還黃壤空悲白華秦原隱嶙丹旐徐引此焉幽宅自昔同盡追琢徽音終古不泯禪宗長老百巖大師之師曰大寂禪師傳佛語心法始自達摩至於惠能之化行於南服流於天下大抵以五蘊九識十八界皆空猶鏡之明也雖萬象畢呈而光性無累心之虛也雖三際不住而覺觀湛然得於此者即凡成聖不然一塵瞥起六入膠固循環回復於生死之中風濤火輪迷忘不息授受脗合大師得之一言宗通深入無礙師諱懷暉姓謝氏東晉流寓今為泉州人孩提秀發博究書術一旦慨然曰我之祖先今安在耶四肢百體視聽動用孰使之然耶漼然雨泣改服緇褐志在楞伽行在曹溪得圓明清淨之本去妄想因緣之習百八句義照其身心心離文字化無方所於是抵清凉下幽都登徂徠入太行所至之邦蒙被法味止於太行百巖寺門人因以百巖號焉元和三年有詔徵至京師宴坐於章敬寺每歲召入麟德殿講論後以疾固辭十年十二月二十一日恬然示滅其年六十其夏三十五弟子智朗志操等以明年正月起塔於灞陵原凡一鐙所傳一雨所潤入法界者不可勝書著法師資傳一編自雞足山大伽葉而下至六祖能秀論次詳實或問心要者荅曰心本清淨而無境者也非遺境以會心非去垢以取淨神妙獨立不與物俱能悟斯者不為習氣生死幻蘊之所累也故薦紳先生知道入理者多遊焉嘗試言之以中庸之自誠而明以盡萬物之性以大易之寂然不動感而遂通則方袍裦衣其極致一也嚮使師與孔聖同時其顏生閔損之列歟釋尊在代其大慧綱明之倫歟至若從師受具之次第宰臣大官之尊信誕生入滅之感異今皆不書德輿三十年前嘗聞道於大寂聿來京下時款師言頃因哀傷似獲悟入則知煩惱不遠菩提雖聚散於此生期會歸於彼岸銘曰西方之教南宗之妙與日並照百巖得之為代導師熲若琉璃結火燔性愛流溺正癡冥奔命即心是佛即色是空師之通兮無來無去無縛無解師之化兮楬茲靈塔丹素周匝示塵劫兮京師東門二里所多寶塔者沙門靈湊等為先大師薦祉盡敬之地也大師諱圓敬姓陳氏河南陸渾人報年六十四經夏四十四以貞元八年春正月厭代入滅於保壽寺越十有五日遷窆於龍首北原距茲塔西北十餘步初大師入道依本縣思遠寺微公通法華經寶應二年制度編僧籍於東京長壽寺受具於白馬寺本律師曇無德義言下信解以為遵道途而歸都邑涉門閾而躋堂皇故尸羅毗尼以攝妄想五部四分是為扃鍵然後因定發惠登最上乘優婆鞠多由是道也敷暢微妙攘除癡冥如一燈傳照一雨潤物宏我法者可勝道哉代宗朝徵入內道場累詔授興善安國寶應等寺綱首又充僧錄尋授寶應寺上座賜律院以居授瑜伽灌頂密契之法講楞伽經起信論譯虛空藏經鑒義潤文內典㣥書靡不該貫無非宴坐道場沃天心以了義照佛日於中禁鬱為龍象大拯斯人將滅之夕備申告誡中夜累足如期順化其智惠歟其解脫歟法子苾芻縗服成列仰護念慈哀之旨拾蓮華多寶之義厥後十五年而功用成丹素觚稜石輪火齊施於外聖像真言多羅祗夜函於內又以見湊公成就付囑而為上首况不出戶庭持經萬徧願力斯滿嚴飾斯崇勒銘於茲以示塵劫銘曰三生不駐如電如瀑七情相攻如蠆如蝮彼上人者為世導師乃精毗尼以攝㣥疑宏道日大化緣斯畢建茲嚴事如地踴出國門之東萬㝢來同斯為寶所燭耀無窮和尚俗姓權氏法諱契微天水畧陽人十代祖安邱敬公翼為前秦僕射事備載記曾祖文誕皇銀青光祿大夫涪常二州刺史荊州都督府長史平涼郡開國公祖崇本皇朝散大夫滑州匡城縣令與兄戶部郎中崇基水部員外郎崇先皆以文學政事顯名於貞觀永徽之際考同光皇河南縣尉長安縣丞翰林詳定學士與伯兄益州成都縣尉無侍仲兄歙桂梓三州刺史若訥三人同以大名舉進士擢第文章之美為當時冠首然其世德鍾慶若後無達者則有以清淨住世故和尚生而敏悟超然元覺年九歲於薦福寺金剛三藏發心入曼荼羅道場傳持聖印悟入之速發於岐嶷然其德容具舉家族敬異將必擇卿士之良者以嬪之時勇於出世至欲刃其膚以自免翰林府君既捐館母兄竟不能抑遂以初笄之年被服緇褐至天寶元年始受具於福先寺定賓律師隷東京安國寺師事苾芻尼無勝受心門方便之學以為心實境化真由妄遣遣之而真亦隨盡化之而心乃湛然故外示律儀內循禪悅因初心而住實智離有相而證空法乃通四部經於宏正大師尢精楞伽之義而後住無住證洗六妄離二邊遵大道以坦蕩入法流而洄澓以深惠善誘誨學徒或權或實為歸為趣亦猶淨名之隨機攝導蜀嚴以忠孝為言故中外族姻徧沐其化漸漬饒益可勝道哉初以廣德中隨其家南渡安居於蘇州朱明寺以建中二年九月六日冥然化滅報年六十二經夏四十一弟子尼惠操又其兄子也故探其義味最為深入乃率籲緇俗號捧金身建塔於東武邱寺之東北岡從其教也姪孫德輿以為宣父有西方聖人之說東漢有浮圖仁祠之教以其教言之自菩提達摩七葉至大照祖師皆以心法祕印迭相授受故戒生定定生惠得第一義者冲而詣之嗚呼今其詣之矣桑門紀述多不分系緒今備書者亦所以無忘先德故其文也繁銘曰教旨清淨戒珠圓映識浪情塵還源反性彼一切見皆妄想生精修密詣湛爾融明示現者何此身非久強為之銘以焯於後鍾陵之西曰海昬海昬南鄙有石門山禪宗大師馬氏塔廟之所在也門弟子以德輿嘗遊大師之藩俾文言而楬之曰三如來身以大慈為之本六波羅密以般若為之鍵非上德宿殖者惡乎至哉大師法諱道一代居德陽生有異表幼無兒戲嶷如山立湛如川渟舌廣長以覆準足文理而成字全德法器自天授之嘗以為九流六學不足經慮局然理世之具豈資出世之方惟度門正覺為上智宅心之域耳初落髮於資中進具於巴西後聞衡岳有讓禪師者傳教於曹溪六祖真心超詣是謂頓門跋履造詣一言懸解始類顏子如愚以知十俄比淨名默然於不二又以法惟無住化亦隨方嘗禪誦於撫之西裏山又南至於處之龔公山攫搏者馴悍戾者仁瞻其儀相自用丕變刺史今河南尹裴公久於稟奉多所信嚮由此定惠發其明誠大歷中尚書路冀公之為連帥也舟車旁午請居理所貞元二年成紀李公以侍極司憲臨長是邦勒護法之誠承最後之說大抵去三以就一捨權以趨實示不遷不染之性無差別次第之門常曰佛不遠人即心而證法無所著觸境皆如豈在多歧以泥學者故夸父喫詬求之愈疎而金剛醍醐正在方寸於是解其結發其覆如利刃之破罒厶月索甘露之洒稠林隨其義味快得善利者可勝道哉化緣既周趺坐報盡時貞元二年四月庚辰春秋八十夏臘六十前此以石門清曠之境為宴默終焉之地忽謂入室弟子曰吾至二月當還爾其識之及是委化如合符節當夾鍾發生之候叶拘尸薪火之期緇素幼艾失聲望路渡涸流而法雨滂灑及山門而天香紛靄天人交際昧者不知沙門惠海智藏鎬英志賢智通道悟懷暉惟寬智廣崇泰惠雲等體服其勞心通其教以為吾師真心湛然與虛空俱惟是體魄化為舍利則西方之故事傳焉不可已也乃率籲其徒從茶毗之法珠圓玉潔煜燿盈升建茲嚴事眾所瞻仰至七年而功用成竭誠信故緩也德輿往因稽首麤獲擊蒙雖飛鳥在空莫知近遠而法雲覆物已被清涼今茲銘表之事敢拒眾多之請銘曰達摩心法南為曹溪頓門巍巍振拔沈泥禪師宏之俾民不迷九江西部為一都會亦既戾止元津橫霈慈哀攝護為大法礪五滓六觸翳然相蒙直心道場決之則通隨器受益各見其功真性無方妙道不竭顧茲夢幻亦有生滅微言密用煥如昭晰過去諸佛有修多羅心能悟之在一剎那何以寘哀茲窣堵波雲出於山遊於天復歸於自然先生之道似焉涵泳乎道之樞徜徉乎物之初以生為蘧廬復返有而入無先生諱善經縉雲仙都山人也自曾王父而下皆質誠孝敬登聞於鄉黨先生未成童博貫儒書讀道德經至為學日益為道日損三復恍然曰吾知之矣改習四真靈寶等經年十七本郡以制度居縉雲山其後遍登匡廬天台三茅句曲泛然不囿於物虛已以遊代乘彼白雲至於帝鄉時宰王黃門將為太清宮使奏隷宮籍乃從沖虛申先生受三洞經法貞元中於宮院立仙壇躬上士勸道之誠宏大君受釐之重陰功幽贊何可勝言德宗錫以纂節幡珮靡有不備初沖虛之師曰清泉君泉君之師曰來君來君之師曰萬君皆有遺像在開元觀先生乃茲焉宴息立申泉二碑以發天光以極師道凡儒元宿學有道仁人貴遊象服男夫女士傳三景真籙者五百餘人一旦謂入室弟子曰天行物化吾之晦明其動也與物皆春其靜也與化為一成形待盡吾何為哉乃於畢原近郊修露仙隱景之地元和甲午冬季朔旦齋沐潔清與其徒元言終日越三日焚香朝拜泊然返真明年正月寧極於露仙館其年八十三矣其受道也有反風晏溫之景其委化也有清香靈鶴之祥斯又不可涯已嘗以為無心者與物冥則未嘗有對於天下順性命而遺耳目其在是乎其餘奔走於蹇淺倒置之中吾不為也所注道德經幷著文二十篇元覽至賾通乎徼妙嗟乎先生之容不可得而見矣先生之言不可得而聞矣但糟粕具在神明不滅采真者得以虛心道門威儀趙常盈徧得先生之學與符洞幽周元德晏元壽董太珣等或關尹受教或庚桑為役有年數矣吳郡歸沖之廣平劉素芝天水權載之皆從先生遊者也元德狀其崖畧授載之以金石刻噫嘻老龍吉死矣安所發予之狂言哉乃銘曰萬情弊弊謬繳之內先生懸解遐視區外族系於東吳稟靈於仙都演道於明廷棲神於太清隱機於開元歸根於露仙其來適然其去寥然大圓清兮大方厚元鄉返駕兮無何有刻介石兮茲不朽
