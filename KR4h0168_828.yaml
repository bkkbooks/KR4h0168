front:
  text: 全唐文欽定全唐文卷八百二十八觀文臨桂人乾寧初進士第一官侍講學士
  hash: sha256:512ccaa2c1e154fd24a185c45806c924fa443dbe9967a7714d69f90610d7090a
  markers:
  - {type: head, offset: 14, content: 趙觀文, id: KR4h0168_NFKB_828-h1, level: 1}
body:
  text: 皇帝御宇大順壬子季冬十二月故府司空潁川陳公自桂州觀察使膺制命建靜江軍號仍降龍節明年春二月准敕有事於堯舜二祠禮畢顧謂府長史朱韞曰吾軍旅之事則嘗聞之俎豆之事未之學也子嘗知書好古試詳此禮得合於經乎韞惕然而對曰韞塵走下僚安敢輒議祀典公諭之曰古有帛丿糸蕞定大禮者皆草莽之士爾今為上佐佐於郡政何謙而不言韞辭不獲已而對曰嘗見開元禮有祠古帝王之制今請求知禮者共為刪定矧帝舜南巡標乎古典惟茲法物豈可不周由是命有司撰三獻官冠衣劍佩三十有九贊引禮生衣幘一十有六籩豆簠簋洗樽爵幡鼓七十有七儀品斯畢具表以聞帝曰俞哉褒稱綸言不載於此今僕射彭闕兩兩使可繼巨屏守簡子至言者九同關西不惑者三追念前功若已有之以觀文明廷擢第故里遠歸有陳蕃下榻之知有智伯國士之遇有魯肅指囷之意有平仲脫驂之義授書詰旦猥屬斯文觀文謬以二雅得名實未造軻雄之旨克讓未果是敢直書庶幾正教傳乎不朽作頌曰大哉堯舜真風不弭以聖禪聖不子其子舉賢登庸投凶禦魅化匪逆人羶寧慕蟻大功漸著南巡脫屣九疑雨沉蒼梧雲起偉歟元蹤遺於桂水蒼生思之牢醴千祀俎豆禮缺元侯克備發揮古典駢羅雅器三獻得儀雍容劍履教人為臣可達深旨翠巘稽天紅輪出地得君臯陶千載意氣中興有常無令伊恥朴襄州襄陽人以三史舉由荊門令進京兆府司録參軍改著作郎纍擢左諫議大夫同中書門下平章事判戶部進中書侍郎罷為祕書監三貶郴州司戶卒古王者不常厥居皆觀天地興衰隨時制事關中隋家所都我實因之凡三百歲文物資貨奢侈僭僞皆極焉廣明巨盜陷覆宮闕局署帑藏里閈井肆所存十二比幸石門華陰十二之中又亡八九高祖太宗之制蕩然矣夫襄鄧之西夷漫數百里其東漢興鳳林為之關南菊渾環屈而流屬於漢西有上洛重山之險北有白崖聯絡乃形勝之地沃衍之墟若廣浚漕渠運天下之財可使大集自古中興之君去已衰之衰就未王而王今南陽漢光武雖起而未王也臣視山河壯麗處多故都已盛而衰難可興已江南土薄水淺人心虛浮輕巧不可以都河北土厚水深人心強愎狠戾不可以都惟襄鄧實惟中原人心質良去秦咫尺而有上洛為之限永無夷狄侵軼之虞此建都之極選也弧將仕郎試大理評事夫素履子者取周易履卦初九素履往無咎以純素為本履以履行為先雖布衣素須履先王之政教故取天地之始乾坤之初聖人設教之規賢哲行道之跡夫禍福之端生於所履是以聖人以德履帝位而不疚光明者也士庶履能辨上下定民志輒修一十四篇號曰素履子以為針誡而已衮成都臨卭人舉文學優贍科大順中進士後仕梁終禮部員外郎臣伏以罪在亂逆慈后罔赦事關懲勸聖人恆執其或生漏刑辟沒有追敓萬代可知百王不易之道也竊見故保義軍節度使贈太師王珙於國不忠於家不孝身為首帥行桀紂之虐名掛人倫縱豺狼之性頃乘京國患難藉父叔勳勞寵極將相凶踰寇賊坐召伯甘棠之樹殘毒郡人對傅說築版之巖侵侮王室朝臣幕客受戮辱者非少軍吏百姓遭殺害者甚衆朝廷比屬多事每須含垢而上天不容遂振疏網雖假手麾下幸就屠滅然靡伏就法終為僥幸向使珙能於晚節粗立一善以功補過誰曰不然考其終始無改暴橫以珙之骨千鞭不足快憤嫉之人陛下以在宥垂風崇恕御物存其棺冢為恩已厚尚汙典冊於理實難今復請追珙所受贈官爵悉皆削奪以正憲律令天下忠臣孝子知陛下昭章淑慝轉相慕效將來儻復有如珙類者亦冀覩沒後之誅而革其生前之慮明時裁化莫尚於斯先為珙所害故給事中王柷以下一十人尋蒙聖造已各贈官其官府寃死士庶伏乞下陜州以敕弔祭存問其家使並日之明無所不足如春之澤深漸泉壤甫刑曰皇帝哀矜庶戮之弗辜言唐堯之德也伏惟陛下與堯同心干瀆宸嚴無任戰越之至右臣衮伏以典禮褒榮用廣哲王之道生死抱痛可念直臣之魂伏以陛下再闡皇圖初平內患善無歿而不紀惡無存而不誅事或有遺臣敢不奏竊見故祕書郎責授柳州司戶臣劉蕡當大和年對直言策是時宦官方熾朝政已侵人誰敢言蕡獨能指抑墮雨回天之勢欲使當門奪官卿爵土之權將令擁篲遂遭退黜實負寃欺其後竟陷侵誣終罹譴逐沉淪絶世六十餘年正士為之吞聲義夫為之飲泣當時排先見之說後代襲蔽聰之謀寖成其風以至前歲東內幽辱西州播遷旒綴竿而未危矢及屋而非亂伏賴陛下德勝妖孽義感勳賢克返塵鑾再安寶位向使蕡策得用蕡才得施則杜漸防萌尋消逆節豈殷憂多難遠及聖躬以此追維誠堪軫悼當氛霧蔽虧之日雖纍朝明聖其奈蕡何及天地廓清之辰則冥寞幽寃必有望於陛下矣特乞宣付中書門下顯加褒贈仍敕天下州府求蕡子孫振拔録用不獨慰耀九泉之骨庶亦感勵四海之心冒瀆宸嚴臣衮無任戰懼殞越之至臣聞竊謂堯舜所以成其聖哲者稽古之力也故書曰若稽古帝堯又曰若稽古帝舜是則為國之要在乎順考古道而已古事之效布在㣥籍茲歷代所以盛藏書之府不可一日而闕也臣伏念祕閣四部三館圖書亂離已來散失都盡一為墜闕二十餘年陛下追蹤往聖勞神故實歲下明詔旁求四海或遣使搜訪或購以官爵亦已久矣然而一編一簡未聞奏御加以時玩武事不急文化若非別降聖謨無因可致臣今伏請陛下出內庫財於都下置官買書不限經史之集列聖實録古今傳記公私著述凡可取者一皆市之部帙俱全則價有差等至於零落雜小每卷不過百錢率不費千緡可獲萬卷儻或稍優其直則遠近趨利之人必當捨難得之貨載天下之書聚於京師矣不惟充足書林以備宣索今三朝實録未修無所依約便期因此遂有所得斯又朝廷至切之務也某啓伏以洪鈞播物已在生成朗鑑通幽寧期照燭伏以相公三十五丈熙朝德茂軌世才高發言為褒貶之經回顧是寒暄之律自叨洪奬愈切寵驚近又見戶部王侍郎伏知造化工夫不遺纎草丹青潤色偏及偶人輝華而賤質增榮感激而雄眸有淚實以衮家殊辨冕業繼詩書卷懷於盛壯之時浮泛於衰遲之日詞科入仕尋周一紀之星諫署升朝亦改四年之火雖復毛慙腹背角困藩籬何嘗不砥礪公方琢磨文術竟以長沙地窄難呈宛轉之姿南郡鬼逢每受揶揄之恥俄消剝道顯自明恩霖施而窮澤生流瑞降而枯條更肄得不乘風奮力搦朽申勞依魯相之門牆永隨車豎仰殷宗之左右長奉鼎梅卑情無任日夕兢惶生死銜戴之至某啓某鄉品慙卑朝班愧近久託運籌之化元無載筆之能今伏奉恩制伏蒙相公特賜奏授前件官充職者寵靈重疊敢幸於時來塵忝過多但驚於望外下情無任戴恩感激量伎兢惶之至伏以相公道壯龍圖情專鳳策兩掖之內以讜辭為先三館之中以信史為急必銓名實乃授清華固以時屬睿文事當修舉列聖之青編再輯盛朝之鴻藻將鋪是宜對季札以歌唐求孟堅而述漢然後可以昭彰一代舄奕千齡如衮之才非此之任誠欲奉身而退瀝懇以辭無傷棫朴之風自適輪轅之用竊念早依門闥昨侍台階聞善誘而遽已捧承沾謬恩而莫遑辭讓主文譎諫顧出納以何裨廣記備言審荒蕪而豈措徒思竭力寧逭靦顏唯當禀奉之忠執持愚直分職於仲山之下庶展其能受經於尼父之前冀成其傳效酬之志灰沒為期卑情無任銜荷惕勵憂懼怔營之至某啓幸以弱才託於宏造遂拾寒鄉之士爰升近署之班雖與道翺翔似無邪行而隨波上下安有直詞是以久列編修常孤事任一家之言莫就空慕馬遷三國之志未聞實慙陳壽深宜免罷稍獲遑寧不謂相公尚貸簡書且敦方冊才授改官之寵仍還帖職之榮乍簪筆於宸軒復和鉛於細閣中書肄入寧同著作之郎相府依棲乃類司徒之掾分誠已過恩亦太隆既辭讓以難諧但憂兢而罔置穀梁清婉休校力於短長王隱混淆預甘心於譏誚營職為務投生以酬下情無任感激省循光忝愧懼之至某啓伏以居有熊左右之司每聞沮誦著周穆存亡之闕一字但記戎夫規動止於九天法春秋於百代某雖愚懵知此重難況復皇朝廢置之物便搜才實近日選求之慎必在英華峻等級於螭階盛風流於鳳闕某則寒陋分無希望伏以相公協兆為師奮庸熙載將行大道上繼於宣尼誘進單門下同於王儉不以某諫垣空食史閣曠官特興久次之嗟俾授殊遷之命暄臨黍谷方知律呂之聲調境入蓬山孰謂風飇之道阻徒成踴躍莫獲逡巡副燕臺尊隗之心奉孔里鑄顏之化巍巍聖德雖期有舉必書赫赫台光定是無階上報榮懼感激不任下情某啓伏奉恩制除授前件官者事匪心期恩將敵至榮懼憂惕不任下情伏以某用乏適時言非悟主雖困泥塗之辱敢希朝序之榮伏蒙某官念以吾道依棲斯文宗仰懇動吹噓之力終諧憐奬之心遂使縣吏塵銜擺脫忽同於蟬蛻諫臣清級超升遽遂於鸞翔叨忝何多提攜至此竊復念孤單事契愚魯性靈苟非示以修塗安得縻茲好爵獻可替否諒無補於皇明徇義忘身庶粗酬於恩德卑情無任感戴激切之至某啓某操行無奇文章匪瞻拾遺左右三年未望於轉遷約史春秋五夜寧通於夢想斯亦孤單雅分頑魯自宜忽踐履於清華諒因依於賢達伏以某官優容下位奬進微才荀君之日月在躬道存瞻矚王氏之風塵外物榮遂品題故得譽徹中台名聞東觀遽簉彌縫之地仍參著作之庭祇奉寵光若臨泉谷靜循叨竊實自門牆敢不永抱兢銘深虞負纍以當官而贖一作瀆忝用舉職以酬知求女媧鍊石之方潛裨碧落就太史藏山之事一作筆試學青編尚覬宗師更傳規矩下情無任攀戴靦汗之至某啓伏以記事之官顯司存於戴禮侍臣之職正號位於隋朝自古不輕方今為一作尤重豈期幽介遽獲忝塵此乃某官道著訏謨情敦片善偃彼小人之草列諸君子之林遂令補衮掖垣仍叨筆削珥貂仙室更踐清華得不上報鴻恩旁酬重德日月簡編之效敢怠於季一作學終雪霜松柏之心佇彰於歲晚榮懼感奮不任下情某啓伏以衮荒扉夙掩蓽路今飄雖曳裾果在於朱門而握髮何妨於白屋伏蒙令公奬以來能擇地去俟朝天恐馬援之災氛寧逃漏濕念揚雄之風雨須託帡幪特借華居俾安滯跡況復牀分上下器備圓方障錦飄紅則土皆被繡幕雲浮翠則木鮮呈材愛忽異於吾廬誤將同於君室遂得彌寬徯后更盡依劉宛如夫子之牆不在隸人之館揣循涯分抃戴恩光家雖喪而狗已如歸關欲度而雞不難學館開碣石略為鄒衍之身臺認章華永荷楚王之德下情無任感遇激切之至伏惟俯賜鑒察謹啓衮啓伏蒙令公念以赴闕奔馳臨途窘罄特頒厚賜用備促一作俶裝捧命循涯無任荷戴惶灼之至伏以衮拙艱成性窮約處身寧殊枕祉之郎謬列伏蒲之地昨以西京無象南國迷方蒼黃於河華之間流落於漢地之外荊州劉表幸獲依棲南郡馬融叨陪訓說爰從殺節以及熙春恩知將日月兼深惠恤與邱陵比峻今則周傾再定禹會重修既憑桓后之功且懼防風之戮輒將行計上軫沖襟伏惟令公韜世量宏濟人心侈組駢緡繈委彼貨泉七百里以趨程茲辰頓贍二十萬之為贈今代所稀得不泣類鮫人慙同劍客歸赤墀而有賴顧元幕以難忘突劍觸鋒始稱效酬之分抽毫命牘終餘感慨之誠竟乏雄詞徒揚懦氣銘誓激切不任下情伏惟俯賜鑒察衮啓都衙侯司徒到京伏奉寵誨卑情無任欣躍兢戴之至伏以太尉二十二叔國步縈心藩條繫慮籌算方殷於大者緘封宜略於小哉况衮再從宗盟至為卑末庶僚品秩仍是瑣微乃蒙掛在風襟形於賜問奬飾用光其曖昧慰安將勵其辛勤蓬島音書異術靡勞於方士蕺山翰墨真蹤遽覩於羲之捧且不勝喜難自定亦復載窺隆旨深省賤軀豈叔父私恩偏存睦族豈王侯公道廣及懷才蓋以太尉二十二叔學擅鴻儒詞摛麗藻臨戎按節全忘掌武之尊握牘含毫但記為文之客得不終身永佩拭目頻觀祕之若三皇內文寶之如歷代傳璽言慙善對謝宗哲以何因義貴能酬銘已知而莫極榮荷惶灼不任下情袞啓伏念昨將蓬蒂久寓棠陰德隆於雲夢之山惠浸於瞿塘之水已於荊聶備講恩讐豈向舂陵徒陳主客伏以令公雄才不世茂績無倫威揚戎閫之先仁洽士林之表頃以竿麾暴國漂流幸許其棲簷今則羽衛還宮資遣又令其赴闕斯可謂事關舒慘恩極始終其往也異彈鋏以求車其去也免吹篪而乞食遂使仲宣遭亂休假日以登樓明遠還都得侵星而赴路力非可報感豈勝言爾辭違漸成遐阻出荊門而回首詎見麾幢渡漢水以盟心惟懷金石以今月十九日發襄州邐迤北去攀涕結戀不任下情謹附狀啓陳伏惟俯賜鑒察亡秦者不在胡亥趙高子嬰亦不在始皇亡秦者李斯也胡亥固亡國器也以秦授之者過也趙高不幸秦狗之瘈左右者不圖則固噬其主矣子嬰立於已亂四十餘日而亡考其行事不無庸主之材其猶坐四屋之間環火已熾雖有殺火之術欲設何由哉始皇雖不以仁義死之日天下無事民為擇君但其遺詔不行於斯耳李故有名天下臣主相得六國既平不能於此時推廣使秦修帝王之道固亦失矣及始皇外崩姦臣謀亂又不能於此時制變為存秦之計卒使趙高得行其謀胡亥極其惡子嬰孤死於蒼黃之地始皇失賢嗣遂暴惡於後世嬴氏之鬼以不食者李斯之故也然則趙高之際為李斯者義宜奈何奔蒙恬立扶蘇為國討賊以固其社稷可也當是時蒙恬與扶蘇將三十萬之師屯上郡蒙恬之威外震胸奴內信秦國三世積功兄弟忠信尊用於世扶蘇長子直諫而出雖然始皇故知之所以無詔封諸子而獨書與扶蘇欲以為嗣雖天下之人皆知其賢而以為當立故陳勝吳廣作亂乃詐託公子扶蘇以從民望向使李斯以蒙恬之威舉其兵以扶蘇之望令天下而誅一趙高豈難哉賊臣既誅恬斯乃復相與盡其材輔賢明之主以寬靜天下秦不亡矣不唯不亡且將興斯不務出此耽祿畏害木譎於傾危之際使秦有殺適立庶淫刑虐法殺君亡國之惡窮天地而不振者李斯之故也悲夫或謂衮曰子言秦亡與存秦之計明矣吾聞國之興亡乃有天命設使李不失其計秦果不亡乎衮曰吾雖不言天其實天之道子雖稱天以問我而未識天之說夫所謂天者平無私也故曰皇天無親唯德是輔君人者有德天則贊而興之無德則革而亡之興亡之命在乎天而所以興亡在乎人也商書曰夏王弗克庸德慢神虐民皇天不保監於萬方啓迪有命眷求一德俾作神主此言桀不能常有德不敬神明不恤下民天下不安桀之所為乃廣視萬邦有堪天命者則開而導之以湯有純一之德求使代桀為天地神祇之主也故曰非天私我有商惟天祐於一德二世無德為所以亡之道天是以革而亡之使扶蘇果立則固有德為所以興之道天必贊而興之矣不當奪嬴與劉代夏以商也或曰李斯之失當責其不任職雖曰不忠不智也子加以亡秦之諡不亦重乎衮曰吾豈欲加諸斯也蓋聖人之道不得易焉昔鄭公子殺靈公也謀於子家子家權不足以禦亂懼譖而從之春秋以首惡故書曰鄭公子歸生殺其君夷斯其類也子欲易聖人之道乎哉黃帝作巾几之法孔甲有盤盂之誡太公陳觴鏡之銘所以昭成敗而防遺闕也衮不敢追蹟聖賢輒取枕杖二物而為之銘亦古之賤士不忘君臣之分也或枕或欹有安有危勿邪其思身之疲杖以扶之國之危賢以圖之一夫田甲氏乙氏判而農之乙氏糞其田田善收甲氏以為不善守天地之和風雨之潔而不善收噫造化之功不如糞土乎近代科學之家有柏氏倉部府君諱宗回字幾聖祖士良忠州司馬父皓毛詩博士贈國子司業君踵父學開元禮咸通中考官第之尚書落之不勝壓屈因罷取家蔭出身選為州縣官歷數任從軍幕為判官皆有聞相國文昭公甚重之授著作郎於蜀行朝上即位數年承反正之後將修太廟時見饗九廟十二室而實七代議者以為天子七廟六經無九廟文又欲以穆宗宣宗為二廟僖宗為一廟出敬宗文宗武宗為別廟文武百官參議不能定或薦君於相國徐君遂擢授太常博士及進議請修奉九廟十四室於是援引經籍研校今古發出九廟九代之議追祔代宗德宗二廟穆宗宣宗通為一廟以僖宗添為一室敬宗文武德懿宗為一廟親不可出其推次代室分齒昭穆為哲然矣又下百官赴尚書省參詳咸以為允奏請行之天子嘉奬敬依其議然其徵據乃尚書正文而不用鄭元之說其法制乃殷周遠事而不取漢魏已下故時人多疑之遂與數家爭論雖未行其議而亟加寵秩始遷虞部員外郎賜緋魚袋歲中轉虞部郎中明年遷倉部郎中加朝散大夫年六十一以光化二年二月二日卒官京師某月日歸葬先人之塋於邠州夫人清河張氏子廷徽開元禮登科廷鸞尚幼君撰王公家廟録五卷奏議論難宗廟之書萬有餘言銘曰幾聖之道豫實親之幾聖之言豫實聞之宗廟之事一何專奇討摘奧冥不由於師乃鄙鄭元乃悅湯伊今世之人安得不疑賜服熒熒省行屢征元裒華雖死不瞑親見夫子其勢不行夫子既沒庶幾乎明苟如斯言遺恨可平尚或有知時觀吾銘
