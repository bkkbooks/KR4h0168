front:
  text: 全唐文欽定全唐文卷六十八帝諱湛穆宗長子元和四年生長慶元年三月封鄂王徙封景王二年十二月立為皇太子四年正月即位寶歷元年四月上尊號曰文武大聖廣孝皇帝在位三年年十八諡曰睿武昭愍孝皇帝廟號敬宗
  hash: sha256:46beff01caa96d48fbb3a41271b68c2e0935b45c2162ccfa5ac92fd8e2e533cf
  markers:
  - {type: head, offset: 12, content: 敬宗皇帝, id: KR4h0168_NFKB_068-h1, level: 1}
body:
  text: 理多務者必資經遠之能總衆材者實在選舊而任疇咨輿議參詢廟廷果獲誠臣副予虛位正議大夫尚書吏部侍郎上柱國渭源縣開國男食邑三百戶賜紫金魚袋李程文含鍾律器挺珪璋行巳蹈常與物無吝早以詞翰密侍帷幄開宏顧問發揮訓謨周旋臺閣閱歷中外秀造稱其得俊衡鏡表於無私卑牧難踰深藏不耀朕荷負重構祗守大業自顧寡昧動遵先規委成台司不操匠斲自居無悔之地以馳至正之途而元輔披陳勇於進類常思任人與自任不若因賢以求賢命之僉求以名列上而程為舉首是必至公爾宜謹繩墨以示諸侯平好惡以待多士秉彞倫以澄躁競覈名實以鎮浮虛協睦乃僚無替朕命爰因銓品之鑒載佇烹飪之功可尚書吏部侍郎同中書門下平章事散官勳賜如故昔周宣王漢宣帝思宏祖業克紹先搆用申甫邴魏為相然後周道重熙漢德累洽朕以沖眇託於億兆之上緬惟文祖元宗之理若涉大水浩無津涯詢於巖廊俾舉髦碩果得才傑副予虛求必惟其人乃命以位朝議郎守尚書戶部侍郎兼御史大夫判度支上柱國賜紫金魚袋竇易直端厚靜慤直方廉氣深而和識敏而達每去華而務實不為善以近名早以器能揚歷中外司憲著紀綱之績廉俗重惻隱之仁輟於天官掌我邦計厎慎財貨均節委輸賙給不窮贍清皆足國有大柄屬於全才況朕親臨寶圖萬物資始審象而授其代予言爾尚弼予一人用厎於道且漢以丞相調兵食周以冢宰質歲成我國家雜用古制以重其事也爾往欽哉無忝我成命可朝散大夫守尚書戶部侍郎同中書門下平章事判度支門下寅亮天工弼諧庶務宏我一德撫綏萬邦佐予沖人以厎於理將推恩於天下必首自於輔臣是用極其襃崇增其命數訓正圖書之府裁成義例之條銀青之階光於七命茲所以賞勞而馭貴也正議大夫守中書侍郎同中書門下平章事上柱國奇章縣開國子食邑三百戶賜紫金魚袋牛僧孺大玉不琢喬松挺姿文探典謨學貫流略自綸閣掌誥會府貳卿聲實彰華人德歸厚先朝嘉其器業爰命奮庸秉事君之小心蘊難奪之大節往以聖體違豫潛心保和乃能畫一持平守而不失朕自膺寶歷深仗股肱每申勇退之懷用廣進賢之路損而招益謙乃彌光實朕心克諧僉論必能刊魚魯於往籍垂襃貶於國書可門下平章事兼集賢殿大學士監修國史門下朕恭承大統屬當平寧方委心輔臣釐齊法度垂茂績於百代建休風於一時有深畏滿盈雅懷止足體陰陽迭敘之旨全進退居正之心抗詞不回秉志難奪得不處之安郡益以榮名是用建新軍以統武昌佩相印而兼齊斧文武二柄付於全才金紫光祿大夫中書舍人侍郎同中書門下平章事兼集賢殿大學士監修國史牛僧孺貞方而和裕慎密而坦夷秀乎文華篤於行實以直策悟憲宗以忠啟奉先朝積有信誠擢於廊廟法無越制官無及私門無託賓道無偏倚逮茲旬歲亟聞昌言朕嘗惕然虛己以聽既終園寢之重克修郊廟之儀前志彌堅陳懇益固吾方涉學宏濟斯人耒耜戈矛仁壽鄙夭予懷者非爾而誰是用輟中樞圖史之閒開夏口油幢之府典型八座廉問七州往惟休哉無替厥服可檢校禮部尚書同中書門下平章事鄂州刺史武昌軍節度使朕深居法宮高處宸極嘗慮天下多務壅於上聞朝廷大猷闕於中典至於伏陛叩顙造膝犯顏皆驟遷顯榮寵以優錫尤思物不得茂遂道有所鬱堙是用虛衷訪賢側席前殿緘密以獻閱自朕躬切弼予違無所回忌第於上下揚於正朝吾之不亦可謂信於海內矣賢良方正能直言極諫科舉人第三等唐伸韋端符舒元襃第四等蕭敞楊魯士楊儉來擇趙柷裴惲第四次等韋繇李昌實嚴荊田鬯崔璜第五上等李滻蕭夷中馮球元晦詳閑吏理達於教化科第五上等韋正貫軍謀宏遠材任邊將科第三等裴儔第四次等侯雲章咸以讜言正詞兵符教本應問如響不窮如泉著之於篇爛然盡在宜膺中鵠之選用叶縻爵之經在第三等人委中書門下優與處分第四等第四次等第五上等中書門下即與處分門下昔周室之興也藩戚並建式資於維城漢氏之制也皇子畢封用固於磐石斯所以載宏丕緒惟懷永圖且茂德於本支遂推恩於嗣息況祗荷眷祐屬當長賢宜承寵章允膺舊典長男普幼稟異質夙應嘉祥既表岐嶷之資日慕恭良之性朕以寡昧虔奉宗祧庶明父子之親以及君臣之義命以樂國錫其介珪用敷可久之基爰叶至公之道可封晉王宜令有司擇日備儀冊命主者施行朕周觀帝王之道春秋富則倚附舊老享歷久則擢俊髦故我元宗開元之始任宋璟姚元崇之輩以調陰陽東封之後乃用李元紘張九齡之儔以承法度洎予恭守大位於今二年巖廊藩封逮於左右前後皆皇祖聖父之人罔有易置況勳望冠代器業絕倫副予揣論賛此休運凡百有位敬而聽之山南西道節度觀察處置等使光祿大夫守中書門下平章事兼興元尹上柱國晉國公裴度以忘家捍患協於憲宗以匪躬不撓佐於先帝十拜相詔四登帥壇接士猶布衣之心悲時急戀闕之思價重乎內外名殷乎華夷藉是風猷俾參大柄且滿吾志亦用僉聞於戲君臣合符不可多得千載一遇猶為比肩爾宜援古以自強垂後以居重文終之畫一平陽之并容諸葛持衡之公相如引車之意率彼四子足為成人服茲昌言往踐乃位可守司空同中書門下平章事仍令所司擇日備禮冊命馮定經使臣推問無入己贓私所告罰錢又皆公用然長吏之體頗涉無儀刑賞或乖宴遊不節緣經恩赦難更科書猶持郡符公議不可宜停見任劉伉所犯贓私其數至廣恣為貪猾固抵刑章若據本條合當極法以其大父於國有勞特為矜量俾從寬宥宜除名流雷州朕以寡昧祗膺寶位載懷悼懼豈所克堪而羽衞爪牙禁營師旅晝巡夜警協力悉心自始銜哀至於踐祚忠勤匪懈誠節用彰將圖錫賚務欲豐厚屬頻年旱薄御府空虛如聞邊上將士至今未給衣賜永言軫慮深切寤懷霑卹之時所期均濟兩軍官健各宜賜綵十匹錢十千畿內諸鎮各賜絹十匹錢五千軍吏及城內諸軍賞物節級有等仍於內庫更出綾絹共二百萬匹度支充邊軍春衣并天下州府賦稅如要蠲放者并委所司約此數均勘取濟凡百將士宜悉朕懷京城米穀翔貴百姓乏食者多夏麥未登須有救卹宜出太倉陳粟四十萬石委度支京兆府類會減時價於東西街置場出糶其價錢仍司府收貯至秋收糴近者夏麥垂熟霖雨稍多雖不甚損傷亦是陰陽小沴必慮囚徒之中或有冤濫宜令御史中丞刑部侍郎大理卿同䟽理決遣訖聞奏其在內諸軍使囚徒亦委本司䟽決聞奏農功所切實在耕牛疲甿乏此理須給賜宜委度支於東鎮武靈鹽夏州分市耕牛萬頭交付京兆尹均給畿內貧下百姓其價以戶部綾絹充近日京城雖巳得雨畿甸之內霑灑未周災歉是虞黎元重困救旱之備深所注懷宜令京兆府各勒諸縣令長䟽理見禁囚徒除首罪外餘支證並責保放出其有法不得原情有可恕者府司一一條舉當為蠲免御史臺大理寺亦委本司長官親自覆視準前處分炎熾方甚狴牢可矜京城及畿內諸獄亦宜並與除放冀得存活朕聞心術順道天下可一言而興聰明壅途堂上有千里之遠故唐虞而降則考試觀俗漢魏之際則詔策求賢朕纉紹丕圖撫臨方夏實懼誠有所偏信鑒有所未周乃前歲詔六官九卿方岳尹正有位之士逮於庶僚高懸四科博薦羣彥將訪衆政之闕酌至論之中子大夫庭列儼然各應其品是用宵興前殿永日渴求條列坦明咸本經史固子大夫之所講磨矣當竭誠慮無有蘊藏宜坐食訖就試黔首如有願於所在編附籍帳者宜令州縣優恤給與閑地二周年不得差遣奉先一縣獨奉八陵供辦支持實為繁併眷言物力須議優矜宜委京兆府減一半租并雜色役等令諸縣均出得守義奏當道將吏等請為卿立德政碑卿位崇庶僚寄殷東夏扼洪河之險束當白馬之要津制機於事先銷萌於慮表而能文武參用農戰兼修人俗載安軍政斯理緇黃遂性耆耉樂生瀝懇陳誠飛章上請延覽休績欣然注心今令翰林侍講學士崔郾與卿撰碑文庶使龔黃之美無愧於前修羊杜之風豈慚於後代卿有緝綏之美朕成委寄之功不朽之名上下同有眷言嘉歎無以過茲想宜知悉春寒卿比平安好遣書指不多及勅承卿家傳韜略門襲麾幢累受藩邦皆著勞績黎元安集師旅和寧忠効章明聲猷暢洽頃得守義奏云官吏將校耆老緇黃同請立碑紀卿德政非公方達於事任惠化感於人心豈能致其懇誠固求篆刻眷言嘉歎寤寐在懷昨遣翰林侍講學士崔郾撰述翰林待詔徐幼文書德以庇人政能利物觀其辭理亦頗周詳將垂不朽之名用播一時之美無慚峴首何愧色絲其碑本故今賜往想宜知悉春暄卿比平安好遣書指不多及李方現不自謹身有此喧競假如品官淩忽只合具實奏聞輒肆狂䟽恣行毆擊傷人見血理在難容但以父有勤勞身叨宗屬特從輕典粗以繩違宜量罰兩月俸朕孤藐罹疾慈嚴早違靡日不懷終天無逮將欲躬護園寢哀達神明而公卿庶寮瀝懇伏奏迫以重義奪予至情是賴一二鼎臣凡百執事咸懷嚴奉各表哀敬百靈拱衞六合會同終始四時無爽違之憾往復千里免塗潦之虞感歎盈懷是申勞典既加恩以頒錫遂流澤以蠲租山陵使禮儀使兼陵所攝太尉行事官各與一子七品正員官仍特加一階山陵副使按行使並賜爵一級各與一子出身橋道置頓使賜爵一級與一子官出身內山陵使兼修橋道使賜絹一百五十匹銀器二事特加一階修築使賜絹七十匹特加一階按行使賜絹五十匹特加一階修築副使賜絹三十匹加一階鹵簿使儀仗使並賜爵一級各與一子出身橋道置頓副使各加兩階舁梓宮官三品五品賜爵一級六品以下各加一階神策六軍修築官健及檢校軍使陵所造作押當官吏及中使等并諸司諸使應緣山陵修道造作及專知執當工匠等賜物加階爵減選有差吉凶儀使諸色行從官等五品以上各加一階如巳至三品五品未合敘者賜爵一級六品以下各加一階撰哀冊書寶讀冊官等五品以上賜爵一級六品以下各加一階舁寶冊官及橋道置頓官儀仗鹵簿使判官等各賜階級勳改選減有差其挽郎放出身後七選許集南郊及太尉侍中告諭冊諡寶靈座前進諡寶奏外辨奠玉幣酌獻等各賜爵兩級餘減勞考有差其數處職掌任所便從一司處分奉先縣營奉力役勞敝極深來年夏青苗錢宜令放免櫟陽美原高陵富平來年夏青苗錢每貫放二百文不滿貫者每百放二十文仍委逢吉與府司計科便以山陵用不盡錢與填所放錢數其近道鄉村坊市屋宇什物田苗等有被毀損并近陵百姓偏有役使理宜節級優賞並委京兆府審勘聞奏自長慶四年三月二日昧爽以前大辟罪巳下罪無輕重常赦所不原者咸赦除之左降官縱元勅云終身不齒者亦與收錄諸色得罪人先有勅云縱逢恩赦不在免限並別勅安置者亦放還京畿諸縣應今年夏青苗錢並宜放免秋青苗錢并河南府夏苗錢每貫放二百文其京兆府路所放青苗錢外更放錢五萬貫斛㪷五萬石河南府除所放青苗錢外亦更量放錢三萬貫斛㪷三萬石其天下常貢之外更不得別有進獻縱節度觀察使入朝亦不得進奉諸道監軍自今後在本道并入奏並不得進天下所貢奇綾異錦雕文刻鏤一事巳上有涉踰制者悉斷至於喪葬嫁娶車馬衣服事關制度不合踰越委中書門下明立科條頒示天下有不守者御史臺及出使郎官御史嚴加訪察節級科處其六宅十宅諸王女宜令每年於選人中擇端良者降嫁老宮人及殘病不堪使役並有父母羸老疾病者並委所司選擇放出鷹犬之類本備蒐狩委所司量留多少其餘并解放仍勒州府更不得進來宮禁經費及乘輿服膳委所司起今年三分其本色物價及水陸脚價一半委度支收管一半便任本州收充助貧下戶闕額稅錢其元和巳來兩河節度使全家歸闕者如張茂昭王承元程權劉總田宏正等五家在本道日所有債務并有異於法制之事被人言訴者一切不得為理仍各與一子正員官天下州府財物有餘羨者委觀察使及所管州郡約舊事費用者條件繇中書門下便差官類例詳定可留可去者聞奏務從寬濟勿使難守其餘羨錢非兩稅外徵率並不用勘問自今巳後州府所申戶帳及墾田頃畝宜據見徵稅案為定後與戶部類會具單數聞奏仍勒五年一定稅如有逃亡死損州縣須隨事均補亦仰年終申戶部如有隱漏委御史臺及所巡院察訪聞奏天下兩稅及諸色榷糧稅等錢幣重輕須有損益亦委中書門下條䟽聞奏諸道除正勅率稅外不得擅有諸色榷稅涉擾人並宜禁斷其軍屯營種有侵占丁田課役稅戶者宜委御史臺切加訪察仍限勅到一月內每道各具所還州縣頃畝分析聞奏其諸軍先擒獲吐蕃生口配在諸處者宜委本道資給放還本國天下諸州府縣官吏應行鞭捶本罪不致死者假以責情致令殞斃每念於此良增惻然宜委御史臺及出使郎官御史等切加察訪仍具事由聞奏天下諸色人中有賢良方正能直言極諫經術優深可為人師詳閑吏理達於教化軍謀宏遠堪任邊將者委常參官並諸道節度觀察使諸州刺史各舉所知限來年正月到上都其所在淫祠不合禮經者並委長吏禁斷門下朕以眇薄纂承洪構祗見九廟肇祀二儀外飾備物中惟盡敬昆蟲草木之實致豐於蠲潔哀樂和愉之感庶交乎神明四海駿奔衆祗受職冀下觀而化皆內誠乎心百王之禮樂在陳列聖之聲詩合奏敬極嚴配道備饗親虔奉成式惕然惴懼而今而後不敢滿假庶無大悔以貽祖考之羞因體元以統歷遂頒恩而大宥可大赦天下改長慶五年為寶歷元年自寶歷元年正月七日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不原者咸赦除之其官典犯贓不在免限左降官自長慶四年三月三日制後未經量移者與量移近處巳經量移者更與量移如復資者即任依常調選丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州府申請別勅因責授降資正員官未經改轉者亦與進改亡官失爵放歸不齒者量加收敘縱元勅云終身不齒者亦量與收敘流人未到所在及巳到者量移近處如巳收敘者量才敘用并僧尼道士移隷者亦與量移近處得罪人巳亡歿家口未許歸家者一切放歸如自情願住者亦任諸色得罪人中如先有勅云縱逢恩赦不在免限者并別勅安置者亦并宜委中書門下量事狀輕重節級處分左降官及流人先有官者如巳亡歿各還本官流貶人所在身亡任其親故收以歸葬仍仰州縣量給棺櫬優當發遣諸色人中有痕累禁錮及反逆緣坐等一切並與洗滌常參官及諸州刺史有先因停替及因病假解官並終制未授官者委中書門下量才進錄勿令稽滯致仕官未經改轉者量改官依前致仕諸軍先擒獲吐蕃生口配在諸處者宜委本道資給放還本國毋許因循所在停住國家與吐蕃舅甥之好彼此無虞自今巳後邊上不得受納投降人並擒獲生口等天下諸州府縣官應行鞭捶本罪不至死者假以責情致令殞斃每念於此良增惻然宜委御史臺及出使郎官御史等切加覺察仍具事由聞奏澄清教化莫尚乎太學惣治心術必本乎六經天下諸色人中有能精通一經堪為師法者委國子祭酒選擇具以名奏天下州縣各委刺史縣令招延儒學明加訓誘名登科第即免征徭刑罰不清不足以言理職官不重不足以棲賢開出入之文束上下之手必資慎選庶叶詳平大理寺官屬比來吏部所授多非其才宜令精選有志行文學兼詳明法律者注擬其有課績特殊堪在朝獎者臺省有闕宜先選擢一夫不獲時予之辜苟有向隅之悲遂軫納溝之慮如聞去冬吏部三銓選人駮放者衆或文狀粟錯或書判差池主司守文不得不爾既施惠澤亦在霑恩其長名及雜駮放選人如有未離京城者委吏部今月內檢勘畢除涉踰濫者餘并却收以地遠殘闕量才注擬如不情願受地遠官亦不可強之仍速處分不得出選限內比者法令懸科彰示大信法既無守人何適從赦令不行因循成俗誕告四方為虛設開施庶政為虛文豈吾德之未明為有司之見負永言歎息中夜疚懷朕即位之初巳有赦令至如捐徹服御止絕地獻限喪葬以息淫費禁奇靡以專女工隱實版圖謹守儲備及從他徭擅賦閉糴禁錢吏行姦欺人冒依庇僧道踰濫流貶重輕錢幣利害軍屯侵占車馬衣服之制度公私入己之贓私悉令條䟽貴欲該備頒宣未幾廢格巳多或職司墮慢而不能將明或誥命纔行而下巳不守以此求理不亦難乎其元和巳來詔書並長慶四年三月三日赦令委廢不行事在朕躬者諫官極言得失無有所隱其系臺閣者左右丞據詔條司額重加分配勿容推倚若因循寢廢無所申明及雖曾宣下不能提舉者具事由聞奏量加沙汰其在有司州郡者委御史臺及分察使出使郎官御史度支鹽鐵巡院準前後詔勅切加訪察各具犯狀移勘奏聞其本判官及刺史巳下必加貶責用懲不恪如舉察之司循默自守事狀泄露者亦據容庇量加殿黜仍並委中書門下重有舉明去年三月三日赦令及今年赦文一事巳上切加懲督責據時限量官吏勤惰具科殿輕重聞奏京西京北邊上諸軍州鎮自今年巳後如有中使及郎官御史奉使到所管並不得與人事物應天下典人莊園店地便合祗承戶稅本主贖日不得更引令式云依私契徵理組織貧人虞氏建官必明黜陟漢朝置吏皆長子孫政成用咸登右職近代遷除過速資給轉繁扇為時風莫有固志親人之職為弊尤深甿俗土宜未及周悉迎新送故巳聞代換更易雖遽資望如初善否不分升降莫驗徒為煩擾無益公私自今巳後刺史縣令若無所犯非滿三周年不得除替如理行尤異但議就加其有才宜他職灼然要籍者中書門下先具事由及授上年月奏聽進止滿歲遷代無闕敗者即與進改磐石維城義深麟趾穠華下嫁禮次椒塗縉紳文武之良才執事恪居之奉職克參祼獻載叶肅雍亞獻嘉王運終獻循王遹等各賜物一百匹夾侍正衣進珪捧珪各賜五十匹亞獻終獻正衣各賜物四十匹大長公主嗣王郡主縣主各有賜物內外文武見任及致仕官三品巳上賜爵一級四品巳下加一階合入三品五品欠考未合敘者待考足日聽敘斯文未墜降聖克昌道逾三代之英化立百王之範象賢崇德垂裔作賓教儀斯崇憲章無改文宣王二王三恪各與一子官其祠廟委所司量加修飾堯稱敦敘周述本枝收族是先睦親斯在皇五等巳上親三品巳上賜爵一級五品巳上加一階六品巳上及前資常選散官選日優與處分未有出身陪位者每家放一人出身應陪位者皇儲五等巳上親及太皇太后皇太后三等巳上親三品巳上賜爵一級四品巳下加一階諸親四等及諸州賀正官並諸色陪位官等五品巳上加一階六品巳下及白身人並賜勳兩轉其前資及有出身者各減一選締構興王弼成昌運勳藏冊府烈冠史編九原推可作之風百代凜如生之氣載懷丕績何日敢忘武德以來配饗功臣及將相名節尤著長慶四年三月三日制未霑甄敘者委中書門下條䟽聞奏量加優獎故尚父汾陽王贈太師晟贈太尉秀實子孫中未曾經甄獎者每家與一人正員官元和巳來有因戰伐死於王事其名節顯著未有優贈者各委本道節度使條錄聞奏如勘覆詣實當有處分其有骸骨暴露者宜令所在埋瘞宏教愛之典爰命推恩念追遠之懷用頒徽贈常參官及諸州府長官父母見存未有官封者並量與五品致仕官及階并邑號父母亡歿未經追贈者量與贈官及邑號巳經追贈者更與改贈如贈官巳至一品邑號巳至國夫人者不在此限中書門下及節度使帶平章事者宜與一子正員七品官祖父母父母先亡歿各與追贈經追贈者更與改贈官巳至一品邑號巳至國夫人者不在此限節度使與一子正員八品官東都留守度支鹽鐵使觀察處置都團練都防禦經略招討等使及神策金吾六軍將軍大將軍上將軍統軍威遠鎮國軍等使皇城留守各與一子正員九品官京兆尹特加一階父母先亡歿未經追贈者各與追贈職修祀事禮奉嚴禋既洽殊恩宜加異等應郊廟升壇升殿行事官普恩之外宜更加一級如合入三品五品者任待考足日聽敘尚書省三品四品巳上中書門下五品巳上特加一階便蕃殿省給事郊丘顧以忠勤是宜甄獎內行事官三品巳上更賜爵一級四品巳下更加一階內侍省及內侍省內坊官四品巳上各賜勳五轉五品巳下各賜勳三轉應從駕至郊廟者普恩之外三品巳上賜爵一級四品巳下各加一階品官白身賜勳兩轉環列師營服勞扞衞申威攸屬敷惠是膺神策六軍金吾威遠皇城及諸道將士等三品巳上賜爵一級四品巳下加一階無官者賜勳三轉在城神策六軍威遠營左右金吾及皇城將士應大禮移仗宿衞御樓立仗等普恩之外三品巳上賜爵一級四品巳下加一階仍準舊制賜物有差其神衞將士賜加一階仍準舊例賜物有差神策將士應在京畿諸縣者亦各有賜物應緣大禮職掌行事官并修撰儀注及留守副留守倉庫卿等普恩之外三品巳上賜爵一級四品巳下各加一階虔奉職貢載觀致仕官及郊禋俾覃錫賚之恩用廣懷來之義鴻臚禮賓院應在城內蕃客等各有賜物翰林待詔供奉及諸色直見任及前資并員外試官三品巳上賜爵一級四品巳下各加一階無官者賜勳兩轉導藩服之誠承帝庭之命忠勤既著勳賞宜周諸道知上都進奏院官在城者各賜勳兩轉應緣大禮四方進表䟽及賀正官各賜勳三轉敬承禋祀賛執豆籩列庶位以觀光酌多儀而中矩誠在儼肅理叶襃升郊廟行事齋郎減二年勞室長掌座禮生賛者減一年勞無勞可減者便放出身崇元館行事學生及齋郎禮生番考巳滿所司緣大禮却追入行事各減一選國子監學生陪位者賜勳一轉中書門下儀制官各特賜一階應緣祗供作官直司長上諸州行綱考典兩縣耆壽諸色番役當上在城并量留十二月番者各賜勳兩轉飛龍閑廄宮苑典引掌扇內園總監栽接少府將作內中尚武德軍器內外弓箭庫等諸司諸使下白身人及無品直司定額長上雜匠巧兒黃衣長上監門直長雜使三衞七色引駕細引執扇角手弩手彍騎武士天文觀生歷生漏生典鼓典鐘工人樂人主衣主膳主酪典食胡食手宰手掌閑幕士御士醫士獸醫門僕藥僮御書手楷書手典書流外行署等各賜勳兩轉尚年貴老所以教孝也聳義嘉節所以貞俗也天下百姓高年者上縣以上每縣十人中縣五人下縣三人並以縣界年最高者充數并孝子順孫義夫節婦先經旌表行義不虧者人各賜米三石絹兩匹仍版授上佐縣君並委令長賚粟帛就家宣賜訖具名本道一時聞奏其米及絹仍令上供數內申報神配峻極德稱靈長秩既升於王公禮合加於牲幣五嶽四瀆宜委本州府長吏備禮致祭當極豐潔以副如在之誠書稱望秩禮著不封仰堯舜之聰明慕文武於方冊遐想忠貞之跡緬懷義烈之風能禦大災咸申祀典名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行門下朕聞奉天地之大統必酌於人心荷宗祖之成訓必參於國典顧惟眇身守任重器道未能被物德不足蓄身賴於宗工碩老輔導丞弼享祧主鬯熏燎告元履歷正元敷施大號庶方咸若四表穆然皇祖披攘之基列聖焦勞之業恬焉而有泰焉而居晝以度心夜以省己其何德以堪之方將法乾以行健體咸而致和執沖以固高守約以持滿而文武百辟章奏四上以為人心不可以曲讓國典不可以矯違亦用慰於太皇太后皇太后之意屈而後俞諒非獲巳豈不以予非生知欲以徽稱懿號誘掖勸慕之乎將使循名而勉其實力實而應其名乎然則予方且以為韋弦方且以為箴誥楙於皇極庶無尤違是宜與物同利惟新大澤可大赦天下自寶歷元年四月二十二日昧爽巳前大辟罪巳下巳發覺未發覺巳結正未結正繫囚見徒罪無輕重咸赦除之惟故殺人及官典犯贓不在此限應左降官未經量移者宜與量移近處丁憂去任服闋日亦與量移如準前制巳合量移有司未注擬者並任累敘流人未到所在及巳到未經量移者並與量移近處僧尼道士移隷未經量移者亦與量移近處中外前資見任官頃因延累未及用才并左降官中有事情可恕名跡素聞者宜委中書門下量加獎用勿使屈滯授田制祿歲久而弊深留獄要囚期舒而濫廣隱冒啟逃姦之漸倍稱成豪奪之源亟舉舊章猶循宿蠹永言謀始必俟申明在京百司職田散在畿內諸縣舊制配地出子逐畝平攤比量舊制孰為久便宜委京兆府與屯田審計會條䟽奏聞如聞京城諸司捕繫推鞫動經旬時每季御史巡囚罕能察訪舉劾積成冤滯為弊頗深宜委御史臺重舉用長慶元年七月十八日赦文條件聞奏京畿百姓多屬諸軍諸使或戶內一人在軍其父兄子弟不受府縣差役頃者頻有制勅處分如聞尚未遵行宜委京兆府重舉用長慶元年七月十八日赦文條䟽聞奏應京城內有私債經十年巳上曾出利過本兩倍本主及原保人死亡並無家產者宜令臺府勿為徵理應天下典貼得人莊田園店等便合祗承戶稅本主收贖之日不得引令式及言私契組織貧人令煩而政撓積習而弊生欲其適宜須有釐革使人不倦必在變通今年正月七日制勅處分條目中有未經施行者委御史臺令提舉仍條錄聞奏宜委百司官長各具條䟽當司利病奏聞擇其善者當議改更宏文崇文館生及齋郎三衞所用資蔭踰濫頗多澄源清流切在釐革宜委禮部兵部侍郎條䟽以久遠可行用者兼每蔭別限年限朔作條例聞奏懋官述職禦侮宣威暨於庶僚咸竭乃力峻其爵秩以極封崇內外文武見任及致仕官三品巳上賜爵一級四品巳下加一階仍賜勳兩轉神策六軍金吾威遠皇城將士普恩之外各賜勳兩轉列虞賓之位崇襃聖之允所以闡德教而昭前烈也二王三恪及文宣公各賜物三十匹朕上奉兩宮下臨九有庶幾廣愛之道以行教化之風太皇太后皇太后二等巳上親委中書門下約舊例量加優賞二廣分營六師環衞梯航貢奉玉帛會同既勤勞而可嘉亦懷來之所尚神策及六軍金吾威遠皇城等諸軍將軍統軍以下各有賜給其將士等長行立仗者并守本軍本營者各賜物有差鴻臚禮賓院應在城內蕃客等並節級有賜物宣賛盛禮潤色鴻徽爰錫寵於崇階亦推恩於任子攝侍中讀寶官門下侍郎平章事竇易直攝中書令讀冊官中書侍郎平章事李程各賜一子出身撰冊文官左僕射平章事李逢吉宜依舊例賜一子出身正員官奉冊奉寶綬官書玉冊官書寶官各加兩階進寶綬進冊中嚴外辦理儀賛導押冊押寶綬舉舁寶冊官各加一階合入三品者待考足日聽敘合選人減一選其餘應職掌行事官及寫制書官太常修撰儀注禮官并宮內行事官三品巳上賜爵一級四品巳下加一階仍并賜勳一轉造玉冊并填金字造寶裝官各賜五十匹前王之令政未有遺年先哲之格言實先顧行義存忠厚教裕家邦天下百姓九十巳上委所在長吏量加存問孝子順孫義夫節婦旌表門閭終身勿事先巳旌表者亦量加優卹生甫炳靈出圖表異故能發洩雲雨蓄涵風雷望秩之儀必資蠲潔五嶽四瀆宜委本州府長吏備禮致祭名山大川及自古聖帝明王忠臣烈士令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相告言者以其罪罪之赦書日行五日里布告天下咸使聞知
