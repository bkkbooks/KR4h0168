front:
  text: 全唐文欽定全唐文卷四百九十權德輿八
  hash: sha256:5e629b3c6bb5368fdd1c3f069f0d8d998f7408fac6f30255aea29ef5b0589e2c
body:
  text: 洙泗門人登四科者唯稱端木賜卜商可與言詩以其善於取類敏於喻禮然則緣情詠言感物造端發為人文必本王澤貞元十二年夏四月庚辰皇帝御麟德殿命通儒碩生與緇黃上首雜論奧賾互相發明繇是京兆韋君以四門博士召見三元六學博辯宏大精義具舉宸心乃愉尋獻七百字詩一章詞華彬蔚詔旨優答浹日授秘書郎踰月遷右補闕未半歲拜右諫議大夫其餘以文發身以直事君言語侍從論思諷議賈生當受釐之問方朔擅不窮之智近臣渥命榮冠一時薦紳競勸巖谷皆聳初君年十一嘗賦銅雀臺絕句右拾遺李白見而大駭因授以古樂府之學且以王褱琦軼拔為已任至弱冠乃喟然曰四始五際今既遠矣會情性者因於物象窮比興者在於聲律葢辯以麗麗以則得於無間合於天倪者其在是乎彼惠休稱謝永嘉如芙蓉出水鍾嶸謂范尚書如流風迴雪吾知之矣遂苦心藻慮儷詞比事纖密清巧度越㣥倫嘗著天竺寺六十韻魯郡文忠公序引而和之使畫工圖於仁祠摘句配境偕為勝絕又於江南著臥疾二十韻晉國忠肅公手翰以美之曰卓爾獨立其在我韋生乎其為名臣宗公所稱賞如此又與竟陵陸鴻漸杼山僧皎然為方外之侶沉冥博約為日最久而不名一行不滯一方故其曳羽衣也則曰遺名攝方袍也則曰塵外被儒服也則今之名字著焉周流三教出入無際寄詞詣理必於斯文自貞元五年始以晉公從事至京師迨今十年所著凡三百篇嘗因休沐悉以見示德輿鄙昧不能言詩徒以掖垣之寮辱命為序豈愛之厚而忘其不能歟前此論著別為篇第後此者方紬懷仙章句而不復賦人間之事矣今茲詩集以類相從獻酬屬和因亦編次且以聖誕日麟德殿三教講論詩為首凡十卷云古者采詩成聲以觀風俗士君子以文會友緣情放言言必類而思無邪悼谷風而嘉伐木同其聲氣則有唱和樂在名教而相博約此北海唐君文編盛山集之所由作也初文編以英華籍甚輝動朝右書法草奏為明庭羽儀談者謂翰飛密侍潤色告命如取諸懷之易也八年夏佩盛山印綬朱兩轓而西天子雅知其文采慰勉甚厚且曰第如新涖分我憂歎於是惠而保之四封熙熙比歲連課為百城表率十九年冬既受代轉遷於夔上方以愷悌紓息之為大人文華國之為細或者蘊而決之使目不暇瞬庸詎知嚮時歲月不來之推轂邪理盛山十二年其屬詩多矣非交修繼和不在此編至於營合道志詠言比事有久敬之義焉暌攜寤歎惆悵感發有離㣥之思焉班春悲秋行部遲客有記事之敏焉煙雲草木比興形似有寓物之麗焉方言善謔離合變化引而伸之以極其致昔魏文帝稱劉公幹五言詩之善者妙絕一時抱朴子云讀二陸之文恐其卷盡今覽盛山之作有似之凡漢庭公卿左右曹方國二千石軍司馬部從事暨巖棲處士令弟才子稽合屬和二十有三人共若干篇盍簪則七子偕賦發函亦干里善應尊賢下士備見於斯葳蕤照燭雖南金青玉之不若也噫文編所友善者僕多善之周星之間物故殆半梁寬中楊懋功尤為莫逆交友零落如何可言况其雅音已矣多歎三復感念涕洟集於筆端是集也編於德輿嘗有木桃瓊瑤之往復辱求序引所不敢讓者俟夫子徵還道舊之日破涕為笑於斯文也建安之後詩教日寢重以齊梁之間君臣相化牽於景物理不勝詞開元天寶已來稍革頺靡存乎風興然趨時逐進此為士冖䂞籥紳佩之徒以不能言為恥至吟咏情性取適章句者鮮焉有許氏子者名經邦字某世得命官不書於此如舉其始終之畧以著於篇君天授純靜不遷於物修檢之中須有夷曠早孤家于鄱陽有佳山水遂以貞遯為心不近聲利孝敬溫信著於州里保閒樂退無所撓屈家人近習未嘗見其喜慍之色謀學業文以此為適相國第五公之為郡也軾閭懸榻以禮之咨於連帥薦授試左武衞曹參軍有別墅去家百里秋八月泝溪而上灘激險不幸溺於秋濤之中嗚呼踐儒行而未申其用霑初命而未至於祿受全氣而不終其壽此三者所以為士友之病凡所賦詩皆意與境會疏導情性含寫飛動得之於靜故所趣皆遠其道退其徒寡不交當世故知之者稀惟昌黎韓愈泰山羊滔最為友善羊既物化韓為江西從事今年冬予役於鍾陵而君去世之三歲也文行實錄皆得之於韓噫嘻士之修道向晦不耀於時以泯沒者可勝道哉如許君者潔身於困約之中講藝於蓬茨之下以六義之文為富以一畝之宮為泰齊人吹竽楚人泣玉故志業內固英華未發介然居易以至歿身其古之牆東谷口之徒與韓以其詩三百篇授予故類而為集太子賓客韋兄彯華纓佩金龜為清時大僚有數年矣始以博士奉朝請周歷臺閣出分藩符入作卿長乃領內府又賓東朝拜章乞告優詔得請致仕就第燕閒自頤中外族屬嘗僚貴仕以觴酒祝延發禮修賀者多矣以兄始登朝行實自禮寺蕃祉吉祿此為椎輪於是眾君子學通行修嘗踐此任者與今之引經據古屈職在列者同聲撰日復修茲會乃有夏官小司馬左右曹侍臣書殿東觀柱下史南宮郎九旋十疑而鄙夫忝焉入門而右勝槩迎步聳闕一字檻於賓位羅松篁於石徑清冬之時寒翠溢目則熙春眾卉炤灼駘蕩又可知也軒葢上下壺觴交錯聆主人之言則同惇史聽眾賓之論如在曲臺徜徉乎禮文博約乎法義樂在名教慶茲壽寵中飲霑醉抗音擊節乃相謂曰季倫金谷實有歌詩元亮斜川亦疏爵里況今賀得謝之美賦必類之詞愛景美祿遺簪投轄盛集之若是者有幾安可沒而不書猥微菲薄因附官業今裴辛呂三君子皆講學稱職而司勳滿歲復留再帖郎位猶四命焉前此者柱史之超拜浹日矣鄙夫之忝茲一紀矣二左曹東觀二十年矣原注陳君二十年馮君二十年張君十八年今云二十年開中半也小司馬向三十年矣而主人逾四十年矣其于折中定議損益於儀法多矣原注兵部二十八年主人四十五年向逾舉全數也外有平陽長樂二連帥韋君柳君絳郴和三郡守裴君李君闕二字前蘇州韋君信州陸君闕一字守之介劉君六邑之長姜君合中外歷是者十九人因廣斯文且為禮官之籍儒有秦公緒者當天寶理平之世興麗則鼓盛名於當時遭多故道進身退越部山水佐其清機圓冠野服翛然自放宅遐心於事外得佳句於物表不知華纓丹轂之為貴者幾四十年方帥時賢軾閭懸榻昔鄭公通德有鄉門之號秦君麗句創里亭之名慕風騷者多所嚮仰貞元中天下無事大君好文公緒舊游多在顯列伯喈文舉之徒爭為薦首而壽陽大夫公之章先聞故有書府典校之拜時動靜不滯於一方矣七年春始與予遇於南徐白頭初命色無慍怍知名歲久故其相得甚歡因謂予曰今業六義以著稱者必當唱酬往復亦所以極其思慮較其勝敗而文以時之聞人序而申之悉索笈中得數十編皆文場之重名強敵且見校以故敵故二字疑衍隨州劉君長卿贈答之卷惜其長往謂余宜敘嚱夫彼漢東守嘗自以為五言長城而公緒用偏伍奇師攻堅擊眾雖老益壯未嘗頓鋒詞或約而旨深類乍近而致遠若珩珮之清越相激類組繡之元黃相發奇采逸響爭為前驅至於室家離合之義朋友切磋之道咏言其傷折之以正凡若干首各見於詞云太祝陸君鴻漸以詞藝卓異為當時聞人凡所至之邦必千騎効勞五漿先饋嘗考一畝之宮於上饒時江西上介殿中蕭侍御公瑜權領是邦相得歡甚會連帥大司憲李公入覲于王蕭君領廉察留府太祝亦不遠而至聲同而應隨故也先是嘗舍于道觀因復居之竹齋虛白湖水在下春物萌動時鳥變聲支頤散髮心目相適蕭君悅其所以然也既展賓主之貺又歌詩以將之其詞清越鏗若金璧得詩人之辯麗見君子之交好詩既成而太祝有酬和之作復往之盛粲然可觀客有前法曹掾崔君茂實文場之舊以六義為已任攘臂拔筆而為和者惟三賢師友風騷迭為強敵志之所之發為英聲其於奇正相生質文相發若笙磬合奏組繢交映君子曰侍御唱之太祝酬之法曹和之是三篇也不可以不紀況合散出處之未始有極耶以鄙人嘗學於是俾冠以序其或繼而和者用先成為次序云易之同人曰文明以健中正而應故道同於內而氣相求情發於中而聲成文以觀以㣥以比以興清河崔處仁河東衞從周於是有清秋仁祠往復十七韻之作初二賢皆以秀造分校秘府宏文之書貞元初同為渭南尉聯曹結綬相視莫逆處仁自府庭旋歸稅駕於斯國門勝槩康莊在下馳車徒而走聲利者此為咽喉外煩埃壒中孕閑曠晝懸清光夕湛虛明上方之鍾磬深夜之月露眺聽寂寞情靈感發投者報者無非瓊瑤如金絲應和孔翠翔集盡在是矣厥後同為左右補闕從周以本官入為翰林學士處仁累以尚書郎知制誥既而處仁西垣即真從周復以外郎掌誥洎處仁遷小宗伯而從周即真俄掌貢舉實為之代元和三年秋處仁為吏部侍郎從周為兵部侍郎重九休澣聯鑣道舊永懷曩篇二紀于茲慮屋壁之隙壞詩文之磨滅不若刻勒片石之為堅且久也惟二賢大雅閎達人倫龜玉更為王陽迭為田蘇便蕃清近烜赫章大其於為霖為礪四方之屬耳目久矣然則志氣之所舒英華之所攄其濫觴於此乎德輿與二君子同為諫官同掌書命相繼典貢士分曹居中臺其間交代迭處不可具舉敢叨益者之數實悅同心之言追琢既具序夫本末亦二君子之志也暮春三月時物具舉先師達賢或風于舞雩或禊于蘭亭所以暢性靈滌勞苦使神王道勝冥夫天倪吾徒束支體於府署以簿書為拲梏有日矣故因休沐之暇考近郊之勝郭北五里有古龍沙龍沙北下有州人秀才熊氏清風亭葢故容州牧戴幼公前倉部郎蕭元植賢熊氏之業文尚茲境之幽曠合資以構之創名以識之五年矣初入環堵中有琴書披篁躋石忽至茲地鄱章二江分派于趾下匡廬㣥峯極目於枕上或澄波淨綠相與無際或孤煙歸雲明滅變化耳目所及異乎人寰志士得之為道機詩人得之為佳句而主人生於是習於是其修身學文固加於人一等矣況其志勵於螢雪之下業成於薪水之餘則甲科令名如在指顧是會也有御史府楊君薛君環列崔君校理魏君皆以文發身或再戰再克予與皇甫君不繇是進亦陪其歡虛中曠然取樂名教而主人趨隅拜下敬恭得禮請酌古道徧徵歌詩因曰自十數年間佐是府者騰陵杳冥離會靡常眾君子用牽乎時未始有極然異日之適非今日之適也至若心同於內跡脗於外交臂瞪視吾喪我於此亭者一生幾何是不可以不紀乃次詩于屋壁各疏爵里以為清風亭故事云世人於逆旅溺喪之中而村疑執膠固唯仙師吳君超然懸解於是有華原露仙之作本於道生終於物宜葢順一氣之聚散隨百昌之化生為疣為贅為決為潰委和歸根泊然大觀至於谷神隱景之道又何可究耶眾君子用徵聲詩師亦繼和是皆遺形達生之言也或曰若師之道可以坐忘矣惡用言說涉於名迹耶予曰道德上下經與內外雜篇荳非老莊之言耶終日而盡道師之心也彼方以生死為一貫又何有於名迹哉又曰既言之可矣惡用詩之矣師又泛然而和之斯皆元同而不囿於物者也於是或者退而鄙夫書之以冠於㣥篇云裴兄居諫大夫五年休問籍甚其於匪躬據古切劘獻替掖垣眾君子徒見其拜宣章伏閣而莫知其所以言者然則發舒純誠宏大聰明以貢於穆清者可勝道耶每漢廷大僚與六官貳職之缺㣥情屬目俟其授受久矣壬子詔書有黔巫長帥之拜秩於清憲裦以命服周行諸公以為一方之幸且惜其去而未喻也及夫別殿前席沃心交感重藩符之所付慮安集之不稱凡所以輟近臣惠遠人之旨纖悉備厚上許周月之代兄求三歲之理又以見首公急病而忘其僻遠淹䘏然後諸公知惜別為細而感恩為大在此行矣自牂牁通道夜郎置吏以示綏懷以安剽輕失其理則蕭然愁擾得其和則驩然感悅方畧招徠繫於官師以兄之慈惠直信粹清廉白為仁由已不改其度使大化淳流在明誠洞開推人情以賦政便習俗而不擾彼四封之內如熱得濯如水走下史臣操簡以傳循吏使者急宣以將徵命雖欲復三歲之言其可得乎未間則褰赤帷飲醇酒宴宴言笑中無町畦雖鬱蒸霧雨之候無自而入矣大丈夫被薦紳彯華纓宏宣職業無有遠邇則嚮之玉堂清禁論思侍從與今日龍節前導金龜映組皆所以事君也豈有中外之異耶祖軷霑醉宣言相勉在加飡寓書而已至若山川風物與騷離瞻望之歎皆備於詩人所賦故不再書士君子循道致用感恩宣力則萬里如咫步溟波猶康莊況金印照路熊車伏軾提封甚闊命賜甚厚此裴侯所以抃笑就道視交州如衡軛之前則天時之癉熱地里之逈遠皆細故也初裴侯夷退燕息未嘗角逐於有司且曰不試則已豈能自售其後累以惠文法冠為戎輅上介甫登中臺旋鎮南服葢純鈎百汰不得自閉於匣中明矣今天子惠茲元元邁唐虞之風鄙夫司言九年玷辱清近顧不能裁成謩訓著一代典法耗竭蚩鄙為明時羞思得上分憂歎下布條職使四封之內列郡和洽斯亦大丈夫之事也因君是行聊復起予追思往歲攜手相樂與蘭陵蕭元植范陽盧載初宦遊出處多在江介索然物故何可勝言又想夫楊柳古灣秣陵仁祠寒夜促膝歡言舉酒晦明飇馳忽二十年各乘風波時一會合今日出祖話別在加飡自愛而已至若馬文泉之功畧士威彥之教化憬俗裔人納諸掌握明珠文犀視同涕唾皆裴侯彀中所畜也不復煩言中丞頃持邦憲靈臺坦蕩中立不倚公輔之望懸於人心者久矣大方夷道且無町畦持刀筆者忮害為獄故前言有餘杭之命左遷也大君端拱穆清深恤人隱慮遠黎之未康擇可以富教之者以餘杭風政表課第一故有持節黔中之拜天之愛人斯謂甚矣受命之日庀徒戒行鄙人以使者之微假道於此屬當祖軷辱在賓筵敢宣言於執事曰夫蹈全德者事無夷險播善政者地無遐邇然則五溪之氓其將泰乎呂梁懸水尚在忠信矧夫巴黔故地方鎮專達惠飫夷落興行禮讓然後翺翔清朝羽儀百僚倚伏之數庸詎知不以此乎夫臨觴捧袂愀然悽愴此兒女之仁也固壯夫恥之愚亦恥之引滿舉白既醉而罷文則不腆葢指事云夏四月戊午大夫公至自朝覲敷宣仁澤既浹辰俾從事監察御史太原王德素將事於淮南浙西二府且修好也初德素以行藝修明達於吏理由廷尉評而簪惠文曳赤紱參鍾陵軍事公之入覲也主留府師旅之重公之還部也領將命四方之覲自非和裕之才肅給之用有嘉聞而無流事孰能與於此亦既撰吉日驛車轔轔公乃備觴豆以祖之類歌詩以貺之小子辱從事之末承命授簡書日書字者異乎諸府賓主之禮且以美德業也吏二千石與中臺郎循良雋茂旋相為重在其推擇所切而已故叔載以文術而居郎位以吏理而分郡節時所重難輙居選中其初以獻賦射策取甲科如地芥交諸侯之聘車不輟鞅繇外臺察視入佐著作休聲日揚乃擢建禮與伯氏左曹萼跗相鮮濟濟於公朝怡怡於閨門士君子詠歌屬和以為榮觀昔郢中之客能為陽春白雪之曲洎梁水部郎何遜文含清律重於江南今叔載有必類之詞比興溫雅其於宦遊宜乎典水曹而牧郢人也況漢南長帥風行列都郡守清靜公廉遵詔條而已以叔載內平夷而外質重不佻不流佳言析理亹亹可復施於列藩如發硎投刃況得漢南之歡舊矣又何疑於報政邪大則以尤異徵細猶轉遷劇郡皦然前知不足為賀觴酒祖軷姑以紓居者之愀愴云予嘉趙侯者在京下十餘年祿甚薄而心甚泰操利權燻灼可以頤指變化者趙不侯顧不游其津退然自得鄙夫識之曰斯可以為君子矣今茲以蘭臺郎滿歲佩二千石印綬受明天子面命牧茲建人為仁由已斯亦不細是邦為東閩劇地故相安平穆公嘗理焉穆公予之戴侯也故能言之當孝文避狄時巡之際移書四方詞義憤切密疏奔問請以州師赴蹈凡穆公所以彰大名操大政者皆建之為也趙侯於斯時實為從事賓榻虛左得之甚懽凡趙侯所以令聲籍甚四征交辟者由穆公發之也今日幢葢昔時山川存問遺老淒凉故事至止之日情何可言屬者狀往行於考功易嘉名於博士斯亦士君子盡誠於所奉其可誣耶頃予忝職西垣殆將十歲草列郡命過於百數每發緘含毫未嘗不惕然慎重以其四封之內性命所繫故也或歎趙侯官尚屈而地頗遠予以為不然昔孔門諸生以蒲莒單父著稱況諸侯之貴乎東漢循吏以交阯九真報政況建溪之邇乎則趙侯旟軾之間猛鷙飛伏勞徠所及鰥孤樂康陟明善價如建瓴水雖欲勇退知止其可得乎南轅計日祭軷即路白晝美景如歸故鄉行矣趙侯當以書札為念也使君嘗以司直佐黔陽黔陽之政舉又以贊善守寧夷寧夷之人乂乃今以周行慰薦詔領海豐天慈覆露無有遠邇及夫書於循吏為後法程則古人交阯九真之績與河內潁川固何以異焉知今日麾葢不為使君南溟之變化耶追思從兄秀才為使君門閭之賓曩歲晤語備徵理行愴族屬之凋落益暌離之怊悵事可覆視言為不誣朱轓郡節三伏就路眾君子祖道或賦列為一編延頸屈指在徵書北轅而已清祀嘉平著於三代葢祭百種以報嗇表一歲之順成故吾徒亦休澣考勝用文會友龍沙古地大江在下可以縱遠目可以滌煩襟況簪裾成列觴豆備薦酒酣神王舉手拊節盡一日之澤遣百慮如遺二三子唯今日可以酒狂而不書是無勇也叔父至自東周第如新定就長子桐廬尉之養也途出雲陽德輿之僑居在焉拜慶之後式展讌餞掇蔬焚枯以實圓方叔父諸姑既就坐㣥從伯仲或冠或丱中外稚孺凡四五十人差其長幼為侍坐之列暢之以旨酒既醉不諠侑之以清絃中奏彌靜天天申申其樂無垠發之於恬曠得之於名教稍間則圓魄照坐微風入林殘暑盡銷清光交映歌詩類事舉節應觴覺聽視之內無非和樂雖謝庭羯末之盛雪花柳絮之興及夫情適於中率禮無違亦一時也乃命編次其文且書其時時建中四年之七月德輿操觚以序
