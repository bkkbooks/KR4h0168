front:
  text: 全唐文欽定全唐文卷九百九道宣俗姓錢氏丹徒人一云長城人其先出自廣陵太守讓之後父申陳吏部尚書九嵗依智頵律師出家年十六從智首律師受具隋大業中西明寺初就詔充上座龍朔中住京兆崇義寺乾封二年卒年七十二
  hash: sha256:77ece941995aea1ec0441524b46d8f76375cac62437934918312e5f1fff7ae26
  markers:
  - {type: head, offset: 12, content: 道宣(一), id: KR4h0168_NFKB_909-h1, level: 1}
body:
  text: 自金河徙轍玉關揚化歷經英聖載隆良輔莫不拜首請道歸向知津故得列剎相望仁祠布天人仰福田之路幽明懷正道之儀清信之士林蒸高上之賓雲結是使教分三法垂萬載之羽儀位開四部布五乘之清範頃以法海宏曠類聚難分過犯滋彰冒呈御覽下非常之詔令拜君親垂惻隱之懷顯疏朝議僧等荷斯明命感悼涕零良由行闕光時遂令上霑優被且自法教東漸亟涉窊隆三被屏除五遭拜伏俱非休明之代並是暴虐之君故使布令非經國之謨乖常致良史之誚事理難返還襲舊津伏惟大王統維京甸攝御機衡道俗來蘇繁務攸靜今法門擁閉聲教莫傳據此靜障拔難之秋拯溺扶危之日僧等叫閽難及徒鶴望於九重天階罕登終棲遑於百慮所以干冒陳款披露冀得俯被鴻私載垂提洽是則遵崇付囑清風被於九垓正像更興景福光於四海不任窮塞之甚具以啓聞塵擾之深惟知慙惕謹啓龍朔二年四月二十五日君父事理深遠非淺情能測夫以出處之迹列聖齊規真俗之科百王同軌干木在魏高枕而謁文侯子陵居漢長揖而尋光武彼稱小道尚懷高蹈之門豈此沙門不乘間放之美但以三寶嚮位用敷歸敬之儀五衆陳誠載啓福田之道今削同儒禮則佛非出俗之人下拜君父則僧非可敬之色是則三寶通廢歸戒絶於人倫儒道是師孔經尊於釋典在昔晉宋備有前規八座詳議足為龜鏡僧等荷國重寄開放出家奉法行道仰承聖則忽令致拜有纍深經俯仰棲遑罔知投庇謹列內經及以故事具舉如前用簡朝議請垂詳採敬白僧道宣等啓竊聞紹隆法任必歸明哲崇護真詮良資寵望伏惟夫人夙著薰修啓無疆之福早標信慧建不朽之因至於佛教威儀法門軌式實望特垂恩庇不使陵夷自敕被僧徒許隔朝拜誠當付囑之意實深荷戴之情然於父母猶令跪拜私懷徒愜佛教甚違若不早有申聞恐遂同於俗法僧等翹注莫敢披陳情用回惶輒此投訴伏乞慈覆特為上聞倘遂恩光彌深福慶不勝懇切之至謹奉啓以聞塵擾之深惟知悚息謹啓自三寶東漸六百餘年四俗立歸戒之因五衆開福田之務百王承至道之化萬載扇唯聖之風故得寰海知歸生靈回向然以慧日既隱千載有餘正行難登嚴科易犯遂有稊稗涉青田之穢少壯懷白首之徵備列前經聞於視聽且聖人在隱凡僧程器後代住持非斯誰顯故金石泥素表真像之容法衣剃髮擬全僧之相依而信毀因果雨分背此繕修俱非正道又僧之真偽生熟難知行德淺深愚智齊惑故經陳通供如海之無窮律制別科若涯之有際宗途既別名教是依設出俗之威儀登趣真之圓德固使天龍致敬幽顯歸心宏護在懷流光不絶比以時經濁染人涉凋訛竊服飾詐之徒叨幸憑虛之侶行無動於塵俗道有翳於憲章上聞御覽布君親之拜乃回天眷垂朝議之敕僧等內省慙懼如灼如焚相顧失守莫知投厝仰惟佛教通囑四部幽明敢懷竊議夫人當斯遺寄况復體茲正善崇建為心垂範宮闈成明道俗今三寶淪溺成濟在緣輒用咨陳希垂救濟如蒙拯拔依舊住持則付囑是歸宏護斯在輕以聞簡追深悚息謹啓龍朔二年四月二十七日妙法蓮華經者統諸佛降靈之本致也蘊結大夏出彼千齡東傳震旦三百餘載西晉惠帝永康年中長安青門燉煌菩薩竺法護者初翻此經名正法華東晉安帝隆安年中後秦宏始龜茲沙門鳩摩羅什次翻此經名妙法蓮華隋氏仁壽大興善寺北天竺沙門闍那笈多後所翻者同名妙法三經重沓文旨互陳時所宗尚皆宏秦本自餘支品別偈不無其流具如序歷故所非述夫以靈嶽降靈非大聖無由開化適化所及非昔緣無以導心所以仙苑告成機分大小之別金河顧命道殊半滿之科豈非教被乘時無足核其高會是知五千退席為進增慢之儔五百授記俱崇密化之迹所以放光現在開法請之教源出定揚德暢佛慧之宏略朽宅通入大之文軌化城引昔緣之不墜繫珠明理性之常在鑿井顯示悟之多方詞義宛然喻陳惟遠自非大哀曠濟拔滯溺之沈流一極悲心拯昏迷之失性自漢至唐六百餘載總歷㣥籍四千餘軸受持盛者無出此經將非機教相扣並智勝之遺塵聞而深敬俱威王之餘績輒於經首序而綜之庶得早淨六根仰慈尊之嘉會速成四德趣樂土之元猷宏贊莫窮永貽諸後云爾觀夫法王利見權巧殊途或聲光動人或開智攝物立儀列相興像設之機緣聚沙塗地表乘時之淨養斯德有歸可略言也有師子莊嚴王菩薩者學周八藏智越五乘籍勝報而開教端寄善權而行圖範故使方壇外啓圓場內羅列八座而延八聖陳四報而成四德空有兩業自此修明大小諸乘因茲增長可謂總攝六度之元略統願行之明規其道易而可修其儀約而難隱智有通塞道涉窊隆時運所歸近聞東夏逮龍朔三年冬十月有天竺三藏厥號那提挾道開萌來遊天府皇上重法隆禮真人厚供駢羅祈誠甘露南海諸蕃遠陳貢職備述神藥惟提能致具表上聞霈然下遣將事首途出斯奧典文旨既顯異由來之所傳道場不昧赴機緣之浮業輒以所聞序之云爾夫淨住之來其流尚矣祖述法王開化導達之方統引㣥生履信成濟之務也是以法正存沒畢乘信毀之功神用昏明終藉惰勤之力竊聞輪王興運肇於有劫之初法王膺期開於濁惑之始其故何耶良有以也諒由淳薄結於夙心故使機感隆於視聽自教流震土六百餘年道俗崇仰其蹤可悉至於知機明略宏贊被時垂清範於遺黎導成規於得信者斯文在斯可宗鏡矣昔南齊司徒竟陵王文宣公蕭子良者崇仰釋宗深達至教注釋經論鈔略詞理掩邪道而闢正津宏一乘而揚士衆世稱筆海時號智山或通夢於獨尊諡天王之嘉稱或冥受於經唄傳神度之英規其德難詳輒從蓋闕以齊永明八年感夢東方暜光世界天王如來樹立淨住淨行法門因其開衍言淨住者即布薩之翻名布薩天言淨住人語或云增進亦稱長養通道及俗俱稟修行所謂淨心口意如戒而住故曰淨住也子者紹繼為義以三歸七衆制御情塵善根增長紹續佛種故曰淨住子也言淨行法門者以諸業淨所以化行於世了諸法門故有性相差別始於懷鉛終於絶筆凡經七旬兩帙都了遂開筵廣第盛集英髦躬處元座談敘宗致十衆雲合若赴華陰之墟四部激揚同謁靈山之會咸曰聞所未聞清心傾耳故江表通德體道乘權綜而習之用開靈府陳平隋統被及關河傳度不虧備於藏部後進學寡識昧前修曾不披尋任情臆斷號曰偽經相從捐擲斯徒衆矣可為悲夫余以暇景試括檢之文實菁華理存信本矣故知今所學教全是師心心何可師一至如此是以智度論云佛滅度後凡所製述宏贊佛經者並號阿毗達磨即十二部經之所攝也聖教明訣理絶凡謀但以初學惑昧未能瞻及輒又隱括略成一卷撮梗概之貞明摘扶疏之茂美足以啓初心之跬步標後鋭之前蹤又圖而讚之廣於寺壁庶使愚智齊曉識信牢強萬載之道遐開七衆之基成立敬而信者是稱淨行之人宗而行之不亡淨住之目貽厥諸友知其意焉惟夫大唐之有天下也將四十載淳風洽而澆俗改文德修而武功暢故使青邱丹穴之候並入提封龍沙鳥塞之區聿遵聲教膜拜稽首顯朝宗之羽儀輸琛奉贄表懷柔之盛德然則八荒內外前史具書五竺方維由來罕述豈非時也雖復周穆西狩止屆崑邱舜禹南巡不踰滄海秦皇畫野近袤臨洮漢武封疆關開鐵路厥斯以降遐討未詳所以崆洞問道局在酒泉之地崑崙謁聖實惟玉門之側至於弱水洞庭三危九隴燕然龍勒沙障黎河具歷夏書咸圖雍部及博望之尋河也創開大夏之名軒皇之遊夢也初述華胥之國二師之伐大宛定遠之開鐵門由余入秦日磾仕漢聲榮覆於蔥嶺帝德亘於耆山赫奕皇華其徒繁矣而方土所記人物所宜風俗之沿革山川之卓詭雖陳之油素略無可紀豈不以經途遼遠遊詣之者希乎以事討論縱有傳説皆祖行人信非躬覩相從奔競虛為實録何以知其然耶故積石河源西瞻赤縣崑崙天柱東顧神州鳴砂以外咸稱胡國安用遠籌空傳緗簡是知身毒之説重譯臻焉神異等傳斷可知矣自佛教東傳榮光燭漢政流十代年將六百輶軒繼接備盡觀方百有餘國咸歸風化莫不梯山貢職望日來王而前後傳録差互不同事迹罕述稱謂多惑覆尋斯致宗歸譯人昔隋代東都上林園翻經館沙門彥琮著西域傳一部十篇廣布風俗略於佛事得在洽聞失於信本余以為八相顯道三乘陶化四儀所設莫不逗機二嚴攸被皆宗慧解今聖迹靈相雜沓於華胥神光瑞影氤氳於宇內義須昌明形量動發心靈洎貞觀譯經嘗參位席傍出西記具如別詳但以紙墨易繁閲鏡難盡佛之遺緒釋門共歸故撮綱猷略為二卷貽諸後學序之云爾古德流言祖佛為師羞觀佛闕之本系紹釋為姓恥尋釋氏之根源以今據量頗為實録既云革俗義匪憑虛昔南齊僧祐律師者學通內外行總維持撰釋迦譜一帙十卷援引事類繁縟神襟自可前修博觀非為後進標領余年迫秋方命臨悲谷屢獲勸勉力復陳之試舉五科用開三返想同族法種詳斯意焉原夫大雄御宇豈惟拯拔一人大教膺期總歸微顯一理但由㣥生著欲欲本所謂我心故能隨其所懷開示止心之法然則心為生欲之本滅欲必止心元止心由乎明慧慧起假於定發發定之功非戒不宏是故特須尊重於戒故經云戒為無上菩提本應當一心持淨戒持戒之心要惟二轍止持則戒本最為標首作持則羯磨結其大科後進前修妙宗斯法故律云若不誦戒羯磨盡形不離依止自慧日西隱法水東流時兼像正人通淳薄初則二部五部之殊中則十八五百之別末則衆鋒互舉各競先驅人或從緣法無傾墜然則道由信發宏之在人人幾顛危法寧澄正所以羯磨聖教綿歷古今世漸增繁徒盈卷軸考其實録多約前聞核其宗緒略無本據師心制法者不少披而行誦者極多輕侮聖言動挂形網皆務異同之見競執是非之迷不思返隅更增昏結致使正法與時潛地矣故佛言若作羯磨不如白法作白不如羯磨法作羯磨如是漸令正法疾滅當隨順文句勿令增減違法毗尼當如是學慈誥若此妄指實難昔己在諸關輔撰行事鈔其羅種類雜相畢陳但為機務相訓卒尋難了故略舉羯磨一色別標銓題若科擇出納興廢是非者彼鈔明之此但約法被事援引證據者在卷行用然律藏殘缺義有遺補故統關諸部撮略正文必彼俱無則理通決例並至篇具顯便異古藏迹夫羯磨雖多要分為八始從心念終乎白四各有成濟之功故律通標一號敢就其時用顯要者類聚編之文列十篇義通七衆豈令傳諸學司將以自明恆務也若夫無上佛覺回出籠樊超三界而獨高截四流而稱聖故使提封所漸區宇統於大千聲教所覃沐道霑於八部所以金剛御座峙閻浮之地心至覺據憑布英聖之良術遂有天人受道龍鬼皈心挹酌不相之方散釋無明之患然夫聖人所作起必因時時有邪倒之夫故即因而陶化天竺盛於六諦神州重於二篇遂使儒道互先真偽交正自非入證登位何由分析殊途致令九十六道競飾澆詞六十二見各陳名理在緣或異大約斯歸莫不謂無想為泥洹指梵主為生本故二十五諦開計度之街衢六大論師立神我之真宰居然設教億載斯年攝統塵蒙九土崇敬考其術也輕生而會其源論其行也封固而登其信故有四韋陀論推理極於冥初二有天根尋生窮於劫始臆度懸遠冒罔生靈致有赴水投巖坐熱臥棘吸風露而曰仙袒形骸而號聖守死長迷莫知回覺如來哀彼黔黎降靈赤澤曜形丈六金色駭於人天敷揚四辨慧解暢於幽顯能使魔王列陳千軍碎於一言梵主來儀三輪摧於萬惑於是鍱腹戴爐之輩結舌伏於道場敬日重火之徒洗心仰於覺教舍衛城側大偃邪鋒堅固林中傾倒巢穴能事既顯將務宏通玉關揚正道之秋金相表乘機之瑞清涼臺上圖以靈儀顯節陵中陳茲聖景度人立寺創廣仁風抑邪通正於斯啓轍於斯時也喋喋黔首無敢抗言瑣瑣黃巾時牽異議然其化被不及於龍勒名位無踐於槐庭王何達其上賢班馬隆其褎貶安得與夫釋門相抗雷同混迹者哉斯何故耶良以博識既寡信保常迷今則通觀具瞻義必爽開前惑且夫其流易曉闞澤之對天分其理難通孫盛之談海截然猶學未經遠情弊疏通邪辨通真能無猜二孔子之在東魯尚啓虛盈卜商之據西河猶參參疑聖自餘恆俗無足討論今以天竺胥徒聲華久隔震旦張葛交論實繁故商榷由來銓衡敘別筆削無濫披圖藻鏡總會聚之號曰佛道論衡分為上中下三卷如有隱括覽者詳焉
