body:
  text: 昔如來居出世之尊垂化人之道闡揚大教誘掖㣥迷開種種之門方便雖陳於萬法入圓圓之海旨趣皆歸於一乘然而顯教密宗該性含相顯之義派分五教總名素怛口覽密之部囊括三藏獨號陀羅尼習顯教者且以空有禪律而自違不盡究竟之圓理學密部者但以壇印字聲而為法未知祕奧之神宗遂使顯教密教矛盾而相攻性宗相宗鑿枘而難入互成非毀謗議之心生焉竟執邊隅圓通之性懵矣向匪至智孰融異端事必有成人能宏道今顯密圓通法師者時推英悟天假辨聰髫齓禮於名師十五歷於學肆參禪訪道博達多聞內精五教之宗外善百家之奧利名不染愛惡非交既而厭處都城肆志巖壑積纍載之勤悴窮大藏之淵源撮樞要而成誦在心剖義理而若指諸掌以謂所閲大小之教不出顯密之兩途皆證聖之要津入真之妙道覽其文體則異猶盤盂自列於方圓歸乎正理則同若器室咸資於無有而學者妄生異議昧此通方因是錯綜靈編纂集心要文成一卷理盡萬途會四教總歸於圓宗收五密咸入於獨部和乳酪之味都作醍醐采雲霞之滋並為甘露誠諸佛之會要後人之指南使披覽者似獲如意之珠所求皆遂遵依者如食善見之果無疾不瘳覺學愧荒虛辭非華麗曾因暇日得造吾師每親揮塵之談頗廣窺斑之見屬當傳世爰託撰文素慙舒理之能聊著冠篇之引彬南唐升元六年官祕書省正字有唐中興文軌未一天子宵旰惠於蒸人疇茲賢才以理郡詔琅琊王公出宰畿甸訓諭之日具於綸言是故圖書但載至止之日夫溧水者古之中山也刊之在石隸於宣城瘠而名美洎我皇出潛駐蹕編王畿土厚而俗富水陸兼濟鄉黨樂康比屋可封非賢不處琅琊公自達理隱頤教化之源上布皇風下調民事閭里相賀喧譁若爭公每鄙衆心尚崇淫祀罔根本末俱食甘腥巫覡以之須求遠近以之敬信不有取捨那分否臧爰採地圖稽求故事乃得縣東南勝概獨立不倚高而不危顯著靈蹤藏諸舊史有若聖母享於是山公乃曰古之諸侯今之令長諸侯得祀境內以祈有年有若世運光啓昭應協從其名中山其神后土將設廟貌胡為不然不率民財只憑衆力紺殿連碧虹橋跨清歸百姓之真心配神作主俾中山之靈迹與國咸休其餘囂浮所完土木之設並從毀拆無或興妖有以見公之去邪蔑疑為政以德愷悌君子其在茲乎惟神正直聰明不可不報之以介福蟲霜水旱不可不助之以陰功無或儼然以傷輿論彬偶熟前事敢書直言用紀歲時以示今昔升元六年太歲壬寅仲冬十有九日記從效泉州永春人初為散指揮使擊敗朱文進之黨遂自領漳泉二州留後南唐以泉州為清源軍授從效節度使漳泉等州觀察使未幾加同平章事兼侍中中書令封鄂國公進封晉江王後遣使貢南唐又入貢於宋未至卒年五十七南唐贈太尉靈州大都督臣聞日月貞明萬方咸照帝王英睿無所不通竊以閩嶺五州古來一鎮僻陋雖居於遐服梯航長奉於上京尋因王氏末年建城失守干戈擾攘民庶蒼黃臣此際收聚餘兵保全兩郡北連甌越南接番禺況屬貢路未通所以親鄰是附今則伏遇皇帝陛下道侔諸聖運應千年布文德於中原紹武王之丕業意昨上遵天意聊議南征矧以金陵已歸皇化莫不華夷賓服文軌混同然臣嘗覽此書略知往昔竊見孫權鼎分列國地有三吳及於季年臣於大晉諸道各仍於舊貫隨方率貢於中朝惟彼前規無殊此日臣生居海嶠實慕華風輒傾葵藿之心恭向照臨之德仍進獬豸通犀帶一條白龍腦香十斤謙南唐升元時人西上閣門使金紫光祿大夫檢校司徒行右武衛大將軍兼御史大憲上柱國夏謙叨奉睿旨封册雄藩駐泊旬餘將更歲序受王恩而重疊沐台念以彌深而又許厠王車得遊化境時升元二年正月二十八日故留題記迢南唐升元時人武義元年十一月二十七日朝議郎檢校兵部尚書賜紫金魚袋上黨郡公食邑一千戶景迢自京城隨侍伯父江上歸郡獲從家兄桂陽郡公訪茲絶景時春林鬬芳晚雨新霽屣步忘倦塵心頓清竟日方還故紀於此升元三年太歲已亥三月二十三日書延嗣南唐升元時人夫神之依人而聰明正直人之奉神必專誠精懇故立廟貌乎以備致敬設祭祀乎以祈福應享致敬而主福應者其惟昭威侯歟況乎靈蹤所來異感斯肇傳之時俗文諸碑篆者久矣而以嵐峯背擁句水傍奔松林鎖煙陰物駭魄於彼江左乃為名祠會昌歲相國崔公龜從按察當郡豁當時宵夢顯茲後明靈自是禱賽雲臻牲牢日盛指骨無慚於青骨倚山何愧於挂山其如屢革光陰旋傾簷棟雨痕綵壁塵暗儀形未偶飾修罔資輝煥延嗣自皇帝御極初叨承寵渥共佐藩條時謁祠庭細觀壞升元三載秋暫朝丹闕以此上奏宸聰及拜青宮得不仰聞英聽伏維大元帥齊王殿下忠符昌霸孝奉家邦克崇開泰之功聿贊升平之業遍流恩信俯念闕神俄顧問廟之隳損者遂虔對以殿堂板閣廊廡官署遽降教令遣齎白金委之興修益彼宏壯一期星律方畢工徒餘更綵繪威容裝換幃帳添列鞍馬漆刷門窗仍置動用所須并造內外亭子廊屋等皆已周備噫得一之靈儼爾如在之敬肅然苟昭感無則欽崇靡怠用俾乎蘋蘩斯薦庶幾乎福善是徵荷雍熙之化無窮保元良之基永固延嗣幸濡帝澤安測神功對堅珉非敘事所能銜令旨貴紀於茲在時升元四載六月二十一日記津南唐升元時人伊古之制列爵惟五分土惟三暨周失九區秦并百二漢魏以降晉宋以來何其不然也蓋皇王之道漸抑強霸之政薦隆得之者三術並施成之者七德並用於是或建邑以撫俗或設壘以保民當戎戰之時委管榷之務或便以漕運或利以賦稅故不束於教而隨時之義易簡而治者也逮於亡隋失德偽夏僭圖我唐撥略亂基肇載天符提神劍而掃清蕪穢垂衣裳而治服華裔應順天人車書文軌三百年之皇衢坦蕩二十聖之帝業巍峩頒正朔於八荒列股肱於十郡永思偃武常獲承平豈期王政初微鯨波遽作乃諸侯方軌宗社陸沉故知天未絶唐必將有主潛棲我土晦伏齊吳避強數紀之間建迹三分之內神州興感悲禾黍之離離龍躍待時應圖謠之密密且大業不可以終否彞倫不可以久虧瑞協真人祥符王氣由是遠轡長馭覃思寬仁讋世扶顛獨居多算沉謀逖慮衆莫能窺大勳顯襲於旗常備物畢承於錫命法堯舜之內禪踵高光之再興雲龍呈有位之期道德耀無私之日庶民悅服詠維新而再賀唐正裔夏稱觴望靈光而咸思禹貢其有盤桓險遠偃蹇遐光文德不歸武威定取帝曰先朝昔為失馭故裂其地今既復矣可以歸之且非財何以聚人非人何以求霸非霸何以襲皇王之道乃以國之東裔熬天池以為鹽國之南偏擷地利以為茗歲貢數百膳五千師其諸膠漆之財玉帛之貨山川之利租庸之常不足紀也太和中以婺源浮梁祁門德興四縣茶貨實多兵甲且衆甚殷戶口素是奧區其次樂平千越悉出厥利總而管榷少助時用於時轄此一方隸彼四邑乃升婺源為都制置兵刑課稅屬而理之僕謬以非才叨斯皇澤專茲計幹任此民戎制置舊有城池近多摧毀則以境鄰東夏歲積貨泉封略匪遙備虞宜固恥云恃陋是曰曠官爰選三農之餘互聚諸縣之衆同其力役完此城堙其西建衡山一營添新壘三里其北則築平蛟穴接此蛇城周環十里㣥來畚鍤半年之間閭閻盡易雉堞皆新啓升元二門建東西兩市衆聞悅辦略不告勞曾無鞭叱之聲蔑有歹延歹差之患莫不下屏㣥庶上賴燮調幸畢厥功何有其績僕實慚寡陋又乏討論敢摛鄙直之詞徑記歲月之事唐升元二年今上即中興位歲戊戍十月癸丑五日丁巳諸縣都制置使檢校司空劉津記延禎南唐升元時人當縣有練湖源出潤州高麗長山下注官河一百二十里當縣丹徒金壇延陵人戶並同潤臣讀石碑得聞湖利訪諸鄉老咸曰疇昔以湖有為故立碑於縣門其廢於今將百年矣當為湖日湖水放一寸河水漲一尺旱可引灌溉潦不致奔衝其膏田幾逾萬頃昔環湖而居衣食於魚者凡數百家有斗門肆所洎前唐末兵亂之後民殘湖廢安仁議取斗門餘木以修戰備自此近湖人戶耕湖為田後來弓量賦稱租籍農商失恃漁樵失業河渠失利租庸失計民思復湖以禦災奈何無所置立焉苟欲訪其利病則讀碑可知觀湖可見臣頻承條制葺陂塘切度其湖為利甚博遂為材役工於古斗門基上以土堰捺及填補破缺處初謗議震動謂臣弗良圖且廢湖豐已者不十餘家有湖無災者四縣之地臣明知利害獨如弗聞自今歲秋後不雨河道乾枯纍放湖水灌注使命商旅舟船往來免役牛牽當縣及諸縣人戶請水救田臣並掘破湖岸給水如將久遠須置斗門方得通濟其斗門木植須用木兔楠乞給省場板木起建狀下所司處分不作利物不仁不翦害物不義不仁不義不足為人先王投凶於四裔盡力於溝洫蓋亦除害興利以厚生民也延禎常思致力於人致身於君會國家乏使命為丹陽令因舊碑預聞練湖之事噫世所嫉害大利小者其以湖為田之謂歟使今之人不獲其利而罹其害旱益枯稿潦滋昏墊徒永歎其災而莫測其亂也田無十室之用湖富四縣之利智者有以從長愚者不可慮始利豈可廢害豈可留且湖之興廢有似隨國之興廢興於前唐之初廢於前唐之末今我唐開國斯湖豈得廢也具事以聞克諧天心大賚梓材以充門鍵傳命遐邇罔有不悅待事黔庶率皆相慶於是築塞環岸疏鑿斗門民若子來役俟農隙人不勞而物成財不匱而用畢大澤既陂大水既瀦物得其利民除其災波瀾瀰瀰魚龍以依菰蒲莓莓邑人所資步之終日不得其極望之若海莫知其涯雷雨時行源流歸壑穡人之功不愆而穫乃植柳以助其防并工以培其闕歲旱靡俟雩河源不患竭丹陽耆舊揚言曰昔之復復其侵今之復復其廢是韋公之平其初而公以成其終也事雖殊時功其一揆而今而後民其有望庶幾免於患矣愚雖不敏聊以為銘海大兮波濤溺人湖深兮潤澤生民廢興我恐有數利害孰云奪倫風動菰蒲靡靡浪搖龜魚鱗鱗遠哉韋公兮豫將復新赫赫然帝命兮永敷萬春震南唐保大時人伏聞巢居飲血之時克全朴素洎鑽火變生之後漸入澆漓既失淳元即分善惡邇後生於聖哲制彼禮儀方設壇場始嚴祭祀其或旋聞神聖亟顯靈通陰功若被於黎元青骨亦升於廟食代將襲矣世豈無焉巢湖太姥者姓氏則古巢州人也當漢末魏初之日值吳強蜀霸之年國既鼎分雄爭虎踞鳬毛墜地鯨寇滔天江淮競起於干戈京洛爭持於劍戟且桑田變海今古共論土地更時神祇自顯唯太姥心將陰契道與冥符遇聖者於蓽門泄神機於語次其後果見龍王作怒鬼將興嗔使彼巢城陷為湖水樓閣皆沉於浩浪黎民悉沒於洪波而太姥先知獨登高巘生則免茲漂溺歿乃主此波濤陰功大及於行人靈驗尋興於廟宇塑神姿於寶座列陪位於香壇丹臉桃紅雙眉柳緑掌神兵於水府呼風伯於山頭送黎民未濟之舟救商賈欲亡之難南北之征帆蔽日東西之白浪連雲求之則必遂諸心禱之則皆從人欲無偏無黨有託有依案前之酒脯無窮筵上之犧牲不絶人皆蒙祐物盡銜恩雖聖德遐彰而殿堂且隘我府主汝南公雄傑卓爾英姿凜然笑馬援眉粗徒有當年之譽鄙薑維膽大空傳昔日之名弓開而鴈落雲頭劍拔而蛟亡水底植亞夫柳展韓信營屯赳赳之師統多多之旅上可以克清寰宇下可以壓定封疆鎮國西門為王右臂且三年布政千里行春褰賈氏之帷歌廉公之袴人唯安堵物荷昭蘇公以久別龍庭欲朝鳳闕先祈廟貌次整行舟櫓聲而十里交連帆影而幾重相亞太姥乃大垂靈貺廣借神功好風輕吹於雲檣微浪不生於水面往來利涉上下無虞既感威光得無酬報我公乃命其郢匠召被般輸相以殿堂度之材木造正殿一間兩徘徊兩面行廊九間中門一間並兩挾廊橫屋四間一徘徊南臺將軍殿一間兩徘徊官廳兩間一徘徊厨兩間東門一間利市婆堂一間周回共二十四間六徘徊竹木甎一九冰并彩畫隊仗等計用緡錢十萬工夫五千不日而成狀如化出莫不梁橫螮蝀一九冰疊鴛鴦丹楹將畫斗爭妍刻桷與雕簷鬬耀時或風清月夜霧散晴天疏窗含細浪之聲曲楹寫餘霞之色其次壁描鬼將廊畫神兵牙樹霜刀眉分鐵刺怒發則山傾海湧喜來則浪靜風調壯觀靈祠匡扶征客必罄敘茲嚴盛何由畫此亮端震也學乏偷燈才非煮豆謬提刀筆忝佐賢侯在承命以難辭謹斐然而直述時後唐保大二年龍集甲辰八月十日記觀南唐保大時人運天成度陶甄大塊道之始也軌躅發鐍元黃啓宗道之化也始化無象品物流形形性之和人氣是化任葆輝橐用育腐彩夷糧以僭夭折孽傷允洽靈明兆偉元道攸覆維轍是圖情莫尋枝理宜歸蒂袁州萍鄉盧溪景星觀道畤唐福德星應宮肇也陰陽屑和天地鼓泰萬化資始一德惟新星其茂祉神圖觀若符真御宇洎乎九功失緒六境遺蹤季葉雕蒙叔綱土貴索璨無雙爛影昧層光剖爭望於秦川分豆競奔於吳市酆羊解語赤符狂醉於成都屈馬無言六甲亂迷於魏闕星由沒也觀乃廢焉圃翠飄椿壇紅落杏朱頂之瓊衣住舞桂殿香疏緑毛之文鬣將飛莆池煙冷逮我后中興皇霸有國以來圖史詠風天人合德銅渾變九重坤蓋金柱鎖八壯乾隅雀羽書臯麟蹄拜野百稔歲穀㣥安壽人元功聿修朴風大返乾象作瑞坤維出祥星可浮圭觀期角陸甲推丙午歲保中和教化中外愛育民子太守陳留邊公鎬策勳霞緗書勞翰諜黃金翦佩殊恩酬紫塞之功白錦裁文異寵耀碧璘之貴牧於是州舉李承戩牛刀剖位虎劍臨人命發宸躬宰於斯縣琴堂夜永鳳樹秋高景物陶然政化成矣茲觀突州西位卻縣東隅戩乃初訪遺榛制豐開址公則始聞芳躅匠入神機謂戩能宏道勤行知戩有勸農暇日給俸怡庸傾資薰餉精修太守邊公給屬宅庫田六千五百把還資常住得道士歐陽皎老鐵髭鬚長金指甲陽山採蜜撥聚蠆於風巢陰竈煮砂臥真龍於火鼎笑解笻籜深塵繭闈公既欣從戩聞命矣於是博質文梓廣實良甃緬爾藏規郢而珍用勺視丹闕具迹彤基瓊房寫春瑤窗疊日七井桐碧三清玉寒穆天子之八駿遊回霞明汗漫許侍女之一鸞粧罷月墜崆洞星乃歸焉觀嘗復矣觀即公之下客國之微民徒言指馬思肝空效剖魚尋脅銘雖美事事廣難明敢肇唐皇昌霸之成少導君子文明之述詞曰大道無象萬竅泯邈赤羽立日飛駒趁雹入元珠門始見真璞雲臺顯迹激淡真風教紐岡外宗樞域中有勤行者攀虛躡空偉哉聖王聿修元德星分大瑞照我仁國敷立宮祠用昭不忒茲址其一殘蒙楚淵鹿間桂墄鶴弊芝田不有此廢星胡瑞焉我后在位誕膺皇霸明皎日中照一天下是星可期瑞我大化斯觀復矣自我賢侯蓬宮鄙邃閬闕圖幽永符天瑞萬古千秋恂南唐保大時人夫胚渾肇分元黃肇判其覆之者圓蓋載之者方輿有晦明寒燠以成其序有五星兩曜以麗其上故曰四時行焉又曰萬物生焉矧夫神明之道其來尚矣古者有弗臧不順之事則遍走㣥望鄭子産亦謂風雨不時禜於山川至誠神感貽厥百祥抑復善者福之淫者禍之總倚伏之綱紐提慘舒之權衡施之於人猶反掌爾假使以不法之事而請其神又胡異於拾瀋孰能尸之矣所以王表稱靈實知休否阮瞻著論自賈凶危或草木化於山頭或土田化於華地一顧千里輔德依仁簡策所存事托非泯且古猶今也孰得而論如此則觀者神凝舊志作癡聞者髮聳逖者影響以至於斯苟欲窮其理探其源又何異張目於暗室莫認其隅閴焉默焉何所視也仰山廣惠公廟漢文之世而立於山之阿神姓蕭氏不知何許人也其季曰七郎亦立像於別殿昔有徐璠自蕪城歸宜春繫舟於彭蠡之岸忽有人附載自稱曰蕭氏居於仰山之陰石橋之右逮及茲鄉告別而去約於石橋應期而至璠因訴以無産思十畝之田以給其家彼乃信舍之間驟發大水漂蕩陵谷出田五頃璠即驚駭他日再往其處潛覘其形覩之乃二龍也方悟其非人也即仰山之神矣且龍者陰陽不測變化無窮非史墨無以詳其由非劉纍無以品其性蓋神之所變豈不聖歟厥後靈驗不可勝記里民歸之如流水恃之如慈母肸蠁垂祉威神愈彰有唐代宗朝廣德末神感夢於太守閻公瑜曰我龍之伯仲也實姓蕭氏其祠在仰山既險且阻我其徙之將近爾郊俾祭禱詰旦視之則盡拔其殿宇置於山下去舊祠僅一舍之地即今新廟是也朝廷以廣惠公贈太保其次曰昭靈侯贈司徒足以旌其神通歆其血食也噫巨靈之擘大華也萬古以為聖迹而神之拔彼棟宇涌出邱壑豈非聖乎袁之嗇夫實有所賴其或癘疫潛起水旱洊臻九扈告災六淫迭作莫不仗二神之力而祛之瓿甌之禱隘於軒廡實千里封圻而受其賜矣坱圠之內孰不畏仰我皇纂嗣之七稔刺史邊公鎬以廟貌弗嚴榱甍漸損塵侵翠階苔剝虛廊像設雖存簾箔將弊遂興心匠重構雕梁方架重門旋屬解任明年刺史張公承傑下車是歲微旱爰請軍事判官駱延卿虔祝二神更新締建果獲元貺乃稱有年矣因率屬邑各輸其竹木僝工鳩力而修之并命都頭阮洪以蕆其事由是搜林以求俊材出帛以徵魯匠移濕就燥去舊為新未終其謀而去其職十年六月司徒李公徵古自銓曹郎而牧斯郡求瘼之始親造其祠命畢厥工用成前美由是召執事者督之纍月而後圓備雖令尹之九旬無以加也平叔猶存作賦休誇於古殿由余若在發言須讓於神功莫不廣檻長廊丹楹刻桷文璫刊外藻井懸空簷高而螮蝀欲飛瓦亂而鴛鴦不散繡栭星拱綵柱雲趨前架層樓旁堆翠巘引清流而繚繞面藍岫以參差豈惟玉女窺窗可以天人下視以茲宏麗固卜延長然後繢飾其像迎於二殿得不仰如在之容思莫大之福懿夫雕雘之成威神之盛憧憧往來鳧趨螽集有以盡其瞻敬矣自然禴祭加籩兩無虛日則知非二神不能垂其祐非賢侯不能崇其祠望祀之中此實為最無以繼也遂命載筆傳文以紀其事恂學愧縹囊才非綵筆徒奉受辛之旨實慙狂狷之辭罔愧直書用刻貞琬保大十年龍集壬子冬十二月五日記宏道南唐保大時人且以太上元元虛無闡化文宣聖父儉約興宗雖鼎分枝衍爰歸寂滅我竺乾大覺天地之師啓甘露之教門演真空之妙行大歲茲化界逖度㣥生儼瑞相於離宮壯皇王之境土厥後隋朝嗣主文帝登軒頒示畿城大營香剎時冀陽銜斯國澤聿創蓮宮繇是矣林王蠲其舍宅越檀信樹爾藍牆額懸招隱之名位壓澄江之上迄於唐代四百年間縱值廢興此不壞矣時有沙門惠明欲隆梵閣乃創鳴鐘且惠明飲水飧蘖丱奉真仙道德冠於五乘學力通於三教務茲嚴飾勉力逾年遂感畢方貢木表震甸之良材少昊遺金耀兌宮之美德即命澄川般匠建爾層樓爰憑桂菀洪爐陶鎔梵響矧有焚修院三僧令思及住院緇流捨財請衆亭亭修竹度歲孤青皎皎雲蟾終年潔白共興蓮社同助化緣復次都勸首徐可樞耿承諭徐玢遠邇檀越等早悟塵機俱親妙道克寸世上有為之寶置禪關無壤之因咸賚緡資可題志銘爾陶鎔既闋斤斧又停韻而扣起天聞疑屹屹而從地踴鴛鴦疊翼上覆層簷螮蝀分軀下擎千柱洪鐘一挂警塵夢於千秋翠閣圓成鎮祗園於萬古宏道狎居槐市素乏嘉歈况乎釋道幽遐理核難究深愧漦涓弱水爭起波瀾實慙腐草微光焉能代燭幸蒙請命不敢拒乎輒序勝因列於針記銘曰大覺真如紺目修眉逾城得道曩劫懷慈化胡化越以法以詞人間天上惟佛為師矧乎香剎隋皇創樹法鼓恆鳴慈雲式布地踊祥蓮天垂甘露帝祚同昌金園永固爰有緇公狎禪之宗三垂得趣十地門通營之妙閣創之洪鐘儼茲勝善顯爾殊功院已莊嚴四百餘年額挂招隱位壓澄川焚修釋子繼嗣相傳刊於成事可久存焉保大十一載歲次癸丑仲夏月建立譙國丁宏道撰
