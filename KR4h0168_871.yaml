front:
  text: 全唐文欽定全唐文卷八百七十一覺泰州人仕南唐纍官樞密使加兵部尚書以矯周世宗命欲殺宰相嚴續謫授國子博士饒州安置遣使誅於路
  hash: sha256:8dc739707ba175b5b9251d0bf5385c00b8f24e497c6c4eb4c12791eb8198ad2f
