front:
  text: 全唐文欽定全唐文卷三百六十六至字幼鄰禮部侍郎曾子擢明經第解褐單父尉從元宗幸蜀拜起居舍人知制誥歷中書舍人廣德初擢禮部侍郎大歷中轉京兆尹兼御史大夫累封信都縣伯遷右散騎常侍卒年五十五贈禮部尚書諡曰文
  hash: sha256:f8aee01b7846e52163daf69cb7bc2dae8000608c81521f7785524024f6ec65d9
  markers:
  - {type: head, offset: 14, content: 賈至, id: KR4h0168_NFKB_366-h1, level: 1}
body:
  text: 門下我唐受命百有十載德澤浸於荒裔聲教被於殊隣紹三代之統緒綜百王之禮樂我高祖神堯皇帝奄有大寶應天順人我太宗文武聖皇帝戡難造邦光宅天下我高宗天皇大帝修文偃武惠綏四方我中宗孝和皇帝聿遵孝德惟新景命我睿宗大聖真皇帝清明在躬元化溥暢朕承累聖之洪訓荷祖宗之丕緒兢兢業業不敢自寧往歲韋氏作逆宗社將墜是用翼戴先后掃蕩兇徒宸極既貞寰區載晏爾來在位垂五十年中原幸無師旅戎狄歲來朝貢夙興旰食勤念蒼生庶宏至理永躋仁壽愧無帝堯之聖德而有寄體之不明致令賊臣內外為患蔽朕耳目遠朕忠良或竊弄威權或厚斂重賦泉壤一漏成此滔天搆逆召戎馳突中夏傾覆我河洛擾亂我崤函使衣冠奔走於草莽黎庶狼狽於鋒鏑伊朕薄德不能守厥位貽禍海內負茲蒼生是用罪已責躬寤寐戰灼上媿乎天地下媿乎庶人外媿乎四海內媿乎九族乾乾惕厲思雪大恥夫定禍亂者必仗於㣥才理國家者先固其根本太子亨忠肅恭懿說禮敦詩好勇多謀加之果斷永王璘盛王琦豐王珙皆孝友謹恪樂善好賢頃在禁中而習政事察其圖慮可試艱難夫宮相之才師傅之任必資雅善允屬忠貞況四海多虞二京未復今當慎擇實惟其人太子亨宜充天下兵馬元帥仍都統朔方河東河北平盧等節度採訪都大使與諸路及諸副大使等計會南收長安洛陽以御史中丞裴冕兼左庶子隴西郡司馬劉秩試守右庶子永王璘宜充山南東路及黔中江南西路等節度支度採訪都大使江陵大都督如故以少府監竇紹為之傅以長沙郡太守李峴為副都大使仍授江陵郡大都督府長史兼御史中丞盛王琦宜充廣陵郡大都督仍領江南東路及淮南河南等路節度採訪都大使依前江陵郡都督府長史劉彙為之傅以廣陵郡長史李成式為副都大使兼御史中丞豐王珙宜充武威郡大都督仍領河西隴右安西北庭等路節度支度採訪都大使以隴西郡太守鄧景山為之傅兼武威郡都督府長史御史中丞充副都大使應須兵馬甲仗器械糧賜等並於當路自供其諸路本節度採訪支度防禦等使虢王巨等並依前充使其署官屬及本路郡縣官並各任便自簡擇五品以下任署置訖聞奏六品以下任便授已後一時聞奏其授京官九品以上並先授名聞奏聽進止其武官折衝以下並賞借緋紫任量功便處分訖聞奏其有文武奇才隱在林藪宜加辟命量事獎擢於戲咨爾元子等敬聽朕命謹恭祗敬以見師傅端莊簡肅以莅眾官慈恤惠愛以養百姓忠恕哀敬以折庶獄色不可犯以臨軍政犯而必恕以納忠規往欽哉無替朕命各頒所管咸令知悉勅朕聞惟理亂在庶官以先王旁求俊彥思皇多士以倡九牧阜成兆人頃者姦臣執權專利冒寵惟正直是醜惟邪佞是比壅塞賢路罔蔽天聰使忠臣不得盡其謀才士不得展其用廢三載之黜陟寢九德之推擇多有老於郎署滯於邱園吏稱無人才不給位朕以薄質嗣守大寶寇戎未殄王業惟艱兢兢乾乾日慎一日緬惟堯舜求賢之意周公吐握之義思欲廣進髦乂輔寧邦家實賴公卿大夫宏我視聽易曰方以類聚語曰舉爾所知凡宰相王臣宜加搜擇其常參官及郡縣長史上佐等皆從歷試而踐通榮如各知其密行異能博學深識才堪濟代術可利人名不彰聞位不充量湮淪屠釣流落風波者一善可錄便宜公舉遠則裁表附驛近則進狀奏聞勿避親讐無限儕伍其有獨負奇才未逢知己即仰投匭并所在陳狀自論長官登時與奏夫惟薦士非止一舉永為恒典有即登聞昔荀桓子立翟之功士伯受瓜衍之邑柳下惠賢而不舉臧文仲被竊位之名春秋書之千載不朽凡百在位可不勉歟宜宣示中外令知朕意王者省方諸侯述職以時受計其來久矣自鑾輿南幸西巴厎寧俾子小予受命討難越自河隴及於朔陲兼北狄兵車億萬同至待收秦中後定河洛狂寇窮窘不日翦滅朕以百姓為心敢忘終食中夏未清慮有驚擾且吏者人之師非吏何以安人良化惠風在於循吏當用兵振旅之際事充政重之時必去煩苛存乎慈惠須岳牧令長以鎮撫者也且懲惡勸善激濁揚清尋有使車黜陟當備知之朕每命中官及諸出使所至郡縣妄宣口勅徵求賦斂便即奏聞不可容隱朕以軍政孔殷朝會未備禮猶闕於筐篚時且急於甲兵鄉昭宣國令以示民庶履新之慶與卿等同之勅禮部郎中裴遵慶清正介直公才雅望智能利物行可檢人今東夏務殷宰臣任重是資髦士以佐輶軒宜居駮議之職仍領銓衡之務可給事中門下會稽太守崔㝢識敏而周器清而直有冉季之政事兼應劉之詞藻累昇臺省咸以才遷驟歷藩僚時惟德舉左曹樞近爰司駮正宜擇士林之秀俾參鸞渚之榮可給事中勅司膳郎中張孚果行育德疏通知遠是瑚璉之良器抱豫章之美才文以藻身屢得詞場之雋公而持操更推吏道之能譽洽禮闈風清憲簡宜擢拜於青瑣俾駮議於黃樞可給事中勅監察御史高適立節貞峻直躬高朗感激効經濟之畧紛綸贍風雅之才長策遠圖可云大體讜言毅色實謂忠良宜迴糾逖之任俾超風諭之職可守諫議大夫門下侍御史南汝疑節度判官張鎬崇德廣業宣慈惠和主善為師志古之道或直而溫可以居諫諍之任或強而誼可以在準繩之職或理而敬可以司草奏之繁官得其人鮮有敗事列於鴛鷺僉曰惟允可諫議大夫勅為川者決之使導為臣者宣之使言故堯有敢諫之鼓誹謗之木此其所以聖也楚靈稱凡百箴諫吾盡知之無怫吾慮此其所以敗也朕嗣守鴻業時方艱難實賴有位之士匡其不及故注意諫臣必求諸道關內監河判官暢璀頤真養正精潔惠和有質直而無流心秉忠信而持讜議頃歲去職晦跡邱園愛其身以有待養其志以有為厥德不回允諧司議可兼諫議大夫餘如故於戲宮之奇懦不能強諫春秋以為失常臧僖伯繼論納郜鼎君子稱必有餘慶予違汝弻汝無面從門下古者天子有諍臣七人而事君有犯無隱故能獻可替否從諫則聖京兆少尹知雜王延昌學於古訓秉心塞淵以文藝之質飭幹時之器頃者彌綸省闥紀綱臺憲舊章克舉雅望攸歸貳政浩穰雖藉其條理列職規諷更思其讜直諫大夫之密侍御史之雄爾宜兼之以匡予理可諫議大夫兼侍御史知雜餘並如故勅知中書舍人鴻漸等忠肅恭懿美秀而才蘊清通之理義兼貞固之幹能用制軍誥允屬夏卿持衡審官時惟小宰慎擇多士僉曰爾諧宜當銓綜之劇仍掌絲綸之任鴻漸可守中書舍人判武部倚守中書舍人判文部侍郎勅左史記事君舉必書先王之制也晉則董狐書法不隱楚則倚相能讀典墳善惡成敗實由其言慎擇端士永難其人殿中侍御史裴綜緒業清純言行惇敏俾之直筆庶勗厥官可行起居郎勅劍門縣令韋啟雅有文詞仍兼政術諫官近密必擇正人忠讜之言期於無隱可左拾遺勅太子左贊善大夫張伯禽博雅溫良能詳故事左金吾衛兵曹參軍張總淑慎徽美可立於朝休有令聞忠而周敏出納朕命僉曰爾諧伯禽可兼試太子僕總可守通事舍人勅中書舍人徐浩精潔惠和敏而好學有凌雲之詞賦兼臨池之翰墨祗勤直道厥德允修右掖司言已光綸綍南官掌轄仍佇紀綱可兼尚書左丞門下裦賢策勳國之大典允文允武人之所賴陳留太守嗣虢王巨杖劍分閫專征東夏俾鎮遏寇之職以寵維城之固可守憲部尚書門下蠻夷猾夏舜命臯陶作士楙功邁德黎民懷之周官大司寇亦以五刑糾萬民之命邦典定諸侯之獄明德慎罰先王至理前漢州刺史房琯既明且哲貞靜尚寬有文行可濟於時有直言能匡其國獻可替否翼亮先朝今寇賊初滅蒼生凋弊議獄緩死刑期無刑是用採人望於舊臣舉國楨於元老俾掌二典以弻五教庶不仁者遠姦宄道消尚德優賢仍加八命可特進兼刑部尚書封如故門下周官大冢宰以九職任萬人三歲大計㣥吏之誅賞選部綜覈時惟厥任非正人表臣齊明敏哲不可處此御史大夫郇國公韋陟代篤惟忠祗勤於德文可以經國業可以濟時有鄭僑惠主之仁懷史輶君子之道頃居小宰翼勤萬務銓鑒而必審其實拔舉而不失其能秉心塞淵厥有成績可守文部尚書餘如故勅尚書左丞韋綬等朕在東宮時先皇帝垂慈聖之德念予沖蒙選端士通儒使講貫今古自禮樂刑政暨君臣父子之道博我約我日就月將俾予於今不至牆面克荷丕訓大揚耿光實綬放公著之力也故朕嗣位未踰時月或自郡邸或自省署徵擢寵用為丞郎給事中官雖超拜職亦具舉師道光而心愈讓人爵貴而身益恭宜更裦升重酬輔導以綬精粹辯博有先儒之風可作秩宗以放端明慎重行君子之道可居憲部以公著檢敬規度得有司之體可貳冬官於戲貞百工平五刑典三禮皆重任清秩予無愛焉蓋欲表二三子道不虛行而明予一人德無不報也綬可禮部尚書放可刑部侍郎公著可工部侍郎餘官並如故門下昔成王命君陳分正成周尹茲東郊曰惟爾令德孝恭克施有政實大其舉俾振厥職先朝故事以擇舊德元老貞固之臣每居守焉今寇逆始平洛師殘弊周南分陝寄莫斯重太府卿盧正已忠肅恭懿仁而愛人專鎮分憂居必致理是用命爾問疲瘵之俗政必以寬化遷習之人謨必以義勸農穡之務事必以靜禁侵漁之暴令必以嚴可守工部尚書東都留守散官勳封如故於戲無替朕命主者施行門下全蜀奧區梁岷設險時清作鎮恒難其人况中夏未寧上皇南幸益州之政允資忠諒非親非賢何以兼腹心爪牙之任前襄陽太守李峘貞固簡肅宗枝標秀歷踐中外咸克有聲今巴蜀之地停鑾駐蹕舉爾以文武之才倚爾以維城之固且小司馬之職連率之重兼而處之不曰厚寄懋哉厥德無替朕命可行武部侍郎門下鯨鯢初懸理化未洽思敦馳騖之俗必宏廉退之風太常少卿兼修國史楊綰質稟天和才優大雅理能自暢學不為人自委身於周行孤立於中道喜慍莫形於顏色外物無得而親疏聲問日高志致彌遠固足以抑揚雅俗宏獎素風宜貳職於南宮仍屬詞於東觀俾難進之夫增氣干仕之子知慙斵雕澄源朕志斯在可守禮部侍郎仍修國史餘如故施行勅司駕員外郎韋環忠義激切智深謀敏懷斷割之利用慨國家之深讐淮海多虞寇戎未殄是擇才彥佐斯旄鉞宜兼臺閣以懋勳庸可司封郎中充淮南行軍司馬兼召募使勅君子立義為勇在國而能通故全其節而成其務矣守太子中允裴諝言忠信行篤敬有敏才斯可與權有直道磨而不磷造次顛沛秉心塞淵宜獎貞固之風俾緝臺閣之政可守考功郎中勅司封郎中程休文郎中應列宿之位御史為準繩之舉紀必以德任難其人况於四海多虞兩京未復臺省樞要非賢不居或以節推或以才擇可守禮部郎中勅知上黨司馬事王璵藏器於身策名清列多才多藝知微知章歷茲艱難屢有籌畫宜兼臺省之任仍總師戎之役可祠部郎中兼侍御史充招討權宜處置使門下上應列宿尚書郎所以稱美也中持風憲侍御史所以推雄也况兼之藩翰加以師旅宜求異才允迪厥職澤州刺史張禺有貞固之資為幹時之器澤潞司馬殿中侍御史邱據秉溫良之質多利物之才咸提綱憲府佐理戎幕以示修直展其謀猷必將大耕戰之圖宏臺閣之務式加新秩俾修舊政禺可守兵部郎中懷州刺史據可兵部員外郎依前行軍司馬勅前戶部員外郎邢宇雅志沖澹敏識精達養閑移疾亦有歲年南宮地清列宿虛位擢才進善以佐邦理可守司封員外郎勅九隴令李莘學行薰茂藻思清新譽流京劇政洽巴庸會府章奏之殷春官典禮之要任難其選才可當人可試禮部員外郎勅左補闕直宏文館韋少遊修詞懿文終溫且惠守右監門衛冑曹參軍許登振藻揚采穆如清風並藏器於身陳力就列南宮郎位是登題柱之才左禁諫臣方求折檻之直少遊可檢校祠部員外郎登可右拾遺勅左拾遺裴薦正直而溫洵美且惠有紛綸之詞藻懷耿介之志氣自居近侍屢獻讜言中原未寧隣國是協俾領攝於郎署為專對之使人可攝主客員外郎勅攝武部員外郎朔方採訪等使敬羽美才多適直道滅私通明可以斷疑貞固足以幹事自持風憲糾逖回邪不吐茹於剛柔有鷹鸇之搏擊與能裦美俾轉臺端載執謙光思宏讓節宜遂其懇志退守本官可守前官勅夫言語侍從之臣非賢不命久而加獎則彞典也翰林學士朝議郎行左補闕賜緋魚袋李讓夷器以琢成材為眾出蘊積邁時之志發明扶道之心學務研精文推軼拔早飛身於戎幕遂躐位於諫垣忠言屢聞密命斯委果揚溫雅之稱宜獲訏謨之効亦既久次宜所轉遷受假寵於握蘭用酬勞於視草勉宏前懿以服寵榮可行尚書職方員外郎依前充翰林學士散官賜如故勅右補闕李何忌後進人物一時雋選或丕承清緒多負美才或直言正詞有犯無隱或繡衣持斧摘伏擒姦或馳譽翰林文詞藻麗或知名吏道政事詳密在邦必達歷試有聞宜居鵷鷺之列俾宏準繩之紀可試職方員外郎勅攝河東司馬趙良弻以敬直方內義形於色蘊帷幄之謀畧真士林之忠良元戎起行師出以律將謀韓厥之職宜選子方之智俾登仙署仍佐中權可行司庫員外郎充朔方行軍司馬勅監察御史柏庭昌吏道稱優公才致遠文法之用蓋推於友朋操割之能亦聞於臺省仙郎之選人譽斯歸道有藉於簡孚官不循於資序當茲清職宜勗慎擇可憲部員外郎勅京兆府兵曹參軍李岑敏而好學出言有章累登甲乙之科嘗居匡輔之任雋才利器在邦必聞俾振翮於仙署用揚光於列宿可工部員外郎勅行殿中侍御史宋晦質性溫敏行能詳實再策名於霜久更事於輶軒理必有常條能不紊禮闈舉直郎署求才俾迴秋憲之威以佐冬官之屬可屯田員外郎勅尚書郎中佐理六卿事關政本御史則舉直錯枉綱紀周行非雅正之才難在斯任吏部員外郎韓滉恪慎惇敏飭吏以文夙夜在公咸宜進位可吏部郎中
