front:
  text: 全唐文欽定全唐文卷一百湛然滕王涉子嗣爵官殿中監貞元五年為太子賓客充回紇使
  hash: sha256:9743f4122008a9dc98b2da0326cba8b482580694da1c0a5752c4231538bed76c
  markers:
  - {type: head, offset: 11, content: 滕王湛然, id: KR4h0168_NFKB_100-h1, level: 1}
body:
  text: 若夫懸象著明保傅繫三台之位厚德載物公侯分五嶽之尊環曜魄而布陰陽佐林蒸而平水土斯所以寅亮天地寧濟寰區自匪器稟英靈藝兼文武發揮成務之本模楷具寮之德則何以弼諧邦教調護元良粵惟纂懿前修追蹤上哲總淳粹以秀出偶會昌而挺生賢戚載彰寵光崇賁者其在我司空豳國公乎公諱希瑊字美玉扶風平陵人也昭成皇太后之介弟開元神武皇帝之元舅即隋工部侍郎左右武大將軍納言司空上柱國陳國公抗之曾孫皇朝駙馬都尉工部禮部二尚書右領軍大將軍殿中監光祿大夫上柱國莘國公誕之孫太常卿潤州刺史贈太尉荊州大都督上柱國豳國公孝湛之元子也而自祥生石紐祚啓金刀盛業與塗山比崇長發將觀津方永文昭武穆帝載矢之於典謨纍將重侯后族布在於方册故得國華人傑躡振古以騰芳服冕乘軒迄昌辰而益茂莫不歌鐘繼響喧喧連北里之音邸館相望藹藹並東都之盛歷代之所推挹豈可一二談哉公鼎胄標華公門孕秀仰庇軒星之曜傍吞間氣之英天生仁智之姿日用溫恭之性弱齡志尚卓爾多奇阮瑀之朗朗無雙黃憲之汪汪不測豈可同年而語也年十有五補修文館學生鼓篋上庠橫經太學中年考校僉我大成屬穹昊降災高皇厭代白雲方馭攀鳳駕而無追素幘為郎翊龍輴而暫往既調授潞州參軍尋遷常州司兵參軍事上黨關山毗陵郡邑既承君子之命又參從事之班夫惟濫觴蓋茲而始秩滿入拜安國相王府功曹參軍久之遷為屬時睿宗之藩潛龍德在田猿岩尚啓纍接曳裾之侶屢陪飛蓋之遊樂善載歡承恩莫二唐景雲元年睿宗登極加朝散大夫除殿中尚食奉御黃金兼錫朱紱增榮調九沸於宸羞薦八珍於帝膳景龍元年又遷為太府少卿兼知尚食事司帑藏之珍賮奉雲天之宴樂幾承恩獎增峻寵章二年加銀青光祿大夫殿中監乘輿服物御府斯殷纂慎日宣爪牙尤寄曾未踰朔又拜左右千牛衛將軍而帝謂公曰朕昔在藩嘗居此職而其宿衛親近今故授卿其承寵私有若是也衛鈎陳於北極應上將於南蕃榮冠等夷地兼勳戚雖古之位踰九卿班同三府者亦無以方焉先天元年遷金紫光祿大夫右散騎常侍兼檢校光祿卿無何又正除光祿侍中同掌即珥貂蟬郎中改名攸司殿掖豈有高堂擅青龍之疏張湛推白馬之名兼而有之不其榮矣開元二年遷太子少傅襲爵豳國公加賜食實封二百戶以六行之姿翼千鈞之務琢磨光乎玉裕輔導整於銅樓有華廙之清富匡衡之法義庶常儀刑八座通籍二宮福履有綏降年惟永而過隙之影背閶闔以言旋但閲川之波辭少海而無返開元五年歲在丁巳冬十月丁巳朔二十日丙子暴薨於東都章善里之私第春秋五十有四嗚呼哀哉慟感宸旒有切渭陽之念哀纏士庶逾深鄭國之悲粵翌日聖上舉哀於洛城南門輟朝三日贈司空荊州大都督賻物八百段米粟八百石及東園祕器凶事葬事官給務令優厚仍令將作大匠韋湊充使監護河南少尹秦守一為副鴻臚少卿李禺持節齎璽書弔祭儀仗送至墓所并為立碑發引之日令工部尚書劉知柔祖祭有司考行諡曰某禮也渥命優洽事越彞典惟公降靈純嘏稟秀中原風範自高衣冠甚偉雖地稱金穴外家之寵克崇位翊瑤山儲輔之尊斯在而謙以約己德以潤身九列重其章明百寮仰其忠儉夫所謂貴而不驕志明而晦者無乃於公乎名命雖臨濛暉莫駐佳城鬱鬱遽開京兆之阡詔葬紛紛即赴畢原之路旌旐飛翻而笳鼓噎思容御動而行路悲嗣子朝散大夫行太子典設郎鍊次子太子內直郎鋼等銜恤哀毀退而不及粵以開元六年夏四月九日癸酉歸葬於京兆咸陽縣洪瀆川之北原八水分流五陵交對星辰照爛於東井煙景密邇於西嶽龜言筮告此地攸安萬古千春德音何託惟披文與相質恪奉絲綸冀地久而天長永昭徽範下才不敏敢述銘曰昭昭茂族赫赫崇庸石紐疏系金刀建封軒星代稟間氣時鍾鳴陰必嗣嘯谷相從越洎我公秉心貞吉肇遊庠序歷登天秩東郡勞人西都賦質龍飛偶運鵬圖匪日絲綸驟委章紱增榮既典六尚俄升九卿鉤陳任切武衛姿英左右惟允於斯作程獻贊嘉猷載司光祿琢磨儲範方調鼎餗懵矣神心宜哉倚伏曾不遐壽奄焉薨覆帝念元舅情深渭陽輟朝興慟詔葬哀傷亟峻典禮逾崇寵章鼎門南出畢陌西長旐引輤軒笳隨魂輅容衛哀咽山川回互秦塞從指漢原已暮紀盛烈於豐碑庶有旌於武庫歡許王素節子神龍初襲爵開元十一年為衛尉卿下遷鄂州別駕除邠州刺史祕書監守太子詹事天寶六載卒贈蜀郡大都督唐在六葉將修封禪想與靈接乃冠皓色佩朝陽瑱瑤碧之明潤屑桂椒之芳香曰豫意夫放勳光明重華風聲髣佛兮陽靈之宇嬋娟兮介邱之平先大樂緝正聲更協五變親和九成均鳴絲於金竹參雲門與咸英使子野奪意伶倫喪精帝於是搖翠竿於東國翳華芝而遂行然猶左却宓妃右屏西子寵罷金屋歡辭瑤水豈修蛾之敢回匪清目盧之能視飛燕心折毛嬙色沮朝雲之姣兮不能呈其妍絶代之冶兮無所施其美況肯選無限情未央將與昭陽比盛傾宮相望仍復斥鄭衛捐倡優靡曼無取淫哇不留淮南兮激楚荊歌兮趙舞長袖更進新聲自許嬌彩雲之徘徊拂錦茵而容與能使秦帝熒惑漢皇延佇度曲東城橫態北渚莫不卷襞而索無處所庾疑射兕之騁騖役誇胡之豫遊去翠被與豹舄戢鳥唬凝及驊騮復想像雲夢倣徨青邱麋麞熊羆之藪灌莽陵岡之幽於中為樂驕矜未休荒淫震蕩其誠不修將穆然儲思粹清高想意援招搖兮往若而疑至乃建玉旃之光耀動金根之逶迤丹虯翊輦白武銜蕤後舞元鵠前鳴長離清壇下蔚高煙上馳故能決地閫開天維降青元兮來斯登黃靈兮遲遲江畔之茅抽三脊北里之禾滿芳席睢上之黃龍兮瑞以多願持朱鴈兮薦天歌明德既享靈心每和宜其日炷中峯雲煙上帝光五色聲萬歲氣非煙風若蕙勳侔成山碣石澤比漲海洪波茲所以庶高宗之美豈七十二君之足多孰與雄奢驕貴逞欲矜意貪靈好奇恃力誇資惑方士之説邀羡門之期果為風雨所中神仙見期歷琅邪兮徒遠望蓬萊兮幾時者哉禕吳王恪孫嗣江王囂封嗣江王為太子僕兼徐州別駕加銀青光祿大夫歷蔡衢等州刺史開元後纍轉蜀濮等州刺史入為光祿卿遷將作大匠十二年改封信安郡王拜左金吾衛大將軍遷禮部尚書充朔方節度使拔吐蕃石堡城拓地千里元宗喜更號其城曰振武軍契丹衙官可突干叛敕禕副忠王為河北道行軍元帥王不行褘率諸將分道出范陽北大破多蕃擒酋長以還加開府儀同三司兼關內支度營田採訪處置等使久之擢兵部尚書為朔方節度大使坐事下除衢州刺史歷滑懷二州天寶初以太子少師致仕二年遷太師未拜薨年八十餘臣伏見御製西嶽碑文來從上元光照下土羣臣捧載遊聖難名臣聞天作高山氣雄茲嶽壓洪河而傑起淩蒼昊而孤標近當國門用固京邑自巨靈開拓往帝巡遊精意嘗聞頌聲則未非勝賞難就蓋詞翰無能不遇非常之君孰覩非常之事陛下知其若此金聲而玉振之乃發揮睿詞幽贊神化廣大極天地光明融日月至理動清微至功含造化合而成體散而成章巍乎煥乎不可得而稱也又復親紆彩筆寫在香箋隨手生姿入神變態勢如飛動妙絶古今諒得之自然豈因之外物對揚天休臣子之常也美而無述過莫大焉請以御製碑文頒示四海使伊昔之后自愧不才率土之臣咸知所謂則雖死之日猶生之年志暕彭思王元則曾孫嗣爵開元中官宗正卿加上柱國歷左千牛衛上將軍法師諱法澄字無所得俗姓孫氏樂安人也吳帝權之後祖榮涪州刺史父同同州馮翊縣令法師第二女降精粹之氣含宏量之誠大惠宿持靈心早啓鑒浮生不住知常樂可依託事蔣王求為離俗遂於上元二年出家威儀戒行覺觀禪思迹履真如空用恆捨遂持瓶鉢一十八事頭陀山林有豹隨行逢神擁護於至相寺康藏師處聽法探微洞悟同彼善才調伏堅持寧殊海意康藏師每指法師謂師徒曰住持佛法者即此師也如意之歲淫刑肆逞誣及法師將扶汝南謀其義舉坐入宮掖故法師於是大開聖教宣揚正法歸投者如羽翮趨林藪若鱗介赴江海昔菩薩化為女身於王後宮説法今古雖殊利久一也中宗和帝知名放出中使供承朝夕不絶景龍二年大德三藏等奏請法師為紹唐寺主敕依所請今上在春宮幸興聖寺施錢一千貫充修理寺以法師德望崇高敕補為興聖寺法師修緝畢功不逾旬月又於寺內畫華嚴海藏變造八角浮圖馬頭空起舍利塔皆法師指授規模及造自餘功德不可稱數融心濟物遍法界以馳神廣運冥功滿虛空而遇化不能祗理事塗請解寺主遂抄華嚴疏義三卷及翻盂蘭盆經溫室經等專精博思日起異聞疲厭不生誦經行道視同居士風疾現身乃臥經二旬飲食絶口起謂弟子曰我欲捨壽不知死亦大難為當因緣未盡後月餘儼然坐繩牀七日不動惟聞齋時鐘聲即喫水忽謂弟子曰扶我臥我不能坐死臥訖遷神春秋九十開元十七年十一月三日也以其月草三日安神於龍首山馬頭空塔所門人師徒弟子等未登證果豈知鶴林非永滅之場鷲嶺是安禪之所號慕之情有如雙樹法師仁孝幼懷容儀美麗講經論義應對如流王公等所施悉為功德弟子嗣彭王女尼彌多羅等恐人事隨化陵谷遷移紀德鐫功乃為不朽銘曰易高惟一道尊自然大法雄振豈曰同年優陀花色曇彌稱賢錯落倫次師在其間濟彼愛河拯斯苦海導引羣類將離纏蓋不虛不溢常住三昧是相無定隨現去來雙林言滅金棺復開有緣既盡歸向蓮臺衆生戀慕今古同哀瑛元宗第二子本名嗣謙景雲元年九月封真定郡王先天元年八月進封郢開元三年正月立為皇太子十年加元服十三年改名鴻二十五年改今名武惠妃有寵螫瑛楊洄希旨譖瑛將為亂惠妃證成之廢為庶人俄賜死城東驛一昨正月二十七日伏見陛下於興慶宮親耕三百餘步既而青光紫氣覆地臣等聞舜在歷山之下人微之事也漢有鉤盾之間兒童戲之猶正經所尚良史稱多況陛下運德協靈聖情逮物上為宗廟下預黔黎躬耕藉田天下幸甚較其盛禮百倍於三推考其嘉瑞獨高於千古而九霄四遠中外阻絶冢司莫繇見直筆所未聞使帝迹不激揚聖美不昭晰皆臣子之過也是以臣等冒昧上陳伏乞恩慈令宣示朝廷録付史館則罄天率土殊情同幸璬元宗第十三子初名澐開元十三年封潁王遙領安東都護平盧軍節度大使加開府儀同三司改今名安祿山反除蜀郡大都督劒南節度大使歸京師建中四年薨年六十六臣等伏以龍池肇慶寶祚攸章聖德動天禎符薦至臣等憤深家國志願光揚去開元二十二年於東京朝堂上表請建龍池聖德頌曲蒙天眷俯遂微誠其時修營已就刻石所為頌文未備敘事多遺述聖談天萬不舉一既乖士庶之望莫展宗臣之心尋請改修冀昭聖德斐然雖竭於愚思翰墨未絶於貞石今屬靈符降祉景命維新天寶之號再加郊廟之儀式展誠合書其寶録光闡徽猷綴集前文以存不朽特望天恩更許編録則聖德鴻業紀而無遺聖美形容於茲允備無任勤懇之至謹奉表陳情以聞璘元宗第十六子開元十三年封永王遙領荊州大都督加開府儀同三司安祿山反詔璘赴鎮又領山南江西嶺南黔中四道節度使璘至江陵募士得數萬遂有窺江左意會吳郡採訪使李希言平牒璘璘怒乃襲希言肅宗遣宦者啖廷瑤等招諭之璘懼奔嶺外至大庾嶺為江西採訪使皇甫侁所殺寡人上皇天屬皇帝友于地尊侯王禮絶寮品而書來往應有常儀今乃平牒抗威落筆署字漢儀隳紊一至於斯潓澤王上金孫嗣爵大歷中官祕書監遷光祿卿公諱訓字訓琅琊臨沂人也永穆大長公主之中子昔周文授圖靈王纂膺誕我太子晉晉有儀鳳之瑞瑞流子孫粵王氏焉為異姓首曾祖知道皇贈魏州刺史祖同晈皇光祿卿駙馬都尉贈太子少保尚定安長公主父繇皇特進太子詹事駙馬都尉贈太傅尚永穆長公主龍種鳳雛長淮積潤文武間出衣冠實繁譜牒稱之豪族鐘鼎傳於不朽公文備四教學通六藝博聞雅量厚德高明三歲尚輦奉御四轉至光祿卿早年娶嗣紀王鐵城之季女也夫人尋逝有女方笄生人之哀孤遺之極後尚博平郡主癸卯歲居鄧州別業因中風疾遂還京師公主罄茲上藥竭以秦醫千禳萬療月衰日羸若使經方有徵公亦保合於永年矣嗚呼春秋卌一大歷二年己月癸巳奄終鳳樓之右中使弔賵度僧尼以追福公主崩心震悼哀過禮經孝子柴毀骨立古今未聞其年八月七日遷厝萬年縣滻川鄉滻川之原禮也嗚呼生涯畢矣龜兆始安青門始啓朱輅方引返哺之聲絶矣倚門之望休焉銘曰龍渠之右鳳城之東岡原夾輔卜宅叶同山開黃壤地列青松萬古已矣千年實封多才多藝惟聰惟惠如松之盛如川之逝陵谷將平石記爰旌長懷令德永頌英聲倓肅宗第三子天寶中封建寧郡王授太常卿同正員元宗幸蜀百姓遮留太子倓因勸趣河西收河朔軍謀興復遂從肅宗北上渡渭日數十戰常身先三軍屬目至靈武肅宗即位議以倓為天下兵馬元帥左右固請廣平王乃更詔倓典親兵張良娣與李輔國交構圖危皇嗣倓忠謇數言之反譖其有異志遂賜死代宗立追贈齊王大歷三年詔以倓當艱難首創大謀中興有功進諡承天皇帝逆胡犯闕四海分崩不因人情何以興復今殿下從至尊入蜀若賊兵燒絶棧道則中原之地拱手授賊矣人情既離不可復合雖欲復至此其可得乎不如收西北守邊之兵召郭李於河北與之併力東討逆賊克復兩京削平四海使社稷危而復安宗廟毀而更存掃除宮禁以迎至尊豈非孝之大者乎何必區區溫凊為兒女之戀乎公主邠王守禮女出降吐蕃棄緒縮贊太和中歸國薨金城公主奴奴言仲夏盛熱伏惟皇帝兄起居萬福御膳勝常奴奴奉見舅甥平章書云還依舊日重為和好既奉如此進止奴奴還同再生下情不勝喜躍伏蒙皇帝兄所賜信物並依數奉領謹獻金盞羚羊衫段青長毛氈各一奉表以聞金城公主奴奴言季夏極熱伏惟皇帝兄御膳勝常奴奴甚平安願皇帝兄勿憂此間宰相向奴奴道贊普甚欲得和好亦宜親署誓文往者皇帝兄不許親署誓文奴奴降番事緣和好今乃騷動實將不安和矜憐奴奴遠在他國皇帝兄親署誓文亦非常事即得兩國久長安穩伏惟念之妹奴奴言李行禕至奉皇帝兄正月敕書伏承皇帝萬福奴惟加喜躍今得舅甥和好永無改張天下黔庶並加安樂然去年崔琳回日請置府李行禕至及尚他辟回其府事不蒙進止望皇帝兄商量矜奴所請
