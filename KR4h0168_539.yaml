body:
  text: 物之多兮珠為珍通其貨而濟乎人才披沙以皛耀俄錯彩以璘玢避無厭之心去之他境歸克儉之政還乎舊津由是觀德孰云無神相彼南州昔無廉吏富期潤屋貪以敗類孤漢主析圭之恩奪蒼梧易米之利濫源既啓真質斯閟從豫舊而不瑕諒天視兮有自孟君來止惠政潛施欲不欲之欲為無為之為不召其珠珠無脛而至不移其俗俗如影之隨爾其狀也上掩星彩遙迷月規粲粲離離與波逶迤乍入潭心時依浦口驚泉客之初泣疑馮夷之始剖依於仁里天亦何言富彼貪夫神之所不沙下兮泥間韜光而自間映石華之皎皎雜魚目之魚衆魚衆豈比黃帝之使罔象元珠乃得藺生之詭秦主荊玉斯還由是發潤洲蘋增輝岸草水容益媚澤氣彌好川實效珍地寧愛寶隱見諒符乎龍躍虧全非係乎蚌老豈惟彰太守之深仁所以表天子之至道觀夫杲耀外徹英華內含飾君之履兮豈不可照君之車兮豈不堪猶未遭於采拾尚見滯於江潭雖舊史之録與前賢之談終思入掬以騰價願得書紳而勵貪於惟明時不貴異物徒飾表者招纍而握珍者難屈是珍也居下流而委棄歷終歲而湮鬱望高鑒兮暗投幸餘波之洗拂大事在祀吉日惟辛偉漢皇之光宅禮太乙之威神就陽位敘彞倫青旌既載蒼璧斯陳帝德惟馨虔精誠而上感天道不昧發神光而下臻斯所以昭乎望拜之地肅爾侍祠之人懿茲珍神實曰靈貺奪月之魂韜雲之狀集於祠側照此壇上神實臨下以無私君亦當仁而不讓是時也神光未動遠靄初收天宇清而㣥動和肅帝座正而萬靈懷柔爾電烻熠若星流謂珠蚌之初剖疑燭龍而暫遊武皇於是委王佩俯翠旒自竹宮望圜丘拜上帝之賜擁明神之休遐徵所聞以此為異歌童不吳以奏曲從臣勿褻而在位奉其道永肩一心答其祥敢有二事光之降也帶爟火兮侵燎煙臨仙仗以增煥映靈丘而乍圜帝之望也爇香蕭兮奠元酒布清意而不倦儼威儀而方久善行無轍迹搏之乃無盛德有形容視之而有神既格思人皆見之助逮暗之祭彰燭幽之時詎比夫望於觀臺而為備坐彼宣室而受釐故能飛扇英聲騰乎茂實笑魯郊鼷鼠之告僭鄙秦祀野雞而獲吉來或從東似合序於春令至常以夜若避明於朝日今國家成功巍乎明德依於鋪鴻猷而前王所羡崇嚴祀而左史宜書備禮告天帝既踰於孝武觀光獻賦愚竊慕夫相如門下輔弻之臣軍國是賴興化致理則秉鈞以居取威成功則分閫而出所以同君臣之體而一中外之任焉屬者問罪汝南致誅淮右蓋欲刷其汙俗弔彼頑人雖棄地求生者實繁有徒而嬰城執迷者未翦其類何獸困而猶鬬豈鳥窮之無歸歟由是遙聽鼓鼙更張琴瑟煩我台席董茲戎旃朝議大夫守中書侍郎同中書門下平章事飛騎尉賜紫金魚袋裴度為時降生協朕夢卜精辨宣力堅明納忠當軸而才謀老成運籌而智略前定司其樞務備知四方之事付以兵要必得萬人之心是用禱於上元擇此吉日帶丞相之印綬所以尊其名賜諸侯之斧鉞所以重其命爾宜大布清問恢壯徽猷感勵連營蕩平多壘召懷孤疾字育夷傷况淮西一軍素效忠節過海赴難史策上勳建中初攻破襄陽擒滅崇義比者脅於凶逆歸命無由每念前勞常思安撫所以內輟佐輔為之師帥實欲保全慰喻使各得其宜爾往欽哉無越我丕訓可守門下侍郎同中書門下平章事使持節蔡州諸軍事兼蔡州刺史充彰義軍節度管內度支營田使申光蔡等州觀察處置等使仍充淮西宣慰處置使散官勳如故朕聽政餘暇躬覽國書知姦臣擅權之由見母后竊位之事我國家神器大寶將遂傅於他人洪惟昊穹降鑒儲祉誕生仁傑保佑中宗使絶維更張明辟乃復宜福胄嗣與國無窮臣某言伏承皇帝光膺册命踐登寶位率土臣子抃慶滋深中賀臣聞天子之孝以纂承為重聖人之寶以傳授為公伏惟皇帝陛下德合乾符道光天宇廓寰區以御歷灑渥澤而飛龍上以代太上之憂勤下以副㣥生之欣戴溥傳天旨大洽人心喜氣騰輝晴雲動色黎元率舞將校傳呼即日而萬姓歡康纍旬而四海清謐臣職當統帥寄重方隅慶賀之誠倍萬常品限以所守不獲奔赴闕庭臣某言伏奉聖旨以來年正月五日朝獻太清宮饗太廟七日有事於南郊宜令所司準式者敬莫大於朝宗廟嚴莫大於饗郊丘此二帝三王與聖祖神宗之所以總百靈而臨萬國巍乎盛烈也伏惟皇帝陛下光膺大寶茂對上元盡誠信以奉先極婉愈而致養孝光夷貊悌達神明方將告成功敷顯號惟天為大俾衆庶咸新如日之升與品物相見六幽傾耳四海翹首凡在臣下不勝慶幸而臣謬貞師律叨守戎藩不得捧豆籩於清廟之中執玉帛於泰壇之下仰觀盛禮伏賀鴻休聳踴轅門無任戀結屏營之至謹遣某官某奉表陳賀以聞臣某言伏奉十一月十日制書南郊大禮畢大赦天下者湛恩龎鴻大號渙汗際天接地孰不慶幸中賀臣聞禘嘗之禮所以仁祖禰也郊祀之儀所以尊天地也五帝之前蕢桴土鼓致其敬敬有餘矣而禮不足三王以降金罍玉斚備其禮禮有餘矣而敬不聞秦之增封也覬望神仙漢之郊丘也禳除災害雖無文而咸秩終有廢而莫舉猶可以編在方策垂其鴻名豈若國家參文質於六經之中陛下酌損益於百代之後順昊天之成命得黎人之歡心九穀有年四方無事然後因吉土迎長日咸池屢舞太簇登歌萬靈識周旋之位百神知饗獻之節雲散而柴燎高達風清而蕭薌遠聞信大報之無私亦元鑒之不昧臣當時集軍將官吏僧道百姓等丁寧宣示訖惟天之意莫遺於細微如日之輝不隔於幽遠頑鈍知感鬼神懷柔何則刑莫大於成獄陛下捨之罪無輕重恩莫深於延賞陛下推之澤及存歿行道求志敢於直言者既許以親覽觸綸罣網屏於遠方者又移之近郊減來歲之新稅昭其儉也棄比年之逋債宏諸仁也念勳臣而樹勳者益勸尊有德而不德者知慙賜羸老有粟帛之優禮神祇無牲幣之愛此所謂幽室盡曉枯條遍春雷雨作而蟄蟲昭蘇風雲行而籠鳥飛舞率土臣妾不勝大慶况臣蒙被恩澤獲齒生類會守遠郡阻窺盛禮徘徊天外目與心斷無任抃躍之心謹遣突將王清朝等奉表陳賀以聞臣某言臣伏奉五月二十八日敕旨尊太上皇后恩覃日下歡動天中臣伏以皇太后坤德合符陰靈表慶化光宮職道贊國風伏惟皇帝仁聖宅心文明恭巳遵承孝理嚴奉慈顏獻寶綬於內朝宣玉册於中禁彰明順德知陛下就養之勤表正母儀見陛下歸安之盛萬國所繫四方是刑人臣之懇願既申品物之歡心斯洽臣叨承寄任限守藩隅不及陪位闕庭抃舞稱賀無任聳慶踴悅之至臣得上都進奉官狀報伏承七月二十八日詔旨軍國政事權令皇太子勾當者中賀伏惟皇帝陛下大明御宇至孝自天霜露既濡想園陵之漸近雲霞是仰悲弓劍之方遙內感深衷外勉庶政由是推赤心於俊乂委寶歷於元良宣明兩曜之光崇重萬國之本與夫遊神姑射義豈同風養道大庭禮誠異日天下臣子不勝慶幸臣限以所守不獲拜候闕庭無任屏營之至臣某言臣伏奉今月十一日制書元德融明聲聞於宗廟鴻名光大充塞於乾坤與物皆春大赦天下臣當時宣流渥澤騰布耿光恩均而萬物昭蘇慶洽而三軍鼓舞中賀臣聞覆載無私天地所以為大德照臨不巳日月所以為大明六位因時以成功一代觀象而設教肇自古昔垂為憲章伏惟睿聖文武皇帝陛下並日而明配天為大冠三皇之道宏十聖之風保合太和緝熙帝載是以廓清氛霧曾不纍旬虔奉郊禋未嘗虛歲百蠻梯航以內面萬國歌舞而宅心所謂巍乎其有成功煥乎其有文章也尚復勞謙仄席勤恤納隍釋纍繫之幽囚無分輕重歸遐遠之放逐不問存亡棄逋債於窮人戒多求於貪吏憫朔邊之介士厚其寒衣恢武功也裦闕里之胄嗣賁以布帛振文教也推恩而九族既睦行慶而六師用張忠貞必表於門閭耆耋遍羞其牢醴百神咸秩一物不遺安人之所未安理人之所未理天波渙汗綸旨丁寧有以知天地覆載之仁有以見日月照臨之德天下臣妾不勝慶幸臣限守藩鎮不獲稱慶闕庭無任抃躍欣賀之至謹遣某官奉表陳賀以聞臣某言伏奉二月二十四日制書大赦天下者霈澤自天鴻恩匝地三軍萬姓不勝慶躍臣聞天地至大或有所不容日月至明猶有所不照伏惟皇帝陛下體元繼統垂象立極齊軒昊之元化冠唐虞之至仁敷大號於天中揭明謨於日下臣以為覆載之德大於天地矣照臨之光明於日月矣何則用刀鋸而伏斧鑕者無重無輕陛下捨之投豺虎而禦魑魅者無遠無近陛下移之免逋逃獻畝之稅罷雕華任土之貢出後宮之伎樂還外國之俘囚裦崇首先於二王敦敘旁周於九族明徵義烈各録其裔胄悉數忠勞遍增其爵級宣股肱之力者賞延於上效爪牙之任者賜出於中搜淪滯之才遷久次之秩聘士既尊於經術問年必本於期頤在幽隱而不遺雖細微而皆及歡聲雷動喜氣雲騰百姓知聖人之仁萬物覩聖人之作普天率土無不慶幸臣叨居藩服纍沐恩榮抃舞欣歡倍百恆品所守有限不獲稱慶闕庭臣及將士官吏百姓等無任踴躍屏營之至臣某言伏奉今月九日制書皇太子册禮云覃恩與萬方同其惠澤者國慶遐宣天波曲被懷生之類咸共欣榮中賀臣聞德教所加一人有慶元良既立萬國以貞伏惟皇帝陛下至化旁流神功廣運以為義莫重於主鬯禮無大於承祧考古揚前星之光順人宏少海之澤誕敷明詔宣告庶方雷初動於地中風已行於天下由是哀矜罪戾甄獎功勳表順孫孝子之門秩名山大川之祀仁無不覆惠無不均草木惟繇鳥獸咸若率土臣子不勝慶抃臣限守藩鎮不獲陪位闕庭踴躍稱慶無任屏營之至臣某言今月四日節度使伏奉制書大赦天下者渙汗大號滂沱鴻恩降自九天被於四海懷生之類無不慶躍中賀臣聞天地之大德本於生成聖人之全功在乎化育伏惟皇帝陛下至明立極大聖統天法貞觀之宏規纂建中之盛業降哀矜於罪戾一物不遺頒寵贈於忠勤萬方皆及事遵儉約道在寬宏散作仁風灑為膏澤率土臣下不勝歡喜臣限以監守未獲奔走稱慶闕庭不勝戀結欣戴之至謹遣某官某奉表陳賀以聞臣某言伏見今日制書御丹鳳門大赦天下者明照六幽澤流九有臣等誠歡誠喜頓首頓首臣聞覆幬生成乾坤之盛德疆理化育帝王之極功伏惟睿聖文武皇帝陛下受天元符纂聖光宅躬夏禹之勤儉體帝堯之聰明除惡必絶其根耀武威而四凶既殛制政皆循其本振文教而百度惟貞今者東風發春元日獻歲凝旒視朝於正殿步輦臨御於應門開龎鴻之湛恩孚渙汗之大號萬物瞻睹兆人允懷至若移其放逐解網之仁也弔彼傷殘納隍之義也罷開市之征稅足以宏聖人厚下之風裦卿士之祖先足以廣聖人追遠之孝潛蟄一振稿枯盡榮普天率土不勝慶幸臣某等謬司樞務虔奉德音喜抃之誠倍百恆品無任慶躍屏營之至臣某等言伏見今月二十八日制書普安㣥生憂濟庶士每念下農艱苦賑紅粟而流衍知貪賈滯財禁青蚨之飛走千官聳聽萬國欽聞中賀臣聞損有餘補不足太上之教也斂以輕散其重哲王之制也肇自古昔垂為憲章其或法因情遷事與時異則物力甚屈人心用咨是故書載行之惟艱史稱守而勿失伏惟睿聖文武皇帝陛下紹興丕圖光啓鴻業勤恤人隱精知化源以為麥禾雖登農食猶歉布帛大賤女工必傷因發生之時下慈惠之詔清問疾苦昭宣令宜嚴除暴征令巳逋責首自京國達於淮湖三方雖遙如視以宸鑒萬幾誠衆皆經於睿心自然事耕桑者忘四體之勤遊巿井者樂一朝之便慶共雲布恩隨風翔率土之內不勝慶幸臣等叨逢聖運預列班榮攀日月之光無能獻替遇雲雷之澤空荷霑濡捧戴德音不勝抃躍屏營之至臣某言伏奉五月二十八日制書皇太后光膺茂典誕受鴻猷恩榮慶錫覃被率土中賀臣聞天子以德教而兆人慶賴明王以孝理而百神和平伏以皇太后秉德陰凝體仁坤厚宏是內則順於先朝道配軒皇之尊功參文母之盛伏惟皇帝陛下孝承丕緒仁嗣寶圖則天之明事地以察昭彰慈訓光啓尊名發德音於上元流惠澤於下土陷疏網者許其減等養高堂者錫以加封粟帛遍霑於耆年門閭必表於仁里悉使懷生庶類行道㣥心非獨各親其所親無不長人之所長湛恩布濩盛禮豐融信可通神明而光四海天下臣子不勝慶幸臣限於鎮守遠在方隅不獲躬詣闕庭抃舞稱慶無任聳踴慶幸之至臣某言當道進奏院狀報司天臺奏八月十五日乙亥夜老人星見於東井色黃明潤敕旨宣付所司者率土咸觀際天同慶中賀臣聞上天不言而星垂象次舍隱見其指甚明伏惟陛下道冠帝先恩覃物表太和之氣上達萬壽之瑞下呈既在東井又當秦分色侔蒸栗光掩連珠彰爾寶圖類堯年之河出延長聖歷齊漢代之山呼凡百臣下歡心如一况臣幸霑皇屬叨守國藩瞻望闕庭不勝慶抃之至臣某言臣得進奏院狀報中書門下奏賀於醴泉縣建陵柏城獲白鹿一聖敬日躋休祥薦至臣某謹按孝經援神契曰王者德至禽獸則白鹿見伏惟陛下盛德配天深仁育物和氣交感出為休徵懿此異獸挺茲奇表在嶠山之側宛是隨仙來魏闕之前如將率舞天下稱述兆人歡慶昔者周因征伐而獲漢自祭祀而臻比今無為宜有慙德臣某幸逢昭代獲睹元功欣抃之誠倍百恆品所守有限不獲隨例稱慶闕庭無任屏營踴躍之至臣某言內常侍吳承倩至宣示臣淮南節度使陳少遊所進白野雞者臣聞聖法天以調氣天表聖以呈祥皆啓迪皇猷發揮至理事均影響必在感通伏惟寶應元聖文武皇帝陛下德合太和化高前古休徵異瑞以月繫年方啓率舞以來儀豈俟重譯而作貢臣謹按瑞應圖云王者仁聖旁流四海則見又云祭祀不相踰宴會衣服有節則見耿介之性自能馴狎綷雜之姿翻然純素玉立丹檻雪映雕籠時和自叶於休祥天意實彰於變化豈越裳之獻獨美於前王而岱宗之精用呈於今貺必然之應幽贊如斯載表大平之符克明柔遠之德臣謬參樞近獲覩鴻休慶躍之情倍萬恆品臣某等言臣昨二十三日中書宣武軍節度使臣劉彥佐進白烏并以烏及所獻圖示百官臣某伏以殊祥絶瑞有應斯歸絪縕感通難識其眹惟聖德動於皇天天意勤於聖后則必昭彰月人丁蠁靈物薦臻流行葦之仁樹太平之業毛羽遂性禽鳥呈祥臣等中賀臣謹按孫氏圖云王者宗廟敬則白烏至又漢成帝時白烏集於文武廟黑烏皆從頗類此圖去年冬十一月履端之始陛下擁萬國驅百靈祀圜丘封天老前一日巳孝享於宗廟盡敬致美竭力精誠悲感之音動於列辟孝敬之極通於神明白烏之來允答醇至書之史册萬代有詞觀其素彩皓潔丹觜朱躍冰霜奪色龜龍讓輝參五雲之嘉祥掩百王之能事臣等叨逢昌運纍沐殊私親覩太陽之精克叶大君之祉歡躍抃舞手足無從不勝犬馬欣慶之至凡製五言苞含六義近多放誕靡有宗師前件人久在江湖早工篇什研幾甚苦搜象頗深輩流所推風格罕及臣某言當道進奏院狀報六月某日劍南節度使韋臯狀奏破吐蕃五千餘衆生擒大酋官七人陳上殺一百五十餘人收獲牛馬四百餘頭匹器械一千五百餘事者吉語遠及歡聲相接中賀臣聞順實臣道仗順者至柔而全禮為大經無禮者雖衆必敗陛下君臨萬國天覆兆人恩覃於幽微澤及乎荒遠蠢茲蕃醜假息西陲惟天地含宏之心未能翦滅以豺狼貪戾之性輒肆陸梁爰整其師不攻而取此皆降睿略於天上頒明謀於閫外制士之死命得人之歡心所以殪戎如羊破虜若蝨驅彼牛馬獲其侯王威加於殊域武暢於㣥動自然赤山之壤可蹈青海之波可涉必當封土刻石以垂天聲戎臣司武獲睹其慶不勝歡抃之至臣某言臣得朔方節度使李欒牒稱十一月二十日大破吐蕃者千里喧傳三軍快抃臣某誠歡誠喜頓首頓首臣聞天生四夷用別荒服國有二柄誰能去兵伏惟陛下臣妾兆人庭衢六合溟波靜息車軌混同萬里清平三分砥定而吐蕃羶臊醜類狂狡陰計乘陵凍草妄竊邊疆相鼠無牙安能穿屋羝羊羸角徒欲觸藩是以神聖啓其將心忠勇成於士力兵既落於天上虜果陷於彀中箝口之馬僨車而縶者千蹄辮髮之人為俘輿尸者萬指降旗載路棄甲滿野遙知水赤坐想風腥此皆宗社儲靈朝廷決策破碎戎膽振騰天威凡百人臣不勝踴躍臣某未申絲髮謬總旗旌欣歡憤激倍萬恆品所守有限不獲稱慶臣某言得進奏院狀報八月十五日百寮於宣政殿賀修八陵畢伏惟陛下行通神明孝彰天地深懷遠慕嚴奉諸陵台階元臣展敬以祗命甸服蒸庶忘勞而陳力剃青蕪以疏徼道掃紅腐而淨藩園崇固護於岡陵增肅清於松柏漢朝充奉徒見其遷人魏時向望空聞夫作樂方今大禮彼實缺然天下臣妾不勝幸甚况臣名編竹籍屬忝葭莩感慶之誠倍百恆品伏承順宗至德大聖大安孝皇帝奄過山陵率土臣庶不勝號慕伏惟陛下孝思天至祗事薦誠精貫昊穹禮備園寢攀號罔極聖情難居臣謬列藩條限於守職不獲奔走陪慰內庭無任感惕兢越之至
