front:
  text: 全唐文欽定全唐文卷五百三十九楚字殼士燉煌人自言十八學士德棻之裔貞元七年進士元和十四年纍遷中書侍郎同平章事穆宗朝罷為宣歙觀察使敬宗文宗朝歷宣武天平河東節度使大和七年入為吏部尚書轉太常卿進左僕射封彭陽郡公開成元年拜山南西道節度使卒年七十二贈司空諡曰文子綯貴纍贈至太尉
  hash: sha256:2c2d63ef5cca6a641650cc6cf584b9db390133b00a71e47ec8f6a9e5a011d462
