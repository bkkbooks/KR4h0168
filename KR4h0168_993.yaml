front:
  text: 全唐文欽定全唐文卷九百九十三闕名三十四
  hash: sha256:4e1f9baa171ed97543b6ca3dd2e7da66ce368da4ab524d2885e4398830192b19
body:
  text: 君子進德修業以佐時哲后求賢審官以成務有才無命賈問鵩於長沙其闕二字貞闕二十六字令則闕二字程昱既卒雖增車騎之榮劉毅云亡徒表直臣之禮死而追贈何補衮章不其悲乎闕二十六字景允於戲后稷克播靈苗承積德之鴻休藉基王之茂緒周封孝伯因受氏於狄城孔闕一字門人闕二十五字風术息魚羊擾代龍馬浮江九州幅裂四溟板蕩樂平公出將入相豹變於秦庭闕三十四字事炎方虎賁屈潘嶽之才坐悲秋興曾叔祖湛魏平西將軍臨邑子齊闕三十三字動澠池鄧艾專征卷懷庸蜀建旟作牧首登循吏之科開國承家俯入功臣之闕三十三字吳坂父孝緒唐行軍總管大將軍金紫光祿大夫尚書左丞使持節汴州諸軍事闕三十二字兵略地傅長虞嚴持左轄八座澄清蔣子通常侍乘輿萬機宏益六條出守鎮梁國闕二十九字明月公即臨潁公之第五子也龍章鳳姿地靈天縱神情秀發則白日雲開闕二字達權闕二十九字體物居多黃絹之詞敬業樂㣥早茂青襟之譽起家以國子明經擢第補東宮內直闕二十二字授鄭州司兵參軍兼鄭王府兵曹參軍漢川南紀總録衆曹鄭國東門職司鍵閉闕三十一字國之封降彼親賢守茲狹隘大開藩邸博訪英髦闕一字授闕二字梁州都督府録事參軍闕三十一字咸坐君不與焉豈惟魯國憍親每慙田叔汝南人吏常畏范滂而已乎俄除越州剡縣令闕二十八字華州鄭縣令竹箭長瀾浸於關輔蓮花峻嶽鎮若都畿祖恕之理宏農唯聞惠愛陳稚之闕二十八字拜周景之題輿御王祥之別乘屈汝潁之高節通理譙都振海沂之康歌來清僰道若乃闕二十六字有山蠻之侵盜更相劫掠久患兼并為官擇人非君莫可即除夔州都督府長史州府軍節一闕二十三字而猛獸懷仁諭沸鼎而游魚知懼招集亡散戶口日增敦勸農桑京坻歲積兊攴攘闕三十一字我有餘美既而朝廷藉甚璽書優洽坐望公車佇登廊廟豈謂祆延二豎夢奠兩楹遘疾闕二十六字有同朱闕一字之亡郡吏闕一字攀更甚莊遵之死天子行魏文之録舊考周禮之易名贈使持節卭州諸軍事卭州刺史闕十六字肅恭成德柔順居貞鳳皇于飛生享從夫之秩蛟龍既沒死偕同穴之榮初封太谷縣君追贈太谷郡闕二字乃以載初元闕十五字禮也惟公生而闕一字明幼而好學有黃童之俊逸世號無雙有顏子之庶幾共推知十容儀端肅識闕一字虛謙闕二十二字之材抱干將莫闕一字之闕一字方欲弼諧王道闕一字亮天工作神化之丹青為聖朝之元凱豈知闕一字隨有命州闕二十一字但見生祠張訓其亡空優死贈嫡子故中書令尚書右僕射贈司空梁國文惠公明謨光於帝道至性叶於天經痛闕一字宣闕十四字塋月偃平皋得仙公之宅兆以為岡巒起伏雖封白玉之棺陵谷遷移須勒黃金之碣頽齡溘謝誠願莫申有孝孫鴻臚闕一字卿光嗣闕十四字合宮羽居喪有滅性之酷惟孝將成父之志見何闕一字之羸毀孰不哀憐頌陳實之闕一字猷吾無愧色乃為銘曰周道闕十六字裭彌邱賢子哲儀實知禮義存載籍山為巨儒志在宏益其一秦推樂平魏得安成伏波曜武臨邑持兵時逢喪亂運偶闕一字橫經闕十四字名其二司馬建安降年短折散騎常侍匡時仗節武帳前鋒文闕一字左轄勘濟㝢縣肅清朝列盛德延鍾克生俊哲其三欽惟雅量江漢闕十二字曳履朱邸抽毫聲雄總録望重諸曹非君作宰誰與操刀其四剡本吳縣鄭稱京輔銅墨外臨宰絃內闕一字政成飛闕一字澤及時雨闕一字若黎闕十三字其五東臨睢渙西陟岷波方勞刺割載穆康歌青江灝漾赤甲嵯峨賨渝始附寇盜仍多微我君者孰樂安和其六克播闕二字曲成闕九字美闕五字釐百揆祆鵬來集臥龍不起一歎頽山長悲閲水其七恩覃死贈禮闕一字哀榮冥寞同穴昭彰易名闕一字烏闕四字佳城闕十八字其八伊昔曇花未出庸詎知寂滅之名覺日猶闕一字曷嘗識苦空之相闕一字夫金儀下降含靈闕一字淨月之光寶教旁流闕二字受元雲之潤三車闕一字駕火闕化工闕三字香不息所以化身周流於剎土神足遍闕一字於塵沙或十大聲聞駐形闕一字里一方菩薩納景凉臺觀闕一字背嶺以宣慈清辨赴闕未掩白足闕一字游佛法之美翠塗丹闕一字咸闕一字王城之舍蓋利生闕一字道稱境發緣若不人闕一字共符闕一字能使諦幢高建者矣今此醴泉寺者是宋齊闕經文師即闕二字身之菩薩闕一字遊神境來届茲山棲託巖阿聿修禪寂以為此地元武之分青龍所憑闕二字首以開疆據天齊而劃野却闕尚父之闕一字居九合一匡齊桓公之霸國爾其常白山者乃摩天闕一字地暗映蔽虧抱泉石以娛神出雲霞而養性山毛地髮名花將軟草連芳闕此人闕二字繪闕二字形勝闕一字建招提自後七級崇圖闕一字起舍佉之構五層峻闕重標戴勝之門海目山亭妙相殫於變態虹梁鳥革大壯闕綴闕一字霞闕一字綵畫闕二字麈尾闕二字香闕一字水調八解之闕一字風闕一字五音之說息心之輩見流注以超升回面之徒仰幽關而悟入時逢闕一字卷代屬闕金林玉闕一字寥落幽巖我國家灌頂四天纂圖千帝以佛乘為象馬用道品為城郭八方起塔闕二字遺形九闕一字聚鹽情殷闕於闕一字廟闕二字佛並闕一字此精廬闕一字通堯日三齊俗姓向梵境以翹誠四履闕一字昌仰釋天而矯首又屬中宗孝和皇帝龍興漢道入天經闕互周法界去景龍二年歲次景午爰有齊州正智寺都維僧仁萬俗姓李字道寂慨茲隳墜抗表興崇天鑒至誠特賜名額參校闕一字應建闕否而還泰山靈掩以重開法俗歡康人神舞悅初師之行進表也夢乘船山上及翌日赴朝斫削無礙豈非興廢默定通闕一字懸期故能闕俶東上將欲赴州闕二字三藏義淨法師各代高僧天下重德先奉敕於大薦福寺翻超經律以闕四字觀此勝緣闕一字城在東倍增闕四闕一字降靈五濁德闕一字人天之表名揚宇宙之間聖應難闕一字神功叵測及將命星發載達京闕三字香緣天闕二字臨闕二字時方闕二字令揚闕二字代傳身闕二字輟絃歌歲闕三字即以二月八日親率合境老幼大會新寺表慶天恩又於靈廟之前尊卑就列雁行齊聽闕魚貫闕二字其令乃忽見有醴泉流闕一字修廣三四尺深淺三尺餘色淨味甘爰符瑞典挹酌同飲咸覺蠲疴豈不以闕一字福闕一字圓三靈允答光揚寶闕一字滋液金場故闕州闕一字上聞聖情垂感有敕改名為醴泉寺仍更抽入冊九僧住持行道自元波再委碧題重開日殿赫而枎升月宮華而桂滿若乃闕海精勤以齊深戒月澄空闕二字密霧禪燈焰室巧避輕風濯闕一字路之龍津洗毗曇之鳥眼長袪五住遠效四心刷鴻雁以飛雲轡闕捨生之地續柱闕二字有情根闕一字之方闕一字鳴金鼓樹功不朽流福無窮斯並先帝之本願莊嚴法師幽贊威神之所致也又師遊戲生死示闕儼如親對即平時所將黑犬亦絫具例闕一字厥闕二字無願不從乃至有患心痛者但取廟前少土和水服之應時便愈遺形是託神靈保持由是闕梁寺久傳師本俗姓朱氏金城人也少出家闕一字京道林寺僧儉法師為和上業存禪闕一字長闕一字始初漸彰異迹居止不定飲食無時長髮跣足每闕詞同讖記言不虛發應驗如神或闕一字視通於北都分形遍於南國奇怪忽恍不可殫論以天監十三年歲次甲午十二月八日闕一字內闕相奄然示終時有異香百闕一字芬馥特敕厚加殯送葬於鍾山獨龍阜仍於墓所立開善精舍敕陸倕製銘於冡內王筠勒碑於寺門闕化生及其去也以精靈度物哀憐庶類福祚皇王且彼託鍾山此依常白彼葬龍阜此瘞龍臺前王挹風建開善於墳側後帝傾景闢醴闕至今大唐太極元年歲次壬子皇帝御天下之三載凡一百九十九年化化之緣古今無盡明明之德日月彌新其所變現之梗概猶闕之闕一字衆所未諒恭敬者隨時受福疑慢者應念立徵事迹繁夥不可備載當嘉聲上徹先帝令左臺監察御史于務先親加檢覆被繡闕八正所以知歸一屬昔緣獲未曾有以後復命倍沃天心刺史楊元禧分符北極露冕東藩靈雨逐於行車仁風隨於轉扇黃金捧闕墻新法城追象闕一字於上乘想闕五字不翅絣繩寶地助動天宮薦瑞香園延光帝載縣丞主簿縣尉闕一字含章闕一字學行道入闕一字俱齎財集闕以闕二字㣥物揚舲彼岸録事闕一字宰鄉闕一字等門滋蘭畹行擢檀芽忠信滿於州閭因果達於古後被命委闕二字奉闕三字隨攜朋闕暗闕一字大地荷於津通貝樹根春帝王之遺文秩矣金闕二字界諸佛之正道通矣迷津闕一字路菩薩運載之乘行矣齊闕一字短闕一字衆生趣入之闕範况元天大造充溢於盡空淨域鴻緣牢籠於無外昔迦葉闕一字下如來垂讚歎之鴻彌勒堂闕一字善財表歌揚之偈若稽古訓式樹闕一字碑仍於闕遂銘曰羲天兆昧優花未披但迷五蘊孰辨三伊厥闕一字火宅耀我金儀神足繼軌闕一字子揚蕤其一闕一字有闕一字成觀方擇土載表靈闕一字旋開闕網燬我寶地壞我金場花殘鷺沼煙輟龍香霞標歇滅石徑荒涼其三萬㝢乘皇千齡纂帝日月連璧飛行闕一字契比念新闕五字高梯闕精標五門玉墀俶感銀闕一字輿存其五欲赴天泉闕一字規國德寄誠墳廟傳詞翰墨瑞醴通流嘉祥允塞重光佛闕二字題宸極其六紺軒加飾闕一字盛闕沙其七先帝聖靈聿資神境冥扶默贊分形散影既墓彼山又墳茲嶺寶鐸雙振金繩其炳化變新新真身永永其八初闕一字泉佛時闕三字天闕一字降闕宣聞諸典故鐫金鏤玉道該緇素式讚元猷爰闕一字淨度勒像賢劫刊碑覺路其十闕也肇自石樓東鎮守封司地之班金冊西符啓命將軍之秩雖闕師中尉總南宮之禁其或膽剛如鐵操潔明霜酌龍豹之神韜闕榮名溢寰海功埤動植其誰由然哉惟大將軍吳公諱文字才闕大夫行內給事父節皇朝金紫光祿大夫行內常侍七貂闕之德是使金鋪接慶玉璽承官長㦸棨於司宮高門聯於寺伯公闕雅局就於孩年量轉奇規英斷裁於稚齒源之乎鵬之為鳥不飛闕法勵已荷公不私補過諤諤於宮闈匪懈兢兢於夙夜闕勞撫公以秩授公文林郎適舉從班也公謹密居體謙光潛旨問闕之賞非公而何冬十二月又制轉公右監門衛大將軍建闕宸神龍三年又制轉公鎮軍大將軍行右監門衛闕社固以鋒交衛霍權衝田竇橫虎步於朱軒跪龍顏於青闕土之祿敢對揚天子之休命也唐元年又制進封闕之冊三階應歷八命騰遷持大義而不可奪保元勳而若無有則闕皇上欽腹心之寄也公平均七政恭踐五朝樹德務滋循躬闕成修乃奏乞骸骨身歸常樂詔許公焉尚書謝病非無給闕彩窺四序之留難秋蓬颯飛收百年之卷促賈長沙之憤結庚鵬闕呼維公開國承祉正家崇秩葉嗣傳於紫紱鼎胄曳於黃雲元戎闕魚之行乎大壑其量府也黃金白玉兮滿君之北堂其賓賢也虬闕風軌物傑臣飛將其在公乎夫人恆國李氏圓姿替月潤臉呈花闕七年十一月十二日先公而殯公以開元九年十月草三日循窆闕落松扃金雞鳴而春不曉玉犬吠而秋以暮瘞將軍於地下意氣闕臥於平生窞帳殊於窀穸則公夫人之顧命願不合於雙棺焉於闕議大夫行內常侍上柱國處行明姿鑒俗謹身從道元方長子高闕郎行內僕局丞上柱國升行及厭塵滓開心大乘出俗網之三災回闕庭局丞騎都尉處昂等並痛切終天悲銜眥血雖復合庭花萼聯闕五色詞騰七步王公在盼聖主承知夢八門而出飛屈五闕闕神出自天秀蓋非常人復禮由已依仁立身舉圖橫海公乎動鱗闕有圭詩徵孟子相舉王稽南山之壽崿立其齊西山之照不意全闕伯銘金潁川故事遵揚德音杳杳藤槨青青柏林旌勳表頌孝子闕道本無名名生闕一字物而聖本無蹤跡者闕二字存闕一字惟闕二字所以能明闕二字理盡乎妙有矣夫惟得無所得能知合闕四字名闕二字以此進為而混俗功大名揚而衆仰以此退居而間遊江海山林之士伏其孰謂也尊師闕八字又號齊物闕一字城人也曾祖皇隋任洺州司戶參軍才器過人德行殊衆祖楚皇任房州上庸縣丞詩書傳闕一字文詞宏達乂問養闕一字邱園優遊卒歲尊師幼而聰敏性與沖和真相霞舒挺骨嶽立年十三神龍中有敕士人誦經入道配養臺觀既慕神仙之術託作求真之遊遂詣中嶽韓尊師受洞神經法便居勞盛山五載仰其道也至開元初又詣柬嶽任尊師受洞元中盟八景之要便居泰山日觀臺十載已外物矣時遇茅山任尊師遊山見而異之曰此道覺也遂授以靈飛六甲豁落七元八籙祕新文大洞真要仍傳養生隱訣自後去粒服餌吐故納新人貌而天乎又詣恆山居大火焰峯三載至如九丹祕要三洞經法皆成誦在心如示諸掌至開元四載道門威儀使奉玉真公主教請詣中嶽興唐觀校定經籙道高物外跡寓寰中聲聞於天名著非我至天寶三載有詔尊師德行純和尤精科戒請住西嶽雲臺觀上方太清宮至五載靈昌郡道衆等竭誠勤請願傳法要乃闕一字日齊心潔行以祈宏益道不凝滯亦在流通遂於瑤臺觀場壇廣闢天地肅清授真一經法金人玉檢始以要盟龍章鳳篆終焉授與道衆謝天建黃籙齊以祈靈應其時白鸖繞壇綵雲浮座祥風肅起異香遠聞見者皆言尊師精誠所感也至六載玉真公主已捨館陶之封卜居平陽之洞以為常娥餌藥乘兔輪以長生嬴女吹簫登鳳樓而久壽遂於仙人臺下建立山居既饒靈芝復多仙草有教安置旌至德也七載又奉教東京睿宗大聖真觀奉敕修齊理藉清高副國誠命初闕二字道闕三字功威儀設而闕四字行而儼若爐烟晝啓瑞色氤氳燈炬夜開祥光熻赫都城士女觀者霧集莫不讚闕一字稱闕一字曾有闕一字八闕三字記云尊師時年五十有七閏六月草二日無疾忽曰吾本入道志求仙也所望華表御鶴白日升天今上聖有命我欲辭去顧謂諸弟子曰方生方死方死方生死生一理汝勿憂也其日申時復有異香入院左右莫不聞者至夜半寢於靜室奄然而絶當其炎暑容色鮮輝手足柔和一無改變門人號躃行路傷嗟以為尊師厭世而尸解矣以七月十七日遷於尚書谷之東埠禮也闕二字時則變易物經長久彼堅者石可以刻雕彼言者文可以傳人匪文匪石後何觀焉有弟道士曰齊莊鴒原永懷式昭至德銘曰天長地久兮物則虧盈陰化陽施兮有衰有榮達士所以肥遁居貞得道可以齊乎死生吾師仙化兮神遊上清寂兮寥兮可知其名千秋萬歲仙臺之下蕭然惟有松風之聲塕鬱之地闕五字也觀光之文闕二十字衣冠之祚闕八字鄭公之謂焉公諱曾字景參滎陽開封人也胙土命氏則本闕七字盛闕十一字則子闕一字勤於京師奕葉闕三字名不隕烈祖撝隋尚書右丞聘陳使永安侯大父嗣元唐通事闕四字明叔考九思闕二字豐城縣令闕一字茲純嘏闕二字昭闕一字懿闕二字世闕一字公上承丕緒闕一字襲纍業初孩鍾隴西大夫人喪及觀號嗄殆至闕一字絶闕四字性孝闕一字根闕二字登闕四字為闕一字名以紀其異少而遊藝長善屬文闕四字高第寧州羅川資州資陽縣尉施於吏道峻以清節闕四字窮憂泣闕一字過禮闕五字數感容若不勝哀服闋授博州聊城闕一字州闕三字縣丞每在公家必被誠績遷闕一字州黎陽滄州鹽山縣令蒞爾邑懷斯人闕三字化政闕三字改闕一字州闕一字事闕五字肅之道無言闕四字一之規不令而知信禁暴撫瘠貽惠樹風闕四字俗不忘矣河南尹李公闕四字之闕六字於是闕一字以闕一字使功闕一字勦闕五字成不闕一字素吏人建碑表闕十一字降璽書加朝散大夫懷州闕十字刺史闕四字州閭闕一字理興務人闕一字發明典制糾剔瑕慝酌之闕八字布闕一字悌以闕一字其情敷靈和以導其闕二字清而闕四字而闕一字忍下闕十一字景命介以維祺而移疾還闕十字春秋七十有三闕一字歲也歸葬公於滎闕一字北原夫人贊皇闕一字君李氏闕七字德闕一字公闕二字祔焉闕一字也公體闕十一字學含章以挺辭醞藉風裁周旋楷式凡闕一字朋執洎於寮吏闕六字不闕四字郡州闕二字遺闕二字跡流於闕十一字循良之化潤於國風仁其心物無弗親闕一字其分道無不洽福著而應德闕一字而彰闕一字有闕二字之法濬流之長高門積慶繼闕九字者也長曰長裕國子司業閎量貞密直方周慎名高雅望學入精微次子闕二字歷闕一字部郎中中書舍人鴻臚太常闕一字少卿闕三字侍郎闕二字薛伯器標公輔圭璋之特秀鉉翼之良材粵十有七載闕五字駕謁於園陵闕九字泉壤制以清官五品已上父母追崇爵位府君贈光祿闕一字卿夫人贈趙郡闕五字飾闕三字重慰法河之列比闕八字著資父以闕七字繼志松楸闕一字茂闕一字傳相闕七字永闕五字升卿闕二字禁掖接侍闕一字墀闕二字之闕三字碑闕三字言非變豈逮辭林之旨學古闕七字作闕一字揚前烈闕一字鏤遺芬其銘曰懿懿惟公承國於鄭門閥濟闕一字軒裳表盛闕七字性闕一字學闕二字清方允正闕一字以從吏歷職樹聲闕六字維闕二字政闕二字作藩扞城化俾有程人胥用寧謂我晉域聿來闕八字有翼闕十一字福二子闕二字皇恩贈寵神道榮哀上延海署下感泉臺闕八字令闕七字君子之事上也進思盡忠退思補過所以慎其初也不為義疚不為利遷所以成其忠也有始有卒往哲所難彭城文公韋府君庶斯道矣君諱湊字彥宗京兆杜陵人也翊商命族佐漢傳封龍旗承祀盛業百世曾祖諱瓚隋倉部侍郎司農少卿尚書右丞南皮縣伯開皇中受詔監河漕之運以實關中利國濟人名書隋史祖諱叔詣皇朝薄州刺史員外郎散騎常侍庫部郎中貞觀初奉使招夷越之酋以清嶺外息兵殷土事具實録父諱元福永徽中為城門郎為外姻所纍貶授桂州長史贈潤州刺史清風克紹盛德難名育道儲祉以貽後嗣君承積善之休烈光膺太和之純粹文學政事懷適時之異材孝友忠貞稟過人之至行永淳元年解褐授婺州司兵參軍致遠之漸發於初筮延載元年授資州司兵參軍廉察使房昶覩君剖斷之跡嘆曰鸞鳳棲於枳棘豈惟有司之過亦使車之所急也於是狀其殊績上表聞薦俄拜揚州法曹參軍繩愆糾慝正色無私志在澄清豈避強禦長史清河壽潛悉以郡事委焉大足元年授上方監丞尋加朝散大夫轉相王府屬兼通事舍人時夏官尚書姚公兼王府長史嘗稱曰韋屬識見宏達文彩優詳恨相知之晚也長安三年遷職方員外郎神龍元年轉兵部員外郎歷職方司郎中長安令遷將作少匠仍兼通事舍人景龍二年轉司農少卿三年除貝州刺史其草奏也必因事而作程其敷納也抑有儀而作表周行之譽久而愈芳既副象河之縈遂光分行之寄景雲元年復入為鴻臚少卿仍加銀青光祿大夫二年轉太府少卿兼通事舍人節愍太子之追諡也君謂有死不校太子之道苟弄兵而不誅雖銜命而難宥申生以遇讒自引考行為恭衛據以擅命出奔易名為戾以今方古斯為甚焉於是抗疏論奏明言至理仍於軒墀之下對仗自讀睿宗瞿然悚聽仗下後引君入閣賜坐再三詢乃令與執政議其可否僉以為恩命已行難於返汗惜遂事於已往知讜言之在斯所謂有犯無隱臨大節而不可奪也初神龍之末恩踰賞僣氛祲既清府庫猶竭時議興造寺觀土木競起役人不時上書切諫疏奏未報昌言固爭上悟其忠竟用嘉納乃詔有司量事節減息人省費動盈萬億君前後所論郊廟大議及時政所急凡數十上多見録用或編於甲令或載在策書仁人之言其利溥矣先天中又歷陝汝二州刺史陝服汝墳境壤相接惠先道路二郡以安開元二年遷岐州刺史屬鸞輿順豫大搜岐下君徭賦均平儲峙簡約牲餼烹飪不徼賞於珍華屝屨資糧不取悅於餘羡闔境無擾人到於今稱之四年遷將作大匠六年充東都留守八年遷右衛大將軍上謂君曰皇家故事諸衛大將軍共尚書交互為之近日漸貴文物乃輕此職卿聲實俱美故暫用卿以光此官勿辭也九年正月遷河南尹纍封彭城郡公十年以屬官有犯出為杭州刺史十一年轉汾州刺史其年又遷太原尹仍充太原以北節度大使北都留守河東道支度營田大使併檢校北都軍器監操節鉞之寄慎守禦之方師徒無勤邊鄙不聳雖李牧之馳名塞下魏尚之善守雲中無以過也上懿其績手詔勞勉錫以時服恩貺屢降及遘疾詔遣尚藥奉御宗處馳傳診療粵以其年十二月九日薨於太原之官舍春秋六十有五詔書故太原尹韋湊體識沉正宇量淹通立德可師宏風自遠纍居中外克著聲績而大耋不永昃離俄謝興言感惻用軫於懷宜洽寵光俾申榮贈可使持節都督幽州諸軍事幽州刺史物一百匹米粟各一百石給靈輿遞還葬日借幔幕手力太常諡曰文禮也議者以君忠肅恭懿寬仁信義揔虞書之九德並孔門之五美而不翼亮百揆光昭三事蓋以滿盈為忌謙讓辭避不然豈才不適而命不至道不行而時不利也先夫人范陽盧氏刑部尚書從願之妹也輔德正家克循法度載誕元嗣無祿早終繼夫人隴西李氏長安令綰之女也能繼徽音以享偕老初尚書盧公以親懿之故式瞻景行將有刊述以紀嘉休既而鎮撫汾澮澄清梁益軒車載轄是則未暇及入護儲闈而辭疾歸老事竟蹉跌斯文不就天寶八載府君之嗣子尚書右丞見素痛霜露之滋深懼英華之易遠於是徵究決諒詢謀宗黨託詞瓊瑤以揚事實伯喈之頌敘長源於厥初考甫之銘垂儉德於來裔其詞曰粵我初諒以德受氏黻冕軒裳世濟厥美辰象吐秀山川叶祉實生文公克纂先祀入孝出悌抱質懷文雅操有素清標不㣥志惟詩禮業在邱墳如玉之潔如蘭之芬發跡州郡飾躬以進既登省闈體聲益振守以恪恭不忘畏慎有犯無隱詞直而順象河是副功宣亞卿建旟受委遂典專城政存簡要德著仁明是則之美時惟尹京揔戎軍政彼汾之澳卒乘輯睦戎夷悅服永享惟老受茲戩穀天不憗遺遽終百祿哀榮式備詔葬言旋宅兆斯吉光陰屢遷巖巖終阜泱泱渭川刊石紀德於惟億年初有適越者請觀南方之樂主人為之歌馮賓曰遠矣闕後衰而復起一飛沖天伯服有子不在外其為中貴乎不在闕馮之先有自北而南者自宋懷化闕一字業以至於盎五嶺之表推闕子智戣為高州刺史智戴為恩州刺史智代王為潘州刺史咸有德闕襲位象賢闕一字禮主祀守封且有舊章斯為代祿使有輶軒闕一字察者闕天子廣錫類之恩覽先賢之狀初贈潘州刺史又贈廣州大都督闕侍玉階則天矜其覆巢知必成器選內官而母之命進侍以闕窺大寶不利王室已成禍梯元宗赫然提劍而起公實勇進闕卿宰臣因以決事中立而不倚得其君而不驕順而不諛諫而不犯闕也公弱喪之日太夫人滯於南荒服遐陬晨昏問絶折葼之教闕而至稱觴拜慶兄弟雁行自閩徼而就養闕一字城當代罕有終堂之闕官卑乞回所授上允其請時議稱多君子曰此所謂事親之闕車駕幸三山宮天子講藝呈材威戎夸狄有二雕食鹿闕飲羽而片雲徐下壯六軍而增氣呼萬歲以動天英主愜心闕而平之臨大事而有大功皆此類也歷闕一字教博士內府令朝散大夫闕首為監遷冠軍鎮軍輔國驃騎大將軍開府儀同三司封齊國公闕使歷官受任五十餘年從蒙塵闕二字梁闕二字法駕歸長安一心貫闕可得而聞也上闕一字初避闕一字請出闕五字臣之心常在魏闕闕朗州龍興寺享年七十有闕四字之喪至於滅性斬剡之痛何闕陪葬泰陵以寶應闕一字年四月闕二字日安厝成其志也夫人呂氏齊闕而不遷嗣子正議大夫前將佐少監南海郡開國公承悅禮謂猶子闕旅有奉孝謹不闕二字刊貞石之文用紀闕一字陵之側大君有命俾闕惟公之本南海闕三字得藏闕一字家傳擁旄有馮之後遂育於高惟闕惟公之貴出入闕一字宸宮闈父事階陛日親歷載五紀奉茲闕惟公之孝達於神明板輿萬里自越徂京爰定風樹備其哀榮惟公闕勳會合風雲寇盜闕一字命戈矛闕一字紛一麾而闕一字克定祲氛惟公之節淩闕荊巫二聖晏駕長號鼎湖哀而遂絶痛入黃壚惟公之葬泰陵闕金光照和尚者其先河南府澠池縣人也俗姓李氏年十三出家依於新安縣寶雲寺主靈粲為師至年十九入洪陽山祖述迦葉和尚伏勤三年猶如一日可謂衣不解帶布褐遮身殘形毀容勤求至道和尚謂曰道常無為而無不為佛常無應而無不應守斯守一勤則居三雖恆沙異名隨緣爾化而彼岸同體感物從權且清涼山者諸佛之應化也衆生緣重爾可住焉師既親受言教來至汾州洎寶應中遇姦臣凶動戎馬生郊師阻難中未可前路乃回入馬頭山經姑射山又轉至檀特山六年居山事慧超禪師誓願苦身以崇至學每興重願以救蒼生志在山林祈無上覺禪師知其願重乃命速行轉至屋党山下院師於惠悟和尚咨參至理又聞方山純達禪師德行清高名譽遠徹既至其所禪師一見乃問師從何而來師曰從無所來禪師乃接以微言豁然啓悟乃知衆生即佛佛即衆生三界圓通惟一心耳遂住嵩山經於三載禪習為務守戒為常每自思曰臺山之願竟未心屬我國家聖德廣運日月照臨功高百王業濟千古至唐大歷二年方達五臺山於大華嚴寺萬菩薩院安止其日忽雷電交發雨雹駃飛師乃駭心默念大聖俄爾晴霽倏覩白光從臺飛下光中千佛嚴麗赫然師涕泣交流舉身投地而為作禮比至舉首忽然其前湧出高樓十丈有千葉花座而以盛之遂見諸佛舒金色臂三摩師頂告師曰爾從今已去應名金光照耳諸佛令師誦金剛般若以為恆式言訖忽然不見師心內喜躍感悟良多翌日禮辭寺衆遂詣祕魔嵒幽居進德日有所新後又自西臺忽雷風暴震飛電注雹良久雲開谷騰黃霧倏忽之間千變萬化師一心瞪視誓求佛果應時和風清暢雲霧競湧忽見維摩居士普賢菩薩文殊師利師悲泣禮拜忽然不見又見二童手引師直詣臺頂見二如來淨如琉璃內外明徹紫光蔽日白氣浮天遍滿山林盡同金色同行伴侶罔知厥由後又詣東臺那羅延窟遙見三僧乘白雲湧出至前便隱又至夜三更已來忽見窟前樓閣層峙天樂嘹喨至數日已去往祕魔居止六載後繁峙縣令呂才俊堅請至縣虔心供養後代州都督辛雲朝聆師之德望差指使迎入大雲寺居止為首廣興佛事後不知其所終云耳上闕人為之受命瑞影搖彩嶽瀆所以降神昔周文王有大明嗣太王季闕祖諱華雲中人也永西伯之苗裔大魏之後宇文之別緒以金城闕俞自武德中詔府谷鎮遏使不改善政永闕子孫黼黻闕之榮闕能不施勞於民不伐善於已慷慨闕以魏孝文皇帝草七代之孫也世襲家聲勳庸不闕昔先王之顧命巨唐之芳葉爰因忠烈為唐允隴西氏焉所謂闕若作席上琳琅人間柱石鹽梅麥曲糵闕不謂臨危致命不顧其死見義有勇無懾於闕獎式義方闕不可奪也闕可稱也不以私誣義罔以虛眩真守金石闕為府谷鎮闕持戎醜疆境之內民無雜居杜烽戍之虞闕尚書兼御史大夫考績闕庶政增以厥貢良驥可千乘與部族歸榨蠆之地黔黎有豐年之詠闕昔先王求枚嗣祚也以前闕乾符歷數闕元凶闕不敢以懸河之口辨無不對當進賢任重為黎先行闕欲移勳列爵未足稱闕吾懷何如闕其德不回馳驛闕於雲闕之然將明命於闕王覩之奭然曰虜延深遠闕危闕雖鑒中利刀丶闕當今晉王感公有大忠於王室有大闕駕為闕溪上氏闕祖媵之禮也而乃衣錦桑榆顯榮也先世聖唐之瑞派子子孫孫引無替之道也俾乎黻冕金行勳業惟新敷五教以在寬闥六條而彌政稼穡有通歧之詠庶民無聚斂之怨公下車之日觀人多闕斃褰帷撫問愛如已育遂乃布驅雞之善牧馬之政聆風嚮化繼至闕纍降名綬加闕陰功罔效闕靈山嶽其年冬末有二日享齡五十終祿於麟郡焉噫闕永有闕為州闕之譽闕趙宣子郭伋闕有子五人長曰從闕軍使次曰闕軍使次曰從遠動合楷模闕府府州副使次曰從依攝麟州司馬檢校尚書祭酒兼御史中丞次曰從闕祖塋之左右授機應符契運叶瑞來儀清風朗月孤高不㣥口無擇言哲中尤哲賢中又賢巖谷歸神昆岡熾焰玉石俱焚闕矚俯眺闕封樹諸子舁下闕上闕司拜殿中侍御史四遷闕一字中書舍人歷工闕命至右補闕主客員外郎有高文至性不幸闕乃纂集其文刻於左方以備遺闕禮闕二年土壤咸闢三年家闕於室變邱墟為閭里散災祲為和闕車闕二字十省其五郡邑資儲三蠲其闕取以歸揚子七縣之衝也列為小闕逾周月如有二天化洽數州闕相闕一字國作旱歲之霖令公闕不言而衆事舉正色而㣥心服邊鎮闕江闕二字刳木為舟用五行潤下之功息闕不疾而速性命之際融正氣以發闕令而闕一字若親臨再相天地之宜三秉闕用置典刑士吏自清乃設堤防禁遏闕大化四流歸朝執憲專贊皇猷闕有闕三字去闕三字年闕三字穀焚蔬人化於公闕五闕一字而人不知公興其教我箱千斯闕精闕二字平政均滔滔蜀江來自天闕明闕二字統闕一字師旅弛張柵戍不戰闕留授鉞又命富人下闕闕拜殿中侍御史四遷中書舍人歷工部闕大夫闕至右補闕主客員外郎有高文至性不幸闕纂集其刻於右方以備遺闕禮闕慶二年土壤咸闢三年家闕於室變邱墟為閭里散災祲為和闕軍闕十省其五郡邑資儲三蠲其闕歸揚子七縣之衝也列為小闕未逾周月如有二天化洽數州闕當歸作旱歲之霖今公闕舉正色而㣥心服邊鎮闕刳木為舟用五行潤下之功息闕而速性命之際融正氣以發闕今而親臨再相天地之宜三秉闕置典刑士吏自清乃設堤防禁遏闕大化以闕朝執意專贊皇猷闕有闕穀焚蔬人化於公闕公興其教我箱千斯精闕政均滔滔蜀江來自天闕師旋弛張柵不戰闕弻留授鉞又命富人闕君諱宏敏其先北平人也自虞承帝録派媯汭之神宗陳恆制齊遂開國而為姓若乃錫土隆家之美贄玉帛於洪圖陳規獻策之謀著英猷於寶牒祖由玉山齊映瓊萼流芳器壘圭璋質懷梓韞劉龍之英美躍管驥之高衢彩匣韜輝金章絶韻詞林振穎筆海浮瀾秀氣烟高靈規聳見貞風概俗徑節澄襟被揚歷而見徵應翹車而入聘隋章武郡功曹父恭藍田孕質驪穴騰輝志岸沖清器該博物雄材雋狀亘孔仞以逾高雅度汪深湛黃波而彌浚名馳刈楚德洽重筵隋高陽縣尉君英靈迥秀壯志遐闕二字韞雄圖蘭風特振貞明絶俗雅道淹通譽駕雕龍聲充振鷺清辭雄辨陵酈子之鄉脣逸氣高談鄙蘇張之緩頰洞該物務統六隧於州邦備曉公方館四人於鄉邑既而奠楹遘孽夢豎延凶寢疾彌留俄傾薤露以永淳元年九月十二日歿於私第春秋六十有四豈謂狼溪掩耀悲隙影之無留積玉沉輝泣清川之永謝以闕二字元年正月二十日遷窆於任邱縣西南五里本鄉禮也其地東連博陵西叩金堤膏腴控其前平林亘其後嗣子務仙嗣孫神傑神沖承族等櫻蓼莪之巨痛陟霧岵而長號扳罔極之哀荒抱霜荼而永泣恐以炎飛岱嶺庶梓域之長存岸谷遠遷冀松區之尚在其詞曰承芳軒胄分裳陳成建邦啓土代襲英聲降生明哲雋乂馳名高軌運流景命乃傾誄生前之茂績刻嘉號於泉扃公諱璿文安縣人也其先漢將李廣子最孫陵並為漢名將即公之始也自是闕二字華轂代代繼出時闕二字祖武父闕一字並優游養閒闕六字公文雄兼恃技藝大善年草七賓擢公闕三字隨其願而闕一字不盡享年二十有闕一字皇唐天寶四載十二月五日寢疾終闕六字名舉未婚而終父母哀其魂孤為結幽契娶同縣劉氏為夫人越十一日合葬於郡州西北二百步從先塋禮也尤恐陵谷遷變刻石為銘銘曰泰山頽兮良木折愁雲凝兮寒泉咽人逾故兮芳聲絶歲將深兮松風切府君諱玉字廷玉本滎陽人也其先因官得地曾祖亮皇莫州司馬祖備涇州四門府折衝王父泰遊擊將軍守左武衛大將軍試太常卿咸以文武兼才應當時之選府君鄉舉孝廉弱冠從事有救世之才軍府推稱以政狀聞於本道時表奏授宣義郎試恆王府司馬權充本州孔目判官吏不敢欺人樂其業時歲儉人饑多盜世亂思理須得其人遂屈充唐興軍左虞候以屏盜賊擒奸摘伏撫弱遏強井邑肅然論功授秩纍有拜遷官至鴻臚卿職竟都虞候自一主局向三十年閭里懷其仁鄉黨服其義犬不夜吠衣錦晝行水鏡居心不假灰者以辨僞臨事明斷有同跪鼠以懲愆衆稱才用無窮又拜牙門將內外瞻矚文武繩準洎貞元十七年旌麾撫臨録侯掩之錫重始終之節賞衣一襲錫馬一匹以其州在關外類之襟帶委以守禦無遷易也鄉人改觀閭里拭目昂昂乎固一時之傑也豈期二豎為災奪人之願以貞元十八年十二月十九日寢疾終於鄚亭春秋六十有八邑悲巷哭春不相杵夫人河間邢氏以貞元二年三月四日先府君捐世享年四十有八銀青光祿大夫檢校太子詹事殿中侍御史讓之孫平昌縣令王蔡之女適配君子義不失於三從奉事舅姑禮乃全於四德為六親軌範作三族楷模德女適人而宜室生男至孝以承家皆夫人餘慶之所鍾府君義方之所教也嗣子惟興等痛乎松檟未樹歲月遄臻先遠有期不敢速卜奉以貞元十九年歲次癸未十一月戊寅朔十三日庚寅祔於州城南二十五里顧義鄉三方之原禮也是日也素車隨紼白馬臨棺雲慘寒天風悲野樹恐陵谷變遷銘以志之辭曰平原四顧兮冢壘壘左枕故園兮右滹水嗚呼鄭君兮來宅此白楊蕭蕭兮莫風起何嗟原夜兮闕三字自有明珠兮照千里貞元二十年六月日清河張公諱曾寢疾即世闕一字莫亭嘉深里之私第享年七十六自屬纊至於移窆朋從親昵闕一字州里士君子無不慟怛嗚呼仁賢之云亡也哉惟公受闕二字黃而分歷代茂盛源流益別公即清河之緒曾祖皇太子咨議郎諱崇祖皇中府折衝諱操父皇太子內直郎闕二字公即內直郎嗣也早歲有節克壯闕一字心拳拳禮容執無倦怠逮夫弱冠遵道秉義汪汪然不可得而親不可得而友挺出常度機略內蘊時薊州刺史御史闕二字榮公闕一字公才最以從事情以道契三揖而進闕二字塞軍營田判官恭儉蒞職勳績明著甄録奏聞受遊闕一字將軍守右領軍衛幽州開福府折衝都尉員外置同正員賜騎都尉公疏勢賊諂心不苟合恬淡為頤年之用視簪組為伐性之具遂辭名晦跡高臥雲物因家於三河邑背郭而東得林巒之勝致也暨乎年逾不惑以長子瓊佐鄭亭侯嘉聲洋洋多歷年數由是閲實觀政巾車以來郡邑清暢禮容大備闕一字釋我願斯不返駕每闕一字人貞闕一字談真空微妙之性探闕一字原闕一字賾之旨浩浩方寸洞豁塵境不其致歟嗟乎大道無涯天命有定雖聖明不能越常運而超物外哉公以疾起無妄情不嗜藥禺禺居易悔咎莫有星歲幾周大漸長往嗚呼天富其道而閼於壽謂之何哉夫人北平田氏闕一字而得禮有子二人瓊等卜祔先塋龜筮告吉以其年十一月一日窆於任邱東北長邱鄉原禮也二嗣號劈痛深泣血哀告以先遠有請以志之宗元承命不忤刻之貞石銘曰蘭茝其馨金玉其貞碎碎拆之何神不明茂旌其英德立行成悠悠銘旌洋洋懿聲孝子念孫宅兆郊原龜筮叶從慶流後昆謹按是文從邑志採出文中有宗元字樣志亦以為柳宗元作然詳其文筆不類且本集未載故入闕名
