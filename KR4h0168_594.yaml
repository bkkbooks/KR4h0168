front:
  text: 全唐文欽定全唐文卷五百九十四仲舒貞元五年進士為雄武軍使張仲武從事
  hash: sha256:6b17b2fdf1e8864e8f254e2ccea049e980a73fafb87a52d26fcd7f9b38a8b76b
  markers:
  - {type: head, offset: 14, content: 吳仲舒, id: KR4h0168_NFKB_594-h1, level: 1}
body:
  text: 歌南風之薰兮肇自前烈美凱風以時兮流乎俊哲淡淡蕩蕩生乎無間馥馥微微播於有截故功成作樂而上下昭著治定制禮而君臣有別吾亦乘日月之至明致中和之令節言而履之萬國稱慶動而法之千寮胥悅此所謂規模帝舜慰洽吾人操五絃之琴而八風從律徵三代之樂而六氣平均使天下霈然而有感窮海外颯爾而知春至於傳之永久垂之不朽可以動萌芽可以榮林藪薰風之有德也使國富以人安薰風之有惠也使時和而俗阜若乃燠佳氣兮允塞掃祥煙兮乍開早綻青門之柳先驚上苑之梅晦入陽春之曲潛吹玉管之灰此亦韶年之麗景况有順時而豐財或披襟而乍對或臨水而輕拂承長養則芳氣襲於一人闡煦嫗則膏露霑於萬物斯以發號施令前規後監三農以之協洽兆人以之無咸如此則典禮備麟鳳至吾道不樂兮發身有時薰風自南兮萬物咸遂物本無情因時而生百姓日用而不覺五音歲兆於未萌儻高飈之借便順下風而長鳴夷亮宰相夷簡之弟貞元五年進士鴻鈞之代兮動植斯慶至德旁流兮潛魚在泳欣藻荇之是依美陰陽之克正載頒其首將同宴鎬之觀不脫於泉自樂觀濠之性極浦風霽澄潭月虛纖鱗繚繞聚沫紆徐或在鮫人之室或過陵鯉之居蓮花東西信可遊而可息文竿上下徒欲釣而求諸豈不以當在宥之時處恬然之水乘灝灝之元氣得生生之至理大信波及湛恩草靡無慮竭澤之災自保深泉之美伊元風之扇物物無細而不沾惟廣運之鋪時時或與之發潛闕時之和兮道之至彼南風兮舒以肆發於地鼓萬物以生成登於天叶三光而能粹豈不以律有度而咸應樂無聲而大備郁郁也從四氣之攸分熙熙然見㣥芳之已遂若乃涉維夏背芳晨蒸人已乂率土惟淳雲物必書識煙霞之改舊君臣有禮知動植之懷仁符元化越洪鈞式觀風於我后終解慍於吾人伊昔虞帝君臨憂勞是切將納隍為已任垂大訓於前烈援琴寫操知庶政之惟和負扆居尊俾含生之是悅然後澤及幽巖九區克咸氣揚湮鬱四海無咈且攸敘於彞倫故無遺於一物國家敬授惟明稽古作程式宣其和以厚其生是以東作之勤不遺於帝力南風之詠屢起於皇情亹亹多士茫茫萬有猶偃草而咸若沐薰風之自久惟德斯碩惟財孔阜方叔德宗朝官侍御史貶江陵掾至矣哉如天之君聲明化淳穆南端而作樂播薰風以養人順聖時而和則氣無留慝解吾氓之慍故物無不親所以應乎品類遍乎天地感一德而當陽處八方之正位使夫微者必扇幽者必遂不以動而有光和而能至風之始也日月貞明星辰齊平然後蕩蕩而起熙熙而生觸類而煦然長育無朕而潛來備盈行而有孚倚五絃而調四氣廣而不費匝九垓而周八紘非比夫抵華葉陵高城轉叢蕙而渥彩合萬籟而成聲者也風之達也本於元首播於㣥有使五福富昌萬物殷阜宜其叶無為之大化匪獨革有苗之小醜亦有廣莫北動閶闔東來不如自其南而掩器一其薰而阜財則知端拱垂黻化人無拂則必合其君資其物豈惟三國不監二叔不咸徒偃其禾而表其讒故我君烈烈行道有截歌祖德而庶事用康諧舜樂而鳴琴不撤被南風之溥暢慰遠黎之胥悅士有欲摶風於九霄希假勢於一挈稜貞元八年進士祭祀上潔精誠克宣伊明水之為用諒至誠以為先積陰以成符嘉應於冥數以鑑而取感無私於上元將假以表敬式彰乎告虔皎皎泛月瀼瀼降天既稟氣在陰亦成形於夜有無雖繫於恍惚融結寧隨於冬夏明者誠也我則暗然而彰水惟信焉吾非倏爾而化徒觀其清霄霧斂朗月輪孤鑒清熒而類鏡水滴瀝而疑珠混金波而共潔迷玉露而全無感而遂通配陽燧之為火融而不涸異寒冰之在壺彼既無情此何有待始同方而合體寧望遠而功倍故能佐因心於霜露均潤下於江海有形有實徒加以強名無臭無聲孰知其真宰是以昭其儉潔其意含水月之淳粹修粢盛於豐備作元酒而禮崇登清廟之誠貴嗤潢汙之野薦陋甘醴之莫致祀事孔明其儀既精無眹而有不為而成二氣相臨本自蟾蜍之魄三危莫比殊非沆瀣之英至道自元而兆醴泉因地而生原夫月麗於天水習乎坎物有時而出故方諸而夜呈事有眹而因故陰靈而下感大滿若沖其來不窮風塵莫染其真質天地不隔其幽通况國家崇儀礿祀薦敬旻穹方欲行古道稽淳風客有賦明水之事敢聞之於閟宮宗和貞元九年進士王者統四時均五則彼權衡之為準驗陰陽之不忒鈎深致遠黍纍於焉靡差稱物平施晷度由之斯得惟權也分其重惟衡也取其平明乎國經固懸茲以垂範掌乎天秩如用茲而永貞衡任權以鈞物權資衡以作程故一人體之以清萬國萬國仰之而庶政以成當其元鳥司分疇人敬授既量諸夕又測其晝盈虛氣等何藉於土圭日夜時分已傳於玉漏莫不同度量以應其時平權衡以叶其候苟順氣以頒節實從時而不謬其功斯博其道式孚諒同均於遠近故不失於錙銖俾稱物者守之無易掄材者持之罔逾皇矣我君康哉神化萬方取則自得於均平二氣尚分無愆於晝夜不然者何以佐璿樞之斟酌調元氣以絪縕申乎舊章孰似權衡之大匪無同異所紀春秋之分齊其重輕等其規矩豈鈞銖之是待在繩準而有取固將平邦國亦以敘彞倫七政惟齊有符乎應天之運百工咸賴實資乎秉國之鈞宜其平域中而齊律度貞天下而利黎人惟正直可法惟中平可均夫如是則權衡者蓋亦考茲義而是遵佑貞元九年進士為淄青節度副大使李師道寮屬師道叛佑抗節忤賊被囚俾民不迷茲器惟則行之而萬象正動之而天下直一人不宰命任權者必公百辟以孚在持衡者守德此蓋國之恆準教以順行雖因時以考正乃假人而後成權之垂知俯下而斯重衡之正乃得一以至貞忠以自勝直哉惟清物無偏以表德器守公而作程動必推移佐璿璣而克正靜無偃仰若泰階之既平懿夫衡之誠懸德乃是茂秉中正以不忒在毫釐而何謬衆星分列若歷歷以拱辰一權下臨正亭亭而當晝斯斟酌之所以俾名實以相副者也爾其觀象取則其數可陳積而成重銖以和鈞稱物平施則其道無極從時利用乃有命惟新既審度而攸準夫何患乎不均安則無傾正以順化四時行令必因其陰陽一德奉天諒貞夫日夜是知分寸相生成乎象盈虛有準觀夫文因黃鐘以起數應元鳥之司分爾乃七政允修五常斯覩為時德也誠金義而木仁為器法焉乃左旋而右矩既輕重之必審雖微細而待取平之為美曲逆終作漢臣中以見稱伊尹是為殷輔茲乃衡之為道也可大權之為義也斯孚繩從則正德不可誣動不欺於纍黍用有識於分銖若夫求平之至者執中之謂乎左流英華注總目作九流貞元十二年進士彼旌孑孑兮五逵之中進善為名兮求善為功狀岧亭以戴日勢聳擢以凌空王者所以開讜諫之路作耳目之聰故帝堯設之道由此達洎我唐建也化乃斯通觀其迥立長衢孤標數仞麗晴天以獨出抗高閣而爭峻體惟能正俾止惡而來觀影則不虧使言善而思進莫非明主求臣願聞所陳期乎啓沃之佐想夫股肱之人由是標格寰中萬姓瞻之以為準高居物外九重隔之以為臬至乃不傾不危持堅孤絶非虹霓之光欲拖豈日月之明能揭故邦無道則我斯廢邦有道則我斯設彼書謗之木安可與齊承露之盤何能並列吾君庶政允釐獻納是思多聞得賢之頌每詠補衮之詩猶恐化理未洽俊乂尚遺而彼士則可招矣在斯旌故宜立之且夫為干者其功鮮為旌者其利淺曷若當天下之用進海內之善揄揚不倦道已盛於方今正直長存事足昭於古典况登於睿鑑旌之通衢人則是仰物豈能踰謂善建者手不可拔豈有力者負之能趨是知昔之設旌也其美如彼今之設旌也其美如此君若好善士皆可俾士有願歌乎聖德庶無慙於末技拱貞元中進士我皇以化洽四夷德應昌期能使嘉祥昭於國典景星耀於天維豈徒呈光芒而出矣遇精彩而見之於時元穹正清白日初匿爛景星之效質絢佳氣以競色起青方者縈瑞彩以蔥蘢發赤位者統祥光而翕赩比懷珠而其狀匪異等抱珥而其儀不忒懿吐黃以爭光矧聚三而表德莫不熒煌於碧漢焜耀於青霄照下土而乍朗掩繁星而自昭或半虧其形類蟾魄而當晦朔或中虛其狀疑金環之在泬寥故德為帝王之美作祥符之首信歷代之罕見既今辰而方有稽往牒之隱見驗前經之休咎則天下和平域中殷阜佐朗月而其色惟盛臨安邦而其美不朽所以呈祥帝室效祉天庭表我皇之道泰彰我君之德馨豈比夫漢代稱奇空聞乎再中之日堯年紀異徒傳乎入昴之星而已乎則知天贊巨唐神依至道必著明於元象實垂曜於蒼昊叶妙理於上德表鴻休於天造不然者何為效靈莫匹具美無雙駭遠目於千里播英聲於萬邦是以綏厥黎庶垂諸史傳德非星而不著星非德而莫見蓋應運於英精亦叶時之靈變雖云瑞之衆祥之多未可比茲星之獨擅聖人以王命之施官秩之設貴有品類賤有等列望之可辨非旌表而焉知出而自殊宜車服之有別於是招繪素之黨召彩筆之徒程亂目之衆色寫外物於百夫以侯伯子男之服為飾以山龍華蟲之象為殊莫不煌煌熒熒奕奕煜煜青為山兮嶢嶷而爭峻赤為火兮赩熾而含燠粉米以純白而璀璨宗彞以太元而黝倏綷一作翬而為羽則振迅而對飛暈而為龍則跨騰而相逐蓋上古之禮制亦當今之法服必謂美妙無盡精微有餘侔桂月之規縱麗天而莫勝擬海藻之質雖摛文而不如實逞巧之無比信取象而靡虛豈徒用別於涖職蓋亦或施於乘車懿其創自於心成之在手或大之者不遺其美惡小之者不失其妍醜此實權等於真宰功齊於妙有所以作國家之程式辨王臣之印綬歷萬代之恆規經百王而共守不然者法實紛糾制有允休何必假其彩色之炳煥於君子之衣裘合九章之物者則寫非五等之服者則不故往代垂模明君立制一則爵命之易辨一則制容之昭麗宜乎嘉其義重其事佐盛禮而罔易垂後代以永示信哉表德之為良亦美作者之深意昔子罕之秉權有封人之問焉以為事不可以不敬物不可以不虔於是陳曩日耕大田豫之於禾也其情易爾禾之於豫也其狀悴然莫不報其素莫不答其先豫知其意遽變豫志倍勤於他時盡力於茲地然後萌而密葉以翠契本心而罔違充所養而不匱故知生寡者其功未既實稀者其心不至苟矻矻以自強何芃芃之莫致是以人之從政士之飭躬僉黽勉而無極並陵兢而靡窮未有不課而名立未有不勤而道融所謂君子重其實貴其功以行之慎者比其盛以動之慢者譬其不惟盛也著美而可觀惟不也售能而誰取信乎鹵莽於庶績何異滅裂於南畝草既在茲衆亦棄之雖有百廛莫得就而獲雖有萬頃焉可俯而持哂之者宜夫莞爾嘆之者何莫凄其則知惡必由人善隨厥操往無不復施無不報雖斯言之細微實所諷之元奧足以將懲躁競用戒澆漓勗萬代之攸習勵蒸人之所為若然者功以之成利憑而得實輔政之義理亦勸學之典則在稼尚其如斯人乎曷不鑒之以隱惻復元貞元中進士樂者所以諧萬國舞者所以節八風故元宗致紫極之舞朝太清之宮俾觀舞以知德德以容備省風以作樂樂以文同吾君纘道紀修祖功將有事以朝獻必斯舞之是崇方其一人在庭㣥后列位奉常執禮以恭命太樂陳儀而蕆事望聖主以龍升見舞童而鹿君至舞之作矣應其度而展其容樂乃遍焉動於天而蟠於地其始也顧步齊進蹁躚有序既乍抑而復揚遂將墜而還舉始躡迹以盼睞每動容於取與陳器用之煌煌曳衣裳之楚楚觀乎俯仰回旋乍離乍聯輕風颯然杳兮俯虹霓而觀列仙飄颻遷延或卻或前清宮肅然儼兮若披雲霧而覩青天惟紫也取紫宮之清惟極也明太極之先用之則邦國之光備施之則中和之氣宣徐而匪濁比上帝鈞天之樂靜而不過小圜丘雲門之和亦何必持彼羽旌方聞乎得禮執其干戚然後為止戈彼延陵空歎於象簫宋玉徒美其陽阿詎能合天地之大德調陰陽之大訛者乎洪惟我后遵祖為大道其樂使萬物無不宣飾其容使兆人無不賴客有觀而作頌願播之於九域之外鎛貞元十四年進士馬以行地致用式乃鑄金取規表騏驥以立則擬形容而可知合諸法象遵彼權奇卓爾趫姿想從革而乍見駭茲殊相疑軼塵而載馳毫髮盡似纎穠不差誠駿骨之倜儻亦巧心之云為本其稱自前朝制於往漢金也者持堅剛之可久式也者驗逸異而有案形乃辨於千里功詎勞於萬鍛匪刻鵠之同科豈偶人而齊貫載鍊載精我馬是程武脊乍覩龍文可名星氣相合金光發明踠足不前如俟孫陽之顧望雲邈視寧殊窪水之生向日而疑將奮影臨風而狀若長鳴曲盡其趣不愆於素寫逸態以全能制蘭筋而巧附瞳雙鏡而可鑒顴兩月以合度謂天驥之呈材乃良金之所鑄取則不遠其象孔昭常矯矯以示衆特昂昂而建標騕裊在目飛黃立朝哂求市之三年終觀駿死無相肥於一概何慮駒跳所以稽乎驥德垂此作式指半漢以成規豈駑駘之可惑置於宮壼有待獻書之賢鑄以越銅載假伏波之力事與名遠理將意深寧俟造父之能馴驊騮可覿何必九方之善相驪牝獨尋等循形以觀影咸得駿於斯金故曰考茲術也選無違者可以斷臧否明取舍形分似是類別真假欲獻狀於國門期一中於名馬上清中元聖立教存書示人以玉為至精之寶喻道於強名之真使其復歸於本近取諸身保長生於氣母通不死於谷神妙哉靈訣虛皇之説清紫府之內瑕瑜不藏洗丹田之中瓊瑤比潔蓬萊有壽配金石姑射有顏如冰雪訝其與天地相終而莫知寒暑易節時所未喻茲焉在列我是以紀庭廬之位論藏府之官得之於此甚易求之於彼則難噓吹可以自審性命於焉內觀專氣致柔則順途而同轍適性任欲將背馳而走丸五氣理於先後三關啓其戶牖精粹自成於渣滓寵辱不驚於紛糾同美玉之韞櫝我其善守以隋珠而彈雀爾於何有以取諸其懷致於道孔皆目可通於兩耀神相應於百骸乃知化自仙册形為真宅傳此希言服之無斁神明不見指象帝於虛無元覽可尋捧斯文而探賾代所貴人受益不然何道德並經於五千靈仙自古而纍百雖羽化之獨躋於國理而無暌用以修真則致虛抱一移於砥行乃立節思齊故鍊質者慕凌厲飛騰於碧落致身者以詩書禮樂為丹梯俾克躬以服道乃潔已而如圭懸解上智之性指南下愚之迷客有仰黃庭之祕録空自嘆於塵泥俞貞元十六年進士官長水縣令酌人心之善敗惟性習之所分習者物之遷以動為主性者生之質以靜為君運情有同於鎔鑄通志亦比夫耕耘或定心以純一或逐境而糾紛故定心者若疏源而自得逐境者猶理絲而又棼且物之惑人無窮人之徇物無已近之則歸於正性遠之則滅於天理雖真妄之多端諒御用而由已至若習於所是則孟母之訓子其居也初闤闠之是鄰遂賈鬻而無恥及夫又徙於學徒示以墳史卒能振文行以標名鬱古今而播美豈不以性相近而習之至矣又若效之而非則壽陵之從師其故也等善行之無轍見大道之甚夷及夫邯鄲之學匍匐於茲既所能之未盡終故步而莫追豈不以習相遠而性亦失之固宜人定其情物安其所苟欲遷性習以交喪易賢愚之攸處則舍於己而效於人學彌得而性彌阻述而莫息亦莫之禦是非乖理而亦徇未若襲慎而委順勿牽外以槩名在執中而克慎欽若奧旨聞諸古先習之則善道可進守之則至理自全茲義也智所不染愚亦難遷儻中庸之可甄願斯焉而取焉構貞元中進士日以運行時維貞觀驗載中之照燭表一德之協贊至誠則感實所應於皇家偶聖必呈豈獨符於炎漢既退舍以回薄又增明而輝煥且夫天地絪縕日月垂文始將傾而復正願何鑒而不分當下委之碧落又上排之青雲經紀回旋乃暉晶而射耀次舍中正則澄霽而銷氛何麗天以昭晰諒觸物而繽紛然而日乃陽德光於四裔陽為君德配以上帝既居中而有感亦臨下而罔替昔連珠而合璧或五色而四彗咸逐物而遷移並隨時而啓閉曷若此將旰而復昭昭無際則知陰陽冥通乃與仁聖符契徒觀其炫晃在茲氣肅風追合人君以乘時又觀其昭回帛丿糸邈霞張雪駮美嘉祥之欲數時以我既再我則盈縮而自持時以我當中我則清明而不濁既照臨於率土信叶和而反朴夫日也變動不居周流六虛天垂象以咸若精可貫而皎如既匪虧焉比皇明以無極斯呈瑞也諒至化之有餘且神功而不測乃駐晷其實徐所謂懸鑒在彼觀光由是仰大明之載中知積清而率俾因徵今以賦事諒舍彼而取此復元和初官太常博士鄭珣瑜令德清規坐鎮風俗理人而善政浹洽作相而謀猷密勿其終始事迹當時罕儔所以表賢易名實曰文獻夫文者煥乎大行獻者軒然高名今而褒之厥有經義亦猶貞惠文子纍數其功至於再三以勸事君者今奉駁議議其無進拔無是非無賑施無謇諤且曰二字之諡非三代兩漢事愚以為巽之駁所謂進拔者豈不推擇㣥萃致之於庭乎珣瑜往司銓衡暨當鈞軸流品式敘英髦在朝若無獎拔之明則何以至此但如來議寡言慎行故其端兆不可得而窺也當先朝之日上體不平姦臣王叔文招權作朋將害於國其視丞相如無也輕詣相府不循舊章珣瑜意雖能誅力固不足移疾高謝萬情所歸則是非之明孰大於此夫所謂賑施者在禮家施不及國賢人君子廣愛為心莫不開稱物之源布厚生之政曩者恤災患免逋租亦既當之矣其於篤親庇族衣無常主踐名教者誰則不行若以分孤寡之資同於賑施則珣瑜所羞言也奚謂無哉至如謇謇匪躬前議已書其微婉矣既承高論敢不指明德宗季年李實為京兆尹殊恩晝接貴幸無比而實以羡餘稱貸莫之敢非珣瑜衆詰所繇上陳利害且曰取於人而未酬其直焉得有餘是其言不可謂之無謇諤矣伏以國朝宰輔諡文而兼字者代有人焉故房元齡諡曰文昭狄仁傑諡曰文惠魏徵陸象先蘇王褱宋璟張説崔祐甫並諡曰文貞劉仁軌劉幽求姚元崇裴耀卿張九齡並諡曰文獻李元紘韓休並曰文忠薛元超曰文懿盧懷慎曰文成蘇頲曰文憲楊綰曰文簡其餘不可悉數若以文包美不宜以他字配之則房元齡狄仁傑以降昭惠貞獻忠懿成簡皆不得正矣我唐聲名文物二百年更閲㣥才發揮王度豈擬名之典獨未得中邪不然何輕沮之為駁正所設但當論諡之當否不宜詰字之多少苟有不當雖一字可乎若皆允宜雖二字何害如韋巨源附會凶黨李北海奪其嘉名所言至公人則悅服今既曰賢相而又非之君子於其言豈得苟而已乎若曰二字非三代兩漢之規則又異乎愚所學者矣夫威烈慎靚周王之諡也文終文成漢祖之佐命也霍光為宣成孔光為簡烈中代之勳德也劉寬為昭烈楊賜為文烈東都之鼎臣也安謂其無二字哉况文之為名其義多矣有經緯天地焉有忠信節禮焉有寬立不懾堅強不暴焉有敏而好學不恥下問焉夫匪一端各有所當若皆西伯季孫之德然後可稱文則魯侯與文伯歜之類皆不為文矣故誄諡之制因時旌別前狀議珣瑜之行曰為一代之名臣斯其旨歟謹上采禮經旁觀舊史參諸國典以定二名請依前諡曰文獻
