front:
  text: 全唐文欽定全唐文卷七百十七徹字直方元和中官太子通事舍人飛騎尉
  hash: sha256:4d551106c77ecaa634f949dabbad86689c0f34c1334808d2e53139513e3d2d46
  markers:
  - {type: head, offset: 13, content: 柳澈, id: KR4h0168_NFKB_717-h1, level: 1}
body:
  text: 周天宇環四極明照品類陽和發生者其唯日月鬱儀含光結璘潛耀曦暉窈昧煒煌掩翳者其唯燈燭而瓊室眄睞幽奧發揮辨片纎穠無奪物務燈之為用其大矣哉則有若白毫相如意珠徹照大千傍覿沙界明冠兩曜流輝五靈出世之耿光也非獨昭彰曖昧抑亦雨寶蓮華貨貝紛布以資生靈天莫測人莫辨千載盛事歸於我唐於戲道之行也德之修也其或懋建必生奇偉卓然興之回拔峩峩其流必大則今之建功立名位階三事高謝四科文明藻麗者可勝道哉幢之建也本於毗沙天王燈之照也興於玉殿霞敞事之源也肇自平康里蜀之符節掌留務闕二字別闕二字闞名闕一字大歷十一年景辰以宅奏闕四字年甲戌闕二字從道僧名覺勝爰於寺宇手素天王容飾未周報齡將謝祈感帝夢帝闕三字儀形聿修紺殿斯立事詳豐碑幢則叙天王之鎮保唐也闕七字哉靈闕二字儼若覩相形肅金闕十三字氣闕一字掌塔瞪注持矛傑立而鬼神闕三字精闕二字百由旬內為依為怙僧藍以之闕五字之安寧日月明於外燈燭耀于內同乎闕五字魄夜朗無宵晝矣至於興感化允人望祈願必遂幽贊多方不可遽數其有奉蘭膏照華殿燈明不絶歸信如流則其為福也展無疆之休其益算也續靈長之壽當寺內供奉大德了法上座超證寺主靈皎都維冉超元購良工奉珍財求翠珉斫而磨之徵雕龍序而贊之文則陋矣敢揚光烈贊曰天王垂迹肇興于闐威靈傍洽仰之鈐鍵爰祚我唐昭孚變現廓土開疆闕一字騰電烻其一惟王有國惟神有靈教興印度德洽大庭綿闕一字歲紀天資克成僧藍是託國步爰旌其二燈幢昭赫邈哉天王炳靈垂休帝業其昌翠殿含耀徘徊煒煌慶于闞闕一字祚于保唐其三彪元和時人夫爾雅者古人以訓釋難尋之所作也每想此機捷妙無以加故朝廷用之兼經多歷年代余西蜀江源人也少好道藝惟攻丹術自弱至于知命窮究經方曾覽數百家論功者如同指掌用藥皆是隱名就於隱名之中又有多本若不備見猶畫餅夢桃遇其經方與不遇無別每噫嗟此事悵恨無師由何意也因見參同契云未能悉究當施直義其理盡矣經曰吾欲結舌不言恐畏獲罪誅寫情於竹帛恐泄天之符故知聖賢至道元妙之法不欲流俗偶然之所聞解也故委曲其事令上士勤而習之使下士棄而笑之理昭然也但恐後學同余苦心今附六家之口訣衆石之異名象爾雅詞句凡六篇勒為一卷令疑迷者尋之稍易習業者誦之不難兼諸丹所有別名奇方異術之號有法可營造者條列於前無法難作之流具名於後時唐元和丙戌梅彪序傑元和時人陰陽精氣結為山嶽者則為勝為異為奧為閟故萬嶺交峙而嵩華辨其方㣥嶽效靈而瀛壺拔其類是知仙居靈宅其必有黨乎鳴弦之北趾果業之東阜高不百仞廣才千畝層巖石室幽谷靈洞殊境異觀秀絶奇偉雖瀑流之下爐峯懸磴之躋丹嶠路遠莫覿余不知其倫擬焉桉寺記云昔有方士於是山鍊金變形羽服登仙故石座丹竈至今存焉觀其東嶺削成石瑩如玉岡巒峭竦巖壁重復捫藟而升如造雲根縹眇嬋娟似霞衣可攀真氣勝而塵纍捐五蓋破而清機間蕩然放懷如羽翼之已生赤城之可接噫境變志遷若符契之協從也下臨長川澄波吐瀾煙霞夕收飛鳥不喧杳渺逶迤流注無間西直巨壑連嶂如屏林靄朝翠巖光晝清篠簜藏輝杉松下冥虛廓寂寥涵風有聲緣嶺未極劃開洞門黛容崢嶸詭狀輪囷疑伏龍怪鎮含煙雲又有古木倒傍絶壁盤根網結掛絡空碧崩崖傍傾猿徑下仄羽人幽會此焉瑤席搏翠壁而直上軋崎嶇於紫氛雙巖屹以中斷奔屏蹙而成室涵孕精爽澄凝氣源信列仙之攸居豈塵俗之所止哉嗚呼鶴駕一去鳳簫響絶荊榛蔽路危磴敗滅跡留人境而舉世莫知地聯精剎而㣥遊莫至吁可怪乎其晦藏也元和丙申歲秋八月余以膠鬲之困寓居精舍再從兄昭肅時假茲邑政便於人務簡多暇與當寺僧知捷日探道源捷亦好古叨奇之士也因語故實緬思羽客之元風以為靈跡神蹤精誠必復乃操刃持畚履險通幽梯絶棧而歷巉巖排蒙籠而登杳靄時更不稔而神居祕躅粲然皆睹嗟乎芝田元圃豈遠乎哉天之與人氣通則合客有顧咨而諗豫者或應之曰天之運否泰相濟故善利稱德有下民昏墊人之道行藏有數故棘津蓬蔂時惟鷹揚靈物必通道在斯著不然何荒阻千祀勃焉而興歟乃為銘曰鑿石通道兮援木枝仰攀洞口兮踐欹危奔龍伏虎兮勢狀奇林攢峯倚兮蟠雲螭下臨陰谷兮神以栗嵌巖巖兮洞無極老松肅瑟兮生遠風興雲霈霈兮煙霧黑懸巖排空兮色噴黛堅根網絡兮層霄外披霓解帶兮羽翼生下眺遙江兮入青靄世道紛綸兮何足謂朝為榮華兮夕憔悴不如幽谷兮閲仙經冀接浮邱兮整煙轡我窺丹竈兮坐山腹衆峯參差兮隱雲族鑿仙嶺兮望瑤臺朝霞照海兮錦綺開信赤松之所升降王喬之所往來道或用晦兮靈物斯潛殷道未昌兮說築傅巖紛豫感此兮勒銘雲根山既不朽兮與名長存頊德宗朝昭義留後王虔休辟掌書記授洺州別駕聰明山之神蓋俶落上古不知其始興也若曰福善禍淫之謂聰降祥育物之謂明美稱備焉取名斯在觀夫㣥山逶迤自西北而茲鎮秀拔屹臨東夏揖岱宗於遠邑延旭日於高標豁開廣平千里如砥靈源森麓回合窈冥禳祈必徵肸蠁如覩祀典曰山川邱陵能出雲為風雨有功及物曰神諸侯在其地則祭元和丙戌歲右僕射范陽王總戎之三年詔自上黨撫巡東封登車誓師顜若畫一萬旅齊列千輪比衝振蕩林巒翩翻斾旌雷動雲馳不聞人聲公清明在躬文武是憲翼聖濟俗宣威靖難申伯旋謝太公祖齊華夏具瞻今古榮觀冬仲月生魄至於茲山齊莊廟庭躬執祀事於是大備椌楬畢陳犧牲神之格斯歆我明德君子曰惟精誠通乎神惟聰明應乎人天地交泰而賢人用神人和叶而茂勳立公之舉也神之助也不然何年祀未幾而變化神速臻於是耶故詩曰天降時雨山川出雲又曰赫赫厥聲濯濯厥靈其在於公乎頊謬職分符今逾一紀獲奉威命舊邦惟新黎庶其蘇邦家之慶祝公壽考永固河山夫言而無文行之不遠乃刻石以紀傳於後人自公及監軍使幕客郡守列將等咸載名氏云元和四年七月九日記行儉汴宋節度使長源子臣某言臣聞忠以事君則正其詞所謂誠臣也諂以事君則僞其詞所謂諛臣也臣以多幸生逢昭代受方隅之重寄藉日月之餘輝荷寵益深殺身難報而心尚謇直志無回邪苟利國家敢陳無隱一昨中使李誠義銜命遠降軍中蒙以淮西事宜俯賜宣示跪捧宸諭枉受德音仰荷自天之恩下訪列藩之將恭承聖問思露下情芻蕘之言慮有塵黷誠義回日已附表奏聞雖詞達於上而誠款動天倣徨轅門懼獲罪戾伏以堯舜在上伊臯立朝陛下謀及宰臣詢於卿士並以弼諧帝道匡贊皇猷在臣何知豈宜獻計然臣擁旄歲久受國恩深元造未酬赤誠空竭得申犬馬之志敢逃湯鑊之誅仰天誓心白日所鑒伏以陛下君臨萬國子育兆人覆載所均無遠不至溥天之下孰非王土率土之濱孰非王臣永言雨露之澤豈隔遐邇之人今少陽云亡允子在疚賞未追於後嗣兵已纏於四郊然則一方之人豈非陛下聲教所加盍示懷柔俾霑恩信竊料中外日獻章疏來陳所見以惑上心夫為奸邪者則願師旅薦興秉忠誠者則願干戈再戢㣥情不一豈叶大中伏望聖明燭幽宸鑒及遠誠宜辨邪正於衆口斷可否於萬機擇善而行從諫則聖如臣愚直謬竊寵私不敢以息兵沮議今所上表貴以直書非敢私於淮西誠願安於宇宙不然者恐煩聖上之慮有費天府之財不惟塗炭一方誠亦憂危四海盡忠於國者猶自銷難不忠於國者因此生禍國之理亂實所攸繫伏冀陛下宏以好生之德降以推恩之典使死者獲愧於幽壤生者盡節於聖朝凡在臣子孰不幸甚陳露愚懇輕冒天威周章失容進退無據臣限以戎閫不獲陳露闕庭無任憂惶隕越之至辭字踐之京兆扶風人兩經擢第判高等文宗朝拜中書舍人出為潭州刺史兼御史中丞湖南觀察使大和四年卒年五十八贈散騎常侍元公再臨道州有嫗伏活亂之恩封部歌吟旁浹於永故去此五十年而俚俗猶知敬慕凡琴堂水齊珍植嘉卉雖欹傾荒翳終樵採不及焉仁聲之感物也如此今年春公季子友讓以遜敏知治術為觀察使袁公所厚用前寶鼎尉假道州長史路出亭下維舟感泣以簡書程責之不遑也乃罄撤資俸託所部祁陽長豆盧闕六字歸喜獲私尚會余亦以恩例自道州司馬移佐江州帆風楫流相闕六字畢寶鼎竦然曰茲亭創治之始既銘於崖側矣至於水石之秀賦詠所及則家集存焉然自空閴時餘四紀士林經過篇翰相屬今圬塓移舊手筆亡矣將編於左方用存此亭故事既適相會盍為志焉余嘉其損約貧寓而能以章復舊志為急思有以白之故不得用質俚辭命元和十三年十二月六日江州員外司馬韋辭記元略博州人第進士穆宗朝為黔南觀察使徙鄂嶽入拜大理卿敬宗朝遷戶部侍郎文宗朝轉戶部尚書為東都留守遷義成軍節度使卒贈左僕射伏准賤役令內外六品已下官及京司諸色職掌人合免課役伏以設官之際大關隄防給蠲之時不免踰濫至有因緣假冒多非本身臣自受比官已來無日而不見論請蠲牒必恐從茲不已天下無復有應役之人伏請自今以後應諸司見在官及准式合蠲免職掌人等竝先於本司陳牒責保待本司牒到然後給符其前資官即請於都省陳狀准前勘責事若不實竝准詐僞律論其孝子順孫義夫節婦及割股奉親比來州府懸免課役不繇所司覆請從今已後應有此色敕下後亦須先牒臣當司如不承戶部文符其課役不在免限一時府縣條疏臺司舉劾孤立無黨謗言益彰不謂詔出宸衷恩延望外處南宮之重位列左戶之清班豈臣庸虛敢自干冒天心所擇雖驚特進之恩衆口相非乃致因緣之說志銘並序夫王者統極垂理其外必有英哲宣力股肱其內必有專良布達心膂以成帝道古今而言君臣相會兼之者鮮矣厥有內侍李公可謂會而兼之者也公監軍河中以元和十年正月十七日薨於官次行路悽咽元戎以聞皇帝軫悼寵以殊禮褒贈特進左武衛大將軍品冠朝端位崇禁衛詔下之日人不謂優有以見公出入中外始終無過之地矣公諱輔光字君肅其先京兆涇陽人也曾祖望皇京兆府華原縣令祖萬靖皇涇王府長史父思翌皇涇州仁賢府左果毅賞緋魚袋公即果毅之第三子也質表華茂氣懷恭敏建中歲德宗御宇時以內臣干國率多縱敗思選賢妙以正宮掖故公特以良胄入侍充白身內養俄屬皇輿巡幸公於斯時參侍指顧應對皆愜遂賜緑超授奚官局令勳以元從之號其年又遷掖庭局令興元初輦入宮闈公屢含天憲復命之日皆中機要遷內寺伯時有北虜入覲將以戎馬充獻數盈纍萬國朝故事每一馬皆酬以數十縑帛拒之即立為邊患受之即王府空竭公承命為印納使迎之朔陲諭以信實交領之際虜不敢欺必以精良者闕一字後充算省費之校億兆相懸生靈所資安危是繫即公之於國可謂有大功矣聖情歡悅遂有銀章朱紱之賜由是方隅重事咸所委屬嶺嶠之南漸於海日雍管地偏人狡闕三字將有缺溪洞連結為盜者僅草萬衆王命稽擁逮於周歲鄰道節使咸請進討德宗皇帝且曰以吾人伐吾人剋之非利於是命公招諭驛闕二字驅遽臨所部公乃訊詰疑懼昭示恩威浹辰之間咸知所嚮公素練兵機具見腰闕二字巡視川谷占其要害奏請於海口置五鎮守捉至今帖然人受其賜獻功未幾又屬太原軍帥李自良薨於鎮監軍使王定遠為亂兵所害甲士十萬露刃相守公馳命安撫下車乃定便充監軍使前後三易節制軍府晏如十五年間去由始至遂特恩遙授內給事又有金章紫綬之賜元和初皇帝踐祚旌寵殊勳復遷內常侍兼供奉官明年銀夏裨將楊惠琳西蜀副倅劉闢或以長帥薨歿皆恃塞怙險初有邀君之心終成悖亂之跡公密表請發當道步騎誅討功成之日有詔裦美曰卿志懷嫉惡情切奉公繼遣偏師克平二寇雖嘉將帥之勤足見監臨之效拜內侍省內侍知省中事署之貴寵極於此尋因入覲懇請留侍乃充鴻臚禮賓使又轉內弓箭庫使曾不纍月皇帝以蒲津重鎮監統務切復除河中監軍兼絳州銅冶使自元和四年至九年元戎四換交代之際人心如一斯蓋公約已廉與士信靜專動和推安便物之所致也聖恩表異圖形省閣易簀之日享年七十有四以其年四月草五日吉辰遷窆於涇陽縣咸陽原之陰詔下所司備鉦鼓笳簫儀衛禮物中使監導出於都門榮觀路人寵被幽壤士君子聞者咸亦知勸夫人輔氏邑號扶風郡閨儀端懿母德溫淑如賓之敬見於喪禮有子四人長曰希晏前將仕郎掖庭局宮教博士次曰仲升開府儀同三司檢校太子詹事兼殿中侍御史充河東節度保寧軍使次曰希暹內養將仕郎守內侍省內府局丞次曰希升並皆克奉規訓志存忠孝懿勳茂績始見其進也門吏晉州司法參軍巨雅以元略長兄嘗賓於北府以元略又從事中都俱飽內侍之德將命録實見託為志勒之貞石且無愧詞銘曰涇水之涘高原堀起其上新墳葬我將軍將軍之德實彰家國水竭原遷斯文乃傳述大和朝官司封郎中出為袁州刺史臣某言臣以夙疾多時受任非淺常有負靦冒據官榮將貽折足之尤以速素餐之謗昨者輒陳章疏冀蒙矜免不意血誠徒懇聖慮未回懷荷寵私有如氷炭臣聞力小任重久則致敗功微祿厚過則生災故經垂知足之言易著負乘之誡皆明力不勝任才不當官臣雖孱微嘗所執守且臣受金戊閫外二十一年弟執金吾男居藩服窮極寵幸萃臣一門每夙夜憂惶常恐身先犬馬不獲策勵駑蹇上報鴻恩今臣實懼不逮是以告訴况臣心力未减猶可支持筋骸已傷或難勉強伏望聖慈哀察賜徇懇誠恐其再有陳聞許以病免丹儻遂沒齒為榮無任懇迫之至臣某言伏以纍獻表章微誠務達屢塵聖聽罪犯已多臣聞固陋寒賤人之所惡富貴榮達人之所欲自臣忝謬即宜推陳豈可蓄縮偷安敓襄攴苟得若禮乖當植得者不勸故禮以旌德賞以勸勞諒或苟差何以沮勸臣自叨幸高位二十一年手足風病十有餘歲每恨國恩未答沉瘵遂嬰命竊極於公侯身實降於廢棄幸逢明詔獲睹闕庭天顏咫尺之間稠慈諭彤庭拜舞之際宣賜人扶焉有臣對君上獲此恩禮陳於明庭雖丞相乘車入朝酇侯劒履上殿臣忝僥幸竊被殊榮未知何功寵光及此史冊莫載今古全無皆陛下降稽天之仁垂極地之德特開貸納俯賜舍容君父之恩不可稱量臣每退朝之後感極涕流唯思訓子導孫披誠瀝懇率令致命不止終身蓋由感深遂切肌骨但臣去就如此保固官榮尚稽覆載之私更安顯重之位則何以標明賞典準約朝綱臣是以陳露鄙誠罄竭于此昨者再披悃款冒死奏聞蒙賜批諭特加獎飾録其微功未賜允從臣今輒敢復獻表章觸法陳乞特仰恩私養疾衡門則陛下無虛授之名微臣免曠官之責不奪之志告訴豈懼于再三觖望之誠允許庶幾于萬一陛下儻恕塵黷俯察區區容其病免以徇誠請雖死之日猶生之年臣某言臣聞虞舜之朝九官皆讓西漢之盛二疏云去蓋上以淳風蕩俗下以廉恥激節故也况寵辱之際不驚則愚進退之間不知則殆中謝伏惟皇帝陛下德超邃古功格上元誕敷文教丕變頽靡天地日月載惟貞明動植翔泳罔不咸若臣某席以枝蔭階緣休運弱齡入任四紀于茲三省微躬一何厚幸是以每蒞一職每徙一官未嘗不心效權衡操懷竹柏雖齷齪廉謹曾無異績而毫釐過犯未汚簡書知臣在君匪敢矜述自陛下嗣臨寶位一十七年不以疲駑猥蒙獎拔授以疆土假以麾幢入居宗廟之司出典股肱之郡八座之貴臣拜者三六條之榮臣守其五四開戎府一佐中軍至如宮相臺丞侍臣堯印兼命稠謺纍遷頻速輝光既極盈滿是憂間歲初領華州方宣聖澤俄以滑臺選帥非次及臣雙旌自天匹馬之鎮此州當四達之地控兩河之境兵雖徑逸人至凋殘臣遠仗皇威推誠撫衆服勤吏事盡瘁牧人遂得黎庶就耕織之時士伍知訓習之禮此皆大化光被臣敢貪天之功常恐三至奪慈孤立速謗此臣所以怵惕惟厲中夜以興願披血誠上達旒扆伏惟陛下少加憐察臣竊以酬恩徇節心實無涯引重致遠力誠有極臣先以嶺南染風毒腳氣今年春又患發鬢分將不起命及阽危幸沐亭育之恩免從帷蓋之斃臣年逾知命齒髮已衰疾經沉痼方寸頓減久當繁劇必慮闕遺臣又聞制閫者以重鎮為雄仗鉞者以專征為務臣器幹不足以在任方略不足以持權何以統節制之師貞定否臧之戎律且陳力就列訓誥攸存審才則然以病宜免况巖廊多士宇宙無虞為官擇人皆出臣右胡可晏安冒寵尸素妨賢乞降賜骸之恩以全折足之咎臣獲退就散秩保養餘年候筋力之復彊申赴蹈而寧晚臣於當部勸課營田及以羡餘優恤將士等事一一列具條奏冀明輯睦上副憂勤塵黷宸嚴冰炭交臆無任懇切屏營之至臣某言某月日中使某至伏奉手詔兼宣聖旨以淮西事體今臣謬竊藩隅每慙叨忝職惟承命恩深隕越陛下特迂宸聰議及凡品纍從聽之德慙啓聖之才感恩徘徊難酬寵遇敢不罄陳愚瞽竊備芻蕘伏以少陽男元濟不取聖裁擅理戎務國有常典罪必當誅或恐淮西一使曾經反側衆情所裁覬自偷安元濟此時求免無路陛下式遏為心固合深除剪滅猥蒙詢訪無有寇能不死勢必萬全天討淹留衆心前卻則千戈難弭殺戮滋深陛下愛人之心異殷湯釋網之意伏願與輔弼信臣朝廷碩德平章利害以取厥中使兆庶安生四方蒙福實天下幸甚豈惟臣一方臣所部兵馬排比有序但思報國恭候指揮伏惟賜鑒微詞俯察愚懇輕陳睿烈慚懼伏深臣某言臣聞中原息戰子房得以乞身東吳既平范蠡終能行志二臣皆因時效用遇主成功進咸展於盡忠退各安於秩考所以立名萬古保慶一時愚臣夙心私有所慕况蒲柳先邁駑蹇易疲審已無堪量力知止吐誠上達罄寫中懷仰覬天慈俯照愚悃中謝臣雖長於戎旅幼業詩書每稟效忠之言早勵為臣之節當河朔承襲之日在軍幕危疑之間每動險中幾鄰於死常以捐軀報國率彼頑人受命指蹤掃清餘孽用攄宿憤以答明時一覩天庭百生願足但懷感激豈意遭逢伏遇陛下神武應期聖謀獨斷臣得盡陳忠款見委赤心唯將擐甲啓行執殳畢力上憑睿算凶寇自夷今日獲覲天顏躬承睿渥平生之願既遂休老之志宜申豈可更貪寵光久冒榮祿使貽官謗取笑將來臣自總魏師初率歸化當時結念便誓此心祈於素誠非是飾讓匹夫之志猶不可奪臣一昨自離本鎮亦以此意明言陳諭聖恩勉其忠義將士等皆懷皇化盡激丹誠則一軍幸安且無足慮在於今日臣何所任豈可久職妨賢待譏竊位此時不退何日宜退臣犬馬之齒未云甚高筋力之問已知不健加以少罹憂患鬢髮早衰久經行陳心力已耗若許其優養或冀保餘年儻抑其愚性則生理必沮且身兼將相人臣之位已極滿朝子弟人臣之家至盛於國何補獨荷殊私所以憂餘惡盈樂在知足擊壤自歡於聖日懸車豈待於禮年是用瀝膽披肝冒昧陳乞伏惟尊號皇帝陛下德邁羲軒恩深覆載蕩除餘祲理致太和動植含靈無不遂性方將旁求英俊共洽升平如臣以鷹犬之微獲申搏噬纍塵高位常積厚顏福過災生自當勇退且富貴榮樂是人所欲苟心有所尚意趣或違彊其不能適足增苦儻蒙恩造獲遂優間許歸衡茅取樂餘齒是天地曲成之德君父莫大之恩五湖回舟生無慙於越相都門揮手死不愧於漢臣言披血誠情切中素無任悃款懇迫之至巨澤元和時人汾州刺史崔恭幼女曰少元事范陽盧陲陲為福建從事既構室經歲餘言於夫曰余雖胎育人世質為凡女本金闕玉皇侍書每秋分輒領㣥仙府刺落丹誠録修學者名氏多由觸染而墮與同宮三侍女默議其狀恍然悟世情之穢欲共憤歎之未竟而仙府責其心興欲端各謫降下世為盧氏妻二十三期今及年矣當與君絶恩息念常獨居一室不踐夫域自列本末復仕前名也陲或中夜聆室中有語音試潛窺伺有古鬟長綃衣女數人共坐指陲而歎皆梵音不知其言但見肌髮衣服悉有光照其妻獨不彰朗暨旦告其妻曰天界真仙皆梵語再詢之則曰若恣傳泄必生兩責又言於盧曰吾不及為太上所召將欲返神還乎無形復侍玉皇歸於玉清君無泄是言貽吾父母之念盧亦共祕之常異日戚戚不樂謂陲曰事迫矣不告吾父母是吾不女也遂啓絳箱取黃庭內經獻於恭曰尊之孺人算極於三月十七日非內景經不能保護然尊之孺人念之萬過只可延一紀恭驚曰汝焉知吾之運日月邪吾嘗遇異術人告余前期吾不能出口而心患之汝將若之何女乃設三機敷重席白筆具萬過功章以召南斗主算天官令恭潔衣再請命髣佛有三朱衣就坐進羞酒竟持功章而去由是父母皆異之仍曰今泄露天事不可復久月餘告終及葬舉棺如空留衣蛻而去初陲既驚異其跡乃請道於妻留守一詩一章曰世有修福之門無知道之士君至丙申年神理運會遇異人琅琊君必與開釋此詩君今未屬於道不可與言無為之教長孫巨澤之友曰棲真子王君行於陜之郊覯陲備言妻之狀復以守一詩詢於王君君覽詩駭然曰此天真祕理非可苟盡遂演成章句目之曰元珠心境以授陲時元和丁酉歲巨澤聆於王君乃疏本末為傳其淵密奧旨具列章句云虞卿字師臯虢州宏農人元和五年進士又舉博學宏詞科纍拜諫議大夫宏文館學士轉給事中出為常州刺史入拜工部侍郎授京兆尹貶虔州司戶卒臣聞烏鳶遭害則仁鳥逝誹謗不誅則良臣進况詔旨勉諭許陳愚誠故臣不敢避誅死以獻瞽言竊聞堯舜以天下為憂不以位為樂况今北虜方梗西戎弗靖兩河之瘡痍未平五嶺之妖氛未解生人之疾苦盡在朝廷之制度莫修邊儲屢空國用猶屈固未可以高枕而息也陛下初臨萬幾宜有憂天下之志當日延輔臣公卿百執事凝旒而問造膝以求使四方內外灼有所聞今自聽政以來六十日矣入對延英獨三數大臣仰龍顏承聖問其他侍從詔誥之臣偕入而齊出無所咨詢何足以聞政事哉諫臣盈廷忠言不聞臣實羞之蓋主恩疏而正路塞也夫公卿大臣宜朝夕接見論道賜與從容則君臣之情相接而理道備聞矣今宰臣四五人或頃刻侍坐天威不遠鞠躬隕越隨旨上下無能往來此繇君太尊臣太卑故也自公卿已下雖歷踐清地曾未祗奉優眷以承下問鬱塞正路偷安幸門雖陛下神聖如五帝臣下莫能望清光所宜周爰顧逮惠以氣色使支體相輔君臣昭明陛下求治於宰相宰相貴治於臣等自然上下孜孜相問使進忠若趨利論政若訴冤此而不聞過失不致升平未之有也自古天子居危思安之心同而居安慮危之道則異故不得皆為聖帝明王小臣疏賤豈宜及此獨不忍冒榮偷祿以負聖朝伏惟陛下察之
