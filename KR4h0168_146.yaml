front:
  text: 全唐文欽定全唐文卷一百四十六安期宗王卿百藥子貞觀初纍除主客員外郎龍朔中為司列少常伯參知國事出為荊州大都督府長史咸亨初卒諡曰烈
  hash: sha256:fd61f8e4d5aa413f8936990807c39d780935f1eacc724ed70cecdf6b707ef853
  markers:
  - {type: head, offset: 14, content: 李安期, id: KR4h0168_NFKB_146-h1, level: 1}
body:
  text: 十室之邑且有忠信天下至廣不為無賢比見公卿有所薦進皆劾為朋黨滯抑者未申而主薦者巳訾所以人人爭噤默以避囂謗若陛下忘其親讐曠然受之惟才是用塞讒毀路其誰敢不竭忠以聞上乎穎達字仲遠冀州衡水人太宗平洛授文學館學士貞觀中纍除太子右庶子加散騎常侍封曲阜縣子拜國子祭酒圖形凌煙閣二十二年卒贈太常卿諡曰憲臣伏尋前敕依禮部尚書豆盧寬國子助教劉伯莊等議以為從崑崙道上層以祭天下層以布政又尋後敕云為左右閣道登樓設祭臣謹按六藝㣥書百家諸史皆名基上曰堂樓上曰觀未聞臺觀重樓之上而有堂名孝經云宗祀文王於明堂不云明樓明觀其義一也又明堂法天聖王示儉或有剪蒿為柱葺茅作蓋雖復古今異制不可恆然猶依大典惟在朴素是以席惟藳秸器尚陶匏用繭栗以貴誠服大裘以訓儉今若飛樓架回綺閣凌雲考古之文實堪疑慮按郊祀志漢武明堂之制四面無壁上覆以茅祭五帝於上座祀后土於下防臣以上座正謂基上下防惟是基下既云四面無壁未審伯莊以何知上層祭神下有五室且漢武所為多用方士之説違經背正不可師祖又豆盧寬等議云上層祭天下層布政欲使人神位別事不相干臣以古者敬重大事與接神相似所以朝覲祭祀並皆在廟豈有樓上祭祖樓下視朝閣道升樓路便窄隘乘輦則接神不敬步陟則勞曳聖躬侍衛在傍百司供奉求之典誥全無此理臣非敢固執愚見以求已長伏以國之大典不可不慎乞以臣愚表下㣥臣詳議焉夫易者象也爻者效也聖人有以仰觀俯察象天地而育㣥品雲行雨施效四時以生萬物若用之以順則兩儀序而百物和若行之以逆則六位傾而五行亂故王者動必則天地之道不使一物失其性行必協陰陽之宜不使一物受其害故能彌綸宇宙酬酢神明宗社所以無窮風聲所以不朽非夫道極元妙孰能與於此乎斯乃乾坤之大造生靈之所益也若夫龍出於河則八卦宣其象麟傷於澤則十翼彰其用業資九聖時歷三古及秦亡金鏡未墜斯文漢理珠囊重興儒雅其傳易者西都則有丁孟京田東都則有荀劉馬鄭大體更相祖述非有絶倫惟魏世王輔嗣之注獨冠古今所以江左諸儒並傳其學河北學者罕能及之其江南義疏十有餘家皆辭尚虛元義多浮誕原夫易理難窮雖復元之又元至於垂範作則便是有而教有若論住內住外之空就能就所之説斯乃義涉於釋氏非為教於孔門既背其本又違於注至若復卦云七日來復並解云七日當為七月謂陽氣從五月建午而消至十一月建子始復所歷七辰故云七月今按輔嗣注云陽氣始剝盡至來復時凡七日則是陽氣剝盡之後凡經七日始復但陽氣雖建午始消至建戌之時陽氣猶在何得稱七月來復故鄭康成引易緯之説建戌之月以陽氣既盡建亥之月純陰用事至建子之月陽氣始生隔此純陰一卦卦主六日七分舉其成數言之而云七日來復仲尼之緯分明輔嗣之注若此康成之説遺迹可尋輔嗣注之於前諸儒背之於後考其義理其可通乎又蠱卦云先甲三日後甲三日輔嗣注云甲者創制之令又若漢世之時甲令乙令也輔嗣又云令洽乃誅故後之三日又巽卦云先庚三日後庚三日輔嗣注云申命令謂之庚輔嗣又云甲庚皆申命之謂也諸儒同於鄭氏之説以為甲者宣令之日先之三日而用辛也欲取改新之義後之三日而用丁也取其丁寧之義王氏注意本不如此而又不顧其注妄作異端今既奉敕刪定考察其事必以仲尼為宗義理可詮先以輔嗣為本去其華而取其實欲使信而有徵其文簡其理約寡而制衆變而能通仍恐鄙才短見意未周盡謹與朝散大夫行太學博士臣馬嘉運守太學助教臣趙乾叶等對共參議詳其可否至十六年又奉敕與前修疏人及給事郎守四門博士上騎都尉臣蘇德融等對敕使趙宏智覆更詳審為之正義凡十有四卷庶望上裨聖道下益將來故敘其大略附之卷首爾夫書者人君辭誥之典右史記言之策古之王者事總萬機發號出令義非一揆或設教以馭下或展禮以事上或宣威以肅震曜或敷和而散風雨得之則百度惟貞失之則千里斯謬樞機之發榮辱之主絲綸之動不可不慎所以辭不苟出君舉必書欲其昭法誡慎言行也其泉源所漸基於出震之君黼藻斯彰郁乎如雲之后勳華揖讓而典謨起湯武革命而誓誥興先君宣父生於周末有至德而無至位修聖道以顯聖人芟煩亂而翦浮詞舉宏綱而撮機要上斷唐虞下終秦魯時經五代書總百篇採翡翠之羽毛拔犀象之牙角罄荊山之石所得者連城窮漢水之濱所求者照乘巍巍蕩蕩無得而稱郁郁紛紛於斯為盛斯乃前言往行足以垂法將來者也既乎七雄已戰五精未聚儒雅與深穽同埋經典共積薪俱燎漢氏大濟區宇廣求遺逸採古文於金石得今書於齊魯其文則歐陽夏侯二家之所説蔡雍碑石刻之古文則兩漢亦所不行安國注之實遭巫蠱遂寢而不用歷及魏晉方始稍興故馬鄭諸儒莫覩其學所注經傳時或異同晉世皇甫謐獨得其書載於帝紀其後傳授乃可詳焉但古文經雖然早出晚始得行其辭富而備其義宏而雅故復而不厭久而愈亮江左學者咸悉祖焉近至隋初始流河朔其為正義者蔡大寶巢猗費甝顧彪劉焯劉炫等其諸公旨趣多或因循帖釋注文義皆淺略惟劉焯劉炫最為詳雅然焯乃織綜經文穿鑿孔穴詭其親見異彼前儒非險而更為險無義而更生義竊以古人言語惟在達情雖復時或取象不必辭皆有意若其言必託數經悉對文斯乃鼓怒浪於平流震驚飈於靜樹使教者煩而多惑學者勞而少功過猶不及良為此也炫嫌焯之煩雜就而刪焉雖復微稍省要又好改張前義義更太略辭又過華雖為文筆之善乃非開奬之路義既無義文又非文欲使後生若為領袖此乃炫之所失未為得也今奉明敕考定是非謹罄庸愚竭所聞見覽古今之傳記質近代之異同存其是而去其非削其煩而增其簡此非敢臆説必據舊聞謹與朝散大夫行太學博士臣王德韶前四門助教臣李子雲等謹共銓敘至十六年又奉敕與前修疏人及通直郎行四門博士驍騎尉臣朱長才給事郎守四門博士上騎都尉臣蘇德融登仕郎守太學助教雲騎尉臣隨德素儒林郎守四門助教雲騎尉臣王士雄等對敕使趙宏智覆更詳審為之正義凡二十卷庶對揚於聖範冀有益於童稚略陳其事敘之云爾夫詩者論功頌德之歌止僻防邪之訓雖無為而自發乃有益於生靈六情靜於中百物蕩於外情緣物動物感情遷若政遇醇和則歡娛被於朝野時當墋黷亦怨刺形於詠歌作之者所以暢懷舒憤聞之者足以塞違從正發諸情性諧於律呂故曰感天地動鬼神莫近於詩此乃詩之為用其利大矣若夫哀樂之起冥於自然喜怒之端非由人事故燕雀表啁噍之感鸞鳳有歌舞之容然則詩理之先同夫開闢詩迹所用隨運而移上皇道質故諷諭之情寡中古政繁亦謳歌之理切唐虞乃見其初犧軒莫測其始於後時經五代篇有三千成康沒而頌聲寢陳靈興而變風息先君宣父正遺文緝其精華褫其煩重上從周始下暨魯僖四百年間六詩備矣卜商闡其業雅頌與金石同和秦正燎其書簡牘與煙塵共盡漢氏之初詩分為四申公騰芳於鄢郢毛詩光價於河間貫長卿傳之於前鄭康成箋之於後晉宋二蕭之世其道大行齊魏兩河之間茲風不墜其近代為義疏者有全緩何允舒瑗劉軌思劉醜劉焯劉炫等然焯炫並聰穎特達文而又儒擢秀幹於一時騁絶轡於千里固諸儒之所揖讓日下之無雙於其所作疏內特為殊絶今奉敕刪定故據以為本然焯炫等負恃才氣輕鄙先達同其所異異其所同或應略而反詳或宜詳而更略準其繩墨差忒未免勘其會同時有顛躓今則削其所煩增其所簡唯意存於曲直非有心於愛憎謹與朝散大夫行太學博士臣王德韶徵仕郎守四門博士臣齊威等對共討論辨詳得失至十六年又奉敕與前修疏人及給事郎守太學助教雲騎尉臣趙乾叶登仕郎守四門助教雲騎尉臣賈普耀等對敕使趙宏智覆更詳正凡為四十卷庶以對楊聖範垂訓幼蒙故序其所見載之於卷首云爾夫禮者經天緯地本之則大一之初原始要終體之乃人情之欲夫人上資六氣下乘四序賦清濁以醇醨感陰陽而遷變故曰人生而靜天之性也感物而動性之欲也喜怒哀樂之志於是乎生動靜愛惡之心於是乎在精粹者雖復凝然不動浮躁者實亦無所不為是以古先聖王鑒其若此欲保之以正直納之於德義猶襄陵之浸修隄防以制之覂駕之馬設銜策以驅之故乃上法圓象下參方載道之以德齊之以禮然飛走之倫皆有懷於嗜欲則鴻荒之世非無心於性情燔黍則大享之濫觴土鼓乃雲門之拳石冠冕飾於軒初玉帛朝於虞始夏商革命損益可知文武重光典章斯備洎乎姬旦負扆臨朝述曲禮以節威儀制周禮而經邦國禮者體也履也郁郁乎文哉三百三千於斯為盛綱紀萬事雕琢六情非彼日月照大明於寰宇類此松筠負貞心於霜雪順之則宗祏固社稷寧君臣序朝廷正逆之則紀綱廢政教煩陰陽錯於上人神怨於下故曰人之所生禮為大也非禮無以事天地之神辨君臣長幼之位是禮之時義大矣哉暨周昭王南征之後彞倫漸壞彗星東出之際憲章遂泯夫子雖定禮正樂頽綱暫理而國異家殊異端並作畫蛇之説文擅於縱橫非馬之談辨離於堅白暨乎道喪兩楹義乖四術上自遊夏之初下終秦漢之際其間岐塗詭説雖紛然競起而餘風曩烈亦時或獨存於是博物通人知今溫古考前代之憲章參當時之得失是以所見各記舊聞錯總鳩聚以類相附禮記之目於是乎在去聖逾遠異端漸扇故大小二戴共氏而分門王鄭兩家同經而異注爰從晉宋逮於周隋其傳禮業者江左尤盛其為義疏者南人有賀循賀瑒庾蔚崔靈恩沈重宣皇甫侃等北人有徐道明李業興李寶鼎侯聰熊安生等其見於世者唯皇熊二家而已熊則違背本經多引外義猶之楚而北行馬雖疾而去逾遠矣又欲釋經文唯聚難義猶治絲而棼之手雖繁而絲益亂也皇氏雖章句詳正微稍繁廣又既遵鄭氏乃時乖鄭義此是木落不歸其本狐死不首其邱此皆二家之弊未為得也然以熊比皇皇氏勝矣雖體例既別不可因循今奉敕刪理仍據皇氏以為本其有不備以熊氏補焉必取文證詳悉義理精審翦其繁蕪撮其機要恐獨見膚淺不敢自專謹與中散大夫守國子司業臣朱子奢國子助教臣李善信守太學博士臣賈公彥行太常博士臣柳士宣魏王東閣祭酒臣范義頵魏王參軍事臣張權等對共量定至十六年又奉敕與前修疏人及儒林郎守太學助教雲騎尉臣周元達儒林郎守四門助教雲騎尉臣趙君贊儒林郎守四門助教雲騎尉臣王士雄等對敕使趙宏智覆更詳審為之正義凡成七十卷庶能光贊大猷垂法後進故敘其意義列之云爾夫春秋者記人君動作之務是左史所職之書王者統三才而宅九有順四時而理萬物四時序則玉燭調於上三才協則寶命昌於下故可以享國永年令聞長世然則有為之務可不慎歟國之大事在祀與戎祀則必盡其敬戎則不加無罪盟會協於禮興動慎其節失則貶其惡得則褒其善此春秋之大旨為皇王之明鑒也若夫五始之目彰於帝軒六經之道光於禮記然則此書之發其來尚矣但年紀綿邈無得而言暨乎周室東遷王綱不振楚子北伐神器將移鄭伯敗王於前晉侯請隧於後竊僭名號者何國不然專行征伐者諸侯皆是下陵上替內叛外侵九域騷然三綱遂絶夫子內蘊大聖逢時若此欲垂之以法則無位正之以武則無兵賞之以利則無財説之以道則不用虛嘆銜書之鳳乃似喪家之狗既不救於已往冀垂訓於後昆因魯史之有得失據周經以正褎貶則一字所嘉有同華袞之贈一言所黜無異繡斧之誅所謂不怒而人威不賞而人勸實永世而作則歷百王而不朽者也至於秦滅典籍鴻猷遂寢漢德既興儒風不絶其前漢傳左氏者有張蒼賈誼尹咸劉歆後漢有鄭衆賈逵服虔許惠卿各為詁訓然雜取公羊穀梁以釋左氏此乃以冠雙履將絲綜麻方鑿圓枘其可入乎晉世杜元凱又為左氏集解傳取邱明之傳以釋孔氏之經所謂子應乎母以膠投漆雖欲勿合其可離乎今校先儒優劣杜為甲矣故晉宋傳授以至於今其為義疏者則有沈文何休蘇寬劉炫然沈氏於義例粗可於經傳極疏蘇氏則全不體本文惟傍攻賈服使後進之士鑽仰無成劉炫於數君之內實為翹楚然聰惠辨博固亦罕儔而探賾鈎深未能致遠其經注易者必具飾以文辭其理致難者乃不入其根節又意在矜伐性好非毀規杜氏之失凡一百五十餘條習杜義而攻杜氏猶蠧生於木而還食其木甚非其理也雖規杜過義又淺近所謂捕鳴蟬於前不知黃雀於其後按僖公三十三年經云晉人敗狄於箕杜注云郤缺稱人時未為卿劉炫規云晉侯稱人與殽戰同按殽戰在葬晉文公之前何得云背殯用師以微者告箕戰在葬晉文公之後非有背殯用師何得云與殽戰同此則一年之經數行而已曾不省覽上下妄規得失又襄公二十一年傳云邾庶其以漆閭邱來奔公以姑姊妻之杜注云蓋寡者二人劉炫規云是襄公之姑成公之姊只一人而已按成公二年成公之子公衡為質及宋逃歸按家語本命云男子十六而化生公衡已能逃歸則十六七矣兒年如此則於時成公三十三四矣計至襄公二十一年成公七十餘矣何得有姊而妻庶其此等皆其事歷然猶尚妄説况其餘錯亂良可悲矣然比諸義疏猶有可觀今奉敕刪定據以為本其有疏漏以沈氏補焉若兩義俱違則特申短見雖課率庸鄙仍不敢自專謹與朝請大夫守國子博士臣谷那律故四門博士臣楊士勛四門博士臣朱長才等對共參定至十六年又奉敕與前修疏人及朝散大夫行太常博士上騎都尉臣馬嘉運朝散大夫行太學博士上騎都尉臣王德韶給事郎守四門博士上騎都尉臣蘇德融登仕郎守太學助教雲騎尉臣隨德素等對敕使趙宏智覆更詳審為之正義凡三十六卷冀貽諸學者以裨萬一焉聖人設教欲人謙已已雖有能不自矜大仍就不能之人求訪能事已之才藝雖多猶以為少仍就寡少之人更求所益已之雖有其狀若無已之雖實其容若虛非惟匹庶帝王之德亦當如此夫帝王內蘊神明外須元默使深不可知故易稱以蒙養正以明夷蒞衆若其位居尊極炫耀聰明以才陵人飾非拒諫則上下情隔君臣道乖自古滅莫不由此也詢字信本潭州臨湘人武德中纍擢給事中貞觀初歷太子率更令宏文館學士封渤海縣男卒年八十五夫九流百氏為説不同延閣石渠架藏繁積周流極源頗難尋究披條索貫日用宏多卒欲摘其菁華採其旨要事同遊海義等觀天皇帝命代膺期撫茲寶運移澆風於季俗反淳化於區中戡亂靖人無思不服偃武修文興開庠序欲使家富隋珠大懷荊玉以為前輩綴集各抒其意流別文選專取其文皇覽遍略直書其事文義既殊尋檢難一爰詔撰其事且文棄其浮雜刪其冗長金箱玉印比類相從號曰藝文類聚凡一百卷其有事出於文者便不破之為事故事居其前文列於後俾夫覽者易為功作者資其用可以折衷今古憲章墳典云爾太子率更令宏文館學士渤海男歐陽詢序夫至理虛寂道非常道妙門凝邈無名爰名爰自太始開圖混元立極三才奠處萬品流形莫知象帝之家未覩谷神之域希夷瑣閉一作閟溟涬封寄及夫鳥迹勃興隱書詮奧至化因茲而吹萬元教由是以開先聖聖襲明道德授受於是混元之教風動天下水行地中矣宗聖觀者本名樓觀周康王大夫文始先生尹君之故宅也以結草為樓因即為號先生稟自然之德應元運而生體性抱神韜光隱耀觀星候氣物色真人會遇仙輈北面請道二經既演八表向化大教之興蓋起於此矣茲觀中分秦甸面距終南東眺驪峰接晴嵐之浥浥西顧太白粲積雪之皚皚授經之古殿密清絡牛之靈木特立市朝屢易仙迹長存物老地靈每彰休應卿雲日覆壽鶴時來樹無窠宿之禽野有護持之獸文始藥井幹甃未墮老君軬車確然不朽至於穿窬盜竊進退自拘似有縶維悉皆面縛昔周穆西巡秦文東獵並枉駕回轅親承教道始皇建廟於樓南漢武立宮於觀北崇臺虛朗招徠雲水之仙間館錯落賓友松喬之侶秦漢廟戶相繼不絶晉宋謁版於今尚存實神明之奧區列真之會府後魏文帝變夷風於華俗立仁義之紀綱崇信教門增置徒侶有陳先生寶熾潁川人夙有幽逸之姿幼懷林壑之趣松風入賞名嶽留連玉皇之道既宏銀榜之宮雲構續有王先生子元言窮名象思洞隱微念在元空纍非外物含神自靜儀聖作師並德音孔昭鬱為宗範周太祖定業關內躬受五符隋文帝沐芳禮謁獲聞休徵逮隋將季政教陵遲六飛失馭四維絶夷羊在牧蜚鴻滿野家習兵凶民墜塗炭皇帝命世應期榮鏡區宇戡難靜亂亭毒無垠廣大配乎天地光華方諸日月數階庭之蓂莢聆鳳和鳴照景星於元雲觀麟郊藪緝禮裁樂化俗移風農夫勸於時雨隴餘滯穗工女勤於蠶績杼柚不空九服韜戈三邊靜析西戎革面東夷獻舞朔南洎聲教漠北盡來王德化遐漸無幽不暢三善克懋非假二疏一有元良萬邦貞固照均天縱道契生知篤尚元根欽茲聖躅以武德三年詔錫嘉名改樓觀為宗聖觀宸扆興念纂胄所先啓族成家鼻於注史得一以靈蹈五稱聖弱為道用柔為至堅損之又損以至於益瓜瓞帛丿糸長慶流悠寖爰初啓祚致醮靈壇自然香氣若霧霏空五色雲浮如張羽蓋七年歲惟作噩月在黃鍾六轡齊驤百辟咸從親幸觀所謁拜尊儀軒后之詣崆洞神農之上石室順法行禮異代同規觀主岐平定精金格之書究玉笈之文知來藏往盡化窮神豫鑒天休贊宏景福法師呂道濟監齋趙道隆玉器凝潤鶴情超遼辨析連環辭同炙輠對揚天旨妙沃帝心乃謂片言小善尚題紺碣矧夫皇輿迂駕挹酌希微大道資始爐錘萬物不有刊勒其可已乎侍中江國公陳叔達朝宗羽儀詞才冠秀奮茲洪筆為製嘉銘有翰林善書大夫言於寮故無名公子曰自書契之興篆隸茲起百家千體紛雜不同至於書妙窮神作範垂代騰芳飛譽冠絶古今惟右軍王逸少一人而已然去之數百年內無人擬者蓋與天挺之性功力尚少用筆運神未通其趣可不然歟公子從容襝袵而言曰僕庸瑣愚昧稟命輕微無祿代耕留心筆硯至如天挺功力誠如大夫之説用筆之趣請聞其説大夫欣然而笑曰此難能也子欲聞乎公子曰余自少及長凝精翰墨每覽異體奇迹未嘗不循環吟玩抽其妙思終日臨倣至於皓首而無退倦也夫用筆之法急捉短搦迅牽疾掣懸針垂露蠖屈蛇伸灑落蕭條點綴間雅行行眩目字字驚心若上苑之春花無處不發抑亦可觀是余用筆之妙也公子曰幸甚幸甚仰承餘論善無所加僕見聞異於是輒以聞見便耽玩之奉對大賢座未敢抄説大夫曰與子同寮索居日久既有異同焉得不敘公子曰向之造次濫有斯言今切再思恐不足取大夫曰妙善異述達者共傳請不祕之粗陳梗概公子安退位逡巡緩頰而言曰夫用筆之體會須鉤黏才把緩紲徐收梯不虛發研必有由徘徊俯仰容與風流剛則鐵畫媚若銀鉤壯則啒吻而嶱嶫麗則綺靡而清遒若枯松之臥高嶺類巨石之偃鴻溝同鸞鳳之鼓舞等鴛鷺之沈浮倣佛兮若神仙來往宛轉兮似獸伏龍遊其墨或灑或淡或浸或燥遂其形勢隨其變巧藏鋒靡露壓尾難討忽正忽斜半真半草唯截紙稜撇捩窈紹務在矜實無令怯少隱隱軫軫譬河漢之出衆星崑岡之出珍寶既錯落而燦爛復走彔連而掃寮方圓上下而相副終始盤桓而圍繞觀寥廓兮似察始登岸而逾好用筆之趣信然可珍竊謂合乎古道大夫應聲而起行吟而嘆曰夫遊畎澮者詎測溟海之深升培塿者寧知泰山之峻今屬公子吐論通幽洞微過鍾張之門入羲獻之室重光前哲垂裕後昆中心藏之蓋棺乃止公子謝曰鄙説疏淺未足可珍忽枉話言不勝慚懼每秉筆必在圓正氣力縱橫重輕凝神靜慮當審字勢四面停勻八邊俱備長短合度粗細折中心眼準程疏密欹正最不可忙忙則失勢次不可緩緩則骨癡又不可瘦瘦則形枯復不可肥肥則質濁詳細緩臨自然備體此字學要妙處貞觀六年七月十二日詢書付善奴貞觀六年仲夏中旬初偶詣蘭若猥辱見示諸家書遍得看尋可以頓醒滯思各甚嘉妙今昔孰為比肩至於興歎耳珍重珍重因書此敘於其後渤海郡率更令歐陽詢記之靜而思之勝事莫復過此氣力弱猶未愈吾君何當至速附書必向饒定須寄信意歐陽詢呈五月中得足下書知道體平安吾氣力尚未能平復極欲知君等闕息比憂散散不可具言不復歐陽詢頓首頓首仲尼夢奠七十有二周王九齡俱不滿百彭祖資以導養樊重任性裁過盈數終歸冥滅無有得停住者未有生而不老老而不死形歸邱墓神還所受痛毒辛酸何可熟念善惡報應如影隨形必不差二年二十餘至番陽地沃土平飲食豐賤衆士往往湊聚每日賞華恣口所須其二張才華議論一時俊傑殷薛二侯故不可言戴君國士出言便是月旦蕭中郎頗縱放誕亦有雅致彭君摛藻特有自然至於閣山神詩先輩亦不能加此數子遂無一在殊使痛心蓋聞不生不滅圓照偏知無去無來冥機虛寂言語既窮心行迹斷利見鹿苑興捅誘之權倚迹鷲山導汲引之路一音稱物隨類得解三達教闡迷途自識慧日騫幽法雨遐濟德暢忍土是謂能仁然喻月譬鏡宜有隱顯髣佛宗極仰資圖鑄道冠域中金剛為大故神塔湧見靈相望先有曇比邱俗姓竺氏本為趙將知若器之難安悟浮生之易盡以榮利為桎梏視名聞為羈絆屏棄喧嘵專修冥寂虛舟觸遠津度罕概元風獨扇息心無侶匡阜北嶺地接層峰日月之所縈回雲霧之所蒸液激白水於紫一作青霄照離暉於石鏡南瞻五嶺北睇九州貞遁忘歸幽棲是卜法師秉心萃止負錫來儀樹宇山間遊情梵表及遷即化藉草巖間有息慈慧永河內繁氏高足稱首人師物匹儀無虛位理必淵湮服道御身宏善備物形性兩忘寃親等觀故異香入室猛獸馴階紹修主業安禪結宇晉光祿卿潯陽陶範慕彼清聲遊茲勝地崇信正道擁篲式閭為出俗之藩籬為入室之榯欐興建佛寺締構伽藍指景瞻星鳩徒揆日剃草開林增卑架巘夷峻一作嵕築臺一作堂疏巒抗殿長廊繞澗斜砌環池一作流冬燠夏涼經行畢備命曰西林是歲太和之一年永公化緣將盡曾無憂生之嗟冥照幽通豈若逆旅之舍其日山房晦寂側塞幡花洞戶疑深鏗鏘音樂歡喜合掌奄然終謝年八十三法師運載㣥品舟梁大法翾羽蠢族咸知締向賈遠法師德高人師道被幽冥能屈萬乘之尊申其再三之敬相望江海獨在伊人言發響依契同符合自爾戒定接式龍象咸泊感不虛至切有歸焉但年代摧薄寺宇凋敝梁天監三年有恩律師聿來憩止掄葺道場大隋握鏡天下文明慧達禪師太原王氏廓六度以為津構四禪以為室世歸至德物仰高韻為善終日匪憚劬勞自東徂西興建佛事爰自金城至於淮水亘陸遵渚莫匪教門宅古棲空因心自遠虛室生白房櫳引靄四部翹誠頭目頂禮禪師報云欲道場營建七間重閣勸募之侶咸百其誠以大業二年爰戒匠人匪日斯就逶迤飛閣秀出干霄延袤層軒俯視無地爐香與峰雲共鬱鐘聲與幽谷合響有頃達公欲往長沙模寫瑞像及刻優填王像即輕舉扁舟俄而旋返所造法身光相殊特勢超鎔楷功踰琢磨丹艧競姿紫銑爭耀力雖人就妙乃神輸大業七年達公寂滅次有東林道生法師樹明因於往劫襲慧果於今生忘己濟物纂修厥緒寺僧智正等以樹道風於長世詒德範於來業莫若勒茲紺碣題以元碑寓言雕篆稽首作領乃為銘曰二儀肇判萬品流形闕愛煩惱繽紛靡寧三彰四倒疒衆惑焦明十纏九結寵辱相驚邅回三界輪環四生欲流長騖薪火不停誰其拯物獨有能仁紆情紆識即果明因開方便門示彼元津雨大法雨洗滌深塵佛日雖隱宏道在人爰有開士粵來萃止鏟迹銷聲為法忘已置想依空求真得理異人載挺大法舟航希蹤祇樹標建道場披蓁剪棘抗陸遊梁切漢干霄含星浴日巖谷虛靜樹林間謐宴坐經行道糧權實法門無二義揆歸一總駕大乘始終竟畢像教有形取諸相質靈宇方固金剛不遷希彞至道緬邈遐年須彌有盡法炬長燃咸慕偈讚敬勒雕鐫元朗字德明以字行蘇州吳人初為秦府文學館學士補太學博士貞觀初遷國子博士封吳縣男夫書音之作作者多矣前儒撰著光乎篇籍其來既久誠無間然但降聖巳還不免偏尚質文詳略互有不同漢魏迄今遺文可見或專出已意或祖述舊音各師成心製作如面加以楚夏聲異南北語殊是非信其所聞輕重因其所習後學鑽仰罕聞指要夫筌蹄所寄惟在文言差若毫謬便千里夫子有言必也正名乎名不正則言不順言不順則事不成故君子名之必可言也言之必可行也斯富哉言乎大矣盛矣無得而稱矣然人稟二儀之淳和含五行之秀氣雖復挺生天縱必資學以知道故唐堯師於許由周文學於虢叔上聖且猶有學而况其餘乎至於處鮑居蘭玩所先入染絲斫梓功在初變器成采定難復改移一薰一蕕十年有臭豈可易哉豈可易哉豫少愛墳典留意藝文雖志懷物外而情存著述粵以癸卯之歲承乏上庠循省舊音苦其大簡况微言久絶大義愈乖攻乎異端競生穿鑿不在其位不謀其政既職司其憂寧可視成而已遂因暇景救其不逮研精六籍采托九流搜訪異同挍之蒼雅輒撰集五典孝經論語及老莊爾雅等音合為三帙三十卷號曰經典釋文古今並録括其樞要經注畢詳訓義兼辨質而不野繁而非蕪示傳一家之學用貽後嗣令奉以周旋不敢墜失與我同志亦無隱焉但代匠指南取笑於博識既述而不作言其所用亦何傷乎云爾王世充竇建德為讐大邦我秦王赫然斯怒罪人乃得班師凱還駐蹕廣武值夜雨作而東南雲際光焰射天燭見觀音菩薩金身畢露三頓首拜瞻喜謂㣥臣曰乃者武事告成天授神祐厥功溥哉遂敕建茲寺因名焉工訖乃樹碣以紀其歲月云爾時武德五年也
