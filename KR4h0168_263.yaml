front:
  text: 全唐文欽定全唐文卷二百六十三李邕三
  hash: sha256:059d9e478de84a772500591bbfeae7cd67392cef3872bc6cb7a1fcd619c39d54
body:
  text: 觀厥好德存樹愛人及烏有情不忘雖小可作夫施及者也則有宗廟加敬墟墓增悲覩物可懷比事斯廣此觸類者也矧乃通感靈變元符聖迹根柢淨土碩茂佛時燭金山之秘影聯玉毫之殊相至若泥日法會茶毗應身妙有雙樹之閒光覆僧祗之眾安可混曜散木比列清林議上茅之挺生喻堅固之神造者也婆羅樹者非中夏物土所宜有者已婆娑十畝映蔚千人密幄足以綴飛飇高蓋足以却流景惡禽翔而不集好鳥止而不巢有以多矣然深識者雖徘徊仰止而莫知冥植愽物者雖沉吟稱引而莫辨嘉名華葉自奇榮枯嘗異隨所方面頗徵靈應東瘁則青郊苦而歲不稔西茂則白藏泰而秋有成惟南匪他自北常爾或季春肇發或仲夏萌生早先豐隨晚暮儉若且槁莖後吐芬條前秀差池旬日奄忽齊同無今昔可殊非物理所測古老多怪時俗每驚巫者占於鬼謀議者惑於神樹證聖載有三藏義淨還自西域逮茲中休信宿因依齊戒瞻嘆演夫本處徵之舊聞原其始也榮灼道成之際究其來也摧藏薪盡之餘或森列四方或合并二體常青不壞應現分榮變白有終示滅同盡昔與釋迦蔭首今為㣥生立緣夫佛病從人大慈感故樹萎因物深悲理然化能分身半枯即是心有合相後茂還齊宜其表正聖神靈貺品彙以變見一攝而稱讚十方者也淮陰縣者江海通津淮楚巨防彌越走蜀會閩驛吳七發枚乘之邱三傑楚王之窟勝引飛轡商旅接艫每至同雲冒山終風振壑宦子惕息槁工疚懷魚貫迤其萬艘霧集岔於層渚莫不膜拜圍繞焚香護持復悔多尤迴祈景福於是風水相借物色同和挂帆啟行方舳駿邁浮山掘起而疏巘慶雲亂飛而比峯雖電影施鞭夸父杖策罔可喻其神速曷云狀其豁快者哉州牧宗子名仲康廣孝惟家大忠形國播清政以主郡儀古式以在人知微知彰有禮有樂別駕扶風竇公名誡盈盛門貴仕懿德令名利用以厚生明畧以營道上交不諂下交不黷司馬宗子名景虛受賢交幹用柔克退遂中律先後自公且觀麟定之詩未宏驥子之任邑宰清和張公名松質藐自稚節忽乎博聞始於能賦而彰中於成器而立牧人通急徇物合權威肅攝於神明慈惠安其父母豈伊政理自有才名莫不淨慮一乘追攀八樹歎徙植而多感惟化生而永懷大啟上緣率心檀施碩德道暉寺主道元上座道絢都維那曇一等皆妙覺圓常什門上首痛金棺而既往駭堅林而在茲鄉望司徒元簡戴元景王元珪張仁藝王懷儼劉元隱沈信詳等夙悟大師深入真際勤行進力護供莊嚴楊州東大雲寺法師希元廣派法流固柢德本戒行有以鎮浮俗利言有以誨蒙求既憑藉於眾心亦謀明於獨得是標靈跡乃建豐碑其詞曰政化之理兮甘棠猶存寶乘之妙兮婆羅是敦欽厥道成兮八相克尊感乎示跡兮一歸可門與佛合緣兮榮落同時歘爾化生兮感變誰思休徵咎徵兮同察不欺流俗莫識兮帛丿糸曠驚疑上人西還兮覯止增悲發皇靈應兮堅固在茲方國傳聞兮想象悽其迴首正信兮頂禮護持優曇千年兮曷足議之恭惟黃屋者異唐堯之大雅精舍者曷釋迦之廣乘將以示崇高宏誘進俾夫壯麗加於四海瞻仰攝於㣥情酌言永圖即理一貫矣大雲寺者鄭國慈緣之所建也觀其肇允枚卜爰適底居所感彌多光靈滋茂固以星晷上憲人統下稽執天物之大中合元宮之妙相豈止宅豐壤盤石州廈屋雲陰沙門玉立而已於是象設巨麗法供魁殊尊容乃神靈眷所仗則有寶座蓮動現身金光不同於凡復歸於靜至使彌留咸華遠人孔殷香饌比肩花葢擊轂一心不起則從願應如二見無物則隨施逾疾故能飛名勝出福履嘉祥昭升累朝發宏歷聖粵我高祖神堯皇帝俟時登庸從觀興感再駕尚軔五轉欲承鳳難疑矞雲龍睇霄極馳睿想於幽贊禱法力於大雄創建漆象一軀植淨根也洎我高宗天皇大帝纘祖匡業繼明德輝萬流澄瀛八風叶律齊致功於化造將有事於岱宗道由是邦言念茲者寺中留綉像一幀實也丁厥則天皇太后奉遺託孤與權改物母儀霸迹閫政神器追惟乾蔭永動皇情明啟度門宣遊覺路乃降綉像一鋪廣也借如崇建塔宇附麗朝闕憑縣官之力散王府之財中使相望匠人經始則有之矣未或介在草澤僻居里閭發皇明於日中落寵錫於天上有如此之盛者也日者通莊載堙繚垣式遏門途弗敞面勢匪宏浮雲在天蝦蟆蝕月具瞻者渴高明之歎歸止者憤翳鬱之心寺主俗姓李氏名婆諦隴西姑臧人也發趣如因彌入禪寂雖獨得斷相而同人有為乃陳詣府庭移牒省闥引仍舊之直矯易恒之枉申報曠祀奔走宣勞終於訟貞成我道勝是以頹牆堙塹焚萊平場廣途褰開曾構踴出嶷若當陽豁若捷徑洛師之道盪胷泠然決渠滎波之水所謂形便得裝嚴具行李榮觀郡邑景矣長史河東柳沖府君道融至和性與元德從心絲譜遊刃翰林推轂演成誓言同事是刊厥懿豈伐於功其詞曰鄭之法宇兮在城一隅大雄應感兮休徵有殊累聖克念兮象設三鋪佛身圓對兮神光發圖乃奉靈勝兮至自彼都面勢推隔兮頹垣朽株南望不及兮鬱然坐拘觀者佇眙兮願履夷途碩德感發兮執心匪渝豈用歷紀兮茲事乃敷刻石傳懿兮表此亨衢夫天之道也東仁而首西義而成故清泰所居指於成事者已地之德也川浮而動岳鎮而安故耆闍以居取於安定者已茲寺大抵厥旨元同是以迴向度門厂田坴於郭右仰止淨域列乎巖巔寶堂岌嶪於太虛道樹森捎於曾堵無風而林壑肅穆不月而相事澄明化城而真梵天猶俗名稱殆絕地位嘗高者不其盛歟麓山寺者晉太始四年之所立也有若法崇禪師者振錫江左除結澗陰嘗與炎漢太宗長沙清廟棟宇接近雲霧晦冥赤豹文貍棟蘿薜帶山祇見於法服寶后依於佛光至請舊居特為新寺禪師洎翼日宏聚謀介眾表之明詔行矣水臬有制邱墟盡平太康二載有若法導禪師者莫知何許人也默受智印深入證源不壞外緣而見心本無作真性而注福河大起前功重啟靈應神僧銀色化身丈餘指定全摸摽建方面法物增備檀供益崇廣以淩雲之臺疏以布金之地有若法愍禪師者江夏人也空慧雙銓寂用同轡慈目相視淨心相續綜覈萬法安住一歸注大道經究上乘理永託茲嶺克終厥生逮宋元徽中尚書令湘州刺史王公諱僧虔右軍之孫也信尚敬田作為塔廟追存實相加名寶山矢攵乎弓冶筆精陶甄意匠留書藏石緘妙俟時候法宇之傾低斯珍價以興葺遠慮將久遺事未彰梁天監三年刺史夏侯公諱祥了義重元別搆正殿紹泰二年刺史王公諱琳律師法賢或在家出家或聞見眼見建涅槃像開甘露門長沙內史蕭沆振起法鼓宏演梵言繼揵槌於景鍾納貝葉於層閣陳司空吳明徹隋侍中鎮南晉安王樂陽王並佛性森然國楨秀者壯迴廊以雲搆蔚聯居以天覆開元九年天台大禪師守護法身澄清悲海嚴幢標聳智火融明襲如來堂坐法華定四行樂而不取三賢登而更遷有若曇捷法師者伐林及樹染法與衣不墜一滴之油有霑大根之雨總管大將軍齊郡公權公諱武福德莊嚴喜慧方便疏寫四部鎮重百城有若智謙法師者願廣於天心細於氣誦習山頂創立花臺有若摩訶衍禪師者五力圓常四無清淨以因因而入果果以滅滅而會如如有若首楞法師者文史早通道釋後得遠涉吳會幽尋天台法界圖於剡中真訣論於湘上具究竟戒敷解說筵一法開無量之門一音警無邊之眾方等有以復悔雙林有以追遠並建場所互為住持惟闕二字禪師者迹其至憑其高起乎雲門絕彼塵網深以為性有習道有因止於心返於照習也者坐乎樹居乎山因也者固習而無因則不住因而無習則不證是以區和正覺阿若冥搜想息而精進甲堅愛除而煩惱殼散百川到海同味相鹹千葉在蓮比色於淨起定不離於平等發慧但及於慈悲故能聞者順其風觀者操其道牧伯萃止皇華洊臻啟焚香之上緣託神佛之嘉願上座惠杲寺主惠亶都維那興哲等皆靜慮演成妙輪轉次因差別而非法隨品類而得根去二見而入流率一心而辦事咸以形勝之會如彼修行之迹如此而豐碑未勒盛業不書安可默而已哉將何以發揮頌聲披揚宿志者也司馬西河竇公名彥澄碩德高闈紹賢遠識器守岳厚撫操冰清屬以師長闋官攝行隨手以家而形於孝友以巳而廣於詩書以重而雅俗自興以明而至道丕若且猶歸心淨土模範佛乘摧憍慢之外幢興開示之真語建謀㣥吏乃命下寮顧蛟山之易疲歎龍宮之難紀其詞曰天地有象聖賢建極宴坐中巖成道西域後代襲武前良作則安樂是依靈鷲是式一想冥契二歸願塞其一金方置廟衡麓開場龍象擁錫人天護香思神賜土靈化度堂重鎮牧伯上游侯王光昭法侶大啟禪房其二幽谷左豁崇山右峙瞰郭萬家帶江千里玉水布飛石林雲起雷激庭際月窺窗裏花臺隨足天樂盈耳其三人與地靈心將法滅既往在此比明齊哲佛日環照牛車結轍連率順風駟驪欽烈訪道追勝形馳目絕其四碑板莫建軌物未宏和合是請佐貳是膺政敷大郡信發廣乘願言有述以訪無能惟石可久與山不崩其五靈昌郡太守邕以法有因福闕二字得真僧戾止神人告祥宜或真空以悟聖或密闕一字以接凡闕一字謂之靈巖允矣真晉宋之際有法定禪師者景城郡人也嘗行蘭若若是者歷年禪師闕一字勞一人逝將辭去忽有二居士建立僧坊宏宣佛法識者以為山神耳因夫山者土之至厚谷者墟之至深水者因定而清林貝葉之經衡廓蓮花之獨人存法立事著名揚空矧乎辟支佛牙灰骨起塔海龍王意金仍舊昔者州將厚具邑吏孔威廣闕一字支保多借器物而送之仍施絹五十匹闕一字若武闕一字阿閣儀鳳堵波光堂大悲之脩舍利之闕二字身之造禪祖之崇山闕二字增闕四字也雲霞炳煥於丹霄即而察之日月照明闕三字二闕二字客植之不生汛於草閒穢於壠上職由律住持入慧之境闕一字繁文字闕一字筆杪於連章闕一字廣門遺刻上座僧元景都維那僧闕一字祥闕一字主安禪或上首闕一字空或出等永言悟入大啟津梁咸高梯有闕一字勝公自照仍依俗諦天長其詞曰倬彼上人巍乎曾嶺冥立福地神宮歲時建置今古齊同磴道邐迤霞閣聆矓其二岳寺台之國闕一字岱之北阜蒲之要陘是人依法闕一字事聯聲哉傳覺以極斯萬其五噫代人以塔廟者即有象也儀像者非有相也邕嘗論之未始諒矣其或執之於我安住為十劫之場釋之於空循捨得一如之智皆所以頌其願酌其心必於無作之時敷宏正法之故俾或禮或見能超因因之緣若我若人盡登果果之業則曷為不應曷道不行豈空寂之門獨階證入事相之地遂阻圓明者哉普光王寺者僧伽和尚之所經始焉和尚之姓何何國人得眼入地龍朔初忽乎西來飄然東化獨步三界遍遊十方烏飛於空月見於水泥鍵鐵鎖降伏貢高長者錦書散除文字深以慾為苦器道實法鈞消一無於太常越諸有於真際豈徒福河灌頂慈雲覆身舉手而安喻四因動足而興復三見或以沉香作炭有枉言者則誘而進之沙末求珠不知其量也則呵而責之香象之行雖極水底神龜之出亦兼陸道因如法如自得定力有作無作冀是福田嘗縱觀臨淮發念置寺以慈悲眼目信義方寸興廣濟心儀普照佛光相纔現瞻仰巳多遠近簪裾往來舟楫一歸聖像再謁真僧作禮祈祥焚香扌叐苦觸塵者庇如來之影牽毛者荷師子之威信施駢羅建置周布繚垣雲矗正殿霞開層樓敞其三門飛閣通其兩鋪舍利之塔七寶齊山淨土之堂三光奪景於製造也未綴於手猗德名也已聞於天中宗孝和皇帝遠降綸誥特加禮數延入別殿近益重元德水五瓶霑濡紫極甘露一斗福潤蒼生乃請寺名仍依佛號中宗皇帝以照言犯諱光字從權親覩御書寵題寶額垂露落於天上飛翰傳於國中其來也廣內慶齊其至也連城歡迓扇憑筆貴獨屬右軍寺為額高更因天子每名晨大眾瞻禮嬉遊上昇門臺直視川墅巒阜山嶙而屏合淮水逶迤而帶長邑屋助其雄商旅增其大茲為勝也曷以加焉和尚口雖勿稱緣乃有以知變易之道迴軒少留眾生可悲菩薩亦病示滅同盡唯識永在嗚呼以景龍四年三月二日端坐棄代於京薦福寺跡也孝和皇帝申弟子之禮悼大師之情敬漆色身謹將法供仍造福度門人七僧賜絹三百匹勅有司造靈輿給傳遞百官四部哀送國門以五日還至本處當是時也佛像流汗風雨變容鳥悲於林獸號於野矧伊慈子降及路人乎過去僧惠嚴等主僧道堅弟子木義等並持床有義失劍無追施法立齋知時明物罔墜舊業克嗣前修攀係儀形建崇塔院植婆羅樹表蓮花臺宛然坐而不言歘爾感而皆應懺則殃滅求則福生雖日月已綿而靈變如在歸依有眾檀施孔多鯨鍾萬斤震覺六種講筵七架開導四生清淨之身更疏俗室盤之飯別構食堂可謂能事畢矣喜願并矣宜八部之宅以致諸天迴首自然樹懸密語印文地現五風轉柔澗之音千燈焰光明之色構之者罪花彫落信之者燋種萌生雷嚮發其六牙珠彩澄其二水州牧杜公惟孝其直如箭其潔如水地壓淮上城遷泗中民勦於勞物集其利長史宗公司馬盧公或清節自公文雅形國或禮容虛已堅操動時臨淮宰薛欽行等或主諾條流庭無置對或子人簡德邑有歡康並堅位大車正信超士興二道之教發一師之因相與累贊經身長懸覺道樹不朽之德宏未來之功是刻豐碑以光盛美其詞曰惟普照之大身兮杖菩薩之右臂粵靈瑞之可聞兮固昭成之難值期一會之來思鳩萬輩之善施宏住持之信受廣事相之該備豁川陸之雲龍雄城邑之頳雉辟天師於九重補人王於十利嘉寺牓之立名寵聖札之題字追已滅之化身了見在之文義貯儀形於空塔存詞謁於金地咎無懺而不除福何求而不致副真僧之貞寶接㣥公之雅器播永日於山河刻巨石於淮泗凡人以塔廟者敬田也執於有為禪寂者慧門也得於無物今之作者居然異乎至若智常不生妙用不動心滅法滅性空色空喻是化城竟非住處所以平等之觀一洗於有無自在之心大通於權實導師假其方便法雨任其根莖流水盡納於海壖聚沙俱成於佛道大矣廣矣不可得而談也嵩岳寺者後魏孝明帝之離宮也正光元年牓閑居寺廣大佛剎殫極國財濟濟僧徒彌七百眾落落堂宇踰一干間藩戚近臣逝將依止碩德圓戒作為宗師及後周不祥正法無緒宣皇悔禍道叶中興明詔兩京光復二所議以此寺為觀古塔為土八部扶持一時靈變物將未可事故獲全隋開皇五年隸僧三百人仁壽一載改題嵩岳寺又度僧一百五十人逮豺狼恣睢龍象凋落天宮墜構劫火潛燒唯寺主明藏等八人莫敢為尸不暇匡補且王充西拒蟻聚洛師文武東遷鳳翔巖邑夙承羽檄先應義旗輓粟供軍悉心事主及傅奕進計以元嵩為師凡曰僧坊盡為除削獨茲寶地尤見襃崇實典殊科明勅洊及不依廢省有錄勳庸特賜田碾四所代有都維那惠果等勤宣法要大壯經行追思前人髣髴舊貫十五層塔者後魏之所立也發地四鋪而聳陵空八相而圓方丈十二戶牖數百加之六代禪祖同示法牙重寶妙莊就成偉麗豈徒帝力固以化開其東七佛殿者亦曩時之鳳陽殿也其西定光佛堂者瑞像之戾止昔有石像故現應身浮於河達於洛離京轂也萬輩延請天柱不迴惟此寺也一僧香花日輪俄轉其南古塔者隋仁壽二年置舍利於㣥岳以撫天下茲為極焉其始也亭亭孤興規制一絕今茲也巖巖對出形影雙美後有無量壽殿者諸師禮懺誦念之場也則天太后護送鎮國金銅像置焉今知福利所資演成其廣珠幡寶帳當陽之鋪有三金絡花鬘備物之儀不一皆光滿秋月色陵渥丹窮海縣之國工得天人之神妙逍遙樓者魏主之所構也引流插竹上激登樓菱鏡漾於玉池金虬飛於布水食堂前古鐵鐘者重千斤函二十石正光年中寺僧之所造也昔兵戎孔殷寇攘偕作私邑竊而為寶公府論而作仇後有都維那惠登發夕通夢遲明獨往以一己之力抗分眾之徒轉戰而行踰晷而至雖神靈役鬼風雨移山莫之捷也西方禪院者魏八極殿之餘趾也時有遠禪師坐必居山行不出俗四國是仰百福攸歸明準帝庸光啟象設南有輔山者古之靈臺也中宗孝和皇帝詔於其頂追為大通秀禪師造十三級浮圖及有提靈廟極地之峻因山之雄華夷聞傳時序瞻仰每至獻春仲月諱日齋辰鴈陣長空雲臨層嶺委鬱貞柏掩映天榆迢進寶階騰乘星閣作禮者便登師子圍遶者更攝蜂王其所由焉所以然矣若不以達摩菩薩傳法於可可付於璨璨受於信信恣於忍忍遺於秀秀鍾於今和上寂皆宴坐林間福潤㝢內其枕倚也陰陽所啟居四岳之宗其津梁也密意所傳稱十方之首莫不佛前受記法中出家湛然觀心了然見性學無學自有證明因非因本來清淨開頓漸者欲依其根設戒律者將攝乎亂然後微妙之義深入一如廣大之功遍滿三界則知和雅所訓皆荷法乘慈悲所加盡為佛子是以無言之教響之若山不舍之檀列之如市則有和上姪寺主堅意者憑信之力統僧之綱崇現前之因鳩最後之施相與上座崇泰都維那曇慶等至矣廣矣經之營之身田厎平福河流注今昔紛擾雜事夥多是以功累四朝法崇七代感化可以函靈應緣起所以廣元河故得尊容赫曦光聯日月廈屋宏敞勢蹙山川迴向有足度四生鎮重有足安萬國豈伊一邱一壑之異一水一石之奇禪林玲瓏曾深隱見祥河皎潔丹雘澄明而已哉咸以為表於代者業以成形藏於密者法亦無相非文曷以陳大畧非石曷以示將來乃命道奐禪師千里求蒙一言書事專精每極臨紙屢空媿迷津之未悟期法主之可通其詞曰西域傳耆闍山世尊成道於其間南部洲嵩岳寺達摩傳法於茲地天之柱帝之宮赫奕奕兮飛九空禪之門覺之徑密微微兮通眾聖鎮四國定有力開十方慧有光立豐碑之隱隱表大福之穰穰夫聖不徒作作必有因化不徒開開必有攝故大事所會一法所傳若天若人或賢或達雖萬牙出地而三獸渡河使不聞者聞未悟者悟豈虛也哉此寺伽藍古廢建國有濮州之像自安業而來及逝將復歸堅守常住人至萬且千飛聲若雷用壯敵國坐如清泰安如須彌有若部人郭賓者生心起謗雙目失明有若部人陳振者興言誑徒喉腫及舌皆追悔自昔痊平在今或沒身為奴或鑄鐘依佛延和初載奉詔改為大相國寺復置額焉先天中內府降財御書題額睿宗通夢靈應肇發臨遣碩得僧真諦載馳載驅乃慰乃止昭宣渥命寵錫神幡吏人候迎法侶圍繞豁廛里羅郊原者不可勝計夫以金仙聖容之表先主感之伐邸嘉名之舊先主標之筆精池水之妙先主躬之故能鍾乾坤激日月景光遐燭德㝢宏覆曷云比也我開元神武皇帝受天元禧祚國傳寶睦九族叶萬邦功濟而業成道光而孝理惠康父子義結華戎寰瀛之濱大輿之上禺禺而戴欣欣而懷逮識路於茲寓目於茲者莫不瞻大明欽聖札仰天性而泣遺澤荷慈民而歎堅林形力者罔告勞檀施者罔辭費莊嚴不獨於示相功德何止於無為碁布黃金圖擬碧絡雲廓八景雨散四花國土威神塔廟崇麗此其極也雖五香紫府大息芳馨千燈赤城永懷照灼人間天上物外異鄉固可得而言也上座知隱寺主元深都維那上智儼皆妙覺圓常對境亡境彌入後地因如得如合之不離混以相濟咸以為他方所至廣法界惟三虛空所至宏度門惟一況乎實相感通之應聖跡飛動之神安可默頌聲闕題紀者巳乃作頌曰佛法住持正教宏益真容見寺先帝書額藩邸鴻名建國前跡我皇孝理我人光澤日月明明家邦赫赫觀妙追遠懷恩惟昔八部莊嚴四天感激以式永代是紀豐石
