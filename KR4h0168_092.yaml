front:
  text: 全唐文欽定全唐文卷九十二昭宗三
  hash: sha256:37ca3b241686c12d71dbd74ff6006d3cc6eb37e5b8dc5ea20a28b6a66237c569
body:
  text: 朕臨御以來十有四載常慕好生之德固無樂殺之心昨季述等幽辱朕躬迫脅太子李師虔是逆賊親厚選來東內主持動息之閒俾其偵伺每有須索皆不供承要紙筆則恐作詔書索錐刀則慮為利器淩辱萬狀出入搜羅朕所御之衣晝服夜濯凝冽之際寒苦難勝嬪御公主衾裯皆闕緡錢則貫百不入繒帛則尺寸難求六輩同其主張五人權其威勢若言罪狀翰墨難窮若許生全是為貸法宜並處斬省所奏差節度副使錢傳瓘馬步都虞傳球部領馬步兵士樓船取二月十日進發各赴水陸攻取淮南卿自到常潤界築牆一所指揮兵士請天軍往廬壽等州應援并請詔示湖南荊襄速入洪鄂應副事具悉卿天贊忠貞神扶正直萬里限江山之遠雖隔儀形一心推金石之堅益明尊戴匡佐無渝於臣節操持遂峻於戎權威望彌高功業居最欲海內之干戈漸戢憤淮南之梟獍未除每賴韜鈐用舒宵旰凡觀陳奏愈念勤勞輟過庭而分總師徒離所部而自施制畫況繼覽東南探報備聞卿水陸訓齊纍挫凶妖頻知勝捷征伐方推於重柄施張克建於殊庸將置升平彌深眷倚但以未誅殘孽尚屬分兵只俟才殪犬戎便當併集貔武用為應副庶叶機謀欽重獎稱再三無巳王延嗣回日巳有詔旨必體豫懷想宜知悉秋涼卿比平安好遣書指多不及朕嗣登大寶統理萬方有推誠待人之心少撥亂反正之略京畿叛亂宗廟震驚采周公宅洛之謀定商王遷殷之業當茲更始式表殊勳檢校太師守侍中兼中書令上柱國越王錢鏐一代偉人三朝元老定衰救亂素存忠義之心濟世經邦夙擅英雄之志鄉兵一起義聲四馳黃鉞初麾江表大定包茅時登乎天府版籍歲貢於有司日月塵昏牛女尋常拱北淮河鼎沸浙江日夜朝東用徙於越之封大畀勾踐之境爾其糾率侯服翼戴中朝選將練兵務農積粟進可參桓文之烈退可守吳越之區寧俾古人專美前史於戲夫差遇顛沛之際罔替尊周仲謀方爭攘之時猶知有漢況爾名德殿此大邦必能宏濟艱難一匡天下豫一人實有賴焉詩不云乎幹不庭方以佐戎辟爾尚勉旃可徙封吳王加食邑二千戶實封二百戶餘如故朕罹此多難播遷無常旦夕栗栗不能自保而況保天下事為朕藩護有望於卿也朕以沖眇嗣守丕圖思我高祖太宗創業之勞憲宗宣宗理平之道何嘗不兢兢業業旰食宵衣上冀紹於耿光次期臻於無事不懈一日於茲五年然近者藩翰未寧兵戈屢動復以星辰乖忒運行斯愆每推愛物之誠深軫納隍之念銷兵罷戰前古之佳猷宥過滌瑕當今之令典將敷霈澤以遂羣倫淮南浙西宣州三道自孫儒結釁以來塗炭益甚井邑多成灰燼里閭變以邱墟父母妻孥不得相保田園第宅無以自安如聞州府急於征徭官吏切於課績徵科闕罕有完膚禁縶狴犴更無生路苛縱如此何以和元氣何以致太平須示優勤將闕富庶其淮南三道管內州縣自大順二年以前諸色逋懸並宜放免自景福元年以後夏秋兩稅委長吏斟酌鄉縣戶人厚薄其有凋殘甚處別議矜放縱有稍可任持亦在薄其徵斂所冀逋逃漸復封境乂安不惟減九重之焦勞抑且顯諸侯之風化又孫儒未平之日兵力方強側近專城固難支敵當不免與之來往時有供須蓋是脅從豈皆情願淮南節度使楊行密位冠侯藩之右名兼卿相之崇自當推厚下之規修睦鄰之好無乘時以兼微弱無恃大而結仇讎應與孫儒蹤跡交涉者並宜免罪不在究尋各保封疆用蘇疲瘵易稱作解史載泣辜庶將罪己之興亦冀從人之欲應京畿及關輔內見禁囚徒除官典犯贓及殺人外並宜遞減敕命分析限赦文到後三日踈放聞奏被褐懷玉固逸代之奇才灌園鬻蔬亦超時之獨行將期致理豈可遺賢應天下山林之中衡泌之際或懸頭刺股枕石漱流有志未言無媒自達者委所在長吏速以名聞仍接借入京委中書門下量才獎用其鄉閭父老八十以上及鰥寡孤獨并瘖聾跛躄者委所在長吏量加優恤庶便棲遲於戲闕天子也如手足之奉軀左右上下動須保持本或不寧亦難知濟凡曰股肱宜體朕意宣布內外咸使聞知維乾寧四年歲次丁巳八月甲辰朔四日丁未皇帝若曰咨爾鎮海鎮東等軍節度浙江東西等道觀察處置營田招討等使兼兩浙鹽鐵制置發運等使開府儀同三司檢校太尉兼中書令使持節潤越等州諸軍事兼潤越等州刺史上柱國彭城郡王食邑五千戶食實封一百戶錢鏐朕聞銘鄧步馬之勳言垂漢典載孔悝之德事美魯經則知褒德策勛古今一致頃者董昌僭僞為昏鏡水狂謀惡貫泄染齊人而爾披攘凶渠蕩定江表忠以衛社稷惠以福生靈其機也氛祲清其化也疲羸泰拯於粵於塗炭之上師無私焉保餘杭成金湯之固政有經矣志獎王室績冠侯藩溢於旗常流在丹素雖鍾繇刊五熟之釜竇憲勒燕然之山未足顯功抑有異數是用錫其金版申以誓辭長河有似帶之期泰華有如拳之日惟我念功之旨永將延祚子孫使卿長襲寵榮克保富貴卿恕九死子孫三死或犯常刑有司不得加責承我信誓往惟欽哉宜付史館頒示天下門下三階彗孛暫移宸極之尊兩曜暗昏始表忠正之救朕臨御寡德妖孽殊常蒙塵於便殿之中受制於逆臣之手奪璽捩指備肆侵淩挾刃揕胸幾罹酷毒閉關行僞則公卿不在其謀懸榜見誣則黎庶不堪其詐害我骨肉殺我嬪嬙悖惡滔天古今未有側陋嘗膽幽憂下宮皇穹降悔禍之靈將相竭同心之德鳳翔節度使尚書令岐王茂貞鎮於右輔首激剛腸有食失匕筯之驚有車及蒲胥之怒關內之沈幾貫日剛納衛兵夷門之忠憤淩雲顯懲邸吏三藩唱義四海協詞咸以密謀咨於上相於是禁軍之內三傑挺生上元假以良時高廟付其英斷月正元日新正吉辰質明而逆首梟懸中旦而凶渠剖裂共申匡復皆著功庸尋下詔書遞行賞典而茂貞既平國難來覲天庭驅武旅而簞食爭迎駐皇都而秋毫不犯推殊功以薦同志留愛姪而董雄師繼筠能稟規程肅清輦轂人神洽慶華裔偕來亦既十旬暨於初夏朕以脫於幽辱復正宸嚴重守寶圖不改舊物上愧於列聖下慙於兆人思宏蕩穢之恩仍革紀年之號庶明有罪皆在朕躬可大赦天下改光化四年為天復元年四月十五日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不原者咸赦除之惟十惡五逆屠牛鑄錢合造毒藥謀故殺人及持仗行劫官典犯入己贓兼以踰濫身名冒優官秩及刑獄之內官吏用情致成冤濫不問有贓無贓並不在原免之限其劉季述王仲先王彥範薛齊偓同謀凶逆徒黨支屬追究未到者不在赦原之例其踈遠親屬素不通連衆知良善一切不問其左降官非與十一月五日交涉者並與量移元敕不在量移者亦與量移巳經量移者更與量移近處其情非蠹政心不挾邪曾經兩度量移者便與復資委中書門下酌量處分流人及降流者與移近處如巳收敘者量才敘用其左降官與流人巳達貶所者或至亡歿家口欲還及須歸葬者任從所便如孀幼孤窮不能自濟者則委所在州府量與優恤發遣先有官者各還本官上帝降靈將安丕祚中朝多難爰有誠臣登好爵以報殊庸尋行令典錫嘉名而溥大慶用表洪勳靜海軍節度使檢校太保平章事李繼昭嶺南西道節度使檢校司徒平章事李繼誨寧遠軍節度使檢校司徒平章事李彥弼並早參禁衛纍著勳勤生知忠孝之源洞識君臣之義齊心瀝血果成復國之功左袒一呼遂定安劉之業叔姪繼先臣之烈彥弼稟大父之規據其大勳曠古難比宜加美稱以播無窮繼昭繼誨彥弼宜賜號扶傾濟難忠烈功臣各加實封一百戶六軍將士並賜號懷忠定難功臣應樓前左右神策及諸軍并鳳翔興德兩道立仗兵士等各委所司準例各與優賞以報勤勞宰臣司空崔允揮涕入朝含酸蒞事防竊發於趨翔之際阻凶謀於談議之閒明大直若屈之機見反經合道之旨忠惟愛我奮不顧家始則裂帛為誓合契禁軍班列之臣忠良景附再安宗社寧愧古賢雖巳疇庸未為報德宜賜回天興祚平難功臣并加實封一百戶仍圖形淩煙閣功著定傾名高死難永言風烈詎廢賞延故尚父子儀贈太師晟贈太尉秀實贈太保瑊贈司徒杲卿贈太師真卿張巡許遠南霽雲等家有主祭祀本房子孫中每家各與一子九品正員官功格一時賞延後嗣既配廟廷之享仍傳棨㦸之門所以勵仗節於千秋勸能臣於百代況新誅叛黨尤景英風武德貞觀以來歷朝配享功臣及安金藏等宜委中書門下各搜訪本房主祭子孫第其勳蔭量其人才各與敘用其有進狀敘陳者委所司磨勘不得令有僭濫關畿不守先帝西巡惟我輔臣首圖義計故收復京城西面行營諸軍都統鄜夏節度使李思恭揚威北鄙決勝東橋佐鄭畋匡復之謀倅岐陽統制之命提戈奮勇運策摧凶終成逐雀之功顯就回鑾之計逮豫初位尚洽嘉謀追矚崇勳宜膺廟食其鄭畋巳有別敕處分其思恭宜委中書門下特與加贈仍配享僖宗皇帝廟廷故西面行營副都統涇原節度使程宗楚故收復京城行營都統行軍司馬前朔方軍節度使唐宏夫各持將節來佐台旌爭鋒而深入王城力屈而銜冤寇壘莫覩歸元之貌空留不朽之勳言念竭忠更隆茂典宜委中書門下並與追贈故南面招討使天平軍節度使曹全政頃當強敵大振奇勳彎弧百戰於陳前奪槊橫飛於馬上天時莫救壯氣空存宜從超等之褒用勸百夫之特委中書門下優與嘉贈有客之詩前經具載繼絶之義歷代所先言念於此豈忘舊典介公酅公各與一子九品正員官其二王三恪後各委有司準舊制修建夫匡國之臣歿身無悔所祈後代雪彼沈冤太和七年故宰相王涯巳下二十七家並見陷逆名本蒙密旨遂令忠憤終被冤誣六十餘年幽枉無訴宜加恩霈用慰泉扃宜並與洗雪各復官資如有子孫在人家隱藏者任自詣闕及州府投狀如非虛謬則與量才敘用故鎮海軍節度使李順節頃歲姦邪亂政慨慷不平偶泄藏謀遂罹橫禍仍遭誣搆被以罪名雖巳行昭雪之文未降褒崇之命宜申縟禮以慰忠魂委中書門下優與追贈寢園之內充奉之閒夙夜兢憂慮有遺闕其諸陵臺令委中書門下切加選用仍令所司給與優料段丁柏子不得別有役使切須優料以時栽殖其每年奉陵諸縣差配芟刈人夫不少殊不切用徒為勞擾自今巳後但每年芟剃之時委京兆府於本縣苗稅錢數內酌量功價支付陵令遣自和雇人夫委拜陵官常加點檢其下宮宇舍委宗正卿京兆尹差官縣司同加點檢修飾務致尊嚴維城之重本枝之良敘敦是先渥恩當厚其宗室子孫自興德行在及光化元年所放出身及合許非時而參選者並委本司準舊例處分施行切令詳實不得致令踰濫仍令吏部切加磨勘修集之人辛勤可閔訪聞旅食動必逾年皆是吏曹及門下省因循致茲留滯始於磨勘遠至進黃自冬涉春不得了絶自今委中書門下切加提舉吏部一事以上並須準舊例程限不得致有淹延自兵興以來吏道全消辦己者或衆恤人者幾希遂使桑柘日摧荊榛歲茂將救黎元之命宜求撫字之仁應兩京畿赤縣委中書門下切加選擇務在得人諸州府縣令録宜三選不得輕有注受切須當以人材畿內編人久罹兵革雖連年豐稔而尚困艱貧念彼瘡痍宜加惻隱應光化元年二年三年秋夏稅合輸納屬府州縣及諸州斛斗草錢等所有逋懸並宜放免不得輒令官吏尚有追徵其去年秋所缺即不在此限郊圻之內兵革以來言念凋殘固宜矜憫差徭人役須羅撓人在司局中之人又宜集事其京兆府每月合差赴飛龍掌間雖是輪差諸縣不免長撓疲人宜令府司於苗稅錢內每月據所差人數目每人支錢送付飛龍司仰自和雇人夫充役途路所先通商是切開畿之地橫賦非宜致物價之益高自商徒之難濟令鹽鐵司及兩神策軍先有兩市雜稅並令停罷自今巳後畿內軍鎮不得擅於要路及市井津渡妄置率稅雜物及牛馬者羊之類其有違犯者有人糾告以枉法贓論諸鎮縣節度及諸津渡訪聞每年興販百姓廣有邀求致令滯停切令兩軍京兆府差人覺察痛斷都市之內屋宇未多聞浮造之人常須更出地課將期招葺宜有指揮應諸坊於公私地內浮造屋宇每月地課不得更有收徵甸服生靈正當凋瘵太倉輸納務在均平儻容厚斂之姦頗失憂人之意自今後太倉所納斛斗仰司農卿準舊例主掌校量之際切在奉公不得先任吏人抑屈百姓朝廷向來舊例止有榷酒喪亂以來遂行賣麴本自度支營利近年兼借兩軍畿甸之人皆言不便所宜徇衆不廢贍軍起今年五月巳後京畿內任自制造私麴仰度支京兆府依舊例於酒店量戶大小逐月納榷沽酒仍酌量隨月依前借軍諸司充諸色支用其兩軍元造麴制下後便勒逐斤減價六月三十日巳前貨賣官麴其私麴不得更貨賣至七月一日巳後不得更賣官麴之限爰自亂離殆將二紀關畿之內掠奪頗多遂令黔首之徒或被丹書之辱眷茲冤抑須杜姦訛舊格買賣奴婢皆須兩市署出公券仍經本縣長吏引檢正身謂之過賤及問父母見在處分明立文券并關牒太府寺兵戈以來條法廢壞良家血屬流落他門既遠家鄉或遭典賣州府曾不尋勘豪猾得恣欺淩自此準京兆府並依往例處分兩市立正印委所司追納毀棄改給朱記行用其傳典賣奴婢如勘問本非賤人見有骨肉證驗不虛其賣主并牙人等節級科決其被抑壓之人便還於本家委御史臺切加察定天下州府如有此色亦仰本道觀察防禦刺史各行條制務絶沈冤堯懸諫鼓禹拜昌言在明哲之尚然實古今之所重況乍袪蒙昧希致和平思謇諤而若療朝飢雖激訐而亦不加罪諫官舉職須務濟時其文武常參官素懷術業者任上封事極言得失必當召見親問所陳其有才識幽深事裨時政者即職升擢或藏器俟時隱於巖谷者委文武朝官所在州縣以行實聞薦舉衆目者實資於綱領總庶務者必究乎本根將尋沿革之宜諒繫張弛之道其有事不稽古官不易方欲正濫原須遵故實應有諸司法制廢墜多時未復舊規者自今後宜委諸司各檢舉條録聞奏委中書門下詳酌處分漢徵極諫朝董陳理亂之端晉策能言詵元貢闕遺之政乃登道廣請舉公平誠在得人以匡不逮應天下諸色人中有賢良方正能直言極諫博通墳典達於教化軍謀宏遠政術詳明者文武常參官及諸道節度觀察等使具姓名聞薦至十一月到京朕當親臨策試擇其可否施行駘背燕毛禮經所重即驗頌繫漢詔所矜克存尚齒之規免致遺年之誚天下高年鰥寡八十巳上委所在長吏切加安恤其有不幸者量與葬送仍存撫孤裔於戲文王羑里克建周邦大甲桐宮用興殷道朕不敢忘六旬之辱公侯宜獎成萬代之功進忠賢以啓政途黜邪佞以懲覆轍庶乎上下共保我高祖太宗之洪基乃眷中州便侯伯會朝之路爰逢百六順古今禳避之宜況建鼎舊京我家二宅轘轅通其左郟鄏引其前周平王之東遷更延姬姓漢光武之定業克茂劉宗肇葺新都祈天永命皆因否運復啓昌期或西避於戎狄或載殲於妖孽朕遭家不造布德弗明十載以來三罹播越亦屬灾廠田坴秦雍叛起邠岐始幸石門以避衛兵之亂載遷華嶽仍驚畿邑之侵憂危則矢及車輿淩脅則火延宮廟逮至逆連宦豎搆結姦凶致劉季述幽朕於下宮韓全誨劫豫於右輔莫匪兵圍內殿焰亘九重皆思假武以容身唯效指鹿而威衆矯宣天憲欺蔑外藩行書詔以任情欲忠良而獲罪雖羣方嶽牧協力扶持拘戎律於阻修報朝恩而隔越獨有副元帥梁王全忠以兼鎮近輔總兵四藩遠赴岐陽躬迎大駕辛勤百戰盡剿凶渠營野三年竟回鑾輅咸鎬載新其宮闕讓圭絶類於閹徒方崇再造之功以正中興之運而又邠延結釁岐蜀連兵上負國恩下隳鄰好焚宮烈火更延爇於親鄰却駕凶鋒復近侵於禁苑抑又太乙游處併集六宮罰星熒惑久躔東井元象荐災於秦分地形無過於雒師爰有一二藎臣洎四方同志竭心王室共誓嘉謀魏鎮定燕航大河而畢至陳徐潞蔡輦巨軸以偕來披荊棘而立朝廷剗煨燼而光輪奐左郊兆而右社稷肅爾崇嚴前廣殿而後重廊藹然華邃公卿僉議龜筮叶從甲子令年孟夏初吉備法駕而離陝分列百官而幸雒郊都此殷繁良多嘉慰謝罪太廟憂惕驚懷登御端門軫惻興感蓋以一人寡祐而萬姓靡寧工役艱疲忠良盡瘁克建再遷之業冀延八百之基宜覃渙汗之恩克俟雍熙之慶滌瑕蕩垢咸與維新可大赦天下改天復四年為天祐元年應依天祐元年閏四月十一日昧爽巳前所犯罪輕重巳發覺未發覺巳結正未結正見繫囚徒常赦所不原者咸赦除之唯十惡五逆故殺人命合造毒藥持仗行劫官典犯贓不在此限長流人罪無輕重一切放免左降官與量移巳經量移者更與量移經兩度量移者便與復資縱元敕云逢恩赦不在量移者今亦與洗滌一例施行如所在亡歿者便許歸葬朝貶官前資官及父母喪服闋委中書門下先與敘用存樹勳庸歿留義烈宜錫子孫之澤永流苗裔之恩庶邀英風以光壯魄武德以來立功效節著在史策兼與搜訪子孫繼嗣量才敘用其近年隨全忠鳳翔迎駕及青州討伐身歿王事者委全忠録奏如未經追贈者與追贈巳與追贈者更與加贈有子及妻在者優與存恤用表始終土木之工辛勤斯極朴斫既刓於斤斧結搆悉冒於梯登轉石如生翦茨就坦或差於軍伍或徵役於他州下不告勞吏皆戮力言念於此先布爾恩應修都邑工匠人夫軍將節級軍人百姓等共賜錢一十萬貫以見在東都諸道上供物充委全忠分給其軍將仍委具名銜聞奏量材酬獎天旋日轉取象神明雷震電升蓋資儀衛稱警前導清蹕至都楯帳赫奕於行宮旗纛披靡於長路建茲班仗整肅無虧稟教揚威宜膺賞賚應自陝州執掌儀仗隨駕馬軍及樓下立仗將士等共賜錢五萬貫以見在東都錢充委全忠分給文修紀律武靜難氛當於建國之辰體爾榮家之志大頒蠟印用慰泉扃應內外文武常參官巳上及節度觀察防禦刺史並與追贈追封先巳有者更加封贈務表哀榮漢宗蕭何周師呂望不有人傑孰拯屯危況茲定鼎之方甫爾建侯之所嘉其勳德一何巍峩回天再造竭忠守正功臣守太尉中書令宣武護國宣義天平等軍節度使諸道兵馬副元帥知府事判六軍諸衛事梁王全忠四溟偉量五嶽奇姿挺將相之兼才行公侯之全孝迎鑾岐邑忠貫於神祇作輔鳳池智周於今昔副豫愛子仍董衛兵既久久而稱芳見多多而益辦一昨痛思國難首建良謀追周官卜雒之規述殷后遷都之策故得會盟咸萃遐爾遄臻分功盡稟於指蹤表位悉歸於心匠躬勤巡撫頻散財糧荷畚鍤以駢羅執斧斤而翕習千門萬戶化雒宅之新宮三署六軍踰西京之舊制人謀既叶天祐相扶俾我眇躬享茲垂拱策勳之典別降麻制處分眷惟良帥活濟疲人果因富庶之基遂創繕修之事表得人之斯理見有開而必先叶節元勳賚爾同德東都留守祐國軍節度使檢校太師兼中書令河南尹張全義保釐東雒二十餘年惠行而藹若春和令簡而煦猶愛日圭璋特達桃李無言勸勤靡憚於身先敬善每聞於國事宮商迭應梓相扶誅茅棘為平坦之田變黍離為垣墉之峻役均甸服莫不子來夙駕而勤陝宮戴星而營新殿講論勳績實為亞焉報功之典別降麻制處分國有大慶先及輔臣僉同既賴於經綸夙夜頗勤於扈從道途久次巳聞啓沃之言朝闥方新更佇謀猷之力裴樞等宜與進改別降麻制處分凡營都邑宗廟為先非託良臣孰能盡禮魏博節度使羅紹威經文緯武本孝資忠奉三百年之威靈搆十二堂之棟宇將親禘祫式畏崇嚴獲展蒸嘗預懷悽感天屬所蔭百代無踈矧我居新尤宜共樂鎮冀節度使王鎔代延勳戚躬尚禮儀採常嶽之王褱椽製棠華之廣第內列雍和之殿外開朱㦸之扉用宏友愛之風切慰睦親之思行鑾所駐供億攸難淹留將及於十旬忠敬備傾其任土陝州節度使朱謙驊騮得路雕鶚逢秋識將臣事君之儀導季父扶天之業仲春迎蹕西自於閿鄉閏夏撰行東及於都界饋獻有豐於國制贍濟盡費其家財卓立茂功宜膺異賞並別降麻制處分伏思明祖之幸蜀都旋闕則恩施父老代祖之駐陝服回鑾乃澤布州閭德祖之巡梁州沖人之省華郡前則以興元列號後則以興德標名矧乃甘棠抑惟右鎮俾新稱謂用慰藩方宜追列聖之舊文兼循往年之近事宜改陝州為興唐府長史為尹其所置官屬一準興元等例其將士等仍賜錢三萬貫充優賞委所司逐便支給其潞州節度使丁會左創文昌之省右新執憲之臺軍令嚴明興功迅速河陽節度使張漢瑜宵程來覲兩舍不歸問彼春芳躬巡板築宮庭馳鞠蓋閲驍才王處直遠罄規模備周場殿則有留陽上相獻嵐谷之王褱材浙右元侯貢夏金之三品咸鎬緝繕完之政荊襄開水陸之途豫章傾尊獎之心鄂渚竭忠貞之懇潭桂守弭兵之略甌閩勤納貢之儀夏川孤立以安邊朗陵兩州而效悃嶺表則番禺盡節海濱則青社自新交馳陝澠之途並集㵎瀍之闕嗟朕菲德何以致茲履薄臨深莫申兢畏其諸道藩鎮牧守並委中書門下等其功績進改處分禮儀使御營使各與進階執政乖方自罹衆怒任使斯久忍忘舊恩故太子少傅崔允頃者朕在下宮實輸忠節後全忠迎奉又罄裨謀不慎滿盈遽投於覆餗今逢曠蕩興念於遺簪宜復本官階爵準天復四年正月十四日巳前從別敕處分夫為下不二為上不疑適當樹雞之辰將陳刑馬之誓咨爾藩嶽敬聽朕言敦好睦鄰諸侯大義興兵動衆有土深災居人不保家室戰士身膏草野為人上者何所忍焉恃安者危逞欲者敗齊桓葵邱之會但整衣裳晉文踐土之盟唯論職貢古賢雖遠仰止何殊如有鄰境自相攻討情理不容者先具奏聞朝廷為平其事理若有不用王命擅舉兵者委諸道共伐之含垢匿瑕國君所尚雷驚雨洗域內斯同乾坤盡欲其包容日月不私於照耀其有負江山之固納奸諂之謀雖恣猖狂或思改革禹誅後至豫不忍為舜用舞干竊所景慕如其執迷不悟長惡不悛國有刑章非朕能捨禍福二事審自擇焉李茂貞楊崇本頃朋閹孽罪巳貫盈近抑強鋒謂知大德喘息才緩翻覆如初嘗懷梟獍之心欲恣豺狼之噬劫脅羣下安忍不臣此而可容是隳王法即宜經略進討然念彼一境獨困凶殘罪止二人之身其下並許立功自贖俟續處分人倫之閒天性或異特起因心之孝獨堅匪石之貞方遷國於土中貴廣教於區內應天下有孝子順孫義夫節婦事績彰顯為衆所知者仰所在長吏標録聞奏當與旌表門閭將安疲瘵須委循良共理者太守之能親人者縣宰之任戈鋋稍戢政術為先刺史縣令有勸課農桑招復戶口一倍巳上於前者委本道觀察使條件奏聞當加進陟如貪墮不理害及於人者速使停替務加葺養稱朕意焉思拯艱難實資材幹尚慮非常之士猶懷自進之嫌苟或失人焉能致理倘有懷才抱德隱遁山林武藝絶倫湮沈卑賤者仰所在處長吏察訪奏薦如得才實當待以不次之位於戲肆眚閶闔即安宮闈雖九廟几筵巳開於新室而諸陵松柏遙隔於舊都將務乂寧難申顧慕文武百辟執事具僚從我千里而來竭爾一心蒞政恩覃既往效責從新方當開國之初必舉慢官之罰分茅邦國外相大官愍茲多難之時無爽勤王之業協告元輔毗豫一人礪山帶河敬守漢高之誓卜年與代希同穆滿之言永安新京無忝我高祖太宗之景命赦書日行五百里布告天下咸使聞知
