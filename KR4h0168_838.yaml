front:
  text: 全唐文欽定全唐文卷八百三十八薛廷圭二
  hash: sha256:d8235683342baf875ef6fb5a1f47d0a4ec31a75bc97d3b691c79607cf025a3c1
body:
  text: 敕君子之風尚摧秀木陽翟之俗必誚秦人古嘗病之今孰免者爾光啓洎贊皆以麗藻雅文獨行當代孤標清峙見譽名臣丹青翰墨之林舟楫文章之海道之將至論者許焉屬爾良知罹其貝錦惑豫觀聽罷去鈞衡爾光啓等咸被指名置其連坐無辜去國吞恨投荒而聞流落五年窮達一致書空永歎問鵩何之人實有言用懷愧恧雷雨作解日月無私今也其時吾將補過徵還朝列將復亨衢階序徽章因仍舊貫光啓洎贊知豫意焉可依敕乃眷西梁為吾右地襟帶河曲屏制蕃使厥土豐穰其俗信厚委之鎮撫率仗勳勤不有奇材孰膺妙簡具官馮繼文傳符圯上擅價山西敦詩書設預備之謀修禮樂為戰爭之器能知軍志雅有戎容明斥候而辨孤虛恤士伍而愛君子決戰百勝彎弧六鈞動惟鷹揚靜則山立乃者仗其韜略錫以土疆旌旗啓行蛇豕當路既沮已成之命能安靜勝之謀欽屬久勞名器斯在爰升喉舌再統貔貅復我舊恩成爾夙志防禦西夏控壓三州爾其敷我憂勤宣我教化無禮必敗好戰則亡戢兵而善撫疲人殷備而自求多福祇豫恩寄佩我訓詞報政可觀陟明斯在可敕具官某等總六尚於瑤墀分一麾於劍閣時之妙選我有人焉以肱代濟科名業傳儒素弱齡勤苦壯歲邅回本推讓以待時竟漂零而從宦凌雲之稱徒見譽於公卿棲棘之悲且未伸於霄漢以璩聯芳鼎族歷試宦途使星屢應於旁求卿月再當其茂簡朕方將左蜀坐委信臣言爾有材可使共理亦聞操剸雅適變通俞其奏章是乃良牧惟茲殿省及爾郡符勉承刈楚之恩各勵業官之志眷言郡政在去煩苛俾我遠人再蘇皇化在璩之此行也得不勉歟可敕具官聞爾充公相令子敦書業文有德守行科第好爵公論許爾如拾地芥而孝於事親志在祿養束書投筆甘從下僚縉紳之倫服爾異行逼之名器其心確然且曰親念其兄官未達采蘭負米願悅晨昏而允祁節著勤王功高捍患心如皎日節貫秋霜屢委郡符猶同畫餅忠臣孝子朕不敢忘勸善奬功於是乎在海隅之郡各狥乃心嘉我遠人今得良牧勉於從政豈俟訓詞各敬乃官無忝休命可依敕成紀要衝江油奧壤皆為重地今實優賢擇其守臣必有所謂以爾具官梁思謙等負通變之材蘊縱橫之術見可而進頗習於武經聞善若驚暗合於儒者或從奏薦或恤滯淹戀我者移其一麾致之近地阻兵者換其五馬惠彼疲人各俾分憂勉思布政清賢繼踵惠化洽聞苟奉成規是為良牧惠茲惸獨往歌袴襦文晟思謙服我明訓無忘勤恪戒於煩苛黜陟幽明典憲斯在五兵五教仍以假之可敕朱謙等以謙一心許國四面受敵忠勇既完心城甚固而陽言從征戍亟效勤勞淹留屢變於時辛苦未歸於汶上惟鋌言罷百里承乏一麾亦聞政聲可使共理朕每思達聰明目以臨御寰瀛仗豫有土之臣為我求人之瘼樂得良牧惠茲遐方並俞奏章各委頒瑞惟爾謙等欽豫訓詞罔難惸嫠罔冒貨賄式遵典憲阜安遠人天聽甚卑愆則有辟可敕鄜之連帥以金紫光祿大夫前翟州刺史張績閩之守臣以銀青光祿大夫前新州刺史虞戀來告我且言績等求瘼分憂居其所部訓戎蒞俗政有可觀欲人聳求理之心請我行陟明之典茲為急務聞斯行諸邦教夏卿國之崇秩爰詔執事分而授之咨爾二臣膺我並命循名責實得不勉之可敕廣漢上腴臨卭古郡眷求牧守允屬忠勞具官王宗夔等或鶚立轅門或鷹揚玉帳負偃革銷金之術蘊經文緯武之機贊我藎臣鎮於全蜀既練軍志仍通政經干將溢匣而有聲騏驥追風而絶跡今俾爾分吾憂寄養我黔黎爾宜拔薤推心掛魚潔已勿為重斂戒在虔刑務復憲章無取禍亂允祁奚之內舉撫文翁之舊封敬服訓詞勤恤人隱而無息亦佩專城之印往俞連帥之求無忘酌泉勉務為政黜陟之典朕不敢私惟爾三臣礪乃一志與我共理期乎有聞敬之戒之自求多福可敕具官趙儒等或以言罷兼官或以來陳厥貢俱懷吏幹思振宦途即俞所陳各徇其請珥貂佐郡咸謂殊恩宜思舊章往佩殊寵可依前件敕具官溫潞等以潞常佐元戎有聞東魯會計參畫聲猷藹然以壇宗室菁英詞場秀造撫青雲而抗足丁艱運以隱鱗跡滯江湖價高甲乙方從梗泛言奉弓招贊我勳賢開其淹恤而銖亦以將命頗謂有勞俞其奏章各俾序進星郎侍史洎尉于縣屬者服我恩命各宜勉之可依前件敕具官徐罕等通材應聘利刃從軍贊畫允臧吐茹得所伸於知己達我聽聞今朗陵汶陽方纒兵革式佇和寧之報尤資樽俎之謀星郎柱史洎紫金之命則其二句疑俞奏薦各懋寵光勉酬所知共偃兵革無屑於蚤暮也可依前件敕乃眷雕陰仍歲征討厥土既塉其人用勞誠節是圖貢輸無怠而堅等能奉連帥來為使臣不有超升孰旌優異五兵重秩式耀賓階下與夫進典午丞郡之榮者皆拔茅連茹之謂也可依前件敕具官某等嗟乎爾荷丞相之子也棲遲府縣汨沒風塵美蔭成蹊孤根委地矧吾戚屬茲用軫懷聊效牛刀式遂雞口顏而下則轅之門吏也自陳去職久困家食俾佐方州各均祿仕而荷峻其階序飾以章服吾不能無私於親親之道也可依前件敕具官某等青社霅溪之守臣各修職貢俾爾來朝實冒險艱所宜酬奬有以兼廷評之命而許留於官有以移掌庾之秩而與夫掾臨海者皆遂爾晝錦之榮也可依前件敕孔競等或連帥奏請或郡守薦揚或勞績可稱罷免斯久能自陳列動我聽聞宰邑糾曹皆其任也可依前件敕具官某等外諸臣有政事可以稱家父位尊功大不求聞於時者可謂能處其身而協進趣之道矣而師保元勳燕居轂下以遺落之才廣朕聞聽亦深得大臣之體裁惟茲二事朕實樂聞爾克柔能以政經葺吾舊許薰人蒞俗遠至邇安而戎前佐大藩休有淑問盤錯斯驗鋒鋩有餘或嘉韜櫝之心或允求伸之志大臣子弟朕豈無私元勳薦揚朕豈不信上公進律少將通班階序徽章旌別優異惟爾克柔與戎宜知朕寵待汴帥全忠與太保鋋之意而勉於從政立朝也可依前件敕內省華資司賓重任宮朝之選歷代攸難我今得人爰舉茂典具官劉處宏冰霜勵操松桂騰芳弄筆硯以飾躬考詩書而勵行遂為端士自闢亨衢在公馳幹事之名銜命得使臣之體輩流推許達我聽聞宜示優恩以旌修整況遐方即序重譯來庭尤思周敏之才用副綏懷之旨兼榮內省仍進崇階敬佩寵光往共乃職可依前件敕具官劉益謙惟爾參我樞近之務副我腹心之求允謂才難克彰試可委任斯重端莊有聞冰清繩直潔已蒞事數馬而對問樹不言稽爾秉持稱吾宥密是用升之峻級置彼崇班且酬職勞式示優寵宜保優異勉圖始終敬慎不愆必致遠大可依前件敕內官晏希伯內外之任必惟其人遷擢之恩允屬試可以爾南圭無玷東箭有筠山明見松雪之姿天靜聳嵩衡之勢詩書內積儒雅外彰聞其恭勤可委事任階秩並進眷矚斯深勉服寵光往勵職業可敕具官張居翰等守道立身執中事我造次不違於善行錙銖必本於典章藏器未伸彈冠待進吾今知爾爰用加恩升階序而遷品秩振堙沉而示恩澤唯爾居翰勉於致身往服寵光匪懈夙夜可敕設階陛所以示堂奧之嚴正品秩所以明躋陟之漸也率由次第以序忠良苟當其人吾必與進爾從朗止水藏鑒壺冰孕清蹈禮樂以修身耽詩書而養志夜親墀廡拱辰之列宿分華曉近冕旒捧日之卿雲配潤動必中矩行無越思歷試可觀序遷惟允九重華省三品崇階用酬爾勞往馭其貴惟爾從朗服吾寵光立事檢身所宜匪懈可敕國家設翰墨之林延髦碩之士以潤色鴻筆發揮王猷妙選內官修辭立誠者以與我言語侍從之臣朝夕遊處膺是簡拔實惟重難而具官文晏常夢綵毫亦吞文石富有事業志於討論孔光之問樹不言石慶之數馬而對濯濯春柳風標逈出於輩流落落長松節概不移於霜霰自擢居密署言奉詞臣所為當材且聞稱職縻之好爵貴則號其將軍峻以崇階勳莫重於光祿敬承寵渥往蒞清華率由此途以至崇達惟爾文晏得不勉之可敕出膺使命入奉宸嚴惟茲簡求允屬心膂爾可方將命而去成功以還別利器於盤錯之間驗潔矩於脂膏之際試可斯驗願吾愛之俾其序遷並謂至當徵還內省冠以豐貂惟爾可方勉圖懿效可敕昌裔參我樞機奉吾指顧能慎密以植志端莊而飭躬動畏四知潔無二過委注斯久霜雪不渝職勞可酬序進惟允升其階秩示以優崇爾往蒞之益敬其事罔懈砥礪稱豫渥恩敕張禹圭本以端莊飾之儒雅鵰鶚負橫秋之勢楩柟擢構厦之材蘊是器能在豫左右歷試事任亟涉光陰聞其恪勤宜示優奬階級秩序俾之俱遷服我新恩保爾懿效雖覆一簣古人有言爾宜知之勉自勗率可敕昭裔干鏌銛鋒驊騮逸步文之以禮樂飾之以詩書白玉無瑕朱絃讓直拱我宸極粲如華星慎爾樞機不對溫樹歷試茲久其才益彰移之崇班加以峻級且旌優異用激端修敬怠不同崇高可致惟爾昭裔知豫意焉可敕具官楊行密妻朱氏作嬪藩翰宜爾室家六姻以寧四德具美俾我行密為吾藎臣統戎有方述職無怠繄爾輔佐致之輯柔慶澤所加序進惟允全燕列壤大國疏封式示寵榮以旌賢淑可進封燕國夫人敕具官某難進易退賢士之操也爾某議禮容臺浸有休問汲汲焉以外服為請雖留行不顧也將指奏公亟頒召節則舒遲纍月翔集可觀是不謂之士操歟郎闈之選南宮最清往其欽承踐修爾學可闕二字包犧設教畫卦闕八字弧矢於焉利用闕二字二闕五字蓋殷周之前將相共柄洎秦漢之後文武殊途至若綱紀彞倫範圍庶品闡揚至理崇樹鴻猷則用武之闕三字獨濟若夫撥亂反正闕五字衛闕二字勳濟王闕一字則闕七字諸至於大義至公開物宏務感召和氣庇育㣥生其揆一也夫物窮則變否極則通時雖類於循環事闕三字合闕二字雕虎闕八字而闕五字理闕八字方勘定遂生翦起韓彭扶丕闕一字以凌霄翼真人而御極風雲之會影響無殊闕六字之期闕五字帝應闕十四字豕於大田斷修蛇於廣陌則有故昭義軍節度澤潞等州觀察處置等使開府儀同三司檢校太師兼闕三字潞州大都闕二十四字焉公諱從周字通美其先濮州鄄縣秦邱里人也禮也曾祖阮祖遇賢父簡贈兵部尚書惟公世方管晏緒接神仙負山闕二十九字勵越石著鞭之志生知韜略時合孫吳韋弦淡爾而酌中文武居然而兼備素業唯觀於大略壯圖潛闕三十二字以騰驤鵰鶚在天而闕三字家刑國鵲文兆忠孝之名原始要終血字表公侯之分實為天縱闕六字自太祖闕二十二字之鋒於是附鳳攀龍策名委質伐蔡之役戰酣太祖皇帝闕三字之變時闕四字公奮闕二十二字谷之隻輪不返而又青亠兊三寨鯨鯢萬人勦戮無遺輜重皆棄鞏約面縛而授首闕一字唐魄闕六字赤闕四字濮闕二十四字齊山僵尸蔽野以功闕一字檢闕二字部尚書時溥復統全師碭山下寨康村接戰全軍闕九字返又轉檢校刑部尚闕二十三字通上黨蕃戎喪膽闕五字改授懷州刺史屢立殊勳繼膺賞典又假吏部尚闕二字纍遷闕三字州刺闕六字使闕二十四字落落領二千騎闕五字馬步二千殺戮殆盡生擒落落奪馬三千又殺蕃闕二字汙闕五字自闕三十一字後尋授節旄假闕五字昭義兩使留務蕃軍周揚五之衆結寨連營去闕十三字俄而闕二十六字而身先幽滄克闕五字乃授宣義軍行軍司馬俄代丁會入潞州俘戮闕四十二字下凡經八日納闕五字加檢校司徒又入井陘攻討并部降李洪範已闕六字兼加徐州闕三字氏闕二十八字致力闕九字中遘沉痾於邊上明年青齊之衆復陷亠兊州闕三字戎捐軀濟難太闕四十字加太子太師食邑二千戶闕二字之念勳勞乃眷疾恙爰降優禮闕十七字旌頌之闕五字別墅闕三字山恩異闕七字代未之有也俄而美疹滋深醫和弗療天闕二字遺人之云亡恨狠闕一字之闕一字尚存指為闕十四字江淹之筆闕十字勒闕四字即以闕四字十月三日歸葬於偃師縣亳邑鄉林南里之別墅賵賻贈含君恩闕十四字尉有子五人闕九字夫檢校闕一字部尚書闕四字將軍同正不仕次曰彥勳金紫光祿大夫檢校兵部尚書前守洪州別駕不闕一字次闕十二字尚書刑部員闕二十字尚書守左驍衛將軍次曰彥浦殿前受旨銀青光祿大夫檢校太子賓客燕闕十五字克闕二十四字英飛龍使充西京都監銀青光祿大夫檢校尚書左僕射守左武衛將軍闕二十六字孔循闕十二字司徒左威衛上將軍連榮貴戚迭照閨門玉鏡臺前匪獨推於闕二十七字兼闕十二字禮以竭情臨襄事而銜恤始終部分薰灼一時斯又見天闕一字照答之重杳也皇帝臨軒軫悼撤闕一字廢朝闕十三字伊昔皇唐運終百六兵革闕二十二字其一闕二字我梁受天明命間生材傑克靖災眚武德孔昭和闕十二字其二闕十四字戰酣馬逸土失銜勒下車策之傷面克敵其三青亠兊三寨鯨闕二十六字其四凡茲大勳傑出十亂炳若丹青著於史傳闕一字外畏威闕十一字其五闕十二字增闕三字飛蝗越境猛獸遁去軍食袀服盈羡廂庾其六統衆出師寬猛相濟闕六字照闕十六字其七悠悠丹旐軋軋轜車萬人之敵六尺之軀瞥如石火去似隟駒闕四字誰其問諸其八闕七字秋露如珠灑君闕二字平生氣豪命世功夫金瘡猶在䏶肉永枯其九邙山之隅闕二字之裔許國壯心磨天逸勢威聲闕二字昏衢迢遰長辭魏闕永謝明世其十維乾寧四年歲次丁巳三月癸卯朔十七日已未皇帝若曰夫立愛惟明建明建善則固先王茂躅有國丕圖承祧仰鏡於前星守器式當乎長子遐瞻載籍覿洪荒雖步驟隨時質文異制逮於傳序罔不率循國家高視百王同符三代平一區宇統和人神垂三百年歷十八葉暨朕寡昧祇荷景靈屬天步艱難岱宗牢落蒸人未乂舊典爰曠庶尹卿士藩輔元僚思正儲闈式固鴻業咨爾長子德王裕象叶增構明啓少陽溫文在躬睦友成性博聞強識無愧於老成學禮讀書庶資乎師訓乃輯㣥議爰咨舊章是用命爾為皇太子嘻育問承華重輝望苑永貞萬國明照四方入則有師出則有保無怠三善往崇四術務親正人誡近邪僻淑慎爾止峻防所歧一作攻勉植厥猷罔墜丕訓維乾寧元年歲次甲寅十月庚申朔十四日甲子皇帝若曰粵昔漢頒魯國魏錫常山繇鍾愛以分封亦旌賢而別壤前王茂典歷代成規朕今嗣守不敢失墜咨爾第七女蘭芷芳猷肅雍懿範坤順之性體於自然天倪之資稟於陰教不明爾德孰慰我心爰稽舊章俾率彞訓乃疏湯邑仍錫粉田所以示鳲鳩均養之仁樂螽斯宜爾之慶夙興夜寐無忘女史之針下氣怡聲勉習家人之禮女儀婦道可不慎與
