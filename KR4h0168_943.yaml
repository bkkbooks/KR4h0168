front:
  text: 全唐文欽定全唐文卷九百四十三杜光庭十五
  hash: sha256:fedf89631db1b96985a2988e681b29fe7be9eac90629ba21c93e35fc25b4f433
body:
  text: 伏聞大象既分三靈設位各稟自然之道俱垂不宰之功無為則天地長存有用則衰榮易變吉凶悔吝由此而成於是南極丹篇生名所繫北都黑簡死録所歸二宮之考校無私萬化之死生有屬臣夙資善貺獲履昌時沐浴皇風稟承元化但慮運心動念乖越五常纍過積非彰明二簡五行三命陰陽有刑剋之期暗曜列星遲速有照臨之數未申祈懺因結災凶敢以吉辰虔修醮禮虛壇夜靜靈化晨清元念必通真靈可降伏冀丹臺六聖司命開延永之符元極七真大帝除促齡之日憂危自泰年祿更增幽明同浴於殊恩眷屬咸均於巨福公私貞吉老少乂康即永荷二宮衆聖罔極之恩不任伏以瑤闕琳宮星房羽殿森列三清之上宏開八景之中萬彙之所朝宗㣥真之所遊息於是裁模世域垂象人寰周穆西歸掖層臺而結宇漢皇南矚遵太乙以疏基由是仙觀靈墟駢羅海嶽風簷霞棟煥麗煙林為真聖之所棲亦福祥之所萃頃以龍興觀肇基隋運歷載唐年日月既深凋摧云久是用鼎新營構特懋功庸况越嵗時深虞撓觸爰申醮酌安復龍神所期國泰民和時康俗阜克隆鴻祚永錫元休不任虔祝之至粵若二氣是分五靈惟龍司造化之機運降升之妙寄神功於乾象孕元德於坎宮昔我祖明皇巡功蜀甸果聞飛躍實效禎祥爰俾濬池用資安處今則年光遞易堤址荒殘草積波痕砂封泉脈應靈未爽肸蠁猶傳每垂霖雨之恩以濟嗇夫之望眷言故實深用軫懷朕寡德承圖撫時有寇省方巡俗尚駐坤郊龍其申彼霆威震其風令掃渠凶於北陸清氛霧於中原克洽理平永臻多福不任臣聞元穹廣覆無勞仰祝之辭碧海周涵亦納涓添之露敢緣斯旨輒罄明誠某月日是皇帝生日本命甲戌之辰錫祕記於先天豫昭靈貺湧珍符於厚地潛契明文卜年開萬葉之榮推策彰百神之助爰申大醮虔俟鴻休集三元萬聖之祥永北極南山之壽昭明丹懇恭望元恩臣某不任稽首虔祈激切之至伏以道化無方真仙有應於恍惚希微之內示元黃變化之容下盼塵寰以度㣥品考諸事跡載彼經圖所以丁令歸時曾窺丹頂蘇耽降日亦顯霜翎流萬古之美談標當年之瑞牒今者忽聞靈鶴棲止雲峰乃元元行化之山是彭祖升天之所元壇蘙薈久無焚薦之蹤林木陰森果致感通之事實聖朝之上瑞豈藩閫之所招願祈山壽鶴年以奉龍圖鳳歷遐瞻煙嶠伏切歡愈冀憑奏醮之儀以達歸依之懇謹差賜紫大德上官知真兵馬使王承琛精誠香火上告真靈不任歸命虔祝之至伏以稽考前王握圖受命必荷元貺以贊鴻基頃屬海嶽多虞生靈靡託遂膺推戴奄宅岷嶓四方之琛貢雖來中土之山川或阻凝懷求理夕惕晝乾砥礪戈矛申嚴號令佇行弔伐以拯顛危非有尚於佳兵蓋欲靖其多難以茲軫念倍用焦勞而郡國諸侯頻獻祥瑞鱗介羽毛之品藂林竹樹之間或挺質稱奇或成文顯跡每加撝讓纍抑奏陳永平二年秋七月於仙居雲山獲古篆銅讖乃太上通天之記是章真所鑄之文名姓生辰子孫年數重重顯迹一一合符周公探策之求郭璞揲蓍之得真為天授克驗神功顧寡昧以多慙豈欽承之敢怠是用創新觀宇別署嘉名備像設之儀改鎮縣之額齊修金籙醮啓瑤壇雖陳昭報之誠難答上元之賜章真人親緘祕字李真人首鎮仙山共洽休禎光於郡國須展褒封之禮以旌贊助之功爰舉彑章式陳歉欵今封章宏道為鑒聖真人封李八百為元應真人謹遣廣成先生金紫光祿大夫左諫議大夫蔡國公杜光庭精備香燈虔申醮告伏惟闢九清之日闕降八景之雲輿俯鑒明誠滂流惠渥俾九州六合蕩氛靄以為家地久天長混車書而成化式遵元訓永勵丹襟不任虔祈之至惟君名標丹簡天付仙寸人間之玉軸珠軒何嘗眄顧物外之雲棲霞飲自得貞閒早受靈書精窮緯候鉤深索隱藏往知來鏤銅篆於仙山證金行於蜀國二百餘年緘祕蹤迹長新五十八字周旋禎祥盡驗顧惟薄德祇奉靈休雖揆構華居崇嚴塑貌新邑市之額展齊醮之科尚歉素懷未酬元貺爰申典禮特舉褒崇今封君為鑒聖真人謹遣杜某虔啓霜壇恭申昭告鸞輜鶴轡將從文始之遊緑室瓊幃敘列太元之品真人更垂幽贊常假靈光俾一統於九圍庶永昌於大業惟勤宵旰以泰生靈謹詞惟君仙李芳枝關雲令緒元邱自志元非促景之才道骨真風本列長生之品振衣世表抗跡雲間厭駒窗電逝之勞得鼇嶺雲行之趣棲遊蜀國顯晦塵寰三隱靈峰八百餘歲神丹化石猶存昌利之山拔宅升天遂表仙居之宇爰於舊址果獲靈文緘藏久祕於瑤墟出見克符於金運緬惟涼德祇荷殊休雖繕飾蹤基肅嚴像貌率齊莊而告謝命羽褐以焚修尚歉素懷未酬元德今則考茲具禮薦以嘉名想星佩霞裳早升真位而芝泥露篆願表勤誠循省冲襟良多靦愧今封君為元應真人謹遣杜光庭恭設醮壇虔申昭告冀流元廕永福皇基開宣室以遐思佇高真之俯鑒謹詞臣聞至道無為包萬天而成化元功有作運四象以陶鎔覆載含宏古今無爽由是三靈克敘五緯循常景福被於幽明鴻休覃於邦國人天荷賴渥澤遐霑臣夙感靈慈獲逢昌運纍歷殊寵出居符竹之榮頻洽隆恩入奉重難之寄顧惟虛薄未著勞能省分憂惶兢懷震惕雖傾心戮力誓酬君父之私懼福過災生或履晦蒙之數竊恐主張戎伍宰制封疆理民有獄訟之繁奉職有賦輿之廣沮勸有賞刑之用送迎有宴犒之常殺傷有故誤之憂裁斷有重輕之失因成罪目曾未懺祈或往債前寃未蒙和釋或星文命運猶值災期粵自夏初至於秋月久嬰微恙未獲痊除非憑至道之緣孰致真靈之祐今屬醮陳翠墠詔降紫泥高仙肸蠁以停輿萬聖昭彰而介祉敢因勝會輒備香饈披寫丹誠虔祈元廕伏惟鑒護賜以福祥俾臣罪咎蕩平寃仇和釋災凶超度年祿增延疾厄蠲銷休禎臻集將壇師律勵陳翼聖之勤青蓋朱輪敢怠行春之至不任歸命披心之至謹詞伏以二氣運行五材生化稟形賦命咸繫上元顧惟微眇之資叨荷裁成之澤克逢昌運纍冒寵榮入居近密之司出領河山之寄主張戎伍臨蒞黎元慙非經濟之才常懼滿盈之戒果乘厄會遂蹈危機實深睿聖之慈再齒簪裾之列夙興夜寐感聖懷恩寸心徒切於勤劬微效未酬於君父伏自纍年之內災滯縈仍中秋已來疾恙頻作雖加醫砭靡就痊瘳竊以土星居身命之宮於茲數載火曜臨田宅之位猶在子方太歲為六害之辰小運當歲破之上雖冬首有木星之福而即時值行運之災履此凶衰倍深憂懼又恐理民主務皆繫重難用刑或寡於哀矜主膳或誤於烹宰久為寃債未遍懺祈又恐往世罪瑕幽關絓注或住宅有龍神犯觸或鄉關有塋壠損傷流逮於身致茲危厄拊心思過惟切禱祈敢因本命之辰虔備香燈之禮仰元穹而請命罄丹懇以希恩伏惟天地真靈陰陽主宰降流巨枯采鑒深衷蕩滌罪尤銷除災厄和平寃釁解釋殃流先人獲泰於冥津後嗣期安於聖日三關腠理無壅閼之虞六腑機衡有均調之望賜其痊愈介以福祥續年齡於將盡之秋保形命於再生之日刳心投泣瀝懇祈真誓傾修奉之誠上答尊靈之祐臣某不任虔祝之至謹詞臣聞裁成天地陶鑄陰陽三元為布化之辰五緯為主生之紀總其宰制歸乎至真用能福被邦家惠兼幽顯南昌丹籙式宏進道之階北部黑書爰示繩非之旨是申戒勸廣庇人天臣獲奉真宗常遵明訓惟勤惕厲上副元慈伏念荷國恩深致君力寡功未刊於鼎鉉賜已冠於人臣出擁節旄總司戎旅薦新寵澤載踐崇榮青瑣位隆黃樞寄重循懷增懼報主無階但虔焚祝之儀冀答君親之德今屬天官御節太皞司方少陰敷煦育之仁大宥布生成之令是敢精持香火恭啓醮祈仰景象以冥心佇休禎之應念上願寶圖悠久聖壽延長中外樂康寰區寧泰八紘九土咸歸一統之尊歲稔氣和永叶無為之理冥關朗晏動植舒榮率土普天咸登壽域臣某祈災凶蕩滌寃債和平罪咎蠲銷福祥臻萃公私有泰眷屬長寧誓傾忠孝之心克贊休明之運不任妾聞天真憫物大道好生常宏拯護之慈俾遂安全之願顧惟至化育此含靈氤氳之二氣裁形昭灼而三元定命吉凶罪福上稟天司妾以命祿俱衰納音在墓雖值合神之吉又當衝破之凶遊年既值於天符本命仍逢於五鬼身宮之內暗曜所躔鈍滯宿中土星所歷刑厄位上復值火星重謺災衰遂成疾瘵未復痊退彌切憂惶竊恐前代今生罪尤未解負財負命寃債未除非憑大醮之筵難罄懺祈之懇是敢捨其服玩備此香饈嚴設壇場虔申禱祝伏惟諸天憫護衆聖矜憐申再造之仁全好生之德三官五帝暗曜七元南斗北辰天司列宿嶽瀆尊聖地府明靈及妾本宮遊年八卦內外應感三界靈司賜於府曹之中簡籙之內有寃仇罪犯厄運災期敕命所司特賜原赦續其祚祿加以年齡蕩滌凶衰蠲平疾苦百關宣適六腑安和重覩天光再履人事推心勵節永酬濟祐之恩念善參元上副真靈之澤不任瀝懇披心希生請命迫切虔祈之至謹詞妾聞元元道祖太上老君凝神三境之中屬念普天之下將加拯度爰降真儀垂太陽五色之華駕旭日九龍之輿夢渦川而寓景攀仙李以誕生陸地開蓮初承玉步虛庭涌井瑩濯瓊姿宸容彰挺特之儀睿旨闡希微之教萬天宗稟歷代師資標令節於昌辰錫殊休於品物宜崇勝會用表精誠妾早悟真乘嘗參寶籙延生妙篆紫陽丹陛之文飛化靈圖絳闕朱宮之籍正身心於九室檢神氣於三關滌過蠲邪利幽濟顯每勤修敬敢怠香燈爰因大宥之期恭備醮真之禮是用馳誠鶴宇矚想龍輿瀝丹款以騰詞拂碧壇而蕆事天闕地府日域星躔三官五帝之曹北部南丹之署下周川嶽旁遍幽靈畢罄明誠冀蒙昭鑒上願皇基隆永睿壽遐長道化和昌聖教宣布九區四裔常尊道德之風庶類㣥生共樂升平之運妾九元七祖往逝先靈擢質丹陵生神碧落災祛未兆善降無涯年算更增罪瑕俱釋誓虔注念上副鴻慈不任歸命之至伏以三天布化正一垂文煥起元功廣濟㣥生欲使天光下燭陰關息幽翳之悲凡懇上陳陽景遂宣通之願由是敷二十四籙命千二百官統領人倫主張真籙騰心靈為騎吏飄香穗為驛龍積思而感契可期拯護而誠明必達古今宗奉惠渥昭彰臣夙慕正真常叨廕祐將壇相印未申報國之勞潔己澄心每切修生之願今則虔膺綸詔暫撫遠邊爰屬生辰輒祈靈貺恭陳醮禮精備章文伏惟大道延慈天師鑒祐降兵官將福祐護持俾戍遏成功烽煙罷警殊方革面咸襁負以歸仁獷俗悛心盡梯山而向化佇清寰海永致雍熙臣祿算增延災凶殄息道運寧泰將吏輯和普及幽明俱承元祐不任歸命虔祈之至謹詞伏以大道開光元精垂化氣分五緯五帝操代謝之權節布三元三官主死生之録由是百神受職品物知歸寒暑推遷成歲功而明罪福支干配合統人事而定吉凶今古攸遵應靈無爽臣叨承元廕獲佐昌時福過災生每切持盈之戒才輕任重惟虔報國之誠今者候及上元序新六甲考校當天官之首司明值甲子之初屬此令辰恭修大醮敢祈元聖俯鑒丹誠臣某伏念身遠庭闈禮遙溫凊今茲迎侍尚阻江山况隴硤縈紆江波濬險惟憑神力冀保畏途伏惟五帝高尊三官大聖六十甲子應感威神俯回肸蠁之靈特降昭彰之祐使輕舟利涉萬里無虞靡勞陟屺之吟速遂綵衣之養俾諧懇願敢負明恩誓勤嚴奉之誠永答真靈之祐不任歸命披心禱祝祈恩激切之至謹詞伏以至道分光仙曹列品上浮辰曜下結名山包洞府以深嚴擁雲霞而秀異潛符邦國大庇生靈統録人天主張命籍降災降福有感必通臣獲奉聖明叨榮爵秩總領戎伍慙無韓白之功部握魚符愧乏龔黃之政常虞盈滿以致災衰早罄丹心歸依元教傳修經籙宗仰真靈所願國祚延洪聖壽遐永萬方一統四海會同臣某削落災危蠲銷罪咎六親蒙福九祖生天祿算惟增功名克著誓虔忠孝永奉休明庶期修勵之心上副真仙之祐恭修醮酌庶達明誠不任歸命虔祈之至謹詞惟彼仙山奠茲南土雄盤厚地秀拱穹旻控綿洛之川原總岷峨之形勝巖巒捧日洞府棲真連空之松檜扶疏千載之威靈肅穆果聞祥異顯此福庭垂至陽生化之功變枯柏凋摧之質柔條迥茂灑瑞露以飄香密葉重榮動晴風而裊翠神仙幽贊宗社福招叶此元休永茲禎貺是用精嚴醮祝仰答真靈凝心宣室之中翹想雲峰之外冀華夷昭泰海嶽晏安稼穡滋豐氛埃蕩定永期祇奉以副元私稽首謹詞臣聞道用無方神功不測隨機應念惟感必通正一垂文傳寶章而拯物盟威立訓陳醮品以濟民粵自古先逮於茲日惠覃顯晦澤普天人臣某夙荷元慈獲逢聖日天波浩蕩人爵優宏慙無經濟之能深慮寵榮之極况居司戎伍出鎮魚符或賞酬乖善惡之宜刑律有重輕之失俗懷咨怨民抱傷嗟有一於斯式彰譴咎又恐五行三命運值災蒙暗曜明星或當臨照或經過水陸侵觸龍神或土木興修犯干禁忌或前寃往債或故殺誤傷動結罪條兼逢厄會致成疾恙彌切兢憂竊惟大道好生至真設教著祈禳之典開懺謝之門是敢虔備壇場精修章醮拜天悔過瀝懇希恩伏惟三境高尊諸天大聖降流慈施憫鑒塵微敕天府地司遍陰曹陽境解消災厄原赦罪尤削落凶衰和平寃債蠲除疾苦安鎮魂神六氣均調百關宣暢易短促之數賜延永之齡萬罪千災咸遂超度誓虔修勵仰奉真靈臣某不任謝罪祈恩披心請命之至謹詞
