front:
  text: 全唐文欽定全唐文卷五百二十二梁肅六
  hash: sha256:78bb5bbb3c424f93dcc06494c1e8e562fcef363c6746bff592fd838f9f675ca3
body:
  text: 公之先出自姜姓太公之允也唐虞之際佐治洪水有功以能為禹股肱心膂命曰呂氏洎太公誓蒼兕平商牧桓公責包茅匡周道傳國七百列於春秋漢興以勳戚在侯服者二十人臨泗侯之孫通封於東平其後國除為郡著族元魏末有汶陽公思禮者扶翼周文開霸關右歷行臺右丞兵部尚書時魏分為東西中夏擁隔遂居於河東今為蒲人也從尚書四葉生璡皇朝晉陽令贈郴州刺史郴州之嗣曰仁誨以文學稱以從父兄太一俱用射策科太一歷御史尚書郎中書舍人戶部侍郎右庶子仁誨由成王文學轉岐王府屬纍遷右庶子金吾中郎將資州刺史除許州未拜而薨以孝行聞仕至太僕丞加朝散大夫太僕生公公諱某字某少淳茂有志行居太僕府君憂泣血三年鄉黨稱之制終治古文尚書左氏春秋二十舉孝廉補博昌主簿歷任營邱文安二丞宣勞使以清白薦試守洺水令公為政務仁恕去苛察密化旁流邑中移風再歲正除加朝散大夫公性退不以善自名且不樂為吏秩未滿移疾罷去居於濟源王屋山之陽常言君子之道不從俗不離㣥幼安抗跡而傲世慈明濡足以救民曷若中行以全吾真由是逍遙樂道以漆園鶡冠之言為師時閲歷代史究興敗治亂之端參以立身行道之義著書十餘卷號續呂氏春秋草藁未就屬寢疾捐館享年若干時開元二十五年也永泰中嗣子某位朝散大夫右贊善兼陳州刺史尋遷檢校祕書少監兼徐州別駕因詣闕拜章乞回所授賜命於先人詔追贈公太子中允謝恩之際又以公所著書上聞遂改贈祕書少監後十有三載歲在某辰某月日龜蓍襲吉始安宅於某鄉里之原江夏郡夫人黃氏祔焉夫人漢太尉琬之裔孫皇朝大將軍懷州都督虢國公君漢之孫沂王府長史虢國公承源之女洪州刺史京兆韋同之甥有溫仁孝愛之德勸義垂訓之美後公七歲而終公之追命於是有江夏之贈嗣子祕書痛先君先夫人厭世寖遠音徽將昧常欲立貞石傳德風蓄誠未申先是徂謝小子再拜受命於太夫人且成伯舅之志恭論外祖之烈以示後嗣楊惲傳太史之書久慙庸陋韓康感中軍之愛空想生平道在茲乎以表墓文曰赫赫有呂肇發於姜既協大禹亦亮武王營邱門地東平傳嗣書之勳冊有焯名位中郎伯仲允迪斯貴實生祕書含道蘊粹仁為己任孝亦天至論經八覽文參六義三邑之佐清恭廉貞鳴絃作宰休有清聲退謀於道爰晦其明體順保和遺榮入冥春闈中允蓬山二職運往時來退榮隱德振彼江夏光敷內則不及象服空垂燕翼太行之右清濟之北外孫紀辭以志兆域仲尼述易道於坤曰君子敬以直內義以方外詩三百一言以蔽之曰思無邪公天生懿德外方內直氣茂才全發為詩文得大易之中詩人之正邈乎其不可及己七歲誦孝經先祕書異其聰敏問曰汝志於何尚公曰立身行道揚名於後是所尚也後博究五經舉其大略而不為章句學確然有可大之業知者益器之十五祕書捐館公茹血在疚踰時而後杖由是鄉黨稱孝二十餘以文章遊梁宋閒通人潁川陳兼長樂賈至渤海高適見公皆色授心服約子孫之契天寶十三載應詔至京師時元宗以道蒞天下故黃老教列於學官公以洞曉元經對策高第解褐拜華陰尉故相國房琯方二憲部請公相見公因論三代之質文問六經之指歸王政之根源憲部大駭曰非常之才也趙郡李華扶風蘇源明並稱公為詞宗由是翰林風動名振天下及函洛寇擾公違難於江南上元初授左金吾兵曹掌都統江淮節度書記非其好也未幾徵拜右拾遺因上疏陳便宜及方鎮有冒於貨賄舉直錯枉大者十餘事不行皆焚其藁時大盜之後百度草創而太常典故尤所壞缺公為博士祗考古道酌沿革之中凡有損益莫不悉當新平公主之子裴倣尚永清公主公實相禮初以裴僕射遵慶主㛰中詔長主後夫姜慶代焉公奏曰㛰姻人道之大使異姓主之非禮也且無以示天下臣不敢奉詔上從之又議定諡法公以為諡者蓋跡其事業邪正而褒貶之舉一字可使賢不肖皆勸故其議呂諲盧奕郭知運等諡皆參用典禮約夫子之旨其事核其文高學者傳示以為式時有上議謂景皇帝未升尊位不宜為太祖詔下百寮公按禮經以為王者禘其祖之所自出而以其祖配之故三代皆以受命始封之君配昊天上帝唯漢氏崛起豐沛豐公太公皆無位無功德不可為祖宗故以高帝為太祖若景帝肇啓王業建封於唐高祖因之遂以有天下之號天所命也宜百代不遷因具故事條奏從之於是郊廟之禮遂定踰月拜公尚書禮部員外郎遷吏部每歲以書判試多士而朝列有以文學稱者必參校辨論定其甲乙丙科至是公分其任求為郡守以行其道除濠州剌史公下車以淮士輕剽承兵革之後率多不法長吏不能制遂先董之以威格之以政然後用愷悌寬厚漸漬其俗三年而闔境大化優詔褒美移拜舒州刺史又以理行聞璽書就加朝散大夫檢校司封郎中賜金印紫綬其明年吳楚大旱餓夫聚於萑蒲者十七八唯舒安阜近者悅遠者來犬牙之境草竊不入上聞之詔曰斷獄歲減流庸日歸以人俗之豐給當淮湖之災旱爾守之力也擢拜常州刺史本州都團練使常州為江左大郡兵食之所資財賦之所出公家之所給歲以萬計公削其煩苛均其衆寡物有制事有倫刑罰罕用頗類自息公又謂安人之道清而靜之則定為而察之則擾故寬以居之仁以行之一變而百姓不知其理又一變知其理而不知理之所由比及三年吏不忍欺路不舉遺年穀屢熟災害不作甲辰歲冬十月二十日甘露降於庭樹二十七夕乃止嗚呼公庇斯人人方仰公彼天不惠降此大厲為郡之四載大歷十二年四月壬寅晦暴疾薨於位行路慟哭罷市者相弔踰月又吁嗟之聲相聞自寮屬相吏下逮鄉老里尹皆率以備齊祭及葬之日緦衰送葬者數千人唯公體黃老之清淨包大雅之明哲尊賢容衆而交不諂瀆本仁祖義而文以禮樂乃至溫良能斷應用不滯達識足以表微厚德足以載物善而不伐光而不耀內不機巧外無緇磷隤然中立豁若虛受其長人也先教愛而後法禁不遷怒以臨下故威而不猛不私己以欺人故易而無備其茂學博文不讀非聖之書非法之言不出諸口非設教垂訓之事不行於文字而達言發辭若山嶽之峻極江海之波瀾故天下謂之文伯有集二十卷行於代若藝文之士遭公發揚盛名比肩於朝廷則有故中書舍人吳郡朱巨川中書舍人渤海高參今尚書左丞天水趙璟職方員外郎知制誥博陵崔元翰考功員外郎潁川陳京禮部員外郎北海唐次蘇州刺史高陽齊抗其章章者也其睦親與善自內姻及朋友所知之家振窮分災恤孤哀喪頒祿歸賵必加於常人一等故啓手足之日室無餘財惟待賜然後乃斂議者於是謂公有文子之清子産之仁史魚之直平仲之與人賈生之行義文翁之政事叔子之遺愛而不躋巖廊不享期頤闕致君論道之美以遺史冊故凡百以為痛在昔孔文子以敏而好學為文公叔發以恤衛國凶饑為惠矧公功存於人言垂於代有文有質不忝前烈者與易名之禮請從令典謹狀尚書考功伏以裦德尚賢設教之崇軌加諡易名飾終之令典謹按故朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤某蘊黃裳之服協中庸之德正詞復禮施化為邦清風存乎省寺遺愛結於黎庶具美之道何以尚茲窀穸既安音徽日遠請追公叔之諡式播臧孫之烈謹上維大歷元年五月日朝散大夫守常州刺史賜紫金魚袋獨孤某謹以清酌之奠祭於故尚書吏部郎趙郡李遐叔三兄之靈嗚呼疇昔之年接兄討論倚伏之數或尋其源嘗謂仁人百祿滋蕃如何於兄斯道莫存嗚呼哀哉惟兄孝友仁恕高明寬裕何德之茂何才之富粹氣積中暢於四肢發為斯文郁郁耀輝自五百年風雅陵夷假手於兄鬱為宗師乃登憲闈直以舉之乃列諫臣闕則補之元宗季年戎狄內侮兄方就養拘在豺虎氛霧濛濛薄汙我躬雷雨作解遠身於東帝曰孝哉可移於忠名彰右掖跡踐南宮邱明有恥元晏方病清漳間臥樂道推命哀於大賢不嚮大年人之不幸天亦何言在昔賈生見惡絳灌王佐之用不展於漢我之方行遭世紛亂時塞道塞古今一貫嗚呼哀哉某以蒙蔽夙承眷惠義均伯仲合若符博約乎文章之閒優游乎性命之際謂得攜手相期卒歲天其喪豫兄則先逝嗚呼哀哉曩自朝列出持使節十年離別一旦存沒吳楚迢遞江山阻越不及歸賵仍乖執紼寢門一哀魂斷心絶恭承嘉命來牧於常繐帳所在哀何可忘鞠然二孤訴彼穹蒼孰謂遐叔與天茫茫魂兮歸來臨此一觴嗚呼哀哉尚饗年月日具官某謹以清酌之奠敬祭於故福建都團練使李公之靈嗚呼宗祏儲祉元純降氣炳靈於公才全德充寬仁願恭高朗昭融文學政事儀刑王風帝謂叔父閩實下國出作侯伯導之以德內撫罷人外攘劇賊文武為憲柔嘉是則我教用宣我民既安佇登巖廊為國羽翰彼高者天胡莫祐賢人之云亡曾不永年嗚呼哀哉某往忝諫臣在公下列周旋獻納以日繼月海運方遠摶風未歇不慮不圖音徽已沫暮律嚴苦降霜肅殺臨歧一觴以抒慘怛嗚呼哀哉尚饗年月日具官某謹以清酌之奠敬祭於故浙西東觀察使皇甫公之靈古人有言智仁及勇是謂達德大夫蹈之以衛王國乃昔天步未夷六師徂征嘗扞牧圉戡彼醜虜勇也及夫宦豎擁兵窺伺樞密公沈謀內斷輔德不穢智也分陜牧越統戎鎮俗承其風者莫不寧息仁也議者謂公方為國翰垣為人父母宜錫難老荷茲介福命之倚伏曾是不淑豈夫天所奪人所欲大旆長轂東征不復如彼魯侯往歌來哭嗚呼哀哉某頃與公相遇於斯今也言歸投弔於斯泛泛方舟旋載裳帷晏晏言笑今成涕洟道路遠而音塵絶而旨酒一觴惟靈享思嗚呼哀哉大歷十二年歲次丁巳五月朔日門生安定梁肅謹以清酌庶羞之奠敬祭於故常州刺史河南獨孤公之靈嗚呼閒氣炳靈降生哲人何辜今人而喪斯文豈上天不仁道之將廢奚盛德之淳懿忽中年而下世蹈得仁之機顏子不幸負王佐之才賈生屏外其明尚晦其用未大藏舟遽移梁木斯壞嗚呼哀哉追惟哲人應運而生行在五常志在六經博厚溫良直方而明天縱多才蔚為時英孔門四科洪範三德總於公躬率履不忒頌聲既微鄭衛橫塞或游或僻時萬時億公當其時載振其維憲章典謨為學者元龜文哉郁乎文實在茲伊昔策名東堂作尉西華銘仙掌與函谷馳休聲於天下逮乎拾遺君前考禮太常獻可之詞直而含章建言削藁故海內莫揚旋議廟祧乃正諡法享帝之禮終焉允洽名正言順事深體合垂後可大賢人之業起草剖符出臨濠舒二邦之民傒我而蘇愷悌之化風行露濡蘭陵之郊人散政弛清淨之德下車則治比迹召父視人如子闔境熙怡有禮知恥朝思黃霸人仰安石霄漢在目巖廊咫尺不留不處坐而遐舉不慮不圖忽焉傾徂遐邇震駭士民號呼罷巿輟舂相弔路隅嗚呼哀哉顧惟小子慕學文史公初來思拜遇梅里如舊相識綢繆慰止更居恤貧四稔於此嘗謂肅曰為學在勤為文在經勤則能深經則可行吾斯願言勉子有成又曰文章可以假道道德可以長保華而不實君子所醜敬服斯言敢忘永久若乃室中函丈之席林下清觴之宴陪李膺之泛洛從叔子之登峴亟承國士之遇又忝公車之薦奉明誡以周旋盡深衷於眷盼惟吉凶之倚伏若糾紛之相纏追弔服鳥之占日應康成之夢年不云坐奠不暇撤懸秦醫匪救孔禱徒然瞬息之閒音容莫傳痛心驚骨不可問天嗚呼哀哉平居所好修竹芳草暇日之娛左琴右書微言雅典斷而不續高齊已空蘭蕙猶馥門人行慟稚子抱哭語言在耳悽慘滿目嗚呼哀哉覽遺編以流淚痛明德以無還撫諸孤之尚藐庶盛烈之斯存鄉路千里歸期九原寄觴豆以寫心見平生之厚恩嗚呼哀哉年月日守右補闕安定梁肅謹以清酌嘉蔬之奠敬祭於故國子監祭酒贈戶部尚書李公之靈惟公之德柔嘉維則敬義且直惟公之才文武是該不矯不回剖符七郡風行雨潤有禮有訓連撫二藩如江如漢之屏之翰敷聞帝庭爰用陟明乃拜司成是勤是行時則不幸遘茲大病薨於道路孰識天命嗚呼哀哉追想曩昔大歷之中獲見君子吳江之東靡適不隨無會不同於山於水於野於寺提攜宴喜荏苒半紀公鎮南方奄征江黃乖離兩鄉道阻且長惠而好我牘相望於囊於箱厚意是將淑人君子懷允不忘繆繫纓組列於朝序望公之來寤寐斯佇方期款遇爰笑爰語豈意長往終焉莫睹寢門一慟意折神沮誰云少別便是今古嗚呼哀哉古人所稱曰仁與誼君子之道在功與事邦憲之雄元侯之貴存有盛美歿有遺懿所恨伊何壽猶未至所悲伊何人失其庇嗚呼哀哉九原連連乃在三原日月有時兆宅攸安某近職是拘執紼無緣寄陳薄酹有慟何言嗚呼哀哉尚饗年月日具官某謹以清酌之奠敬祭於故福建觀察使兵部尚書贈右僕射孟公之靈嗚呼上天不仁公薨於位嶽鎮傾士林殄瘁追論茂德忠敏恭懿仰惟盛才文學政事昔在天寶濫觴登朝爰自中興鴻飛乃高入覲京師出司藩條便蕃中外聞望光昭我后統天式張百揆公居右轄實總聯事推轂西郊兵符攸寄俄被蟬冕為王近侍無諸舊城人窳地僻詔曰爾諧出作侯伯敷求民瘼宣布王澤嶺表海壖夷風載革天下謂公耆德盛名宜登巖廊為國老更方朋三壽忽夢兩楹天實不遺人誰仰成爰自七閩歸於九京當時大旆今也明旌嗚呼哀哉某自宦學則趨明哲邦憲府庭再參下列周旋惠好以日繫月不慮不圖有存有歿皇恩軫悼寵贈昭晰邦人怨思祖奠悽噎談笑如昨音徽永昧臨歧一觴以抒慘怛嗚呼哀哉尚饗惟公天挺貞淳肅恭溫仁以禮立志以道藩身惟靜惟動克儉克勤正直自立邦家必聞久侍禁闈嘉名益振上曰爾才監戎於閩身許九重禮達三軍軍中協睦罔或不親朱紱煌煌映於銀章方期奏報歸侍天王外迫炎瘴內纏膏肓不永斯年今也則亡浮江涉淮遠窀舊疆丹旐翩翩言過維揚某早接公遊乃弔公喪追懷宿昔感涕沾裳秋日淒淒浮雲無光敬陳薄奠悲塞中腸嗚呼哀哉伏惟尚饗年月日淮南節度掌書記殿中侍御史內供奉梁肅謹以清酌庶羞之奠敬祭於故處州刺史隴西李公之靈和氣欣合乃生靈芝乃流醴泉降於人倫是為俊賢猗歟李公有德有言煌煌九葩淡淡一源弱歲含章典教宏文聞喜太邱遺愛斯存於越於宣先在西藩名高蘭臺風動輶軒濯纓歸朝再踐郎官鴻鵠入冥白雲在天或謂盛才宜管絲綸潤色謨訓以垂後昆官無中人吾道不興留滯周南退守恭陵剖符於處美化斯宏雲油露濡山靜江澄解印歸來考槃是卜龍沙遊衍餘干耕鑿與道為徒以農代祿河洛讖緯桓談不學草元法言揚雄有作志一窮通身安淡薄遇酒便醉工文且博脫遺形骸奄就冥漠士友殄瘁翰林凋落嚶鳴既合久要乃申四海兄弟如公幾人公去南州角巾衡門豫集艱棘哀惸苦辛眷恤何深弔問殷勤江湖然書札相因方期歲暮以德為鄰今也則亡吾誰與親鄧攸無嗣桑扈反真天道茫昧誰云與仁嗚呼哀哉我圖其室得公之出相維茂族于以納吉眷彼三星成之不日魂而不亡知此親昵嗚呼哀哉季奉裳帷九原是歸葬於洛表路出淮夷平生歡愛一慟申悲已矣夫子忽乎何之旨酒盈樽幽明此辭尚饗年月日具官某謹以清酌之奠祭於故廬州刺史扶風竇公之靈嗚呼惟天難諶惟命罕言倚伏同域吉凶一門公之茂行廉直而溫公之達才卓爾不㣥保身以正為政以仁宜錫難老以庇斯民如何降凶奄忽反真伊昔登朝厥猷則茂柱下執法南宮草奏赤縣浩穰四方輻輳惟公下車善政俄報廬江曠守人或未康惠君既來美化洋洋治而有禮俾人知方豫忝廉問實知循良將以上聞冀殊寵章命之不淑曾是隕喪嗚呼哀哉追想曩昔接公周旋惠好斯存如蘭如荃閒者暌闊東西纍年會遇於茲談笑依然別未數旬遽歸九原孰為福善殲此仁賢官守所羈祖奠無緣寄誠薄酹有恨何言嗚呼哀哉尚饗年月日具官某謹以清酌庶羞之奠敬祭於故侍御史柳公之靈惟公以孝友承家以直方從政以溫厚行已以敬讓與人作掾大邦有親信之稱典司通邑著循吏之名冠惠文佐廉問輶軒所指吏肅風變列郡攸攝斯人以寧方將荷餘慶而介景福播令名而延大耋天不與善命也有終士林怛駭親友欷歎嗚呼哀哉某等獲與公游聯職戎司適云少別俄見凶歸于以設奠出乎郊歧魂也何之幽明此辭嗚呼哀哉尚饗年月日某使某謹以清酌之奠敬祭於壽州鎮遏十將何鄭江某官三士之靈嗚呼勤身奉主之謂忠臨敵致果之謂勇以死成名之謂節惟此三士具茲三美昨者封境不靜寇竊斯興各領軍行以當扞守山谷積阻矢石相陵謀無所用志必有死遂使勇氣挫於小醜雄心屈於短兵人之云亡斯害也已嗚呼哀哉我居藩鎮不能守在四鄰爾有忠勳遂乃歿於一戰且憤且歎激於中腸知以今辰旋歸壽陽爰遣奠酹用申悲凉加爾贈賻恤爾孤孀魂而有知知豫不忘人誰不終所貴名揚已矣三士俱為國殤嗚呼哀哉尚饗
