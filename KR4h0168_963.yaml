front:
  text: 全唐文欽定全唐文卷九百六十三闕名四
  hash: sha256:aae537e0571b93196f31f36bec2de4fd4b8a30153852b0c4302ba8e4e1e83dfa
body:
  text: 臣聞帝堯之禪虞舜也業歸於異代漢祖之尊太上也禮循乎虛名未有履尊極而捨萬乘之榮奉晨昏而傳七廟之重斯則堯圖未遠漢道未全倬然冠洪名而超古昔者孰若今之盛也伏惟皇帝陛下誕受聖姿欽膺寶歷自天生德與神契合近者太上皇恭默在疚禪受未行萬國注心思言堯以致理㣥生屬望渴聖人之利見陛下忠感於天地孝達於神明成堯舜之內禪固邦家之景命功莫盛於配天孝莫大於寧親讓莫高於傳聖故太上皇釋天下之負所以成其讓陛下受宗祧之寄所以保其功惟文王為無憂惟武王為善繼夏祀永固周命維新巍巍蕩蕩固無得而稱矣又聞皇帝之道必體於至公稱號所加不私於為已將體元以立政必紀年以垂號伏願肇茲獻歲允極鴻名發揮元功昭示景化則太上皇之德可表於徽冊陛下之孝克施於寰海然後父父子子君君臣臣仰東海者知聖化之深躋南山者願聖人之壽臣等不勝大願請上太上尊號曰應乾聖壽太上皇請上陛下尊號曰文武大聖孝德皇帝因三正之慶會鼓萬國之歡心奉寶冊以薦鴻徽率㣥臣而朝上日然後退自問寢列茲充庭先陳教孝之儀方受慶君之禮斯實邦家之耿光也古今之絶典也雖朝賀有次已稟於綸言而徽號所尊益勤於俞詔兆人懇願罔不喁然臣某言伏見正月二十九日制書以劉闢擢於非次授任節旄不立朝章擅有侵軼詔命左右神策行營節度使高崇文領馬步將士嚴礪李庸等計會討伐臣又得上都進奏院官高振報嚴礪下告捷官嚴公貺奏正月二十二一作三日收復劍門破賊五千斬僞授劍門刺史武德昭訖又夏州叛將楊惠琳援絶城孤勢窮力屈王師進襲計已剋平凡在遠邇不勝慶幸臣某中賀伏惟皇帝陛下誕敷元德廣被文明寰海乂寧戎夷附蕞爾狂狡敢縱奸凶藉方伯任用之資乘軍城變故之際阻兵拒命肆虐讐鄰陛下志在安人尚為含垢頃令申諭許以自新誠宜改過感恩迷而知一作不非復而乃恣情干紀長惡不悛既慝稔而禍盈俾人怨而神怒今戎臣授律睿略遐宣迫脅者知有所歸忠義者得以自效因利乘勝犄角攻驅固無遺鏃之勞佇見輿尸之變臣忝職藩服受任偏師憤激之誠倍百常品無任踴躍之至臣聞惟帝之尊不言而理惟天為大無得而名所以舉鴻徽升大號者體乾坤之心也伏惟睿聖文武皇帝陛下璿樞御柄氣母躋神總三靈以紀元宅萬國以鋪化霽日出海雄光照天烟霞變舒草樹動色夫纂大寶者重光之德崇張帝圖者屬統之功盛十聖儲祉貞明下土一天鏡開引耀幽蟄此臣所以稽衆心而窺景鑠者也臣聞孝於其父則導善因心忠於其君則望美終日蓋性本於內義激於中將曲成以無違期取實而不苟所以然也陛下粵臨宸極十有五年道本至公誠深馭朽有盡下之意無自我之規以喜怒之氣調陰陽之德比類百則有帝堯之聰明周旋一心秉神禹之恭儉繇是朔陲之凶以謀勝庸蜀之虜以刑誅徐夷之固以德歸吳寇之強以氣滅茂昭以二郡至宏正以全部來幽鎮無聲滄景交代至若從史執縛宗奭明刑語於大朝斯為細事頃自淮淝稔禍海岱奮妖歷五聖而不龔稽四紀而負恃陛下英威電斷睿略風行決必取於天心示不疑於輿聽此忠賢所以盡力猛毅所以捐軀一舉而元濟受擒再動而師道傳首地維自正天下一家六十餘年不聞此事野老擊壤仁風扇和巍巍成功蕩蕩區域遠可以比崇於唐虞軒頊近可以丕顯於高祖太宗且元宗自先天三年至天寶十三年四十年間六上徽號今陛下發揮元祉燀赫洪猷攄積憤於祖宗駕千齡於天地飾文武之氣象納廣大於昊穹澤及隱微仁霑動植圓方不足稱其遠辰象不足契其明瑞舞神魚祥升鳴鳳若不駿尊大號仰陟鴻名豈非臣下之恧與臣等是以夕惕夙夜翕肩纍息上探元命下採㣥情不勝懇戴誠願之至謹上尊號曰元和順天應道聖文神武皇帝以崇莫大之業以配無為之功伏惟陛下奉順人靈俯從公議鑒深誠於億兆顧景貺於神祇喁喁四海孰不踴躍臣某言臣得進奏官狀伏承河陽奏汜水西界從洛口黃河清一百六十六里又橫海軍奏界內黃河清澄徹分明者臣聞聖人在上天下和平風雨時若則海波不揚黃河清夫土所以載水水所以利物天意鍾土德之道開水瑞之華符我上聖祥於下土中賀伏惟睿聖文武皇帝陛下蹈十聖之原軌陳一王之大法垂衣裳以朝萬國舞干羽而來四夷平泰階於天躔偃師節於靈臺故得濁波渾渾千載一清長瀾浩浩百里如鏡氣新天宇光徹地脈仰分萬象之法中涵千聖之德初澄海裔表陛下橫恩波於海上再清洛口助陛下鋪文明於土中二十八日兆陛下告成之日也百六十里期陛下得聖之數也臣謬承分閫之寄叨榮持節之權生當海晏之年幸識河清之日未奉明詔不敢擅離軍府詣闕隨公卿蹈舞明庭下情無任西望踴躍之至臣某言伏奉二月十三日敕下垂拱臨軒親受典冊大赦天下與人更始中賀伏惟元和聖文神武法天應道皇帝陛下用人情為田播殖萬類細徹微妙靈通幽神洗蕩危疑開釋罪罟酬勞而傾盡府帑貶用而大減租入逋負除而餒者自活力役省而耕者倍功繼絶存亡忠賢飲德於黃壤棄瑕肆眚奪魄再麗於遺骸極天地之歡心盡帝皇之上事疲史臣之筆編簡難書涸詩人之思謳謠絶路臣總集黎老伏讀德音不寤微生坐階仁壽不勝慶抃之至臣聞上帝至尊也其名有九所以顯高明之位西方大聖也其號有十所以旌神化之功王者提寶運而光宅握瑤圖而首出必建徽號以稱鴻猷斯乃臣子之誠有所法則天之所與不可辭讓伏惟皇帝陛下欽明御歷神武纂戎挺上聖之姿撫中興之運鼓雷霆而清八極懸日月而照九圍粵若祗事郊廟敬養長樂大孝也省刑責已偃革息兵大澤也慶雲見甘露降羽毛呈瑞草木發祥天符也億兆歡心而太和蠻夷蹶角而威服人瑞也祖宗未賓之地帝王不收之氓皆勿耀天威獨運聖算未嘗血一刃勞一夫文軌罔不同桀驁罔不化則軒有版泉之戰堯有丹浦之征求之往籍彼宜慚色陛下有格天之大勳動天之大德徽烈已冠於前古而稱號猶抑於當今凡在朝野敢不知罪臣等不勝大願伏乞回天眷啓宸衷擇吉日崇徽號塞人祇慊慊之望合夷夏喁喁之誠伏以昭闡大猷崇建明號爰自列聖實從人心或不踰一二年或至於再三冊伏惟陛下握乾符而執左契掃氛祲而廓夷途時清俗平世更於七足以光寶祚暢洪徽追成規崇典禮而況百靈效祉庶績其凝祝告元穹孝光長樂慶澤躋天而接地仁風輝古而映今休禎見於星雲嘉瑞洽於禽草英聲騰軼於八表和氣旁達於九圍而乃尚執勞謙未允誠望凡百臣庶實所慞惶夫無為而理者不在於去名稱在於遂萬物之宜曲而成之者也恭默思道者不在於變典冊在於天下為公居而不有者也故曰惟天為大惟堯則之又曰聖人無常心以百姓之心為心然則王者舉措有法弛張隨時伏望答上帝乃眷之懷副下人傾心之望略撝謙之小節奉祖宗之舊儀臣等不勝大願謹上尊號曰太和文武至德皇帝伏乞仰遵成式俯順㣥心命有司擇吉日光膺盛禮允答天人天下幸甚臣聞帝王有必著之符神靈無虛應之兆所以電繞樞極氣感虹流元鳥祚商赤光啓漢考驗今古章焯圖書伏惟皇帝陛下馭三統之元膺千年之運當誕聖之日為河清之祥元律應期乾宮以之定位開冬戒節水德表其靈長道若合符事光載籍臣等伏見前史稱漢宣之德則曰修武帝故事並以漢之隆平莫如武帝後之為理無及孝宣舉此二主以為極盛今陛下功濟天下道覆寰中威統百靈宰御㣥品修祖宗之德莫如貞觀開元且太宗幸慶善之宮即降誕之所賦詩賜宴播為樂章元宗降聖之辰為千秋之節王公上壽士庶交歡流於管絃書之甲令此時張說宋璟歷懇獻章二臣之心必無違理國史所載昭然可徵近者廣集緇黃多為法會誠有資於景福且未叶於舊儀夫四時成歲百穀成實必在首冬用成神化今臣等不勝大願請以十月十日為慶成節著在令式以示四方是日陛下於宮中奉迎太皇太后與昆弟諸王盛陳宴樂㣥臣詣延英門奉觴上千萬歲壽天下州府置宴一日積嘉祚於元命慶延洪於昌期上表中興之耿光次復開元之盛典臣等無任慺慺懇款之至臣聞自古帝王之有天下也必建崇名立徽號號者功之表名者德之光所以配天立極傳於億祀表功明德示於四方伏惟皇帝陛下運啓中興業隆大寶總道德而施教法陰陽以為心雖日昃忘勞之規馭朽興念之戒身衣弋綈之儉乙夜觀書之勤斯皆前代之令猷而哲王之懿範有一於此則為聖明陛下總而行之孜孜不倦而又抑退浮薄崇獎貞廉必齊素厚之風每尚儒學之本端靜邁於時俗孝愛浹於人倫掃滄景之妖凶定羌蠻之俶擾去華尚朴先自六宮端本澄源行乎四海近者旱暵偶數時雨稍愆陛下切納隍之憂深在豫之責德音才發靈貺已隨變慝消災有如影響熒惑受制以軌道壽星叶紀以揚光品彙昭蘇風雨時若元功之化覆載同和成貸之仁肖翹皆遂干戈載戢華夏以清自三代以還仁明聰聖未有如今日之盛者也而自龍飛代邸將及十年聖德咸通鴻名久曠何以彰祖宗之盛軌副億兆之懇誠臣又聞行過乎恭自非中道名以出信斯蓋格言使尊稱抑而未揚大典闕而不舉天地之符未答神祇之望莫申臣等不勝大願謹上尊號曰太和文武聖神皇帝伏惟誕膺丕典永峻鴻猷葵藿纖誠庶傾心於回照犬馬微志獲蹈舞於康衢無任悃款屏營之至國忌日天下依舊不舉樂不視事不鞭笞伏以道釋二教澶漫虛無陛下靡所歸依誠契至理但以列聖忌日行香及茲修崇示人廉孝兼以天下州縣不舉樂不視事不鞭笞以此海內蒼生當知列聖廟號今既停罷行香之後敕內又無其日徹樂廢公止行如舊之文伏恐遐遠之地迷其所向便與居常之日率皆無殊臣思此事終關聖慮禮曰君子有終身之憂而無一朝之患故忌日不樂謂不舉吉事也伏以陛下聖睿留想若以設齊資福事損不經起今罷之已有詔旨其曰天下州縣不舉音樂不視公事不行鞭笞伏請重下明制依前遵守則凡在遐陬逮於蠻貊不忘廟號有裨孝理之源臣聞至德動天天乃垂甘露神功浹地地故出醴泉然猶兆自郊圻啓諸甸服未有因於改井得彼甘泉不離禁掖之中便是殿庭之側澄清若鏡汲引而固絶羸瓶香美如飴濟利而終期勿藥況銀床萬所玉甃千門味不足以和太羹美不足以調甘食若非皇帝陛下幽通井德明契天宮則何以革故從新致斯元貺移鹹變苦降此休禎臣等幸偶盛時叨塵寵祿思與堯年野老鑿以興歌願得漢水丈人汲而成藥臣聞聖人受命天必降其殊靈王者應生國必蒙其介祉故華渚有流虹之異元樞呈大電之祥而皆近感神明遠符乾象叶千年而啓運契六合以居尊伏惟皇帝陛下德邁方圓道融三五因社鳴而正位逢井聚水樂推膺彼昌期宏茲丕構今者發生司律歷數在躬值清明馭氣之時當仁壽悅隨之始固可年同鶴算歲比山呼永符垂拱之風長保後天之慶今日東頭承旨常郁至奉聖旨者質素光而應候容潔朗以協時既照耀於明庭實昭彰於聖德臣等覽晉中興書徵祥說曰白兔者月精也抱朴子云兔壽千歲滿五百歲則色白顧野王云王者恩加壽考則白兔見協太陰之瑞實表坤慈應千載之祥雅符乾德伏以皇帝陛下膺圖纂嗣壓紐騰休紹祖宗之丕基示孝慈於衆彙敦禮耆老委任勳賢所以致八孔之效靈應三秋而發皓來從月窟謺霜毳以蒙茸獻自梁庭粲冰毫而皎潔足以增輝瑞牒歸美皇猷聞天遠自於元勳拭目共觀於多士豈比魯傳趙郡獨歌如練之詞實同晉獲壽春又繼凝鉛之詠臣某聞死生者天地之常數忠孝者臣子之本心某孝未立於家忠未報於國而桑榆遽迫風燭俄驚雖修短之分偶然而古今之歎一也臣受性頑疏昧於攝理常服石乳頗歷歲年始自去冬微覺發動皇慈軫念睿渥旁流特賜祕方兼傳要訣王人薦至驛騎載馳竊見聖心密聞天語方驗君臣之藥旋收瞑眩之功碎首微軀無階上答將謂載安營魄更長皮膚得霑雨露之慈可延犬馬之命不悟才微任重福過災生從此月十二日已後舊疾再發氣緒羸憊心慮沉帛丿糸徒加藥餌竟未瘳損自二十二日已後轉覺危惙生意寂寥視陰恐盡渴日不足臣自揣度必難保全雖覆載所容亭育之恩至廣且鬼神不捨膏肓之計已成永辭明聖憂在漏刻臣自荷深恩謬居方鎮三承寵命六變星霜撫俗臨戎幸無敗闕此皆陛下聖謨宏貸元貺昭宣誓欲乘此遭逢少施勞效使千載之後知聖代有守土之臣焉永懷楊僕之移關常念子牟之戀闕是以仍歲抗表備述本誠瞻望軒墀冀獲朝覲儻丹誠曲遂元鑒俯從則臣此生沒齒無恨豈意隱慝為咎至誠不通徒知生也有涯何遽死之將至行潦微波望朝宗而先竭衰楊弱質待歲寒而已凋無由假魯陽之戈空想結杜回之草伏惟聖念俯察哀懷仰天無聲伏表流涕無任感戀歔欷之至臣某言伏奉月日制書大赦天下鴻恩至德曠古無鄰喜氣休聲韶光共茂化流海內澤及荒陬震雷作解於九霄渙汗霑敷於萬國生靈交感動植增榮中賀伏惟陛下天覆地載昭升聖謨執契垂衣財成庶品搜百王之墜禮舉三代之嘉猷明達四門駿奔九有揭天綱以齊衆理運斗極以示㣥方精微於元造之源拯救於蒼生之弊釋縲械於囹圄徵遺逸於邱園矜水旱所沴之方慎牧宰重難之選蠲苛已責崇德報功有典必禋無文咸秩普天率土飛翔所加俱臻仁壽之鄉一作場共載乾坤之德臣忝承戎寄職列藩隅雨露之恩草木同慶諸道州縣皆是攝官誅剝生靈漸不存濟此蓋郭崇韜在中書日未詳本朝故事妄被閒人獻疑點檢選曹曲生異議行矯枉過直之道成欲益反損之文其選人凡關一事闕違並是有涉踰濫或告赤缺少或文字參差保內一人不來五保皆須並廢文書一紙有誤數任皆不勘詳且自天下亂離將五十載無人不遇兵革無處不遭焚燒性命脫免者尚或甚稀文書保全者故應極少其年選人及行事官一千三百餘員得官者才及數十皆以踰濫為名盡被焚毀棄逐遂令選人或斃踣於旅店或號哭於行途萬口一詞同為怨酷臣等頃曾商議堅確不回以致二年以來選人不敢赴集銓曹無人可注中書無人可除去年闕近二千授官不及六十乃致諸道皆是攝官朝廷之恩澤不行搢紳之祿秩皆廢銜寃負屈不敢申陳列局分曹莫非僥幸且攝官只自州府多因賄賂而行朝廷不知姓名所司不考課績皆無拘束得恣貪殘及有罪名又不申奏互相掩蔽無迹追尋遂使人戶流移州縣貧困日甚一日為弊轉多若不直具奏聞別為條例不惟難息時病兼且益亂國章臣等商量伏請特降敕文宣布遠邇明言往年制置不自於宸衷此日焦勞特頒於睿澤兼以選曹公事情僞極多中書條流亦恐未盡望以中書所條件及王松等所論事節並與新定選格有輕重未盡處並委銓曹仔細點檢酌量但可以去其踰濫革彼弊訛不失本朝舊規能成選曹永例者務在酌中以為定制皇帝到京未立宗廟者夫以受命握圖既啓無疆之祚宗文祖武宜遵有國之規伏惟皇帝陛下歷數在躬艱難創業拯黔黎之塗炭廓宇宙之氛霾寰區既定於一戎基構方開於萬祀恭惟宗廟須切追崇將示肅恭豈宜稽緩臣等商量望令所司速具制度典禮以聞尊始敬先既光於太后徽章茂典永顯於洪猷色變長瀾肇皇靈之寶構光流華渚開聖緒於瑤圖莫不慶洽同文光昭大象刻玉波沿於鳳紀鳴金飇振於洪猷所以皓氣凝空編為令典神光燭夜允叶昌期皇帝陛下守位以仁繼明以德化敷有感慶洽無疆當九龍洽聖之辰是五緯聯光之夕凡蒙地載共祝天長皇帝三月九日誕聖請以其日為嘉慶節休假三日㣥臣宴樂上壽恭以少昊乘乾曳祥虹於華渚軒轅出震流瑞電於樞星所以玉牒表天地之禎金策纂皇王之異仰惟聖德允叶昌期伏惟聖帝陛下德輝三五道煥古今開階成周室之昌啓運得堯基之典豈可使方濁澄明之狀未顯洪名圜清燦爛之文不章懿號臣等傾誠紫禁都慶丹邱願隆百代之基冀正萬年之祚臣等請以七月二十八日皇帝降聖日為永壽節㣥臣上壽內外宴樂伏以壽邱降跡爰符出震之期里社應祥式契乘乾之運頃觀舊史抑有彞章幸當載誕之辰仰奉延洪之稱伏惟皇帝陛下道超九聖祚啓千齡紹文武之耿光比成康之迪哲自登天寶益顯聖功運龍韜而親御戎車仗金鉞而立平賊寇破幽并之妖孽救澤潞之生靈觀兵而直抵晉陽奮武而遠臨代北元凶假息雜虜摧鋒還京闕而契人心謁園陵而伸孝道飲至才踰於旬日覃恩已被於八方四塞關山漸息烟塵之警萬邦臣妾咸登仁壽之鄉今則候屬澄河時當降聖是甲觀懸孤之日乃銅律禦戶之時鰈水鶼林望堯雲而獻祝桓圭穀璧趨禹會以駿奔臣等叨遇休明俱塵祿位荷君父巍巍之德伸臣子慺慺之誠祇率典謨尊奉宸極臣等不勝大願謹以九月二十四日降誕日奉上節名為天清節所冀金相玉振貞寶歷以彌新地久天長煥青編而不朽臣某言伏奉今月二十四日制書大赦天下恩覃九有化被萬方至仁與陽和並舒大霈一作霈澤隨雨露偕潤凡在品彙莫不昭蘇臣某中賀臣聞天地功成是先煦育皇王立極必洽好生所以書著眚災傳稱肆赦將其更始咸與惟新廓氛霧於八紘澡塵霾於四裔幽隱有感動植懷恩朝野交歡率土胥慶恩覃有截惠及無垠固天縱之知四門已闢闡日躋之敬百度惟貞澡雪舊痕蕩除宿負宥赭衣之罪得辨平人洗白玉之瑕復為重寶唯才是急仄席搜揚阜俗為期常賦蠲滌悉中賦以贍經費罷別進以息疲黎錫死事之官封幽明知感禮高年之粟帛老幼乂安班爵以勞勤敘親以修睦貔貅之士纍洽恩私搢紳之徒同榮慶賞返縲囚於異域出幽閉於深宮感人心而禮定體乾道而化光澤及華夷仁霑草木含生之類孰不欣歡歌一德之心邇遐齊貫傳萬國之慶上下同聲祥光若浮瑞氣可覽億兆所未見古今所罕聞臣某備列班榮親覩盛禮踴躍兢抃倍萬恆情無任慶悅之至
