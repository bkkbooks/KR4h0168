front:
  text: 全唐文欽定全唐文卷九百七十一闕名十二
  hash: sha256:228dc724ed07557737a933193b91c582f3f1494ee9e23660ba8b9e7d4e36fc47
body:
  text: 當司所管天下合貢方物法長興元年三月定到七十餘州舊例冬至齊到正仗前點檢至元日於殿前排列當司引進昨點檢今年正仗前七十州所貢方物內六十七州正仗前至其餘二十州自正月至三月方到京師其江陵府所貢胎白魚臣勘本道進奏官狀稱每年臘月裛造至正仗未堪貢進固難及限猶慮其餘州未曾嚴加告諭不可便議刑名請行敕命約束如來年正仗前貢物不齊其本州録事參軍及勾押官典量定殿罰又棣州合進蘿藦子本州稱無本色折進價錢絹一匹伏以任土作貢必須産在封疆本色不供價錢何取兼恐顧茲名目廣有科求其價絹請停東丹王突欲遠泛滄波來歸皇化既服冠帶難無姓名兼惕隱等頃以力助王都罪同禿餒爰從必死并獲再生每預入朝各宜授氏庶使族編姓譜世荷聖恩允符前代之規永慰遠人之款自突欲以下請別賜姓名仍準本朝蕃官入朝例安排當館應諸處及諸司關送到合編録公事外伏準舊制國朝有時政記并起居注並合送館以備纂修近代已來闕行此事只以每遇入閣兼內殿起居朝臣待制轉對公事逐人抄送當館如有顯具頒行逐司關報到者旋據逐件一一於日歷收記其有直下所司并行之事當館無由得知若只憑本官供到所奏狀本未免簡編不備本末難窮已後待制轉對公事等除顯具頒行關送到館外應有直下所司及不行未行之事伏乞宣付當館旋依次第編録其時政記起居注并內庭逐日合書日歷亦乞相次逐旋尚書都官員外郎知制誥張昭遠丁母憂伏以大臣枕有弔祭之恩㣥寮寢苫無慰問之例高下之位有間君臣之事無偏況卿士甚多有父母者極少固於孝道上軫聖懷張昭遠望量與恩賜自此朝臣或有丁憂亦乞頒賚其狀尋已印出今具官員等第支給數目如後文班左右常侍諫議給事舍人諸部尚書太子賓客諸寺六卿監察御史中丞國子祭酒詹事左右丞諸部侍郎絹三十匹布二十匹粟麥各二十五石起居補闕拾遺侍御史殿中監察御史左右庶子諸寺少卿國子監司業河南少尹左右諭德諸部郎中員外郎太常博士絹二十匹布一十五匹粟麥各一十五石國子博士五經博士兩縣令著作郎太常宗正殿中丞諸局奉御大理寺太子中允洗馬左右贊善太子中舍司天五官正絹布各一十五匹粟麥各一十石左右諸司大將軍左右諸衛將軍絹二十匹布一十五匹粟麥各一十五石左右率府副帥絹布各一十五匹粟麥一十石準敕京城坊市人戶菜園許人收買竊慮本主占佃年多以鬻蔬為業固多貧窶豈辦蓋造恐資有力轉傷貧民先奉敕前守亳州譙縣主簿盧茂謙進策內已事竊見京城內偶遭凶喪者身不居於爵祿葬有礙於條流頃使鱉甲車殯送者事雖該於往制敕已著於前文或值炎鬱所拘偶緣留駐利便須期於時日貧窮旋俟於告投停日既多塋園又遠伏乞特付所司別令詳定權免鱉甲車送葬者奉敕送葬之儀雖防越制令文之設亦許便時其或候歷炎天事從遠日停留既久遷送有期車中便苦於撼搖陌上可量於凶穢人情所病物議僉同宜在酌中應成惻隱應喪葬自五品已下至庶人自春夏秋宜並許第等置輿其餘儀式一切仍舊兼喪車亦不全廢如要令陳於靈輿之前其輿大小制度及結絡遮蔽所使匹帛顏色并擎舁人數次第仍令御史臺詳核據品秩等級士庶高低各定規制施行兼空城內舊制比無居人近日許人戶逐便居止或有喪死旋須遷送其出時並舁遣次第亦可穩便制置務在得宜者今臺司準敕追到兩市葬作行人白望李溫等四十七人責得狀稱一件於梁開平年中應京城海例不以高例及庶人使錦繡車輿並是行人自將狀於臺巡判押一件至同光三年中有敕著斷錦繡祇使常式素車輿其輿稍有力百姓之家十二人至八人魂車虛喪車小輿子不定人數或是貧下四人至兩人回使素紫白絹帶額遮幃輿上使白粉掃木珠節子上使白絲其引魂車小輿子使結麻網幕後至天成三年中有敕條流庶人斷使輿祇令別制造鱉甲車載亦是紫油素物至今行內見使者今臺司按葬作行人李溫等通到狀并於令內及天成四年六月敕內詳穩便喪置定制五品至八品升朝官六品至九品不升朝官等及庶人喪葬儀制謹具逐件如後五品至六品升朝官使二十人舁輿車竿高七尺長一丈三尺五尺以白絹全幅為帶額婦人以紫絹為帶額並畫雲氣周回遮蔽上安白粉掃木珠節子二十道魂車一小香輿子一並使結麻網幕魌頭車一挽歌八人練布深衣披引鐸翣各一不得著錦繡明器三十事四神十二時在內四神不得過一尺餘不得過七寸園宅一方三尺其明器物不得以金銀毛髮裝飾共置八輿內許兩箇戶羅已上並不得使結絡錦繡裝飾如事力不辦任自取便七品至八品升朝官使一十六人舁輿車竿高七尺長一丈三尺五尺以白絹全幅為帶額婦人以紫絹全幅為帶額周回遮蔽上安白粉掃木珠節子二十道魂車香輿子各一並使結麻網幕魌頭車一明器二十事以木為之四神十二時在內四神不得過一尺餘不得過七寸不得使金銀雕鏤帖毛髮裝飾園宅一方二尺五寸共置六輿挽歌一十六人練布深衣披引鐸翣各一已上並不得著錦繡結絡裝飾如事力不辦任從所便六品至九品不升朝官使一十二人舁輿車竿高六尺長一丈一尺四尺以白絹全幅為帶額婦人以紫絹為帶額周回遮蔽上安白粉掃木珠節子一十六道魂車一香輿子一並使結麻網幕明器一十五事並不得過七寸以木為之不得使金銀雕鏤帖毛髮裝飾共置五輿挽歌四人練布深衣鐸翣各一不得著錦繡及別有結絡裝飾如事力不辦任自取便檢校兼試官並依此例庶人使八人舁輿車竿高五尺五寸長一丈四尺男子以白絹半幅為帶額婦人以紫絹半幅為帶額周回遮蔽魂車一香輿子一使結麻網幕明器一十四事以木為之不得過五寸共置五輿不得使紗籠金銀帖毛髮裝飾除此外已上不得使結絡錦繡等物色如人戶事力不辦八人已下任自取便其喪輿車已準敕不全廢任陳靈輿之前者已上每有喪葬行人具所供行李單狀申知臺巡不使別給判狀如所供賃不依狀內及踰制度仍委兩巡御史勒驅使官與金吾司并門司所由同加覺察如有違犯追勘行人請依天成二年六月三十日敕文行人徒二年喪葬之家即不問罪者皇城內近已降敕命指揮每有喪葬以色服蓋身出城外任自逐便如回來不得立引魂幡子却著孝衣入皇城內者今請再降旨命指揮皇城內此後每有人戶喪葬令至晚淨後取便出門不得取內外諸色趨朝官右謹具定到五品至八品升朝官六品至九品不升朝官及檢校兼試官并庶人喪葬儀制如右衣服制度準貞觀四年八月十四日詔曰冠冕制度已備令丈彞常服飾未為差節於是三品已上服紫四品五品已上服緋六品七品以緑八品九品以青婦人從夫之色仍通服黃至五年七月一日敕七品以上服龜甲雙巨十花綾其色緑九品以上服絲布及雜小綾其色青又咸通五年五月十日敕如聞在外軍人百姓有不依令式遂於袍衫之內著朱紫青緑等色短衫襖子或在閭野公然露服貴賤莫辨有蠧彞倫自今已後衣服上下各依品秩上得通下下不得僭上仍令所司嚴加禁斷又武德四年七月十六日制三品已上服大料細綾及羅其色紫五品已上服小料細綾及羅其色朱六品已上服絲布雜小綾交梭其色黃七品八品九品流外庶人服細綾絁布其色黃白者又永徽三年八月十四日詔魚袋之制恩榮所加本緣品命帶魚之法事章要重者臣今詳酌本非朝命不得輒懸魚袋內外臣僚所衣朱紫服飾降於近代不越時宜將健衣裝各立軍號當司從來無例檢詳其經商百姓等則不得著色樣綾羅及紫皂雜色衣服金色帶亦不載短長制度見任宰臣四員外其餘諸使兼侍中中書令平章事並是使相向來班序皆在見任宰臣之下今緣秦王從榮是親王新加兼中書令與諸使相不同每遇排班及到中書位次今特商議伏以政事之權雖崇四輔周行之列亦長諸王宜顯奉於本枝固不同於異姓今後望請親王官至兼侍中中書令則與見任宰臣分班定位宰臣居左諸王兼侍中中書令居右如親王及諸使守侍中中書令亦並是使相既不知印不署敕亦分行居右其餘使相請依舊規奉敕重定三京諸道州府地望次第者據十道圖舊制以王者所都之地為上本朝都長安遂以關內道為上今宗廟宮闕現都洛陽請以河南道為上關內道第二河東道第三餘依舊制又本朝都長安以京兆府為上今都洛陽請以河南府為上其五府按十道圖以關內道為上遂以鳳翔府為首河中成都江陵興元為次中興初升魏博為興唐府鎮州為真定府皆是創業興王之地不與諸府雷同今望以興唐真定二府升在五府之上合為七府餘依舊制準會要長壽二年七月十日左拾遺劉承慶上疏曰伏見比年以來天下諸州所貢方物至元日皆陳在御前惟貢人獨於朝堂列拜伏請貢人至元日列在方物之前以備充庭之禮制曰可近年直至臨鎖院前赴應天門外朝見今後請令舉人復赴正仗仍緣今歲已晚貢士未齊欲且據見到人點引牒送四方館至元日請令通事舍人一員引押朝賀列在貢物之前或以人數不少即請祇令諸科解頭一人就列其餘續到者候齊日別令朝見如蒙允許當司即於都省點別習儀當館昨為大中以來迄於天祐四朝實録尚未纂修尋具奏聞謹行購募敕命雖頒於數月圖書未貢於一編蓋以北土州城久罹兵火遂成滅絶難可訪求竊恐歲月漸深耳目不接長為闕典過在攸司伏念江表列藩湖南奧壤至於閩越方屬勳賢戈鋋自擾於中原屏翰悉全於外府固多奇士富有㣥書其兩浙福建湖廣伏乞詔旨委各於本道采訪宣宗懿宗僖宗昭宗以上四朝野史及逐朝日歷銀臺事宜內外制詞百司沿革簿籍不限卷數據有者抄録上進若民間收得或隱士撰成即令各列姓名請議爵賞一九經五經明經呈帖經之時試官書通不後有不及格者唱落後請置筆硯將所納由分明却令自看或是試官錯書通不當與改正如懷疑者使許請本經書面前檢對如實是錯誤即更於帖上書名而退一五科常年駁榜出多稱屈塞今年並明書所對經書墨義云第幾道不第幾道粗第幾道通任將本經書疏照證如考試官錯書不粗請別將狀陳訴當再加考較如實錯誤妄陳文狀當行嚴斷一今年舉人有抱屈落第者許將狀披訴貢院當與重試如貢院不理即詣御史臺論訴請自試舉人日令御史臺差人受舉人訴屈文狀并引本身勘問所論事件或知貢舉官及考試官已下取受貨賂升擢親情屈塞藝能應副囑託及不依格去留一事有違請行朝典一懷挾書策舊例禁止請自今年後入省門搜得文書者不計多少準例扶出殿將來一舉上鋪後搜得文書者準例扶出殿將來兩舉一遙口授人回授試處及抄義題帖書時諸般相救準例扶出請殿將來三舉一自是藝業未精準格落下出外及見駁榜後羞見同人妄扇屈聲擬為將來基址及別人帖對過場數多者便生誣玷墜陷或羅織毆罵者並當收禁榜送御史臺請賜勘窮如知貢舉官及考試官事涉徇私屈塞藝士請行朝典若虛妄者請痛行科斷牒送本道重處色役仍永不得入舉場同保人亦請連坐各殿三舉諸道州府官甚有闕員前資官皆拘選限其間有朝廷選擇侯伯薦揚得者無多餘難驟進或病跧於陋巷或老謝於窮途宜開振滯之門雅合推恩之道今等第減選者一選者無選可減親公事得資考者宜優與處分不得資考者準格施行兩選三選者減一選四選五選者減兩選六選七選者減三選八選九選者減四選十選十一選者減五選十二選者減六選千牛進馬童子齋郎挽郎宜準元和處分既關威力之條合處殺人之罪但以情非巨蠧事準格文爰該免死之科式表好生之德盧嵩準格配流天德曳撲人王光祚配流登州應食課鹽州府省司各置榷糶折博場院應是鄉村並通私商興販所有折博并每年人戶蠶鹽並不許將帶一斤一兩入城侵奪榷糶課利如違犯者一兩已上至一斤買賣人各決臀杖一十三放一斤已上至三斤買賣人各決臀杖十五放三斤已上至五斤買賣人各決脊杖十三放五斤已上至十斤買賣人各決脊杖十七放十斤已上不計多少買賣人各決脊杖二十處死有犯鹽人隨行錢物驢畜等並納入官所有元本家業田莊如是全家逃走者即行典納仍許般載腳戶經過店主人腳下人力等糾告等第支與優給如知情不告與買賣人同罪其犯鹽人經過處地分門司廂界巡檢節級所繇并諸色關連人等不專覺察即據所犯鹽數委本州臨時科斷訖報省如是門司關津口鋪捉獲私鹽即依下項等第支給一半賞錢一斤已上至十斤支賞錢二十貫文五十斤已上至一百斤支賞錢三十貫文一百斤已上支賞錢五十貫文應食末鹽地界州府縣分並有榷糶場院久來內外禁法即未有一概條流應刮鹻煎鹽不計多少斤兩並處極法兼許四鄰及諸色人等陳告等第支與賞錢欲指揮此後犯一兩已上至一斤買賣人各決臀杖十三放一斤已上至二斤買賣人各決臀杖十五放二斤已上至三斤買賣人各決脊杖十六放三斤已上至五斤買賣人各決脊杖十七放五斤已上買賣人各決脊杖二十處死如是收到鹻土鹽水即委本處煎煉鹽數準條流科斷或有已曾違犯不至死刑經斷後公然不懼條流再犯者不計斤兩多少所犯人並處極法其有榷糶場院員寮節級人力煎鹽池各竈戶般鹽船綱押綱將軍衙官稍工等具知鹽法如有公然偷盜官鹽或將貨賣其買賣人及窩般主人知情不告並依前項刮鹻例五斤已上處死者其諸色關連人等並各支賞錢即準雒京邢鎮州條流事例指揮顆末青黃等鹽元不許界分參雜其顆鹽先許通商之時指揮不得將帶入末鹽地界如有違犯一斤一兩並處極法所有隨行色物除鹽外一半納官一半與捉事人充優賞其餘鹽色未有畫一條流其雒京并鎮定邢州管內多有北京末鹽入界捉獲並依雒京條流科斷欲指揮此後但是顆末青白諸色鹽侵界參雜捉獲並準雒京條例施行慶州青白榷稅元有透稅條流所有隨行驢畜物色一半支與捉事人充優賞其餘一半并鹽並納入官欲並且依舊一斗已上至三斗決臀杖十五放三斗已上至五斗決脊杖十三放五斗已上處死安邑解縣兩池榷鹽院河府節度使兼判之時申到畫一事件條流等準敕牒兩池所出鹽舊日若無榜文如擅將一斤一兩準元制條並處極法其犯鹽人應有錢物並與捉事人充優賞者切以兩池禁棘峻阻不通人行四面各置場門弓射分擘鹽池地分居住並在棘圍內更不別有遣差祇令巡護鹽法如此後有人偷盜官鹽一斤一兩出池其犯鹽人並準元敕條流處分應有隨行錢物並納入官其捉事人依下項定支優給若是巡檢弓射池場門子自不專切巡察致有透漏到棘圍外被別人捉獲及有糾告兼同行反告官中更不坐罪陳告人亦以捉事人支賞應知情偷盜官鹽之人亦依犯鹽人一例處斷其不知情關連人臨時酌情定罪所有透漏地分弓射及池場門子如是透漏出鹽十斤已下決脊杖十五放一十斤已上與犯鹽人同罪科斷一斤已上至十斤支賞錢一十貫文十斤已上至五十斤支賞錢二十貫文五十斤已上至一百斤支賞錢三十貫文一百斤已上支賞錢五十貫文前項所定奪到鹽法條流其應屬州府捉獲抵犯之人便委本州府檢條流科斷訖申奏別報省司其屬省院捉到犯鹽之人干死刑者即勘情申上候省司指揮不至極刑者便委務司準條流決放訖申報奏準長興元年二月二十一日南郊赦書節文州縣官在任日雪得寃獄許非時參選超資注官仍賜章服今詳敕命凡云寃獄者所司推鞫定罪不平回曲作直已成案牘或經長吏慮問或是家人訴寃重結推訊始見情實回死為生始名雪寃仍須元推官典招伏情罪本處檢案牘事節給與公憑更於考牒內署出候本官滿日便準近敕非時參選若活得一人超一資注官二人已上加章服已有章服加檢較官如在任除雪寃獄外限內徵科了絶減得一選已上或招添戶口至一分已上並許酬獎如加官至五品已上許奏聽敕旨如雖雪得寃獄徵科違限不了合殿選者亦待殿選滿日與敘雪寃之賞或逃却戶口亦據降等敘官如本司小小刑獄未經別司縱能處斷不得援例
