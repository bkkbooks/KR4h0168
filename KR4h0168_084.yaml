front:
  text: 全唐文欽定全唐文卷八十四懿宗二
  hash: sha256:17321a8a955f24bb08f1b1a91f30354cc61f50c161e7f734cbee5b27e7d0882f
body:
  text: 至道所先刑柄最切向聞鞫斷動隔炎涼不惟理且未伸多致疾而成夭冤霾既聚和氣乃傷日月星辰繇此失度水旱蟊賊所以為災自此委刑法官條示天下州府長吏旋即䟽理無致淹延濟濟多士邦國賴之以取寧蹇蹇匪躬王臣急之以行義故內懸諫鼓外設匭函思廣謨猷用宏風教自此在朝行者勿韜利國之謀居草澤者但貢安人之策必當開納擇彼所長勿慮依違翻成自滯旌揚之道無所恡焉建中元年巳有明勅常參官上後舉一人自代編諸式令實廣聞見既開推讓之途將致雍熙之化聞其近者多廢舊規從今後百官凡有除移切遵典故無取掩賢之誚當明舉直之心我得其人國無不理志興奏汝以景崇未降恩命欲來朝覲事具悉景崇素聞孝弟頗有義方洽三軍愛戴之情荷千里折衝之寄纉廼舊服綽有令猷朝廷獎能續有處分緣孝明太后園寢有日庶事且停祔廟禮成當允誠請河中晉絳磁隰節度使開府儀同三司檢校司徒同中書門下平章事河中尹上柱國譙郡開國公食邑二千戶夏侯孜早以文詞遂登科第累更清貫亦有能名東陽推撫俗之能故絳著臨人之稱其後用司風憲寵領藩條皆以公才不辜時選洎掌於經費備歷重難居然要會之權頗得均平之道錄其績效擢處鈞衡造膝之時亦聞其籌畫沃心之際備見其謀猷於是念彼邊隅控臨巴蜀藉其才術再靜蠻陬翻致帑廩空虛軍資窘竭冤流闔境寇逼連甍雖易帥巳來頗移星琯而無備之後歲有干戈昨者徼障初安瘡痍復釁敷尋事實果騐根由既乖經濟之源益昧君臣之義出於物議非獨予懷是議難處近藩爰更散秩可太子少保分司東都動天地者莫若精誠致和平者莫若修政朕顧惟庸昧託於王公之上於茲十一年矣祗荷丕構寅畏小心慕唐堯之欽若昊天遵周王之昭事上帝念茲夙夜靡替虔恭同馭朽之憂勤思納隍之軫慮內戒奢靡外罷畋遊匪敢期於雍熙所自得於清淨止望寰區無事稼穡有年然而燭理不明涉道唯淺氣多堙鬱誠未感通旱暵是虞蟲螟為害蠻蜑未賓於遐裔寇盜復蠹於中原尚駕戎車益調兵食俾黎元之重困每宵旰而妄安今盛夏驕陽時雨久曠憂勤兆庶旦夕焦勞內修香火以虔祈外罄牲玉以精禱仰俟元貺必致甘滋而油雲未興秋稼闕望因茲愆亢軫於誠懷矧復暴政煩刑強官酷吏侵漁蠹耗陷害孤煢致有冤抑之人構成災沴之氣主守長吏無忘奉公伐叛興師蓋非獲巳除姦討逆必使當辜苟或陷及平人自然風雨愆凡行營將帥切在審詳昭示惻憫之心敬聽勤卹之旨應京城天下諸州府見禁囚徒除十惡忤逆官典犯贓故意殺人合造毒藥放火持仗開劫墳墓及關連徐州逆黨外並宜量罪輕重速令決遣無久繫留雷雨不周田疇方瘁誠宜愍物以示好生其京城未降雨閒宜令坊市權斷屠宰昨陝虢中使迴方知蝗旱有損處諸道長吏分憂共理宜各推公共思濟物內有饑歉切在慰安哀此蒸人毋俾艱食徐方寇孽未殄師旅有征凡合誅鋤審分淑慝無令脅從橫死元惡偷生宜申告伐之文使知逆順之理於戲每思禹湯之罪己其庶成康之措刑孰謂德信未孚教化猶梗咨爾多士毗予一人既引過在躬亦漸幾於理布告中外稱朕意焉去歲災興分野毒起徐方蕞爾庸夫稱兵犯命招諭不復猖狂罔悛脅從三州之人汙染萬姓之俗逆順之理邪正坐分果有忠臣悉殲逆黨再清郡邑不舉干戈此皆衆人協心闔州受福但以首尾周歲取制凶威里閭不安農桑失業言念於此倍積憂懷巳有詔指揮令授元稔銀青光祿大夫檢校右散騎常侍兼右驍衞大將軍御史大夫賜分帛五千匹金榼一枚蓋碗一具金腰帶一條軍將張皐巳下二十人等第優給今差高品李志承押領宣賜畋頃以行蹟玷穢為時棄捐朝籍周行無階踐歷竟因由徑遂致叨居塵忝既多狡蠹尤甚且居承旨合體朕懷一昨劉瞻出藩朕豈無意爾次當視草過為美詞呈譎詭於筆端籠愛憎於形內徒知報瞻欬唾之惠誰思薎我拔擢之恩載詳言偽而堅果明同惡相濟人之多僻一至於斯宜行竄逐之科用屏回邪之黨可梧州刺史夫功合天者稱皇德合地者稱帝皇帝二者朕巳享之況孤寡不穀之名靡遵於元祖明聖孝德之號久忝於沖人業業兢兢惟懼不稱南蠻未讋師旅尤屯東寇雖平瘡痍尚大方將罪己曷敢矜功卿等修德銳於皐陶恥君不如堯舜鋪陳故事增飾洪名謙恭愈堅表章謺至對揚之際忠懇彌彰私我以奉先勉我以從衆亦念乙酉之歲堅請不渝今復固違似矜小讓名實未副朕當不敢荒寧始終相成卿亦勤於獻替勉俞來請深用愧懷我國家系承混元教遵清淨苦縣舊里聖祖故鄉宮宇具嚴廟貌斯設昨者餘妖奔突縱火將欲焚燒陰霧覆閉於晴空狂寇顛迷於道路散逸原野遂至誅夷緬維元功申茲靈貺內出青詞又委李蔚虔申告謝布示中外仍付史官上天降祉厚地呈祥爰有白靈書出於混元寶殿告國祚延洪之兆示坤珍啟迪之符顧此殊休宜為上瑞宣付史館頒示四方李國昌久懷忠赤明著功勞朝廷亦三授土疆兩移旄節其為寵遇實寡比倫昨者徵發兵師又令克讓將領惟嘉節義同絕嫌疑近知大同軍不安殺害段文楚推國昌小男克用主領兵權事雖出於一時心豈忘於長久段文楚若實刻剝自結怨嫌但可申論必行朝典遽至傷殘性命刳剔肌膚慘毒憑陵殊可驚駭況忠烈之後節義之門致茲橫亡尤悚觀聽若克用暫勿主兵務束手待朝廷除人則事出權宜不足猜慮若便圖軍柄欲奄有大同則患繫久長故難依允料國昌輸忠效節必當己有指揮知卿兩任雲中恩及國昌父子敬憚懷感不同常人宜速與書題深陳禍福殷勤曉喻劈析指宜切令大節無虧勿使前功併棄朕少失所親若非楚國夫人鞠養則無朕此身雖迂朝典望卿放下仍令後不得援以為例朕祗事九廟君臨四海夕惕如厲宵分靡寧必求政化之原思建大中之道至於懷柔夷貊偃戢干戈皆以德綏亦自馴致冀清淨之為理庶洽平之可臻自秋以來忽爾嬰疹坐朝既闕踰旬未瘳六疾斯侵萬幾多曠毉和無騐以至彌留嗚呼數之有窮聖賢所同明於斯言是為達節載申顧命式叶典謨皇太子權勾當軍國事儼性稟寬和生知忠孝德包睿哲聖表徇齊必能揚祖宗之重光荷邦家之丕構宜令所司具禮於柩前即皇帝位以司空門下侍郎平章事韋保衡攝冢宰軍國務殷豈可久曠況易月之制行之自古皇帝宜三日而聽政二十七日而釋服諸道節度觀察團練防禦等使及監軍諸州刺史受寄至重並不得離任赴哀文武常參官朝晡之臨十五舉音宮中當臨者非時無得擅哭天下人吏百姓告哀後出臨三日皆釋服勿禁食肉飲酒婚姻祭祀釋服之後無禁舉樂薄葬之禮宜遵漢魏之文其山陵制度切在儉約並不得以金銀錦繡文飾喪具五坊鷹犬等除蒐狩外餘並解放其醫官段璲趙符虔休馬伋等並釋放咨爾將相卿士中外臣寮竭力盡忠匡予令嗣送往事居無違朕志布告遐爾咸使聞知令狐滈多時舉人極有文學流輩所許合得科名比以父綯職在樞衡避嫌不赴今因出鎮卻就舉場況諧通規合試至藝宜令主司準大中六年勅考試只在至公如涉徇情自有刑典從今巳後但依常例放榜本司取士貴在得人去留之閒惟理所在嶺南分為五管誠巳多年居常之時同資禦捍有事之際要別改張邕州西接南蠻深據黃洞控兩江之獷俗居數道之游民比以委人太輕軍威不振境連內地不並海南宜分嶺南為東西道節度觀察處置等使以廣州為嶺南東道邕州為嶺南西道別擇良吏付以節旄其所管八州俗無耕桑地極邊遠近罹盜擾尤甚凋殘將盛藩垣宜添州縣宜割桂州管內龔州象州容州管內藤州巖州並隷嶺南西道收管徐州本貫支郡先隷東平建中初李洧以畏忌歸降遂創徐海使額貞元初張建封以威名寵任特貼濠泗兩州當時緣拒捍淄青掎角光蔡務張形勢廣樹藩垣自寇孽冰消區域無事武寧一道翻長亂階曾靡悛心殆成逋藪須為置制以削驍鋒徐州宜改為本州團練使除當州諸縣鎮外別更留兵二千人隷屬亠兊海節度使收管濠州本屬淮南節度收管宿州地居埆口路阨彭門北接睢陽南臨淮甸當漕運之要蓋水陸之衝宜置全師以臨列郡仍置宿泗等州都團練觀察處置等使便以宿州為理所王式且充武寧軍節度使兼徐泗濠宿等州制置使其兵馬除留在徐州外仍令王式與元質量其多少分配宿州團練使及泗州兵馬留後濠州渦口城使下如人數猶多即分隷屬淮南浙西天平亠兊海淄青等道逐便收管各給本分衣糧其家一任相隨官中接借發遣令其存濟其割配諸道將士緣皆有家屬須令裝束每人各賜絹兩匹以戶部物充其徐州諸縣先有鎮堡處亦量利害輕重差配人數守捉武寧軍大將如素有軍功及官巳至中丞大夫以上者各具名薦聞別加委用其餘割送亠兊宿兩道軍前收管如情願住徐州者亦聽穩便王式元質一切共為置制待公事分配總畢必知寧帖無事即令王式與崇憲等自領兩道兵馬直到汴州分付仲齊及滑州都將各押領送歸本道王式元質放許滑將士歸後既無公事便赴闕廷別加勞獎其衙內銀刀等將官健有逃匿未捉獲者若能束身自首所在歸投者一切不問仍準前勅割配諸道與衣糧并家口任去勅到後一月內不出陳首者即不在此限餘準詔旨處分門下朕聞孝養之道發於因心誠敬之文著在前典平時以問安自慰寢疾則省侍宜專太皇太后玉衣兆祥瑤齋啟聖母儀天下德被寰中春秋既高飲膳微減朕親自迎奉移居永安期速就平勿藥有喜而精誠未感良醫無徵情方切於焦憂政豈遑於聽斷須躬問視以冀平和恐中外具寮未諒予意起今月三十日以後權不聽政故茲宣示宜體朕懷朕比寒暑致疾綿滯經時今旬朔之閒寢膳巳復蒙天地保祐宗社寵靈既疾痛之有瘳念疲羸之無告為之父母得不憫傷慮赦令之或頻則姦人之得計倘恩惠之遠布冀窮氓之稍蘇應天下百姓僧尼道士女冠等有年七十以上疾病癥痼委頓牀榻者宜各賜絹兩匹在軍旅行陣經敵傷害手足眼目不能營生亦各賜絹兩匹應州縣病坊貧兒多處賜米十石或數少處即七石五石三石其病坊據元勅各有本利錢委所在刺史錄事參軍縣令糾勘兼差有道行僧人專勾當三年一替如遇風雪之時病者不能求丐即取本坊利錢市米為粥均給饑乏如疾病可救即與市藥理療其所用絹米等且以戶部屬省錢物充速具申奏知定數即以藩鎮所進賀疾愈物支還所司此勅到仰所在州縣寫錄勅牓於州縣門并坊市村閭要路其州縣所給卹絹米恐下吏之所隱欺仍委刺史縣令設法頒布不得令不到本身所在給卹之後一一分析聞奏俾令速濟疾病稱朕意焉驩州流人楊收謬承獎擢任以台衡志每搆其貪叨迹頗章於黷貨欺天罔上罪不可赦俾其全生是為妄貸宜令內養郭全穆所在賜自盡前鎮南軍節度使檢校工部尚書嚴譔器本瑣微志惟凶險廣用賄貨交結奸邪致楊收不顧刑章恣為威福以桂林江西之重舉爾為名納陳珍奇寶之私竊我良守所令按復不欲追窮頃聞海隅多難調發為備蠻寇未息餽餉方繁或擅納衣糧或廣補戍卒剋剝求取知無不為罔地欺天何嘗自愧而又因榷使罔奏闕庭欲以資財用為排卻楊收既當極典闕嚴刑將令肅振朝綱貴免紊亂邦憲中外臣庶當體予懷宜令所在賜自盡臣子之節無如盡忠士人之風宜當遠恥崔雍任居牧守賊犯州城禦捍曾不發言從容乃與命酒況石瓊未脫衣甲志在當鋒不能獎其赤誠翻令擒送賊所原其深意與賊通和臣節全虧情狀可見將行朝典更要推窮其崔雍家口並在宣州宜令宣歙觀察使追崔雍收禁勘責速具事繇申奏當崔雍守郡之日是龎勛肆逆之初屬狂寇奔衝望風和好置酒以邀賊將啟關而納凶徒城內不許持兵皆令解甲致使三軍百姓抆血相視連頭受誅初聞奏陳深駭觀聽錫望守城而死巳有追榮杜慆孤壘獲全尋加殊獎既襃忠節難赦罪人玉石固分懲勸斯在將垂誡於四海當何愛於一夫其崔雍宜差內養孟公度專往宣州賜自盡徐宿二州將士百姓等去歲徐州戍卒專擅迴戈殺戮都頭剽奪器仗當時遠近言論朝廷便欲誅鋤朕以好生為心懷土可恕不令究詰但任歸還將及本州又自疑阻俄興悖亂遽恣猖狂囚辱廉使監軍戕害小使大將邀求符節專撓城池朕再三招懷丁寧慰諭啟自新之路垂宥過之言奷計逾堅慢辭彌犯塗炭百姓虐毒四封近年以來劇賊無比爰思止殺乃命興戎稽緩靈誅殆將周歲然而凶黨之外平人甚多皆被脅從遭其驅使每聞勝捷倍所歎傷今既厎寧專令宣撫縷申明之深委使臣除弊利人蠲稅節用軍士衣賜俾其計量種麥是時巳令給卹仍遣臨時裁度唯務便安皆負周才以展良術軍人百姓罹此橫禍災數致然勉於營生安茲樂土其餘事件並在德音指揮使臣專臨重此頒述今遣左散騎常侍劉異兵部郎中薛崇宣慰想宜知悉荊南節度使杜悰據司天奏有小孛星氣經歷分野恐有外夷兵水之患緣邊藩鎮最要隄防宜訓習師徒增築城堡凡關制置具事以聞去年屬以用軍之際權停貢舉一年今既偃戈卻宜仍舊來年宜別許三十人及第進士十人明經二十人巳後不得援例徐州地當沛野軍本驍雄實為壯國之都固協建侯之制況山河素異土俗甚殷豈欲削卑挫其䋣盛蓋緣比因稔禍或至亂常罪由巳招孽非天作桂林叛卒繼有逆謀塗炭生靈首尾周歲殺傷黎庶汚染忠良所不忍言尋加翦滅是以卑其鎮額隷彼藩方近屬大兵巳來饑年荐至且聞軍人百姓深恥前非願行舊規卻希建節朕每深軫念思致雍熙欲示渥恩特議改易既崇軍額要備供須宜賜宣徽庫內綾絹一十萬匹助其宴犒必獲周豐累歲用兵甚費國力特與借助功在節量如初有脅從後成亡命或未還鄉里或逃匿諸州加意招攜各歸本業若稱自樂所止亦可徇其私情貴衆士獲安恐一物失所用期昭泰必在均平典故具存廢興不昧仍更鎮額盛彼軍威冀覩封疆永保寧謐其徐州都團練使仍改為感化軍節度徐宿濠泗等州觀察處置等使慎恤刑獄大易格言語曰如得其情即哀矜而勿喜而獄吏苛刻務在舞文守臣因循罕聞親事以此械繫之輩溢於狴牢追捕之徒繁於牘實傷和氣因致沴氛況時屬熇蒸化先茂育並赦罪戾式順生成應天下所禁繫罪人除十惡忤逆及故意殺人合造毒藥持仗行劫開發墳墓外餘並宜䟽理釋放如或信任人吏多有生情繫留續察訪得知本道觀察使判官州府本曹官必加懲譴以誡慢易到後十日內速䟽理分析聞奏
