body:
  text: 門下禮重內朝國有彞制德既備於宮壼位宜峻其等威婕妤王氏劉氏並體坤順之德循姆師之訓齊莊之禮淑慎有儀揚懿軌於中闈表柔明於內則惠流宸禁芳靄椒塗慕辭輦之志宏逮下之德宜極寵數以彰徽猷必能重正閫儀助修陰教無愧於女宗之誡國風之詩王氏可淑妃劉氏可賢妃仍並令所司擇日備禮冊命主者施行一日萬機熙帝載者輔相豫違爾弼成台德者股肱天將瑞時必有人傑況當出震之日實藉濟川之才諸道鹽鐵轉運等使銀青光祿大夫守刑部尚書上柱國崔珙應期而生希代之寶量函海嶽明並日星懷倜儻之奇姿抱英邁之正氣挺質而圭璋比德彯纓而冠蓋盈門立言每見於經邦行巳諒先於及物早持旄節再踐崇壇柔獷悍為忠義之心變封疆為禮樂之族信入人腹令行軍牙及尹正神州儀刑郡國剛能嫉惡明可照奸三輔宏取則之風四方稟承流之化洎司管榷益茂器能精若鑑金利逾滓刃歲以饒羡國用富強懿乃成功允諧選衆是宜亮采皇極陟降臺階調陰陽於至和濟生靈於將泰四維咸舉百度以貞俾時式庸佐朕為理夫周以冢宰制國用漢以丞相調兵食猶怙牢盆之務往居鈞軸之尊后德惟臣良臣惟聖汝其納誨豫亦踐言勉符魚水之資永贊文明之化服茲休命敬之敬之可守本官同中書門下平章事依前充諸道鹽鐵轉運等使諸道承乏官等雖云假攝當責課程但霑一半料錢不獲雜給料例自此手力紙筆特委中書門下條流貴在酌中共為均濟租斂有常王制期在徵率無藝齊人何依內外諸州府百姓所種田苗率稅斛斗素有定額如聞近年長吏不遵條法分外徵求致使力農之夫轉加困弊亦有每年差官巡檢勞擾頗深自今巳後州縣每年所徵斛斗一切依元額為定不得隨年檢責數外如有荒閒陂澤山原百姓或力能墾闢耕種州縣不得輒問所收苗子五年不在收稅限五年之外依例收稅於一鄉之中先填貧戶缺闕如無缺闕即均減衆戶合徵斛斗但令不失元額不得隨田地頃畝加稅仍委本道觀察使每年秋成之時具管內墾闢田地頃畝及合徵上供留州使斛斗數分析聞奏數外有剩納人戶斛斗刺史以下並節級重加懲貶觀察使奏聽進止仍令出使郎官御史及度支鹽鐵知院官訪察聞奏安土重遷黎人之性苟非艱窘豈至流亡將欲招綏必在資産諸道頻遭災沴州縣不為申奏百姓輸納不辦多有逃移長吏懼在官之時破失人戶或恐務免正稅減剋料錢祗於見在戶中分外攤配亦有破除逃戶桑地以充稅錢逃戶産業巳無歸還不得見在戶每年加配流亡轉多自今巳後應州縣開成五年巳前逃戶並委觀察使刺史差強明官就村鄉詣實勘桑田屋宇等仍勒長令切加較租佃與人勿令荒廢據所得與納戶內徵稅有餘即官為收貯待歸還給付如缺少即與收貯至歸還日不須徵理自今年巳後二年不歸復者即仰縣司召人給付承佃仍給公驗任為永業其逃戶錢草斛斗等計留使錢物合十分中三分巳上者並仰於當州使雜給用錢內方圓權落下不得剋正員官吏料錢及館驛使料遞乘作人課等錢仍本戶歸復日漸復元額王者推至公以御天下成庶務以佚羣才況乎寅亮所資安危攸屬顧是進退實惟闕其有績懋致君誠深知止則豈可不優其恩禮遂以便安上德尊賢於是乎在銀青光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事監修國史陳夷行受天正性味道至和雅量川渟厚德山峙慮必經遠詞皆托微舒遲見君子之容端肅得大臣之體文推訓誥學奧泉源膏腴五常枝葉百行早以精懿列侍禁闈溫樹既彰於不言王度每資於密贊洎踐登衮職左右文宗遇事必陳犯鱗靡懼標揭令範振揚直聲逮余纂承再諧夢卜輔我以中天之道宏我以可久之規匡益居多厥庸甚茂近者寒暑乖步履或難嘉猷屢竭於沃心微恙有妨於造膝朕雖深倚賴方樂優崇而獻疏披誠固懷退讓眷言美志難議強煩用是輟燮贊於三台專儀型于百揆庶可資乎頤養且無替其崇高仍加貴勳式表光寵可守尚書左僕射仍賜上柱國門下我國家制馭戎夷推崇恩義示之以大信重之以和親所以燀聲教於殊鄰割骨肉之深愛纍聖宏略載於國章太和公主擢秀天潢聯華宸極智惟周物識可洞微乃者回鶻輸誠願求相好穆宗皇帝義難違拒且務懷柔以鳳樓和淑之姿降龍庭桀驁之俗一辭朝闕二紀於茲常興去國之悲巳絶還鄉之望今可汗自竊名號來依塞垣朕以渥澤久濡飄零可憫齎以粟帛喻之旋歸曾無感激之心益肆貪婪之性遂得忠義同力將帥協謀未揚金鼓之音巳潰犬羊之衆遽收貴主出彼穹廬上以慰太后之深慈下以攄兆人之積憤將修慶覲坐雪幽冤名節自彰歎尚何極笳簫淒怨休傳朔漠之聲環珮鏗鏘再齒平陽之列是用易其舊邑錫以嘉名增沁園湯沐之封釋邊地風沙之思舉茲典禮用表忠勤祗服寵榮永光冊可封定安大長公主朕顧惟眇身纘承大構思有以允釐百事表率萬邦進髦傑於臺階庶緝熙於帝載布誠聽問側席眷求爰於嶽牧之中載協蓍龜之兆乃舉成命以副具瞻淮南節度副大使知節度事充諸道鹽鐵轉運使光祿大夫檢校尚書右僕射杜悰器宇恢宏襟度夷曠學通九經之要道符百行之源寒松不雕貞玉無玷忠信勵事君之節勤慎得成務之才任歷殷繁志惟匡益洎臨淮海兼掌貸泉開張多濟物之功饒羡指助軍之獻既而積粟應挽馳幣待供師徒無歉食之虞餽給有贏財之備克就戎事在我元臣是用付以國鈞俾司邦計仍兼管榷之重務藉輸經濟之良能師長百僚亦從舊貫往踐大位爾其欽哉於戲惟理亂在庶官矧乎輔翼之臣寅亮代天之化必在參修政本振起皇綱興禮義以厚人倫竭謀猷以清氛祲期於啓沃以弼豫違無金玉爾音將孤於虛佇也可檢校尚書右僕射同中書門下平章事充度支兼諸道鹽鐵轉運等使門下車服之制載美周詩湯沐之闕遵漢典備光內闕等並稟慶絳河流芳彤管穠華懿淑雅志靜專柔順之心叶於禮度肅雍之道慶於言容宜錫粉田之榮用昭銀榜之貴可依前件君之用臣也進則用其才勞則逸其事況丹青大化左右朕躬謨明之效巳彰歲月之勤亦至俾其宴息用保初終尚書右僕射兼門下侍郎同中書門下平章事杜悰貞莊有容沈厚多敏早歷內外之任備陳經濟之謀剛厲馳聲肅恭推美通議大夫守中書侍郎兼戶部尚書同中書門下平章事充集賢殿大學士上柱國博陵縣開國子食邑五百戶賜紫金魚袋崔鉉誠明挺操溫粹含章擢自禁垣之中列於台司之上獻替不倦沈研益光而皆披衮在廷事君宏道方當注意資爾令猷或趨尚之閒時聞於朋比黜陟之際跡涉於依違朕尊禮大臣虛襟庶政將務羲唐之化所期伊呂之賢苟曰未諧豈副僉屬臨軒永念能不憮然宜解職三台列官八座揆長天臺之右地居戶版之雄勉思令圖服我成命悰可行尚書右僕射鉉可守戶部尚書我國家光宅四海君臨八荒聲教所覃冊命咸被況乎族稱宗姓地接封疆爰申建立之恩用廣懷來之道有加常典得不敬承黠戛斯國生窮陰之鄉稟元朔之氣少卿之後胄裔且異於蕃夷大漠之中英傑自雄於種落日者居於絶徼隔以強鄰空馳向化之心莫通事大之體旋能奮其武勇清彼朔陲萬里歸誠重譯而至時既當於無外義必在於固存是用特降徽章載明深懇加其美號錫以丹書貽厥後昆遂荒有北舉茲盛典章示遠戎祗服寵光永孚恩化可冊為宗英雄武明誠可汗命右散騎常侍兼御史中丞李拭持節充冊立使仍命有司擇日備禮冊命我唐之盛實曰貞觀開元則有若姚公宋公彌綸天祿雖二祖之克聖亦良弼之攸賴朕自膺寶祚於茲六年未嘗一日不念貞觀開元之至理其命相也敢容易哉是用藎臣冀臻於道戶部侍郎判戶部事李回風雲元感山嶽降神蔚為人寶好道天爵心無適莫惟直是從事不古滯應機輒發靈府可以調元氣宏材可以濟巨川有君子欲訥之言有賢人可大之業掌綸西掖克潤王猷執南臺是稱邦直每揚清以激濁嘗持正以照邪凡有敷揚皆稱朕意況副豫愛子功機疑和戎掌彼版圖時維舉職歷試皆可實獲我心是宜參務中樞啓揚庶績式光帝載且寵正人敬往欽哉無忘休命可中書侍郎同中書門下平章事充集賢殿大學士依前判戶部事朕聞三代巳前未嘗言佛漢魏之後象教浸興是由季時傳此異俗因緣染習蔓衍滋多以至於蠹耗國風而漸不覺誘惑人意而衆益迷洎於九州山原兩京城闕僧徒日廣佛寺日崇勞人力於土木之功奪人利於金寶之飾遺君親於師資之際違配偶於戒律之間壞法害人無逾此道且一夫不田有受其饑者一婦不蠶有受其寒者今天下僧尼不可勝數皆待農而食待蠶而衣寺宇招提莫知紀極皆雲構藻飾僭擬宮居晉宋齊梁物力凋瘵風俗澆詐莫不由是而致也況我高祖太宗以武定禍亂以文理天下執此二柄用以經邦豈可以區區西方之教與我抗衡哉貞觀開元亦嘗釐革剗除未盡流衍轉滋朕博覽前言旁求輿議弊之可革斷在不疑而中外諸臣協豫至意條流至當宜在必行懲千古之蠹源成百王之典法濟人利衆豫何讓焉其天下所拆寺四千六百餘所還俗僧尼二十六萬五百人收充兩稅戶拆招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢為兩稅戶十五萬人隸僧尼屬主客顯明外國之教勒大秦穆護祓二千餘人還俗不雜中華之風於戲前古未行似將有待及今盡去豈謂無時驅游惰不業之徒巳踰十萬廢丹雘無用之室何啻億千自此清淨訓人慕無為之理易齊政成一俗之功將使六合黔黎同歸皇化尚以革弊之始日用不知下制明廷宜體豫意宣布中外咸使聞知自古議禮皆酌人情必若稷嗣知幾賈生達識方可發揮大政潤色皇猷其他管窺蓋不足數公卿之議實可施行德章所陳最為淺近豈得苟申獨見妄有異同事貴酌中禮宜從衆宜令有司擇日修崇太廟以留守李石充使勾當州縣官比聞縱情杯酒之間施刑喜怒之際致使簿書停廢獄訟滯冤其縣令每月非暇日不得輒會賓客遊宴其刺史除暇日外有賓客須申宴餞者聽之仍須省諸道觀察使任居廉察表率一方宜自勵清規以為程法朝廷典刑理當畫一官吏贓坐不宜有殊內外文武官犯入巳贓絹三十匹盡處極法惟鹽鐵度支戶部等司官吏破使物數雖多只遣填納盜使之罪一切不論所以天下官錢悉為應在姦吏贓汚多則轉安此弊最深切要杜塞自今巳後度支鹽鐵戶部等司官吏及行綱腳家等如隱使官錢計贓至三十匹並處極法除估納家産外並不使徵納其取受贓亦準此一條近因李延齡告李芳回大逆其狀請留中不出朕親覽之際巳得其情及令鞫問果辨欺詐比者朝官論人過失亦請留中且嫉惡除奸人臣明義知其隱慝足得顯陳深務蓋藏必因嫌恨事不由於直道情乃近於讒邪危人者得騁私懷罹謗者何從自辨無裨政理適長冤誣昔漢宣帝時章文必有敢告之字乃下闕前王令典實可遵行宜起今後應有朝官及上封事人進章表論人罪惡並須證驗明白狀中仍言請付御史臺按問不得更云請留中不出如軍國要機事關密切者不在此例推勘後如得事實必獎奉公苟涉加誣當令反坐如此則人知畏法事免搆虛各示中外令知朕意狄惟謙劇邑良才忠臣華胄覩此天厲將疸下民當請禱於晉祠類投巫於鄴縣曝山椒之畏景事等焚軀起天際之油雲法同翦爪遂使旱風潛息甘澤旋流昊天猶鑒於克誠余志豈忘於褒善特頒朱紱俾耀銅章勿替令名更昭殊渥續賜章服並錢五十萬應在京百司官典優成授官人等既云趨吏執舉簿書優成命官須居散秩近日僭越殊紊舊規纍資或至於登朝班序豈容於雜類自今巳後如有改轉官宜止於中下州長馬但不能登朝事貴得體永為常式朕以寡德祗守丕業恭臨萬宇逮茲七年夙夜憂勤聿修大政剗除黠虜通欵堅昆誅稹壺關擒辨并部去摩尼壞法革釋氏邪風免蠹生人式資正教漸移時俗庶及和平撫育黎元冀成理道行化逾切親政益勤寒暑所侵厥疾斯遘藥石無補以至大漸皇太叔叔父之親賢長之順天資睿哲聖敬日躋光揚祖宗善繼休烈而能內睦九族外親萬機德可以寧庶邦仁可以安百姓朕之推擇無愧神明付託得人顧復何恨宜令所司具禮柩前即皇帝位仍令太尉平章事德裕攝冢宰軍國事重不可暫闕以日易月抑惟舊章皇帝三日而聽政二十七日而釋服天下節度觀察防禦使監軍諸州刺史職守非輕並不得擅離任赴哀天下人吏百姓告哀後出臨三日皆釋服無禁嫁婚祠祀飲酒食肉釋服之後無禁舉樂文武官朝晡臨事十五舉音宮中當臨者非時無得擅哭漢文薄葬常所慕之營奉山陵備從儉約勿以金銀錦綵緣飾喪具醫人陸行周奪章服及官與趙全素任從所適醫官郭元巳下三人釋放依前翰林收管五坊鷹犬除留備搜狩外並解放噫生也有歸人之犬數修短定分天理惟常雖古聖賢無能免者在乎守其道而知其終全其義而歸其正節哀順變存者不至於傷生委化觀空逝者無勞於哀痛素達此理何足興嗟咨爾元老大臣內外庶位敬奉皇帝保寧邦家布告遐邇咸使知悉匭函所設貴達下情近者所投文書煩碎或論列祖曾功業或進獻自己文章無補國經有紊時政極言不諱豈假匿名從今後如知朝廷得失軍國利害實負冤屈有司不為申明者任投匭進狀所繇畫時引進不得壅滯餘不在投限宜委匭使準此緣回紇國中離亂頗甚太和公主恐未安寧須遣文臣專往訪問宜差通使舍人苗綰充使去年赦書所放食利祗是外百司食錢令戶部共賜錢訖若先假以食利為名將充公用者並不在放免如聞內諸司息利錢皆以食利為名百姓因此亦求蠲免宜各委所司不在放免限卿昨日所上表陳情緣多疾病請退守周行朕巳省覽終不允所奏卿實有疾為復別有故如要他有備陳宜盡肺肝便進狀來況北虜未歸朝廷事切每有料度皆藉規模且三五年閒終未令卿離中書忽有奏章實難允遂如實有疾但將息痊日須強扶持對來仍斷來章定安大長公主自蕃還京莫不哀憫百辟卿士皆出拜迎宣城貞寧臨貞貞源義昌等公主並宗室近親合先慰問晏然私第竟巳不至度於物體稍似非宜各罰封絹一百匹以塞愆違陽安長公主既不與定安光順相見又兩日就宅宣事皆不在家罰封物三百匹
