front:
  text: 全唐文欽定全唐文卷七十六帝諱炎穆宗第五子元和九年生長慶元年三月封潁王名瀍開成五年正月立為皇太弟其年即位會昌二年四月上尊號仁聖文武至神大孝皇帝五年正月又上尊號仁聖文武章天成功神德明道大孝皇帝六年三月改今名在位六年年三十三諡曰至道昭肅孝皇帝廟號武宗
  hash: sha256:2c54409edad3a6c4a083f8539d06cf521a846695964e3e981b8e3c752ca9b40c
