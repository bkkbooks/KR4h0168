front:
  text: 全唐文欽定全唐文卷一百九十七賓王婺州義烏人初為道王府屬歷武功主簿調長安武后時數上書言事下除臨安丞怏怏失志棄官去徐敬業舉兵署為府屬軍中書檄皆其詞也
  hash: sha256:4f648dde8578cacc77f47bcbcd8aa784f068e54a3b9a5caf74d8d0500ca4861e
  markers:
  - {type: head, offset: 14, content: 駱賓王(一), id: KR4h0168_NFKB_197-h1, level: 1}
body:
  text: 胡兵十萬起妖氛漢騎三千掃陳雲隱隱地中鳴戰鼓迢迢天上出將軍邊沙遠離風塵氣塞草長萎霜露文蕩子辛苦十年行回首關山萬里情遠天橫劍氣邊地聚笳聲鐵騎朝常警銅焦夜不鳴抗左賢而列陳比右校以疏營滄波積凍連蒲海雨雪凝寒遍柳城若乃地分元徼路指青波邊城暖氣從來少關塞元雲本自多嚴風凜凜將軍樹苦霧蒼蒼太史河既拔距而從軍且揚麾而挑戰征斾淩沙漠戎衣犯霜霰樓船一舉爭沸騰烽火四連相隱見戈文耿耿懸落星馬足駸駸擁飛電終取俊而先鳴豈論功而后殿征夫行樂踐榆溪倡婦銜怨坐空閨蘼蕪舊曲終難贈芍藥新詩豈易題池前怯對鴛鴦伴庭際羞看桃李蹊花有情而獨笑鳥無事而恆啼蕩子別來年月久賤妾空閨更難守鳳凰樓上罷吹簫鸚鵡杯中休勸酒同道書來一雁飛此時緘怨下鳴機裁鴛帖夜被薰麝染春衣屏風宛轉蓮花帳夜月玲瓏翡翠帷箇日新粧始復罷祗應含笑待君歸余猥以明時久遭幽縶見一葉之已落知四運之將終悽然客之為心乎悲哉秋之為氣也光陰無幾時事如何大塊是勞生之機小智非周身之務嗟乎綈袍非舊白首如新誰明公冶之非孰辨臧倉之訴是用中宵而作達旦不瞑覩茲流螢之自明哀此覆盆之難照夫類同而心異者龍蹲歸而宋樹伐質殊而聲合者魚形出而吳石鳴苟有會於精靈夫何患於異類况乘時而變含氣而生雖造化之不殊亦昆蟲之一物應節不愆信也與物不競仁也逢昏不昧智也避日不明義也臨危不懼勇也事有沿情而動興因物而多懷感而賦之聊以自廣云爾伊元功之播氣有丹鳥之賦象順陰陽而亭毒資變化而含養每寒潛而暑至若知來而藏往既發揮以外融亦含光而內朗若夫小暑南收大火西流林塘改夏雲物迎秋忽淩虛而赴遠乍排叢而出幽均火齊之宵映如夜光之暗投逝將歸而未返忽欲去而中留入槐榆而焰發若改燧而環周繞堂皇而影泛疑秉燭以嬉遊點綴懸珠之網隱映落星之樓乍滅乍興或聚或散居無定所習無常玩曳影周流飄光淩亂泛艷乎池沼徘徊乎林岸狀火井之沈熒似明珠之出漢值衝飆而不烈逢淫雨而逾煥照灼兮若湛盧之夜飛的皪兮像招搖之夕爛與庭燎而相炫照重陰於已昏共爝火而齊息避太陽於始旦爾其光不周物明足自資偶仙鼠而伺夜對飛蛾之赴熺類君子之有道入暗室而不欺同至人之無迹懷明義以應時處幽不昧居照斯晦隨隱顯而動息候昏明以進退委性命兮幽元任物理兮推遷化腐木而含彩集枯草而藏烟不貪熱而苟進每和光而曲全豈如鎔金而自鑠寧學膏火之相煎陋蟬蜩之習蛻怵螻蟻之慕羶匪傷蜉蝣之夕不羡龜鶴之年搶榆飛而控地摶扶起而垂天雖小大之殊品豈逍遙之異筌夫何化之斯化無使然而自然乃若有來斯通無往不至排朱門而獨遠升青雲而自致匪偷光於鄰壁寧假輝於陽燧終狥已以效能靡因人而成事物有感而情動迹或均而心異響必應之於同聲道固從之於同類始未明其趨舍庸詎識其旨意子尚不知魚之為樂吾又安能知螢之為利高明兮有融遷變兮無窮牛哀倏而化虎羽泉忽兮生熊血三年而藏碧魂一變而成虹知戰場之化燐悟冤獄之為蟲彼翾飛之弱質尚矯翼而淩空何微生之多躓獨宛頸以觸籠異璧光之照廡同劍影之埋豐覬道迷而可復庶鑒幽而或通覽光華而自照顧形影以相弔感秋夕之殷憂嘆宵行以熠耀熠耀飛兮絶復連殷憂積兮明且煎見流光之不息愴驚魂之屢遷如過隙兮已矣同奔電兮忽焉儻餘光之可照庶寒灰之重然聞夫元功幽贊靈心以有德是親至道冥符篤行以通神為本若乃天經地義色養叶於因心夏凊冬溫愛敬宏於錫類下逮六幽之奧上洞三光之精不有至誠孰云斯感有廣平宋思禮字過庭皇朝永州刺史昉之適孫戶部員外順之長子伶丁偏露早喪慈親永懷鞠養之恩長增思慕之痛弱不好弄長而能賢趨庭聞詩禮之風亢宗勖曾閔之行事後母徐以至孝聞北面興悲泣高堂而咎已東遊下位歡微祿以逮親調露二年來佐百里俯就微班之列將申返哺之情茍立身其若斯於從政乎何遠時歲亢旱金石行銷遠近川原殆將堙絶濬井皆為湯谷通波盡化汚池太夫人在遲暮之年有溫勞之疾非濫漿不可以適口非源泉不可以蠲疴色養既虧憂惶靡欣俄而廳階之下忽有清泉自生因疏導其源遂流注不竭味甘若醴氣冷如氷此邑城控剡山地連禹穴基址多石岡阜無津爰自興建以來久微穿汲之利非精誠貫於有道純志浹於無私孰能洽冥貺以通幽導靈泉而致養者也昔漢臣忠烈窮井飛於一言姜婦孝思潛波移於七里靜惟陳迹彼亦何人蕭縣尉柳晃耿介之士也道合則金蘭若膠漆情異則軒冕猶埃塵片善可嘉朝聞甘於夕死一諾猶重黃金賤於白圭以為執友素交豈輕肥利祿之謂也賞音達禮寧鐘鼓玉帛之云乎所恥者沒而無稱所貴者存而不朽徒懷美志未遇良材某出贊荒隅塗經勝壤三秋客恨長懷宋玉之悲一面交歡暫雪桓談之涕覩斯水之清泚感若人之精誠見賢思齊仰圭璋而有地揮毫興頌鏤琬玉以無慚乃作頌曰粵若稽古厥初生民其誰不孝獨我難倫義不悖道仁不遺親愛敬盡力孝弟通神顧我罔極因心感至冥契動天甘泉涌地泠泠無竭蒸蒸不匱曾是我思永錫爾類爰有勞人景行芳塵事諧則感道洽斯親孝為禮主名為實賓倘斯文之不墜知盛德之有鄰臣聞元天列象紫宮通北極之尊大帝凝圖宏猷暢東巡之禮是知道隆光宅既輯玉於雲臺業紹禋宗必塗金於日觀陛下乘乾握紀纂三統之重光御辨登樞應千齡之纍聖故得河浮五老啓赤文於帝期海薦四神奉丹書於王會瑞開三脊祥洽五雲既而輯總章之舊文紹辟雍之故事非烟翼馭移玉輦於梁陰若月乘輪祕金繩於岱巘臣等職均芻狗陰謝桑榆幸屬堯鏡多輝照餘光於連石軒圖光耀追盛禮於樅金然而鄒魯舊邦臨淄遺俗俱沐二周之化咸稱一變之風境接青疇俯瞰獲麟之野山開翠屺斜連辨馬之峯豈可使稷山遺氓頓隔陪封之禮淹中故老獨奉告成之儀是用就日披丹仰璧輪之三舍望雲抒素呌天閽於九重儻允微誠許陪大禮則夢瓊餘息仰仙闕以交歡就木殘魂遊岱宗而載躍伏奉恩旨令通狀自敘所能某本江東布衣也幸屬大爐貞觀合璧光輝易彼上農叨茲下秩於今三年矣然而進不能談社稷之務立事寰中退不能掃丞相之門買名天下徒以黃離元吉白賁幽貞沐少海之波瀾照重光之麗景雖任能尚齒載宏進善之規而觀過知人異降自媒之旨是用披誠瀝懇以抒愚衷若乃忘大易之謙光矜小人之醜行彈冠入仕解褐登朝飾懷祿之心效當年之用莫不狥名養素勵朽磨鉛自謂身負管樂之資志懷周召之業若斯人者可勝道哉而修譽察能聽言觀行捨真筌而擇士沿虛談以取才將恐有其語而無其人得其賓而喪其實故曰知人不易人不易知抑又聞之知臣莫若君知子莫若父誠能簡材試劇考績求功觀其所由察其所以臨大節而不可奪處至公而不可干冀斯言之無虧於從政乎何有若乃脂韋其迹乾沒其心說已之長言身之善靦容冒進貪祿要君上以紊國家之大猷下以瀆狷介之高節此凶人以為恥况吉士之為榮乎所以令衒其能斯不奉令謹狀問岱嶽遊魂入佳城而怛化瀛洲羽客竦鶴轡而輕舉雖則備於縑素昭晰可觀求諸耳目虛無罕驗棄杖成龍有異虞翻之旨銜恩結草寧符宗岱之言二者何從爾其揚榷對遐觀素論眇覿元風惟鬼惟仙難究難測至夫滕公長往佳城開白日之徵洪崖不歸層邱控紫雲之蓋或祟成蒼狗自是趙王之神道叶赤龍爰通陸安之冶玉壘變萇宏之血金闕化浮邱之靈固能目覩桑田來作西王之使魂遊蒿里還為北帝之臣然而將聖生鄒本忘情於語怪多材封魯亦默論於通仙洎乎大義既乖斯文將墜於是八儒三墨之道異軫分馳九流百家之文殊途競爽語仙則有無交戰語鬼則虛實相紛遂使結草抗軍爰乖宗岱之論化竹游水有異虞翻之言然而博訪古詩緬尋曩冊狥其浮說徒有奔競之談求諸至言抑匪通經之旨何則高明瞰室已著六爻之文太虛游形式編三洞之籙故齊君出獵遇豕啼於貝邱周嗣登仙游鶴軒於洛浦况乎干寶碩德已輯搜神之書劉向通儒非無列仙之傳斯皆實録諒匪虛談謹對問士農工商四民各業廢一不可取譬五材而闕里致言鄙於學稼漆園起論爰稱絶機豈先聖垂文義有優劣將隨方設教理或變通者哉汝其矢陳用啓前惑對出震登皇垂衣裳而馭籙乘乾踐帝順舒慘而字氓莫不列九土以開疆因四人而安業故農為政本兩漢舉力田之勤財用聚人九市列惟金之利陟龍門而就日入仕彈冠斷蟬翼以成風追工運斧咸用因人成事隨利濟時蓋五帝通規三王茂範然則泣麟上聖訓三千以領徒夢蝶幽人摶九萬以齊物欲使邱門志學折以問農之言漢渚絶機抒以灌園之巧斯乃變通權數趨舍適宜當今海內乂安天下樂業士食舊德農服先疇自可孫宏獻書以待公車之制王丹載酒時慰田家之勞謹對問四十強仕七十懸車著在格言存諸甲令然則顏駟韞價殆乎白首和尊播美始自齠年欲使滋泉之彥必臻洛陽之才無捨則隄防或爽襟帶徒施其道如何佇聞嘉答對竊聞大人有作義佇良材貞士徇名理資明主是知君必待士士必待君故使飛龍在天聖智有賢明之佐巨魚縱壑元后得唐虞之臣然則否泰或爽材運難並歲漸懸車尚牧淄原之豕年甫志學且珥漢庭之貂是知因藉時來和君播元齠之俊當其未遇顏生致白首之勤語其古今稽之運會雖則人事抑亦天時當今乘六御天得一居帝翹車獵彥束帛旌賢故叢桂幽人罷韜真於文豹青蓮江使自裂兆於非熊豈止洛陽之才來儀漢國滋泉之叟降止周朝而已哉某談乏二龍識迷三豕徒以鑽木輕焰仰升扶而耀輝化草餘光對含桂而炫彩回皇如失俯仰多慙謹對四月一日武功縣主簿駱賓王謹再拜奉書吏部侍郎裴公執事易曰書不盡言言不盡意然則理存乎象非書無以達其微詞隱乎情非言無以筌其旨僕誠鄙人也頗覽前事每讀古書高堂九仞曾參負北向之悲積粟萬鍾季路起南遊之嘆未嘗不廢書輟卷流涕沾襟何則情蓄於中事符則感形潛於內迹應斯通是用布腹心瀝肝膽庶大雅含宏之量矜小人悃欵之誠惟君侯察焉賓王一藝罕稱十年不調進寡金張之援退無毛薛之游亦何嘗獻策干時高談王霸衒才揚已歷詆公卿不汲汲於榮名不戚戚於卑位蓋養親之故也豈謀身之道哉不圖君侯忽垂過聽之恩任以書記之事擬人則多慚阮瑀入幕則高謝郤超昔聶政荊軻刺客之流也田光豫讓烈士之分也咸以勢利相傾意氣相許尚且捐軀燕趙甘死秦韓今君侯無求於下官見接以國士正當陪麾後殿奉節前驅賈餘勇以求榮效輕生而答施而顧逡巡於成命躊蹰於從事者徒以夙遭不造幼丁閔凶老母在堂常嬰羸恙藜藿無甘旨之膳松檟闕遷厝之資撫躬存亡何心天地故寢食夢想噬指之戀徒深歲時蒸嘗崩心之痛罔極若僕者固名教中一罪人耳何面目以奉三軍之士乎况屬天倫之喪奄踰七月違膝下之養忽以三年而凶服之制行終哀疚之情未泄興言永慕舉目增傷夫怨於心者哀聲可以應木石感於情者至性可以通神明故徐元直指心以求辭李令伯陳情以窮訴上以棄興王之佐命下以全奉親之篤誠而蜀主不以為非晉君待之愈厚此二人者豈貪貧賤惡榮華厭萬乘之交甘匹夫之辱也蓋有不得已者哉人有乾沒為心脂韋成性捨慈親之色養許明主以驅馳內忘顧復之私外存傅會之眷薄骨肉厚榮寵苟背恩而自效則君侯何以處之且義士期乎貞夫忠臣出乎孝子既不能推心以奉母亦安能死節以事人雖物議之無嫌實吾斯之未信也况流沙一去絶塞千里子迷入塞之魂母切倚閭之望就令觀以卒歲仰南薰之不資而使憂能傷人迫西山而何幾君侯情深錫類道叶天經明恕待人慈心應物儻矜犬馬之微願憫烏鳥之私情寬其負恩遂其終養則窮魂有望老母知歸賓王死罪再拜昨見武郎將備陳將軍之言恩出非常談過其實恭聞嘉惠深用慚惶君侯懷管樂之才當衛霍之任豐功厚利盛德在人送往事居元勳蓋俗智足以興王業道足以濟蒼生尚且屈公侯之尊伸管庫之士若下僕者天地一無用芻狗耳粵自旌賁之辰即逢聖明之歷材不經務不能成佐命之功智不通時不能包周身之慮加以天資木強不能屈節權門地隔蓬心不能買名時議常願為仁由已喪我於吾見機可以絶機無用之為有用隨時任其舒卷與物同其波流者矣其於木也魯班無所措其鈎繩其於駕也伯樂無所施其銜策不悟聖朝發明揚之詔君侯緝雍熙之道曲垂提獎廣借游揚猥以樗櫟之姿忝預賢良之薦當今鴻都富學麟閣多英非游夏不可以升堂非夔牙不可以擊節倘片言失德事暴區中匹夫竊議語流天下進乖得賢之舉退貽薄德之譏恐不肖之軀為高明之纍耳必能一盼增價九術先登燕昭為市駿之資郭隗居禮賢之始則當效駑駘之用飾固陋之心陶鑄堯舜之典謨憲章文武之道德上以究三才之能事下以通萬物之幽情將使詞翰為行已外篇文章是立身岐路耳又何足道哉言而不慚者恃惠子之知我也所恨禁門清切造別無緣官守牽纏程期有限某尚期辭滿倘泛孤舟萬里煙波舉目有江河之限百齡心事勞生無晷刻之歡嗟乎流水不窮浮雲自遠霑襟此別把袂何時恃以平生之私忘其貴賤之禮幸勿為過謹不多談張評事至辱惠書及詩把玩無厭暫如有敘上言離恨下勖交情篤以猛風乾蘇之談彌以驟雨濕薪之喻雖聞義則徙道存於起豫而擬人失倫事均乎玩物借如誠說蓋足下之不知言倘或劇談豈吾人之所仰望夫鯤之為魚也潛碧海泳滄流沈鰓於勃海之中掉尾乎風濤之下而濠魚井鮒自以為可得而齊焉鵬之為鳥也刷毛羽恣飲啄戢翼於天地之間宛頸乎江海之畔而雙鳧乘雁自以為可得而褻焉及其化羽垂天摶風九萬振鱗橫海擊水三千寧肯借翰於搶榆假力於在藻資江濱涓流之水待堀堁揚塵之風哉故張子房之達人也擊水摶風之適焉朱買臣之屈已也戢翼沈鰓之致焉足下雅得古人之致不乏先賢之遇自守莊筌無嬰魏網亦寧不知在藻搶榆之力非擊水摶風之助哉而詞旨殷勤深所未諭盍言爾志豈若是乎夫人生百年物理千變名利寵辱之形立矣愛憎毀譽之迹生焉其有道在則尊德成而上幽貞為虛白之室靜默為太元之門知軒冕是儻來悟榮華非力致苟斯道之不墜亦何患乎無成而欲圖僥幸於權重之交養聲譽於衆多之口所以楊朱徘徊於岐路阮籍怵惕於窮途嗟乎霜往露來歲寒不待山高河廣離會無時桂樹寒花公子去而忘返松巖春草王孫遊以不歸去矣員生遠離隔矣音塵不嗣情其勞矣畏途窮谷靜躁殊矣惠而好我無密爾音月日駱賓王致書於博昌父老等承並無恙幸甚幸甚雲雨俄別封壤異鄉春渚青山載勞延想秋天白露幾變光陰古人云別易會難不其然也自解攜襟袖一十五年交臂存亡略無半在張學士溘從朝露辟閭公倏掩夜臺故吏門人多遊蒿里耆年宿德但見松邱嗚乎泉壤殊途幽明永隔人理危促天道奚言感今懷舊不覺涕之無從也過隙不留藏舟難固追維逝者浮生幾何哀緣物興事因情感雖蒙莊一指殆先覺於勞生秦佚三號詎忘情於怛化啜其泣矣尚何云哉又聞移縣就樂安故城廨宇邑居咸徙其地里開阡陌徒有其名荒徑三秋蔓草滋於舊館頽墉四望拱木多於故人嗟乎仙鶴來歸遼東之城郭猶是靈烏代謝漢南之陵谷已非昔吾先君出宰斯邑清芬雖遠遺愛猶存延首城池何心天地雖則山河四塞是稱無棣之墟松檟千秋有切惟桑之里故每懷夙昔尚想經過于役不遑願言徒擁今西成有歲東戶無為野老清談怡然自得田家濁酒樂以忘憂故可洽賞當年相歡卒歲寧復惠存舊好追思昔游所恨企豫望之經途密邇佇中衢而空軫巾下澤而莫因風月虛心形留神送山川在目室邇人遐以此懷勞增其嘆息情不遺舊書何盡言風壤一殊山河萬里或平生未展或暌索纍年存沒寂寥吉凶阻絶無由聚泄每積淒涼近緣之官佐任海曲便還故里冀敘宗盟徒有所懷未畢斯願不意遠勞折簡辱逮堙淪雖未敘言暫如披面晚夏炎鬱並想履宜賓王疾患忽無况耳某初至鄉閭言尋舊友耆年者化為異物少壯者咸為老翁山川不改舊時邱隴多為陳迹感今懷古撫存悼亡不覺涕之無從也詢問子姪彼亦凋零永言傷情增以悲慟雖死生之分同盡此途而存亡之情豈能無恨終朝展接以申濶懷取此月二十日栖桐成禮事過之后始得可行祇敘尚賒仰繫何極各願珍勖遠無所詮
