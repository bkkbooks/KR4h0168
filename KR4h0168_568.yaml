front:
  text: 全唐文欽定全唐文卷五百六十八韓愈二十二
  hash: sha256:f4e6fa0b746dfdad187ea89c0ab94a3189f60b2d2a511bf4a430d7ef6fe77283
body:
  text: 維元和十五年歲次庚子十月某日朝散大夫守國子祭酒護軍賜紫金魚袋韓愈謹使前袁州軍事判官張得一以清酌之奠敢昭告於湘君湘夫人二妃之神前歲之春愈以罪犯黜守潮州懼以譴死且虞海山之波霧瘴毒為災以殞其命舟次祠下是用有禱於神神享其衷賜以吉卜曰如汝志蒙神之福啟帝之心去潮即袁今又獲位於朝服其章綬退思往昔實發夢寐凡卅年於今乃合夙夜怵惕敢忘神之大庇伏以祠宇毀頓憑附之質丹青之飾暗昧不圭不稱靈明外無四垣堂陛頹落牛羊入室居民行商不來祭享輒敢以私錢十萬修而作之舊碑斷折其半仆地文字缺滅幾不可讀謹修而樹之廟成之後將求玉石仍刻舊文因銘其陰以大振顯君夫人之威神以報靈德俾民承事萬世不怠惟神其鑒之尚饗維年月日兵部侍郎韓愈謹以清酌庶羞之奠祭於故國子司業竇君二兄之靈惟君文行夙成有聲江東魁然厚重長者之風一舉於鄉遂收厥功屢佐大侯以調兵戎詔曰予虞汝為郎中乃令洛陽歲且四終惟刑之慎掌正隸僮命守高平命副儒宮朱衣銀魚象服以崇錫榮考妣孝道上窮官不滿能亦云達通逾七望八年孰非翁在君無憾我意不充君之昆弟三以辭雄刺史郎中四繼三同於士大夫可謂顯榮我之獲見實自童蒙既愛既勸在麻之蓬自視雛鷇望君飛鴻四十年餘事如夢中分宰河洛媿立並躬俱官於學以纖臨洪惠許不酬報德以空死生莫接孰明我衷於祭告情文以自攻嗚呼哀哉尚饗維年月日吏部侍郎韓愈謹遣男殿中省進馬佶致祭於亡友故國子主簿侯君之靈嗚呼惟子文學今誰過之子於道義困不捨遺我狎我愛人莫與夷自始及今二紀於茲我或為文筆俾子持唱我和我問我以疑我釣我遊莫不我隨我寢我休莫爾之私朋友昆弟情敬異施惟我於子無適不宜棄我而死嗟我之衰相好滿目少年之時日月云亡今其有誰誰不富貴而子為羈我無利權雖怨曷為子之方葬我方齋祀哭送不可誰知我悲嗚呼哀哉尚饗維年月日京兆尹兼御史大夫韓愈謹以酒脯之奠再拜稽首告於竹林之神曰天子不以愈為愚不能使尹茲大眾二十三縣之人今農既勤於稼有苗盈野而天不雨將盡槁以死農將無所食鬼神將無以為饗國家之禮天地百祀神祇不失其常惠天之人不失其和人又無罪何為造茲旱虐以罰也將俾尹者不仁不明不能承帝之敕以化正其下聞無香惟腥神於惠罰無差施罪瘠於尹愈身是甘是宜雨則時降神無爽其聰明永享於人無媿尚饗維年月日京兆尹兼御史大夫韓愈謹以香果之奠敢昭告於東方青龍之神天作旱災嘉穀將槁乃於甲乙之日依準古法作神之象齋戒祀禱神其享祐之時降甘雨以惠茲人急急如律令維年月日吏部侍郎韓愈謹以清酌庶羞之奠敬祭於故僕射馬公十二兄之靈公宏大溫恭全然德備天故生之其必有意將明將昌實艱初試佐戎滑臺斥由尹寺適彼甌閩臲卼跋躓顛而不踒乃得其地於泉於虔始執郡符遂殿交州抗節番禺去其螟蠧蠻越大蘇擢亞秋官朝得碩士人謂其崇我勢始起東征淮蔡相臣是使公兼邦憲以副經紀殲彼大魁厥勳孰似丞相歸治畱長蔡師茫茫黍稷昔實棘茨鳩鳴雀乳不見梟鴟惟蔡及許舊為血仇命公并侯耕借之牛束其弓矢禮讓優優始誅鄆戎厥虛腥臊公往滌之茲惟樂郊惟東有猘惟西有虺顛覆朋鄰我餘有幾嵂崒中居斬其脊尾岱定河安惟公之韙帝念厥功還公於朝陟於地官且長百僚度彼四方孰樂可據顧瞻衡鈞將舉以付惟公積勤以疾以憂及其歸時當謝之秋賀門未歸弔廬已萃未燕於堂已哭於次昔我及公實同危事且死且生誓莫捐棄歸來握手曾不三四曾不濡翰酬酢文字曾不醉飽以勸酒胾奠以敘哀其何能致嗚呼哀哉尚饗維年月日守國子祭酒賜紫金魚袋韓愈謹以清酌之奠祭於故陝府左司馬李公之靈曰公學以為耕文以為穫發憤孤身復續厥家選於吏部亟以科進歷臨大邑惟政有聲遂丞宗正日朝帝庭出輔陝都吏畏僚慕子婦諸孫盈於室堂公姑悅喜五福具有大夫士家孰不榮羨如何不常以至大故嗚呼哀哉愈以守官不獲弔送昬姻之好以哀以悲敬致微禮公其歆之尚饗月日從父弟某官某乙謹以清酌庶羞之奠敢昭告於十二兄故虢州司戶府君之靈嗚呼維我皇祖有孫八人惟兄與我後死孤存奈何於今又棄而先生不偕居疾藥不親斂不摩棺瘞不繞墳趨奔束制生死虧恩歸女教男反骨本原其不有年以補我愆長號送哀以薦此文尚饗維年月日愈謹於逆旅備時羞之奠再拜頓首敢昭祭於六嫂滎陽鄭氏夫人之靈嗚呼天禍我家降集百殃我生不辰三歲而孤蒙幼未知鞠我者兄在死而生實維嫂恩未齓一年兄宦王官提攜負任去洛居秦念寒而衣念饑而飧疾疹水火無災及身劬勞閔閔保此愚庸年方及紀薦及凶屯兄罹讒口承命遠遷窮荒海隅夭閼百年萬里故鄉幼孤在前相顧不歸泣血號天微嫂之力化為夷蠻水浮陸走丹旐翩然至誠感神返葬中原既克返葬遭時艱難百口偕行避地江濆春秋霜露薦敬蘋蘩以享韓氏之祖考曰此韓氏之門視余猶子誨化諄諄爰來京師年在成人屢貢於王名乃有聞念茲頓頑非訓曷因感傷懷歸隕涕熏心苟容躁進不顧其躬祿仕而還以為家榮奔走乞假東西北南孰云此來乃睹靈車有志弗及長負殷勤嗚呼哀哉昔在韶州之行受命於元兄曰爾幼養於嫂喪服必以期今其敢忘夭實臨之嗚呼哀哉日月有時歸合塋封終天永辭絕而復蘇伏惟尚饗年月日季父愈聞汝喪之七日乃能銜哀致誠使建中遠具時羞之奠告汝十二郎之靈嗚呼吾少孤及長不省所怙惟兄嫂是依中年兄歿南方吾與汝俱幼從嫂歸葬河陽既又與汝就食江南零丁孤苦未嘗一日相離也吾上有三兄皆不幸早世承先人後者在孫惟汝在子惟吾兩世一身形單影隻嫂嘗撫汝指吾而言曰韓氏兩世惟此而已汝時猶小當不復記憶吾時雖能記憶亦未知其言之悲也吾年十九始來京城其後四年而歸視汝又四年吾往河陽省墳墓遇汝從嫂喪來葬又二年吾佐董丞相於汴州汝來省吾止一歲請歸取其孥明年丞相薨吾去汴州汝不果來是年吾佐戎徐州使取汝者始行吾又罷去汝又不果來吾念汝從於東東亦客也不可以久圖久遠者莫如西歸將成家而致汝嗚呼孰謂汝遽去吾而歿乎吾與汝俱少年以為雖暫相別終當久與相處故捨汝而旅食京師以求升斗之祿誠知其如此雖萬乘之公相吾不以一日輟汝而就也去年孟東野往吾書與汝曰吾年未四十而視茫茫而髮蒼蒼而齒牙動搖念諸父與諸兄皆康強而早世如吾之衰者其能久存乎吾不可去汝不肯來恐旦暮死而汝抱無涯之戚也孰謂少者歿而長者存強者夭而病者全乎嗚呼其信然邪其夢邪其傳之非其真邪信也吾兄之盛德而夭其嗣乎汝之純明而不克蒙其澤乎少者彊者而夭歿長者衰者而全存乎未可以為信也夢也傳之非其真也東野之書耿蘭之報何為而在吾側也嗚呼其信然矣吾兄之盛德而夭其嗣矣汝之純明宜業其家者而不克蒙其澤矣所謂天者誠難測而神者誠難明矣所謂理者不可推而壽者不可知矣雖然我自今年來蒼蒼者欲化而為白矣動搖者欲脫而落矣毛血日益衰志氣日益微幾何不從汝而死也死而有知其幾何離其無知悲不幾時而不悲者無窮期矣汝之子始十歲吾之子始五歲少而強者不可保如此孩提者又可冀其成立邪嗚呼哀哉嗚呼哀哉汝去年書云比得軟脚病往往而劇吾曰是病也江南之人常常有之未始以為憂也嗚呼其竟以此而殞其生乎抑別有疾而至斯乎汝之書六月十七日也東野云汝歿以六月二日耿蘭之報無月日蓋東野之使者不知問家人以月日如耿蘭之報不知當言月日東野與吾書乃問使者使者妄稱以應之耳其然乎其不然乎今吾使建中祭汝弔汝之孤與汝之乳母彼有食可守以待終喪則待終喪而取以來如不能守以終喪則遂取以來其餘奴婢並令守汝喪吾力能改葬終葬汝於先人之兆然後惟其所願嗚呼汝病吾不知時汝歿吾不知日生不能相養於共居歿不能撫汝以盡哀斂不憑其棺窆不臨其穴吾行負神明而使汝夭不孝不慈而不得與汝相養以生相守以死一在天之涯一在地之角生而影不與吾形相依死而魂不與吾夢相接吾實為之其又何尤彼蒼者天曷其有極自今已往吾其無意於人世矣當求數頃之田於伊潁之上以待餘年教吾子與汝子幸其長成吾女與汝女待其嫁如此而已嗚呼言有窮而情不可終汝其知也邪其不知也邪嗚呼哀哉尚饗維年月日十八叔叔母具時羞清酌之奠祭於周氏二十娘子之靈嫁而有子女子之慶纏疾中年又命不永今當長歸與一世違凡汝親戚孰能不哀撰此酒食以與汝訣汝曾知乎我念曷闋尚饗維年月日十八翁及十八婆盧氏以清酌庶羞之奠祭於二十三郎滂之靈曰汝聰明和順出於輩流強記好文又少與比將謂成長以興吾宗如何不祥未冠而夭吾與盧氏痛傷可言思母之恩連呼以絕執兄之手勉以無悲情一何長命一何短權葬遠地孤魂無依瀝酒告情哀何有極尚饗維年月日十八叔翁及十八叔婆盧氏遣昶以庶羞之奠祭於李氏二十九娘之靈曰汝之警敏和靜人莫及之姿相豐端不見闕虧幼而孤露其然何為出從於人既相諧熙又暴以夭神何所疵生殺減益竟誰主尸我哀汝母孰慰窮嫠我憐汝兒誰與抱持念此傷心不能去離奠以送汝知乎不知尚饗維年月日兵部侍郎韓愈謹以清酌之奠祭於故殿中侍御史贈給事中張君之靈惟君之先以儒名家逮君皇考再振厥華鄉貢進秀有司第之從事元戎謹職以治遂拜郎官以職王憲不長其年飛不盡翰乃生給事松貞玉剛幹父之業纂文有光屢辟侯府亦佐梁師前人是似耋吏嗟咨御史闕人奪之於朝大厦之構斧斤未操府遷幽都頑悖未孚繄君之賴乃奏乞畱乃遷殿中朱衣象版惟義之趨豈利之踐虺豺發釁闔府屠割償其恨犯君獨高脫露刀成林弓矢穰穰千萬為徒譟讙為狂君獨叱之上不負汝為此不祥將死無所雖愚何知慚屈變色君義不辱殺身就德天子嘉之贈官近侍歸於一死萬古是記我之從女為君之配君於其家行實高世無所於葬輿魂東歸誄以贈之莫知我哀嗚呼哀哉尚饗維年月日阿爹阿八使汝嬭以清酒時果庶羞之奠祭於第四小娘子挐子之靈嗚呼昔汝疾極值吾南逐蒼黃分散使汝驚憂我視汝顏心知死隔汝視我面悲不能啼我既南行家亦隨譴扶汝上輿走朝至暮天雪冰寒傷汝羸肌撼頓險阻不得少息不能飲食又使渴饑死於窮山實非其命不免水火父母之罪使汝至此豈不緣我草葬路隅棺非其棺既瘞遂行誰守誰瞻魂單骨寒無所託依人誰不死於汝即寃我歸自南乃臨哭汝汝目汝面在吾眼旁汝心汝意宛宛可忘逢歲之吉致汝先墓無驚無恐安以即路飲食芳甘棺輿華好歸於其邱萬古是保尚饗貞元十一年九月愈如東京道出田橫墓下感橫義高能得士因取酒以祭為文而弔之其辭曰事有曠百世而相感者余不自知其何心非今世之所稀孰為使余歔欷而不可禁余既博觀乎天下曷有庶幾乎夫子之所為死者不復生嗟余去此其從誰當秦氏之敗亂得一士而可王何五百人之擾擾而不能脫夫子於劒鋩抑所寶之非賢亦天命之有常昔闕里之多士孔聖亦云其遑遑苟余行之不迷雖顛沛其何傷自古死者非一夫子至今有耿光跪陳辭而薦酒魂髣髴而來享維年月日潮州刺史韓愈使軍事衙推秦濟以羊一豬一投惡谿之潭水以與鱷魚食而告之曰昔先王既有天下列山澤罔繩擉刃以除蟲蛇惡物為民害者驅而出之四海之外及後王德薄不能遠有則江漢之閒尚皆棄之以與蠻夷楚越况潮嶺海之閒去京師萬里哉鱷魚之涵淹卵育於此亦固其所今天子嗣唐位神聖慈武四海之外六合之內皆撫而有之况禹跡所揜揚州之近地刺史縣令之所治出貢賦以供天地宗廟百神之祀之壤者哉鱷魚其不可與刺史雜處此土也刺史受天子命守此土治此民而鱷魚睅然不安谿潭據處食民畜熊豕鹿麞以肥其身以種其子孫與刺史抗拒爭為長雄刺史雖駑弱亦安肯為鱷魚低首下心伈伈睍睍為民吏羞以偷活於此耶且承天子命以來為吏固其勢不得不與鱷魚辯鱷魚有知其聽刺史言潮之州大海在其南鯨鵬之大蝦蟹之細無不容歸以生以食鱷魚朝發而夕至也今與鱷魚約盡三日其率醜類南徙於海以避天子之命吏三日不能至五日五日不能至七日七日不能是終不肯徙也是不有刺史聽從其言也不然則是鱷魚冥頑不靈刺史雖有言不聞不知也夫傲天子之命吏不聽其言不徙以避之與冥頑不靈而為民物害者皆可殺刺史則選材技吏民操強弓毒矢以與鱷魚從事必盡殺乃止其無悔維貞元十五年歲次己卯二月乙亥朔某日節度行軍司馬檢校右散騎常侍兼御史大夫知使事吳縣開國男食邑三百戶陸長源度支營田判官檢校金部員外郎侍御史孟叔度觀察支使監察御史裏行邱潁觀察推官守祕書省校書郎韓愈等謹以少牢之奠敬祭於故尚書右僕射平章事隴西公之靈嗚呼天高而明地厚而平五氣敘行萬彙順成交感旁暢聖賢以生雨水於雲瀆水於坤蕃昌生物有假有因天眷唐邦錫之元臣肫肫元臣其德孔碩不諂不笑不威不赫不求其盈不致其敵爰立作相訏謨實勤出若無辭疇德之聞帝念東土公其來撫乃守洛都乃藩浚郊乃去厥疾乃施厥膏不知其勞鰥寡以饒維昔浚郊厥亂維舊有狡有狂其㣥孔醜公其來矣為民父母父誨其義母仁其愚既變既從孰云其初自邇徂遠混然一區公來自中天子所倚公今不歸誰佐天子公既來止東人以完公既歿矣人誰與安濁流渾渾有闢其郛填道歡呼公來之初今公之歸公在喪車旨酒既盈嘉肴在盛嗚呼我公庶享其誠尚饗維元和七年歲次壬辰七月二十七日右補闕宋景國子博士韓愈謹以清酌庶羞之奠敬祭於石三學士之靈惟君學成於身名彰於人知道之可行見人之不幸不事顧讓以圖就功如何奄忽永喪其躬曰景與愈與游為久自君之逝相遇輒哀傍無強親子孩妻稚敢忘分濟念力未任客葬秦原孤魂誰附奠以送訣悲何可窮尚饗維某年月日韓愈遣舊吏皇甫悅以酒肉之饋展祭於五官蜀客之柩前嗚呼君迺至於此吾復何言若有鬼神吾未死無以妻子為念嗚呼君其能聞吾此言否尚饗於乎建中之初子居於嵩攜扶北奔避盜來攻晨及洛師相遇一時顧我如故眷然顧之子有令聞我來自山子之俊明我鈍而頑道既云異誰從知我我思其厚不知其可於後八年君從杜侯我時在洛亦應其招畱守無事多君子僚罔有疑忌維其嬉遊草生之春鳥鳴之朝我轡在手君揚其鑣君居於室我既來即或以嘯歌或以偃側誨予以義復我以誠終日以語無非德聲主人信讒有惑其下殺人無罪誣以成過入救不從反以為禍赫赫有聞王命三司察我於獄相從係縲曲生何樂直死何悲上懷主人內閔其私進退之難君處之宜既釋於囚我來徐州道之悠悠思君為憂我如京師君居父喪哭泣而拜言詞不通我歸自西君反吉服晤言無他往復其昔不日而違重我心惻自後聞君母喪是丁痛毒之懷六年以并孰云孝子而殞厥靈今我之至入門失聲酒肉在前君胡不餐升君之堂不與我言於乎死矣何日來還維年月日將仕郎守江陵府法曹參軍韓愈謹以清酌庶羞之奠敬祭於故郴州李使君之靈古語有之白頭如新傾葢若舊顧意氣之何如何日時之足究當貞元之癸未惕皇威而左授伏荒炎之下邑嗟名頹而位仆歷貴部而西邁邇清光於暫覯言莫交而情無由既不賈而奚售哀窮遐之無徒挐百憂以自副辱問訊之綢繆恒飽饑而愈疚接雄詞於章句窺逸跡於篆籒苞黃甘而致貽獲紙筆之雙貿投叉魚之短韻媿韜瑕而舉秀竢新命於衡陽費薪芻於館候空大亭以見處憩水木之幽茂逞英心於縱博沃煩腸以清酎航北河之空明覷鱗介之驚透宴州樓之豁達眾管啾而並奏得恩惠於新知脫窮愁於往陋輟行謀於俄頃見秋月之三彀逮天書之下降猶低迴以宿畱念暌離之在期謂此會之難又授縞紵以託心示茲誠之不謬儻後日之北遷約窮歡於一晝雖掾俸之酸寒要拔貧而為富何人生之難信捐斯言而莫就始訝信於暫疎遂承凶於不救見明旌之低昂尚遲疑於別褎憶交酬而迭舞奠單杯而哭柩美夫君之為政不撓志於讒構遭脣舌之紛羅獨陵晨而孤雊彼憸人之浮言雖百車其何詬洞古往而高觀固邪正之相寇幸竊覩其始終敢不明白而蔽覆神乎來哉辭以為侑尚饗維元和四年歲次己丑後三月二十一日景寅朝散郎守國子博士韓愈太學助教侯繼謹以清酌之奠祭於亡友國子助教薛君之靈嗚呼吾徒學而不見施設祿又不足以活身天於此時奪其友人同官太學日得相因奈何永違祗隔數晨笑語為別慟哭來門藏棺蔽帷欲見無緣皎皎眉目在人目前酌以告誠庶幾有神嗚呼哀哉尚饗維年月日愈等謹以清酌庶羞之奠敬祭於亡友張十三員外之靈嗚呼往在貞元俱從賓薦司我明試時維邦彥各以文售幸皆少年㣥遊旅宿其歡甚焉出言無尤有獲同喜他年諸人莫有能比倏忽逮今二十餘歲存皆衰白半亦辤世外纏公事內迫家私中宵興歎無復昔時如何今者又失夫子懿德柔聲永絕心耳廬親之墓終喪乃歸陽瘖避職妻子不知分司憲臺風紀由振遂遷司虞以播華問不能老壽孰究其因託嗣於宗天維不仁酒食備設靈其降止論德敘情以視諸誄尚饗維年月日彰義軍行軍司馬守太子右庶子兼御史中丞韓愈謹遣某乙以庶羞清酌之奠祭於亡友故河南縣令張十二員外之靈貞元十九君為御史余以無能同詔並跱君德渾剛標高揭己有不吾如唾猶泥滓余戇而狂年未三紀乘氣加人無挾自恃彼婉孌者實憚吾曹側肩帖耳有舌如刀我落陽山以尹鼯猱君飄臨武山林之牢歲弊寒凶雪虐風饕顛於馬下我泗君咷夜息南山同臥一席守隸防夫觝頂交跖洞庭漫汗粘天無壁風濤相豗中作霹靂追程盲進颿船箭激南上湘水屈氏所沈二行迷淚蹤染林山哀浦思鳥獸叫音予唱君和百篇在吟君止於縣我又南踰把相飲後期有無期宿界上一又相語自別幾時遽變寒暑枕臂欹眠加余以股僕來告言虎入廏處無敢驚逐以我馬蒙去君云是物不駿於乘虎取而往來寅其徵我預在此與君俱膺猛獸果信惡禱而憑余出嶺中君竢州下偕掾江陵非余望者郴山奇變其水清寫泊沙倚石有遌無捨衡陽放酒熊咆虎嘷不存令章罰籌蝟毛委舟湘流往觀南嶽雲壁潭潭穹林攸擢避風太湖七日鹿角鈎登大鮎怒頰豕狗臠盤炙酒㣥奴餘啄走官階下首下尻高下馬伏塗從事是遭予徵博士君以使己相見京師過願之始分教東生君掾雍首兩都相望於別何有解手背面遂十一年君出我入如相避然生闊死休吞不復宣刑官屬郎引章訐奪權臣不愛南康是斡明條謹獄氓獠戶歌用遷澧浦為人受瘥還家東都起令河南屈拜後生憤所不堪屢以正免身伸事蹇竟死不昇孰勸為善丞相南討余辱司馬議兵大梁走出洛下哭不憑棺奠不親斚不撫其子葬不送野望君傷懷有隕如瀉銘君之績納石壤中爰及祖考紀德事功外著後世鬼神與通君其奚憾不余鑒衷嗚呼哀哉尚饗維年月日某官某等謹以清酌庶羞之奠敬祭於某縣太君鄭氏尊夫人之靈冑於茂族配此德門克成厥家享有全福為婦為母再朝中宮搢紳推榮宗黨是則某等幸隨令子同服官僚庶展哀誠式陳牢醴尚饗維年月日某官某乙等謹以清酌庶羞之奠祭於亡友故御史中丞贈刑部侍郎薛公之靈公之懿德茂行可以勵俗清文敏識足以發身宗族稱其孝慈友朋歸其信義累昇科第亟踐班行左掖南臺共傳故事詩人墨客爭諷新篇羽儀朝廷輝映中外長途方騁大限俄窮聖上軫不憖之悲具僚興云亡之歎况某等忘言斯久知我俱深青春之游白首相失來陳薄奠詎盡哀誠嗚呼哀哉尚饗維年月日愈等謹以庶羞清酌之奠敬祭於故太常裴二十一兄之靈朝廷之重莫過乎禮雖經策具存而精通蓋寡自郊邱故事宗廟時宜大君之所旁求丞相之所卒問㣥儒拱手宗祝醉心兄皆指陳根源斟酌通變莫不允符天旨克協神休至乎公卿冠昬士庶喪祭疑皆響答問必實歸從我者足為軌儀異我者無逃指笑動為時法言比古經獨立一朝高視千古而又驅馳朋執僶俛宗親擔石之儲常空於私室方丈之食每盛於賓筵贈必固辤求無不應孰云具美而不永年某等早接遊從實欽道義致誠薄奠以訣終天嗚呼哀哉尚饗維年月日潮州刺史韓愈謹差攝潮陽縣尉史虛已以特羊庶羞之奠告於大湖神之靈愈承朝命為此州長今月二十五日至治下凡大神降依庇貺斯人者皆愈所當率徒屬奔走致誠親執祀事於廟庭下今以始至方上奏天子思慮不能專一冠衣不淨潔與人吏未相識知牲糈酒食器皿觕弊不能嚴清又未卜日時不敢自薦見使攝潮陽縣尉史虛已以告神其降鑒尚饗維年月日潮州刺史韓愈謹以清酌腶脩之奠祈於大湖神之靈曰稻既穟矣而雨不得熟以獲也蠶起且眠矣而雨不得老以簇也歲且盡矣稻不可以復種而蠶不可以復育也農夫桑婦將無以應賦稅繼衣食也非神之不愛人刺史失所職也百姓何罪使至極也神聰明而端一聽不可濫以惑也刺史不仁可坐以罪惟彼無辜惠以福也劃劙雲陰卷月日也幸身有衣口得食給神役也充上之須脫刑辟也選牲為酒以報靈德也吹擊管鼓侑香潔也拜庭跪坐如法式也不信當治疾殃殛也神其尚饗維年月日潮州刺史韓愈謹以柔毛剛鬣清酌庶羞之奠祭於城隍之神閒者以淫雨將為人災無以應貢賦供給神明上下獲罪罰之故乃以六月壬子奔走分告乞晴於爾明神閔人之不辜若饗若答糞除天地山川清風時興白日顯行蠶穀以登人不咨嗟惟神之恩夙夜不敢忘怠謹卜良日躬率將吏薦茲血毛清酌嘉羞侑以音聲以謝神貺神其享之維年月日潮州刺史韓愈謹遣耆壽成㝢以清酌少牢之奠告於界石神之靈曰惟封部之內山川之神克庥於人官則置立室宇備具服器奠饗以時淫雨既霽蠶穀以成織婦耕男忻忻衎衎是神之庥庇於人也敢不明受其賜謹選良月吉日齋潔以祀神其鑒之尚享維年月日潮州刺史韓愈謹以清酌庶羞之奠祭於大湖之神惟神降依茲土以庇其人今茲無有水旱雷雨風火疾疫為災各寧厥宇以供上役長吏免被其譴賴神之德夙夜不敢忘謹具食飲躬齋洗奏音聲以獻以樂以謝厥賜不敢有所祈尚饗維年月日袁州刺史韓愈謹告於城隍神之靈刺史無治行無以媚於神祇天降之罰以久不雨苗且盡死刺史雖得罪百姓何辜宜降疾咎於某躬身無令鰥寡蒙茲濫罰謹告維年月日袁州刺史韓愈謹以少牢之奠祭於仰山之神曰神之所依者惟人人之所事者惟神今既大旱嘉穀將盡人將無以為命神亦將無所降依不敢不以告若守土有罪宜被疾殃於其身百姓可哀宜蒙恩憫以時賜雨使獲承祭不怠神亦永有飲食謹告維年月日袁州刺史韓愈謹以少牢之奠祭於仰山之神曰田穀將死而神膏澤之百姓無所告而神恤之刺史有罪而神釋之敢不有薦也尚饗維年月日韓愈謹以清酌庶羞之奠祭於亡友柳子厚之靈嗟嗟子厚而至然邪自古莫不然我又何嗟人之生世如夢一覺其閒利害竟亦何校當其夢時有樂有悲及其既覺豈足追惟凡物之生不願為材犧罇青黃乃木之災子之中棄天脫馽羈玉佩瓊琚大放厥辭富貴無能磨滅誰紀子之自著表表愈偉不善為斵血指汗顏巧匠旁觀縮手褎閒子之文章而不用世乃令吾徒掌帝之制子之視人自以無前一斥不復㣥飛刺天嗟嗟子厚今也則亡臨絕之音一何琅琅徧告諸友以寄厥子不鄙謂余亦託以死凡今之交觀勢厚薄余豈可保能承子託非我知子子實命我猶有鬼神寧敢遺墮念子永歸無復來期設祭棺前矢心以辭嗚呼哀哉尚饗
