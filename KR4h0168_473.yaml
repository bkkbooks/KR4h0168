front:
  text: 全唐文欽定全唐文卷四百七十三陸贄十四
  hash: sha256:078e027f622a1c68e8d9ae04575c89732a5a47318edb60734940072562f24ebd
body:
  text: 右頻得鹽鐵轉運及州縣申報霖雨為災彌月不止或川瀆汛漲或谿谷奔流淹沒田苗損壞廬舍又有漂溺不救轉徙乏糧喪亡流離數亦非少臣等任處台輔職調陰陽一物失宜尸曠斯在五行愆度黜責何逃陛下德邁禹湯恕人咎已臣等每奉詞旨倍益慙惶所以僶俛在公不敢頻煩請罪前者面陳事體須遣使撫綏陛下尚謂詢問來人所損殊少即議優䘏恐長姦欺臣等旬日以來更審借訪類會行旅所說悉與申報符同但恐所聞聖聰或未盡陳事實夫流俗之弊多徇諂諛揣所悅意者則侈其言度所惡聞者則小其事制備失所恒病於斯初聞諸道水災臣等屢訪朝列多云無害於物以為不足致懷退省其私言則頓異霖潦非可諱之事搢紳皆有識之人與臣比肩尚且相媚況乎事或曖昧人或瑣微以利己之心希至尊之旨其於情實固不易知如斯之流足誤視聽所願事皆覆驗則冀言無詐欺大明照臨天下之幸也昔子夏問於孔子曰何如斯可謂人之父母孔子對曰四方有敗必先知之斯可謂人之父母矣蓋以君人之道子育為心雖深居九重而慮周四表雖恒處安樂而憂及困窮近取諸身如一體之於四支其疾病無不恤也遠取諸物如兩曜之於萬類其鑒照無不均也故時有凶害而人無流亡恃天聽之必聞知上澤之必至是以有母之愛有父之尊古之聖王能以天下為一家中國為一人用此術也今水潦為敗綿數十州奔告于朝日月相繼若哀其疾苦固宜降旨優矜儻疑其詐欺亦當遣使巡視安可徇往來之浮說忘惠卹之大猷失人得財是將焉用況災害已甚申奏亦頻縱不蒙恩復除自當準式蠲免徒失事體無資國儲恐須速降德音深示憂憫分道命使明敕弔災息征徭省察冤濫應家有溺死及漂沒居產多盡父子不存濟者各量賜粟帛便委使臣與州府以當處官物給付其損壞廬舍田苗者亦委使臣與州府據所損作分數等第聞奏量與蠲減租稅如此則歿者蒙瘞酹之惠存者霑煦嫗之恩霈澤下施孰不欣戴所費者財用所收者人心若不失人何憂乏用臣等已約支計所費亦不甚多儻蒙聖恩允從即具條件續進臣又聞聖人作則皆以天地為本陰陽為端慶賞者順陽之功故行於春夏刑罰者法陰之氣故用之秋冬事或愆時人必罹咎是以月令所載夏行秋令則苦雨數來邱隰水潦夏行冬令則後乃大水敗其城郭典籍垂誡言固不誣天人同符理當必應既有繫于舒慘是能致于災祥頃自夏初大臣得罪親黨坐累其徒實繁邦憲已行宸嚴未解畏天之怒中外竦然若以月令推之水潦或是其應雖天所降沴不在郊畿然海內為家無論遐邇伏願滌瑕以德消沴以和威惠之相濟合宜陰陽之運行自序臣等不勝覩災慙負之至謹奉狀陳請以聞謹奏右奉進止淮西管內貢賦既闕所緣水損簡擇宣慰使此道亦不要遣去者臣聞聖王之於天下也人有不得其所者若已納之於隍故夏禹泣辜殷湯引罪蓋以率土之內莫非王臣或有昏迷不龔是由教化未至常以善救則無棄人自希烈亂常汚染淮甸職貢廢闕責當有歸在於編甿豈任其咎陛下息師含垢宥彼渠魁惟茲下人久罹脅制想其翹望聖化誠亦有足哀傷儻宏善救之心當軫納隍之慮今者遣使宣命本緣卹患弔災諸道災患既同朝廷弔卹或異是使慕聲教者絕望懷反側者得詞棄人而固其寇讎恐非所以為計也昔晉饑乞糴于秦大夫百里奚曰天災流行國家代有救災卹鄰道也行道有福丕豹則請因而伐之穆公用百里奚之言拒丕豹之請且曰其君是惡其人何罪遂輸粟以救之其後秦饑乞糴于晉晉大夫虢射曰無損於怨而益於寇不如勿與慶鄭曰幸災不仁貪愛不祥怒鄰不義不如與之惠公信虢射之謀違慶鄭之議遂閉糴以絕焉是歲晉國復饑秦伯又饋之粟曰吾怨其君而矜其人終於秦穆霸強晉惠擒辱是知棄怨而施惠者可以懷敵計利而忘義者罔不失人此乃列國諸侯猶務卹鄰救災矧君臨天下而可使德澤不均被者乎議者多謂淮右薦饑國家之利臣等愚見以為不然必若興有征之師問不庭之罪因災幸濟已爽德征儻又難於用兵望其艱窘自弊利害之勢或未可知夫悍獸之情窮則攫搏暴人之態急則猖狂當其迫阨之時尤資撫馭苟得招攜以禮便可厎寧備慮乖方亦足生患竊以帝王之道頗與敵國不同懷柔萬邦唯德與義寧人負我無我負人故能使億兆歸心遠邇從化猶有兇迷不復必當人鬼同誅此其自取覆亡尚亦不足含怒今因供稅有闕遂令施惠不均責帥及人恐未為允伏惟聖鑒更審細裁量其所擇諸道使並未敢宣行伏候進止前日顧少連奉諭密旨每於延英對卿緣有諸人言不得盡中間卿所奏去冬薦人實緣對趙憬執論所以有言相拒亦不是阻卿之意若有要便事但依前者意旨自手疏密封進來卿又頻與苗粲進官朕未放過恐卿未知朕意此人即苗晉卿之子晉卿往年攝政曾有不臣之言又諸子皆與古帝王同名意甚不善緣非諸子之過不欲明行斥逐終是不合令在朝廷卿宜密知此意苗粲兄弟並改與在外閒僻處官仍不得令近兵馬者猥蒙天慈屢降深旨慰眷稠謺誨諭周詳骨肉之恩無以加此士感知巳尚合捐軀臣雖孱微能不激勵至於彌綸庶績督課㣥官始終不渝夙夜匪懈是皆常分曷足酬恩自揣凡庸之才又無奇崛之效唯當輸罄忠節匡補聖猷眾人之所難言臣必無隱常情之所易溺臣必不回冏然貞心持以上報此愚夫一志而不易者也惟明主矜亮而保容之頃以去冬薦人頻於街衢披訴既是準制許集理合量才授官進擬再三未蒙允許伏慮事轉淹滯所以因對奏陳懵於忖量推理輒發以趙憬與臣並命俱掌樞衡參奉謀猷事當無間不知避忌輕黷宸嚴陛下特宥惷愚曲加獎導寵遇踰等恩私倍常顧惟何人叨幸若此偶有所見敢不盡言是彰無隱之誠以申上報之分臣聞王者之道坦然著明奉三無私以勞天下平平蕩蕩無側無偏所謂三無私者如天之無私覆也如地之無私載也如日月之無私照也其或有過如日月之有蝕焉過也人皆見之更也人皆仰之日月不疾于蔽虧人君不吝於過失虧而能復無損於明過而能改不累於德昨者臣所奏事惟有趙憬得聞陛下已至勞神委曲防護是於心膂之內尚有形迹之拘職同事殊鮮克以濟恐爽無私之德且傷不吝之明夫元首股肱義實同體諮詢獻納一日萬幾宣之使言猶未盡意言若有阻義何由通啟沃既難機務斯壅雖荷綢繆之顧實增曠廢之憂仰希聖聰更賜裁處苗粲少以門子早登朝班歷拾遺補闕起居員外郎中前後二十餘年溫恭有加恪慎無怠端敏足以守職文學足以飾身詳其器能堪處近侍陛下以粲先父常有過言名子之方又乖義類不忍明加斥黜但令改授外官伏以理國化人在於獎一善使天下之為善者勸罰一惡使天下之為惡者懲是以爵人必於朝刑人必於市惟恐眾之不覩事之不彰君上行之無愧心兆庶聽之無疑議受賞安之無怍色當刑居之無怨言此聖王所以宣明典章與天下公共者也獎而不言其善斯謂曲貸罰而不書其惡斯謂中傷曲貸則授受不明而恩倖之門啟中傷則枉直莫辨而讒間之道行此柄一虧為害滋大凡是譖愬之輩多非信實之言利於中傷懼於公辨或云歲月已久不可究尋或云事體有妨須為隱忍或云惡跡未露宜假他事為名或云但棄其人何必明言責辱詞皆近於情理意實苞於矯誣傷善售姦莫斯為甚伏惟聖鑒之下必無浸潤之流然於稱毀之言不可不辨賞罰之典不可不明陛下若以晉卿跡實姦邪粲等法應坐累則當公議典憲豈令陰受播遷陛下若察晉卿見誣又知粲等非罪則合隨才獎用不宜降意猜防今忽不示端由但加斥逐謂之掄材則失序謂之行罰則無名徒使粲等受錮於聖朝晉卿銜憤于幽壤以臣蔽滯未見其宜夫聽訟辯讒貴於明恕明者在驗之以跡恕者在求之以情跡可責而情可矜聖王懼疑似之陷非辜不之責也情可責而跡可宥聖王懼逆詐之濫無罪不之責也惟情見跡具詞服理窮者然後加刑罰焉是以下無冤人上無謬聽苛慝不作教化以興晉卿起自文儒致位台輔能以謙柔自處故為三朝所推當諒闇之辰攝冡宰之任是將備禮豈足擅權安肯露不臣之言招覆族之釁雖甚狂險猶應不為矧伊老臣寧忍及此假有忍人之意其如言發禍隨求之以情既無端驗之以跡又無兆宜蒙昭恕理在不疑又自陛下御極以來粲及兄丕皆歷清近若以舊事為累豈復含容至今恐有無良之徒憎嫉丕粲兄弟構成飛語務欲挫傷大抵任重勢疑易生嫌謗以周公之聖不免流言霍光之忠亦遭告訐向非成王覺寤昭帝保明則二主之德美不傳二臣之冤誣莫辯陛下追懷往事得失豈不相遠哉後之視今固亦如此凡所舉措安可不詳伏願稍留睿思特加省察斯實㣥臣庶免於戾豈唯苗氏一族存歿幸賴而己乎少連又向臣說云聖旨察臣孤貞猶謂清慎太過都絕諸道饋遺却恐事情不通如不能納諸財物至如鞭靴之類受亦無妨者伏以貨賄之利耳目之娛人間常情孰不貪悅況臣性實凡鄙寧忘顧私家本窶貧安能無欲所以深自刻慎勉修廉隅者蓋由負戴厚恩尸竊大任既不克導揚風教致俗清淳又未能減息征徭濟人窮困若無恥懼更啟賄門是忘憂國之誠仍速焚身之禍由是苟行特操杜絕交私誠知無補大猷所冀免貽深累陛下責臣以清謹太過斯謂聖明陛下慮事之不通有乖理道或恐貪惏之輩務逞無厭之求巧陳異端惑亂聖聽稽諸事實則甚不然夫以胥吏末流苞苴微貺苟或違道且猶知慙況乎公卿大臣之間方岳連帥之任豈資納賄然後致誠若因財利交歡是以姑息為事既乖直道必有過求遂之則法度浸隳阻之則觖望彌甚為害如此國何賴焉高祖太宗著法垂制監臨受賄盈尺有刑陛下每發德音敷宥下土大辟之屬皆蒙滌除唯於犯贓往往不赦豈不以貪饕為弊殘蠧最深至於士吏之微尚當嚴禁矧居風化之首反可通行凡上之所為以導下也上所不為以檢下也上所不為而下或為之然後可以設峻防寘明辟若上為之而下亦為之固其理也又可禁乎今吏有受監臨之賄者則以為罪不可容朝廷之制四方所監臨也而宰司公受其賄是亦無恥而不恕者歟孔子曰大臣不可不敬也是人之表也邇臣不可不慎也是人之道也表傾則影曲道僻則行邪若大臣邇臣可以受財則庶長寀寮孰為不可朝廷取之於方鎮方鎮復取之於州州取之於縣縣取之於鄉鄉將安取哉是皆出於疲人之肝腦筋髓耳自大盜猾夏耗斁生人天下常屯百萬之師坐受衣食農夫蠶婦凍而織餒而耕殫力忍死以供十倍之賦日月引頸望覩昇平之化惠恤之恩凡四十九年矣薦屬多故有加無瘳持利權食厚祿者當憂隱忸怩憫愧黎庶而又交通私賄扇起貪風是令已困之甿重遭過分之擾陛下尚以為鞭靴之類受亦無妨若使天下納賂唯有二三宰臣四方誅求止於鞭靴細物行之不足以傷化絕之不足以利人則臣固已微抑私心將順睿旨矣若使國家致理必資饋遺通情辭之足以失天下之心受之足以濟天下之務則臣固亦不避汙行助我聖功矣臣所以未敢奉詔冒昧塵煩者審知此道不唯無益必有甚損故也亦冀陛下詳察其理普澄其源宏清淨無欲之風守慈儉不貪之寶是將感人心而天下服何有事情不通之患乎夫貨賄上行則賞罰之柄失貪求下布則廉恥之道衰何者善惡不分功過無辨以貨賄之多少為課績之重輕守道闕供或時致怨招累求得當欲可以釋罪賈榮忍行刻剝者見謂公忠巧飾玩好者或稱才智此謂賞罰之柄失也上好利則下思聚斂上求賄則下肆侵蟊不懷愧心但逞私欲遞相企效習以成風閭閻日殘紀綱日壞不可以禮義勸不可以刑法懲此由廉恥之道衰也作法於涼其弊猶貪作法於貪其弊斯亂利於小者必害於大易於始者必悔於終賄道一開展轉滋甚鞭靴不已必及衣裘衣裘不已必及幣帛幣帛不已必及車輿車輿不已必及金璧日見可欲何能自窒于心已與交私固難中絕其意是以涓流不止谿壑成災毫末既差邱山聚釁自昔國家敗亡多矣何嘗有以約失之者乎臣竊料郡府之不願行賄於朝廷猶鄉閭之不願輸貨於郡府也但以行之者有利不行者有虞故為安身保位之謀不得不行耳夫豈樂而行之哉假如四方俱賂於朝廷朝廷受其三而却其一有所受有所却二端相反則遇却者或有意疑乎見拒而不通焉四方俱賂於朝廷朝廷俱辭而不受則咸知不受者乃朝廷之常理耳適所以服其心而誘其善復何嫌阻之有乎陛下若謂問遺可以通物情絜矩不足敦理化則自建中以來股肱耳目之間蓋常有交利行私者矣乃其所也陛下何尤焉陛下嗣位之初躬行節儉郡國無來獻朝廷無私求行李無黷貨之人邇臣無受賂之事四方風動幾致清平旋以刑峻賦繁兵連禍結理功中否至化未凝洎大憝殲夷皇運興復征伐之役頗息於前時清約之風亦虧於往日此則雖革一弊亦喪一美焉曩興師徒人困暴賦今罷征伐人困私求乃是殘瘁之餘永無蘇息之望使萬方黎獻當陛下休明之代不登富壽不洽雍熙追懷前修實用心熱而議者反以納賂通情之理以惑陛下斯不亦誣上行私之甚者乎夫天下公器也王綱大權也執大權者不任其小數守公器者不徇于私情任小數而御大權則忿戾之禍起徇私情以持公器則姦亂之釁生故春秋傳曰在上位者洒濯其心以待之而後可以理人言私曲之不可以莅眾庶也又曰國家之敗由官邪也官之失德寵賂彰也君人者將昭德塞違以臨照百官百官於是乎戒懼而不敢易紀律言賄利之不可以化百官也又曰長國家者非無賄之難無令名之難諸侯之賄聚於公室則諸侯貳言貪欲之不可以懷諸侯也古之懷諸侯者蓋有其道矣唯不務賄然後得之故禮記云凡為天下國家有九經其一曰理亂持危朝聘以時厚往而薄來所以懷諸侯也是知懷撫之道貴德賤財於往也則厚其贈送之資於來也則薄其贄幣之禮訓人以尊讓示人以不貪始于朝廷行于郡國廉節之風漸廣侵漁之害不萌里閭獲安郡國斯乂朝廷益尊所謂化自上流理由下濟近者悅服而遠者歸懷是皆無賄之致也及夫王綱浸壞德化陵夷然後滅公議而徇私情盛誅求而崇饋獻故禮記曰天子微諸侯僭於是相覿以貨相賂以利而天下之禮亂矣是知傷風害禮莫甚於私暴物殘人莫大於賂利於絕私去賄者莫先於君主務於愛人助理者莫切於輔臣然則君主輔臣之間固不可以語及於私賄矣況又躬行乎臣以受恩特深志欲巨細裨補苟懷疑慮不敢因循亦賴遭逢聖明庶得竭盡愚直所以每事獻替不以犯忤為虞意懇詞繁伏用慙悚謹奏嶺南節度經畧使奏近日舶船多往安南市易進奉事大實懼闕供臣今欲差判官就安南收市望定一中使與臣使司同勾當庶免隱欺希顏奉宣聖旨宜依者遠國商販唯利是求綏之斯來擾之則去廣州地當要會俗號殷繁交易之徒素所奔湊今忽捨近而趨遠棄中而就偏若非侵刻過深則必招懷失所曾無內訟之意更興出位之思玉毀櫝中是將誰咎珠飛境外安可復追書曰不貴遠物則遠人格今既徇欲如此宜其殊俗不歸況又將蕩上心請降中使示貪風於天下延賄道於朝廷黷汚清時虧損聖化法宜當責事固難依且嶺南安南莫非王土中使外使悉是王臣若緣軍國所須皆有令式恒制人思奉職孰敢闕供豈必信嶺南而絕安南重中使以輕外使殊失推誠之體又傷賤貨之風望押不出右緣班宏喪亡臣今日面取進止今當此選總有四人杜佑盧徵李衡李巽並曾掌判財賦各有績用可稱資望人才亦堪獎任聖旨以淮南未可移動盧徵又近改官令臣擇一人與江西追取李衡者臣以支計之司當今所切常須銜制黠吏不可斯須闕人待追李衡數月方到或恐綱條弛紊錢物隱欺李巽近追到城請授給事中且令權判若處理稱職便除戶部侍郎如材不相當則待李衡到別商量處分既免曠廢於事又得閱試其能兩人之中必有可取陛下累稱穩便許依所奏施行臣又退更詳思以為無易於此希顏適宣進止李巽知度支恐未相當且空與給事中朕更思量司農少卿裴延齡甚公清有才宜令判度支便進擬狀來其李衡亦從追取者伏以周制六官實司理本冢宰制國用量入為出司徒掌邦賦敷教恤人今之度支兼此二柄準平萬貨均節百司有無懋遷豐敗相補利害關黎元之性命費省繫財物之盈虛加以饋餉邊軍資給禁旅刻吝則生患假則容姦若非其人不可輕授裴延齡僻戾而好動躁妄而多言遂非不悛堅偽無恥豈獨有識深鄙兼為流俗所嗤頃列班行已塵清貫更居要重必斁大猷是將取犮四方貽殃兆庶尸祿之責固宜及於微臣知人之明亦恐傷於聖鑒伏願重循前議俯察愚誠更於四人之中選擇取其尤者庶諧僉屬不紊朝經延齡妄誕小人任之交駭物聽臣雖熟知不可猶慮所見未周趙憬眼疾漸瘳後日即合假滿待其朝謁乞更參詳去邪勿疑天下幸甚謹奏右希顏奉宣進止卿等所進齊映替李衡緣江南與湖南接近齊映齊抗既是當家同任方面事非穩便宜別商量者齊映齊抗同姓別房既非五服之親則與眾人無異聖朝推誠致理未嘗先事示疑曩之李臯李兼鄰接方鎮今之韓潭全義密邇軍城此例甚多無足為慮但以中朝要職常苦乏人至如映抗良才並當臺閣妙選臣等先請授映禮部聖旨令且向外商量儻許移鎮江西亦是漸加恩獎齊抗文學足用精敏罕儔掖垣之駁議司言南宮之掌賦承轄俾居其任皆謂當才若蒙追赴闕庭試加顧問察言稽行必有可觀可否之宜伏候進止右臣伏見陛下每垂睿心經畧邊境增築城壘加置戍兵至於春秋衣裝歲時宴犒先後遲速悉由宸衷其為憂勤可謂至矣其為資費亦以多矣蓋以安人固國不憚煩勞此誠慎慮之深者也然於儲蓄大計則未降意良圖但任有司隨月供應近歲蕃戎小息年穀屢登所支軍糧猶有匱乏邊書告闕相繼于朝儻遇水旱為災粟糴翔貴兇醜匪茹寇擾淹時或負輓力殫或饋餉路絕則戍兵雖眾不足恃城壘雖固不克居是使積年完聚之勞適資一夕潰敗之辱此乃理有必至而事無幸濟者也臣竊為陛下惜之軍志曰雖有石城十仞湯池百步無粟不能守也故晁錯論安邊之策要在積穀充國建破之議先務屯田歷代制禦四夷常為國之大事勇者奮其力智者貢其謀攻守異宜盛衰殊勢柔服而不勞師旅者則常聞之矣屯師而不務農食者未嘗有焉今陛下廣徵甲兵分守城鎮除所在營田稅畝自供之外仰給於度支者尚八九萬人千里饋糧涉履艱險運米一斛達于邊軍遠或費錢五六千近者猶過其半犯雪霜皸瘃之苦冒豺狼剽掠之虞四時之間無日休息傾財用而竭物力猶苦日給之不充其於儲蓄以備非常固亦絕意而不暇思也夫屯兵守土以備寇戎至而無糧守必不固矣遇寇不守則如勿屯平居有殘人耗國之煩臨難有啟敵納侮之禍所養非所用所失非所虞以為制備之規臣竊謂疎矣頃者吐蕃尚結贊率其醜類越軼封疆朔方五原相繼淪陷雖由將帥不武亦因匱乏得辭其事未遙足為深戒昧理而好諛者必曰當結贊入寇之日遇賊泚作亂之餘戍卒未多邊農尚寡今則甲兵大備稼穡屢豐比於曩時勢不同等臣請復陳近效以質浮詞今年夏初寇犯靈武禦則寡力守則乏糧告急求哀匪朝伊夕有司為之請罪陛下為之軫憂遽擇使臣奔波督運積財以資用高價以招人賴蕃戎自旋糧道獲濟封畧不壞固非成謀然則鹽夏覆而靈武全唯在幸與不幸之間耳是皆無不拔之勢有可駭之危其為規制之方所謂同歸於失矣議者是當今而非既往豈不曰昧理而好諛乎今戍卒之加於往時臣固知之矣今邊農之廣於往歲臣亦知之矣所謂同歸於失者在於措置乖當蓄斂乖宜利之所生害亦隨至故也陛下忿蕃醜之暴掠懲邊鎮之空虛繕甲益兵庇人保境此誠雄武之英志覆育之仁心刷憤恥而揚威聲海內咸望有必攻之期矣既而統師無律制事失權戍卒不隸於守臣守臣不總於元帥至有一城之將一旅之兵各降中使監臨皆承別詔委任分鎮亘千里之地莫相率從緣邊列十萬之師不設謀主每至犬羊犯境方馳書奏取裁行李往來動踰旬日比蒙徵發救援寇已獲勝罷歸小則蹂藉麥禾大則驅掠人畜是乃益兵甲而費財用竟何補侵軼之患哉夫將貴專謀軍尚氣勢訓齊由乎紀律制勝在於機權是以兵法有分閫之詞有合拳之喻有進退如一之令有便宜從事之規故能動作協變通制備垂永久出則同力居則同心患難相交急疾相赴兵之奉將若四支之衞頭目將之守境若一家之保室廬然後可扞寇讎護甿庶蕃畜牧闢田疇天子唯務擇人而任之則高枕無虞矣吐蕃之比於中國眾寡不敵工拙不侔然而彼攻有餘我守不足蓋彼之號令由將而我之節制在朝彼之兵眾合并而我之部分離析夫部分離析則紀律不一而氣勢不全節制在朝則謀議多端而機權多失臣故曰措置乖當此之謂乎陛下頃以邊兵眾多轉餽勞費設就軍和糴之法以省運制與人加倍之價以勸農此令初行人皆悅慕爭趨厚利不憚作勞耕稼日滋粟麥歲賤向使有司識重輕之術宏久遠之謀守之有恒施之有制謹視豐耗善計收積菽麥必歸於公廩布帛悉入於農夫其或有力而無資願居而靡措貸其種食假以犂牛自然戍卒忘歸貧人樂徙可以足食可以實邊無屯田課責之勞而儲蓄自廣無徵役踐更之擾而守備益嚴果能用之足謂長算既而有司隘吝不克將順忘國家制備之謀行市道苟且之意當稔而願糴者則務裁其價不時斂藏遇災而艱食者則莫揆乏糧抑使收糴遂使豪家貪吏反操利權賤取於人以俟公私之乏困乘時所急十倍其贏又有勢要近親羇遊之士或託附邊將或依倚職司委賤糴於軍城取高價於京邑坐致厚利實繁有徒欲勸農而農不獲饒欲省費而費又愈甚復以制事無法示人不誠每至和糴之時多支絺紵充直窮邊寒沍不任衣裘絕野蕭條無所貨鬻且又虛張估價不務準平高下隨喜怒之心精麤在胥吏之手既無信義率下下亦以偽應之度支物估轉高軍郡穀價轉貴遞行欺罔不顧憲章互相制持莫可禁止度支以苟售滯貨為功利而不察邊食之盈虛軍司以所得加價為羨餘而不恤農人之勤苦雖設巡院使相監臨既失綱條轉成囊士冖䂞至有空申簿帳偽指囷倉計其數則億萬有餘考其實則百十不足巡院巧誣於會府會府承詐以上聞幸逢有年復遇無事吞聲補舊引日偷安若遇歲儉兵興則必立至危迫靈武之事足為明徵臣故曰蓄斂乖宜此之謂也邊之大事在食與兵今食則無儲兵則乏帥謂之有備其可得乎近者緣邊諸州頻歲大稔穀糴豐賤殊異往時此乃天贊國家永固封畧之時也而尚日不暇給曾無遠圖軍府有歉食之詞穡人有悔耕之意天贊而不受其利農傷而不恤其窮及凶災流行播植墮廢雖復悔恨事何可追臣是以屢屢塵煩所惜在此頃請擇人充使委之平糴務農陛下以理貴因循未賜允許又請乘時豐稔邊城加貯軍糧有司以經費無餘其事復寢臣謬當任使待罪樞衡雖神武之謀不資獻納而職司之分敢忘憂虞夙夜疚心衋如焚灼輒復效其鄙薄庶或裨補萬分不勞人不變法不加賦稅不費官錢不廢耳目之娛不節浮冗之用唯於漕運一事稍權輕重所宜請為陛下致邊軍十萬人一年之糧以為艱急之備陛下誠能聽臣愚計不受沮傷百日之間收貯總畢轉運常行之務既無失於舊規太倉歲入之儲亦不闕其恒數圖慮至熟更無所妨謹具揚搉上陳惟陛下留意省察舊制以關中王者所都萬方輻輳人殷地狹不足相資加以六師糗糧百官祿廩邦畿之稅給用不充所以控引東方歲運租米冒淮湖風浪之弊泝河渭湍險之艱所費至多所濟蓋寡習聞見而不達時宜者則曰國之大事不計費損故承前有用一斗錢運一斗米之言雖知勞煩不可廢也習近利而不防遠患者則曰每至秋成之時但令畿內和糴既易集事又足勸農何必轉輸徒耗財賦臣以兩家之論互有短長各申偏執之懷俱昧變通之術其於事理可得粗言夫聚人以財而人命在食將制國用須權重輕食不足而財有餘則弛於積財而務實倉廩食有餘而財不足則緩於積食而嗇用貨泉若國家理安錢穀俱富烝黎蕃息力役靡施然後恒操羨財益廣漕運雖有厚費適資貧人三者不失其時之所宜則輕重中權而國用有制矣開元天寶之際承平日久財力阜殷祿食所頒給用亦廣所以不計糜耗勵贍軍儲至使流俗過言有用一斗錢運一斗米之說然且散有餘而備所乏雖費何害焉斯所謂操羨財以廣漕運者也貞元之始巨盜初平太倉無兼月之儲關輔遇連年之旱而有司奏停水運務省脚錢至使郊畿之間烟火殆絕都市之內餒殍相望斯所謂覩近利而不防遠患者也近歲關輔之地年穀屢登數減百姓稅錢許其折納粟麥公儲委積足給數年田農之家猶困穀賤今夏江淮水潦漂損田苗比於常時米貴加倍甿庶匱乏流庸頗多關輔以穀賤傷農宜加價糴穀以勸稼穡江淮以穀貴民困宜減價糶米以救凶災今宜糴之處則無錢宜糶之處則無米而又運彼所乏益此所餘斯所謂習見聞而不達時宜者也今淮南諸州米每斗當錢一百五十文從淮南轉運至東渭橋每斗船脚又約用錢二百文計運米一斗總當錢三百五十文其米既糙且陳尤為京邑所賤今據市司月估每斗只糶得錢三十七文而已耗其九而存其一餒彼人而傷此農制事若斯可謂深失矣頃者每年從江西湖南浙東浙西淮南等道都運米一百一十萬石送至河陰其中減四十萬石留貯河陰倉餘七十萬石送至陝州又減三十萬石留貯太原倉唯餘四十萬石送赴渭橋輸納臣詳問河陰太原等倉留貯之意蓋因往年蟲旱關輔薦饑當崔造作相之初懲元琇罷運之失遂請每年轉漕米一百萬石以贍京師比至中塗力殫歲盡所以節級停減分貯諸倉每至春水初通江淮所般未到便取此米入運免令停滯舟船江淮新米至倉還復留納填數輪環貯運頗亦協宜不必每歲加般以增不急之費所司但遵舊例曾不詳究源由邇來七年積數滋廣臣近勘河陰太原等倉見米猶有三百二十餘萬石河陰一縣所貯尤多倉廩充盈隨便露積舊者未盡新者轉加歲月漸深耗損增甚縱絕江淮輸轉且運此米入關七八年間計猶未盡況江淮轉輸般次不停但恐過多不慮有闕今歲關中之地百穀豐成京尹及諸縣令頻以此事為言憂在京米粟太賤請廣和糴以救農人臣令計料所糴多少皆云可至百餘萬石又令量定所糴估價通計諸縣貴賤并雇船車般至太倉穀價約四十有餘米價約七十以下此則一年和糴之數足當轉運二年一斗轉運之資足以和糴五斗比較即時利害運務且合悉停臣竊慮運務若停則舟船無用舟船無用則壞爛莫修儻遇凶災復須轉漕臨時鳩集理必淹遲夫立法裁規久必生弊經畧之念始慮貴周不以積習害機宜不以近利隳永制不貴功於當代不流患於他時慮遠防微是其均濟臣今所獻庶近於斯減所運之數以實邊儲存轉運之務以備時要其於詳審必免貽憂舊例從江淮諸道運米一百一十萬石至河陰來年請停八十萬石運三十萬石舊例從河陰運米七十萬石至太原倉來年請停五十萬石運二十萬石舊例從太原倉運米四十萬石至東渭橋來年請停二十萬石運二十萬石其江淮所停運米八十萬石請委轉運使於遭水州縣每斗八十價出糶計以糙米與細米分數相接之外每斗猶減時價五十文以救貧乏計得錢六十四萬貫文節級所減運脚計得六十九萬貫都合得錢一百三十三萬貫數內請支二十萬貫付京兆府令於京城內及東渭橋開場和糴米二十萬石每斗與錢一百文計加時估價三十已上用利農人其米便送東渭橋及太原倉收貯充填每年轉漕四十萬石之數並足餘尚有錢一百一十三萬貫文以供邊鎮和糴臣已令度支巡院勘問諸軍州米粟時價兼與當管長吏商量令計見墾之田約定所糴之數得鳳翔涇隴邠寧慶鄜坊丹延夏綏銀靈鹽振武等道良原長武平涼等城報除度支旋糴供軍之外別擬儲備者計可糴得粟一百三十五萬石其臨邊州縣各於當處時價之外更加一倍其次每十分加七分又其次每十分加五分通計一百三十五萬石當錢一百二萬六千貫文猶合剩錢十萬四千貫留充來年和糴所於江淮糶米及減運米脚錢請並委轉運使便折市綾絹絁綿四色即作船般送赴上都邊地早寒斂藏向畢若待此錢送到即恐收糴過時請且貸戶部別庫物充用本色續到便令折填其所貸戶部別庫物亦取綾絹絁綿四色並依平估價務利農人仍取度支官畜及車均融般送請各委當道節度及當城兵馬使與監軍中使并度支和糴巡院官同受領便計會和糴各量人戶墾田多少先付價直立限納粟不願糶者亦勿強徵其有納米者每米六升折粟一斗應所糴得米粟亦委此三官同檢覆分於當管城堡之內揀擇高燥牢固倉窖等收納封閉仍以貯備軍糧為名非緣城守絕糧及承別敕處分並不得輒有支用待收糴畢具所糴數并收貯處所聞奏并報中書門下總計貯備粟一百三十五萬石是十一萬二千五百人一年之糧來秋若遇順成又可更致百餘萬石邊蓄既富邊備自修以討則有齎以守則可久以加兵則不憂所至乏食以斂糴則不為貪將所邀恢疆保境者得以遂其謀蹙國跳軍者無所辭其罪是乃立武之根柢安邊之本源守土庇人莫急於此傾公藏而發私積猶當悉力以務之況今不擾一人無廢百事但於常用之內收其枉費之資百萬贏糧坐實邊鄙又有勸農賑乏之利存乎其間此蓋天錫陛下攘戎狄而安國家之時不可失也陛下誠能過聽愚計先聚軍儲慎擇良圖更貞師律蠢爾兇醜自當畏威縱迷欵塞之心必無猾夏之慮伏惟少留睿思詳省而明斷之其所停減運脚臣已與本司審細計料并邊鎮分配和糴數及米粟估價等數各得別狀條件分析謹同封進聽進止
