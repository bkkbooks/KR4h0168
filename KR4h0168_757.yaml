front:
  text: 全唐文欽定全唐文卷七百五十七黯字直卿大和二年進士開成初為青州從事入為監察御史遷員外郎會昌中以諫議大夫出為江西觀察使
  hash: sha256:f4b3d5804bc9591667fc1d09073d412a9b297df70d7e2b0b5011c6ea63302179
  markers:
  - {type: head, offset: 14, content: 崔黯, id: KR4h0168_NFKB_757-h1, level: 1}
body:
  text: 江西觀察使崔黯奏東林寺山秀地靈實為勝境而寺中莊田錢物各自主持率多欺隱物力稍充者常無凍餒資用不足者盡抱飢寒本立常住全為衆僧只合同奉伽藍寧容別開戶牖供膳但資於私家施利不及於大眾今與各立條令刻石題記伏慮歲月稍深依前紊亂山深地僻人少公心住持乞降勅處分奉勅依佛之心以空化執智化也以福利化欲仁化也以緣業化妄術化也以地獄化愚刦化也故中下之人聞其說利而畏之所謂救溺以手救火以水其於生人恩亦宏矣然用其法不用其心以至於甚則失其道蠹於物失其道者迷其徒蠹於物者覆其宗皆非佛之以手以水之意也為國者取其有益於人去其蠹物之病則通矣唐有天下一十四帝見其非理而汰之而持事之臣不以歸元返本以結人心其道甚桀幾為一致今天子取其益生人稍復其教通而流之以濟中下於是江州奉例詔余時為刺史前訪茲地松門千樹嵐光熏天蜩嘒湍鳴松籟泠然可別愛而不剪利以時往至是即善而復之民物之困不可橫賦得舊僧正言問能復東林乎曰能即斷其髮佳而勉之又命言擇其徒得二十九以隸其下皆心生力完臂股相用言則隨才賦事分命告復所至響應下虔江之木鳩食訪工陶土冶鐵匠成於心授規於手日而不笠雨而不屐爨飪煮湯優犒執藝若殿若廂若門之三若闕之左右為墖若講若食若客之館若庫若樓若厨激飛泉而注於鉹之間若梁蜺於武若亭臨於白蓮若僧之房若聖之室若突據勝若卻居幽奇可不尋雅不出位則為間三百一十三為架一千八百七十六為楹為梁為棟為桷為牖為闔為屋之事數為級塼為葢瓦凡役工合六十五萬三百二十八絪縕端明嚴若有主大中六年二月十四日言命以圖及其備錄訪余為刻石之文且曰自遠公至今若干歲而傳法之地滅矣賴君復之君宜主書其事余則曰復之者上也主其事而書之於言公不辭余嘗觀晉史見惠遠之事及得其書其辨若注其言若鋒足以見其當時取今之所謂遠師者也吾聞嶺南之山峻而不秀嶺北之山秀而不峻而廬山為山峻與秀兩有之五老窺湖懸泉墜天秔香藥靈鳥閑獸善烟嵐之中怳有絳節白鶴使人觀之而不能回眸也且金陵六代代促時薄臣以功危主以疑慘潯陽為四方之中有江山之美惠遠豈非得計於此而視於時風耶然鷙者摶羶襲者拘素前入不暇自歎者多則遠師固為賢矣是山也以遠師更清遠師也以是山更名暢佛之法如以曹溪以天台為號者不可一二故寺以山山以遠三相挾而為天下具美矣今言師愍佛之法推遠之心修廢之勤任其事不宰其功讓功於義明義明曰余何能言之績也讓功於建省建省曰某何能言之力也讓功於境暘以緡物元諫以眾材清特以播植景仁以化施皆曰某何能言之方也非言不顯義非義不顯言推與讓至於是而不宏大敏固始終一致者未之有也移之於邦國之理何故不成哉銘曰萬竅怒號㣥波猛起刑戮不加仁義莫止有得佛心則滅諸熾慧以性生性以悟理山增惠臺鑑闢妄車丸根深則定葉茂則死可用理人不獨養已峩峩匡峰矯矯惠子梁以崇山津以江水不騫不竭吾道曷已上復其道吾以塞詔惟師正言勤以克肖四五年來休功再紹推能與類類以言妙不曰良能就臻此要山川不改舊物復新誡汝其徒誕將又淪陶字國鈞成都人大和中進士自國子博士出為簡州刺史士有倦乎耕耘求其典墳每下學以為已期干祿而事君雖歷三冬詞軋軋而未能足用雖觀百代意歉歉而常如闕聞復得散帙如初攻堅茲始謂尺璧兮易得歎分陰之難止隱居就道欲名垂於千萬年嗜學從師將繼志於二三子當其敦詩說禮存誠自強恃少壯而能勉勵懼老大而有悲傷儆覆簣之遺事慕絕編以同芳親賓兮莫往莫來晝夜兮無怠無荒始勵已而功疑誠為矻矻乃收心而貴復學茫茫豈九流之深豈六義之秘抑由懵學者請益而尚少雖勤而未至又安得食而求飽困而欲寐忘匡氏之心無蘇君之志由是其意彌堅其業彌專開卷且爾服膺拳然不出戶期知萬里不下帷寧止三年欲罷不能所求廣矣大矣以思無益故得藏焉修焉始也儻易足於謏聞無求備乎講究顧㣥籍而是棄雖勤師而莫誘若然者足見微功併棄於前洪名疾沒於後所以大器不愧晚成時習以資其學殖日就而冀其經明靜而專敝疑而立既勤勤而曾不息又孜孜兮如不及大矣哉學者之心信地芥而必捨良冶之子兮不墜舊規製珍裘兮巧意無遺非一狐之成此直千金而在茲葢以表盛服之麗者舉高價而美之倘以負芻如當市骨之日如將貰酒偏宜買笑之時如疑其選擇亦求粹白資眾毛取㣥腋極貍製之狀殊豹飾之跡俾裼襲之有加欲曳婁而無斁紉針既就振領提裳一作生光乍掩孔雀全欺鷫鸘有斯而死不於市衣此而坐不垂堂何必獻武帝之時人來西域受平公之處鳥下東方宜乎在笥見珍滿籯非貴將示美以爰御豈救寒而乃衣時彰節用乃三十年而尚存俗竟疑奢妍乃十萬軍之所費觀其皓練漸潔輕埃莫沾巾幣之酬猶少外飾之態俄添日影遙臨豈見犬羊之易雪花傍射自宜狐貉之兼爾乃取其諷論其眾亦猶多士補於亠兊職㣥材構於時棟豈比夫告敝於黑貂誇煥於青鳳然則乖惡衣之義生侈服之心既傷三德之數徒稱千鎰之金所以披鶴鄨於王公獨標耿潔焚雉頭於晉帝用戒奢淫况乎衣褐可以備卒歲挾纊足以禦寒夜何勞寶劍侔貲豈要驪珠同價委此蒙茸之資被乎勤儉之化使狗盜之人盡息其偷詐侑陳州人貞元末五經及第元和中為桂管觀察使寶歷時拜義昌軍節度使徙天平加右僕射進刑部尚書開成中領忠武軍節度卒年七十二贈司空度支鹽鐵轉運戶部等使下職事及監察塲柵官悉得以公私罪人于州縣獄寄禁或自致房收繫州縣官吏不得聞知動經歲時數盈千百自今請令州縣糾舉據所禁人事狀申本道觀察使具單名及所犯聞奏歷代史書皆記當時善惡繫以褒貶垂諭勸戒其司馬遷史記班固范蔚宗兩漢書旨義詳明懲惡勸善亞於六經堪為代教伏惟國朝故事國子學有文史直者宏文館宏文生並試以史記兩漢書三國志又有一史科近日已來史學都廢至於有身處班列朝廷舊章昧而莫知者况乎前代之載焉能知之伏請量前件史科每史問大義一百條策三道義通七策通二以上為及第能通一史者白身請同五經一傳例處分其有出身及前資官應者請同學究一經別處分其有出身及前資官稍優與處分其三史皆通者請錄奏聞特加奬擢仍請班下兩都國子監任生徒習謹按春秋二百四十二年行事王道之正人倫之紀備矣故先師仲尼稱志在春秋歷代立學莫不崇尚其教伏以左傳卷軸文字比禮記多較一倍公羊穀梁比尚書周易多較五倍是以國朝舊制明經若大經中經能習一傳即放冬集然明經為學者猶十不一二今明經一例冬集人之常情趨少就易三傳無復學者伏恐周公之微旨仲尼之新意史官之舊章將墜於地伏請置三傳科以勸學者左傳問大義五十條公羊穀梁各問大義三十條策三道義通七以上策通二以上與及第其白身應者請同五經例處分其先有出身及前資官應者請准學究一經例別處分官法不及法律三犯不同即坐其所重元武所犯枉法取受准律枉法十五匹以上絞律疏云即以贓致罪頻犯者並累科據元武所犯合當入處絞刑籌號栖夷子潛江人昔者金人教演西方化流東土神功莫測妙用難窮日月不能擬其明聖賢無以究其奧歷河沙之世界論億刼之修行既立三乘又開不二執之則纎毫有別契之則絲髮無差共證菩提俱登解脫巍巍蕩蕩無得而稱末代宗徒隨性而入大德諱真性俗姓闕氏涿郡范陽人也爰祖及父晦跡夷名嘉遁林泉勤業臯壠大德逸步孤立介然而貞性自天鍾議非師得觀色身之假立潛趣真宗知至道之可求精修梵行既端清而秉志乃受具以依年薰然律風輝振前古萬行由茲浸起六事於是齊修堅剛迥持清淨靡雜狂風雖振寧搖赤箭之莖欲浪徒飜不著青蓮之色割煩惱之繫利蘊刜鐘斷貪愛之緣鋩含切玉而乃聽讀忘倦慈忍兼習操持勇猛佩服精進非唯二百五十淨戒洞達元關抑以八萬四千法門游泳真際則知鴻鵠飛翔必造雲霄之上龍象趺躍寧畱沼沚之間繇是四遠嚮從一方瞻敬高行苦節時為美談頃者合寺耆年至於初學同誠壹志請闕一字寺綱大德固執撝謙抑而不許乃曰雲山異境禪律雜居若非通明何以悅眾大德曰顧無揵連統眾之術且乏末田乞地之功凡練紀綱必資德業非安於巳不利于人寺眾愈堅其辭志不可奪乃唱言曰佛剎戒嚴固難條貫考詳視履非上德而誰師之不從吾將安附三請而後許之四眾欣然合寺相賀大德至性平等慧用圓明䂓繩既陳高卑自序奉精勤以敬策墮慢以嚴共樂推誠咸稱悅服遂使施財者松門繼踵賫供者溪路相望佛宇益崇常住滋贍是知道行高而歸依雲赴福德具而感應響從又以巾錫之餘牀榻之外曾於本院別起道塲請高行數人轉藏經七徧大德宿植精進專至饒益襦寒卞餧每損節其衣盂拯溺持顛寧顧蹈其水火殊蹤異行難可思量寒暑屢移始終一貫元和中廉察使相國彭城劉公慕其高節亟請臨壇手字謺飛使車交織大德以情田不產鑒用忘機久處山林已遂平生之志冉能師證更登名利之場徒觀馬勝之威儀誰識羅侯之密行懇寫牢讓持堅不迴暨大和有九祀方伯司徒史公之領戎也常目重山聆風仰德乃曰昔三藏傳經於天竺六祖宏化於曹溪方知鹿名區時有異人間出佛法漸遠吾宗繼明益傾南望之誠兼陳北巷之敬奇香異藥上服名衣使命往來難可稱計以其年季秋下旬有三日示疾歸寂於本寺東院俗年八十四法歲六十五猿鳥悲鳴松筠改色淒涼士庶喟悼元戎於戲火宅方然羊車脫輻師之已矣人何歸依大德學行該通威德端肅所依上足皆是名人難具升堂聊書入室曰仲說恒智鑒直惠真志千文展寶定等七人焉惟增也早歲辭鄉游京就學曾於薦福寺講大花嚴經聲振洪都藝交清級眾稱開士時謂入流細行密用難具詳紀直與千業擅小乘學游多地盡得南山之要皆揚東墖之能彼四人者精通秘奧博遠多聞虎步蓮宮鸞翔梵苑感師之教報師之恩焚官於碧岫之陽起墖於清流之左雖朝昬展敬未盡所誠更議刊乎貞珉紀其盛德良工方購朴而未形俄屬先朝大興沙汰寺皆毀廢僧遁林巖洎佛日重明屢更星歲七人之內唯寶定存焉其誠則闕其力不置有說公門人前寺主僧宏信即釋門之孫也戒律清肅義心堅勇悲本師之早歿宿志未陳與定公之相扶再議崇立訪余以至感而直書冀巡禮往來披文知行銘曰圓覺真乘多不能造吾師正性盡入其奧操持淨行契叶流教意馬忘奔心猿不踔戒月圓滿律風清涼白璧無點明珠有光利根精進密行包藏披暗燈炬濟難舟航宰寺開經施財供食但益勤勵曾無退息時遵其義眾悅其德不可思議多所饒益法性無滅色身有移悲纒上足追慕先師既崇靈墖又立豐碑遺風餘烈千古長垂衮大和初進士上纘位年京兆公繇亞荊牧彭搜鯁治蠹化者耘而革之不易節而政成既而府署亭臺之敝壞者咸理新之明年秋作望雪樓訖功俾進士鄧衮銘之圍蜀之鄙截如巨砥厥郡維彭北西天屏危碧峭青戞霄磨冥鯨跳虬奔限蠻隔番上排雪峯延萬里鶴甃瑤駢月積綃鮮振古不泐四節一色皎皎披飄寒錮陰膠光涵二水冷射千里往哲所嘉名之玉壘公來未期畢完瘵凋乃於崇墉作為麗譙長材羨工不伐不徭趾故規新不僭不驕經之浹辰翬飛迢迢三伏赫曦九野如燒斯焉一登神滌煩銷他日徵黃羊碑邵棠下客貢銘永播德芳先是王僕射潛蕭桂州祐繼守斯郡二公陶奇撰幽不乏心匠於西湖臺島花竹列植布置罔不宛妙維雪山彭之殊觀獨莫經意豈非天待我公作賞跡乎昔西漢進儒術臣多貞方魏晉扇虛元吏采風流孰若公精六籍練眾務蘊張趙之幹敏兼王謝之清雅辨辭盈庭奮毫電飛具牘百幅歷眸冰釋前可以折穆之之角近可以挫戴冑之銳則不止有逸暇覽眺葢雄節大斾師長列侯方鈞平衡肅和神人迫期矣衮不佞鑱公奇績覬識士和望雪不取於澄心瑩目將以思潔白登樓不取於櫛清冰曠在據上睨下察人之利病亦敷政之嘉術也大和元年九月記朋大中六年官刑部員外郎贓謂罪人所取之贓皆平其價直准犯處當時土絹之價依令每月旬別立三等估其贓平所犯旬估定罪所取犯月旬土絹之價假有蒲州盜鹽雋州事發鹽已費使依令懸平即取蒲州中估之鹽准蒲州土絹之價於雋州决斷之縱有賣價貴賤所估不同亦依估為定居晦大和中官起居舍人集賢院直學士擢拾遺改司勛員外郎開成中轉司封郎中知制誥遷中書舍人拜御史中丞遷戶部侍郎卒贈吏部侍郎尚書元稹承旨學士廳壁記舊題在東廡之右歲月滋久日爍雨潤牆屋罅缺文字昧沒不稱深嚴之地院使郭公王公皆以茂器精識參掌院事顧是言曰吾儕釐務罄盡心力細大之事人謂無遺而茲獨未暇使眾賢名氏翳不光耀失今不治後誰治之遂召工賦程不日而成峭麗齊平粉繪耀目玉粹雲輕隨顧而生貫列豪英使千萬齡無缺無傾工役告休命予紀完緝之美舊記所載今皆不書開成表號之二年五月十四日記處權文宗朝官戶部員外郎大中時遷司封郎中出為河東少尹明皇帝懷柔百神以功濟四瀆蒲股肱郡實祠宗繇是剗舊圖新廟貌甚設國有祀典蒲侯職之然天下郡縣瀕於我者多曲架榱桷廟神乞靈滑臨洪波神有寧宇且曰瀆古侯也故神以侯稱六年夏不雨尚書博陵崔公懼茲農事凡明神靈跡有可以膏稼穡者必命犧牲簫鼓以動之卒無應一旦監軍使閻公曰郡瀕何侯廟具存姑用申禱宜斡流以蘇大田五月庚午公會閻公幄河壖列旌斾率府從事合牙門諸將郡縣吏羅為侯拜聲以具樂釃以清觴腥爓燔炙苾芬交錯版書精意以聳侯聽六月辛未雨乙亥始霽自乙亥至秋七月壬子以烈日下燭南畝復燥公曰時雨難再將柰秋成何閻公曰何侯利吾州前應如答吾且祈且報庶終侯功癸丑公復會閻公儀若庚午丙辰雨己未乃霽噫公禱之虔神應之速禱不虔無以徼侯貺應不速無以協農時既貺既應多稼織野寒耕熱耘之子其有京坻之望乎昔王尊捨熊軾臥金隄卻驚波也公仗戎鉞禱於河濱勤甘雨也驚波縮所以完居邑也甘雨零所以遂嘉穀也則知前賢後賢之推誠濟物脗若符契矧乎食民天也宜拜侯賜閻公揖曰齊誠以動神者尚書公之德也公揖曰始謀而獲應者將軍氏之力也於是相與拜宇下或曰昔河流濫汎將魚滑人滑人祝侯駭浪帖息今日拜侯賜未若記侯之感通公乃召從事河東裴處權文其功客有博陵崔應書於石會昌六年九月一日記扶字相之大和四年進士宣宗朝官司封員外郎考功郎中累遷御史中丞兵部侍郎同中書門下平章事下州應管當司諸色錢物斛斗等前件錢物斛斗散在天下州府緣當司無巡院覺察多被官吏專擅破除歲久之後即推在所腹內徒煩勘詰終無可徵今後諸州府錢物斛斗文案委司錄事參軍專判仍與長史通判每至交替各具申奏並無懸欠至考滿日遞相交割請准常平義倉斛斗例與減選仍每月量支紙筆錢若盜使官錢及將借貸與人並請准闕元勅以贓論如徵收欠折及違限省條並請量加懲殿如缺司錄即請令選諸強幹官員專知不得令假攝官權判人生百年飲食過而生疾帝臺三襲趨拜乖而則刑故良醫之門固多病者而望苑之地胡可窺焉甲則業謝醫工景乃行同惡少雖有求於毒藥失此疕瘍乃無狀而登高俯其宮闕彼非上藥疾者無瘳此昧古人行不由徑况驗蛇盃之影輒欲蠲痾而識龍樓之尊方能起敬醫未三代得無恥之登而四臨過亦甚矣微周禮而已失宜其息言按呂刑而故違合從減坐則使有疕之者不俗疑而自除無賴之徒伏軾而知禮僚文宗朝官考功郎中漢武帝諸宮此夫人兮恩意難同悲豔質以長逝恨深情之莫通夢想徒勞寧及九泉之下神仙有術能生一夕之中帝乃暫釋幽懷將觀異變儼宸儀於玉座張翠幄於蘭殿清風拂戶疑髣髴以徐來皎月臨軒尚朦朧而未見且其駐視潛聽虔思效靈燎金鑪之馥馥燦銀燭以熒熒寂寞而求瞥爾而風生綺席從容以俟俄然而影在花屏於時漸出形儀暗聞珠翠初半面以呈姿忽全身而表異盈盈不笑如羞久別之容眷眷無言莫問平生之事是則嬋娟可翫隱映難親不有如有非真似真既揚翹而掩袂亦流盼以疑神翡翠簾前悵望三千之女芙蓉帳裏分明二八之人况乎麗服逾春美顏多暇揚襜如之羅綺飄藹若之蘭麝非因不死之藥豈便長生何用返魂之香自從神化及夫弄花態以遺妍望君王兮不前復認吹蕭之侶終疑獻果之仙目眄眄以徒極心搖搖而詎傳迷甚化宮周穆之遊固爾地非巫峽楚襄之夢應然已而頓解前思詳窺舊質爰將托方士展神術謂傾城之且驗豈同輦之無日殊不知事本憑虛功難責實夜如何其夜已闌悵飄然而復失相彼烏矣超然莫同不振羽於域上自呈形於日中儀鳳肯慙信五色而都混高天已及豈三年之始沖懿此生成貫乎今昔東西必隨於運動昇降寧離於赫奕俯黃人而更助金光映王字而偏疑鳥跡既乃騰陵霄漢披拂雲霓那楚幕而堪處匪霜臺之足棲分明而不似籠中固非仙鶴髣髴而還如鏡裏豈是山雞曷九雛之莫對乃三足而長在黑羽雖同於不黔白頭詎得而終待始來何地誰見入於重輪爰止何年孰可問於真宰徒訝其煒煒煌煌形標翼張縱橫弄色宛轉和光風起而遙疑飛動烟含而杳若潛藏足令人子閑窺因寄情於反哺日官頻測空懷望於殊祥嘉其靄爾無匹裒然斯出鳴琴安得寫其啼流火焉能變其質復不知見也何期隱也奚歸有咸池兮飲不飲有蟠桃兮依不依誰使梯航景象沐浴光輝炫晃乎清晝優游乎翠微靡願稻糧志士畱之而莫得無猜彈射夸父驚之而不飛客有指寥廓之儀形訪前時之歌詠且彼素姿神異赤羽輝映下為陰隲之符葢本陽精之命今仁風已扇孝理方盛烏之靈兮得不降休而瑞聖恭開成元年為邕管經略使洞賊雖深居山谷當其刦掠多在平地防禦之道切在馬軍請賜草馬二百匹置監牧以為備玠大和時人夫人爰自閨幃素聞令淑以秦晉之疋叶琴瑟之和聘于環公二八載矣公門館洞開賓寮日至長林之下蕭灑清風曲岸之傍丰茸細草或臨流而笑語或對酒以笙歌飲膳足供壘罇不燥茲乃夫人有中饋之德副君子好士之心上客翕然衆口談一不亦美矣不亦罕歟豈圖積善無徵忽遘斯疾狂飇震激綠樹摧芳於戲四隣傷慟哭之聲丹旐慘高懸之色弔賓盈路孰不歎嗟實乃夫人之節行也夫人則大和八年五月廿八日終於鄜州洛交私第享年卌有二女子廿四娘號泣無時悲哀詎止則以其年六月廿四日權厝于鄜州洛交縣西北八里廟原谷之闕禮也於戲貞石永存厥銘不朽代述其事慘然筆端其銘曰所期偕老何乃忽分哀哀慟哭逝者寧聞其一忠心是思無休歇時人來蹔解客去還悲其二生前所執于此威儀夜臺長閉冥路何之其三音容永謝覯覿無因鏡匣粧奩但委埃塵其四拱樹森森旌竿孑孑淚滴草頭露珠和血其五直方梁州城固人大和中官左補闕臣伏見近歲已來災害不作兵革休息百穀豐稔四方寧泰者非他是陛下事異于前時中外之心有所驚惜比者雖有教坊音樂陛下未嘗賞悅因有賜宴與人共之如此則雖有伶人不害于事陛下即位之始宣徽教坊悉令停減人數或聞近來稍不如此樂工弟子賜與至廣每有此事向外流傳傷陛下聖德豈容易也臣以為鄭聲娛人新音動聽能使人情迷亂捨棄萬事而為樂不足也臣伏以聖體未安加以聲色之翫侵蠹聖祚得不憂乎瑤清河武城人太和三年進士累仕至中書舍人大和時拜禮部侍郎出為浙西觀察使終鄂岳觀察使勅揮翰金門諒屬詞華之妙論思玉署尤資周慎之才選署惟精搴授斯重朝議郎行尚書兵部員外郎蕭寘內蘊沉識外揚清和㣥居不流雅尚歸厚文摛錦繡學富縑緗早命中於射宮遂從知於壺奧靜無違心動有餘裕用雖繫於通塞道自保於歲寒藹然休聲布在公議是宜擢居密地掌我命書勵夙夜之講求備朝夕之視聽副茲寵榮佇有宏益可守本官充翰林學士顗字勝之牧之弟舉進士授秘書省正字李德裕奏為浙西府賓佐太和末為咸陽尉直史館以喪明卒鬱乎㣥賢之林有山其秀有池而深幽流澹泞蒼翠嶔崟千門下隔三殿旁臨引彤庭之佳氣涵碧樹之清陰連帛丿糸芳草游泳仙禽對石渠之鉛粉會金馬之衣簪宛雲霞而在目眇江海而為心何扁舟之獨往何倒影之遠尋懷我魏闕浩爾長吟山池之陰可以清吾襟山池之所可以狎吾侶涼風忽起白雲時舉步苔岸之周流藉松溪之積阻邈矣幽興颯然清暑乃登玉巒撫金渚圖書載暇纓弁以序此焉游處於茲宴語發菱花而不能歸攀桂枝而久延佇日落池上雲無處所爾其秋風既起秋興爰至見藤篠之幽娟弄石泉之明媚禁林餘雨增曲霤之華清御苑晴煙借遙巖之積翠是以洗雪煩想優游雅思嗟乎山中人兮猶未識池上蛟兮焉可得顧蘭芳與菊滋從此賞兮無極列地之圖辨邦之數制以廛里設其井田居無遊人地不曠土頃因㣥寇且有大軍既為患於凶年每屬想於美歲方今國步將泰人心盡歸久悲風土之殊咸戀枌榆之舊則百堵皆作三農聿修既富之教已興食貪之惡將息故郊遂絕不毛之地郛閈鮮無名之人商旅厚生無屑心於倚市黎甿樂業必食力於代田然後地不耕耘稅以三家之粟宅無樹藝罰其一里之泉何必具以寮寀而欲省其州縣與其削邑寧愈減官是為政先實亦教本咨爾戶部恤我人言將以攻乎異端不如坐進此道文素醴泉縣人太和中舉明經天竺人師億刼行化眾生得悟永離苦海者哉則有我此邑耆宿長幼士女等知身覺悟共發齊心且好人惡煞蠲弊崇善所以賢達君子多愛法焉於是矻矻勤心孜孜不怠從元和初遞相謂曰各減毫分施捨共修功德預造橋梁者矣日來月往世事如流俄爾之間二十餘年凡修功德七八餘件從元和六載辛卯歲崇立石燈臺一所又十年乙未歲剏造講堂一所又十一年景申歲飜瓦佛殿安鵄尾鳥螭頭修換覆堦又十三年戊戌歲後軰小邑社十四五人崇立尊勝陁羅尼石幢一所又十四年己亥歲造泗州石和尚一鋪又寶歷元年乙巳歲造西廊全五間今又發心起修鐘樓捨施青鳧上至十年五千下至百十五十或則社例均率造諸功德亦如之有諸圖畫幡額不能備書我徒一輩能種善因梵宇修飾與日月而爭輝丈六金身坐多寶墖而自見金燈焰焰照於十方寶幢巍巍侵於月殿像坐蓮花經鐫貝葉微塵一聚而福生闕一字風散拂而罪滅聖僧瞻禮利益衆生所求獲福更能招僧設講讖念歸依念彼大乘冀有利於生死遂記其善揚其名召匠琢石故立碑矣神龜負背虯龍憿身琢成野草之花鏤出雲霞之色立斯之地也東望仲子之峯侵侵凌於青漢雲飛半嶺霧戴厜㕒西瞻豆盧之神山依依接於溫嶺多饒祈禱雱則應時南有碧嶂橫遮遙望峨峨聖闕北有涇水長川出自朝那殊流滄海如黃河之崛曲似巨海之洪波其名水也或眺走馬之山遙依天際白雲覆嶺碧霧攢峯此地多饒谿磵秀氣氤氳長岡連連接於石水長幼同福遇此勝因伏願上資人主帝王百寮文武及代代先亡下霑黎庶蠢動含靈及子子孫孫同霑此福文素不才社邑相推聊筆畧述直書其事故立碑銘以貽後世其辭曰修善兮消殃崇福兮降祥光明兮東照歸依兮西方照耀兮金燈清淨兮華堂讖念兮鐘磬行道兮行廊生我兮地久育我兮天長松柏兮青青刻石兮永貞尊勝經兮救護泗州僧兮聖形神龜兮兀然蛇龍憿兮冲天日月照兮永古風雨摧兮何年炎大和時進士公諱崟字子嵩望美彭城家寄京邑曾皇祖禰德行咸高仕位佳政屬干戈亂動告牒失遺畧而不言公青春懷橘白面凌雲出事公卿奏成品秩解褐任洵陽縣丞才繼陸安政敷五德次任寧國縣丞上司勒畱下士遠慕雖不親臨百姓闕一字亦播顯多能三任楚州兵曹位亞題輿道益熊軾館驛事集戎旅獲安公累任清肅上考成高闕三字有殊何壽年不永大和八年七月一日逝懷德私第享年六十有二仁兄悲切痛失鴒原哲弟浦陽縣闕三字職度支不後同衾冉堪異鄉夫人趙氏頓罷鼓瑟闕一字失悴容德繼敬姜聲齊孟母嗣子歡郎年未志學闕二字少孤闕三字天未能主葬女三人長適楊族次居闕二字在襁褓闕二字親戚慘愴實亦行路悲傷子壻楊氏闕一字報泰山之恩淚送逝川之落室又泣血難報罔極闕三字石闕一字農意焉以大和八年十一月廿六日葬于長安縣闕二字鄉窀穸禮也恐陵谷遷變乃刻石為銘辭曰永壽闕二字楚楚劉君闕四字刀筆凌雲闕一字於難紀善政易聞兩贊大邑一椽理闕一字身歿名揚不朽蘭芬棣艹口咢斷膓孀妻晝哭雅合更榮如何不祿墳起曠野殯毀華屋天然闕一字崗長埋片玉長女佳壻祖奠澘然下淚即日霑恩早年安魂紀德萬古稱傳
