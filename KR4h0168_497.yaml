front:
  text: 全唐文欽定全唐文卷四百九十七權德輿十五
  hash: sha256:5d954c41efaa271124772ecdd838ec9e9c775e4c6b2e9c9cac2e2646eb07faeb
body:
  text: 萬物本乎天人本乎祖乃立宗廟以安神明德厚流光追養繼孝順而下之曰義等而上之曰仁國家稽合禮文損益前載崇功貴仕得祠四室於王制酌諸侯二昭二穆之義於祭統見君子盡志盡物之誠惟太尉中書令南康郡王懿文經武保合昌運左右德宗格於皇天始恢隴坻之旅終化岷峨之俗貴為上公位極元台克肆忠力乃圖孝享作新廟於京師大安里古者揚其功烈銘於祭器近古以魯鐘衛鼎追琢先德不若鏤文字於麗牲之碑之為詳也乃謹而書之云公姓韋氏京兆杜陵人自扶陽重侯用經明至宰相後裔蕃昌德與位偕積十六葉至六代祖範字元禮以字行於代仕周為車騎大將軍入隋為沂州刺史啓土郿城易名曰莊實生孝恪雅有文憲武德初由侍御史為洛州別駕生司農府君諱機為第一室端誠正志休有厥聲專對出疆艱貞復命著西征記以獻太宗嘉之剖符澶州修起儒術三典卿曹陟降屯夷操持貴幸不避強禦善理宮室得其時制史氏書之為唐名臣以夫人隴西郡君辛氏配司農生坊州府君諱餘慶為第二室清和修潔履道不回歷右饒衛兵曹參軍以至二千石以夫人武功蘇氏配坊州生贈太子少保府君諱嶽為第三室方嚴貞幹政事修明在武后時以直忤旨由太原令移佐睢陽出入四紀績宣中外歷殿中監剖符八州廬海潮虢眉徐衛陜所至之邦有威有懷凡再追命以夫人扶風郡夫人竇氏配少保生贈太子太師府君諱賁為第四室盛德循行含章自牧歷藍田尉淑聲流聞上纂崇厚下貽風訓凡三追命以夫人涼國太夫人段氏配噫嘻自扶陽至郿城積丕烈於前史自考廟至顯考廟流熾昌於後葉列於禘嘗儲厥義方故南康郡王苞五常貞四教秉靈傑出含道中立初誓偏師建奇功捍大患立大節以儒衣法冠授律鑿門佩亞相之印綬修元侯之節制就加宗工入掌金吾撫征全蜀命賜備厚由地官轉天官參總端右平章宰政進中書令加司徒太尉鏚鉞秬鬯鑾旗雕戈有嚴有翼乃蔚乃赫忠厚博大以阜俗信廉仁勇以成師南蠻納邸西羌解辮象胥譯戎捷樂府陳夷歌守正持重推誠畢力開地通道者九千餘里生聚教訓者二十一年天文紀功刻在金石暨德宗棄天下太上居諒暗危言急病體國忘身毅然君子之道卓爾大臣之節永貞元年秋七月考終命於理所策贈太師有司奏諡曰忠武公自廟成距今凡八年矣以公天子守臣安危注意不得視滌濯承吉蠲而元兄國子司業聿實奉朝請薦其常事孝友而才稱於士林初公之仲兄曰暈屯田員外郎贈鄧州刺史叔氏曰肇太子左庶子兼御史大夫贈左散騎常侍咸以器望而延裦錫公之夫人贈魏國夫人張氏其祖禰與外王父皆秉國均為天下華腴嗣子工部員外郎行立銜恤無怙齊喪中禮大凡四廟之支旁尊㣥從烜赫昭融不可勝書至若質明光近沐浴盛服虛中以理嘉薦匪懈而無違心大糦沈齊馨香條鬯既思其志意若聞乎容聲洞洞乎屬屬乎有以見舉十倫而備百順昔素王之以戰則克以祭則受福其斯之謂乎司業悼手足之凋落感春秋以悽愴永懷明發俾篆斯文銘曰新廟有侐靜深奕奕孝孫匪懈元衮赤舄洪閥章章乃侯乃王漢稱扶陽唐有南康二十三葉沛然蕃昌四室崇崇斯焉享嘗烈烈南康溫良能斷謀猷樽俎文武楨幹汧岐之西祲沴銷散井絡之下天文昭煥撫封全歸冥漠德輝聿修孝享家法無違以昭以穆以嗣以續和氣婉容苾芬烹熟子孫小大罔不祗肅神之聽之報以介福古諸侯五廟大夫三廟廟在其國聖朝以官品制室數侯伯理外而廟在京師其或覲於明庭入為孤卿則吉蠲慤信展敬受福居常則冢介子姓薦其常事僾然肅然追養繼孝之義重焉元和五年歲直庚寅浙江西道都團練觀察使潤州刺史大夫河東郡公薛公蘋建先廟於長安縣永安里其祠三室初薛之先在殷為左相在周為侯國至漢御史大夫廣德為宣元名臣從廣德十三葉至後魏安西將軍涪陵侯謹乃分五房又四葉至隋禮部尚書道實道實生皇尚書議曹郎德儒德儒生寶積濟齊潤三州刺史揚州大都督府長史寶積生代州定襄道行軍司馬待詔公之曾也為第一室夫人京兆韋氏配焉司馬生衛王記室太子司議郎贈太常少卿侃公之祖也為第二室夫人范陽盧氏配焉太常生京兆府奉先縣尉贈工部尚書順先公之禰也為第三室許國夫人吳氏繼夫人同郡裴氏配焉惟司馬以兵鈐機略恢武經邊備惟太常以端士雅文仕王國宮朝以至先尚書含道安卑四命官而再結綬始仕巴西與楊國忠為寮比及操柄鋭於引重賦詩謝絶不屑就焉獨用義方以振家法積厚餘慶河東公實承之公忠敏廉直和恆惠為政事吏師於文章為聲詩所施在樂易所至有風采京邑肅清虢人理平今皇帝馭天下之初推擇方任聯命為湖南浙江東西三道長帥歷御史中丞就加御史大夫凡三方二十郡皆據蕃善地人受其賜班制規為四封宜之乃創廟貌以嚴祀事楹階俎豆之飾儉而中節祠祔盥薦之儀質以盡敬水草陸産血毛幽全柔嘉滌濯怵惕悽愴思志意以如在交神明而來格君子曰祀之忠也其若是乎初公之伯氏仲氏曰萊曰莘許國夫人之出而代宗從母母弟也勞謙淑均不自驕盈以功次奉朝請皆至贊善大夫以沒公之母兄曰芳雅有器幹為北都命介由御史府入為祕書丞亦不至大官抑代德鍾美朋三壽而享五福者其在季乎昔魯以閟宮受祉衛以蒸彞崇孝酌用古義楬於茲碑其銘曰宗廟祭祀禮之重事亹亹河東尊仁安義薛為諸侯爵列春秋在漢廣德亦居大夫厥後焜煌三祖五房如山崇崇如水湯湯河東楨幹纂服周漢乃尊藩衛乃長邦憲祠宇碩曼蒸嘗嘉薦求福不回降福孔皆入室出戶周旋敬齋麗牲有碑乃琢乃鏤河東孝享永示厥後國朝之制二品已上祠四廟三公品第一雖有始封亦不敢逾焉元和五年相國司空燕國公立新廟於京師蘭陵里司空公以文武偉才肆勤納忠外貞師律入作公相以平乎水土以調乎陰陽深惟祖禰尊尊之義昭穆親親之道乃圖廟食以永代德公姓于氏河南人七代祖謹後魏柱國大將軍周太傅三老燕國文公六代祖實周大左輔隋贈司空燕國安公五代祖象賢驃騎大將軍會昌定公惟三葉有大勳力於北朝乞言而為惇史體國以全至公四代祖益州郫縣令諱德威夫人京兆韋氏曾祖帛丿糸州顯武縣令諱元範夫人北海王氏王父贈刑部尚書諱汪夫人北海王氏烈考贈司空諱敻夫人邠國太夫人京兆韋氏凡宗廟之數郫縣為初室顯武為二室尚書為三室司空為親室其配各以夫人氏交神明之道也惟郫縣顯武遵道服儒廉退潔修且曰邴曼容陳仲弓吾之師也故仕不過六百石而以理效聞尚書沈冥善閉含道特立以處士燕居至於沒身凡三追命至大司寇先司空廣大而靜默恭儉而好禮合二雅循四教推明理古之學貶絶非聖之書恬智交養龜頤不惑起家益州東陽主簿四徙官至寧州真寧縣令又再轉至泗州司馬祿至卑而仁及物道未泰而志不懾公卿大夫之間尊有道而疏利權天寶末宰執擅朝惡其剛介不附已故官止郡佐而慶延身後朝典加恩亦三追命自密州刺史吏部尚書以至於論道焉長子頗專良有士行終洋州司戶參軍冢子𩑢貞幹強敏程功賦職歷戶部侍郎以公事貶泉州司戶贈楚州刺史幼子頃吏理清明仕至長安縣尉司空公即第三子也英朗閎達剛方博厚才可以扞大患學可以析㣥疑彌綸中朝則尚書郎京邑廷尉皆有懿績惠綏外服則湖蘇虢陜二千石察廉克宣功化繇山南東道節度使平章事入覲居中策拜顯尊紹文公安公之爵地展盡志盡物之誠敬悽愴怵惕精明吉蠲詩云春秋匪懈享祀不忒司空當之矣又曰以妥以侑以介景福先公宜之矣公狀先公之行其大略曰孔宣父應聘歷國困而老于洙泗我先君宦學於天寶之年而操之者甫忠謂林甫國忠先君能無窮乎又曰小子不敏不通先君之大道不識先君之大行不肖之罪也類是者千餘言其太史公自序之風可以論撰酌之祭器德輿外王母公之從母也故其門中風訓獲周知之忝備重任在公下列公以廟銘見授頓伏上聞尊嚴咫尺實奉面命其在傳信不敢蔓辭銘曰燕文三老弻魏佐周安公定公亦播厥猷郫縣顯武一同丕矩尚書司空三命追崇義訓忠教公台焜耀乃封故地乃建新廟新廟是宜羶薌告祠齊明盛服乃順乃時卑靜以正如親聽命求福不回孝孫之慶刻銘斯碑以代蒸彞歲在戊寅夏五月甲子居守天官扶風公以病就第考終命於京師永命里春秋七十四越三日丁卯追命為太子少傅秋七月甲子歸全於萬年縣少陵原前此又詔有司以鹵簿鼓吹飾其儀法以德以勞以榮以哀馨香光大為宗工表式公諱亞字次公漢建平侯延年二十一代孫曾祖元道皇右千牛王父含章皇上郡司馬贈嶽州刺史烈考繹皇欣州秀容縣令贈左散騎常侍公承積德之淑靈稟中和之粹精山立揚休得時大行歷諫議大夫給事中再兼御史中丞繇睦州刺史入為刑部侍郎三兼御史大夫檢校禮部吏部二尚書正色於朝而文憲損益懋功於外而藩服輕重宣力以肆勤納忠而愛人稽於法制導以善利魏昭子能理大官趙文子能恤大事足以斷國論謀王體殆不可及已早歲州里舉經明既授初命以為大厦之材不可以植培塿南溟之翼不可以棲榆枋於是初服燕居博通㣥書深探理古之道焯見天人之際天寶末盜穢兩都宣皇在岐褐衣召見前席三接實貢昌言以扶大統乃以處士授校書郎其後三辟大府五登郎位清議善價必歸於公大歷中宰府擅朝交利崇黨司諫八年嶷然貞厲盡規時疾天下直之權臣既誅乃擢左曹先是魏壁未下東師既老密疏方略深圖理安再勤皇華大布清問導以善氣灑其他腸不寧方來克協宸慮故先皇今上皆以公之才可以大受姑以九牧四征試其多能鍾陵上遊提封七郡命公以廉問之政師役之後因緣煩費雜征逋賦盡削其書未逾年而庸亡自占與夫家相半能厚下矣函關陜服介於周秦命公以藩屏之任化用清靜身為律度里閈無吠犬府庭無諍詞四封之內幼艾相賀能去煩矣河靈蒲坂陶唐所理命公以尹正之重地本沃饒化之純儉盡以解梁之盬歸於有司凡緡物錢之息其出池澤之賦其入歲一萬萬率皆罷廢不以利為利矣揚州葆強都會庶富命公為節制之帥日講軍實歲修職貢師貞人和政成事時河渠填淤積歲為病乃釃二浸於蜀岡之西濬舊坊以股引順地泐而啓閉滌源導滯力省功倍邗溝之人受其賜而歌頌之矣勤學在公盡瘁其身上思裦優之禮乃命保釐之任昔在成周三后協心公率其道寬而有制且以洛苑汝墳棄地可闢籍其介夫頒以稼器歲皆登成人用洽和地官以之省費遊手以之務本分正七年厥後用加徵還京師日俟其復天則不弔竟孤人望夫人范陽郡夫人盧氏茹未亡之哀既虞而終無子以猶子某為後悲夫初公文章合雅議論經遠見知於太尉房公琯受辟於衛國杜公鴻漸以志氣才業英華博厚合於彭城劉公晏贊皇李公栖筠以道義經術研幾盡性合於司徒楊公綰司業張公參或以公得時中之道或以公有事外之致皆曰聆次公之言可以書紳作憲至於博約後學章明遠至有闕里之善誘焉有平輿之深鑒焉噫嘻昔漢武帝以韓安國為國器劉向謂董仲舒有王佐之才當理平之時或蹇或徙止於御史府膠西相竟不得總秉國成扶贊化育則公之位望終不相配亦如是耶昔魯視豐碑衛銘蒸彞近古鼎不以窆追琢介石楬於道周參魯衛之遺也公從父弟太子賓客黃裳德位相倫友悌相輝功衰之喪加人一等以德輿辱公之知俾論風烈懼詞之不敏而無愧焉銘曰昔在周邦實憲吉甫於惟杜公亦備文武武辨峩峩玉聲鏘鏘公在左垣羽儀周行鈎膺濯濯文馬翼翼公為元侯表率方國推誠導利興事任力陟恪清時作稽忠德冢宰是職周郊是式宜永介福如何不淑壽堂幽閟襚印榮飾勒銘於茲山石無極惟盧公諱坦字保衡涿郡范陽人也代為北州冠族曾祖審經皇齊州祝阿縣令祖河童徐州豐令父巒明經上第贈鄭州刺史仍代以六百石廉厚有循化先君子名經澡身曠僚追命至公始延耀發舒烜赫顯尊乃舉較略以施金石公始為同州韓城宣州宣城鞏縣河南四縣尉監察御史裏行殿中侍御史內供奉真為殿中侍御史戶部員外郎尋轉庫部員外郎刑部郎中皆兼侍御史知雜事拜御史中丞除右庶子又以御史中丞為宣州刺史宣歙池觀察使入為刑部侍郎轉運鹽鐵使戶部侍郎判度支又以御史大夫為梓州刺史劒南東川節度使元和十二年秋九月薨於位其年六十九公含章特達剛健篤實粹溫而有遠猶忠厚而無流心自周圻滿歲令聲籍甚時宰得君實公之私闕一字其燻灼不受慰薦徐用常調復還洛都其仕外臺贊佐東都守臣寢病中貴驕暴以甲士五百棲於府中衆情怪駭慮有急變公感慨憤怒以正詞讓之匪人慚悔回慝不作其佐轉輸事任循明河之舊防有梁公堰者發決歲久為之濬理鍾水導滯厥猷茂焉李錡以戎車督運貪猾無狀公端正中立用十年不徙官與從事李約李陵暨今相國裴晉公相繼引去其在憲司貞厲間邪元和初天子憫人之重困徵貢之無藝方任受代至京師尚修任土者俾論如法赦令懸焉梁閩二鎮首姦斯禁公立奏劾使待罪於朝多士竦聽四方風動李錡之誅也既絶屬籍有司請發其先墓自淮安而下悉皆夷之公諫曰神通有佐命勳乃國之宗臣守官以死奈何一旦以錡故而戮斫九原上改容嚮納特給五家灑掃冥冥之下將加法而加恩君子多之其在宣州歲丁驕亢順其發斂以救艱食闊渚田於壅棄置種食於鄉亭多方愛人人用饒給或曰持力盈矣盍上獻乎公曰勤人市恩所不忍也出軍食緡錢四十萬以代征徭為秋官領使去宀兒食百輩自江而南均輸池澤委分部大吏得命其屬以能否進退公不撓焉責其成以騖功吏採其要而得均節其為地官也以府帑之羡繕終南宮百堵皆興六職以嚴備邊力嗇者費大萬兵食以饒亭障以安有臨淮守前蒞事於代北者或告其畜馬百駟且有奇種事下於公公使從事覆之上遽命小黃門按之公曰如是則廷臣可疑近習可信臣不敢奉詔疏三上上方感納七年河流毀西受降城城守以聞宰臣請徙於天德公曰河決不過退三四里功費無幾何天德塉磽回遠非所利也時之宰臣議異故公議格而有梓潼之命其後城守以憂死代之者人歸咎而戕之盡屠其家天德幾亂公之前知若蓍蔡焉梓人自井絡挻災侵淫亂略逮公至也理之如家雜征牟利者去之邊防虛籍者實之砥貢之外無異獻吏祿之差有恆給師貞人勤政事和理鎮安一方而大庇廕之柩輅之引鰥孤哀送自郪中至劒門以五百里祭奠相屬有詔贈禮部尚書不視朝命著作弔祠法贈加數母弟前絳州刺史常師以器望歷中外以友愛重人倫長子玠壽州霍邱尉冢子大炎前明經調拔萃以地勢嫌抑次子大璟河南府參軍幼曰瓚未仕大炎大璟等咨於叔父與伯季竭誠信以明年正月日祔葬於東都穀水之陽先封禮也惟公早精六學尤邃三禮晚節究觀歷代史端誠正議宏達卓越歷於大朝名致直言秉剛履險不疚不跲煢煢然有史鰌汲黯之遺風序賓樹善鋭於拔同升諸公者十一人並列於藩者若干人喜士睦親造次以之用之不求備求之如已失洪範之攸好德大雅之人鮮克舉惟公有焉某建中末與公同為丹陽公從事中歲左戶請為郎及茲建牙壤地相接周旋出入殆四十年今聖朝多士如林永懷舊故凋落向盡保衡又沒可勝慟耶公之記室大理評事羅立言狀公之行將諸無容之請牽課鄙憊詞達而不文銘曰盧公懿懿戴仁抱義其用不器迪在庭大猷是經穆然儀刑再二六職兩居方國人用景式溟波卿雲夭矯輪囷奮其翼鱗物情未直壽寵未極生死糾纆洛師舊鄉穀水之陽先人所藏孝子悌弟乾肝焦肺寧此後載刻飾龜螭發揚聲詩傳信在茲昔周以淑旗錫韓侯奄受北國晉以黼冕命士會乃將中軍惟鄭國嚴公諱礪字元明再總方任實顓兵柄采飾昭融與功化俱初公從祖兄太師馮翊忠穆王政成於梁勳在盟府公以支郡二千石護和門賦輿太師既沒德宗命公為代於是都尹守開幕庭佩亞相之印綬建元侯之麾節守之以義和之以仁器局宏厚姿儀碩大每務根本不沽名聲勤身七歲績用大洽優詔就加禮部尚書永貞紀號井絡上變軍司馬因守臣之喪席凶器以要好爵而又劫蜀人圍梓潼天子旰食西南愁擾公毅然飛章條上方略請以漢中之師率先進取畫山川之厄塞調餫饋之名物出其不意可以鼓行嘉猷急病慷慨忠壯實蒙可報克厭帝心乃命將嚴秦授以機略自漢源至神泉凡數十合其間下劒門覆蕩口收劒州破契丹命裨校可提彌誅斬虜之特將文德昭然後分秦險阻潰其心腹或設伏以遮擊或出奇以夾攻我常賈餘而虜始奪氣以至於援鹿頭清岷峨旋禁旅於天上快靈誅於闕下賦車馬以懸束備糗糧以飛挽慮之於始倚以成功故墨詔曰士季定克蜀之謀叔子建平吳之策惟君知臣其至矣哉公博貫書術研幾易象始以處士詣草堂禪師無相修桑門之法邦鄉督勉甫釋巾褐為梓州元武尉本道表為遂州兵曹掾大歷中西戎不虔疆埸大駭領偏師援灌口實茂厥勞謙卑不居建中末太師以藩衛之崇當孝文省方之運推擇從事導迎屬車豈伊異人在我族類拜大理評事充節度巡官儲㣥百牢以奉行內轉大理司直改華州司兵參軍節度使李元諒署為推官以憂去職既除猶毀太師以武備為重將才實難表為太子司議郎兼監察御史左廣之戎政轅門之後奄無不綜焉俄拜興州刺史寬明惠以靖邊部居一年政成復修軍志終繼二馮之化而居八命之尊投艱履險勳伐章灼蓋裕於才能而推於忠厚然也元和元年遷尚書左僕射三蜀既平拜梓州刺史劒南東川節度觀察使且以資陽陽安等六郡四十餘城隸焉加地進律疇庸之典也四年感疾春三月甲申薨於理所享年六十有七追命司空弔祠有加嗣子天興尉公甫銜恤茹毒奉公之喪以其年秋七月辛酉葬於京兆萬年縣鳳棲原從象數之吉也惟公之先自兩漢二隱湛冥善閉曾王父哲閎覽博古鬱為聞人皂囊危言劘切后黨繇荊王府司馬出為劒州刺史因徙家鹽亭而休老焉大父順恬淡不仕父審微義方貽訓聖朝以孝理天下贈工部侍郎公之諸祖父或著作祕書侍講東朝或含章射策剖符居郡㣥從兄弟有太師之烈焉其他履臺郎二千石者率以才行自贊惟公以文無害歷掾吏部從事發揚武毅奮迅軍籍分閫授鉞為時信臣循理遵職好謀善斷明利害之向習俗化之變司馬遷所謂扶義俶儻不令已失時其有功名也宜哉林鍾蒸彞先古之制所以論次懿績章明永久門吏孝子之心也其可沒乎以德輿嘗志太師之墓亦草興州之詔耳目事實其詞不誣是焉篆刻以表神道銘曰地中有水利用行師於惟鄭公藩屏清時蜀川橫潰人用怪駭公披肺肝請掃蜂蠆賦車誓衆沐浴齋戒吉語日聞嘉猷是賴以犒以饋間關感慨如飛如翰輝耀宏大既理漢中乃遷梓潼武以貞師文以撫封八旒七章既長宗公乃倚乃伏如何不淑樹檟蒼蒼墓門肅肅立茲介石永表陵谷昔伊尹相湯伊陟相太戊咸有一德格于上帝其後伊籍以敏辨仕蜀為將軍伊馥以勇力佐魏為司空曠遼帛丿糸代復纘休緒者曰南充郡王諱慎字寡悔剛毅勇悍鷹揚鶚立勞勤四朝終始一心涉覽春秋戰國策太史天官五行之書用善射中鵠補廣州綏南府折衝都尉丁太夫人憂以毀瘠聞初公之孤也幼不知先子之殯將祔二尊日號於天魂交神遌肸蠁誠感壤而樹之率禮無違大歷中嶺南裨將哥舒晃盜殺其帥呂崇賁以亂竊據府中南方蕭然江西連帥路嗣恭承詔出師命將孟瑤暨公討之公以水陸士徒分道鼓行晃之謀主蘇渙騎將王明悅鴟張蟻聚皆據厄害公曰寇不可玩勝無幸焉毒之酋臘盡在是矣疾力交捽必亟吾中乃舂其喉而潰其腹斬首三千級下韶州其明年戰於把江口水道湍悍戈船趦趄公浮筏置薪迎風縱焰寇之燋沒於水火者終夕有聲又明年軍於渭口於端州於潮陽次於廣州冬十月斬晃渙於泔溪揭其首以徇幕府上功拜連州長史授撫虔江三州別駕建中初德宗訓齊萬方端正百度以梁崇義負阻江漢未嘗會朝詔東諸侯分道問罪公實領江西偏師而統於希烈希烈以牒書署公漢南漢北兵馬使公明智牢讓獨率所部兵大破翟暉於蠻水俘徒三萬以至於斬崇義平江漢厥功居多希烈愛公愈深公懼之愈切一旦決與數騎遁歸既而希烈以急變聞且賂公以堅甲善馬為之反間密詔嗣曹王即訊因俾論公如法公方握兵符在境上微聞有命斂手就召曹王挹公名義偉公姿材取酒為壽交歡感泣手疏上列辨其寃誣委之先偏激以自效乃略黃梅次長平遇劇賊韓霜露引滿中股斃於萬衆之前其徒相蹂蹈死者十七八拔蔡山取蘄州降山寇李良領蘄州刺史剖符為王加御史中丞興元巡狩之歲使臣砥貢次於蘄口時希烈已屠陷大梁遣其腹心杜少誠引徑兵絶江流公以行師七千列樹三柵破之於黃岡少誠遁走斬驍將許少華封其尸為萬人冢進圍安州希烈遣其甥劉介靈來援擊於應山生得介靈與郭嵩李廷玉降七千人收戶一萬四千人夫婦男女耕桑安堵乃督安州加御史大夫真食百室二年五月引兵攻隨走康叔夜於厲鄉獲馬牛輜重以益軍實表偽署刺史李惠登為之刺史終以理行聞十二年用久次就加右散騎常侍後三歲天子以公積功勞使中貴人持命書金印即本郡授公節度觀察使且裂齊安為支郡尋詔公兼統荊洪潭三道之兵討叛於蔡敗之於三州港營於義陽戰於申斬級千數有詔班師就加刑部尚書進右僕射今天子嗣位拜章入覲真授右僕射俄檢校左僕射兼右金吾衛大將軍坐細故退為右衛將軍明年復檢校右僕射兼右衛上將軍元和六年十二月晦寢疾薨於光福里不及懸車者二歲追錫太子太保同盟諸侯皆使其命介來弔祠視喪事明年夏五月庚申葬於萬年縣某原鹵簿騎吹如彞禮初公之曾王父皇太子通事舍人澄生左衛長史悅悅生贈太子太保衡公之祖禰也積善餘裕追崇以大惟公以武毅通文理硯席楷隸心師自得感概出倫談辭如雲起南方裨校屢陷軍陳勢若猛鷙不辭劇易急病而益裕其才履危而不昧於邪悃愊忠直為中興名將以至於授英簜題龍泉有功烈勳勞於天下脫劒薦紳從容漢廷徼循師長文武二品啓體歸全追榮宮師豈徒然哉公之息男十六人其冢嗣曰宥左領軍衛將軍押右神策軍牙門之職能率義訓以揚家聲初公來朝也詔宥以侍御史領安州刺史由二千石入管南北軍教忠移孝情禮盡在宥以鄙夫與太保同居里閈且以理命遺緘辱徵斯文表諸神道不敢誣也銘曰在殷保衡負鼎而相惟唐南充推轂為將泔溪之刑嶺表乃平蠻水之捷漢南以清蔡凶滔天曹邸鼓行公率武旅迅如風霆蘄春安陸連下劇地專城建牙宏大名器交修威懷較著功利介圭會朝脫屣師帥南宮端右武候緹騎沐浴休明保完富貴歲降婁兮月大呂一氣散兮無處所繫甲車兮馬鬣封九原夕兮閟音容楬此介石厥聲無窮
