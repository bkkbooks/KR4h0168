front:
  text: 全唐文欽定全唐文卷八百二鄴字漢藩刑部侍郎三復子咸通初擢左拾遺召充翰林學士賜進士第纍遷戶部侍郎學士承旨懿宗立以本官領諸道鹽鐵轉運使同平章事判度支轉中書侍郎兼吏部尚書僖宗立再遷左僕射出為淮南節度使徙鳳翔以疾辭還拜左僕射黃巢犯闕被害
  hash: sha256:1a5de6fbf8be9fe1467cfc9bd45924092064a7521fe8d59aab26030f8c1aa76b
  markers:
  - {type: head, offset: 12, content: 劉鄴, id: KR4h0168_NFKB_802-h1, level: 1}
body:
  text: 故崖州司戶參軍李德裕其父吉甫元和中以直道明誠高居相位中外咸理訏謨有功德裕以偉望宏才繼登台袞險夷不易徑正無㣥稟周勃重厚之姿慕楊秉忠貞之節頃以微纍竄於遐荒既迫衰殘竟歸冥寞其子煜坐貶象州邱山縣尉去年遇陛下有惟新之命覃作解之恩移授郴州郴縣尉今巳歿於貶所儻德裕猶有親援可期振揚微臣固不敢上論以招浮議今骨肉將盡生涯已空皆傷戶戈木㦸之門遽作荊榛之地骨肉未歸於塋兆一男又歿於湘江特乞聖明俯垂哀愍俾還遺骨兼賜贈官上宏録舊之仁下激徇公之節紳咸通初官司勳員外郎炯炯韋公儀形山立嶽峙爭峻陂澄莫挹霜鶴下雲綵鸞孤集始帥鍾陵家饒戶給梟鯨之後干戈遽戢蠢爾蠻陬輒窺銅柱交趾失守天威震怒嶺隅之東俾之節度士飽而歌民安如故上嘉元勳爰用作相詔旨綢繆三四陳讓莫允其祈猶勞將將鳳池之畔麟臺之上竚見徵還無勞審象天秉仁傑萃為國楨嶽則降神公膺炳靈往在元和鎮鈐洪井作民父母為國藩屏興利除害民若巳並惟昔高門實鍾餘慶追逾四紀猶傳歌詠長養成就如初踵頂奕奕武陽遺象肅莊其度金玉其安鳳凰永永耿光慰此一方士冖䂞籥元化兮風雲是資倏復像教兮爰生我師元化調兮風雲霽像教設兮師云逝誘迷化出心有時既生滅之無礙其又何悲刊金刻石門弟子捨筏忘筌其在此霖咸通中官司勳員外郎出為宣州刺史門下尚德尊賢與親親而並建崇階顯位表授受以為庸斯所以憲章堯心損益周家自家刑國徇公絶私率是而行可謝前古撫王紘生知孝弟夙稟惠和發曹植之春華詞刊枝葉體河間之秋實學洞根元况律度自持韋絃相顧不斯須以忘善不造次以違仁固可以命於典謨先其簡策馭貴式登於極品承榮允餞於上公敬而戒之無忝我高祖太宗之丕訓可開府儀同三司司空依前百官例給俸料兼令所司擇日備禮冊命主者施行若乃喻指未通昧三光於黃道齊心不動披衆妙於元關歲計方悟其有餘物理孰知其天庇今屬金行御氣張宿司辰告朔是先迎秋方始女道士某等奉為皇帝鋪陳法要啓迪真筌伏以雨潤大田雲垂多稼書稱舞羽詩詠戢戈凡當比屋之封盡沐薰絃之樂原夫襄城迷往明牧童之可求函谷知來顯至人之所得固以窅冥執有恍惚非無獨見且乖多歧復爽道之遠也庸可量哉今屬鴻雁賓秋餼羊司朔女道士某等奉為皇帝存誠香火冥懇雲天希用專精默諧禱望伏願災消中夏稔稼穡以盈箱兵息南溟鑄戈鋋而益柱然後五行皆序四維畢張歌我舜風復此周道郡地四出皆卑即阜以垣故於樓為易而賦名必著其當正據扉亦雄昈競侈由是繚步逾千方目相瞪則壯邦麗廨之勳慊在第一繁絲機羅錯卉障錦春以融獨峯揉雲雙波屹風夏以澄曉黛頻入夕蟾娟來秋以揚雲併半空冰偏一岸冬以明此概舉爾覼縷不盡也然而月話方狎竹醉始酣則防城健卒籌三而還警緒至越筵走榻彙呼族譟雖黃度展和不能不憮而斁嚮之歷舉四美悉估而倍之不足贖矣豫春至逮秋偶步池北得小亭之直上居然最勝因命植棟鬬梁出城屋之脊周方數間小亭如初而中與諸樓相差者自為一地其上則朗出高際平與空等嚮所謂越譟者不復遊慮則其四美不俟說而聞不假到而見非聞非見其然也始聞始見其嚮之未必然也且聞且見而今之所以然也嚮既舉概今不可默夫北望條風清暑之流皆偏亶攸戡莫全厥美或能伸左臂或睇右目或獨全正面揔而有諸則我無許斯又不聞不見而以其然為然矣郡以溪山著名而蹊小負則疊嶂之命為宜至於闌干榻道沙子門戶等咸有曲旨成於新致舉之則縷將煩於槩故抑之而中地亦晦而不彰咸通十二年十二月辛亥宣州刺史獨孤霖書蓋聞天下者君宏道在聖天既不違於有作道當冥助於無為今屬夏景將臨春陽已亢女道士某等奉為皇帝虔修法事恭啓至誠庶將憫雨之心冀解憂人之念伏願油雲散布膏澤遠流來觀離畢之祥已覩斯倉之兆覃此餘慶洽於可封茂多稼者惟雨司甘澤者在天永惟法道之言宜叶憂人之旨今屬旱苗方瘁膏潤不霑女道士某等奉為皇帝依教發誠循儀啓願冀由衷懇仰達上元遂使觸石未周遽聞泛灑隨風而遠俄覩雱雨水它大田既詠於豐年庶品咸康於樂業維年月日謹以清酌之奠敢昭薦於公孫帝之靈帝以雄傑之度遇雲雷之屯思翼中夏遂荒南土覽江山之積岨口心威武以鎮衛高築雉堞遂城於茲憑秋方肅殺之名厄硤口崩騰之險邦人敬仰永飾閟宮水旱之災每歲祈禱而斯應福及黎庶今大火已流商風始至時方旱暵稼穡如燔敢以精誠用祈明哲庶滂沱大霔匪夕而朝酬報之盛冀填瑤席光吳興人第進士韋岫在閩辟為從事有唐咸通辛巳歲正月壬午吳興沈光過任城題李白酒樓夫觸強者靦緬而不發乘險者帖薾而不進潰毒者隱忍而不能就其針砭搏猛者持疑而不能盡其膽勇而復視其強者弱之險者夷之毒者甘之猛者柔之信乎酒之作於人也如是翰林李公太白聰明才韻至今為天下唱首業術匡救天必賦之矣致其君如古帝王進其臣如古藥石揮直刃以血其邪者推義轂以輦其正者豈憑酒而作也憑酒而作者強非真勇太白既以峭訐矯時之狀不得大用流斥齊魯眼明耳聰恐貽顛踣故狎弄杯觴沈溺麴糵耳一雅目混黑白或酒醒神健視聽鋭發振筆著紙乃以聰明移於月露風雲使之娟潔飛動移於草木禽魚使之妍茂騫擲移於邊情閨思使之壯氣激人離情溢目移於幽巖邃谷使之遼歷物外爽人精魄移於車馬弓矢悲憤酣歌使之馳騁决發如睨幽并而失意放懷盡見窮通焉嗚呼太白觸文之強乘文之險潰文之毒搏文之猛而作狎弄杯觴沈溺麴糵是真築其聰翳其明醒則移於賦咏宜乎醉而生醉而死余徐思之使太白疏其聰決其明移於行事強犯時忌其不得醉而死生也當時骨鯁忠赤遞有其人收其逸才萃於太白至於齊魯結搆凌雲者有限獨斯樓也廣不逾數席瓦缺椽蠧雖樵兒牧豎過亦指之曰李白常醉於此矣雄咸通中官刺史茲觀隳綿歷歲時垣墉扉戶傾危潰敗十無一二荒榛蔓草扶疏蔽絶唯天尊殿略存雄仰躅真宗佩受元籙有年矣昨到郡蒞事三日謁先師廟朝紫微宮回車抵觀荒涼擁穢不可以前乃命鏟荊棘闢壞門芟夷蘊崇披剃蒙塞景移方就一徑及升殿啓伏禮真聖周環步榻僅不容足雖仙像儼羅其為鳥鼠攻毀殘穢不堪具紀於戲有以見淡泊無為之教也我國家老氏之枝葉况又元宗皇帝金真居於殿內凡曰臣下得不展敬乃亟工度木構新替壞率皆完葺築壇植柏森列左右不十旬而功就於是虹梁鴛瓦粉繪丹雘煥乎炳奕周匝垣宇真丹臺碧洞神仙之宅恍若上清之靈圃也凡一畚土一酌水率皆微俸薄祿傭功物價靡敢虧於時直然後命道侶分掌啓閉修灑掃撞鐘擊磬以時醮奠而城隅跬步瞰郭倚山下臨巨川東注溟渤青山白日目極烟樹實一郡之勝概矣將來好事君子得不繼其闕歟密思咸通時官巴陵縣令洞庭山蓋神仙洞府之一也以其洞府之庭故以是稱湖名因山自上古而然矣昔人有立湘君祠於此山因復謂之君山其廟宇為秦皇燬廢後亦久無構葺者是山去郡郭二十里而近人未嘗敢居其中按圖經此山不受穢惡無猛獸愚以為海有圓嶠蓬島之類人可望而不可至茲山垤土凹波心雲水四周人可至而不可居寧非圓嶠蓬島之亞歟固為神靈之所憑依宜矣舊俗邦人禱禜水旱嘗於此山且患廟貌靡存無展敬之所者久矣密思以咸通二年謬宰巴陵其年六月因時雨不降遂潔齊躬禱於山將涉逆波觸舟衆以為不可渡乃皆請止豫謂驕陽害稼慮困吾民豈可偷安哉因命速棹去岸俄而長飈東來委波順送帆席半掛巳及山址於是禱拜既畢舟羲棹將歸則赫日掩光元雲四集向者東風爰息西風又興舟子皆擁棹閒笑倏至邑步及縣署則甘澤溥降一夕而漲陂溢塍里巷歡呼相以為賀衆尢異者自卯及申一往一復轉風徇意如用迎送則知非至神無以動陰陽非至誠無以感靈應昭昭顯驗誠可嘉之密思由是默度於心將建祠宇會有阻而逾年未克及我使君濮陽公之來也撫此疲氓一振仁風俾俗安物泰於是得以為請因蒙敦勉之遂成茲宇其堂室圖塑皆潔而無華約而且備不悖於俗不役於民襲千古之遺跡葺一時之墜典人皆悅矣神必據之所期福我黎元壽我疆土疫癘災荒絶於境內雪霜風雨咸順其時永久無疆願顯莫忘此非獨紀建廟之微績且欲旌神靈之有徵帶礪山河唯茲乎不泯有唐咸通四年癸未五月十八日已卯朝請郎嶽州巴陵縣令李密思撰驤咸通時人有天下有祠祀有郡邑有城隍雖遍天下尚其神而未有的標名氏者多因土地以立惟袁古之城壁按漢書高帝六年春大將軍灌嬰所築先未有郡是古宜春縣城隋開皇十一年置宜春郡大業三年改為袁州因山名也移縣於州東五里古今得以灌將軍稱祀焉非賢侯安能移建其廟飾崇其禮乎夫如是所以報其固護城池而福及生人也俾其甲馬安而士卒和司局寧而官僚泰千里之內樵童牧豎農夫織婦識君臣少長之禮名儒秀士時時間出災沴不作人不夭傷此乃郡政所致亦由神之冥化也大中十二年潭廣宣洪士馬紛擾得以恣其殺戮膾人心肝貧富相易父子不相保人不聊生是歲州之小卒蟻聚欲斆四地興剽劫之心而機泄有忠者密告奸宄之事實伏法袁之人獲脫虎口之難莫不由神明之陰惠也大中十四年太守魯郡顏公遐福理斯郡公文章獨步致身高科自辭天闕恭播皇猷洎今未逾二載百穀豐萬彙蘇而疆理無事凡有艱厄未嘗不以心度更易而訪落之今則郡城丕變風化斯新公因謁神退謂人曰神之所止不宜湫隘可以高張棟宇使拜奠虔其神樂之位禱報嚴其樽俎之所公之祇敬神心如將軍在焉乃指蹤於都押衙李汾等授規模於梓匠取宏壯於曩昔汾乃目其地勢採其形勝徙舊廟之東三十步之外以咸通二年十月二十四日搆斯堂宇環廊廚院廳廡寢殿亘雄虹之長梁結棼撩以相接丹楹森布彩櫨疊施繩墨之工雅合其度實明神棲止遷革之得地也公理俗政靜商賈厚其利願投金帛以新之軍吏安其職咸請同力以成之此皆衆心之所欲也未周星而斧斤圬墁彩繢告畢蓋公之指委監蒞得人矣我公仁澤廣被何止於活凋瘵撫兆民而修創制置之蹟多矣不勞民不費公而千載規制存焉驤奉命輒敢撰列其功而不愧於詞拙所以紀其建立年月而已驤敢獻神言惟神聰明正直我公致力於神神宜饗公之德有唐二百四十五祀壬午夏六月三日記駢字千里幽州人南平郡王崇文孫自神策都虞候纍拜秦州刺史咸通中擢安南都護遷檢校工部尚書授靜海軍節度再徙交州僖宗立為劍南西川節度徙荊南乾符四年進檢校司空封燕國公討王仙芝授鎮海軍節度使諸道兵馬都統江淮鹽鐵轉運等使以功進檢校司徒徙淮南又進檢校太尉同平章事後用妖人呂用之言縱黃巢陷兩京僖宗乃以王鐸崔安代駢兵柄加駢侍中封渤海郡王光啓初李熅僭號受熅僞命三年蔡賊孫儒兵過淮口駢使畢師鐸禦之師鐸與高郵鎮將張神劍鄭漢璋等反攻揚州殺之臣聞仗鉞擁旄顯受專征之寄殿邦守土必尊共理之規冀勵節以輸忠須興利而除害伏以臣當道山河雖嶮城壘未寧秦張儀收蜀之時已曾版築隋楊秀守藩之日亦更增修堅牢雖壯於一隅周匝不過於八里自咸通十年以後兩遭蠻寇攻圍數萬戶人填咽共處池泉皆竭熱氣相蒸其苦可哀斯弊可恤臣前年赴任之日才過劍門料蠻賊奔逃不敢回顧先遣走馬入府放出城內戶人莫不歡呼稱見蘇息臣今欲與民防患為國遠圖廣築羅城以示雄閫將謀永逸豈憚暫勞臣深受國恩實思忠藎儻允所奏乞宣付宰臣僉議西川境邑南詔比鄰頻遭蠻蜒之侵凌益以墻垣之湫隘寇來而士庶投竄只有子城圍合而閭井焚燒更無遺堵且百萬衆類多少人家萃集子城可知危敝井泉既竭溝池亦乾人氣相蒸死生共處官僚暴露老幼飢悽但言牢城未敢出戰貨財而豈能般輦商旅而空懷怨嗟兼是戎兵同行剽劫賊路不能控扼軍營罕習干戈遂使蒸黎枉遭塗炭臣初到統押便與經營平夷鎮之隄防焉能跋涉大渡河之把截誰敢過從然須更議遠圖以防後患嚴設武備廣築羅城雄壯三川保安千載使寇孽遮圍而不遍軍戎隈倚而無疑旋奉詔書令臣參酌許興版築冀盛藩維遂乃相度地形揣摩物力不思費耗只繫安危趣十縣之人丁抽八州之將校分其地界授以城基運土囊而子來持石杵而雲集大興畚鍤廣修資糧五千堵之周回川中捍敵百萬人之築起空裏巍峩日居月諸功成事立金湯既設鐵甕如堅控地道之莫能徒云入寇縱雲梯之強立無計登陴白露屋之凌空躋攀莫及青城山之對峙形勢不如擁門之扃鎖堅牢曲角之規模周密壕深莫跨壁峻難攻外邊睥睨之崇高內面欄杆而固護獸頭帖出鴈翅排成覆瓦烟青甃磚苔碧縱蠻再至無計重圖此皆仗陛下之睿謀使微臣之創制鬼神扶助社稷庇庥臣限以守鎮不獲奔詣闕廷無任踴躍屏營之至謹畫圖差副使中散大夫內謁賜紫金魚袋楊德章節度判官朝議郎檢校尚書兵部郎兼御史中丞賜紫金魚袋裴峴等奉進以聞人牽財利石陷衡津才登一去之舟便作九泉之計今若稍加疏鑿以導往來貨殖貿遷華戎利涉奉敕抽發長武鄜州河東等道兵士赴劍南行營者伏以西川新軍舊軍差到已衆况蠻蛋小醜必可枝梧今以道路崎嶇館驛窮困更有軍頓立見流移所謂望一處完全而百處俱破且兵不在衆而在於和其左右神策長武鎮鄜州河東所抽甲馬兵士人數不少况備辦軍食費損尢多又緣三道藩鎮盡扼羌戎邊鄙未寧望不差發如己在道路並請降敕勒回我大唐聖皇帝德配二儀光齊兩曜仁霑動植聖役神龍煦萬國若青天養兆民同赤子東鄰弱水西屇流沙北通陰山南抵銅柱莫不貢琛而納賮航海而梯山請混車書願為臣妾是知卑微螢耀不敢並於太陽齷齪蹄涔焉能踵於神驥且自九彞八狄七戎六蠻雖居要荒盡尊中國縱外夷驕倨豈中國等倫且以蠓蚋之飛騰不離溝瀆欲追鸞鳳之羽翼擬接熛霄雲南頃者求合六詔併為一藩與開道途得接卭蜀賜書習讀降使交歡禮待情深招延意厚傳周公之禮樂習孔子之詩書片言既知大恩合報復窮兵再犯朗寧重陷交址兩俘卭蜀一劫黔巫城池皆為灰燼士庶盡為幽寃轉恣胸襟罔知悛革吞越巂之舊地圍相如之故城凌犯不休貪殘轉甚昔交址都護不間理兵朗寧元戎未解誅寇受以侵欺容其殘暴某比者親征海裔克復龍編駕三千之師勦十萬之寇南定縣全軍陷沒如乾鎮匹馬不回羅和一空嘉寧俱盡贊衛假酋遷斬首騎將麻光亮亡軀李善龍面縛軍前張詮生擒陳上沈白衣歿命之衆如赤日消冰殺朱弩佉苴之軍若紅爐焰雪諾眉就戮思縉自裁董譯龍之悽惶范昵些之窘沮江橋則盡底焚燒采筏則從頭覆沒波封瓦解扶耶大隳容易誅鋤若高原之縱燎等閒撲滅如順阪之走丸收復城池掃殄妖孽仗睿謀之果斷資神術而追擒掩韓信滅趙之功吞樂毅定齊之策其於勝負詔國同知昨日來鎮西川移徙汾水仗節單車大開城門放出人物固無疑阻直擬誅鋤前詔王遣張棟成等揚言和好身才入境兵已繼來侵欺大國熒惑元戎戮僕之儀須依古典已軍令處置詔國前後俘獲約十萬人今獨送杜驤妻言是沒落杜驤守職本在安南城陷驅行故非沒落星霜半代桎梏幾年李氏偷生空令返國杜驤早歿不得還鄉今則訓練蕃兵指揮漢將鐵衣十萬甲馬五千雍交合從黔蜀齊進昔時漢相有七擒七縱之功今日唐臣蘊百戰百勝之術勳名須立國史永書且杜驤官銜李瑤門地不是親近但王室疏宗天枝遠派而已李氏並詔國木夾並差人押領進送朝廷是故牒途咸通三年官歙州司馬縣西南一十三里溪名閶門有山對聳而近因以名焉水自嶂積石而下通於鄱陽合於大江其濟人利物不為不至矣其奔流激注巨石硉矹騰沸汹湧瀺灂圓折凡六七十里舟航勝載不計輕重篙工楫師不計勇弱其或濟者若星馳矢逝脫或蹉趺必溺灣旋中俄頃沒跡矣邑之編籍民五千四百餘戶其疆境亦不為小山多而田少水清而地沃山且植茗高下無遺土千里之內業於茶者七八矣由是給衣食供賦役悉恃此祁之茗色黃而香賈客咸議愈於諸方每歲二三月齎銀緡繒素求市將貨他郡者摩肩接迹而至雖然其欲廣市多載不果遂也或乘負或肩荷或小轍而陸也如此縱有多市將泛大川必先以輕舟寡載就其巨艎蓋是閶門之險元和初縣令路君常患之聞於太守故光祿大夫范卿因修作斯處其後商旅知不履閶門果竟至籍戶繇是為之泰其來巳五十五載矣元和咸通伏臘相遠閶門始廢之時功未甚至猶利於人且久長慶中縣令王迅曾略見舊址蓋茶務委州縣貴暫邀商賈而巳今則穎川陳甘節為祁門一年而政成孜孜求閭里之患果得閶門溪焉乃速詣目擊險狀吁可畏也必期改險阻為安流回激湍為澄碧乃録其始製之實聞於太守清和崔公自請以俸錢及茶羡利充市木石之用因召土客商人船戶接助夫使咸適其願無差役之患無箕斂之弊公悅而從之自咸通元年夏六月修至三年春二月畢穴盤石為柱礎巨木為橫梁其高一丈六尺長四十丈濶二十尺堰之左俯崇山作派為深渠導溢流回注於乾溪既高且廣與往製不相侔矣甃石疊木溯流安逝一帶傍去滔滔無滯馴鷗戲魚隨波沈浮不獨賈客巨艘居民業舟往復無阻自春徂秋亦足以勸六鄉之人業於茗者專勤是謀衣食之源不慮不憂夫如是有以見清河公求理誠至苟非良邑長不可以佐理穎川君臨事必專苟非賢太守不可以立事其作用堅固永久與山川齊途寓於郡下嘗遊茲邑頗熟本末因得以記咸通三年秋七月十八日歙州司馬張途述瓚咸通四年官中書舍人知制誥朕體至公以御極推至理以臨人舉必任才黜皆由過二者之命吾何敢私中散大夫守左散騎常侍權知禮部貢舉上柱國賜紫金魚袋蕭倣早以藝文薦升華顯清貞不磷介潔無徒居多正直之容動有休嘉之稱近者擢司貢籍期盡精研既紊官常頗興物論經詢大義去留或致其紛拏榜掛先場進退備聞其差互且昧泉魚之察徒懷冰孽之憂豈可上列貂蟬復延騎省俾分郡牧用示朝章勿謂非恩深宜自勵可守蘄州刺史散官勳賜如故仍馳驛赴任去疾咸通時人公諱訥字含章澤州高平人也曾祖諱庭大父諱遷先考諱冥公志堅松竹氣稟山河踐闕三字蹤差顏閔之行十年閉戶命果從人以大中十二年明經擢第當守選時潛修拔萃虛窗弄筆研幾自愧於雕蟲豫奪在心可否詎由乎甲乙於咸通四年授棣州蒲臺縣尉以博厚御物清白奉公執友同寮罔不仰止仕優則學前懇尚堅秩滿辭親方希再捷豈期神理何負殲我良人如可贖兮人百其命以咸通六年夏四月草六日寢疾終於蒲臺縣之官舍闕一字子春秋卅有九夫人清河張氏恨無男嗣幼女三人苫廬不施苴杖序位噫蓼莪永訣俱切痛天風悲繐帷月照空室㷀㷀在疚仰訴元穹聲聚秋雲淚滴成血乃議遠日龜以告從即以其年冬十一月八日奉其裳帷歸窆於青州永固原就先塋禮也銘曰惜乎勤勤兮罔不精研名宦俱就兮壽胡不延風悲雲靉兮星霣遊川孀妻幼女兮號訴穹天遺命薄葬兮窆節從古勒石徵志兮依土封埏永願明虛兮保寧幽宅不遐有害兮於萬斯年就咸通朝歷官司勛司封員外郎戊子歲大彭戍卒有在南方者一旦衆譁於營刃殺主將不待朝廷命卷旗而歸既至所止即共樹小吏以張大凶天子震怒徵諸侯師以討之常時挾刃為盜匿蔽榛莽者咸來附離叶拒王師而睢陽最與賊近忽剽攘不徇志必縱火大爇傳置尺椽盡為餘燼時隴西公以重望鎮諸方徵師悉出其地供億大費不煩朝廷而又戒嚴壘門賊馬首不敢西向我季父貂蟬適守睢陽大軍頓其所資糧餽餉且靡闕一毫明年九月賊平我公念鴈池洎會亭五郵前為賊熾焰所滌况沿河旁午豈可使厦屋不修乃劂材孱工未數月而畢其創匠輪奐為客館之甲君子以為非我隴西公大才不能當劇賊非我季父稱事不能新郵亭宜乎礱石刻文聲其美績就久奉隴西公命牢讓不免其敘事也質而直微而簡俾後之為政者識我季父之多能咸通庚寅年秋七月記彥昭字思文清河人第進士歷辟使府咸通中纍進戶部侍郎河陽節度使徙河東僖宗立授兵部侍郎諸道鹽鐵轉運使同中書門下平章事拜尚書右僕射太子太傅當司應收管江淮諸道州府咸通八年已前兩稅榷酒及昔支米價并二十文除陌諸色屬省錢准舊例逐年商人投狀便換自南蠻用兵已來置供軍使當司在諸州府場監錢猶有商人便換齎省司便換文牒至本州府請領皆被諸州稱准供軍使指揮占留以此商人疑惑乃至當司支用不充乞下諸道州府場監院依限送納及給還商人不得託稱占留慎思字虔中長樂人咸通中進士復中宏詞科歷校書郎水部郎中萬年縣令黃巢入長安迫以僞官不屈罵賊死豫沽名未售退棲槐里著儒範七篇辭艱理僻不為時人所知復研精覃思一旦齊沐禱心靈是宵夢有異焉明日召蓍祝之得蒙之觀曰伸蒙入觀通明之象也因感而有所述焉自號伸蒙子嘗與二三子辨論興亡敷陳古今也或引事以明理或摛才以潤辭録近萬言編成上中下三卷上卷槐里辨三篇象三才敘天地人之事中卷澤國紀三篇象三人敘君臣人之事下卷時喻二篇象二教敘文武之事焉豫所學周公仲尼之道所言堯舜禹湯文武之行事也如有用我者吾言其施吾學其行乎昔揚雄謂後世有揚子雲當知吾太元安知後世不有林虔中者出吾言迂乎哉大唐咸通六年二月四日長樂林慎思虔中自序孟子書先自其徒記言而著豫所以復著者蓋以孟子久行教化言不在其徒盡矣故演作續孟虔瓘宣武軍節度使宏正子登進士第為括州刺史終祕書監至靈之精大道之淵其朴靡散其神則全嗟夫世人嗜欲馳役故使元昭莫留瞬息惟師恬泊萬慮泯泯豈有一物能奸至真伊厥形氣尚資蛻捨胡為神人土偶為者返一無迹神之又神遺此塑像非先生之真不存此身出有入無莫與之神知言太和咸通間人夫人立身之本以道德修術固益肌體為先少年之盛豈顧後衰况人稟三才之貴圓首方足悉符天地之形不可以自輕失也知言丱角之年棲心於道昔太和初於霅苕之上遇道士馬自然示余祕訣兼元通如意丸五解之法知言顧慚幽陋罔測元機時於其間人寰採補延生往往得其一二洎咸通五年春之淮南有故友滎陽鄭公示余神丹諸家祕要皆是濟世治療人間一切諸疾延駐之門并制伏五金八石點變造化辟除寒暑絶粒休糧或箭鏃入肉取不去者不限年月深遠點摩丹藥其鏃自出有造化之神功在三卷之內好道後學覽之必瑩心駭目其於伏火金石靈丹備在卷中知言輒編次之勒成上中下三卷號曰通元祕術以奉好尚君子養生之本將貽同志幸勿輕傳耳
