front:
  text: 全唐文欽定全唐文卷七百五十二杜牧五
  hash: sha256:9529353783cee7693c7046da52c7761496a9e32c3f66be1423269287e6476a05
body:
  text: 某再拜伏以大儒在位而未有不知兵者未有不能制兵而能止暴亂者未有暴亂不止而能活生人定國家者自生人已來可以屈指而數也今兵之下者莫若刺伐之法詩大雅維清奏象舞之篇曰維清緝熙文王之典迄用有成維周之禎象者象武王伐紂刺伐之法此乃文王受命受殷王專征之命也七年五伐留戰陳刺伐之法遺之武王武王用以伐紂而有天下致之清平為周家之禎祥周公居攝祀文武於清廟作此詩以歌舞文武之德其次兵之尤者莫若鉤援衝壁今之一卒之長不肯親自為之詩大雅周公皇矣美周之詩曰以爾鉤援與爾臨衝以伐崇墉臨衝間間崇墉言言此實文王伐崇墉傅于其城以臨車衝鉤援其城文王親自為之夫文王何人也周公詩之夫子刪而取之列於大雅以美武王之功德手絃而口歌之不知後代之人何如此三聖人安有謀人之國有暴亂橫起戎狄乘其邊坐於廟堂之上曰我儒者也不能知兵不知儒者竟不可知兵乎竟可知兵乎長慶兵起自始至終廟堂之上指蹤非其人不可一二悉數高宗朝薛仁貴攻吐蕃大敗於大非川仁貴曰今年歲在庚午不當有事於西方此乃鍾鄧伐蜀身誅不返昨者誅討黨羌徵關東兵用於西方是不知天道也邊地無積粟師無見糧不先屯田隨日隨餉是不知地利也兩漢伐虜騎兵取於山東所謂冀之北土馬之所生馬良而多人習騎戰非山東兵不能伐虜昨者以步騎百不當一是不知人事也天時地利人事此三者皆不先計量短長得失故困竭天下不能滅朴木敇之虜此乃不學之過也不教人戰是謂棄之則謀人之國不能料敵不曰棄國可乎某所注孫武十三篇雖不能上窮天時下極人事然上至周秦下至長慶寶歷之兵形勢虛實隨句解析離為三編輒敢獻上以備閲覽少希鑑悉苦心即為至幸伏增惶惕之至某頓首再拜某頓首再拜自去歲前五年執事者上言云科第之選宜與寒士凡為子弟議不可進熟於上耳固於上心上持下執堅如金石為子弟者魚潛鼠遁無入仕路某竊惑之科第之設聖祖神宗所以選賢才也豈計子弟與寒士也古之急於士者取盜取讐取於夷狄豈計其所由來况國家設取士之科而使子弟不得由之若以科第之徒浮華輕薄不可任以為治則國朝自房梁公已降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名不令得美仕則自堯已降聖人賢人率多子弟凡此數者進退取捨無所依據某所以憤悶而不曉也堯天子子也禹公子也文王諸侯孫與子也武王文王子也周公文王之子武王之弟也夫子天子裔孫宋公六代大夫子也春秋時列國有其社稷各數百年其良臣多出於公族及卿大夫子孫也魯之季友季文子叔孫穆子叔孫昭子孟獻子皆出於三桓也臧文仲武仲出於公子彄柳下惠出於公子無駭諸侯之子稱公子公子之子稱公孫公孫之子稱公族以王父字為氏展禽是也宋之良臣多出於戴桓武莊之族也舉其尤者華元子罕向戌是也衛之良臣亦公族及卿大夫之裔也舉其尤者公子荊公叔發公子朝皆公族也子鮮公子也史狗史魚武子卿大夫之裔也齊之晏嬰晏桓子子也曹之子臧公子也吳之季札王子也鄭之良臣皆公孫公族也舉其尢者子封子良子罕子展子皮子産子張子太叔是也楚之良臣子囊子西子期皆王子也子庚王孫也其卿大夫之裔鬬氏生令尹子文後有鬬辛鬬巢鬬懷昭王反國皆有大功蒍氏生蒍賈孫叔敖薳啓疆薳子憑薳掩薳罷屈氏生屈蕩屈到屈建六國時有昭奚恤公族也屈原諸屈後也皆其祖先於武王文王時基楚國為霸者用其子孫其社稷垂九百餘年至於晉國最為強其賢臣尤多有趙氏魏氏韓氏狐氏中行氏范氏荀氏羊舌氏欒氏卻氏祁氏其先皆武公獻公文公勤勞臣也用其子弟召諸侯而盟之者僅三百年在六國齊之孟嘗趙之平原魏之信陵皆王子王孫也齊復有司馬穰苴亦王族也其在漢魏已下至於國朝公族之子弟卿大夫之胄裔書於史氏為偉人者不可勝數不知論聖賢才能于子弟中復何如也言科第浮華輕薄不可任用則國朝房梁公元齡進士也相太宗凡二十一年為唐宗臣比之伊呂周召者郝公處俊亦進士也為宰相時高宗欲遜位與武后處俊曰天下者高祖太宗之天下非陛下之有但可傳之子孫不可私以與后高宗因止來濟上官儀李元義皆進士也後為宰相濟助長孫太尉褚河南共摧武后者後突厥入塞免胄戰死儀革廢武后召元義助處俊言不可以位與武后婁侍中師德亦進士也吐蕃強盛為監察御史以紅抹額以猛士詔躬衣皮袴率士屯田積穀八百萬石二十四年西征兵不乏食薦狄公為相取中宗於房陵立為太子漢陽王張公柬之亦進士也年八十為相驅致四王手提社稷上還中宗郭代公元振亦進士也鎮涼州僅十五年北卻突厥西走吐蕃制地一萬里握兵三十萬武氏惕息不敢移唐社稷魏公知古亦進士也為宰相廢太平公主謀以佐元宗及卒也宋開府哭之曰叔向古之遺直子産古之遺愛兼而有者其魏公乎姚梁公元崇登第下筆成章舉首佐元宗起中興業凡三十年天下幾無一人之獄宋開府璟亦進士也與姚唱和致開元太平者劉幽求登制策科與元宗徒步誅韋氏立睿宗者蘇氏父子皆進士也大許公為相於武后朝酷吏中不失其正於中宗朝誅反賊鄭普思於韋后黨中小許公佐元宗朝號為蘇宋張燕公説登制策科排張易之兄弟贊睿宗請元宗監國竟誅太平公主招置文學士開內學館元宗好書尚古封中太山祀后土因燕公也張曲江九齡亦進士也排李林甫牛仙客罵張守圭不斬安祿山謫老南服年未七十張巡亦進士也凡三入判等以兵九千守睢陽城凡周歲拒賊十三萬兵出天寶雜記使賊不能東進尺寸以全江淮元和中宰相河東司空公中書令裴公皆進士也裴公仍再得宏辭制策科當貞元時河北叛齊蔡亦叛階此蜀亦叛吳亦叛其他未叛者皆高下其目熟視朝廷希嚮強弱而施其所為司空公始相憲宗廢權幸之機牙令不得張收斂百職歸於有司命節度使出朝廷不由兵士始自撫州除袁相為滑州凡三月無帥三軍無事憲宗始信之自此不用貞元故事以行軍副使大將軍為節度使拔取沉滯各還其官開州取唐舍人為職方郎中知制誥饒州取李趙公為考功郎中知制誥在貞元中皆十餘年遷逐其他似謫者亦皆當敘用也然後西取蜀東取吳天下仰首始見白日裴公撫安魏博使田氏盡歸六州元和中翦蔡劇賊於洛師脅下招來常山質其二子以纍其心取十三城使不得與齊交手為寇因誅師道河南盡平當是時天下幾至於太平凡此十九公皆國家與之存亡安危治亂者也不知科第之選復何如也至於智效一官忠立一節德行文學不可悉數董生云春秋之義變古則譏之傅説命高宗曰監於先王成憲其永無愆故殷道復興鴻雁美周宣王能復先王之道西漢魏相佐漢宣帝為中興但能奉行漢家故事姚梁公佐元宗亦以務舉貞觀之法制耳自古及今未有背本棄古而能致治者昨獲覽三郎秀才新文凡十篇數日在手讀之不倦其旨意所尚皆本仁義而歸忠信加以辭彩遒茂皎無塵土况有誠明長厚之譽於千人中儻使前五六年得進士第今可以出入諫官御史助明天子為治矣古人云三月不仕則相弔安有凡五六年來選取進士施設網罟如防盜賊言子弟者噎啞抑鬱思一解布衣與下士齒厥路無由於古未前聞也某因覽三郎文章不覺發憤略言大概干觸尊重無任惶懼某再拜某入仕十五年間凡四年在京其間臥疾乞假復居其半嗜酒好睡其癖已痼往往門下戶便經旬日弔慶參請多亦廢闕至於俯仰進趨隨意所在希時徇勢不能逐人是以官途之間比之輩流亦多困躓自顧自念守道不病獨處思省亦不自悔然分於當路必無知已默默成戚守日待月冀得一官以足衣食一自拜謁門館似蒙獎飾敢以惡文連進機案特遇采録更不因人許可指教實為師資接遇之禮過等詢問之辭悉纎雖三千里僻守小郡上道之日氣色濟濟不知沉困之在已不知升騰之在人都門帶酒笑別親戚斯乃大君子之遇難逢世途之不偶常事雖為遠宦適足自寬某世業儒學自高曾至於某身家風不墜少小孜孜至今不怠性顓固不能通經於治亂興亡之迹財賦兵甲之事地形之險易遠近古人之長短得失中丞即歸廊廟宰制在手或因時事召置堂下坐之與語此時回顧諸生必期不辱恩獎今者志尚未泯齒髮猶壯敢希指顧一罄肝膽無任感激血誠之至某恐懼再拜某疏愚怠惰不識機括獨好讀書讀之多矣每見君臣治亂之間興亡諫諍之道遐想其人舐筆和墨則冀人君一悟而至於治平不悟則烹身滅族唯此二者不思中道自秦漢已來凡千百輩不可悉數然怒諫而激亂生禍者纍纍皆是納諫而悔過行道者不能百一何者皆以辭語迂險指射醜惡致使然也夫迂險之言近於誕妄指射醜惡足以激怒夫以誕妄之説激怒之辭以卑凌尊以下干上是以諫殺人者殺人愈多諫畋獵者畋獵愈甚諫治宮室者宮室愈崇諫任小人者小人愈寵觀其旨意且欲與諫者一鬬是非一決怒氣耳不論其他是以每於本事之上尤增飾之今有兩人道未相信甲謂乙曰汝好食某物慎勿食果食之必死乙必曰我食之久矣汝謂我死必倍食之甲若謂乙曰汝好食某物第一少食苟多食必生病乙必因而謝之減食何者迂險之言則欲反之循常之説則必信之此乃常人之情世多然也是以因諫而生亂者纍纍皆是也漢成帝欲御樓船過渭水御史大夫薛廣德諫曰宜從橋陛下不聽臣自刎以血汚車輪陛下不廟矣不得入廟祠也上不説張猛曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是邪謂諫諍之言當如猛之詳善乃從橋近者寶歷中敬宗皇帝欲幸驪山時諫者至多上意不決拾遺張權輿伏紫宸殿下叩頭諫曰昔周幽王幸驪山為犬戎所殺秦始皇葬驪山國亡元宗皇帝宮驪山而祿山亂先皇帝幸驪山而享年不長帝曰驪山若此之凶邪我宜一往以驗彼言後數日自驪山回語親幸曰叩頭者之言安足信哉漢文帝亦謂張釋之曰卑之無甚高論令可行也今人平居無事朋友骨肉切磋規誨之間尚宜旁引曲釋亹亹繹繹使人樂去其不善而樂行其善况於君臣尊卑之間欲因激切之言而望道行事治者乎故禮稱五諫而直諫為下前數月見報上披閣下諫疏錫以幣帛辟左且遠莫知其故近於遊客處一睹閣下諫草明白辨婉出入有據吾君聖明宜為動心數日在手味之不足且抃且喜且慰三者交并不能自止吾君聞諫既且行之仍復寵錫誘能諫者斯乃堯舜禹湯文武之心也聞於遠地宜為吾君抃也閣下以忠孝文章立於朝廷勇於諫而且深於其道果能輔吾君而光世德某蒙閣下之厚愛冀於異時資閣下之知以進尺寸能不為閣下之喜復自喜也吾君今日披一疏而行之明日聞一言而用之賢才忠良之士森列朝廷是以奮起志慮各盡所懷則文祖武宗之業窮天盡地日出月入皆可灑掃以復厥初某縱不得效用但於一官一局筐篋簿書之間活妻子而老身命焉作為歌詩稱道仁聖天子之所為治則為有餘能不自慰故獲閣下之一疏抃喜慰三者交并真不虛也宜如此也無因面讚其事書紙言誠不覺繁多某再拜某頓首再拜某年二十六由校書郎入沈公幕府自應舉得官凡半歲間既非生知復未涉人事齒少意鋭舉止動作一無所據至於報效施展朋友與遊吏事取捨之道未知東西南北宜所趨向此時郎中六官一顧憐之手攜指畫一一誘教丁寧纎悉兩府六年不嫌不怠使某無大過而粗知所以為守者實由郎中之力也去歲乞假路由漢上員外七官以某嘗獲知於郎中惠然不疑推置於肺肝間某恃郎中之知亦敢自道其志公私謀議各悉所懷一俯一仰如久而深者久欲資郎中員外之為階級遠干尊重欲望收恤舐筆伸紙以復踰於三四因曰既階級矣步欲升堂與排闥而入者事不同日式微詩曰何其處也必有與也言必有仁義與我所以處而不去也進退計忖不宜得罪今敢謹寫所為文十四首編為一卷繼進於後愛之不倦為之不已不至於工今以為獻無任慙惶然特為進説之端非敢因此求知不勝攀戀惕懼之至某再拜某啓伏以聖主垂衣太尉當軸威德上顯和澤下流諸侯無異心百姓無怨氣星辰順靜日月光明天業益昌聖統無極既功成而理定實道尊而名垂今則未聞縱東山之遊樂後園之醉惕惕若不足兢兢而如無豈不以邊障尚驚殊虜未殄防其入寇猶須徵兵伏以回鶻種落人數非多校於突厥絶為小弱今者國破衆叛逃來漠南為羈旅之魂食草萊之實白鬣驪騂之騎凋耗巳無湩酪皮毳之資飢寒皆盡寄命雜種藏迹陰山取之及時可以一戰今者度虜之計不出二者時去時來回翔不決必有所在西戎巳得要約伺其氣勢同為侵擾此其一也心膽破壞馬畜殘少且於美水薦草暖日廣川牧馬養習以俟強大此其二也今者徵中國之兵與之首尾久戍則有師老費財之憂深入則有大寒瘃墮之苦示戎狄之弱生姦傑之心今者不取恐貽後患敢以管見上干尊重自兩漢伐虜皆是秋冬不過百日驅中國之人入苦寒之地此時胸奴徑弓折膠童馬免乳畜肥草壯力全氣盛與之相校勝少敗多故胸奴云漢實大國也但其人不能辛苦爾此所謂避虛而擊實逃短而攻長至於後魏崔浩因見其理蠕蠕強盛屢犯北邊浩請討之曰蠕蠕恃其地遠自寬巳久故夏則散衆放畜秋肥乃聚背寒向暄南來寇抄今出其慮表掩其不備大兵卒至必驚駭星分向塵奔走牡馬護牧牝馬戀駒驅馳難制不得水草未過數日則聚而困斃可一舉而滅矣武帝從之及軍入境蠕蠕先不設備民畜布野驚怖四奔莫相收攝於是分軍撲討東西五千里南北三千里凡所俘虜及獲畜産彌漫山澤高車因殺蠕蠕積類歸降者三十餘萬落虜遂散亂帝沿弱水西行至涿邪山諸大將慮深入恐有伏兵勸帝停止不追浩先勸窮追之不從後聞涼州賈胡言若更前行三日則盡滅之矣帝深恨之以某所見今若以幽并突陳之騎酒泉教射之兵整飭誡誓仲夏潛發計陰山與涿邪之遠近十不一二校蠕蠕回鶻之強弱猶如虎鼠五月節氣在中夏則熱到陰山尚寒中國之兵足以施展行軍於枕席之上玩寇於掌股之間軏轠懸瓶湯沃晛雪一舉無疑必然之策今冰合防秋冰銷解戍行之已久虜為長然出其意外實為上策議者或云北取黠戛令討回鶻伏以黠戛起於別種超為可汗必是英傑天時必助賢才必用法令必明滅回鶻之後便是勍敵况示之以弱必為所輕今者四海九州同風共貫諸侯用命年穀豐熟可以瘞元玉於常山孑遺人於河壠顧茲疲虜豈遺子孫伏惟太尉相公文德素昭武功復著畫地而兵形盡見按璅而邊事無遺唯一指蹤即可掃迹昔漢武帝之求賢也有上書不足採者輒報罷去未嘗罪之故能羈越臣胡大興禮樂今太尉與仁聖天子同德有志之士無不願死伏惟特寬狂狷不賜誅責生死榮荷無任感恩攀戀惶懼汗栗之至謹啓某啓伏以上黨之地肘京洛而履蒲津倚太原而跨河朔戰國時張儀以為天下之脊建中日田悅名曰腹中之眼帶甲十萬籍土五州太行夷儀為其扃關健馬強弓為其羽翼自逆黨專有僅及一世頗聞教育實曰精強昨者凶專地之請初陳聖主整旅之詔將下中外遠邇皆疑難攻蜂蠆螳蜋頗亦自負伏惟相公上符神斷潛運廟謨仗宗社威靈䘪風雲雷電掌上必取彀中難逃才逾周星果梟逆首周公東征之役捷至三年憲皇淮夷之師克寸聞四歲校虜寇之強弱曾不等倫考攻取之敗亡何至容易若非睿算英略借筯深謀比之前修一何遠出自此鞭笞反側灑掃河湟大開明堂再振儒校窮天盡地皆為壽域之人赤子秀眉共老止戈之代某謬分符竹實由恩知慶快歡抃之誠倍百常品不宣謹啓某啓伏維相公上佐聖主獨專魁柄封殖良善修整紀綱練㣥臣謹百職考功績核名實大張公室盡閉私門盛德大功直筆實光於簡策清節細行祝史不愧於神明天下望之為準繩朝廷倚之為依據畢公克勤小物周公煥發大猷邴吉陋案吏於公庭袁安不錮人於聖代衛將軍有長揖之客張子儒無謝恩之人吉甫率由舊章魏相能明故事房杜不以求備取人不以已長格物姚梁公先有司修舊法下位各得言其志百司各得盡其才求於古人之賢皆集相公之德如以尺量刀解粉布墨畫大小銖黍丸角尖缺各盡其分皆當其任是以庶人不議鄉校無言天下欣欣若更生者自此黃髮之老待哺之子不見兵戈不離抱撫清廟之祭四夷來助蒼生之願百志皆成禺禺萬方實懸斯望某遠守僻左無因起居但採風謠亦能歌詠無任攀戀激切之至謹啓某啓伏奉三月八日敕除尚書司勳員外郎史館修撰承命榮懼啓處無地伏以聖主順上帝之則率四海以仁神化風行家至日見古先哲王之德也有求必至有開必先是以傅呂得於夢卜申甫降於山嶽伏惟相公待主乃用為時而生當考室搆厦之時膺篤繩削墨之任贊俊傑遂賢良調陰陽提紀律類能而使度材授官常切如家之憂每懷撻市之恥是以朝廷禮樂天下清明人不凋傷神不怨悵萬物由道百度皆貞雖周獲仁人商得元哲夢卜降嶽之得豈能逾焉某朴木敇之才糞朽之賤遭逢盛業三帶郡符自審事宜實以逾忝伏以睦州治所在萬山之中終日昏氛侵染衰病自量忝官已過不敢率然請告唯念滿歲得保生還不意相公拔自汚泥升於霄漢郤收斥錮令厠班行仍授名曹帖以重職當受震駭神魂飛揚撫已自驚喜過成泣藥肉白骨香返遊魂言於重恩無以過此雖買臣懷紱郡邸蕭育召拜扶風楊僕三組垂腰蘇秦六印在手校於榮忝無以為踰言念微生難酬殊造伏以相公自數載已來朝廷舊老四海俊賢皆因提挈盡在門館毗輔聖主巍為元勳自有明神以相百祿顧唯賤末報效無門感激血誠涕淚迸溢無任攀戀激切懇款之至謹啓某啓某比於流輩一不及人至於讀書為文日夜不倦凡諸所為亦未有以過人至於會昌三年八月中所獻相公長啓鋪陳功業稱校短長措於史記兩漢之間讀於文士才人之口與二子並無愧容伏恐機務殷繁不暇省覽今者竊敢再録啓本重干尊嚴付於史館而不誣懸於後代而不泯其於取重豈在小人復敢別録所為新舊文兩卷凡一十九首上陳視聽一希鐫琢重疊過越惶懼伏深伏惟照察謹啓昨日所啓言韓拾遺事非與韓求衣食救飢寒也御史亦豈為救飢寒之官乎中丞必曰大梁奏取韓以救飢寒何不去夫幕吏乃古之陪臣以人為北面雖布衣無恥之士亦宜訪其樂與不樂况有恥之君子乎韓以旅寓洛中非不樂汴也不甘不告之請耳韓及第後歸越中佐沈公江西宣城府罷唐扶中丞辟於閩中罷府歸路由建州妻與元晦同高祖扶惡晦為人不省之及晦得越乃棄産避之居常州殷儼者仰韓之道自閩寄百縑遺之及門不開書函而斥去之某比兩府同院但見其廉慎高潔亦未知其道太和八年自淮南有事至越見韓居於境上三畝宅兩頃田樹蔬釣魚唯召名僧為侶餘力究易嬉嬉然無日不自得也未嘗及身名出處之語未嘗入公府造請與幕吏宴遊因此不為搢紳所相見禮蕭高二連帥至即日造其廬詢其政事稱先人梓材有文學高名沒於越之府幕故不願復為越賓及高至許下厚禮辟之其為人也貞潔芳茂非其人不與遊非其食不敢食蕭舍人考功崔員外是趨於韓交者某復趨於蕭崔二君子者即韓之去某其間不啻容數十人矣某安得知其賢而言之復不僭乎伏恐中丞謂韓求官以衣食干交朋者中丞初在憲府固宜慎選御史御史固非救飢寒之官某久承恩知但欲薦賢於盛時雖至淺陋亦知不可以交友飢寒求清秩以干大君子者伏恐未審誠懇故此具陳本末伏惟照察謹啓某啓某少小好為文章伏以待郎文師也是敢謹貢七篇以為視聽之汚伏以元和功德凡人盡當詠歌紀敘之故作燕將録往年弔伐之道未甚得所故作罪言自艱難來以卒伍傭役輩多據兵為天子諸侯故作原十六衛諸侯或恃功不識古道以至於反側叛亂故作與劉司徒書處士之名即古之巢由伊呂輩近者往往自名之故作送薛處士序寶歷大起宮室廣聲色故作阿房宮賦有廬終南山下嘗有耕田著書志故作望故園賦雖未能盡窺古人得與揖讓笑言亦或的的分其壯貌矣自四年來在大君子門下恭承指顧約束於政理簿書間永不執卷上都有舊第唯書萬卷終南山下有舊廬頗有水樹當有耒耜筆硯歸其間及髮齒甚壯冀有成立他日捧持一遊門下為拜謁之先或希一獎今者所獻但有輕黷尊嚴之罪亦何所取伏希少暇誅責生死幸甚謹啓某啓某苦心為詩惟求高絶不務奇麗不涉習俗不今不古處於中間既無其才徒有其意篇成在紙多自焚之今謹録一百五十篇編為一軸封留獻上握風捕影鑄木鏤冰敢求恩知但希鐫琢冒黷尊重下情無任惶懼謹啓前渭南縣令王寧前件官實有吏才稱於衆口年少強力一也遇事必能裁割二也既蘊智能無頭角誇誕三也廉直可保四也處於驕將內臣之間必能和同五也今者邊將生事雜虜起戎不憂兵甲唯在饋運某過承恩獎輒敢薦才伏唯取捨之間特賜恕察謹啓
