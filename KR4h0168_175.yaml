front:
  text: 全唐文欽定全唐文卷一百七十五行功恆州井陘人高宗時纍轉吏部郎中以善占奏常兼通事舍人內供奉又召為司文郎中主朝廷大典册後遷蘭臺侍郎卒
  hash: sha256:147fba4995d78bafe5b010ca441330c93022867765efaaa27606364846d59973
  markers:
  - {type: head, offset: 14, content: 崔行功, id: KR4h0168_NFKB_175-h1, level: 1}
body:
  text: 臣聞形氣肇分宗匠之塗遂廣性情已著名教之理攸興是故雕刻為妙物之先粉澤成真宰之用若其聃語棄智則聖非攘臂之端莊寄齊諧則禮必因心之範雖九流爭長百家競逐而宗旨所歸典墳攸係夫軒羲已謝子姒迭微步驟殊方質文異轍及流漦起譟箕服傳訞憲章板蕩風雅淪喪然而千齡接聖崇朝可期五百見賢伐柯未遠粵惟上哲降生圯運理接化先德充造物財成教義彌綸之迹已周組織心靈範圍之功且峻利仁以濟幽顯垂訓以霑動植自嘆起臨川道窮反袂西峯琬玉幾燼蒼山東野柔桑多塵碧海屬混元再造休明一期雅頌之音復聞郊禋之禮還緝跨巢胥之逸軌邁龍鳥之遐風瞻白雲而升介邱翼蒼螭而過沂上而令千祀之外典册遂隆九泉之下哀榮方縟斯乃命為罕説道不預謀豈如箕山之魂空成寂寞信陵之墓徒復經過將知龍蛇之蟄潛契於天壤聖智所遊高懸於日月言之不可極其惟孔太師乎太師諱某字仲尼魯國鄒人有殷之苗裔也分於宋則孔父嘉為大司馬弗父何以國讓其弟厲公正考父佐戴武宣而受三命居於魯則有防叔伯夏叔梁紇紇生太師若夫天命元鳥玉篋隆其濬哲瑞啓白狼瑤臺繁其錫類武王覆夏仍遷象物之金有客在周復奏桑林之樂滋恭喻尸臣之鼎高讓挹延吳之風令緒昌源煥乎已遠至如象緯凝質則傅説巫咸嵩華降神則申伯吉甫在於郊臨巨迹鬱符中野之祥水帶邱阿遙均反宇之慶韞乾坤之精粹陶陰陽之淑靈度九圍十河目海口放勳文命有喻於儀形子産皋繇微詳於具體孟孫言其將聖太宰辨其多能神關繫表性與道合時初撰屨已訓魯卿年未裘裳先窺周室猶且學期上達業遵下問龍如藏史或訪禮經碧準萇宏言詢易象曲臺相圃廣陳揖讓之容師摯師襄屢辨興亡之極網羅六藝經緯十倫加以思入無方情該至賾陳庭矢集懸驗遠飛季井泉開冥占幽怪新萍泛日能對於楚賓舊骨淪風旋訓於越使藏往知來之際微妙元通之旨不可以龜策求不可以筌蹄得及其譽聞曲阜南宮展師資之敬應務中都西鄰化諸侯之法冬官效職五土得其攸宜秋令克宣兩觀展其刑政溝疏墓道且抑季桓田歸汶陽遂陵齊景尊君卑臣之訓自家刑國之術每惆悵於興周亦流連於韶管然而高旻不惠彼日寖微起哀怨於王風絶歸飛於鳴鳥是邦可化斯道欲行暖席興憂問津匪倦俎豆嘗説空及三軍之容季孟有言不接雙雞之膳晏平推士尚或相排子西讓王終成見拒亦有宋朝司馬喬木難休衛國匡人逆旅焚次荷蕢微者翻嗟擊磬之心儀封細人潛明木鐸之意既而在斯興感用輟栖遑狂斐然彌嗟穿鑿旋驂舊館掃筵闕里杏壇居寂緇林地幽知十稽微得二承妙科斗所載方閲舊文睢鳩在篇遍詳雅什河漢鞉鼓鏗鏘之響復傳宗廟衣裳升降之儀還序博約無倦誘喻多方后稷躬耕近關勵物伯夷餒死猶可激貪周公其人則神交於夢想管仲小器則歎微於征伐立德立言太上謂之不朽曰仁曰義前哲以之周旋覆簣為山喻天階而不陟讀易無過假日蝕以鳴謙茨嶺洞山寄言於獨善岐情風御未陟於通莊妙臻數極作侔易是知縫掖乃兼濟之途華袞非為政之要及其愚智齊派椿菌如一南楚狂狷舊辨鳳衰東魯陪臣奄成麟斃晨興負杖知命發於話言夕寐奠楹將萎傷其溘慮崇山化谷小天下而無由殞石沈星架大梁而何有門人議服俱廠田坴至極之哀國史制詞永錫憗遺之誄及埏深夏屋樹列遠方五勝迭遷六籍無準席間初闃已舛微言入室且分遄乖大義秦人蛙沸遺燼翳然漢代龍驤挾書未剪元封有述殘闕載陳甘露嗣蹤揚復起舂陵受命先訪於膠庠譙郡膺符多招於文學逮江馬南度泉鵝北飛梟入環林鯨衝聖海有隨交喪中原翦覆東序南雍鞠為茂草六樂五禮皆從燬室欽若皇唐肇膺明命祖武宗文之業天成地平之勳圖書因樂推重干戈由寧亂集刳舟創浮芹藻之詩先遠戎衣初卷羽籥之節旋興皇上以聖敬而撫璇圖以文明而膺寶歷夏啓挹其光兆姬誦讓其惟清化入龍沙風移鯷海金邱展賮瓊田薦賝潛馬飾黃芝之封浮龜吐緑文之籀虞庠殷孰廣賓龎叟蓬嶺石渠朋延敦誨垂衣裳而凝想虛旒纊以永懷至於大道寖微小康遂往嬴譏紫色謬踐元阿劉風白金徒遵高里黃初正始時多間然建武永平業非盡善而乃作樂崇德殷薦之禮畢陳有孚載容觀下之訓齊設肆類㣥望孝享之義益隆歸功三后尊祖之誠愈切詔寰中而徵萬玉譯荒外以召百靈一茅分茹雙鶼共羽翠華遠升秸席虛位上帝儲祉泰一有輝山祇傳聲海神會氣九皇之况榮可嗣三代之闕典還屬乃使朱鳥翔日蒼威戒路七萃騰景八鸞鏘風過大庭以省方掩洙上而觀藝晏居莫辨祠堂巋然見馬鬣於荒墳識欃檀於古歎重泉之可作聞盛德而必祀言敷典訓廣命杍材贈以太師式旌幽壤改制神宇是光令德於時皇唐之御天下四十有九載即乾封之元年也攝提貞歲勾芒獻節兗州都督霍王元軌大啓藩維肅承綸誥庀徒揆日疏間剃遠接泮林之舊壝削靈光之前殿徂徠新甫伐喬木而韻流嚶岱畎泗濱採怪石而喧浮磬赬紫施絢黝黛飛文沓栱重櫨春窗秋幌陰櫩積霧復閣懷煙几仍度室席遵函丈壽宮煥然睟容有穆至如襄城有訪七聖接其騑驂汾水言遊四子冥其衡軛將謂布衣黃屋名器則殊卷領素王感召宜一顏子侍側似發農山之談季路承間如興浮海之説西華束帶尚以要賓言偃裼裘猶為得禮避席延其不敏舍瑟眷其幽情共列升堂齊參覩奧歲時蘋藻復雜昌蒲平日絃歌還聞絲竹皇儲一德聿隆三善博望邀裾肅成講義發揮鎔造幽贊事業而以周穆之觴王母尚勤西弇漢帝之展稷邱因書東嶽遂乃思建隆碣上聞天扆言由國本理會沖情副震宮之德聲命藝閣以紬頌元堂闢兮神靈僾揚教思兮兩儀配煽皇綱兮融帝載堯可履兮舜為佩晝而明兮夜而晦于嗟業兮麗萬代其詞曰赫赫上帝悠悠天造神集鴻名聖居大寶循性稱教率性為道政若鎔金化侔偃草爻畫先起律呂創陳禮節天地樂和人神成期用業尚日新縡無聲臭隲有彞倫水火朝變憲章時革周廟傷禾殷墟悲麥褒豔紕雅嬴荷淪賾散亂紀言支離方册自天生德由縱成能賓筵恪嗣銘鼎家承蹲龍運舛振鐸冥膺闕典攸緝斯文載興廣訓三千遍於七十歷階東會藏書西入楚將分社齊聞與邑接輿自狂長沮空執在智伊妙惟神乃幾羊因魯觸鳥向陳飛那傳頌管編照書韋卜商承絢顏子參微堯則不追昌亦遂往名教潛發心靈泛獎德配乾坤業暉辰象麟悴遙泣山隤敻仰三統昌日千齡聖期禋宗有昊展禮崇基覲宣時邁神緘孝思絳螭承軛翠鳳翻旗上浮龜蒙遙集鄒魯翹勤真迹惆悵今古舊壁迷字荒墳翳斧綸賁宗師詔緝靈宇虹梁野搆翬翼林舒雕櫳繡桷圓井方疏沂童浴早泮鳥鳴初俎豆蠲潔丹青藹如墨檢前蹤莊放遺轍於昭遐訓允歸聖烈肅穆仁祠陰沈像設隨四序以潛運懸三光而不缺彥範字士則潤州丹陽人少以門蔭調補右翊衛纍轉司刑少卿中宗即位以誅張易之昌宗功加銀青光祿大夫拜納言賜勳上柱國封譙郡公改侍中用武三思譖進封扶陽郡王加特進令罷知政事又因三思誣搆貶瀧州司馬長流瀼州三思令周利貞矯制杖殺之年五十四睿宗立追復官爵諡曰忠烈建中元年重贈司徒昔孔子論詩以關睢為始言后妃者人倫之本理亂之端也故皇英降而虞道興任姒歸而姬宗盛桀奔南巢禍階妹喜魯桓滅國惑以齊媛伏見陛下每臨朝聽政皇后必施帷幔坐於殿上預聞政事臣愚歷選列辟詳求往代帝王有與婦人謀及政者莫不破國亡身傾輈繼路且以陰乘陽違天也以婦凌夫違人也違天不祥違人不義由是古人譬以牝雞司晨惟家之索易曰無攸遂在中饋言婦人不得預於國政也伏願陛下鑒古人之言察古人之意上以社稷為重下以蒼生在念宜令皇后無往正殿干預外朝專在中宮聿修陰教則坤儀式固鼎命惟永又臣聞京師喧喧道路籍籍皆云胡僧慧範矯託佛教詭惑后妃故得出入禁闈撓亂時政陛下又輕騎微行數幸其室上下媟黷有虧尊嚴臣嘗聞興化致理必由進善康國寧人莫大棄惡故孔子曰執左道以亂政者殺假鬼神以危人者殺今慧範之罪不殊於此也若不急誅必主變亂除惡務本去邪勿疑實願天聰早加裁貶微臣竊見宋璟奏張昌宗令李宏泰占有天分及有天子氣請禁身勘當恩敕不允者但昌宗無德無才謬承恩寵自宜粉骨碎肌以答殊造豈得包藏禍心有此占相陛下以簪履恩久不忍加刑昌宗以逆亂罪多自招其咎此是皇天降怒非唯陛下故誅違天不祥乞陛下裁擇原其本奏以防事敗事敗即言奏訖不敗則候時為逆此乃姦臣詭計疑惑聖心今果遂其所謀陛下何忍不察若昌宗無此占相奏後不合更與宏泰往還尚令修福復擬禳厄此則期於必遂元無悔心縱雖奏聞情實難恕此而可捨誰其可刑陛下黨而不誅養成其惡臣恐更有為逆者無人敢言縱使昌宗元無此心今見頻遭事迫亦當不日為亂况復先有包藏又昌宗經勘當已前其心或防後則雖有此懼勢仍傾朝况經兩度事彰天恩並垂捨宥昌宗自為得計人亦以為應運即不勞兵甲天下皆從萬方譏之以為陛下縱成其亂也臣聞父在子稱尊者尚為逆子君在臣圖天分是為逆臣臣逆不誅社稷其亡矣伏請付鸞臺鳳閣三司考竟其罪柬之字孟將襄州襄陽人少補太學生第進士纍補青城丞永昌元年以賢良徵時年七十餘矣試策第一擢拜監察御史神功初纍拜荊州大都督府長史長安中召還狄仁傑薦為司刑少卿遷秋官侍郎尋同鳳閣鸞臺平章事遷鳳閣侍郎中宗即位以誅張易之昌宗功擢拜天官尚書鳳閣鸞臺三品封漢陽郡公遷中書令監修國史進封漢陽郡王加特進令罷知政事授襄州刺史尋為武三思所搆貶新州司馬憤恚卒年八十二景雲元年贈中書令諡曰文貞建中初又贈司徒臣某言臣伏聞姚州者古哀牢之舊國絶域荒外山高水深自生人以來洎於後漢不與中國交通前漢唐蒙開夜郎填筰而哀牢不附至光武末年始請內屬漢置永昌郡以統理之乃收其鹽布氊罽之稅以利中土其國西通大秦南通交趾奇珍異寶進貢歲時不闕劉備據有巴蜀常以甲兵不充及備死諸葛亮五月渡瀘收其金銀鹽布以益軍儲使張伯岐選其徑卒利兵以增武備故蜀志稱自亮南征之後國以富饒甲兵充足由此言之則前代置郡其利頗深今鹽布之稅不供珍奇之貢不入戈戟之用不實於戎行賨貨之資不輸於大國而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊為國家惜之昔漢以得利既多歷博南山涉蘭倉水更置博南哀牢二縣蜀人愁怨行者作歌曰歷博南越蘭津渡蘭倉為他人蓋譏漢貪珍奇鹽布之利而為蠻夷之所驅役也漢獲其利人且怨歌今減耗國儲費用日廣而使陛下之赤子身膏野草骸骨不歸老母幼子哀號望祭於千里之外於國家無絲髮之利在百姓受終身之酷臣竊為國家痛之往者諸葛亮破南中使其渠率自相統領不置漢官亦不留兵鎮守人問其故亮言置官留兵有三不易大率以置官夷漢雜居猜嫌必起留兵運糧為患更重忽若反叛勞費更多但粗設紀綱自然安定臣竊以亮之此策妙得羈縻蠻夷之術今姚府所置之官既無安邊靖寇之心又無葛亮且縱且擒之技惟知詭謀狡算恣情割剝貪叨劫略積以為常扇動酋渠遣成朋黨折支諂笑取媚蠻夷拜跪趨伏無復慚恥提挈子弟唱引凶愚衆會蒲博一擲纍萬劍南逋逃中原亡命有二千餘戶見散在彼專以掠奪為業姚州本龍朔中武陵縣主簿石子仁奏置之後長史李孝讓辛文協並為㣥蠻所殺前朝遣郎將趙武貴討擊貴及蜀兵應時破敗噍類無遺又使將軍李義總等往征郎將劉惠基在陳戰死其州遂廢臣竊以諸葛亮稱置官留兵有三不易其言乃驗至垂拱四年蠻郎將王善寶昆州刺史爨乾福又請置州奏言所有課稅自出姚府管內更不勞擾蜀中及置州後録事參軍李稜為蠻所殺延載中司馬成琛奏請於瀘南置鎮七所遣蜀兵防守自此蜀中騷擾於今不息且姚府總管五十七州巨猾遊客不可勝數國家設官分職以化俗防姦無恥無厭狼籍至此今不問夷夏負罪並深見道路劫殺不能禁止臣恐一朝驚擾為禍轉大伏乞省罷姚州使隸巂府歲時朝覲同之蕃國瀘南諸鎮亦皆廢於瀘北置關百姓自非奉使入蕃不許交通來往增巂府兵選擇清良宰牧以統理之臣愚將為穩便問朕聞體國經野取則於天文設官分職用立於人紀名實相副自古稱難則哲之方深所不易朕以薄德謬荷昌圖思欲追逸軌於上皇拯㣥生於季俗澄源正本式啓維新俾用才委能靡失其序以事效職各得其長至於考課之方猶迷於去取黜陟之義尚惑於古今未知何帝之法制可遵何代之沿革斯衷此雖戔戔束帛每賁於邱園翹翹錯薪未獲於英楚並何方啓塞以致於茲佇爾深謀朕將親覽對臣聞仲尼之作春秋也法五始之要正王道之端微顯闡幽昭隆大業洛之功既備範圍之理益深伏惟陛下受天明命統輯黎元載黃屋負黼扆居紫宮之邃坐明堂之上順陽和以布政攝三吏而論道雍容高拱金聲玉振徵求無厭誤及厮賤微臣材朽學淺誠不足以膺嚴旨揚天庥雖然敢不盡芻蕘罄狂瞽悉心竭節昧死上對臣聞天者㣥物之祖王者受命於天故則天而布列職天生蒸民樹之君長以司牧之自非聰明睿哲齊聖廣淵不能使人樂其生家安其業陛下德自天縱慈憫元元既樂其生且安其業臣聞瑞者上天所以申命人主也故使麒麟遊於囿鳳凰集於庭慶雲出神龍見其餘草木煙露之祥不可勝紀陛下日慎一日雖休勿休故天申之以禎石告之以神文大矣哉聖人之鴻業也臣聞河圖洛書之不至也久矣孔子曰鳳鳥不至河不出圖吾已矣夫師説曰聖人自傷已有能致之資而天不致也陛下有能致之資而天蘊者所以扶助聖德撫寧兆人也臣觀今朝廷含章贍博之士鯁言正議之臣陛下誘而進之並踐丹地伏青規雍雍昂昂雲屬霧委鸞騫鳳振佩金鳴玉曳朱紱揚翠緌充牣於階庭者矣昔舜舉十六相去四凶人有大功二十而為天子前史美之稱曰盡善盡美雖甚盛德無以加此陛下彰善去惡昭德塞違萬萬於虞舜自託薄德愚臣何足以望清光而敢有議哉制策曰思欲追逸軌於上皇拯㣥生於季俗澄源正本式啓維新臣聞善言古者必考之於今善談今者必求之於古臣竊以當今之務而稽之往古以往古之迹而比之當今以為三皇神聖其臣不能及故於疑親之陛下刊列格正爰書修本業著新誡建總章以申嚴配置法匭以濟窮冤此前聖所不能為非㣥臣之所能及也今朝廷之政上令下行如身之使臂臂之使指百僚師師罔不咸乂此㣥臣之能奉職也書曰元首明哉股肱良哉庶事康哉故臣以為陛下有三皇之位而能隆三皇之業也臣以今之刺史古之十二牧也今之縣令古之百里君也有官聯焉有社稷焉可謂重矣任非其材其害亦重矣昔周宣王欲訓其人問於樊仲曰吾欲訓人諸侯誰可者仲曰魯侯肅共明神敬事耆老必咨於故實問於遺訓乃立之晉之名臣亦言舍人洗馬一時之高選臺郎御史萬邦之俊哲若出於宰牧頌聲興矣由此言之則古牧州宰縣者不易其人也自非惠訓不倦動天心者未可委以五符之重百里之寄今則不然多由門資擢授或以勳階蒞職莫計清濁無選藝能負違聖誡安肯肅恭明神輕理慢法安肯敬事耆老取舍自便安能求之故實舉措縱欲安能問之遺訓選異一時之高材非萬邦之俊傑於是多其僕妾廣其資産齒角兩兼足翼雙備蹈瑕履穢不顧廉恥抵網觸羅覆車相次孔子曰既得之患失之苟患失之無所不至矣故臣以為陛下有三皇之人無三皇之吏也制策曰俾用才委能靡失其序以事效力各得其長至於考課之方猶迷於去取黜陟之義尚惑於古今未知何帝之法制可遵何代之沿革斯衷臣聞皇王之制殊條共貫雖有改制之名無不相因而立事孔子曰殷因於夏禮所損益可知周因於殷禮所損益可知其或繼周者雖百代可知也然則虞帝之三考黜陟周王之六廉察士雖有沿革所取不殊期於不濫而已陛下取人之法甚明考績之規甚著臣以為猶舟浮於水車轉於陸雖百王無易也今邱園已賁英楚雲集啓塞之路豈愚臣所能輕云也謹對問朕聞軌物垂訓必隨正於因生開國承家理崇光於敦本故七葉貂珥表金室之榮十紀羽儀峻班門之躅保姓受氏義先於睦親翼子謀孫事隆於長發朕以寡昧叨奉先靈墜典咸興遺章畢覩思欲甄明譜系澄汰簪裾派別淄澠區分士庶至如陳田互出虢郭俱開束皙改漢傳之宗輔果易晉卿之號巨君之姓曾非馭鶴之苗元海之家諒非擾龍之族永言紕繆良用憮然子大夫十室推英三冬富學允迪裒然之學宜揚鏘爾之詞至若北郭南宮本因何義三烏五鹿起自何人公孫之由司馬之姓咸加辨析且顯指歸式副對揚朕將親覽對臣聞保姓受氏明乎典訓或因地以賜姓或因官而命氏或官以代功亦以官族或所居之地因以為氏諸侯之子稱為公子公子之子稱為公孫公孫之子乃以其王父字為氏後代因之亦以為姓田陳虢郭以聲近而遂分輔果束皙以避難而更改王莽以田王為氏元海因漢甥立族騷括分南北之號充宗為五鹿之先應氏著書具表三烏之始司馬司徒是曰因官公孫叔孫春秋備載陛下盡六藝之英窮百代之要淑問揚天地元情貫幽顯黃竹清歌詞窮五際白雲高唱文包萬象昔曹門二祖道愧由庚劉氏四葉仁非解慍豈若睿思瓊敷同雨露之霑漬神機苕發登羲望之照臨起帝典而孤立孕皇墳而獨秀臣沐浴淳和叨承至訓名聞於聖聽言奏於闕前謹對夫三年之喪二十五月不刊之典也謹按春秋魯僖公三十三年十二月乙巳公薨文公二年冬公子遂如齊納幣左傳曰禮也杜預注云僖公喪終此年十一月納幣在十二月士婚禮納采納徵皆有元纁束帛諸侯則謂之納幣蓋公為太子已行婚禮故傳稱禮也公羊傳曰納幣不書此何以書譏喪娶在三年之內何以譏三年之內不圖婚何休注云僖公以十二月薨至此冬未滿二十五月納采問名納吉皆在三年之內故譏何休以公十二月薨至此冬十二月才二十四月非二十五月是未滿三年而圖婚也按經書十二月乙巳公薨杜以長歷推乙巳是十一月十二日非十二月經書十二月是經誤文公元年四月葬我君僖公傳曰緩也諸侯五月而葬若是十二月薨即是五月不得言緩明知是十一月薨故注僖公喪終此年至十二月而滿二十五月故邱明傳曰禮也據此推步杜之考校豈公羊之所能逮况邱明親受經於仲尼乎且二傳何杜所爭惟爭一月不爭一年其二十五月除喪由來無別此則春秋三年之喪二十五月之明驗也尚書伊訓云成湯既歿太甲元年惟元祀十有二月伊尹祀於先王奉嗣王祗見厥祖孔安國注云湯以元年十一月崩據此則二年十一月小祥三年十一月大祥故太甲篇中云惟元祀十有二月朔伊尹以冕服奉嗣王歸於亳是十一月大祥訖十二月朔日加王冕服服吉而歸亳也是孔言湯元年十一月之明驗顧命云四月哉生魄王不懌是四月十六日也翌日乙丑王崩是十七日也丁卯命作册度是十九日也越七日癸酉伯相命士須材是四月二十五日也則成王崩至康王麻冕黼裳中間有十月康王方始見廟則知湯崩在十一月淹停至殮訖方始十二月祗見其祖顧命見廟記諸侯出廟門俟伊訓云祗見厥祖侯甸㣥后咸在則崩及見廟殷周之禮並同此周因於殷禮損益可知也不得元年以前別有一年此尚書三年之喪二十五月之明驗也禮記三年問云三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節又喪服四制云變而從宜故大祥鼓素琴告人以終又間傳云期而小祥食菜果又期而大祥有醯醬中月而禫食酒肉又喪服小記云再期之喪三年也期之喪二年也九月七月之喪三時也五月之喪二時也三月之喪一時也此禮記三年之喪二十五月之明驗也儀禮士虞禮云期而小祥又期而大祥中月而禫是月也吉祭此禮周公所制則儀禮三年之喪二十五月之明驗也此四驗者並禮經正文或周公所制或仲尼所述吾子豈得以禮記戴聖所修輒欲排毀漢初高堂生溥禮既未周備宣帝時少傅后倉因淹中孔壁所得五十六篇著曲臺記以授弟子戴德戴聖慶傅三人合以正經及孫卿所述並相符會列於學宮年代已久今無端搆造異論既無依據深可歎息其二十五月先儒考校惟鄭康成注儀禮中月而禫以中月間一月自死至禫凡二十七月又解禫云禫言淡淡然平安之意今皆二十七月復常從鄭儀也踰月入禫禫既復常則二十五月為免喪矣二十五月二十七月其議本同竊以子之於父母喪也有終身之痛創巨者日久痛深者愈遲豈徒歲月而已乎故練而慨然者蓋悲慕之懷未盡而劈踊之情已歇祥而廓然者蓋哀傷之痛已除而孤藐之念更起此皆情之所致豈外飾哉故記曰三年之喪義同過隙先王立其中制以成文理是以祥則縞帶素紕禫則無所不佩今我子將徇情棄禮實為乖僻夫去縗麻之服襲錦縠之衣行道之人皆不忍也直為節之以禮無可奈何故由也不能過制為姊服鯉也不得過期哭其母夫豈不懷懼名教逼已也至若孔鄭何杜之徒並命代挺生模範來裔宮牆積仞未易可窺但鑽仰不休必當漸入勝境詎勞終年矻矻虛肆莠言所有掎擲先儒願且以時消息
