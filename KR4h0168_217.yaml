front:
  text: 全唐文欽定全唐文卷二百十七融字安成齊州全節人擢八科高第纍補宮門丞兼直崇文館學士纍拜國子司業神龍二年預修武后實録成封清河縣子因撰武后哀冊文用思精苦絶筆而卒年五十四追贈衛州刺史諡曰文
  hash: sha256:832b85d2b63ef23501da44d6c30232ef462158d49de92bde0ea418bdabcea89c
  markers:
  - {type: head, offset: 13, content: 崔融(一), id: KR4h0168_NFKB_217-h1, level: 1}
body:
  text: 崇文館瓦松者産於屋霤之上千株萬莖開花吐葉高不及尺下才如寸不載於仙經靡題於藥録謂之為木也訪山客而未詳謂之為草也驗農皇而罕記豈不以在人無用在物無成乎俗以其形似松生必依瓦故曰瓦松楊炯謂余曰此中草木咸可為賦其辭曰賓館兮沈沈明月高兮重海深試一望兮上棟下宇開陽闔陰彼美嘉族依於夏屋煌煌特秀狀金芝兮産霤歷歷空懸若星榆而種天苯䔿丰茸青冥芊眠葩條郁育根柢連拳閒青苔而裛露陵碧瓦而含煙春風搖兮鬱起冬雪糅兮蒼然詎充採掇罕任雕鐫桐君莫賞梓匠難甄用匪適於時要必濫聞於俗傳慙魏宮之烏韭恧漢官之紅蓮觀其衆開榮列虛心獨潔高寧我慕無木禾之五尋卑以自安類石蒲之九節進不必媚居不求利芳不為人生不因地其質也菲無忝於天然其陰也薄才足以自庇望之常見其表尋之罔得其祕肅穆承華堂皇不賒繩懸麥穗戶刻菱花竹蒼筤而衆色樹連理而相加芙蓉發池兮照爛日及懸霤兮芬葩彼懷寶以遇賞此不材而見嗟雖有慕於階闥亦無混於泥沙已矣哉不學懸蘿附柏直蓬倚麻固將含美惡以同貫齊是非於一家亂曰少陽之地兮於何不春博望之苑兮莫匪正人纎根弱植兮生君之館荷施霑恩兮為人所玩物不謝生不知其榮惟願聖皇千萬壽但知傾葉向時明臣某言臣聞形器以陳萬物有名之謂母尊卑既位兩儀合德之謂皇非母則不能慈愛域中非皇則不能導化天下歷考前政詳窺舊牒金匱玉版帝王之迹易推鐵軸銅渾天地之情可驗不知誰子氣母握其靈機厥初生人維皇啓其光宅然則儀坤配永至聖者所以降天符建極施尊至神者所以塞人望禮存知貴事叶強為天命則休應畢臻人心則休應允集不可得而避也不可得而違也其唯聖人乎其唯神用乎伏見某日制書以天授聖圖㣥臣上尊號曰聖母神皇昭備典冊肅應景命大赦天下賜酺五日含生之類稟識之儔雍雍如欣欣如洎鳥獸率舞與草樹咸樂中謝臣聞以凡測聖者理絶於名言以管窺天者事迷於遠近雖帝其何力自聞田父之歌而事有不談終獲樵夫之笑亦安敢梗概而無述哉粵若稽古聖母神皇陰陽和而睿德生日月合而沖靈降其在家也御娀氏之瑤臺其正位也綰漢皇之玉璽維皇高祖肇創王業惟太宗克成帝功惟高宗發揮二聖之耿光惟陛下對越三后之明命顯承遺託敬守前基宏濟艱難躬親政事情深社稷義切園陵其至公有如此者七月而葬三年免喪乃顧明辟載懷高蹈陛下致還君之美德盛於謙尊皇帝竭為子之孝誠深於覆育八紘無外六合一家其沖讓有如此者搜八代之禮講三王之樂定齊斬之數革靡曼之音草章程垂勸誡除指斥之坐議故誤之條百官以理萬人以察其制作有如此者慎終追遠因心罔極崇七廟廣三雍仁不遺於一物教必行於百姓有虞舜大孝之德焉訓甲兵誓將帥南北清宴東西緝穆有軒皇戰伐之功焉定都邑殊徽號居三統之政處六合之中有周成隆平之業焉錦繡羅縠雕文刻鏤人君之美色也而陛下浣濯之服大帛之衣珍羞圓方滋味重纍人君之甘旨也而陛下藜藿之羹粢糲之飯黃金白玉青珠紫貝人君之驕也而陛下所寶惟賢所重惟穀上林禁苑層臺纍榭人君之麗也而陛下宮垣不葺廊宇莫修置拾遺補闕之官則前疑後承仰天俯地孰云尚也創通賢招諫之匭則聽聲之鼓告善之旌疇以懿茲夫然後不登而高不行而遠天降以瑞地升以符日月光風雨潤慶雲出神泉湧鳳凰翔於庭麒麟臻於囿雲集霧散日至月書固不可得而言也陛下猶固守沖挹深惟惕厲以元默為神淡泊為德回聖慮運全謨采衢室之舊儀酌明臺之故事因人之欲不日而成於是靈命孔彰元心總集山開祕篆洛出祥圖每纓冕同觀軒墀共謁則有曦車五色對玉匣而如遲雲蓋三層伴瓊緘而不去豈非顯見神物覺寤黎蒸者歟可以昭報昊穹可以抑揚宗社明至德表至功陰陽不測之謂神應變不窮之謂聖洋洋乎發育萬物蕩蕩乎人無能名尊號之來豈徒然而已也聖母神皇乃不得已而從之命有司膺大禮秩㣥望懷百神配諸侯於四瀆視上公於五鎮百姓有罪思與天下滌之一人有慶思與天下覃之垂動鑰之深思降合錢之普澤凡百在宥不知手之舞之足之蹈之者也豈使女媧神化仍參泰古之皇太姒徽音獨擅隆周之母而已微臣早霑揚歷亟奉恩榮慙擁腫之曲材荷生成之大德山濤者渾金之器魏國擢之以尚書伊尹者飾玉之姿殷朝待之於右相在臣駑暗遠謝賢明徼逢振拭擢登左右陛下不以臣不肖復使臣待罪元戎顧無平虜之能未答破羌之寄恭聞瑞典載沐鴻私幸屬皇羲之代欣承帝魁之美冕旒端拱既不獲接景前行玉帛來朝又不獲趨風後位橫行萬里限中國以長城悚踴一隅望東朝於西域不任悅豫翹勤之至謹遣某官奉表稱賀以聞臣等言一昨仰稽舊章虔上尊號至誠猶鬱沖旨未回孤遐邇之心闕神祇之望㣥臣百辟相顧罔然中謝臣聞古先王者祗奉天命遭時為法因事制宜不必相沿各有所立化而裁之存乎變推而行之存乎通故庖犧是生創天下之法則周成既作改人閒之制度況煌煌大寶穆穆中興至道已邁於胥庭鴻名尚襲於漢代臣子之地悚迫不安又謝伏惟陛下紹開聖圖光復丕緒繼文之體行湯之政撫綏兆庶清蕩二凶舊物不失能收夏衆老吏垂涕復見漢官補三皇之闕文緝五帝之漏目享太廟祀明堂禁網疏濶凡事易道德海浸符瑞山承百蠻向風萬人樂業固以萌柢開闢彈壓往初自可去故而取新何必同條而共貫循季末之常躅忽殊尤之盛儀乎臣等禺禺不勝致懇又謝臣聞天為上帝九名所以示崇高佛為法王十號所以稱具足陛下安得徇小節遺至公推而不居猶以為薄臣等敢昧死謹再拜重上尊號曰應天皇帝伏乞順萬國之歡心答三靈之眷命不違誠請昭備典冊使百代垂景光而作程飛英聲而不朽豈不美歟豈不盛歟臣等幸逢興運夙參朝列纍獻非常之祈願奉維新之慶所冀日回三舍天移二山愚有不奪期有必遂無任悃款屏營之至謹詣朝堂奉表固請以聞臣某言奉某年月日敕令臣撰洛圖頌伏以陛下聖烈豐懿應期首出珍符炳鑠曠代罕聞雖臯繇歌虞伯禹申歎其或生於今日尚不足以談天況臣涉學蓋淺揆才多陋安可潤色皇化對揚神休竊讀古文幽尋舊式言大道者莫先於典誥序以之生焉美盛德者莫近於詩什頌以之成焉其辭婉而微其事而要今臣斟酌前訓擬議鴻猷述洛圖頌一篇并序謹詣宣義門奉進誠未能探索元奧憲章經書庶幾竭肝膽效塵露增日月之末光偕天地而不朽斯亦微臣之願足矣臣拜手稽首冒顏以聞死罪死罪臣某言臣聞易有太極是生兩儀有父子焉有君臣焉道莫尊於三皇皇合符於奕葉德莫高於五帝帝展事於云亭禮莫盛於三王報功於岱畎政莫隆於兩漢紀號於仙閭皆所以省方觀人增天益地刻玉篆印金泥激清流於滲漉翔仁風而萌動然則業隆不封禪何以答三靈道備不巡遊何以會萬國為人上者可不敬哉中謝伏惟聖母神皇陛下寶命絪縕元期肸蠁包混元而建極宅造化而開階剖靈符於天合至德於地渥澤浸潤萬物恩光明懸四海不言而含氣風從無為而流形日用允所謂榮鏡絶代彈壓振古者焉臣聞古之聖王受命者然後得封禪又云功成道洽符出乃封又云致太平必封禪今陛下獲瑞銘於廣武得寶圖於溫洛星連月合雲起風搖上以擁神休下以塞天望崇徽號定都邑文質再而復正朔三而改義在得天乃立天統非受命者孰能臻茲因時創宜以順制逆建三廟崇五塋廣太學以教胄子開明堂而祀上帝彼東夷西戎南蠻北狄殊方絶界窮幽極遠蠢然莫敢不來享莫敢不來王非功成者孰能臻茲三階平萬方晏巖廊無事囹圄云空獄訟清而王風淳禮樂和而人氣樂衢路有鴈行之序邑里得鶉居之時五尺童兒羞論霸道八十父老不知帝力非道洽者孰能臻茲乾符總集不召而自至坤瑞昭升應圖而合諜慶雲出神池湧毛宗擾羽族馴樹連理而麥兩岐闕一字黃黍而闕一字元秬匪朝伊夕以時繼年非符出者孰能臻茲命既受於天矣功既成於人矣道已洽於古矣符已出於今矣若此者非太平之效歟可以升中名山可以肆類上帝嵩高維嶽峻極於天風雷所起設險於畿甸霜露所均作鎮於邦國雖復千八百處未嘗遊玉女之臺七十四家不能幸仙人之洞區區漢武止聽三呼汲汲晉炎但喧㣥議臣等竊以為祕籙有云中嶽之神姓武天意若曰神皇其封中嶽乎藏纎緯以須時蓄符祥而待聖顯見神跡覺寤黎蒸天祚嶽姓必將封祀封祀神嶽者非陛下而誰由是王公侯伯日夕登封之奏禮官博士歲時符命之書鴻儒碩學思獻儀於野外川后山祇願前驅於闕下天人之望久矣陛下何得而辭哉伏乞深惟至公仰祗靈眷傍稽瑞命俯順氓歌龍駕帝服背河洛而上沂星陳天行指轘嵩而東邁石芝生而五色可以為盛貝樹長而三花可以為籍埋玉報地燔柴告天載巍巍扇翼翼上以答昊穹之儲祉下以副率土之歡心永保鴻名長為稱首盛矣美矣猗歟偉歟臣等忝職外臺受委方玉宣太平之風化聽古老之謳謠望屬車而未來思叫閽而至極庶千年一會陛下垂不讓之恩使五載四朝㣥臣有慶成之地孰不幸甚不勝悃款之至謹詣朝堂奉表誠請以聞臣某等言伏奉某日詔書有某年月日有事於中嶽恭聞大禮不勝欣抃臣聞巡狩者何觀人風而叶時月封禪者何增天高而益地厚然則聖帝臨下必有玉帛萬國之事焉明王在上必有柴望百神之禮焉伏惟天皇御寶位膺璿歷宅皓氣以開元鼓神風以成化宗文祖武之業天祚彌光制禮作樂之功皇猷載遠四方無事不聞犬吠於國中六合同歸唯覩鴈行於道路恩周動植德洞淪冥東魚西鳥不召而自至元秬黃牟應圖而合牒嵩維中嶽洛陽下都三臺崛起五衢相映風雨交會實惟天地之中威靈肅然固是神明所伏可以光昭纍聖可以謁款上元展時邁於仙宮叶歲巡於福地象天之道備法駕而非遙望君之來因名山而有日臣等飲和昌運冒寵崇班用雖微於犬馬情諒兼於鳥獸三呼在聽欣承漢后之儀㣥議不行竊鄙晉皇之德限以官守不獲稱賀軒墀無任悚踴之至謹附某奉表申賀以聞臣某言臣聞乘雲駕羽者非以逸樂其身觀風設教者將以宏濟於物故後豫胥怨幾望湯來吾王不遊嘗思禹會伏惟天皇察帝道敷皇極一日二日智周於萬幾先天後天化成於四序雖鴻名已建銘日觀而知尊而膏澤未流御雲臺而不懌市朝之邑天地所中四方樞會百物阜殷爰降恩旨行幸東都然以星見蒼龍日纏朱鳥清風用事庶彙且繁桑翳葉而眠蠶麥飛芒而雊雉詳求易緯是君無發衆之辰博訪禮經當人急勸農之月固未可陳詩展義拜洛觀河況序屬亢陽時方避暑露臺風館尚多薰灼之勞帳殿帷宮將有鬱蒸之弊天皇昔常服餌近更躬親睿情勤苦天儀憔悴若何以萬乘之重四海之尊暴露而行旰日而食者也加以官僚扈從或少資糧程期迫促未遑周辦必若事應巡狩務從寬恤猶望白露涼風然後清畿灑道下不違於人欲上無隔於天心可舉而行庶幾於此臣又聞關中屬縣畿內旁州百姓驅馳頗多飢餒天皇仁深覆育並令賑贍求轉徙者任其逐糧欲寧居者加其廩食家懷再造人得安全乞至秋來不煩聖慮特訖少留元鑒俯察丹誠回太陽之末光納蒙泉之餘瀝臣三朝問寢常色於宸慈五日詣臺每承言於聖奬輒陳冗職輕進芻詞蹈地知驚窺天自失無任私懇之至謹遣某官奉表以聞臣某言伏見臣妹太平公主妾李令月嘉辰降嬪公族詩人之作下嫁於諸侯易象之興中行於歸妹又臣銅樓再惕常荷蔭於中慈金屋相驚忽承恩於內輔周官典瑞旁稽聘女之儀晉朝加璽兼採納妃之制聖懷感慰皇澤霑濡願垂扶木之光俯遂甘芹之請謹上禮食若干輿如列尊師四學雖有謝於溫文問豎三朝竊無違於視膳謹遣某奉表以聞臣某言臣聞善持國者舒慘必繫於天時德稱皇者動靜莫違於物理故百姓不足一人所以載懷四海為家萬方由其在慮伏惟天皇觀風設教拜洛遊河光華前乎日月法象齊乎天地頃以歲儲微耗年穀未登睿旨憂勞宸情戒惕菲飲食而卑宮室居常夏禹之期減膳而徹鍾懸重取黃軒之事由是神靈肸蠁景氣氤氳雪千里而朝飛雨四溟而夜下兩河之甸瑞麥盈疇三川之境嘉苗被隰天意人事其在茲乎可以隨道抑揚可以與時通變周王之本支百代每進鮮庖殷帝之亢旱七年猶資鶴鼎昔賢具稱其美往聖不議其非唯此小心將乖大德臣又聞下之奉上猶枝附根君以人作基人以君為命天皇恩深子育念切家安損己勵精無違早晏停滋罷味已隔歲時聖躬有勞瘁之容㣥類動兢惶之責伏乞俯從人欲仰順靈心具珍物以登羞隨太陽而復膳萐莆知送涼之地芝英識駐壽之期豈使眇眇燧皇獨流名於膰炙悠悠黃帝空紀稱於庖犧而已哉臣寄忝元良任當監守春冬胄序學書禮而空勤朝夕寢門視寒溫而未節無任悃款之至謹遣某官奉表陳請以聞臣某言今月某日起居舍人某至伏承聖躬頃稍不安今已痊復手舞足蹈慶躍兼深臣聞孝於事親為子之方已極恭於奉上為臣之道則先臣自違侍軒墀已淹時序周儲故事一日三至於寢門晉室舊儀一月五朝於左閣今之望古臣獨何人日者瀝膽陳祈焦心覲謁伏惟天皇以關河鎮重監守務殷睿旨沖邈未垂矜亮今既十月築場三農事隙特乞暫息恩召俯念丹誠遂以起居假以時月得晨拜旒扆遂臣私情則暮辭闕庭在臣無恨不勝戀慕之至謹遣某官奉表陳請以聞臣聞昔者明王學以化人成俗古之君子文以緯地經天雖有閬風之高嶽弗登弗知其峻也雖有浴日之巨溟弗涉弗知其廣也伏惟天皇域中居大天下化成百官以理萬人以察日行中道而淑清歲起攝提而位序光薰萬物豈直芝珥蓂茆澤加四海寧惟壽麻孤竹地成形而天成象其道彌光河出圖而洛出書其徵可驗環林璧沼金門石室墳典積於邱山筆墨盈於泉海聖朝多士自可包二代之文臣顧不才何足奉三王之教皇慈渥洽帝奬優隆擢公望為太師徵子房為少傅所冀習與智長化與心成嘗辛苦於歲餘終未階於日就臣聞學者殖也問以辨之積必有成勤則不匱以周公之上聖日讀百篇以孔父之多能韋編三絶臣雖不敏竊所庶幾然以列代遺章先王舊典康成興業才覽卷於八千士安覃思願加年於纍百豈不以學而時習博則難精者乎今欲搴其蕭稂撮其樞要可以出忠入孝可以益國利人極賢聖之大猷盡今昔之能事商宀隹百氏勒成一家庶有代於針規長不違於左右又近代書鈔實繁部帙至如華林園遍略修文殿御覽壽光書苑長洲玉鏡及國家以來新撰藝文類聚文思博要等竝包括宏遠卒難詳悉亦望錯綜㣥書刪成一部藝官賓館亦既天皇立之矣端士正人亦既天皇致之矣伏乞俯從微願特降鴻私許臣撰緝遂臣誠請當宮學士如少仍望通取京官謹當開桂樹之山鑿芙蓉之水引甘泉之詞賦總望園之賓客下藝閣而長謠臨梓而高會一遊蘭芷佇變蓬麻區區之誠敢希矜允豈使肅成門內惟傳魏國之名崇政殿中獨紀晉朝之事而已無任誠懇之至謹遣某官某奉表陳請以聞臣某言某至伏承某月日甘露降於金闕亭肅奉休徵不勝抃躍中賀臣聞五材並用天地合而凝津四序遞來陰陽和而灑潤望之成雪若墜崑崙之山嘗之則甘似降軒轅之國伏惟天皇御元氣平太階正圭表於都畿考銅櫩於宮室薦河圖而升洛範日載祥編過竹苑而憩芝臺宵零瑞液爾其塗塗被物滴滴流膏承以玉杯淩漢宮而擅美獻之瓊爵掩魏殿而稱珍可以致靈仙之寄可以延帝王之壽孝經援神契未足敘其和平春秋運斗樞不能議其清濁臣濫膺國本多慙人望仰宸遊而不及倍戀恆情聞帝澤而先驚慶深常位無任喜抃之至謹遣某官某奉表陳賀以聞臣某言伏見某官等奏稱某月日玉山宮西南王谷上有白龍見臣聞天地和平聖人所以乘九五帝王符命神物所以寤黎蒸粵若皇家既高居而遠望於惟史閣亦舒圖而負璽服星辰之冕衮彩奪華蟲建日月之旗常文騰翠鳳出東方而據木天下知春臨北荒而銜火容光是燭風雨順陰陽和五穀登百寶用豈孫氏所謂出入應命上下以時無道則處有聖則見矣大火中星長風季月詳乎戴禮則帝嚳乘龍之時校以河圖是黃軒夢龍之晦裁金別宇挻玉名區宮模抗殿之基山接陵陽之路翩翩素翼矯矯白鱗異彩霜封風姿雪澡徵鄴城之故事若下神祠探吳郡之遺塵疑過象穴臣聞感通之效人事可尋嘉瑞之來天心易察地稱王谷先題王者之名壤號玉山實兆南山之固天皇以帝出乎震自天鍾有德之期天后以致養乎坤承天得西南之位披圖按諜影響合符漢朝之出在上封特其小者晉國之來從京兆曾何足云唯我后能得之固前王所不逮方使見龍于甸一人繫年月之書豈直囿龍于池百姓為朝夕之觀而已臣業謝溫文觀聞絶瑞雖四靈為畜未足以舞之蹈之而萬國歡心敢忘於美矣盛矣不勝鳬藻之至
