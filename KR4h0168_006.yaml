front:
  text: 全唐文欽定全唐文卷六太宗三
  hash: sha256:31436d26cca48532f87f92d6930fecbc89f73b1110e9512188d76c77253f378c
body:
  text: 先王之辨方正位體國經野象天地以制法通神明以施化樂由內作禮自外成可以安上治民可以移風易俗揖讓而天下治者其惟禮樂乎固以同節同和無聲無體非飾玉帛之容豈崇鐘鼓之奏日往月來朴散淳離淫慝以興流湎忘本魯昭所習惟在折旋魏文所重止於鄭衛秦氏縱暴載籍咸亡漢朝循緝典章不備時更戰國多所未遑雅道淪喪歷茲永久朕恭承明命嗣膺寶歷懼深馭朽情切納隍憑宗廟之靈資股肱之力上下交泰遐邇乂安率土阽危既拯之於塗炭㣥生遂性思納之於軌物興言正本夕惕在懷蓋知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明朕雖德謝前王而情深好古傷大道之既隱懼斯文之將墜故廣命賢才旁求遺逸探六經之奧旨採三代之英華古典之廢於今者咸擇善而修復新聲之亂於雅者並隨違而矯正莫不本之人心稽乎物理正情性而節事宜窮高深而歸易用之邦國彞倫以之攸敘施之律度金石於是克諧今修撰既畢可頒天下俾富教之方有符先聖人倫之化貽厥後昆朕以寡薄嗣守鴻基實資多士共康庶政虛己側席為日巳久投竿捨築罕值其人自親巡東夏觀省風俗興言至治夕惕兢懷然則齊趙魏魯禮義自出江淮吳會英髦斯在山川所感古今寧殊載佇風猷實勞夢想宜令河北淮南諸州長官於所部之內精加訪採其孝悌淳篤兼間時務儒術該通可為師範文詞秀美才堪著述明識治體可委字民并志行修立為鄉里所推者舉送雒陽宮各給傳乘優禮發遣當隨其器能擢以不次若有老病不堪入朝者具以名聞庶巖穴靡遺俊乂可致務盡搜揚之道稱朕意焉周武定業胙茅土於子弟漢高受命誓帶礪於功臣豈止重親賢之地崇其禮秩抑亦固磐石之基寄以藩翰魏晉巳降事不師古建侯之制有乖名實非所謂作屏王室永固無窮者也隋氏之季四海沸騰朕運屬殷憂戡翦多難上憑明靈之祐下賴英賢之輔廓清宇縣嗣膺寶歷豈豫一人獨能致此時迍既共資其力世安而專享其利乃眷於斯甚所不取但今之刺史即古之諸侯雖立名不同而監統一也故申命有司斟酌前代宣條委共理之寄象賢存世及之典司空齊國公無忌等或材稱人傑望表國章論道廟堂寄深舟楫用資文武誠著艱難折衝閫外隱如敵國或志力忠烈實為心膂或氣幹強果是曰爪牙策名運始功參締搆義貫休戚效彰夷險嘉庸懿績於朕心宜委以藩鎮改錫土宇無忌可趙州刺史改封趙國公尚書左僕射魏國公元齡可宋州刺史改封梁國公故司空蔡國公杜如晦可贈密州刺史改封萊國公特進代國公靖可濮州刺史改封魏國公特進吏部尚書許國公士廉可申州刺史改封申國公兵部尚書潞國公侯君集可陳州刺史改封陳國公刑部尚書任城郡王道宗可鄂州刺史改封江夏郡王晉州刺史趙郡王孝恭可觀州刺史改封河間郡王同州刺史吳國公尉遲敬德可宣州刺史改封鄂國公并州都督府長史曹國公李績可蘄州刺史改封英國公左驍衛大將軍楚國公段志元可金州刺史改封褒國公左領軍大將軍宿國公程知節可普州刺史改封盧國公太僕卿任國公劉宏基可朗州刺史改封夔國公相州都督府長史鄅國公張亮可澧州刺史改封鄖國公餘官食邑並如故即令子孫奕葉承襲省頻抗表誠極忠款言窮切至披覽忘倦每達宵分非公體國情深匪躬義重豈能示以良圖救其不及朕在衡門尚惟童幼未漸師保之訓罕聞先達之言值隋祚分離萬邦塗炭惵惵黔黎庇身無所朕自二九之年有懷拯溺發憤投袂便提干戈蒙犯霜露東西征伐日不暇給居無寧歲降蒼昊之靈稟廟堂之略義旗所指觸向平夷弱水流沙並通輶軒之使被髮左衽化為冠蓋之域正朔所頒無遠弗屆及恭承寶歷寅奉帝圖垂拱無為氛埃靜息於茲十有一載矣蓋股肱罄帷幄之謀爪牙竭熊羆之力協德同心以致於此自惟寡薄厚享斯休每以大寶神器憂深責重嘗懼萬幾多曠四聰不達何嘗不戰戰兢兢坐以待旦詢於公卿以至隸皂推以赤心庶幾刑措但頃年以來禍釁既極又缺嘉偶荼毒未幾悲傷繼及凡在生靈孰勝哀痛歲序屢遷觸目摧感自爾以來心慮恍惚當食忘味中宵廢寢是以三思萬慮或失毫釐刑賞之乖實繇於此昔者徇齊睿知資風牧以致隆平翼善欽明賴稷契以康至道然後文德武功載勒於鐘石淳風至德永傳於竹素克播鴻名永為稱首朕以虛薄多慙往代若不任舟楫豈能濟彼巨川非藉鹽梅安得調夫鼎味朕聞晉武帝自平吳以後務在驕奢不復留心治政何曾退朝謂其子劭曰吾每見主上不論經國遠圖但説平生常語此非貽厥子孫者也爾身猶可以免指諸孫曰此等必遇亂及孫綏果為淫刑所戮前史美之以為明於先見朕意不然謂曾之不忠其罪大矣夫為人臣當進思竭誠退思補過將順其美規救其惡所以為治也曾位極台司名器隆重當直詞正諫論道佐時今乃退有後言進無廷諫以為明智不亦謬乎顛而不扶安用彼相公之所諫朕聞過矣當置之几案事等絃韋必望收彼桑榆期之歲暮不亦康哉良哉獨慙於往日若魚若水遂爽於當今遲復嘉謀犯而無隱朕將虛襟靖志敬佇德音雒陽宮室創自有隋朕因其成功無所改作今屋宇湮壞者宜量加修葺使才充居處自外材木宜分賜雒州郭內貧民因水損居宅者乾坤合德爰著易之功君臣一體克成中和之治遠取諸物若舟楫之濟巨川近取諸身猶股肱之戴元首同心叶契存歿以之故諸侯列葬周文始創其禮大臣陪陵魏武重申其制去病佐漢還奉茂鄉之塋夷吾相齊終託牛山之墓茲蓋往聖垂範前賢遺則録曩昔之宿心篤始終之大義者也皇運之初時逢交喪掃除多難光啓鴻業謀臣武將競進轅門之前明德異才爭趨魏闕之下或雲雷伊始功參締搆或光華在旦績著弼諧及密戚懿親舊齒宿德委質先朝特蒙顧遇者自今以後身薨之日所司宜即以聞並於獻陵左側賜以墓地並給東園祕器事從優厚庶敦追遠之義以申罔極之懷老君垂範義在清虛釋迦貽則理存因果求其教也汲引之迹殊途窮其宗也宏益之風齊致然大道之興肇於邃古源出無名之始事高有形之外邁兩儀而運行包萬物而亭育故能經邦致治反朴還淳至如佛教之興基於西域逮於後漢方被中華神變之理多方報應之緣匪一洎乎近世崇信滋深人覬當年之福家懼來生之禍由是滯俗者聞元宗而大笑好異者望真諦而爭歸始波涌於閭里終風靡於朝廷遂使殊俗之典鬱為衆妙之先諸華之教翻居一乘之後流遁忘反於茲纍代朕夙夜寅畏緬惟至道思革前弊納諸軌物況朕之本系出於柱史今鼎祚克昌既憑上德之慶天下大定亦賴無為之功宜有改張闡茲元化自今以後齋供行立至於稱謂其道士女冠可在僧尼之前庶敦本之俗暢於九有尊祖之風貽諸萬葉告報天下主者施行皇王受命步驟之迹以殊經籍所紀質文之道匪一雖治亂不同損益或異至於設官司以制海內建藩屏以輔王室莫不明其典章義存於致治崇其賢戚志在於無疆朕以寡昧丕承鴻緒寅畏三靈憂勤百姓考明哲之餘論求經邦之長策帝業之重獨任難以成務天下之曠因人易以獲安然則侯伯肇於自昔州郡始於中代聖賢異術沿革隨時復古則義難頓從尋今則事不盡理遂規模周漢斟酌曹馬採按部之嘉名參建侯之舊制共治之職重矣分土之實存焉巳有制書陳其至理繼世垂範貽厥後昆維城作固同符前烈荊州都督荊王元景梁州都督漢王元昌徐州都督徐王元禮潞州都督韓王元嘉遂州都督彭王元則鄭州刺史鄭王元懿絳州刺史霍王元軌虢州刺史虢王鳳豫州刺史道王元慶鄧州刺史鄧王元裕壽州刺史舒王元名幽州都督燕王靈夔蘇州刺史許王元祥安州都督吳王恪相州都督魏王秦齊州都督齊王裕益州都督蜀王愔襄州刺史蔣王惲揚州都督越王貞并州都督晉王治秦州都督紀王慎等或地居旦奭夙聞詩禮或望及間平早稱才藝並爵隆土宇寵兼車服誠孝之心無忘於造次風政之舉克著於期月宜冠恆册祚以休命其所任刺史咸令子孫代代承襲有司仍準前詔詳為條制奏聞俾克本枝之盛隨天地而長久刺舉之榮與山河而無絶暴雨為災大水泛溢靜思厥咎朕甚懼焉文武百寮各上封事極言朕過無有所諱諸司供進悉令減省凡所力役量事停廢遭水之家賜帛有差天地之德平分於四時皇王之道無偏於萬物故能亭育黎庶覆燾區夏聲教咸洎於遐方爵命不遺於殊俗薛延陀真珠毗伽可汗器宇沈毅識具明允夙見時機早稟正朔忠誠峻節克著於塞外貢獻琛賮不絶於王府加以訓勗裔嗣輯寧種落俱率藩職咸慕朝風其子沙耽彌葉護拔酌達度莫賀咄設頡利苾並志懷敦確氣幹強果或深竭忠款乃心闕廷或遠經朝覲拜首軒陛言念丹誠良以嘉尚宜錫徽號用申褒寵拔酌可肆葉護可汗仍賜狼頭纛四鼓四頡利苾可達度莫賀咄葉護賜狼頭纛二鼓二仍令左領軍大將軍梁方師持節備禮册命隋故鷹擊郎將堯君素往在大業受任河東固守忠義克終臣節雖桀犬吠堯有乖倒戈之志而疾風徑草實表歲寒之心爰踐茲境追懷往事宜錫寵命以申勸獎可追贈蒲州刺史仍訪其子孫以聞天地大德覆載極於八荒日月貞明照臨周於萬物是以哲王撫運聖人垂範經邦立政之道取法於造化興亡繼絶之義靡隔於華夷惟彼北戎代居荒塞養畜牧於天山之外擅勇敢於瀚海之濱逮其末葉狂愚嗣位侵盜之釁禍結於諸華苛暴之風毒被於大漠酋豪攜二部衆離阻革面者相望於道路請命者填委於闕廷朕情切納隍志存懷遠乃令上將拯其將溺元戎才動倒戈相繼既而屠耆歸命單于反接分地之長解辮而來王引弓之民盡落而內附龍城既殄狼望遂空朕愍其破亡恕其瑕釁解縛焚櫬賜以再生收電回霜宥以寬政於是選內外之職分圭組以授之擇肥饒之地設州縣以處之開倉庫以恤其飢寒馳輶軒以問其疾苦恩侔中夏禮均舊臣十載於茲矣朕受命三靈因心百姓爰初薄伐非貪闢土之功洎於克定實宏安民之道久欲存其亡國返其遺萌尚恐瘡痍未瘳衣食不足今歲月巳積年穀屢登衆種增多畜牧蕃息繒絮無乏咸棄其氊裘菽粟有餘靡資於狐兔便可復其故庭繼其先緒歸三祠於沮澤旋十角於盧山使復會蹛林弭其依風之思重宴樂水遂其向日之歡然則左方既建右地巳設必俟君長一其號令自非蠻鞮貴種醢落忠誠何以宣布朝化輯寧蕃服右武大將軍化州都督懷化郡王李思摩器懷沈毅識用詳明早慕皇風夙效丹款故寵以賜姓榮以高爵內典徼循之重外受連率之寄譽光朝職誠朕心錫以藩號紹其宗祀可乙彌況孰俟利苾可汗並賜之鼓纛仍令就其部備禮册命突厥及胡在諸州安置者並令渡河還其舊部俾夫世作藩屏同之帶礪長保邊塞傳諸後昆明罰敕法聖人垂懲惡之道命將出軍王者成定亂之德故三苗負固虞帝所以興師鬼方不恭殷宗所以薄伐朕嗣膺景命君臨區夏宏大道於四海推至誠於萬類憑宗社之靈藉股肱之力億兆獲乂尉無虞建木棘林山經靡紀之域幽都大夏王會不書之君莫不革面內款屈膝請吏襲冠帶於魏闕均征賦於華壤而高昌麴文泰猶為不軌敢興異圖事上無忠款之節御下逞殘忍之志往經朝謁備加恩禮溪壑難滿曾無報效禽獸為心遽懷凶狡詔命之嚴稟承之誠既闕王人之重祗敬之禮亦虧自隋季道消天下淪喪衣冠之族疆埸之人或寄命諸戎或見拘寇手及中州既定皇風遠肅人懷首邱途經彼境皆被囚繫加之重役忍苦遐外控告無所又伊吾之右波斯以東職貢不絶商旅相繼琛賮遭其寇攘道路由其壅塞又西蕃突厥戰爭巳久朕愍其亂離志務安輯乃立嘻利始可汗兄弟庶令克復舊土文泰反道敗德幸災好禍間諜酋豪交亂種落遂使氊裘之長亟動干戈引弓之人重罹塗炭又焉耆之地與之臨接文泰疾其盡節輕肆凶威城池有危亡之憂士女嬰劫掠之酷加以虐用其衆毒被所部賞罰無章內外嗟怨繕造宮室勞役日新修營輿輦僭侈無度法令深刻賦斂煩重舉手動足咸罹網羅畜牧園果悉有征稅衆力巳盡人財巳竭飢寒總至憤歎盈途比屋連甍不勝苛政故老兒童思霑王澤朕受命上元為人父母禁暴之道無隔內外納隍之慮切於寢興録其舊款仍懷愍念所以頻遣使人具申朝旨勗以為善之規示以自新之路庶知感悟無煩師旅而昏迷遂性荒怠不悛貫盈之釁既稔天亡之期巳及況復文武具僚戎狄君長請倳刃者相屬懷逐雀者比肩宜順夷夏之心以申弔伐之典討凶渠之多罪拯無辜之倒懸今遣交河行軍大總管吏部尚書侯君集副總管兼右屯衛大將軍薛萬均副總管左屯衛將軍薛孤吳兒行軍總管武衛將軍牛進達等董率衆軍宏宣廟略乘驛進路同會虜庭莫不氣奪風雲精貫日月援桴懷憤拔距爭先良將奮建瓴之威鋭卒效如貔之勇冀馬燕犀猶迅雷之震擊雲梯地道若至神之變化以此制敵事等摧枯以此屠城易於反掌然朕矜哀之心有懷去殺勝殘之道無忘好生若文泰面縛軍門泥首請罪特宏焚櫬之澤全其將盡之命自餘臣庶棄惡歸誠並加撫慰令各安堵示以順逆之理布茲寬大之德如其同惡相濟敢拒王師便盡大兵之勢以致上天之罰明加曉諭稱朕意焉夫選賢之義無私為本奉上之道當仁是貴列代所以宏風通賢所以協德公忠肅恭懿明允篤誠草昧霸圖綢繆帝道儀則黃閣庶政惟和輔翼春宮實望斯著而忘彼大體徇茲小節雖恭教諭之職乃辭機衡之務豈所謂弼豫一人共安四海者也嘉瑞爰降必資至德大河效祉是為希世顧惟寡昧但增慙惕乃天地表祥宗社垂祐欲使四海隆平八荒禔福王公卿士內外庶僚宜勉修正道以副靈貺焉自古明王君臨區宇功齊天下道被生民內外無虞年穀豐稔莫不歸功上元致禮厚地騰茂實於六合飛英聲於百代今公卿在列屢屬虛心嶽牧具僚固陳僉願理在難奪敬依來請顧循諸己仍懷慚德梁皇侃褚仲都周熊安生沈重陳沈文阿周宏正張機隋何妥劉炫等並前代名儒經術可紀加以所在學徒多行其疏宜加優異以勸後生可訪其子孫見在者録名奏聞當加引擢周之宗盟異姓為後尊祖重親實由先古何為追逐其短首鼠兩端廣引形似之言備陳不遜之喻誹毀我祖禰謗讟我先人如此要君罪有不恕肇有蒸庶樹之司牧載籍所紀風烈猶存至於道洽品物功成宇縣天眷彰於符瑞人事表於隆平莫不增封岱宗廣禪梁甫榮鏡六合對越三神前聖所以垂其尊名後王所以仰其休烈蓋繇此也自火德既衰三光分裂金行失御九鼎沈淪諸華競逐彞倫大壞雖周室削平趙魏隋氏混一文軌而金革之事未戢於封疆雅頌之音弗聞於朝廷遂使至教闕如淳風莫反齊郊絶類帝之禮日觀缺升中之儀其巳久矣朕丕膺景命嗣守洪基承大亂之餘當率土之責負扆興惕納隍在慮上憑宗社之靈下資士庶之力草昧伊始援干戈以靖亂區夏既平宏禮樂以緯俗尉無警災畬有年比屋咸保其歡含氣不違其性殊方異域盡地界而來庭應圖合牒殫天符而表瑞緬懷前載詳求諸己豈伊寡德能致此乎固乃上元所叶贊也而㣥公卿士百辟庶僚固陳人祇之意請遵封禪之典推而不居至於數四文武之情彌切內外之議日聞誠請頻繁淹歷年載朕繼迹百王因心萬物上奉蒼昊義在薦功下撫黎元方祈厚福既迫茲理敢不祗從猥以眇身齊美上代永言夙志凜乎增惕可以來年二月有事泰山所司宜與公卿并諸儒士及朝臣有學業者詳定其儀博考聖賢之旨以允古今之中務盡誠敬稱朕意焉懷遠之道莫先於寵命飾終之義無隔於遐方故柱國帶方郡王百濟王扶餘璋棧山航海遠稟正朔獻琛奉賮克固始終奄致薨殞追遠慜悼宜加常數式表哀榮可贈光祿大夫令其嫡子義慈嗣位授柱國封帶方郡王百濟王使祠部郎中鄭文表持節備禮册命朕遐觀前載歷選列辟莫不貴此得人崇茲多士猶股肱之佐元首譬舟楫之濟巨川若夫搆大廈者採衆材於山嶽善為國者求異人於管庫是以陶唐有虞揖讓之聖帝也非元凱不能成茂功商湯姬發革命之明王也非伊呂無以定禍亂況乎齊桓中人之才器非濬哲漢武嗣業之主志在驕奢猶賴管仲隰朋之相平津博陸之輔既為五霸之長亦稱萬代之宗是知得士則昌失人則亂朕冕旒夙夜虛心政道雖天地效祉宗社降靈區宇晏如俊乂咸事尚恐山林藪澤藏荊隋之寶卜築屠釣韞蕭張之奇是以躬撫黎庶親觀風俗臨河渭而佇英傑眺箕潁而懷隱淪亟移日月空勞夢寐而驪龍莫兆商歌寂寥豈混迹駑駘未逢良樂之顧將育德岩穴方追禽向之遊望雲長想增其歎息可令天下諸州搜揚所部士庶之內或識達公方學綜今古廉潔正直可以經國佐時或孝悌淳篤節義昭顯始終不移可以敦風勵俗或儒術通明學堪師範或文章秀異才足著述並宜薦舉具以名聞限來年二月總集泰山庶獨往之夫不遺於版築藏器之士方升於廊廟務得奇偉稱朕意焉自古皇王受天之命建顯號於封禪揚洪名於竹帛者莫不功濟夷夏道叶人祇然後登泰山之高刊梁甫之石未有七德靡記九部寂寥而欲齊聲於聖哲垂美於篆籀者也朕承宗廟之重當區宇之責寅畏三靈憂勤萬姓雖戡翦禍亂克定遐荒而至教猶鬱刑典未措勝殘之化未洽於率土和平之風多慙於往烈是以覽經籍而自失想壇場而增懼亟寢搢紳之奏屢拒公卿之請逡巡大典荏苒歷載近者文武百僚州縣庶尹頻繁抗表殷勤固陳咸以為兩儀交泰四夷賓服禮讓興行年穀豐稔蒼昊呈符於上靈符不可以久替黎獻協心於下衆欲不可以固拒朕迫茲㣥議敢不敬從欲薦功上元大報后土升中之儀巳具省方之期有日今太史奏有彗星出於西方朕撫躬自省深以戰栗良繇功業之被六合猶有未著德化之覃八表尚多所闕遂使神祇垂祐警戒昭然朕畏天之威寢興靡措且曠代盛典禮數非一行途之間勞費不少東夏凋弊多未克復將送儀仗轉運糧儲雖存節省之儀終煩黎庶之力非唯上虧天意亦恐下失人心解而更張抑有故實前以來年二月有事泰山宜停庶夙夜自修遂其罪己之志勤恤匪懈申其納隍之情儻蒙靈祇回眷宗社介福朝廷同於大道風俗歸於朴素告成之美更思其宜仍命所司泰山有前代帝王因封禪立碑及石函玉檢之類往遭離亂被賊毀發並修立瘞藏之北方之務悉以相委以卿為寧朔大使撫鎮華戎朕無北顧之憂矣朕聽朝之暇觀前史每覽前賢佐時忠臣徇國何嘗不想見其人廢書欽歎至於近代以來年歲非遠然其允緒或當見存縱未能顯加旌表無容棄之遐裔其周隋二代名臣及忠節子孫有貞觀巳來犯罪配流者宜令所司具録奏聞儲二不會自古常式近代以來多為節限求之故實深非事宜自今皇太子出用庫物所司勿為限制汝家之冢嫡國之儲兩故有斯命以彰有殊入學齒胄則君臣之義也同之府庫實父子一體也是以君子富而不驕謙而受益奢則不孫以約失之者鮮矣勉思守道無煩致謝氏族之盛實繫於冠冕婚姻之道莫先於仁義自有魏失御齊氏云亡市朝既遷風俗陵替燕趙右姓多失衣冠之緒齊韓舊族或乖德義之風名雖著於州閭身未免於貧賤自號膏粱之胄不敦匹敵之儀問名惟在於竊資結褵必歸於富室乃有新宦之輩豐財之家慕其祖宗競乎婚媾多納財貨有如販鬻或自貶家門受屈辱於姻婭或矜誇舊望行無禮於舅姑積習成俗迄今未巳既紊人倫實虧名教朕夙夜兢惕憂勤政道往代蠧害咸巳懲革惟此弊風未能盡變自今以後明加告示使識嫁娶之序務合禮典稱朕意焉有虞受終宏肆赦之典隆周革命篤親親之恩海陵刺王元吉地維藩翰夙承朝寵陷於不軌得罪君親朕嗣膺靈命無忘敦睦同生之重既切於本枝在原之悼實纏於歲月興言泉壤思備寵章可追封巢王諡仍依舊古先哲后咸正庶官德優者爵高功多者祿厚是以經邦緯國必俟蕭曹之勳燮理陰陽允歸鍾華之望司空趙公無忌識量宏博風度峻遠地惟親賢才稱梁棟締搆霸業茂勳著於艱難弼成王道乃心竭於寅亮鹽梅是寄丹青攸屬德綜機衡聲猷具舉自升槐鉉歲月亟移固以勒美太常書忠甲令者矣宜陟中台式典邦教可司徒惟天為大資四序以成功惟王建國三台以宏化故隆漢受命吳鄧飛聲有晉勃興荀何底績開府儀同三司尚書左僕射太子少師上柱國梁國公元齡器範忠肅識具明允才稱王佐望乃時英霸國爰始預經綸之業鼎命維新贊隆平之化誠固金石勳勒鐘鼎自任總庶尹職重朝端心力盡於翼亮劬勞積於歲序而志在沖退有懷止足固陳衰疴屢上表疏然則燮揆禮閣職務實繁論道槐廷望實攸屬宜加寵命平茲水土可司空盜賊之作為害實深州縣官人多求虛譽苟有盜發不欲陳告鄉村長正知其此情遽相勸止十不言一假有披論先劾物主爰及鄰伍久嬰縲絏有一於斯甚虧政化自今巳後勿使更然所司明加採察隨事繩糾夫為政之大慎枉刑獄縱捨任心以欺衆庶罪一也知人不明委用貪冒罪二也善善未賞惡惡不誅罪三也若斯三者豈得無過以公固諫且依來請昔戾園敗德西都表其號諡楚英干紀東漢錫其湯沐斯皆屈邦國之禁申骨肉之恩也息隱王地乃居長守器運初自貽伊戚陷於禍難日月逾邁松檟成行朕嗣守鴻基緬尋遺烈何嘗不陟彼岡而靡觀瞻同株而疚懷恩備哀榮式加禮命可追復皇太子諡仍依前陵曰隱陵置令以下官并加戶守衛
