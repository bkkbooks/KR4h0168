front:
  text: 全唐文欽定全唐文卷九百三十七杜光庭九
  hash: sha256:ec701f9c9f2d07ff41945f9fccda2faac2a39ad4b42ba44be70c6027a29536b0
body:
  text: 伏以朱陵閟境南昌上宮御正陽長育之方行大道生成之化凡所祈啓必賜降臨臣以愚蒙叨逢聖日參榮禁密荷寵雲天常慮庸虛難勝恩遇恐行年厄運宿曜災凶有加臨刑剋之期有滯塞邅迍之數惟增惕懼罔敢自安輒罄丹誠虔修醮禮特希冥護俯降威光銷已往之過尢解未萌之災咎續南極丹書之更益年齡除北都黑籙之文重新祿祚克垂濟度永荷靈恩無任伏以惟地惟天厚載廣覆生成庶品孕育㣥靈坤德母儀光被萬有粵自君臣父子洎於動植飛潛厥有誠祈盍申昭告臣封境之內戈甲屢興害及邱墳戮兼嬰耄遠近塗炭人鬼不寧痛彼一方毒深骨髓念茲萬姓誠切禱祈瀝血披心仰希鑒祐伏冀曲哀虔祝俯借威靈命山川嶽瀆之神助平災沴敕雷電風雲之吏共靜郊原大開倚劍之門不隔朝天之路昭蘇疲俗洗滌深冤豈伊項籍之祠能祛蜀難無使蔣山之廟獨助晉師奉斚陳詞言興涕霣不任伏以五緯在天三元運氣上宗斗極下統人倫陰陽有休否之期躔次有照臨之數伏慮元命之內宮宿之中因遇衝妨遂成厄滯敢憑吉日虔備醮筵上叩尊靈特希鑒祐使三命九宮之厄盡獲銷禳明星暗曜之災並蒙寧息一川康泰萬姓輯和解甲偃兵年豐俗阜永虔素懇以答元慈不任伏聞垂象上元各有主宰或統軍兵之會或司氛祲之源仰矚光華繫其休戚臣封疆之內干戈逾年野廢農蠶人罹塗炭念茲冤抑痛迫肺肝是敢稽首炷香馳心禱福冀因感激俾獲照臨伏希運金方肅殺之威垂大義裁非之力助茲武旅清彼郊畿拯一川墊溺之憂活萬姓倒懸之命弓韜戈偃雨順風調百穀有年五兵永息不任伏以斗御中天旁周八極招搖所指邪正聿分今以節及上元時當考校㣥物被維新之澤萬方承煦嫗之功念此封隅尚躔兵甲生靈塗炭壠畝榛蕪當發生播植之功曠黎庶耕桑之業以茲憂痛倍切叩祈伏惟北極宮中七元籍內輟衆庶凋傷之目改一方淪喪之災克睹和平永銷鋒鏑臣或身逢厄塞罪繫星辰甘置明科以謝㣥品不任伏聞乾坤覆載陰陽有消息之殊日月照臨寒暑有推遷之候吉凶在運否泰相沿雖歷數使然有堯水湯災之變而修禳有道見返風退舍之文惟此郊原方當厄會蒸黎末泰戈甲繼興徵彼星圖實惟火曜是用歸心大道虔叩上元開太乙之壇行三五之法躡紅飇而請福步元斗以祈天所希列火騰威應星芒於上境陽光散焰蕩陰穢於下方仰福聖躬大庇川蜀人登福壽野息戈鋋同沐神功永銷憂患不任臣聞斗極居尊統臨八表指揮萬象總御衆靈杓建所加災凶自息今以封疆之內兵革尚興人未息肩時方震懼既勞備禦必廢耕桑念彼榛蕪益深憂歎敢憑醮酌重罄祈誠伏惟太宰揚威七元振令使雷車電騎掃蕩四方畢雨箕風蘇舒品物克清境域大庇生靈如臣躔次有災陰陽搆厄乞當天譴用息人殃元元丹誠仰俟昭鑒不任伏聞垂象表靈位尊北極統臨萬有照燭㣥生八十一變之威容三十六兵之神武肅清造化臨察幽明殄惡誅邪安人護國今以朱陽屆候赤帝司方南方資長育之恩四敘叶清和之節蠶功將就農務方繁而疫癘兼行鉦鞞未止民多殍仆野困逋逃既投足無場豈息肩有所叨居監護實切憂傷更因衙醮之辰再布誠祈之悃伏冀神兵助役蕩氛翳於郊畿雲騎騰威掃疾癘於閭里生靈有泰遠近無虞昏霧永銷見三蜀山川之色浮雲自滅開九天日月之光厄運蠲平災危靜息常傾丹素以副元休不任伏以六氣周流天道為生成之本七星杓準斗君為統制之元罪福吉凶咸歸校録臣以近畿未泰戈甲猶興四野靡安疾疫斯搆念茲疲瘵痛逼肺肝敢因衙醮之辰更達叩祈之志伏冀曲回聖力俯借神威垂景貺於四人息災厄於三蜀休兵偃革時泰民安厄運銷平福祥臻會不任臣以凡愚叨依簪褐修持多闕過咎易盈遣責所臨疾瘵斯搆羸形幾喪微喘偶全三洞法師杜宏廣情切本枝念深危疾式披丹懇冥叩元真果蒙降以殊休續其餘算仰荷真靈之祐再窺日月之光螻蟻力微乾坤恩重用申醮酌仰報生成伏惟聖慈俯賜歆鑒不任伏以三光垂耀五緯流輝盈縮有常古今無紊循環列次主宰㣥生影響靡常吉凶攸繫臣叨膺命秩獲履土疆惠未洽於飛沈境方躔於災沴兵鋒淩暴士庶流移千里瘡痍一方殘毒念茲憂痛實切肺肝竊惟上聖好生至真育物敢憑慈煦再罄醮祈伏希太白揚威助武功於原陸嵗星舒彩播仁澤於郊圻五辰順軌以呈祥萬類承風而納祐野無悲怨俗洽和平誓竭丹襟仰酬元貺不任伏聞斗正中天杓臨八極魁綱所指福祚必臻臣行運之中土居身位遊年之內災向離方今屬斗在南天日躔命宿仰申告醮冀獲感通願垂宰制之威以靜晦蒙之數克垂元祐敢負明恩不任伏聞南斗六宮文昌衆聖壽涯所繫生籙是司動植幽微咸資主統祈生請福益露明誠臣叨荷寵恩謬司藩部功無塵芥過積邱山而行運之中方當否塞宿曜之內併有照臨敢因章奏之壇重有禱祈之望伏冀朱宮上聖丹闕高尊垂回凶度厄之慈開出死上生之路使一境之兵銷革偃四時之雨順風調拯癘魄於窮泉拔遊魂於長夜降元和之澤濟冥漠之鄉浮雲不蔽於青天忠懇獲伸於白日元元之志仰佇鴻休不任伏聞大道昭明獨著好生之化天真慈惠偏宏濟物之仁亭育必均撫臨無失臣自惟凡陋叨荷寵榮未嘗著勳勞洊深渥澤而維鵜起起誚聚鷸為災蓋薄德而招亦迍蒙所萃三命之內別有刑衝九曜之中仍周臨照敢因元命虔叩上元伏希回此凶衰錫其禎貺赦過尢於既往解厄會於將來得傾忠赤之心上答乾坤之澤誓當砥礪以答元慈不任伏聞元象在天萬有咸照動植荷無私之德幽明承不宰之功臣早被寵光謬司藩翰誠慚薄德繼履深災郡邑凋夷生靈淪斃於茲傷痛須勵誠祈伏惟允降元休克寧疲瘵使兵旗永卷無聞冤訴之音稼穡惟豐自洽和平之化至於山川之內地分災期躔次之中天文厄運並希銷解俾獲乂康誓竭丹誠仰副鴻澤不任臣以凡微叨逢聖日荷三境照臨之賜承二儀亭毒之恩常慮迹處昏衢身居俗網修持有闕罪咎易增雖佩奉祕文遵參寶籙香燈怠惰葷濁侵淩道氣不降於百關靈官暗遷於六府由是虛邪內集疾恙旁縈夙夜兢憂懼不全濟又慮五行三命運遇凶衰兼以土曜木星仍臨宮宿顧茲凡眇素寡善功當此災期倍深惶惕是敢按河圖舊典披啓醮壇依靈寶尊文請求天像伏冀元慈俯矚靈貺遐霑洗滌過尢解銷災咎明星隱曜共介禎祥八卦九宮並祛刑厄疾患痊復邪癘蠲除增祿秩於維新續年齡於延永行年神將法籙吏兵輟罪舉功咸賜昭祐永當修勵以答元恩不任伏聞一氣肇胎三靈資始乾奇坤偶定彼陰陽金革土浮明其次舍九興於坎戌亥謂之天羅六起於離辰巳謂之地網乃二體升淪之所是兩儀代謝之鄉陽伏而不能剛陰絶而不能繼行年所歷實迫災期况天地中和圓方化育流形挺質命世降奇皆歸鼓鑄之權難逭興衰之數顧臣凡昧敢避晦蒙丙辰當厄會首臨丁已乃災期將解惟茲二嵗實抱百憂上祝元穹敢祈銷解仰惟聖鑒俯念誠祈顯降威靈大祛災釁使乾綱坤紀息氛沴於一方地網天羅解凶期於小運行歌擊壤歸聖朝朴素之風束甲韜弓副元祖希微之教永勤香火以答元慈不任臣叨荷國恩謬分戎閫西南粵壤髳蜀雄都三舍當參井之躔八國控羌蠻之域區封既廣統制斯難常慮非才有負殊寄夙夜憂懼不敢遑安近嵗以來凶災未息疾癘時起干戈日尋今按考黃圖驗求元歷分野之內太白將臨况運兵籌方迍武旅仰裁成之義仗肅殺之威佇靜四郊以康萬姓伏冀天光俯鑒聖力潛資濡渥澤於九重救倒懸於千里櫜弓解甲鑿井耕田里閭無瘥疫之家遠近有歡呼之俗長庚所指幽滯俱通即永荷昭祐之恩不任伏以斗御中天杓移列次握帝車而獨運浮華蓋以高臨吉凶得以司明罪福由其考校雖塵凡杳隔仰星晷以無階而天聽甚卑有心誠而必鑒丹襟所叩元應攸彰臣頃以災蒙偶逢艱梗道塗阻塞骨肉支離因與幼男兩地暌隔倉皇相失音信莫通惟晝祝長天夜瞻斗極冀其通感再獲團圓炷香而血淚共垂拜手而心魂俱往果蒙昭祐遽遂歸還常懷再造之恩未答自天之澤兢憂度日芒刺在躬今則玉局仙居錦都靈化下藏洞府上屬星躔肸蠁可期真靈攸會輒投勝境願展醮祈將酬福祐之慈少達敬恭之禮佇回真鑒俯納塵心小男以壬子主生微臣以庚申定命常希聖力永錫保持祛五行三命之災解宿度天文之厄得勤修勵永奉休明黍稷非馨真仙是鑒不任伏聞天覆地載資大道以生成稟質孕靈由至真而潛運用能彌綸不極生化無窮真宰主張元功統御雖太虛遼邈劫歷遐長庶品喧闐九圍曠蕩刑政繁雜分野幽深災福攸司安危是繫臣遭逢聖運塵忝恩榮授以節旄委之輔相地雄巴蜀境控羌蠻慙無綏撫之能常切兢憂之懇况舉善疸惡須用賞刑伐叛誅凶仍施斧鉞戎祀有牲牷之具賦輿有徵督之勞有土有人蓋不得已實恐詮材不當委任失宜因起怨咨遂成災沴今又土星行度對照此方地一移宮將離益部五鬼臨於坤位火曜躔於井宮又臣大運在衝破之鄉小運當命墓之嵗木既薄弱火亦衰微天符臨於行年遊行逢於絶命土方對照又在妻宮金火伏行亦居滯位木星處愁煩之宿暗曜出乖背之方垂象至明陰陽有數得無警懼以自勵修尚恐過咎易深尢違旋積因其愆失災及生靈省己撫心不遑寧息竊聞正陽之月丙午之辰是六星降鑒之期南斗定生之會滌瑕介福宥罪覃恩輒按明科願申昭謝詣元元真府玉局靈壇精備信儀肅虔香火暜日月星辰之界遍山川海嶽之司咸罄丹心恭修大醮伏冀回無私之鑒垂不測之神降彼南宮盼茲下土共流真貺俯察微誠解地分之災躔銷天文之謫見息三命五行之厄除九宮八卦之凶靜土星所照之方克承嘉祐禳地一將移之數允錫休禎黎元咸保於乂康穀稼必期於豐衍連營有泰四境無虞疫毒不侵戈鋒弭戢上願三光表瑞循黃道而福帝躬五緯順常扶紫微而拱元極龍圖永固鳳歷攸昌其有境土龍神山川祠廟共延祥祉用拯幽明至於地府陰關遊魂苦爽肖翹飛走水陸沈潛仰承濟護之恩永享安寧之祐不任伏以蜀之星躔上當鶉首蜀之分野下接坤維當申未之方在參井之度今以土星對照金火正臨五鬼方寄於二宮地一將移於益部恐政乖慈育法爽哀矜野有怨嗟人罹災眚又行年之內本命之中刑剋衰微慮成災厄敢以正陽令月丙午良辰虔備醮祈以申懺滌伏冀大開恩宥俯念精修解天文地分之凶祛三命五行之咎曲回禎貺永錫乂安誓傾求理之心以答好生之澤不任伏以天皇大帝司察萬方太乙十神巡遊八極垂災降福巨細無遺凡在君臣敢忘炯戒今以地一行位將出蜀鄉深虞刑政之門必有愆違之失惟增震惕輒備懺祈虔修香火之儀用表依歸之懇伏願鑒其虔切錫以禎祥俾境宇安寧生靈蘇泰時和嵗稔偃革韜弓克新憫祐之恩敢負照臨之賜伏以道氣運行元和亭育分萬靈而布化垂列宿以麗天凡曰含靈咸歸稟受仍俾主宰以定吉凶臣猥以庸虛叨承渥澤運籌藩閫慙無制勝之謀剖竹方州實寡綏懷之績况地連夷落境控巴賨短才常慮於闕遺雜俗尢難於撫諭惟精兢慎獲保初終既卷隼旗復依戎幕顧恩榮而益厚在循省以何安憂畏所深疾恙因作每慮積生之始以洎此身三業搆非六情結釁前冤未弭往債所躔或理務之間賞刑不當烹殺之際故誤難明或天文宿度之中有逢臨照或三命五行之內有值刑衝又今年五鬼在於妻宮天符入於財位小運則丙祿值墓大運則子水向衰金火行於身宮綱星加於驛馬皆為厄會倍切危疑所以疾苦之時冥心禱祝佇其銷解用展效酬今則萬聖垂慈衆真憫祐拯其疾厄賜以痊平仰元造以知歸感鴻恩而上答披河圖真格詣玉局靈壇備蠲潔之儀設周天大醮星辰日月畢罄誠祈地府天關遍申昭謝伏願降臨丹懇采納素誠永錫吉祥克加濟護使罪尢除蕩算紀遐長冤債和平災凶超度誓勤修奉以副元慈不任伏以大道凝華元尊布化肇分一氣品列五材終始循環生成萬有上惟劫歷資運數以推移下統人倫配吉凶而陶鑄稟形育質咸賴元功臣早慕清虛志親沖漠獲參祕籙常冀遵修昨以奉使京華經途險遠每虞曠闕冥有祝祈果蒙道力潛扶殊休密衛達秦甸有安貞之吉回蜀城無敗纍之憂仰感靈恩實思昭報今屬重陽懿節甲子佳辰虔備菲誠恭申醮禮伏冀神威俯鑒微願克酬採納丹襟頒宣洪澤使罪尢蠲蕩冤債和平災咎清消福祥臻會事親奉國常蒙憫護之恩守職進身永荷真靈之貺不任伏聞大道孕靈天尊演化乘機誕瑞命世降賢所以匡國濟時宣功利物稟星辰之正氣總嶽瀆之英華莫不受命上天凝神中土恢宏器業拯祐生靈臣以節度使琅琊郡王生屬休期纍承聖澤以武威扶持唐祚以忠節翼贊睿圖光啓中興克安天步貢賦常盈於內府明誠首冠於藩維推此勳庸宜承禎祐今以誕生令序禱福佳辰輒備信儀虔修醮禮依太乙祈真之品詣真人朝斗之壇香散虛庭燈繁靜夜傾心上奏冀獲感通暜垂象以冥思遍真靈而醮祝伏願星躔日域地局天司衆聖回光萬神昭鑒照祥符而延巨貺開壽域而懋鴻勳永佐聖朝長扶帝座然願龍神叶贊川境安寧百穀滋豐五兵韜戢俗洽和平之美年無災沴之虞動植幽明同臻道化不任伏以大道垂慈萬靈分職陰陽布化星象垂文照燭幽明裁成品彙主張有度罪福無差臣獲以塵微仰蒙覆燾謬叨寵祿早忝恩榮久統師徒仍分符竹實慮才輕任重福過災生夙夜兢憂不敢寧處又以今年行運天符入於中宮寄王之方復臨大運况驛馬為五鬼所對小運與大運相衝生月及本命之辰皆遇土星所歷遂成災疾未獲痊平省已循懷伏增憂懼竊聞天曹上聖主籙死生北斗南宮司明罪福是敢披心瀝懇拜醮希恩虔詣靈壇精修奏薦雖物儀單菲而誠願拳勤伏惟萬聖衆尊開恩鑒祐赦臣積生罪咎解臣三命災凶落北斗之死名上南宮之生籙銷平厄會和釋冤仇疾苦蠲除祿算延益誓勤修勵以答元恩不任伏以大道生成陰陽亭育主張有度罪福無遺臣叨荷恩榮常增戒懼雖側身思過省己捫心每虞操履之間難免纖微之失今年三命之內土木氣微行運之中命祿皆薄天符臨官祿之位遊年當絶命之方大運則土曜所加小運乃元辰所主計都居鈍滯之宿金星入乖背之鄉旦夕憂兢恐為災厄是敢按遵科典精潔醮祈望靈化以馳神仰元穹而勵懇伏願天司地府九曜南宮克鑒丹誠俯垂元祐賜臣自新之澤赦臣既往之非解五行三命之災銷列宿暗虛之厄罪瑕清滌冤債和平遂推公去己之心傾奉主事親之懇公私昭暢家眷康宜暜及存亡咸希福利不任伏聞天府地司主張命籍南宮北斗統籙死生三官持考校之文五帝領裁成之籍顧惟下土實繫上元况乎處世立身善功難著乘非蹈過罪目易盈早忝殊榮靡申續效或理務有刑章之失或專城有賞罰之差積尢違於地府天曹結罪咎於星躔日域曾無悔謝冀遂蠲除又自行運之中方當厄會火星飛於小運天符入於中宮水曜伏刑厄之鄉土星退愁煩之宿祿火雖王辰土尚衰數年以來疾苦未減元元之懇實切憂惶竊惟上聖至真垂慈育物冥心注念有感必通輒憑香火之緣精展醮祈之禮虔誠悔過稽首希恩伏惟愍鑒庸微俯宏慈祐解已成之災厄赦既往之罪尢南斗延生北宮落死潛增年算克賜乂安疾瘵痊平眷屬康泰即永荷衆聖再生罔極之恩不任伏聞大化權輿元精剖判生成天地陶鑄陰陽正三統以疏基役四時而成嵗由是萬靈受職五氣分鑣天府地司領生校籍罪福以之詮敘報應以之弛張毫末無遺古今不紊况復上標躔次下制山河隨運歷而慘舒因恭惕而昭戒仰窺元訓得不稟修臣夙荷天慈克符睿奬峻台衡之位提斧鉞之權玉律金科慮爽重輕之信五申三令慙乖訓撫之宜雖盡力匡君傾心許國翦長蛇而復宮闕清巨祲而息戈矛再拔城池頻摧寨壘變蟻結蜂攢之俗穆為賓向化之人三蜀乂寧四民和穆實乃上資聖力明稟靈恩猶恐政理或虧罪瑕難逭審已或違於道德遊心未契於神明或分野災期或行年厄會臣今年小運逢於劫殺大運遇於天符土曜對於身宮行年沖於命位每懷憂戒思展懺祈竊以丙午良辰是南斗降真之日六宮衆聖主籍是司輒申醮酌之儀願達依歸之懇伏冀天關流貺斗極延慈赦既往之尢違錫將來之休祐災凶弭息境宇安寧遠近昭蘇龍神輯睦風雨均暢疾癘清銷以俗泰為嘉祥以年豐為上瑞忠以扶於社稷靜以答於神祇虔肅丹誠上副元澤不任
