  text: 全唐文欽定全唐文卷四百五十一潭字源梁人天寶十三年進士官陸渾尉
  hash: sha256:c1a6f9a8db3b19748477486807d72dd6b7a535f0f855374a63084adb6813f5ce
  markers:
  - {type: head, offset: 14, content: 喬潭, id: KR4h0168_NFKB_451-h1, level: 1}
body:
  text: 南陽豐山有九鐘焉霜降則鳴斯氣感而應也潭忝預少宗伯達奚公特達之遇擢秀才甲科庶幾人間有是譽處然南陽即公隱居之舊地也故為霜鐘賦以廣知音詞曰豐山之峰巉巖積翠之石森爽凌寒之松上無鳥飛下無人蹤深杳杳以靜謐有天然之古鐘兩欒神資九乳靈化寧失制於侈弇豈遺音於窕摦每簴器以自間常宿懸而不下動於耳而藏於心必高秋之良夜於是泬寥兮日暮而天晶蕭瑟兮霜落而風清爽氣無眹前來滿盈跳然出復鏗爾有聲信不擊而不考能大鳴而小鳴始則含胡擁鬱旋復充詘紆閒若往若還徘徊其間爾其舒肆奔放長齊遠暢乍浮空以紆餘更觸物而瀏亮入林蕭蕭在水湯湯泛濫淺瀨聯帛丿糸疏篁夜鶴怨兮彌苦寒猿悲兮更長餘韻舂容隨風悠揚繞於洞庭浮於瀟湘梧楸紛以離披蒹葭颯其蒼蒼及夫夜已艾兮彌靜山無人兮月冷初肅肅而自凄復硠硠而虛警其動愈出其來甚徐合於元化遊於太虛轉遠而盡誰知所如聊獨立以傾聽恍若失其躊躇聽不及已想存其餘方其寒氣曉集鏘然應急發越林巒周流井邑前聲未盡後韻相及羇臣之空館屢來思婦之高樓偏入莫不恍然驚夢歔欷掩泣夫鐘之應霜也應以無心士之知已也貴其知音不鼓而鳴者其聲遠不言而信者其分深故自然之聲無假於煩手特達之分不資於騰口吾欲徵華鐘喻良友懷音淵默藏器虛受可以適南陽待清霜之一扣亂曰風籟起兮喧長薄霜鐘鳴兮動哀壑合大塊兮聲無作雖有聞兮常寂寞色之真者尚乎白質之細者珍乎絲真則貞而潔矣細則積而多之故君子輶德是務清以自持將經綸以濟物先組織以修詞惟絲之故不乎素組以飾馬言好善而不忘紽之在羊時退公之有度始也重蠶事終婦功促季月候戾風爰求柔桑寧止於十畝既登分繭乃布於三宮至若三盆既繅八月成績方勤水練爰去地尺晝曝於日吸太陽之光華夜懸諸井濡厚載之靈液於是典絲瞻臨㡛氏引繹引之於手如皓鶴之飛承之以筐若凝霜之積既而嬪婦化理經緯縱橫當軒兮婀娜之織弄杼兮軋軋之聲映羅袖而增麗度金梭而轉明每知白以自守亦含章而可貞夫以白能受采文匪勝質故公孫戒於從微墨翟悲其患失青為轡兮非擬朱為繩兮未匹珍蠶恥越鄉而來獨繭嗟自園而出唯彼蚩蚩之喻無愧皎皎之實乃續曰絲之素兮貞且吉人之質兮清且一若見用於當時寧七襄於終日元和秋七月羽林裴公獻戎捷於京師上御花草口咢樓大置酒酒酣詔將軍舞劒為天下壯觀遂賦之其詞曰將軍以幽燕徑卒耀武窮髮俘海夷虜山羯左執律右秉鉞振旅闐闐獻功於魏闕上享之則鐘以悍簴鼓以靈鼉千伎度舞萬人高歌秦雲動色渭水躍波有肉如山有酒如河君臣樂飲而一醉夷夏薰薰而載和帝謂將軍拔劒起舞以張皇師旅以烜赫戎虜節八音而行八風奮兩階之干羽公於是乎貝胄朱綅而作色虎裘錦裼而攘臂抗稜威飄鋭氣陸離乎武備婆娑乎文事合桑林之容以盡其意照蓮花之彩以宣其利翕然鷹揚翼爾龍驤鋒隨指顧鍔應徊翔取諸身而聳躍上其手以激昂縱橫耀穎左右交光觀乎此劒之躍也乍雄飛俄虎吼搖轆轤射斗牛空中悍慓不下將久歘風落而雨來纍愜心而應手爾其陵厲清浮絢練敻絶青天兮可倚白雲兮可決覩二龍之追飛見七星之明滅雜朱干之逸勢應金奏之繁節至乃天輪宛轉貫索回環光沖融乎其外氣渾合乎其間若湧雲濤如飛雪山萬夫為之雨汗八佾為之慙顏及乎度曲將終發機尤捷或連翩而七縱或瞬息而三接風生兮蒨旆襜襜雷走兮彤庭煜煜陰明變見靈怪離獵將鬼神之無所遁逃豈蠻夷之不足震懾嗟夫蘭子之迭躍其技未雄仲由之自衛其舞未工豈若將軍為百夫之特寶劒有千金之飾奮紫髯之白刃發帝庭之光色所以象大君之功亦以宣忠臣之力或歌曰洸洸武臣耀雄劒兮清邊塵威戎夷兮率土來賓焉用輕裙之妓女長袖之才人天子穆然詔伶官斥鄭衛選色者使覘乎軍容教舞者俾觀乎兵勢激楚結風發揚蹈厲僉謂將軍之劒舞古未之制穆王與偓佺之倫為玉山之會乃御雲輦張華蓋飛龍騤騤和鑾噦噦警清蹕傳虛籟忽兮迢遙漫若天外於是乎徙倚西望逶迤北遊梁弱水跨瀛洲析若木以為珮采琅玕以為羞俾幽荒窮僻有車轍馬跡經銀臺而右轉肆玉軑以東適停羽儀乎此中觀仙聖之圖籍既而浮莽蕩躋崚嶒神靈儼其高會容衛紛其上騰若光若滅賁然來登觀其亭亭太虛不可彌度石室靈造玉堂天鑿寶牒有融仙經惟錯蕩青簡兮緑字煥瑤緘兮金絡雘以蚪龍拂之鸞鶴為列真之策府亦太一之延閣覽之而㣥聖會同拔之而萬古昭廓且藏書為寶鎮物為雄小石林之岝峉陋玉樹之青蔥赫曥曥高崇崇祕精義乎其中何必登隱弅拜崆峒挹方壺而訪道歷秦望而為功者哉至如窮地之險極天之峻謺素九成攢花萬仞非神轡之六駮孰能倏而驟進或歌之曰彼天子兮塵外鑣登靈臺兮意飄飄吾君得道兮異於是不日求兮自逍遙以石渠為㣥玉之處幸校文之見招秦稱百二鎮為太一合水臼橫空嶔岑蔽日豈王褱寶之攸産蓋雲雷之自出宜其密爾王甸雄茲帝京敗葉風警高秋氣清時雨夕歇歸雲晚晴俯枕曲水前臨直城山半隱而半見雲乍低而乍傾其趣可賞而不極其容可狀而難名爾其沉陰始解靄䨴初歸回日猶重因風則飛其始也峩峩巍巍千巖萬嶺稠謺而相感其漸也紛紛霏霏齊童趙女並舞而垂衣忽天澄而地廓鬱氛氳于翠微別有容與之勢輕盈之狀日下空籠天邊引揚始悠悠於緑野漸羃羃於青嶂洛川神女何以踰巫峽佳人不能上雖更僕而非久仍移景而堪望落日將曛山銜斷雲緑氣陰鬱嵐光氤氳橫截高巖驚數峯之頓失却臨幽石與殘雪而無分乃為歌曰節彼南山兮人所矚施此雲雨兮濟君欲信軌物之無奚百姓之不足徘徊不去乃賦歸雲之曲曰歸雲之狀兮不一歸雲之趣兮難儔雲不以朝晡而異賞士不以前後而異求誠在位之如是知夫鴻漸之高秋君子修辭以干祿祿或不至居常以俟命感而遂通抑亦莊生不射故為破的賦以喻其詞曰飛衛學射於逢蒙希其術窮搜董蒲白羽之箭獲燕角緑沉之弓悵望隴雲徘徊朔風以為隼必獲於墉上雀無全於彀中或曰人將觀德子盍呈功乃見於諸侯閲之州序獻於天子臨乎澤宮自上而下陳其比偶歌騶虞奏貍首其或少算從而進酒於是乎擇素士張畫侯韜朱膊捍韋韝既垂櫜以弦弧亦啓箙而抽菆內審其志外專其目釋思其平去務其速落殘月於象弭飛明星於金鏃宜易易而獲禽翻兢兢而失鵠師哂之曰殆矣王庭之賓胡為先利其器而不反求其身乃杜門三年猶乎家人聽之以氣視之以神秋毫如山蝨心如輪高其小物申以歲貢從容君所無復命中不知矢之所加弦之所控不知引之而滿縱之而送以無心為心若夢不夢斯焉而遽發騞然而通洞洞之者是為中的中之者細若毫芒乃能匪左匪右不留不揚絶心乎後牢落判散亦何有四方是時也君子觀之貴其得一小人視之多其中質九賓之衆毛豎骨驚陰幽鬼神股戰頤栗固可使朝肅慎面先零變幽都柔南溟至遠無外罔不來庭夫以有形之器猶能破的況天機為弧大直為矢而不能破其夷狄故事無矜功理在冥跡不射乃師之益吾將為益呀厚地而濫涌者有河東之瀵泉坼陰開竇沃日浮天初泊沒圓衝沸高湍於柔祗之下復逶迤遠注散餘波於馮夷之川為神龍窟宅之上而致美為陰陽蓄泄之所而通元將海日泓浤而昭此豈坤儀挺拔以隳焉來何所以去何所止始開雙瀵發輝於汾魏之郊竟助洪流歸潮於渤澥之水借如夜色初升空光下凝繁星映而珠滿新月入而鈎澄洎乎風駭霧㪍烟涌雲蒸則有鬼神倏閃以恍惚蛟螭鼓怒以噴騰物之與詭怪孰可得而備徵意以為潛虛洞決脈流泒別雖一河有隔終陰隲以相連故數眼分開涵碧虛而共潔未見徹字官韻是以百尺澄兮四空皛珠胎明兮沙岸皎洗沸烟埃蕩漾魚鳥亦能凉生朱夏氣暖元冬守謙下以含道順畎澮以利農道則以物為賓水則假利於春人有情以利水水無意以求人人之自僞我豈非真故至人以水為德以心為鏡鏡雖明不利於人水至平不潛乎性故瀵之為澤也廣泉之為鑒也淨若壅而閉則澤不能及物混而濁則鑒不能自正故選士者象清瀵以含虛懷才者但明心而未映苟能酌憲於茲泉則可以相鹽梅而翼聖千里之外設方伯帥其屬屬有長今之縣尹焉故縣之庶富尹以賢傑不可冗而庸也自齊桓匡合制我饒陽歷戰國以還遂美其城邑西邇全趙東拒河間燕之南郊冀之北土其有呂尚之遺風乎多奇士好帶劒侈服多佳人善彈弦跕屣其地虜口近擊柝之虞其川滹沱有泛舟之役廣輪七十里編戶二萬計行或擊轂市或駕肩日中奇贏雜弊為窳機女狹其幅利染工多其姦色業不可廢訟由是興非夫猛以濟之則不能用乂宵人課居異政固亦明已我茂宰裴公河汾鼎族公卿門子識經之文緯之教才設而耆幼歸心刑不施而權豪斂跡惠行為膏雨令出為清風君子謂裴公於是乎君子其高蹈近密翰飛清冥未可涯也余味之久矣豈縣公能事而屋壁不書召彼故老詢於前政莫知其數遠者闕如權輿先天置郡之後凡名士改轉列于左偏庶幾將來亦克用勸會昌行在也新邑作焉主簿糾曹也我公吏焉公名摯字某由祕書正字而拜初蒙泉祕湧於山下陰火潛燃於地中是開湯池以御宿獲靈符之三載有詔留之冠新豐渭南而為畿縣以明年復詔廣之齒萬年長安而為京邑非良才無以紓劇非美誠無以鈞賢邑改其名官遷其秩宜矣北陸寒苦東郊豫遊萬乘入郛百司在宇溫泉之宮齊乎下集靈之臺禱乎上物或過求難於抱影事或倚辦急於奔星雖務分官聯而我實綱紀編王侯於尺籍惣豪猾於伍符皆此之自闕疑以簡書追胥以薄書詰盜皆此之自決縣大夫無能專達野司寇不獲僅成咸在公之鈐鍵矣不言而政每游刃不速而人常應弦申之以豐盈甚都加之以藻麗尤絶非鄭桓公之邁德不存孝孫非少宗伯之允文不有令德籲懷茲邑必復康侯進吾往也夫仰東井倉期天帝山木冬繁其浴日之溫流乎水雲晝積其濯龍之靈液乎矧乃才之甚器之甚游泳恩波膏沐聖澤將濯軒拖紅顧盻千里豈俟辭蒲而階漸我君子謂是言也潭忝以詞賦見知春官欽惟教忠即簿領之能事敢序施政有門人之直詞乙酉歲抄志於南軒之東壁誰謂來者不承乎權輿自鳥鼠穴者茲水廣矣依鳳凰城者茲橋壯矣水朝巨海而不竭橋通大路而居要不然豈自秦至我唐六千甲子而猶存也稽厥宏造率茲帝圻候天根之見當農務之隙司金司木鳩而積也水工木工速而至也揮刃落雪荷鍤成雲京兆尹紫綬而董之邑吏墨綬以臨之遠邇子來結構勿亟無小無大咸稱天休經之營之不愆於素丹柱插於坎陷朱欄赩而電炫乃虹引成勢猶雀填就功連橫門抵禁苑南馳終嶺商洛北走滇池鄜畤濟濟有衆憧憧往來車馬載馳而不危水潦起漲而轉固人思啓行吾其能濟赩赩赫赫轟轟闐闐且周穆之駕黿鼉振千祀也東明之聚魚鱉稱一時也孰若我由之而必達憑之而必安若以匹敵夫何遠矣潭遂因行邁覩茲崇飾將刊石以表跡敢搦札以記事赤奮歲流火之月也登黃龍古塞望洪河中流巋然獨存大浸不溺者媧皇陵也夫巨靈擘太華跖首陽導河而東以泄憤怒雖有重邱大阜險狹之口罔不潄之為黃壤汨之於旋波不可復振奔崩而下矣女媧氏已然之後豁爾之衝天險束厄風濤鼓作乃能中乾外禦特立萬年其憑神可知也水無盈縮之度陵有高卑之常霖潦漲之兩涘沒矣於是乎不為之小而就其深旱暵滲之孤嶼出矣於是乎不為之大而就其淺非夫巨靈壯趾以固本河伯高肩以承隅胡然動靜如因其時升降不失其則羅浮二嶽以風雨合離蓬萊五山以波濤上下不復故道遂違常流甚相遠矣君子曰夫能屠黑龍涸九州況乎一水之上而自為謀夫能斷鼇足立四極況乎數仞之高而自為力神人之異昧者難知密邇山谷森羅物象莽莽蘆渚寧非止水之餘嶄嶄石林猶有補天之色搖演空曲精靈若存且夫上無積草表以孤樹常感風氣纎條悲鳴若冥應肸蠁鼓簧而吹笙由是憧憧往來無不加敬山有梅栗關吏羞焉水有菱芡舟人奠焉冢之木無或斬焉陵之土無或抔焉是則馨香已陳而樵蘇自禁矣故聖人取薄葬去厚送驪山之銀海魚燈虎邱之金精龍劒錮之其內散之其間適為大盜之守未足藏身之固彼橋山帝邱九嶷會稽皆因山而墳未聞其赭者余謂媧皇受命在火火以示水谷不為陵開門負固日用其力不然其隙地豈必封崇乎是故觀而志之為城冡後記冉字茂政天寶中進士授無錫尉王縉帥河南表掌書記纍遷右補闕臣某言中使某至伏奉敕書手詔賜臣及兵馬使都虞候冬衣各一副拜受綸言跪承珍服荷同山嶽懼比冰淵臣某中謝臣功微草芥寄重藩條每懷尸祿之羞實負曠官之恥豈謂天文回照不隔於遐方御府頒衣更蒙於陋質傍沾偏將曲被殊私挾纊既及于三軍酬恩將期于萬死無任云云臣某言伏奉聖恩賜臣冬衣四襲跪捧驚喜抃躍交馳臣某中謝臣功效微薄任遇寵榮使降專人衣裁御府寵光既極恩已及於解衣雨露既濡德又承於挾纊實亦發輝陋質煥赫私門未知此生何以仰報謹當訓勵師旅式遏邊陲用宣力於百身酬鴻私於一顧無任云云臣某言某月日中使某至伏奉敕書手詔並賜臣冬衣一襲者清風早至白露初凝方思挾纊之溫忽報頒裘之禮跪拜受服形魂惕然臣某中謝臣學非博古才不動衆幸逢開泰列在方隅天高地厚未知所答而時雨霑洗太陽照燭王人捧詔每降於上天御府賜衣不遺於下土既其輕暖加之麗密束帶而立周旋有光驚寒沍之難侵荷威靈之曲被無任云云君子窮孔釋之名理極歌詩之麗則遠墅孤塢通舟必行魚梁釣磯隨意而往夫越地稱山水之鄉轅門當節鉞之重鮑侯知子愛子者將解衣推食豈徒嘗鏡水之魚宿耶溪之月而已
