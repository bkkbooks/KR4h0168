front:
  text: 全唐文欽定全唐文卷二百十八崔融二
  hash: sha256:8930575bfb45adc0d6ffa7d22fb0ed8d624cd87232044ba8759fdcba5dcd1650
body:
  text: 臣某言伏見雍州司馬徐慶稱所部有嘉麥一莖六穗纎芒濯露疑因黑壤之宜香稼搖風若吐黃金之色豈非靈心昭應睿德感通降之自天何必來牟之詠嘗之于廟先符孟夏之時凡在含生相趨動色臣謬當居守肅奉宗祧一穗兩岐徒説張君之詠十畝千石方輕范氏之書仰天意而增歡顧人心而載躍無任喜抃之至謹附起居使某官某奉表陳賀以聞臣某言臣聞惟德動天無遠而不格惟神感物有來而必應伏惟天皇提乾象運斗柄戴黃屋而臨太階正紫宮而開列室伏見某官奏稱石門元谷內玉山宮側秋水漂木三萬餘根林衡悚迫匠人驚視仙桂來於月中靈查下於天上昔開陽門之肇建飛柱潛移太極殿之初營浮梁遠至論其壯觀猶尺燼之窺尋木喻以皇家若牛涔之望鼇海方見淩雲之構匪日而成負黼扆而朝百神垂衣裳而會萬國盛矣美矣輪焉奐焉臣德謝元良濫膺儲二寢門來謁常取於雞鳴大厦既成竊自歡於雀賀不任鳬藻之至謹遣某官某奉表稱賀臣某言伏承某月日芝草生於乾元殿瑞命天來符祥日至煌煌三秀分芰井而攢柯煜煜九光間梅梁而吐葉晉都宮閣何必靈芝之臺洛邑山川居然密芝之地中賀伏惟天皇天臨海內帝有域中兼漢制而宅兩京用堯心而加百姓神精下降洽至道於邱陵靈液旁霑被深仁於草木觀其如蓋如閣如日如星得五方之氣象合四時之景色仙人在上則車馬疑飛神龍居下則風雲不去謂蓬瀛之海到一作列即崑閬之山開魏皇之雙幹莫儔漢帝之九莖為劣可以薦郊廟可以觴公卿臣謬踐儲闈祗膺守國不獲親承左右目覽休徵雖玉脛延齡在神仙而可致而刀圭入膳視朝夕而猶賒是用心馳仁壽之前慶集肅成之下無任抃躍之至謹遣某官某奉表稱賀臣某言臣聞虞舜五帝也夏禹三王也應歷數則星昴告期度水土則河精授象故知至誠上感無往而不通神道曲成有來而先見伏惟天皇運斗極平太階漏德澤於海河散皇明於日月煙雲郁郁鳥獸蹌蹌百寶用而銀甕滿五穀豐而丹甑出化之遠及陰陽不測之謂神德之廣被天地無名之曰道嵩高維嶽洛陽下都此焉符理之所古則仙靈之地伏見洛州牧相王所奏嵩山下頂封禪壇側掘得石龜負圖篆文一百六十字者臣亟聞其言矣昔者黃轅東省河獻龍書蒼頡南巡洛呈龜字古猶今也其若茲乎夫惟氣挾風霜文含星象玉經山上匪藉旁求銀丹地中居然暗發頌國祚之長久孕育於萬八千年歌卜筮之叶從牢籠於六十四卦況復高臨泰室近控洛壇佇降王者之封常有君來之望由是神工不召若鐫金鏤之名天意潛彰似刻銀繩之篆豈與玉龜在泰山之上莫覩其祥石龜出吳江之右空傳其迹可同年而語哉臣才謝元良忝當儲二三靈眷命預聞東序之圖萬國歡心願奉南山之壽無任悅豫之至謹遣某官奉表稱慶以聞臣某誠歡誠喜云云臣某言臣聞德合天地仁之所及也深道貫神明孝之所置也極故有元功肸蠁靈命氤氳瑤光發辰象之精金色吐陰陽之秀伏惟天后化含萬物訓正六宮天下被塗山之音海內仰河洲之教今月某日使某至伏承芝草生於東都太原寺舍利塔屋下芝英繞殿暫疑王母之臺芝草成田聊比宓妃之館其蒂紫其莖白霑濡雨露之津搖動風雲之氣斜臨網樹分貝葉而駢開近對輪池接蓮花而倒下豈與夫生於石室空傳好道之言産自珠宮徒事不經之説可同年而語哉臣濫承天祚多慙國本始欽元澗之祥更喜黃雲之地頌聲無輟在郊廟而方傳御膳有憑俯神仙而何遠臣子之慶倍百恆情無任欣抃之至臣某言臣聞堯舜推心諒因於百姓禹湯責己必在於庶人頃以炎亢逾時資儲頗乏天皇情勤戒慎務切憂勞發倉廩以賙窮罷珍羞而酌損紅粟未阜愈兢御朽之懷白粲有形特軫推溝之念爰降恩旨俯加寬恤凡在生靈不勝鼓舞然以和風所被蘭艾同榮膏雨所流公私並潤徒刑之輩已沐於深慈杖罪之流未霑於厚渥且五刑之內笞坐為輕兩造之間原情可恕時當慘徑命甚漂浮因茲決罰或從顛躓伏乞迎春布澤應天道而無違任地成功順人時而不奪使三農有望萬物知歸臣濫守儲闈叨陪帝幄乾坤覆載荷至德而徒深日月昭明在末光而何助無任區區之至臣某言臣聞法天之道義屬於有餘象地之宜理存於益寡頃以咸城近縣鄜市傍州頗積風霜或侵苗稼天皇兩儀合德百姓為心發倉廩以賑貧人垂雨露以滋微物俗荷財成之施家懷亭毒之恩臣濫奉宗祧親承覆載歲時衣物咸憑府藏之餘朝夕膳羞必佇饔餼之辦過此以往臣亦何求但知問豎寢門尊師胄序魏兩文儒之盛竊所係心漢儲湯沐之資未嘗留意但關輔之地萌庶孔殷丁壯受田罕能充足所以水旱之歲家室未豐正末端本思有裨助臣家令寺有地九百餘頃特請回授關中貧下等色雖地非安邑寧期千戶之封而價等露臺虛費十家之産伏乞皇恩遠及聖澤旁流矜臣愚效遂臣誠請謹遣某官某奉表以聞臣某言臣聞心有所至諒在於聞天事或可矜必先於叫帝庶人不道徙竄巴州臣以兄弟之情有懷傷憫昨者臨發之日輒遣使看見其緣身衣服微多故弊男女下從亦稍單薄有至於是雖自取之在於臣心能無憤愴天皇衣被天下子育蒼生特乞流此聖恩霈然垂許其庶人男女下從等每年所司春冬兩季聽給時服則浸潤之澤曲霑於螻蟻生長之仁不遺於蕭艾無任私懇之至謹遣某官奉表陳請以聞臣某等文武官若干人言臣等聞太平之代天地合而流津至德之時陰陽和而布澤所以三農滋殖百姓阜安伏惟天册金輪聖神皇帝陛下寶命絪縕元期肸蠁包混元而建極宅造化而開階德教布濩仁聲洋溢增高益厚己修中嶽之儀順時班令更緝正陽之禮近以少愆甘澍親發至誠懷宋景之一言採殷湯之六事德音才降靈心允協捧瑤緘而風起迎寶字而星流雲不崇朝復三千之藥草雨必以夜通百億之江河遍高下而同霑在公私而並及陳留雨穀譬此非多櫟陽雨金方斯未重邦國延有年之慶黎元罷望歲之憂臣等中賀伏願陛下凝神保和頤情養壽復鮮庖之舊膳進鶴鼎之常羞使芝英有駐液之期萐莆知送涼之地則光天之下率土之濱孰不欣戴孰不幸甚微臣等幸逢休運預沐恩波混虞獸而同歡比齊禽而纍抃無任悚荷之至謹詣朝堂奉表稱賀臣某等文武官若干人言臣聞至德之運必有告聖之符大道之行必有通靈之應故虞舜氏作五老出遊於河渚周武勃興四神來朝於洛邑伏惟皇太后陛下補天為盛配地居尊體國經野肇建惟新之業應天順人果得非常之事伏見某日敕虢州閿鄉縣界老君見并授塢元宗語皤然鶴首至哉龍德若遊渦水之年疑往流沙之路敘皇威之有截論國祚之無疆道可以濟天下功可以侔造化元言妙鍵關令受教而先迷神理希微河公願談而莫測方驗老人見於南極但謂承天黃人遊於後池止云乘土固不可同年而議也臣等豫覩嘉祥早參簪笏惟神降福欣承帝系之隆惟德洞冥願奉元元之慶無任感悅之至謹附某奉表稱賀以聞臣某言臣伏奉久視元年十月十日墨制以一月為正大赦天下服周之冕衣冠混於無外行夏之時正朔覃於有截伏惟皇帝陛下天地合德歷數在躬交日月於龍躔會風雲於鳳紀取新之化首出於九皇除舊之恩曲成於庶類加以載懷孝享肅事天田休聲動於萬國盛禮懸於百代凡在形氣孰不昭蘇微臣慶偶時來榮沾日用同草樹而知樂類鳥獸而增歡迹雖限於一隅心每馳於雙闕抃舞昌運倍百恆情不任屏營之至謹附賀正使某官奉表稱賀以聞臣某言伏奉詔書上御武殿有慶雲映日見於辰巳之間肅奉休徵不勝抃躍中賀臣聞諸瑞應圖曰天下太平則慶雲見大子大孝則慶雲見伏惟皇帝陛下早朝宴坐憂勞庶政遠無不肅邇無不懷神感潛通至誠上格涼秋中月滯雨移旬天心合而喜氣騰陽德動而愁陰歇文章郁郁惠日照而成彩花花蓬蓬晴風搖而不散雖復紫雲來漢皇殿白雲入殷帝房校其優劣疇以為喻臣運奉休明榮沾刺舉千年多幸已逢河水之清百辟相歡重偶叢雲之曲不任悚躍之至謹遣某官奉表稱慶以聞臣某等文武百官若干人言一昨伏見御史中丞吉頊稱某日承制推法司斷事惡逆者會赦不免謀反者會赦從流主上以為輕重不當陷人入罪制曰君親無將將而必誅安有忠孝同極而流罪異貫若此者豈欽恤之意邪旋命主司奏上沿革謹按貞觀律唯有十卷其捕亡斷獄兩卷乃是永徽二年長孫無忌等奏加果非庭堅所制百寮蒙瞽一朝開鑿聖鑒元通有如影響自發德音之後每夜觸處有甘露降者臣等中賀臣等聞刑罰者人之鞭策號令者國之舟車所以懲惡止姦輔政助化故軒轅之為君也設法而天下安樂陶唐之為帝也察令而天下昭明然則不令而誅不教而殺是虐人也法不勝姦刑不制罪是陷人也有以知懸之象魏布以都鄙是謂禁人為非銘之鍾鼎鑄之金石是謂丕天之責為人上者可不務乎若乃前主所是疏為律後主所是疏為令事有不合於古不務於時則弛而更張矯以歸正正朔三而改文質再而復王禮不相襲帝樂不相沿夫何為乎亦云適時而已惟天册金輪聖神皇帝陛下躬明哲之性秉淑聖之姿順風雨以發生乘雷電以震耀推功天地所以告成太室致孝祖考所以宗祀明堂陳寶鼎於帝庭正土圭於王邑能事畢頌聲興冤積之氣不彰刑殘之尸復育斷獄四百愈鑒寐於淳源科條三千尚劬勞於畫象日者有司奏牘議事不明大聖當樞囚人軫慮但臣之事主猶子之事親父子則身體髮膚君臣則股肱元首出忠入孝義在俱全履霜堅冰法無異罰曲禮垂教子處汙宮之條大傳立文臣從瀦室之坐何以才經赦宥頓隔刑書反逆首條而遂生惡逆末坐而猶死下上簪履顛倒衣裳遂使吏生淫巧人無常禁逆節所以時萌凶黨由其或在夫立殺止殺制刑息刑重其死然後生峻其法然後禁禮以齊君子刑以齊小人非惟聞義而輸忠固亦知教而遷善斫雕為朴自然登至道之初墨幪赭衣何必獨上皇之代銓也法也念茲在茲昔者仲尼修春秋亂臣賊子懼梁靖撰七序竊位素食慚況我大君財成上帝制作昭昭焉若日月之代明纍纍焉似星辰之錯行有典有則是彞是訓懷生幸生而有餘㣥下瞻仰而不足蕭相國捃托秦法窺天無階杜武庫參定漢章蹐地失措誠可以垂後誠可以達幽至人無心靈契昭於元極昊天有命神物萃於休期巽風未行甘露頻降亦何止言善而星退躬禱而雲來夫其素液繁灑芳滋豐溢叢駢六氣之英搖動二儀之粹匝園林而並潤溥郡邑而同霑漢宮無假於玉杯魏殿不勞於瓊爵臣等謹按甘露者美露也一名膏露一名天酒其凝如脂其甘如飴蓋神靈之精仁瑞之澤稽命徵云稱諡正名則葦竹受甘露孫氏圖云王者和氣茂則降於草木食之壽援神契云天子刑於四海德洞淪溟則甘露降鶡冠子曰聖人之德上及太清下及太寧中及萬靈則膏露下白武通云甘露之降則百物無不盛也陛下俯回沖眷親定律文必也正名果符稽命是使孟堅持論談功德而未詳抱朴裁書稱太平而不盡上可以輔聖躬之壽下可以延庶物之和言之動天一至於是臣等庇廕昌運接景清朝常勉志於克家每勤誠於報國恭聞大典伏覽殊祥臣知拱極之尊子識晞陽之慶無任抃躍之至謹詣朝堂奉表稱賀以聞仍請宣付所司頒告遐邇臣智仁言臣聞德水清漪詩人以之興頌濁流澄鏡大聖於是登期伏惟皇帝陛下道叶二儀功超萬古上元降祉變孟津於緑波厚載呈祥發榮光於翠浼臣以去月得河內縣申云自太平村已下三十餘里河水變清各遂淺深泠然徹底鱗介之族無所藏形謹自依極疑息閲一作同其狀又嵩高維嶽形入清流少室竒峯參差具寫謹按易坤靈圖曰聖人受命瑞見於河伏見涼州立石式昭靈命臣部黃河應時清徹天禎地貺既符易象之文聖祚河清暗合靈圖之義古人歎其難候臣今乃得親觀身體太平之風目擊會昌之瑞無任悅豫之至臣聞崇高不及之謂天廣博無涯之謂地若乃參天地之元化代覆育之神功者其在聖人乎故能俯同五情恩浸八紘允膺千載仁霑萬代明靈之貺自我所招幽顯合符斯其效矣伏惟皇帝陛下家六合馭三光推明允之一心置於天下之腹用徇齊之四目招於萬物之情蜎蟲麛卵之所安猶懷夕惕輿頌芻蕘之瞽説尚回天眷其所愛育者多矣而況於鰥寡孤獨乎其所容納者衆矣而況於公侯卿士乎至若削平宇宙混一華夷乃武也政教會昌樂新禮創乃文也穆巖廊以凝睇調風雨於絶垠乃聖也運埏埴以裁成動陰陽而不測乃神也體茲四霽侔彼兩儀神物之來蓋惟常理伏見秦州刺史表今月某日黃河水復清深淺澄映百有餘里清自龍門之下驗登期以御天波及萬春之卑表無疆以彌壽臣聞道之所格者宏則靈之所感者大德之所包者厚則地之所應者深是以千祀登期自古歎其難遇一歲之內祚聖人而再清求諸典墳竟無倫匹在於明世絶後光前宜其上答靈心升中告禪金聲玉振合百神於介邱玉輅朱輪副萬國之翹首則普天幸甚何其樂歟臣等越自下才欣逢上德致百王之不致聞億載之未聞舞蹈之深實百恆品臣某等言某日奉某月詔書新豐縣有慶山出曲赦縣囚徒改新豐為慶山縣賜天下酺三日凡在含生孰不慶幸中賀微臣詳窺海記博訪山經方丈蓬萊人迹所罕到層城元圃道家之妄説伏惟皇太后陛下應天順人正位凝命中外咸一陰陽以和嘉木四方而平春露草三旬而月沖恩浹洽嘉貺駢闐當雍州之福地在漢都之新邑聖渚潛開神峯歘見政平而湧自蕩於雲日德茂而生非乘於風雨遊龍蜿蜿疑呈八卦之圖鳴鳳嗈嗈似發五音之奏仙蠶曳繭美稼抽芒一人有合於天心百姓不知其帝力方驗鎮星垂象山萌輔地之徵太歲加年水兆載坤之應天人交際影響合符雷雨既作嘉氣沖於三象鍾石以陳歡心動於萬物臣幸忝簪帶濫守藩隅不獲馳蒼闕而拜手望紫庭而繼足殊祥踵至寶算無疆厚賚傍霑㣥生幸甚不任悚踊之至謹遣某官奉表以聞臣某等文武官若干人言伏奉恩旨垂示臣等千葉瑞蓮觀其緑裹紅葩緗莖素萼露搖珠點霞拆金鬚百星交映羽蓋張而一色萬目齊明車輪合而千狀謂翔鸞之欲舞若㣥鵷之並飛峯形聳而半天石勢蹲而臨海沖氣積其下惠風流其上服之可以登仙採之可以駐壽雖復釋梵天王之國千影離婁善住天子之池雙輝燦爛校之今日未可同年臣等謹按華嚴經云蓮花世界是盧舍郍佛成道之國一蓮花有百億國無量清淨經云無量清淨佛七寶池中生蓮花上夫蓮花者出塵離染清淨無瑕有以見如來之心有以察如來之法道之行也曾不徒然伏惟天册金輪聖神皇帝現此妙身當茲巨瑞符契冥合影響不差有百億國無量清淨者天意若曰護蘇蟻結默啜蜂飛聞鼓鞞而革面望旌旗而懸首指揮而邊境獲安高枕而中國無事風行電掃納噍類於百億之區霧廓塵銷反遊魂於清淨之域深仁所及不亦宏哉臣等濫奉朝恩親披瑞牒非常之貺曠古未聞殊特之珍歷代一見手舞足蹈倍百常情無任慶躍之至謹詣朝堂奉表陳賀以聞臣某言某月日得所部魏縣申稱得令孟神符牒稱某日得佐吏長壽鄉單守中狀稱隆周長壽兩鄉界有白狼見臣等嘗恐是虛未敢即申因處分諸鄉若有見者輒令繫取某日長壽鄉致仕前遊擊將軍上柱國朱佛兒於長壽鄉界內逢白狼馴狎無懼人意遂以繩絡頭繫得隨送者臣謹按瑞應圖云白狼者金狼精也殷湯時銜鈎入於庭王者仁智明哲即至動準法度即見周宣王時見而犬戎服伏惟皇帝陛下元期兆朕靈命氤氳物類有感而必通符祥不召而總集金精纍爍鼓鑄於陰陽玉毳霜翹騰倚於郊甸應時乃出野心狎而無驚有道則遊貪性馴而不搏亦何必兕豹可履蚖蛇可弄者哉徵故事於璇鈐考異聞於玉册出自神符之縣顯符命之通神來於長壽之鄉明久長之益壽重以陛下獨尊三界高視四天身運明哲動循法度既合周王之時仍彰犬戎之服上元潛驚佛兒來送天尊若曰陛下養衆生其如二乎善守其中亦可知矣謹尋令式唯合申臺臣以尊號初加神聰顯應守文不奏恐爽靈心無任躍悚之至謹冒死遣官奉表稱賀以聞其白狼既非常獸臣未敢即放之山野見令佛兒養飼伏聽進止臣某言臣聞昭昭上天五座列降神之府赫赫中國九筵開布政之宮自軒皇肇制帝堯嗣作歷虞夏而維新在殷周而克壯斯皆尊祖配帝從時統天節寒暑而吹律順陰陽以班令降及有漢頗採前章雖年惟屢豐而日不暇給過此以往寂寥無聲伏惟天册金輪聖神皇帝陛下興復舊邦光啓新邑萬物覩而聖人作百寶用而神靈滋遠肅邇安功成道洽泥金刻玉已修中嶽之儀乘鸞駕龍更葺正陽之禮乾策坤策具稟宸聰左個右個親承睿式朴略淹中莫能言其制度崎嶇汶上疇克效其規模土事不文木事不鏤九柱自立豈藉琅琊之飛二石潛開寧煩穀城之採板築星奔而化造斧斤風動而神助聖有通於上帝産無費於中人由是日抱紅輝雲叢紫靄霜毛下翥電翼㣥飛夕見神光似對莊嚴之國晝聞仙響疑過數樂之天匪日而成衝霄特起仰浮圓笠俯鎮方輿金鸑旅鳥而將飛玉驪龍而若動三辰引曜相望於復道之間六氣氤氳旁魄於重簷之半可以發大教陳盛容會百神朝萬國比二儀而永固齊四序而偕行允所謂穆穆皇皇巍巍蕩蕩者矣微臣攀光日用荷蔭天休接五尚之隆班霑九清之下列方圓罕任叨重寄之呈材輪桷無施濫殊私於構厦仰之不逮雖謝於鵾翔成輒相歡竊同於燕賀手舞足蹈倍百恆情無任悚躍之至謹奉表稱賀以聞臣某以下文武官若干人等上言臣等聞上帝居高懸太微之府先王建國闢宗祀之堂不有聖人誰其經始伏惟天册金輪聖神皇帝陛下尊祖揚禰嚴禋之德再光統天順時布政之道尤急親紆睿思躬運元模故能上合乾象下當坤策柱將扶而已立石未鑿而懸開丹鷟踶甍似鳴岐而遠至蒼虯繞棟疑出河而欲飛神光熠耀於向晚仙樂清泠而方晝月惟孟夏時屬正陽張文物於闕庭震聲名於宇縣聖皇戾止諸侯在列穆穆焉禺禺焉交喜氣於三靈動歡心於萬類者也臣等進窺朝典既逢嘗麥之辰旋顧野誠輕襲獻芹之禮謹上禮若干輿如別項滋疏鶴鼎味劣鮮庖何以延萐莆之涼契芝英之壽無任丹懇之至謹奉表稱賀隨進以聞臣某言伏奉某月日遞敕逆賊等並已傳首都市幕庭拜受旌門宣告凡預軍司孰不慶悅中賀臣聞惡禽怪獸有以彰普覆之仁亂臣逆子不能損盛明之德故三監作難周王未寢於頌聲七國為災漢帝克臻於刑措伏惟聖母神皇陛下象天之運法地之安澤浸河海光懸日月以忠信為甲胄以慈惠為干戈所向無前何人不服舉神兵如電掃破凶黨若冰離數月妖氛一朝清蕩斯實皇威遠肅聖化傍霑故能市不改肆人皆安堵臣濫承天澤忝預戎麾聞逆命而增憤聽梟懸而纍抃慶快之情倍百恆品不任悅豫之至謹附某官奉表稱賀以聞
