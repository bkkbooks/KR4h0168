front:
  text: 全唐文欽定全唐文卷七百七十二李商隱二
  hash: sha256:61ba094d2e1670dcbef92f441f984773af7402a58c28857073bceff759f6982f
body:
  text: 臣某言臣得本道進奏院狀報司天監李景亮奏八月六日寅時老人星見於南極其色黃明潤大者聖惟合德神實效祥必垂有爛之文以表無疆之祚臣某中賀臣聞元象示人昊穹凝命曜為經而宿為緯則有常名斗挹酒而牛服箱或標虛號未若候時而出有道則彰居五福之先在三辰之列伏惟皇帝陛下昭明老契游泳莊寰式是中秋呈茲上瑞况見於午位又屬寅時仰考元符乃有深意自南耀彩將宏解慍之心近曉流光欲助無私之日皇心載裕靈鑒孔昭况居率土之濱皆慶後天之壽臣誤蒙重寄實遠清光送元鷰於梁間傷時自切望白榆於天上厥路無由賀聖戀恩無任蹈舞屏營之至臣某言今月八日宣告使某官某至湖南觀察府賫賜臣勅書一通并慰諭臣所部將吏僧道耆老等乾文昭錫兌澤旁流雖聞訃以銜哀亦感恩而竊忭臣某中謝臣伏聞積慶太后爰初遘疾皇帝陛下即不視朝慮切宸襟時連煇暑載想大庭之養實懸萬國之心乃運屬歸真書留具位陛下又能咨宰輔酌中之請稟聖賢推遠之懷始率義以致憂終據經而順變獲情理兼修之旨成古今莫易之文伏讀綸言實榮藩守伏以時逢積水行滯長沙擁皁葢而久留載青旌而莫濟未獲宣傳童艾號召蠻夷謹具當時宣示所將兵吏及迎候將校訖唯冀下車巳後食蘖自䂓仰憑垂露之文麤守宣風之職臣與將吏等無任感恩望闕屏營之至臣某言臣得本道進奏院狀報月日宰臣某等懇悃上言請從聽斷特降優旨俯賜依從普天率土莫不慶幸臣某中謝臣聞道唯應變合變則道昭禮貴酌情踰情則禮廢苟非至德曷取大中伏惟皇帝陛下孝德兼躋聖猷允塞日兄稟義邱㛐延恩始自爽和遂停庶政絕臣僚之陛見奉藥膳於宮朝及真宅言歸寢園將祔喪紀既聞於約禮克奉巳布於成䂓遵大臣陳義之方得王者自家之化臣方叨廉問猶在道塗雖清攬轡之心且阻執圭之覲湘波附奏嶺嶠含誠敢思璅闥之前榮實慕金閨之舊籍無任望闕瞻天結戀屏營之至臣某言臣奉違禁掖祇役遐陬雖懸就日之誠懼曠宣風之寄柔轡載揚於永路輕舠利濟於大川即以今月九日到任上訖臣某中謝臣系承儒訓生屬昌期初掛弁髦即親筐篋嘉樹無忘於封殖青氊不落於寇偷再擢詞科一登冊府徂遷歲律浮泛軍裝忽彯華纓俄列通籍極望郎於南省備給事於左曹中間帖掌臺綱分修國史旋值孽童拒詔狂虜亂華副中憲以急宣佐維城而遙護督晉氏遷延之役絕戎人偵邏之姦敢伐善以攘羭固盡誠於養棟伏惟皇帝陛下武推時夏文號欽明方將虔奉紫泥恭拜青豈意遽分專席叨賜再麾首南服以稱藩控西原而遏寇褰帷廉部猶恐墜於斯文橫槊令軍實致憂於不武雖期竭力終懼敗官况俗雜華夷地兼縣道文身椎髻漸尉佗南越之餘叩鼓鳴鐘傳士爕交州之態網踈則魚漏繩急則鹿君驚欲經緯以合宜顧韋弦而匪易伏願陛下務修儉德廣扇廉風拾翠採珠不勤異物驅犀逐象用示深仁始於問俗之時便獲稱君之美臣亦當求規水䪥取戒脂膏冀少息於㣥黎庶免拘於司敗三梁路阻九嶠山遙浮江遇楚澤之萍望國隔番禺之桂遐思白鳥鎮颺音於周囿之中遠羡仙蓂永固本於堯階之上無任感恩望闕結戀屏營之至臣某言臣得本道進奏官某狀報某月日幽州節度使張仲武奏破奚北部落及諸山奚除舊奚王匿舍朗所管外殺戮首領丁壯老幼并殺戮羊牛焚燒車帳器械等計二十萬剌史巳下面皮一百具耳二百隻奚車五百乘羊一萬口牛一千五百頭者天聲遠疊廟畧遐宣白虜獲于寧臺赤夷浮於燕路臣某中賀臣竊窺舊史逖聽前朝有天子憂邊清宵輟寐將軍出塞白首言歸至乃或勝或奔一彼一此竟困塞郊之柝那停絕漠之烽猶欲敘烈旂常告功祧廟用其蹔勝謂曰難能况幽朔巨都全燕重地薦臻奚寇猾亂華人田豫之護鮮卑莫能深入祭彤之軍遼水惟遣相攻近歲以來為患滋甚走單于偵邏之路懷駒支漏泄之姦張仲武重感國恩習知邊事同三師而肄楚侔五餌以間戎乘其囂惰之時俄得翦除之便燕犀密掛冀馬潛覊超距投石者動過千㣥㦸手科頭者畧踰萬計坎三皷而河流自却聲六校而屋瓦皆飛自是鴞懼喪林兔忙迷穴無舟掬指有地僵尸未驚紫陌之烏前軍巳蹙不唳淮山之鶴後隊仍窮遂分袁尚之頭顱仍裂蚩尤之肩髀穹廬落燼同甲揚灰山積雲屯大收其車乘角羸耳濕盡獲其牛羊柳水載澄桑河無事爰施吉語入解皇威此皆皇帝陛下功格上元運膺下武授茲成算於彼當仁震肅九圍歡呼萬國昔艱難云始胡塵首起於盧龍今開泰有期漢將先清於鹿人謀允若靈貺昭然固巳上慶祖宗下光編策錄圖洪範競三古之殊尢玉檢金泥有百神之靈祐臣雖當防遏不介邊陲空增氣於懦夫實叨榮於下將日圍千里天葢九重奉一月之捷書唯知抃蹈獻萬年之壽酒尚隔班行念風水於遐藩寄夢寐於宣室無任望闕結戀之至臣某言臣得禮部牒奉六月二日勅大行積慶太后冊上尊號曰貞獻皇后者慶屬堯門諡遵周道兔罝考義蠒館流輝臣某中謝臣聞刑于寡妻文王之令德怨及邱㛐漢后之深非詩傳所存褒貶斯在伏惟皇帝陛下用周典訓滌漢瑕疵報皇后友愛之仁如文宗引進之念積慶太后始蒙敬養終受崇名掩沙麓以傳祥軼河洲而抒美天長地久式崇清廟之尊彝萬歲千秋永慰光陵之牀帳天下臣子不勝感抃限以守藩江嶺不獲奉慰闕庭無任惶恐屏營之至草土臣某言今月某日中使某至奉宣恩旨致祭臣亡父贈司空臣某者存沒願終哀榮禮備荒迷觸地號呌瞻天臣某中謝臣先臣某生遇昌期早司國柄沒留懿德上惻宸襟特降王人迂臨私第陳其醆爵潔之豆豋招遺魂於幽陰旋歸莫睹視殘生於晷刻報效無期臣等無任戴恩荒殞之至謹附中使某奉表陳謝以聞臣某言臣伏奉某月日制書授臣某官者即以今月日到任上訖臣某中謝臣緒承舊族師事通儒萬里成功雖無壯志九夷不陋庶慕前蹤二紀蠻陬三提郡印唯貞苦節以奉休辰牙管一雙未嘗關慮竹書兼兩何敢經懷渭水之陰敝廬斯托每還初服常慊上農今者又即殊方復臨雜俗固蒙聲教終遠文明謹當宣舉詔書撫安縣道媒官學舍畢納於人倫畜蠱帶牛盡移於地利至於因遐弄法挾遠生情縱漏嚴科必貽陰責山兼象縣江帶龍城撫巳跼天敢忘元造舉頭見日何處皇居憑宵夢以銜誠託歸飛而結懇無任瞻天戀闕之至臣某言臣伏奉某月日制書授臣某官者天旨下臨星言東騖即以今月某日到任上訖臣某中謝臣聞漢分剌舉之條三河最重唐制郊圻之數二宅惟均况蘇公舊田懷侯故邑太行會險德水通津在申畫之時素為清地語翕張之勢號曰要區自河上置軍以幕中分理地雖密邇事異躬親伏惟神聖文武至仁大孝皇帝陛下神以運機聖而制變將鎮頑梗更務恢張由是開三壘之新䂓復數朝之故事齋壇將節重加廉郡之雄皁葢朱轓各有為州之貴遙徵三紀間有兩人陶某以吏理當財鄭某以名家正授清塵不遠餘烈猶存頒條之寄繼組為難若臣者品以勳昇官由賞達徒慕益恭之美以承猶宥之恩過奬在朝承乏充使將聖代懷柔之德率昆夷畏慕之心萬里以遙三時而復副介不離於痼疾故人免嘆於凋零敢矜跋涉之勞自被生成之賜豈謂皇帝陛下謂能專對遽委牧人仍其栢署之雄賜以竹符之重遂使霍氏固辭之第早建雙旌于公必大之門更屯五馬賢無所象分可自量入祖廟而歘驚瞻父堂而益懼况潞潛逆孽許出全師繄此州兵橫制賊境兼聲勢之任有資屝之頒謹當懋舉詔書聽求人瘼思理行之第一誠媿昔賢奉忠孝於在三亦惟先訓苟素誓則有神明伏遠雲天巳逾旬朔獻封人富壽之祝未卜其時懸子牟江海之思莫知其極無任感恩攀戀闕庭之至臣某言臣得本道進奏院狀知宰臣某等奉上尊號以光洪休耀列聖之睿圖表三宮之義訓凡在生物孰不歡心臣某中賀臣聞善言天者必推功於廣覆善言日者必詠德於大明然後物仰元穹人知景曜皇王擬象今古同規伏惟仁聖文武章天成功神德明道大孝皇帝陛下體天垂蔭法日流輝宏上德以纘戎啟下武而膺運頃從臨御旋致治平雨塊風條時推順適苗螟葉蟘坐致銷亡是以銀甕石碑非煙浪井神而告瑞史不絕書且獯鬻為災周秦乏策金行火運不絕於侵陵瀚海陰山幾渝於約誓而敢乘衰運來犯昌朝陛下乃赫以天威授之宏畧一伐而單于僅免三鼓而貴主來還滅大邦之仇讐攄累聖之忿憤及晉陽逐帥代馬新覊陛下又濬發宸襟委諸廟畫浹辰而前軍就路踰月而元惡膏碪靜豐沛之遺疆舉陶唐之故俗蕞爾潞子復生孽童脫縗冀恩上柩拒詔據九折之險有五州之人藪澤逋逃糞土租稅陛下又遠揚神斷深詔徂征合鎮魏之強藩出韓彭之銳將夷其巢窟去彼根株清明皇之舊宮復金橋之故地曾非曠歲集此丕功固巳至化潛融事光于玉版元機獨運理溢于瑤編况又志切希夷道存沖漠慕遺踪于姑射載動堯心思順請于崆峒欲勞軒拜遠揚聖祖載佇神孫俾異法皆祛多門就掩麟殿正元元之座鳳書招黃老之徒將以休有萬齡臨茲兆衆使咸踐壽昌之域俱游富庶之鄉巍乎煥乎盛矣美矣故得人祇協欲華夏均懷願加尊顯之稱以報財成之美宰臣等果能陳大義允建鴻名伊尹暨湯咸有一德咎繇謨禹克纘九功述盡善於王猷標具美於帝籙南山稱壽北辰降光永終無極之年長奉上清之號臣幸丁昌運方守洛京空深戀闕之誠不在稱觴之列舉頭見日雖悲千里之遙側管窺天且慶百年之幸無任徘徊望闕蹈舞踴躍之至草土臣瓘言今月某日某官呂述某官任疇等至奉將聖旨以臣父某官某亡歿賜弔臣等并賻贈臣亡父布帛三百匹米粟三百石者大夜銜輝窮泉漏澤以隕以越終哀且榮臣某中謝臣先臣某託體元侯榮名任子象賢傳劒餘力攻書歷七廟而在公秉二道而非墜一昨氛興赤狄兵聚晉城先臣受律臨戎忘家狥衆士卒均食罔愧于前修廊廡散金遠齊乎舊說上憑玉畧下振軍威旬月之間慶捷相繼並親桴三鼓躬運九章如臣弟兄皆冒矢石豈意竒功垂立大願莫從傳飡失時衉血成疾奄至凋落長違盛明此皆由臣等抱釁既深就養無素遂延家難仰惻宸襟止偷生于晷刻亦何顏於天地伏惟皇帝陛下悼深撫几悲軫聞鞞降憫惻於上公厚賻禮於遺體昔魏優死事止分食邑之餘漢養孤兒但有羽林之聚方於今日惟媿推恩呌號失容戴履無所軍前結草必自於幽靈石上澆松敢忘於遺訓無任感恩荒殞之至右今月某日中使某至奉宣恩旨賜臣手詔一通兼前件端午紫衣銀器百索并大將衣者乾文昭融睿賜稠疊恩生望外榮積懼中臣巳當時宣布給散訖伏以正陽令月端午佳辰渥澤合止於勳賢錫賚宜先於戚屬臣遠臨東魯久去上京豈望仁時同躋壽域八行明詔伏讀而不啻千鈞一襲輕衣跪捧而若無三伏况又綵縷出仙蠶之蠒貞金凝姹女之魂持可戒盈帶堪延算豈微臣獨忝在列校不遺華楚成行永願千春而奉聖帛丿糸長共保常期五日以霑恩臣與大將等無任感激懇悃之至右臣聞藩方舊德臣子私懷將稱慶於天朝必展儀于土貢伏惟皇帝陛下道苞乾象德總坤靈肇自元正載康福履九廟不忘于繼志兩宮無闕于問安鼓舞萬靈波濤四國驗推測則咸如周卜聽祝辭而皆若華封臣坐擁伏熊行驅畫隼值一人之有慶當春日之載陽心但葵傾跡猶匏繫伏蒲之覲謁未果獻芹之誠懇空深况又地邇宸居俗薰儉德更無玉帛以率梯航前件石器等瑞匪土硎珍慚甗磬並取諸地產皆勒以工名茯苓茯神等品載仙經竒標藥錄通靈祛疾不惟色若凝脂延壽安神豈是心如枯木干冒陳進無任兢惶云云右件官流慶相門策名詞苑當仁罕讓見義敢為符彩極高涯涘難挹臣前任巳奏為判官臨事而每見公方與語而每相宏益今臣寄分團結任切訓齊將奉廟謨實在賓彥伏請賜守本官充臣團練判官右件官洛下名生山東茂族仁實堪富天爵極高妙選文塲亟仕侯國珪璋特達蘭杜芬馨今臣廉問大藩澄清列部藉其謨畫共讚朝經伏請賜守本官充臣觀察判官右件官文囿馳聲賓階擅美口含言瑞身出禮門前任巳奏為判官馭下而和易不流臨事而貞方有執今臣移參國用務切軍需實假平均以同計畫伏請賜守本官充臣觀察支使右件官博涉典經該核流畧自魯壁所壞汲冡之藏三篋能知五車盡究加之文采兼以器能前者為臣屬寮常在州推獄明斷而不容吏黠哀矜而莫有人寃今者團練之司稽巡是切直思奬效非敢用情伏請依資賜授法官充臣部團練巡官以前件狀如前伏以長人者必以吏分勞逸開幕者亦用士為輕重若不樹人何以報國况臣素無勳效謬竊寵榮至於賢才敢恡筐篚前件官並推賓彥堪贊藩條伏希殊私盡允誠請謹錄奏聞伏聽敕旨右臣伏以浴蘭令節採艾嘉辰百辟合祝於堯年萬方宜修於禹貢臣方夙駕之部馳傳出關欲獻琛而未識土宜願祝壽而巳悲日遠前件馬伏櫪斯久著鞭亦多麤覺柔馴未嘗奔逸雖非龍孫驥子邈一舉以絕塵願陪月駟雲螭慶千嘶於扈蹕千冒宸扆無任兢惕之至右得本道進奏院狀報今月日皇帝御宣政殿受冊尊號為仁聖文武至神大孝皇帝禮畢御丹鳳樓大赦天下者當時集軍州官吏等丁寧宣示訖鴻名有赫慶澤無偏上光宗廟之明靈下慰蒸黎之欽屬功勞必表逋負咸蠲出縲繫於狴牢復流竄於魑魅撫安鰥寡存省耄期有國之闕政咸修前代之遺文必舉此皆相公富皋夔之事業秉伊說之材謀協贊神功導宣睿化符瑞沓至天人允咸慶雲非煙浪井不鑿然後率多士陳大儀致君於堯舜之前驅俗於勛軒之上四維仰化萬國承流况某忝典州兵嘗聞廟算雖阻陪班列亦遠接歡呼鳳闕雙標應開天上雞竿百尺想在日邊顧奮飛而不能亦攀望而何及無任抃躍之至右臣伏奉今月某日制書加賜臣階朝散大夫者榮從日下恩自天中臣聞周室設官實重大夫之號漢臣異禮則加朝請之名若臣者辨乏談天文非擲地貪叨華顯帛丿糸歷光陰當陛下御極之初分陛下憂人之寄金章紫綬巳塵求瘼之榮崇級清階更切昇高之望循揣斯久怔忪莫寧惟當勤奉詔條所希麤贖官謗誠深感勵情切違離犬戀主而空深蚉負山而何力無任感恩望闕結戀屏營之至臣得當管瀘州官吏百姓李繼等及瀘州所管五縣百姓張思忠等并覊縻州土剌史韋文賞等狀稱前件官到任巳來勵精為理多方以蘇疲病况郡連戎僰地接巴黔作業多仰於茗茶務本不同於秀麥宗禮闕十二字貊之邦麤識囷倉之積伏冀宸嚴俯哀縣道特許量留宗禮更一二年右今月某日中使某至奉宣恩旨賜臣前件勅書手詔官告者巳准詔旨示軍吏僧道耆老等其官告巳差押衙某奉表陳讓訖臣才謝適時知非周物承私門有後之慶當大朝猶宥之恩頡頑漸高騰凌必遠雕蟲可恥揚子雲不以為文跨馬莫能杜元凱于何稱武遂叨旗鼓及建麾幢南犯瘴烟遠提龍戶西當爟火密控犬戎臨長萬人董齊千乘可以專殺未嘗負租况又榮假冬卿顯分霜憲軍前列秦時御史幕下辟漢日郎官碧落仰瞻巳參星象丹霄迴望了別塵泥滿盈之戒是虞富貴之願斯足而九國未至六戎尚存闕懸藳街阻作飲器礙白環之貢獻隔青鳥之神仙閱軍實而眥裂兵符視戰格而髮衝武弁苟拘司敗巳漏嚴科豈可授列五兵任兼八座詔開垂露降自天家中使飛星來從日域紫泥猶濕黃紙未乾宣傳而誰則懦夫感激而孰非死士固不合更稽成命重曠殊恩竊以君人者在度材而命官臣下者宜論功而受賞易憂且乘詩戒斯亡上斁彝倫下招顛隕實關國柄非止臣身是敢輒黷冕旒亟陳章疏言之必可顓孫寧忘於書紳汗出而收漢祖何妨於銷印伏惟皇帝陛下深迴睿鑒曲被鴻慈從國僑讓邑之言奬成季辭卿之志俾無賞疑僭以激當官倘麤得揚威稍能陳力恢復河右收禹貢之地圖蕩定隴西雪皇唐之祖業則亦不敢更辭竹帛復拒鼎彝明神所知丹慊具在臣不勝感恩陳乞悃款屏營之至右臣當道最近寇戎實多蹊隧每當寒凍須有隄防今纔畢秋收未甚霜降井泉不合草木猶滋雖巳及時未宜縱火臣巳散帖諸鎮訖候皆黃落即議焚除稍越舊規不敢不奏謹錄狀奏右某月日中使某至奉宣聖旨賜臣及大將兼諸鎮防秋兵馬等前件敕書手詔并冬衣者臣並巳准詔旨宣示給散訖恩極解衣榮加降璽戴山未重負日非暄臣謬領藩垣適當戎狄唯憑廟算麤振軍威絕漠獵迴幸無警急高烽火過但報平安直以地勢多陰川形稍背三伏常聞於屏箑九秋尋訝於垂繒代馬蹔嘶隴山無葉燕鴻未過涇水先冰是以每降王臣仍迂御筆緘封垂露寵錫禦冬非玉女裁成即仙人織出徒驚在笥莫匪因鍼始顧孱微深懼不勝冠帶旋蒙被服便如能執干戈遍逮軍前歷霑麾下達喜氣而陳根復秀動歡聲而蟄戶潛開華楚成行曳婁塞路其山南宣歙三道大將等雖久居炎燠不慣嚴凝亦既更衣皆忘易地賈餘勇而例思盡敵感鴻私而咸願殺身各限征行不獲陳謝臣與大將等無任瞻天戀闕感恩屏營之至右臣伏准御史臺牒奉恩旨以臣不先覺察妖賊賀蘭進興等宜罰兩月俸料者伏以霧市微妖潢池小寇有乖先覺上黷宸聰昔漢以捕盜不嚴猶加黜削晉以發姦無狀亦峻科條豈若皇帝陛下恩極好生德惟宥過與其漏網止以罰金臣與寮屬等無任戴恩宥罪屏營之至右臣伏准某年月日敕內外文武上後三日舉一人自代者臣伏見前件官欒郤舊族鄒魯名儒鏡納無私山高不讓而又循墻戒切銘座䂓深蘭省辭榮竹符出守漢悲來暮晉有去思晦而轉彰浼而尢白既還綸閣復掌禮闈人驚吞鳳之才士切登龍之望及司版籍以副地官比按西羌孤忠靡失居然國器實暎朝倫今沔水無兵武昌非險用為廉問尚鬱廟謀臣所部乃秦韓戰代之鄉周鄭交圻之邑軍踰千乘地控三州若以代臣必為名將敢希睿澤曲遂愚衷俾寬竊位之譏冀獲進賢之賞干冒陳薦無任兢越謹錄奏聞伏聽勅旨右件官早中殊科榮推雅度弦柔以直濟伏而清頃佐憲臺且丁家難當喪而齒未嘗見既祥而琴不成聲逮此變除未蒙抽擢臣頃居鎮守琮巳列賓僚謀之既臧剛亦不吐願稽中選榮借外藩伏請依資賜授憲官充臣節度判官右件官言思無邪學就有道屢為從事常佐正人加以富有文辭精於草隸儶而且檢通亦不流臣所部稍遠京都每繁章奏敢茲上請乞以自隨伏請依資賜授憲官充臣節度掌書記右件官魯國名儒鄉右族松寒更翠馬老不迷臣昔忝鑿門辟為記室屬辭而宿構無異論兵而故校多歸委以前籌見其餘地伏以前任大理評事巳三十三箇月比於流輩巳是滯淹伏請特授憲官充臣觀察支使右件官藏器於身為仁由巳齊莊難犯勁挺不搖臣任切拊循務繁稽勾思留仙尉以重賓階伏請依資改授一官充臣節度巡官以前件狀如前臣四朝受任三鎮叨榮慕碣石之築宮廣延儒雅效西河之擁篲樂得賢才韓琮等並無所因依不由請託久諳才地堪列幕庭伏希殊私盡允誠請謹錄奏聞伏聽敕旨右臣伏准某年某月日敕內外文武官上後舉一人自代者伏見前件官鄉茂族洛下名生處家國以必聞善兄弟而無瘉而又南翬輝彩東箭含筠身先較藝之場首出觀光之籍從外府而允稱賢佐立中臺而克號清郎洎時急昌言官登大諫楊阜常䂓於法服陳㣥盡削其封章實於不咈之朝能守勿欺之旨臣所部俗分蠻徼地控越城藉威畧以靖封隅資簡惠而安疲瘵願迴殊渥以授當仁豈微敬仲之才兼有伯游之長俯從牢讓克免曠官特冀宸嚴曲垂矜許干冒陳請惶越無任右臣得進奏官某狀報臣所奏盧某等二人奉某月日勅旨賜授前件官充職者臣謬當廉印合啟幕庭撫魚罩以興懷懼羖皮之廢禮盧戡與臣同年登第少日論交學富文雄氣孤志逸玉清越而為樂女舒脫以求媒實懷難進之䂓不起後時之歎任繕幼學孝悌潔靜精微得君子之時中友鄉人之善者匪因請託實自諳知皇帝陛下俯照遠藩咸加命秩南臺貼職延閣分班使戡有紆朱之榮繕無衣白之見巳經聖鑒可謂國華冀收䂓畫之功共奉澄清之寄不勝感恩荷聖之至以前件狀如前伏以臣所部控聯谿洞參錯蠻髦水接重湖山當五嶺縱有天官注擬多緣地理幽遐或不出上京巳發徒勞之歎或蹔來屬邑即聞歸去之辭既經久而不謀亦柔良而曷寄臣謬膺廉部慮在曠官儻旬朔以無言則賦輿而必闕前件官或膏梁遺冑或英俊下寮雖寓遐陬久從試吏假之銅墨有意於鳴琴委以簿書不羞其棲棘既聞績用合有甄昇一則復遠俗之凋殘一則輕微臣之憂責苟事因請託跡涉貪殘將有負於斯人豈敢逃於舉主伏希卑聽咸賜即真千冒宸嚴無任兢越使當道先准詔發遣行安南行營將士五百人其月糧錢米並當道自般運供送者右臣當道繫勅額兵數只一千五百人內一千人散於西原防遏三百人扭在邕管行營入界內分捉津橋專知鎮戌計其抽用畧無孑遺至於堅守城池備禦倉庫供丞職掌傳遞文書並是當使方圓衣糧招收驅使其安南行營將士皆是勅額外人又當管去安南三千餘里去年五月十五日發遣八月二十日至海門遭惡風漂溺官健一十三人沉失器械一千五百餘事其年十二月六日差綱某等般送醬菜錢米今年五月八日至鳥雷又遭風打損船三隻沉失米五百餘石見錢九十貫其月十八日至崑崙灘又遭風損船一隻沉失米一百五十石至今姜士贄等尚未報到安南臣到任巳來為日雖淺懸軍在遠經費為虞竊檢尋見在行營將士等從去年六月巳後至今年六月巳前從發赴安南用夫船程糧及船米賞設并每月醬菜等一年約用錢六千二百六十餘貫米麥丏等七千四百三十餘石大數雖破上供餘用悉資當府不唯匱且以遐遙有搬灘過海之勞多巨浪風之患須資便信動失程期臣忝守戎行不勝憂結伏以裴元裕既開邊隙又乏武經抽三道之見兵備一方之致寇曾無戎捷徒曜軍容昔者淮陰驅市井之人尚能破敵晉伯假紀綱之僕亦不常留苟元裕能均食散金絕甘分少便可收功於故校豈資別立於新家側聞容廣守臣亦欲飛章上請臣緣乍到未敢抗論巳牒韋厪李玭并牒元裕請詳物理續具奏聞伏惟皇帝陛下道邁羲勛盛加華夏南蠻以茲脆弱宜慕聲猷伏乞特詔元裕使廣布仁聲遠揚朝旨無邀功以生事勿耗國以進兵庶令此境之人無擁思鄉之念唯茲裁照實屬皇明今前綱姜士贄等沉失至多遲留未達復須遣使以續見糧雖欲無言懼不集事儻未蒙恩允特賜抽還則長慶二年安南有奏請借便當軍糧米五千石經畧使王承業請一二年內勸課輸填頻有文符並未支送伏乞天恩憫其州鄉闕乏哀以海路漂淪且新疑安南併還欠米庶行營將士等得存宿飽無乏晨炊臣所守藩方粗獲通濟謹錄奏聞伏聽勅旨使當道將士及管內昭賀等州軍士共二千一百二十六人準去年五月五日制敘勳階使司去今年四月二十五日具將士姓名及甲授年月日申省訖右臣當道將士等遠當戎寄式控遐陬乘解慍之和寧親矢石望拱辰之列實隔煙波近者朝廷奄靖北方惟荒東道當陰山之哭虜靡效纎埃及天井之摧凶不橫寸草徒以皇帝陛下非煙結彩瀼露流光向明纔及於鳳樓布澤遠霑於蠻徼固合同成國慶共稟朝榮伏以當管近無豐年亦經小水海上有分屯之卒邕南有未返之師歉冗食於居人困裹糧於戎士臣初叨廉問方切拊循雖拾綴升階各思受寵而濡毫執簡無以為資仰慮後期敢忘積懼伏見比者諸道有物力未足者聖恩洪貸許且權未敘錄竊緣往例冒此上陳伏冀天慈曲垂矜許臣與將士等無任感激冒昧戰越之至
