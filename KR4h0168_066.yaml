front:
  text: 全唐文欽定全唐文卷六十六穆宗三
  hash: sha256:0f775af0409d51b8f837a368d51ae8a7e84eabe38f9704223e0bc81a058094f9
body:
  text: 京畿二十有二縣欠元和十四年京百司職田二十二萬九十一石束貫等京畿百姓聞甚艱貧頃差搬運軍糧今又修營陵寢雖因緣驅役皆給價錢而屢有牽召頗妨農畝豈可更徵懸欠重使憂愁其所欠並宜蠲免其合受納所欠職田或見在官班各請厚俸或近終考秩稍可餘資宜體朕懷以寬人力朕聞帝王所重者國體所切者人情苟得其體必臻於大和如失其情是曲於小利況設官求理頒祿責功既有常數寧宜就減近者以每歲經費量入不充外官俸料據數抽貫再三思度終未安穩念彼外方或從卑官一家所給三載言歸在公常甘於潔廉受祿又苦於減克寸待我庶吏豈其然乎雖憂國之誠固須贍助而恤人之慮將起怨咨必若水旱為虞干戈未戢事非獲巳人亦何辭今則幸遇豐登又方寧謐九州之內永絕妖氛三邊之上冀除烽警自宜克寸己以足用安可剝下以為謀臨軒載懷實所增愧其度支所準五月二日勅應給用錢每貫抽五十文都計一百五十萬貫文並宜停抽宗廟之禮嚴肅居先薦告之詞精審為切方將昇祔安可九室皆同既巳祧遷豈宜四昭咸在宗正少卿李子鴻實司祠事誤進祝文罪有根源理難降減宜停見任博士既失於詳定御史又曠其監臨若不薄懲恐乖至敬王彥威宜罰兩月俸料削一階崔鄲宜罰一季俸料削兩階其後禮合變文事宜中節者太常博士不得更稱舊制致有差殊泉貨之義所貴通流如聞比來用錢所在除陌不一與其禁人之必犯未若從俗之所宜交易往來務令可守其內外公私給用錢從今以後宜每貫一例除墊八十以九百二十文成貫不得更有加除及陌內欠少諸道州府每所徵納兩稅除送上都外留州留使錢緣草賊未殄費用滋廣兩稅之外難議加徵然其饋運之閒又須得濟諸道留使錢宜令長吏於諸色給用中每貫量減二百文以資軍用事平之後即任仍舊買德尚在童年能知子道雖殺人當死而為父可哀若從沈命之科恐失原情之意可減死罪一等秋夏之閒嘗多水潦如緣暮夜暴雨道路不通車馬宜便放其日朝參委御史臺勾當仍每日聞奏如雨不至甚不在此例贈工部尚書田穎夙彰忠勇累効勳勤方議獎能遽聞棄代永言嗟悼須有優矜宜賜絹布一百五十匹端度支遂支給仍令所在州縣傳遞送至許州委李光顏官給葬事其男克素待過卒哭亦委本道量與軍中職事收管驅使長吏犯贓其數不少縱寬刑典難免鞭笞但以近逢鴻恩減等雖節文不在免放情理亦要哀矜龎驥量除名流溪州其贓付所司準法唐慶入己贓盈五千貫據罪定刑實難全宥但以惟新之日政務從寬要示含容俾從流竄宜除名長流崖州勅朕獲嗣祖宗祗荷重器常恐失墜若陷泉谷而萬務所繫憂勤是切宿疹在體不遑自安陽氣歊蒸沈恙復作不能日臨庶政親領萬幾皇太子湛睿哲溫文孝敬明敏其軍國政事宜權令檢校百辟卿士中外臣寮宜竭乃心輔我元子同厎於道以寧邦家宣布朕意庶使知悉朕以菲德初承大寶嚴恭夙夜修己臨人燭理未明舉政多闕雖克展郊禋之禮或未稱瑞應之符而俗尚彫訛人未康乂所患德之未立不患名之不尊至於北狄求和西戎即敘南越投戈而率化東夷繼踵而來王不七旬之期自銷積紀之弊此皆祖宗垂祐公卿叶賛之力也朕何有焉遽議虛名深愧未稱卿等志思將順誠切忠君宜體至懷勿徇虛美勅朕聞孝莫大於慎終仁必先於卹下慎終則勿之有悔䘏下固可使忘勞自陵寢戒期郊甸充奉屬春耕肇起宿麥繼登百役所集羣司所備上懼一物之遺缺既懷罔極之誠下恐兆人之疲瘵又思不擾之德方將號從靈駕親至山園情為事奪竟不獲遂賴一二元輔洎內外庶官嚴敬協心克修典禮永言嘉歎感咽增懷義有必酬式舉勞以申命惠無不浹仍蠲賦以加恩山陵使兼陵所攝太尉行事宜與一子六品正員官山陵禮儀使與一子八品正員官山陵副使柳公綽按行山陵副使李䎖並賜爵一級各與一子出身橋道置頓使賜爵一級仍與一子官內山陵使賜絹一百匹特加一階山陵修築使賜絹七十匹特加一階監修橋道使賜絹七十匹內按行山陵地使賜絹五十匹內山陵副使及修築副使各加一階鹵簿儀仗使並賜一級各與一子出身橋道置頓使各加兩階舁梓宮三品以上賜爵兩級四品五品賜爵一級六品以上各一階其中有合選人前資見任各減兩選神策六軍修築山陵官健各賜絹兩匹其檢校軍使及押當所由四品以上賜爵一級仍加一階五品以下各加兩階陵所造作押當使等三品四品各加兩階仍賜爵一級五品以下各加兩階其中正員六品以下合選人前資見任各減三選白身各賜勳三轉諸司諸使應緣山陵修造及專知修造作并諸色檢校執當官典白身及直司掌上巧兒功匠等五品以上各加兩階六品以下各加一階合選人前資見任各減兩選白身各賜勳兩轉其給直和雇者不在此限吉凶儀仗諸色行從官等五品以下各加一階至三品五品未合敘者賜爵一級六品以下各加一階如其中有合選人前資見任各減一選諸司諸使押管當官置頓舉幕往來檢校軍將中使等五品以上六品以下並加兩階白身各賜勳兩轉合選人前資見任各減兩選太極宮宿衞官及中使大內皇城留守及押當官等五品以上各加兩階六品以下各加一階白身各賜勳兩轉撰諡冊哀冊諡議書冊文及讀諡冊哀冊書寶讀寶官等五品以上賜爵一級六品以下各加一階合選人前資見任各減一選鐫造寶冊裝冊及檢校官五品以上各加一階六品以下各賜勳兩轉合選人前資見任各減一選題木主官加一階舁寶冊官五品以上各加兩階六品以下各加一階其中合選人前資見任各減一選押鹵簿儀仗挽郎等見任者各加兩階合選人前資見任各減兩選山陵禮儀橋道置頓判官五品以上各賜爵一級仍加一階六品以下各加兩階其山陵使司官與軍將加一階合選其知東渭橋官非時放選仍優與處分知道官前資見任各減三選知頓官前資見任各減兩選按行陵地儀仗鹵簿判官及諸副使判官并諸司諸使監當雜職掌官吏等五品以上各加兩階六品以下各加一階合選人前資見任各減兩選白身各賜勳兩轉其挽郎放出身後七選許集挽士代哭挽歌等各減三年勞合選者各減兩選無勞可減者各賜勳兩轉京兆府及諸州僱斲元宮石匠及宮寢作頭巧兒雖給庸直就中辛苦各賜勳一轉諸色行事官及齋郎禮生并陰陽官三品以上各賜爵一級四品以下各加一階合選人前資見任各減一選白身各減二年勞考滿人并放出身其數處職掌任取穩便從一項處分應緣二仗三衞彍騎及諸色人匠并緣山陵應役人夫車牛等各委本府長官本軍本使本司量事優賞諸道應副山陵參佐軍將等各加一階諸色職役官吏應或減還可減者宜令所司非時與處分如有諸色流外充者各於本色中量減二年勞考可減者選日優與處分京兆府今年夏青苗錢應合徵共八萬三千五百六十貫文並宜放免仍委令狐楚便以山陵用不盡綾絹依實支付京兆府充代百姓納青苗錢其近迫鄉村坊市屋宇什物田苗等有被損毀并近陵百姓偏有使役理宜節級優賞並委京兆府審細勘覆聞奏應隨靈駕挽郎挽士諸色人夫等泥雨中不免損傷委京兆府審細訪姓名聞奏量加優恤其山陵禮儀鹵簿儀仗使并諸軍諸使諸司將官吏如執當務重功效尤異委本軍本司本使具名聞奏中書門下商量奏聽進止宣示中外咸使聞知著大明者日也出乎震而見乎離則八紘開朗萬象昭煥孚大號者風也發厚地而鼓羣動則氛蒙盪滌鬱伏舒散王者如日之照臨故聖躬作而庶類覩如風之號令故德音降而兆人從朕以寡薄方茲嗣服荷天地之眷佑承祖宗之祚運夙夜祗厲懼不克周永惟風教之流弊甿俗之疾苦思布濟時之政宜宏利物之澤庶有以導迎和氣感致懽心宜申在宥之恩用啟自新之路可大赦天下自元和十五年二月五日昧爽巳前大辟罪巳下罪無輕重咸赦除之唯官典犯贓及故殺人者不在免限左降官量移近處巳經量移者更與量移如復資者即任依常調選責授降資正員官者亦與進改亡官失爵不齒者量加收敘流人及僧尼道士移隷者節級放還及移近處諸色得罪人中如先有勅云縱逢恩赦不在放還之限者亦並與量移若曾任五品巳上官者奏待進止左降官及流人先有官者如巳亡歿各還本官自今日巳前曾有痕累禁錮等一切並與洗滌永惟罔極弓劒不留奉號終天用深哀感應緣山陵制度及喪儀禮物宜委中書門下及諸司長官等博詢故實務遵禮度必誠必信副朕哀懷所緣山陵造作及橋道置頓所須並以內庫錢充不得輒令科配百姓度支諸州府監院從貞元八年巳後至元和十年巳前共計欠錢一百一萬五千九百餘貫鹽鐵使諸監院應欠元和十三年巳前錢物除準前制䟽理外共欠一百八萬八千六百餘貫石等戶部諸州府從建中三年巳後至元和十三年巳前應欠在州貧窮并遭水旱逃亡百姓腹內兼連接淮西河南賊界并燒劫散失及賑貸百姓錢物五十萬九百餘貫石等京兆府從元和五年巳後至十三年巳前應欠諸色錢物共四十一萬九千六百餘貫石束等州府監院百姓欠負但不在官典所由腹內者一切放免諸州府除京兆河南府外應有官莊宅鋪店碾磑菜園鹽畦車坊等宜割屬所管官府諸道除邊軍營田處其軍糧既取其正稅米分給其所管營田自為軍中資用不合取百姓營田并以瘠薄地迴授百姓濃肥地其軍中如要營田任取食糧健兒不得輒妄招召天下百姓等自屬艱難棄其鄉井戶部版籍虛繫姓名建中元年以來改革舊制悉歸兩稅法久則弊奸濫益生自今巳後宜準例三年一定兩稅非論土著客戶但據資產差率其擇刺史縣令宜委門下中書省御史臺官有所諳知即具聞薦如贓汙賤人當坐舉主榷稅之法雖合同遵瘡痍之餘姑欲寬假其河北稅鹽宜委度支與榷鹽使審細商量具條䟽聞奏內外百官食料錢一倍至五倍巳上節級放免仍每經十年即內外百官各賜錢一萬貫充本各據司額大小公事閒劇及當司貧富作等第給付應屬諸軍諸使諸司人等在村鄉及坊市店鋪經紀者宜與百姓一例差科不得妄有影占如有違越所司具所屬司并人名奏聞如聞度支鹽鐵監院等所在影占富商高戶庇入院司不伏州縣差科疲人偏苦事轉不濟如有此色仰當日勒歸諸道州縣除正勅率稅外不得妄託進奉擅有諸色搉率天下州府除兩稅合送上都錢物及所司常貢外輒不得別進錢物并方鎮得替後至城亦不得輒有進獻掖庭籍沒罪人妻子等宜並放歸親族其諸軍先擒獲吐蕃生口配在諸處者並放歸本國願住者亦聽內外文武見任及致仕官三品以上賜爵一級四品以下加一階諸道軍將士等普恩之外賜階爵有差二王三恪文宣王及公主縣主嗣王節級賜與一子官及出身宗子有才行者悉以名聞奏仍委中書門下量才敘用皇五等巳上親皇太后二等巳上親並賜階爵武德巳來配饗及第一等功臣并張巡許遠南霽雲顏杲卿真卿等尚父子儀贈太師晟贈太尉秀實子孫中與一子官有差其中有才行堪任臺省者量才敘用中書門下並諸道節度使諸州府長官東都留守及京常參官諸軍使等父母祖父母並節級與追贈父母存者與官封巳經追贈者更與改贈興元奉天功臣及蔡鄆立功將士普恩之外更賜勳爵亡歿者與追贈中書門下及節度等使東都留守度支鹽鐵使京兆尹諸州刺史等賜一子官有差在城諸軍將士節級賞賜仍加階爵京西京北及振武天德八道節度都防禦使下及神策一十二鎮將士等共一十八萬六千七百餘人都賜物一百八萬一千八百餘匹東宮官及侍讀普恩之外賜爵加階仍普與進改自國哀及行事職事官普恩之外賜階爵及勳其受顧命撰制誥及冊文并寫制誥官等特加一階賜爵一級並賜上柱國優與進改書冊官特加一階尊親之禮既展於徽章廣愛之恩宜申其慶賜皇太后諸親委中書門下量等第節級優賞文武常參官及外官職事五品巳上有母者並加邑號如巳至郡太夫人者許回授周親應緣皇太后冊禮職事官並節級賜物天下百姓有父母祖父母高年者賜粟帛城內蕃客等並節級賜物今年正月二十八日至閏正月三日宮苑諸門守捉西內立仗將士等量加改轉應內侍省及內坊宮正等並加賜勳爵常參官及諸州刺史少尹赤令有先得替及因病假滿百日解官并終制未授官者及致仕官並與進擬天下諸道州不得擅有閉糴禁錢務令通濟內外文武官及諸色人等任上封事極言時政得失才有可觀別當甄獎應流外色役人等賜勳有差門下朕聞自昔盛王之所以合天地諧神人莫過乎誠敬致其誠展其敬莫重於祭祭之大者莫大於郊廟故必躬行而心奉之然後百靈助慶萬國蒙福此帝王之孝也我國家祖功宗德立極配天日月所照雨露咸被孝思善繼聖敬允外郊丘歲奉於嚴禋宗廟時修其明薦朕以沖昧自獲纉承仰荷睠命懼不克享幸天多祐俾歲大穰河朔厎寧邊封靖謐及此元日至於上辛式遵典禮有事郊廟當祗見之夕感慕增懷洎大報之辰誠敬彌勵因體元而改號用敷化以覃恩可大赦天下改元和十六年為長慶元年自正月三日昧爽巳前大辟罪巳下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒咸赦除之唯故殺人在十惡內者及官典犯贓不在免限左降官量移近處巳經量移者更與量移如復資者即任便赴選集丁憂去任服闋日亦與量移如有親故在者都任於所司陳狀便與處分不必更待本州府申請如準前制巳合量移有司未注擬者並任累敘并別勅因責授刺史巳下降資正員官亦與進改亡官失爵放歸不齒者量加收敘流人未到所在及巳到者與量移近處巳量移者并放還僧尼道士移隷者亦與量移近處并得罪人巳亡歿家口未放歸者一切放歸如有情願住者亦任左降官及流人先有官者如巳亡歿各還本所自今日巳前所有痕累禁錮及反逆緣坐等一切並與洗滌其左降官及流人如所坐之罪本因犯贓到任及所配處未經二年者不在量移其天德軍流人滿十年即放迴其糧賜委防禦使便別召人充補營田驅使朕自君臨萬㝢常思子惠羣生每念困窮猶勞杼軸宜加恩於寰海用蠲賦於齊甿天下百姓今年夏稅每貫放一百五十文厎貢之宜本於任土阜財之道亦在便人天下州縣應徵科兩稅榷酒錢內舊額須納見錢數者並任百姓隨所有匹段及斛㪷依當處時價送納不得邀索見錢度支鹽鐵戶部應納茶稅及諸色見錢兼糴鹽價中舊額須納見錢數者亦與納時估匹段及斛㪷其輕貸即充上供雜物當處支用如情願納見錢者亦任穩便永為常式京城坊市聚貨之地若物無集處即弊生其中宜委度支鹽鐵使於上都任商人納榷糴諸道監令在城匹段各有所入即免物價錢於外州仍委所司具條流聞奏其公私便換錢物先巳禁斷宜委京兆府及御史臺切加覺察理財正辭弊必除於既往蠲逋巳責禁方絕於將來應度支鹽鐵戶部三司所管諸官吏所由人戶等欠負元和十三年巳前諸色錢物斛㪷等各委本司盡理勘實如是貿易估招入已隱欺即準條處分如緣收貯年深盤覆欠折水火沈保累剝徵并緣用兵之時所在貯備雜物準擬軍需及賊平之後不堪上供勒令迴變因有損折如此之類除檢責家產及攤徵原保外如實無可納空掛簿書連年囚禁者宜令各具色目聞奏並與䟽理其諸軍諸使應有欠負亦準此處分天下兩稅外不得別有差率刺史若違越委觀察使舉奏觀察使或有事乖格勅刺史不得接受巳有前勅宜重申明仍委御史臺嚴加訪察不得妄稱供應及軍府褊迫捍禦疆陲必先財力使其節用方可實軍訪聞邊上諸鎮比緣使臣所到或私申饋潛耗資儲假此為辭因而積弊將令完緝功在立程應京西京北邊上諸軍州鎮自今巳後如有中使及郎官御史奉使到所管並不得與人事比部令勾諸司錢穀載在格令其事訛謬歲月巳深宜令中書門下精擇比部郎官修舉典制勾諸司錢穀仍立時限具條䟽聞奏山河之固險易不常疆理之閒廢興從便今干戈巳戢寰宇大同壤制之宜所資垂久應諸道諸州及諸縣宜委中書門下審量制置其州縣兼委觀察使刺史量閑劇利便可併省者具事宜聞奏河北諸道管內自艱難以來久無刑法各隨所在徵斂不時色目至多都無藝極宜委本道觀察使勘實據桑產及先各徵配量輕重團定兩稅務令均濟其刺史巳下俸料仍據州縣戶口徵科多少并職田祿粟作等第河南諸州府例條䟽分析聞奏如聞河南北州縣凋殘戶口未復官員備設曹局至閒或非其才徒費其祿其縣州官各據都邑大小量公事多少留置餘並權停仍先於久經假攝才行彰著人內選擇委觀察使訪察勘實各具前後歷攝勞考約前銜資序便與正授如先無官者以假攝年深課績尤異各具事績聞奏委中書門下類例如資序或未相當且令權知兩考有政能即與正授其見在正官多是流外不任公事切宜揀擇堪留者全給課料使其盡心合減省者並勒停罷仍據巳得資常選之內與減兩選未得資者任以前銜便放選集仍名銜申牒有司自今巳後委吏部切加揀擇量才比擬所冀惠政及於疲人應諸道管內百姓或因水旱兵荒流離死絕見在桑產如無近親承佃各委州縣切加檢實據桑地數具本戶姓名申本道觀察使於官健中取無莊園有人丁者量氣力可及據多少給付便於公驗任充永業不得令有力職掌人妄為請射其官健仍量借貸種糧分番上下各任營農放三年差稅年限滿後據桑地準例團定合當下番營農者停給月糧其衣物賜及雜賞給並如舊應天下典人莊田園店便合祗承戶稅本主贖日不得更引令式云依私契徵理以組織貧人天下榷酒錢有巳分配百姓處又別置酒店官酤及諸色榷率宜切禁斷應亡官失爵及放還流人如有先莊田不經沒官被人請射本主及子孫到並委州縣却還務令安業州主牧宰職在親人其有徭賦不均流庸未復刑罰不中教化未行必當分命使臣大明黜陟三代致理皆重學官兩漢用人蓋先經術天下諸色人中有能精通一經堪為師法者委國子祭酒訪擇具以名聞將加試用稱成康之盛則舉措刑讃文景之德亦言斷獄況自文祖太宗皇帝親錄囚徒躬省冤滯法官所選豈易其人其大理寺官屬比來吏部所授多非其才宜令精選有志行詞學兼詳明法律注擬其有課績特殊堪任朝獎者臺省官有闕宜先選擇剖符共理按部分憂繫於生人所任最切近日刺史或一歲再遷或累年尚滯勞者不勸否者不懲自今郡守勤奉詔條清廉可紀者四考與轉其有殊績及久歷外郡者或就加章綬或擢列朝行庶使內外有倫遠邇無異其刺史有闕委中書門下選擇當時進擬不得稽遲其江淮諸道縣戶一萬巳上稅錢五萬貫巳上皆謂之大縣所擇縣令宜準元和二年赦節文處分其去年二月五日赦書中所薦縣令兼取散試官及白身并見任官者不學而製其弊固甚未操而割所傷則多豈有白身及散試官未經試吏堪任縣令永言及此殊匪朕懷又見任官更求舉薦亦長僥競不可施行其散試官及白身並見任官令吏部並停注擬自今巳後所舉縣令更不得舉薦此色將致乎理必在官循其方將盡其才必在吏久於政先朝深知積弊首舉具員近日因循更不遵守遂令躁競者不安其位惟望速遷自今巳後宜委中書門下所有除授並依元和二年具員勅處分其諸道年終亦宜準承前勒停如刺史於留州數內妄有減削非法破用者委觀察使風聞按舉必當重加科貶以誡列職如刺史不承制勅不得稱有分事請赴本使其錄事參軍亦不得擅離本州將欲化人必先興學苟昇名於俊造宜甄異於鄉閭各委刺史縣令招延儒學明加訓誘名登科第即免征徭天下所置常平義倉準元和元年正月赦書節文處置未便者委刺史各具事由條件聞奏有司更與商量處分郵傳所置令式有文近年以來多有逾越遂使馬畜損耗供億勞煩宜準元和二年赦節文處分天下諸州府縣官吏應行鞭捶本罪不至死者或假以責情致令殞斃宜委御史臺及出使郎中御史等切加察訪聞奏天下諸道或閉糴禁錢自為條約自今巳後切宜禁斷仍委鹽鐵巡院勾當其內外文武及致仕官三品巳上賜爵一級四品巳下各加一階陪位白身人賜勳兩轉故尚父汾陽王贈太師晟贈太尉秀實各與一子八品官顏真卿杲卿張巡許遠南霽雲各與一子出身武德以來功臣子孫量加獎用中書門下及節度帶平章事者各與一子八品正員官祖父母及父母並與官封父歿母存者與邑號巳贈巳封者更與追贈及邑號禮儀使大禮使度支鹽鐵使京兆尹各與一子出身文武常參官并致仕官及諸道節度觀察經畧等使及神策等諸軍使父見存者量與致仕官母存者與邑號父母亡歿與贈官及邑號東都留守及諸道節度觀察經畧等使神策金吾六軍將軍威遠鎮國軍等使各與一子出身陝州奉天興元功臣更賜勳爵有差身歿未經追贈者並與追贈應緣大禮移仗宿衞御樓立仗將士普恩之外賜勳爵有差仍準舊例賜錢物二十萬四千九百六十端匹貫大禮職掌行事官吏及留守等吏賜勳及加階升壇殿行事官更特加一階應在城內蕃客等賜物有差常參官及刺史有停替及病假解官及終制未授官者委中書門下量才進擬其有情願授致仕官者亦聽天下諸色人中有賢良方正能忠言極諫博通墳典達於教化軍謀宏遠堪任將帥政術詳明可以理人者委有司各舉所知限今年十月到上都天下百姓高年者賜米及綿絹有差其元和十五年二月五日赦節文中有未處置者有司速舉施行庶令大信洽於天下百司之職布在舊章特舉正經必歸理本宜令尚書省應掌閑幕士御士醫工獸醫門僕藥僮御書手楷書手典書流外署等各賜勳兩轉通氣炳靈是資嶽瀆禦災捍患爰想聖賢將達明誠式崇祀典其五嶽四瀆宜委本州府長吏備禮致祭當極豐潔以副如在之誠名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行
