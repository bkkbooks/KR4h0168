front:
  text: 全唐文欽定全唐文卷七百十三聽字正思太尉中書令晟子以蔭為協律郎纍兼御史大夫夏綏銀宥節度使徙靈鹽進檢校工部尚書穆宗立為河東節度使以功封涼國公兼帥魏博罷為太子少師拜邠寧節度使授太子少保充鳳翔節度使徙陳許以太子太保分司東都開成初為河中晉絳節度使卒年六十一贈司徒
  hash: sha256:0dbd6cadc6fe734a4c30776fac09e4c3099bc2d8768d9424386a49aeb6db71ff
