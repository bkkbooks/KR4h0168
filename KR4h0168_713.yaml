body:
  text: 隋大業初高祖神堯皇帝任鄭州刺史日為太宗文皇帝疾恙祈福於滎陽縣大海佛寺其答如響因建一石像像下刊紀其事凡十六字歲月既遠盡翳於土壤中今滎陽縣令李元慶新加嚴飾刺史張仲方立石為文不敢不奏滔元和時人按邵陽圖經公姓文諱斤晉咸康中為高平令隱於此山得道羽化故名文仙山又據湘川記云山上有石牀長一丈有四尺叢竹蒙密隨風飄揚委於牀側每遇亢陽祈禱有應洎唐貞元十年上天愆暘旱魃為虐草木黃落如惔如焚於時州伯太原王公高縣宰昌黎韓公謹輝至誠懇請曰如神降臨膏雨雱霈即為刻石記事當時響應雲行雨施年穀既登倉廩充實夫神靈無方感而遂通昔太公治灌壇風雨不敢犯劉昆牧宏農猛虎為之去豈非以德化所布飄風鷙獸不敢侵界焉以此觀之實由政之所及德之所致鬼神為之福祐神功為之降澤若乃德之不修政之苛刻而妖由此作災由此起吉凶報應如影隨形信矣夫噫人物遷變未達誠願至元和三年歲在戊子災患薦臻旱又甚矣州牧濟陽丁公立邑君馮翊莊公齊命官啓告酬願立碑遂雨灑四溟潤澤九穀山川鬼神亦莫不寧上憑神休之恩下賴牧宰之政野老荷蓑與笠相對佇鍤而歌曰我聖君兮德巍巍擇良牧兮治邊陲感神功兮雲雨施稼穡如梁兮又如茨無階達天真兮咸願立乎豐碑閣境耆老稽顙告余皆願修文以神聖德刻之貞石永傳芳休既無絶妙之詞難傳至貞之迹銘曰飛丹涸濟冰雪溶道成羽化神仙宮幾乘白鶴歸舊峯城郭是兮人不同霓裳縹眇隨天風紫煙散盡祠堂空山寂寞兮花木隆石牀空山留仙蹤微飆騷屑搖條叢邑人祈禱清廟中神功應化無不通天旱暵兮雲從龍灑膏雨兮九穀豐黎庶歌兮樂時雍願立碑兮表聖功勒文字於堅石與天地兮無窮元素元和中拜戶部侍郎同中書門下平章事出為荊南節度使道悟渚宮人姓崔氏子玉之後允也年十五依長沙寺曇翥律師出家二十三詣嵩山受戒三十三參石頭頻沐指示曾未投機次謁忠國師三十四與國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便反荊州去郭不遠結草為廬後因節使顧問左右申其端緒節使親臨訪道見其路隘車馬難通極目荒榛曾未修削覩茲發怒令人擒師拋於水中旌斾才歸乃見遍衙火發內外洪焰莫可近之唯聞空中聲曰我是天王神我是天王神節使回心設拜煙焰都息宛然如初遂往江邊見師在水都不溼衣節使重申懺悔迎請在衙供養於府西造寺額號天王師常云快活快活及臨終時叫苦苦又云閻羅王來取我也院主問曰和尚當時被節度使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是院主無對便入滅當元和三年戊子十月十三日也壽八十二夏六十三嗣法一人曰崇信即龍潭也志雍京兆人公諱叔雅字元宏太原祁人也其先食采於祁因邑命氏軒蓋蟬聯奕葉闕茂忠貞孝友史不絶書素風懿範繼華紹烈誠有國之柱石為令族之領袖三代祖祐周驃騎大將軍開府儀同三司光祿卿隋拜司空兼中書令諡曰忠烈忠烈生皇朝比部郎中資州刺史師感公之高祖也資州生朝請大夫澤王府司馬清源縣開國男守節公之曾祖也清源生渝州刺史贈懷州刺史闕一公之王父也懷州生金紫光祿大夫試祕書監兼御史中丞衢州刺史贈揚府大都督諱承俊公之先考也以中書之勳烈比部之令望清源之宏茂懷州之懿德中丞之雄邁世濟其美慶鍾後昆公即中丞第四子也弱不好弄幼而能文一見不忘有類王充之敏五行俱下不慚應奉之材為善孜孜小心翼翼恭敬以奉上篤愛以臨下接士必盡其才修已不疵於物繇是鄉里挹其仁朋友伏其義時祕書郎嚴維有盛名於代雖以公年幼交契老成若蔡雍才重拔王粲於弱齡李膺望崇歎孔融於稚齒嘉其至性敦重機闕深邃每器而厚之時攜幼弟適郢為賦詩以贈云萬里天連水孤舟弟與兄時屬而和者連郡繼邑染飛翰朞月不息繇是聲華藉甚於公卿間郡舉進士才及京師動目屈指傾蓋結轍為禮部侍郎劉太真深見知遇再舉而登甲科浹辰之間名振寰宇俄為山南東道嗣曹王臯辟為從事丁太夫人憂服闋調補右衛率府兵曹參軍環衛望高以優賢也未幾為嶺南連帥韋公丹舉列上介表遷左金吾衛兵曹參軍蓮府才雄軍門瞻重每下徐孺之榻獨奪陳琳之筆屬本使節制東川府幕遂散邀公獨行奏遷廷尉評兼監察御史府公再遷慈晉俄領江西復隨鎮拜監察御史裏行以南康闕牧假行刺史事盡閭里之情袪疲苶之疾人得歸厚吏不敢欺歲月之間闕增闕復闕臨川闕南郡之理仁風所被清議攸彰無何寢疾經時沈痼以元和四年正月七日告終於洪州南昌縣之官舍春秋五十有五嗚呼哀哉以公之孝可以動神明以公之忠可以闕社稷以公之德可以反澆漓以公之仁可以厚風俗有一於此即為全人況其闕者乎奈何天不與善奪闕重器民不幸歟時不幸歟夫人河東辥氏故禮部侍郎闕元女族謂清門家稱令室以闕謙睦中外以端闕奉闕公以伉儷之重加於人一等如賓之敬禮若常林居家有恆情如顧悌由是時論多之有一男一女男曰高陽女曰吳婆皆在孩幼哭無常聲公雖臨郡佐幕以親潔自約祿俸所入皆均親愛故不勝其貧轜車既還亦無以葬於時闕南西道連帥御史大夫韋公丹以公賓四府始終如一感歎追舊情均支屬賻資百金加以將校護喪聞者壯其高義以其年十月十三日歸窆京兆府咸陽縣之延陵鄉祔先塋禮也志雍親同懿屬義比斷金見記斯文銜哀永歎銘曰汪汪王公德門之秀儒宗賢士茂族華胄忠為信臣義稱良友器逾瑚璉人推領袖何備其能不豐其壽嗚呼哀哉歲月云邁言歸鎬京綿歷舊遊想像襟情倏已終古閉於佳城蒼莽日落蕭颯風驚寒原故里丹旐新塋嗚呼哀哉盛德無窮傳今與昔閟於元壤斫茲貞石陵谷是遷令問不易泣下漣洏氣填胸臆嗚呼哀哉悅元和時人講信修睦諸侯以之於是行者具書幣受辭令居者接行人授客館交聘達情燕享載設禮也元和六年秋悅奉方伯常山公命致問於瀛州使府使府東武公惠我方伯之好於使者嘉儀是隆悅登庭再拜畢主愈愈賓肅肅府中僚吏書佐咸左右相無不穆如翼如東武公乃以禮成之明日啓大幕潔崇堂以觴客焉於時金飇已扇玉露方塗序帶雁而知涼地翔鸞而覺勝㦸枝森衛氣靜於羆熊弓影長懸令清於霜雪樂進而舞回燕趙酒行而光溢璚瑤及乎三爵告終陔夏爰奏東武公從容揖賓賓復再拜以退則有庾杲蓮花王恭楊柳意在繾綣驪歌復申使悅從而述焉以備故事且記盛也有方交州人元和十一年進士改名游卿官校書郎豫元和乙未歲落第西征適此公署忽聞呻吟之聲潛聽而微惙也乃於暗室之內見一貧病兒郎問其疾苦行止強而對曰辛勤數舉未遇知音眄睞叩頭久而復語惟以殘骸相託餘不能言擬求救療是人俄忽而逝余遂賤鬻所乘鞍馬於村豪備棺瘞之恨不知其姓字苟為金門同人臨歧悽斷季良元和時人工行草書闕標於史冊關雎著於詩首即闕一貫也安君令嬪渤海吳氏闕儒奉道為鄉閭之令望以夫人闕為長為孝婦闕於嚴母全之也吉人為善惟日不足以大和九年闕五日終於烏程縣臨苕鄉之私第年五十有三比盛年則非夭折闕痛青春即以其年五月二十八日闕霅水鄉仁王寺之西安君感其闕遵蒸祀買石志德紀之闕子曰師敏承闕保終於禮也石闕文以闕詞曰仁王山兮寺西園孤墳寂寂兮門下闕婦德兮黯黯孤魂平生義闕石志言公輿元和時官祠部員外郎聖皇窮天覆以張宇極地載以光宅端拱協有虞陶唐獻樂奏戎夷蠻貊豈不以浹洽元化沐浴聖澤于是鞮鞻掌其方位太常總其樂器列在天庭陳其鼓吹僸兜離風旋鳥翅其舞也無進旅退旅之容其音也非皎如繹如之義狄鞮騁能扶婁效智既夷樂之具陳彰帝德之光被觀其隨樂官入禁苑荷恩覃化及之德無踰山涉海之遠我聖君文明立極化本雍熙太和克同於天地貢樂不假於蠻夷所以司於太常奏於丹墀俾華夷之風不隔羈縻之義在茲夫其始也伊四部之爰來闢九門而並入水火之位雕題衣毛以相向金木之方皮服左袵以對立於以彰四夷之咸賓於以表五兵之載戢雖搏考之有聲靡塤箎之可附樂章既異無勞季札之觀曲度自殊奚假周郎之顧爾其非今非古乍濁乍清不雜中華之樂自作異方之聲聞奏既移於白日窮規以悅於皇情於是詔帑藏以頒賜命象胥以回衆九夷八蠻喜氣溢於咸鎬六戎五狄歡聲動於岐雍豈獨納魯廟而見稱獻漢廷而足重微臣賀華夷之混一敢承舞而獻頌允文元和時官左威衛録事參軍吳之藪曰具區郡之大惟蘇州商為貨居農實邦本錫貢多品厥曰上中土宜在民地利乎水常熟塘按圖經云南北之路自城而遙百有餘里旁引湖水下通江潮支遠脈分近委遐輸左右惟強家大族疇接壤制動涉千頃年登萬箱豈伊沿泝之功實由灌溉之利故縣取常熟歲無眚焉洎貞元以來時屬大旱繇是填淤薦為塗泥而淪胥怨咨殖物痡矣郡守隴西李素居中字人原始覩弊則曰在穿導之遂聞於本道廉使吏部尚書韓公公秉文惟謹施德惠人發令為適觀風悅隨人無間言我得從政攝令吳縣主簿李仲芳稟其成規請事疏鑿於是參井邑之役則經費其力而長洲當三之一焉縣宰李暵復善供命乃計功量日候隟庀徒為利涉之宜蔽反壤之害詢蓄泄之勢增遠近之防人不告勞事為永逸先期而望表繩直不日而終朝子來塘開地中工畢泉出山澤作氣江湖發源積為長流實自新浙舟楫鱗集農商景從春秋有施水旱斯備嗟呼塘之堙鬱也久矣何壅之無慮而啓之有時非體仁宏多應用高朗曷以越前所未暇逮今而行其志哉則史之決渠書之滌源以流其惡潤彼稻田況山川襟帶之廣林鹽沃澆之資規同九州殷列七縣其提封底績固良二千石之能惟李敏於直方精在損益為信安未半歲而吳郡餘一年焉政猶風行惠與時至文學備令清慎寡欲通貨豐財五行因之順下致理之實不其偉歟去歲朱方搆患而郡邑連陷公驅白徒以捍狂寇挺拔凶黨修復城池皇帝聞而嘉之俾金章與紫綬給誥垂美必將大闡王度紹休朝廷豈惟與民分憂是塘之為政也彼人士以允文在公之宇備詳其事請刻於石庶詞之可復銘曰瞻彼塘矣昔之所闢物利乘舟土膏其澤歲有湮塞時罔疏滌誰為澄流變為廣瀉降是良牧猗歟隴西揆日爰鑿經旬洞開湖水南迤江源北來旁分溝洫潛畜風雷政可施利役無勞止力均二邑功逾百里舟楫攸往田疇所視義實通方智俾經始濬自高岸豈云隨山人歡在路魚樂於泉伊此化遠矧夫事宣立石川上維無窮焉公權字誠懸兵部尚書公綽弟元和初進士纍遷司封員外郎歷穆敬文三朝皆侍書禁中文宗開成三年轉工部侍郎遷學士承旨武宗朝罷內職授右散騎常侍集賢院學士遷金紫光祿大夫封河東郡公歷工部尚書咸通初以太子太保致仕卒年八十八贈太子太師敷演毗尼洪嚴戒範覃思探賾會理研幽振發長途擺捐素習入百丈深山與衆悅隨溪谷脫遺身世年光六易度衆千餘黃中開成時人自荊門至清宮三百里雖水泉味鹹鑿井疏源往往而有中間觀風驛三十里涓滴不流磽確而塉長亭短亭三百餘家終日挈瓶入谷而汲暨乎暑氣炎煽天地燒爍金石提綆半路已成溫湯居者既往來難通行者固不保其往元和六載我司空鄭公節度荊南下車之日緝寧巴徼統正楚風疏導濆溜未暇細務三年政閒事簡因議路室委餼之事饑乏汲引之道訪於幕中寮佐僉曰地形峭峻意功多未即贊公公曰登陸求蓮誠宜不卜然二師鑿井焉有檻泉愚叟移山素無巨力志之所至神亦或昭苟利於人不計藏鏹支使庾承度宣貞絶俗仗義真副成規終此殊績於是程功蕆事穴其路隅一之日興畚插俾應鼛鼓騰沙掊土二之日困於石飛鎚鼓火轉石磊硪三之日計功未畢瀸泉仄出泛濫潏井上千夫㘚噪喧呼揚灑甘溢提缶爭先巷無居人語笑道邊嗟呼夫善政養人之術皆日就月將然孜孜而化曷若鄭公興一言土石之役濟萬古生靈之命匠意於衆慮之表見機於不宰之初如此翊君為堯舜之代惠澤必浸於昆蟲贊國為華胥之朝恩波必滋於草木况濟人於聲教之外愛物於象數之中立德已來無出其右易曰改邑不改井以君子清規長存鄭公有焉黃中猥從鄉第得厠賓筵覩事揚嘉猶未盡焉冀後來多士經此樂土知有仁焉咸字重易博州博平人元和二年進士又登博學宏詞科纍遷陜州大都督府長史陜虢觀察使入為右散騎常侍祕書監太和八年卒惟玉也稟堅白惟琢也散貞姿璞且無瑕可重其良者德斯有比不在於文之故以素為貴也任其自然之資則追琢其章不得以曲肆其巧特達之節不得以無飾而疑懿夫蓄溫潤以生輝見精神於照室發虹氣彰皓質欲磨不可每清貞以自持其美孔嘉在切磋而可必體乎智而其理以密合乎仁而其色斯溫既有求於剖璞寧不憚於焚崑諒成器之罔念固全真之可敦嗤獻斗員來終見碎於亞父鄙成環可佩俾獲罪於叔孫含其章積其潤恥從飾以變質豈匿瑕而為吝將奪價於連城笑如泥於利刃所寶者道不在其沽幸可貴於君子非賈害於匹夫流水之文記其方兮斯有他山之錯施其用兮則無美可同於韞櫝嫌匪生於掩瑜秉不磷不緇之道陋為圭為璧之徒則知玉之美者是吾寶也異宋人越鄉之患司城安得而使攻類晉侯外府之珍虞道固知而可假雖天子賜圭於朝亦琢亦雕諸侯受瑞於國亦磨亦刻所以尚其名尊其德豈徒文被褐之懷飾截肪之色又有一拳可尚三獻未識俟覽者而求旃冀善價而不忒銑趙郡人美原丞渙子昔孫武以兵術干吳王曰臣聞國之大君之尊法星象月則乾效坤蓋材德之並用故文武而兼存所以安社稷保子孫恢霸圖慮併吞臣實不敏請嘗試論王曰弧矢之利以討其二雖邦國之無虞必干戈之有備今者革車千乘介馬萬轡外多徑敵敢曠戎事誠願陳五兵之道用一鼓之氣雖寡人之不德知將軍之自試聞女子之難令豈習之而能致不然者則無以表將軍之異武曰唯唯大王之所示乃召內宰出麗嬪下高臺授武臣皇皇兮其令巳申肅肅兮其氣益振今日寵不可恃法有所遵當秉心以受教勿怙色而驕人於是建主首統諸婦示其左右約其先後惟玉貌之自矜念將軍之何有顧三令而卻立哂再麾而掩口當兵法之必誅雖君令之不受既而易將更令整行定伍開天門閉地戶審向背分客主角以持兵金以節鼓張奇正以導其進退制方圓而必中規矩武曰彼如桃如李皆如貔如虎可以服楚越懾齊魯惟大王之悉覩豈獨播於虛聲以婦人之講武王曰始也壯卿之術今也信卿之效將遇敵而可敵故難教而可教乃朝㣥臣御正殿授以斧鉞使其攻戰王不失王道武不辱武戰戮二姬而顏色匪怍制敵國而軍聲大變於是孫子用兵有獨斷之名尤不若吳王有割愛之善公肅元和初為太常博士兼修撰伏惟元和五年十一月敕將行藉田令有司詳定儀注伏緣藉田禮廢已五十餘年有司案牘無可簡尋今據禮經兼採開元乾元故事並徵前代沿革參酌詳定准禮無忌月禁樂今太常及教坊以正月是國家忌月停習郊廟饗宴之音中外士庶咸罷慶樂伏尋經典竊恐乖宜臣謹按禮記有忌日不樂無忌月之文漢魏以降代襲斯旨惟晉穆帝將納后以康帝忌月下議禮官荀訥王洽曹耽王彪之並當時知禮者皆稱禮有忌日無忌月若有忌月即有忌時忌歲益無禮據時從其議伏以承前所禁皆在二十五月之中今既逾遠禮須改革臣又聞統人立法必守先王之常經企及俯就不違聖哲之明訓下盡㣥言上留元鑒不以私懷而踰於禮節又記曰是月禫徙月樂明王制禮漸去其情不應以追遠而立禮反重也今太常停習郊廟之樂是反重而慢神有司禁中外之音是無故而去樂詳其前典情理不倫考其沿襲又無所據儻陛下正因循之越度法經典之明文約禮之儀傳於史冊天下幸甚古者一娶九女所以於廟無二嫡自漢秦以下不行此禮遂有再娶之說前娶後繼並是正嫡則偕祔之義於禮無嫌謹按晉驃騎大將軍溫嶠相繼有三妻疑並為夫人以問太學博士陳舒議以妻雖先歿榮辱並隨夫也禮祔於祖姑祖姑有三人則各祔舅之所生如其禮意三人皆夫人也秦漢以來諸侯不復一娶九女既生娶以正禮歿不可貶自後諸儒咸用舒議且嫡繼於古則有殊制於今則無異等今王公再娶無非禮聘所以祔配之義不得不同至於卿士之家寢祭亦二妻位同几席豈享廟之禮而有異乎是知古者廟無不嫡防姪娣之爭競今無所施矣古之繼室皆媵妾也今之繼室並嫡妻也不宜援古一娶九女之制也而使子孫祭享不及或曰春秋聲子不入魯侯之廟如之何謹按魯惠公元妃孟子卒繼室以聲子聲子之姪娣非正也自不合入魯公之廟明矣又武公生仲子則仲子歸於魯生桓公而惠公薨立宮而奉之追成父志別為宮也尋求禮意則當然矣未見前例如之何謹按魯南昌府君廟有荀氏辥氏景帝有夏侯氏羊氏聖朝睿宗廟有昭成皇后竇氏肅明皇后劉氏故太師顏魯公祖廟有夫人殷氏繼夫人柳氏其流甚多不可悉數略稽禮文參諸故事二夫人並祔於禮為宜潾河東聞喜人以門蔭入仕太和中拜河南尹歷刑兵二部侍郎開成三年卒贈戶部尚書諡曰敬臣聞除天下之害者受天下之利共天下之樂者饗天下之福故上自黃帝顓頊堯舜禹湯下及文王武王咸以功濟生靈德配天地故天皆報之以上壽垂祚於無彊伏見陛下以大孝安宗廟以至仁育黎元自踐祚以來剗積代之妖凶開削平之洪業而又禮敬宰輔待以始終內能大斷外寬小故夫此神功聖化皆自古聖主明君所不能及今陛下躬親行之實光映千古矣是則天地神祗必報陛下以山嶽之壽宗廟聖靈必福陛下以億萬之齡四海蒼生咸祈陛下以覆載之永自然萬靈保佑聖壽無疆伏自去年以來諸處薦藥術之士有韋山甫柳泌等或更相稱引迄今狂謬薦送漸多臣伏見以真仙有道之士皆匿其名姓無求於代潛遁山林滅影雲壑唯恐人見唯恐人聞豈肯干謁公卿自鬻其術今者所有夸衒其藥術者必非知道之士咸為求利而來自言飛鍊為神以誘權貴賄賂大言怪論驚聽惑時及其假僞敗露曾不恥於逃遁如此情狀豈可保信其術親餌其藥哉禮曰夫人食味別聲被色而生者也春秋左氏傳曰味以行氣氣以實志又曰水火醯醢鹽梅以烹魚肉宰夫和之濟之以味君子食之以平其心夫三牲五穀稟自五行發為五味蓋天地生之所以奉人也是以聖人節而食之以致康強逢吉之福若夫藥石者前聖以之療疾蓋非常食之物况金石皆含酷烈熱毒之性加以燒治動經歲月既兼烈火之氣必恐難為防制若乃遠徵前史則秦漢之君皆信方士至如盧生徐福欒大李少君其後姦僞事發其藥竟無所成事著史記漢書皆可驗視禮曰君之藥臣先嘗之親之藥子先嘗之臣子一也臣願所有金丹之藥伏乞先令鍊藥人及所薦之人皆先服一年以考其真僞則自然明驗矣伏惟元和聖文神武法天應道皇帝陛下合日月照臨之明稟乾元利貞之德崇正若指南受諫如轉規是必發精金之刃斷可疑之網所有藥術虛誕之徒伏乞特賜罷遣禁其幻惑使浮雲盡徹朗日增輝道化侔羲農悠久配天地實在於此矣伏以貞觀已來左右起居有褚遂良杜正倫呂向韋述等咸能竭其忠誠悉心規諫小臣謬參侍從職奉起居侍從之中最近左右傳曰近臣盡規則近侍之臣上達忠款實其本職也驛館之務每驛皆有專知官畿內有京兆尹外道有觀察使刺史迭相監臨臺中又有御史充館驛使專察過闕伏知近有敗事上聞聖聽但明示科條督責官吏據其所犯重加貶黜敢不惕懼日夜勵精若令宮闈之臣出參館驛之務則內臣外事職分各殊切在塞侵官之源絶出位之漸事有不便必誡於初令或有妨不必在大當掃靜妖氛之日開太平至理之風澄本正名實在今日典刑者公柄也在官者得施於部屬之內若非在官又非部屬雖有私罪必告於官為之理以明不得擅行鞭捶於齊人也元衡身非在官公成毋非部屬而擅憑威力橫此殘虐豈合均於常典柏公成取貨於讐利母之死悖逆天性犯則必誅
