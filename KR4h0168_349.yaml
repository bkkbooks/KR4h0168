front:
  text: 全唐文欽定全唐文卷三百四十九李白三
  hash: sha256:7f87c671678014b3aa91abdaabf2d3bfd163b4f6139a54abae3f1e913dabdefd
body:
  text: 夫天地者萬物之逆旅光陰者百代之過客而浮生若夢為歡幾何古人秉燭夜遊良有以也況陽春召我以煙景大塊假我以文章會桃李之芳園序天倫之樂事㣥季俊秀皆為惠連吾人詠歌獨慙康樂幽賞未已高談轉清開瓊筵以坐花飛羽觴而醉月不有佳作何伸雅懷如詩不成罰依金谷酒數吾觀蔡侯奇人也爾其才高氣遠有四方之志不然何周流宇宙太多耶白遐窮冥搜亦已早矣海草三緑不歸國門又更逢春再結鄉思一見夫子冥心道存窮朝晚以作宴驅煙霞以輔賞朗笑明月時眠落花斯遊無何尋告暌索來暫觀我去還愁人乃浮漢陽入雲夢鄉枻云叩歸魂亦飛且青山緑楓纍道相接遇勝因賞利君前行既非遠離曷足多歎秋七月結遊鏡湖無我期先子而往敬慎好去終當早來無使耶川白雲不得復弄爾鄉中廖公及諸才子為詩略謝之白以鄒魯多鴻儒燕趙饒壯士蓋風土之然乎趙少公才貌王褱雅志氣豪烈以黃綬作尉泥蟠當塗亦猶雞棲鶴籠不足以窘束鸞鳳耳以疾惡抵法遷於炎方辭高堂而墜心指絶國以搖恨天與水遠雲連山長惜光景於頃刻開壺觴於洲渚黃鶴曉別愁聞命子之聲青楓暝色盡是傷心之樹然自吳瞻秦日見喜氣上當攫玉弩摧狼狐洗清天地雷雨必作冀白日回照丹心可明巴陵半道坐見還吳之棹令雪解而松柏振色氣和而蘭蕙開芳僕西登天門望子於滄江之上吾賢可流水其道浮雲其身通方大適何往不可何戚戚於路歧哉吁咄哉僕書室坐愁亦已久矣每思欲遐登蓬萊極目四海手弄白日頂摩青穹揮斥幽憤不可得也而金骨未變玉顏已緇何常不捫松傷心撫鶴歎息誤學書劒薄遊人間紫禁九重碧山萬里有才無命甘於後時劉表不用於禰衡暫來江夏賀循喜逢於張翰且樂船中遇達人張侯大雅君子統泛舟之役在清川之湄談元賦詩連興數月醉盡花柳賞窮江山王命有程告以于邁煙景晚色慘為愁容繫飛帆於半天泛淥水於遙海欲去不去更開芳樽樂雖寰中趣逸天外平生酣暢未若此時至於清談浩歌雄筆麗藻笑飲醁酒醉揮素琴余實不愧於古人也揚袂遠別何時歸來想洛陽之秋風將鱠魚以相待詩可贈遠無乃闕乎易曰觀乎人文以化成天下窮此道者其惟傅侯耶侯篇章驚新海內稱善五言之作妙絶當時陶公愧田園之能謝客慙山水之美佳句籍籍人為美談前許州司馬宋公蘊冰清之姿重傅侯玉潤之德妻以其子鳳凰于飛潘楊之好斯為睦矣僕不佞也忝於芳塵宴同一筵心契千古清酌連曉元談入微歡攜無何旋告暌拆將軍叔英略蓋古英明洞神天王貴宗誕育賢子八龍增秀以列次五色相輝而有文會言高樂曉餞金門洗德絃觴怡顏朱明草木已盛且江嶂若畫賞盈前途自然屏間坐遊鏡裏行到霞月千里足供文章之用哉征帆空懸落日相迫二季揮翰詩其贈焉通驛公館南有水亭焉四甍翬飛巉絶浦嶼蓋有前攝令河東嶭公棟而宇之今宰隴西李公明化開物成務又橫其梁而閣之晝鳴間琴夕酌清月蓋為接輶軒祖遠客之佳境也製置既久莫知何名司馬武公長材博古獨映方外因據胡牀岸幘嘯詠而謂前長史李公及諸公曰此亭跨姑熟之水可稱為姑熟亭焉嘉名勝概自我作也且夫曹官紱冕者大賢處之若遊青山臥白雲逍遙偃傲何適不可小才居之窘而自拘悄若桎梏則清風朗月河英嶽秀皆為棄物安得稱焉所以司馬南鄰當文章之旗鼓翰林客卿揮辭鋒以戰勝名教樂地無非得俊之場也千載一時言詩記志夫槿榮芳園蟬嘯珍木蓋紀乎南火之月也可以處臺榭居高明吾之友于順此意也遂卜精勝得乎龍興留寶馬於門外步金梯於閣上漸出軒戶遐瞻雲天晴山翠遠而四合暮江碧流而一色屈指鄉路還疑夢中開襟危欄宛若空外嗚呼屈宋長逝無堪與言起豫者誰得我二季當揮爾鳳藻挹豫霞觴與白雲老兄俱莫負古人也天王三京北都居一其風俗遠蓋陶唐氏之人歟襟四塞之要衝控五原之都邑雄藩劇鎮非賢莫居則陽曲丞王公神仙之胄也爾其學鏡千古知周萬殊又若少府賈公以述作之雄也鼇弄筆海虎攫辭場又若石艾尹少公廊廟之器口折黃馬手揮青萍咸道貫於人倫名飛於日下實難沈屈永懷青霄劒有隱而氣衝七星珠雖潛而光照萬壑今年春皇帝有事千畝湛恩八埏大搜㣥才以緝邦政而王公以令宰見舉賈公以王霸升聞海激佇乎三千天飛期於六月必有以也豈徒然哉有從兄太原主簿舒才華動時規謀匠物乃黕翠幕筵虹梁瓊羞霞開羽觴電舉然後抗目遠覽憑軒高吟汾河鏡開漲藍都之氣色晉山屏列橫朔塞之郊原屏俗事於煩襟結浮歡於落景俄而皓月生海來窺醉容黃雲出關半起秋色數君乃輟酌慷慨搖心促裝望丹闕而非遠揮玉鞭而且去白也不敏先鳴翰林幸叨玳瑁之筵敢竭麒麟之筆請各探韻賦詩寵行夫士有飾危冠佩長劒揚眉吐諾激昂青雲者莫不誇炫意氣託交王侯若告之急難乃十失八九我義兄孟子則不然耶道合而襟期暗親志乖而肝膽楚越鴻騫鳳立不循常流孔明披書每觀於大略少君讀易時作於小文四方賢豪眩然景慕雖長不滿七尺而心雄萬夫至於酒情中酣天機俊發則談笑滿席風雲動天非嵩邱騰精何以及此白以弱植早飲香名況親承光輝恩甚華萼他鄉此別誰無恨耶時林風吹霜散下秋草海鴈嘶月孤鶴翔雲驚魂動骨戛瑟落涕抗手緬邁傷如之何且各賦詩以寵行路余少時大人令誦子虛賦私心慕之及長南遊雲夢覽七澤之壯觀酒隱安陸蹉十年初嘉興季父謫長沙西還時豫拜見預飲林下專乃稚子嬉遊在傍今來有成鬱負秀氣吾衰久矣見爾慰心申悲道舊破涕為笑方告我遠涉西登香爐長山橫蹙九江卻轉瀑布天落半與銀河爭流騰虹奔電潀射萬壑此宇宙之奇詭也其上有方湖石井不可得而窺焉羡君此行撫鶴長嘯恨丹液未就白龍來遲使秦人著鞭先往桃花之水孤負夙願慙未歸於名山終期後來攜手五嶽情以送遠詩寧闕乎白上探元古中觀人世下察交道海內豪俊相識如浮雲自謂德參夷顏才亞孔墨莫不名由口進實從事退而風義可合者厥惟戴侯戴侯居長沙稟湖嶽之氣少長咸洛窺霸王之圖精微可以入神懿重可以崇德謨猷可以尊主文藻可以成化兼以五才統以四美何往而不濟也其二三諸昆皆以才秀擢用辭翰炳發升聞天朝而此君獨潛光後世以期大用鯤海未躍鵬霄悠然不遠千里訪余以道鄖國之秀有廖侯焉人倫精鑒天下獨立每延以宴謔許為通人獨孤有鄰及嶭公咸亦以為信然矣屬明主未夢且歸衡陽憩祝融之雲峯弄茱萸之湍水軒騎糾合祖於魏公之林亭笙歌鳴秋劒舞增氣況江葉墜緑沙鴻冥飛登高送遠使人心醉見周張二子為論平生雞黍之期當速赴也紫雲仙季有英風焉吾家見之若衆星之有月貴則天王之令弟寶則海嶽之奇精遊者所謂風生玉林清明蕭灑真不虛也常醉目吾曰兄心肝五臟皆錦繡耶不然何開口成文揮翰霧散因撫掌大笑揚睂當之使王澄再聞亦復絶倒觀夫筆走㣥象思通神明龍章炳然可得而見歲十二月拜省於淮南思白華之長吟眺黃雲之晚色目斷心盡情懸高堂傾蘭醑而送行赫金鞍而照地錯轂蹲野朝英滿筵非才名動時何以及此日落酒罷前山陰煙殷勤惠言吾道東坐想洛橋春色先到淮城見千條之緑柳折一枝以相贈則華萼情在吾無恨焉㣥公賦詩以光榮餞吾與霞子元丹煙子元演氣激道合結神仙交殊身同心誓老雲海不可奪也歷行天下周求名山入神農之故鄉得胡公之精術胡公身揭日月心飛蓬萊起餐霞之孤樓鍊吸景之精氣延我數子高談混元金書玉訣盡在此矣白乃語及形勝紫陽因大誇仙城元侯聞之乘興將往別酒寒酌醉青田而少留魂夢曉飛渡淥水以先去吾不凝滯於物與時推移出則以平交王侯遁則以俯視巢許朱紱狎我緑蘿未歸恨不得同棲煙林對坐松月有所款然銘契潭石乘春當來且抱琴臥花高枕相待詩以寵別賦而贈之原夫太素未分無光無象混黃成化有始有終則升清而滯穢輔善而貶凶置百二十曹局列於冥府造三十六部經祕於瓊宮度天人之有道啓含識之不矇余歎曰莫非三界十方天地人倫斯所以為道之紀也今竊見聖世幸逢豐年得遇皇朝將道德而安家邦效勳華而育黎庶而況天下晏然太元彰耀今即啓有道之心者扶風氏等志奉日新慕真歲久禱天祐而制凶魔求師訓而傳道要遂得遇崆洞山元元真人明龍漢之元文演赤文之妙奧教符十洞三乘化列萬機一義注解北斗延生經一卷上則有飛神金闕中則有保國寧家次則有延齡益壽普度有情之品同登無礙之門於是謹作斯文用題經首李白謹序澤畔吟者逐臣崔公之所作也公代業文宗早茂才秀起家校書蓬山再尉關輔中佐於憲車因貶湘陰從宦二十有八載而官未登於郎署何遇時而不偶耶所謂大名難居碩果不食流離乎沅湘摧悴於草莽同時得罪者數十人或才長命夭覆巢蕩室崔公忠憤義烈形於清辭慟哭澤畔哀形於翰墨猶風雅之什聞之無罪覩之者作鏡書所感遇總二十章名之曰澤畔吟懼姦臣之猜常韜之於竹簡酷吏將至則藏之於名山前後數四蠧傷卷軸觀其逸氣頓挫英風激揚橫波遺流騰薄萬古至於微而彰婉而麗悲不自我興成他人豈不云怨者之流乎余覽之愴然掩卷揮涕為之序云夫功未足以蓋世威不可以震主必挾此者持之安歸所以彭越醢於前韓信誅於後況權位不及於此者虛生危疑而潛包禍心小拒王命是以謀臣將啖以節鉞誘而烹之亦由借鴻濤於奔鯨鱠生人於哮虎呼吸江海橫流百川左縈右拂十有餘郡國討未及誰當其鋒我副使李公勇冠三軍衆無一旅橫倚天之劒揮駐日之戈吟嘯四顧熊羆雨集蒙輪扛鼎之士杖干將而星羅上可以決天雲下可以絶地維翕振虎旅赫張王師退如山立進若電逝轉戰百勝僵尸盈川水膏於滄溟陸血於原野一掃瓦解洗清全吳可謂萬里長城橫斷楚塞不然五嶺之北盡餌於修蛇勢盤地蹙不可圖也而功大用小天高路遐社稷雖定於劉章封侯未施於李廣使慷慨之士長吁青雲且移軍廣陵恭揖後命組練照雪樓船乘風簫鼓沸而三山動旌旗揚而九天轉良牧出祖列將登筵歌酣易水之風氣振武安之瓦海日夜色雲帆中流席闌賦詩以壯三軍之士白也筆已老矣序何能為昔祖龍滅古道威嚴刑煎熬生人若墜大火三墳五典散為寒灰築長城起阿房并諸侯殺豪俊自謂功高羲皇國可萬世思欲淩雲氣求仙人登封泰山風雨暴作雖五松受職草木有知而萬象乖度禮刑將弛則綺皓不得不遁於南山魯連不得不蹈於東海則桃源之避世者可謂超升先覺夫指鹿之儔連頸而同死非吾黨之謂乎二翁耽老氏之言繼少卿之作文以述大雅道以通至精卷舒天地之心脫落神仙之境武陵遺迹可得而窺焉問津利往水引漁者花藏仙溪春風不知從來落英何許流出石洞來入晨光盡開有良田名池竹果森列三十六洞別為一天耶今扁舟而行笑謝人世阡陌未改古人依然白雲何時而歸來青山一去而誰往諸公賦桃源以美之江南之仙山黃鶴之爽氣偶得英粹後生俊人林公世為豪家此土之秀落髮歸道專精律儀白月在天朗然獨出既灑落於彩翰亦諷誦於人口間雲無心與化偕往欲將振五樓之金策浮三湘之碧波乘杯泝流考室名嶽瞰憩冥壑淩臨諸天登祝融之峰巒望長沙之煙火遙謝舊國誓遺歸蹤百千開士稀有此者余所以歎其峻節揚其清波龍象先輩回眸拭視比夫汨泥沙者相去如牛之一毛昔智者安禪於台山遠公託志於廬嶽高標勝概斯亦嚮慕哉紫霞搖心青楓夾岸目斷川上送君此行㣥公臨流賦詩以贈斯高柄秦嬴世不二三傑伏草與漢並出莽夷朱暉耿鄧乃起自古英達未必盡用於當年去就之理在大運爾我君六葉繼聖熙乎元風三清垂拱穆然紫極天人其一哉所以青雲豪士散在商釣四座名哲皆清朝旅人吾稀風廣成蕩漾浮世素受寶訣為三十六帝之外臣即四明逸老賀知章呼余為謫仙人蓋實録耳而嘗採姹女於江華收河車於清溪與天水權昭夷服勤爐火之業久矣之子也沖恬淵靜翰才峻發白每一篇一札皆昭夷之所操吁捨我而南若折羽翼時歲律寒色天風枯聲雲帆涉漢冏若絶電舉目四顧霜天崢嶸銜杯敘離而㣥子賦詩以出餞謫仙翁李白辭昔謝安四十年臥白雲於東山桓公纍徵為蒼生而一起常與支公遊賞貴而不移大人君子神冥契合正可乃爾僕與倩公一面不忝古人言歸漢東使我心痗夫漢東之國聖人所出神農之後季良為大賢爾來寂寂無一物可紀有唐中興始生紫陽先生先生六十而隱化若繼迹而起者惟倩公焉蓄壯志而未就期老成於他日且能傾産重諾好賢工文即惠休上人與江鮑往復各一時也僕平生述作罄其草而授之思親遂行流涕惜別今聖朝巳舍季布當徵賈生開顏洗目一見白日冀相視而笑於新松之山耶作小詩絶句以寫別意辭曰彼美漢東國川藏明月輝寧知喪亂後更有一珠歸東南之美者有江夏黃公焉白竊飲風流始接談笑亦有抗節玉立光輝炯然氣高時英辨折天口道可濟物志棲無垠鄱陽張公朝野榮望愛客接士即原嘗春陵之亞焉每欽其辭華懸榻見往而黃公因訪古迹便從貴遊乃僑裝撰行去國遐陟諸子銜酒惜別沾巾贈分沈醉煙夕惆悵涼月天南回以變夏火西飛而獻秋汀葭颯然海草微落夫子行邁我心若何毋金玉爾音而有遐心湖水演沔勗哉是行共賦武昌釣臺篇以慰別情耳
