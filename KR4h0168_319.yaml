front:
  text: 全唐文欽定全唐文卷三百十九李華六
  hash: sha256:623f12f39d93a14072be4deff592e4bda0bfb1bfb14c11060821dcceef292df8
body:
  text: 漢永平中佛教初至洛陽始置寺處騰蘭二德古者官之庭府稱寺蓋賓而尊之比於曹署此其源也杭州開元寺梁天監四年豫州刺史譙郡戴朔捨宅為寺寺號方興名僧惠圜營建之後處士戴元范賓恭增飾之至開元二十六年改為開元寺庭基坦方雙塔樹起日月逝矣材朽將傾廣德三年三月西塔壞凶荒之後人願莫展太常卿兼杭州刺史張公伯儀忠簡帝心威靜吳越駐車跪禮徘徊感嘆乃捨清白之俸為君為親修而復之兵部員外郎兼侍御史范公倫人之圭璋國之俊彥法師釋曇獻上座釋雲卿寺主釋崇遠都維那釋惠達釋法祥長樂寺釋曇景等戒香扶其永誓道力護其成功於是劍南荊楊之巨材諸郡倕輸之懿匠竭耗神明三年畢事乙栗結仡穿貫皓氣晃爚景象烘若鎔金距卑躋高凡為七級級有佛事環回㫬轉幢網通映如梵釋宮踐乎上府俯視萬井有若棊布仰瞻天宇雲在身下傍眺江山列在掌端過乎址隈傾峯動崖岌業其側既鏤以丹素飾以青紫掀腸閃目百變百移如有靈物山纍峗稜層雷嵬攢欒摽江壓湖孤島突天不可名也霞照丹戶如開日宮風搖和鈴若下天樂聲徹自頂輪蔭空界影入清江形鎮大地所濟者廣巍巍度門先大德釋懷亮住持之固如山不動先法師釋道貞華嚴祕宗香象至底先法師釋藏暉三藏扃鑰吾方啓之過去入緣在世慈願不有偈頌其如佛恩華嘗官是邦感深霜露忝大常一面與兵部為寮敬申其美以佐法門之宏觀其文曰亭亭揭堅逈出江甸秋天泬寥百里獨見如海浮來如地踊現以壯州邑以調㣥心餌藥解病依丹濟深卿曹郎署共布黃金先朝宗室之望曰紀王太宗第十子也惟帝族母師曰東光縣主紀王第三女也自天降祐生有令德年八歲王不豫循環左右不食纍日王撫首諭焉為之進膳縣主察起居未復憂色如初動於神祗王疾用間周文樂正之養不過焉至若天人之秀元氣之純積於中文於外其容可知也孝以奉親慈以臨下尊師傅服浣濯其德可知也禮傳為竹替珥詩書為佩王原心而顧身體訓而成教其言可知也降尊而處下推泰而從約詣繡繪之妙適飲膳之和其功可知也年十六一作十八受封邑王擇聞喜公以妻之聞喜有王佐之才委會藩邸縣主以皇孫之貴和鳴侯家陰德莫違輝動邦教養先姑如寧膝下奉君子如見大賓以徽柔睦娣姒以莊敬端幼賤鵲巢之化存焉太后臨朝諸武專政魯衛之國翦焉邱墟紀王流竄巴濮薨於道路縣主承訊崩心嘔血每一發聲飛鳥哀鳴草木無色外除之後衣裳無純采杯棬無甘食耳不聽聲首不加飾自朝廷達於宇內罔不哀之太后復辟中宗出震升日暘谷天下文明雷破㣥陰品物咸遂以王懿親盛德詔有司備禮物陪葬昭陵聞喜公時為孝義令詔書至河縣主聞之嘔血而絶絶而復蘇告諸子曰家國再造寃酷獲申為我謝中外親親下見先王瞑目無恨言未畢而薨春秋五十有四時神龍元年二月二十二日有司以聞中宗震悼召聞喜公問公悉以對上歔欷久之殿省垂泣六宮悽愴乃下詔裦美史官撰德弔祭賵贈禮遇其備矣深於春秋者嘆曰孝之至不忘其親忠之至乃心王室自古賢士大夫莫能備舉惟縣主有焉紀王之陷非罪也泣血以終哀中宗之撫興運也則感深而殞絶忠孝兩極首其人倫使百代之下聞其風者有以勸焉其為不匱遠矣嗚呼天輔善人宜其有後男十人女十人四子至大夫曰遇曰遘曰邁邁仁則踐修孝惟明發少子德位兼盛曰逈今河南尹兼東都留守上柱國祿益厚而慕益深不逮劬勞之報故也銜涕投簡而命下吏敬銘三章式表幽宅其文曰肅雍王門天帝之孫因心則孝懷盛敬尊配美良士如賓禮存泣血終身豈惟霜露慶集國家魂清冢墓壽絶哀歡事高緗素天作邙山萬化攸歸地閉金印泉深衮衣國風悽愴彤管無輝大朴既雕淳源不復生人溺於迷妄自拔無由我梵惟哀之力現靈東方雷起㣥蟄間生龍象調御人天巍巍乎大明燭幽而品物知向矣噫稠林枝幹榮枯不息火宅烟焰起滅相尋於衆生速壞之身有諸佛常存之性垢衣纒寶而不見濁水求珠而未得法無高下根有淺深由是啓禪那證入之門立毗尼攝護之藏土因水而成器火得薪而待燃惟此二宗更相為用律行嚴用奉則淨無瑕缺戒定光深照則測見本源次修定門而自調伏云何為大定地雖傾而不動云何為修我心雖寂而無住然後登般若之岸上楞伽之峯以此身為法身了無得為真得或有默修元契於文義受教頓悟於宗師不由門階徑造堂室微塵學者時得一人復有大悲空隘而不窮宏誓海涸而不盡俯從像法以導世間則我大律師其人也師諱道一字法籥餘杭嚴氏生族姓之家是為因地作如來之子寧有本緣故祖考不書尊上乘也體峻山嶽神閒江海機對敏洽應受融明自襁褓至於成童顏色無違視聽皆正年甫八歲辭親就師鴻鵠入冥自然方外蓮花出水不染泥間十七預剃度隸龍泉寺受具於光州岸律師行相珠圓滌流鏡徹始就山陰聽岸講涅槃經師既歸而為衆敷闡同時聽者奉以為師恭惟此經佛最後說教旨深圓故草元著義法華經大事因緣授聲聞記口誦心奉誓盡當來金剛經滅度無邊悉離諸相誦起信論滌除邪妄開導心宗常所受持皆為義釋於華嚴入普賢性海於維摩得不二法門凡歷見聞莫非心證從文悟理也白日頓明於世界飛鳥自在於空中從理乘如也嘗謂天台觀門往誓深教吾所歸也夫垢因戒淨惠定以生未有愛尚存而坐登三昧每嘆曰持心繫於剎那求道本於清淨使學徒解怠由軌範不明教之興衰在我而已矣乃獲一席信心必隨嘗講大乘方攝齊登座侍者布席微爽律文即命撤席浣衣以俟明日其檢身激下皆此類也自是江南律學砥礪彌精矣至若齊場星列談座雲繞四衆仰山王之高萬里赴龍宮之會遠夷逾海而來聽長老順風而請益至仁生滅至辨成簡判析疑問若陽和解冰宏敷妙理如止水觀月化童蒙為上智伏我慢為調柔引諸佛戒定之池浴衆生輕重之垢垢自流去池常湛然又以儒墨者般若之笙簧詞賦者伽陀之鼓吹故博通外學時復著文在我法中無非佛事故李大理升期崔河南希逸嘗撫本州麾幢往復故成御史廣業盧華州元裕兵部韓員外賞屈身郡邑䑳舸洄沿及鄉人故汴州何司戶寒同與叩絶韻於清風味元機於永夕廬山師友今古一時誠願密宏崇修本寺導容纓網高殿棟宇工人殫其百櫨信士竭其千金佛宮嚴麗一方勝絶寫大藏經手自刊校學者賴焉廣常住田通給無閡凡聖均焉於天竺寺造慈氏變相憑高為臺與衆均福光靈肹蠁如在會中永以報生育劬勞之恩光先師訓誘之德不離宴坐應者如歸天寶十三年春忽灑飾道場端理經論惟銅瓶錫杖留置左右具見五天大德十八羅漢幡蓋迎引請與俱西二月八日恬然化滅報齡七十六僧臘五十七生以其日滅亦如之昔同如來捨位之辰今是菩薩往生之日古先大士無此明徵先時院庭有百合兩本對發白花光如月輪照於昏夜嗚呼慈雲既歸花亦雕萎物感如是人哀可知至某月日遷厝於寺之西偏江嶺淮湖緇麻縞素荼毗之會聲動山川寂寥原野人亡地古悲夫一為人師六十年矣遠名利故不遊京國樂閒安故不出戶庭有請方去故深慈密行莫得而究焉門人之冠者一行禪師惠罕法師津梁寺乾應律師蘇州東林寺懷哲律師湖州開元寺惠燈少明之記長者寶藏修身執持導師化城無處瞻仰眷屬之賢有若族人神都等如來影中怖畏都盡力生今地哀號不窮以華悅曾史之風尚竺乾之道追書本行見託斯文銘曰苕溪教源因戒生定百千人俱見性情淨裂除意網磨拂心鏡雖會一乘終修萬行說法登壇天龍諦聽須彌峯頂白月孤映彼迷方者從我得正報盡生盡歸自法身最朝涕泣江上門人炬滅陰夜舟沈海津雪山靈草無復青春欲報之德蒼蒼罔極既斷言語又非空色假言喻空觀我為則器為外物挹泉者器有以濟饑渴也身為妄聚奉道者身有以成大覺也泉不離器道不離身器存則饑渴洗除身修則大覺無礙故律為知見根本開入扄戶持其要得其宗者有若長老體公蓋毗尼之堂室尸羅之燈炬三昧之舟筏也信安有名山名川山秀川清家為蔣宗母曰徐姓地靈開祐降神而生徐氏既孕夢婆羅門告曰姊當生男紹興大法長老既齓好聚沙起窣堵波焚草為香採花為供年十有五瓊章鶴姿兄為淨安寺上首乃往從學日誦萬言兄嘆曰吾祖父昆弟六人出家受習之速無其比也年二十一通大乘小乘千紙如意年中配度淨安寺遊問會稽遇光律師受其戒誦戒至三日屬衆僧布席登座宣說無有遺文住洛京五年與本州策律師東陽超志法師同講問為法門儀表萬歲元年歸信安稟受者千人由是江南律範端嚴第一衲衣袒肩跣足行乞手蒔松竹繕造僧房苦行貫天地大慈包世界於辨才得自在於文義得解脫於人法得無我於觀照得甚深刺史徐嶠之率參佐縣吏耆艾以降請居龍興寺迎供者多不知同日紛然辨鬬聞於長老曰吾修無諍三昧不唯自利宏願利人咄因吾身生彼嗔恨乃別立一室室才方丈晏然安居不踐門閾刺史李暢跪請移居大方至於涕淚俯如其請因入法華三昧口不息誦身不親席大事因緣我得心證請左溪大師講止觀鑄鐘七千斤鄰州長吏稽首延請結艦浮川幢蓋彌望瞻禮萬計行無住悲建講堂門樓庫房宇畫諸佛剎鑿放生池聞者敬觀者信聽者悟日月無私之照江湖不言之潤如來權實之門其至矣哉收材江湖方構佛殿㣥盜據州寺半為墟址如鳥巢形若枯木凶猾棄刃稽首歸仁寶應二年六月九日自升繩床趺坐而滅享齡九十二僧臘七十一緇素號慟楚越悽悲至廣德元年十二月三日焚於州西某原起塔安神諸佛之遺教也唯長老貌清神遠仁深行獨卓為道器注為法源謙非外儀質乃內至若調伏住持之固禮誦跪繞之勤耄期不衰寒暑如一學窮必究理精必詣猶自以為功微道淺未足為師真金純金萬寶之最也趺滅之夕則異香滿室閉塔之日則㣥鶴翔鳴信安王褘趙太常頤真鄭庶子倬李中丞丹前相國李梁公峴皆為此州躬往圍繞趙太常敬因長老立文殊萬聖之象李梁公增感先人泣下雙林之間長老在世靈徵繁多日輪降照於梁端大龍修敬於池上寒蒲挺擢於冰下彩芝炫瑩於禪室慶雲覆會仰嘆千人此其盛者弟子僧惠藏爰自童蒙服勤左右四十年矣惠命阿難結集如來之言顏氏之子鑽仰素王之道杭州靈隱寺大德惠遠婺州開元寺大德清辨本州六度寺大德惠炬大乘寺主浩然本寺上座惠達寺主法會都維那神爽等輪王之位我敬奉之妙光之法我敬行之爰請伽陀式播元烈銘曰付囑戒藏遵行威儀光還性靜翼具禽飛止法根本深仁得之蓮花不濡性本清淨彼上人者無時非定定不離儀儀不離性色身雖滅此滅皆寂寂然不動斯為正真鎔金起塔哀斷門人肇有含氣則鷹鸇逐鳥虎狼噬人人最靈於其間嗜欲萌而六根動利害交而五兵作文演乾坤至於性命老陳道德循於天下不究因緣之本不知大千之廣而內盜方扇心塵益悖長圍合於三界猛焰流於四生乘時雷震惟佛能救於是超六度之岸轉三乘之輪馭指南於迷路建高燈於黑夜翻海滅焰擎山潰圍蒼生既孤再獲慈母人天之奉大矣遠矣微塵法門吾道一貫承此印者歸乎上仁和尚諱惠真南陽冠族張氏也父大禮銀青光祿大夫坊州刺史靈降左闕慶延仁宗太夫人陳氏誦法華經屢有祥應既誕和尚體益康寧而衾褥彌潔每啼聞誦經則止而聽之六歲發言輒諧經義七歲誦書日記萬言默誦法華經安樂行品因捨儒學專精大乘年十三剃度隸西京開業寺事高僧滿意意公門人皆釋侶圭璋和尚年幼道尊以為之冠十六受十戒持護峻整名重京師進舉經旨遍覽毗尼意謂未圓尋文果闕乃往天竺求梵本至海上遇淨三藏自摩竭陀還淨公謂曰西方學者亦殊宗貫假欲詮正如異執柯因悉授所賫律集與之俱返才二年間罔不懸解手績成部名曰毗尼孤濟蘊始以五月十六日結夏安居僧聞盡愕喧然雷動門人來問答曰迦利底迦星此其候門人未達既而無畏三藏以五月十五日至京師衆僧怪而問故三藏曰吾視迦利底迦星合時來正當日結夏耳迦利底迦星即火星也由是緇林聳嘆與聖人合符梵僧長老尚多初至長安和尚修謁膜拜方半多公喜曰爾非真耶留之座隅密付心要當陽宏景禪師國都教宗帝室尊奉欲以上法靈鏡歸之和尚表請京輔大德一十四人同住南泉以和尚為首昔智者大師受法於衡嶽祖師至和尚六葉福種荊土龍象相承步至南泉歷詮幽勝因起蘭若居焉地與心寂同吾定力室與空明同吾惠照躬行勤儉以率門人人所不堪我將禪說至於捨寢息齊寒暑食止一味茶不非時嘗遇歲荒野人茹草和尚如之門人勸諭對曰順正行事亦如來教也中宗聞之將以禮召時宏景禪師在座啓於上曰此人遙敬則可願陛下不之強也撰菩提心記示心初因開佛知見升堂入室者則必親授此外祕之立教之宗以律斷身嫌戒降心過應捨而常在無行而不息離心色則淨皆淨則離離則無生內外中間無非實際要因四攝成就五身始以上觀悟入終於蓮花正受平等法門究竟於此師子國目加三藏來謁嘆曰印度聞仁者名以為古人不知在世本國奉持心記久矣其尊稱微言冥究佛心而神扄遐域一行禪師服勤規訓聰明辨達首出當時既奉詔徵泣辭和尚而自咎曰弟子於和尚法中痛無少分後與無畏譯毗盧經義有不安日以求正決於一言聞者洗心每謂以法授人不宜容易從人受法鮮克有終故善來衆生悉蒙慈覆至於悟戒承法千無一焉或問南北教門豈無差別對曰家家門外有長安道又問曰修行功用遠近當殊答曰滴水下巖則知朝海又問人無信根如何勸發曰兒喉既閉乳母號慟大悲無緣亦為歔欷和尚嚴而簡重慈而有威望門能進者寡矣弟尚書右丞紹真行備乎身德及乎人元老太保陸公象先名臣韓京兆朝宗宋兵部鼎韋刑部虛舟僉契慈緣而承善誘如其仁哉天寶十年既望北首右脅臥入禪定中夜而滅享齡七十九經夏六十報年之限涅槃之時同於如來昔未曾有遺命門人曰聖教無服慎勿行之弟子正知法璨等哀聞大千感動他界先時雙泉竭大霧昏白光照室半若橫血法門無蔭之徵也刑部韋侍郎時臨荊州躬護喪事以三月一日厝於西巖山林變哀鳥獸號咽有意於道者莫不摧心灑淚和尚質孤晴山神瑩澄海妙聲宣布而剛強悽感慈眼運照而濁惱清涼使祥光洞明枯木蕃榮得舍利於神人教天龍於冥晦其元慈幽護則病者愈死者生高僧遙請而帝夢叶學徒聽法而天樂下昭聞殊方不可殫載初聞一行終天子賜諡曰大惠禪師及和尚滅度追諡同之二方如來皆同一號此其證也正知闍梨持和尚心印法璨闍梨轉和尚義輪以華聞風永懷俾強名道其辭曰荊南正法大士相傳灌頂尊記乃吾師焉備修衆善不染㣥緣法華三昧惠照無邊菩薩普門我願亦然煩惱牙折菩提鏡懸戒比秋月法若春泉不動南楚仁周大千本來常淨自性無遷漸則生頓光依魄圓隨順生死芭蕉豈堅蕭蕭塔樹永對爐烟惟和尚輪王梵嫡號善無畏釋迦如來季父甘露飯王之後其先自中天竺回因難分王烏茶父曰佛手王以和尚生有聖姿早兼德藝故歷試焉十歲統戎十三嗣位睹諸兄舉兵搆亂不得已而後征之接刃中體捍輪傷頂軍以順勝兄以愛全乃白母后告㣥臣曰向者親征義斷恩也今以國讓行其志也因置位於兄固求入道太后哀許賜以傳國寶珠南至海濱得殊勝招提入法華三昧聚沙建塔誓一萬區黑蛇傷指而不退息身寄商舶往中印度密修禪誦口放白光無風三日而舟行萬里與商人同遇㣥盜阽於併命和尚慰帖徒侶默誦真言七俱視尊全現身相盜果為他寇所殲寇乃露罪歸誠指蹤夷險越窮荒踰毒水至中天竺境上乃遇其王王之夫人即和尚妹也和尚服同凡品而徒侶以君禮奉之王問獲其由嗟稱不足菩提眷屬是日同歸慈雲布蔭一境丕變於是發三乘之藏究諸部之宗品偈章句誦無遺者說龍宮之義理得師子之頻伸名振五天尊為稱首那爛陀寺像法之泉源衆聖之都會乃捨寶珠瑩大像額端晝如月魄夜則光耀僧有達摩鞠多掌定門之祕鑰佩如來之密印顏如四十許實八百年也和尚投體兩足奉為本師鉢中非國食示一禪僧華人也見油餌尚溫粟飯餘暖愕而嘆曰中國去此十萬八千里是彼朝熟而午時至此何神速也會中盡駭而和尚默然本師謂和尚曰中國白馬寺重閣新成吾適受供而反汝能不言真可學也乃授以揔持密教神龍圍繞森在目前無量印契一時受頓即日灌頂為天人師稱曰三藏三藏有六義內為戒定慧外為經律論以陀羅尼而統攝之惟陀羅尼菩提速疾之輪下脫吉祥之海三世諸佛生於此門夫慧照所傳一燈而已慧照殊異燈亦無邊由是有百億釋迦微塵三昧菩薩金剛揔攝於諸定向月懸同於法身頓升階位鄰於大覺此其旨也和尚遍禮聖跡周行大荒不悔艱難每所三至為迦葉剃髮受觀音摩頂嘗結夏於靈鷲山有猛獸前路深入山穴穴明如晝有牟尼立像左右侍者色相如生中印度大旱求和尚請雨觀音大聖在日輪中手執淨瓶注水於地中感咽於雙樹之下問往昔於佛世之人為者不言十問其一煆金為貝葉寫大般若鎔銀起窣堵坡等佛身相母后謂和尚已化淚竭喪明及寄疏問安朗然如故大雄滅後外道如林九十六宗各專其見和尚皆隨所執乘喻破疑解邪縛於心門捨迷津於覺路法雨大小而均澤定水方圓而滿器仆異學之旗鼓建心王之勝幢使其以心制狂即身觀佛本師喜曰善男子中國有緣可以行矣乃頂辭奉下至迦溼彌邏國中夜次河河無津梁浮空以濟受請於長者有羅漢降曰我小乘之聖大德是登地菩薩乃讓席推尊和尚授以名衣乃升空而去鳥暘國有白鼠馴繞日獻金錢講毗盧於突厥之庭而可敦請法和尚乃安禪樹下法為金字列在空中突厥之妻有以手按其乳乳為三道飛注和尚口者乃合掌端容曰此我前生母也或誤舉刃三斫支體無所傷斫者唯聞銅聲而已至雪山天池而和尚不愈本師自空而至曰菩薩身同世間不捨生死汝久離諸相寧有病耶言畢而沖天則洗然而愈矣路出吐蕃與商旅同次夷人貪貨率衆合圍乃密為心印而蕃豪請罪至中國西境夜有神見曰此東非弟子界也文殊師利實護中州禮足而滅以駝負經至西川涉龍沙陷駝足沒於泉下和尚入泉三日止龍宮而化之牽駝出岸經無霑溼睿宗道尊德盛立契無為詔僧若那及將軍史獻出玉門塞表以俟來儀開元紹興重光大化聖皇夢與真僧見其姿狀非常躬御丹青圖之殿壁及和尚至止與夢合符天子光靈而敬悅之飾內道場尊為教主自寧嶭二王而下皆跪席捧器為師賓大士於天台接梵筵於帝座禮國師以廣成之道致人主於如來之乘巍巍法門於此為盛有術者握鬼神之契參變化之功承詔御前效其神異和尚恬然不動而術者手足無施矣其餘祕要代莫聞也纍請居外敕諸寺遞迎隨駕至洛京詔於聖善寺安置自出內之後奔走華夷和尚臨之貴賤如一奉儀形者蓮華開於眼界稟言說者甘露降於心源超然自悟曰有其人矣法侶高標惟尊奉長老寶思其餘皆接以門人之禮禪師一行者定慧之餘術窮天地有所未達咨而後行和尚質粹神邁氣和言簡不捨律儀而身心自在不離坐席而願力俱圓有來畢應觸應無礙故衆妙懸解藝能兼於百工大悲普薰草木同於一子不知其極也於本院鑄金銅靈塔以此功德應緣護世手為模範妙極人天寺衆以銷冶至廣庭除深隘慮風至火盛災延寶坊笑而言曰無可為憂自當有驗及鼓鑄之日大雪蔽空靈塔既成瑞花飄席前後奉詔禳旱致雨滅火返風昭昭然遍諸耳目矣從容上請大庇緇林正法之興繫於龍象信也表求還國優詔不許開元二十三年十一月七日右脅纍足涅槃於禪室享齡九十九僧臘八十法界淒涼天心震悼詔鴻臚卿李峴威儀賓律師護喪事以某月日葬於龍門西山涕慕傾都山川變色弟子寶思禪師榮陽鄭氏明畏禪師琅琊王氏皆高族上才超然自覺息言為樂說之辨妙用即禪那之宗入和尚之室惟茲二人而乾元之歲再造天維大君證無緣之悲躬行不匱之孝由是釋梵扈蹕天龍濟師凶穢掃除人祗清淨位光付囑教大興行二禪師爰以偈頌刻諸金石法離文字道不可名以慰門人感慕之心有同顏子喟然之嘆其文曰釋宮尊種龍扶出池捨位成道為天人師度微塵衆行甘露慈仁消大怖辨洗㣥疑法本不滅今子得之隨方演教聿來中國帝后承迎天花滿祴歡喜園花惟聞薝蔔百千萬億調伏其心灌頂在昔聲聞現今山王高妙海月圓深因於示滅空悲鶴林伊水西山冥冥元室金棺此閉式瞻無日雙寶昭興教尊言密歸我者因因明悟實
