front:
  text: 全唐文欽定全唐文卷二百七十八寬絳州聞喜人以文詞進景雲中舉拔萃科累官御史中丞兵部侍郎元宗朝為禮部尚書天寶十四載卒年七十五贈太子太傅
  hash: sha256:cad8edfe9651724e2ba02b02f4c23869bd639b1c94982fbd2ce22d419a68041c
