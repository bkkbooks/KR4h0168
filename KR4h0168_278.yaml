body:
  text: 正德厚生九功惟序備物致用十翼斯崇均諸五行廢一不可況氣移西候日躔北陸深山窮谷涸陰沍寒狐絕聽而無疑鴈爰飛而向暖風驚千里草木落而云黃冰結三河波瀾凝而不動眷言主者則有司存理宜採彼豳詩循茲魯策獻羔無闕賓祭有宜何得慢令致期以速官謗氣已昭於發洩罪將犯於刑書雖嫁禍於戶家固難免於科罪莅中宗朝官左臺侍御史睿宗景雲二年為吏部員外郎臣聞叔孫通覩漢朝儀多闕尊卑失序所以分別上下申明禮儀於是㣥臣知天子之至尊高祖知皇帝之為貴此皆由班秩不忒威儀容止不差是故作孚萬邦用刑四海者也臣竊見在朝百僚多不整肅公門之內詎合論私班列之中尤須致敬或縱觀勅旨或旁閱制詞或交首亂言或遠班問事或私申慶弔或公誦詩篇或笑語諠譁或行立怠隋承寬既久積習如常不增祗懼之容實紊矜莊之典臣謬膺推擇叨掌糾彈見無禮於朝廷誠是臣之深恥況西戎獻款北狄來賓恐觀中國之失儀招外蕃之所誚更若知而故犯不革前非望即停其入內量行貶削伏承陛下緣兩公主造觀可為尊德敬道矣割慈忍愛上為七聖崇福下為萬邦作因豈不願神力潛資靈功密祐社稷永固宗廟長存者乎臣謂功奪其成凶與其敗寧邦致亂修福招殃何則季夏事殷時多禁忌斬木發土移石開山非直苦人必是傷物欲益反損求安乃危臣知其否未見其可然則救犯不暇何福助之有焉且季夏者土德正王之月炎陽方暑之月草木茂盛之月昆蟲繁育之月天地鬱蒸之月黍稷鋤耨之月夫土德正王之月不可發洩地氣恐犯時禁則必有天殃有天殃則人心不附禍亂作矣炎陽方暑之月不可興動版築恐致霖潦必無成功無成功則人力不存怨望結矣草木茂盛之月不可以斬伐山林恐非堅實則速蠹敗速蠹敗則人勞不衷獎勸阻矣昆蟲繁育之月不可以穿鑿原隰恐乖惻隱乖惻隱則必生災變生災變則人業不安逃亡衆矣天地鬱蒸之月不可以徭役丁夫恐為痁癘則必多天枉多夭枉則人情不樂風俗離矣黍稷鋤耨之月不可以妨奪農桑恐傷禾稼則必闕歲計闕歲計則食用不足盜賊聚矣行此六者謂之六殃書曰德惟善政政在養人傳曰新作南門書不時也又曰凡土功龍見而興務成事也火見而致用水昏正而栽日至而畢此言功作從時者所以順於天地也詩曰定之方中作為楚宮此言宮室合時也禮曰季夏之月樹木方盛無有斬伐無搖養氣不可以興土功妨農事則有天殃違此四者謂之四犯陛下營兩觀而降六殃損萬人而招四犯欲將致理不亦難乎臣望順時從人休功罷役候定中以建事占水正而修栽所冀天地鬼神降福臣聞漢明帝永平三年夏大旱是時大起宮室尚書僕射鍾離意免冠上疏曰昔成湯遭旱以六事自責政不節耶使人疾耶宮室營耶女謁盛耶苞苴行耶讒夫昌耶竊見此宮大作人失農時此所謂宮室營也自古非苦宮室小狹直患人不安寧須應天心請罷勞役帝善而從之諸作減省即日澍雨今者雖非宮室起功終是觀寺興造伏望俯從臣請待冬初庶得伐木各宜役功無犯矣必以天文徵應神理須然用厭禨祥事資興建與其積怨傷國孰若施恩養人往者宋景一言熒惑猶能退舍但陛下從諫凶咎定不為災原悌睿宗朝官太子洗馬先天元年由諫議大夫為嶺南道宣勞使臣聞俗正時康則因循而易守人訛道替則馳騖而難安或垂衣而有餘或日吳而不足雖唐虞之盛烈文武之鴻徽未有不委任股肱留情陟用故善人者天地之綱紀帝王之羽翼靡革於仇讎莫限於芻隸不可失也自天授以來二十餘載周興來俊臣等譖害忠良壅蔽正直先皇舊臣夷滅殆盡唯有狄仁傑魏元忠尚存仁傑等處先帝之朝猶為小吏及周室之際實謂忠臣或樹績當時徇身王室近者變故頻及衣冠掃地忠臣名士纔餘數人為陛下之棟梁作聖朝之耳目今者元惡巳誅佞臣咸黜而人訛俗壞為日已久理宜開張聖德杜絕猜嫌用是求人宣力王室使醜正惡直之士不有容其閒隙讒邪佞媚之徒無所施其巧辯然後可以議黎元安邦國則僥倖源塞聖王道興若使浸潤旁通危人路啟顏俊忠而獲罪茂先直以招怨雖有渭濱之賢傅巖之秀途遘卒遇難以為用也則危亡之期或未可保拯救之道將安所施求才之難每留連於大聖知人不易亦惆悵於先哲今天下諸州良牧葢寡何者古難其選今侮其職也然而代所重於京都時見輕於州縣者何也古者牧守政成擢登三事郎官特秀先宰一同潁川則黃霸為公會稽則五倫入輔事不師古何能垂濟誠願尚書曠職則於方伯求材郎位闕官必以循良擢用事懸象魏道著彞章茲令克行仁風大闡考績三載誠為故實隆周之君垂仁義以勗後亡秦之主訓刑罰以流嗣或八百延慶或二代亡家餘烈可知前史明鑒伏以太子初建養德春宮諸王在藩飭躬朱邸並請遠去邪佞親近正人知好佞之危身識尊儒之廣德動遵師傅之訓察納風雅之言誠使宮府官僚賓客侍讀日資其道德月奏其藝能冀仁義於邦家樹邕穆於天下臣又以悖逆庶人先朝之愛女也肆讒慝於朝政崇甲館之華麗極宇內之驕奢新都宜城先朝之庶孽也新都宜城二公主邑名賜不踰於已分言不預於外謀抑以全身疎以遠害故寵者則驕矜而遇害疎者則抑損而獲全誠使悖逆新都易地而處則存亡去就可立而待也故長安非賢燕后為愛古今明驗斷可知矣誠願公主駙馬不得假以權要所犯必有懲所習必有藝則九族既睦萬邦以寧臣觀老尚虛無釋尚寂滅義極幽元之旨思遊通方之外故入道流者則虛室生白淨慮元門該釋教者則春池得寶澄心淨域然後法貫㣥有道垂兼濟過此以往莫非邪惑其有鬻販先覺詭飾浮言以複殿為經坊用層臺為道法皆無功於元慮誠有害於生人梁武靡報於前先朝殷鑒於後咸耳目所接黎元憤怨伏以公主入道京城置觀雖昭報之誠有切於天旨而社稷之計莫踰於安人若使廣事修營假飾圖像盡宇內之功巧傾萬國之資儲為福則靡効於先朝樹怨則取謗於天下自隋室以降寺觀尤多禪定東明之域足受緇黃之衆更為建立罕見其宜後失請收前弊未遠又先朝所狎僧衆或有猶居聖側無益於政理有紊於朝章並請屏退無令親近夷狄有釁廟堂之憂也近壘多虞大夫之恥也今聞黠虜擅命堅昆娑葛養精蓄銳以南侵為多事而人戶全虛府庫半減倘或後歲之始來秋之末良弓漸勁塞草將衰朔代交鋒靈夏受敵中國將何卒應哉伏願共天下以禦匈奴率王公以憂邊事輕租薄斂和下土之心賢任能結衆人之愛去奢崇儉實府庫之積推仁重信納將士之謀去私恩布公道故知兩夷有隙上國之資也高壁藏威待兵觀變因二虜之相持擅漁夫之厚利計有可舉時不可失斯五者並政之要也伏願陛下舉宏綱省衆務高拱嵓廊責成賢哲徘徊於大道之域從容於無為之場故立綱垂制後嗣流範至仁也安上全下先業不墜至孝也感而必通姦不暇伏至明也神化風行萬方草靡至德也必使休徵累及聖政日隆遐邇宅心戎夷慕義神功光乎區宇鴻業格乎天地三代之興皆由此也臣聞事有可言者直臣所以抗議忠而見棄者志士所以太息至於竭誠事君信而獲罪懷祿輔國諂於取容二者難明取舍或異臣竊為朝廷憂之伏惟殿下孝敬純深仁明善斷有大功於天下繼元良於社稷萬姓所以拭目百寮所以清耳皆欲王化之興隆風俗之革易也頃年以來天綱少紊小人趨競內難屢起方當振綱張弦之秋委才任士之日若推心得人則萬目直舉如託寄非所則百度斯廢故王者先擇良臣復能任使均明同日月無私並天地功高化洽地平天成又以為官擇人者理為人擇官者亂理亂之繇官人之職也自二月以來勅令授官吏部注擬填塞府寺滿盈臺省其優勞當作別勅放選或虛名邀功或作才僥倖日以增益布列州縣殫竭府庫侵削黎元臣誠以為漸不可長也昔晉政多門官以賄進劉毅憂其危傅咸恐其亂武帝終而不悟卒有敗官之尤十數年閒億兆塗炭是知古者省吏以崇化不聞多官以致理臣以為懲其弊者歸乎任人者也故忠臣難進而易退無黨而孤立守死善道執心不移廼姦人之所嫉為國家之所利近者姚元之宋璟居獻替之職處銓衡之地用節員位頗立繩紀不為權門黷貨所拘而以平心汲引為務於時草澤之賢翹足待用天下凜然復有昇平之望也臣觀二相為人勵已忠肅直身鯁亮雖有微疵又受黜責且守正之士志節之人棄瑕錄用今其時也昔叔向下獄祁奚訟之猶將宥其十代以勸能者況其身不免乎往者易之三思傾動朝政所賴柬之元忠戮力王室社稷殆危忠臣處朝而獲安神器將移賢者竭誠而必復豈非忠臣良士力哉璟等行事無忝今古夫安必思危理則憂亂明王之誡也忠臣處朝姦邪屏退興邦之道也易曰雷雨作解君子以赦過宥罪殿下誠能捨其無咎收彼衆望因主上之餘閒議朝政之臧否使並悔過令復舊職則舉善之美垂於無窮濫官之弊澄清匪日矣秀中宗朝官修文館學士夫無為者靜而常樂應物者成而不有是知冥權弗恃瀰淪大悲可主方便於三界之中汲引四生宏宣八政非八萬四千無以開其妙門之路三十七品宏其淨土之衢者也大雲寺者晉涼州牧張天錫昇平之年所置也本名宏藏寺後改為大雲因則天大聖皇妃臨朝之日創諸州各置大雲隨改號為天賜菴其地接四郡境控三邊衝要俯蒼松而環城珍白蘭而作鎮揆日影占星表三時說法巳布金沙四柱成臺遠分瓔珞當陽有花樓重閣院有三門迴廊依寶林而秀出干瑤光而直上洵人天之福地為善信所皈依也時有明牧右武將軍右御史中丞內供奉持節西河諸軍節度大使赤水軍大使九姓大使監秦涼州倉庫使檢校涼州都督河內司馬名逸實晉南陽王模十三代系也英瑋明允特達聰亮負經濟之偉才屬會昌之鴻運學綜㣥玉文擅擲金撫俗安邊式昭神武加以宿植善因深究元理按部餘暇虔誠淨土重興般若之臺廣塑真如之像赤水軍副使右衞將軍陳宗北左金吾衞翊府中郎將安忠敬軍長史萬徹軍司馬王休祥神烏縣令胡宗輔並門承詩禮世襲箕裘席工文墨兼悟兵機深達般若樂修檀行乃慫恿司馬等僉議裝嚴於北面化十善十惡四面行廊則兵為喜捨樹檀冄之副明曠刦之因於堂中面畫淨土變面西化地獄畫高僧變並刊傳贊院山門內各畫神王二東西兩門各畫金剛其後地獄變中觀音菩薩二地藏一齊空放光久而不滅花樓院有七層木浮圖即張氏建寺之日造高一百八十尺層列周圍二十八閒面列四戶八窗一一相似屋巍巍以崇立殿赫赫以宏敞擬璚臺之懸居狀層城之始搆年代帛丿糸遠其下層微有凋落欲加繕補人力未就俄而東西三閒忽然摧倒因掘舊基得古錢一甕以助工後司馬公復與軍州共為營搆總剔四面更敞重簷於南禪院迴廊畫付法藏羅漢聖僧變摩騰法東來變七女變北禪院畫三界圖九相觀音福比邱翻譯經典有造經房一所梓匠呈材河宗獻寶資銑以三品訪丹於九區抵鵲無遺傷蛇咸錄郢人運成風之巧晉臣洒翰墨之輝雲聯梵殿煙凝珍館目屬寶坊儼焉相對雕甍鏤角金鳳盤龍刊名模金分身留影地土聿廣樓閣相連變現無方感通隨念至若須彌地主虛宮梵王是名菩薩月光童子如請說經猶言護法內控六賊外伏四魔皈依祖師同申戒律心悟一乘行聞正果道存八方宏施濟度為現在楷梯乃將來龜鏡寺主雪獻法師俗姓安氏姑藏人驃騎大將軍安公子孫高葢駟馬平生不屑宴坐經行深心自悟元該四攝言絕二邊營事伽藍備盡精力所有營搆悉稟規模上座證靜法師俗姓王氏太原人高邁非常晚近無等操尚遠情利益維冄元證法師崇隸前上座守廉等並志誠明瞻風神疎朗共圖經始大願成就加以崇草園林列蒔花果琪樹爭妍璚臺森列價重香山名高元圃法城之侶朝夕來遊行李之徒瞻仰不輟誠西域之慈航而五涼之勝事也況乎義冠人天福禔中外萬禩無疆千秋莫朽爰記其事兼讚以偈逖聽人代博求古今至宮不宰法乳無音罕通惠樹直敞稠林何以出音惟聞覺地出俗云何證在煩惱修持奚故達在生老利物非速古今未早無去無來曰法曰道雖在譬喻言說皆空雖在圖像無有是同跡權混實理契感通智周惟理匪我求蒙教法兆基伽藍土地梵宇宮殿經臺樓閣寶鎮垂蘇璇題流鐸光陰煜耀烟霞忽霍三休㮣日千尋倒影花散梅梁蓮披藻井鴹鶤不及元態自逞超士伏歷王人摩頂既安靈館式紹禪關頓漸成學廣施積善道彌有路義總無餘一超色相求敦居諸待價景雲時人聞夫乾葢上闢星緯分其纏舍坤輿下蟠河岳裂其封域是以觀象體物建百里之庶邦敦俗牧人置千石之多士則有威霽風雨稱明鏡於當時德洽絃歌號元龜於後葉其有繼美宣化教肅刑清作根本於巖廊為喉命於黔庶休明一代映徹九泉歷選徽塵歸獨孤府君矣公諱仁政字仁政河南洛陽人也本姓劉氏導擾龍之巨源長河不竭疏斷蛇之曾岫連岳無窮屬逐鹿於中原乃避時於北漠因山易姓以氣雄邊及魏室之鬱興服衮論道遷周邦而扈從衣錦還鄉吐奕葉而增昌朝盈紫綬聳本枝而逾懋郡接朱轓茵藹紛綸可畧而述高祖永業齊中書舍人南道行臺右丞洛州刺史遷左丞加散騎常侍儀同三司特進行臺左僕射封夏州啟寧縣開國公武安郡開國公廣州德廣郡開國公西平郡開國公瀛州章武郡開國公彭城郡開國公各食邑二千戶賜鼓吹一部絹布各二千匹錢卌萬俘口三百餘人馬五十匹轉七兵尚書兼吏部尚書入周拜司徒公行臺尚書令冊臨川王大司寇少右弼諡曰貞佩金章於黃閣綰盩綬於玳筵內助理於萬機外佐平於百揆奇籌獨運戶邑光於六封雅樂相喧鼓吹標於四錫曾祖子佳周柱國直閣將軍武安郡開國公華州刺史儀同二司隨大將軍洭州刺史應國公拜壇虎將祠黃石以傳書刺郡神君褰赤帷而察俗賞茅土於奧壤以荅元功進儀服於太階還尊懋德祖義恭隋京兆郡富平縣令唐秦王府倉曹參軍事荊王府長史右衞郎將左衞中郎將左監門率溫汾歸婺四州諸軍事婺州刺史上柱國高平縣開國侯雍容朱邸陪文雅之良遊巡警紫微膺爪牙之重任百城宣化得賈父之能名五等開封獲通侯之美稱父士贇唐宏文生文德皇后挽郎虞庠之冑必擇士林楚挽之郎實資門蔭選授霍王府戶曹參軍事密王府兵曹參軍事原州都督府戶曹參軍事轉汴州尉氏縣令遷坊州鄜城縣令上騎都尉行丹州司馬襲爵高平縣開國侯幕府端簪聞為善之最樂列曹從務佐激濁以增清叔孝擒姦智窮於耳粟伯騫薦士語重於笥金孫氏襲侯尚食漢閒之地謝庭蘊玉還光席上之珍惟公騰秀二儀降精五緯髫年對日綺歲參元成千里之權奇望雲驤首刷五色之毛羽抱義賓王起家皇朝左勳衞左金吾引駕出警入蹕統式道之朱麾夜徼朝巡司禦戎之金革解褐思州司倉參軍事像水之平法絃之直游刃盈庭之訟發蒙列局之疑掌十二之人天致菽粟之流衍改授宣州溧陽縣丞南服水鄉北斗星分吳越錯雜士吏剽輕公贊銅章以化人持水鏡而照物季俗為之懲革淳風由是興行轉朝議郎上護軍行亠兊州都督府方與縣令法三異之化振百里之雷敦禮義以教人薄聚斂以富俗女修織袵不下三齊男務耕耘還登九穀椎埋止息桴鼓於是稀鳴囹圄空虛牘以之無事既而焦延罷職上書願留劉寵去官攀轅而送方同胡紹專城之任克遷遽等宣尼倚戶之吟斯作以景龍二年三月廿九日遘疾卒於河內郡之私第春秋七十有七士喪衣冠道亡儒墨德音何在恨九言之不追魂氣何之痛百身之莫贖惟公抱素懷璞蹈孝履忠蘊智成囊含明作鏡敞生白之虛室泛登仙之桂舟酌其流而惑淺深庇其宇而忘寒暑儒林罩月武庫驚雷六義分落錦之篇八體下崩雲之陣阮公琴酒情盤修竹之閒尸子登臨神王長松之下清門赴弔無雜號之賓儉室奉終靡一金之產可謂至德君子人之楨榦者也以景雲二年歲次辛亥二月景子朔廿七日壬寅遷窆於洛州河陽西北韓城鄉龍臺里之平原禮也馬啟滕城鳥飛楊墓晚風含怨託松柏以揚聲斜日緘愁向煙雲而沮色嗣子宗業隆堂構孝極天經攀翠柏以長悲奉元醪而永慕想元成之祖德遂述家風鑒陳實之貞碑爰題翠玉庶陵移谷變竹帛匪堅而懿德嘉聲乾坤等固其詞曰擾龍流派斷蛇分族遇亂中原避時北服因山易姓待時干祿其一北魏稱帝佐命為臣爰從鳳蹕式返雞津祚茅食采華轂朱輪其二踵德誕美韶姿令器渾金璞玉霜鶴雲驥論起談天詞成擲地其三振翼鳳穴統武兵欄捧㦸侍帝綰綬除官霜凝吏道花飛筆端其四一同莅俗五美興化剽劫懲姦嗤眩息詐女修纂績男務耕稼其五攝官稱謝攀轅告歸佇遷喬木奄落斜暉昊天不憗與吾何違其六相彼青烏啟茲元室縞駟發軔丹旒揚日九原不返千秋永畢其七賵人悲而結愲弔鶴思而气盆氳薤灑泣珠之露松纏慘玉之雲爰勒銘於元石以作固於清芬其八
