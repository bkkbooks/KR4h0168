front:
  text: 全唐文欽定全唐文卷七百十李德裕十五
  hash: sha256:628e857a73893ea89c871c8f898a89cacb699446f588fe5dcbe270e828a98287
body:
  text: 世所謂小人者便辟巧佞翻覆難信此小人常態不足懼也以怨報德此其甚者也背本忘義抑又次之便辟者疏遠之則無患矣翻覆者不信之則無尤矣唯以怨報德者不可預防此所謂小人之甚者也背本者雖不害人亦不知感昔傷蛇傅藥而能報飛梟食椹而懷音以怨報德者不及傷蛇遠矣背本忘義者不及飛梟遠矣至於白公負卵翼之德宰嚭遺灌溉之恩陳餘棄父子之交田蚡忘跪起之禮此可與叛臣賊子同誅豈止於知已之義也世以小人比穿窬之盜殊不然矣夫穿窬之盜迫於飢寒莫保性命於高資者有何恩義於多藏者有何仁愛既無恩義仁愛則是取資於道拾金於野若能識廉恥而不為是有償金者之行矣若能忍飢饉而不食是有蒙袂者之操矣所以陳仲弓覩梁上之盜察非惡人以是而言盜賊未為害矣然操戈鋋挾弓矢以衆暴寡殺人取財者則謂之盜比於以怨報德者亦未甚焉何者人之父子兄弟有不相知者有德於人者是已知之矣焉得負之哉客謂余曰楊子法言有重黎顏騫二篇顏子名犯廟諱不書品藻漢之將相敢問近代良相可得聞乎余曰唯唯夫股肱與君同體四海之所瞻也恩義至重實先於愛敬非社稷大計不可以強諫亦猶父有諍子不獲已而諍豈可以為常也唯宜將明獻替致其主於三代之隆孝經曰天子有諍臣七人非宰相之職也必求端士正人以當言責導其謇諤救其患難而已唯聖人言危而不持顛而不扶則焉用彼相此亦將明獻替之謂也使其君昭明令德不至於顛危也漢之良相十數人矣公孫宏開陳其端而不肯廷辨固未可也蕭望之剛不護闕王嘉訐而犯上致元哀二后有信讒邪之惡戮忠直之名此其失者也魏相薛廣德持重守正弼諧盡忠可謂得宰相體矣近世貞以制動思在無邪松柏所以後凋藜藿由是不採貴不患失言必匪躬似薛廣德者鄭丞相陳丞相有之矣原注此謂故右僕射鄭司徒故左僕射陳司徒麟之為瑞也仁而不觸玉之為寶也廉而不劌恕以及物善不近名高朗令終天下無怨似丙博陽者王丞相鄭丞相有之矣原注此謂故中書王丞相故鄭丞相好古洽聞應變膚敏幾可以成務知足以取捨仁愛樂善勤瘁奏公逢時得君不失其正似倪者韋丞相李丞相有之矣原注此謂故中書韋司空故侍中李司空困於臲卼以盡天涯雖劍光不沉而鸞翮長鎩靈均之九死無悔柳下之三黜非辜既沒不瞑號於上帝似蕭望之者所謂李丞相矣原注此謂故臨淮李司空也余亦同病莫保其生知我者以為忠亦已鮮矣庶乎數世之後朋黨稍息以俟知者耳欲知將相之賢不肖視其貨殖之厚薄彼貨殖厚者可以回天機斡河嶽使左右貴幸役當世姦人若孝子之養父母矣陰陽不能為其寇寒暑不能成其疾鬼神不能促其數雷霆不能震其邪是以危而不困老而不死縱人生之大欲處將相之極位兄弟光華子孫安樂昔公孫朝穆好酒及色而不慕榮祿鄧析猶謂之真人况兼有榮樂乎後世雖有貶之者如用斧鉞於糞土施桎梏於朽株無害於身矣則大易之害盈福謙老氏之多藏厚亡不足信矣昔秦時得金策謂之天醉豈天之常醉哉故晉世惟貴於錢神漢台不慙於銅臭謂子文無兼日之積顏氏樂一瓢之飲晏平仲祀不掩豆公儀休相以拔葵皆為薄命之人矣如向者四賢天與之生則生天與之壽則壽窮達夭壽皆在彼蒼而望貴幸之知姦人之譽終身不可得矣余有力命賦以致其意庶後之知我者興歎而已客又謂余曰近世將相既已聞之矣敢問士君子身在下位而義激衰世者有其人乎余曰焉得無之丁生魏生是也昔蓋饒多仇少與在位及貴戚人與為怨唯諫議大夫鄭昌愍傷饒忠直憂國為文吏所抵挫上書曰山有猛獸藜藿為之不採國有忠臣姦邪為之不起饒上無許史之屬外無金張之託職在司察直道而行鄭昌可謂好是正直矣梅福南昌一尉耳與王章無薦引之私無遊宴之好當王鳳之世權歸外戚上書曰鳶鵲遭害則仁鳥增逝愚者蒙戮則智士遠退折直士之節結諫臣之舌㣥臣皆知其非然不敢爭天下以言為戒最國家之大患也梅福可謂不畏強禦矣余頃歲待罪廟堂六年竊位而言責之官執憲之臣屢薦丁生稱其有清直之操亦有毀之者曰體羸多病必不能舉職余惑是説未及升之於朝而一旦觸㣥邪犯衆怒為一孤臣獨生正言無避亦鄭昌梅福之比也昔貫高竟能以不生白王而高祖賢其然諾戴就不忍以臣謗其君而薛安感其壯節周燕寧恨於不食陸續豈辭於禁錮世歷千祀有此幾人魏生為酷吏所逼終不詘服詞義雅正有古人之風亦貫高戴就之儔也嗚呼田叔孟舒皆位顯於朝而魏生亦輿疾遠竄溘盡道途疑其幽魂必上訴於天矣或曰自古名節之士鮮受厚福豈天意於善人薄耶余曰非也夫名節者非危亂不顯非險難不彰免鈇鑕全性命者尚十無二三况福祿乎若使不受困辱不嬰楚毒父母妻子恬然安樂則天下之人盡為之矣又何貴於名節者哉夫相之相在乎清明將之相在乎雄傑清明者珠玉是也為天下所寶雄傑者虎兕是也為百獸所伏然清者必得大權不能享豐富雄者必當昌侈不能為大柄兼而有之者在乎粹美而已余頃歲蒞淮海屬縣有盱眙山多珉玉剖而為器清瑩洞徹雖水精明冰不如也而價不及凡玉終不得為至寶以其不粹也清而粹者天也故高不可測清而徹者泉也故深亦可察此其大略也余嘗精而求之多士以才為命婦人以色為命天賦是美者必將有以貴之才高者雖孟嘗眇小蔡澤折額亦居萬人之上色美者雖鈎弋之拳李夫人之賤亦為萬乘之偶然不如清而粹者必身名俱榮福祿終泰張良是也擇士能用此術可以拔十得九無所疑也語曰某之禱久矣又曰祭則受福豈非聖人與天地合德與日月合明與鬼神合契無所請禱而禱必感通唯牧伯之任不可廢也夫時不雨稼穡將枯閉閣責躬百姓不見若非遍走㣥望則皆謂太守無憂人之意雖在犬畝不絶嘆音余前在江南毀祠一千一十五所可謂不諂神黷祭矣然歲或大旱必先令掾屬祈禱積旬無效乃自躬行未嘗不零雨隨車或當宵而應其術無他唯至誠而已將與祭必間居三日清心齋戒雖禮未申於泂酌而意已接於神明所以理郡八年歲皆大稔江左黎庶謳歌至今古人乃有剪爪致詞積薪自誓精意上達雨必滂沱此亦至誠也苟誠能達天性能及物焉用以肌膚自苦焦爛為期動天地感鬼神莫尚於至誠故備物不足報功禴祭所以受福余以為人患不誠天之去人不相遠矣或問黃冶變化余曰未之學也焉知無有然天地萬物皆可以至理索之夫光明砂者天地自然之寶在石室之間生雪牀之上如初生芙蓉紅苞未拆細者環拱大者處中有辰居之象有君臣之位光明外徹採之者尋石脈而求此造化之所鑄也倘至人道奧者用天地之精合陰陽之粹濟以神術或能成之若以藥石鎔鑄術則疏矣昔人問楊子鑄金而得鑄人以孔聖鎔冶顏子至於殆庶幾未若造化之鑄丹砂矣方士固不足恃劉向葛洪皆下士上達極天地之際謂之可就必有精理劉向鑄作不成得非天意密此神機不欲世人皆知之矣夫天地萬物異於常者雖至美至麗無不為妖覩之宜先戒懼不可以為禎祥何以言之桓靈之世多鸞鳳邱墳之上生芝草世人以芝草為孝思所感致深不然也夫芝草神仙之物食之上可以凌倒景次可以保永年生於邱墳豈得為瑞若以孝思所致則瞽瞍之墓曾皙之墳宜生萬株矣何者為仁孝之瑞唯甘露降於松柏縞鹿素烏馴擾不去皆有縞素之色足表幽明之感貞元中余在甌越有隱者王遇好黃冶之術暮年有芝草數十莖産於丹竈之前遇自以為名在金格暢然滿志逾月而遇病卒齊中書抗有別業在若耶溪忽生芝草百餘莖數月而中書去世又餘姚守盧君在郡時盧君名從有芝草生於督郵屋梁上五綵相鮮若樓臺之狀其歲盧君為叛將栗鍠所害置遺骸於屋梁之下並耳目所驗非自傳聞由是而言則褒姒驪姬皆為國妖以禍周晉緑珠窈娘皆為家妖以災喬石不可不察也又黃河清而聖人生徵應不在於當世明矣柳谷元石為魏室之妖啓將來之瑞亦不可不察也是以宜先戒懼以消桑穀雉雊之變耳宣尼罕言性命不語怪神非謂無也欲人嚴三綱之道奉五常之教修天爵以致人爵不欲言富貴在於天命福祿由於冥數昔衛卜協於沙邱為諡已久秦塞屬於臨洮名子不寤朝歌未滅而周流丹烏矣白帝尚在而漢斷素蛇矣皆兆發於先而符應於後不可以智測也周孔與天地合德與鬼神合契將來之數無所遁情而狼跋於周鳳衰於楚豈親戚之義不可去也人倫之教不可廢也條侯之貴鄧通之富死於兵革可也死於女室可也唯不宜以餒終此又不可以理得也而命偶時來盜有名器者謂禍福出於胸懷榮枯生於口吻沛然而安溘然而笑曾不知黃雀遊於茂林而挾彈者在其後也余乙丑歲自荊楚保釐東周路出方城聞有隱者困於泥塗不知其所如也原注姓薑不知其名往謂方城長曰居守後二年南行萬里則知憾余者必因天譴譖余者必自鬼謀雖抱至寃不以為恨也余嘗三遇異人非卜祝之流皆遁世者也初掌記北門有管涔山隱者詣余曰君明年當在人君左右為文翰之職然須值少主余聞之吅丂一眙灑然變色隱者亦悔失言避席求去余徐問曰何為而事少主對曰君與少主已有纍世緣業是以言之余其年秋登朝至明年正月穆宗纘緒召入禁苑及為中丞有閩中隱者叩門請見余因下榻與語曰時事非久公不早去冬必作相禍將至矣若急請居外代公者受患後十年終當作相自西南而入是秋出鎮吳門歲經八稔尋又仗鉞南燕秋暮有邑子于生引鄴郡道士至才升賓階未及命席謂余曰公當為西南節制孟冬望舒前節符至矣三者皆與言協不差歲月自憲闈竟十年居相由西蜀而入代余執憲者俄亦竄逐唯再謫南服未嘗有前知者為余言之豈禍患不可移者神道所祕莫得預聞乎自古銜寃歿世者多矣冥報之事或有或無遂使好亂樂禍者以神道為茫昧余嘗論之仁人上哲必達生知命如顏氏之子犯而不校釋門達摩了空喻幻必不思報矣其下柔弱無心者力不能報所能者乃中人耳悍強任氣如伯有灌夫之流亦其在臨歿之際方寸不撓魂魄不散唯結念於此是以能報夫人之捨生也如薪盡火滅溘然則無能為矣其達於理者使心不亂則精爽常存不生不滅自可以超然出世升躋神明其次精多魄強則能為厲冥報之事或有或無理在此也言發於中情見乎辭則言辭者志氣之來也故察其言而知其內玩其辭而見其意矣余嘗聞太牢氏原注涼國李公常呼牛僧孺曰太牢涼公名不便故爾不書好奇怪其身險易其行以其姓應國家受命之讖曰首尾三鱗六十年兩角犢子恣狂顛龍蛇相鬬血成川及見著元怪録多造隱語人不可解其或能曉一二者必附會焉縱司馬取魏之漸用田常有齊之由故自卑秩至於宰相而朋黨若山不可動搖欲有意擺撼者皆遭誣坐莫不側目結舌事具史官劉軻日歷余得太牢周秦行紀原注周秦行紀附于下反覆覩其太牢以身與帝王后冥遇欲證其身非人臣相也將有意於狂顛及至戲德宗為沈婆兒以代宗皇后為沈婆令人骨戰可謂無禮於其君甚矣懷異志於圖讖明矣余少服臧文仲之言曰見無禮於其君者如鷹鸇之逐鳥雀也故貯一作貶太牢已久前知政事欲正刑書力未勝而罷余讀國史見開元中御史汝南生一作周子諒彈奏牛仙客以其姓符圖讖雖似是而未合三鱗六十之數耳自裴晉國與余涼國名不便彭原程趙郡紳諸從兄嫉太牢如讐頗類余志非懷私忿蓋惡其應讖也太牢作鎮襄州日判復州刺史樂坤賀武宗監國狀曰間事不足為賀則恃性敢如此耶會余復知政事將欲發覺未有由值會平昭義得與劉從諫交結書因竄逐之嗟乎為人臣陰懷逆節不獨人得誅之鬼得誅之矣凡與太牢膠固未嘗不是流薄無賴輩以相表裏意太牢有非望而就佐命焉斯亦信符命之致或以中外罪余於太牢愛憎故明此論庶乎知余志吁所恨未暇族之而余又罷豈非王者不死乎遺禍胎於國亦余大罪也倘同余志繼而為政宜為君除患歷既有數意非偶然若不在當代其必在於子孫須以太牢少長咸置於法則刑罰中而社稷安無患於二百四十年後嘻余致君之道分隔於明時嫉惡之心敢辜於早歲因援筆而攄宿憤亦書行紀之迹於後世人疑梁武建佛剎三百餘所而國破家亡殘禍甚酷以為釋氏之力不能拯其顛危余以為不然也釋氏有六波羅密檀波羅密是其一也又曰難捨能捨大者頭目肢體其次國城妻子此所謂難捨也余嘗深求此理本不戒其不貪能自微不有其寶必不操人所寶與老氏之無欲知足司城之不貪為寶其義一也庸夫謂之作福斯為妄矣而梁武所建佛剎未嘗自損一毫或出自有司或厚斂氓俗竭經國之費破生人之産勞役不止杼柚其空閏位偏方不堪其弊以此僥福不其悖哉此梁武所以不免也陸賈稱蟢子垂而百事喜不徵其故何也凡人將有喜兆必垂於冠冕余嘗思之蓋以人肖圓方之形稟五行之氣有生之最靈者也如景如火忽有歊然感氣發於圓首之上其榮盛也如陽氣發生煙熅涵煦其變衰也如秋氣索然寂寞沉悴雖不能自覩其鑒明者必可察之唐舉許負疑用此術所以望表而知窮達何以明之淑春愛景必有蟢子垂於簷楹之間室有明燭膏燼必垂於屏幃之際喜氣將盛故集於冠冕之上以此推之無所逃也仁聖文武至神大孝皇帝御極之五載氣應天和德感人心朝廷四方咸一於正以精蕩祲以道勝殘故得風雨時若螽螟歲息銷蓬孛為休氣驅戎狄為懷人北荒堅昆重譯而至厥有窘伐憑阻弄兵陸梁韋顧既伐夙沙自縛武功既成休德昭明前古未聞百王莫致之事皆葳蕤於圖諜矣皇上以為大禹敘九疇敬五事豈不曰貌恭則莊視明則正豫欲作繪傅照審其儀形且夫聖人潛心於天以通神明先定其神而萬物理矣昔之訪具茨期姑射在此而已矣况乎廣成之戒抱一元元之去多欲豫所貴道良謂是矣豈眩夫係風之言奇彼淖冰之術從偓佺之所珍遺堯舜之令名也哉於是圖輕素寫良金擬鑑形於止水若凝視於清鏡五彩既彰穆穆皇皇居列仙之館近元祖之光蓋以昭燕翼之謀顯丕承之德矣臣聞古之至聖必有奇相是以黃熊之瑞應於龍體赤精之符協於圖表頎然而長文王所以王天下也體貌多奇漢高所以威海內也然則繪事之微極於惟肖至於天光晬清日華明潤非可圖也庶倣佛焉末臣奉詔敢揚言曰唐運中興天授大君軒耀其武堯煥其文北伐獫狁朔漠銷氛西伏堅昆稽首稱臣祲生壺關盜起河汾沈機先物雄斷解紛克定㣥慝竟全大勳八表既寧萬機益勤爰命彩繪載模天真崑閬仙岑峻極秋旻蓬瀛白日光照清晨涵育如天尊嚴若神輝赫絪縕為龍為雲聖作物覩禎祥以臻宣光孕靈虞熙載甄政建中和金聲玉振太階既平廟器乃陳化下以德持盈以仁四瀆宗海衆星拱辰億萬斯年藻朗日新惟大迦葉依無上智初分寶座終投密記晚遇金粟乃知平地潛形雞足以待慈氏夫天所以睟清者其氣理也故能四時變化萬物粲然倦則陰陽為災光景不耀而况於人乎人亦肖圜方之形稟清濁之氣存神索智極物窮情則倚伏之先見其如視矣子房潛心於神而達之見其圖狀如得其奧則有女子之粹美嬰兒之專和粹所以含至精專所以研至賾散萬金之資柔毅也狙萬乘之仇仁勇也學禮倉君履方也變名圯上避世也若乃五日為期三往增敬則尾生之信違道矣退不離國心不忘君則鴟夷之遁非忠矣合時變以蟬蛻望仙路以鴻冥優遊於綺皓之門髣佛乎赤松之際豈不善始善終哉黃石者其天地之蘊神明之璽歟不然則無以覺悟子房輔翼天漢嗟乎喪亂既定韜匱而葆祠之生也奉符歿而同穴有以見子房之神交不渝矣臣聞詩云心乎愛矣遐不謂矣此古之賢人所以篤於事君者也夫迹疏而言親者危地遠而意忠者忤然臣竊念拔自先聖偏荷寵光若不愛君以忠則是上負靈鑒臣頃事先朝屬多陰沴嘗獻大明賦以諷頗蒙先朝嘉納臣今日盡節明主亦猶是心昔張敞之守遠郡梅福之在遐徼尚竭誠盡規不避尤悔况臣嘗學舊史頗知針諷雖在疏遠猶思獻替謹稽首上丹扆六針具列于後仰塵睿鑒伏積兢惶先王聽政昧爽以俟雞鳴既盈日出而視伯禹大聖寸陰為貴光武至仁反支不忌無俾薑后猶去簪珥彤管記言克念前志聖人作服法象可觀雖在晏遊尚不懷安汲黯莊色能正不冠楊阜毅然亦譏縹紈四時所御各有其官非此勿服惟辟所難漢文罷獻詔還騄駬鑾輅徐驅安用千里厥后令王亦能恭已翟裘既焚筒布則毀道德為麗慈儉為美不過天道斯為至理惟后納誨以求厥中從善如流乃能成功漢驁沈湎舉白浮鍾魏睿侈汰凌霄作官忠雖不忤而善亦從以規為瑱是謂塞聰居上處深在察微萌雖有讒慝不能蔽明漢之孝昭睿過周成上書知詐照姦得情燕蓋既折王猷洽平百代之後乃流淑聲天子之孝敬遵王度安必思危乃無遺慮亂臣猖獗非可遽數元黃莫辨觸瑟始仆柏谷微行豺豕塞路覩貌獻飱斯可誡懼戊辰歲仲春月戊申夜余宿於洞庭西夢與中書令姚公偶坐如舊相識問余曰君見僕所作口針乎余對曰去歲居守東周於公曾孫諫議某處覩金石之刻遂莞爾而笑曰孫子猶能記之余以仲夏月達於海曲嘗竊思之聖哲之言上可以動天地成典謨次可以正人倫明得失默而不言後代何述焉繫辭云不善則千里之外違之在慎其所言而已矣豈必緘其口銘其背以矯當世哉楊子稱孰有書不由筆言不由舌張儀以舌存而交亂亦善不善之效也余感姚公之夢乃為舌針云粵有帝舜洎於殷宗龍命惟允原注舜命九官自禹至龍允以龍出納朕命故曰龍命説言乃雍原注殷高宗夢傅説其代豫言故曰説言周有良弼王之喉舌鼓舞而至渙汗乃發傳以言從作乂易以講習施悅天以卷舌屏讒儒以金舌駕説伯陽之誡柔存剛缺言貴無瑕辨貴若訥則知門猶是閉囊不在括是以楊雄悼讒者之寃梅福痛忠臣之結善乎先聖之言既明且清國以之寧人之不朽犯無隱情無恃爾言駟馬不追嗟爾君子念茲在茲勿以寤一言而取宰相以舌三寸而為帝師徒見婁敬掉而獲爵不知魏其齰以可悲雖言必有中而適其時子房能用其策難以爭立愛奉春善建不拔無以免係縲衛武警夫莫捫叔向哀於是出惟敬仲之難明由匠石之無質楊子曰重則有法輕則招憂言能如是可以寡尤
