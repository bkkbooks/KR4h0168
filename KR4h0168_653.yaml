front:
  text: 全唐文欽定全唐文卷六百五十三元稹七
  hash: sha256:a7e67ae8463c56bd7ff963af956a2a94b5b77d69d5990c6c93a8140dc94bb9ed
body:
  text: 侍郎退之足下稹與前襄州文學掾甄逢遊善逢故刑部員外郎濟之子濟天寶中隱於衞之青巖山採訪使苗公等五人皆以狀薦凡十徵不起末以左拾遺就拜之適值祿山朝奏京師懇於上前求為賓介元宗可其奏祿山還至衞縣遣太守鄭遵意詣山致命輟行信宿以俟之甄生懼其難免俛首從事至天寶十二載祿山反狀潛兆慮不得脫乃偽瘖其口復隱青巖踰年而祿山叛即日遣偽節度使蔡希德緘刃逼召且曰或不可強斬首來徇既而甄生噤閉無言延頸承刃氣色和定若甘心然希德義而捨之祿山亦終不能致慶緒繼逆虜而囚之於東都安國觀代宗復洛甄生臥匡牀詣元帥府至則號摽自治代宗為之動色遂命傳置長安肅宗高其行因授館於三司治所令從賊官囚慙拜之受汚者莫不俯伏仰歎恨不即死於其地且夫辨所從於居易之時堅直操於利人之際而猶褊淺巽懦者之所不為葢怫人之心難而害己之避深也况乎天下亂矣王澤竭矣死忠者不必顯從亂者不必誅而能眷眷本朝甘心白刃難矣哉是以治平則為公為卿為鵷為鷺世變則為虵為豕為獍為梟者十恒八九焉若甄生冕弁不加於其身祿食不進於其口於天寶末葢青巖之一男子耳及亂則延頸受刃分死不回不以不顯而廢忠不以不誅而從亂參合古今之士葢百一焉稹常讀注記缺而未書謹備所聞葢欲執事者編此義烈以永永於來世耳子逢始生之歲顏太師崔太傅皆為歌詩以美賢者之有後且序甄生之本末云及逢既長耕先人舊田於襄之宜城讀書為文不詣州里歲饉則力穡節用以給足於親戚歲穰則施餘於鄰里鄉黨之不能自持者前後斥家財排患難於朋友者數四由是以義聞襄之守狀為文學始就覊於吏職稹聞風既久因與之遊逢每寃其父之名不在於史將欲抱所寃詣京師告訴於司史氏葢行有日矣以愚料之甄子僕短馬瘦言簡行孤得不為驕閽之所排訶則權力者疑誕以臨之固無自而入矣因曉甄生以無自入之勢且告以執事者辱與稹游願得所寃之狀告甄生厚相信待由是輟行既而自思滓賤之中猶願貢所聞於執事得非愚且僭耶然而誚笑之暇幸垂察焉不宣某再拜稹九歲學賦詩長者往往驚其可教年十五六粗識聲病時貞元十年已後德宗皇帝春秋高理務因人最不欲文法吏生天下罪過外閫節將動十餘年不許朝覲死於其地不易者十八九而又將豪卒愎之處因喪負眾橫相賊殺告變駱驛使者迭窺旋以狀聞天子曰某邑將某能遏亂亂眾寧附願為其帥名為眾情其實逼詐因而可之者又十八九前置介倅因緣交授者亦十四五由是諸侯敢自為旨意有羅列兒孫以自固者有開導蠻夷以自重者省寺符篆固於几閣甚者擬詔旨視一境如一室刑殺其下不啻僕畜厚加剝奪名為進奉其實貢入之數百一焉京城之中亭第邸店以曲巷斷侯甸之內水陸腴沃以鄉里計其餘奴婢資財生生之備稱之朝廷大臣以謹慎不言為朴雅以時進見者不過一二親信直臣義士往往抑塞禁省之間時或繕完隤墜豪家大帥乘聲相扇延及老佛土木妖熾習俗不怪上不欲令有司備宮闥中小碎須求往往持幣帛以易餅餌吏緣其端剽奪百貨勢不可禁僕時孩騃不慣聞見獨於書傳中初習理亂萌漸心體悸震若不可活思欲發之久矣適有人以陳子昂感遇詩相示吟翫激烈即日為寄思元子詩二十首故鄭京兆於僕為外諸翁深賜憐獎因以所賦呈獻京兆翁深相駭異秘書少監王表在座顧謂表曰使此兒五十不死其志義何如哉惜吾輩不見其成就因召諸子訓責泣下僕亦竊不自得由是勇於為文又久之得杜甫詩數百首愛其浩蕩津涯處處臻到始病沈宋之不存寄興而訝子昂之未暇旁備矣不數年與詩人楊巨源友善日課為詩性復僻嬾人事常有閒暇閒則有作識足下時有詩數百首矣習慣性靈遂成病蔽每公私感憤道義激揚朋友切磨古今成敗日月遷逝光景慘舒山川勝勢風雲景色當花對酒樂罷哀餘通滯屈伸悲歡合散至於疾恙窮身悼懷惜逝凡所對遇異於常者則欲賦詩又不幸年三十二時有罪譴棄今三十七矣五六年之間是丈夫心力壯時常在閒處無所役用性不近道未能淡然忘懷又復嬾於他欲全盛之氣注射語言雜糅精粗遂成多大然亦未嘗繕寫適值河東李明府景儉在江陵時僻好僕詩章謂為能解欲得盡取觀覽僕因撰成卷軸其中有旨意可觀而詞近古往者為古諷意亦可觀而流在樂府者為樂諷詞雖近古而止於吟寫性情者為古體詞實樂流而止於模象物色者為新題樂府聲勢㳂順屬對穩切者為律詩仍以七言五言為兩體其中有稍存寄興與諷為流者為律諷不幸少有伉儷之悲撫存感往成數十詩取潘子悼亡為題又有以干教化者近世婦人暈淡眉目綰約頭鬢衣服修廣之度及匹配色澤尤劇怪艷因為豔詩百餘首詞有古今又兩體自十六時至是元和七年已有詩八百餘首色類相從共成十體凡二十卷自笑冗亂亦不復置之於行李昨來京師偶在筐篋及通行盡置足下僅亦有說僕聞上士立德其次立事不遇立言凡人急位其次急利下急食僕天與不厚既乏全然之德命與不遇未遭可為之事性與不惠復無垂範之言兀兀狂癡行近四十儌名取位不過於第八品而冒憲已六七年授通之初有習通之熟者曰通之地濕墊卑褊人士稀少近荒札死亡過半邑無吏市無貨百姓茹草木刺史以下計粒而食大有虎豹虵虺之患小有蟆蚋浮塵蜘蛛蜂之類皆能鑽囓肌膚使人瘡痏夏多陰霪秋為痢瘧地無醫巫藥石萬里病者有百死一生之慮夫何以僕之命不厚也如此智不足也又如此其所詣之憂險也又復如此則安能保持萬全與足下必復京輦以須他日立言事之驗耶但恐一旦與急食相符而終使足下受天下友不如已之誚是用悉所為文留穢箱笥比夫格奕樗塞之戲猶曰愈於飽食僕所為不又愈於格奕樗塞之戲乎昨行巴南道中又有詩五十一首文書中得七年以後所為向二百篇繁亂冗雜不復置之執事前所為寄思元子者小歲云為文不能自足其意貴其起予之始且志京兆翁見遇之由今亦寫為古諷之一移諸左右僕少時授吹噓之術於鄭先生病嬾不就今在閒處思欲怡神保和以求其病異日亦不復費詞於無用之文矣省視之煩庶亦已於是乎告崙等吾謫竄方始見汝未期粗以所懷貽誨於汝汝等心志未立冠歲行登古人譏十九童心能不自懼吾不能遠諭他人汝獨不見吾兄之奉家法乎吾家世儉貧先人遺訓常恐置產怠子孫故家無樵蘇之地爾所詳也吾竊見吾兄自二十年來以下士之祿持窘絕之家其間半是乞丐騎游以相給足然而吾生三十二年矣知衣食之所自始東都為御史時吾常自思尚不省受吾兄正色之訓而况於鞭笞詰責乎嗚呼吾所以幸而為兄者則汝等又幸而為父矣有父如此尚不足為汝師乎吾尚有血誠將告於汝吾幼乏岐嶷十歲知方嚴毅之訓不聞師友之資盡廢憶得初讀書時感慈旨一言之歎遂志於學是時尚在鳳翔每借書於齊倉曹家徒步執卷就陸姊夫師授栖栖勤勤其始也若此至年十五得明經及第因捧先人舊書於西窗下鑽仰沉吟僅於不窺園井矣如是者十年然後粗霑一命粗成一名及今思之上不能及烏鳥之報復下未能減親戚之饑寒抱釁終身偷活今日故李密云生願為人兄得奉養之日長吾每念此言無不雨涕汝等又見吾自為御史來効職無避禍之心臨事有致命之志尚知之乎吾此意雖吾弟兄未忍及此葢以往歲忝職諫官不忍小見妄干朝聽謫棄河南泣血西歸生死無告不幸餘命不殞重戴冠纓常誓効死君前揚名後代歿有以謝先人於地下耳嗚呼及其時而不思既思之而不及尚何言哉今汝等父母天地兄弟成行不於此時佩服詩書以求榮達其為人耶其曰人耶吾又以吾兄所識易涉悔尤汝等出入游從亦宜切慎吾誠不宜言及於此吾生長京城朋從不少然而未嘗識倡優之門不曾於喧嘩縱觀汝信之乎吾終鮮姊妹陸氏諸生念之倍汝小婢子等既抱吾歿身之恨未有吾克已之誠日夜思之若忘生次汝因便錄吾此書寄之庶其自發千萬努力無棄斯須稹付崙鄭等某月日山南東道節度兼申光蔡等州招撫使檢校司空嚴某致書前彰義軍兵馬使吳侍御及淮西將士官吏申光蔡等州百姓等奉十月十九日詔書以某充申光蔡招撫使某月日遣使齎勅送付界首布告訖某頃鎮太原與吳侍御伯父相國公同受恩寄交問歲時歡好不絕僅十餘年可謂至矣及吳侍御先尚書繼當寵命某又領鎮荊南前好復修款密如舊弔喪問疾禮無不時亦可謂勤矣某與吳侍御伯父先父既等夷於吳侍御實丈人行固已私矣况朝廷以吳侍御因喪擾惑迷誤詔旨欲思致訓未忍加兵仍以某為招撫之使是吳尚書之嗣既絕而由某有復聯之望捧詔以來夙夜憂歎不任憐痛之懷某欲上徵古類恐引諭不明切為諸公以近事灼然在耳目者言之今吳侍御棄喪背禮捨父干君誘聚師徒希求爵位者豈不以貞元末年天下方鎮物故往往依憑眾請而得者十恒二三以此為自偷之證耶甚不然也德宗皇帝御天下日久春秋高理務便安不欲生事或謀及卒伍而置師長葢一時之權也今天子二十八即皇帝位控一海內臣妾夷狄赫然皇威熏灼白日初楊惠琳劉闢李錡猶守故態謂朝廷未即誅擒曾不知逾月之間皆頭懸藳街腰斬都市此諸公之所聞見也自是蠻夷懾竄戎臣震惕相與奔走朝闕之不暇今廟堂之上命將擇帥容易於授卿長即吳侍御希求非望之志安得復行於今日哉此眾不可憑位不可取之明驗也今吳侍御蓄聚糗糧繕完城壘偷侵縣邑不自危亡者豈不以貞元中吳相國為讒邪所鬬錯誤朝章韓太保率眾奉詞而吳相國終以宥免又以此為自偷之證耶又不然也日者謀議之臣算畫不審韓太保行陣之將耳總統非所長而又徵天下烏合之眾以授之是以遷延進退不時成功然猶吳相國悔過乞降深自咎責朝廷多之僅乃全活且吳相國躬服節儉衣食與士卒同蓄貨力耕向三十載然後粗能支一戰耳今吳尚書馭眾日淺吳侍御年位俱卑諸將之在下者皆怏怏苟容非有威懷信服之志百姓日蹙賦斂月加天兵四臨耕織盡廢竊聞壯者刼而為兵老弱妻孥吞聲於道路而欲以吳相國三十年拊循積聚之力為自比甚相懸矣况國家命全軍之將用不竭之資烏尚書董懷汝之師李尚書舉陳許之眾柳中丞以鄂之全軍軍於安陸令狐中丞以淮南之銳旅屯於壽春某以襄陽之勁卒數萬集於唐而又益之以魏博之驍騎江陵之強弩以攻則彼有壓卵之危以守則我無出疆之費用三州之賦敵天下四海之饒以一旅之師抗天下無窮之眾雖妾婦騃孩猶知笑之而况於義夫壯士哉若聖天子推含垢之化圖不戰之功使環而守之塞其飛走則男不得耕女不得織鹽茗之路絕倉廩之積空不三數月求諸公於枯魚之肆矣儻或神算風驅天威電激使齊攻四面各裂一隅彼若聚而待之則自窮分而應之則不足東抗則西入南備則北侵腹背受攻首尾皆畏赤族之刑既迫輿櫬之計方施則固難期於曩時之宥免矣此又力不可支勢不可久之明驗也今吳侍御厚利買交嚴刑劫質謂王師可敵謂已眾不離者豈不以大將李義等言甘約重許以死生之為耶又不然也夫李錡據吳楚之雄兼榷管之利選才養士向十五年獨以張子良為腹心不貳之將故授以銳健先鋒之兵又以裴行立為骨肉不欺之親故授以敢死酬恩之卒然而一朝遷延王命稱疾不朝子良朝倒戈以攻於外而行立夕縱火以應於內錡則戮死而張裴甚榮此又諸公之所聞見也劉闢乘韋令饒衍之後廩藏穀帛以億萬計啖養士卒憑恃阻固以仇良輔有樸厚不搖之心是以成其要害而授之兵然而天兵一麾因壘來下席卷餘孽巴蜀大定闢則戮死而良輔甚榮此又諸公之所聞見也盧從史內蘊私邪外張威武熒惑天聽逗留王師以烏尚書有委用親信之恩故授之以爪牙衞已之眾然而睿畧潛施元凶就執烏尚書清壘整旅以俟命從史放死而尚書甚榮此又諸公之所見聞也此數君子者豈受利不厚而誓約不明哉葢逆順之理殊而子孫之禍大也且田太保季安藉累代繼襲之勢身沒之後允子不肖將卒聚謀而請之天子天子嘉其忠而與之賚百萬之財以贍軍復三年之賦以勵俗輟郎署之英以榮其賓介而坐專席操郡國者又相繼彼魏博三軍之士豈獨不受恩於田氏父子耶葢苦其束縛禁閉終日以城門為戰場思復泰然游泳於王澤耳今國家用烏尚書為重鎮所以警諸將囚縛受賞之功用仇大夫為先驅所以警城堡降下寵榮之利使田大夫統魏博向義之旅所以勵三軍去邪附正之機奈何吳侍御碎六尺之軀為李義輩求福之費絕公侯之嗣為淮西軍受賞之資其為人謀也則厚矣自謀何薄哉此又將不可恃而兵不可保之明驗也今天子垂惻隱之詔建招撫之名吳侍御若束身歸朝將吏等繼踵向闕縱不得與烏尚書張金吾分封並位受立功之賞獨不得與田懷諫命服趨朝奉先人之家嗣乎且張伯靖五溪之蠻隸耳聚徒殺人為惡甚大聖上憐其愚詔某招致之而猶據戎行之右職忝佐郡之清員豈獨於吳侍御洎淮西之將吏而阻其自新之路哉諺曰天不可違又曰時不可失書至之日善自圖之如或違天失時寢而不報則王師進擊於外義士潛謀於中身首之戮指期肘腋之危坐見異日為天下戮笑而李義等成封侯之利豈不大哀哉戎事方殷未獲周盡感念平昔興然動懷通州司馬元稹謹再拜獻書相公閣下昔者相公之掾洛也稹獲陪侍道途不以妄庸諮及章啟則固竊聞閣下以文皇勅起居郎書居安思危四字於笏上為至戒矣今陛下當晉武平吳之後閣下即周公東征而還安孰甚焉思豈可廢况今四邸並開掃門之賓競至碣石餘沴束身之款未堅則閣下推食握髮之意何遽移之於高枕擊鐘之逸乎且夫得人則理之談實老生之常語至於切近猶飢者欲食不可惡熟俗而不言也若稹之末學淺見又安敢引喻古昔於閣下獨憶得近日故裴兵部之為人也甄辨清淨號為名流及其為相也構致㣥材棟梁榱桷咸適其用人頗隘之至於激濁揚清亦無所愛吝是以秉政不累月閣下自外僚為起居郎韋相自巴州知制誥張河南自邕幕為御史李西川自饒州為雜端密勿津梁之地半得其人如故韋簡州勳及稹等扌叐於疑礙置之朝行者又十數然後排異已之巨敵引協心之至交當時一二年間幾至於姦無蹊隧而政有根本矣及山東沴作上以兵事咨之則對以禁暴息人之外不能有以佐震耀是以樽俎之謀不專於廊廟葢廉善精微之士素熟於心胷而泛駕乘桴之才未嘗校量於左右也比於閣下今日之雄材大畧為短矣然而即世之後雖無李嚴廖立之思而十載之內備將相號名卿者多其引扌叐嗚呼方鮑叔之功斯不細矣昨者閣下方事淮蔡獨當鑪錘內蘊深謀外排㣥議始以追韓信扌叐呂蒙為急務固非叔孫通薦儒之日也今殊勳既建王化方行亦常念魏鄭公守成之難而三復文皇帝思危之詔乎以愚揆之欲人之不怨莫若遷授之有常欲人之竭誠莫若援拯於焚溺何謂有常而不怨以省言之由後行為前行以臺言之自察院轉殿院苟不如是則怨矣苟能如是何怨哉何謂援拯而竭誠某又不敢移之於他人借如小生之庸且昧也固不及班行之中輩又敢自讓於郎吏之末者乎向使元和中一年為拾遺二年為補闕不三四年為員外又三四年為正郎則宰物者雖朝許之以綸誥暮許之以專席厚則厚矣遽責其隳肝瀝膽同厮養之用力亦難哉及夫為計不良困於溝瀆者十年矣苟有舒其胝攣置之趨走者又安敢愛氣力吝心髓於和扁耶是猶龜鼉之有泉烏鳥之有林何嘗媿於水木苟或縶而籠之鏁而檻之其或放之投之者則必啁啾顧慕以報之報其免於難也今天下病溝瀆困籠檻思閣下藥之養之投之放之者豈特小生而已哉且曩時之窒閣下及小生者豈不以閣下疏有居安思危之字為抵忌對上以河南縣尉非貶官為說乎向非裴兵部一二明之則某終老於窮賤固其宜也儻閣下復三二年遲迴於外任則少陽邀望之際固未得奉煌煌之命以周知其巢穴矣當元濟討除之始又安能定已成之策於上前排未亡之疑於眾口哉今天下能不有萬一於閣下之才畧而猶跼足帖脅私自憐愛其志力哉况當今陛下在宥四海與人為天特降含垢棄瑕之書且授隨才任能之柄於閣下閣下若能蕩滌痕累洞開嫌疑棄仇如振塵愛士如救餒使恃才薄行者自贖於煩辱以能見忌者騁力於通衢上以副陛下咸與惟新之懷次以廣閣下好善救人之道使千百年外謂閣下與裴兵部為交相短長亦足為賢相矣未盡善也且夫當陛下肇臨宇宙之初與得天久照之後愈光明矣安有裴兵部扌叐㣥才於前則盡行閣下扌叐㣥才於後則盡廢以閣下沐浴恩波之始與徽猷克壯之秋愈汪洋矣又安有救裴寰之罪換禹錫之官則盡易振天下之窮滯行渙汗之條目則盡難某雖至愚未敢然也某自十年遭罹多故每欲發書朋舊尚不敢盡陳其情豈不知干宰相有不測之罪耶熟自計之與其瘴死蠻夷自題不遇之牓比夫塵穢尊重伏危言之刑無異也聊因所善緘獻鄙誠翹企刑書不敢逃讓不宣稹頓首某啟伏見當道節度使牒伏承相公生擒吳元濟歸斬闕下功高振古事絕稱言億兆讙呼天下幸甚某聞舉世非之而心不惑者謂之明㣥疑未亡而計先定者謂之智日者天棄淮蔡畜為汙渚五十年間三后垂顧眇爾元濟繼為凶妖謂君命可逃以父死為利聖上以睿謨神筭方議翦除㣥下守見習聞咸懷阻沮公英猷獨運卓立不回內排疑惑之詞外輯異同之旅三軍保任一意誅鋤投石之卵雖危拒輪之臂猶奮賴閣下忠誠憤激親自拊巡靈旗一臨餘沴電掃此所謂俟周公而後淮夷服得元凱而後吳寇平凡在陶甄孰不忻幸况某早趨門館抃躍尤深僻守遐荒不獲隨例拜賀無任踴躍徘徊之至某啟某聞周諸侯生桓文時而不列於盟會則夷狄之以其微不能自達於盟主也元和以來貞元而下閣下主文之盟餘二十年矣某亦盜語言於經籍卒未能効互鄉之進甚自羞之自陛下以環梁十六州之地授閣下麾葢鐵棨元纛青旌晨一作泉魚符竹信車朱左右轓府置軍司馬以上官屬刻節而總制之則某實為環內之州司馬而又移族謁醫在閣下治所私心懽欣願改前恥然而吏通之初有言通之州幽陰險蒸瘴之甚者私又自憐其才命俱困恐不能復脫於通由是生心悉所為文留置友善冀異日善惡不忘於朋類耳筐篋之類遂無遺餘方創新詞以須供贄不幸瘡痍暴侵手足沉廢恐一旦神棄其形終不得自進於閣下因用官通已來所作詩及常記憶者共五十首又文書中得遷廟議移史官書戡難紀并在通時敘詩一章次為卷軸封用上獻塵黷尊重帖伏迴遑謹以啟陳不宣謹啟某啟某初不好文章徒以仕無他歧強由科試及有罪譴棄之後自以為廢滯潦倒不復以文字有聞於人矣曾不知好事者抉摘芻蕪塵黷尊重竊承相公特於廊廟間道某詩句昨又面奉教約令獻舊文戰汗悚踴慙忝無地某始自御史府謫官於外今十餘年矣閒誕無事遂用力於詩章日益月滋有詩向千餘首其間感物寓意可備矇瞽之諷達者有之詞直氣麤罪戾是懼固不敢陳露於人唯盃酒光景間屢為小碎篇章以自吟暢然以為律體卑痺格力不揚苟無姿態則陷流俗常欲得思深語近韻律調新屬對無差而風情自遠然而病未能也江湘間多有新進小生不知天下文有宗主妄相倣傚而又從而失之遂至於支離褊淺之詞皆目為元和詩體某又與同門生白居易友善居易雅能為詩就中愛驅駕文字窮極聲韻或為千言或為五百言律詩以相投寄小生自審不能有以過之往往戲排舊韻別創新詞名為次韻相酬葢欲以難相挑耳江湘間為詩者復相倣傚力或不足則至於顛倒語言重複首尾韻同意等不異前篇亦目為元和詩體而司文者考變雅之由往往歸咎於稹嘗以為雕蟲小事不足以自明始聞相公記憶累旬以來實懼糞土之墻庇以大廈使不摧壞實為版築者之娛輒繕寫古體謌詩一百首百韻至兩韻律詩一百首合為五卷奉啟跪陳或希構廈之餘一賜觀覽知小生於章句中欒櫨榱桷之材盡曾量度則十餘年之邅迴不為無用矣詞旨瑣劣冒黷尊嚴伏候刑書不敢逃讓死罪死罪疊石琴薦一出當州龍璧灘下右件琴薦躬往採獲稍以珍奇特表殊形自然古色伏惟閣下稟夔旦之至德蘊牙曠之元蹤人文合宮徵之深國器專瑚璉之重藝深攫醳將成玉燭之調思叶歌謠足助薰風之化願以頑璞上奉徽音闕一字響亮於五絃應鏗鏘於六律沉淪雖久提拂未忘儻垂不撤之恩敢効彌堅之用制誥本於書書之誥命訓誓皆一時之約束也自非訓導職業則必指言美惡以明誅賞之意焉是以讀說命則知輔相之不易讀允征則知廢怠之可誅秦漢以來未之或改近世以科試取士文章司言者苟務刓飾不根事實升之者美溢於詞而不知所以美之之謂黜之者罪溢於紙而不知所以罪之之來而又拘以屬對跼以圓方類之於賦判者流先王之約束葢掃地矣元和十五年余始以祠部郎中知制誥初約束不暇及後累月輒以古道干丞相丞相信然之又明年召入禁林專掌內命上好文一日從容議及此上曰通事舍人不知書便其宜宣贊之外無不可自是司言之臣皆得追用古道不從中覆然而余所宣行者文不能自足其意率皆淺近無以變例追而序之葢所以表明天子之復古而張後來者之趣尚耳劉歆云制不可削予以為有可得而削之者貢謀猷持嗜慾君有之則譽歸於上臣專之則譽歸於下苟而存之其攘也非道也經制度明利害區邪正辨嫌惑存之則事分著去之則是非泯苟而削之其過也非道也元和初章武皇帝新即位臣下未有以言刮視聽者予時始以對詔在拾遺中供奉由是獻教本書諫職論事者表十數通仍為裴度李正辭韋熏訟所言當行而宰相曲道上語上頗悟召見問狀宰相大惡之不一月出為河南尉後累歲補御史使東川謹以元和赦書劾節度使嚴礪籍塗山甫等八十八家過賦梓遂之民數百萬朝廷異之奪七刺史料悉以所籍歸於人會潘孟陽代礪為節度使貪過礪且有所承迎雖不敢盡廢詔因命當得所籍者皆入資資過其稱摧薪盜賦無不為仍為礪密狀不當得醜諡予自東川還朋礪者潛切齒矣無何分莅東都臺天子久不在都都下多不法者百司皆牢獄有裁接吏械入逾歲而臺府不得而知者予因飛奏絕百司專禁錮河南尉判官予劾之忤宰相旨監徐使死於軍徐帥郵傳其柩柩至洛其下毆詬主郵吏子命吏徙柩於外不得復乘傳浙西觀察使封杖決安吉令至死河南尹誣奏書生尹泰階請死之飛龍使誘趙實家逃奴為養子田季安盜娶洛陽衣冠女汴州沒入死商錢且千萬滑州賦於民以千授於人以八伯朝廷饋東師主計者悞命牛車四千三百乘飛芻越太行類是數十事或移或奏皆主之貞元已來不慣用文法內外寵臣皆喑嗚會河南尹房式詐諼事發奏攝之前所喑嗚者呌噪宰相素以劾判官事相銜乘是黜子江陵掾後十年始為膳部員外郎穆宗初宰相更相用事丞相段公一日獨得對因請亟用兵部郎中薛存慶考功員外郎牛僧孺予亦在請中上然之不十數日次用為給舍他忿恨者日夜搆飛語予懼罪比上書自明上憐之三召與語語及兵賦洎西北邊事因命經紀之是後書奏及進見皆言天下事外間不知多臆度陛下益憐其不漏禁中語召入禁林且欲亟用為宰相是時裴度在太原亦有宰相望巧者謀欲俱廢之乃以予所無搆於裴裴奏至驗之皆失實上以裴方握兵不欲校曲直出予為工部侍郎而相裴之期亦衰矣不累月上盡得所搆者雖不能暴揚之遂果初意卒用予與裴俱為宰相復有搆狂民告予借客刺裴者鞫之復無狀然而裴與予以故俱罷免始元和十五年八月得見上至是未二歲僭忝恩寵無是之速者遭罹謗咎亦無是之甚者是以心腹腎腸糜費於扶衞危亡之不暇又惡暇經紀陛下之所付哉然而造次顛沛之中前後列上兵賦邊防之狀可得而存者一百一十五苟而削之是傷先帝之器使也至於陳暢辨謗之章去之則無以自明於朋友矣其餘郡縣之奏請賀慶之禮因亦附於件目始教本書至於為人雜奏二十有七軸凡二百二十有七奏終歿吾世貽之子孫式所以明經制之難行而銷毀之易至也白氏長慶集者太原人白居易之所作居易字樂天樂天始言試指之無二字能不誤原注具樂天與予書始既言讀書勤敏與他兒異五六歲識聲韻十五志詩賦二十七舉進士貞元末進士尚馳競不尚文就中六籍尤擯落禮部侍郎高郢始用經藝為進退樂天一舉擢上第明年扌叐萃甲科由是性習相近遠求元珠斬白虵劍等賦洎百節判新進士競相傳於京師矣會憲宗皇帝冊召天下士樂天對詔稱旨又登甲科未幾入翰林掌制誥比比上書言得失因為喜雨詩秦中吟等數十章指言天下事時人比之風騷焉予始與樂天同校秘書前後多以詩章相贈答會予譴掾江陵樂天猶在翰林寄予百韻律詩及雜體前後數十章是後各佐江通復相詶寄巴蜀江楚間洎長安中少年遞相倣效競作新詞自謂為元和詩而樂天秦中吟賀兩諷諭閑適等篇時人罕能知者然而二十年間禁省觀寺郵堠墻壁之上無不書王公妾婦牛童馬走之口無不道至於繕寫模勒衒賣於市井或持之以交酒茗者處處皆是其甚者有至於盜竊名姓苟求自售雜亂閒廁無可奈何予嘗於平水市中見村校諸童競習歌詠召而問之皆對曰先生教我樂天微之詩固亦不知予之為微之也又雞林賈人求市頗切自云本國宰相每以一金換一篇其甚偽者宰相輒能辨別之自篇章已來未有如是流傳之廣者長慶四年樂天自杭州刺史以右庶子詔還予時刺郡會稽因得盡徵其文手自排纘成五十卷凡二千二百五十一首前輩多以前集中集為名予以為國家改元長慶訖於是因號曰白氏長慶集大凡人之文各有所長樂天之長可以為多矣夫諷諭之詩長於激閒適之詩長於遣感傷之詩長於切五字律詩百言而上長於贍五字七字百言而下長於情賦贊箴戒之類長於當碑記敘事制誥長於實啟奏表狀長於直書檄詞策剖判長於盡總而言之不亦多乎哉至於樂天之官秩景行與予之交分淺深非敘文之要也故不書長慶四年冬十二月十日微之序
