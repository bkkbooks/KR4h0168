front:
  text: 全唐文欽定全唐文卷六百四劉禹錫六
  hash: sha256:322d7d715ba9d3d21077c2cb701d004d07f75ef0d4d574636addb8fe2ff183ff
body:
  text: 閤下以大墓世在三原而去河南益遠尚繫於數百年之外於義不安遂奮然移㣥從率先行古占數為京兆人且命使者修敬於鄙薄缺然不敢當此之重洪惟閤下世雄朔易四姓之冠其宗勳有八柱之貴其碩德有三老之重因都入雒錫之土田自生齒已上列於侯籍與夫其先嘗為編戶民者大殊謹桉永徽格貫在兩都者無害為本部官蓋神州赤縣尊有所厭非它土之比實待罪輦轂下閤下宣風江漢為諸侯師介圭入覲必參大政其展禮措事宜為㣥倫所觀非據之榮赧然汗下不宣實再拜實白前辱閤下書厚自枉屈執州人之禮兼示移㣥從書明所以去河南從京兆為望之旨於古儀為得然而通行之自久或獻疑焉是以前書不敢不逡巡牢讓亦有以發閤下之雄辨使㬭然為世程者今月某日函使至果貽理言大明時人之所以失而我獨障頹波而逢其原既一辭不獲命又學淺不堪往復敢不敬從前史稱以大將軍而有揖客豈不為重循汲直之言則有以畧其禮而增高者今鄙人之不讓適有以增閤下之重耳實白傳使至蒙致書一函辱示政事與治兵之要明體以及用通經以知權視陰陽慘舒之節取震虩澤濡之象知天而不泥於神怪知人而不遺於委瑣先鄉社之治以浹於舉郡首隊伍之法以及於成師猶言數者起一而至萬操律者本黃鐘以極八音誠通人之說章章必可行者也鄙生涉吏日淺嘗耳剽老成人之言熟矣今研覈至論淵乎有味非游言架空之徒喜未嘗不至抃也故楊榷所見以累下執事云蓋豐荒異政繫乎時也夷夏殊法牽乎俗也因時在乎善相因俗在乎便安不知發敘重輕之道雖歲有順成猶水旱也不知日用樂成之義雖俗方阜安猶蕩析也徙木之信必行則民不惑此政之先也置水之清必勵則人知敬此政之本也缿筩之機或行則姦不敢欺此政之助也則有以其弛張雄雌唯變所適古之賢而治者稱謂各異非至當有二也顧遭時不同耳夫民足則懷安安則自重而畏法乏則思濫濫則迫利而輕禁故文景之民厚其生為吏者率以仁恕顯武宣之民亟於役為吏者率以武健稱其寬猛迭用猶質文循環必稽其弊而矯之是宜審其救奪耳太史公云身修者官未嘗亂也然則修身而不能及治者有矣未有不自已而能及民者今之號為有志於治者咸能知民困於杼柚罷於征徭則曰司牧之道莫先於簡廉奉法而已其或材拘於局促智限於罷懦不能斟酌盈虛使人不倦以不知事為簡以清一身為廉以守舊弊為奉法是心清於棖闑之內而柄移於胥吏之手歲登事簡偷可理也歲札理叢則潰然攜矣故曰身修而不及理者有矣若執事之言政詣理切情斥去迂緩簡而通和而毅其修整非止乎一身必將及物也其程督非務乎一切必將經遠也坊民之理甚周而不至皎察字民之方甚裕而不使侵牟知革故之有悔審料民之多撓厚發姦之賞峻欺下之誅調賦之權不關於猾吏逋亡之責不遷於豐室因有年之利以補敗汰不急之用以嗇財為邦之要深切著明若此其悉也推是言桉是理而篤行之烏有不及治耶古稱言之必可行非樂垂空文耳有人民社稷固可踐其言也瀕江之郡饒為大履番君之故地漸甌越之遺俗餘干有畝鍾之地武林有千章之材其民牟利鬬力狃於輕悍故用暴虐聞重以山茂檟楛金豐鐐銑齊民往往投鎡錤而即鏟鑄損絲枲而工搴擷乘時詭求其息倍稱間聞主分土者盡籠其利而斡之坐簿書舛錯為中執法所劾事下三府以受賕論其刑甚渥於今列郡不寒而慄彼邦人聆其風聲固曰彼浚民者上罪之若此其念民也至矣今二千石以前失職非其罪執事者即人心而用之彼邦人是必翹然須其至而安矣以思治之民遇習治之守欲不至於富庶得乎昌黎韓宣英好實蹈中之士也前為司封郎以餘刃鄟劇於計曹號無逋事能承其家法而紹明之庭堅仲容之族也坐事為彼郡司馬更閏餘者再焉是必能知風俗之良窳采寮之善否盍嘗問焉足為㣥疑之寶龜也至於否臧文律戢玩之戒均權以制動函隸以稔勇平居使不墮萃聚使不譁坐作疾徐心和氣振誠纖悉於所示也故置之以須執事異日承進律之命握獸符而駕寅車然後貢其瞽言重曉左右耳健步劉子良至猥奉書教以愚為希儒之徒重言一發華衮非貴世之服儒衣冠道古語居學官者為不鮮矣求其知所以然者幾何人借曰有之未必不詬病耳今夫挾弓注矢遡空而發者人自以為皆羿可矣移之於澤宮則噤而不敢言何哉有的不可欺故也今夫儒者函矢相攻蜩螗相喧不啻於彀弓射空矢者孰為其的哉異日兄道大行則言益重使儒者之的懸於舌端不得讓也由是知辱教之喜可勝既乎間承得一二易生列侍絳帳荒服之外持經鼎來爭捐珠璣以易編簡不疾而速其君子之德風歟而裔憬俗已丕變矣顧其風候非民和可移地泄恆燠冬無嚴氣其在嗇神以佐藥兼味以禦祲所謂養賢以及萬民頤之時義不可不順苟以有待及物為心則養巳與養民非二道也矧㣥情之禺禺乎禹錫再拜間發書得箏郭師墓志一篇以為其工獨得於天姿使木聲絲聲均其所自出抑折愉繹學者無能如繁休伯之言薛訪車子不能曲盡如此能令鄙夫冲然南望如聞善音如見其師尋文寤事神騖心得倘佯伊鬱久而不能平嗟夫郭師與不可傳者死矣弦張柱差枵然貌存中有至音含糊弗聞噫人亡而器存布方冊者是已予之伊鬱也豈獨為郭師發耶想足下因僕書重有慨耳不宣禹錫白禹錫白零陵守以函置足下書爰來屑末三幅小章書僅千言申申亹亹茂勉甚悉相思之苦懷膠結贅聚至是泮然以銷所不如晤言者亡幾書竟獲新文二篇且戲予曰將子為巨衡以揣其鈞石銖黍予吟而繹之顧其詞甚約而味淵然以長氣為幹文為支跨躒古今鼓行乘空附離不以鑿枘咀嚼不有文字端而曼苦而腴佶然以生癯然以清予之衡誠懸於心其揣也如是子之戲予果何如哉夫矢發乎羿彀而中微存乎它人子無曰必我之師而後我衡苟然則譽羿者皆羿也可乎索居三歲俚言蕪而不治臨書軋軋不具禹錫白禹錫再拜初兄出中臺守江華人咸曰函牛之鼎以之烹小鮮惜乎餘地澶漫而無庸也愚獨心有慨焉以為君子受乾陽健行之氣不可以息苟吾位不足以充吾道是宜寄餘術百藝以洩神用其無暇日與得位同久欲以是理求有得於兄而未有路會崔生來辱書教果惠以所著奇方十通商古今之宜而去其并猥以一物足以了病者居多非累試輒效不在是族或取諸屑近亦以攟拾慮恆人多怠忽不省必建言顯白揚其功於已然其它立論率以弭病於將然為先而攻治為後言君臣必以時言宣補必以性言砭火必本其輸榮言祓禳必因其風俗齊和之宜炮剔之良暴炙有陰陽之候煎烹有少多之取撓勞以制駛露置以養潔味有所走薰有所歸存諸孅悉易則生患非博極遐覽之士孰能知其所從來哉愚少多病猶省為童兒時夙具襦袴保姆抱之以如醫巫家鍼烙灌餌咺然啼號巫嫗輒陽陽滿志引手直求竟未知何等方何等藥餌及壯見里中兒年齒比者必睨然武健可愛羞已之不如遂從世醫號富於術者借其書伏讀之得小品方於㣥方為最古又得藥對知本草之所自出考素問識榮衞經絡百骸九竅之相成學切脈以探表候而天機昏淺布指於位不能分累菽之重輕第知息至而已然於藥石不為懵矣爾來垂三十年其術足以自衞或行乎門內疾輒良已家之嬰兒未嘗詣醫門求治者頃因欲編次已試者為一家方書顧力不足今兄能我先所以辱貺之喜信踰拱璧有以賞音適道耳常思世人居平不讀一方病則委千金於庸夫之手至於甚殆而曰不幸豈真不幸耶甚者或乘少壯之氣笑人言醫以為非急昌言曰飴口飽腹藥其如我何所承之氣有時而既於禱神佞佛遂甘心焉兄以愚言覆觀之其人固比肩耳前蒙示藥焙法謹如教地之慝果不能傷雖茈胡水瀉喜速朽者率久居而無害萬物不可以無法謂生不由養致其誣乎山川匪遐事使之遠形不接而諭者莫賢乎書臨紙怊悵不宣禹錫再拜退之從丞相平戎還以功為第一官然猶議者嗛然如未遷陟此非特用文章學問有以當眾心也乃在恢廓器度以推賢盡材為孜孜故人心樂其道行行必及物故耳前日赦書下郡國有棄過之目以大國材富而失職者多千鈞之機固省度而釋豈鼷鼠所宜承當然譬諸蟄蟲坯戶而俯者與夫槁死無以異矣春雷一振必歆然翹首與生為徒况有吹律者召東風以薰之其化也益速雷且奮矣其知風之自乎既得位當行之無忽禹錫再拜吾兄不知愚無似猥以書見攻其非且曰我與子中外屬當為伯仲其抵我書執禮太卑桉舊儀凡兄姊之齒有唯無伏它以是為衰其於匹敵即前云願後云白而已大歷初李贊皇賈常侍猶守之無渝二公何人也我與子何人也烏有從末俗以姑息為禮而不虞識者所窺耶其旨云爾愚得書退而思惟愀然自賀曰在恆人為宜而在愚為過豈不能幸歟故盡言於兄期有以相暢耳夫禮之文為著定宜尊宜卑猶四方上下左右前後稱謂一立古先聖賢所不敢移管敬仲不敢當命卿之饗虞人不敢承士之招先禮而後身也汲黯不為大將軍而虧九卿王祥不為錄尚書而屈三公先道而後時也是則非據之榮雖君命有所不受非道之利雖眾尚有所不為兄長於大歷初嘗接前輩游故其風采去承平時不甚相遠愚長於貞元中所與游皆後來諸生然猶於稠人廣坐時聞老成人之說灌注耳目斑斑然不絕如綫其後為御史四方諸侯悉以書來賀校其禮皆駮不同唯洪州牧李常侍巽潭州牧楊中丞憑始言執事其它如儀而同在憲司者咸以二牧為不遜愚時與其寮柳宗元昌言於眾曰監察八品也當衣碧言執事為宜不當經怪眾咸听然而咍復謂愚云子奚不碧其服耶其不堪執事色深不可以言解及謫官十年居僻陋不聞世論所以書相問訊皆眤親密友不容變更而時態高下無從知耳前年祗召抵京師偶故人席夔談因及是事乃知與十年前大殊至有同姓屬尊致書於屬卑而貴者其紙尾言起居新婦夔獨竊笑之而已然猶不敢顯言詆之今有人謂東為西者一言發則凡人嗤為騃且狂苟不眾非之則東西易位久矣尊卑失其儀恬而不怪安得使人如東西不敢易之哉曾子有云君子之愛人也以德細人之愛人也以姑息謂古人悉朴且賢則斯言不當發於洙泗間耳蓋三代之尚未嘗無弊由野以至僿豈一日之為漸靡使之然也嫉其弊而救之以歸於中道以俟乎薦紳先生德與位并者揭然建明之斯易也語曰俟自直之箭則百代無一矢俟自圓之木則千歲無一輪執矯揉之器者視之灌叢無非良材耳竊觀今之人於文章無不慕古甚者或失於野於書疏獨陋古而汨於浮二者同出於言而背馳非不能盡如古也蓋為古文者得名聲為今書者無悔吝如水走闕為闕朝議大夫使持節蘇州諸軍事守蘇州刺史上柱國劉某叩頭叩頭伏惟皇太子殿下允膺上嗣光啟東朝蒼震發前星之輝黃離表重輪之瑞位居守器禮重承祧萬國以貞九圍咸說某限以守郡不獲稱慶宮庭闕使持節都督夔州刺史劉某叩頭伏惟皇太子殿下祗膺詔冊光啟儲闈展至性於三朝承本枝於百代宗祏永固神人以和四嶽仰維嵩之高百川承少海之潤某限以職守不獲隨例稱慶宮庭無任抃躍之至使持節連州諸軍事守連州刺史劉某惶恐叩頭伏見今月一日制書大赦天下者伏以獻歲布和皇恩遠降乾坤交泰寰宇廓清伏惟皇太子殿下道貫元良德兼忠孝承顏拜慶榮耀古今某職守有限不獲隨例稱賀宮庭無任欣悅之至某啟伏以相公含道傑出降神挺生坐籌以弼睿謨秉鉞以行天討風雲助氣山嶽效靈制勝於罇俎之間指蹤於韝緤之末蕭斧既定衮衣以歸君心如魚水人望如風草一德交暢萬方和平運神思於洪爐納生靈於壽域文武丕績冠於古今某恪守遐荒不獲隨例拜賀瞻望欣躍無任下情某啟伏以聖君當功成愷樂之日而求賢愈切思治益深是上元垂休欲速致太平之明效以相公事業而逢此時天下之人視仁壽之域其猶尋尺故命書所至德風隨之微才片善咸自磨拂况同主國柄如吹塤箎含生之倫惟所措置日月亭午物無邪陰聖賢合德人識正道雖居畎畝足以詠歌某遐守要荒不獲隨例拜賀私感竊抃實倍恆情某啟某一坐飛語廢錮十年昨蒙徵還重罹不幸詔命始下周章失圖吞聲咋舌顯白無路豈謂烏鳥微志惻於深仁恤然動拯溺之懷煦然存道舊之旨言念觳觫慰安蒼黃推以恕心期於造膝重言一發睿聽克從迴陽曜於肅殺之辰沃天波於蹭蹬之際俾移善地獲奉安輿率土知孝治之源㣥生識人倫之厚感召和氣發揚皇風豈惟匹夫獨受其賜某即以今月十一日到州上訖守在要荒拘於印綬巾韝詣謝有志莫從誠知微生不足酬德捐軀之外無地寄言效節肅屏虔然心禱無任懇悃屏營之至謹勒軍事衙官守左威衞慈州吉昌府別將員外置同正員常懇奉啟起居不宣謹啟某啟某智乏周身動必招侮一坐飛語如衝駭機昨者詔書始下驚懼失次叫閽無路擠壑是虞草木賤軀誠不足惜烏鳥微志實有可哀伏蒙聖慈遽寢前命移莅善部載形綸言凡在人臣皆感至德凡為人子同荷至仁豈惟鯫生獨受其賜伏以相公心符上德道冠如仁一夫不獲慼見於色密旨未下歎形於言竟迴三舍之光能拔九泉之厄袁公之平楚獄不忍錮人晏子之哀越石仍伸知己所以慶垂允祚言成春秋神理孔昭報應斯必身侔蟬翼何以受恩死輕鴻毛固得其所卑守有限拜謝末由無任感激兢惶之至謹勒軍事衙官守左威衞慈州吉昌府別將員外置同正員常懇奉啟起居不宣謹啟某啟州吏還伏蒙擺落常態手筆具書言及貞元中登朝人逮今無十輩又發中書相公一函具道閣下亟言曩遊顏間頗有哀色夫溝中之木與犧象同體追琢不至則坐成枯薪朱而藍之猶足為器苟液樠曲戾不足枉斧斤願為庭燎以照嘉客謹啟某啟某遭罹不幸歲將二紀雖累更符竹而未出網羅親知見憐或有論薦如陷還濘動而愈沈甘心終否無路自奮豈意天未勦絕仁人持衡紆神慮於多方起堙淪於久廢居剝極之際一陽復生出坎深之中平路資始通籍郎位分曹樂部喬木展舊國之思行雲有故山之戀姻族相賀壺觴盈門官無責詞始自今日禽魚之志誓以死生草木之年惜其晼晚章程有守拜謝無由瞻望巖廊虔然心禱謹啟某啟某一辤朝列二十三年雖轉郡符未離謫籍卑濕生疾衰遲鮮歡望故國而未歸如痿人之念起昨蒙罷免甘守邱園相公不棄舊遊特哀久廢每奉華翰賜之衷言果蒙新恩重忝清貫薦延有漸拯拔多方六律變幽谷之寒一丸銷彌年之疹鎩翮將舉危心獲安布武夷途自此而始分曹有繫拜謝無因瞻望德藩坐馳精爽無任感激之至謹啟某啟一自謫居七悲秋氣越聲長苦聽者誰哀湯網雖疏久而猶詿失意多病衰不待年心如寒灰頭有白髮惕厲之日利於退藏是以彌年不敢奏記近本州徐使君至奉手筆一函稱謂不移問訊加劇重復點竄一無客言忽疑此身猶在門下收紙長想欣然感生尋省遭罹萬重不幸方寸之地自不能言求人見諒豈復容易伏蒙遠示且曰浮謗漸消况承慶宥期以振刷方今聖賢合德朝野多歡澤柔異類仁及行葦萬族咸悅獨為窮人四時平分未變寒谷自同類牽復又已三年側聞眾情或似哀歎某才略無取廢錮是宜若非舊恩孰肯留念六翮方鎩思重托於扶搖孤桐半焦冀見收於煨燼伏紙流涕不知所言謹啟某啟去年國子主簿楊歸厚致書相慶伏承相公言及廢錮愍色甚深哀仲翔之久謫恕元直之方寸思振淹之道廣錫類之仁遠聆一言如受華衮伏自不窺墻仞九年於茲高卑邈殊禮數懸絕雖身居廢地而心恃至公伏以相公久以訏謨參於宥密材既為時而出道以得君而專令發於流水之源化行猶偃草之易習強伉者自納於軌物困杼軸者咸躋於仁壽六轡在手平衡居心運思於陶冶之間宣猷於魚水之際然能軫念廢物遠哀窮途嗟哉小生有足悲者內無手足之助外乏強近之親為學苦心本求榮養得罪由已翻乃貽憂捫躬自劾媿入肌骨禍起飛語刑極淪胥心因病怯氣以愁耗近者否運將泰仁人持衡伏惟推曾閔之懷憐烏鳥之志處夔龍之位傷屈賈之心沛然垂光昭振幽蟄言出口吻澤濡寰區昔者行葦勿傷枯骼猶掩哀老以出弊愍窮而開懷無情異類尚或嬰慮顧惟江干逐客曾是相府故人言念材能誠無所取譬諸飛走庸或知恩嗚呼以不駐之光陰抱無涯之憂悔當可封之至理為永廢之窮人聞弦尚驚危心不定垂耳斯久長鳴孔悲腸迴淚盡言不宣意謹啟某啟某向以昧於周身措足危地駭機一發浮謗如川巧言奇中別白無路祝網之日漏恩者三咋舌兢魂分終裔壤豈意天未勦絕仁人登庸施一陽於剝極之際拔眾溺於坎深之下南箕播物不勝昌言危心鎩翮繇是自保陰施之德已然乃聞受恩同人盟以死答私感竊抃積於窮年化權禮絕孤志莫展今幸伍中牽復司存宇下伏慮因是記其姓名謹獻詩二篇敢聞左右古之所以導下情而通比興者必文其言以表之雖甿謠俚音可儷風什伏惟降意詳擇斯大幸也謹因楊子程留後行謹奉啟不宣謹啟某啟去年本州吏人自蜀還伏奉示問兼賜衣服繒綵等雲水路遙緘縢貺厚恭承惠下之旨重以念舊之懷熙如陽和列在緗簡苦心多感危涕自零驚神驛思若侍穎杖伏以聖上注意理本銳求國楨念外臺報政之功追宣室前席之事重下丹詔再昇黃樞㣥情合符和氣來應况八柄所在三人同心叶台座之精膺俊傑之數談笑於規隨之際從容於陶冶之間物皆由儀人識所措某久罹憲網兀若枯株當萬類咸悅之辰抱窮途終慟之苦清朝無絳灌之列至理絕椒蘭之嫌此時不遇可以言命嗟乎一身主祀萬里望枌榆之鄉高堂有親九年居蠻貊之地從坐之典固有等差同類之中又尋牽復頃在臺日獲奉準繩指吏途於桉讞遵文律於章奏藻鑒之下難逃陋容炎涼載移足見真態自違間左右沈淪遐荒歲月滋深艱貞彌厲緬想受譴之始他人不知屬山園事繁孱懦力竭本使有內嬖之吏供司有恃寵之臣言涉猜嫌動礙關束城社之勢函矢紛然彌縫其間崎嶇備盡始慮罪因事闕寧虞謗逐跡生智乏周身又誰咎也伏以趙國公頃承顧遇之重高邑公夙荷見知之深雖提挈不忘而顯白無自蓋以永貞之際皆在外方雖得傳聞莫詳本末特哀黨錮亟形話言自前歲振淹命行中止或聞輿論亦愍重傷伏遇相公秉鈞輒已自賀儻重言一發清議攸同使聖朝無錮人大冶無廢物自新之路既廣好生之德遠彰㣥蟄應南山之雷窮鱗得西江之水指顧之內生成可期伏惟發膚寸之陰成彌天之澤迴一瞬之念致再造之恩誠無補於多事之時庶有助於陰施之德無任懇悃之至謹啟某啟嚮者淮右逋誅即戎歲久天子齋戒以命元臣登壇之日上略前定從九天而下縱以神兵分六符之光掃其長彗授鉞於西顥之半策勳於北陸之初功成偃節復執大柄君臣相遇播於樂章山河啟封載在盟府上方注意人益具瞻因魚水之叶符極夔龍之事業時屬四始恩覃萬方致君及物其德兩大古先俊賢所未備者我從容而保之殆非人事抑有幽贊夫異同之論我以獨見剖之文武之道我以全材統之崇高之位我以大功居之造物之權我以虛心運之然持盈之術古所難也實在陰施拯物厚其德基以左右功庸而百祿是荷人所欣戴久而愈宜昔袁太尉不忍錮人而楚獄衰息一言之慶而子孫丕承以今日將明之材行前修博施之義筆端膚寸澤及九垠猶夫疾耕必有滯穗某頃墮危厄常受厚恩誼盟於心要之自效常懼廢死荒服永孤願言敢因賀牋一寄丹懇顧非奇理不足以縈於沖襟然利於行者固在乎常談而卓詭孤特之言未必利於行也伏惟以愚言與賢者參之謹啟
