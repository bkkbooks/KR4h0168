front:
  text: 全唐文欽定全唐文卷八百七十九徐鉉二
  hash: sha256:941a2bdb05d50d036620b67d2be915c8bb1cb86c90f6abd6e3a296417de82e3f
body:
  text: 敕國有六職百工與其一焉我朝已來其選尤重矧自尚書郎而擢拜者不其鮮歟某官陳某以幹蠱之才克構之美亟更庶尹遂歷省垣委之以繁雜之務而事益明兼之以榷管之司而利不匱宏羊心計亦莫加焉屬朕出震嗣圖施令布慶二卿之任頗難其人今以繼善為之爾其可以稱職噫大僚之體存乎簡易興利之要在乎廉平無渝乃誠以撓吾法可門下盡忠於國者其報深有勞於事者其澤厚方切念功之義仍當均慶之初不有寵章孰先懋典馬某深沉有勇質重寡言少推學劍之能早識擇君之舉自策名旗鼓受任疆場履險身先有功不伐向分符竹實制要衝化行於富庶之時節著於艱難之際純誠懿績時論多之入總禁營遂成優秩富壽之福無闕敬慎之風愈高豫惟汝嘉思有以勸屬此推恩之際俾升掌武之資噫忠勳既明寵祿亦至終始之義古今所高勉揚令猷以享元吉門下昔在明王膺圖嗣統雖復格天光表繼文下武猶曰實相以濟又曰克艱厥臣矧惟寡昧疇咨庶尹若乃承弼之重毗倚之隆詢於具瞻敢或經授游某世濟文雅挺生公器中興之始即為辭臣重熙在運亟更近署忠為令德實浮於名藹然直聲允洽時望先皇帝省方展義分命㣥司藉爾重臣輔豫小子直躬無避正辭不諂翊從行闕克申其勞至於受命交兵之間抗節履危之際繇義以濟知無不為此皆古之所以為艱豫之所以為尚者也間歲出於獨斷命長南宮議者但高其盡公之誠未許其理劇之用遂能正身而令當官不回厲風霜之威以紏其慢堅夙夜之節以率其勤請託不行紀綱自舉㣥議由是咸伏六職以之孔修風雨不渝始終一致實為國器想見古人而躬親簿領之間遽成勞勩從容廟堂之上未盡謀猷酬庸之典豫所多愧是用命作左相陟茲鸞臺進金紫之崇階典圖書之祕府勳爵井賦併示寵名於戲釋細務足以導節宣之和恭大政足以暢彌綸之業繄爾致君之效成我知臣之明往維欽哉無假多訓可敕御史所職實為紀綱百官之邪得以歸正衆目不理得以舉明使朝廷凜然罔懈於位茲朕之攸賴而和庶政也向者治刑不暇官業靡申遂用省其訊鞫之煩委以澄清之寄庶循理本諒在得人通議大夫守吏部尚書柱國賜紫金魚袋隴西縣開國子食邑五百戶李匡明學術優深德望清重可副丞相以鎮時風中散大夫守右常侍判御史臺事柱國賜紫金魚袋趙丕自掌憲司克勤於職而侍從之列朝夕論思期於弼違宜在專任令以庶獄移從理官可歸騎省以備顧問各踐乃位允期懋功匡明可御史大夫丕可守本官罷判臺事敕兩掖南官樞密之地也元台上公股肱之寄也况親賢在位中外具瞻式敘彞倫爰申明命夫真宰之重大政咸歸出納王言固當綜録侍中壽王某向兼南省未叶舊章宜罷判尚書省便領中書門下兩省事太保齊邱雖道在經邦方資納誨而事殷會府兼藉允釐可知尚書省事大元帥齊王總納百揆以貞萬邦凡曰謨猷悉關獻替其三省事並取齊王參決朕允思恭巳以荷景靈用一國之才敢辭則哲成天下之務庶叶無為方俟以沃心豈勞多訓敕匡時啓運功臣威邊將軍濠州都團練觀察處置等使光祿大夫檢校太傅使持節濠州諸軍事守濠州刺史渦口兩城使兼御史大夫上柱國彭城縣開國子食邑五百戶劉崇俊濠上觀風克昭祖服光祿大夫檢校太保持節常州諸軍事守常州刺史兼御史大夫上柱國劉佑晉陵守土允茂政經而皆夙練軍聲習知邊要方深朝寄遽屬內艱永言護塞之權宜舉墨縗之制俾加寵命改授階資勉抑孝心以從王事並可起復雲麾將軍餘如故敕朝議郎行尚書虞部員外郎武騎尉賜緋魚袋馮延魯頃者尹縣留都首變田制克勤於事以利於人自歸朝行已踰周歲如聞衆庶未甚樂成矧彼浩穰所宜均一是用假爾亞尹往畢舊功其在條理得中厚薄無撓俾乃比屋咸遂所安止於刑讞之繁亦以公平為用務令稱職無忝加恩可以本官判江都少尹公事敕王者旌董戎之功重殿邦之任疏寵之命因事有加所以勸能而佇效也佐時衛聖功臣建威將軍康化軍節度池州觀察處置等使起復雲麾將軍檢校太尉兼侍中使持節池州諸軍事池州刺史上柱國太原郡開國侯食邑二千戶王彥儔作鎮方隅克揚威信師謀不撓庶政有常肅爾先聲宣我朝命向者起於哀制授以崇階禮適就於變除寄方隆於藩屏俾從增邑式示推恩勉揚令圖無替丕績可光祿大夫加食邑一千戶餘如故敕通議大夫守御史大夫柱國賜紫金魚袋隴西縣開國子食邑五百戶李匡明向緣時望命長憲臺既歷歲時亦聞敬慎方佇茂績以光大猷遽覩拜章固辭重位俾全寵遇宜輟準繩尚賴分憂無忘守節可檢校司徒兼御史大夫使持節舒州諸軍事守舒州刺史充本州團練使餘散官賜邑如故敕朕以御史未理庶政靡清思得良臣副吾慎選中散大夫守右散騎常侍柱國賜紫金魚袋天水縣開國子食邑五百戶趙丕再履憲署欽若攸司迭為侍臣匡豫不及俾授格心之寄宜膺獨坐之權夫才識兼通然後能得大體公正無黨然後能肅百司糾正失中則紀綱撓顧避不言則職業隳爾其欽哉無辱朕命可御史中丞餘官勳賜爵邑如故敕出身事主忠之效也以年致政古之制也淳風將振斯道復行朕用嘉焉宜示優寵宣徽使某官陳褒以敬慎之操俊乂之才輔豫潛九之初叶我司總之寄出納惟允佐佑盡規勤勞王家數紀於是永念耆德方注虛懷遽從知退之言亟有懸車之請雖面諭難抑豈舊功可忘而司衛列卿秩崇務簡俾退辭近侍猶在立朝勉回高尚之心式重君臣之義可衛尉卿敕十連之帥百城之長藩屏王室其揆一也隨時省置何常之有焉朕祗荷慶基懋循古訓迭用舊德以頒詔條交修豫違踐更爾位肆因大慶式舉朝章金紫光祿大夫上柱國京兆縣開國子食邑五百戶杜昌業始以明敏肅恭服勞近密出納惟允固慎無違先帝用能委之邦政明九伐以恢王略堅一心以迪大猷六事允諧時乃之用將圖爾效且盡其才朕以中流之寄九江為重控五嶺之衝要鎮百蠻之驛騷屬豫相臣入總樞務惟爾公望克嗣其勳是用輟夏官之崇膺外臺之職尚虛使節以便理戎其往慎乃終遵我成憲簡易以申令恩信以即師惟惠惟忠無忝朕命依前檢校太保兼御史大夫使持節江州諸軍事江州刺史本州團練觀察使散官勳如故朕聞先王之靜人也四夷咸賓尚先慎德之誡一夫不獲則軫納隍之心是故導以仁聲浹之惠澤猶不可化遂威有刑昨者嶺表遺氓聚為寇盜違其上命犯彼戰鋒而敢乘我國哀伺我邊隟侵迭我封部誘惑我黔黎保據溪山肆為剽掠朕以肇膺丕業先洽德音矧彼狂徒皆吾赤子弗忍盡殺冀其自新所以雖命師徒且令招撫而凶愚不革結聚愈忝暴害吏民攻圍縣邑一至於此其能久乎國有常刑吾又何愛仍聞衆軍致討纍有殺傷平人無辜暴骨於野興言及此永惻朕心况常賦及期三農失業特申矜恤更示懷來處州今年應屬省租稅並可放免仍委諸縣長吏安存編戶宣示國恩防護警巡勿令擾動妖賊張茂賢首為劫盜罪在難容若能束身歸降亦與洗滌收録如聞命之後因循未賓即令招撫諸軍分路進討如所在百姓及徒黨中有能擒斬茂賢者不計有官無官並賜三品賞錢一萬貫莊一區并已分産業並永放苗稅差役傳之子孫此恩不改若能同心計畫及數內或擒獲得稱王稱統軍軍使之屬并次第首級止於一隊一寨頭領者即約此例等降優賞放免苗稅差役或能自出身歸投有田畝者各令歸業仍放三年賦租無田者委本道録奏各與逐便優穩安排及重加賞賚如凶惡不回為諸軍擒獲者不問人數即便處斬明申威信汝自擇焉諸軍將士有能斬獲茂賢殺戮反黨官賞之制並越常規豫不食言爾宜自勵朕永惟止殺許彼悛心且妖賊等燒毀倉儲蹂踐禾稼聚食則資糧立盡外取則穀實不收進則大軍扼其前退則領兵掎其後況烏合之衆本不同心緩則苟避征租急則各圖恩賞函首來獻翹足可期咨爾㣥黨等自保家鄉共思寧息與其碎身於鋒刃孰若樂業於閭里咨爾將士等各奮驍雄早成功績與其暴師於境上孰若受賞於轅門體我深懷速清邊徼布告本道咸使聞知敕惟先王體國經野建邦設都並立懿親以藩王室當畿服之地則任輔翌之重有戎昭之績乃增督護之威是以王略恢而諸侯和矣宣城重鎮陪京之南制天險之津梁據三楚之襟帶境環千里邑聚萬民我朝以來戎寄尤切太師魏王受鉞先帝建牙是邦宣導皇風董齊師律生植茂遂禮讓興行時惟懋功叶此時論粵朕小子懼德弗堪允孚大猷其在叔父雖師保之命已迪茂章而刺舉之名未極公望宜升大府式壯中權於戲立愛之恩豫不敢怠敬保之義王其謂何勉啓乃心以底於道可升宣州為大都督府以魏王為宣州大都督府長史餘並如故仍編入冊命宣降敕守邊之要在乎崇垣翰而重威令也任能之方在乎因善政而加寵秩也懋迪斯道時惟令猷金紫光祿大夫檢校太傅使持節吉州諸軍事守吉州刺史兼御史大夫上柱國太原縣開國男食邑三百戶王崇文儒雅飾身威猛宣用入奉旅賁之列出申刺舉之能光祿大夫檢校太傅使持節袁州諸軍事守袁州刺史兼御史大夫上柱國劉仁贍沉厚有謀明斷能理護塞之略歷任弗遷光祿大夫檢校太傅使持節歙州諸軍事守歙州刺史兼御史大夫上柱國清河縣開國子食邑五百戶張鈞踐履班行昭著聲問守土之效一心靡違而皆克嗣乃勳誕揚我武協比成績勤勞王家朕以眇躬欽承鴻業實賴良將綏爰四方肆於布慶之辰而有加等之命就升使職並駕兼車仍崇馭貴之封增立將軍之號併申寵寄尚示克終無懈乃誠以底於理陟明有典豫不敢忘崇文可光祿大夫依前檢校太傅使持節吉州諸軍事守吉州刺史兼御史大夫充本路都團練觀察處置等使進封開國子食邑五百戶仍賜號威勇將軍散官勳如故仁贍可依前檢校太傅使持節袁州諸軍事袁州刺史兼御史大夫充本州都團練觀察處置等使封彭城縣開國男食邑三百戶仍賜號貞威將軍散官勳如故鈞可依前檢校太傅使持節歙州諸軍事守歙州刺史兼御史大夫充本州都團練觀察處置等使進封開國伯食邑七百戶仍賜號武威將軍散官勳如故敕朝議郎行袁州司馬賜緋魚袋高逸休立身謹行聞於朝廷負才好謙老於州縣先皇獎異錫以銀章優秩自居十數年矣其子焴秉乃直筆為吾史臣適當均慶之初先有腰金之命而愛敬之切發於中誠乞循回授之文庶遂顯親之義辭旨懇激覽之惻然俾允所陳且成其美仍加寵秩以就懸車噫望族舊人唯爾而已覩本朝之恢復拖紫綬以優游孝子克家耆年致養茲惟盛事足慰爾心可檢校尚書水部員外郎壽州都督府司馬致仕賜紫金魚袋敕王者官人之旨必褒賢能而均勞逸也列辟垂憲豫弗之忘某官李草口咢夙負壯圖少為裨將餘勇可賈有勞不矜泗水剖符邊候寧晏宣城從帥連營輯和而將領之權久煩耆德毗贊之任未極初筵俾援尚齒之文就疏加等之命勉承朝獎無替忠誠可敕朕凝旒端冕以臨萬邦而左右史臣執簡近侍言動得失注記無回故布政罔不臧承化罔不若惟聖攸賴慎簡難虛某官馮延已君子之儒多聞為富發之為直氣播之為雄文某官閻居常行顧樞機學臻精博得廷臣之體多長者之言而皆踐彼周行奉豫元子或奏記有翩翩之譽或樽罍多亹亹之談藹然清風叶此時望是宜兼領郎署咸躋掖垣於戲君舉必書朕敢忘於恭已無德不報爾勿怠於懋官各振公才副茲多訓可敕五品子馮倜蘭臺圖書之府起家而預之自非有才孰克處此以爾早服嚴訓實揚令名勵學檢身如恐不及成爾嘉器富我士林俾授初資以漸清貫無忘詩禮之學以益刊正之勤可敕朕嘗思古先哲王所以致理區中垂憲萬祀者蓋有史臣以記其過有諫官以弼其違或面諍於庭或舉書於冊故政令所及罔不化成而怠惰之心無自入矣將振斯典必求其人某官王仲連爰藉才能亟參秩序正已而率下盡節而向公某官米崇楷早負時名尋升閨籍佩韋以臨事慎獨以修身而並服豸冠或司綱憲或立朝多按劾之奏或典刑有欽恤之心叶我懋章宜升右掖勉修官業以副簡求直筆正言無有所諱可敕秦漢以御史掌四方之記我朝以雜端正百官之邪其名則同所職實重副是慎選其惟通才某官查文徽克負美名早從交辟尋陟郎署升為王臣法讞之難俾其參決而察情無不當持議無不平俾上絶濫刑下知恥格率是幹用使持憲綱在能振舉霜威肅清朝序爾其直躬而處衆正已以當官糾謬繩愆無或顧避陟明有典可不懋哉可夫珥金貂直騎省以備顧問非不重也而文學之選宜又加焉某是號名儒久登華貫臺閣踐歷聲實相符侍極以來當官無撓朕祗奉先烈勤求大中咨訪闕疑藉爾稽古特加近職以示開懷順美弼違無忘讜直敕懋官之旨非增秩不足以示寵行邊之任非進號不足以申威施之其人是為令典某寬厚得衆深沉有謀克荷家聲纍膺朝寄百城觀政三郡底寧而長淮上游地雄師衆刺舉之職未極當官廉問之楷實諧僉議因是敷寵更佇厥成噫千里之長三軍之帥任遇斯重勳庸是圖爾其敬哉無隳乃力可敕昔帝欽明義先敦序九族既睦萬邦以懷矧乃推自葉之恩疏漏泉之澤有光茂典式表孝心外祖母李氏麗德坤儀垂訓內則儲慶漸生民之什顯魂開石窖之田庶豫眇躬弗忘祗凜而嗣膺鴻業若涉大川奉長樂以自寧過躍龍而軫念追遠之數宜有加焉是用進啓大邦載崇懿號昭示戚里知豫永懷可敕周禮六卿皆有軍政漢制尚書奏事禁中歷代親重也如是今豫有命亦屬其才某官刁紹始以幹能屢恭繁劇向由卿寺踐歷省垣制國用而無違登生齒而有羡丕顯成績是為才臣今朕祗嗣丕圖永懷司會俾率諸吏表於南宮爰陟冬卿式申慶澤爾其欽承彞訓修舉官司無忘克終以忝殊渥可敕某珥貂服冕侍從獻替騎省之任也必以儒學大僚端方名士入膺茲選允叶懋章而爾義方可謂能矣踐歷臺省抑揚聲實純誠直道造次靡忘今豫眇躬嗣守丕訓弗惠厥德思聞讜言乃均慶恩命為常侍從容左右敬佇嘉猷爾其念哉無渝乃節可敕先王睦親九族必求宗正之賢者朝行之名臣為之表儀序其昭穆今我有命時惟舊章某官貽業學以潤身文以行禮貞以幹蠱直以事君有一於此是可嘉尚矧備四者非所謂名賢乎今朕嗣續丕基敷遵慶澤是用選於掌樂為我司屬使吾宗室有信厚之風非貽業而誰勉修厥官無忝多訓可敕某官蕭儼夫王者之為政也任能舉直理刑懋功如斯而已矣今秋官卿佐皆闕爾儼實專其司定法察情克舉攸職切言直氣屢聞於朝靡私厥躬何其愛朕之深也方將圖效適屬均恩是用就升名曹仍加命服俾擢省闥時豫寵章爾其念哉無易乃心無回乃行決獄以寬簡當官以公平一心克終豫慎嘉汝可敕某官李景進昔漢館陶公主為子求郎而不得何者非其人也今汝景進亦吾外戚而謹願儒雅好學善言久為臺閣頗副時望故均慶澤擢轉名曹彼漢推公而吾獎善兩得其道不亦宜乎書曰任官惟人又曰惟刑之恤朕服斯道因舉而行某官張援為性端方處衆和雅貞亮足以幹事哀矜足以得情亟更攸司弗易時用因豫有慶期爾盡才命為大農俾掌廷尉於戲庶獄之慎不可忘也單辭而行不可為也平反伏念夜思晝行尚於措刑體我求理敬之哉敕四京令之重也其選惟一是必試可以進之均慶以寵之蓋欲慎厥官而安其政也某官李潯屢為長吏綽有能名東夏之理不易其操事簡俗便豫甚多之爰用加恩俾從真授勉欽朝獎無懈乃心可敕先王之制官刑也過無所隱其肆大眚也善靡有違無私之義於是乎在某早服時望亟更臺郎豫在東朝列於賓席旋二廷尉實奉邦刑偶違伏念之言遽貽一黜之命今朕祗嗣丕業誕敷慶恩豈以職事之愆遂忘樽俎之舊是用召自近郡陟於南宮勉承寵光以永無咎可敕王者之建藩輔也必命重臣以臨之又擇賢士以佐之政成當遷留而增秩古之制也高越以儒學淹雅見稱於時頃自南宮直於東觀筆削之言方勵弓旌之禮是求從事大邦率多婉畫有嘉令望爰屬慶恩俾假正郎仍紆紫綬服我加等之命無懈盡規之心敕夫太上立德其次親親能兼之者鮮矣惟是具美屬於我朝某孝友資身貞幹為質守樞機而無悔居富貴而不驕藹然善聲成此嘉器朕肇襲丕業廣覃慶恩矧有名臣近在宗屬是用假以空上列於亞卿仍進崇階併示優寵於戲行為民則爾其忽忘愛克厥威朕不敢尚服我多訓永揚令圖敕朕歷選列辟見其睦親名器之難必當慎簡信不可私於其屬也故我疏寵務先推公保定郡公景迪靜惟端方動必孝敬佩師友之訓成信厚之風宗室之間聞望尤著屬我嗣服之始叶於立慶之恩爾其率循令猷惠迪前烈勿驕勿惰以永乃成敕夫邑令之有聲者入奉清列諫官之滿歲者出宰百里蓋朝廷憂民立政之意也某官早歷宦緒無廢官常擢參禁垣克服彞憲而南楚大邑長吏尤難命自周行往宣朝旨仍加朱紱以示殊恩無易乃心勉修所職敕天下之大建親分陝以尹之東夏之重選能設二以維之茲用安民而政舉也某官艾筠識量純素學術通明奉我東朝周知其善輟借侯幕載揚令名海隅之康筠有其力夫以亞尹之難如彼而有適用之才若此俾膺慎選不亦宜乎勉勵公方更施勤績敕鄉貢明經閻度士子起家而預清級者蓋亦有之自非才地兼茂則不能光朝命而叶時論矣以爾名父之子自強不息學業履行實浮於名屬豫出震之初成我多士之世俾掾天府以漸亨衢無忘益恭更揚令問
