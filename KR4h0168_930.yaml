front:
  text: 全唐文欽定全唐文卷九百三十杜光庭二
  hash: sha256:0cc01fec037bd79c3d25fc02fc74b8da9ab1e5795118d82f816d152294b8e10f
body:
  text: 臣某伏奉宣旨於北帝院奉太上老君修黃籙道場三日設齊散壇給內莊宅庫錢陸拾貫文省除差選道衆二十一人行道禮懺須令精潔伏惟陛下功包五帝德懋三皇凝旒敷有道之風端扆暢無為之化宸心密感萬靈響應以潛通睿想遐周四海雲隨而奉聖故得乾坤交泰日月貞華嵗阜年康風恆雨若神戈所指長蛇與封豕皆誅惠渥所覃虐鬾與潛螭自屏由是仙山邃洞休瑞繼聞玉印銅符禎祥間出今則拯橫流之難興時雨之師將廓八溟同歸一統而又翹心元教讓德皇穹於中元齊潔之期備三境香花之會上答元元聖力特開黃籙寶壇用臻巨福洪休克固瑤圖睿壽臣獲隆聖奬祇奏德音唯勵精誠以虔焚祝不任荷戴之至臣某伏奉聖旨宣示東北面軍前所奏得鳳翔出歸官健王彥釗等分析賊中事宜並有謠言泰邊垂曲子待來年者臣某言伏以天道元微潛思眹兆神功幽晦實主福祥必憑謠詠之言以告休徵之旨昔吳時青童謠於廣陌尋驗吳亡陳時異烏下於高臺果彰陳滅五星飛落為虞舜受國之期一馬化龍乃元帝興王之應斯皆發於天意感契人心詳考嘉言允歸聖德伏惟皇帝陛下繼天誕睿應運啓圖徇億兆之樂推撫臨海嶽承昊穹之眷命拯救生靈國寶珍符不求自至夷琛塞賮望日爭來而猶北境負恩孤城背義坐積薪之上即致焚燒巢折葦之端立瞻虀粉果見明神示讖里巷傳謠竊聞所告之詞便主剋平之義所言邊垂者乃國家散關之外聖心協順即同時雨之師神道言祥先陳徯后之詠成功克敵翹足可期即當蕩定三秦統臨萬國瑤圖寶歷地久天長臣獲奉天慈躬聆吉語輒陳淺見干浼宸嚴不任之至臣某伏蒙聖慈宣賜漢州通記縣天錫觀唐友則莊一所永充常住者伏惟陛下繼天受命應運垂裳鴻圖豫定於上清寶冊遽呈於厚地鼎新觀宇允答休禎三殿之像貌崇嚴終嵗之香花精潔今則特頒睿澤廣錫莊田輟彼膏腴永為常住皇慈迥降元教增榮自茲日給齊羞免有旁求之闕晨香暮燭益專焚祝之心祈聖壽之延洪保宏基之隆永臣某叨榮聖奬躬荷殊恩不任之至臣某伏覩惠進大師僧行真狀奏奉聖旨修青城山丈人真君殿功畢者伏惟陛下恩撫萬方仁深二教祇園蓬島咸均崇飾之慈鹿苑鰲宮俱被興修之賜爰於仙宇特命高僧載申剞劂之功克就莊嚴之勝俄成邃殿永鎮福庭期五山十洞之靈增彌劫齊天之壽臣獲居元教躬荷皇慈不任之至臣某伏以九天集貺三景凝祥動樞殿以飛光降春宮而誕秀華夷增抃億兆同歡皇帝廣捨緡錢精崇齊福必冀上清照鑒隆萬壽於聖躬至道貽休介千祥於儲后克昌大寶永統九圍臣某等獲勵焚修榮頒襯錫不任惶懼之至臣某伏奉恩旨俞允宰臣等所上尊號者丹懇上陳皇情下矚自天有命率土同歡臣某中謝伏惟皇帝陛下元鳥誕商赤符興漢救焚拯溺神資命世之才日角月庭天啓乘時之瑞懋宏勳而崇睿德功蓋前朝總歷數而廓洪基祇膺寶運由是三靈改卜萬國攸歸鄙成湯周武之君陳師用鉞笑創魏開隋之主侮寡淩孤振衣而康濟九圍凝旒而光臨大寶承耀魄中黃之祚執招拒西白之符握金鏡而照寰瀛人神交泰撫璿璣而觀海島億兆樂推故得御端門而嘉氣橫軒發圓邱而神兵扈仗謁清廟而纖雲四卷月瑩中霄膺鴻名而白氣輕飛煙籠廣砌麟呈沼沚龍躍江湍草樹含文雲霞絢綵金符踴篆玉璽流光雖讓德於上蒼已盈編於太史又若天涯地表右塞南荒列奇貨於明庭貢神駒於天廄寶香來於絶域美玉薦於殊封漢孝武之四隅請頒正朔唐高宗之屬國願混車書將復禹封更開堯土百揆時敘六樂克和信及豚魚恩加動植矜逋已責恤獄省刑天無入牢之星地絶成牛之氣俘囚繫頸咸蠲鈇鉞之威孽黨臨誅特有緡錢之賜牲牷肥腯粢盛潔豐敢昭事於神明致仁賢乎紱冕達誠心於天地罄恭恪於郊禋感無不通動叶喜應不衒奢靡不御纖華無沈湎之游無惉懘之惑不尚馳騁靡狥畋漁靜必肅嚴舉惟典禮豐財和衆禁暴安人大閲以正武威大搜以示軍實貔貅百萬皆蒙輪拔拒之豪騋牝千㣥盡驥子龍孫之駿延奬忠孝博採器能片善無遺微功必録專經稚子激之以高科靖節幽人縻之以好爵賞勤敦本務穡勸農嵗多棲畝之糧時豐廩實野有如雲之稼國富家肥四隅無烽燧之勞百里有歌謠之樂星芒武將功高而武烈洸洸嶽秀儒臣業贍而儒風穆穆雖仲謀之興江表元德之有坤維較美籌功曾何仿佛今則關河克靜鞞柝無喧鄰封之玉帛交馳近境之干戈載戢人歡富壽政洽雍熙文武諸臣願增徽懿中外瀝懇華裔同辭果回日月之光俯降俞允之詔戴圓履矩率土暜天觀盛禮而有期仰高穹而增抃臣與道衆等不任踴躍歡呼激切之至臣聞磐石之宗義非他族維城之重實自本枝將垂久大之規合定親疏之分臣目乖文律識昧武經獲履戎行早塵天渥提戈擊劍惟傾報主之心北伐南征每誓勤王之節伏惟皇帝陛下駕驅豪傑掃蕩寰瀛念其纖芥之勞假以殊常之澤賜為骨月列在宗祊但勵捐軀冀酬睿造今屬以乾坤改卜天地降休土德潛移金行啓運徇華夷之推戴副億兆之歸依端居而神器自來遙同舜禪恭已而龍圖肇創不假周征緱山之寶祚天長淮水之瑤源地久巍峩帝緒須承綿瓞之宗浩蕩皇基難雜蓬門之子循襟省己榮極增憂輒披昧死之誠甘置逆鱗之罪期分貴賤永敘仙凡伏乞聖慈許臣却還本姓干冒宸嚴無任待罪望恩涕泗隕越之至臣某伏覩司天奏今月一日丁未巳時四刻太陽合虧於軫宿十一度至未時四刻復圓今測驗不虧者日華騰景君德齊尊超術歷而不虧彰睿明之通感中賀伏惟皇帝陛下元陽誕聖二曜均明升若木於震宮曜重輪於乾道體冬曦而流愛九有感恩比春煦以延慈三無竝照故得大明增彩推策難窺契覆載之殊休越陰陽之常度祥光彌盛元德動天逾漢日之再中邁堯輝之合璧書之紬史實冠瑤圖臣獲奉昌期叨觀嘉貺退顧桑榆之景倍傾葵藿之心不任歡躍之至臣某言伏覩長平山惠進禪師行真奏伏惟宣旨重起立丈人觀真君大殿功畢者聖造旁敷仙祠重創巨功克懋靈迹增榮伏惟陛下德洽萬方惠分二教文風遐布殊庭效柔服之誠武烈光宣異俗稟雪霜之令蓬宮奈苑咸遂興修寰區瞻禮樂之容夷夏識元緇之訓功侔太古美冠前王去冬以丈人觀置立年深堂廡凋壞命高僧而制度賜物力以興隆於是運石他山伐材幽谷楩楠入用剞劂程能俄成大壯之功克致齊天之固虛簷瞰日廣砌橫空雲拂危梁風生疏牖垣墉不改圖畫如新截岡阜而豁庭除闢溝源而護階磴衝流莫及迸石難侵遙符睿聖之慈顯比殊常之績集奇功於不朽增聖壽於無疆臣叨列元關夙深皇澤唯虔焚炷上答休明不任臣某伏奉宣旨以青城山丈人觀新殿功畢修醮安謝者伏以陛下仁周海嶽澤溥儒元翹屬靈山垂恩仙觀殿宇之凋摧既久教門之興葺無由詔命真僧頒宣國力宏麗有疑於化出巍峩遽比於神功鎮彼福城與天齊永臣獲承睿奬虔啓醮壇嚴香燭以焚修遍真靈而告謝霞峯雲壑如聆萬嵗之音玉歷金符更廣千椿之壽以今月二十三日設醮訖却回謹詣閣門奉表起居以聞臣某言伏覩今日趙匡業所奏合州江上得神劍一口宣示中外者伏以將啓升平祥符必降欲清凶孽神劍斯呈助聖明斬斷之功表矢地匡扶之力伏惟陛下功超三五威肅寰瀛仁格幽明道均天地故得山川林谷吐金焰於層崖風雨雷霆見霜鋒於萬里一條秋水初觀出地之姿數尺練光宛耀倚天之勢微彰變化顯著神功昔嬴帝得之於水心果吞六合今陛下獲之於江上即統萬方刜鐘切玉者詎可比倫斬馬斷蛇者那堪儔擬臣榮逢昌運獲覩殊祥輒貢詠歌願揚睿感謹課頌聖德七言四韻詩一首陳進干免宸嚴無任之至臣某伏覩敕旨劉知俊以凶橫異常已誅戮訖者罪惡貫盈神人共憤永符聖斷克正嚴誅臣某誠抃誠快頓首頓首伏惟劉知俊性惟凶狡器本凡庸有貪狠苟且之心無報德懷恩之志頃思危迫歸我大朝顯敷雨露之慈旋受節麾之寄委之非次待以不疑更隆推轂之恩特付專征之任而咆哮自恣殘忍為懷屠害黎元罔遵刑憲隳大國撫柔之旨辜聖朝弔伐之仁既負鴻慈難逃顯戮伏惟陛下恩宏天地仁冠堯湯體至道以好生布春和而煦物夷蠻戎狄皆知慈育之深日月星辰共鑒包荒之廣而知俊獨違聖造肆用淫刑致遐徼之未通阻四方之向化今則雷霆震令斧鉞興誅使暜天率土之人荷去惡除凶之德克昌祚歷永福生靈臣等獲覩宸威無任欣躍快忭之至臣某伏覩卭州團練使張敬周奏大邑縣鶴鳴化元一大師郭昭美申當化有古柏樹內有七株枯已多年今再生枝葉鬱茂異常州司差人覆驗有實者仙山表貺嘉樹呈祥符睿德之感通彰神功之茂育臣某誠歡誠抃頓首頓首臣按瑞圖云帝王德及草木政致升平則松柏常生木有禎異伏惟陛下膺圖啓運握紀承天修文化而服遐荒耀武威而平九有恩周草木惠及蚔蝝窮蕃解辮以歸仁獷俗梯山而納賮由是涵濡異類感動殊恩雪兔霜禽棲翔接影應龍神蔡表見為常今者玉洞雲峯靈墟古化當炎漢建平之際乃天師修道之鄉林麓森疏煙霞熻赩蒼崖蘚織淩雲之轍跡猶存翠墠莎封化鶴之壇基尚在而巖前古柏枯朽多年霑雨露以重榮吐荑芽而再茂喬柯裊翠密葉凝陰彼王廙之豫章難偕茂盛雖瀨鄉之仙檜莫繼禎祥惟七柏之興榮契卜年之遐永祥編瑞牒古昔無倫臣獲奉昌期頻聆嘉瑞敢陳謠詠願播寰瀛謹課頌聖德七言四韻詩一首陳進稱賀以聞臣某伏以西域天竺僧到闕朝覲者天慈遐被異域懷歸致萬里之番僧朝千年之聖主華夷率化億兆同歡臣中賀伏惟陛下繼聖統天體元立極惠周覆載仁匝寰區戎蠻夷狄之鄉皆遵聲教舜禹商周之德莫繼欽明由是賝賮川馳梯航霧集貢無虛月史不絶書今者天竺遠戎蔥山敻俗在積雪流沙之外比蜂岑鹿島之間遙望干霄之雲遂起朝天之意言須重譯路想經年崎嶇不憚於窮荒匍匐願瞻於舜日雖圖澄入夏祇辭于闐之東羅什依秦亦自龜茲之北校其迢遞亦驗專勤緬惟臣子之心允自聖明之感永編國史克廣聖功臣獲奉天光不任臣某伏以九曲澄瀾二儀交泰星渚表流虹之應斗樞開飛電之祥瑞叶千年歡周萬國伏惟陛下握符受命端扆承天宏至道而繼三皇敷上德而超五帝化覃海嶽恩暜華夷辮髮氊裘常修職貢四荒八極畢贄賝珍平六府而天降殊祥洞三泉而地呈嘉貺莫不書披玉篆波躍金鱗獸顯霜姿禽飄雪翅芝英菌蠢膏露葳蕤靈仙時見於煙巖貞檜重榮於雲谷瓊儲嵗稔寶貨川臻無向隅不獲之夫有比屋可封之俗故得遐方慕聖異域歸庭鼓舞翹誠歡呼率化桑乾瀚海僧法靜則稽首朝天身毒罽賓三滿多則傾心入貢皆瞻北極共祝南山今屬日麗九芒風和八景壽春大節誕聖昌辰輒繪真容願崇睿福臣某與當院道衆起今月一日開置靈寶延壽道場七晝夜香燭蠲潔焚誦精虔冀憑妙道之功永祝無疆之壽前件畫像及功德疏一通謹輒陳進干冒宸聰無任臣某伏奉敕恩賜陽平山主呂延昌紫衣仍補充內殿焚修大德者恩垂霄漢榮及巖林草木增輝煙霞動彩凡茲簪褐共感休明臣某中謝伏惟皇帝陛下惟睿開圖握符御宇仁覃九土咸臻禎昱之私政布八荒已洽雍熙之化由是㣥方述職重譯賓庭屬祝聖之昌辰標壽春之大節布鴻私於二教灑皇澤於萬區呂延昌久處煙蘿深精藥餌方專心於葺理敢企望於寵榮豈謂陛下念切勳臣獎深術學以呂延昌醫方著效致服彥諲危疾蠲除迥降隆恩顯頒命服霓裳象難勝天地之私暮燭朝香誓答聖明之照臣某與道衆等不任臣某伏覩西天三滿多到闕朝對者伏以北通玉塞西渡金河路出重關程逾萬里班定遠之經歷才及烏孫張博望之訪尋祇過青海或蛇州魅磧人跡莫窮或飛雪流沙馬蹄難至由是聲教或異職貢少修崑嶠白環首標瑞典鐘山火玉顯謂祥珍况身毒居蔥嶺之陰于闐隔雪峯之外天竺遼敻跋涉辛勤慕中華億兆之尊嚮大蜀聖明之主專申朝覲實美編伏惟陛下縱聖體乾膺圖啓運德逾羲頊仁冠堯湯修文德而御要荒耀武功而安寰海故得四夷率服萬㝢知歸南通交趾之鄉北聚穹廬之俗獻琛奉贄無曠嵗時竊惟聽政之餘每降自天之澤興宏道釋勸奬崇修寶剎精嚴道功煥麗一心齊致二教俱榮紫霞洞之仙客效祥天竺國之胡僧入貢咸歸睿感共福皇圖率土巨僚同深抃蹈臣某芝田末學蓬岫孤蹤獲奉天慈俯宣明命謹課頌聖德七言詩二十韻一首陳進冒黷宸嚴無任兢懼戰越之至臣某伏覩降制封資王忠王者絲綸顯降典禮昭行宗社貽休寰區增抃中賀伏惟皇帝陛下仁推立愛道慕篤親增玉歷於延洪固瑤枝於遠大鳳書錫命麟趾增華浮喜氣於絳霄集榮光於朱邸巨歡逢聖運仰覩威儀不任臣某伏覩恩敕大內新殿成賜名天錫殿者鼎新正寢光錫嘉名中外榮瞻華夷增抃臣中賀伏惟皇帝陛下承樞啓運握斗垂衣包九土以君臨闢四門以敦睦法天構宇隆帝宅於上京括地開基壯皇居於億世由是前羅象闕遐敞龍庭總日月之貞華高嚴秀闥集星辰之瑞彩廣啓文軒巍峩壓參井之墟岌嶪應氐房之狀莫不嶽靈飛磶川后貢材人以子來功資神助雖鎬宮魯殿直瑣細以難儔漢闕周堂固尋常而莫竝功云告畢寶額爰新顯神授於上元以符天錫耀宏圖於八極永播聖功臨海嶽而閲琛珍會諸侯而朝萬國將陳大禮以福㣥方叶神明贊助之期廣天地遐長之壽臣某榮逢聖日仰覩神功不任臣某言伏審昨日已來聖體頓就安愈臣某誠歡誠躍頓首頓首伏惟皇帝陛下深仁御宇至道垂裳惠匝萬區恩周品物晝乾夕惕焦勞而腠理愆和旱食宵衣憂軫而寒暄爽候今則神明幽贊川嶽效靈清廟貽祥元穹降福克安聖寢彌增兩耀之輝廣納洪休益永萬年之壽華夷抃悅億兆歡呼臣某日旬以來目疾未減不獲趨馳玉闕蹈舞天階瞻望煙霄不任臣某言伏審聖體日就痊平中外臣寮咸增踴躍臣某誠歡誠抃頓首頓首臣聞五緯經躔尚有差其行度四時運動猶或爽於慘舒雖寒暑之乖宜蓋陰陽之常數伏惟皇帝陛下順時設教以德臨人萬幾每繫於宸襟六氣稍違於聖體今則神靈叶贊宗廟垂祥廣集天休頓安聖寢足嗣唐堯之一統永延周帝之遐齡頒賞賜於醫功恩流內帑鼓疑呼於品物聲震層霄臣昨自三月已來偶縈疾苦不獲隨例舞蹈堯階無任歡呼屏營之至臣某言今日伏奉恩旨以臣今月十一日上表稱賀聖體痊復事賜手詔奬飭者絳闕流恩紫泥頒寵仰承天造俯慰凡庸臣某誠榮誠恐頓首頓首竊以臣叨從疏野幸列班行雖焚修每祝於龍圖而旦夕合趨於鳳闕洎嬰疾苦稍曠朝天昨日以皇帝陛下庶政懷勞萬幾關念偶致違裕尋就痊和是以臣稽首歡呼飛章稱賀實簪裳之素分乃周列之常儀豈謂皇慈曲頒紫詔臣謹已焚香跪受訖無任瞻天荷聖激切屏營之至臣某言今日伏奉聖旨以臣自前月二十一日就當院集在觀道衆老宿等於三清壇上為皇帝陛下開置靈寶消災轉經禮念道場伏蒙宣賜錢二十貫文省除者伏以中朝錫寵內庫頒財仰奉天慈倍銘凡懇臣中謝伏以叨為教主深受國恩凡日焚修皆歸職分豈期聖造仍降寵私仰天上之龍顏已增感聖捧禁中之鵝眼更切祝堯其所賜錢臣已依數跪受俵給道衆訖臣與道衆等無任感恩激切屏營之至臣某言伏審今日皇嗣寶位光御洪圖率土歡呼暜天欣戴臣中賀臣聞成王嗣位舉千載之徽猷舜帝繼明為百王之茂典上膺天命下契人情伏惟皇帝陛下道比成湯仁同大禹德宜符於五緯運潛契於二儀是以克紹宗祧光升寶位鼎祚彰惟新之命洪基顯隆永之期即使車書混同夷夏清泰九土有歸山之馬四溟無橫海之鯨克振皇綱永安大業臣叨榮昌運獲列簪裳仰馳捧日之心雖同鼇抃俯抱臥漳之恨莫遂鳧趨臣無任瞻天望聖踴躍屏營之至臣某言今日皇帝御殿宣降德音者臣聞聖德法天應候每行於亭育神功體道順時克布於生成莫不澤被九黎惠敷萬國凡居覆載咸動歡呼臣某中賀伏惟皇帝陛下宅據寰中日臨天下克儉而茅茨不翦棲神而金鏡高懸是以鴈塞窮荒雲奔玉帛雞林絶域霧集梯航運在無為俗欣有道今則暜宣德教克順正陽安地表之遺黎高開壽域御天錫之新殿更扇薰風慰征役於藩方免逋懸於郡縣魅鄉遷客俱從釋宥之恩囹圄縲囚盡舉寬明之典式因三赦將俟一同臣伏恨疾瘵所縈不獲隨例蹈舞玉階無任歡呼踴躍屏營之至臣某言今日皇帝御殿宣降德音者雷雨作解渥澤滂流溥九土以無遺致㣥生之咸泰華夷億兆孰不歡呼臣某中賀伏惟皇帝陛下嗣聖繼明握圖御宇蒸蒸大孝同漢惠以承祧翼翼小心比周王之纂極文懷遠俗武戢遐荒膺乾而化洽無垠出震而仁周有截今則凝旒御宇正殿宣恩安地表之黎元高躋壽域灑中天之德澤更扇薰風憫征戍之勤勞釋賦租之逋滯投荒遷旅囹圄縲囚俱從赦宥之私盡舉寬明之典騰歡聲於域外浮喜氣於雲間車軌書文佇歸一統瑤圖玉歷克保千春臣獲以衰遲躬逢睿聖方嬰疾疹不獲蹈舞堯階瞻戀天慈無任歡呼踴躍屏營之至
