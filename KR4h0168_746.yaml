body:
  text: 問朕聞古先哲王之理也元默無為端拱司契陶甿心以居簡凝日用於不宰立本以厚下推誠而建中繇是天人通陰陽和俗躋仁壽物無疵癘噫盛德之所臻敻乎其莫可及已三代令王質文迭救而巧偽滋熾風流寖微自漢魏已降足徵益寡朕顧昧理道祇荷丕構奉若謨訓不敢荒寧任賢惕厲宵衣旰食詎追三五之遐軌庶紹祖宗之鴻緒而心有所未達行有所未孚由中及外闕政斯廣是以人不率化氣或堙厄災旱竟歲播植愆時國廩罕蓄乏九年之儲吏道多端微三載之績京師諸夏之本也將以觀理而豪猾踰檢大學明教化之源也期於宣化而生徒多惰業列郡在乎頒條而干禁或未絕百工在乎按度而巧或未衰俗隳風靡積訛成蠹其擇官濟理也聽人以言則枝葉難辨御下以法則恥格不形其阜財發號也生之寡而食之眾煩於令而鮮於理思欲究此繆盭致之治平茲心浩然若涉泉水故前詔有司博延㣥彥佇啟宿懵冀臻時雍子大夫皆識達古今志在康濟造庭待問副朕虛懷必當箴主之闕辨政之疵明綱條之所紊稽庶富之所急何術斯革於前弊何澤斯惠於下土何施而理古可近何道而和氣可充推之本源著於條對至若夷吾輕重之權孰輔於理嚴尤底定之策孰叶於時元凱之考課何先叔子之克平何務推此龜鑑擇乎中庸期在洽聞朕將親覽對褐衣小臣蕡沐浴齋戒伏於彤庭之下謹頓首上言皇帝陛下臣誠不佞有匡國致君之術無位而不得行有犯顏敢諫之心無路而不得達但懷憤抑木缶木冖思有時而一發耳常欲與庶人議於道商旅謗於市得通上聽一悟主心雖被妖言之罪無所悔焉况逢陛下以至德嗣興以大明垂照詢求過闕咨訪謨猷下制中外舉能直言極諫者臣既辱斯舉專承大問敢不悉意以言至於上之所忌時之所禁權幸之所諱惡有司之所予奪臣愚不識伏惟陛下少加優容不使聖朝有讜直而受戮者乃天下之幸也非臣之所望也謹昧死以對伏以聖策有思先古之理念元默之化將欲通天人以濟俗和陰陽以煦物見陛下慕道之深也臣以為哲王之理其則不遠惟陛下致之之道何如耳伏以聖策有祇荷丕構而不敢荒寧奉若謨訓而罔有怠忽見陛下憂勞之至也若夫任賢惕厲宵衣旰食宜黜左右之纎佞進股肱之大臣若夫追蹤三五紹復祖宗宜鑒前古之興亡明當時之成敗心有所未達以下情蔽而不得上通行有所未孚以上澤壅而不能下達欲俗之化也在修已以先之欲氣之和也在遂性以道之救災旱在致乎精誠廣播植在視乎食力國廩罕蓄本乎冗食尚繁吏道多端本乎選用失當豪猾踰檢由中外之法殊生徒惰業由學校之官廢列郡干禁由授任非人百工淫巧由制度不立伏以聖策有擇官濟治之心阜財發號之嘆見陛下教化之本也且進人以行則枝葉安有難辨乎防下以禮則恥格安有不形乎念生寡而食眾則可罷斥惰游念令煩而理鮮要在察其行否博延㣥彥願陛下必納其言造廷待問則小臣其敢愛死伏以聖策有求賢箴闕之言審政辨疵之令見陛下咨訪之心勤也遂小臣屏奸豪之志則弊革於前守陛下念康濟之言則惠敷於下邪正之道分而治古可近禮樂之方著而和氣克充至若夷吾之法非皇王之權嚴尤所陳無最上之策元凱之所先不若唐堯考績叔子之所務不若虞舜舞干且俱非大德之中庸未可為上聖之龜鑑又何足為陛下道之哉或有以繫安危之機兆存亡之變者臣請披瀝肝膽為陛下別白而重言之臣前所言哲王之理其則不遠者在陛下慎思之力行之始終不懈而已臣謹按春秋元者氣之始也春者歲之始也春秋以元加於歲以春加於正明王者當奉若天道以謹其始也又舉時以終歲舉月以終時春秋雖無事必書首月以存時明王者當奉若天道以謹其終也王者動作始終必法於天者以其運行不息也陛下既能謹其始又能謹其終懋而修之勤而行之則可以執契而居簡無為而不宰矣廣立本之大業崇建中之盛德矣又安有三代循環之弊而為巧偽滋熾之漸乎臣故曰惟陛下致之之道何如耳臣前所謂若夫任賢惕厲宵衣旰食宜黜左右之纎佞進股肱之大臣實以陛下誠憂勞之至也臣聞不宜憂而憂者國必衰宜憂而不憂者國必危今陛下不以家國存亡之計社稷安危之策而降於清問臣未知陛下以為布衣之臣不足與定大計耶或萬幾之勤而聖慮有所未至也不然何宜憂者而不先憂乎臣以為陛下之所慮者宜先憂宮闈將變社稷將危天下將傾海內將亂此四者乃國家已然之兆故臣謂聖慮宜先及之夫帝業既艱難而成之胡可容易而守之昔太祖肇其基高祖勤其績太宗定其業元宗繼其明至於陛下二百有餘載矣其間明聖相因擾亂繼作未有不委用賢士親近正人而能紹興徽烈者也或一日不念則顛覆大器宗廟之恥萬古為恨臣謹按春秋人君之道在體元以居正昔董仲舒為漢武帝言之略矣其所未盡者臣得為陛下備而陳之夫繼故必書即位所以正其始也終必書所終之地所以正其終也故君者所發必正言所履必正道所居必正位所近必正人臣又按春秋閽寺弒吳子餘祭書其名春秋譏其疎遠賢士昵近刑人有不君之道矣伏惟陛下思祖宗開國之勤念春秋繼故之戒將明法度之端則發正言而履正道將杜篡弒之漸則居正位而近正人遠刀鋸之殘親骨鯁之直輔臣得以專其任庶寮得以守其官柰何以褻近五六人總天下之大政外專陛下之命內竊陛下之權威攝朝廷勢傾海內㣥臣莫敢指其狀天子不得制其心禍稔蕭牆奸生帷幄臣恐曹節侯覽復生於今日矣此宮闈之所以將變也臣謹按春秋魯定公元年春王不書正月者春秋以為先君不得正其終則後君不得正其始故曰定無正也今忠賢無腹心之寄閽寺專廢立之權陷先帝不得正其終致陛下不得正其始况皇儲未建郊祀未修將相之職不歸名分之宜不定此社稷之所以將危也臣謹按春秋王札子殺召伯毛伯春秋之義兩下相殺不書而此書者重其尊王命也夫天之所授者在君君之所操者在命操其命而失之者是不君也侵其命而專之者是不臣也君不君臣不臣此天下所以將傾也臣謹按春秋晉趙鞅以晉陽之兵叛入於晉書其歸者以其能逐君側之惡人以安其君故春秋善之今威柄陵夷藩臣跋扈或有不達人臣之節首亂者以安君為名不究春秋之微稱兵者以逐惡為義則政刑不由乎天子征伐必自於諸侯此海內所以將亂也故樊噲排闥而雪涕袁盎當車以抗詞京房發憤以殞身竇武不顧而畢命此陛下皆明知之耳臣謹按春秋晉狐射姑殺陽處父書襄公殺之者以其君漏言也襄公不能固陰重之機處父所以及戕賊之禍故春秋非之夫上漏其情則下不敢盡意上洩其事則下不敢盡言故傳有造膝詭詞之文易有失身害成之戒今公卿大臣非不欲為陛下言之慮陛下必不能用之陛下既忽之而不用必洩其言臣下既言之而不行必嬰其禍適足以鉗直臣之口而重奸臣之威是以欲盡其言則有失身之懼欲盡其意則有害成之憂故低徊鬱塞以俟陛下感悟然後盡其啟沃耳陛下何不以聽朝之餘明御便殿召當時賢相與舊德老臣訪持變安危之謀求定傾救亂之術塞陰邪之路屏褻狎之臣制侵陵迫脇之心復門戶掃除之役戒其所宜戒憂其所宜憂既不得理於前當理於後不得正其始當正其終則可以虔奉典謨克承丕構終任賢之效無旰食之憂矣臣前所謂若夫追蹤三五紹復祖宗宜鑒前古之興亡明當時之成敗者臣聞堯舜之為君而天下大理者以其能任九官四岳十二牧不失其舉不二其業不侵其職居官惟其能左右惟其賢元凱在下雖微而必舉四凶在朝雖強而必誅考其安危明其取舍至秦之二代漢之元成咸願措國如唐虞致身如堯舜而終敗亡者以其不見安危之機不明取舍之道不任大臣不辨奸人不親忠良不遠讒佞伏願陛下察唐虞之所以興而景行於前鑒秦漢之所以亡而戒懼於後陛下無謂廟堂無賢相庶官無賢士今綱紀未絕典刑猶在人誰不欲致身為王臣致時為昇平陛下何忽而不用之邪又有居官非其能左右非其賢其惡如四凶其詐如趙高其奸如恭顯者陛下又何憚而不去之邪神器固有歸天命固有分祖宗固有靈忠臣固有心陛下其念之哉昔秦之亡也失於強暴漢之亡也失於微弱強暴則賊臣畏死而害上微弱則姦臣擅權而震主臣伏見敬宗皇帝不虞亡秦之禍不剪其萌伏惟陛下深軫亡漢之憂以杜其漸則祖宗之鴻緒可紹三五之遐軌可追矣臣前所謂陛下心有所未達以下情塞而不得上通行有所未孚以上澤壅而不得下浹者且百姓有塗炭之苦陛下無由而知則陛下有子惠之心百姓無由而信臣謹按春秋書梁亡不書取者梁自亡也以其思慮昏而耳目塞上出惡政人為寇盜皆不知其所以然以其自取滅亡也臣聞國君之所以尊者重其社稷也社稷之所以重者存其百姓也苟百姓之不存則雖社稷不得固其重苟社稷不重則雖國君不得保其尊故理天下者不可不知百姓之情也夫百姓者陛下之赤子陛下宜命慈仁者親之育之如保傅焉如乳哺焉如師之教導焉故人之於上也敬之如神明愛之如父母今或不然陛下親近貴倖分曹建署補除卒吏召致賓客因其貨賄假其氣勢大者統藩方小者為牧守居上無清惠之政而有饕餮之害居下無忠誠之節而有奸欺之罪故人之於上也畏之如豺狼惡之如讐敵今四海困窮處處流散饑者不得食寒者不得衣鰥寡孤獨者不得存老幼疾病者不得養加以國權兵柄專在左右貪臣聚斂以固寵奸吏夤緣而弄法寃痛之聲上達於九天下入於九泉鬼神為之怨怒陰陽為之愆錯君門九重而不得告訢士人無所歸化百姓無所歸命官亂人貧盜賊並起土崩之勢憂在旦夕即不幸因之以師旅繼之以凶荒臣以謂陳勝吳廣不獨生於秦赤眉黃巾不獨生於漢臣所以為陛下發憤扼腕痛心泣血也如此則百姓有塗炭之苦陛下何由而知之乎有子惠之心百姓安得而信之乎致使陛下行有所未孚心有所未達者固其然也臣聞昔漢元帝即位之初更制七十餘事其心甚誠其稱甚美然紀綱日紊國祚日衰奸兇日強黎元日困者以其不能擇賢明而任之失其操柄也自陛下御宇憂勤兆庶屢降德音四海之內莫不抗首而長息自喜復生於死亡之中也伏願陛下慎終如始以塞萬方之望誠宜揭國權以歸其相持兵柄以歸其將去貪臣聚斂之政除奸吏夤緣之害惟忠賢是近惟正直是用內寵便辟無所聽焉選清慎之官擇仁惠之長毓之以利煦之以和教之以孝慈導之以德義去耳目之塞通上下之情俾萬國歡康兆人蘇息則心無所不達而信無所不孚矣臣所言欲人之化也在修己以先之者臣聞德以修己教以導人修己也則人不勸而自至導人也則人敦行而率從是以君子欲政之必行也故以身先之欲人之從化也故以道御之今陛下先之以身而政未必行御之以道而人未從化豈不以立教之旨未盡其方耶夫立教之方在乎君以明制之臣以忠行之君以知人為明臣以匡時為忠知人則任賢而去邪匡時則固本而守法賢不任則重賞不足以勸善邪不去則嚴刑不足以禁非本不固則人流法不守則政散而欲教之使必至化之使必行不可得也陛下能斥奸邪不私其左右舉賢正不遺其疎遠則化洽於朝廷矣愛人以敦本分職而奉法修其身以及其人始於中而成於外則化行於天下矣臣前所謂欲氣之和也在遂性以導之者當納人於仁壽也夫欲人之仁壽也在乎立制度修教化夫制度立則財用省財用省則賦斂輕賦斂輕則人富矣教化修則爭競息爭競息則刑罰清刑罰清則人安矣既富則仁義興焉既安則壽考生焉仁壽之心感於下和平之氣應於上故災害不作休祥薦臻四方底寧萬物咸遂矣臣前所言救災旱在致乎精誠者臣謹按春秋魯僖公一年之中三書不雨者以其人君有恤人之志也魯文公三年之中一書不雨者以其人君無恤人之心也故僖致精誠而不害物文無憫恤而變成災陛下誠能有恤人之心則無成災之變矣臣前所言廣播植在視乎食力者臣謹按春秋君人者必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢今財食與人力皆勤矣願陛下廢百事之用以廣三時之務則播植不愆矣臣前所謂國廩罕蓄本乎冗食尚繁者臣謹按春秋臧孫辰告糴於齊春秋譏其國無九年之蓄一年不登而百姓饑臣願斥游惰之徒以督其耕植省不急之務以贍其黎元則廩蓄不乏矣臣前所言吏道多端本乎選用失當者由國家取人不盡其材任人不明其要故也今陛下之用人也求其聲而不求其實故人之趨進也務其末而不務其本臣願覈考課之實定遷序之制則多端之吏道息矣臣前所言豪猾踰檢由中外之法殊者以其官禁不一也臣謹按春秋齊桓公盟諸侯不書日而葵邱之盟特以日者美其能宣天子之禁率奉王官之法故春秋備而書之夫官者五帝三王之所建也法者高祖太宗之所制也法宜畫一官宜正名今又分外官中官之員立南司北司之局或犯禁於南則亡命於北或正刑於外則破律於中法出多門人無所措實由兵農勢異而中外法殊也臣聞古者因井田以制軍職間農事以修武備提封約卒乘之數命將在公卿之列故兵農一致而文武同方可以保乂邦家式遏亂略暨太宗皇帝肇建邦典亦置府兵臺省軍衛文武參掌居閑歲則櫜弓力穡將有事則釋耒荷戈所以修復古制不廢舊物今則不然夏官不知兵籍止於奉朝請大將不主兵事止於養勳階軍容合中官之政戎律附內臣之職首一戴武弁嫉文職如仇讎足一蹈軍門視農夫如草芥謀不足以剪除奸兇而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵軼里閭覊紲藩臣干陵宰輔隳裂王度汨亂朝經張武夫之威上以制君父假天子之命下以馭英豪有藏奸觀釁之心無仗節死難之義豈先王經文緯武之旨耶臣願陛下貫文武之道均兵農之功正貴賤之名一中外之法還軍伍之職修省署之官近崇貞觀之規遠復成周之制自邦畿以刑於萬國始天子而達於諸侯則可以制豪猾之強而無踰檢之患矣臣前所言生徒惰業由學校之官廢者葢以國家貴其祿而賤其能先其事而後其行故庶官乏通經之學諸生無修業之心矣臣前所言列郡干禁由授任非人者臣以為刺史之任理亂之根本繫焉朝廷之法制在焉權可以抑豪猾恩可以惠孤寡強可以禦奸寇政可以移風俗其將校有曾經戰陣及功臣子弟各請隨宜酧賞如無理人之術者不當任此官則絕干禁之患矣臣前所言百工淫巧由制度不立者臣請以官位祿秩制其器用車服禁以金銀珠玉錦繡雕鏤不蓄於私室則無蕩心之巧矣臣前所言辨枝葉者在考言以詢行也臣前所言形於恥格者在道德而齊禮也臣前所謂念生寡而食眾可罷斥游惰者已備之於前矣臣前所謂令煩而理鮮要在察其行否者臣聞號令者乃理國之具也君審而出之臣奉而行之或虧益止畱罪在不赦今陛下令煩而理鮮得非持之者為所蔽欺乎臣前所言博延㣥彥願陛下必納其言造庭待問則小臣豈敢愛死者臣聞晁錯為漢晝削諸侯之策非不知其禍之將至也忠臣之心壯夫之節苟利社稷死無悔焉今臣非不知言發而禍應計行而身戮蓋所以痛社稷之危哀生人之困豈忍姑息時忌竊陛下一命之寵哉昔龍逢死而啟殷比干死而啟周韓非死而啟漢陳蕃死而啟魏今臣之來也有司或不敢薦臣之言陛下又無以察臣之心退必受戮於權臣之手臣幸得從四子遊於地下固臣之願也所不知殺臣者臣死之後將孰為啟之哉至於人主之闕政教之疵前日之弊臣既言之矣若乃流下土之惠修近古之治而致和平者在陛下行之而已然上之所陳者實以臣親承聖問敢不條對雖臣之愚以為未及教化之大端皇王之要道伏惟陛下事天地以教人敬奉宗廟以教人孝養高年以教人悌育百姓以教人慈調元氣以煦育扇太和於仁壽可以逍遙而無為端拱而成化至若念陶鈞之道在擇宰相而任之使權造化之柄念保定之功在擇將帥而任之使修閫外之寄念百度之求正在擇庶官而任之使專職業之守念萬姓之愁痛在擇長吏而任之使明惠養之術自然言足以為天下教動足以為天下法仁足以勸善義足以禁非又何必宵衣旰食勞神惕慮然後以致其理哉謹對孜字好學亳州譙人寶歷二年進士累遷尚書右丞守戶部侍郎轉兵部領諸道鹽鐵轉運使懿宗朝以本官同平章事封譙郡侯罷為西川節度使召拜左僕射復輔政進司空出為河中節度使以太子少保分司東都卒維大中十三年歲次己卯九月癸丑朔二十七日己卯嗣皇帝臣伏惟先太后體貞明以合天本懿粹而象地發秀於外含章在中由㯋川以表祥配沙麓而比德塗山佐夏莘野興商潛耀空蘊於方祇秘景莫觀於圓魄卓爾潔操穆然凝輝欲報之德昊天罔極臣猥以冲昧獲奉宗祧怵惕哀㷀慮墜大寶而天意允若人心克諧惟獲永圖懼乖末命退省蒙固上感劬勞繫鏡無塵賜衣有篋宸儀雖閟慈旨長存莫追蘭殿之晨昏空感椒塗之霜露言成陰教行著國章逮事靡及於循陔終吉徒哀於陟屺敢舉追崇之典寧申顧復之思伏惟舉位以定名考諡以尊德所以揚茂烈傳休聲率由舊章竊擬素範今禮官詳議庶僚稱贊備陳徽數克播令猷正位號於瑤齋森禮容於金戺母儀無斁廟貌有嚴將享鴻休式憑元祐謹遣攝太尉門下侍郎兼兵部尚書平章事蕭鄴奉冊上尊諡曰元昭皇太后伏惟明靈昭格俯鑒精誠時已逝而敬在六衣夜不陽而禮存三獻惟是薦享與唐無疆嗚呼哀哉謹言鹽鐵戶部生積欠當使咸通四年以前延資庫錢絹三百六十九萬餘貫匹內戶部每年合送錢二十六萬四千一百八十貫匹從大中十二年至咸通四年九月已前除納外欠一百五十萬五千七百一十四萬貫匹當使緣戶部積欠數多先具申奏請於諸道州府場監院合納戶部所收八十文除陌錢內割一十五文屬當使自收管勑命雖行送納稽緩今得戶部迭稱所收管除陌錢絹外更有諸雜物貨延資庫徵收不便請起今年合納延資庫錢絹一時便足其已前積欠候物力稍充積漸填納其所割一十五文錢即當司仍舊收管又緣累歲以來嶺南用兵多支戶部錢物當使不欲堅論舊欠請依戶部商量合納今年一年額色銀絹須足明年即依舊制三月九月兩限送納畢其已前積欠仍令戶部自立填納期限者三復潤州句容人大和中為員外郎累遷御史中丞會昌中拜刑部侍郎宏文館學士卒劉從諫包藏逆謀比雖已露今推窮僕妾尤得事情據其圖謀語言制度服物人臣僭亂一至於斯雖生前幸免於顯誅而死後已從於追戮凡在朝野同深慶快且自古人臣叛逆合有三族之誅尚書曰乃有顛越不恭我則劓殄滅之無遺育無俾易種於茲新邑如此則阿裴已不得免於極法矣又况從諫死後主張狂謀罪狀非一劉稹年既幼小逆節未深裴為母氏固宜誡誘若廣說忠孝之道深陳禍福之源必冀虺毒不施梟音全革而乃激厲凶黨膠固叛心廣招將校之妻適有酒食之宴號哭激其眾意贈遺結其㣥情遂使叛黨稽不捨之誅孽童延必死之命以至周歲方就誅夷此阿裴之罪也雖以裴問之功或希減等而國家有法難議從輕伏以管叔周公之親弟也有罪而且誅之以周公之賢尚不捨兄弟之罪况裴問之功効安能破朝廷法耶據阿裴廢臣妾之道懷逆亂之謀裴問如周公之功尚行周公之戮况於朝典固在不疑阿裴請準法諸侯之升壇胙土服天子休命者有弓矢鈇鉞之賜生殺刑賞之柄其為任也葢重矣其受脤之日秉節者得以王命傳信俾先啟行至則考善地庇豐屋麾斾以翼之歌鐘以樂之非征伐宴犒申威行令未嘗出此其大端也是鎮股臂梁洛咽喉齊魏其氣強以勁其人勇而忠我連帥贊皇公以全才上略標柄中外輟為霖於將命膺作翰之攸寄歲值己酉擁旄來斯公以明誠報一人以大信示三軍膏潤慈惠風馳教化未洽旬日㣥甿愛戴纔越月而五校訓齊及踰年也則鰥惸咸樂業豪奪不敢犯戰備具而軍聲振矣顧謂幕吏曰君之寵授偉此瑞節所處不嚴人何以瞻于是建宏規模大壯去屑密圖宏廠隥道迴廊繚其下翬飛鱗葺攢其上孑孑然倚靜深而相合渠渠然拂埃而孤峙隣牆藩而儷公署實轅門之蘊抑外閫之雄歟舉事必書春秋之義繇是秉筆硯於公之門者承命纂述謹誌於堂陰蘧大中朝為懷孟觀察使從事試大理評事兼監察御史擢金部員外郎蘧舅氏扶風公貞元四年秋八月與太原王武陵吳郡朱宿同遊惠山精舍為賦往體詩一首王序而題之觀其詞頗有世外之交出塵之想凝思澹慮泛溢天格雖建安才人不足居其右矣後二十年復繼於末則有傷時歎逝之感宿草隣笛之悲洎會昌初武皇帝隳浮圖法詔毀其宮而逐其徒惠山在毀中時無好事者詩亦隨塵焉今寺既復而詩尚遺落內弟審餘寓書請於蘧會蘧赴河陽辟召路出寺下因重記於軒廊南垣我舅氏由吏部拜執法器業磊落為時巨人平生操尚備在國史此不能舉所載者風韻之詞登臨之興俾後人挹其清芬而已大中十一年五月十三日懷孟等觀察使從事試大理評事兼監察御史李蘧重題彥芳衛國公贈司徒靖五代孫太和中為鳳翔司錄參軍王子垂訓導於門子戒驕盈於代祿厲師嚴以成教誨敷樂德而宣化育長能從以可久幼能正以不黷悅之以道寧假乎干戚羽旄動之斯和詎資乎匏土革木是知深於樂者豈徒然哉暢生成於壽域導純粹於靈臺明明而六德是以蕩蕩而㣥心有開瞻之在前佇將成於國棟由是而選庶有嗣於鄉材登於雋造釋其奸回聆音乃接武而至樂善而差肩載來且於中者表得中而可尊和者達至和而不紊繄吾道之克廣諒乃心之是訓青衿選其悅學絳帳資乎待問於以識琬玉之姿於以言始終之訓然則祇者敬也居敬足以修身彞者常也守常而能化人萃㣥生之濟濟達誘善以循循肅穆以居而文明有耀條暢斯及而樂教惟新然後以孝友俾其師資春秋則教夙夜惟寅宏廣博易良人胥效矣美父母兄弟誰能間之內必成性外無越思匪鏗鏘而感物咸敬順以親師異齊國之聞於宣父叶虞帝之命以后夔惟德音之是進豈奸聲之能混入於國學習者由是知歸祭於瞽宗享者於焉報本至哉聖人之設教良終古而無損子駿文宗朝官滁州長史滁州長史盧子駿太和六年十一月十七日自南譙抵鍾離謁太守彭城劉公公以鯫生文苑之舊常無疵瑕歡好同昔年宴游無虛日因及開元佛寺指大乘經藏曰我召傭書人書寫也西墉有西方像焉我俾畫工圖形也鑿戶牖以為廟我命梓人庀事也厥功暨秋七月而畢先時公由廷尉評佐畫中書令田公於鎮州田令公將朝天子藉公上請事未訖而田令公遇害從事者皆死白刃毒流於妻孥亂兵相約曰評事國士也議帥前未嘗不忠遇吾儕未嘗不信安可負評事耶駭評事家者眾誅之由是良賤都無橫禍未幾天子震怒命將討賊鎮州阻絕公莫得知其家公曰吾孀姊依我少妻從我姊之子吾之子皆齒稚得脫虎口者非大聖相祐其可保全乎哉遂血淚橫下歸誠虔禱曰吾姊吾妻吾甥吾兒無恙而出寇境者則丹青極樂世界一鋪寫金剛般若波羅蜜經一千卷以酬焉不則吾終身不祿仕也明年公之長幼高下咸自賊中至君子曰劉公起諸生擅名文場為聖朝博士損益禮樂簪白筆瞻我衣冠者不犯居粉署大彌綸之功收濠梁著來蘇之謠履道坦夷濟物平施加以為弟之悌為夫之義為舅之惠為父之慈其在詩曰允矣君子展也大成公宜延洪我國家康濟乎兆庶有皇天之福祐靈祇之相助化危為安彌禍為福信修身飭行之報矣非祈佛之效也且徵之亂日公之同僚無一免者而公不在亂邦祈佛之辰公之同僚黨屬盡夷滅而公之家恬然無事可以明矣于公獄吏耳守法能平尚慶流後嗣矧公之於家也友愛如此於國也賢明如是鎮之狂寇其於公何而今公捐清俸鳩眾工毫相嚴備心法闡揚緘之以寶龕邃之以紺殿皇皇焉言言焉斯亦公不欺夙誠而欲復言也子駿辱公之遊于茲二紀熟公之懿範仰公之嘉猷因喜幽顯有答故刊石以祇命云太和六年十二月五日濠城刺史彭城劉茂復建客有自濠梁來者余訊之曰濠梁之政何如客曰今刺史彭城劉公始受命至徐方與廉使約曰詔條節度團練兵鎮巡內州者悉以隸州今濠州未如詔條請如詔條廉使多稱軍須卒迫徵科若干不如期以軍法從事皆兩稅勑額外也自今請非詔勑不徵廉使曰諾濠州每年率供武寧軍將士糧一十萬石斗取耗一升送廉使州自取一升給他費吏因緣而更盜則三倍矣自今請准倉部式外不入廉使曰諾劉公至止堅守不渝由是州無他門賦無橫斂人一知教熙熙然如登春臺矣濠在戰國時為楚地天文記今在牛斗分野楚俗好巫而信鬼死者其親戚不敢穿斸事葬相傳送小屋號曰殯宮焉雖在城郭而為之有土牛隳蠹棺櫬巍然者有棺櫬分圻骸骨縱橫者不獨庶人而士大夫之家有焉劉公惻然曰非禮也吾忍不導之邪下令曰某月有限限畢其家不闕地葬者笞二十鰥寡惸獨力不任者絕嗣無主傍無近親者刺史以俸錢為營之訖事人無犯令野無殯宮焉盧子曰異乎哉劉公今日能以禮導邦人且夫葬者藏也欲人之不得見也柰何夙昔濠之人不藏其父子昆弟耶又曰生事之以禮死葬之以禮柰何夙昔濠之人不以禮葬其父子昆弟耶又曰延陵季子葬其子仲尼觀之曰其坎深不至於泉其斂以時服柰何夙昔濠之人喪其父子昆弟不葬之於土中耶又曰魂氣歸於天形魄歸於地柰何夙昔濠之人不歸其父子昆弟之形於地邪今刺史彭城劉公教生者以禮示之日月信也恤死者以仁除其暴露義也合此而智以成之難乎哉余耳得客之言不浹旬適至濠上目覩其事秉筆者不載余懼夫識者譏焉劉公治郡嘉績長美詳舉則繁也亦取大遺小之義耳其書以備太史氏采錄焉
