front:
  text: 全唐文欽定全唐文卷七百三十二儋長慶中為鄜坊節度使
  hash: sha256:1591a7f1d2b24639b5e64819003f1476b8bdfbe37f7ceb7b8092c9bcef805f09
  markers:
  - {type: head, offset: 14, content: 趙儋, id: KR4h0168_NFKB_732-h1, level: 1}
body:
  text: 公諱子昂字伯玉梓州射洪縣人也其先居於潁川五世祖方慶好道得墨子五行祕書白虎七變隱於郡武東山子孫因家焉生高祖湯湯為郡主簿湯生曾祖通通早卒生祖辨為郡豪傑辨生元敬瑰偉倜儻弱冠以豪俠聞屬鄉人阻飢一朝散粟萬斛以賑貧者而不求報年二十二鄉貢明經擢第拜文林郎屬青龍末天后居攝遂山棲餌术殆十八年元圖大象無不達嘗學術擬張平子風鑒比郭林宗公即文林元子也英傑過人彊學冠世詩可以諷筆可以削人罕雙全我能兼有年二十四文明元年進士射策高第其年高宗崩於洛陽宮靈駕將西歸于乾陵公乃獻書闕下天后覽其書而壯之召見金華殿因言霸王大略君臣明道拜麟臺正字由是海內詞人靡然向風乃謂司馬相如楊子雲復起於岷峨之間矣秩滿補右衛曹每上疏言政事詞旨切直因而解罷稍遷右拾遺屬契丹以營州叛建安郡王武攸宜親總戎律特詔左補闕屬之逮及公參謀幃幕軍次漁陽前軍王孝傑等相次陷沒三軍震懾公乃進諫感激忠義料敵決策請分麾下萬人以為前驅奮不顧身上報於建安建安愎諫禮謝絶之但署以軍曹掌記而已公知不合因登薊北樓感昔樂生燕昭之事賦詩而流涕及軍罷以父年老表乞歸侍至數月文林卒公至性純孝遂廬墓側杖而後起柴毀滅性天下之人莫不傷歎年四十有二葬於射洪獨坐山有正聲集十卷著於代友人黃門侍郎范陽盧藏用為之序以為文章道喪五百年得陳君焉由是太沖之詞紙貴天下矣有子二人並進士及第長曰光官至膳部郎中商州刺史仲曰斐歷河東藍田長安三尉卒官光有二子其長曰易甫監察御史次曰簡甫殿中侍御史斐生三子長曰靈甫次曰兢甫衆甫皆守緒業有名於代劍南東川節度使兼御史大夫梓州刺史鮮于公自受分閫之征也初年謀始立法二年人富知教三年魯變於道乃謂幕賓曰陳文林散粟萬斛以賑鄉人得非司城子罕貸而不書乎拾遺之文四海之內家藏一本得非臧文仲立沒而不朽乎於戲陳君道可以濟天下而命不通於天下才可以致堯舜而運不合於堯舜悲夫昔孔文舉為鄭元署通德門蔡伯喈為陳實立大邱頌異代思賢之意也況陳君顏閔之行管樂之材而守牧之臣久闕旌表何哉爰命末學第敘豐碑表厥後來是則是效其頌曰有媯之後封於陳國根深苖長世載明德文林大器質非雕刻學術鉤深風鑒詣極代公耿光喬元藻識施不求報退身自默岷峨降靈拾遺挺生氣總三象秀發五行才同入室學匪獵精明明天后㣥龍效庭矯矯長離軒飛梁益封章屢抗矢陳刑辟匪君伊順惟鱗是逆九德未行三命惟錫帝命建安遠征不伏咨公幕畫騁此驥足唯王玩兵愎諫違卜忠言不納前軍欲覆遂登薊樓冀寫我憂大運茫茫天地悠悠沙麓氣衝太陰光流義士食薇人誰造周嗟乎道不可合運不可諧遂放言於感遇亦阮公之詠懷已而已而陳公之微意在斯表辭右省來歸溫凊如何風樹不寧不令廬墓之側柴毀滅性管輅之才管輅之命惟國不幸非君之病我鮮于公忠肅恭懿光明不融為君頌德穆如清風日月運安江漢流東不閉其文永昭文雄傪長慶時人昔猗氏城西五里曰漢故丞相高陵侯翟公諱方進字子威之墓公茂德洪業輝焯於漢庭公以儒術進歷京兆尹御史大夫公端肅莊厲守位以威嚴稱漢成帝器其能擢拜丞相公智能有餘兼通文法吏事以儒雅飭法律故漢號為通明相公內行修飭事繼母以孝聞有子曰宣曰義宣為通儒歷南郡太守義耿介抗直以王莽悖亂攝政義忠烈憤激誓不顧死以東郡守扶順討逆師敗被誅天下咸慕其忠而冤其敗此所謂盛德之懿忠孝之門宜其光昭嗣續後代其昌熾乎故公之後帛丿糸歷魏晉郡守列卿歷代不絶晉處士陽名重當時國朝已還楚質木棲皆以文詞登第守宰不可勝記則公之盛德忠烈烜乎其有後矣公之宅地廣斥松檟森列洎貞元初懷光阻兵詔太原尹節度使馬燧討之馬燧宿兵十萬屯於城中當賊之隧井堙木刊故公之松檟蕩然槎摧矣公之碑記折墜草莽矣頽圮損廢帛丿糸歷三紀故宗長翟春暨宗人翟皛等一二人相與謀曰文記堙滅何以彰我祖之休烈松檟摧槎何以識宅兆之封域遂與宗人翟皛等三十人協心一力建豎舊碑剗耀榛莽以文字磨磷將創碑以表之上啓於邑宰李公公以為政之本莫先於教孝為禮之基莫大於敬宗子能以尊祖為孝則吾政幾敷矣其宗長翟瑀及宗人等以傪嘗忝在李公之遊固請為記輒敢記其舊跡及宗人重建碑之年月日以表云公本汝南上蔡人歸葬本郡值東郡之敗其餘子孫逃難西遷改葬於此故諸孫代為河東猗氏人喜貞元十九年進士官國子主簿鳥之擇木者不在乎得高枝在乎得所履或淩雲之幹而不可集或在庭之柯而必可止依維賢之主人遠挾彈之公子若夫鳴而後集翔必有疑如智者之千慮叶君子之三思山有不材豈謂心乎愛矣林多獨秀寧同主則擇之孰謂無心依於有德豈惟葉之萃幹之直必在無驚弦之憂傾巢之逼惟喬之下想遊女之求思避惡之陰同志士之不息若乃翼同雲展身以風翔觀平林之漠漠見絶嶺之蒼蒼豈爰止兮失正誠所集兮向方容足之柯乃處隱身之葉是藏故有繞樹之烏鵲棲桐之鳳凰是知擇善而從何常之有既無巢幕之誚詎貽高墉之咎道惟空際諒有開而必先棲或林端乃觀影而從後未安其所豈樂其㣥傍青冥而頡頏白日出幽谷而翺翔碧雲水隔山而猶遠煙拂樹而漸分將欲巢林杪渡江濆如蕭何之擇漢主虞卿之謁趙君原其羽族所棲惟巢是葺雖衆樹之相蔽惟一枝而可給處必擇地食無不粒飛乃從宜固難妄集若然則禽之有靈也不可以愚智相欺不可以飛走見遺集灌既知有以始巢當復何時是以良木可期倘主人之見納俟我於庭乎而春入寒水冰驚淺潯照遲遲之早陽色將無定度習習之回吹勢欲難任渙若分彩濡如在陰如應勾芒之節將成老氏之心非其漸焉何以知仁氣之徐至不日釋也何以表陽光之有臨稍露沙痕似分苔翠在形開而可觀因罅發而增媚動其中矣將有日而然開必先焉若知風之自淡引晴色洞含春意曩之能久曾殊見晛而流今則不堅轉失履霜之至當歲華之既好變水緑之云初暗轉而光搖已薄輕流而影動惟虛觀夫宵以涆涆晝必徐徐靜以當融稍驚北徂之鴈輕而未散猶觀上戲之魚如此則消積凍發微波西陸當出東風以和湛兮而平劍開幽匣默然而運雲斂晴河方催皚皚之白漸滅昭昭之多則知道貴無質我之釋兮以日不徐不疾與真源匹政尚得中我之釋兮以風泄泄融融與皇澤同事有可貴用非可既懼乎裂尚保質於地寧就其流始收光於神氣潰然當解熙哉此時幸照臨之必及豈開泮之云遲日已不寒正難於鳥覆數當有盡轉使於蟲疑吾亦慕斯冰之釋不知夫所以裁之水上風起天邊月圓何怡情於遙夜濯委照於輕漣兔怯盈縮蟾驚泝沿謂元濤之弄珠將投進退訝方流之有玉欲獻遷延泛灩靡凝沖融不歇漸失沙鏡逾迷海月丹霞合而暫止青蘋開而匪輟足使浣紗之女愧顰蛾於後來伐檀之人恨流光於明發咸池何為遠在天涯言浴白日曾非緑漪彼浪以雪著月以光垂縱欲報其虛室亦無能而可施曷若霄漢之下人寰不離望舒俯降陽侯悅隨班如賁如克將順乎其美于沼于沚必周旋而中規且濯乃強名明而有素蓋取樂於風景豈同效於塵路所以淺不浮華深不掩嫮殊渙渙於鄭什引悠悠於謝賦懿其淡若含情眇若功成遍菰蒲而斂曜滿洲渚以澄明漏永更遙空見浮沉之狀星移漢轉無聞出沒之聲嗟夫月霽乃明水煩則濁苟氛昏之掩蔽與魚鱉而瀺灂水假當其演溢月縱思其滌濯運乖道阻天懸地邈則安得輕飇暫拂水鏡動於秦臺纎埃不飛玉璧吐於荊璞含輝發彩似忠臣之沃明君如後進之資先覺豈徒比其光麗而已雲之可觀時惟佩蘭映婺女而扇薄透姮娥而幔寒縹眇如畫霏微似殘乍逐乘槎之人訝鴛裾遠曳每映銜蘆之鴈謂燕幕遙看且曉霧如縠於今何在餘霞成綺須臾則改詎若我終日是似有時而待擬六銖而披拂伴仙女而降夜臨七夕以輕盈助牽牛而納采冪冪風引籠籠露涵染絳日而成蒨映青空而似藍冰綃若無孰不比方而皆忝霓裳儻有誰謂裁縫而不堪吁嗟乎一言有以千秋只亦天網本疏春絲不敵今夕何夕是尋是尺如可求斯服之無斁漢落葉兮火星西流白露降兮萬物知秋嘉此燕之有感將辭巢兮命儔命儔兮焉求應節兮周遊去此集彼正為良謀經北戶以一息度南軒而久留久留伊何我翼新整雖華屋之可戀怯高巢之夜冷得不上下其音翩翻其景射白日之淹留候令辰之光景乘秋而發且有便於風高養羽既成亦可知其路永况夫將適之所必能安據縱眷乎此巢可居固難以久而不去克有攸往足觀來譽殺氣澄秋晴光滿曙當是美景此焉騫翥遂乃橫絶階墀遠謀原隰事必謀始翔而不集空長而矯翼彌高日暮而連飛轉急同發者或有不進後來者莫能相及巢兮徒有思其所葺我后令節中和孔嘉凍已全解桃仍欲華慶賞之多燕樂既均於九有播植之始教化爰貞於四遐於是心膂周召股肱稷坰人坰洎彼庶尹當茲新節陽和溥暢言拜賜於生成稼穡艱難乃載陳於睿哲觀其克合天意咸造皇居僉曰國以人為本人以食為儲政令不差則華夷知勸水旱無備則倉廩其虛且自古在昔靡不有初敬授人時而堯典垂記大無禾麥則魯史頻書今陛下夔夔栗栗日慎一日惟人是憂惟農是恤是以域中無事海內殷實人獻其誠神降之吉臣等叨遇昌運思裨大猷惟茲南畝可致崇邱虔考令辰實當四仲之首敬舉彞典庶為六府孔修豈止合彼九疇冠夫百氏高懸象魏必日就而月將永播蒸黎自風行而草靡帝曰善哉子之言是於變時雍恭慎是宗應天地中和之氣備朝廷中和之容君告成中和之功久而作樂臣獻守中和之術先告三農此所謂超羲越軒臣賢主聖樹光宅之深本為經邦之善政美哉啓沃之義於斯為盛嗣天子臣某敢昭告於昊天上帝有隋運屬顛危數窮否塞生靈塗炭鼎祚淪亡高祖仗黃鉞而救黎元錫元圭而拯沉溺太宗功宏鍊石定區宇於再麾業壯斷鰲飲滄海而一息臣忝奉餘緒恭承積慶遂得崑山寢燎炎海澄波雖乃業茂宗祧斯實降靈穹昊今謹告成東嶽歸功上元大寶克隆鴻基永固凝薰萬姓陶化八紘有唐嗣天子臣某敢昭告於昊天上帝天啓李氏運興土德高祖太宗受命立極高宗升中六合殷盛中宗紹復繼體不定上帝眷佑錫臣忠武底綏內難推戴聖父恭承大寶十有三年欽若天意四海晏然封祀岱嶽謝成於天子孫百祿蒼生受福維孟夏十四日天降皇帝之辰㣥臣感覆幬之恩朝明庭而獻萬壽者外盡四海罔有不至時臣亦幸在京師無因緣以陪進竊自思念其感恩受賜與㣥臣無異徒以其身之卑賤至願莫伸如喑者欲言躄者欲趨乃作降誕日獻壽文一篇恭置于康莊之衢其詞曰夫有人兮則有彼天千變萬化兮道無常全高明運轉兮與人下焉聖人法象兮則相永年自我自度兮祇畏乾乾天受降福兮與人下焉臣今敢獻壽如天博厚配天兮其誰則地含容光大兮無與二山澤藏寶兮富有無既聖人體順兮不愛其利自我自誠兮其他至地至地不測兮生物咸遂臣今敢獻富如地日出輝輝兮風來薰薰甘露霂兮卿雲氛氳民曰五星兮生乎今辰愛我則君何以慶兮無稱其恩榮華富貴兮子子孫孫臣敢獻福兮如所聞式方穆宗時人聖人清謐六合車書一家皇心協於天統令節徵為國華思播植以富人故農書是進建中和而煦物俾淳風不遐是以四夷即敘九穀用嘉當其天廟低臨昭光發泄三月初吉式協於農祥三務成功不虧乎歲節授其時用天之道進其書知人則哲一人垂拱以憂勤百辟獻章而誠竭於是元老進而言曰陛下道洽無外化康有截猶慮九扈未宏三時尚闕命陳書而王化可闡俾知方而農政斯列既種既戒粢盛之望有期弗震弗渝地利之宜奚設豈不以寒氣總入春陽始初陳乎五種之用本乎三農之書王者則千畝是藉庶人則中田有廬故年穀之順不差物力之功克實首嘉節而東作方起符中星而西成乃畢其殖也習無不利其耕也動罔不吉然後邦國知設節之宜象魏識勸農之術於以見君臣克協於以見土穀惟修足食表豐年之慶多稌興大田之猷且夫節者育物於生成農者豐功於遐邇善宣兮時罔不若化洽兮物無非是乃疆乃理歌積庾於京坻有翼有憑致殊方之率俾非我后聖應太昊德包神農則不能盡地力祈天宗故得貞萬姓行八政幸沐化於和平庶采葑而謠詠允一作兌穆宗時人上帝宥密露滋貺吉青紫相宣元黃間出湛鮮輝以交透涵潤彩以爭溢搖泫泫於微風散離離於初日滴而成暈宜警鶴之偏聞感以無情勝舞獸之能率被萬物之咸覩表天心之以溥識瑞氣之非二辨方來之自五洗於石如披媧后之文遍於地似割封侯之土合德於唐成金之黃鳥晨散而翻墜煙晴籠而轉光既桂成於重葉亦珠綴於垂芒契之斯來我則調玉燭而後致求之靡得彼則耀金莖而莫量是以其邦用昌其人用康誠可以為飲不可以為霜其離絢兮其濃沃若遐矚文象旁通綺錯狀郊祀之琮璧燦以芬敷擬霄漢之雲霓煥乎蕭索固自天而同酒諒不醉而可樂其甘如飴其凝如脂苟叶於道不常厥期在春而衆葩皆麗或秋而㣥蕪更滋彼露瀼矣我王則之接花光兮渥蓂莢連碧砌兮滿階墀旁霑兮對龍衮之彪炳紛映兮逼鸞鳳之葳蕤始繁於天臨之際終晞於日旰之時足使魏殿懷慙漢宮非勝多聞前後之仙術豈逮吾君之響應願濡翰於攻文之徒庶發揮於夢筆之興池有秀冠衆卉兮彼荷最英天之氣結淳和兮惟露斯清圓規覆水兮翻然蓋傾素質積葉兮炯爾珠明露非荷無以呈潔已之狀荷非露無以異先雕之榮皓影搖光修莖冪布氣散蘭郁光分電聚鄰腐草謂螢火將飛俯澄波若蠙珠已露宜瀼浥於夜景惜芬芳於歲暮縹綵將闌瓊光未斂團素津以泥泥擢餘芳之苒苒映翠帶狀蓮的之剖開對青霄仰星文之亂點色慙兮菱藻氣肅兮金波雖有秋月我則承恩於彼露豈無朝日我則庇身於此荷尚不願灑園葵而澤豐草豈闕學老林葉而滋枯柯客有感秋而嘆曰滴瀝縈紆布濩芬敷浮池煙兮葳蕤吐絳點天酒兮璀璨垂珠已矣夫露欲變荷欲蕪君不見嚴霜降萬物皆盡兮復有此芙蕖長長慶時官京兆尹開成中為荊南觀察使檢校左散騎常侍兼河南尹進檢校工部尚書除平盧軍節度使京師浩穰姦豪所聚終日懲罰抵犯猶多小有寬容即難禁戢若恭守敕旨則無以肅清若臨事用刑則有違詔命伏望許依前式輕重處置臯穆宗時布衣上惑方士餌丹藥臯上疏諫帝善其言訪之不獲臣聞神慮淡則血氣和嗜欲勝則疾疹作和則必臻於壽考作則必致於傷殘是以古之聖賢務自頤養不以外物撓耳目聲色敗情性繇是和平自臻福慶斯集故易曰無妄之疾勿藥有喜詩曰自天降康降福穰穰此皆理合天人著在經訓然則藥以攻疾無疾固不可餌之也高宗時處士孫思邈者精識高道深達攝生所著千金方三十卷行之於代其序論云凡人無故不宜餌藥藥氣偏有所助令人藏氣不平推此論之可謂達見至理矣天寒暑為賊節宣乖度有資醫方尚當重慎故禮稱醫不三世不服其藥施于凡庶猶且如此況在天子豈得自輕先帝晚節頗喜方士纍致危疾陛下所自知不可更蹈前覆自貽後悔也今朝野之人紛紛竊議直畏忤旨莫敢獻言臣蓬艾微生麋鹿同處既非邀寵亦復何求但以曾覽古今粗知忠義顧有聞而默於理不安願陛下無忽芻蕘庶裨萬一穆宗朝官大理少卿國家法度高祖太宗定制二百餘年矣周禮正月布刑張之門閭及都鄙邦國所以屢丁寧使四方謹行之大理寺陛下守法之司也今別設參酌之官有司定罪乃議其出入是豫奪係於人情而法官不得守其職昔子路問政孔子曰必也正名乎臣以為參酌之名不正宜廢磻大中時為處州軍事衙推試太常寺協律郎麗陽廟即舊白塔廟山頂古有浮圖云鎮地脉廟因取名焉自往及今多歷年所陋檐敗榻苦於暴露雖至窘湫其實有靈郡或水旱疾窳禱之響應大中四年今齊州刺史徐公鄑理處之日時屬亢陽遍祈山川罔有徵驗躬酹此廟雨則隨車公以邑有麗溪廟居其後遂改為麗陽廟方欲審像壯宇以答神休旋詔歸朝事不克副八年冬郡闕守時録事參軍天水姜公肅處紀綱之司明糾察之務當道觀察使御史大夫李公仰其清廉委知軍州事能德以化下威以懲姦麗水縣令滎陽鄭公全察字人五稔政績有聞二公相顧而言曰郡邑無事山廟可完齊州肇謀俾我繼作得不勉歟滎陽公不避燥濕騶騎亟來凡所規模出於目巧春三月乃請都虞候兼押衙樂安任漢審地形度山勢於舊廟之西而創殿焉自州縣僚屬皆助輸粟帛同傭費連斤告畢曾未浹旬正殿敞空中霤懸月飛簷偃風觀其塑容儼然列坐如生其正位麗陽王蓋北山之神左則白塔王斯土地之主右則巨潭王乃北沼之靈三神名號雖圖籍罔載冥穴八夕可知自開山導水有土地人民社稷以來神則挺生咸聞之父老非敢孟浪然道正直降鑒甚明凡依於人必俟永年厚位之賢以寓其跡不然何規畫始於齊州終畢事於姜鄭二公其不惑矣西南冠其亭備稅駕駐騎之位左右翼其廊充庖羞食餕之事櫛植貞木帶繞流泉月魄開而煙露銷風篁警而精靈集四時品膳之美八節鼓吹之娛固護郊圻為人景福是神之功也夏五月十五日郡邑官僚鄉里耆舊大集於廟陳柷列筵以落之磻奉命執筆用識其由是為廟記敬休字順之南陽新野人舉進士以宏詞登科纍官工部侍郎徙吏部兼魯王傅再為尚書左丞大和九年卒贈吏部尚書應文武九品以上每月料錢一半合給匹段絲綿等伏以自冬涉春久無雨雪米價稍貴人心未安自德音放免逋懸賑恤貧下中外㣥庶已感聖慈至於衣冠之家素乏儲畜朝夕取給猶足為憂以臣愚見若令百官料錢內一半停給匹段絲帛丿糸等回太倉粟每㪷計價七十文在衆庶必見惟康於公家無所虧減待至麥熟米價稍賤即依前件卻給匹段等酌其事理庶叶變通植穆宗時人前代創業之君多起自人間知百姓疾苦初承丕業皆能厲精思理太宗文皇帝特稟上聖之資同符堯舜之道是以貞觀一朝四海寧宴有房元齡杜如晦魏徵王圭之屬為輔佐股肱君明臣忠事無不理聖賢相遇固宜如此元宗守文繼體常經天后朝艱危開元初得姚崇宋璟委之為政此二人者天生俊傑動必推公夙夜孜孜致君於道璟嘗手寫尚書無逸一篇為圖以獻元宗置之內殿出入觀省咸記在心每歎古人至言後代莫及故任賢戒欲心歸冲漠開元之末因無逸圖朽壞始以山水圖代之自後既無座右針規又信姦臣用事天寶之世稍倦于勤王道于斯闕矣建中初德宗皇帝嘗問先臣祐甫開元天寶治亂之殊先臣具陳本末臣在童丱即聞其說信知古人以韋弦作戒其益宏多陛下既虛心理道亦望以無逸為元龜則天下幸甚良史所記必非妄言漢興承亡秦殘酷之後項氏戰爭之餘海內雕弊生人力竭漢文仁明之主起自代邸知稼穡之艱難是以即位之後躬行儉約繼以景帝猶遵此風由是海內黔首咸樂其生家給戶足逮至武帝公私殷富用能出師征伐威行四方錢至貫朽穀至紅腐上務侈靡資用復竭末年稅及舟車六畜人不聊生戶口減半乃下哀痛之詔封丞相為富人侯皆漢史明徵用為事實且耕蠶之勸出自人力用既無度何由以至富強據武帝嗣位之初物力阜殷前代無比固當因文帝儉約之致也堯之聰明由先生成堯之治理由先生始堯不以天下讓先生先生之道猶昏先生不以清節避唐堯唐堯之道何尊是知天地間堯而許之日而月之生人以來避讓之大未有如先生者也若夫錙銖九有亢極一夫安能以巖澤枯槁之姿下聖文神武之德則知丹朱得堯之體而遺堯之性先生得堯之性而遺堯之名是得之者守之不足遺之者宰之有餘天用先生秕穅帝王牢籠六合欲先生躬戴清規首出萬古僣賊僞臣之道拜先生廟者得不戒之哉使湯之智讀先生書夏祀不夷也使發之聖得先生夢商廟不墟也然湯武聖人之用也先生聖人之潔也於亂則吾用於治則吾潔二者聖人經時之大柄使湯武逢堯舜是必韜用而先潔矣先生逢桀紂是必捨潔而趨用矣則聖道變化豈有殊耶故喜為雲霞怒為雷雨先生神也生為春夏殺為秋冬先生功也結為山嶽融為川瀆先生壽也星羅月帳巖靈壑靜先生宅也聖人無為金玉在璞先生富也功而不宰人文化成先生道也休光烈儀仰道垂師先生文也天機自潔雖死不褻先生武也噫先生所謂禀天之德合地之式居天地中立帝王則噫先生所為往矣誰能寂見寥廓但箕潁之上惟餘清風噫先生所謂為聖人之大標天地之外揖堯謝舜疇為吾輩我來獨尋請禱意深再拜刻石取文於心知微衡山布衣臣聞色荒禽荒尚書以為至誡前代失德之主鮮不繇此以致顛危故聲色則慆淫心耳蕩散人精馳騎則陷涉傾欹變生銜橛此前代聖主賢臣最為深誡者也是以周公作無逸之篇而成王致理漢文冒馳峻之險而袁盎興諫皆事理明切著為格言今陛下嗣守鴻業之初萬方仰聽之際尤資靜慎用副觀聽而旬月以來遊幸未節優戲在側馳驅無度臣是以內則慮深識之賢憂難興謗外則恐軼才之獸軫轂可虞伏望遠覽古聖稍息遊玩怡神間燕肆目經書求理道於既安播休聲於永代實天下幸甚
