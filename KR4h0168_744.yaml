front:
  text: 全唐文欽定全唐文卷七百四十四俶大中時為亠兊海節度使
  hash: sha256:2437825437e248fba0ad8a90e9494f93471a101996010672da87d17477020048
  markers:
  - {type: head, offset: 14, content: 蕭俶, id: KR4h0168_NFKB_744-h1, level: 1}
body:
  text: 當道先差赴慶州行營陳歿押官鄭神佐在室女年二十四先亡父未行營已前許嫁與右驍雄將官健李元慶並未受財禮阿鄭知父神佐陳歿遂與李元慶休親截髮壞形自往慶州北淮安鎮收亡父遺骸到亠兊州瑕邱縣與亡母合葬訖便於塋內廬墓手植松柏誓不適人伏以閭里之中罕知禮教女子之性猶昧義方阿鄭痛結窮泉哀深陟岵投身砂磧收父遺骸遠自邊陲得還閭里感蓼莪以起恨侍邱墓以誓心此皆陛下孝理宏深德風煦被遂變獷野之性潛知禮義之方求之古人斯為烈女臣俶忝廉察敢不上聞伏望天恩宣下有司特賜旌表仍放本戶兩稅以彰至行政教隆平男忠女貞禮以自防義不苟生彤管有煒蘭閨振聲關雎合雅始號文明漢字南紀擢進士第文宗朝為屯田員外郎知制誥遷御史中丞吏部侍郎出為汾州刺史改州司馬徙絳州長史大中時召拜宗正卿卒左右僕射初上受左右丞諸曹侍郎諸司四品及御史中丞已下拜謹按開元禮及六典並無此儀注不知所起之由或以為僕射師長百僚此語亦無證據惟有曹魏時賈詡讓官表中一句語耳且尚書令是正長尚無受拜之文故事與御史中丞司隸校尉號三獨坐伏以朝廷比肩同事聖主南面受拜臣下何安縱有明文尚須釐革故禮記曰君於士不答拜非其臣則答之况御史中丞殿中御史是供奉官尤為不可儀制令雖有隔品之文不知便是受拜否及御史大夫亦曾受御史已下拜今並不行蓋以禮數僭逼非人臣所安元和六年七月詔崔邠段平仲與當時禮官王涇韋公肅等同議其事理甚精詳今請舉而行之庶為折衷文者貫道之器也不深於斯道有至焉者不也易繇爻象春秋書事詩詠歌書禮剔其僞皆深矣乎秦漢以前其氣渾然逮乎司馬遷相如董生揚雄劉向之徒尤所謂傑然者也至後漢曹魏氣象萎繭司馬氏已來規模蕩盡悉謂易已下為古文剽掠僭竊為工耳文與道蓁塞固然莫知也先生生於大歷戊申幼孤隨兄播遷韶嶺兄卒鞠於嫂氏辛勤來歸自知讀書為文日記數千百言比壯經書通念曉析酷排釋氏諸史百子皆搜抉無隱汗瀾卓踔奫泫澄深詭然而蛟龍翔蔚然而虎鳳躍鏘然而韶鈞鳴日光玉潔周情孔思千態萬貌卒澤於道德仁義炳如也洞視萬古愍惻當世遂大拯頽風教人自為時人始而驚中而笑且排先生志益堅其終人亦翕然而隨以定嗚呼先生於文摧陷廓清之功比於武事可謂雄偉不常者矣長慶四年冬先生歿門人隴西李漢辱知最厚且親遂收拾遺文無所失墜得賦四古詩二百五聯句十律詩一百七十三雜著六十四書啓序八十六哀辭祭文三十八碑志七十六筆硯鱷魚文三表狀四十七總七百並目録合為四十一卷目為昌黎先生集傳於代又有注論語十卷傳學者順宗實録五卷列於史書不在集中先生諱愈字退之官至吏部侍郎餘在國史本傳欵文宗朝官侍御史歷倉部吏部左司員外郎注內通敕使外連朝官兩地往來卜射財貨晝伏夜動干竊化權人不敢言道路以目請付法司推劾情欵元賞太和時纍遷司農卿京兆尹出為武寧節度使徙邠寧會昌中進工部尚書領諸道鹽鐵轉運使宣宗立下除袁王傅拜昭義節度使卒伏以建中時公卿奏請修建東都太廟當時之議大旨有三其一曰必有其廟備立其主時饗之日以他官攝行二曰建廟立主存而不祭皇輿時巡則就饗焉三曰存其廟瘞其主臣等立其三議參酌禮經理宜存廟不合置主謹按禮祭義曰建國之神位右社稷而左宗廟禮記云君子將營宮室宗廟為先是知王者建邦設都必先宗廟社稷况周武受命始都于豐成王相宅又卜于洛蒸祭歲於新邑冊周公于太室故書曰戊辰王在新邑蒸祭歲王入太室稞成王厥後復立于豐雖成洛邑未嘗久處逮于平王始定東遷則周之豐鎬皆有宗廟明矣又按曾子問廟有二主夫子對以天無二日土無二王嘗禘郊社尊無二上未知其為禮者昔齊桓公作二主夫子譏之以為僞主是知二主不可並設亦明矣夫聖王建社以厚本立廟以尊祖所以京邑必有宗社今國家定周秦之兩地為東西之兩宅闢九衢而立宮闕設百司而嚴拱衛取法元象號為京師既嚴帝宅難虛神位若無宗廟何謂皇都然依人者神在誠者祀誠非外至必由中出理合親敬用交神明位宜存於兩都廟可偕立誠難專於二祭主不並設或以禮云七廟五廟無虛主是謂不可無主所以天子巡狩亦有所尊尚飾齊車載遷主以行今若修廟瘞主則東都太廟九室皆虛既違於經須徵其說臣復探賾禮意因得盡而論之所云七廟五廟無虛主是謂見饗之廟不可虛也今之兩都雖各有廟禘祫饗獻斯皆親奉於上京神主几筵不可虛陳於東廟且禮云唯聖人為能饗帝孝子為能饗親昔漢韋元成議廢郡國祀亦曰立廟京師躬親承事四海之內各以其職來祭人情禮意如此較然二室既不並居二廟豈可偕祔但所都之國見饗之廟既無虛室則叶通經議者又欲置主不饗以俟巡幸昔魯作僖公之主不於虞練之時春秋書而譏之合祔之主作非其時尚為所譏今若置不合祔之主不因時而作違經越禮莫甚於此豈有九室合饗之主而有置而不饗之文兩廟始創於周公二主獲譏於夫子自古制作皆範周孔舊典猶在足可明徵臣所以言東都廟則合存主不合置今將修建廟宇誠不虧於典禮其見在太微宮中六主請待東都建修太廟畢具禮迎至於西夾室閟而不饗式彰陛下嚴祀之敬以明聖朝尊祖之義郃字子元舉太和二年賢良方正能直言極諫科調河南府參軍歷賀州刺史陛下御正殿求直言使人得自奮臣才智懦劣不能質今古是非使陛下聞未聞之言行未行之事忽忽內思愧羞神明今蕡所對敢空臆盡言至皇上之成敗陛下所防間時政之安危不私所料又引春秋為據漢魏以來無與蕡比有司以言涉訐忤不敢聞自詔書下萬口籍籍歎其誠鯁至於垂泣謂蕡指切左右畏近臣銜怒變興非常朝野惴息誠恐忠良道窮綱紀遂絶季漢之亂復興於今以陛下仁聖近臣故無害忠良之謀以宗廟威嚴近臣故無速敗亡之禍指事取驗何懼直言且陛下以直言召天下士蕡以直言副陛下所問雖訐必容雖過當獎壽於史策千古光明使萬有一蕡不幸死天下必曰陛下陰殺讜直結讐海內忠義之士皆憚誅夷人心一搖無以自解况臣所對不及蕡遠甚內懷愧恥自謂賢良奈人言何乞回臣所授以旌蕡直臣逃苟且之慙朝有公正之路陛下免天下之疑顧不美哉釗武宗朝官洺州刺史檢校刑部尚書兼左金吾衛大將軍御史大夫充左衛使封太原郡王除皇城留守紙類不同人之從事則有司存率由舊章乃無厥咎甲以九流賤職工寫為務理宜不于素欽乃攸司何得慢其所守越我王度挈瓶猶且不假落簡安得有乖致使魚魯闕辨於當時鉛黃莫施於學校罪自掇也刑則何逃然而紙類以難易論功時日以短長命課事無準定或須加減不伐有詞理從哀矜待測淺深之量方申大小之辜戎字可大舉明經纍擢諫議大夫拜給事中出為華州刺史徙亠兊海沂密觀察使卒年五十五贈禮部尚書准詔旨制置劍南西川兩稅舊納見錢今令一半納見錢一半納當土所在雜物仍于時估之外每貫加饒三五百文依元估充送省及留州留使支用者今臣與郭釗商量當道兩稅並納見錢軍中支用及將士官吏俸依賜並以見錢給付今若一半折納則將士請受折損較多今請兩稅錢數內三分二分納見錢一分納匹段及雜物准詔每貫加饒五百文計優饒百姓一十三萬四千二百四十二貫文成都府及諸縣並邙雅黎等州蠻寇所經處賦稅三分蠲放一分其不經賊處亦量減放共計減放一萬七千六百二十貫文伏緣兩稅先徵見錢今三分已一分折納雜物計優饒百姓一十三萬餘貫文西川稅科舊有青苗如茄子薑芋之類每畝或至七八百文徵斂不時煩擾頗甚今令並省稅名目一切勒停盡依諸處為兩限有青苗約立等第頒給戶帖兩稅之外餘名一切勒停今臣與郭釗商量得報稱已是徵夏稅之時改法未得先已奏請以今年已後每年冬于本色苗本額稅中並減一半訖計減放四萬二千五百四十四貫文臣奉使日伏蒙處置如前璟字德輝右散騎常侍冕子寶歷初進士開成初官庫部員外郎知制誥以本官充翰林學士拜中書舍人會昌時轉禮部侍郎貶信州司馬終郴州刺史準開元二十三年勑宗廟大祠宜差左右丞相嗣王特進少保少傅尚書賓客御史大夫又二十五年勑太廟五享差丞相師傅尚書嗣郡王通攝餘司不在差限又元和四年勑太廟告祭攝官太尉以宰相充其攝司空司徒以僕射尚書師傅充餘司不在差限比來吏部因循不守前後勑文用人稍輕請自今年冬季勒吏部準開元元和敕例差官今月十二日面奉進止以臣先祖所撰皇宗永泰新譜事頗精詳令臣自德宗皇帝陛下御極已來依舊式修續伏請宣付宰臣求范陽人寶歷初進士應諸府辟召位終郡守蜀國自秦始通秦遺蜀王五美女蜀亦遣五丁迎之到梓潼見一大蛇入山穴中一人覽其尾不能得五人相助大呼拽之山遂崩五丁及秦女皆死惠王遂遣張儀司馬錯從石牛道滅蜀因封公子通國為蜀侯以陳壯為相置巴蜀郡遷秦人萬家實之民始能秦言以蜀令張若為太守前時蜀土開明尚納美女為妃蓋武都山之精也及死葬于城西北遣五丁擔其本山之土以為冢今有二石尚在古老言五丁擔云陳壯既為秦公子相數年遂謀反殺秦公子秦伐蜀誅壯封子惲為蜀侯惲後母誣惲有罪賜劍自殺蜀人以其寃因為立祠又封子綰為蜀侯後復疑綰反誅死自此但置守而已後以李冰為蜀守冰始鑿三江引水以行舟楫岷山多梓柏大竹坐致材木又溉水開稻田于是沃野千里號為陸海置綿洛二水用便溉灌作石犀五以壓毒蛟命曰犀牛里後更為耕牛二又作三石人立水中冰非常人也與江神約曰水竭不至足盛不沒肩大鑿巖崖通沫水道江之龍大怒冰乃持刀入水與龍鬬龍死遂無水害迄今蒙利蜀人稱郫繁為膏腴綿洛為浸沃昭襄王時又曰白虎為患意廩君之魂也歷四郡傷千二百人王乃募能殺之者邑萬家金帛稱是巴夷朐忍廖中藥何謝作白竹弩於高樓瞰而射之死王嫌其夷人乃刻石復田頃田不租十妻不算傷人不論殺人不死與之盟曰秦人犯夷輸黃龍一雙夷人犯秦償清酒一鐘其人安之遂號曰武夷其族又有濮賨賨尤武勇居渝水夾水以居為漢高祖前鋒陷陳善舞巴與蜀代為仇讐蜀嘗封弟葭萌於漢中號苴侯命其邑曰葭萌至漢高祖六年始分置廣漢郡高后城束束火道開青衣文帝末以廬江文翁為郡守穿湔江口溉田千七百頃立文學選吏子弟皆就學令俊乂之士張叔等十八人東詣博士受七經還以教授於是岷絡之地學比齊魯孝景帝嘉歎遣天下郡國皆立文學自文翁始也文翁明天文灾異後以博士徵至侍中揚州刺史孝武帝置四郡都尉俾立十八郭於是郡縣多城觀矣又分牂牁置益州是為南益州宣帝地節三年穿臨卭蒲江鹽井二十置鹽鐵官自漢興至哀平牧守仁賢宣德立教英偉命代之士其出如林璽書束帛交馳於梁益之地矣雖魯之洙泗齊之稷下未足多也且漢徵八士蜀預其四高帝分蜀郡北鄙置廣漢武帝分南鄙為犍為遂有三蜀之號王莽改郡守為帥正以蜀郡為導江公孫述為帥正治臨卭述僭號後漢光武帝滅述還為蜀郡順帝即位復為益州郡名依舊州治大城郡治小城靈帝末以劉焉為牧及卒子璋為嗣建安十九年璋迎漢左將軍劉備至遂滅璋稱帝繼漢號先主治成都魏末司馬昭平蜀復為益州晉受魏禪以州領郡武帝末以成都為國封子穎為王其後賨人李雄僭稱王晉穆帝永和初遣桓溫擊滅之復為蜀郡譙縱反安帝命朱齡石討平之至梁分益州更置南北二益州以武陵王紀為刺史紀僭帝號領兵東下為湘王所殺後魏廢帝前二年尉遲逈定益州置總管後逈舉義旗不受代為隋王堅所戮隋開皇元年廢總管置行臺以蜀王修為西南道行臺尚書令三年復為總管大業元年廢總管為州又改州為郡聖唐武德元年復為總管三年置行臺改為益州以太尉秦王為益州道行臺總管又改為宋大都督府天后析益州置彭蜀漢二州開元二年始以齊景胄為劍南節度營田兼姚巂等州處置兵馬使自此始有節度使也八年以李濬為使去兵馬使章仇兼瓊兼山南西道採訪使其後或兼或否亦無定制上元二年始分為東西川廣德二年復合為一大歷二年又分為兩川至今不改天寶三載復為大都督府十四載元宗皇帝巡幸車駕留五月至德二年改為成都府置尹比東西二京號南都後復停大凡今之推名鎮為天下第一者曰揚益以揚為首蓋聲勢也人物繁盛悉皆土著江山之秀羅錦之麗管絃歌舞之多伎巧百工之富其人勇且讓其地腴以善熟較其要妙揚不足以侔其半况赤府畿縣與秦洛並故非上將賢相殊勳重德望實為人所歸伏者則不得居此况控帶蠻落厄戎限羌非文武寬猛包羅法度之君子則不能得中庸以是聖庭慎擇尤難其任使號有三曰節度觀察安撫先時南蠻六部不相臣服天子每有恩賞各頒一詔呼六詔開元末節度使王昱受賄上奏合六為一乃封大酋帥越國公蒙歸義為雲南王始獨稱南詔至楊國忠遙領蜀郡太守兼採訪使遂擾邊閫希立功伐乃有瀘南不利之變貞元中韋令公臯為節帥招復雲南背蕃歸漢十一月八日置使安撫兼統押西山八國近界羌蠻等使是為三使韋令公本以奇勳秉旄鉞思立邊效又在鎮且歲久南詔為其用拓地甚遠公既卒劉闢繼公後以兵守險為不順誅死家籍沒後京兆公為節帥酷易軍政殊不以封域為念戍卒罔代邊蠻積忿至太和三年十二月蒙竹差巔遂以兵剽掠至城下杜公填門不敢與爭會監軍使矯詔宣諭蠻人遂退工巧散失良民殲殄其耗半矣列政補完尚不克稱大中六年四月詔以丞相太原公有驅制羌戎之成績由邠寧節度拜司徒同平章事鎮蜀蜀為奧壤領州十四縣七十一戶百萬兵士五萬外疆接兩蕃人性徑勇易化以道難誣以智公至以儉約帥之以謹廉不伐臨之以刑賞法制平治之人歡且舞旦夕詠公之德矣先是西蜀圖經甚備朝野之士多寄聲寫録主茲務者不勝其煩遂盡削而潛焚之長吏至即據顯者集為一軸以獻繇是百不書一大中八年戶曹參軍藺宏宗甚好學且目覩司徒相國之異績願付以傳示于後然不以文自任翦截疏長蕪言不略相國乃屬于小子令刊益之且曰不以淹徐疾速歸於流布以為不朽之事求受命震怖又不欲以圖經為目乃搜訪編簡目為成都記五卷經與圖之附益願終宏宗之職庶以此為助也大中九年八月五日叙侔太和中官魏州書佐雲雷方屯龍戰伊始有天命焉有豪傑焉不得受命而命歸聖人於是元黃之禍成霸圖之業廢矣隋大業末主昏時亂四海之內兵革咸起夏王建德以耕氓崛興河北山東皆所奄有築宮金城立國布號嶽峙虎踞赫赫乎當時之雄也是時李密在黎陽世充據東都蕭銑王楚薛舉擅秦然視其創割之跡觀其模略之大皆未有及建德者也唯夏氏為國知義而尚仁貴忠而愛賢無暴虐及民無淫凶於已故兵所加而勝令所到而服與夫世充銑密等甚不同矣行軍有律而身兼勇武聽諫有道而人無拒拂斯蓋豪傑所以勃興而定霸一朝拓疆千里者哉或以建德方項羽之在前世竊謂不然羽暴而嗜殺建德寬容御衆得其歸附語不可同日跡其英分雄分指盼備顯庶幾孫長沙流亞乎唯天有所勿屬唯命有所獨歸故使失計於救鄰致敗於臨敵雲散雨覆亡也忽然嗟夫此亦莫之為而為者歟向令運未有統時仍割分則太宗龍行乎中原建德虎視於河北相持相支勝負豈須臾辨哉自建德亡距今已久遠山東河北之人或尚談其事且為之祀知其名不可滅而及人者存也聖唐太和三年魏州書佐殷侔過其廟下見父老㣥祭駿奔有儀夏王之稱猶紹於昔感豪傑之興奮弔經營之勿終始知天命之莫干惜霸略之旋隕激於其文遂碑太元太和時人臣聞賞罰不明無以示天下是非一貫無能建大中臣竊見義成軍節度使李聽位極寵榮心無報效朝廷資其承籍委以統戎俾代憲誠付之雄鎮總三萬貔貅之衆兼兩藩節制之權冀其俯安危疑上副恩遇况陛下授以神算假以天威入魏之期克寸日先定而李聽擁旄觀望按甲遷延熒惑人事逗撓軍政遂使憲誠陷於屠戮亂衆肆其姦凶由是六郡無依全師喪敗委貝州而不守燒劫無遺望棧口而疾馳狼狽就道自圖苟免不憚包羞蔑棄朝章有同兒戲魏州之亂職聽之由論其負恩萬死猶幸伏以封常清河南失律斬於關門高霞寓唐鄧破傷投諸遐裔渾鎬節制易定苦戰而兵力不支袁滋逗留西川欲進而凶渠尚在或親當矢石或躬履艱危勢屈賊鋒竟申朝典未嘗貸法必振皇威今李聽罪惡流聞中外憤惋比之常清等輩萬萬過之若陛下猶視含宏不置極法臣等恐憲章墜地天下寒心伏望付之法司以正刑典齊之太和時人昔鄭桓公為王卿士始受鄭於周因封命氏漢魏以降其族滋大有唐以來闕一字華闕一字軌君其裔也曾王父璿河南少尹王父溥尚書右部郎中歷青邢相衛闕一字幽懷七州刺史入為左庶子皇考華駕部郎中吉州刺史仕濟其美時與其能君即吉州之少子也隱不違世顯而成晦於所與以義於取入以闕一字以闕一字遊江湖而無所為纍也君諱準字闕一字道其先滎陽人有憲也之貧闕三字之貴人之於此皆不堪其憂君之於此未嘗滑其闕四字為知命也太和四年正月二日遘疾終于蘇州華亭縣白砂鄉徐浦場之官舍享年六十有三有子五人嗣曰宗儒次曰宗韞次曰宗慶次曰宗遜皆銜恤茹哀克奉先訓又一子奉釋氏教端殼清淨修無生忍名曰宏直嗟乎伯仲叔季於執喪之禮皆得順變即以其年秋八月草五日權葬于義興縣洞庭鄉震澤里下朱村原從宜也有女三人皆在冲幼五子以余有往年之舊請余於文銘曰其生也天其死也天死生皆天兮何適非然嗚呼苟不達於此哀何勝焉
