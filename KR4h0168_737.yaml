front:
  text: 全唐文欽定全唐文卷七百三十七沈亞之四
  hash: sha256:35dba02172d8e71306f85a7af8bdf4197bf3a3868bbf3f93f5b9c6c2f1ef6aed
body:
  text: 元和十有二年夏六月亞之西出咸陽行岐隴之間採其風得西上兦降故老謂予言邊之所以為患可痛之狀辭未條悉或短曰惟叟以西戎蠕蠕之旅而為邊出苦言使聞北塞匈奴雜虜之風叟曾不哭也蓋天子之憂甚勤與帥長分節符給所用以事邊何困對曰不然今言所以為患者非一因此而邊兵不得習伎險不得為固百姓不可為生如此吏尚輕易之然則北虜匈奴雖以逸馬強弓乘嚴寒時南馳其來衆不過數千其所掠民財貨一人所舉而已由鷙隼不能止屯兵留塞且北過千里而屬烽望其興塵知奔蹄之幾受降城故事云虜南下望其塵高下則知衆寡視其狀則烽燧次發然後收民畜嚴壁而待之且每歲八月戍有清野之火使其馬無所食彼縱至不暇解鞍而旋矣而西戎則不然其衆蟻聚多包山川沮陸之利其兵材雖一不能當唐人然其策甚遠力戰不患死所守必險所取必地而唐人軍中以為材不能皆易之故自安西以東河蘭伊甘及西涼至於會寧天水萬三千里凡六鎮十五軍皆為西戎有由易而見兦也聞其始下涼城時圍兵厚百里伺其城既窘乃令能通唐言者告曰吾所欲城耳城中無少長即能東吾亦謹兵無令有傷去者城中爭號曰能解圍即東其後取他城盡如涼城之事由此人人皆固生無堅城意自羅其策以來為語相傳尚近柰何客獨不聞其說乎岐隴所以可固者以隴山為阻也昔其北林僻木繁故戎不得為便道今盡於斬伐矣而蹈者無有不達且又虛兵之號與實十五又有非戰鬬而役入山林伐麋鹿羆鹿君麝豪豕是徭者居十之三窮嵒險障剃繁取材斤聲合叫不息於寒暑是徭者居十之四發蓄粟金繒文松大梓奇藥言禽薰狊之具挽轅於陸浮筏於渭東抵咸陽入長安部署相屬是徭者居十之二其餘兵當守烽擊柝晝夜捕候者則皆困於飢寒衣食或經時不賑顧其心怨望幸非常尚能當戎耶是皆賴主上神聖彼戎畏其化而不敢東刃今岐隴之土甚饒而農食不充秕稗衣結縷無帛布其稅租納粟官一而耗倍細吏憑法而要賂賂厚者雖逋亦寬之粟雖後至必亟與符賂薄者或稽一日即白吏笞之粟當輸則曰次當某人又當某人故有累日而不得倍數矣其他征徭倣此農盡所穫不能出其費尚無不忍吏是民由蓬息而處又何聊生今所患衆多其略可痛如此長吏終不省尚輕易之噫柰何為不困客有以今廩食之不充漕輓不勝於弊是勞遠而墮近以為問者予於是發憤數日故縷言而對曰昔漢徙山東豪富兼并之家以奉園邑凡百二十四萬戶又有南北東西軍及匈奴雜虜以國衆來歸者仰給於漢未聞嘗俟輓於吳越而後給也今以三千人食勞輸江淮歲貢三十萬斛迎流越險覆舷敗軏不得十半自渭以東督稽之官凡四十七署署吏不下百數歲費錢十千萬為大數而部吏舟傭相踰為姦鞭榜流血酸苦之聲相聞禁錮連歲不解歲千餘人雖赦宥而獄死者不可勝多矣甚非仁聖之所以牧人也乃者燕人叛元宗南巡巴蜀肅宗勞兵於靈武及二駕神遊代宗臨陝關中流離羸牛一韁常市錢二百千故有轉輸之法雖救一時然終轉入人於禍誠可以痛今雖未可暴去且宜以三輔粟為貢重資於農則耕稼自勤耕稼自勤甸服無曠土遊人矣如此九年之蓄可以儲又何勞輸輓於遠哉客曰敬聞其旨大唐太和五年歲次辛亥十月十五日己卯明真大齋主朝請大夫守郢州刺史李祥一作詳與謫臣郡客將吏等頓首稽首再啟詞於虛無自然元始天尊無極大道太上老君㣥靈衆仙咸俟畢降蕩蕩乎混元始精泮漓涵真薰蒸為氣形生於聲衆動既品隨而有名清濃薄厚四氣之營乃岐乃陌拆其混幷衆動壽量道居濃清覆人為大啟悟為明拒惡為壍護善為扃居惡如何恥然面黥居善如何陽然懷聲道之所宰尊無與京伏惟皇上保聖億為壽程天齊尊高如天無傾某官幸職居專城雖喜從樂善之發怒因嫉惡而嬰每覺逾息失次度刻不寧是用澆氣於恬奪性於情害意之和傷和於平而疑神誤序胃血差經伏願大道神尊垂尊澤祐雕堅老榮遐衆之齡使淄垢磨闕濁迷醉醒伏願金借其堅玉助其貞今某等之志戴道之大德荷道之生成某等之狀蓼糵為甘山岳為輕伏願災從日銷福與時迎某等之虔恭冼思滌慮以奉以行謹辭士之冠髮就履莫不多善以自襲必泉疑好惡於其裏好惡形則利害陳而其明一悞所燭習識之惟與生相老矣而幼善亦違也惟克寸躬慎惑為能多即之故曰克寸躬敬事則道容已克寸人則偷克寸躬而擇行不諛者處濁則清居族則睦結友則義字俗則化折獄則不濫夫元黃之滋不能混玉之素克寸躬之志幹以潔故處濁而能清愉之私不能玩於禮克寸躬之氣和而莊故居族而終睦稼穡之報不終負於勤克寸躬之行誠輸而勞先故結友而能義河谷之湍不能返流而倒注克寸躬之令重本而道常故字俗而能化蒙鑑之垢不固點於磨克寸躬之辨窮思極明故折獄而無濫若是者非勤道孜孜則多易違也或問於力行之先生曰善可遷而過可無悔乎對曰吾何敢誣克寸躬自塞而已先生姓崔氏字夏封生於唐臣於五代居官則克慮以事事假牧於巴梁其民生祀之處則克已以食居於河濟之沂其友交給而助之既跡既明賢者稱之矣他日先生往邠侯之命余贈而勉之曰艅艎之舟腹萬斛而不盈浮波而馳終歲而不息載之者獲於馳耳及厭風水之適安於所留曷與一敖之庾等雖坎坎循環之輪猶羞其止也顧潔狂之誠能思即哲居哲忘思則狂蓋古者勉不息之勤言也先生其終勉諸夏之為郡南走雍千五十里涉流沙以阻河地當朔方名其郡曰朔方其四時之辰夭暑而延冬其人毅其風烈其氣威而厲易憤而難平夫其難平之狀在陽為悖在陰為狠悖為不平者在上暴橫而為也在下殘冤而為也狠為不平者在上蔽惑而為也在下憤激而為也元和之初夏之節度韓將軍入覲其甥楊惠琳為之後以兵叛天子命將軍演伐之既至盡殺其屬將曲直者無別罪併俘其家姊弟妻子以其善貌者擇而入其餘均賞麾下騎士皆得肆辱污明年拜右衞李將軍愿為尚書出代演為政至其城察民氣色不得平乃留意於察果得之因令曰天子愍不辜人而命四方為政執事觀察之夫楊惠琳叛脇其良人良人以骨肉妻子故不能得止又不能即死制已在人今皆以是罪戮之矣其姊弟妻子當免者不宜復蓄污且又皆良人子等類耳寧幸如此乎今盡籍出之無得隱吏更察敢有如是者斬於是尚書愿廼以畜馬為則訓得所虜者相當其直其人皆死志積冤憤既出即豁其所蓄道路呼聲四逸有感憤不勝於心者則仰而號俯而躍退而變為喜而舞謠其德其聲雜調齊感如是連日改旬而後已是則修其化如此其氣復能為悖耶夏之屬土廣長幾千里皆流沙屬民皆雜虜虜之多者曰党項相聚為落於野曰部落其所業無農桑事畜馬牛羊橐駞廣德年中其部落先党項與其類意氣不等因聚黨為兵相伐強者有其馬牛羊橐駞其後支屬更酬殺轉轉六七十年莫能禁道路殺掠以為常嘗與華民貿易馬牛羊橐駞者貿已輒以壯騎從間道伺險擊奪華民華民脫死者幾希矣愿乃按察部落盡知其猾大者死小者盟又令曰今盟已敢有叛者滅之其后有人貨得一馬厚價善色駭而逸兦其所就月餘奔歷數帳異逐之又至一帳帳之老乃相與執而詣公居請曰有馬逸來莫知其所由其後更歲故兦馬者得復之是則修其弊如此其氣復能為狠耶夫政不明則平不得施於氣色笑語矣法不清則平不得信乎井閭市貨矣昔者周公之為政處於相則天下平處於東則一方平今夏北一方也得其平如此豈在位者而知周公之道耶乃籍所以於篇以明善理云爾元和八年秋水大至滑河南瓠子隄溢將及城居民震駭帥恐出視水迎河西南行思欲以救其患亦頗聞故有分河之事言其水嘗導出黎陽傍帥以其功尚可迹於是遣其賓裴宏泰請於魏曰河經地而東滑最大自洛以西百流皆集於滑而春秋隄防不為固此將軍所明知也竊以黎陽西南其洄壖拒流以生衝激之力誠願決一派於斯幸分其威耳今秋雨連久不間洛滑以西稚川峻谷暴發之水爭怒以走會即河勢日夜益壯恐一旦城郭無賴謹聽命於將軍魏帥許之其將卒吏民更請曰患難近也况滑得水患於天久矣魏何戚乃許移於己哉帥曰民前聽所語是黎陽與滑俱帝土否耶設人有不幸於水火而望及於四海道路之人凡見其苦即為舉手寧皆有戚者夫全大以棄細順理也且滑壁卒數萬人民不安業未知其賴吾安敢以河鄙咫尺之地為專惜乎顧桑麻五穀之出不能賑百戶假如水能盡敗黎陽尚不足愛况其無有民何患無土以食因召吏趨籍民地所當奪者盡以他地與之籍奏天子天子嘉其意而可明年春滑鑿河北黎陽西南役卒萬人間流二十里復會於河其壖田凡七百頃皆歸屬河南夏六月魏使楊茂卿授地滑帥令陳酒樂與浮河新渠是日亞之以客得與故悉其事於兩帥之賓元和十年亞之以記室從隴西公軍涇州而長安中賢士皆來客之五月十八日隴西公與客期宴於東池便館既坐隴西公曰余少從邢鳳游得記其異請語之客曰願備聽隴西公曰鳳帥家子無他能後寓居長安平康里南以錢百萬質得故豪家洞門曲房之第即其寢而晝偃夢一美人自西楹來環步從容執卷且吟為古裝而高鬟長睂衣方領繡帶紳被廣袖之襦鳳大說曰麗者何自而臨我哉美人笑曰此妾家也而君客妾宇下焉有自耶鳳曰願示其書之目美人曰妾好詩而嘗綴此鳳曰麗人幸少留得觀覽於是美人授詩坐西牀鳳發卷示其首篇題之曰春陽曲終四句其後他篇皆累數十句美人曰君必欲傳之無令過一篇鳳即起從東廡下几上取綵牋傳春陽曲其詞曰長安少女踏春陽何處春陽不斷腸舞袖弓彎渾忘卻羅衣空換九秋霜鳳卒詩請曰何謂弓彎曰妾傅年父母使教妾為此舞美人乃起整衣張袖舞數拍為弓彎狀以示鳳既罷美人泫然良久即辭去鳳曰願復少賜須臾間竟去鳳亦覺昏然忘有頃鳳更衣於襟袖得其詞驚眎復省所夢事在貞元中後鳳為余言如是是日監軍使與賓府郡佐及宴客隴西獨孤鉉范陽盧簡辭常山張又新武功蘇滌皆歎息曰可記故亞之退而著錄明日客有後至者渤海高允中京兆韋諒晉昌唐炎廣漢李瑀吳興姚合曰吾友王炎者元和初夕夢遊吳侍吳王久之聞宮中出輦鳴笳吹簫擊鼓言葬西施王悼悲不止立詔詞客作挽歌炎遂應教詩曰西望吳王國雲書鳳字牌連江起珠帳擇水葬金金义滿地紅心草三層碧玉階春風無處所悽恨不勝懷詞進王甚嘉之及寤能記其事炎本太原人也貢籍中有鳥誼名者生商山始以誼聞商之貢來者云能搏擊雀鷃以為天子後宮遊戲貴幸宜進此以具樂後宮亦相尚奇飾之以綵絲合縷為足縈垂緌以絳繒衣尾加鳴金撼如佩又指習其捷便指熟得如意後宮從上所遨幸者誇玩無厭春縱去秋輒復貢來誼鳥性與他禽不類色縹綠而文頸形大小類鶡而意氣貌狀復不類往往高林大木間同巢者累數百其春乳當為食者還飼即先稚或疾無別已兒也秋羅人捕貢設羅有誤中者即㣥衆相號呼若不忍去投下集羅以如是故誼鳥無他名沈子曰余幼過商山熟誼鳥事於其宿老今余適藍田郵夫唱傳曰誼鳥貢余初喜其以誼蒙幸則生為梟獍者遠遁而媿死其餘賊暴侵淩之類期不得自性矣及聞其用材則不然使移其心從搏擊者伍備娛一旦之遊而誼無所與何其失職也夫何其失職也夫元和九年蔡之帥死其子元濟以其土叛逸掠陳汝之間冬縱兵臨壽春屠馬塘走其守令狐通焚霍邱淮南郡邑大駭民人卷席而居上聞之怒謫其守明年春詔執金吾李將軍馳傳出守之既至收其壞卒聚壽春城使人勞井閭而市貨耕桑之業始復民人莫知復為戰矣八月乙巳乃夜引兵南出霍邱百四十里又折而西四十里營於萬勝岡築新城初將度曰吾士卒萍合之衆也易散而難役吾以築壘令之必苦難使寇聞之必襲吾思欲其自用乃召諸將謂曰吾旦日望氣其狀有寇謹備之令諸軍分營連居環迴之間十有餘里各視營之所向宜為數堵之垣以禦暴矢耳諸將數奇將軍言歸而亟曉其卒故所命立就將軍與監軍使出周祝之還至武寧大稱築者之能勞以酒帛語寵其將因曰既已幸周繚之善也他將恥其功之不類乃復興即日而垣周將軍監軍使出具牛酒為勞因士卒之樂又令曰山澤之地其土瘠漓今時方秋浸潦用事謂衆之功難為也顧其垣今日而周明日而壞吾為諸君惜之誠能致其厚則土藏氣色脈力相輔雖霖潦不為患矣築者皆悅復爭為厚及竟將軍監軍使出視之復勞曰嗟乎諸君之能衆士之功也既周且厚始為其垣今則城矣因自吟曰城乎城乎使其增數仞而飾之寇雖蚩尤寧敢犯我乎遂歸諸將相謂曰乃者將軍之詞得無意其高耶吾黨亦醜其卑矣復增其築於是新城遂具明日寇果來望見皆愕然因至新城傍俱張喉高言指城上曰為我曹敬謝將軍訖辭而去諸將盡伏寇亦以王覽董重質營其側拒之十一月戊辰將軍將卒萬餘西渡澗渠上史蔟岡與賊陣自平明至日中進退相延不得合及日側將軍乃謀曰彼必乘暮伺吾還兵擊我必矣於是引兵急攻寇寇延退數里乃以精兵分伏其兩隅復自延退間拔其羸老先復令軍中曰皆坐賊之後見官幟有引渡者以為兵怠俱還遂大呼疾馳東下於是伏兵皆奮斷其後賊大潰殺傷千餘生得數十人官卒死者亦數百人是時李存亮為先鋒將使百騎遊擊左右獨五人環馳如轂至賊麾下斬其將王覽繼轡轉鬬而歸十一年夏高霞寓敗於隨唐既謫盡發其卒屬陳秋捕得寇兵盡罷南境之備俱東備矣九月使偏將軍李曜領步卒數百人從險道夜行銜枚入寇境西過九女原百餘里屠其堡聚三十餘壘又使義營諸將西北傍安陽山破其土附屯戍之衆數十百人招其降民男女萬戶得其將二人用之久之朝之卿士以為將軍怠於戰或發其語而客亦有來詰於將軍曰始天下高將軍之義以將軍兵臨三州之寇謂一舉而取何為久不稱其獲與將軍曰子之望吾非也夫鋤深根者必利其鍤乃吾之部多吳楚耕販之人習於沮澤之上彼魚鳥之性其生也恇恇如偷兒其游翔之㣥非不多也及撫掌而駭之即爭為潰矣而寇亦素難吾名常以精卒待我今驅是於谿谷之間與寇決鬬譬由畜彘之禦窮狼寧有所抗蓋居之嚴城以固其意令旦暮從壁上望見寇騎號呼奔突之狀以熟其目然吾又常喻以風雲勝敗之語以壯所恃如目熟而膽壯及其可用吾伺其利而擊之期於必勝此吾所効也十一年冬詔書促戰十月乙未上遣中貴人來臨視將軍於是圖其陣於帳中令諸將各識其序旦暮擊鼓教士卒為分合圓方之勢備盡所用將軍出客有難之者曰自建中於今淮夷三叛其間矣雖蒙赦令然未嘗斯須忘戰故介兵人傳其兵父訓之子兄教之弟非戰事不語是寇以將軍名聞天下故不敢犯自將軍西出疆屯兵於萬勝城以控其要濠水而東連次江淮之間郡邑之人耕桑自力轉輸相屬曾不為寇虞此將軍之功也以強計毅誠招其轉禍之人繼來如繩此將軍之用也今將軍不以此為百全之基驅貊越之人身自蒙堅而與必死之寇決命頃刻即萬一有不如將軍之指東土之固將安仰哉對曰此吾以熟於計久矣然吾昔嘗仕於河塞十有餘年若僂之忘伸也前行始入覲不意蒙寵於過悞使率師振旅吾之力唯其所指以死効夫馬隨羈而引者也羈之使馳則為之馳羈緩則步安有擇塗陸而避僵蹶哉如有縱之不前銜之不止徒見撻賤之棄焉得延頸踠足以待御且聖上旦暮待績於吾中貴繼至亦吾蒙羈之日也何敢自引於便而已矣遂以十一月庚辰夜漏過四十刻引兵西渡上史蔟牧之下矚賊壘分銖皆察及日中大風從西起折幹迥幟將軍謂中貴人曰今日之候非其利也願屯兵堡史蔟以伺之中貴人曰某受命視公戰不視公守將軍不得已乃陣中軍為前武寧軍次之左右輔皆親兵戰凡十合會廬宣之軍居間聞戰聲自驚潰失次且遁是時賊軍方苦中軍武寧之殺傷幾欲引去及聞廬宣之軍驚潰即分精兵數百勁突所潰以擊之而將軍復與中軍武寧深逐賊而行數十里因與廬宣之軍相棄廬宣之軍先遁去卒無所傷至暮中軍力鬬遂死其將曹惟直張忠信楊渾等及卒死者數百人武寧死者亦數百人還軍新城雖無功者亦勞之以故士卒無戰苦畏叛之患時亞之客壽春得詳其語而書之以備史聽臨涇之築跡於郝玭貞元中玭為涇將德於軍軍中皆推其公嘗從壯數百騎出捕野還白於帥曰臨涇地扼洛口原註有洛川在涇州西北盡於臨涇其川絕饒利息蓄其西大野走戎道曠數百里其土乃流沙無能出水草當涉者盡疲即屯臨涇為休養便他願以城控之可艱其來玭出其傍一人謂帥曰誠以玭言有是也雖然公自念之公所以蒙殊恩大幸子姓昆弟俱得不業而官者蓋以邊防未有可制上心日夜懸於此故厚公之事無所難今用玭言則邊已固公安倚耶雖戎不得越所趨而捕者復何以稱獲使上聞之亦且輕所憂矣遂不從玭計及帥死其校段祐代為帥歲餘玭又白曰昔天寶時天下有兵為防者獨西戎矣而邊至王畿尚萬有餘里其烽燧之驚東不過燉煌張掖之間又有嚴關重阻盤錯之固綿屬於其中廼者安史反其邊兵強壯悉會難咸陽東而西陲復為所攻盡兦美地今王畿之傍列為邊郡飛烽傳候昏曉之際必奏於帝垣况未有可固今每秋戎入塞寇涇驅其井閭父子與馬牛雜畜焚積聚殘廬室邊人耗盡而又以一方便宜委決於將軍何以自塞夫臨涇之築於涇甚便前年玭白於故將軍不聽今日幸願將軍省計遂築城於臨涇以玭部鎮之自是戎無敢犯涇者元和初祐入覲因留宿衞後為帥者惡玭能強誣以年朽不任兵罷之八年余西道塞歷岐隴而邊人無幼老盡能誦郝玭之功故余悉著所論勒其事於臨涇城
