front:
  text: 全唐文欽定全唐文卷四百二十四于卲二
  hash: sha256:55a0690df05787d7150e9565a8e15f7f0780ce978df7ce6678cba100878aaab8
body:
  text: 臣某言臣聞古公去邠初因避狄襄王出鄭終見興周故能成九五之尊享八百之祚載在前史昭然可知伏惟元聖文武皇帝陛下道洽四國威加八紘啓中興之運宏下武之功殊方異俗重譯交順惟犬戎小醜敢亂天常陵逼豐鎬震驚都邑陛下理兵陝服遣將秦川鴟張未幾狗遊自溺今八川砥定萬姓怨思同懷捧日之誠共結屬車之望况地稱百二勢比咽喉足以橫制九圍財成六合陛下豈可捨山川之固為巡省之遊臣雖至愚竊知不可伏願謀及百辟俯徇㣥心回鑾舊宮駐蹕西夏使百川有朝宗之所衆星復環拱之方凡在有形孰不幸甚無任懇欵涕戀之至謹遣某官奉表陳情以聞臣某言今日吳承倩至奉宣進止示臣關內河東副元帥司徒兼中書令汾陽王郭子儀奏捷狀李懷光於鹽州界積石川大破吐蕃一萬餘衆生擒斬首共六千餘級獲牛馬及器械不可勝數者伏以聖略遠加制勝前定神功不測告捷如期吐蕃忘國厚恩歲犯邊境陛下料其進退知其無策親以規模授於諸將以鹽夏之路地曠人稀嘗語臣曰此賊秋中必來擾鹽夏今覩成擒之處果於所料之中俘馘既多羊馬甚衆此皆宸心懸照不差毫髮天威遠被克壯師徒遂令智勇雲起妖氛電掃合符聖斷有此豐功子儀狀又云計日追蹤必當再捷者臣以蕃醜久逋聖誅從此氣衰必當瓦解坐觀無外之慶載美即敘之勳罷柝可期戢戈有望親承睿算忽驗於今奉覩戎捷不勝慶快之至臣某言臣聞春生秋殺天之令也撫順討逆國之教也故王者上法震耀下修典型雖當垂拱之朝亦整干戈之用伏見今月十日神策行營節度使尚可孤破藍田賊堡生擒賊偽署御史大夫仇敬忠斬獲共二千餘人者初從摩壘旋即合圍因乘破竹之威不漏枯池之網臣某中賀伏惟皇帝陛下聲教以文暢禍亂以武戮奄有華夏光臨統歷日者蕞爾朱泚怙亂涇原腥穢宮闕僭賊神器陰連叛將竊緩輿尸實由逆賊仇敬忠等姦凶相資狡惡為事因山據嶮欲抗雷霆之誅積粟挽芻冀延晷刻之命殊不知天威不遠睿算何逃未終瘈狗之狂已觸駭馬京之勢餘凶奪魄義衆增威掃氛祲於順風復京師於不日臣謬兼統帥濫總禁戎矢石不親虛當坐制之地凶渠尚在終決前驅之心無任慶快之至臣某言今月日中使至伏奉聖慈特賜寫臣容貌絹圖一本跪捧殊賜兢忭交馳臣某中謝臣聞兩漢功勳國朝將相咸傳風彩遂列丹青非為當代之榮亦欲後來之識臣功無半古貌未出㣥叨承明主之恩久冠台司之首重蒙渥澤特降畫工神既盡傳照無遺寫從衰朽之質別荷寵光分遭遇之形長含喜氣誠慚鎮俗頗近恭人祗嚴如見於大賓拂拭信歸於天造驅馳聖運撫躬未負於微誠唐突前賢顧影不無於愧色足以流傳不朽舒卷無窮君父回恩便是百身之報子孫為寶知承一顧之榮無任兢荷屏營之至臣某言今月日中使奉宣進止賜臣銀器壺瓶合各一銀碗一并蓋錦帳一錦九匹白熟綾十匹色羅五十匹雜綵一百三十匹者恩私荐及跪捧增慙雖雨露殊深而心魂若厲何則臣之受遇有異朝班任重元戎榮登上相自當盡瘁與國同憂豈比常人妄加厚賜况戎夷初退帑藏猶虛每欲傾家以供國用區區之願神明所知乞回此物復歸內府下以備六軍之寵賜上以奉一人之宴私臣之鄙懷於斯萬足其器物等臣已勒押衙試少監郭某詣右銀臺門別狀奉進右今月某日中使某至伏奉敕書手詔慰諭臣及三軍等并賜臣及大將春衣者捧戴忭躍實增慙懼臣功效微薄寵遇日深霜露適濡恩已承於挾纊清明才度賜又及於解衣仰服用於公家罷裁縫於私室已頒分大將訖各盡殪戎之力用申報國之誠臣某言臣以二月二十四日特奉渥恩授臣福建都團練觀察處置等使福州刺史兼御史中丞某月二十九日與中使某南北路分即以今月某日至所部上訖感戴踰涯局天增懼臣某誠惶誠恐頓首頓首臣聞度材任器論吏底祿三代所以直道而行迭相沿襲未之易也伏惟皇帝陛下聖謨廣運光宅天下德澤遐溢蒼生海隅至若閩越都會東南重鎮爰思俾乂宜者甚衆則中外咨謀孰非俊選豈臣薄劣一無所取超獎不次特稟宸衷是以前表上陳披肝布懇自茲夙夜不遑砥寧况今右武之狀方資輯睦安人之切又藉綏懷貢賦不差於時蠻夷得令安堵惟是四者之備皆臣之職分也誓將克勤竭力處約勵心日宣皇化以展微誠無任忘軀報國之至謹遣某官奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言臣某言臣伏奉某月日制書授臣某官即以今月日到任上訖臣某中謝臣緒承舊族師事通儒萬里成功雖無壯志九夷不陋庶纂前蹤二紀蠻陬三提郡印惟貞苦節以奉休辰牙管一雙未嘗關慮竹書兼兩何敢輕懷渭水之陰敝廬斯託每還初服常慊上農今者又即殊方復臨雜族固蒙聲教終遠文明謹當宣舉詔書撫安縣道媒官學舍畢納於人倫畜蠱帶牛盡移於地利至於因遐弄法挾遠生情縱漏嚴科必貽陰責山兼象縣江帶龍城撫心局天敢忘元造舉頭望日何處皇居憑宵夢以銜誠託歸飛而結懇無任瞻天戀闕之至臣某言伏奉今月日制除臣兼武州刺史本官勳封如故寵榮洊及忝竊逾涯心魂驚越啓處無地臣某中謝臣本虛賤生遇休明雖迹淹戎伍而功微涓滴自陛下聖理天下孝感神明任人惟舊在物無棄故臣得參定洛汭凱旋鎬京職分上卿位列特進材力之所不足官謗之所自貽局天蹐地心愧顏厚殞身滅迹無以上報猶且恤臣家孥放臣休沐遂嬰疾苦未及歸朝一年以還四命為牧內省尸素空勒竹符將免胄而有期且戴天而何日即以今月日至州上訖奉宣王化以靖方隅誓求人瘼勉守亭障無任負恩勵節之至臣某言伏奉恩命賜臣若干物寵錫自天兢愧無地臣某誠歡誠喜頓首頓首伏惟開元天地大寶聖文神武應道皇帝陛下寶運應期金秋表節慶邁賡歌之曲歡同率土之濱循之由衷無以展禮輒獻衣鏡式陳懇欵不謂聖慈回顧允納涓涔宸光曲臨行及惠賜載驚載懼罔知攸處臣本愚直早荷賞延陛下念舊勳庸擢臣專典御府盡忠不足報德勞力豈曰幹時空勤日慎之心以副夙興之戒無任感戴屏營之至謹奉表陳謝以聞臣某誠歡誠喜頓首頓首謹言臣某言伏奉今月二十二日恩制除臣堂弟叔冀青州刺史兼御史大夫充淄青等五州節度使不次之恩特出聖鑒大來之慶延及宗親倣徨若驚啓處無措臣某誠歡誠喜頓首頓首臣聞應天順人將將之道也保大定功將兵之道也然後賞罰二柄懸於日月伏惟光天文武大聖孝感皇帝陛下睿謨廣運元功莫測保天命以立極伏人心而戡難遂使妖不得為災謀不得及伐動皆殲潰以靖神人如叔冀者曷為力也徒以遠奉威靈獲全私懇雖堅守薄節轉戰微功而寵寄雄州榮兼獨坐為叔冀之非望實舉宗之所懼今復割海岱之衆創立節度之權超將中軍兼領仍舊受委斯重其憂轉深屬餘孽未除誅翦指日策勳飲至責其總戎勉勵之心仲伯之分以此思效不遑居寧臣緬維代業竊又自愧臣之父河西節度使先臣某叔冀之父平盧節度使先臣某皆中朝舊勳式遏寇虐東西故事人或賴焉而叔冀何功實膺克荷非臣所感時論皆榮追懷父子之軍信兼國家之報載兢載躍無以克堪臣雖隔中外義形骨肉事濟時康死復何恨無任感恩兢躍之至謹詣某門奉表陳謝以聞臣某言伏奉去月二十八日恩制加臣鳳翔尹仍充本府及秦隴等州節度觀察使伏以才淺遇深者敗公之本力微任重者職禍之由况鳳翔天京四方取則使增廉問千里準繩苟非其人是速官謗臣前月已再三懇讓實冀陛下矜臣不逮察臣無能忝侍朝廷獲保衰朽豈意堯曦下屬舜澤旁流荐降殊恩不許固讓恭承寵命感懼交懷臣某中謝伏惟陛下德耀三光勳崇萬古彞倫式序庶績其凝臣本謏才素乏籌略謬膺任使纍踐殊班顧無毫髮之功叨預邱山之寄今鳳翔近甸秦隴雄藩北有黨項之虞西有羌渾之患或阻絶我道路或侵軼我封疆王師出征則鳥散山谷官軍罷討則雨集郊圻臣雖不才庶竭孱懦必將勸分務穡訓卒利兵剿除凶殘式遏寇虐使黎元無俶擾之患里閈無暴殄之災下傾百慮之愚上補萬分之一臣無任感戴屏營之至臣某言伏奉十二月日敕追赴京仍待史翽到即發恩私曲被喜賀無從臣某中謝臣聞至誠感神雖微必應皇天鑒物無幽不通伏惟陛下道貫乾坤明懸日月千年一聖四海在寧臣實何人時逢昌運近緣荊襄微擾尚軫聖憂不以臣之非才特加節制持綱憲府曳履文昌一日九遷頻煩忝竊常恐委身江外朝滄海而無因豈意復命闕庭隨白雲而有望遙思捧日預想朝天臣子之情倍萬恆品不勝感戴之至臣某言某官某至伏奉敕書仍賜手詔並諸錫賚等宸聰睿眷一以及臣舉族同歡致身無據臣某誠歡誠喜頓首頓首臣聞自古明哲之君以化天下也莫不乘時制變因弊立法既資體國亦在便人常準大端不失其道伏惟寶應元聖文武皇帝陛下隱旒思理宵衣布政臨萬物而含宏不測明四察而英斷非常去邪勿疑則滌除汚俗渴賢致理則振拔時淹納強諫而如流佇沃心而不足微臣何幸屬會昌期今四罪咸伏八蠻慕義祿有所及刑無所寃再鼓登聞申明理匭發令而雍熙日洽推心而反側自安何負阻而不來何假威而不敗太宗聖化復見於今文命賡歌詎慙希古日宣九德千載難逢然則靡不有初前史攸誡知始知卒惟聖能之今陛下發自宸衷殷勤詔命克念作聖期於必然無任拜舞歡欣之至謹遣某官奉表陳賀以聞臣寧言中使馬承倩至奉傳德音特自宸眷矜臣束身遠鎮弟兄別離許令弟寬與臣相見義切君父恩連骨肉神魂驚駭不知所之三生有涯萬死難報臣某中謝臣寬最小衆所鍾憐臣在劍門強逾二紀形影相弔未嘗棄離忽遇聖朝委臣方面在寬何有纍踐班榮職綰通曹貴通三獨功慙汗馬業謝屠龍禁掖禮闈踰津越分每一念至刻心如焚縱脂分戰場血染邊草未之云報降此無圖上感推心下排飛謗惟此之際臣知所安但以蕃寇外虞蒼黃後命飲至清廟或未剋期所冀暫來不失宣撫臣之願也每羡聯行獨憐回鴈長思共易不著新衣無任感戴慙惶之至臣某言伏見某月日恩制除臣弟審給事中寵命自天驚魂無地永惟非據靦面何深臣某載兢載躍頓首頓首臣家本東周代傳素業衣冠祖襲豈望繁華至於伯仲雖聞詩禮但欲官從詎知生遇聖明日加重寄擢臣偏將之下録臣久戍之勤待罪西南時逾一紀分憂障塞心係兩蕃策無類于燒牛功有慚於求犬長懷尸素之責重貽門戶之羞今則恩聯兄弟澤及中外在審何有纍踐通班未聞三諫之勤仍忝八年之寵將何以曲承顧問接武名儒分陪掖下之榮專掌殿中之事在盈知缺居寵思危臨深履薄莫之為喻伏以王居渙汗方鎮途遙遠有所聞推謝無及空慙為人之擇不遂免冠之讓臣無任喜躍屏營之至臣某言自中使馬承倩送臣却至所部漢州回監軍使孟遊仙等續發北面拜天南旋舊鎮望九門而彌遠顧三蜀而何情如丹之心具列前表庶明臣子之分以期君父之知臣某中謝臣四度興師每各獻捷願將邊事親達宸聰比恐三軍阻臣行計潛裝密辦亦既經年上都贏糧傍路支費事皆前定誓衆遂行日望京關天威咫尺豈知時乖運末屬彼外虞徵發之期指蹤又切進退難處倣徨以還有心未明有口猶閉若撻之恥空思於堯舜戀主之誠倍慚於犬馬臣知衙事官王欣傅遙自經驅使積有歲時言行惟一為臣腹心當今切務具如別狀悉令密啓遠達由衷伏乞聖慈俯回神鑒仍賜容納許以畢辭天下幸甚天下幸甚其有不載文墨更令附口聞奏皆是刳心所陳豈為億中之説儻可裨補雖死猶生區區赤實敢希萬一臣以今月某日却至成都訖整齊戎事即赴行營西番動靜續冀聞奏衆星微象長拱北辰勺水細流盡朝東海惟臣不及飲恨何言無任感戀屏營之至謹奉表陳懇以聞臣某言某月日中使某至特蒙聖慈追贈妻單氏鄭國夫人捧拜絲綸載光窀穸臣某中謝臣亡妻所生男憑見任御史中丞充張孝忠軍職務臣頃應援易定之日屬京師變亂之初臣方誓死回軍星言赴難孝忠敵強勢弱切欲相留稍住則臣子不安往來則懷撫交闕男憑年甚幼小留定婚姻恭行廟勝之謀克覩中興之運憑雖昧稚似可優矜陛下猥賜寵章贈言聖善因子及母恭承孝理之風念往慰存為屈哀榮之典既申翟茀追詠鵲巢恩光既洽於幽明霈澤永流於泉壤憑緣所職久在定州殊私豈止於邱山感激實深於內外臣無任闕草土臣某言一昨瀝血上聞乞停新命聖情未察鄙心莫申捧對天書載崩載隕臣某中謝臣聞忠孝同道君親一致為子能孝為臣能忠苟或易茲固無所取臣幼多疹疾氣柔形羸臣父閔臣尫瘵時所鍾念一飯一藥皆自躬親十有餘年方至成立及臣委身戎幕效職塞垣頻歲馳驅頗乖視膳自授任中丞漸列班行始遂晨昏獲申祿養豈謂星霜未幾殃釁遽鍾拊心劈踊萬恨無及儻遂臣請得終禮制其於子道所負猶深如或遠別几筵苟從職事此則禽獸不若名教所無於家尚然於國何有况聖恩一昨用臣之意本為子儀奏聞當以蕃寇憑陵遠慮河中危迫謂臣舊將素習兵謀遂用起臣使當金革危難之日事或從權今郊壘無虞妖氛殘滅以臣苴絰更齒衣冠自顧形骸實慙面目伏祈元造許以終喪殘喘餘魂死將不朽無任迷謬崩迫之至臣炎言比者盛夏無雨農人觖望遂軫聖慮逮乎孟秋乃下明詔並表㣥祀神人協和膏澤旋降嘉穀無害粢盛可期此皆陛下明聖慈仁上應臣所以慚貌重位容身無地載積憂懼豈遑夙夜歷觀自昔帝王以理天下者未有不疇咨訏謨以熙帝載三五以降則有六相十六族共陳翼亮之功其在夏殷不易斯典逮周分六官秦置左右西漢因之以丞相東漢更名以三公魏晉雖有損益亦無獨任之道陛下拔臣江澤之外致臣密勿之地縱欲思報鴻造贊襄盛業其如智識薄劣力所不任常恐負乘之類無以塞責臣又聞之天有三台鼎有三足丞凝所以備四輔股肱所以象四體創明堂構大厦非一木之力焉况臣駑愚而久備位今舞干以化戎狄修好網羅再張兆人是賴朝多賢達野無遺逸能勝臣者則指顧皆是豈以萬務之重而獨委於凡流乎縱臣一朝敗纍分從隕越則既墜之迹死將安謝伏乞俯回天鑒退臣散地舉用伊皋使不仁者遠臣雖萬死誓無所恨不勝待罪兢惶之至臣某言左金吾將軍吳湊至奉聖旨兼賜臣母趙國太夫人臣嫂夫人并臣及將士等敕書以臣亡兄某特承憫問捧對哀咽摧裂肝心臣某中謝臣兄報恩未畢抱恨黃泉陛下俯聽鼓鼙永悲簪履哀痛之詔併歸一門撫存之恩將宥十世載悲載躍感戴無階以亡兄既忝信臣寡嫂則為近屬偏承恤慰曲被恩慈義同家人禮絶朝典喻臣老母保養高年念臣諸孤俾全餘喘無大無小上煩聖慈寵光親降於重臣優問必先於宿將殞身難報拜手增悲臣無任荷恩哽咽之至臣某言伏奉詔命賜王氏之姊隴西郡夫人恩澤送終寵賁中錫感戴無力幽冥有光臣某中謝臣少遭閔凶長姊覆育中限王事動成遠辭奉迎才至殂謝已及臣頃者近當劇賊遠候蕃戎方勤公家遂殺私禮瞻言痛慕有踰常品豈意詔書下降聖澤旁流念微臣之功封及其姊回聖代之茂典榮彼重泉未知何階仰答殊造庶將友愛之分用酬愷悌之恩臣無任荷恩哽咽之至
