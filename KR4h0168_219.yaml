front:
  text: 全唐文欽定全唐文卷二百十九崔融三
  hash: sha256:2929f86ca484adf2a4c1400f25c34308bcb839726c50c6e836acbdd37f228a06
body:
  text: 臣某等言自遏密纏悲山陵啓卜陛下情深撤帳戀切遊冠至於鹵簿吉凶途程日月莫不親垂睿旨顯發宸衷由是川后競馳山祇薦委雲物澄霽景氣清和靈驂電轉非因下人之力神輦風行自有上天之助山河道路曾不艱虞木石犬馬咸當感悅豈非大孝所洽通於神明至聖所宏動於天地者矣伏以某日吉辰永安神寢郊原四合門闕九重傍奉園林近瞻京邑元宮一閟紫禁長辭萬國同軌五情分裂伏惟皇太后陛下哀慕永往聖懷難居臣等早侍軒墀謬霑簪履攀龍不及顧慕軒轅之臺耘鳥相驚屏營會稽之野限以歸從末由詣闕無任悲感之至謹遣某奉表以聞臣某言臣聞坤德承天所以曲成萬類陰靈配日所以兼燭四方故媯水佐虞塗山翼夏殷之興也有莘光其業姬之盛也太姒贊其功用能家道以正國風茲始伏惟陛下睿知神武文思聰明光復丕基惟新寶運包混元而建極體造化而開階流形日用而不知含氣風從而自樂皇后坤維發祉軒宮正位黃雲不散白氣常流玉璽載懷椒塗以峻洛書疇能諭其懿河圖不足紀其靈外理克和內德惟茂臣濫逢明聖忝當姻戚榮寵被於門庭光耀生於道路西京六族在昔何優東國七家方今未重魚鱉咸若在品物而同歡鳥獸率舞顧微臣而倍躍臣聞飲食之禮聖賢所貴以奉君人以親宗族敢因斯義輒罄丹誠伏望時降特恩聽臣上禮雖玉饔珍味固無假於獻芹而臣下微心實有同於傾藿瞻言抃踴伏佇矜遂無任悃款踴躍之至謹奉表陳情以聞伏聽勑旨臣伏見去年元日明堂受朝讀時令謹按讀時令自魏晉巳來創有此禮每歲立春立夏大暑立秋立冬常讀五時令帝升御座各服五時之色尚書令已下就位尚書三公即奉時令就位伏讀凡五時皆如之所以祗迓天和至宋朝亦行斯禮此後尋廢迄至國初但存讀令之文亦不行其事自陛下御極創建明堂舊典缺本莫不補輯每至元日受朝布政因以時令之禮附於元日行之今布政等禮已停不合更讀時令所司因循去年元日尚讀有乖古典事須停廢臣謹與鸞臺鳳閣考古詳議巳停讀訖不敢不奏臣楚客言臣聞古之聖君慎擇賢佐故軒轅得力牧而為五帝先夏后得咎繇而為三王祖殷之盛也伊尹格於皇天姬之隆也虢叔聞於上帝斯皆應風雲之會依日月之光社稷繫以興衰時政由其輕重粵若大周之有國也天策金輪聖神皇帝提封千里光宅四天道化淳醲神功靜默雖堯年無事久聞童子之謠而漢家用人或取胸奴之笑臣某中謝臣疲驂強策卒無行地之功決羽曾飛終罕沖天之望今臣經術淺短才能朴略言不足以補世行不足以勵時徒以枝葉微姻葭莩末屬遂得拔擢泥滓騫翥雲霄食君厚祿不能有所輸報受君殊寵不能有所發明茫然政途妨此賢路外慙衆口內愧諸心朝廷亦何異捨陸而泛舟膠柱而調瑟當域中之有道豈天下之無人嘗深鼎覆之憂每切鼓妖之懼臣之懇懇非欲自保其身臣之區區切慮上塵於國今者契丹大勦默啜自來六合大同四方向化加以朔旦冬至鼎命維新五星若連珠二曜如合璧謂宜退不肖進賢良與天同休與人更始又聞管夷吾有言曰德義未明於朝而使居尊位者則良臣不進也功力未見於國而令處重祿者則勞臣不勸也臣有何德而居之臣有何功而處之臣雖至愚敢忘先誡伏乞陛下察匹夫之志思仲父之言坦至公之方宏滅私之道羊叔子之辭開府臣事君以忠庾元規之讓中書君使臣以禮博求於衆廣聽於人停臣檢校夏官輟臣平章政事臣得避位清切待罪上方罄竭單誠庶幾或濟伏惟陛下容納纎陋鑒揆愚蒙使周勃無浹背之慙虞邱有退身之地則雖死之日猶生之年矣無任悃款屏營之至謹詣闕奉表陳情以聞云云臣某言臣以凡薄幸承基蔭一霑官侶三十餘年為子未能報鞠育之恩為臣未能答生成之惠公私靦冒夙夜驚惶久欲退奉家園以避賢路直以犬馬識戀木石感恩猶希罄竭未即陳叫今臣母虞國夫人妾盧氏行年八十志力衰謝體氣虛羸先苦胝癖近微風委臥牀枕帛丿糸歷歲時扶人不行加帛不暖比者西京有宅老母在堂臣以留司之餘尚接和顏之半自忝膺皇眷祗命神都子奉局而莫從母倚閭而空切加以門衰祚薄長兄早世昏定晨省惟臣一身但臣之所以奉檄載馳釋巾從務貪榮徇祿惟迫於甘旨淺知薄能豈期於聞達伏惟皇太后陛下天地容納雲雨霑被録臣勳舊賜臣邱山臣雖小人豈忘大德然以聖人在上孝理天下整齊風俗砥礪名教臣縱不才其如禮法何臣雖無識其若朝廷何無任丹血勤懇之誠謹冒死詣闕請罷官歸養奉表以聞方違軒扆伏紙惶戀云云臣某言臣伏奉恩旨授臣澧陽縣令臣才疏藝薄植此無庸命偶時來遘茲多幸逢上聖之初劫參太平之末位槐檀驟徙亟遊銓館之門草芥何為忽枉槱薪之紱召見於赤墀之下垂恩於紫霄之上豈徒任好之魄忽上於鈞天固亦闞澤之名遂升於飛日仰殊私而載惕顧匪服而增慚雖剗迹都畿永無闕庭之望然委心蓬艾長懷雨露之仁幸欣就日之明敢憚乘流之遠但以州縣之號與臣亡父諱同迫切私情不獲遄赴伏乞天慈永錫聖造曲成宏以孝理之風慜其心瞿之日使得策名他職陳力異邦則地義天經實奬於名教糜軀粉骨豈酬於鴻恩無任懇迫之至謹昧死陳表以聞伏見有司請稅關市事條不限工商但是行人盡稅者臣謹按周禮九賦其七曰關市之賦竊惟市縱繁巧關通末遊欲令此徒止抑所以咸增賦稅臣謹商度今古料量家國竊將為不可稅謹件事迹如左伏惟聖旨擇焉往古之時淳朴未散公田藉而不稅關防譏而不征中代已來澆風驟進桑麻疲弊稼穡辛勤於是各徇通財爭趨作巧求徑捷之欲速忘歲計之無餘遂使田萊日荒倉廩不積蠶織休廢弊縕闕如飢寒猥臻亂離斯瘼先王懲其若此所以變古隨時依本者恆科占末者增稅夫關市之稅者謂市及國門關門者也惟斂出入之商賈不稅來往之行人今若不論商人通取諸色事不師古法乃任情悠悠末代於何瞻仰濟濟盛朝自取嗤笑雖欲憲章姬典乃是違背周官臣知其不可者一也臣謹按易繫稱庖犧氏沒神農氏作日中為市致天下之人聚天下之貨交易而退各得其所班志亦云財者帝王聚人守位養成㣥生奉順天德理國安人之本也士農工商四人有業學以居位曰士闢土殖穀曰農作巧成器曰工通財鬻貨曰商聖王量能授事四人陳力就職然則四人各業久矣今後安得動而搖之蕭何有云人情一定不可復動班固又云曹參相齊齊國安集大稱賢相參去屬其後相曰以齊獄市為寄慎勿擾也後相曰理無大於此者乎參曰不然夫獄市者所以并容也今若擾之姦人安所容乎吾是以先之夫獄市兼受善惡若窮極姦人無所容竄久且為亂秦人極刑而天下叛孝武峻法而刑獄繁此其效也老子曰我無為而人自化我好靜而人自正參欲以道化其本不欲擾其末臣知其不可者二也四海之廣九州之雜關必據險路市必憑要津若乃富商大賈豪宗惡少輕死重義結黨連㣥喑嗚則彎弓睚眥則挺劍少有失意且猶如此一朝變法定是相驚乘茲困窮或致騷動便恐南走越北走胡非惟流迸齊人亦自擾亂殊俗又如邊徼之地寇賊為鄰興胡之旅歲月相繼儻因科賦致有猜疑一從散亡何以制禁求利雖切為害方深而有司上言不識大體徒欲益帑藏助軍國殊不知軍國益擾帑藏逾空臣知其不可者三也孟軻又云古之為關也將以禦暴今之為關也將以為暴今行者皆稅本末同流且如天下諸津舟航所聚旁通蜀漢前指閩越七澤十藪三江五湖控引河洛兼包淮海宏舸巨艦千軸萬艘交貿往還昧旦永日今若江津河口置鋪納稅納稅則檢覆檢覆則遲留此津才過彼鋪復止非惟國家稅錢更遭主司僦賂船有大小載有多少量物而稅觸途淹久統論一日之中未過十分之一因此擁滯必致吁嗟一朝失利則萬商廢業萬商廢業則人不聊生其間或有輕訬任俠之徒斬龍刺蛟之黨鄱陽暴謔之客富平悍壯之夫居則藏鏹出便竦劍加之以重稅因之以威脅一旦獸窮則搏鳥窮則攫執事者復何以安之哉臣知其不可者四也五帝之初不可詳矣三王之後厥有著云秦漢相承典章大備至如關市之稅史籍有文秦政以雄圖武力捨之而不用也漢武以霸略英才去之而勿取也何則關為禦暴之所市為聚人之地稅市則人散稅關則暴興暴興則起異圖人散則懷不軌夫人情莫不背善而樂禍易動而難安一市不安則天下之市必搖矣一關不安則天下之關必動矣況澆風久扇變法為難徒欲禁末流規小利豈知失元默亂大倫魏晉眇小齊隋齷齪亦所不行斯道者也臣知其不可者五也今之所以稅關市者何也豈不以國用不足邊寇為虞一行斯術冀有殷贍然也微臣敢借前箸以籌之伏惟陛下當聖朝御元籙沈璧於洛刻石於嵩鑄九一作寶鼎以窮姦坐明堂而布政神化廣洽至德潛通東夷暫驚應時平殄南蠻才動計日歸降西域五十餘國廣輪一萬餘里城堡清夷亭堠靜謐比為患者惟苦二蕃今吐蕃請命邊事不起即日雖尚屯兵久後終成弛柝獨有默啜假息孤恩惡貫禍盈覆亡不暇征役日已省矣繁費日已稀矣然猶下明制遵太朴愛人力惜人財王侯舊封主新禮所有支科咸令減削此陛下以躬率先堯舜之用心也且關中河北水旱數年諸處逃亡今始安輯倘加重稅或慮相驚況承平歲積薄賦日久俗荷深恩人知自樂卒有變法必多生怨生怨則驚擾驚擾則不安中既不安外何能禦文子曰帝王富其人霸王富其地理國若不足亂國若有餘古人有言帝王藏於天下諸侯藏於百姓農夫藏於庾商賈藏於篋惟陛下詳之必若師興有費國儲多窘即請倍算商客加斂平人如此則國保富強人免憂懼天下幸甚臣知其不可者六也陛下留神繫表屬想政源冒茲炎熾早朝宴坐一日二日機務不遺先天後天虛心密應時政得失小子何知率陳瞽辭伏紙惶怖議曰太極生而兩儀見聖人作而萬物覩仰以觀法於天夫君人者以天下之目視以天下之耳聽以天下之智慮以天下之力動故號令能究而臣情得上聞八千年之初不可得而詳矣夫二十四氣之後請榷揚而陳之軒轅氏之立議明臺斯所以上官於賢也陶唐氏之清問衢室斯所以下聽於人也以大舜之德也而有告善之旌以大禹之功也而有欲諫之鼓然則三皇垂策而下濟五帝擊手而上行唐虞按轡而光宅禹湯驅馳而奄甸雖步驟之道不同而啓沃之情一貫可不務乎今天皇垂衣裳負黼扆獨得千年之景運猶懼一物之未安發德音採輿議憂選司之或爽慮考績之弗明此天皇堯舜之用心也有司伏奉明旨以吏部兵部選人每年萬人已上及其銓量十放六七疲於來往虛費資糧者愚臣敢不悉以陳之夫唐虞稽古建官惟百舉八才命四子上有以明其化下有以晏其風康戈口之歌於是乎出郁乎之德於此自興夏商倍之亦克用乂濟濟多士文王以寧自周道無章秦原競逐張官設府班員積於書選衆舉才受垂疑一於典憲降及漢魏下逮周隋豈其然歟無聞焉爾皇家再造區夏重張宸極四神驟雨而來遊五聖奔星而下降禮明樂備天平地成八百餘國之君長襲賓廷之冠帶七十二代之帝王仰仙閭之軌躅量其土宇固可頓豎亥而迷大章算其臣人固已讋容成而驚隸首室多忠信家盡孝慈老夫不知帝力童子羞稱霸道文也武也左之右之實蕃有徒不可勝既出門無咎適顯於明時比屋可封何驚於聖俗誠望博謀俊德敷求哲人兩曹妙選三官備設然後收其杞梓搴其蕭稂其有狀犯贓私罪當懲貶案覆已定景迹具存者此等既未合得官遠來徒為勞費伏望許同選例限以歲年諸色入流每年參選資品未著伎藝未工此等自知未合得官情願更加修習伏望許同選例録以選勞關外諸州道里迢遞河洛之邑天地所中伏望詔東西二曹兩都分留放既畢同赴京師選人每年長名常至正月半後伏望速加銓促以程期夫然有署者不來無德者不至來者就而之至者速而遣之因其物情亦何疲於來往順其人欲亦何費於資糧入官考績先憑善最比來乃有不論德行惟據功夫奬勸之道未為折衷者愚臣敢不明目以論之書不云乎三考黜陟唐帝虞帝之遺烈燦焉禮有之矣百官會計文王武王之彞典存焉京房進課式之言漢王之所未暇盧育苦真偽之雜魏后竟以施行盡善之文明詔攸在至如不論德行惟據功夫者此由外州郡牧未盡得賢監司長官時有其濫褒貶不遵令式高下隨其愛憎至公外爽曲私內結伏望播告天下申明舊章其有德有行府寮共推者雖有公坐小失重加褒進之無才無識朝廷罕稱者雖有公事微效量加抑退之德行雖不能茂因之以勤勞者亦量加褒進之然後命繡衣驄馬糾舉內外隨狀推科以情案察刑茲無赦令在必行夫然德行為上功夫次之折衷之方庶幾此道微臣等才謝知今學慙半古海內無事君子盈朝天下有道庶人何議謹議議曰春生秋殺天之常道冬狩夏苗國之大事豺祭獸獺祭魚自然之理也一乾豆二賓客不易之義也上自天子下至庶人莫不揮其鸞刀烹之鶴鼎所以充庖故能幽明感通人祇輯睦萬王千帝殊塗同歸今若禁屠宰斷弋獵三驅莫行一切不許便恐違聖人之達訓紊明王之善經一不可也且如江南諸州乃以魚為命河西諸國以肉為齋一朝禁止百姓勞弊富者未革貧者難堪二不可也加有貧賤之流刲割為事家業倘失性命不全雖復日戮一人終慮未能總絶但益恐嚇惟長姦欺外有斷屠之名內誠鼓刀者衆勢利依倚請託紛紛三不可也雖好生惡殺是君子之小心一作恩而考古會今非國家之大體但使順月令奉天經造次合禮儀從容中刑典自然人得其性物遂其生何必改革方為盡善伏惟聖主採擇謹議議曰北狄之為中國患者久哉唐虞以上為獯鬻殷周之際曰獫狁西京東國有胸奴冒頓焉當塗典午有烏丸鮮卑焉拓跋世則蠕蠕猖狂宇文朝則突厥恣睢斯皆名號因時而改種落與運而遷五帝不能臣三王不能制兵連禍結無代不有長策遠算曠古莫聞夫胡者北狄之總名也其地南接燕趙北窮沙漠東接九夷西界六戎天性驕傲覘伺便隙鳥飛獸走草轉水移自言天地所生日月所置南有大漢北有強胡更相馳突至今陷潰者靡歲而寧焉漢興高皇以百萬衆窘於平城之下國人羞之逮至武帝患其如此赫然發憤肆志遠略建元中使張騫始通西域既而列四郡據兩關以斷胸奴右臂乃復度河湟築令居塞以絶南羌北交於是乘障塞絶亭燧出長城數千里矣於斯時也承文景元默之後國用富強太倉之粟相因水衡之錢貫朽練兵選將深入窮追傾府庫之財殫士馬之力行人使者歲月亭障二師驃騎首尾關河餓虎未摧其國已耗馲駝既死其人亦殄乃至造皮幣算緡錢稅舟車榷酒酤夫豈不懷深惟長久之計然也胸奴於是乎孤特遠竄羽檄不行焉始孝武開西域之後為置使者校尉領護之宣元哀平其道不替王莽篡位貶易侯王由是西域怨叛與中國隔絶並復從屬胸奴斂稅重刻諸國不堪命光武中興皆遣使求內屬自建武至於延光三絶三通至唐太宗方事外討復修孝武舊迹並南山至於蔥嶺為府鎮煙火相望焉其在高宗勵精為政不欲廣地務其安人徭戍繁數用度減耗復命有司拔四鎮其後吐蕃果驕大入西域焉耆以西所在城堡無不降下遂長驅東向踰高昌壁歷車師庭侵常樂縣界斷莫賀延磧以臨我燉煌伏賴主上神鑒通幽沖機測遠下嚴霜之令興時雨之兵乃命右相韋待價為安息道行軍大總管安西都護閻溫古為副問罪焉時也先命蘭州刺史行軍司馬宋師將料敵徒倍道據磧賊逢有備一戰而走我師追躡至於焉耆糧道不繼而止竟亦無功朝廷以畏懦有刑流待價於瓊州棄溫古於秦州放棄二罪而諸將咸肅至王孝傑而四鎮復焉今若拔之是棄已成之功忘久安之策小慈者大慈之賊前事者後事之師奈何不圖也四鎮無守則狂胡益贍必兵加西域諸蕃氣羸恐不能當長蛇之口西域既動自然威臨南羌南羌樂禍必以封豕助虐蛇豕交連則河西危河西危則不得救況復邊境守禦之具未整內郡武衛之備未精方須命將出師興役動衆向之所得今之所失向之所勞今之所逸可不謂然乎而議者但憂其勞費念其遠征曾不知其蹙國減土春秋所譏杜漸防萌安危之計夫南羌者請試言之往孝武皇帝築令居時㣥羌盟約與胸奴合兵至十餘萬共圍枹罕遣李息為擊平之是則羌胡同惡有自來矣遽而依西海鹽池左右漢遂因山為塞河西地空稍徙民以居之至宣帝時先零種豪言願得度湟水逐人所不田處為畜牧將軍趙充國以為不可後羌因緣前言遂度湟水郡縣不能禁乃遣充國與諸將擊平之是則願牧紿言非止於今年耳且漢之胸奴曷若今之默啜今之勃律孰與漢之南羌頃者若兵稍遲留賊先據要害則河西四郡已非國家之有今復安得而拔之乎何謂非國家之有但莫賀延大磧者伊州在其北沙州在其南延袤向二千里中間水草不生焉每災風橫沙石飛吼行人晝看朽骨以知道路夜視斗柄以辨方隅往往遇駝泉時時得馬酒而後度焉蓋駝馬死者十四五人畜疲極若北有強寇則難以度磧漢兵難度磧北伊西延安及諸蕃無救則疲兵不能自振不能自振則為賊所役屬賊吞之又得肥饒之馬馬肥人逸漢復焉得懸軍深入乎有以知通西域之艱難也磧南有沙甘肅四川並以南山為限山南即吐渾及吐蕃部落賊知漢兵不得度磧必踰南山分路而下磧北賊與突厥通結相合而前則涼州以西勢必危矣故曰非國家之有拔之非便主上以默啜逆天置之度外神武不殺上仁好生遂令匍匐請命聳踴知恥中國不聞犬吠之警邊庭不識狼顧之憂聖人之用兵也如此則知啓修政而有扈奔農修德而夙沙至禹焚甲而夷人附舜舞戚而苗民來為不虛也賈誼書云周成王問鬻子曰聖王在上位使人富且壽夫富則可為也壽不在天乎對曰聖王在上位則天下無軍兵之事則人免於一死而得一生矣君積於道吏積於德人無凍餒則免於二死而得二生矣君積於仁吏積於愛則刑罰廢人無夭閼之誅則免於三死而得三生矣使人以時而用之有節人無癘疫則免於四死而得四生矣今聖主在上人得四生稟氣流形孰不幸甚然為邦之道安不忘危漢時單于上書願保塞請罷邊備郎中侯應習邊事以為不可東漢時西羌作亂徵天下兵賦役無已司徒崔烈以為宜棄涼州議郎傅燮厲言曰斬司徒天下乃安涼州天下要衝國家藩衛世宗拓境列置四郡議者以為斷胸奴右臂烈為宰相不念為國思所以弭之之策仍欲割棄一方萬里之土若使左袵之虜得居此地土徑甲堅因以為亂此天下之至慮社稷之深憂竟從燮議今宜日慎一日雖休勿休採侯應不可之言納傅燮深慮之議然後風為號令雷為折衝繕甲兵思將帥上與天合德下與地合明中與人合心善戰者不陳如斯而已矣拔舊安之四鎮委難制之兩凶求將來之端考已然之驗伏念五六至於再三愚下固陋知其不可伏惟朝廷再三察焉謹議
