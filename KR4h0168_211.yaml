front:
  text: 全唐文欽定全唐文卷二百十一陳子昂三
  hash: sha256:e88120da857c317412576630b85caa7aa363039da8479e77e43e4c409fe1af88
body:
  text: 臣伏見四月三十日敕廢同昌軍蜀川百姓每見免五十萬丁運糧實大蘇息然松茂等州諸羌首領二十年來利得此軍財帛糧餉以富已潤屋今一旦停廢失其大利必是勾引生羌詐作警固以恐動茂翼等州復使國家徵兵鎮守若松茂等州無好都督則此詐必行旦夕警固必有發者一發巳後警動蜀州朝廷不知徵兵赴救兵至賊散靡弊更甚伏乞選擇茂州都督嚴加斥堠乃命御史一人專在按察若有詐妄即録奏稱加法以懲其姦庶可久長安帖不然受其弊蜀中運糧既停百姓更無重役至於租庸合富府庫今諸州逃走戶有三萬餘在蓬渠果合遂等州山林之中不屬州縣土豪大族阿隱相容徵斂驅役皆入國用其中遊手惰業亡命之徒結為光火大賊依憑林險巢穴其中若以甲兵捕之則烏散山谷如州縣怠慢則劫殺公行比來訪聞有人説逃在其中者攻城劫縣徒衆日多誠可特降嚴加敕令州縣長官與使人設法大招此戶則劫賊徒黨自然除殄其三萬戶租賦即可富國若縱而不括以養賊徒蜀川大弊必是未息天恩允此請乞作條例括法蜀中諸州百姓所以逃亡者實緣官人貪暴不奉國法典吏遊容因此侵漁剝奪既深人不堪命百姓失業因即逃亡凶險之徒聚為劫賊今國家若不清官人雖殺獲賊終無益天恩前使右丞宋爽按察蜀州者乞早發遣除屏貪殘則公私俱寧國用可富若官人未清劫賊之徒必是未息以前劍南蠹弊如斯即日聖恩停軍息役若官人清正劫賊翦除百姓安寧實堪富國惟乞早降使按察謹狀聖歷元年五月十四日通直郎行右拾遺陳子昂狀臣伏見劍南諸州緣通軌軍屯在松潘等州千里運糧百姓困弊臣不自恤竊為國家惜之伏以國家富有巴蜀是天府之藏自隴右及河西諸州軍國所資郵驛所給商旅莫不皆取於蜀又京都府庫歲月珍貢尚在其外此誠蜀國之珍府今邊郡主將乃通軌一軍徭役弊之使百姓貧窮國用不贍河西隴右資給亦減臣伏惟松潘諸軍自屯鎮已來於今相繼百十餘年竟未聞盜賊大侵而有尺寸之效今國家甘心竭力以事之臣不知其故伏惟念惜臣聞上有聖君下得直言賤臣敢越次冒昧以奏臣在蜀時見相傳云聞松潘等州屯軍數不逾萬計糧給餉年則不過七萬餘石可盈足邊郡主將不審支度乃每歲向役十六萬夫夫擔糧輪送一斗之米價錢四百使百姓老弱未得其所比年以來多以逃亡臣伏以吐蕃陛下未忍即滅松潘屯兵未可廢散若準此賦斂每年以十六萬夫運糧臣恐更三年吐蕃未殄滅劍南百姓不堪此役愚臣恐非聖母神皇制敵安人富國強兵之神算者也愚臣竊見蜀中耆老平議劍南諸州比來以夫運糧者且一切並停請為九等稅錢以市騾馬差州縣富戶各為馬屯主稅錢者以充腳價各次第四番運輦不用一年夫運之費可得數年軍食盈足比於常運減省二十餘倍蜀川百姓永得休息通軌軍人保安邊鎮京臺府庫河西軍馬得利供輸其資臣伏審計便宜體大非一二狀俱盡陛下若以此奏非虛或可採者請勒臣付所司對議得失然後具條目一一奏聞若臣苟為謬妄無益國家請罪死不赦臣聞古者富國強兵未嘗不用山澤之利臣伏見西戎未滅兵鎮用廣內少資儲外勒轉餉山澤之利伏而未通臣愚不識大體伏見劍南諸山多有銅礦採之鑄錢可以富國今諸山皆閉官無採鑄軍國資用惟斂下人乃使公府虛竭私室貧弊而天地珍藏委廢不論以臣所見請依舊式盡令劍南諸州準前採銅於益府鑄錢其松潘諸軍所須用度皆取以資給用有餘者然後使緣江諸州遞運散納荊衡沔鄂諸州每歲便以和糴令漕運委神都太倉此皆順流乘便無所勞擾外得以事西山諸軍內得以實中都倉廩蜀之百姓免於賦斂軍國大利公私所切要者非神皇大聖誰能用之管仲云聖人用無窮之府蓋言此也臣某言臣伏見神皇陛下恭已受圖遐想至理將欲制御戎狄永安黎元不欲煩撓蒸人故為無益賤臣朝不坐宴不豫軍國大事非臣合言伏見松潘軍糧費擾過甚太平百姓未得安居臣參班一命庶幾仁類不敢自見避諱忍之不言所以不懼身誅區區上奏冒越非次伏待顯戮惶悚死罪死罪臣竊聞宗懷昌等軍失律者乃被逆賊詐造官軍文牒誣召懷昌昌等顓愚無備陷沒今諸軍敗失東蕃固知然恐安東阻隔未審此詐國家若無私契與安東往來臣恐凶賊多端詐偽復設萬一被其矯命更失其圖乃是資長賊權沒陷府城此固宜天恩巳應先有處分然臣愚見不敢不言又賊初勝不即西侵者深恐圍略安東以自全計若安東被圍略則遼東以來非國所制伏乞天恩早為圖之臣聞天子義兵不可以怒發怒則衆懼急則人搖人搖則賊得其勢故昔者聖人守靜以制亂持重以服姦大義常存人無疑懼臣伏見恩制免天下罪人及募諸色奴充兵討擊者是捷急之計非天子之兵且比來刑獄久清罪人全少奴多怯弱未慣征行縱其募集未足可用況當今天下忠臣勇士萬分未用其一契丹小孽假命待誅何勞免罪贖奴損國大義且陛下富有四海一戰未勝遂即免罪募奴若更有他虞復何徵發臣恐此不可威示天下臣聞聖人制事必理未萌所以姦不敢謀賊不得起臣聞吐蕃近日將兵圍州數日即退或云此賊通使墨啜恐沙止遏故以此兵送之臣雖未信然惟國家比來勍敵在此兩蕃至於契丹小醜未足以比類今國家為契丹大發河東道及六胡州綏延丹隰等州稽胡精兵悉赴營州而緣塞空虛靈夏獨立今冰生河合草秋馬肥秦中北據隴右亦關東鄰黨凶羯姦謀覘知此隟驅其醜類大盜秦關隴右馬㣥是國所寶防備遠策良宜豫圖不可竭塞上之兵使凶虜得計伏願詳審臣聞所養非所用所用非所養理家必弊在國必危故明君不畜無用之臣慈父不畜無益之子今朝廷三品五品受國寵榮天恩賞賜府庫虛耗食人之祿死人之事恩養聖朝甚矣厚矣及邊有小賊則云無人驅使又勞聖恩遠訪外人外人先無寵祿臨難又不肯殉節然則國之所養者總無用之臣朝之所遺者乃有用之士今不收有用厚養無用欲令忠賢效力凶賊滅亡以臣愚見理不可得近者遼軍張立遇等喪律實由內外不同心宰相或賣國樹恩近臣或附勢私謁祿重者以拱默為智任權者以傾巧為賢㣥居雷同以殉私為能媚妻保子以奉國為愚陛下又寬刑漏網不循名實遂令綱紀日廢姦宄滋多今國家第一要者在稍寬兵期山南淮南去幽州四千里所司使十月上旬到計日行百里四十日方到即今水雨如此又徵符到彼未久當日便發猶不及期況未便發且日行不可百里若違限者死國有常刑到不及期懼罪逃散為賊此更生一患縱倍程趁期亦恐不及若違不誅則軍不可統若違必誅則全衆皆怨況兵疲不堪用吳廣陳勝為盜由此切急切急即日江南淮南諸州租船數千艘巳至鞏洛計有百餘萬斛所司便勒往幽州納充軍糧其船夫多是客戶遊手隳業無賴雜色人發家來時唯作入都資料今已到京又勒往幽州幽州去此二千餘里還又二千餘里方寒冰凍一無資糧國家更無優恤但切勒赴限比聞丁夫皆甚愁歎又諸州行綱承前多僦向一作勾至都糴納今儻有此類向滄瀛糴納則山東米必二百巳上百姓必騷動今國家不優恤又無識事明了人檢點勾當知租米現在虛實又未宣恩旨慰勞兵夫惟切勒赴限倘在道逃亡此糧有萬一非意損失則東軍二十萬衆坐自取敗為賊所圖切急切急楊元感以此為亂實軍國大命山東百姓國家比以供軍矜不點募近聞東軍失利山東人驕慢乃謂國家怕其粗豪不敢徵發今街談巷議多有苟且之心伺國瑕隟頗搖風俗國家大政須人無二心若縱懷二姦亂必漸臣伏思即日山東愚人有亡命不事産業者有遊俠聚盜者有姦豪強宗者有交通州縣造罪過者如此等色皆是姦雄國家又不以法制役之臣恐無賴子弟暴橫日廣上不為國法所制下不為州縣所羈又不從軍又不守業坐觀成敗養其姦心在於國家甚非長計以臣愚見望降墨敕使臣與州縣相知子細採訪有粗豪遊俠亡命姦盜失業浮浪一作漂食富族強宗者並稍優與賜物悉募從軍仍宣恩旨慰勞以禮發遣若如此則山東浮人安於太山一者以懾姦豪異心二者得精兵討賊不須免奴稽胡等又身既在軍則父兄子弟自不敢為過昔漢祖征山東使蕭何鎮關中漢軍數敗蕭何每發關中子弟以助漢軍三秦無盜亂之患漢軍有強雄之勢蓋以此道是也夫亂㣥敗衆者惟在姦雄姦雄既羈亂弊自息伏乞聖慈早圖之詩云無縱詭隨式遏寇虐紫袍緋袍緑袍金帶牙笏告身金銀器物等即日軍中巳集入賊有期臣欲募死士三萬人長驅賊庭一戰掃定軍中未有高爵重賞無以勵勇使貪伏望天恩賜給前件袍帶告身器物二千事庶以勸勵士衆未敢虛用比來將軍不明賞罰所以兵不齊心今聚十五萬衆戈甲糧餉日費萬金不早克定恐所費彌廣山東百姓貧弊不可再役特乞天恩允臣所請臣伏見陛下憂勞天下百姓恐不得所又發明詔將降九道大使巡察天下諸州兼申黜陟以求人瘼甚大惠也天下百姓幸甚臣竊以為美矣未盡善也何以言之陛下所以降明使豈非欲令天下黎元衆庶知陛下夙興夜寐憂勤念之邪欲天下賢良忠孝知陛下夙興夜寐思任用之邪欲使天下姦人暴吏亦知陛下夙興夜寐務欲除之邪陛下聖意必若以此而發使乎則臣愚昧見陛下之使有未盡善也若愚臣所謂使者皆先當雅合時望為衆人所推仁愛足以存恤孤丨旬分賢明足以進拔幽滯剛直足以不避強禦明智足以照察姦非然後使天下姦人畏其明而不敢為惡也天下強禦憚其直而不敢為過也天下英竒慕其德而樂為之用也天下孤寡賴其仁而欣戴其恩也夫如是然後可以論出使故輶軒未動於京師天下翕然皆巳知矣今陛下使猶未出朝廷行路市井之人皆以為非任朝廷有識者亦不稱之夫天子之使未出魏闕朝廷之人皆以輕之何況天下之衆哉夫欲黜陟求瘼豈可得也陛下所以有此失者在不選人亦輕此使非天下之大任故陛下遂大失至於此也宰相徒以為常但奉詔而行之苟以出使為名不求任使之實故使愈出而天下愈弊使彌多而天下彌不寧其故何哉是朝廷輕其任也輕其任則不擇人不擇人則其使非實其使非實則黜陟不明刑罰不中朋黨者進貞直者退徒使天下百姓修飾道路送往迎來無益於聖教耳臣久為百姓實委知之陛下欲令天下黎庶知陛下夙興夜寐憂勤政化不可得也故臣以陛下大失在於此也夫欲正其末者必先端其本清其流者必先潔其源自然之符也國家茲弊亦已久矣今陛下若不重選此使貴得其人天下黎元必以為陛下尚行尋常之政不能革此弊也則賢人必不出貪吏必得志丨旬分獨必哀吟天下百姓無荷賴於陛下此使也臣不勝有願願陛下與宰相更妙選朝廷百官使有威重名節為衆人所推者陛下因大朝見親御正殿集百寮公卿設禮儀以使者之禮見之於是告以出使之意殷勤警戒無敢或遂授以旌節而發遣之先自京師而訪豺狼然後攬轡登車以清天下若如是臣必知陛下聖教不旬月之間天下家見而戶習也昔堯舜氏不下席而天下理者蓋黜陟幽明能折中爾今陛下方開中興之化建萬代之功天下瞻望冀見聖政此之一使是陛下為政之大端也諺曰欲知其人觀其所使不可不慎也若陛下必知不可得其人則不如不出使出使煩數無益於化但勞天下之人是猶烹小鮮而數撓之爾伏惟陛下察照臣伏惟陛下當今所共理天下欲致太平者豈非宰相與諸州刺史縣令邪陛下若重此而理天下乎臣見天下理也若陛下輕此而理天下乎臣見天下不得理也何者宰相陛下之腹心刺史縣令陛下之手足未有無腹心手足而能獨理者也臣竊觀當今宰相巳略得其人矣獨刺史縣令陛下獨甚輕之未見得其人是以腹心雖安而手足猶病而天下至今所以未有大利爾臣竊惟刺史縣令之職實陛下政教之首也陛下布德澤下明詔將示天下百姓必待刺史縣令為陛下謹宣之故得其人則百姓家見而戶聞不得其人但委棄有司而挂牆壁爾陛下欲使家興禮讓吏勗清勤不重選刺史縣令將何道以致之邪愚臣竊見陛下未有舟楫而欲濟江河不可濟也臣比在草茅為百姓久矣刺史縣令之化臣實委知國之興衰莫不在此職也何者一州得賢明刺史以至公循良為政者則千萬家賴其福若得貪暴刺史以徇私苛虐為政者則千萬家受其禍矣夫一州禍福且如此況天下之衆豈得勝道哉故臣以為陛下政化之首國之興衰在此職者也臣伏見陛下憂勤政理欲安天下百姓無使疾苦然猶未以刺史縣令為念何可得哉臣何知陛下未以刺史縣令為念竊見吏部選人補一縣令如補一縣尉爾但以資次考第從官遊歷即補之不論賢良德行可以化人而拔擢見用者縱吏部侍郎時有知此弊而欲超越用人則天下小人巳囂然相謗矣所以然者習於常而有驚怪也所以天下庸流莫不能得為縣令庸流一雜賢不肖莫分但以為縣令庸流資次為選不以才能任職所以天下淩遲百姓無由知陛下聖德勤勞夙夜之念但以愁怨以為天子之令遣如此也自有國來此弊最深而未能除也豈不甚一有可惜二字哉昔漢宣帝有言曰朕之所共理天下者豈非良二千石乎故宣帝之時能委任矣伏願陛下與宰相深知妙選以救正此弊使天下之人稍得以安臣有計然甚鄙近未能著於書願陛下興念與明宰相圖之以安天下幸甚幸甚臣聞天下有危機禍福因之而生機靜則有福機動則有禍天下百姓是也夫百姓安則樂其生不安則輕其死輕其死則無所不至也故曰人不可使窮窮之則姦宄生人不可數動動之則災變起姦宄不息災變日興叛逆乘釁天下亂矣當今天下百姓雖未窮困軍旅之弊不得安者向五六年矣夫妻不得相保父子不得相養自劍以南爰至河隴秦涼之間山東則有青徐曹汴河北則有滄瀛恆趙莫不或被飢荒或遭水旱兵役轉輸疾疫死亡流離分散十至四五可謂不安矣幸得陛下以仁聖之恩憫其失業所在邊境有兵戰之役一切且停遂使窮困之人尚得與妻子相見父兄相保各復其業獲以救窮人心稍安殆半年矣天下可謂幸甚愚臣竊賀陛下得天下之機能密靜之非陛下至聖大明不能如此也愚臣今所以為陛下更論天下之危機者恐將相有貪夷狄之利又説陛下以廣地強武為威謀動甲兵以事邊塞陛下或未知天下有危機萬一聽之臣懼機失禍搆則天下有不可奈何也詩不云乎人亦勞止汔可小康惠此中國以綏四方故臣願陛下垂衣裳修文德去刑罰勸農桑以息天下之人務與之共安然後使遐荒蠻夷自知中國有聖人重譯而入貢愚臣竊以為當今天下之大計也伏惟陛下念之近者隋煬帝不知天下有危機自以為威德廣大欲建萬代之業動天下之衆殫萬人之力兵役相仍轉輸不絶北討胡貊東伐遼人於是天下百姓窮困人不堪命機動禍搆遂喪天下此是不知天下有危機而信貪佞之臣冀收夷狄之利卒以滅亡者也隋氏之失可以殷鑒豈不大哉伏惟陛下察之國家所伐吐蕃有大失策中國之衆半天下受其弊然遂事不諫當復何言陛下不以臣愚芻蕘可採一賜召臣至玉陛得以口論天下幸甚臣子昂言臣本下愚未知大體今月十六日特奉恩敕賜臣紙筆遣于中書言天下利害天之降命敢不對揚而孤負聖恩萬一無補死罪死罪謹率愚見封進以聞塵聽玉階伏闕纍息臣子昂誠惶誠恐頓首頓首謹言臣聞聖人制事貴於未亂所以用成功光濟天下大業臣伏見國家頃以吐蕃九姓亡叛有詔出師討之遣田揚名發金山道十姓諸兵自西邊入臣聞十姓君長奉詔之日若報私讎莫不為國家克翦凶醜遂數年之內自率兵馬三萬餘騎經途六月自食私糧誠是國家威德早申蕃戎得效忠赤今者軍事已畢情願入朝國家乃以其不奉璽書妄破回紇部落責其專擅不許入朝便於涼州發遣各還蕃部臣愚見竊為國家危之深恐此等自茲成隟何以言之國家所以制有十姓者本為九姓強大歸伏聖朝十姓微弱勢不能動故所以委命臣妾為國忠良今者九姓叛亡北蕃喪亂君長無主莫知所歸回紇金水又被殘破磧北諸姓已非國家所有今欲掎角亡叛雄將邊疆惟倚金山諸蕃共為形勢有司不察此理乃以田揚名妄破回紇之罪坐及十姓諸豪拒而遣還不許朝覲臣愚以為非善御戎狄制於未亂之長策也夫蕃戎之性人面獸心親之則順疑之則亂蓋易動難安古所莫制也今阻其善意逆其歡心古人所謂放虎遺患不可不察且臣昨於甘州日見金山軍首領擬入朝者自蕃中至已負其功見燕軍漢兵不多頗有驕色察其志意所望殊高與其言宴又詞多不順今更不許入朝謁疑之以罪與回紇部落復為大讎此則內無國家親信之恩外有回紇報讎之患懷不自安鳥駭狼顧亡叛沙漠則河西諸蕃恐非國家所有且夷狄相攻中國之福今回紇已破既往難追十姓無罪不宜自絶今若妄破回紇有司止罪揚名在於蕃情足以為慰十姓首領國家理合羈縻許其入朝實為得計今北蕃既失虜不自安廟勝之策良恐未爾事既機速伏乞早為圖之臣伏見今年五月敕以同城權置安北府此地逼磧南口是制胸奴要衝國家守邊實得上策臣在府日竊見磧北歸降突厥已有五千餘帳後之來者道路相望又甘州先有降戶四千餘帳奉敕亦令同城安置磧北喪亂先被飢荒塗炭之餘無所依仰國家開安北府招納歸降誠是聖恩洪流覆育戎狄然臣竊見突厥者莫非傷殘羸餓並無人色有羊馬者百無一二然其所以攜幼扶老遠來歸降實將以國家綏懷必有賑贍冀望恩覆獲以安存故其來者日以益衆然同城先無儲蓄雖有降附皆未優矜蕃落嗷嗷不免飢餓所以時有劫掠自相屠戮君長既不能相制以此盜亦稍多甘州頃者抄竊尤甚今安北府見有官羊及牛六千頭口兵糧粟麥萬有餘石安北初置庶事草創孤城兵少未足威懷國家不贍恤來降之徒空委此府安撫臣恐降者日衆盜者日多戎虜桀黠必為禍亂夫人情莫不以求生為急今不以此粟麥不以此牛羊大為其餌而不救其死人無生路安得不為㣥盜乎㣥盜一興則安北府城必無全理府城一壞則甘涼已北恐非國家所有後為邊患禍未可量是乃國家故誘其為亂使其為賊非謂綏懷經遠之長策也且磧北諸蕃今見大亂亂而思理生人大情國家既開綏撫之恩廣置安北之府將理其亂者以慰喻諸蕃取亂存亡可謂聖圖宏遠矣然時則為得事則未行何者國家來不能懷去不能制空竭國用為患於邊取亂之策有失於此況夷狄代有其雄與中國抗行自古所病倘令今有勃起遂雄於邊招集遺散收強撫弱臣恐喪亂之衆必有景從此亦國家之大機不可輕而失也機事不密則必害成聖人之至誡今北蕃未定降者未安國家不早為良圖恐坐而生變乞得面奏指陳其利害邊境幸甚幸甚臣竊見河西諸州地居邊遠左右寇賊並當軍興頃年已來師旅未靜百姓辛苦殆不堪役公私儲蓄足可憂嗟頃至涼州問其倉貯惟有六萬餘石以支兵防才周今歲雖云屯田收者猶在此外略問其數得亦不多今國家欲制河西定戎虜此州不足未可速圖又至甘州責其糧數稱見在所貯積者四十餘萬石今年屯收猶不入計臣觀其衝要視其山川信是河西扼喉之地今北當九姓南逼吐蕃二虜姦回凶猾未測朝夕警固頗有窺覦甘州地廣糧多左右受敵其所管戶不滿三千堪勝兵者不足百數屯田廣遠倉蓄狼籍一虜為盜恐成大憂涼府雖曰雄藩其實已甚虛竭夷狄有變不堪軍興以河西諸州又自守不足今肅鎮防禦仰食甘州一旬不給便至飢餒然則河西之命今並懸於甘州矣此機一失深足憂危又得甘州狀稱今年屯收用為善熟為兵防數少百姓不多屯田廣遠收獲難遍時節既過遂有凋固疑所以三分收不過二人力又少未入倉儲縱已收刈尚多在野臣伏惟吐蕃桀黠之虜自為邊寇未嘗敗衄頃緣其國有亂君臣不和又遭天災戎馬未盛所以數求和好寢息邊兵其實本畏國家乘其此弊故卑辭詐偽苟免天誅今又聞其贊普巳擅國權上下和好兵久不出其意難量比者國家所以制其不得東侵實由甘涼素有蓄積士馬強盛以扼其喉故其力屈勢不能動今則不然甘州倉糧積以萬計兵防鎮守不足威邊若使此虜探知潛懷逆意縱兵大入以寇甘涼雖未能劫掠士人圍守城邑但燒甘州蓄積蹂踐諸屯臣必知河西諸州國家難可復守也此機不可一失一失之後雖賢聖之智亦無奈何臣愚不習邊事竊謂甘州宜便加兵內得營農外得防盜甘州委積必當更倍何以言之甘州諸屯皆因水利濁河灌溉良沃不待天時四十餘屯並為奧壤故每收獲常不減二十萬但以人功不備猶有荒蕪今若加兵務窮地利歲三十萬不為難得國家若以此計為便遂即行之臣以河西不出數年之間百萬之兵食無不足而致倉廩既實邊境又強則天兵所臨何求不得管仲云聖人用無窮之府積不涸之倉事非虛言也
