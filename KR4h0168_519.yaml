front:
  text: 全唐文欽定全唐文卷五百十九梁肅三
  hash: sha256:5f90bc845180ec5798cb02c116ce7b77d45e1f0ea6cb8a708d67633da8eb1991
body:
  text: 倉曹掾祿秩位次載於甲令在漢魏閒與參軍事其職各異五府州及郡皆有其官北齊天保中又授參軍以繫官曹之號蓋取夫以文吏而參武事隋由之國家亦因之河南府領二十六縣為主東郡環地千里邦畿之內征賦之入凡蓄聚之物皆於其司一郡之移用郡吏之稍食又出焉故其務殷其事積常為他曹劇居之者不勤則廢不廉則敗不明則耗斁干沒之患生其職或擢登南宮及御史府故有司常綜其名實考其功績然後授之伊陽張君閿鄉李君今並為其官李以貞固稱張用文敏著予謂命官之職事與二掾之才美不可以不紀遂直筆書之其兩曹位次與前政名氏端如貫珠列於記之左右在春秋時列國各有屬邑其主者魯謂之宰楚謂之尹晉謂之大夫秦時天下始置令長宅一同之內操賞罰之柄有民人焉有社稷焉風俗成敗本乎身黎元安否繫乎政其體大矣自京口南被於淛河望縣十數而吳為大國家當上元之際中夏多難衣冠南避寓於茲土參編戶之一由是人俗舛雜號為難治加以州將有握兵按部之重邑居當水陸交馳之會承上撫下之勤征賦郵傳之繁百倍他縣夥乎其中不可勝紀大歷十一年天官精選可以長民者於是范陽盧公由太原府祁縣令為之公外寬內明敬事而信政本於仁飾身以文下車三年闔境之人安土樂義而不知安樂之所從來蓋平之以和也士君子立身論道之通塞不論位之升降吳縣下畿服一等公俯而為之抑選部為官擇人而公履道從政所由然也予知公者敢錄其實書於東序以播其令聞時十四年二月甲子翰林學士梁肅記自華而東東距洛師抗雄都臨大道其縣有七若壤接天府號因舊國鄭為之首又斜瞵其六焉天官每銓士補吏常屬意於此三科之選其人尤精比畿服之偏者難易相隔不啻數等其地望可知也元年春光正之後賢侯才子曰蘭陵蕭倕以貞敏恪慎再命為尉掌倉曹出納與工德修飾之事事舉職修而令名隨之暇日謂子曰是邑之作非舊也初在於州東北隅廣德中以賊臣周智光以河潼叛放暴兵爇官寺且脇誘將吏生立已祠而棟宇斯崇及王師致誅牧民者從便宜而重改作乃刷滅凶慝之遺塵徙而治焉是廳蓋祠之餘也嘻曩者憑而為妖今乃即而為政合於大順用鑒將來是宜書之以告昧者予於是著之屋壁且以紀夫人之美若風俗疆土與置邑之年代分於尉今監察御史黎逢嘗編為鄭志藏在州府中可覆視也故不書時御史中丞董公為邦之三載秋九月安定梁肅記歲在戊辰揚州牧杜公命新作西門所以通水庸致人利也冬十有二月土木之工告畢從事徵其始請刻石以為記云書載濬畎澮距川傳稱為川者決之使導然道與政損益政舉則道舉政汙則道汙汙則革革則久賢哲之治也當開元以前京江岸於揚子海潮內於邗溝過茱萸灣北至邵伯堰湯湯渙渙無隘滯之患其後江派南徙波不及遠河流浸惡日淤月填若歲不雨則鞠為泥塗舟檝陸沈困於牛車積臭含敗人中其氣為疾為瘵長民者時興人徒以事開鑿既費累鉅萬或妨奪農功殫財竭力隨導隨塞人不寬息物不滋殖百有餘年矣貞元初公由秋官之貳出鎮茲土既下車乃驗圖考地謀新革故相川原度水勢自江都而西循蜀岡之右得其浸曰句城湖又得其浸曰愛敬陂方圓百里支輔四集盈而不流決而可注圖以上聞帝用嘉允乃召工徒修利舊防節以斗門釃為長源直截城隅以灌河渠水無羨溢道不迴遠於是變濁為清激淺為深潔清澹澄可灌可鑒然後漕輓以興商旅以通自北自南泰然歡康其夾隄之田旱暵得其溉霖潦得其歸化磽薄為膏腴者不知幾千萬畝野人誦曰膴膴原田自今以始歲其豐年都人誦曰沔彼流水我邦是紀鍾美不知嚮非我公有先物之知移俗之才則曷能運可大之謀蠲累世之弊繇旬朔之勞致無疆之逸宜乎人之永歎也如此按陂塘本魏廣陵守陳登所設時人愛其功而敬其事故以名之謝文靜成堰又以召公之德為稱有魏以還五百餘載不朽之績及公而三皆在斯邦不其盛歟水門之作將以重成功示長利非登臨游宴之為嘻後之人抑可以知學之制與政損益政舉則道舉道汙則政汙崑山吳東鄙之縣先是縣有文宣王廟廟堂之後有學室中年兵饉薦臻堂宇大壞方郡縣多故未遑繕完其後長民者或因而葺之以民尚未泰故講習之事設而不備大歷九年太原王綱以大理司直兼縣令既而釋奠於廟退而歎曰夫化民成俗以學為本是而不崇何政之為乃諭三老主吏整序民飾班事大啟宇於廟垣之右聚五經於其閒以邑人沈嗣宗躬履經學俾為博士於是遐邇學徒或童或冠不召而至如歸巿焉公聽治之暇則往敷大猷以聳之博考明德以翼之優而柔之使自求之揭而厲之使自趨之故民見德而興行行於鄉黨洽於四境父篤其子兄勉其弟其不被儒服而行莫不恥焉僉曰公之設教矯其末不墮其本易其俗不失其宜也傳曰本立而道生昔崔瑗有南陽文學志王粲有荊州文學志皆表儒訓以著不朽遂繼其流為縣學記俾來者知我邑經藝文教之所以興是歲龍集乙卯公為縣之明年也沙門釋法禺啟精舍於建安寺西北隅與比邱眾勸請天台湛然大師轉法輪於其閒尊天台之道以導後學故署其堂曰止觀初南嶽祖師受於惠文禪師以授智者大師於是乎有止觀法門大旨止謂之定觀謂之慧演是二德攝持萬行自凡夫妄想訖諸佛智地以經微言括其源流正其所歸圓解然後能圓修圓修然後能圓證此其畧也自智者五葉傳至今大師當像法之中誕敷其教使在家之徒撥邪反正如大雲降雨無草木不潤升其堂者甚眾其後進入室不十數人法禺與居一焉予以為法門有三觀遂徵之此堂蓋非緣不成空也有之以為利假也不廣不狹不奢不陋中也又以淨名之喻宮室謂於虛空然後不能成隨其心淨則一切境淨作一物而觀者獲數善焉又况我大師居之為斯人之庇乎小子忝游師門故不敢不志時大歷九年冬十一月日記趙郡李亠兊一作政仲山大歷中由祕書郎為晉陵令思所以退食修政思所以端已崇儉乃作茅亭於正寢之北偏功甚易制甚朴大足以布函丈之席稅履而躋賓位者適容數人則仲山約身臨人顓固一之道可知矣解龜後繼其任凡六七人每居於斯必稱作者之美而仲山安貧養性寓於舊邑者十有二年方牧知之又檄而攝焉仲山清德之嗣孝於家勤於官其攝也念前之非久政之未成也乃必躬必親必誠必信慎思不懈而眾務咸敘未有及者必訪問咨度擇善而從之則其治足徵也君子謂仲山居處恭執事敬出入一紀再臨斯人有以見位不苟進仕不苟行大來必俟時於是乎始矣予曩睹亭之起今又觀進德之美輒直筆志之謂之晉陵茅亭記時貞元元年夏五月記御史中執法范陽盧公用直清之德掌中邦憲恭睦之道用宏家法嘗謂其屬監察御史梁肅曰我王父廣陽公以明德懿識嚮用休福羽儀於中朝我伯父嗣公以文學政事載揚茂烈光績於前人皆肇久史職發於京兆紀綱之任洎予之季曰偘亦能恪慎不懈踐修其官繼處於廨之右堂惟二代徽在茲偘也允迪在茲吾子嘗號史臣宜存於篇以示後裔肅辭不得命以為在昔司馬氏世序天地鄭武莊世為卿士宋魚氏之左師晉籍父之司典下洎乎樂之制氏歷之疇人俱以傳業彰乎舊史故傳稱善守先代雅詠維其有之雖大細不倫職事或異其纂修一也惟京之大惟兆之眾天子之都四方之極糾而轄之是稱司錄其地劇其選精常與殿中蘭臺南宮郎位旋相出入初廣陽公諱齊卿由司倉掾為之驟登郎官更貳本府布澤於彭滑幽徐之人端護春宮崇贈少保開元初嗣公諱成務罷錄岐下軍事實居其任其後作牧於壽於杭於濮於洺於魏繼受元社以處太原咸有嘉績藏在冊府今戶部郎偘始遠哲昆聯事之嫌詔解柱後惠文以就斯職中丞之拜也又有臺府臨察之避在官之屬其為人而廉文而不害在選部辨論三登試言第考茲任也詳敏稱一時之最薦紳先生評天下之事謂如廣陽之家風施於子孫中丞之仁德至於兄弟斯盡美矣若三世居一官同一署遞以全德揚於當時又難能也噫古人所稱方斯其類乎爾小子拜命著紀書於本廳之東序用闡夫廣陽之宗且為名臣世官之表時貞元庚午閏四月梁肅記黃河自崑崙山東會溟漲九折迴互鹽泉各一儒者書以為海目則郇瑕氏之地瀆流其長觀乎北浴陵阜南瀕山麓湛湛烟碧浩無春冬蒸騰雲霓出入日月亦云廣矣雖吞噏坰隧代增淳鹵而利倍農穡有殷家邦貿惟從山湧不加海交兩都之軌逵延萬賈之資貨是人不厭也當武后聖政務述省方鳴鑾載臨流潦旋敗洎皇明道發澤漸殊垠天之既啟鹽乃旋復非夫蟠虯神應坤次靈孕亦曷能旌昬明籌負勝矣帝所宜念賁然來思分天牧以莅擇藩佐而貳賢能鮮墜於事則其允字通閈閎扼拓磯之左隅鄰大邑之東部崇府庫歲望乎儲蓄樞管鍵夕俟乎閉藏茲乃慮終於始也邦貴康食戒之克勤人非忘勞道在悅使大命日下巡功歲移廣岸砥平而可礪修畦綺分以如織是時也春光奪炎氣興洪溝浚白波騰或滀或汩以泙以漰狀雲洩而雨駭或花明而雪凝京坻蘊崇豆區嘉量隷戶徵算鹽人揭書民無不供先薄稅以從賦君孰與足逮黎庶而必分固非擅權利貴貨易土登陸而雷軿流日驟水而雲艫擊星律有變給用無絕傳曰山澤林鹽國之寶也茲其是焉若周物揆情易人推類施之求報大道之元德也明則啟祚聖人之知變也降人納汚明君之藏垢也羹餗調膳賢人之入用也包四美而世濟資百工而國貞將以樹善永年非石無以紀垂裕裔冑非文無以揚則我晉寶達於萬方也予嘗覽葛洪所記以為神仙之道昭昭焉足徵已試論之曰夫人之生與萬物同彼由妄而生由生而死生死相沿未始有極聖人知其本虛也其體無也示以大道俾性其情無妄而反諸本焉反本則不生不生則不死然後能周游太虛出入萬變朝為羲農暮為堯舜或存而亡或亡而存天地莫能覆而載也陰陽莫能陶而蒸也寂然不見其眹矘乎不識其門是之謂至神至神也者視天地四海若毫末而已萬古之前億載之後若一息而已列禦寇謂不生者能生不化者能化蓋謂彼也不性其情者則不然其用有際其動有待存亡相制倚伏相繫其道有數數窮則壞故列禦寇謂生者不能不死死者不能不化蓋謂此也彼仙人之徒方竊竊然化金以為丹鍊氣以存身覬千百年居於六合之內是類龜鶴大椿愈長且久不足尚也噫後之人迭為所惑不思老氏損之之義顏子不遠之復乃馳其智用以符籙藥術為務而妄於靈臺之中有所念慮其末也謂齒髮不變疾病不作以之為功而交戰於夭壽之域號為道流不亦大哀乎按神仙傳凡一百九十人予所尚者唯柱史廣成二人而已餘皆生死之徒也因而論之以自警云予聞先覺云大寶流輝之不變曰常在宥布和之盛典曰教率土知化之歸宗曰行交感人心之至極曰證然則以道行御其時以法性合其運當應物之際與顯晦同其光恢揚至化自他昭著者實播厥鴻名欽恭文思協和至極四德克彰者實存乎妙體格變㣥家歷觀諸行至典克修庶績有成者實賴乎本宗信以授人大明宗極厥旨厥幾有補於將來者實存乎妙用綜博㣥元以立成訓風行十方率用歸順者實存乎妙教矣法王之身有三曰法曰報曰應報身從無邊功德生應身從無邊眾生生法身從如如無有生分別說三其極一貫原夫大道之體離一切相是其本也積大德施大慧合大道成大身是其報也出入十界隨所利見如水月鏡像是其應也自因至果故不得不有其報療一切病故不得不行其應應亦名也報亦名也名乎哉其實相之賓乎經云觀身實相觀佛亦然嘗試思之以為眾生蓋反佛者也是三相在佛為三德在凡為三障一者生死生死即空寂空寂即法身也二者煩惱煩惱即智慧智慧即報身也三者結業結業即解脫解脫即應身也三德成於悟三障成於迷迷而不復也遂自絕於佛乘哀哉予嘗齋心命工裂素作繪聖德之形容可舉目而見見而後思思而後知至知至之路蓋由是矣瞻仰之不足遂為之讚庶觀者有以知三如來不在心外不可以有無心取讚曰大哉法體體如虛空不始不終不垢不淨不邊不中是謂涅槃是謂法身諸佛性海是無上正真右讚昆盧遮那佛妙哉報體體法而大由清淨功得色無礙得色無礙成實智慧範圍法界盡未來際右讚盧舍那佛神哉化功其化無方休有烈光以百億色身播百億國土啟權顯實或默或語示我寂滅雙林之下右讚釋迦牟尼佛三聖一身本無有異恒沙諸佛其道一致眾生唯妄覺妄斯至懸象著明用鑒心地右總讚二十五有之內根塵相磨生滅相蕩斡流旋轉往復無際如來憫之於是開智慧門示諸法如義俾夫即動而寂即寂而照假文字以筌意一色空而觀妙然離一切相得無住心二乘遠而不見十住見而不辨如是信解乎難哉隴西李氏先夫人常州刺史獨孤公之伯姊也聖善之德自天而植不捨母訓受持是經內涵道機外順化物十一年八月即世於晉陵郡舍公茹尚右之痛追無作之福纘微言於金石庶幽贊乎妙報嘻傾沙界以施而施有窮等山王之大而大有終唯金剛空印永不壞滅蓋夫人福慧之所以臻也於是乎讚脫三解軛入一相地資惠力兮追琢道妙為佑與道實懿德兮石可轉而字有磷福不極兮聖之道無形無名形以感著名以功立蓋物有病於妄我則喻其醫物有滯於闇我則照其光其形無方有感必應神哉仁哉惟唐代宗孝武皇帝之甥某邑長公主之子曰蘭陵蕭位稟靈天潢承訓家範其性孝其氣醇大歷中丁先人銀青光祿大夫光祿卿贈汝州刺史府君之憂自反哭至於大祥哀敬之禮動無違者長公主戒之曰欲報之德豈止於斯乎歸誠上仁可以徼福爾其志之位於是泣遵德命爰用作繪八十之物十二之願赫然如見其全身肅然如聞其音聲自外入者或疑亂怖投體膜拜而不知其粉繪也嘻昔人有一至之性或通於神祗以致福慶矧夫孝子之哀思大聖之元運幽讚之力可思量哉安定梁肅悅聞其風乃為讚曰披聖籍兮覽元功赫神光兮被無窮勿用藥兮醫之王感斯應兮萬福彰系於梁兮出於唐蓄純孝兮思不忘綽大象兮景焜煌洞冥冥兮福穰穰蓮華經普門品載菩薩盛德大業詳矣蓋變動不測之謂神窮理盡性之謂聖慈悲廣運之謂力三者一貫是為妙覺功不並化尊無二上故佛為法王我為素臣或擬諸形容稱其名號資不匱之力報罔極之恩誰其為之有齊孝女初尚書吏部郎趙郡李公第六女歸於博陵崔綽大歷初居公憂泣血無聲至於大祥既而思求冥祐徼福上聖鍼縷之閒成就莊嚴其用心也至矣乎公之立行立言天下所推焉存為人範沒無鬼責前際之勝因不可度已此功德也蓋以展蓼莪者蒸蒸之心崔氏之子以肅嘗獲升公堂以讚述見託痛梁木之壞慟懷恩之烈故像設之所敢著乎辭讚曰菩薩之德相炳而慈憑身以儀之女也孝思不可方思冀冥福於斯欲報之德斯焉取斯菩薩以大慈運大願宏大道濟大苦俾三界之閒利見大人如大地之無不持載故號曰地藏有祕書少監兼侍御史李公之甥太原王氏之第某女頃遭先夫人棄敬養拊擗以暨於小祥或曰此孝也匪報也以報為功則惟地藏乎乃手鍼縷之事黼而黻之則而像之煥乎有成毫相畢觀者然後知聖善之內訓淑女之孝思至矣哉是可以錫爾類也祕書向予道之且命讚曰皇矣上仁乃聖乃神厥功備兮有女伊棘孝思罔極厥成至兮聖儀彰之景福將之無有既兮得妙道者聖之大感罔極者孝之至孝有欲報之志聖有善應之功神其願運其力故悲智行焉發乎心彰乎事故像設作焉誰其為之有齊孝婦孝婦姓某氏前新城令柳誠之室也先是居皇姑豆盧氏夫人憂自卒哭及期呼天之聲不絕自期至於大祥追福之功不息乃誦金偈乃瞻粹容爰用五綵以成大像莊嚴相好昭焯煥爛凜乎若披毫光而演善願啟清真而屏濁亂至矣夫乃為讚曰光彼千界赫琉璃兮勿藥之師號大醫兮不形之形妙相具兮窈冥希夷元功著兮孝婦之烈心不渝兮章施五彩福皇姑兮貞元元年冬十月會稽龍興寺釋法忍與門弟子道俗衣冠之眾以五綵色寫釋迦如來像於所居之宇吉祥天女像在左多聞天王像在右德容威神煥赫熙怡為佛股肱作人依歸至矣哉聖人無形以萬利見為形形生功功生名是像元德存乎前經二上人以子嘗探微言之所緣起資為之讚以示昧者云上聖有作體神立德天人遵兮我示妙法清我濁劫示存存兮日月歸依是威是儀破㣥昬兮巍乎北王休有烈光護下土兮俾爾含識躋彼樂域萬物睹兮金甲雄姿示威宣慈我何怒兮唯聖所起吉祥止止天德至兮粵惟首出佐佑於佛成大事兮高明婉柔願與道游滋景福兮息達本二沙門有則知此聖言圖此妙相示後昆兮實以善利與元元兮不形之形無形神人之形也當法王御世有元聖曰觀音以感通之妙用運溥博之宏應協讚無上弻成元功神行無方形亦丕變傳此像設施於㣥生此其至矣夫彼聾盲者方駭其手目之多以致恢詭之誚隨諸毀墮無升濟期可不為大哀乎故壽王府士曹參軍韋侯修身以仁處順而化夫人京兆杜氏既孀始虞哀且顧禮追惟冥祐為素為繢相近而理遠誠著而感深易稱神而明之詩云聿懷多福盡在是矣讚曰良人下世杳冥冥兮配德追遠心不寧兮裂素表聖為丹青兮昭赫綵繪光儀形兮祐彼君子歸福庭兮維唐肅宗文明武德大聖大宣孝皇帝以大功平大難以大孝纂大業少康匡復下武繼文丕丕崇崇千古同德亦既厭代去而上僊衣冠留於喬岳曜魄歸乎太極惟夏四月十有八日實遺弓之辰皇上追聖祖之烈光申孝孫之永慕載揚至道之賾用宏上清之福爰詔國工以是日畫大羅天尊像一軀混成真精揮倬神化包裹六極覆露九皇巍乎道主之德相既明至哉聖人之孝思可見小臣肅拜手受詔為之讚云至陽之原無窮之門大羅之界象帝之尊文明武德有赫孝宣道光乾元人畏軒轅翼翼睿宗嗣武統天或圖尊容追孝前文肅拜稽首臣敢颺言惟此功德載煥載元既祐聖神介福無邊亦祐我后壽考萬年於戲至人不可得而見之矣所可見者像設而已藥師者大醫之號琉璃者大明之道所以洗蕩八苦振燭六幽巍乎其有功復歸於無物蓋其賾也皇帝德女唐安公主委化歸真之辰先是命國工繢佛像爰設妙色載揚耿光以追福祥以迪幽贊祐我貴主達於真乘至哉聖人之慈也小臣某拜手稽首而作偈言藥師妙法王光被於十方惟皇大聖主文命敷下土二聖合元德廣運慈悲力莊嚴成儀形延福於女英女英受茲福亦以流萬族道無方所以法不垢不淨聖人有以見㣥生大迷也乃方以聚之淨以極之應形主之列聖輔之俾夫感而通通而應應而不窮其慈善之功乎皇朝故中書舍人贈華州刺史吳郡朱君夫人扶風馬氏以淑行為宗姻之表明識通出世之道洎居華州之喪晝哭哀慕動為律度既而曰予聞妙覺之用無幽不燭宜憑上善以福吾夫迺用五采章施五色發揮德容及二聖輔煥乎有見聖人之妙相與夫人之至誠希夷之中協用休福於是乎在矣肅嘗以文墨從華州之游爰美成功或感斯慟讚曰兌方有國兮至聖居之乃示淨妙兮振此㣥疑美蓮月兮煥金色色相永思兮不可得夫人洞此幽贊力佑我往哲福無極人既往道斯存掌王綸沒州尊體有美德貽後昆誕躋妙域參聖神誰謂至道默昬昬讚曰法王崩於竺乾露寢二千歲矣有像設糟粕留示後世上士得之超詣實際其次奉之為祐為道為津為梁應之遲速視感之深淺觀其所感聖人之情可見矣杜陵吏鮑君游信道之士也建中興元際君游丁先夫人憂孝純誠至哀感亦至矣謂至道杳冥在擬議之外聖人形容居瞻仰之內有慈力可以追孝有宏願可以祐神我儀圖之或讚休福於是合用綵繡煥焉發輝天光照臨睟容肅穆有二元聖為翼謂左右二菩薩以夫人母德昭聞君游孝思不怠雖欲無利功德能仁其肯捨諸嚱夫孝子之志聞一毫之福可以及親者則竭力而奉之矧夫教行於夷夏理貫於幽明而無良之徒坐生異論以蕞爾愚管之所不及齪然世籍之所不書乃尢其先人謂作福無益抑犬豕之類爾何人倫足稱予既美君游之孝因而志之俾不肖者企及云爾道可佐皇而隘於帝治是以崆峒箕山之長揖於軒堯也德宜輔王而偶生霸世則四皓之所以晦明於漢氏也噫周道絕而王澤涸秦短世而漢雜興六合披攘兵不暇戢則四公軒軒然鴻飛於冥時也天下大寶一人攸繫苟蔑嫡崇庶則亂是用長而公僂然俯定儲后權也處則以時出則以權時以全己之道權以安天下之器得非知幾者歟易謂知幾其神乎四公體之故曰時合道合時塞道塞生非其時與道消息四公之謂歟贊曰秦失其鹿豪傑並逐鸞鳳何依白雲深谷英英南山采采紫芝漢以劒起吾誰與歸棲心化元澹泊無為禮物雖至先生默而惟彼貞石確不可轉儲皇不安我德用顯大君是驚惠位是寧四公屈身天下和平弋者何思鴻飛冥冥
