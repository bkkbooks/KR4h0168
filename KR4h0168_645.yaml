  text: 全唐文欽定全唐文卷六百四十五絳字深之趙州贊皇人擢進士宏詞元和六年拜中書侍郎同中書門下平章事十年出為華州刺史入歷兵部吏部尚書文宗朝檢校司空為山南西道節度使纍封趙郡公監軍使楊叔元怨絳激募兵為亂害之年六十七贈司徒諡曰貞
