body:
  text: 開元中賜海內以正朔示天下以禮樂舞紫極於宮庭饗元元於雲幄乃樹以旌旃設以宮懸由中出以表靜用上薦於告虔盛德之容昭之於行綴至和之節奉之以周旋激乎流音之下存乎大樂之先八佾以敷肅然舞於清廟九奏之作杳若享乎鈞天如是則文始不得盛於漢日大章未可比於堯年振萬古而獨出豈百王之相沿洎乎秉翟而敘候樂以舉協黃鐘歌大呂乍陽開於簫管忽陰閉於祝敔淹速以度正直是與若中止而離立復徐動而進旅和之感物應鳥獸以蹌蹌禮以成文垂衣裳之楚楚由是俾有司夙夜在公候吉日鼓鐘于宮方將萬舞爰節八風於以易其俗於以告厥功因乎所自制在其中申敬也其恭翼翼宣滯也其樂融融齊無聲於合莫感有情而統同則其業之所肄習之則利作茲新樂著為故事享當其時舞於此地退而成列周廟之干戚以陳折而復旋魯宮之羽籥斯備美乎冠之象以峩峩舞其容以傞傞合九變之節動四氣之和散元風以條暢洽皇化之宏多是時也天地泰人神會舞有容歌無外故曰作樂以象德有功而可大陛下興聖懷發德音追帝皇之高風紹祖宗之丕烈思延釣築之士想致唐虞之化非臣凡近愚昧所宜獲承聖言而祗應清問也臣聞聖人與天地合德日月合明思發於志故易曰出其言善千里之外應之况其邇者乎又曰先天而天勿違後天而奉天時天且不違而况于人乎昔周成王泣啓金縢皇天為之反風宋景公誠發德言妖星為之退舍天人相感今古同時記曰川澤通氣山川出雲嗜欲將至有開必先言聖靈相通有感而應也今陛下以上聖之資撫易化之運積勵精思理之志求希代濟時之賢感於誠懷勞於夢想言出於口行加於人神祗將必效靈才俊固當接武豈惟殷宗求於傅説周文獲於渭濱願言必從志誠斯感惟聖人為能之抑臣又聞奏必觀其實不觀其文信其行不信其言若欲天下副陛下之誠從陛下之化自非聖躬行之以導其下則無由而致未有表正而影不直聲鳴而響不答也今陛下以常士之禮而待拔俗之賢以九品之祿而望超代之器是由垂蝸蚓之餌以釣吞舟之鱗設弓弋之矢敫以羅垂天之翼固不可得而致也昔文王養老而伯夷太公出昭王禮士而鄒衍樂毅至故必以身先之以誠致之未有不應者也陛下誠能正身勵巳尊道貴德親信端士遠棄邪佞盡忠進直者獎之希合從諛者斥之與大臣言敬而信之不使小人參其事與賢士遊親而禮之不令不肖者搆其隙唯義所比不論親疏惟仁是行不論貴賤去冗官無益於時者則祿及才能矣出宮女之希御幸者則時無怨曠矣簡繁數之儀則禮得其節矣除靡曼之奏則樂得其和矣將帥廉則士卒勇矣官師公則治化洽矣法令行則下不違矣教化篤則俗必遷矣如此則聖問周達德聲遐宣可使金石孚變鳥獸率舞而况於人乎將必賢哲慕義英彥赴響伊尹必負鼎而來呂望必投釣而起由余必棄戎而委質寧戚必捨牛而效用三傑成功於高祖四七展才於光武龍吟則山雲起虎嘯則谷風生自然之應也然後陛下坐明堂朝㣥后興教化作禮樂正風俗厚人倫遠比堯舜興崇近與祖宗合德時臻至理代稱中興則向者聖念所思睿心企及何遠之有哉唯陛下勤行之爾若言之不至無至也伏惟陛下念之伏惟陛下勤之而巳臣歷觀自古及今帝王最惡者是朋黨姦人能揣知上旨非言朋黨不足以激怒主心故小人譖毀賢良必言朋黨尋之則無迹言之則可疑所以搆陷之端無不言朋黨者夫小人懷私常以利動不顧忠義自成朋黨君子以忠正為心以懲勸為務不受小人之佞不遂姦人之利自然為小人所嫉譖毀百端者蓋緣求無所獲取無所得故也忠正之士直道而行不為諂諛不事左右明主顧遇則進疑阻則退不為他計苟安其位以此常為姦邪所搆以其無所入也夫聖賢合迹千載同符忠正端慤之人所以知獎亦是此類是同道也非為黨也豈可使端良之人取非僻之士然後謂非朋黨也陛下親行堯舜之道高尚禹湯之德豈謂上與數千年堯舜禹湯為黨是道德同也孔子聖人也顏回巳下十哲希聖者也更相稱贊為黨乎為道業同乎且仲尼祖述堯舜憲章文武又曰吾不復夢見周公遠者二千年近者五百年豈謂之黨是聖人德行同也後漢末名節骨鯁忠正儒雅之臣盡心匡國盡節憂時而宦官小人憎嫉正道同為搆陷目為黨人遂起黨錮之獄以成亡國之禍備在史册明若日月豈不為誡乎詩人嫉讒佞之人曰取彼讒人投畀豺虎可為三復也陛下此言似非聖意恐有邪佞之人以誤天心且自古聖王未嘗不納諫則昌拒諫則亡故夏禹拜昌言漢武延直諫所以光於史策也史傳備載歷代帝王置敢諫之鼓立司過之史木鐸徇路以采風謠之詞商旅謗市以詳得失之政故成湯聖德格於皇天而稱改過不吝顏回希聖四科之首而美不二過則知雖至聖賢不免有過所貴能改不至順非若無諫諍何以知過故書云汝無面從又曰從諫如流昔太宗以聖武削平天下奄宅萬國而懼臣下不諫誘之使言至於李大亮孫伏伽之儔皆以上疏諫事并蒙褒獎魏徵王圭事大小皆獻直言諫諍切直用裨聖德故太宗振英聲於萬古王魏流芳名於千載未聞堯舜禹湯文武之君洎我太宗窒諫路以自擁蔽不聞其過唯失道之君惡聞巳過夏桀殷紂周幽秦王以拒諫諍飾非反道敗德直言者謂之誹謗正諫者謂之妖邪忠臣結舌端士養迹故不知巳過遂至亡國向者四君招諫使言聞過輒改易覆車之轍啓忠臣之心則當政化益光宗社永固殷湯周武安得有鳴條牧野之戰戎人漢祖安得有驪山軹道之師且今補闕拾遺天后所置使在左右司察得失昔施之於女主今黜之於聖時國史之中何以示後微臣切為陛下惜之夫臣下貢言於至尊如天臣卑如地加以日月之照雷霆之威小臣晝度夜思將有上諫本欲陳諫十事至時已除五六逮於緘封上進又削其半其得上達者十無二三何哉啓忤意之言干不測之禍顧身無利相時避禍者也自非聖主知直言有益於已正諫有裨於時溫言容納獎勵勸導忠臣抱義不顧其身懷忠不避其禍苟有致君濟時之益不識觸忌冒諱之誅何哉盡節之臣竭忠之士顧食君之祿推事君之道而致然也其君上納忠如是之急也臣下上諫如是之難也所以明主須宥其過恂恂納諫切言者賞之使必進極諫者褒之使必行然後聖德明光大化宣暢今黜責諫臣使直士杜口非社稷之利朝廷之福也陛下詢於微臣不敢不陳愚疑今邊上空虛兵非實數守將貪濫背公徇私虛人既多實兵須少力既不敵坐受傷殘今府藏未充國力猶闕未得廣添兵馬且須即日處置就其易行得效速者今京西京北并有神策軍鎮兵本置此者祗防蕃寇侵軼俾其禦難戰鬬也不使其鮮衣美食坐費衣糧爾今寇賊為患來如飄風去如驟雨兩京節度使本兵既少須與鎮兵合勢犄角驅逐鎮軍須倍道急趨同力翦撲而牽屬左右神策須申狀取處分夫兵不內御須應機合變失之毫釐差以千里蕃寇方驅掠殺戮之際百姓塗於草莽方云入京遠取中尉處分何異暍渴而穿井待水餒饉而耕粟俟食豈可及事機乎縱其將領諳識事體星言應接緣是禁衛將士無懼節使之心進退前却號令不及既行刑不得則與無兵同今須便據所在境兵馬及衣糧器械割屬當道節度使法令畫一豐約齊同赴急如發機前戰不旋踵則兵威必振賊氣自消陛下無驚急之憂生靈無驅掠之患若安處無事之地坐仰厚賜之恩寇至以申狀為名不曾禦敵節將以禮管成例待以平交徒有鎮遏之聲都無討逐之力聖恩更此處分豈為久遠之制自古及今戎狄與中國并雖代有衰盛強弱然常須邊境備擬烽候精明雖繫頸屈膝而亭障未嘗一日弛其備也何者夷狄無親見利則進不知仁義惟務侵盜故強則寇掠弱則卑伏此其天性也是以聖王以禽獸蚊蚋待之其至也則驅除之其去也則嚴備之今北虜蕃臣復多歷年載雖實有功於社稷報之以厚施者巳倦求者未厭滿其意則曰事當宜爾悍氣益驕酌其中則曰效之難圖怨辭立至故印馬益廣望價轉多無厭之心實難為足若有如此異日必有不顧恩德為患封疆寇至而謀則事不及矣今西北兩都皆無備擬兵但虛數坐盜衣糧將無成功嵗邀官爵衣甲器械之類破官錢空有其名部伍訓練之方務酒樂都亡其制古者兵無二事志在殺敵將無異望專在誅寇器用犀利斥候精明若有煙塵負為力戰若無警急即營生業今則不然戰士採拾以供上命惟責程課不恤飢寒主將刻削以結內寵不輯戎事惟濟巳身今戎狄繼來婚嫁於國情實巨細必知邊塞空虛有無咸悉至於山川要害道塗險易巳皆探知熟習委曲諳識脫或見利忘義因便乘間風塵暴至羽檄交馳急詔徵兵無及係纍之苦閉避逃禍寧救驅掠之災使邊人仰天而呼望國而泣蓄甲不足以衛疆場命將不足以把寇讎此聖主所宜圖之不可忘於終食之間也伏望詔敕邊鎮節度俾其虛實有無少闕事宜分析聞奏仍請於八座丞郎兩省中選擇公忠清幹不撓之臣奉使各與大鎮節度使各與點閲軍中訪問理事一時上聞然後申明制度增緝募兵謹其殿最行其賞罰罪不在捨刑罰必加功有可褒爵賞必及如此則陛下高枕邊人永寧古人曰備豫不虞有備無患此經國之常制也自三代哲王巳降奄有天下者未嘗不崇建太學尊重名儒習千戚羽籥之容盛樽俎揖讓之禮以興教化以致太平天子親入視學皇太子行齒胄之禮斯所以化成天下也故記曰如欲化民成俗必由學乎當征討之急則先武事丁治平之運則尚文德二柄相須百王不易故漢光武於兵草之中投戈講藝魏太祖於擾攘之際崇立學校歷代之於儒道如此急也後漢儒學之盛太學至有三萬人諷先聖之言酌當代之務鴻名碩德匡國濟時未有不遊於太學以躋於顯位者也國家自高祖初立關中便修太學并為功臣宗室子弟別立小學建黌舍大加儒訓增置生徒各立博贍鴻儒碩學盛於朝列質疑應問酌古辨今咸徵經據并傳師法故朝廷無不根之論蕃夷有慕義之名風教大成禮樂咸備貞觀之理謂之太平至於開元中亦宏國學之制復覩儒道之盛故太學興廢從古及今皆興於理化之時廢於衰亂之代所以俾風俗趨末而背本好虛而忘實蓋由國學廢講論之禮儒者靡師資之訓自是以降不本經義不識君臣父子之道不知禮樂制度之方和氣不流悖亂遂作其師氏之廢如是之害也今天下遭逢聖明蕩除瑕穢前代所不能舉而陛下舉之百王所不能行而陛下行之萬方傾耳兆人企踵思望聖化希承德風而德盛道隆闕絃歌之雅詠政流化洽鮮儒學之高風頃自羯胡亂華乘輿避狄中夏凋耗生人流離儒碩解散國學毀廢生徒無鼓篋之志博士有倚席之譏馬廄園蔬殆恐及此伏惟陛下挺超代之姿發振俗之令復崇太學重延碩儒精選生徒獎寵博士備徵天下名德專門之士增飾學中屋室廚饌之制殿最講習之優劣彰明義訓之得失明立科品使有懲勸拔萃出㣥者縻之以祿廢業怠教者置之以刑自然儒雅日興典墳日重先王之道日盛太學之訓日崇陛下垂拱明庭受釐清禁使師氏教德不獨美於周時橋門觀禮豈復謝於漢日伏希天造特鑒愚言起茲廢墜宏於教化冀裨聖教以助皇風臣等先奉進止令檢尋歷代至國朝已來聖帝明王忠臣義士君臣合體事迹可觀者檢五十條進呈欲於御座置屏風觀覽者伏以自闕一字聖王皆憂勤庶政未嘗不取鑒於前代致理於當時昔太宗亦命魏徵等博採歷代事迹撰㣥書政要致在坐側常自省閲書於國史著為不刊今陛下以天縱聖姿日慎一日精求道理容納直言猶更參驗古今鑒美惡朝夕觀覽取則而行誠烈祖之用心必致貞觀之盛理臣等謹依撰録都五十條賢愚成敗勒為兩卷隨狀進上其㣥書政要是太宗之書其中事迹周備伏望聖聽日新成不諱之朝致無為之化昔太宗之理天下也房元齡杜如晦輔相聖德魏徵王圭規諫闕失有溫彥博戴胄以彌縫政事有李靖李績訓整戎旅故夷狄畏服寰宇大安猶孜孜求理開導直言旰食宵衣不敢漏溢豈復當時務於自逸乎陛下視今日事何如漢文時且文帝漢之明主恭儉節用身衣皂綈清淨為理刑措不用戎狄面內干戈偃戢賈誼上言猶以當時如厝火積薪之下火未燃而以為安其憂危如此今中夏河南北申蔡有五十餘州法令所不及德澤所未加兼西戎侵盜近以涇隴靈寧等州為界去京城遠者不過千里近者數百里烽燧相接邊界屢警此陛下焦心涸慮廢寢忘食之時豈可高枕而臥也自古及今帝王未有不任賢則理用邪則亂明著史傳不敢備陳夫聖主理當代之人祗選當時之賢極其才分便可致理豈借賢於異代以理今日之人近代北齊任楊遵彥則理用高阿那肱則亂隋代任高熲則理用楊素則亂國家任房元齡杜如晦魏徵王圭姚崇宋璟則理用李義府許敬宗李林甫楊國忠則亂事狀橫於目前理亂存於史策夫致賢之路歷代不同大凡王者不以至尊輕待臣下不以已能蓋於凡器折節下士卑躬禮賢天下賢能之人方出是巖穴無晦迹之儔朝廷有佐時之器矣堯舜亦以知人為難况近代澆薄真偽不分固不易知也然以事小驗之必十得七八任官清廉無貪穢之迹當事堅正無阿容之私章疏諫諍無希望依違之苟在左右獻納無邪佞愈悅之辭言必及遠大行不顧財利如此則可謂近於賢矣若言必諂諛動關名利攻人之短不揚人之美求巳之售不量巳之分觀望主意以希合為心逢迎君意以恩幸為志為主招怨為身圖利斯可謂之小人也驗之以行事參之以輿議然後用之委用以後名聲相副則當任之既任之則當久之使代天下之績久而化成然後聖君垂拱而治矣賢者行理端直身寡黨援拔擢賢彥則小人怨謗杜塞邪徑則姦人搆陷制度畫一則貴戚毀傷忠正進用則諛佞攻擊夫用賢豈容易哉自非聖主明君懸鑒情偽不使毀謗得行疑似生隙盡其才器極其智用然後政化可得而興故齊桓公任管夷吾一則仲父二則仲父齊國大理是任之不疑也管仲對桓公曰既任君子而以小人參之此最害霸也古人以求賢不至則賢者不出故喻以蝸蚓之餌以求吞舟之鱗設釜鍾之祿以致濟代之器不可得也陛下但以數事驗之以言校之以實採之於衆任之以權則賢不肖得矣伏惟聖智詳察臣請案守謙密言聖恩商量以昭義兵馬使烏重允部署軍中事不獲巳須與節度使者者臣竊以此處置實非所宜比者以從史受命不由朝廷遂致生彼邪心致茲惡迹今重允驅逐從史忽領旌旄兩河聞知必生怨望謂陛下密以官爵誘其將校逐其主帥人情雖愜國體巳傷若以重允主兵勢須便與即是威福不在朝廷於事體之間與從史何異議者若云重允見主權必不受制臣觀事勢實恐不然何者伏緣從史懷惡蓄姦罔上違命所以重允得仗義獻款以順為名其衆遂伏今重允若不顧憲章以力取位即其同列寧息偏辭儻失衆心前事豈遠以此事理必無異圖縱軍中有狀請與重允此時之事必非忠心其流輩既多當不願重允獨得別與一鎮少愜衆心伏望聖恩先令密諭重允授以河陽節度使除元陽澤潞節度使則人情大伏國體得全且重允忽自軍校授以河陽拔於行間恩生望外豈於此際更有遲回棄義虧忠遣福取禍雖至愚下亦必不然元陽功效素高公望又積澤潞接近久亦承風今若除授便徑入潞府慰勞將士家口恤其貧乏各使安存三軍聞知自然感悅重允既得方鎮元陽又愜人心如此處置必無差誤機事可惜實所痛心威柄一失豈可復得伏望聖恩不以臣愚昧特賜省覽斷自宸慮成此聖功輒敢獻陳伏候聖旨伏以臣與鄭絪先後懸殊不相往來臣約其事體必無此理鄭絪甚讀書頗識事體得稱佳士素有英名雖不知其才術如何至於君臣大義不合不知去就若身居宰相參陛下密謀便敢泄之於姦臣雖術同犬彘性如梟獍亦不至此况絪頗知古今洞識名節事出萬端情有難測莫不同列有不便之勢專權有忌前之心造為此辭冀其去位若不過陳危事安得激怒上心伏望陛下深賜詳熟無令人言陛下惑於讒佞也右裴武甚諳練時事往陷在河中李懷光賊中事迹可稱今所銜命不合絶有乖錯大抵賊多變詐難得實情以臣愚慮思度王承宗恐國家必有征討請割德棣兩州且得安全尚有四州之地亦足保其富貴求安之計必是此心然鄰道魏博東平范陽與王承宗勢同事等恐他時亦為朝廷所割必是為鄰道所搆兼以利害鼓動不得守其初心此必然之理也伏望且尋訪之裴武所上表只得上承宗初時意便且奏來後必恐鄰境脅制誘動遂有後變計裴武不敢不盡其心今陛下擇裴武使凶逆悖亂之邦一不如意便有貶責臣恐今後奉使賊中無復得誠實其後奉使者皆以武為誡依阿可否之間必曰其言及表章則如此之深心則臣不可保不可顯言是非陳列事狀若朝廷不得實狀別處置或有乖錯非國家所利也若受賊中財賂言語不實則須重責以懲姦欺又言先於裴垍宅宿且裴武久為朝官甚諳制度裴垍身為宰相特授恩私必無未見而便宿宰相家固無此理昧劣如此兩人猶不敢至是况皆是詳練時事之人計必無此事必有搆傷裴垍裴武陛下不可不深察也臣伏以兵機尚速久即計生威斷貴定疑即變起人情未一乃可伐謀事勢巳分則難命中據劉悟八月十日得病計是日便死逗留掩匿奏報巳遲朝廷既知又數十日都未有處分中外人意共惜事機今昭義兵衆必不盡同從諫之亂縱有同者不過所厚一二千人直使一半叶同尚有一半守順况從諫不曾久主兵馬威惠未加於人又此道素亦貧窮非時必無優賞今朝廷但速除近澤潞四面一將帥充昭義節度令倍程赴鎮從諫未及鋪置新使巳到潞州所謂先人有奪人之心疾雷不及掩耳真從天上落也新使既到潞州軍心自有所繫從諫無位何名主張又設使未到巳前謀撓朝命臣亦料得必無能為若欲多分兵馬守境則事須給付器械將校等既得器械又巳有正節度使豈肯更為從諫腹心若欲少分兵馬則不足抗拒新使之人事宜物理昭然可知臣前月十七日巳面陳論并具狀聞奏訖至今又二十餘日未有處分恐潞州三軍會朝廷意旨將欲效順即慮忽與從諫將欲同惡又却恐除別人儻更被姦人為畫狡計虛張賞設錢數兵士覬望尤難指揮今則巳似太遲失於制置若更稽緩事恐轉生伏望速賜裁斷仍先下明敕符賜新節度使五十萬匹物令宣示三軍以其從來忠節故有此賜便節級賞設續除劉從諫一軍郡刺史從諫既粗有得必且擇利而行萬萬之中無一二違拒必若不從指揮臣亦以為不假攻討蓋山東三州難自存立若欲旁連魏鎮即須厚賂交通若擬自保封疆即須終日備禦四面受敵必不支持數月之間定見覆敗况又聞山東官健巳不許自蓄刀兵足明軍心殊未得一帳下之事亦在不疑長短此方義無便授從諫之理今更於意外料度儻從諫事急將所親厚三二千人散授魏鎮必亦虜縛送歸闕廷上取忠義之名下快讎怨之志此必然之理也在魏博鎮州留一從諫亦何所利其將士三二千既是從逆得散却亦是國家一事縱橫揣度股掌無逃又以為直使山東之人未得其便僶俯受制依違俟時朝廷亦只要明敕四面諸軍嚴兵保境勿令公私來往勿使商旅通流遲不一年梟首必至若或捨此數計事或後時即非愚臣所知亦必他日追悔臣不勝憂憤激切之至左右僕射師長庶寮開元中名之丞相其後雖去三事機務猶總百司之權表狀之中不署其姓尚書巳下每月合衙上日百寮列班宰相居上中丞御史列位於廷禮儀之崇中外特異所以自武德貞觀巳來聖君賢臣布政除弊不革此禮謂為合宜苟有不安尋亦合廢近年緣有才不當位恩加特拜者遂從權便不用舊儀酌於㣥情事實未當今或有僕射初除就中丞院門相看即與欲參何殊或中丞新授亦無見僕射處及參賀處或僕射先至中丞後來憲度乖宜尊卑倒置儻人才忝位自合別授賢良若朝命守官豈得有虧法制伏望下百寮詳定事體使永可遵行學非稽古才昧濟時陛下過聽不以臣等愚懵無取誤置於嚴密之地職居肘腋任切腹心寵食大官之珍榮通禁門之籍縻軀致命詎報雨露之恩殉節忘家寧酬天地之德所以繼獻章疏冀增日月之輝屢進懇誠希添海嶽之廣而不量力分觸冒危機徒竭公盡忠忤犯嚴旨雖死不悔當職所宜臣以謂忠臣不避罪以匡君正士不違患以汙道所貴上裨萬一仰酬顧遇實臣等之心也不謂忌諱合置嚴譴此又臣等之分也一月以來未蒙賜召咫尺之地無申就日之忱跬步之間莫獲承天之問兢惕無地慚惶失圖臣聞管仲對齊桓公云大臣持祿不敢諫小臣畏罪不敢言下情不通此害霸之甚也臣等不言度日飽食過時既無切諫之尤復道如何伏惟陛下以社稷宗廟為心以四海萬姓為慮詢訪道理開納直言知好問而自通以博問而自廣是天下之幸豈臣等之幸耶古先哲王以天下為大器知一人不可以獨理四海不可以無本故立皇太子以副巳設百官以分職然後人心大定宗社以寧有國家者不易之道也陛下嗣膺大寶四年於茲矣而儲闈未立典策不行是開窺覦之端乖重慎之義非所謂承宗廟重社稷也且漢魏故事國朝舊制懸諸日月著為憲章伏望陛下抑撝謙之小節行至公之大典用興儲副永固邦家則主鬯承祧必光於萬代問安侍膳道播於百王聖哲之君撫馭之要必順人情以作事感天意以致和從古以來其道由此陛下勵精求理損巳推誠風動四方事貞百度作範來代掩美前王後宮之中人數不少離別之苦頗感人心怨曠之思有干和氣伏冀酌量所要務放其餘使其親戚如初復得宮掖省費上以表大德如天之施下以成㣥生遂性之樂道映青史化洽皇風敢竭涓塵庶裨萬一如蒙聖恩允許便請入德音伏以聖慈憂旱務在恤人將欲赦其流亡無如減其租稅則下懷感悅上動陰陽昨正月中所降德音量放江淮去年錢米臣聞所放數內巳有徵納縱未納者又多流亡旱損州縣至今務放錢米甚少百姓未經豐熟復納今年差科疲羸之中徵迫不及人力困苦却在今年伏望天慈更賜優恤其江淮先旱損處作分數更量放今年租稅當餒饉之際承雨露之恩感動人心無甚於此輒極愚疑上瀆宸嚴前闕且其擾改師徒陷沒將校衆情㣥議必謂陛下正其刑典懲之後來今反極寵榮重加崇秩巳後更有敗軍失律之將蹈利干賞之夫則何以處之若誅之則罪同而罰異王法之不一也若捨之則保身而玩國政典之不行也伏望心割不忍之恩舉不刊之典責無功之罪追不次之榮使備邊之將有所懲勸當危之士無復顧望實天下幸甚臣聞王者積之於人霸者積之於國尋常之君積於府庫陛下以超邁英姿嗣膺寶歷蠻夷納貢山澤效珍固當事冠百王德垂萬代昭可書之事成不諱之朝今內藏積財來者必納唯顧進入之數不問聚斂之由方鎮皆裒刻於人以進獻為號因緣姦盜半入私家百姓積怨兆人興謗殆非今日聖政所宜行也又錢是通流之貨居之則物以騰踴帛是衣著之物貯之則嵗轉損爛此皆出於人力匪從天生積難得之財成無用之幣聖心所宜留念伏乞天慈量恩澤頒賜之所要校制作移用之所費三倍已外悉付所司儻經用者有餘即租稅寬於外以令疲人蘇息內以表聖政光昭存之策書足示後嗣今天下州縣皆有戶部闕官俸料職田祿粟見在計有三百餘萬石舊例便牒諸道監院準時價糶貨市綾絹送納戶部巡院官少有公心皆申報估價至賤三分無一未為姦欺及依來牒令糶皆是觀察刺史院官所由等賤價糶將貧弱百姓惠都不收市輕價皆貴破官錢計度所糶斛斗回市輕貨比及到京輸納之時損折姦欺十無七八枉破官物利入姦人無益於公有害於理臣伏見自陛下嗣位以來遇江淮飢歉三度恩赦賑貸百姓斛斗多至一百萬石少至七十萬石本道飢儉無米皆賜江西湖南等道米江淮諸道百姓差使於江西湖南般運往返數千里五六箇月舟船方到百姓殍殕相望轉徙溝壑蓋緣道路遐遠不救急切也今天下戶部闕官斛斗伏請便令所在州縣收貯如是觀察州即令觀察判官一人專知判諸州即録事參軍專知判如有遷轉改易分明交付後人如交割之時妄有情故虛受物數便懲責承受專知官如似損壞即仰於當處州使公用卻回取當年新斛斗詔書朝到斛斗暮給救倒懸之甚急免般運之艱難副聖慈憂恤之仁免飢人殭殕之苦若貯貸之外斛斗甚多便減價糶務救百姓艱歉也守土之官厚斂於人以市私恩天下猶共非之况戶部所掌皆陛下府庫之物給納有籍安得羡餘若自左藏輸之內藏以為進奉是猶東庫移之西庫臣不敢踵此弊也
