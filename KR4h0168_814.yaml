front:
  text: 全唐文欽定全唐文卷八百十四朋龜字兆吉滑臺人第進士中和元年官翰林學士承旨知制誥後以太子少保致仕
  hash: sha256:6455451d6319cef74e11b6945e6b843b8056e5f9b583a922c77a82977fb80258
  markers:
  - {type: head, offset: 13, content: 樂朋龜, id: KR4h0168_NFKB_814-h1, level: 1}
body:
  text: 門下經費之權雖繫乎理本燮調之任尢重於國鈞誠不欲參而委之蓋所以仗其能者吾之注意用表推恩况方軫阽危尚屯兵甲說邦籍於魏相佇竭宏規付軍食於酇侯必施良術爰從成命俾洽輿詞特進行中書侍郎兼戶部尚書同中書門下平章事監修國史上柱國蕭遘業嗣代天材承構厦懿績繼傳於王府嘉猷允紹於廟堂衆謂國華雅得韋平之稱時推人瑞諒齊管樂之名洎辭中殊科辟隨重地班行履歷刀尺精英由右史以踐南宮自中戎而升內署久傳密命粲組繡於筆端旋總憲臺定準繩於朝右爾後方調國賦俄屬時難盡心於造次之時首奔行在秉節於蒼黃之際足驗歲寒潔身之道既彰許國之誠可監俾其援力乃爾疇庸遂契風雨尋當鼎鉉可謂佐時之道知無不為奉上之功久而彌著於今者將平逆寇須恤王師方懸飛挽之勞日俟誅夷之計非爾洞達不足以絶奸欺非爾精靈不足以希饒羡所宜究其利病計彼盈虛使兵實賦均家給人足自然凋傷漸復饋餉不虧既無艱食之虞並表和羹之用惟期黽竭方見沃心勉副具瞻式彰殊渥可兼判度支餘並如故門下韋弦並佩則情性和文武兼修則事功濟况巖廊重德柱石賢臣方當彌寇之時正委運籌之略各覃恩渥用獎勳勞開府儀同三司守門下侍郎兼司徒同中書門下平章事上柱國晉國公食邑三千戶王鐸太極儲精華池稟潤文能師古業亶經邦光輔數朝偃仰三事挺許國忘家之節蘊經天緯地之材金紫光祿大夫守中書侍郎兼禮部尚書同中書門下平章事上柱國裴徹玉海澄瀾金莖擢秀泉渟襟抱嶽立標儀道則有常材惟不器松竹見後凋之操輪輗彰致遠之功銀青光祿大夫守尚書工部侍郎同中書門下平章事上柱國蕭遘維嶽降神昴星應瑞琳琅瑩茂雲日孤高業著代天闕一字惟周物偉望而汪洋自遠清規而俊拔難偕並智比蓍龜祥同麟鳳備彰器業遍踐清華雲霄次第以登臨臺閣從容而履歷或鬱為國老或宛定臺臣人無間言朕所注意自妖凶搆逆巡幸西來皆能間道以潛奔竟致臨軒而再會益堅臣節仍罄廟謨杜征南注傳彰間謝安石圍碁決勝每聞盡瘁尢切圖功更宜講貫安危錯磨理本用蕭曹之祕略繼房杜之高蹤佇見中興實資良術再踐大貂之位三居文館之權首鎮元台備兼衆務或官當喉舌職重陽秋或位正中樞榮兼祕殿大儀峻秩馭貴崇階式示優恩更申獎勵早清巨孽俾振皇綱使雲龍魚水之歡永光於竹帛王鐸可司徒兼侍中充太清宮使宏文館大學士兼延資庫使散官勳封如故徹可特進門下侍郎兼兵部侍郎同中書門下平章事監修國史勳封如故遘可光祿大夫行中書侍郎兼禮部尚書同中書門下平章事充集賢殿大學士勳封如故主者施行門下廟堂之上教化之源康濟萬方彌綸百揆可謂朕目時之蓍龜不宜斯須暫違顧盼其或繼陳章表備瀝精誠以大憝未平每痛心而疾首以中都未復嘗瀝膽以披肝志在總戎期於弭變永言許國真是藎臣遂命更陟韓壇重辭槐鼎統六師而雷動屯萬旅以風馳併集寵命以堅茂績開府儀同三司守司徒兼太子太保同中書門下平章事充太清宮使宏文館大學士兼延資庫使上柱國晉國公食邑三千戶王鐸名高嵩華量等滄溟情田洞開心地無滯造次靡忘於忠孝幾微不捨其規繩靜彼波瀾莫分喜慍洎乎升甲乙綴鵷鸞履歷清華從容道德咸推器業必為王佐之才盡伏機權乃是公台之望爾來盤錯果副重難筮短龜長開物成務同叔敖之為楚相比孔光之輔漢朝出於一時膺是三命其為寵重敻無等倫朕以克荷丕圖內慚涼德致其郊廟陷於狼狽若墜溝隍如懷水火未嘗一飯之飽一夕之安宥過責躬臨深履薄遂致元穹下監元老請行面陳腎腸忠貫天地振朝廷之武力挫妖孽之殘魂惟其疾風方知徑草况津臨白馬地壓洪河擁東夏之鋭師視中原之沴氣必期破竹自可覆巢昔元凱之著殊勳謝安之膺上賞功銘鼎鼐指誓山河遐想芳塵必符壯志爾宜奪其租賦瞻彼甲兵使退無玩寇之虞進有老成之誡訓齊勇士克彼都城屠梟獍之軀以為京觀戮鯨鯢之首用獻宗社嗚呼寰海流離生人塗炭眷言繄賴實洞神明是用榮分和嶠之車光佩蕭何之印勉思注意勿怠厥功可司徒兼中書令充諸道行營都統兼指揮兵馬收復京城及租庸等使判延資庫事權知義成軍節度管內觀察處置等使餘如故仍令所司擇日備禮冊命軍罷後却赴中書主者施行維中和三年歲次癸卯十月甲午朔十六日己酉皇帝賜功臣劍南西川節度副大使管內觀察處置統押近界諸蠻及西山八國雲南安撫制置指揮諸道兵馬供軍等使開府儀同三司太尉兼中書令成都尹上柱國穎川郡食邑三千戶食實封四百戶陳敬瑄鐵券曰烹巨鼇者鼎大於滄海斬長鯨者劍倚於青天既立異勳克膺殊寵李晟免其十死子儀成其九功鏤以金鏞賜其鐵契後來繼者豈在他人歲寒知松柏之心國難見忠貞之節五山鎮地一柱擎天氣壓乾坤量含宇宙自居環衛出擁旌幢論清政而冰鏡無光吐赤誠而朝霞失色手持玉節身鎮錦城扶乾綱而萬國安心紐坤維而百蠻遙指三川欽化一境歸仁朕以稅駕褒斜省方卭蜀匍匐而來迎鳳輦馳驅而速建龍宮百辟來朝萬方入貢夏禹塗山之會未盛於斯漢高沛國之歡無以過此戮阡能疾如剪草除秀升易若焚巢不讓武侯之勳無愧文翁之化海東獻款雲南披誠九穀豐登三農茂盛濟贍軍國拯救朝廷內竭家財外罄公帑千官感惠一國推功今則巨猾奔逃神州克復將歸上國即別成都致朕身安由卿忠藎前封公爵後賜郡王詢於衆情未愜㣥望今賜卿鐵券赦其十死望泰山而立誓指黃河以為盟山無盡時河無竭日君君臣臣父父子子永遠貴昌並皆如此原夫八十一天比太上之半壽六百萬歲當元始之初年道渺邈以難窮體希夷而莫究在無象無形之內居太初太易之前龍漢之劫再成鳳紀之文未立藏萌芽於浩素隱根余於龎鴻二神贔尸貝以俱來鑿開造化三氣氤氳而互進朴散胚渾元黃流而未凝清濁分而乍結日月星辰之內化出靈宮川源山嶽之中變成洞府則知道為萬氣之祖德為百物之宗以二儀兩曜為子孫以五行四象為枝葉當其洪肇先啓紫極後成仰其高而彌高考其上而無上八公皓首當時之未有乾坤九老白眉厥後而初生天地探至真之理臻大道之元列仙之境界延洪上士之齒齡逾遠以六千春為兩月尚歎浮生以七萬歲為二年仍嗟短景智者見之謂之智仁者見之謂之仁和光而衆曜皆慚挫鋭而攢鍭盡碎元珠匪纇真璞無瑕學而知之者為中生而知之者為上三君五老覩兆人如醯雞七聖九皇視百姓為芻狗煦千古而冰釋成衆善而泉流至明若蒙蒙間而萬物俱照大巧若拙拙中而萬事皆成為於不為用於無用黜口爽於五味杜耳聰於八音忘象忘言易脫一時之屣無關無楗難開衆妙之門九萬靈仙聚集於一毛之孔三千儒術荒蕪於獨角之端故知道儒二門經綸一揆立清淨為理體虛無為師以上天為大車之輪以列宿為大車之輻駕之以乾馬之馬挽之以坤牛之牛搬運無為之功覆載自然之道光而不曜養正於蒙昧之中簡而能廉修真於仄陋之內不可得而疏矣離之而匪遙不可得而親焉用之而逾遠不可退而讓不可進而求被褐懷玉之人美之又美罔象求珠之士斯焉取斯移世界而入壺中吞維摩方丈之室縮地形而藏術內掩悉達王舍之城有道之根修作立天之址無名之朴標為鎮化之元三千威儀恭謹於文風之教五百戒行肅清於釋氏之門張天為弓調之以陰陽寒暑直道如矢激之以春夏秋冬一夫用之而無餘兆人用之而不竭日窟月窟隱身而曾作穴居南溟北溟遁跡而聊游水府桃源蓬島從古有而今存槐市杏壇見朝榮而暮落仙圖祕密五千載而三傳聖道靈長百萬年而一代容易而學之者似紐石以為繩侮慢而求之者如鑽冰而待火絶巧棄利顯微闡幽坎離震兌之宮宮內而咸居羽客東西南北之斗斗中而皆住真仙身駕德車輪轉於混茫之外手持壽柄指揮於開闢之前寂爾無營淡然自得化其不化則萬化而皆成生其不生則㣥生而盡遂虛懷待物曠意承時藏泰山於秋毫之中秋毫仍大納崑崙於黍米之內黍米猶寬大象無形五嶽空空而立也大信不約四時默默而行焉真宗之教皆成不宰之功益著太上金闕元元天皇大帝則我巨唐之高祖按國語曰自周平王七載洎於秦至開元聖文神武皇帝即三十六代之聖孫赫赫日苗布蔭於普天之下明明國葉垂芳於率土之濱當其幽原既開九氣陶蒸而未已元化大闡六虛流轉而勿休設不二之教門稽真一之宗本浩風吹海三回之重作飛塵劫火銷山五度之却為平地先逍遙於青運青運既周後汨沒於赤明赤明復畢九十九萬億歲貯在彈丸五千五百重天藏於卵殼殷高宗御極之際周文王演易之初神光流入於瓊胎瑞彩結成於金骨不坼不副誕彌於八十餘齡降瑞降祥過期於二萬餘晝足蹈不滅之理手握長生之文包乾裹坤把日捉月額列參午頂荷圓穹耳開三門鼻立雙柱白血紫腦蒼肝青脾項引三十五光齒含四十八貝七色青蓮而隨步千年白鹿以呈休桑田變而雙檜不雕江河枯而九井不竭苦縣賴鄉之里靈跡長存陳國渦泉之濱神蹤不泯七百弟子指扶桑為故林九五帝君開日宮為舊館詳其元始稽彼厥初俯窺溟涬之前下視渾淪之後隨機設教作九古之楷模應變無方為百王之軌範若乃歲起攝提肇開氣象一十三聖之踐祚萬八千年之應圖我太上聖祖應運降跡與天皇為師上清下濁之初開相離未遠六合八紘之乍坼相去未遙正方圓上下之形定洪荒朴略之狀川新融而水仍晦山始結而石未堅種天上之白榆初生歷歷植月中之丹桂乍出依依配四海於四神付五行於五帝是時乾象猶低坤形仍薄立極定位敷化建功我太上聖祖屑跡下降與地皇為師分配剛柔制定寒暑地增博厚天益高明聖力難窮神功靡測萬木甲坼萬草勾萌羽族毛㣥區別於兌離之位介蟲鱗類支分於坎震之宮四溟之水皆空未生魚鱉五嶽之形俱靜未吐雲霞已逾清海之年又離清海之歲二聖既理四表生光我太上聖祖博施濟衆與人皇為師三百六十之川初分血脈萬一千五百之策乍配偶奇三壬三乙之神離胎於水木六丙六辛之將出孕於火風一百五十六代四萬五千餘年始稱通元天師再號金闕帝君三名盤古先生洎乎庖羲氏之王天下也我太上聖祖以道宏濟降跡為師仰觀圓蓋之文俯察方輿之理教之以畫八卦指之以分三才助之以造書契之文制之以代結繩之政典墳自我而出經籍自我而生以佃以漁蓋取明離之象一索再索用乎出震之功鳳凰呈瑞於帝庭龍馬負圖於河洛享國一萬八千歲矣洎乎連山氏之王天下也我太上聖祖救時屈已下為帝師付之以五運分之以四時助之以正萬機明之以辨百穀變飲血茹毛之化移蕢桴土鼓之音毀穴焚巢上棟下宇範金合土燔黍擘豚製耒耜以濟兆人作陶冶以利萬物天雨粟以呈瑞地藝稼而彰稔農食嘉穀山出器車洎乎有熊氏之王天下也我太上聖祖隱身於崆峒之中放心於杳冥之外帝乃親降輦路禮展師資能摳衣以趨隅遂屈膝而問道當是時也榆罔凌虐蚩尢作亂化魚鱉為兵士以助王師變雲霧為神祇濳扶軍陳能弭兵於鹿致偃戈於阪泉東游青邱之鄉北到洪隄之境受丹經於王屋登蒼冥於鼎湖屈軼既生蓂莢復出若非大道孰可致斯洎乎金天氏之王天下也承姬水之源襲熊山之録告天類帝纘緒守文我太上聖祖乘九龍之輦降以為師號太極先生說莊敬之典教之以順時迎氣昭配神明禋於六宗秩於㣥望乾乾翼翼得禮之宜羽族呈休命之以鳥官為理分布九以統八司景合璧以表靈鳳銜圖而示貺悉由至道彰此帝模逮至高陽氏之王天下也我太上聖祖教之以解紛塞兌治國安民滌蕩九黎陟明八凱有龍野紫髯之凶醜有蛇身赤髮之巨魁力拔不周首觸山碎天低西北致日月之西行地亞東南使江海而東注追呼六甲役御百靈訓之以微言之經教之以大順之道乘元虬之迅駕或適幽陵御素螭以遐游或臻蟠木觀吾仙奈萬年而一度開花覩我靈爪四劫而一回結實及乎高辛氏之王天下也我太上聖祖敷道布化下濟為師談黃庭之妙言隱日遁月稱緑圖之嘉號遷邑移城制九州之名作六英之樂封勾芒以佐蒼帝敕蓐收以翼白方示岱嶽而印金泥照寰區而開玉鏡飲大活之井游不夜之鄉燔青鸞之膏充下仙之次饌擘黃騏之脯為上客之珍羞逮至陶唐氏之王天下也我太上聖祖暫垂至理下降為師講元德之經道巳匡於元化應丹靈之瑞名冀列於丹邱和煦清風不作鳴條之響雍熙黃髮時聞擊壤之聲庖廚之肉脯自生胾肴失味山谷之醴泉潛湧麴蘗無功達四聰以闢四門立五事而敷五教披鹿裘以食糲饌端拱於土階掛鶴氅而飲流霞凝思於瑤圃有虞氏之王天下也我太上聖祖談無為之理講離合之經三苗克悛四罪咸服百揆時序五典慎徽懷明神之珠賜昭華之玉眉與髮等表踐祚之嘉祥壽與天齊彰延齡之景福甄一十六相用二十五臣致百辟以協和如魚在水感兆人之歸湊如蟻慕膻化靈氣為天書何勞筆力結卿雲為寶殿不假人工夏后氏之王天下也我太上聖祖克匡王道爰作帝師談德戒之經行為國之法櫛沐風雨刊槎山林成九年理水之功為四載勤王之業卑宮陋室盡力於溝洫之時襤服縷衣飾身於黻冕之禮導馬頰而奔流竹箭鑿龍門而迅激桃花救兆庶而皆免為魚濟陸土而永非成海胸羅玉斗掛天文之在躬手展瑤圖懸國命之由已故知大道者三教之冠冕上德者百聖之宗元成湯氏之王天下也我太上聖祖權離左極下為王師說長生之經體自然之道去三面之網開一目之羅獸遠逝而莫縈禽高翔而不罒某月引萬方而罪己數六事以責躬話之以八素七真講之以六虛十訣千歲桃花之蜜味掩朱漿九垓薤葉之蔬滋霑紅露乘三光而電轉駕六氣以烟騰窺海瀆如涓涔視嵩衡如繭栗餐風飲露跨空攝虛以十洲為少游之宮以六極為暫別之館驅徭中士役試上仙素髮一莖懸起萬斤之石緑筠數尺變成百丈之龍得之者七祖超升失之者一身迷誤必在堅修慎習棄苦忘辛可以陶冶二儀埏填九土青羊肆者按本紀則太上元元大帝第二降生之所自殷道否閉周德凌夷陸海沸騰百川振動山鳴谷吼雨嘯風號歷藏史以同塵棄柱下而隱跡東離魏闕西度函關乘青牛宛轉之車駕白鳳逍遙之輦徐甲執御從仙帝以爰來尹喜占風知道君之必至暫別而三千甲子曾作赤童相逢而八百年齡永依黃老濳傳妙訣暗付微言重為千日之期再結一時之會暫朝元始却上天中之天永奉宗師重歸象外之象開寒靈之丹殿登衆寶之瓊臺坐紫金之牀憑碧琳之機太清仙伯仗星光錦文之旗太極仙翁執月華命神之節皆拜手稽首以心觀心於是敕青帝之青童化羊於蜀國乘紫雲於紫府降瑞於王宮將停不嗄之聲須及來斯之乳俄聞喜至頓止嬰啼爰初從赤子之聲却變白頭之士頃刻而身餘十尺須臾而面放五光頭戴七曜玲瓏之冠肩垂九色離羅之帔衛士逾億從仙成㣥感十方之衆真遍滿寥廓應八表之瑞氣充塞虛空香散九微之烟花飛六出之雪將離蜀土欲化胡風遠適流沙長移獷俗及身毒罽賓之國教頭陀阿柱之王恣剛強愎戾之心起烹焚鏨刺之意巨錡然湯以沸地我則入之如凉泉積薪烈火以連天我則坐之如紺霧挾白挺者觀如蓬草持赤刃者視若鉛刀四天之兵衆俱來聲喧霆霹萬里之神威共護力轉山河八十一種之獯戎皆歸清化二千餘國之獷悍永革昏風俗既變矣道既成矣分身作佛濟如來千劫之功降跡為師救王者萬機之務至若銅渾測運玉歷推禎天七五而一三及九乃滿地八六而二四到十乃盈變通陽九之災窮研百六之數雖宓羲軒昊之代無以免斯高辛唐虞之朝不能避此粵以廣明元祀歲在上章月當大蠟巨猾開釁於天邑渠魁俶擾於國步兵廠田坴九野㣥臣咸議於省方蛇起陸風四嶽齊迎於巡狩長鯨呀口聞欱灃吐鎬之聲封豕橫牙衝列刃攢鍭之隊牛蛇未搏食吾黎庶之膏象蟻未除穴我樓臺之地塵蒙華蓋盜梗天衢九龍齊駕於雲輿玉輪西轉萬乘同回於坤軸金闕南開涉水則波神捧舟登陸則地祇扈蹕太元城內化出行宮濯錦江邊權安正殿執玉帛者數盈萬國列鵷鷺者位滿千官雞林之郡來朝鰲山解纜鶴拓之城入貢象駕來王當戎夷率服之辰誠文軌混同之日苗人未格方資益贊之謀扈氏延誅正賴允師之力熊韜豹韜之將俯立軍功龍角羊角之山可追聖瑞二十八化猶乘白鶴而來一百六災必跨蒼虬而救潛扶宗社幽贊子孫赤光照灼於庭臺太平顯兆紫氣晶瑩於梅篠元吉尢彰稽彼變通明茲感應尋其靈跡果獲寶甎上有古篆文曰太上平中和災於是驗其六字表此百祥擊之即聲類鳴璆觀之則狀如宏璧歷周秦魏漢之代玉篆仍新經晉宋梁隋之朝銀鈎不故藏諸韞櫝祕其緘縢克盛皇猷顯標青史歲代綿邈疆井變移舊址苔封古壇蕪沒仙鄉故里半落俗家真境餘風惟殘瓦礫枯松夜月稀聞元鶴之聲暮草秋烟空聽莎雞之響當時雲洞多隱狐狸昔日芝田盡生禾黍遐追靈跡顯驗休禎皇帝特下明詔創造靈宮恩賜內外行用庫錢二百萬爰徵班匠乃速厥功於是木神選材九層重構地祇獻土百堵俱興水伯進泉以為池山靈走石而作礎巍峨雲閣乍似化成岌嶪霞堂初疑涌出簷張羽翼棟壓虹霓粉壁霜凝丹楹火亘窗籠倒景戶闢長霄塑像新成儀形乍降神情欲語似講五千之文意貌將行遠化十方之士金爐芬馥寶繖回旋乍覩出檻之羊猶疑跪乳初觀如練之馬尚慮嘶風庭翦蓬茅重生瑤草園除萱槿再吐瓊花岡阜崔嵬樓臺顯敞齊東溟圓嶠之殿抗西極化人之宮牽劍閣之靈威盡歸行在簇峨嵋之秀氣半入都城烟粘碧壇風引清磬故得五老下降四真俱來畫地而成其江湖撮土而作其山嶽坐致風雨可以倒洛傾河立起雲烟可以反晝作夜化草木以成軍旅變士馬以成叢林如斯出師豈惟百勝如斯伐叛何啻七擒是以天災流行盡彼盈虛之理歷數倚伏稟其否泰之宜左慈呼召於神兵鞭笞㣥盜許遜指揮於力士翦蕩狂妖所以陰隲兆人彌綸萬里祁瞞丹水纍陳馘告之功牧野昆陽纍獻遺俘之捷戈甲耀乎八水營壘塞乎四郊陳勢雲橫軍聲雷動血灑空而驟雨赤沙漲野而飄雲黃困獸摧牙長蛇畏尾效鄾人之宵潰觀楚幕以晝空德均而義士致身氣直而王師難老度日而長鳴金鼓曾不告勞終年而不解鐵衣未嘗言苦既而鳳城光復龍德昭明枉矢當弦穿月之功奚用長竿在手撞天之勢何為遂至修鯢脫泉狂兕入匣師道運末斷領於赤心之徒祿山數窮劈腹於蒼頭之輩况逆巢干紀悖氣凌空鳴螻蟈七百餘齡聚豺狼數十萬衆傷殘九土凌犯二京蓋因祝天網以緩誅布仁風而寬戮遂偷生之五載併除惡於一時蚩尢之冢既成堅埋鐵額長狄之喉已斷永戢雕戈立此神功實資道力我太上金闕元元天皇大帝為天地父母作帝王宗師歷教三皇皆萬八千歲候乎四氣交會五運合同國位永付於子孫聖祚上齊於日月克紹萬八千之歲矣我高祖神堯皇帝應天受命歷數在躬以鄉觀鄉去仙鄉之無遠上德不德增帝德以彌高輟九尺之班符封山印海追八景之仙輅輾霧盤雲負扆垂旒當陽闡化我太宗文武皇帝握乾闡坤修文偃武大禮無體百禮而盡執根元大音希聲一聲而振動金鼓天錫勇智縶虎豹如束芻神助皇威跧蛟螭如結蚓還真返素游藝依仁以無繩為繩縛六雄與五霸以不器為器籠四海與九州然後爭於不爭則戰爭而永息欲於不欲則嗜欲而長消方士衆臻真公來格安期之棗異狀大若匏瓜園客之繭殊形磊如盆盎垂衣一百五十代享國一萬八千年伏惟聖神聰睿仁哲明孝皇帝陛下克紹丕圖統茲大業心懸壽鏡身享福庭帝道中興國根深固永保神器長正皇綱虎牙將軍領八千之勇士龍頭元帥提百萬之精兵永以鎮定區中永以削平天下巨鼇斃而形軀塞海長鯨戮而鬐鬣插天或炙或焚盡千山之木以烹以飪竭五湖之泉紫焰腥膻青萍膏血祅日墮落孛星隕墜蒼旻開豁黑氣消亡獻巨逆之三顱告行朝之九廟耀武威於英代立京觀於神州歲越大椿年逾巨浸天眷北顧備法駕以返堯庭帝澤東流乘仙輿而懷魏闕集㣥牧以頒瑞朝諸侯於明堂托逸搜沈興滅繼絶八龍雲篆降禹稷之天書二武聖文炳商周之帝德中階平而國泰至德正而時雍成寶祚之神功由太上之聖力端拱垂衣恭己正南面而已矣劍南西川節度使太尉兼中書令穎川郡王陳敬瑄夏日高懸吐赫曦之可畏德星永聚實祥瑞以明標遙闢龜城遠迎龍駕獻璿璣以酌大化如轉碧天移蓬萊以作行宮似離滄海郭琪扇搖於行伍阡能搔動於山林韓秀升聚蚊為雷陽師古積螢鬬日生擒者有同縛鼠誅戮者無異刲羊舞百獸於庭前堪標玉牒役五丁於麾下可碎鐵山雖文翁武侯之才蕭猷王濬之策未可與儔昔韋南康鎮成都二十餘載郭汾陽為輔弼二紀在朝比其勳庸量其惠化則請留九閨之儲一裘之歲未為多矣耀陳氏劍南之政掩裴度淮西之功具載典彞永光勳績行在都指揮使左神策軍中尉十軍軍容田令孜崑岡玉柱獨力扶天大華金蓮張心捧日佐聖而出為國而生有逾千越萬之才有聞一知十之智曖然和氣助青帝發生之仁卓爾高情仰素王垂訓之道觀帝符而五賊皆見握人鏡而萬象難逃聰可聽其無聲明可察其未眹弼時立德開國承家賞罰無私九土之諸侯懷惠恩威普度十軍之將帥歸心克已推誠虔心奉道古原層構敬之而無異丹臺舊貫規繩仰之而如升白日禮無上之帝主事威儀之法王神獸八千衝犀象如螻蟻天丁三億轉海嶽如萍蓬周尚父之成功身居第一漢酇侯之著績才獨無雙鏤鼎銘鐘紀勳頌德左僕射平章事蕭遘器業絶倫神秀貫古筆海壓淮湖之浪學山凌衡霍之峯天植國楨文滋相業一匡皇化八秉洪鈞函丈之間布奇兵之億萬跬步之內安率土之蒸黎黃鶴頻鳴雖召公之可控青牛不喘或邴吉以難知吏部尚書平章事韋昭度宗廟重器社稷令臣當昴位以星懸鎮台階而山立蘊圭璋特達之德植松筠貞固之心窮訓典以立心正風正雅調鹽梅以味道肥國肥家仲父上公空就九三之位大臨檮戭虛垂二八之名兵部尚書平章事裴徹澤馬表瑞天驥呈祥雄節貫時清風滌俗銀漢橫空而高朗玉繩垂象之英華學川則四瀆波瀾書林則五松烟雨正氣凜於朝野直道貫於羊腸自輟職瀛洲登庸昭代重持傅說之舟楫再秉臯陶之鈞衡皆磨智刃而裁莽腰盡淬文鋒而刳卓腹內飛龍使楊復恭甲門華胄鼎族令名三教精通九流澄徹體物則左張却立緣情則鮑謝推先論昆仲而八龍掀鬐談經史而五鹿折角秉樞衡於纍代貫名氏於百家稟吳季札之仙姿抱孔文子之敏惠青山蘊玉發㣥岫以光輝緑水懷珠起一川之晶彩內樞密使開府儀同三司苗允禮四瀆比位五星炳靈清掩玉壺義輕金諾智圓若月長垂助日之光辨注如川每凑為王之海秉氣正直執心溫恭王佐宏才帝臣重器當軸而身回地紀持樞而手正天文宿稟道門素欽直教信言不美常行質奏之詞法語可尊每契和平之理內樞密使驃騎大將軍李順融三傑挺生千山發秀元禮龍門之峻慶及令孫少君鶴駕之高福茲靈葉掌萬機之密務濟一國之黎人公清而水鏡含虛正直而朱繩讓美博學則邱墳著績操觚則錦繡成文實腹守真棄百慮於襟懷之外虛心待物納八荒於方寸之間監軍使驃騎大將軍兼三川制置都監劉景宣景宿呈祥卿雲布彩風骨俊邁才量宏深淮南王之瓊林驂鸞不遠河上公之蘭友跨鶴非遙贊護克勤勳庸永著左街威儀明道大師尹嗣元大仙靈苗高族茂葉太上元元之上足文始真君之哲孫七歲悟道十三逢師紫玉之骨將成終游閬苑黃書之文已究即上朱陵道士李無為國源清派天葉芳陰真訣千里窮研咸達仙經萬卷諷覽無遺皆同在師門結為道友三天鳳璽化靈㤅以成書一粒龍丹駐童顏而度劫星冠月帔上禮於元皇虹轡雲輿前朝於大帝金蠶五斛暗吐仙絲瓊節一雙遙迎真侶自昔忠臣明主咸理國以升天應歷運以救時蘇生靈而畢績少昊顓頊皆上紫微之宮君奭太公俱乘碧霞之輦其宮室牖戶臺榭池塘似雲霧之結成如丹青之寫出七十二之福地三十六之洞天神仙之窟宅相連以青城為戶牖真境之風烟不雜以嶓冡為壇臺可以濟渡四迷開宏七部仙衣非製而自有豈假紉針仙車不駕而自行曾無轍跡九重天上白玉為京千雉城中黃金作殿披袞服而身掛日月戴冕旒而坐鎮乾坤天綱正而四氣和國步安而三元序手執長生之柄制定白駒心藏要道之根控乘赤鯉况乎代變時遷綿歷於三千餘歲建邦立國崢嶸於四萬餘年門巷新成人烟漸熾當時闤闠髣佛如存今日宮庭精新尢盛七色鳳輦駕幸仍頻九班龍輿巡禮彌敬太虛天館常開不夜之門天極福堂永對長春之景氣連碧落光掩赤城臣職忝禁林身叨詞客涉儒海而素淺渡文河而不深董仲舒五彩之蛟稀來筆下楊子雲三清之鷃少到毫端愧無黃絹之才難紀紫烟之瑞詞曰洪源肇開浩劫無際恍惚大道希夷象帝太初既隱太始來繼元黃在殼清濁未蛻天地之前億千萬歲山比我久如電之逝海比我大如絲之細與釋比較空門永閉與儒並功章甫無勢昭德塞違解紛挫鋭設教隨機應變無滯三皇益明五帝增睿率土皆泰㣥生咸濟樓觀發軔函關掛轊罽賓闡化身毒布惠無狀之狀無聲之聲去莫可送來莫可迎強字之字強名之名太虛之上黃金為城杳冥之外白玉作京煥赫六極牢籠八紘萬國同酌百壑咸傾莫得而竭莫得而盈淺而行者長居利貞深而行者永致太平凜凜烈氣化作天丁鬱鬱徑草變為神兵火刀電耀霜劍虹明莧戮封豕瓜剖長鯨地古風變俗阜時清年代綿邈歲月崢嶸新宮是建永觀厥成赫赫高祖明明聖孫開鑿造化刳剔胚渾把捉日月包裹乾坤鸞蹌鳳跱虎步龍蹲鳥卵之中可納穹旻黍粒之內能藏崑崙塵波澄徹智浪淵淪迷羅自解瑩鏡難昏萬象俱盡惟道獨存三教爭長惟道獨尊心藏五賊國靜九門逢逢諫鼓汛汛衢樽五方入貢八表爭奔車徒川騖租賦雲屯巍峨玉皇煥赫金籙靈宮八海水府四瀆堯湯寶位舜禹天祿巨寇梟殄神州克復去召千神來臻百福天轉碧輪地旋黃轂獻玉十貢金九牧寒暑運行禎祥倚伏害蛟斃刃狂兕殪鏃軒鏡在握殷繩當木瓊臺九層銀蠶五斛手指青牛身騎白鹿洞啓括蒼天開王屋皇根國葉帝宗天族明堂端拱元臣啓沃四海萬方無思不服九虬夭矯雙鳳回旋鶴駕清漢鸞驂紫烟纍行盈百積功滿千丹瓊樓高上接九天碧玉壇峻下降八仙犬吠蓬島龍耕芝田地有謙道東走衆川人居上德南御㣥賢大活之井長生之泉延洪聖祚萬八千年鶴涅不緇烏非染黑然於自然得於自得何以發蒙內辨其惑何以開悟中修其式如車指南似星拱北隱見無常變化不測大象難包二儀益塞大智難展六合陋仄長生之柄永壽之域朝服刀圭暮生羽翼廟獻三顱風清萬國靈觀新構㣥仙來格瓊宮寶臺玉書金策豐碑嶽立巨龜鼇逼詞惟頌美文匪誕飾鸞鶴翹蹲龍蛇騰擲紫氣氤氳赤光歙赩七聖握圖九皇執敕梵宇無光儒宮失色端冕明堂垂旒御極運齊三五慶延萬億開闢寰宇咸仰道德永致中興皆從帝力維文德元年歲次戊申十月乙丑朔二十七日辛卯僖宗皇帝將遷於靖陵禮也羽衛既整笳蕭畢陳感切㣥品哀動人神孝弟嗣皇帝臣國體情重天倫痛深範規鴻烈想像徽音舉觴奠以頓首援哀冊以寫心詞曰天實生聖聖必為君銀河色變玉清氣分祥圖煥炳瑞景絪縕重瞳舜目八彩堯雲克明克類乃武乃文是超東戶宜繼南薰乃平萬方乃登四海墜典必舉舊章無改威儀穆穆多士藹藹聲冠令王化冥真宰東漸漲溟西被流沙徒施尉候匪間幽遐書文車軌籠為一家貫胸魋髻慕我諸華既洽無為益彰在宥疏網雖設吞舟是漏微火不防燎原孰救四極鼇傾兩曜麟鬬爞爞湯旱湯湯堯水火爍金流陵移山徙咨嗟祈祝隘溢圖史莫咎人謀難窮天理漢后三七冥運則然秦都百二巨防虛傳風排月陳彗掩星躔亶去岐山滿游崑嶽于橐于囊為猿為鶴書藏稽穴琴捐洞壑沈吟往事追想前作爰乘天駟爰幸井絡澄徹錦江崢嶸劍閣皇天震怒列藩會盟妖氣一蕩駭浪徐清遂復中夏言歸上京兒童躍舞父老歡迎寢殿未安僞孽為害紏率姦人隱藏無賴洋洋漢源熠熠芝蓋爰警爰蹕乃朝乃會僭逆既顛鑾輅言旋魯戈回日媧石補天方覩萬物方永億年遽云厭代俄乃上仙嗚呼哀哉帝鄉兮莫追天路兮何之龍馭飄兮弓劍在雀臺暮兮歌管悲嗚呼哀哉顧惟幼冲祇紹明聖捧秦氐之誓詞虔霸陵之遺令載深號咽敢云稱咏望松闕兮杳冥撫棣草口咢兮精誠念烏兔之奔邁仰牛斗之縱橫播芳塵於簡冊託悽恨於銘旌嗚呼哀哉
