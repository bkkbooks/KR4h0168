front:
  text: 全唐文欽定全唐文卷五百八十八柳宗元二十
  hash: sha256:68183f97cacf9708b81791f257d7497b3ad72fd2663c82cfde535bef093c15b9
body:
  text: 天子之三公稱公王者之後稱公諸侯之入為王卿士亦曰公有土封其臣稱之曰公尊其道而師之稱曰公楚之僭凡為縣者皆曰公古之人通謂年之長老曰公故言三公若周公召公王者之後若宋公為王卿士若衛武公虢文公鄭桓公其臣稱之則列國皆然師之尊若太公楚之為縣者若葉公白公年之長老若毛公申培公而大臣罕能以姓配公者雖近有之然不能著也唐之大臣以姓配公最著者曰房公房公相元宗有勞於蜀人咸服其節相肅宗作訓於岐人咸尊其道惟正直慈愛以成於德用是進退所居而事理辨所去而人哀號理袁人袁人不勝其懷為文士趙郡李華銘公之德亂故不克立今刺史太原王涯嘉公之道猶在乎人袁人不忘公之道為之刻石且曰州之南有亭曰需宴亭公之為也人之思也乃增飾棟宇即而立焉州人大悅咸會隕涕言曰昔公以周召之德微子之仁有土封以為卿士道為三公德為國師年為元老嘗為縣縣懷其化至於州州濡其澤凡我子孫罔不戴慕盛德之詞文而不刻更刺史數十莫克興起乃卒歸於王公王公嘗以機密匡天子於禁中承公之道刺於我邦由公之理又能尊公之德起遺文以昭前烈則其入為卿士三公也孰曰不宜吾懼其去我也遽願書於銘之陰用永表於邦之良政有唐貞臣汝南周氏諱某字某以諫死葬於某貞元十二年柳宗元立碣於其墓左在天寶年有以諂諛至相位賢臣放退公為御史抗言以白其事得死於墀下史臣書之公死而佞者始畏公議於呼古之不得其死者衆矣若公之死志匡王國氣震姦佞動獲其所斯蓋得其死者與公之德之才洽於傳聞卒以不試而獨申其節猶能奮百代之上以為世軌者也若令生於定哀之間則孔子不曰未見剛者出於秦楚之後則漢祖不曰安得猛士而存不及興王之用沒不遭聖人之歎誠立志者之所悼也故為之銘銘曰忠為美道是履諫而死佞者止史之志石以紀為臣軌兮四年五月皇帝以銀印赤紱即隱所起陽公為諫議大夫後七年廷諍懇至纍日不解帝尤嘉異遷為國子司業旌直優賢道光師儒又四年九月己巳出拜道州刺史太學生魯郡季儻廬江何蕃等百六十人投業奔走稽首闕下叫閽籲天願乞復舊朝廷重更其事如己巳詔翌日會徒北嚮如初行至延喜門公使追奪其章遮道願罷遂不果獻生徒嗷嗷顧盼徘徊昔公之來仁風扇揚暴慠革面柔軟有立聽聞嘉言樂甚鐘鼓瞻仰德宇高逾嵩岱及公當職施政示人準程良士勇善僞夫去飾惰者益勤誕者益恭沈酗腆酒斥逐郊遂違親三歲罷退鄉黨令未及下乞歸就養者二十餘人禮順克彰孝弟以興則又講貫經籍俾達奧義簡習孝秀俾極儒業冠屨裳衣由公而嚴進退揖讓由公而儀公征甚遐吾黨誰師遂相與咨度署吏布告諸儒願立貞珉侔高狀明乃訪於學古之士紀公名字垂憲於後公名城字亢宗家於北平隱於條山惟公端粹沖和高嶷懿醇道德仁明孝愛友悌薰襲里閈布聞天下守節貞固患難不能遷其心怡性坦厚榮位不足動其神為司諫義震於周行為司業愛加於生徒宜乎立石俾後是憲其詞曰惟茲陽公履道葆醇爰初隱聲覆簣基仁德充而形乃作諫臣抗志勵義直道是陳帝求師儒二我成均開朗蒙滯宣明德教太和潛布元機密照㣥生聞禮後學知孝進退作則動言是效匪公之軌人用奚蹈粗厲貪淩待公順之欺僞譎詐待公信之少年申申咸適其宜檟楚廢弛尊嚴而威公褒其良俾升於堂癯者既肥榮如衮衣公棄不用懲咎內訟既訟於內猶公之誨匪仁孰親匪德孰尊今公於征孰表儒門生徒上言稽首帝閽謂天蓋高曾莫我聞青襟涕濡闐街盈衢遠送於南望慕踟蹰立石書德用揚懿則嗚呼斯文遺愛罔極孔子作春秋千五百年以名為傳者五家今用其三焉秉觚牘焦思慮以為論注疏說者百千人矣攻訐狠怒以詞氣相擊排冒沒者其為書處則充棟宇出則汗牛馬或合而隱或乖而顯後之學者窮老盡氣左視右顧莫得而本則專其所學以訾其所異黨枯竹護朽骨以至於父子傷夷君臣詆悖者前世多有之甚矣聖人之難知也有吳郡人陸先生質與其師友天水啖助洎趙匡能知聖人之旨故春秋之言及是而光明使庸人小童皆可積學以入聖人之道傳聖人之教是其德豈不侈大矣哉先生字某既讀書得制作之本而獲其師友於是合古今散同異聯之以言纍之以文蓋講道者二十年書而志之者又十餘年其事大備為春秋集注十篇辨疑七篇微指二篇明章大中發露公器其道以聖人為主以堯舜為的包羅旁魄膠轕下上而不出於正其法以文武為首以周公為翼揖讓升降好惡喜怒而不過乎物既成以授世之聰明之士使陳而明之故其書出焉而先生為巨儒用是為天子諍臣尚書郎國子博士給事中皇太子侍讀皆得其道刺二州守人知仁永貞年侍東宮言其所學為古君臣圖以獻而道達乎上是歲嗣天子踐阼而理尊優師儒先生以疾聞臨問加禮某月日終於京師某月日葬於某郡某里嗚呼先生道之存也以書不及施於政道之行也以言不及覩其理門人世儒是以增慟將葬以先生為能文聖人之書通於後世遂相與諡曰文通先生後若干祀有學其書者過其墓哀其道之所由乃作石以表碣嗚呼先君之墓仲父殿中君志焉孤宗元不敢稱道先德然而無以昭於外者用敢悉取仲父之所陳而繫其辭刻茲石表先君諱鎮字某六代祖諱慶後魏侍中平齊公五代祖諱旦周中書侍郎濟陰公高祖諱楷隋刺濟房蘭廓四州曾伯祖諱奭字子燕唐中書令曾祖諱子夏徐州長史祖諱從裕滄州清池令皇考諱察躬湖州德清令世德廉孝揚於河滸士之稱家風者歸焉先君之道得詩之㣥書之政易之直方大春秋之懲勸以植於內而文於外垂聲當時天寶末經術高第遇亂奉德清君夫人載家書隱王屋山間行以求食深處以修業作避暑賦合㣥從弟子姪講春秋左氏易王氏衎衎無倦以忘其憂德清君喜曰茲謂遁世無悶矣亂有間舉族如吳無以為食先君獨乘驢無僮御以出求仁者冀以給食嘗經山澗水卒至流抵大壑得以無苦被濡塗以行無慍容觀者哀悼而致禮加焉季王父六合君忤貴臣死於吏舍猶鞫其狀先君改服徒行逾四千里告於上由是貸其問既而以為天子平大難發大號且致太平人罹兵戎農去耒耜宜以時興太學勸耦耕作三老五更議藉田書齊沐以獻道不果用授左衛率府兵曹參軍尚父汾陽王居朔方備禮延望授左金吾衛倉曹參軍為節度推官專掌書奏進大理評事以為刑法者軍旅之楨幹斥候者邊鄙之視聽不可以不具作晉文公三罪議守邊論議事確直世不能容表為晉州録事參軍晉之守故將也少文而悍酣嗜殺戮吏莫敢與之爭先君獨抗以理無辜將死常以身扞笞箠拒不受命守大怒投几折簀而無以奪焉以為自下繩上其勢將殆作泉竭木摧詩終秉直以免於恥調長安主簿居德清君之喪哀有過而禮不逾為士者咸服服既除常吏部命為太常博士先君固曰有尊老孤弱在吳願為宣城令三辭而後獲徙為宣城四年作閿鄉令考績皆最吏人懷思立石頌德遷殿中侍御史為鄂嶽沔都團練判官元戎大攘狡虜增地進律作夏口破虜頌後數年登朝為真會宰相與憲府比周誣陷正士以校私讐有擊登聞鼓以聞於上上命先君總三司以聽理至則平反之為相者不敢恃威以濟欲為長者不敢懷私以請間㣥寃獲宥邪黨側目封章密獻歸命天子遂莫敢言逾年卒中以他事貶夔州司馬作鷹鸇詩居三年醜類就殛拜侍御史制書曰守正為心疾惡不懼先君捧以流涕曰吾惟一子愛甚方謫去至藍田訣曰吾目無涕今而不知衣之濡也抑有當我哉作喜霽之歌副職持憲以正經紀貞元九年宗元得進士第上問有司曰得無以朝士子冒進者乎有司以聞上曰是故抗奸臣竇參者耶吾知其不為子求舉矣是歲五月十七日終於親仁里第享年五十五七月某日葬於萬年縣棲鳳原後十一年宗元由御史為尚書郎天子行慶於下申命崇贈而有司草創頗緩會宗元得罪遂寢不行太夫人范陽盧氏某官某之女實有全德為九族宗師用柔明勤儉以行其志用圖史針誡以施其教故二女之歸他姓咸為表式太夫人既授封河東縣太君會冊太上皇后於興慶宮既乃宗元貶秩為永州司馬奉侍溫凊未嘗見憂元和元年五月十五日終於州之佛寺享年六十八嗚呼宗元不謹先君之教以陷大禍幸而緩於死既不克成先君之寵贈又無以寧太夫人之飲食天殛薦酷名在刑書不得手開元堂以奉安祔罪惡益大世無所容尚顧嗣續不敢即死支綴氣息以嚴邦刑大懼祭祀之無主以忝盛德敢用特牲昭告神道號叫萬里以畢其辭云袁高河南人以給事中敢諫爭貞直忠蹇舉無與比能使所居官大再贈至禮部尚書姜公輔為內學士以奇策取相位好諫諍免後以罪貶為復州刺史卒齊映南陽人為相以文敏顯用嚴郢河南人剛厲好殺號忠能為京兆河南尹御史大夫善舉職為邪險構扇以貶死元全柔河南人氣象甚偉好以德報怨恢然者也為大官有土地入為太子賓客杜黃裳京兆人宏大人也善言體要為相有墻仞不佞以謀克蜀加司空出為河中節度劉公濟河間人厚寬碩大與物無忤為渭北節度入為工部尚書卒楊氏兄弟者宏農人皆孝友有文章憑由江南西道入為散騎常侍凝以兵部郎中卒凌以大理評事卒最善文穆氏兄弟者河南人皆強毅仁孝贊為御史中丞捍佞幸得貶後至宣池歙處置使卒質為尚書郎以侍御史內供奉卒最善文皇甫政河南人有威儀由浙東廉使為太子賓客裴樞同郡人為御史天子以隱罪誅吏樞頓首願白其狀以故貶後為尚書郎李舟隴西人有文學俊辨高志氣以尚書郎使危疑反側者再不辱命其道大顯被讒妬出為刺史廢痼卒李鄘江夏人果檢自負嶷然善為官為御史中丞京兆尹鳳翔節度梁肅安定人最能為文以補闕修史侍皇太子卒贈禮部郎中陳京泗上人始為諫官數諫諍有內行文多詁訓為給事中上方以為相會惑疾自刃廢痼卒韓會昌黎人善清言有文章名最高然以故多謗至起居郎貶官卒弟愈文益奇許孟容吳人讀書為文口辨為給事中嘗論事由太常少卿為刑部侍郎李覿隴西人行義甚修至刑部郎中卒故與先君為三司者也其大理者曰楊瑀瑀無可言猶以獄直為御史宇文邈河南人有文謹愨人也為御史中丞齪齪自守然以直免官復為刺史卒袁滋陳郡人善篆書文敏不競為相出使辱命貶刺史復為義成軍節度卒盧㣥范陽人雜博多所許與使反側之地天子以為任事為義成軍節度卒崔損清河人畏慎為相無所發明然不害物天子獨愛幸以損為長者鄭餘慶滎陽人再為相始天下皆以為長者及為大官名益少今為尚書河南尹無恙鄭利用餘慶從父兄也真長者由大理少卿為御史中丞復由中丞為大理少卿李益隴西姑臧人風流有文詞少有僻疾以故不得用年老常望仕非其志復為尚書郎王紓其弟紹太原人紹得幸德宗為尚書在宰相之右今為徐泗節度紓有學術魯直為尚書郎路泌河南人以尚書郎使西戎留戎中度今已年八十餘既和戎十五年不得歸無為言者虞當會稽人為郭尚父從事終沔州刺史以信聞賈弇長樂人善士也為校書郎卒弟全至御史中丞趙需天水人哻哻儒士也有名至兵部郎中卒張式南陽人張莒常山人張惟儉宣城當塗人皆善言謔式至河南尹莒鄧州刺史惟儉和州刺史奚陟江都人柔敏至吏部侍郎世謂陟善宦然其智足以自處也盧景亮涿人有志義多所激發為諫官奏書如水赴壑坐貶廢棄甚久至順宗時為尚書郎升中書舍人卒楊於陵宏農人善吏敏秀者也為中書舍人京兆尹張因某人舉詔策為長安尉願去官為道士甚有名以其弟回降封州曰吾老矣必死回也哭而行遂死封州高郢渤海人有文章規矩自立者不干貴幸以太常為相罷居尚書唐次北海人有文章學行義甚高以尚書郎出為刺史屏棄永貞中召以為中書舍人道病去長安七十里死傳舍苗拯上黨人有學術峭直以諫議大夫漏泄省中語貶萬州卒柳氏兄弟者先君族兄弟也最大并字百存為文學至御史病瞽遂廢次中庸中行皆名有文咸為官早死柳登柳冕者族子也自其父芳善文史與冕並居集賢書府冕文學益健頗躁自吏部郎中出為刺史至福建廉使卒登晚仕至尚書郎祕書少監薛丹同郡人至尚書郎呂牧東平人由尚書郎刺澤州卒崔禎清河人至檢校郎官子㣥為右補闕贈給事中房啓河南人善清言由萬年令為容州經略于申河南人至尚書郎常仲孺河南人今為諫議大夫蘇辨武功人好聚書至三萬卷與先君通書以戶部侍郎貶復為刺史崔芃博陵人善言名理為御史尚書郎鄭元均滎陽人強抗少所推讓然以此多怨困不得位辛惲隴西人有史學韓衡昌黎人善士陳衆甫梓潼人高志氣薛伯高同郡人好讀書號為長者後至尚書卒張宣力清河人儒善後表其名去力但為宣自元均至宣力皆沒沒無顯仕者孤宗元曰先君之所與友凡天下善士舉集焉信讓而大顯道博而無雜今之世言交者以為端敢悉書所尤厚者附茲石以銘於背如右唐貞元十二年二月庚寅葬我殿中侍御史河東柳公於萬年縣之少陵原公諱某字某邑居於虞鄉曾王父某官王父某官皇考某官奕世餘慶叢而未稔濟德流祉其後宜大秀而不實為善者惑嗚呼哀哉惟公敦柔峻清恪慎端莊進止威儀動有恆常英風超倫孤厲貞方居室孝悌與人信讓當職強毅游刃立斷自少耽學頗工為文既窮日力又繼以夜鄉里推擇敦迫上道乃與計偕來游京師觀藝靈臺貢文有司射策合程遂冠首科休有令問㣥士羡慕居數年授河南府文學教勵生徒選擇貢士儒黨相賀庶人觀禮秩滿渭北節度使延為參佐總齊軍政甚獲能稱加太常寺協律郎既喪主帥罷歸私室方將脫遺紛埃退與道俱沖漠保神優柔隸儒四方聞風交馳鵠書載筆乘軺乃作參謀出入朔方陪佐戎車遷大理評事又加章綬朱裳銀印宗黨有耀權略密勿潛機埋照完彼亭堡時其講教實從我謀鄰國是效改度支判官轉大理司直出納府庫頒給軍食下無讎斂黔首休息月校歲會莫不如畫庫豐財羡制成計得又遷殿中侍御史度支營田副使分閫之寄參制其半柔以仁撫剛以義斷戎臣坐嘯公堂無事朝端延首方待以位既而祿不及伐冰政不獲專達以其年正月九日遇疾終於私館享年五十嗚呼痛哉奔驥騁力中途踠足高鴻輕舉在雲墜翼凡我所知哀慟無極本道節度尚書朔寧王張公震悼涕慕不任於懷臨遣牙將試殿中監李輔忠監備凶禮賵賻甚厚行軍司馬侍御史韋重規等匍匐救助事用無闕丹旐素車歸於上京撰期定宅莫有愆素故友諸生宗人外姻號慟會葬哀禮咸申克窆元堂掩坎廣輪顧盼無依徘徊增哀願勒休聲延垂後賢於是汝南周君巢等相與琢石書德用圖不朽文曰抱元淳稟粹和既強毅又柔嘉登儀曹耀文章司學徒儒風揚自渭北佐朔方戎政間黔首康冠惠文垂朱裳才不施天茫茫刊樂石篆遺德延休烈垂憲則於萬年長無極少陵原柳氏之大墓唐貞元十九年某月日孤某奉其先府君洎夫人之喪祔於其位由新墓而南若干步曰高祖王父蘭州府君諱某字某之墓又東若干步曰曾祖王父邠州府君諱某之墓西若干步曰祖王父司議郎府君諱某之墓咸異兆而相望昭穆之有位序壤樹之有豐殺皆如律令府君諱某字某由父任為太廟齊郎更許昌陽武伊闕華原尉王屋丞汝陰令為宏農二年推其誠心裕於其人闢土生穀若有天相之道衣食給足故人不札夭教厲明具故俗不爭奪遂以洽於太和事理克彰刺史盧杞加禮褒旌考績絶尤推君之政風於下邑命為吏部尚書郎庾河南受命黜陟狀君理績殊異宜升天朝帝有歎焉方圖優升命用不長年五十五建中二年某月日卒於官以其素廉家之蓄不足以充凶事遂殯於是邑仍會危難至於今乃克返葬孤某嘗為黔州録事參軍今無祿仕而志不敢緩初公娶司農少卿京兆韋山之孫涇陽主簿回智之女德容溫良大歷二年某月日卒於越而假葬焉孤某徒行自越舉夫人之喪至於虢舉宏農君之喪咸至於墓窆焉既窆立石表於墳前示後之人以無忘孝敬嗚呼世有難仕於外而葬其族者鮮矣孝子之心有待駟馬五鼎而卒不至者焉若今之殺衣黜食寒妻子飢僕御終身由之而志益不懈為旅人徒跣萬里以厄困終事孝之難者歟五十而慕者舜也祿千鍾而悲者曾子也聖且賢難之若是今之人有由其道者得不立於世乎嗚呼有唐仁人獨孤君之墓祔於其父太子舍人諱助之墓之後自其祖贈太子少保諱問俗而上其墓皆在灞水之左今王父營陵於其側故再世在此嗚呼在獨孤君之道和而純其用端而明內之為孝外之為仁默而智言而信其窮也不憂其樂也不淫讀書推孔子之道必求諸其中其為文深而厚尤慕古雅善賦頌其要咸歸於道昔孔子之世有顏回者能得於孔子後之仰其賢者譬之如日月而莫有議者焉嗚呼獨孤君之明且仁如遭孔子是有兩顏氏也今之世有知其然者其信於天下乎使夫人也夭而不嗣世之惑者猶曰尚有天道噫乎甚邪君諱申叔字子重年二十二舉進士又二年用博學宏詞為校書郎又三年居父喪未練而沒蓋貞元十八年四月五日也是年七月十日而葬鄉曰某鄉原曰某原嗚呼君短命行道之日未久故其道信於其友而未信於天下今記其知君者於墓韓泰安平南陽人李行諶元固其弟行敏中明趙郡贊皇人柳宗元河東解人崔廣略清河人韓愈退之昌黎人王涯廣津太原人呂溫和叔東平人崔㣥敦詩清河人劉禹錫夢得中山人李景儉致用隴西人嚴休復元錫馮翊人韋詞致用京兆杜陵人公諱墐字封叔河東聞喜人太尉公諱行儉實高祖侍中公諱光庭實曾祖刑部員外郎府君諱稹實祖大理卿府君諱警實父公由進士上第校書崇文館飭館事修整左春坊由是立署局後參京兆軍事桉覆校巡大尹恆得以取直為太常主簿搜剔疑互探抉遁隱宿工老師不得伏匿皆來會堂下耆股肱役喉喙以集樂事作坐立二部伎圖卿奇其績奏超以為丞司空杜公聯奉崇陵豐陵禮儀再以為佐離紛厖導滯塞關百執事條直顯遂司空拱手以成自開元制禮諱去國恤章纍聖陵寢皆因事攬綴取一切乃已有司卒無所徵公乃撰二陵集禮藏之南閣轉殿中侍御史仍拜尚書比部員外郎會校成要期歲畢具刺金州決高㢮隟去人水禍渚茭原茅闢成稻粱陟萬年令叢劇辨肅談宴終日人視之若居冗官然會金州猾吏來揚言恐喝以煩褻事曰不得三十萬吾能為禍公大怒召罵之恣所為吏巧以聞御史桉章具獄再謫道州循州為佐掾會赦量移吉州長史元和十二年七月日病痁泄卒始公以唯諾聞長安中奔人危急輕出財力如索水火性開蕩進交大官不視齒類挾同列收下輩細大畢歡喜博奕知聲音飲酒甚少而工於糾謫謠舞擊咢纖屑促密皆曲中節度而終身不以酒氣加人晝接人事夜讀書考禮收捃策牘未嘗釋手以是重諸公間初娶范陽盧氏無子後夫人柳氏德為九族冠生三男子喪其二焉貞元十六年某月日卒祔於長安御宿之北原冢子銑奉柩以明年月日克葬於墓銑以文書來柳州告其叔舅宗元願碣於墓左則涕為之銘其辭曰有鬱其馨惟裴之卿世服大僚仍耀烈名封叔申之實惟其英讎書宮闈佐職於京太常命吏以能增秩相儀考禮大辨斯畢鳩工展伎爰備聲律或圖或書藏之府室史於柱下郎於會司徼循以周大比是宜作牧於金金人允懷溝防漢滸墊沃卒移增我歲食易其芋魁游手閒民相顧聚來徵為萬年治劇於都百務敘成談宴以娛誰恤誰恃不忍悍吏胡巧其辭桉章以遂由道斥循施施三年更赦進資廬陵是遷人曰世德宜慶於延又曰良能宜力之宣朝有大賚期賜其還鬼神不享命隕在前長原有墓高曾祖父淑靈是祔封叔爰歸左右惟具孤銑磨石祈辭海陬遂升其趺於道之周貞元十九年正月某日守尚書兵部郎中楊君卒某年月日葬於奉先縣某原既葬其子姪洎家老謀立石以表於墓葬令曰凡五品以上為碑龜趺螭首降五品為碣方趺圓首其高四尺桉郎中品第五以其秩不克偕降而從碣之制其世系則紀於大墓君諱凝字懋功與季弟凌生同日不周月而孤伯兄憑翦髮為童家居於吳太夫人母道尊愛教飭謹備君之昆弟孝敬出於其性禮範奉於其舊克有成德輯其休光東薄海岱南極衡巫文學者皆知誦其詞而以為模準進修者率用歌其行而有所矜式君既舉進士以校書郎為書記毗贊元侯於漢之陰式徙荊州由協律郎三轉御史元戎出師用顯厥謀遂入王庭為起居郎書事不回著垂國典又為尚書司封員外郎革正封邑申明嫡媵事連權右斥退勿憚直聲彰聞仍參選部以馭㣥吏姦臣席勢威福自已他人求附離而不可得者公則郤之私以胥吏求署一皆罷遣曰吾不以三尺法為己利害居喪致哀內盡其志外盡其物而無有不得於心者服除為右司郎中危言直已以致其誠然卒中於詖辭不得朝請以檢校吏部郎中為宣武軍節度判官亳人缺守往蒞其政孤老撫安強猾戮死墾鑿墝鹵芟艾榛荒作爰田以贍人食濬決潢汙築復堤防為落渠以定水禍理不半歲利垂千祀會朝復命次於汴郊帥喪卒亂不可以入遂西走闕下璽書迎門勞徠甚備以疾居家三年復登於朝遐邇咏歌仍遇痼疾天子致問逾三月不賜告幸其愈而用之遂卒天下文行之士為之悲哀嗚呼君有深淳之行有強毅之志內以和於親戚正於族屬外以信於朋友施於政事故身之進退人之喜戚繫焉凡其昆弟申明於朝制書咸曰孝友君子謂楊氏其仁義之府君之文若干什皆可以傳於世若某者以姻舊獲愛不腆之文君實知之惟車馬幣玉無可以稱其德用君之所以知者酬焉
