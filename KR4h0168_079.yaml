front:
  text: 全唐文欽定全唐文卷七十九帝諱忱憲宗第十三子元和五年生長慶元年三月封光王名怡會昌六年三月立為皇太叔翌日即位改今名大中二年正月上尊號聖敬文思和武光孝皇帝在位十三年年五十諡曰聖武獻文孝皇帝咸通十三年加諡元聖至明成武獻文睿智章仁神聰懿道大孝皇帝廟號宣宗
  hash: sha256:28671e34fee5fa60003abf93d204ac50c33178b2cc3f597c54dbe57fe8bd75a6
  markers:
  - {type: head, offset: 12, content: 宣宗皇帝, id: KR4h0168_NFKB_079-h1, level: 1}
body:
  text: 將相之任中外攸屬入則揚緝熙以正百度出則布威令以靖一方易以才難委寄咸重爰設齋壇之禮仍合台席之榮式示酬勞允諧僉望特進守太尉兼門下侍郎同中書門下平章事充宏文館大學士太清宮使上柱國衞國公食邑三千戶李德裕嶽瀆閒氣鐘磬正音葆粹孕和本仁叶義道蘊賢人之業正為王者之師詞鋒莫當學海難測自入膺大任克搆崇庸王猷國經契合彞矩丙吉罄安邊之術虜寇殄夷張華興伐叛之謀壺關洞啟克荷先朝之旨弼成厎定之功布在冊書輝映前古而能處劇不懈久次彌勤朕以嗣位之初懋勤在念宜先碩望以表優恩荊部雄藩地惟西楚總五都之要會包七澤之奧區兵賦殷繁居旅甚衆必藉舊德作鎮尹臨載崇五教之名俾賦十連之貴勉宏化理以續前勞可檢校司徒同中書門下平章事兼江陵尹充荊南節度觀察處置等使刺史交代之時非因災沴大郡走失七百戶巳上小郡走失百戶巳上者三年不得錄使兼不得更與理人官增加一千戶巳上者與超資遷改仍令觀察使審勘詣實聞奏如涉虛妄本判官重加懲責縣令員數至廣朝廷難悉諳知吏部三銓祗憑資考訪於近日多不得人委觀察使於前資攝官內精加選擇當具薦論如後犯贓連坐所舉人及判官重加懲責吳氏可封昭儀張氏可封婕妤晁氏梁氏並可封美人羅氏史氏並可封才人錢氏可封長城郡夫人曹氏可封武威郡夫人勅位亞長秋道毗內理必資懿範方被寵章吳氏等佩服禮經周旋法度有柔婉之行既表於天資有恭儉之儀可施於嬪則慕班氏之辭輦偉馮媛之當熊思在進賢義高前史是用列於紫殿冠彼後宮俾洽彤管之榮式俟金環之慶可依前件長女可封萬壽公主第二女可封永福公主第三女可封西華公主第四女可封廣德公主第五女可封和義公主第六女可封饒安公主門下諸女之封始資漢制䟽邑之典今為國章長女等坤道稟柔條風育德莊敬柔順受粹氣於靈源言容法度穆昭徽於內則祥降北渚教襲南薰克茂天和更承姆訓雖年方齠齔而體備肅雍用洽寵私俾開井賦可依前件錄其自效則付以國權懲彼保姦則舉茲朝憲此王者所以本人情而張法理也特進行太子少保分司東都上柱國衞國公食邑三千戶李德裕憑藉鎡基累塵台衮不能盡心奉國竭節匡君事必徇情政多任己愛憎頗乖於公道升黜或在於私門遂使冤塞之徒日聞騰口積嫌之下得以恣心豈可尚居保傅之榮猶列清崇之地宜加竄斥以戒僻違嗚呼朕臨御萬方推誠庶物顧彼纖瑣皆欲保安豈於將相舊臣獨遺恩顧而羣議不息謗書盈篋爰舉典章事非獲巳凡百寮庶宜體朕懷可潮州司馬員外置同正員仍所在馳驛發遣縱逢恩赦不在量移之限君以人為本人以食為天有國有家捨此無急如聞州府之內皆有閒田空長蒿萊無人墾闢與其虛棄曷若濟人宜令所在長吏設法召募貧人課勵耕種所收苗子以備水旱及當處軍糧王者懸賞罰以示萬方況乎臣子若奮其良術則宜擢處重位或挾彼邪謀固合稍加懲沮惟此二柄我何敢私湖南都團練觀察處置等使光祿大夫行潭州刺史兼御史大夫上柱國隴西郡開國公食邑二千戶李回早以藝學科名累登華貫謂爾奉公約己旋升大寮因緣獎遷遂陟台輔而不能竭誠以盡忠益枉道而求庇交通財賄導達姦邪昨因推鞫凶徒皆得發明事跡朕務宏體貌特免研窮論既喧騰理須移奪況又聞頃司政柄每欲除授咸取決於德裕不自行其至公物議所興以斯為重豈可猶委澄清之任復領湘潭是宜輟從調護之班俾分洛邑勉莅寵秩幸予寬恩可行太子賓客分司東都為臣竭公忠之誠朝尊爵賞事君乖毗倚之望國有典章惟是二道理所不廢湖南都團練觀察處置等使光祿大夫行潭州刺史兼御史大夫上柱國隴西郡開國公食邑二千戶李回始以才術升於台階作予股肱亦援星律寄長兼於授鉞道甚異於匪躬亦既左遷俾居廉問而跡乖檢慎事足端倪秉鈞之勢巳移枉道之蹤乃見負我非淺叨榮故深況又聞頃司政柄應欲除授咸取決於德裕不自行其至公人皆有言孽亦何逭朕匿瑕含垢思全進退之宜爾則同力協心且易樞機之任合居嚴譴猶示寬恩故前制命爾為太子賓客給事中封還我勅且曰責坐之詞至重降移之秩太輕物論喧然以為未當爾實自搆予何敢私是用移謫臨賀冀厭羣議勉於三省勿謂無恩可持節賀州諸軍事賀州刺史仍所在馳驛赴任自昔皇王之有國也曷嘗不文以守成武以集事參諸二柄歸乎大寧朕猥荷丕圖思宏景業憂勤戚惕四戴于茲每念河湟土疆帛丿糸亘遐闊自天寶末犬戎乘我多難無力禦姦遂縱腥羶不遠京邑事更十葉時近百年進士試能靡不竭其長策朝廷下議皆亦聽其直詞盡以不生邊事為永圖且守舊地為明理荏苒於是收復無由今者天地儲祥祖宗垂佑左袵輸欵邊壘連降刷恥建功所謀必克實賴樞衡妙算將帥雄稜副元元不爭之文絕漢武遠征之悔甌脫頓空於內地斥堠全據於新封莫大之休指期而就況將士等櫛風沐雨暴露郊原披荊棘而刁斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京念此誠勤宜加寵賞涇原宜賜絹六萬匹靈武宜賜絹五萬匹鳳翔邠寧宜各賜絹四萬匹並以戶部產業物色充仍待季榮叔明李玭君緒各回戈到鎮度支差脚支送四道立功將士各具名銜聞奏當議甄酬其秦威原三州并七關側近訪聞田土肥沃水草豐美如百姓能耕墾種蒔五年內不加稅賦五年以後量定戶籍便任為永業其京城有犯事合流役囚徒自今巳後一切配十處收管溫池鹽利可贍邊陲委度支制置聞奏鳳翔邠寧靈武涇原四道長吏能各於鎮守處遣官健耕墾營田即度支給賜牛糧子種每年量得斛斗多少便充軍糧亦不限約定數三州七關鎮守官健每人給衣糧兩分一分依常年例支給一分度支加給仍二年一替換其家口委長吏切加安存官健有莊田戶籍者仰州縣放免差役秦州至隴州以來道路要置堡柵與秦州應接委李玭與劉皐即便度計聞奏如商旅往來興販貨物任擇利潤一切聽從關鎮不得邀詰其官健父兄子弟通傳家信關司並亦不得邀詰阻滯如要墾闢種田依百姓例處分三州七關如少器械長吏與量據所申聞奏由除刺史關鎮使後三五月內差人巡檢如有修築部署課績尤深并訓練有序者其刺史關鎮使雖新除官爵亦更與超昇其官健節級更與優賞山南西道劒南山川邊界有沒蕃州縣量力收復其兵士委本道差遣如要錢物接借亦具聞奏三州七關創置戍卒且要務靜如有羌戎潛來博易輒不得容納委刺史切加禁斷或有投降吐蕃到邊上收取本道令長吏奏取進止嗚呼七關要害三郡膏腴館之殘址可尋唐人之遺風尚在追懷往事良用興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務修築不進干戈必使足食足兵有備無患載協亭育之道永致生靈之安中外臣寮宜體朕意朕祗荷丕業思平泰階將分邪正之源冀使華夷胥悅其有常登元輔久奉武宗深包禍心盜弄國柄雖巳行譴斥之典而未塞億兆之言是議再舉朝章式遵彞憲守潮州司馬員外置同正員李德裕早藉門第叨踐清華累居將相之榮唯以姦傾為業當會昌之際極公台之榮騁諛佞而得君遂恣橫而持政專權生事妬賢害忠動多詭異之謀潛懷僭越之志秉直者心棄向善者盡排誣貞良造朋黨之名肆讒搆生加諸之釁計有踰於指鹿罪實見其欺天屬者方處鈞衡曾無嫌避委國史於愛婿之手寵祕文於弱子之身洎參信書亦引親昵恭惟元和寶錄乃不刊之書擅敢改張罔有畏忌奪他人之懿績為私門之令猷又附會李紳之曲情斷成吳湘之冤獄凡彼簪纓之士遏其進取之途驕倨自夸狡蠹無對擢爾之髮數罪未窮載闚罔上之由益驗無君之意使天下之士重足一迹皆讋懼奉爾而慢易在公為臣若斯於法何逭於戲朕務全大體久為含容雖黜降其官榮尚蓋藏其醜狀而睥睨未巳兢惕無聞積惡既彰公議難抑是宜移投荒服以謝萬邦中外臣寮當知予意可崖州司戶參軍所在馳驛發遣雖逢恩赦不在量移之限將相大臣與國同體誠欲自便豈宜不從苟非其時涉於避事前鳳翔隴州節度觀察處置等使光祿大夫檢校尚書左僕射兼鳳翔尹御史大夫上柱國安平郡開國公食邑二千戶崔珙早以器能周歷顯重行己每稱其友悌在公亦竭其精忠自負譴前朝遠移南徼及我嗣守頗聞嘉名由是剖竹近關揚旍右輔為國垣翰適資謀猷近者犬戎輸誠歸我故地下議納款且籌開疆宜其率先啟行副此寵待忽覽退閒之請頗乖毗倚之誠陳力之方豈無其道匪躬之故或異於是以其故老特為優容俾居青宮之輔仍從分洛之命君臣禮分予無愧焉可太子少師分司東都門下錫珪立社踈戚有倫畫野分疆親賢並建所以左右王室保乂邦家乃眷冀方實為雄鎮上垂昴宿下接岳靈控井陘之要衝當邯鄲之故地用是稽諸古訓考以國章俾崇尚德之規式叶至公之選濮王澤延慶金枝䟽流天派資忠孝以植性本仁義以立躬文掇菁英敏有逾於七步學探旨要對必詳於三雍刻舟志邁於蒼舒占雨識高於沛獻而沖謙自處矜伐不萌所宜作我翰垣副茲毗寄為臣之道爾既克修知子之言予復何愧築齋壇以拜命仗武節以遙臨爾其宏樽俎之善謀念折衝之遠略寵膺十乘位列三台勉服新恩慎守厥職可開府儀同三司守鎮州大都督充成德軍節度鎮冀深趙等州觀察處置等使封如故朝議郎守尚書刑部郎中柱國賜緋魚袋唐技將仕郎守尚書職方員外郎裴紳早以科名薦由臺閣聲猷素履亦有可嘉昨者吏部以爾秉心精專請委考覈而臨事或乖於公當物議遂至於沸騰豈可尚列彌綸是宜並分符竹善綏凋瘵以補悔尤技可虔州刺史散官勳封如故紳可申州刺史散官如故門下鮮虞舊國上谷雄藩總中山之甲兵接薊門之封壤睠求良帥允屬碩臣銀青光祿大夫守太子賓客分司東都上柱國滎陽縣開國男食邑三百戶鄭涯洪廓宏才易正性雅量溟廣貞標嶽孤通鈐匱之奇書負珪璋之雅器自發揚術業歷踐清途懿聞淑聲推為茂德日者常膺獎任屢鎮方隅惠愛洽於轅門謳歌溢於閻井洎謫居遐徼旋處洛師惕厲日聞屯夷一貫是命載圖來效復議寵遷於戲選將之難古今為重而況易水之上尤藉謀猷爰求惟舊之賢式重作藩之寄爾其勉思鎮馭益念訓齊惟克己可以愛人惟推恩可以撫衆壞帳豈專於仁祖褰帷宜嗣於賈琮俾升秩於春卿更增榮於亞相往承休命無忝新恩可檢校禮部尚書使持節定州諸軍事兼定州刺史御史大夫充義武軍節度易定等州觀察處置北平軍等使散官勳封如故主者施行河東軍節度使盧鈞長才博達敏識宏深藹山河之靈抱瑚璉之器多能不耀用晦而彰由嶺表而至太原五換節鉞仁聲載路公論彌高藩垣之和氣不衰臺閣之清風常在宜升揆路以表羣寮可尚書左僕射周用召公為楨幹之臣以正天下故入調鼎鼐則弼亮之道尊出撫方國則藩宣之功著我有上相天實閒生文武之用並高於昔賢中外之寄允資於碩德爰舉旌鉞仗於股肱光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事兼宏文館大學士充太清宮使上柱國魏郡開國公食邑二千戶崔鉉瑞玉凝姿春林發秀貞諒實德謙虛葆光沖用既臻於化源達實每宏於理本擅松桂後凋之色勁節自高含金石希代之音正聲特異洎發揚令聞輝藹公朝道無緇磷言符體要比相如之麗藻夙侍禁林嗣傅說之旁求早膺台席日者歷居廉鎮嘗總朝綱令肅方隅風行憲署及膺我寵擢復司化權每正惟公持平不撓暢緝熙之茂典宏經緯之明謨功勒旂常道光夷貉勵山甫匡周之操竭子房佐漢之志終始一心周旋七年富人斯久偽緝疑愈勤是宜載圖爾庸優爾恩寵乃睠淮海號為通都控扼實據其咽喉封部適羅其災患予所注意爾其往哉於戲居則秉鴻鈞紹阿衡之業動則駕長轂圖方叔之勳苟非全才孰膺重任若撫封之長術阜俗之嘉謀一部之慘舒三軍之政令我屬良弼則又何規勉登將壇敬佩相印副是寵寄其惟戒哉可檢校尚書左僕射同中書門下平章事兼揚州刺史大都督長史充淮南節度副大使知節度事管內營田觀察處置等使大學士制門下太宮之崇嚴史閣之要重書殿之清祕近代以來率命相臣總統其務寵擢遷轉允諧舊規金紫光祿大夫門下侍郎兼兵部尚書門下平章事監修國史上柱國彭陽縣開國男食邑三百戶令狐綯上才經邦正德宰物瑚璉重器宜升清廟之中銀青光祿大夫守中書侍郎兼禮部尚書同中書門下平章事集賢殿大學士上柱國魏謩直道事主宏國佐時珪璋瑞姿早耀泰壇之上金紫光祿大夫中書侍郎兼戶部尚書同中書門下平章事上柱國河東縣開國子食邑五百戶裴休忠力許國清規立朝鸞鳳異儀高舉重霄之外並富有天爵深於人文早懷匡濟之資素蘊生靈之望洎處台位俾陳廟謨能肩一心以暢萬務識我憂勤之旨罄其弼亮之誠邊疆寖寧風雨咸若念此丕績懷於深衷今則各新寵章迭領重職所宜闡清淨元默之化正襃貶刪詳之業因此嘉命啟吾規詞夫獻忠言則君受益秉公心則人無怨除吏當則衆職舉下令一則百度美乃吾三后前所施為也余尚憂屬事重切磨終始不虧乃曰良相綯可守本官充太清宮使謩可守本官監修國史休可守本官充集賢殿大學士散官勳封各如故主者施行門下夫茂育羣生動資良弼緝熙庶績表正萬邦非竭力戴君推誠憂國則何以光膺鼎鉉高步瀛洲十載於茲四方無侮昭文講德屬自台臣金紫光祿大夫門下侍郎兼兵部尚書中書門下平章事充太清宮使上柱國彭陽縣開國男食邑三百戶令狐綯保合太和從容中道左右王化清夷國風輔相盡天地之宜啟沃見忠貞之節直氣能斷嘉猷日新納誨之心義形於色於戲發號出令表率寰區妙運機樞式宏敷暢山甫補衮夷吾佐時勉極殊勳書於太室朕以虛懷委遇於道始終佩服斯言敬承嘉命可充宏文館大學士餘並如故主者施行門下王者之於元老碩臣優敬為大苟有繫一作煩於庶務則思尊以寵章中外迭居眷惟僉屬文武二柄揭而授之況弄印之威望巳行淚碑之風流未遠將疇茂績以繼昔賢金紫光祿大夫御史大夫上柱國滎陽郡開國公食邑三千戶鄭涯鵷鸑瑞時璵璠希代鑒澈止水氣融冬曦聲塵獨邁於軒裳符彩迥高於倫列多士程準大朝羽儀禮容全備於身文和易雅彰於心術自承明曉對建禮晨趨參密命於北門演綸言於西掖相如雄麗咸推視草之工孔光莊重空聞言樹之誡屢解交疑於都座兼尹正於二原會府功著於彌綸神州政傳於表則洎登車按部仗節總戎移風有佩犢之謠潔己有挂魚之操輕裘緩帶而師律以貞投壺雅歌而氓俗自泰屬者干旄入覲宣室對敭掌地征而天府既饒執邦憲而朝綱載肅朕以漢皐巨屏峴首名都將鎮上游必資全德是命輟於副相委以專征仍兼揆路之榮以示啟行之貴敬踐乃位時惟懋哉可檢校尚書右僕射守襄州刺史御史大夫充山南東道節度使管內觀察處置等使散官勳封如故主者施行門下雲因龍興龍非雲無以施膏澤臣由君用君非臣無以播皇猷信乎際會相須以康天下永念良弼常切寤思詳求國楨乃獲時傑通議大夫守御史大夫上柱國賜紫金魚袋鄭朗閒代應期稟靈作瑞王室髦彥士林菁英溫華凝珪玉之姿磊落負棟梁之任諫垣蘭省常推讜正之風廉俗登壇克懋撫循之績洎領劇務益見盡忠杜邪徑而啟公途懲奸吏而絕私託饋軍無闕贍國有經委以憲綱尤彰直道是宜毗賛大業翊宣景化朕以區區齊晉取霸諸侯率由三賢叶心五臣同德況今四海為宅百辟盈庭未能寇靖塞陲人歸壽域豈無長策俾及升平惕然疚懷莫知攸措肆予命汝往踐台階勉宏濟代之功罔致曠官之誚善調兵食以備我邊虞慎舉典章以貞我庶品敬戒於位惟其有終可工部尚書同中書門下平章事散官勳賜如故主者施行門下築壇申命推轂就途受幢節之榮分藩閫之寄膺茲重任允屬良臣邠寧鹽慶武等州節度管內營田觀察處置兼充慶州南路救接鹽州及當道沿途鎮寨糧料等使朝散大夫檢校工部尚書使持節寧州諸軍事兼寧州刺史御史大夫上柱國平陰縣開國男食邑三百戶賜紫金魚袋畢諴宇量凝曠業履端修抱不器之才懷盡忠之節聲馳文囿學茂儒林掇芳桂於月中擅嘉名於日下自升朝籍累踐清班屢鎮邠郊頗彰績效得營平屯田之術有伏波備寇之謀曠土多棲畝之糧窮塞無晏開之壘是宜進律以勸將來尹於神州能安疲瘵卑張敞擒姦之稱鄙廣漢摘伏之奇衢路絕赭衣之人閭井稀桴鼓之響用錫武節明余無私乃眷壺關方擇良帥顧惟郇邑思繼成功副我旁求俾爾俞往陟以五兵之秩升於八座之榮服茲寵光佇聞報政可檢校兵部尚書兼潞州大都督府長史御史大夫充昭義節度副大使知節度事充潞慈邢洺等州觀察處置等使散官勳賜如故朕恭守睿圖勵精理道祗勤萬務靡不經心緬思垂拱以化成莫若得賢而共濟載勞夢卜果獲貞良太中大夫守尚書戶部侍郎判戶部事上柱國賜紫金魚袋崔慎由山岳降靈和粹毓德儀標鸞鳳識洞蓍龜文為國華行冠人表朱絃含清越之呂良玉凝縝密之姿播英聲於士林彰美望於公器洎擢參內署潤色王猷忠讜盡規誠明納誨既而廉問南服宣暢皇風盪寇銷災人安政集康一方之疲俗復二職於中臺議論必本於古今趣尚自歸其雅正淛河之右仍歲艱荒一自鎮臨載聞惠化俾司征賦益覩公忠固可以升於臺階秉我大柄爰授相印用參樞務於戲天地之道成歲功者陰陽帝王之基保鴻業者輔相念茲匡賛之大宜竭啟沃之道必使貞百度以振國經凝庶績以宏理本茂育區夏統和神人允資魚水之賢克致休明之運永綏厥位無忝知臣可守工部侍郎同中書門下平章事股肱之臣與君上而合體心腹之寄雖中外而同途入則付之鈞衡出則委其藩翰苟非望隆碩德道備全才則何以克副具瞻久膺重寄銀青光祿大夫守門下侍郎兼戶部尚書同中書門下平章事監修國史上柱國魏謩天生賢傑嶽降英靈深沈莫究其澄波和裕可羣於愛景自踐揚華貫備著徽猷故事播於三臺讜論留於兩掖而式資重用任以地征於朕心爰立作相惟爾列祖佐佑太宗輔弼之光號為人鏡代濟其美厥生令孫蘊致君匡國之謀見奉上竭忠之志勤勞匪懈夙夜在公動關典彞言成啟沃闡我皇化由其赤誠星霜七年風雨一貫朕以九折巨屏三川奧區控臨百城統馭羣虜眷茲慎擇不其才難爾宜往踐將壇仍持相印舉武侯之籌策厎定遠戎繼叔度之謳歌載康遐俗勉服休命恭惟有初可檢校戶部尚書同中書門下平章事兼成都尹充劒南西川節度副大使知節度事管內觀察處置統押近界諸蠻及西山八國雲南安撫等使門下二相股肱與我同體致夷率化致俗清刑致戢干戈致調風雨垂衣無事良有愧焉得不資刊削之能佇討論之妙振揚史職開啟儒風予非敢私膺此並命通議大夫守中書侍郎兼吏部尚書同中書門下平章事充集賢殿大學士上柱國賜紫金魚袋鄭朗道苞時傑性蘊天和得中庸之隱微合大雅之明哲太中大夫守工部侍郎同中書門下平章事上柱國賜紫金魚袋崔慎由器稟人秀材為國楨達智者之變通有良臣之規矩皆學窮閫奧文擅精華辨理必造於事機吐論同歸於根本松筠挺色莫畏嚴霜鵰鶚淩空自有俊氣況協賛大政允釐萬方沃心克聞舉直無隱圖是懿效彰其茂功斯用迭升俾洽嘉命主張懲勸總領典墳必使書法彌精動契春秋之旨化成為重豈惟魚魯之文勉宏大猷罔俟沖驟朗可監修國史慎由可充集賢殿大學士餘各如故主者施行門下朕聞先王建萬國親諸侯也周漢藩樹屏我國家以錫土分茅沖人敢易彞制爰稽典禮式固邦家第三男灌等生則岐嶷幼而徇齊忠厚實見其天資才識若符於神授敦詩聞禮不假其師嚴踐義由仁罔勞於庭訓術通六藝之妙學奧百代之書是宜敷桐葉之策舉梓材之誥胙以土守誓以河山我圖爾居以謹王度無懈其位永孚於休第三男灌可封衞王第十一男澭可封廣王宜令有司擇日備禮冊命主者施行
