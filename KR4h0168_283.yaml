body:
  text: 開元二十四年夏盛暑奉敕使大將軍高力士賜宰臣白羽扇某與焉竊有所感立獻賦曰當時而用任物所長彼鴻鵠之弱羽出江湖之下方安知煩暑可致清涼豈無紈素彩畫文章復有修竹剖析毫芒提攜密邇搖動馨香惟衆珍之在御何短翮之敢當而文粹作與竊思於聖后且見持於未央伊昔皋澤之時亦有雲霄之志苟效用之得所雖殺身之何忌肅肅白羽穆如清風縱秋氣之移奪終感恩於篋中南海郡出荔枝焉每至季夏其實乃熟狀甚王褱詭味特甘滋百果之中無一可比余往在西掖嘗盛稱之諸公莫之知固未之信唯舍人彭城劉侯弱年纍遷經於南海一聞斯談倍復嘉歎以為甘美之極也又謂龍眼凡果而與荔枝齊名魏文帝方引蒲桃及龍眼相比是時二方不通傳聞之大謬也每相顧間議欲為賦述而世務卒卒此志莫就及理郡暇日追敘往心夫物以不知而輕味以無比而疑遠不可驗終然永屈況士有未效之用而身在無譽之間苟無深知與彼亦何以異也因道揚其實遂作此賦果之美者厥有荔枝雖受氣於震方實稟精於火離乃作酸於此裔爰負陽以從宜蒙休和之所播涉寒暑而匪虧下合圍以擢本傍蔭畝而抱規紫紋紺理黛緗枝蓊鬱霮䨴環合棽麗如蓋之張如帷之垂雲煙沃若孔翠於斯靈根所盤不高不卑陋下澤之沮洳惡層崖之嶮巇彼前志之或妄何側生之見疵爾其勾芒在辰凱風入律肇氣含滋芬敷謐溢緑穗靡靡青英苾苾不豐其華但甘其實如有意乎敦本故微文而妙質蒂藥房而攢萃皮龍鱗以駢比膚玉英而含津色江萍以吐日朱苞剖明璫出炯然數寸猶不可匹未玉齒而殆銷雖瓊漿而可軼彼衆味之有五此甘滋之不一伊醇淑之無算非精言之能悉聞者歡而竦企見者訝而驚仡心恚可以蠲忿口爽可以忘疾且欲神於醴露何比數於甘橘援蒲桃而見擬亦古人之深失若乃華軒洞開嘉賓四會時當燠煜客或煩憒而斯果在焉莫不心侈而體忲信雕盤之仙液實玳筵之綺繢有終食於纍百愈益氣而理內故無厭於所甘雖不貪而必愛沈李美而莫取浮甘而自退豈一座之所榮冠四時而為最夫其貴可以薦宗廟其珍可以羞王公亭十里而莫致門九重兮曷通山五嶠兮白雲江千里兮青楓何斯美之獨遠嗟爾命之不逢每被銷於凡口罕獲知於貴躬柿何稱乎梁侯梨何幸乎張公亦因人之所遇孰能辨乎其中哉臣伏見景寅制書以開元歷握乾符垂示天下幸甚其沙門元侃等所言益部耆舊傳洛下閎改顓頊歷推校最為精密而曰後八百歲其歷差一日當有聖人定之到於今歷果有差聖果有定誠非常之嘉應曠代之靈符不可得而間也臣誠歡誠喜臣聞天道先聖而啓期聖人後天而奉時不當乎天心不在歷數不登乎聖道不合元符元命定而王者應幽數起而明者察故洛下閎極其數而知來耆舊傳尚其占而示後我皇帝無思而感自然元同僧元侃等幸會而言豈云素慮非人事也非神道也天固已儲祥以俟時積分以差日出入數代多歷年所疇人極力不能課其祥上林雜候亦莫徵其失則明天意以徯聖期期數未臻乃藏於密聖證將至如應如響彼幽深之何有此會通之不謀所以下叶黃鐘上稽歷象以和六氣以合三光復其見心間不容髮斗樞且運而況於人時元氣巳調而況於月令於戲天下之動日用不知昆蟲草木生者自遂麟鳳龜龍靈者自瑞蠻夷戎狄遠無不至山川鬼神幽罔不洎此聖人所以定天下之象通天下之志而天人之道備矣昔者河出圖洛出書自時厥後符命非一空文而無應其殆乎人為實録而有徵焉用乎龍負則洛下閎者此其神乎不然是何見之明也夫聖有時而不作物無聖而不覩仲尼感時於鳳鳥古人嘆壽於河清皆傷於不達而恨於難見我后受成命重光乎文武纍聖而無窮殊祥而無數彼哀命之者曾不得而朝聞凡今之人抑何幸而目覩由是觀之當其來運唐虞之屋可封非其有時孔邱之徒不遇此千載之會也萬物豈知其謝生於天乎兆人亦云忘力於帝乎微臣荷寵靈揚休命則臣子之忠在於盡美而惟天之大終莫能名不勝區區敢獻頌曰於皇惟后受命於天時來于今兆是厥先既定乃日允叶斯年赫赫光明應於上元臣聞昔者元德升聞皇天眷命元聖有作上帝何言必見意於休徵忘象於幽贊惟茲降鑒若曰專精道周萬物者其神充功濟生人者其祥大粵若古始肇有君臣巢燧之前寂寥無記書契而後煥炳可觀若乃鬼神睢盱品彙紛錯性命未正吉凶不定而太昊氏將通其德則河為之出圖人食未粒鳥獸是茹時不耕稼器無耒耜而神農氏將教其本則天為之雨粟蚩尤不道炎帝不制銅鐵鑄兵豺狼橫厲而軒轅氏將禁其暴則天為之降元女洪水方割下人昏墊堯德莫能弭厥災舜功不能除其害而夏后氏將底其績則洛為之出書自茲以降殆三千歲矣其間水火更王雲物告符有若狼銜鈎魚躍舟素靈哭黃星見豈不以湯德有慙武善未盡漢道既雜魏方亦偏唯以一至之應且為興王之兆則未有天錫真符聖受休命遠與大禹相續超與上皇比崇如我國家之盛者焉洪惟龍池蓋天之所以祚聖即今上卜居之舊里京師爽塏之地傍無竇澤中匆濫泉非常而靈液涓流無幾而神池寖廣榮光休氣若煙若雲所未嘗有則此之出雖清可以鑑而深不見底鱗介瑰詭於牣其中時莫知其所然日徒見其有異中宗採識者之議壓王氣而來遊聖上處或躍之時出飛龍而合應臨淄始封也邸第在焉上黨歷試也靈符紹至天其以是永命我唐圖象丁寧有所底止其若茲也夫成數有時而否至理無代而亡固在乎大聖之生也乘運而作鼓天下之動安天下之危故將順成功自古之啓佑也如彼克定多難自天之叶贊也如此初中宗違代后黨窺隙大盜狃於得志㣥慝起而擅權若綴旒然當此時也天與若不取鬼謀或不協則我祖宗之業無乃將墜而億兆之命亦猶倒懸聖上感之提劍而起雷霆一奮祅沴以清內難既衰外虞有謐推戴太上照臨萬邦實天之為與人更始系皇統維乾綱決綻補壞蕩瑕滌穢而乃闕典或備舊章悉舉處窮盡達在困必通品物資以再生寰區為之一變然後返華偽於朴還澆漓於淳以大道為源以至仁為根動推是心以御於事人見德而興行神享誠而介福故不在於刑罰不在於禱請大造裁成元猷允塞有如陽春播澤觸類皆滋泰山起雲無遠不遍雖昆蟲草木與蠻貊要荒樂其所生安其所習在牛羊而勿踐有干戈而載戢又況於衣冠華夏禮樂家邦而不形於斯須不彰於漸漬者也夫然何教非德何化非經何能事之不舉何醇精之未極周溥洋溢於穆緝熙至於太和莫不允若體侔天地之大事出皇王之表豈擎跽曲拳盡禮極力將用彥聖不啻其口所能稱誦於吾君所可殆庶於至德且往者之有開也天感精以降聖聖敬命以奉天此誠有元則欽明文思及茲報本必嚴祗齋栗靈慶以屬之神化以答之與初相明其徵乃著紛綸先兆非篤信歟由是言之統天者人合符者聖而美德序命殊尤卓絶豈多乎哉至如古之興王必有所感五帝更尚五運旁通土者黃中之精於金為母水者善利之物於土為妃苟膺期而有來必合德而為表是則然矣天其或者亦以阜育㣥化發揮茂祉始告以聖有明徵終成乎帝之神册因其立象之本會以相乘之數則載代六百歷紀千年變而通之胡可量也宗子宗正卿褎信郡王璆等若干人伯父伯兄仲叔季弟聚族相與詣闕上言天意昭著固已久矣人事符合亦云至矣而一德是建泰階既平靈臺靈沼赫赫明明天之為大雖莫能名王之在鎬豈無頌聲上初克讓抑而未許至於纍請乃曰俞哉史臣不敏敢獻頌曰茫茫元昊載凝載薄在帝庖犧繼天而作浩浩洪水包山襄陵舜亦命禹夏氏以興龍圖龜書二王是膺湯武已下夫何足徵於鑠巨唐乘運而起纘禹之迹系堯之紀五聖在天丕命曾孫高視河洛同符混元亦有黃龍出於靈沼明明穆穆天子之表倬彼東井昭章于天沈精降液下為靈泉靈泉有泚其深無底泌之洋洋其甘如醴清德之鑑柔道之體洪源濬規實天之啓濯濯靈泉洞冥皇祗滋液流衍化為神池曰止曰行惟聖之作匪鱣匪鮪惟龍之躍植物斯生動物斯樂天根有見曾是不涸靈有休氣紛紛郁郁如山之包如雲之簇潛龍在下瞻烏在屋兆云其吉周爰咨詢既契我龜又叶我人鎬惟舊京其命維新蜿蜿黃龍神池自出靈化恍惚噴雲沃日告帝之符其儀孔吉或潛於泉或見於田與時順動亦應乎天克配我皇無德稱焉臣聞蠻夷猾夏唐虞已然天之所生類不可絶嘗有拓境者矣而固也為患或有款塞者矣而必也無親是以古之哲王審其若此則限以荒服斷非純臣不貢不王武功居後不庭不率文德是先三代所以直道百蠻所以向化逮乎春秋之衰諸侯以力征伐自出戎心大啓謀夏亂華干盟逼好王綱弛而若綴天道厭而將革則有強能攘劫暴惡交侵雖雜霸之無成亦反經之所取其負力者乃塹山堙谷盡境而築長城其黷武者則挽粟飛芻窮兵以耗中國又失於下策而悔在末年彼王略之不恢殆千餘載矣夫有其餘而無豫思其患而不圖所謂能國將安貴聖物豈終否道非固窮鑑之者昊天救之者英主元命陰隲畀付神武我太宗一戎衣而大定我皇帝再受命而太平不是古而務文不非今而忘戰以時變而消息與天元而合符日月之所照臨陰陽之所陶冶凡有在地莫不稟朔而東夏郡縣北隟山戎先是四十年侵軼數百里自茲氣奪數以病告既威攘之不讋且力制之不可或朝或否為虺為蛇幽鄣未遑以滅烽邊城安得而弛柝曠日持久兵連禍拿率由事邊是無寧歲二十二年春乃命右羽林大將軍兼御史中丞幽州長史張守圭將中軍都督諸鎮雄名先路夷裔生風載馳信臣繼發精卒戒嚴有赫張皇若神公卿大夫未始測也將校部曲亦莫知也皇帝方日靖以慮之乾綱以斷之初決策於九重已收功於萬里矣二十二年冬十有二月中貴將命元戎受律三軍疾雷於不時二庭喪膽於非意欲遁則衆潰不保欲拒則兵鋒莫當因而偽降幸且紓禍遽圖反覆將肆鴟張觀釁先人豈伊負我以間諜而情得乘猜攜而計從或奇兵以嘗或厚利以啖無何變作果自族誅凶元惡首鬼惑神誘假天威而無前覆鳥巢而何有於是諸部大駭率衆復歸責以不義之尢捨其不臣之罪既服即序有威且懷載籍以來固未之見也昔我睿宗取句驪於拾遺今茲聖謀易林胡於反掌獻功有續後嗣無忘百王所廢之勳四夷來賓之俗自我底定巍乎發皇其若此也於是彼節使與㣥帥因東師之凱旋離而族談合而公議以為主上憫一隅之苦垂不代之略以計易戰以信去兵神斷自天虜平不日且軍未血刃敵免膏原密承無方之謀坐致不陳之捷有征無戰即王者之師歟而不彰美於吾君得無臣子之罪不表聖於帝載曷稱文武之時乃率其屬至於固請帝三讓德而曰俞哉夫曲成萬類者天為而不有下濟兆庶者聖成而不居物無謝生於天雖云至道人無歸功於聖何以最靈雖無巳無名所宜絶於言象而惟忠與義固不廢於頌述大雅云徐方既同天子之功又曰明明天子令聞不已其此之謂也臣再拜頓首敢獻頌曰赫赫天威兮被遐荒蠢茲山戎兮不來王命南仲兮整六師出幽陵兮躪九夷簸赤山兮蕩滄海弔無告兮伐有罪徒不勤兮車不殆虜震驚兮兵氣倍昔負固兮今安在魁自殲兮裔既平謀既集兮聖自明我不戰兮獻戎捷俾厥後兮揚天聲門下粢盛所以奉神祗耕藉所以助人力既義率於下而敬在其中是為先農存諸大典故周宣不復於古而虢公致諫漢文能修其政而班史美談朕自御極以來動咨故實惟是千畝未展三推匱神困人降災移歲庸不在此良以憮然今星紀既周土膏將動去農祥而不日考帝藉之以時朕其親耕以實御廩宜令禮官博士詳擇典故有司速即施行門下先王之制封建有等諸侯所食征賦以歸河西節度大使原州都督慶王潭河東節度大使太原牧棣王洽河北節度大使幽州大都督鄂王涓等性皆中和行無外飾教以詩禮能漸義方雖已列於封圻竟未疇於井賦頃以孝友之習且在深宮服用之間亦從御府既申開國之典宜崇書社之數可各食實封二千戶主者施行門下所遣使臣將恤人隱頻亦諭旨期於悉心而政或相蒙賞或失善以此致理未嘗聞之朝請大夫荊州大都督府長史兼判襄州刺史事山南道採訪處置等使上柱國長山縣開國伯韓朝宗亟登清要爰委條察宜恭爾職以副朕懷而乃私其所親請以為邑未盈三載巳至兩遷既殊德舉自速官謗及令按事果驗非才傷敗實多矯誣斯甚舉不為黨豈其然歟事咨於周則異於是不能自律何以正人仍期後效且示輕貶可使持節都督洪州諸軍事守洪州刺史散官勳封如故馳驛赴任惟知人則哲在豫之責已深而事上竭誠為臣之節當勵其有賞罰不正枉直失措陷於比周隳我綱目有一於此誰其捨諸凡今刺舉宜以為戒主者施行門下朕承五聖之緒為萬國之君敢以私愛而廢至公內顧而忘鴻業皇后王氏天命不佑華而不實居上畜虎狼之心御下甚鷹鸇之迹造起獄訟朋扇朝廷見無將之端有可諱之惡焉得敬承宗廟母儀天下可廢為庶人就別院安置刑于家室有愧昔王為國大計蓋非獲已布告天下咸使知聞特進行尚書右丞相兼中書令燕國公張説往屬艱難輸誠於履險及茲輔相潤色於告成而不察細微之人頗乖周慎之旨朕略小存大念舊録功且法不欲屈宜罷中樞之任義亦有在更崇端揆之榮宜停中書令可尚書右丞相仍將國史於宅修撰主者施行敕禮有謹於初義亦重其本凡是姻媾且猶正於人倫況在元良更將承於宗祀皇太子鴻儲副是屬仁孝自然爰從吉辰式備嘉禮上事下繼君子重之言告言歸朕豈無慰非獨在豫之慶宜申與衆之澤應天下囚徒死罪特宜免死配流嶺南遠處流罪降至徒徒已下罪並宜釋放其造偽頭首勾合知情受偽人等罪雖徒流仍便隸為百姓至彼勿許東西諸道征行人家及魚衆寡惸獨委州縣長官檢校矜放差科使安其業中間有不支濟者量事賑給仍量助其營種長安萬年兩縣百姓及今月當上彍騎衛士雜匠掌間幕士駕士工人樂人供膳主膳官馬主食一作角弓等並免其家今年地稅三衛細引飛騎萬騎監門長上及禮生有職掌者各減一年勞在京文武官九品以上見在京外官因公使及當上在京新除五品以上外官未辭并致仕官朝朔望者各賜勳一轉東宮官九品以上諸司緣禮會祇供官等更加勳一轉五禮使兵部尚書兼中書令蕭嵩特封徐國公禮會使黃門侍郎同中書門下平章事韓休特與三品妃禮會使少府監馮紹正賜紫金魚袋諸副使及判官更加勳一轉禮官儐者夾侍官及孔目官使典主旌節等選日優與處分仗內馬家內侍省給使教坊音聲人緣太子禮會祇供者各賜勳一轉皇太子舅尚輦奉御趙回進特與三品仍改三品官前右武衛騎曹趙某集作迥進一作向遵特與五品仍改與五品官皇太子侍讀侍書等各加一階皇太子諭德潘蕭特與五品太子妃兄通事舍人辥願特與五品仍改與五品官兄吏部常選辥某特與五品仍與六品官今日應預會官等各節級給賜物即宜領取宴會者所以宣其情頒錫者所以將其意公卿百辟庶知朕心敕朝集使等朕恭已奉天守文繼位布一心於兆庶明四目於萬方猶恐德或未周物不遂性旁求俊乂共理黎元於茲㣥辟寧不我副凡今政要略有四端衣食本於農桑禮義興於學校流亡出於不足爭訟由於無恥故先王務其三時將以厚生也修其五教將以淳俗也有國有家同知此議不患不知患在不行豈至長吏屢改正教屢移在官當先為國理人各揚其職不得冒禁干進苟利其身澆俗不可不革淳風不可不返近令刺史在任四考方遷實欲始終其情黜陟斯繫必若縣得良宰萬戶息肩州有賢牧千里解帶仁政不遙行之則是皆能勵節朕復何有且如浮逃客戶所在安輯征鎮人家每事憂恤倉儲唯實賦役唯均魚衆寡撫存盜賊禁止郵驛無弊姦訛不生念茲八事朕嘗屢想嗟爾庶尹可不用心卿等還州遞相勸勉遵此王度恤彼下人敬順天常無違月令夫星列躔次土分區域休咎之徵唯人所感善必知主惡亦有由每至歲成當加賞罰宜知朕意並即好去敕朕臨御天下二十餘載每思至理實仗㣥賢何常不敷求循良共底於道隼方與熊軾光寵有加甘露鳳皇寂寥無紀豈朕之不德感致斯然為庶尹所能已極於此是用寤寐增歎殷勤永懷更為後圖或未晚也且一郡之政繫一已之能泉源既清蓬麻自直為長吏者可不勉之卿等至州遞相慰誨以副共理之意用光分憂之委且如江左爰及山南歲小不登人己菜色皆由好逐朝夕之利而無水旱之儲卒遇凶年莫非艱食此則政乖慮始人無勸分欲免流庸不可得也夫氓者冥也豈能自謀政者正也當矯其弊所由長吏可不勉歟相其物土之宜務以耕桑之本時無妨奪吏不侵漁既富而教奚畏不理至若征鎮役重孤弱命窮將須哀矜以遂仁恕其餘常科所禁自可舉而行之豈煩縷説方振綱領乃者庚子制書己明理要徐思其意勿謂空言若風教未宏議能蓋闕競入朝計冀幸遷除勿曰不知將自誣也方牧參佐各宜思之朕所待賢能不惜官秩惟聲實是與惟履行是憑古者刺史入為三公郎官出宰百里豈有限也何在汲汲不安於理郡哉誠須勵精以俟後命並即好去敕朕受命子人義兼君父思致可封之地無忘終食之間自有萬邦幾將二紀而刑政或殊風俗尚澆行所望而未至顧本懷而自失惟朕之不德在豫之過有歸而卿等共理忠愛之誠宜剖至如典州當侯伯之尊宰邑敵子男之寵好進之輩豈不務於政成欲速之心獨未思於義取朕所以數戒敕以見意增祿秩以勸能何嘗有公方清白者不升理道循良者不用若聲績未著黎庶未康牧守未朝而輒遷參佐踰年而競入此獨為人之資地爾豈是責成之意耶以故一切還州將矯其弊卿等至彼明諭朕意知不以中外為隔唯以億兆為憂頃以天下浮逃先有處分所在括附便入差科輒相容隱亦令糾告如聞長吏不甚存心致令流庸更滋前弊未革自行此法即有姦生逃者租庸類多乾沒長吏明察豈其然乎此色每年別須申省比類多少以為殿最又獄訟所寄人命是懸近恐妨農特原輕繫俾加閲實乃多幽枉都邑尚爾郡縣可知各以貶官用懲主吏自今以後天下繫囚等應申覆知證在遠而就中稍重者不得過十日次不得過五日其餘輕科量宜決遣不得因此復加楚毒且外臺者長吏主之至如禮義不興耕桑不勸孤寡不恤徭役不均不肅吏人不清盜賊不懲侵暴不糾姦訛有一於此是誰之過其遊僧幻者誑誘愚人窮其根萌特須禁絶諸軍征鎮每遣優矜如聞比來未免辛苦特宜撫恤使得安存今農扈戒期耕夫在野事非急切不得追呼卿等至州一一宣示當遣察問勿不用心即宜好去敕十道及朝集使等信賞以勸能刑罰以懲惡謂之二柄所以一人朕念彼黎元比遭水旱而賦役不等浮惰相仍且無緝寧漸用凋弊所以慎擇長吏兼命使臣寵數所加亦云不薄智能自效豈是末圖政之殊尢永用虛佇且郡縣所理黎庶是切善為政者防於未然均其有無省其徭役事事有豫早為之所雖遭歲惡固亦人安況在豐年不能招輯遂使戶多虛挂人苦均攤務欲削除更成詭故已逃者未必為削為姦者因此便除一啓其端豈勝其弊向若州有明牧縣有良宰而精心緝理豈若是乎卿等至州將朕此意優柔慰勉各令用心招撫流庸補綴居業使免助逃之費是為救弊之先此不存心更知何理且刺史縣令專任不輕自有非違將何率勵至如親識遊客憑恃威權囑託下寮搖動獄訟或差遣不當致令損失或處分有乖便至煩擾兼有不肅諸吏唯只自謹一身姦豪盜賊無所畏懼是虛荷榮寵徒增祿秩此而可容孰為尸曠並委諸道條察具狀奏聞今甘澤以時農桑為重不急之務先己勒停宜更申明勿妨春事諸處百姓貧寠者多雖有隴畝或無牛力勸率相助令其有秋所繫囚徒速令決斷無令冤滯致有妨奪魚衆寡惸獨征鎮之家倍須撫存勿有科喚朕所懸爵秩惟待賢能若政舉一州惠施一縣使者廉問必以狀聞既能副於朕懷亦當待以不次誠可復也豈食言哉並即好去
