front:
  text: 全唐文欽定全唐文卷二百八十三九齡字子壽一名博物韶州曲江人擢進士始調校書郎以道侔伊呂科策高第開元十一年拜中書舍人內供奉封曲江男二十一年同中書門下平章事遷中書令纍封始興縣伯左遷荊州大都督長史卒年六十八贈荊州大都督諡曰文獻建中元年加贈司徒
