front:
  text: 全唐文欽定全唐文卷七百二十五鼎文宗朝官左司員外郎歷吏部倉部纍遷御史中丞出為華州刺史坐贓免
  hash: sha256:98bbe4ee9278eecb8168a072ac46904f5036307c2ea8134272e603af8119637f
  markers:
  - {type: head, offset: 14, content: 宇文鼎, id: KR4h0168_NFKB_725-h1, level: 1}
body:
  text: 當司前後推覆僞造出身文書賣官並造僞印行用等因張璹劉嘗建胡伯忠犯罪並在太和三年十一月十八日恩赦前准刑部大理寺詳斷悉處極刑准斷獄律赦前斷罪不當者若處輕為重宜改從輕處重為輕宜依輕法者臣以前件囚等並抵極法悉經殊恩或自赦文全生或因起請減等伏緣俱引霈澤纍陳訴詞若非得中恐未服罪昨者一與一奪事關起請既生又死稍覺二三如臣所見伏請赦書以前所犯特許減論赦書以後所犯者不得援例庶使後無僥幸令絶披陳今月十三日宰臣奉宣進止自今以後欲對並令前一日進狀來者伏以延英開日㣥臣皆不前知遇陛下坐時如進狀請對或令司各有要事便得奏聞今遣應對官前一日進狀以尋常公事不假面論只且於表章足達更俟候坐動踰數辰處置之閒便有不及以茲限約恐失事機竊以請對官狀入之時合在平旦苟或居後則乖敬恭致令臨事排比時有失次伏乞重賜宣示俾其曉知限以狀入者並在卯前如在卯後聽不收覽自然人各遵奉戶部尚書判度支胡證准兩度敕賜爵司禦率府録事參軍文約各一級今月五日敕下尚書省伏以胡潛等先丁母憂猶未終制豈得公然食邑苟竊恩榮下避三年之喪冒受五等之爵有傷教義實敗國風臣謬跡都曹職當綜核致興物論不敢不舉商元和九年進士武宗朝歷官戶部員外郎司封刑部郎中史館修撰遷禮部侍郎知貢舉出歷陜虢二州刺史大中時進工部尚書皇帝為義安皇太后服制重輕事權知禮部侍郎陳商等狀伏覩義安太皇后遺令皇帝三日而聽政十三日小祥二十五日大祥二十七日釋服者皇帝遵奉遺旨將欲施行臣等商量事貴得中禮從順變伏以宣懿太后常奉太皇太后之令追尊徽名附配廟室今云議禮合有等差伏請皇帝降服期周以日易月之制十三日釋服其內外臣寮便以其日除釋至於所奉陵寢制度法物一事以上即請准舊例無更降授謹具如前公卿等議大行皇太后喪禮狀今月五日敕再議東都太廟神主廢置今臣等議者伏以古者將營宮室宗廟為先故詩美文王乃召司徒俾立室家其繩則直作廟翼翼雒誥曰周公往營成周十二月戊辰成王蒸祭入太室祼徵之周氏文王有廟于豐成王有廟於雒即二都得置宗廟之顯據也然兩置神主曖昧無文既闕明徵難可臆斷臣愚輒斟酌前代以言之夫宗廟以安神神必依主故喪禮始以重為主既虞即以桑為主既祔即以松栗為主神明之道不可一日無主蒸嘗之本不可一日無神曾子問曰喪有二孤廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也夫煩則不敬所求惟精雖神之所適無方而神之所依惟一求之未當神亦不歆孔聖之言蓋有深旨今東都之主修之則非神所憑存之則無典可祭嚴祀之道豈其爾乎稽諸異同考以經禮二都有宗廟於禮無嫌東西有神主於理無據國家承乾開統爰法唐虞制度等威實尊文武况東京宮廟中宗元宗所奉又是國家之別都巡幸之時展敬有在是同周室豐雒各得建置之義以臣愚見恐不得廢也若添修神主方著彞章既無姬漢遺文且乖禘祫之典是同嘗禘郊社尊無二上之義以臣愚見恐不可置也今議者或引周氏藏先公先王之主於后稷文武之廟禘嘗之時以祭薦者此是周家祧廟之主親盡而遷准禮須存以備五年再殷一禘一祫者也今國家上都主祏昭穆具存親盡已祧之主藏於祖之廟舊矣與周家之制無異鞏雒之主雖存又須崇飾以之禘祫則無文以之禴嘗則非禮存而不論則又非敬臣以東都宗廟宜如聖旨使留守李石充使增修其廟中神主不當立宜依祔栗主廢虞主之例公羊云虞主瘞之殿兩楹之閒為非人所踐踏又云瘞之廟北方者陰陽無事主亦無事今請瘞藏之雒廟北墉下若相宅成周自可奉迎京師之主以行若歲巡時邁自依三公攝祭庶不遺承襲之典臣等徵諸古典周禮司寇之職男子入於罪隸女子入於舂稿漢律云妻子沒為奴婢鍾繇曰自古帝王罪及妻子又晉朝議在室之女從父母之誅既醮之婦隨夫家之罰謹按奴婢舂稿罪罰之類名則為重而非罪刑故法律名文古今通議夫子有罪母妻無誅死之制然事出一時法由情斷帝王刑辟豈在一途昔少卿降虜漢武誅其母元宗時安慶宗妻榮義郡主夫以逆誅主亦賜死此則是夫子有罪母妻不捨之例臣等伏以從諫犬羊狼戾蛇豕凶殘抱逆節於明時遺禍胎於孽子裴氏為惡有素為姦已成分衣以固其人心申令以安其逆志在於國典情實難容臣等參議宜從重典古者太常博士職以公卿諸侯大夫死第其所行舉而褒貶焉使世世以一二字觀其道與不道拘藂言為文武忠孝所以失褒也執已見為繆荒赧醜所以失貶也二柄之失博士不得職往者不得享為政者不得道夫執已見拘藂言是有上中下貿其二字視緡金重輕以緡金之重輕貽後之龎微偷忠盜貞罔世閒人為盡善加於行路皆博士忍其過而阿其時也夫天下人望執事以為質正然未見有執事能針其膏肓之病者若當貶而褒當褒而貶是猶録跖殺夷經緯混淆者也褒而褒之貶而貶之經紀既著善惡懸白勸大而用微所以使後代力行不易如日月山河江海草木四支七窽以統幹而治自從其教也於戲博士職蓋不細願出意念慮焉釴字翹之擢進士第纍遷起居郎入翰林為學士知制誥拜中書舍人進吏部侍郎出為同州刺史卒贈兵部尚書夫諡者所以懲惡勸善激濁揚清使忠臣義士知勸亂臣賊子知懼忠臣義士雖受屈於生前死獲美名亂臣賊子雖竊位於當時歿加惡諡者所以懲暴戾垂沮勸孔子修春秋亂臣賊子懼蓋謂此也垂範如此而不能救況又隳其典法乎臣風聞此事是徐泗節度使李訴奏請李訴勳臣節將陛下寵其勳勞賜其爵祿車服第宅則可若亂朝廷典法將何以沮勸仲尼曰唯名與器不可以假人名器君之所司若以假人與之政也政亡則國家從之矣頔頃鎮襄漢殺戮不辜恣行凶暴移軍襄鄧迫脅朝廷擅留逐臣邀遮天使當先朝嗣位之始貴安反側以靖四方幸免鈇鉞之誅得全首領而斃誠宜諡之謬厲以沮凶邪豈可曲加美名以惠奸宄如此則是于頔生為奸臣死獲美諡竊恐天下有識之人謂聖朝無人有此倒置伏請速追前詔却依太常諡為厲使朝典無虧國章不紊鍇字弱金贈兵部尚書釴弟元和九年進士又中宏詞科纍遷中書舍人開成中拜禮部侍郎遷吏部出為鄂嶽觀察使卒贈禮部尚書臣鍇昨日奉宣進旨令將進士所試詩賦進來者伏以陛下聰明文思天縱聖德今年詩賦題目出自宸衷體格雅麗意思遐遠諸生捧讀相賀自古未有倍用研精覃思磨礪緝諧其今年試詩賦比於去年又勝數等臣日夜考較敢不推公進士李肱霓裳羽衣曲詩一首最為逈出更無其比詞韻既好人才俱美前場吟咏近三五十遍雖使何遜復生亦不能過兼是宗枝臣與狀頭第一人以獎其能次張棠詩一首亦絶好亞次李肱臣與第二人其次沈黃中琴瑟合奏賦又似文選中雪月賦體格臣與第三人其次王牧賦自立意緒言語不凡臣與第四人其次柳棠詩賦興思敏速日中便成臣與第五人凡此五卷詩賦擢其中科實所不愧其餘三十五人或獎舊文別録人材非止一途四面搜擇臣並與及第李肱舊文亦好人物絶奇每視其闕他日必為卿相宗枝之俊實為難得况屬籍之中讀書為文者甚少伏望聖明俯留宸覽李肱等五人詩賦若有不堪敢受欺天之罪如或可採伺候聖心其李肱詩賦伏望陛下聖慈特加獎飭宣示百僚以勸皇族飭修之道臣繆忝主司不勝慺慺之誠其詩賦總為一卷謹隨狀奉進以聞某濫司文柄以副懸旄夙夜兢惶恐遭訕謗是以搜求俊彥冀輔聰明不敢蔽才與棠及第唐堯之聖也不致丹朱之賢宣尼之明也不免仲由之害如其可化安有墜典伊祁九子盡可等於黃唐門人三千悉能繼於顏閔若棠者自求瑕玷難以磨滅其所忤黷尊威亦豫謬舉之過也公佐元和中為洪州判官小娥姓謝氏豫章人估客女也生八歲喪母嫁歷陽俠士段居貞居貞負氣重義交遊豪俊小娥父蓄巨産隱名商賈閒常與段壻同舟貨往來江湖閒小娥年十四始及筓父與夫俱為盜所殺盡掠金帛段之兄弟謝之生姪與僮僕輩數十悉沉于江小娥亦傷胸折足漂流水中為他船所獲經夕而活因流轉乞食至上元縣依妙果寺尼靜悟之室初父之死也小娥夢父謂曰殺我者車中猴門東草又數日復夢其夫謂曰殺我者禾中走一日夫小娥不自解悟常書此語廣求智者辨之歷年不能得至元和八年春余罷江西從事扁舟東下淹泊建業登瓦棺寺閣有僧齊物者重賢好學與余善因告余曰有孀婦名小娥者每來寺中示我十二字謎語某不能辨余遽請齊公書於紙乃憑檻書空凝思默慮坐客未倦了悟其文令寺童疾召小娥而至詢訪其由小娥嗚咽良久乃曰吾父及夫皆為賊所殺邇後嘗夢父告曰殺我者車中猴門東草又夢夫告曰殺我者禾中走一日夫歲久無人悟之余曰若然者吾審詳矣殺汝父是申蘭殺汝夫是申春且車中猴車字去上下各一畫是申字又申屬猴故曰車中猴草下有門門中有東乃蘭字也又禾中走是穿田過亦是申字也一日夫者夫上更一畫下有日是春字也殺汝父是申蘭殺汝夫是申春足可明矣小娥慟哭再拜書申蘭申春四字於衣中誓將訪殺二賊以復其冤娥因問余姓氏官族垂涕而去爾後小娥便為男子服傭保於江湖閒歲餘至尋陽郡見竹戶上有紙榜子云召傭者小娥至應召詣門問其主乃申蘭也蘭引歸娥心憤貌順在蘭左右甚見親愛金帛出入之數無不委娥已二歲餘竟不知娥之女人也先是謝氏之金寶錦繡衣物器具悉掠在蘭家小娥每執舊物未嘗不暗泣移時蘭與春宗昆弟也時春一家住大江北獨樹浦與蘭往來密洽蘭與春同去經月多獲財帛而歸每留娥與蘭妻梁氏同守家室酒肉衣服給娥甚豐或一日春攜大鯉兼酒詣蘭娥私歎曰李君精悟元鑒皆符夢言此乃天啓其心志將就矣是夕蘭與春會㣥賊畢至酣飲暨諸凶既去春沉醉臥于內室蘭亦露寢于庭小娥潛鎖春于內抽佩刀先斷蘭首呼號鄰人並至春擒於內蘭死於外獲贓收貨數至千萬初蘭春有黨數十暗記其名悉擒就戮時尋陽太守張公靦喜娥節行列聞廉使旌表乃得免死而已元和十二年夏娥復父夫之讐畢歸本里見親屬里中豪族爭求娉娥誓心不嫁遂剪髮披褐訪道於牛頭山師事大士尼蔣律師娥志堅行苦霜舂雨薪不倦筋力十三年四月始受具戒於泗州開元寺竟以小娥為法號不忘本也其年夏五月余歸長安途經泗濱過善義寺謁大德尼令操見新戒者數十靜髮鮮帔威儀雍容立侍師之左右中有一尼問師曰此郎豈非洪州李判官二十三郎者乎師曰然曰使我獲報家讐得雪冤恥是判官恩德也顧余悲泣余不之識詢訪其由尼白師曰名小娥頃乞食孀婦也判官時為我辨申蘭申春二賊名字豈不憶念乎余曰初不相記今即悟也娥因泣具寫記申蘭申春復父夫之讐志願相畢經營終始艱苦之狀小娥又謂余曰報判官恩當有日矣豈徒然哉嗟乎余明辨二盜之姓名小娥又能竟父夫之讐冤神道不昧昭然可知小娥厚貌深辭聰敏端朴鍊指跛足誓求真如爰自入道衣無絮帛齊無鹽酪非律儀禪理口無所言後數日告我歸牛頭山扁舟泛淮雲遊南國不復而遇君子曰誓志不舍復父夫之讐節也傭保雜處不知女人貞也女子之行唯貞與節能終始全之者如小娥足以警天下逆道亂常之心足以勸天下貞夫孝婦之節余備詳前事發明隱文暗與冥會符於人心知善不録非春秋之義也故作傳以旌美之兼謨字汝諧並州太原人第進士歷蘄鄧鄭蘇四州刺史以治最擢給事中遷御史中丞纍遷尚書左丞領天平軍節度使辭疾以祕書監歸洛陽遷東都留守伏准今年正月日制刑法科條頗聞繁冗主吏縱捨未有所徵宜擇刑部大理官即令商量條流要害重修格式務於當焚去冗長以正刑名者伏以律令格式著目雖始於秦漢歷代增修皇朝貞觀開元又重刪定理例精詳難議刊改自開元二十六年刪定格令後至今九十餘年中外百司皆有奏請各司其局不能一秉大公其或恩出一時便為永式前後矛盾是非不同吏緣為姦人受其屈伏見自貞元已來纍曾別敕選重臣置院刪定前後數四徒涉歷三十載未堪行用今若只令刑部大理官商量重修格式遽焚冗長伏恐姦吏緣此舞文伏請但集蕭嵩所刪定建中以來制敕分明比類刪去前後矛盾及理例重錯者條流編次具卷數聞奏行用所刪去者伏請不焚官同封印付庫收貯仍慎擇法官法署省等所斷刑獄有不當者官吏重加貶黜所冀人知自效吏不敢欺上副陛下哀矜欽恤之意縣令刺史觀察使皆陛下守土之臣守陛下土地財物行陛下教條恩澤而已非得盈縮自已與奪自專况軍戎事不可容易添給添給之後損减至難豈唯一道一軍之弊實江淮十餘鎮聲聞相傳如或引例其若之何吳士矩恐須勘驗取實以窒定江淮十鎮之意日月無私照雷霆無私怒陛下獎任士矩本非私也今負陛下而理之亦非私也臣忝憲職不敢尸祿其吳士矩請付東臺差清疆御史就江西推勘聞奏睿著炙轂子三卷炙轂子曰夫兵者凶器戰者危事自古聖王不得已而用之仗德而行則湯征葛乃為帝王若恃力而戰則紂放牧野終罹戮辱春秋傳曰兵之設久矣聖人以興亂人以廢廢興存亡昏明之術皆兵之由也復曰文不犯順武不違敵蓋軒轅五十二戰義在惜民湯武七十二征本惟靖難且文而不武武而不文不可謂雄則文臣在聰明器量鑒人別材故曰文雄可以為相武臣在俊傑深沉果敢决斷故曰武雄可以為將二略兼濟則可以入為相運籌於廟堂之上則可以出為將折衝於萬里之外然而將相之務在見有才力者賞之愚詐者去之如有才力者不賞則忠烈疑而不進愚詐者在傍則讒邪黨扇而為欺如此行之則何功而不立何罰而不行何才而有遺何戰而不勝孔子曰我戰則克祭則受福又曰不教民戰是謂棄之如兩軍交鋒之際列兵無陳由人民居而無城池立而無牆塹寇盜衝擊則何以捍禦譬如蹴鞠較力猶設機便以護手足況有兵而無隊伍有隊伍而無行陳有行陳而無奇正有奇正而無權變起自黃帝命其臣風后演之本文不越一百字詞約旨微非聖賢莫能研究太公起翦孫吳韓項並由斯術唯孔明尤盡其妙生之於心機不形之於文義雖君臣父子不相傳授近者李筌圖載八陳只言或合而為一或離而為八不陳四奇變化之旨不顯天衡地軸衝翼之文將帥覽之難曉今創畫天地二陳圖明八陳八變之源爝火助陽自忘短綆庶幾英傑覩之稍裨焉炙轂子曰昔祝其之會仲尼云夫有文德者必有武備遂斬萊人頭足異處故曰文武之道未墜於地是以古之儒者服縫掖之衣頂章甫之冠佩環玦負櫑劍近代文儒恥言兵事苟或議及則僉謂之凶人今以翠華去酆鎬黃屋軫堯心率土之濱莫寧啓處方可論兵粗議將略矣且自罹亂以來儒道既息武辨是崇然而將帥多以勇力爭強少有精練兵機而懷謀策者所謂以強凌弱以衆暴寡迭相吞噬適足以塗炭生靈搆怨結禍夫兵之成敗在將帥之器能各有限劑須定等差淮陰侯與漢高祖論絳灌以下用兵多少信曰陛下可將十萬衆所謂能將將不能將兵夫高祖之雄才大略尚如此况其下哉楚子玉賢大夫也亦不能越三百乘是以王翦能將六十萬而李牧不能二十萬此方見將帥才器之大小也凡為將料敵之情僞而後决策制勝須知彼師之能否乃操我之所長假如韓信能設伏走戎則逐奔不遠難誘也從襲不及難陷也白起能攻城野戰則當深溝高壘以挫其鋭俾蜂蠆無所施其毒螫虎狼不能逞其爪牙本謀既壞伺其殆隙而擊之因變奇正以待敵整衡軸以攻險兵法曰始如處女敵人開戶後如脫兔敵不及距此兵之要也司馬宣王曰諸葛孔明志大而不見機多謀而少决好兵而無權雖提卒十萬已墮吾計中破之必矣及鄭褒亦能知毋邱儉好謀而不達事情文欽勇而無算至儉兵敗皆如其言又潘濬見樊胄為武昌從事與州人設饌十餘度自起比至日中可得知以兵五千足以擒之果在濬之度內漢王謂魏大將軍柏直口尚乳臭不能當韓信謂騎將馮敬雖賢不能當灌嬰謂步將項它不能當曹參吾無患矣乃使韓灌曹三將軍果大破之後魏高祖宏曰青齊之兵可以禮遇徐兗之卒理須義撫斯測度將卒之明驗也今之將帥多不自量其才器又不知彼之短長率爾合戰卒然求勝由聚卵以擊山驅羊而鬬虎欲期弭兵靜亂不亦難哉帝王宜開英鑒審將帥之器量文武之才則崇勳大業庶幾可立夫宰制山河剸割疆宇舉大綱則易定滋苛細則難安故子房佐漢畫大謀六七件遂定天下孔明創蜀决沉機三二策遽成鼎峙英雄之大略將帥之宏規也安危之機存亡之要審諸將略可見徵焉炙轂子曰漢史載楊秉能三不惑歷代以為美也然三惑之中利病各異論曰夫惑於酒者敗賢能損道德廢家業顛狂致疾生於身軀夭折壽考故須戒於過度也且阮籍劉伶陶潛畢卓皆惑於酒悉無所成至於得溺酒名而已夫惑色者壞禮樂損門風傷殘形骸耗蠹金帛怨雖不斂於夷夏政且有妨於霸王齊桓內寵如夫人者六姬外嬖貂雍巫衛靈同斛浴者三人內愛南子外淫彌瑕之類是也夫惑於財者小則亡身破家大則辱先滅國聚鹿臺之錢積巨橋之粟剖胎拾卵惟利是求盜璧攫金刑戮不懼而又必厚於已而薄於人則義不及於宗親恩不加於左右如此必不得人心而失衆情孟子曰推恩足以保四海不推恩不足以保妻子故君視臣如手足則臣視君如腹心書曰撫我則后虐我則讐斯之謂也苟專利矣則嘉言令猷弗得聞矣過謬錯誤莫得知矣近侍者倳刃以懷憾疏遠者聚謀而待舋憾舋一發身首分離傳曰象有齒以焚其身賄故也又曰匹夫無罪懷璧其罪則三惑之甚其在茲乎昔漢高祖使隋何說黥布歸漢布既謁漢王倨慢布悔來欲自殺及就舍供帳與高皇無異布乃大悅燕丹之奉荊卿也子女玩好恣其所欲然後渡易水不以為寒刺秦王視死如歸夫黥布荊軻雄傑之士也猶以服饌聲色變以移志况今將帥仕伍乃中才之士乎若不結之以信義厚之以恩膏彼安肯效命死節為貪鄙吝嗇之主哉故士有言曰爾之財賄尚惜我之性命詎可輕捐古語云使人造舟車猶豐酒食冀彼竭機巧則舟無毀溺之患車免顛覆之憂今驅策賢能駕御英傑飾甘言以誘掖矯禮貌以卑和欲其盡赤誠竭計策其用飴蜜以誇賺嬰兒曾不知聰明之士見其肝膽鏡其詐僞亦持虛以待虛設詐以禦詐國士遇我我以國士報之衆人遇我我以衆人報之項羽玩印賢豪叛去曹公慢易天下鼎分是知三惑之中酒者致之可矣色者放之可矣財者下愚之醜行也致放逐刑戮所宜加投豺虎投有昊以謝乎衆矣炙轂子曰漢史著誠節立名之士謂其能執一不回死義不顧雖湯鼎之威霜刃之刑不能脅之故節義彰明顯於後世存無愧於英俊沒無畏於神靈蕩蕩然偃於暗室之中堂堂然行於日月之下卓為人傑乃有節有義之士也夫能如此者亦賢哲之一體客曰誠如是無乃滯於變通而能成功則拙仗節死義可矣既不能仗節死義又不能變通成功此謂之偷生無恥之夫昔李陵降胸奴又要成功致老母伏誅妻子棄市斯始規變通而終為負義且臨患難履顛危雖商賈小人屠沽賤品猶能相拯於窮蹙尚乃任情於依托矧乎頂章甫冠拖縫掖衣口誦先聖之文胸懷德義之典目曰儒士而無慷慨之心不有風雲之操亦何以見分明之男子磊落之丈夫昔如敬通不修廉隅杜篤請求無厭班固諂竇以作威馬融黨梁而黷貨丁儀貪婪而乞賄路粹哺啜而無恥皆文儒之所賤貞介之所羞夫士無信不可以立身無義不可以立名無節不可以成功無忠不可以成事四者不懷則情同犬豕行比豺狼安足以齒於人倫哉客曰先生斯論不亦傷於嫉惡太甚乎對曰嫉惡不甚則好善不篤若見惡不能去則邪佞之人㣥臻知善不能用則賢良之士引去苟懷誠節安得不嫉諂諛今公卿席客薎馮諼毛遂之忠誠侯伯幕賓肆李園祖珽之欺詐或受賄賣主奉越以事吳或首鼠兩端觀成而望敗窮其操心姦宄蘧蒢戚施與夫誠節之士執一不回死義不顧者亦何遼廓論未巳客曰若夫先生之論誠亦富茂乃斂衽而退俊元和十五年官戶部侍郎判度支淄青亠兊海鄆曹等三道及殷蔡申光等州勘定兩稅錢物斛斗等奉今年正月二十二日敕前件州郡久陷賊廷將定差科切在均一宜令度支郎中趙佶專往與所在觀察使刺史審實勘定聞奏伏以道路遙遠准旨條夏稅六月一日起徵若待使回覆奏即蠶桑已過徵稅失時制使或臨又頗勞擾伏請各委本州刺史審量物力約舊配額比類鄰州徵稅輕重及土地物産厚薄定兩稅錢物斛斗類並具送上都及留州刺史等額分析聞奏務使平允不得令已後致有申論
