front:
  text: 全唐文欽定全唐文卷五百六權德輿二十四
  hash: sha256:2577f0c9dd2d5b6877ebffe98f60b20a4aa8c8cbff72be3cb174c3751aad2eb2
body:
  text: 有唐博物通理之君子常山張君諱薦字孝舉以小司空亞丞相將大君之命結絕域之成貞元甲申歲夏六月出車國門在途被病秋七月戊寅復左轂於青海之西其孤敦與軍吏章騎護轜車而東明年春三月至於京師天子憫然加恩追崇大宗伯俾尚書郎弔祠職喪法賻秋七月癸酉安宅於某原君之先漢常山景王耳之後也曾王父義皇澤州治中王父文成司門員外郎贈國子司業烈考不忒揚州天長縣令贈睦州刺史代名儒學至君章大七歲善屬詩十歲通太史公書未弱冠有令聲於江湖閒優游恬智博貫古今約已求志視苟進如探湯東諸侯表其材以聞廷命左右禦率府兵曹參軍尋以傳車徵加史館修撰以勞授陽翟縣尉朝廷難諷議禮文之任拜左拾遺換太常博士柬求儁茂遷工部員外郎轉郎中修保氏之職擢左諫議大夫為權倖者所侵改祕書少監用久次升為祕書監前年戎王發導譯請棄細故以休寧西方先皇帝思所以臨存即敘故有冬官南臺之拜自筮仕至沒身與載筆終始書盛聖一王之法考周禮魯史修明裦貶好古者謂君辨裁而直其為禮官講貫洽聞統同辨異之大乖疑隱微之旨皆折中於君而優為之貞元郊祀告類報本再以臺郎攝贊大儀知禮者謂之閎達而敏使節法冠從古所難始則內廷參侍出疆命介次則專席委重登車有光減邊貢之蹄轍紓齊人之杼軸四牡所履陰方洽驩及是以撫和憬俗非君莫可竟以靡盬終於絕漠感慨者謂君盡瘁而忠凡歷十官而八在歷其他三帖職二承攝一追命春秋六十一君子之道有初有終悲夫惟君端直廉正醇醲博厚儼若彞器中涵靈龜以庸制祿故不至隱約以道藩身故不至燻灼中立大朝為名卿碩儒和而不同直而不詐東陽之長者富平之默識繄君有焉初興元貞元之閒轂下饑旱乘輿避正殿君引古抗章條其日數詳定昭德皇后廟樂及太儀位號儀大臣祔廟鼓吹之法皆稱典義而為故事有文集三十卷犖犖然君子之詞也上疏陳史職利弊指明切實有裨王度著史遁先生傳臣節之貞厲見焉纂十祖贊家風之德善章焉至若宰輔傳畧靈怪集同僚籍寓居錄等又數十編自成一家之言初娶太原鄔氏某官之女也繼室安平郡陳氏某官某之女柔嘉有儀而賦命不稱嗣子敦靖為宮衞紀綱掾次曰敦參鄭州軍事次曰敦業敦謙敦紹等克家孝謹執禮哀敬以德輿再同玉堂金華之署承先子之歡里仁服義為日固久泣狀遺懿以表識為請是用舉其大而畧其細銘諸墓門其詞曰天下圭表繫乎史職卬卬冬官二紀良直王者惠澤先於遠人皇皇使軒三抵殊鄰禮以節事每馳極摯文以導誠克諧雅聲思若雲鬱心猶砥平懷黃刻采兮實稱其服志力方壯兮奄然不淑有生必化兮邃古同塗憫君輤裧兮來自外區難也收子兮故人刻石湛恩襚印兮賁此幽穸維貞元十七年秋七月乙酉太常韋公諱渠牟年五十三啟手足於靖恭里戊子詔書以大司寇印綬告第其孤博古近古等號咷崩慕以冬十一月甲子蓍與蔡叶告窆於某原其徽數用天子之追命其誠儉用先人之理命既而纘書出處之義行官業請斲圓石藏於內云公字某京兆杜陵人自楚元王傅漢丞相節侯恭侯而下其族盛大天爵人爵沛然兩集六代祖範隋郿城莊公曾祖餘慶皇坊州刺史祖景駿房州刺史父永著作郎兼蘇州司馬同氣齊名皆以文學論著為賢卿大夫而著作志氣閎邁落落有奇節公即第若干子也年十二善賦詩屬書未弱冠博極今古尤精史籍力行過人且以為夫子在魯則衣逢掖在宋則冠章甫范蠡在陶為朱公在齊為鴟夷子皮於是傳心印之法於金陵授谷神之道於華陽或為塵外人或為遺名子其達觀也不名一行其元同也會歸三教蓋周流揭厲無入而不自得焉終以儒服服素王之道大歷末丁著作府君憂倚廬於壤樹之側以純孝感嘉生廉車列上州閭聳敬貞元二年起家拜校書郎五年轉左武衞騎曹掾皆為知己者從事八年大成均表其名經可領學徒遷四門博士十二年夏承詔與近臣名儒緇黃大士講議於麟德殿上以為能拜祕書郎尋獻詩七百字極其文采歲中歷右補闕左諫議大夫再當言責之地切劘獻替數進熟於君規事建議飇起鋒出卓犖頡頏取重於時三接日旰公卿仰其風采薦巖穴有道之士以待兩言其他推轂皆一言感慨就義若渴見不善如探湯與夫陰拱自愛持容容之計者固為愈矣閒一歲遷太府卿錫以命服又閒一歲遷太常卿泉藏受用之法帛丿糸蕝禮文之事峻科禁以絕其私酌儀制而合於中被病乞告禮愈優而不得請壽與志皆未極而歿悲夫公敏於歌詩縟采綺合大凡文集若干卷撰莊子會釋老子金剛經釋文孝經維摩經疏三教會宗圖共十餘萬言又奏修貞元新集開元後禮二十卷詔下有司令行於代當其憫坐馳哀弱喪也泛然若不淆於物及披肝膽承顧問也毅然若不有其身起儒官博士十三四年踐文石登玉堂赤車金印燻灼中外其所以得之者無他腸故也禮器曰觀其發而知其人之智洪範曰俊人用章噫嘻太常之道其智而俊歟雅為晉國韓公魯郡顏公之所薦寵魯公嘗稱遺名子洞徹三教讀佛書儒書道書向三萬卷又多言其神奇之跡今茲不書姑書其章明宏大者用識窀穸一以申嘗僚之義一以遂孝子之心其銘曰儒有奉常兮旁觀三元強志敏心兮詞義紛綸初委約以卷懷終發舒而顯尊出四門兮登三閣居保氏兮諤諤開知囊以當法座印纍纍而綬若若天衢淩厲兮才較㣥艾服官政兮年中身飇截道兮駟過隙夫何一氣聚散之沄沄逝者固不可作兮鏤貞堅於墓門君諱聿字某京兆杜陵人六代祖郿城莊公範有勳力於周隋閒範之孫機實居大農艱貞忠厚書在國史機之孫贈太子少保岳八子為二千石皆有風績生贈太子太師賁仕至藍田尉清方粹遠天爵自修有才子四人君為冢嗣承少保太師祖禰之慶故延耀發舒於君伯仲之閒少開敏有才智通覽書記不為章句儒天寶中以門子奉清廟齋祠試言會府補宣州南陵尉歷揚州天長丞越州兵曹掾涇原節將表為參軍以廷尉平攝監察御史未及行授揚州錄事參軍尋為本府薦拜祕書郎兼殿中侍御史以官名心瞿換太子司議郎俄擢侍御史檢校祠部員外郎皆為淮南從事貞元十二年徵為水部員外轉比部郎中德宗召見賜以金紫命服俄遷衞尉少卿國子司業用久次拜右庶子元和三年九月景戌以官壽歿於長興里春秋七十五君初筮仕已辨疑摘伏全活枉濫厥後率為守臣薦引歷丞史紀綱掾皆以理效聞自簪法冠贊戎重或筦府政以修吏理若摻遞鍾而揮孟勞度音觸物非輩類所及所奉之主即故居守杜扶風公今司徒岐公其人也介弟太尉南康忠武王有大烈於王家同氣致美士林景行不乘勢以燻灼每虛懷而坦蕩再為尚書郎業以修計部稽百事財用之數嘗欲覆視禁軍董正其簿書雖事適中止而聞者竦歎洎佐師氏相東朝克詳憲令以中宜適朝請休沐或近郊考勝漢廷臣賢士大夫車常接轂必釃酒理具懽怡晏晏交有久要而言無瑕謫平夷疏達造適遺累有君子之槩焉與夫拘攣枯槁扃束於一代者異日論也素強力無疹痗奄忽啟手足庸詎知非五福之康寧以考終命耶岐公以元老總國柄每退朝清問日與君晏言一旦相失涕洟怛化夫人滎陽縣君鄭氏某官某之女淑溫仁順為六姻法凡合體若干年先於君歿者半歲嗣子行檢進士第自協律郎移朗州司戶有文業為素藝器幹次子業行修皆修詞與計偕次某等顓經術某等尚幼女子有行者四人在襁抱者三人子壻某官某某官某等皆華宗良幹匍匐會事行檢等令龜揲蓍得十月某甲子吉以德輿同辟公府周知所履將琢圓石見咨直書銘曰桂陽之系郿城之裔伊上族兮亞於大僚相彼東朝介豐福兮吉凶糺纆以息闕二字斯不淑兮直城南偏即遠歸全覆夏屋兮茲焉追琢以識冥漠表陵谷兮公諱珦其先會稽人蜀廣漢太守蒙晉西鄂節侯憲給事中龔皆以茂績焯於前載曾祖彥榮皇同州長史祖思崇韶睦常三州刺史父懷操桂州興安縣令贈華州刺史實有清行藏於家牒公早孤貧篤志好學舅氏徐吏部浩器以遠大以其兄之子妻之寶應初上書言事廷命太祝由吏資轉長水河南二縣尉萬年主簿分董計司湘中之賦授大理司直嗣曹王以宗室吏師節制洪荊襄三府公皆贊其師律歷監察御史殿中侍御史祠部員外郎府除徵為奉天令刺廬壽二州就加御史中丞入為司農卿京兆尹移疾乞告改太子賓客凡莅十六官考績四十四年宏厚有局度辯論通史事敏而文忠而能力緣飾楨幹所居可紀初結綬滿歲調於有司會舅氏居選部上其名於宰府試言二篇比興菁華及賓曹邸兼管書奏下安陸應山露布於朝矢口雨下含章迅發介漢南也武人因府喪以劫軍實譸張無狀公立斬首惡十餘曹且命環棘於庭俾投所取以貰罪閒一日而金幣皆復微公之才則一方幾亂其宰陵邑內官旁午吏有因緣橫猾以犯禁者榜笞至死人用知懼凡田里之闢庸亡之徠皆倍於始至而不書於籍廬江劇部號為難理強家占田而窶人無告鄉校廢落而冗吏猥多被病者捨醫事求淫祀公皆去其弊而圖其利人人得盡四支之敏而務十全之術修起經師弟子以理庠塾每歲以廉茂計偕者倍於他邦化條易和氣浹洽靈芝產白雀至連率今司徒岐公上其理狀詔賜紫金命服壽陽與蔡人接壤有州師萬數天子命中貴人監理視方任焉訓武備飭文事嚴重廉清理行第一入以材能為九卿典司金穀由朱邑之課第循牟融之事任其尹京轂不施鉤距嘗請減縣內平糴之半且以嘗賦輸於公上者充焉精力惠養人蒙其利前史稱吏不廉平則理道衰旋觀夫人之所涖有以見朝廷理道之所繇也年耆疹痗乃喟然歎曰吾以澤國書生累至二千石居大農內史止足休老其在茲乎拜章數上雖處以儲賓優秩而不得謝以元和四年冬十一月啟手足於宣平里之私第逾懸車者四歲夫人東海徐氏同州司馬參軍浚之息女婦道柔正不躋偕老嗣子讓鄉舉進士博學宏詞能直言極諫三登甲科為校書郎咸陽縣尉毀瘠孺慕如不欲生號奉輤車以某月日歸祔於會稽之兆域以德輿與公同服大僚頃歲奉行中執法之詔又嘗讀亡友楊懋功刻金石遺愛之說公之率履固為周知識諸窀穸不敢辭也銘曰懿彼君子兮有猷有守其心不回兮其進不苟中外賦政兮人之父母金艾被體兮華纓耀首月在子兮歲居丑復東榮兮寢北牖火黻列兮纁元紐歸鮮原兮巾廣柳邱夷谷變兮何不有追琢貞堅兮天地久君諱渭字兆師其先汝南人六代祖衡仕隋為淮陰郡司馬子孫因家焉曾祖頂闕一字杭州長史祖守則婺州金華丞父隨州棗陽令三葉沈晦纓轂未華皆以義行稱於州里君服儒篤學工為詞賦大歷末常潘繼居小宗伯號為得士君與令弟澈聯中正鵠於二有司之下是歲孝文帝嗣大統詳延諸生又以貞師伐謀對有明法授汝州襄城尉時太傅崔文貞公以匪躬當國兼綜書殿表為校理歷富平長安尉拜監察御史董選補於南方南方吏理清而風俗阜抑君是賴復命其勞轉殿中侍御史平理詔獄清公不苛遷膳部員外郎祠部郎中典曹草議遵道循性居太微積星之位十年不徙官其有據利權大竇燻灼於時者君必畏而遠之居易自足前歲凶旱詔罷郡國選舉慮轂下艱食之不給也君抗疏以為無肆眚且久得非濫刑失職者含寃以盭和氣邪臣以為答於天戒者在此不在彼雖留中不下而士友多之上皇踐阼章敘時儁君已感疾拜章請老有詔授祕書少監以優遂之先築室於崇德里有嘉樹修竹休沐吟詠以文自娛每得一佳句如獲官祿恬於進取用此故也赤紱華髮燕居考祥方嗇精神以順和理永貞元年冬十一月甲戌奄然大病以啟手足春秋六十六夫人河東薛氏將作監丞腴公之女雅有儀操有子三人從魯從禮從質克稟風訓以明年二月某甲子號奉裳帷返葬於緱山縣唐興鄉之北原刻石銘墓以昭景行銘曰猗歟周君探六義思無邪詞頗類安久次復郎吏謝浮榮佐中祕洛師緱原潛厚地刻勒貞珉書此誌君諱會字某河南聞喜人有唐元老左僕射贈司空貞孝公之元子惟司空左右肅宗壽與位侔百順五福宜鍾厥後雖不能嗣居公相者必用攸好德考終命焉君孝悌睦友慎厚敬讓直而和柔而不犯馴行克家學古入官乾元初筮仕太常授奉禮郎再轉至主簿廣德初以宰相子行修飾特加正議大夫累登東朝為中舍人率更令仍副少府又貳殿中今司徒北平王之節制河東也表為戎佐檢校吏部郎中貞元元年旱蝗相乘列郡災耗君奉府檄莅於定襄勞徠安集有異等之效就加金印紫綬以疇其能五年從北平朝京師真拜膳部郎中八年轉衞尉少卿九年戊申終於位享年四十六噫嘻君有甘白之姿而受采和有惠龢之量而蒙覆露徊翔省寺周旋官業質於典憲故不跲詳於奏議而有章盡齊敬於宗廟惇愷悌於族屬以友輔仁以酒全神忘懷久次未嘗諂黷雖不踐右職立章章之效而歷官十一列爵故里辟三公府以政事稱被薦紳奉朝請者逾二十年無過言無違德啟其手足歸全於先公君子以為難再娶皆博陵崔氏前夫人新繁令平之女繼夫人大理評事陽元之女咸有婦順不幸早夭其孤曰定為左千牛備身定弟密密弟字年甫成童咨於叔父前京兆府戶曹向以十月某日返葬於東周萬安山之南原二夫人祔焉孝子悌弟用誠信襄事禮文家法率履無違言世功冠族者以裴氏為河東盛閥自魏翼州刺史徽種德滋大纂承紹續十有二葉至贈中書舍人義宏仕至梓州元武丞君之大王父也舍人生贈司空惓歷給事中杭鄧二州刺史君之王父也門業風緒天下稱之今纂書其畧刻於墓石銘曰濟濟德門溫溫恭人司空之子司徒之賓位止亞卿年不中身遽歸其全乃返乎真上有宰樹兮下有野土閟此幽宅兮萬安之下元和十年秋故兵部尚書贈尚書右僕射王公之孤曰元泰元質元弻等舉其王考贈禮部尚書之殯於玉山王妣贈隴西郡太夫人李氏之窆於潁陽泣問龜策得八月壬寅安祔於萬年縣鳳棲原吉克成先志孝孫之心也尚書諱端字某太原人曾祖某某官祖某某官代理儒術至公以文學策名舉進士宏詞連得雋於春官天官之下解巾崇文館校書郎改右驍衞兵曹掾隴右節度奏授大理評事為其上介天寶十年拜監察御史十三年轉殿中侍御史俄以本官內供奉贊東京畿採訪之重十四年遷工部員外郎謝病請長告南浮江湖因寓幽陵兵亂啟手足於行次春秋若干是歲乾元二年也娶隴西李氏隋太師申國公穆五代孫吏部郎中問政之孫城門郎韶之女賢明有儀操生子三人長曰綽被服緇褐修無生法次曰紓以文章繼公用雋造履清近諫垣載筆在帝左右綱紀都曹典司庫兵歷外郎正郎直誠厚行為士君子儀矩次曰紹繇小司徒三為六官於外則保釐東郊節制徐方當德宗朝嚮納尊信漢廷臣莫二時上馭天下歲久宰政之外大僚往往以辨智材能獻熟得君者或險決以務忮害或妄誣以取快愜僕射則和平將順不疚不惑人到於今稱之故公以義方貽慶再受二千石五曹之錫積厚流光可勝言哉先遠襄事未得吉卜而歿元泰等茹荼繼志經啟鮮原以德輿與其先人同於汴東江西從事同為郎吏同為尚書藐然無容見託傳信雖文之朴野其可辭乎銘曰尚書為父僕射為子家聲章章令聞不已萬有千年兮邱封在此噫嘻吾之從祖弟曰少成字某仕至河南府登封令而歿其年五十七曾王父益州成都縣尉府君諱無侍王父許州臨潁縣令府君諱伋父華州司士參軍府君隼三葉有文行而賦祿不稱當時才士名人皆與之遊君甫成童通左史古文小戴禮以經明調選為睦州桐廬尉凡七徙官皆以功次得調其為右威衞紀綱掾尚書郎有官人於黔巫者請為之介裔夷得職其為河西尉奉職於左曹吏無奇衺其為梁縣令也二千石領行詔條繆行徵令而多賦於人屬城皆不能辨君毅然有守折其疑文詞堅氣正不直不已梁人得以蒙其澤遂其生郡表尤異拜河南府兵曹曹事修理元和十一年調補登封春二月病風痺逮秋寖劇九月十七日啟手足於官次悲夫君仁厚質實廉隅介獨潔清在公顛沛以之探經術法義往往以文自道不務游談不馳名聲深知者以為古之循吏不若也階近赤紱官近朱轓謂跂而及竟歿於周圻一同之地斯可慟也娶博陵崔氏某官某之女雅有婦行長男頊以經明為鳳州兩當令專敏好學次曰琯華州參軍篤志於文章幼嗣曰某曰某皆在稚孺呱呱以泣頊等以明年二月安祔於伊闕之舊封禮也嗚呼吾無期叔父無期大功兄弟以至於君且有一歲之長班白相視疾恙相悲奄然委化痛入肝膈故出涕而銘之銘曰東周蒼茫兮甸邑鮮原以之賦政兮以之歸根嗚呼不可作兮死生沄沄權氏殤子名順孫小字文昌以被病用桑門法更其字曰君吒贈太子太保貞孝公之曾孫今刑部尚書扶風郡公德輿之孫渭南縣尉璩之子始仕為僕寺進馬生十三年以元和十年十一月二十二日夭於光福里二十七日斂手足形於萬年縣神和原既闔棺其大父泣而誌之曰爾幼有敏智孝順敬遜承大父母父母之教無違旨雖孝子順孫成人者之養不若也故吾以名之讀孝經論語尚書尤好筆札不離硯席凡舉措語言循理喻義出常童遠甚方肄小戴禮業未竟而感疾自春涉冬綿四時寖劇大病之際上辭尊長下訣幼弟妹恬然不亂且謂其傅婢曰空中佛事儼然在目促焚香移吾枕西嚮合掌而絕始吾常疑神滅不滅之論逮今信矣噫嘻以爾已仕且有成人之志吾欲勿殤知禮者曰不可而不敢逾也惟大墓在洛師得陪祔之吉於後歲故於是權窆而號曰惟魂氣兮無所之爾之神得所往兮吾又惡用夫涕洟維貞元六年冬十一月戊子比邱尼元應化滅於潤州丹陽縣昭代寺享年五十四經夏十有三明日庚申寧神於縣北之某原刻石紀墓虞陵谷之變也敘其畧則幼稟公宮之教早繼德門之室次有徙宅之訓終悟捨筏之宗紀其詳則俗姓盧氏世閥華峻倬於漢魏以至北齊黃門侍郎思道即六代祖也曾祖悌隱居不仕祖暄皇中散大夫邠王友贈祕書監父澐皇中散大夫婺州刺史惟先人叔父迭領名藩出也作民父母入也為王卿士再世出於裴而舅族多賢繼貳六官聯居九牧中外纓冕之盛冠於士林儲是德慶宜有淑喆初以既笄之年歸隴西李君晉卿仕至東陽決曹掾靖恭敏直齒位皆屈其於輔贊淑賢之道槃袠組紃之事舉無違德姻黨宜之晝哭之後棲心釋氏既厭有生之患竟從受具之法灑濯世網揭厲元津外修尸羅中習禪惠法器方茂遽與化俱初決曹府君前夫人范陽盧氏子曰暢幼懷字育之仁夙奉詩書之訓再以經術踐甲科歷校書郎密縣尉柴毀欒欒鄰於滅性孝慈相感名教多之銜恤卜兆竭其誠信附於窀穸之事率從苾芻之儀且遺令也德輿於密縣為族外弟服儒同術里仁甚久哀託論譔謹無媿辭銘曰柔濡清淨蓮花之性端明綢直淑女之行上無詒罹下振母儀晚悟真諦空王為師體魄者何電燄無期往而不復哀哀孝思三藏者何於心為戒定慧於學為經律論惟西域二大士以正智法器為天人師大宏教和尚本號金剛智南印度人出家於那蘭陁寺道成於迦毗羅衞國事龍智阿堵梨通總持灌頂之法入師子國登楞伽山航海涉險聿來中土開元中隨鑾輅於兩都大智大慧皆摳衣請益春秋七十三夏臘五十化滅於洛京起塔於龍門傳法於大辯正和尚和尚法號不空師子國人母氏方娠夢佛光照頂弱冠受具通三密法嘗齎國信往詣他方諷真言而海風恬息結祕印而狂象調伏若歲大旱實作霖雨內出方袍之錫猶命服焉至德初宣皇受命於靈朔譯不動尊經以獻凡所以順天心而導善氣者又何可勝言自開元末至大歷中三朝尊奉以密行救世代宗授以特進鴻臚卿賜號大廣智三藏既以眾生病為病於臥內加開府儀同三司封蕭國公大歷九年夏六月既望示滅於興善寺追命司空不視朝三日尊名曰大辯正遣中謁者弔祠報年減先師三歲而休夏同數初武皇帝崇大師以次公命卿也先師有儀同之贈宏教之諡大師之弟子曰沙門含光曇貞覺超惠應於鄰潛真惠覺等或為肅宗灌頂阿堵梨清凉山功德使或為內道場三教大德或為僧錄皆偉然龍象為法棟梁而惠應惠覺傳授祕藏永懷世道乃於仁祠法堂嚴事華飾儀同在西蕭國在東睟容德宇瞻仰如在應公又推本其教曰昔毗盧遮那如來入不空王三昧說瑜珈最上乘義授於普賢以平等性智而造妙覺一印含萬法五部周四方金剛之堅利蓮花之清靜悟入之速可思議哉普賢授龍猛龍猛授龍智凡千百載而先大師授於大師纂服六葉之教紹明三摩之法攝護成就斯為妙門大凡飜經七十七部一百卷命書愍冊表章荅禮傳譯之差次弟子之號名環周素壁聳視生敬淨名會中亦參世典宏明集內無匪佛乘初先大師之滅也呂工部向杜衞公鴻漸為之記大師之云亡也嚴京兆郢沙門飛錫為之碑感緣行化皆以詳熟今應公以二大師遺影之在此堂也不可以不識應公入大師之室德輿入應公之藩以茲因緣俾揭文字銘曰法身徧照六葉傳妙惟二大師三朝演教天竺西極瑜珈度門蓮開法界月破重昬儼然象設復獲親覲如聞軟語如結祕印一室之中寂然感通道行無窮法子之功先公以大歷二年歲在丁未夏四月十四日棄代於潤州先友趙郡李公遐叔已為之墓表先太君以貞元四年歲在戊辰夏六月二十三日棄代於洪州亡友安定梁肅寬中又為之墓表乃今元和十二年歲在丁酉秋七月十五日壬寅孤子山南西道節度觀察使銀青光祿大夫檢校吏部尚書兼興元尹御史大夫扶風郡開國公德輿始獲備誠信以追命徽數昭告啟二封於丹徒祔神於東都萬安山之北原其終始大要官閥大本並已具李氏之說孤窮噭號以補其闕文先公以永貞元年再追命為工部尚書元和二年三追命為太子少傅七年四追命為太子太保太常考行易名曰貞孝公先夫人元和元年追命為燉煌縣太君二年再追命為絳郡太君先公有事君事親之大節道積於身而不得大行於時時不得蒙公之化士大夫之論炳如日星煜若鳳麟夫人輔佐中饋為人倫師式上事姑下訓子為順婦為慈母孝愛寬順得內姻外姻之和如惠風甘雨長育生物永惟二尊幷包健順用晦其明不丁於時受名器裦錫於冥冥之下覆露蒙昬叨冒顯榮踰量腊毒日俟顛隕嗚呼曾王父以上葬於本州今限異域至王父葬於伊水之陽屬者卜祔於伊水之陽不吉得萬安山之原吉以歲之不易與時之多故久未遷神懼至沒身常泣謂稚子璩曰苟吾未襄事死而不可以歸骨於九原不可以請諡於有司今則天幸克申私志異日從先公於斯邱也是得養於下也尊行淑聲備於前銘繼此譔刻哀荒罔極
