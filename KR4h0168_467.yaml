  text: 全唐文欽定全唐文卷四百六十七陸贄八
  hash: sha256:0fb4d765ff57004715557c4f47e2f2c88e3f88aadfed7ab0c15bc73c2a9c0d4c
body:
  text: 內侍朱冀寧奉宣聖旨緣兩河寇賊未平殄又淮西兇黨攻逼襄城卿識古知今合有良策宜具陳利害封進者臣質性凡鈍聞見陋狹幸因乏使簪組升朝薦承過恩文學入侍每自奮勵思酬獎遇感激所至亦能忘身但以越職干議典制所禁未信而言聖人不尚是以循循默默尸居榮近日日以愧自春徂秋心雖懷憂言不敢發此臣之罪也亦臣之分也陛下天縱聖德神授英謀明照八表思周萬務猶慮闕漏下詢芻蕘此堯舜捨己從人好問而好察邇言之意也臣每讀前史見開說納忠之士乃有泣血碎首牽裾斷鞅者皆以進議見拒懇誠激忠遂至發憤踰禮而不能自止故也況今勢有危迫事有機宜當聖主開懷訪納之時無昔人逆鱗顛沛之患儻又上探微旨慮匪悅聞傍懼貴臣將為沮議首尾憂畏前後顧瞻是乃偷合苟容之徒非有扶危救亂之意此愚臣之所痛心切齒於既往是以不忍復躬行於當世也心蘊忠憤固願披陳職居禁闈當備顧問承問而對臣之職也寫誠無隱臣之忠也謹具件如後惟明主循省而備慮之豈直微臣獨荷容納之恩實億兆之幸社稷之福也臣本書生不習戎事竊惟霍去病漢將之良者也每言行師用軍之道顧方略何如耳不在學古兵法是知兵法者無他見其情而通其變則得失可辯成敗可知古人所以坐籌樽俎之間制勝千里之外者得此道也臣才不逮古人而頗窺其意是敢承詔不默輒陳狂愚伏以克敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖眾不足恃操失其柄者將雖材不為用兵不足恃與無兵同將不為用與無將同將不能使兵國不能馭將非止費財翫寇之弊亦有不戢自焚之災自昔禍亂之興何嘗不由於此今兩河淮西為叛亂之帥者獨四五凶人而已尚恐其中或有傍遭詿誤內蓄危疑蒼黃失圖勢不得止亦未必皆是處心積慮果為姦逆以僭帝稱王者也況其餘眾蓋並脅從苟知全生豈願為惡若招攜以法悔禍以誠使來者必安安者必久斯道積著人誰不懷縱有野心難馴臣知其從化者必過半矣舞干苗格豈獨虛言假使四五兇渠俱稟梟鴟之性其下同惡復有十百相從是皆卒伍庸流闒茸下品其志好不過聲色財貨之樂其材用不過蹴踘距踴之能其約從締交則迭相侮詐以為智謀其御眾使人則例質妻孥以為術數斯乃盜竊偷安之伍非有姦雄特異之資以陛下英神志期平壹君臣之勢不類逆順之理不侔形勢之大小不倫師徒之眾寡不敵然尚曠歲持久老師費財加算不止於舟車徵卒殆窮於閩濮笞肉捶骨呻吟里閭送父別夫號呼道路杼柚已空興發已殫而將帥者尚曰財不足兵不多此微臣所以千慮百思而不悟其理也未審陛下嘗徵其說察其由乎股肱之臣日月獻納復為陛下察其事乎臣愚無知實所深惑遂乃過為臆度輒肆討論以為克寸敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖眾不足恃操失其柄者將雖材不為用今以陛下效其明聖㣥帥畏威雖萬無此虞然亦不可不試省察也陛下若謂臣此說蓋虛體耳不足徵焉臣請復為陛下效其明徵以實前說田悅唱亂之始氣盛力全恒趙青齊迭為脣齒陛下特詔馬燧委之專征抱真李芃聲勢相援于時士吏畏法將帥感恩俱蘊勝殘盡敵之誠未有爭功邀利之釁故能累摧堅陣深抵窮巢元惡幸脫於俘囚兇徒幾盡於鋒刃臣故曰克寸敵之要在乎將得其人馭將之方在乎操得其柄此其明效也田悅既敗力屈勢窮且皆離心莫有固志乘我師勝捷之氣躡亡虜傷夷之餘比於前功難易百倍既而大軍遂駐遺孽復安其後餽運日增師徒日益於茲再稔竟不交鋒量兵力則前者寡而今者多議軍資則前者薄而今者厚論氣勢則前者新集而今者乘勝度攻具則前者草創而今者繕完計兇黨則前者盛而今者殘揣敵情則前者銳而今者挫然而勢因時變事與理乖當易而反難當進而中止本末殊趣前後易方順理之常必不如此臣故曰將非其人者兵雖眾不足恃操失其柄者將雖材不為用此自昔必然之效但未審今茲事實得無近於此乎在陛下熟察而亟救之耳固不在益兵以生事加賦以殄人無紓目前之虞或興意外之患人者邦之本也財者人之心也兵者財之蠧也其心傷則其本傷其本傷則枝幹顛瘁而根柢蹷拔矣惟陛下重慎之愍惜之今師興三年可謂久矣稅及百物可謂繁矣陛下為之宵衣旰食可謂憂勤矣海內為之行齎居送可謂勞敝矣而寇亂有益翦滅無期人搖不寧事變難測是以兵貴拙速不尚巧遲速則乘機遲則生變此兵法深切之誡往事明著之驗也夫投膠以變濁不如澄其源而濁變之愈也揚湯以止沸不如絕其薪而沸止之速也是以勞心於服遠者莫若修近而其遠自來多方以救失者莫若改行而其失自去若不靖於本而務救於末則救之所為乃禍之所起也修近之道改行之方易於舉毛但在陛下然之與否耳儻或重難易制姑務持危則當校禍患之重輕辯攻守之緩急臣謂幽燕恒魏之寇勢緩而禍輕汝洛滎汴之虞勢急而禍重緩者宜圖之以計今失於屯戍太多急者宜備之以嚴今失於守禦不足何以言其然也自胡羯稱亂首起薊門中興已來未暇芟蕩因其降將即而撫之朝廷置河朔於度外殆三十年非一朝一夕之所急也田悅累經覆敗氣沮勢羸偷全餘生無復遠略武俊蕃種有勇無謀朱滔卒材多疑少決皆受田悅誘陷遂為猖狂出師事起無名眾情不附進退惶惑內外防虞所以纔至魏郊遽又退歸巢穴意在自保勢無他圖加以洪河太行禦其衝并汾洺潞壓其腹雖欲放肆亦何能為又此郡兇徒互相劫制急則合力退則背憎是皆苟且之徒必無越軼之患此臣所謂幽燕恒魏之寇勢緩而禍輕希烈忍於傷殘果於吞噬據蔡許富全之地益鄧襄鹵獲之資意殊無厭兵且未衂一作䘏東寇則轉輸將阻北窺則都城或驚此臣所謂汝洛滎汴之虞勢急而禍重代朔邠靈之騎士自昔之精騎也上黨盟津之步卒當今之練卒也悉此彊勁委之山東勢分於將多財屈於兵廣以攻則曠歲不進以守則數倍有餘各懷顧瞻遞欲推倚此臣所謂緩者宜圖之以計今失於屯戍太多李勉以文吏之材當浚郊奔突之會哥舒曜以烏合之眾扞襄野豺狼之㣥陛下雖連發禁軍以為繼援累敕諸鎮務使協同睿旨殷憂人思自效但恐本非素習令不適從奔鯨觸羅倉卒難制首鼠應敵因循莫前此臣所謂急者宜備之以嚴今失於守禦不足陛下若察其緩急審其重輕使懷光帥師救襄城之圍李芃還鎮為東都之援汝洛既固梁宋亦安是乃取有餘救不足罷關右賦車籍馬之擾減山東飛芻輓粟之勞無擾則禍亂不生息勞則物力可濟非止排難於變切亦將防患於未然徵發既停守備且固足得徐觀事勢更選良圖此於紓亂解紛抑亦計之次也議者若曰河朔㣥盜尚未殲夷儻又減兵必更生患此蓋好異不思之說耳臣請有以詰之前歲伐叛之初唯馬燧抱真李芃三帥而已以攻必克以戰必彊是則力非不足明矣洎遲留不進乃請益師於是選神策銳卒以繼之而李晟往矣猶曰未足復請益師於是徵朔方全軍以赴之而懷光往矣幾遣加半之戍竟無分寸之功是則師不在眾又明矣然而可託以為解者必曰王師雖益賊黨亦增曩獨田悅寶臣今兼朱滔武俊臣請再詰以塞其辭曩之田悅寶臣皆蓄銳養謀劇賊之方彊者也尋而田悅喪敗寶臣殲夷雖復朱滔武俊加於前亦有孝忠日知乘其後是則賊勢不滋於曩日王師有溢於昔時又明矣曩以太原澤潞河陽三將之眾當田悅朱滔武俊三寇之兵今朱滔遁歸武俊退縮唯此田悅假息危城設使我師悉歸彼亦纔能自守況留抱真馬燧足得觀釁討除是則減兵東征勢必無患又明矣留之則彼為冗食徙之則此得長城化危為安息費從省舉一而兼數利惟陛下圖之謹奏右臣頃覽載籍每至理亂廢興之際必反覆參考究其端由與理同道罔不興與亂同趣罔不廢此理之常也其或措置不異安危則殊此時之變也至於君人有大柄立國有大權得之必彊失之必弱是則歷代不易百王所同夫君人之柄在明其德威立國之權在審其輕重德與威不可偏廢也輕與重不可倒持也蓄威以昭德偏廢則危居重以馭輕倒持則悖恃威則德喪於身取敗之道也失重則輕移諸已啟禍之門也陛下天錫勇智志期削平忿茲昏迷整旅奮伐海內震謺莫敢寧居此誠英主撥亂拯物不得已而用之然威武四加非謂蓄矣所可兢兢保惜慎守而不失者唯居重馭輕之權耳陛下又果於成務急於應機竭國以奉軍頃中以資外倒持之勢今又似焉臣是以疚心如狂不覺妄發輒踰顧問之旨深測憂危之端此臣之愚於自量而忠於事主之分也古人所謂愚夫言之而明主擇之惟陛下幸留聽焉臣聞國家之立也本大而末小是以能固又聞理天下者若身之使臂臂之使指則大小適稱而不悖焉身所以能使臂者身大於臂故也臂所以能使指者臂大於指故也王畿者四方之本也京邑者又王畿之本也其勢當令京邑如身王畿如臂四方如指故用則不悖處則不危斯乃居重馭輕天子之大權也非獨為御諸夏而已抑又有鎮撫戎狄之術焉是以前代之制轉天下租稅委之京師徙郡縣豪傑處之陵邑選四方壯勇實之邊城其賦役則輕近而重遠也其惠化則悅近以來遠也太宗文皇帝既定大業萬方厎乂猶務戎備不忘慮危列置府兵分隸禁衞大凡諸府八百餘所而在關中者殆五百焉舉天下不敵關中則居重馭輕之意明矣承平漸久武備浸微雖府衞具存而卒乘罕習故祿山竊倒持之柄乘外重之資一舉滔天兩京不守尚賴經制頗存典刑彊本之意則忘緣邊之備猶在加以諸牧有馬每州有糧故肅宗得以為資中復興運乾元之後大憝初夷繼有外虞悉師東討邊備既弛禁戎亦空吐蕃乘虛深入為寇故先皇帝莫與為禦避之東遊是皆失居重馭輕之權忘深根固柢之慮內寇則崤函失險外侵則汧渭為戎於斯之時朝市離析事變可慮須臾萬端雖有四方之師寧救一朝之患陛下追想及此豈不為之寒心哉尚賴宗社威靈先皇仁聖攘却醜類再安宸居城邑具全宮廟無霣此又非常之幸振古所未聞焉足以見天意之於皇家保祐深矣故示大儆將宏永圖陛下誠宜上副天心下察時變遠考前代成敗近鑒國朝盛衰垂無疆之休建不拔之業今則勢可危慮又甚於前伏惟聖謀已有成算愚臣未達敢獻所憂先皇帝還自陝郛懲艾往事稍益禁衞漸修邊防是時關中有朔方涇原隴右三帥以扞西戎河東有太原全軍以控北虜此四軍者皆聲勢雄盛士馬精彊又徵諸道戍兵每歲乘秋備塞尚不能保固封守遏其奔衝京師戒嚴比比而有陛下嗣膺寶位威懾殊鄰蠢茲昆夷猶肆毒蠚舉國來寇志吞岷梁貪冒既深覆亡幾盡遂求通好少息交侵蓋緣馬喪兵疲務以計謀相緩固非畏威懷德必欲守信結和所以歷年優柔竟未堅定要約息兵稍久育馬漸蕃必假小事忿爭因復大肆侵掠張光晟又於振武誘殺㣥胡自爾已來絕無虜使其為嫌怨足可明徵借如吐蕃實和回紇無憾戎狄貪詐乃其常情苟有便利可窺豈肯端然自守今朔方太原之眾遠在山東神策六軍之兵繼出關外儻有賊臣啗寇黠虜窺邊伺隙乘虛微犯亭障此愚臣所竊為憂者也未審陛下其何以禦之側聞伐叛之初議者多易其事僉謂有征無戰役不逾時計兵未甚多度費未甚廣於事為無擾於人為不勞曾不料兵連禍拏變故難測日引月長漸乖始圖故前志以兵為凶器戰為危事至戒至慎不敢輕用之者蓋為此也當勝而反敗當安而倒危變亡而為存化小而成大在覆掌之間耳何可不畏而重之乎近事甚明足以為鑒往歲為天下所患咸謂除之則可致昇平者李正已李寶臣梁崇義田悅是也往歲為國家所信咸謂任之則可除禍亂者朱滔李希烈是也既而正已死李納繼之寶臣死惟岳繼之崇義卒希烈叛惟岳戮朱滔攜然則往歲之所患者四去其三矣而患竟不衰往歲之所信者今則自叛矣而又難保是知立國之安危在勢任事之濟否在人勢苟安則異類同心也勢苟危則舟中敵國也陛下豈可不追鑒往事惟新令圖循偏廢之柄以靖人復倒持之權以固國而乃孜孜汲汲極思勞神徇無已之求望難必之效其於為人除害之意則已至矣其為宗社自重之計恐未至焉自頃將帥徂征久未盡敵苟以藉口則請濟師陛下乃為之輟邊軍缺環衞虛內廏之馬竭武庫之兵占將家之子以益師賦私養之畜以增騎猶且未戰則曰乏財陛下又為之算室廬貸商賈傾司府之幣設請榷之科關輔之間徵發已甚宮苑之內備衞不全萬一將帥之中又如朱滔希烈或負固邊壘誘致豺狼或竊發郊畿驚犯城闕此亦愚臣所竊為憂者也未審陛下復何以備之以陛下聖德君臨率土欣戴非常之慮豈所宜言然居安備危哲王是務以言為諱中主不行若備之已嚴則言亦何害儻忽而未備又安可勿言臣是以罄陳狂愚無所諱避罔敢以中主不行之事有虞於聖朝也惟陛下熟察之過防之且今之關中即古者邦畿千里之地也王業根本於是在焉秦嘗用之以傾諸侯漢嘗因之以定四海蓋由憑山河之形勝宅田里之上腴弱則內保一方當天下之半可以養力俟時也彊則外制東夏據域中之大可以蓄威昭德也豪勇之在關中者與籍於營衞不殊車乘之在關中者與列於廏牧不殊財用之在關中者與貯於帑藏不殊有急而須一朝可聚今執事者先拔其本廾重取輕所謂倒持太阿授人以柄議制置則彊幹弱枝之術反語綏懷則悅近來遠之道乖求諸通方無適而可顧臣庸懦竊為陛下惜之往者不可追來者猶可補臣不勝懇懇憂國之至輒敢效其狂鄙以備採擇之一端陛下倘俯照微誠過聽愚計使李芃援東洛懷光救襄城希烈兇徒勢必退衂則所遣神策六軍士馬及點召節將子弟東行應援者悉可追還河北既有馬燧抱真固亦無藉李晟亦令旋旆完復禁軍明敕涇隴邠寧但令嚴備封守仍云更不徵發使知各保安居又降德音勞徠畿甸具言京輦之下百役殷繁且又萬方會同諸道朝奏䘏勤懷遠理合優容其京城及畿縣所稅間架榷酒抽貫貸商點召等諸如此類一切停罷則冀已輸者弭怨見處者獲寧人心不搖邦本自固禍亂無從而作朝廷由是益尊然後可以度時宜施教令弛張自我何有不從端本整棼無易於此謹奏臣前日蒙恩召見陛下敘說涇原叛卒驚犯宮闕及初行幸之事因自克寸責辭旨過深臣奏云陛下引咎在躬誠堯舜至德之意臣竊有所見以為致今日之患者㣥臣之罪也陛下又曰卿以君臣之禮不忍歸過於朕故有此言然自古國家興衰皆有天命今遇此厄運雖則是朕失德亦應事不由人未及對詔之間陛下遂言及宗祧涕泗交集主憂臣憤人理之常情激於衷不覺嗚咽旋屬游王褱請對臣言未獲畢辭今輒上煩以盡愚懇臣所謂致今日之患是㣥臣之罪者非敢徒飾浮說苟寬聖懷事皆有由言庶可復自胡羯稱亂遺患未除朝廷因循久務容養事多僭越禮闕會朝陛下神武統天將壹區宇乃命將帥四征不庭凶渠稽誅逆將繼亂兵連禍結行及三年徵師四方無遠不暨父子訣別夫妻分離一人征行十室資奉居者有餽送之苦行者有鋒刃之憂去留騷然而閭里不寧矣聚兵日眾供費日多常賦不充乃令促限促限纔畢復命加徵加徵既殫又使別配別配不足於是榷算之科設率貸之法興禁防滋章條目纖碎吏不堪命人無聊生農桑廢於徵呼膏血竭於笞捶市井愁苦室家怨咨兆庶嗷然而郡邑不寧矣邊陲之戍用保封疆禁衞之師以備巡警二者或闕則生戎心國之大防莫重於此陛下急於靖難累遣東征邊備空虛親軍寡弱尋又搜閱私牧以取馬簿責將家以出兵凡有私牧者例元勳貴戚之門所謂將家者皆統帥岳牧之後是乃嘗蒙親委或著忠勞復除征徭固有常典今忽奪其畜牧事其子孫有乞假以給資裝有破產以營卒乘道路悽憫部曲感傷貴位崇勳孰不解體加以聚斂之法轂下尤嚴邸第侯王咸輸屋稅裨販夫婦畢算緡錢貴而不見優近而不見異其為憤慼又甚諸方誅求轉繁庶類恐懼興發無已㣥情動搖朝野囂然而京邑關畿不寧矣陛下又以百度弛廢志期肅清持義以掩恩任法以成理神斷失於太速睿察傷於太精斷速則寡恕於人而疑似之間不容辯也察精則多猜於物而臆度之際未必然也寡恕則重臣懼禍反側之釁易生多猜則㣥下防嫌苟且之風漸扇是以叛亂繼起怨讟並興非常之虞億兆同慮惟陛下穆然凝邃獨不得聞至使凶卒鼓行白晝犯闕重門無結草之禦環衞無誰何之人自古禍變之興未有若斯之易豈不以乘我間隙因人攜離哉陛下有股肱之臣有耳目之任有諫諍之列有備衞之司見危不能竭其誠臨難不能效其死所謂致今日之患是㣥臣之罪者豈徒言歟聖旨又以家國興衰皆有天命今遇此厄運應不由人者臣志性介劣學識庸淺凡是占算祕術都不涉其源流至於興衰大端則嘗聞諸典籍書曰天視自我人視天聽自我人聽又曰德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德又曰天難忱命靡常常厥德保厥位厥德靡常九有以亡此則天所視聽皆因於人天降災祥皆考其德非於人事之外別有天命也故祖伊責紂之辭曰我生不有命在天武王數紂之罪曰吾有命罔懲其侮此又捨人事而推天命必不可之理也易曰自天祐之吉無不利仲尼以為祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢是以自天祐之吉無不利又曰危者安其位者也亡者保其存者也亂者有其理者也故君子安而不忘危存而不忘亡理而不忘亂是以身安而國家可保又曰視履考祥又曰吉凶者得失之象也夫易之為書窮變知化其於性命可謂研精及乎論天人祐助之由辯安危理亂之故必本於履行得失而吉凶之報象焉此乃天命由人其義明矣春秋傳曰禍福無門唯人所召又曰人受天地之中以生所謂命也是以有動作威儀禮義之則以定命能者養之以福不能者敗以取禍禮記引詩而釋之曰大雅云殷之未喪師克配上帝儀監于殷駿命不易言得眾則得國失眾則失國也又引書而釋之曰康誥云惟命不于常言善則得之不善則失之此則聖哲之意六經會通皆為禍福由人不言盛衰有命蓋人事著於下而天命降於上是以事有得失而命有吉凶天人之間影響相準詩書已後史傳相承理亂廢興大略可記人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也六經之教既如彼歷代明驗又如此尚恐其中有可疑者臣請復以近事證之自頃征討頗頻刑網稍密物力竭耗人心驚疑如居風濤洶洶靡定上自朝列下達烝黎日夕族黨聚謀咸憂必有變故旋屬涇原叛卒果如眾庶所虞京師之人動逾億計固非悉知算術皆曉占書則明致寇之由未必盡關天命伏惟陛下鑒既往之深失建將來之令圖拯宗社阽危刷億兆憤恥在於審察時變博詢人謀王化聿修天祐自至恐不宜推引厄運謂為當然撓追咎之誠沮惟新之望臣聞理或生亂亂或資理有以無難而失守有因多難而興邦理或生亂者恃理而不修也亂或資理者遭亂而能懼也無難失守者忽萬機之重而忘憂畏也多難興邦者涉庶事之艱而知敕慎也今生亂失守之事則既往不可復追矣其資理興邦之業在陛下勉勵而謹修之當至危至難之機得其道則興失其道則廢其間不容復有所悔也惟陛下勤思焉熟計焉捨己以從眾焉違欲以遵道焉遠憸佞而親忠直焉推至誠而去逆詐焉杜讒沮之路廣諫諍之門焉埽求利之法務息人之術焉錄片善片能以盡㣥材焉忘小瑕小怨俾無棄物焉斯道甚易知甚易行不勞神不苦力但在約之於心耳又陛下天資睿哲有必致之具安得捨而不為哉斯道夕誓之於心則可以感神明動天地朝施之於事則可以服庶類懷萬方何憂乎亂人何畏乎厄運何患乎天下不寧昔太王以避狄而興周文王以百里而王是乃因危難而恢盛業由僻小而闡丕圖況陛下稟英姿承寶歷四海之利權由己列聖之德澤在人苟能增修蔑有不濟至如東北㣥孽荏苒逋誅涇原亂兵倉卒犯禁蓋上天保祐陛下恐陛下神武果斷有輕天下之心使知艱難將永福祚耳伏願悔前禍以答天戒新聖化以承天休勿謂時鍾厄運而自疑勿謂事不由人而自解勤勵不息足致昇平豈止盪滌祅氛旋復宮闕而已愚臣不勝區區憂國奉君之至誠有所切辭不覺煩伏惟陛下不以人廢言不以言廢直千慮一得或有取焉謹奏
