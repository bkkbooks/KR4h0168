front:
  text: 全唐文欽定全唐文卷九百四十二杜光庭十四
  hash: sha256:b53b2ab4bab8a5755933e7fbab8a7928a1784dfb693dee22ca333bf87ffd1151
body:
  text: 伏以列曜五行是司罪福上棟下宇亦有主張於成生孕育之閒寧無凶吉在應護居棲之內必有愆瑕須憑道力元功以解深災重過元皇立教三洞垂文敢按經科虔祈福祐臣祖母代國太夫人某氏年八十歲本命乙卯三月十三日戊午生今以土火二曜居三合之方天符飛旗衝大運之上五土剋於子水仍臨生日之辰以此刑妨因成微恙兢憂戰越罔敢自安伏念臣叨逢聖時獲承福緒而早悲孤藐繼履家艱惟祖母慈顏得晨夕侍奉刳心瀝懇願祝遐年今則所疾癭仍災足厂墨臨照竊恐居宅之所或有犯違積世以來或有寃債或往逝有考延之釁或幽陰有訟逮之文構此衰危盡希懺解是用選求吉日恭備醮壇伏惟大道垂光衆尊憫鑒為臣祖母某氏解銷災咎延續年齡增生祿於南宮落罪名於北府疾瘵除蕩腠理和調神藥潛資靈官密衞克蒙平愈永賜安貞洎乎宅宇之中常諧吉祐龍神鎮守邪惡銷亡惟冀勵修上答元造不任伏以五嶽上司總真奧府雄稱天國峻極仙都鎮尋厚地以巍峩高捧太穹而峭拔真靈所會水陸攸尊敷惠育於㣥方廣包容於三蜀陽崖蕩日陰壑藏雲讚時則表貺垂禎叶聖則呈祥薦瑞古今崇仰遐邇依憑臣叨荷聖慈鎮臨重地兼梓遂黔巫之境亘微瀘蠻蜑之封位極台衡任崇將相每慮功輕恩厚福過災生循分兢營拊心憂惕自青春屆序甘雨愆期農畝虧功驕陽害物雖歷申祭祀遍告神明密雲但布於西郊膏雨未霑於南畝皇皇衆庶叩向無門竊惟大道垂文天師演教有章奏之品有祈醮之科將展焚修須依靈勝是用披心雲洞拜手仙峰佇真侶之感通冀明誠之御達賜臣以時和歲稔拯臣以雨順風調驅肥遺於窮荒舞商羊於中境巖巒曹屬鼓列卄夬以舒威洞府龍神震雨豊霳而助化消除虐魃蘇息枯苗克歆黍稷之馨允洽京坻之望臣當怳心求理戮力徇公上答靈慈永承道祐謹差左都押衙檢校尚書右僕射前黎州刺史曹嶽與左右街宏教大師賜紫杜光庭虔誠章醮歸命希恩不任伏以四七在天垂文定位三八鎮地設象分靈列宿所以統幽明諸化所以司罪福況心宿為天皇之府上清乃神仙之都迥控長川倚玉輪之聳秀雄臨巨屏面銅馬之膏腴緬彼福庭廣廕庸蜀臣本命所係獲在茲山而謬握珪符仍居仙域每慮位崇任重力寡才輕超五爵以疏封制六鎮而為政或賞刑乖當或撫字失和下有怨咨上虧仁育兢憂未暇咎戾旋加粵自仲春即愆時雨塵侵壠畝赫日騰威風鑠郊原油雲匿影生靈歎息懼失於農功沼沚魚喁將懸於枯肆焦勞在念叩啟無由至於餚膳精豐備陳於廟貌牷牢肥腯無恡於禱祈徒罄誠心靡聞響答仰惟神仙濟物罔間幽明大道好生普均慈施太上著修禳之品三天開奏醮之科恭望神峰遠傾凡懇虔申大醮仰叩至真伏惟憫鑒所陳大施恩宥赦其愆咎賜以福祥使雷電揚威龍神悅豫霈霑渥澤克致豐穰南山騰虺虺之音東作盛芃芃之稼永諧望歲允契有年誓勤修奉之儀上副真靈之貺不任伏以天地分靈統之者至聖陰陽不測體之者至神主宰死生司明罪福有祈必應無感不通臣謬以非才理茲劇邑賦輿所總徵督所難鄉里凋荒緝綏尤切洗心求瘼克已徇公果蒙道力潛資真靈密助徵科辦集境土乂安疫毒不侵生靈以泰思酬元造眾竭丹誠共崇黃籙之壇虔備焚修之會兼申大醮上答靈恩況境接仙山人懷道化李相國之神功宛在羅真人之聖力時彰控諸觀之福庭標二化之真府必垂昭鑒納此誠祈伏惟太上延慈衆神孚祐普茲幽顯遐及存亡俱錫福祥咸蒙濟祐使一方清謐百穀滋豐疫癘兵戈永無侵軼飛沈蠢動各遂安全臣等九祖七元生天受福三途九夜離苦參真並乞災厄蠲銷罪尤除蕩潛增祿祚克保年齡同力運心俱霑巨祐不任伏聞大道開光五篇垂教凝自然之氣成空洞之文上正天元下安地紀中制劫運旁福生靈三界所宗萬神所稟其或葺修之地土木興功暗犯神靈明干禁忌皆憑祕篆以鎮方隅臣頃以所居須資揆構巨功既畢輒備焚修啟黃籙之壇場廣申懺拔展五符之醮酌遍用鎮安伏冀太上宏慈至真流鑒使龍神寧謐災咎蠲銷永無干犯之虞常荷乂安之福其有從來主宰五姓神靈各遂往生並獲開度即仰荷大道罔極之恩不任伏聞大道凝光上元垂象照臨九土覆育㣥生主籙吉凶司明罪福洪纎備察毫末無遺而金簡垂文玉書演法開懺祈之路懸悔謝之儀虔罄明誠必賜昭祐臣某顧惟虛薄運契遭逢位極台衡務專繁劇詳評獄訟裁制典刑或爽重輕慮招咎釁或操心屬念偶結尤違或積世此生未祛寃債靜言循度每用兢憂今則迍滯宮中土星所歷身位之內計都所臨神首火星仍居對照生月命位俱值天符以此災躔遂成疾厄捫心震惕瀝懇歸依仰元象以叩祈竭丹誠而醮酌伏惟至真上聖列曜高尊憫鑒塵凡降流恩宥釋前寃往債原重過深瑕增續年齡銷平災厄賜臣以百關調豫六氣和平盡解凶衰全除疾苦推忠効節永酬睿主之恩潔已凝心上副尊靈之祐不任太上無極大道元始天尊太上大道君太上老君十方自然靈寶天尊五老上帝三元君天地水府三官三十六部尊經元中大法師太極真人三天法師天曹地府三界真靈三官曹府一切元司臣等塵世凡微積生福會得遇元化參奉至真而跡處人寰身拘俗網沈浮聲利流浪死生未窮超拔之源徒慕清虛之旨六情三業動結罪條陰黑書旋增釁咎或前寃往債尚繫幽關故殺誤傷未申懺露或五行三命災運所臨暗曜明星凶神所犯常情靡測祈謝無由三元有考定之期五帝無陟明之典至或九元七祖猶滯三途注訟相延愆過委積福盡禍至首悔何門因今某官校錄之辰衆申祈醮之禮願迴元鑒俯察丹誠介福垂恩延生保命九元開度除右簡之罪名衆厄清銷上左宮之生錄永蒙道廕常荷鴻休上願帝祚延洪天元元晏生靈和泰遠近乂安九稼惟豐五兵自偃九幽六趣罪爽窮魂俱承曠蕩之恩各遂逍遙之性不任歸命虔誠懺請之至謹詞臣等早以庸虛志希元奧凝心妙道歸命真乘參六甲之祕文慕長生之要旨而寄身名宦莫遂精修三元四始之辰香燈或闕五臘六陽之會存注莫專恐兼故殺誤傷仍有前寃往債或行年厄運或宿曜災期曾未懺陳但增憂惕敢以下會吉日醮籙希恩伏冀五帝高尊降流禎福六甲真吏洗滌罪瑕上生籍於天曹削死名於地簡舉家蒙祐七祖生天祿算增延公私貞泰永勤焚炷以答元慈不任臣以庸微負荷大法敷宏真訓開度天人授道傳經濟時行化弟子某等夙慕大道歸命至真奉信元科參受符籙傳付之後已歷歲年或慮未受道之前及佩籙之後立身注意動有罪條三業十躔恣其愆過三元八節朝謁不專本命庚申修行有闕或噉食葷血穢亂正真或嗜欲繁華負違禁戒非憑三會難遍懺祈今因某會之辰考校之節同申大醮拜章言功罪謝十天歸誠三寶並乞宿殃清蕩衆罪蠲除善簿定名生宮列籍寃仇和解債訟夷平真氣內充百關悅豫靈官外護萬惡消沈五行三命之中暗曜明星之內永無臨照長息災凶九祖生天六親蒙福公私貞吉動靜康宜年命增延福祚遐廣誓令修勵上答元恩不任太上無極大道元元老君五老上帝天地水三官天曹四司君北斗七星君高上玉皇元卿大帝嶽瀆地府甲子衆神伏以二氣裁形五行構象稟大道生成之德荷元和亭育之恩至於命籙興衰祿祚豐薄立身罪福行運吉凶上自天司旁茲本命主張考校巨細無遺某夙荷洪休仰承元澤繼天立極應運撫時慙德教之未孚慮賞刑之或失揗懷增懼馭朽兢憂惟仗神功以康黎獻是用冥心宣室稽首靈壇冀道力以潛資佇靈真而幽贊俾五兵偃戢百穀滋豐中外和寧生靈舒泰誓傾修奉用副元慈不任虔祝之至謹詞伏以大道分光天元布化生成萬象孕育三才爰命真官以司籙籍五行休王皆稟於神功三命興衰悉宗於靈府臣夙叨洪澤備位青宮侍膳問安惟勵恪恭之懇資忠宏孝難酬君父之恩敢於元命之辰虔備醮祈之禮所願祛災悔過介福延休增萬壽於聖躬永安大業降千祥於寶運長奉昌期仰罄丹誠敢希元祐不任歸命之至伏聞上元垂象則七政循環下土推機則九宮飛化因其履歷以示吉凶由是三命五行有災祥之應陽奇陰偶有善惡之徵臣今年九宮飛旗天符臨於中位五星行度火曜對於命宮行年當地網之鄉大運與小運沖破因成災厄未獲痊平敢緣大道慈救之門遵太上醮祈之旨披心靈觀翹注虛壇普元象以告虔遍真靈而悔謝伏冀南宮六聖開長生致福之文北斗七元賜輟死降祥之力增延祿算消解災凶示遐永之期迴短促之紀使百關舒泰六氣均調釋往債前寃赦深瑕重過九元介福舉族安貞克勤修勵之心上副尊靈之祐不任伏以造化靈都神仙奧壤秀橫空際翠竦江干煙靄峯前聖祖之宸儀迥出松篁林內玉童之真相旁分非雕鐫藻繪之能運天地自然之妙所以潛流景貺貽福烝人常祛旱潦之災幾叶休貞之應況今鑾迎漢渚路隔秦州祈元祖之光靈拯神孫之播越克清萬㝢以泰㣥生無俾沂水橋邊獨掃龎勛之黨霍山祠畔空推劉武之鋒虔俟元威載昌鴻祚不任祝望希恩之至伏以山鎮地心洞開天目含藏烟雨韞蓄風雷崖祕仙經泉澄神沼觀署福唐之美邑標奉國之名憑此檮析必符禎貺今則翠輿順動丹闕貽災虔希幽贊之功共啟中興之運敷聖祖重元之力更炫重瞳揚宣尼四教之宗克明四目無使壽春山上猶傳助戰之威濟順祠前獨美迎鑾之事克宏道化以廣真風不任虔誠祝望之至伏聞道化裁成神功亭育氣分二象垂包容覆載之私節啟三元定罪福賞刑之柄所以北都泉曲常為銓赦之期南極文昌每洽超昇之澤至於人倫之內善惡吉凶虔啟丹誠即承鴻廕周氏叨榮宿福運履昌期備位彤宮輔寧皇極每慙涼德罔答殊休恐往世積生疵瑕未蕩五行三命厄會或臨火星將及於身宮天符又居於生日懼成災咎志切懺祈屬中元大宥之辰是率土希恩之節冥心靈觀稽首醮壇歷真府以輸誠期迴鑒祐遍靈曹而露懇願釋尤違賜周氏以寃債和平罪瑕除滌災凶消解年祿延長疾患無侵福祥臻萃九元七祖證品仙庭眷屬親緣臻榮聖日上願宗桃安鎮聖壽遐延紫禁青宮匡扶大業維城磐石保乂洪基㣥寮畢契於忠貞萬㝢咸歸於撫御式虔邱禱洪望元慈不任歸命瞻天望聖之至伏聞妙應無方道推濟物元慈廣運惠普㣥生開祈真悔罪之門垂拯厄希恩之品功成不宰澤布無涯敢緣覆育之仁輒罄歸依之懇臣自惟福運榮奉昌期自參扈衞之班遂陟烟霄之路功輕任重效寡恩深常切兢憂難酬寵擢近以災殃所迫疾瘵斯嬰軫聖慮以慰安降名醫而撫視未蒙痊減倍用兢惶伏念臣跡處塵寰素昧修稟立身履行寧免愆違或害物殺生曾無惻憫或摧鋒禦敵輕賜誅鋤總戎乖申令之宜為政有賞刑之失幽夜致寃仇之訴微躬成滯疾之危又恐往世積生尚縈釁咎五行九曜兼值災蒙或興修有犯觸之非或土木有侵傷之所捫心省過惟切懺祈是敢拜奏寶章崇修大醮告虔下土請命諸天伏惟大道垂慈至真鑒祐勅靈司而解災度厄流神貺而祛疾延生落死籙於陰曹定仙名於陽故傷誤殺寃債和寧新罪宿瑕元慈蕩滌誓期勵節永答道恩臣某不任臣粵自幼沖恭聞大道歸心斗極屬念元虛每有啟祈克蒙慈祐感靈休而罔極報鴻澤而無階今考卜吉辰以天德合直之日於玉局北帝之殿塑瑤樞中斗之尊兼以輔星列於八位狀虹蜺之彩服寫龍鶴之神姿列於大帝之前儼若中天之會輒備聞告爰命興功伏惟七聖降臨衆靈昭祐永垂響應長介福祥俾㣥心有禱祝之門品彙得依歸之路永虔香火以答至真不任稽首歸命之至伏聞陽靈表瑞火德承天分日域以繼明御離方而定位爰因夏歷以正歲功由是出入絳霄循環黃道應期不紊謫見無私雖懸象著明繫諸邦國而垂災介福亦及纎微臣叨荷元休蹈茲昌運立身潔已未階無過之場元命遊年實配五行之內竊披術歷方有照臨恐構災蒙伏增憂懼是敢精陳禮物虔備香燈上祝靈華仰希昭祐伏冀顯消災咎潛釋過尤錫以福祥賜其貞吉永勤丹懇上答元慈不任天地分靈三官定死生之格陰陽懸象九曜垂照燭之功北府繩違南宮延壽星躔嶽瀆考校無私凡在人寰皆歸統御臣自惟微薄獲奉元慈而履行之閒恐乖陰隲運心之內未合神明日遇災凶復兼愆咎或成厄會莫遂懺祈今年中宮則天符所臨身位乃土星對照大運猶居於劫殺飛旗又寄於行年三命五行恐逢刑剋列星五緯更慮照臨所以轗軻未寧災危頻作非憑至聖無路懺祈虔罄丹誠克申大醮伏惟上元衆聖俯降福祥消災咎於將來釋過尤於既往六曹司命增祿算於丹天七紀尊神介休禎於元極公私清泰家眷安寧即永荷衆聖宏濟之恩不任伏聞三光表瑞九曜凝暉配金木以司方四時攸敘定陰陽而立象萬彙生成主宰幽明統臨罪福臣自惟凡陋獲奉真靈懼履行之閒易成愆咎修持之道未契端真況職務所司重輕咸繫恐乖省慎更結罪尤雖夙夜在公敢忘恪勵而吉凶難測倍切兢憂兼以宿曜所臨輒罄懺祈之懇爰憑本命恭啟醮筵陳信幣以貢誠列香燈而展禮伏冀希夷至聖俯鑒丹心辰曜高尊曲流景貺赦罪尤於既往解厄運於未然寃債銷平凶衰除蕩更增祿算永賜禎祥眷屬乂安公私清泰誓勤修奉以答靈恩不任伏以太僕既分元精獨運陰陽肇化支干承基六十正神統四時而司晝夜八百符吏行凶吉而定死生大則天地邦家咸遵歷象小則災祥罪福必繫主張考龍胎石室之經披鳳篆琅函之要既明宗旨倍切依歸臣等仰賴神功獲逢道運塵機久閉俗網未祛行藏不合於儒元動息必貽於過咎又恐五行之內或有刑妨三命之中因逢否塞非憑至道難懺深瑕輒因六甲之辰五元之首同誠勵志瀝懇祈恩仰碧落以降真拂元壇而展禮伏冀洪休允洽照鑒無私咸賜吉祥永銷災厄青宮增祿丹延生存歿俱安公私並泰克勤精奉永答靈慈不任臣等宿值福緣獲逢道化至真垂教元旨宣行仰承覆祐之恩常切兢營之懇但慮行乖禮讓動履愆瑕處俗順時率成罪目積生今世罕有懺祈伏聞三天垂章醮之科正一著修禳之格敢因吉日同勵丹誠恭詣壇場虔申祝謝伏惟三官九府五帝高尊斗極真君命辰靈將錄其素懇降以鴻慈赦已往之過尤釋將來之災厄星曜息照臨之數行年除妨剋之凶年祿增延福祥繁會公私貞吉族屬安寧常期祐護之恩永誓焚修之志不任臣以仰披真訣虔按元經庚申為修奉之辰大帝降考讎之是日三尸陰魄標奏罪名巨細無遺纎微必紀始定籍於太元之府終寓書於泉曲之庭凡在修心實切憂戒冀因令序同懺深瑕輒備香羞恭申醮謝伏惟三尊憫護大帝鑒臨斥陰尸妄奏之文降大道好生之澤使臣等災消過滅善積福臻九元離寒夜之鄉五族獲安寧之祐所為貞吉立願亨通常傾修勵之心上答正真之貺不任
