front:
  text: 全唐文欽定全唐文卷二百九十九光庭字連城贈太尉行儉子早孤武后時隨母庫狄氏入宮甚見親待纍遷太常丞開元十七年拜中書侍郎同中書門下平章事尋拜侍中兼吏部尚書加宏文館學士二十七年加光祿大夫封正平男卒年五十八贈太師太常議諡曰克詔改諡忠獻
  hash: sha256:08f73224ca0c481fa7ca850e1ffdb447eb12abdd63514d6a4c55f6ad645e73c5
