body:
  text: 臣光庭等言臣聞惟天為大聖人合其德知微其神至人契其道德應者天錫其命道尊者帝受其名伏惟陛下克享天心誕承丕命仁育萬類道光四表功業見乎變禎符應乎時往者國步多艱克清內難皇天眷祐受命文宗允協聖謨肇修人紀不易日月再造乾坤此陛下之神武也若乃欽明上古允恭克讓綴學設教定禮創歷章施五采克諧八音緝熙之教成肅雍之德備此陛下之聖文也若郊祀天地文之經也敬事神祗文之德也柔遠能邇文之化也登封告成文之表也非大聖則不能合其典謨非至神則不能制其通變故功成者不可不表德至者不可不崇是以百辟禺望三靈乃眷將謂鴻名尚闕大典未敷臣等昧死上尊號為開元聖文神武皇帝陛下將以首出千古表正萬邦伏願守神器之至公違鳴謙之小節微名不可以深拒大典不可以固違則乃謂韶盡美矣又盡善也凡在含生不勝大慶臣等區區敢以固請臣光庭等言臣伏以聖德廣運神功莫大昭升于上敷聞在下是用稽古歷考元符敢備元名以光帝册陛下蒸蒸大孝翼翼小心沖讓推誠未允㣥請臣等愚蔽罔知所圖臣聞聖者與天地合其德日月齊其名智無不通物無不照其德合其名稱蓋聖人之總名非王者之私受昔周尊后稷推以配天所以美其聖矣及思齊文王人樂其德所以稱其聖矣及下武繼文能受其命亦稱其聖矣是以列聖相承受天之祐豈則前聖有紀而後聖無名陛下聖無不通神無不妙克受文命大定武功稽之於古則如彼考之於今則如此豈可鴻名大寶未有所崇蓋天授者不可違人欲者從其願伏乞暫回元鑒俯察丹誠使文德武功鬱為稱首朝聞其道夕死是甘區區以固請無任悚踴之至臣光庭等言臣等竊因輿頌上奉鴻名丹懇備陳元鑒猶邈是故退省方策進輸真誠伏惟陛下少回天恩則海內幸甚臣聞天下者列帝之公器聖號者先王之至名故業崇則器尊道在則名應理徵不假義與無私今天之祚唐重光纍聖天則有命聖可無名今若違而不居請而不允豈所謂畏天命以從人欲之旨哉伏惟聖以知時神以妙物文經造化武定邦家書云乃聖乃神乃武乃文光昭帝圖莫斯為大不稽古之明義豈在今之能名臣等虔率舊章奉將元命非敢虛美以咎其詞伏願上察天心下自人聽使百靈遂望萬古式瞻則朝聞其道夕死無恨臣等不勝懇迫之至頃以春季夏初微愆時澤雖無溥潤尚未為災臣等親承德音憂勤萬姓虔誠雲漢自結壇場有孚斯感不疾而速則有鶴鳥和鳴油雲沓起未崇朝而四溟飛灑不終夕而萬里滂沱生靈以之相慶草樹繇而自樂臣等幸參近侍親奉殊祥蹈躍之誠實百常品望宣付史館昨二十五日伏見高力士奉宣敕旨親於興慶池投龍祈雨伏以何言者天卑聽以平施惟微者聖旋感而降祥用能感孚響臻幽贊昭應聖德美利其至矣哉頃西郊微愆南畝不害遠自河陝巳聞沾洽近次咸秦頗未均被而聖情遷軫憂勞日昃降天步禱神池屑然肸蠁若有從助俯祈萬福之祐仰叩三靈之心言發而旋雲朝隮神通而甘露降澍人欣華黍之盛物覩由庚之樂不疾之速書契所未聞至誠之感皇王所不載霑休之慶曲成㣥物況在臣等切倍常情望宣付史館式彰昭感之美伏以深仁燭幽遠被無外至德感物矧茲有苗頃者奚壽斤放命不恭執訊來獻而陛下設誠不疑推致赤心歸於陬落襁負而至置之左右射御不違自非睿宗至誠被物何以驟改驕節卒為忠臣變鴟梟於鸞鳳登反側於仁壽求諸前古竹帛所不載稽諸近事耳目所未聞臣等豫覩休異輒敢書於史册臣聞聖人述作先宅天人之心次紀皇王之迹垂謨訓於萬代示褎貶於一方湯武道衰斯文將墜周公補其絶緒仲尼振其頽綱然後樂正雅頌懲惡勸善自獲麟已來代歷干祀班馬以紀傳黜凡例魏晉以篡殺為揖讓既撓亂前軌又聾瞽後代春秋之義非聖人誰能修之伏惟陛下闢四門修六典高視風雅發揮經術微臣末學待罪阿衡職兼宏文懼不勝任昔晉書文詞繁冗穿鑿多門太宗特紆宸衷親為刊削兼命儒學以成贊論書稱御製臣等不勝大願上自周敬下至有隨約周公舊規依仲尼新例修續春秋經具有褎貶伏望進御裁定指歸如先朝故事其傳請與館內直學士張琪李融等如左邱明受經敷暢聖意屬詞比事原始要終審逆順之端定君臣之敘繼周孔之絶迹闡文武之鴻休傳之無窮永為程式堯舜以揖讓而理湯武以干戈而興或勞神以苦形且役志而焦慮有生之類雖亦聞於小康無為之風故未臻於大道今陛下化成天下與道元同小其有為之迹宏此不言之教將以去華歸本削偽存真其為道德之鄉固在老莊之術遂命集賢院學士中書舍人陳希烈諫議大夫王迥質侍講學士宗正少卿康子元贊善大夫馮朝隱等於三殿侍講敷暢真文演襄城之七聖及姑山之四子理之於國惟清惟淨之風修之於身久視長生之道聖化元運寰瀛樂康咸日用而不知實曠代之未有臣忝職司望編入史策宣示天下伏見昨日一敕教示百僚爰及兆庶聖恩溥洽德澤如天亦既生成載加誨勗莫不遷善咸知向方臣忝在樞衡未有宏益忽承天獎曠若發蒙雖羲軒上皇堯舜至德無以加也天下幸甚望編入國史以示將來臣等伏見所司奏天下應死囚總二十四人竊以天下至廣宇內至衆豈惟德禮所齊固以幽贊潛治方將勒休述美非獨成康之時反朴歸淳幾若華胥之俗昔斷獄數百文景稱仁徵諸良史遠有慙德臣等竭心奉職徒效涓塵之微動色相趨預聞頌聲之作請宣付史館克昭盛烈西戎不識禮經心昧德義頻負盟約孤背國恩今則計窮求哀稽顙聖慈含育許其降和所請書隨事給與庶使漸陶聲教混一車書文軌大同斯可致也休烈雖見情偽變詐於是乎生而不知忠信節義於是乎在若虛元宗時人問朕聞武以保大定功刑以禁邪止殺軒轅三皇之聖莫能去兵陶唐五帝之聰時猶振旅故知體國經野宜有弔伐居安慮危可無預備朕纂承丕業虔守大寶因祖宗之既康恐文武之將墜兢兢戒懼翼翼憂勤而德教誕敷烽燧尚警三邊每勞於征伐百姓不歌於耕鑿言念于役深軫於懷所以日旰忘飧中宵輟寐思謀臣以制敵折衝於樽俎索名將以守邊降伏其戎寇行何法也得致斯人哉子等藏器待時呈才應命盡陳古今之事備詳攻守之策至時賢著述往彥勳庸兵法有五十三家宜分其四種漢臣有二十八將自比夫幾人景略可逮於孔明張遼得齊於關羽斛律光賀若弻近代之用誰優我李績與李靖先朝之光誰最又邛南一方之地磧西萬里之域將棄之以促境寧守之以勞人鎮涼州至於流沙軍隴坂至於積石險阻要害豫疑汝明秦中歲役於防冰若為釐革代北年疲於禦塞奚所變通薊門屯田何術以休其弊柳城梗澀何籌以繫其虜凡此邊廷今為重鎮何經何見何履何歷若兵不獲已用何奇謀貞我師旅使有征無戰必文可來之施何異政柔彼夷狄使懷惠畏威咸述爾能直言其事當有升壇之拜佇伸推轂之寵對臣沐清化忝紆黃綬屬陛下聽鼓鼙之音載懷將率恤邊鄙之聳思輯軍容臣竊歎三隅未寧為日久矣不以庸菲謬膺推薦恭承大問俯蹐玉陛咫尺天休以抒情素臣聞古先哲王鮮不征伐禁暴止亂咸以為人思患預防實為善政伏惟陛下允恭克讓虞守四表俊乂咸理以孚于人猶恤彼勤勞求茲政道實天下幸甚臣聞事適於務則理有成法宜於時則功可建是以廣採輿誦詢於芻言不以人廢言不以欲違衆故計濟事立利倍功大完軍保勝道泰人安雖三邊未清而百姓不弊臣聞或多難以啓其疆土或無難以喪其守宇天其啓此邊難以警陛下勤於政理以致和平因定荒亂之宜以為子孫之業也不然者豈聖明之時屢有斯寇今若以明視遠以聰聽德欽崇天意允釐庶績制以官刑警于有位愛敬立於親長始終協於家邦崇禮以致賢修德以來遠言合於道雖賤必行議乖於政雖貴必罰謀得其要必申衍之賞刑當其理不貽戮僕之愆則在庭之官足以致化臣聞燕昭立館以報強讎越踐自勤竟雪深恥景略用而秦道霸孔明起而蜀業成豈明明之朝不如區區之國其珠玉無足愛之必至賢良思用求之必來惟陛下知與不知用與不用苟得其任何憂制敵降戎而已哉必資聽之不濫擇之無失審甄其操履明試以言謀之以八徵求之以五聽穰苴進於晏子韓信用自蕭何是以君人勞於求才逸於任使舍人求勝臣以為難臣聞自古用兵成敗相半賢者得其大愚者得其小莫不同用於法焉至於戰勝攻取無出三事類文校義分為四種記之金策具於玉韜漢臣以之撥亂輔時上應列宿振威耀武咸得其才以臣之愚何以堪此然守終持滿竊仰鄧禹之能勍敵神謀頗懷馮異之略至隱若敵國思其奉上之故亦採於一善未致其全若景略比於孔明功當術淺張遼比於關羽壯劣情優斛律光著破虜之功賀若弻有平陳之績論其攻戰則可齊肩語其才雄此或先駕彼亡隋之任士內用寵戚外階朋黨忠言死於逆耳國命出於讒言政以賄易功以財成鴈門之圍兵士以微而不賞狼河之敗許公以親而不誅天下分崩人受塗炭是以李績與李靖為國家用因隋亡之臣致有周之業靖則克勝其任胸奴於是破亡績則能達其謀高麗以之終滅謀功比事績可同年以功取人靖以居上臣聞惇德允元柔遠能邇王者無外守在四夷張綱棄兵竟和南國充國不戰亦定西夷若李牧以居邊魏尚而為牧遠和邇鎮固障持邊遠和則不勞邇鎮則居逸是謂釋遠謀近逸而有終然後明其伍候守其交禮謹其走集誡以不虞足以輯和士庶羈縻夷狄何必棄南邛之戎捨磧西之地隳先朝之業致將來之誚焉蹙國挫威臣所不取臣又聞華夏者國之心腹邊陲者國之支體若心腹克盈則支體無害古既守之不損今禦之而何失古以之足今以之虛非古今有殊理實授非其任然東自榆林西至蒲海限之以亭塞隔之以山河啓玉關金微之險有臨洮墨離之厄飛狐白石爰在并汾木狹土門出於幽薊李靖距頡利於磧口終絶南侵李傑敗王師於榆關遂貽東難險阻不異成敗乃殊以是言之非才莫可今若漸收塞上之士申朝錯之謀安輯雲中之人曉嚴尢之術保以邑落守以城池求賢良以為守習農桑以為教敵至則收其積聚使野無所遺賊去則伺其虛危使兵不失利則秦川歲減於冬戍代北不懼於秋犯臣見薊門屯田降軍寇之乘攻守餘暇務耕耘之積省兩河之粟資三軍之費但使役之無擾何憂兵以致弊軍既未息此安可停臣聞取亂侮亡書之明義固險而守國之恆政若柳城之寇不虐於邊人鴻臚之賓未絶於來使則養士卒以待其衰也必若虐暴邊隅須申致寇之略如其毒痛於下方興問罪之師任之以智能申之以謀策明賞必罰教人以信山林水澤之陳識以權宜父子兄弟之軍赴湯蹈火然後揚兵耀武示之以威則師旅以貞夷狄柔服惠懷無戰其在於茲若但行以秋霜之嚴而無時雨之澤不計而動離怨在心驅以合敵貪以取敗既輕有生之命求幸白刃之中使天威挫衄者臣竊恨焉易曰差之毫釐繆以千里此之謂也臣以不才展效州郡每懷報國屢上微言神龍二年進狀論沙場喪敗開元四載投匭言降戶得失鑾駕西幸又於河中府上表并進柔遠論一首而才微理拙不蒙顧問制問曰何經何歷敢不盡言臣識淺才微罔知攸據至若升壇之拜推轂之寵豈可一策所能及愚臣暗昧不足以當之俯伏惶恐若履冰谷謹對庭琦開元時官雅州司戶士惟各業法貴師古苟暌厥道蓋速其尢甲也黔人頗遊元藝門庭之中駕小樓而對月星象之下縱微管以窺天懸究昭回遠探雲物傳諸子弟頗覿前修授以家僮未詳其可雖有詞於候業亦難免於刑典更資研問方寬糾繩嘉貞字嘉貞蒲州猗氏人應五經舉拜平鄉尉坐事免歸長安中以採訪使張循憲薦則天召見擢拜監察御史歷梁秦二州都督開元八年拜中書侍郎同中書門下平章事遷中書令纍封河東侯十七年卒年六十四贈益州大都督諡曰恭肅空之為象也本乎天水之為德也本乎泉上善之人方其性貞化之客愛其元清虛而隱性含受而無偏因高下而臨照故能共於澄鮮誠大明而盡善實和光如可憐爾其皎潔清泚空色懸於水底分明昭曠水光積於空上玲玲瓏瓏晶晶液液託九霄如染翠徹千里而含碧微風共息含晴影而湛然兩日俱生弔長輝而相射表裏如一容象難尋涵泳遊鱗若回陵而上出聯翩度鳥疑戲沙之下沉為當物將類於回覆為是人自惑於窺臨竟未能縷列於疑似分別於空水元之又元美之逾美利濟者水涵虛者鏡懷朗鑑遇物無心處下流通而不競對清流則泛濫長遊開寶匣則蟠螭孤映汾澮所及泯衆惡而無私銓衡不遺鑒㣥才而必正清汋其味堅貞其質六氣咸用彼得於終亨五材不人心乃取其初吉深則不竭貞能象物浮錦纜而花生映瑤臺而月出若然者體不自有故受之於金功不自居乃推之於坎昭昭神遇必盡其妍蚩泛泛隨流豈懷於舒慘清必見底明恆照膽壅之則止寧有謝於屯蒙用之則行竟無情於窺鑒臨萬象而皆見總百川而俱會隱瑞鵲於光中泛靈查於天外混之不濁含靜質而終潔覆之則昏用明道而若昧功雖一致理或殊調乘桴浮海從我者豈測其深賦蒙求徵無欲者以觀其妙納晴天而兩日交麗因紅粉而雙容俱笑既不憚於惠風亦何疲於屢照加以向日冰靜澄流玉潔聲名未著覽鶴髮而魂驚功業後時仰龍門而心絶幸君子之惠鑒庶流同而派別昔者天子聽政於上瞍賦矇誦百工諫庶人謗而後天子斟酌焉今反坐此輩是塞言者之路則天下之事無由上達特望免此罪以廣謗誦之道吾忝歷官榮曾任國相未死之際豈憂飢餒若負譴責雖富田莊亦無用也比見朝士廣占良田及身沒後皆為無賴子弟作酒色之資甚無謂也趙郡洨河石橋隋匠李春之迹也製造奇特人不知其所以為試觀乎用石之妙楞平砧鬬方版促郁緘一作鏚穹隆崇豁然無楹吁可怪也又詳乎義插駢坒磨礱緻密甃百象一仍糊灰璺腰纖鐵一作纖全蹙兩涯嵌四穴蓋以殺怒水之蕩突雖懷山而固護焉非夫深智遠慮莫能創是其欄檻華一作蓽柱鎚斫龍獸之狀蟠繞拏踞睢盱翕欻若飛若動又足畏乎夫通濟利涉三才一致故辰象昭回天河臨乎析木鬼神幽助海石到乎扶桑亦有停杯一作林渡河羽毛填塞引弓擊水鱗甲攢會者徒聞于耳不覯于目目所覯者工所難者比於是者莫之與京諸侯為邦雍也可使道在於政政期於理用刑者何居敬則巳況禮況德聞之夫子有國者殷薦於天地望秩於山川故災沴不生矣有家者嚴敬於鬼神克諧於禮樂故休祜斯應矣由是上下交泰幽明相叶五精同朗辰為水其味醎五鎮俱清恆為冬其音羽大哉茲嶽殊於衆山嵩華乃局乎近甸衡泰不踰乎方域孰與夫包括綿長經綸中外外夷有四昴宿主胡則延袤以限之中郡有五寶符在代則高襄以臨之其頂也上扶乾門黑帝之宮觀其足也下捺坤軸元神之都府豈止劈冀魏截幽燕拒洪河撑大海澒洞合沓半天下之襟帶嵳峩巉嵓一宇內之標格者也故知惟土有精惟山有靈窅窅冥冥其道至平其德至貞氤氳馨馨目之不覩夫形耳之不聞夫聲陰陽不測夫奧所以存像設建祠庭矣稽彼上古洎於中運五載巡狩百神懷柔皇王令典以之叶祚數昌期以之永降臻嬴秦爰逮周隨匪修匪虔或替或僭不勤於省者其政缺非美而封者其事訛嗚呼黷祭虛陳昭靈罔答更張禮秩固待雍熙粵若我唐正百王頽教恭惟我后揚五聖丕烈人神允浹動植和暢乃藉北鎮柴南壇碑西嶽泥東岱是用告厥功祗其祠也故穰穰介福獲於彼喁喁衆心徯於此而今玁狁不熾已萬餘辰邊隅於是乎靜雨雪其滂乃屢盈尺稼穡於是乎豐豐以阜人靜以安俗俗安而人阜君睿而神聰惟神幽贊巳成惟君能事斯畢北巡之禮胥詠其蘇雖黝輅纁旗未由冬覲而圓圭方璧每自天來或事舉必祈福行宜賽則有公卿而奉新一作告命也或四時薦熟三獻酌洗則有侯牧而率舊一作新章也非夫昭信雅直豈常享於明代哉是以河朔人風潔誠而禱蠶穀者衆矣春終秋孟冬首三之月尢劇蘋藻自羞若從官斂樵蘇不禁孰敢私伐蓋威靈感通以致耳與其淫諂而求者異乎夫道莫先乎貞政莫先乎淳參造化以成萬物莫先乎神資帝王以富四海莫先乎人護神莫先乎君公理人莫先乎師長景寅歲乃命菲才謬兼軍郡欽若明詔持兵導俗無敢懈怠名山大川著乎典式靡不加敬於昭神寢於嶽之陽伊嶽致神惟神主嶽高柯古幹幽蔚陰翳俯仰瞻對精魂肅恭栗然何為故以嗟嘆嗟嘆之不足於是詠歌歌以發言言以彰德事可追於風雅詞無隱於聞見神而聽之頌斯作曰五宿熒煌風政休咎上經乎乾綱我君順之祚乃久兮五宗盤薄陰化成敗下彰乎坤絡我君欽之福乃介兮天平地成神道助貞人事以寧兮皇極帝力神道助直人事以息兮禎祥日新既祠既禋國萬斯春兮風雨時若是耕是穫家勤於作兮至諴通兮昭冥協和至道默兮對揚頌歌大恆如礪明德惟峩夫緝懿德以升榮必凝範於金册總徽圖而闡化亦昭茂於丹青將以矯弊翻訛匡風正物求諸曩烈良宰況乎辰樞委曜載誕宗英屈市立之重就烹鮮之任而能立心政術克著清猷吞賈鄭於胸懷顧周韓於掌握信可以騰芬琬炎垂範將來者焉君諱懷仁字即闕隴西狄道人代祖元皇帝曾孫太宗文皇帝之族子也自黃軒御歷元帝垂時竦瓊構於綿代渙瑤原於遙祀月魄凝祥庭堅之德斯邁星精委貺伯陽之道攸高靈變所鍾神功乃暢撫㣥材而贊統允叶龍圖敦九族以垂風載光麟趾華宗景胄可得稱乎亡祖湛北宮之德雖厚西嶚之老不借父義持節丹松商恆四州長史使持節都督丹州松州商州恆州等州諸軍事恆州刺史徵拜宗正卿轉左驍衛大將軍上柱國隴西郡公英姿鳳峙逸概鴻騫行不恆物言必以信出總六條入參九棘戎機斯要載奉鉤陳忠肅之誠見稱循警君商岑薦祉渭川澄祜稟靈和之氣挺韶茂之姿始自褓辰已見克岐之美逮乎丱日更標通理之稱蓋亦猶同山之羽光彰五色渥水之駒早聞千里豐池孕寶紫氣遙浮楚岫銜珍白虹孤映若乃韞器清朗植性溫嚴磨而弗磷撓而不濁忠孝之道無待伈成仁義之方率由斯至雖聯華帝室育質景門而乃謙恭肅慮若在冰谷不宣驕而傲物豈恃貴以誇時言則循憲動必由禮幼而聰敏備覽㣥籍偃書林而斂實潄詞河而吐潤貞觀元年承隱太子為息其後降封陳留縣開國公食邑一千戶錫社分茅乃遵周册誓河疏邑爰依漢典爵窮上等名貫通侯發以聲明紀之文物朝廷以今之長吏古之諸侯任總一同寄深百里況全趙之地是曰大邦鳴絃軌俗實資良彥永徽元年以宗室子弟敕授朝議郎行癭陶縣令晉稱楊國魏曰癭遙近控槐川旁通寖水封城舊址即帶常山歷郡故基還分巨鹿趙肅王之子美化猶傳廣川國之裔清規未遠君乘輕涖境經餉升職宏製錦之術取棼絲之義不言而教道德齊禮法令為師勝殘去殺而以為政之本學校居先阜俗之原耕桑是務於是敦勵鄉黨黌孰俱開課租農時田疇盡闢子襟之侶遠同洙泗歲取之積近辟京坻至於棄業遊手探丸之客剝鼓之酋咸仰仁明變其澆悍市無竊盜路多懸寶鳴桴既靜犴獄恆空彈絃跕屣之家復遵貞道剽奪椎埋之豎更同醇懿若夫孤老疾恙惸嫠窮竭煙火不舉資費靡依親勸富豪均為周贍衣食畢繼咸無凍餒徭賦賙恤斷自經懷揣其輕重量其遠邇牽而弗擾勞而靡怨而以士女攸居郛邑為重商旅所湊闤闠斯切而地惟鹵溼垣巷多毀農事之餘漸勸營構修衢矢直列肆星羅崇墉掩藹飛甍隱耀通渠亘陌長隄叢陰百姓相歡靡弗稱賴亦猶齎茅荷竹無煩堂邑之闕二字下闕疏原有濟榮陽之俗闕阿之功既峻無闕之政為優較而言焉我亦奚愧界內有狸乳鼠麥秀闕歧暴獸成狸徒彰昔美兩歧興瑞空結前謠未有乳字之奇牟㯋之異超今絶古掩牒韜圖雖天降休祥本符昌歷然産於縣境良由善政不有聖朝孰任明宰不有嘉應何表能官豈若祥靡變質獨紀瑕邱之化禎禾擢秀空顯中牟之德逮於今茲彼固非美合縣道俗等道存名教情據典律咸棲幕府並浴儒津以為盛德必彰既形之於舞詠徽風載洽亦播之於絃管言武城之小善尚著歌謠董須昌之微功猶勘碑頌況我君英規允暢惠化旁流道軼翁卿仁迹涉闕焉可使丹書靡紀翠碣無聞者乎
