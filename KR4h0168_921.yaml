front:
  text: 全唐文欽定全唐文卷九百二十一雲真天祐時上京右衛文章大德本街修撰掌內道場詞疏沙門
  hash: sha256:d9278f976fcc95aa1a6f23d0309a0a8198c1242c79a041451ccce94b017d7a63
  markers:
  - {type: head, offset: 14, content: 雲真, id: KR4h0168_NFKB_921-h1, level: 1}
body:
  text: 湛湛佛身不離三界明明經卷只在一塵剖一塵而經卷舒豈俟於貝多葉上了三界而佛身現寧居於娑婆樹間楚金範以非真海墨書而莫盡是曰恭敬是曰受持不虧不崩無喪無得四魔以之恐懼二乘以之震驚然後從智起悲回真入俗於圓常路開方便門導彼出生死之源令其踐聖賢之轍就泯相而示相向絶言而演言報化於是乎垂形漸頓於是乎立教忉利未下優填遂琢於旃檀俱尸已滅迦葉乃集於妬露金容螺髻瞻之者萬福攸同玉軸琅函聞之者百祿是總津梁六趣耳目㣥生天上人間何莫由斯者矣廬山者影搖匯澤根蘸湓江既曰洞天亦稱德鎮名花吐其錦繡幽鳥嗚其笙簧雨過長空積翠出數州之外春來平陸凝烟當萬戶之前西林寺者曇現訪落已來惠永經綸之後陶範光祿為檀越於晉朝歐陽率更撰豐碑於隋代年既綿邈事亦周詳水閣院者即貞元間齊朗律師之所居也朗師精通律部宏護法門屢陟香壇廣度緇侶江西佛法於焉而昌天下鴻名於焉而振逮乎皇唐再造上德中興真風頽而復揚慧日昏而更曉斯院藏經即褒國孝定公奉烈祖元宗之仙駕答今上之睿恩捨其俸金之所造也爰是鯉飛東海馬化南朝鬱為帝宗兼開相府器度高邈識量宏深孝以承家忠以奉上闔門雍睦棣萼和諧然而諦信佛乘歸依法寶雖廣陽輔魏竟陵佐齊無以尚之念斯院也每萃真徒猶虧海藏藏之弊者以其行之密宇之小施之忙工之攘所致矣我則加其墨增其紙偉其軸恢其函俾眉壽之僧臘高之士或雨昏憑几雪夜臨燈無眇視之艱哉孝定公於是親灑神毫遍題經目結因緣事表殷重心緗袠己周錦絛告僝追二聖在天之駕祝吾皇無疆之休慶讚云畢不幸孝定公薨當不渝之時自書遺誡囑纍是經矣保定縣公安吉縣公情切友于心存求矣欲資冥祐兼助良緣由斯建其藏殿矣市徂徠松度豫章木般輸獻藝離朱督繩獸拏綺錢花分藻井熒熒列宿夜逼璇題潺潺繫湍秋和金鐸凡行宮之內藏藏心之佛像供養什物靡不畢備兼置真堂迎孝定公真容於其西序耳亦既見止忽驚魏邴貞姿望之儼然似得劉雷高趣斯院即上京右街演教大師為他年肥遁之所經藏將畢亦命而尸之夫報天倫之義懷陟岡之情結勝事於名藍樹良因於寶藏使其覽之者因指見月自教明心此之為福福亦大矣此之為報報無加焉何止薦香魂於安養之都助真識於歡喜之地故賈瓊問恕文中子曰為人之弟者以其兄之心推而達於天下斯可矣二縣公其恕乎雲真才愧披文詞非尚寶叨蒙英顧令紀芳猷輒率愚懷謹為銘曰佛即三界經在上塵一塵經卷三界佛身悟則無上剖則正真不垢不淨無我無人般若觀空區和涉有為象王回類獅子吼八藏流通三葉傳授詮以真心生從佛口峩峩廬阜鬱鬱西林惠永遁蹟齊朗修心水擊清響松偃繁陰香燈熠耀臺殿嶔岑懿哉定公建斯經藏字粗軸偉邪恢函壯齯齒之僧龎眉之相披閲研精實為現量定公薨矣疇薦重泉怡怡情切綽綽心專架樹紺殿成就元詮惟二縣公畢此良緣日映綺窗雲凝繡闥楶梲穹隆欒櫨轇轕勝果克臻福田彌濶用薦貞魂永歸解脫齊已名得生俗姓胡氏潭州益陽人出家大溈山同慶寺復住衡嶽東林寺荊南高從誨迎置龍興寺署為僧正自號衡嶽沙門卒於豫章西山金鼓寺著有白蓮集十卷粥名良藥佛所贊揚義冠三檀功標十利更祈英哲各遂願心既備清晨永資白業五老東西有淩雲峯巉崒聳峭上插空碧下吞江湖飛湍激瀨連接絶壑孰究其本古老相傳曰昭德源也中有秦公遍扣南宗既決心要周由聖蹟過於山前倚錫而望疑為棲宴之場俄有一叟自源而出乃問曰君不當此山之主乎叟曰斯國家名山某王者百姓然樵於上耕於下取諸利輸諸官爾師曰豫欲廬於其間可乎叟曰天下大嶽大川唯釋氏廟之元元祠之固亦多矣士有抱浩然之氣韞清淨之德渾於麋鹿狎於禽猿絶聖廾智大忘世間何有不可哉師曰豫雖匪其人竊慕久矣叟於是引師躡屩擁錫撥草而進則左眄右視怡然莞爾謂其叟曰豫其終焉於斯矣時則芟蕪伐莽夷石疏泉初自一邱一庵一榻一席韜光味道影不出谷纍積嵗時野俗相響始覺鳥徑漸通人烟雲遊上流來往或擁避之不可復廣其堂隱之既難乃居其額則天祐五年前使隴西公所給用旌其名况乎樹植芳貞掩映巖岫梨橘既實松柳欲偃所謂荊棘殞而珍卉華蕭艾除而忍草茂矧夫處如是之方作如是之事又安可堅守自得之趣無有利他之望哉豫歷於二林達於幽致耳飫天籟神融山光忘歸之心邈矣塵外因詢其始乃見諸末遂命筆硯不俟請而紀之日光化己未嵗迄於天祐丁丑年一十八載矣貫休字德隱俗姓姜氏婺州蘭溪人七嵗投本邑和安寺圓貞禪師出家乾寧初獻詩吳越武肅王復北謁荊帥成汭後忤汭黜出黔中再遊荊南高季昌館之龍興寺天復中入成都王建留住東禪院署號禪月大師尋建龍華道場令居之纍加龍樓待詔明因辨果功德大師翔麟殿引駕內供奉經律論道門選練教授三教元逸大師守兩川僧籙大師賜紫大沙門梁乾化二年卒年八十一有叟有叟居嶽之室忽振金湯下彼巉崒聞蜀風景地寧得一富人侯王旦奭摩詰龍顏日角紫氣盤屈揭日月行符湯武出天步孔艱橫流犯蹕穆穆蜀俗整整師律髯髮垂雪忠貞貫日四裔蘇活萬里豐謐無雨不膏有露皆滴有叟有叟無實行實一瓶一衲既朴且質幸蒙顧盼詞緩思鬱軒鏡光中願如善吉金冊昭昭列聖孤標仲尼有言巍巍帝堯承天眷命罔厥矜驕四德炎炎階蓂不凋永孚於休垂衣飄颻吾皇則之小心翼翼秉陽亭毒不遑暇食土階苔緑茅茨雪滴君既天賦相亦天錫德輈金鏡以聖繼聖漢高將將太宗兵柄吾皇則之日新德盛朽索六馬罔墜厥命熙熙蕭蕭塊潤風調舞擎于羽囿入芻蕘既玉其葉亦金其枝葉葉枝枝百王允釐享國如堯不疑不疑高高歷山有黍有粟皇皇大舜合堯元德五典克從四門伊穆大道將行天下為公臨下有赫選賢用能吾皇則之無斁無逸綏厥品彙光光得一千幅臨頂十在隨蹕大哉大同為光為龍吾皇則之聖謨隆隆納隍孜孜孜孜切切六宗是禋五瑞斯列排麟環鳳披香立雪四方納賮九圍有截昔救世師降生竺乾壽春亦然萬年萬年愚嘗覽白太保所作續崔子玉坐右銘一首其詞旨乃典乃文再懇再切實可警策未悟貽厥將來又見姚崇卞蘭張說李雍皆有斯文尢為奧妙其於東勗婉娩乃千古之鑒戒資腴矣愚竊愛其文惟恨世人不能行之十得其二一日抽毫遂作續白氏之續命曰續姚梁公坐右銘一首雖文經理緯不逮於㣥公而亦可書於屋壁云善為爾諸身行為爾性命禍福必可轉真慤言前定見人之得如已之得則美無不克見人之失如己之失是亨貞吉反此之徒天鬼必誅福先禍始好殺滅絶不得不止守嫌寡欲善善惡惡不得不作無見貴熱諂走蹩躠無輕賤微上下相依古聖著書矻矻孳孳忠孝信行越食愈衣生天地間未或非假身危彩虹景速奔馬胡不自強將升玉堂胡為自墜言虛行僞豔殃爾壽須戒酒腐爾腸須畏厲志須至撲滿必破非莫非於飾非過莫過於文過及物陰功子孫必封無恃文學是司奇薄患隨不忍害逐無足一此一彼諧宮合徵親仁下問立節求己惡木之陰匪陰盜泉之水匪水世孚草草能生幾幾直須如冰如玉種桃種李嫉人之惡酬恩報義忽己之慢成人之美母擔虛譽無背至理恬和遜暢沖融終始天人之行盡此而已丁寧丁寧戴髮含齒虛受嘉禾禦兒人咸通中充左街鑒義廣明中住大善寺後唐同光初住京左街敬愛寺賜紫三年卒夫真如不變假澄湛以彰名俗諦有遷因去來而立號考真俗而雖異詢性相而何殊是知生滅之途古今恆式若夫性本神咨道唯天與者即嵩山少林寺故鈞大德之謂也大德法諱行鈞俗姓閻氏鄭州陽武人也始自髫齔便鄙喧譁年十有四捐俗慕法依止嵩山會善寺西塔院法華禪師為和尚執持瓶舄旦暮焚修誦法華經勵堅固志三度寒暑一部終畢其師深器之遂與落髮逮年滿受具於本寺琉璃壇自後遊講肆習毗尼屢易炎凉矣然志在諷誦蓮經六千部遂卜居石城山檀越信士欽承道德崇重行藏於廣明庚子嵗請住少林寺乃曰末法住持無先像設由是召募有緣葺修大殿首尾三載締構悉成而遇釋門澄汰遂從毀廢後值再開佛法重勵身心復立殿堂兼塑佛事矧以一自住寺罔輟諷經供養衆僧星霜四紀興慈拯物臨壇度人戒德馨香道風遐敻士庶寫葵藿之敬僧尼傾歸仰之心能事既周化緣又畢於同光三年七月草日示滅春秋七十八僧臘五十九本寺門人等依西國法茶毗之薪盡火滅收其灰骨起塔於寺之東北隅禮也落髮弟子宏省不遠百里命余敘其懿行辭避不已乃作銘云真如不變兮世諦推遷迷滯流轉兮達悟幽元釋宗碩德兮幼慕金仙住持嵩嶽兮載誕圃田兩修佛殿兮不移乎地長諷蓮經兮如一其志供僧臨壇兮聲譽遠被化終示滅兮今昔同致崇寶塔兮寺之隅播芳塵兮期罔墜桂琛俗姓李氏常山人幼投本郡萬嵗寺依無相大師出家後住漳州龍溪羅漢院後唐天成三年卒年六十二清泰二年諡真應禪師至道淵曠勿以言宣言宣非指孰云有是觸處皆渠豈喻真虛真虛設辨如鏡中現有無雖彰在處無傷無傷無在何拘何閡不假功成將何法爾法爾不爾俱為脣齒若以斯陳埋沒宗旨宗非意陳無以見聞見聞不脫如水中月於此不明翻為剩法一法有形翳汝眼睛眼睛不明世界崢嶸我宗奇特當陽顯赫佛及衆生皆承恩力不在低頭思量難得拶破面門闕一字覆乾坤快須薦取脫去根塵其如不曉謾說而今道清後唐天成中沙門原夫佛理志大意微有德而風靡三皇無位而匡乎八表化跡隱顯利用投機闕四十二字宣戒善日用日新道證無生不的不莫有相不憚於理執空恐滯於魔昔在千人志居中闕二字敬闕三十五字也生知罪福闕二字猛列出家志氣異於常徒頓捨親孤然山峪暑風寒雪已辨春秋葉落花生方知冬夏緣闕三十一字東魏黃初三年高歡帝所造也又雜集異記云魏時有大乘僧不知生族諸天降食以供其齊忽夜夢二豎憑闕二十二字俗服於山石邊有大椆樹本堅枝密其僧將法衣往樹欲挂其樹忽爾開而隹云之儼然掩合神力彌縫乃婚媾長於二子後一十二年却至樹邊樹開而闕十四字有虎鬬菴前師乃以手約杖驅而皆弭伏後之人因其樹號椆禪師之寺焉又改為定晉禪院禪室山巖唯高唯邃龍池虎穴左之右之上至天宮下窮於地獄乃為師之闕二字道清以考此凡志求闕二字蹤揆度古基特興蓋造從大唐同光元年嵗次癸未七月起功至天成元年嵗次丙戌九月院成法堂僧堂廚庫闕一字屋竝在巖巒之下禪棚石室佛經闕一字像安於峭壁之中木秀山巍顜闕四字禽闕一字獸畔成㣥洞闕一字祥風泉源細水花芳豔翠香逐雲濃散雨龍寒飛霜石冷幽間異境大聖所居古跡金田遂重修葺昔日禪定石室一所闕一字塞無蹤忽然自開收得道具數件乃是椆禪闕一字僧所用之物也有單梯一條鄰高百闕一字倚於巖下莫知年載有坐禪棚一所出於峻壁之中下去地一十五丈於同光三年九月十闕一字特然修換材木皆新棚上有阿彌陀佛一尊聖僧一座倚子一隻蓋一頂道清覩此聖事乃全枯意馬苦楚心猿又罄勤忠焚香發願別化千人之邑同修一劫之緣蓋造高樓安排佛像茲願已集碑紀微功所住山中素無青石求之莫有於天成二年嵗次丁亥七月二日有二龍鬬於寺前峪內雷訇電曜水溢溝穿現出青石一條長一丈七尺琢之如珉磨之瑩然龜頭贔尸貝皆獲足矣建茲福事際會明朝立闕一字之功上歸皇化君聖臣賢之代民康鼓腹之年牧藪歌而樂乎哉風雨時而禮何有三郡潛龍之地九州一統之時帝慕堯風皇宗舜海金枝黃鉞掌巨鏕之山河帝子親王秉邢臺之旌節闕二字樂業豐稔田疇民義於君君賢於德罰忠勸善刑法無差舉直退私人滋壽富皇天后土翼助山河湮毀困窮皆霑霈澤浩浩九圍之道民無德而稱焉滔滔六合闕二字禹吾無間然矣滏陽西面古跡重興雲嶺巖前金園再建巍峩突矹插霄漢以廷廷聳峻崚嶒掩蓮宮之鬱鬱椆禪解鬬之虎窠穴仍多賢良造化之基器用不少凡施功力暗叶神聰永彼元規如蒙聖助無私善事衆慕如歸利物深緣易為成就千門萬戶自捨家財伐木窮山人心不憚有邑首都維那三人次維那十人悟身若幻生務生闕一字其構良因耳相勉導逐處鄉邑次立維那舉其萬法之門結會千人之數各有名氏鏤之碑餘基我邦家垂諸善則鄉闕一字稟命動靜咸宜化召信心從風集事繼千佛之大行踵百福之遐功克荷僧徒捐情聖業筠篁志氣山嶽心田重義輕金守公奉法嵗寒如一運順始終建碑勒名以彰成事邑主沙門闕三字心化利上報皇恩録彼聖蹤請敘文也沙門宗仁僧門無藝儒教荒疏自度鉛刀難鐫寶玉豈將瓦礫連布瓊瑤頻垂雅命堅令撰修兌之既難實録前志後之闕四字所冀殊禎絶瑞萬代長存巨福良因千年不泯更顯前事章句頌焉日月遞照乾覆坤維四時列序萬象咸宜去彼取此昭德塞違天地之心聖人則闕五字一東魏仁君一匡天下八表咸賓椆禪是敬悟法情欣金田創造寶輦勤勤二化緣有盡聖道多門或隱或顯有法有存留真設像資福濟闕五字福利後闕一字三一僧堅操二利俱陳深山守道古寺求真心猿息慮苦節於身巖巒作伴虎豹為鄰四三業障重六賊為親勤修十善遠劫良闕六字出沈輪巨善邑會日用日新五守澄陝州夏縣景福寺沙門晉乾祐中充左街講論大德竊以理智凝然真空清淨三常妙用十號圓明點惠燭於昏衢起慈心於苦海冤親暜攝凡聖齊收五乘既貫於㣥生三藏統包於教理宏張覺路大啓元門金文演解脫之音王偈讚無為之法人天共仰道俗同遵咸知生死之源頗喻無為之本即我和尚俗姓師琅琊氏生丱角出家三十成道夏縣人和尚道高安遠德邁琳生為檀越之福田作如來之法眼深達了義久議菩提自然變易之身曠劫起凡之德同塵不染悲濟有情現大神通無妨自在山中採木風雨送來寺內看經龍神護助崢嶸鹿苑巍峩鷲峯一方之瑞色長新四野之風光景麗名聞寰宇譽滿帝鄉去闕一字德二年十二月二日示滅其時也祥雲貫日天樂橫空異香遍於蓮宮甘露盈於衆木靈禽噪樹異獸啼嵒悲風飄凡聖之衣血淚灑人天之目盡歎無生無滅皆嗟有去有來門徒弟子哀慟難攀如喪考妣空深嵗月幾歷星霜寶塔隳殘無人再葺比邱志德出家當寺學業諸方持念法華法聽習中觀論覩師遺跡遂發志誠勸化㣥賢重興祖塔一言道合盡自回心擺脫塵機同親盛事捨財而三事體空施物而三輪清淨非上智無以發深誠非哲人無以崇斯善日月昏而再朗林巒變而常榮可以添川鏡之殊祥可以壯法門之嘉瑞平觀禹國坐眺鹽池千株之寒柏侵雲萬嶺之嵐峯挂月幾多英信歸心玉石之堅數縣良能懇意給孤之行殊因告滿郢伎休工冀靈聖之照明願神祇之鑒祐况守澄也謬為釋子深昧儒功因間暇於禪關偶苦心於營牖披書積學雖無閲市之名揣拙成文粗有奪袍之志今則既成懇闕一字難議堅辭遂罄荒蕪聊為記述誠有慙於漏落實無備於徽猷乃敘銘曰先師聖德神通自然迥超三界而出四禪慈悲願廣覆廕鄉川恆為燈燭永作舟船重修寶塔勢聳雲烟如山不動似海深囦恩霑沙界福利人天遐邇歸依萬嵗千年契撫南唐乾德時沙門夫以星池布彩扶烈宿於元穹鸖樹收光運真風於像教遠則摩騰入漢近乃達摩來梁傳三乘一性之宗古今恆爾指見智無生之忍人我自除所以佛依法住法假人宏道本無心即心悟道未證斯理體解如然喧寂之居故非常得依王水土事佛瓶盂設戒防身藏名遠惡剋修三界不止六塵禀奉四儀方歸八正其本業寺者梁天鑒九年有釋淨闕一字捨宅為寺纍代廢興石像既存鄉人崇信凡經亢潦衆聚祈求唯奉八方而事家實遵堯而慕舜其民戚戚其化堂堂既偶主上垂衣寰中舉首山河秀實日月光輪遐邇奔趨車航輻凑三教齊興於聖代一乘別紀於明朝非頻婆王而再出如何非須達多而重生弗闕一字於保大五年有上元縣近寺衆多檀信闕一字義開寧兩鄉周俊周裼等雲集闕一字八方方奏請開善寺僧令安歸寺整葺焚修蒙先元宗皇帝御批奉功德使齊王旨承省司給牒重賜開基再修此寺江月沈而猶出塞雁去而還來唯酬帝祚之恩永感乘時之德爾後召募四方檀信共創伽藍紺殿光鮮晨夜之香燈馥郁青龍迤邐寒暄之芳翠聯環寺主安上人俗姓闕一字當門人事開善出家順義六年武皇戒品習筵經論罷好虛閒擬易高蹤應來衆議闕一字居名跡獨質劬勞執火拾薪猶希弟子有上足門人道新道升道通道暹道圓等相次出家闕一字承旨訓如子奉親及至經業該通升元受具甘露之香壇灌頂如來之戒制持心戴日銜恩闕一字山捧國師資之義恭效無疲侍膳之心始終曷已次教化造得正堂廚庫其有廊屋僧堂必闕一字圓就良時已偶星宇重興東接文園昔是儲君之主西連蔣嶠今茲蕭帝之蹤幾百年而闕梵泠音流傳佛事一千載之龍圖闡化暜遍新皇恩願戈鋋無討伐之心願稼穡有豐登之序九功樂業三界同安長開十善之門共續五天之教金言可顯磐石恆堅名籍有圖遺蹤莫朽年移事往紀德難勝繼踵宏揚刻鐫銘石謹記時唐乾德五年嵗次丁卯七月十九日建白西江陰人南唐時沙門大唐都省江陰縣重光院保大三年嵗次乙巳六月十八日銘云物匡大信世指何立九乳樓鏗三乘雲集妙利斯啓餘功罔及光澤有唐良緣永襲彙征善詩文吳越忠懿王命為僧正賜號光文大師著有詩文集七卷夫立幢之垂範乃造塔之濫觴刊梓刻檀嫌其易朽鏤金鐫碧慮以難藏不若挺叱羊射武之貞姿編貫玉聯珠之梵語可大可久如山如河尊勝陀羅尼者花藏貞心竺乾祕語濟善住七生之苦道闡欲天感文殊一現之恩教傳漢地舟橫業海車指迷津息肩惡道之間提耳昏衢之內拯湮淪於歷劫延短折於浮生備載靈編久彰神應或置麗譙之內或安窣堵之中或勒在幢間或表之山上風觸而輕塵及物尚落罪花日臨而清影到身猶凋業蔓克行盛事綽有善人佛弟子吳保容吳鐔雙驥標奇二龍竝轡塤箎合韻跗萼聯芳耨情田而畢使豐登澄心水而無令混濁與會首謂衆人曰給孤長者之園苑香山居士之林泉可以同搆善門寄茲寶地獨營則其力不逮衆辦則厥功易成遍覓信人獲錢卅萬購之貞石命彼良工鏨勒精奇磨礲細麗蓮花捧日雲葉盤空層層異狀奇形宛如飛動面面真軀聖相忽謂經行仰窺鶴表以爭高側視雁層而競巧固可利霑家國福贊君親凡施資財皆列名氏承有為之善力至無作之真歸其次滯魄孤魂銜寃負纍應念而皆期解網有心而悉使登車雖引善以及人終獲報以豫己命豫序述式紀嵗時染逸少之鹿毛摛子雲之蟲篆文質包羞於君子辭華有靦於外孫且曰昔也鐵塔傳芳聞諸河朔今也石幢蕆事見之浙陽彼則受福於人寰此則譬心於佛道以今况古一何遼哉時乙未嵗冬十二月壬寅朔十一日記二幢同供使衙書寶幢手殷承訓左幢書幢記僧儀月右幢吳越國王造末行題五大字竝正書
