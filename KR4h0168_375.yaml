body:
  text: 臣某言臣聞理定制禮功成作樂古先哲王不易之典伏惟寶應元聖文武皇帝陛下纘堯立極繼武承天神授五兵聖包七德頃歲自王邸登將壇祗奉廟謀龔行天罰卷舒龍豹指麾而復洽陰陽誅翦鯨鯢顧盼而並收河朔九鼎還重三光益明趙魏小康周秦大定伏見所部寄住客前棃園供奉官梁州充義府果毅劉日進新造寶應等凡十八曲其調合雅其聲用宮以歌盡言以舞盡意夫雅者三代之樂貴之則鄭衞不行宮者五音之名用之則角徵咸敘興亡理亂實繫於茲昔王令言聽安公子失宮聲知隋氏禍敗非久今臣見寶應樂用宮調知皇家運祚無疆故製造其詞發揮成曲庶登樂府上達天朝謹附前棃園供奉官某進表以聞臣某言中使某至奉宣勅旨賜臣衣若干事目覩絲綸手披篋笥新衣二稱虹蜺閒出綵綾五色鸞鳳互飛臣受鉞西門建旟北府地僻萬里天違九重豈憶仁出於聖心賜出於御府白日亭午忽蒙慶雲之惠清秋屆節偏承玉露之恩負邱山而忘疲瞻闕庭而莫見臣無任右臣所管四鎮境天竺山壓枝園枝國有拔汗那最為密近乃有娑羅樹時稱奇絕不比凡草不棲惡禽聳幹無慚於松柏成陰不愧於桃李但以生非得地譽終因人榮枯長在於異方委葉不聞於中土陛下高視三代橫制四夷威信浹於君長仁惠沾於草木前件樹枝臣去載已進訖臣伏以凡遵播殖貴以滋多今屬陽和之時願助生成之德近差官於拔汗那計會又採前件樹枝二百莖並堪進奉如得託根長樂擢㯋建章布葉垂柯鄰月中之丹桂連枝接影對天上之白榆於物無遺在人知感謹差軍將李滔押領赴京右臣管內大小鷹婆羅山採得前件鷹擇並堪進奉特稟異氣挺生殊姿頭圓頂平臆濶脛短眼目時轉志凌雲霄花毛始齊色靜霜雪既拔奇而賞異實超等而殊倫但四鎮川原千里砂磧草木既少禽獸亦稀礪其爪距調其羽翮徒有願於擊搏竟無階於効用今寒風凜冽殺氣嚴凝萬乘時巡六龍冬狩出樊籠之地登校獵之場必能隨人指蹤驅御苑之狐兔順時行令逐禁林之鳥雀物性有適天心所知昔在王癸不道帝辛失德天命將改人心已去聖哲拯之歷數歸焉商湯所以革夏周武所以伐殷也至於太甲初放成王未長國步猶梗時屯尚虞忠賢處之名節存焉伊尹所以反正周公所以復嗣也元興之際義熙之閒晉主中庸幸無桀紂之罪劉公大畧遂有伊周之勳當其驅駕英雄芟夷僭偽南摧勁楚北破強燕電掃秦雍風清巴蜀三方為我有四海為已任誠能秉汾陽之志息漢陰之機牽率何劉同為翊戴指撝徐傅共致雍熙則元皇建業之都至今享殷周之祚劉后豫章之地至今為齊魯之國而近希曹馬遠棄桓文禍徒及於兩朝福未盈於三載八葉傳其世嗣六君不以壽終漢氏寬仁允緒成大族劉公殘暴子孫無遺種天之報施其明徵乎則知握元符升大寶禮義得之者難絕智力得之者易亡使成如宋齊無足稱者況敗如莽卓豈勝道哉後之人運屬陵夷業崇經濟周爰故地殷鑒在茲唐永泰元年二月二十五日建禹敘九功誕受天命桀喪一德悖於人心為虺為蛇如豺如虎既毒螫焉又吞噬焉重之以昆吾因之以妹喜匹夫醜夏多士懷殷萬方囂然九州危矣公夏后之諍臣也以謂為臣之禮不擇其利食君之祿不避其害亦知直言之賈禍國蹙時危欲其行之速也亦知諷諫之徼福里車遠恐其效之遲也由是犯帝座排天門謀成深心藥進苦口石可轉也不可奪其堅貞身可殺也不可掩其忠義夫生死者必然之常數忠義者不易之大節位卑則迹遠祿厚則恩深恩深則義重於生全義可也迹遠則生重於義全生可也夫子世卿之族捨生即義賢哉且伊尹之遇殷湯也賢與聖合之賢聖之閒相去甚近此其所以行道也夫子之逢夏桀也賢與愚合之賢愚之閒相去甚遠此其所以喪身也向若桀昧可革從公之言則國不失夏之初君不失禹之舊殷湯不能成大業伊尹不能建元勳諸侯奉於天子一姓傳於萬世驕君暴怒亂國淫刑朝行斧鉞之誅夕覩市朝之變千載之下九原之上殷人比干攜手而遊耳嗚呼先王納諫而昌後王拒諫而亡當其昌也忠良勝於邪佞及其亡也邪佞勝於忠良故君子慎於語默審於行藏豈徒然哉蓋有以也乾元歲以戎車之殿朝於京師一覽吳子之文再明關公之義託於匠石勒於碑陰亦猶公穀作傳之異同韓毛解詩之先後也堯有天下七十載將遜於位久難其人支伯許由全其節而固讓羲仲龢叔審其才而固辭帝德合於天天命歸於帝帝盡善也我其試哉由是賓於四門納於百揆星辰合度雷雨不迷堯之二女降於內堯之九男服勤於外受昭華之玉允洽人神泥封祀之金大報天地五臣皆進明賞也四族咸黜明刑也先質後文敦俗也貴德尚齒優賢也於斯之時君明於上人化於下山川鬼神亦莫不寧鳥獸魚鼈眾乎咸若無為而治其聖也歟夫以萬乘之尊一人之貴多見軼其軌度少能窒其嗜欲瑤臺瓊室堯舜則茅茨土階矣玉食寶衣堯舜則藜羹皮裘矣歷代多嬪御堯舜顧禮經娶一姓矣自古好征伐堯舜舞干戚懷四夷矣百姓樂堯舜未嘗不樂百姓憂堯舜未嘗不憂歷數之來人以位授我謳歌之去我以位授人其來也攖於樊籠其去也脫於桎梏形神非吾有天地之委和子孫非吾有天地之委蛻此其所以禪代也近日曹丕父子世為漢賊當鼎易之時發荒唐之論高視前古大夸㣥雄猥以漢魏之閒輒同堯舜之際此河伯不知於海若盜跖自方於仲尼也古人云堯以義終舜以勤死稽諸祀典永垂世教游夏之徒豈誣也哉稱堯見囚小儒之虛誕為禹所放曲士之穿鑿攻乎異端斯害也已九嶷北麓三湘南澨帝之遺廟存焉地僻易蕪徒生荊棘水深難涉誰薦蘋蘩先聖不祀後賢之過攝邵陽令前監察御史宇文宣大樹風教小康黎元相岡巒移棟宇前豁林莽得爽塏之地焉下指城隅見祈禱之人焉如或宣室言徵閟宮靈降娥英近侍稷契旁趨則歌南風覲東后朝眾聖會㣥臣則知湯武不敢升堂自愧於廊廡之下高光不敢及戶退慙於閫閾之外成康文景無所譏焉謂也無孔氏之祖述有顏子之希慕作頌於清芬勒文於元石其銘曰系自顓頊家於勾芒大口奇表重瞳異相俗變山中風移河上其器不窳其人皆讓二年成邑三年成都惟彼陶唐禪於有虞域中交泰天下昭蘇彩鳳聽樂黃龍負圖其德難名元功不宰脫屣城闕遺形江海陵廟有依山川無改象耕未輟鳥耘猶在託此巖阿神心若何蒸嘗昔少俎豆今多百越迢遙九嶷嵯峩湘雲古色楚水新波庭羅松桂森若容衞檐度風飇宛如簫韶黎庶以寧陰陽以調憑茲聖靈祚我皇朝天文長沙一星在軫四星之側上為辰象下為郡縣遁甲所謂沙土之地雲陽之墟可以長往可以隱居者焉其山麓山其水湘水其畜宜鳥獸其穀宜秔稻厥草惟繇蕑杜荃蘅留荑擖車出焉厥木惟喬椅桐桂檉貞松文梓生焉篠簜嬋娟於原野碔砆照耀於崖谷昔熊繹始在此地番君因此而後定王國焉漢道凌遲董卓狼顧文臺以三湘之眾績著勤王梁朝覆沒侯景虎視僧辯以一州之人勳成定國桓文之舉亦何加焉至於致禮舊君請屍歸葬桓氏之子可謂忠也殞身強寇有死無辱尹氏之女可謂貞也軾鄧粲之宅足以厚儒風表古初之墳足以敦素行齊魯之俗其何遠哉巨唐八葉元聖六載正言待罪湘東郡臨江湖大抵卑濕修短疵癘未違天常而云家有重膇之人鄉無頒白之老談者之過也地邊嶺瘴大抵炎熱寒暑晦明未愆時序而云秋有爀曦之日冬無凜冽之氣傳者之差也巴蛇食象空見於圖書鵬鳥似鴞但聞於詞賦則知前古之善惡凡今之毀譽焉可為信哉因徵故老之言用紀他山之石辭曰舜去黃屋於焉巡遊禹逢元夷於焉滯留五嶺南指三湘北流鄰聯滄浪邊遙岣嶁湘山之下青青眾草有蕙有蘭在江之島烟雨冥冥波瀾浩浩不采不擷棄捐遠道湘山之上青青眾木有栝有松在巖之麓風霜淒淒柯葉沃沃不榱不棟老朽空谷陸有玉璞水有珠胎隋侯云亡卞氏不來湘雲莽蒼湘月徘徊貞石紀事層城之隈應物京兆長安人少以三衞郎事元宗永泰中授京兆功曹遷洛陽丞大歷中授鄠令建中三年拜比部員外郎出為滁州刺史調江州改左司郎中後出為蘇州刺史夏六月白日當午火雲四至金石灼爍元泉潛沸雖深居廣廈珍簟輕箑而亦鬱鬱燠燠不能和平其氣陳王於是登別館散幽情招親友以高會尊仲宣為客卿睹頒冰之適至喜煩暑之暫清王乃誇賓而歌曰含皎皎兮瓊玉姿氣淒淒兮奪天時飲之瑩骨兮何所思可進於賓請客卿為寡人美而賦之客諾曰美則美矣而大王不識其短夫謂之瓊玉竊名器也氣奪天時干陰陽也內熱飲之媒其疾也寵一物而三失德且出寒谷而至下薦宗廟而至高僕竊惑之而歔欷安得不為之而抽毫何積陰之勝純陽兮惟此元冰居炎天之赫赫兮獨嚴厲乎稜稜其始也月元冥日北陸天地閉水泉縮動靜一變剛柔反覆壯以烈風積如㣥玉由是依廣澶漫憑高崢嶸大寒御節萬動潛形浮彩皓皓仰吞素靈㣥山早曙陰壑夜明古者祭之黑牡其藏以節袚之桃弧其出以潔今明明大魏禮物必備實大王樽俎之常品非小民造次之所致若尊卑異等頒命有度碎似墜瓊方如截璐況粉壁雲矗象筵霜布座有麗人皎然俱素雖眾賓之同輝諒為物之難固其竊名假質以謬一時之賞也如此若乃對修竹臨方塘俾炎作寒兮反我天常嗟絺綌之失御於三伏兮亦紈扇委篋而內傷其嚴沍之威以干陰陽之候也如此若皎潔的皪與時消釋或沈珠於杯或化璞於液王將甘飲聊以自適豈知乎一寒一溫日夜相激久之以生疾兮內外不和而怵惕其翫意而媒疾也如此觀其力足以淒一室利庖廚俾甘肥晚敗醇釀不渝非可調腠理安營魄奈何以誇客陳王於是赩然而慙曰寡人生於深宮懵於服食左右唯燕姬趙女侈服美色微客卿之言則何以雪余惑方當命有司而徹冰書盤盂以自式庾元宗時人於戲德包生植者不能動彼天之道瑞及飛走者未能感無一疑之寶故知瑞之大者下及無心之金石德之深者上合不言之元造我國家高選物理光天順人膺景命闡坤珍由是函谷關旁靈符出而啟聖梓潼郡內寶鼎光乎取新此鼎者聖人之大寶有國之神器量則宏深體乃殊異嶷如斷山之崷崒屹若巨鼇之贔屭峙其足者可以象三德虛其心者可以含萬類不汲而滿不燃而沸內烹飪以養賢上歊雲而作瑞應火木之卦既調鹽梅鏤山川之容且禦魑魅是鼎也豈徒靈感亦有欵識不假雕鐫宛然文字實彼天之所錫表吾君之至治揚五百代之昌符成六萬年之寶位與夫遷鼎郟鄏卜代三十卜年七百者不可同日而議宜書於冊於帝之庭以合明應以昭神靈士有聞而嘆曰昔黃帝作寶鼎三秦帝奠神鼎一周之衰也沈泗水而隱藏漢之盛也在汾陰而見出未有能來聖壽之無疆應人文以純吉竊亦欲負鼎於明主啟心而獻術若能使我徵於有商豈見遺於今日寬官醴泉尉天寶六載孟冬十月霜清東野斗指北闕已畢三農亦休百工皇帝思溫湯而順動幸會昌之離宮越三日下明詔伊蹴鞠之戲者蓋用兵之技也武由是存義不可舍頃徒習於禁中今將示於天下廣場惟新埽除克淨平望若砥下看猶鏡微露滴而必聞纎塵飛而不映欲觀乎天子之入先受乎將軍之令宛駒冀駿體佶心閒銀鞍月上華勒星還細尾促結高鬐難攀儼齊足以驤首待馳騖乎其閒羽林孤兒力壯身勇蓋稷門而未捷攀秦鼎而非重積習為常成規親奉咸技癢而願効望鳴鑾而跂踵雲開紫殿日臨丹墀無譁眾士其局各司聖神之主於是乎帥師君前決死且不敢辭珠毬忽擲月仗爭擊並驅分鑣交臂謺跡或目留而形往或出㣥而受敵稟王命以周旋去天威兮咫尺有騁趫材專工接來未拂地而還起乍從空而倒迴密陰林而自却堅石壁而迎開百發百中如電如雷更生奇絕能出慮表善學都盧仍騎騕褭輕劇騰狖迅拚鷙鳥捎虛而訝人手長攢角而疑馬身小分都驟滿別部行收哮噉則破山盪谷踴躍則跳巒簸邱爭靡違於君子中寧謝於諸侯況賞罰之必信旌君國之大猷其中志氣超神眉目勝畫地祇衞蹕山靈捧靶眾沸渭以紛紜獨雍容而閒暇峩冠而雲散五色揮策而日迴三舍狀威鳳之飛翔等神龍之變化此神人兮有作豈臣子之齊駕是時也天宇闢睿情歡命京尹將屬官美斯場之寵麗成今日之遊盤詳其指揮雅標幹事之首察其任使孰為知人之難遂賞功而裦德何縑縞之戔戔尹乃拜手稽首逡巡不受曰子來之功臣何力之有夫稱物以平施則可大而可久故職司與役徒亦恩加其賜厚且稱茲藝精鍊古來罕見寓今斯成伐謀足擅可以震謺戎狄康寧㝢縣漢祖未悟果有白登之圍唐堯闕修載勞丹浦之戰然明者覩於未兆戒者圖於不見城誠狹頗積往來之勤馬雖調恐生銜橜之變憑覽則至樂躬親則非便帝曰俞忠哉真知言之選璋許州人天寶中上書請代李邕死配流嶺南山東布衣臣某言臣聞明主御宇捨過舉能取材棄行烈士抗節勇不避死見危授命晉用林父豈念過乎漢用陳平豈念行乎禽息殞身豈愛生乎北郭碎首豈愛死乎向若林父死陳平棄百里不用晏嬰見逐是晉無赤狄之利漢無皇極之尊秦不并西戎齊不霸東海矣臣伏見陳州刺史李邕學成師範文堪經國剛毅忠烈難不苟免往者張易之弄權人畏其口而邕折其角韋氏恃勢言出禍應而邕挫其鋒雖身受謫屈而姦謀中損然則邕有大造於我邦家也前宋璟每厚遇之豈以才重抑嘉其忠於國矣今聞坐贓醜敗厥行且斯人所能者拯孤恤窮救乏賙患積而能散家無私聚陛下下吏訊之聞諸道路執法者將加之以極刑噫天之將喪斯文死在朝夕永辭聖代臣聞生無益於國不若殺身以明賢臣顧朽材輪轅無取徒獸視禽息雖生何為況賢為國家之寶社稷之衞若喪國家之寶失社稷之衞哲人云亡國將若之何是臣痛惜深矣臣願以六尺之軀甘受膏斧以代邕死臣之死所謂落一毛邕之生有足照千里然臣與邕生平不臣知有邕邕不知有臣是臣不逮邕明矣夫知賢而舉仁也代人任患義也臣獲二善而死死且不朽則又何求陛下若以臣之賤不足以贖邕鴈門縫掖有足效矣伏惟陛下寬邕之生速臣之死令邕率德改行全林父曲逆之功使臣得瞑目黃泉附禽息北郭之跡臣之大願畢矣陛下若以陽和之始難於用斧鉞俟天成命敢忘伏劒豈煩大刑然後歸死皇天后土實鑒臣之心昔吳楚七國叛周亞夫得劇孟以為寇不足憂夫以一賢之能敵七國之眾伏惟陛下敷含垢之道存棄瑕之義遠思劇孟近取李邕豈惟成愷悌之澤實亦歸天下之望臣先君孔子曰鄉人皆惡之未可也況大禮之後天地更新赦而復論人誰無罪惟明主深思之臣聞士為知已者死且臣不為死者所知而甘於死者豈獨為惜邕之賢亦成陛下矜能之德惟明主圖之臣璋死罪死罪建字士經天寶中為河南令錫社啟土開國建侯惟彼占田制無踰等瞻言縣道未可裂封乙實無良不能幅利慙晏嬰之辭邑雖謝能賢非丞相之出關未宜加罪必也異蕭何之窮僻同王立之占求則漢典可遵殷鑒斯在待於閱實方正爰書名位所以寵賢爵祿所以馭貴德盛者慶遠源深者流長垂裕後昆啟迪前烈今見其人矣薛氏之先奚仲為夏車正仲虺為湯左相與滕爭長薛實先封佐漢登臺因而胙土河東冠族代不乏賢五代祖道衡隋吏部侍郎內史侍郎隋文帝創造霸圖發揮綸翰變當時之文體高祖收皇朝行臺金部員外天策府學士我太祖之經綸王業專掌詔檄擅經國之詞宗凡所事業著於史傳曾祖元超皇朝戶部尚書中書令汾陽縣開國男丹青景化金玉王度訏謨載於盟府故事留於臺閣祖毅皇朝鄜州洛交縣令太子舍人父儒童皇朝京兆府醴泉縣丞贈梁州都督潛德養蒙晦明藏用位不充量道屈安卑武子之德在人太邱之德益茂府君諱舒字仲和醴泉府君之長子也元和誕靈純粹時秀覃訏有異敏惠夙成聞詩禮之義方深仁明之正性讀書知王霸大體覽史慕名臣高節脫畧細務經濟遠圖銓衡賞擢年十九授華州司士參軍從累考也轉相州司法參軍又遷岐州司功參軍鄴郡舊都扶風左輔掾曹之選必先才地以儒學飭吏以明察莅官筮仕之初有令名再命而傴不忘循牆之恭三語故稱則聞趨府之譽堆案之下析滯無虞天寶初寰宇昇平典刑攸敘旁求端士以授法官拜大理寺丞敬爾繇獄有郡吏抵犯議合惟輕台臣作威俾令從重服念累日至於旬時苟有動搖必將頗類彰書厥狀實曰非辜初秉直而不移終忏權而獲罪貶青州司戶參軍君子曰守法不回正也移官無慍達也道不可屈身屈何傷無何授金州司馬遷夷州刺史舉淹滯擇廉平也至德初遷渝州刺史西通楚道北控漢中山鎮縉雲峽通明月歌來暮於巴俗願借留於梁境昇課最矣君理行第一所居必聞冉季膺政事之科龔黃獲循良之首累遷巫溪二刺史兼少府監殿中侍御史溪洞雜類蠻夷徼外緩耳素服小有底寧言語之所不通撫柔之化風靡寶應初皇上以四郊多壘五谿未安乃拜黔州刺史黔中經畧招討官觀察處置鹽鐵選補等大理卿兼御史中丞黔中者禹貢荊州之域秦開武陵郡其啟土也大其貨殖也殷有廩君之土舟擅寡婦之丹穴惠化所感無思不服昆明者西夷絕域開池習戰漢所未通遠聞德政翻然納款琛賮尤物來獻於重譯紫泥寶書屢榮於手詔尋加金紫光祿大夫御史大夫河東郡開國伯賞茂勳也十郡土風百域異俗輕剽啙窳姦宄矯虔示之以威信興之以禮讓華風變於夷裔膏雨浹於殊壤方將作鎮藩翰永為長城天不憖遺人將安仰以大歷十年四月二十五日薨於溪州之公館春秋六十有八勤王事也魏闕將朝來展韓侯之覲荊州罷市深懷叔子之仁百蠻感慟三軍雨泣惟君愷悌之性始於閨門忠義之誠聞於邦國少有大量幼而老成結綬勤王敬恭朝夕精識可以應務明斷可以析疑每推是心以接於物魏其廡下金盡散人氾毓室中衣無常主而雅好文酒醉猶溫克陶然忘機傲然自得儻來軒冕曾不在懷此則山之疎曠莊周之造道貴而不驕謙遜每推於寮友寬而能恕喜怒不見於家人信大雅之保身中庸之蹈道況乎負才器以身許國剖郡符易之風政行於南國者二紀領藩鎮者十年凡所條奏上聖心汝實專征嘗受元戎之鉞我惟共理兼榮副相之印充國之功宣右地伏波之式是南邦遺愛去思古今一揆君外祖故中書令逍遙公韋嗣立先朝碩德叔父故陳留郡太守河南採訪使江童當代名賢季弟前吏部侍郎今宣州刺史宣歙等州觀察使邕朝之俊茂既闕隋朝至今掌綸翰者四葉天寶之後膺方面者三人中外相門奕代文學閥閱之大莫之與京夫人京兆韋氏故工部尚書東都留守虛心之次女婉淑之德早映圖史柔明之姿動成師範方保榮於韓樂奄追悼於潘詩以永泰二年三月殂逝巫州官舍追贈扶風郡夫人從夫貴也長子前鄉貢明經安親次子左金吾衞兵曹安國早承訓導皆成器業才行之美孝友彰聞有志不時相次淪夭三子永王府參軍安郡髫稚之歲執親之喪致毀而終人踰所痛卜云其吉列兆先塋不忘孝也第二女故梓州射洪縣令杜滔妻至孝純深提攜孤幼江山險阻扶護言歸誠孝所通龜筮協吉喪事不敢不勉備物必誠必信聖恩震悼贈禮部尚書賻物三百匹仍令中使監護弔祭儀仗禮優常等飾終之典迴日月於佳城詔葬之儀濡雨露於泉隧以大歷十一年七月二十日合祔於萬年縣棲鳳原禮也季子太常寺奉禮郎遵誠協律郎遵誨太祝遵訓等七人童丱而孤孺慕罔極松楸已拱地邇先君棣萼前彫塋連愛子封之若斧尚行夫子之規坎不及泉自合延陵之禮余忝內弟早荷周旋傳盛德而備詳敘高行而無愧詞曰汶水源長條山連岡鼎氣發祥大族其昌車正仕夏鈞衡佐湯贑君法令內史文章德厚慶遠才優道彰中書政本綸閤傳芳時稱茂緒代濟業祉學小申韓藝通墳史邦有良翰朝推端士析滯列曹申寃大理三黜無慍九遷茲始州縣蹔勞雲霄則邇西南重鎮實倚長城夷落風變蠻陬化行駐車決遣攬轡澄清赤舄命服朱綸錯衡霜飛憲露溢戎旌絕域輸款殊方獻誠牙璋既備介圭方覲仁則宜壽天胡不憖迢遰江山悲涼旅櫬震悼宸扆哀痛藩鎮詔使護喪同盟執引哀哀孝子㷀㷀弱允銘德敘功庶乎傳信之賁并州人長安尉之咸弟飭力長財任農勸業利則已久稅宜在均或乘弊以斂輕或因虛而斂重邦都以入未息夫家之征倉廩是資仍鞭什一之稅籌茲變法初欲贍官亦猶搜粟都尉冀立阜時之策司農中丞用成強國之算雖將實於邦府恐多奪於吾人人其不足國也何有徵之以古則魯公之制難循用之於今則有若之言可尚出其過籍非禮誠深言人匪躬過之已甚
