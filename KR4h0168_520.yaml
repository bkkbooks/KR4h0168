front:
  text: 全唐文欽定全唐文卷五百二十梁肅四
  hash: sha256:d4daaaaa6fcee71f1c8a5cb5d85f123ccb0a9cc0f16bd959fd228c456021e4bd
body:
  text: 皇道無名帝始有征故效天殺作為五兵曰王及霸功濟天下威實助德伐乃除禍逐鹿於原戰龍在野大寶臲卼非兵孰可動如決河靜踰滅火蒼蒼萬姓懸命在我所行者師所統者德功本乎義不本乎力順之曰聖逆之曰賊成敗存亡鮮不是則眾不足恃勝不足保武王一戎奄有九有紂之百克其卒無後故長民者無曰我強莫予敢亢尋邑百萬覆乎昆陽無曰我大莫予敢制陳吳攘袂嬴氏大潰武不可翫翫則必窮兵不可廢廢則終凶故曰天下雖平忘戰則危不教民戰是謂棄之齊桓矜眾九國以離徐偃仁義本邦亦隳傳美止戈易稱以律古之睿智神武不殺治亂之機繫於杪忽壯直且順孰云我遏旅臣同箴敢告執鉞浩浩㣥生或動或靜或幽或明旁魄六合運用五行莫不因心而寓其形波流火馳出入如機如環無端莫知其歸或細不可視或大不可圍日月至明或以為昬秋毫至微或以為繁或囊包天地或渴飲四海舒卷變化惟心所在天壽得喪惟心所宰心遷境遷心曠境曠物無定心心無定象明則有天人幽則有鬼神苦樂相紛如絲之棼有無云云不可勝言抑末也已本則不然惟本之為體寂兮浩兮不可道兮顯矣默矣不可測矣統萬有於纖芥視億載於屈指外而不入內而不出不闔不闢不虛不實無感不應無應不神在天而天在人而人常存而未始或存常昬而未嘗或昬豈惟我然蓋無物不然豈惟我得蓋無物不得混而為一莫覩其極故曰心生法生心滅法滅離一切相則名諸佛陰陽和而萬物生聖賢合而天下平和者時也合者運也在昔堯舜合禹抑洪水而天下平者四百年湯合伊尹革桀鷔而天下平者六百年文武合太公一戎衣而天下平者八百年與夫風雨寒暑五行四時佐天生物一也天之數不可以不變時則有懷山襄陵浩浩滔天之災君之運不可以不極時則有作威殺戮毒痡四海之變變則通時則有四載之庸極則反時則有放伐之功於戲惟尚父鍾其運而遇其主躡其機而作其合者歟於後伯陽不顯仲尼旅人其不合者歟故曰君子得其時則大行不得其時則龍蟠也嘉尚父之動靜不失其時作磻溪銘曰至人無心與道出處處則土木出則雷雨惟殷道絕粵有尚父爰宅於幽盤桓草莽天地闔闢陰陽運行明極而昬昬極而明遇主水濱謨泰八紘牧野桓桓一麾而平惟彼日月得天而光惟彼聖賢得時而彰獨夫昬迷我乃豹藏文武作周我乃鷹揚故曰大道無體大人無方運用變通至虛而常作銘磻溪今古茫茫臨淮之下邳有古橋蓋漢少傅留文成侯張良受神人黃石公兵書之地初留侯醜秦高帝在豐龍虎不起風雲未會黃石公知天衢欲平否極必傾秦之亡而漢之昌故先以興亡之符而授留侯且曰孺子可教後得濟北黃石其我也故以號云夫受命之君與佐命之臣將欲敘天道定人倫則必幽贊明神協成大勳在黃帝氏方平蚩尤時乃元女啟符風后行誅然後迎日推筴天下大治在帝堯方被水害時乃洛出九疇禹成九功然後萬國厎寧黎民時雍在漢祖方征秦項時乃黃石授兵留侯演成然後紲嬰軹道斬羽垓下自昔元圖元命著在篆籕皆片言隱辭無益帝載惟此三后感及神書文章昭明大業用興易稱人謀鬼謀百姓與能又曰神道設教而天下服蓋謂是矣凡志不定則事不成謀不從則業不廣留侯不遭黃石無以定其志高祖不獲留侯無以廣其業人神參并漢道乃行不然何通降聖賢君臣遇合上得天統中為帝師如此其盛也大歷七年予旅遊次墮履之地於是鑽石勒銘揚於邳圻庶恃力違天徼功妄作之輩於以敬戒之爾銘曰陰陽之精不測曰神厥有黃石假形為人告謨留侯夷項滅秦跡寄穀城精還氤氳惟帝軒后肇興兵謀元女降符實平蚩尤爰洎陶唐洪水橫流天乃錫禹洪範九疇亂秦紛如帝在草茅赫矣黃石亦命留侯丕顯有唐紹漢絕風革暴承天與軒比崇亦有反常貪亂圖功人神莫從動罔弗凶有開必先惟德乃同宜究茲道順於家邦作為紀銘永鑒無窮祗園精舍淨土院者沙門常輝觀佛三昧之所也按契經西方極樂界曰有佛無量壽如來誕敷本願爰宅彼土垂拱東向以提㣥生如想念者利有攸往往而至者住不退地至矣哉蓋出世之康衢三乘之舟楫也原夫真俗同體聖凡一貫隨心升降見境差別於是深靜相形依正相成離為百界合成一念如來以其然也故因其所習視其所安隨所感化示所依處無量壽國蓋所示之一歟有若觀心佛不二者不來不往誰縛誰解如是觀者生之上也如是信解觀念漸純生之次也繫緣從事厭染懷淨又其次也或近或遠或真或假值佛聞法同歸一地此西方教所以為至也或者以為法有相空不可得生彼界者與斯土何以異是不知佛意遠矣輝既修此道場懼昧者不知所以然因命我紀之先生諱光字子陵會稽餘姚人也名闡於漢光武之世東觀書實載其事當哀平之後天地既閉先生韜其光隱而不見建武反正雲雷既定先生全其道而不屈消息治亂之際卷舒夷曠之域如雲出於山游於天復歸於無閒不可得而累也則激清風聳高節以遺後世先生之道可見於是矣或曰人倫大統莫大乎君臣崇德致用莫盛乎富貴而子陵以賤為貴以臣傲君二者其失於教歟君子曰不然夫賢哲之道一動一靜動而用者功濟乎當世靜而不用者化光於無窮故許由於堯先生於漢皆不易乎世游方之外俾後之人聞清風而嚮慕焉蓋運有會事有行伊呂遇湯武而立大功子陵遇世祖而立大名去就不同同歸乎道焉歲在大梁予涉江自富春而南訪先生遺塵則釣臺尚存仰聆德風刻頌於石其文曰季葉浩浩澆風蕩淳先生括囊鳥獸同㣥四海既平故人為君富貴於我有如浮雲召至禁中告歸江濆下視天子上動星文接輿肆狂孤竹求仁介推山死龔勝蘭焚猗歟先生異乎斯人俯仰世道從容屈伸清溪悠悠白石磷磷遺風是仰終古不泯有漢高士梁君諱鴻字伯鸞扶風人君得天元純誕其生知囊括道妙而游於世遭漢微闕澆風偃物君以為道不可徇時故安節以高蹈高蹈不可以激俗故登邙以作歌作歌不可以遺患故適越以遐遯遐遯不可以不粒故寄食於杵臼是以孟氏悅其道而妻之伯通尚其風而禮之安夫大而遺其細忽夫語而順乎默樂則行之憂則違之斯可謂高世之遺民矣原夫天之運也曰明與晦人之道也曰否與泰達人知否與晦之不可為也故耦而耕狂而歌鑿坯以逃荷蓧以游而晦德避難不成乎名於戲伯鸞非斯人之徒則誰與哉唐大歷六年小子旅於吳得君之舊游焉孟子稱聞柳下惠之風者鄙夫寬薄夫敦然則聞之風聲亦將舍爾朶頤以觀我靈龜乎乃刊貞石以識遺烈銘曰山隱器車河祕馬圖伯鸞不行獨與道俱太虛無際浮雲無繫伯鸞伊何冥跡人世直道辱身三黜魯邦扣馬而諫餓於首陽邈矣伯鸞靜而含光作銘臯橋萬古是望天台山西南隅一峯曰佛隴蓋智者大師現身得道之所前佛大教重光之地陳朝崇之置寺曰修禪及隋建國清廢修禪之號號為道場自大師沒一百九十餘載長老大比邱然公光照大師之遺訓以啟後學門人比邱法智灑埽大師之闕一字居以護寶所門人安定梁肅聞上易名銘勒大師之遺烈以示後世云大師諱智顗字德安時號智者其先潁川陳氏世居荊州之華容感應緣迹載在別傳夫治世之經非仲尼則三王四代之訓寢而不章出世之道非大師則三乘四教之旨晦而不明昔如來乘一大因緣菩薩以普門示現自華嚴肇開至雙林高會無小無大同歸佛界及大雄示滅學路派別世既下衰教亦陵遲故龍樹大士病之乃用權畧制諸外道乃詮智度發明宗極微言東流我惠文禪師得之由文字中入不二法門以授南嶽思大師當時教尚密不能廣被而空有諸宗扇惑方夏及大師受之於是開止觀法門其教大畧即身心而指定慧即言說而詮解脫演善權以鹿菀為初明一實用法花為宗合十如十界之妙趣三觀三智之極自發心至於上聖行位昭明無相奪倫然後誕敷契經而會同之渙然冰釋心路不惑窺其教者藏焉修焉蓋無入而不自得焉大師之設教也如此若夫弛張體用開闔語默高步海內為兩朝宗師大明在天光被四表大雲注雨旁施萬物繇是言佛法者以天台為司南殊塗異論往往退息緣離化滅湼槃茲山是歲隋開皇十七年也夫名者實之賓教者道之門大師溷其賓闢其門自言地位示有證入故感而應之應之之事可得而知也若安住法界現為比邱等覺歟妙覺歟不可得而知也當是時也得大師之門者千數得深心者三十有二人纂其言行於後世者曰章安大師諱灌頂灌頂傳縉雲威禪師禪師傳東陽東陽與縉雲同號時謂小威小威傳左谿朗禪師自縉雲至左谿以元珠相付向晦宴息而已左谿門人之上首今湛然大師道高識遠超悟辯達凡祖師所施之教形於章句者必引而伸之後來資之以崇德辯惑者不可悉數蓋嘗謂肅曰是山之佛隴亦鄒魯之洙泗妙法之耿光先師之遺塵爰集於茲自上元寶歷之世邦寇擾攘緇錫駭散而比邱法智實營守塔廟莊嚴佛土迴向之徒有所依歸繄斯人是賴汝吾徒也盍紀於文言刻諸金石俾千載之下知吾道之所以然小子稽首受命故大師之本迹教門之繼明後裔之住持皆見乎辭其文曰諸佛出世惟一大事天台教源與佛同意赫赫大師開示奧祕載宏要道安住圓位白日麗天天下文明大師出現國土化城無生而生生化兩冥薪盡火滅山空道行五世之後閒生上德微言在茲德音允塞明明我后易名淨域此山有壞此教不極釋氏先律師諱曇一字曇允報年八十僧夏六十一以大歷六年十二月七日滅度於越州開元寺遷座起塔於秦望山之陽制縗會葬者以千百數大師本南陽張氏曾祖隋太常恒始家會稽之山陰大師誕鍾粹氣聰悟夙發幼學五經因探禹穴至雲門寺遂依沙門諒公出家景龍中剃度尋受具戒天縱辯慧益之以軌儀翕然已為人望矣開元初西遊長安觀音亮律師見而奇之授以毘尼之學又依崇聖寺檀子法師學俱舍惟識從印度沙門善無畏受菩薩戒探道覩奧出類拔萃期月之閒名動京師大師崖岸峻峙機神坦邁體識詳雅應用虛明得三藏之隱賾究諸宗之源底加以素解元儒旁總歷緯長老聞風而悅服公卿下榻以賓禮由是與少保亠兊國陸公象先賀賓客知章李北海邕徐中書安貞褚諫議庭誨及涇縣令萬齊融為儒釋之遊莫逆之友其導世皆先之以文行宏之以戒定入蘭室而馨香自發臨水鏡而毫髮必鑒不知其所由然矣開元二十六年復歸會稽謂人曰三世佛法戒為根本本之不修道遠乎哉故設教以尸羅為主取鄴郡律疏合終南事鈔括其異同詳發正義學徒賴焉大凡北際河朔南越荊閩四分之宗自我而盛烈炬之破昬黑㣥流之赴淵澤適來之時化行也如彼不為而生乘化而息草木潛潤慈雲無心適去之時處順也如此人世遷轉道存運在瞻望不見寂寥空山哀哉銘曰越水漫漫崇山迴合大師化滅式建靈塔緬慕上士誕修淨法有威有儀不穿不雜德溥化洽雲從海納勒碑垂後千萬億劫王諱述有唐代宗睿文孝武皇帝之第幾子今皇帝之愛弟也某年封睦王春秋若干以貞元七年某月日薨於京師皇上震悼命有司筮宅兆選吉日以明年二月某辰葬王某縣某鄉之原禮也惟天祐序於皇家惟王承慶於祖宗方之有周康叔實文王之子擬諸炎漢河閒稱武帝之弟天鍾秀氣幼挺全德清明在中淳耀發外稟先聖之嚴訓則樂善不倦奉吾王之深愛則敬順日躋至乃因心之孝率性之道溫良惠和敏肅端懿學無不探藝無不至固以邈焉殊倫焯於生知者已洎夫備物典策啟土建封桓珪之重盤石之宗守以清淨行以謙沖不然者何名之茂何寵之豐方將朋三壽以用五福胡乃天不憖而命不融此聖人所以深津門之慟凡伯所以惜東平之終臣肅奉詔銘石寘元壤之中所以紀茲墳之永固以表王德於無窮者也銘曰聖帝介弟於維睦王令聞令望於邦有光惟王之賢懿德日宣受福於天胡不永年東門之路西靡之樹萬有千古賢王之墓公諱史魚字某趙郡平棘人也隋下邑令大經元孫皇朝襄州錄事參軍元暉曾孫漣水丞藻之孫青州司法參軍贈和州刺史萬總之子其先干木藩魏武安霸趙司隸盛於東京持書別為西祖載在紀牒於家有光自下邑至於和州四世無違克生俊德公天姿俊邁少負英氣清明博厚虛受特達行本於孝友業成於文章開元中以多才應詔解褐授祕書省正字時海內和平士有不由文學而進談者所恥公以盛名冠甲科㣥輩仰之如鴻鵠軒在霄際矣秩滿調補河南參軍長安尉監察御史時宰相李林甫當國怙權稍鋤去異己者公外不附離內不懾憚竟為所陰中貶萊陽丞累移至朝邑令下車周月而頌聲作上方銳意武功寵厚邊將拜公殿中侍御史參安祿山范陽軍事河北首亂公脇在圍中危冠正詞誚讓元惡勢迫難奪望重見容朝廷雅知公忠遷侍御史充封常清幽州行軍司馬隔於凶盜詔不下達公與張休獨孤問俗密結壯俠志圖博浪之舉閒遣表章請固河潼之守帝用深歎吾謀未行會虜將能人性元浩擁師河上公詭請勞撫因以大義諭之能亦知復飜然向順裂賊左臂繄公之力是歲至德一年也相國張平原鎬以狀聞復授侍御史攝御史中丞充河南節度參謀河北招諭使中朝方倚公以重任戎鎮又咨公以成務公謂委身蹈難非節違亂歸政非公叨恩受祿非義僶俛從政吾何以安假公事東至江淮以上元二年七月二十六日遇疾終於揚州官舍春秋五十六藁葬於禪智佛寺之側貞元元年嗣子竦以谷口扈從之勳朝廷推恩追贈公尚書戶部侍郎五年歲次丁巳某月日始歸窆於某鄉某原上距捐館凡二十有九年不得吉卜且難是以緩夫人河東郡君裴氏河州刺史某之女吏部尚書寬之姪以禮佐君子降年不永春秋若干天寶二載終於洛陽至是祔焉傳稱有明德若不當世其後必有達人惟公含章挺生好是正直蹈難全德終焉允臧蓋道與其仁神輔其志宜乎其有後也竦以文藝吏事歷中書舍人戶部侍郎天子以為才任方鎮加左散騎常侍知鄂州軍州事領都團練觀察使長才厚位而壽不至士友痛之竦弟竚長安尉亦早卒最少曰竢純懿而文克奉家業咨於從祖父殿中侍御史臯魚爰卜兆域以寧神宅臯魚於天倫之閒有知己之道泣敘美行俾予誌之其文曰時之晏卿雲爛鸞鳳於飛上清漢吾道行年路方半時之昬沴氣繁鯨鯢蕩海橫中原側身西望不敢言忠莫渝兮計獨存奮辭感激牧東藩雷雨作解草木蕃一隨逝水空遊魂播清徽與茂烈永延輝兮垂後昆公姓劉氏諱迥彭城人楚元王交之後也當漢興諸侯王子孫唯楚為盛世為儒宗光耀史牒以至公大父皇朝尚書比部郎中贈徐州刺史府君諱藏器徐州生烈考右散騎常侍贈工部尚書居巢文公諱子元初文公儒為天下表有才子六人曰貺曰餗繼文公典司國史時議比子長孟堅曰秩曰迅以述作之盛德行之美追蹤孔門曰彙與公用剛直明毅焯於當時故言卿族者舉盛業以名其家公好學善屬文天寶中進士登科解褐拜江都尉轉左金吾兵曹介江南西道採訪使歷大理評事監察御史入為殿中侍御史出為永州刺史未行改戶部員外郎尋佐江淮轉運使授著作郎加檢校戶部郎中國子司業三領侍御史當是時中夏初定而兵未戢故公所受任以餽運財賦為先而公亦飭躬艹泣職所到無不均不安之患大歷初詔擇二千石遂授公吉州刺史三載績成徵拜諫議大夫遷給事中移疾請告就醫於洛陽享年若干以建中元年七月某日終於某里私第嗣子某泣血孺慕以某月日奉公之喪權窆於某原惟公貞方端肅居敬行和而不同直而不倨博聞強識樂善下人在諫司陳古今以通諷諭言發而王度潛潤事行而天下莫聞及夫給事黃門釐舉典要壺遂之才未展士安之病已深吾道豈窮大運斯止嗚呼始公兄祭酒秩功曹迅並與故相國房公琯厚善其終也趙郡李公華志焉洎公在廬陵治行尤異則故相國崔公祐甫頌焉蓋伯仲德美煥乎金石試為斯文銘曰惟堯之緒在漢開楚導長源兮比部蘊仁文公允文闢儒門兮重世掌史遷固慙美立斯言兮惟公才明剛中志行直道發兮累佐使臣一麾牧人遺愛結兮給事於中遭命不融神理忽兮邱有夷淵有實舟斯失劒斯沒石不滅兮河南房君諱凜字敬叔者唐長安令思晦之孫殷城令齊金之子相國贈太尉清河公琯之族子也興元元年十月終於鹽官縣之旅次旋窆於楚州寶應之某原孟子云雖有鎡基不如待時揚雄亦稱李仲元不詘其志不累其身時無仲尼惡乎聞若敬叔以五常為師六學為友行年五十八而動不一合艱屯臲卼沒於道路噫孟軻揚雄其知言者歟始敬叔十歲好學十五能屬文二十餘值陸渾為戎遯於東南劉僕射以賢良薦授祕書省正字常黃門崔中書繼持國柄方待以儒者之職屬二相薨免其他當路君又不能附離乃卷道退歸每言五經之旨其道大備而去聖寖遠義類繁滋博而寡要學者罕究乃撮其異同各以彙聚凡三百餘篇草藁未就遘疾而歿冉耕廢疾申公胥靡世道下衰仁人隨之然歟通人趙郡李遐叔常云我思古之人房行古之道房哉房哉哀哉哀哉嗣子某泣序遺烈請予為誌文曰儒為德本德實教源不有達學孰纂㣥言恂恂房君行直而溫一匡六藝獨立顓門宜登師席啟迪蒙昬今也則亡來者何云荊棘滋茂芝蘭燒焚命不可問吁嗟房君大歷七年冬十月甲子前明州刺史李公寢疾終於晉陵之無錫私館嗚呼公諱長字某隴西狄道人其先自涼武昭王元盛七葉至皇朝工部侍郎岐州刺史義琛生吏部郎中綰綰生蔡州長史贈宋州刺史某某生公公生而聰明治左氏春秋舉孝廉初任貝州參軍三遷至國子主簿御史中丞盧弈司察甸服辟為從事天寶十五載大盜覆東周弈死節公遁脫而南會永王璘都督江左諸軍雅知公才將署於幕以畫公告不能無何璘果敗君子以公為知幾時肅宗在岐朝廷擢良吏以慰郡縣不限官次多即授印綬丞相韋見素表公可用牧民詔攝安州刺史考績既成真拜均州治中遷鄧州康允之叛南土大擾公會諸將以王命討不臣尺兵不喪凶黨大壞宛鄧之閒民到於今受其賜上方勤恤下民重二千石之任不暇登公於朝由是歷隨曹婺三州三州輯寧徵傅韓王王德既宣出為梓州又換明州時越初靜瘡痍未復公務穡勸分人安懷之及其去也如奪乳育嗚呼公凡歷官一十有四其剖符分憂者八享年七十其為人也剛毅寬明惠和而清所至之邦先以禮後以刑使人遷善遠罪而不知其止君子曰古之良吏也初公無允子命兄子某為後八年冬十月某奉公之喪反葬於河南萬安山之陽夫人博陵崔氏秦州掾孝之女既笄而歸於我以宣慈恭順聞享年五十先公而歿公為明州之二年以夫人之喪反葬萬安至是祔焉禮也夫惟天地之道可久若陵谷則無不遷也遂銘曰於惟公先實曰庭堅作舜五臣為唐八元周道不行伯陽西遷晉失其政涼興勃焉武昭之孫宋州之子如珪如璧如松如梓爰在下位令聞亹亹帝曰休哉命牧南鄙在鄧有亂惟我行師寇戎既夷剖符於隨曹無罷人婺有去思或傅或藩受命咸宜爰自東南薄言旋歸謂天聰明胡不憖遺節彼萬安松柏丸丸猗歟齊姜同穴其閒橫峙惟松旁流洛川銘勒金石永昭億年
