front:
  text: 全唐文欽定全唐文卷五百二十六涗貞元二年官尚書右司郎中
  hash: sha256:47a2a592cba49b0f2802184befc05f31d0f68c8bfb072d11790b23d9ff662c42
  markers:
  - {type: head, offset: 14, content: 嚴涗, id: KR4h0168_NFKB_526-h1, level: 1}
body:
  text: 謹按李紓所奏援引訓典比較禮度祝文輕重之殺獻官尊卑之節誠至當矣推而廣之抑未盡也夫大名徽號先聖所以裦前哲令德之人謂其言可以範圍其行可以施百世其業可以振千古苟未至也則不虛美其於太公兵權奇計之人耳當殷辛失德八百諸侯皆歸於周時惟鷹揚以為佐命在周有大功矣於殷謂之何哉祀典不云乎法施於民則祀之如仲尼之祖述堯舜憲章文武刪詩書定禮樂使君君臣臣父父子子後王及學者皆宗師之可謂法施於民矣貞觀中以其兵家者流始令磻溪立廟開元中漸著上戊釋奠之禮其於進寵不為薄矣上元之際執事者苟以兵戎之急遂尊武成封王之號擬議於文宣王優劣萬殊不可以訓禮不云乎儗人必於其倫太公之於聖人非倫太史公以韓非與老子同傳民到於今非之高祖封韓信為侯自恥與絳灌等列况聖朝裦美之稱其可雷同乎愚以為宜去武成及王字依舊令為齊太公廟人無閒言矣享獻之事餘依李紓所奏巽字令叔趙州贊皇人以明經調補華州參軍登拔萃科順宗朝官兵部侍郎領鹽鐵轉運使遷兵部尚書徙吏部元和四年卒年六十三贈尚書右僕射得湖南院申郴州平陽高亭兩縣界有平陽冶及馬跡曲木等古銅坑約二百八十餘井差官校覆實有銅錫今請於郴州舊桂陽監置鑪兩所採銅鑄錢每日約二十貫計一年鑄成七千貫有益於人夫諡所以昭德也德既昭矣則文無以加焉故相國鄭公端操特立寡言慎行及居台司有蠲逋恤人之美有知難不汙之節雖無文若之進拔無孟子之是非無賑施之仁無蹇諤之義然足以稱賢相也夫文者大則經緯天地次則潤色王猷周文以至德為西伯季孫以道事其主咸諡曰文為美無以尚也亦焉用兩字然後為備哉竊觀兩字之諡或有兼德一字不足以盡盛德之形容故有兩字生焉然亦興於近古非三代兩漢之事也夫舉典之道信其正不信其邪春秋之大旨也則兩字之諡非春秋之正也故相國鄭公之諡為文足矣焉用獻哉為獻可矣焉用文哉兩字兼諡竊所未諭請下太常重定謹議議曰鄭珣瑜兩字之諡今太常請依前諡曰文獻者夫諡者春秋裦貶之旨也仲尼書法隨類推廣雖一字裦貶其文猶博蓋欲指明事業以昭示後代俾後之人懲其惡勸其善故不可苟夫諡一字正也堯舜禹湯周公召公是也兩字非正也故諡法不載或人臣不守彞章苟逞異端威烈慎靚是也或時主之權以功德加厚於臣也蕭何霍光房元齡魏徵是也不當加而加僭也孔光劉寬薛元超李元紘是也三字過也貞惠文子是也亦諡法所不載也古今無有也公叔文子諡衞君之過也衞之亂制也不然即記之失也以一善加一字即堯舜禹湯當累數十字以為諡也夫禮記者非盡聖賢之意也非盡宣尼之所述也當時雜記也昔后蒼為曲臺記其弟子戴聖增損刊定為小戴禮今禮記是也若盡宣尼之所述即戴聖豈得而增也昔宣尼修春秋游夏不能措一詞以知禮記非盡宣尼所述故戴聖得以增損也則貞惠文子之諡衞君亂制也古今無有也非宣尼所述又何足法哉鄭珣瑜和茂修整始終無闕可為美矣至於議行考功而度越等輩比於酇文成梁文昭魏文貞則不侔而諡號無差輕用國典失春秋之旨矣向者酇梁數公皆經綸草昧輔翼興王以道輔君致於化洽彰灼千古言之者凜然生敬而以珣瑜齒之豈無愧於心哉夫數公者皆時主感風雲之會懷謨明之美故加於常典以明其德亦所以篤君臣之義也然非正也權制也若後之人非數賢之比則當循常以避數賢地也其劉仁軌薛元超李元紘加字之諡皆黷國典而昧彞倫言之可為寒心豈當舉之以為訓也其餘姚元崇宋璟劉幽求或輔相一代致理平之化或忘身狥難成中興之業又豈珣瑜之以典選為進善以辭疾為嫉惡耶皆尚口偽辯非守典確論也夫以典選者皆為進善耶若然者則國家有天下二百年何裴行儉馬戴盧從愿等數賢獨見稱於時也循資署置謂為進善異乎余所聞也又珣瑜之病數月而終豈偽疾耶借使偽疾尤可怪也昔子路之冗食家臣有殺身狥難而珣瑜履台輔之重當危難之際平居則饗其高爵厚祿見危則奉身自保以此為是非之明即董狐之書趙盾為妄作也珣瑜之辭疾可責於太常舉以為德信君臣之義非常人所知也珣瑜之下詰李實誠中其疾可謂美矣然則珣瑜自始筮仕至於啟手足垂四十年歷諫職持風憲其忠規激發恐有過此者今太常舉其下詰李實未為多也謂為謇諤者眾矣豈能使汲黯魏徵有慙色哉前巽議云三代兩漢無二字之諡此未學之過也無荀文若之進善無孟軻之是非無文子之賑施無周舍之謇諤以珣瑜之行清而無闕可為掩之不足辯也今所議兩字之諡亦又不當其議固不足斥也前巽之言過矣但兩字之諡加等之美以蕭何房元齡言不在珣瑜也巽雖不敏至於言諡美以惑人聽此嘗所激切而不平也終不欲有僭齒於蕭何房元齡之宗又不欲有造次擬於魏文貞姚元崇宋璟劉幽求之讜言悟主茂績殊勳也夫前車之覆後車所以易轍也前有司之失後有司當有以矯之也不矯之則逶迤遂達以至亂制此有國之誡也威烈慎靚孔光劉寬薛元超李元紘之同於禹湯文武蕭何霍光房元齡魏徵前有司之過後之專筆削者宜有以矯之也不矯之典禮寢亂矣有司不可以尤而效之也不可以黨所見而遂僭典也鄭珣瑜兩字之諡請下太常重議若一字不足盡珣瑜之盛德必須兩字則敢俟再告謹議數月不面延企為勞夏首漸熱惟動履安勝巽弊㞕推遣疑昨者不揆薄劣輒上薦賢之書恩命拜足下太常寺奉禮郎充南昌軍副使官告已到惟增感慶巽不任忻愜足下義高德茂文藻特秀棲遲衡茅之下藉甚寰海之內信儒者之徽猷聖朝之公器而元纁束帛偶未至者蓋匡阜則邇符君甚遠巽謬臨此地閒接清風激揚多矣向非章疏上達則麟足無由絆然奉常之拜亦吾子他日九層之資也但以俯倅吾軍為執事者之累幸當猥降允副夙誠冀即傾展差浣勤矣謹差押衙任進朝奉侍官人馬馳狀進迎使至奉覽來疏何乃華其詞潔其志未酬所獻壹至於是區區之意竊有所未然足下之所然也夫洪鐘遇扣大小必應良劒赴剸泥玉一切知已許與有類於斯細詳足下之旨徒仰矯榮命俯稽誠禮其所難者但慮側猿鳥之目咽㵎泉之溜何嘗以阻鄙夫之誠為念辱眾君子之望為意乎且足下之守儒行也亦嘗聞尼父以司寇為汙己俾升堂者細百里而不宰乎然丈夫立身之本正在執德義樹功業而已今足下德義已著而功業未樹其在忽歲月而貪疎曠時至而不行也以足下才德之美僕素高山仰之豈不能薦足下於朝立可觀之地矯翼霄漢躍鱗清流以成雅志哉意之所趣輒有所在方今聖主聰明春秋鼎盛百王術內六合掌中而近郊跋扈尚或乖化夫主憂臣辱抑所忿憤故僕私心期足下於遠圖大計耳謹當虛心假寐灑埽庭館奉候而已且今之惠然猶往之見辱無㞕意也屬書有畏不果躬詣所居幸垂見悉再馳狀皆損還答承抗跡未降虛懷猶鬱足下有器業可以資時松筠之質有異蒲柳然白駒驟過良時易晚昔夫子從政亦不待韋編三絕况僕虛薄忝承朝寄懼於覆壓寤寐良賢實冀推明道德俾助薄劣故延仰之誠有加常旨敢更誠情所望虛副幸甚諸己再具故不煩云謹差散將葉公著敬候并官告衣服僕馬等延首北睇以得為榮惟垂昭省不宣李巽重次公字從周河中河東人第進士累遷殿中侍御史憲宗朝進尚書左丞以檢校工部尚書為淮南節度使元和十三年卒年六十六贈太子少傅諡曰敬清渭天鑿名都王制貫金城千里之域寫銀河九霄之勢同穴發源眾川潛泄分黑水以渺漫遶黃山而迢遞水能濟物用導於中州君德配天故法於上帝都之會也皇皇渭之流也湯湯異東西之瀍㵎非汲引之沮漳夏后濬川分流非肇於伯禹秦德王水貫都必因於始皇照雙鳳之丹闕架長虹之飛梁褰裳者不勞於揭厲濯纓者何必於滄浪泛彼樓船掩橫汾於武帝濱之釣叟感入兆於文王且夫前王酌憲惟皇都之所建度地有孚因貫渭之上腴曲抱乎周原秦野旁臨乎八達九衢既流衍以紅粟誠輝煥乎黃圖則知八水皆流豈清於渭水五都並制莫大於西都原夫渭者雍之巨浸都者人之所聚天垂法君必取曳雲閒之清渭何殊雲漢移天上之紫宮洞開天府及乎縈流一帶中派紆餘蕩元氣澄太虛稽前典而備矣於名川而舍諸豈惟積潤於庶物固亦近壯於皇居至乃春景澄廓晴霞朗暢涵萬象於影中渡牽牛於波上客有觀光者於茲而寫望美夫取法可仰因天垂象疏紫陌而逶迤流丹霞而蕩漾周公卜洛雖云風雨所交秦后貫都實謂膏腴之壤惟洪業之永固與渭流而彌廣元佐滑州匡城人少從永平軍為牙將建中初充宋亳潁節度使檢校尚書左僕射同中書門下平章事加汴宋節度使陳州諸軍行營都統本名洽至是賜名以尊寵之貞元三年為養子樂士朝酖死年五十八贈太傅諡曰壯武宣武者天下咽喉國家之襟帶元凶傑逆竊弄神器洽與五軍大戰幾落姦便走馬奔馳分為擒虜昔燕昭王收燕之餘人欲報強齊雪先人之恥折節下士卒招賢俊築壇拜節郭隗為師於是樂毅自魏而至燕國既安人民樂為用也以樂毅為上將軍糾合諸侯共伐齊下其七十城今洽為國除殘去害天借賊機官軍不振賴中丞異代閒生夷凶翦暴心貫白日功高一時請迴洽官爵並與中丞泰貞元二年官御史中丞准儀制令泥雨合停朝參伏以軍國事殷恐有廢闕請令每司長官一人入朝有兩員并副貳亦許分日其夜甚雨至明不止許令仗下後到外廊食訖入中書其餘官及王府長官並請停朝任於本司勾當公事泥雨經旬亦望准此元一德宗時人著有奉天錄四卷緬尋太古之初真源一味自然朴畧不同浮華雖垂不載至軒轅氏征蚩尤而廓清四海帝舜黜有苗而定萬邦逮乎三王則弔人伐罪暴秦則并吞天下漢高祖夷凶靜難光武討叛懲姦魏武破袁紹晉武滅苻堅宇文氏破高歡普六茹氏平陳國太宗擒王竇肅宗定安史故曰亂者理之源失者得之府法令施而逆子誅春秋書而賊臣懼建中四祀朱泚作亂居我鳳巢忠臣義士身死王事可得而言者哉咸悉載之使後來英傑貴風義而企慕承危伺隟與時浮沈者其徒非一正史備書故闕而不錄志懷問鼎者不敢漏網夫書直筆直言無矯無妄欲使朱藍各色清濁分流質而不文焉敢潤色恐史筆遺漏故備闕也李忠臣三朝名將忽為叛主之臣洪經綸累代通儒乃作趨時之士其餘源休蔣鎮之輩敬忠日月之徒蓋㞕㞕者何足道哉每思南史之筆班馬之作莫不廢食仰歎且洪流壞隄猶可塞也烈火燎原尚可撲也逆臣賊子難可邇也睹此妖孽搖動中原莫不痛心疾首是用書之素使好我者慕惡我者懼元一代居關右世業三秦親覩欃槍媸妍必記雖形闕奉親而內懷其孝身乖事主而心荷聖恩每覽嵇紹紀信之高義感千載而仰慕尋淖齒王敦之遺跡思奮劒而快心疾惡之志不忘寤寐起自建中四祀孟冬月上旬三日涇原叛命終興元元年孟秋月中旬有八日皇帝再復神都於中可否總紀其事也夫史館之筆才識學也苟無三端難以措其手足元一不敏敢竊鳳凰之一毛以效麒麟之千里獨學而無知孤陋而寡聞跡不踐於孔門文有慙於先哲輕塵罕增於巨岳墜露無益於廣川輒申螢燭之光將助太陽之照述而不作有媿老彭冀革前非用警來祀云爾華德宗時人高彥昭為寧陵西城都知鎮遏使辟為判官城於西北壘道更高左擊右攻平視城內日夜交戰以棚為牆鋒刃相持不踰咫尺伏惟僕射去食存信救此孤城遊魂之年返骸之日謹錄狀上伏聽處分泚幽州昌平人以蔭籍為李懷仙部將大歷七年拜盧龍節度使封懷寧郡王入朝進同中書門下平章事出屯奉天遷檢校司空隴右節度副大使仍知河西澤潞行營兵馬事德宗立改鎮鳳翔加中書令進拜太尉涇原節度使姚令言督兵討李懷光過闕下兵叛迎泚入宣政殿僭位改號既為李晟所破走保彭原西城斬之年四十三昔文王囚於羑里終王八百之基殷湯繫於夏臺後有解網之頌吾頃典郡四鎮蕃夷戰懾唐主不察信諂諛之說吾罹姦臣之禍便奪兵權雖位列上公詔書繼至情懷恍忽百慮攢心何期天道盈虛五運更代物極則返憂極歡來歷數在躬以登寶位涇原四鎮士馬爭驅隴右鳳翔獻書繼至三秦之地指日剋平吳蜀之閒已令宣示河北一路用卿殄除布新令以示之推利害以誘之懸爵賞而招之張皇威而逼之驅鐵騎以臨之橫行洛陽與卿大會於定鼎滔幽州昌平人兄泚盧龍節度使滔勸泚入朝遂權知留後兼御史大夫進檢校司徒領節度賜德棣二州封通義郡王田悅叛滔及王武俊李納同謀滔自號冀王既而與武俊有隙武俊擊滔敗走還幽州上書待罪詔免之貞元元年死年四十二贈司徒今月八日大秦皇帝已登寶位關西四鎮應歀附請為臣妾惟奉天孤城危同累卵不有廢也將何以興今披讖應圖則鼎新之兆先也同夫夏俗待我后以來蘇今發突騎元戎四十萬奮劒與夕火爭光揮戈與秋月競色長驅北至洛陽與皇帝會蹕於上陽宮牒魏博恒冀等州將士即宜擁節歸朝達於先覺必使勳流奕葉榮及子孫如或固守窮城不識天命必使覆巢破卵易子析骸請看今日之長安竟是誰家之宮闕太山如礪可知非石之言秋日麗天不易勤王之意闢字太初貞元中擢進士宏詞科佐韋臯幕府累遷御史中丞度支副使永貞元年臯卒闢主留後諷諸將上表徼旄節授檢校工部尚書充劒南西川節度使又求都統三川遂舉兵圍梓州宰相杜黃裳薦高崇文李元奕等討之元和元年九月闢遁走擒送京師誅之聖之求賢也詳明水之受物也柔順石遇柔而不阻臣俟明而必進漢祖興兮昌言納留侯輔兮皇威振喻石水以興詞配鹽梅而稱雋堅脆性異應廣納而來投尊卑禮殊致精誠而取信伊水為體既清而平猶君為德既貞而明石豈自投假海納之宏量臣非苟進由天聽而察誠用率於有類將感於無情虛而受者其理遠含而容者其道行何幽邃之能閒奚渺瀰之足驚夫國之勃興必多賢智繼九臣之跡膺三傑之義煥發英藻呈龍章與鳳姿敬宣嘉猷謂嶽生而天賜豈不由山有巨石水有通津忽擊流以澎湃俄荅響於奫淪雖源深流長乃入無不至而體柔處潤則托有所因移他山之貞質依上善之全仁夫水石之奧旨與君臣之等倫今天子端居穆清時和海晏念投石之契爰求秉鈞思箴闕之規載徵驟諫由是如石之義啟投水之情通彼以誠應我亦符同懸天爵之榮獲斯人瑞尊五嶽之禮視乎上公恒啟沃以為志方清明而在躬比石固業欽賢纘功儻或水不周容石乃無由寓質君不虛已臣則曷能推忠可以垂誡訓可以流德風則知聖既作兮政惟恒石既投兮賢必澄敢獻良哉之詠願揚美於廉能之奇寶應中進士馬燧辟置幕府後汙朱泚偽命為兵部員外郎咨爾多士各司厥官政不欲猛刑不欲寬寬則人慢猛則人殘寬則不濟猛則不安小惡無為涓流成池片言可用毫末將拱禍既有胎福豈無種鏡不自照祗能鑒物人不自知從諫勿咈慾不可縱貨不可黷黷貨生災慾縱禍速勿輕小人蜂蠆有毒勿輕小道大車可覆勿謂剛可長長剛者亡無謂柔可履履柔者恥剛強有時柔弱有宜時宜克念願在深思不恕而明不如不明不通而清不如不清無為惡行無逆善名保此中道無成不成過客箴士冀申同聲如山之重如水之清如石之堅如松之貞如劒之利如鏡之明如弦之直如秤之平奉天殘黨蟻聚京畿重傑等仍敢執迷拒我天命朕使偏師小將果復敗亡觀此孤城不日當破雲羅布網無路鳥飛鐵釜盤魚未過瞬息宣布遐邇各使聞知經綸建中初為黜陟使朱泚反偽授太常少卿登於大岯合巾所經過頂凸坤儀根壓洪河天生忠良濟物宏多山靈河神俾環海戢戈贊建中時為吏部郎中黜陟使貶播州司馬貞元中位戶部侍郎箴論表贊代詩賦仍各試策三道應口問大義明經人明經之目義以為先比來相承惟務習帖至於義理少有能通經術寖衰莫不繇此今若頓取大義恐全少其人欲且因循又無以勸學請酌舉司舊例稍示考義之難承前問義不形文字落第之後喧競者多臣今請以所問錄於紙上各令直書其義不假文言既與策有殊又事堪徵證憑此取舍庶歸至公如有義策全通者五經舉人請准廣德元年七月勅超與處分明經請減兩選伏請每歲甄獎不過數人庶使經術漸興人知教本伏以舊制置倉儲粟名曰常平軍興以來此事闕廢因循未舉垂三十年其閒或因凶荒流散餓死相食者不可勝紀古者平準之法使萬室之邑必有萬鍾之藏千室之邑必有千鍾之藏春以奉耕夏以奉耘雖有大賈富家不得豪奪吾人者蓋謂能行輕重之法也自陛下登極以來許京城兩巿置常平官糴鹽米雖經頻年少雨米價不復騰貴此乃即日明驗實要推而廣之當軍興之時與承平或異事須兼儲布帛以備時須臣今商量請於兩郡并江陵成都揚汴蘇洪等州府各置常平輕重本錢上至百萬貫下至數十萬貫隨其所宜量定多少惟置斛斗疋段絲麻等候物貴則下價出賣物賤則加價收糴權其輕重以利疲人並請諸道津要都會之所皆置吏閱商人財貨計錢每貫稅二十文天下所出竹木茶漆皆十一稅之以充常平本貞元三年秋七月壬申丞相張公薨於位冬十月乙酉闕二字於闕直其北一里嗚呼往而不作哀可極也歿而不朽德之盛也公諱延賞字延賞河東猗氏人漢闕部尚書中書令贈闕二字都督諡曰恭肅光輔闕二字成開元之理公三闕臣器公而薦闕二字本名寶符元宗召見奇之且思恭肅之德故錫茲嘉名解褐闕太師苗韓闕三字碩德深於知人見闕一字歎異申以姻好及闕一字山作難公闕城邑公有闕五字鎮北都公闕二字倅兼副尹守入拜給事中襲封河闕三節度兼闕七字書建中闕二字起輦轂駐蹕近郊以公闕一字力竭闕時都邑闕七字倚重於蜀故闕二字仍領遙闕二字計闕三字乘闕寇戎闕十字危㣥心尤切闕聽遠邇相闕三字之化時情所屬闕弔賻有加闕二字護喪事闕聞闕一字震闕四字泫云爾太闕黍繁闕一字躬為律度闕二字知禁德禮闕康之闕三字如東周之禮其在荊楚也闕遺愛成頌皆因俗施政而同歸於中其闕奪其闕五字昔方叔山甫成中興之業而闕二字因時闕若星辰闕一字穹若山岳斯可謂歿而不朽者夫詩云惠此中國以闕備盡無違之孝遺令薄葬布衣瓦器以終予志祁國夫人太師之闕二字德輔闕目所及皆為實錄其詳則制詔璽書歷鎮碑記及家傳備矣今闕太保受氏滔滔其流本系軒轅冑分留侯闕皇天太保嗣烈克光前人勤勞王家宏濟艱難外危我將內闕種厥德閭閻懷思周愛甘棠荊淚空碑况乃松檟闕四字崇山闕一字石終卜闕字溫如河中寶鼎人累遷楚州刺史建中初拜司農卿改太子賓客出為嶺南觀察使卒年七十四贈工部尚書當府館驛準永泰元年三月京兆尹兼御史大夫第五琦奏使人緣路無故不得於館驛淹留縱然有事經三日已上即於主人安置館存其供限如有家口相隨及自須於村店安置不得令館驛將什物飯食草料等就彼供給擬者伏以承前格敕非不丁寧歲月滋深因循久弊今往來使客多是武官踰越條流廣求供給府縣少缺悔吝坐至屬當凋殘實難濟辦况都城大路耗費倍深伏乞重降殊恩申明前勅絕其僥濫俾懼章程庶郵驛獲全職司是守峴貞元三年試太常寺奉禮郎唐貞元三祀五月故長豐宰李君丕卒於幽州潞縣嗚呼逝水古今悲夫公隴西人也世襲軒裳地清才幹曾祖知禮宣州司功參軍祖懷璧汴州陳留縣丞考某許州鄢陵縣令公灑然深心抱義育德士林咸器重之乃昌言薦於元戎遂徵辟為潞縣丞佐理高標令名遠著後墨綬長豐化百里之風樂四人之業俄改任莫州司法參軍蘇息萌隷鈐鍵奸譎凡登仕踐位時議茂宰良掾也每處其厚不居其華果行溫良發言砥礪豈期餘慶罔祐而禍兮有階故鵬鳥作孽二豎為祟沈疾於故林私第即代之日春秋六十有三無嗣夫人元氏晝哭靈帳恨無三從傷肝膈之痿憒痛終身之惸獨長女適河東柳氏名峴試太常寺奉禮郎感深仁之厚恩盡半子之禮節力窆棺櫬手植松槐扶塗車封馬鬛粵三年建子月葬於縣之南三里潞州之右託一片之琬玉紀平生之徽猷俾山壑之變風烈有遺而為銘曰屹然孤墳長城之東死生永隔天地不同于嗟英靈窮泉之中悄悄原野旦暮悲風濟字濟幽州盧龍軍節度副大使怦子第進士嗣節度貞元中累遷左僕射同中書門下平章事順宗立檢校司徒元和初加侍中兼中書令濟疾次子總酖殺濟年五十四贈太師諡莊武我大唐十有一葉皇帝繼明照宣闕二字光被四海神人以和逮今已丑歲凡五祀矣方隅守臣樂其休明天地大德罔知攸報濟封內山川有涿鹿山石經者始自北齊至隋沙門靜琬睹層封雲跡因發願造十二部石經至國朝貞觀五年湼槃經成其夜山吼三聲生香樹三十餘本其年六月瀑水浮大木數千株於山下遂構成雲居寺焉既而元宗開元聖文神武皇帝第八妹金仙長公主特加崇飾遐邇之人增之如蟻術焉有為之功莫此而大濟遂以奉錢為聖上刻造大般若經以今年四月功就親與道俗齊會石經峰下飯等香積而法雲藹空會同華嚴而花雨滿地金篆玉板燦如龍宮神光曜日宇宙金色於是一口作念萬人齊力巖壑動鸞鳳翔或推之或挽之以躋於上方緘於石室必使劫火燒而彌固桑田變而不易或資聖壽壽願比於崇山緘於石經經願延於沙界鴻祚景福聖壽無疆幕府眾君子同稱讚之時元和四年四月八日記堅貞元九年左神策鹽州行營節度使初城鹽州鹵中獲懷土又置烽堡水路迴遠即時有兩廢鹽井悉生鹽事符聖德可謂天贊請付史館
