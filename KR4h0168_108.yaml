front:
  text: 全唐文欽定全唐文卷一百八後唐明宗三
  hash: sha256:34cff2061eb012f01a0a23d27585521782020efeb2215861f644f959ab4d1a02
body:
  text: 天下兵馬大元帥尚書令吳越國王錢鏐本朝元老當代勳賢位巳極於人臣名素高於冊贈典既無其官爵易名宜示其優崇即令所司定諡曰武肅仍以王禮葬供奉官陳延矩回覽所奏遂閬黔夔等州自此差來所屯軍都將士等當府巳厚給衣糧盡令優足其指揮都頭各隨職次悉以安排雖因事以在川固係籍而為國但念各有家口骨肉在本管軍營居此者巳有生涯在彼者寧無離戀伏乞敕見在營幕放前件將士家口入川等事具悉切自釁起梓綿災延巴蜀繇茲姦賊纍我藎臣阻渥澤以不通搆猜嫌而莫解果招神感自就天誅卿有勇有謀克忠克孝雖偶遭詿誤而每切推崇率師徒而繼殄鄰凶貢表章而尋輸臣節兼以諸方戍卒皆厚給於衣糧數道王人亦優加於供待周勤若是嘉歎良深并奏人名巳係兵籍朕既推誠而待物卿方盡瘁以事君卿安即是朕安在彼何殊在此所謂家眷東地更乞發遣西行既覽奏陳固議俞允尋命宣茲表意採彼輿言皆以久抱暌離極思團聚但以捨茲九族就彼一身雖絲蘿琴瑟之情分飛甚苦而松柏邱園之戀拋棄尤難又知巳有生涯恐虞却相棄擲況聞兩川曾經戰鬬必有殺傷既難輕議於往來兼恐不實其存沒切恐去不相見住無所依轉令兩地之困空盡致一家之沈沒聞茲哀訴又可憫懷其如口數頗多地里極遠如或正身自來般取即應此輩不貯憂疑卿可體彼人情詳茲物理妙加籌度貴叶便宜故茲詔示想宜知悉據所奏以文武之將寮希尺寸之官賞請卿自稱王爵權行制書卿以未經先奏於宸聰不欲便加於衆意却緣熊羆之武旅懷鐵石之壯心或立功勞須加爵賞難以具排官氏繁奏聖聰敢希顯降明文許行墨制亦自朝廷之成命委藩翰以奉宣凡有施行後當聞奏免憂迢遞庶從便宜等事具悉卿等最親最舊不溢不驕爰自中興夙參佐命厭大權而不處守高節以自全成茲令名標於信史洎總茲千乘鎮彼一隅不將富貴為心惟以邦家是念盡血誠而推戴竭土産以貢輸每念忠良正深繫賴忽被董璋之逼迫遽令蜀郡以攜離卿雖外合元凶而內全大節文翰每深於恭敬使臣盡厚於接延兼聞曾興議於東川欲拜章於北闕彼既他說此難獨行察卿此際之誠契朕從初之料今則詔書才降章表繼來阻推勸之衆情高辭王爵執變通之獨見遠貢臣誠去假號而就真封抑異端而全大計非卿不能斷此意非朕不能悉此心載閲敷陳備詳披瀝自然可久可大傳子傳孫長為一面之藩維永作四方之表式其文武將寮等或武有折衝之術文多經濟之材咸能贊佐元戎削平大憝功勳顯著酬奬必行所請權行制書貴從宜便雖隨方設教叶遠藩衆庶之情而引古證今異本朝全盛之事切念道途久絶人使才通在朕方務於綏懷於卿固無於愛惜緬思盡節必認注心自今巳後劒南諸道應節度使刺史并州縣官軍府文武將吏等或升降賢愚或黜陟功過一切委卿逐便選擇差署施行訖奏朝廷更不除人豈惟叶彼權宜抑亦表吾委任故茲詔示想宜知悉據所奏節度副使知武泰軍節度兵馬留後趙季良馬步諸軍都指揮使知武信軍節度兵馬留後李仁罕左廂馬步都指揮使知保寧軍節度兵馬留後趙廷隱右廂馬步都指揮使知寧江軍節度兵馬留後張知鄴衙內馬步都指揮使知昭武軍節度兵馬留後李肇等臣各以署列藩委之共理伏乞特頒詔令各降真恩儻蒙委以節旄則望付臣宣賜仍希眷澤各轉官階等事具悉卿前鎮彼遠方迫於近患欲作婉成之計須為苟合之容果中含宏自貽誅戮趙季良等體卿忠孝感卿撫綏或獻謀於帷幄之閒或效勇於鼓旗之下賴茲奮發致彼廓清今則才翦凶徒尋輸忠節雖知祥之通變亦季良之贊成況彼皆是重藩並難虛位言念數子參佐一心不惟功合奬酬兼亦材堪任使但能致理何爽從權所委留司悉諧朕意應希渥澤並可允俞但緣卿自建大功未加殊寵即俟相次便與施行其旌節官告等更不差使頒宣亦便委卿分付所乞墨制巳從別詔處分故茲詔示想宜知悉王者法天而育兆庶體地而安八紘允執大中式彰無外斗極正而衆星咸拱溟渤廣而百谷皆宗所以居戴履之倫窮照臨之境宏道修德恭已虛懷歸心者眷為王人嚮化者被以風教由是舉封崇之命稽旌賞之文垂於古先罔敢失墜其有地稱平壤師擅兼材統五旅之強宗控三韓之奧壤務權鎮靜志奉聲明爰協彞章是加寵教咨爾權知高麗國王事建身資雄勇智達機鈐冠邊城以挺生負壯圖而閒出山河有授基址克豐踵朱蒙啓土之禎為彼君長履箕子作藩之跡宣乃惠和俗厚知書故能道之以禮義風驍尚武故能肅之以威嚴提封於是謐寧生聚以之完輯而復行及唇齒分篤皮毛忿黠虜之挺祅恤鄰邦而救患矧以披肝效順秉節納忠慕仁壽以康時識文思之撫運海航深險輸眷貢琛繼陳述職之儀茂著勤王之業夫推至誠而享豐報道之常也奠真封而顯列國禮之大也勞有所至朕無愛焉今遣使太僕卿王瓊使副太府少卿兼通事舍人楊昭業等持節備禮冊命爾為高麗國王於戲作善天降之祥守正神祚之福干戈慎於危事文軌資於遠謀永為唐臣世報王爵往踐厥位汝惟欽哉卿珠樹分輝金鉤協兆領日邊之分野冠海外之英雄士心同感於撫循民意咸歌於惠養而又誠堅事大志在恤鄰秣馬利兵挫甄萱之黨分衣減食濟忽汗之人繼航海以拜章每充庭而致貢金石之誠明貫日風雲之梗概凌空名播一時美流四裔志規若此賞典寧忘特議疏封仍升峻秩翦桐圭而錫命目極蓬山眷桃野以傾思心隨濟水勉祗異禮永保崇勛今授卿特進檢校太尉使持節元莬州都督上柱國充大義軍使仍封高麗國王今差使太僕卿王瓊使副太府少卿楊昭業等往彼備禮冊命兼賜國信銀器匹段等具如別録至當領也卿長淮茂族漲海雄蕃以文武之才控茲土宇以忠孝之節來稟化風貞規既篆於旗常寵數是覃於冊如綸如綍巳成虎穴之榮宜室宜家足顯鵲巢之美俾頒湯沐以慶絲蘿永光輔佐之功式協優隆之命諒卿誠素知吾渥恩卿妻柳氏今封河南郡夫人朕以王建星雲稟秀金石輸誠信義著於睦鄰忠孝彰於事大領三韓之樂土每奉周正越萬里之洪波常陳禹貢勳名巳顯爵秩未崇宜寵錫以桐圭俾真封於桃野今封授高麗國王差使往彼備禮冊命便令慰諭想宜知悉朕猥以眇躬虔承丕構統臨區宇帛丿糸歷星霜九有所賓萬務思理鑒往代廢興之本稟前王嗣守之規馭朽索以兢懷攬宵衣而惕慮顧惟寡昧罔敢怠荒而猶帝道未臻皇猷罕著至於五兵銷偃九穀豐穰內繇調燮之功外假勳賢之力豈茲涼德擅彼徽名今則漸冀小康將凝大化諒繄台輔俾契混同何乃遽貢飾辭爰加溢美乍披來奏深匪素懷致君不在於斯文尊主寧勞於懿號未若罄舟楫濟川之業竭股肱宣力之誠使化被八荒澤及四海武功文德感叶於休期君賢臣忠永懷於良史今茲來請具驗乃心徒切歎嘉必難依允所上尊號宜不允八表來王蓋率朝宗之義四方述職咸遵任土之宜苟獻奉之過常固煩費而滋甚將隆景運以俟雍熙但思於碎枕焚裘豈悅於珍禽異寶德宜從儉法在鼎新起今後中外臣僚藩部牧伯時節獻賀量事達情不得掊斂生靈致令愁嘆鷹犬之類勿有進獻京都之內古無郡城本朝多事巳來諸侯握兵自保張全義土功斯設李罕之寨地猶存時巳擴清固宜除剗若特差夫役又恐擾人宜令河南府先分劈出舊日街巷其城壕許占射平填便任蓋屋宇其城基內舊有巷道處便為巷道不得因循妄有侵射仍請射後限一月如無力平剗許有力人戶占射平填本朝舊日趨朝官置待漏院子城門開便入立班如遇不坐前一日晚便宣來日兩衙不坐其日才明閣門立班便宣不坐百官各退歸司近年巳來雖遇不坐正殿或是延英召對宰臣或是內殿親決機務所司不循舊制往往及辰巳之時尚未放班既日色巳高致人心咸倦今後若遇不坐日未御內殿前便令閣門使宣不坐放朝退班古者酌禮以制名懼廢於物難犯而易避貴便於時況徵在二名抑有前例以太宗文皇帝自登寶位不改舊稱時即臣有世南官有民部靡聞曲避止禁連呼朕猥以眇躬託於人上止遵聖範非敢自尊應文書內所有二字但不連稱不得回避如是臣下之名不欲與君親同字者任自改更務從私便庶體朕懷五日起居之意所貴數見羣臣俾陳時事憲司所奏朔望入閣等事既合往例得以允俞其五日一度起居之際班行內有要奏事者便出行奏對仍付所司漢朝升沛魏祖封譙當化家為國之時行奉先思孝之道眷惟應郡跡乃帝鄉宜師古而建邦亦推恩而及物俾崇國本以洽人情其應州宜置彰國軍節度仍以興唐軍為寰州隸彰國軍朕以方平區宇念切蒸黎頃當災歉之餘未絶瘡痍之苦緬惟邦本實繫官常苟未致於雍熙則莫寧於宵旰必在委於良吏付以親人儻縱因循轉成勞擾先朝以選門興訟駮放極多近年以來銓注無幾遂致諸道州縣悉是攝官既無考課之規豈守廉勤之節而況多因薦託苟徇顏情替罷不常送迎為弊殘人害物以日繫時言念所深焦勞何巳宜令三京及諸道州府據見任攝官如未有正官具差攝月日録名申奏如巳後或為公事及月限巳滿要行替換即須具因繇并選差攝官自來歷任姓名聞奏替免無得頻有替換如有內外臣寮輒行薦託並不得應副儻聞違越當舉憲章昨帝室廠田坴災生民受弊方茲纘紹務切撫寧尋降德音復宣明敕貴先求瘼務在推恩其或長吏因循公方撓雜何繇致理徒有怨咨是宜再諭賞刑納言利病事或違於條制法必振於紀綱宜令三京諸州府並準此處分久雨不晴慮傷農稼可申命禱禜仍曉諭天下州府疏理繫囚無令寃滯貢院擢科考詳所業南曹試判激勸為官劉瑩等既不工文合直書其事豈得相傳槀草侮瀆公場載究情繇實為忝冒及至定期覆試果聞自懼私歸宜令所司落下其所給春關仍各追納兼放罪許再赴舉兼自此南曹凡有及第人試判之時切在精專點如更有效此者準例處分自秋涉冬稍愆雨雪慮傷宿麥宜令禱祠分遣朝臣告祠羣望宜付所司朕以近纘皇圖恭修帝道務安夷夏貴洽雍熙契丹王世預歡盟禮交聘問遽聞凶訃倍軫悲懷可輟今月十九日朝參敕應天下州使繫囚除大辟罪巳下委所在長吏速推勘決斷不得旁追證對經過宿食之地除當死刑外並仰釋放兼不許徵理天成元年四月一日巳前私債所降德音節文仰三京諸道分明宣布於要害道路榜壁不得漏落今則尚聞違犯其後來相次條理諸道事件皆關念及生聚布以優恩多因州使幸門淹留敕命或公然隱匿全不施行官吏但習舊風百姓罔知新命宜令遍加告諭諸道州府約勒見錢素有條制若全禁斷實匪通規宜令遍指揮三司及諸道州府其諸城門所出見錢如五百巳上不得放出如稍違犯即準舊條指揮其沿淮諸州縣鎮亦準元降敕命處分喪亂之際不可以法行致理之初漸宜於刑措蕭希甫官居諫省職本匭函慮黎民年有讎嫌致法寺愈煩讞議特塞紛爭之路請申昧爽之朝言出忠誠事關理本載許論奏合議施行宜自天成元年四月二十八日巳前罪無輕重一切不問其閒巳經勘窮推鞫者須見罪狀其餘即依所奏佛氏之教其來久矣既為空寂之門不無高潔之士自淳風久散至道莫隆漸容游惰之徒雜處緇黃之衆罔遵禁戒唯切經求託形勢以擾人蓄資財而潤已將思縱志肯樂聚居多於閭巷之閒別搆住持之所妄陳福業潛誘聾愚或移動居人或侵并物業如斯之弊其徒日繁朕方靜寰區務康黎庶貴臻有益共洽無私宜令遍行告諭應今日巳前修蓋得寺院無令毀廢自此巳後不得輒有建造如有願在僧門亦宜準佛法條例官壇受戒不得擅私剃度今後文武兩班及諸司官吏諸道商旅凡有喪亡即準臺司所奏施行其坊市民庶軍士之家凡死喪及婢僕非理物故依臺司所奏委府縣軍巡同舉仍不得縱其吏卒於物故之家妄有邀脅或恐暑月尸柩難停若待申聞簡舉縱無邀脅亦須經時日今後仰其家喚四鄰究無他故逐便葬埋具結罪文狀報官或後別聞枉濫妄有保證官中訪知勘詰不虛本戶鄰保量事科罪如聞諸道州府坊市死喪取分巡院舉頗致淹停人多流怨亦仰約京城事例處分所奏喪葬車輿格例今後據品秩之外如庶人喪葬宜令御史臺差御史一員點供任行人如有違越據所犯科罪臺司不得書罰徵擾行人交非憲綱事體行使銅錢之內訪聞夾帶鐵鑞若不嚴設條法轉恐私家鑄造應中外所使銅錢內鐵鑞錢即宜毀棄不得輒行如違其所使錢不計多少並納入官仍科深罪尚書吏部侍郎裴皡所謂刺史三考方可替移免有迎送之勞若非歲月積深無以彰明臧否自此到任後政績有聞即當就加渥澤如或為理乖謬不計月限便議替除
