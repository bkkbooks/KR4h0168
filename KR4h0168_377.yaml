body:
  text: 故尚書左丞田季羔公忠正直先朝名臣其祖父皆以孝行旌表門閭京城隋朝舊第季羔一家而已今被堂姪伯強進狀請貨宅召市人馬以討吐蕃一開此門恐滋不逞討賊自有國計豈資僥倖之徒且毀棄義門虧損風教望少責罰亦可懲勸識字方明代宗朝官左拾遺臣某言臣聞元氣氤氳生成道達聖王教化恩煦流行自昔仁壽之時皆同寬大之典伏見五月二十九日恩制昭洗庶獄廓清萬㝢億兆欣戴人神叶心臣某中賀伏惟寶應元聖文武皇帝陛下體元立極至德提運俗阜和平之理天垂景福之祥故得年穀大豐五兵不用倉廩既實禮義興行此以道合一作洽羲軒功格天地陛下聖德之至勞謙恤隱猶慮淳風未溥罹咎或多務寬典刑以廣覆載當一陰始生盛陽用事言念冒犯慘酷幽閉囹圄降元猷渙汗之恩贊朱明長養之氣而使省躬者自新有路懷生者得遂其情枯朽重沐陽和雲烟助為喜色元元感戴皆見聖明一作慈遇此昌時生靈何幸臣忝庶職字人不任忭舞欣躍之至海昏縣東北一二里有澄陂永泰初檢校左司郎中蘭陵蕭公置草堂於陂上偶然疏鑿從其易也虛楹東向清曠十里傍有古樹密竹一如籬落澄漪風篁終日不厭非出非處優游中道於茲三年矣柴篠為門蔬圃取給怡愉色充止足於斯士君子皆仰其清達也清而多愛達而彌約曩昔持憲仁德恤刑進退之道道皆可勸予學史者也得而紀述思子天下之士往歲天子自鳳翔歸於上都大兵之後秦人陷法抵冒者眾疑似詿誤者倍之皇綱初振國典未一公職在畿甸位卑才露京尹器之委以決獄惟刑之恤上帝心向三年遷以持憲歷臺三院折獄如初或如絲棼因我繩直蓋亦多矣不其才難未止於此當此之時寇逆雖却而猶金方播氣事多陰勝公仁勇中發忘危與眾前後按乎舊獄察色見情疑似當刑口伏心怨果斷出之者數百人去其智足飾非盤根難狀為無辜之害者亦十數人持憲如此仁乎至哉向使生全愛養之心不備乎陰陽運用之才則視人殘傷空歎息而已焉能密網之中多所濟活昔人有生全之功高門待封者欲人行之所以彰其善也知止足者委順志之所以晦其善也其意不同同歸於德其德雖異觀各有宜詩曰愷悌君子人之父母此之謂也予家於修江之上十年矣茲地阻遠兵戈不至而猶日見乎罷人貨鬻之怨時聞乎豺狼凌肆之殘春對乎淒風苦雨之音秋經乎炎燠札瘥之氣又見野有此當益感歎而已大歷二年正月七日左拾遺柳識述國之所以病者在乎名分差賞罰謬賤妨貴孽代宗河決樹顛可拱而俟夫聖人作則必建皇極敘彞倫植禮為務坦順為路使尊有定位下無覦心春秋垂子貴母貴之文年鈞德鈞之說姪娣審於左右文質殊其後先等威著明條貫纎悉選師保以教之設疑丞而輔之春誦夏絃一物三善故刑于寡妻文王之所以正家道也抗法伯禽周公之所以致頌聲也昔申后黜而小弁賦子朝寵而王室亂獻公從筮晉祀如綖楚建遇讒芊姓累棋列於格言垂作殷鑒漢高皇帝提三尺劒奮布衣夷秦翦項南面而帝及乎疎孝惠私趙王本根一搖海內失望向使安車空駕羽翼不來蹈金寒玦離之蹤成母愛子抱之計四百之祚岌乎殆哉非四公之高名不能割漢祖肌膚之愛非留侯之奇策不能振大賢金玉之音然而顯晦異宜語默殊用塗山玉帛有櫛風沐雨之勞陋巷簞瓢無被髮纓冠之責兼濟獨善相與背馳唯四先生兩有之矣往者明祠頹壞靡有孑遺太傅兼中書令許國公爰命經營不日而就棟宇甚美神形若生如裁兔鹿之書似指狼羊之喻松涼桂燠雲白霞丹坐視天倪時聞地籟公秀發人瑞雍容國楨本於忠孝文以禮樂每絕編而嗜學常吐哺以迎賓至於戡定之懋勳廉察之殊政則銘於彞器藏在史官宜有如季文子者請之太史克者詩之非昧者所宜造次道也公以為四先生避秦亂逃漢祿而所立利澤如揭日月彼佩金印乘朱軒食萬鍾潤九里而括囊避事全軀保孥聞四賢之風可以有立志矣故公之飾是廟也見聖王固本之制焉有詩人伐檀之志焉豈特燭耀巖穴旌賁隱淪而已君子之座必左琴右書雅好閱古古亦置於舟車也大歷六年浙西觀察使蘇州刺史兼御史大夫贊皇公祗命朝於京闕春正月夕次朱方刺史樊公稱江月當軒願以巵酒侑勝居無何贊皇公絃琴樊公和之演操相應澄清撫綏遞為伯牙更為子期琴動人靜琴酣酒醒清聲向月和氣在堂春風猶寒是夜覺暖罷宴之後贊皇顧潤州曰見明珠者始賤魚目知雅樂者方鄙鄭聲自樸散為器真意在琴與眾樂同出於虛獨能致靜同韻五音獨能多感同名為樂獨偶聖賢是宜稱德切近於道昔堯以美利利於天下曲名始暢自舜禹至於夫子不止且聲著哀思或當戚自陳其後居常翫之和理所措若然者寧襲陶公真意空拍而已豈襲胡笳巧麗異域悲聲我有山水桐音寶而持之古操則為其餘未暇是知贊皇所好無非訓典似有道而猶重之若此況乃真有道之士乎輒紀述所論貽諸達者茅山舊句曲也本記云內有靈府空通五岳其外山形似匕因名為句曲有軒轅鼎湖之後世多近智漸闇真有故金闕玉清大聖至神之事真靈時闡於人閒以彰道妙則漢元帝世有茅君積襲道德來受仙任遊內統外澤加幽顯邦人瞻戴因改為茅山元教既溥二弟亦此山得道三峯是三君駐雲鶴之所備詳傳記至明帝永平二年詔勅修崇其廟後代相承罔敢或替我國家統承真冑宗奉至教天寶七載五月十三日於山之西偏制置祠宇度道士三人以修時醮列在祀典夫廟享功德顯然殊致以道而言則天地之外亦有覆載陰陽之外亦有生化斯乃虛而有象運而無形蓋顯為皇王師範道之形器也隱為真靈變化道之精微也體雖隱顯心則感通有無交暢化乃大備初真人既受羽節留二弟於句曲而謂之曰吾今去便有局任不得數相往來要當三月十八日十二月二日邀師攜友以來遊盼有好道者待我於是乎吾自當科之有以相教則法之本也內習精真沖寂外行廉清仁惠每歲春冬皆有數千人潔誠洗念來朝此山自漢至今宇宙閒潛修精感轉相化誘其可勝紀乎若然者我真人元功聖德陰隲妙用豈言能盡歟夫學道則所見無有不忘得道則所忘無有不在多泯迹於常或標靈引類不顯定一理始曰無方之用孰知終極是知聖人情忘愛存慈勸不已益見道之至也真人昔將輕舉俯視六合虛徐翔翺於是綵雲自異靈鶴自至者亦如天之運行日月為照星辰為曜則日月星辰為天地光大之用天豈有之自是真富也綵雲靈鶴為真聖昇虛之用聖豈待之自是真貴也世之賢士高位濟俗乃無意於車輿道之真仙孕元育化寧有意於雲鶴廟者亦如人思召伯而愛甘棠也道士容行延生法成韋崇珣等經營修奉歲月久矣願刻金石以誌於山唐大歷十三年太歲戊午三月十八日記道門華陽亦儒門洙泗蓋元化振於此也白日登昇有西漢茅氏兄弟隱景遁化有東晉許氏一門襲明冲用以闡道風有梁貞白先生唐元靜先生開元中元宗禮請尊師而問理化對曰道德經君王之師也昔漢文帝行其言仁壽天下次問金鼎對曰道德公也輕舉公中私也時見其私聖人存教若求生徇欲則似繫風上悅因加元靜之號無何固以疾辭東還句曲先生諱含光本姓宏則天諱宏改為李氏考孝威州里號貞隱先生家本醇儒廣陵人也夫性與道妙則真有運無古之學者離有得有不外觀馳景而內觀馳心不遠思化金而近思化欲今之學者多見反是若迺行於真理窅然觀妙先示正性發明宗元則元靜其人也年十三辭家奉道端視清受慈向蠢動闇室之中如對君親時人見之性情皆斂幼工篆隸或稱過父一聞此議終身不書所撰仙學傳記闕遺備載又論二元異同著真經及本草音義而皆精詳祛惑窮理於學如鐘蘊聲其後師事華蓋峯司馬君雲篆寶書傾囊傳授既而目之曰真玉清之客抱虛無而行功者與道不窮託幽阜而滅跡者於德亦淺承之自遠宜且救人於是引後學升堂稟元訓也先生元氣不散瑤圖虛映達靈已久晦曜為常動非用開靜非默閉當吹萬之會若得一之初應跡可名常道不可名也㣥蒙求我豈勞言說孕育至化虛融一心心一變至於學學一變至於道同淑氣自來得之不見所以摳衣而進無有遠邇仰範元和茂資全性者若秋芳之依層巘夏潦之會通川也先生忘情於身而慈於人禎祥屢應視同眾象士庶咨詢色授其意嘗令章壇閉院醮火擇薪精微誠敬率皆此類曩者天書繼至務欲尊崇公卿祈請信無虛月卒使元門之中轉見真璞持慈儉之寶歸羲黃之風至矣哉我師教也大歷四年冬十一月顧謂入室弟子韋景昭孟湛然曰吾將順化神氣恬然若坐忘長往時年八十七靈雲降室執如生據真經斯迺秉化自由仙階深妙者也門人等以為醴泉之味飲者始知我師之道學久方見願敘真宗以示於後忝曾遊道敢述元風銘曰古有強名元精希夷黃帝遺之先生得之縱心而往與一相隨真性所容太無同規日行仙路不語到時人言萬靈我見常姿元宗仰止徵就京師紫極徒貴白雲不知遐方後學來往怡怡空有多門真精自持委順而去人焉能窺元科祕訣本有冥期大歷七年八月十四日建洪河之東兮首陽穹崇側聞孤竹二子昔也餒在其中偕隱胡為得仁而死青苔古木蒼雲秋水魂兮來何依兮去何止掇㵎谿之毛薦精誠而已初先生鴻逸中州鸞伏西山顧薇蕨之離離歌唐虞之不還謂易暴兮文武謂墨縗兮胡顏時一叱兮忘饑若有誚兮千巖之閒豈不以冠弊在於上履新居於下且曰一人之正位孰知三聖之純嘏讓周之意不其然乎是以知先生所恤者偏矣當昔夷羊在牧商綱解結乾道息坤維絕鯨吞噬兮鬼妖孼王奮厥武天意若曰覆昏暴資濬哲於是三老歸而八百會一戎衣而九有截況乎旗錫黃鳥珪命赤烏俾荷鉅橋之施俾伸羑里之辜故能山立雨集電掃風驅及下車也五刃不礪於武庫九駿伏轅於文途雖二士不食而兆人其蘇既而溥天率土咸為周人吁嗟先生逃將何臻萬姓歸仰兮獨鬱乎方寸六合莽蕩兮終跼於一身雖忤時而過周固嘔心而惻殷所以不食其食求仁得仁然非一端事各其志若皆旁通以阜厥躬應物以濟其利則焉有貞節之規各親之事靈乎靈乎雖非與道而保生可勗為臣之不二壬辰歲夏四月客有自洛東游至先生遺廟而潁水古風舊山巋然追懷古蹤慕羨至道以時酒敬酹於靈既酌既拜獻乎言曰天清既能久地靜不能朽先生清靜天地全性出於胚渾入於鴻濛雲遊鳥遷蓊鬱和風當時帝道已半滋章欲深大樸散於人未散於山林乃有巢父杳冥同心堯齎公器退然見推遇聖相感不得不知耳雖濯於清流道終播於無為所為春膏時蒸朽葉自滋先生含德唐堯發之潁陽之仁德日大天下之祿利日卑且聖王所重者名器至人所重者感通推以大名義同讓終廉能感俗道自為功任應會之偶然生垂後之清風人登雲嶺多憶箕潁猗歟先生山水齊名茲焉遺廟萬古芬馨琚頓邱人開元中進士官石山令客有海上浴德淄川養蒙業因才進位以經通當漢皇之有道登股肱於此公順天招物德盛聲崇接士於衡門之下起閣於相府之東陽榮納日陰戶生風爾其建高規起崇制簷宇深靜垣牆閑衞取木非南㵎之才延賓乃北山之滯訪善不日馴道以歲其選器也則收用而棄瑕其進德也則取材而遠勢故能克遐厥聲休績莫京宴私則布衣韋帶自公惟脫粟菜羹服之而德以廉恥食之而心以和平豈梁肉夏屋而賓實之名哉則知厚內者德先薄外者事理身正則遠怨心邪則近恥固惡盈而守沖誠見足而知止太常居甲第之日丞相作封侯之始是以作漢名相惠音流暢誠前哲之用心豈後賢之觖望及夫人歿政絕閣廢道休俾馬廏之是宅奚人德之不修言念於此我心其瘳故知道劣者事微徇名者失實奚量才之遠近寧比跡於勞逸正卿名晉以字行潁川人天道昭著靈臺聳拔將治歷以明時必仰觀而俯察誰敢俶擾曾不範圍既七政以欽若亦四序而發揮寒暑有次啟閉相依彼疇人以視遠類君子之表微維人有令維天有兆道在乎觀法用不撓彼分至之復應生雲物以縹緲俾占望以聿書將豐災以是表夫其大觀在上南正是掌審仁和之景色候肅殺之氣象授時莫愆行令靡爽舉祀物以昭報順禳祈之肸蠁若乃履端於緒以正厥初分職辨雲既明於周典申命出日載列於虞書舉春奉始積閏歸餘節候應乎寒燠政令隨乎慘舒是用敬授以崇祗祓將舉正以舉中寧不軌而不物豈唯中臺端立永望以肆將以見天地之心辨剛柔之位庶乎有典有則克明克類若夫春景載陽冬日已至望西成之平秩見南郊之敬致莫不參陰陽之則符璿玉之器審四時以成序察五雲而有備備用先天實惟有年儻靈臺之可頌庶無忝乎周篇齊古天寶時官銀青光祿大夫國子祭酒臣聞孝經者天經地義之極至德要道之源在六籍之上為百行之本自文宣既沒後賢所注雖事有發揮而理甚乖舛伏惟開元天寶聖文神武皇帝陛下敦睦孝理躬親筆削以無方之聖討正舊經以不測之神改作新注朗然如日月之照邈矣合天地之德使家藏其本人習斯文普天之下罔不欣戴仍以太學王化所先孝經聖理之本分命璧沼特建石臺義展睿詞書題御翰以垂百代之則故得萬國之歡今刊勒既終功績斯著天文炳煥開七曜之光輝聖札飛騰奪五雲之氣色烟花相照龍鳳沓起實可配南山之壽增北極之尊百寮是瞻四方取則豈比周官之禮空懸象魏孔子之書但藏屋壁臣之何幸躬覩盛事遇陛下興其五孝忝守國庠率冑子歌其五德敢揚文教不勝忭躍之至謹打石臺孝經本分為上下兩卷謹於光順門奉獻兩本以聞譚肅宗朝官廣州都督臣某言臣聞休徵所應克昭明盛之期靈貺攸歸必會升平之運伏惟開元天寶聖文神武皇帝陛下發揮真宰撫育道樞致妙用於希夷納蒼生於仁壽故得風雲效祉動植呈祥臣所管內雍州界天柱山頂有元元皇帝古宮考時代而罔知覩寂寞而如在今月十四日辛丑皇妹持盈守法於宮前紫虛觀中齋心伏形為陛下祈福忽有慶雲照耀施五彩於山巔嘉氣紛綸散重光於宮上其日從已時至未時官吏僧道瞻顧彌遠陛下纘元元之仙籙授天寶之禎符千古未聞百靈何幸克叶天意必因人心表陛下無疆之福明陛下無疆之壽臣忝列方岳寄重分憂忭躍之誠倍百恒品謹寫圖奏以聞特望天恩宣示中外以光史策天下幸甚臣等誠歡誠喜頓首頓首草莽臣譚言臣聞自昔皇王撫運提象天錫禎應以光盛業臣伏見以為至道有孚能招異類深仁所協克順天心陛下孝理天下孩視㣥動恩被羽族感通陽精雖器車馬圖洋溢祕府而黃龍丹雀委積近郊此或為常不甚專美豈如孝烏俯爾營巢不懼不驚以育㣥子臣幸逢昌運好覽休祥萬古珍圖安能有此百代良史未之前聞況肅穆紫宸曉夕嚴警會弁星列爪士雲屯燕雀飛梁無相賀之所魚龍在棟成駭目之觀惟此孝烏晏然能馴明陛下深愛子物之慈表皇太子歸哺報恩之孝首出眾瑞莫與之齊謹按符瑞圖云宗廟肅敬則烏至昔范賢對蜀主言慈烏知孝誠養之禽必有遠方懷而至者陛下聖策遠備威震遐戎畧地攻城無歲不克巴蜀之外今斯獲醜慈烏效祉可謂有徵加以遠降日輪近巢天宇據北辰以永固豈南風以遠枝自古攸傳無聞此瑞願陳不朽垂裕將來謹獻孝烏旌德頌七首雖論揚之美有愧於清風而葵藿之心無忘於捧日謹投延恩匭奉表以聞冒觸宸嚴伏增戰越臣譚誠恐頓首死罪謹言臣聞天分四序寒暑莫同地裂八方華夷各異言語不達詎可以政令齊苞茅不供乃可以干戈服黃軒有涿鹿之戰以定火災顓頊有共工之陣以平水害逖聽前古無能去兵將用撫柔遐荒混一書軌豈徒勞師玩寇黷武殘人而已哉伏惟開元天地大寶聖文神武應道皇帝陛下清靜端極無為體道祖文德而耀昌期則種虜解甲恢武功而運上策皆慕化來賓惟彼西戎可逃天孼豈謂慈仁廣覆猶見背陽之禽聲教旁羅尚有吠堯之犬伏以南蠻亂德恃險偷生吐蕃舉國興兵資其叛逆頃者西山戰士及八國子弟因其窘逼遂欲憑陵敢懷猶鬬之心來犯必誅之令以正月五日率故洪臘城裏囊卭三節度兵馬八萬餘人分為六道攻圍萬安柔遠明威平戎及保寧都護衞等五城驅牛馬有甚於谷量運干戈實踰於山積萬安城使金吾衞將軍張知海柔遠城使右金吾衞大將軍于仙障平戎城使武衞劉元果明威副使折衝管希光攝保寧都護折衝馬仙童等久戍邊隅備閑攻守或自固堅壁不發懸門或蓄其精銳誘以羸弱賊等不虞設詐競欲登陴再皷當彼竭之餘一舉得我盈之勢矢石齊發噍類無遺前後殺傷不可勝紀八國招討副使左羽林軍大將軍董當左羽林軍將軍董旁郎董畢郎右羽林董利董哥弄左驍衞將軍董利峯左武衞將軍董奉仇左威衞翊府中郎將先鋒黨利才統八國子弟八千餘眾并拜都護武士府健兒一千餘眾閒道設伏潛入深林旗鼓相望晝夜苦戰自其月十五日都護武士殺賊眾退散至十七日遂攻合所圍明威柔遠兩城兵馬併力死戰攻萬安新城十八日都知西山子弟兵馬副使左金吾衞大將軍攝臨翼郡太守董郤麴左羽林軍大將軍兼靜郡太守董元智右羽林大將軍兼蓬山郡太守董懷恩右驍衞將軍兼歸城郡太守董思賢江源郡太守董懿右驍衞大將軍董仁羆折衝董弄封等領八郡驍勇并蕃漢武士等七千人自蓬娑路取牙山出其不意銜枚夜襲賊等震驚遂相殘戮棄其輜重稍欲抽軍蒼黃之際翦除畧盡漂杵之血方此非少積觀之屍今茲目覩同州節度副使都知兵馬使左羽林大將軍兼通化郡太守譚元受遣左金吾衞將軍裴振攝維川郡長史折衝張粲雲山守捉使折衝姚高偘攝天保郡折衝楊夏日攝司馬董元勤等率健彍三千人自滴博領入競施掎角之勢各陳擒縱之謀自正月五日至二月五日前後轉戰五十餘陣生擒吐蕃哥末國王渠時兵馬副使翟步離并士眾等二千餘人斬獲故節度副使且祿翁都知使乞呂徐男律熙等械牛馬羊等二十餘萬右威衞郎將康裕昌保寧都護府長史鍾景等恭承將命挺劒重圍宣傳聖恩曉諭將士遂得賈勇萬夫激節以少克眾實仗天威取亂推亡誠因廟算今長鯨就戮封豕載屠桃塞放牛徒聞往牒華陽歸馬稀遇聖朝無甚慶快之至謹遣威衞郎將楊如海奉露布以聞軍資器械別簿錄上臣聞聲教無外修文德以來遠人職貢有虧耀武威而討亡命然則五材並用金革為遏亂之資八卦相宣弧矢乃濟時之具事非獲已道豈為謀將治眾以安人必除殘而禁暴歷覽古今誰能去兵未有捨禮樂而致升平奮干戈而宏大業者也伏惟乾元大聖光天文武孝感皇帝陛下明齊日月德配天地化同異類澤洎無垠寰宇已墜而更興社稷將顛而復振崇勳累績曠古莫儔蠢茲魑魅之鄉敢恃犬羊之眾據其險要恣其寇攘西原羈縻舊染聲教被其不閭誘引同惡者多僭稱王侯偽署官爵旌旗蔽野皷角沸天恣殺戮以威人將玉帛而濟眾方圓數千里控帶十八州丁壯並執其干戈子女盡充其僕隸自謂強盛轉加兇頑迫之則鳥散獸驚緩之則蟻結蜂聚老幼奔走耕稼失時萬井無烟兆人失業不賓王化於茲四稔臣前年銜命到州深入招慰示之仁信許其自新猶尚憑陵每行攻劫管內州縣日漸流離村落焚燒廬井空竭伏奉去年三月十日勅遣中使魏朝璨宣慰凡諸首領皆賜敕書再三曉諭許其官爵但以炎方人物躁競者多承平以來久絕朝命自蒙提獎感激殊私戮力同心傾家竭產訓勉子弟策勵甲兵介冑自出於私門糧儲不損於官廩向非陛下化周動植德及遐荒豈有不勞王師坐清氛祲去年二月二日睦州武陽珠蘭金溪黃橙等一百餘洞大賊帥偽號中越王廖殿偽號桂南王莫淳偽號拓南王相文偽號越南王莫潯偽號象郡王梁泰偽號鎮南王羅成偽號戎成王莫禱偽號南海王羅品等潛相結搆約二十萬眾跨壤連州志如梟獍風號雨嘯心等豺狼仍欲先破嶺南後圖嶺北遠近百姓皆不聊生臣遂激勸將士宣傳聖旨誘以厚賞使其盡節皆決命苦戰非無損傷不顧危亡志懷忠勇大首領梧州長史鎮南副都護攝柳州刺史西原遊奕使張維南率勸首領統茲軍政萬夫齊進一舉無遺都知兵馬使朝散大夫象州刺史成匝領當管及柳州刺史衝州等戰手共一萬人卷其旌旗踰挺爭先膺有渠魁當陣斬獲經畧副使朝議郎行賀州長史穆成搆防禦副使朝議郎梧州長史任早梧州刺史本州防禦使李抗先鋒總管梧州長史秦匡朝四界遊奕使廣州番禺府折衝譚崇慰及總管子將等五百餘人并西原環古等州首領方子彈甘令暉羅承韋張九解宋原等五百餘人各領子弟并部外義征及總管內戰手共成二十萬眾或擐甲伏兵縱其救援或致果決勝扼其喉咽左右夾攻飛走無路諸將及首領等義在竭誠以死無生以晝繼夜或攻或圍當其彼竭之餘遂得我盈之勢封豕既戮長蛇又屠餘黨喧騰自相蹂踐勢如解籜事等摧枯指揮而夷獠喪魂叱咤而山川阻色賊等既因失律不知所向或連袂墜谷自成積觀之尸或帶刃投江有同漂杵之血橫行歲久驕縱日深勢如雷霆莫敢拒敵臣乃陳師誓眾思各忘軀自春徂冬凡經二百餘日前後苦戰各三十餘陣破賊二十萬眾斬首五千餘級以頭首喪亡餘黨奔亂窮滅之後然始求降臣伏以人無盡劉道忌太甚因陛下好生之德合陛下至仁之心於是宣傳聖恩示其生路大賊帥武承裴敬等二人餘眾竄伏無地周章失圖解甲轅門面縛請罪臣便脫其桎梏仍加宴賞兼賚匹帛散於營農各分疆界使其斥堠遞相轄控永絕憂虞今臣管內亦且寧怗實賴天威遠被廟算遐臨靜彼兇殘康茲億兆無任慶躍之至謹遣所部官桂州臨桂縣丞朱璟謹奉露布以聞其立功將士首領別簿奏上
