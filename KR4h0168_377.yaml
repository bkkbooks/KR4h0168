front:
  text: 全唐文欽定全唐文卷三百七十七渾字夷曠一字惟深本名載襄州人天寶初進士累除衢州司馬棄官隱武寧山召拜監察御史除殿中侍御史大歷中累遷尚書右丞貞元元年遷兵部侍郎封宜城縣伯三年以本官同中書門下平章事五年卒年七十五諡曰貞
  hash: sha256:73a29ba2edd0099624abea53c19c6894e9ee6fbad50f345f5a1b9233a21691fe
