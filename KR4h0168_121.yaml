front:
  text: 全唐文欽定全唐文卷一百二十一帝諱承祐高祖第二子後唐長興二年生乾祐元年二月封周王即皇帝位在位三年年二十周廣順元年追諡曰隱皇帝
  hash: sha256:5955f2453144acffe4d63d2fad748b4dd53bdc69f268cb4c98cb35de76d505a5
  markers:
  - {type: head, offset: 14, content: 漢隱帝, id: KR4h0168_NFKB_121-h1, level: 1}
body:
  text: 朕虔承遺訓嗣守鴻基嘗懼眇沖不克負荷所以師臣畏相稽衆從人採沃心造膝之謀詢繼體守成之道其或力非任重才不逮時有玷天工顯貽物議宜從罷免用警厥愆開國佐命輔聖功臣光祿大夫行中書侍郎兼戶部尚書同中書門下平章事上柱國隴西縣開國伯食邑七百戶李濤早預朝倫素虧時望繼踐清華之列曾無倜儻之名先皇帝應運開階濟物成務未明求理虛巳待賢擢自禁林升之槐路既委宰衡之任蔑聞帷幄之謀逮及眇躬初親庶政被顧問之際屢覩醺酣當獻替之時無聞詆訐復虧嚴重但務詼諧詎為君子之儒殊失大臣之體重以梓宮在殯國步多艱屢陳違衆之言頻建出師之議率爾獨見豈是臧謀朕方務含宏冀全終始雖包荒而在念慮假器以興譏俾輟中樞式存大體仍令還第庶用省躬惟爾自貽無我有怨苟能思過豈吝推恩可罷免勒歸私第稔惡圖危難逃天網虧忠負義必速神誅李嵩頃在前朝最居重位略無裨益遂致滅亡及事契丹又為親密士民俱憤險佞可知先皇含垢掩瑕推恩念舊擢居一品俾列三師不謂潛有包藏謀危社稷散差人使潛結姦凶附近山陵擬為叛亂按其所告咸巳伏辜宜正典章用懲姦逆其李嵩李嶼李嶬一家骨肉及同謀作亂人並從極法劉景巖年巳衰暮身處退閒曾無止足之心輒肆包藏之毒結集徒黨窺伺藩垣所賴上將輸忠三軍協力盡除醜類克殄渠魁其劉景巖次男前德州刺史行琮巳行極法長男渭州刺史行謙孫男邢州馬軍指揮使崇勳特放所修職貢舊有規程念航深梯險之勞重違卿意在誘善勸忠之道本實朕心今後凡有進獻可與希廣商量庶叶雍和不爽體制朝廷之制皆有舊章牧守卒官比無贈典其或政能殊異惠及蒸黎生有令名歿留遺愛褒賢奬善豈限彞章可贈太尉吏部所請宜依李守貞頃在前朝驟承委遇逮事先帝復委藩垣效淺功微寵深位大而狡性難制小器易盈蔑義虧忠窮凶極逆江海不能流其惡鼎鑊不足快其誅卿憤激於心義形於色覩茲妖孽志在翦除動息之閒必思於經略寢食之際無忘於寇讎撫士愛人分甘共苦躬臨矢石親冒梯衝揮戈而蛇豕就誅破竹而金湯失險氛霾既息宗社再安非我元臣莫隆景運朕之倚愛何止寢興言念辛勤無忘嘉愧我國家肇迹豐沛膺籙并汾蓋承積德之靈再享配天之業四百年之洪緒一千載之遺風乃祖陵園先時廟貌屬纍朝之隔越諒如在之因循將明追孝之心當盡奉先之敬天下州府應有兩漢諸帝王陵園廟宇宜令所屬長吏檢討量加修飾其陵園側近禁止芻牧樵採設官分職朝廷自有規程薦士延才州郡合存體式應諸道節度防禦團練刺史奏薦判官書記支使推官令録簿尉等親人之官不易入幕之賓尤難必取當仁庶聞幹事守臣奏薦朝廷選除素有明文咸拘定制近年以來除人或虧允當薦士多昧選求體制既踰紊亂滋始遐邇將期於致理奏除宜在乎擇才況有舊章足為常式其諸道行軍副使兩使判官並不得奏薦委中書門下選除帶使相節度使許奏節度掌書記觀察支使節度推官不帶使相節度使只許奏節度掌書記節度推官其防禦團練判官刺史判官等聽奏仍許精選才能其唐朝晉朝前項條貫並可舉行永為規制所奏薦州縣官自有銓衡不可侵越以敕內舊人數許奏使相三人不帶使相二人防禦團練刺史一人為定仍付所司政貴寬易刑尚哀矜慮滋蔓之生姦實軫傷而是念今屬三元改候四序履端將冀和平無如獄訟應三京鄴都諸道州府見繫罪人委逐處長吏躬親慮問其於決斷務在公平但見其情即為具獄勿令牽引遂致滯淹無縱舞文有傷和氣先以兵甲至多糧儲不給權於苗畝之上遂有紐配之煩雖年歲之頻登諒黎民之艱窘固非獲巳深用軫懷今則雨雪及時陽春布澤宜順發生之令特覃優恤之恩冀閭里之安居俾農桑之樂業應三京鄴都諸道州府所徵乾祐元年夏秋苗稅及紐徵白米稈草據今年二月一日巳前巳納外見係缺數並宜特放布告遐邇體朕意焉載唐虞之盛傳彼古文明得失之由存乎信史恭惟高祖皇帝受天歷數纘漢基圖戎虜蠻夷懾靈旗而內附禮樂征伐建王道於大中功格於上元化行於率土將欲示其軌範約彼春秋接高光紀聖之書續班馬記言之典廢而不舉闕孰甚焉左諫議大夫賈緯左拾遺竇儼右拾遺王伸等才學淵深論辨鋒起分職方提於直筆編年允屬於鴻儒宜令緯等同修高祖實録呈進仍令宰臣蘇逢吉監修松事因有玷誠切上章述避嫌之辭形告退之意其男仁寶雖因除名曾受僞官一昨既翦凶酋合從俘執未明死所乃漏刑書路歧難限于山河情愛且關于父子便議連坐恐失寬條以爾朝列舊臣班行宿德纍有退閒之請宜引軫惻之恩特俾免官用明減等宜停見任月戒正陽候當小暑乃挺重出輕之日是恤刑議獄之辰有罪者速就勘窮薄罰者畫時疏決用符時令勿縱滯淹三京鄴都諸道州府在獄見繫罪人宜令所司疾速斷遣無致淹滯枉濫王化所先獄訟攸切不惟枉橈兼慮滯淹適當長養之時正屬熇蒸之候纍行條貫俾速施行靡不丁寧未曾奏報再頒告諭無或因循應三京鄴都諸道州府詔至宜具疏放巳行未行申奏無致逗留令録之任責辦非輕用捨之閒尤宜適中少小者未曾履歷則為政必疏衰晚者巳及耄期則臨民多廢須期慎選以擢吏能起今後諸色選人年及七十者並宜注優散官年少未歷資考者不得任縣令五運相承歷代而猶傳鳳紀百王垂訓繼明而具載鴻猷況今司契御乾握圖纂極事每循於師古政必究於化源逮自金行成茲火德所請編録庶補闕文其晉朝實録宜令監修國史蘇逢吉與史官賈緯竇儼王伸等修撰呈進中書奏前資朝官近日併於中書陳狀稱準宣命指揮自外地發遣相次到京正當冬寒未有員闕既難淹泊須議指揮其前資文武兩班朝官等只宜於西京及闕下任便安居候闕除授宜令御史臺曉示親人之任務在安民經國之規必資徵賦至於招添戶口增長稅租減選加階優有處分勸能行賞顯降敕文邇來論課績者甚多較虛實則未當外州批上歷子南曹磨勘解繇空收招到編民莫見新添稅額蓋有析居耕種各立戶名或是避稅逃移併未歸業所以虛添農戶無益官租考課涉名未盡其善宜兼吏部南曹自今後及巳前應有令佐招添點檢出戶口據數須本處戶合徵稅賦物數目於解繇歷子內一一開坐批書方得準天福八年三月十日敕條施行如不合前後敕例不在施行之限惟乾祐二年歲次己酉十月庚午朔十九日戊子皇帝若曰我先帝順天致罰大拯黎元享萬靈於無主解兆庶之倒懸較定世勳以吳越居右伊朕眇末虔奉先訓嗣位之始即疇懋功前命為元帥按地圖授武節東南之境得行征伐今冊為真王駕大輅執桓圭牛斗之鄉盡荒土宇詢於有位僉曰克諧咨爾匡聖廣運同德保定功臣東南面兵馬都元帥鎮海鎮東等軍節度使浙江東西等道管內觀察處置兼兩浙鹽鐵制置發運營田等使開府儀同三司檢校太師兼中書令杭州越州大都督上柱國吳越國王食邑一萬戶實封一千戶錢宏俶象緯炳靈公王襲慶橫江負海者三千里開國承家者六十年而能望辰極以駿奔奉天朝之師律充庭納貢則外府告盈下瀨宣威則前茅獻捷忠信著於羣后禮讓行於一方故元冕九章為王之服昭其名也朱輪駟馬為王之馭昭其器也而又三吳百越列土分疆有民人焉有社稷焉恢祖禰之令圖實典禮之巨著勸夫忠孝以御邦家今遣正議大夫守右散騎常侍上柱國賜紫金魚袋張煦左補闕崔頌持節備禮冊爾為吳越國王嗚呼品秩甚尊名數尤重肅廣庭而備物練吉日以覃恩爾其正厥位事大以敬教民以順馭衆以恩神其福之禮曰惟王建國諸侯所以守舊邦書曰惟帝念功王者於是出好爵匡我堯緒永為漢藩浙江如帶稽山如礪福祿無窮貽厥百世汝往欽哉對揚我休命古先哲王繼天御物必有大造被於生民故能流餘慶於子孫保永圖於宗社我國家本惟堯之洪緒襲有漢之耿光歷數有歸謳歌所屬先帝乘時出震應運開圖爰在初潛適丁難否妖孽盜居於宮闕腥膻肆毒於寰區血肉黔黎荊榛赤縣繇是建靈旗而指敵仗黃鉞以誓師逐逋寇於龍荒救含生於虎口遺身利物功德契於三靈以欲從人潤澤流於八表大統既集仙馭俄遷號慕終天殞越無地肆豫小子獲纂丕基上承顧命之嚴下迫羣臣之請遺弓如昨仍几具存瞻黼扆以椎心處苫廬而瀝血而文武庶尹將相大臣連上封章請臨政事固拒雖切敦勸彌堅蓋負荷於眇躬復祗膺於永命諒難固執須強荒羸恭巳視朝載惟感咽向明而治始聽斷於萬幾作解之恩宜昭宣於四海可大赦天下取二月十三日昧爽以前所犯罪有巳結正未結正巳發覺未發覺罪無輕重常赦所不原者咸赦除之諸左降官未量移者與量移巳量移者與復資巳復資者與敘用應諸有盜賊處宜準今年正月五日所降恩赦放罪招攜宜令所在長吏更切曉諭招喚各令歸業安家營養並不問以前違犯仍倍加安撫文武臣寮侍衛將士赤心為國勠力勤王盡節盡忠同心同德輔翊先帝推戴沖人言報忠勞宜伸渥澤應中外文武臣寮將吏各加恩寵其馬步諸軍將兵士等各賜賞給巳從別敕處分尚念國家多事帑藏尚虛賜賚未優良深愧意兵火之後災沴相仍編戶傷殘比屋貧弊重以科徭未息輸斂不時言念瘡痍宜伸蠲復天福十二年終巳前殘缺秋夏稅賦及和糴沿徵一物巳上並特放所有遍經災沴處開封府滑曹鄆宋亳單潁徐宿兗沂密孟鄭懷衛澶濮等州並濮城四面三十里內共二十處除巳放去年殘稅外宜更加軫恤其今年夏麥苗子於舊額上特與放免一半頃經戎虜所在驚騷於場院課程州府管係既有陷失宜示矜蠲應州府縣鎮遭契丹草寇及軍都更變驚却兼有般送綱運巳離本處沿路遭劫奪諸色錢帛一物巳上兼天福十二年六月終巳前諸州府鹽麴商稅鐵冶不敷課利及主持錢物糧草柴蒿敗闕缺折等一切特與除放其主事人員亦放罪其有契丹犯闕之時諸州府有危疑之處分差兵士守把城池逐急將係省錢物充兵士優給犒設諸道州府有去年六月終巳前全分支却將士春冬衣賜及諸色諸受自來纍行徵納者並與檢驗除破先是諸州府被契丹率配到錢物逐處差人管押送納有缺折者勘驗指實並與除破天福十二年六月終巳前逐處收刈到芟草積年損爛及缺少處並令除放孝治之道不獨其親況推許國之忠俱享承家之慶感霜露者宜覃漏澤奉晨昏者亦示寵章立身揚名於斯為美在朝文武臣僚內諸司使及侍衛諸軍都虞候巳上諸道節度防禦團練刺史並見任節度副使行軍司馬藩方馬步軍都指揮使父母祖父母見存者並與加恩亡歿者並與追贈追封巳追封追贈者更封贈禮稱助祭詩美作賓誠歷代之嘉猷蓋近朝之闕典興衰繼絶宜舉舊章其唐晉兩朝可求訪子孫仍立為二王後州縣之職朝廷命官既曠事者有懲豈奉公者無勸諸處令録主簿在任顯有殊績善於勸課招輯徵科靜辨者委所在具以名聞當加優奬仍以時經多事民未小康每念疲羸倍懷軫惻天下州縣戶口除宣省指揮外不得妄有科配徭役如合充色役者並須定奪允當其力及大戶並不得諸處投名影占稍違科條當舉憲典古者慮政教之紕繆詢理道於芻蕘蓋欲使外事不壅於中下情得通於上言路既廣頌聲則聞況在纘承之初實繫忠讜之說內外臣寮如有所見便於時政者可直言得失無所隱任賢勿二得士者昌仰稽聖謨敷求時彥訪諸貞遁庶無遺才天下有賢良方正文才武略不求進達處於沈滯者仰所在搜訪以聞名實相符當加擢任於戲建邦撫運念創業之惟難繼統承基知守文之不易纘紹惟重憂思匪寧所賴列辟宗臣元勳舊德股肱王室保佑朕躬共致扶持庶無失墜爰覃霈澤用洽中區凡在照臨當體豫意朕以眇躬獲纘洪緒念守器承祧之重懷臨深履薄之憂屬以元道猶艱王室多故天降重戾國有大喪奸臣樂禍以圖危羣寇幸災而伺隙力役未息兵革方殷朕所以嘗膽臥薪廢食輟寢雖居億兆之上不以九五為尊漸冀承平永安遐邇內則稟太后之慈訓外則仗多士之忠勳股肱叶謀爪牙宣力西摧三叛撫其背而扼其喉北挫羣蕃斷其臂而折其脊次則巴卭嘯聚淮海猖狂才聞矢接鋒交巳見山摧岸沮寇難少息師徒無虧兼以修奉園陵崇建宗廟右賢左戚同寅協恭多事之辰大禮無闕負荷斯重哀感良深今三陽布和四序更始宜申兌澤允答天休恤獄緩刑捨過宥罪當萬物之孚甲開三面之網羅順彼發生以召和氣應乾祐二年正月一日昧爽巳前天下見繫罪人除十惡五逆官典犯贓合造毒藥劫家殺人賊黨正身外其餘犯人及關連者並放如河中李守貞鳳翔王景崇永興趙思綰等比與國家素無讎釁偶因疑懼遂致叛違所以命將陳師徵辭問罪止期旦夕必見功收然以彼之提封朕之黎庶久陷孤壘可念非辜易子析骸填溝委壑為人父母寧不軫傷但以屈巳愛人先王厚德包荒含垢列聖美談宜宏濟物之恩用廣好生之道其李守貞王景崇趙思綰等宜令逐處都部署分明曉諭若能翻然歸順朕並待之如初當保始終享其富貴明申信誓固無改移其或不認推誠堅欲拒命便可應時攻擊剋日蕩平候收復城池罪止元惡其餘詿誤一切不問仍預告諸軍破城日不可殺人放火諸處草寇等拋棄耕農聚集林藪晝伏夜動害物殘人前後纍令翦除繼行招諭尚恐疑懼特示寬恩如能改過知非出來陳首者應巳前所有為非一切不問宜令逐處節度刺史及巡檢使明行曉示宜達朝廷恩旨冀其歸業常切撫安不得信任節級所繇衷私怨慟重念征討巳來勞役尤甚兵猶在野民未息肩急賦繁徵財殫力匱矜恤之澤未被於疲羸愁歎之聲幾盈於道路尚以軍旅未息帑廩無餘猶稽蠲復之恩空懷愧憫之意即候邊烽少弭國患漸除當議優饒冀獲蘇息諸道藩侯郡守等咸分寄任共體憂勞更宜念彼瘡痍倍加勤恤究鄉閭之疾苦去州縣之煩苛勸課耕桑省察冤濫共恢政理用副憂勤凡百臣僚當體朕意
