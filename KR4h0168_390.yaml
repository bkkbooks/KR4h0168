front:
  text: 全唐文欽定全唐文卷三百九十獨孤及七
  hash: sha256:87b7018af2c9929135c9874000e9c9114193547d568e329685f8fd353a181d19
body:
  text: 公諱靈一俗姓吳廣陵人也神氣清和方寸地靈與太初元精合其純粹聞思修惠介然生知九歲出家三千斷結嚴持律藏將紹法寶示人文學以誘世智初不計身中有我我中有身德充報圓緣斷相滅寶應元年冬十月十六日終於杭州龍興寺春秋三十有六臨滅顧命以香木茶毗為送終之節門弟子虔奉遺旨粵以是月某日焚身於某山起塔於某原從拘尸城之制也右補闕趙郡李紓殿中丞侍御史頓邱李湯嘗以文字言語遊公廊廡至是相與追録遺懿以詒塵劫謂公貞靜直方淵遠宏大而密識洞鑑天倪道機注不滿酌不竭沖如也自受生至於出家貪恚不入念哀樂不見色自出家至於涅槃六根不染欲界之塵自知道至於返真雙履不踐居士之門公之嚴持也初公之先世為富家既削髮推萬金之産悉以讓諸孤昆季所取者獨衲衣錫杖及身而三捨七界五欲如棄涕唾公之純白也其所底止必擇山間樹下無塵垢之地初舍於會稽南山之南懸溜寺焉與禪宗之達者釋隱空虔印靜虛相與討十二部經第一義諦之旨既辨惑徙居餘杭宜豐寺鄰青山對佳境以嶺松澗石為梵宇竹風月露為丈室超然獨往與法印俱自是師資兩忘空色皆遣暴風偃山而正智不動巨浪沃日而浮囊自安於是著法性論以究實諦公之懸解也公智刃先覺法施無方每禪誦之隙輒賦詩歌事思入無間興含飛動潘阮之遺韻江謝之闕文公能綴之蓋將吻合詞林與儒墨同其波流然後循循善誘指以學路由是與天台道士潘清廣陵曹評趙郡李華潁川韓極中山劉穎襄陽朱放趙郡李紓頓邱李湯南陽張繼安定皇甫冉范陽張南史清河房從心相與為塵外之友講德味道朗咏終日其終篇必博之以文約之以修量其根之上下而投之以法味欲使俱入不二法流公示教之攘門也內張天機外與物接捨法無我以虛受人曠焉若空谷之響止水之象優而柔之使自得之其道樞未始不無為也而飲其和者亦虛而來實而歸明徵其所以然則不得其眹公應之無涯也宜豐寺地臨高隅初無井泉公之戾止有靈泉呀然而涌噴金沙之溜於禪庭左右挹之彌清之無窮公精至感物也嗚呼日發天啓壽量彼一劫住世聖道以拯拔喪得大雲而涼火宅其公乎吁嗟昊穹奪我善友使生不極其涯道不竟其源豈前已就諸有可出將轉現他方乎為應化之始終法身之去來非思議所及乎凡今學徒戒歸若涉大水而無梁抽毫強名以志陳迹其銘曰茫茫五濁愛習如債何以為師尸羅之戒卓爾上士一念識滅萬法懸解名離性空破魔結壞英華作卓爾立志於焉懸解持佛祕藏俾道勿壞穎脫諸有獄視三界上德不器大道無方天縱之文亦和其光發彼蒙童啓迪思量我皆令入直心道場奈何法船今也則亡適來豈逆適去豈順施未及普天胡不憖飛鳥無迹法雷罷震福庭空虛來者曷問言之糟粕留為祕印謹按自知道至於返真以下文苑英華作雙舄不踐居士之門六根不染欲界之塵學無常師悟不以漸內以了因證心果外以惠用接物與止水空谷同其應和而法施不住天機無方精義元言或形於章句騷雅之遺韻陶謝之缺文公能綴之其終篇必以了義博約和者量其根之上下而投以法味飽其風者亦虛而來實而歸或以足言言必緣情一緣則萬緣作而諸相見無乃不可乎曰佛法自利他不係於權實將善誘之心咱和之固曰示入固波可也公又嘗謂無生正位實相宗本二乘所感談者莫究於是著法性論以辨之而迦葉後問惠遠奧旨騞焉疑斷渙若冰釋者是以為向使大啓壽量好務宏道則法王度聞非公孰寄嗚呼生不極其涯道不竟其源豈應物之緣住世之數止於是乎為世締之始終報身之去來非思議之所及乎清塵緬然學者安仰若涉大水而無舟航儒生強名以志陳迹世與道交相興喪宏之者在人非庚桑楚不能使畏壘大壤向化微文翁蜀學不崇閩中無儒家流成公至而俗易民賴德施古今一也初成公之始至也未及下車禮先聖先師退而歎堂室湫狹斆學荒墜懼鼓篋之道寢子襟之詩作我是以易其地大其制新其棟宇盛其俎豆俎豆既修乃以五經訓民考校必精絃誦必時於是一年人知敬學二年學者功倍三年而生徒祁祁賢不肖競勸家有洙泗戶有鄒魯儒風濟濟被於庶政大歷十年歲在甲寅秋九月公薨於位於是㣥吏庶民耆儒諸生雨泣廟門之外若有望而不至號曰豈天不欲斯文之漸漬於東甌之人歟不然何錫厥化而不遐公之年也吾黨瞪然嗚呼曷歸判官膳部員外郎兼侍御史安定皇甫政殿中侍御史潁川韓贄監察御史河南長孫繪率門人部從事州佐縣尹相與議以公之功績明示後世謂及嘗同司諫之列宜備知盛德善政見託論撰以實録刻石曰公諱椅字某皇帝之諸父宗室之才子寬裕愷悌孝慈忠敬莊而成式文而強力治王氏易左氏春秋酌其精義以輔儒行故居處執事著書屬詞非周公軌躅不踐也天寶三載應選部辨論為安陽縣尉中興之後歷御史尚書郎諫議大夫給事中十餘年間周歷三臺言中彞倫動中大本上交不諂下交不瀆家貧不樂清近求為京兆少尹無何出守宏農宏農人和又移典華陰兼御史中丞華陰之近者安遠者來天子以為才任四嶽十二牧之職大歷七年冬十有一月加御史大夫持節都督福建泉汀漳五州軍事領觀察處置都防禦等使八年夏四月龍旗六轡至自京師閩粵舊風機巧剽輕資貨産利與巴蜀埒富猶有無諸餘善之遺俗號曰難治公將治之也考禮正刑節用愛人頒賦遣役必齊其勞逸視年豐耗量入以制用削去事之煩苛法之掊克者吏不奉職民不帥教則懲以薄刑俾寖遷善繇是民知方矣公將安之也初哥舒晃反書至公屨及於門遽命上將帥戈船下瀨之師西與鍾陵軍會先拔循潮二州以援番禺推誠誓衆士皆奮勇既而大憝就戮五嶺砥定民是以康繄我師是賴人無姦宄寇賊之虞矣公將教之也考頖宮之制作為此學而寓政焉躬率㣥吏之稍食與贖刑之餘羡以備經營之費而不溷於民也先師寢廟七十子之像在東序講堂書室函丈之席在西序齒胄之位列於廊廡之左右每歲二月上丁習舞釋菜先三日公齋戒肄禮命博士率胄子修祝嘏陳祭典釋菜之日釁器用幣籩豆在堂樽罍在阼公元端赤舄正詞陳信是日舉學士之版視其藝之上下審問慎思使知不足教之導之講論以勗之八月上丁如初禮歲終博士以遜業之勤惰覃思之精粗告於公斂其才者進其等而貢之於宗伯將進必以鄉飲酒之禮禮之賓主三揖受爵於兩壺之間堂下樂作歌以發德鹿鳴南陔由庚嘉魚南山有臺以將其厚意繇是海濱榮之以不學為恥州縣之教達於鄉黨鄉黨之教達於衆庶矣公薨之明年太常議按公叔發修衛國之班制以交四鄰故易其名曰文孔文叔其勤公家夙夜不懈衛人銘其彞鼎以公尊教勸學德洽荒服乃奏諡曰成詔贈禮部尚書而刻金石之禮則闕而未備今也敢播德馨貽之無窮其銘曰公之文兮肅恭且仁宣力事君潤飾經術砥綏斯民公之武兮魚衆寡不侮剛亦不吐率師勤王戡厥醜虜公之移風經始泮宮百堵皆興孔堂崇崇四科以班乃侯乃公秩秩祀典鏘鏘禮容大昕鼓徵學士萃止裦衣方屨登降以齒從公于邁樂我泮水我廛我里講誦資始比屋為儒俊選如林縵胡之纓化為青襟公宜難老為學者司南板日告凶實天匪忱噦噦和鸞兮不聞遺音願言思公兮如玉如金餘烈鏤石以塞民心北斗魁戴匡六星曰文昌宮其三曰貴相聖人法天建官作為台司以左右民於是乎有敬敷五教平章百姓之職居之者下代天工上應星宿其或一麾出守八命作牧內為吉甫外為方叔宏道利物其政一也惟唐七世皇帝誅羿澆纂舊服得柱石之臣曰平原張公諱鎬字從周秉中庸之德含光大之量輟耕隴畝為唐臯夔推轂於河南樹風於荊門作賓銅樓登侍禁掖牧撫人半歲洪州再稔鰥寡不侮神人咸若慈惠之政洽於百城享壽六十有一歲在癸卯七月壬寅薨於位夫德之被物也厚則物之興感也至故公之捐館自九江至於敷淺原南暨於梅嶺東臻於閩徼蚩蚩之民靡幼靡艾泣涕乎遺風悽愴乎棠陰懇懇乎若求而不得企而不及也僉曰平原其可謂盛德也已子惠困窮俾富而庶若解衣衣我輟食食我棄我往矣誰育我矣逝矣遠矣音徽沫矣吾儕小人嗚呼疇依盍詠歌之刻諸金石秋八月既殯耆老吉州安福縣丞鄧林玉等一百一十五人乃率籲衆戚謀及故吏從事州長縣尹虎賁亞旅鄉老大夫相與稽乎陳迹建頌表德用廣留侯之世家紀子産之遺愛禮也公曾祖曰善見位朝議大夫越州司馬司馬生武定任荊州都督府戶曹參軍戶曹生知古官止代州司馬廣德元年贈太子少傅自司馬至少傅世以儒顯天鍾美於其後嗣四世而生平原燕頷犀額山立玉色森然若大廈棟梁清廟祭器該宗六學大抵以周易為師將探元化恥觀朵頤隱居南山蓋三十期天寶十四年始褐衣召見凡用舍繫於才行止牽乎時當無為無事則許由善卷各得安其節及人思俾乂則黃公角里不能逃其用勢使然也繇是一命左拾遺再命右補闕修國史三命侍御史四命諫議大夫五命中書侍郎同中書門下平章事起布衣二年綰相印佐王業明揚之盛輝動古今於時至德二載也天子方以復夏之師搜於岐陽三河之人左衽是懼公入敘百揆出分二陝帥東諸侯之兵收復宋鄭誅後至者以懲不恪安危之機懸於方寸方將董正東夏懷柔山戎會帝咨百工曰有能典朕荊楚俾姦宄不作豫惟克邁乃勳於是拜公荊州大都督府長史明年元良肇建上曰疇若豫樂正父師之職汝作賓客卒調護太子嘉言惟允於是授太子賓客上思夙夜出納言語侍從之臣命公作左散騎常侍會鍾陵鄱陽之間人咨艱食上又曰命汝作州伯總十聯之任俾余無虞惟爾賢於是有洪州之拜粵寶應元年冬十月公朝服受命至自臨川彰善用明疸惡用威一法度用信布愷悌用德慰薦掾吏勞徠鰥寡化以公廉扇以禮讓煦而嫗之使自得清而靜之使自定於是豪民猾吏革面斂手家有忠信人懷孝弟暢於事業布於風俗浹於人心被於歌詠是歲也三吳飢人相食厲鬼出行札喪毒痡淮河之境骼胔成嶽而我倉如陵我民孔阜犬牙之境疵癘不作災不勝德也臨海賊袁朝狃於會稽之役侵我東鄙江介大恐民斯繹騷公命左軍屯上饒之隘塞常山之口斬其唐突者三千餘人自是姦黨散落不敢南向而射邦人安焉舒城賊帥楊昭憑蜂聚之衆殺同安郡守劉秋子以叛師潰而奔犯我疆埸公覆而取之懸其首於五達之衢凶徒殲焉沈千乘者新安大豪結椎剽之黨為之囊士冖柘弄兵潢池虔劉我民桴鼓之聲相聞郡國二千石不能禁公命次將斬之以徇鋤其根株俾無遺類新安民庶室家相慶江干清焉振六條之宏綱開布大信從善如不及視民如赤子克已推誠以百姓心為心飲之以和俾服從教化輕剽呰窳奪攘矯虔之俗罔或干於政憀悴蹇亟苛察繳繞之吏不能見其巧哀矜民庶期於無訟德政行焉眘選乃僚必國之良有若博陵崔賁昌黎韓洄趙郡李惟嶽北海王士華河間邢宙河東裴孝智隴西李道皆卿才也以嘉言碩畫參公軍事澄清之內無濁流審克之下無冤民淑德旌焉公之解裋褐而拖國章也十有一年矣雖匪躬之故宣力不暇而滄洲願言未始弭忘每曰少伯子房吾之師也纍乞骸骨將角巾故山朝廷方虛三老五更之位待公除書未下而公薨焉嗚呼哀哉裦德之盛典退身之正志嚮用之遐福三者俱未從人欲斯可以歎矣惟公出將入相文武為憲讜言成略藏在册府代莫得而聞也今採其德刑禮義之善利物者頌之於石慰彼墮淚者之心焉爾其文曰純粹之氣升於星辰降為賢人皇王得之以釐百工以步馬下民九江之南五品不遜百姓不親平原來思綏之以德俾民化淳寬厚清靜飭躬率先是訓是勤猛獸不噬夜犬不吠豐年來臻藹藹令德家有膏雨戶有陽春牧我苦晚棄我苦早實天不仁南州寥寥東山依依德音若存千載之後魂魄登此頌聲不泯皇帝嗣位二載河內得賢二千石曰猗氏楊承仙者剛毅公廉仁明愛人起鞞鼓間為唐循吏天生貞方非有經術潤飾推誠御衆以身率先民用不擾政是以茂於時王師始平河北而覃懷才歸於我大兵之後城郭為墟相國梁公拔公於戎馬之上表為刺史俾慰安斯人公既至則弔其瘡痍翦其荊棘省事節用寬其征而均其力然後濬決古溝引丹水以溉田田之汚萊遂為沃野衣食河內數千萬口流人襁負不召自至如歸市焉鰥煢無告不能自耕者貸其種與農器而教之視五穀所宜督其程課勞來不怠使民無不咸返其本每循行屬縣問所疾苦時其飢飽心為慘怛如身之恤臂指慈父之視幼子也性嚴不殘而恭於奉法訓軍以律禁暴以肅有抵刑者雖拔葵犯禾殺之無赦由是兵不為盜猛獸不食人河內之犬無夜吠者人人得敦其業而厚其生上奇其能以璽書勞勉封宏農郡公邑二千戶拜其男鋭河南府參軍方倚以牧人不遐其福大歷二年八月六日公薨於州春秋五十四皇帝悼惜詔曰軍興已來列郡凋耗二千石少能以教化稱者唯承仙苦心精力惠此一州家給而人知禮節氣和而歲無災害三年有成表課第一賢守既歿誰其嗣之宜贈太子少傅好事者撰公景行謂公清直強力能勤其官百城之州三軍之帥可使居其任量不及而歿惜哉初岐國公魯炅之守襄鄧也公為新軍佐敢殊死督戰奮士卒先藺石亂中敗面滅鼻而不言病卒以是挫敵軍中服其義勇及涼公秉鉞而委質焉前後保河陽守高平安潞鎮鄴董戎壺口戮力危機之中賈勇倉猝之間惟盡敵是求未嘗顧身元戎賴之卒成大勳由是歷羽林金吾光祿大夫加開府儀同三司試太常卿而後至於是州也公嘗表請歸葬途由於洛洛陽人聞楊懷州之至也環而觀之及其還也懷人數千須於路其亡也闔境相弔童子不巷歌凡立誠應物者信不足則行失飾知沽名者實不足則名喪若楊公者非仁必由已而誠在言前則不能使千萬人悅之之速如是某官某耆壽某等願復攀公之朱轓望公之清揚而靡因也故立石為碑慰彼永思云其詞曰吳公文翁遭時無危因而綏之其績易施公之來斯大盜始夷師旅飢饉丁於此時頑民反側比屋流離飲公醇仁而忘怨咨飢者得食寒者得衣豈知典謨以吏為師豈必法令信則不欺功倍古人愛及煢嫠人之戴公父兮母兮公之品望與古賢希宜從人欲俾壽無期嗚呼不傭捨我曷歸公俾我活何以報之我思公兮涕淚此碑漢家之建侯親親也以荊燕吳楚為首封而後嗣多材世濟厥美辟疆路叔更生子駿比肩而出慶鍾故也唐有天下肺腑是依有若江夏淮安河間東平以明略茂勳左右大業其休德粹氣降為百祥公子公孫或哲或仁勤勞王家焜耀國牒從東平三葉後生睢陽言春秋者謂公族多士與炎漢侔矣公諱少康字某太祖景皇帝五代孫太祖生雍王繪雍王生東平王紹東平王生高平王道立高平王生畢公景淑初畢公娶於太常京兆韋萬石女有才子三人伯曰孟康忠敬直溫謙光不耀官至太子左贊善大夫仲曰仲康宏毅密重文敏貞諒由尚書主客郎中剖符楚州人到於今由其教而思其躅公楚州之母弟也纂二昭二穆慎身之烈迪元方季方裕蠱之範家貽其謀天鍾其休故蓄為和氣播為盛德年始孩而畢公捐館七歲受孝經至喪親章捧書孺慕哀哽不食鄰伍長幼為之涕泗既冠遭太夫人棄孝養苴白八茹毒泣血無聲者三年自是孝稱鄉黨名冠宗室會垂拱永昌以後天下有燕啄之謠七廟支庶不絶若綖公正志蒙難危行全德貞厲二十年以俟道長中興後乃筮仕由朝邑縣尉凡七徙官至尚書祠部郎中以大府上佐授潞州司馬因考績彰聞拔為青州刺史於是海岱貢篚衣履天下俗尚夸侈吏務豪奪公以德禮示法度以誅賞禁慝宣明教化飭行率先使刺繡倚市者悉返耕織於是貪者廉善者勸海濱之俗變至鄒魯按察使戶部侍郎宋遙以狀聞璽書裦異遷公於常州賜一子出身常之吏民望公風聲其奇邪僭濫者解印綬自去比及下車無為而治復以高第擢拜徐州刺史先是歲比大歉人流者什五六公條奏逋逃之名削去其版然後節用務本薄征緩刑以來之歲則大穰人不患寡浮遊自占者至數千萬優詔嘉歎賜帛二百匹元宗後元年改宋州為睢陽郡命公為太守淮河漕挽刀布輻湊萬商射利姦之所由聚也公謂非勝之艱安之惟艱故峻其侵漁之令宏其并容之仁吏或不廉不恪不惠不迪糾之詰之必誠必信公之誠信不欺故獄市不擾閭井輯睦由是飲公醇固之德者如餒者得哺寒者得纊有司方將計課以聞天不惠於宋乃崇降厲疾三年春賜告歸洛陽是歲十二月丙午薨春秋六十有四宗室悽欷士友失圖宋人徐人輟舂相唁明年某月遷宅兆於京兆見子原先塋禮也公雅善屬詞有集二十卷晚節好禪味耽道論嘗傳道德上下經五千言為之訓解以究微旨其為政貞方廉靜明達端懿嚴不殘直不訐清不矯時善不徇名交友推誠好惡中節博見強志親仁愛士居險用晦遭時利往行藏之機與道屈伸未始以去就寵辱瀆其出處而壽位未極其量也故休祐復集於後昆夫人某縣太君廣平程氏生元子曰涵以忠文孝讓儀刑王室天子謂可內司九法外鎮百城大歷七年夏五月由尚書兵部侍郎為御史大夫蘇州刺史巡省江左邁德詒訓之所及也夫人沛國武氏以繼室生仲子汘汘弟濃皆卿材而不幸早世某年月日朝廷建推恩之令追贈公祕書監大夫之孝達於祖禰也及嘗忝禮官之屬知王侯之廟祧昭穆與功烈德善故受命於大夫酌而為志著之樂石以代蒸夷曰敦敘九族皇風所始公生德門運叶麟趾王曰叔父高陽才子纘乃祖服似續介祉砥績三署舊章孔修赤舄彤襜牧彼四州明照姦訛仁覆隱憂神罔時怨民斯輯柔民之不幸公壽不永王曰彼天匪憖俾屏仁浹鰥寡道在彞鼎臧孫有後遺烈煥炳楚元王傅後五世長孺相漢始自魯國徙家杜陵其後十六世孫景略仕魏為青州刺史青州生隋倉部侍郎南皮公瓚南皮公生三子皆才同時為郎長曰季武實居主爵次曰叔諧典司庫部季曰叔謙歷吏部考功時人號為三列宿考功生知人以司庫員外郎為職方郎中自長孺至青州二丞相一侍中十一二千石自南皮至職方二葉五尚書郎為當世言婚宦者謂之郎官韋家楩柟瑤琨非崇山濬源不生故公侯卿大夫實鍾德門事業名聲與冠蓋俱四牡龍旗之慶百代彌熾盛矣哉公諱縝字某職方之仲子也性忠廉無邪溫直好禮用誠明博厚祇若祖考之訓雖顛沛不違仁非得之不苟求言足以成事而濟衆默足以居易而慎獨鄉舉經行吏部登賢能拔授祕書省校書郎親纍徙官再遷至亳州臨渙縣令寬仁愷悌之政行乎千室期年而頌聲興遷薛王府文學轉祕書郎王宮圖牒天祿典籍公皆以儒服參焉藝文修而彞章敘歷佐濮徐仙三州清恪如一入為申王府司馬以達才居陪臣之列宏道以奉職安義以直已諫從政肅繄忠亮是賴掌邦典者謂王門之治可移於公卿方議登之三府會寢疾終於位是歲開元十二年歲在甲子冬十月二十二日春秋若干夫人河南元氏益州唐安縣主簿知柔之女承先祖供祭祀之謂職閔勤勞勸以義之謂德莊敬恭順婉娩聽從之謂禮顧復勞瘁均養善訓之謂慈夫人兼有焉某年月日春秋若干卒某年月日合葬於某原嗚呼才宜貴仁宜壽世祿宜富三者公夫人皆居其地不臻其分鄉黨宗族以命不可説相弔焉惟明德必有後之言也信有若孟子幼成博見利器鏗若金錫天寶十年自尚書兵部郎出守漢中兼山南西道採訪處置使移典河內河內人至今頌之仲子幼卿洛陽縣丞叔子幼奇宋州楚邱縣令季子幼章有貞幹密識恭寬而明前後八執憲而再起草自兵部郎中持節典泗楚二州錫金印紫綬咨以屯田贍軍食如漢營平侯故事以言以立皆公之教訓也寶應二年春三月以子為大夫故詔追贈公太常卿君子謂公之義方慶及其身而楚州之孝誠格於宗祏禮也猶以為與化俱者人事不我期者邱隴雖大宗小宗可詳諸姓氏譜命官日時各存乎屋壁之志若遺直與故事非金石刻則無以示後世也由是楚州稽首於廟見託撰德垂懿萬億孝思罔極其銘曰肅肅乃祖翼商屏周總㣥邦兮退傅間生扶揚重侯德乃降兮龜紐虎符黼衣彤弓世相副兮百代純嘏鍾仁於公德斯懋兮為邦三年足民知方政之臧兮校文石渠觀書魯堂志自強兮三佐列郡曳裾遊梁道未光兮已矣介福不充景行吁嗟命兮一經之遺垂裕果盛哀榮並兮子子孫孫丕承忠敬荷餘慶兮開元天寶之際元宗始以八柄付三公由是台司得專其廢置其中或憑寵固位懼天下有異已者諸附離之者皆出入三臺若公才令名以望見憚則稍稍優其俸而黜其職故天水權公幼明由新安縣令為絳郡司馬高平郡別駕而歿同於道者皆竊歎之是歲天寶六載秋八月也歿後草有二載歲次巳未春二月返葬洛陽故塋夫人新鄭縣君滎陽鄭氏祔焉縣君某縣某官某之孫某之子以仁儉好禮輔佐懿德柔明之風訓齊閨門壽六十五大歷二年十月某日終於丹陽初公娶於博陵崔氏生子曰驊而終新鄭以繼室生四子曰軼曰申曰器曰舒舒不幸短命驊軼申器悉忠信好學善屬文位未顯而令名歸之慶之垂訓之流也至是既卜宅兆驊等懼日月逾遠後裔不知其先人之德善謂及忝鄉舉之舊故使録而銘之云公諱徹字幼明隴西天水人也權氏之先出於顓頊其遠相殷武丁之小子生而有文在手曰權因以權受封且命氏焉至周為楚武王所滅國除其後有仕隴西者遂家於天水歷漢魏晉宋間子孫世都尉為郡守至裔孫翼與王景略同佐苻堅官至僕射後僕射數世至景宣景宣生士玢並知名於時士玢生萬春歷華州刺史封千金縣公華州嗣右領軍將軍曰文獎領軍嗣永興令曰懷育公永興之嗣也奕葉之明德粹氣藂於其躬故融而為仁行播而為文學童子時舅氏崔湜奇其文嘗謂有何無忌之似其鄉舉也考功郎中蘇頲拔諸㣥萃之中連尉湖城汾陰新繁渭南河南五縣開元二十三年拜監察御史會監祭太廟先時同事者約相與偕赴及將赴祭約者有故不至遽不暇告公曰人約我矣可先已而後信乎遂不赴坐是降為河南府法曹君子義之初選部舊制每歲孟冬以書判選多士至開元十八年乃擇公廉無私工於文者考校甲乙丙丁科以辨論其品是歲公受詔與徐安貞王敬從吳鞏裴朏李宙張烜等十學士參焉凡所升獎皆當時才彥考判之目由此始也於是天下無兵百二十餘載搢紳之徒用文章為耕耘登高不能賦者童子大笑公攘臂其間以仁義為已任片言隻字動為學者所法時輩榮之而居家清方惟德禮是仗潤身飭吏不過經術不矯持操以遊媚貴幸行威作福者忌之由是官徙而階不遷從法曹數歲而後有新安之拜及至歷絳郡高平任愈疏遠安貞中立未嘗易方虛舟其心與位升降春秋六十四而終蓋道之行止與時不并論者以漢梁叔敬桓君山為比公所著文二十卷其立言之宗趙郡李華編而序之若世系事業則書諸斯文其文曰咺兮權公有德有言忠恕廉清道直而溫行有餘力言足成文居官釐績勤約是守與明以信寧黜不苟迹屈志伸義彰身後冉政遊學左詩潘誄風流遺烈足以遺子九原與歸末由也已桉前志禪師號僧璨不知何許人出見於周隋間傳教於惠可大師摳衣於鄴中得道於司空山謂身相非真故示有瘡疾謂法無我所故居不擇地以衆生病為病故至必説法度人以一相不在內外不在其中間故足言不以文字其教大略以寂照妙用攝㣥品流注生滅觀四維上下不見法不見身不見心乃至心離名字身等空界法同夢幻亦無得無證然後謂之解脫禪門率是道也上膺付囑下拯昏疑大雲垂陰國土為化謂南方教所未至我是以有羅浮之行其來不來也其去無去也既而以袈裟與法俱付悟者道存形謝遺骨此山今二百歲矣皇帝即位後五年歲次庚戍及剖符是州登禪師遺居周覽陳迹明徵故事其茶毗起塔之制實天寶景戌中別駕前河南少尹趙郡李公嘗經始之碑版之文隋內史侍郎河東薛公道衡唐相國刑部尚書贈太尉河南房公琯繼論撰之而尊道之典易名之禮則朝廷方以多故而未遑也長老比邱釋湛然誦經於靈塔之下與澗松俱老痛先師名氏未經邦國焉與禪衆寺大律師釋澄俊同寅叶恭亟以為請會是歲嵩嶽大比邱釋惠融至自廣陵勝業寺大比邱釋開悟至自廬江俱纂我禪師後七葉之遺訓日相與歎塔之不命號之不崇懼像法之本根墜於地也願申無邊衆生之宏誓以抒罔極揚州牧御史大夫張公延賞以狀聞於是七年夏四月上沛然降興廢繼絶之詔册諡禪師曰鏡智塔曰覺寂以大德僧七人灑掃供養天書錫命暉煥崖谷衆庶踊躍謂大乘中興是日大比邱衆議立石於塔東南隅紀心法興廢之所以然及以為初中國之有佛教自漢孝明始也歷魏晉宋齊施及梁武言第一義諦者不過布施持戒天下惑於報應而人未知禪世與道交相喪至菩提達摩大師始示人以諸佛心要人疑而未思惠可大師傅而持之人思而未修逮禪師三葉其風浸廣真如法味日漸月漬萬木之根莖枝葉悉沐化雨然後空王之密藏二祖之微言始燦然行於世間浹於人心當時問道於禪師者其淺者知有為法無非妄想深者見佛性於言下如燈之照物朝為凡夫夕為聖賢雙峯大師道信其人也其後信公以教傳宏忍忍公傳惠能神秀能公退而老曹溪其嗣無聞焉秀公傳普寂寂公之門徒萬人升堂者六十有三得自在慧者一曰宏正正公之廊廡龍象又倍焉或化嵩洛或之荊吳自是心教之被於世也與六籍侔盛嗚呼微禪師吾其二乘矣後代何述焉庸詎知禪師之下生不為諸佛故現比邱身以救濁劫乎亦猶堯舜既往周公制禮仲尼述之遊夏宏之使高堂后蒼徐孟戴慶之徒可得而祖焉天以聖賢所振為木鐸其揆一也諸公以為司馬子長立夫子世家謝臨川撰慧遠法師碑銘將令千載之後知先師之全身禪門之權輿王命之丕顯在此山也則揚其風記其時宜在法流及嘗味禪師之道也久故不讓其銘曰衆生佛性莫非宿植知誘於外染為妄識如浪斯鼓與風動息淫騃貪怒為刃為賊生死有涯緣起無極如來憫之為闢度門即妄了真以證覺源啓迪心印貽我後昆間生禪師俾以教尊二十八劫迭付微言如如禪師膺期宏宣世溷法滅獨與道全童蒙來求我以意傳攝相歸性法身乃圓性身本空我無説焉如如禪師道既棄世將三十紀妙經乃屆皇明昭賁億兆膜拜凡今後學入佛境界於取非取誰縛誰解萬有千歲此法無壞
