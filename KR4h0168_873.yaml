front:
  text: 全唐文欽定全唐文卷八百七十三致雍莆田人仕閩為太常卿入南唐以通禮及第除博士遷祕書監致仕
  hash: sha256:a420e7b816d83bc643aa56642432587ae2f94d387bf6761fd1b089ec1eccb196
  markers:
  - {type: head, offset: 14, content: 陳致雍(一), id: KR4h0168_NFKB_873-h1, level: 1}
body:
  text: 右臣聞君父南面臣子北面七代之所不更凡誥誓之命使者宣行禮未安者故楚國武烈王諡冊命既非在殯之時約禮合行於廟使升詣楹間今之廟制出神主於室內北壁下使若南面統於外神莫敢安其室若北面宣制是失君之位禮云時為大順次之今既非時合受於庭宣冊付嗣王既君命得申於禮甚順謹具奏聞知班御史高焴奏無祭南北二郊獻官合習儀近日多恃其練達不親行事自今以後仍請著冕服習儀兼儀之禮自古無明文牒太常禮院知委者右臣得班司轉告令獻官著冕服習儀竊以古之習士於澤宮以觀其容然後得預祭周禮大宗伯掌大祭祀大禮謂習禮也欲其慎重敬事神祗自漢興叔孫通列綿蕝於野以表厥位習儀之禮其來尚矣若以紱冕徽章接神接神盛服土坌之中私相褻瀆實為不可伏乞且遵往式以便服習儀仍下尚書省指揮議定准中書刺問諸衛所管有上中下府折衝府都尉何為上中下府謂十二衛管天下兵在外者有五百七十五府每府以人數分為上中下等各分隸在十二衛只如左右衛有武成武安等五十府十府有折衝都尉各一員有左右果毅都尉各一員若除官則以其名額通稱曰某衛某府都尉其餘即可知也臣塵忝曲臺之司謬闕典禮之政愧其不才敢謂曠職臣見太樂署教習奏其章句播之管絃逮二十餘年每陳設殿庭宮懸之樂只用祭昊天郊禮出入管和均調奏之諒其褻瀆上元塗民耳目謂臣不知矣近見勾當太樂署曹令虔報臣今月十八日入德昌宮與禮部侍郎徐鉉偕來聽樂非殿庭宴樂也陛下臨軒合用逐月均調宴㣥臣合用姑洗蕤賓二調歌湛露鹿鳴等章冊后日會宴則合奏正和之樂以夷則之調餘皆用時月之律且知音審聲此事尤難若撰樂章曲折相中合其聲調盡善盡美且乞喚曹令問臨軒宴會樂作何聲調新譜與周詩雅句同否試奏其樂復歌其歌詩上下抗墜曲折和否臣見太廟署申十月二十七日夜元宗室鳴震及晨撿行柱礎破裂四片棟宇如故再撿行與前狀同者臣竊見中夏以來水潦浸溢垣牆倒壞陛下動明發之懷羌親賢修奉疑此則又以見陛下虔奉祖宗非謂簡慢祭祀今廟室鳴震柱石破裂陛下宜遵恭儉之風克守純固之業將垂鑒誡畏敬神靈臣聞羽籥干戚所以調八風也金石絲竹所以正五音也古先哲王致人神協和彞倫攸叙者鮮不由之高皇帝再造丕基顯登大寶修三代之禮正八佾之儀未及下章遽命置舞童令樂師導之以節奏教之以升降特備大禮於今二十年矣近者兵戎來侵王師出討言便宜者或以舞童食積年之儲為無用之具請並充用士伍以從討伐此皆臺隸之言非聖賢之教也禮樂者國之本安可無之而又或衣冠之子或韋布之人荷戈㦸以禦戎執鼓旗而捍寇非其能也具其數不過百十人而已加之以教習積年成功一旦棄之後無傳者存之未必減太倉之粟廢之豈益國家之師哉臣竊惜之仲尼曰爾愛其羊我愛其禮蓋亦此也伏惟皇帝陛下酌聖王之盛典特降聰明下闕臣竊聞中書商量不許旌表吉州孝子瞿處圭等門閭事伏以上古之時人民淳素故可無為而治三季澆薄無常行或可激勸而成則旌表門閭是其旨也中書舍人張緯不知大體屢興僻論以為鄉閭之民苟避徭役旌表則遞相倣效止塞則永絶其源此茸吏無識者之所談非大臣佐天子興教化之良術也且有闕來孝義著聞者絶鮮陛下之德所感相繼有廬墓者三人而不以為人化所滋翻慮其遞相倣效若相率為賊則實害於時相倣行孝又何傷於政懲惡本欲人懼賞善本欲人勸倘遞相倣效則是陛下敦勸之有驗也如不倣效又用旌表何為今朝野之間不義不孝者何嘗不有風俗若此正是陛下急於敦勸之秋或小吏出此無稽之言猶大臣必須懲絶況居清切之司當顧問之地首創斯議謬莫甚焉噫為人臣子者上有君下有親何思沮人之為孝夫王政之基無先於學人倫之本莫大於孝去年停貢舉已沮陛下教人之為學此時於激勸又沮陛下教人之行孝將順其美一何疏哉伏惟皇帝陛下至德感於上元廣愛刑於四海邪見詭說必不能上惑聰明臣雖不才而所務者大所思者遠恐或有一可之言是以不敢不奏昭愛宮牒請定皇太妃居弟改匡智喪事左右准禮以尊厭絶私親之服皇太妃弟體君為尊不敢服旁親之服而況私親乎請臨喪則素服入宮則否假內請准式謹狀右伏以九州之外蕃國來朝正朔之統不加賓客之儀有異周禮有大行人小行人之職而總其屬即今鴻臚四方館之任也今月十三日占城國獻馴象使朝對列方物為庭實所司引進按皇唐六典及開元禮禮閣新儀合中書侍郎詣殿西取表升奏置於香案侍中升殿承旨宣曰朕其受之蕃使再拜以退禮部尚書出奏其國所貢方物未審付所司侍中承旨又宣曰制可然後引方物付所司今未見其儀狀請下禮部指揮自今以後以遵常式臣職忝禮司合具奏舉准中書省劄檢諸州城隍神封為公侯合行典禮載詳其事甚黷彞倫且城隍之神實土地之祗光壽州奏封其祠甚違典制皇朝令式不載前文且五嶽視三公四瀆視諸侯在其地得祀禮其餘有功於民則祀之若城隍神無封侯之禮實見亂於秩宗等威嶽瀆臣竊恐諸道州郡志欲奏請寖以成俗淫祀之起猶茲漸矣伏惟皇帝陛下纂業以來今八載三才允治六事孔修革故鼎新必循於往制由中及外咸仰於聖謨凡降渥恩在乎名實其壽州已行封冊不敢更請改移或諸道重有奏論即合永行止絶臣聞士有衣冠不正朋友之過何况天子被衮執圭儀刑萬國有不中度者曷以表於式敬臣見法服內有通天冠及中單衣內方心曲領俱不合制度通天冠三代不聞其說秦有之漢因之降及魏晉迄於隋唐元正冬至朝會皆服之降於衮冕一等相承只以黑介幘上附十二蟬如一鷸耳臣又聞禮失求之於野臣今擬喚畫工尋歷代輿服志中且造進呈自餘諸王服遠游冠相次改制凡冠者彰別威儀端委形貌或簪白筆或眊貂或戴豸以觸邪或竪鶡以表武各因厥職盡有其名修撰高遠所奏甚協舊章其冠先已奏聞製造指揮訖右臣聞名位不同禮亦異數尊卑之秩朝廷有儀其有未正者臣忝禮司豈敢久而緘默纍據通事舍人紀德柔等連狀奏論以其序立從前只綴北省供奉班末尋為知御史高越奏改通事舍人班位即日無序立之地臣竊詳高越當時所奏末云北省無龍墀班是使通事舍人以卑處尊之上甚得不便竊以中書門下兩省近侍之官所以佐天子而規大政從容禁中左右獻替其或入閣分佐龍墀之上以宰相分立押班即今北省侍之制也於中品秩各不相敵者立位亦一一不相屬自殿陛以南分左右省及御史中丞殿中侍御史前後差次為位通事舍人既是中書門下官屬居贊導之職亦只於北省供奉班末龍尾道下分作兩行為位其南省既各不相統本以尚書六官為首自沙池橫街以南為位伏乞皇帝陛下准所奏遵皇朝舊式每過前殿朝日依此排立仍從班司指揮紀德柔等過沙池以背稍退後分左右為位所冀尊卑有序禮度無差謹具奏聞右臣伏見每遇朝會皇太弟與文武兩班橫行齊拜未合朝儀伏以儲后位尊㣥僚禮絶奏樂納陛鳴鐃出宮升降之儀明著禮令按開元禮班定後皆師保遵從入拜丹墀退自路門然後兩班齊拜臣職忝禮司合具奏聞臣聞禮云行則折旋中規周旋中矩凡百卿士預於朝謁鳴佩就列奏樂入班升降之容不宜遽速每見金吾將軍奏平安之時徑道驟趨且殿庭之儀與軍中之禮不同今請隨班入對揖位立然後寬翔步直上龍墀奏訖折旋而行卻歸本位候退班隨金吾仗出今冊國后排仗日便依此習儀侍御史知班高焴奏云翰林學士不合常朝預班序并郊廟攝祭三公行事及請假直具奏聞不具假牒臺省右伏詳皇唐故實沿革前儀文官兼翰林學士武官兼禁官皆位居內署職近中嚴外朝拘班曾不預列其或正至大仗大饗燕及纂嚴大禮服朝服與諸司郎官知制誥例為位其或官高者在職事官之上或假故直具奏聞學士院使牒御史臺知委郊廟攝祭准寶歷年敕應翰林學士及知貢舉在朝參限內並不差謹具如前今檢樂令繖有四角方者有六角八角者乘輿中宮紫繖皇太子亦然一品以下青又繖有方者圓者偏者偏者圓不正之貌不謂無所從來恐偏字誤書編字非編雉之為具乘輿中宮仗內亦偏扇王妃亦有偏扇一品以下無雉編扇臣伏聞禘郊祖宗配食之文其來有秩以遠祖而配者則始封之君是也若皇唐奉太祖景皇帝冬至配圜丘夏至配方丘法周人郊后稷之義也以近祖而配者受命之君是也若高祖神堯皇帝孟春配祈穀法周人祖文王之義也太宗文皇帝孟夏配雩祀法周人宗武王之義也國家憲章三代專配郊丘得禮之正也自開元中不用太祖景皇帝配天地以高祖神堯皇帝配天地謂高祖受命之君有天下不因於景皇帝至永泰元年太常博士獨孤及議云太祖景皇帝於柱國之任翼周弼魏肇啓皇業逮封於唐高祖因之以有天下之號天之所命也亦猶周后稷始封之祖若廢配天地是太祖之廟毀也二年禮儀使杜鴻漸與獨孤及議同自是相承復依武德貞觀故事不用開元禮文我烈祖再造區宇建七世之廟奉高祖居昭穆之上景皇帝不在太祖之位故以高祖配天地太宗配雩祀所以配雩祀者蓋興復以來未暇祈穀之祭故也竊以高皇帝廟號烈祖功格上元居百世以不遷繼中興而垂統禮合躋升之義位崇昭配之文修撰高遠所奏未協舊章然則國朝大祀歲只有三若上遷太宗文皇帝配皇地祗是祖宗皇帝之功有差父子之倫不叙子雖齊聖不先父食周人所以郊祀后稷宗祀文王以后稷為天地之主文王避祖之位今或依奏以太祖配皇地祗則於禮無謂未若建孟春祗穀一祭以太宗從下佐食然可奉烈祖高皇帝孟夏配雩祀使尊祖之禮得申免齊聖之食有黷考古沿酌庶協執中伏請更下尚書省衆官定議樞密院刺問壽州都院官衛匡適男乞入國子監修習奉御批如此之人得否下禮院檢上按樂經國學以教世子及王子公卿大夫元士之子謂之國學俾有道德者而教焉道德者今之國子博士掌教文武官三品已上及國公子孫從三品已上曾孫為國子監生者太學博士教文武五品已上及郡縣公子孫從三品曾孫為太學生者四門博士教文武七品已上及侯伯子男子為四門學生及庶人子升俊士為之也國子監太學也四門小學也今太學四門學算學皆國子監領焉四門俊士禮記王制論秀士升之司徒曰選士司徒論選士之秀者而升之於學曰俊士及按周禮司徒地官卿也其屬有鄉大夫知鄉人之賢能德行道藝以賓敬之三年大比考與之行鄉飲酒禮升諸司徒司徒以賢能之書貢於王即今隨貢吏上於尚書擢於禮部乃可入官也其有未登者入四門為俊士也司徒地官卿今戶部尚書也准長壽年敕諸府貢舉人皆戶部引進其衛匡適男既無品廕即合應鄉舉拔其秀異或未登禮部試即入四門學准皇唐令皆尚書省補別載學令條例某日磔雞於宮門及國東南西北城四門每門用雄雞一隻磔懸又於國門西方設牲用少牢告祭太陰神曰維年月日嗣天子遣太祝臣某昭告於太陰之神元冬已謝青陽馭節惟神屏除凶癘無有後艱謹以清酌敬薦於神尚饗祭畢黃門小童年十二歲十三歲以下一百二十人雜畫衣假熊羆等面執鞭仗火炬等分為六隊隊師二員執仗鼓四員持鉦用桃皮篳篥笛一部隊師一員黃金四目元衣朱裳揚戈執㦸押侲童立於前殿隊師指呼十二神名畢鼓譟入諸宮室遍逐疫從西門出以火授騎士傳炬疾馳投火於西門外水次而還有司設桃梗鬱壘禮畢臣致雍謹按周禮方相氏掌蒙熊皮黃金四目元衣朱裳執戈揚盾帥百隸而時儺以索室驅疫儺卻也卻逐疫癘凶惡夫陰陽之氣不即時退癘鬼隨而為人作禍月令季春命國儺謂陰氣至不止害將及人故儺陰氣仲秋天子乃儺陽氣不衰亦將害人故儺陽氣陽君也臣無儺君之道故稱天子此二儺皆為陰陽氣不退故國家以禮儺之季冬命有司大儺強陰用事癘鬼隨出害人故作逐癘之方相猶倣想也倣想畏怕之貌也司馬彪續漢書禮儀志云先臘一日大儺謂之逐疫中黃門年十二以下百二十人為侲子赤幡皂裳方相氏引逐禁中帝御前殿黃門侲子唱和呼十二神鼓譟炬火逐疫出端門五營騎士傳火棄洛水中設桃梗鬱壘出土牛於丑地以送寒氣隋志云北齊晦季冬日逐疫禁中鼓譟出分六道出郭門今禮皆從而行之執事十二執鞭何鳴鞭所以警怛疫癘使之去也十二者從天之大數謂之侲子何西京賦云侲童程材薛綜注云侲善也選其鋭捷之善者故云侲子用太卜太巫師何儺者扶陽遣陰太卜主陰陽之事故也周禮男巫掌冬堂贈無方無算鄭云逐疫贈送不祥巫與神通言送使東西遠近無常節也月令季春命國儺九門磔禳以畢春氣磔犬於九門犬屬金所以抑金扶水畢成春功東門盛德所在無所禳也又季冬命有司大儺旁磔謂遍十二門也亦是扶陽抑金助木也隋志春季磔牲宮門及四城門冬季大儺亦如之其牲每門用羝羊及雄雞一今禮不用但磔雞雞屬酉為舍磔之所以助殺陰也九門是何門九門謂皋庫雉應路是五也國門六也近郊門七也遠郊門八也關門九也磔謂取白犬磔破其腹磔猶張也謂披張其犬於九門也禳告四方之神止其災癘犬屬金金剋木所以抑金扶木畢成春功東方三門不磔者春位不殺且盛德所在無所禳也准樞密院牒去年遣李金全統軍太常寺定有禡牙之祭今遣親王出征禡牙之祭儀式如何右檢歷代遣將出征漢高祖為王時設壇拜韓信為大將軍東出陳倉收略秦地魏遣將軍授鉞北齊遣將告廟授將軍鼓旗帝親付鉞後周遣將太祝以羊告所過名山川明帝遣大司馬賀蘭詳討吐谷渾帝告太廟付鉞如北齊禮隋皇太子親征及遣大將軍以豭豚鼓皆告太廟及宜於社二十年又遣晉王北伐突厥次兵河上禡祭軒轅皇帝以太牢制幣陳甲兵行三獻禮逮及皇唐之制天子車駕行幸及親征遣有司類宜造禡如開元之禮今檢開元禮無親王出征禡祭之儀㳂革歷代皇唐所遵法者以開元禮令式為定數內李筌太白陰經雖載將軍禡牙實非典故又禮記王制云天子將出征類乎上帝宜乎社造乎禰禡於所征之地謂師祭於其地而祭之本其經義實天子禡祭告於上帝以軒轅皇帝配諸侯無祭天帝之文若行禡祭即合祝文稱天子告於上帝今閫外之事將軍專行天無二統禡祭但所過山川作統軍元帥祭文竊見圜丘方澤大祭五方從祀獻官已下奠獻皆拜況五帝者是昊天之佐為尊所厭不合兼尊於昊天壇陛雖有降等而拜敬不踰於上在昔先儒亦曾議定伏乞宣下許依開元禮施行准祠部牒據彭澤鎮申大姑小姑乞改神儀者大孤山釋山云獨山曰蜀蜀孤也今下民訛言穿鑿浮僞作為淫祠何所尚哉必也正名於義安取且山川之神博施於民有功則祀之其或名山大川能興雲雨水旱雩禜於斯不替其可廢哉彭澤鎮所申改正甚為允當中所安排神儀部伍典式不載但依常式去婦人位立山神廟貌右臣准開元禮凡遇正至大朝及臨軒冊大臣皇帝衮冕服文武常參官服金吾左右將軍隨仗入奉乎安合具戎服被辟邪繡文袍綘帕櫜鞬況百僚具服八音在庭羽衛盛陳禮容異備獨有金吾將軍只以常服依望入閣班列於禮未安伏乞宣下所司指揮製造繡袍櫜鞬二副逼立大仗日依儀施行伏聽進旨右竊見圜丘配帝從祀相承酌獻只用匏爵且五人帝者人鬼之神昊天帝者天神之神先王所以立法示民禮有異數匏太各用文質有倫禮云器用陶匏天地之性也豈以匏爵貢獻人鬼又用之飲福甚相褻瀆深所未安臣今欲止開元禮施行臣今月日早臨軒發冊儀注先朝廷相承皇帝臨軒衮冕服皆殿中監進鎮圭蓋是誤行曾未沿革伏以執圭者所以尊事上帝嚴敬祖宗若大朝會及臨軒冊封公王惟端拱凝旒而已臣遍稽往籍無臨軒執圭之文其有不可削去者先王舊典明矣已指揮所司准議施行右臣聞古之諸侯五月而葬同盟至故也七月卒哭自葬反哭及虞祔成事禮用七祭其間相去一十二日始畢今檢開元禮引舊儀自漢以降王侯同用士禮踰月而葬三月而卒哭祭用三虞其來久矣今之諸侯地非專統禮無同盟畢數之文已革前載今月十三日慶王葬及虞合用三祭伏請准皇唐開元禮施行謹具奏聞准禮部牒議皇子儲君太保見外舅姑餉物按開元禮壻若不親迎女氏壻往見主人於內門之外拜迎必見之謂壻姻禮成敬之道也內門之外親統於內也若外舅外姑既闕女家因壻婦告廟以榮得禮也其上先靈銀器衣段典禮無文事須具回牒禮云喪冠不緌練冠亦不緌去冠之飾不全吉也雖練冠亦用練白布為縞冠乃衛文公大布之冠今大祥踰月吉祭之冠冠武亦用細布左辟積而厭辟積類梁之上也
