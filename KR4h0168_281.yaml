front:
  text: 全唐文欽定全唐文卷二百八十一貞節潁川人開元初為右拾遺遷太常博士
  hash: sha256:5a9485d5ddd9021d47660f2615f3bd9f62bca4f83ec37ad0ddf50bbe3cd4fb85
  markers:
  - {type: head, offset: 14, content: 陳貞節, id: KR4h0168_NFKB_281-h1, level: 1}
body:
  text: 臣聞敬宗尊祖享德崇恩必也正名用光時憲禮也伏見太廟中則天皇后配高宗天皇大帝題云天后聖帝武氏伏尋昔居寵秩親承顧託因攝大政事乃從權神龍之初己去帝號岑羲等不間政體復題帝名若又使帝號長存恐非聖朝通典夫七廟者高祖神堯皇帝之廟也父昭子穆祖德宗功非夫帝子天孫乘乾出震者不得升祔於斯矣但皇后祔廟配食高宗位號舊章無宜稱帝今山陵日近升祔非遙請申陳告之儀因除聖帝之字直題云則天皇后武氏王者制祀以功德者猶親盡而毀四太子廟皆別祖無功於人而園祠時薦有司守衛與列帝侔金奏登歌所以頌功德詩曰鐘鼓既設一朝饗之使無功而頌不曰舞詠非度邪周制始祖乃稱小廟未知四廟欲何名乎請罷卒吏詔祠官無領屬以應禮典古者別子為祖故有大小宗若謂祀未可絶宜許所後子孫奉之伏見章懷太子等四廟遠則從祖近則堂昆並非有功於人立事於代而寢廟相屬獻祼連時事不師古以克永代臣實疑之今章懷太子等乃以陵廟分署官寮八處修營四時祭享物須官給人必公糧合樂登歌咸同列帝謹按周禮始祖以下猶稱小廟未知此廟厥名維何臣謂八署司存員寮且省四時祭祀供給咸停臣又聞磐石維城既開封建之典別子為祖非無大小之宗其四陵廟等應須祭祀者並令承後子孫自修其事崇此正典冀合禮經臣等竊聞明堂之建其所從來遠矣自天垂象聖人則之蒿柱茅簷之規上下方圓之制考之大數不踰三七之間定之方中必居景巳之地豈非得房心布政之所當太微上帝之宮乎故仰叶俯從正名定位人神不雜各司其序則嘉應響至保合太和焉昔漢氏承秦經籍道息旁求堙墜詳究難明孝武初議立明堂於長安城南遭竇太后不好儒術事乃中廢孝成之代又欲立於城南議其制度莫之能決至孝平元始四年始制造於南郊以申嚴配光武中元元年立於國城之南自魏晉迄於梁朝雖規制或殊而所居之地恆取景巳者斯蓋百王不易之道也高宗天皇大帝纂承平之運崇朴素之風四夷來賓九有咸乂永徽三年詔禮官學士議明堂制度㣥儒紛競各執異端久之不決因而遂止者何也非謂財不足力不堪也將以周孔既遙禮經且紊事不師古或爽天心難用作程神不孚佑者也則天太后總禁闈之政藉軒臺之威屬皇室中圮之期攝和喜從權之制以為乾元大殿承慶小寢當正陽己午之地實先聖聽斷之宮表順端門儲精營室爰從朝饗未始臨御乃起工徒挽令摧覆既毀之後雷聲隱然衆庶聞之或以為神靈感動之象也於是增土木之麗因府庫之饒南街北闕建天樞大儀之制乾元遺迹興重閣層樓之業煙焰蔽日梁柱排雲人斯告勞天實貽誡煨燼甫爾遽加修復況乎地殊景巳未答靈心迹匪膺期乃申嚴配事乖彞典神不昭格此其不可者一也又明堂之制木不鏤土不文今體式乖宜違經紊禮雕鐫所及窮侈極麗此其不可者二也高明爽塏事資虔敬密近宮掖何以祈天人神雜擾不可物取此其不可者三也況兩京上都萬方取則而天子闕當陽之位聽政居便殿之中職司其憂豈容沈默當須審考歷之計擇煩省之宜不便者量事改修可因者隨時適用削彼明堂之號克復乾元之名則當寧無偏人識其舊矣謹議王制天子七廟三昭三穆與太祖為七昭穆迭毀而太祖常存聖人之大典也若禮名不正則奠獻無敘矣謹按孝和皇帝在廟七室巳滿今睿宗大聖貞皇帝是孝和之弟甫及仲冬禮當遷祔但兄弟入廟古則有焉遞遷之禮昭穆須正謹按禮論晉太常賀循議云禮兄弟不相為後也故殷之盤庚不序於陽甲而上繼於先君漢之光武不嗣於孝成而上承於元帝又曰晉惠帝無後懷帝承統懷帝自繼於世祖而不繼於惠帝其晉惠帝當同陽甲孝成別出為廟又曰若兄弟相代則共是一代昭穆位同不可兼毀二廟此蓋禮之常例也荀卿子曰有天下者事七代謂從禰以上也尊者統廣故恩及遠祖若傍容兄弟上毀祖考此則天子有不得全事於七代之義也孝和皇帝有中興之功而無後嗣請同殷之陽甲漢之成帝出為別廟時祭不虧大祫之辰合食太祖奉睿宗神主升祔太廟上繼高宗則昭穆永貞獻祼長序禮也此萬代之典敢不揚言謹議禮宗廟父昭子穆皆有配座每室一帝一后禮之正儀自夏殷而來無易茲典伏惟昭成皇后有太姒之德巳配食於睿宗則肅明皇后無啓母之尊自應別立一廟謹按周禮云奏夷則歌小呂以享先妣先妣者薑嫄也薑嫄是帝嚳之妃后稷之母特為立廟名曰閟宮又禮論云晉伏系之議云晉文鄭宣后既不配食乃築宮於外歲時就廟享祭而已今肅明皇后無祔配之位請同薑嫄宣后別廟而處四時享祀一如舊儀謹議王制天子七廟三昭三穆並太祖而七昭穆者父子之位則知七代之廟無兄弟之義矣殷繼成湯至於帝乙父子兄弟十有二君其正代止六而已易乾鑿度曰殷之帝乙六代王也此即兄弟不數為代之明據也又殷人六廟親廟四並湯而六殷代兄弟四人相次為君若以為代便當上毀四室如此則無復祖禰之祭矣古之廟位自禰已上極於太祖雖數溢迭毀隨而上遷三昭三穆未嘗有闕也又禮大宗無子則立支子又曰為人後者為之子無兄弟相為後之文所以舍至親取遠屬蓋以兄弟一體無父子之道故父子曰繼兄弟曰及禮兄弟不相入廟者假如兄弟代立孫姪承統告享之日不得稱嗣子嗣孫則當上列云伯考伯祖下繫云姪子姪孫此乃何成七廟之位號何成繼統之義序焉斯又不可之甚者也後漢論次昭穆定所繼之統以為盤庚不序陽甲之廟而上繼先君光武不入成帝之廟而繼元帝以弟不可繼兄故也又殷十二代唯三祖三宗明兄弟相及自別立廟不必繼之七代也後漢祖列敘七廟而惠帝不入其數豈非文帝之嫡兄乎及文帝代立子孫克昌為漢之太宗晉景亦晉文之兄緣景帝絶嗣不列七廟之數何以知之據永興元年告諡代祖稱景帝為從祖也若以晉武越次尊崇其父而致廟壞遂及亂亡何因漢氏遷出惠帝宗尊文帝而享代二十有四歷年四百三十殷廟何嘗見隳漢朝未始經折殷漢之盛委而不言魯晉之災引以為喻是以春秋書太室壞者乃垂明誡何必閔僖晉太廟所以毀折者天誅奢麗不以遷廟然天子七廟諸侯五廟辨貴賤之差也父子相繼億萬人之心也昭穆列序重繼統之義也今孝和皇帝若與聖貞皇帝相亞在廟正成六代何以辨貴賤乎裔嗣絶滅何以宗後代乎昭穆失序何以成繼統之義乎況國家遠遵殷之陽甲近法漢之成帝特以孝和實中興之明主開百代不毀之廟別立園寢永以寧神歲時蒸嘗與國終始有何不可乎又孝和在則天末年自身處儲嗣昌宗小豎素宣威權惡盈稔貫衆所共棄南衙則宰相歸奉北門則將軍嚮從推崇嗣君誰曰不可豈若韋氏悖逆干紀亂常總軍國之權操生殺之柄既行不軌欲振凶威將誅懿親以絶人望睿宗大聖貞皇帝枕戈代邸泣血待晨志切仇讎義殷家國沈謀內斷委策聖明開元神武皇帝仰稟成規俯懷祕略挺身奮臂突入北軍不及終宵一戎定保致君親於堯舜拯社稷於阽危自開闢以來未之有也建立聖明之副宏宣祖宗之業前史不疑漢文繼統今亦何怪聖貞之代宗乎禮兄弟相繼不稱嗣子而曰及王明當用繼先君不繼兄之絶統也今睿宗雖代孝和而立故當同繼高宗則兩室並存便成二穆求之於禮不可同列於廟必須一室別居開元皇帝光臨區宇主祭宗廟豈容旁繼伯考之絶緒遂棄已親之正統乎乃云太廟壞緣躋聖貞所致引僖公後薨遷居閔公之上稱為逆祀取類當今聖貞皇帝亞室高宗孝和皇帝特出立廟孝和升新寢之後聖貞方上祔高宗斯則未嘗一日躋居孝和之上引此為證豈非誣罔朝廷耶孫平子云春秋傳稱君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟今日有違於此者自山陵甫終九虞卒哭特祀正寢祔於太廟四時享祭於禮何虧平子又云子雖齊聖不先父食昔禹不先鯀湯不先契文武不先不窋自去歲升祔之後時孝和新廟未嘗樂懸所以差辰緣闕備物初非承制蓋是權宜修教若成即當同日禮增華省具列事由豈緣尊卑致隔先後借如睿宗一室誠卑孝和不可緣睿宗之卑後六祖之祭重尊之道禮極繼先因親之義情殷旁及平子云今太廟毀由臣下阿曲之過恐危陛下之國昔太康五年宣帝廟地陷梁折八年正月太廟殿毀改作新廟築階及泉遠徵名材雜以銅柱十二年四月乃成十一月又梁折據此言之天降災譴非枯朽者也按孔子在齊景公在焉左右曰周使至言先王廟災孔子曰此必釐王廟夫釐王變文武之制而作元黃華麗之飾故天誅其廟焉有頃左右報所災者釐王廟景公曰善哉聖人之智過人也故晉之太廟掘地及泉雜以銅柱綴以珠玉踰先王之制降皇天之罰與釐王之廟異代同誅今國家太廟因隋舊制開皇之際創造新都移故太極殿是苻堅所造經今將四百年日月滋湥朽蠹而毀晉朝則新構梁折豈得非災唐朝則歲久簷摧誠何足怪夫論徵説咎須義正經理苟異於斯便成妖妄平子不識忌諱肆其狂瞽危言高論謗訟朝廷引衰晉之朝比聖明之代惑亂視聽漸不可長平子又云廟雖造畢災尚未除來有何變故然史册垂範義實多門妖孽之興理難固必廟簷墜落自有別由天道難知豈得專尤別廟且廟屋雖年湥朽壞聖上猶兢懼不已尊儒學於內殿慎刑書於外朝居纖以禮側身修德同殷湯之罪已等周文之小心縱今熒惑守辰猶能退舍況咎徵不見逆説其災平子又云莊公三十二年薨閔公二年吉禘自薨至禘尚有二年春秋猶非其失禮況夏喪冬禘其可得乎不亦太速乎後又云春秋間淫雨彌旬傷稼敗邑漢書五行志簡宗廟不禱祀逆天時則致此災也夫水以潤下為體不能潤下者水德微也何繫於淫雨哉斯乃妄引淫雨證成咎徵牽合災祥推於宗廟平子既前非速於祭禘後嫌不禱祀前後立義互相矛盾速稱越禮復貽災未詳二途何者為適且祔後時享與禘全殊蒸礿無愆何名為虐旱淫雨時運或然堯日湯年安能纍德平子言偽而辨禮所不容登本名謙光以與太子同名敕賜名登常州義興人文明中解褐閬中主簿天授中纍遷尚書左丞開元初留守東都再為太子賓客七年卒年七十三贈晉州刺史臣聞國以得賢為寶臣以舉士為忠是以子皮之讓國僑鮑叔之推管仲燕昭委兵於樂毅苻堅託政於王猛及子産受國人之謗夷吾貪共賈之財昭王賜輅馬以止讒永固戮樊世以除譖處猜嫌而益信行間毀而無疑此由識之至而察之湥也至若宰我見愚於宣尼逄萌被知於文叔韓信無聞於項氏毛遂不齒於平原此失士之故也是以人主受不肖之士則政乖得賢良之佐則時泰故堯資八元而庶績其理周任十亂則天下和平由是言之則知士不可不察而官不可妄授也何者比來舉薦多不以才假譽馳聲互相推獎希潤身之小計忘臣子之大猷非所以報國求賢副陛下翹翹之望者也臣竊窺古之取士實異於今先觀名行之源考其鄉邑之譽崇禮讓以勵已明節義以標信以敦朴為先最以雕蟲為後科故人崇勸讓之風士去輕浮之行希仕者必修貞確不拔之操行難進易退之規衆議以定其高下郡將難誣於曲直故計貢之賢愚即州將之榮辱穢行之彰露亦鄉人之厚顏是以李陵降而隴西慙干木隱而西河美名勝於利故小人之道消利勝於名則貪暴之風扇是知化俗之本須擯輕浮昔冀缺以蹈禮升朝則晉人知禮文翁以儒術化俗則蜀士崇儒燕昭好馬則駿馬來庭葉公好龍則真龍入室由是言之未有上之所好而下不從其化者也自七國之季雖雜縱橫而漢代求才猶徵百行是以禮節之士敏德自修閭里推高然後為府寺所辟魏氏取人尢愛放達晉宋之後祗重門資獎為人求官之風乖授職惟賢之義有梁薦士雅好屬詞陳氏賢特珍賦詠故其俗以詩酒為重不以修身為務逮至隋室餘風尚存開皇中李諤論之於文帝曰魏之三祖更好文詞忽君人之大道好雕蟲之小藝連篇纍牘不出月露之形積案盈箱惟是風雲之狀代俗以此相高朝廷以茲擇士故文筆日繁其政日亂帝納李諤之策由是下制禁斷文筆浮詞其年泗州刺史司馬幼之以表不典實得罪於是風俗改勵政化大行煬帝嗣興又變前法置進士等科於是後生之徒復相倣效因陋就寡赴速邀時緝綴小文名之策學不以指實為本而以浮虛為貴有唐纂歷雖漸革於前非陛下君臨思察才於共理樹本崇化惟在旌賢今之舉人有乖事實鄉議決小人之筆行修無長者之論策第喧競於州府祈恩不勝於拜伏或明制才出試遣搜揚則驅馳府寺之門出入王公之第上啓陳詩惟希咳唾之澤摩頂至足冀荷提攜之恩故俗號舉人皆稱覓舉覓為自求之意未是人知之辭察其行而度其材則人品於此見矣徇已之心切則至公之理乖貪仕之性彰則廉潔之風薄是知府命雖高異叔度勤勤之讓黃門已貴無秦嘉耿耿之辭縱不能抑已推賢亦不肯待於三命豈與夫白駒皎皎不雜風塵束帛戔戔榮高物表校量其廣狹也是以耿介之士羞自拔而致其辭循常之人捨其疏而取其附故選司補授喧然於禮闈州貢賓王爭訟於階闥謗議紛合浸以成風夫競榮者必有競利之心謙遜者亦無貪賄之纍自非上智焉能不移在於中人理由習俗若重謹厚之士則懷祿者必崇德以潔已若開趨競之門則邀仕者皆戚施而附會附會則百姓罹其弊潔已則兆庶蒙其福故風化之漸靡不由茲今訪鄉閭之談惟祗歸於里正縱使名虧禮則罪挂刑章或冒籍以偷資或邀勳而竊級假其不義之賂即是無犯鄉閭豈得比郭有道之銓量茅容望重裴逸人之獎拔夏統名高語其優劣也祗如才應經邦之流惟令試策武能制敵之例只驗彎弧若其文擅清奇便充甲第藻思微減便即告歸以此取人恐乖事實何者樂廣假筆於潘嶽靈運詞高於穆之平津文劣於長卿子建筆麗於荀彧若以射策為最則潘謝曹馬必居孫樂之右若使協贊機猷則安仁靈運亦無裨附之益由此言之不可一概而取也至如武藝則趙雲雖勇資諸葛之指撝周勃雖雄乏陳平之計略若使樊噲居蕭何之任必失指縱之機使蕭何入戲下之軍亦無免主之效鬬將長於摧鋒謀將審於料事是以文泉聚米知隗囂之可圖陳湯屈指識烏孫之自解八難之謀設高祖追慙於酈生九拒之計窮公輸息心於伐宋謀將不長於弓矢良相寧資於射策豈與夫元長自表妄飾詞鋒曹植題章虛飛麗藻校量其可否也伏願陛下降明制頒峻科千里一賢尚不為少僥幸冒進須立隄防斷浮虛之飾詞收實用之良策不取無稽之説必求忠讜之言文則試以效官武則令其守禦始既察言觀行終亦循名責實自然僥幸濫吹之伍無所藏其妄庸故晏嬰云舉之以語考之以事寡其言而多其行拙於文而工於事此取人得賢之道也其有武藝超絶文鋒挺秀有效伎之偏用無經國之大才為軍鋒之爪牙作詞賦之標準自可試凌雲之策練穿札之工承上命而賦甘泉稟中軍而令赴敵既有隨材之任必無負乘之憂臣謹按吳起臨戰左右進劒吳子曰夫提鼓揮桴臨難決疑此將事也一劒之任非將事也謹按諸葛亮臨戎不親戎服領蜀兵於渭南宣王持徑卒不敢當此豈弓矢之用也謹按楊得意誦長卿之文武帝曰恨不與此人同時及相如至終於文園令不以公卿之位處之者蓋非其所任故也謹按漢法所舉之主終身保任揚雄之坐田儀責其冒薦成子之居魏相酬於得賢賞罰之令行則請謁之心絶退讓之義著則貪競之路銷自然朝廷無爭祿之人選司有撝謙之士仍請寬立年限容其採訪汰堪用者試令職守以觀能否參驗行事以別是非不實免王丹之官得人如翟璜之賞自然見賢不隱食祿不專荀彧進鍾繇郭嘉劉陶薦李膺朱穆勢不云遠有稱職者受薦賢之賞濫舉者抵欺罔之罪自然舉得才行則君子之道長矣臣聞戎夏不雜自古所誡夷狄無信易動難安故斥居塞外不遷中國前史所稱其來久矣然而帝德廣被時有朝謁受向化之誠請納梯山之禮貢事畢則歸其父母之國導以指南之車此三王之盛典也自漢魏以後遂革其風務飾虛名徵求侍子喻其解辮使襲衣冠築室京師不令歸國此又中之故事也較其利害則三王是而漢魏非論其得失則備邊長而徵質短殷鑒在乎往代豈可不懷經遠之慮哉昔郭欽獻策於武皇江統納諫於晉主咸以為夷狄處中夏必為變晉武不納二臣之遠策好慕化之虛名縱其習史漢等書官之以五部都尉此皆計之失也若前事之不忘則後代之龜鑑此臣所以極言而不隱者也伏惟陛下德洽區外仁被左衽綏懷式遏之方故無遺策豈臣庸淺所敢輕議然而區區之心有所未盡者也竊惟突厥吐蕃契丹等往因入貢並叨殊獎或執戟丹墀策名戎秩或曳裾庠序高步黌門服改氊裘語兼中夏明習漢法覩衣冠之儀目覿朝章知經國之要窺成敗於國史察安危於古今識邊塞之盈虛知山川之險易或委以經略之功令其展效或矜其首邱之志放使歸蕃於國家雖有冠帶之名在夷狄廣其縱橫之智雖則慕化之美苟悅於當時而狼子孤恩旋生於過後及歸部落鮮不稱兵邊鄙罹災實由於此故老子云國之利器不可以示人在於齊人猶不可以示之況於夷狄乎謹按楚申公巫臣奔晉而使於吳使其子狐庸為吳行人教吳戰陳使之叛楚吳于是始伐楚取巢取駕克棘入州來子反一歲七奔命其所以能謀楚良以此也又按漢書桓帝遷五部胸奴於汾晉其後卒有劉石之難向使五部不徙則晉祚猶未可量也鮮卑不遷幽州則慕容無中原之僭又按漢書陳湯云夫胡兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢工然猶三而當一由是言之利兵尚不可使胡人得法況處之中國而使之習見哉昔漢東平王請太史公書朝臣以為太史公書有戰國縱橫之説不可以與諸侯此則內地諸王尚不可與況外國乎臣竊計秦并天下及劉項之際纍載用兵人戶凋散以晉惠方之八王之喪師輕於楚漢之塗地胸奴冒頓之全實過於五部之微弱當曩時冒頓之強盛乘中國之虛弊高祖餒危平城而冒頓不能入中國者何也非兵不足以侵諸夏力不足以破汾晉其所以解圍而縱高祖者為不習中土之風不安中國之美生長磧漠之北以穹廬堅於城邑以氊罽美於章紱既安其所習而樂其所生是以無窺中國之心者為不生漢故也豈有心不樂漢而欲深入者乎劉元海五部離散之餘而卒能自振於中國者為少居內地明習漢法非元海悅漢而漢亦悅之一朝背誕四人響應遂鄙單于之號竊帝王之寶賤沙漠而不居擁平陽而鼎峙者為居漢故也向使元海不內徙止當劫邊人繒綵麴櫱以歸陰山之北安能使王彌崔懿反為其用耶當今皇風遐覃含識革面凡在虺性莫不懷馴方使由余效忠日磾盡節以臣愚慮者國家方傳無窮之祚於後脫備預不謹邊臣失圖則夷狄稱兵不在外方非所以肥中國削四夷經營萬乘之規貽厥孫謀之道也臣愚以為願充侍子者一皆禁絶必若先在中國者亦不可更使歸蕃則夷人保疆邊邑無事矣
