front:
  text: 全唐文欽定全唐文卷八十三帝諱漼宣宗長子太和七年生會昌六年封鄆王名溫十三年八月立為皇太子改今名翌日即位咸通三年正月上尊號睿文明聖孝德皇帝十二年正月又上尊號睿文英武明德至仁大聖廣孝皇帝在位十四年年四十一諡曰睿文昭聖恭惠孝皇帝廟號懿宗
  hash: sha256:bacdc13e34d9d28ae93cee6b1e1a5236c7589fa96645da745531a0ab9c64855f
  markers:
  - {type: head, offset: 12, content: 懿宗皇帝, id: KR4h0168_NFKB_083-h1, level: 1}
body:
  text: 入調鼎鼐作我股肱出鎮藩垣為豫心膂分命雖殊於中外倚才皆屬於安危將相迭居文武兼用允茲遇者厥惟艱哉況地控南荊土連全蜀扼五嶺之通道當七澤之要津統馭所難撫理為重頒斯渥命爰輟重臣銀青光祿大夫守門下侍郎兼工部尚書同中書門下平章事監修國史上柱國彭城縣開國男食邑三百戶蕭鄴昴宿垂芒山庭表異膺明誕德佐理生賢開濟洞達其泉源進退率由於律度端亮秉志寬和待人而纍踐華資克流芳問儷卿雲之詞藻煥發皇猷邁管樂之智謀掌司邦賦臺閣備詳其政事朝野咸推其上才由是道觀明成夢叶先帝爰立作相陟於台階果能經緯巖廊鎮安夷夏罄乃一心凝其庶績逮豫纂承亟獲匡輔疇庸任舊宜乎加恩是用擇其巨藩委之碩德尚執中樞之柄仍加右揆之崇相閣良規豈忘蕭曹之業戎垣寵寄更隆羊杜之功勉服殊榮佇宏懿烈可檢校右僕射同中書門下平章事兼江陵尹充荊南節度管內觀察處置等使天設四序運寒暑而成歲功國有三台仰弼諧以助君道安危是繫選任攸難況朕涉道未明纂圖方始詳求英彥思付洪鈞至誠感通果獲良輔翰林學士承旨通議大夫守尚書兵部侍郎知制誥上柱國賜紫金魚袋杜審權喬嶽埒崇澄波量度稟五行之秀氣挺百仞之貞材虹玉潛輝龍泉蘊利文窮騷雅學洞元儒毛玠有古人之風邴吉得大臣之體自便蕃華貫踐歷清途南宮推起草之工西掖茂掌綸之業洎司文柄俾以掄才全任至公號為得士甘棠廉問衆著謳謠秋卿恤刑事無枉橈先皇帝藉其令譽擢處禁林振藻屬詞發揮神化道一貫於終始器兼適於圓方逮余建統屢承密旨每多宏益彌見慎修既彰巳試之能宜懋殊常之寵是用委茲大政列在中樞為朝廷之表儀實人臣之極地爾尚竭乃心力作吾股肱借箸必罄其嘉謨推局罔遺於善策用無黨之道行惟一之心使爵位功名並光竹帛垂於不朽豈不務乎可守本官同中書門下平章事門下朕初承天序方崇政源屬在輔臣兼領重職況仙宮至嚴專總尤切儒林之盛分列掖垣良史之能必歸懲勸將欲比肩上古耀美一時克副旁求允膺茂典特進守司徒兼門下侍郎同中書門下平章事上柱國太原郡開國公食邑二千戶白敏中氣稟嶽靈道洽王佐致君之志發於深誠銀青光祿大夫守中書侍郎兼刑部尚書同中書門下平章事充集賢殿大學士上柱國譙縣開國男食邑三百戶夏侯孜材為國楨望貫人表濟物之用彰於重任金紫光祿大夫守中書侍郎兼工部尚書同中書門下平章事上護軍樂安縣開國男食邑三百戶蔣伸識蘊生知衆推邦傑徇公之操本乎進思並詞峯峭拔高踰列岫學海深奧遠含百川邃彼巖廊付以衡軸動有宏益居然矩儀叶心而和平造膝而啓沃式諧僉議能弼豫違闕乃知功信無與讓是用思闡元化冀揚清靜之規彌在立言更佇刊削之妙愈疑其討論闕必以化成為先副我虛襟咸佩嘉命敏中可兼充太清宮使宏文館大學士闕餘各如故主者施行舊以天下賦租年終勾并或刺史入府或縣令上州所科羣胥盡出百姓且官有理所安可擅離物犯贓條何須枉法從今委知彈御史出使郎官凡繫抵違明具論奏仍委預為條目各遣聞知地連山藪境有逋逃武能首率郡兵身歿王事既嘉忠盡宜示褒贈不惟慰彼漏泉將亦激其羣校門下篙楫克修航艦以之濟海羽翮可厲鵾鵬於是摩天朕恭已寰瀛勞誠夢獵將以篙楫賢輔羽翮寶臣摩三代至理之英濟羣生並洽之欲載仗舊德期獲我心劒南西川節度副大使知節度使事管內度支營田觀察處置統押近界諸蠻及西山八國雲南安撫等使光祿大夫檢校尚書右僕射同中書門下平章事兼成都尹上柱國譙郡開國公食邑三千戶夏侯孜大昴分精維嵩挺秀擅四海之賢俊作中朝之表儀禮樂詩書資其懿範溫恭孝愛輔以多才服道以致身含章而砥力經國之用貫百川而不改其清應物之明體萬象而莫窮其照周踐華列多識舊章郎署諫垣休聲夙振東陽故絳惠愛洽聞洎甘棠政成會府徵命兼領臺轄之任再居邦憲之尊正色無私當官必舉總征賦以贍國幹山澤而富人美利無遺嘉猷益覩積是朝著升於台司內竭謨明外宏體理馳咎夔之極摰陋周漢之遐蹤克彰為輔之聲允叶有開之契屬者以西南重鎮邊徼多虞爰賴專征以隆外閫福星時雨既惠巴庸景化元和須歸鼎鉉是用召於驛騎待以天工重開集鳳之池再仰問牛之化弼諧萬務師長庶僚亟付機衡俾康區夏於戲刀非礪不剖魚非水不行為君誠難得中甚易決疑定計我以爾為神龜肥國救人吾以爾為上藥盡布四體懋堅一心勉哉勿疑對揚我休命可尚書左僕射同中書門下平章事散官勳封如故門下豳土名藩懿門奧壤理公劉之故國接煬帝之通津控地數千帶甲逾萬非威能肅物勇可貞師則何以備天子之爪牙建上將之旗鼓斷自朕志果叶僉諧武寧軍節度徐泗宿濠等州觀察處置等使朝議大夫檢校左散騎常侍兼徐州刺史御史大夫賜紫金魚袋溫璋稟慶德門騰輝儒苑節峻大玉氣敷早春立言鏘韶濩之音行巳植松筠之操嘗以懿問列於通班佳聲克著於埋輪善價益彰於題柱纍換符竹頗洽謳謠前歲問俗苑溪分麾沛邑禍息萑蒲之盜風行鈇鉞之權前浙江東道都團練觀察處置等使銀青光祿大夫檢校左散騎常侍兼越州刺史御史大夫上柱國襲魏郡開國公食邑二千戶王式文動星芒學通奧旨早以殊藝射策明廷孫宏之條奏甚精朝錯之鋪陳無闕既升高第亟踐清途臨事不回當官有守邇者擢自交趾授以浙東果能清越水之波瀾掃稽山之祲氣暫舉十連之化全蘇一境之人而並樂鏡貞明黃陂淡濘風雨不渝於達節機謀自契於生知爰命疇庸是加懋賞乃眷巨屏宜委宏材三禮百工俱榮於題劒鑿門推轂共貴於登壇謺是恩光我無愛惜爾宜壯轅門之號令恤閭井之疲羸務農訓兵俾先南牧之備興利除害永絶東顧之憂更樹奇功以酬劇寵璋可檢校禮部尚書兼邠州刺史御史大夫充邠寧節度營田觀察處置等使式可檢校工部尚書徐州刺史御史大夫充武寧軍節度徐泗宿濠等州觀察處置等使主者施行門下天賦全才所以登將壇而衛王室國有令典所以舉能吏而懲慢官其有術業優長理行彰著則宜錫殊常之命行不次之恩乃崇德報功之旨也朝散大夫權知太僕卿充荊襄巴南宣慰安撫使上柱國賜紫金魚袋蔡京學富縑緗文含組繡識略甚遠智能出羣本於孤貞濟以勤恪驊騮躞蹀向天路以無疑雕鶚騰淩入雲程而不返早以豐藝陟於高科周旋宦途振舉官業簪白筆而獲聞峻節擁朱輪而克播清風班資既崇聞望彌重去歲藩臣失守蠻寇犯邊永令遐長莫窮根本用爾奇事申豫至懷目前而情偽皆分言下而安危可決運深謀而禦敵寧遠裔以成勳適及回車召於便殿敷陳之際備得機宜浣吾憂勤賴爾忠藎遂以月卿之秩俾酬星使之勞爰藉變通更資宣撫載圖嘉績用洽優恩朕惟濱海而南雍為重地城臨甌駱俗本剽輕居常則委經略之權有事則付節制之任是用改其舊號建以新軍一時之榮千古無對爾其頒惠養以馭衆示寬嚴以訓兵濟活鄉閭保安溪洞貂冠近侍之首烏府亞相之尊當此寵位宜何如哉於戲特舉徽章直謂殊渥苟或失職吾何望焉勉於奉公勿以為喜可檢校左散騎常侍兼雍州刺史御史大夫充嶺南西道節度觀察處置等使散官勳封如故門下王者分職設官所以理天下外建州牧侯伯內置公卿大夫故野無遺賢朝無闕政俾率土絶愁嘆之音接畛有富庶之泰當是選也豈可易乎具官裴休巖廊重德文學宗師才為代生智尚物表發言所以興家國修己可以服華夷自奮藻儒林射策藝圃迥處顏冉之列疊升朝董之科濟代之心已彰於事業奉君之志皆推於友朋抗疏七人之官正色三署之內縉紳多士慕高韻以指南貝錦巧詞自退身於有北遂金玉王度丹青憲章三領廉車一剖符竹皆著去思之稱共興一作歌來暮之謠宏圖豈滯於割雞令問果還於振鷺委茲文柄任之春闈大呈公鑒之明備傳德疑作得人之美版籍繁務管榷劇權成富國之奇謀施安邊之大略先皇帝夢想髦彥勵精理道採以公論付以化權致百度之惟貞覺三台之益重羌戎擾叛調發時雨之師農畝廢荒申明作霖之旨凡所經濟知無不為四鎮入境而獲安三軍推誠而俱感整疑盡臣節何愧古人朕以全楚奧區荊衡重地湊舟車之都會控湖嶺之要衝藉爾分憂施吾惠澤蘇彼疲瘵勿倦殷繫玉帳兵符既榮冠於今日文場武庫當繼蹤於昔賢一作時祗服典章無替徽烈可檢校尚書右僕射兼江陵尹御史大夫充荊南節度觀察處置等使散官勳封如故主者施行門下古先聖哲之御天下也莫不勞於擇賢逸於恭己是以巖求匪易殷代稱宗畋獲甚難周王膺命肆朕在位天授正人於言語侍從之間得亮采惠疇之俊固亦高邁前烈垂休當朝敬遵用汝之文爰舉弼豫之典雅符不讓斷自無私翰林學士承旨朝議大夫守尚書兵部侍郎知制誥上柱國賜紫金魚袋楊收器茂渾金寶欽大玉瑩清冰於溽暑挺緑桂於嚴霜行過曾顏道兼夷惠文冠一時而若非遊藝學該千古而似不能言自鴻飛名場鷺振班列憲署每聞其守法曲臺咸著於推公所蒞有聲歷試皆可才彰要巳洽譽於含香業擅精微遂騰輝於視草戒慎攸至初終莫渝常懷造膝之忠備見沃心之旨謝安體識王儉精能動為僉論所諧居益具瞻之望由是擢於禁苑升以台階俾申匡輔之勤用闕燮和之重爾其慕伊周之志宏皋益之謨九流既分百辟斯正嘉猷可舒於前席妙略尚在於止戈式序三才允歸一德懋乃致主副豫知臣無使載筆之褒獨稱於姚宋也可守本官同中書門下平章事散官勳賜如故主者施行朕垂衣嚮明負扆成化內則委輔弼之重論道於巖廊外則寄垣翰之崇分憂於撫馭是以入掌鈞軸出擁麾幢必仗兼才乃膺迭任況軍稱鎮海地亘長江建置既殊寵劇斯在駕戎車而佩相印持廟算以統全軍非我誠臣豈行茂典特進行門下侍郎兼吏部尚書同中書門下平章事兼修國史上柱國建平縣開國男食邑七百戶杜審權獨鶴依松孤鸞上漢聳三峯之峭壁澄萬頃之清瀾早以重名洽於時輩擅讜言於諫署留正範於南宮史筆弛而更張憲綱紊而復正由是如綸不絶刈楚無遺紹蔽芾於謳謠盡侀成於法理先皇帝知其可用召入內庭果能新耳目之見聞備肺腑之待遇朕初登寶位素挹嘉猷遽行制書首列台席故得彞倫攸敘庶政惟和舉去無差於激揚流品並分於涇渭出入五載初終一途每念鴻勳布在青近者固辭機務動啓懇誠雖懷好德之言難抑好謙之智是用輟鹽梅於調鼎賜斧鉞於專征金陵大藩正張新幄式兼啓事載踐中樞不移注意之榮無替沃心之道勉服休命厥惟懋哉可檢校吏部尚書同中書門下平章事使持節潤州諸軍事兼潤州刺史充鎮海軍節度使浙江西道觀察處置等使門下入則持大政以調化源出則建高牙以主兵柄安危所屬選任尤難況地壓夷門鎮雄全晉藉機籌以分閫資紀律以臨戎爰得上才乃申並命河中節度使金紫光祿大夫檢校兵部尚書平章事河中尹上護軍樂安郡開國公食邑二千戶蔣伸道惟天縱氣實間生靈芝茂三秀之姿威鳳富九苞之彩銀青光祿大夫守兵部尚書平章事上柱國河東縣開國男食邑三百戶畢諴峻同嶽立注若川渟祥雲煥五色之章甘雨灑四時之澤而皆備更華貫周歷清途文飛藻麗之詞位蘊名卿之望或互參禁署咸稱染翰之工或繼秉國鈞俱播和羹之美以伸輟於台鼎委以旌旄虞城興禮讓之風蒲阪肅關河之禁馳聲甚遠奏課居高嘉乃懿圖俾遷巨屏以諴萬機所繫微恙忽嬰願辭傅説之舟却曳鄭崇之履今則復佩相印載陟齋壇用光推轂之勞式示彞章之重是咨爾德作於藩垣總梁國三郡之雄控侯衛中條之險於戲代天理物允屬英奇撫俗貞師豈勞戒厲服我嘉命往孚於休伸可檢校工部尚書平章事充宣武軍節度汴宋亳等州觀察處置等使諴可檢校兵部尚書平章事兼河中尹充河中節度觀察處置等使散官勳封如故主者施行門下建牙訓戎登車問俗分山河之委寄授旄鉞之寵榮非夫試可之才難膺俞往之命河中晉絳慈隰等州節度觀察處置等使正議大夫檢校戶部尚書兼河中尹御史大夫上柱國東莞縣開國子食邑五百戶賜紫金魚袋徐商植性忠厚接物通和愛日可觀澄波莫測前宣州都團練觀察處置等使正議大夫檢校禮部尚書兼宣州刺史御史大夫上柱國博陵縣開國子食邑五百戶賜紫金魚袋崔璵守道堅固行己端方良玉齊貞霜松比操並以才業優茂纍踐清華或視草於內庭或司言於右掖專一時之美價擅五字之雄詞既彰東里之能周歷南宮之秩洎築壇作鎮按部化人竭爾忠勤副余倚屬進律當升於重地酬勞宜處於近關乃眷漢濱扼束荊郢顧茲蒲阪俯邇郊畿錫以麾幢俾之長理於戲惟惠可以安百姓惟威可以整三軍推誠而人必歸心尚廉而吏將自化謹是四者以綏一方服我新恩勉宏善政商可檢校戶部尚書兼襄州刺史御史大夫充山南東道節度管內觀察處置等使璵可檢校禮部尚書兼河中尹御史大夫充河中晉絳慈隰等州節度觀察處置等使散官勳封如故主者施行安南寇陷之初流人多寄溪洞其安南將吏官健走至海門者人數不少宜令宋式李良瑍察訪人數量事救恤安南管內被蠻賊驅劫處本戶兩稅丁錢等量放二年候收復後別有指揮其安南溪洞首領素推誠節雖蠻寇竊據城壁而酋豪各守土疆如聞溪洞之間悉藉嶺北茶藥宜令諸道一任商人興販不得禁止往來廉州珠池與人共利近聞本道禁斷遂絶通商宜令本州任百姓採取不得止約其徐州銀刀官健其中先有逃竄者纍降敕旨不令捕逐其今年四月十八日草賊頭首巳抵極法其餘徒黨各自奔逃所在更勿捕逐朕以寡昧獲承高祖太宗之丕構六載於茲矣罔畋遊是娛罔聲色是縱罔刑戮是濫罔邪佞是惑夙夜悚惕以憂以勤庶幾乎八表用康兆人以泰而西戎欵附北狄懷柔獨惟南蠻姦宄不率侵陷交趾突犯朗寧爰及巂州亦用攘寇勞我士卒興吾甲兵騷動黎元役力飛挽每一軫念閔然疚懷顧惟生人罹此愁苦宜布自天之澤俾垂及物之仁如聞湖南桂州是嶺路係口諸道兵馬綱運無不經過頓遞供承動多差配凋傷轉甚宜有特恩潭桂兩道各賜錢三萬貫文以助軍錢亦以充館驛息利本錢其江陵江西鄂州三道比於潭桂徭配稍宜令本道觀察使詳其間劇準此例興置本錢雍州巳西黎巂界內昨因蠻寇互有殺傷宜令本道收拾埋瘞量設祭酹徐州風土雄徑甲士精強比以制馭乖方頻致騷擾近者再置使額却領四州勞逸既均人心甚泰但聞比因罷節之日或有被罪奔逃雖朝廷頻下詔書並令一切不問猶恐尚懷疑懼未委招攜結聚山林終成詿誤況邊方未靜深藉人才宜令徐泗團練使選揀召募官健三千人赴雍管防戍待嶺外事寧之後即與替代歸還仍令每召滿五百人即差軍將押送其糧料賞給所司準例處分淮南兩浙海運虜隔舟船訪聞商徒失業頗甚所由縱捨為弊實深亦有般闕貨財委於水次無人看守多至散亡嗟怨之聲盈於道路宜令三道據所般米石數牒報所在鹽鐵巡院令和雇入海船分付所司通計載米數足外輒不更有隔奪妄稱貯備其小短般到江口使司自有船不在更取商人舟船之限如官吏妄行威福必議痛刑於戲萬方靡安寧妄於罪己百姓不足敢怠於責躬用伸欽恤之懷式表憂勤之旨在天垂象常星既列於三台惟國建官庶政必歸於四輔朕每思致理益慕無為苟非正人莫付大柄爰得非熊之兆乃遵審象之求契豫知臣命爾作相銀青光祿大夫尚書兵部侍郎充諸道鹽鐵轉運使駙馬都尉上柱國于琮識洞蓍蔡文窮典謨居然國華蔚為人瑞自策名筮仕淑問益高仗蒲彰正直之名起草著經綸之績由是道光獨立業擅自強勇退無儔謙光有裕朕早聞博雅堪備論思擢於南宮置之內署果能恪慎相副端貞闕益實多繄賴闕切洎出二司寇亟居版圖見君子之盡心表才人之果決鹺府任重爰命專之積弊潛聞其日除嘉庸大彰於歲計咨爾全美為豫誠臣歷試如斯僉諧所至是宜升於輔翊付以燮和惟賢式契於周官懋德雅符於殷誥且有成計爾其聽焉夫舉直則百度可貞推公則彞倫攸敘進善則孤寒不棄用才則滯屈自伸克勉斯言是為良弼敬承休命往其欽哉可守尚書兵部侍郎中書門下平章事駙馬都尉門下朕欲考名實以臨八表明賞罰以正萬機為官擇人不可廢闕謁郊廟禮之重也設壇場旨之深也稱此劇選屬於僉諧朝散大夫守尚書戶部侍郎上柱國賜紫金魚袋孔溫裕才為國華德擅邦傑心徑而行密神清而氣和飛文淩邁於曹劉潔已庶幾於顏閔高標跂望迥立正途鳳彩葳蕤棲止碧梧之月鶴情瀟灑徊翔紫蓋之煙自步武中朝馳聲內署甘泉侍從宣室對揚相如之工爾實無愧河洛神明之政關防惠養之風授以版圖陟於蘭省奉二卿之班列司九典之征徭時論益高官業彌舉宜申茂典式叶至公朕以長葛故城潁州重地兵甲甚鋭賦輿至殷爰委材能俾膺統馭洎於訓齊師旅潤澤蒸黎導一作追爾前功何煩教令知臣之道不亦至乎玉節彤弓巳極儒生之貴儀曹憲印用彰賢帥之威勿替令圖往祗休命可檢校禮部尚書兼許州刺史御史大夫充忠武軍節度陳許蔡州觀察處置等使散官勳賜如故主者施行人臣之節莫重於忠良氏族所修無外於清順二者不立何以正身況乎居常伯之崇應藩侯之寄雖顧初終之體當明懲勸之端宣歙觀察使檢校工部尚書宣州刺史兼御史大夫楊收始以文章選在宥密才歷二歲擢升台衡謂其發自寒門必有操守行孤貞之道報國用恭儉之理化時夙夜勵精以酬恩遇而乃貪黷為業溝壑難盈逞其私懷盜我名器以官常為貨利之徑持僭侈為暴橫之資田産遍於四海臺榭擬於中禁而又結連姦黨聽任憸人險詐千端回邪萬狀欺罔彌甚顧慮蔑聞謂日月之照臨或所隱漏意天地之姦慝可以包容殊不知過既不悛孽無以逭去歲驗其事迹未忍揭揚委以察廉冀塞咎時聞縉紳之內物論喧然班列之中怨訟未息朕以寬恕馭下仁閔為心中外臣寮悉明此志負我既甚其法何如竄於遐陬式示嚴憲爾惟自棄無或尤人可守端州司馬員外置同正員仍馳驛發遣敕端州司馬楊收起自孤寒猥承委任罔思報效惟恣姦欺心每挾邪言常近利江西置節制之額務在虛兵浙右創造船之名便其盜用兩地推覆按驗分明豈可尚佐專城猶居仕籍俾投荒裔用塞尤中外臣寮各體朕意宜除名配歡州充長流百姓縱逢恩赦不在量移之限仍錮身所在防押遞送至彼具到日申聞仍路次縣給遞驢一頭並熟食自古聖帝明王莫不封建子弟錫以茅土寵以圭符俾藩屏王家翰維天邑朕每讀麟趾識詩人之意念犬牙知漢祖之心眷乃坤維實推奧壤甲車雄盛貨殖殷繁鈐越巂則南詔憚嚴鍵松維則西戎畏懼是用授親賢而統制命良將以經邦維彼遠方稱茲公共蜀王佶宇量宏廣風神粹和承顏於日域之中稟訓於大庭之內弱不好弄居無慍容語言皆質於詩書造次不離於孝敬蟻封占雨嗣沛獻之明規象艦知斤繼蒼舒之敏智屬者南蠻入寇西蜀纏兵瘡痍生縣道之間荊棘繁師徒之役雖英儒鎮禦火即撲於燎原而權道改張瑟難遵於膠柱由是假爾英略光豫翰垣分玉葉之清陰覆銅梁之重地遙資算畫密受韜鈐必使萬井歡聲三軍懷德致蕃夷之稽顙革蠻貊之非心將陟永圖在舉長策對揚休命爾其敬之可開府儀同三司兼成都尹劒南西道節度副大使知節度事管內觀察處置統押近界諸蠻及西山八國雲南安撫等使朕以眇身獲承丕業虔恭惕厲十一載於茲況荷十七聖之鴻休紹三百年之慶祚將求理本敢忘宵衣雖誠信未孚而寅畏不怠既絶意於苑囿固無心於畋遊業業兢兢日慎一日休徵罔應沴氣潛生南蠻將罷於戰爭徐寇忽孤於惠養招諭不至虐暴滋深竊弄干戈擅攻州鎮將邀符印輒恣凶殘不畏神祇自詒覆滅股肱之臣以罪惡之難捨腹心之衆謂悖逆之可誅爰集甲兵用救塗炭上將宣力內臣協心選用皆得於良材掃蕩才及於周歲絶干紀反常之噍類懲亂臣賊子之姦謀今則巳及偃戈重康黎庶疇庸之典在絲髮以無私懋賞之時貴纖毫之必當其四面行營立功節度使既成茂勳宜加酬獎並取別敕處分應諸道行營都將以下節級軍將各委本道具功勞名銜分析聞奏當續有處分如有功效高者仍別具歸本道以後銜節級與遷改職名及向後本軍有職掌員闕先於行營軍將中選揀任使以獎勤勞被堅執鋭冒涉寒暄解甲櫜弓還鄉復業頒繒帛之賜免差役之征應四面行營將士今既平寧宜令次第放歸本道其賞賜匹段巳從別敕處分至本道後仍令節度使各加犒宴放歸私第便令歇泊未用差使如行營人並免差科色役如本廂本將自今後有節級員闕且先以行營軍健量材遞相差署用酬征伐之勞回戈將士賞給匹段各巳支給發遣訖各令中使押領到軍前仍委四面將帥及本都大將於本道軍營內與中使對面給付不得輒令下吏所由致刻剝一尺一寸應回戈將士經歷州縣令供頓遞朝廷並各有處分宜令長吏切加勾當準備供給不得令有欠闕臨敵用命力屈殞身須慰殤魂以彰忠節超與職事仍加任使如無父兄子弟只有妻女者即委州使厚加贈恤常令存撫如是都將至都虞候陳亡者具名銜聞奏當與贈官應陳歿將士有父兄子弟願從軍者便令本道填替如無父兄子弟仍且與給衣糧三年不得停給因戰陳傷損手足永廢者終身並不停給應陳歿將士及百姓衣冠為賊殺害者其骸骨平寧之後如有家口親屬取歸本道收葬仍委所在州縣量事應接發遣如無親屬來取者即令所在州縣重與改瘞勿令暴露兼仰與設祭王者以仁恕為本拯濟是謀元惡既巳誅鋤脅從理宜寬宥除龎勛親屬及桂州回戈逆黨為賊脅從及縱因戰陳拒敵官軍招諭不悛懼法逃走皆非本惡蓋鋒刃所驅今並釋放一切不問委四面將帥州縣鎮戍所在要路分明榜示四散招攜仍許兩月內所在陳首并令長吏便放歸本管任自營生不得妄有攪擾其中如有才藝超異者便收録驅使應徐宿三州城內收復之後見在軍人百姓除龎勛及桂州逆黨親屬并為龎勛腹心謀議凶徒須加刑戮外餘並一切不問應舊軍將官吏節級所由既巳釋放並令却還本職驅使用示殊恩地經戰伐人率流亡閭里既巳歸還征賦先宜蠲免其徐宿濠泗等州應合徵秋夏兩稅及諸色差科色役一事巳上並從十年蠲放三年州縣所由輒不得妄入鄉村攪擾百姓待三年巳後量其事力續議條流處分餘側近州縣為賊燒劫者令本道檢勘傷殘甚處分析聞奏待奏到續議放免編氓失業邱井無人桑柘枌榆鞠為茂草應行營處百姓田宅産業為賊殘毀燒爇者今平寧之後百姓既巳招攜並許識認各本主便自收管州縣及官吏權要並不得妄有侵奪如百姓有家業為賊虜劫蕩盡交切飢餓者委所在長吏牒逐便供軍使量加給恤如百姓先有倉窖被賊收管者並還本主應行營處鎮寨曾為打劫占據收復之後須令官吏主將除見在投降將吏官寮及先是本官勾當外餘委所在州縣選擇良吏委之緝理俾令百姓有所歸投舍逆從順臣節既著頒祿册勳官常斯切應有效順投降軍將官吏節級立功勞雖有酬淺者及有未沾惠者委四面將帥更子細重分析聞奏待到處分應募征行巳從犒賞還鄉休役務令優容應諸道差赴行營將士其中本非舊額官健因緣征討召募差行者回戈之後如有不願食糧聽從其便亦準前項除兩稅外放三年雜役九原可作千載不忘尚禁樵蘇寧傷邱壠應有先賢墳墓碑記為人所知被賊發掘即却與掩藏仍量致祭十室之邑尚有所師遁迹闔門獨行高節拒不義之召非無厭之求熏穴莫尋焚林可取徐宿濠泗等州縣管內有素忠義不助凶徒樹謀歸國為賊殘害者具名聞奏當與贈恤如諸色人內有文學節行因用兵藏避隱迹山林並令搜訪存撫自用兵以來郡邑皆罹攻劫遠念驚撓尤在慰安今遣左散騎常侍劉異兵部郎中薛崇等專往宣撫軍人百姓恤問閭里疾苦回日具利害分析聞奏於戲朕以四海為家兆人為子一物失所每軫納隍之憂一方未寧常負阽危之戒今元凶就戮逆黨誅夷載戢干戈永銷氛祲庶平妖氣允洽嘉祥遐邇知聞當體豫意開府儀同三司檢校司空守尚書左僕射上柱國襄陽郡開國公食邑二千戶杜審權韻合黃鍾行貞白璧沖粹孕靈嶽之秀精明涵列宿之光塵外孤標雲間獨步踐歷華貫餘二十年鑒裁名流凡幾百輩清切之任無不試重難之務無不經靜而立名嚴以肅物絶分毫徇己之意秉尺寸度量之懷貞方飾躬溫茂繕性儉不逼下畏以居高語默適時喜慍莫見頃罷機務鎮於金陵值淮夷猖狂干戈悖起纍發猛士挫彼賊鋒廣備糗糧助茲軍食深惟將相之大體頗覩文武之全才王導以蕭灑之名不忘戎事謝安以恬淡之德亦在兵間及駟馬來朝擢居端揆嚴重自處恬曠不渝虞芮之故都前蹤尚爾郇瑕之舊地往事依然兼以股肱之良為吾腹心之寄改佩相印更握兵符仍五教之崇名極一時之盛禮可檢校司徒同平章事河中尹充河中晉絳節度觀察等使河東節度使康承訓將門瑣質戎壘微才曾不知兵謬膺重祿竊韜鈐以效任畜姦惡以事君幾授鉞於戎藩嘗執金以邀道謂其盡節委以專征屬者徐部匪寧敢干紀律俾護諸將坐覆危巢罄國幣以佐軍頒王爵而賞士而玩寇莫戰按甲不前立法未學於穰苴申令頓虧於孫子況部伍不戰逼撓無謀人數空多軍威何振使農夫釋耒工女下機始凝望於天誅翻有思於賊至洎元凶自潰元稔效忠彭門洞開爾功何有而負恩巳甚黷貨是求叨榮苟幸於一時遺患遂逾於積歲爰行國典俾傅戎藩可蜀王傅分司東都再貶恩州司馬同正馳驛發遣朕守大器之重居兆人之上日慎一日如履如臨旰昃勞懷寢興思理涉道猶淺導化未孚而攝養乖方寒暑嬰癘實有慮於闕政且無暇於怡神恙未少瘳日加寖劇萬務繁綜須有主張考之舊章謀於列辟思闡鴻業式建皇儲第五男普王儼改名儇孝敬溫恭寬和博厚日新令德天假英姿言皆中規動必由禮俾崇邦本允協人心宜立為皇太子權勾當軍國政事咨爾中外卿士洎於腹心之臣敬保豫子輔成豫志各竭乃心以安黎庶布告中外知朕意焉門下南荊舊俗政美劉公西陝芳陰勳傳召伯我用時傑思齊昔人況梓潼奧區賢彥徊翔之地也稽玉堂之顯效授黃鉞之殊榮輟諸禁林允叶令典翰林學士承旨朝議大夫守尚書金部侍郎知制誥上柱國賜紫金魚袋高璩潘陸重價曾顏上流機神粹和道業堅白呈瑞質而鳳離丹穴聳孤標而鶚翥青天合圭璧之寒輝咸資逸韻聚雲霞之秀色併在高文光映古今羽儀中外頃者名場頡頏早振詞科桐閣從容長專奏記乃升華貫爰近赤墀青瑣闥中封章不屈紫微天上詔令無雙王褒真侍從之才徐邈擅文儒之譽親提史筆首列諫垣俄參起部之榮遂陟夏官之貴鬱有公望稱於朕心雖密贊大猷誠資敏識而將圖善政亦藉長材眷彼左綿實為雄鎮旁控巴峽高抗蜀門前以幢蓋劇權委任巖廊舊德歲久而功懋軍嚴而吏安改命廷臣俾嗣仁化按節而去自春徂秋既以疾聞則宜代用爾之俞往得於僉言勉竭公忠用酬倚注豫欲成爾美志故授以儀曹八座之尊豫欲壯爾威聲故帖以憲闥亞相之秩紅旌啓路紫綬登壇當年得之別是殊寵勉務勳業副豫意焉可檢校禮部尚書兼梓州刺史御史大夫充劒南東川節度副使知節度事管內觀察處置等使散官勳如故
