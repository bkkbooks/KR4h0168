body:
  text: 昔在明皇帝召葉尊師當新歲月圓之夜是上元燈設之時帝謂京洛他處固難比也師言良夜今宵亦可觀之於是請宸遊憑妙術將越天宇俄辭宣室扶鳳輦以雲舉揭翠華而飇疾不假御風之道倏忽乘虛如因縮地之方逡巡駐蹕已覺夫關隴途盡河湟景新到沓雜繁華之地見駢闐遊看之人千條銀燭十里香塵紅樓邐迤以如晝清夜熒煌而似春郡實武威事同仙境彩搖金像之色光奪玉蟾之影一遊一豫忽此地以微行不識不知竟何人而望幸於時有露霑草無雲在天金鴨揚輝而光散氷荷含耀以星連樂異梨園徒笙歌之滿聽人非別館空羅綺以盈前既而斗轉玉繩漏深銀箭周迴未愜於睿旨歷覽尚勞於宸眷莫不混跡尊卑和光貴賤亦由鳳隱形於衆鳥衆鳥莫知龍匿影於㣥魚㣥魚不見俄而歸思潛軫皇情不留髣髴而方離邊郡斯須而已在神州稍異穆王至自瑤池之會非同漢武來從柏谷之遊一自風滅蘭釭雲迎羽客塵昏蕃塞之草煙暝秦陵之柏空令思唐德之遺民最悲涼於此夕帝以先生久駐長安應思故山新恩而綸綍云降舊德而嵓巒許還今朝北闕之前已辭丹陛幾日南溟之下再啟元關始者蒙谷傳真羅浮隱耀造恬澹之深域達希夷之衆妙來親玉輦膺再禮於鵠書去憶石樓契初心於鳳詔詔曰朕聞軒后求其大隗唐堯師乎務成雖則臨治皆思養生是以深殿延佇安車遠迎久處彤闈恐鬱池魚之性永懷碧洞難忘雲鳥之情乃曰陛下頃辱英明旁求固陋既容出入於仙禁復許潛歸於海岫常慚羽服相逢而道異君臣益荷鴻私欲別而情深故舊於是罄風馭奮電衣千年之靈鶴將去一片之閒雲欲飛有異二疏出都門而惜別寧同四皓指商嶺以言歸持青囊兮藥使傍隨執絳節兮橘僮先遣道尊而不顧名位德重而如加黻冕當九重之宮裏思山之意則深及萬里之途中戀闕之誠不淺既臻蘿洞乃闢松軒別後而嵐光未老來時之春色猶存白鹿青牛却放煙霞之境玉芝瑤草終承雨露之恩懿夫來協皇情去全真趣於秦無徐市之惑在漢免文成之誤臣知其史筆已書故聊詳於斯賦節乃端午經惟尚書當煬帝窮奢之際見蘇公為壽之初五日嘉辰欲有裨於聖德百篇奧義敢將獻於皇居始夫蕤賓既調星火初正雖為祭屈之日合有祝堯之敬咸求玩好冀盡竭於忠勤競薦珍奇願延長於睿聖惟公以邦紀將紊洪圖漸傾欲諷江都之幸思停一作亦由遼水之征繇是訪註於安國求篇於伏生既逢採艾之時合祈一作稱洪算遂託獻芹之禮庶達微誠蓋以文盡雅言事傳上古前王之善惡皆載一作足徵歷代之安危可覩自然於禮無爽一作然以禮無爽於君有補豈效辟兵之法專用靈符寧依續命之儀祇陳綵縷既而對面丹一作彤墀虔而進之其為贄也非雁非羔非玉非帛其為書也非易非傳非禮非詩且曰臣則有志匡主無心順一作狥時竊以百王之典可為萬歲之資願陛下察所以是究所以非豈不知不知一作以枕推虎魄之珍裘有雉頭之美誠未若典謨訓誥閱斯而北闕長存虞夏商周鑒此而南山相似所以鼓篋斯至稱觴自殊藉手則惟臣矣而服膺其在君乎願因犬馬之心取為龜鏡欲取絲綸之筆用作規模且浴蘭獻物兮古豈無捧酒祝釐兮今亦有誰能將十三卷之雅誥上千萬年之洪壽向使其乙夜能觀豈死乎賊臣之手余嘗自雍南遊經過郢州此地曾歌乎白雪後人因創其朱樓觀夫迢迢山峙奕奕雲浮屹臨江岸之旁將其麗曲傑起郡城之上得以消憂是何棟觸晴霞簷侵虛碧旁瞻目盡於千里俯瞰心懸於百尺何年結構取宏制於庾公此日登臨仰嘉名於郢客其為狀也山蹇嵼隆崇攢煙遏空勢聳晴蜃梁橫曉虹偉殊䂓之罕及猶清唱之難同試問鄒生豈似梁王之館如延孟子何慚齊國之宮莫不高與調侔妙將雅比籠輕霧以轉麗帶微霜而增美浮雲齊處疊櫺檻之幾重明月照時引笙歌而四起斯則虛凉無匹顯敞難名天未秋而氣爽景當夏以寒生風觸棼楣髣髴雜幽蘭之響煙分井邑依微聞下里之聲且樓之為號也有翠有紅或瓊或玉豈若表此名地彰斯妙曲况復楚山入座黛千點而暮清漢水橫簾帶一條而春綠亦足以認一作任彼清暢憑茲麗譙掩露臺之高峙軼煙閣之孤標似繼餘聲謝朓閒吟於暇日疑遺妙響劉琨長嘯於清宵有旨哉每見岧嶢如聞宛雅覽宏模之特秀知屬和之彌寡人或誇黃鶴奇落星予云俱弗如也皇德彌盛宸心未休雖昭昭而光啟猶日日以勤修常懷姑務之情漸宏帝道轉見增光之美益闡王猷豈非潛契無為思齊不宰誠蕩蕩之可及故汲汲而罔怠所以宅八極家四海實憲文之道長信鑒武之功倍惕如馭朽化行克協於明哉憂若納隍令出必資乎慎乃是故將致丕洽克勤誕敷亭育旁覃於九有英明上合於三無每儼形容建前王之標表未嘗晷刻廢哲后之規模懷德兮如斯好生兮何巳承昌運兮咸稱鼎盛在聖躬兮寧惟玉比旋立後圖亟更前車丸蓋垂法於列辟非取䂓於君子由是祚既起漢仁惟纂堯式孚巳及於千品克懋匪由乎一朝振三代之風咸知允叶紹百王之業是謂光昭自可國肥詎徒身潤焦思無慚於夏禹羶行遠符於虞舜遂使卿雲瑞露皆感之以呈祥鑿齒雕題具懷之而納賮况乎混文軌倒干戈惟馨之義斯在既飽之人若何播以樂章八音而盡善盡美導乎邦政萬物而無偏無頗大矣哉垂拱端居風行草偃全臻教化之要漸積邦家之本臣知合天地而日新又新豈致君之云遠昔庖氏為君斯文始分畫卦而初成陽位造書而肇見人文豈非本自道生終云神得俾大衍以虛數從黃鍾而立則君子守以制性聖人抱而臨極然後彤弓是錫天王嘉重耳之勳簞食見稱夫子美顏回之德萬物生焉惟茲處先况乃聞而知十用以當千名立兮卓爾形標兮孑然許子之瓢既棄陳公之榻猶懸或有錢囊譏世芻束稱賢改其月而為正月號其年而曰元年若夫李陵呼時荊軻去日歌興三歎之唱智慚百慮之失為山用簣魯論之義足徵載鬼以車周易之文斯出借如寒暑相推薰蕕可知鶚百鳥而匪匹龍三人而共為儉德彌彰平仲之衆裘安在仁心遠播成湯之三網猶施既聞興國之言亦有傾城之顧措辭雖屈於子夏重諾常推於季布天得地得膺千年出聖之期彼時此時叶四海為家之數琴瑟專矣車書混之分杯羹而孰忍縫尺布以堪悲雖云管仲能匡因成覇業未若蕭何如畫永作邦基是知王居四大之初日冠三光之首目所加而可取毛不拔而何有愚則立節無二干時不偶幸麟角以成功庶桂枝而在手有女維神徘徊恨新既入文王之夢方明尚父之仁君莅灌壇自其來而有感妾臨一作歸西海將欲過以無因豈非受命上天禀靈下土苟當鑒德鑒德一作國之職誠是福謙之主然而出則駕疾風鞭暴雨雖娉婷淑態所行皆正直之心而倏閃陰徒在處有晦冥之苦今則望彼仁境居惟太公於國而棟梁斯喻於民而父母攸同謐爾封疆無破塊之時雨恬然草木絕鳴條之曉風安得暗恃威靈長驅徒御不惟流麥以斯恐抑亦偃禾而是慮舊祠巳別固難返駕於今辰直道須遵豈可取途於他處是使淚臉紅失愁蛾翠銷駐霞車而色斂停寶蓋以香飄潛羡羿妻明月先踰於清夜却慚巫女輕雲巳度於晴朝誰見其迴惑蕙心踟蹰蘭質感教化之均適患奔驅之迅疾花顏慘淡非嫌勝母之時玉趾遲留異惡朝歌之日王乃愍彼彷徨詢其感傷既非失珮於江上亦非遺簪於路旁入夢之姿經三日以方過非熊之道歷千秋而更彰則知執德感幽者繫乎真操心讋物者由乎正苟在神而猶懼豈於人而不敬若夫蝗越境而虎渡河未可與斯而論政漢祖還鄉兮鑾駕將還沛中父老兮留戀澘然憶故舊於干戈之後叙綢繆於旌旗之前白髮多傷鳳輦願停於此日翠華一去皇恩再返於何年昔以㣥盜并興我皇斯起英明天授其昌運神武日聞於舊里今則秦楚勢傾鼓鼙聲止聖代而陽和煦物元首明哉暮年而蒲柳傷秋老夫耄矣然而黃屋才降丹誠未申豈可風馳天仗雷動車輪一則以情深閭里一則以義重君臣隆準龍顏昔是故鄉之子捧觴獻壽今為率土之人乃曰陛下創業定傾順天立極臣等犬馬難效星霜屢逼窺泗水則凄若舊風指芒碭則依然故邑眷戀難盡汍瀾易得昔日望雲之瑞豈有明言當時貰酒之家堪驚默識帝乃駐天步遂人心戈矛山立貔虎煙深草澤初興雲露而蛟龍奮翼鄉園重到煙空而鸞鶴歸林時也親友咸臻少年并至縱兆民如子恩更洽於故人雖四海為家情頗深於舊意徃事如覩流光若驅望幸誠異攀轅則殊交遊既阻於秦時堪悲今昔黎庶正忻於堯日自恨桑榆巳而雙淚盡垂一言斯獻請沛為湯沐之邑實臣愜死生之願是使萬歲千秋杳冥無恨夏黃綺季角里園公抗跡君臣之外潛身商洛之中高帝搜揚竟不歸於北闕儲皇搖動皆來衛於東宮漢之初也鳳輦情乖龍樓恩失將謀廢嫡以立庶欲易黃裳而元吉呂后憂深留侯計密且曰四人可致一匡永逸洎安車奉迎之後當彤亭侍宴之日森爾離立皤然間出似八公而少半疑五老而無一高皇問曰從者誰乎安得鶴氅斯衆霜髯與俱乃言曰臣等質同蒲柳景迫桑榆是商嶺臥雲之士皆秦朝避世之徒邦無道則隱邦有道則愚上曰自朕之興待賢而用顧朝廷之未治念先生之所共昔何遠迹不為率土之臣今乃辱身盡作承華之從對曰陛下掃蕩寰宇秦降楚平未有稱臣之意惟聞慢士之名太子則卑謙守節柔順利貞理有承聖斯宜繼明臣等惟義所在非道不行雖蹈夷齊之潔更無伊呂之情故得隨雞㦸之差肩向龍墀而接武星星於朝行之列濟濟於王人之伍帝曰空勞逋客來撫藐爾之孤可謝周人巳有良哉之輔既而問安之位克定肥遯之心共還其來也鶴集丹陛其去也雲歸故山懿夫出彼巖巒成茲羽翼一則免扶蘇之危一則祛獻公之惑誰知惠帝立而劉祚安乃採芝公之德漢章帝以錫賚情重君臣道全示署劍推恩之禮表經邦佐命之賢雖彼百官分恩光之渙汗惟茲三者覩御墨以昭宣是知器挺臣功名由天奬非霜刃無表汝之庸勳非乾文無重予之慶賞所以昭沖和勸忠讜鮫函盡啟決雲之狀盈眸彩筆初題垂露之文在掌豈不以良佐斯得深謀可嘉或染翰而紀其敦樸或揮毫而志以文華彼錫彤玈我乃頒其秋水彼銘鐘鼎我乃鏤以蓮花一則薛燭未逢風胡不識提攜可助於雄勇佩服必資其挺特能使巨闕慚價豪曹失色乃署龍泉之名以表韓稜之德一則龍藻日耀霜風雪凝麾之而氛祲以歇帶之則威儀可聆斯亦刜鐘難斬馬奚稱乃署漢文之號以旌郅壽之能一則利可衛身威能禁暴愜項伯以將舞宜趙王之所好豈羡乎五色竒形千金美號乃署椎成之字以彰陳寵之操故得光生環珮榮冠簪裾見魚水相逢之際是雲龍契會之初數比夢刀各獲君前之賜功齊神筆長吞天上之書洎吾皇威被華夷德安岐雍鋒鋩不自其手署頒賜盡歸其公共蓋以韓魏為鋏兮宋為鐔異漢朝之所用育物恩廣垂衣道豐流德澤於行葦示仁心於牧童且曰驅爾牛羊勿近萋萋之道恐其蹄角踐傷泥泥之叢斯乃家國攸用華夷所同俾遂生榮之性仍敦忠厚之風是以發自睿情指乎幽渚伊方苞方體之地匪或寢或訛之所未逢至化其生有類於蒿萊今被仁風所貴不殊於稷黍懿夫拂水沙際搖煙路傍安可縱三犧而蹂足蘭放千足以跳踉莫不欽聖教感吾皇戒彼畜之奔逸免斯條之折傷由是綠野分驅蒼葭共保但跼桃林之坂自齕金華之草春風澤畔如生腓字之心落日山邊盡認下來之道况乎挺本方茂為航可嘉靃靡而爭芳荇葉參差而競秀蘭芽若使大武斯履柔毛所加則八月洲前無復凝霜之葉三秋江上難逢似雪之花是以咸仰嘉猷式遵元德牧者既以承其教虞人得以修其職故能隔瑩蹄於平野莫徃莫來限羵首於荒郊自南自北然後澤靡不洽恩無不周國有殷充之實家無罄匱之憂網不入於汚池斯言莫偶斧以時於林藪厥義難侔偉夫至理彌彰前經可駕遠符大雅之什允協文王之化因知皇王之教所憂不惟禾稼披老氏之遺文見聖人之垂則戒君上之所好慮天下之為惑且物有藏之無用求之難得若將一作其貴也則廉貞之風不生吾苟賤焉庶嗜慾之源可塞斯乃復道德之本為政化之端雖聞乎無脛以至會忘其拭目而觀於以息襄攵敓激貪殘皆重黃金我則捐山而孔易咸嘉白璧我則抵谷以奚難莫問瑕瑜詎論妍不節儉之德既著饕餮之名何有裘因焚後應無為狗之勞珠自鍜來巳絕伺龍之醜祇如照車於魏徒稱徑寸之貴易地於秦虛重連城之珍一則受欺於強國一則見屈於聖人豈若端耳目寂形神視彼瓊瑰之類齊乎瓴甋之倫義動貪夫皆少私而寡欲化移流俗盡背偽以歸真可使路不拾遺人忘好貨顧予有摘玉之志俾爾無攫金之過則以此行道而大道復隆以此移風而元風再播且夫君教矣人效之若不去其奢而返其本必將胠爾篋而控爾頤亦何必樹美珊瑚競列華筵之翫布求火浣長充內府之資方今闡靈符握金鏡若能來淮夷之琛不以為貴入王母之環不以為盛上崇樸素之道下率廉隅之性豈惟咸五而登三可與大庭而齊聖聲教斯播戎夷自平祇在推賢而耀德豈由命將以觀兵垂彼衣裳示朝廷之有序櫜其弓矢俾海內以惟清皇帝以眇屬前聞遐觀列聖謂修文而可致其肅穆謂立武必傷乎性命將欲來萬國之好去百王之病鴻私元澤常昭天子之仁豹畧龍韜不授將軍之柄故得地協三無風清八區混軌文於殊俗銷劍㦸於洪爐况其德乃車也兵猶火乎豈宜執以二三臨於下土安可封其十萬擾彼邊隅所以修之為勤戢之不惑湯修而葛伯斯服舜舞而有苗自格是知失德者由乎縱五兵偃兵者在乎興七德今則朔野烽滅遼陽戌閒堯心非樂乎丹浦周馬巳歸乎華山使跂行喙息之微咸躋壽域見執銳被堅之役盡復人寰然後澤溢區中塵消塞外四方忘覆載之力百姓免殺傷之害雕題辮髮傾心而俱喜子來率土普天鼓腹而悉歌時泰蓋由煦嫗仁廣含宏道深慕羲農之化洽鄙湯武之君臨曉月彤庭共覩乾坤之量秋風榆塞不聞金革之音斯乃帝道潛融宸襟洞照得允文允武之體臻一張一弛之要可謂超五帝而越三皇合二儀而齊兩曜欲廓文德先韜武功倒干戈而是載鑄劍㦸以欣同千里還師迴刃於戎車之上一朝偃伯垂仁於王道之中皇上以心宅八紘威加四極有罪必伐無征不克旌旗西嚮競納款於中原鼙鼓東臨咸獻俘於上國然後軫宸慮惻皇情萬姓苟宜於子視三邊可竢其塵清由是罷師旅休甲兵干櫓勢傾壓雙輪而委積戈鋋色寢滿十乘以縱橫蓋以戰乃危事兵惟凶器欲今永脫於禍機必使先離乎死地所以前鐏俄覩迴轅繼至虞舜舞而曾用比此寧同魯陽揮以員來於斯則異既不授其豹畧乃長包於虎皮諒櫜弓而若此詎返斾以如斯徵彼禮經折軸苟聞於山立考諸易象盈車徒見其離為豈慮自焚誠同載戢五兵從此以皆弭七德於焉而復立遂使頑凶之子無日可尋更憐忠烈之臣徒云能執故得殺氣潛息嘉猷孔彰以此懷柔而何人不至以此亭育而何俗不康罷刃銷金道無慚於齊帝放牛歸馬德寧愧於周王大矣哉因爾仁天用藏兵柄得東征西怨之體見師出凱旋之盛小臣伏覩乎櫜鞬敢不歌揚於明聖至明者莫尚乎金鏡可類者莫先於聖心既施之於日用如握此以君臨有象必昭含萬靈於睿聖無幽不燭若百鍊於宸襟稽夫禀氣於無形成功於至妙苟取喻於在掌詎有疲於屢照外發皇明中凝德耀克符磨瑩之體允叶提攜之要故能洞達千里高臨兆人尋元而光彩盈手考理而貞明在身雖跂行喙息之微形容無隱信率土普天之士肝膽俱陳莫不深貯乾坤大極區宇誠非出匣以斯舉詎謂臨臺而下取潔澈在心深沈似古笑飛鵲以將繞鄙芳菱而欲吐懿夫皎皎斯在兢兢自持異樞衡之是秉見藻鑑之無私所以辨愚智洞華夷豈惟分大小別妍媸塵垢不染英明在茲魑魅於焉而遠矣姦邪無所以藏之是知懸魏宮者難侔掛秦臺者莫及詎端拱而見舍諒臨朝而盡執孕玉燭以光動寫珠庭而影入蓋以持察㣥品非窺聖顏迥出聲身之表如存指掌之間事異軒皇得元珠於物外功逾羲叔御白日於人寰宜乎永保清平長稱明聖當宣室以潔朗逗皇圖而輝映臣知六五帝而四三皇實由握乎斯鏡義則本在路猶強名雖無有而為有亦時行而則行人或未知謂投足以山險心如能制信在躬而砥平既絕回邪無差正直居則思之而可見忽爾覔之而安得默識終始潛名南北昧其所在迷吾道之康莊能此是敦造先王之閫閾然而視之者不為好徑赴之者豈曰多歧邁德而謂其達矣立身而何莫由斯聖人每修孰慮乎崩榛所塞君子常喻寧求其老馬能知稽夫近遠甚夷徃來無苟周朝之柱史奚棄鄘國之貞妻自守旁生行葉於列樹以寧殊中引德車在摧輪而何有莫不亘深仁宅遙通禮園匪豺狼之所到惟干櫓以斯存若乃循其軌遊其藩有如入顏巷之中恬然自樂復似經桃蹊之上寂爾無言可以導彼深誠臻乎奧旨相逢盡重氣之士相護皆舍生之子徘徊其側多感分以遺身馳騖於中必先人而後巳厥大斯著其高或聞異邪途之徑捷與左道以歧分五霸三王既適此以圖業忠臣烈士亦從茲而報君夫如是則踶跂所為坦夷斯喻於以闢百家之蔽塞於以洞五帝之旨趣悲夫衝蒙行險之徒曷不遵乎此路日暖風輕有黃鳥兮關關嚶嚶始乘春而出自幽谷俄擇木而求其友聲尚沮㣥猜每念載鳴之侶方期類聚詎無相應之情於是紅破園桃青勻禁柳韶光媚原野之始宿雨霽池塘之後由是睍睆遷喬棲翺寡友潛符切切之義爰發嘐嘐之口林間乍囀誠謂乎知音可期陌上頻啼似恨其離㣥巳久既而雅叶交應如懷故人得鸚鵡之流言不信見靈鳥而白首如新灌木煙中念友朋而有待楊園景裏豈鳩集之無因鳴亳既殊攀稽靡異猶角徵之先奏俟宮商之有自遂使夕陽橋畔人人增感別之愁曉色樓前處處動傷春之思族類安在間關未休想王睢兮從吾所好知斥鷃兮謂我何求豈比蜀魄銜寃啼巴月於長夜燕鴻失侶叶邊雲於凜秋懿夫隔霧彌幽含風轉好似宏三益之旨足警寡聞之抱想伊鳥也猶推故舊之心矧乃人斯忍棄友朋之道取則寧遠流音在茲爾苟嚶鳴而占矣吾將德義以求之雖慕惠莊願定交於他日如令管鮑得擅美於當時夫如是則結綬何慚彈冠不惑伐木將廢而莫可谷風欲剌而安得巳乎弗謂斯鳥之聲至微而忘其是則彼木雖衆何心可持惟松柏其生矣禀堅貞而有之所以固節千歲凝芳四時積翠森疎見冒雪停霜之性攢空蕭瑟無改柯易葉之期懿夫外聳森稜內扶剛直或盤根於幽磵之畔或挺資於高山之側豈儕蘭桂何慚荊棘葉殊而可謂不同節厚而盡云難測相連夾路在成城而稍侔未可為薪比死灰而莫得匪石而枝勁叶懸旌而影搖苟無懼於早落亦何憂於後凋聳幹山巔且甚長於衆植成行陵上終不亂於驚飇矧乎萬樹含秋千林向晚方見夫鶴棲之所彌茂麝食之餘不損天台溪畔若有意以垂陰太華峯前豈無情於固本既立端操寧驚大寒似蓋而秦封翠斂如愁而殷社煙攢勢迥蒿萊競高標於塵外時當搖落爭秀出於林端豈無井上之梧亦有園中之柳當春色以自得在歲寒而則否曾未若方寸斯抱層空可凌藿雖傾而莫比蓬非直而何稱至如嚴氣方勁翠色猶增亦何異君子仗誠處艱危而愈厲志人高道當顛沛以彌宏是知斯木惟良因心所貴各固結其修幹共青蒼於四氣然則喻禮於人欲舍此而何謂彼道雖遠惟人可行積一時之跬步臻千里之遙程亦如塵至微而結成山嶽川不息而流作滄瀛是則大自小成遐因邇至理苟均於積習一作素義必資乎馴致莫不究其攸徃明其所自不因布武之間那及同舟之地終尋高躅必可繼於飛鴻不躡前蹤安得齊於赤驥是則欲追迢遞無或踟蹰始謂與其進也不亦遠乎玉趾勤遷諒金城之可越方城漸近寧漢水之難逾矧夫高以下為著顯以微為本既曳踵以將至蓋執心而忘返行行莫止豈辭明月之程去去不停寧憚黃雲之遠但勉行之終能及之苟循途而坦坦盍履道以孜孜如肯裂裳自等聚糧之義豈勞由徑當齊命駕之期得非務進彌專遄征有禀念踽踽以無怠故儦儦而滋甚自勤跋涉邯鄲之學全殊不暇因循燕宋之遙可審然而志弗休者雖難必易行不止者雖遠必臻亦猶積水為瑩氷之始層臺實累土一作木之因大道能遵終及奔馳之子中途儻廢誠慚跛躄之人別有跼蹐員來躊蹰斯在將欲拔跡霄漢超蹤寰海或能開道路解縶維則千里之途可待多辯名士能文碩儒或有不談於王道終知取笑於樵夫幸遭仄席之時遂皆沈默遂使執柯之子因此胡盧當其野集遺賢朝稱多士九土咸歡乎富庶四夷俱混於文軌盡合讚洪猷歌至理而懸河健口未聞衮衮之辭擲地清才不述便便之美有夫則野其業惟樵或怡情於磵側或放志於山椒乃曰凡在吾儕猶欣渥澤之汪濊豈伊作者長使聲歌之寂寥所以向彼息肩因茲掩口是山中拾箭之際正洞裏觀棋之後尤堪撫掌念牧竪以知無聊用解顏問樵人之信不况乎德邁三代功超百王士非君則好爵奚取君非士則休聲不揚豈言泉之杜竭抑辯囿之荒凉側耳聽時嫌寂寂於都下負薪歸處輒怡怡於路傍蓋以沐浴昌期優游元造俱為卷舌之輩不及擊轅之老囅然未巳殊主人之答賓莞爾難持異下士之聞道豈謂乎力伐摧柏聲騰夕嵐足令墨客增愧詞人有慚是知運屬無偏合著奚斯之頌時當有截須陳吉甫之談方今君則唐虞臣惟周召稱揚者皆白馬之辯贊咏者盡雕龍之妙可以流播千古鏘揚八徼若然則採樵之徒歟又何由而竊笑漢昭帝之御乾時猶年能首率於農務遂躬耕乎弄田理叶生知早識邦家之務一作本事殊兒戲斯為教化之先當其天駟既端土膏初起命開鉤盾之側將幸上林之裏有司於是整溝塍修耒耜別置膏腴之所取法百廛旁觀齷齪之間如方千里帝乃駕雕輦出深宮展三推而不異籍千畝以攸同且曰朕位極元首身慚幼沖每訪皇王之業無先播殖之功未遂躬親於彼神臯之內聊將樹藝於茲禁苑之中然後俯天顏擁農器向畎澮以懋力對鋤耰而多思豈無宴樂不如敬順於天時亦有遊畋莫若勤勞於農事是則非同學稼粗表親耕既留心於東作寧無望於秋成環衛近臣盡起西疇之興宮闈侍女微生南畝之情於是稼政既修稻人是率千牛之列有序九扈之官咸秩神農舊務嘗廢於他年后稷餘風復興於此日嘉夫戲或是戲為勝不為審殷阜之由此知艱難之在斯自昔庸君多昧三時之務惟茲少主能分五地之宜故得教化下敷皇猷上建人忘荷鍤之苦俗有一作靡帶牛之願因知翦桐葉以命封未若耕斯田而天下勸我后君臨九有仁被諸華伊炳靈之白鵲倏效祉於皇家變爾羽毛以表恩沾於飛走生乎邊鄙是彰澤及於幽遐始其决起春巢輕翻素翼不類雕陵之異狀自受金方之正色羅氏潛藏封人既獲且曰昔聞興咏於召南今見呈祥於塞北乃發天慶昭皇德望雲將獻鵠歸齊使之籠拜表初行雉別越裳之國既而臻鳳闕進彤庭粉煥成橋之羽霜凝化印之形奚稽瑞牒克叶祥經異丹雀之呈質同素烏之效靈帝嘉其賁然斯來一作來思皭爾難及俾遂性以飲啄顧無㣥而翕習由是繞樹星飛依枝玉立乍捕蟬於上苑不羡鶯遷或報喜於丹墀何慚鳳集故得彩迥㣥類名超百祥播休徵於有截昭聖祚之無疆月下南飛過銀河而混色風前東嚮映瓊樹以增光若乃潛下庭隅遠分林表迷彼鳥之翯翯奮爾駒之皎皎狼生殷代誠福應之未如魚躍舟中諒貞符之尚小曾未若影度簾曙聲來殿深美掩條支之獻珍逾隴坻之禽昔在遐方玉每抵於崑岫今以至德巢可窺於禁林是知斯鵲來儀惟天瑞聖俾爾羽之潔朗彰我時之清淨臣聞雁有歌而雉有詩又安得不形於贊詠魯國諸生欣逢聖明咸西嚮以迎睇望東封而勒誠習禮空勞日日而徒瞻嶽色凝旒何處年年而尚鬱人情豈不以兵偃三邊塵清萬邑欲行登禪之事猶執勞謙之德是使想黃屋以心傾斂青襟而目極乃相謂曰自古帝王功成業昌盡皆增博厚報穹蒼所以山呈瑞應水出榮光國泰財阜時豐俗康固合陳俎豆捧珪璋高踐天壇之上遙昇日觀之傍而乃闕其儀寢其議蓋九重之鳳詔缺敷四海之鴻恩未被空令漢史願陪檢玉之行更切孔徒渴見泥金之事莫不引領延佇凝情盡思未遂相如之請空吟叔寶之詩夫子壇邊恐雲龍之會晚顏生巷裏憂日月以來遲况可後示百王前觀萬姓三千徒兮今日斯懇七十君兮當時稱盛潛期山下得聞萬歲之呼每想封中獲仰千年之聖嗟夫跡居洙泗魂斷咸秦俟南面之鸞駕問西來之路人當河清海晏之時宜遵古典是率土普天之幸豈但素臣近雖下國梟鳴邊夷鼠盜既有征而無戰盡推兇而翦暴宜允儒者之心登泰山而昭告
