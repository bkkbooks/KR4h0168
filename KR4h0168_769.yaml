front:
  text: 全唐文欽定全唐文卷七百六十九棨字輔之福清人咸通三年進士杜宣猷鎮山南請為團練巡官李隲為江西觀察使辟為團練判官調大理司直除太常博士遷水部郎中
  hash: sha256:f7a2794a03cb529cc1f91f951f7030e444f15986005bcd7eac0ba4c5c9ff9c19
