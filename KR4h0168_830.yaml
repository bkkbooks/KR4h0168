  text: 全唐文欽定全唐文卷八百三十寅字昭夢莆田人第進士授祕書省正字閩中王審知辟佐幕府
  hash: sha256:ad0b71488aa1bc09b1eddaf71936fbac28c1cb8fae1cb14fc85efc38ddf6039e
  markers:
  - {type: head, offset: 13, content: 徐寅, id: KR4h0168_NFKB_830-h1, level: 1}
body:
  text: 明皇帝以孝悌為家此地宅而宸遊未賒淒涼而一景空鎖悵望而諸王已遐鳳去鸞歸秋葉落梧桐之樹年來歲改春風遺棠棣之華當其龍虎俱來蚪螭並轡觀風而玉輦停駕選勝而金鼇負地天師魯匠新土木以宏規月殿雲樓破荊榛之積翠既而甲第煌煌維城道傍雍然而帝子天子肅睦而寧王薛王綵霧彤霞從仙都之八面風臺水榭引蓬島於中央不類遷都平分于宅為星之渚同數疑比奕之龍並迹聖主之千聲羯鼓洛水風清岐山之數調胡琴嵩山月白瑞氣飄空蘭深麝濃連雲之飛閣鎖鳳象海之清池蟄龍解慍當風帝舜之琴雅奏興歌立德太康之弟相從莫不以嘉樹濛煙崇墉硋日金聲玉韻以總綺夏草口咢春藂而剪出紅梁綺棟晐天地以量功舞態歌容掌神仙而比質一旦衮冕參差外遐內微華堂之帳幄蟲蠧深院之欒櫨燕飛時移而玉笛誰吹清商泯滅事往而金牌尚在御墨依稀徒令攀詠皇恩追思聖德傷晏御以綿延繞周垣而嘆息王侯之地宅雖存未若開元之有國聖祚開國文皇應天以豐穰之有歲作祥瑞於當年重彼粢盛五稼而誠宜在上方諸圖牒四靈而莫得居先當其衆類呈祥明君建議將垂萬世之範回出百王之智為其三農百穀普為四海之資鸑鷟騶虞空表一人之瑞於是別示休禎羲農教行調風雨則桑田自稔重龜鶴則倉廪寧盈我貴嘉禾朱草之庭前謾吐我資甘澤慶雲之天際休呈四序和平三時播種蓋將何寶而為寶不以無用而為用且夫寒暑相從成霖順風如雲之稼穡千畝擊壤之歌聞四聰斯則家給人足時和歲豐縱鳳不止于高梧之際麟不遊于靈囿之中又豈能損民力虧朕躬至如歷候不常陰陽反是甫田屢失於刈穫庶物不勝其殘毀菜色咸若豆分於此縱然出醴泉而浪湧波翻降甘露而珠英玉蘂然而不濟飢饉何足倚依豈若敬奉天時從其所宜升合穎秀歧之事冠素雀神烏之為罹畢沾濡麗日之重輪在下如茨委積華芝與玉秀俱卑偉哉以年為瑞者富於生靈以物為瑞者詭於耳目欽哉以我后之元德承太宗之景福士有觀大國之光輝敢謳謠於邦國大道純素明君御乾垂衣裳而教被率土泯智慮而恩覃普天端衮冕於九重威儀備矣走車書於萬國文軌同焉聖人以象體乾坤育涵臣子握金鏡而破昏黑啓瑤圖而昭福祉溫恭允塞損耳目以無營拖黼垂旒致邦家而自理不出宸居潛飛聖謨虛已而應乎萬有滅私而契彼三無引日月之長裾遐蘇品彙雍星辰之法服自化寰區於是扆座彤闈凝情恭已播亭毒以無黨表雍熙而有自山龍煥爛映黃屋於長闕風雨回旋仰洪猷而克遂豈不以羲頊齊教皋夔在官德所至兮天高地厚信不愆兮春煦冬寒佩華藻以常間九章惟麗傾空旻之所覆萬姓皆歡允紹二皇式孚九野尊揚襲以居上敦協和而在下飄紫宸而楚楚道泰生靈臨丹陛以襜襜塵清華夏赫赫巍巍功高二儀法希微於視聽守元默於針規自然淳朴將至生成罔虧苟人文之未化勞轍迹以何為豈若黼黻光中德及於昆蟲草木彩章影裏澤流於地角天涯士有圭璧常輕光陰是重趨明代以求試望丹霄而翹踵君同軒后為臣願讚於衮衣才匪相如獻武載歌於垂拱首陽山兮非秀非隆因其賢而名高碧空偶巖谷之逋客問夷齊之古風厚殷紂而薄宗周曷稱仁智棄三隅而執一向可謂昏蒙且紂以斫脛求歡剖心取樂空寰瀛不足以充其欲罄竹帛不足以編其惡民驚而萬國崩離天怒而三光舛錯肉為林也怪山嶽之非高酒為池焉笑江湖之易涸姬乃畋於渭濱會於盟津右白旄而左黃鉞應乎天而順其人莫不洗塗炭於四海解仇讐於萬民著金縢者乃昆乃仲釣玉璜者持衡秉鈞何不弔紂之不德慶周之有國而乃助於紂以申謙怨於周而不食鴻飛豹隱亡情於濁浪之湄蟬腹龜腸化骨於孤峯之側逋客曰夷齊以讓國無為求仁立規何歷數之不究曷興亡而不知非不知周之可輔紂之可隳所憂者萬紀千齡所救者非一朝一夕恐後代謂國之可犯謂君之可迫強者以之而起亂勇者以之而思逆所以激其時抗其迹往者勗而來可懲義要行而身不惜余乃陟彼高岡遐思耿光嶺上之松筠抱直邱中之黍稷非香未知靈氣何化身魂曷彰為聖賢則孔子顏子作嘉瑞則麒麟鳳凰縱天柱折而地軸摧斯民不泯任月兔死而日烏銷厥德愈芳於戲鍾其濁則為佞為邪稟其清則為英為異垂名之士餓林藪飽食之人硋天地疑是宜徵繪事而寫高山仰止先賢之志嗟阡陌之開兮肆兼并之不仁古制不可以卒復兮乃議田之是均鬱林林之黎元兮資稼穡以為生既教養之無法兮宜貧富之不平繄口分而畫野兮允經國之大式必邑地之相參兮限田萊而有極土不遺利兮人無闕力派頃田於單陋兮制強宗之侵陵獲資生之大利兮免豪右之倍徵此均田之大略兮見寫圖之詳悉將損多而益寡兮齊民之歸一相爾疇之紛紛兮畝為數其秩秩露田之四十兮配桑田之二十定盈縮於還與受兮各分牛以自給強不敢於占奪兮弱猶得以播殖圖雖卷之不盈兮備輿地之所有桀良策於指掌兮念生靈其獨厚懿元魏之文辟兮獨有志於古制也苓用夏以變易兮昭大和之康乂也唐有臣曰元稹兮圖均田於德宗幸皇覽之見收兮路逶迤而不通迄柴周之顯德兮乃留心於務農頒稹圖於諸鎮兮均境內之租庸雖不能伯仲於魏之君兮亦拔萃於五季也視貞元之聚斂兮誠何足與議也慨圖遠而名存兮異索駿之丹青儻按圖以取則兮吾固知其有誠伊李泌之震書兮與斯圖其表裏當中和而進獻兮務本之深意彼輿地非元圖兮徒經營乎版籍豳風之亦有圖兮欲勤勞夫稼穡豈若名田之與限兮猶總總其可行也實醇儒之良計兮均井田之一平也亂曰均田有圖稹所作兮厥制初行魏之度兮桑井既復孰諗其故兮索空圖於實效兮庶幾太平之助兮國不危無以見英智智不周何以殄姦詭當漢室之架亂有劉章之崛起於是謳甫田拍清徵當其呂氏窺鼎劉宗履冰社稷騫崩邦家替凌或呂氏必興劉氏不勝雖諸將之賈勇終按劍以未能鯨躍海以須斬狐居城而暫驚旋聞玉殿窮歎瓊筵命酒貂璫皆戚里豪貴冠蓋盡台階賓友賢愚但委其天命綱紀定輸於誰手章欲刮其瑕滌其垢摧其凶破其醜掌握於龍圖鳳歷已斷言前縱橫其地軸天樞猶歸太后朱虛乃誓遏頽波平妖剗訛得則赫功名於日月失則化韲粉於干戈在其誠而不在其衆言於我而不計於他於時玉爵驟朱顏酡直氣仰接昌言切磋曾專執耒之功多能鄙事粗續貫珠之韻請唱田歌歌曰舜之耕兮稷之植廓民天而知稼穡踈其苗而固其蒂法於家而象於國又曰沮之耕兮溺之耘灌粢盛兮除苾芬抉蟊賊兮多稼稔剪榛蕪兮嘉穀分取厥類兮去非類諭於臣而象於君想其傾海未竭轉喉未闋衆愈怡而詭譎我憤惋而剛烈怒聲徹天地託雅調以成聲熱血煎肺肝瞬明眸而漬血且以酒不罰無以肅否臧令不正無以決存亡宣酒令而為軍令假樂章而行國章犯令者汙爾宮而鬼爾族亡酒者肉爾膾而血爾漿我唱也不在深耕淺種我志也克在乎帝業皇綱俄而烹一呂禁陸梁侍坐者汗滴膽碎傍觀者心顛魄狂呂之強爾而弱劉之弱歘爾而強不日計之取兵之舉帝諸劉虜諸呂有若乎摧枯拉朽反似乎平秦破楚故得告功於聖祖削平乎子孫安子孫而總英傑故能復宗社而正乾坤向若口不能唱唱不能言則國豈定而家豈存者也余欲編田歌於樂府上聞於至尊言者三端之本錢者百貨之源反其本以行已失其源而不言如逢貫朽之資我辭遽默自負不貪之寶吾道常存昔王衍以東晉季年金陵薄俗恨朝野以爭侈競緡錢而縱欲化為糞土填巨壑以難盈湧作波瀾灌漏巵而不足豈惟紫閣名臣紅窗美人有私而盡切藏賄無德而何嘗潤身夷甫乃怒於彼而心誓忿於時而氣振所以麈尾高談肯説五銖之號鶴裘換酒同思四壁之貧泉貨寧懷樞機永祕何曾之食萬休述和嶠之癖多罷議賓階砌下誰云苔點之圓貨殖傳中諱卻金錢之字衆多愛兮積聚奢淫我所愛兮唯財於金在心所惡以言寢可以觀言而見心任銅臭以驚時豈論崔烈任雨飛而滿屋靡説黃尋且夫巨萬奚若仁銷義鑠豈不見一惡而懼百非口非言而心嫉惡金相馬埒休詢王濟之奢為山積鹿臺莫問殷辛之禍作蓋傷其濁世澆風貪婪莫充無苟得者猶寡終不言而曷同斯時也道德銷盡錢刀削空斯人則與世垂範端身固窮手近青蚨先納雌黃之口內眼觀榆莢預緘枝葉於胸中則知不立殊規寧議衆醜他拭目而余目昏彼钁金而此金口異哉不談人過不語怪神與斯人而善偶搜聖人之垂象伊茲衡之可觀材徑挺以繩直星連綿而珠攢惟用也氓庶不能以多少隱惟平也輕重不能以詐偽干故得萬人便於㕓里物或紛競可以定黍纍之圭撮利其分毫可以觀低昂之容止執中以告無或不喜則夫衡之為物其用甚大四方正而域中平七政齊而天下泰動而無欲任之故絶私益而無方行之固不害然能思無不踐應倉舒刻舟之深淺問無不知表張重度骨之威儀若乃均其神道形其事業聖人因之以平施邊鄙賴之而不怯豈欲決其差謬明其有無小人取之以作則君子見之而交孚則有王臣謇謇宰職秩秩洞鑒人才神無隱質諒茲衡之攸故守之而勿失倘陳平之見知宰州縣之如一壬子歲大雪濛濛繁雲鎖空白日光沒樵蹊脈窮地洞沍而履不得天颼飀而飛不通庭蘭落翠禁樹催紅安處王乃去廣殿即深宮獸炭呀焰狐裘禦風頻謂左右曰寡人今日之寒斯甚曷與下民而同憑虛侯進言曰大王自恐嚴凝罔憂邦國下民將欲凍死大王未有寒色王曰下民之理聞之可得對曰只如負禦三邊彌年不還戍遠燕嶺衣單鴈山鐵甲冰徹金刀血殷風刮衰力砂昏少顏大軍之生死頻決上國之英豪甚間今則凍平遼水雪滿蕭關此戰士之寒也王曷知其險艱至若荷鍤田里勞乎農事草荒而耒耜無力地冷而身心將悴賦役斯迫鋤耰何利凍體斯露疏蓑莫庇東臯孰閔其耕耘北闕但爭其祿位今則元律將結元冬已繼此農者之寒焉王曷知其憂愧復有萬里辭親求名進身韜玉待價燃金食貧賀清平於四塞冒霜霰於三秦北戶無席冬衣有鶉幸偶乎勛華為主同思乎伊呂稱臣今則顓頊威至元冥令臻此儒者之寒焉王曷知其苦辛別有苦寒之者不能殫寫在臣説矣恐王煩也於時陽氣收陰氣浮火井滅朔風愁千山之凍樹頻折八水之凝波不流王乃閔征戰之勞命偃乎兵革念農耕之苦命蠲乎徭役知儒者之寒命選於宗伯沛中之智兮勇鵬翻舞陽侯兮威曷論冒死而嘗輕白刃匡君而直入鴻門巵酒彘肩豈讓匹夫之膳朱輪畫轂能扶萬乘之尊當其秦鹿無主項王赫怒誇楚將於秋鷹滅沛公於蹇兔天地何小風雲可步海蕩山振龍驚虎懼鳳歷誰傳鴻門晝關湯池命酒歐劒搖環氣隆準以斯挫血重瞳而欲殷鯢浪鯨波呀呷於斯須之際禽籠獸穽炮燔於咫尺之間洶洶㣥心雄雄壯士詣閶闔而飛步怒豺狼而切齒僕視閽守掌窺戎壘嵩衡蓋數撮之塵溟海乃一泓之水身輕白羽蹈烈火以非難手擘朱扉信春冰之可履走電呀雷金樞洞開麋鹿奔而貙虎至燕雀驚而鷹隼來愚山可徙藺柱須摧引龍躍於洪波豢人徒爾送鴻翻於碧落弋者何哉下闕化不可識春之倏生神不可測雷之忽鳴表陰陽之大信發天地之希聲俄青律之未分寰區曷變俄洪音之一播品彙須驚豈不以上綰天樞下司地紀陰之變兮將伏陽之開兮欲起撾雲鼓雨殷南山而過北山火轂風輪震百里而越千里浩浩闐闐神驚鬼顛冥濛而烏兔將墜動蕩而山河欲遷須臾走電赫飛霆聯霹靂俄奔八表謂衝開下土轟軿繼作九州疑裂破青天烈缺威催豐隆令急晴陽照兮冰凍洗甘澤滂兮衰朽濕幾處脅韶光淑氣振折㣥芳數重呀地戶坤維驚醒百蟄燭烻洪濛鼙掀碧空香籠麗景翠染東風去年之積冷凄寒皆令變暖昨日之枯株稿木盡使駢紅則知春之榮雷於春而稟德秋之落雷於秋而授職不然者何以動於此以為準止於彼而作式聲之發也星辰將歷候咸移聲既收焉蠢動與芳菲並息駕電驅風高凌九重日兮月兮還我化天兮雲兮塗我蹤時時而遠谷陰霾訇崩謺嶂往往而寒湫煙雨吼拔潛龍則知雷發無遺春光自早發聲而歲歲長在光景而人人自老不能火僭逆而霹姦妖攸攸兮天道葉落辭柯人生幾何六國戰而謾為流血三神山而杳隔鯨波任誇百斛之明珠豈延遐壽或有一巵之芳酒且共高歌豈不以天地為爐日星為紀雖有聖而有智不無生而無死生則浮萍死則流水七十戰爭如虎豹竟到烏江三千賓客若鴛鴻難尋朱履擾擾匆匆晨雞暮鐘命寧保兮霜與露年不禁兮椿與松問青天兮何慘何舒拘人否泰歎白日兮東生西沒奪我顏容可惜繁華堪驚倚伏有寒暑兮促君壽有鬼神分蠧君福不覺南鄰公子緑鬢改而華髮生北里豪家昨日歌而今日哭夢幻吞侵朝浮夕沉三光有影遣誰繫萬事無根何處尋易服猛獸難降寸心眼看西晉之荊榛猶經白刃身屬北邙之狐兔尚惜黃金亦何荒色嗜音雕牆竣宇君不見息夫人兮悄長默金谷園兮閴無覩香閣之羅紈未脫已別承恩春風之桃李方開早聞移主邱壠纍纍金章布衣白羊青草只堪恨逐利爭名何太非嘗聞蕭史王喬長生孰見任是秦皇漢武不死何歸吾欲挹元酒於東溟舉嘉肴於西嶽命北帝以指榮枯召南華而講清濁飲大道以醉平生冀陶陶而返朴斯室誰見伊人盡傳浩渺而洪波有象深沉而碧浪無邊異彼鮫人處乎鯨海儲晶蓄素刮銀兔之秋光矗浪凝波刷金烏之畫彩露洗霜融涵虛湛空鑿戶牖以非匹飾椒蘭而不同度木何人範環堵於琉璃地上作嬪誰氏織輕綃于玳瑁窗中鬼瞰終無神功自偶雙闕標百尺岧嶢而貝闕凌前萬戶列千門洞達而龍宮在後光攢琥珀千樹花折珊瑚萬枝控巨鯉之真人方能到此泛靈槎之上客莫入於斯電落窮陰雲間大厦誰為欺暗之士盡是泣珠之者霏霏瑞彩凝成螮蝀之梁漠漠飛煙化作鴛鴦之瓦鏡瀉奫淪波澄垢氛瓊窗而鼇頂均岫綺棟而壺中借雲二十四里之漢宮何曾足數三十六般之仙洞未得相聞允矣神化規模天然異質吾欲乾北海而涸南溟探驪龍於此室天闢區宇人尊帝王國將入於封部教先知於典章不宰成功乃合乾坤之德無私鑒物能齊日月之光多士之操修六經之楷式將欲明其教必在遊於國溫柔敦厚出風雅之咏歌比事屬詞本春秋之黜陟協彼典教諧斯禮文廣博而樂章具有精微而易象爰分先王所以總斯御物體彼為君遂使足歷四門親愛之儀已覩身由萬戶民從之義皆聞莫不周覽金湯潛量王霸審樂知政以攸類陳詩觀風而相亞是以逢耕讓畔得先人後已之規察鳥安巢驗惡殺好生之化今吾君興帝業赫皇明以謙柔而教蠻貊以朴素而教公卿以節儉而教百姓以農耕而教五兵自然八方走響六合飛聲豈俟入乎閫閾方能知彼規程其或跋扈未殲陸梁未向可使拜天闕而俯聽趨帝閽而引望俾其退而補過警干羽之舞階進以盡忠報聖明之在上士有負書劍出林巒謁九門而教化斯仰瞻百辟而威儀可觀則知不上泰山豈覺寰區之大不浮東海寧知溟渤之寬敢不廣義路懷忠甲開閶闔以聽聲詩賀仁霑而恩洽碧澗千仞青松幾年豈天生之有異蓋地勢以居偏挺操彌貞雖厄巖巒之下掄材倘鑒合居樗櫟之前則知植物之近不可用而或用生物之遠其可貢而誰貢伊彼良木何慙其青竹成龍工未我求且伴其高梧宿鳳翠鎖山椒心凌碧霄生風而虎豹吟嘯拂衣而龍蛇動搖安得伴磊磊之石因離離者苗奚三公之夢猶阻豈萬乘之封尚遙何殊孔明之先主未迎空懷良策呂望之文王非獵不到終朝今則希匠斤採溪壑如拔之於高岸邃谷可營之於帝宮仙閣澗底松兮才不才候般輸之所度書契天設文明日新將究止戈之義式彰為武之仁足還太素壽我生靈志肅三軍欲致理而臻乎至理論歸八法見古人而教以今人昔者楚莊薄諸晉國小臣請築乎京觀厥王乃陳乎道德謂臨戎制敵勝不在乎干戈示子傳孫事宜歸於翰墨且武也者戰而不陳師惟在和考其字以因明所自止其戈而焉用其戈願劍戟而器於農耕賢哉若彼問軍旅而對以俎豆聖也如何矧乎伏羲畫卦以窮微蒼頡造書而允中能會意以無怠實臨文而可諷下破山而加點理絶乘危上擬成以無人誠為動衆以五兵為武者非武之資合兩字為武者是武之奇當用究言其不用有為詎及於無為鳥迹斯驗人情可窺亦胄普疑而明焉其儀不昧秋懸心而愁矣厥義咸知是宜遵史籒之文贊升平之主兩階屢舞以稱聖七德交修而曰武亦何異威而不猛宥刑而夏楚寧施捨之而藏得象而筌蹄奚覩今我后洞窮經之旨知為君之難功不宰而八蠻自服書同文而萬國咸安列聖摧凶我則懷遠而柔邇前王伐罪我則去殺而勝殘故得文物重新妖氛自弭廬人之百鍊寧問呂望之六韜可委士有偶明試而賦上獲贊皇風而之是缺陸海之中昆明以東御為溝而有自溝注水以無窮縈紫閣之千峰清辭玉洞瀉銀河之一派冷入瑰宮我西都也地正三秦天連五緯不知此水之出但見斯溝之貴既非減灞以分滻又匪疏涇而鑿渭是何飛下雲霓沿高走低潺湲乎元豹岡北繚繞乎靈龜岸西豈因水伯穿地維通來玉甃必是神龍為天子吐灌金隄上繞蓬瀛中侔溟渤涵暮景於瓊殿倒晴光於絳闕色入天池遠不遠兩岸垂楊聲喧金屋眠不眠六宮明月迥瀉岧嶢高連碧霄朝宗而鳳沼將近習坎而龍宮不遙潄今古之雄都千門水鏡截東西之大道幾處虹橋豈不以決泄年長泉源地遠青蕪濯翠兮宵雨霽紅杏飄英兮春日晚堪歌聖代浮通其德澤恩波莫問當時流破其秦宮漢苑香徹天涯先來帝家重輪而瑞蘸紅日五色而光搖彩霞時時而翡翠隨波飛穿禁柳往往而鴛鴦逐浪銜出宮花其或赫日流金輿人望歲咸憂地利以將失願假天波而下濟分紫禁以餘潤作黔黎之大惠則禹濬川也不為已而為人農擊壤焉不荷天而荷帝玉堂金殿兮知不知敢進芻蕘於此際天寶詞人李謫仙兮誰能論出白屋而謁明主脫布衣而為侍臣唯誇其麗藻清辭將承寵渥不待乎腰金拖紫便掌絲綸則知人不英無以動乎邦國主不聖無以振乎儒墨二美相契千齡所刻愚聞白之始也宅岷峩鎖羽翼待風雲伸道德金門玉殿兮挂魂夢乾象坤儀兮羅胸臆雲情鶴態歌劍嶺之秋光月夜煙朝釣錦江之春色俄而入洛遊京懷珠袖瓊塵中獨步酒肆陶情烏棲曲兮金石奏蜀道難兮神鬼驚小隱乎林壑大隱乎帝城賀祕監兮薦英秀韓荊州兮誇盛名於是鳳詔搜揚洪名振發長裾似雪兮出圭竇縫掖如霜兮入禁闕冰姿玉貌別巢許之林巒醉眼慵心豁唐虞之日月走騎飛軒街談巷言青雲得路兮肌骨換白日升天兮朝市喧縞素麻衣朝雜庶人之伍龍攄虎變夕蒙天子之恩彩筆摛文彤庭步玉碧山之傲逸猶在紫禁之繁華乍束往往而紅筵對酒宦者傳觴時時而後殿操麻宮娥捧燭夫如是則才德須憑簪纓自勝起布素之卑位陟蓬瀛之上層白鳳辭高青帝之春華不若金鸞寵異皇王之密旨先承豈不以天假良時神資景福草元之客兮進何晚題柱之人兮望何速曷若我不忮不求脫布衣而食天祿白日光沉青山影深伊萬籟以俱寂有孤猿而忽吟隔樹初傳切切而來當暮景隨風更遠聲聲而飛下煙岑當其謺嶂凌空微陽送晷擁條之響俄發命侶之音迥起揚清引濁如含莊舄之愁吐怨流哀不為養由之矢增悵望兮動辛酸建陽小兮凝晚寒踰絶壑兮度鳴湍悲風颯兮零雨殘澗草萋緑溪花隕丹此處則臨岸爰笑攀蘿永嘆幾多之去棹來舟驚迷島嶼無限之離魂別緒飛挂林巒感東西而怨行役三峽山光峭空碧冒懸流而躋絶壁苦露結兮寒煙白望帝寃魂萇宏悵魄此處則抱樹驚曉號風向夕峨嵋高兮劍峯緑愁殺巴人錦江暮兮笻竹秋悲纒楚客山隱隱水渺渺孤猿吟兮何悄悄野駭麋鹿林棲㣥鳥往往於松蘿谷口嘯得煙昏時時向薛荔峯前啼摧月皎斷續相催聲長韻微千林之紅葉雖墮萬嶺之愁雲不飛嘹嘹噭噭休未休如迎靜夜歷歷啾啾起又起似送殘暉足令掩耳傍偟吞聲太息何彼韻之增起欲我聽之暫息則知邊城鴈兮高柳蟬未若聽吟猿而慘惻楚襄王以魂夢初驚高堂賦成因命酒以將飲遂聽歌而適情於時白雪音厲陽春調清命宋玉之雄藻賦貫珠之妙聲玉乃避席而起請陳其志曰臣聞樂以象其聲歌以陳其事樂也者六律不得不正歌也者五音不得不備是宮不亂而為君商不亂而為臣徵不亂以為事角不亂以為民羽不亂以為物五音備以為真如此則天地同和陰陽代順一謳而王道敦化再唱而民心端信逆氣亡象姦聲匿韻三光普照而不昧萬物以類而相振然後君臣序而父子親五音隆而四瀆濬斯為治世之音可同休於堯舜至如宮之亂兮君荒商之亂兮臣亡徵之亂兮事失角之亂兮民傷羽之亂兮物匱五音怪而改常如此則寒暑失時邦家自咎唱豫而毒慘諸夏和汝則災生九有鬼神不享社稷非久乾坤之紀綱潛紊麟鳳之禎祥莫偶然後孛彗皎而夷狄驕兵革飛而戎車走斯為亡國之音可同風於桀紂其為音也不在乎玉管朱絲其為歌也不在乎燕娥趙姬隔巴濮採聲詩樂府陶匏自本黃鍾之律姑蘇麋鹿誰聽白苧之辭王曰斯賦之盛珠輝玉映可以發昏蒙佐明聖為前古之楷式作後來之龜鏡非寡人之所知敢不承天之命上客縱橫毛公不爭既藏器以待用遂陳辭而請行幾載和光利刃之深機但祕一朝效勇囊錐之奧義斯明當其久陟朱門長謙末德昆吾韜切玉之鋒丹穴戢凌雲之翼懷才抱器何趙國之足匡日往月來笑平原之未識俄而羽檄交催秦兵四來邂逅而君臣就辱逡巡而家國傾摧平原乃入楚求救招賢共裁列簪纓而議也簡文武以行哉恨同心而同德求其濫者何貴耳而賤目棄我全才於是奮發雄辭敷求大志今行侶以將闕輒愚夫而敢備當時維縶騰驤之步誰知今日彌縫潁脫之鋒可試然後得繼英豪彌輕爾曹瞻鄢郢以神勵出邯鄲而器高明明特立之試斯期必克蠢蠢同行之輩應為徒勞及其見楚國之君説秦兵之孽自旭旦以將論至日中而未決遂乃足玉砌以心動手霜戈而氣折儻一夫之有惜不肯扶危則五步之非遙立當流血故得楚國君臣來言盡力師旅大加於東趙干戈日卻於西秦名遂功成辱殺三千之客解紛排難慙生十九之人則知士也者不可以貧欺馬也者不可以瘦失何待客以無鑒幾遺賢於此日伊毛生也重於九鼎之功非狗盜雞鳴之匹陳祚以世六十年毒奢淫而忘險難運去而蠻奴北面時來而江總西還傷心而昨是今非三台祿位觸目而人非物在一片江山初其君但期天闕國無盤石詩成而詠雪嘲風酒惑而迷魂蕩魄昌言直諫朝朝而惟列七人列蠟燒蘭夜夜而長留十客一旦雷卷隋軍驚風坐聞龍顏入井以魚伏鳳閣離居而豆分於是嗟覆轍嘆浮雲拋建業之山河來朝魏闕捧金陵之日月送與隋文斯人以鳥戀南巢萍流遠道還吳而喜遂歸骨入境而鞠為茂草心感存沒泪橫襟抱慘淡而煙迷遠渡杏浦波生蕭條而葉散悲風金檀樹老廢壘蕪城行行復行霜凌夜葉壯心碎屬國窮歸華髮生中臺將黃閣皆空荀池鳳去甲第與朱軒不見謝墅狐鳴茂苑濤聲秦淮月色終史溥之前夢嘆東昏之舊國雖信天命宜慙衮職豈不聞三秦甲馬已過乎淝水之陽二謝韜鈐克殄於壽山之北則知翌輔者在乎外撫四夷中扶萬機建其策而安邊卻敵致其君而端冕垂衣安得三閣天高但縱殷辛之酒萬兵雲集未知蘧瑗之非果令位失家亡君移國徙前恩不及於民庶晚歲卻還於舊里金陵旺氣索然空唯見碧闕一字涵淥水小人之見兮見以求利大人之隱兮隱以求志索其居而廾世捐俗達其義而伺時藏器莫不濯足溪影挂冠山翠不遊徑而得康莊不出戶而窮天地上自英君傍惟哲人偕侔鳳而藏羽盡規龍以蟄鱗恭聞舜雷澤而遁迹漢芒碭以潛身板築胥靡熊羆渭濱芝歌商嶺以誰聽瓢挂箕山而曷鄰雷澤之志兮志於聖也芒碭之志兮志於天下得之則宅乎寰海求之必通乎嵓野所以賓四門而總百揆揖遜皇王斬白帝而烹楚君巍巍宋社渭濱之志兮國傅王師胥靡之志兮匡君佐時然後神契畋獵天開夢思三十八代之承祧韜鈐自有五十六年之救旱霖雨常滋商嶺之志兮以全真箕山之志兮於高節逃秦輔漢以無失友帝朋巢而自悅蓋聞析心以智光乎聖哲志也者寂與心通隱也者憑乎志成并於心兮故可以通造化貫幽明成於隱兮或可君兆庶爵公卿志不立兮吾息則隱志苟通兮吾道斯行君不見西乘風上擊雲霓之路蟠泥得水高驤天漢之程奔塵競路以彌惑絶迹深扃而有得惑之者惑於澆濁得之者得於幽默虱捫西華以持衡龍臥南陽而輔國珞珞雲林之士方器嵓廊攸攸市井之徒誰懷道德亦由擇梁棟於闕一字山索珠璣而在淵採緑蕙於樊圃刈嘉禾於甫田其道要其理元嘗聞降蒲輪於草澤天子求賢朱公以紫殿之下明誠洞寫仗心劒而上請神劒非斬馬而不除害馬則知堂堂者多諤諤者寡是何抗萬乘而不失覺千官而盡啞昔張禹以軒冕巍峩為王者師攀龍附鳳於炎漢陰慘陽舒於片詞不畏神怒惟專詭隨中於人兮若鴆若蠱潰於物而如膏如脂合彈者誰是簪筆合諍者何人措辭雲則早奮忠貞誓邪曲有刃當斬對君必辱於時開九門兮左日右月朝百揆兮鏘金佩玉鴛鷺方駢雲龍乍矚於是演折角之宏辨趨逆鱗而上觸乃曰不諫非臣容姦匪君臣聞上有厥劒利無與㣥不爭乎刜鍾切玉不並乎倚天抉雲蓋是吹大宛之毛剸渥窪之骨君幸頒賜臣非僭越既將伸明代之朝命斷佞臣於大闕今太傅以抗傲三公昏蒙九重陷君子於虬龍化犬進小人則蛇虺成龍固請刑於廣肆血被銛鋒帝忽色怒雲乃氣衝死為尸諫生寧面從將軍匡闕以稽首天子逡巡而改容義匪伏蒲志大而諸侯瑣瑣芳流折檻名高而四海喁喁胡不淬辭為鋒礪志為刃拂訛濫以將退麾賢良而與進何必趨劒闕將求竟伊人而莫擯設若寶鍔將授昌言是嘉又何以見仲尼之紀綱誅正卯之姦邪則王莽之偷宗社又安得聞耶義漿殊賤玉唯至珍有楊元之立德果陰隲以酬仁豈非惻隱天資不為恩而自感明誠日皎不望報而自臻所以悲其遠道長征窮途未達感朔風而千里遐阻爍火景而四郊空闊堪嗟其自北自南每想其再飢再渴一瓢漿水能頒歧路之間數仞朱門誰顧風塵之末於是博施無偏壺漿湛然清若元酒甘如醴泉既日日以將日復年年而一年注以何窮問東流於巨海浸而無怠瞻北斗於遼天莫不椒桂飄香雲霞豔色行人欣塞路之美戰士豁鹽梅之惑無冬無夏不酌水以酌心暮往朝來非飲漿而飲德寒暑相移精神罔虧人不報而神代報世未知而天已知俄而垂感應降瑰奇被褐懷來五飲之家獲寶盈疇種罷連城之價驚時寧異瑞頒俄同圭錫凝雪彩於三徑貫虹光於四壁則知矯其施者恩絶竊其珍者禍積嗟來致食寧招蒙袂之人再獻為心謾剖輝山之石且夫濟人渴者尚報非虛薦人善者厥報何如渴之濟兮小恩小惠善之報兮開慘開舒可以慶其邦國高彼門閭克裔於簪纓爵祿豈惟瓊玖璠璵事在何人道歸君子陰其德而德於心陽其報而報於已昭然貽厥於孫謀不並義漿之理惑人之心兮惟巧惟僭破人之國兮以妖以豔當勾踐之密謀進西施而果驗昔者二國相吞陵卑恃尊殊不知卑則自亡而固存尊則為明而反昏烏喙年年誓啄夫差之肉稽山日日拜聽范蠡之言言曰伍員之賢東吳之德伯嚭之佞東吳之賊德之盛兮越可憂賊之興兮吳可殛臣以夙夜而計機謀偶得欲狂敵國之君須中傾城之色待其聲色內伐君臣外惑自然紂妲已以亡宗晉驪姬而亂國今苧蘿之山越水之灣恐是神仙之化忽生桃李之顏波淺丹臉鴉深緑鬟顰翠黛兮慘難效浣輕紗兮妖且間楊柳羞弱芙蓉恥殷可以變柳惠於貞莊之際悅荊王於魂夢之間臣請進焉王今何以王乃豁若而喜矍然而起曰此蓋神假卿之奇畫天雪越之前恥乃命寶馬騰龍香車碾風迎織女於銀漢聘姮娥於月宮炫耀雲外喧闐洞中妝成而瑞玉凝彩服麗而朝霞翦紅昨宵猶賤今晨不同寧期大國之君流恩下及堪恨鄰家之婦謂妾常窮曉別越溪暮歸吳苑越慮計失吳嫌進晚歌一聲兮君魄醉笑百媚兮君心卷坐令佞口因珠翠以興言立遣謀臣棄洪濤而不返勾踐乃走電驅雷星馳箭催投醪而士卒皆醉嘗膽而胸襟洞開虎噬骨碎山崩卵摧楚腰衛鬒化為鬼鳳閣龍樓燒作灰於是命屠蘇之酒上姑蘇之臺伊霸業以俄去我英風而聿來嗚呼殺忠賢而受佳麗欲弗敗其難哉磨霜礪雪兮熒煌錯落伊逐鹿之英聖兮有斬蛇之鋒鍔蓋以麾正乾坤劃分善惡楚國之姦雄徒爾烹若窮鱗常山之首尾胡為斷如朽索斯劍也上應君臨舒陽慘陰有其道則威若身兮靈若心無其道則鉛其刃兮木其鐔惟上德之在火協紅爐之躍金莫不龍活三尺霆飛半尋是何靈貺之異天啓之始而乃振戎衣授秋水匣辭乎豐沛之邑腰入乎崤函之里日月方暝雲雷未起有大蟒以橫路礙潛龍之舉趾於是上較天意下量地紀視銛鋒而何斯違斯擊怪物而宛其死矣然後挫七雄削多壘豈惟仗之翦長蛇而戮封豕蓋將提之令諸侯而禪天子得非秦毒之奢變作長蛇漢德之儉化為神劍奢以儉陷蛇以劍斬道在晦而須顯事有增而必減果聞哭白帝之亡符赤帝之昌雖行大義亦假雄鋩莫不龜文龍藻玉鏤金裝世亂將用時清則藏十二年兮加我淬七十陳兮摧爾剛空山吞象之鱗豈鈋蓮鍔大澤銜珠之血不污星光然後歷興亡繼得喪漢之滅兮魏之受魏之衰兮晉之仗晉火起兮高飛豈混煙煤之狀六國血於秦秦皇還化塵塵驚而為楚為漢路在而今人古人但見愁雲黯慘謺嶂嶙峋時遷而金石非固地改而荊榛旋新愚聞周衰則避債登臺秦暴則焚書建國貴螻蟻於人命法豺狼於帝德兩曜昏翳九圍傾側扶桑幾里我鞭石以期通溟海幾重我驅山而要塞慘慘元穹嗷嗷七雄三農百穀以休務淬鐵磨金而獻功九州病萬室空韓趙魏以交滅楚燕齊而坐窮家有子兮誰得孝國有臣兮孰效忠九野分將焉作兆民之主諸侯吞盡方行天子之風星隕九霄城長萬里血染草木肉肥蛇豕將欲手挂天刃足挑地紀拙虞舜而短唐堯污殷辛而長夏癸禍從殃催川搖嶽摧金陵之王氣頓起蓬島之宮娥不來黔首求主蒼昊降災天漢之龍髯斷沙邱之鮑臭誰猜魑魅諸夏腥羶九垓於是宅彼岡巒兆斯陵闕猶驅六宮以殉葬豈言蔓草之縈骨嫌示儉於當時更窮奢於既歿融銀液雪疏下地之江河帖玉懸珠皎窮泉之日月嶫嶫層層不騫不崩斯高之喉舌方滑劉項之雲雷忽興軹道一朝璽獻漢家之主驪山三月火燒秦帝之陵今則草接平原煙蒙翠嶺想秦史以神竦弔秦陵而恨永華清宮觀鎖雲霓作皇唐之勝景璨字照之公綽族孫顏蕘判史館引為直學士遷左拾遺擢翰林學士尋以諫議大夫同中書門下平章事進中書侍郎判戶部封河東縣男朱全忠加九錫璨進拜司空為册禮使已為全忠所惡除名流崖州斬之前使裴樞充宮使日權奏請元元觀改為太清觀又別奏在京宏道觀為太清宮至今未有制置伏以今年十月九日陛下親事郊禮先謁聖祖廟宏道觀既未修葺元元觀又在北山若車馬出城禮非便穩今欲只留北邙山老君廟一所其元元觀請坼入都城於清化坊內建置太微宮則車駕行事得禮近年浮薄相扇趨競成風乃有臥邀軒冕視王爵如土梗者司空圖李敬義三度除官養望不至咸宜屏黜以勸事君者
