body:
  text: 我皇則銅渾而有倫應木德之惟新展東郊之盛禮出左个而迎春所以先庚有秩舊典攸遵將欽承上帝而敬授於下人者也於是法駕鏗鏘嚴城翕習見太史之先謁知勾芒之已及都人士女候彩仗以駿奔文物聲明擁彩華而鱗集莫不聽玉漏而雷動赴靈壇而嶽立於是闢重門遵九逵服蒼玉載青旗草木之萌必因茲而動矣原野之蟄亦自此而啟之展聖容之穆穆引天步之遲遲有翼有嚴不徐不疾百辟陪乘千官扈蹕遵皇衢而却轉度青門而迥出八鑾振響隨解凍之和風五輅騰輝映麗天之遲日東郊之中肅穆會同俎豆莘莘而駭目衣冠楚楚而鞠躬祥雲為之郁靄佳氣為之蔥蘢青帝克禋必來顧而來享元穹廣覆何自西而自東當是時也四遐縱觀五福來備瞻聖皇之迴輪知太昊之整轡登臺者漸樂擊壤者咸遂莫不荷煦嫗於陰陽感溫仁於天地夫然則跂行可以不夭根著可以漸苞異逆暑之吹豳空聞乎德肅於火殊迎寒於旁磔何足以禮行於郊則知和氣熙熙盛容濟濟必蒼龍之整駕當青鳥之司啟握金鏡而明王道調玉燭而昭國體莫不在迎春之盛禮歲移木德春變銅渾觀上公之獻壽表南面之居尊贊以至誠俾天長而地久陳乎盛禮亦星列而雷奔所以上增景物所以下答湛恩豈徒閱夫濟濟而炫彼元元時也百辟無譁九賓有秩玉帛林會簪裾櫛比聲明叶於載陽天文宜於初吉於是紫殿晝皇輿出仰之如天就之如日獻大君之壽善頌善禱覿元老之儀匪徐匪疾皤皤元老首出朝端仰紫宸而展敬回黃閣而即安振冠劍之翼翼曳環珮之珊珊既進退而有度亦容止而可觀將奉一人之壽而為萬國之歡遠映珠旒旁臨霜仗赫赫在下明明在上奉觴而進持盈有俯僂之容祝壽而旋慶賜被鴻恩之暢應千年而莫厚宅百揆而誰讓祥光郁靄佳氣蔥蘢時剡剡以起履每兢兢而鞠躬拱北辰之尊不異乎台居列宿獻南山之壽更聞其嶽視三公既而天顏迴眷堯酒畢獻乾坤永固上下無怨禮循牆而已退福如茨而咸勸則山呼萬歲徒稱漢日之祥天錫九齡詎比周年之願諒羲軒之道隆實伊容之德建宜乎景祿克受賡歌不朽如岡如陵可大可久亦何待華封之祝然後增堯之壽國家敷文教布時令爰振鐸於九衢將採詩於萬姓上立其典將興詠之必聞下聽其音知從諫而則聖事且彰於歲首禮無虧於春孟所以夏訓是崇周官克敬亦既戒止居然可珍赫赫奕奕爛爛燐燐以金為鈴且嘗巧於懿匠剡木為舌將託音於下人及夫拂拭光生提攜彩發順一人之施令採四海之箴闕鐬鐬於遐邇之路杳若和鑾煌煌於前後之車爛如明月於以闡幽於以冥搜知政教之茲始表申嚴之所由動素手而知音愈出注清耳而其義可求色耀皇衢映遲遲而日麗聲搖紫陌隨獵獵而風遒昭彰有儀掌握成韻因木德之將盛懷金聲而載振或聆之而胥悅或抑之而旅進豈比夫鼓有節而斯通雷發聲而先徇可以展六義可以陳四詩在道途而無壅致朝廷之允驚百衆以泠泠昭其聲也沃九重於翼翼失則革之鐸之為義也深鐸之為用也固虛其中而不屈圓其外而合度可以揚天之聲可以遵王之路令出不返知遒人之是司道之將行幸夫子之可喻故其鎔鑄式珍錯磨永新舊典斯考英聲克振既有符於元化斯永保夫青春國家布和令稽舊章候葭灰之所應取榆火之有常鑽之彌堅初若切磋之響動而愈出俄生煒煜之光火則循利人惟嚮方豈徒宣明於四海固將貽範於百王時也遲遲日昇習習風至太蔟中律勾芒整轡擇木之宜順天之利歷歷初種常散莢而如錢煌煌是求必鑽木而成燧曲直有倫尋尺為珍啟炎上之氣當發生之辰佐暄妍於獻歲助煦嫗於陽春比皇明之燭幽既自邇而及遠叶時令而委照爰舍舊而謀新始青林兮見採終洪鑪兮有待鬱攸之氣方騰枯槁之容不改其執熱也殊金燧之感其攻堅也非水石之鑽佩之或雜於刀礪用之以代其槐檀運手而綠烟乍起屬目而朱燄可觀餘燼收之而有耀死灰然之而孰難束縕是繁抱焦衆夥何鎔鑄而不賴何燔炙而不可紅星忽迸不異乎種天之星朱火既飛詎同夫敲石之火則知調其玉燭取彼白榆誠國之美利亦君之遠圖始韜光而無朕卒既燥而有孚所以微成於著有生於無豈徒嚴凝之鄉樹於北塞晼晚之景失於東隅宜乎大化不爽餘光必共莫不愛一人之火化為百姓之日用乾坤設兮其儀有二寒暑運兮其序有四聖人則天而順氣故改火而鑽燧大矣其功博哉其利智以濟物時以作事萬人由是資生六府以之咸遂爾其始也命工徒案林麓選槐檀之樹榆柳之木斬而取也期克順於陰陽鑽而改之序不於寒燠既類夫求美玉而琢山石又似乎采明珠而剖蚌腹爾其鑽也勢若旋風聲如驟雨星彩晨出螢光夜聚赫戲鬱攸赩熾振怒青烟生而陽氣作丹燄發而炎精吐影旁射而曜威氣上騰而作苦冠五行以斯用審四時而是取司方守赤以備乎南北東西利物濟人用配乎金木水土則知火之為德候而為期火之為用無以尚茲輝赫赫而不滅性烈烈而自馳其猛也物則望而畏矣其炎也人則寒而附之豈不以陽氣所禀厚生所資用於燧人之氏職於火正之司及乎日月其逝春秋相推取舍有常必假於人力新舊迭用無乖於天時惟火之用其則有順其初也鑽一木而挺英其大也燒萬物而為燼豈止夫田單克燕孟明伐晉或焚舟而濟河或爇牛而破陣而巳哉今我國家七德聿修九牧入貢若以之鑠金為鼎可以備物致用若以之鑄金為器可以安人和衆然則鑽燧之始既巳如彼利用之美又亦如是濟乎今古達乎遐邇猗歟火之不可闕也如此蟄以寒閉春以陽和閉者得時而後振和者煦物而無頗萬穴之中或羽毛而櫛比積塊之下或鱗甲而駢羅或蠢蠢以潛發應熙熙之屢過則知出處有時變通為貴煦嫗斯感嚴凝罔畏跂行喙息負日月之融光蠕動蠉飛得天地之仁氣爾其形分土石色動邱墟潛乎野處達彼巖居歷窮陰而茲久當獻歲之厥初思麗景之鳴躍念和氣以吹噓順於時比應雷之雉感於候同上冰之魚况夫勾芒整轡太簇紀月蒸以絪縕斂其觱發或振羽而不倦或動股而不歇細則肸蠁以凌空巨則連蜷而抉窟處否藏周逢時出幽順地之理承天之休將昭蘇而忽變豈枯槁而為儔想像山川依稀原隰氣且布於感動力無違於燥濕秘邃泥蟠依稀土蟄青雲之表期蜿蜿以龍升繡戶之前佇翩翩而燕入則知離於淹滯託彼沈潛苟存身而有待必坯戶而是瞻豈惟月令舊章紀之而無斁時訓前典徵之而不厭客有窮屈伸之理得行藏之體固無恨於陸沈將必俟於天啟國家順仲春之律開藏冰之室將以均寒暑分老疾北風始壯且納而必周西陸有期因用而斯出是時木德司辰條風報春物惟求舊令乃謀新有頒冰之職有伐冰之臣安得深藏於重壤自當登御於一人有司奉明詔薦清廟啟其室觀其徼連鍤既下不作冲冲之聲厚土忽開已發峩峩之照獻羔之禮既宣祭韭之義克全將使陰不伏陽不愆詎有東風之解莫移北陸之堅皎潔兮玉壺乍奪清瑩兮金鏡爭鮮鑒乎其中雖臨深而履薄積於其外終岳峙而峯連此輿人之所納縣人之所傳乃祓以桃弧升於蘭殿凌陰去而寒盡御座來而春變其為利也溥其為用也徧㣥寮是錫足以表鴻恩百祀方修足以成嘉薦向若藏之不以宜啟之不以時自然光而不耀貞以自持同土石而棄矣何賓祭而用之德既自此宣政亦自此審禦霜雹以清沴調風雨而成稔開五色之瑞福應方來叶七月之章頌聲曷寢豈惟求履霜之堅思積水之凜冰之開也在於人冰之用也進於君昔享司寒雖蒙於幽閉今將清暑終見於區分儻不遺於茲日期不掩於前聞元英變律青陽報春伊曲沼之方燠始泮冰於斯辰北陸初凝昔峩峩而色閉東風忽解驚片片之光新所以將延軒騎稍媚咸秦散亂瓊岸離披玉津開碧潭之漾漾如白石之磷磷豈必積窮谷而與競塞長河而見倫則知煦嫗有待冱寒無必將辭烈烈之風漸映遲遲之日或竹破而瓦裂或鏡華而玉質帶宿草而猶霑添新泉而更溢小大惟錯方圓不一臨深之戒稍窺履薄之危漸失蠶之績也必見其淪胥鯉或感焉匪勞於剖出璀錯騰外淋漓積中隨波響激遵渚光融下魚竿而不隔泛仙舟而巳通渙渙初流自同夫溱水冲冲罔鑿奚取於豳風是知冰在池而合散池與冰而虛滿腹堅難俟於星迴磔裂必因乎風暖皎潔不私清明在茲殊玉壺而覯止異凌臺而藏之鼠無得而潛伏狐由是而决疑和而不同始堅然而固節積而能散終渙爾以隨時客有覽名都之秀盼迴塘之溜知迷津而可通在解凍之斯候我皇審緹幕候元英法天之序立人之程律變於冬必順時而冬命水盛於北亦隨方而北迎所以修舊典闡鴻名受太史之先謁率㣥辟而躬營况肅殺以北陸將昭宣乎上京於時時和歲豐勞農息力結冰於坎改火於國天欣玉燭之太和人受銅渾之罔忒由是文物成聲明飾皇皇濟濟鏘鏘翼翼向仙蹕之駐方引斾於司南望曉星之殘尚建杓於禮北及夫禁城啟寒漏極分天仗而雲布遵皇衢而繩直嚴飇絕元輅之響愛日動鐵驪之色一人由之而展容萬姓於焉而仰德既而臻靈壇薦嘉餚奠之以玉縮之以茅雖布政於元堂以居乎左个而司晨者黑帝必祭於北郊蓋示敬於端冕非取樂於懸匏及夫整宸儀迴天步考時訓而咸若稽月令而畢賦導嚴凝之氣無奪其倫應廣莫之風不愆於度則知北郊之為禮所以佐天而成功亦以感神而叶中故宜百神肸蠁萬㝢朝宗豈止運行而成歲閉蟄而為冬律呂以迭而相成陰陽以獨而不生總二氣而取則俾萬物而立程可以揣亭毒之理可以順天地之情其繫時也必誠必信其吹萬也無臭無聲原夫制自伶倫迹於嶰谷始叶音於靈鳳終制器於截竹其名可紀則一暑而一寒其數可陳則陰六而陽六所以均我節物而周乎倚伏借如黃鍾建子以為本林鍾建未以為君動夷則而葉墜應姑洗而草薰霜雪因之以罔忒禽獸候之而必聞雖覆載之莫窮而飛灰可揣謂陰陽之不測而寸管斯分故王者歷象為務職司是勗奉之以布令法之以成俗肅殺初佐於金風絪縕竟調於玉燭動植無擾含靈斯足莫不因律呂之相生濟仁壽之大欲既而同其法度節其疾徐既環周之無極亦鱗次而用諸故能欽月令之不爽布歲和之有餘八風既從兮惠化爰被十旬不散兮休徵可書伊上瑞之臨汝實疇人之起予則律不作無以叶五音之術呂不助無以成萬物之實洞於精微生於陰隲在孕育以咸暢處金石而無失則吹於寒谷不惟鄒子之方叶於樂府奚獨延年之律我皇欽若時令克諧宮羽來遠人而風雲表祥張大樂而鳥獸率舞是知順相生之義而德冠乎三五昔者聖人稽天地之本達造化之方將以律而召呂明自陰而應陽清濁所資叶贊之功共有煦吹無滯輔成之理更相所謂以氣而導聲以聲而宣氣用諧和而感通上下假訢合而生成品彙窮神於短長之象動必相須會數於九六之爻用而不既當其二儀方闢萬化攸初以嶰谷厚均之美審葭灰聚散之餘氣類潛通若琴瑟之心相感雄雌既辨比鳳凰之德皆如亦由顧影而形分命宮而商應合君臣際會之理得夫婦剛柔之稱精誠所致雲龍之感召必同終始相明日月之循環可證若八風順序六氣和平等四時之代運符五位之相生定寒暑之功必能成歲審疾徐之度亦足和聲故得天理不姦物情和愜草木以之而暢遂乾坤於焉而交接兵家之否臧未兆懸以先知樂府之聲音所諧動能允叶今也初陽應候萬物思時念惠風之將入顧寒谷而奚疑必使法軒轅之明方今可也如或繼伶倫之妙何代無之於是放志希夷凝心惚恍酌動靜之理於開闔達感應之情於影響今所以賦律呂之事莫不欲使百王而共仰葭灰陽物銅管陰類陽物以健動為宜陰類以虛受為器一則本乎天一則通乎地因時出矣本乎天者親上乘氣洩焉通乎地者啟閟感兩儀以成道應六管而為事明夫律通則氣來灰動則時至知晝夜之迭代表子午之更位辨方辨卦乃立節而為八定至定分故均氣以為四於是聖人設矣君子用之於以則地氣於以奉天時仲夏將臨則蕤賓設候孟秋既届乃夷則應期大呂具實而冬窮於丑太簇己散而春蠢於寅可謂自微形著有條不紊明天道之大備則帝道之廣運且夫範金以為律當其空有律之明燔葭以為灰當其動用灰之輕律之空其或吐或納灰之輕則有虛有盈由是識坤德之順靜探乾德之遊行其入也柔順其出也剛勝或處陽而陰生或在陰而陽孕見律中而灰動知地感而天應如此神可以窮數可以究事可得而待時可得而候是以聖人執茲一柄形被九有時寒暑之往來辨昏明之妍不夫物之妙用則感於無為物或不爽則應用無差彼葭灰之造微與天地而宜契我皇敬授不忒故能燮理無虧天何言哉有闕則補持五石而是用彼四時而能取成乎圓象故資可轉之功定彼乾儀蓋俟至堅之主所以裨覆燾仰周普磨礱入鍛成功豈濫於宋人緝綴為勞至德何慚於山甫乾道甚明配彼清貞類鼓鑄而可致冀穹元而是營石不能言默助無為之化天將假手潛因妙用而成則知媧氏之為功也體物情立取法志生眄悠遠而求則象規圓而作程小大寧遺俾隨形以溥博嵳峩不墜皆投質於輕清若乃元造呈材神功效技他山以綴象帝自邇卿雲初觸當碧落以麗乎銀漢同流激清霄而即彼天象又元石質既堅究勤勞而日月逝矣成廣大而星辰繫焉暖積素之烟尚疑苔點降如絲之雨終若溜穿觀夫圓則九重功惟百鍊眷無親而克敬當有道而可見言柔與剛崇高是將運有徒於晝夜比為炭於陰陽織女停梭受支機於河漢荊人抱璞嗟韞玉於穹蒼補之伊何以當其闕照悠悠於峻極驅鑿鑿於超忽想夫取鍛之日排剛之時齟齬不安或表艱難之步清明於外猶生錯落之姿正圓虛之廣矣下長風而淒其是知補上天於鍊石蓋虛實之相資焉鄒子處寒谷之陲審至音之宜能噓吸而律應使嚴凝而氣移騐乎卜居殊緹幕之攸設稽乎假器匪葭灰之所吹當其地映嶔崟山連鬱律夏皚皚而多凍晝蒼蒼而少日草木絕其滋榮飛走悲其慘慄雖彈絃於帝舜孰致其和雖扣角於師文必慙其術由是鼓其用濟於衆將鈎深以致遠在識密而鑒洞響發於寒威氣感於春暉何續斷而臻極乃洪纖而入微飂飂其和土囊之風乍出淒淒積變夾鐘之律方歸逸韻未殫發越林巒始驚蟄於煦嫗俄解凍於凄寒誰謂暖風蚤來節奏於絳脣之末誰謂溫風潛扇抑揚於玉指之端於以闡溫燠於以發亭育鄙元鶴之舞庭類雕虎之嘯谷清泠散徙岡聯嶺屬疇人慙其術窮田父欣其野沃則千旬不散之瑞其事未榮南薰不競之占其理未精孰若探至賾究幽情化烈烈之瘠土成薿薿之嘉生豈比夫廟列零陵徒聞白琯之麗竹收嶰谷空為丹穴之鳴別有翻飛之侶暄妍是處固將嚶嚶以出谷豈獨離離而生黍國家順天之情作人之程乃懸乎土炭有象夫權衡惟土也叶陰氣之動惟炭也應陽氣而生故將法之而令出瞻之而教成乃左乃右一重一輕苟二物之不爽知四序之攸平有司修厥官承厥緒繩木有準鈞銖獲所香炭於是而善繫累土由之而畢舉分乎多少則無黨無偏候以高卑知一寒一暑若乃芳歲闌嚴更殘黃鐘中律黑帝司官昴中見而昭晰日北至而冱寒於是岌岌斜指亭亭上干土則從輕知衆陰之將謝炭惟持重知一陽之己攢暨夫春令變木夏德司火鹿解角而氣新君登臺而物夥二氣交而猶昧六律推而末可然後懸法示人表微在我觀夫炭則高而漸危窺夫土則垂之如墮彼銅渾兮自慚空鎔鑄以相參彼金壺兮可厭從晝夜而為騐孰若土炭之有常為邦國之舊章恆不飾而不美無玉振與金相影每分於高下色且對乎元黃不假飛灰自符於律呂何必測影而知夫短長向若鴻鑪長爇厚地斯藏安足以調夫四氣而傳之百王於赫大君穆然端拱懸之而無冬無夏法之而是遵是奉信不謬於陰陽詎可欺其輕重國家謹時以授人敬卜以事神每殺牲以獻歲用釁龜於孟春法於天不失建寅之正位塗以血而皆祀骨之至珍是尊是奉必躬必親周官之規不爽呂氏之令維新時也斗柄潛移葭灰稍暢簭氏之占有待龜人之職無曠由是發巾笥之下於廟堂之上乾乾兮捧九江之殊形翼翼兮出十朋之異狀然後刲牲來思流血注茲映乎顏則渥丹初啟運乎手則研朱乍施所以布幽泉之物於枯槁之姿必勾芒之用事俾僂句之不欺負圖之處既占獻兆之求必果迫而察也異太史之定墨遠而望焉謂卜師之揚火物以好生為德我則鑽而堅物以受汚為累我方告其虔不潛寧同於居蔡見珍皆得於巢蓮閱山澤之形紛其維錯染青黑之緣赫以相鮮木德式臨官占有俟幽贊先知之道啟迪從長之美豈比夫楚軍鼉鼓虐執蹶由齊國鯨鐘仁稱孟子且車甲之釁也所以交於神明孰若考元吉謀永貞候青陽之辰是儀是準設朱殷之色必信必誠用能稽大疑決碩畫罔櫝中而致毀咸蓍下以慎擇既釁之而有徵願保之而無斁沔彼積水凜乎高秋秋應律兮則勁水為潭兮至幽當草木之不芳獨開翠色因天地之始肅更變寒流匪騷人之詠歎實知者之娛遊邇其畜奫淪之色得蕭瑟之氣就其淺則亹亹共清臨其深則兢兢是畏居下流之可保信上賞之為貴寂爾不動湛然恆平正衣冠而必審燭毫髮而必呈性則納汙能積小以成大時方收潦故沿濁而更清鷗浪不振鷺濤不驚同至人之虛受比君子之持盈懿其歇昏霾羅物象峯巒之所攢列雲烟之所來往媚潛虯之幽姿疏遊人之煩想不汪汪於千頃自泠泠於百丈寫星火兮初流涵珪月兮始上湛清華於古木於以交輝澄鮮彩於層空於焉競爽虛明莫映皎鏡無私處不爭而成德體自然以為資金風乍搖似易水蕭蕭之日木葉方落如洞庭嫋嫋之時映泬寥之遠天動悠揚之短晷與碧落而相合將清光兮乍起淨如練兮可名清濯纓兮增美儻朝於海知引徃而納來如挈其瓶可注茲而挹彼安彼皎潔利物含宏溢金隄之皛皛窺銀礫而澄澄飛螢乍臨疑列宿之在漠纖鱗或躍若迎春而上冰豈清淮之可翫何靈溪之是矜則知沸潭無涌聞之於栗烈寒潭見底稱之於洞澈孰若積元流當素節金鏡同朗冰壺共潔既妍媸而照臨幸清通之區別鬱彼宿霧蔽乎遠天霧晻靄以氣徹天清泠而色鮮仰之彌高五里始分其杳爾積而能散三光忽映其粲然昔人引之以喻見賢奇姿允叶美質相宣豈徒卷冥冥之淨綠覿昭昭於上元始則雜氛昏掩高朗霏微有色散漫無象文豹去之而退藏螣蛇游之而來徃將欲縱遙睇滌煩想則蒼蒼大圓之色願豁其清明英英上德之容亦如其瞻仰及夫收地表歇天衢啟晨光之有耀闢麗景而多娛於是碧落如邇青冥若無既仰之而不及將覯止而豈殊且欲蓋而彰人與天而合契不言而信天與貌而相符則知賢為眾夥人不知兮蔽之孰可天實悠久霧不披兮覩之則不故將通顯於幽情配美於高明空蒙既同於席卷寥廓乃喻於冰清惟人也玉立斯映惟天也管窺莫競既遐邇之無氛自心神而可瑩狀烟消於冪冪始露澄潭凝塵洗之濛濛自開朗鏡所以彰風采之異見光儀之盛異哉一言之美萬祀攸欽陋決雲而觀劍小披沙而見金有美人兮青陽是仰藻鏡斯臨自然比天於霄漠卷霧於沈陰亦何必觀樂廣之容始欽重器信衞瓘之說方獲明心者哉山惟隱天海則孕日日將升而轉麗山望遠而無失青崖直上覺亭亭而漸高碧浪遙分覩杲杲之初出將以測晷度窮節汨豈能獨媚東南之隅空呈畏愛之質而已哉當其陰兔傾晨雞鳴捫葛藟陟崢嶸挺身於重巘肆目於八紘天地廓烟雲清赫彼巨浸吐茲炎精映曈曨而有竟燭浩淼而方呈彩射空中謂陰火乍出色浮波上疑萍實初生皦爾下土煥乎上征觸高濤而暫滅泛輕浪而還明曙色漸分晨光未改濛氾拂浪扶桑浴彩將黃道以麗天必青方而浮海豈韜映之為美實照臨而有待是知望自遠乎日域登莫峻乎天壇彼以離而取象此以艮而居安考之則陰陽有度察之則溟漲無端况乎銀漠落金波殘將東方而自出俾下土而式觀三足翺翔若刷乎渤澥重輪輝煥如歷乎波瀾映嵎夷而未定拂若木而將干紅彩下沈照波中之鱗甲朱光上溢射雲表之峯巒誠變化之相詭諒始終之莫殫洎夫出溟渤照戎夏昇九天辭午夜羲和整轡而直上葵藿傾心而皆借亦何必登日觀之峯而後望神明之舍巍巍乎我皇之宅也寰海無氛書契同文宣於小學成彼大勳六藝殊途考為篆之古史萬邦同德知結繩之聖君於時四方有謐九區如一二教翼宣儒風洋溢或簡牒而異制或草隸而殊質莫不採摭其文錯綜其術由是日月所燭舟車所通布八體而咸若合六書而大同垂露成規既由近而及遠崩雲殊象亦自西而徂東流離翰墨之場輝映詩書之閫或蟲形而惟錯或鳥跡以相混三墳八索何患乎闕疑二首六身或因而知遠况其名臣染翰行子寓書昌言非同而不達遙思非同而不攄敷奏或乖自無驚於問馬遐邇不壅固有樂於烹魚為學則孚執藝無詐文加點而何有書盡言而是藉或筆或削决百事之紛拏如絲如綸宣一人之教化則知同文之義大道惟昌合我人則覃於鬼方匪求規於率土將作範於後王巧者莫能革其故暴者無能易其常則帝羲龍圖寧務其八卦史籀蟲篆徒列於三蒼故宜飛聲後代布德無外銘鐘鼎而勒休施竹帛而圖大逸少之能攸著伯英之妙咸賴信乎觀彼人文而樂我平泰王者居上國來遠人闢四門而不壅俾八方而是遵朝聘會同自達於遐邇華夷蠻貊不間於君臣所以表王道之蕩蕩彰皇化之淳淳我皇闢四門也廣天視廓天意總寰海而有截端冕旒而無事猶懼遺淹滯拔秀異或元纁而旁採或弓旌而遠致觀乎天步有四達之清夷仰彼帝閽無九重之奧秘所以遠方知歸㣥才不匱彼前代之有四門也或化未洽志未恢水陸之珍是湊邱園之士莫來雖大道甚夷不異乎遐阻雖高門有閌而同夫不開今我后則不然下土順而風趨王化行而草偃闉闍所湊表聖心之禮賢巖藪皆空知帝德之柔遠士嚮方而集才應時而多鴻鸞接翼而畢萃驥騄齊足而咸過莫不趨斯門之呀豁知我化之休和休和之始聖皇之祉致穆穆於四門獲濟濟之多士關鍵不用無老氏善閉之功車書大同叶王者無外之美至矣哉舜德巍巍復存乎聖理人惟有罪罪實在予將恤刑於荷校遂責己而駐車顧法令之未平滋彰甚矣儼冕旒而興念涕泣漣如始也備羽衞而行因巡狩而出遇茲拘繫將伏斧鑕王乃止翠華駐清蹕恐法吏之苛暴嗟刑網之峻密稽鳳輦而惻隱再三愍褫帶而幽囚非一於是降玉輅下朱輪議獄緩死拖黻垂紳出轅箱而欷歔交睫顧桎梏而汍瀾滿巾雖囹圄之中自罹有國之典恐羅網之內時陷無辜之人於戲法議難逃過亦有在致狴牢未空之事乃教化不明之罪初猶掩抑見天顏之慘悽漸覺滂沱濕衮衣之文采承顏熠熠滿眼浪浪情將同於肆眚義有軼於納隍是以顧盼悲泣徘徊感傷布聖旨於方輿之間必先一物推睿情於圜扉之下以及四方故得法制備修獄訟無怨由衷而感於黎庶自已而勗於億萬涕洟猶在宥物之義已彰縲紲未收率土之人知勸行道而道斯遠矣愛人而人亦懷之何天網之自入使皇情以興悲蓋假其人為邦家之本因其事為慈惠之資不然何一降車而開二十世之業一灑淚而成四百年之基然後刑法永清威懷遠播是知夏后之得天下也能恤人而引過惟山有木惟木從繩繩舒卷而克正木堅貞而有憑杞梓未分規矩假之以冥立斧斤斯運曲直欺之而不能古人以政有得失俗有廢興因納諫之善喻為箴闕之明徵當其懿匠員來瑰材旅進既陳之以糾纆將加之以霜刃掌握初縈綢繆忽振尋尺曳而愈出分銖算而底慎則椓之橐橐既砥平而履端伐之丁丁亦木開而委順則明正不得不受曲直不得不容如獻替於百度宜啟沃於九重繩墨之間既無違於目巧君臣之際固宜警其面從然則上達四聰下延五諫比斯木之猶惑待斯繩而作限廣狹有準短長無間自然巨川舟檝何虞沈潛之憂大廈棟梁不貽壓覆之患有條不紊兮其功有餘舉直錯枉兮可以行諸既爰究而爰度亦匪疾而匪徐向若置而不用藏而不舒我有梓材坎坎之聲奚自我有剞劂恢恢之刃焉如褭褭緒抽綿綿繈屬比朱絲之在琴瑟若飛沈之界山谷裁成廊廟之器剖判陰陽之木自同弦直不為絲棼匪專美於成風之匠亦垂訓於背誕之君雖鱗皴異質臃腫多紋散作輪轅小大之宜不忒鑿為戶牖毫之度斯分所以喻謇諤於後學昭輔弼於前文方今補衮惟勤和羹克正契君臣以魚水以繩墨為龜鏡則考殷宗披說命未若賡歌於元聖我皇制百蠻以德澤刑八狄以威靈俾曠代之絕域同一日而來庭則不叛不侵知遐邇之無外自南自北昭聲教之永寧惟蠻也荒陬有倔強之號惟狄也絕漠有桀黠之暴辭炎徼應感而偕來謝穹廬不期而兩造上乃御正殿臨中區文物有耀聲明以殊小周王之賓肅慎卑漢后之享單于於是卉服雲集旃裘風趨駿奔而遠無不屆鹿君至而實繁有徒垂衣而朝三表自慚於制虜止戈為武五月孰矜其渡瀘百辟式瞻九儀以配寧有截而斯暢儼無譁以相對獻琛盡禮雜彩服以和光蹶角展容望珠旒而欣戴若非越荒徼踰紫塞則南同魚鼈安得仰龍章於舜年北喻豺狼未可親獸舞於堯代是知歷寒鄉之觱發欽百度兮無闕忘沓障之嶄巖彰九區兮克咸聖上惟北辰之位是纘匪南面之尊是滿窮髮斯服雕題無算仰天威以懷柔化夷德為悃款盛禮必具幽遐既慕同寅協恭兮斯親在遠如邇兮斯赴始差肩於著定之位終收跡於敻絕之路史臣書曰美異俗而同臻象斯華而合走耳乚則昔有梯山驟至航海徑渡無蠻狄入覲之遇先王懼五諫之或替恐四聰之有蔽爰立鼓於朝得為邦之制臣之擊也將宣補衮之誠君之聽焉是叶從繩之契所以臨下國所以承上帝豈鼕鼕於金奏之間坎坎於宮懸之際亦既戒止居然可分契無私之路彰不諱之君猛簴趪趪以特立直言謇謇而必聞聽其音知有譎而有諷察其狀亦非鼗而非鼖借如明明哲后輔以賢佐懼德化之失慮刑政之墮必佇斯音用補其過乃有誾誾之闕諤諤如林或匪躬自致或造膝來箴叫帝閽而九重猶遠獻工藝而一人且深於是伐茲鼉鼓殷爾雷聲氣作援枹雖假下臣之手聲聞黈纊終沃大君之心豈表識於作礪將思度於如金誰謂再而衰響不可遏誰謂三而竭志由是達防口之政多慚逆耳之言載渴列彼天居大音所儲志惟勵乃仁則依於得夫賢掩善旌之所進箴於闕殊謗木之所書自得與一言而戾止何必諧八音而樂胥方今堯舜在上伊臯為政皇建極睿作聖而百官尚箴七臣猶諍用設之為舊典亦表之為新令念茲在茲是訓是彞藥石必納芻蕘不遺鼓也高懸寧不考而不擊君惟無過願歌之而舞之霜之履兮白商應冰之堅兮元律分其履也結之寒露其堅也矗若長雲當萬物始挫之時降於青女及六尺凝寒之日可薦明君信履微而知著宜布象於前聞乃若歲如何其夜亦秋止稜稜稍結兢兢未履漸皚皚於葛屨之下將皎皎於玉壺之裏雖嚴凝作氣必納於輿人而愴淒動容先感於君子此謂履霜之始暨夫變化無朕堅剛有期律移緹幕之候辰當黑帝之司由是璀璨無積清明自持則豐山古鐘不舂容而鳴矣鄴臺舊井可皎潔而藏之此所謂堅冰之時也霜之飛兮至微冰之潔兮自保所以通變其德所以馴致其道畜峨峨之色且寒於長河改雨執雨執之光寧留於勁草凝冷兮漸滋積素兮斯瞰始落金波之上有助其明終藏陰室之中不欺於闇冰因乎厚地霜本乎高天何質變而增勵何節窮而更妍亦由洪因纖起高以下先投一跡而千里路極覆一簣而九仞功宣則求已者知霜冰之言理有漸周身者知霜冰之防於未然固宜研精屑屑覃思乾乾豈翫蒹葭蒼蒼之色鑿山谷冲冲之堅哉士有錯綜文房琢磨儒術以修辭為履霜也不同於豺祭之辰以干祿為堅冰也不同於狐聽之日願察言而觀行儻循名而責實况乃良牧煌煌近天子光引凝陰之義為勸學之方則因卑致崇匪一朝一夕為大於細在日就月將然後知作者之微旨嘉言孔彰禽之生兮擇其翔集弋為藝兮修其決拾飛則騁伎或雕俎是求宿必表仁亦良弓用戢無欺其處闇必濟其不及豈憚殺而為心將好生而是急當其白日既曛皎月纔分斂翮爭萃來巢有㣥同在籠之無見雖驚弦而不聞豈不知翦其羽飾旌旗之靡靡裂其肉成炮炙之紛紛蓋以忘機為心方同海上之子俯窺見害奚恃太平之君四鏃既藏六鈞遂弨物則咸若德用不擾三驅之禮未宏五豝之仁為小蒲且希伎自貫於青雲硩蔟設官爰射乎妖鳥豈以窺城上之烏棲殞月中之鵲繞至道在茲懷仁有歸恩同於解網戒比於合圍且以順行而蒐寧恨於風毛雨血當夕而殞奚思於不鳴不飛諒身翦而知懼實羽族之有依我思古人聿求夫子蓄矍相之藝不發於非時當山梁之求必資乎順理從禽之禮斯得夜獵之夫多恥物既全諸真藝亦藏諸身則知率是道也在博施於仁玉者貴而絕倫褐者賤而無文何秘質之用晦空寘懷而不分蓋以潛錯落蓄氛氳善價斯待韞光莫聞詎見識於和氏而包羞乎楚君當其組織初成彌縫巳備馬褐同色牛衣齊類徒觀代藍縷配顦顇為卒歲之資有禦寒之利殊不知雪影斯積冰光所萃溫潤潛㯋特達藏器自同韞匵之深莫發連城之貴青蠅欲點礙羽翼而却還白虹始騰隔領袖而猶秘是知玉人獲也用之而彰褐父得也舍之則藏外不婁而不曳中如璧而如璋隨於人誰謂莫脛映於禮乍若凝肪自有同夫韞石亦何虞於越鄉我亦思古人展矣君子既效此而比德亦念茲而行已固將匿彩於圭瓚合音於宮徵懼秦趙之奪我則掩荊山之輝恥虞虢之爭我則藏垂棘之美宜乎琢磨是賴清貞勿改映胸襟而發光雜山水而騰彩成器而服之無斁開衽而沽諸有待信可以價奪衆珍名高四海然後被其惡衣懷以待時有老氏之誡無司城之辭苟釋褐之茲始當獻玉而無疑昔燕王思良馬以扶輈搜揚未獲寤寐而求以為激貪可以動物明誠可以感幽乃市乎死駿之骨比飛黃與驊騮則有權奇之類倜儻之儔既淪精於一代埋朽骨於千秋甘委土以從棄忽兼金而見留爾其愜意如生沈吟未歇朔風至若聞其激揚纖塵飛想見其滅沒用巳息於躡影狀猶存乎挾月匪充貨賄殊巨象之焚身不薦宗祧異立龜之祀骨嗟夫君之愛彼彼竟奚為雖云力則無展儻亦魂而有知恩實殊常誠所謂汗血而匪恨生如可再思所願肉骨以效奇既而視同龜玉之珍藏諸韞櫝之奧衆既美其惟一孰不從其所好於是不遠而致賁然來思競選奇而徃矣爭簡異而歸之迭進騕褭爭呈秀騏包在坰於魯頌掩食場於周詩豈非結之以志感之以類寸誠式孚片骨罔棄不降階而出身果鱗集而麋至詎比夫虞公愎諫竟貪屈產之良漢武勞師遠取大宛之驥乃知市骨以來駿馬則其至成㣥築臺而尊郭隗則其從如雲骨何施焉姑明好駿之意隗未足也且表樂賢之君至矣哉可垂規於典墳國家皇極立洪勳集安輪之聘尚無斁側席之求如不及儻駿骨之巳收欲騰驤而見縶文含逸韻金有英聲苟操觚而盡妙同擲地而若驚五色相宣諒卷懷而得其王褱麗三品作貢叶攘腕而發其鏗錚信一言之炫燿為百代之光榮當其孫氏能文天台作賦眇眇神邁悠悠精騖發翠屏之藻思掞赤城之麗句既窮嵩嶽之標復得華池之走耳乚清韻秀出芳名獨步飄飄凌雲之氣捧而必觀鈴鈴振策之聲擲之可喻亦既成止居然衆欽乃顧良友大誇詞林以為其文蔚其旨深傳乎人間巳見斐然之麗擲諸地表必聞鏗爾之音郁郁眩目鏘鏘動心豈比夫荊山抱玉披沙之金則知雜王褱寶於衆夥惟金聲兮則可炫黼黻於英髦競文律以相高苟取譬於擊地必先託於含毫匪誇詡以自侈實麗則而不噍觀王褱瑋之變態想熒煌之獻狀聆之於耳疑委地而鏗鏘度之以心在體物而瀏亮金之為寶也可以受礪文之喻金也在乎屬辭披彼丹心始叩音於寂寞臨乎素手同擲光而陸離其價莫並其言可推經喻滿籯是則然矣字比懸市無以尚之別有書圃斯追文房是徇慕綺靡之一擲思金聲之載振所以興詠於上才而思齊於後進闕一百十字至若苦心無虧勵志罔移千里而笈是負三年而園不窺孫敬之戶長閉仲舒之幃晝垂冬映雪而無倦夜聚螢而罔疲爾乃傾心葵藿屬目桑榆郊影不留於北陸林光或改於東隅則尺璧可輕自可抵於烏鵲寸晷所重恨難繫於白駒固在夫學如不及寧務夫執而不趨是知務彼乾乾瞻其杲杲將以求雲霄之路亦以得青紫之道自然被褐懷玉滿堂獲寶向若貴溫潤之姿賤荏苒之時光收皎皎景失遲遲則如琢如磨未能保其瑜瑾一寒一暑空見迫於崦嵫則知潤身之德將貽後學尚鄙滿籯之金爰取沈河之璞况乎日就月將今是昨非六藝遠學所以知微則捐谷之中自可棄其虹彩測圭之下實有愛於烏輝別有功名未錄行古之躅時難再得嗟晼晚於扶桑寶在不貪賤璘玢之如玉此大禹之所以成績得不述之而自勗
