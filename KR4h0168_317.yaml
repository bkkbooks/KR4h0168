front:
  text: 全唐文欽定全唐文卷三百十七李華四
  hash: sha256:24884bc750ad7a8e79bac78277e2a4add8ad1f7bd56037658b17fc123af276a6
body:
  text: 天地之道易簡易則易知簡則易從先王質文相變以濟天下易知易從莫尚乎質質弊則佐之以文文弊則復之以質不待其極而變之故上無暴下無從亂記曰國奢則示之以儉國儉則示之以禮禮謂易知易從之禮非酬酢裼襲之煩也儉謂易知易從之儉非茅茨土簋之陋也蓋達其誠信安其君親而已質則儉儉則固固則愚其行也豐肥天下愚極則無恩文則奢奢則不遜不遜則詐其行也痼瘠天下詐極則賊亂故曰不待其極而變之固而文之無害於訓人不遜而質之艱難於成俗若不化而過則愚之病淺於詐之病也無恩之病緩於賊亂之極也故曰莫尚乎奢也奢而後化之求固而不獲也利害遲速不其昭昭歟前王之禮世滋百家之言世益欲人專一而不為詐難乎哉吉凶之儀刑賞之級繁矣使生人無適從巧者弄而飾之拙者眩而失守誠僞無由明天下浸為陂池蕩為洪流雖神禹復生誰能救之夫君人者修德以治天下不在智不在功必也質而有制制而不煩而已太康啓子禹孫當斯時有堯舜遺人親受禹之賜國為羿奪內則夏之六卿外則夏之四嶽而羿浞愚弄鬬爭內外默然一以聽命至少康艱難而後復由是觀之則聖有謨訓何補哉漢高除秦項煩苛至孝文元默仁儉斷獄幾措及武帝修三代之法而天下荒耗則文不如質明矣漢氏雖歷産祿吳楚之亂而宗室異姓同力合心一舉而安且漢德結於人心不如夏家諸呂吳楚之強倍於羿浞安漢至易而復夏至難何也周德最深周公大聖親則管蔡為亂遠則徐奄並興四夷多難復子明辟兼虞夏商之典禮後王之法備矣太平之階厚矣至成王季年而後理唯康王垂拱囹圄虛空逮昭王南征不返因是陵夷則郁郁之盛何為哉周法六官備職六宮備數四時盛祭車服盛飾至於下國方五十里卿大夫士之多軍師之衆大聘小聘朝覲會同地狹人寡不堪覲謁大何得不亂小何得不亡記云周之人強仁窮賞罰故曰殷周之道不勝其弊考前後而論之夏衰失於質而無制周弱失於制而過煩故也愚以為將求致理始於學習經史左氏國語爾雅荀孟等家輔佐五經者也及藥石之方行於天下考試仕進者宜用之其餘百家之說讖緯之書存而不用至於喪制之縟祭禮之繁不可備舉者以省之考求簡易中於人心者以行之是可以淳風俗而不泥於坦明之路矣學者局於恆教因循而不敢差失毫古人之說豈或盡善數骨肉之罪而裦叔向不忍聞之言而書昭伯敬龜策之信而陳僂句使不仁之人萌芽賊心而仁義之士閉目掩卷何如哉其或曲書常言無裨世教不習可也則煩潰日亡而易簡日用矣海內之廣兆民之多無聊於煩彌世曠久今以簡質易煩文而便之則晨命而夕周踰年而化成蹈五常享五福理必然也孔子言以約失之者鮮矣與其不遜也寧固傳曰以欲從人則可記曰大樂必易大禮必簡顏子曰無施勞經義可據也如是為政者得無以為惑乎或曰吾讀古人之書而求古人之賢未獲嗟夫遐叔謂曰無世無賢人其或世教不至淪於風波雖賢不能自辨況察者未之究乎鄭衛方奏正聲間發極和無味至文無彩聽者不達反以為怪譎之音太師樂工亦皆失容而止曼都之姿雜於憔悴被縕絮蒙蕭艾美醜夷倫以為陋此二者既病不自明又求者亦昏將剖其善惡在遷政化端風俗則賢不肖異貫而後賢者自明而察者不惑也余兄事元魯山而友劉蕭二功曹此三賢者可謂之達矣或曰願聞三子之略遐叔曰元之志行當以道紀天下劉之志行當以六經諧人心蕭之志行當以中古易今世元齊愚智劉感一物不得其正蕭呼吸折節而獲重祿不易一刻之安元之道劉之深蕭之志及於夫子之門則達者其流也然各有病元病酒劉病賞物蕭病貶惡太亟獎能太重元奉親孝居喪哀撫孤仁徇朋友之急蒞職明於賞罰終身貧而樂天知命焉以為王者作樂崇德殷薦上帝以配祖考天人之極致也而詞章不稱是無樂也於是作破陳樂詞是樂也協商周之頌推是而論則見元之道矣劉名儒史官之家兄弟以學著稱乃述詩書禮樂春秋為五說條貫源流備今古之變推是而論則見劉之深矣蕭以史書為繁尢罪子長不編年陳事而為列傳後代因之非典訓也將正其失自春秋三家之後非訓齊生人不録次序纘修以迄於今志未就而歿推是而論則見蕭之志矣元處師保之席瞻其形容不俟其言而見其仁劉被卿佐之服居賓友之地言理亂根源人倫隱明參乎元精而後見其妙蕭若百鍊之鋼不可屈折當廢興去就之際一生一死之間而後見其大節視聽過速欲人人如我志與時多背恆見詬於人取其中節之舉是可以為人師矣學廣而不偏精其貫穿甚於精者又文方復雅商之至當以律度百代為任而古之能者往往不至焉超蹈孤厲不可謂不知言也茂挺父為莒丞得罪清河張惟一時佐廉使按成之茂挺初登科自洛至莒道邀使車發詞哀乞惟一涕下即日捨之且曰蕭贊府生一賢才資天下風教吾由是得罪亦無憾夫如是得不謂之孝乎或曰三子者各有所與遊乎遐叔曰若太尉房公可謂名公矣每見魯山則終日嘆息謂豫曰見紫芝睂宇使人名利之心盡矣若司業蘇公可謂賢人矣每謂當時名士曰使僕不幸生於衰俗所不恥者識元紫芝廣平程休士美端重寡言河間邢宇紹宗深明操持不苟宇弟宙次宗和而不流南陽張茂之季豐守道而能斷趙郡李崿伯高含大雅之素崿族子丹叔南誠莊而文丹族子惟嶽謨道沈邃廉靜梁國喬潭德源昂昂有古風宏農楊拯士扶敏而安道清河房垂翼明志而好古河東柳識方明遐曠而才是皆慕於元者也劉在京下嘗寢疾房公時臨扶風聞之通夕不寐顧謂賓從曰挺卿集本作柄卿英華亦作柄卿注云唐書作捷一作挺若不起無復有神道尚書劉公每有勝理必詣與談數日忘返退而嘆曰聞劉公清言見皇王之理矣陳郡殷寅直清有識尚恨言理少對未與劉面常想見其人河東裴騰士舉精朗邁直弟霸士會峻清不雜隴西李廣敬仲堅明冲而粹范陽盧虛舟幼直質方而清潁川陳讜言士然淡而不厭吳興沈興宗季長專靜不渝潁川陳兼不器行古之道渤海高適達夫落落有奇節是皆重於劉者也工部侍郎韋述修國史推蕭同事禮部侍郎楊浚掌貢舉問蕭求人海內以為德選汝南邵軫緯卿詞舉標幹天水趙驊雲卿才美行純陳郡殷寅直清達於名理河南源衍季融粹微而周會稽孔至惟微述而好古河南陸據德鄰恢恢善於事理河東柳芳仲敷該練故事長樂賈至幼鄰名重當時京兆韋收仲成遠慮而深南陽張有略維之履道體仁有略族弟邈季遐溫其如王中山劉穎士端疏明簡暢穎川韓拯佐元行備而文樂安孫益盈孺溫良忠厚京兆韋建士經中明外純潁川陳晉正卿深於詩書天水尹徵之集本英華作徽之英華又注云一作微誠明貫百家之言是皆厚於蕭者也尚書顏公重名節敦故舊與茂挺少相知顏與陸據柳芳最善茂挺與趙驊邵軫洎華最善天下謂之顏蕭之交殷寅源衍睦於二交之間不幸元罷魯山終於陸渾劉避地逝於安康蕭歸葬先人歿於汝南今復求斯人有之無之是必有之而察之未克也三賢不登尊位不享下壽居易委順賢人之達也不蒙其教生人之病也豫知三賢也深故言之不怍云上古無文飽於和氣從化而避何交之哉至於善惡分利害競而後有交交天命也疏附奔走之友夫友天縱也亦然微鮑子之知管氏則諸夏遷為左衽無歸生之說屈建則椒舉死於他國大者濟天下叔牙夷吾是也小者全宗族聲子伍舉是也慈明奉元禮一如大人真長喪仲祖臨柩動色由是近於骨肉之恩不止交遊而已矣王邑崇繼前好父事君卿梁松恃貴遺舊構陷伏波兩存其道而後兼善是知人事艱難僅發於造次生死變禮不必更時代朋友漸於講習緣情而親於我為重憂危相急仕進相推望而不從厚實生怨詩曰喪亂既平既安且寧雖有兄弟不如友生美道義相成也又曰將恐將懼維豫與汝將安將樂汝轉棄豫哀勢利相傾也三代之教自家刑國樹之以經師啓其心而身修則家事理次定朋友端其性術攝稱從之聲與實諧次諸侯無敢不貢士及於政是以富有賢哲動符六經王澤既衰小雅皆廢諸侯無貢士之理司馬無論材之政猶或先王教存國有君子聖人生於魯七十子遍遊諸侯文武之道曀而復明孔伋孟軻之徒無不儒尊漢代人心尚朴辟署由州郡公府往往有奇節駭俗之士東京宗祖好學海內翕然是以王室多柱石之臣交遊有死生之友降及魏晉亦未甚偷近代無鄉里之選多寄隸京師隨時聚散懷牒自命積以為常吠形一發㣥響雷應銓擢多誤知之固難使名實兩虧朋友道薄蓋由此也況衆邪為雄孤正失守誘中人之性易於不善求便身之路庸知直道不從流俗修身俟死者益寡焉加以三尊闕師訓之喪朋友無寢門之哭學府無衰服之制禮亡寖遠言者為非人從以偷俗用不篤弊在不專經學淪於苟免者也師乏儒宗則道不尊道不尊則門人不親友非學者則義不固義不固則交道不重選不由鄉則情不繫府情不繫府則舉薦寡恩三者化人之大端而情禮盡曠徼幸道長而純賣心道消悲夫禮首於冠而成人筮日筮賓即事於廟同師之友鄉邦之族醮而禮之遂相與字之身何以不嚴友何以不敬雖有暴慢無自入焉嗚呼士大夫略之禮墜於地久矣信義不厚斯有漸歟後進未較是以非僻者多附成而遠敗成或非經敗或非義三代之理不能無是矧弊末乎於是大雅之友掃除無妄之交風動利招則不悔機網名眩則甘心鼎鑊傾之以勢則不畏於天地餌之以權則忍絶其親愛苟患失之無所不至故詩有谷風之刺禮有邦朋之禁以此防人猶或踰之嗟夫奇巧釣情者明哲所惡鋒芒逆物者道家不取受施忘惠者仁義之蠹跡均心異者蠻貊之俗面附背攜者人道所棄遠賢奔利者商販之行俞可強不者僕妾恆性愛子遺親者犬彘之心若然者無代無之嗚呼至交之道殆絶乎如有唱而無應非唱者過也善交者不好甘而惡辛貴棄同而即和鮑叔潔廉而管敬仲三歸至知之契故無與二君子不器交議宜然義在切切偲偲匡救其闕善則輔宣之過則規誨之不從則一心以蔽之不幸置於刑辟則生死以全之傳曰朋友無大故不棄此之謂也苟能久要之約必存平生之言可復如樓護終身與呂公同食張裔養楊恭母如親則家室有歸人誰虞死古者言之不出恥躬之不逮也行之難言之得無訒乎務省諸身而已矣天地之大德曰生舜好生之德洽於人心五福首乎壽麟鳳龜龍謂之四靈龜不傷物呼吸元氣於介蟲為長而壽古之聖者刳而焌之觀其裂畫以定吉凶殘其生勦其壽既勦殘之而求其靈夫何故愚未知夫天地之心聖達之謨靈之壽之而夭戮之脫其肉鑽其骸精氣復於無物而貞悔發乎焦朽不其反耶夫大人與天地合其德與日月合其明與四時合其序與鬼神合其吉凶不當妄也壽而夭之豈合其德乎因物求徵豈合其明乎毒靈介而徼其神豈合其序乎假枯殼而决狐疑豈合其吉凶乎洪範曰爾有大疑謀及卜筮聖人不當有疑於人以筮也夫祭有尸自虞夏商周不變戰國蕩古法祭無尸尸之重於卜則明廢龜可也又聞夫鑄刀劒者不成則屠犬彘血而祭之被髮而哭之則成而利蓋不祥器也其神者躍為龍蛇穿木石入泉源以至發炯光聲音人不能自神因天地之氣化天地之物而為神固無悉然是亦為怪古者成宮室必落之鐘鼓器械必釁之豈神明貴殺享膻腥歟今亡其禮未聞屋室不安身而器物不利用由是而言則卜筮陰陽之流皆妄作也夫潔壇墠而布精誠求福之來緬不可致耕夫蠶婦神一草木禱一禽畜鼓而舞之謂妖祥如答實歟妄歟犧文之易更周孔之述以為至矣楊子雲為太元設卦辨吉凶如易之告若使後代有如子雲又為一書可筮則象數之變其可既乎專任道德以貫之則天地之理盡矣又焉假夫蓍龜乎又焉徵夫鬼神乎子不語是存乎道義也時濁代危賢人去之商洛深山鸞鶴潛飛漢以霸興皇王道衰玉帛雖至先生不歸吾非固然可動而起厖睂皓髮來護太子至尊動容奪嫡心已四賢暫屈天下定矣返駕南山白雲千里先生冥冥隱於卜肆宗師老氏精究易義爰衣爰食止足非利垂簾燕居默養真氣誨人不倦人悅其風皎昧柔剛在我域中心與世遠事與人同不臣大君不友上公在貴反賤齊明若蒙遼哉遠哉微妙元通弋者何為仰慕飛鴻五彩雖美玉不汙質光武盛明子陵不屈羊裘魚釣以此終日網羅遍野乃致雲鴻降尊申舊延臥禁中舒體展肢加於帝躬星官告占天下聞風富春長往潄濯清江齊宣燕昭折節下賢㣥儒畢至冠帶森然天子尊崇盛於堯年爰及暴嬴書焚人坑東漢祖宗悉尚儒生生徒橫議公府畏名肆其吻端以正鈞衡物極變興子龍遐征身全道高惟智惟明去危圖安危則不隕渴而後汲力亦隨盡麒麟遐步終日不踠逃刑諸生自脫何晚深乎智叟孤遊冥遠我蠶我衣我耕我食推心而動神佐正直溟波不沈仗此之力島夷卉服移我淳德衡門棲遲台佐讓職時非吾世語不如默孺子心壯陰讎國冤結客飛椎天下雷喧神付幽符帝納密言去則項亡就則劉興唯天有鑒類日之升元機靜運四海波澄絶粒謝時方追赤松強為國起鎮定東宮安危在我萬古清風桓靈政昏釁因宦者黃巾四起血流天下京師動搖鬼哭匝野義真受鉞誓衆而前即日掃除京觀如山渠帥已死破棺折元謠頌風興家邦獲安世故紛紛罕有令人既成其勳又保其身東漢純臣嗚呼義真小白圖霸尊周服楚聿求仁智扶我此舉叔牙知人拔管於魯一言而合爰制師旅布命諸侯威行九土周王南面列國來朝朝服濟河心無動搖束髮左衽遷乎一朝邢歸衛存楚貢包茅懸車北討山戎遁逃三歸備職不足纍德七子仕楚後人霑臆周衰晉霸世有哲卿范武在秦晉國如傾將中軍師世主夏盟典禮攸興刑政以清神歆正詞國賴直清諸侯朝貢楚不敢爭告老歸政身全德明溥傳嵩岱首冠春秋楚子歎息趙文綢繆馨聞百代風暢春流荊王晉侯虐我小邦南則荊侵北則晉攻救首救尾局不能起當炎獲濯國氏之子孤明內斷頌興謗止入陳事周權禮並理諸侯新睦霸主悅喜遺愛不忘我行溱水龍蟠幽谷潛伏非時蟬蛻高枝飲露而飛進如風行退若雲歸冥冥其義幾赫其歸疑小越霸興強吳蕩夷功成不居先生傳之明明昭王文武樂君君臣相趨龍起雲蒸既佐弱燕削恥南伐風驅雲鼓齊國瓦裂弔厥罷人旌其故節宗彞樂器歸獻燕闕化弱為強摧堅俾折鎮以仁義期之感悅梁趙屏風秦楚弭節天厭諸姬燕不可扶昭王不祿樂生道孤讒行將換齊復為都季命鄰君君告謀燕痛詞而泣義貫於天徑飇遐舉攝轡將奔趙王慙羞故國獲存赫赫高皇戎輅北轅徘徊趙墟封其子孫遺風可師名教之源在昔符秦將霸晉邦百萬雷行飲馬竭江江淮岌嶪力屈則降謝公從容子弟董師以少擊多一鼓殲夷靈武二孝曰侯知道程俱羅目不覩朝廷之容耳不聞韶夏之聲足不登齊魯之境所見戎馬旃裘參於夷狄而能生養以孝歿奉以哀穿壙起墳出於身力鄉人助之者哭而反之廬於冢次號泣無節侯氏七年矣程氏三年矣根於天性陶我孝理其至乎哉埃垢積首草生髮間每大漠晨空連山夜寂人烟四絶虎豹與鄰擁墳椎膺聲氣咽塞下入九泉上徹九天背爛心朽皮枯節攣草木先秋而凋落景氣不時而凝閉殊鳥異獸助之悲號萬物有極此哀無窮大哉二子能以孝終始乎語曰孝如曾參不忍離於親生不忍離歿忍離之哉二子之孝過於曾氏矣昔吳起忍與母盟陳湯忍匿父喪起謀復楚霸而戮死湯功釋漢恥而囚廢神道昭昭若何無報九州之衆誰非人子踐霜露者聞風永懷士有感一諾一顧猶或與之死生嘉一草一木猶或為之歌詠而況百行之宗終天之戚乎華奉使朔陲欲親往弔焉屬河淩絶渡願言不果憑軾隔川寄聲二孝因為讚一章敢旌善人以附惇史其文曰厥初生人有君有親孝於親者為子忠於君者為臣兆自天命降及人倫背死不義忘生不仁愚及智就為之禮文禮文不能節其哀繄道德之元純至哉侯氏創巨病殷手足胼胝成此高墳蔬果為奠茅蒲為茵其奉也敬其生也貧大漠黃沙空山白雲柏庭既夕松路未晨寇戎接境豺虎成㣥夜黑飇動如臨鬼神哭無常聲迥徹蒼旻風雨漂搖支體鱗皴色慘莪蒿聲酸棘薪苴斬三年爾獨終身邑子程生其哀也均顧後絶配瞻前無鄰冬十一月浮冰塞津吾將唁之其路無因寄誠斯文揮涕河濱泱泱靈川滄溟一支每歲八月雄濤應期昧爽風生凜若切肌淒清陰淹曠朗陽晞雪山潢江神物驅之萬里齊足千車並馳雷破天動山捶地移湯室雲分却躍鷺飛突象瑳切奔鯨合離踣逃夔魑竄蟄龍羆共工折柱武安行師㣥源委會祥怪叢滋熾毒乘人帝降明威一日再至洗其纖疵仲秋大至以蕩以夷世稱伍員忿憾而為肇開混元寧莫常斯惟天陰步馬日用不知是述是讚嗚呼慎詞
