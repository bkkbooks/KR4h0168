body:
  text: 臣聞立極著紀之初闢乾開歷之始上所以分垂象曜下所以疆括地里惟大人之有作越百代而孤峙飛五位以龍奮騰九萬而鵬起曩者炎運將終鼎命云絕四溟波駭八維幅裂羽檄交馳邊烽並長星夜掃陣雲朝結莫不望壁壘以靡旗對轅門而亂轍故得百城冰潰千里煙滅固靈命之有在乃慷慨而投袂驅八駿以雷擊馭六飛而電逝騰星劍以外倚振雲鋒而高彗既後事而先謀亦先勝而後制兵有臨而必剋功無往而不濟龜策叶以符兆人神應而合契諒包頊以駕軒實孕皇而育帝足以光燭千祀足以祚隆萬世於是戢兵偃武銘功紀勣採三代之逸經刊八方之遺籍搜隱遁於林藪訪棲遲於巖石然後調玉律以定時測金儀而考歷符洛下之前驗嗣容成之絕迹若夫流惠澤於瀛表被仁風於區外窮八際以來庭踰九譯而浹會莫不削袵而崇禮樂解辮而襲冠帶參兩曜以齊明混二儀以稱大信一人之致感實萬方之攸賴聖皇以令叶先甲時惟仲春乃整法駕馭華輪六軍雷動萬乘星陳臨濁河以北睠指清洛而東巡乃升雲闕俯天津朝萬國禮百神琛賮咸集要荒畢臻夫其地也據三川以設險憑四闕而作固總奔湊於八方測圭影於中度既定鼎於周業亦克昌於漢祚望嵩巒之邐迤臨崤坂之迴互所以仰叶辰象所以俯清天步若夫削靈巖以表闕疏清派而為池極皇居之壯麗窮大厦之宏規抗修廊之窈窕屬輦道而逶迤夕霞臨而錯落晨光照而陸離至如雲觀晨開風亭夜敞迴長飈於輕翼凝濃露於仙掌沈落月於璧臺挂奔星於珠網羅紈飄而散馥環珮動而流響垂密葉於綺窗散飛花於翠幌復有天池濛氾以嬉以遊鼓輕枻漾仙舟蔭喬木鏡清流魚鳥陵亂蘋藻沈浮控飛梁以架迥列層閣以環洲漬檀欒之修竹映迢遞之危樓風未生而葉動景將昃而光收若夫瑞草奇色祥樹嘉名霏紅曜紫垂緗拖青或玲瓏於玉砌或點綴於金楹交九衢而結影分四照以開榮浥朝露而逾馥帶晨風而更輕於是登崇觀以周覽闢層軒而遐矚樹含嶺而共青草帶原而同綠俯八紘而非遠顧千里而為局飛霞斂而復舒輕烟斷而還續既神怡以情暢乃遣累而思足聆天籟之晨響想鳳簫之夜聲窺藂雲之朝散思鶴蓋之後清捐大位而不寶脫萬乘而為輕訪真人於姑射問至理於廣成志眇眇以遐顧心遙遙而上征踐太微之崇閣闢閶闔之天扃拖紅旗於絳闕翼芝蓋於紫庭咀靈一作沖氣而還壽吸元液以駐齡若夫北瞰太行南臨少室積峯遠而逾翠重巖隱而復出乍鬱律以干霄又岧嶢而㮣日松翳空而難辨鳥翔高而易失屬天下之無事聊逍遙以自逸方欲登日觀以摐金覽云亭而竚蹕於是凝聖情以遠慮思成敗於終古美揖讓於有虞壯成功於大禹恥用兵於中冀鄙窮戰於丹浦每有違於汝弼恒知失而思補乃命促苑囿散積聚改制度易規矩削侈麗於樓臺崇質素於階宇仁好生而必遂德無貰而不輔習嘉禮於玉帛和大樂於鐘鼓上可以降集㣥瑞下可以安懷率土惟聖作之可觀實萬物而斯覩顧微臣之庸朽濫叨選於詞林恒戒盈以獻賦每規過而進箴幸天地之覆載欣日月之照臨豈窺天而識象寧測海而知深徒望雲以考澤空就日而傾心漸九皋而戢翰望天路以揚音美皇運之方永嗟頹齡之遽侵顧鴻恩之未答徒頌德以長吟臣聞理忘亂安忘危逸忘勞得忘失此四者莫不皆然是以夏桀以瑤臺瓊室為麗而不悟鳴條南巢之禍殷辛以象箸玉杯為華而不知牧野白旗之敗故當其盛也謂四海為已力及其衰焉乃匹夫之不制當其信也謂天下為一心及其疑焉則顧盼皆為讎敵是知必有其德則誠結戎夷化行荒裔苟失其度則變生骨肉釁起腹心矣是以為人主者不可忘初處殿堂則思前主之所以失朝萬國則思今已之所以貴巡府庫則思今日之所以得視功臣則思其為已之始見名將則思其用力之初苟弗忘舊則人無易心則何患乎天下之不化故朝行之則為堯舜暮失之則為桀紂豈異人哉其辭曰周墳籍以遐觀總宇宙而一窺結繩往而莫紀書契來而可知惟皇王之迭代信步驟之恒規莫不慮失者常得懷安者必危是以戰戰慄慄日慎一日守勤守儉去奢去逸外無荒禽內無荒色唯賢是授唯人斯恤則四王不足五六帝不足七一作三皇不足六五帝不足十若夫恃聖驕力狠戾倔彊忠良是棄諂佞斯奬構崇臺以造天穿深池以絕壤厚賦重斂積寶藏鏹無罪加刑有功不賞則夏桀可二殷辛易兩在危所恃居勿忘想功臣無逐故人無放放故者兦逐功者喪四海岌岌九土漫漫覆之甚易存之實難是以一人有悅萬國同歡一人失所兆庶俱殘喜則嚴寒為熱怒則盛夏成寒一動而八方亂一言而天下安舉君過者為忠述主美者為佞苟承顏以順旨必蔽視而掩聽動雖非而謂神言縱失而稱聖故曲者亂直邪者醜正改華服以就紫變雅音而入鄭雖往古之軌躅亦當今之龜鏡崔巍龍殿赫奕鳳門包四海以稱主冠天下而獨尊既兄日而姊月亦父乾而母坤視則金翠溢目聽則絲竹盈耳信賞罰之在躬實榮辱之由已謂羲皇而易匹言堯舜之可擬驕志自此而生侈心因茲而起常懼顛而懼覆必思足而思止勿忘潛龍之初常懷布衣之始在位稱寶居器曰神鼓鐘庭設玉帛階陳得必有兆失必有因一替一立或周或秦既承前代當思後人唯德可以久天道無常親惟欽明之昌運應靈圖而嗣籙紐三代之離術正千齡之差朔可以治定制禮可以功成變樂實磐石之攸寄固維城之斯屬欣微生之多幸濫高選於名藩列通籍之渥惠承置醴之殊恩晨曳裾於東閣夕侍宴於西園於時霜氣斂靄夜景澄廓雲撤層臺煙銷連閣流月華以昭耀間星文而灼爍巖桂偃而未彫宮梧紛而就落於是羅薦周設黼帳高舒露凝珠網風清玉除烟浮輝於緹幕燭籠光於綺疏爾乃咀清哇揚激徵金石奏絲桐理奇調間發新聲互起促宴冶而忘疲歡情暢而未已於是燕餘齊列絳樹分行曳綃裾兮拖瑤珮簪羽金义兮珥明璫擢纖腰之孤立若卷旌之未揚紆脩袂而將舉似驚鴻之欲翔退不失倫進不踰曲流而不滯急而不促絃無差袖聲必應足香散飛巾光流轉玉若乃巴姬並進鄭媛俱前對席齊舉分庭共旋乍差池以燕接又颯沓而鳧連止有餘態動無遺妍似兩艷之同發類雙花之偶然進止合度俯仰若一節緩則顧遲唱速則迴疾殊姿異制不可殫悉若夫金翠的皪緗綺參差方趨應矩圓步中規飛鈿雪落頹鬢雲垂舒類飛霞曳清漢屈若垂柳縈華池既而曲變終雅奏闋清角止流商絕頓華履以自持整文袿而竚節始綽約而迴步乃遷延而就列於是君王悠然懷古怡然自適遷思迴慮弛縣改夕揖摛藻之賓引良談之客然後討覈八索詆訶六籍語妙則眾絕希夷論遠則喻窮開闢議先哲之往軌考前王之餘迹方欲革登封之頌勒云亭之石與日月而齊明同天地之不易君王以政隙務閑披翫餘日闢華軒以遐想臨風庭而自逸於是屏青編收縹帙息柔翰韜雅瑟情廓志遠慮靜神謐於時日下梧宮陰清竹殿鮮雲始發光風初扇餘霞未斂殘虹猶見玉斚既陳蘭肴乃薦登龍閣而騁目臨曲池而遊眄於是徵趙女命齊倡動瓊珮出蘭房橫寶金义而耀首靚鉛華而飾粧低翠蛾而斂色睇橫波而流光聲欲伸而含態氣未理而騰芳乍連延以爛熳時頓挫而抑揚始折宮以合徵終分角而扣商掩餘韻於雕扇散輕塵於畫梁若夫振幽蘭飛激楚俯仰豔逸顧盼容與其繁會也類春禽振響而流變其微引也若秋蟬輕吟而曳緒似將絕而更連疑欲止而復舉短不可續長不可去延促合度舒縱有所聽之者慮蕩而憂忘聞之者意悅而情抒歌未終君王乃喟然歎曰夫樂者所以通神明節情欲和天地調風俗觀往代之遺風覽前賢之軌躅莫不治亂斯在興兦攸屬是故聖人以為深誡君子以之自勗於是放鄭衞引鄒枚臨廣苑陟崇臺肆東平之樂包天下之才盛矣美矣優哉游哉月初迴於夕陽日夜沒於天綱步庭砌以游衍覺雲霄之杳茫氣象萬殊緬星河而盡列光輝一道羅銀漢之靈長徒觀其粲兮如磋潔兮如磨明月照而不失其素飄風驚而匪揚其波莫測其深含天際之四氣莫度其遠掩人間之眾河及夫嵗入三秋勢直千里度龍駕而容曳搆鵲橋而迤邐霞妝星靨知婺女之不如雜珮明璫必姮娥之相似七夕作之以良會㣥方於是而仰止固能流不可準涯不可度既莫見乎端倪亦焉知其厚薄夫其為謙也太陽曜而不爭其光夫其為德也巨海枯而莫之能涸奪凝霜之漫漫方白石之鑿鑿居崇高而不危體虛無而自若名連地脉影雜天文當霽夕而逾曉凝微雨以暫曛明白可稱則皓如曳練正平可緝亦矗似長雲亘紫極以斜轉橫碧空而中分吐霄光而澹灩含曙色而氤氳將欲問之於槎客如何欲決於嚴君登靈岳以遊目極千里兮周睇盡山川之重沓容雲物之詭怪何茲松之挺茂擢脩幹於孤林映丹霄而有葉淩青霞而矯心前絕萬仞却倚千尋俯崢嶸之深谷仰迢遞之層岑霏夕煙而曖景度神飈而流音若乃月起陽爻嵗窮陰律匝地冰厚周空霧密雪積巖而逾峻風乘林而轉疾結晻霮之愁雲黯蒼茫之寒日於是眾草零㣥木墜千巖槁萬嶺悴獨潔固而不渝常猗猗而結翠始見貞而表潔乃以叢而辨類夫其深山遂性委液流津感天地之粹質禀陰陽之精純根含冰而彌固枝負雪而更新既無懼於元月寧有悅乎芳春含奇文而養勁收高節而自珍恥取媲於嵇子口厶虫受封於兦秦本絕希於雕刻詎有憂於斧斤若乃流膏可咀嘉賓可薦香有四飛味逾九轉延促齡於度隙駐生涯於流電故餌之者目改服之者容變紛羽翼而上騰排紫虛而高扇起九垓而憇息周四海而顧盼信神經而最品實秘錄而精選嗟美材之無用悲側路之嶮巇動跬步而致阻投一足而必危傷拙目之眾毀慨名工之獨知仰徑寸而靡及屈百尺而自卑縈白雲以舒蓋接丹桂而交枝凝暉遠而澹景纖羅挂而輕颸窮萬祀而不異歷千秋而不萎豈茲木之足歎亦前賢之所規何吾生之命舛懷丹誠而莫披心炳朗而無報情蕩滌而不羈任儻來之否泰委元運之遭隨戢輕翮而未舉踠逸足而莫馳實未榮而先怠寧泛駕而致疲誠責躬而咎已豈藏瑕而掩疵恒怯進而勇退每知雄而守雌庶比茲以自勗履貞固而不虧何物類之實繁各異形而辨色惟茲影之靈化獨元妍而莫測若乃體無定質應變隨方因物成象不拘厥常苟圭表之有度信天地之可量同寒暑之延促故夏短而冬長在清明而必朗若晦濁而斯兦同至人之隱顯類君子之行藏若夫長短侔形曲直應質細故則一毫必具大物則萬象無失並片魚而為比偶孤鳥而成匹帶秋林而暫疎含春樹而還密將度雲而俱遠與奔駟而同疾至如景霽氛收波清風止平湖數百澄江千里有象必圖無物不擬㣥木懸植叢山倒峙崖底天迴浪中霞起咸巨細其若一各委曲而相似窺之者莫測其淺深尋之者罔知其終始苟煙霞之可乘何神丹之足鍊流金液以命酌指玉京而高宴含虛無以成體故日中而不見同希夷以寂寞何罔兩之能眩若夫往來絕跡出入無間走不可避速不可捐非可以智察難可以理詮向夜月而處後背朝日而居前何變化之無定同瞻之而忽焉安仁覽以生悲士龍觀而興笑孫惠顧以致悚田巴臨而獨照想古人之遺烈一作形哀吾生之不劭守愚直以固窮無明畧以求効嵗月忽其代序斑鬢倏而改貌誠既往而莫追徒鑒流以自弔若夫色動秋水光澄鍊金翠羽朝映珠星夜臨近看若淺遠矚如深信不入而疑入實非沈而似沈既寄形於流豔又匿跡於凝陰類聖人之無巳以萬物而為心福應善而斯臻禍緣愆而必至念全德以守一思改過而無二寧受屈以懷道不求伸以邀利庶履危以自勗終餘年而不墜苟刑網之所加雖在親而無肆誠言行之可錄縱居嫌而勿棄必取舍而無私故捫心而不愧獨水鏡之鑑物窮妍媸而莫祕誠斯道之可寶請貽戒乎在位余執性介直動多違忤茲讀老子至和光同塵竊有慕焉因而賦之伊大噫之煽物氣無擊而不揚惟茲塵之宜昧何動息之順常若乃寄形大飈託質厚地倏爾而往忽焉而至乍徘徊以上騰或飄颻而下墜起彼集此不失厥位居無不安涉無不利似達人之推理任逍遙以自肆若夫陰風發陣雲屯鼉鼓震紅旗飜千乘動萬騎奔中原以之黯色白日為之晝昏其興也勃其息也漸或聚或散乍舒乍斂細不可捨輕不可掩蒙籠篋笥羃歷茵簟隨時無競應物不違值細雨而暫息逢輕風而復飛靃靃靡靡雰雰霏霏將晨軒而並出與暮蓋而同歸任動靜而無累似識變而知機若夫拂珠履生羅韈積菱鏡而鸞沈下雕梁而歌發散瓊臺而類粉布玉階而似雪蒙鳳輦於銅衢翳龍媒於金埒有動必隨一作發無空不遍出入青瑣遊揚紫殿流細影於迴裾亂浮香於舉扇隱洞房而難覩因隟光而可見既洋溢若浮煙又散漫如流霰至如化衣京洛鍊石仙家色侔雨壤影若飄沙逐奔蹄而起亂隨驚輪而飛斜近則昏阡蔽陌遠則晦景韜霞疑竊食於顏子先甘餌於元蛇惟紛吾之孤介驟萍流而蓬徙既守愚以周直每受訕而招毀屢空范丹之甑時臥李恂之被未齊物於莊生庶同塵於老氏粤一氣未分之前二儀肇闢之始綿哉邈矣固無得而稱焉洎乎立極斷鼇補天煉石三光抱石之帝九色乘雲之皇龜文發而八封成鳥跡命而六體備於是書契著焉文籍興焉是以襃貶定於一言美惡在乎千里或揖讓以崇文德或干戈而擅武功雖五運代昌三正更襲質文殊軌馳驟異規莫不詳諸典策可備而言矣爰自近代迄乎周秦兵革迭興英雄互起假名竊號者三分有二干紀亂常者十居其九是以八維幅裂四海瓜分玉壘稱王金陵謀帝重以中原塗炭戎羯憑陵衣冠禮樂掃地將盡數百年間未聞正朔我聖王之受命也則九服翹心三靈竚睠振乾維以綴象舉地絡以籠人曩者炎運將終九域淪陷於是披丹霄而軒鵬翼駕元海而截鯨鱗俯拔嵩華仰迴星漢納風雲於懷抱鼓雷電於胸臆流雕矢於日谷橫大劍於天外所以八秋乘風九夷請朔固可以包鎮虞夏跨躡殷周於是體天制作順時立極進力牧於沮澤求風后於海隅所以三傑並臻十亂咸集故能佐命垂統飾化開業也所以神功茂績通幽洞冥反無為於上皇復淳朴於太素是以歌五英則八風順奏六德則百獸舞至於素毳丹羽極飛走之祥頳萼華叢窮草木之瑞天無所秘地無所隱圖史所莫紀篆諜所未詳莫不昭晰相暉紛綸交映充庭滿囿盈郊洽野豈止二氣運而景星出三文著而神鳳儀而已哉於皇上帝於始月首日乃負斧扆御華軒駐金根陳玉輦千門既啟萬國咸萃金石備列琛贐畢陳於是九司三事㣥公百辟相與端紱理纓趨而進曰臣聞惟天為大聖人所以取則謂地蓋厚皇王所以受圖是知仰觀俯察明靈斯在上戴下履福應攸歸莫不順之者獲昌違之者致咎臣逖聽邃古遐觀往諜睿君哲主無易茲道雖復七十二代書契莫可至於登介邱基厚地建顯號施尊名展禮告成其義一也此乃百王之壯觀萬古之丕業昔齊桓以三代之功處諸侯之位尚睥睨梁甫睠顧太山况乎扼四海吞萬國寵九域括八荒如何湮沒而無聞哉夫登封者所以易姓奉繼興絕崇功不可闕也是可闕也則神可誣而天可欺矣今陛下乃欲貶惡百靈拒絕㣥議虧厥真紀昧茲懿德使泰山指望梁甫失幸金繩脫檢玉牒收文瑞日潛暉德星晦色此非所以發榮舒德應天順時垂裕百代激流千祀者也臣等盡慮悉心不敢奉詔胸計腹議切欲獻忠往者九章淪次五緯失方遂令歸餘爽終履端乖始陛下既考之以玉律又則之以金儀定千載之差辰正百王之廢朔符落下之明驗復容成之妙旨此又聖德之盛也伏願陛下上祗天庥下順坤德叶㣥神之望從億兆之心清蹕云亭鳴鑾岱岳肆射牛之禮展大澤之詩垂紺幄而佇㣥神謁紫壇而陳眾瑞使白雲朝起靈光夜燭應千齡之期流萬歲之響則四溟受福天下稱泰臣等敢資靈貺合符瑞之至極願以固請於是乃凜然動色曰過乎何辭之飾也朕聞惟德弗逮罔有克惟言弗審罔有徵觀乎周漢之苟進良足惡矣縱天命有在予將崇讓焉於是搢紳之徒俯而謝仰而頌德曰明明聖範巍巍至德元化難名神功靡測上包乾象下括坤域五岳塵消四溟波息仁風綿浹惠澤下霈船海極琛梯山窮貝九譯同德萬里齊信宿彗收芒朝雲解陳階蓂晦落庭軼晨鮮氤氳和氣蕭索非煙輪重璧合星次珠聯鴻名始茂景祚方延霧闢雲岸霞褰日觀山川致祗人神叶贊靈貺凝祥光華啟旦播美貞石馳芳柔翰德盈彌損道積逾沖禮成思大樂變推功讓為政始益寡謙終千齡展美萬古承風有宏文先生禀氣沖和資靈傑秀理在微而必察言無賾而不探加以體局凝沈風骨峻遠縱班馬而高出嗣顏冉而委蛇於時日暖朱墀風清紫陌長廊赫奕高閣陰岑先生方該祕紀於千載釋凝滯於萬古於是席長筵列髦俊散縹帙布青編簪纓畢萃綺紈咸集乃有以司鎧丈人戎服而至蓬首垢面頰削背傴左挈㦸右提鞬頖汗蒙塵不讓而坐先生逆而目之顧而誚曰夫杖者位之基器者名之實苟有叨竊咎悔必臻當今天下文明會昌御運舉宇宙以籠物馳日月而燭幽居概盈朝鵷鷺成列是以鳴玉曜輝者恥方於周召披堅執銳者羞比於韓彭至於採擇人倫捃摭要言有美斯達在器無假文武異容正位辨方朱紫無雜任能授用咸得其所是以山無逋客野絕遺賢方欲闡文儒銷鋒刃陳俎豆散牛馬肆志於禮塲遊心乎文囿大啟石渠之署廣開天祿之門搜寰內之琳球擢天下之梓旅之於東觀會之於北閣考往聖之遺逸正先賢之紕紊欲令微言隱而更顯至德晦而復明然後草封岱之儀備射牛之皮今子齒既盡矣形又槁焉上不敢貢策獻奇析珪分祿下不能收視反聽養真存神以螢燭之末光而方增耀於日月涓滴之微潤而欲擬浸於江湖其於餘生固亦勞矣猶不免佩弦荷箙坐甲操鋒見長劍而折腰對危冠而屏氣以茲疲朽預此戎班點汚我文門虧辱我宰塾顧瞻傳素能不恧乎丈人於是俯而慙仰而謝逡巡避席斂衽而對曰僕聞用舍時也窮達命也物固有欲而不可棄此蓋有力者走之豈在吾之所筭也且夫苟非其用則周孔無以措其心當其所能則犬馬猶足効其力今請正名改服從子而遊可乎先生曰噫子其不言幾失子矣苟能易位余何簡焉昔有愚夫者家本大賈積資巨萬既生豪門長乃潤屋所以衣必極麗食必窮珍而禀性頑魯不閑貨殖既而父終兄喪生計歸之每有貨易動多遺利其妻敏而有識常思歎曰若此子家貧無日矣夫常市珠及玉所費萬計唯獲燕石魚目而還妻覩而誚之曰此非真也何失鑒其若是乎於是愚夫乃作色虬鬚攘袂瞋目顧而呵其妻曰吾訪肆人皆云美玉也問諸闤吏咸云美珠也吾固先訪而後市先問而後買豈吾不擇而擅取哉其妻怒而復曰夫玉石異體珠目殊狀雖色類相似而明潤懸絕但子愚昧未詳耳若使人言是而隨是之人言非而隨非之此即取捨在彼子何預焉故有離珠之目者不可惑之以色有師曠之耳者不可惑之以音今若問人而後識者此乃聾瞽之事也豈有耳目者所為哉於是夫妻怨競累日不息時隣家有寓居遊士聞而歎曰誠哉哲婦之言可謂信而有徵維貞觀十三年歲在已亥二月甲戌朔八日辛巳聖唐大使右武衞大將軍慕容寶節度副使朝散大夫任雅相等肅奉明詔冊授大單于真珠毗伽可汗嫡嗣為肆葉護可汗安懷率土廓裁宇外曩者隋歷既終九域淪覆天資聖明光啟有唐而頡利背恩虐我邊域是以輕賫電發直掩虜庭驅縱驍雄奔放忠烈百弩俱彀萬鋒齊舉鞭雷鼓霓動天維於上拔山蹴岳移地軸於下雲騎騰盪則川野晝昏風旗揚曳則辰離黯色擒谷蠡於谷口曾未崇朝斬日逐於轅門景不移晷龍庭柳塞之外煙滅雲銷瀚海天山之前波澄霧卷上以震皇威於萬葉下以安億兆於千齡雖有靈祗贊我有唐亦所以恢崇今單于地一作也是以萬里齊契四海同規始驗秦防徒營漢城虛築在德非險皇哉唐哉勒石紀功騰聲不朽詞曰振天威兮橫朔方星劍騰兮虹旗揚窮絕漢兮越幽荒拜單于兮冊名王歷千載兮聲彌光靜字元休贈司空抗子武德初累轉幷州大總管府長史檢校幷州大總管太宗朝授司農卿封信都縣男改夏州都督再遷民部尚書卒諡曰肅臣聞夷狄者同夫禽獸窮則搏噬㣥則聚麀不可以刑法繩不可以仁義教衣食仰給不務耕桑徒損有為之甿以資無知之虜得之則無益於化失之則無損於時然彼首邱之情未易忘也誠恐一旦變生犯我王畧愚臣之所深慮如臣計者莫若因其敗兦之後加其無妄之福假以賢王之號妻以宗室之女分其土地析其部落使其權弱勢分易為羈制自可永保邊塞代為藩臣此實長轡遠御之道士牟貞觀初官河南府伊陽縣主簿陜之苪東有祠署於道曰魏文侯師段干木廟謹按史傳語文侯過其廬必式呂覽云秦攻苪司馬康以先生深諫其君又按圖經云先生以原上草廬中高枕而臥秦遂解兵昔子貢救魯挾辯詐扶危主然後僅而獲免豈若先生靡勞師徒曠然晏息而國不加害民受其賜誠以德充氣融道義純備者矣貞觀元年秋八月七日將仕郎前守河南府伊陽縣主簿范陽盧士牟載想遐踪願誌遺廟銘曰鼎河在南中條在北洪河橫流以紀魏國天地淑靈山澤粹精惟公克生為魏之楨鄰不加兵民用舒寧秦號虎狼役厲重傷毒螫斷斷侵軼西強瞻我仁人沛然知方以義以暴以柔以剛善師不陣古稱至德先生晏然婆娑偃息蓬居草廬是敬是式比彼干戈俄成禮則士之生世人爵為貴功成不居惟德之懿士之避土或蹈遐裔公則靖民以義為利我行其野祠宇巋然播詠仁風精誠若傳條山如礪河水如帶先生之德永永不昧神安貞觀中上大將軍蓋如如實際性相平等念念虛假緣業萬殊是以導之以解脫禮樂未之汨誨之以究竟象繫所不言鄜州寶室寺上座羅漢等漏茲獨善府宏六度不捨㣥生服膺四攝以大唐貞觀三年攝提在歲蕤賓御律景丁統日已巳司辰用銅三千斤鑄鐘一口法天地以為鑪假飛廉而扇炭克寸飾牟造化巧麗若神工感蜀山而自響擬漢厝而遠聞挺弗能發理切含宏扣而斯應義均虛受聿警四部式遵六昧未假于箭漏靡資於雞鸖懺誦顧而有節精進因而無怠方諸几杖小大之用既殊譬以盤盂洪纖之理多裕輒緣斯義乃為銘曰三界悠悠四生愛染有著沈沒無明法輪覺夢慧炬照冥大空罔得微妙焉名無為不住有為不盡去彼常樂來深慈愍然頭拯救靡足汲引且戒且禪或檀或忍爰造洪鐘晨昏取則和會攸仰禮懺無忒並航欲海俱遊西國開物成務是鐫是勒行成字德立定州義豐人隋大業末察孝廉為謁者臺散從員外郎後為王世充度支尚書世充平以隋資補宋州穀熟尉應制舉乙科授雍州富平縣主簿補殿中侍御史累遷侍中兼刑部尚書高宗朝封北平縣公拜左僕射太子少傅永徽四年卒贈開府儀同三司幷州都督諡曰定有隋失道天下沸騰陛下撥亂反正拯生人于塗炭何周漢君臣之所能比擬陛下聖德含光規模宏遠雖文武之烈實兼將相何用臨朝對眾與之較量以萬乘之尊與㣥下爭功哉臣聞天何言哉四時行焉又聞汝惟不矜天下莫與汝爭能臣備員樞近非敢知獻替之事輒陳狂直伏待葅醢伏承皇太子從幸靈州臣愚以為皇太子養德春宮日月未幾華夷遠邇佇聽嘉音如因以監國接對百寮決斷庶務明習政理既為京師重鎮且示四方盛德與其出陪私愛曷若俯從公道若思太宗時人伏願褰旒寫照洽㣥請於帝俞闢纊垂矜遂微懇於人欲騰茲璽誥激彼天波徵萬玉以警途詔八神而弭策藉江茅而陳鄗黍飾蒼璧而奠黃琮馳萬歲以飛聲接九重而美使編珠毓貺開麗色於金泥觸石凝禎蕩浮華於石䃭式昭昌祚永播鴻名凡在生靈義深聳踴師道字景猷宏農華陰人隋末自洛陽歸高祖授上儀同為備身左右尚桂陽公主累轉太常卿封安德郡公貞觀朝遷侍中轉中書令二十一年卒贈吏部尚書幷州都督諡曰懿爾乃闢飛閣之臨空望雕梁之架虹奏東城之妙曲命南荊之結風莊華豔於朝日長袖曳於芳叢度參差以儀鳳響嘹亮之驚鴻伊小臣之庸瑣預恩私之嘉宴聞仙管於帝臺聽鈞天於蘭殿悵崦嵫之易晚惜宮羽之難遍撫長笛而多慙覽洞簫而興怨徒隸齒於㣥龍信庸音其已薦君政貞觀七年行宋州參軍武縣尉高士李惠寬趙郡象城人也皋陶之後左車之允盤石之宗連華帝籍生而達理長而悟元齠齔之年蔡伯喈聞而趨步猗嗟之歲王平子見而絕倒洞徹若空之理偏知物我之義為半句而燔兩臂為一偈而燒七指尸毗割肉口薩捶捨身方之厲行畧無差等加以飡松却粒臥石潄流夏則編草為衣冬則引茅自覆形體雖殘不以為苦謗訕雖至不以為失猛獸去骨未足稱奇野鳥來巢詎將為異屬有隋失馭區宇分萌百郡則杼軸皆空千城則骸骨俱滿龍驚鷁退豕突鯨吞蕞爾漼然聲噭蕩蕩惠寬及於華巔早遇太平不恡身形共崇福業洎粵若稽古大唐仰握天鏡俯案地圖應期接統濡足授首據八十一萬之分承七十五代之君類大庭華胥之時同尊盧祝融之日惠寬荷皇穹與善素樂獲從值聖人既作萬物咸覩以武德六年四月八日乃於此山報國修立龕巖為室鐫石造賢刼千佛法華經一部營搆浩大神靈護持就使百億須彌未有若斯修福者也其南則臨柏縣龍輿避地之所北帶茅山鶴駕遊天之處東則神泉洶湧遠遶滄波西則低水漲濞近連翠嶺彌亘千里控帶百川邐迤河南之垂徘徊冀北之際下籠金闕上跨玉京既達退食之墟又接還簪之境如來真範徧滿巖崖修多妙旨週迴嶺岫長松映彤庭之彩文石晃紫金之像因竹林而起精舍為檜樹而製香爐雲物浮沈恒過鹿野烏免來往直指鷲山窻戶平接星宮梁棟斜通月殿既類從天化成又若因地湧出名僧搖錫遠邑爭來德士褰衣他方並至於是使持節上柱國本州諸軍事定州刺史定州都督相州總管杭州刺史光祿大夫呂國公士洛佐命心膂幹國爪牙王白廉李之流絳灌樊滕之輩飛旌河朔謺鼓恒陽發摘既類秋霜仁明復同春日六條布德志洽弟兄十部垂恩情深岵屺魚懸犢在百姓興五袴之歌鴈至鹿馴四民發兩岐之詠恭敬三寶回向十方脫捨財帛減徹車馬遂與惠寬共營此福大宏妙規深啟檀度伯仁縣令嚴雄撫宰百里清肅一圻迹同遷蝗治侔馴雉精誠信向經始伽藍勸課丹青修飾經像雖目連之神通敏給文殊之智慧莊嚴此尊崇實為儔類有宿士李長欽李士羅李希哲李明朗牛孝祖等並鄉社髦乂里閈清修愛法念道奉善樂施惟昔微功少效尚載景鐘細事磨言猶書甫鼎况布金重意剖骨殷心用樹高碑期傳來業
