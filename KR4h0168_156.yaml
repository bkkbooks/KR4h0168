  text: 全唐文欽定全唐文卷一百五十六偃衞州衞人本姓直勒氏貞觀初應詔對策高第歷高陵主簿十一年穀洛溢詔求直言偃上封事擢宏文館直學士拜魏王府功曹府廢出為湘潭令
