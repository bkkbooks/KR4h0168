front:
  text: 全唐文欽定全唐文卷八百十七光中和時人
  hash: sha256:70b01efb815f74221d38c004488d7afb9fc7ba58067e751456cca2970f09818a
  markers:
  - {type: head, offset: 13, content: 楊光, id: KR4h0168_NFKB_817-h1, level: 1}
body:
  text: 混茫既分乾坤成列形下曰器積而為山洎禹別九州漢通百越此山則維揚東甌之地峩峩傑出發地千尋峭削凌空壁懸四面其乃陰陽偏顧造化有情呀開石門路通極頂天生厚土蔭以森羅地廣百家人勝千衆天下靈蹟此乃標奇自乎開元之末袁朝作叛起於天台攻陷當州逃亡無數惟此一鄉人戶數百餘家而登此樓以逃其難乃有兵戈百衆來繞其山飛矢彎弧豈能侵動既難攻擊莫不相守經旬其恃乃智士而獲良計以米飴豕投於岩下㣥盜剖之自相謂曰岩頂積穀尚多我等相守難以待其乏乎遂共奔去而攻他疆其後便乃清平干戈不擾人忘往難無復再遊運轉年移迄今為古其樓近代居人皆懼有神聖居止及乾符五年趙言奔衝之時不敢登此回避以至中和二年屢被洞寇侵逼焚却鄉閭兼遂昌數縣軍馬頻來憑陵老幼惶惶倦於深竄乃有耆父河間郡俞強邀伴攀緣登此樓頂芟夷繁木以創草庵巧立層梯而通行路遂召鄉鄰老幼共此逃形寢寐安然狂兵攻守無路侵凌是年五月當州中軍屯營州郭居人投軍衆仇讐相害村野遭搜近遠逃亡不可勝數此之一鄉而有武都郡章承趣年當少俊英傑冠時鄉內欽依衆皆推讓蒙兵馬司僉差部領數百衛士占護家鄉各藏財泉於藪岩共置軍部於老竹外都畏懼不敢來侵戶口完全耕稼無失於時太守張公朝望崇重遠降分符撫恤安邦便蒙康泰當今四境未安內憂侵擾且居岩頂有百餘家並是鄉內英俊賢明父宿共棲幽境何異神仙余因遊觀奉命為記時唐中和二年壬寅十一月初八日景崇字孟安贈司空成德軍節度使紹鼎子懿宗朝嗣為節度以平龎勛功進同中書門下平章事檢校太尉兼中書令封趙國公乾符五年進封常山王檢校太傅中和三年卒年三十七贈太傅諡忠穆當道慈谷靈壽兩鎮報蔚州刺史蘇祐擅驅兵騎侵突臣管界及謀逆辭事尋巳處置訖者蘇佑本自微人謬承聖奬自拋離郡邑竄保山巖臣亦愍以困窮纍曾救恤慮其猖獗每使慰安豈期無惡不為有凶皆納狐鳴鼠伏曾不悛心擐甲弄兵嘗思怒目况朝廷道全姑息思務含宏加騎省之榮資除濮陽之望郡而又拒違明敕侮易天朝擅割屬城背雲中而納款潛將逆黨附并部以揚威昨者初犯中山尚深疑二謂其舉衆將議朝天或捨逆以自新或樹功而遷善殊不知終懷鴆毒竟務鴟張劫后臼之倉儲逼冒零之鎮戌旋則亂驅蛇豕入臣封疆陰蓄姦欺伺臣勇怯臣此時未窮來意詎忍加兵尋令問以行藏兼遣倒其戈甲然終無一字以述端倪纍有元隨自陳狀跡云本擬脅臣優給劫臣材廬奮戰馬而以利犬羊招亡命而別謀吞并臣尚觀釁變待以膳羞苟尚可以恩懷且欲候其敕命其賊緣已擬發露自致蒼黃乃與後來敗卒合謀便擬據城作梗臣既優饒稍過傾覆是虞固難使四郡軍民噬臍貽悔一城生性束手受誅其蘇祐一行徒黨除歿告軍將人數外今月七日並巳分兵誅戮訖此皆皇帝陛下雷霆振響宗社垂靈將復致於中興故先除其小醜况此賊逋藏藪澤招聚凶豪締結厲階爰輕數度包含怨府不啻十年其寨即在中山一隅去大同咫尺彼兩鎮不能覆巢破卵蕩葉夷根者蓋以其兔狡難蹄獸窮則搏顧茲疾疚實謂腹心苟非天靜寰中曷使魚遊釜內今則欃槍一掃噍類無遺凡在邊藩孰不鼓躍彥休自號參寥子皇朝濟濟多士聲名文物之盛兩漢才足以扶輪捧轂而已區區晉魏周隋已降何足道哉故自武德貞觀而後吮筆為小說小録稗史野史雜録雜紀者多矣貞元大歷已前捃拾無遺事大中咸通而下或有可以為誇尚者資談笑者垂訓誡者惜乎不書於方冊輒從而記之其雅登於太史氏者不復載録愚乾符甲午歲生唐世二十有一始隨鄉薦於小宗伯或預聞長者之論退必草於搗網歲月滋久所録甚繁辱親朋所知謂近強記中和歲齊偷構逆翠華幸蜀搏虎未期鳴鑾在遠旅泊江表問安之暇出所記述亡逸過半其間近屏幃者涉疑誕者又刪去之十存三四焉共五十一篇分為上下卷約以年代為次討尋經史之暇時或一覽猶至味之有葅醢也甲辰歲清和月編次璞字紹山又字德溫閩縣人大順中擢進士第官校書郎林孝子攢泉州莆田縣人初舉進士不第仕塞垣後仕不擇祿為福唐縣尉冀遂迎養未果聞親有疾奔還其家行不俟車食而失哺及罹難疾殆至殞絶漿不濡口往往三日或五日自埏鏄甓營邱隴及踰葬期獨廬墓側飛走助哀神祇薦祉故白烏再集甘露聯降泉州申使府時貞元癸酉歲李若初廉使茲地深所嘉嘆遣從事親往視驗會天久暵乾露彩融釋攢拊膺大哭曰自盡於其親人子常道貞符之降本非所望向者所降其福我耶其禍我耶今使車將至苟非所驗非餘骸足顧抑將殃乎州里矣逡巡愁雲四合異香中來觸物氤氳歘成甘露煥然五色餲然甘味移時不消千木同色靈烏素質翻翩來翔闔郡共觀無不從驗以是悖者知敬悍者知馴既圖其狀李公録以上奏德宗敦勸孝道降制褒異命立雙闕於其墓旌表門閭舉宗皆蠲征徭厚加爵餼逮今號為闕下林家歐陽詹曾序甘露述備詳其事黃子曰天道不遠感而遂通林生因心之感上達乎天纍降祥符坐獲旌表是謂天爵豈下萬鍾之貴遂登名此書以聳孝道云爾王棨字輔之福唐人也咸通三年鄭侍郎讜下進士及第試倒載干戈賦天驥呈材詩公詞賦清婉托意奇巧有江南春賦末云今日併為天下春無江南兮江北又有詔遣軒轅先生歸舊山賦及馬惜錦障泥詩尢美公風姿雅茂舉措端詳時賢仰風盛稱人瑞成名歸覲廉使杜公宣猷請署團練巡官景慕意深將有瑤席之選公辭以舊與同年陳郎中翬有要約就陳氏㛰好時益以誠信奇之初就府薦馮涯為試官三箭定天山賦當意為涯所知欲顯滯遺明設科第以宋言為解頭公為第二時毅夫中丞尹京兆怒涯不取旨撝命收榜扳破名第申省其年等第雖破公道益彰凡曾受品題數年之間及第殆盡前今輿論莫不美馮公之善得其材榮公之獲在其選從事本府乞假入關尋又首捷玉不去身賦春水緑波詩古公去邠論李公步馬時擅重名自內翰林出為江西觀察使辟為團練判官自使下監察赴調復平判入等授大理司直未幾除太常博士入省為水部郎中公初上第鄉人李顏纍舉進士鬱有聲芳贈公歌詩云蓬瀛上客顏如玉手探月窟如夜燭笑顧姮娥玉兔言謂折一枝情未足時謂顏狀得其美若有前知公十九年內三捷其於盛美蓋七閩未之有也不幸黃巢竊據京闕朝士或殍或戮者不可勝計公既遇離亂不知所之或云歸終於鄉里焉歐陽詹字行周泉州晉江人弱冠能屬文天縱浩汗貞元年登進士第畢關試薄游太原於樂籍中因有所悅情甚相得及歸乃與之盟曰至都當相迎耳即灑泣而別仍贈之詩曰驅馬漸覺遠回頭長路塵高城已不見况復城中人去意既已甘居情諒多辛五原東北晉千里西南秦一屨不出門一車無停輪流萍與繫匏早晚期相親尋除國子四門助教往樂籍中者思之不已經年得疾且甚乃危粧引髻刃而匣之顧謂女弟曰吾其死矣苟歐陽生使至可以是為信又遺之詩曰自從別後減容光半是思郎半恨郎欲識舊時雲髻樣為奴開取鏤金箱絶筆而逝及詹使至女弟如言徑持歸京具白其事詹啓函閲之又見其詩一慟而卒故孟簡賦詩哭之序曰閩越之英惟歐陽生以能文擢第爰始一命食太學之祿助成均之教有庸績矣我唐貞元已卯歲獻書相府論大事風韻清雅詞旨切直會東方軍興府縣未暇慰薦久之倦遊太原還來帝京卒官靈臺悲夫生於單貧以狥名故心專勤儉不識聲色及茲筮仕未知洞房纎腰之為蠱惑初抵太原居大將軍宴席上妓有北方之尢者屢目於生生感悅之留賞纍月以為燕婉之樂盡在是矣既而南轅妓請同行生曰十目所視不可不畏辭焉請待至都而來迎許之乃訣去生竟以連蹇不克如約過期命甲遣乘密往迎妓妓因積望成疾不可為也先大故之夕翦其雲髻謂侍兒曰所歡應訪我當以髻為貺甲至得之以乘空歸授髻於生生為慟怨涉旬而生亦歿則韓退之作何蕃傳所謂歐陽詹者生也河南穆元道訪豫嘗歎息其事嗚呼鍾愛於男女索其效死夫亦不蔽也大凡以時斷割不為麗色所汨豈若是乎古樂府詩有華山畿玉臺新咏有廬江小吏更相死類於此為唐末時人與周朴齊名後入青城山訪道而去若主人門下處其客者以法度一則也以白居易為廣大教化主上入室楊乘入室張祐羊士諤元稹升堂廬同顧况沈亞之及門費冠卿皇甫松殷堯藩施肩吾周元範况元膺徐凝朱可名陳標童翰卿以孟雲卿為高古奧逸主上入室韋應物入室李賀杜牧李餘劉猛李涉胡幽正升堂李觀賈馳李宣古曹鄴劉駕孟遲及門陳潤韋楚老以李益為清奇雅正主上入室蘇郁入室劉畋僧清塞盧休于鵠楊洵美張籍楊巨源楊敬之僧無可姚合升堂方千馬戴任蕃賈島厲元項斯薛壽及門僧良乂潘誠于武陵詹雄衛準僧志定喻鳬朱慶餘以孟郊為清奇僻苦主上入室陳陶周朴及門劉得仁李溟以鮑溶為博解宏拔主上入室李㣥玉入室司馬退之張為以武元衡為王褱奇美麗主上入室劉禹錫入室趙嘏長孫佐輔曹唐升堂盧頻陳羽許渾張蕭遠及門張陵章孝標雍陶周祚袁不約略唐末宰相大哉至道無為自然不終不始先地先天含光默默永劫綿綿東訓尼父西化金仙百王取則纍聖攸傳萬教之主元之又元啓僖宗朝官司勳郎中詩者情動於中而形於言故怨思悲愁常多感慨抒懷佳作諷剌雅言著於㣥書雖盈厨溢閣其間觸事興詠尢所鍾情不有發揮孰明厥義因采為本事詩凡七題猶四始也情感事感高逸怨憤徵異徵咎嘲戲各以其類聚之亦有獨掇其要不全篇者咸為小序以引之貽諸好事其有出諸異傳怪録疑非是實者則略之拙俗鄙俚亦所不取聞見非博事多闕漏訪於通識期復續之時光啓二年十一月大駕在裦中前尚書司勳郎中賜紫金魚袋孟啓序申昈乾符時官左武衛兵曹參軍府君姓趙氏裔天水闕二字別業易州淶水縣頃因先父遷闕二字仕流浪海隅從軍地遠徙居青闕二字世迄今凡二百年矣先妣夫人太原王氏生公是季子也府君生居於北海之郡志好雲林山水南北貿賈利有攸往廣涉大川博學古墳與朋友交言行敦美信義彰聞輕金玉立善外著孝行六親府君諱琮字光婚夫人太原王氏有男三人長曰審巖次曰審裕季曰審文女一人初笄之年適夫陰氏孟男年居弱冠之秋居然老成安詳大雅合國風之堅操修行古人立言溫尚可謂父訓有知流嗣千載矣夫人王氏令淑賢闕一字居喪淚血在苫塊之內殞哽蘭干骨髓焚消闕二字譽聞三從之闕二字導著府君遇軍情變亂不以交道仇闕一字生涯亦不遭毀爇錢穀湛然上下無虞藂食安貼乙未歲季夏月五日遇疾青州之私第丁於人世丙申年七月三日命知者卜得吉夕殯於益都縣南五里建德莊雲門山東岡原禮也慮山河更改松筠雕悴遂紀年代乃為銘說銘曰天水之君蘊志難㣥孝行雙美立性松筠卓然孤立在世推闕一字生好東臯之利滅亡回返高墳有子賢行傳代光門女從他氏五德猶存白楊千載滋茂兒孫落日烏啼猿呌荒村都闕一字思遺念臨棺血淚闕一其字一生涯終不改兒女永無依其闕二二字生平事留蹤萬代存其三嗣流孤隴下恩愛向誰論其四希遁字忘機自號永陽子夫燒丹鍊藥須烹龍虎之陰陽駐命存形藉養神氣之魂魄龍癡凝虎陰反成陽虎暗晞龍陽化成寶神融馭氣魄反成魂氣泰神和魂合而聖龍虎相凝成液神氣交馭為真神水便是華池忘心即名抱一朝天控鶴須吞真魄之靈丹出世長生藉養精魂之靈氣此則金丹祕訣神仙妙門能以改換精神變化筋骨收卷形體出入而可有可無變現真靈來去而能存能沒桑田變易天地虛翻升騰而紫府玉清遊歷而碧霄金闕此即神丹憑驗還返功靈世人枉鍊五金調和八石呼鉛作虎喚汞為龍妄配陰陽錯排水火誇三黃是聖騁五礬為神道理既乖聖意全失看經究義尋本窮元亂立規繩遞生法則不從師授強說已能斟酌藥名團量火候爐泥八面壇築三層咒祝神祇祭醮天地總是憑空造作非理修持不覺體敗形枯顏凋鬚白虛勞歲月枉役心神而望還丹萬無成耳余久耽雲水早棄浮華棲止山林精窮物象修神鍊氣反本還元息慮澄真忘思靜一考核鉛汞杼軸丹經徹視元洞之金書悟達三清之玉訣然後敢對持龍虎駕馭陰陽配金木以東西定坎離而南北陶鎔日月鍊成五色之元霜孕育乾坤化出流光之素雪仙方豈謬聖理昭然一覩元微明其妙旨遂著斯序分列兩篇名金虎白龍論用彰鄙識將表同人儻物外君子幸留意焉時光啓二年冬首中旬有七橫峯先生永陽子杜希遁字忘機多事之秋避禍汶郊每抵鄽中秖接大隱南陽公公頗奉道耽元悟真棲心間雅若夫發跡揚名俟之知巳夫為交者有名焉有利焉余與公交非名與利每一接未嘗不話道永日除元之又元外餘無所云故書先師藥訣相贈切希千萬保惜勿傳下士大凡方外之事豈使常人知之常人知之則自遭譴謫仙師曰欽承者紀名於元録泄慢者責身為下鬼又曰殃慶逮於九祖升沉止於一形今以青山白雲為誓勿負斯言千萬千萬瀆僖宗朝文章著名纍舉不第路出東門當川原靜處以凝望見櫺檻蕭然而起愁問於垂白荷鉏叟云是明皇吹笛樓龍吟洛水兮韻如在鳳去喬山兮君不留當昔開元之時天下無事鴻恩不間於中土鑾駕常遊於北地姚公宋公之智略動必咨謀寧王薛之忠貞出皆參侍西則秦京東則洛城八百里之歌鐘斷續五十年之寰海升平於是駐清蹕御丹楹執簫管而宸衷時悅臨曲欄而睿思俄生莫不湘絃罷彈泗磬休擊楚舞態止齊謳韻絶九天斂霧送芳景於瓊軒萬籟韜音讓嘉名於玉笛既運指而有規乃濡脣而是吹林巒兮髣佛如變寒暑兮須臾可移折楊柳之數聲鴈驚前渚落梅花之一曲鳥散芳枝自從弓劒有遺星霜頻度綺窗蕭索以將毀繡嶺連延而若故竟無六律繼當時紫府之清音空有一條是往日翠華之來路雕檐寂寞兮鏤檻堪依隙駟寧回兮煙鸞莫追三山迢遞在何處萬姓凄凉無見時宮商之杳眇難尋雲消雨散榱桷之傾欹若此月慘風悲苟非德邁三皇化敷九有龍馭雖逝鴻名不朽則斯樓也寂寞空存安得往來霑襟而稽首洵光啓時官嶺南西道觀察支使闕斯照乃有大電呈瑞靈嶽降賢上則一千年以誕闕簡冊煥乎古今闕也自漢魏至於闕絶闕茂族先世自東晉過江士族南徙以丹邱闕先君禺自安高尚不求祿仕先君由闕春州剌史公即春州府君第二子也生有奇表闕精元孝資溫凊敬事昆弟至於疏親遠屬闕天下將亂且歎曰窮理講學將非其時豹略龍闕士之志廉使美其林署為平昌討伐使州事承制加御史大夫是時歉儉後闕詔兼大司憲恩及師徒惠播閭里闕以功上聞闕光啓三年加工部尚書是秋又遷刑部闕以正道使知而後改遂刑措不用闕租賦其或稼穡將登有水闕不若神明之政也日者闕公率兵拒之㣥寇尢闕而不用得非良二千石闕金紫是歲復加右揆大闕兩浙中令以嘉辭厚闕不絶書多竭私闕有地千里有爵三公顯赫闕未嘗驕於色吝於闕於國厚於人薄於已古闕視政以其月十七日薨闕終神氣不亂顧謂闕歸勉主郡事言訖而瞑闕子撫軍若一奉上闕功成名遂善始令終闕碑闕一字州罷市闕見闕一字其得人心也如此先大闕宏闕歿闕二字繼大闕之養闕四字是日太君闕禮闕一字閨門道光先公一闕一字而闕長曰彥崇闕二字軍節度闕將孝以承家謙以處衆生闕三字之道旦明治亂之機入侍庭闈出佐軍旅次曰彥闕一字彥闕一字彥信彥特彥持彥琪彥擇闕二字前節度推官幼曰彥豐並俊秀聰敏仰稟義方號慕殞絶者數四女四人皆明惠賢淑有曹謝之風長適鎮海軍都指揮右揆吳章次方笄年未良匹次許嫁陳氏即故閩帥司空公第二子次許嫁錢氏即今兩浙中令彭城郡王愛子也副使葉公與左都押衙師位右都押衙紹香及諸都將親奉喪事各率家財送往事居知無不至傳曰周人之思召公愛其甘棠况其子乎公恩施廣於一境可謂貽厥孫謀矣以其年十一月草五日葬於郡之義成鄉貞節里一日親吏傳尚書公命曰子為賓職復典文翰我先君勳績善政當得其實願為志石以傳不朽洵受恩有日報賜無階陳讓不獲因灑泣銘曰五緯降瑞四靈效祥誕生碩臣贊我巨唐奇表嶽峙懿行蘭芳耆天柱石浮海舟航士懷恩信民歌樂康鳳書錫命虎符有光軍崇美號義洽故鄉三公爵秩千里憲章化穆二紀仁被一方威儀棣棣度量汪汪未當分閫俄驚壞梁望碑揮灑罷市淒凉佳城叶吉丹旐啓行厚地永固遺德難忘流慶令嗣闕四字
