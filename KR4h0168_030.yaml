front:
  text: 全唐文欽定全唐文卷三十元宗十一
  hash: sha256:0b51ab06f33129519f40c8cdb858c7a3b3fea57cdeb8bdda5afe6fe51428eff1
body:
  text: 夫著明莫大乎日月變通莫大乎四時若法象無憑則調理將失朕博考前記稽合舊章有渾天之名無運行之度今故探彼遺意成此渾儀必當晷運無差陰陽有序此並卿所檢校以就厥功所請録付史館宣示百寮者撫茲多愧敬依來請養人施惠患在不均裒多益寡務資適中比來公私舉放取利頗深有損貧下事須釐革自今巳後天下私舉質宜四分收利官本五分收利諸軍鎮行人家緣其身在征戍事須優矜比來頻有處分令州縣長官存問較如聞每事牽挽不異居人竟不存恤是何道理宜令所司申明前後敕嚴加處分如是侵擾委御史臺採訪奏聞爰自首春有時雨朕憂勤黎獻精禱靈祇遂蒙九元垂福百神效祉膏澤頻降嘉生繁育眷彼山川能興雲雨報功享德祀典存焉諸州所管名山大川宜令當處長官設祭務盡誠敬以昭典禮政教不修則陰陽隔併精誠有感則風雨順時頃自暮春爰涉初夏甘澤未降農務是憂所以親結壇場用伸祈禱豈神聰意達而應不逾時斯實上元昭鑒之深亦是卿等燮理之效宜加勉勵以答靈心頃自春涉夏雨未流施勤恤之心切憂農務是用寬刑宥過減膳撤懸責己祈天躬親禱祠上元垂鑒甘澤應時嘉夏種之不愆佇秋成之有望爰與㣥公卿士同荷休徵各勉其誠敬承天德爰自今春時雨愆序切憂農務無忘寢興陝雒兩郊巳聞流霔而咸京近縣尚未霑霈憫禾黍以疚懷仰雲漢而翹首投龍致祭親禱靈池誓移咎於薄躬庶垂祐於黎獻神道昭著鑒此虔誠甘澤應期嘉生遂性亦是卿等同心燮理勠力謀猷上下咸和致茲休應豐年可望慶慰良深麟鳳飛翔未為瑞也宗社垂祐陰陽順成甘澤應時庶物繁育祗奉靈慶寅畏載深宜令中書門下肅事昭報仍令所司擇日奏聞凡制令宣布皆所以為人如聞州縣承敕多不告示百姓咸使閭巷間不知旨意是何道理宜令所繇捉搦應有制敕處分事等令終始勾當使百姓咸知如施行有違委御史訪察奏聞州縣牧守等並受朕之寄助國為理實冀其共康庶績俾乂㣥氓頻經處分合盡誠節仍有不遵法式自紊紀綱貿遷營利或縱親識侵暴下人或在郵傳規求貨馬諸如此類不可具言豈教之不明而人之多僻當寧遐想深惕於懷各宜徇公以副所委古之善為邦者重人之命執法之中所以和氣洽嘉生茂今秋京城連雨隔月恐耗其藳粒而害於粢盛抑朕之不明何政之闕也永惟久雨者陰氣淩陽冤塞不暢之所致也持獄之吏不有刑罰生於刻薄輕重出於愛憎邪詩曰此宜無罪汝反收之刺壞法也書曰與其殺不辜寧失不經明慎刑也好生之德可不務乎兩京及諸州繫囚應推徒巳下罪並宜釋放死罪及流各減一等庶得解吾人之慍結迎上天之福祐布告遐邇知朕意焉河南道宋亳許仙徐鄆濮亠兊州奏旱損田宜令右監門衛大將軍黎敬仁往彼巡問如有不支濟戶應須賑恤與州縣長官相知量事處置訖回日具狀奏聞所在陂澤元合官收至於編氓不合自占然以為政之道貴在利人庶宏益下俾無失業前令括入官者除昆明池外餘並任百姓佃食邊鄙未清尚須式遏既加鎮守遂勞力役朕宵衣旰食務在安人求瘼恤隱宜從要如聞諸軍兵募處置多乖年滿之日逃亡甚衆自今巳後各委本道節度使及兵部侍郎裴光庭同檢校年終類會文奏使健兒長鎮何以克堪可分為五番每一年放一番洗沐遠取先年人為第一番周而復始每五年共酬勳五轉獻歲發生陽和在乃眷氓庶方就農桑其力役及不急之務一切并停百姓間有不穩便事須處置者宜令中書門下與所司喚取朝集使審向商量奏聞中大夫守靈州都督關內道支度營田副使檢校渾部落使上柱國白知節器蘊貞亮材推幹理從政著績在公竭誠而分牧得賢元寮碩彥宜膺往命俾諧僉屬可使持節彭州諸軍事守彭州刺史散官勳封如故主者施行邊遠判官多有老弱宜令吏部每年於選人內揀擇強幹堪邊任者隨闕補授秩滿量減三兩選與留仍加優獎凡是節日或以天氣推移或因人事表記八月五日當朕生辰感先聖之慶靈荷皇天之眷命卿等請為令節上獻嘉名勝地良遊清秋高興百穀方熟萬寶以成自我作古舉無越禮朝野同歡是為美事依卿來請宣付所司僧尼數多踰濫不少先經磨勘欲令真偽區分仍慮猶有非違都遣括檢聞奏憑此造籍以為準繩如聞所繇條例非愜致姦妄轉更滋生因即舉推罪者斯衆宜依開元十六年舊籍為之更不須造寫自今巳後綱維大德侍養權隸不得輒於外取祭主於敬神歆惟德黍稷非馨蘋藻可薦宣尼闡訓以仁愛為先句龍業官以生植為本普天率土崇德報功饗祀惟殷刲割滋廣非所以全惠養之道叶靈祇之心其春秋二祀及釋奠天下諸州府縣等並停牲牢唯用酒脯務在修潔足展誠敬自今巳後以為常式吐蕃向化遣使入朝既懷舊恩請繼前好今緣公主在彼又復蕃客欲還使於四方必資德望鴻臚卿崔琳久歷朝序備曉政途好謀而成臨事能斷俾銜國命以赴蕃庭宜令持節引入吐蕃使所司準式發遣朕虔守宗祧祗膺歷數夙夜兢惕懼不克勝求賢臣而委之謀猷延學者而咨其博洽用扶不逮雅致咸和既內平而外成且刑清而訟息端拱多暇留意典墳以為道者元妙之宗德為教化之本講諷微旨稽詳祕文庶無為而政成不宰而物應豈敢比德堯舜論功禹湯者哉然必先正其心深思逮於遐邇務惟齊俗亦欲申於兆庶必若同歸清淨共守元默所陳編示良用多慙宏濟艱難參其功者時傑經緯禮樂贊其道者人師式瞻而百度允釐既往而千載遺範台衡軒鼎垂黼藻於當今徽策寵章播芳蕤於後葉故開府儀同三司尚書左丞相集賢院學士知院事上柱國燕國公張説辰象降靈雲龍合契元和體其沖粹妙有釋其至賾挹而莫測仰之彌高精義探繫表之微英辭鼓天下之動昔侍春誦綢繆歲華含舂容之聲叩而盡應蘊泉源之智啓而斯沃授命興國則天衢以通濟用和民則朝政惟允司鈞總六官之紀端揆為萬方之式方宏風緯俗返本於上古之初而邁德振仁不臻於中壽之福于嗟不憗既喪斯文宣室餘談泠然在耳玉殿遺草宛留其迹言念忠賢良深震悼是使當寧撫几臨樂徹懸罷稱觴之儀遵往襚之禮可贈太師賜物五百段開府儀同三司兼殿中監霍國公內外間廄監牧都使王毛仲是惟微細非有功績擢自家臣升于朝位恩寵莫二委任斯崇無涓塵之益肆驕盈之至往屬艱難遽茲逃匿念深惟舊義在優容仍荷殊榮蔑聞悛悔在公無竭盡之效居常多怨望之詞迹其深愆合從誅殛恕其庸昧宜從遠貶可瀼州別駕員外置長任差使馳驛領送至任勿許東西令式條流科制明具行之巳久亦便於人比者天下勳官加資納課又因犯入罪罰鎮配州言念於茲有乖寬恤宜各依令式處分其先罰鎮及配隸人未歸者並即放還百靈降福庶尹叶心陰陽調而生植以滋政理孚而黎獻咸若由庚知萬物之樂華黍洽三農之慶信可以率禮輔仁式歌且舞者矣況生成式序氤氳致和卉物發榮池籞含麗思順時令以申惠澤咸宜邀歡芳月繼賞春風夙夜在公既同咸一之理休沐式宴俾共升平之樂中書門下及供奉官嗣王郡王左右丞相少傅賓客諸司三品以上長官侍郎郎官少監少卿少匠司業少尹兩縣令都水使者朝集使上佐巳上并雜處未赴任者及東宮諸司長官中舍中允少詹事諭德中郎率蕃官三品以上至春末巳來每置暇日宜準去年正月二十九日敕賜錢造食任逐勝賞法以間邪刑以助化因時而用蓋非獲巳朕自臨御天下憂勞庶務以至誠感物道既有孚以致理和人仁或繇巳豈欲以刑制政期於以化清刑故不用殊絶之誅每施寬大之令而遷善者衆犯法者寡斷獄十數聞諸有司然猶一夫不獲在豫實懷多愧寰宇殷廣京都浩穰繫于徽纆或未聽理逮捕斯擾糧饋為勞生業或虧何以卒歲言念於此深用憫然況今長嬴在辰耘耨斯切順時立政存於恤人思宏在寬之典庶無留獄之弊其天下囚徒即令疏決其妖説盜賊造偽頭首既深蠧時政須量加懲罰刑名致死者各量決重杖一百長流嶺南自餘支黨被其詿誤矜其至愚量事科罰使示其懲創流巳下罪並節級處分令中書門下就大理及府縣詳理釋迦設教出自外方漢主中年漸於東土説茲因果廣樹筌蹄事涉虛元渺同河漢故三皇作乂五帝乘時未聞方便之門自有雍熙之化朕念彼流俗深迷至理盡軀命以求緣竭資財而作福未來之勝因莫效見在之家業巳空事等繫風猶無所悔愚人寡識屢陷刑科近日僧徒此風尤甚因緣講説眩惑州閭溪壑無厭唯財是斂津梁自壞其教安施無益於人有蠧於俗或出入州縣假託威權或巡歷鄉村恣行教化因其聚會便有宿宵左道不常異端斯起自今巳後僧尼除講律之外一切禁斷六時禮懺須依律儀午後不行宜守俗制如犯者先斷還俗仍依法科罪所在州縣不能捉搦并官吏輒與往還各量事科貶夫釋氏之旨義歸真寂爰置僧徒以奉法教而趨末忘本托華棄實假託權便之門以為利養之府徒蠲賦役積有姦訛至於浮俗奔馳左道穿鑿言念淨域浸成逋藪非所以叶和至理宏振王猷宜有澄清以正風俗朕先知此弊故預塞其源不度人來尚二十餘載訪聞在外有三十巳下小僧尼宜令所司及州府括責處分惟彼釋道同歸凝寂各有寺觀自合住持或寓迹幽間潛行閭里陷於非辟有足傷嗟如聞遠就山林別為蘭若兼亦聚衆公然往來或妄託生緣輒有俗家居止即宜一切禁斷京雒兩都是唯帝宅街衢坊市固須修整比聞取土穿掘因作穢污坑塹四方遠近何以瞻矚頃雖處分仍或有違宜令所司申明前敕更不得於街巷穿坑及取土其舊溝渠令當界乘間整頓疏決牆宇橋道亦當界漸修不得廣有勞役奚壽斤往因脅從遂同逆命俘虜而至罪則難容收其悔過之心免其殊死之責推誠待物果獲忠臣此皆卿等輔翊之所致豈朕薄德之能感書之册以示將來當斯美名良用慙惕設官分職本資共理無隔中外更遞出入比者考官計年除改緣其任久堪與遷移遂長僥求爭次入考所司情故公然遣來若更因循有損風化今年考使事了並勒還州必政理著聞當別有處分其年齒衰暮疾疢帛丿糸積無別違者宜聽致仕天生蒸民樹之司牧將興化濟俗育物阜時朕對越明靈作人父母因地利以觀穡樂歲成而報功期於富庶俾之寧輯故嘗納隍夕惕負扆晨興受一服則思紵績之勤務三時則憂犬畝之害每因水潦方降則使隄防必葺去歲巳來頻有處分所繇慢或未躬勤河南數州致滋水損州縣牧宰何以自安被損之家何以存濟宜令戶部侍郎張敬輿宣慰覆如實有損貧下不支濟百姓量事賑給務令憂恤稱朕意焉太上立德其次立言所以稽象緯而垂訓誡也卿博古知今通才達識處弼諧之任則忠讜日聞綜墳籍之司則文儒道長今欲正人倫而美教化因舊史而作春秋斥班馬之紕繆繼經傳之褒貶著述之美當如斯焉將以先朝取朕裁定雖憲章前烈而事業相懸卿且就功隨了續進虔奉宗社昭事天地幸蒙垂祐降此禎祥豈自厥中以彰其外歸之於朕是用多慚宣付史官依卿所請相州往緣親王出牧修造非常宏壯兼之亭榭林木故非臣下所居遂使闕不安穩宜令州司即改造廳衙及刺史宅其無用樹等亦須除伐自餘州縣有不安穩者亦任量事移改仍逐間月漸修不得勞擾百姓寒食上墓禮經無文近代相傳浸以成俗士庶有不合廟享何以用展孝思宜許上墓拜掃申禮於塋南門外奠祭撤饌訖泣辭食饌任於他處不得作樂仍編入五禮永為常式古者諸侯舉士必本於鄉曲府庭署吏亦先於行能所以人自束修官無敗政及乎魏承漢弊權立九品今之吏部用是因循入仕寖多為法轉密然於濟理求才未聞深識持衡取士徒立煩文朕寤寐永懷每以怊悵夫琴瑟不調者改而更張法令不便者義復何異頃者有司限數及拘守循資遂令銓衡不得揀拔天下賢俊屈滯頗多凡人三十始可出身四十乃得從事更造格限分品為差若如所制之文六十尚不離一尉有才能者始得如此稍敦朴者遂以終身由是取人豈為明恕自今以後選人每年總令赴集仍舊以三月三十日為限其中有才優業異操行可明者一委吏部臨時擢用貴於取實何限常科雖遠郡下僚名迹稍著亦須甄拔令其勸勉俾人思為善之利俗思進取之途朕所責成實在吏部可舉其大略令有所依比者流外奏申乃引過門下簿書堆盈於瑣闥胥吏填委於掖垣豈是事宜過為煩碎自今以後亦宜依舊道教釋教其來一體都忘彼我不自貴高近者道士女冠稱臣子之禮僧尼企踵勤誠請之儀以為佛初滅度付囑國王猥當負荷願在宣布蓋欲崇其教而先於朕者也自今巳後僧尼一依道士女冠例無拜其父母宜增修戒行無違僧律興行至道俾在於此道貴以誠神無不應豈朕之先意亦卿之用心川嶽效靈甘霖並洽請行賽禮深得事機宜宣付史館用依來請尚書雅誥周易精微朕幼奉師資未窮奧義故時令講説耳至乎莊子及道德經遞為表裏詳其所指觸類繁多既問廣成之道復得方明之相況之今日千載一時故宏斯義以喻卿也編諸牘隨卿意焉元元之教家國是資匪為先宗貴申道本所以首歲元日因行春令清淨之政期諸相國乎為官擇才可以先淳素也爰開集賢引進儒道退朝講讀蓋亦其常歲月周旋頗尋章句其雅誥則稽之於古以質於今其道真則取之於真不崇其放理國之要可不然乎宣付史官依卿所請秦州地震謫見后土朕每克念何以臻茲仲尼有云某禱久矣而精意以告或通神明徐國公蕭嵩地在輔弼朝之端右欲重將命暫為此行宜往秦州致祭山川凡緣所損百姓間事皆委嵩隨事處置回日以聞博學多才道術醫藥舉人等先令所司表薦兼自聞達敕限以滿須加考試博學多才舉人限今來四月內集道術醫藥舉人限閏三月內集其博學科試明經兩史巳上帖試稍通者多才科試經國商略大策三道并試雜文三道取其詞氣高者道術醫藥舉取藝業優長試練有效者宜令所繇依節限處分春秋祈報郡縣常禮比不用牲豈云血祭陰祀貴臭神何以歆自今巳後州縣祭社特以牲牢宜依常式風化之本其在庠序去秋不熟生徒暫令就舍講習之地安可久間其兩監生在外者即宜赴學春來多雨歲事有妨朕自誠祈靈祇降福以時開霽迄用登成永惟休徵敢忘昭報宜令所司擇日享九廟仍令高品祭五嶽四瀆其天下名山大川各令所在長官致祭務盡誠潔用申精意朕憂於理人委任牧宰雖巳分命仍未盡誠如聞刺史新除所蒞不過數月即營入計無心在州政教闕如朝計安在自今巳後刺史到任皆不得當年入考若聲績稍著獎拔未遲何遽不安自彰汲汲其縣令差使先亦禁斷比聞在遠猶自故違宜委諸道採訪申明處分勿使如此每渴賢良無忘鑒寢頃雖虛佇未副旁求其或才有王霸之略學究天人之際知勇堪將帥之選政能當牧宰之舉者五品以上清官及軍將都督刺史各舉一人孝弟力田鄉閭推挹者本州刺史長官各以名聞農作是時人無棄日所在獄訟或有滯留其都城巳令中書門下疏理其京城及北都各委留守天下諸州委本道採訪使及本州長官隨事決斷勿令冤繫徒以下罪並量決罰便放其官典犯贓宜準常式如聞關輔蠶麥雖稍勝常年百姓所收才得自給若無優假還慮艱弊其先欠百司職田及諸色應合至蠶麥時徵巳有處分訖其公私舊債亦宜停徵貧下百姓有傭力買賣與富兒及王公巳下者任依常式天下百姓口分永業田頻有處分不許買賣典貼如聞尚未能斷貧人失業豪富兼并宜更申明處分切令禁止若有違犯科違敕罪升中于天帝王盛禮蓋謂臻茲淳化告厥成功今兆庶雖安尚竭豐年之慶邊疆則靜猶有踐更之勞況自愧於隆周敢追迹於大舜頃年迫於萬方之請難違多士之心東封泰山於今惕厲豈可更議嵩華自貽慚恧雖藉公卿共康庶政永惟菲薄何以克堪朕意必誠宜斷來表也僧徒固請欲以興教心有所得輒復疏之今請頒行仍慮未愜朕承祖宗福德至於享祀粢盛實思豐潔禮物之具諒在昭忠其非芳潔不應法制者亦不可用文學政事必在考言孝弟力田必須審行頃從一概何謂四科其孝弟力田舉人宜各自疏比來事迹為鄉閭所委者朕當案覆別有處分武溫眘聚合姦黨託附權要妄搆異端為其魁傑兼有私穢合當極法宜重杖決一百河南府福昌縣主簿魏萱前睦州桐廬縣尉王延祐相為黨與朝夕談議既涉非違宜各決一頓長流竇州德莫大於生成福莫先於壽考苟有所主得無祀之今有上事者言仲秋日月會於壽星以為朕生於是月欲以配社而祭於義不倫且壽星角亢也既為列宿之長復有福壽之名豈惟朕躬獨享其應天下萬姓寧不是懷蓋秦時巳有壽星祠亦云舊矣宜令所司特置壽星壇嘗以千秋節日修其祀典申敕壽星壇宜祭老人星及角亢七宿著之常式
