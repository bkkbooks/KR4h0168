front:
  text: 全唐文欽定全唐文卷三百七十八子建天寶朝官御史
  hash: sha256:af306abd69f746c4465072664a742442f4e553b11778184e0bf99e0f473d4158
  markers:
  - {type: head, offset: 14, content: 裴子建, id: KR4h0168_NFKB_378-h1, level: 1}
body:
  text: 選賢觀德存乎射義為邦之度因文物以肅陳將祭之儀必先朝而慎習於是審茲貍步張彼熊侯揖至讓升和容顯於相圃持弓挾矢雅頌彰乎澤宮司馬分進退之規工人奏蘋蘩之節百禮式序五善無替既有備於置楅復何遽於設中法官執此書欲行觥撻訴者確乎執禮憑於名制用捨之道抑有司存且列國諸侯擇士而祭自守彞憲無相奪倫事乃屬於邦君罪寧歸於彼甲緬稽古訓斯為正典得失之旨居然可知禮典之制期諸豐潔祼鬯將行無宜秕稗是以有司卜日而頒教所由先庚而讀法故能籩豆有楚殷薦聿修皇祖降歆萬壽攸酢孝孫有慶百祿是荷若後時而不陳則臨事而或闕偶俱罹謗須一辨明彼以不戒視成居然有罰此以未承憲令無狀可明俱曰官臣當須慎守自貽伊怒尚欲奚為喪制孔昭復禮攸設公侯以下非無降殺用明沿襲且辨等威求彼平生振衣裳而有處號之某甫冀魂魄而知歸至如衮冕是陳爵弁斯列用捨之際抑亦有殊甲實伊何昧我常度未明死者之貴賤罕識凶儀之重輕自可憲章宣尼每事有問何乃祖述季路率爾而行法則無稽難為叔氏之許舉而不物豈免先王之誅白彈違固其宜也士源宜城人著亢倉子孟浩然字浩然襄陽人也骨貌淑清風神散朗救患釋紛以立義表灌蔬藝竹以全高尚交遊之中通脫傾葢機警無匿學不為儒務掇菁藻文不按古匠心獨妙五言詩天下稱其盡美矣閒遊祕省秋月新霽諸英華賦詩作會浩然句曰微雲淡河漢疎雨滴梧桐舉坐嗟其清絕咸閣筆不復為繼丞相范陽張九齡侍御史京兆王維尚書侍郎河東裴朏范陽盧僎大理評事河東裴總華陰太守鄭倩之守河南獨孤策率以浩然為忘形之交山南採訪使本郡守昌黎韓朝宗謂浩然閒代清律寘諸周行必詠穆如之頌因入奏與偕行先揚於朝與期約日引謁及期浩然會寮友文酒講好甚適或曰子與韓公豫諾而忘之無乃不可乎浩然叱曰僕已飲矣身行樂耳遑恤其它遂畢席不赴由是閒罷既而浩然亦不之悔也其好樂忘名如此士源它時嘗筆讚之曰導漾挺靈實生楚英浩然清發亦自其名開元二十八年王昌齡遊襄陽時浩然疾爾發背且愈相得歡甚浪情宴謔食鮮疾動終於冶城南園年五十有二子曰儀甫浩然文不為仕佇興而作故或遲行不為飾動以求真故以誕遊不為利期以放性故常貧名不繼於選部聚不盈於擔石雖屢空不給而自若也士源幼好名山行年十八首事陵山踐止恒嶽咨求通元丈人又過蘇門問道隱者元知運太行採藥經王屋小有洞太白習隱訣終南修亢倉子九篇天寶四載徂夏詔書徵謁京邑與冢臣八座討論山林之士麕至始知浩然物故嗟哉未祿於代史不必書安可哲蹤妙韻從此而絕故詳問文者隨述所論美行嘉聞十不紀一浩然凡所屬綴就輒毀棄無復編錄常自歎為文不逮意也流落既多篇章散逸鄉里搆採不有其半敷求四方往往而獲既無他事為之傳次遂使海內衣冠縉紳經襄陽思覩其文蓋有不備見而去惜哉今集其文詩二百一十八首分為四卷詩或缺逸未成而製思清美及他人詶贈咸錄次而不棄耳冕字章甫河中河東人以蔭再調渭南尉歷殿中侍御史為河西節度使行軍司馬元宗入蜀詔皇太子為天下兵馬元帥拜冕御史中丞兼左庶子副之肅宗即位進中書侍郎同中書門下平章事罷為尚書右僕射兩京平封冀國公出為劒南西川節度使大歷中拜左僕射同中書門下平章事兼河南江淮副元帥東都留守卒贈太尉聖德動天湛恩育物齋心甲夜稽首梵筵助元造於慈元登蒼生以壽域休徵允答聖功契符騰神光於玉毫發睟容於金殿宮中咸覩夜復如初臣等得奉殊祥無任歡欣之至伏請編諸史冊宣示中外頃者逆寇亂常悖違天紀六位回薄三光失序上皇南巡以避狄㣥臣東沒而面偽當此時也勇者不及奮智者不及謀則高祖太宗之業將墜於地矣上皇知聖嗣在昌人望大啟乃付陛下以天地之事將復高祖太宗之業告成功於天伏惟陛下至孝恭順格於天地不敢以翦逆夷難之務為上皇憂遂乃赫然龍驤雷動朔野以一旅之眾康天下之迍躬堯之聰明廣聽天下率禹之勤儉以先兆人孝通德茂格乎三極故蠻夷君長來庭於要荒之外五玉寶龜納錫於旌門之內其行如雲其植如山莫不裂眥致命開懷飲鏃死而後已實乃甘心是以猰狗噬脛而遇毒奔鯨觸綸而皆斃大風一鼓而沴氣廓清斯實再造生人之極也陛下以上皇未至延俟鑾輿清宮待幸守而不失今上皇戾止昭德報功廣聖崇本之義徵王者未舉之禮百神奉職親受寶符過堯邁舜以慶天下以陛下有光上皇之德經天下之文定禍亂之武窮不測之聖通神明之孝故命陛下曰光天文武大聖孝感皇帝皆象德景行自然之符陛下尚執謙沖遷延若未當者今㣥臣咸服睿謀肅將天威猶各有茅土銘勳景鐘陛下盛德大業終古獨立不速即徽號以蔚皇圖臣恐天地神祇勤勞仰止臣謹與太常禮官等僉擇請以來歲正月五日上尊號伏惟陛下膺天地之誠恭上皇之命遂㣥臣之請滿百靈之心延光無窮天下幸甚泌字長源其先遼東襄平人徙居京兆天寶中自嵩山上書召見待詔翰林為東宮供奉肅宗北巡至靈武泌奔赴行在授銀青光祿大夫掌樞務判元帥廣平王軍司馬事拜中書令乞隱衡山代宗立召為翰林學士德宗在奉天授左散騎常侍貞元三年拜中書門下平章事累封鄴縣侯五年卒年六十八贈太子太傅賊掠金帛子女悉送范陽有苟得心渠能定中國耶華人為之用者獨周摯高尚等數人餘皆脅制偷合至天下大計非所知也不出二年無寇矣陛下無欲速夫王者之師當務萬全圖久安使無後害今詔李光弻守太原出井陘郭子儀取馮翊入河東則史思明張忠志不敢離范陽常山安守忠田乾真不敢離長安是以三地禁其四將也隨祿山者獨阿史那承慶耳使子儀毌取華令賊得通關中則北守范陽西救長安奔命數千里其精卒勁騎不踰年而斃我常以逸待勞來避其鋒去翦其疲以所徵之兵會扶風與太原朔方軍互擊之徐命建寧王為范陽節度大使北並塞與光弻相掎角以取范陽賊失巢穴當死河南諸將手必得兩京則賊再強我再困且我所恃者磧西突騎西北諸戎耳若先取京師期必在春關東早熱馬且病士皆思歸不可以戰賊得休士養徒必復來南此危道也府兵平日皆安居田畝每府有折衝領之折衝以農隙教習戰陳國家有事徵發則以符契下其州及府參驗發之至所期處將帥按閱有教習不精者罪其折衝甚者罪及刺史軍還則賜勳加賞便遣罷之行者近不踰時遠不經歲高宗以劉仁軌為洮河鎮守使以圖吐蕃於是始有久戍之役武后以來承平日久府兵浸墮為人所賤者百姓恥之至蒸熨手足以避其役又牛仙客以積財得宰相邊將效之山東戍卒多齎繒帛自隨邊將誘之寄於府庫晝則苦役夜縶地牢利其死而沒入其財故自天寶以後山東戍卒還者什無二三其殘虐如此然未嘗有外叛內侮殺帥自擅者誠以顧戀田園恐累宗族故也開元之末張說始募長征兵謂之彍騎其後益為六軍及李林甫為相奏請軍皆募人為之兵不土著又無宗族不自重惜忘身徇利禍亂遂生至今為梗曏使府兵之法常存不廢安有如此下陵上替之患哉陛下思復府兵此乃社稷之福太平有日矣貺字惠卿贈工部尚書子元子子元卒有詔訪其後擢起居郎歷右拾遺內供奉修國史唯農是務經國之令典日服其鎛長人之美訓皇上躬耕千畝儀型萬邦天報嘉祥風雨時若人惟善誘遠近咸勸甲也思趙過之有誨比樊遲之請學爰屬農政務興土膏脈起家徒四壁人無五牸是藨是蓘既失於協風或耕或耘載愆於零雨實差龍見之序謬以牛少為說漢史著區種之術唐臣首代田之教長沮故事則非假於服箱勝之遺文亦無資於負軛既推司里之禁宜處惰農之刑自昔議邊者推高於嚴尤班固嚴尤議曰御匈奴自古無得上策云云貺以為嚴尤之議辯而未詳班固之論詳而未盡推而為言周得上策秦得其中漢無策焉何以言之荒服之外聲教所不逮其叛也不為之勞師其降也不為之釋備嚴其守禦險其走集犯塞則有執訊之捷深入則有殪戎之勳俾其欲為寇而不能願臣妾而不得斯御戎之上策禁暴之良算惠此中夏以綏四方周人之道也貺故曰周得上策易稱王侯設險以固其國築長城修障塞易之設險也今朔塞之上多古長城未知起自何代七國分爭國有長城趙子起長城以備胡燕秦亦築長城以限中外則長城之作其來遠矣秦兼天下益理城塹城全國滅人歸咎焉自漢至隋因其成業或修或築何代無之後魏時築長城議曰虜騎輕捷風來電往塢壁未遑閉牛羊不暇收雷擊至於近郊雲飛出於塞表不得不立長城以備之人築一步千里之城役三十萬人不有旬朔之勞安獲久長之逸始皇斥中國之戍出諸塞表匈奴不敢南下而牧馬戰士不敢彎弓而報怨貺故曰秦得中策史稱劉敬說高祖以魯元公主嫁匈奴嗣王則漢之外孫豈敢與大父爭哉假立宗女匈奴不信無益也帝欲遣魯元后泣諫曰帝唯一女奈何棄之匈奴乎由是遣宗女行又按魯元公主則趙王張敖之后也人告王反呂后言趙王以公主故不宜有此高祖曰使張敖有天下豈少乃女乎高祖審魯元公主不能止趙王之謀而謂能息匈奴之叛耶假有欲遣之辭固戲言爾且冒頓手刃頭曼躬射其母而冀其不與外祖爭強豈不惑哉然則高祖之和親不能久安而為之者以天下初定苟舒歲月之禍以息兆人之勤爾而天姿豁達不矜智能沈謀內斷人莫之識武帝時中國康寧胡寇益鮮疎而絕之此其時也方更糜耗華夏連兵積年嚴尤以為下策可矣漢之失策非止用兵至於昭宣武士練習斥堠精審胡入則覆亡居又畏逼收跡遠徙窮竄海陰朝廷不遵宗周之故事乃襲奉春之過舉啟寵納侮傾竭府藏給西北方無慮歲二億七十萬賞賜之費傳送之勞尚不計焉皇室淑女賓於穹廬掖庭良人降於沙漠夫貢子女方物臣僕之職也詩曰莫敢不來享莫敢不來王傳稱荒服者來王此皆稱其來不言當往也用夷禮經貶其爵公及吳盟諱而不書奈何以天子之尊與匈奴約為兄弟帝女之號與胡媼並為戎妻烝母報子從其汚俗中國之異於蠻夷者以有父子男女之別也若乃位配天地職調陰陽不能革聾昧之性使漸習華風反令婉冶之姿毀節異類其為垢辱可勝道哉漢之君臣常莫之恥東漢至曹馬招來羌狄內之塞垣資奉所費有踰於昔百人之酋千口之長金印紫綬食王侯之俸者相半於朝牧馬之童乘羊之隸齎毳毼之資邀綾紈之利者相錯於路九州五服耒耨之所利絲枲之所生方三千里植於三千里之中散於數萬里之外人焉得不勞國焉得不貧故夷狄歲驕華夏日蹙當其強也又竭人力以征之及其服也又如是以養之病則受養強則內攻嗚呼為羌胡服役且千載而莫之恤可不大悲哉為政者誠能移其財以賞戍卒則吾人富矣移其爵以餌守臣則我將良矣富利歸於我危亡移於彼無納女之辱無傳送之勞此之不為而棄同即異與頑用嚚以夷亂華以裔謀夏變上國之風俗汨中和之正氣貺故曰漢無策焉嚴尤深以古無上策者為不能臣妾也聖王誠能之而不用爾秦氏無策者謂其攘夷狄而亡國也秦亡之咎非攘夷也稱漢氏得下策者謂伐胡而人病人既病矣又役人而奉之是無策也貺故曰嚴尤之議辯而未詳者也班固之論頗究其情而曰其來慕義接以禮讓使曲在彼是未盡也何者禮讓以交君子不以接小人況於禽獸夷狄乎夫奇貨內來則華夏之情蕩纎麗外散則戎羯之心生華夏情蕩出兵之源也戎羯心生侵盜之本也聖人唯此之慎不貴奇貨不寶遠物禽獸非其土性不育器服非其所產不御豈惟贄幣不通哉至飲食聲樂不與共之故夷狄來朝坐之門外使舌人體委以食之若禽獸然不使知馨香佳味也獲其聲不列於庭廟受其貢不過楛矢獸皮不為贄幣不為財貨利既小矣酬亦宜然漢氏習玩驕虜使悅燕趙之名倡雅質甘太官之八珍六齊使五都之文綺羅紈供之則長欲而增求絕之則滅德而招怨加以斥堠不明士卒不習是由飽豺狼以良肉而縱其獵噬疲人求其禍源接以禮讓之所致也故通貢獻則去錦繢而得毛革討負約則獲犬馬而喪士人許和親則毀禮義而順戎俗張騫使西域得摩訶兠勒曲漢武採之以為皷吹東漢魏晉樂則胡笛箜篌御則胡床食則貊炙器則蠻盤祠則胡天晉末五胡遞居中夏豈無天道亦人事使之然也華人步卒也利險阻虜人騎兵也利平地彼則馳突我則堅守無與追奔無與競逐來則杜險使無進去則閉險使無還衝以長㦸臨以強弩非求勝之也創之而已措彼頑兇寘之度外譬諸蟲豸方乎虺蜴如是何禮讓之接何曲直之爭哉貺故曰班固之論詳而未盡者此也餗字鼎卿贈工部尚書子元子天寶初歷集賢院學士兼知史官終右補闕王右軍蘭亭序梁亂出外陳天嘉中為僧所得至大建中獻於宣帝隋平陳日或以獻晉王王不之寶後智果從帝借搨及登極竟不從索果師死後弟子僧言得之太宗為秦王日見搨本驚喜乃貴價市大王書蘭亭終不至也乃遣問辯才師歐陽詢就越州求得之以武德四年入秦府貞觀十年乃搨十本以賜近臣太宗崩中書令褚遂良奏蘭亭乃先帝所重本不可留遂祕於昭陵迺字永夷河南伊闕人天寶中進士累官民部郎中充浙西留後大歷中遷兵部侍郎朱泚作亂迺臥疾私第聞車駕幸梁州投牀搏膺不食卒年六十贈禮部尚書諡貞惠維大歷十四年五月甲子皇帝使金紫光祿大夫尚書左僕射彭城郡開國公攝太尉劉某持節冊命曰惟爾太尉兼中書令汾陽郡王某其聽命於戲上天孚佑下民若保赤子弗俾罹此於毒螫伊昔殷卒秦季萬姓愁苦時則有太公望留侯良毗武翼高為之請命若顛覆而躋執熱斯濯其在天寶至德之際二叛稱兵犬戎孔亟則公投袂電赴捍我於艱方其憂亂化為安靖然後燮和徐進清廣安和繄公之勳業蓋於張呂矣憫予小子哀㷀在疚公又熙帝之采納於軌度小大謀猷罔不率服實賴公羽翼為師為保豈齷齪常典擬於春秋之裦今故持冊公尚父之號欽哉公左右三朝年與德耆尚迪古訓匡予不及節順風雨參知鼎實天人之任將以仰成公其念哉惟公克享黃髮優游廣堂頤神導和克綏予任勗哉敬聽誥言尚父用成其明德欽哉光膺寵命可不慎歟虞書稱知人則哲能官人則惠巍巍唐虞舉以為難今文部既始之以掄才終之以授位是則知人官人斯為重任昔在禹稷皋陶之眾聖猶曰載采采有九德考績以九載近代主司獨委一二小冢宰察言於一幅之判觀行於一揖之內何其易哉古今遲速何不侔之甚哉夫判者以狹詞短韻語有定規為體亦猶以一小冶而鼓眾金雖欲為鼎為鏞不可得已故曰判之在文至局促者夫銓者必以崇衣冠自媒耀為賢斯又士之醜行君子所病若引周公尼父登之於銓庭則雖有圖書易象之大訓以判體挫之曾不及徐庾雖有淵默罕言之至德以喋喋取之曾不若嗇犬嗚呼彼干霄蔽日誠巨樹也當求尺寸之材必後於椓杙龍吟虎嘯誠希聲也若尚頰舌之感必下於蛙黽觀察之際能不悲夫執事慮過龜策文含雅誥豈拘以瑣瑣故事曲折因循哉誠能先咨以政事次徵以文學退觀其理家進察其臨節則龎鴻深沈之士亦可窺其門戶矣秀實字成公隴州汧陽人天寶中歷官太常卿拜涇州刺史大歷元年加開府儀同三司拜御史大夫四鎮北庭行軍涇原鄭潁節度使德宗立就加檢校禮部尚書封張掖郡王除司農卿建中四年朱泚盜據宮闕秀實以笏擊泚中顙流血遂被害年六十五興元元年贈太尉諡曰忠烈臣聞天子曰萬乘諸侯曰千乘大夫曰百乘此蓋以大制小以十制一也尊君卑臣強幹弱枝之義在於此矣今外有不庭之虜內有梗命之臣竊觀禁兵不精其數削少卒有患難將何待之且猛虎所以百獸畏者為爪牙也若去其爪牙則犬彘馬牛悉能為敵伏願少留聖慮冀裨萬一
