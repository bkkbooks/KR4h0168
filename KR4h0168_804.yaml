  text: 全唐文欽定全唐文卷八百四允章字蘊中贈禮部尚書乃曾孫舉進士纍官翰林學士承旨禮部侍郎咸通中出為鄂州觀察使檢校工部尚書東都留守黃巢犯洛陽汙偽命廢於家
  hash: sha256:bdfa63fcda20f61d5ea76dc97aa5d82e5a72e39402972cc864b58e6cdc0de67b
