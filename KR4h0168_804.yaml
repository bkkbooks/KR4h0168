body:
  text: 救國賤臣前翰林院學士劉允章謹冒死上諫皇帝陛下臣聞太直者必孤太清者必死昔朝錯勸削諸侯之地以蒙不幸之誅商鞅除不軌之臣而受無辜之戮今并臣三人矣守忠懷信口不宣心則刎頸刳腸向闕廷而死者并臣是也救國策從千里而來欲以肝腦上污天庭欲以死尸下救黎庶臣死之後不見聖代清平故留賤臣以諫明主今短書一封不入長策伏蒙不收所以仰天捶胸放聲大哭殺身則易諫主則難以易死之臣勸難諫之主伏見陛下初登九五頒下諸州開直諫門言者無罪四方雷震百里奔馳至闕廷者願陛下致升平之業矣陛下既不用其策不捨其過或鞭撻市朝囚禁園苑深埋溝壑者不知其數乞食道路者不記其名夫輸忠獻策之臣匍匐闕廷者豈敢欺陛下乎大臣愛位而不敢言小臣畏死而不敢諫忘生請死之罪往往冒死天庭者知陛下覺悟也伏聞樞密之事要在纖人以宰臣為度外之官以御史為不速之任寃者不得伸君子所以深藏小人所以深亂自古帝王以御史為耳目以宰相為股肱股肱廢則不能用耳目蔽則不能視今陛下廢股肱蔽耳目塞諫諍罪忠良欲令四海不言萬方鉗口可不畏也臣恐千秋萬歲説陛下不聖笑陛下不明臣所以急也當今天下求進之臣智者不肯自言不肖愚者不肯自言不賢故使賢愚混雜善惡同㣥真智真愚何所分別取之則善惡進捨之則賢愚退何不使至愚在野至賢入仕今天下食祿之家凡有八入臣請為陛下數之節度使奏改一入也用錢買官二入也諸色功優三入也從武入文四入也虛銜入仕五入也改偽為真六入也媚道求進七入也無功受賞八入也國有九破陛下知之乎終年聚兵一破也蠻夷熾興二破也權豪奢僭三破也大將不朝四破也廣造佛寺五破也賂賄公行六破也長吏殘暴七破也賦役不等八破也食祿人多輸稅人少九破也臣聞自古帝王終日勸農猶恐其飢終日勸桑猶恐其寒此輩不農不桑坐食天下欲使天下之人盡為將士矣舉國之人盡為僧尼矣舉國之人盡為劫賊矣欲使誰人蠶桑乎今天下蒼生凡有八苦陛下知之乎官吏苛刻一苦也私債徵奪二苦也賦稅繁多三苦也所由乞斂四苦也替逃人差科五苦也寃不得理屈不得伸六苦也凍無衣飢無食七苦也病不得醫死不得葬八苦也仍有五去勢力侵奪一去也姦吏隱欺二去也破丁作兵三去也降人為客四去也避役出家五去也人有五去而無一歸有八苦而無一樂國有九破而無一成官有八入而無一出凡有三十餘條上古以來未之有也天下百姓哀號于道路逃竄于山澤夫妻不相活父子不相救百姓有寃訴于州縣州縣不理訴于宰相宰相不理訴于陛下陛下不理何以歸哉伏見蠻寇欺侵神道誑惑我國家作亡命之渠魁為逋逃之窟穴徵兵五年今日誅之何見之晚也臣聞卻以疑未終銷兵于當時本無養兵日為亂臣張本也今不除其亂本而除其亂苖士卒蕩盡于中原玉帛多亡于道路嶺外仍令節度四面討除蒼生嗷嗷何負陛下令行此討罰以為上策臣恐今年除一承嗣明年又生一承嗣天下征戰未有了期則禍難起于腹心蜂蠆生于手足陛下左右無人敢言但知潤色美詞悅情暢志而已豈知千里零落萬里凋殘者哉今國家狼戾如此天下知之陛下獨不知之天下不敢言臣獨言之萬死一生臣死一介之命救萬人之命臣今雖死猶勝于生臣獻策千條未蒙一問羈孤貧病流落風塵眷戀朝廷而不能去儻陛下覽臣愚見知臣愚忠則理亂斯須存亡瞬息太平之日昭然目前必也陛下不以萬國為心不以百姓為本臣當幸歸滄海葬江魚之腹不忍見國難危臣之願畢矣臣懇劈不勝痛切感懼之至景風咸通中官吏部侍郎後謫守漳浦公諱艾字士年南陽人也仕魏為征西將軍平闕又加太尉僕每覽魏志及公列傳未嘗不撫卷沉吟移日惆悵公生不逢湯武之運徒懷伊呂之才功成見誅深可憤然晉武踐祚欽公高名追録前勳修紀後祀我太宗之征薛舉于安定也爰整武將親董六師公持以神兵寤寐斯見介胄森爽請先啓行太宗為之動容將士於焉感奮同心協力除剪凶殘軍牙彗張冠蓋星飛烈風拔木迅雷破山果得金鼓來陳一戰而勝帝念於靈遂立祠邠山封建壇宇春秋奠享號曰明公其居也岧嶢一峯嵳峩數仞南臨太谷則吐納風煙北帶長涇則川原四望蕭條草木如聞錯錯之聲香靄雲煙似對堂堂之氣雄容壯觀凜然如生士庶薦福昭然必驗大哉公也自非道貫乾坤精通宇宙者其孰能之此關內河東副元帥司徒兼中書令汾陽郡王總戎出鎮翰國於茲仰公休風躬親致祭且嘆公抱恨刊石竪碑垂名志傳示德華夷豈惟一代之臣獨稱魏將抑亦千載之下更作唐神景風不才敢為讚曰邠山亭亭兮川谷靈草木錯錯兮介胄聲壇宇肅肅兮感人情吁嗟太尉兮盍再生琪咸通朝官明州刺史釋氏之宗也得了悟真機則曠劫不礙自釋迦去世至曹溪已降指心傳心祖系綿續不分萬派不墜本枝故得之者則迥超覺路坐越三界大師之道契萬派之一流也大師諱藏奐俗姓朱氏蘇州華亭人也母方娠及誕常聞異香則知兜率降祥來從百億劫幼懷貞慤長契元奧松風水月未足比其清華仙露明珠詎能方其朗潤故以智通無纍神測未形超六塵而迥出隻千古而無對為兒時常墮井有神人接持而出丱歲出家師事道曠禪師弱冠詣中嶽受具戒母念其遠思之輒泣因一目不視及歸省母即日而明母喪哀毀廬墓徵瑞備顯由是名稱翕然歸敬者衆因欲蕝茅誅木與禦燥濕遽感財施充積堂廡乃崇院側有湖湖有妖神漁人禱之必豐其獲罾罿交翳腥羶四起大師詣其祠而戒之鱗介遂絶後挈瓶屨以歷湖山靈境異迹遊覽將畢復詣五泄山遇虛默大師一言辨折旨契符會噫顯晦之道日月之所照也聖教其能脫諸故會昌大中衰而復盛惟大師居之瑩不能惑所謂焚之不熱溺之不濡者也洎周洛再構長壽寺敕度大師居焉時內典焚燬梵策煨燼手緝散落實為大藏故南海節度楊公典姑蘇日請大師歸于故林以建精舍大中十二年分寧宰任景求舍宅為禪院迎大師居之剡寇裘甫率徒二千執兵晝入大師冥心宴坐神色無撓盜衆皆悸懾叩禮逡巡而退寇平郡中奏請改禪院為栖心寺以旌大師之德凡一動止禪者畢集環堂擁塌堵立雲會大師學識泉湧指鑒岐分詰難排疑之衆攻堅索隱之士皆立褰苦霧坐泮堅冰一言入神永破沉惑以咸通七年秋八月三日現疾告終享年七十七僧臘五十七先是命香水剃髮謂弟子曰吾七日在矣及期而滅門人童弟號劈泣血乃窆於天童巖弟子培墳藝樹三載不間忽一日異香凝空遠近郁烈弟子相謂曰昔奉大師遺囑令三載之後當焚我身今三載矣異香其啓我心乎乃定厥議揭龕發塔再覩靈相儼若平生以其年八月三日禮法茶毗於天童巖下祥風瑞雲竟日隱現獲舍利數千顆紅翠交輝白光上貫十三年弟子戒休賫舍利述行狀詣闕請諡奉敕褒誄諡曰心鏡塔曰壽相嗚呼菩薩之變通也出顯入幽示現無極其可究乎大師自童孺距耆耋陳言措行皆貽感應復以證前生行業知示滅之日時苟非位躋十地根超十品孰能造於是乎在長壽寺時謂衆僧曰昔四明天童山僧曇粹乃吾之前生有墳塔存焉相去遼遠人有疑者及追驗事實皆如其言景求將迓大師也人或難之對曰治宅之始有異僧令大其門二十年之後當有聖者居之比大師至止二十一年矣初大師將離姑蘇為徒衆留擁乃以棕拂與之曰吾弗在此矣爾何疑焉及大師潛行衆方諭其深意又令寺之西北隅可為五百墩以鎮之衆曰力何可及大師曰不然作一墩種柏五株即五柏墩也凡微言奧旨皆此類也至若闢元關諭生死宏敷至賾不可備論咸通十五年琪祇命四明郡戒休以其迹徵余之文遂直書其事以旌厥德銘曰空王設諭煩惱無涯唯大師心照盡塵沙大師降靈吳之華亭方娠載誕厥聞惟馨童蒙墮井神扶以寧母思目眇歸省而明漁人禱神其獲豐盈一戒祠宇施罛莫嬰像教中虧貝葉斯隳手集三乘遺文可披識羊祜環知仲尼命正色兵威寄詞談柄我來作牧空企音塵琢茲真石庶乎不泯知新咸通中鄉貢進士夫立有為之績即無為也始於毫髮旋彙成大因從性起入法空海蕩蕩而稱焉莫曰構梵利貯像生敬巍巍如星中月發輝晦吝且教西騰出鎮中國自姬姓垂代迄今聖朝頗變星紀經歷戡滌瑕緇更彌取鍛清流甚者默奉禁儀如農夫之望歲暨乎我上踐極鴻揚西化天下熾焉且福田寺者梁天監年中之建號比雖暫墜前蹤今進後迹有洛山離塵禪大師之門人性常早傳禪印致遠深旨目覩翬殼斁異浮榮斗藪塵機得獲三昧寒灰毳縷不味馨羞善引三車昏徒盡悟發創臺榭似箭從弦悟即色而空達有作而無作於茲寺造長廊三十餘間又建彌勒院未經重序朱軒素壁周回奪目布邑沸騰艾稚咸訝闔寺僧徒與檀越話議殿廊既成三門未立誰能為哉若弗斯人荏苒甲子同辭啓白師納來心頃刻之間千里早應車騎爭至繒紈上服異器名珍將投起阜遂俾市材礎擇良工驟其績可分二秋工人告畢峩峩然且門闢三道梵典彰然劫終如來以禦邪祲今飾殊常即師之新意簷綴珠網籠雁拱之聯飛一九冰作翠鴛接清風之迅翼丹楹刻桷藻翬間扉地甃琉璃四垂金鐸挂風箏而動韻稟律呂與天籟之齊音鳴鐸琤鏦響振非非之想且德化遐分狀秋天之朗人思仰睟豈異大鑒之化行夙夜纘揚聲走寰瀛之外遂邑之信士逮乎前續窅想歲更寒暑遷迭若弗繕録湮沒其由今盡庀略使深於代厥有徒衆僧之佳號及一境檀冉師今咸列姓氏於虹梁之上知新學劣辭荒確乎不拔利之不利俟時而進有命為文乃持筆書之將刻於石咸通壬午之三年九月十有一日記孟威咸通中官桂陽刺史靈渠乃海陽山水一派也謂之灕水焉舊説秦命史祿吞越嶠而首鑿之漢命馬援征徵側而繼疏之所用導三江貫五嶺濟師徒引饋運推爼豆以化猿飲演墳典以移鵙舌蕃禹貢蕩堯化也則所繫實大矣年代寖遠隄防盡壞江流且潰渠道遂淺潺潺然不絶如帶以至舳艫經過皆同奡蕩雖篙工楫師駢臂束立瞪眙而已何能為焉雖仰索挽肩排以圖寸進或王命急宣軍儲速赴必徵十數戶乃能濟一艘因使樵蘇不暇採農圃不暇耰靡間晝夜畢遭羅捕鮮不籲天胥怨冒險遁去矣是則古因斯渠以安蠻夷今因斯渠翻勞華夏識者莫不痛之洎乎寶初給事中李公渤廉車至此備知宿弊重為疏引仍增舊迹以利行舟遂鏵其隄以扼旁流斗其門以級直注且使泝沿不復稽止李公真謂親規養民也然當時主役吏不能協公心尚或雜束篠為偃間散木為門不多年又聞湮圯于今亦三紀餘焉桂人復苦已恨終無可奈何矣况近歲來蠻寇猶梗王師未罷或宣諭旁午晦暝不輟或屯戌交還星火為期役夫牽制之勞行者稽留之困又積倍于李公前時轉使桂人膚革羸臘手足胼胝且逃且死無所訴怨殆十七八矣咸通九年余自黔南移鎮于此艤棹嶺首備觀其事試詢左右曰向時何不疏鑿版築而使艱阻如是耶則末校劉君素前曰遠事固不可指明近事又非不知修渠必去民病然其奈邇來屢以迎送輶軒供億師頓召募補卒犒賚征夫帑藏且殫閭井亦蠧故無以興疏鑿版築也余固為父慈于子孰有子病而為家貧不求醫救子是知長吏所當子民也今民塗炭若是又何緣帑藏且殫而無暇救之須是約公費積刀布召丁壯導壅塞以平民病也因召君素若能主張乎君素唯之遂領其事凡用五萬三千餘工費錢五百三十餘萬固不敢侵征賦必竭其府庫也不敢役窮人必傷其和氣也皆招求羡財標求善價以傭願者自九年興工至十年告畢其鏵隄悉用巨石堆積延至四十里切禁其雜束篠也其斗門悉用堅木排豎至十八里切禁其間散材也濬決磧礫控引汪洋防厄既定渠遂洶湧雖百斛大舸一夫可涉繇是科徭頓息來往無滯不使復有胥怨者噫草木無情也榮落限于春秋然猶春則華秋則實以利於人焉而人稱萬物之靈亶百歲之壽安可不利於人哉况余無大勳業而竊據寵祿宜孜孜力補尸素豈令草木反鄙于余哉於是聞害必削見益必樹蓋為此耳時上聞其興役遠降詔書猥賜嘉獎然人臣受國恩惡則罪耳為善乃常事亦猶子孝親詎可誇乎况余審其所為未必無愧矣又何敢當詔書之美也今所自記重修非為名也且要敘民之艱苦實由斯渠冀後之居者不闕其修行者不毀其修長利民而已矣時咸通十一年四月十五日謹記凝字仲山咸通中進士孔氏之居中藏古書當霸魯壞隳之日見亡秦焚滅之餘卜數仞為繚垣時之潛矣定四科于竹簡世以傳諸當其漢偃兵戈魯修宮掖將窮下國之侈遂去前賢之籍并吞一畝方取地以崇居摧折兩楹遂得書于暗壁悲夫其宅也人亡道窮削迹于中一九冰毀而阼階缺裂塵飛而環堵空濛鯉也必趨之庭將為輦路仲由未入之室欲創離宮其書也藏書廢久坑儒之後蟲侵而鳥迹微虧土蝕而韋編欲朽虞夏不刊之典出彼圬墁殷周將喪之文存于培塿于是升彼堂矣棄諸簡焉信遺址兮必取寧古文兮何傳將卜樓臺剗榛蕪而屹若俄聞金石扣寂寞以鏗然王乃凝思潛聽追蹤輟作存其宅兮不壞知其書兮可學悔隳古而榮今庶立禮而成樂門庭猶在存聖者之規模蟲篆難詳是古人之質朴倚伏相推于焉有之不廣其居則斯文永墮不聞其樂則往迹全隳信乎君子所居亦廢興而有數聖人大道當用舍而隨時今皇家修典墳崇閫閾開儒館以待士設文教以濟國千秋萬歲知此道之無窮四海九州信將來之有得路入湖邑臺名望思幾里而雲瞻纍土千春而草沒餘基仙掌一峰遠指江充之事黃河九曲旁吞武帝之悲昔者漢祚方隆皇綱失理因巫蠱之事作有讒邪之禍起宮中既得其桐人臣下皆疑于太子龍樓獲謗方儲副以難明鳳閣無恩遂出奔而至死保傅徒爾園陵在哉千秋感悟萬乘傷摧齊誅子糾以無道晉殺申生而可哀于是憑大野築高臺目極心存知繼體之何在天長地久庶招魂之一來緬彼沉寃登茲極望英靈無髣佛精魂邱隴有蕭條情狀見舜井以咨嗟念嬴博而惻愴煙昏日慘全非望月之中鶴唳鸞驚不在通天之上嵽嵲崢嶸何裨死生非唯滅天性害人情抑亦傷國體敗家聲臨百尺以凝眸終天曷覩向九重而含恨何世能平雖然事出妖訛姦生結搆宜北闕之聽君命奚東宮之有私鬬子臧在側斯人比鄭叔何如商洛非遙此事亦芝翁不救往昔于今陵高谷深遊鹿而征人舉首悲君而逋客傷心曰子曰臣可念茲而誡勵為君為父宜到此以沉吟且王者為域中之大太子為天下之本何周公之不法而秦相之可損吾欲碑戾園望苑使有國有家鑒此臺而不遠象咸通時人公諱仕俌字元同彭城人也祖諱光奇開府知內侍省事父諱英閏特進太夫人楊氏妻張氏先終公有二女長適田氏次適張氏二男曰壽郎先逝次曰齊宴年十二公氣含清韻獨異貞姿業廣藝深事皆天假孤標狀高松之拔衆林朗質若秋蟾之懸碧落溫若克已節儉修身順協於家忠貞于國公寶歷二年六月五日奏授出身纍參選序數授令丞後任徐州功曹參軍公紀綱一郡掾理六聯清貧而吏靡忍欺單步而人懷其惠操心政理美譽溢彰枳棘非鸞鳳之所栖百里豈大賢之所任公性親元奧志慕雲霞朝披黃老之書暮覽南華之要喧囂每厭蟬蛻歸元身既離於俗塵名定著于紫府公咸通七年十二月一日終于輔興里春秋八十矣八年正月二十五日葬于長安縣龍首鄉祁村嗚呼寒暑忽侵纒綿數載針藥無瘳百齡斯泯嗟夫盛衰生死實可痛哉乃為銘曰波瀾不息逝水潺潺浩浩悲風摧枝何遄千年永訣一往無還緯字化文禮部尚書戣孫第進士纍遷戶部侍郎擢御史中丞三遷吏部侍郎改太常卿從僖宗幸蜀以刑部尚書判戶部改太子少保帝次陳倉詔拜御史大夫時㣥臣避盜緯獨奔赴行在進拜兵部侍郎同中書門下平章事從駕還昭宗立進司空兼國子祭酒加司徒封魯國公進兼太保出為荊南節度使再貶均州刺史召為吏部尚書以司空門下侍郎復輔政卒贈太尉文宣王祠廟經兵火焚毀有司釋奠無所請內外文臣各於本官料錢上每一緡抽十文助修國學圖荊州人太華崔嵬伊巨靈兮其壯哉挺高掌以遐舉劈孤峯而洞開功侔造化勢越風雷劃千仞之巖巒屹從地裂決九河之波浪杳自天來昔者混茫是生磅礡惟神無眹配天有作念彼流之未通顧茲山之可卻將以闢迢遞正嶄鑿愜心而再定川原應手而別開林壑靈意將伸雄稜益振蓄怒贔屭注情嶙峋謂釣鼇不足以駭人鞭石不足以騁神指揮而疊嶂知改盼睞而三峰可新然後攘臂效能端身任力捫蒼靄以天半折翠微于月側若百神將萃而潛助二儀欲判而未息嵐光兩向猶連松柏之聲黛影中開已斷雲霞之色豈不以閟形幽默拓迹巍峩致用而扶持天地程功而變化山河分積翠於空中千年軋漢啓通津于指下萬里騰波豁丹崖於天阻呀峭壁而相距勢且異於兩傷力自宏于一舉截仙子幽棲之洞壯王者建都之所蓋以神開壽域靈固人寰廓峻極于忽標削成而險難越大禹之理水小愚公之移山竹箭波中路竟深于遵達蓮花峯外迹終寄于躋攀是知事冠杳冥理歸元奧石有時而分裂水有時而疏導信乎宰物者之使然非人情之所到溪咸通時人聖上以南夷不虔邊塵岔起俟旦授執政意俾擇要郡以良能而牧之遂命御史中丞渤海吳公行曾持節出刺雅安公松筠植心金石勵志雅安實邊之衝東入嶮隘應援由此公至止一顧屹如巨防當危疑之秋瞬息無事郡人以考秩將滿預懷去思接武陳誠願借綏撫丞相隴西公以公功業昭著飛章上聞請充節度參謀兼諸軍行營副都知兵馬使東路行營都知兵馬使仍兼知黎州及巡邊制署公遂于大渡河創置一橋亘五百尺自干戈未寧士馬旁午饋運往復商旅經過曾無覆溺之憂永絶滯留之患至今行者見必歸恩異迹奇謀繁難具紀由是復升于犍為雅之南千里縣道烽堡相躅早夕軍食跂俟於犍為公智出事先機生料外風波助意舟楫如飛是得闔境無虞諸軍飫飽實公之功也復由是天子以彭門名都而償其重勳公軔車之日即究風俗民之憂苦已明其重輕事之興廢已熟其利病從便革弊幽顯愜心郡內既肅施及支邑以唐昌縣中界妄導江郫城東西綿遠不啻兩舍雖有村落僻在荒塘昔置郵亭廢毀將久遂使行役者野食而泉飲貿易者星往而燭歸兌支勷公行投告無所深溝雨漲古陌橋摧跬步難踰艱苦寧述况輸役責限徵斂有程而欲罪其稽逋者乎公惻然凝想即日計成遂陳于連帥于其心而置草市因其鄉名便以建德為號自此四來者旋踵而迓近中望者舉目而知歸老幼攜挈忽而至萬家歡笑共事修營不旬日而告就今則百貨咸集蠢類莫遺旗亭旅舍翼張鱗次榆楊相接桑麻漸繁如此牧人可謂移風易俗矣昔武侯以蜀脞脆故令鄰邑翊日而市意在習其筋力而俟之征徭又每及上春以蠢為名因定日而有知所往公亦約之以期而候之其日商旅輦貨至者數萬珍纖之玩悉有受用之具畢陳想人之心豈待詢問而知其歡悅也復以路由諸部疊迹輪蹄徘徊一息無稅駕之所遂以俸錢建長亭崇軒邃室外廣既內厨帷簿精新器物充足則往來者非止晝食而卜夜可矣人既繁會俗已豐饒又置一鎮抽武士三十人而禦之亦立廨署早暮巡警盜將竄迹人遂高眠不感晨雞無聞夜犬皆云康泰不可比儔又茲地會昌之前有佛寺數所因廢而未興鄉閭求福無處禮敬像設之儀莫識鐘罄之聲不聞僻野深郊轉為聾俗復置靈巖報恩院修北方天王及侍從奇工妙飾相好無雙高墉環舍門廡揭立又度僧主持行道無有虛日斯人也非只豐足而永逃夭枉之患得不紀其盛迹而垂於無窮者哉且人之憂樂俗之凋敝豈繫之時而實俟于哲人上才也噫公之為政以已之欲而思人欲以已之惡而思人惡是連牧三郡而皆勳績絶倫若非秉心端莊求理無替則奚能動遠邇瞻聽而俟者乎且昔之此民往復百里飢不得績食寒不得易衣今之出戶而所闕皆足市之功其可量乎昔之此民村防遙遠蕭索人稀盜賊織路行者恐畏今之出戶歌笑自若醉飽㣥歸鎮之功其可量乎昔之此民首罪無所求福奚門今之出戶有依歸之僧覩莊嚴之像院之功其可量乎昔之行者戴星乘軺亭午未憩館穀何投飢旅寧濟今之朱門大啓來往如歸乏馬疲人頓忘其敝館舍之功其可量乎公創一意而庶類皆安推深誠而萬人咸福是知元造之旨不獨幸蜀之三郡即應重委大柄為國之元臣使天下皆幸也溪早歲謬以文字為公之知偶因薄遊獲覩盛制輿人頌美異口同詞直敘見聞敢愧蕪淺咸通十年五月十五日記侔官和州防禦行官刺史崔雍稱賊龎勛初劫烏江縣雍令步奏官二人探知雍猶不信二人並被枷扭續差人探見賊已去州十里賊尋逼州城崔雍與賊頭吳約于鼓角樓上飲酒許與賊州又認軍事判官李譙為親弟表狀驅使官張立為男只乞二人并身其餘將士一任處置便令押衙李詞等各脫下衣甲防虞官健束手被斬者八百餘人行官石瓊脫衣甲稍遲便被崔雍遣賊處斬其崔雍所有料錢并家口纍差人押送往采石今在潤州豈有將一千人兵士之命贖拔已之一身不惟辜其神明亦生負聖主兼科配軍州官吏修葺城池妄稱出料錢修城者攄自號五雲溪人近代何自然續笑林劉夢得撰嘉話録或偶為編次論者稱美余少遊秦吳楚宋有名山水者無不弛駕躊躇遂興長往之迹每逢寒素之士作清苦之吟或樽酒和酬稍蠲於遠思矣諺云街談巷議有裨於王化野老之言聖人採擇孔子聚萬國風謠以成其春秋也江海不卻細流故能為之大攄昔藉衆多因所聞記雖未近於邱墳豈可昭于雅量或以篇翰嘲謔率爾成文亦非盡取華麗因事録焉是曰雲溪友議倘論交會友庶希于一述乎元德咸通時鄉貢進士王諱熙字晉國冀州長樂人也伯祖諱跋建國北燕傳位于昭成皇帝諱宏即王之烈祖也魏太武帝滅北燕徙其家屬于代王以帝者子孫遂交婚于魏室魏文成帝納王妹為后即文明太后是也王尚博陵長公主以敦慎博愛歷事三朝纍拜冠軍將軍侍中中書監太傅太師之任進爵昌黎王及魏孝文帝即位前後取王三女其二為后一為昭儀文明太后臨朝王以師傅之重寵極禁壼內不自安求外任為洛州刺史侍中太師如故洛陽經永嘉大亂之後宮寺毀廢王為政仁恕而酷信釋教凡出俸祿於諸州鎮建佛圖精舍合七十二處今之廟地舊建北邙寺乃其一也今佛圖基址尚存其寺碑文中書侍郎賈元壽所製孝文每登寺讀碑嘉歎不已後徵歸代遇疾而薨屬遷居洛京遽詔有司為辦喪事公主先薨命開其墓併二柩俱向伊洛皇太子赴代迎弔將葬贈假黃鉞侍中督十州諸軍事大司馬太尉冀州刺史加黃屋左纛備九錫前後羽葆鼓吹有司諡曰武孝文為撰志銘縗服親臨墓所以前魏書備載其事但不言封樹之處及廟立之由廟與墓當不相遠也其廟豈州人思王之德衆所建乎不然寺沙門所置也至今為洛北之望祀年代穴㓎遠雖牲牢日享而室壁陊隤大中六年六月洛之豪族孟州長史焦宗美特捨家財大新厥宇兵衛儼列廟貌益崇愚別墅寄溫谷川東走十里直王之廟每見遠近里社坎鼓啾管以趨之及問王之名位爵邑皆失其傳乃乘暇謁拜碑版堙滅莫識何從退尋家諜考于魏史是知即愚之十二代祖也伏念甘棠勿翦邵德實思若非績化深洽民心即何能五百年之後而血祀不絶乎恐盛烈沉懿無復彰明不敢多文遂斫石重紀鵬咸通時人謹案此記從姑蘇志採出文內載築塔在咸通困敦歲是歲戊子為咸通九年新唐書文藝傳崔元翰名鵬以字行德宗時知制誥年已七十餘咸通戊子上距德宗貞元末凡六十餘年當別是一人式觀元始眇覿元風夏巢冬穴之時茹毛飲血之世一寒一暑一陰一陽其道雖分萬彙猶塞逮乎伏羲氏之王天下也始畫八卦造書契由是文籍生焉然後歷堯舜至周孔由是釋像興焉及乎東被大漢尢加崇飾按牟子云佛生天竺假形王家即其生也又云拂衣雙樹脫屣金沙即其滅也然雖示生滅之相詎加恍惚之道何異經巨海者終年不見其涯測虞淵者畢世不知其底吾以此觀之佛理不可盡也若夫舍利者即金人之遺骨堅剛不壞變化自然西天敬之立為塔廟昔育王見而不信吳王修以效虔迤邐南移年代頗久大哉寂滅之理豈一魯男子以探其好焉余素不留心略為敘事故經云若能起塔供養皆獲福田此乃聖教所談事豈虛繆固知為善者天報以福為非者天報以殃雖則元妙難求而實精專可驗光福寺者即梁九真太守顧氏之家山也士有惡嫌塵網種植善根遂捨林泉建茲佛剎立寺之始其由此焉斯地之銀闕移來洪波駕出碧岫孤聳青天下臨闕二字洞庭勢控吳苑上正斗牛之宿旁連太伯之墟何必鼇負蓬萊蛇蟠崑閬歇樵翁於片石臥禪子於幽林草樹麗而攢花杉蘿深而蔽日長松古柏緣情無塵世之機遠岫平湖舉目入畫屏之色其僧侶相謂曰此之靈境爰有上方可以建立亭臺而莊嚴廟塔既而不日不月其功就焉斯塔也梁大同之中建矣唐會昌之末毀焉興廢之由是其一也然則基址雖在而乃煙蘿以荒於時咸通年困敦歲天子明睿四方清平野人入朝賢士出世而我吳郡闕四字鸞鳳異態龍武殊姿嘯傲誰同孤高自得塵埃難染白璧之光霜雪徒侵碧松之色嚴陵臥日國乏賢良鄭均間時位齊卿相魚腸之劍利斷鯨鯤龍頷之珠光浮日月燒金屑玉間邀蓬島之仙鈞月歌風隱笑武陵之客公不惟優遊儒籍然亦探奧釋門故儒則素王間生於釋乃金人謫下則知人情難及智用全殊每登山而躊蹰因驚塔之荒毀是斯塔之將興也一則合天中后聖德遐被慈心溥施行是日之堯風徵當時之漢夢於是三寶起迹十方歸心布金祇園圖像花界今者又塵清域外鏡朗天衢金柯開鼇背之花寶位乾銀河之浪玉潢丹甑坐分瑞應之符樵子漁翁眠唱太平之曲爾乃遇公道窮生滅心達若空信塵劫之迷途悟法門之了性追我家之舊迹再葺連華護我佛之真身重修寶塔然後增基表剎剃草開林剪荊棘而雲平列松杉而洞出時維三月節屬九春鶯吟風而千般草垂巖而萬種建金棺而心動羅寶蓋而雲陰緇徒共瞻士俗咸悅芙蓉座上飄三界之異香薝蔔園中潤諸天之法雨是時也祥雲結彩氛氳於行道之壇慧日澄華照耀于然燈之位公乃覩相生善至誠感神遂發善心爰命工者於是依憑氣象結構規模初標覆簣之蹤漸著凌雲之勢亦有飛閣周繞回廊接連石工呈奇巧之才梓匠設雕鏤之妙壯觀而龍蹲虎踞巍峨而仙掌蓮峯繡柱矻而星攢雕梁赩而虹指掩映而初蜃吐崚層而欲鵬飛不逾一年局就工畢斯狀也險體千仞高標七層疑凌霄上又若神助上穿星漢下壓雲根豈劍閣之能齊比爐峯而尚峻鶴歸天而一駐雲收霽而半開發郢客之詩情壯吳官之地勢金輪縹眇亞日月以高明雁像參差拂虹霓而若動偉哉塔之美也其功杳莫繼焉至若遊人訪景淑女尋春入幽徑而攀蘿步晴崖而拾翠巢鳥映葉嵐煙惹衣苔鋪石而霜斑花映峯而綺合高瞻闤闠千家之臺榭龜文回瞰林巒四面之波濤練色至乃金飈屆節銀露催寒何用悲秋正堪憑檻天朗而雲霞弄錦風高而松篠張琴蒹葭之浦上漁歌蒲蓼之汀邊雁影疊浪裁古人之素㣥山鬬少婦之眉開謝客之愁襟抒休公之佳詠松間疏磬伴高鳥而飛來湖上輕煙映孤帆而掠去斯塔也非公不能建矣斯景也非公不能創焉時有勾當僧道居文瓚崇建寺皆以高空皎月深谷奇松挂衣錫而雲間臥煙霞而鶴瘦真宗真理金言積於情田無垢無塵玉蓮生於淨土且小人識比求劍材非利錐焚香雖效其不回璧角常慙於未達辛苦十載每思蚊夢之由搏躍九衢頗有龍門之志曾勞閉戶何啻仲舒之三年誰念無家更甚相如之四壁惟公不捐質孱詞陋命作斯文操觚長吟永日忘輟何以著公休美大播芳風詞曰皇堂之世運變千秋産公之闕一字當代風流荊聶之氣金張之儔但樂風月不干王侯英明少年卓犖公子傲貴忘榮時人鶚視洞闕二字黃春風不起金谷花開玉堂攜妓南山積石東海揚波紀公之德未足為多
