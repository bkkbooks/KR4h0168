front:
  text: 全唐文欽定全唐文卷三百四十四顏真卿九
  hash: sha256:7afcee6b565a32293bddf72b855189ae160e3c5ab5fcefc126f25c8af41f0377
body:
  text: 君諱希銑字南金其先出於周武王同母少弟衞康叔封之後也史記云成王長用事舉康叔為周司寇賜衞寶祭器以彰有德封子康伯支庶有食邑於康者遂以為氏周代為衞大夫至漢有東郡太守超始居汲郡超之裔孫魏強弩將軍權權生晉虎賁中郎將泰泰生闕太守威威生蘭陵令奮節將軍翼隨晉元帝過江為吳興郡丞因居烏程事見山謙之吳興記翼生豫章太守鎮鎮生征虜司馬建武將軍欽信欽信生宋晉熙王兵曹參軍黯黯生南臺郎高高生齊驃騎大將軍孟真孟真生梁散騎侍郎僧朗僧朗生陳給事中五兵尚書宗諤為山陰令子孫始居會稽遂為郡人焉曾祖孝範江夏王府法曹臨海縣令祖英隋齊王府騎曹江寧縣令皇朝隨郡王行軍倉曹父國安明經高第以碩學掌國子監領三館進士教之策授右典戎衞錄事參軍直崇文館太學助教遷博士白獸門內供奉崇文館學士贈杭州長史君即長史府君之叔子也年十四明經登第補右內率府冑曹應詞藻宏麗舉甲科拜祕書省校書郎轉左金吾衞錄事參軍應博通文史舉高第授太府寺主簿轉丞又應明於政理舉拜洛州河清令加朝散大夫涇州司馬德州長史轉定州屬突厥侵轢君以偏師抗之遷海州刺史上功以敕書賜方岳繡袍一領雜綵二百段下車未幾詔擇政術尤異者察使奏公恩制裦異遷濮州加銀青光祿大夫累封汲郡開國公策勳上柱國轉饒州入為國子司業以言事貶房州轉睦州遷台州所至之邦必聞美政開元初入計至京抗表請致仕元宗不許仍留三年請歸鄉敕書裦美賜衣一襲並雜綵等仍給傳驛至本州冬十月二十有二日不幸遘疾薨於會稽覺允里第春秋七十一夫人陳郡殷氏太子中舍人聞禮之曾孫右清道率令德之孫洛州錄事參軍子恩之第五女睿宗先天二年封丹陽郡夫人公薨之年歿於東都章善坊私第春秋六十九嗣子朝散大夫婺州司馬襲汲郡公元瑛會稽縣男元瑾宣州司士京兆府奉先尉會稽縣男元瑒朝議郎前獲嘉丞元王褱等虔以天寶四載七月四日窆於山陰縣籬渚村之先塋卜遠日而合葬焉禮也嗚呼君負不器之姿包周身之智寬仁且惠慤愿而恭金玉其相敬明其道文意麗藻二雅所祇政事優長百僚所則嘗撰自古以來清白吏圖四卷仍自為序贊以見其志宰相黃門侍郎韋承慶中書舍人馬吉甫等美而同述焉盛行於世赴海州時君兄德言為右臺侍御史弟為偃師令俱以詞學擅名時同請歸鄉拜掃朝野榮之與狄仁傑岑羲韋承慶嗣立元懷景姚元崇友善至是咸傾朝同賦詩以餞之近代未有此比君之四代祖至於大父為諸王掾屬者七人歷尚書郎給事中侍御史者二人君之先君崇文學士府君有文集十卷注駮文選異義二十卷漢書十卷自述文集二十卷元昆修書學士顯府君文集十卷撰詞苑麗則二十卷海藏連珠三十卷累璧十卷姪祕書監集賢院侍講學士闕一字元撰周易異義二十卷秀州長史元王褱著干祿寶典三十卷姪刑部員外郎璀男美原尉南華撰代耕心鏡十卷闕六字百二十卷君之先君至南華四代進士登甲科者七人舉明經者一十三人時君闕五字門頗盛美矣君之女曰辨惠盩厔縣令陝郡長史郜象釴之妻君之孫台州司戶參軍闕三字先歲而卒汾州司田參軍真弻德州平昌縣令輔旻崇元學生曙懷州武陟尉憺宣州南陵尉渭鄉貢明經緯綸皆修身踐言敦詩說禮紹承餘訓克稟義方及君告老鄒自然陳光璧閭邱景陽陶暹送至越州邑子謝務遷僧陸鑒校書郎陳齊卿恒為文酒之會論者休焉愜求舊之念崇乞言之禮天乎不憗其恨若何大歷十一年元王褱闕九字乞願言刊勒懼沒徽猷求無愧之詞垂不朽之事顧惟末學曷足當仁銘曰汲公恂恂德懋而淳濟濟多士東南有筠緝熙代業詞章發身佐軍貔虎典校麒麟三擢崑玉再司闕二字鵬翔海汭驥展河漘驟貳嘉州錫命斯頻繡寵方岳榮加搢紳六登闕一字洽膠庠闕六字華墓表申闕二字見節文昭友仁懸車告老衣錦頤神連璧襲懿梓澤齊彬饋酳未濟舂濛遽淪朝廷惋悼遠近悲辛季子象賢恐懼鬱堙嘉猷鴻伐千秋不泯征鎮四出鑿門之寄崇邦畿千里內史之官最非夫任均周召名軼趙張則何以展心膂之謀光缿筩之制者矣公諱濟字應物京兆杜陵人晉征南大將軍當陽侯元凱十四代孫周禮部侍郎殿內監甘棠公懿之來孫隋符璽郎乾祐之元孫皇朝度支員外主客郎中續之曾孫朝散大夫明堂丞贈潤州刺史知讓之孫高陵令贈太子少保惠之第三子也器識通簡履懷坦易以文飾吏用晦而明逗機而舉無遺諝莅事而照有餘地早歲以寢郎從調書判超等為李吏部彭年所賞補梁州南鄭主簿州主司馬垂為山南西道採訪使引在幕下俄丁內艱終制轉許州長社尉楊光翽都督隴西奏公為法曹皇甫侁採訪江西奏公為推官授大理司直攝殿中侍御史賜緋魚袋尋正除殿中俄宰郿縣相國李峴尹京兆奏公為渭南尉僕射裴冕為劒南節度奏公為成都令遷帛丿糸州刺史賜紫金魚袋屬徐知道作亂使裨將曹懷信招公公執以歸朝除戶部郎中加朝散大夫廣德中檢校駕部郎中上柱國公善與人交於嚴武情均莫逆武再充劒南節度為武行軍司馬郭英乂之代武也矯宣恩命毀元宗宮為節度使宅公驚其異謀移疾不視事今司空冀國公崔寧既誅英乂請知使事公堅臥不起仍俾通泉令今前殿中侍御史韋都兵密使家僮潛表事實大歷初杜鴻漸分蜀為東西川公為副元帥判官知東川節度拜大中大夫帛丿糸劒梓遂渝合龍普等州都防禦使梓州刺史兼御史中丞公以威信馭戎寬明莅俗克念八州之地綏靖兩川之人朝廷嘉之尋拜東川節度使俄而移軍復為遂州都督徵拜給事中間歲拜京兆少尹明日遷京兆尹出為杭州刺史不逾周歲風化大行不幸感疾又聞代到請尋醫於晉陵以大歷十二年歲次丁巳秋七月二日辛亥薨於常州之別館春秋五十有八夫人京兆韋氏曰平仲房州刺史景駿之孫禮部尚書琅琊王邱之外孫太子中舍迪之第三女也精識高明正家柔克移天有幹夫之蠱宜室多綏族之仁六姻稱其壺則四德被於彤管生五子四女而公即世夫人晝哭茹毒星言割哀留子壻祕書省校書郎范陽盧少康臮四子匡陟緝寧家殘獨與子楊匍匐萬里以祗護喪櫬冬十一月至上都二十四日壬申虔窆公於萬年縣洪原鄉之少陵原祔先塋也仍自為祭文以抒意其略曰周旋吳蜀備歷艱危不陷寇難賴君攜持一朝孤立更復何依魚失水而鱗悴樹無根而葉萎詞理精婉才情懇到聞者傷愍焉於戲公以傑俊之材當艱虞之際伸其智略宣力盛時頡頏鴛鷺之間總統龍犀之節旋登瑣闥驟陟尹畿方當焜燿高衢升淩台序而一麾出守鎩翮江皋竟吉往而凶歸齎此志而歿地吾道憯矣真卿何幸得忝維私未終倚玉之歡遽切據梧之恨吁足痛也銘曰杜侯峩峩令聞猗那其用於世為猷匪他理稱易簡政絕煩苛州縣發跡雲霄切摩化存江滸威肅岷嶓巴蜀靖謐精誠孔多瑣闈久拜亞尹遄過始陟京兆旋移浙河云如不弔遘此凶瘥哲婦哭晝護喪奔波祔於先壟映蔚條柯曷用表德勒銘墳阿詩美下降傳書築館貴其中禮載籍稱焉漢魏已還寂寥罕嗣以蕩陵德則維其常皇唐勃興王道丕變平陽起娘子之軍於司竹襄城行匹庶之禮於宋公常樂糺匡復之師於武后皆前古之所未有其或生知禮樂周旋法度躬行婦道以懋大倫克順天經光昭懿烈名言之所莫究書記之所未聞聚衆美於一身鄰太虛而獨立者其唯和政公主乎公主姓李氏隴西成紀人皇唐元宗至道大聖大明孝皇帝之孫肅宗文明武德大聖大宣孝皇帝之第二女帝女之崇於斯為盛今天子之同母妹也母曰章敬皇太后后之在襁褓也后父贈太尉吳君曰令珪嘗遊官蜀中使道士勾規占之規驚起曰此女貴不可言是生二子男為人君女為公主嫁於柳氏其後竟配肅宗生今上及公主神所命也厥惟舊哉公主三歲而孤即能孺慕育於儲妃韋氏純孝過人幼而聰惠長而韶敏穠華秀整令德芬馨婉嫕發於天姿肅雍形於鑒寐奉今上以悌道事韋妃如所生繇是特為肅宗之所賞愛至若左右圖史開示佛經金石絲竹之音繢畫工巧之事耳目之所聞見心靈之所領略莫不一覽懸解終身不忘天寶九載春三月既朢封和政公主降於河東柳潭既笄之三載矣潭周太保敏之五代孫皇蘄州刺史懷素之曾孫贈祕書監岑之第四子衣冠地冑輝映當朝初以美秀承家中以名聲華國道勝而貴能下善謙尊而休有烈光士林偉之解褐左內率府冑曹轉穎王府戶曹陳留郡司功參軍以人門第一選尚公主拜太子洗馬亦既好合雅相敬貴雖柳侯秉彞有度能降帝女之心而公主率履由衷每抗古人之節故宗族胥睦不獨親其親先後大同莫敢私其子伯姒宏農楊氏太真姊務華采公主服無金翠之飾居有冰雪之容每至朔月六參朝天旅進嫣然班敘之內迥出神仙之表亦非希企之所及也臮凶羯亂常潼關不守元宗幸蜀妃后駿奔姊曰寧國公主孀嫠屏居誰或訃告乃棄其三子取其夫之乘以乘之柳侯徒行公主愧焉下而同趨者日且百里每臻坎險必先濟寧國而後從之柳侯辭公主曰我若先涉脫有危急不能俱全則棄我姉矣柳侯感歎躬負薪之役公主怡然親饋餼之事竭力供侍潭兄澄之妻楊貴妃之姉也貴倖前朝勢傾天下公主交無諂黷思未綢繆楊且云兦以孤見託馬嵬之役無噍類焉感其一言悉力營贍男登服冕之位女獲乘龍之匹出入存恤過於巳子雖其密親罔或能辨柳之親眤伯仲姑姉隱儭將迎唯恐不至糾逖疏屬撫循惸嫠繇內及外終始如一孤窮滿目榮悴殊倫居薄推厚未嘗懈倦衣服飲食等無有差互或未周嬰孩罔及每至伏臘礿祠蒸嘗必具禮衣花金义之飾以躬中饋堂室之奠豈無婢使式燕孫謀姿性純儉不以迄成先聖休之寶書清問秋八月元宗至蜀仍舊邑而冊公主以潭為駙馬都尉銀青光祿大夫太僕卿屬狂將興禍稱兵向闕元宗親御闉闍臨視誅討駙馬率領家豎折衝張義童等鬬於門中公主及寧國彀弓迭進駙馬乘勝突刃所向無前斬馘擒生殆逾五十節使時宰具以表聞元宗自繫誥示先帝懇讓莫當策勳遂寢今上之為元帥也躬擐甲冑率先將卒舉兩京若拾遺摧凶寇如振槁勞旋方及帑藏其空公主貿遷有無億則屢中闕贏優而數逾千萬懼不給悉縣官論者難之肅宗彌留衆皆迭侍主獨贍奉不已於旁帝有間衋而謂之曰汝之純孝乃能至是遂賚莊一區帝愛季女曰寶真公主因奏曰八妹未有請以賜之泣而諫焉哀動左右西陵遷窆上戒主曰凡厥親身之物必誠必信勿之悔焉主罄家有無以邑入千萬潛羨經費上深感歎焉上既宅亮陰未忍臨政人之疾苦事之得失豈嘗私謁動必以聞上敬異之朝廷賴焉廣德元年冬上既東幸主志期扈蹕迴兵充斥咫尺不通因至荊南尉薦諸將方隅載謐職貢以修主有力焉上之在陝憂主匱乏乃命中使屢敕節度及轉運使隨主所須務令肅給主以國用空罄退而歎曰吾方竭家財以資戰士其能饕餮首冒國經唯請名香數斤賦於佛寺為主祈福而已王公戚屬相攜而至者藍縷膩囊襁負鱗次竭其闕斧親自贍恤聚而泣之悲感行路初次商於頓於傳置㣥盜蝟起奄譁譯亭呼而犒之曉以禍福一言革面願比家矣之死靡他至今猶在緬惟罔極無所寘哀從母嶭氏遺孤數四分宅居之皆俾成立萊莘兄弟盡列通班二女有行克配良士主之慈忠悉皆若是親臨稼穡躬儉節用不憚煩縟雅好組紃駙馬裳衣必親裁紩爰及子女罔衣綺紈綻新皆成主手每加訓誨蠢迪檢押廣德二載春二月歸於上都諸主高會議際夫黨覿其親族多曠周旋咸以為時經百罹粗略可也主抗詞曰女之移天遂成他族怙貴長慠何以律人上方理定聞必不悅諸主蹷然競崇討習禮之降殺親之薄厚翕然一變職主之由夏六月才生魄屬邊候不謹烽及京師城中震驚圜視無色主既彌月體未甚安曰事亟矣其入言之駙馬請間主曰吾業已行矣駙馬獨無兄乎因乘檐子直至寢殿乃悉索闕遺備陳利病以奏之上欣然嘉納所言未究傍或員來因爾退歸遲明誕育展轉怊悵不能弭忘時屬炎暍熱疾有加聖情憂軫起坐失次天醫內官相繼旁午彼蒼不惠以其月二十有五日辛卯薨於常樂坊之私第春秋三十有六嗚呼皇上友愛天深痛毒兼至砉然一呌聲淚俱咽哀動木石豈伊人倫漣漣孔懷如失於臂曰余此妹國之鴻寶方期闕云如何里祝降時喪天實為之胡寧忍予乃輟朝三日命京兆尹監護喪事一以官供務從優厚柳侯掐膺永悼氣索神傷心苦而忽然忘生泣盡而繼之以血況乎五男三女或齔或孩呼阿母而哭無常聲籲昊天而仁覆永絕哺以滋旨嗌而莫就其為酷痛曷愈於斯以是思哀哀可知矣自朝及野知與不知聞之失聲罔不震悼棧有青牛素服轅軛主之薨也踣地哀鳴仰天屑淚三日不䬴畜猶若是臣僕可知主之將薨馭馬先殞捐館之夕見夢別墅乘之周麾偏勞憗遺俾屏不逮田客傔從數騎久已云兦衆皆驚起髣髴猶見雖所憑則厚而精氣何多主於駙馬大義敦肅不恃俔天之貴每極家人之禮駙馬雅性夷簡恬於名利願究衞生之經庶臻久視之道主志深婉順始慕真宗故於他時並受法籙嘗謂之曰易崇積善詩貴起予不以忠孝數事迭相告勖者則心有歉焉率而行之曷嘗廢墜又以為死生恒理先後之間若幸啟手足必當禭我以道服瘞我於支提往來行言時見存恤則所懷足矣子若不諱我若歿身未兦灑掃塋隴出入窀穸奉君周旋噫嘻於斯之時以為謔浪豈悟今者皆符昔言有司奉詔將厚其禮駙馬疏陳皆蒙允許粵以秋八月十九日甲申臮其男試太常少卿賜紫金魚袋晟鴻臚少卿暈試祕書丞賜紫金魚袋杲試殿中丞昱臮子三女等虔窆公主於萬年縣義豐之銅人原從理命也於乎風詠歌衣史稱彤管纖微之善載籍猶稱況乎七葉帝女分形歸妹貴能上下忠以導躬德言容功之四美服女師母儀之訓訂之帛丿糸古孰與我京昔馬遷著記謂之實錄有道見述亦云無愧某學於舊史少識前載歷考長代跋彼疑之盛未有如公主者焉雖壺則家風每挹如賓之敬而勤崇垂懿敢忘傳信之辭銘曰穠矣公主元元之緒聖皇之孫肅宗之女今上之妹生人之矩德言容功義仁孝忠溫良恭儉敬讓宏通率履弗越高明有融下嫁於柳猗那自久金石著明琴瑟斯友家道以正人倫斯厚鳳凰于飛梧桐是依噰噰喈喈福祿攸歸和樂既孺德音莫違麟之趾定振振子姓方紹母師奄摧邦令一人痛毒九有違詠詔葬於何銅人之阿支提鬱起宰樹誰過空餘好合來往滂沲君號真定琅琊臨沂人北齊黃門侍郎之推府君之元孫皇朝秦王記室思魯府君之曾孫著作郎宏文崇賢學士勤禮府君之孫皇曹王侍讀贈華州刺史昭甫府君之季女錢塘丞殷履直之妻也聰惠明達發乎天性孝仁敬讓迥出人表精究國史博通禮經問無不知德無不備其在家也九族仰其壼儀其移天也六姻賴其任恤天后當宁旁求女史太夫人殷氏以彤管之才膺大家之選召置左右不遑顧復二弟曰祕書監元孫府君太子少保惟貞府君藐焉始孩傾隔怙恃君躬自誨育教之詩書悉擅大名皆君力也叔父吏部郎中敬仲府君為酷吏所誣君率二妹宜芳令裴安期妻司業岑獻妻割耳訴冤因獲減死又誕男成已而左耳缺焉君有三子長曰武康丞嘉紹尤工小篆為寸字飛白勁利絕倫紹子壻郎中柳芳今之良史芳子太樂令冕幼立盛名次曰處士齊望有成人之姿幼曰晉州長史成已雅善填書兼綜才藝鳴謙勇退不登清秩每與文士族祖濬武平一呂因李嘏陳齊卿族舅朝內弟曜卿允南姨弟劉璀族弟寅同賦詩多擅警絕之句六女長適李氏生安陸令銓孝養於君次適王元淑著漢春秋次適蔡九言生燕學生闕為當代之冠次適顏昭粹粹女適司勳郎闕才器為海內闕揚欽生濯季淮幼適我兄闕疑仁親友悌有闕度為尼感殊闕慈明及女娉真卿童孺時特蒙君教言辭音剖闕延壽王孫賦崔氏飛龍篇江淹造化篇五都賦不幸開元二十五年秋七月有五日以隨牒終於成已尉氏尉之公館享年八十四粵以明年春正月合祔於東京萬安山之王寶原禮也嗚呼君全德內充慈仁外被才明可以升博士法度可以律母師雖偕老不俱無石窌魚軒之貴而長筵律慶多鏘鳳乘龍之歡於足云也真卿不敏夙承誨誘追深仁而莫逮謀不朽其庶茲銘曰於惟我姑德盛才㒇受深倫育耳割冤蘇惠及疎賤仁涵朽枯子孫宴喜龍鳳相趨教我音辭王孫五都期頤未究人世俄殊刻石墳阿聲流八區嗚呼可惜哉元君君諱結字次山皇家忠烈義激文武之直清臣也蓋後魏昭成皇帝孫曰常山王遵之十二代孫自遵七葉王公相繼著在惇史高祖善禕皇朝尚書都官郎中常山郡公曾祖仁基朝散大夫裦信令襲常山公祖利貞霍王府參軍隨鎮改襄州父延祖清淨恬儉歷魏成主簿延唐丞思閒輒自引去以魯縣商餘山多靈藥遂家焉及終門人諡曰太先生寶應元年追贈左贊善大夫君聰悟宏達倜儻而不羈十七始知書乃授學於宗兄先生德秀常著說楚賦三篇中行子蘇源明駭之曰子居今而作真淳之語難哉然世自澆浮何傷元子天寶十二載舉進士作文編禮部侍郎陽浚曰一第汙元子耳有司得元子是賴遂登高第及羯胡首亂逃難於猗玗洞因招集鄰里二百餘家奔襄陽元宗異而徵之值君移居瀼溪乃寢乾元二年李光弻拒史思明於河陽肅宗欲幸河東聞君有謀略虛懷召問君悉陳兵勢獻時議三篇上大悅曰卿果破賊朕憂遂停乃拜君左金吾兵曹攝監察御史充山南東道節度參謀仍於唐鄧汝蔡等州招緝義軍山棚高晃等率五千餘人一時歸附大壓賊境於是思明挫銳不敢南侵前是泌南戰士積骨者君悉收瘞刻石立表命之曰哀邱將吏感焉無不勇勵璽書頻降威望日崇時張瑾殺史翽於襄州遣使請罪君為奏聞特蒙嘉納乃真拜君監察仍授部將張遠帆田瀛等十數人將軍屬荊南有專殺者呂諲為節度使諲辭以無兵上曰元結有兵在泌陽乃拜君水部員外郎兼殿中侍御史充諲節度判官君起家十月超拜至此時論榮之屬道士申泰芝誣湖南防禦使龎承鼎謀反並判官吳子宜等皆被決殺推官嚴郢坐流俾君按覆君建明承鼎獲免者百餘家及諲卒淮西節度使王仲鼎為賊所擒裴茂與來瑱交惡遠近危懼莫敢誰何君知節度觀察使事經八月境內晏然今上登極節度使留後者例加封邑君遜讓不受遂歸養親特蒙裦獎乃拜著作郎遂家於武昌之樊口著自釋以見意其略曰少習靜於商餘山著元子十卷兵起逃難於猗玗洞著猗玗子三篇將家瀼濱乃自稱浪士著浪說七篇及為郎時人以浪者亦漫為官乎遂見呼為漫郎著漫記七篇及家樊上漁者戲謂之聱叟闕八字又以君漫浪於人間或謂之漫叜歲餘上以君居貧起家為道州刺史州為西原賊所陷人十無一戶纔滿千君下車行古人之政二年間歸者萬餘家賊亦懷畏不敢來犯既受代百姓詣闕請立生祠仍乞再留觀察使奏課第一轉容府都督兼侍御史本管經略使仍請禮部侍郎張謂作甘棠頌以美之容府自艱虞以來所管皆固拒山谷君單車入洞親自撫諭六旬而收復八州丁陳郡太夫人憂百姓詣使請留大歷四年夏四月拜左金吾衞將軍兼御史中丞管使如故君矢死陳乞者再三優詔裦許七年正月朝京師上深禮重方加位秩不幸遇疾中使臨問者相望夏四月庚午薨於永崇坊之旅館春秋五十朝野震悼焉二子以方以明能世其業名雖著而官未立以其年冬十一月壬寅虔葬君於魯山青嶺泉陂原禮也嗚呼君其心古其行古其言古躬是三者而見重於今雖擁旄麾幢總戎於五嶺之下彌綸秉憲對越於九重之上不為不遇然以君之才之德之美竟不得專政方面登翼泰階而感激者不能不為之太息也君雅好山水聞有勝絕未嘗不枉路登覽而銘贊之感中行見知之恩及兦至今分宅以恤其子其不偷也多此類中書舍人楊炎常袞皆作碑誌以抒君之志業故吏大足令劉袞江華令瞿令問將張滿趙溫張協王進興等感念恩舊皆送哭以終葬竭資鬻石願垂美以述誠真卿不敏常忝次山風義之末尚存衋往敢廢無媿之辭銘曰次山斌斌王之藎臣義烈剛勁忠和儉勤炳文華國孔武寧屯率性方直秉心真純見危不撓臨難遺身允矣全德今之古人奈何清賢素志莫伸㣥士立表垂聲不泯九有無虞行師貴於衽席四方取則鈎鉅資乎浩穰誰其有之則杜公其人矣公諱濟字應物京兆杜陵人皇主客郎中續之曾孫明堂令知讓之孫贈太子少保惠之第三子姿度韶舉心靈敏達在家必聞既蘊睦親之志所居則化多稱不器之能解褐南鄭主簿州主司馬垂引在使幕轉長社尉隴西法曹皇甫侁江西採訪奏為推官授大理司直攝殿中侍御史賜緋魚袋尋正除殿中歷宰郿渭南成都三縣帛丿糸州刺史賜紫金魚袋戶部郎中加朝散大夫廣德中檢校駕部郎中上柱國充嚴武劒南行軍司馬杜鴻漸分蜀為東西川以公為副元帥判官知東川節度拜大中大夫帛丿糸劒梓遂都防禦使梓州刺史兼中丞時寇盜充斥公示以威信八將之不隕公之力焉尋拜東川節度使俄而移軍復為遂州都督徵拜給事中間歲拜京兆少尹明日遷京兆尹出為杭州刺史公務清簡庭落若無吏焉不幸感風疾以大歷十二年歲次丁巳秋七月二日辛亥薨於常州之別館春秋五十有八夫人京兆韋氏太子中舍迪之第三女也沈敏精深高明柔克幹夫之蠱以懋厥家生五子四女而公即世夫人星言晝哭躬護櫬轊與子楊以冬十一月二十有四日壬申歸窆公於萬年縣洪原鄉之少陵原祔先塋也嗚呼以公之志業才力宜其振揮鱗翮淩厲清浮而命迮成山功虧長世吁足恨也真卿忝居友壻亟接周行痛音徽之永隔感存歿其何巳銘曰藹藹禺禺時維杜公業光臺省政洽軍戎乃尹京兆乃麾江東帝方俟理命則不融內子護喪哀哀送終銘善父母之謂孝睦昆友之謂悌孝悌也者其仁之本歟經天緯地之謂文博古知今之謂學文學也者其德之蘊歟誰其兼之即我伯舅殷君其人矣君諱踐猷字伯起陳郡長平人五代祖不害以孝見梁書高祖英童周御正中大夫麟趾學士曾祖聞禮唐太子中書舍人宏文館學士祖令言校書郎淄川令父子敬太常博士吳令累葉皆以德行名義儒學翰墨聞於前朝君即吳縣之元子幼而聰悟絕倫長而典禮不易年十三日誦左傳二十五紙讀稽聖傳一遍亦誦之博覽㣥言尤精史記漢書百家氏族之說至於陰陽數術醫方刑法之流無不該洞焉與賀知章陸象先我伯父元孫韋述友善賀呼君為五總龜以龜千年五聚問無不知也君性方正志業淳深識理清遠人皆望而服之解褐杭州參軍刺史宋璟以相國之重簡貴自居無所推揖每見君必特加禮敬凡政事之諉諈者皆咨決焉開元初舉文儒異等授祕書省學士尋改曹州司法參軍麗正殿學士與韋述袁暉同修王儉今書七志及㣥書四錄流別銓次皆折衷於君璟與蘇頲既入相每引君詢以當代之務友于兄弟㣥從宗黨必盡糺綏之恩長妹蘭陵郡太夫人真卿先妣也中年孀嫠遺孤十人未能自振君悉心訓獎皆究恩意故能長而有立開元九年秋七月九日有叔父臨黃尉子元之喪哀慟嘔血終於京師通化坊之私第夫人蘭陵蕭氏司空瑀之元孫括州司馬宋國公興宗之女賢和齊肅秉修禮度能讀論語周易泛觀史傳率諸婦以和義故閨範修睦焉君之捐館以清白留遺家道索然夫人躬甘菲糲勸勉桑穡晏息晨興以率勵僮僕行之數歲經費羨焉教誨三子攝寅克齊等皆克負荷攝大斌令克齊高平尉為真卿河東覆屯軍試判官並不幸早世寅聰達有精識能繼先父之業有大名於天下舉宏詞太子校書永寧尉箠殺謾吏貶移澄城丞久疾將歿顧瞻太夫人欲訣不忍其子監察御史亮年未志學隱而潛衋之及寅卒斬指翦髮寘於棺中誓事太夫人不敢渝常日及有疾不脫衣帶者數年故白燕巢於苫楣乾元元年太夫人季女適於邠州司馬陸超板輿隨牒俄而遘疾三月朔日終於超之官舍春秋八十有一龜筮未從因權殯於三水亮以校書郎遷壽安尉為真卿荊南節度推官廣德二年十有二月與弟今滎陽尉永匍匐徒步力護雙櫬合祔君夫人於新安縣之龍澗原三子塋從理命也嗚呼以君之才之美被服純行加人數等清修素業為代元龜竟不得贊皇極而叶彞倫登泰階而儀百辟不其惜乎嗟乎仲尼聖者也終於魯司寇而君官與之比公明達者也年纔四十八而君壽與之齊豈聖賢之道有遭遇乎將運命之數有窮通乎茲小子所以獻疑而述報施也大歷五年夏五月真卿以恩宥刺撫於州採石刻頌丹寄碣於墓左銘曰殷之後昆奕葉儒門盛烈存兮君能濟美於穆不已明德尊兮運促道長身歿名揚教義敦兮合祔先窆述遵理命哀順孫兮高墳崔嵬龍澗之隈映鮮原兮斯焉窆止以望君子慰營魂兮維乾元元年歲次戊戌九月庚午朔三日壬申第十三叔銀青光祿大夫使持節蒲州諸軍事蒲州刺史上輕車都尉丹陽縣開國侯真卿以清酌庶羞祭於兦姪贈贊善大夫季明之靈惟爾挺生夙標幼德宗廟瑚槤階庭蘭玉每慰人心方期戩穀何圖逆賊間舋稱兵犯順爾父竭誠常山作郡余時受命亦在平原仁兄愛我俾爾傳言爾既歸止爰開土門土門既開凶威大蹙賊臣不救孤城圍逼父陷子死巢傾卵覆天不悔禍誰為荼毒念爾遘殘百身何贖嗚呼哀哉吾承天澤移牧河東泉明比者再陷常山攜爾首櫬及茲同還撫念摧切震悼心顏方俟遠日及爾幽宅魂而有知無嗟久客嗚呼哀哉尚饗維乾元元年歲次戊戌十月庚子朔廿一日庚申第十三姪男銀青光祿大夫使持節饒州諸軍事饒州刺史上輕車都尉丹陽縣開國侯真卿敢昭告於兦伯故朝議大夫豪州刺史府君之靈曰日者羯胡祿山侵擾河洛生靈塗炭兵甲靡夷二兄杲卿任常山郡太守忠義憤發首開土門擒斬逆豎挫其凶慝先蓋授衞尉卿兼御史中丞城孤援絕身陷賊庭聖朝哀榮裦贈太子太保甥姪八人季明盧逖等被賊害者並贈五品京官嫂及兒女皆被拘囚睿略昭宣宇宙清廓脫於賊手並得歸京真卿比在平原遭罹凶逆與杲卿同心協德亦著微誠二聖憫焉授戶部侍郎河北採訪招討使又遷工部憲部二尚書再兼御史大夫出為同蒲饒三州刺史聖恩錫類大父贈華州刺史兄弟兒姪盡蒙國恩允南授膳部郎中允臧授侍御史威明試太僕丞頍受太子洗馬頂授協律郎熲授祕書省校書郎賜緋魚袋泉明顥頲穎等並蒙遷改一門之內生死哀榮真卿時赴饒州至東京得申拜掃又方遠辭違伏增感咽謹以清酌庶羞之奠以伯母河南縣君元氏配尚饗
