front:
  text: 全唐文欽定全唐文卷一百五十三義府瀛州饒陽人貞觀八年擢第補門下省典儀纍除舍人加崇賢館直學士高宗立叩閣上表請立武昭儀為后擢拜中書侍郎同中書門下三品賜爵廣平縣男尋進爵為侯拜中書令封河間郡公龍朔三年遷右相坐贓除名流巂州乾封元年卒年五十三如意元年武后以其有翊贊功追贈揚州大都督
  hash: sha256:21886abf389b440f73306aff647e63e612e0512cfeb6b2cf1c1a05b27cdedf1b
  markers:
