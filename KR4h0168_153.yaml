body:
  text: 邃初冥昧元氣氤氳二儀始闡三才既分司乾立宰出震為君化昭淳朴道映典墳功成揖讓事極華勛肇興夏啓降及姬文咸資繼德永樹高芬百代沿襲千齡奉聖粵若我后丕承寶命允穆三階爰齊七政時雍化洽風移俗盛載崇國本式延家慶震維標德離警體正寄切宗祧事隆監撫思皇茂則敬詢端輔業光啓誦藝優干羽九載崇儒三朝問豎歷選儲儀遺文在斯望試登俎高喻喬枝俯容思順非禮無施前修盛業來哲通規飭躬是蹈則睿問風馳立志或爽則元猷日虧無恃尊極修途難測無恃親賢失德靡全勿輕小善積小而名自聞勿輕微行纍微而身自正佞諛有類邪巧多方其萌不絶其害必彰監言斯屏儲業攸昌竊惟令嗣有殊前事雖以貴以賢而非長非次皇明眷德超倫作二匪懋聲華莫酬恩異匪崇徽烈莫符天志勉之又勉光茲守器下臣司針敢告近侍闕燕於闕一字下闕緒紀雲凝闕一字鬱闕馬之闕之闕爰彰於必復積慶成闕大闕逸闕二字道高衡泌垂董帷而勗志掩孫戶而闕三字前賢之闕二字先聖之旨於闕標遠概漢東籍其英烈江北仰其嘉猷俗推獨步時稱闕二字屬炎靈版蕩闕一字縣崩離闕且闕六字之陰謀癖左邱之微婉引公為師友特蒙優遇公歷闕一字圖讖備詳興滅昔黃闕二字彩驗闕一字苗之必闕屢申借箸之謀逮高祖九五飛天一六光宅思闕一字西之績想中涓之從武德元年授齊闕一字府文學闕誠闕改闕一字齊闕一字文學九闕一字又轉行酆闕一字府文學公曾徽彌劭纍職英藩置醴猿恩踰闕一字穆闕二字莬苑闕燕闕行闕參軍輕闕二字飛闕一字西園之良宴長裾晨曳叶東平之樂善至如梁臺逸藻賦來水之檀欒楚澤奇材闕一字倚天之闕二字以闕月命公闕共難經闕二字雅闕二字揚高情俶儻飛談鋒起騁論濤驚百辟於是解頤一人由其拭目獨闕一字四座之闕一字孤闕二字席之闕吏猾闕一字澆公克奉朝章以毗藩化務崇清政闡廉平惠澤旁流嘉謠遠洽尋以東陽富域闕露輕浮載革敬讓爰興聊遵置薤之言俄喧伐枳之詠既而景催奔箭禮就懸車闕三字於闕學闕除國闕祭酒詞條縱辨闕一字五闕一字於環林言泉騁義降三鱣於璧沼教興青領術究丹碑才闕一字風行之化闕一字致月闕一字之益闕一字宏闕一字禮闕三字所以闕彼闕十三字之闕四字難闕一字望闕二字方闕一字斯授草三年除散騎常侍出陪鸞輅承密勿之榮入映貂璫闕三字之重闕三字達闕公纍登闕娛黃髮庶褫青緺屢申祈請久而方遂永徽五年下詔曰褒賢之義列代彞章尚齒之風闕四字散騎常侍闕歸闕一字嘉聲於瑣闥懸車禮及抗表祈間宜錫崇班式旌高志可金紫光祿大夫闕川閲蒼波風驅白日方扈云亭之禮奄廠田坴穸室之悲以顯慶三年正月七日遘疾薨於長安縣之闕下闕七字禮窮寵秩桓榮侍講恩加詔葬故金紫光祿大夫張允識量寬厚體業淳粹依仁遊藝經明行修早蒙闕德闕十七字之闕一字以闕一字安斯鐘漏懸車邑里方養德於東序奄移舟於夜壑永言懿範實愴於懷闕一字遠闕四字彞典闕葬昭陵賜闕人監護粵以其年月日陪窆於昭陵所禮也惟公靈臺祕遠神府沖深闕一字身以恭儉之闕二字德以忠闕河之疑闕一字邁闕二字之闕五字之闕二字帝闕一字之闕一字綜微言於繫表授雅訓於宸衷覽稷起而知真聽社鳴而闕一字聖策名睿主委闕德闕表其芳闕一字謠闕三字美化恭勤處事平允居心澄撓不移始終無爽暨乎清輝已謝縟禮猶加闕一字八座之榮闕一字九闕一字之闕公闕二字零池闕四字尉第二子濟子謙第四子巽第六子小師並早亡第五子律師泗州司馬第七子統師太常丞第八子豐闕之闕徵闕一字載闕一字刊鐘鏤鼎功伐攸傳思撰芳猷樹之神道俾清埃之不絶與皎日而長懸其詞曰闕九輔祥鈞叶贊互顯題楨各隆棟幹璧來耀廡珠生滋岸其散闕一字宏道華禁飛名零陵導德雅俗闕一字聲帝師闕二字學闕杏壇業優槐市其四野瓜分三方鼎立察景遙騖瞻星回集師傅攸闕一字恩徽備及禮光錫闕一字寵闕爰闕五字年登扶麻日就素範攸青規式授望表時髦德華朝秀闕芝闕二字赤松馳闕一字方闕切三友哀纏九族其九恩隆詔葬澤被幽埏兆培畢闕三字原阡闕闕十一字之闕五十四字覆餗緬懷千闕四字乎若乃潤柔範於椒庭闕六字包四德而由巳總六行以立身騰潤質於方流耀清輝於闕一字魏闕二十字則蘭陵長公主兼之矣公主諱淑字麗貞隴西狄道人也高祖武皇帝之孫太宗文皇帝之第十九女也原夫電影流樞瑤華襲月十枝分葉五潢疏派帝子光於闕一字葉闕二字降於闕一字陵闕一字亦煥彼緹油懸諸日月公主稟中和之正氣陶上質之粹靈履冰泉以表潔踐霜柏以含貞首無金翠之飾耳絶絲桐之聲共梁妻而比行與萊婦而齊名况乃婉順幽間端凝淑美擢春葩於蘭籍皎秋月於芝田神鑒詳明風徽韶美仁為性道豈資冥助孝實天經因心必極雖左姬之含華挻秀謝媛之育德揚芬式鏡前芳流風詎遠九齡讀易窮謙損之微言闕一字歲學書盡鍾張之妙迹文皇帝愛既纏心特流闕二字貞觀十年乃下詔曰第十九女理識幽間質性柔順幼嫻禮訓夙鏡詩文湯沐之典抑有恆規可封蘭陵郡公主食邑三千戶榮寵之錫雖冠公宮撝挹之情常懷闕二字而彤闕一字未降紫罽闕一字停妙選高門方從下嫁天子永言舅氏情深渭陽載穆彞章用崇姻戚駙馬都尉慶州諸軍事使持節慶州刺史扶風竇懷哲即太穆皇后之孫銀青光祿大夫少府監上柱國德素之子潔澄瀾之萬頃飛辨箭以浮闕一字擢貞闕一字於千尋聳闕二字以拂日譬良金之百鍊喻華燈之九光踐孝資忠履仁基信泛虛舟而獨往鑒止水而忘歸出總褰帷政均黃趙入司交戟任切鉤陳業峻籝金闕一字班家之十紀勳闕五字宗之五碑射枝逸技貫七札而稱妙揮毫雅製標六義而含章搏徑翮於南溟騁逸足於西海自中陽纂歷舂陵應圖或慶發黃雲祥浮紫氣或家藏金穴瑞表闕二字皆聲塵闕四字荒闕一字我有餘慶奕代椒房嬰則望重西京融乃名高東漢克復其始遠屬華宗故知德祖太尉之孫既傳芳於楊敞元成丞相之子亦絢美於韋賢闕一字地清華僉論闕二字竇闕一字之闕一字屬闕五字比夫遠闕一字獨映前修公主義叶三從情歸百兩賓敬之禮必表於閨庭喜慍之容不形於造次敦睦親於娣姒竭蒸孝於舅姑言應禮經動合規矩皇明嗣極載篤周親永徽元年別拜長公主仍加封五十戶恩崇湯沐寵茂輜軿公主深誡驕侈常安儉薄前後錫賚莫不固辭皆理為情申文非貌請誠宜憑斯積慶享彼遐齡而與善徒欺輔仁多爽春秋卌二以顯慶三年八月闕一字八日闕一字疾薨於雍州萬年縣之平樂里第反魂之香空留闕一字被闕一字簫之闕一字終辭鳳臺奉詔竇氏既是大外家情禮稍異特宜陪葬昭陵即以其年歲次巳未十月甲辰朔草九日闕二字遷窆於闕一字陵闕二字十里安樂原禮也聖上哀深同氣特降殊私賵襚所須務存優厚弔祭之禮有異常倫仍敕衛尉卿閻立行光祿卿殷令名為副監護喪事特給鼓吹送墓往還惟公主妙質柔明雅識詳潤芝蘭成性琬璧為心莊敬自持溫謙逮下聿修蘋藻闕一字奉宗祧有闕二字之闕一字懷闕二字之操信可以流芳鼎室垂訓台庭茂麟趾於黃圖敞龍門於赤縣而星沈寶嫠月掩金娥寂寂荒階唯瞻茂草亭亭虛帳空見遊塵豈直痛結冕旒悲深儲二而巳駙馬軼安仁之永歎邁奉倩之傷神悼奔駟之難留泣藏舟之易闕三字相費闕三字以闕二字幼婦外孫闕二字碑而見託輒牽拙思乃作銘云其詞曰赫赫皇猷昭昭帝族導源薑水分枝若木月浦資粹星津誕淑秀發雲翹祥摛日谷其一兩儀演慶四像闕一字輝承闕一字丹掖闕二字黃扉闕一字慎無怠秪敬弗違禮崇舉案慈流斷機其二秋窗望月春樹臨風裁針作範草賦開蒙詞溫華瑾文艷雕蟲鉛芳罷飾紃組為闕一字其三桂棟晨開梅梁晝敞光闕三字香飄翠幌鳳簫凝吹魚軒疊響虹玉輝庭驪珠耀掌其四粵有道人摽映搢紳日下馳譽席上稱珍孔合成偶輔德為鄰一調琴瑟載叶松筠其五皎皎令姿盈盈淑哲匪唯侍君所期同穴闕一字劍光沈闕一字鸞闕一字絶蘭儀方秀草芳遽折其六女樓西顧娥臺北臨山煙漠漠隴日沈沈白楊行拱翠檟方深式刊貞筍永播徽音其七思立宋州寧陵人高宗時為侍御史遷考功員外郎臣思立言臣伏見河南河北旱儉敕遣御史中丞崔謐給事中劉景先分道存問兼量事賑貸竊以水旱流行古今代有不專示生月亦以戒盈伏維天皇德越堯湯恩隆父母才逢殊候即軫沖襟但謂聖人隔於九重不知皇心遍於四海所以分道出使量使優矜曲成賙給特加存問誠非愚暗所合名言然芻蕘之情尚有未達敢獻狂直乞垂省覽何者麥序方秋蠶功未畢三時之務萬姓所先敕使巡撫人皆悚忙忘其家業冀此天恩踴躍來迎必難抑止集衆既廣妨廢亦多加以途程往還兼之晨夕停止設遣物去決不盡還况宣問須見衆人賑給須作文簿少處猶經兩月多處必更淹延都計所歷州縣煩擾不可勝紀又一使之下凡有一十六人並馱所須總來一馬無驛之處須動公私簡弱取強非五十匹不可禁馬之所求覔甚難使人欲求必須預追簡擇雨後農務特切常情暫廢須臾即虧歲計每為一馬遂勞數家從此相乘恐更滋甚又刺史縣令委任不輕準敕即成合稱明旨用倉給戶不足為難且令賑貸庶免飢乏若須出使褒貶請待秋後間時臣備位憲司不敢不奏臣懿宗言伏奉某月日制書録臣等在軍微功將加勳封嘉命聿至寵靈載優伏對慙殞魂守顛越臣某中謝臣聞古者名將先士卒而後身故其功勸末世庸將窮人力以寵已故其政乖然則簞醪投河三軍告醉刓印在手萬夫以失與衆共功專以獨利成敗之紀興亡繼焉賞者國之大柄不可忽焉日者林胡搆孽敢亂邊陲陛下徵義兵誅不道天下士衆焱集星馳皆忘身憂國紓禍却難至於躬矢石血草莽冒難險歷寒溫氣騰青雲精貫白日誠亦勤矣雖則聖靈威遠逆虜自滅然士卒戮力亦盡其勞今大功未酬衆議猶在而臣等駑怯猥加先封臣不能折衝虜庭還師袵席今坐加茅土之賜以先將士之勤使鶡冠虎臣將何以勸今戰夫留滯於外府軍吏咨嗟於下寮臣等胡顏敢冒天造夫賞一勸百猶恐未孚利一沮萬其弊誰救爵命不可以招謗國章不可以假人伏願俯回天光照察軍禮請以臣前件勳封回授征戰之人及立功將士等上以明國之大賞下以知臣等謬功使人悅忘勞士感知死然後兵可訓勵士可誅屠此誠國之元經不可苟而利者臣等不勝區區悚迫之至移風易俗莫善於樂睦親化人莫善於孝所以三年之禮天下通喪今遣音聲人釋服為樂帶絰治音豈以小人不能執禮遂欲約為非法萬石官太常首紊風化請付吏論罪敬德名恭以字行朔州善陽人為劉武周將軍敗降秦王為右一府統軍除右武候大將軍封鄂國公授開府儀同三司圖形淩煙閣太宗征高麗詔以本官行太常卿為左一馬軍總管顯慶三年卒年七十四册贈司徒並州都督諡曰忠烈車駕若自往遼左皇太子又監國定州東西二京府庫所在雖有鎮守終自空虛遼東路遙恐有元感之變且邊隅小國不足親勞萬乘若剋勝不足為武儻或不勝恐為所笑伏請委之良將自可應時摧滅靖字藥師雍州三原人仕隋為馬邑郡丞太宗召入幕府從平王世充蕭銑授上柱國封永康縣公貞觀中拜刑部尚書以本官兼檢校中書令封代國公加左光祿大夫拜右僕射圖形淩煙閣進位衛國公開府儀同三司二十三年薨年七十九贈司徒並州都督諡曰景武臣聞人不見形憑諸水鑑事不可預明其箝兆蓍灼是虛尚假精意水鑑雖徹資其目成故形以目窺而見微兆以識察而觀妙斯事畢舉孰可倣之如有一闕則難依據臣性識愚劣藝術淺薄覽於異書頗知至要只如目前者定近遠察是非辨青黃知善惡上觀乾象中測人情下鑒坤維斯等莫不皆由目中光也若能見之戰鬬出軍涉水陸即目下愛黑若光去目患難立至則上不能見輔星中不能辨親疏下不能觀萬物此神光去矣其不覩斯妙臨患之時夫何誤哉頗有云為兼以昏晦若能存神光於目眥察輔星於武曲則不勞蓍灼休咎預分未接兵戈前知勝負其文省而易教其理精而易通固可以去危就安轉禍為福是知高祖心動卒免迫人之謀趙襄馬驚懸知刺客之狀古來賢哲皆宗師曠晉平張良受黃石之要此乃傳行世代歷載既深文字或謬語有其繁臣竊不自揆輒次之以此成一軸號曰天老神光謹進於闕庭臣熟知陛下聖慮明暢妙理精通然臣今敢聞以繁聽覽臣恐陛下以此微細不納宸衷臣之愚直實以為保護聖躬莫不至斯道危難之代實以保身臨事便知吉凶固詳察不鄙芻蕘無任忠勤之誠謹冒死奉表謹獻以聞臣誠惶誠恐死罪死罪謹言貞觀七年月日右僕射衛國公臣李靖上表臣聞宰臣程材樗散無棟梁之用陶冶成器滿盈有傾覆之憂是以量力著於魯史招損陳於夏載臣固庸流無階貴仕短翮慕侶顧榆枋而自得駘足追㣥瞻燕越而絶思幸屬光華啓旦管庫無遺録其丹赤棄其瑕滓假宮商於庸音披丹漆於朽質雖復南臨徼外北踐沙場敵必倒戈人懷尚義以此為效實貪天功而上賞亟行鴻恩罔已錫爵胙土連衡寇鄧腰金鳴玉方軌崔盧木石有心豈不增愧自濫端副待罪文昌靦顏疚心屢移星琯畫一之譽無紀明時維鵜之譏日聞朝聽遂使化洽陰陽或虧於玉燭德動辰緯時爽於珠聯求其所繇並臣之咎加以年事西夕疴疾日侵腰腳疼痺筋力衰竭雖欲勉勵非復全人臣猶知之况於他人臣之所祈本陳情實非敢追蹤疏傅繼迹留侯妄自矯飾求茲虛譽若使尸素重任無損國猷亦當黽俯匪服甘受身纍撫事論心無一而可乞解所職養病私門伏願暫屏冤旒曲鑒丹懇輟天威於雨露回陽光於葵藿則彞章載穆品物咸亨臣未申投報方違軒陛伏紙慙戀預懷罔極布衣李靖不揆狂簡獻書西嶽大王閣下靖聞上清下濁爰分天地之儀晝明夜昏乃著神人之道又聞聰明正直依人而行至誠感人信不虛矣伏惟大王嵯峨擅德肅爽凝威為靈術制百神配位名雄四嶽是以歷像清廟作鎮金方遐觀歷代哲王莫不順時禋祀興雲致雨天實肯從轉孽為祥何有不賴嗚呼靖者一丈夫爾何得進不偶用退不獲安呼吸若窮池之魚進退似失林之鳥憂傷之心不能巳巳社稷陵遲宇宙傾覆姦雄競逐郡縣土崩遂欲建義橫行雲飛電掃斬鯨鯢而清海嶽卷氛祲以闢山河使萬姓昭蘇庶物昌運即應天順時之作也又大寶不可以妄據欲伏劍竭節未有飛龍在天捧忠義之心身傾濟世志吐肝膽於陛下惟神鑒之願告進退之機得遂平生之志有賽得之時終陳擊鼓若三問不對亦何神之有靈然後即靖斬大王頭焚其廟建縱橫之略亦未晚也惟神裁之謹按是書詞氣過激故廣川書跋弇州山人稿石墨鐫華皆謂出自後人依託以李肇國史補嘗徵引其事仍載入存考績字懋功曹州離狐人本姓徐初從李密守黎陽武德二年隨密歸朝授黎州總管封萊國公賜姓附宗正屬籍徙封曹纍遷左監門大將軍太宗朝拜並州都督徙封英召為兵部尚書授詹事同中書門下三品畫像淩煙閣出為謺州都督高宗立授開府儀同三司同中書門下參掌機密册拜司空加太子太師總章二年卒年八十六贈太尉揚州大都督諡貞武績本名世績避太宗偏諱改名績臣聞殷薦上帝事有明文祖宗並列抑惟通軌雖三五以降損益不同漢魏以還沿革殊致至於帝郊嚴配之儀尊祖敬宗之典固以因心宏範緣情作則孝思聖敬迥冠往初茂實宏規遂高終古伏惟高祖太祖皇帝改物創業撥亂反正受終明三統之歷執競隆七百之基御極垂衣稱物平施隨山靜稽天之浸授首撲燎原之災元功暢於六虛聖績覃於四海巍巍蕩蕩無得而稱太宗文皇帝鑿乾履度括地提衡翦修蛇於洞庭戮蚩尤於中冀戡召雨追風之孽軼斷鼇煉石之勤微禹之功用軫宣尼之歎曰文之德實符姬旦之時睿智神武含宏光大深居高視懷日月以照臨剛健柔明體乾坤之博厚求賢勞於宵夢拜善急於朝餐總宇宙以彌綸運陰陽而陶鑄變澆偽於華胥之俗還淳朴於大庭之辰九譯同文八荒順軌人神以合祥瑞畢臻巢鳳下窺遊麟易擾山車澤馬遠服瑤池之駕醴泉甘露近充上壽之尊優遊垂拱制禮作樂遠鏡百王獨為稱首再造區夏重安宸極昊天成命二帝受之升降節文不宜差別而肅恭禋祀綴兆分位升中告禪天地別饗乖嚴父配天之文失尊親加隆之數今歸功中嶽請以二帝並配竊以太穆皇后造舟備禮爰定厥祥處人倫之經居風化之始追蹤文母播美周嫄文德皇后俔天作合曾沙表慶功侔十亂化被二南兩聖既巳配封則二后應須配禪申宸思淳深之極宏聖朝敬愛之旨自我作古聞之往策周制所定夫何足云斯乃振揚休烈昭宣懿範請存乎不刊永貽來葉竊以祖功宗德飾終之祠典武穆文昭嚴配之洪訓愛敬之至率由茲道禮有節文事經列聖苟違斯義國家賒恥况逾月之外須伸大祫下管登歌發暢雅頌郊天配帝光華勳烈如停祔禮諸美咸棄伏願取法前王垂訓翼子竊謂合宜今時廟制與古不同共堂別室西方為首若在西夾之中仍處尊位祈禱則祭未絶祈享方諸舊儀情實可安宏農府君廟遠親殺詳據舊章禮合迭毀臣等參議遷奉神主於夾室本情篤敬在理為允立本大安公贈吏部尚書立德弟顯慶中纍官工部尚書總章元年以司平太常伯拜右相封博陵縣男咸亨元年官復舊名改中書令卒諡曰文貞竊以寂滅垂範猶宏孝敬之義無為闡化終叶虔恭之禮雖道超可道尚繫於三尊法空諸法猶包於四大况皇猷遠暢衍地義以宣風聖澤遐霑浹天經而灑潤至德所被理不隔於幽明大道旁通故無分於真俗而違方之士空迷相物之心淪俗之徒尚嬰自我之纍莫識九重之貴不知得一之尊絶忠孝於君親棄親愛於母后求諸至理竊謂不通俱拜君親未乖舊典謹議胄字元允相州安陽人隋大業末為鄭州長史鎮武牢太宗剋武牢得之引為秦府士曹參軍及即位除兵部郎中封武昌縣男貞觀四年以太子左庶子參預朝政進爵郡公七年卒贈右僕射追封道國公諡曰忠陛下當百王之弊屬暴隋之後拯餘燼於塗炭救遺黎於倒懸遠至邇安率土清謐大功大德豈臣之所稱贊臣誠小人才識非遠唯知耳目之近不達長久之策敢竭區區之誠論臣職司之事比見關中河外盡置軍團富室強丁並從戎旅重以九成作役餘丁向盡去京二千里內先配司農將作假有遺餘勢何足紀亂離甫爾戶口單弱一人就役舉家便廢入軍者督其戎仗從役者責其糇糧盡室經營多不能濟以臣愚慮恐致怨嗟七月已來霖潦過度河南河北厥田汙下時豐歲稔猶未可量加以軍國所須皆實府庫布絹所出歲過百萬丁既役盡賦調不減費用不止帑藏其虛且洛陽宮殿足蔽風雨數年功畢亦謂非晚若頓修營恐傷勞擾水旱凶災前聖之所不免國無九年儲畜禮經之所明誡今喪亂之後戶口凋殘每歲納租未實倉廩隨即出給才供當年若有凶災將何賑恤故隋開皇立制天下之人節級輸粟名為社倉終於文皇得無飢饉及大業中年國用不足並貸社倉之物以充官費故至末塗無以支給今請自王公以下爰及衆庶計所墾田稼穡頃畝至秋熟準其見在苗以理勸課盡令出粟稻麥之鄉亦同此稅各納所在為立義倉若年穀不登百姓飢饉當所州縣隨便取給彥師武德時官宋州總管吾奉使無狀被賊所擒為臣不忠誓之以死汝宜善侍老母勿以吾為念
