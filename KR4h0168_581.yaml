front:
  text: 全唐文欽定全唐文卷五百八十一柳宗元十三
  hash: sha256:f27d4647051d6ebb6f3e797a37b0647a6ce2ff9bd26ae05840372cb842ce3ea6
body:
  text: 邑之有觀游或者以為非政是大不然夫氣煩則慮亂視壅則志滯君子必有游息之物高明之具使之清寧平夷恆若有餘然後理達而事成零陵縣東有山麓泉出石中沮洳汙塗㣥畜食焉牆藩以蔽之為縣者積數十人莫知發視河東薛存義以吏能聞荊楚間潭部舉之假湘源令會零陵政厖賦擾民訟於牧推能濟弊來莅茲邑遁逃復還愁痛笑歌逋租匿役期月辨理宿蠧藏姧披露首服民既卒稅相與歡歸道途迎賀里閭門不施胥吏之席耳不聞鼛鼓之音雞豚糗醑得及宗族州牧尚焉旁邑倣焉然而未嘗以劇自撓山水鳥魚之樂澹然自若也乃發牆藩驅㣥畜決疏沮洳搜剔山麓萬石如林積坳為池爰有嘉木美卉垂水藂峯瓏蕭條清風自生翠煙自畱不植而遂魚樂廣閑鳥慕靜深別孕巢穴沈浮嘯萃不蓄而富伐木墜江流於邑門陶土以埴亦在署側人無勞力工得以利乃作三亭陟降晦明高者冠山巔下者俯清池更衣膳饔列置備具賓以燕好旅以館舍高明遊息之道具於是邑由薛為首在昔裨諶謀野而獲宓子彈琴而理亂慮滯志無所容入則夫觀遊者果為政之具歟薛之志其果出於是歟及其弊也則以玩替政以荒去理使繼是者咸有薛之志則邑民之福其可既乎予愛其始而欲久其道乃撰其事以書於石薛拜手曰吾志也遂刻之石鍾乳餌之最良者也楚越之山多產焉於連於韶者獨名於世連之人告盡焉者五載矣以貢則買諸他部今刺史崔公至逾月穴人來以乳復告邦人悅是祥也雜然謠曰甿之熙熙崔公之來公化所徹土石蒙烈以為不信起視乳穴穴人笑之曰是惡知所謂祥也嚮吾以刺史之貪戾嗜利徒吾役而不吾貨也吾是以病而紿焉今吾刺史令明而志潔先賴而後力欺誣屏息信順休洽吾以是誠告焉且夫乳穴必在深山窮林冰雪之所儲豺虎之所廬由而入者觸昏霧扞龍蛇束火以知其物縻繩以志其返其勤若是出又不得吾直吾用是安得不以盡告今令人一本無令人二字而乃誠吾告故也何祥之為吾聞之曰謠者之祥也乃其所謂怪者也笑者之非祥也乃其所謂真祥者也君子之祥也以政不以怪誠乎物而信乎道人樂用命熙熙然以效其有斯其為政也而獨非祥也歟鼻亭神象祠也不知何自始立因而勿除完而恒新相傳且千歲元和九年河東薛公由刑部郎中刺道州除穢革邪敷和於下州之罷人去亂即治變呻為謠若痿而起若矇而瞭騰踴相視讙愛克順既底於理公乃考民風披地圖得是祠駭曰象之道以為子則傲以為弟則賊君有鼻而天子之吏實理以惡德而專世祀殆非化吾人之意哉命亟去之於是撤其屋墟其地沈其主於江公又懼楚俗之尚鬼而難諭也乃徧告於人曰吾聞鬼神不歆非類又曰淫祀無福凡天子命刺史於下非以專土疆督貨賄而已也蓋將教孝弟去奇邪俾斯人敦忠睦友祗肅信讓以順於道吾之斥是祠也以明教也苟離於正雖千載之違吾得而更之况今茲乎苟有不善雖異代之鬼吾得而攘之况斯人乎州民既諭相與歌曰我有耉老公燠其肌我有病癃公起其羸髫童之嚚公實智之鰥孤孔艱公實遂之孰尊惡德遠矣自古孰羨淫昏俾我斯瞽千歲之冥公闢其戶我子洎孫延世有慕宗元時謫永州邇公之邦聞其歌詩以為古道罕用賴公而存斥一祠而二教興焉明罰行於鬼神愷悌達於蠻夷不惟禁淫祀黜非類而已願為記以刻山石俾知教之首永州龍興寺東北陬有堂堂之地隆然負塼甓而起者廣四步高一尺五寸始之為堂也夷之而又高凡持鍤者盡死永州居楚越間其人鬼且禨由是寺之人皆神之人莫敢夷史記天官書及漢志有地長之占而亡其說甘茂盟息壤蓋其地有是類也昔之異書有記洪水滔天鯀竊帝之息壤以堙洪水帝乃令祝融殺鯀於羽郊其言不經見今是土也夷之者不幸而死豈帝之所愛耶南方多疫勞者先死則彼持鍤者其死於勞且疫也土烏能神予恐學者之至於斯徵是言而唯異書之信故記於堂上游之適大率有二曠如也奧如也如斯而已其地之陵阻峭出幽鬱寥廓悠長則於曠宜抵邱垤伏灌莽迫遽迴合則於奧宜因其曠雖增以崇臺延閣迴環日星臨瞰風雨不可病其敞也因其奧雖增以茂樹藂石穹若洞谷蓊若林麓不可病其邃也今所謂東邱者奧之宜者也其始龕之外棄地予得而合焉以屬於堂之北陲凡坳窪坻岸之狀無廢其故屏以密竹聯以曲梁桂檜松杉楩楠之植幾三百本嘉卉美石又經緯之俛入綠縟幽蔭薈蔚步武錯迕不知所出溫風不爍清氣自至水亭陿室曲有奧趣然而至焉者往往以邃為病噫龍興永之佳寺也登高殿可以望南極闢大門可以瞰湘流若是其曠也而於是小邱又將披而攘之則吾所謂游有二者無乃闕焉而喪其地之宜乎邱之幽幽可以處休邱之窅窅可以觀妙溽暑遁去茲邱之下太和不遷茲邱之巔奧乎茲邱孰從我遊予無召公之德懼翦伐之及也故書以祈後君子法華寺居永州地最高有僧曰覺照照居寺西廡下廡之外有大竹數萬又其外山形下絕然而薪蒸篠簜蒙雜擁蔽吾意伐而除之必將有見焉照謂予曰是其下有陂池芙蕖申以湘水之流眾山之會果去是其見遠矣遂命僕人持刀斧㣥而翦焉叢莽下頹萬類皆出曠焉茫焉天為之益高地為之加闢邱陵山谷之峻江湖池澤之大咸若有增廣之者夫其地之奇必以遺乎後不可曠也予時謫為州司馬官外乎常員而心得無事乃取官之祿秩以為其亭其高且廣蓋方丈者一焉或異照之居於斯而不蚤為是也余謂昔之上人者不起宴坐足以觀於空色之實而游乎物之終始其照也逾寂其覺也逾有然則嚮之礙之者為果礙耶今之闢之者為果闢耶彼所謂覺而照者吾詎知其不由是道也豈若吾族之挈挈於通塞有無之方以自狹耶或曰然則宜書之乃書於石永貞年予名在黨人不容於尚書省出為邵州道貶永州司馬至則無以為居居龍興寺西序之下予知釋氏之道且久固所願也然子所庇之屋甚隱蔽其戶北向居昧昧也寺之居於是州為高西序之西屬當大江之流江之外山谷林麓甚眾於是鑿西墉以為戶戶之外為軒以臨㣥木之杪無所不矚焉不徙席不運几而得大觀夫室嚮者之室也席與几嚮者之處也嚮也昧而今也顯豈異物耶因悟夫佛之道可以轉惑見為真智即㣥迷為正覺捨大闇為光明夫性豈異物耶孰能為予鑿大昏之墉闢靈照之戶廣應物之軒者吾將與為徒遂書為二其一志諸戶外其一以貽巽上人焉越人信祥而易殺傲化而偭仁病且憂則聚巫師用雞卜始則殺小牲不可則殺中牲又不可則殺大牲而又不可則訣親戚飭死事曰神不置我已矣因不食蔽面而死以故戶易耗田易荒而畜字不孳董之禮則頑束之刑則逃唯浮屠事神而語大可因而入焉有以佐教化柳州始以邦命置四寺其三在水北而大雲寺在水南水北環治城六百室水南三百室俄而水南火大雲寺焚而不復且百年三百室之人失其所依歸復立神而殺焉元和十年刺史柳宗元始至逐神於隱遠而取其地其傍有小僧舍闢之廣大逵達橫術北屬之江告於大府取寺之故名作大門以字揭之立東西序崇佛廟為學者居會其徒而委之食使擊磬鼓鐘以嚴其道而傳其言而人始復去鬼息殺而務趣於仁愛病且憂其有告焉而順之庶乎教夷之宜也凡立屋大小若干楹凡闢地南北東西若干畝凡樹木若干本竹三萬竿圃百畦田若干塍治事僧曰退思曰令寰曰道堅後二年十月某日寺皆復就中國之西數萬里有國曰身毒釋迦牟尼如來示現之地彼佛言曰西方過十萬億佛土有世界曰極樂佛號無量壽如來其國無有三惡八難眾寶以為飾其人無有十厂田坴九惱㣥聖以為友有能誠心大願歸心是土者苟念力具足則往生彼國然後出三界之外其於佛道無退轉者其言無所欺也晉時廬山遠法師作念佛三昧詠大勸於時其後天台顗大師著釋淨土十疑論宏宣其教周密微妙迷者咸賴焉蓋其畱異跡而去者甚眾永州龍興寺前刺史李承晊及僧法林置淨土堂於寺之東偏常奉斯事逮今餘二十年廉隅毀頓圖像崩墜會巽上人居其宇下始復理焉上人者修最上乘解第一義無體空折色之跡而造乎真源通假有借無之名而入於實相境與智合事與理并故雖往生之因亦相不捨誓葺茲宇以開後學有信士圖為佛像法相甚具焉今刺史馮公作大門以表其位予遂周延四阿環以廊廡繪二大士之像繪葢幢幡以成就之嗚呼有能求無生之生者知舟筏之存乎是遂以天台十疑論書於牆宇使觀者起信焉江之滸凡舟可縻而上下者曰步永州北郭有步曰鐵爐步予乘舟來居九年往來求其所以為鐵爐者無有問之人曰蓋嘗有鍛者居其人去而爐毀者不知年矣獨有其號冒而存予曰嘻世固有事去名存而冒焉若是耶步之人曰子何獨怪是今世有負其姓而立於天下者曰吾門大他不我敵也問其位與德曰久矣其先也然而彼猶曰我大世亦曰某氏大其冒於號有以異於茲步者乎向使有聞茲步之號而不足釜錡錢鎛刀鈇者懷價而來能有得其欲乎則求位與德於彼其不可得亦猶是也位存焉而德無有猶不足以大其門然且樂為之下子胡不怪彼而獨怪於是大者桀冒禹紂冒湯幽厲冒文武以傲天下由不推知其本而姑大其故號以至於敗為世笑僇斯可以甚懼若求茲步之實而不得釜錡錢鎛刀鈇者則去而之他又何害乎子之驚於是末矣予以為古有太史觀民風采民言若是者則有得矣嘉其言可采書以為志北之晉西適豳東極吳南至楚越之交其間名山水而州者以百數永最善環永之治百里北至於浯溪西至於湘之源南至於瀧泉東至於黃溪東屯其間名山水而村者以百數黃溪最善黃溪距州治七十里由東屯南行六百步至黃神祠祠之上兩山牆立如丹碧之華葉駢植與山升降其缺者為崖峭巖窟水之中皆小石平布黃神之上揭水八十步至初潭最奇麗殆不可狀其略若剖大甕側立千尺溪水積焉黛蓄膏渟來若白虹沈沈無聲有魚數百尾方來會石下南去又行百步至第二潭石皆巍然臨峻流若頦頷齗齶其下大石離列可坐飲食有鳥赤首烏翼大如鵠方東嚮立自是又南數里地皆一狀樹益壯石益瘦水鳴皆鏘然又南一里至大冥之川山舒水緩有土田始黃神為人時居其地傳者曰黃神王姓莽之世也莽既死神更號黃氏逃來擇其深峭者潛焉始莽嘗曰予黃虞之後也故號其女曰黃皇室主黃與王聲相邇而又有本其所以傳言者益驗神既居是民咸安焉以為有道死乃俎豆之為立祠後稍徙近乎民今祠在山陰溪水上元和八年五月十六日既歸為記以啟後之好游者自予為僇人居是州恒惴慄其隟也則施施而行漫漫而游日與其徒上高山入深林窮迴溪幽泉怪石無遠不到到則披草而坐傾壺而醉醉則更相枕而臥臥而夢一無臥而夢三字意有所極夢亦同趣覺而起起而歸以為凡是州之山有異態者皆我有也而未始知西山之怪特今年九月二十八日因坐法華西亭望西山始指異之遂命僕人過湘江緣染溪斫榛莽焚茅茷窮山之高而止攀援而登箕踞而遨則凡數州之土壤皆在衽席之下其高下之勢岈然窪然若垤若穴尺寸千里攢蹙累積莫得遯隱縈青繚白外與天際四望如一然後知是山之特出不與培塿為類悠悠乎與灝氣俱而莫得其涯洋洋乎與造物者游而不知其所窮引觴滿酌頹然就醉不知日之入蒼然暮色自遠而至至無所見而猶不欲歸心凝形釋與萬化冥合然後知吾嚮之未始游游於是乎始故為之文以志是歲元和四年也鈷鉧潭在西山西其始蓋冉水自南奔注抵山石屈折東流其巔委勢峻盪擊益暴齧其涯故旁廣而中深畢至石乃止流沫成輪然後徐行其清而平者且十畝有樹環焉有泉懸焉其上有居者以予之亟游也一旦款門來告曰不勝官租私券之委積既芟山而更居願以潭上田貿財以緩禍予樂而如其言則崇其臺延其檻行其泉於高者而墜之潭有聲潀然尤與中秋觀月為宜於以見天之高氣之迥孰使予樂居夷而忘故土者非茲潭也歟得西山後八日尋山口西北道二百步又得鈷鉧潭西二十五步當湍而浚者為魚梁梁之上有邱焉生竹樹其石之突怒偃蹇負土而出爭為奇狀者殆不可數其嶔然相累而下者若牛馬之飲於溪其衝然角列而上者若熊羆之登於山邱之小不能一畝可以籠而有之問其主曰唐氏之棄地貨而不售問其價曰止四百予憐而售之李深源元克己時同游皆大喜出自意外即更取器用剷刈穢草伐去惡木烈火而焚之嘉木立美竹露奇石顯由其中以望則山之高雲之浮溪之流鳥獸之遨遊舉熙熙然迴巧獻技以效茲邱之下枕席而臥則清泠之狀與目謀瀯瀯之聲與耳謀悠然而虛者與神謀淵然而靜者與心謀不匝旬而得異地者二雖古好事之士或未能至焉噫以茲邱之勝致之豐鎬鄠杜則貴游之士爭買者日增千金而愈不可得今棄是州也農夫漁父過而陋之價四百連歲不能售而我與深源克己獨喜得之是其果有遭乎書於石所以賀茲邱之遭也從小邱西行百二十步隔篁竹聞水聲如鳴佩環心樂之伐竹取道下見小潭水尤清洌全石以為底近岸卷石底以出為坻為嶼為嵁為巖青樹翠蔓蒙絡搖綴參差披拂潭中魚可百許頭皆若空游無所依日光下澈影布石上怡然不動俶爾遠逝往來翕忽似與游者相樂潭西南而望斗折蛇行明滅可見其岸勢犬牙差互不可知其源坐潭上四面竹樹環合寂寥無人凄神寒骨悄愴幽邃以其境過清不可久居乃記之而去同游者吳武陵龔古予弟宗圓隸而從者崔氏二小生曰恕己曰奉壹由冉溪西南水行十里山水之可取者五莫若鈷鉧潭由溪口而西陸行可取者八九莫若西山由朝陽巖東南水行至蕪江可取者三莫若袁家渴皆永中幽麗處也楚越之間方言謂水之反流者為渴音若衣褐之褐渴上與南館高嶂合下與百家瀨合其中重洲小溪澄潭淺渚間厠曲折平者深黑峻者沸白舟行若窮忽又無際有小山出水中山皆美石上生青叢冬夏常蔚然其旁多巖洞其下多白礫其樹多楓枏石楠楩櫧樟柚草則蘭芷又有異卉類合歡而蔓生轇轕水石每風自四山而下振動大木掩苒眾草紛紅駭綠蓊葧香氣衝濤旋瀨退貯谿谷搖颺葳蕤與時推移其大都如此余無以窮其狀永之人未嘗游焉予得之不敢專也出而傳於世其地世主袁氏故以名焉自渴西南行不能百步得石渠民橋其上有泉幽幽然其鳴乍大乍細渠之廣或咫尺或倍尺其長可十許步其流抵大石伏出其下踰石而往有石泓昌蒲被之青蘚環周又折西行旁陷巖石下北墮小潭潭幅員減百尺清深多鯈魚又北曲行紆餘睨若無窮然卒入於渴其側皆詭石怪木奇卉美箭可列坐而休焉風搖其巔韻動崖谷視之既靜其聽始遠予從州牧得之攬去翳朽決疏土石既崇而焚既釃而盈惜其未始有傳焉者故累記其所屬遺之其人書之其陽俾後好事者求之得以易元和七年正月八日蠲渠至大石十月十九日踰石得石泓小潭渠之美於是始窮也石渠之事既窮上由橋西北下土山之陰民又橋焉其水之大倍石渠三之一亘石為底達於兩涯若牀若堂若陳筵席若限閫奧水平布其上流若織文響若操琴揭跣而往折竹掃陳葉排腐木可羅胡床十八九居之交絡之流觸激之音皆在牀下翠羽之木龍鱗之石均蔭其上古之人其有樂乎此耶後之來者有能追予之踐履耶得意之日與石渠同由渴而來者先石渠後石澗由百家瀨上而來者先石澗後石渠澗之可窮者皆出石城村東南其間可樂者數焉其上深山幽林逾峭險道狹不可窮也自西山道口徑北踰黃茅嶺而下有二道其一西出尋之無所得其一少北而東不過四十丈土斷而川分有積石橫當其垠其上為睥睨梁欐之形其旁出堡塢有若門焉窺之正黑投以小石洞然有水聲其響之激越良久乃已環之可上望甚遠無土壤而生嘉樹美箭益奇而堅其疏數偃仰類智者所施設也噫吾疑造物者之有無久矣及是愈以為誠有又怪其不為之中州而列是夷狄更千百年不得一售其伎是固一作故勞而無用神者倘不宜如是則其果無乎或曰以慰夫賢而辱於此者或曰其氣之靈不為偉人而獨為是物故楚之南少人而多石是二者予未信之出州南譙門左行二十六步有棄地在道南南值江西際垂楊傳置東曰東館其內草木猥奧有崖谷傾亞缺圯豕得以為囿虵得以為藪人莫能居至是始命披刜蠲疏樹以竹箭松檉桂檜柏杉易為堂亭峭為杠梁下上徊翔前出兩翼憑空拒江江化為湖眾山橫環嶚濶瀴灣當邑居之劇而忘乎人間斯亦奇矣乃取館之北宇右闢之以為夕室取傳置之東宇左闢之以為朝室又北闢之以為陰室作屋於北墉下以為陽室作斯亭於中以為中室朝室以夕居之夕室以朝居之中室日中而居之陰室以違溫風焉陽室以違淒風焉若無寒暑也則朝夕復其號既成作石於中室書以告後之人庶勿壞元和十二年九月某日柳宗元記古之州治在薄水南山石間今徙在水北直平四十里南北東西皆水匯北有雙山夾道嶄然曰背石山有支川東流入於潯水潯水因是北而東盡大壁下其壁曰龍壁其下多秀石可硯南絕水有山無麓廣百尋高五丈下上若一曰甑山山之南皆大山多奇又南且西曰駕鶴山壯聳環立古州治負焉有泉在坎下恒盈而不流南有山正方而崇類屏者曰屏山其西曰姥山皆獨立不倚北流潯水瀨下又西曰仙奕之山山之西可上其上有穴穴有屏有室有宇其宇下有流石成形如肺肝如茄房或積於下如人如禽如器物甚眾東西九十尺南北少半東登入小穴常有四尺則廓然甚大無竅正黑燭之高僅見其宇皆流石怪狀由屏南室中入小穴倍常而上始黑已而大明為上室由上室而上有穴北出之乃臨大野飛鳥皆視其背其始登者得石枰於上黑肌而赤脈十有八道可奕故以云其山多檉多櫧多篔簹之竹多櫜吾其鳥多秭歸石魚之山全石無大草木山小而高其形如立魚尤多秭歸西有穴類仙奕入其穴東出其西北靈泉在東趾下有麓環之泉大類轂雷鳴西奔二十尺有洄在石澗因伏無所見多綠青之魚及石鯽多鯈雷山兩崖皆東西雷水出焉蓄崖中曰雷塘能出雲氣作雷雨變見有光禱用俎魚豆彘脩形糈米余酒陰虔則應在立魚南其間多美山無名而深峨山在野中無麓峨水出焉東流入於潯水韋夫人終成都殯萬年遷柩渭南祔而不合大葬未利以俟禮也其族系如某人之誌堋用元和十四年月日子某為石刻而納諸壙下殤女子生長安善和里其始名和娘既得病乃曰佛我依也願以為役更名佛婢既病求去髮為尼號之為初心元和五年四月三日死永州凡十歲其母微也故為父子晚性柔惠類可以為成人者然卒夭斂以一作用緇褐銘用塼甓葬零陵東郭門外第二崗之西隅銘曰孰致也而生孰召也而死焉從而來焉往而止魂氣無不之也骨肉歸復於此字為雅氏為柳生甲申死己丑日十二月在九是日葬東崗首生而惠命則夭始也無今何有質之微當速朽銘茲瓦期永久
