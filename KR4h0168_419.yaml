front:
  text: 全唐文欽定全唐文卷四百十九常袞十
  hash: sha256:3b4106c9935f3213fe04fc03deb3a88723cd0cf662050a8ca7e8a3e5ce39c214
body:
  text: 皇帝使常侍以故征西扶風郡王臣璘功行之録詔門下侍郎平章事臣袞曰古諸侯大夫計功稱伐書於太常勒之彞器德勳高故其文懿事業實故其言遠有國之大經也納忠於王室豈裦紀之禮闕歟宜文其頌聲以昭示承休於豐碑焉臣謹按司勳之戎籍史官之年表而敘之云聖人稽黃虞之道以武功文德統御天下赫赫明明罔不率俾唯犬戎自擅寇於我西土而猶懷以威德久而浸驕時乃大稽命將考之令典惟三年夏六月庶邦百辟洎侯王列將咸會於明廷乃大誥於爾在位有能興我西師僉曰璘哉是用詔以鷹揚之命於夏有鸞旗雕戈之賜公拜手稽首不敢辭難遂帥師朝那弭節涇流恢耀武威以臨於戎狄既至乃以戎服立於軍門之外奉揚天子之威命而訓於將軍列校六正五吏三軍之大夫曰惟昔盛明必有憂難其在殷高宗也有鬼方之征其在周文祖也有昆夷之患秦以安定北地戎狄內侮漢以金城隴西氐羌入寇故遣率以守衛中國修戰而高尚武力國家道德盛於殷周甲兵雄於秦漢亦有邊患尚勞睿謀則疆臣之罪也將何以塞責誓將上奉神武之算下憑戎士之力鼓行而前殄殲㣥慝詞情抗厲風雲動色於是舉軍法以誓之令而一衆畏而服雖嚄唶老將聞而悚然乃周覽其山川以備其戰守有若犀兕其威貙犴其勇屹立而不動者持重之將統焉禦於水硤之衝蒙輪超乘縵胡突鬢耽盼而橫奮者雄毅之將董焉捍於瓦亭之陰輕軒飛翰闐闐桓桓隸於射聲校尉以出松谷百夫之特萬人之敵屬於車師後部以殿銅城火渠門之旗舒於大回川雷密須之鼓殷於都廬山周之以木樵校聯布之以藺石渠答部勒既定天地肅然遂使魁健氣索猛鷙魂駭卻略引去不敢近塞故八年之間再寇而已此皆親稟睿略協用武經前後獻功悉如宸旨方將大復流沙遠收故地奪我良將罔卒西事以大歷十一年月日薨於戎府春秋五十六天子廢朝而歎曰安得雄邊威敵之臣如扶風乎遣中命以迎喪顧近侍而流涕其至第也百官會弔其遣奠也五校啓行賵以車馬含有貝玉所以裦大勳也初公自二庭統甲士三千赴鳳翔行在遂陳滅胡之策先皇帝奇之曰吾無憂於東方也遂戰青渠陳灃水收二陝復三川衛南以百騎破五千河陽以一旅摧十萬史朝義悉師自將大戰邙山國家以天下徑兵夾攻未動公獨率所部不陳而馳偃旗先登闞如虓虎鬬酣披靡橫貫而出回戈奮擊虜陳始破交突數合轟然大潰時副元帥太尉光弻壯之曰吾用兵三十年未見以少擊衆雄捷之若此每有征伐大計悉咨訪焉斯亦㣥帥之傑既而移軍右輔疾援河西固已離之心存將棄之地及聞僕固懷恩之變即日旋師萬類千㣥延蔓山谷輕行轉鬬虜殺而歸屆於岐都寇已四合公乃持滿外嚮坌入懸門未及解甲背城出戰戎師北走數騎前追眥血橫灑朱殷金甲楇戟而墜應弦而倒者數千萬人可謂三軍之絶也至於理鄭國撫潁封化郇邠寧上郡勤於藩職惠於長人勞徠流庸贍恤孤老縑綜綿纊工於織紝入而有制故大東之刺不作禾麻菽麥業於播藝用之有節故自北之化可懷此又列郡之率化也公字某扶風人也自秦漢至於國朝公卿大將軍通侯二千石踵武王室休有烈光曾祖昭朝散大夫新豐縣令祖正會右威衛將軍扶風郡公贈光祿卿父晟左司禦率府兵曹參軍贈太子少保忠孝在門文武繼代宦婚之盛士族有耀惟公勳胄華茂雄姿高爽少有四方之志以才氣自任擺落凡格不嬰細微故弋獵畋漁嘯咤川澤年二十讀伏波傳至大丈夫當於邊野以馬革裹尸而還慨然而歎曰豈使吾祖勳業墜於地乎由是愾憤邊戎徘徊孤劒遂西至絶域以奇功纍授裨將歷金吾將軍殿中監太保御史中丞遷御史大夫領北庭行軍使邠州刺史加工部尚書節制涇原以鄭潁二州隸之尋拜右僕射知省事階至儀同進封異姓副軍以降略而不書以英明之識遇聖明之運故得竭其智謀極其任遇抗大節以激危難攄洪仁以庇傷殘公之理軍也以穰苴兵法孫子十三篇先以正合終以奇勝閒廓深邃應變無端與之安與之危故可合不可離同其敗同其成故樂死不樂生至於木罌濟河登山拔幟解鞍而臥鞭馬而馳兼之有餘亦不差異嘗以家財二百萬贍三軍與其散已食於行伍陳賜金於廊廡何相去之遠哉公之事君也奉之以實納之以忠造膝前籌詞理明順檢身無過恭謹畏慎祿賜所加則受小辭大任使所及則履險讓夷以忠材而親重有絳侯之遇也以質而倚愛有吳漢之信也所謂國之神將朝之藎臣終慶於家永於福祚鐘石享於祖考帶礪傳於子孫宜哉嗣子旰等重族之盛隸業承家哀哀執喪痛結天壤萬家葬地能誡昔賢十里邱封亦非遺志獲承君命欽率朝經請諡嘉名謂之合禮銘曰峩峩雍城積高氣靈氣主金行良將乃生琅琅司徒雄略縱橫耽耽其視震震厥聲四方靜難二紀操兵初奮厥武車師戎府鐵馬蛇矛大黃白羽天山瀚海噴薄風雨驍騎三千披荊謁主從我撫軍擊胡滅虜回戈涼野解敵岐下烈烈英風橫飛西土遂佩珩璜分雄棨戟寵臨方鎮乃蔚乃赫洪稜遐振虜氣外折惠化滂流人心內結昆夷先零白斾至涇受算宸扆朱旗撫征密陰前塞義渠故城邱巒陵谷遠近相屬澶漫傾合紆餘回復野戰高秋金羈馳逐左揮右射虎捷神速番渠愕視百姓推伏國於扶風祚爾嘉庸位長庶僚雁行三公王用蕃錫我有鼓鐘叔父昆弟燕私雍雍功成身歿寵厚厥終周漢二宣皆有勞臣北征西討出車轔轔今我司徒實同厥勳勳在王室光昭後昆維大歷十三年歲在戊午四月丁未朔六日庚子故齊王諡曰承天皇帝興信公主季女諡曰恭順皇后初天寶十五載會有國難王首建大議扈先帝於朔陲以其年八月薨於行在某年某月追封齊王今上親親念切冊贈大號以大歷十三年六月遷座於咸陽銀棨傳曙金根在馭出仙禁兮逶迤指橫橋兮西去乃詔禮儀使工部尚書祖奠於行宮禮也聖慈友愛痛結天倫爰命作冊授之儒臣其詞曰天祚我唐帝系其昌鴻明皇皇子孫保光長發其祥倬生賢王英華外揚五色含章聰敏明粹孝友純至文麗春華神清皓氣所全者德不有其貴昔在開元錫羡其蕃儲后愛子天皇弄孫勝衣趨拜即啓東藩山委慶賚雲翔渥恩紫殿丹臺兮相屬臨洞窅窅兮沈沈聯日光以金支煒芳萼於瑤林甲觀宴兮承顏數寢門侍兮鐘愛深既間詳於占對亦自守於沖退忘外事之嬰拂服前言之針誨謂歡娛之未更何艱否之相會雲雷遘屯關洛陽塵乘輿南幸定議北巡上戴君父協於天人中興之業實賴經綸如何上元不假之年丹誤金鼎尊空玳筵軫於震慟澤漏重泉東負蒼海錫其土田顧謀始之言博謂飾終之恩薄崇章大號自我天作賜梁國之旌旗用魯侯之禮樂備物宮庭巍巍寵靈寶符玉牒照曜青瑩仙駕帝儀上升紫冥邦媛之妹婦道不踰遽辭金屋久閉珠襦錫以象服合於鮒隅嗚呼哀哉出國門兮蒼山轉辭白日兮長安遠驚飇落於桂宮零露霑於蘭坂建翠鳳兮葳蕤瞻輅馬兮遲遲壽宮閉兮與天畢玊座深兮無曉時嬪嬙儼兮侍新寢鳬雁遊兮非故池戢神輝之杳靄結吾君之眷思唯鴻勳之不泯渺然終古兮同斯維大歷十年歲在乙卯十月辛酉朔六日丙寅貴妃獨孤氏薨粵明日追諡曰貞懿皇后殯於內殿之西階十三年十月癸酉乃命門下侍郎同平章事常袞持節冊命以其月二十五日丁酉遷座於莊陵禮也素紗列位黼帟周庭輅升玊綴軒珠櫺皇帝悼鸞掖以追懷感麟趾而增慟備百禮以殷遣命六宮而哀送宗祝薦告司儀降收爰詔侍臣紀垂鴻休其辭曰祚祉悠久寵靈誕受元魏戚藩周隋帝后五侯迭興七貴居右肇啓皇運光膺文母纘女是因以綱大倫生知陰教育我蒸人瑞雲呈彩瑤星降神聰明睿知婉麗貞仁惟昔天監搜求才淑龍德在田葛覃于谷周姜胥宇漢后推轂王業惟艱嬪風已穆繼文傳聖嗣徽克令不曜其光乃終有慶祗奉園寢肅恭靈命越在哀煢聿追孝敬文織絲組朱緑元黃上供祭服以祀明堂法度有節不待珩璜篇訓之制自盈縑緗敘我邦族風於天下始於憂勤協成王化慈厚諸女寵臨下嫁登進賢才勞謙日夜服繒示儉脫簪申誡訪問後言宴遊夙退內和㣥娣動有矜誨外睦諸親泣辭封拜闕翟有日親蠶俟時忽歸清漢言復方祇萬乘悼懷㣥臣慕思玉衣追慶金鈿同儀嗚呼哀哉去昭陽兮窅然乘雲駕兮何在人代宛兮如舊炎涼倏兮已改翠葆森以成列素旗儼而相待言從王兆之貞永閟瑤華之彩別長秋之西苑過望春兮南登招帝子於北渚從母后於東陵下土清兮動金翠外無像兮中有馮合簫挽以攢咽結雲雨之淒凝吾君感於幽期俯層亭而望思慘嬪媛以延竚極容衛以盡時搖巾袂兮遠訣隔軒檻兮㣥悲不復見兮回御輦傷如何兮軫睿慈下蘭皋兮背芷陽旌悠悠兮野蒼蒼帶白花兮掩淚衣元帉兮斷腸當盛明兮共樂忽幽處兮獨傷去故廷兮日遠即新宮兮夜長襚無文繡之飾器無珠貝之藏蓋自我之立制刑有國之大方嗚呼哀哉見送往之空歸歎終焉之如此方士神兮是與非甘泉畫兮疑復似遺音在於玉瑱陳迹留於金戺獻萬壽兮無期存二南之餘美嗚呼哀哉維大歷四年歲次已酉五月甲辰朔十二日乙卯皇帝遣使某官某乙持節冊命曰於戲稽於古典考於諡法戚藩升號禮或闕文爰自先朝特追尊諡蓋以長而教順豈私親而立制合之殊禮允屬元勳天下至公不可廢也爾故齊王某慶稟霄極氣陶元和孝彰純行忠表令德學師申穆文友徐陳闕東平之詔尤推達禮辨南陽之牘可謂知微靜而有謀敏亦能斷往以王室多故翠華西巡緬懷家邦首建大義上戴君父紹開中興會五原之兵車復四海之疆宇懋此徽烈屈於流運愛深同氣痛結中腸頃雖裦揚猶未僉允言念經啓之功載加飾終之數爰革舊典追崇大名是用冊王曰承天皇帝改置園邑從饗清廟贈以黃屋左纛龍旗九旒必備王者之儀用極送哀之禮庶榮厚穸有歉於懷嗚呼明靈尚服休命昔周以仁厚之化睦於宗戚而武王之弟有國者三無官者五漢家雖皇子畢王而猶各守疆土不在京師我唐以孝理萬國周親並建至元宗儀制益重寵以留邸罷其歸藩大第連乎北宮高臺接乎雙闕今舊典不易特恩有加所以廣親親之道洽骨肉之愛也王諱瑝字某元宗至道大聖大明孝皇帝第某子也母曰盧賢妃性與其貞氣合於純君親之際止於孝伯仲之間止於弟重以師傅之教資其賢淑之能實大雅之明哲高陽之恭懿也在開元時則帝子之寵紫殿溫凊彤庭趨拜鳳姿秀發麟趾光華祚於海邦藩我王室在至德時則皇弟之貴駟馬之迎深於友愛三雍之獻益用親禮故詩有行葦勿踐所以昭忠厚也我皇既受命則叔父之尊安平望高淮南屬長其朝會也不在贊拜之列其宴私也特加壽觴之敬故書有分玊展親所以美敦敘也至於緑池朱閣素月清風兄弟俱來子孫列侍偃蹇叢桂淹留芳草內饔分膳賜藥在庭杳然蓬瀛之外自適天人之樂斯非聖君尊寵之所尚賢王福履之所宜也以大歷九年十月庚午寢疾薨於上京春秋五十皇帝設位哀慟輟朝三日乃命中貴人襄事於內邸宗室屬籍哭於外次既殯又詔司儀備物典策追諡命太傅光祿勳持節弔祭京兆尹監護喪事以其年十一月庚申葬於細柳原妃范陽盧氏祔焉禮也嗣子某郡王某官某乙等孝極其至喪如不勝故事藩王墓銘別詔論撰微臣惶恐謹而志之詞曰玊瓚黃流文祖受命金璽緑綬賢王分慶惟此賢王令德孝恭尊事天子翼翼雍雍天子敬異優其賜與大輅之旗元袞及黼如何不永誰察誰補葬我叔父於渭之傍曉下蘭坂夕臨芷陽百官會送五校啓行鼓吹悽咽郊原淒涼御津門外遠睇連岡懷德增慟回輿更傷維永泰元年歲次乙巳二月十七日新平郡王薨於西京之內邸春秋四十一粵以其年五月七日遷窆於萬年縣龜川鄉細柳原禮也王諱嚴字伯莊睿宗之曾孫元宗之孫奉天皇帝之長子也幼而溫良夙乃碩茂動皆執禮言必稱詩皇孫之中德行推美周邦右戚漢典開封代繼讓王之尊親承太伯之嗣先朝友愛奕葉追崇常佳南楚之風每玩西園之月仁者不壽遘疾而終皇上軫棠棣之悲懷雁行之慘輟朝震悼義切天倫燕云封龜占從吉俄辭舊邸言向佳城近灞陵之高原當細柳之吉地丹旐將引元甲啓行器備飾終禮有異等嗣子年在童幼執喪而哀詔葬之儀悲深先遠豐碑之窆詞在刊銘銘曰文昭武穆天孫帝子好古推賢樂善歸美親承太伯業繼賢王漢屏斯重周卿有光人閲於水夜遷於壑長坂蘭摧小山桂落細柳之地灞陵之川泉扃一閉幽隧千年維永泰元年歲在乙巳四月壬戌朔十一日壬申有唐信王第七子儔終於西京之內邸春秋一十有八嗚呼哀哉詔贈太常卿粵翌日追封鄴國公以其年五月三十日葬於細柳原禮也公系承霄極慶襲藩維忠肅立身孝恭成性早聯華於武穆能有裕於文孫令範韶閒良才美秀敦以友悌絶其交遊器適四科術通六藝宏此素尚暢於黃中宜其壽昌胡不秀實方固盤石遽凋本枝皇上義切友于情深悼往睦親軫念懷德增悲寵贈太常卿特優恆數仍錫苴茅之命用追棣萼之榮日月有時卜云其吉送終灞岸載慟津門爰命侍臣碑刊貞石銘曰元宗之孫信王之子性與聰悟天姿韶美始能趨拜即異幼沖觀書魯壁習樂雍宮韞此器能方期光大一朝短折萬事冥昧皇恩寵贈友愛惟深幽扃永閉長夜沈沈天垂將星著在三象國有武柄寧於四方授鉞其難止戈斯重定封豕長蛇之孽致攀龍附鳳之功朱㦸在門黃金橫帶命掌師旅化成公侯時有汧國公其人也公諱懷讓字某蓋漢將軍陵之後自五將失道家留隴山千年於茲因引貴族戎帳之下華風在焉奕葉相乘久雄朔北本枝必復終茂隴西公則成紀人也曾祖廣壯武將軍右武衛將軍祖忠雲麾將軍左金吾大將軍贈銀青光祿大夫太僕卿父俱定遠將軍右驍衛將軍贈銀青光祿大夫秦府都督積其勳望休有令名上將虎符延於三代列卿犀節榮及九原後嗣其昌吾門益大公生於陝右少以勇聞重懸弧四方之事有長劒三軍之志去病籌略不學兵書賈逵兒童即陳部伍人許封侯之相時歸拜將之望以安危為已任取富貴於掌上一日千里豈徒然哉以良家子選羽林郎騎射絶倫材官入侍射熊舊館戲馬前臺百步應弦兩驂如舞便蕃左右趨奉階闥秺侯篤慎漢帝裦嘉屬皇室艱難王師巡狩侍執羈靮扈陪鸞輿節見時危捧六龍於岐下口陳天命從五馬於回中披荊榛而執殳冒風雨而持蓋中原行在實掌禁戎領護鉤陳典司環列出入警蹕肅清扞掫羽衛甚嚴軍容益振夜合槍纍曉開旌門擁嘉氣於月營橫大風於天仗始自靈武至於扶風險阻屯蒙未嘗離上削平休泰終契興王從收軍師首列勳舊於是出鎮左輔建牙近關扼天下之樞走山東之盜三秦巨防萬里長城闢屯田於斥鹵強士馬於撫弊仁以理軍不聞半菽知能料敵豈在前茅兼牧人御衆之才得憂國奉公之禮竹符兼剖鈴閣長間百城歌之政有經矣公始自一命驟更顯秩舉其大者不可備書歷臨彰府折衝射生供奉後以佐命功特授鎮國大將軍左羽林軍大將軍知左神武軍事加特進兼鴻臚卿左神武軍大將軍封汧國公又加開府儀同三司充潼關鎮國軍使同華等州節度使華州刺史又兼御史中丞試殿中丞尋拜御史大夫檢校工部尚書並兼舊務雲從龍風從虎以雄毅之略遇聖明之主事與時並名與功偕位極文武權分中外勳書甲令象列雲臺大丈夫特達有如此者不知者壽謂之何哉廣德元年九月三日薨於華州軍府春秋若干天子聞之輟朝興歎特優命數寵贈司空詔發輤車即日迎柩列辟卿士咸會喪焉贈賻襚含有加故事京兆尹監護內謁者致以詞即以其年十月四日陪葬建陵旌勳臣也將軍鹵薄司空法駕鉦車介士前後鼓吹觀者稱榮懦夫增氣百官臨弔畢集孔光之門五校送喪直至鄧宏之墓君臣之義厚莫重焉有子四人前光祿少卿林光等孝因天性哀過禮經克紹臧孫之後咸稱文氏之子史臣奉詔謹而志之銘曰有唐上將佐命通侯降神太白稟氣清秋弓落飛雁劒衝斗牛少年戴鶡上陌鳴騶繡衣朱襮越戟吳鉤入隨夜警出從春搜運屬艱難謀參締構善行無迹大勇不鬬三輔功名五原恩舊家榮鼎食廟列金奏翠羽在庭紫騮填廏寵私之盛誰出其右命所不與人之云亡萬乘震悼三軍悲涼謁者歸賵㣥公會喪特陪元闕永祔黃腸禮優同等恩茂舊章碑題蟲篆用紀龍驤嘗讀東觀漢記至楊公四世太尉咸有清德泱泱乎鄒魯之風盡在丞相府矣百有餘年論道王室宜哉自後卿大夫洎二千石史不絶書以及於公公諱靈崱字靈崱宏農華陰人也高祖兵部尚書高都公尚希尚希生宜州別駕丹川公壽旻壽旻生司農少卿徵徵生正議大夫漢州金堂縣令務道光昭先君之懿範其有後於關西乎公金堂第二子也幼以五經上第參卿博陵二職郿塢孫楚長揖桓談不樂一録州事會稽稱之再領縣尹自范至匡化行衛濮公易直子諒之心根於始矣加以好學止於蓋棺德行孝悌溫良博愛故宗族稱其仁朋友稱其信鄉黨稱其敬蓋君子之道歟及長從吏以寬服人官刑不行職事益辦及與之邑亦克用乂和氣充塞於百里頌聲洋洋乎至今其良吏之政歟赤紱在股下大夫事知止足之分有終焉之志懸車告老飾巾待期浮雲身世脫屣軒冕追先生於彭澤繼徵士於太邱斯達者之流歟天寶十四年十二月十日寢疾於匡城縣歸休之私第春秋七十有三屬賊臣以山東叛乃公歿之明日也且告車來甚衆允子少殯故有闕在邑南鄙於堂西序啓足牖下土周於身十年於茲百戰之所折棟餘燼荒墳茂草柱下史能季武公之嘉客袞之姻友廣德元年夏四月本詣河外假道於匡訪郗公之舊邑歸戴侯於故里以其年十月一日合祔少陵原禮也夫人河東縣君辥氏婦道母儀六姻取則于我歸處葛之覃兮及公而終木已拱矣子環在外不及主喪其誰尸之曰有三女無天何戴無地何履誓合泉壤感通神明終還營邱竟同防墓空悲蔡女之孝有愧潘郎之詞銘曰夫物藝藝各復其根事有必至理有固然少陵古原京兆新阡匡城夫人河東小君同居此地豈恨重泉志於方石庸有賢人
