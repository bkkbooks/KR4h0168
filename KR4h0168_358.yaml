front:
  text: 全唐文欽定全唐文卷三百五十八頠開元十五年進士
  hash: sha256:7a5ee0fd902d263fb6dcd38418b6e9b79bbcf20454387411972c12c45ab0438b
  markers:
  - {type: head, offset: 14, content: 杜頠, id: KR4h0168_NFKB_358-h1, level: 1}
body:
  text: 溶溶元灞兮經秦川之有餘褭褭紅橋兮代造舟之厥初飛梁默以霞起綵柱煜其星舒九陌咸湊三條所如連山謺翠而西轉㣥樹分形而北疎電透孤棹雷奔眾車白日南登望長安之如綺黃烟東睇見咸陽之為墟杲杲初霽蕭蕭晚吹登隱者之翹車度將軍之獵騎日既上已禊於洪源晚具遊宴咸出國門七葉衣冠憧憧而遙度五侯車馬奕奕而騰軒鐘鼓既列絲竹亦繁秦聲嘔哇楚舞叢雜帷帟紛其霧委羅紈靄以雲沓棹輕舸之悠悠順清流之納納時憑倚以觀眺喜烟花之環合爾其居人出祖連騎將分望曲漵之清路視遠天之無雲紫沙兮皓晃綠樹兮氛氳莫不際此地而舉征袂遙相望兮愴離㣥明月生岑涼風度水聽鳧鴈之悽慘對苔蘋之靃靡或披襟以延佇獨掩涕而無已上臨烟碕霞石相輝過客對兮憺忘歸下近巖逕林巒隱映漁人去兮恣誦詠獨遊子而俟時倦塵衣以嗟命謹按此篇本係杜頠作一誤作杜顏今改正㣥玉之山兮居帝臺之列仙采瓊華兮永久事雕琢兮窮年青熒若水潔白如天剖以崑山之石洗以瑤池之泉弄影長嘯薰風䬃然知東夏有德而虞舜之賢受穆清以出震服中和以御乾乃馳縞鹿與使者奉白環而獻焉玉華溫潤玉理精堅英光千以旁達肉好一以虛圓皛皛霜皎田田月懸分清輝於綺殿失皓質於瓊筵賞三朝之盛禮恒五玉而來覿彼昭華之珍兮焉往延喜之珪兮誰錫亦所謂歸有虞之理功告大禹之成績美矣哉撫運兮天寶至大素皓兮聖人之瑞非天則莫之與非聖則莫之致琬無芒而未匹璧有美而奚類以和柔剛以配忠義亂曰白羽之白輕只白雪之白消矣未若茲環之有用縝如栗而未已至德竭而閟質帝道亨而薦祉豈我隨時斡運與物終始滋大政兮揚大德使吾君佩兮千萬祀謹按此篇本係杜頠作一誤作杜顏今改正夫人者何乾坤之至精夫夢者何精爽之所成及乎㣥動息閑宇清澹爾安寢儼乎無營亦或不意而得亦或因感而生明休咎之先兆通喜怒之深情其為吉也懸三刀以作郡凌八門而上征或生松以表秩或贈蘭以為名盬腦審其戰勝鑿心啟其才英其為凶也晉侯彌留作疾於二豎孔公將歿觀奠於兩楹雖否臧之殊感諒希微之難明是以太古無夢以絕欲聖人肇夢以治想隨事而生觸類而長或含悲以增惕或當歡而契賞曾有慕而忽來屬所思而必往雖遼萬里遽諧疇昔之遊縱寘九泉亦覯平生之像鬼出神入惟惚惟恍則有暌閒庭闈烟霜歲暮常馳戀於定省忽飛魂於寐寤撩軒幌而無隔邈山河之徑度常倏忽而往來竟不由於道路獨有遭遇明時羇遊上國才譽不振命途仍塞仰軒后之通感慕殷宗而見刻當捧日而披誠庶明君之夢得周官大司馬即今兵部尚書官屬掌邦國之政以九法封國以九伐正邦以籍我畿以倡我牧宏有萬類阜成兆民訏謩戎馬之事密勿鈞衡之地自我唐受命迄於今居夏官者眾焉或列於台階者蓋寡矣所以任必以親以德以勳以賢穆如清風翼我元化率惟茲有典用保乂有邦二十一年冬十二月詔工部尚書李公典之政敷於時道濟於物優游學府蔚為詞宗以公族之英受親賢之寄屬冢宰虛位官吏要才載委天衡是掌邦理東巡歲夏四月皇帝將崇厥德報厥功乃命再從兄開府儀同三司持節朔方節度副大使兼禮部尚書上柱國信安郡王褘禮樂天付衣冠人秀忠以匡濟文以經綸謀明道高功格化洽昭乃王度於帝心九命可以見其賢四征可以觀其績鎮朔方以無方之討八年而北虜平攻右堡以不陣之師一旬而戎狄服榆關之役用兵以奇故杖鉞而兵勝大河之戰戒軍以嚴故坐帷而軍捷建奉常之禮則神人協上下和從夏卿之政則萬國平六卿睦辨九州之國知其姦宄同其貫利掌六馬之物駕理以則講獻以時握五兵之要以辨功理以待軍事此九職司馬政之所統也王勤政以和是以戎翰允輯振旅以蒐茇舍以苗理兵以獮大閱以狩此四田司馬教之所被也王敦教以就禮是以祀典孔明初則以法示其令也終則以伐明其德也九功惟敘九敘惟歌是用陳既往之烈繫今來之美以書於壁參南陽人天寶三年進士累官右補闕改起居郎由庫部郎中出為嘉州刺史杜鴻漸鎮西川表為從事以職方郎兼御史領幕職參相門子五歲讀書九歲屬文十五隱於嵩陽二十獻書闕下嘗自謂曰雲霄坐致青紫俯拾金盡裘敝蹇而無成豈命之過歟國家六葉吾門三相矣江陵公為中書令輔太宗鄧國公為文昌右相輔高宗汝南公為侍中輔睿宗相承寵光繼出輔弻易曰物不可以終泰故受之以否逮乎武后臨朝鄧國公由是得罪先天中汝南公又得罪朱輪華轂如夢中矣今王道休明噫世業淪替猶欽若前德將施於後人參年三十未及一命昔一何榮矣今一何悴矣直念昔者為賦云其辭曰吾門之先世克其昌赫矣烈祖輔於周王啟封受楚佐命克商二千餘載六十餘代繼厥美而有光其後闢土宇於荊門樹桑梓於棘陽吞楚山之神秀與漢水之靈長猗盛德之不隕諒嘉聲而允臧慶延自遠祜洽無疆自天命我唐始滅暴隋挺生江陵傑出輔時為國之翰斯文在茲一入麟閣三遷鳳池調元氣以無忒理蒼生而不虧典絲言而作則闡綿蕝以成規革亡國之前政贊聖代之新軌捧堯日以雲從扇舜風而草靡洋洋乎令問不已繼生鄧公世實須才盡忠致君極武登台朱門復啟相府重開川換新楫羹傳舊梅何糾厂田坴以相軋惡高門之禍來當其武后臨朝姦臣竊命百川沸騰四國無政昊天降其薦瘥靡風發於時令藉小人之榮寵墮賢良於檻穽苟惽怓以相蒙胡醜厲以職競既破我室又壞我門上帝懵懵莫知我寃眾人懀懀不為我言泣賈誼於長沙痛屈平於湘沅夫物極則變感而遂通於是日光迴照於覆盆之下陽氣復暖於寒谷之中上天垂鑒佑我伯父為邦之傑為國之輔又治陰陽更作霖雨伊廊廟之故事皆祖父之舊矩朱門不改畫㦸重新暮出黃閣朝趨紫宸繡轂照路玉珂驚塵列親戚以高會沸歌鐘於上春無小無大皆為縉紳禺禺卬卬踰數十人嗟乎一心弻諧多樹綱紀㣥小見醜獨醒積毀鑠於眾口病於十指由是我汝南公復得罪於天子當是時也偪側崩波蒼黃反覆去鄉離土隳宗破族雲雨流離江山放逐愁見蒼梧之雲泣盡湘潭之竹或投於黑齒之野或竄於文身之俗嗚呼天不可問莫知其由何先榮而後悴曷曩樂而今憂盡世業之陵替念平昔之淹留嗟余生之不造常恐墮其嘉猷志學集其荼蓼弱冠干於王侯荷仁兄之教導方勵已以增修無負郭之數畝有嵩陽之一邱幸逢時主之好文不學滄浪之垂鉤我從東山獻書西周出入二郡蹉跎十秋多遭脫幅累遇焚舟雪凍穿屨塵緇敝裘嗟世路之其阻恐歲月之不留睠城闕以懷歸將欲返雲林之舊遊遂撫劒而歌曰東海之水化為田北溟之魚飛上天城有時而復陵有時而遷理固常矣人亦其然觀夫陌上豪貴當年高位歌鐘沸天鞍馬照地積黃金以自滿矜青雲之坐致高館招其賓朋重門謺其車騎及其高臺傾曲池平雀羅空悲其處所門客肯念其平生已矣夫世路崎嶇孰為後圖豈無疇日之光榮何今人之棄余彼乘軒而不恤爾後曾不愛我之羈孤歎君門兮何深顧盛時而向隅攬蕙草以惆悵步衡門而踟广豆寸強學以待知音不無思達人之惠顧庶有望於亨衢康成天寶時人嘗使江東不享非類將以亢宗無念爾祖詎思述德甲庇身他族忘情本根頗類移天之規方同擇陰之義將策名以筮仕豈假蔭而因人約法是從不繼難失必若敖有餒而之歎庭堅有忽諸之言以為等差誰曰非允如子服其有子寧斯焉而取斯蕤字大賓鹽亭人後徙居郪隱居長平山安昌巖開元中三詔召之不起或云以讒死蕤非聖人五十安知天命然從事於易雖亂離中未嘗釋卷蓋天命深微莫研其極而子明之傳蕤粗通之然恨此書亡篇過半今所得者無能詮次但隨文義解注庶學者觸類而長當自知之爾趙子曰匠成輿者憂人不貴作箭者恐人不傷彼豈有愛憎哉實伎業驅之然耳是知當代之士馳騖之曹書讀縱橫則思諸侯之變藝長奇正則念風塵之會此亦向時之論必然之理矣故先師孔子深探其本憂其末遂作春秋大乎王道制孝經美乎德行防萌杜漸豫有所抑斯聖人制作之本意也然作法於理其弊必亂若至於亂將焉救之是以御世聖人罕聞沿襲三代不同禮五霸不同法非其相反蓋以救弊也是故國容一致而忠文之道必殊聖哲同風而皇王之名或異豈非隨時設教沿乎此因物成務牽乎彼沿乎此者醇薄繼於所遭牽乎彼者王霸存於所遇故古之理者其政有三王者之政化之霸者之政威之彊國之政脅之各有所施不可易也管子曰聖人能輔時而不能違時智者善謀不如當時鄒子曰政教文質所以匡救也當時則用之過則捨之由此觀之當霸者之朝而行王者之化則悖矣當彊國之世而行霸者之威則乖矣若時逢狙詐正道陵夷欲憲章先王廣陳德化是猶待越客以拯溺白大人以救火善則善矣豈所謂通於時變歟夫霸者駮道也蓋白黑雜合不純用德焉期於有成不問所以論於大體不守小節雖稱仁義不及三王而扶顛定傾其歸一揆恐儒者溺於所聞不知王霸殊畧故敘以長短術以經綸通變者剏立題目總六十三篇合為十卷名曰長短經大旨在乎寧固根蒂革易時弊興亡治亂具載諸篇為沿襲之遠圖作經濟之至道非欲矯世誇俗希聲慕名輒露見聞逗機來哲凡厥有位幸望詳焉賁元宗時人公諱嘉祜范陽人相國河東公季弟曾祖長度光祿勳祖後興贈慈州刺史考思義贈秦州都督偕果行毓德揚名養正公挺質美秀資性強直生秦長晉武毅直方學不師授言無宿諾相國深器異之弱冠武舉及第充祔廟輦月八人口補右領軍司戈換同軌府果毅知含嘉倉幹其出內轉伊川府折衝時西戎不賓北狄塞除鄯州別駕未之官拜忻州刺史雁關之陽人用小康矣假銀印朱紱以旌課最牧守寵章自公始也尋加朝散大夫還并州司馬副燕公軍使經畧太原節制河外中摧後殿繄公以輯俄兼衞尉少卿進副大使恤人理劇訓戎料敵人到於今稱之轉光祿少卿晉京上黨省方肆覲徼巡惟警忠公在擇拜右金吾將軍金章紫綬當元昆為中書令君子以為兄相弟將一門雙美行在中蜚言貶補陽府折衝無何河東自戶部復左台州乃相與登臨形勝賞樂歲月河東有北平之役公承制放還洎喪哲兄禮有加等復除都水使者內作副使公規模大拙巧思絕倫洛斗門咸自所創尋授率更令皇子並建盛引賓僚初拜義府司馬抵諱改棣王府從容曳裾優游置醴未幾除相州刺史闕一字人心訛鄴守氣燄公載杖忠信政若神明煩苛止除度典咸秩特降璽書賜紫金魚袋入計遷左金吾將軍州人思之刻石紀德公自遠闕廷垂紆天眷感念惟昔砥節礪名始表才昇不以私進中令之友愛金吾之授受闕四字克闕四字有由焉昊天降喪廿九年十月甲辰終於安邑里私第闕一字遠從心闕一字一矣嗚呼國殄乃望家亡其寶言旋鞏洛祖載鎬京遺孤在疚孀婦銜恤悲夫收卜從兆以天寶元年二月甲申遷窆東都漢原夫人河東闕一字氏先公而終合祔禮也惟公負超俗之資多名教之樂喪祭匍匐闕四字之有難犯之色久而見託孤之心積而能散貴則思止聞一以知十由中而及外爰自幼稺秉訓元昆存無少違沒有過慼弗忘慎獨蘊是經闕一字為闕二字也方散二疏之金翻夢兩楹之奠哀哉嗣子寶節荼蓼惟濡霜露闕四字密闕一字用布徽猷銘曰長河演慶中條降神挺生恭闕五字或出或處既損既益再執金吾復覯閨籍云何不憗而遘閔凶闕一字出闕五字東平首陟望今茲密邇天道何知生涯到此式躊躇闕九字保安字永固魏州人睿宗時為義安尉李蒙為姚州都督表掌書記終彭山丞幸共鄉里籍甚風猷雖曠不展拜而心常慕仰吾子國相猶子幕府碩才果以良能而受委寄李將軍秉文兼武受命專征親綰大兵將平小寇以將軍英勇兼足下才能師之克殄功在旦夕保安幼而嗜學長而專經才乏兼人官從一尉僻在劒外地邇蠻陬鄉國數千關河阻隔況此官已滿後任難期以保安之不才厄選曹之格限更思微祿豈有望焉將歸老邱園轉死溝壑側聞吾子急人之憂不遺鄉曲之情忽垂特達之眷使保安得執鞭弭以奉周旋錄及細微薄霑功効承茲凱入得預末班是吾子邱山之恩即保安銘鏤之日非敢望也願為圖之唯照其誠而寬其造次專策駑蹇以望招攜仲翔宰相元振從子李蒙為姚州都督表為判官與姚巂蠻戰被執吳保安贖之凡十五年乃還官蔚州錄事參軍以優遷代州戶曹後為嵐州長史感保安之義迎其子為娶而讓以官永固無恙頃辱書未報值大軍已發深入賊庭果逢撓敗李公戰沒吾為囚俘假息偷生天涯地角顧身世已矣念鄉國窅然才謝鍾儀居然受縶身非箕子日見為奴海畔牧羊有類於蘇武宮中射鴈寧期於李陵吾自陷蠻夷備嘗艱苦肌膚毀剔血淚滿池生人至艱吾身盡受以中華世族為絕域窮囚日居月諸暑退寒襲思老親於舊國望松檟於先塋忽忽發狂腷臆流慟不知涕之無從行路見吾猶為傷愍吾與永固雖未披而鄉里先達風味相親想覩光儀不離夢寐昨蒙枉問承閒便言李公素知足下才名則請為管記大軍去遠足下來遲乃足下自後於戎行非僕遺於鄉曲也足下門傳餘慶天祚積善果事期不入而身名並全向若早事麾下同參幕府則絕域之人與僕何異吾今在厄力屈計窮而蠻俗沒留許親族往贖以吾國相之姪不同眾人仍苦相邀求絹十匹此信通聞仍索百縑願足下早附白書報吾伯父宜以時到得贖吾還使亡魂復歸死骨更肉唯望足下耳今日之事請不辭勞若吾伯父已去廟堂難可諮啟即願足下親脫石父解夷吾之驂往贖華元類宋人之事濟物之道古人猶難以足下道義素高名節特著故有斯請而不生疑若足下不見哀矜猥同流俗則僕生為俘囚之豎死為蠻夷之鬼耳更何望哉已矣吳君無落吾事
