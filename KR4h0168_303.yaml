front:
  text: 全唐文欽定全唐文卷三百三正義開元二年朝議郎行偃師縣尉
  hash: sha256:6fa087f34b3b0bd249006f0732611ac9284a5b542ce8a53f0fc8e4f2781168b2
  markers:
  - {type: head, offset: 12, content: 賈正義, id: KR4h0168_NFKB_303-h1, level: 1}
body:
  text: 原夫陰陽不測之謂神變化無窮之謂聖聖也者範圍天地備萬物而不有其功神也者探賾窈冥降百祥而不矜其德持太元之斡運日月齊明振中古之謨猷乾坤合度盛業冠於三代美化流於四國其生也藉我為光輔其逝也薦我為明靈所謂有始有終可久可大者也公字朝明文王之子武王之弟成王之叔父也昔堯臣以披闕一字踐祚初開相地之宜殷伯以積德纍仁終翦格天之業歷太極而承元吉資中和而誕賢聖知微表於幼顏繼體分於正氣兵戈已偃西周之歷數攸歸宅土闕一字封東魯之衣冠允集故能勤勞家國翊亮台衡植圭璧而拜三壇御冕旒而朝萬㝢鴟梟救其衰亂狼跋明其終始尊嚴其父孝理也炯誡其子卑牧也七月艱難陳業也三年征伐敘功也復子寶位不虧忠敬之誠開我金縢乃得風雷之意於是測四方以定都邑分六職以明典刑制大禮以安上理人則俎豆之法行揖讓之儀備制大樂以移風易俗則和感之音暢舞詠之情宣詳八卦而究精微演六爻而告疑滯所謂極深研精立功成器以為天下利者也敢問先王之德何以加於斯乎若乃示諸仁藏諸用道藝可以激揚今古軌模可以粉澤人倫懸㝢煥然不假一二談也嗟乎天道有盈虛人事有存沒欲使百年黎庶讋軒帝之威靈四序蒸嘗用君王之典則非天下之至聖孰能與於此哉偃師縣祠堂者按圖經云後人懷聖恩所置也負陽岑之巖險面通谷之縈紆四水以為川二室以為鎮重檐纍栱登玉戶而三階洞室回廊列金楹而四合壽宮肅肅備物嚴嚴宛若居攝之仁明穆如行化之易簡孝若之徘徊庭廡未足贊其精微靈均之倦階除不能訶其怪異易稱王假所以致孝享詩稱天作所以祀王公崇敬則遐邇同臻嘉祥則賢愚共被若乃日之吉辰之良銀鞍繡軸溢通莊會舞安歌紛滿堂樽酌奠兮桂璆鏘鳴兮琳琅下禱戴兮介福上歆馨兮樂康雖盛凝之持戒練心傾恇不怠劉長之去邪歸道拜謁逾勤正直聰明於是乎在粵以癸丑秋末迄於甲寅夏首西郊不雨南畝亢陽八溪以眺渚濱河罕植青草九重以握圭沈璧屢命皇華闕闕一字無鸖立之徵田夫有狼顧之懼尹上柱國武威縣開國子隴西李傑山河間氣廊廟宏材允四海之具瞻裁三川之景化西京佇潤稍闕一字分陝之郊東都思理再臨惟洛之邑姧豪懲而疑滯剖鰥寡悅而禮義行德澤布濩頌聲洋溢正議大夫行少尹護軍彭城劉禎正議大夫行少尹上柱國博陵縣開國男崔元祐並星象之奇衣冠之秀器惟經國文藝襲於班揚道以匡時令望升於臺閣佐官司録柳齊物等並陟遐自邇始當州府之勞擇士用才終踐公侯之望朝請大夫行令博陽縣開國男彭城劉體微金枝玉葉之門上善通賢之量歷霜臺之鯁直闡雷邑之風闕一字立義闕一字欺兼并自息通直郎行丞王鈍朝議郎行主簿李循古承議郎行尉崔延祚莫不圭璋比德麟鳳成文藏用於東畿安卑於西亳咸以分官濟俗共理經邦欽若皇情特憐黔首吁嗟廟宇申至理之馨香拜起靈壇奠明祈之蘋闕一字誠敬如在神聽無違言未畢而布油雲禮未終而澍甘液三農有慶八政闕十一字而家邦可制非聖人之利物豈能與於此者是以黃髮兒齒之徒相與而稱曰昔文翁以化漸蜀川猶存古廟子産以政行鄭國尚列遺祠況公道德均兩儀神靈庇萬代而頌章斯缺盛事莫傳蒙少忝青襟晚紆黃綬勤誠不夢豈吾道之將衰遊踐難言冀斯文之未喪頌曰伊太初兮惟混惟茫暨中古兮無制無防大忠勤國兮輔我君王至道被物兮明闕一字典章乾坤可測兮陰陽會合威儀不差兮禮樂鏗鏘上德既喪兮先靈如在下人蒙庇兮遺惠不忘春夏炎赫兮銷流金石官寮祈請兮拜伏壇場神聽之兮密雲已灑人賴之兮零雨其滂喜大田之多稼望高廩之盈倉羞蘋蘩於祭禮建碑頌於祠堂松柏森沈兮歲久煙霞闕二字兮山荒謁明神於此地降福祚之穰穰翃開元三年對策擢第問朕聞至道雖微不言而化皇天陰步馬相叶其彞信寒暑而生成施雲雨而沐潤垂範作訓樹君育人時有澆淳教垂繁略成湯既聖禹道云亡桑扈谷風屢動詩人之刺塞門反坫時遺宣父之嫌我國家拯彼頽綱開茲盛業朕以不德襲號乘時而皇極之道未敷謨明之軌尚闕思宏厥理其義安從至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要又四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋余疑對臣聞登衡霍者嗟培塿之微泛漲海者鄙潢汙之陋臣草茅孤賤才無足取屬絲綸明揚州閭選辟謬得接武㣥彥比肩時英而文物昭回宸顏咫尺退思愚劣甚不稱聖朝求賢之意也揆拙兢顏心愧失守將何以充塞大問對揚天休然聞之於師請言其略制策曰皇極之道未敷謨明之規尚闕思宏厥理其義安從伏惟皇帝陛下開元立極地平天成祖述堯舜憲章文武夔龍咸事陰陽以和聖德動天無遠不屆麟鳳在郊藪河洛出圖書弓旌纍降徵搜是急日昃視朝文武並進既盡美矣無德而稱猶且罪已為心在豫興嘆此陛下之至讓也小臣何足以當哉然忭舞德音忝列明試敢不瀝肝膽獻所聞乎臣恭惟政理之間傳諸長者之口以先朝之事一二明之昔貞觀永徽之間恭默而天下理家給而人足時和而歲豐外戶不扃牛羊被野太倉之粟陳陳相因中府之錢貫朽莫校然而戎車屢駕不無事矣於是度遼之師鬼方之討賀蘭之戰高昌之伐而軍人無損帑藏如初國家富有海內百餘年士庶之多如曩時之兼倍征戍之役當今日之無何豈往得而今失將政繁而俗變其故何哉良有由也議者以為賦斂厚徭役繁風俗奢利息倍今若息其宮室愛人節用省無事之官罷不急之務三年政成臣竊遲之愚心曉然謂在此矣制策曰視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者伏惟陛下躬神武之姿廣聰明之德思宏至道勵精為政反支通奏甲夜觀書勵神聰於九疇留睿情於百氏臣聞智小不可謀大綆短難於汲深窺聖謀之莫測謂宸衷之不凡致遠恐泥不其難乎夫視者明也審邪正與曲直聽者聰也察善惡與是非貌者容止可觀儼恪之所謂言者詞令斯在榮辱之所由乂時暘若肅時雨若察休咎之闕會歸於皇建惟睿哲之作聖繫彼道樞故曰無反無側王道正直無黨無偏王道平平一以貫之此其義也制策曰禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要者夫大禮與天地同節大樂與天地同和豈惟明尊卑辨等列動天地感鬼神而已哉豈不繫於鐘鼓諒無徵於玉帛樂自外作必假器以明義禮由中起故備物以飾容蓋有國之典章生人之冕服均五材之並用廢一不可類三者之何先尢宜去食故孔子曰安上理人莫善於禮移風易俗莫善於樂去同即異離之則多傷相須而成兼之則雙美一彼一此何後何先制策曰四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋豫疑臣聞暴秦失政皇漢創業爰作樂以尊先聿釋享以追孝四時武德用之於高祖所以恢武功也文始五行陳之於文廟所以昭文德也蓋舞以盡意歌以崇德制自炎漢之君本乎孝武之代昭德盛德郊廟之樂也昭容禮容質文之辨也臣學不師古才非敏贍慙瑣瑣之陋無足言哉仰蒼蒼之高茫然自失謹對相如洪州南昌人神龍初進士補當塗尉徙晉陵陸渾召拜右拾遺開元末出為懷州別駕臣聞賈生之言曰人君之於天下猶今人置器置之安處則安危處則危是國之安危政之理亂亦由乎陛下所置甚易為也今陛下以命代之主率易為之資握黎元之命包宇宙之廣盡係之於陛下陛下可不置之於安處乎書云一人有慶兆民賴之斯之謂矣陛下在黎人之上居萬乘之重將欲為也天下已隨之將所尚也天下已尚之然風俗之端邪正之首者皆從陛下所為也非徒風俗邪正所係亦禍福存亡在焉陛下取舍運為甚不可忽也臣不敢遠徵古昔博引傳記請以隋煬帝太宗文武皇帝言之煬帝籍文皇之資躋大寶之位兵加海外威震區中乃自恃其強不憂時政大縱驕欲恣成猜險所為不軌所行不順忌忠正之義黜廢賢良狎便佞之言昵愛邪僻荒淫酒色窮極綺麗兵戈不息調役非時奇技淫巧者率獲登遷力邊攘冠者皆愆財賞不恤人之疾苦不知政之理亂君臣阻隔上下相蒙雖制敕交行而聲實舛謬言同堯舜迹如桀紂為行若是人何克從夫推心不誠欲人之附已恣惡內熾望俗之無邪猶却行追人向日避影孔子曰子帥以正孰敢不正其身不正雖令不從煬帝不節其欲而欲禁人之欲其可得乎故四海之風淫天下之情僞其人怨其俗蕩貞髦擯逐姦逆競馳皇綱紊而隙生禍釁滋而難作昔之有隋也今轉為大唐豈不以縱慝無厭危患不恤舉天下之大一擲而棄之荒迷沈亂終不自覺要之覆滅死於人手為天下笑甚可痛哉詩云殷監不遠在夏后之世諺云前車覆後車誡然則主社稷承宗廟者可不極思慮深勗勵乎夫昏主即聖君之資亂邦為開國之始是用集我昌運太宗以聖德英武雄才睿略掃除昏虐大濟生人叱咤而四維更張指麾而六合復正其知人任使盡得其才或取諸俘虜讎敵並推懷而用之意豁如也故房元齡識之於月品尉遲敬德狎之而不疑接李靖以優禮此天下之智謀所以得輸其赤心天下之徑勇所以得盡其死力也帝業既就寰中已安後武先文勵精為理務堯舜之道想致羲皇之俗開禮賢之館置十八學士聽朝之後覃思典墳周通百家樂而忘倦所謂武以得之文以守之其帝王臧否安危成敗政刑理亂風雨興衰皆鑒於前古比之明鏡故以書籍為古鏡魏徵為人鏡見善則行之不善則去之聞直言則欣然受納得一士則喜見於朝諂諛便媚者不得臻於前梗正貞賢者從容於左右矣貞觀之際太平俗洽官人得材功賞必實刑不謬及禮無愆度於時天下晏如遺糧在畝盛德洽於人心而祥風遊乎海內矣非太宗之明懿聰達虛心治道與天下貞臣正士同心戮力豈能致於此乎初東巡以供奉不精而有罰既到雒邑又理隋之舊宮頗趣遊畋或見可欲魏徵驟諫太宗欣然罷之曰非公無此語也自是帝節欲向道思愆納正用斯而言則聖人之情不必無欲也且物懸於外情動於中情之動中則無窮也物之衒外則不極也以不極之物衒無窮之情動而不為之節制雖有聖智亦安得致升平之事乎故太宗之情非無欲也擬致升平之資故樽節維持之耳往以隋人失御天命有歸而始終經綸斯亦勤矣首建大義提三尺安八紘創萬代立社稷傳子孫位已重矣功已大矣亦安得不思盈滿之誡而撿嗜欲之情乎故太宗之於崇臺邃宇非不愛之惜人力也寶衣玉石非不美之節人財也妍倡絶艷非不樂之妨聽政也犬馬畋獵非不好之蕩心意也此數者皆能栽抑之是使人之賦斂也輕歲之調役也寡舉人之利甚博資國之用不費國用不費人利是豐則不言而禮讓自清淨而仁義大洽非徒太宗之為理若是古之明王聖主曷不繇茲道乎臣歷觀有國有家莫不以驕矜放縱而滅畏慎謙恪而興然鮮蹈興平之衢多遵覆滅之路者何也實以在既安之日則忘兢畏及危逼之勢始思悔咎徒成追恨亦何補乎臣誠以人主之在深宮方安平之日若能先慮危難以自悔勗去不經之道防可欲之原務任賢之規除輕暴之迹則履萬有必安之途而無顛蹶覆辱之患矣行之甚易在人主為之臣所以舉隋氏縱欲而亡太宗抑欲而昌願陛下詳擇今天下皆拭目而視傾耳而聽欲望陛下兢兢業業以致太平也臣誠以為宜效太宗去邪佞之士進忠賢之人與之討論詩書談議得失以見先古之成敗以較當今之可否行其所長棄其不善如此則朝廷無僻謬國政必清平矣臣又聞書籍所載美惡具存採其陳迹為之鑒誡陶然其中甚足樂也亦何必窮逐聲色巡遊罔倦不務詩書之樂乎非獨妨於政理徒勞棄日矣往者太宗嘗敕魏徵作㣥書理要五十篇大論得失臣誠請陛下溫凊閒暇以時觀覽其書雖簡略不備亦足以見忠臣之讜言知經國之要會矣夫古之人主莫不委任忠正廣務才賢而保正全忠者稀傾側向背者衆非緣人主知其不忠不正而用之也蓋似正而非正似忠而不忠深心以藏邪厚貌而難測耳所以嘗患謬用之而不辨其真實也且非忠正尚不辨其真實況實忠正豈得知而信任乎故有獨行而見疏有懷忠而受讒矣此先古帝王迷惑錯誤以不忠為忠以賢為不賢率皆十八九也書曰知人則哲惟帝難之非夫聖王明主則不能知也今陛下聰明在位慶祚方遠若欲任人擇士取致太平必宜先辨忠賢以別邪佞若忠賢既辨邪佞不雜正人為之羽翼邪人不造其間則有仁義道德行於四方而無諂諛傾巧以亂陛下也且忠賢邪佞雖有難知今以陛下明悟神聰孜孜選用更垂之以睿鑒又加之以密察豈有不知之者乎然其審察之宜可以意測可以情恕矣以意測者測邪佞之臣也以情恕者恕忠賢之臣也夫忠不似佞佞則似忠請陛下測之恕之則可知也臣聞人之性分不可轉移邪佞忠賢各有所趣順道違俗忠賢也違道順俗邪佞也若言之咈耳行之忤心動繇先王之道事極終始之慮志惟安國衛主者忠賢之所為也故雅質而不佞勤誠而取容務正道而抗節人主聞之固將疏遠之矣此真忠賢之臣也陛下可不恕而用之乎順欲從旨甘言美飾不繇先聖之道思亂國家之政務於要利以惑主者邪佞之所為也故發小惠以賈信忘大義而苟合權寵勢而挾威伺愈悅而爭媚人主見之固將親近之矣此真邪佞之臣也陛下可不測而去之乎大率人君皆惡其臣忤心而欲人之順已賢臣正直安得不忤心乎邪臣諂詐安得不順已乎故積忤生憎禍之路也積順生愛福之門也此邪佞所以常親而寵賢臣所以嘗疏而辱也自古帝王之使臣佐者曷不多論此弊乎陛下誠能反是而求之精心而察之愛其所忤而收忠賢憎其所順而去邪佞則天下之忠正可以比肩重足天下之太平可以千秋萬歲太宗之政化復行堯舜之淳風日用矣此愚臣所以請陛下審察忠佞測之恕之之術也國家自垂拱以後至於近年寇賊屢興兵革數動邊師潰喪日費滋多加以觀寺修營錫賚繁數郡縣之吏未息侵漁寰區之氓率盡周饉官班冗贅淫費頻煩近者人獻直言時有切諫徒聞讜議竟不施行至於營造未甚休息是使國儲不足人畜久空俗弊之繇其來已漸又制敕甚重姦非莫懲節限雖多逾越極衆孤羈寡援者小罪必罰貨賂朋黨者大愆不繩聽斷之獄不審寰中之罪未肅也夫法貴簡而能禁罰宜輕而必行陛下方興崇至德大布新政譬琴之不理宜在更張路之不平終當徙轍若不改創而求理安揚湯以止沸不可得也臣請不如除去碎密不察小過小過不察則無煩苛大罪不漏則止姦慝使簡而難犯寬而能制此所謂天網恢恢疏而不漏矣然後停不急之務漸無為之理休罷造作節減輸賦息徭役除贅官絶吏之侵漁復人之本業斯則人安而俗富也且俗富則國富人安則國安所謂理術無他惟此而已矣貞開元時官度支員外郎授汝州刺史充本州防禦使不宰物而萬類蒙利不致用而元功溥施廣成子之大吾無間然矣經云平天下在修其身廣成子以修身之道授黃帝而天下治俾千百年人畏其神思其德不曰協於教乎祀典云德施於民能禦大灾捍大患則祀之黃帝率廣成子之法以致天地之和禦陰陽之灾捍刑殺之患不曰宜祀於廟乎廣成子與孔宣父遭時不同故教有精粗跡有遠近耳非殊塗也余既稱廣成子之教通於孔氏問者曰以墳典莫存孰能詳知三五之事言廣成子者皆本於莊周固多寓辭今將質之以為定論豈不可非通達之士未足與議也夫欲為黃帝孔氏者行其言耳豈倣其形哉故其言合道則倣佛其人而尸祝之可也言苟非道雖比肩對席將聽之乎今以廣成子之言得天而合於道故表其廟貌又尊禮之又何患莊生之未信也按爾雅北戴斗極為崆峒其地絶遠華夏之君所以不至禹跡之內山名崆峒者有三焉其一在臨洮秦築長城之所起也其一在安定山皆高大可取材用彼人亦各於其處為廣成子立廟而莊生述黃帝問道崆峒遂言遊襄城登具茨訪大隗皆與此山接壤則臨洮安定非問道之所明矣仙經敘三十六洞天五嶽不在其列是知靈跡所存不繫山之大小也此山之下有洞焉其戶上出耆舊相傳云洞中白犬往往外遊故號山冢為玉狗峯昔之守宰以為神居閟潔懼樵牧者褻弄因積壤封之今升踐其頂響通於下甚深遠亦焉知非靈人所舍乎尋崆峒之言以中含洞壑不顯於外則安在於崇岫連峯淩霄蔽影然後稱名山也哉真南郭子舊居直山之北少樂大道早依門墻年壯宦遊出入二紀揆才無補晚歲懷歸獲刺是邦停輿授教象設頽圯半為荒榛遂命徹故宮稍增前制贏財而後事懸善價以待樂輸陶斫衆工咸來求售匪隨於勿亟蓋視利而勞茨暨壇垣指期咸就舊紀但以廣成子為仙者又不徵崆峒之地知有闕焉故復建此銘揭於西序文之曰德高三王唯軒轅氏為王者師唯廣成子窈冥昏默恍惚恢詭固精活身以滓為治功被九域形存伯紀天道不窮至人無死琪天寶九載宣德郎試大理評事嚴城暮兮絶人蹤君門深兮閉九重清矣擊柝出彼高墉候銅壺而發箭雜鳬氏之鳴鐘響以應聲按更籌而宣九陌內以達外禁姦慝而清四封何斯違斯是擊是扣聲參投壤之擊知甚挈瓶之守風雨如晦不假雞鳴夙夜在公但見牛斗至若衛尉奉職金吾克勤蓋欲懲寇暴亦以戒昏昕夜如何其歲聿云暮階凝冬雪月滿蟾兔是時也哀響稍動寒聲轉布窈窕鳳凰之樓蕭瑟銅駝之路於焉巡警自成險固復有空閨怨別幽客飄寓心馳遼陽之戍衣化陸生之素聞一聲莫不闌干聽萬籟悉以橫注當今六合肅清四夷即敘時無暴客邑空囹圄彼干楯之事擊柝之所尚行於方隅猶用於軍旅者蓋取諸豫備固吾守禦則知自我垂法寧云待暴至矣哉居安思危亦從吾君之所好也倬彼衆木者其桂林一枝淮南擢秀月上標奇光雨露之新沐拂香風以徐吹故能使皓氣淩空孤陰耀質心既丹而不二花又白而純一凝霜殞而色鮮嚴景凋而葉密若然者固將與大椿而爭長豈徒挺小山而間出至如孫宏已落郤詵未第沮塵色與灰心然粒玉而燼桂孰謂連卷銜半死之質特達承再生之惠淹留君之庭芳郁君之砌惜矣哉向使便辭仙客永棄幽林委根不用之境滅影空山之陰又焉能擅崑玉之高價吐歲寒之宿心彼徒見零落焦梧再斫恩深於既往殊不知摧殘朽桂一枝重遇於當今虛空廣大乎其體智慧圓通乎其用凝而不生湛爾常寂離修離證非色非心歷微塵劫遍恆沙界無量國土皆清淨無量昏暗皆光明誰其得之吾聞諸上人矣上人諱靈運蕭姓蘭陵人梁武帝後皇考翥虢州恆農縣尉初上人之生也戒珠孕於母胎定水澄於孩性內典宿植外學生知白雲凝其高志明水峻其苦節泛如也時不能知常以為幻境非實泡身是妄五色令人昏五音令人聾五味令人爽噫輪彼生滅無時息焉吾將歸根以復於正因遊嵩山至少林寺有始終之意焉會舅氏掾於高平而上人遂緇於此郡玉立凡石不可喻其炯然日映衆星無以方其明者竟移隸茲寺闕副乎夙心無何習禪決於龐塢圭大師潛密得以真貫理照十方於自空脫三界於彼著慧眼既淨色身亦如始知夫心外無法所得者皆夢幻耳然後觀大地土木無非佛剎焉空山蒼然窮歲默坐猿對茶碗鳥棲禪庵彼嶺雲無心即我心矣彼㵎水無性即我性矣夫如是孰能以凡聖量之乎故吾在造化中如夢中也粵開元十有七祀夏五月草二日不示以疾泊然而終苦霧晦黃於天地悲風哀咽於草木吁崩吾禪山涸吾法海空吾世界使凡百含識大千有情荼於是火於是可勝言哉故門人堅順獨建靈塔於茲山奉遺教也夫碩德丕發不有超代先覺而出夫等夷者則曷能傳我法印以一燈然千萬燈乎彼上人者嶷然倬立以定慧為藏以涅槃為山圓通於不注之境出沒於無涯之域適來時也適去順也今則終矣瞻仰如之何夫事往則跡移歲遷則物換況法與化永念從心積豈可使上人之高歿而不紀其事斫於石以旌斯文銘曰上人伊何傳我法印其體也寂其行也順紛彼識浪汨夫夢情非照不曙非澄不清作大醫王為大禪伯嶽立松古蓮青月白一朝化滅六合淒愴世界颯空雲山忽曠色身謝兮法體存金界慘兮鐵圍昏噫我所留者唯心源再思開元朝官刑部郎中乾尊坤卑天一地二陰陽之位分矣夫婦之道配焉至若死喪之威隆殺之等禮經五服之制齊斬有殊考妣三年之喪貴賤無隔以報免懷之慈酬罔極之恩稽之上古喪期無數暨乎中葉方有歲年禮經云五帝殊時不相㳂樂三王異代不相襲禮白虎通云質文再而變正朔三而復自周公制禮之後孔父刊經已來爰殊厭降之儀以標服紀之節重輕從俗斟酌隨時故知禮不從天而降不由地而出也在人消息為適時之中耳春秋諸國魯最知禮以周公之後孔子之邦也晉韓起來聘言周禮盡在魯矣齊仲孫來盟言魯猶秉周禮子張問高宗諒陰三年不言不聽其子服出母子游為同母異父昆弟之服大功子夏謂合從齊衰之制此等並四科之數十哲之人高步孔門親承聖訓及遇喪事猶此致疑即明自古以來升降不一者也三年之制說者紛然鄭元以為二十七月王肅以為二十五月又改葬之服鄭云服緦三月王云訖葬而除又繼母出嫁鄭云皆服王云從子繼育乃為之服又無服之殤鄭云子生一月哭之一日王云以哭之日易服之月鄭王祖經宗傳各有異同荀摯采古求遺互為損益方知去聖漸遠殘缺彌多故曰會禮之家名為聚訟寧有定哉而父在為母三年行之已逾四紀出自高宗大帝之代不從則天皇后之朝大帝御極之辰中宗獻書之日往時參議謂可施行編之於格服之已久前王所是疏而為律後王所是著而為令何必乖先帝之旨阻人子之情虧仁孝之心背德義之本有何妨於聖化有何紊於彞倫而欲服之周年與伯叔母齊焉與姑姊妹同焉夫三年之喪如白駒之過隙君子喪親有終身之憂何況再周乎夫禮者體也履也示之以迹孝者畜也養也因之以心小人不恥不仁不畏不義服之有制使愚人跂及衣之以衰使見之摧痛以此防人人猶有朝死夕忘者以此制人人猶有釋服從吉者方今漸歸古朴須敦孝義抑賢引愚理資寧戚食稻衣錦所不忍聞若以庶事朝儀一依周禮則古之見君也公卿大夫贄羔鴈圭璧今何故不依乎周之用刑也則墨劓宮刖今何故不行也周則侯甸男衛朝聘有數今何故不行也周則不五十不仕七十不入朝今何故不依乎周則井邑邱甸以立征稅今何故不行乎周則分土五等父死子及今何故不行乎周則冠冕衣裘乘車而戰今何故不行乎周則三老五更膠庠養老今何故不行乎諸如此例不可勝述何獨孝思之事愛一年之服於其母乎可謂痛心可謂慟哭者詩云哀哀父母生我劬勞禮記云父之親子也親賢而下不能母之親子也賢而親之無能則憐之阮嗣宗晉代之英才方外之高士以為母重於父據齊斬升數粗細已降何忍服之節制減至於周豈後代之士盡慚於古循古未必是依今未必非也又同爨服緦禮經明義嫂叔遠別同諸路人引而進之觸類而長猶子咸衣苴葈季父不服緦麻推遠之情有餘睦親之義未足又母之昆弟情切渭陽翟酺訟舅之寃寧氏宅甥之相我之出也義亦殷矣不同從母之尊遂降小功之服依諸古禮有爽俗情今貶舅而宗姨是陋今而榮古此並太宗之制也行之百年矣輒為刊復實用有疑融京兆萬年人開元初拜御史中丞以言利驟用事進黃門侍郎同中書門下平章事因諷侍御史李宙劾信安王罷為汝州刺史又貶平樂尉司農發融在汴州紿隱官息錢貶巖州道卒帝思其舊功贈台州刺史天下所檢責客戶除兩州計會歸本貫以外便令所在編附年限向滿須準居人更令所在優矜即此輩徼幸若徵課稅目擊未堪竊料天下諸州不可一例處置且請從寬鄉有賸田州作法竊計有賸田者減三四十州取其賸田通融支給其賸地者三分請取其一分以下其浮戶請任其親戚鄉里相就每十戶以上共作一坊每戶給五畝充宅並為造一兩口室宇開巷陌立閭伍種桑棗築園蔬使緩急相助親鄰不失丁別量給五十畝以上為私田任其自營種率十丁於近坊更共給一頃以為公田共令營種每丁一月役功三日計十丁一年共得三百六十日營公田一頃不啻得之計平收一年不減百石便納隨近州縣除役功三十六日外更無租稅既是營田戶且免征行安堵有餘必不流散官司每丁納收十石其粟更不別支用每至不熟年斗別二十價然後支用計一丁年還出兩丁以上亦與正課不殊則官收其役不為矜縱人緩其稅又得安舒倉廩日殷久長為便其狹鄉無賸地客多者雖此法未該準式許移窄就寬不必要須留住若寬鄉安置得所人皆悅慕則三兩年後皆可改圖棄地盡作公田狹鄉總移寬處倉儲既益水旱無憂矣明允博陵人天寶二年官朝議郎左拾遺內供奉伊空桐之靈鳥兮丹嘴黑質拂羽青霄兮流形白日與鴛鷺而為伍豈凡鳥之能匹故其聲則合雅動必依仁受惠而狎感恩而馴既裔裔而翔漢嘗啞啞而向人不驚不怖亦義而親爾其升丹楹入華堂對上客之羅薦拂佳人之褧裳驚空簾之秋色怨夕月之清光悲信美而非吾土傷幽棲而思故鄉於是湘妃援琴相如為歎何不開金籠而使飛永騫翥於雲漢重曰日宮難可躋月樹復驚棲未聽將雛曲空聞怨夜啼金籙齊頌空洞之中溟涬之際靈文尚矣混成眹焉混成者何象帝之先靈文者何龍漢之年五劫交周尊神遞運九㤅列正元始自然冶於流火之庭鍊於陽明之館二儀得之以定位三景得之以發光赤明開圖碧落普度元元奄有大道遂荒真宗天法之以無倪皇仰之而未及犧軒應運堯舜乘時均至化而思齊酌元風而殆庶獨立千古湛兮若存首出百王悠兮不極矣粵若聖祖系襲神宗先天不違後天繼代錫允慶遠流派祥長國家纂戎欽承前烈三合一德六同道平陽郡元元宮者興王之肇兆也惟初授命載告休徵權輿靈迹俶落祠宇昭彰於國史乃今升平永配嘉瑞增修清廟大建閟宮明白於御碑因吾道為天下程由茲地為天下式非夫至聖孰能與之哉皇帝御辨無為齊心正一寤寐有感髣佛真容昭孝孫之精誠貽烈祖之元訓開元得聖象天寶獲靈符丕慶再集而繁昌至教遂興而畢備祗崇冊禮其高莫二衮龍克光於像設冕旒追尊於帝位猗那商頌生人周雅儔之於昔今則過焉於鑠茲山會神之㝢西對姑射北鄰天柱實通仙之祕府也正殿肅穆廣廷森沈峯巒左右松栝交陰總虛無以靜深也石壇重階瓴甓環甃隱訣參伍洞章獲持三元表辰八月降誕每至日展法於斯修金籙齊啓玉皇印道家之寶王者之儀靡盛於此矣乃開乾門闢坤戶氣宏廣莫風和不周八卦行乎其中矣仰列宿躡魁罡落日淪陰夕時沆瀣六甲佐乎其旁矣仙侶頒次羽人步虛朝拜九天醮祠五老想鈎陳則黃雲垂覆存太乙則白鶴來翔其餘侍香金童傳言玉女縹眇煙景徘徊元空求之希微宛如契合惟鎮皇極叶時雍外以廓清萬里戎夷向化內以乂安兆庶年穀滋稔感格澤興昌光動植生成陰陽氣茂利兵所指則戢干戈靈官所臨則消疵厲矧感通上界神降祺福景命來假天子萬年者乎觀主臣郭處寂虔恭是勤夙夜匪懈稟師之籙佩嶽之符躬執科儀爰謀法要開元十六載御題觀額因隸於茲二十五年上疏議齊帝俞其請於是內使高真自王城而至綸音祕旨從天上而來諸侯肅臨郡邑蕆事革故垣棟鼎新經像彤彩赩赩金光熒熒曾是所營曾是有成利乎永貞太守臣裴朓並寮屬等惟道孚敬誼形於政奉揚休慶臮合觀徒衆等皆相與遵乃宗極體乎自然熙淡漠於元和抃恬愈於大順微臣嘗佐汾邑親覩聖蹤強名道原用述真宰從窅冥而辨物因象罔而得之其詞曰三㤅之宗粵元元始朱靈丙午赤明斯起太上道君託胎洪氏後天合德其惟我李爰初啓運符命歸唐海縣攸屬六重光天寶是應萬壽無疆大君推策考歷元陽空元之中自然妙有無鞅之衆勃勃珠口迎不見前隨不見後外物雖變我法彌久龍角嵯峨肇興靈迹仙宮乃建清都伊宅洞裏天長寰中地隔皇矣大道臨下有赫金籙祕訣玉冊元言陛壇之禮象法之門聖祖貽訓來告孝孫於茲授命永保元元克昌厥後大慶常存刊此樂石以奉至尊同泰元宗朝官太常博士議曰古先哲王作範貽訓不背時而立矩必隨俗而裁規由是因人以設教從宜而制禮苟反經以合禮膠柱以調弦故三代所以損益不同百王所以升降斯別伏據隱太子章懷節愍懿德等皆稟殊恩式創陵寢一羞蘋藻驟移檀柘豈非睦親繼絶悼往推恩者歟況漢置戾園晉修虞祀書稱咸秩禮記百神紛綸葳蕤可略言矣按陳貞節奏狀云伏見隱太子章懷節愍懿德太子等四廟遠則從祖近則堂昆並非有功於人立事於代而寢廟相屬祼獻連時又引漢元帝朝貢禹奏及丞相韋元成匡衡等議以為先王典禮不可越者臣愚以為貢禹上書匡衡奏記理異於此事匪其倫何者上述祖宗遠論壇墠往復於商周之際徘徊於遷毀之閒隱太子等並特降絲綸別營祠宇義殊太廟恩出當時如逝者之錫蘋蘩亦猶生者之開茅土寵章所及誰謂非宜且自古帝王建封子弟寄以維城之固咸登列郡之榮豈必有功於人立事於代生者曾無異議逝者輒此奏停雖存歿之迹不同而君親之恩何別此則輕重非當情禮不均神道固是難誣人情孰云其可又奏狀云合樂登歌有同列帝者隱太子等廟比來祼享皆稟舊章牲止少牢舞才六佾進無季氏之僭退用諸侯之禮恭惟故實未為乖謬自茲以降斷亦可知又據匡衡議思戾太子后園親未盡謹檢隱太子是皇帝曾伯祖本服緦麻章懷是伯父本服周年懿德節愍咸是堂昆本服大功親並未盡廟不合廢又準禮有以舉之莫敢廢也故劉歆以為德薄者流卑德盛者流光禮無所不順故無廢廟又漢司徒掾班彪云貢禹毀宗廟匡衡改郊兆皆數復紛紛不定者何禮文缺微古今異制各為一家未易可偏定也考觀諸儒之議劉歆博而篤矣據班彪之言足明古今異制禮合從宜按匡衡之議戾太子等以親未盡不毀斯則遠窺青史無可廢之文上固皇枝有深根之美一朝罷廢竊為不可隱太子陵廟等權與建立素非禮官詳定蓋是恩從中來斯事非外獎至如漢置戾園睦親也晉修虞祀繼絶也索神以祭則旁洽百靈咸秩無文則遠霑纍代且匱神乏祀春秋所非陟岡在原詩人攸歎國家仁及草木孝通神明澤既漏於三泉恩亦覃於九族豈有遠則堂伯祖近則堂諸昆服未絶於緦麻情見遺於黍稷臣愚以為置之則綏族廢之則收恩綏族則廟存收恩則享絶事關聖慮奏定為宜謹議
