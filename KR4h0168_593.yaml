front:
  text: 全唐文欽定全唐文卷五百九十三柳宗元二十五
  hash: sha256:7c69c18b3b68b5a265f78c3416a26b139a366c51fe6e07810a2753482fd8e5ec
body:
  text: 年月日某官某敢用牲牢之奠昭祭於虞帝之神帝入大麓雷雨不迷帝在璿璣七政以齊九澤既陂錫禹元圭至德神化後誰與稽勤事南巡祀典以躋此焉告終宜福遺黎廟貌如在精誠不暌今陽德愆候有淹淒淒降是水潦混為塗泥岸有善崩流或斷隄泛濫疇隴陂陀圃畦恆雨獲戾循咎增悽忍茲嘉生均彼蓬藜敢望誅黑蜧抶陰霓式乾后土以廓天倪粢盛不害餘糧可棲或簸或溲為酒為醯鎗鎗笙鏞坎坎鼓鼙百代祀德氓心不攜豈獨蘋藻徵諸澗溪帝其聽之無作神羞惟神之居為坎為雷專此二象宅於巖隈風馬雲車肅焉徘徊能澤地産以祛人災欽茲有靈爰以廟饗神惟智知我以誠往苟失其應人將安仰歲既旱暵害茲生長敢用昭告期於肹蠁某自朝受命臨茲裔壤蒞政方初庶無淫枉廉潔自持忠信是仗苟有獲戾神其可罔擢擢嘉生惟天之養豈使粢盛夷於草莽騰波通氣出地奮響欽若成功惟神是獎維年月日某官某以清酌少牢之奠禡於軍牙之神秦定百越漢開九郡自茲編列同於諸華天寶兆亂北方薦役惟是南方久稽討伐藩蠻怙險乳字生聚悖傲威命虐夷齊人黃姓陋孽實恣盜暴僮壯殺老掠敓使臣梟視洞窟以逃大戮今皇帝受天景命敷於有仁凡百凶毒罔不震伐齊魯劓殄趙魏顯化溥天之下咸順帝理唯是瑣眇尚恣昏頑致天震怒命底於罰官臣某欽率邦典統戎於征惟爾有神懋揚乃職敢告無縱詭類無劉我徒鏃刃鋒鍔畢集於凶躬鎧甲干盾咸完於義軀焚煬蕩沃往如行虛俾人懷於安以靖離之隅在是舉也往欽哉無作神羞急急如律令維年月日某官以牲牢之奠祭於纛神惟昔灃有大特化為巨梓秦人憑神乃建茸頭是為兵主用以行師漢宗蚩尤亦作靈旗既類既禡指於有罪北面詔盟抗侯以射雖有古典今棄不用惟茲之制神實守祀有蠢黃孽保固虐人俾茲太平猶用戎律天子有命威施於下惟守臣某董衆撫師秉羽先刃出用茲日敢修外事爰薦求牛庶無留行以殄有罪國有祀典屬於神明傷夷大命無敢私顧惟克勝敵以全天兵去茲蟊蠈達我涵育收厥隸圉役於校人海隅黎獻永底於理無或頓刃以為神恥急急如律令致祭於水土之神惟神蓄是元德演為人用不窮之養功齊乳湩惟古有制八家所共是邦闕焉官守斯恐蘊利滋久閟靈則深爰告有神惟惻我心卜茲利兆於彼城陰神斯有仁是鑒是臨惟昔善崩今則堅好惟昔匝石今則順道終古所無聿從心禱非神是與人力焉保發自元冥成於富媼克長厥靈不愛其寶敬修報禮式薦蘋藻禜於城門之神惟神配陰含德司其翕闢能收水沴以祐成績淫雨斯降害於牟麥野夫興憂官守增惕諸陰既閉休徵未獲敬用瓢齊以展周索納其雲氣復我川澤惟神是依式佇來格維貞元十七年歲次辛巳二月癸巳朔二十五日丁巳姪男華州華陰縣主簿纁謹以清酌庶羞之奠敬祭於六伯母之靈伏惟天錫考壽神資淑德高明而和柔惠且直敬長慈幼宗姻仰則不偕貴位孰不悽惻嗚呼哀哉移天夙喪丁此閔凶主器繼夭莫承於宗懿彼賢女孝誠自中溫溫良人竟揚德風承順必敬滑甘則豐致養有榮其道克終天禍弊族遠承哀訃纏牽官事奔哭無路亦既請告聿來京師以號以呼祗拜堂帷子姓凋落宗門日衰託於外姻陳此靈儀幼女號戀誓言固之仁賢見容曲遂其私內顧孱眇祗益摧悲誠愧於人豈曰得宜今歲調選獲參士林主其簿書於華之陰受祿雖微莫遂曩心夙駕東征祖軷將臨朔望是違哀懷豈任嗚呼哀哉維年月日某以清酌之奠祭於獨孤氏丈母之靈惟靈育德涵仁克生賢子生而不淑未壯而死名播九圍望高㣥士雖微祿位人羡其美在抱無孫承家乏祀孝女良壻適遵燕喜某曩與子重道契義均知心為貴實在斯人奉養宜繼將致其勤竟罹禍謫逾紀漂淪夙志斯阻微衷莫申冀榮末路私願獲陳遽此承訃天胡不仁嗚呼哀哉昔也高堂世悲其獨今茲元室孝道當復神感昭融不疾而速靈識逾濬承歡載穆式致其安寧置其毒願言有知以慰幽躅嗚呼我姓嬋嫣由古而蕃鐘鼎世紹圭茅並分至於有國爵列加尊聯事尚書十有八人中遭諸武抑遏讎冤踣弊不振數逾百年近者紛紛稍出能賢族屬旍耀期復於前君修其辭楚越猶傳從事諸侯假乎郡藩人謠吏畏威惠咸宣神胡不佑命不能延興起之望是越是愆歲首去我將濱海堧留連歡娛涉月彌旬夜爇膏炬晝淩風烟理策嶇嶔縻舟潺湲將辭又醉就往而旋今者之來徒御淒然垂帷襜襜飛旐翻翻升拜無形合哭誰聞逝歸從祔於鄧之原銘墓有辭發我狂言祗陳其悲匪暇於文觴有旨酒豆有㹠肩伊奠之菲而誠孔繁靈耶罔耶有涕漣漣維年月日八哥以清酌之奠祭於亡弟十郎之靈吾門凋喪歲月已久但見禍謫未聞昌延使爾有志不得存立延陵已上四房子姓各為單孑慥慥早夭汝又繼終兩房祭祀今已無主吾又未有男子爾曹則雖有如無一門嗣續不絶如線仁義正直天竟不知理極道乖無所告訴汝生有志氣好善嫉邪勤學成癖攻文致病年才三十不祿命盡蒼天蒼天豈有真宰如汝德業尚早合出身由吾被謗年深使汝負才自棄志願不就罪非他人死喪之中益復為愧汝墨法絶代識者尚稀及所著文不令沈沒吾皆收録以授知音文類之功更亦廣布使傳於世人以慰汝靈知在永州私有孕婦吾專優恤以俟其期男為小宗女亦當愛延子長大必使有歸撫育教視使如己子吾身未死如汝存焉炎荒萬里毒瘴充塞汝已久病來此伴吾到未數日自云小差雷塘靈泉言笑如故一寐不覺便為古人茫茫上天豈知此痛郡城之隅佛寺之北飾以殯紖寄於高原死生同歸誓不相棄庶幾有靈知我哀懇永州刺史博陵崔公之靈天之生人或哲或愚君取其英爰曜於初譽動京邑施於方隅密勿書奏元侯是俞蜀寇內侮禍聯羌髳君出顯畫披攘其徒南平劒門西獲戎俘超受刑曹留總南都移刺連部下民其蘇道不可常病惑中途悍石是餌元精以渝雷謗爰興桉驗增誣始雖進律終以論辜溟海浩浩而君是踰崇山茫茫而君是居厥弟抗憤叫於康衢天子憫焉訊以文書御史既斥連帥是除期復中壤遽淪別區喪還大浸又溺二孤痛毒薦仍振古所無何謫於天降此翦屠柩不及歸寓葬荒墟將葺將就誓還里閭嗚呼哀哉君之子姓惟自我出母儀先虧父訓又失煢煢相值撫悼增恤咸冀其才以大家室惟昔與君年殊志匹晝咨夕計期正文律實契師友豈伊親昵誰謂斯人變易成疾良志莫踐乖離永訣嗚呼哀哉永山之西湘水之東殯紖以出斧屋爰封神非久留息駕於中書石為志世德斯崇手以酹涕出焉窮嘻乎崔公之柩嘻乎崔公楚之南其土不可以室或坌而頽或確而崒陰流泄漏瀸沒渝溢碩鼠大蟻傍穿側出虧踈脆薄久乃自窒不如君之鄉式堅且密嘻乎崔公楚之南其鬼不可與友躁戾佻險睒眒欺苟脞賤暗勿目輕嚚妄走不思已類好是㣥醜不如君之鄉式和且偶日月甚良子姓甚勤具是舟輿寧君之神去爾夷方返爾故鄰奕奕其歸宜樂且欣君死而還我生而留永矣殊世曷從之遊酹觴於座與涕俱流年月日八舅十舅以酒肉之奠敬祭外甥韋六小卿之魂嗚呼生有孝姿淑且茂兮謂吉其終道克就兮胡典而喪離厥咎兮蹈道而違死誰祐兮豈汝之昧不能究兮將奪之鑒使昏霿兮反復攪豫哀何救兮骨肉無從魂焉覯兮庶幾來歸餕以侑兮酒實於觴肉盈豆兮豈伊異人余所授兮來耶否耶歆氣臭兮叔舅宗元祭於二十六娘子之靈凡我諸甥惟爾為首甥於我氏恩顧彌厚惠明貞淑仁愛孝友女德之全素風斯守播於族屬芬馨自久恭惟伯姊道茂行高上承下訓克敬能勞夙有儀則刑於汝曹雖云惟性抑自良陶汝之先君以文誨我周流辨論有疑必果恆革其非以成其可孰云其美易以生禍汝及諸弟流離莫從幸獲我依以慰困窮歸之令族有蔚其容方冀榮壽遽罹災凶嗚呼哀哉汝自艱酷二弟繼終海門之哀今古罕同駢也英文敷暢洽通實期振耀宏我儒風又茲夭閼神理何蒙盛德餘慶宜福其豐胡然降戾惟禍之逢嗚呼哀哉前歲詔追廷授遠牧武陵便道往來信宿幸茲再見緩我心曲猶且輕別瞻程務速孰知自此遂間幽躅臨視無路遡風慟哭怛焉自中如刃之觸邙阜有位青烏載卜道途尚艱歲月逾蹙方俟歸紖再期奠沃寄哀斯文心焉往復嗚呼哀哉祭於卿郎之魂嗚呼天吝靈奇取不可貪既睿又力神誰以堪汝不是思而縱其志盜其管籥褰其篋匱抽深抉密擔重揭貴守吏失職訴帝行事果殄爾躬以寧其位豈不信耶不然無鬼誅之行而中道夭死有拔萃之才而三見廢委仁充其軀毒中骨髓其何以為纍也兄弟逾十我出惟八既孤數祀中分存沒我為汝舅汝為我甥求仁具得為藝繼成天下莫倫古罕並行人而思之幾不欲生嗚呼哀哉既致其愛祗極其哀秦越萬里心魂徘徊念與汝別桓公之臺顧余猶壯視爾如孩戲抽佛策前次沱隈笑頷即路鳴鞘不回豈云古今自此而乖孰為鬼神忍是陰誅得疾之日兄弟莫在謁醫問巫卒以幽昧葬之東野誰賵誰會既虞以奠誰主誰酹孤魂冥冥何託何逝嗚呼哀哉刑曹繼之以病告余銜憂驅使裹藥操書雖驚狀劇猶恃神扶豈知所賴終以誤吾我自得罪無望還都想爾新墓少陵之隅何時歸祔圮土下呼漬淚徹壙以沾以塗此心未慊祗益摧紆纍見於夢寧知有無寄之哀辭惟俎及壺嗚呼哀哉年月子壻謹以清酌庶羞之奠昭祭於丈人之靈卿雲輪囷天漢昭回自然物外寧雜塵埃公稟間氣心靈洞開翱翔自得誰屑㣥猜孝友忠信聞於九垓摛華發藻其動如雷世榮甲科亦矜顯處公之俊德有而不顧御史之選朝之所注公勤於養投劾引去時任方隅威刑是務公施其惠亦莫有京兆之難下多怨怒或由以黜瓦石盈路公捍其強仁及童孺左遷而出擁道牽慕道峻多謗德優見憎煩言既詆倚法斯繩南過九疑東逾秣陵顛沛三載天書乃徵入傅王國嘉聲聿興詹事東宮致政是膺年唯始至道則彌勵頡頏今古優游德藝實期濬發再光文陛誰謂昊天遽茲降厲嗚呼哀哉某以通家承德夙奉良姻莫成子姓早喪淑人恩禮斯重眷撫惟新綢繆其志實敬實勤逮今挈然十有八祀家缺主婦身遷萬里謗言未明黜伏逾紀德輝間絶音塵莫俟歲首發函視遠如邇雖當沈痼心術猶治撫膺頓首流泣瞪視既斂而還莫傳音旨鄉風長慟於茲已矣嗚呼哀哉承訃之始卜兆既逾載馳斯文出拜路隅哀從海澨禮致皇都寸誠相續終歲不渝天道悠遠人世多虞寄心雙表長恨囚拘嗚呼哀哉昭祭於給事五丈之靈自古直道鮮不顛危禍之重輕則繫盛衰矯矯明靈克丁聖時形軀獲宥三黜無虧賢良發策始振其儀天子動容敬我直辭載之冊府命以諫司抗奸替否與正為期奏書百上知無不為誰謂劉賈英風莫追給事黃門奉職樞機封還付外動獲其宜無曠爾位惟公在斯達道之行實惟交友患難相死其廢日久公實毅然誓均悔咎挺身立氣不改其守黜刺南荒義言盈口封章致命志期殞首邈矣高標誰嗣於後王命南下郡符東剖流滯湮淪殲此遐壽嗚呼哀哉公之伯仲信惟先執感激之風道同義立中司守直奸權是襲致之徽纆誣以賄入瑣瑣其徒榜訊愈急詔下三司議於洛邑噫我先君邦憲是輯平反㣥枉大忤三揖危法旋加譖言俄及左官夔國義夫掩泣邪臣既黜乃進其級端於庶僚直聲允集虔虔小子夙奉遺則公在郎位再罹擯抑時忝憲司竊分枉直抗辭犯長有志無力惟韓洎劉同憤霑臆道之不行銜愧罔極公在左掖議登秋官先定於志將發其難決白無狀以申禍端秉心撰詞義不可干會逢友纍曾莫自安感於褚中有涕汍瀾嗚呼哀哉壽宮久翳狼荒萬里禮不可違誠不可弭抽哀泄憤舒文致美願遡海風以窮洛涘清明如在神鑒何已嗚呼格思以慰勤止維元和六年歲次辛卯九月癸巳朔某日友人守永州司馬員外置同正員柳宗元謹遣書吏同曹家人襄兒奉清酌庶羞之奠敬祭於呂八兄化光之靈嗚呼天乎君子何厲天實仇之生人何罪天實讎之聰明正直行為君子天則必速其死道德仁義志存生人天則必夭其身吾固知蒼蒼之無信漠漠之無神今於化光之歿悲逾深而毒逾甚故復呼天以云云天乎痛哉堯舜之道至大以簡仲尼之文至幽以默千載紛爭或失或得倬乎吾兄獨取其直貫於化始與道咸極推而下之法度不忒旁而肆之中和允塞道大藝備斯為全德而官止刺一州年不逾四十佐王之志沒而不立豈非修正直以召災好仁義以速咎者耶宗元幼雖好學晚未聞道洎乎獲友君子乃知適於中庸削去邪雜顯陳直正為道不謬兄實使然嗚呼積乎中不必施於外裕乎古不必諧於今二事相兼從古至少至於化光最為太甚理行第一尚非所長文章過人略而不有夙志所蓄巍然可知貪愚皆貴險很皆老則化光之夭厄反不榮歟所慟者志不得行功不得施蚩蚩之民不被化光之德庸庸之俗不知化光之心斯言一出內若焚裂海內甚廣知音幾人自友朋凋喪志業殆絶惟望化光伸其宏略震耀昌大興行於時使斯人徒知我所立今復往矣吾道息矣雖其存者志亦死矣臨江大哭萬事已矣窮天之英貫古之識一朝去此終復何適嗚呼化光今何為乎止乎行乎昧乎明乎豈蕩為太空與化無窮乎將結為光耀以助臨照乎豈為雨為露以澤下土乎將為雷為霆以泄怨怒乎豈為鳳為麟為景星為卿雲以寓其神乎將為金為錫為圭為璧以栖其魄乎豈復為賢人以續其志乎將奮為神明以遂其義乎不然是昭昭者其得已乎其不得已乎抑有知乎其無知乎彼且有知其可使吾知之乎幽明茫然一慟腸絶嗚呼化光庶或聽之維貞元二十年歲次甲申五月某朔二十二日故吏儒林郎守侍御史王播將仕郎守殿中侍御史穆質奉議郎行殿中侍御史馮邈承奉郎守監察御史韓泰宣德郎行監察御史范傳正文林郎守監察御史劉禹錫承務郎監察御史裏行柳宗元承務郎監察御史裏行李程等謹以清酌之奠敬祭於故中丞贈刑部侍郎李公之靈惟公堅貞守道潔廉成德當官秉彞卓爾孤直高節外峻純誠內植臨事不回執心無惑矯矯徑質擢於天枝式是邦族粲其羽儀發跡內史參其軍事自下劘上直詞屢至於後受邑歷撫疲人公去逾久人滋咏呻復從京邑辟署司録振其綱條端我甸服黠吏屏氣貪官窒欲赫赫有命登於王庭邦賦以修國用是經實抗其長以奉準程校其簿書無失奇贏進為正郎勾會是專乃刺於商虎節登山化塉為沃致夷於艱道途謳歌有詔徵還丞我御史執其憲矩糾逖之志直清是舉慎擇寮吏必薪之楚終始七載不忘祗勤事無觀瞻道有屈伸皂囊密啓忠懇屢陳令望逾重名卿是屬拖紳遽聞卷衣已復禮備賵贈恩加命服窀穸有時歲月逾蹙播等猥備官屬况當薦延承其規模奉以周旋近或逾月遠則纍年咸承至公官守獲全故事盡在遺風藹然俯仰庭除顧慕潺湲致誠一觴拜訣堂筵嗚呼哀哉維年月日甲子京兆尹韋夏卿謹以清酌之奠敬祭於故河中節度贈禮部尚書杜公之靈自古謀帥恆在諸儒晉登郤縠亦以詩書爰及近代二柄殊途授鉞之臣率由武夫時惟明靈道冠學徒天子有命總其戎車何以邦之維絳及蒲有山有河殿此大都焜耀昌時振宣後學命服之盛光於列嶽謂保豐福永縻王爵壽如何期神不可度嗚呼哀哉大歷之歲詔徵茂才時忝同道俱起草萊懷策既陳綸言煥開考第居甲自天昭回分命邦畿步武獲陪同志為友星霜屢回長我十年禮宜兄事周游歡洽莫不如志於後多幸謬列周行又同制書並命文昌及余稍遷吏部為郎公屬中兵此焉分行再獲聯事東西相望出處同道樂惟其常後豫出刺九載南服公自左輔遂膺推轂我勤魏闕爰總九流誰謂河廣願言莫由烹魚之問往復相酬惠好斯厚惟以綢繆余弟宗卿獲庇仁宇命佐廉問忘其愚魯假以羽翼俾之鶱翥惠文峩峩赤紱在股榮映斯極從容何補承慶惟深報恩無所嗚呼哀哉天子震悼哀我良臣密印追贈尚書禮殷四方興嗟况此故人循念平昔徘徊悲辛卜葬斯及禮儀畢陳敬薦行潦泄哀茲辰嗚呼哀哉維年月日甲子京兆尹韋夏卿謹以清酌庶羞之奠敬祭於亡友故太常少卿崔君之靈惟靈率是良志蹈其吉德炳蔚文彩周流學殖孔氏之訓專其傳釋黃老之言探乎幽賾六書奧祕是究是索叩爾元關保其真宅藝成行備披雲騁跡康莊未窮濛汜巳極嗚呼哀哉夙歲同道從容洛師接袂交襟以遨以嬉策駕嵩少泝舟瀍伊笑咏周星其樂熙熙丹霄可望青雲可期洛中十友談者榮之惟鄭洎齊各登鼎司或喪或存山川是違繄我夫子宜相清時命之不遐孰不悽悲嗚呼哀哉往佐居守及爾同僚笑遨交歡匪夕則朝入同其室出聯其鑣投文報章既歌且謠及我為郎優游吏部公為御史持憲天路文陛徐趨眷戀相顧歡愛之分有加於素自我於邁歷刺東吳離憂十年復會名都余為侍郎銓總攸居實得茂彥奉其規模聯事合情又倍其初我尹京兆公亞奉常步武相望佩玉以鏘謂保愈樂長此翱翔抱疾幾何忽焉其亡嗚呼痛哉原念往昔愛均骨肉我有書笥盈君尺牘寤言在耳今古何速失涕興哀匍匐往哭撫筵一呼心焉摧剝日月逾邁佳城遽卜素車千里逶迤山谷晦爾精靈藏之斧屋嗚呼哀哉丹旌即路祖奠在庭去此昭昭就爾冥冥敬陳泂酌以告明靈臨觴永痛庶寫哀忱嗚呼哀哉伏維尚饗維貞元十九年歲次癸未四月辛未朔某日檢校工部尚書京兆尹司農卿李實謹以清酌庶羞之奠敬祭於故兵部郎中楊公之靈惟靈清標霜潔馨德蘭薰冲和茂著孝友彰聞濬發洪緒激揚清芬思侔德祖學紹子雲瑩彼靈府彬其英文吐論冠時舒華軼㣥百氏之奧一言可分旁貫釋老豈伊典墳謂躡公相贊揚聖君高山安仰逝水沄沄嗚呼哀哉惟是伯仲並為士則連擢首科迭居顯職公之懿美發自朋僚播於四方令聞克昭炯然燭識卓爾孤標翼翼其容羽儀清朝載筆東掖動無不紀起草南宮時論增美大梁有艱天子是使密勿之謀唯道是履復歸郎署職茲中兵簡稽無撓以考其成英風未攄沈疴遽嬰孰云積善降以促齡昔歲江表獲同宴語謬為好仁不我遐阻公之元兄復惠德音優游多暇眷眄逾深情言盈耳尺素相尋冀茲競爽焜耀儒林及此雕落祗摧我心嗚呼哀哉遣車就引哀挽先路迅風悽悲頽景幽暮傾都殄瘁揮涕相顧矧茲故人誰任痛慕潢汙一觴詎寫平素尚饗維年月日故吏某職官某致祭於故都護御史中丞張公之靈交州之大南極天際禹績無施秦強莫制或賓或叛越自漢世聖唐宣風初鮮寧歲稍臣卉服漸化椎髻卒為華人流我愷悌士燮之理惟公克繼勤勞遠圖敷贊嘉惠銅柱南表前功載修空道北出式遏蠻陬梯航連連旌旆悠悠輻湊都會皇威以流方荷天寵宜公宜侯聲馳帝鄉魄降炎州嗚呼哀哉公昔試吏時推清能公昔乘軺人知準繩鰥嫠以安征賦用登柱史稍遷郎曹繼升程功佐理海裔斯澄乃紀南方專任是憑禮分五玉恩錫百朋開府辟掾㣥英攸屬顧茲陋微敢廁甄録既受筐篚載加命服賜有楚冠用慙豸角星言赴命注望帷幄視險如夷瞻程非邈伯氏左宦爰滯中途流連隱憂言念涕濡子姓莫在使命頓殊兢魂弔影敢廢斯須情留江徼夢結天隅恩切有裕義乖從役顧慕長慟展轉增惕膂力猶在中腸屢激方俟消憂永期投跡謙德不福法星降災庭懸遽徹馹訃爰來撫躬益恨循顧增哀瞻容莫及報德何階輤車北轅申奠克諧望拜徒至音塵永乖南州斗酒庶寫幽懷惟靈孝友之性實惟天與飾以儒書洽其譽處枵然其量廓爾其宇人以義來我以身許褰裳赴急不避寒暑交半域中多容鮮拒賢於博奕媚茲宴語或泛或沈兩得其所考禮成文墜章克舉展樂承職音官式序既聯奏復亦圖筍簴播在奉常永傳儀矩脫略細微慠忽煩言坦然自居無顧仇怨卒成官謗莫究禍源坐黜中徙再期騰鶱孰云宿憤遽此歸魂嗚呼哀哉世稱姻黨鮮克終吉唯我與君久而逾密追惟淑德嬪於君室上順尊卑下歡儔匹致其孝敬式是仁恤爰及童孩處心勿失君之仲季茂於文術游藝相從操觚散帙顧余蹇劣廁跡奔逸二紀於今交情若一屢聞凋缺互見遷黜契濶伶俜分形間質方期末路稍追曩日時不我謀於焉斯畢營營衛尉獨守邦秩想其永哀淮海蕭索嗚呼哀哉聞疾馳簡其命未返翩其訃書來自番禺塊守窮荒山夔與居有眉不申有志不舒况逢零悴當此囚拘拊膺長慟長慟何如菲禮無取沈哀有餘嗚呼哀哉維年月日朔友人從內兄守永州司馬員外置同正員柳宗元敬以酒肉之奠致祭於亡友呂敬叔之魂嗚呼鞠躬歷聘或以不答屠漁乖離夫何克合大或不容小或見遺往來逢迎今古參差惟子之中忠勇充之以誠與物退受其疵智謀宏長辨論恢奇巖峩博大與世異姿何付之器而躓於時常曰余武王功是期誓耆其力以達皇威邊鄙不靖俾供輿師諸侯順道戎貊咸宜今其歿矣哀志之違知之無補世又罕知嗚呼哀哉昔與子游尚疑其志及觀其長誠任其事日異其能歲增其智進如川行浩浩而遂天乎有亡中道是棄余慎取友惟心之虔周游人間餘二十年擯辱非恥升揚非賢一貫於道無四五焉子之我知不以事遷言而見信貌阻心傳我黜終世子夭於前徒稱子志誰信我言與子俱已孰云後先惟子之兄志同義比官刺一州四十而死子仕方初百年有幾如何默默去我遄已有稚之妻有弱之子海壖東周號哭萬里葬紖之行獲出於此爰陳酒肉式嘉且旨讀茲哀辭以奠而誄嗚呼敬叔吾道已矣尚饗夫産崑崙者難為玉植鄧林者難為木公以令望顯於華族藝邃六書學該七録耽此黃老恬於寵辱入補黑衣出參甸服紀綱淮海政令惟肅宰治嶽濱周於仁育儲闈典議直清攸屬久次推能二州繼牧至於是邦率由舊俗和易勿亟優游自足既有少吏勤於庶獄妖誣殄除淫祠翦覆出令三歲人無怨讟進律未行歸神何速某咸以罪戾謫茲炎方公垂惠和枯槁以光鳴鑾適野泛鷁沿湘廣筵命樂華燭飛觴高歌屢舞終以無荒紛慮斯屏憂懷暫忘良時不再斯樂難常今其奈何顧慕感傷嗚呼室有迭去川無息流追懷曩辰恍若夢遊奠徹中寢魂遷乘舟邦人永思匍匐隱憂况我懷德心焉若抽潔誠可薦蘋藻非羞世病乎直人悅其和行而不容雖聖奈何提其信義誰與同波硜硜以終堅不可磨游得其仁友擇其益始如可進終會於厄精誠介然將貫金石追恩懷舊興詞憤激君昔來辱備聞嘉言宵會北堂晝宴南軒去適於越不日其旋載除我居望爾北轅今者之來丹旐有翩閟茲英志限此中年嗚呼哀哉居實斯貧有子而幼孰云履信惟天所祐道途之資敢廢於舊志君之行銘石斯授有潔其觴有楚其豆庶鑒於誠臨茲饗侑致祭於亡友中明之靈夫子之道邈以恆兮夫子之志勵以兢兮求中慊末若履冰兮敦仁以孝實蒸蒸兮唯毀死虧禮其他莫懲兮秉端守一信厥明兮月踰歲長行若登兮外溫其顏內類直繩兮謾言來加不遽陵兮舉世㣥非自視宏兮庶優游於道大賚是承兮掩冤舒抑與類升兮胡茫茫其不信卒以禍仍兮豈韜忠裒信鬼所憎兮將教言吾欺終不可徵兮吾方期子於暮冀有興兮今而棄豫志若崩兮若將援而上喪厥肱兮怛其隕心交背膺兮水之綿綿山萬層兮又淫以雨雪紆委硱磳兮互鳥鵂夜啼㣥瞑凝兮魂鬼以行中道歹夌殑兮魑魅撝呵曷可憑兮聊致吾憤斯言孰稱兮後餘常山張氏孝其家忠其友為經術甚邃而文少余七年頗弟畜之與之居終日沖然忘其有人與之言鏗爾而厲辨而歸乎中凡人有道而不顯於世則曰非其世也道而得乎世然猶不顯則曰命命之微不可知知而索乎外者曰性與貌後餘之性可謂良矣其貌可謂肅矣博實宏裕宜為大官耇老求其所以夭賤無可得焉既得進士明年疽發髀卒後餘之死人咸痛之曰天之祐善人而殺是子何也激者曰天之殺恆在善人而祐不肖莊周之說以為人之君子天之小人張君豈天所謂小人者耶是二者又非論之適也吾謂善與惡夭與壽貴與賤異道而出者也無所喜怒於其中道之出者多其合焉固少是以君子之難貴且壽也後餘母老而喪良子東西行者助之哭焉况其知者耶然後餘不與諂冒者同貴不與悖亂者同壽歸潔乎身聞道而死雖勿哭焉可也嗚呼向更使既聞道而且貴且壽則其顯庸也遠矣又烏能勿痛乎遂哭之以辭嗟嗟張君善不必壽惟道之聞一日為老人皆反是百稔猶幼子之優游是亦黃耇嗟嗟張君寵不必貴尊嚴為仁早服高位淫諛肆欲銀艾淪棄子之崇高無愧三事吾見皤皤而童赫赫而辱進襦袴於几杖負泥塗於冕服己雖有餘人視不足子之跡不混乎其間者幸也宜賀而弔宜歌而哭吾其過乎與其寵而加貴善而加壽道施於人慶及於母從容邦家樂我朋友豈不光裕顯大歟而不克也則弔而哭者其無過乎嗚呼楊氏子承之既冠有成人之道其明年四月不幸而夭其外姻解人柳宗元為之慟且出涕噫是子也氣淳以願志專以勤確然而直方吾未知其止也作辭賦書論其言甚偉余方愛之謂可以成器者故不知慟且出涕况其親戚者乎凡天之生物也不類精粗紛龐賢愚混同或遠而合或親而殊然則雖人親戚亦將有不克知其美者若楊氏子者其親戚皆賢咸得知之者也使知之徒以增其悲愁怨號之聲無為也用是為之辭以相其哀焉葆醇熙兮承貞則懿文章兮好循直誠耿介兮又綽寬學之勤兮行彌專質圭璋兮文虎豹超凌厲兮馳聖道力未具兮志求通道之遠兮足先窮有母噭噭兮有弟哀號世父孔悲兮湘水滔滔去昭曠兮沈幽寞魂冥冥兮竟難託死者靜兮生者愁子之淑兮徒增憂志甚良兮命甚蹙子之生兮又何欲悲吾心兮動吾神誰使子兮淑且仁嗚呼已乎不可追終怨苦兮徒何為
