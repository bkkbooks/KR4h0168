body:
  text: 問三雄鼎立四海瓜分魏氏獨跨於中原孫劉割據於南土五勝更襲唯受命以當塗四大居尊咸仗義而稱帝二十八宿指躔次於何方三十六郡列封疆於何所醇化懿綱非無寬猛之規愛國治人自有弛張之度皇皇祖考並建鴻名眇眇子孫俱聞失德為功業之厚薄而存亡之後先至如獻納忠規縱橫武節既自方於樂毅或見比於張良各有其人詳諸史傳所行事迹咸請縷陳對天命靡常地變其宗三雄鼎據分割乾坤或利近江海銀銅之湊或邑居河洛桑梓之餘用能仗風雲采松竹開物成務廣運靖人至如仰緯星躔傍分列郡成都應乎井絡建業開於斗牛若乃發迹譙墟圖光畢昴竟能一紫宙之意兆黃精之符然而物運弛張得失成敗此關諸天意也諒非人事也豈功業之厚薄何存亡之先後長想前修載述古迹且為人臣者善指事之要專切直之言然則荀氏之比張良沈機已迅葛侯之方樂毅希古自高俱能明允克誠興光大化代收其器人獻其謀觀國以取肅軍容退惡以力扶王室其理甚博厥美惟先畫為九州時更七代徒勤短思有愧縷陳謹對質懷州河內人舉賢良方正纍擢給事中改太子左庶子出為開州刺史臣聞三年之喪自天子達於庶人漢文帝以宗廟社稷之重自貶乃以日易月後世所不能革太子人臣也不得如人君之制母喪宜無厭降惟晉既葬公除議者詭辭以甘時主不足師法今有司之議虧化敗俗常情所鬱夫政以德為本德以孝為大後世記禮之失自今而始顧不重哉父在為母期古禮也國朝服之三年臣謂太重唯行古謂得禮太子於陛下子道也臣道也君臣以義則撫軍監國有權奪父子問安視膳固無服衰之嫌古未有服衰而廢者舒王以下服三年將不得問安視膳耶太子舒王皆臣子也不宜甚異且皇后天下之母其父母士庶也以天下之母為士庶降服可也太子臣子也以臣子為母降可乎公除非古也入公門變服今期喪以下慘制是也太子晨昏侍非公除比墨衰奪情事緣金革今不監國撫軍何抑奪耶子之於父母禮異而情均太子奉君父之日遠報母之日少忍使失令名哉問皇帝若曰蓋聞上古有道之君垂拱無為以臨四海不理而人化不勞而事成星辰軌道風雨時若邈乎其不可繼何施而臻此歟三代以來制作滋廣異文質之變明利害之鄉威之以刑道之以禮敦其俗而彌薄防其人而益偷豈澆淳必繫於時耶何聖賢間生而莫之振也朕祗膺纍聖之業猥居兆人之上虔恭刻勵如恐墜失憂濟庶務夕惕晨興永惟前王之典謨是憲是則師大禹以崇儉法高宗以求賢興夏啓之征作周文之伐旌孝悌舉直言養高年敦本業平均徭賦黜陟幽明勵精孜孜勤亦至矣然而浮靡不革理化不行暴亂不懲姦犯不息五教猶鬱七臣未臻鄉黨廢尚齒之儀蒸黎無安土之志賦入日減而私室愈貧廉察日增而吏道愈濫意者朕不明歟勢不可歟何古今之事同而得失之效異也思欲剗革前弊創立新規施之於事而易從考之於文而有據備陳本末將舉而行無或憚煩略於條對自頃陰陽舛候祲沴薦興仍歲旱蝗稼穡不稔上天作孽必有由然屢為凶災其咎安在傳曰時之不乂厥罰恆暘又曰堯湯水旱數之常也二者相反其誰云從今人靡蓋藏國無廩積朕屢延卿士詢訪謨猷至乃減冗食之徒罷不急之務既聞嘉話亦已遵行而停廢之餘所費尚廣欲轉輸於江徼則遠不及期將搜粟於關中則擾而無獲節軍食則功臣懷怨省吏員則多士靡歸中心浩然罔知攸濟子大夫蘊蓄才器通明古今副我虛求森然就列匡朕之寡昧拯時之艱災畢志直書無有所隱對臣聞帝王之理殊塗而諫諍之道一致五諫之要同歸而直諫之用為急今朝廷之不聞直聲久矣伏惟陛下採唐堯師錫之義降禹湯罪已之詞詳延直臣博求失政自近古以來憂勞思理未有如此其至者且何患乎不得為堯舜而已若欲陛下之德與天比崇欲陛下之名與天無極斯乃天之意也臣之志也不然者臣當退從作者七人之八耳孰為來哉制策曰上古有道之君垂拱無為以臨四海不理而人化不勞而事成星辰軌道風雨時若邈乎其不可繼何施而臻此歟三代以來制作滋廣異文質之辨明利害之鄉威之以刑道之以禮敦其俗而彌薄防其人而益偷豈澆淳必繫於時耶將聖賢間生而莫之振也臣聞三皇以道化五帝以德化故曰修已以安百姓垂衣而化天下天何言哉帝何力哉無為而已遂性而已至道既往至德寖衰而三代之主先之以禮義故有法度之制質文之變高其隄防崇其刑辟不臻大化迄可小康上古之君三代之主教道既異勞逸自殊則知理之盛衰皆德所致效在德有優劣非時有澆淳繼三代者其降殺可知矣制策曰朕祗膺纍聖之業猥居兆人之上虔恭刻厲如恐墜失憂濟庶務夕惕晨興臣聞舜禹日兢湯武日業皆前代帝王之所以為理憂勤之至也臣竊聞陛下憂勞大道勤績庶務無大無小必躬必親靡不關心靡不經手勤亦至矣憂亦至矣然神太用則竭形太勞則弊古人云人生處代如白駒過隙耳何忽自若如此又陛下一則罪已二則罪已若然者復何用宰相乎何用有司乎制策曰永惟前王之典謨是憲是則師大禹以崇儉法高宗以求賢興夏啓之征作周文之伐旌孝弟舉直言養高年敦本業均平徭賦黜陟幽明厲精孜孜勤亦至矣然而浮靡不革理化不行暴亂不懲姦犯不息五教猶鬱七臣未臻鄉黨廢尚齒之儀蒸黎無安土之志賦入日減而私室愈貧廉察日增而吏道愈濫意者朕不明歟勢不可歟何古今之事同而得失之效異也思欲剗革前弊創立新規施之於事而易從考之於文而有據備陳本末將舉而行臣聞事不師古以克永世匪説攸聞陛下追惟前王之典謨是稽古之道也然陛下師古為理也欲何為乎為皇乎為帝乎為王乎驅天下之人欲令歸忠耶歸敬耶歸文耶漢文帝以清淨為宗近稱刑措漢宣帝以刑名律下亦謂中興自古以來未有不舉綱而目正不澄源而流清者矣此亦陛下熟聞之矣是憲是則之宜更申明之使在下者有所趨也臣聞大禹稱三王首者以其卑宮室菲飲食裕人克已儉之至也其道堙沒不嗣久矣惟陛下獨能師而行之苟綸言之可復則天下之可化所謂其身正不令而行其身不正雖令不從者也臣聞自古求賢各以類至三皇師其臣五帝友其臣三王臣其臣取其師之禮黜位而朝之取其友之禮以身先焉取大臣之禮以皮幣先焉陛下欲為皇則行事師之禮欲為帝則行取友之禮欲為王則行取臣之禮自昔哲王則有感夢而行傅巖惟肖則有協卜而出渭濱親載則有卑辭以厚禮湯命五返於處士則有可就不可屈備獨三顧於草廬此皆陛下備聞之矣臣竊見國家取賢之道其禮部吏部失之遠矣則制策之舉最為高科以臣言之不得無弊且陛下弓旌不出元纁深藏無聘問之先有投刺自媒者無軟輪之禮有躡蹻而來者支離於京闕會計於有司又廣張節文妄設條格禁禦約束鄰諸盜賊防賢之意甚於防姦崎嶇困辱曠日永久然則一覩天顏一承聖問臣恐皇王佐略不可由此而致也今之所得者乃臣輩瑣瑣者耳強名曰賢賢者固如是耶厚顏包羞臣竊自笑則高宗求賢之意似或不然此乃國家最弊之務伏惟陛下加恩重而慎之陛下文可經天地武可定禍亂我武載張則河壖亡命之寇既以指朝自滅我文載修則淮瀕逋逃之醜可以不日自來道冠古今功格上下夏啓周發曾何足云陛下旌孝弟而孝弟未能化人旌之未得其實也舉直言而直言未得上達舉之不得其人也養高年則廢禮已久未有聞焉敦本業則失農者多鮮有勸者平均徭稅而怨嗟日生姦贓之吏未去也黜陟幽明而善惡同貫考課之法未精也陛下師從儉之遺訓則浮靡何患不革前王之典謨必用則理化何患不行行則暴亂懲姦犯息然後禮義可浹而五教自宣矣七臣者豈非孝經所謂天子有諍臣七人乎今朝廷列官致位有以諫為名者左右前後拾遺補闕其數甚衆不止七人使陛下有未臻之歎其過將有所歸矣以陛下養高年之禮著於上則鄉黨不廢尚齒之儀均徭之法行於吏則蒸黎有安土之志安土則樂業樂業則務本務本則興農興農則家給家給則賦不減而人不貧矣吏道愈濫者吏不精也臣竊見吏部課最者遺其實以資歷為優試材者失其本以書判為上加以檢驗滋章牘繁揉瞶眊淹滯吏緣為姦事壅於上權移於下胥徒末品得擅官府所以財賄公行不殊市道量職求直價若平準然古則為官擇人今則為財擇官反古害今其弊如是又有通經之目試文之科不同歸於吏部選之至於此雖廉察日增固不及也若剗革前弊明詔固當疾行創立新規微臣以為不可且烈祖之憲章未改前王之法度粲然德輶如毛在克已而已何必改作然後成功因人之欲順天之時則易從行古之道得理之中則有據制策曰自頃陰陽舛候祲沴洊興仍歲旱蝗稼穡不稔上天作孽必有由然屢為凶災其咎安在傳曰時之不乂厥罰恆暘又曰堯湯水旱歲之常也二者相反其誰云從人靡蓋藏國無廩積朕屢延卿士詢訪謀猷至乃減冗食之徒罷不急之務既聞嘉話亦已遵行而停廢之餘所費猶廣欲轉輸於江徼則遠不及期將搜粟於關中則擾而無獲節軍食則功臣懷怨省吏員則多士靡歸中心浩然罔知攸濟臣聞旱蝗者稽諸洪範為言不乂之罰也言之不乂令之不信也言者西方金也金失其性為木所傷木東方少陽古云陽騰所以為旱陽既亢極氣又囂蒸是則介蟲為孽螽斯為害臣見比年旱魃為害已甚矣則洪範之徵亦明矣無乃陛下詔令不信乎抑又聞軍旅之後必有凶年其握兵者不本乎仁義貪於殘戮人用愁苦怨氣積下以傷陰陽之和也則國家兵先於河北河北旱蝗隨之次及河南河南旱蝗亦隨之次及關中關中又蝗旱旱既仍歲蝗亦比年無乃陛下用兵者不詳其道也臣謹稽古典參於歷代禳除異術祈禱多門至若貶食省用稼穡圭璧求邪於幻術覬福於釋流土龍矯首於通衢㣥巫分袖而鼓舞此又從人之欲也至若兩漢舊儀三公當免卜式著議宏羊可烹此又一時之事也然俱非救旱之本去災之道則有一郡一邑一宰一牧勤恤人隱精達神明或以身禳或以心禱蝗且出境旱不為災牧宰之微尚或臻此况陛下尊為天子德為聖人神動而天從氣使而時變至誠所感何往不通臣伏見陛下去年八月二日所下德音避正殿而不居損常膳而不御議獄緩死掩骼埋胔詔文始書害氣將究詔書始下和氣自生故不旬朝之間凶渠殲殄兵革偃息甘雨薦降氛災自銷天之監人也明矣速矣然則陛下之德有以動天天且不違况於鬼神乎若堯湯之災陰陽之數此則先儒之言略矣小臣不敢傳疑惟洪範之徵信也謹而言之陛下鑒之可也臣聞堯之水湯之旱而國無捐瘠者蓄積多而備先具也今國家或時不雨一歲不登堯湯比之懸矣人至困竭國為空虛者備之不早頃所以賦斂無極怨讟日盈權須詭求朝令夕具豈不以兵食乎今蒲同勞師既還關輔生人才息不急軍食不煩軍須則搜粟關中重擾未可轉輸江徼雖遠可期關兵食以廩儲雖節食猶慮費用者多則功臣何因而懷怨擇賢才以實官雖省員猶慮曠職者衆則多士何憂而靡歸臣聞方內之理亂由君上之所執上有所執則下有所守臣竊觀國理似或不然無可久之圖無常備之制用無本末舉無條綱任運而行應急而化若虛舟之觸用濟江河如亂絲之棼望成綸綍所以遇運則福至遇厄則禍生遇歲惡則勞遇歲豐則逸坐迎天命不關人謀聖心浩然罔知攸濟者乃彞倫不敘之故制策曰子大夫蘊蓄才器通明古今副我虛求森然就列匡朕之寡昧拯時之艱災畢志直書無有所隱此乃陛下厚禮衆君子之意微臣曷足以當之若臣者生為唐人馬牛之齒甫以壯矣道不得行身不得遂陋矣賤矣與螻蟻何異然詩書天人之際皇王經緯之道三墳六經九流百氏前人沿革之要歷代興亡所由既嘗經之於心頗亦備之於學雖未之究可略而言至若時政之損益任賢之得失刑辟之有輕有重生人之或利或病臣又耳或有所妄聞身遠與寡莫為之先且無因至陛下言之爾皇天后土宗廟社稷實宜知臣之心每用憤發悃歀隱憂愊臆激於肝血藏於骨髓思有以一陳之久矣蒙陛下開天地之德降雷雨之施深詔執事旁延郡國俾有賢良方正直言極諫之舉臣也幸苟有志人乃舉之此亦上天降祐皇唐使陛下錫臣此便得有路索言之於上也若賢與良則臣豈敢惟諫與直或有可觀言不直諫不極是微臣不忠之罪孤陛下虛聽之德也至如忌諱挾誅誹謗附律脯醢淫戮鼎鑊濫刑此乃昏主暴君亡國之具亦陛下之所明知故臣不復有虞於聖朝耳是故竭慮極愚指陳其切是耶納而行之非也容而宥之所謂言之無罪聞之者足以戒也謹對將欲觀德式崇講義所以大射有諸侯之禮五善標六義之首惟庚是時謬疑其盛禮疾徐得中應采蘩之節揖讓而進忝大夫之耦既而心平體正儀備樂和雖不爭而為仁亦發彼而有的且尊卑異等在法典而則然德義同歸豈班列而為間庚為稽古或乃謏聞某偶忝名宦皆因善誘自居班列終日塵屑却思昔歲臨清澗蔭長松接侍座下獲聞微言未知何時復遂此事遙瞻水中月嶺上雲但馳攀想而已和尚薄於滋味深於酒德所食僅同嬰兒所飲或如少壯常恐尊體有所不安中夜思之實懷憂戀執中京兆人河南縣令歷泉州刺史憬彼員嶠兮阻夫窮海厥貢冰紈兮備諸渥彩産非中夏故致用之所資來自殊方表懷人之斯在然則蠶雖土育紈實人力稟鱗角以成質則或屈或伸因冰雪以爽容而匪雕匪飾作九服之上貢應五方之正色雖寒暑鱗次必藉至陰之時而風土所宜則異中和之域既生既育是準是則諒因時之所致實希代之莫識所美夫得之斯難所貴夫遠而能即亦由我后洪化浹洽淳風遐被方五帝而可六比三王之可四是使貢獻遠物德格異類爰發迹於僻界肆涉遐而執贄獻土地之所生攜筐篚之云洎亦既覯止侯其孔臧不灼不濡將火鼠以比義或朱或緑豈橦花之足方既同練雲繚繞而交映又似仙花暐煜而含芳間衮龍以發色集黼黻以成章昔包茅不貢昭周室之壞法今冰紈入獻覩邦家之耿光非夫混一車軌茂育華夷何則不遠其遠獻茲在茲既有勞於跋涉亦多歷於歲時標為貢首雖一時之可不獻於君所知四方之咸熙是則其求匪易其用何珍儻見加於翦拂庶暉光之日新英英白雲合莫為質義則難究覽之不一觀其發雖有類於知機稽其理乃無心而自出蓋元造之潛運而神功之陰步馬時止時行或徐或疾結自元氣生乎㣥山將離兮孰制而合既往兮孰召而還非欲恢宏自覆乎大荒之際焉知酌損不逾於膚寸之間徒見其紆餘上漢繚繞飛天形不常而屢易居靡定而頻遷謂變通之不倦將有至於必然斯乃生有於無假虛為實勢乍分於逐火色暫渝於帶日油油裔裔雖在空而可觀杳杳冥冥考攸往而無必觸石蒼野揚埃白泉不恆厥所有開必先搖揚縈空滅煙光於遠嶠輪囷委地雜波景於遙川氤氤氛氛或聚或分其散也氣其興也雲忽羡溢以洪舒若練之曳乍縈紆而交錯如絲之棼所謂化於無象著於無為匪知咎於進退惟契道而推移夕隨重陰則黯以霮䨴晝混陽景則煥然赫曦歘上騰而蓊蔚俄謺影以參差既有遇而必變則無心兮可知然則陰陽不測天實為之不然者雷何憑而隱隱雨何施而祁祁雖思慮而不假何卷舒以應時儻帝鄉之可陟何自致兮在茲
