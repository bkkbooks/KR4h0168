front:
  text: 全唐文欽定全唐文卷二百二友方高宗朝官吏部郎中
  hash: sha256:ae705b1af48ab135697ad2f018fe3470958e2b7e47462956337b3754a8eea592
  markers:
  - {type: head, offset: 12, content: 王友方, id: KR4h0168_NFKB_202-h1, level: 1}
body:
  text: 負海名區攸稱越府濱河大郡爰指滑臺旁連射的之巖俯帶灑舟之浦戶千人萬實俟廉能露冕褰帷是資寬惠司倉之置水拔薤方取喻於龎參父老之賫物送錢乃報恩於劉寵漢陽服其高義耶溪書以清風取之者不以為貪置之者無聞於詭詭不累物難以損名貪不汝求詎得而罪饋餉之理與此全乖廉察之行殆將謬舉賴秋官審慎宏茲閱實類皆無罪竊謂合宜神德高宗朝官御史臣聞祕教東流因明后而闡化元風西運憑至識以開宗故知宏濟千門義宣於雅道提誘萬品理塞於邪津只可隨聖教以抑揚豈得逐人事而興替沙門者求未來之勝果道士者信有生之自然自然者貴取信真絕其近偽之迹勝果者意存杜漸遠開趣道之心誘濟源雖不同從善終歸一致伏惟皇帝陛下包元建極御一飛貞乘大道以流謙順無為而下濟因心會物教不肅成今乃定道佛之尊卑抑沙門之拜伏拜伏有同常禮未是出俗之因尊卑物我之情豈曰無為之妙陛下道風攸闡釋教載陳每至齋忌皆令祈福一依經教二者何獨乖違陛下者造化之神宗父母者人子之慈稱陛下以至極之重猶停拜敬之儀所生既曰人臣何得曲伸情禮捨尊就愛棄重違輕緣情猶尚不通據教若為行用陛下統天光道順物流形形物尚不許違淨教何宜改作願陛下因天人之志順萬物之心停拜伏之新儀遵尊卑之舊貫庶望金光東曜不雜塵俗之悲紫氣西暉無驚物我之貴即大道不昧而得相於明時福業永貞庶重彰於聖日謹言鼎祚資州人開耀時官祕書省著作郎元氣絪縕三才成象神功浹洽八索成形在天則日月運行潤之以風雨在地則山澤通氣鼓之以雷霆至若近取諸身四支百體合其度遠取諸物森羅萬象備其工陰陽不測之謂神一陰一陽之謂道範圍天地而不過曲成萬物而不遺仁者見之以為仁知者見之以為知百姓日用而不知君子之道鮮矣斯乃顯諸仁而藏諸用神無方而易無體巍巍蕩蕩難可名焉逮乎天尊地卑君臣位列五運相繼父子道彰震巽索而男女分咸恒設而夫婦睦人倫之義既闡家國之教鬱興故繫辭云古者庖犧氏王天下也始畫八卦以通神明之德以類萬物之情作結繩而為网以佃以漁蓋取諸離庖犧氏沒神農氏作斵木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之人聚天下之貨交易而退蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使人不倦神其化使人宜之刳木為舟剡木為檝舟檝之利以濟不通蓋取諸渙服牛乘馬引重致遠蓋取諸隨古者穴居而野處後代聖人易之以宮室蓋取諸大壯弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌上古結繩為政後代易之書契百官以理萬人以察蓋取諸夬故聖人見天下之賾而擬諸形容象其物宜而觀其會通以行其典禮觸類而長之六十四卦三百八十四爻天下之能事畢矣其旨遠其辭文其言曲而中其事肆而隱若夫雜物撰德辯是與非終日乾乾夕惕若厲無有師保如臨父母自天祐之吉無不利者也至於損以遠害說以先之定其交而後求安其身而後動履和而致謙尊而光能說諸心能研諸慮是故君子居則觀其象而玩其辭動則觀其變而玩其占蓍之德圓而神卦之德方以智探賾索隱鉤深致遠定天下之吉凶成天下之亹亹莫善乎蓍龜神以知來智以藏往將有為也問之以言其受命也應之如響無有遠邇幽深遂知來物故能窮理盡性利用安身聖人以此洗心退藏於密自然虛室生白吉祥至止坐忘遺照精義入神口僻焉不能言心困焉不能知微妙元通深不可識易有聖人之道四焉斯之謂矣原夫權輿三教鈐鍵九流實開國承家修身之正術也自卜商入室親授微言傳注百家帛丿糸歷千古雖競有穿鑿猶未測淵深唯王鄭相沿頗行于代鄭則多參天象王乃全釋人事且易之為道豈偏滯於天人者哉致使後學之徒紛然淆亂各修局見莫辨源流天象遠而難尋人事近而易習則折揚皇荂嗑然而笑方以類聚其在茲乎臣少慕元風遊心墳籍歷觀炎漢迄今巨唐采㣥賢之遺言議三聖之幽賾集虞翻荀爽三十餘家刊輔嗣之野文補康成之逸象各列名義共契元宗先儒有所未詳然後輒加添削每至章句僉例發揮俾童蒙之流一覽而悟達觀之士得意忘言當仁既不讓於師論道豈慚於前哲至如卦爻彖象理涉重元經注文言書之不盡別撰索隱錯綜根萌義音兩存詳之明矣其王氏略例得失相參采葑采菲無以下體仍附經末式廣未聞凡成一十八卷以貽同好冀將來君子無所疑焉祕書省著作郎臣李鼎祚序虔禮字過庭富陽人高宗朝官率府錄事參軍夫自古之善書者漢魏有鍾張之絕晉末稱二王之妙王羲之云頃尋諸名書鍾張信為絕倫其餘不足觀可謂鍾張云沒而羲敬繼之又云吾書比之鍾張鍾當抗行或謂過之張草猶當雁行然張精熟池水盡墨假令寡人耽之若此未必謝之此乃推張邁鍾之意也攷其專亶雖未果於前規摭以兼通故無慚於即事評者云彼之四賢古今特絕而今不逮古古質而今妍夫質以代興妍因俗易雖書契之作適以記言而淳醨一遷質文三變馳騖沿革物理常然貴能古不乖時今不同弊所謂文質彬彬然後君子何必易雕宮於穴處反玉輅於椎輪者乎又云子敬之不及逸少猶逸少之不及鍾張意者以為評得其綱紀而未詳其始卒也且元常專工於隸書百英尤精於草體彼之二美而逸少兼之擬草則餘真比真則長草雖專工少劣而博涉多優總其終始匪無乖互謝安素善尺櫝而輕子敬之書子敬嘗作佳書與之謂必存錄安輒題後答之甚以為恨安嘗問敬卿書何如右軍答云故當勝安云物論殊不爾子敬又答時人那得知敬雖權以此辭折安所鑒自稱勝父不亦過乎且立身揚名事資尊顯勝母之里曾參不入以子敬之豪翰紹右軍之筆札雖復粗傳楷則實恐未克箕裘况乃假託神仙恥崇家範以斯成學孰愈面牆後羲之往都臨行題壁子敬密拭除之輒書易其處私為不惡羲之還見乃歎曰吾去時真大醉也敬乃內慚是知逸少之比鍾張則專博斯別子敬之不及逸少無或疑焉余志學之年留心翰墨味鍾張之餘烈挹羲獻之前規極慮專精時逾二紀有乖入木之術無間臨池之志觀夫懸針垂露之異奔雷墜石之奇鴻飛獸駭之資鸞舞蛇驚之態絕岸頹峯之勢臨危據槁之形或重若崩雲或輕如蟬翼導之則泉注頓之則山安纎纎乎似初月之出天涯落落乎猶衆星之列河漢同自然之妙有非力運之能成信可謂志巧兼優心手雙暢翰不虛動下必有由一畫之間變起伏於鋒杪一點之內殊衂挫於毫芒况云積其點畫乃成其字曾不傍窺尺櫝俯習寸陰引班超以為辭援項籍而自滿任筆為體聚墨成形心昏擬效之方手迷揮運之理求其妍妙不亦謬哉然君子立身務修其本揚雄謂詩賦小道壯夫不為况復溺思豪釐淪精翰墨者也夫潛神對奕猶標坐隱之名樂志垂綸尚體行藏之趣詎若功定一作宣禮樂妙擬神仙猶埏埴之罔窮與工鑪而並運好異尚奇之士翫體勢之多方窮微測妙之夫得推移之奧賾著述者假其糟粕藻鑒者挹其菁華固義理之會歸信賢達之兼善者矣存精寓賞豈徒然與而東晉士人互相陶染至於王謝之族郗庾之倫縱不盡其神奇咸亦挹其風味去之滋永斯道逾微方復聞疑稱疑得末行末古今阻絕無所質問設有所會緘祕巳深遂令學者茫然莫知領要徒見成功之美不悟所致之由或乃就分布於累年向規矩而猶遠圖真不悟習草將迷假令薄解草書麤傳隸法則好溺偏固自闕通規詎知心手會歸若同源而異派轉用之術猶共樹而分條者乎加以趨事適時行書為要題勒方富真乃居先草不兼真殆於專謹真不通草殊非翰札真以點畫為形質使轉為情性草以點畫為情性使轉為形質草乖使轉不能成字真虧點畫猶可記文迴互雖殊大體相涉故亦傍通二篆俯貫八分包括篇章涵泳飛白若豪釐不察則胡越殊風者焉至如鍾繇隸奇張芝草聖此乃專精一體以致絕倫伯英不真而點畫狼籍元常不草而使轉縱橫自茲巳降不能兼善者有所不逮非專精也雖篆隸草章工用多變濟成厥美各有攸宜篆尚婉而通隸欲精而密草貴流而暢章務險而便然後凜之以風神溫之以妍潤鼓之以枯勁和之以閑雅故可達其情性形其哀樂驗燥濕之殊節千古依然體老壯之異時百齡俄頃嗟乎不入其門詎窺其奧者也又一時而書有乖有合合則流媚乖則彫疎略言其由各有其五神怡務間一合也感惠徇知二合也時和氣潤三合也紙墨相發四合也偶然欲書五合也心遽體留一乖也意違勢屈二乖也風燥日炎三乖也紙墨不稱四乖也情怠手闌五乖也乖合之際優劣互差得時不如得器得器不如得志若五乖同萃思遏手蒙五合交臻神融筆暢暢無不適蒙無所從當仁者得意忘言罕陳其要企學者希風叙妙雖述猶疎徒立其工未敷厥旨不揆庸昧輒效所明庶欲宏既往之風規導將來之器識除繁去濫覩迹明心者焉代有筆陣圖七行中畫執筆三手圖貌乖舛點畫湮訛頃見南北流傳疑是右軍所製雖則未詳真偽尚可發啟童蒙既常俗所存不藉編錄至於諸家勢評多涉浮華莫不外狀其形內迷其理今之所撰亦無取焉若乃師宜官之高名徒彰史牒邯鄲淳之令範空著縑緗暨乎崔杜以來蕭羊以往代祀帛丿糸遠名氏滋繁或藉甚不渝人兦業顯或憑附增價身謝道衰加以糜蠧不傳穴八夕祕將盡偶逢緘賞時亦罕窺優劣紛紜殆難覼縷其有顯聞當代遺跡見存無俟抑揚自標先後且六爻之作肇自軒轅八體之興始於嬴正其來尚矣厥用斯宏但今古不同妍質懸隔既非所習又亦略諸復有龍蛇雲露之流龜鶴花英之類乍圖真於率爾或寫瑞於當年巧涉丹青工虧翰墨既異夫楷式非所詳焉代傳羲之與子敬筆勢論十章文鄙理疎意乖言拙詳其旨趣殊非右軍且右軍位重才高調清詞雅聲塵未泯翰櫝仍存觀夫致一書陳一事造次之際稽古斯在豈有貽謀令嗣道叶義方章則頓虧一至於此又云與張伯英同學斯乃更彰虛誕若指漢末伯英時代今不相接必有晉人同號史傳何其寂寥非訓非經宜從棄擲夫心之所達不易盡於名言言之所通尚難形於紙墨粗可髣髴其狀綱紀其辭冀酌希夷取會佳境闕而未逮請俟將來今撰執使轉用之由以祛未悟執謂深淺長短之類是也使謂縱橫牽掣之類是也轉謂鉤鐶盤紆之類是也用謂點畫向背之類是也方復會其數法歸於一途編列衆工錯綜㣥妙舉前人之未及啟後學於成規窺其根源析其枝派貴使文約理贍迹顯心通披卷可明下筆無滯詭辭異說非所詳焉然今之所陳務裨學者但右軍之書代多稱習良可據為宗匠取立指歸豈惟會古通今亦乃情深調合至使摹榻日廣研習歲滋先後著名多從散落歷代孤紹非其效歟試言其由略陳數意止如樂毅論黃庭經東方朔畫讚太師箴蘭亭集序告誓文斯並代俗所傳真行絕致者也寫樂毅則情多怫鬱書畫讚則意涉環奇黃庭經則怡懌虛無太師箴又縱橫爭折暨乎蘭亭興集思逸神超私門感誓情拘意慘所謂涉樂方笑言哀巳歎豈惟駐想流波將貽嘽口爰之奏馳神睢渙方思藻繪之文雖其目擊道存尚或心迷義舛莫不強名為體共習分區豈知情動形言取會風騷之意陽舒陰慘本乎天地之心既失其情理乖其實原夫所致安有體哉夫運用之方雖由巳出規模所設信屬目前差之一豪失之千里苟知其術適可兼通心不厭精手不忌熟若運用盡於精熟規矩闇於胷襟自然容與徘徊意先筆後瀟灑流落翰逸神飛亦猶宏羊之心預乎無際庖丁之目不見全牛嘗有好事就吾求習吾乃粗舉綱要隨而授之無不心悟手從言忘意得縱未窮於衆術斷可極於所治矣若思通楷則少不如老學成規矩老不如少思則老而逾妙學乃少而可勉勉之不巳抑有三時時然一變極其分矣至如初學分布但求平正既知平正務追險絕既能險絕復歸平正初謂未及中則過之後乃通會通會之際人書俱老仲尼云五十知命而七十從心故以達夷險之情體權變之道亦猶謀而後動動不失宜時然後言言必中理矣是以右軍之書末年多妙當緣思慮通審志氣和平不激不厲而風規自遠子敬巳下莫不鼓努為力標置成體豈獨工用不侔亦乃神情懸隔者也或有鄙其所作或乃矜其所運自矜者將窮性域絕於誘進之途自鄙者尚屈情涯必有可通之理嗟乎蓋有學而不能未有不學而能者也考之即事斷可明焉然消息多方性情不一乍剛柔以合體忽勞逸以分驅或恬憺雍容內涵筋骨或折挫槎枿外曜鋒芒察之者尚精擬之者貴似况擬不能似察不能精分布猶疎形骸未檢濯泉之態未覩其妍窺井之談巳聞其醜縱欲唐突羲獻誣罔鍾張安能掩當年之目杜將來之口慕習之輩尤宜慎諸至有未悟淹留偏追勁疾不能迅速翻效遲重夫勁速者超逸之機遲留者賞會之致將反其速行臻會美之方專溺於遲終爽絕倫之妙能速不速所謂淹留因遲就遲詎名賞會非夫心閑手敏難以兼通者焉假令衆妙攸歸務存骨氣骨既存矣而遒潤加之亦猶枝幹扶疎淩霜雪而彌勁花葉鮮茂與雲日而相暉如其骨力偏多遒麗蓋少則若枯槎架險巨石當路雖妍媚云闕而體質存焉若遒麗居優骨氣稍劣譬夫芳林落蘂空照灼而無依蘭沼漂蓱徒青翠而奚託是知偏工易就盡善難求雖學宗一家而變成多體莫不隨其性欲便以為姿質直者則俓侹不遒剛佷者又崛強無潤矜斂者弊於拘束脫易者失於規矩溫柔者傷於輭緩躁勇者過於剽迫狐疑者溺於滯澀遲重者終於蹇鈍輕瑣者染於俗吏斯皆獨行之士偏翫所乖易曰觀乎天文以察時變觀乎人文以化成天下况書之為妙近取諸身假令運用未周尚虧工於祕奧而波瀾之際巳濬發於靈臺必能傍通點畫之情博究始終之理鎔鑄蟲篆陶鈞草隸體五材之並用儀形不極象八音之迭起感會無方至若數畫並施其形各異衆點齊列為體互乖一點成一字之規一字乃終篇之准違而不犯和而不同留不常遲遣不恒疾帶燥方潤將濃遂枯泯規矩於方圓遁鉤繩之曲直乍顯乍晦若行若藏窮變態於豪端合情調於紙上無間心手忘懷楷則自可背羲獻而無失違鍾張而尚工譬夫絳樹青琴殊姿共豔隋珠和璧異質同妍何必刻鶴圖龍竟慚真體得魚獲兔猶恡筌蹏同夫家有南威之容乃可論於淑媛有龍泉之利然後議於斷割語過其分實累樞機吾嘗盡思作書謂為甚合時稱識者輒以引示其中巧麗曾不留目或有誤失翻被嗟賞既昧所見尤喻所聞或以年識自高輕至陵誚余乃假之以緗縹題之以古目則賢者改觀愚者繼聲競賞豪末之奇罕議鋒端之失猶惠侯之好偽似葉公之懼真是知伯子之息流波蓋有由矣夫蔡邕不謬賞孫陽不妄顧者以其元鑒精通故不滯於耳目也向使奇音在爨庸聽驚其妙響逸足伏櫪凡識知其絕㣥則伯喈不足稱良樂未可尚也至若老姥遇題扇初怨而後請門生護書几父削而子懊知與不知也夫士屈於不知巳而申於知巳彼不知也曷足怪乎故莊子曰朝菌不知晦朔蟪蛄不知春秋老子云下士聞道大笑之不笑之則不足以為道也豈可執冰而咎夏蟲哉自漢魏以來論書者多矣妍蚩雜糅條目糾紛或重述舊章了不殊於既往或苟興新說竟無益於將來徒使繁者彌繁闕者仍闕今撰為六篇分成兩卷第其工用名曰書譜庶使一家後進奉以規模四海知音或存觀省緘祕之旨余無取焉博高宗時人馮君諱慶字貞菘冀州下博縣人也其源出自長樂郡北燕文成帝跋之苗裔曾祖于齊威檀二州刺史祖長隨平州盧龍縣令父才唐初深州錄事參軍惟君日景凝祥雲光委曜望隆燕國久標奇士之名家枕叢臺夙叶將軍之氣飛聲下邑竊布鴻漸之由矯輸上蕃無失惟蟲之用乃授文林郎屬桂枝秋落俄鍾犯月之妖薤草晨晞方嬰墜露之慘唐咸亨四年五月終於莊第嗚呼哀哉時權殯於下博野北三十里祖父塋內大周久視元年歲在庚子十月二十日改葬於冀州城西與夫人馮氏合葬於平原禮也其銘曰青烏卜塋元鶴孕兆南北神壇東西靈沼揚貞高於玉山播芳猷於筆杪七禺高宗時人臣言臣聞佛化所資在物斯賁良由拔沈冥於六道濟蒙識於三乘其德既宏其功亦大所以佛為法主幽顯之所歸依法為良藥煩惑由之清蕩僧為佛種宏演被於來際遂使歷代英主重道德而護持清信賢明度子女而承繼固得僧尼遍於區宇垂範導於無窮伏惟陛下慈濟九有開暢一乘愛敬之道克隆成務之途逾遠近奉明詔令僧跪拜父母斯則崇揚孝始布範敬源但佛有成教出家不拜其親欲使道俗殊津歸戒以之投附出處兩異真俗由之致乖莫非心受佛戒形具佛儀法網懸殊敬相全別且自高尚之風人主猶存抗禮豈惟臣下返受跪拜之儀俯仰撫循無由啟處意願國無兩敬大開方外之迹僧奉內教便得立身行道不任私懷之至謹奉表以聞塵黷威嚴伏增戰越謹言
