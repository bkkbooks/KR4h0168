front:
  text: 全唐文欽定全唐文卷十四高宗四
  hash: sha256:a777cdfe25f9050de6d821b74f2149f48ad92e4b958187eeccb7aa22af455f08
body:
  text: 朕聞上元幽贊處崇高而不言皇王提象代神功而理物是知五精降德爰應帝者之尊九室垂文用紀配天之業且合宮靈符創宏規於上代太室總章標茂範於中葉雖質文殊制奢儉異時然其立天中作人極布政施教歸之一揆朕嗣膺下武丕承上烈思所以答眷上靈聿遵孝享而法宮曠禮明堂寢構今國家四表無虞人和歲稔作範垂訓今也其時宜令所司與禮官學士等考核故事詳議得失務依典禮造立明堂庶曠代闕文獲申於茲日因心展敬永垂於後昆其明堂制度令諸曹尚書及左右丞侍郎太常國子監祕書官宏文館學士同共詳議顏師古業綜書林譽高詞苑討論經史多所匡正前件書發明故事諒為博洽宜令所司録一本付祕書閣仍賜其子符璽郎揚庭絹五十匹道教清虛釋典微妙庶物藉其津梁三界之所遵仰比為法末人澆多違制律且權依俗法以伸懲戒冀在止惡勸善非是以人輕法但出家人等俱有條制更別推科恐為勞擾前令道士女道士僧尼有犯依俗法者宜停必有違犯宜依條制大慈恩寺僧元奘所翻經論既新翻譯文義須精宜令太子太傅尚書左僕射燕國公于志寧中書令兼檢校吏部尚書南陽縣開國男來濟禮部尚書高陽縣開國男許敬宗守黃門侍郎兼檢校太子左庶子汾陰縣開國男薛元超守中書侍郎兼檢校右庶子廣平縣開國男李義府中書侍郎杜正倫等時為看閲有不穩便處即隨事潤色若須學士任量遣三兩人金山大陳凶黨實繁卿身先士卒奮不顧命左衝右擊所向無前諸軍賈勇致斯克寸捷宜善建功業全此令名也敕旨君親之義在三之訓為重愛敬之道凡百之行攸先然釋老二門雖理絶常境恭孝之躅事叶儒津遂於尊極之地不行拜跪之禮因循日久迄乎茲辰宋朝暫革此風少選還遵舊貫朕稟天經以揚孝資地義而宣禮獎以名教被茲真俗而瀨鄉之基克成天構連河之化付以國王裁制之由諒歸斯矣今欲令道士女冠僧尼於君皇后及皇太子其父母所致拜或恐爽其恆情宜付有司詳議奏聞平壤軍回一城不可獨固宜就拔新羅共其屯守若金法敏藉卿等留鎮宜且停彼若其不須即宜泛海還也朕雖居九重之內常以萬姓為心而誠不動天遂使陰陽錯謬自從去歲關中旱儉禾稼不收多有乏絶百姓不足責在朕躬每自思此深以為愧今雒口倉廩且復充實更為轉運於是艱辛理有便宜所以行也故召卿等為宴別耳百官家口咸預士流至於衢路之間豈可全無障蔽婦人比來多著帷帽遂棄羃㒿曾不乘車別坐簷子遞相倣效浸成風俗過為輕率深失禮容前者巳令漸改如聞猶未止息又命婦朝謁或將馳駕車既入禁門有虧肅敬此並乖於儀式理須禁斷自今巳後勿使更然王者統天理物莫不先安百姓百姓安者止在庶僚朕所以每精嶽牧及諸州上佐自非至誠清白景行循良者不輒畀此職庶其各申智效以裨政道秦懷恪法司抵罪但合處流朕以刑政之典須越常憲豈不知哀敬折獄情恤哀矜但以殺止惡義在懲肅又以刑人於市與衆棄之故對公等加其顯戮但法者國之權衡時之準繩也權衡所以定輕重準繩所以定曲直也罪惡難容者雖小必刑情狀可原者雖大必宥此乃彞典非故濫誅公等諸人當識朕意足為殷鑒各宜勉之皇太子賢自頃監國留心政要撫字之風既盡於哀矜刑網所施務存於審察加以聽覽餘暇專精墳典往聖遺編咸窺壺奧先王策府備討菁華好善載彰作貞斯在國家之寄深副所懷可賜物五百段朕君臨宇宙司牧黎元普天之下罔不率服蕞爾吐蕃僻居遐裔吐渾是其鄰國遂乃奪其土宇往者暫遣偏裨欲復渾王故地義存拯救事匪稱兵輒肆昏迷潛相掩襲既無備預頗喪師徒因此鴟張每思狼顧除凶伐叛王者所急前歲將發六軍問其罪戾復以小寇無勞大舉按甲息兵庶其改過不思惠愛更起回邪敢縱狂惑專為寇盜或改團鎮戍或驅抄羊馬烽燧頻舉煙塵不息隙乘間倏來忽往比止令鎮遏未能即事翦除莫懷寬大之恩遂長包藏之計禍盈惡稔當自覆滅今欲分命將帥窮其巢穴克寸清荒服必寄英奇但秦雍之部俗稱徑勇汾晉之壤人擅驍雄宜令關內河東諸州廣求猛士在京者令中書門下於廟堂選試外州委使人與州縣相知揀練有膂力雄果弓馬灼然者咸宜甄採即以猛士為名惟周公制禮當歷代不刊況子夏為傳乃孔門所受格條之內有父在為母齊縗三年此有為而為非尊嚴之義與其改作不如師古諸服紀宜一依喪服文維永徽七年歲次景辰正月景寅朔六日辛未於戲夫明兩載象道貫三才元良表德業隆千古是以夏啓作二光闡高猷姬誦升儲發揮王道詳求典册式瞻七鬯固本垂統允歸正緒惟爾代王宏猗蘭育祉喬桂凝華岐嶷表於天姿符瑞彰於神授器業英遠風鑒昭朗踐嘉義而總深仁捨幼志而標成德爰資玉裕早振金聲朕虔奉靈圖肅膺丕業仰惟七廟之重思隆萬葉之慶疇咨列辟欽若前修是用命爾為皇太子往欽哉爾其祗奉憲章率由軌度盡謙恭於齒胄審方俗於迎郊春禮冬詩趨庭匪懈三善六德勗志無愆絶驕奢之心納忠良之訓播徽猷於外宇申敬奉於中闈允睦周親務殷堯族永隆四術式寧萬類無怠無荒固保我宗基可不慎歟維顯慶元年歲次景辰十二月辛卯朔八日戊戌皇帝若曰夫安邊訓俗有國之先猷賢任能為政之常典惟爾蘭州都督安陸縣開國公張允恭器宇詳正識用邁遠夙著勤誠早延恩遇今方違敻羌戎荐居降節監撫綏懷攸屬是用命爾為使持節都督鄯蘭河儒廓淳等州諸軍事鄯州刺史封如故爾其鎮靜幽荒式清姦宄憺威稜以肅遠明賞罰以垂信乃無怠庶政率由舊章光膺寵命可不慎歟維顯慶元年歲次景辰十二月辛卯朔二十九日己未皇帝若曰於戲先王創業垂統分玉展親所以作固鴻業克隆景祚惟爾并州都督兼同州刺史上柱國許王孝性履明裕神志清遠資孝敬以立身體溫恭以成性舊許是宅藩屏之寄以深全晉剖符維城之任愈切秦隴形要跨躡羌戎撫寧夷夏親賢攸屬是用命爾為使持節都護秦成武渭四州諸軍事秦州都督勳官封如故爾其祗承典訓審慎刑獄懷遠以德招攜以禮無邇宵人無怠庶政對揚休命可不慎歟維顯慶二年歲次丁巳正月庚申朔二十一日庚辰皇帝若曰於戲夫姬周創制任隆方伯炎漢垂範寄重維城所以任固邦基以藩王室惟爾右衛大將軍使持節鄜州諸軍事鄜州刺史趙王福識度夷雅器業沈秀建鳥旟以作牧錫虹圭以命祚蘭錡上將既屬宗英海岱剖符允鍾懿戚是用命爾為使持節青州刺史其大將軍及封並如故爾其愛人理物慎獄恤刑率由王道以康庶績祗服寵命可不慎歟維顯慶二年歲次丁巳十月丁亥朔十九日乙巳皇帝若曰昔虞舜分司元凱膺機揆之任當塗受命崔盧處銓綜之重故能翊宣景化協贊時雍惟爾度支尚書唐臨器識沈敏操履貞潔譽滿周行效彰官次益損機務爰著循聲藻鑑流品是資清識是用命爾為吏部尚書爾其懸衡處物虛心待士求賢審官循名責實祗承朝寵可不慎歟維顯慶三年歲次戊午正月甲申朔二十八日辛亥皇帝若曰於戲自九州命職百部分官闕懿德以宣風固親支而總務歷觀前載罔踰斯道壽州刺史上柱國鄧王元裕志業純深基宇崇隩標情文雅之地植操忠賢之軌壽春作牧風教有成襄陽按部仁明允屬是用命爾為使持節襄州諸軍事襄州刺史王及勳官如故往欽哉其勉思政本式康氓俗沔漢舊邦控帶為重變其輕剽之黨旌其冠冕之望孤惸者咸恤正直者必親威惠並宣刑禮兼闡光膺典册可不慎歟維顯慶三年歲次戊午正月甲申朔二十九日壬子皇帝若曰於戲永固鴻基義屬於藩衛載孚王化職隆於制舉歷選前修茲道無替豫州刺史上柱國虢王鳳襟神秀發理識淹遠夙標懿範早茂清徽寬恕以表其情恭遜以成其美荊河之地巳洽於仁聲梁宋之郊佇聞於善政是用命王為使持節宋州諸軍事宋州刺史王及勳官並如故往欽哉其克膺顯命式遵彞典崇孝義以訓下踐忠貞而奉上布廉平之化垂惠愛之風居敬而行恤隱而求瘼惟良丕寄可不慎歟維顯慶三年歲次戊午正月甲申朔三十日癸丑皇帝若曰於戲柝壤分圭寄隆於宗子罷侯置守任切於惟良自古明王率由茲典左衛大將軍徐州刺史上柱國紀王慎稟慶璇源分華紫極崇詩書而軌物敦教義而明道入典鉤陳恭肅表於清禁出膺刺舉寬洽於名藩高平形勝太行重阻地邇王畿親賢是屬是用命王為使持節澤州諸軍事澤州刺史王及大將軍勳官如故朕聞之諸侯之孝在上不驕善人為邦期月而可往欽哉其祗膺顯命率循典禮慎刑罰而教學校尊五美而屏四惡造次於仁夙夜無怠勉追風於往哲以垂裕於後昆可不慎歟維顯慶三年歲次戊午七月辛巳朔十九日己亥皇帝若曰於戲夫成俗康邦寄深於嶽牧宣風闡化任重於循良惟爾銀青光祿大夫行洛州長史段寶元體量凝整理懷貞贍總務仙臺能官著於綱紀分司棘署令德表於平反三川之野允敷聲績九江之地爰資鎮撫是用命爾為使持節都督越台括婺泉建六州諸軍事越州刺史爾其勤加恤隱勉思為政審之以刑獄馭之以公平革剽悍之風歸淳質之軌欽茲寵命可不慎歟維顯慶三年歲次戊午十月庚辰朔十一日庚寅皇帝若曰於戲夫恤隱求瘼義裕於循良撫衆懷邊允資於才幹惟爾正議大夫守涼州都督駙馬都尉喬師望風情敏濟志略明遠夙承榮寵早預驅馳仗節秋方功勤克展分符朔野政科伊肅玉門遠控金城遐阻人兼北狄地雜西戎刺舉為難式遏斯重是用命爾為使持節八州諸軍事涼州刺史駙馬都尉如故往欽哉祗膺典册勉修爾令德思效爾忠規垂清白之風布廣平之化絶姦宄於亭障徵訟獄於閭里嗣其和氣之美革彼貪頑之化光我王度可不慎歟維顯慶四年歲次己未三月戊寅朔十七日甲午皇帝若曰職管納官任參機事上非德而不受下非才而不處咨爾將作大匠上護軍閻立本識局周敏理懷通悟體忠勤而表性資仁恕以立身而思協多能藝兼衆美委質運始策名朝列智效先於課職聲猷布於律紀爰緝水土之官實諧搢紳之論是用命爾為兼工部尚書勳官如故往欽哉其敬承休命獻善之規攸屬持平之務斯在闕恭惟允可不慎歟維顯慶四年歲次己未三月戊寅朔二十五日壬寅皇帝若曰於戲弼諧儲副必俟才英總務宮端允資忠量故漢朝選德受禮峻於竇卿晉代光闕升崇歸於謝闕咨爾金紫光祿大夫懷州刺史上原縣開國侯李寬識局沈謹理懷詳正勤誠表於內外智效張於文武聲猷載闡齒秩兼優博望斷裁之規與能僉屬承華彈肅之寄任賢在斯是用命爾為太子詹事封如故往欽哉其祗膺茂典勉修乃職景前哲之高縱垂後昆之令譽對揚休寵可不慎歟維顯慶四年歲次己未七月景子朔四日己卯皇帝若曰於戲昔堯分四嶽漢總六條所以光闡帝猷式調萌俗者也爰自近古尤為重任襟帶之地非親不居形勝之藩惟賢是處咨爾益州都督上柱國王上金岐嶷幼彰英徽早茂仁慈表性愛敬因心磐石之固攸歸分符之寄斯在是用命爾為使持節鄜州諸軍事鄜州刺史餘如故夫道德齊禮為政之良規踐義基忠立身之要道必恭謙而下士無驕矜以傲法勉務農之闕勤恤隱之方往欽哉其祗朕命緝諧令績可不慎哉維顯慶四年歲次己未九月乙亥朔二十九日癸卯皇帝若曰於戲漢川紀闕梁山表鎮南通庸蜀北達褒斜地實要衝人資剛鋭式遏之寄親賢攸屬惟爾上柱國曹王明志業沖遠襟神爽濟仁惠之風彌著慈和之美日聞析壤分圭既隆於藩屏褰帷按部允期於政績是用命爾為使持節都督梁洋璧集等四州諸軍事梁州刺史王及勳官並如故往欽哉恤隱之任昔人尤重班條之職往哲稱難宜盡公平之心用崇寬恕之道聿遵前典勉修厥德惟良是屬可不慎歟維顯慶四年歲次己未九月乙亥朔二十九日癸卯皇帝若曰於戲經邦之術寄宗子而維城御下之方資懿親而調俗緬尋遐載率修斯道咨爾上柱國郇王素節端嶷幼彰清徽早茂夙聞詩禮之訓式光車服之寵邑連鍾武壤接平春合九州之遙塗控三門之險路形勝之地馬牧所在是用命爾為使持節申州諸軍事申州刺史王及勳官並如故往欽哉夫政化之要禮義為先臣子之規忠孝為本爾其慎修刺舉祗服炯戒仰鳴謙以自牧無侈縱而違道荷茲隆委可不慎歟維龍朔元年歲次辛酉十月癸亥朔十七日己卯皇帝若曰於戲夫翦商統歷建侯以崇藩衛纂堯開運分土以光震聞故乃族茂麟趾經國之令圖地利犬牙裁化之明準惟爾雍州牧幽州都督上柱國潞王賢穎擢元樞軸榮紫極姿儀映徹占對淹凝機悟韶敏風徽令雕鎔信義振英挺於觿年苑囿文詞標秀發於髫日藝優楚沛道駕天人繇蟻層臺舞鶴懸鏡湛清襟於篁沼鼓芳譽於蘋風是用命爾為沛王使持節都督揚和滁潤常宣歙等七州諸軍事揚州刺史左武大將軍牧及勳並如故徐方奧壤泗水名區榮耀虞圭賞延漢礪加以作牧淮海式道京畿申大雅而釐風資樂善而揚德必宜靖恭乃位克懋聲猷光被寵重可不祗歟維龍朔二年歲次壬戌五月十五日皇帝使大司成彭陽郡開國侯令狐德棻副使正議大夫行司宰少卿薛敏恭持節册命曰咨夫存著嘉猷歿膺褒顯所以甄明景行昭紀勳烈況地居懿戚業茂惟貞用式暢情之禮實光追寵之義惟爾故金紫光祿大夫原州都督渤海郡王奉慈器範間裕風裁淹遠德優時彥望重宗英析瑞名區早荷推恩之澤分符奧壤纍藉宣條之任清白聞於朝寧威惠暴于氓謳固以功著旗常譽光圖史者矣而仁壽室爽貞徽淹謝永言親懿震悼良深是用贈王為都督荊硤嶽朗四州諸軍事荊州刺史右衛大將軍餘如故魂而不昧嘉茲榮寵嗚呼哀哉閶闔任隆周廬禁切闕忠賢之允著實韜略之兼優惟爾冠軍大將軍左驍衛將軍山陽郡開國公劉伯英志力沈濟襟情爽烈早標奇正之術彌光巡警之功偃沙巨海闕八字功宣六豹氣壓三韓折衝之效有聞爪牙之任攸屬式疇徽烈擢衛宸闈是用命爾為左監門衛大將軍勳封如故往欽哉爾其職思無荒朕命不虞之寄可不慎歟於戲鳳紀龍名茂績光於鉛槧礪金鉤玉嘉庸絢於緹油蓋以協贊帝圖弼成鼎命矧乃望高咸一超庶尹而馳風道鬱半千冠㣥后而宣譽咨爾光祿大夫行右相許敬宗藉敬生德基賢誔秀謀猷經制識度英遠培風逸幹業峻於巨臣滅景宏才器隆於王佐詞源清祕濯色於雕鞶藝苑沖探抽華於繡牒揮汗於丹掖矯豐餌於雞栖翊宏詞於青闈彯長纓於鶴籥訪溫樹之緘對譽宵燭而題明盛烈輝於西豪茂功表於東第寵翠泉之軒聖掩丹雲之漢傑可以作訓元儲聳瑤山之王褱搆喻水善二疑激伊水之長瀾是用命爾為太子太師監修國史等並如故加東臺三品仍知西臺事往欽哉爾其胙土而乘謙牧克己而蹈禮國晨謁金墀事切於忠蹇夜隨銀啓義光於調護靖共朝列可不慎歟維龍朔三年歲次癸亥十二月庚辰朔二十四日癸卯皇帝若曰於戲睦親之訓理鏡於遙圖章戚之規道光於絶簡若乃年耆德懋屬重望隆釋釐綜之勞遂優間之禮惟爾光祿大夫司禮太常伯隴西郡王博乂發慶秩宗疏翹靈派資忠竣業襲義揚風懷匪磷之貞心淩後凋之徑節榮兼中外效宣文武至乃彯組文昌外贊清覽頻致由衷之請纍申降階之謁雖鎮茲雅俗載佇於芳猷而爰靜澆馳重篤於撝尚是用命爾為特進行司宗正卿封如故往欽哉秩亞青槐朝請之恩斯切禮華丹棘序録之任攸歸恩邁前徽齊蹤往哲光膺寵命可不慎歟維麟德元年歲次甲子正月己酉朔二十二日庚午皇帝若曰於戲金楨璿萼分器先於茂親丹帷皂蓋按部盛於良牧藩條之寄載宣河潤之資斯遠固以聲芳偃桂德秀坐堂惟爾涼州都督上柱國曹王明幼範趨庭闕風識韶悟姿儀挺立豪春靈而馳賞絃秋竹而舒襟詞彩星稠對梁珠而混色情源冰徹帶趙璧而交輝韜兩獻而遐驤籠二武而孤峙是用命爾為使持節虢州諸軍事虢州刺史勳封並如故往欽哉爾其履謙居節念損辭豐置醴以挹儒津錫戊以登文囿敬光喬梓貞返修筠率由舊章永保疆宇可不慎歟維總章二年歲次己巳十一月景午朔二十二日丁卯皇帝特使銀青光祿大夫守司戎太常伯上騎都府崔餘慶副使中御大監上柱國靈邱縣開國男万俟肅持節册命曰於戲夫天垂景宿上躔帝子之宮地載兼山下列乾男之域是以聖人之登閎則大哲王之立道開階莫不奠磐石於周親樹良翰於宗懿故黃神命社降若水以疏封蒼精建侯奄中都而錫壤用能克久寶祚式固鴻基茂緒藹乎龍圖盛業光於麟趾惟爾冀州大都督右金吾衛大將軍上柱國冀王輪層漢育靈上枝摛景搖光甫薦允標墜燕之祥玉兔初聞遽叶占熊之兆中和在己仁義為資洽藝通元驗賁駒之入闕潛機應物見巨象之浮舟識茂髫辰神清綺歲趨庭承訓孝敬極於觀喬金殿傳經敏學踰於括羽擅三雍之雅對韞七步之閎才足以道架河書聲芬鄴頌暨龍荒北鎮鵷水東臨侮食之渠稟稜威而革暴鳴弦之俗感惠化以遷訛製杼垂風含唐流詠若乃西河之地實曰奧區就日分郊闕唐虞之舊國均霜闢野總虞夏之餘盟我圖爾居形勝斯在是用命爾為冀王餘官勳如故往欽哉爾其勞謙勉志樂善居心闕丹蕭欠之徽章崇緑車之寵秩受茲中壤用保大藩允迪前修無或僭度維城之寄可不慎歟維總章二年歲次己巳闕月庚寅朔十二日辛丑皇帝若曰於戲昔封唐御極分嶽以鎮寰區宅鎬乘時建侯以隆藩衛用能發輝鼎祚翊贊昌圖制犬牙以廓地基茂麟趾而光天緒懿親啓翰其理則然惟爾使持節澤州諸軍事澤州刺史上柱國紀王慎稟慶星躔分華帝圃器表沖邈軌鑒端凝業蘊圭璋藝包文武振英詞於五際陵桂巘而含芳抗逴議於三雍警蘋風而鼓譽仁孝為立身之本貞恕存應物之方及疏社上東建旟南服化流江漢道被歌謠中壘訓兵自穆銜珠之序長淮平俗式崇露冕之規冠雅政於㣥邦標粹範於賢牧夷儀勝壤地乃邢遷跨全趙之郊畿總常山之襟要維城之寄僉曰爾諧是用命爾為使持節邢州諸軍事邢州刺史上柱國王如故往欽哉爾其光闡六條敷崇四誡考間平之令則酌魯衛之嘉猷無以傲從康無以縱敗禮迪於正典聿遵王度祗歷茂闕可不勗歟維總章二年歲次己巳三月己卯朔十三日辛卯皇帝若曰於戲夫酆京統歷疏青社以建侯炎漢握圖剖丹書而分國固以翦桐作屏實寄於周親剖竹開藩允屬於良牧眷言遐載諒乃通規惟爾使持節虢州諸軍事虢州刺史上柱國曹王明濯秀銀潢摛華璇極端潔成性自叶於遊蘭孝敬為心有踰於訓梓馳精祕象驗封蟻之登辭披翰小山見騰塵之入頌業隆燕館道藹梁闈纍播循風薦敷簡政飛蝗感化不犯漢中之田猛獸懷仁遠避宏農之境若乃荊河奧壤井賦萬家周楚舊郊屬城千里形勝之地非親勿居是用命爾為使持節豫州諸軍事豫州刺史上柱國王如故往欽哉爾其班條述職務盡於勤誠求瘼庇人事歸於平恕祗服炯誡勉修厥德維城之重可不慎歟維總章三年歲次庚午二月甲辰朔九日壬子皇帝若曰於戲夫姬祚斯永分玉瑞以建侯漢歷載融剖銅符而作鎮然則道光宗懿方膺錫社之榮迹著循良實允班條之寄惟爾隰州刺史上柱國趙王福摛祥丹極育慶元樞邁德為資體仁成性趨庭演訓先承喻梓之恩樹屏凝規夙奉栽培之命樂善無倦率禮無愆聳蓋臨藩振英風於桂嶼褰帷按部流惠化於棠陰固以埒美酆郇均聲河楚若乃華陽舊壤山抗西傾導漾名區地分南鄭眷言形勝諒在親賢是用命爾為使持節都督梁璧洋集四州諸軍事梁州刺史上柱國王如故往欽哉爾其靖恭乃位聿遵前典勗貞恪之心務廉平之政茂對休寵可不慎歟維上元二年八月五日天皇若曰於戲咨夫御圖籙者至聖荷提衡之業承宗廟者元良膺受命之期渺尋千古之外縱觀百王之表成功不處高讓之躅惟崇在賢斯授則哲之風逾遠眷彼勳華鼎祚傳於有德洎夫湯武寶歷歸於孟侯揖前載之宏謨成後王之茂範者也炎精失馭巨猾挺突普天陷塗炭之危區宇墜豺狼之毒我高祖神堯皇帝應天御物撥亂反正斬白蛇而定天下誓蒼兕而會諸侯砥綏萬邦乂寧六合太宗文武聖皇帝循機統極出震開階鍊彩石而補乾綱拯橫流而恢地絡遠穆邇肅時清頌平朕式纂昌基欽承睿緒幸憑纍聖之福高居兆人之上靈符叶贊天命允集是以昭報先功鏤玉於升中之觀聿崇嚴配禋圭於布政之宮俗阜歲豐化淳刑措幽明以之郊社夷夏由其乂安馭朽逾兢寢繩多愧嘗以人之所寶者位雖處位以思沖心之所存者道希察道而求逸是以載想褰迎虛襟屣脫凝神不宰宣遊汾水之陽滌厲無為訪道襄城之野咨爾故皇太子宏克岐克嶷有德有行事親以孝愛敬極於寢門奉上以忠恭慎形於馳道孝慈不犯惠以及人載隆三善之規無俟八繁之誡發揮弦誦遜業之道彌光黼藻溫文承祧之望攸重撫軍監國大闡良圖百揆萬幾佇令居攝庶幾乾坤交泰主鬯之業方新日月重光繼照之明斯遠頃炎象戒節屬爾沈疴實美惟痊釋豫重負粵因瘳降告以斯懷爾忠懇特深孝情天至聞言哽咽感絶移時因此彌留奄然長逝伊川可望泣笙駕之無追瑤嶺難逢痛琴風之永絶循今念往震悼良深然事欲必行禮雖崇而闕二字德闕可尚身巳謝而宜尊加以尊名允符心許是用諡爾為孝敬皇帝式昭典册俾夫位光一德叶帝載於將來名參四大播天聲於無極明靈若存享茲寶命嗚呼哀哉維儀鳳二年歲次丁丑二月甲午朔十二日乙巳天皇若曰於戲上圖圓極星躔分帝子之象下奠方輿列野宅天孫之鎮緬徽千古尚想百王法靈臺以啓封俾親賢而作輔是以軒邱御歷爰錫蒼林之祚豳室建侯載疏曲阜之邑用能崇寶統贊昌期盛業茂於本枝鴻基峻於磐石惟爾洛州牧益州大都督兼太子左衛率使持節洮河道行軍元帥蔡州鎮撫上柱國周王顯高禖薦祉甫應瑤筐仙域啓禎載分金榜迪中和之粹質蘊上德之良規風識俊邁機神爽徹純襟洽地義之方悌性睦天倫之重發揮沛易隱括河書多材之美載光樂善之風逾振洎乎遙臨西蜀控玉宇之全邦近牧東周闢銅衢之奧壤少城故地不變歌廉之俗太室餘萌載陶分陝之化總戎未舉威巳讋於三羌作鎮方崇聲遠馳於萬里若乃左軍望重前馳任隆司鶡辨於宸階統熊渠於襟衛實惟心膂之要斯謂爪牙之職乃眷鷹揚寄於麟趾追蹤漢屏升驃騎之班繼美晉藩極領軍之選是用命爾為左衛大將軍餘官勳封如故惟天遵物厥命弗常惟人立躬在心則應性之所近邪正由乎積習事之所通感召同於影響祗畏之道賢哲同歸欽哉往敷乃訓率由前則竭愛敬之情砥溫恭之行在參期損據寵思危無耽樂是從非禮義勿踐永保朕命以蕃王室誕綏福祉可不慎歟於戲姬歷初沖是資方郡之列漢圖攸永往隆南北之軍故鏤鼎垂勳銘常紀效坐樹之名為重聞鞞之慮實深惟爾左衛大將軍檢校羽林軍上柱國張延師志局淹凝識度間雅當風雷之會遇經綸之日執羈霸府盡忠肅之勤誠聳劒元戎罄旌旄之茂績有六奇之祕術蘊三略之宏規邁遐列於孫吳掩芳聲於闕三字報之迹紀運頻周光華之典賢才攸屬是用命爾為鎮軍大將軍行左衛大將軍餘如故往欽哉其敬揚休命無忝朝獎勉爾幹慎之規宣明奇正之法連徽往彥可不慎歟
