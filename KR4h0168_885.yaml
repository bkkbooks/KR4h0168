front:
  text: 全唐文欽定全唐文卷八百八十五徐鉉八
  hash: sha256:dbeb3b97d329715882b5af8fcc12ddabb017167cbf4be3184d5724b98b38bbd7
body:
  text: 夫道被萬物處其中者是曰賢人功濟橫流讓其先者方稱君子施之則開物成務興廣業而同歸卷之則保族宜家垂令名於必大是以長沙吳芮繁祉邁於三雄南陽賈復賁寵隆於四七歷代以降靡不由之迄於我朝則扶風公其人矣公諱仁裕字德寬其先扶風人子孫或從官於徐方今為彭城人也粵若萬邦作乂益有佐禹之功因封受氏奢有却秦之績公侯必復關西靡孟起之威文武未墜南郡被季長之德存乎譜牒無俟闡揚曾祖某祖某皆以鹵莽之氣當屯蒙之運不履王侯之事歸全父母之邦考某少負雄名為武寧軍裨將才高位下厥用弗彰累贈尚書右僕射傳曰有明德而不顯當代後必有興者故其餘慶集於我公惟公克稟粹靈夙彰奇應方娠而神貺協夢既生而異氣充庭宗族相驚閭里交慶識者謂之曰不意英物復鍾此兒天將啟之馬氏為不朽矣長而爽邁輔以博聞善無常師器以虛受乃皇圖中否赤縣淪災戰國縱橫爭求策士孔門堂奧半作家臣公負先見之明審擇君之義舉旗沛澤即授中涓定難京城仍參主簿而上方從歷試允懋臣功經綸草昧諮訪遺闕公親侍左右日奉謨猷能知四國之為且掌賓客之禮勞無伐善夙夜不離於公美則歸君論議莫窺其際出入二紀懋肩一心車服以庸寵祿來假乃升朝序乃掌禁師以左領軍將軍兼總丞相之兵衞申令惟一任眾惟睦推以恩信先之勤勞周廬既嚴軍事以簡考績稱最帝用嘉之遷檢校司徒遙兼宿州刺史夫千騎之長可以圖功百城之權可以觀政中外迭處仰惟舊章即授楚州刺史本州團練使甸服之際邦賦是繁長淮之衝戎寄為急公奉揚王畧遵舉詔條人不易方計日而治徵為右衞大將軍復領舊兵以衞相府董齊之畧有踰於初明年改右金吾大將軍以扶風縣三百戶為封邑執金之職歷代雄重綿祀虛位公首居之內訓却非之士外察苛留之禁熊羆宣力輦轂無塵及上允膺內禪光啟建業寺府軍衞半存舊京委公留臺右師俾率東夏即遷檢校太保改右天威副統軍進爵為伯陜服從入公有力焉及參告類之儀益光求舊之舉寵開幕府遙領徐方進封侯郡定食千戶左輔之地王業所基藩屏京師惟公攸賴乃移使節往鎮京口公慈惠著於郡國威德洽於士心由是齊人向風期年報政加同中書門下平章事廬州節度觀察等使自南北分隔戎華交馳合淝之郊常制衝要故有台階之命以增外閫之威公於是謹斥堠審號令習組練之士則聲如飇馳嚴堡障之備則勢若山立虜不敢犯邊是以寧而察俗之方如南徐之理方當矢謨帷扆薄伐關河渡江之誓既陳泝渭之舟已具嗚呼良圖未展早命不融春秋六十有三昇元六年閏三月五日薨於廬州公署上省奏震悼廢朝三日即用元甲之數式擬鐵山之功給於官司臨以中使奉常以視履考祥之義循貞心大度之美詳協公論易名曰匡即以其年四月七日備鹵簿儀衞葬於廬州合淝縣鄉里禮也公娶同郡萊氏封彭城郡君麗穠李之華親采蘩之職理內協鵲巢之詠從貴有魚軒之華某年月日先公而逝嗣子右弓箭庫使光庭東頭供奉官光祚閤門承旨光紹皆稟義方無忝遺烈家承膏粱之後而恭順克修職在紈綺之間而雅素自若君子謂扶風公其有後乎夫碑頌之設有自來矣琬炎之細既垂於苕華盤盂之微又參於警戒若乃道合天眷忠存王家累輔翼之功而鐘鼎之報罔間享將相之賞而帶礪之誓弗渝時無間言沒有餘位故其宗廟之紀金石之銘昭示來茲不可誣也小臣不學奉旨刊文庶使計功稱德代遠而愈信披文相質事久而彌芬峴首之懷靡盡昆吾之烈長存嗚乎哀哉其銘曰益作朕虞實曰元凱崇基締業明德攸在維趙于蕃封移族改祚實刊山源長巨海因枝別代瓜見渭來遷道德絳帳勤王跕鳶流光襲祉暎後昭前懷黃結紫著簡成編誕發材英肇惟明懿鼎角膺奇龜文履異博容汎愛入孝出悌運有屯蒙器無凝滯爰初發迹雲從潛泉濯纓職幟拊翼中涓良驥處服忘歸在絃樞機言行無競維賢繾綣從君匪依履屐勤毖前殳周旋陛㦸居國必聞在身無擇帝爰允諧胙乃丕績惟彼淮泗疆以獯夷維此京浙纘以邦畿封淮表浙惟惠惟威椒蘭在俗轅轍興思㣥舒待理獫狁孔棘帝謂侯氏纘服新息式固爾猷惠此廬國乃陟台階俾藩于北龍斾四牡鉤膺鏤鍚命服有煒光聲載揚獷狄弭耳蚩甿嚮方上儀象物下謐飛蝗梁木或顛通川有逝長城既嚴哲人永瘁像著雲臺風存遐裔輟舂盡思瞻山隕淚信結殊俗悲深上旻丹碑既刻列鼎書勳祁連不泯庸器長存丕顯百代惟子有臣原夫至道之先邈哉希矣書契以降可得而云黃帝堯舜澄其源故垂衣恭已在宥天下伯陽仲尼道其用故建言立德憲章無窮赤松羨門神而明之故輕舉上賓留侯商皓變而通之故解景滅迹順是而下莫不由之故有縉紳端委利萬物於廟堂之上葛巾蕙帶全陰功於塵埃之外隱顯殊志趨舍同歸其人有終其魄不死閬風元圃㣥帝之密都赤城華陽仙聖之治所光靈肸蠁若在左右仁人君子往往至焉見之於貞素先生王君矣君諱棲霞字元隱華宗繼世積德所鍾生於齊得泱泱之風長於魯習恂恂之教七嵗神童及第十五博綜經史闕黨童子靡敢並行東方諸侯為之前席而仙才靈氣稟於自然塵纓世網不可拘繫每名山獨往神契感通奇怪恍惚眾莫能測天祐丁卯嵗避亂南渡至於壽春感四海之分崩想八公之遺跡於是解巾名路委質元門問政先生聶君師道見而奇之授以法籙是日有綵雲皓鶴翔舞久之既而窮若士之遨遊得東鄉之勝境道無不在善豈常師又從威儀鄧君起遐受大洞真法元科祕旨動以諮詢福地仙源因而棲託誅茅穿徑枕石潄流身既隱而名愈彰道既寂而節彌苦桑田自改桂樹長留烈祖孝高皇帝方在賓門實來作鎮紫㤅表真人之應青雲符好道之占君鶴書被徵褐衣來見談天人之際講道德之原靡勞牧馬之迷自契順風之問因從敦請來止建康有元貞觀者陳宣帝為臧矜先生之所作也殿堂岑寂水木清華游焉息焉以遂其好每竹宮望拜玉牒祕詞叩寂求真必君是賴嘉祥靈應世莫得聞聖歷中興恩禮殊重加金印紫綬號元博大師烈祖嘗從容謂君曰吾不貪四海之富惟以蒼生為念君對曰夫古之聖人修其身而後及天下天下待一人安而後乂安今天子勤勞萬幾忘寢與食身且不能自治豈能治蒼生哉帝善其言以百金為之壽其識度諒直又如此焉今上嗣清淨之基尊元默之化諮諏賓敬有踰於前而君茅嶺夙心老而彌篤比年抗表請歸舊山優詔惜之又加貞素先生之號既而玉棺有命紫素告期葛洪見留不成大藥少君捨去先夢繡衣保大壬子嵗夏四月甲寅隱化於元貞觀春秋六十有二恩旨痛惜賻錢二十萬道俗嗟慕會葬數百人初君之處茅山也即良常洞之前相雷平山之下披榛翦穢面壑臨流除地為壇表朝真之位因邱設隧卜安神之室至是歸葬符夙願焉六月丙申發自京師泝淮而上時畿內久旱川塗可揭是日大雨洪注騰波郤流驀長堤踰重堰飄然利涉人不知勞昔周王有欒水之朝宣尼有泗水之應校靈比德其殆庶乎君傳法度人數逾累百有若元貞觀主朱懷德名先入室道極嚴師首座孫仲之章表大德劉德光參受經法豫聞元祕永懷在三之義願垂不朽之風威儀王可德首座陳希聲並仰高山共刊貞石鉉也不佞夙承教義雖復仙凡異迹靜躁殊途而誠心所感素交斯在徘徊祠宇邈若山河敬書峴首之悲以伺遼城之歎其詞曰於鑠子晉上賓於天亦有令孫窮神體元昔我來思世稱其賢今我往矣人謂之仙至道希夷孰知其然華陽洞府句曲風煙林芳橘葉地即芝田披文相質億萬斯年公諱文蔚字君章其先濟陽考城人也昔高陽恢若水之靈光有萬國伯益獲箕山之護克成夏功故其子孫延祚丕顯茅土錫允圭組流光在漢者為孝子在宋者為忠臣在梁者為烈將在陳者為詞臣長城既封淮水亦絕辭周粟而遠騖避嬴亂而深藏徙籍建安世為大姓至於我王考毗考秦皆以隱德清操垂為門風惟公嗣奕葉之賢負生知之異幼挺奇表夙韜殊量殫儒墨之祕奧窮文史之菁英閭里歸仁宗黨稱孝於時天下未一遐方不寧公鄙尺鷃之為從黃鵠之舉類延州之觀樂同太史之探書升名俊造從事河洛衰俗難佐天壤不支我烈祖孝高皇帝王業始於江東仁風被於四裔公杖策高蹈款闕來儀府朝肅以生風臺閣藹其增氣署宣州觀察巡官試祕書郎遷水部員外郎賜緋魚袋王國初建改比部員外郎知制誥於時天人協應獄訟攸歸舜禹相與言游夏不能措潤色之任我則無慙既受禪遷主客郎中知制誥如故俄而真拜仍賜金紫今上嗣位大禮聿修徙公為給事中判太常卿事時同軌胥會有司失職公與司門郎中蕭公儼博士韓君熙載協力建議周行翕然由是祖功宗德之位定大行昭名之義允功著高廟與天無窮明年拜御史中丞矯枉持平無所顧憚坐庭劾宰相其言深切貶江州司士參軍初國朝自王義之後曠數百年憲署之間舉無廢職然未有危言激論如此之彰灼者也故權右振竦朝野喧騰傳寫彈文為之紙貴人心既爾天鑑亦迴前所劾者或免或黜公就加江州營田副使頃之徵為衞尉卿俄拜右諫議大夫充翰林學士權知貢舉出納密命樞機靡失登進造士衡鑑無私聳禁署之清風著春官之故事薦賢之賞行及於台司曳杖之期奄先於朝露春秋五十有二保大十年八月二日卒於京師官舍皇上痛惜為之廢朝送死恤孤一從公賜有司考行易名曰簡即以其年九月十三日葬於某縣某里之原禮也長子翥祕書省正字次子騫皆早卒今以從子翹為嗣嗚乎哀哉公心平氣和貌古神正雅好元理有方外之期尢善詞賦得國風之體去華簡禮不以位望驕人憐才誘善不以威名傲物操履堅正靡得動搖襟懷坦夷初無蒂芥謫居江楚恬然自足孜孜色養烝烝孝心嘗為詩云屈平若遇高堂在應不懷沙獨葬魚此其心也江州節度使賈公崇以武立功以剛肅物事公如師傅親公如兄弟時皆服公之重名而賢賈之樂善也既歸京寓居公廨無以家為二子繼亡一慟而已齊生死於夢覺遺寵辱於錙銖古之達者何以過此嗚乎凡我僚舊均哀共戚入黔婁之門閫覽伯喈之經籍睇落日以流慟愬秋風而沾臆企景行於高山勒哀詞於樂石其詞曰高陽之裔伯益之孫展矣君子載大其門爰翔爰集樂我樹檀彯纓幕府振藻西垣禮儀卒獲風憲攸端道行在時業隆自我英英若人見義必果直指烈烈宮鄰瑣瑣死生以之何適不可允矣天鑒明哉主恩乃還宣室乃入修門從容禁署密勿王言得才為盛知人則難求尸宗伯載善其官人必有終古無不死嗟嗟若人風流永已徐庶有母鄧攸無子闕里諸生荊州故吏謂之何哉啜其泣矣秋風落木逝水成川昨朝飛葢今日荒阡一邱殘照萬古愁烟素車自返寶劍高懸高才兮直道共盡兮何言墓誌銘公諱潭字孟澤洛陽人也周先同姓即列國之諸侯漢得名臣乃洛陽之才子攀鱗河北豈須方面之功借筯譙都自有良平之策源長派遠德厚流光史不絕書後將必大當先天之內禪也我七代祖黃門侍郎平陽公曾實演丕命及至德之中興也我六代祖黃門侍郎晉國公至實贊大猷曠古已還一家而已五代祖蓀衡州刺史高祖穜司門員外郎曾祖昶太子司議郎祖琛河南密令皆有韜世之量濟眾之仁大位不躋餘慶斯洽考翃以經術擢太常第以才用為諸侯卿捍寇輸粟有勞王室於是佩金紫升朝廷上疏論邠寧節度王行瑜恃功恣橫坐貶愛州掾及行瑜就戮優詔徵還復出常州刺史鹽鐵江淮留後屬宗社中絕官司解弛計吏未上哲人其萎公有世德之資負夙成之器風神爽邁智術通明景福二年以學究一經射策高第釋褐京兆府參軍事遷祕書郎侍從南遷進修不懈天祐丁卯嵗居先君憂服喪過哀宗黨稱孝楚泗郡守宣城廉使虛左交辟三府馳名俄丁內艱慼憂如禮義祖武帝創基分陜側席求才素與公周旋即加禮命奏記書檄一以委之內贊謨猷外為詞令出應盟會入陪樽俎霸功光赫公有力焉十有餘年任用無間既而楚雲告變穆醴不陳已酬國士之知亦得退人之禮改宣池觀察判官烈祖高皇帝受命中興不忘舊德徵拜祕書少監充儀禮副使遷中書舍人崇英翰林學士周慎密命潤色王言公望無渝朝獎彌厚保大嗣統拜兵部侍郎知制誥學士如故充永陵儀禮副使同軌胥會大禮無違遷兵部尚書修國史考定郊廟之樂裦貶歸正擊拊允諧會六夷南侵天眷北顧命公持節使於契丹宣大國之威神得諸戎之要領及軺軒還軫而控弦出塞矣報命稱旨時論具瞻於是避寵台衡就安關輔除泰州刺史視事數月丕變土風遘疾還京保大六年九月二十有一日卒於江寧永安里官舍享年六十有八皇上軫悼再不視朝飾終之禮務從加等太常考行賜諡曰宣以某年月日葬於某所與夫人楊氏合祔焉禮也長子朝散大夫行大理司直彬次子泰州司倉參軍穆少子修等咸負當世之才皆為保家之主種德垂範未易可量長女用文適水部員外郎楊元鼎不幸早世次曰用柔適膳部員外郎知制誥張緯次曰用光適進士姜某少曰季芳尚幼惟公事業富壽昭映一時族望婚姻熏灼當代自非天監與善孰能若斯雖大用未光而能事畢矣鉉以世親之舊執隨行之敬服義承教惟公在焉刊勒論譔蓋感遇之萬一也其銘曰於維茂族實有世德七葉繼軌嘉猷允塞亶矣君子其儀不忒修辭立誠以匡王國言以文行兵由威克東畿之政為邦之則天地長在春秋代遷今朝喪善何日生賢蒿里誰地佳城許年永安舊里門館依然寢邱傳邑京兆開阡勒名泉石以配青編公諱敬宣字文裦其先潯陽人因官徙籍今為合淝人也西京作相開國侯於是貽孫南國主盟長沙公茲焉不朽籬邊黃菊解縣印以言歸嶺上白雲挂朝衣而不返光靈攸屬固無得稱之丹青所存可畧而言也高祖復右監門衞將軍曾祖琳建州錄事參軍祖晟青州博昌縣令皆天縱其能世濟其美未韋君子屈迹於驍遊縉紳先生折腰於州縣積善餘慶明德後興考雅武昌軍節度使贈太師楚惠公雲雷搆屯龍虎冥會橫琱戈而蕩寇功冠一時裂鶉尾以疏封禮優萬戶公即太師第四子也幼而岐嶷長而俊茂非禮勿動時然後言天祐中門廕起家太子校書遷至府長史賜緋魚袋丁先公憂時年十四孝心昭感喪禮無違釋服除都官郎中賜紫金魚袋改大理少卿青縑寓直時推伏閤之勤丹筆持平人絕署門之歎俄遷江都少尹趙張治劇由來表則之司淮海分疆自昔輕揚之地公處之貞固行以廉平愛民則忠事長以順一圻欣賴三載有成遷大理卿仍兼尹事烈祖孝高皇帝允釐百揆實總六師爰求鄭國之良以貳楚人之廣奏請君判左右軍事丁酉嵗堯咨文禪禹迹中興徵舊德於角犀考官成於喉舌拜工部尚書今上嗣位加金紫光祿大夫檢校太保會閩人作梗王旅欲南聲實所資豫章為急故輟公副總判軍府及羽檄四出芻輓相尋民以悅而忘勞事有備而無患嶺表既定洪人亦康復移宛陵仍兼棣州刺史海陵郡守海陵為膏腴之地邦賦最優嵗比不登民用胥怨公以清淨為理仁恕積中視吏民其如傷守法令而畫一餘糧棲畝無庚癸之呼白駒過隙感辰巳之嵗春秋五十有二保大八年夏四月十有八日卒於位上省奏傷悼輟朝兩日有司考行賜諡曰順即於其年月日權窆於東都明年某月日葬於江都府縣里與前夫人合祔焉禮也惟公沖和體質仁孝為基立身有常與物無忤尢善聲律聞音而知樂頗好篇詠下筆而成章身後不留餘財所任必有遺愛求之作者斯亦難能嗣子泰州司倉參軍崇鼎崇諒崇倫等皆勤修令名夙奉成訓君恩靡替家法如初鉉昔在朝行實惟舊好今從左宦仰繄東道痛死生之已矣感意氣以何報延陵掛劍願保於不欺峴首刊碑終慙於絕妙銘曰淮淝之靈衡霍之精必有賢傑為時而生乃伯乃仲乃侯乃卿望冠六事風馳百城人生有涯大命夙傾不見君子猶存政聲遠日既吉靈輀既行寂寞公館蕭條古坰哀哀郡人泣涕沾襟嗚乎彼蒼不知福善之胡明公諱訥字希仁其先河南人也後世從官徙籍新安支派繁衍遂為郡之著姓迨公數世皆以儒雅退讓播為門風曾祖禺登州文登縣令祖亮左武衞兵曹參軍考轂榮王府司馬母聶氏追封河南縣太君問政先生師道之長女也公承積善之慶負夙成之智砥節礪行好學能文時然後言非禮勿動鄉曲之黨翕然稱之太師陶公來守新安撫納人士署為郡吏委以典籤恪恭詳敏甚稱所職歷事累政其志如初烈祖肇基王業元宗實綜軍政管記之任勤擇其人聞公之名召致幕府王國初建署寧國軍節度館驛巡官掌都統表奏皇室再造慶賞遂行擢拜虞部員外郎掌元帥表奏數嵗以皇孫就傅命公侍讀講道贊德勵裨益之誠端已直躬盡表微之節俄遷水部郎中明年皇孫封南昌王東都留守以公為留守判官遷主客郎中參贊政務事無違者改司農少卿依前充職明年王移任宣潤二州大都督復以公為浙西營田副使通判軍府六載匪懈庶職交修懋官之賞詔命謺委累遷至金紫光祿大夫檢校司徒封河南縣男俄拜泰州刺史充本州屯田監院使正身而令悉心為理公無遺利民自從風屬強敵深侵東京失守而州兵盡出人心大搖於是士庶老幼盡室南渡公自歸闕下坐是除名數年除歙州團練判官上曰戰爭之際吾豈以武勇責書生哉軍法不得不爾即召拜太子右諭德今上嗣位遷少府監丙寅嵗正月十六日卒於京師美仁坊官舍享年七十七上為之廢朝一日賜諡曰定以某年某月日葬於某所禮也前夫人謝氏早亡繼室施氏封沛縣君長子前宣州寧國縣主簿次子志饒州文學公以名教為樂以矩艹矢隻自任行必中立居無惰容縉紳之間推為純行公之外祖得道之士故公頗以朝禮修養為務雞鳴而起孜孜不倦年俯悼耄體常康強及屬纊之晨無伏枕之疾斯亦力行之報也鉉也不佞早辱交契昔先君從事黟歙公適仕本部及公策名郎署鉉亦忝官聯既熟其素履願垂於不朽附於史氏以永令猷其銘曰聖人四教文行忠信惟公似之光有令聞秉筆贊畫登朝典郡寵至若驚道喪無悶年俯中壽官參列卿歸全委順終吉永貞宰樹長在高臺自傾用刊圓石閟此佳城君諱廷構字正材洛陽人也岐山至德綿瓜瓞者萬邦洛宅舊都守枌榆者百世簪組相繼譜牒存焉曾祖侃太常博士祖潛深州樂壽縣令避亂南徙因家廣陵考延禧明經擢第有吳之霸受辟為淮南巡官累官至戶部郎中與殷文公游貞公同掌文翰無祿早世故大位不躋君即戶部第四子也幼而岐嶷長而篤厚躬行孝弟餘力學文以蔭釋褐補宏文館校書試吏為池州司戶參軍改宣州寧國縣尉烈祖在藩乃睠舊族聞君修謹復有吏能因表為黃州長史寵以朱紱置之府朝及受禪遷通事舍人鴻業肇興王澤遐布贊導之任實寄司聰護戎修聘觀風按獄受命而出動罔不臧歷事兩朝任遇彌厚賞賜既數階勳累遷而通事之任如故蓋惜其能也保大七年轉將作少監判四方館事浩穰之地尹正為難復以本官判江寧府事其間監諸侯之典者十通四方之命者三攝州府之政者六按枉撓之獄者四或敷惠於新附之俗或投身於危亂之地本於忠而後動忘其生而後存元宗嘉之以為客省使今上嗣位深惟舊勞特加金紫光祿大夫台州刺史常御壽昌殿視事中外之人咸得引見又以君為壽昌殿承宣出為忠義軍監軍泉南等州宣諭使還遷筠州刺史本州團練使仍充客省使君以備嘗艱危復逼遲暮懇辭繁劇恩旨不從丙寅嵗十月二十二日終於京師某里之官舍春秋六十有六詔廢朝一日賜諡曰某明年正月日葬於某所禮也夫人天水縣君姜氏輔佐之勤率由婦禮訓誨諸子備有義方子大理評事崇儉太常寺奉禮郎崇素及崇順崇信等皆有儒謹能不墜其先鉉家世通舊嘗接姻婭淡成之分終始不渝何以寘懷是用刊德其銘曰猗嗟周君世濟其名展如之人克嗣厥聲受任幹蠱臨難忘身居中處約全和保真與物皆化萬古同塵松楸勿伐蘭菊惟新刊石表墓吁嗟善人
