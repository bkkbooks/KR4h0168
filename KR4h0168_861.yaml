front:
  text: 全唐文欽定全唐文卷八百六十一忌本名鳳一名晟高密人少為道士謁後唐莊宗於鎮州授祕書省著作佐郎天成初朱守殷叛忌為幕客贊成其事朱氏誅匿跡入淮吳人以僞官授之周顯德三年署僞司空奉貢行在以所言失實收下獄誅之
  hash: sha256:1f728e6c1ca1721cb84fa2a3375104c707f0ee2610ad43df4ca336fd51d8cc87
  markers:
