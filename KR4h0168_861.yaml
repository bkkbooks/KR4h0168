body:
  text: 是山也兩峯連峙狀似牛頭昔天紀之初西峯圯裂中有比邱閉目跌坐軀貌偉大形質枯槁時諸沙門皆往禮拜議曰得非道者入滅定耶於是灌蘇油以滋澤擊槌磬而驚悟豁然開目高視曰汝等何人形狀卑小而披法服沙門曰比邱也又問曰我師迦葉在否對曰入涅槃矣良久起升虛空崇遠仕南唐官大理司直著有金華子新編三卷金華子者河南劉生少慕赤松子兄弟能釋羈勒於放牧間讀其書想其人恍若遊於金華之境因自號焉生自童蒙歲便解愛人博學暨乎鬢髮焦禿而無所成名凡為文章略知宗旨最嗜吟咏而所得亦不出流輩年逾壯室方蒞官於畿甸繼宰二邑共換二十餘寒暑唯知趦趄畏慎不能磊落經濟罷秩歸京得留綴班家貧窶在闕三四年甚窘困稍暇猶綴吟不困倦縱情任興一聯一句亦時有合於清奇顧於食玉燃桂不無撓懷才緩紆斯須則嘯傲自若或遇盛友良會聞人語話及興亡理亂猶耳聰意悅未嘗不周旋觀察冀或湊會警戒庶幾助於理道者必慷慨反復至於逾晷不息時皇上憂勤大寶宵衣旰食致治之切無愧前代命有司張皇公道掄擇材雋科第取士鬱然反古時有以春闈策問舉子對義見示者覩強國富民之論今古得失之理則愧惕雀息往往汗流何者以坐遇明盛時而抱名稱不聞於世何疾復甚於斯矣因念為童時侍立長者左右或於冬宵漏永秋階月瑩尊年省睡率皆話舊時經由多至深夜不寐始則承平事實矣爰及亂離於故基跡或歎或泣悽咽僕隸自念髫齔之後甚能記聽今雖稚齒變老耄亡失憶十可一二猶存乎心耳并成人宦遊之後其間耳目諳詳公私變易知聞傳載可繫鉛槧者漸恐年代寖遠知者已疏更慮積新沉故遺絶堪惜宜編序者即隨而釋之云爾蓋聞住非聲而去非色無滅無生視不見而聽不聞而闕一字有闕二字三空俄顯一德爰彰善念必通勤行可學明明宗旨歷歷程途實有路以堪躋闕二字門而可入自是心源不透智筏未征達彼岸以何由湊元關而莫逮崇遠自親禁掖厚忝渥恩凡覩靈蹤悉虔俗志冀精勤於一善上報答於九重宴石山者在白州博白縣之西鄉與馬門灘伏波公之祠鄰近圖經云昔有神人稱陳越王今有古宮基址見在廉州合浦闕三字曾宴於此山故以為名焉其山也西枕清波南連翠闕一字曉則輕雲簇白晝則遠樹攢青石罅泉噴點點而斜飛皓雪闕二字花秀菉菉而密綴紅闕一字左紆右回前龜後鶴蔬足果足松寒竹寒昔曾有人臨水闕二字作佛像約高五丈餘未窮其年代者矣闕一字有壬向石室一所唐咸通中高祖座闕一字統十道兵師禦八蠻疆境經行之際於此闕一字塑造佛像今以闕二字崇遠因監製運遂切經營乃命良工闢為精舍一山逈矗兩室相鄰闕一字是以黑金鑄釋迦瑞像設於東室又鑄釋迦牟尼佛一座兼別鑄五百阿羅漢闕二字羅漢設於西室其次有石引廊齊堂僧房等在於室外請僧師肇道志惟敏惟忠住持焚修闕一字則飛章聞奏皇澤爰頒賜額號於闕二字今為覺果之禪院闕一字謂覺乃大覺之闕一字果乃勝果之門覺與果齊果因覺集闕三字外天鑒洞臨致去石嵐永為勝地又別有東峯石山一座中有東西南北四室嵬峨若畫礧磈如鐫直疑乎造化剜開又恐是神仙斫出多景多致惟煙惟霞亦以黑金鑄玉皇道君老君天地水三官並塑左空右元真人玉童玉女左右龍虎君元中大法師設於室內卓爾威儀森然侍衛請道士廖德崇劉守清盧守和等別建道院住持焚修以乾和十五年丁己歲八月二十三日起建迄於大寶元年戊午歲十二月二十七日畢功建置道場設齊慶讚訖莫不青蓮金柱如忉利以初來錦舌蒼肝似蘂珠而乍降繇是命乎緇侶招彼羽人金爐曉炷以香分馧銀炬宵燃而炫耀用全因果上贊休明闕一字來四海之朝宗盡類衆星而拱極功既畢矣願且周焉可以齊嵩華之堅可以並江河之永靈基勝跡萬古千秋時大漢大寶二年太歲已未九月癸卯朔二十四日丙寅記頌大名內黃人少篤學與弟頏齊名五代末官祕書省著作佐郎百行之本教學以慈曾氏有子其殆庶幾倚門而歌季孫受嗤舞雩詠道聖人稱之穀字惟珍潁州汝陰人舉進士連辟華泰二州從事晉天福中纍擢樞密直學士加給事中改三司副使開運二年出為磁州刺史北面水陸轉運使契丹入汴署給事中漢初拜左散騎常侍遷工部侍郎周廣順初加戶部侍郎拜中書侍郎平章事顯德初加右僕射集賢殿大學士進位司空門下侍郎四年罷相守司空恭帝即位加開府儀同三司進封趙國公入宋建隆元年卒竊以自古王者咸建史官君臣獻替之謀皆須備載家國安危之道得以直書歷代已來其名不一人君言動則起居注創於纍朝輔相經綸則時政記興於前代然後採其事實編作史書蓋緣聞見之間須有來處紀録之際得以審詳今之左右起居郎即古之左右史也唐文宗朝命其官執筆立於殿階螭頭之下以紀政事後則明宗朝命端明殿及樞密直學士皆輪修日歷旋送史官以備纂修及近朝此事皆廢史官惟憑百司報狀館司但取兩省制書此外雖有訪聞例非端的伏自先皇帝創開昌運及皇帝陛下纘嗣丕基其聖德武功神謀睿略而皆萬幾宥密丹禁深嚴非外臣之所知豈庶僚之可訪此後欲望以咨詢之事裁制之規別命近臣旋具抄録每當修撰日歷即令封副史臣庶國事無漏略之文職業免疏遺之咎遠字上交范陽人避漢祖諱以字行仕後唐歷涇秦二鎮節度判官晉初召為左司郎中纍遷刑部侍郎轉戶部侍郎拜御史中丞契丹入汴立明宗幼子許王從益為帝以遠為右丞相漢祖即位授檢校禮部尚書太僕卿遷祕書監周廣順初拜禮部侍郎轉戶部改太子詹事顯德初遷賓客二年拜吏部侍郎尋免官入宋建隆二年卒臣伏覩長興四年五月二十三日敕州縣官在任日有覆推刑獄公事雪得寃獄活人性命者准長興元年二月二十一日南郊赦書節文便許非時參選特與超資注官仍賜章服者宜令諸道州府凡有雪活寃獄州縣官等依元敕點簡給付公憑本官自齎赴刑部投狀委刑部據狀追取本道雪活公案參驗如事理合得元敕便仰給付優牒此蓋道宏激勸務絶罔欺在酬獎以甚優期刑殺而無濫臣詳元敕只言州縣官員所許加恩未該內外職掌臣又詳前後請給優牒人等文案若繫雪寃屈本道尋合奏聞例過五年十月本人方來論請須卻尋追文案勞擾公方於事難明於理未當伏惟皇帝陛下體堯仁而御㝢敷舜德以臨民大闡化條克修刑政旁詢闕典用整宏綱功必賞而罪必誅善者進而能者勸起今後但能雪活寃獄功必限在朝職司亦乞量加旌賞應關諸道州縣官員雪活寃獄不虛委逐處長吏抄略指實案節先具奏聞所付本人憑由官滿到京便於刑部投狀不得隔越年歲方可論訴功勞庶內外以皆同使期程而有守廣亭毒好生之道盡高低察獄之明者濤字信臣京兆萬年人仕梁補河陽令後唐天成初舉進士甲科纍遷起居舍人入晉歷中書舍人漢祖入汴為翰林學士拜中書侍郎兼戶部尚書平章事隱帝即位罷相周初起為太子賓客歷刑部戶部二尚書恭帝即位封莒國公入宋建隆二年卒顏氏之族咸為子弟亞聖次之升堂者矣學無不通道無不備昔稱賢達今列圖史衎字祖德亠兊州曲阜人梁龍德中擢第官臨濟令後唐長興初召拜太常博士入晉纍拜御史中丞改戶部侍郎周廣順初為尚書右丞充端明殿學士權知開封罷守兵部侍郎顯德初以工部尚書致仕入宋建隆三年卒才除御史者旋授外藩賓佐復有以私故細事求假外拜州郡無參謁之儀出入失風憲之體漸恐四方得以輕易百辟無所準繩請自今藩鎮幕僚勿得任臺官雖親王宰相出鎮亦不得奏充賓佐非奉制勘事勿得出京自餘不令出釐雜務可久字尚賢州范陽人仕後唐纍遷著作郎入晉歷大理卿周廣順初改太僕卿分司西京顯德五年復拜大理卿入宋建隆三年卒開成格應盜賊須得本贓然後科決如有推勘因而致死者以故殺罪論臣詳此理未便且云無持贓待捕之賊或偷生隱諱所司又須訊拷死反償命實恐惠姦起今後如因而致死者如無故則請減一等別增患病而死者從辜限正賊減本罪五等臣曾披法律深究臧否州縣令律之中具存條格軍鎮案推之吏未載明文事若不均何以示勸其三京軍巡使諸州府馬步都虞候有精於推劾雪活寃濫者請量事超擢如按鞫偏私故入人罪者亦刑之無赦中孚周顯德時鄉貢進士宗周嗣位之二葉也命授神宗德符昊穹寢被武功復乎淳風皇聲於是遐通車書以之混同異域咸賓遠邱格白環之贄嘉祥自兆阿閣巢丹穴之禽曷覆燾之洪均致蒸黎之雍穆古由今也不其偉歟時有縣尹外郎彭城劉公名渙字廣澤故丞相譙國公之元子也鼎鼐名家公台令族奇姿碩德為時所稱莫不宏其學以開之高其才以文之崇其禮以節之敦其信以成之臥錦為郎立事於文昌宮裏握簡就列馳芳於建禮門中洎以清白不容權政所忌賈誼賢而見謪屈平忠而自遷諒州縣之徒勞實銅墨之非貴有以見拘驥騄之足淹社稷之才也先蒞伊陽次宰斯邑未嘗不稽力任以資賦庾敷德惠以董逋逃除暴慢以恤惸黎示好惡以平獄訟下車而民受其賜涖事而吏伏其明三年之政化大行百里之煩苛盡去屬我皇帝翼翼萬機孜孜庶政為下民之革弊慮昏厲之作災用止訛風乃頒明詔日當聰明正直以福及人者則可以靡息宗禋或妖回魑魅以禍苟人者則可以特加翦伐式絶淫祀永作恆規粵是邑皇甫村有古祠者即啓母少姨之神也夫勝事芳猷神通靈應備於嵩少二室本廟碑表載之也斯不復書又有濟瀆神宇一所祔焉誠彩仗之行宮復雲駕之別館欒櫨穹崇而特立丹雘照灼以相鮮杳邈虹梁聳若龍驤之狀徘徊雉堞高侔矢立之形風來而蕙帳香生雨霽而晴軒翠滿巋然妙績回跨神皋輪焉奐焉不可得而論也廟貌嚴肅明靈暗通望之者敬由是興祈之者福由是集稻梁黍稷春秋而遂布時羞絲竹陶匏庭砌而遽陳商角是得歲時序風雨順生植暢田疇開人獲囷阜之豐里有謳謠之韻以作景福以助太和猗歟人之禱既如斯神之應又如此於是下以利之事達於上上以留之義令於下班基且廓魯壤弗加等靈光之獨存同甘泉之但闢獲永薦奠得壯祠宮潔以祈恩馳特牲而可進固夫層搆任迅景以頻移邑人牛敬贇等欲示後生宜刊貞石乃為見託俾述斯文中孚學不逮於古人詞莫窮於前事徒抽馬卿之思強濡王粲之豪豈敢繁言庶存實録時顯德五年歲在戊午七月十二日記浣字日新仕後唐歷集賢校理入晉纍遷中書舍人契丹入汴陷塞北宋建隆三年卒於契丹田重霸至伏蒙聖慈特頒明詔降日中之文字慰天外之流離別述宸慈俾傳家信如見骨肉倍感君親昨田重霸至為無與蕭海真詔敕祇有兄濤家書不敢將出方欲遣田重霸卻回至五月四日海真差中門使趙佩傳語臣云昨據差人齎絹書上南朝皇帝請發兵來兼取得姚漢英等奏狀所貴聽信其絹文印押了未封被趙佩懷內遺失交下憂怕不知所為臣既認實心遂喚趙佩通事李解里來呈與書詔當時聞於海真極喜引臣竊謝尋喚重霸於私宅相見至五月二十六日又喚重霸於衙內一宿今月四日令趙佩將銀十兩令與重霸兼傳語與臣云我心如鐵石令此人且回諸事宿時說與一一已令口奏候南朝有文字來則別差人去今因奏陳皆據目前所得至於機事兵勢權謀非臣愚為敢陳鄙款伏乞妙延良弼周訪嘉謀斷於宸衷用叶廟勝今王驕騃唯好擊鞠耽於內寵固無四方之志觀其事勢不同已前親密貴臣尚懷異志即微弱可知不敢備奏一則煩文一則恐涉為身計大好乘其亂弱之時計亦易和若辦得來討唯速若且和亦唯速將來必不能力為可東也易簡字國寶京兆萬年人梁乾化中進士歷鄧州節度推官入後唐纍遷中書舍人晉初判宏文館史館事拜御史中丞周廣順初遷禮部尚書改刑部顯德四年以太子少保致仕入宋建隆四年卒伏以選門格敕條件具存藩府官僚該詳蓋寡所以凡給文解莫曉規程以致選人自詣京都親求解樣往來既苦己堪憫傷傳寫偶差更當駮放伏見禮部貢院逐年先書板榜高立省門用示舉人俾知狀樣臣欲請選人文解委南曹詳定解樣兼備録長定格取解條例各下諸州如禮部貢院板樣書寫立在州縣門每遇選人取解之時各准條件遵行仍依板樣給解臣聞天地之道起於漸天以天之高畜雷霆之威雨露之惠覆於萬物必從漸而生以地之厚負江海之慈淮濟之潤載於萬物亦從漸而長況人者無天之功乏地之力勞方寸之心豈可急速而治天下也惟我后膺圖履運握鏡臨人蘊勤儉之風秉宏厚之德內無耽玩外絶奢華信任股肱委仗將帥自有仰成之化固多定亂之功今者所以尚撓聖懷親勞御札者何直以庫藏稍虛士卒微惰使天威之莫震令王化之未敷此則非臣下之無謀豈君上之有過蓋承僞廷之困弊遇數歲之亂離今國家宜靜以圖功不可躁而取失或欲急徵暴斂則百姓愈逃或以峻法嚴刑則三軍益叛莫若制治於未亂求安於未危者也凡止亂危者應上元則以好生惡殺為心接諸侯則以含垢匿瑕為念夫如是即水旱無繇而興干戈何門而動也考諸政教則禮樂咸在刑賞具存任四輔提其綱遣百司舉其目必見梯航常貢士馬日精所謂強其幹而弱其枝深其根而固其蒂於是天地有清和之氣星辰無謫見之災可以薄賦恤萬民足以虛懷馭㣥后或思正名於中夏問罪於殊方人皆同心兵必戮力寰區既定帝道自隆躋元首為睿聖之君列四輔作賢明之相主則社稷無患臣則子孫永安此則顯漸之功見治之驗矣鑄字司化河南洛陽人梁貞明三年舉進士歷殿中侍御史仕後唐纍遷考功郎中晉開運二年改祕書監轉右庶子分司西京周廣順初入為左諫議大夫給事中顯德三年授檢校禮部尚書入宋建隆四年卒欽若天道聞諸堯舜之朝敬授人時乃自殷周之代能消災異而致福祥自兵興以來多失本朝故事不拘典法有誤修禳承前日月薄蝕百官皆合守司星象有差九重亦當避殿以明減損式示恭虔信守國經何虧聖德自此或乾象謫見凡關災異請依故實令百官守司陛下御便殿減常膳准令式遵行臣聞國家以務農是本勸課為先用廣田疇乃資倉闕二字竊見所在鄉村浮居人戶方思懇闢正切耕耘種木未滿於十年樹穀未臻於三頃似成産業微有生涯便被縣司繫名定作鄉村色役懼其重斂畏以嚴刑遂捨所居卻思他適覩茲阻隔何以舒蘇既乖撫恤之門徒有招攜之令伏乞皇帝陛下明示州府特降條流應所在無主空間荒地一任百姓開耕候及五頃已上三年外即許縣司量戶科徭如未及五頃已上者不在搔擾之限則致荒蓁漸少賦稅增多非唯下益蒸黎實亦上資邦國歸讜字安正幽州薊人仕晉纍遷右散騎常侍漢初歷禮部刑部二侍郎周廣順初遷兵部戶部二侍郎擢尚書右丞樞密直學士轉左丞尋為御史中丞入宋乾德二年卒臣近以宣達絲綸經過州縣切見使臣於券料外別要供侍以紊紀綱亂索人驢自遞行李挾命為勢凌下作威或付應稍遲即便恣行打棒既遭屈辱寧免怨嗟天聽未聞無處披訴伏乞潛令察訪兼便明降指揮官吏只供亦須精細使臣取索嚴示戒懲庶息煩苛漸期開泰者臣切見每年貢舉人數甚衆動應五舉六舉多至二千三千既事業不精即人文何取請敕三京鄴都就道州府長官合發諸色貢舉人文解者並須精加考較事業精研即得解送不得濫有舉送冀塞濫進之門開興能之路臣伏見諸處有人拋無名文書及言風聞訪聞之事不委根苗接便追擾既非責實多是搆虛窮理本之有傷瀆化源之無益遂使貪吏狡吏蓄私憾以讐人讒夫佞夫扇狂言而害物請明行條制庶絶罔誣其受納獄訟直須顯有披論具陳名姓即據理詳按無縱舞文其無名文書及風聞訪聞並望止絶不得施行俾存欽恤之風不失含宏之體
