front:
  text: 全唐文欽定全唐文卷七百六十四造官通直郎試大理評事
  hash: sha256:d8fcff77a70a3fad1e6f3e3540ab8f2b85ad33ae6aae13f5ef3e7f00fb078fb0
  markers:
  - {type: head, offset: 14, content: 趙造, id: KR4h0168_NFKB_764-h1, level: 1}
body:
  text: 公諱文幹字強之其先即秦將翦公之洪允也自時厥後子孫衆多文能出㣥武蘊異畧賁則善虜其將戊乃下筆成龍功業居高名施於後秦霸天下斯皆王氏之力也遂使高秋朗月瀚海澄波諸屬難儔家世雄盛皇朝中散大夫內侍省內侍賜紫金魚袋奉詔和蕃使兼安西北庭使諱奉忠公之曾王父也德重名高情見義立西戎斂迹不敢東窺北狄戢㣥不敢南牧內侍省內侍賜紫金魚袋內弓箭庫使奉天定難南朝元從功臣諱英進公之祖王父也義勇冠時見危致命親承聖旨獨步中朝右神策軍散副將雲麾將軍試殿中監奉天定難隨駕南朝元從功臣諱臣端公之烈考也功高位下命不待時慶流有徵果有令子榮高處厚德抱雄圖公即雲麾將軍第三子也憲宗踐阼時公年始童舞入趨紫闥出踐丹墀敷奏詳明鬱為俊彥遂拜供奉官恪居官次務謹去奢臨事無渝為官不昧斯乃沖天逸翰出潤喬松錫以朱紱之榮帶以銀章之命改棃園判官奉八音之禮專五菓之名藝就日新功勤益著遷鷄坊使剪拂珍禽在鬬自我羽翼奇特利用絕㣥每蘊能名誰之與匹轉宣和殿使載離寒暑日往月來每候鑾輿晷刻無失金石磨而不磷璧玉琢而彌堅改軍器監判官專任武庫奠體有程幹笴必時實謂戎備尋遷左神策軍宴設使庖厨有節饔餼無遺修饌必善於精華宴飲實慙其醉飽鎮幕歌晚坊局拖留拜同官鎮監軍地居畿甸鎮壓要衝路接塞垣命之監理虬龍豈與蚯蚓為伍鸞鳳難可枳棘長棲時當用才俾之密侍依前充供奉官使於四方善能專對利於一事罔不克堪未幾息車改栽接使公墾園樹菓殖地生苗供億猶勤庶事無闕有司惜才戀德公乃布義行仁開成五年詔遣充新羅使拜辭龍闕指日首途巨海洪波浩浩萬里一葦濟涉不越五旬如鳥斯飛屆於東國王事斯畢迴木虜累程潮退反風征颿阻駐未達本國恐懼在舟夜耿耿而罔為魂營營而至曙嗚呼險阻艱難備嘗之矣及其不測妖怪競生波滉瀁而滔天雲靉靆而蔽日介副相失舟檝差池毒惡相仍疾從此起扶持歸國寢膳稍微藥石無功奄至殂謝享年五十有三會昌四年歲在甲子夏四月蓂生五葉日終於京兆萬年廣化里私第雖違三月之期終遂九原之禮是歲冬十月十五日葬於鳳城東龍首原禮也嗟乎命之不偶李廣豈遂於封侯梟在官門士衡終聞於歎鵩公婚於滎陽鄭氏克諧琴瑟相敬如賓有子三人男曰義仙義立女適齊郡史氏孤子銜恤茹荼哀號罔極恐田成碧海谷變為陵片石未鐫防墓何辨用憑不朽之石以誌永存之詞銘曰猗嗟大夫短折不祿歷事五朝白圭三復賈誼促齡士衡歎鵩許國一心居家可理善則稱君過則稱已君臣道合如魚如水嫉惡如讐見善必遷愛如冬日畏若夏天臨官廉平無黨無偏奉命出使汎海東夷洪流滉瀁陽鳥攸危大波汨起天地變移王事斯畢車騎辭迴臨達本國魑魅為災幽魂何往遊岱不來聯帛丿糸經歲四體轉衰辭恩處順闔門銜悲吾將安仰哲人其萎美玉永沈寶劍斯折聖心哀慟孤子泣血福祚長存恩光無歇坦字知進第進士累官禮部侍郎授江西觀察使華州刺史拜中書侍郎同中書門下平章事卒勅鄉貢進士溫庭筠早隨計吏夙著雄名徒負不羈之才罕有適時之用放騷人於湘浦移賈誼於長沙尚有前席之期未爽抽毫之思可隨州隨縣尉龜字大年宰相起子大中末拜兵部郎中知制誥咸通末改太常少卿檢校右散騎常侍同州刺史徙浙東觀察使為盜所害贈工部尚書臣才疎散無用於時加以疾病所嬰不任祿仕臣父年將九十作鎮遠藩喜懼之年闕於供侍乞罷今職以奉晨昏謩開成時鄉貢進士句曲之東實曰崙峰居峰之陽厥生大泉寺因泉而題焉後劉宋昇明二年有邑令顏繼祖捨宅移寺南去泉五里而遙年代寖遠碑記埋沒粗所詳者乃顏氏十三代孫今寺之惠誠也太和初監寺僧惠明與寺僧道琳等見三門破壞乃言於衆曰此教東流設象為法牢落如是瞻仰何依乃請今寺主僧常誼昔旅於是者戮力誓心募緣祈化如響斯應人咸歸之遠近趨走投施香積算財度費功用果足乃革舊制恢新謀延袤縱廣中閾無改自太和庚戌至於癸丑凡四年厥功告成崇軒峨峨三闔其門飛簷翼張丹栱霞煥矧茲寺以重岡疊嶺罙入崖谷行樹葱翠煙蘿蒙密雲收霧卷宛若仙闕俾得道者同指歸於覺路由徑者詎深著於迷途非我師之志誠其孰能逮於此今天下學佛道者多宗旨於五臺靈聖蹤跡往往而在如吾黨之依於孔門也誼本鄭人冠歲因往遊焉遂剃髮於五臺金閣寺元和再歲乃於渭州龍興寺依年具戒振錫經行見色相之皆空識衣珠之無價又六年始到江南初止於近寺蘭若其明春又之嶺南詣禪訪道酌水步雲心契如期不遠千里十一年遷至茲寺初寺每有僧俗大會五十餘衆號曰龍華常患錡釜之器不周於用物有所闕人多告勞誼乃發願鑄一大鑊求布金之長者得鎔範之良工歸依一念之間成就堅牢之質濩落有用碩大無朋使天人畢會於龍花香積普沾於法味由此故也寺衆僉曰誼實有力於寺者非宿習德本沾諸善緣豈能誘掖㣥心終成喜捨太和初歲乃聞諸府邑請隸名焉繇是三門洊興功致一貫則誼之行業前修推可鏡矣人有語余於師為文者誼因錄所載請識門焉寺之備新記詳矣辭曰寺之興大泉是生觱沸猶在既溫且靈寺之移顏氏之基宋室舊邑桑野離離寺之終誼實是工大鼎渠渠三門崇崇煙霞棟梁松桂香風周匝巖壑警迷其鐘文入於石播之無窮立官雒縣令充採訪判官拜監察御史伏准正月二十九日勅除陵寢外其並約莊憲皇后山陵制度者伏以莊憲皇后合祔豐陵不別置宮寢今義安皇太后於光陵東別擇陵地與莊憲皇后祔禮不同其宮殿并諸色官員等今與詳定官等同商量伏恐合議建置鄴字啟之梁長沙宣王懿九世孫及進士第大中時累拜戶部侍郎以工部尚書同中書門下平章事懿宗初為山南東道觀察使歷戶禮二部尚書拜右僕射以平章事節度河東卒公諱元裕字景圭六代祖申國公諱士廉皇朝闕二字中尚書右僕射有仁儉之闕二字文闕二十三字在陶唐氏闕五字以隱德起為周文王師者號為太公望始受封於呂子孫世仕於齊闕一字世孫公子闕二字孫闕一字與管敬仲俱為齊上卿合闕一字侯有功闕十一字廿七世孫洪後闕二字為渤海太守因家焉高氏故著闕三字平闕四字後魏闕二字錄尚書事生岳北齊侍中封清河王生敬德開府儀同三司改封闕一字安王申公闕三字之令闕十二字皇朝闕一字州長闕三字之行闕二字曾祖諱闕二字州餘杭令贈尚書戶部員外郎大父諱甝祕書省著作郎贈右闕二字大夫皇考諱闕一字太原少尹兼御史中丞闕十二字之少子也幼而穎悟及長魁岸秀發弱冠博學工文擢進士上第調補祕書省正字佐山南西道荊南二鎮為掌書記轉試協律郎大理評事攝監察御史入拜真御史轉右闕四字侍御史闕五字豪舉闕一字拜司勳員外郎轉吏部員外郎公之佐山南西道也節度使崔公從以清明藻鑒推重簪組洎公抗揖上席雅望益洽及登御史府好為犖犖事自荊涉闕十一字急宣居常摧秣在櫪廏吏多闕四字條制爭闕二字客闕一字呵闕一字導者必恐遽恇廹授以驛馬不敢問積習為弊刺史不能治有道士趙歸真者長慶初用黃老祕言得恩倖闕二字旁闕二字言闕一字怪在驛闕四字自給時公方徵入遇歸真於途連叱之謂曰汝妄人耳天子置驛馬俾爾鼠輩疾驅耶且黃冠驛馳用何條制顧左右牽闕一字之歸真沮撓不敢仰視闕四字以闕五字歸真闕四字聞者憚焉公之為柱國也當寶歷初天子年少新即位事多決於內或坐朝頗曠旬朔大臣罕得闕一字謁公上疏指斥極言闕二字中外之闕一字以鎮闕五字公闕三字之偘然公之為吏部郎也精闕一字簡峻胥徒闕一字戢若踐刀㦸未竟南曹事會與銓長以公事爭短長剛憤不能下請急闕六字道除左司闕二字遷闕四字中書舍人公之為諫議也屬朝廷多故李訓鄭注貽禍闕一字亂欲先立威定事公察其必變銳以勁闕二字其頭角章疏闕一字上文宗知而不能用及為中書舍人逆注益用事注初以藥道進至是闕一字然以才望自居會注遷秩闕七字揚其闕三字狀注方倚恩自大恚不能堪遽出公為闕一字州刺史注敗復入為諫大夫兼充侍講學士尋兼太子賓客文宗重儒術尊奉講席公發揮教化之本依經傳納上傾心焉闕八字筵闕二字為闕四字護之授闕一字公闕二字通經文雅任職而操剸闕一字濟素重朝廷上復欲闕一字之未幾擢拜御史中丞兼金章紫綬之錫公正色立朝百吏震肅闕一字暑闕七字下闕二字僚吏率多闕三字奬體闕一字不篤濟辦闕一字倪甚威邪朋自遠班行相顧聳動屏息議者以為風憲振職自元和以來惟公為稱首進尚書右丞改京兆尹未幾授左散騎常侍遷兵部侍郎轉尚書左丞知吏部尚書銓事會恭僖皇太后陵寢有日充禮儀使公為左右轄也郎吏籍公岸谷之峻皆石互闕四字事迎理及銓綜衡鏡之務抉奸與善如見肝膈猾吏闕一字勿又闕二字竄闕一字記闕一字為防闕二字迷視聽公指摘闕一字病是非立辨標為成憲迄今賴焉不杖一人九流式闕一字尋改宣歙池闕四字使兼闕四字入拜吏部尚書闕五字懿闕十七字為闕二字使闕一字事遷檢校吏部尚書山南西道節度觀察等使公友睦清約車服飲食比寒士而闕二字吏闕一字奉公闕二字汲汲如嗜慾居一室凝塵積機澹如也於宛陵闕一字二郡理於漢南闕一字八郡化率用闕一字興利除害刊為故實在漢南奏免闕一字內積年逋租七千八百餘萬貫節用而已公私闕二字百姓闕二字之初公自侍講為御史中丞文宗久闕六字內舉母兄少逸上喜納而遂其志少逸果能闕一字二帝三王之業發明闕二字上益敬重闕三字者咸謂公以誠事君者也愛闕二字不忘舉其親舉其親不忘存其義眉壽景福闕三字歸公為闕一字州之五歲慨然有懸車之念累章陳懇故復有闕四字之闕一字即日渡江將休於闕二字行闕一字志闕一字大大中四年夏六月廿日次於鄧無疾暴薨於南陽縣之官舍享年七十六上聞撫機震悼廢朝闕一字日闕七字年十一月十日歸葬於闕一字南府闕二字縣闕二字之南原以李夫人合窆從祔於闕一字府君之兆次闕二字公前娶隴西李闕一字吉州刺史宣之女也再娶京兆韋氏鄭國公孝寬七代孫闕十字先考司徒府君闕二字衽席闕三字國太夫人闕一字氏陰教修備及公貴闕五字服闕四字哀榮之禮渥縟矣闕一字子闕一字一人曰璩李出也進士擢第試祕書省校書闕一字文行闕字記曰有大德者必得其祿其位其名其壽闕一字公始終可謂全闕二字銘曰烈山之闕三字太古闕十三字功錫姓申公嗣興闕二字佐命闕三字赫闕二字秀令降闕一字公生闕五字為闕一字師闕一字為廿資闕六字二闕一字行茂闕三字高終賈霜闕一字迴闕九字政嚴官闕二字大競囂闕一字我敦德義時闕十一字大羹闕一字味闕九字妄闕七字我堅豸闕一字大方闕二字以闕三字禁林密侍講席陪升因經納誨承問闕一字能輔道闕七字以闕二十五字多闕五字韋氏之世系尚矣陶唐氏之後有國豕韋者實為商伯周衰遷於楚之彭城漢興韋孟為楚元王傅繇孟五世至丞相賢韋氏遂顯大賢封扶陽後徙平陵及子元成別徙杜陵子孫家焉遂為京兆人云元成生寬寬生育育生後漢尚書令浚浚生梓潼太守豹豹生東海相著著孫冑仕魏為詹事冑少子曰穆後著號為東眷八世至隋郁城莊公諱元禮距四世入唐有為陜州刺史者諱岳子於公為曾祖是生京兆少尹河北採訪使府君諱恒為王父少尹生贈刑部侍郎衡州別駕府君諱平奉天之難寇兵圍逼時鳳翔已害其帥張鎰且應賊矣公與從父弟臯能扞朱泚於隴州斬其使者乃折其勢公乃間行西走奉天夜縋城下蠟丸發表具獻功狀德宗把手喜泣曰富貴惟卿所欲口授御史中丞公辭以素卑無貲願從州縣祿竟遂其志改萬年尉從上至興元道苦風疾廢居優游散地既慊當世其後宜有達人娶彭城劉為麟女而生公諱正貫字公理幼而神靈長而聰異目所繫覽不忘於心耳剽音聲洞識節奏季父太尉公臯特見器屬且必能大其家門故名之曰臧孫年十有五先君歿於衡陽奉喪歸北裴僕射均在江陵故少公為表弟欲擅有外家吉凶之事且致贈焉公泣曰不專於孤有諸父在如將聽命恐傷叔父之義不敢拜賜之辱蜀使俄至他日反告太尉深德異之既除喪調補單父尉太尉有大功於國家德勢甚盛韋氏子姓可以坐掇朱青公深自懲刻遂博極㣥書自三代已降損益制度無不稽其典要相國韋公處厚及韋湖南辭皆以學識相高每與公論搉當世之務咸服其深切事情雖賈生不能過也長慶初遂棄官改名對賢良極諫策登乙卯科授太子校書敬宗朝又以華原縣尉再登詳閑吏理科遷萬年主簿考京兆進士能第上下頗得一時之俊尋授監察御史裏行為北都留守推官入臺為真監察避同儕素嫌辭不與齒除河南府司錄旋為天平軍節度判官得改員外郎所奉之主即故相國令狐公也丁內艱服闋故李相國紳請為浙東團練副使賜緋魚袋後辭職居洛授檢校主客郎中知鹽鐵福先院非其好也擢萬年令澤州剌史又改太原行軍司馬兼御史中丞加金紫從狄僕射之幕徵為太府少卿改泗州剌史歷光祿卿晉州剌史入拜司農卿時內尚食供億縣官有闕為其奏累貶均州剌史陞壽州團練使公當官剸據率有良算雖繁劇之來千變萬態一以成機應之故日用公事圭稜歲校能有餘裕所謂循良高妙無跡可尋者耶今上初即位以理行徵拜京兆尹京師稱難治者日有生事隨時抵巇間不容髮未易以繩墨一面律也濶狹小失其機則見立敗雖有神明之用無及已公能勺藥其間安然無一事如弄小方州云奉南郊備赦令上下百役抑揚豪弱無不得其平居二年乞退除同州剌史長春宮使加左散騎常侍兼御史大夫百粵之地其俗剽輕獵浮淫之利民罕著本又遠天子之法稅調裒急一舞於吏手故細胥假校益豪民用是困從公至鋤侵牟之窟削冒名之吏盡反為民煩促頓舒流庸盡復先是海外蕃賈贏象犀貝珠而至者帥與監舶使必摟其偉異而以比弊抑償之至者見欺來者殆絕公悉變故態一無取求問其所安交易其物海客大至越人尚鬼事有寘冥者不質於醫而交於神寢以成風公醜其邪命撤屋塗扉禁絕紛紛之禱或曰將不利於公不聽他日秋水大溢將沒民居訛言毀神而致公譔服登城向水酹酒而聲曰苟如云云長吏身存無嫁下人俄而斂退卒無害焉鍼肓反正皆此類也政成亟上疏請覲優詔留之越三歲寢疾薨於位實大中五年七月二十三日享年六十有八天子為之不視朝一日贈工部尚書明年二月庚申祔葬少陵原之世墓比薨醫問相屬比葬弔贈之使交逢凡在嶺之南軍吏與民及部屬鰥寡士子魋髻之族聞公之喪皆哭失市與宴公篤孝睦親㣥昆弟之貧與子姓之孤者收接如歸婚配慰薦惟恐不得其所居弟誨之喪傷哭變白惻動君子與朋友盡誠信於然諾踐報之道不怠如癖名人偉士多與深善樂後雋特露精誠比比得之力仁誼懲華侈下席之日家無池館疏屬出涕平生行事可知已娶監察御史博陵崔昇女先公而歿二子長曰參文太子校書次曰溫文華州參軍一女始歲方大病囑其後曰無厚葬無用鼓吹無煩諡於有司志我墓者無如故人趙君檜焉若夫碑則俾我外姪蕭鄴為之銘庶乎實而詳也其敢以辭遂為銘曰雄操京兆奄宅大州太尉之後惟公得侯儒衣極摯公慊人優業術益然及親勇誼善植牧全始卒無媿融鴻清洋式彌乃嗣茲圖石刻以永厥懿商伯以遷汪洋其源至漢始著聿為盛門徙居杜陵承繼遂蕃用儒持家世世顯尊歷隋入唐或軒或庳起墜誠難肖隆匪易尚書之生實屬太尉有庸有基可席而位公獨後之孑孑自致追念顯考詘於其身如不我力曷顏於人由卑至鉅能以才振小大之治有脊有倫涪昭宗時歷官金部郎中河南少尹國子祭酒詹事府丞余嘗於學古問政之暇而究風俗之不正者或未造其理則病之於心爰自秦漢迨於近世凡曰乖盭豈可勝道哉前儒廣學刊正固已多矣然尚多漏畧頗惑將來則書傳深旨莫測精微而沿習舛儀得陳愚淺撰成五十篇號曰刊誤雖欲自申專志亦如路瑟以掇其譏也敬官祕書省校書郎李翰林名白字太白以詩著名召入翰林世稱才名占得翰林他人不復爭先其後以脅從得罪既免遂放浪江南死宣城葬當塗青山下李陽氷序詩集粗具行止敬嘗遊江表過其墓下愛其才壯其氣味其嗜酒知其取適作碑於墓且曰先生得天地秀氣耶不然何異於常之人耶或曰太白之精下降故字太白故賀監號為謫仙不其然乎故為詩格高旨遠若在天上物外神仙會集雲行鶴駕想見飄然之狀視塵中屑屑米粒蟲睫紛擾囷蠢羈絆蹂躪之比又嘗有知鑒客并州識郭汾陽於行伍間為免脫其刑責而奬重之後汾陽以功成官爵請贖翰林上許之因免誅其報也又嘗心許劍舞裴將軍予曾叔祖也嘗投書曰如白願出將軍門下其文高其氣雄世稀其本懼失其傳故敘傳之太和初文宗皇帝命翰林學士為三絕贊公之詩歌與裴旻將軍劍舞洎張旭長史草書為三絕夫天付上才必同靈氣賢傑相投龍虎兩合可為知者言非常人所知也夫古以名德稱占其官諡者甚希前以詩稱者若謝吏部何水部陶彭澤鮑參軍之類唐朝以詩稱若王江寧宋考功韋蘇州王右丞杜員外之類以文稱者若陳拾遺蘇司業元容州蕭功曹韓吏部之類以德行稱者元魯山陽道州以直稱者魏文貞狄梁公以忠烈稱者顏魯公叚太尉以武稱者李衛公英公以學行文翰稱者虞祕監唐之得人於斯為盛翰林其以詩稱之一也予嘗過當塗訪翰林舊宅又於浮圖寺化城之僧得翰林自寫訪賀監不遇詩云東山無賀老却棹酒船迴味之不足重之為寶用獻知者又於歷陽郡得翰林與劉尊師書一紙思高筆逸又嘗遊上元蔣山寺見翰林讚誌公云水中之月了不可取刀齊尺量扇迷陳語文簡事備誠為作者附於此云會昌三年二月中敬自淠水草堂南遊江左過公墓下四過青山兩發塗口徘徊不忍去與前濮州鄄城縣尉李劭同以公服拜其墓問其墓左人畢元宥實備灑掃留帛丿糸帛具酒饌祭公知公無孫有孫女二人一嫁劉勸一嫁陳雲皆農夫也且曰二孫女不拜墓已五六年矣因告邑宰李君都傑請免畢元宥力役俾專灑掃事嘻享名甚高後事何薄謝公舊井新墓角落青山白雲共為蕭索巨竹拱木如公卓犖天長地久其名不朽此為祭文寫授元宥又為碑曰貴盡皆然名存則難故余重名不重官作李翰林碑十五字而已素平州人寶歷初進士太和二年舉賢良方正直言極諫第三等官中書舍人皇帝嗣位之年衆靈悅附日月所照莫不砥屬是以遠夷慕義琛賮鼎來用文明以為理洞風露之所啟草木暢茂山川景清擊壤鼓腹莫識由乎帝力矣嘗因勝日聖思閒遠倦大厦之講習想鮮原之遊衍乃命法駕備宮馭細草迎輦神飇引衣超然肆行造適自得視往昔之遺館獲漢京之餘址邈風光以遐矚眇思古以論都襟靈洋洋周視若感者久之於是召左護軍中尉志宏指示之曰此漢遺宮也其金馬石渠神池龍闕往往而在朕常以古事况今亦欲順考古道訓齊天下也至是遐歷恍然深念且欲存列漢事悠揚古風耳昔人有思其人猶愛其樹况悅其風登其址乎吾欲崇其頹基建斯餘構勿使華麗爰舉舊䂓而已庶得認其風烟時有以凝神於此也於是命工度材審曲面勢裁成法度以就斯宮攢櫨栱密玉石碧瓦龍錯層軒鳥跂崇墉粉靜璇題月照舒廊四注以雲委隆臺分據而山屹蟠虬蜿蜒鱗動梠桷蹲獸却騁姿雄欄檻宏袤乎豁達跨臨乎涇渭綠竹凝遠繁松藹深奇樹流光丹墀迴遶於是闢戲馬之廣場開遠目之閒館天地景新山川勢重迴太華之秀氣列終南之翠屏九嵕而固護八水分流以縈帶而又揚太液之波繚周帝之垣原隰成文丹素含華翼樓杳以分張雄虹直而中峙神機一發廓若懸寓祥煙瑞彩鬱鬱葱葱瞻迴途以下濟撫璇璣而高視見秦川風物漢原邐迤感前王興廢知稼穡艱難吾君用此鏡是非闡思慮豈獨資耳目縱遊玩也凡殿宇成構總三百四十九間工徒役指萬計武夫奮力將校呈䂓然而材匪藻梲塗惟儉靜經之營之不日而成也按漢史高祖初定天下悅卜洛之邑為天地之中有周室遺風將都之婁敬諫曰陛下取天下與周室異不可居也夫洛陽四戰之地豈若秦川天府之國山河形勝真百二之勢乎高祖是日駕如長安其後七年北擊韓王信相國蕭何居守而營未央宮因龍首山作前後殿建觀闕街道周迴七十里臺殿四十所帝還見之怒曰何治宮室之過度也何曰天子以四海為家非壯麗無以重威德帝悅而就居焉自漢元年乙未歲至聖唐會昌元年之辛酉凡一千四十有七年矣其傾頹毀圮悠然邈然竟無有存之者我后緬慕古昔之興時即其舊而新是圖築摧基而繩脩木不侈不約巍然嶷然時以通覽無方周視有截則有若志宏奉聖君之旨也志宏姓魚氏代宗皇帝之功臣朝恩之孫也以績効而封國公由忠義而位上將自總右廣貞心冠古陛下龍昇大寶光啟帝運左右同德東西一心變生人之耳目煥大明之徽懿武力忠壯元機天啟式是萬旅吾唐有人由是委以腹心寄之環列上曰忠為令德有若士良志宏為吾左右矣明年上親見祖考郊天神雪灑川原塵清城闕陽和風扇綠野煙澹是月也三辰承初以表無事上乃顧新宮迴玉輦列騎雲動彩仗天旋乃出金風由是乎造於未央俯仰周視肅威神而煌煌遊焉息焉容與悅懌晴山屏開以四遶故城巉然而隱嶙鮮風美景薰然入座上從容言曰吾今建是殿且錫之以嘉名其殿曰通光其東曰韶芳亭其西曰凝思亭乃立臯門曰端門其應門題曰未央宮所以志大臣之忠力且不忘吾好古也乃命侍臣曰爾為我記之刻以貞石傳示乎不朽臣素任當承旨不敢固讓惶恐拜舞而文之時會昌元祀濡大澤之明月也謹記
