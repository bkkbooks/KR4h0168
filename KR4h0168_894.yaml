front:
  text: 全唐文欽定全唐文卷八百九十四隱字昭諫餘杭人屢舉不第光啓三年吳越王錢鏐表奏為錢塘令遷著作郎辟掌書記天祐三年充判官梁開平二年授給事中遷發運使是年卒年八十餘
  hash: sha256:9369f4e71be5cbe825646498f3de3d1d4add07790db8861922e3db9a050f3348
  markers:
  - {type: head, offset: 14, content: 羅隱, id: KR4h0168_NFKB_894-h1, level: 1}
body:
  text: 秋蟲蜘蛛也致身網羅間實腹亦網羅間愚感其理有得喪因以言賦之曰物之小兮迎網而斃物之大兮兼網而逝網也者繩其小而不繩其大吾不知爾身之危兮腹之餧兮吁鄒生閲相如之詞呀然解頤曰善則善矣猶有所遺梁王屬酒盈巵惟生少思苟有獨見吾當考之生曰若夫瑩淨之姿輕明之質風雅交證方圓間出臣萬分之中無相如之言所見者藩溷槍吹腐敗掀空雪不斂片飄飄在中汚穢所宗馬牛所避下下高高雪為之積至若漲鹽池之水屹銅山之巔觸類而生不可殫言臣所以惡其不擇地而下然後浼潔白之性焉梁王詠歎斯久撤去樽酒相如竦然再拜稽首若臣所為適彰孤陋敬服斯文請事良友惟屏者何俾蕃侯家作道厄為庭齒牙爾質既然爾功奚取迫若蒙蔽屹非裨補主也勿覿賓也如讐賓主牆面職爾之由吳任太宰國始無人楚委靳尚斥逐忠臣何反道而背德與枉理而全身爾之所憑亦孔之醜列我門閫生我妍不既內外俱喪須是非相糾屏尚如此人兮何知在其門兮惡直道處其位兮無所施阮何情而泣路墨何事而悲絲麟兮何歎鳳兮何為吾所以悽惋者在斯齊侯幸晏子所止引目長視曰彼也何哉如蜂如蟻萬貨叢集百工填委紛紛汨汨胡可勝紀嬰曰臣以敝廬在此聞於此見於此其名為市若乃羲軒以前臣不得言羲軒以後臣知其故先已後人惟賄與賂非信義之所約朿非法令之所禁錮市之邊無近無遠市之聚無早無晚貨盈則盈貨散則散賢愚並貨善惡相混物或戾時雖是亦非工如善事雖賤必貴參雜胡越奔走孩稚扶策而來挈提而至剞劂形狀圬墁口鼻童頂而跣嚲肩而帔兼之以耆艾繼之以諧戲誰有帳籍詎假文字蜀桑萬畝吳蠶萬機及此而耗繄何所之東海魚鹽南海寶貝及此而耗其誰主宰君勿謂乎市無技歌咽舞腰賤則委地貴則凌霄君勿謂乎市無門可南可北陰陽迭用人之消息市之衆不可以言或有神仙市之雜不可以測或容盜賊捨之則君子不得已之玩好撓之則小人不得已之衣食公曰始先生以踊屨之譏革寡人之非今先生以交易進退袪寡人之蒙昧彼主之者魁帥張之者駔儈吾知之矣謹以從政庶無尢悔嵗在甲申余不幸於春官兮憑羸車以東驅闕魏闕之三千兮得隨家之故都喬木拱立以不語兮繄今昔之自離慨餘基之未平兮曰迷樓而在斯迷樓者何煬帝所制煬襲文後天下無事謂春物繁好不足以開吾視謂春風懶慢不足以欣吾志斯志既熾斯樓乃峙榱桷沈檀棟梁梓將使乎旁不通乎日月外不見乎天地然後朝奏於此寢食於此君王欲左右有粉黛君王欲左右有鄭衛君王欲問乎百姓曰百姓有相君王欲問乎四方曰四方有將於是相秉君恩將侮君權百姓庶位萬戶千門且不知隋煬帝迷於樓乎迷於人乎若迷於樓則樓本土木亦無親屬縱有所迷何爽君德吾意隋煬帝非迷於樓而人迷煬帝於此故曰迷樓然後見生靈意臣鏐言伏承恩旨賜臣金書鐵券一道恕臣九死子孫三死者出於睿眷形此綸言録臣以絲髮之勞賜臣以山河之誓鐫金作字指日成文震動神祇飛揚肝膽伏念臣爰從筮仕逮及秉麾每自揣量是何叨忝行如履薄動若持盈惟憂福過禍生敢冀慎初獲末豈期此志上感宸聰憂臣以處極多虞慮臣以防間不至遂開聖慮永保私門勗以功名申諸帶礪雖君親屬念皆云必恕必容而臣子為心豈敢傷慈傷愛謹當日謹一日戒子戒孫不敢因此而纍恩不敢乘此而賈禍聖主萬嵗愚臣一心臣鏐誠惶誠恐稽首頓首嵗貢賤臣隱既以文不得意且抱犬馬之疾於長安夏五月京畿旱癸已日聞詔大京兆用器水爐香蒲蕭絳幡輩致於坊市外門將以用舊法而召甘雨也臣踴起病榻間以為明天子憂人雖舜禹不如是之勤幸甚幸甚臣又聞水旱與天地同出苟時或然不可以倉卒除去今秦地旱已踰月矣而陛下禱祠亦已頻矣天之高地之厚五嶽之綿亙四瀆之宏遠陛下命百執事啓祈外何常不以心祝之雖莖稿苗乾而百姓不怨嗟者其感陛下之誠深也今以蒲蕭輩為請者豈陛下謂其能靈於嶽瀆者乎夫嶽瀆視陛下之公輔列陛下之土田苟陛下憂則嶽瀆亦宜憂矣受祭據封者尚未能為陛下出力彼蒲蕭輩復何足以動天臣為陛下不取也臣又聞天之有雨澤猶陛下之有渥恩雨澤可以委曲干之則陛下渥恩亦可以委曲干之矣臣聞天子有左右史將所以記事記言然後付太史氏臣必恐其得以容易編牘今冒死請追癸已日詔苟若陛下法十六聖之教訓雖五種栖野而百姓不暇掇豈蒲蕭輩之所及乎哉昔殷湯之代民不以旱為災仁聖之君在上也今旱未及殷代而陛下憂已過矣臣謹因旱以質萬姓俾其知陛下心二月中陳州一正字訪及具審博士攝理和適近日賢主司空政事才用洋溢談口斷割明快與敓有分守道者自然安矣况博士乎先太傅所作所立果有餘慶殊不知天道去人如此其近忭賀老叟十年來欲棹一船子從雲溪館前往東市竟無因緣此又何如哉近見陳正字否葉大德丁三傅知聞否老叟腰腳不支坐想勝遊目及千里朱十五李三史作何面孔高積薪何如因相見皆與話瞻泳也謹狀某去年秋嘗以所為文兩通上獻其貴賤之相遠崖谷之相懸且不啻千里故罪戮之與憫嗟不可得而知也由是卑拆慙蹙若不自容者以至於今然竊念理世之具在乎文質質去則文必隨之苟未去則明天子未有不愛才賢左右未有不汲善者故漢武因一鷹犬吏而子虛用孝元以洞簫賦使六宮婢子諷之當時卿大夫雖死不敢輕吾輩是以霍光貴也蕭望之責其不下士公孫述叛也馬援怒其陛戟相見一為權臣一為狂虜猶且不能下一書生而千百年後風侈敝斂居位者以先後禮絶競進者以毀譽相高故吐一氣出一詞必與人為行止况更責霍光怒公孫述者乎何昔人心與今人不相符也如是若某者正在此機窖中不惟性靈不通轉抑亦進退間多不合時態故開卷則悒悒自負出門則不知所之斯亦天地間不可人也而執事者提健筆為國家朱緑朝夕論思外得相如者幾人得王裦者幾人得之而用之者又幾人夫昔之招賢養士不惟弔窮悴而傷凍餒亦將詢稼穡而問安危嗚呼良時不易得大道不易行某所以遲遲者為執事惜苟燕臺始隗漢殿薦雄則斯人也不在諸生下前者吾子不以僕之暗鈍猥垂教示大相開發若非許與深至誰肯如是甚善甚善然其所道者正中僕嘗所自病者也僕少而羇窘自出山二十年所向摧沮未嘗有一得幸於人故同進者忌僕之名同志者忌僕之道無有不如吾子之所誨也然僕之所學者不徒以競科級於今之人蓋將以窺昔賢之行止望作者之堂奧期以方寸廣聖人之道可則垂於後代不可則庶幾致身於無愧之地寧復虞時人之罪僕者與夫禮貌之於人去就流俗不可以不時其進於秉筆立言扶植教化當使前無所避後無所遜豈以吾道沈浮於流俗者乎仲尼之於春秋懼之者亂臣賊子耳未聞有不亂不賊者疑仲尼於筆削之間况僕求試京師隨波而上逐隊而下亦有年矣家在江表嵗一寧覲旨甘所資桂玉之困何嘗不以事力干人苟利其出處則僶俯從事亦人之常情也在不枉其道而已矣道苟不枉以之流離可乎冠衣不能移人之迹顧所履何如耳言不忠行不信謂之君子可乎言忠而行信謂之小人可乎吾子視僕復苟合於不信不忠者乎非僕之不可苟合道義之人皆不合也而受性介僻不能方圓既不與人合而又視之如仇讐以是僕遂有狹而不容之説吾子果復發言及此是不以衆人見待也而今而後敢不安其所自然一科一級多難也有如是哉彼山也水也性之所適也而眷眷不去者以聖明之代文物之盛又安可以前所忌者移僕初心苟不得已僕亦自有所處大凡內無所疾外無所愧則在乎命也天也焉在僕與時人乎惟吾子勿憚相規之數也朝廷以簡陵九年彭虺肆螫而東南一臂為之枯耗其後吳卒以狼山叛則東西浙之筋力殆矣自爾天子不忍重困百姓由是官朱實爵諸葛爽秩安文祏皆自盜而升朝序也所以不幸者江南水鍾陵火沿淮飢汴滑以東螟故無賴輩一食之不飽一衣之不覆則磨寸鐵梃白棒以望朝廷姑息而王仙芝尚君長等淩突我廬壽燖剝我梁宋天子以蟣虱痛癢不足搔爬因處分十二州取將軍為節度非方鎮之無帥非朝廷之乏人蓋以將軍跳出隴右不二十餘年三擁節旄謂將軍必能知恩用命耳今聞㣥盜已拔睢陽二城大梁亦版築自固彼之望將軍其猶沸之待沃壓之待起也而將軍朱輪大斾優遊東道不知朝廷以八十三州奉將軍侍衛者乎抑將俾將軍旦夕翦此草寇也昔韓之醫良而性嗇故為人治未嘗剔去根源所以延其疾而養其財也後有商於韓者以疽見醫醫且欲大其疽而沽其直因以藥稔之而疽潰商斃商之家訴於韓韓侯尸其族而籍其有無且二賊齧壽春陷潁上刷亳社掠合肥經營於梁宋其為老者殺少者傷驅人之婦女輦人之財貨將軍固知之矣自將軍受命迄今三月關東之慘毒不解殺傷驅輦之不已乃將軍為之非君長仙芝之所為也文皇帝時衛公靖大帝時鄭仁泰薛仁貴或戢斂不謹或伺候輜重當時憲司悉繩以法今將軍勳業不若衛公靖之多也出師非鄭薛之敵也而橫擁仕伍鞭撻餽運以愚度之將軍之行酷於君長仙芝之行也甚為將軍憂前者天子慮將軍以愛子為念復授禁秩俾在軍前則朝廷寵待將軍倚望將軍也俱不淺矣苟將軍戮力以除暴推誠以報國今其時也無使躡韓之醫某啓某今月二日輒以近文一通上憑閽侍辭違既久僭越是虞勒蹇步以戴恩捨醫門而奚適伏念隨計渚宮之日求聞漢浦之年王儉望高芙蓉比幕陳琳筆健瑁為簪因矜窺豹之能遂竊登龍之譽習池侍宴峴嶺從遊許之以向者為文頗勝張詡戒之以偶然成事恐似李滂其後嵗月煎熬輪蹄頑禿僅逾十上幸免一鳴角羸而只有困時矢盡而未知降處間者尚書理兵夏汭栽柳武昌文聘江山粗資吟玩費禕欄檻聊奉登臨某比時嘗駐征撓仰趨畫戟方知叩洪鐘而待教指墜履以明恩而疾恙所牽依投不暇伏枕而初慙數蹇揚帆而竟歎途窮今則潁水政成旋為故事中台位闕已副急徵風雲將騁於康衢神鬼肯論於宣室輒預提勃帚先立邱牆雖哲匠掄材固須良木而洪鐘許叩豈獨兼金謹啓某啓某前月十八日輒以所為惡文上干嚴重尋嬰疾劣遂曠門牆伏以皎鏡無私雖容屢照醫門多病應倦施功忍隨翔鳥之姿更望不龜之術某滄州捨釣紫陌迷塵徒欲信書不能知命道薄而魚腮易曝計疏而鳬脛難加所以戚叩歌不惟長夜魏舒對策近至中年丹霄無獨上之期雙鬢有相輕之色而員外芝田養秀桂苑摛華口裏雌黃旋成典故座中薤白早避風流敢因誘善之初仰冀噓枯之便儻一掬華陰之土聊拭蘚文則數升涇水之泥永依清濟謹啓某啓某於今月三十日獲遂起居伏以黃闥尊崇雖容展敬白衣卑賤不敢興言今則輒於隕穫之間聊舉證明之事晉代則司空試劍漢朝則丞相問牛彼或以頑滯幽姿或以疲駑下乘猶能動搖至化感達深仁而况生稟五常早知恩義迹居十等不至輿臺伏思癸卯年中維揚城畔謝傅裂土疆之日羊公分節制之時珠履簪朝盈望府雞香豸角暮出行臺轉輸則萬井魚鹽統御則九州侯伯當時務重難之際是籌謀間暇之初南國佳辰長聞賦詠東山勝賞屢見篇題為教化之笙鏞作經綸之彩繪所以漢陽計吏得詣軍門厭次狂生叨蒙客禮憫之以轉蓬之質安之以負米之心進趨獲奉於麾幢俸入仍資於甘旨其後何武捧詔平陽走耳隱裝參佐廨中方虞浪迹新城埭下忽受溫言嗟其未了之身勉以難遷之性且憐色目猶可發揚某是以不揣狂愚重萌躁妄出則祝趙衰之日永冀流暄入則禱傅説之星惟希借耀今者風雨得生成之候爐錘升鼓鑄之司郭令軍前潛抽妓樂崔寧城外暗毀池臺登庸之時序未遙反斾之鎡基已兆若某者族惟單緒藝即中流旋以佩服殊私緘藏厚旨假昆蟲而稟信指簪履以輸懷竊以浪逼龍津風催律管魚皆五色禽必九苞揚錦鬐彩羽之姿俟啓蟄吹葭之便獨某行迷要路坐守窮株九品班資略非親舊六街車馬莫接聲塵捫心而一寸寒灰泣淚而萬行清血良時易失司馬遷猶是再三知已難逢越石父於焉感激相公儻或俯回衡柄曲賜裦稱雖朽蠹不雕則推常理而孤寒無命祇繫洪鈞謹啓某啓某聞元亮苦貧姑求彭澤戴禺多病遂乞海虞苟物役之是牽亦人情而斯見某族惟單賤品在下中三篋亡書幸無遺漏一枝仙桂嘗欲覬覦十年慟哭於秦庭八舉摧風於宋野近者以調甘軫慮負米攖心毛義前賢尚猶捧檄鯫生何者焉可守株勒氣馬以徐回解藩羊而適願前使常侍遽憐此志遂以奏官藉俸入於衡陽專表章於使府雖元瑜書記不足愈風而處士衣裘未嘗換雪斯亦冤鳥尚思於銜石愚公猶鋭於移山尋遇大夫輟夢軒宮吹暄楚嶠手中扇在河必袁宏天上才高寧惟公輔間者龍門掌貢馬帳搜遺泉客號咷只憂寶盡地靈惆悵不覺山空而某適限徐兵遠留吳會不得少將鱗鬣側望風雷指函谷以馳誠遙知氣紫上蘇臺而送目空羡河清今者輒奉危心來干畫戟大夫或俯回趙印下煦韓灰更於茶藥之中重假勾留之便所冀猶縻祿食遠救朝昏迹稍免於屢空心尚期於妄動百生可卜式占郭泰之龜一字為裦全繫宣尼之筆謹啓某啓某鏤冰伎短緣木計疏去年舍人俯念窮迷猥垂慰薦竟以梁危易折氣俗難醫負塵尾之高談困龍津之駭浪雖懷感激長抱憂慙今月八日見某官伏知德水回波重霑涸鮒靈丹減粒已救傷當谷鶯刷羽之秋是海燕窺梁之日豈謂舍人未容祈禱遽賜保明樹立孤株栽培弱蔓跪聽而淚霑胸臆仰承而背負邱山而况俗漸輕訛時交勢利或朝遊夕處或貴族華宗至於取事之時與能之際猶須必成桃李方許扶持若某者迹未及蕭階一作齋陳榻之嚴目未覩巢閣栖梧之瑞門寒於光逸命薄於黔婁縱饒委曲所私其奈纖毫無取必舍人知其殺青廢業二紀於茲垂白倚門一生禺望乃施陰德以慰歸心言念徘徊不知所處謹啓某啓某聞淮王鍊迹於真仙含靈盡去鄒衍移暄於寒谷衆卉皆芳豈羽毛可從於霓旌豈凋枿盡關於葭律蓋以至道無遺於一物殊私必及於㣥生某嘗佩斯言請陳丹懇間者豹藏不穩魚躍無成浼山公啓事之書纍王衍雌黃之口捫天莫及局地興慙向浮世以傷懷拊勞生而自喟光陰不駐齒髮漸高當家貧親老之時是失路亡羊之日淚將欲盡口不敢開直以非漢代之簪裾困晉朝之流品物彙雖逃於芻狗孤寒竟陷於蟲沙所以仰蟾桂之高高恐無仙骨覩魚鬐之斂斂忽有癡心竊希常侍從來許與之言作此改張之計俾其七郡與奏一官致之於髯參短簿之間責之以駑馬鉛刀之用所冀內資骨肉外罄筋骸但繫受恩何須及第必若終憐薄技尚憫前途則科號三篇判稱六部早嘗留意頗亦逼人將今晨禱祝之詞為異日覬覦之路情雖可恕僭亦堪誅對膠柱以軫懷願漆身而在此謹啓某啓某聞宋濟之困名場空餘坦率唐衢之升軍宴但益號咷斯人以當年不偶於良知晚嵗遂成其永恨况某早將此事以戒前車至願蹉跎年光老大向秦庭而屢泣抱楚足以頻傷中間輒以所著讒書上干閽吏近見某官伏知閣下爰哀弱植俯降深仁回日月於壺中展方書於肘後欲使徐甲之尸必起蔡經之骨重生仰嘉音而背若負山承厚旨而身如有翼既容託迹竊敢興言某動不知機進惟招毀忌王隱之名者虞豫暴蘇秦之過者張儀㣥居不出一言彼則謂某矜才傲物痛飲不逾三爵彼則謂某恃酒凌人何爭名競利之場有蠧節食苗之類苟非令君側耳於車上中郎注目於亭間則隨趙軛以長鳴與吳椽而共朽者也謹啓某啓某月日以所著讒書一通寓於閽吏退量僭越伏積憂惶某聞樊子昭之處屠沽發光輝於許邵郭林宗之遊鞏洛振聲價於符融其後物態乖訛風流委敗下有自媒之誚上無相汲之由某由是反袂興懷捫心注恨又安得不屬耳於輿人之論傾懷於長者之談而尚書以盛名鎮乎當時以盛德傳乎奕世不趦趄於闒茸不浮泛於姦回動則致聖主而活蒼生以為己任靜則導沖襟而養和氣以守家聲恭惟大朝屬在吾道若某者燎薪就學擲楯攻文一則以神氣低凡不足動王侯之瞻視一則以家門寒賤不足辱卿相之搜揚十年索米於京都六舉隨波而上下永言浮世堪比多岐所以覽嵇叔夜之書則伏膺戶外讀張季鷹之傳則大嚼窗間長恐一旦月桂情衰江蘋思起不得揖亠兊國山庭之相不得窺漢朝王佐之才是以重拂塵衣聊希藻鑒儻尚書以孺子可教則隨洛下之書生儻尚書以斯人若狂則訪江東之釣叟靈蓍神蔡惟禱所從謹啓某啓某前月二十五日以所著讒書一通上獻近見某官某乙伏承博士曲垂題品俯及孤危某聞孫陽以一顧之恩騏驥不為駑馬宣父以一言之重夷齊不作餓夫苟吾道之未亡諒斯人而何遠某也薪就學閲市成功偶不自量因思妄動捨五湖之高蹈事九陌之窮遊一作途為良工不度之才為要路不容之物所以嵇康奏樂忿魑魅以爭光劉子營生奈鬼神之相笑那言不幸一至於斯恭惟咸通之初大中之末故荊南余正字以博士為軒鏡庖刀今渭北徐端公以博士為靈蓍神蔡但言薄技合在殊私其後某則困躓於龍津博士則徊翔於鵷侶雖心祈目禱不忘斯須而天上人間憑誰訊問寧知此日屬在明思一作恩豈一旅人之遭遇有時而二作者之語言斯中永為負荷適足憂慙况復風訛俗敗之初轍亂旗奔之際講學則衛刀削樹論文則嬴火燒人家家無相保之心處處有自媒之口而博士獨持大斾高坐危城招既散之師徒復已亡之土地顧茲隆替尢屬尊嚴某也雖賦命以多奇或因人而成事願將所贄以賀明時謹啓某啓某聞大道五千所制者莫先於躁浮生七十所傷者莫甚於情某所以反袂興嗟一作懷支頤浩嘆顧兩端而若是持萬緒以奚歸爰念齠年即偕時輩胸中馬駿握內蛇靈入公孫龍之關不惟逞辨叱東方朔之御且欲獻書其後濩落單門蹉跎薄命路窮鬼謁天奪人謀營生則飽少於飢求試則落多於上東經海嶠受下館於諸侯西出劍門泣危途於丞相光景但銷於杯酌貨財不入於士冖柘裝傳書而黃耳增勞久客而黑貂兼敝間者郎中丹青演潤咳唾成音薦光逸之材以地寒為纍舉仲宣之賦以體弱見遺既興奔北之懷因指在東之念江夏則鋪名池口毗陵則堰號銅墩皆有主張以生鹽米郎中倘或言泉晚浹未忘淘灑之功談柄時回別借齒牙之助一作便俾得內資柔滑外救困窮然後驅淮陰入趙之師更謀背水整秦將渡河之卒重議焚舟目禱心祈言狂意迫其餘罪戾不敢逭逃謹啓某啓某月六日輒以所著讒書一通貢於客次遂歸逆旅載軫危途必恐員外以其姓氏單寒精神鈍滯汨在衆人之下遺於繁務之中某懷璧經穿壯年見志仲舒養勇何啻三年安世補亡寧惟一篋其後因從計吏遂混時人憤龍尾以不焦念魚腮之屢曝嵇康骨俗徒矜養性之能李廣數奇豈是用兵之罪事往難問天高不言去年牽迫旨甘留連江徼雖傷弓之鳥誠則惡弦食堇之蟲未能忘苦所以遠辭蝸舍來謁龍門黍谷棠陰方偕志願荷衣蕙帶不奈風霜負所業以長嗟向良工而有喟昔也松苗各性已知難進之由今則火木相生未測自焚之理謹啓某啓某聞足歷屠門尚能大嚼力疲吳坂亦解長鳴而况覩棠陰教化之原入黍谷暄和之景苟不能自提由瑟直犯孔牆則其人生為無益之徒死作無知之鬼某譙鄉賤族釣瀨遺氓巨下二卿素非朋執於陵一叟或與交遊偶然蒙郭泰之言歘爾厲蘇秦之志遂得麥漂風雨門長蒿萊旋慕題橋因吟入洛三秋旅寓身居計吏之先萬里徒行家匪大夫之後孰謂九街浪濶雙闕雲浮薑維之膽有破時李陽之拳無下處由是潛傷鮒轍暗泣牛衣賈誼長纓雖猶自運張儀健舌亦擬何為前窺而四海清平內顧而一身流落輒復徘徊鄭驛睥睨秦醫敢言畫虎之勤但有傷蛇之望謹啓某啓某聞歌者不繫聲音惟思中節言者不期枝葉所貴達情苟抑揚之理或差則流一作荒誕之辭亦棄而况委病鵲門之下一作外窺光龍燭之前上方於趙一遭逢下比於陸機榮顯雖倜儻不侔於二子而輝華敢讓於伊人今則住踰負嶽之蚊去切戀軒之馬輒復重將越調更唱燕臺以為京兆王章三冬有淚淮陰韓信一飯無門惟憂委骨窮塵敢望橫戈要路加以輕蹄逸軌猶祈公子王孫同窺萬頃波瀾各有一時顏色而某短袖難舞危條易風禱祠則天或未從號泣則人皆不弔由是飾裝增欷覽策興嗟指棨戟以凝神望爐錘之借便雖琳琅梓盡歸梁棟之間而藻荇蘋蘩亦戀池亭之內殷函軫念劉紙懸緘無言誓天有死銘德謹啓
