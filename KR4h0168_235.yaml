front:
  text: 全唐文欽定全唐文卷二百三十五文俊荊州江陵人武后載初年新豐因風雷山移乃改縣名為慶山文俊上書諫武后怒流嶺外為六道使所殺
  hash: sha256:3c1eddf1175f08701b86fc83eb10901499d6691bb39c17fc04e01de02637949c
  markers:
  - {type: head, offset: 14, content: 俞文俊, id: KR4h0168_NFKB_235-h1, level: 1}
body:
  text: 臣聞天氣不和而寒暑隔一作併人氣不和而疣贅生地氣不和而塠阜出今陛下以女主處陽位反易剛柔故地氣隔塞而山變為災陛下謂之慶山臣以為非慶也臣愚以為宜側身修德以答天譴不然恐殃禍至矣沖蒲州虞鄉人天授初為司府主簿賜爵河東縣男景龍中纍遷左散騎常侍歷太子賓客昭文館學士開元五年卒臣聞乾元資始而庶物形焉人倫既肇而族類詳焉姓氏之初代本著其義昭穆之序周譜列其風漢晉之年應摯明宗系之說齊梁之際王賈述衣冠之源使夫士庶區分懲勸攸寄昭之後代實為盛典自魏太和巳降作者彌繁或以八族品人倫或以九等量地胄爰洎今日年祀以淹冠冕之家興衰不一胥原欒郤有降夷品許史袁楊一時各盛豈可以曩時之褒貶為當今之軌模原始要終有所未允伏惟應天皇帝陛下誕膺靈命大庇蒼生道冠羲軒風踰韶夏損益前載垂範後昆帝緒皇源與天沖而比大良才人物掩姬漢而飛聲理當自我作古牢籠古昔豈可闕於著紀無示將來臣願得序大唐之隆修氏族之譜使九圍仰止百代承風豈不大哉豈不盛哉豫字建侯襄陽人徙家河南天授中舉手筆俊拔科補襄邑尉舉賢良方正異等天寶初纍官尚書左丞檢校禮部尚書封襄陽縣子七載卒年六十九贈江陵大都督諡曰文臣聞古先哲王躬親藉田者所以供粢盛勸稼穡俾夫海內元元相謂曰天子至尊也猶行三推之禮況乎田野農圃之人乎於是父勸其子兄率其弟躬耘力耕不避霜露故畝稅流衍國倉峨嶬帝堯之洪流包山天乙之巨旱爍石人無菜色用此道也自陛下允陟皇階未親帝藉伏願命有司具儀禮以來年春耕于公田躬執耒耜使黍稷豐備然享天于南郊宗祀先聖于明堂大孝蒸嘗于茲為盛豈止年登歲稔如坻如京而巳哉錫爵啓土將以疇庸開國承家寄于令嗣乙受封一邑參榮五等高門不昌厥子嬰疾昔郤克為使取笑齊人孟縶不侯稱于魯史況主喪祭之禮如有朝覲之儀繼代非輕擇賢而立有符故事無爽通途夫靈鎮三峯倚京師而西峙榮河一曲抱華陰而東注故川嶽氣交雲雨時出感降才傑紛綸元勳冠世為強家宅滋沃土者其惟宏農楊氏焉曰我伯允厥自唐叔關中相府乘朱輪者十人洛下儒門登衮職者四代慶靈不隕以生我高都公公諱仲宣字蔓後漢太尉震之二十代孫也自高祖至於大父並名播海內迹存朝端舊史前碑其詳之矣烈考皇孫刑部尚書魏國忠公元炎屬姦臣擅命明辟應期功濟中興安劉氏者周勃禮優歸老論叔向者祁奚出處全身忠貞盡節公即尚書府君之第三子也粵在幼齡夙有至性事魏公莒國夫人以孝聞宗族推稱州閭籍甚清真邁俗秀楚不㣥氣和可親色厲難犯言必合禮動不違仁集七略之書名高漢閣作三都之賦價重洛城未弱冠以通經為修文生授右千牛光朝選也秩滿補太廟丞以親纍出為蘄州司戶參軍屬先尚書辭滿告歸公罷官就養潁曲別業地連嵩高邱中有華孝子潔白之興川上有水漁父滄浪之歌溫凊獲申隱淪兼遂橫為酷吏王勗所誣陷貶授雟州臺登縣尉劒南節度使益府長史韋抗奏公為管記飛書之急倚馬立成尋有詔停官歸侍俄丁尚書府君憂鞠凶而降哀毀骨立殆不勝喪取全於禮服闋從常調吏部侍郎魏奉古早以文伯期於王佐乃授河南府河陽縣尉尋應藻思清華舉今上親試對策甲科除蒲州司法參軍丁莒國夫人憂杖而後起公居魏公之喪也服闋不仕為叔父瑤所敦逼不獲巳而應命其年糊名考判公居上等乃擢拜監察御史獬豸之角初見觸邪雞棲之車還聞嫉惡坐剛直出為汾州孝義縣令前宰無良下氓失業稼穡之地半為荒疇桑榆之人多在逋藪公曉喻歸本流亡盡復既富而教厥土有年故得雉馴郊田鸞降庭樹刺史蕭恕乃圖畫其像郵傳以聞天恩疇庸璽書褒美乃除華州下邽縣令辭疾罷職求歸養間無何除河南鞏縣令所歷為政有逾于前尋遷禮部員外郎歷左司員外郎春官之屬以和神人左轄之佐以正綱紀乃轉吏部員外郎九品之曹一臺之劇有簿書以旌淑慝擇刀筆以決否臧于是乎以公滅私秉心匪石剖疑析滯揮翰如流選部以清繄公是賴尋遷本司郎中乃統胥徒是稱小選峻以風檢請託不行絶其關梁僥幸自息若乃見理之速持事之堅雖有賁育之勇金張之勢曾無恐懼不可動搖不陟台階奄先泉壤悲夫以開元二十九年七月五日遘疾終於萬年永寧里之私第春秋四十有九以其年十月十七日歸葬于閿鄉牧馬原禮也惟公自家刑國曰仁與義厚利者常流之所重公以先人邑入盡分諸孤善交者衆人之所艱公以結下朋遊曾無凡客士有險陂比鄰不通人或急難傾家以濟素懷儉約雅好真如不服綺紈不食葷血雖粉闈有閌朱紱斯皇不易貴賤之心能全始終之節嗟乎譽高千載道屈一時漢之崔駰官終邑宰魏之管輅位止府丞天乎與才而人乎無命自古所歎豈獨高都而巳府公所著文集十卷盛行于代嗣子輪行太常寺奉禮郎次子轅轍轔輯等永惟過庭之訓式遵卜宅之禮靈轜戒道哀挽及關靈掌東拓地惟鄉縣拱樹西靡心存帝京銘曰河之靈華之精人之傑國之楨年不永位未亨閉泉路兮冥寞空歲陰兮崢嶸嘉謨雍州武功人舉進士中興初為左臺監察御史嘉謨與新安吳少微同官友善屬詞皆以經典為本人欽慕之稱富吳體客有鴻盤京劇者財力雄倬志圖豐茂繡轂生塵金羈照路清江可涉緑淇始度拾蕊歲滋摘芳奇樹錦席夜陳苕華嬌春瑤臺吐鏡翠樓初映俄而世姝即國容進疑自持兮動盼目爛爛兮昭振金為金義兮十二行錦為履兮五文章聲珊珊兮佩明璫意洋洋兮若有亡蹁躚兮延佇招吾人兮由房凝釭吐輝兮明燭流注願言始勤兮四坐相顧時峨峨而載笑唯見光氣之交騖夜如何其夜遲遲美人至止兮皎素絲秉明心兮無他期夜如何其夜巳半美人至止兮青玉案之死矢兮無雕換既而河漢欲傾琴瑟且鳴餘弄未盡清歌含韻歌曰涉緑水兮採紅蓮水漫漫兮花田田舟容與兮白日暮桂水浮兮不可度憐彩翠於幽渚悵妖妍於早露於是覽物遷跡徘徊不懌起哀情於碧湍指盛年於光隙擊節浩歎解珮嘉客是時也楊雄始壯相如未病復有鄒枚藉藉荀令咸娛座客嬉妙情灑豪翰動和聲使夫燕姬趙女衛艷陳娥東門相送上宮經過碧雲合兮金閨暮紅埃起兮綵騎多價奪十城之美聲曼獨立之歌況復坐絃酌而對瑤草當盛明而謂何臣某言今月七日奉十月二十三日制書大赦天下日者關輔之地鑾輅曠遊山川望幸積有年歲是以西土耆老東首纍祈濬城隍修宮室考舊邦之式稱長安之盛福應旋至嘉穀屢升故奉時無違乘輿乃降六龍大動㣥方咸悅蓋三光增曜而漢祚隆萬戶加嚴而高居壯紫宸端拱朝諸侯而垂統鴻霈流恩申三宥而作典浹洽遐邇孰不抃躍臣寄重軍州地連肺腑載覃天恩不勝悅豫無任踴躍之至謹奉表陳賀以聞謹言臣某言伏奉二月十四日敕賜臣絹一百匹又奉其月二十六日敕除臣男之輔尚舍直長史麗澤之來匪月而降受賞轉級惟臣及子寵渥所分臣無與二夙夜惶悸萬殞增惕然旌節所統緣邊千里禦寇既廣兵賦自殷受任非據屢移年祀未能司大事而靜外虞汔小康而蠲內役而崇班厚貺載在臣門將何以祗拜殊渥光顯休命此微臣所以有死無報也南望闕庭以榮受懼無任悾款之至謹附表陳謝以聞臣某言伏奉車駕以今月二十二日西至長安臣聞咸秦奧壤河洛舊區王者是宅因時順動故睿情載佇西眷邦土玉軔金根天旋雲被皇輿凱入在藻知歸臣忝葭莩謬膺垣翰尹京靡託陪鑾遂阻紫宸漸遙丹慊空積伏惟祁寒在候輦路逶迤法駕就蹕聖躬多祜然後闢天陛而臨舊都巡卜征而考元吉者也無任悅豫之至謹遣某官奉表以聞遂初萬歲通天中登第九土之宜高卑異等百川之勢面背殊源所以堤設沈薪以防其溢河流酸棗竟被其災今者津吏所陳水浸方盛請毀堤而取便遂抑強而扶弱考古頽傾之異前後乖奉之宜疑未爽河渠之篇深符溝洫之記工人有諍即事雖通請更辨於今形方可遵於古典佺期相州內黃人第進士神龍中歷官太子詹事開元初卒峽山寺者名隸端州連山夾江頗有奇石飛泉迥落悉從梅竹下過渡口至山頂石道數層齊房浴堂渺在雲漢神龍二年夏六月豫投棄南裔承恩北歸結纜山隅周謁精舍為之賦焉峽山精舍端溪妙境中有紅泉分飛碧嶺若乃忍殿臨岸禪堂枕江桂葉薰戶蓮花照窗銀函獅子之座金剎鳳凰之柱野鹿矯而屢馴山雞愛而頻舞千層古龕百仞明潭幡燈夕透杖鉢朝涵炎光失于攢樹涼風生于高竹仙人共天樂俱行花雨與香雲相逐法侶徘徊齊房晏開心猿久去怖鴿時來走何為者竄身炎野旋旆京師維舟山下稽首醫王誓心無常向何業而辭國今何緣而赴鄉豈往過而追受將來愆而預殃即撫躬而內究幸無慝以自傷心誤辱而知忍迹繫窮而辨方嘉邇來之放逐為吾生之津梁縹眇之閒有禪關焉俯尋碧灣敕特賜之廣厦兮名標峽山嶄然七十二峯兮高侵雲漢亘爾百千萬紀兮永鎮人寰切惟羊城王嶺之要衝清遠諸峯之高壓中有絶境山名曰峽㵎穿一水之流旁列兩峯之夾層崖邃谷謺屏帳以重圍怪石奇峯聳樓臺之高插山尖兮嶺危天環兮地旋前山踴兮龍奮躍後山猛兮虎蹁躚冠出巫山之十二高超法界之三千霧鎖烟籠真物外虛無之境月明風裊實壺中未有之天春木茂兮翦琉璃春花開兮靄蘭蕙夏風涼兮來殿閣秋霧冷兮滴松檜冬爐暖兮新炭酷歲醪酌兮杯盤美壯蓬萊三島之居類天闕五雲之際間憑晚閣指天外之霞飛夢斷曉鐘聽雲閒之鶴唳記事者曰昔在梁武帝統臨幅員極降二庶子之青襟疑來五羊之穗鞭其後化遊士以去此託舒州之夢焉于是雲奔電激神殿一霎而至止雕梁峻柱金身丈六以巍然爰立靈祠居二禺而作鎮中有梵剎㣥列釋以安禪輒有怪異紛紜神靈出沒達磨石兮聖蹟俱存觀音泉兮源流不絶老人松畔竹交加白泡潭中魚跳躍猿環不見時聆古木號風犀鎖巳沈夜有寒潭浸月更復臺高獅子巖産金芝蘚斑斑兮定心石水渺渺兮放生池龍磨角而江澄素練嶺蟠縹而雲走輕旗舍利塔兮觀神人之現波羅樹兮聞異香之奇烟鎖釣魚臺往事空追于趙子雲迷和光洞今人莫見乎昌期雲衲來遊琴書投靜恬然淡泊于吾是酩役役芬華而非所競何妨拚峽山之遊恍乎步蓬萊之境羌蝴蝶之可喜兮紛化育乎陽和二角六足蠕腹狀蛾脈紺縷以元翅點赭珠以緗窠淩獵蘭蕊噓吸蕙葩飛將進而又退兮含百態以委蛇豈帛丿糸舞而不懈兮奈衆芳其鑠何圖君子之翠屏儷綵族而星羅蒙左右之深賞況夢寐之所嘉維景雲二年歲次辛亥十月壬寅朔十日辛亥皇帝若曰於戲咨爾故章懷太子良娣張氏家承峻閥代襲徽猷法度有章言容克備始應良選入奉元儲柔規緝於上下淑問揚於中國恩絶賓帝七日無歸義申從子百齡先謝言念窀穸憫悼良深追崇徽號典故斯在是用命某官某乙冊爾為章懷太子良娣魂而有靈膺茲寵數維景雲二年歲次辛亥二十日癸亥皇帝若曰咨爾金城公主幼而敏惠性質柔明徽藝日新令容天假先帝承皇祖之寶訓繼文成之舊姻割天性之慈徇安人之業何蒼生不幸紫宸厭代朕勉及丕業兢守大烈永懷同氣注心遺體靖言河湟無忘鑒寐湯沐之數信命之勤追平昔而載深於骨肉而加等於戲禮之隆殺大繫于情情之厚薄抑亦在我今猶子屬愛何異所生然叔父繼恩更思敦睦是用命朝散大夫試司賓少卿護軍曹國公甘昭充使試詹事丞攝太子贊善大夫沈皓仙為副持節往冊爾為朕長女依舊封金城公主率由嬪則無替爾儀載光本朝俾乂蕃服豈可不慎歟議曰臣聞表終受名按存考行王姬內範胎教潛流徽問積中知之在下公主降靈宸極升慶高禖貞惠日嚴柔明天縱英姿灼乎齠齔夙智形于襁褓孝為德本資色以養親禮即敬輿履謙而軌物生成天族長自華宮珠玉滿堂不忘於浣濯歌鐘成列載玩於圖史恭聞懿風庶覩嬪則未延百兩奄遘重泉皇帝正位瑤圖追榮金榜穠華失秀軫餘悼於生前彤管凝芳追令名於沒後謹按周禮諡法容儀恭美曰昭慈仁短折曰懷請諡曰昭懷公主謹議少微舉進士調晉陽尉中興初拜右臺監察御史臣仁亶言今月一日春官牒至皇帝陛下去月二十五日光臨寶極誕告萬方億兆㣥生抃舞欣賀中賀臣聞皇天愛人則有非常之主聖人受命必復先王之業伏惟皇帝陛下明德動天輯寧國家張乾坤之重位紹文武之耿光日月再貞正朔惟序百神啓佑九服咸若天下元元不勝慶戴臣夙仕皇朝被荷恩化荏苒勤役復遇聖明枯朽再生慶抃之情特萬恆品臣忝慶州域未獲馳賀闕庭臣某言伏奉某月日恩敕以臣男某為某官臣實多幸偶遭皇運鳴玉以相建土而王大錫崇榮斯亦極矣先臣老母復荷渥恩追亡寵存光被窀穸自妻及弟雙綬六珈闔門振耀惶懼未巳今臣子某年方髫齡服臣之榮為祿巳甚更承天秩將何以堪殊澤荐臨斯厚臣寵敢不祗奉拜命之休無任悚荷之至臣某言臣亡父某昔在聖朝纍蒙進任亟登麟閣纘校祕文衛迹鳳池翊謀神化內陳青瑣之拜出有朱輪之寵何其休哉而恩榮未報釁禍潛起闔門而就拘連頸而待戮陛下發雲霓之彩回霜電之威捨過好生全棄嶺表一蒙渙汗欣借命之恩萬里奔波無乞骸之望竄身邊裔皓首荒隅以臨年之危坐炎方之瘴雖欲勿死其可得乎遠謝闕庭奄先泉路旅櫬期朽今猶未還興言血下號懼交集臣某中謝陛下通天之歲復降恩敕追魏某崔某及臣亡父等赴都元忠或入處台相出臨藩牧門庭曜軒組之榮妻子厭梁錦之美其李乙雖死亦蒙贈官子某又登微職惟臣一門之內存亡俱不霑恩臣之不天亦胡顏上訴然比生則孤臣豈敢同死則存李獨優皇天平分豈其偏施伏惟皇帝陛下惠育㣥生無幽不燭臣之孤苦皇天所鑒父終嶺外喪在關中宇宙雖廣無一廛之地弟妹幼稚絶斗舂之儲兩柩雙魂未遑安厝臣所以鯁情割懇忍而未死者竊為此耳倘雲雨之賜復潤無私則南有歸來之魂北無高堂之位臣之罪也不任崩迫之至謹奉表以聞輕觸宸嚴伏知待罪臣聞鼎者夏后氏作㣥牧貢金遠方圖物備諸山澤以禦魑魅厥後嗣德昏亂鼎遷於商夏之寶也不足徵殷既有之又患失之周德休明神寶不墜百代可繼伏惟陛下光大而當之若乃崇貫之器金玉之鼎鎔首山發脽上列太廟序明堂克昭靈命以奉上帝非愚臣所敢議臣聞禮之興也始諸飲食故先王之制日舉九鼎蓋芍藥淳熬滌瀡膏餌御九州之美順四時之和臣所以征繕北金敢貢新鼎夫有器必有銘臣竊見九州攸同乃述九號夫永昌天中所以基皇周也長安及岐所以紀靈瑞也武興建都所以光帝閈也日觀云亭所以美升中也少陽載青所以冀儲德也東原砥平所以廣封植也江都淮海所以肆朝宗也江陵作鎮所以制荊蠻也成都奧區所以遏珍貢也夫此九者誠不足揄衍鴻休昭振方統庶覩者美其所稱知有由作微臣朽老不達有慚歌頌塵八命之寵章負中軍之重任匪躬厥獻伏表汗流其九鼎銘謹敢列上謹遣某官奉表以聞僕抱書劒河洛歲月多矣曷常不憶林宗想元禮慨然今古追思盛德有太原莊闕一字雄材特達信而好事招奬英奇亦千載一時也取樂文翰不孤風景置旨酒命㣥公列坐層樓觀望天地烟霞咫尺左右娛賓山水淒清縱橫在目其時既晚其日將闌度北牖之涼風下南端之白石覽物增思遊子多懷乃眷斯文期乎不墜云爾夫鐘者梵場之信鼓也聚萬法者莫大乎信鼓是故佛置信鼓所以窮遠究微一切賢聖恆河沙數者也所以開教設敬使天下之人善勸而淫懼也所以制鬼神之端而魔魅不得閃其姦義剎不得載其毒也故以聽則不惑以念則受福者信鼓之謂矣洞夫樹之而不朽攻之而不匱揚言曰皇后之舊業也飛龍在天載華厥號殿赩翼庭煌煌井甃不改耽耽萬構有鐘在堂窕而不滿越相公御史大夫巨鹿魏元忠仗旄鉞振金鼓發秦兵河卒利伐玁狁鉤車逐而北之於是休兵十月入自禪關聞鐘聲薄而觀之曰斯一鼓鐵也曷以昭蘇㣥聾光響皇梵願稅金紫之秩賈梁岷之銅張而鏞之俾兵哮吼埏周俶字會東郊不開公於是再有盧龍之役天子申命執金吾南陽張公仁亶以魏公之事端尹北京保釐府戎左右梁葉纂鑄洪器庀工慮鈞塗坯堪劂壤象睎炭隧宣火房盍缺飛廉扇回祿金光鑠鉛液注煎準沸渭爛烻烘赫重雲焮寶界鬱攸而不可響者旬有日矣乃撤乃相制作可觀嘗試而鏗之聲聞于天得未嘗有大而不槬敏也長而不掉正也固而無瑕忠也扣之則應信也大扣則粗厲而猛奮勇也小扣則清逾而溫韻仁也剛而為圜天也含章可貞地也非夫虛妙純粹幽贊而不測者孰能致於此故良冶歔欷㣥真恞躍自相與建高臺於西廂殫土木之瓖峻赫如也則俯紼以纍之攢欒以扛之千人引萬人唱夫力斯拔乃登大懸焉猛虎贔負以奮翣長絙掣曳以縻牟四緇用壯是拒是考始作也鍠鍠乎雙城井陌震來虩虩少縱也驚遠而懼邇山訛而河泄蹶狂故顏魚札疑啜爾其亂也天地殷雷霆鬬魚脫淵羽羽雊虥駮栗栗而汗涸況貔虎與百獸夫其終也戢怒游威舂容將盡久而不絶雄雄乎無閒北方之強能與罔不諦聽而求時夜於是旭旦之音達而人用悛惕伐虞泉而人悲衰老鼓昏定而人悟煩愛宵中哉人釋其病昧爽哉人窒其意欲惣九圍而利萬有者勉是夫初大夫之禱施也人咸曰休哉夫美而不稱君子以為誣矣若二公美莫不可歌也則其疇離之頌曰佛說撞鐘本三聲昭會百衆持六情厥有叱王愛輪割故我長擊以護脫因而作偈演之曰一救冥獄湯劒時二救餓厲釋縲饑三救六畜報愚癡四救修羅勇且疑凡鑠堅剛十耗一我金再鍊滋百鎰巍巍神力誰其尸大道至感曰諸佛
