front:
  text: 全唐文欽定全唐文卷五百二十一梁肅五
  hash: sha256:35cc3dc08423dfbbd5a4a9fa0d15fbc3de729ab3f41153a5bb3a85d6d8b9f109
body:
  text: 公姓李氏諱某隴西成紀人也字曰公受其先在晉霸西涼在魏侯姑臧長發有光乃熾而昌五代生秦王府戶曹贈太子舍人某以恭德垂裕實公之大父水部郎中眉州刺史某以宏材廣化實公之烈考禮部尚書襄陽席豫以大名諡文實公之外祖公生而聰邁十六以黃老學一舉登第十八典校宏文二十餘以金吾掾假法冠為孟侯皡湖南從事給事中賀若察宣慰南方請公為寮佐其後宰東陽宣城二縣辟宣歙浙東二府府主崔侯昭咨以小大之政由監察轉殿中侍御史建中初朝廷釐飭百度高選尚書諸曹即拜公金部員外郎選吏部張鎬節制大梁請公為介授檢校吏部郎中兼侍御史使輟遂退耕洛之間起家除陜州刺史換處州刺史纍升至朝請大夫爵隴西縣男既授代家於鄱陽享年四十有八以某年月日遘疾捐館夫人武城縣君清河崔氏生一女未齔公母弟曰丹有季方之賢茹哀問卜以某年月日奉輤車歸葬於洛陽某鄉原禮也嗚呼當漢道之盛賈誼董生桓談馮衍皆以高才巨名或位淪下國或廢落田里夫豈不遭明時不識明主哉蓋運有通躓事有離合不可以一理言也惟公有孝友仁謙之德文學政事之美卓立不羈之才竟委遲半塗僻典荒服且乏鄧攸之嗣而終管輅之年時歟命歟可為慟哭者已始公之孤喪過乎哀丁內艱也東陽之人飲公惠憫公荼毒行泣賵祭既除而止奉歸宗之姑惟敬與愛下闕大歷己未八月癸丑故尚書比部郎中渤海李公卒享年六十十月某日權窆於某鄉原嗚呼公諱鋒字公穎蓨人也其先自後魏幽州刺史高城公雄四世至皇朝太常博士善信善信之孫曰文素以文章知名舉秀才歷伊闕尉文素生勝尉於馮翊之白水蓋公之父也鳳閣侍郎平章事武功公蘇味道其外祖也公器宇魁異英風明邁中立不回旁通多可初不以祿仕為意用朋酒自娛遊江湖間交必一時之選言必可大之業相國張平原鎬之鎮江西也聞而器之表為協律郎兼上饒令公用仁愛恤惸獨剛明肅豪右不及一年上饒之人如熱遇濯亦既報政彭城公劉尚書晏以狀聞詔遷晉陵令為治加上饒一等郡守李公栖筠尤重之待以賓禮時公以發硎之器連宰二邑征鎮者聆其休風方招佇不暇陳宣州少遊表言其能授監察御史參宣歙軍事事無苛慝遷殿中侍御史換工部郎中從事部無闕政因條奏至京師當國者偉公之材將置於朝公辭未復命遂以侍御史旋介本使東遷於會稽與公俱東永泰末妖賊殺郡將以叛其帥敗亡賊黨詐服公以單騎往安其民一旦收隱慝三十人殺之以徇三衢之人道路相慶人到於今稱之無何有比部之拜乃兼越州長史既罷歸休於無錫私第道有所不通公淡然自居其志愈厲加以率性孝悌睦親接士財必分人衣無常主和樂扇於閨門信讓達於家邦其進也致身以從政其退也卷懷以自牧其亡也知與不知皆為歎息嚮非懿識全才其風可懷則曷以臻此豫忝從公遊也久故録其實以紀之因用表墓志銘曰才宜處貴德宜受福允矣比部曷其不淑融融和風綽綽曠度疏通且仁柔惠有裕登車持斧厥績方茂力命暫乖陰陽已寇閲川不駐廣厦摧構夜臺陰陰何日復晝公姓梁氏諱慎初字智周其先安定烏氏人高祖宜春郡公諱某當隋末喪亂豪傑並興其宗人師都雄據朔方自號梁王置百官以宜春為宗正有唐貞觀初梁亡宜春首謀率其黨來降拜金紫光祿大夫右金吾衛大將軍贈梁州牧梁州生左千牛衛諱叔裕千牛生太子司議郎諱穆之議郎生頓邱令名犯肅宗廟諱頓邱生公少孤家貧落魄不得就經學既冠有勇力以弧矢為事性嚴直方不苟合於時博物涉史書覽歷代成就山川地形攻守奇正之術已而天寶末函夏寇亂西平王哥舒翰之守潼關也公上書論兵勢且勸深壁不戰以挫賊鋒西平異之命居戲下表授左武衛胄曹四遷至左衛郎將時賊臣當國而與幕府不協公曰難將至矣遂間行而南無何西平潰敗公嘗善岐國公魯炅炅方守襄鄧乃往從之表遷右羽林中郎將屢以果鋭為軍前鋒而搴旗陷堅者四五敷奏岐下帝甚嘉之録前後功超拜左衛軍加號冠軍封鶉觚縣開國公既拜命而告人曰徒以蠢爾材力遭亂乘勢以獲爵位傳曰無德而祿殃也吾懼及焉遂稱疾請告解印綬退耕於野春秋若干以寶應二年秋八月寢疾於河內薨於私館臨歿顧命允子賁曰始愛太行山之陽將營而老焉又常懼蹈白刃不獲墓墳今幸以天年終宜從吾志薄葬於此縱汝不忍為元晏故事當斂以時服有棺而無槨可也是歲卜筮不吉至大歷九年冬十二月賁始奉先公之裳帷以安宅焉夫陳力就列之謂忠見幾不仕之謂智名遂身退之謂達全而歸之之謂孝夫如是宜刊貞石遺於後嗣是吾宗也實能言之銘曰肅肅鶉觚敬義直方履柔履剛出處行藏與時弛張弧矢之利以從王事乃行其志允焯厥位帝命將軍受茲蒲璧鞗革金革厄乃蔚乃赫人鮮克終公獨守沖繒繳不及冥冥高鴻吁嗟鶉觚生也有涯令聞無窮范陽盧君諱同字某漢侍中尚書植之裔孫北齊民部侍郎范陽伯士嬰之元孫上蔡令彞倫之孫泌陽令某之季子其令德甲族尚矣君孝發於內不懈於外禮極於上不遺乎下得太和之正性蘊明哲之茂器學以聚之問以辨之百行行之一以貫之干祿代耕非近榮也安卑從政非離㣥也弱冠舉孝廉授舒州望江縣丞夫道德繫乎巳窮達繫乎時惟天生德於君而不之年不與之位噫造物者不其惑歟享年四十有四天寶元年月日終於尉氏私館是歲權窆於潁川之許昌里大歷七年月日允子太常寺協律郎東美初奉嚴訓以公之喪後祔先大夫於陽翟之某原禮也夫默而成之存乎德紀德音者存乎詞銘曰顯允君子克廣德心邈乎其高淵乎其深雲藏於山風隱於林時雨下降不聞其音性含元化形隨逝水天何言哉命也已矣山川有變兮令聞不已君諱某字某皇朝監察御史某之曾孫贈兵部侍郎某之孫唐州長史某之第三子尚書左丞侁之愛弟歷葉聚祉左丞又嗣以淳德德義之門宜有仁人君生而沖茂聰悟孝敬弱冠以明經登科始長安丞又轉新鄭尉性恬曠不甚以祿仕為意避亂至江南以墳籍自娛謂論語二十篇有夫子微言故嘗玩其章句以導情性非至德要道未嘗經懷老氏不居其華孟軻言必仁義君之志也晚節多病享年七十七以興元元年正月三日啓手足於嘉興縣私第夫人博陵崔氏生一子曰攸號慕哀敬禮無違者左丞嗣子兵部郎中政實營護喪事以前月三日權厝於某鄉原不克及葬難故也郎中於豫有鄉黨之舊泣書美行見命志之銘曰溫良恭儉德之柄兮居常待終天之命兮卜葬從權變之正兮君諱正河南洛陽人皇朝光祿大夫洛南公諱義順之元孫故殿中侍御史潁川郡長史贈祕書監府君諱某之少子故常州刺史府君諱某之愛弟春秋四十六大歷十一年某月日卒於晉陵郡明年某月日歸葬於洛陽南先塋元兄水部員外郎兼侍御史汜銜天倫之痛且懼陵谷之不可常也於是昭銘景行志其墓曰君之先出自劉氏漢世祖之裔有進伯者北征以師敗績降胸奴因部易姓其後有永公羅辰臨川王永業魏齊二代開國承家臨川王開府儀同三司武安公子佳洛南之禰也歷代之崇業茂勳鍾其餘祉於是有祕書之遺直常州之厚德德美休裕叢滋於君君溫恭淑和孝友慈仁居處進退非禮不動嘗謂學者義之府文者質之薄故娛心典墳棄詞藝又謂干祿者躁之幾藏密者靜之奧故反情樂道居易修業少時解褐授真定尉非其所好棄官不之晚節尚黃老慕禪味橐籥心懷夢幻生死端居一室淡如也逮疾病或勸之藥君曰命之不可奈何雖有藥石將焉所施言未絶口嗒焉順化未婚無子知者痛之嗚呼子嘗窺天人而考性命夭壽之數福極之源蓋昏默而不可究已以獨孤君蘊純粹之質蹈淵騫之行而生不躋艾服慶不植後嗣彼造物者以三壽百福與何人哉先是君李氏之姊捐館其明年四月常州府君薨反葬之日三喪俱引故親舊惋痛為善者相弔水部之哀又其可既乎肅嘗辱常州之眷且與真定遊故備其實録刊於貞石銘曰顯允君子德心廣兮與道為徒以蒙養兮桑扈反真泊然往兮刻石九原畢天壤兮歲在戊午六月戊子處士滎陽鄭君卒於常州福業寺庚寅權窆於某鄉原嗚呼處士之為人也入則孝出則悌直而不犯柔而不懾好讀周易及太史公書嘗遊於南巢作弔夏桀文其辭甚典足見其質嚮使天假之壽與之祿則其道可熾坎壈世故行年三十三而夭哀哉處士諱稷故酸棗令某之孫今黃巖令季江之子故吏部侍郎贈左僕射齊公浣之外孫也合內外之休德成中和之茂行使夫生不得其辰沒不見其親託遺骸於他土顧稚子而未識痛矣夫斯命也於是書石以志卒葬且懼年祀超忽故月而日之君諱傪姓李氏隴西成紀人涼武昭王元盛之後曾祖如順皇朝太子洗馬生大父元恭開元中以文學政事歷大理卿判尚書吏部侍郎侍郎生烈考訥官至太府寺丞君承家休緒少有令聞孝敬仁順宏毅貞亮非禮不言見善必行行有餘力則覃思六經揭厲百氏是故淳秀之氣播為文章發於事業難於進易於退道不苟行位不虛受常州刺史獨孤公及之臨舒城聞而悅之辟為從事府遷於常州君亦至焉獨孤公文德為天下望君入則從容討論出則勤慮政事議者以君建大名致厚位必自此始不幸短命享年若干以大歷十二年春三月甲子寢疾而沒焉嗚呼天與之才天與之器不與之壽不與之位天何言哉君娶范陽盧韶女一子越在襁褓哭泣無主其仲兄武進尉迅銜天倫之哀謀及卜筮以是月既望抱其孤送君之喪權窆於正勤佛寺之北原時不利不克反葬故也友人安定梁肅紀其終始德善著於石俾來者有以知君子之墓云成紀李氏自涼武昭王以後後裔熾大在元魏有若司空文穆公沖沖生司徒高陽公休績諸父兄各登三司崇勳盛烈載在前史夫人司空之後也曾祖允義皇朝慶州刺史大父仲進宣州司士參軍考備冀州司倉夫懸圃崑山是生璵璠德門懿族宜有賢淑二掾葆儒行不躋貴仕故儲慶發和鍾於夫人夫人幼而孝恭長而柔明歸於他室克協休德所奉之主則著作郎天水權公其人公大節大名達於家邦人倫仰為師表夫人明識茂行光於閨門姻族資其訓式有子德輿七歲而孤夫人茹未亡之哀躬徙宅之教故德輿也十五文章知名二十典祕書貞元二年以廷尉評攝監察御史為江西從事夫人從子南征寓於鍾陵其樂以道其養以祿一慈一孝宜壽宜福天實不弔享年若干以四年秋七月某辰寢疾而終德輿窮慕崩迫忍哀問卜號奉輤裧至於丹徒以來歲某月日權合祔於先君假葬之域嗚呼有行可尊有禮可法始輔君子終垂母儀而不登上壽不介丕祉斯命也已篆石紀德謂為墓志近古之禮也胡可闕諸其銘曰武昭之胄立德立功且侯且公文穆之後昭明有融繼別為宗抑抑夫人餘慶是藂溫良在躬歸我祕書體仁協衷盛德攸同乃訓孟子擇乎中庸休有先風豈命有極豈天不傭降此鞠凶假窆何所惟柏惟桐於江之東棘人充充式號且恫哀思無窮夫人諱某字某南蘭陵人梁世宗明皇帝生南海王珣自南海三葉至有唐太子太師某太師生中書侍郎某以文武之勤左右帝室世祚徐國謺耀台階蓋夫人之大伯父也父中書之弟駙馬都尉太僕卿諱衡踐修舊德尚某邑公主實生夫人元宗其外大父也宣皇其舅也天漢派流地靈騰茂蘊為和氣鍾我淑德既笄歸乎公族李氏曰錪錪官至監察御史以茂行聞於時上奉繼親旁羅㣥族夫人內貞明而外柔順至於色養義充於輔佐仁見於周睦至乃冠婚賓祭之式組紃黼黻之事莫不能儀刑邦教律度姻戚洎御史捐館夫人罷執笲之事訓道三女以禮自居二十年間母儀愈光內則愈彰知我者方紀美行貽諸彤史天不與善享年四十八而終時建中元年九月三日也初夫人無子晝哭之後歸於其宗仲弟御史中丞復孝愛之德聞於天下出守三州皆從而居焉是歲中丞由潭州遷左馮翊會夫人幼女從夫有江華之貶亦將欲沿三湘展母子之歡途次於晉陵遘疾而歿俄兵興不克反葬馮翊次子某以來歲某月日奉其姑之喪權窆於某鄉原嗚呼仁宜有壽善宜有後以夫人之賢且先代之允與王室之出而其事並戾豈命也歟豫忝遊馮翊之門也久見命為志其銘曰昔在帝祖承天命紀維皇歸妹光耀載起太師之孫魯元之子誕受休氣實為女士共伯既沒敬薑道存訓成內則耀動高門積德所因其禮宜蕃碩人無子天道寧論將涉三湘奄歸九原生惟共盡有恨何言夫人諱某字某河南洛陽人也昔涼武王烏孤景王傉檀繼為傑霸據河右景王生魏太尉隴西宣王賀賀生司徒惠王恭或以文武藩翰王室以拓拔同源因錫姓焉夫人其後也曾祖翁皇朝尚書比部郎中祖修業涇州刺史父光時濟陰太守夫人濟陰第幾女既笄歸於原武丞博陵崔君某以德敏貞儉宣慈惠和輔佐君子而成家風原武之伯父沖嘗為刑部郎中每謂夫人淑哲之美可師表姻族洎原武疾病顧視諸子尚藐慮歸祔不獲以屬夫人夫人默而省焉晝哭之後躬履草莽成反葬之禮禮無違者聞者難之既免喪始遊息道門受心法於大照禪師請益之際朗然懸解大照沒又事宏正禪師入定性離天機獨得喜怒哀樂無自入焉宴坐之外以敬薑之風操班氏之詩禮貽訓親族閨門之內盛烈流美禪林高妙受用不極委和歸真享年若干大歷甲辰歲十一月十三日寢疾捐館嗣子某乙等泣血襄事以來歲某月日權窆於某原仲子左車純孝而文懼聖善之德不著後嗣遂假我為志銘曰烈烈雄閥降茲淑哲惟夫人兮郁郁母儀中外肅祗耀閨門兮以道自光我性則常奄歸真兮考乎維嗣其哀也至刻斯文兮夫人姓獨孤氏六世祖永業北齊司徒臨川郡王自臨川五葉至贈祕書監府君諱某門風世德家牒詳矣夫人祕書之第某女生而純孝容範淑茂成於德門歸於公族李氏曰濤故楚州刺史仲康之子今御史大夫涵之從兄也少有敏才故祕書府君以夫人歸之恪勤婦禮以正家節門內之治繄柔明是賴乾元初李君參掾信安遂終於位夫人罷助祭之事專以禮詩之學訓成諸孤議者以魯敬薑辛憲英為比晚歲以禪自適謂般若之經空惠之筌恃而為師去諸結縛猶違土也享年五十三大歷十一年某月日寢疾終於常州遂權窆於建安精舍之側明年某月日卜筮襲於吉始遷兆合祔於洛陽某之先塋嗣子前越州士曹參軍居介南陵尉居佐譙縣尉居敬孝廉居易等痛聖善之德不可追也俾肅為志其銘曰溫溫夫人貞順而慈始為婦儀終為母師仰成法寶穎脫塵機身世兩遺乘化而歸合祔伊何周原舊域哀哀令嗣孝思罔極作銘片石以志窀穸夫人姓閻氏皇朝考功郎懿道之孫銀青光祿大夫尚書刑部侍郎伯璵之女河東薛氏之出前廷尉評領臨安令裴深之室也春秋若干以大歷乙卯歲五月寢疾卒於晉陵之私第來年月日窆於某原不獲吉卜未祔於皇姑禮從宜也先期臨安以夫人之德善俾豫銘其墓故得而撰云夫人貞順惠和恭明孝慈自天受也樂善睦親儉而好禮承家訓也循采蘋之度以助祭祀得婦道也四教行九族和秉內則也夫人有是淳懿故自致禮至於捐館小大無間言中外無異望郁郁詵詵一家興仁俟絶之際請辭其太夫人又辭其娣姒已而顧所生之四女曰母子之愛今也永絶夫中饋不可以無主吾己請而父娶繼室矣其來也汝謹事之無貽我神羞辭氣不惑言畢遂歿夫號母慟諸女孺慕聞哀者行路出涕存歿之事其感人深矣哀哉乃為銘曰穠兮蕣華茂蘊質兮配此良士如琴瑟兮嚴霜隕零曷其疾兮吁嗟碩人歸此室兮夫人安定梁氏族高祖華陽襄公諱彥光生周隋際歷上大將軍開府儀同三司使持節青冀華相等九州刺史貞惠文敏為兩朝名臣生曾祖永安成公文讚在隋為司隸刺史司隸生皇朝隆興令冀州長史晏晏生朝散大夫堯山令澄夫人堯山之第二女惠和孝慈幼有令儀長而溫良成而柔明年若干嫁趙郡李兼金生四子而兼金卒夫人內持正性外示德禮且以文行忠信貽訓諸子家道以和每言曰敬薑大家吾師也既晚歲修釋氏法以禪誦為事視身世榮枯與夢幻同因命第四子為沙門勵以清淨行既而壽量極享年七十二歲在乙卯十月乙未終於常州建安佛寺後五日窆於某原孝子詠等銜痛泣血哀過乎禮懼先夫人德善不聞將志幽穸以肅外族之屬也俾為斯文銘曰伊夫人煥母德道可尊禮不忒訓令子就儒釋沒而藏焉永無隙人欲我知視此石
