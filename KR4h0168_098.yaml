front:
  text: 全唐文欽定全唐文卷九十八高宗武皇后四
  hash: sha256:e18aff90518cf3a7968be7980ba5153a1ec215c7b326ed323202748e59a6dfca
body:
  text: 德政惟明職令思平清慎忠勤榮進躬親忠貞正直崇慶榮職文昌翊政勳彰慶陟懿沖順彰義忠慎光廉正躬奉謙感忠勇羲農首出軒昊膺期唐虞繼踵湯禹乘時天下光宅域內雍熙上元降祉方建隆基朕聞天地權輿混元黃於元氣陰陽草昧徵造化於洪鑪萬品於是資生三才以之肇建然則春榮秋落四時變寒暑之機玉兔金烏兩曜遞行藏之運是知乾坤至大不能無傾之形日月至明不能免盈虧之數豈若混成為質先二儀以開元兆道標名母萬物而為稱惟怳惟惚窈冥超言象之端無去無來寥廓出寰區之外驂鸞馭鳳昇八景而戲仙庭駕月乘雲驅百靈而朝上帝元都迥闢玉京為不死之鄉紫府旁開金闕乃長生之地吸朝霞而飲甘露控白鹿而化青龍魚腹神符巳效徵於涓子管中靈藥方演術於封君從壺公而見玉堂召盧敖而赴元闕炎皇少女剩往仙家負局先生來過吳市或排煙而長往或御風而不旋既化飯以成蜂亦變枯而生葉費長房之縮地目覽遐荒趙子之賓天親聆廣樂懷中設饌標許彥之奇方座上釣魚呈左慈之妙技遙昇閣道遠睇平衢鼓琴瑟而駕輜軿出西開而遊北海登崐崘而一息期汗漫於九垓湘東遺鳥跡之書濟北致魚山之會拂虹旌於日路飛羽葢於煙郊既入無窮之門遂游無極之野青虬吐甲爰披五岳之文丹鳳銜符式受三皇之訣瀨鄉九井漾德水而澄漪淮南八仙著真圖而闡祕自非天姿拔俗靈骨超凡豈能訪金籙於元門尋玉皇於碧落者矣昇仙太子者字子喬周靈王之太子也原夫補天益地之崇基三分有二之洪業神宗啟冑先承履帝之祥聖考興源幼表靈須此之相白魚標於瑞典赤雀降於禎符屈叔譽於三窮錫師曠以四馬穀洛之鬬嚴父申欲壅之規而匡救之誠仙儲切犯顏之諫播臣子之懿範顯圖史之芳聲而靈應難窺冥徵罕測紫雲為葢見嘉貺於張陵白蜺成質遺神丹於崔子鳳笙流響恒居伊洛之間鶴駕騰鑣俄陟神仙之路嵩高嶺上雖藉浮邱之迎緱氏峯前終待桓良之告傍稽素篆仰叩元經時將玉帝之游乍洽琳宮之宴仙冠岌岌表嘉稱於芙蓉右弼巍巍效靈官於桐柏九丹可挹仍標延壽之誠千載方傳尚紀仙人之祀辭青宮而歸九府棄蒼震而慕重元無勞羽翼之功坐致雲霄之賞雖黃庭衆聖未接於末塵紫洞羣靈豈驂於後乘斯乃騰芳萬古擅美千齡豈與夫松子陶公同年而語者也我國家先天纂業闢地裁基正八柱於乾綱紐四維於坤載山鳴鸑鷟爰彰受命之祥洛出圖書式兆興王之運廓提封於百億聲教洽於無垠被正朔於三千文軌同於有截茫茫宇宙掩沙界以䟽壇眇眇寰區籠鐵圍而畫境坐明堂以崇嚴祀大禮攸陳謁清廟而展因心洪規更闡文山西峙上聳於圖清武井東流下凝於方濁駢柯連理恒騁異於彤墀九穗兩岐每呈祥於翠畝神芝吐秀宛成輪葢之形歷草抽英還司朔望之山車澤馬充仞於郊畿瑞表祥圖洋溢於中外乾坤交泰陰陽和而風雨調遠肅邇安兵戈戢而爟烽靜西鶼東鰈巳告太平之符鄗黍江茅屢薦昇中之應而王公卿士百辟羣僚咸詣闕以披陳請登封而告禪敬陳嚴配之典用展禋宗之儀泥金而叶於告成瘞玉而騰於茂實千齡盛禮一旦咸申爾乃鳳輦排虛既造雲霞之路龍旗拂迥方馳日月之扃後殿縈山先鋒蔽野千乘萬騎鉤陳指靈岳之前谷邃川停羽駕陟仙壇之所既而馳情煙路係想元門遙臨松寢之前近瞰桂巖之下重巒絕磴空留落景之暉複廟連甍徒見浮雲之影山扉半毀纔覩昔年之規石閒牖全傾更創今辰之製乃為子晉重立廟焉仍改號為昇仙太子之廟方依福地肇啟仙居開廟後之新基獲藏中之古劒昆吾挺質巨闕標名白虹將紫電爭鋒飛景共流星競彩去夜驚而除衆毒輕百戶而却三軍空勞望氣之人自遇象天之寶巖巖石室紀黃老五千之文赫赫靈壇披碧洞三元之籙爰於去歲嘗遣內史往祠雖人祇有路隔之言而冥契著潛通之兆遂於此日頻感殊禎迢遞雲閒聞鳳笙之度響徘徊空裏瞻鶴駕之來儀瑞氣氤氳異香芬馥欽承景貺目擊休徵爾其近對緱芩遙臨嵩嶺變維城之往廟建儲后之今祠窮工匠之奇精傍臨絕壑建山川之體勢上冠雲霓其地則測景名都交風勝壤仰觀元緯星文當太室之邦俯矚黃輿地理處均霜之境膏腴宇宙通百越之樓船穴險山原控八方之車騎危峯切漢德水橫川實天下之樞機極域中之壯觀於是捫危鑿阯越壑裁基命般爾而開筵召公輸而綴思梅梁瞰迥近架煙霞桂棟臨虛上連日月窻明雲母將曙景而同暉戶挂琉璃共晴天而合色曲閣乘九霄之表重檐架八景之中湛休水於天池發祥花於奇樹珠闕據緱峯之外瑤壇接嵩嶠之隈素女乘雲窺步檐而不逮青童駕羽仰層檻而何階茂躅鬱兮若生靈儀肅兮如在昔峴山墮淚猶見鉅平之碑襄水沈波尚有當陽之碣況乎上賓天帝搖山之風樂不歸下接浮邱洛浦之笙歌斯遠豈可使芳猷懿躅與歲月而推遷霞宇星壇共風煙而歇滅迺刊碑勒頌用紀徽音庶億載而惟新齊兩儀而配久方佇乘龍使者為降還齡之符駕羽仙人曲垂駐壽之藥使璇璣叶度玉燭調時百穀喜於豐年兆庶安於泰俗虔敷短製乃作銘云邈矣元始悠哉渾成傍該萬類仰契三精至神不測大象難名出入太素驅馳上清其一黃庭仙室丹闕靈臺銀宮雪合玉樹花開夕游雲路朝挹霞杯霓旌髣髴羽駕徘徊其二樹基創業遷朝立市四險天中三川地紀白魚呈貺丹鳥薦祉靈骨仙才芳猷不巳其三遐瞻帝系仰睠仙儲遙馳月域高步煙墟名超紫府職邁玉虛飄颻芝葢容與雲車其四遠集崐崘遙期汗漫金漿玉液霧宮霞館瑤草扶踈珠林璀璨萬劫非久二儀何算其五栖心大道託迹長生三山可陟九轉方成鳧飛舄影鳳引歌聲永昇金闕恒遊玉京其六青童素女浮邱赤松位稱桐柏冠號芙蓉尋真御辯控鶴乘龍高排雲霧輕舉遐蹤其七歲往年移天長地久霄漢為室煙霞作友舞鶴飛蓋歌鸞送酒絕迹氛埃芳名不朽其八粵我大周上膺元命補天立極重光累聖嘉瑞屢臻殊祥曡映歸功蒼昊昇中表慶其九爰因展禮途接靈居年載超忽庭宇凋踈更安珠敦重開玉虛方依翠壁敬勒丹書其十新基建趾古劒騰文鳳笙飛韻鶴駕淩雲休符雜沓嘉瑞氤氳仙儀靡見逸響空聞其十一仰聖思元求真懷昔霞軒月殿星宮霧驛萬歲須臾千齡朝夕紀盛德於芳翰勒鴻名於貞石其十二朕聞圓葢上騰元氣創乾坤之始方輿下闢太極分造化之初象帝膺期彈壓陰陽之表風皇馭歷牢籠宇宙之先然而迹昧洪荒聲沈朴略豈如法王法力迥超生滅之區勝躅勝緣高拔去來之境淨身圓對赴機感而現金容覺智虛融隨慧應而流寶句普霑法雨等蔭慈雲引六趣而託神居招四生而登梵域即色非色湛實相而載山河因空示空就法性而懸日月道分四攝廣開遷拔之源理極一乘潛申究竟之路禪波湛鏡登彼岸而出四流慧日昇輪光九天而燭三界含識戴能仁之力懷生仰調御之功諸相皆無神獨超於解脫即心為有道深會於慈悲誘悟羣迷昭宣景福故乘因喻筏證果中天汲引被於含生濟度該於庶品無來不應有感斯通轉十二之法輪除億兆之疑網為出塵之妙域乃化俗之良因大庇含靈其惟正覺者矣伏惟皇考太祖無上孝明高皇帝負日標靈膺雲誕秀神凝繫表思韞機初瑞叶珠衡祥開玉斗允文允武名光百代之前乃聖乃神功冠千齡之表仁覃覆載總天地之無私化洽財成貫陰陽之不測皇妣無上孝明高皇后習禮凝規依仁成性柔輝允穆播蘭畹之清芬媛範惟新激林飈之逸韻玉雞貽貺沙麓降祥邁附寶以居尊軼女登而表德功高十亂視天之業彌隆化漸六宮偃月之符載遠然以孝誠無感夙遘閔凶怙恃之蔭俱傾攀號之志恒切銅渾變序鎮增荼蓼之悲銀箭移年伏深松檟之慕露草有長摧之感風枝無再靜之期思奠謁而增悽想靈筵而倍咽白雲馳戀蒼野凝哀上仙之歲方遙攀聖之哀轉積然則金谷湛寂常住之體逾隆寶相騰輝善逝之因彌洽式駐輪迴之境係想青蓮佇開方便之門運心丹枕故知報慈恩於畢地善權之願斯宏竭孝享於終天波若之資攸重所以虔心勝祐肅奉明因迺建香城虔興淨域大福先寺者先聖之舊居也爾其途臨測景地處交風樓臺鬱而煙霧深山川曠而原野淨前瞻太室控紫岳之三花却鏡伊瀍帶黃河之千里龍門右闢通梵宇之清輝龜浦橫流激禪池之逸派途開八政門閌九逵萬國交會之區四海朝宗之所崇軒四敞邃宇千重複道周流危階邐迤霜鐘月磬聲參洛浦之笙玉女仙人影接緱山之鶴東西日月行藏靈鷲之峯朝夕煙霞隱映猴池之水地積吉祥之草鹿苑含芳庭敷覺意之花雞林絢色清風振響韻諧天樂之音弄鳥和鳴聲雜魚山之梵雕宮曉闢綺殿宵開疑觀帝釋之居似覿燈王之座珠樓曜景苑如兜率之天寶樹吟風事符安養之國虹梁夭矯上出漢而疑懸虬棟參差下臨空而畏落曾軒峻宇猶昔日之餘基珠閣銀宮諒今辰之新葺桂吐連拳之影氣蘊秋窻蓮舒菡萏之輝香浮夏沼雲纓霧縠與道樹而交陰寶葢珠幡共流霞而合色柰園敷蘂香雜天花竹苑來風聲喧地籟危樓複道之峻何必醍醐之山福地聖泉之流豈獨僧伽之水雕甍錯落似布龍鱗繡宇岧嶢如培羊角飛檐畫栱迥騰雲閣之前藻井披蓮高出星河之上璇題切漢陰兔以之停輪寶剎干霄陽烏為之迴翼珠髻力士金色善神依寶界以資祥對仙庭而護法鑪積六銖之氣幡搖五色之虹讃梵之響風傳雕飾之資霧積所謂嚴持淨域建立招提非百常之可奇何九層之能擬竹陰藏日蘊虛白而生寒松氣含煙鬱青霞而似暝臨三休之窈窕對雙闕之崢嶸窮壯觀於周原極雕鐫於郢匠討論形勝眺覽盡於無邊推出因緣利涉該於有截爾乃崇梵宇選名僧或杖錫而來臻或乘杯而戾止莫不情塵久謝性月恒明遠蹈四禪迥超三界談高象外激揚金口之詞思逸幽元敷讃琅函之典雖復戴馮重席比雅論而多慚惠子聯環擬清談而有愧十地盡禪門之侶四天為法會之賓肅肅焉惶惶焉誠紺宇之棟梁實緇徒之領袖者也故能使天龍恭敬道俗歸依息火宅而清炎洗塵勞而滌想宏大慈而廣濟為曠劫之洪津方標六度之功實啟一乘之路所以憑善權之妙業廣元聖之隆基仰竭深衷敬申宏願聿懷多福式建浮圖恭記勝緣敬資先佑爰初制造逮至畢功嘉貺駢闐休符雜沓靈禽告曙匠者以興功仙鶴呈姿僧徒仰而咸躍或瑞雲騰彩遶蓮塔以成文或祥龍見奇俯花臺而曜影寶梯攝迥平臨善視之天香葢排空高出多羅之樹毗婆山上七葉敷石室之中無量佛前百花散菩提之下真人羅漢超化閣以遊神菩薩聲聞入仙宮而締賞文殊師利疑問疾於淨名薩陁波崘似請經於無竭十六丈屋豈惟須達之功千二百房詎假祗陁之勢雖復寶塔踊出無以匹此精奇花臺傑起不足擬其神妙千變萬化六彩五彰隱隱冠於虹蜺迢迢入於雲漢珠交夕映綴星月之仙輝寶鐸晨吟韻宮商之逸響于闐香像盡寫龍龕舍利全身咸昇鴈塔經綸畢備制度咸修既欣冥力之資理藉神功之助巍如地踊邈若天開齊壯觀於鐵圍得規模於梓匠靈機不測發揮宇宙之精神道無方盤薄陰陽之氣當願莊嚴聖扆奉翊尊容七淨澄神三明啟慮登花臺而縱賞俯卄杗座而宣闕天駕辯星皇之表財成十地凝圖日帝之先闕宗廟逾隆與金山而等峻寰區益廣並沙劫而常寧景運休明乾坤交泰龍駕與高穹共遠鳳歷將闕九瀛塵清四表元良則道光貳極識朗重明孝闕妃名采蘋莆田人開元初高力士選入侍元宗甚見寵幸所居悉植梅花帝因其好名為梅妃玉鑑塵生鳳奩香殄懶蟬髮之巧梳閑縷衣之輕練苦寂寞於蕙宮但凝思乎蘭殿信飄落之梅花隔長門而不見況乃花心颺恨柳眼弄愁暖風習習春鳥啾啾樓上黃昏兮聽鳳吹而回首碧雲日暮兮對素月而凝眸溫泉不到憶拾翠之舊遊長門深閉嗟青鸞之信修憶昔太液清波水光蕩浮笙歌燕賞陪從宸旒奏舞鸞之妙曲乘畫鷁之仙舟君情繾綣深敘綢繆誓山海而長在似日月而無休柰何嫉色庸庸妬氣沖沖奪我之愛幸斥我於幽宮思舊歡之莫得夢想著乎朦朧度花朝與月夕若懶對乎春風欲相如之奏賦柰代才之不工屬愁吟之未盡巳響動乎踈鐘空長嘆而掩袂躊躇步於樓東尚宮名若昭貝州清陽人警慧善屬文德宗召入禁中試文章并問經史大義呼為學士穆宗立拜尚宮歷憲穆敬三朝皆呼為先生寶歷初卒贈梁國夫人牛肅長女曰應貞適宏農楊唐源少而聰穎經耳必誦年十三凡誦佛經二百餘卷儒書子史又數百餘卷親族驚異之初應貞未讀左傳方擬授之而夜初眠中忽誦春秋起惠公元妃孟子卒終智伯貪而愎故韓魏反而喪之凡三十卷一字無遺天曉而畢當誦時有教之者或相酬和其父驚駭數呼之都不答誦巳而覺問何故亦不知試令開卷則巳精熟矣著文章百餘首後遂學窮三教博涉多能每夜中眠熟與文人談論文人皆古之知名者往來答難或稱王弼鄭元王衍陸機辯論鋒起或論文章談名理往往數夜不巳年二十四而卒今採其文魍魎問影賦著於篇其序曰庚辰歲予嬰沈痛之疾不起者十旬毀頓精神羸瘁形體藥物救療有加無瘳感莊子有魍魎責影之義故假之為賦庶解疾焉魍魎問於予影曰君英達之人聰明之子學包六藝文兼百氏頤道家之祕言探釋部之幽旨既虔恭於中饋又希慕於前史不矯枉以干名不毀物而成己伊淑德之如此即精神之足恃何故羸厥姿貌沮其精神煩冤枕席憔悴衣巾子惟形兮是寄形與子兮相親何不誨之以崇德而教之以自倫異萊妻之樂道殊鴻婦之安貧豈痼疾而無生賴將微賤而欲忘身今節變歲移臘終春首照晴光於郊甸動暄氣於梅柳水解凍而繞軒風扇和而入牖固可蠲憂釋疾怡神養壽何默爾無營自貽伊咎僕於是勃然而應曰子居於無人之域遊乎魑魅之鄉形既圖於夏鼎名又著於蒙莊何所見之不博何所談之不長夫景依日而生像因人而見豈言談之足曉何節物之能辨隨晦明以興滅逐形體以遷變以愚夫畏影而蒙鄙之性以彰智者視陰而遲暮之心可見伊美惡兮由己影何辜而遇譴且予聞至道之精窈兮冥至道之極昏兮默達人委性命之修短君子任時運之通塞悔吝不能纏榮耀不能惑喪之不以為喪得之不以為得君子何乃怒予之不賞芳春責予之不貴華飾且吾之秉操奚子智之能測言未卒魍魎惕然而驚歎而起曰僕生於絕域之外長於荒遐之境未曉智者之處身是以造君而問影既談元之至妙請終身以藏屏初應貞夢製書而食之每夢食數十卷則文體一變如是非一遂工為賦頌文名曰遺芳也后瑯邪人祖難得封郡公父顏衞尉卿代宗時以良家選入宮為才人順宗在藩帝以才人幼故賜為王孺人是生憲宗順宗即位將立后會病棘而止憲宗內禪尊為太上皇后元和元年上尊號曰皇太后崩年五十四諡莊憲皇太后敬問具位萬物之理必歸於有極未亡人嬰霜露疾日以衰頓幸終天年得奉陵寢志願獲矣其何所哀易月之典古今所共皇帝宜三日聽政服二十七日釋天下吏民令到臨三日止宮中非朝暮臨無輒哭無禁婚嫁祠祀飲酒食肉巳釋服聽舉樂侍醫無加罪陪祔如舊例后為贈左僕射駙馬都尉曖之女憲宗為廣陵王時納為妃元和元年八月冊為貴妃穆宗即位冊為皇太后敬宗即位尊為太皇太后諡懿安維寶歷二年歲次景午十二月甲午朔十二日乙巳太皇太后若曰大行皇帝睿哲英能對天明命方夏厎績夷蠻貢庭罔有不端大康有截宜荷九廟之靈永享億年之祿豈虞奸妖竊發矯專神器蠱惑中外扇誘羣朋駭動神人釁深梟獍咨爾江王昂聰姿孕粹清明毓和智算機關元謀電發躬率義勇大靖凶徒且膺當璧之符爰攄枕戈之憤既殲巨害當享豐福是用命爾陟於元后宜令司空平章事裴度奉冊即皇帝位永惟高祖太宗之翦定隋亂元宗之浸漬利澤憲宗之堅除蠹孽艱難險阻勗乃負荷小心以事上帝儉德以刑邦家懋於令聞持久如始敬之休哉后梓州人族系不顯昭宗即位封淑妃從狩華州詔冊為皇后哀帝即位尊為皇太后徙居積善宮號積善太后為朱全忠所弒予遭家不造急變爰臻禍生女職之徒事起宮奚之輩皇帝自罹鋒刃巳至彌留不及顧遺號慟徒切定大計者安社稷纂丕圖者擇賢明議屬未亡人須示建長策承高祖之寶運繄元勳之忠規仗爾股肱以匡沖昧皇太子柷宜於柩前即皇帝位其哀制並依祖宗故事中書門下準前處分於戲送往事居古人令範行今報舊前哲格言收淚敷宣言不能喻維天祐元年歲次甲子八月壬辰朔十五日景午皇后若曰高祖太宗撥亂返正奄有天下垂三百年重熙累聖莫不功光祖業克紹丕圖予遭家不造變起宮奚雖號慟期至於終天而負荷實先於立嗣咨爾皇太子監國事天資岐嶷神授英明孝比東平之蒼學富陳留之植恭謙守政和順稱仁友愛聞於弟兄令譽播於區宇比則隆元帥深暢戎機今乃位儲宮益歸羣望是用爰循舊典上纂鴻基既允集於天人當欽承於宗社宜即皇帝位於戲萬幾不可以久曠四海不可以乏君膺紹寶圖光踐皇阼節儉以勵戎夏文德以戢干戈無怠無荒克慈克悌永保厥躬用揚祖宗之丕緝休命可不敬哉
