front:
  text: 全唐文欽定全唐文卷六百十九正甫貞元二年進士官鄧州刺史歷同州轉蘇州元和八年遷湖南觀察使十三年除大理卿
  hash: sha256:296b38bf1cbfe446bdcf7e34d7ba6c86b929429230d7b00e28f2ffee81b7b9bc
  markers:
  - {type: head, offset: 13, content: 張正甫, id: KR4h0168_NFKB_619-h1, level: 1}
body:
  text: 天寶三載觀音大師終於衡嶽春秋六十八僧臘四十八元和十八年故大弟子道一之門人曰惟寬懷暉感塵劫遽遷塔樹已拱懼絶故老之口將貽後學之憂丕若貽謀思揚祖德乃列景行託於廢文強名無迹以慰乎罔極之恩曰自騰蘭演教於此土也殆將千歲達摩傳心至六葉也分為二宗不階初入頓入佛惠曹溪教旨於是乎傳宏而信之觀音其人也大師諱懷讓京兆杜氏其先因家安康即為郡人髫年俊發聰悟絶衆㣥言所涉一覽無遺居常而未或好弄在醜而不可褻近嘗默觀止水因而顧影形儀禺若宛在鏡中三反厥像如初沛然而心乎獨得還步未輟聞於空中曰佛法津梁俟子而大既應付囑爾盍勉之乃深割愛緣亟從剃落以荊土律藏之微密也大士智京在焉攝衣從之既進而儀法峻整冠於等輩以嵩嶽禪之泉海也長安長老在焉稽首咨之既授記而身心自在超出塵垢厭離文字思會宗元周法界以冥搜指曹溪而遐舉能大師方宏法施學者如歸涉其藩閫者十一二焉躋其室堂者又十一焉師以後學弱齡分為末席虛中而若無所受善閉而惟恐有聞能公異焉置之座右會一音吹萬有衍方寸彌大千同焉而交暢異焉而吻合同授祕印目為宗師乃陟武當窮棲十霜朅來衡嶽終焉是託惟般若聖槩有觀音道場宴居斯宇因以為號或微言析理辨士順風而杜其口或杖屨將撰山靈借留而規於夢遠自梁益近從荊吳雲趨景附風動川至靈山聖會今古一時至矣哉未始聞也一公見性同德宏教鍾陵鬱為名家再揚木鐸而施及寬暉繼傳心燈共鎮國土乃追琢琬炎揭於故山揚其耿光以示來劫其受法弟子亦序列於左式明我教之有開焉銘曰不疾而速平平南宗窮行其教嶽嶽讓公秀發之英激於童齒出塵之像光於止水乃趨律會儀範孔修乃探密藏先覺同求曹溪實歸般若觀妙體是宗極湛乎反照一從委順六紀於茲教迹未衰靈峰巋而一公丕承峻其廊廡寬暉繼起重規謺矩乃掃塵塔乃植豐碑率是教者茲焉有歸臣某言伏奉某月日恩制追贈亡父先臣某司空積感昭靈肅膺嘉命捧戴綸旨哀號靡及追榮衮章沒世無覩先臣某策名昌運不待聖明録功上台載彰忠烈陛下以臣兄應理行有聞擢居連率光賁重渥慶流三泉此皆陛下代天永錫論道成於故事俾臣兄弟移孝歸於盡忠悲喜交心拜舞以泣不勝感咽崩摧之至全白貞元六年官膳部員外郎出為池州刺史十一年徙吳興遷祕監致仕君名白廣漢人性倜儻好縱橫術善賦詩才調逸邁往往興會屬詞恐古之善詩者亦不逮尤工古歌少任俠不事産業名聞京師天寶初元宗辟翰林待詔因為和蕃書并上宣唐鴻猷一篇上重之欲以綸誥之任委之為同列者所謗詔令歸山遂浪迹天下以詩酒自適又志尚道術謂神仙可致不求小官以當世之務自負流離轗軻竟無所成名有一子名伯禽偶遊至此遂以疾終因葬於此文集亦無定卷家家有之代宗登極廣拔淹滯時君亦拜拾遺聞命之後君亦逝矣嗚呼與其才不與其命悲夫全白幼則以詩為君所知及此投弔荒墳將毀追想音容悲不能止邑有賢宰顧公遊秦志好為詩亦常慕效李君氣調因嗟盛才冥寞遂表墓式墳乃題貞石冀傳於往來也貞元六年四月七日記漢衡博陵人始為費令滑州節度使令狐彰表掌書記大歷六年以檢校禮部員外郎充和蕃副使遷右司郎中改萬年令建中三年為殿中少監兼御史大夫再充和蕃使改鴻臚卿轉祕書監俄拜兵部尚書東都淄青魏博賑給宣慰使明年為幽州宣慰使貞元四年加檢校吏部尚書晉慈隰觀察使尋加都防禦使卒贈左僕射蓮華巍嵬竹箭喧豗浩浩今古憧憧往來昱德宗時人元和朝官朗州刺史詩曰赳赳武夫公侯干城美賢人將帥折衝於未然也自周建五長秦制百郡地非城不安故分諸侯之符美專城之稱尚矣澧州荊之近庸國之南屏水陸吳楚風俗夷獠溪蠻好亂相寇仍梗淡津之墟尚在天門之壘可辨慮危杜漸非賢孰能古城之東垣不盈百仞地偏而僻署斜向日正而陰陽氣互遂使災沴屢降水旱更作乾元中盜不盈百即州將失守間歲微瀘軍潰即郡人塗炭向使崇堵可固廩藏是蓄何蕞爾之寇得殘生人乎前年春天子輟伊呂之佐而牧守澧公行不加懼布無恩之惠人和樂而不使公嘗曰一日必葺其墻宇而况於城池乎遂度木於山浮木於水選巧匠於退卒就嗇夫於庸保人急於利役無勞焉因舊址而板築雲集創新規而雉堞霞映峭壁屹立修廊虹亘訟堂鈴閣從儉制焉不三四旬功乃就矣倚連岡以起伏面長江以演漾登觀則山川在目雄鎮則黔巠可抗澧人歌之曰可憐地上樓百姓不知修上有清使君下有清江流雖臧質石城之謠不是過也耳目風化得無頌乎敧危江城榛蕪上平廨宇改卜垣墉半傾肇自二紀凶渠再驚廩不我食人不我生大賢為政革故鼎新畚走鍤舉榱衝忽陳俄聳雉堞如驅鬼神雖崇澧城不勞澧人南樓峩峩下壓澄清畫角曉吹啼烏夜過浦珠自還野童自歌我公之祉如山如河寧元和中官常侍社稷五祀山川百靈有國有家是尊是奉遍㣥神而致享理四時而不忒爰以使臣巡行郡縣職茲望秩之事崇是沈埋之禮或陳典法無替虔恭况徼福假靈沈璧埋幣罔不祗肅通乎至誠蘋藻方薦粢食不鑿禮官博士分典斯務庖人尸祝各守是司事或有違罪將何逭且我愛其禮闕供是其置罰神歆其潔克誠可以享斯眷彼虞人掌茲山澤不守其祀自貽厥愆宜置平刑以懲不恪丹貞元十年官郢州長史聖人肇始造舟後代相沿不易梁溠有服隨之説棧劍為資蜀之要取諸大壯以濟不通於梯山之徒納職之命傳國之利厚家之貨不可斯須而廢其有不欺女信嫉惡蛟毒良以期徵於納履讓或伏身於見執發機雖異而致名之迹同也夏禹疏洪水除其昏墊庖犧乘馬牛廣乎運載皆垂致遠之計將以貽厥後嗣國以人為本民以食為天行李滯塞何由遂於謀生哉以身觀身以國觀國自天子至於庶人無有不因力制造取贍於民之業矣楚郢之境西浮漢江草創之始東馳京嶺古風遺事有陽春白雪之美淒然不變中改溫中之邑仍角陵之井次易新陽之號立京山之稱會府無巨川之濟歸里及巾車之敝誓心無題柱之所攜手絶敘離之地冬涸則邱坎險塞夏漲則奔騰浩渺憧憧來往行人阻之我州尊滎陽鄭公權衡以心利劍在手辭北闕以作牧褰赤帷以御人必能刳剔姦邪懲革污俗不然何以克成斯役以安疲庶京兆韋于屈為宰服黃綬於鄂渚綰銅章於郢上下馬而黠吏破膽愛民而政聲盈耳先難後易靡不有初恕巳檢躬終亦如始矧能貶食省用均賦守官捐不急之徭行以時之政木取於市百倍於市價庸於工畢樂於工可謂悅以使民民忘其勞也鑿堆補罅遷曲於直夷陵就谷奠礎於水平板幹法於砥礪具畚築削於高阜憑修闌而植髮運眼亘虬梁而晴虹可指然後施諸赭雘以皓粉飾樹華剎而表道刻堅珉以旌德不惟招襁負接土物抑乃光里閈壯郛郭使後躅動思賢之詠居人懷勿翦之感豫名竊佐州承牒觀風兼以求瘼覩奇迹而不刊不立孤為寮而徒飲徒啄書之於石以彰永好甲戌之歲建卯戊午之日且題且記告於守者參吳郡人第進士貞元中官祠部員外郎干城絶長城列秦民竭秦君滅嗚呼悲夫可得而説原夫恣無道戮無辜帝語其眹亡秦者胡不可知也疑是胸奴於是先蒙恬次扶蘇帥兵伍役刑徒千里萬里雨驟而雲趨入胡之鄉卻胡之王北胡之黨削胡之疆然後自于洮至於遼江漢湯湯將池焉而共浚太山巍巍將城焉而共高欲限華夷決安危一世萬世有中原而稱大帝想其初也闢遐荒窮下土極九泉而深望九霄而樹千夫力殫目不暇睹有力如虎亦不暇努咫尺之間或什而伍離婁瞪瞪亦不暇數人氣氳氳成一方之雲灑汗瀟瀟成半空之雨駕肩而趨踵步而履紛紛囂囂如日中之市國不得而寧役不得而停伊朝繼夕自昏達明時若炎風熾烈川原盡竭枯肌外焚內火中竭是民咿咿憂秦未拔至若苦雪初霽陰風雨霜凍髭折鬢冰寒夜腸是民惶惶憂秦未亡民之既酷載僵載仆飢兮不粟寒兮不服病不暇休蟣不暇沐基人之骸壓人之肉少者不遑老者不復秦民嗚嗚向城而哭邊雲夜明列雲鏵也白日晝黑揚塵沙也築之登登約之閣閣遠而聽也如長空散雹蟄蟄而征沓沓而營遠而望也如大江流萍其呼號也怒風匉訇其鞭朴也血流縱橫地祇業業終朝忽讋星辰悠悠畏相其接而况於夷狄而况於臣妾其運輸也巷無居人田無稼民牛首濈濈大車轔轔輪不暇徙蹄不暇奔其傷財也極民之賦虐民之賂糊口而供赤立而赴餓殍塞路亦不我顧其民呶呶面天而訴將以宏其基恢其堵盡韓齊之土固其壁崇其飾竭億兆之力太華方城乃一拳之石既而岌嶪崢嶸向秦而橫如山之成如雲之平繚繞無際亘如長鯨豎亥汲汲步不可及掩映天漢勢不可算邱陵峩峩不及其半影人沙磧勢侵西域殘陽不來未昏而夕其堅如金其峻如林崇高不可以目辨遠大不可以數尋鳥飛不前其歸翩翩雲不得施其陰帛丿糸帛丿糸風不得馳其聲喧喧下視關塞蝸牛蟬聯回顧宮闕狀如微煙胡人駢連望之巍然如登青天如臨深淵不敢久視鳧趨而旋嗟乎城即高大民惟艱難聞之者攘臂而切齒覩之者涕泣而長嘆夫如是刑不得不暴政不得不煩國不得不亂民不得不殘謂其城可以固宗社謂其暴可以定人寰奈何敵不在遠憂不在胡城未畢也而秦已無殊不知棄秦者身寇秦者臣喪秦者嗣敵秦者民而怒秦者鬼神此可憂也而秦弗憂徒欲竭生民壘胡塵萬里而塗炭十年而苦辛然且喪其民亡厥身非城也去仁義積土石非城也是曰禍之門是曰滅之根安得而為防安得而稱長嗚呼謂險之可恃城之可保則右彭蠡左洞庭不為堯之征面伊闕背羊腸不為湯之亡是以處堯之宮行堯之風雖無是城也不可得而亂不可得而攻用秦之威布秦之非雖有是城也如藩垣之微如閫閾之卑無以防其患扞其師不然者秦無得而殃城無得而荒本以為禦而反以為亡者哉庭筠貞元九年官御史中丞律令格式懸之象魏奉而行之事無不理比見諸司寮寀不能遵守章程事無大小皆悉聞奏臣聞為君者任臣為臣者奉法故云汝為君目將司明也則知萬機務綜不可遍覽也所以設官分職者委任責成百工惟時以成垂拱之化比者或修一水窗或伐一枯木並皆上聞旒扆取斷宸衷豈代天理物至公之道也自今以後若緣軍國大事及牒式無文者任奏取進止自餘據章程合行者合令準法處分其有故生疑滯有致稽失者請令御史隨事糾彈樞貞元七年進士第一時年已七十餘驪龍之珠無脛而至駭浪浮彩長川再媚回夜光之錯落反明月之瑰異非經漢女之懷寧泣鮫人之淚狀徵既往莫究奚自偶良吏兮斯來遇貪夫兮則閟想夫旋返之儀圓明可期輝如電轉粲若星馳光浦漵竄蛟螭映沙礫晃漣漪在暗而投誠則悲路人未鑒沈泉而隱亦常表帝者無為欣出處兮據德幸浮沈兮中規是以特表殊姿潛懷有道中含逸彩上繫元造醜當時之叨餮應為政之美好真列郡之尤祥實重泉之至寶於是煥清瀨輝淺灣奔璀璨走斕斑豈能與石前卻隨流往還泛連波之下盈一水之間而已哉茲川兮始明老蚌兮勿剖瓴甋兮罷笑瓊瑰兮莫偶抱圓質而胥既揚衆彩而未久方載沈而載浮且曷浣而曷不玉非寶泉戒貪實為國之司南誠感神德繄物在為政之不咈愚是以頌其寶而悅其人美斯政而感斯珍想沿洄於舊渚念涵泳於通津則知美政不遠嘉猷入神故中潛皎皛下沈奫淪轉則無纇磨而不磷誠丹泉之莫擬諒赤水之非珍苟或疑此為虛誕願徵之於水濱覽削成之峰見靈掌之狀拓迹崇岫據奇謺嶂迢亭上竦赫奕東向高蹤可覿猶存二華之間纖指遙臨遠跖重霄之上爾其依峭壁據崇巒排物外撫雲端羽客遐指都人竦觀據開闢之殊致若騰陵而上干惟昔巨靈啓斯太華拓崇崇而喬嶽西靡決浩浩而洪流東下故能遵八川安萬化幹厚土存中夏薑嫄歆於帝武迹可相倫伯禹導於龍門功亦齊霸厥道可遵厥狀斯存仰摧天漢遙臨國門蓮萼高生如將搴擷桂枝傍倚狀欲攀援試冥搜於元造諒遺迹於坤元若乃傍攀冥蒙上指寥落右倚岑嶺左臨絶壑紛詭狀之無眹諒神功之有作星壇未沒必俟於捧持石鼓常鳴庸非其拊搏揖之永久斯為不朽嗟列嶽之所無小終南之何有喻天地惟資於一物拯沈溺豈藉於煩手常抗迹於介石乃遺芳於崇阜依乎泬寥揭彼嶕嶢聳昈昈於千仞擢纖纖於九霄折若華於暮景捧麗日於晴朝既瞻眺之無斁望提攜之匪遙共仰王褱姿徒懷壯麗如排霧氛似拂昏曀遐窺巨迹猶存體物之辭回瞰崇朝暫寫凌雲之勢積中貞元中進士惟天惠人惟王司牧必資立學以化被聚賢而政肅樂垂六德允接於生靈人抱七情於是乎修睦故命樂官宣樂德之旨教國子俾國人思服施行而萬邦作乂動蕩而㣥生茂育原其詔司樂闢靈臺選國中之胄子集宇內之王褱材示中和於前俾行而不怠尊祗庸於次將守而不回實克孝而克友必無間而無猜緬賾謨猷明徵義訓樂同和而會極綱有條而不紊中為忠告俾邪者奉忠格之心和乃適正制剛者守調適之分非有象以外感乃無聲而潛運祗敬不逾庸言是尊率威儀而允淑致言行之惟醇睦蒸蒸之孝誠全乎天性勗怡怡之友義原乎天倫設教之規爰立列樂之事方陳是將崇德教播成均議道自已建中於人夫就學必時為樂在茲春誦夏弦順陽而樂功猶懋無虐無傲率下而樂德增丕所以舜命伯伯讓夔立之以四教道之以六詩然後樂制敦浹國經允通至性於倫理垂善教於師資慕其人則遐不謂矣仰其教則學以知之方今政舉道光文修武偃播崇德為宣風之始訓國子為化人之本忝承教之在躬庶聲名之不遠至貞元中進士至哉樂為德也保太和茂生育是以先王法之以成教樂正尊之以示睦將磨琢於仁義匪鏗鏘於匏竹洋洋乎節以惠和煦煦然致其恭肅其儀不忒故容止可觀其道既宏乃進退可復信月將而日就庶不諂而不瀆且有教無類道之原來廉讓之風斯扇愷弟之德不回趨隅以繼其志待問以成其才於以見易和之容參於前也中庸之德夫何遠哉何必朱干玉戚一起一僨將以宮商克懸角徵潛運鳧趨碧沼皆籍籍於令名魚貫青襟各愔愔於淑問百行由是內融三德於焉成訓俾夫遷善者樂以陳修己者德以真樂者樂也可以樂其孝友德者得也可以得其忠臣昔后夔所以推其典樂虞舜所以稱其聖人豈不以人心感樂樂其有倫者哉今國家德教綏於九有禮樂達乎四維朴素遠符於軒氏和樂方軼於周詩多士濟濟百寮師師明誠之德可見中和之樂在茲自君臣達乎父子性成也何莫由之由之伊何行之非遠亦由端本去末化遐自閫然後外可以維城中可以補衮於與樂乎實教人之大本威貞元中進士彼美人兮懸隴雲念塞上之征客回機中之錦文千里馳心十年誓志想關山之延夢託丹素而垂意札札鳴杼紛紛積翠梭曳緒而龍回錦披雲而鳳至情生萬象功歸一致緑為芳草怨王孫之不歸紅作仙花發美人之幽思懿夫達其意者在乎誠為其藝者貴乎精顧異物之可賞諒同心之所成離披而芳樹搖影煥爛而明霞近榮振素手以鳴機蘭閨霜集斂翠峩而績縷紗窗月生則知妙極十全才先一絶既以彰其意亦以表乎節類乎錦卓氏服以妍精言乎詩謝女慚乎清切稽六義而不忒方百花而迥別心惟念遠將績縷以同營字是回文與愁腸而共結成乎手發乎心鋭精思而在今方之紈比之素積元功而冠古笑草露之輕薄勝林花之新吐宛矣麗矣錯金彩以成章寂兮寥兮零玉筯而如雨於是披閲風前光文爛然百花互進五色相宣文彬彬而愴矣彩重重而恨焉匪類雕蟲工乎織豈徒悅目寄乎邊寫片心之贈遠代尺素之相傳一則託乎情一則存於想謂乎錦也可裁心乎足賞君乎君乎發緘封知精誠之不爽方貞元中官監察御史國有學家有孰播樂德之文采率胄子以化育始先激其清濁而後攻其節目鼓篋之士宣聲音以相和挾杖之時俾心志而思服語於效者執德不回道以樂者知陽必來盈耳之聲詎作理心之教有開實俎豆之聞矣寧鐘鼓而云哉動於外而暢於中使和其性進以德而舉以事各盡其才惟其斆學必有謨訓咸養以致和強學以待問觀德畢賢愚之貫序德同長幼之分豈不以樂之至也通乎神教之至也慎乎身惟彼樂之為德是彰教之有倫不在匏竹設金石振乃貴於祗庸備孝友陳豈不念終始而典樂美教化於成均遂乃與誦諷觀屈伸斯可以移風易俗不止於溫故知新保和於心暢五聲而授之有道將遜其業崇四術而宏之在人厥類可知允懷在茲諒審樂以知政由切問而近思初感至音聽角聲而惻隱變矣終懷雅性聞羽奏而寬大似之且被之以簫管加之以訓辭升學而在於春候合射而戒於秋時然則不教以中和不能知樂不教以博依不能安詩是以學者為王化之端樂者繫國風之本故曰觀大學之道然後剛知困而滿知損殷輅貞元中進士雞開美錦鏡隱蟠龍雞則彪炳兮五雲之狀鏡則清澄兮止水之容是得比形鼓舞偶影相從蹩初臨向月輪而回眸婉婉翩翾將顧映菱花而謺足重重質貌既異威儀可覩進退雅符於節奏曲折冥契於規矩投身宛轉若赴簫韶之音矯翼連軒似合桑林之舞形其動矣影亦隨之類塤篪之並得同律呂之相追故人之視焉知分形之有別禽之悅也謂一體之無疑不馳心於緑水自結念於丹墀豈比夫在仙都而思曉入雅頌而興詩者哉徒觀夫雞不倦臨鏡無疲照覩其形而屢舞謂其侶而相召寧知大樂之同和自合無聲之要妙且鑒物兮在我故欲照兮無可無不可其稟氣也合德諒茲舞而有典兮有則傃日而鳴遇陰而息雞之在鏡類鸞翔之入雲空鏡之納雞若朝霞之映潭色原其始也徘徊山谷帛丿糸歷星辰每念栖於丹闕茲獲貢於虞人由是辭荒徼入函秦優遊青禁顧盼紫宸則昔之在山也雖蘊姿而誰語今之舞鏡也方呈質以效珍孰與夫翻飛青崖之側昭彰幽洞之濱五德備兮其容不細衆彩煥兮厥狀逾麗幸朗鑒之斯臨莫獻奇於魏帝
