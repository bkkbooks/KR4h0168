front:
  text: 全唐文欽定全唐文卷二百七十一紹尚書臨孫神龍時歷官侍御史員外郎睿宗即位纍轉給事中兼太常少卿先天二年元宗講武驪山紹以典儀失軍容誅
  hash: sha256:723795ce40a04fe0c7eaa61536d5af33b608b5c770ed31866060c90f1551b7ca
  markers:
  - {type: head, offset: 14, content: 唐紹, id: KR4h0168_NFKB_271-h1, level: 1}
body:
  text: 臣伏以既安宅兆禮不祭墓止謂送形而往山陵為幽靜之宮迎精而返宗廟為享薦之室但以春秋仲月命使巡陵鹵簿衣冠禮容必備自天授以後時有起居因循至今乃為常事起者以起動為稱居者以居止為名詳起居之義非陵寢之法生事以禮必勤於定省死葬以禮當閟於安厝豈可以事居之道行之於送往之時敢辭命使勞繁但恐不安靈域又降誕之日穿針之辰皆以續命為名時人多有進奉今聖靈日遠仙駕難追進止起居恐乖先典況京畿傳驛機速極繁加以諸陵往來其馬便多死損望停四季及忌日降誕并節日起居陵使但准式二時巡陵庶得義合禮經陵寢安謐竊聞鼓吹之作本為軍容昔黃帝涿鹿有功以為警衛故掆鼓曲有靈夔吼鵰鶚爭石墜崖壯士怒之類自昔功臣備禮適得用之丈夫有四方之功所以恩加寵錫假如郊祀天地誠是重儀惟有宮懸本無案架故知軍樂所備尚不給於神祇鉦鼓之音豈得接於閨閫准式公主王妃巳下葬禮準有團扇方扇綵帷錦幛之色加至鼓吹歷代未聞又準令五品官婚葬先無鼓吹惟京官五品得借四品鼓吹為儀今特給五品已上母妻五品官則不當給限便是班秩本因夫子儀飾乃復過之事非倫次難為定制參詳義理不可常行請停前敕各依常典臣聞王公巳下送終明器等物具標格令品秩高下各有節文孔子曰明器者備物而不可用以芻靈者善為俑者不仁傳曰俑者謂有面目機發似於生人也以此而葬殆將於殉故曰不仁比者王公百官競為厚葬偶人像馬雕飾如生徒以眩耀路人本不因心致禮更相扇慕破産傾資風俗流行遂下兼士庶若無禁制奢侈日增望請王公已下送葬明器皆依令式並陳於墓所不得衢路將行又士庶親迎之儀備諸六禮所以承宗廟事舅姑當須昏以為期詰朝謁見往者下里庸鄙時有障車邀其酒食以為戲樂近日此風轉盛上及王公乃廣奏音樂多集徒侶遮擁道路留滯淹時邀致財物動踰萬計遂使障車禮貺過於聘財歌舞喧譁殊非助感既虧名教實蠹風猷違紊禮經須加節制望請婚姻家障車者並須禁斷其有犯者官廕家請準犯名教例附簿無廕人決杖六十仍各科本罪謹按昊陵順陵恩敕特令依舊因循前例守戶與昭陵數同又先代帝王陵戶準式二十人今雖外氏恩隆亦須附近常典請准式量減取足防間庶無逼上之嫌不失尊崇之道又親王守墓舊例唯得十人梁魯近加追贈不可越於本爵準令贈官用蔭各減正官一等故知贈之與正義有抑揚禮不可踰理須裁制請同親王墓戶各置十人為限又太廟宿衛準配正兵縱令壖內掃除還以其兵應役褒德別加廟戶兼配軍人既益煩勞又虧常典縱使恩加極禮須準太廟汙隆別置百人亦請停廢臣聞禮以冬至祀圓丘於南郊夏至祭方澤於北郊者以其日行躔次極於南北之際也日北極當晷度循半日南極當晷度環周是日一陽爻生為天地交際之始故易曰復其見天地之心乎即冬至卦象也一歲之內吉莫大焉甲子但為六旬之首一年之內隔月常遇既非大會晷運未周惟總六甲之辰助四時而成歲今欲避環周以取甲子是背大吉而就小吉也粲幽州范陽人舉進士景龍二年纍遷給事中以忤安樂公主出為陳州刺史纍轉祕書少監開元初卒伏尋陵之稱謂本屬皇王及儲君等自皇家以來諸王及公主墓無稱陵者唯永泰公主承恩特葬事越常塗不合引以為名春秋左氏傳云衛孫桓子與齊戰衛新築大夫仲叔于奚救孫桓子桓子以免衛人賞之以邑于奚辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯名與器不可以假人若以假人與之政也政亡則國家從之聖人知微知章不可不慎魯王哀榮之典誠別承恩然國之名器豈可妄假又塋兆之稱不應假永泰公主為名請比貞觀以來諸王舊例足得豐厚臣聞陵之稱謂施於尊極不屬王公巳下且魯王若欲論親等第則不親於雍王雍王之墓尚不稱陵魯王則不可因尚公主而加號且君之舉事則載於方冊或稽之往典或考自前朝臣歷檢貞觀以來駙馬墓無得稱陵者且君人之禮服絶於傍期蓋為不獨親其親不獨子其子陛下以膝下之恩愛施及其夫贈賵之儀哀榮足備豈得使上下無辨君臣一貫者哉又安樂公主承兩儀之澤履福祿之基指南山以錫年仰北辰而永庇魯王之葬車服有章加等之儀備有常數塋兆之稱不應假永泰公主為名非所謂垂法將來作則㣥辟者也皇太子處繼明之重當主鬯之尊歲時服用自可百司供擬又據周官諸應用財器歲終則會唯王及太子應用物並不會此則儲君之費咸與王同今與列國諸侯齊衡入封豈所謂憲章在昔垂法將來者也必謂青宮初啓服用所資自當廣支庫物不可長存藩封景伯邢州柏仁人景龍中為諫議大夫景雲中進太子右庶子遷右散騎常侍以病致仕開元中卒臣聞書曰惟上帝不常作善降之百祥作不善降之百殃禍福之來惟人所召應符影響可不懼哉伏惟殿下稟粹重離摛英若木道光儲二譽表元良掃凶祲而邦家以寧贊寶歷而皇祚方永凡在㣥品莫不仰賴語成功則巳大矣論盛業則巳崇矣惟當養德青宮問安紫極去惡除本為善務滋納忠讜於正人杜浮媚於邪徑遊心經史引接文儒覽古今之得失為行事之龜鏡日新其美豈不盛歟近承諂曲之徒私進女色莫非倡蕩穢跡可知將入宮闈以為娛樂傷教敗禮豈復是過及其出入矜誇恩幸坊曲之閒能無漏泄至如榮忝簪笏跡預朝廷稍涉奸私尚為深纍況一國之儲副萬方所瞻奉焉可不自戒且政之興衰皆由化下自上所及若草隨風理在必然不可不慎竊惟後宮命婦員品稍多兼選良人固為淑麗止足之賞疑詎假旁求此非殿下之本心直被小人之所誤臣實庸鄙智識無聞濫齒榮班謬參宮相職在規諫冀申裨補若其默而自守何以上答聖恩非直尸素之罪人亦當神祇之所譴敢罄愚直以效涓塵伏願悔巳往之失知昨非之弊念色荒之誡懲縱敗之言勿近小人無聽邪說常恐有失兢懼為心則睿德被於㣥方頌聲振於氓俗天垂福祐永保無疆儻蒙採納幸甚幸甚謹昧死奉啓以聞輕觸威嚴伏待斧鉞謹啓思復字紹出京兆長安人少襲祖倫爵長山縣男舉秀才高第景龍中纍轉中書舍人開元中遷太子賓客進爵伯卒年七十四諡曰文臣伏聞近日河南河北蝗蟲頃日為害更益繁熾經歷之處苗稼都損今漸翾飛向西薦食至洛使命來往不敢昌言山東數州甚為惶懼且天灾流行埋瘞難盡臣望陛下悔過責躬發使宣慰損不急之務召至公之人上下同心君臣一德持此誠實以答休咎前後驅蝗使等伏望總停書云皇天無親惟德是輔人心無常惟惠是懷不可不收攬人心也議獄緩死列聖明規刑疑從輕有國常典嚴善思往在先朝屬韋氏擅內恃寵宮掖謀危宗社善思此時遂能先覺因詣相府有所發明進論聖躬必登宸極雖交遊重福蓋謀陷韋氏及其謁見猶不奏聞將此行藏即從極法且敕追善思書至便發向懷逆節寧即奔命一面疏網誠合順生三驅取禽來而可宥惟刑是恤事合昭詳請付刑部集㣥官議定奏裁以符慎獄臣聞刑人於市爵人於朝必僉謀攸同始行之無惑謹按諸司所議嚴善思十才一入抵罪惟輕夫帝閽九重途遠千里故借天下之耳以聽聽無不聰借天下之目以視視無不浹今㣥言上奏採擇宜審若棄多就少臣實懼焉輿誦一乖下情不達雖欲從衆其可及乎凡百京司逢時之泰列官分職有賢有親親則列藩諸王陛下愛子賢則胙茅開國陛下名臣見無禮於君寧肯雷同不異今措詞多出法合從輕景直瀛州河閒人中宗朝為太常博士歷禮部郎中謹按三禮正文無諸陵日祭之事惟著宗廟月祭之禮故祭法云天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之遠廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止則此禮典明文義可求矣又按禮論譙周祭志云天子之廟始祖及高祖曾祖祖考皆每月朔加薦以象平生朔食也謂之月祭二祧之廟無月祭此譙周所著與古禮義相附近亦無日祭之文今諸陵月祭有朔望并諸節日科則古禮殷事之義矣諸節日猶古薦新之義矣故鄭元注禮記云殷事月朔月半薦新之奠也又注儀禮云月朔月半猶平常之朝夕也大祥之後即四時焉此則古者祭皆在廟近代以來始分月朔月半及諸節日祭於陵寢在廟惟四時正享及臘為五享前所奏定並依古禮正文不旁求外傳故祭義云祭不欲數數則煩煩則不敬考據經史無日祭惟漢七廟議京師自高祖下至宣帝與太上皇悼皇考各自於陵旁立廟又園中各有寢便殿日祭於寢月祭於廟時祭於便殿至元帝時貢禹以為太煩奏請罷郡國廟丞相韋元成等議七廟之外寢園皆無復修奏可議者亦以不欲祭數數則黷宜復古禮四時祭於廟丞相匡衡亦奏七廟迭毀之義帝從之又數改劉歆以為禮去事有殺引春秋外傳云日祭月祀時享歲貢祖禰則日祭高曾則月祀二祧則時享壇墠則歲貢至後漢陵寢致祭無明文以言魏氏三祖及晉皆不祭於墓故晉書云魏文帝黃初元年自作終制立壽陵無封樹無寢殿夫葬者藏也欲人之不明見禮不墓祭欲存亡不黷也明帝尊奉之晉宣帝預於首陽山為土藏不墳不樹斂以時服不設明器景文皆奉成命無所加焉景帝後依宣帝故事自魏三祖以下不於陵寢致祭並附於古禮至於江左亦不崇園寢及宋齊梁陳其祭並無聞今參詳以為三禮者不刊之書懸諸日月外傳所記不與經合不合依憑國家率由舊章討論典禮謨事作範垂裕將來擇善而行依經為允其諸陵日祭請准禮停從之景龍中官左臺侍御史陛下今若曲受主言而縱奴掠良人何以理天下臣知放則免罪於私門劾則得罪於公主終不忍全身遠害屈法偷生惟陛下垂照察泚中宗朝官長安尉張仁願在朔方奏判軍事開元十三年由兵部侍郎出守宋州禮經之設實和天地凡在有司理資虔恪況大射斯御大侯既張誦貍首以成章歌騶虞而應節匪文匪武載光於禮容爰豫爰謀式備於彞典崇折俎之儀助發生之氣豈得弨弓之旨致闕公宮彼茁之規猶虧相圃位已乖於司射法須加於秩宗請置鷞鳩之科以懲樹皮之失岐州刺史馬回奏開渠與人相假貸歲課不時入執事以為勞無成將議裁貶蒲密之化鄭白之饒溝洫可以立人秦漢斯焉定霸豳風載陳於王業瓠口深著於氓謠故典農中郎明濟河於興廢搜粟都尉定邦國於錙銖眷彼循良義存俯企馬回中和踐化右翊班條以為鄴下墱流功成於舄鹵南陽疏畝富埒於京坻雖開鑿方勤而清閒每就假多慙於邵父終有協於倪公儻秋蟀春鶊人樂疲於力役杏花菖葉農靡闕於耕桑輸稅若或先時菽粟何妨殷積詳刑議獄詎曰攸宜
