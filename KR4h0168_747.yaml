body:
  text: 朕嗣守丕圖務宏至理憂勤是切宵旰靡遑所以庶政萬機悉委丞相乃者失於任使妖沴遽生方思正人參我大柄銀青光祿大夫守尚書右僕射上柱國榮陽郡開國男食邑二千戶鄭覃天資直氣嶽降上才性惟端莊道本孤峻文含風雅學洞儒元通古今理亂之源達教化損益之要歷踐華貫周旋大僚休聞彰於縉紳政事滿於臺閣載居講席密勿內朝胸襟洞開肝膈無隱嘗奏讜論發言有先見之明每勵貞規勇退守獨立之節洎擢膺揆務總領庶官堅操不回墜典皆舉盡瘁憂國竭忠戴君必能毗豫一人康濟四海邪正之路既判清濁之流自分於戲秉茲鈞衡委乃髦碩爾其使萬事得其序百官得其人用賢罔不精立法罔不慎弼亮刑政燮和陰陽其聽朕言往踐厥位克紹先德巖廊有光可守本官同中書門下平章事散官勳封並如故天下一家何非君土所在方鎮官庫錢皆陛下庫緡錢也盧周仁輕黷宸嚴輒陳小利務期容受妄說異端若言南方多有火災故外須防戎寇恐成煨燼請納京師則所進之餘安可遂無此盧周仁罔思大體姑徇私誠入財貨以干榮待清朝而何淺貢之無藝實紊彞章伏見今年正月一日赦文天下藩方四節獻賀三年內猶皆權停周仁所進頗玷皇化何裨國用臣伏恐萬方從此相效皆以羡餘為名縱無羡餘亦因緣刻克寸生人受弊起自周仁深不稱陛下臨軒求太平意也其盧周仁應須重責以例長人者所進錢伏請却還湖南道收貯以備水旱留貸貧下戶納兩稅交代相承不得擅用使九有獲蘇一方知感天下幸甚臣融議曰王者則高明以茂育法博厚而含宏象日月以昭臨如雨露而膏澤諡以令德昭於至公即軒轅顓頊文王武王是也其有褒旌未副則宜增美尊名惟順宗至德宏道大聖大安孝皇帝道合二儀明齊兩曜恩沾萬物信若四時始位踐重光名高少海寢興有度視聽必端昔德宗駐驆奉天禮行巡狩掃除凶寇實賴春闈每誓衆之初而吐言激切及撫軍之際皆感動師人洎車馬還都歡娛宮禁朝夕視膳晨昏問安是居重華育德望苑日彰孝愛三十七齡三善益表於元良六氣忽嬰於沉痼德宗以龍樓重嗣惟疾之憂醫藥躬勞至於大漸順宗昭事德宗之節也詢古無對德宗厪念順宗之至也前史莫倫父子之親君臣之義垂榮萬國流慶千年及歷數自天祗承丕構不敢牢讓方遵永圖師唐虞之治以覆幬天下纂禹湯之化以煦育黎元薄賦蠲逋宥刑恤隱深仁降感沛澤旁敷減去宮人斥絶奇貢臨軒廣愛焚鴆毒於通衢憑檻興仁放猛鷙於維繫歸功臣之甲第而中外謳歌黜殘酷之劇吏而遠近欣服虔恭九廟眷佑萬邦宵旰勤劬詎思頤衛於是託付冢嫡壯乎皇猷以明繼明以聖傳聖孝德垂名於不朽睿謨貽慶于無疆是生聖明收復河隴刷百載失地之恥滌八聖強鄰之羞陛下不有其功歸美祖考追尊諡號曰重鴻名易曰天地之大德曰生聖人之大寶曰位經曰德者同於德道者同於道諡法曰寬裕和平曰安克慎所安曰孝伏惟順聖皇帝端拱造物秉運統天可謂至德也感神翊運光明正位可謂大聖也永圖丕搆傳聖和保可謂大孝也臣融定加諡號謹上尊諡曰至德宏道大聖大安孝皇帝謹議臣融議曰皇莫尊乎羲軒帝莫大於堯舜咸有上諡光昭厥猷先德巍巍徽美未稱則必追加大號式重鴻名伏惟憲宗神聖章武孝皇帝神授英明天假文武德惟孝養仁著君臨功格元穹伏以天寶之末大歷之中郡國有倔強之臣朝廷行姑息之令所以李錡拒命自于宗枝劉闢稱兵起於儒吏伏惟憲宗皇帝上遵太宗之法次覽軒后之書親近正人委任輔相修明紀綱震動雷霆翦滅渠魁征討叛亂無職不舉無賢不嗣將靖萬方用於四海號令必一視聽無私故得夏台伏鑕於沙陲上黨受擒於城鎮西蜀獻俘而玉京正法東吳納寇而金陵廓開郾城才下而申蔡削平鄆師就誅而齊魯盡復皇威遠振神算無遺時也滄景屏息以朝天易定束身而納地海內無事天下一家萬國來賓百蠻向化方興謀于戎虜深注意於河湟伏以疆土開拓而有時腥羶冠帶而有日逐覩赫口休烈留付中異克主有明聖違以英運睿謀心果疑越古超今陛下不有其功歸於先志揭茲上善既讓於天能光祖宗繼述前聖昨者丞相卿士請加鴻名陛下固秉冲謙再三不允今追尊祖考榮冠禹湯伏惟憲宗神聖章武孝皇帝乃聖乃神乃武乃文盛德大業經天緯地記曰武王周公其達孝矣乎詩曰文王受命有此武功臣融定加諡號謹上尊諡曰昭文章武大聖至神孝皇帝謹議敬元吏部侍郎陟子官左補闕將軍諱用誠字君諒河南人也曾王父諱惟靜開府儀同三司檢校太子賓客兼侍御史河南節度先鋒兵馬使大父勤銀青光祿大夫試太常卿兼侍御史河南節度兵馬使烈考播銀青光祿大夫檢校國子祭酒河東節度軍馬都兵馬使兼御史中丞普寧郡王三代為將克昌惟武垂慶後世傳芳于公公即中丞第四子義感得一時之俊沈謀有周身之防貞元初藝成絶倫縱遊郡國名藩重鎮爭致邀迓乃不屑就其道益光襄陽節度使樊公澤虛心好才與能樂善聞公有縱橫之略剛决之姿申縟禮以接之選右職以署之而能恪勤厥位練習武經繇是樊公益所委重纍遷至馬軍兵馬使會吳少陽卒其子元濟席凶器以竊據淮蔡詔命唐隨節度使李公訴總齊軍士以討伐之命公為遊奕兵馬使指顧麾下號令前驅率先啓行深入賊境遇敵必戰所向無遺會賊將領徒千人草創營壘旗號日興橋柵而公伺其軍食無儲是刈是穫備其乾餱鴟張蟻聚控扼要害公度其孤虛可以攻取以少擊衆如其前堂堂之勢砉然而斷殺傷奔潰靡有孑遺生擒賊將衆皆請殺而公不聽以客禮待之曰吾不能殺義士從其歸死於天子乃送其人于闕繼而陳章疏懇請全活憲宗皇帝英明聰斷詔下許之還賜軍前驅使俾領先鋒將與公偕行導其鋭卒沍寒之夜凌犯雪霜擊破賊城官軍坌入先擒元濟以檻車獻於宗廟得正刑典由公之生致賊將化為忠臣覆其妖巢以功補過朝廷推賞纍寵旌節授公銀青光祿大夫檢校太子賓客兼御史中丞仍賜上柱國詔曰素抱將才能通武訓策名戎旅委質藩方敷七德以招懷推一心而撫納遂使戴天之大節因事斯彰奉國之名謀逢時乃合奮其勇士潰彼凶徒堅壁洞開罪人斯得永言實效無忘寤思其圖爾勞是舉朝典旋以東平不虔將議征討詔命李訴為徐泗節度俾行天誅訴以公沈勇夙彰思同王氏列名表請委以親兵充行營都虞候公恪勤無私戰陳有勇破賊柵者有六收縣邑者有三教令必嚴刑戮不濫仁而有法其若是歟賊平遷檢校國子祭酒詔曰平齊之役諸軍指期衆校合戰各奮毅勇同樹勳勤永思積日之勞頗愧踰時之賞故於獎授有所超遷時屬邊事重難非公莫可詔統麾下鎮防朔方居三年朝議以頻建茂功位未充量走耳隱徵赴闕除左羽林將軍詔曰沈勇英決挺直將才制勝出奇合於兵法夙勵勤王之節嘗從伐叛之師赫然殊功於是纍振諸侯方嶽多有薦揚北路親軍寄雄心膂統率貔貅之衆申明羽衛之嚴宜獎壯猷且兼峻秩敬宗皇帝以張韶作亂禍生不測環衛嚴整狂賊誅夷拜兼御史大夫歲月滋深竭誠盡瘁遷大將軍知軍事疏封列爵褒寵勳賢勞績既彰優榮斯及封武昌縣開國子食邑五百戶上方倚注信臣錫宴別殿論功校藝公實居多方委爪牙之雄未兼鈇鉞之寄竟以積勞成疾憂國忘身太和四年歲在庚戌冬十一月乙未薨于升平里之私第享齡五十九皇帝軫悼廢朝賻禮加等粵辛亥二月十五日甲午葬于京兆府萬年縣長樂鄉宋侯之西原後三月詔贈工部尚書表勳臣也夫人李氏從夫之貴封趙郡夫人淑慎賢明能正婦道節哀盡哭動合禮經長子宗簡福王府參軍次子宗授一子出身幼子福郎小女平娘孩啼孺慕絶及懷抱以敬元昔因朝奏相遇諸途語及戰伐之事備聞功業之本其子以理命見託固徵斯文而表諸道蓋不虛美其詞曰惟天生人必以類分定亂以武克生武臣洸洸史公振輝㣥倫正直不回剛决無鄰沐若膏雨煦然陽春濟以寬猛施之威仁三代為將道家所忌為將四世彌彰勇毅制勝出奇料敵善利全活擒生度材任知寒天雪夜萬里齊轡攻討賊城致之死地干戈既戢弓矢載櫜懋功既立爰議賞勞謙勤愈彰寵錫彌高貴婚華憲輝映賢豪王者之師勝殘去殺由不得己在懲桀黠惟公訓齊確然不拔令亦寬簡政不苛察羽林震衛克壯其猷推誠心膂練習貔貅忘身奉君勞積生憂運促潛奪名在建侯追榮八座寵錫威武葬于九原軫悼明主勳名獨在骨肉歸土表行豐碑垂休萬古孚文宗時人官許昌縣主簿客有遭逢漢昌從武帝而登岱覩白雲之效祥曰此蓋非常不飄不揚初起封中方郁郁以呈象稍浮山上乍英英而有光原初出之義也告成我皇我皇德以靜人威以平難廓清諸夏光啓大漢俗既和兮考時巡禮既備兮登日觀惟天輔聖無雨則其明徵惟嶽通元出雲所以幽贊不然者山有四嶽胡獨興於此地有四極胡不普而施觀耀質以流彩若無心而有知無心者何隨車而動息有知者何表聖之功德帝穆清以修祀雲故清其容帝貞白以為心雲故白其色豈徒然也君為萬國所仰嶽乃衆雲所屆其垂思儲精登封俯拜亦庶幾乎明神斯答景福攸介故夫是雲也乘元氣而出冠靈壇而浮不漠漠以四散直亭亭於上頭祥光內朗瑞色旁流既表慶于茲日復增華於介邱此可以見其無疆之休者也且夫刻石者所以紀號泥金者所以昭告必元德之已升乃茲山之可造若齊桓僭侈秦帝驕暴縱傾國以修封豈嘉祥之云報美矣哉晝日斯清瑞雲孔明絪縕蕭索下應一人之感髣佛影響旁聞萬歲之聲彼入房彰於殷帝浮洛表於周成豈可與茲而名哉君名常洧字巨川句曲人也其先奕世載德錫姓受氏詳乎家牒炳乎國史矣在昔宣王時則有若張仲孝友周人美之列于風雅在悼公時則有若張老恢晉國之圖拯魏氏之急魯史嘉之編于簡冊高祖伯卿曾祖元紹並怡情典墳抗志不仕祖處靜皇湖州烏程令考章皇建州司戶君即建州之第四子也幼而聰敏長而岐嶷窮百行之源事父母以孝稟五常之性奉親族以和及父母既沒居憂泣血柴毀骨立躬自建冢高數尋手植奇樹盈千餘本然志戀墳塋將終身灑掃雖喪紀逾制而靡釋衰絰乃葺結庵廬居于墓次哀動行路感通神明白鶴翔于林中靈芝生于墓側鄉黨稱其孝郡邑嘉其行録表上聞優詔允答復其徭役旌其倚廬三紀于茲情不一異君嘗疾困殆不勝喪勺飲不入口者纍日矣其兄常泳勸令飲食固辭不從兄謂之曰有疾飲酒食肉在禮自有明文無以死傷生也今汝異居幽荒之際而即安于疾殆至滅性又安得為孝乎乃曰吾負終身之憂匪惟一日之戚且吾有兄不患死之將至兄有豫不患祀之將乏身既不賴其生口豈復食其味乎君子曰甚哉張氏兄弟孝之大者也非令弟無以知兄之賢非仁兄無以成弟之美所及其遠哉上以彰聖朝孝理之至中以表牧宰奉化之極下以明張君錫類之永此一行也而三善成焉孚雖庸愚備知盛美竊以寵錫之命雖行表于門閭紀述之詞曾未標于篆刻敢直書其事識之貞石焉銘曰天錫嘉命保佑我唐篤生張君令名是揚令名伊何純孝克彰終身在戚執親之喪獨居幽荒廬墓之側喪制既踰哀情罔極衰絰弗離甘旨靡食疾苦嬰身志行不忒節彼高墳巍然如岡草木呈瑞鸞鶴表祥孝感之至達于聖皇詔命旌美殊其井疆勒銘紀行于門之旁千秋萬祀斯風不忘王褱太和中官潤州句容縣主簿昔原涉廬于墓三載人至于今稱之况吳郡張生父母繼歿匍匐墳土寤處苫塊棄絶人事凡三十一年號泣終身故至性感物精誠動天靈芝繼生嘉祥麕至鄉里仰其道狼戾者為之恭恪悖慢者為之孝慈郡縣以聞于是天子寵以旌表當代著之歌謠又太和六年姪孫公珽繼亦廬于墓時職留務于金陵日御史談公為清時名士深用褒焉曰張家至孝已傳三世可革人俗變諸鄉閭不匱之美萃于張氏矣而張氏世傳儒素家唯四壁大唐之璽書文人之麗藻雖傳諸子孫而未置于金石會其諸兄之孫曰琢以經學著名少游太學垂十年有貞介之行有恭懿之德事親愛以順交朋友以信邠帥知之辟主印真寧糾逖滯疑綏懷孤弱真寧有單父武城之化民皆翕然秩滿歸鄉經先人之舊廬悼盛事之未樹喟然嘆息霈然涕洟乃出琴書車馬以鬻焉取其資繕葺廊廡芟夷榛荊咸取敕旨勒于貞石使永不泯夫建邦立家唯忠與孝有一於此宜乎不朽君斯舉也上宣吾君之命下顯爾祖之休盡善盡美矣贊曰天經地義其惟孝焉六順之始百行之先哲人斯難爾祖有旃土闕徒立荊榛滿阡永錫之道將不匱焉吾儕感此深用惘然乃紀貞石是昭是宣豐碑既樹厥美方傳俾其不朽永慰荒埏哲官潤州句容縣令人與天地同有孝與父子偕生道德失而稱仁哀慕結而滅性於是先王立中制三年通喪人倫以達然孝子之心感逐時並蹙隨身盡句容張常洧哀親之不返將已以為殉鄉閭懼法孝子違心長號天高侍宿墳側歲移六次人無二行柴骨杖起蓬頭氊垂非禮教之所知非名實之相與誠至孝之所致而至于斯也余執事之日耆老趙某等共舉之愴然感懷因自俯慰申州上請以表門閭州司慮其矯情異衆飭哀求顯事留精詳時多永嘆國體不以殊行立法故旌善以激俗史館編集傳記頒令搜揚今年八月觀察使御史中丞王公録上尚書省明詔未及幽魂已慶惟此孝子行之實難余替人喬公體包仁和志存感激異斯事舉請余記之素卿太和時人大師號齊朗生報身于尋陽陶氏承大司馬侃之後侃捨宅作西林寺其孫纍有人繼前志故大師幼有覺心事峰頂寺律大德法真為和尚出家受具皆目其下傳七支四分學精進勇猛所治如官之與憲法其徒肅而不敢犯故自山發其風行諸道流若鈞衡繩墨所化之處無不斷斷爾所居水閣院水閣之稱天下知重長講律業兼通無量壽淨名等經復手自為義記以示後學貞元三年從峰頂本大師陪荊州慶門寺靈裕台州國清寺法裔同受廉使李公兼龍興壇場之請洎七年刺史崔公衍置方等於當州開元寺請東林大德熙怡大林法粲興果神清同赴壇會十四年郡守李公康興甘露之會請宣州開元寺大德慧莊撫州景雲寺上宏吉州靖居寺道華當州寶稱寺智滿同秉羯磨至元和初鄂嶽觀察使郗公士美建法會于頭陀寺又命簡奉迎曰鵝珠在冰雪之中鶴貌出風塵之外其感搢紳大人相知之深如此享年七十有三法歲四十有九示寂滅于長慶二年十月十六日用是年閏月二十一日奉葬于峰頂大師靈塔之右恭遺命也嗚呼凡與大師遊者自童年及暮齒未嘗以言色高下用戕于人人之聰明覩此知教雖庭戶之近必擬跡而後行或饑寒之來必審公而後取所謂聲為律身為度其殆庶乎或人來以持律相難者對之曰吾聞四十不惑以至無邪正當師之我法只爾聞者降伏知言要理深自洪州升龍興寺壇轉至甘露頭陀惣一十有四會承羯磨者數盈千萬計故江西以為佛法鐘鼓皆自水閣出考功員外郎李公渤中書舍人白公居易嘗視郡事得之精微每至道場膜拜起敬門人元超元諫元膺元諲元皓清鋭元惣智明等懼先師之德光不留於金石乃以本際實行付雲臯比邱草具狀藉門弟子大德道建如達沖契宗一等虔請碑銘于滎陽鄭氏子素卿辭不能免乃強起筆應之曰釋之徒有持律猶官之徒有持法二者謹嚴則教立而道尊惟大師以惠覺心以心治身秉佛憲書為佛翰垣調馭諸根不生一塵提導孺孩出離火燔升我漸階入我便門慈覆軒軒法灑翻翻膏之清濡長之茂蕃故自匡廬散吳楚間受教比邱知處元關或坐道場或登戒壇景我之山派我之川珠貫大千印可無邊來也不羇去之偶然吁嗟乎西林佛日嘗在此兮已焉太和六年歲次壬子三月甲午朔六日己巳門人元諫等樹倣字思道宰相俯從父弟太和元年進士咸通中歷禮戶一部侍郎拜義成軍節度使入為兵部尚書歷吏部兵部以本官同平章事遷中書門下侍郎進司空宏文館大學士蘭陵郡侯罷為嶺南節度使卒年八十臣某言臣謬掌貢闈果茲敗失上負聖獎下乖人情實省已以競慙每自咎而煌灼猶賴陛下猥矜拙直特貸刑書不奪金章仍付符竹荷恩宥而感戀奉嚴譴以奔馳不駐羸驂繼持舟棹臣二月十三日當日於宣政門外謝訖便辭進發今月一日到任上訖臣誠惶誠懼頓首頓首臣性稟朴愚材昧機變皆為叨據果竊顯榮一心惟知效忠萬慮未嘗念失是以頃升諫列已因論事去官後忝瑣闈亦緣舉職統斾身流嶺外望絶中朝甘於此生不到上國伏過陛下臨御大寶恭行孝思詢以舊臣遍霑厚渥臣遠從海嶠首還闕廷才拜丹墀俄捧紫詔任掄材於九品位超冠於六曹家與國而同歸官與職而俱盛常思惕厲粗免悔尤已塵銓衡復忝貢務昨雖有過今合具陳臣伏以朝廷所大者莫過文柄士林所重者無先辭科推公過即怨讟並生行應奉即語言皆息為日雖久近歲轉難如臣孤微豈合操剸徒以副陛下振用明時至公是以不聽囑論堅收沈滯請託既絶求瑕者多臣昨選擇實不屈人雜文之中偶失詳究扇衆口以騰毀致朝典以指名緘深懇而闕一字得敷陳奉詔命而須乘郵傳罷遠藩赴闕還鄉國而只及一年自近侍謫官歷江山而又三千里泣別骨肉愁涉險艱今則已達孤城唯勤郡政緝綏郭邑訓整里閭必使獄絶寃人巷無橫事峻法鈐轄於狡吏寬宏撫育於疲農粗立微勞用贖前過伏乞陛下特開睿鑒俯察愚衷臣前後黜責多因奉公秉持直誠常逢於黨與分使如此時亦自嗟寫肝膽而上告明君希衰殘而得還帝里豈望復升榮級更被寵光願受代於蘄春遂間散於輩下臣官為牧守不同藩鎮謝上之後他表無因達天聽而知在何時備繁辭而併陳今日馳魂執筆流血拜章形神雖處於遐陬夢寐尚馳於班列臣無任感恩惶恐涕泣望闕屏營之至謹差軍事押衙某奉表陳謝以聞陛下高懸爵位本待賢良既命澆浮恐非懲勸圭居家不稟於義方奉國豈盡於忠節下闕臣聞元祖之道由慈儉為先而素王之風以仁義為首相㳂百代作則千年至聖至明不可易也如佛者生於天竺去彼王官割愛中之至難取滅後之殊勝名歸象外理絶塵中非為帝王之所能慕也昔貞觀中高宗在東宮以長孫皇后疾亟嘗上言曰欲請度僧以資福事后曰為善有徵吾未為惡善或無報求福非宜且佛者異方之教所可存而勿論豈以一女子而紊王道乎故諡為文德且母后之論尚能如斯哲王之謨安可反是伏覩陛下留神天竺屬意桑門內設道場中開講會或手録梵策或口揚佛音雖時啓於延英從容四輔慮稍移於聽政廢失萬機居安思危不可忽也夫從容者君也必疇咨於臣藎忠匡救外逆其耳內沃其心陳臯陶之謨述仲虺之誥發揮王道恢益帝圖非賜對之閒徒侍坐而已夫廢失者上拒其諫下希其旨言則狎玩意在順從漢重神仙東方朔著十洲之記梁崇佛法劉孝義詠七覺之詩致祠禱無休講誦不已以至大空海內中輟江東以此言之是廢失也然佛者當可以悟取不可以相求漢晉以來互興寶剎姚石之際亦有高僧或問以苦空究其不滅止聞有性名曰忘言執著貪緣非其旨也必乞陛下力求民瘼虔奉宗祧思謬賞與濫刑其殃立至俟勝殘而去殺得福甚多幸罷講筵頻親政書昔年韓愈已得罪於憲宗今日微臣固甘心於遐徼某昨者出官之由伏計盡得於邸吏久不奉榮問惶懼實深某自守孤直蒙大夫眷獎最深輒欲披陳其事略言首尾冀當克副虛襟鑒雪幽抱伏以近年貢務皆自閣下權知某叨歷清崇不掌綸誥去冬遽因銓衡叨主文柄珥貂載筆忝幸實多遂將匪石之心冀伸藻鏡之用壅遏末俗蕩滌訛風刈楚於庭得人之舉而騰口易唱長舌莫箝吹毛豈惜其一言指頰何啻於十手既速官謗皆由拙直竊以常年主司親屬盡得就試某敕下後榜示南院外內親族具有約勒並請不下文書斂怨之語日已盈庭復禮部舊吏云常年例得明經一人某面責其事即嚴釐革然皆陰蓄狡恨求肆蠹言致雜文之差互悉㣥吏之搆成失於考議敢不引過又常年榜帖並他人主張凡是舊知先當垂翅靈蛇在握棄而不收璞鼠韜懷疑而或取致使主司脅制於一時遺恨遂流於他日今春此輩亦有數人皆朝夕相門月旦自任共相犄角直索文書某堅守不聽唯運獨見見在子弟無三舉門生舊知才數人推公擢引且既在門館日夕即與子弟不生為輕小之徒望風傳說曰筆削重事閨門得專某但不欺知白之誠豈畏如簧之巧頃年赴廣州日外生薛廷望薦一李仲將外生薛扶秀才云負文業窮寄嶺嶠到鎮日相見之後果有辭藻久與宴處端厚日新成名後人傳是蕃夷外親嶺南巨富發身財賂委質科名扶即薛謂近從兄弟班行內外親族絶多嶺表之時寒苦可憫曾與月給虛說蕃商據此謗言豈粗相近况孔振是宣父胄緒韓綰即文公令孫蘇鳥故奉常之後鴈序雙高而風埃久處柳告是柳州之子鳳毛殊有而名字陸沈其餘四面搜羅皆有久居藝行之士繁於簡牘不敢具載某裁斷自已實無愧懷敦朝廷厚風去士林時態此志惶撓豈憚悔尤今則公忠道消奸邪計勝衆情猶有惋歎深分却無憫嗟何直道而遽不相容豈正德而亦同浮議久猜疑悶莫喻尊崇幸無大故之嫌勿信小人之論粗陳本末希存舊知臨紙寫誠含毫增歎特垂鑒宥無輕棄遺幸甚慤字端士太和初進士大中朝拜禮部侍郎出領方鎮卒鍾陵郡控連山大江環合州城揭起樓榭遊之者莫不目駭魂禠號為一方勝概先是背郛郭不二百步有巨閣稱滕王者懿夫峻修廣袤非常製所能擬及考尋結構之始蓋自永徽後時滕王作蘇州刺史轉洪州都督之所營造也距今大中歲戊辰亦將垂三百年徒嘉乎飛翬謺欒虎踞龍盤發地呈形與山同安曾不知蕩滌不必繫於天災興廢自叶於時數將利恢復果憑智謀故我雁門公按節廉問方頒條詔令肅而兵戎讋服政和而疲瘵昭蘇妙撫循則有袴襦咸獲之謠寬賦斂且無杼軸皆空之歎歲比善熟俗臻治平故州民相與稱賀繼而歌曰自公之來闔境歡咍飲公之化若乳嬰孩雖國僑理鄭國而多方長孺緝淮陽而布效方公今日不足過也宜乎享亨祉居全功無何值祝融發其災回祿煽其焰曾未竟夕煤侔秋蓬則斯閣之製蕩無餘矣其他廩廥之地接續郵亭甍楝纚連疾飈一驚遂至延及公至是領徒夜出俾撤屋開道毒焰方熾逡巡不能救翼日公乃往觀焉召將校謂之曰吾幸得備位廉察不能懇求人瘼敬避天戒致火之患時豫之辜遂審量日力詳度費務役不加重而蒸徒凑事協于中而公用省衆謂難集我方指期遂得鼛鼓不勝而築之閣閣梓材並構而勢已耽耽自非智用周敏政齊畫一則安能創規模之豐麗如彼程制造之速疾如此不有廢絶孰能興耶今按舊閣基址南北濶八丈今增九丈三尺其峻修北自土際達閣板高一丈二尺今增至一丈四尺濶板上舊長一丈今增至一丈三尺中柱北上聳于屋脊長二丈四尺今增至三丈一尺舊正閣通龜首東西六間長七丈五尺今增至七間共長八丈六尺濶三丈五尺固可謂宏廓顯敞殊形詭狀革故鼎新有如是乎况前通舟車回瞰江嶺每值美景宴集笙歌散迂遠凝宵漢上軼雲雨即未知三山之靈仙窟穴五湖之賢達沈浮其於歷賢勝負果又何如耳故自焚爇之後又建是閣廣其郵驛廳事接以飛軒纍榭復架連樓小閣對峙高揭旁通江亭津館致巧衒能回廊并抱以交映邃宇相縈而不絶則是閣也冠八郡風俗之最包四時物候之異春之日則花景鬬新香風襲人憑高送歸極目蕩神夏之日則鶯舌變哢葉陰如棟紈扇罷搖綺窗堪夢秋之日則露白山青當軒展屏凉風遠來沈醉易醒冬之日則簷外雪滿幄中香暖耐舉樽斚好聽歌管則斯閣之盛縱遊之美賞心樂事庸可既乎夫易舊圖新樹非常之績天其或者必將候魁岸博達負出人智能而俾張大其所為不然何當瘡痍未復之前而妙於救藥煨燼已成之末而遽及經營况不奪農時不勦人力帑藏免竭日時免賒觀之者咸謂神化翕忽殆非人力之所為也噫夫王褱譎特殊巍峩相扶似乘靈濤湧出方壺華厦崢嶸開闔睢盱用鎮遐俗尤光奧區是必知後千百年閣之名焉與公之政俱垂不朽矣至如江山之重復物産之殷充亭臺增葺以雲蔓廨署繕完而櫛比布在圖籍孰能該詳慤今所以為異者但舉乎閣之廢矣自公復興而已其他壯麗形勝已備列諸公述作故不能一二覼縷時大中執徐歲秋八月哉生明記瞻字幾之其先彭城徙桂陽太和初進士又登博學宏詞科咸通中拜戶部侍郎充翰林學士以本官同平章事加中書侍郎兼刑部尚書集賢殿大學士罷為荊南節度使再貶歡州司戶參軍僖宗立徙康州刺史量移虢州以刑部尚書召復以中書侍郎平章事卒臣聞修短之期人之定分賢愚共一今古攸同喬松蕣花稟氣各異至如籛鏗壽考不因有智而延齡顏子早亡不為不賢而促壽此皆含靈稟氣修短自然之理也一昨同昌公主久嬰危疾深軫聖慈醫藥無徵幽明遽隔陛下過鍾宸愛痛切追思爰責醫工令從嚴憲然韓宗召等因緣藝術備荷寵榮想於診候之時無不盡其方術亦欲病如沃雪藥暫通神其奈禍福難移竟成差跌原其情狀亦可哀矜而差誤之愆死未塞責自陛下雷霆一怒朝野震驚囚九族於狴牢因兩人之藥誤老幼械繫三百餘人咸云宗召荷恩之日寸祿不霑進藥之時人不同議此乃禍從天降罪匪已為物議沸騰道路嗟嘆陛下以寬仁厚德御宇十年四海萬邦咸歌聖政何事遽移前志頓易初心以達理知命之君涉肆暴不明之謗且殉宮女而違道囚平人而結寃此皆陛下安不思危忿不顧難者也陛下信崇釋典留意生天大要不過喜捨慈悲方便布施不生惡念所謂福田則業纍盡消往生忉利比居濁惡未可同年伏望陛下盡釋繫囚易怒為喜虔奉空王之教以資愛主之靈中外臣寮同深懇激外置同正員上柱國彭城縣開國子食邑五百戶賜紫金魚袋贈左監門衛大將軍劉公墓志銘並序公諱遵禮字魯卿帝堯垂裔實分受姓之初隆漢勃興更表昌宗之盛靈源彌遠瑞慶斯長史不絶書代稱其德曾祖諱英皇任游擊將軍守左武衛翊府中郎將韜鈐奧術倜儻奇材運厄當年位不及量僖伯有後纍生英賢烈祖諱宏規皇任左神策軍護軍中尉特進行左武衛上將軍知內侍省事贈開府儀同三司揚州大都督沛國公佐佑纍朝出入貴仕文經武略茂緒嘉庸誓著山河勳銘金石訓傳令嗣慶集德門即今開府儀同三司內侍監制仕徐國公名行深也公即開府第五子穎悟於齠齔溫克於童蒙孝敬自稟於生知忠恪允符於夙習爰當妙齒即履宦途以寶歷二年入仕重位要權爭用為寮寀資鴻漸之勢俟麟角之成雍容令圖遜讓美秩開成五年方賜緑授將仕郎掖庭局宮教博士充宣徽庫家地密務殷選清材稱舉止有裕階資漸登會昌元年授登仕郎四年授承務郎常在禁闈日奉宸扆皆貴游之子弟為顯仕之梯媒清切無倫親近少比特加命服仍領太醫六年賜服銀朱加供奉官轉徵仕郎內僕局令充監醫官院使親承顧問莫厚於宣徽榮耀服章無加於紫綬其年六月授宣義郎改充宣徽北院使十一月賜紫金魚袋階秩表仕進之績爵邑列恩寵之榮既屬上材因降優命大中二年授朝散大夫彭城縣開國子食邑五百戶密侍右遷樞軸備選邊防經制才略所先公論咸推帝命惟允五年改充宣徽南院使尋兼充京西京北制置堡戌使疆埸設備今古重難俾無奔突之虞用致煙塵之息凡所更作大叶機宜與能疇勞換職進秩其年使回改大盈庫使旋授宮闈扃令夫良弓徑矢武衛戎裝器號魚文名掩繁弱帑藏之貯進御是須多資峻嚴以綰要重七年改內弓箭庫使又以上田甲第職夥吏繁禁省之中號為難理苟非利刃寧惣劇權八年改內莊宅使出護戎機實為重寄受歷試之選膺貞律之求爰以周通遂俞推擇九年改充海監軍使共綏武旅旁協師臣儻非其材亦罕濟用雅聞懿績更蒞雄藩十二年改鄆州監軍使出入之宜勞逸是繫履踐之美重沓為優十三年赴闕明年授營幕使其年再領弓箭庫使咸通元年十二月轉掖庭令雲螭窪産驥子龍孫當星馳電逸之場列中皂內間之藉寶鞭玉勒足蹀首驤繫於伯樂之知懸在伏波之式鑒精事重匪易其人三年遂授內飛龍使休聲益暢睿渥彌敷進於崇班示以懋賞四年授內侍省內侍地控西陲任當戎事思得妙略冀絶邊虞五年改邠寧監軍外展殊勳內缺要務人思舊政主洽新恩七年復拜內莊宅使顧遇益隆兢謹愈至將申大用先命崇階八年授銀青光祿大夫嗚呼得君逢時材長數促性命之際賢哲莫窮咸通九年孟夏遘疾優旨許歸就醫藥針砭無及湯劑徒施莫逢西域之靈香遽嘆東流之逝水以其年六月十四日薨于來庭里私第享年五十三八月五日詔贈左監門衛大將軍竊惟開府以仁誼承家用忠貞事主德齊嵩華量廣滄溟便蕃顯榮洋溢功業掌鈞衡則彌縫大政綰戎務則訓齊全師勤以奉公寬而濟衆書于史冊播在朝廷故得朱紫盈門輝光滿目公之仲季時少比倫並以出人之材各奉趨庭之訓優秩佳職後弟前兄而公不享遐齡豈神之孤衆望也是以開府惋惜軫極悲懷夫人咸陽縣君田氏四德咸臻六姻共仰婦道克順母儀聿修有子四人長曰重易給事郎內侍省內府局丞次曰重允宜徽庫家登仕郎內侍省奚官局丞又其次曰重益曰重則並已賜緑皆以孝愛由已明敏居心在公處私克守訓範以似以續家肥國華今則喪過乎哀惙焉在疚宅兆既卜日月有時十一月八日銜哀奉喪窆于萬年縣崇義鄉滻川西原禮也佳城永閟昭代長違生也有涯前距百齡才及半死如可作後遊九原當與歸瞻叨職內廷特承宗顧刊刻期于不朽叙述固以無私銘曰積德之孫大勳之嗣允文允武有材有位既遇明時將膺寵寄樞機之任咫尺而至命不副才期而爽遂崇崇德門侁侁令子垂裕後昆流千萬祀
