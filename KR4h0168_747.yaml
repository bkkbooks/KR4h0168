front:
  text: 全唐文欽定全唐文卷七百四十七融字章之元和中進士開成中拜吏部侍郎檢校禮部尚書領興元尹出為山西道節度使徙東川還拜兵部尚書封晉陵郡公辭疾以太子少傅分司東都大中七年卒贈左僕射
  hash: sha256:92950813ba74c3c82aac2b46e7d8e796dad7fb35fed5b988cee30e6070d50bbd
