front:
  text: 全唐文欽定全唐文卷二百六十二李雍二
  hash: sha256:c17259a6e93f47718e2d00f2196c8f5ecbda5c05445ae9dcd6da503a325a0f8d
body:
  text: 日者託宿祕篆寄傲神府撰奇討異注靈通感冥搜海堧遐矚坤極敞金闕疏玉堂河漢未暩其源今昔罕聆其語曷若宛此山郭介在江濆薄人寰騰物外妙有特起靈表澒洞綺田砥平錦嶂壁立肇衍洞穴延袤中堂蹙怪形以萬殊砑地勢以千變伏虎奔象浮梁抗柱激濤海而洪波沸渭欱杳窱而㣥峯嵳峩飛動逼人屹聳驚視密微微而三分地道風蕭蕭而一變天時竇乳鍊於玉顏石牀列於仙座隔閡塵境延集福庭寂兮寥兮恍兮惚兮使營魄九升嗜欲雙遣形若希羽翼志若摩雲天秦漢之間莫知代祀羲皇之上自成遐邈當是時也慕名者執雌而退徇物者守心而安求道者息慮而凝懷書者陋古而默有若邦伯畢公守恭廣孝聞家至忠觀國政門尤跡談者不容於口義心厚行遊者每藉於名故能吏修其方人樂其業流冗歸止介特乂安於是命友僚縱琴酌一歌一詠以遨以遊莫不解榻於斯張樂於斯騰駕五龍遣去駟馬豈惟避暑窟室締賞林巒擊石如鐘酌泉如醴固亦轉丹竈掇紫芝迹參寥之遠心推習隱之幽致者也高要郡北五里有石室詭怪萬狀崆峒其中發揮靈蹤盤薄厚地皆神仙之窟宅為區宇之勝概有巨石皆似蹲獸之類疊花仰空的礫瓊脂色如截肪傍引穴竅疑為洞門橫聳石牀出次仙座東廂峭壁下有涵泉漲澄鏡色味輕瓊漿東西倚山之陽二十餘里西通武林東抵嶺山羊峽有同乎源播厥派者夥哉沿之椎輪則終列大輅革以穴處則崇構廈屋譯梵言於華學象楗槌於景鐘從來久矣觀其聆妙音獎宏誓艾苦趣警禪門劒輪疑在空法衆斯集鏞之時義大矣哉郡司寇北平楊公沙門師萌抵淨根保耳界妙有忠為迦維之業堅朴象正之鈞嘗慨靈越樂郊勾吳通邑雖經行大壯塔廟藝釋訓乃首唱㣥吏傳聞庶氓合德悉心聚糧殫幣鑠文馬以庀製驤㣥龍以範鍾撰祥時歷令日傾郛鄙畢緇黃舉帆雲屯擊轂雷動百身勇施纍讚願言者計以萬億然後陶人事爐火正疏冶風伯鼓橐樂工楊嬉疑煥乎鼎陳蔚焉邱峙手舞者翳景稱慶者振林遲明蕆功亭午卒業於是曾臺大起雕簴懸列鯨魚叱怒以震擊蒲牢跧曲以駭噭隱天綱謍地理剎那昭應一念信心有無識生幽執鬼物莫不休復淨域貞觀真諦矣有若大者不槬小者不窕則州鳩之聽曷以臻其間歟其詞曰大雄立號兮考彼華鐘震發三界兮以覺其聾俾我㣥動兮不罹厥凶君子是象兮載鑠載鎔彌億斯年兮罔有天鏞大廈中構山屹飛鬬黃河畎澮大行培塿整庶宣風緝戎備寇鎮寧一方光輔元后奐上人至傳諸大德意令弟子撰和上碑但重元門深闕四海大君者我開元聖文神武皇帝之謂也入佛之智赫為萬法宗主者我禪門七葉大照和尚之謂也是以從無因得不出三界於清泰運教昭宣圓常洽著菩薩之本心密住依國王之信力四生於涅槃者不其廣歟和上諱普寂俗馮氏長樂信都人也其先畢公高之後畢萬入晉受邑於魏支子食采馮城因而得姓洎亭為韓上黨守在趙為華陵君異漢征西將軍思義晉驃騎將軍家於河南今為河東人也祖居士諱道相經德營道晦用藏密考居士諱會均艮背園廬飛遁鄉邑和上生而茂異長而開明神清體間氣和志遠栝樹雖小其根巳深河源則微其流可大欣願去結永言依僧嘗以德業書紳藝術從學負笈梁許摳衣班馬博總經籍殫極天人以為洪範九疇周易十翼雖奧旨元邈然大略回疑不若別求法緣幽尋釋教時大梁璧上人以義解方聞敷演雲會遂聽法華經唯識起信等論巨石投水其入甚多修坂走丸所適彌遠重依東都端和上受具轉奉南泉景和上習律超契心地忽見光明隨止作行得親近處於是貞觀嵩阜隱居半巖布褐一衣麻麥一食中夕歎曰文字是縛有無是邊盍不以正戒為牆智常為座發廣大願修具足慈他方七寶之山路遠難到自境四念之地身樂且安猶曰密印者謂之師先覺者謂之達吾當求矣此其時哉將尋少林法如禪師未臻止居巳承往化追攀不及感絶無時芥子相投遇之莫遂甘露一注受之何階翌日遠詣玉泉大通和上膜拜披露涕祈咨稟良馬易進良田易平加之思修重之勤至寶鏡磨拂萬象乃呈玉水清澄百丈皆見衡山之石更悟前身新豐之家自然本處如此者五歲約令看思益次楞伽因而告曰此兩部經禪學所宗要者且道尚祕密不應眩曜和上旁求僻陋宛在園林夾江之間藂竹之下鮀蜃每作虺蜮交馳頃差他人必辭痼疾和上願充僧使便得經行心無所存背無所倚都忘禪睡了悟佛知兩馬一車進念同轍一鳥二翼定慧皆空如此者復二年大通和上深賞重之人未之蘭若今將自之大通止曰嵩山亦好至於再諾而居焉長安年度編嶽寺神龍歲請不哭泣而不言緇素墜心棟梁落構以為四害騰口誰者能緘五欲亂繩誰者能截乃合謀悉意聞香求花如鳥隨風如輪隨跡咸請和上一開法緣使四園可遊八池可浴則僧非聚食人異散心願聞樂器之音用滋毛孔之潤和上曰夫淨燈可以照勝宅助風可以持寶城今何為乎且千車之聲不入於耳萬人之請誰聽其言神龍中孝和皇帝詔曰大通禪師降迹閻浮情存汲引戒珠圓徹流洞鑒於心臺定水方澄結清虛於意府原其行也既無人而無我測其理也亦非斷而非常然而示彼同凡奄隨運往形雖已謝教乃恆傳其弟子僧普寂夙參梵侶早簉法筵得彼髻珠獲茲心寶但釋迦流通之分終寄於阿難禪師開示之門爰資於普寂宜令統領徒衆宣揚教迹俾夫聾俗咸悟法音考功員外郎武平一奉宣聖旨慰喻敦勸和上猶逡巡辭避不獲巳仍曰廣大者莫極於虛空我性相能遍元妙者莫深於開示我定慧能傳未或不從應身而建四生法主未或不登正覺而啓一佛度門曷敢當仁以膺求我且正見了見轉次既殊浣家鍛家習性亦別草席遇水而緊草繩遇水而舒地水火風青赤白黑八萬煩惱八萬解脫翳憍慢之山金椎難碎貪恚之毒龍珠不消諸生當誦戒經以傳正受開元十三年恩詔屈於敬愛寺宴坐逮十五年皇上將幸於京師也優詔曰慎言義福宜從駕和上留都興唐寺安置由是法雲遍雨在其根莖妙音盡聞惟所圍繞其始也攝心一處息慮萬緣或剎那便通或歲月漸證總明佛體曾是聞傳直指法身自然獲念滴水滿器履霜堅冰故能開方便門示直寶相入深固藏了清淨因耳目無根聲色亡境三空圓啓二深洞明是故聞者斯來得者斯止自南自北若天若人或宿將重臣或賢王愛主或地連金屋或家蓄銅山皆轂擊肩摩陸聚水咽花蓋拂日玉帛盈庭和上洗然若虛曠然若谷不見施者不知受焉遂龍象之所崇惟塔廟之所供但趫猿自息醉象皆調聞是名者不生四趣蒙其潤者便過四禪則有學富蓬山經通貝葉百家奧旨三藏真言目如曜星舌如飛電莫不杜口折角失客革心二十七年秋七月誨門人曰吾受託先師傳茲密印遠自達摩菩薩導於可可進於璨璨鍾於信信傳於忍忍授於大通大通貽於吾今七葉矣尸波羅密是汝之師奢摩他門是汝依處當真說實行自證潛通不染為解脫之因無取為涅槃之會諸生殊不知其故嗚呼八月二十四日有彌留怡然坐滅於都興唐寺享壽八十九僧夏五十二聞哀行哭臨堂撫膺雲霧冒山江河奔海沸渭坌入陰沈彌望者至於百萬皆曰天地德不踰晝水神明之祐未際入流今之我聞異於汝說沐浴智慧之海超騰生死之河恩崇化先痛深物表情可理割義可事詮者嘗以前聖後賢示跡開教降生所以傳法歸盡所以同凡久留則厭聞恐其慢易終去則追遠欲其懷思忘其身而神遷益高間其法而事稀彌重始終權實之化不斷不絶究竟誘進之益無去無來河南尹裴公名寬飛表上聞皇情震悼詔曰大士遺榮豈貴於名稱前王表德必在於褎崇都同德興唐寺故大德僧普寂資於粹靈是為法器心源久寂戒行彌高既來理而悟空每導凡以宗聖慈悲所應汲引蓋多方冀永年式宏像教遽從遷化用謝浮生言念於此良深憫惜宜稽其淨行錫以嘉名示夫將來使高山仰止可號大照禪師歸本居葬日量借威儀手力和上將變易之歲纍告門人曰吾久居山水緣亦在焉及泥日天竺興唐緇似皆請卜而厝之表而祈之唯嶽寺一方地震雪下少室㣥巘樹折霜封洎九月八日恩私果令歸葬二十一日金棺發軔鹵簿啓行或兩都傾城或四方布路持花者林指執紼者景移三條之中泣淚如雨重城之外號叩若雷綵雲二時自都達嶽白露數里彌川遍空二十四日穸於嶽寺之舊居禮也門人等修羅死慈島人死義血現於體繩繫於牀僉某拾衣一心起塔塵多折軸箭重回舟銜石而海水可填結竹而佛恩難報二十八載十一月十五日恩旨許焉仍委寺主慧遠上座崇泰都維那曇慶等載令構緝二十九年十一月十九日恩旨遷藏海寺於和上河東舊宅廓為寺焉建塔追崇福也且爰自六葉式崇一門未誦戒經或傳法要大通以凡例起謗將棄我聞深解依宗遽求聖道所以始於纍土漸於層臺攝之孔多學者彌廣故所付諸法不指一人卜夏西河有疑夫子鄭元北海自襲馬融至於密意除知慧心入境如因日照方見日輪終以佛光乃明佛道豈伊雍也而敢議之大弟子惠空勝緣等相與追過去示方來一以抒宿心存妙用一以奉慈訓宏教門騰淨行於松阡刻師資於石字其詞曰三界渺茫四生沈痗塵境延歊蔭欲攻內明鏡虛受大慈圓對法鼓震驚魔軍消潰其一千佛轉覺七葉相承護持俗諦應現真僧長河皎月靜室明燈梵經滋廣禪林蔚興其二童稚初心儒釋兼致梁陳咨稟伊洛勤匱雖臻閫域猶執文字古城元遠空門深邃其三逝將分赴曾是幽求玉泉谷口甘露山頭慧日一照浮雲四收給園都邑鷲嶺嵩邱其四大通往生後覺來問妙法終啓苦言未順願發他心稍宏本分固讓固請不矜不訓其五德音光被皇華洊臻曲荷天獎昭宣法輪總總緇素憧憧搢紳以智慧水洗煩惱塵其六慈攝雲奔檀施山積無相無願不受不斤龍象興補塔廟光益香花戶庭護念泉石其七同人將滅依宗闡教草繫爾師宴居爾照聞哀行哭惟艾及少命鳥無翼慈舟失棹其八渥恩痛悼追諡哀榮塔遂嵩嶽儀從洛城靈輿顧步天樂淒清追攀霧委感動雷驚其九入室來思登壇永慕密教不紀後生何趣禮石塔兮若割仰金字兮如注杖億劫兮昭陽與四法兮安住其十天寶元年二月十五日建三數日晴頓熱若為自適也僕少理欲使小兒入京當從澧州去有書不示之諸公歎賽無九百之事當不復爽也故使馳問不具李雍白十二日差無多事檢校來一言集耳通長孫五郎得彼柔性契茲佛乘豈無衆木我喻垂藤觀夫密教將開必有其地靈嶽將應必降其人是以兆發真僧功成宏願以一如正受之力致三朝大事之因故得帝王宅心王公攝念國祥備至家寶薦臻玉宇懸空金谷飛月婆若之海塵不能淄安明之山風不能振莫與京者其在茲乎國清寺者隋開皇十八年智者大師之所建也大師強植之根已於千萬佛所本性之照豈於一百年間是以相眉雪光慈目水淨入不住地得無上緣五部律儀具分金界三昧定力更立寶山始入天台居於佛隴則知冥符事現元感名徵搆室者不立於空託迹者必興於物是寺本題天台先是大師嘗夢定光禪師教曰寺若成國必清大業元年僧智璪啓其禪以為號煬帝從而改焉至義寧之初寺宇方就事屬皇運言符聖僧粵若右赤城左滄海艮背曾阜襟開平原寶勢雄侈於古今奇表嚴淨於江漢建置崇麗慮矩恢殊廣殿磴於重嚴周廊廡於絶巘峯臺納景於下視鴈塔排雲於中休八部來思不孤其德三身在此有睟其容亦猶妙勝之鄉乾竺之里若即見佛豈與登仙曷云菩提樹間必能七日成道忉利天上可以三月安居而巳哉借天仙往還神秀表裏靜漠漠而山遠密微微而谷深自然羅浮遷移既因風雨育王製造載役鬼神落落然列星陳於九天昭昭然飛霞夾於二曜松間豁達祥雲飛和雅之音橋路逶迤德水照澄清之色佇立者神奪散心者目明所以信士永言至人馳想不遠萬里有以一臨離垢道場遇之即是去結法意願之便成淨水寶珠見者無染高山甘露受者有知起念事功頓超十劫之地坐入位證遙比千眼之天別有放生溪源通流朝信鱗介千族壓海而隨波網萬艘因利而興簺崑崙之水天地罕經通之極恆沙之命溪壑無醉飽之期大師憫其殺因示其宿世父母妻子俱是輪回山石地方盡歸報復百味歡喜之藥願樂法王五指慈悲之根降伏師子由是漁父易節鮮食向風釋綸解徽停筤去笱暢撥刺以掉尾恣噞喁而鼓腮乘佛之威入佛之境不恐不懼且安且懷矧過去之罔窮固未來之靡盡福德輕重等須彌之斤兩濟度廣大同法界之範圍所以欽若九重煜耀萬國光贊者五主襟絶者數朝儀鳳二年三月十日制曰台州國清寺迥超塵俗年代或異妙相真容纍呈感應之跡或淨居仙宇函有徵祥之效大啓良緣實寄茲所宜今寺內各造七級浮圖一所度僧七七人自今有闕隨即補故其智印接武草繫傳薪千葉蓮華了無異色五綵繒蓋休有圓光莫不清涼之泉沃茲劫燒定慧之力刜彼魔幢羅漢之身時可去矣如來之室歲豈留乎昔有顗禪師者即大師之復次也戒珠圓明德芽俊茂以精進大力運自在他心每指堂東因如廁奄忽泉涌須臾石開雖炎赫曠時而清冷彌載又堵波歲久根據勢危首亞西南趾留東北一遇瀑雨稍浸廣庭護法陰騭而扶持信力潛運而平正宜其女子不宿葷血不臻鎮之以法似守之以山神永懷水月高謝風塵此又奇也於時明牧敬公名咸忠賢相門德禮邦鎮宣慈被物遺直在人邑宰李公名安之不忮不求有為有守惠愛恤下貞固幹時大德行續上座神軌寺主道翹都維那首那法師法忍等三歸法空一處心淨景式諸子大濟㣥生皆賞歎幽奇明徵相事雖裴回縱目而髣佛畫屏豈曲盡於筆端固懸天深造以為孫公之賦未究三仙郭璞之經罕知十地是存刻石以廣披文其詞曰兆出名山功加賢位甫和令茲焉感致佛隴通明國清發瑞徵名立榜應運題寺法寺神麗像殿崇嚴九成臺閣百丈松杉瞰瀛列座倚巘飛簷風庭肅爽霧谷沈潛想像梵宮超遙仙宇目有書傳耳無浪語不知從來相去幾許施物及僧唯吾與汝外物莫際密教自傳心淨色淨有邊無邊持劒豈失喻筏能捐若遇諸佛巳超四禪聞者斯來見者斯悅果果法似因因地㞯心境始開知印皆發求仁得仁即說非說沙彌救蟻菩薩放生溪流晝夜潮水虛盈鱗介萬族濕化千名福河不絶佛土常寧郡邑才良紀綱禪律恭惟令始雅尚休畢保綏地靈光照佛日將播美於永代愧當仁於雄筆昔者誕發老君道純天地生德夫子身負日月且時宰不宗主人勿用矧乎埋照浚谷潛盤窮山幽姿蛻於塵容素尚允於仙類豈辟命行矣爵服縶之而己哉公諱國重字雅鎮南陽葉縣人也自少典錫羡高辛纂緒陶唐重熙后稷邁種文王之允乃食於沈尹戌之子載封於葉受氏享國大哉邈乎逮祖乾昱克壯其猷永孚於德墐戶習隱塞兌億坤碩膚長材通理博藝雖安車纍至而堅臥固辭故慶祚克開眉壽維永矣厥考道興性守公庭道敷邦國居鬼從地率神從天受籙以怛之飛符以比之扼魍魎之邪劉臺台之祟有足奇也至於揮札落井引弓貫革特起五部廣推大餘侯誰嗣哉先生靈承道宗異聞訓誘弱喪文貌幼尚純篤仙骨有象童心不萌專精五龍遍遊㣥嶽聰以知遠明以察微達死生之占體物氣之變嘗以靜貞動耗息影歸止雲臥牝壑林巢仙居人絶不鄰道阻且右獨往幽勝永歌隱淪放閒保和習虛致靜捃五石之髓擷三芝之英時哉不留歲聿其逝緇髮純漆韶顏渥丹事適元同神與道媾惟寂惟寞不飲不食數十載於茲乃升聞帝庭駿發皇眷簡才受命降尊加禮將之以文馬速之以暢轂先生盱眙長揖揮手高謝曰自昔帝舜登庸德輝允鑠光武繼統吏道孔嘉且薛方逢萌備外臣之禮虞仲夷逸終處子之業豈垢俗疵物偏貢介性將探道慕類坐致奇齡使者蓄無言之疑申遂行之旨乃周覽廬室躬省倉廥考疇人之疆畝訊家童之作業皆儉以遵約安能維始味不甘口色無養目信以為著誠去僞敢守難奪順風可即強起曷至焉遂虛覯復命慚歎聞列朝廷企其高渴其道聆嘉聲而屬想者豈勝言哉有司以天元書缺星度官弛亡五德之運謬四時之分荊鬼越祥不知所呪子亥母癸烏識其原皆乘遽遠尋請益傳授可謂繩誠列而曲直徵衡誠懸而輕重立粵惟博物君子豈伊小說鯫生乎嗚呼天不持久人將復歸頽年迫於期頤遠志屈於摧落卜兆幽谷托墳清林逸人不追國士靡憲泉石沮色鄉縣失聲豈無他人惟子之故允子慧明贈銀青光祿大夫歙州刺史公罔替厥繇代增其業啓祕籙之高妙揚元津之洪波道微若聲心麼若氣吹律暖谷運歷知天屢下辟書終不應命孫子景龍觀道士鴻臚卿越國公法善幼得父書早傳成法夤念有訓邁迹自身讀天下之書備方外之術火滌淫祀劒誅㣥祅恩開五君名動四國其入也排金瑣謁紫庭為帝傲吏其出也法玉京坐元寺作人宗師故能大匠道門冢卿朝右禮食軒座寓直禁廬矣嘗以理氣自強登老益壯雖莫景急節而純孝孔哀是獻封章願拜墳墓有軫帝念載形王言神札以飛傳瑞乃發㣥公帳餞列蕃郊迎朝章有輝鄉人皆慶枉以末技揚於孝心惟先志以追遠立豐碑以紀德夫何閒然其詞曰宗門素履家代隱仙道一相孕薪火相傳黃公術在赤水珠聯道開幽鍵性與真筌一門纍祖四世百年抗迹巖谷消聲天地卓爾遐舉藹然高致麝以臭焚珠以明墜人則有心徵亦不至保身匪偷全朴為利孝孫增業明辟順風志嘗無忝事或不同徵賢朝滿舉逸山空曷由高枕克謝代工測微達變盡規納忠皇眷雖渥孝思亦深章服粲粲傳駟駸駸載違廷闕是展墳林紀石追遠昭銘率心孝終事立榮歿寵今遐超古始永憲江南昔者法王道開掘山相現曾是大事職非小緣順喻孔多證入彌遠故以三界為宅五濁為火四生為子六度為門一乘為大車十方為長者轉置熱惱之衆延集清涼之都念茲在茲廣矣大矣法華者晉義熙十二年釋曇翼法師之所建也師初依廬山遠公後詣關中羅什深入禪慧尤邃佛乘雖禮數摳衣而名稱分坐與沙門曇學俱遊會稽覯秦望西北山其峯五蓮其溪雙帶氣象靈勝林壑虛間比興耆闍營卜蘭若羞涅槃食納如來衣專積法華永言實意感普賢菩薩為下俚優婆提狶子於竹筐寄釋種於蓬室師以縮屋未可枕屐乃明移出樹間延入舍下及杲日初上相光忽臨乘六牙衛八部勝幡虹引妙樂天迎瑞相騰雲遙裔上漢師想望太息沈吟永懷葉公好龍巳遇真物羅漢測佛未了聖心於是苦行自身炯戒通夢宛如昔見彌恨前非象勸持經嘗難其語夾夾聽法不易其人矧乃攝以蜂王吼以師子禮謁者掎其裳袂讚歡者合其風雷時太守孟顗以狀奏聞以為寺則知妙法者真如之正體蓮華者淨道之假名是故崇厥經署於榜入無量義成不住因至若高僧慧基邑人陳載皆踵武扳跡傳燈襲明或五柱範堂或七寶規殿立普賢座追連弗藍龍王讓池鴈子疏塔迦羅衛國連至雲山淨明德宮更開日月固足以發慧印啓元門入位畢臻出家偕應則有持證等觀永藏同流或慧舉十徵或昭明再造或簡文瑞像或武帝香爐寶鈐吟風珠幡交露僧繇墨意畫長豪之妙光宮女綖功織大身之變相次有陳隨國施州邑吏檀百寶盈於九隅㣥經備於三藏所以神鍾警夜保賢聖之天居祥鳥肅賓迓軒蓋之雲集忍辱靈草捃萋萋於小莖傴曇異花搴灼灼於喬幹故得人天回首江海因聲芭蕉過雷焉滋茂葵藿隨日至矣勤誠登山而野曠心空浴水而垢除意淨施及先律師道岸今弟子釋儼並身林久伐禪刺都遣性通七事戒總八關金杖五分優劣既等繒綵四道功德豈殊甘露有加香油不墜頃者豪州刺史前此邦別乘太原王公名弻法海廣大慧炬融明德立於衷義聞於物郅惲致主之節有耿投竿葛亮報國之誠不忘草奏夫人武氏佩服真空干櫓正覺及男緬緒等惟肖二尊克慎三業若行若坐依佛依僧去煩惱之外糠得慈悲之內實起普賢臺一級寫法華經千部廣化人吏大啓津途即普賢臺立法華社每年二月重會一時且地效其靈山呈其秀有上座正覺寺主道解都維那神慧僧表道賓律師行深慧燈集衆材為林衆器成樂一體和合互用住持相與王公曰夫名者事之華碑者物之表其或表不立則瞻仰失容名不興則讚述無地願言刻石是用齊山朝散大夫前侍御史今都府戶曹袁公名楚客其皎如日其心如丹負兼濟之雄才託演成之雅意顧慙作者徒使懵然其辭曰會計南山秦望北寺高僧往還聖跡標寄耆闍比峯法華取義㣥公護持歷國檀施陸寶大來海珍總萃幡影連珠像光發瑞臺壓龍首殿開鳥翅象駕菩薩烏迎車騎異香馝馞神鍾髣佛松巘蕭疏竹澗蔥翠綱紀有條禪律不墜掾曹正直別乘仁智作為碑板讚述名字亠兊州曲阜縣孔子廟碑并序嘗觀元化陰藏上帝元造雖道遠不際而運行有符揚榷大抵宣考神用建人統之可復補天秩之將頽其揆一也昔者蚩尤恬賊厥弟驕兵巨力朋徒合緒連禍則黃帝興聖首出㣥龍推下濟以君人微勤略以戡亂逮至橫流方割包山其咨轉死為魚鮮食不粒則堯禹並跡扶振隱憂導百川康四國粵若殷禮缺周德微宋公用鄫楚子問鼎則夫子卓立燦然成章闢邦家之正門播今昔之彞憲此天所以不言而成化聖所以有開而必先其若是也故夫子之道消息乎兩儀夫子之德經營乎三代豈徒小說蓋有異聞夫亭之者莫如天藉之者莫如地教之者莫如夫子且沐其亭而不識其道則不如勿生荷其藉而不由其德則不如勿運故曰消息乎兩儀者也夫博之者莫如文約之者莫如禮行之者莫如夫子且會其文而不揚其業則不如勿傳經其禮而不啓其致則不如勿學上代有以焯序中代有以宗師後代有以丕訓故曰經營乎三代者也噫唐虞之美不必至是讚而大者進聖君也夏桀之惡不必至是擠而毀者激庸主也伊尹之忠不必至是演而數者勉誠節也趙盾之逆不必至是抑而書者誅賊臣也至若論慈廣孝輔仁寵義職此之由於是君臣之位序父子之道明朋友之事興夫婦之倫得雖朗日開覺膏雨潤黷和風清扇安足喻哉借如九皇繼統而政醇七聖同年而道合雖事業廣運而理濟一時未有薄遊大夫僻居下國德敷既往言滿方來廟食列邦不假手於後續君長萬葉必歸心於素王若此之盛是以騰跨百辟孤絶一人曷成名可稱取興為大者巳我國家儒教浹宇文思戾天伸吏曹以追尊建禮官而崇祀侯褒聖於人爵尸奠享於國庠是用大起學流錫類孝行敦悅施於萬國光覆彌於允宗三十五代孫嗣褒聖侯璲之字藏暉洎族賢元亨等或專門碩儒罔墜於緒或餘波明哲克揚厥聲乃相與合而謀曰夫墟墓之地禮曰自哀聽頌之樹詩云勿翦一則遇事遺愛一則感物允懷矧乎大聖烈風吾祖鴻美故國封井舊居川嶽歟宜其悚神馳魄膝行膜拜陳齊祭奠嚴祠樹繚垣以設防刊豐石以為表亠兊州牧京兆韋君元圭字闕二字王國周親人才懿德明啓風績休有名教長史河南源晉賓字光國賢操孤興清節相遠納人以禮成俗於師司馬天水狄光昭字子亮相門克開雅道踵武聞義必立從事可行録事參軍東海徐仲連功曹成陽蓋寡疑倉曹太原王道淳宏農楊萬石戶曹博陵崔少連宏農楊履元兵曹太原王光超范陽張博望法曹安定皇甫恮東海于光彥士曹榮陽鄭璋參軍事博陵崔調扶風竇光訓河東裴璿隴西李紹烈闕四字儀傳闕一字南陽樊利貞曲阜縣令鴈門田思昭丞河間劉思廉主簿吳興施文尉清河晏宏楷等宦序通德儒林秀士升堂覩奧遊聖欽風僉同演成乃共經始其辭曰元天陰騭大明虛鏡神不利淫物將與正凡曰投艱在此逢聖吞沙薦虐軒黃砥定襄陵兆災夏禹文命周道失序夫子應聘刪詩述史盛禮張樂雅頌穆清訓詞昭灼片言一字勸善懲惡誘進後人啓明先覺六順勃興四維偕作元功濟古至道納來首出列聖席卷㣥才大名震耀廣學天開蒸嘗匝㝢誦習窮垓帝念居室以光壽宮建侯於嗣環封厥中孫謀不泯祖德斯崇乃刊聖烈克廣休風
