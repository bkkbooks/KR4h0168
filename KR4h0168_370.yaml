front:
  text: 全唐文欽定全唐文卷三百七十縉字夏卿本太原祁人舉草澤及文詞清麗科上第歷工部侍郎左散騎常侍廣德二年拜黃門侍郎同平章事進侍中拜河南副元帥大歷三年領幽州盧龍節度兼太原尹北都留守河東節度營田觀察等使歸朝以本官復知政事坐附元載貶括州刺史移處州十四年除太子賓客留司東都建中二年卒年八十二
  hash: sha256:41ef98a510e4d115cafcf620e25cf1adf401ec085c63e2795d3312087b77a65f
  markers:
  - {type: head, offset: 13, content: 王縉, id: KR4h0168_NFKB_370-h1, level: 1}
body:
  text: 臣性實至愚才非出衆幸以逢時之命久為尸祿之人頃自艱難纍職中外取之於武無逐寇之勳用之於文乏經邦之略不能陳力而猶冒進豈謂天眷擢居台衡時已涉於炎涼政無裨於塵露上慙報國內愧妨賢身無所容况加重寄既統師律又鎮方隅翔飛徒及於戾天蹇足不可以逐日致寇非遠害盈必徵竊念才微位高福過衰至憂懼所切晷刻為年特乞聖慈察臣不逮退侍中及郡公等還臣舊官本封使赴前途或冀成事不然坐致顛沛取笑遠邇君之使臣就死不避况增榮命翻敢固辭鄙辟之誠已罄陳露幸遇天高聽卑之日懼無下情上達之感且臣名在宰輔肅將聖恩行臨四方孰不悅服坐鎮萬里自然晏清豈必重以大官假之多邑無益時事實枉寵光於臣先為之極於禮賞為不中伏乞容臣輸力候有成功從此懋官實為未晚使臣即日奉詔陷於飾讓矯詞褊心成病恐無能為也特望鴻慈必允所願恩詔三降令出惟行愚臣萬死志不可奪竊恐器小受多既盈招損憂敗公事敢愛微軀將命前行湯火寧顧無功增秩荷伏是思履薄臨深心魂積悸伏惟陛下至明至聖洞鑒幽微以欲從人以慈育物自念沛然受恩天下咸服則能者必勸僭人知取豈非陛下達臣子之道張國家之綱臣恨不開腹布心用表誠實謹冒死以聞臣縉言中使王承華奉宣進旨令臣進亡兄故尚書右丞維文章恩命忽臨以驚以喜退因編録又竊感傷臣兄文詞立身行之餘力常持堅正秉操孤貞縱居要劇不忘清靜實見時輩許以高流至於晚年彌加進道端坐虛室念茲無生乘興為文未嘗廢筆或散朋友之上或留篋笥之中臣近搜求尚慮零落詩筆共成十卷今且隨表奉進曲承天鑒下訪遺文魂而有知荷寵光於幽穸沒而不朽成大名於聖朝臣不勝感戴悲歡之至謹奉表以聞臣縉誠惶誠懼頓首頓首謹言寶應二年正月七日銀青光祿大夫尚書兵部侍郎兼御史大夫臣縉表上醴泉湧而蠲疾寶炬然而破暗蓮花無染而獨淨夜光不繫而自得其惟上智乎夫上智之身曲隨世界上智之心密遊聖境或宿植德本乘願復來或意生人間用宏開示非慧見孰能知之大德號曇真姓邊陳留開封人也厥初為孩稟知特異亦既有識用晦如愚家有耕桑未嘗問鄉有學校未嘗顧則曰處豐屋何如方丈馳良馬何如振錫圭組耀世不如被褐金玉滿堂不如虛白食珍者豈覩飯來香積聽樂者豈聞梵唱云何戰既勝矣出門絶迹潛嵩少間專於讀誦年至二十遂適太原受聲聞戒習根本律性甚聰敏博涉經論時同學者仰之為師久而歎曰大聖要道存乎解脫不入其門非佛之子乃損落枝葉澄清泉源詣長老大照醒迷解縛開心地如毛頭掃意塵於色界從此日益唯師能知於四威儀之中無一剎那有怠不住以至於大寂無作以至於恆用我止無所虛空未為廣我照能遍日月未為明震雷破山聞不聞等烈風拔樹見不見等是身無主與四大假合方寸無生於一切離相猶以為未出心量彌勤深入大照既沒又尋廣德大師一見而拱手再見而分座問之於了答之以默俱詣等妙勿口合自他梵衲之行楞伽之心密契久矣廣德又謝學徒嗷嗷相顧靡依來求於我嗣續前教皆以實歸出宅諸子俾稱所乘渡河三獸自止於分天寶季年祿山作逆陷我洛陽亂兵蜂螫大德淡然獨在本處天龍潛衛於左右豺狼仰瞻而讚歎施財獻供終朝盈門於善惡等以慈於苦厄人以忍言說不㝵無畏故也動靜皆如自在故也度衆無邊大願力也依報無量邁種福也夫修行之有宗旨如水木之有本源始自達摩傳付慧可可傳僧璨璨傳道信信傳宏忍忍傳大通大通傳大照大照傳廣德廣德傳大師一一授香一一摩頂相承如嫡密付法印惟聖智所證非思議能測也大德既捨眷屬竊為沙彌身不顧名志在成道聲稱浸遠歸向如林天寶八年緇侶領袖舉以上聞乃蒙正度初隸東都衛國寺旋為敬愛寺請充大德遷彼與住此有緣非無因地雜人天之會法如雲雨之施衆有塵勞之悟寺盈河潤之福今學與其進當學起其信善誘不倦得師則喜利往者導之以捷覩奧者辨之以正深在定者戒於貪悟所覺者使之遠視彼來學如菴摩勒果冀其出世如優曇鉢花齊我者稀故我貴矣寶應二年正月十四日趺坐如生薪盡火滅年六十夏四十哀廠田坴門人悲及塵衆樹為之變色獸為之失聲棟折航沈佛土蕭索其年九月葬於嵩嶽寺之北阜大歷二年有司奏諡上聞惻然乃賜號曰大證禪師縉嘗官登封因學於大照又與廣德素為知友大德弟子正順即十哲之一也視縉猶父心用感焉以諸因緣為之強述銘曰上德不德興慈運悲現於濁界俯為人師以我無思破彼盡思爾方厭俗我則隨時由多分別妄生垢淨根不緣廢象豈染鏡法不可著空即是病無得之得絶聖而聖文字非文字言語非言語云何以解脫云何而語汝隨宜說方便究竟非我與舍利依嵩山寂寥松柏所維元年建寅月二十六日故靖德太子諡曰奉天皇帝妃竇氏諡曰恭應皇后啓自細柳將遷座於新豐望黃山而入上苑過紫極而出天門傍臨鳳闕雙引龍轀乃詔左僕射冕祖饋於行宮禮也今上孝弟通於神明追崇徽諡用達皇情陟岡目送避殿涕盈爰命述者以振休聲其詞曰昔在高祖文思武德龍戰必勝海飛爭息威加八荒奄有萬國纍業繼聖惟天是則昌運斯應睿哲乃生爰自弱歲有如老成稱象如小測日言輕率爾之對略而不行問安內豎豈獨重明深居邸第亦稱維城禮無不執藝或可遊聯行魯衛虛佇應劉雁鶩非好神仙不求為善自樂俾躬處休行成於內聲聞於外性實匪驕迹能用晦朝野多歡兄弟高會上客曳裾間園飛蓋仁者當壽天道何昧小山未傾盤石忽碎嗚呼哀哉天慈罔極寵命猶新前星告位少海遷神黃公誰客音容自春空悲天牒獨有芳塵正位乎內進賢闕二字肅肅令妃幽公之子家自漢室代為戚里百兩比肩四教盈耳不藝珩珮能循沼沚傳訓公宮留針女史旋稱未亡身誓之死柔質泯焉徽音不已嗚呼哀哉帝念元昆人無間言不及讓國於是追尊惟儲出震惟儷居坤備陳服御更起陵園來九重兮復去動萬乘兮還靜挽淒楚而凝哀駕迤遲而轉影別青門之早春背素滻之斜景路已窮於咫尺時不延於俄頃嗚呼哀哉神輝永戢軒曜長零穸塏椒閫泉戶彤庭開壽宮兮寂寂虛玉座兮冥冥賓上帝於窅陪五后之明靈海為田兮岸為谷德不朽兮名惟馨嗚呼哀哉維寶應元年歲次壬寅建已月五日元宗至道大聖大明孝皇帝崩於神龍殿旋殯於太極殿之西階粵以寶應二年三月甲辰朔十一日將遷座於泰陵禮也象物已設仙馭將飛空聞脫屣無復求衣孝孫皇帝親臨遣奠意延晷刻向池綍而涕流想山園而心惻九天兮無所一往兮何極感貽美於孫謀俾述事於祖德其詞曰天厭隋亂中原無主人歸唐德上帝是輔以聖易暴興文繼武義冠殷湯威包漢祖仰膺歷數光宅區㝢惟皇得一承乾嗣五赫哉厥初萬物斯覩景龍之際乾儀反坤不利王室將開禍門呂危劉氏趙啄皇孫我獨杖劍神期武賁上排閶闔俯掃軒轅不驚宗廟大造黎元為而不有禮備尊尊乃奉睿宗爰受寶命問安視膳純孝至敬維城之年佐潞之政一蓍獻兆百靈翼聖躍馬截流水不敢競潛龍變海池亦呈慶有開必先興王之盛誥曰皇帝余倦於勤往纘丕績以順兆人辭之不可其命維新體乾之大法土之均臨之以日生之以春寒暑彰信動植知仁九族既睦四門既賓天通之聖電斷之神求賢簨簴就列縉紳讜言是聽庶政必親刑措兵弭威加德馴戎狄讋竄塞不警塵琛賮爭入來自無垠駕鼓斥駿焚裘棄珍風雨時若京坻相因師於上古思與還淳然後制禮節焉作樂和焉北祠后土南郊上元齊祭陵廟位號山川教戰講武祈農籍田冕旒問俗旌旗幸邊文物蔽地英聲動天鳳巢麟擾甘露醴泉九尾三脊朱草非煙繽紛效祉每歲且千道德洋溢乾坤交泰成功如何登封於岱太平如何是時無外才藝餘美帝王之最學究天人乙夜慙對文齊日月秋風靡逮推歷正元調律平害札動雲落弦開葉碎揮琴陋虞教歌輕沛良辰可賞聽政方退鐘鼓屢陳君臣高會巍巍蕩蕩四十餘載巡省順動西南奧區命子出震繼明握圖長驅猛士纍翦封狐不失舊物言旋上都離宮就養壽酒多娛習道久矣神仙遠乎嗚呼哀哉湖上鑄鼎海中祈藥忽乘紫氣長遊碧落千門萬戶若無天兮寥廓八達九衢雖有人兮寂寞淚為雨於宸扆哭成雷於郊郭遺轍迹而徒攀葬衣冠而何託同軌畢至初陵已開震鳳輦於仙仗降龍輴於帝臺儼將行兮肅穆似有顧兮徘徊過春城兮如送望暮山兮謂來嗚呼哀哉壽原肇吉先天不違接橋山之大隧營金阜之元扉擁馳道兮皆往獨宮車兮不歸厚夜兮藏晝終天兮戢輝文始建極武餘英威立德不朽至道惟微雖陰陽之與變化侔神聖兮安可希超前古以作則遺後代以垂衣嗚呼哀哉華太子太師嵩子天寶末嗣爵官兵部侍郎祿山之亂陷賊僞署魏州刺史賊平以汙僞命降試祕書少監稍遷尚書右丞擢河中晉絳節度使上元元年以中書侍郎同中書門下平章事肅宗寢疾李輔國矯詔罷為禮部尚書貶硤州員外司馬卒臣某言伏奉制書以臣試祕書少監恩出意表榮超望外臣循涯揣分以慙以悚臣某中謝臣素庸懦又乏智謀進不能殺身以自明退不能拂衣以遠禍蒙昧昏虐僶俯歲時每讀李陵之書備見前賢之意以為虛死不如立節成名不如報德常恐溘先犬馬湮沒羯胡上負君親之恩下貽妻子之恥何嘗不仰南雲而歎息瞻北闕而銷魂偷生苟安蓋所以誓將骸骨歸死朝廷伏賴陛下察以愚衷每垂保護遂得潛通間使遠請官軍收全州而功不踰時掃餘孽而兵無血刃陛下矜臣一介之節捨臣萬死之罪念臣簪履之舊納臣葵藿之誠許歸故國之田園退守先人之墳墓則在臣之志願榮望畢矣陛下之聖恩於臣深矣豈期皇慈廣被元造曲成拔臣於泥滓之中致臣於雲霄之上已蒙殊獎遽典雄藩旋沐厚恩復登蓬閣空慙有命竊愧無能將何以發揮儒林潤色鴻業稠謺恩意感戴難勝豈臣隕越所能上報無任悚荷屏營之至栖筠字貞一趙人第進士纍擢工部侍郎進銀青光祿大夫封贊皇縣子授浙西都團練觀察使召拜御史大夫卒年五十八贈吏部尚書諡文獻伏以朝廷之儀義當祗肅今者以手力資錢比俸祿舊罰請准永泰元年八月敕為定其一司之中有三人以上是參官其日並不到者本司長官請罰一月手力資錢其一月內三度不到者雖每度有罰亦准前罰一月資錢每月仍便於左藏庫折納其有久不朝謁并假過百日以上者望令本司録奏如相容隱臺司訪察彈奏餘請依後敕處分秦滅六國遂并區宇張良哀韓之亡怒秦之暴義感天地降神於圯神授良之書良為帝之師滅秦報韓成功遂志祠黃石於濟北穀城之山下蓋謂是矣世用其道傳祠此山惟德之馨介福不替天寶歲夏六月旱既太甚遍走㣥望密雲卷而復舒零雨濛而不降太守河東裴公聚黃髮而咨謀曰山川神祇有不舉乎聞斯行諸夙夜展祭祀事未畢感而遂通自寅及未澤潤千里吁其靈也夫聖哲立法制君子修理道莫不順承天則祗畏神明以天視無私神功不測或殄覆昏暴或孚祐明德與時推移未始有極蓋將輔其善必聽於人昔夏之興也崇山降焉殷之興也岯山次焉周之興也岐山鳴焉漢興有圯橋之事我唐之興有霍山之異今古不爽謂之神志聰明正直而一者也惟秦政滅德用刑匱人從欲冤痛在下馨香不登祚及二世毒流四海與天自絶惟神不蠲有開必先祝降寶命故其書極天人之際備興亡之端子房將有行也師焉而以言酌消息於盈虛通擬議於變化楚漢之勢功利相百天威扶乘人謀協贊觀釁而動極深研幾發八難消六國之印招四人定重明之業以斷天下之疑以奪敵國之計正乾坤之位發日月之光所謂披堅執鋭其功狗也居守饋糧其功人也運籌帷幄之中決勝千里之外其功神也此其大者豈徒效祉發祥於州里之間哉方今淳風允塞休徵薦臻意者謂宜上聞有以旌其異嘗學舊史敢記所知晏字士安曹州南華人七歲舉神童授祕書省正字舉賢良方正纍官戶部侍郎領度支鹽鐵轉運鑄錢租庸使寶應二年遷吏部尚書平章事罷為太子賓客俄兼御史大夫與第五琦分領天下金穀軍國之用皆仰於晏大歷十三年為尚書左僕射德宗立楊炎誣搆其罪貶忠州刺史尋賜死年六十五貞元五年帝悟其冤追贈鄭州刺史加司徒東都河南江淮等道轉運使檢校戶部尚書兼御史大夫劉晏狀得刺史韋損丹陽耆壽等狀上件湖案圖經周回四十里比被丹徒百姓築堤橫截一十四里開瀆口泄水取湖下地作田其湖未被隔斷己前每正春夏雨水漲滿側近百姓引溉田苗官河水乾淺又得湖水灌注租庸轉運及商旅往來免用牛牽若霖雨泛溢即開瀆泄水通流入江自被築隄已來湖中地窄無處貯水橫隄壅礙不得北流秋夏雨多即向南奔注丹陽延陵金壇等縣良田八九千頃常被淹沒稍遇亢陽近湖田苗無水溉灌所利一百一十五頃田損三縣百姓之地今已依舊漲水為湖官河又得通流邑人免憂旱淹奏聞中書門下牒浙西觀察使與韋損勿使更令修築致有妨奪永泰二年四月十九日浮於淮泗達於汴入於河西循底柱硤石少華楚帆越客直抵建章長樂此安社稷之奇策也晏賓於東朝猶有官謗相公終始故舊不信流言賈誼復召宣室宏羊重興功利敢不悉力以答所知驅馬陝郊見三門渠津遺跡到河陰鞏洛見宇文愷置梁公堰分黃河水入通濟渠大夫李傑新隄故事飾象河廟凜然如生涉滎郊浚澤遙瞻淮甸步步探討知昔人用心則潭衡桂陽必多積穀關輔汲汲只緣兵糧漕引瀟湘洞庭萬里幾日淪波掛席西指長安三秦之人待此而飽六軍之衆待此而強天子無側席之憂都人見泛舟之役四方旅拒者可以破膽三河流離者於茲請命相公匡戴明主為富人侯此今之切務不可失也使僕湔洗瑕穢率罄愚懦當憑經義請護河隄冥勤在官不辭水死然運之利病各有四五焉晏自尹京入為計相共五年矣京師三輔百姓唯苦稅畝傷多若使江湖米來每年三二十萬即頓減徭賦歌舞皇澤其利一也東都殘毀百無一存若米運流通則飢人皆附村落邑㕓從此滋多命之日引海陵之倉以食鞏洛是計之得者其利二也諸將有在邊者諸戎有侵敗王略者或聞三江五湖貢輸紅粒雲帆桂楫輸納帝鄉軍志曰先聲後實可以震耀夷夏其利三也自古帝王之盛皆曰書同文車同軌日月所照莫不率俾今舟車既通商賈往來百貨雜集航海梯山神聖輝光漸近貞觀永徽之盛其利四也所可疑者函陝凋殘東周尤甚過宜陽熊耳至武牢成皋五百里中編戶千餘而已居無尺椽人無烟爨蕭條悽慘獸遊鬼哭牛必羸角輿必說輹棧車挽漕亦不易求今於無人之境興此勞人之運固難就矣其病一也河汴有初不修則毀澱故每年正月發近縣丁男搴長茭決沮淤清明桃花已後遠水自然安流陽侯宓不復太息頃因寇難總不淘拓澤滅水岸石崩役夫需於沙津吏旋於濘千里洄上罔水舟行其病二也東垣底柱澠池二陵北河運處五六百里戍卒久絶縣吏空拳奪攘姦宄窟穴囊士冖䂞夾河為藪豺狼狺狺舟行所經寇亦能往其病三也東自淮陰西臨蒲坂亘三千里屯戍相望中軍皆鼎司元侯賤卒儀同青紫每云食半菽又云無挾纊挽漕所至船到便留即非單車使折簡書所能制矣其病四也惟小子畢其慮奔走之惟中書詳其利病裁成之晏纍年已來事缺名毀聖慈含育特賜生全月餘家居遽即臨遣恩榮感切思殞百身見一水不通願荷鍤而先往見一粒不運願負米而先趨焦心苦形期報明主丹誠未克寸漕引多虞屏營中流掩泣獻狀佶字幼正潤州延陵人擢進士第纍官諫議大夫坐善元載貶嶺南劉晏奏起為汴東兩稅使充諸道鹽鐵輕貨錢物使遷刑部侍郎改祕書監封丹陽郡公罔兩謂形豈伊天造試一商榷此焉探討謂之小入乎無間謂之大達於蒼昊雖則名參於異物抑亦理齊於至道今將議其旨窮其色為涅而不緇為繫而不食或託之於鱗介或生之於羽翼謂子有回日之役謂子有戴山之力向若執盈似虛大白若黑黽黽有難名之稱乘乘有可尚之德苟不然者人將奚則彼逐者影動每相依既不可逼又不可違凌青冥而對舉投汗漫而雙飛鑒秋葉而逾靜臨夕陽而暫微彼何事而相託此何心而所希罔兩曰我形子影我應子追我憑子之狀子假我之威寧論立兮與坐夫何操而不持似都捐於視聽宛冥合於希夷未識形為影之主影亦形之賓詎可貴之於動息又何怒之於因循使惡跡者止其足厭影者蔭其身子之意兮焉適唯此求而得仁更憶班固麗藻漆園清真述幽通於前烈繼逍遙於後塵沈吟染翰顧慕書紳於是稽乎古陳乎義常未得其一端固多慙於明試每年二月八日差公卿等朝拜諸陵伏見陵臺所由引公卿至陵前其禮簡略因循已久恐非盡敬謹按開元禮有公卿拜陵舊儀望宣傳所司詳定儀注稍令備禮以為永式宣明官左拾遺殿中侍御史內供奉監姚巂諸軍事兼招慰使此路高山臨雲深谷無景至有斗絶巨險殆不通人蹤經之者必搏壁傍崖脅息而度雖竟日登頓二十許里木人猶堪淚下鐵馬亦可蹄穿
