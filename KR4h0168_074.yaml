front:
  text: 全唐文欽定全唐文卷七十四文宗六
  hash: sha256:39cd251e2ae93aa53e1607d1b67817607ca0f922ea3fd7741d39ff43ff563e53
body:
  text: 文武常參官承前朝參不到臺司皆據品秩書罰其中班位雖同俸入懸隔一例書罰事未得中宜自今巳後檢點不到據所請料錢每貫罰二十五文其疾病為衆所知者不在罰限餘任準臺司往例處分如聞招討棣州計日降下賊收百姓多在城中時方春農必多餒迫歸降之後宜委智興據戶口人數節級賑賜使各安生業便以度支供軍斛斗數內充如失家業者仍以空閒屋居田地逐便安存都省所執是格銓司所引是例互相陳列頗似紛紜所貴清而能通亦由議事以制今選巳滿方此爭論選人可哀難更停滯其三銓巳授官都省落下者並依舊注重與團奏仍限五日內畢其中如官超一資半資以今授稍優者至後選日量事降折尚書侍郎注擬不一致令都省以此興詞鄭絪丁公著各罰一季俸東銓所落人數較少楊嗣復罰兩月俸其今年選格仍分明標出近例有可行者收入格不可者於格內書破則所司有文可守選人無路幸求海陵是揚州大縣土田饒沃人戶衆多自置監牧巳來或聞有所妨廢又計每年馬數甚少若以所用錢收市則必有餘其臨海監牧宜停令度支每年供送飛龍使見錢八千貫文仍春秋兩季各送四千貫充市進馬及養馬飼見在馬等用其監牧見在馬仍令飛龍使割付諸羣牧收管訖分析聞奏事出非常臺有妖賊官曹備警亦謂慮周即合待罪朝堂候聽處分量罰自許事涉乖儀溫造姚合崔宜等各罰一月俸所請罰錢宜並放卿代光棨㦸寄重旌麾集勳庸於一門統兵農於四鎮政經允洽智略宏宣勤事纍朝忠誠一貫今滑臺雄郡白馬古津控扼洪河密邇清洛南并鄭圃旁帶潁川田疇之詠繼聞雈蒲之徒巳化國僑昔美今則嗣之眷言休嘉每用懷想據守義所奏大將及三軍官吏僧道耆壽百姓等感卿惠政咸請立碑翰林學士宋申錫學識優深文詞雅贍巳令撰述必盡功庸刊石旌賢庶諧朕意想當知悉春寒卿比平安好遣書指不多及卿勳德承家麾幢統鎮功宣武略化洽政經軍令肅於藩方吏理惠於黔庶芳猷克茂德業彌彰羣黎三軍上請刊石聿垂令問以示後來眷言休嘉良多詠歎翰林學士宋申錫文師風雅學洞典謨意欲該詳俾其纂述勳庸真紀政術畢書足慰人心無慙峴首待詔侯丕草隸久工便令繕寫今故賜請想當知悉秋涼卿比平安好遣書指不多及嶺南選補雖是舊制遠路行李未免勞人當處若有才能廉使宜委推擇待兵息事續舉舊章其南選便可更停一二年三司推勘吏部踰濫官事其閒要切節目皆如臺案李賨過狀稱楊虞卿奴受錢三百千勘是前年虞卿察知自送府縣奴巳決責錢亦納官又稱送錢并買婢等事悉無證據但虞卿兩年專判曹務僞濫六十餘人連甲圖空近日無例遂令祿位受制胥徒雖能續自舉明終失從前鈐轄況勘官知僞久不公論隱闕報銓每將私用公私且乖於較下事理固難於守官宜停見任餘準前敕處分應中書門下尚書省二十四司制敕及敕甲等近日檢報多稱斷裂無憑勘覆以此之故踰濫大行應從前制敕甲等所有斷裂者宜各委本司並重黏背其中書門下仍取本押舍人給事中及甲庫官本司吏令尚書省委本司郎中甲庫官本行令史同署名印所斷裂縫扶尾後云某甲勘卷若干縫斷裂亦同印署新舊背縫並具年月卷第印署如庫官令史考滿日須據實交點巳後檢報稱有斷裂甲庫官及本行令史節級處分憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道路相高並列通班合知名分如聞喧競亦巳再三既招人言甚損朝體其臺官與供奉官同道聽先後而行遇途即祗揖而過其參從人各隨本官之後少相辟避勿信衝突又聞近日巳來應合導從官事力多者街衢之中行李太過自今後傳呼前後不得過三百步乃者蠻寇入犯蜀川令興元召募一千人隨事防遏雲蠻既退賞設放歸事理之閒亦為得所奸臣犯紀戕害元戎遂擇新帥委之窮竟果副朕意盡誅羣凶八百餘人一時梟斬并諸叛將同日誅夷省狀念功嗟賞何極其衛志忠巳下將吏等委溫造節級分付訖聞奏王景延等以李絳遇害時皆能輕身徇節奮不顧生宜委中書門下即與褒贈其王景延仍與一子官兼委溫造優恤家事務令得所宣示中外咸使知聞越王貞實陷非辜載在國史子孫久廢獎録所宜宜付宗正寺尋勘譜牒如是後嗣具狀聞奏應選人及冬集人文案門下省勘畢後比來更差南曹令史收領卻納門下甲庫在於公事頗甚煩勞自今巳後謹敕吏部過選院本令史便自分付甲庫以備他年簡勘仍請門下省勒甲庫令史每過選時常加檢點收拾明立文案據官吏等遞相分付不得妄有破除南曹申請之時如有稱失落缺少本令史及專知官準檢報揩改違條例處分蓋天人之際相應如響祥祲之來各惟厥事乃者兵革始罷黎庶甫寧而蜀土載罹震驚方務綏輯今又水潦為沴沉溺實多載省奏章益深軫慮諒以朕澤不逮下誠無感通五事致咎此方何罪夙夜兢愧憫歎良深宜令戶部郎中李踐方充西川宣撫使應遭水人戶委與本道觀察使計會各量稅額所入漂損多少等第分數蠲放今年夏秋稅錢及租子等如上常平義倉有斛斗處亦委德裕遵古開倉賑恤更量加優賞使得生聚禁察苛暴存安老疾以副優屬稱朕意焉如聞鹽鐵度支兩使此類至多其鄧琬四人資産全以賣納繫禁動經三載死於獄中實傷和氣其鄧晟等四人勒責保放出仍委兩使都勘天下州府監院更有此類但禁經三年巳上一切與疏理各具事由聞奏敕朕聞天聽自我人聽天視自我人視朕之菲德涉道未明不能調序四時導迎和氣乃自去冬以來踰月雨雪寒氣尤甚頗傷天和念茲庶氓或罹凍餒無所假貸莫能自存宵寢載懷旰食興嘆怵惕苦厲在余之辜思宏惠澤以順時令其天下犯死罪巳下除官吏犯贓及故殺人者餘並特降從流流罪巳下遞降一等應京兆府諸縣宜令以常平義倉斛斗量事賑恤仍先從貧下戶起給其京城內鰥寡孤獨不能自濟瘖聾跛躄窮無告者亦委京兆尹兩縣令量加賑恤訖具數聞奏躬自省閲務令均贍其諸道雨雪過多處亦委所在長吏量事優恤於戲天生蒸人君以牧之朕憂勤政經思致於理言念赤子視之如傷天或警豫示此陰沴撫躬夕惕余甚悼焉布告遐邇明悉朕意浙西諸州皆有水災蘇湖兩州漂泊尤甚須有賑恤以救疲人兩州共賜米二十萬石先從貧下戶給並以本州常平義倉斛斗充敕德裕卿文彰翰苑行振儒風廉察金陵六郡歌惠慈之化統安白馬三州懷思愛之心凡所踐經理行第一昨者段嶷以轅門將校闔境士農懇請立碑以銘德政朕以舉善為教所以勤不能褒賢示後所以報成績國之彞訓莫善於斯所令禮部侍郎賈餗撰文事實頗周詞藻甚麗故令寫録專遣賜卿亦別賜段嶷碑本庶慰羣情想當知悉冬寒卿比平安好遣書指不多及卿鎮理方隅輯寧封略師戎知訓黎庶保安言念事功良深倚重德裕頃臨東郡實著政績所諭碑文撰録巳畢故令送往宜便刊立想當知悉冬寒卿比平安好遣書指不多及卿統鎮滑臺肅寧封部永言休績毗倚良深先奏請歸融書德裕德政碑文今書畢專令宣賜想當知悉夏熱卿比平安好遣書指不多及朕承上天之眷祐荷纍聖之丕圖宵旰兢勞不敢暇逸思致康乂八年於今而水旱流行疾疢屢作兆庶艱食札瘥相仍蓋德未動天誠非感物一類失所有過在豫載懷罪己之心深軫納隍之歎宜敷惠澤式表憂勤如聞自去年以來河東關輔亢旱為患秋稼不收百姓之中頗甚困窮今方春之時須務農事若無賑救恐至流亡其京兆河南河東河中等九州府宜賜粟五十六萬石京兆府賜粟十萬石河南府河中府絳州各賜粟七萬石同華陝虢晉等州各賜粟五萬石並以常平義倉及折糴斛斗充如無本色即與運米折給仍委本州府官長明作等第差清強官吏對面宣賜先從貧下戶起給其京兆府太和六年青苗榷酒錢在百姓腹內者並宜放免京兆河中河南同華陝虢晉絳等九州府自太和六年秋稅以前諸色逋懸除所由車戶巳徵得外在百姓腹內者一切放免議獄恤刑前王所重苟有冤滯即傷陽和應在城諸司諸軍諸使應有囚徒速宜疏理限七日處分訖奏聞河南府等八州府敕到後亦宜準此處分諸色工役非灼然急切者並勒停省應久旱處管內名山大川能致風雨者亦委長吏精誠禱請水旱之數雖云常理導化失節亦致咎災顧惟寡昧敢忘克責常參官及外府州長吏如有規諫者各上封事極言得失俟有匡正期於阜安咸啓乃誠用致於理無或有隱以忝在公內外官有貪暴殘虐蠹政害人者憲司宜糾察聞奏朕為人父母虔奉丕業夕惕若厲夙夜匪寧減膳徹樂庶答天誡咨爾長吏實分豫憂勉加撫綏用副惻隱庶切救災之義爰申為上之懷中外臣僚宜體朕意準令國忌日惟禁飲酒舉樂至於科罰人吏部無明文但緣其日不合釐務官曹即不得決斷刑獄大小笞責在禮律固無所妨起今後縱有此類臺府更不要舉奏諸道如有兵革水旱州府殘破及不存濟為遠近所知者除朝廷特有借賜外輒不得自請賞設錢物又諸道戎帥除替後倉庫便屬後人賞設三軍須待新使近日皆有留別賞給自行私惠頗紊朝章向後諸道節度觀察使除替後並須待新使賞設不得更有留別中書門下省所將本錢與諸色人給驅使官文牒於江淮諸道經紀每年納利並無元額許置如聞皆是江淮富家大戶納利殊少影庇至多私販茶鹽頗撓文法州縣之弊莫甚於斯宜並勒停兩省先給文牒仍盡追收其去年所減人數雖無挾名尚執兩省文牒亦宜收訖聞奏以後不承正敕不在更置之限吏部禮部兵部今年選舉並緣秋末蟲旱相因恐致災荒權令停罷及斂藏之後物力且任念彼求名之人必懷觖望之念寧違我令以慰其心宜依常例卻置應緣所納文狀及銓試等期限仍準今年格文遞延一月都城勝賞之地惟有曲江承平巳前亭館接連近年廢毀思俾葺修巳令所司芟除栽植其諸司如有力及要創制亭館者給豫閒地任其營造王涯等身為宰相委任至重與其徒恣行凶惡潛搆姦謀鄭注草萊卑末寵遇殊常而乃竊發殿庭同為扶豎險邪之狀古今未聞賴宗社降靈重臣協力斯須消滅京師晏寧天下之人所同歡快謀惡之罪國有常刑其王涯賈餗舒元輿王璠郭行餘李孝本羅立言等宜令左右神策差兵馬防援準舊例領赴郊廟及兩市令衆訖於獨柳樹下並仰準法處分今年郊畿亢旱自夏訖冬以陰陽之久有錯違懼粢盛之未能豐潔祖宗上帝鑒臨左右德馨未達惕焉在懷改龜薦誠以俟祥歲酌諸典禮亦謂合宜其來年南郊宜停朕齊居法宮詳念致理思欲建皇極端化源大蘇生靈漸復古道矧伊耗蠹必在澄清而釋氏宗來自西國殷周巳前何嘗有此唐虞之際寧匪盛時逮至漢明因夢以言徵傅毅猝詞而臆對遠承象教從此流行蕩然相傳垂七百祀黎庶信苦空之說衣冠敬方便之門異同之論雖多俗尚之訛未革遂使風驅成俗雲構滿途丁壯苟避於征徭孤窮實困於誘奪永言斯弊宜峻科條自今巳後京兆府委功德使外州府委所在長吏嚴如捉搦不得度人為僧尼纍有明敕切在提舉為我元元務在長育擅有矒削亦宜禁斷比來京城及諸州府三長齊月置講集衆兼戒懺及七月十五日解夏後巡門家提剝割生人妄稱度脫者並宜禁斷且僧尼本律科戒甚嚴苟有違犯便勒還俗若有自願還俗者官司不須立制如聞兩街功德使近有條約不許僧尼午後行遊雖曰緇徒無非赤子有妨自遂亦軫豫懷從今巳後午後任行其僧尼在城委功德使其諸州府委本任長吏試經僧尼並須讀得五百紙文字通流免有舛誤兼數內念得三百紙則為及格京城敕下後諸州府敕到後許三箇月溫習然後試練如不及格便勒還俗其有年過五十以上筋力既衰及年齒未至夙嬰痼疾并瘖聾跛躄不能自存者並不在試經限若有戒律清高修持堅苦風塵不雜徒衆共知者亦不在試經限天下更不得創造寺院普通蘭若等如因破壞即任修葺於戲理國之本在正風俗故王化首婚姻之道所以序人倫霸圖著胎養之令所以務生聚況一夫不耕人受其饑一女不織人受其寒安有廢中夏之人習外夷無生之法略期疏滌用潔源流俾爾齊氓去末歸本庶富之漸其在斯乎凡厥司存勉率吾教各勤檢馭稱朕意焉方鎮班行散官大夫已上者自於有司陳狀請妻封邑本司磨勘然後上陳如妻巳亡又無此例蕭洪黷於常典輒自奏章宜罰一月俸冢嗣元良家國之慶人倫之始在娶元妃雖吉事尚更於待年而嘉偶宜深於善教志於先定冀選義方屬在德門遂成好合在東京委裴度西京委宰臣各申旨諭令本宗家長舉言十歲巳來嫡女及妹姪孫女兩月內送中書門下務令宜稱無有不盡尚書省自長慶三年賜本錢後歲月滋久散失頗多或息利數重經恩放免或人戶逋缺無處徵收如聞尚書丞郎官入省日每事闕供須議添助除舊賜本錢徵利收及吏部告身錢外宜每月共賜一百貫文委戶部逐月支付其本錢任準前收利添充給用仍委都省納勒舊本及新添錢量多少均配逐行分析聞奏須令占額用度不得妄有破除每至季終委都省磨勘申中書門下去冬粟錯及長名駮放選人等如聞經冬在京窮悴頗甚街衢接訴有可哀矜宜委吏部勘條流鈐轄如非踰濫正身不到缺考缺選大段瑕病之外即與重收以比遠殘闕注擬不得用平留闕如員闕不相當一唱不伏官者便任冬集不在更論訴限如未經中書門下陳狀敕下後不得續收今年巳後不得以為例設齊行香近巳釐革遏密停務自有典常臺司舉奏意在詳密宜依朕詩集中欲得見卿唱和詩故令示此卿疾恙未痊固無心力但異日進來春時俗說難於將攝勉加調護速就和平千百胸懷不具一二藥物所須無憚奏請之煩也省表具知夫爵位崇高以酬勳德君臣協契諒在始終斯乃前王之令圖有國之彞典也況卿輔相憲祖逮於朕躬履歷四朝夷險一致服事君之大節推濟物之深誠道光朝倫行滿天下倚注之意豈同他人屬朕纂歷御乾興師伐叛騷動纍歲端憂靡遑及河朔載寧郊丘畢事方欲咨詢元老康靖生靈不虞寒暑所侵勤勞遇疾雖國醫診視中使省臨憂屬之誠頃刻在念忽覽章奏退讓官榮雖知止之心則思避寵而謀猷之體斯乃為時寢食之閒勉加頤養其所陳乞非朕意焉省表具知卿勳績崇高誠節忠藎秉心一德宣力四朝訏謨緝熙弼豫於理勤勞事國啓沃匪躬功格道光常所嘉尚所疾未瘳勉於善養勿藥之喜佇即痊平台衮之司倚卿為重乃屢陳退讓殊謂不然宜體朕懷即斷來表省表具悉謝病之制雖起於昔賢盡瘁之詞亦標於古典況卿有功於國作相纍朝自匡輔眇躬又勤勞數載豈可以微疾去位以重望辭榮章疏徒來延遲彌切至太宗朝許李靖致政高宗遂仁軌乞骸朕非不知事則有異何者時當明聖在上理道巳成宰臣優游固得自便今則生物尚困庶工未修言念勳賢方深倚注惟此故事恐難遽行卿宜體是誠懷力更頤養必有多福以扶大忠無至確然復陳表章省表具知卿任居三輔職奉六條纍聞問俗之勞載覽勤人之志言惟顧行深慰朕懷勉宏政經以副優寄所謝知禮重飾終義崇敦孝克勤奉恤之志用申罔極之感斯固寅亮輔臣奔走多士效其忠力濟是儀章俾宏加勞之澤庶表必誠之報應緣莊陵營奉其山陵使與一子七品正員官仍特加一階山陵副使按行山陵地使並賜爵一級各與一子出身橋道置頓使賜爵一級仍特加一階內山陵兼監修橋道使賜絹一百五十匹銀器二事特加一階內按行山陵副使賜絹五十匹特加一階山陵修築副使賜三十匹加一階鹵簿儀仗使並宜賜爵一級各與一子出身橋道置頓副使加兩階舁梓宮官三品巳上賜爵二級四品賜一級陵所造作押當官及中使等三品四品各加兩階吉凶儀仗諸色行從官等各加一階太極宮宿衛官及中使大內皇城留守并押當官等五品巳上各加一階撰哀冊諡議諡冊官各賜爵一級書冊及讀哀冊書寶讀寶官等五品巳上賜爵一級六品巳下各加一階鐫造寶冊裝寶冊及檢校官五品巳上各賜勳兩轉中書門下儀制官題主官舁寶冊官五品巳上各加二階六品巳下各加一階山陵使禮儀使判官各特加一階五品巳上仍賜爵一級其專知橋道官考滿日放選其知東渭橋官非時放選仍優與處分知道路官各減兩選知頓官各減三選按行山陵使儀仗鹵簿使判官并諸司諸使監當雜職掌官吏等各加二階挽郎放出身後七選許集南郊及太極殿攝太尉侍中告諡冊寶及靈座前進諡寶奏外辦奠玉幣酌獻等官賜勳兩轉其山陵禮儀鹵簿儀仗等使并諸使諸司軍將官吏如執當務重功效尤異制敕中不該者委本軍本使本司具名聞奏中書門下奏聽進止其三原縣百姓今年秋青苗錢並放免其高陵縣量放一半王者誅暴亂弔傷殘明賞報功拯弊綏衆蓋為邦之大紀也李同捷頃自先朝擅謀專土輒抗成命私行墨縗暨朕臨御實思含垢授之以兗海諭之以詔書使臣相望凶妄自若而更挻妖結黨劫衆阻兵毒流無辜害被闔境由是藩臣瀝懇卿士獻規至於興戈諒非得巳自元戎環壤王旅進攻卵窺危巢飈振槁葉動必乘彼機會退皆扼其咽喉故戴義啓入郛之殊庸李祐展下城之勝略纍稔逋寇一朝削平此誠天人合符中外叶力永言勳效無忘寤思其戴義及李祐應加爵命并幽州及齊德兩道行營將士各有賞賜並巳從別敕處分其賜物仍委度支逐便速與支送仍命使臣分往宣慰各於當處厚加宴勞其立功軍將未經寵授者委戴義李祐即差次等第速具聞奏即有甄獎用答勳勤李同捷力屈計窮方圖轉禍朕好生存性初議貸刑而面縛在途陰懷狡計夜縱火號潛誘家童更謀網漏自速梟獻憫彼凶魁坐沈家族顧茲貽戚載軫豫懷其母孫氏妻崔氏并男及家口等並宜特從寬宥令於湖南管內諸州有空閒處安置其歸降將卒不涉翻覆者委戴義李祐審加勘實各與衣糧分配驅使其滄景等州將士有謀執凶黨竟遭誅夷或雖被劫致能全名節者並委李祐按實條奏量加贈録其滄景德棣等四州百姓有是近日被賊點召團結者並放歸營農除非同惡相濟以死拒命者餘一切不問四州百姓久陷污俗每罹威虐莫非吾人今既脫難當施德令並宜給復一年不能自存者量給種食其刺史縣令仍令中書門下慎擇循良俾加存撫應諸將校自經戰伐或致死亡載念捐軀每深憫歎並委戴義李祐審加勘定具名銜事跡申奏即與褒贈其長行官健陳亡者並令所在長吏量與收葬同為祭酹其家口在者各委本軍優恤仍三年勿絶糧賜其有因中矢石遂至殘廢者各委本軍厚加存養仍給衣糧終身勿絶敕旨有未該者委戴義李祐比類更作條件奏聞其昭義義武等軍行營在賊境者比相犄角皆有功勤各別有處分於戲整師除害義切於安人撫俗策勳道存於布澤爰申彞典且乂新邦咨爾多士宜悉朕意朕以寡德臨御萬邦宵旰憂勤匪敢自暇然仁未及物誠不動天陰陽失和水潦為敗致茲災沴害及生靈江淮之閒滁和尤甚當寧軫惕永言疚懷其淮南道滁和兩州應水損縣據所申奏漂溺人戶處宜委本道觀察使與本州刺史子細檢勘全放今年秋稅錢米仍以義倉斛斗逐便據戶賑接其浙西浙東宣歙鄂嶽江西鄜坊山南東道並委觀察使與所在長吏據淹損田苗漂壞廬舍及蟲螟所損節級矜減指實奏聞如沒溺甚處亦以義倉量事賑救其京兆府河南府所損縣即據頃畝依常例檢覆分數蠲減州縣牧宰各務撫安必令均濟稱朕意焉門下帝者承天地貞邦國法明離之象固鴻業之本必命元子以備儲闈斯皇王之令謨古今之丕典朕祗受眷祐虔恭寶圖欽若彞章光修前緒皇太子永幼稟仁智生知孝愛體溫文以立德資敏哲以保躬寬裕有常貞慎無怠爰膺盛禮俾奉青宮嚴宗廟主鬯之儀遵朝夕視膳之節冊命云畢感悅良深問安既慶於寢門布澤宜覃於天下自太和七年八月七日昧爽巳前天下應犯死罪降從流流以下罪遞減一等惟官典犯贓及故殺人劫獄奪囚持仗強盜者不在此限左降官流人並與量移如應流貶及諸色得罪人所在亡沒並任歸葬宗周之盛實在於維城二漢之隆亦由於磐石自開元以後纍聖子孫皆長於深宮罔知稼穡並不得習詩書以修禮樂交氣類以敘人倫雖有閒平之才莫施魯衛之政永言淪廢深疚朕懷諸王等宜以今年以後相次出閣且授緊望巳上州刺史上佐觀其才能續有序用人倫所先婚禮為重笄年許嫁別有明文其十六宅諸縣主亦宜選擇良偶以時出適仍委吏部於諸色選人中取情願者揀擇具名聞奏亦當別加優獎令其就禮漢代用人皆由儒術故能風俗深厚教化興行近日苟尚浮華莫修經藝先聖之道湮鬱不傳況進士之科尤要釐革雖鄉舉里選不可復行然務實抑華必有良術既當甚弊思有改張今寰宇乂寧干戈巳戢皇太子方從師傅授傳六經一二年之後當令齒胄國庠以興墜典宜令國子監於諸道搜訪名儒置五經博士各一人其公卿士族子弟明年巳後不先入國學習業不在應明經進士之限其進士學宜先試帖經并略問大義取經義精通者次試議論各一首文理高者便與及第其所試詩賦並停其試帖經官便以國子監學官充禮部不得別更奏請宏文崇文兩館生齊郎並依令式試經畢仍差都省郎中二人覆試須責保任不得輒許替代苟涉情故必加罪責卿大夫者羣下之所視遠方之所效若非恭儉克己廉貞化人而望其服從固不可得況朕不寶珠玉不御纖華逮於六宮皆務儉薄卿大夫得不叶朕此志率先兆人比年所頒制度皆約國家令式去其甚者稍謂得中而士大夫苟自便身安於習俗因循未革以至於今百官士族起今年十月服冬裘巳後其衣服輿馬並宜準太和六年六月十七日敕處分如固違制度九品巳上量加黜責其布衣五年不得舉選百姓軍人各委州府長吏漸施教化使自遵行不要便為禁制令其驚擾惠養疲人本於廉吏阜其生殖在絶貪求其諸道方鎮刺史等有聚斂貨財潛行饋遺者委御史臺糾察以聞仍委度支鹽鐵分巡院同為訪察不得容蔽親人之官切在守長久於其道政乃有成方鎮刺史三考巳下不得輒議替換如理有異等委中書門下訪察就加寵獎如灼然可録者別與甄升其或政理有乖害及百姓者即不在滿三考限易譏豐蔀傳美卑宮雕刻磨礱先賢有戒近者官才升於郎署位始至於郡符莫不高其閈閎廣以池榭非惟僭侈踰制實亦耗蠹傷財其百官第宅巳造成者並許仍舊今日巳後如更有創立新宅及屋宇高大者並委御史臺糾彈必嚴加黜責御史臺所置六察分糾百司比來因循鮮能舉職起今巳後諸司如有身名僞濫盜官錢及違法等事他時發覺者本察御史各並當貶斥考課之法前王所重蓋以總核吏理勵精政途名實苟違將何勸激宜準故事署內外知考使兼令中書舍人給事中各一人監考百姓困窮弊由奸吏政苟不擾人皆自安其司農寺供宮內及諸司廚冬藏菜並委本寺自供其菜價仍委京兆府約每年時價支付更不得配京兆府和市其諸陵守當夫宜委京兆府以價值送陵司令自雇召並不得差配百姓寒食杏仁雞子月進土蘇白麥樹栽選場棘稚修橋梁木等便於本戶稅錢內剋折不得更令和市天下諸州縣應納義倉及諸色斛斗除準式每斗二合耗外切加禁斷仍委度支鹽鐵分巡院及出使郎官御史切加訪察如聞今歲所在豐稔其義倉斛斗先有借用處委戶部勾當並須及時填足文武常參官諸州府長官子為父後者賜勳兩轉緣冊太子攝太尉稱賀攝侍中承旨宣制進中嚴外辦攝中書令讀冊授冊各賜爵一級其行事職掌官及書寶引冊寶舁舉冊寶禮儀使禮官等三品巳上賜爵一級四品巳下加一階撰冊文官特加一階仍並賜物有差導引官各加一階造冊寶金字裝寶人賜勳兩轉行事流外及禮生等各賜勳一轉文武常參官及陪位官并宗子諸親各賜勳一轉魯王府官未經進改者量與進改其皇太子侍讀宜委中書門下精擇二人具名聞奏天下孝子順孫先經旌表門閭者及年高廢疾者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏等量加祭祀布告遐邇咸使聞知
