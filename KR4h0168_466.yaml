front:
  text: 全唐文欽定全唐文卷四百六十六陸贄七
  hash: sha256:18ec832300776abfda664355e75932dfd6549fea5cbf08b0b837fe481269d51c
body:
  text: 十一月三日具官臣某惶恐頓首獻書皇帝陛下臣聞君子小人用捨不並國家否泰恒必由之君子道長小人道消於是上下交而萬物通此所以為泰也小人道長君子道消於是上下不交而萬物不通此所以為否也夫小人於蔽明害理如目之有眯耳之有充嘉穀之有蟊梁木之有蠧也眯離婁之目則天地四方之位不分矣充子野之耳則雷霆蠅黽之聲莫辨矣雖后稷之穡禾易長畝而蟊傷其本則零瘁而不植矣雖公輸之巧臺成九層而蠧空其中則圯折而不支矣是以古先聖哲之立言垂訓必殷勤切至以小人為戒者豈將有意讎而沮之哉誠以其蔽主之明害時之理致禍之源博傷善之釁深所以有國有家者不得不去耳其在周易則曰大君有命開國承家小人勿用必亂邦也在尚書則曰除惡務本去邪勿疑在毛詩則曰無縱詭隨以謹無良曾是掊克斂怨以為德盜言孔甘亂是用餤讒人罔極交亂四國在論語則曰惡利口之覆邦家者在春秋則曰聚斂積實不知紀極毀信廢忠崇飾惡言靖譖庸回服讒蒐慝天下之人謂之四凶在禮記則曰小人行險以徼幸長國家而務財用者必自小人矣小人使為國家而災害並至雖有善人無如之何臣頃因讀書常憤此類不圖聖代目覩斯人戶部侍郎裴延齡者其性邪其行險其口利其志凶其矯妄不疑其敗亂無恥以聚斂為長策以詭妄為嘉謀以掊克斂怨為匪躬以靖譖服讒為盡節總典籍之所惡以為智術冒聖哲之所戒以為行能可謂堯代之共工魯邦之少卯伏惟陛下協放勛文思之德而鑒其方鳩僝功體仲尼天縱之明而辨其順非堅偽則天討斯德聖化允孚小徃大來孰不欣幸跡其姦蠧日長月滋陰秘者固未盡彰敗露者猶難悉數今請粗舉數事用明欺罔大端悉非隱微皆可覆驗陛下若意其負謗則誠宜亟為辨明陛下若知其無良又安可曲加容掩願擇左右親信兼與舉朝公卿據臣所言閱實其事儻延齡罪惡無狀即臣之奏議是誣宜申典刑以制虛妄俾四海法朝廷之理兆人戴陛下之明得失之間其體甚大不當復有疑慮使辨之不早以竟失天下之望也前歲秋首班宏喪亡特詔延齡繼司邦賦數月之內遽衒功能奏稱勾獲隱欺計錢二十萬貫請貯別庫以為羨財供御所須永無匱乏陛下欣然信納因謂委任得人既賴贏餘之資稍宏心意之欲興作浸廣宣索漸多延齡務實前言且希睿旨不敢告闕不敢辭難勾獲既是虛言無以應命供辦皆承嚴約苟在及期遂乃搜求市厂墨豪奪入獻追捕夫匠迫脅就功以敕索為名而不酬其直以和雇為稱而不償其傭都城之中列肆為之晝閉興役之所百工比於幽囚聚詛連㣥遮訴盈路持綱者莫敢致詰巡察者莫敢為言時有致詰為言翻謂黨邪醜直天子轂下囂聲沸騰四方觀瞻何所取則蕩心於上斂怨於人欺天陷君遠邇危懼此其罪之大者也總制邦用度支是司出納貨財太府攸職凡是太府出納皆稟度支文符太府依符以奉行度支憑按以勘覆互相關鍵用絕姦欺其出納之數則每旬申聞其見在之數則每月計奏皆經度支勾覆又有御史監臨旬旬相承月月相繼明若指掌端如貫珠財貨少多無容隱漏延齡務行邪謟公肆誣欺遂奏云左藏庫司多有失落近因檢閱使置簿書乃於糞土之中收得銀十三萬兩其疋段雜貨百萬有餘皆是文帳脫遺並同已棄之物今所收獲即是羨餘悉合移入雜庫以供別敕支用者其時特宣進止悉依所奏施行太府少卿韋少華抗表上陳殊不引伏確稱每月申奏皆是見在數中請令推尋足驗姦計兩司既相論執理須辨鞫是非臣等具以奏聞請定三司詳覆若左藏庫遺漏不謬隱匿固合抵刑如度支舉奏是虛誣誑亦宜得罪陛下既不許差三司按問又不令檢奏辨明度支言太府隱漏至多而少華所任如舊太府論度支姦欺頗甚而延齡見信不渝枉直兩存法度都弛以在庫之物為收獲之功以常賦之財為羨餘之費罔上無畏示人不慚此又罪之大者也國之府庫用寘貨財物合入官則納於其內事合給用則出乎其中所納無非法之財所出無不道之用坦然明白何曲何私而延齡險猾售姦詭譎求媚遂於左藏之內分建六庫之名意在別貯贏餘以奉人主私欲曾不知王者之體天下為家國不足則取之於人人不足乃資之於國在國為官物在人為私財何謂贏餘復須別貯是必巧詐以變移官物暴法以刻斂私財捨此二途其將焉取陛下方務崇信不加檢裁延齡既怙寵私益復放肆遂錄積久逋欠妄云察獲姦贓總計緡錢八百餘萬聽其言則利益雖大考其事則虛誕自彰或是水火漂焚或緣旱澇傷敗或因兵亂散失或遭寇賊敓襄攵或準法免徵或經恩合放或人戶逃逸無處追尋或綱典拘囚不克填納或沒入店宅歲久摧殘或收獲舟船年深破壞類皆如此難以殫論在人者並無可科徵屬官者悉不任貨賣但存名額虛掛簿書大抵錢穀之司皆恥財物減少所以相承積累不肯滌除每當計奏之時常充應在之數延齡苟稱察獲遂請徵收恢張利門誘動天聽貽誚侮於方岳賈愁怨於烝黎于茲累年一無所得其為疎妄亦曰殆哉陛下姑欲保持曾無詰問延齡謂能蔽惑不復懼思姦威既沮於四方憸態復行於內府由是蹂躪官屬傾倒貨財移東就西便為課績取此適彼遂號羨餘愚弄朝廷有同兒戲諸州輸送布帛度支不務準平抑制市人賤通估價計其所折即更下徵重困疲甿展轉流弊既彰忍害且示不誠及其支送邊州用充和糴則於本價之外例增一倍有餘布帛不殊貴賤有異剝徵罔下既以折估為名抑配傷人又以出估為利事多矛盾交駭物情窮邊穡夫痛憤切於骨髓下土編戶冤呌徹於蒼旻而延齡以冒取折估為公忠苟得出估為賸利所謂失人心而聚財賄亦何異割支體以徇口腹哉殊不寤支體分披口安能食人心離析財豈能存此又罪之大者也平原遠鎮扼制蕃戎五原要衝控帶靈夏芟夷榛薉翦逐豺狼崎嶇繕完功力纔畢地猶敻絕勢頗孤危新集之兵志猶未固尤資贍恤俾漸安居頻敕度支令貯軍糧常使平原有一年之蓄鹽州積半年之儲循環轉輸不得闕數近者二鎮告急俱稱絕糧陛下召延齡令赴中書遣希顏宣旨質問延齡確言饋餉不絕儲蓄殊多歲內以來必無闕乏希顏懼其推互邀令草狀自陳狀亦如言略無疑畏陛下覽其所奏翻謂軍吏不誠遂遣中官馳往檢覆道路無轉運之跡軍城無旬日之儲將卒嗷嗷幾將不守有如是之顛沛有如是之欺謾按驗既明恩勞靡替其為蠱媚曠代罕聞此又罪之大者也國之憲度會府是司位列諸郎猶應辰象任居六事實代天工內總轄於庶官外敷化於列郡舉措繫生靈之命得失關理亂之源為人軌儀安可容易未有大官弛縱而能使㣥吏服從朝典陵遲而欲禁天下暴慢是以天寶將季楊國忠為吏部尚書亟於私庭銓集選士果令逆竪得以為詞史冊書之足為國恥而延齡放情亂紀又甚國忠懈於夙興多闕會朝之禮徇其鄙欲大隳省署之儀徙郎曹於里閭視公事於私第盡室飫官廚之饍填街持簿領之書復有諸部參辭四方申請決遣資其判署去就俟其指撝延齡或聚客大誇不令白事或縱酒憑怒莫敢入言至有迫切而來逾旬未省輸納之後累月不歸資糧罄於滯淹筋力困於朝集晨趨夕散十百為㣥里中喧闐常若闤闠衢巷列屠沽之肆邑居成逆旅之津離次慢官虐人斁法求之今古鮮有其倫此又罪之大者也總領財賦號為殷繁自必識究變通智權輕重大不失體細能析微濟之以均平莅之以勤肅近無滯事遠無壅情綱條之下無亂繩鑒照之內無隱匿然後人不困而公用足威不厲而姦吏懲苟或未然則非稱職況延齡以素本僻戾之質而加之以狂躁滿盈既懵且驕事何由理遂以國家大計委於胥吏末流當給者無賄而不支應徵者受賕而縱免紀綱大壞貨賂公行苟操利權實竊邦柄近者度支小吏屢為府縣所繩鞫其姦贓無不狼籍通結動連於節將交私匪止於苞苴威福潛移乃至於是職司失序固亦可知此又罪之大者也風教之大禮讓為先禮讓之行朝廷為首朝廷者萬方之所宗仰㣥士之所楷模觀而效焉必有甚者是以朝廷好禮則俗尚敬恭朝廷尊讓則時恥貪競朝廷有失容之慢則凌暴之弊播於人朝廷有動色之爭則攻鬬之禍流於下聖王知其然也故選建賢德以為公卿使人具瞻不諭而化昔周之方盛多士盈朝時靡有爭用能俾乂故其詩曰慎爾出話敬爾威儀無不柔嘉又曰有來雍雍至止肅肅相維辟公天子穆穆言㣥臣相與事上敬而能和言語動作靡有不善也周德既衰小人在位務相侵侮以至危亡故其詩曰方茂爾惡相爾矛矣又曰既之陰汝反予來赫又曰涼曰不可覆背善詈言小人得志惡怒是憑肆其褊心以相詬病也陛下勤修儀式以靖四方慎選庶官以貞百度內選則股肱耳目外選則垣翰藩維濟濟師師咸欽至化庶相感率馴致大和而度支憑寵作威恃權縱暴侵刻軍鎮匱闕資糧將帥每使申論延齡率加毀訾或指誣隱盜或謗訐陰私或數其出處賤微或億其心志邪悖詞皆醜媟事悉加誣匹夫見凌猶或生患況將帥素加委遇多著勳庸縱有踰分取求但宜執理裁處苟當其所孰敢不從豈可對彼偏裨恣行侵辱使其慚靦於麾下憤恥於朝廷惟口起羞諒非細故為國聚釁實由斯人而又虐害㣥司幸其闕敗蔑彼彞典逞於兇懷氣吞等夷隸蓄郎吏時有履道而不為屈撓守官而莫肯由從遭其詆訶事則尤劇或辱兼祖父或毀及家門皆名教所不忍聞敘述所不堪紀其為構陷抑復多端故示兇威使人懾憚人之狂險乃至於斯上虧大猷下扇流俗炰烋禮義之府衊汙清明之朝此又罪之大者也度支舊管牛驢三千餘頭車八百餘乘循環載負共饋邊軍既有番遞之倫永無科配之擾延齡苟逞近效不務遠圖廢其葺修減其芻秣車破畜耗略無孑遺每須載運軍資則令府縣差雇或有卒承別旨須赴促期遂於街市之間虜奪公私雜畜披猖頗甚費損尤多吏因生姦人不堪命所減者則奏以為利所費者則隱而不論破實徇虛多如此類度支應給宮內及諸司使蒭藳薪炭等除稅草之外餘並市供所用既多恒須貯備舊例每至秋穫之後冬收之時散開諸塲逐便和市免費高價復資貧人公私之間頗謂兼濟延齡悉隳舊制但飾姦情旋計蒭薪價錢以為節減剩利及乎春夏之際藳秸已殫霖潦之中樵蘇不繼軍广既輟莝官廚待然告闕頻煩於聖聰徵催絡繹於省署崎嶇求買何暇計量糜損官錢不啻累倍聯蹇狼狽率以為常此則睿鑒之所明知物情之所深駭事之舛繆觸緒皆然臣愚以謂若斯之流不過歲費國家百萬緡錢及事體非宜耳其為罪惡未足傾危事之可憂不在於此是以不復詳舉以煩聽覽也至如矯詭之態誣罔之辭遇事輒行應口便發靡日不有靡時不為自非狀迹尤彰足致其禍者又難以備陳也延齡有詐偽亂邦之罪七而重之以耗斁闕遺愚智共知士庶同憤以陛下英明鑒照物無遁情固非延齡所能蔽虧而莫之辨也或者聖旨以其甚招嫉怨而謂之孤貞可託腹心以其好進讒諛而謂之盡誠可寄耳目以其縱暴無畏而謂之強直可肅姦欺以其大言不疑而謂之智能可富財用將欲排眾議而收其獨行假殊寵而冀其大成倘陛下誠有意乎在茲臣竊以為過矣夫君天下者必以天下之心為心而不私其心以天下之耳目為耳目而不私其耳目故能通天下之志盡天下之情夫以天下之心為心則我之好惡乃天下之好惡也是以惡者無謬好者不邪安在私託腹心以售其側媚也以天下之耳目為耳目則天下之聰明皆我之聰明也是以明無不鑒聰無不聞安在偏寄耳目以招其蔽惑也夫布腹心而用耳目舜與紂俱用之矣舜之意務求已之過以與天下同欲而無所偏私由是天下臣庶莫不歸心忠讜既聞元德逾邁故虞書云臣作朕股肱耳目又云明四目達四聰言廣大也紂之意務求人之過以與天下違欲而溺於偏私由是天下臣庶莫不離心險詖既行昏德彌熾故商書云崇信姦回大雅云流言以對寇攘式內言邪僻也與天下同欲者謂之聖帝與天下違欲者謂之獨夫其所以布腹心而任耳目之意不殊然於美惡成敗若此相遠豈非求過之情有異任人之道不同哉太宗嘗問侍臣何者為明君何者為暗主魏徵對曰君之所以明者兼聽也其所以暗者偏信也又曰秦之胡亥偏信趙高肆其姦欺卒至顛覆徵之此說理致甚明簡冊備書足為鑒戒趙高指鹿為馬愚弄厥君歷代流傳莫不痛憤陛下每覽前史詳考興亡固亦切齒於斯人傷心於其主臣謂鹿之於馬物類猶同豈若延齡掩有而為無指無而為有陛下若不以時省察得無使後代嗟誚又甚趙高者乎斯愚臣所以焦慮疚懷以陛下為過者良有所以也夫理天下者以義為本以利為末以人為本以財為末本盛則其末自舉末大則其本必傾自古及今德義立而利用不豐人庶安而財貨不給因以喪邦失位者未之有也故曰不患寡而患不均不患貧而患不安有德必有人有人必有土有土必有財百姓足君孰與不足蓋謂此也自古及今德義不立而利用克宣人庶不安而財貨可保因以興邦固位者亦未之有焉故曰財散則人聚財聚則人散與其有聚斂之臣寧有盜臣無令侵削兆庶以為天子取怨於下其有若此者行罰無赦蓋為此也殷紂以貪冒失人而亡周武以散發得人而昌則紂之多藏適所以為害巳者之資耳尚何賴於財賄哉太宗亦云務蓄積而不恤人甚非國家之計隋氏不道聚斂無厭所實洛口諸倉卒為李密所利此則前代已行之明效聖祖垂裕之格言是而不懲何以為理陛下初膺寶歷志翦㣥兇師旅繁興徵求寖廣榷算侵剝下無聊生是以涇原叛徒乘人怨咨白晝犯闕都邑甿庶恬然不驚反與賊眾相從比肩而入宮殿雖蚩蚩之性靡所不為然亦由德澤未浹於人而暴令驅迫以至於是也于時內府之積尚如邱山竟資兇渠以餌貪卒此時陛下躬覩之矣是乃失人而聚貨夫何利之有焉車駕既幸奉天逆泚旋肆圍逼一壘之內萬眾所屯窘如涸流庶物空匱嘗欲發一健步出視賊軍其人懇以苦寒為辭跪奏乞一襦袴陛下為之求覓不致竟憫默而遣之又嘗宮壼之中服用有闕聖旨方以戎事之急不忍重煩於人乃剝親王飾帶之金賣以給直是時行從將吏赴難師徒倉黃奔馳咸未冬服漸屬凝沍且無薪蒸饑凍內攻矢石外迫晝則荷戈奮迅夜則映堞呻吟凌風飈冒霜霰踰旬而眾無攜貳卒能走強賊全危城者陛下豈有嚴刑重賞使之然耶唯以不厚其身不藏其資與眾庶同其憂患與士伍共其有無乃能使捐軀命而扞寇讎餒之不離凍之不憾臨危而不易其守見死而不去其君所謂聖人感人心而天下和平此其效也及乎重圍既解諸道稍通賦稅漸臻貢獻繼至乃於行宮外廡之下復列瓊林大盈之司未賞功勞遽私賄玩甚沮惟新之望頗攜死義之心於是輿誦興譏而軍士始怨矣財聚人散不其然歟旋屬蟊賊內攻翠華南狩奉天所積財貨悉復殲於亂軍既遷岷梁日不暇給獨憑大順遂復皇都是知天子者以得人為資以蓄義為富人苟歸附何患蔑資義苟修崇何憂不富豈在貯之內府方為已有哉故藏於天下者天子之富也藏於境內者諸侯之富也藏於囷倉篋匵者農夫商賈之富也奈何以天子之貴海內之富而猥行諸侯之棄德蹙守農商之鄙業哉陛下若謂厚取可以恢武功則建中之取既無成矣若謂多積可以為已有則建中之積又不在矣若謂徇欲不足傷理化則建中之失傷已甚矣若謂斂怨不足致危亡則建中之亂危亦至矣然而遽能靖滔天之禍成中興之功者良以陛下有側身修勵之志有罪巳悔懼之詞罷息誅求敦尚節儉渙發大號與人更新故靈祇嘉陛下之誠臣庶感陛下之意釋憾迴慮化危為安陛下亦當為宗廟社稷建不傾不拔之永圖為子孫黎元垂可久可大之休業懲前事徇欲之失復日新盛德之言豈宜更縱憸邪復行刻暴事之追悔其可再乎臣又竊慮陛下納彼盜言墮其姦計以為搏噬拏攫怨集有司積聚豐盈利歸君上是又大繆所宜慎思夫人主昏明繫於所任咎繇夔契之道長而虞舜享濬哲之名皇甫棸楀之嬖行而周厲嬰顛覆之禍自古何嘗有小人柄用而災禍不及邦國者乎譬猶操兵以刃人天下不委罪於兵而委罪於所操之主蓄蠱以殃物天下不歸咎於蠱而歸咎於所蓄之家理有必然不可不察臣竊慮陛下以延齡之進獨出聖衷延齡之言多順宸旨今若以罪寘辟則似為眾所擠故欲保持用彰堅斷若然者陛下與人終始之意則善矣其於改過不吝去邪勿疑之道或未盡善焉夫人之難知著自淳古試可乃已載於典謨陛下意其賢而任之知其惡而棄之此理之常於何不可倘陛下猶未知惡但疑見擠固有象恭挾詐之人亦有黨邪害直之士所資考覈兩絕欺誣陛下以延齡為能愚臣以延齡為罪能必有跡罪必有端陛下胡不指明其所效之能以表忠賢按驗其所論之罪以考虛實與眾同辨示人不私若能跡可稱而罪端無據則是黨邪害直之驗也陛下當繩其傷善以勵事君罪端有徵而能跡無實則是象恭挾詐之驗也陛下當糾其包禍以戒亂邦如此則上之於下釋嫌構之疑下之於上絕偏惑之議何必忠邪無辨枉直莫分薰蕕同藏其臭終勝此則小人道長之象也實時運否泰安危之所繫豈但有虧聖德不利善人而已乎陛下若必以與已同者為忠良自我作者無改變如此則上之所欲莫不謟上之所失莫不從水火相濟不為非金礪相須不為是恥過作非不足戒捨己從人不足稱惟意是行則匡輔或幾乎息矣匡輔息則理不可致仲尼所謂一言喪邦者在於予之言而莫予違也事關興亡固不可忽希旨順默浸已成風獎之使言猶懼不既若又阻抑誰當貢誠伏恐未亮斯言請以一事為證只如延齡凶妄流布寰區上自公卿近臣下逮輿臺賤品諠諠談議億萬為徒能以上言其人有幾陛下試令親信博採輿詞參校比來所聞足鑒人間情偽臣以卑鄙任當台衡既極崇高又承渥澤豈不知觀時附會足保舊恩隨眾沉浮免貽厚責謝病黜退獲知幾之名黨姦苟容無見嫉之患何急自苦獨當豺狼上違懽情下餌讒口良由內顧庸昧一無所堪夙蒙眷知唯在誠直綢繆帳扆一紀于茲聖慈既以此見容愚臣亦以此自負從陛下歷播遷之臲卼覩陛下致興復之艱難至今追思猶為心悸所以畏覆車而駭懼慮燬室而悲鳴蓋情激於中雖欲罷而不能自默也因事陳執雖已頻繁天聽尚高未垂諒察輒申悃欵以極愚誠憂深故語煩懇迫故詞切以微臣自固之謀則過為陛下慮患之計則忠糜軀奉君非所敢避沽名衒直亦不忍為願迴睿聰為國熟慮社稷是賴豈唯微臣不勝荷恩報德之誠謹昧死奉書以聞臣誠惶誠恐頓首再拜
