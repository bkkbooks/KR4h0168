front:
  text: 全唐文欽定全唐文卷二百九十三張九齡十一
  hash: sha256:eb69e86beb70a71ce6426b54adb77b84dce1a1f2c8a76b2f296174174813c07f
body:
  text: 公諱某瑯琊臨沂人蓋王氏所由遠矣然其自漢至今上下千載海沂為頌始壯厥猷淮水作楨克昌其後繼跡台衮聯華牧伯君子韙其立言史官褒其行事則巳系無違德人以嘉聞圖牒粲然宜為冠族廼祖某梁侍中尚書左右僕射安東亭侯高祖某陳度支尚書曾祖某太子中書舍人祖某皇朝吏部郎中贈潤州刺史父某官至洪州都督公踐修範業雅有名器性開敏而達於從事才果斷而長於御下至於學以知古義以隨時虛巳存誠離經合道異焉而不傷於物同焉而不害於政咸自得之務其大者儀鳳中初以門子選為孝敬皇帝挽郎解巾相王府參軍授豫王府參軍歷太子通事舍人蒲州司法參軍丁洪州府君憂去職喪踰於戚行過於禮時其在疚哀能感隣服闋授相州鄴縣令施於政也揮干鏌之鋒截無不斷展騏驥之足行無不至以故言出有孚豈止於百里教行無類俄浹於四封邑人是宜輿頌乃作御史中丞張仁愿表公尢異帝用嘉焉遷洛州陸渾縣令加朝散大夫寵其能也再有仲由之善益聞考父之恭薄理我畿有加於鄴識者觀政許其以後圖時輩推多驗之於晚節稍遷蒲州司馬洛州長史蒲州長史三為郡佐一以貫之執心有恆厥聲以茂雖巴祗之體素顧和之理識異代同官齊名比義固無愧也俄遷隨州刺史趙始大列於諸侯張敞有名擢為刺史賢明獨斷政教宏宣始於漢東之美繼以巴中之異郡歷數四課嘗第一再領遂帛丿糸二州刺史先是俗多梗弊人盡流庸公亦來思撫之如子彼得攸塈歸之如市行有餘力用不盡才驟遷大都督乃拜相州刺史先是景雲歲我唐雖舊儀制維新置連率之官增監郡之秩於是歷選列辟專謀用賢且有後命而公為稱首遂作越州都督同京官正三品連率統察杭婺衢睦溫撫台閩八州長吏巳下率由部按事雖竟寢議者終榮仍守越州都督加銀青光祿大夫公素有盛名兼之寵數聞望而草風必偃至止而蓬麻自直與夫任賢坐嘯勞心行部彼有因而至此我無為而巳然政之行焉有若神者徵拜雍州司馬頃之又正名為京兆少尹京兆者本公之樂土居巳重世買臣還郡無矜於出綬張既本州是榮於衣繡公雖作貳我亦為光開元二年始封華容縣男昭有德也其明年有制以公檢校太僕卿訓以六騶正於君僕日加數馬之慎歲有展軨之勤無何即真可謂貴矣然公思報所受逾勵所行神明未衰志業不究春秋六十有一開元六年秋八月乙亥寢疾薨於洛陽之陶化里第嗚呼哀哉朝廷傷焉賻贈以禮夫人范陽盧氏不享偕老先時在殯其年冬十月乙酉合葬於偃師之某原去倚首陽前瞻洛汭豈伊瑕邱之樂蓋取邢山之兆有子曰昊次子曰旻泣血苫哀厂田坴於遠日勒銘金石儀叶於吉時假以斯文為之實錄其詞曰有周之裔居海之沂緒業為永德音罔違貽厥謀翼俾其翰飛宜哉世祀亦曰家肥其一洎我華容而今濟美四科冉季九能魯史學匪為人義如在巳施於有政轡之柔矣其二雉馴宰邑鷹揚佐郡五為刺史在邦必訓再踐太僕厥庸迺奮今也則兦天不可問其三神欺永年禮先遠日合如防墓開彼滕室鶴弔人悲龜言地吉篆石泉戶與山相畢其四公諱某字某東平人四世祖義雲北齊度支郎中青州刺史曾祖炎貞觀初并州白馬府右果毅都尉右衞郎將祖義蒲州河東令坐事左轉桂州歸義縣丞因家於始安父誠舉孝廉高尚不仕公即孝廉府君之子稟靈純茂姿性開朗亦既志學休有令聞雖在諸生之中巳有萬人之望矣夫其忠有世善有元仁於其親友於兄弟豈尚行所致其因心而然公之植身根萌素厚摻本制末何適非宜故為政之方所從來遠矣某年初有御史將命黜陟幽明公時盤桓居貞未有攸往而使者承式固才是求褐衣見召直繩斯委乃表公授梧州錄事參軍非其好也先是剽刦在境行李所病綱佐無機逋盜肅然歲滿授廣州湞陽令事必舉人用穩便莫不咨嗟未始見也尋轉韶州司馬其政如初秩滿丁內憂公有至性幾於毀滅廬墓展哀泣血扶病有加一等不惟三年嶺南按察使廣州都督兼御史大夫蕭璿彼孝悌之士也以錫類之故有嘉德音於是拔補按察判官義行相承終始如一尢加欽重特以表聞敕授新州刺史屬恩州酋帥日尋干戈將有式遏實資明允後按察使廣平郡宋璟以公為五府總管以甲卒戍焉雖臨之兵威而開以恩信俾忿鷙狼戾化梟為人廣平公深以為能奏假恩州刺史俄又真授夷落大寧尋加朝散大夫遷端州刺史居必致理莫匪嘉績并護之寄朝選以歸於是加秩中散大夫拜安南副都護到官未幾闇忽遂殂時年六十某月日庚子歸葬於某山原公內行無玷外物不干文非務華學皆為巳所涖數郡遺愛在人全已而歸可謂厚矣有子曰某銜恤終天愬哀遠日永惟稱伐存乎幽篆銘曰猗歟畢侯濬源長流受氏於畢爰自有周彼美系載實惟孫謀賢哲繼軌斯其遠猷嗟彼懿宗是生孝友知實內積行非外誘家邦必聞人倫歸厚微此令德夫豈善守亦既從政厥聞載榮邑能訟息郡用禮成蠻夷慕教鴟鴞變聲九真副嶺萬里揚旌護彼絕域義忘險艱緹律未改丹旐而還存沒之際忠孝之間徽音無泯篆德茲山公諱某天水隴城人其先受賜於周所食者趙下逮襄子大為諸侯貽子謀孫克用保國有功有伐無代無之曾祖某隋尚書左右僕射淮寧郡公祖某金紫光祿大夫殿中監贈工部尚書武強公父某符寶郎皆發聞馨香系祚蕃衍不高位者則人望焉公惇師舊業允迪淵懿包君子大雅之量有古人獲心之賞修詞以達其道則質文相半履行以顧其言則剛柔並克弱冠以門子調補湖州參軍轉相州司兵參軍學以入官思不出位格言清論始誦今行屬太上皇養德在藩擇賢為吏公首其舉王曰爾諧於是引為相王府戶曹參軍轉法曹參軍及龍德既亨鶴鳴有應往而利見縻以好爵乃授朝散大夫雍州錄事參軍綱領諸曹罔有不率秩滿除洛州伊闕縣令事舉其中斂從其薄惠小鎮大徇公滅私政之在人今而遺愛俄遷徐州司馬未幾轉陝州司馬許州長史千里將騁六轡斯柔得之自心動而中節故其四參州事再入府寮一宰畿邑三為郡佐莫不所居而績宣其用所去而頌因其跡豈伊苟然厥繇尚矣開元八年春二月疾作革乙丑終於官舍春秋若干某年冬十有一月庚午歸葬夫人崔氏祔焉公自然淡泊不屑勢利守道貞固與命推遷故歷年多所移官數四不過參佐而巳豈亦直道之云乎然而卑以自牧約而能濟推厚居薄內居其仁急病讓夷外多其義不曰君子其能爾乎有子曰令言次曰令則泣血加人抑情就禮哀愬窀穸之事恭惟先君之德驗之所履附之斯文以傳無窮以慰罔極銘曰猗嗟令德寬仁合道景行行止風流肆好名取公器善為身寶志所以立政所以宣入官惟允蒞事其然是儀是式不忘不愆今也終古後之克祚子孫禋祀春秋霜露茫茫九原斯焉永慕君諱某字某京兆杜陵人其先佐夏翼商賜命為伯傅楚相漢繼世能賢休有成烈慶流於裔洎曾祖津仕隋至內史侍郎戶部尚書武德初拜黃門侍郎壽光男克濟美名以食舊德大父琨太子詹事武陽侯能成休軌載揚厥問烈考展官止少府監主簿懿業無忝而大位不充天爵自高人倫斯貴公荷百代之丕搆傳一經之素範白足以長人文敏足以敷政跡不由徑必期乎直學不為辨每抑其華志尚則然風流自遠斯有萬里之望豈伊百夫之特始自崇文生明經上第起家汾州參軍公以為國無小而行無擇苟履忠信何陋蠻貊遂求補遠郡從所好焉於是授泉州司倉參軍歷廣州都督府法曹參軍輪囷下蟠弗以屑意幹蠱用譽將以明道固已仁焉而不異於遠義焉而不辭於難潛亦孔昭允謂君子秩滿遷韶州司馬在郡數載檢身一德輔化致理刑清訟息宜其奮庸上國寘乎公卿而矢志南州終於參佐悲夫享年五十有一某年月卒於官舍粵開元六年冬十二月庚午葬於少陵原有子曰某欲報罔極思傳不朽勒石泉戶式昭德音銘曰皇矣鼻祖時維大彭黻衣作伯彤弓用征猗那其後世濟其名雖公道屈亦樹德聲其一休烈有素聿修無忝言炳身文禮充物檢行雖欲盡名不可掩學古入官蓋取諸漸其二參卿彼分從事窮海孰云其陋我惟義在何適非宜胡然有待天曷我欺人隨物改其三維開元十二年歲次甲子十二月丁巳朔二十四日庚辰司徒申王薨於行在所冊諡惠莊太子旋殯於寢粵閏十二月二十七日壬午將陪葬於橋林之栢城黼幕宵布羽纛宿設西序啟攢南首成列皇帝深天倫之戚崇后儲之禮擬容衛於青宮申孔懷於朱邸爰命史氏稽於令則無俾直書不彰遺德詞臣曰昊天有命先后受之分王子弟藩衞京師克荷成憲罔弗肅祇懿哉明哲誕惟神粹宣慈日聞孝友天至道則脗合迹無自異性則生知學兼時習易微書遠詩言禮立德必有隣善如不及貴而能損量固難挹方伯出鎮召南取斯司徒入掌鄭武其宜義之所在政乃克施物留遺愛事著成規西夏息人東征叶卜煒煒同輦皇皇改服疾搆中路凶傳左轂寧不憗遺奄鍾斯酷嗚呼哀哉昔在沖眇具惟兄弟四國並封五王均體遊必連騎居則同邸各承愛於含飴俱受經於置醴既荏苒而云邁屬殷憂之將啟實定禍於蕭牆遂繼明於雲陛雖隔深宮之衞常洽家人之禮曷殂謝以痛心感平生而流涕嗚呼哀哉爰擇茂典追崇上嗣表先聖之元良申友于之襃異紛鹵簿以徒設儼文物而空備彼神儀之如在乃㣥悲之所萃周禮從祔漢塋是陪先遠日而選吉會同盟以送哀夜漏盡兮暗室啟庭燎殘兮曉挽催按三校而徐進將一去而不迴嗚呼哀哉背朱門兮遲遲馳白驥兮騤騤野蒼茫而助慘風蕭飋而增悲翩翩兮素蓋寂寂兮畫帷遵舊途而何有覽陳迹以如疑面都邑兮不入待陵寢兮有期惟光儀之永閟與昭代而長辭嗚呼哀哉潛清暉於幽穸召鴻名於美跡將在皇儲之史豈伊諸侯之策播遺芳於蘭桂傳不朽於金石諒紀言之在茲嘉德音之無斁嗚呼哀哉維某月朔日中散大夫使持節都督桂州諸軍事守桂州刺史兼當管經略使嶺南道按察使攝御史中丞佩紫金魚袋上柱國曲江縣開國男張某敢昭告於大舜之靈惟神以大孝而崇德以大聖而奮庸以至公而有天下以至均而一海內故不以荒服之外不以黃屋之尊巡守而來殂落於此倦勤之造永結於黎庶惠懷之尊長存於壽宮載祀雖遐威靈如在今聖朝紹興至道愍茲遠人爰遣使臣按理邊俗惟神幽鑒願表微誠若私僻為謀公忠有替明鑒是殛俾無遠圖如悉心在公惟力是視當福而不福為善者懼矣今至止之日輒詣陳誠伏惟神道聰明亮斯欽畏願俯垂冥祐俾輸力明時尚饗維開元十年歲次壬戌二月癸酉朔十七日巳丑吏部侍郎某謹以清酌脯醢之奠敬祭故某公之靈聞夫仁必壽考所謂神道善亦慶延以為信然今夫子之不福而聖謩之是愆孝友純固禮讓周旋行所以直業所以專誠公才而天假故官政以日宣節使是式朝宿既至十部稱賢一人思媚鳳凰於彼雲霄以冀胡然明靈殲我良懿嗚呼哀哉夫子之逝平生之懷襟抱素合遊處常偕清風對禁文石同儕自茲兩掖殆將一紀展轉清貫仳離君子曷其愛而甫云覯止正司空之掃第屬荊州之罷市歘交臂而相失殷痛心其何巳今卜兆有日祖載在庭䬃然象設寞爾音形驅白馬而何見瞻素車之巳扃德音不忘應甘棠之勿翦交情乃見伊黍稷之非馨嗚呼哀哉尚饗維年月朔日中散大夫洪州都督張某謹遣倉曹參軍李某以脯醢之奠敬祭於故宋國公之靈惟公代載賢傑天資忠厚外珪組而雖華內冰鏡而無垢善常不伐明能自晦省中之樹訪猶不言車前之馬數而後對淑慎自已否亨有時孰能違命公此來思結忠主之戀深去國之悲六疾斯起五福云欺生涯溘盡精魄何之嗚呼哀哉追惟曩昔昇降雲霄榮華侍從暐暐光昭日歟月歟有榮有凋丹旐孑孑白驥蕭蕭同官之感俾予魂銷靈之來歸茲焉旅次瞻望無覩悲辛自至頃密邇而寄音今寞然而結欷南北於遠幽明永異何以敘情寄之奠饋尚饗維開元十五年歲次丁卯六月朔壬寅十日辛亥中散大夫使持節都督洪州諸軍事洪州刺史上柱國曲江縣開國男張某謹以清酌脯醢之奠祭於城隍神之靈恭惟明神懿皆潛德城池是保民庶是依精靈以秉正直攸好忝牧此都敢忘在公道雖隔於幽明事或同於表裏今水潦所降亦惟其時而淫雨不止恐害嘉穀穀者人之所以為命人者神之所以為祀祀不可以為利義不可以不福闔境山川能致雲雨豈無節制願達精誠以時弭災無或失稔則理人有助是所望於神明尚饗維年月朔日謹具少牢清酌之奠祭於故某公府君之靈惟公聯華公族振景天朝昔也時來則地分茅土今也福過則海變桑田豈惟魑魅之憂方為螻蟻之患嗚呼哀哉始更榮盛早睦嘉姻謬入郄公之選嘗荷戴侯之遇情契濶而彌積義流離而益固公之謫宦某又犯時永矣去國賁然來思雖窮途之至此幸隣境之在茲所忌者法豈忘於私聞柝聲而密邇畏書而間之然猶風煙可冀翰墨無輟心巳運於虛舟跡尚濡於涸轍驟寒暑之徂謝紛吉凶之迥穴京兆之使忽追廣陵之音遽絕嗚呼哀哉平生多感自傷千里之心已矣長辭徒發九泉之歎計疇昔之光寵痛淪兦於旅竄嘗許恤人之孤況霑愛子之半謹因遣奠昭告明靈心不可卷德以為馨匪羞是薦惟魂是聽遣行人於信宿空泫目於郊坰嗚呼哀哉尚饗維開元五年歲次丁巳九月丁酉朔十四日庚戌某官謹以清酌之奠祭於廣州都督甄公之靈惟公稟氣異人為國良臣資忠秉義奮翼躍鱗富貴自取聲名益震故能北擁旄於元朔南仗節於朱垠行部無幾臥理斯屬棠陰在聽䪥歌成曲下流是仰長塗反促始望雨而隨車遽驚風而轉燭嗚呼哀哉甫茲歲首彤襜載輝今也秋季丹旐言歸既寒來而暑往將物改而人非駟馬不馭雙雁空飛對平生之氣象詠宿昔之音徽燕越兮地眇胡山兮路微奠肴觴之在席感徒御以霑衣嗚呼哀哉尚饗維年月朔日族子祕書少監集賢院學士某謹以清酌少牢之奠敢昭告於燕國公之靈惟公應有期之運降不世之英坦高軌以明道謹大節而立誠懸鏡待人虛舟濟物妙用無數精心惟一明未眹而先覩聽有餘而每黜猶豹變而成文嘗鳳鳴而中律故能羽翼聖后丹青元化陳皋陶之謨謀盡仲山之夙夜道因慮於文武業惟永於王霸綢繆恩渥荏苒代謝國重元輔門承下嫁實大我之宗盟與人君之姻婭天蓋福善地益華宗赫赫為尹巖巖比崇不享黃髮如何元穹既道長而運短豈祥降而惠終人兦令則國失良相學墮司南文殞宗匠惟國華之見奪何天道之弗諒追惟小子夙荷深期一顧增價二紀及茲非駑駘之足數蓋枝葉以見貽洎剖符於外臺承徹琴於舊館屢行號而身贖空匍匐而心斷跡既拘於彞憲情未展於哀款朝章猥及傳名斯入想德輝而不見望仁里而徒泣樹所歎而猶存人具瞻而永戢盡繐帳之今感哀烏衣之往集庶羞雖薄冀享厥誠尊靈斯降是嘉平生已矣萬古厂田坴帛丿糸五情追悲緒於離筵結巨恨於幽明伏惟尚饗開元二十年歲次壬申孤子九齡謹遣弟某等謹以清酌脯醢庶羞之奠敢昭告於先考先妣之靈九齡積罪昊天天實降罰嚴蔭永隔慈顏重違欲報劬勞終天何極夙承教誨幸而有成崇國寵靈猥當大任聖上義存延賞追贈所及朝恩優渥跪承摧感伏惟昭亮享茲殊錫今謹具贈太常卿廣州都督告身桂陽郡太夫人告身及玉帶金章紫衣各一副伏惟尚饗
