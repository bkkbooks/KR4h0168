front:
  text: 全唐文欽定全唐文卷二百四崇業龍朔中官右司禦衛長史
  hash: sha256:67aa2d3280ca9f5de6512c82839f33508289fb28fb5176be96155ae2e792d24a
  markers:
  - {type: head, offset: 12, content: 崔崇業, id: KR4h0168_NFKB_204-h1, level: 1}
body:
  text: 竊惟藏史立言靡替君臣之義能仁闡教先崇孝敬之風縱道敬乘鳧尚委身而降禮業成捧馬猶負櫬以追恩彈曰負櫬教有誠文拜伏經無此説乎况共踐俗塗同餐聖化豈有盜名黃服遂忘亭毒之功託迹緇門便遺顧復之德慠物行巳高視王侯我慢為心長揖父母事如中臺司列議中彈求之前代久滯迷方皇家戶牖百王澄汰千古事非害政容或可沿時有虧風理宜革弊事如祕閣局議中彈且四大齊德豈使遵道而不遵王三教均名事如左司禦議中彈何獨崇釋而不崇孔今若正其儀而教毀設敬須疑彈曰誠哉何須致惑耶屈其身而道存加拜何惑重以不輕攝行更符真諦之規事如司文寺議中彈持下御情彌合沖虛之軌式遵璽誥輕獻芻言致拜之禮實諧僉議謹議尚義龍朔中太府少卿師綸子官左崇掖衛長史厲井微言二篇極於為谷崛園幽旨萬物存乎不輕事如右司禦議中彈况乃君親兼極跪拜猶簡豈非絶棄於內敬而矯修於外迹乎彈曰行道以答四恩豈矯修於外迹育德以資三有豈絶棄於內敬乎幸子思之無多言也如見所量望令加禮謹議真胄龍朔中官左清道衛長史竊以釋道二門俱承元化雖復緇黃有別虔恭之志不殊宜令拜跪以申臣子之敬彈曰沙門迹超方內津梁家國稱謂異於臣子拜敬何預率賓謹議洽龍朔中官右清道衛長史竊以道教沖虛釋門祕寂至於昭仁濟物崇義為心乃眷儒風理將無異彈曰儒教所明不踰寰域釋宗所辨高出見聞故魏東陽王丕曰佛法沖洽非儒墨者所知今言不異何多謬耶至若宿德耄齒戒律無虧棲林遁谷高尚其事若斯儔輩可致尊崇其有弱齓蒙求熏修靡譽背真混俗心行多違以此不拜義難通允彈曰夫稱沙門者何也謂紹法象賢發蒙啓化儀非搢紳之飾教殊廊廟之規求宗故所以直骸孰可分其德業矯俗故由茲抗禮寧容隔以尊卑但在家在國事君事親不拜之儀何可以訓彈曰誠哉奉君親者無宜不拜沙門不事王侯背恩天屬以拜為訓似未之思望請勒拜垂憲於後謹議神靜左奉裕衛長史若夫二儀始闢君臣之道即隆三才創分父子之情斯在莫不皆竭股肱俱遵愛敬故知君臣父子稟自天然極尊極親無可為間止如釋老之教近日始崇釋則興於漢朝老則置於宋代皆緣時君有旨父母承恩方染緇衣然稱入道如無所稟不得離俗離俗雖言絶境習道仍居宇內事如司津議中彈率土皆曰王臣不聞限以緇素事如左清道衛議中彈父生母育罔極難酬於法雖曰絶塵在身須敦仁義豈容為臣未曾效節為子未展溫凊承恩乃變素衣去髮言真入道乘茲慠誕慢君懱親高揖帝王不拜父母為臣貽寬怠之咎為子招不敬之辜事如左清道衛議中彈庸流自謂合然往代恕其無識彈曰昔漢帝降禮於摩騰吳主屈節於康會趙邦澄上寵懋錦衣秦日道安榮參共輦斯並德回萬乘道降極尊况乎十室難誣而曰庸流無識因循日久行之不改聖上重纘皇極欲革前非孝理蒼生思遵名教爰降綸旨飾光彞典恐爽恆情特令詳議謹尋釋老二教見在遺文我慢矜高是人難度彈曰守道不屈寧是矜高耶庶事謙約無失沖撝靜思此言其義見矣入道巳成陵虛控鶴深修禪定得五神通如此輩流猶願卑屈况庸僧尼見居王土衣緇異俗餘事罕知彈曰曼倩云談何容易談何容易借哉夫沙門之內功業實繁聖朝巳來蓋亦不少且帝京僧伍盛德如林略舉十科用開未喻至若譯經則波頗元裝義解則僧辨法常習禪則曇遷惠因護法則法琳明瞻明律則元琬智首感通則通達轉明遺身則元覽法曠讀誦則惠銓空藏聲德則智凱法炎宏福則德美智興若此之流具如僧苑所列而言罕知餘事何雷同之甚乎唯自矜高願居人上求之釋教其義蔑聞凡曰是人準經致敬况在極尊並之父母欲令拜伏義無不可其僧尼道士女道士於君皇后皇太子及其父母所並請準勑令跪庶使光二教之謙撝隆萬代之名教謹議懷敬龍朔中官右奉裕衛率竊以三教五儀咸窮睿哲殊塗一致必俟尊嚴釋老戒時遵崇是務周孔訓俗嚴敬為先遂使緇衣之首抽簪奉教青襟之伍映雪傳芳為百代之楷模作千齡之準的且誕靈舍衛道自尸毗既有母子之恩事如右司禦衛議中彈豈隔君臣之禮緇黃雖異賢智寧殊不拜君親誠乖昔典彈曰據教令拜有益乎有損乎有益也豈以乖昔典不拜乎有損也豈以順昔典而令拜乎今只可約損益以昌言無宜據乖順而申議無聖即仍舊有聖即典移法既俟聖方興亦冀緣興改法曹司僉議請從拜禮謹議崇素龍朔中官右武衛兵曹參軍竊以三教爰興俱敦勸奬流派雖別趣善同歸緇黃之躅稍殊君親之儀詎隔豈有才捐俗服遂傲禮容高揖乘輿不拜嚴父資敬之道不足忠孝之迹頓虧李釋斯風未為盡善彈曰內將外反真與俗乖何得輕弄筆端商略元極孔子曰非聖人者無法誠哉方今垂範立制導德齊禮經典乖失詳議改張據理論情拜實為允謹議思九龍朔中官左典戎衛倉曹竊以川瀆細流竟朝宗於溟海螢燭末光終歸曜於日月故知物有深厚猶取貴於總名况在君親莫大而有棄於嚴肅洎乎關浮紫氣塔照金容老釋二門俱隆法教但法教流布事由君后出家離俗命在尊親遂使載覆之恩棄而不答事如奉常議中彈貴賤之禮捐而靡修既虧人事有傷禮律彈曰內外既殊奚可拘於禮律爰軫聖慮詢及芻蕘輕陳管見從拜為允謹議仁睿龍朔中官雍州司功竊以元風肇扇莫先於伯陽總衆妙而謙卑高棲物表致㣥生於道德象帝之先聿宣為子之方贈言尼父載揚事君之禮從政周行神功用而無名至化流而不測人能宏道其在茲乎况乎道異崆洞人非姑射竊比河上之德不遵柱下之規虛談捕影之書自取順風之禮矜傲誕於家國絶忠孝於君親有靦之容曾無愧怍及至青牛西邁涉流沙而化胡彈曰魏略西域傳云臨猊國有神人名曰沙律年老髮白狀如老子常教人為浮圖有人災禍及無子者勸行浮圖齋戒令捨財贖人品言時臨猊王久無太子因祀浮圖其莫耶夢白象而有娠及太子生從右脅而出自然有髻墮地能行七步其形似佛以祀浮圖得兒故名太子為浮圖也前漢哀帝元狩中秦景使月氏國王令太子口授於景所以浮圖經教前漢早行後漢十三年明帝方感瑞夢也秦景傳經不云老子化胡作佛經是老説晉代雜録云道士王浮每與沙門帛遠抗論王屢屈焉遂改換西域傳為明威化胡經題彼沙律以為老子曲能安隱誑惑人間尹喜與聃化胡作佛佛起於此裴子野高僧傳云晉惠帝時沙門帛遠字法祖每與祭酒王浮一云道士基公次共諍邪正浮屢屈焉既瞋不自忍乃託西域傳為化胡經以誣佛法遂行於世人無知者殃有所歸致患纍載幽明録云蒲城李通死來云見沙門法祖為閻羅王講首楞嚴經又見道士王浮身被鎖械求祖懺悔但不肯赴孤負聖人死方思悔又案袁宏後漢紀皇甫謐高士傳等並無老子化胡作佛之文即曰朝廷君子博識者多豈得塞耳偷鈴指鹿為馬信可謂虛無之談徒聒人耳爰有白馬東來越蔥山而夢漢宏通貝葉比妙蓮華行以普敬為先教以不輕為本事如左崇掖議中彈服貌雖異同趣無為率土之賓未聞無父之子普天之下未見無君之臣貞觀年中巳定先後盡禮致敬斷焉可知彈曰貞觀中詔本以皇系所宗殊無使拜之文但有先後之語令乃例茲遣敬斯則比附敕文失旨之人品言孰重於此歷代茲多曾莫先覺彈曰自佛教入漢年逾六百其中晉代庾冰偽楚桓元赫連宋武蕭齊有隋等諸君皆抑僧拜咸以事非通允俱尋舊迹而云歷代滋多曾莫先覺者豈不面欺聖旨誣罔㣥英乎陛下乘乾御歷咸五登三振千古之隤綱維萬國之絶紐豈徒革狸首之詠資父事君方且變天竺之風自家刑國謹議道默龍朔中官長安縣尉竊惟在三之禮罔極於君親不二之門獨遺於資事豈不以真俗兩隔孔釋雙分臨之寵辱既不驚受之髮膚則巳毀元冕與緇裳詭飾振錫與鏘金殊義足使弱喪知歸行迷識反今若降其塵外之迹嬰其俗中之事一乘紊典三歸弛法尚其道而黷其儀挹其流而汨其本義非稽古宋不足徵求之愚衷有所未愜且道之為道元之又元衆妙所歸啓聖辭屬入關之業可大而不可小居河之訓可尊而不可卑降纏睿想方宏損益冒進芻詞伏增戰汗謹議安都龍朔中官左威衛長史竊以紫氣騰真元牝之風西被白虹沈化涅槃之蘊東流轡羽驤霞影玉京而凝衆妙津慈照寂啓金園而融至道義觀空有理洞希夷袪濟塵蒙熏滌因纍神道裨教茲焉有徵垣躅業巳遵從流弊議資懲革彈曰守法高尚稱為流弊違經拜俗為之懲革即事不可其如理何原夫在三之敬六位峻尊卑之象百行之本四始旌罔極之談本立然後道生敬形於焉禮穆實王化之始乃天地之經佛以法為師帝以天為則域中有四大王者居一焉王道既其齊衡天法固乃同貫身為法器法惟道本黃冠慕道緇裳奉佛致敬君父眇契元波彈曰佛法乃寰外之尊帝天為域中之大教存而令屈折不羈還類編人此乃法水壅而不流何元波之眇契耶且夫戒籙才高猶盡肅於膜拜况乎貴賤懸邈頓遺恭於屈膝彈曰王謐云沙門所以上下相敬而抗禮宸居者良以宗致既同則長幼成序津途有隔則義無降屈誠哉是言可為龜鏡矣必以山林獨往物我兼忘混親疏齊寵辱惠我不為是損巳詎稱非自當泯若無情湛然恆寂安假仰迦維而頓顙覿天尊而雅拜塵容不異俗致敬未乖真彈曰沙門落髟采披緇道俗懸隔拜違佛教具顯經文而言敬未乖真容不異俗此乃指南為北反白為元也且伯陽緒訓於和光不輕演教於當禮妙叶謙尊之德遠符鄰照之規彈曰伯陽誕自姬周身充柱史為官則王朝之一職言道乃儒宗之一流拜伏君親固其宜矣至若不輕之禮四衆乃據理以行之理則無簡於怨親通貴賤而俱禮敕乃約其尊極不制禮於卑微涇渭兩殊無宜一貫矣又三極之中師居其末末猶展敬本何疑哉彈曰釋衆所以師資相敬正以教義不殊故耳非是約本末而言何孟浪之甚也若以袈裟異乎龍黼縠巾殊於鷩辨服既戎矣拜何必華各循其本無爽彞式其有素履貞遁清規振俗神化肹蠁戒行精勤藻掞桐鸞梵清霄鶴錦旌徵獸瓊符御靈德秀年耆蠲其拜禮自餘初學後進聲塵寂寥並令盡敬君父請即編之恆憲彈曰若以不拜為非則德秀年耆詎宜蠲免若以不拜為是則後進初學無宜令拜進退矛盾去取自乖請即編之恆憲何所見之短乎如此則進德修業出塵之軌彌隆苦節棲壇入道之心逾勵元風斯遠國章維緝庶可以詳爾景則靜一訛弊彈曰以乖宗為景則謂守法為訛弊約斯見驗惟何可觀自我作古奚舊之拘夫鏡非常之理必藉非常之照天鑒元覽體睿甄微探象外之遺宗極寰中之幽致雖則暫駭常聽抑亦終冥大道謹議松壽龍朔中官長安縣令竊聞佛道二門虛寂一致縱不能練心方外擯影人間猶須迹與俗分事與時隔然今出家之輩多雜塵伍外以不屈自高內以私謁為務徒有入道之名竟無離俗之實彈曰不屈者奉法而然私謁者誠違教義只可峻其科簡懲彼不逞之流寧容縱火崑岡而欲俱焚玉石耶至若君親之地禮兼臣子孝敬所宗義深家國不有制度何以經綸望請僧尼道士女冠等道為時須事因法會者雖在君后聽依舊式捨此以往並令請拜若歸覲父母子道宜申如在觀寺任遵釋典彈曰夫僧尼合拜則無宜不拜不合豈簡時方何得剃髮同是一人約處便開異禮法服始終無二據事遂制殊經此乃首鼠兩端苟安時譽未曰志隆家國獻奉忠貞庶其以卑屈為恥稍屏浮競以道德自尊漸宏教法輒進愚管伏增慚戰謹議晦龍朔中官右威衛將軍原夫指樹摛祥警龍德於皇胄蹈花標瑞抗輪寶於宸儀創迹毗城包紫宙而開宇疏基厲壤貫青曦而闡耀故能抑揚庶類控引㣥靈十地間安趣紺殿而希果九天凝敻佩元珠而問津由是著美皇猷馳芬帝載緇服齊裾於上輦黃冠接武於中州宴坐經行道不參於廊廟登壇執簡迹未齒於朝宗今欲約以儒門牽於王制儀背纓冕法符簪笏便使貴其道而賤其人申其教而屈其禮禮隨教顯人由道尊固可以道廢人不應以禮虧教誠宜疇咨故實軌範舊章俾夫高尚之風昭明易象隨時之義允洽氓心但燭燎螢翻豈增華於日月塵霏露委希締美於山河冒進芻言輕陳輿頌詞疏理懵汗驚神悚謹議宏亮龍朔中官右奉宸將軍釋老二門教周四海源流自久宏益巳深敢申愚見仍舊為允謹議修業龍朔中官右衛長史李釋二教旨趣幽深理絶名言功超意表道以清淨為主佛以拯物為宗然含生者以為津梁有形者將為彼岸故河上屈文帝之貴鷲嶺感明皇之尊自茲以降其道彌廣止如柱下妙理迦衛神蹤仰其道者莫切於指歸挹其波者無詳於終始方審駕鶴遊五嶺分形遍三千直是託迹應身方便誘接但憑其化者俱希輕舉之功資其業者亦救濟於塵劫是故黃冠既變緇服才霑人主不屈而臣父母不子而育此乃尊於佛教非是虧於禮義拜揖者何損於身但恐虧於聖教必也形神雙遣拜揖兩忘均然同彼天真無煩貌屈既未窮於性相便是若存若亡理須成此勝因遂其高尚况今聖上欽明孝臨天下尤遵二教資助福田所以道士道人許其不拜且遣拜甚易不拜甚難足使襄野幼童不獨善於軒帝河上老叟無專美於漢皇千慮一得不拜為允謹議元策貞觀十二年為右衛率府長史使西域為中天竺所抄掠元策發吐蕃兵破之龍朔中官左驍衛長史自佛教之興始於天竺臣經三使頗有見聞臣聞輸頭檀王是佛之父摩訶摩耶是佛之母僧優波離者本王家僕隸王親遍禮敬同於佛臣又見彼國僧尼法不拜諸天神祠亦不拜君王父母君王父母皆禮僧尼及諸道衆臣經難彼僧曰此之僕隸始落髮披緇殊無所失即令君父致敬大不近人情僧對曰雖初剃髮形巳同佛復能震動魔宮雖曰無知豈不如泥木泥木一立為主像縱博通貴勝得不致敬僧不拜俗亦巳明矣一臣又親難彼僧曰維摩經比邱亦禮維摩詰足法華經僧行普敬此二經文拜俗明矣何因比邱得不拜尊者僧曰佛制律經乃是僧尼常軌其維摩經比邱荷法暫行曲禮法華經大士一時別行何得以權時別行亂茲恆典臣深然之臣聞妻死鼓盆環尸而歌此亦一時別行豈得預於喪服之制一臣於天竺經禮天像彼王乃笑而問曰使等並是優婆塞何因禮天臣問所由答曰此優婆塞法不禮天昔迦二色迦王受佛五戒亦禮天像像皆倒地後至日天祠事天者恐王至禮天像倒遂將佛像密置天頂王三禮不倒王怪令檢於天冠內得一佛像王甚大喜歎佛神德嘉其智慧大賞封邑至今見在又云有外道受佛五戒但供養天祠而不頂禮王責不禮之罪白王曰小子豈敢辭禮禮恐損天王曰天損不關你事彼即禮拜天像遂碎五戒優婆塞尚不得禮天况具戒僧尼而令拜俗臣元策言臣聞百王布軌但禮制於寰中大覺垂教乃津梁於域外莫不資真人以易俗賴高僧以移風遂得謐四海之波濤脫三界之塵俗故漢帝不屈於河上輪王遍禮於沙彌此則道俗殊途豈得內外同貫教許黃冠之輩遊一道於寰中緇衣之徒駕五乘於方外因循既久助化益深草偃風行其來尚矣臣聞聖人無常師以主善者為師聖人無常心以百姓心為心兆庶曩昔敬信歸依今議令拜君父實乖主善百姓之心况袈裟異華俗之服矒削非章甫之儀崇之則福生卑之則罪積共知拜君無益於國拜父不利於親臣如寢默不言豈得為忠為孝臣望隨舊軌請不改張同太宗文皇帝故事依前不拜謹議慶龍朔中官右武衛長史封孝昌縣公竊以三綱之重義極君親百姓之先實資敬愛而黃冠緇服咸均亭育之恩謁帝奉親頓虧臣子之敬本乎教義頗紊彞倫解而更張抑為通允然則道樞邃賾出乎名言之外慧輪廣運超乎心行之表經行之侶庇白馬而栖禪繕性之流佇青牛而警契雖迹羈有待而利涉無涯誠宜重其道而崇其教尊其人而異其禮是以河上真人親紆漢后之蹕廬山惠遠竟絶晉臣之議况復出家殊致顯昧異途羽帶田衣既匪朝宗之服乘杯負局寧同就養之方致敬之儀未為盡善若以道雖可尚而處非其人則宜峻彼隄防甄其律行不可以人屈道誠可以道勵人伏以皇家發慶肇自猶龍之德宸居體寂每崇靈鷲之風不革前規彌光尊祖之義儻違舊制便曠師臣之禮天渙下覃俯令詳議竊懷管見輒肆芻詞用檢之宜非敢取衷謹議思齊龍朔中官外府寺卿竊以臣子跪拜固是常規爰在禮經兼有權制母拜其子以禮成人不臣其臣以尊其德况方外之教為善不同道有淩虛佛無生滅修心練行因果是憑名曰出家明超俗表咸言勝業歷代俱尊盛立道場皆求常樂獻君親以廣福濟含識於冥塗久大而論高於俗教若同儒例還入俗流不尚學徒無由顯道賴有崇護道獲常存不拜之儀以彰深護尊道之本取益為宗今據經文云拜非益利人益國實所宜言非益之文何容敢進循法仍舊無闕彞章體妙窮深非下能及幸霑芻議敢竭愚誠懼不合宜追深戰灼謹議藥尚龍朔中官中御府少監護軍法本沖寂非有名言至道希夷故無聲教三千大界之境小智未能揆其原恍兮惚兮之中巨賢無以究其理但釋老二氏挺大聖之姿慧光塵外超然物表短三衣之拂石促四海之傾毛談寂滅之宗説有無之教門開方便演十二之因緣道誘多途述五千之廣説敬順則逍遙六度忽怠則苦海長流故去髭髮而就桑門釋素衣而紉緇服冀登彼岸出此愛津父母貴其容王侯重其戒此即君親道隔去俗絶塵三百之禮不拘五侯之位無羡未可敦茲俗訓勵以風儀拜首私庭稽顙公室請循舊貫於愚為允謹議思龍朔中官馭僕寺大夫竊以厲鄉垂範實東國之至人祇園演法乃西方之上聖皆能割慈忍愛絶塵離俗禮者忠信之薄超道德而上馳色為真相之空遺形骸而幽賾故前王待之方外後帝許以不臣習見生常其來自久頓為改創恐乖聽矚且復緇衣非揖拜之徒黃冠異折旋之侶縱使人非精感不能式景元風本立道生庶以漸持真教若浮沈類俗俯仰隨時恐鷲嶺之業將虧茨山之風行替變道從儒未見其可因循勿改竊用為宜謹議公義龍朔中官沛王府長史臣聞三教同歸漸頓雖別俱為助化咸稱歡喜宣尼作訓不拘方外之流大師垂範全捨寰中之纍虛室生白一粒餘資並駕康衢唯道是務自元風載偃法雲收族黃冠緇服心迹不俱皇上愍其忘反式令僉議但絶允矒頂形之重也擎跪拜伏禮之末也今若捨其重而檢其末申其道而屈其人恐習俗生常頓改非易伏望嚴告有司詳加誘進如更因心靡厝方可置之形禮輕陳芻管伏深戰懼謹議孝仁龍朔中官司稼寺卿佛道之興其來尚矣自白光東照紫氣西浮莫不遵彼五千崇茲二教無為寂滅同樹勝因而僧尼道士女冠趨承訓典其為教也裨濟實多歷覽前修非無去取所以同遵不拜良或可觀至如道之為宗皇基由漸尊嚴之切有異恆倫豈可改作別儀俯隨常俗因循不拜理謂為允謹議大士龍朔中官詳刑寺少卿竊以白馬東歸寺剎爰建青牛西上觀座方興莫不照燭昏迷導引騰化然敬君之範簡略闕言不拜之儀因循往有非直情乖物義抑亦意爽聖經事如中臺司引議中彈且法服制儀表絶凡流之恆敬蓮花寶座豈説不拜於君親彈曰銅自石生珠因水育取者方委傳者故迷况佛教幽微理難窺涉不知而作其斯謂乎君有天地之尊敬君遠符經教親著生育之惠拜親遐會法源撫事有益於經捫理未虧於法牽率愚管設敬為宜謹議
