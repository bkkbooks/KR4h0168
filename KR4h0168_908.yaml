front:
  text: 全唐文欽定全唐文卷九百八元楷永徽中沙門慧可弟子
  hash: sha256:121268a46a281875f30518a3bb61d49fda0e950688074acbb195bd6959f96e06
  markers:
  - {type: head, offset: 12, content: 元楷, id: KR4h0168_NFKB_908-h1, level: 1}
body:
  text: 若夫陀羅尼印壇法門者斯乃衆經之心髓引萬行之導首宗深祕密非淺識之所議義趣沖元匪思慮之能測密中更密無得稱焉有高德沙門厥號阿地瞿多此云無極高也是中天竺人也法師聰慧超㣥德邁過人弱冠慕道歷五竺而尋友低心躍步而咨法要故能精練五明妙通諸部意欲運西域之法水潤東夏之渴仰拌身許於險難務存宏道之心拔山巖而不疲涉流沙而無倦頂戴尊經向斯漢地永徽二年正月屆於長安奉敕住慈門寺但法師含珠未吐人莫別於懷珍雅辨既宣方知有寶故能決衆疑言皆當理然則經律論業傳者非一惟此法門未興斯土所以叮嚀三請方許談法三月上旬赴慧日寺浮圖院內法師自作暜集會壇大乘琮等一十六人爰及英公鄂公等一十二人助成壇供同願皇基永固常臨萬國庶類同沾皆成大益其中靈繁不述別在傳注余慶逢此法不勝欣躍躬詣翻經所希翻廣本屢值事閙不及陳請恐幻質遷謝失於大利便請法師於慧日寺宣譯梵本且翻要抄一十四卷豎興國之宏基存隆民之祕寶歟從四年三月十四日起首至永徽五年嵗次甲寅四月十五日畢以後頻頻敕追法師入內邂逅之間無暇復校此經出金剛大道場經大明呪藏分之少分也今此略抄擬勘詳定奏請流通天下暜聞焉明濬俗姓孫氏齊人出家住京師宏福寺永徽二年卒頃於望表預矚歸敬之詞覽其雄文煥乎何偉麗也詳其雅致誠哉豈不然歟悲夫愛海滔天邪山概日封人我者顛墜其何已恃慢結者沈淪而不窮故六十二見爭蘙薈而自處九十五道競扶伏以忘歸如來以本願大悲亡緣俯應內圓四智外顯六通運十力以伏天魔飛七辨而摧外道竭茲愛海濟稟識於三空殄彼邪山驅肖形於八正指因示果返本還源大矣哉悲智妙用無得而言焉昔道樹登庸被聲教於百億雙林寢迹振遺烈於三千自佛日西傾餘光東照周感夜明之瑞漢通宵夢之徵騰蘭爇慧炬於前澄什嗣傳燈於後其於譯經宏法神異濟時高論摧邪安禪肅物緝頺綱者接武繼絶紐者肩隨莫不夷夏欽風幽明翼化聯華靡替可略而詳惟今三藏法師蘊靈秀出含章而體一味瓶瀉以贍五乘悲去聖之逾遠憫來教之多闕緬思圓義許道以身心口自謀形影相弔振衣擎錫討本尋源出玉關而遠遊指金河而一息稽疑梵宇探幽洞微旋化神州揚真殄謬遺詮闕典大備茲辰方等圓宗彌廣前烈所明勝義妙絶寰中之中真性真空極踰方外之外以有取也有取喪其真就無求之無求蠧其實拂二邊之迹忘中道之相則纍遣未易洎其深重空何以臻其極要矣妙矣至哉大哉契之於心然後以之為法在心為法形言為教法有自相共相教乃遮詮表詮粹旨沖宗豈造次所能覼縷法師凝神役志詳本正末緝熙元籍大啓幽關祕希聲應扣擊之大小廓義海納朝宗之巨細於是殊方碩德異域高僧服膺問途蓄疑請益固已飲河滿腹莫測其淺深聆音駭聽孰知其遠邇至於因明小道現比蓋微斯乃指初學之方隅舉立論之標幟至若靈樞祕鍵妙本成功備諸奧冊非此所云也呂奉御以風神爽拔早擅多能器宇該通夙彰博物弋獵開墳之典鈎深壞壁之書觸類而長窮諸數術振風飇於辨囿摛光華於翰林驤首雲中先鳴日下五行資其筆削六位佇其高談一覽太元應問便釋再尋言象立試即成實晉代茂先漢朝曼倩方今蔑如也既而翺翔㣥略綽有餘功而能敬慕大乘夙敦誠信比因友生戲爾忽復屬想因明不以師資率已穿鑿比決諸疏指斥求非喧議於朝形於造次考其志也固已難加核其知也誠為可惑此論以一卷成部五紙成卷研幾三疏向已一周舉非四十自無一是自既無是而能言是疏本無非而能言非言非不非言是不是言是不是是是而恆非言非不非非非而恆是非非恆是不為非所非是是恆非不為是所是以茲貶失致或病諸且據生因了因執一體而亡二義能了所了封一名而惑二體又以宗依宗體留依去體以為宗喻體喻依去體留依而為喻緣斯兩系妄起多疑迷極一成謬生七難但以鑽窮二論師己一心滯文句於上下誤音字之平去復以數論為聲論舉生成為滅成豈惟差離合之宗因蓋亦違倒順之前後又採鄙俚訛韻以擬梵本囀音雖復廣援七種而只當彼一囀然非彼七所目乃是第八呼聲舛雜乖訛何從而至又案勝論立常極微數乃無窮體唯極小後漸和合生諸子微數則倍減於常微體又倍增於父母迄乎終已體遍大千究其所窮數唯是一呂公所引易繫詞云太極生兩儀兩儀生四象四象生八卦八卦生萬物云此與彼言異義同今案太極無形肇生有象元資一氣終成萬物豈得以多生一而例一生多引類欲顯博聞義乖復何所託設引大例生義似同若釋同於邪見深纍如何自免豈得苟要時譽混正同邪非身之讎奚至於此凡所紕紊胡可勝言特由率已致斯狼狽根既不正枝葉自傾逐誤生疑隨疑設難曲形直影其可得乎試舉二三冀詳大意深疵繁緒委答如別夫呂公達鑑豈孟浪而至此哉示顯真俗雲泥難易楚越因彰佛教宏遠正法凝深譬洪爐非掬雪所投渤澥豈膠舟能越也太史令李君居忠履孝靈府沈祕襟期邈遠專精九數綜涉六爻博考墳圖瞻觀雲物鄙衛宏之失度陋裨竈之未工神無滯用望實斯在既屬呂公餘論復致問言以實際為大覺元軀無為是調御法體此乃信熏修容有分證稟自然約不可成良恐言似而意違詞近而旨遠天師妙道幸以再思且寇氏天師崔君特薦共貽伊咎夫復何言雖不混於淄澠蓋以自覽於金鍮耳唯公逸宇寥廓學殫墳索庇身以仁義應物以樞機肅肅焉汪汪焉擢徑節以干雲湛清瀾而鎮地騰芳文苑職處儒林捃托九疇之宗研詳二載之說至於經禮三百曲禮三千莫不義符指掌事如俯拾樽俎咸推其准的法度皆待其雌黃遂令相鼠之詩絶聞於野魚麗之詠盈耳於朝惟名與實盡善盡美而誠敬之重稟自夙成宏護之心實唯素蓄屬斯喧義同恥疚懷故能投刺含膠允光大義非夫才兼內外照實鄰幾豈能激揚清濁濟俗匡真者耶昔什公門下服道者三千今此會中同德者如市貧道猥以庸陋叨厠末筵雖慶朝聞終慚夕惕詳以造疏三德竝是貫達五乘牆仞罕窺詞峯難仰既屬商羊鼓舞而霈澤必霑疾雷迅發恐無暇掩耳僉議古人云一枝可以戢羽何繁乎鄧林潢汙足以沈鱗豈俟於滄海故不以愚懦垂逼課虛辭弗獲免粗陳梗概雖文不足取而義或可觀顧已庸疏彌增悚恧指述還答餘無所申釋明濬白神昉永徽中法海寺沙門昔者旭照高山天宮御一乘之駕流暉原隰鹿苑轉四諦之輪雖復發軫分逵而塗無亂轍一雲暜洽而卉木各茂自鶴林變色慧日寢光達學電謝以息肩真人長往而寂滅且前賢述聖難令各解後進孤陋更異親承况乎正法既往久當像末定慧與福德異時醇化與澆風殊運然則一乘三乘之駕安可以同其轍哉若識時來在數藥性勿違然後可以清沈痼之宿疾體權實之同歸矣十輪經者則此土末法之教也何以明之佛以末法惡時去聖浸遠敗根比之壞器空見借喻生盲沈醉五欲類石田之不苗放肆十惡似臭身之垢穢故此經能濯臭身開盲目陶壞器沃石田是以菩薩示聲聞之形象王敬出家之服以此憧相化彼無慚顯二事之護持成三乘之道果故經曰為令此土三寶種性威德熾盛久住世故又曰摧滅一切諸衆生類猶如金剛堅固煩惱然則三寶久住顯教傳於末法金剛煩惱驗障異乎一乘尋舊經之來年代蓋久但譜第遺目傳人失記翻譯之主既往來茲之日罕聞同我者失魄於真彩異我者大笑於淡味謬以千里能勿悲乎夫極曜文天或蔽虧於薄霧至言範物時淪滯於邪辨針石一違有死生之巨痛纖毫錯學有升墜之異塗其可易乎屬有三藏元奘法師者始則學駕東朝末乃訪道西域輕一生之性命涉數萬之艱難果能竭溟渤以索亡珠蹈龍宮而窮祕藏吞法流於智海瓶瀉無遺受道氣於檀林香風更馥至於因明三量聲論八音莫不究立破之原窮字轉之本如來所說菩薩所傳已來未來一朝備集昉以薄業不偶闕一字真應幸達聖制亂於未兆後賢傳燈於既夕遂使定死餘命冀返魂於法藥昏野迷方期還轅於覺道於是染翰操紙杜絶外慮務詳至教釋彼紛執疇咨法主重啓梵文粵以永徽二年嵗次辛亥正月乙未盡其年十二月甲寅翻譯始畢凡八品十卷以今所翻比諸舊本舊本已有今更詳明舊本所無斯文具載於是處座抗談者響法雷而吐辨靜慮通微者鏡元波而照心頂火暴腹之徒戢螢暉於慧日喜足謙懷之侶談高節於清風矣前佛既往後佛未興庶此教常懸永濟來者宏道之士如何勿思法融俗姓韋氏潤州延陵人年十九入茅山依炅法師出家貞觀十七年住金陵牛頭山幽棲寺是為牛頭初祖顯慶二年卒年六十四心性不生何須知見本無一法誰論薰鍊往返無端追尋不見一切莫作明寂自現前際如空知處迷宗分明照鏡隨照冥蒙一心有滯諸法不通去來自邇胡假推窮生無生相生照一同欲得心淨無心用功縱橫無照最為微妙知法無知無知知要將心守靜猶未離病生死忘懷即是本性至理無詮非解非纏靈通應物常在目前目前無物無物宛然不勞智鑒體自虛元念起念滅前後無別後念不生前念自滅三世無物無心無佛衆生無心依無心出分別凡聖煩惱轉盛計較乖常求真背正雙泯對治湛然明淨不須功巧守嬰兒行惺惺了知見網轉迷寂寂無見暗室不移惺惺無妄寂寂明亮萬物常真森羅一相去來坐立一切莫執決定無方誰為出入無合無散不遲不疾明寂自然不可言及心無異心不斷貪淫性空自離任運浮沈非清非濁非淺非深本來非古見在非今見在無往見在本心本來不存本來即今菩提本有不須用守煩惱本無不須用除靈知自照萬法歸如無歸無受絶觀忘守四德不生三身本有六根對境分別非識一心無妄萬緣調直心性本齊同居不攜無生順物隨處幽棲覺由不覺即覺無覺得失兩邊誰論好惡一切有為本無造作知心不心無病無藥迷時捨事悟罷非異本無可取今何用棄謂有魔興言空象備莫滅凡情惟教息意意無心滅心無行絶不用證空自然明徹滅盡生死冥心入理開目見相心隨境起心處無境境處無心將心滅境彼此由侵心寂境如不遣不拘境隨心滅心隨境無兩處不生寂靜虛明菩提影現心水常清德性如愚不立親疏寵辱不變不擇所居諸緣頓息一切不憶永日如夜永夜如日外似頑囂內心虛真對境不動有力大人無人無見無見常現通達一切未嘗不遍思惟轉昏汨亂精魂將心止動轉止轉奔萬法無所惟有一門不入不出非靜非喧聲聞緣覺智不能論實無一物妙智獨存本際虛沖非心所窮正覺無覺真空不空三世諸佛皆乘此宗此宗毫末沙界含容一切莫顧安心無處無處安心處明自露寂靜不生放曠縱橫所作無滯去住皆平慧日寂寂定光明明照無相苑朗涅槃城諸緣忘畢詮神定質不起法坐安眠虛室樂道恬然優游真實無為無得依無自出四等六度同一乘路心若不生法無差互知生無生現前常住智者方知非言詮悟威秀龍朔中大莊嚴寺沙門伏奉明詔令僧拜跪君父義當依行理無抗旨但以儒釋明教咸陳正諫之文列化恢張俱進芻蕘之道僧等荷國重恩開以方外之禮安居率土得宏出俗之心所以自古帝王齊遵其度敬其變俗之儀全其抗禮之迹遂使經教斯廣代代漸多宗匠悠遠時時間發自漢及隋行人重阻靈鷲之風猶鬱仙苑之化尚疏未若皇運肇興提封海外天竺與五嶽同鎮神州將大夏齊文皇華之命載隆輶軒之塗接軫莫不欽斯聖迹興樹遺蹤故得梵侶來儀相從不絶今若反拜君父乖異㣥經便證警俗之譽或陳輕毀之望昔晉成幼沖庾冰矯詔桓楚飾詐王謐抗言及宋武晚年將隆虐政制僧拜主尋還停息良由事非經國之典理越天常之儀雖曰流言終纏顯議况乃夏勃敕拜納上天之怒魏燾行誅肆下厲之責斯途久列備舉見聞僧等奉佩慞惶投庇失厝恐絲綸一發萬國通行必使寰海望風方宏失禮之譽悠哉後代或接效尢之傳伏惟陛下中興三寶慈攝四生親承咐囑之旨用勵學徒之寄僧等內遵正教固絶跪拜之容外奉明詔令從儒禮之敬俯仰惟咎慚懼實深如不陳請有乖臣子之喻或掩佛化便陷罔君之罪謹列衆經不拜俗文輕用上簡伏願天慈賜垂照鑒則朝議斯穆終遵途於晉臣委略常談畢歸度於齊后塵黷威嚴惟深戰戢謹言龍朔二年四月二十一日上謹録佛經出家沙門不合跪拜父母有損無益文如左一梵網云出家人不向國王父母禮拜一順正理論云國君不求比邱禮拜元教東漸六百餘年上代皇王無不依經敬仰洎乎聖帝遵奉誠教彌隆故得列剎相望精廬峙接人知慕善家曉思愆僧等忝在生靈詎忘忠孝明詔頒下率土咸遵恐直筆史臣書乖佛教萬代之後蕪穢皇風竊聞真俗異區桑門割有生之戀幽顯殊服田衣無拜首之容理固越情道仍乖物况挺形戒律鎔念津梁酬恩不以形骸致養期於福善而令儀不改釋拜必同儒在僧有越戒之愆居親有損福之纍臣子之慮敢不盡言伏惟陛下匡振遠猷提獎幽概既已崇之於國亦乞正之於家足使捨俗無習俗之儀出家絶家人之敬護法斯在禔福莫先自然教有可甄人知自勉不勝誠懇之至謹奉表以聞塵黷扆旒伏增戰越謹言八月二十一日元則龍朔中洛州天宮寺沙門一切諸佛皆有三身一者法身謂圓心所證二者報身謂萬善所感三者化身謂隨緣所現今釋迦牟尼佛者法身久證報身久成今之出現蓋化身耳謂於過去釋迦佛所發菩提心願同其號故今成佛亦號釋迦三無數劫修菩薩行一一劫中事無量佛中間續遇定光如來以髮布泥金華奉上尋蒙授記得無生忍然一切佛將成佛時必經百劫修相好業其釋迦發心在彌勒後當以逢遇弗涉如來七日翹仰新新偈讚遂超九劫在前成道將欲成時生兜率天號暜明菩薩盡彼天壽下閻浮提現乘白象入母右脅其母摩耶夢懷白象梵仙占曰若夢日明當生國王若夢白象必生聖子母從此後調靜安泰慈辨日異菩薩初生大地震動身紫金色三十二相八十種好圓光一尋生已四方各行七步為降魔梵發誠實語天上天下唯我獨尊抱入天祠天像悉起阿私陀仙合掌歎曰相好明了必為法王自恨當死不得見佛斯則淨飯國王之太子也字悉達多祖號師子頰父名淨飯母曰摩耶代代為輪王姓瞿曇氏復因能事別姓釋迦朗悟自然藝術天備雖居五欲不受欲塵遊國四門見老病死及一沙門還入宮中深生厭離忽於夜半天神扶警遂騰寶馬踰城出家苦行六年知其非道便依正觀以取菩提時有牧牛女人煮乳作糜其沸高踊牧女驚異以奉菩薩菩薩食之氣力充實入河洗浴將登岸時樹自低枝引菩薩上菩薩從此受吉祥草坐菩提樹惡魔見已生瞋惱心云此人者欲空我界即率官屬十八億萬持諸苦來怖菩薩促令急起受五欲樂又遣妙意天女三人來惑菩薩爾時入勝意慈定生憐愍心魔軍自然墮落退散三妙天女化為癭鬼降魔軍已於二月八日明相出時而成正覺既成佛己觀衆生根知其樂小未堪大法即趣波羅奈國度憍陳如等五人轉四諦法輪此則三寶出現之始也其後說法度人之數大集菩薩之會甚深無相之談神通示現之力經文具之矣又於一時升切利天九旬安居為母說法時優闐國王及波斯匿王思慕佛德刻檀畫叒冝毛以寫佛形於後佛從忉利天下其所造像皆起避席佛摩其頂曰汝於未來善為佛事佛像之興始於此矣化緣將畢時徒厭怠佛便告衆却後三月吾當涅槃復記後事如經具說然如來實身常在不滅故法華云常在靈鷲山及餘諸住處今生滅者是佛化身為欲汲引現同其類所以受生復欲令知有為必遷所以示滅又衆生根熟所以現衆生衆生感盡所以現滅佛涅槃後人天供養起諸寶塔又大迦葉召千羅漢結集法藏阿難從鍊鬚入誦出佛經一無遺漏如瓶瀉水置之異器一百年有鐵輪王字阿輸柯亦名阿育役御鬼神於一日中天上人間造八萬四千舍利寶塔其佛遺物衣鉢杖等及諸舍利神變非一逮漢明感夢金軀日佩丈六之容一如釋迦本狀又吳主孫權燒椎舍利無所變壞爰及浮江石像泛海瑞容般若冥力觀音密念別記具之事不多録竊聞象分庖卦克讚神明之德訓啓箕疇載穆彞倫之敘自茲已降述者尢多莫不叶璿政而增輝仞金閨而聳價矧乎真乘上智津萬有以興言祕藏圓音警百靈而暢旨燭迷均於麗景清神比於甘露自非六瓔踐位四輪飛德豈能探賾至真研機妙本是知茂於道者其教孔修昌於業者其文伊煥伏惟皇帝陛下狥齊纂極聖敬凝旒十善揚仁化柔蟠竁之表四等調俗風高胥燧之前猶且峻元範而摛詞藻常源而衍鑒霈垂汗綍留思給園遂以匠物之餘親迂睿旨正名之末特繕嘉題僧等荷鎔施之恩緘紹隆之澤爰初肅召載惕中襟伏以聖旨難晞元津罕涉空思測管嗟混沌之未開實賴叫閽時象罔其如得蘭臺太史兼左侍極應山縣開國侯某獎鑒弗疲閲覽無滯乃相與搴恕林之英萼繳耆山之迅羽搜八藏之殊珍控三點之靈液用成一部勒為十卷較其精詣事絶稱言然以教海既中法門猶廣雖要妙之旨已具前修而博贍之文終資別録竊以登荊山者思有獻於連城遊楚濱者願納貢於包匭况龍宮逸寶照爛於情田鹿苑遺芳芬葩於字葉苟懷貞藹孰忘薦奉加以成貸有循明規在屬方肆披簡則琳琅畢炫擬之區別則蘭菊自分有導斯來譬東瀛之畎澮各歸所應類南籥之宮徵以義相屬凡建十章章分上下成二十卷經尋一千五百餘軸義列三百六十餘條所建十章輒成四例初二立真俗之境次雙明染淨之由中四坦修證之塗後兩垂汲引之範相次為敘各隸多目俾大義粲然至言罔墜曖千門之列敞侈百隧之兼儲同夫曉宿編珠誠不倫而磊落春叢綴錦諒非工而彬布實由元覽深契故使奧旨冥歸伊其不紊抑有憑矣然則一毛可以知鳳彩故所録未多雙飛不足罄鳧洲故餘美難極既限金口之誨良無玉屑之譏其間剞削毫芒斟酌去取恐貽謬於千里每加審於三復粵以龍朔三年五月十七日首奉綸言迄今麟德元年五月四日前後二部汗青畢具前則簡而能暢後則博而無雜庶可以振釋網之宏綱總法門之要鍵開息心之勝躅備多聞之靈囿伏願醍醐上味永沃神衷般若明珠長輝睿握斯文不墜真宗與日月俱懸茲福無量寶祚將穹壤齊固云爾元範龍朔中普光寺沙門著有別集二十卷沙門元範敢致狀於中臺王公侯伯㣥僚等但元範雖不班預議例而竊有所聞前古大德廬山法師遭時數運遂造沙門不敬王者論五篇理致幽微問答元妙將欲簡白乍尋難曉今略述內外典記明證不敬之理謹以狀上請懲應拜之議也夫天雖至元必著日月之明地雖至寂必固山川之化聖者雖聲通冥運亦必假賢俊蕃輔子於百姓者也君既使臣以禮臣須事君以忠若不廷爭於未然則恐機發於已矣但佛法是區域之外逾四大之尊超寰㝢之表越在三之義唱無緣之慈宏不言之化冥功潛運故曰沐而悠漸但中庸之人以為無益者良不悟其所舍也故先朝聖教序云陰陽之妙難窮者以其無形也佛道崇虛乘幽控寂宏濟萬品典御十方者乎今既慧日潛暉像教冥運秉法和敬非僧而誰故佛告信相菩薩曰我說三寶唯是一體無有別相斯像法傳持當於是矣若阿恕伽之禮小僧諭邪臣以貿衆首豈非體道之可尚乎今欲令僧尼鞠躬於禮儀劬勞於拜揖是致佛以拜人非人者以奉法如辨舄翻加於首足實回換惑亂之甚矣且王有常不臣者三暫不臣者五不名者四不臣者一尚書曰虞賓在位舜不臣朱詩曰有客有客亦白其馬此承二王之後帝者尚所不臣况僧當大聖之允奚足致敬君主國之賓序胡豫失儀而以不輕禮於四衆用配敬於一人此蓋菩薩比邱情亡物我况今尊卑位別殊非媲偶又舉淨名而取稽首引知法而招恭敬昔函丈於新學不觀機而授藥以中忘此意宗半字焉既宴寂於正念發宿生而示悟還得本心崇滿字矣於是以亡相稽首無想接足乃混緇素於一時泯性相於萬古斯並大士權誠未可小機暜准故涅槃經云我為菩薩說如此偈今以聲聞持戒臘之至執威儀之切非以重傲慢悖君親良欲崇國家利臣人者也又順正理論云諸天神衆不敢希求受五戒者禮如國君主亦不求比邱禮拜以懼損功德及壽命故今欲行之以周孔之教抑之以從俗之禮竊為仁者不取也又僧尼族非蕃類性簡戎蠻稟中國而法四夷承剔割而紹三寶據其教則有拜君親為損修其法以資家國有益恐匿聖言禍鍾自犯四分律云使恭敬耆年不應禮拜白衣者正以弗縻於爵祿異俗網於典誨矣王制曰宗廟有不順者黜以爵山川有神祇而不舉者削以地况僧尼索鬼神之敬反父母之禮若使正教淪胥於是汙鄙恐神明所不交泰福慶所不流潤災害幾生禍亂幾作而含靈廢成俗之化胄子闕啓蒙之訓率土臣人順風載靡不可自新於師戒有助國於教化者也梵網經云不拜君親鬼神明矣且濡霑不拜為容節之失矧乃割截非束帶之儀矒削無稽首之飾於庠序之風範朝宰之變怪也佛是絶域異俗之化靡中和順動之氣存亡之際實寄於人矣大傳曰正朔所不加即君子所不臣未若福其所訓利其所稟便其勞動而用之乘其利安而事之故得百姓之歡心即一人有慶者也又介胄不拜慮折其威師帝不臣恐損其道况衣忍鎧摜祖甲伏龍怖以袈裟懾魔威於抖擻逃隸出家王親降禮波離入道父王致拜故知道在則貴不以人為輕重是以道破宏人人蓋宏道者信矣今遺法所以付於王者委護持仗流通也以四衆之微弱恐三寶之廢壞藉王者以威伏假王者以勢逼今使攝衣屈膝握拳稽顙則連河之化於茲闕矣詩云王赫斯怒爰整其旅僧等戰戰兢兢誠惶誠恐懼虧遺教之本意辱同功之法服一拜之勞不必加衆僧之損一拜之敬不必加萬乘之尊頃僧等孜孜而不安其業者非所以苟為庸庸之軀深存靡靡之化矣恐煥然之美無潤色於盛代異國之求豈聞於當今者歟必以經像為蕪穢不足以崇仰僧尼為臭腐不足為福田覩教籍者目焦修揖拜者變傴襲緇服則轉筋談典禮而齒齲於是嫌而棄之變天竺之風暢中華之禮以萬物為更始策三大而自新則取善之基徒使修立不若隔教網於區外改容儀於物表臣而子之足盡忠孝之節也即如史傳不必為長夜經子未必為太陽司成雖學而無倦猶將闕焉於大訓况助國之美無聞亂矣不繁禁而獲安不革情而得志雖文王至聖也猶學於虢叔孔子至明也尚師於郯子王者至尊也猶父事三老兄事五更及其釋奠躬執爵而跪之曰穆穆焉恂恂焉雖至孝之事嚴親罔以加也是以大易蠱爻不事王侯大禮儒行不臣天子故知道以貴之為貴不以輕貶為輕伏想僚寀談誚正士為之蠧害將生螟蟘而議為拜者非朝廷之上策也原夫正法西基迄於茲日已過千載有太平焉自大教東流方七百嵗雖歷變市朝隆之莫替其中聖主賢臣計餘可數未嘗拘檢意况銑削僧尼信知濶達之資為日久矣間者有執權少主謀篡微君私佞自媚陷墜家國又一二蕃小雄雌互舉雖暫誅除尋革前弊夫若此者可以攘袂鼓肘怒目切齒大視而叱之豈不忠烈之壯觀也今我大唐應九五之期四三皇之位八紘共軌四海同文百辟守法度於有司三寶暢微言於汲引則道俗資勳家國延祚可不盛歟可不盛歟敕以宋朝暫革此風少選還遵舊貫良為爽其恆情議在不失常理幸儼而思之宏而護之家國之政若隆忠孝之誠必著冥功潛潤根條槃蔚好爵自縻祿秩優寵華萼繼允蘭菊緒榮感福慶之內資思宏益而外護豈不居生勿墜常保勝期者歟今謹疏內外典禮請循照察沙門釋範敬白龍朔二年五月五日上崇拔龍朔中襄州禪居寺沙門沙門崇拔言拔聞道俗憲章形心異革形則不拜君父用顯出處之儀心則敬通三大以遵資養之重近奉恩敕令僧不拜君王而令拜其父母斯則隆於敬愛之禮闕於經典之教僧寶存而見輕歸戒沒而長隱豈有君開高尚之迹不悖佛言臣取下拜之儀面違聖旨可謂放子為求其福受拜仍獲其辜一化致疑二理矛惑伏願請從君敬之禮以通臣下之儀輕黷扆旒彌增隕越謹言七月二十五日上宣業龍朔時司成寺沙門臣聞至道沖虛般若元寂在人則人尊在處則處貴故河上仙老降劉后之高雞岫名僧屈輪王之重是知斯風久扇千載同尊謹案梵網等出家人法不向國王父母禮拜至如傳儒業者尚與君王分庭抗禮孫為祖尸嫡允冠阼父母猶拜其子為傳重也當今聖主法唐虞之揖讓任巢許之不臣超漢帝之寬仁從四皓於方外豈况受付宏宣闡揚元教既許出家理宜隔俗况遣朝拜誠所驚疑用人廢法愚謂未可且禮云介者不拜為其失容節也去俗之人身被忍鎧今同俗跪翻貶朝儀上庠謬參賢館沐恩既重敢罄諛聞謹議
