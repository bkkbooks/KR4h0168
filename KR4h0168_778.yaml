front:
  text: 全唐文欽定全唐文卷七百七十八李商隱八
  hash: sha256:da9f0da29311254418a64fb728f3b8f95447dce67a9146e5fa06b4024f015097
body:
  text: 某啟人禀五行之秀備七情之動必有詠歎以通性靈故陰慘陽舒其塗不一安樂哀思厥源數千遠則鄘邶曹齊以揚領袖近則蘇李顏謝用極菁華嘈囋而鐘鼓在懸煥爛而錦繡入翫剌時見志各有取焉某爰自弱齡側聞古義留連薄宦感念離㣥東至泰山空吟梁父南遊郢澤徒和陽春游於自得之場實竊德音之選伏惟相公既康大政復振斯文論風雨則秋枿芬華語霜霰則春條零落發軔於風力解鞍於伊咎宮商資正始之音寒暑協中和之序是故贄其纓拾俟彼斧斤神氣雖怯於大巫名字願聞於下客舊詩一百首謹封如別延之設問希鮑昭之一言何遜著名繫沈約之三讀干冒嚴重延望恩輝進退之間若據泉谷伏惟俯賜容納謹啟某啟昔師曠薦音元鶴下舞后夔作樂丹鳳來儀是則師曠之絲桐以元鶴知妙后夔之金石以丹鳳彰能然而師曠之前撫徽軫者不少后夔之後諧律呂者至多曾不聞元鶴每來丹鳳常至豈鳴臯藻質或有所私巢閣靈心不能無黨以今慮古愚竊疑焉伏惟相公正始敦風中和執德衛玠談道當海內之風流張華聚書見天下之竒祕自頃出持戎律入踐台司暗合孫吳乃山濤餘力自比管樂亦孔明戲言斯皆盡紀朝經全操樂職雖魯庭更僕魏館易衣欲盡揄揚終成漏畧而復調元氣之暇居外相之餘偃仰縑緗留連章句亦師曠之元鶴后夔之丹鳳不疑矣若某者幼常刻苦長實流離鄉舉三年纔霑下第宦遊十載未過上農顧筐篋以生塵念機關而將蠧其或綺霞牽思珪月當情烏鵲繞枝芙蓉出水平子四愁之日休文八詠之辰縱時有斐然終乖作者去前月二十四日誤干英眄輙露微才八十首之寓懷幽情罕備三十篇之擬古商較全疎過豐隆以操槌對西子以窺鏡比其濶畧仍未等倫然猶斧藻是思丹青不足亟揮柔翰屢贊神鋒詎成襃德之詞自是抒情之日言無萬一讀有再三不謂恕以蕭稂加之金雘頻開莊驛累泛融尊揖西園之上賓必稱佳句擕東山之妙妓或配新聲是以疑元鶴之有私意丹鳳之猶黨者葢在此也始榮攀奉俄歎艱屯以樂廣之清羸披揚雄之瘨眩遙煩攻療旋曠趨承遊梁苑以無期竄漳濱而有日矧以游丁鰥孑不忍覊孤期既迫於從公力遂乖於攜幼安仁揮涕奉倩傷神男小於嵇康之男女幼於蔡邕之女每蒙顧問必降咨嗟撫身世以知歸望門墻而益懇當今允推常武將慶休辰軒后之憶先鴻殷帝之思盤說詳觀天意取在坤維弼光宅之功議置器之所載求列辟誰取抗衡愚此際儻必辨杯蛇不驚牀蟻尚冀從下執事為太平民望謝傅之蒲葵詠召公之棠樹恭惟慎調寢膳克副人祇伏恐本府巳有追符即日徑須上路倚大夏之節杖入彭澤之籃輿不復拾級賓階致辭公府故欲仰青田之敘感瞻丹穴以興懷禿逸少之鹿毛書情莫竭盡休明之蠒紙寫戀難窮企望旌幢無任隕淚感激之至謹啟某啟日者慶屬中興運推常武仰窺金版遐考瑤圖順祖之孝思丹青曾閔憲皇之功烈刀机彭韋聖上初九潛泉登三佩契以后稷岐嶷為小慧故人莫得知以漢皇雲物為下祥故神無所豫洎陟元后洪維長君固必降非常之人輔維新之政伏惟閤下昭回降彩沆瀣融精往執靈鉟正星辰之分野今調鏤鼎猶日月之得天昔軒后師臣成王畏相殷奉伊尹則謂之元聖周事呂尚則命為太公此王者之所以尊賢傑而不以為疑也至於姬旦金縢不與燕召同列仲尼麟史不令游夏措辭甘盤尊舊學之名夷吾居仲父之位此又賢傑之所以自負其道而不以為讓也上下交感人祇協從是我后夷姦秉哲之辰實閤下宰物匡時之日清廟係心蒼生延首允也無間樂哉惟時某早奉輝光常蒙咳唾牛心致譽麈尾交談而契濶十年流離萬里扶風歌則劉琨抱膝白頭吟則鮑昭撫膺重至門闈空餘皮骨方從初服無補大鈞穿履敝衣正同北郭槁項黃馘乃類曹商未知伏謁之期徒切太平之賀下情無任抃舞踴躍之至謹啟商隱啟伏奉指命令書元和中太清宮寄張相公舊詩上石者昨一日書訖伏以賦曠代之清詞宣當時之重德昔以道均稷契始染江毫今幸慶襲韋平仍鑴宋石依於檜井蹈彼椒墻扶持固在於神明悠久必同於天地况惟菲陋早預生徒仰夫子之文章曾無具體辱郎君之謙下尚遣濡翰空塵寡和之音素乏入神之妙恩長感集格鈍慚深但恐涕洟終斑琬炎下情無任戰汗之至伏見某月日恩制伏承榮加寵命伏以聖上能順考古道相公以浚明有家夜思晝行則裴安之每念王室柔遠能邇則吳漢之不離公門躬贊休辰首獻明號克宣天澤榮轉地官擾周禮之兆人選同農父寬虞書之五教任比司徒宗社降輝華夷快望况某叨蒙任使早被恩知未期黃閣之趨預祝緇衣之美抃賀瞻戀不任下情商隱啟暮春之初甘澤承降既聞霑足又欲開晴實關燮和克致豐阜繁陰初合則傅說為霖媚景將開則趙衰呈日獲依恩養定見昇平絕路左之喘牛用驚丙吉無广既中之惡馬以役任安偃仰興居惟有歌詠瞻仰闈闥不勝肺肝謹啟伏蒙仁恩賜及前件衣服疋段漆器等謹依榮示捧領訖衣雜綵繒重輝婁褐器兼丹漆載耀顏瓢悚載之誠不任陳謝昨日伏奉榮示猥以拙製形於重言夫廣野之氣或成宮闕擊轅之音有中風雅蓋其偶會豈曰必然又安足介竈慎之仰占動夔牙之傾聽三兄尚書早貞文律久味道腴永惟一字之褒便是百生之慶昨晚又復蒙遠遣軍吏重降手筆揄揚轉極撫納茲深某爰自弱齡叨從名軰邅廻二紀慶弔一空詞苑招魂文場出涕重膺疊翮零落無遺高幹修條凋摧畧盡乘風匪順無水憂沉豈謂窮塗再逢哲匠昇堂辱顧披卷交談不獨垂之空言屬又存之真蹟爰增懦氣載動初心庶或武陵之溪微接桃源之境平昌之井暗通荊水之津况異物以達誠弭中阿而攀德南嚮旌斾實所知歸商隱啟兩日前於張評事處伏覩手筆兼評事傳指意於樂籍中賜一人以備紉補某悼傷以來光陰未幾梧桐半死方有述哀靈光獨存且兼多病眷言息允不暇提攜或小於叔夜之男或幼於伯喈之女檢庾信荀娘之啟常有酸辛詠陶潛通子之詩每嗟漂泊所賴因依德宇馳驟府庭方思效命旌旄不敢載懷鄉土錦茵象榻石館金臺入則陪奉光塵出則揣摩鉛鈍兼之早歲志在元門及到此都更敦夙契自安衰薄微得端倪至於南國妖姬叢臺妙妓雖有涉於篇什實不接於風流况張懿仙本是無雙曾來獨立既從上將又託英寮汲縣勒銘方依崔瑗漢庭曳履猶憶鄭崇寧復河裏飛星雲間墮月窺西家之宋玉恨東舍之王昌誠出恩私非所宜稱伏惟克從至願賜寢前言使國人盡保展禽酒肆不疑阮籍則恩優之理何以加焉干冒尊嚴伏用惶灼謹啟商隱啟某聞周朝貝葉列妙引於王褒梁日枳園灑芳詞於沈約必資乎鴻筆麗藻刻乎貞金翠珉然後可以充足人天發揮龍象苟其曖昧即匪莊嚴爰託亨塗夙聞妙喻雖從幕府常在道場猶恨出俗情微破邪功少二百日斷酒有謝蕭綱十一年長齋多慚王奐仰戀東閣未歸西林近者財俸有餘津梁是念適依勝絕微復經營伏以妙法蓮華經者諸經中王最尊最勝始自童幼常所護持或公幹漳濱有時疾薾或謝安海上此日風波恍惚之間感驗非少今年于此州長平山慧義精舍經藏院特剏石壁五間金字勒上件經七卷既成勝果思託妙音伏惟尚書有夫子之文章備如來之行願不逢惠遠巳飛廬岳之書未見簡棲便制頭陀之頌是故右繞三匝仰希一言庶使鵝殿增輝龍宮發色流傳沙界震動風輪報恩于蓮目果脣奪美于江毫蔡絹伏希道念特降神鋒瞻望旌幢攜持碪斧曝身晞髮以候還辭無任懇迫之至謹啟商隱啟伏奉榮示伏蒙仁恩賜撰金字法華經記一首正冠薦笏跪捧伏讀聽儀鳳之簫管祇恐曲終對仙客之棋枰仍憂路盡欣榮羡慕造次失常前者爰託翠珉將翻貝夾方資護念麤冀標題換骨惟望於一丸剜身止求于半偈豈謂尚書載持夢筆仰拂文星入不二法門住第一義諦儒童菩薩始作仲尼金粟如來方為摩詰鋪舒于無上藻輝于至真而又以七喻之微較五常之要脗然合契永矣同塗既令弟子言詩又與聲聞受記一佛出世萬人所望不知孱微何以負荷便當刻之鳥篆置彼龍宮此則吹之以宋玉之風照之以謝莊之月彼則傳之於赤髭疏主示之以白足禪師然後負箒趨門前騶入廏以鉗奴為歡友與車御為良朋冀必從公以謝嘉命過此而往不知所圖下情無任距躍感激歡喜信受之至謹啟商隱啟伏奉手筆猥賜奏署某少而孱薾長則艱屯有志為文無資就學雖雜賦八首或庶于馬遷而讀書五車遠慙于惠子契濶湖嶺凄凉路岐罕遇心知多逢皮相昔魯人以仲尼為佞淮陰以韓信為怯聖哲且猶如此尋常安能免乎是以艮背却行冰心自處羅含蘭菊仲蔚蓬蒿見芳草則怨王孫之不歸撫高松則歎大夫之虛位不可終否屬于高明伏惟尚書春日同和秋霜共烈叔子則九代清德稚春則七葉素儒君子立言永為周禮正人得位長作歲星今者初陟將壇始敷賓席射洪奧壤潼水名都俗擅繁華地多材雋指巴西則民皆譙秀訪臨卭則客有相如舉纎繳以下冥鴻執定鏡而求西子惟所指命便為丹青若某者又安可眩露短材叨塵記室鹽車款叚徒逢伯樂而鳴土鼓迂疎恐致文侯之臥承命知忝撫懷自驚終無喻蜀之能但誓依劉之願未獲謁謝下情無任感激攀戀之至謹啟某啟伏蒙示及賜錢三十五萬以備行李謹依榮示捧領訖伏以古求良材必有禮幣一束芻皆堪貺美五羖皮未曰輕齎况某跡忝諸生名非前哲尚遙玉帳巳賚金錢訪蜀郡之卜人懸之莫竭遇河間之姹女數且難窮未草檄以愈風不執鞭而獲富敢將潤屋且以騰裝戴荷之誠寄喻無地商隱啟某前因假日出次西溪既惜斜陽聊裁短什葢以徘徊勝境顧慕佳辰為芳草以怨王孫借美人以喻君子思將玳瑁為逸少裝書願把珊瑚與徐陵架筆斐然而作曾無足觀不知誰何仰達尊重果煩屬和彌復兢惶某曾讀隋書見楊越公地處親賢才兼文武每舒繡錦必播管絃當時與之握手言情披襟得侶者惟薛道衡一人而巳及觀其唱和乃數百篇力均聲同德隣義比彼若陳葛天氏之舞此乃引穆天子之歌彼若言太華三峯此必曰潯陽九泒神功古跡皆應物無疲地理人名亦爭承不闕後來酬唱罕繼聲塵常以斯風望於哲匠豈知今日屬在所天坐席行衣分為七覆煙花魚鳥置作五衝詎能狎晉之盟實見取鄫之易不以釁鼓惠莫大焉恐懼交縈投措無地來日專冀謁謝伏惟鑒察謹啟某啟仰蒙仁恩俯賜手筆將虛右席以召下材承命恐惶不知所措某幸承舊族蚤預儒林鄴下詞人夙蒙推奬洛陽才子濫被交遊而時亨命屯道泰身否成名踰于一紀旅宦過于十年恩舊彫零路岐悽愴薦禰衡之表空出人間嘲揚子之書僅盈天下去年遠從桂海來返玉京無文通半頃之田乏元亮數間之屋隘傭蝸舍危託燕巢春畹將遊則蕙蘭絕徑秋庭欲掃則霜露霑衣免調天官獲昇甸壤歸惟却掃出則卑趨仰燕路以長懷望梁園而結慮尚書道光士範德冠民宗愷悌之化既流鎮靜之功方懋竊思上國投剌東都及門惟交抵掌之談遂辱知心之契載惟浮泛頻涉光陰豈期咫尺之書終訪蓬蒿之宅感義增氣懷仁識歸便當焚遊趙之簦毀入秦之屩束書投筆仰副嘉招謁謝未閒下情無任感戀之至謹啟某啟某猥以謏聞仰承嘉命處囊引喻未施下客之能在握稱珍遂忝上卿之列循揣斯久兢惶不任况尚書學總百家術窮三畧文鋒筆力抉揚馬之懸門劒氣弓聲割韓彭之右地永言賓畫宜在民宗豈意非才旋蒙過聽末至居右既乏相如之譽後來在上終興汲黯之嗟手足分榮里閭交慶行吟花幕臥想金臺未離紫陌之塵巳夢清淮之月依仁佩德白首知歸伏惟俯賜恩察謹啟某啟絹若干右特蒙仁恩賜備行李謹依數捧領訖嘉命猥臨厚賚仍及捉襟見肘免類於前哲裂裳裹踵無取於昔人感佩私恩不知所喻謹啟某啟今月某日舍弟新及第進士羲叟處伏見侍郎所制春闈放榜後寄呈在朝同年兼簡新及第諸先軰五言四韻詩一首夫元黃備采者繡之用清越為樂者玉之奇固以慮合元機運清俗累陟降於四始之際優游於六義之中竊計前時承榮內署柏臺侍宴熊館從畋式以風騷仰陪天籟動沛中之舊老駭汾水之佳人非首義於論思實終篇於潤色光傳樂錄道煥詩家况屬詞之工言志為最自魯毛兆軌蘇李揚聲代有遺音時無絕響雖古今異制而律呂同歸我朝以來此道尤盛皆陷於偏巧罕或兼材枕石潄流則尚於枯槁寂寥之句攀鱗附翼則先於驕奢豔佚之篇推李杜則怨剌居多效沈宋則綺靡為甚至於秉無私之刀尺立莫測之門墻自非託於降神安可定夫衆制伏惟閤下比其餘力廓此大中足使同寮盡懷博我不知學者誰可起予某比興非工顓蒙有素然早聞長者之論夙託詞人之末淹翔下位欣託知音抃賀之誠翰墨無寄况乎仲氏實預諸生榮沾洙泗之風高列偃商之位仰惟厚德願沐餘輝輙慶鄙詞上攀清唱聞郢中之白雪媿列千人比齊日之黃門慙非八米干冒尊重伏用兢惶其詩五言二首謹封如別大夫以南陽惠化為東雍先聲旬日之來謳歌巳洽今者北誅雜虜西却諸戎蓮岳分憂雖期於河潤雲臺佇議終動於天慈伏料即時必降徵詔某方從覊宦遽遠深恩昔日及門預三千之弟子今晨即路隔百二之關河瞻望清光不任攀結伏奉榮示兼賜及腰褥靴裁具酒筒盞杓匙筯等捧戴感激不知所為伏念仰辱恩光嘗多違遠風波結懇臯壤銜誠始邂逅於江津又差池於門宇遞蒙厚賜以重離憂文革錦茵終成虛飾杯杓匕筯誰與為歡孤燭扁舟寒更永夜廻膓延首書不盡言伏計亦賜信察某啟即日補闕令狐子直顧及伏話恩憐猥加庸陋惶惕所至感結仍深某長於邱樊早慙師友雖乏許靖幹時之材具實懷殷浩當世之心機而運與願乖言將俗背一邱一壑遠媿於幽棲十辟二徵近慙於籍甚巳迫地勢屬此門衰藐念流離莫或遑息喬木空在弊廬巳頹遂與時人俱為歲貢三試於宗伯始忝一名三選於天官方階九品俸微五斗病滿十旬李陵空弮勇而無益陳平躶體美亦何為方今聖政維新朝綱大舉徵伊臯為輔佐用褒向以論思大窒澆風廓開雅道縲囚為學重見程生掌囿受經復開晁子沉淪者延頸逃散者動心是敢竊假菲詞仰干哲匠果蒙咳唾以及泥塗王遜之遙舉董聰方斯未逮蔡邕之出迎王粲與此非同得水可期搏風有望坐生羽翼平視煙霄儻或不恡鑄人必令附驥雖不足深窺閫奧遠及幾微然比於鼠識吉凶鷰知戊巳既殊異類葢有深誠延望光雲尚隔仙路伏紙魂動濡毫氣增伏願始終念察某啟前月十日輙以舊文一軸上獻即日補闕令狐子直至伏知猥賜披閱今日重於令狐君處伏奉二十三日榮示特尊嚴曲加褒飾捧緘伸紙終慙且驚某本乏英華且無聲采雖成書有託而為裘未工重以迫於世資窘此家素管寧木榻坐巳膝穿孔伋縕袍行而肘見然猶開卷獨得懸頭自強韋編鐵撾屢聞斷折亡書墜冊麤識篇題而投足多難寫誠無所舉非高第仕怯上農虞寄為官何嘗滿秩王華處世寧願異人况在下寮獨無誰語一至於此欲罷不能每念大漢之興好文為最悅洞簫之製則諷在後庭美子虛之文則恨不同世然猶揚雄以草元見誚馬卿亦用貲為郎何賓實之紛綸而名義之乖爽况乎志異數子事非當時司寇棲棲反歎為幸嗇夫喋喋誰為非賢又安可坐榮於寒谷之中自致於剛氣之上矧灰籥難駐圭管無停若使蜀臣之九考不移漢郎之三朝莫過人嘲染鬢帶憤減圍即葛洪命迍永處跛驢之伍田光精竭必為駑馬所先伊秀銳之既衰亦鋩㯋之都盡方今外無戰伐內富英賢閤下文為世師行為人範廓至公之路優接下之誠是願竊望門闈仰干閽侍果蒙旌異特損緘題夫收掌上之妍者在假之長袖騁櫪中之駿者必資於坦塗然後可求其宛轉之能責其滅沒之功是當延望實在深誠倘蒙一使御車與之下座雖不足丹青時輩領袖諸生冀獲預於游談庶少賢於博奕伏惟念錄謹啟商隱啟五金鑄衛形威邪神劍一口銀裝漆鞘紫錦囊盛傳自道流頗同古製未遇良工之鑒常為下客所彈龍藻雖繁鵜膏稍薄敢因五日仰續千齡厠玉玦于君侯擬象環于夫子所冀更蒙千灌重許三卿使武士讓鋒佞臣喪魄無荊王之遇敵手以麾城有漢相之策勳腰而上殿嘉辰祝願平日禱祠伏惟恩憐特賜容納謹啟商隱啟右件衣服等弄杼多疎紉鍼未至浼李固之竒表累王衍之神鋒敢恃深恩竊陳善祝伏願永延松壽常慶蕤賓遠比趙公三十六年當國近同郭令二十四考中書肝膈所藏神明是聽仰塵尊重實用兢惶謹啟員外簪祓傳芳珪璋挺秀蘊請纓之壯志擅夢筆之雄才諷于後庭賦推麗則試于前殿策號賢良猶以有感一言從來三揖卑棲嶺表遠蹈海隅綿歷四周往還萬里洎節旄移所省閣將歸永懷求舊之誠尚鬱圖南之勢且為邦猶聞乎去食制敵難曠于運籌兼仗折衝是資談笑諸葛亮意在蔣琬果以成功趙莊子善彼欒書竟能集事既見君子竊慕古人幸當屈以求伸無惜翔而後集事須請攝節度副使前件官卑棲州縣富有文辭過蘭成射策之年誠思屈跡當陸展染髭之日難議折腰屬賓榻方施使車旁午假其候館聊免沒階事須差攝館驛巡官仍立行隨副使行軍巳下牒奉處分我之偏裨琛最夙舊且思往歲嘗從孤軍衣偏裻之衣靡求盡飾掌維婁之事未始告勞晚節彌堅壯心不改土田漸廣士卒逾多念此老成豈令新問事須補充衙前兵馬使右件官家承禮訓學隸樂章屬陳國東門古多長袖楚王下邑俗漸南音將陳饗客之儀兼切移風之雅其謹防三惑無奪八音杜濮水之遺聲絕吳宮之竊笑勿驕予官事須補充樂營使牒奉處分昔坦綺紈主吾筆劄二紀相失一朝來歸惜其平生老在書計今重之侯國亦有私朝豈無他人不可同日舉為列校合屬連營尚有藉于專精俾兼司于稽勾事須補充散兵馬使兼勾節度觀察兩使案右件官山棲自高棊品無敵空縱爛柯之思未逢賭郡之時以其勢協爭雄事同攻昧易局中之急刼佐麾下之權謀事須補充州衙推方將對局寧在沒階仍宴集不用公服趨走判官禀訓台階從知侯國庭蘭並馥巖電齊明且憶菲才嘗分曩顧梁園辱召淮館陪遊今者獲守小藩適經舊地茲川之上方顧慕于廉堂穀水之旁亦徘徊于既曲實欣餘慶豈謂嘉招願持謙下之姿俯贊訓齊之令事須請攝防禦巡官前件官籍在五陵學通三畧不露才而務進能仗氣以逾恭所宜率彼紀綱記為親信屬資封部稍遠宸居是用輟自私朝仍其舊邸遠分尺籍遙押牙璋爾其敏以在公幹而集事達封章于鳳闕底方賄于蠻圻勿替前勞以承後弊事須補充防禦押衙知上都進奏前件官早從官序實負公才每服節以存誠亦約言而顧禮惟是造次不敢尢違今者位重察廉務煩按鞫既資明練兼藉哀矜勿輕東海之寃無縱梗陽之畧俾夫縣道畏我簡書事須充觀察衙推右件官學精三畧藝極六鈞敏以竄疑謀恭而仗氣事予莊主奉我郡侯誰言越嶺之名藩仍自梁園之下客既叨防遏深藉材能將致果於戎行俾同登于勇爵事須補充同散兵馬使兵曹出于華冑早履宦途郤宛直而和大叔美而秀能暇豫于恩義不造次以違仁盤錯有彰月卜月無頓雖思濡足安可折腰希茂象賢之能兼佐宣風之職事須請攝觀察巡官兼知某縣事右件官太倉禀術何宴傳能既通九歲之宜兼善五禽之戲湘南越北蠻落華人雖其土厚水深豈忘二臣三佐勉將剖浣用息痌疒眾勿矜麥麴之廋辭審辯藋荼之輟寐事須補充醫博士牒奉處分昔漢時高手周室上醫將崇三代之功亦謹一經之遺以褾實稱幹父且又名家佇有濟于痒痾在先頒于祿廪爾其精詳桐籙憤疑別農經且繫孝廉之船勉用李孫之石事須補充要籍右件官我李本枝諸劉貴族能彰美錦令肅陽鱎臨桂既有正言豐水方思健令無辭久假勉慰一同巳聞言偃之絃歌更佇潘仁之桃李事須差攝豐水縣令牒奉處分我所覊縻未為遐陋既懸版籍實集賦輿言念蕃州雖無漢守豈得久容懦吏有負疲人以綽早處中軍嘗為突騎既負抉門之武仍聞免冑之恭是用暫假撫綏聊資控遏爾其載敷仁勇式慰州邦無挾遠以生情勿憂貧而易操奬能舉罪兩不敢私事須差知蕃州事右件官族茂燕臺譽高藩閫末從鵾化聊屈鸞棲州縣誠歎于徒勞煙火嘗欣其相接勉全素分佇振嘉聲事須差攝靈川縣主簿牒奉處分古者三人擇師一社立宰所冀禀規有自制事無偏雖在邊隅且分州里語地既踰于一社料民何啻于三人將求綏撫之才必極柔良之選以君霈策名麾下歷軾軍前身弓六鈞心鐵百鍊無擎跽曲拳之志有飲冰食蘖之貞是用輟自私門介于廉部勉承委寄慎保始終有祿食以奬能有簡書而謫過惟茲二道汝自執焉事須差知環州事右件官始在宦途便彰政述瓊枝瑤萼且異于良倫黃綬青袍尚淹於末路屬吾屬縣有令曠官芒蝎既蠧于良材碩鼠又妨于嘉穗匪聞讓畔遽致盈庭聿求可人用革前弊其在推公以分疆理潔巳以抑奸豪使麻不爭池桑無競隴蔣琬沉醉未如巫馬之戴星王衍清談豈若韓稜之去雹勉修實効勿徇虛名苟善否之有聞于賞罰而何恡事須差攝修仁縣令右件官頃佐一門實揚二職襲韋賢之經術有崔炎之鬚眉久為旅人不遇知巳今龍城屬部象縣分封雖求瘼頒條允歸于通守而提綱舉轄必藉于外臺子其正色當官潔身照物逢柔莫茹有蠧必攻羅含擅譽于琳瑯猶聞謙受梁竦徒勞於州縣未曰通材勿上官以渝清節事須差攝柳州錄事參軍牒奉處分郡督郵縣主簿古之任重今也材難得其人則四隣無侵刻之虞失其人則一府壞紀綱之要昭邱舊郡平樂屬城雖州將在焉而縣尹耄矣苟忘管轄何寄準繩前件官實富公才嘗參侯服削大刃而只思髖髀茂長材而惟憶風霜辯瀉口河志堅心石委之稽勾必慰疲羸夫專于雷同則無以貴吾道苟務從泒別則無以致人和允執厥中唯理所在無愆潔操以負求才事須差攝昭州錄事參軍牒奉處分地處一同有移風易俗之務雷震百里有驚遠懼邇之威聿求其人良不易得况荔江屬邑桂嶺通津停弦待調鋪錦俟製前件官秩為仙尉名下蘇卿聊借效于牛刀蹔輟遊于鷺翿勉將廉白以慰逋遺事須攝荔浦縣令牒奉處分使君代緒清華襟神秀朗恭而負氣勇以求仁屢試絃歌比分符竹處雞舌龍身之地不侮鰥寡居明珠大貝之間益清冰蘖每聞受代便至徒行戰勝紛華儀形暇豫比陶潛之乏食遠過二旬方江革之歸資兼無一舸爰徵舊史想見其人某幸忝廉車每懷屬部詎忘賢守薦自良朋敢滯蠻圻同頒鳳詔噫處盤錯而願彰利刃虞升卿是以為能有民人而遂不讀書仲子路于焉見矩疑盛名典郡學古入官苟直操之罔渝豈層臺之足累勉思所自以保克終事須請攝嚴州剌史牒奉處分前件官吏道長材故人令弟一言相託萬里爰來未及解巾俄悲斷手牙絃載絕徐劍寧欺且資典午之權終正頒條之請佇揚仁隱用慰疲羸無恃舊故事須差攝判官牒奉處分廉介不潤于脂膏忠信可行於蠻貊不唯今也古猶難哉予始軔廉車軻素為州將召至與語得其可人書劍有成腰腹甚偉是用返于故部慰彼遐陬職次牙璋務兼銀冶俯資軍用兼助地征雖處之不疑將委爾以山澤之利而義然後取不蓄爾為聚歛之臣其在無失舊規不踰素節威小人之草咸使偃風護姹女之神無令得火佇聞集事更議酬勞事須假同兵馬使職依前知古州事兼專勾當都蒙營務牒奉處分前件官襲慶儒門儲精吏道不鉶庖刃思處囊錐今廉部之初求人是切爰將折獄用寄長材子其斟酌蜀科評詳漢令勿令門下意盜璧于張儀無使獄中溺然灰于安國佇觀法理更俟甄昇事須差攝觀察衙推
