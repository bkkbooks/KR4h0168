front:
  text: 全唐文欽定全唐文卷六百七十二白居易十七
  hash: sha256:0425114f1cae8751a026abe29d83dbb1266bc1ee3572fcf4af805f3749382926
body:
  text: 魯道寖微守臣喪職眷茲臧氏代稱冡卿方搆禍於家門始有誣於內子問則以默察而愈欺理異斬關而放跡同據邑之請三年一兆既徒稽於大蔡始僭終吉彼何幸於纖人故帝舜格言唯先蔽志宣尼垂範數而為黷則知禍福無門通塞唯數焉有性命之理存乎卜祝之間若廢興之道適然是善惡之徵一貫人與僭而不入因君子之明刑財無苟得義不厭取若奉業以往積而無傷或非道以行動且為害於稽爾甲爰契我龜已見負圖不獨七星之號空嗟入夢詎終千載之期是諸侯之寶念彼當畜非宗伯之屬其誰敢私豈伊匪人妄致諸櫝迹罔厠於主守家用寶於神龜徵以從長占八九之數窮於既厭收千萬之盈茲乃多藏且不豫於官事靡嘗知禁亦可畏於人言必曰職我之由守而勿失名可覆視余無爾刑二姓好合義有時絶三年生育恩不可遺鳳雖阻於和鳴烏豈忘於反哺旋觀怨偶遽抵明刑王吉去妻斷絃未續孔氏出母疏網將加誠鞠育之可思何患難之不救况不安爾室盡孝猶慰母心薄送我畿贖罪寧辭子蔭縱下山之有怒曷陟屺之無情想芣苡之歌且聞樂有其子念葛藟之義豈忍不庇於根難抑其辭請敦不匱親以恩成有讎寧捨嫁則義絶雖報奚為辛氏姑務雪寃靡思違禮勵釋憾之志將殄萑蒲蓄許嫁之心則乖松竹况居喪未卒改適無文苟失節於未亡雖復讐而何有夫讐不報未足為非婦道有虧誠宜自恥詩著靡他之誓百代可知禮垂不嫁之文一言以蔽無效尤於邾婦庶繼美於恭姜以待命互有相非未知孰是立已徇名則由進取修身俟命寧在躁求智乎雖不失時仁者豈宜棄本屬科懸拔萃才選出㣥勤苦修辭乙不能也吹噓附勢丁亦恥之躁靜既殊性習遂遠各從所好爾由徑而方行難強不能吾捨道而奚適觀得失之路或似由人推通塞之門誠應在命所宜勵志焉用趨時若棄以菲葑失則自求諸已儻中其正鵠得亦不愧於人無尚苟求盍嘉自致宥則利淫誅則傷善失人猶可壞法實難丁僭濫為心僶俯從事始假名而作僞咎則自貽及勵節而為官政將何取節使以功惟補過請欲勸能憲司以仁不惠姦議難亂紀制宜經久理貴從長見小善而必求材雖苟得踰大防而不禁弊將若何濟時不在於一夫守法宜遵乎三尺盍懲行詐勿許拜真新乙云數赦則姦生恐弊轉甚刑乃天威赦惟王澤於以御下存乎建中上封以宥過利幸門宜閉大理以蕩邪除舊權道當行皆推濟國之誠未達隨時之義何則政包寬猛法有弛張習以生常則起為姦之弊廢而不用何成作解之恩請思砭石之言兼詠蓼蕭之什數則不可無之亦難孝乃行先則當銜恤子為親後安可危身景喪則未終老其將至懷荼蓼之慕誠合盡哀逮桑榆之光豈宜致毀所以爰資肉食唯服麻縗况血氣之既衰老夫耄矣縱哀情之罔極吾子忍之苟滅性而不勝則傷生而非孝因殺立節庶畢三年之喪順變從宜無及一朝之患既虧念始當愧或非居兄之仇避為不悌銜君之命鬬則非忠將滅私而奉公宜棄小而取大辛時惟奉使出乃遇讐斷手之痛不忘誠難共國飲冰之命未復安可害公節以忠全情由禮抑未失使臣之體何速諍友之規臾駢立言嘗聞之矣子夏有問而忘諸乎是謂盡忠于何致責忘身死節誠重武夫制敵伐謀則先儒士將籌策而可尚奚騎射之足稱軍帥明以知兵精於選將以為彎弧學劒用無出於一夫悅禮敦詩道可宏於七德功宜保大理貴從長若王師之有征以謀則可苟戎略之無取雖藝何為况晉謀中軍選於義府漢求上將舉在儒流豈惟我武惟揚誠亦斯文不墜元戎舉德未爽能軍兵部執言恐為辱國嶽則配天自修常事神雖福善安可苟求宜率道以去邪豈從衆而失正甲志惟守義言乃合經以為視以三公實天子之所饗降其百福寧匹夫之可禳如修蘋藻之誠是用秕稗之禮况人之僭濫徒欲乞靈而神實聰明豈歆祀非鬼是為諂也黷神無乃吐之旅於泰山古猶致誚禱於華嶽今豈不非諒正直之難誣雖馨香而勿用將勸來者所宜救歟修身獨善寵則若驚制爵尊賢命其難廢形雖遺於軒冕蔭宜及於子孫乙貞以自居辟而不起鶴書莫顧雖忘恤後之心爵命已行寧闕賞延之典若使死無用蔭生不及榮何成旌善之風且是廢君之命場苗不食誠自絶於縶維葛藟有陰義難虧於燕翼請優後嗣以獎外臣賦納過時必先問罪淹恤有故亦可徵辭月既及於正陽事宜歸於宰旅展如澤國蓋納地征歲有入貢之程敢忘慎守川無負舟之力寧免稽遲苟利涉之惟艱雖愆期而必宥地官致詰虛月其憂江郡執言後時可愍然恐事非靡盬辭或憑虛請驗所屆公文而後可遵令典事不舉中有災寧救政或擾下雖惠何為景念在濟時動非率法且煩人而不恤是昧烹鮮何歉歲以為虞將勤煮酪信作勞於無用豈為教之有方必也志切救災道敦行古周官荒政自可擇其善者新室弊法焉用尢而效之宜聽責言勿迷知過化本自家政先為郡禮寧下庶宜寬不悌之刑訓在知非是得長人之道况天倫不睦地訟攸興利方競於膏腴恩難虧於骨肉教宜引古過貴自新雖聞爭以鬩墻有傷魯衛之政庶使愧而讓畔將同虞芮之風苟無訟之可期則相容而何遠推田以讓爾誠謝於孟光閉閣而思吾何慙於延壽宜嘉靜理勿謂矯誣貫革乖方則宜致詰相角失理亦可徵辭甲奠體以成執簫而獻中規不撓六材雖則合三捨拔有愆七札不能穿一且恐傷人之甲不曰堅乎而非戴牛之弓無自入也液信虧於巧者射遂爽於臧兮周典足徵彼自乖於三色楚君明試此無愧於二臣咎且有歸責之非當子道貴恭當從理命交游重義蓋恤哀情孝不在於詭隨仁豈忘於惻隱乙父訓乖愛子道昧擇交况求益之初無友不如已者及居喪之際凡人猶合救之既罔念於一哀是有違於久要苟知生而不弔雖贈死以何為舊館遇喪宣父尚猶出涕同門在戚王丹未可忘情縱申遺帛之誠豈補贈芻之義肆一杖之怒父兮既爽義方杜三諫之辭子也亦虧孝道宜哉或詰允矣知言川以利涉竭則壅稅水能潤下塞亦傷農將捨短以從長宜去彼而取此汴河決能降雨流可通財引漕運之千艘實資積水生稻梁於一溉亦藉餘波利既相妨用難兼濟節度使以軍儲務足思開竇而有年轉運司以邦賦貴通恐負舟而無力辭雖執競理可明徵壅四國之征其傷多矣專一方之利所獲幾何贍軍雖望於秋成濟國難虧於日用利害斯見與奪可知居常授時政則行古恤人救弊道在從宜旱將害於粢盛雩難拘於秋夏景象雷是職不雨其憂苟旱魃之愆時虐既太甚雖蓐收之戒序雩亦何傷冀有聞於鸛鳴庶無慮於狼顧馨香以感夕且望於月離稼穡其傷時難遵於龍見雖事乖魯史而義合隨時製錦執言是亦為政褰帷致詰未可與權臨邦賑乏情本由衷為國救災美終歸上丁分條出守求瘼居心歲不順成人既憂於二釜公有滯積戶將餼以一鍾是輸濟衆之誠允叶分憂之政然以事雖上請恩未下流稍違主守之文遽見職司之舉使以未有君命何其速歟郡以苟利國家專之可也恤貧賑廩鄧攸雖見免官矯制發倉汲黯不聞獲罪請宥自專之過用旌共理之心捨則崇讐報為傷義當斷友于之愛以遵王者之章戊居兄之仇應執兵而不返辛殺人以義將倳刃而攸難雖魯策垂文不可莫之報也而周官執禁安得苟而行之將令怨是用希實在犯而不校揆子産之誡損怨為忠徵臾駢之言益仇非智難從不悌之責請聽有孚之辭將主軍情酒存人欲推誠之義必在於均飽德之文不專於醉甲寄分外閫令出中權九醞投河義由獨斷一瓢飲水惠在同霑倘師人之多寒恩逾挾纊如戰士之載渴功倍望梅分少以表無頗和衆寧宜及亂豈資滿腹所貴歸心少卿絶甘見稱漢代子反獨醉實敗楚軍苟臧否之是由何古今之有異非其矯節是不知言在公而行誠非為巳懷惠以謝則涉徇私彼既求仁而得仁此宜以直而報直乙惟獲戾丁乃解紛以為非罪而拘冶長見稱於尼父直言以免叔向寧謝於祁奚論恩則邱山不勝在道而江湖可忘况情非私謁可以不愧於人義在公行實亦無求於我合嘉遺直勿聽責言喪則思哀見必存敬樂惟飾喜舉合從宜夫婦所貴同心吉凶固宜異道景室方在疚庭不徹懸鏗鏘無倦於鼓鐘好合有傷於琴瑟既愆夫義是棄人喪儼麻縗之在躬是吾憂也調絲竹以盈耳於汝安乎如賓之敬頗乖若往之哀斯瀆遂使唱和不應憂喜相干道路見縗猶聞必變鄰里有殯亦為不歌誠無惻隱之心宜受庸奴之責役且有辭信非懋力老而不養豈謂愛親戀若阻於循陔怨必興於陟岵顧惟甲子及此丁年戶減事繁政宜勤於晝夜家貧親老養難闕於晨昏在子道而可矜雖王徭之宜免事聞諸禮情見乎辭天子敦風猶勸養其三老庶人從政亦何假於一夫况當孝理之朝難抑親人之請所由之執愚謂不然生不可保死必有因盍知命於喪豫豈尤人於食我景秋蓬方轉朝薤欲晞旅次爰來將受餐而已生涯溘盡當終食之間且非祭地之疑自是逢天之戚永言其黨不察所由死且焉知徒云噬臘之毒買而有處請無置堇之嫌誠虐士之可哀在主人而何咎幸思恕物無妄罪人賜表主恩拜明臣禮苟臨事而不敬雖有辭而勿聽甲列在朝行頒其資物宜荷天而受賜何委地而如遺曾是姦贓誠可惡於清德今為寵錫諒難拒於鴻私既為善而近名亦失恭而遠禮必也志疾貪冒節勵貞廉自當辭讓有儀豈得棄捐不拜况人不易物鍾離委珠而徒為心苟無瑕伯夷飲泉而可爽宜許有司之劾用懲不恪之辜時制未及尚可俟朝疾疢所加固難陳力乙位參食采志在懸車揆以紀年桑榆之光未暮驗其羸病蒲柳之質先零既稱量力而行所謂奉身以退雖髮未種種告老無乃速歟而心既諄諄致政固其宜矣請高知止無強不能政尚無寬過宜在宥苟昨非之自悟則夕改而可嘉景乃寀寮參諸簿領當推案務劇詎免毫釐之差屬褰帷政苛不容筆削之改誤而不隱悔亦可追縣無罔上之姦州有刻下之虐先迷後覺判事雖不三思苟有必知牒舉明無二過揆人情而可恕徵國令而有文將欲痛繩恐非直筆師律貴貞兵符示信苟未會合敢忘戒嚴乙奉中權甲承後命推輪相代言赴及瓜之期衷甲自防猶軫前茅之慮且信惟守器權在隱情符節既未合同軍衛如何徹警所宜慮遠安可徇私闕於將迎雖乖主禮究其守備是叶軍謀無責建牙恐非直指月制既登誠宜加惠歲賦不入何以奉公苟布常而是違雖移用而不可鄉老年參耆耋名繫版圖天賜未頒且有躁求之請地征合納非無苟免之心曾是徇私固難違例况時逢恤老節合勤王尚齒肆筵我歲敦於善養食毛入賦爾奚忘於樂輸受賜任待於時頒量入難虧於歲杪不從妄請誠謂職司女也有行義不可廢父兮無信訟所由生雖必告而是遵豈約言之可爽乙將求佳壻曾不良圖入幣之儀既從五兩御輪之禮未及三周遂違在耳之言欲阻齊眉之請况卜鳳以求士且靡咎言何奠雁而從人有乖宿諾婚書未立徒引以為辭聘財已交亦悔而無及請從玉潤之欣無過桃夭之時或非之聖人建易雖用稽疑君子樂天固宜知命苟吉凶之罔僭何臧否之足詢丁執心不回出言有中爾考前知之兆誠足決疑吾從昆命之文必先蔽志以為禍福由已休咎則繫於慎行生死付天修短乃存乎陰隲當脫身於木雁寧問命於蓍龜言既中倫理亦窮性况詹尹釋策有問焉知鬬廉立言不疑何卜不從握粟是謂忘筌道雖棄智政且使能苟養之以恬則用之不惑甲稱豫智縣舉爾知將老者之審才得賢斯美何或人之懵理為賊是虞誠蔽蕩之無聞庶利仁之可取然以智殊小大用有否臧識若限於挈瓶或當害物道能宏於樂水何爽理人請審兩端方從一見封疆貴安伍候尚警苟不固吾圉則速即爾刑乙登彼將壇鎮於邊壘誠可戒嚴走集罔有敵於我師何乃啓納寇戎若無人於吾地是昧安邊之略信貽失律之凶拳勇蔑聞罪戾誰執如或寇強師老食絶城孤期盡敵而還且勤於堅守苟知難而退猶愈於覆亡宜矜犄角之辭難議建牙之罪進獻失期罪難逃責稽留有說理可原情景乃行人奉茲錫貢薦及時之果誠宜無失其程阻連日之風安得不愆於素覽所由之語聽使者之辭既異遑寧難科淹恤限滄波於于役匪我愆期販朱實於厥包非豫有咎捨之可也誰曰不然死喪有別哭泣從宜情或異於親疏禮則殊於內外丁義勤交道動循容止未忘半面嘗同傾蓋之歡永念重泉遂展張帷之哭雖聲非有慟而分止所知未乖夫子之言何致鄰人之詰如或肆號咷於路左物或惡之今則具威儀於野中禮無違者允符前志奚恤斯言細行有虧信乖婦順小過不忍豈謂夫和甲孝務恪恭義輕好合饋豚明順未聞爽於聽從叱狗愆儀盍勿庸於疾怨雖怡聲而是昧我則有尤若失口而不容人誰無過雖敬君長之母宜還王吉之妻表旗示信戎政貴明在九章而或乖雖三令而惟反乙是稱戎帥未達軍容奉明罰之辭無聞月捷用潛師之計方事宵征徒欲董以爪牙曾不明其耳目况將經武必在昭文夜號未申有虞固宜不進月章莫舉毀櫝自可當辜欣非失辭責乃當罪一作過聽生而異族死豈同歸且非合祔之儀爰抵嫁殤之禁景夭婚是恤窀穸斯乖以處子之舜華遷他人之蒿里曾靡卜於鳴鳳各異室家胡為相以青烏欲同宅兆徒念幼年無偶豈宜長夜有行况生死寧殊男女貴別縱近傾筐之歲且未從人雖有遊岱之魂焉能事鬼既違國禁是亂人倫請徵媒氏之文無抑鄰人之告軍興事亟則務益兵時泰教成固難敗法丁志崇陳計識昧相時當兵戢之朝詎資凶器在刑行之日寧利幸人是廢國章欲崇軍實禍關黷武弊起惠姦宥罪未若慎行濟軍不如經國况王霸道異古今代變小哉管氏之器曾是行權哿矣省司之言孰非經久得失斯在用捨可知獄雖慎守病則哀矜苟或無瘳如何罔詔甲罪抵刑憲身從幽縶憂能成疾膏肓之上未痊危則思親縲絏之中有請勢窮搖尾念切齊眉臥或十旬既軫彌留之懼官惟三品宜從侍執之辭敢請法曹式遵令典上稟天性旁通物情是謂生知孰云行怪况形雖異類心則同歸四鳥分飛聽音既稱有信三犧皆用聞鳴豈可為妖且叶前言殊非左道爾惟不講我則有辭揆以周官業將同於夷隸詳夫魯史責不及於葛盧獸語可徵人言奚恤肅恭成德卑則敬尊著定辨儀賤無加貴眷彼母妻之品視其夫子之官敬將展於君前禮且殊於門內閨閫垂訓長幼雖合有倫朝廷正名等列豈宜無別婦道雖云守順國章未可易班母則失言妻唯得禮且子兮位下高欲宗豫而夫也官崇如何卑我請依序守無使名愆冒婚僥幸既抵官刑罔上失忠亦虧臣節在幼賤而不禁豈尊長之無辜屬下嫁王姬旁求都尉選吹簫之匹雖則未獲貞人預傅粉之郎豈可濫收庶子况姻連天族榮冠人倫詞既異於承祧禮難當於釐降掩藏庶孽唯慮其不諧貪冒寵榮詎思於有罪豈非或益而損曾是欲蓋而彰國章寧捨於面欺家長宜從於首坐趨朝有時則當蚤作防姦以法寧縱晨行雖夙夜之自公豈警巡之可犯甲陳力是念相時斯昧方鳴三鼓知行夜之猶嚴未闢九門信將朝而尚早趨進合遵於辨色夙興宜伺其啓明既爽時然後行是必動而有悔非巫馬為政焉用出以戴星同宣子俟朝胡不坐而假寐宜遵街禁用表司存退藏守道自合銷聲待用濟時則難背俗乙行藏未達通介不常若德至而無稱固難滅跡既名彰而見舉誠合隨時徒立身以清高且於物而凝滯無固無必盍守宣尼之言獨清獨醒信貽漁父之誚兼濟豈資於絶俗全真未爽於同塵宜從不當之科俾慎無常之舉器不假人易而生亂樂惟節事過則有刑禮既異於古今法且禁其鐘磬景苟求飾喜罔念速尤竊筍簴以陳樂由奢失僭金石而奏罪以聲聞雅當犯貴之辜難許徹懸之訴然恐賜同魏絳僭異於奚且彰北闕之恩何爽南鄰之擊是殊國禁無告家藏邑號旌賢國章議貴如或不能自庇則將焉用其封丁氏恩降閨門罪罹邦憲寵非他致既因表以勳賢咎雖自貽亦可免於刑戮若不從其寬典則何貴於虛封漢恤緹縈猶聞贖父齊分石窖豈不庇身宜聽輯矣之辭難奪贖兮之請
  hash: sha256:8cbede09fb61f028b2482b19af9ef4122bdf21f42e00e944ebfdbdaae0850089
  markers:
  - {type: head, offset: 0, content: 得甲居蔡曰寶人告以為僭不可入官訴云僂句不余欺是以寶之, id: KR4h0168_NFKB_672-h1, level: 2}
  - {type: head, offset: 133, content: 得甲畜北斗龜財物歸之遂至萬千或告違禁詞云名在八龜, id: KR4h0168_NFKB_672-h2, level: 2}
  - {type: head, offset: 281, content: 得甲去妻後妻犯罪請用子蔭贖罪甲怒不許, id: KR4h0168_NFKB_672-h3, level: 2}
  - {type: head, offset: 408, content: 得辛氏夫遇盜而死遂求殺盜者而為之妻或責其失貞行之節不伏, id: KR4h0168_NFKB_672-h4, level: 2}
  - {type: head, offset: 521, content: 得乙與丁俱應拔萃乙則趨時以求名丁則勤學, id: KR4h0168_NFKB_672-h5, level: 2}
  - {type: head, offset: 669, content: 得丁冒名事發法司准法科罪節度使奏丁在官有美(集作善)政請免罪授真以勸能者法司以亂法不許, id: KR4h0168_NFKB_672-h6, level: 2}
  - {type: head, offset: 786, content: 得乙上封請永不用赦大理云廢赦何以使人自, id: KR4h0168_NFKB_672-h7, level: 2}
  - {type: head, offset: 897, content: 得景居喪年老毀瘠或非其過禮景云哀情所鍾, id: KR4h0168_NFKB_672-h8, level: 2}
  - {type: head, offset: 1010, content: 得辛奉使遇昆弟之仇不鬬而過為友人責辭云銜君命, id: KR4h0168_NFKB_672-h9, level: 2}
  - {type: head, offset: 1111, content: 得軍帥選將多用文儒士兵部詰其無武藝帥云取其謀也, id: KR4h0168_NFKB_672-h10, level: 2}
  - {type: head, offset: 1244, content: 得甲至華嶽廟不禱而過或非其違眾甲云禱非禮也, id: KR4h0168_NFKB_672-h11, level: 2}
  - {type: head, offset: 1380, content: 得乙隱居徵辟不起子孫請以所辟官用蔭所司不許, id: KR4h0168_NFKB_672-h12, level: 2}
  - {type: head, offset: 1487, content: 得江南諸州送庸調四月至上都戶部科其違限訴云冬月運路水淺故不及春至, id: KR4h0168_NFKB_672-h13, level: 2}
  - {type: head, offset: 1593, content: 得景為縣令教人煮木為酪州司責其煩擾辭云以備凶年, id: KR4h0168_NFKB_672-h14, level: 2}
  - {type: head, offset: 1688, content: 得丁為郡守行縣見昆弟相訟者乃閉閣思過或告其矯辭云欲使以田相讓也, id: KR4h0168_NFKB_672-h15, level: 2}
  - {type: head, offset: 1809, content: 得甲獻弓蹲甲而射不穿一札有司詰之辭云液角者不得牛戴牛角, id: KR4h0168_NFKB_672-h16, level: 2}
  - {type: head, offset: 1914, content: 得乙有同門生喪親將往弔之其父怒而撻之使遺縑而已或詰其故云交道之難, id: KR4h0168_NFKB_672-h17, level: 2}
  - {type: head, offset: 2060, content: 得轉運使以汴河水淺運船不通請築塞兩岸斗門節度使以當軍營田悉在河次若斗門築塞無以供軍, id: KR4h0168_NFKB_672-h18, level: 2}
  - {type: head, offset: 2202, content: 得景為宰秋雩刺史責其非時辭云旱甚若不雩恐為災, id: KR4h0168_NFKB_672-h19, level: 2}
  - {type: head, offset: 2317, content: 得丁為郡歲凶奏請賑給百姓制未下散之本使科其專命丁云恐人困, id: KR4h0168_NFKB_672-h20, level: 2}
  - {type: head, offset: 2448, content: 得戊兄為辛所殺戊遇辛不殺之或責其不悌辭云辛以義殺兄不敢返殺, id: KR4h0168_NFKB_672-h21, level: 2}
  - {type: head, offset: 2554, content: 得甲為將以簞醪投河命眾飲之或非其矯節甲曰推誠而已何必在醉, id: KR4h0168_NFKB_672-h22, level: 2}
  - {type: head, offset: 2679, content: 得乙有罪丁救以免乙不謝或責之乙云不為已, id: KR4h0168_NFKB_672-h23, level: 2}
  - {type: head, offset: 2784, content: 得景妻有喪景於妻側奏樂妻責之不伏, id: KR4h0168_NFKB_672-h24, level: 2}
  - {type: head, offset: 2913, content: 得甲年七十餘有一子子請不從政所由云人戶減耗徭役繁多不可執禮而廢事, id: KR4h0168_NFKB_672-h25, level: 2}
  - {type: head, offset: 3029, content: 得景於逆旅食噬腊遇毒而死其黨訟之主人云買之有處, id: KR4h0168_NFKB_672-h26, level: 2}
  - {type: head, offset: 3136, content: 得詔賜百寮資物甲獨以物委地而不拜有司劾其不敬云本贓物故不敢拜, id: KR4h0168_NFKB_672-h27, level: 2}
  - {type: head, offset: 3266, content: 得乙為大夫請致仕有司詰其未七十乙稱羸病不任事, id: KR4h0168_NFKB_672-h28, level: 2}
  - {type: head, offset: 3353, content: 得景為縣官判事案成後自覺有失請舉牒追改刺史不許欲科罪景云令式有文, id: KR4h0168_NFKB_672-h29, level: 2}
  - {type: head, offset: 3463, content: 得甲替乙為將甲欲到乙嚴兵守備不出迎發制書勘合符以法從事御史糾其無賓主之禮科罪不伏, id: KR4h0168_NFKB_672-h30, level: 2}
  - {type: head, offset: 3560, content: 得鄉老不輸本戶租稅所司詰之辭云年八十餘歲有頒賜請預折輸納所司以無例不許, id: KR4h0168_NFKB_672-h31, level: 2}
  - {type: head, offset: 3677, content: 得乙女將嫁於丁既納幣而乙悔丁訢之云未立婚書, id: KR4h0168_NFKB_672-h32, level: 2}
  - {type: head, offset: 3792, content: 得景請與丁卜丁云死生付天不付君也遂不卜, id: KR4h0168_NFKB_672-h33, level: 2}
  - {type: head, offset: 3921, content: 得耆老稱甲多智縣司舉以理人或云多智賊也未知合用否, id: KR4h0168_NFKB_672-h34, level: 2}
  - {type: head, offset: 4017, content: 得乙為邊將虜至若涉無人之地監軍責其無勇畧辭云內無糗糧外無犄角, id: KR4h0168_NFKB_672-h35, level: 2}
  - {type: head, offset: 4130, content: 得景進柑子過期壞損所由科之稱於浙江楊子江口各阻風五日, id: KR4h0168_NFKB_672-h36, level: 2}
  - {type: head, offset: 4222, content: 得丁喪所知於野張帷而哭鄰人詰云夫子惡野哭者, id: KR4h0168_NFKB_672-h37, level: 2}
  - {type: head, offset: 4325, content: 得甲妻於姑前叱狗甲怒而出之訴稱非七出甲云不敬, id: KR4h0168_NFKB_672-h38, level: 2}
  - {type: head, offset: 4402, content: 得乙為軍帥昧夜進軍諸將不發欲罪之辭云不見月章, id: KR4h0168_NFKB_672-h39, level: 2}
  - {type: head, offset: 4501, content: 得景嫁殤鄰人告違禁景不伏, id: KR4h0168_NFKB_672-h40, level: 2}
  - {type: head, offset: 4623, content: 得丁陳計請輕過移諸甲兵省司以敗法不許丁云宥罪濟時行古之道何故不可, id: KR4h0168_NFKB_672-h41, level: 2}
  - {type: head, offset: 4731, content: 得甲在獄病久請將妻入侍法曹不許訴稱三品以上散官, id: KR4h0168_NFKB_672-h42, level: 2}
  - {type: head, offset: 4812, content: 得乙聞牛鳴曰是生三犧皆用之矣問之皆信或謂之妖不伏, id: KR4h0168_NFKB_672-h43, level: 2}
  - {type: head, offset: 4901, content: 得丁母乙妻俱為命婦每朝參丁母云母尊婦卑請在婦上乙妻云夫官高不合在下未知孰是, id: KR4h0168_NFKB_672-h44, level: 2}
  - {type: head, offset: 5007, content: 得景請預駙馬所司糾云景庶子也且違格令欲科家長罪不伏, id: KR4h0168_NFKB_672-h45, level: 2}
  - {type: head, offset: 5131, content: 得甲夜行所由執之辭云有公事欲早趨朝所由以犯禁不聽, id: KR4h0168_NFKB_672-h46, level: 2}
  - {type: head, offset: 5244, content: 得郡舉乙清高廉使以為通介無常罪舉不當郡稱往通今介時人無常乙有常也, id: KR4h0168_NFKB_672-h47, level: 2}
  - {type: head, offset: 5347, content: 得景於私家陳鐘磬鄰人告其僭云無故不徹懸, id: KR4h0168_NFKB_672-h48, level: 2}
  - {type: head, offset: 5444, content: 得丁氏有邑號犯罪當贖請同封爵之例所司不許辭云邑號不因夫子而致, id: KR4h0168_NFKB_672-h49, level: 2}
