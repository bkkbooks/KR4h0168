body:
  text: 當臺新除三院御史授上日職事先後去元和十二年御史臺奏請應除御史職事但據上日為先後未上日不得計月數者准其年九月七日敕不逾一箇月不在此限行立班次即宜以敕內先後為定臣伏以御史除官之時據來處各有遠近若據一月便為懲創恐乖舊例殊未合宜伏緣臺司職事各有定分先後次第不可逾越若行立班次既依敕令公事先後須繫到日則院長本職翻然在下制置錯亂無所遵承行之纍年轉見其弊伏請自今以後三院御史職事行立一切依敕文先後為定以後赴職稽慢量道路遠近則臺司別具名聞奏須議懲責豈止顛倒職事而已前代創業之君多起自人間知百姓疾苦初承丕業皆能勵精思理太宗文皇帝特禀上聖之姿同符堯舜之道是以貞觀一朝四海寧晏有房元齡杜如晦魏徵王圭之屬為輔佐股肱君明臣忠事無不理聖賢相遇固宜如此明皇守文繼體嘗經天后朝艱危開元初得姚崇宋璟委之為政此二人者天生俊傑動必推公夙夜孜孜致君於道璟嘗手寫尚書無逸一篇為圖以獻明皇置之內殿出入觀省咸記在心每歎古人至言後代莫及故任賢戒欲心歸沖漠開元之末因無逸圖朽壞始以山水圖代之自後既無座右針規又信姦臣用事天寶之世稍倦於勤王道於斯缺矣建中初德宗皇帝嘗問先臣祐甫開元天寶治亂之殊先臣具陳本末臣在童時即聞其說信知古人以韋弦作戒其益宏多陛下既虛心履道亦望以無逸為元龜則天下幸甚良史非貌言漢承秦侈縱之餘海內凋窶文帝從代來知稼穡艱難是以躬履儉約為天下守財景帝遵而不改故家給戶足至武帝時錢朽貫穀紅腐乃能出師征伐威動四方然侈靡不節末年戶口減半稅及舟車人不聊生乃下哀痛詔封丞相為富民侯然則帝王不可以不示儉於天下也行修長慶中官殿中侍御史左司員外郎元和三年六月一日鄉貢進士臣李行修謹昧死惶恐再拜獻書闕下臣覆視漢初經籍起口傳壁匿煥然明備其所由者修廢官立太學朝夕講貫以究聖意歲時程課以嚴師道使之然也逮乎桓靈之世遂使扶持元極匡飭頽俗專委裘以終大運其儒術已試之明效歟近學無專門經無師授以音定字以疏釋經是能使生徒由之中才不能使天下由之致理明矣大率五經皆然臣獨以詩學上聞趨所急也伏惟陛下赦其愚瞽垂恩聽察夫詩者發人之蘊故謂之風手舞足蹈之音作用之光祖宗垂風聲勞歌怨誹之音作用之察吏理審教化是以四海雖大㣥生雖廣猶民人之和氣息乎踵達乎顱流乎手足猶草木之豐澤漸乎根窮乎杪被乎枝葉上下無滯氣內外無遁情如此則詩得其任風得其性也昔殷周相承俱有聖治道洽於下下無怏心王化盛告成功於神明德澤衰反變化於禮素其辭主文譎諫而不訐其教溫柔敦厚而不愚仲尼接於其時謂王者宜以陶冶風俗臣下宜以洗濯疑謬道濟於下吾若之何乃採其詩合三百五篇善者全而用不善者全而去非如春秋諸經或革或因相錯而成也其若禮樂征伐天地陰陽有度假於辭可見喜怒哀樂譏刺諷諭無方非其志莫傳志士躬當治亂之時氣有慘舒之變臻於極而後動積於中而後形故言之成文歌之成聲有一不至則非全矣是以聖人以全動物物莫能固未施敬於人而人敬未施哀於人而人哀頑者以之開明躁者以之舒靜道源於是絶而莫嗣獨有楚屈原頗得詩人之風介於子蘭靳尚之間終以放死故其道不竟洎秦姍笑三代燔燒經籍世儒坑死於是後學軋於相語喑厄相授以及漢興雜全經者七十年師口說者四三輩漢武篤好經術立於學官雖章句大修而比興未喻時揚雄司馬相如由是選耎觀望將迎忌諱勸百諷一推波助瀾文雖有餘不足稱也然以本學寖盛時因災異屢啓直聲初或不究終得其助故自殷已降有天下者莫長焉厥後君臣道薄詩道陵夷蘊義感慨之士至曰吾何從乎上之追屈原不足以全性命下之跡相如不足以匡過失故居常則鬱怏其胸襟嚄唶其齒牙代莫通其源臣伏思之以為詩教未隆於時風雅未洽於下教未隆則士不勸風未洽則言多缺故聞者卒愕而慍者多暗投而却也自十聖紹業盈二百載經術益試周旋百度吏事反為緣飾霸道無所舛駮及陛下又登禮巖穴發揚隱伏宸心讜議猶天地相宣儒風昌言與日月橫騖以辭讓次征伐而不暴以誠明推教化而不浮如此則詩學何為鬱然積於空虛不用之地乎書殘於古今論失於齊魯漢有毛萇鄭康成師道可觀逮聖朝劉迅者說詩三千言近代言詩者尚之伏惟陛下詔公卿諸儒講其異同綜其指要列四始之元本窮六藝之粹精不使講以多物而無譁蔽之一言而得其言極者為師法傳經而行其毛鄭不安者亦隨而刊正選立博士弟子員如漢朝故事然後命瞽史納於聰明命司成教之世子是謂端本由朝廷被於民里由京師施之遠方是謂垂化復采詩之官以察風俗是謂兼聽優登才之選以勵生徒是謂興古四者既備大化自流則動天地感鬼神德豚魚甘堇荼來異俗懷鬼方皆在一致推而廣之神而化之不難矣微臣不知時變溺於師言謹詣光順門昧死以聞伏待刑辟元素元和二年官御史大夫戶部尚書元宗肅宗降誕日據太常博士王涇奏按禮經及歷代典故並無降誕日為節假之說惟國朝開元十七年左丞相源乾曜以八月五日是元宗降誕之辰請以此日為千秋節休假一日㣥臣因獻甘露萬歲酎酒士庶村社宴樂由是天下以為常乾元元年太子太師韋見素以九月三日肅宗降誕之辰又請以此日為天平地成節休假一日自後代宗德宗順宗即位雖未別置節日每至降誕日天下亦皆休假臣以為乾曜見素等所奏以為節假者蓋當時臣子之心喜君父聖壽無疆以為榮慶今園陵既修升祔將畢謹尋禮意不合更存休假之名請付尚書省集百官與學官參議敕宜依者臣等聞君子名之必可言言之必可行故可言不可行君子不言伏以元宗肅宗代宗德宗順宗五聖威靈在天已久而當時慶誕猶存正可言不可行之禮請依王涇奏議並停諗官主客員外郎蕭字俱載舟還洛陽仁風里第思所以盡其瞻玩藏置之宜謂箱櫝臨視不時又有緘啓動搖之變遂建精室陷列於垣復本書之意得遙覩之美寂對虛牖勢若飛驚雖烟露交飛龍鸞縈動輕斾翻揚微雲卷舒不能狀也李君以至行雅操著名當時逍遙道樞脫落榮利識洞物表神交古人而風致之餘特精楷隸所得魏晉已降名書祕迹多矣亦不越於尺素之間未為殊情也蓋壁字奇蹤乃為希寶意象所得非常域也故異而室之文而志之夫蕭之為言也切然而清於文也蔚然而整宜乎銘壁宜乎命齊蕭齊之名與此字傳矣宗卿元和中官侍御史戶部員外郎出為益州刺史天作南北星斗辨之地分方夏山川間之其土殊其鎮異故磅礡博厚隱嶙鬱嵂連岡走峰千里一息秦之山也發地干霄上為嶕嶢攢空交映積為崇嶺越之山也桂林郡郛千岩競秀世情賤目俗態無心故茲山接城郭之間億萬斯年石不能言人未稱焉寶歷紀元給事中隴西李公以直諫匡主圖贊國政時未及泰人安得寧公辭帝鄉白雲為越嶺時雨六條紘布百城震肅人既安年既豐羽扇空搖鈴閣不引盼㣥山而獨往興發得絶境而素尚心來茲山在焉且諡為隱若夫地因人傳山自人顯故有巖結太素至說稱傅谷闢洪荒及超號張我得茲山以隱名彰爾其為狀也左扼郡城之固右對招提之剎前虛明而散祝融之火後清泚而壓元武之水外孤峰而競聳中六洞而潛通諒仁智之所樂信靈仙之所宅登山自西舉趾惟左首至於南華峒峒中水長十餘步濶不可踰深莫之測澄為靈泉播為陽江水側平坦可坐數十人自南華峒西轉五十步至夕陽峒峒長數十丈其旁有水與峒終始在水之東高下有石如砥如礪十數人可憩峒窮有大石高可跂及廣不盈尺鑿穴而望復使下尋有潭東去莫究深廣又北轉而東八十步至於石門自石門又東北五十步至北牖峒峒虛潭幽其水潑墨中有巨魚可三四尺鏤鱗鏟甲朱鬣赬尾人或見者龍以敬之潭之左右怪石萬狀如鳥斯飛如虎斯蹲如衣裳發笥如龍蛇出奔乳竇懸玉石壁流雲潭之南有石室深有便房高有石窗追琢不加清瑩可愛又東南轉一十步至朝陽峒峒中有水旁浸潭側長可數十步三峒之水周圍相通亂於池入於江水中有石高可三尺其色白其容光圓如薰籠大如巨牀以其水浸於潭側故曰側潭尋側潭之西數十步上有潛洞歷險可至窈窕深邃羽人來暨却上南壁約六七丈有雙碧石盤懸如半璧容水數升其上尋尺有一白石盆常有水升餘酌之不竭味甘如醴色白疑乳煎以病愈飲以顏駐其側可坐五六人左右石壁皆光滑密緻有如磨礱不礙綿絮却下從峒口北轉路絶越險山屐不通構梯架空得至雲戶戶內博敞容三十人旁透虛明洪纎可鑒有貞石榻勒為棊局對以手談局之左右可以偃仰詠於斯觴於斯賓從徒侶各有攸處出雲戶下視北牖蒙溪如指諸掌戶外有二徑其一直上至山頂山之最高處也桂江屬望縈紆若帶越嶺遐眺點簇如黛寸眸千里周覽一息構亭其上以俟登臨是歲孟秋月慶雲見於西方自卯及酉南北極望萬狀競變五色相鮮州吏請圖以獻之公允而不阻既而亭構因目之為慶雲亭自亭却下至南華峒口又一徑西去十餘步至白雀峒郡人有獲白雀來獻者雪毛霜羽赬觜紅趾且旌雀瑞因志峒名峒口狹隘側身稍通摩臍夾耳可以方之漸下十餘步其右有立石望之如人次有石室光滑敞人或偃息可容數十從此更下有元潭其深莫測潭東西嵓上有一石樓高低可二三尺自下而望如妝點成樓南有二石相去才數尺被服如人狀意若就樓而看者元潭浤澄水色如墨見者神竦方暑生寒乃作閣道架潭瞬息疾過西南透於石穴中石穴路右復有乳垂亦如朝陽峒者視其周圍但微小耳愛其光潤則或逾之峒內有穴通嘉蓮峒初嘉蓮峒開而未得其號會有獻同心蓮者遂紀事而名之從峒北出六十步西去有峒其深不測中路多白蝙蝠飛舞在空從東有穴棧閣盤回却透元潭之北有兩穴東穴透明長可數丈人不可過莫能究之西穴出於峒口峒內平坦石榻縱橫湯茗在茲笙竽以間有石琴薦置以撫絃聲越金玉自峒西去至夕陽出西山復人寰六峒之能事畢矣自諸水隱山下池諡曰蒙泉派合成流水源有二其一源自夕陽注嘉蓮經白雀歷朝陽旁浸北牖出於南華流沚積為池其一源自蒙溪溪源在北牖峒東北里餘出於北山自山南流會於南華峒水合而成池池因山麓不資人力高深向背繚繞縈回五六里間方舟蕩漾靡微風鏡清波棹女唱榜人歌羽族載依鳧鷖翔泳鱗介是宅魚鱉噞喁野女依叢游絲轉空蘋末風清荷底水紅奠者取饑者採與人同利恨斯池之不大也招提之南長松夾路陰濃蔽日韻響含秋外有連理松異本同幹內有偃蓋松低枝覆空為寺之光華作山之粉澤松側有竹夤緣盡岸策杖未窮步履猶遠北牖峒口有閒田砥平南北十餘步東西稱是可以施欄檻為載酒之場可以構簷楹為更衣之所乃作水閣立風廊闢厨戶列便房華而不逾儉而不逼面茲池以滉漾對他山之青翠絲竹競藝賓僚滿觴歌聲遏雲舞影臨水取樂今日鄉心暫忘客有中席而言曰夫時景賞樂四者難備東西南北百年不閒既別而復會茲山悵懷而未卜他日請執筆紀大賢獨得之勝并立碣垂隱山六峒之由匪曰為文且示來者籍蘭陵人長慶中義武軍行軍司馬遷御史中丞出為襄州刺史維年月日門生義武軍節度使行軍司馬文林郎檢校尚書戶部員外郎驍騎尉賜紫金魚袋蕭籍謹以清酌之奠敬祭於前相國故山南西道節度使檢校吏部尚書兼興元尹御史大夫贈尚書左僕射之靈伏惟明靈稟天地絪縕之和為唐虞文武之臣宜乎壽登期頤福如崇山安危所注意致大君於三五之日如何昊天壞我梁木承訃之日搢紳失望豈僑終蹇謝興謠輟相之足云乎信無等級以寄言也嗚呼哀哉公昔在貞元實司文衡第甲者七十有二人惟籍鯫生名不聞於將命者公以至公俾居選中數仞之牆得門而入荷此知已與嵩華為輕矧乎侍立班墀常趨後塵退食台庭亟承嘉言昔之少別今成永訣哭寢之慟百身何贖嗚呼哀哉伏以天子有命司戎使車三請會葬元侯不許既不得見曳杖之日又不得見如斧之封思欲如赤為志如賜築室邈乎其不可及已身寄於燕趙之交神馳於涇渭之表瞻望遐路心悽目眩其可及乎所可慰者臧孫有後載揚載顯期在茲日以此忍哀齊心遣使儻神理之來顧庶至誠之上達嗚呼哀哉尚饗元輔字子望姦臣子擢進士特恩拜左拾遺纍官刑部侍郎拜華州刺史潼關防禦鎮國軍等使入為兵部侍郎太和三年卒年五十六元和十年冬十月朝散大夫使持節杭州諸軍事杭州刺史上柱國盧元輔視事三歲塵天子書上畏㣥靈下慚蒸乂乃啓忠祠銘而序曰維唐敷祀典於天下廢淫置明資父事君罔有不舉寢廟既設我命厥新有周行人伍公字子胥陪吳之職得死直言國人求忠者之尸禱水星之舍將瞰鴟革遂臨浙江千五百年廟貌不改漢史遷曰胥山今云青山者繆也吁善父為孝記曰父讐不與共載天諫君為忠經曰諸侯有諫臣不失國當訪於宋鄭絶楚出疆在平為未宦臣在奢為既壯子坎壈仗節乞師於吳軍鼓丁寧五戰至郢先哲王建邦啓土著以話言戴后惟人人虐惟后成湯用為大義孔子立為大經子胥修為大仇騷人賦為大怨咸令在上慢惡不生則前戈鞭墓非倒行也後戈走昭非逆施也夫差既王宰嚭受賂二十年內越祀又顛太伯廟血將乾闔閭劍光且失公朝則宴焉入則諫焉孰謂矢毒孰謂刀寒雖言屢出口而車甲已困於齊矣蟹稻已奪於歲矣屬鏤之賜竟及其身鴟夷盛尸投於水濱憤悱鼓怒配濤作神其神迄今一日再至來也海鴟㣥飛陽侯夾從聲遠而近聲近而遠奮於吳怫於越夕於楚乃退於是仲秋闕望杭人以旗鼓迓之笳簫和之百城聚覩大耀威靈卷沙墨裂地灰截若岸坼成坑迎潮民格之如呂梁丈人為靈戈威矛瀲浪百重渚塞不先跳檣揭舷再飯之間絶其音聲蕩漭千里洪波砥平有滑有腯有鹹有腥遙實乎下庭山海梯航雞林扶桑交臂於卯階金狄在戶雷鼓在堂魏樽漢豆六代笙簧可謂奉天爵之馨香獲人神之盛禮佐皇震怒驅叱大邪萬里永清人觀叶一作斗氣銘曰武王金戊紂子胥鞭平為人為父十死一生矯矯伍員執弓挾矢仗其寶劍以謁吳子稽首楚罪皆中紂理蒸報子妻殲鉏直士赫赫王閭實聽奇謨錫之金鼓以號以誅黃旗大舉右廣皆朱戮墓非赭瞻昭乃烏後王嗣立執書以泣顛越言潤宰嚭讒輯步光欲飛姑蘇待執吾則切諫抉眼不入投於河上自統波濤晝夜兩至懷沙類騷洗滌南北簸蕩東西夷蠻卉服罔敢不來雖非命祀不讓瀆齊帝帝王王代代明明表我忠哉肅元和中歷江都縣潯陽縣主簿自庖羲畫卦文字聿興立記注之司以存警誡之法傳稱左史記言尚書是也右史記事春秋是也洎唐虞氏作木火遞興雖戢干戈質文或異而九邱八索祖述莫殊宣文刪落其繁蕪邱明捃拾其疑闕馬遷創變古體班氏遂業前書編集既多省覽為殆則擬虞卿陸賈之作袁宏荀氏之録雖為小學抑亦可觀邇來記注不乏於代矣聖唐御㝢載幾二百聲明文物至化元風卓爾於百王輝映於前古肅不揆庸淺輒為纂述備書微婉恐貽床屋之尤全採風謠懼招流俗之說今起自國初迄於大歷事關政教言涉文詞道可師模志將存古勒成十三卷題云大唐新語聊以宣之開卷豈敢傳諸奇人時元和丁亥歲有事於圜丘之月序登仕郎守江州潯陽縣主簿劉肅撰史冊之興其來尚矣蒼頡代結繩之政伯陽主藏室之書晉之董狐楚之倚相皆簡牘椎輪也仲尼因魯史成文著為春秋尊君卑臣去邪歸正用夷禮者無貴賤名不達於王者無賢愚不由君命者無大小人邪行正棄其人人正國邪棄其國此春秋大旨也故志曰仲尼成春秋而亂臣賊子懼又曰撥亂世反諸正莫近春秋春秋憑義以制法垂文以行教非徒皆以日繫月編年敘事而已後之作者無力病諸司馬遷意在博文綜核疏略後六經而先黃老賤處士而寵姦雄班固序廢興則褒時而蔑祖德述政教則左理本而右典刑此遷固之所蔽也然遷直而事備固文贍而事詳若用其所長蓋其所短則升堂而入室矣范煜絀公才而採私論捨典實而飾浮言陳壽意不逮文容身遠害既乖直筆空紊舊章自茲以降漸已陵替也國家革隋之弊文筆聿修貞觀開元述作為盛蓋光於前代矣自微言既絶異端斯起莊周以仁義為芻狗申韓以禮樂為贅疣徒有著述之名無裨政教之闕聖人遺訓幾乎息矣昔荀爽紀漢事可為鑒戒者以為漢語今之所記庶嗣前修不尚奇正之謀重文德也不褒縱橫之畫賤狙詐也刊淫靡之詞歸正也損術數之略抑末也理國者以人為本當厚生以順天立身者以學為先必因文而輔教纎微之善罔不備書百代之後知斯言之可復也同寶歷時鄉貢進士府君諱達字建儒濮陽人也其先與周同姓文王封太伯於吳至武王始大其邑春秋之後與為盟主及越滅吳子孫奔散或居齊魯間因為郡之籍氏焉祖偉皇任虔州虔化縣丞父瑛冕皇任禺州別駕題輿二邑克著公清積慶所鍾實繁允嗣別駕娶鍾氏而生四子府君即其長也弱不好弄長而能賢清白自持有南朝隱之之操雄謀獨運得東漢漢公之風歷階奉義郎纍試洋王府長史始著籍於豫章晚徙家於京國優游墳典怡性林泉脫棄軒蓋之榮趣玩琴尊之樂雖二疏之辭榮四皓之讓祿之長史今古何殊不幸以大和四年夏六月有六日遘疾終於勝業里之私第春秋六十七以其年十月草日辛酉祔葬於京兆府萬年縣洪固鄉北韋村嗚呼梁木斯壞哲人其萎青烏占窀穸之期白鶴為弔喪之客夫人扶風郡萬氏閨門肅穆無慚班氏之賢四德不虧豈謝謝姑之德先以寶歷元年十月草一日捐館於前里第及今克遵祔禮也夫人實生二男一女長曰仲端次曰仲璵並幼而敏慧有文武幹材或親衛於丹墀或繕經於白武追隙光之莫及痛風樹之不停以其禮經有制空垂志行之文金石靡刊孰紀陵谷之變銘曰吳氏之先周室配天封伯東南世多其賢春秋之後國始大焉代著仁德府君嗣旃清慎廉退吾無間然秩試王府道優林泉積善何昧逝於中年洪固高原南抱樊川佳城鬱鬱宿草芊芊鸞鳳茲祔龜兆叶吉夜月松風萬古斯畢簡永寶歷時官瓊王府長史伏見諸王府本在宣平坊東南角摧毀多年因循不修至元和十三年七月十三日莊宅使收管其年八月二十五日賣與邠寧節度使高霞寓伏以在城百官皆有曹局惟王府寮吏獨無公署每聖恩除授無處禮上胥徒散居難於管轄遂使下吏因茲弛慢王官為衆所輕雖蒙列在官班皆為偷安散秩伏以府因王制官列府中府既不存官司虛設伏乞賜官宅一區俾諸府合而共局庶寮會而異處如此則人吏可令衙集案牘可見存亡都城無廢闕之曹道路息是非之論瓘字茂宏京兆萬年人及進士第仕纍中書舍人與李德裕善李宗閔惡之貶明州長史會昌末纍遷楚州刺史終桂管觀察使宣郡支邑十城而南陵處劇蓋由庶民囂豪物産多狀山川鬬錯風俗詭浮故理束則民潰政放則民怠俱不得其極自非肅廉和敏措動守中則莫至良能况功利及物邪皇帝四年今地官侍郎盧公觀察宣部精心厚下重難邑長乃以寧國令順陽范君假南陵印為大夫於是肅以檢姦廉以約身和以納民敏以應物物不夭落民得休泰盧公嘗曰時或爽候雲龍遁逃膏澤翔枯物不遂液吾人其瘁乎下令邑中有能修復陂塘積水防患者終懋厥功先時縣有廢陂曰大農積歲不理荒梗幽扈邱隰遁形空規殘狀非鄉黨之壽耋不可識輿人飛語他邑病能訾訾囂囂波翻風合范君獨判於心不畏騰口曰利於人也使吾獲戾而罹悔真吾心也且黔愚皆苦於始作而泰於成功况吾君侯明吾天子聖尚何懼哉乃召鄉老里正尹而計之具畚挶列綆鍤筥礫礱堅披材輦壤日必巡丈周察勢便仁以撫馴悅以附來法以督姦勤以勸勞於是雲動雷行斬莽闢蕪撥腐曝淤培高徹卑不知形疲不憚苦骨不殘民力不費金刀潛軼化工事於農隙三旬而畢不戮一人其始也驅江波六十里活活下來闢荒梗數萬畝汪汪虛明謺石構嶺縱三百步龍蟠虎鬬橫殺衝波泄流引洫臂發三港支分脈散澤入大田厥功既成乃有風雨暴鬬洄激換晨虺虺沸會似聞構作及乎雨斬雲除則沙洲突出力捍嶺下若自開闢之初信為神物所相雖使江河合災驚濤懷山大浸崩驅暴猛來敵亦不能軼峻防而侵厚趾斯乃天贊其功豈非仁深於物乎其或火雲天旱魃為虐歊蒸疸怒蛟龍逭誅而翠瀲搖岸澄瀾洗月溶溶浩浩獨落天光順勢導流猶潤百里則貫畦浮塍卒歲之溉千頃豈為多哉其細也孕鱗甲之族育鳧雁之㣥羅生菰蒲蔓合菱藻漁父舟人浩歌揚楫厚生之物永永不極斯其功也可以灼當世而芳千古矣昔者西門豹治鄴召翁卿治上蔡而史氏書美顯白良能以其因水茂功利澤及物者也則大農傑跡功符天作可以論古對能豈有愧乎范君尋遷御史後三年吏民益慕而願表尤功今連率范公以文行德器挺為時賢爰領宣部仁義明舉其下聳善常推至公邑人三請於公乃曰他人有善惟恐不聞况伯也功利如是吾豈詭故哉乃從之邑長李尹久以材能宏張其化吏民甚安之追論大農盛績因民之心以成其善志亦春秋之事也鄉將石定録事丁宗耆壽戴誠佐史章佾或參其議或督其事洎百姓朱綸李縱田邱程允等若干人咸請豫為記云元和八年歲次癸巳六月壬午朔十五日丙申建東漢太守馬君臻能奉漢制撫寧越封仁惠公利俗民陶闕一字殊績章白書於舊史其尤異則披嶮夷高束波圜境巨浸橫合三百餘里決灌稻田動盈億計自漢至今千有餘年縱陽驕雨淫燒稼逸種唯鏡湖含澤驅波流竹泭注於大海災凶歲穀穰熟俾生物蘇起貧羸育富其長計大利及人如此孔子稱民之父母馬君有焉開元中刺史張楚深念功本爰立祠宇久而陊敗今皇帝後元九年觀察使平昌孟公誅斷姦劫遂民類教化修長氓吏畏慕嘗以馬君忠利之績神氣未滅壽宮不嚴何以昭德十年十一月乃崇大棟梁誅翦穢梗禮物儀像咸極潔好後每遇水旱災變輒加心禱精意所向指期如答則君子惠物本同於化樹功本同於治對德相望是宜刻石二十年二月三日記分司優閒誠為忝幸宦途蹇薄分亦可知因吟作官不了却歸來還是杜陵一男子余洛川弊廬在崇讓里有竹千竿有池一畝罷郡之日攜猿一隻越鳥一雙謺石數片將歸洛中方與猿鳥為伍得喪之際豈足介懷大中二年十二月七日
