front:
  text: 全唐文欽定全唐文卷六百九十五植字公修宰相祐甫猶子立為嗣長慶初拜中書侍郎同中書門下平章事罷為刑部尚書旋授嶽鄂觀察使遷嶺南節度使入拜戶部尚書出為華州刺史太和三年卒年五十八贈尚書左僕射
  hash: sha256:7011617c25af95f4176456e69f829467c4c8be3a37ad2c8949d57d37a20a8dd9
