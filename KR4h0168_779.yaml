front:
  text: 全唐文欽定全唐文卷七百七十九李商隱九
  hash: sha256:c3e2b70af32133028ffa35bd769bb72a3bcb010cb1a9d6ad2f33aeedaf645afb
body:
  text: 右件官掌豫書計積爾光陰臨文乃辨於魯魚問數能知於身首昨者始從藩寄初啓戎行有廊廡所散之金有筐篚是將之帛資其出納益見廉隅不惟録舊之誠且切隨材之用事須補充逐要右件官當參戎府洎從廉車殿後驅前拉朽穿蠧既展在公之績宜當職祿之科聊比秩於中璋用承榮於建斾事須補充同兵馬使右件官素樂從軍少來歸我徑勇而敢探雛虎誠明而可涉呂梁屢變星灰益彰氷蘖今兵屯越嶠播控蠻圻無淮陰市井之人有秦伯紀綱之僕是焉求舊以壯中權宜思干命之刑用保克終之美事須補充某營十將牒奉處分我之上軍實首南服靜則拔距投石用養其威動則振鐸挺鍵以揚其武爰求訓整是屬偏裨前件官頗歷星霜為豫御右望通軍志誓在戎行是用挾以楚轅分之齊鼓勉思脫兔勿暴將羊事須補充某營十將右件官嘗從州兵實懷戎略瞻晉卿之馬首識齊壘之烏聲使以履軍冀無堅敵屬熊湘南戍於越北疆思揚建隼之威用警跕鳶之俗爾其撫豫後徑聽我先庚深宏戰器之資用叶師貞之美事須補充某營十將牒奉處分爾之嚴君頃於冡宰守無假器行不易方慶襲身枝名登尺籍是用分乘楚廣均領晉藩刻思及父之賢以奉丈人之吉事須補充同十將右件官族傳隴右氣蓋關中藏蒙瑜獨出之鋒蘊頗羽先登之志今者疆分楚越俗雜蠻夷資中江下瀨之師鎮祝髮鏤膚之俗無替爾勇挫我軍威事須補充討擊副使右件官早輸丹赤頗涉星霜雖懷暴武之鋒不起戡彈之色唯茲沈毅可使訓齊今則登以五符列之三鼓爾其聿修戰器精講軍書勉膺擊剌之名用奬勤劬之節事須補充討擊副使右件官一心事我三歲食貧奉崔瑗之嘉賓曾無惰色收陳遵之尺牘不失片辭既願慤以可規亦聖明而有守宜攜刀筆從我牙旗事須補充要籍右件官早在戎藩素推武藝堇父敢登於懸布養由無失於穿楊屬徼外無虞軍前罷警且從散秩勿慮遺才事須補充散將右件官嘗在壯圖亦從薄宦解康成之書帶精鬼谷之鈐經不殫遐方忽茲投迹雖云小國寧忘亢宗將有俟於先勞固未登於真守事須補充同散使判官地實清門人稱端士和以接物謙而飾躬自贊藩條蓋推賓彥幸今休邏無惜辱臨事須請攝觀察巡官右件官質茂松筠誠高金石謙能養勇義實輕生頃分職近關別屯要地時奮猿臂誓探虎雛既守禦而有經諒追奔之可犯况又秦中共事海內相從酬知能誓於始終于役不辭其暴露脂車秣馬昔嘗為我以前驅被甲執兵今合撫豫之後徑仍榮心膂兼總牙璋事須補充押衙聞寧前為公井令疲羸之氓戴之如父母囊橐之盜畏之猶神明所謂伊人何臻此術還臨舊部勉繼前修宇君子人也詩家者流常亦觀光厄於時命噫有卓魯之政事與顏謝之篇章較其為名不相上下無謂大足小而辭之足下前以肺肝布諸簡素仰承復命猶事枝辭夫豈告者之不忠抑乃聽之而未審擇福莫若重擇禍莫若輕一去不回者良時一失不復者機事噫嘻執事誰與為謀延首北風心焉如灼是以再陳禍福用釋危疑言不避煩理在易了丁寧懇款至於再三者誠以某與先太傅相國俱沐天光並為藩后昔云與國今則親鄰而大年不登同盟未至飯貝才畢襚衣莫陳乃眷後生遽乖先訓遷延朝命迷失臣職不思先縠之忠將覆欒書之族此僕隸之所共惜兒女之所同悲况某擁節臨戎援旗誓衆封疆甚邇音旨猶存忍欲賣之以為巳功間之以開戎役將祛未寤欲罷不能願思苦口之言以定束身之計昔先太尉相公常蹈亂邦不從逆命翻身歸國全家受封居韓之西為國之屏棄代之際人情帖然太傅相公以早副軍牙久從征斾事君之節巳著居喪之禮又彰故乃奬其象賢仍以舊服納職貢賦五十餘年於我唐為忠臣於劉氏為孝子人之不幸天亦難忱才加壯室之年奄有壞梁之歎主上深固義烈是降優恩蓋將顯足下之門為列藩之式不欲劉氏有自立之帥上黨為辜恩之軍俾之還朝以聽後命其義甚著其恩莫偕昨者祕不發喪巳逾一月安而拒詔又歷數旬祕喪則於孝子未聞拒詔則於忠臣巳失失忠於國失孝於家望此用人由茲保族是亦坐薪言泰巢幕云安智士之所寒心謀夫之所齚舌矧於僕者得不動心竊計足下之懷執事之論當以趙氏傳子魏氏襲侯欲以逡巡希恩顧望謀立耳夫事殊者趣異勢別者跡暌故度其始而議其終搴其華而尋其實願為足下一一而陳之夫趙魏二侯於其先也親則父子於其人也職則副戎賞罰得以相參恩威得以相抗義顯事順故朝廷推而與之今足下之于太傅也地則相近職非副戎賞罰未嘗相參恩威未嘗相抗祕喪則于義爽拒詔則於事乖比趙魏二侯信事殊而勢別矣此施之於太傅趙魏則為繼代象賢之美施之於足下足下則為自立擅命之尢得失之間其理甚白又計足下未必不恃太傅之好賢下士重義輕財吳國之錢往往而有梁園之客比比而來將倚以為牆藩託以為羽翼使之謀取使之數求細而思之此又非計山高則祈羊自至泉深則沈玉自來巳立然後人歸身正然後士附語有之曰政亂則勇者不為鬬德薄則賢者不為謀故吳濞有姦而鄒陽去燕噲無德而樂生奔晉寵大夫卒成分國之禍衛多君子孰救渡河之烖此之前車得不深鏡代憲四祖文明繼興當時燕趙中山淮陽齊魯連結者幾姓旅拒者幾侯咸逆天用人背惠忘德據指掌之地謂可逃刑倚親戚之私謂能取信一旦地空家破首裂支分暗者不能為謀明者固以先去悔而莫及末如之何先太尉與李洧尚書齊之密戚楊太保與蘇肇給事蔡之懿親並據要地方州領精甲鋭卒及其王師戾止我武維揚則割地驅人以降送款輸忠以入非不顧密戚非不念懿親非不思恩非不懷惠直以逆順是逼死生實難能與其同休不能與其共戚故也况足下大未侔齊蔡久未及李吳將以其人動於不義僕恐夙沙之國縳主之卒重生彭寵之家不義之侯更出又計足下當恃太行九折之險部內數州之饒兵士尚強倉儲且足謂得支久謀而使安危哉此心自棄何速昔李抱真相國用彼州之人破朱滔於燕困田悅於魏連兵轉戰帛丿糸歲經時而潞人子死不敢悲夫死不敢哭何者李相國奉討逆之命為勤王之師義著而誠順故也及盧從史釋喪就位賣降冀功將乘討伐之時欲肆凶邪之性計未就而人神巳怒事未立而兵衆巳離以萬夫之長困一卒之手驅檻北闕棄尸南荒而潞之人猶老者捫胸少者扼腕謂朝廷不即顯戮深為失刑其故何哉以從史不義不昵去安就危衆黜其謀下不為用故也二帥去就非因傳聞鳩杖之人鮐背之叟知其本末尚能言之則太行之險固不為悖者之守數州之衆固不為邪者之徒此又不足恃也由此言之則以何名隳家聲何事捨君命何道求死士何計得人心此僕者所以對案忘飧推枕不寢為足下惜為足下危而不知其所以然也况太傅比者養牛添卒畜馬訓兵旁招武幹之材中舉將軍之令然而聽於遠近頗有是非雖朝廷推赤心宏大度然而不逞者巳有乖異之說橫議者屢興悖惡之歎人之多言亦可畏也誰為來者宜其弭之今足下背季父引進之恩失大朝文誥之令則是實先太傅之浮議彰昭義軍之有謀為人姪則致叔父於不忠為人孫則敗乃祖於無後亦何以對燕趙之士見齊魯之人耶又計足下旬日之前造次為慮今茲追改懼有後艱此左右者不明而咨詢之未盡也近者李尚書祐董常侍重華之輩並親為賊將拒我官軍納質於匪人效用於戎首久乃來復尚蒙殊恩皆受郡符咸領旗鼓不能悉數厥徒實繁豈有足下藉兩代之餘資委數萬之舊旅俯首聽命舉宗效誠則朝廷又豈以一凵之稽遲片辭之疑異而致足下于不測沮足下於後至故事具存可以明驗幸請自求多福無辱前人護龍旐以歸洛師秉象笏而朝魏闕必當勳庸繼代富貴通身無為鄰道所資使作他人之福倘尚淹歸款未整來軒戎臣鼓勇以爭先天子赫斯而降怒金玦一受牙璋四馳魏衛壓其東南晉趙出其西北拔距投石者數逾萬計科頭㦸手者動以千㣥兼驅扼虎之材官仍率射鵰之都督感義則日月能駐拗憤則沙石可吞使兵用火焚城將水灌魏趣邢郡趙出洛州分二大都之間是古平原之地車甲盡輸於此境糗糧反聚於他人恃河北而河北無儲倚山東而山東不守以數州之殘殍抗百道之竒兵比纍卵而未危寄孤根於何所則老夫不佞亦有志焉願驅敢死之徒以從諸侯之末下飛狐之口入天井之關巨浪難防長飇易扇此際必當驚地底之鼓角駭樓上之梯衝喪貝躋陵飛走之期既絶投戈散地灰釘之望斯窮自然麾下平生盡忘舊愛帳中親信即起他謀辱先祖之神靈為明時之哂笑靜言其漸良以驚魂今故再遣使車重申丹素惟鑒前代之成敗訪歷事之賓僚思反道敗德之難念順令畏威之易時以吉日蹈茲坦途勿餒劉氏之魂勿汙潞人之俗封帛增欷含毫益酸延望還章用以上表成敗之舉慎惟圖之不宣河陽三城節度使王茂元頓首唐葉十五帝諡昭肅始以太弟茂對天休遂臨西宮入高廟將以準則九土指麾三靈乃顧左右曰我祖宗並建豪英範圍古昔史卜宵夢震嗟不寧是用能文惟睿掌武以永大業今朕奉承天命顯登乃辟庸不知帝賚朕者其誰氏子焉左右惕兢威靈迷撓章指周訥揚吃不能仰酬既三四日乃詔曰淮海伯父汝來輔子霞披霧銷六合快望四月某日入覲是月某日登庸淵角竒姿山庭異表為九流之華蓋作百度之司南帝由是盡付元機允厭神度左右者咸不知其夢邪卜邪金門朝罷玉殿宴餘獨銜日光靜與天語帝亦幽闡徵召誥說命之旨定元首股肱之契曰我將俾爾以大手筆居第一功麒麟閣中霍光且圖於勳伐元洲苑上魏收別議於文章光映前修允兼具美我意屬此爾無讓焉公拜稽首曰臣某何敢以當之在昔太宗有臣曰師古曰文本高宗有臣曰嶠曰融元宗有臣曰說曰王褱代宗有臣曰衮至於憲祖則有臣禰廟曰忠公並禀太白以傳精神納非煙而敷藻思才可以淺深魏邴道可以升降伊臯而又富僧孺之新事識庾持之竒字清風濯熱白雪生春淮南王食時之工裴子野昧爽之獻疑王粲之夙構無禰衡之加點然後可以宏宣王略輝潤天文豈伊乏賢可纂舊服帝又曰舜何人也回何人也朕思丕承汝勉善繼無忝乎爾之先公復拜稽首曰易曰中心願也詩曰何日忘之臣敢不夙夜在公以揚宏烈會一日上明發於法宮之中念兆人之衆顧九州之廣永懷不待之痛式重如存之敬公伏奏曰惟先后懋守丕基允資內助秀南頓嘉禾之瑞開烈山神井之祥德駕河洲淑肩沙麓將顯降媯之配未宏褒紀之恩渝美椒塗掩華蘭掖緣山破㧙夙聞齊主之悲採石傳形早降漢皇之慟今繞樞有慶鳴社承輝而懿號未彰貞魂莫祔恐無以懋遵聖緒光慰孝思公於是承命有宣懿祔廟之制初文宗皇帝思宗社之靈祧祖之重傳於夏啓既不克終歸於與夷又未能立乃推帝堯敦敘九族之道宏魏文榮樂諸弟之志常曰潁邸吾寧忘邪及武宗讓踰三四位當九五出潛離隱躍泉在天揚八彩於堯眉挺二肘於湯臂故外則上公列辟內則常侍貴人咸願擬議形容依稀彩飾公搢圭歸美吮墨摛詞詠日月之光華知天者之事也贊乾坤之易簡作易者之事乎公於是有聖容之贊天寶季年物豐時泰骨鯁者慕周偃武肉食者效晉清談豕不豶牙蠆因搖尾氛興燕易駕狩巴梁九十年鑾輅不東三千里華戎遂隔日者上元降鑒元聖恢竒遂於首亂之邦先有納忠之帥復我疆理平我讐仇負羽蒙輪巳聞於深入赤茀邪幅將事於駿奔陳萬賄以展儀備四旗而告捷仍願於箕星之分巫閭之旁追琢貞珉彰灼來葉以文上請屬意宗臣公乃更夢江毫重吞羅鳥町疃河濟呼嘯神祗述列聖之英猷答藩維之深懇既事包理亂思屬安危不惟嵩嶽降神固亦文星助彩螭蟠龜戴蟲篆鳥章構思而君苗硯焚灑翰而元常筆閣公於是有幽州紀聖功之碑天街之北獯鬻攸居結以閼氏降我皇女奉春君婁敬嘗為遠使下杜人楊望長作畫工乘以無年遂忘舊好分偵邏於甌脫遣祭酹於蹛林俾我刁斗晨驚兜零夜設公乃上資宸斷旁耀軍謀心作靈臺手為天馬充國四夷之學此日方知薛公三策之徵他時未爽既而鬼箝飛辨邳石降籌不使郭閎仍讒於段熲寧教李邑更毀於班超勢協聲同火熸水灌遂得朝還貴主暮遁名王轄柳塞之歸車復梅妝而向闕及晉城赤狄喪帥歸圭有閼伯之弟兄誕景升之兒子將憑蜀閣欲恃吳錢姑務連雞靡思縛虎既垂文誥尚有㣥疑公乃挺身而進曰重耳在喪不聞利父衛朔受貶祇以拒君今天井雄藩金橋故地跨搖河北脅倚山東豈可使明皇舊宮坐為汙俗文宗外相行有匪人忠謀既陳上意旋定俄又埃昏晉水霧塞唐郊殊懿公之東徙渡河若紀侯之大去其國稽於時議憚在宿兵公又揚笏而言曰彼地則義師帥惟宗室乃元王勤商之邑后稷造周之邦瓜瓞具存堂構斯在苟虧策畫不襲仇讐則是奬夙沙縳主之風長冒頓射親之俗昔武安君用鉞坑卒四十一萬齊桓公受胙立功一十二國今真將軍為時而出賢諸侯代不乏人况其俗産代地之名駒富管涔之良璞有抱樹辭榮之節有漆身報德之風邪躡足以謀屈指而定謝安之圍碁尚劫曹參之飲酒正酣適有軍書果聞戎捷牛邯謝衆丕豹出奔樂毅不歸鄒陽巳去砥磨周鉞水淬鄭刀萬里來袁尚之頭顱二冡葬蚩尢之肩髀何其纂立大效樹建嘉績若是之速與宗英可汗既畏王威遂聞請吏留犂徑路對潼酪以知羞毳幕氈裘望衣冠而有慕大畢伯士之允呼韓單于之師或執玉而朝靈囿或解辮而拜甘泉並垂於冊書光彼明命百王共貫三代同規公於是奉命有討北狄之詔伐上黨之制諭回鶻之命五慰堅昆之書四每牙管既拔芝泥將乾上輒曰爾有獨斷朕無疑謀固俟沃心可不假手公亦分陰可就落簡如飛故每有急宣關於密畫內庭外制皆不與聞此又豈可與美洞簫而諷於後庭聞子虛而嗟不同世者論功而校德邪其有勢切疾雷機難終日屬宣室未召武帳不開公莫暇昌言且陳密疏賈太傅之憂國固動深誠山吏部之論兵詎因夙習凡所奏御罕或依違及武宗下武重光崇名再易公又觀圖東序按牒西崑率億兆歸心列公卿定議以一十四字垂百千萬年藻縟辭華鋪舒名實秦晉於玉檢瑤繩之內平勃於緑疇讒鼎之間方將命禮官召儒者訪匡衡后土之議採公玉明堂之圖考肆覲之禮於梁生取封禪之書於犬子盡皇王之盛事極臣子之殊功而軒鼎將成禹書就掩然猶進先嘗之藥獻高手之醫藏周旦請代之書追漢宣易名之義作為大誥祈於昊天始終一朝紹續九德其功伐也既如彼其制作也又如此故合詔誥奏議碑贊等凡一帙一十五卷輒署曰會昌一品集云紀年追聖德也書位旌官業也不言制集崇論道也惟公字文饒姓李氏趙郡人蓋大昴中邱有風雨翕張之氣藂臺高邑有山河隱軫之靈萃於直躬慶是全德許靖廊廟之器黃憲師表之姿何晏神仙叔夜龍鳳宋玉閒麗王衍白皙馬援之眉宇盧植之音聲此其妙水鏡而為言託丹青而為裕至於好禮不倦用和為貴敬一人而取悅謙三位而無咎意以默識確乎寡辭車匠胡奴罔迷於半面背碑覆局無俟於專心聿成儉訓不有長物昔猶卑官端坐心齊江革分謝朓之舊襦便為臥具周正得袁憲之談柄常在講筵五車自娛三篋能識麗則孔門之賦清新鄴下之詩重以多能推於小學王子敬之隸法遒媚皇休明之草勢沉著異時相逼當代罕儔不妄過人慎於取友與李杜齊名者少願僑札交貺者稀故能應是昌時媚於天子憲章皇極燮理元穹燭耀家聲粉飾國史侔帝典之灝灝噩噩尊王道之蕩蕩平平而又不節怨嗟知進憂亢張良竟稱多病王充方務頤神無潁陽之善田乏好畤之巨産何曾之食既去虞悰之鮓方嘗憂其厚味有爽和氣肴蓛無在琴鶴有餘成萬古之良相為一代之高士繄爾來者景山仰之某昔在左曹每事先帝雖詭詞望利不接於話言而深義約文庶歸於風采代天之言既集蟠地之樂難忘蓋屬才華用為序引以鄒衍之迂怪將潁嚴之淺近忽焉承命何所措辭五嶺幽遐八桂森爽莫逢博約寧遇切磋處無價之場率然占玉登不枯之岸粗爾論珠雖常有意焉亦不知量也某叩頭再拜上次山有文編有詩集有元子三書皆自為之序次山見舉於弱夫蘇氏始有名見取於公浚楊公始得進士第見憎於第五琦元載故其將兵不得授作官不至達母老不得盡其養母喪不得終其哀間二十年其文危苦激切悲憂酸傷於性命之際自占心經巳下若干篇是外曾孫遼東李惲辭收得之聚為元文後編次山之作其帛丿糸遠長大以自然為祖元氣為根變化移易之太虛無狀大賁無色寒暑攸出鬼神有職南斗北斗東龍西虎方嚮物色歘何從生啞鐘復鳴黃雉變雄山相朝捧水信潮汐若大壓然不覺其興若大醉然不覺其醒其疾怒急擊快利徑果出行萬里不見其敵高歌酣顏入飲於朝斷章摘句如娠始生狼子豹孫競於跳走翦餘斬殘程露血脈其詳緩柔潤壓抑趨儒如以一國買人一笑如以萬世換人一朝重屋深宮但見其脊牽繂長河不知其載死而更生夜而更明衣裳鐘石雅在宮藏其正聽嚴毅不滓不濁如坐正人照彼佞者子從其翁婦從其姑豎麾為門懸木為牙張蓋乘車屹不敢入將刑斷死帝不得赦其碎細分擘切截纎顆如墜地碎若大咽餘鋸取朽蠧櫟蟒出毒剌眼楚齒不見可視顧顛踣錯雜汙瀦傷損如在危處如在夢中其總旨會源條綱正目若國大治若年大熟若君君堯舜人人羲皇上之視下不知有尊下之望上不知有篡辮頭鑿齒扶服臣僕融風彩露飄零委落耋老者在童齔者蕃邪人佞夫指之觸之薰薰熙熙不識其故吁不得盡其極也而論者徒曰次山不師孔氏為非嗚呼孔氏於道德仁義外有何物百千萬年聖賢相隨於塗中耳次山之書曰三皇用真而恥聖五帝用聖而恥明三王用明而恥察嗟嗟此書可以無乎孔氏固聖矣次山安在其必師之邪樊南生十六能著才論聖論以古文出諸公間後聯為鄆相國華太守所憐居門下時敕定奏記始通今體後又兩為祕省房中官恣展古集往往咽噱於任范徐庾之間有請作文或時得好對切事聲勢物景哀上浮壯能感動人十年京師寒且餓人或目曰韓文杜詩彭陽章檄樊南窮凍人或知之仲弟聖僕特善古文居會昌中進士為第一二常表以今體規我而未為能休大中元年被奏入嶺當表記所為亦多冬如南郡舟中忽復括其所藏火燹墨汙半有墜落因削筆衡山洗硯湘江以類相等色得四百三十三件作二十卷喚曰樊南四六四六之名六博格五四數六甲之取也未足矜十月十二日夜月明序余為桂林從事日嘗使南郡舟中序所為四六作二十編明年正月自南郡歸二月府貶選為盩厔尉與班縣令武公劉官人同見尹尹即留假參軍事專章奏屬天子事邊康季榮首得七關數月李玭得秦州月餘朱叔明又得長樂州而益丞相亦尋取維州聯為章賀時同寮有京兆韋觀文河南房魯樂安孫朴京兆韋嶠天水趙璜長樂馮顓彭城劉允章是數輩者皆能文字每著一篇則取本去是歲葬牛太尉天下設祭者百數他日尹言吾太尉之薨有杜司勳之志與子之奠文二事為不朽十月尚書范陽公以徐戎凶悍節度闕判官奏入幕故事軍中移檄牒剌皆不關決記室判官專掌之其關記室者記室假故余亦參雜應用明年府薨選為博士在國子監太學始主事講經申誦古道教太學生為文章七月尚書河東公守蜀東川奏為記室十月得見吳郡張黯見代改判上軍時公始陳兵新作教場閲數軍實判官務檢舉條理不暇筆硯明年記室請如京師復攝其事自桂林至是所為已五六百篇其間可取者四百而已三年以來喪失家道平居忽忽不樂始克寸意事佛方願打鐘掃地為清凉山行者於文墨意緒濶略為置大牛篋塗逭破裂不復條貫十月宏農楊本勝始來軍中本勝賢而文尢樂收聚箋剌因懇索其素所有會前四六置京師不可取者乃強聯桂林至是所可取者以時以類亦為二十編名之曰四六乙此事非平生所尊尚應求備卒不足以為名直欲以塞本勝多愛我之意遂書其首是夕大中七年十一月十日夜火盡燈暗前無鬼鳥一如大中元年十月十二日夜時書罷永明不成寐險哉太倉險若太行彼懸車朿馬為陟高岡此禍胎怨府起自斗量無小無大不可不防澄波萬頃不廢汪汪火烈人畏不廢剛腸曷若寬猛處於中央泉穀之地勿言容易貪夫狥財有死無二御黠馬銜不得不利下或諛吾過人之聰是人甘言將欲相聾下或誇我秋毫必睹是人甘言將欲相瞽長如欲戰莫捨強弩長如獲禽莫忘縳虎衆人之言有訛有真如彼五味有甘有辛口自嘗取無信他人天生五色有白有黑目自別取無為人惑而况乎九門崇崇近在牆東天視天聽惟明惟聰問籥合斗斛何以用銅取寒暑暴露不改其容亦象君子介然居中終日戰栗猶懼或失銜用何利煆之以清虎用何縳挼之以明弩用何射發之以誠俾後來居上無由以生有餘不足無由以爭心為準概何憂乎不直不平各敬爾職一乃心力倉中水外人馬勿食陶母反魚以之歎息豈無他粟豈無他芻薏苡似珠不可不虞倉中役夫千徑萬塗桀黠為炭睢盱為爐應事成象無有定模緣私指使慎勿以呼賓朋姻婭或來宴話食中酒醴慎勿以貰海翁無機鷗故不飛海翁易慮鷗乃飛去是以聖人從微至著不遺忠恕借借貣貣此門先塞須防蒼蠅變白作黑嗚呼熟慮熟圖昔在漢家倉令淳于致令少女上訴無辜陷身致是不亦悲乎敢告君子身可殺道不可渝陪臣未嘗屢覩天子宮闕矧得舞殿陛下耶然下國伏地讀甲乙丙丁詔書亦有以識天子理意尺度堯舜不差毫撮於絶遠人意尢在不然者安得用江陵令使上水六千里挽大小虎牙灔澦黃牛險以治普安闕一字令既為侯講天子意三年大理田訟斷休市賈平獄戶屈膝落民不識胥吏四方賓頗來繫馬靡牛闕一字樹膚不生乃大鏟險道緄石見土其平可容考工車四軌建為南北亭以經勞餞又亭東山號曰重陽以醉風日南北經貰若出平郡無有噫闕二字三年民恐即去遮觀闕二字請留闕二字東山實在亭下侯蔣氏名侑文曰仁之為道隆磊英傑天簡其勞羡以事物為君之闕二字蔣是闕一字撮取不窮如武有庫蔣之有世以仁為歸伯氏之宜仲氏之思厥弟承之繩而不紈以令為侯天子之德汝侯為理劒有盈昃君南臣北父坐子伏飲牛漚菅田訟以直市正獄清謁歸告休朝雨滂沱濕其帩頭民樂以康願有顯庸侯作南亭北亭是雙至於東山乃三其功摧險為夷大石是扛亦既三年民走乞留伯氏南梁重弓二矛古有魯衛惟我之曹惟仁之歸有世在下其攄其超尾馬鬛馬惟蔣之融由唐龐嘏惟是亭銘得其粗且唐大中八年九月一日太學博士河南李商隱撰總天下之事教分為三處域中之大道居其一發軔於希夷之境解鞍於寥廓之場覽若士之遊九垓尚隘稽豎亥之步六合非遐徒欲洞視焦螟遙驅野馬折尺捶而求盡循白環而待窮則元籥猶嚴空筌尚滯輈推地盡莫知象帝之家蓋朽天穿未覩谷神之隧柔皮具紙折骨疏毫雖竭慮於九三終致迷於萬一洎飛龜藏義猛馬垂文貫王屋之深珠方摧中冀封吳宮之合璧始會塗山變浩劫之桑田注㣥黎之耳目聞其大較未可殫論及夫祕篆抽竒隱書詮奧摧藏鳥跡鬱勃龍光太上七言掞靈才之縹緑元中九錫賁神物之便蕃則固可促軫求音援柯搴秀存之則總橐籥於虛空遣之則喪輜重於修塗故泣辜痺坐之君挺紀握圖之主何嘗不留連於太一怊悵於上元考名都為望幸之宮因爽塏為集靈之地一言以蔽百代可知梓州道興觀者五帝盤遊九仙卜築銅梁對軫還疑鑄鼎之山錦浦均流未怯乘槎之水天彭割壤井絡分廠田坴挺夏后之靈滯震蒙之遊女乃知君王化鳥資是思歸力士挽牛非將適遠往者大夫遺行著文自貶於巴歌中聞協律設官作樂豈遺於渝舞照以火井潤之密房五色九苞鎮飛神鳳三毛孫疑孔屢集文犀雖膏雨常霑使星時入而君平至死不出靈關元彥平生未離嚴道亦中州之藩服上古之名區昔隋室以緑字騰芳赤符宣慶尋思馬湩悅閬苑之遐遊顧慕龍鱗羡喬山之僞葬爰依翠阜式寫丹邱其始也漢苑澄泉華陰移土林中夸父即貢宏材橋畔秦皇仍分怪石取方中於絳闕摹大壯於元都臺實九層觀惟一柱瑤房疊葺陽樹攢融俄以九縣告哀三靈改物五芝八桂芻蕘者往焉四戶三階椎埋者至矣祝融有醉回祿無厭始爝火以興端終槱煙而合氣五明之扇將劫燒以爭飛十絶之幡逐崑熛而亂墜既灾巢鳦亦斃池魚悲哀欲甚於戊辰厭勝不聞於壬癸旅為散地便接蕪城田鼠誰燻封狼莫射梧雕碧甃光風聚失於孫枝草沒彤闈浩露空溥於弟蔓我國家克將威命允富貞期李出伊墟洪惟命氏檜生陳郡藹有升仙誓牧野之辰則盤古與天皇秉鉞入咸陽之後則尊盧與栗陸輦車納萬國於堂皇攜九州於掌握彼獨夫之所廢俟明辟以攸興斯觀復建霓旌還張翠蓋不勞置臬而鷗閣飛來無待直繩而虬堂化出三宮主籙八治威魔羅郁倘遊遽分條脫安乍至或送交梨開元十七年太守張公重構石臺并投火齊九枝散影二等分光且異金華送江南之夜宴寧同蠟炬佐洛下之晨炊號為殊庭多歷年所元和初妖興益部釁稔坤維鍾會之窺覦劉璋之暗懦梁橫宋矢樓舞袁䡴將禾麥於親鄰欲邱樊於福地遂使嵇瓜斷蒂董杏分株瓊蘇入燃腹之間迅飯在抽腸之裏黃昏望斷不見青牛昧旦神興唯逢白馬殆逾三紀闕校二官開成元年連帥馮公擁蓋巴西揚麾左蜀永惟愛女名列通仙許長史之全家皆推道氣茅東卿之繼世並有靈風乃夢寐假規丹青往制既分趙璧兼施魏珠擬聳闕於天台狀重樓於句曲頓還舊觀且介通莊嗟乎歘駕方留化機潛迫削墨則公輸復去飛梯則宋翟還歸或沙版仍虛或芝寮未豁或菡萏闕垂於倒井或椒聊罕遍於周垣圖石室於西崑猶資粉墨畫銀臺於東海尚渴鉛黃仙家寧有廢興人世自多休戚今皇帝駢闐靈貺合沓真符爰顧寶臣來頒瑞節尚書河東公華嵩衡霍麟鳳龜龍霈膏雨於豐年耀福星於分野加以融徽妙閫棲照元津書聖琴言論衡棊品徵君虛幌未遠軍牙都講曲櫺更聯賓閣周柱史之論上士張河間所謂仙夫有猷而九牧具瞻無待而三元共奬女道士長樂馮行真廬江何真靖等並下元受事大洞刊名積雪通襟高霞映抱鍊氣則穀仙留訣回顏則桂父陳方華嶽洗頭豈肯秦臺吹管陽城掉臂安能魯殿窺窗永念洪紛每勤元貺義行於得衆事集於和光郡人焦太元等若干人卓鄭遙源嚴枚遠胄懸情紫簡禀化朱陵爭攜莫逆之交共就列真之宇靈姿載穆景從多儀嶽瀆奔趨人天雜集十州倘見三島加升氣轉金樞則雲歸鴛瓦漏移銅史則星入蝦簾煥冰碧以交輝儼環玭而迭映縱時更溟滓代變鴻濛於元黃未判之中存轇轕無垠之狀行真等因摽石闕來訪銀書豫也五郡知名三河負氣顏延年之縱誕未能斟酌當時王子敬之寒溫徒欲保全舊物屬以魚車受寵璧馬從知子虛賦既恨別時樂職詩空勞動思况乎無仲祖之韶潤有彥輔之清羸髮短於孟嘉齒危於許隱謝文學之官之日岐路東西陸平原壯室之年交親零落方欲春臺寫望秋水凝情問句漏之丹砂餌華陽之白蜜惠而好我式契初心聊復攀逸軌以裁襟撫空懷而選義揚子雲醬瓿之說蔡伯喈韲臼之言斯文倘繫於汚隆後世何妨於知罪稽首歸命乃為銘曰道實彊名先天地生淵默未眹寂寥無聲中黃立極元陽降精隱軫金闕開華玉京其一於穆猶龍誕豫靈族尼山設問函關著録開以九籥轉之一轂乃命雲孫納于大麓其二雲孫有慶開國於唐允文允武宜君宜王充庭疊瑞罄宇儲祥連珠合璧氣紫雲黃其三大澤斬蛇新野得馬泗水亭長邯鄲使者乾在地上豐照天下仁及隱微謙稱孤寡其四載五緯肆覲三尊虔恭真質偃曝靈恩彌縫宇宙把握乾坤邐迤邃宇參差妙門其五惟此左川西南奧壤古有經始今存顯敞瑤林瓊樹銅林寶網玉女雲衣仙人露掌其六吳宮火煹束束火道兵來聊於一氣示有三災壤因化往成由運開太顛寶貝聲伯瓊瑰其七長樂肇端廬江纘美英蕤秀萼旋綱步紀克蹈前武能新舊址媚此綺都鄰於錦里其八我之刊嶽帝與令封青雲干呂白日高舂道心結課天爵疇庸沈研勝韻款至元蹤其九載念弱齡恭聞隱語蕙纕蘭佩鴻儔鵠侶願騰華藻請事充舉如曰不然吾將誰與其十
