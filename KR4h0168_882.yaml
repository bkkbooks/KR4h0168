front:
  text: 全唐文欽定全唐文卷八百八十二徐鉉五
  hash: sha256:05d851331f0c2b0c40dd5025ed4c97a16881bafb887ae9bb70135edd3b3bca38
body:
  text: 詩之旨遠矣詩之用大矣先王所以通政教察風俗故有采詩之官陳詩之職物情上達王澤下流及斯道之不行也猶足以吟咏性情黼藻其身非苟而已矣若夫嘉言麗句音韻天成非徒積學所能蓋有神助者也羅君章謝康樂江文通邱希範皆有影響發於夢寐今上谷成君亦有之不然者何其朝捨鷹犬夕味風雅雖世儒積年之勤曾不能及其門者耶逮豫之知已盈數百篇矣覩其詩如所聞接其人如其詩既賞其能又貴其異故為冠篇之作以示好事者云戊戌嵗正月日序自昔新都盜國撓我中州建武開元越在江左日月之照不及河洛之地者四十年矣主上方恢遠略宏下武聖作物覩有開必先故使偽邦失政胡馬大入山泉反覆羌渾沸騰五州遺氓二京故老引領南望庶幾撫豫天子聞之憫然故命大司馬賈公使以觀變儀曹郎謝君副焉儀曹別豫應曰美哉是行蒼生之福在斯舉矣始豫及子同省豫弟又與子同府交道深矣今子將之絶域無以為贈請贈以言夫格天地充四方莫先乎禮昔我太宗文皇帝革暴隋一宇內屈已濟物虛心納諫故四夷君長歷代不賓稽顙闕下可謂德矣聲明文物垂三百年絶而復續可謂禮矣苟使踰百千代之有國家者猶當企聳下風奉行不墜况中興之嗣君乎周秦宮闕是本朝二宅貞觀德禮是本朝家法若棄之而不念委之而不修非天子之意也主上躬行於內而使二君順之於外今強胡入貢中原無主聖人不能違時時至不可失也子其勉之哉思聖意顧人心犬羊百萬以攻戰為事不可以威武服也酋豪聚首以姦詐為常不可以智力勝也子其將之以德慎之以禮衣冠餘緒必觀光於使臣一覩漢官威儀必感泣頓服宅心南向苟或不爾是絶蒼生之望也可不慎歟鉉自朿髮從宦側聞長者之論盛言為戰國者必以權道子視商周以降誰非戰國寧有以權道躋太平乎而言以人棄故事與願違今子王府元僚居可言之地遠使上介當可行之時勉之哉故人之願蒼生之望在此而已行矣文昌春風二月征途萬里捨遊宴之適就鞍馬之勞征虜亭下南朝送別之場臨滄觀側茂宏思洛之所敘離懷古寧無情乎矧軺車所經觸緒牽思渡長淮則想清流映月之景過睢園則思愁雲零雪之興望鞏洛則傷麥秀之詩指唐晉則感大風之歌綏懷之暇彈琴咏詩以祛鬱陶之慮還軫在邇不復多陳聊敘鄙志爾夫進退之機大易稱首止足之誡元文所宗君子動必乘時故言行而事立靜惟體道故身貴而名全然則知之非艱行之不易去聖既遠引年益稀是以古之明君爰有成式重辭祿之士優懸車之禮賁飾寵秩靡限常均所以崇德尚賢激貪勵俗者也皇風所及我有其人太子洗馬陳君翊江浙炳靈鄉閭獲譽棲遲下位而升聞自高便蕃寵任而祇畏日積時方多難寄切司聰將命無私臨事能斷盤錯必解風雨不渝及少海告符瑤山表慶天下之本既正四郊之壘亦罷於是咏遂初之賦決高謝之懷京口之西先有別墅前臨廣陌却枕長江田逾二頃桑都八百戴仲若軒懸之地不遠風煙蒲真人鹿迹之鄉依然川域誅茆築室素欲終焉其所闕者飛泉而已嘗因暇日策杖尋幽爰有道人指示巖溜百步之內一道縣流其清可鑑其味如醴縈崖潄石滌慮蠲疴信山川助其好尚亦心府資其瑩濯既而挂冠請命伏閣陳辭優詔嘉之竟允其請錫金紫之服升贊善之資輕舟東浮盡室而去副君執手流涕似宜都之別宏景㣥公供帳祖餞若都門之送二疏知與不知莫不稱嘆殿下調高雅頌文動星辰賦詩一章以寵行邁掩鄴中之舊制流樂府之新聲足以厚君臣之情敦風化之本縑緗麗色邱壑增華自周行之人與觀光之士靡然投贈粲爾成章遠比河梁之篇近擬白雲之集夫其貞退之節樂善之風實教義之所臻亦咏歌之盛觀也鉉名參望苑迹本騷人敢言能賦之才濫奉言詩之賜敬序麗則冠於首篇君子所以章灼當時焜耀來裔者必曰進士擢第畿尉釋褐斯道也中朝令法雖百王不移者也自聖歷中興百度漸貞能興此美者今始見張郭二生矣則知九仞之勢千里之行凝雲逐日未可量也鉉也不佞生於先賢之後進在二子之前此美不兼可以嘆息然有事同而時異請試論之噫詞場廢五十年矣故老之言議殆絶後生之視聽懵然今百辟有司達於郡國吏徒見趨走公府中一尉耳焉知其餘哉而二君子調高才逸年少氣盛將以俊造之業自重責人以既廢之禮又將以堯舜之道為用議政於俗吏之間如是將與時大乖矣嗚呼彼衆我寡或者難以勝乎君子之道無施不可舒之彌四海卷之在掌握日磾見奇於牧馬陽元知名於水磑彼二人即公輔大器也豈以恥辱為纍哉愚願二君子反已正身開懷戢耀無望人以不知無強人以不能如斯而已矣今天子重文好古諸生懷才待用所以蒼生未蒙福者上下之勢殊中有間耳大易之義物不終否否極必泰泰之時在上者其道下降在下者其道上行君臣相合然後事業遠矣吾以為斯道之復不遠吾子其勉之句曲仙鄉廣陵勝地多難將弭春物將華琴棊詩酒足以為適贈言之旨盡於斯焉古人有言士君子志意既立名譽不聞蓋朋友之過也嗚呼豫於龔生有之矣始豫居獻納之地生已為赤縣尉嘗竊議謂生宜參諫垣憲府之任而未果拔茅之志遽為賦鵬之行生不旋踵亦左授天長用武之地朝廷置建武軍於其所使為將者治之習兵與儒其志不通也處長與佐其勢不鈞也軍市之征日困於民王澤之流不被於俗及生之至官聯始舉刪煩革弊丕變舊風踰年告歸舉邑之民相率遮道不聽去乃潛匿佛廟室中耆耋輩索而獲焉扶之上車擁之而還竟不得已中夜而遁異哉遺愛之風若此考功之吏弗聞丙寅嵗豫避兵於池陽遇生侍親郡中勉之東下是時甘泉有烽火之急天子下哀痛之詔豫謂生必自致青雲之上以解天下之倒懸而出入三年始為武進宰噫非朋友之過乎嘗試論之曰才不才在我用不用在時道之所存其人乃貴功名寵祿何足算哉苟澤及於民教被於物則百里之廣千室之富斯可矣與夫揚孟之徒坎坷閭巷垂空言於後世者不猶愈乎行矣龔生苟有良田何憂晚嵗贈言之要其過此乎彭城劉生為南畿令天官侍郎昌黎公作序以送盛稱歷陽宰楊員外光儒之為政以勗之鉉與楊君有姻深知其內行君清簡仁愛心無適莫自妻子僕妾及家族吏民接之無親疏之隔求之於形骸之外蓋真純之氣充而感召之應遠民之好競者皆相與言曰衆若嚚訟必撓吾員外矣嗚呼其古人乎今劉生才俊於楊學優於楊觀其政績等然生猶有耿介不平之氣觀吏部之勗子與豫之贈言蓋為是也子其平心藏用曶然與道合在古人上矣矧西山神仙之宅也旌陽其遠乎僕故倦談生停驂已久故揚宀隹以論之九月一十七日中書舍人徐鉉序夫政成調鼎寄重于蕃蓋欲聖主之恩均於遠邇賢人之業浹於中外故所以命丞相鄧王從鎰佩相印被公衮擁雙旌統千騎揚帆江寧之浦弭節敬亭之區若乃割友悌之懷輟股肱之侍所以示天下之至公也夙駕已嚴前騶將引既辭復召重賜餞筵所以極大君之恩也敦睦之義於斯有光申詔侍臣述敘賦詩云爾建康西北十里所有迎擔湖水木清華魚鳥翔泳昔晉元南渡壺漿交迓於斯今中興建都人煙櫛比於是其間百畝之地宮率衛君浣沐之所也前有方塘曲沼之勝後有鮮原峻嶺之奇表以虛堂纍榭飾以怪石珍木悅目之賞充牣其中待賓之具無求於外庶子王君諭德蕭君贊善孫君與上臺僚嘗遊焉賢衛君也陶陶孟夏杲杲初日虛幌始闢清風颯然班荊蔭松琴奕詩酒登降靡迆窺臨駘蕩熙熙然不知世與我之為異矣嗟乎天生萬物貴適其性君子有屈身以利物後已而先人或行道以致時交或效知以濟世用斯有貴乎自適者也朝市邱壑君得中道焉下官道汚智劣無益於事山資弗給歸計未從每尋幽選勝何遠不屆一踐茲境杳然忘歸凡我同遊皆為智者徵文紀事其有意乎壬子嵗夏五月祠部郎中知制誥徐鉉躊蹰慨嘆之所作也昔夫子祖述堯舜憲章文武扶東周於已絶拯蒼生於既墜其迹屈而道愈大其人亡而教愈遠則生民以來未之有也其在祀典法施於人則祀之矧裦聖之祀其可忽乎然則中人不足以語上下士聞道而大笑故斯教也衰於戰國廢於嬴秦漢魏以降續而復絶夫仲尼日月重昏干祀非聖人孰能廓之故斯教也興於武德盛於貞觀極於開元理自然也兵興以來大化湮替先王禮器傾頽於勝廣之門闕里諸生悽惶於絳灌之下矧厥祠宇其存幾何天之愛民不當墜絶皇統再造六藝始修太嵗丙午重熙在運宣城雄鎮帝之叔父在焉故幕府之選殊重尚書郎吳君光輔奉詔佐廉部兼理於涇既涖事乃被儒服謁先師闢荊榛歷垝垣以造於茅茨之間仰瞻俯觀喟然而歎於是奉開元之成制采泮宮之舊章經之營之是卜是度維新祕殿嚴飾睟容入室升堂森然如在籩豆有位賓主由序表著咸列門衛肅然於是青襟儒服之子有從師觀藝之場鯢齒鮐背之徒識養老慈幼之節欣欣然其化之大者歟越明年秋君奏計如京師因得其實嗚呼聖人在上㣥賢畢舉使三代之風達於邑里不其偉哉余承君之歡美君之志刊石紀事置於祠庭後之君子無忘跂及其餘理畝籍察庶獄闢汚萊遏陂塘則有考功之吏在故不書於時太嵗丁未冬十月九日尚書主客員外郎知制誥徐鉉記華陽洞天金陵福地㣥仙之所都會景福之所興作故其壇館之盛薦享之殷修奉之嚴樵牧之禁冠於天下其所由來舊矣聖歷中微官失其守望拜之地多所荒蕪若乃真靈翔集元貺肸蠁興復之迹必假異人天祐丁丑嵗貞素先生王君棲霞始來此山恭佩上法徘徊地肺偃息朱陽永懷舊規期在必復先生潛德內映符彩外融名士通人道契冥會凡縞紵之贈貝危信之資悉奉山門以成夙志於是由良常洞至雷平山十里而近入於萌隸者盡購贖之芻蕘不得輒至墟墓不得雜處藝樹蔽野植松為門川梁必通榛穢必翦建方壇於雷平之上造高亭於良常之前朝修有致誠之地遊居有稅駕之所薑巴古陌秦望舊封肅然清光復如開元天寶之嵗矣先是紫陽之右有靈寶院焉真臺故基鞠為茂草先生殫罄資用克構殿堂有開必先無遠弗屆都督武陵康王奉錢百萬梁王造殿一區向道之徒咸助厥事曾未周嵗惟新厥宮皆先生之力也昔大隗致襄城之駕庚桑化畏壘之人是知道心惟微其應如響時則有若道士經若虛協規同志是攝是贊幹事以恪感物以誠績用不愆斯實攸賴先生以保大壬子嵗夏四月悉書夫屋之數疆畔所經請命於京師申禁於郡縣以授茅山都監鄧君機一能事既畢數日而化期命元應昧者不知夫仙階感召諒非一揆若乃神清氣靈骨籙標映受之於天也心虛氣沖元德充蔚基之於性也昭真垂教啓煥靈迹行之於勤也故策名紫素飛步黃庭流功儲慶必參相合然則先生之道其殆庶乎雖歘駕不留冥升日遠而高風可述遺範在人進而紀之翰墨之職也鄧君企慕前躅見託直書已未嵗秋八月日記夫清淨元默道之基也宮館壇墠道之階也生知者因基以成構勤行者升階而覩奧故君子德業元挺仁慈積中必廣馴致之方乃形兼愛之迹為科誡以檢其情性為象設以致其誠明情性平則和氣來誠明通則靈符集由是登正真之境入希夷之域曠矣無際薰然太和斯實興化致理之方還淳反朴之本豈與夫延方士尚祕祝求長生以自奉者同年而語哉宣州開元觀遠擬清虛獨標形勝敬峰崇峻鎮其後句溪澄徹經其陽鍾一方淳粹之精結三素氤氳之氣當泰陵之尊道揭聖歷於華題藹爾殊庭居為福地及運廠田坴百六數偶三災雖棟宇不移而制度多闕靈蹤必復有待而興主上嗣位之七年皇室再造之一紀今儲后徇臧札之操讓德承華體間平之賢總戎藩服首台司而握師律鎮京口而領宣城其為政也質以先正咨於耉老義以果斷仁以發生民力不偷闕政咸舉而斯觀路門久廢遺址將蕪非所以敬教尊祖會昌建福者也乃命執事即從經度民多暇日府有羡財勤而不勞成而勿亟巨棟山立層簷翼舒六扉洞開方軌並入重廊助其回合祕殿表其深嚴十絶之幡拂文楣而絢彩九龍之驂軋金鋪而振響瞻之者有淩雲之氣經之者疑駕歘之遊信足以勵上士之進修福蒼生之仁壽既而功宣納麓望集撫軍大壯之制斯成重離之位亦正貞符允塞盛德宜書道士孫洞虛素業淳深至誠敦慤發揚真迹啓迪嘉猷永為不朽之功願紀它山之石宮臣執筆以謹嵗時戊午秋九月庚申記夫金闕琳房不可階而升也惟至誠能通之靈符景福不可企而望也惟至行能致之故君子行道於時宣力於國敷惠於民貽範於家此人之極致自天所祐也又况考集靈之地崇列真之宇薦納約之信勵勤行之誠然則希夷眇邈超言象之表矣有若故司空相國馮翊懿公承世功之緒襲重侯之業地親於副馬美繼於緇衣便蕃臺閣夷險一心中立不倚金石貫其心唯力是視風霜盡其節故四綜會府再踐中樞三殿方鎮一平邦土慎終如始沒有遺忠激楚之樂雖窮通德之門不改嗣子太僕少卿俊等祇奉慈訓弗敢失墜以為公之純誠沖氣本道家者流而仁政令典近浹於三茅之境高齋甲第夙鄰乎元元之宮故棲神植福必先於是爾其冶城峻址西州舊署忠貞公之遺隴郭文舉之故臺九原可作盛氣如在乃相形勢補廢闕建司命真君之殿於宮之艮維披真蘊以立程集國工而考藝瞻星揆日不勞而成崇高壯麗重深藻繪煥如也凝旒端簡負斧仍几穆如也珠幡絳節紛披乎左右空歌洞章蕭寥乎晨暮真聖以之而臨御純嘏以之而蕃錫賢人有後孝子奉先無以加於此矣鉉始以事分通舊從子弟之遊終以禁掖具員陪僚屬之末及公之啓手足也復忝國士之許辱寄託之任知己之厚何日而忘短篇敘事蓋感遇之萬一也君子才足以治劇惠足以安民見危致命以死勤事有一於此然後可以薦信於無方之神儲慶於必大之門噫楞嚴院經堂之作也其庶幾乎平陽柴君諱進思字昌美故太尉中書令尋陽靖王之孫也少而爽俊長而忠賣心尢善騎射頗曉兵書靖王愛之出則典親兵居則專家政幹蠱之美宗族稱之王薨始為公臣纍遷旅帥鴻圖再造金革寢威上以其才能可任故以為內宴副使乘軺建節將命四方盤根錯節所至皆治改鄂嶽觀察巡官知永興縣事縣有山澤之征榷管之利嵗終考績倍於前人遷泰州軍事判官兼營田鹽監平蠧政決庶獄勞農督課潔已律人民不告疲公有餘利除勸農使復監池吉二郡護武昌軍千里乂安上流靜謐會梁人入寇我武未揚東畿陷沒㣥情震駭命君為行營應援軍使率舟師數千鼓行而東平難濟口復海陵郡於是淮泗之地聲勢始通乘勝長驅因迫隋苑前茅接戰㣥帥後期振臂奮身有死無二雖破竹之勢敗於垂成而東道清夷本由君之一舉也江都克復歸葬京師天子憫焉贈左千牛衛將軍賻贈加等禮也嗣子殿前承旨廷遇等棘心在疚荼蓼倍兼以為苴麻苫飾哀之期有終蒸嘗封樹追遠之禮有數復欲圖不朽之績徼無邊之福則金仙之教世之所崇宗旨在於經文威容存乎像設於是擇奇勝之地補闕遺之事構經堂六間塑地藏菩薩像一軀几席什器之類華而備精而固耽然其質煥乎其章深嚴足以遠世喧虛明足以味元旨其全節之風也如彼其集靈之所也如此然則冥冥之祐綿綿之慶豈誣也哉余頃嵗左官海陵君盡傾蓋之分感忠臣之事主嘉孝子之奉親刻石紀事以聳善也援筆悽愴無心於文保大丁已嵗春三月日東海徐鉉記棲霞寺山水勝絶景象王褱奇明徵君故宅在焉江令公舊碑詳矣高宗大帝刊聖藻於貞石紆宸翰於璿題煥乎天光被此幽谷先是茲山之距都也五十里而遙方軌並驅崇朝可至及中原搆亂多壘在郊野無牧馬之童歧有亡羊之僕義祖武皇帝潛龍茲邑訪道來遊始命有司是作新路金椎既隱玉軑言還桐山之駕不追回中之道亦廢嗚乎聖人遺迹必將不泯微禹之歎夫何逮哉保大辛亥嵗時安嵗豐政簡民暇粵有寺僧道嚴名高白足動思利人百姓莊思悰家擅素風積而能散嗟亭候之不復憫行旅之多艱乃相與翦荊榛疏坎窞闢通衢之夷直棄邪徑之迂回建高亭於道周跨重橋於川上鑿甘井以救渴立名表以指迷草樹風煙依依四望峯巒臺榭肅肅前瞻由是江乘之塗復識王畿之制矣余職事多暇屢遊此山喜直道之攸遵嘉二叟之不懈為文刻石用紀成功俾後之好事者以時開通隨壞完葺此碣有泐斯文未湮不亦美乎其年八月一日兵部員外郎知制誥徐鉉記聖人作川梁以濟不通舟車所及纚連棊布若乃形勝傑大名聞天下者亦無幾何陽羡長橋其一也夫英賢之所足廠田坴次邑居之所瞻望山川之精粹宅焉里城之神靈憑焉廢而興之圯而葺之豈惟備政足以徼福是橋也徵諸圖牒則後漢邑令袁君創造國朝永泰中令邱君新之其他無聞焉中興之初邑有義夫曰吳濛吳湞率以私帑備加營搆人賴其利踰三十載丙辰嵗國步中梗百越寇邊邑人敗之燒營而遁飛焰旁及宏梁半摧甲寅嵗著作佐郎劉君來為邑長視其制度知非民力之所能濟乃狀其事白於有司上聞嘉之詔賜錢八十萬君信而好古寬而得衆尉盧蒨鼎甲餘慶俊造策名政是以和事無不舉乃相與敷王澤因民心備物致用程工揆日器利工善材良事時戊辰嵗冬而栽明年暮春而畢長五十步廣七步對縣樓而直出跨荊溪而橫絶丹雘其飾宛偃蹇而虹舒崇高其勢邈苕亭而山立朱輪方軌駟馬連騎營營市井憧憧往來有袵席之安無揭厲之患昔者乘車濟涉聖人謂之無教橋梁弗修賢相知其不能以今方古勝負分矣夫書云考績傳載稱伐庸庸善善其可廢乎刻之貞珉以示來者庚午嵗春二月十五日記至矣哉天之愛民甚矣雖數有治亂而常生聖賢故得其位則功加於時舛其運則教垂於後雖銷聲滅迹全身遠害不德而德暜逃名而名揚擁篲築宮禮重於列國式閭表墓道光於無窮舉善而教政之大者也恭維我祖炳靈南國舊宅界乎仙館高臺峙乎澄陂孺亭之稱海內瞻仰名公良牧代加崇飾千載之下猶旦暮焉頃屬邦君非才敗我王度翦焉層構鞠為茂草噫百世之祀誰能廢之庚申嵗始建王都辛酉嵗遂遷清蹕肆覲㣥后疇咨先賢餘基未傾偉人將至既而鼎湖在御桐圭錫壤丞相司空鄧王以茂親之重膺分陜之權思老成之典型仰高山之景行不言而信不肅而嚴乃命經營將從締構九成方起百堵未周甲子嵗入秉國鈞以武昌連帥侍中濟南公代司宮籥公致用以武從政以文祇奉蕭規率由周禮再賡成制詳考舊基夷坎窞而就平裨崖岸而增固乃崇堂奧乃加藻繢右嚴樽坫之序左設庖膳之區前臨康莊旁眺城闕平湖千畝凝碧於其下西山萬謺倒影於其中依然懸榻之場想見致芻之狀與夫洪崖之館絢綵於煙霞滕王之閣騫飛於雉堞南州之物象備矣前哲之光靈萃焉嗟乎君子興一役建一事於時必可頌於後必可觀茲亭之作也都人朋悅過賓矚目紀於方國之史播於樂職之詩鉉也幸承燕翼之謀獲參翰墨之任俾垂不朽敢憚蕪音同安城北有雙溪禪院焉皖水經其南求塘出其左前瞻城邑則萬井纚連却眺平陸則三峯積翠朱橋偃蹇倒影於清流巨木輪囷交蔭於別島其地豐潤故植之者茂遂其氣清粹故宅之者英秀聞諸耆耋喬公之舊居也雖年世屢遷而風流不泯故有方外之士爰構經行之室回廊重宇耽若深嚴水瀕最勝猶鞠茂草甲寅嵗前吏部郎中鍾君某字某左官茲郡來遊此溪顧瞻徘徊有懷創造審曲面勢經之營之院主僧自新聿應善言允符夙契即日而栽逾月而畢不奢不陋既幽既間馮軒俯盼盡濠梁之樂開牖長矚忘漢陰之機川原之景象咸歸卉木之光華一變每冠蓋萃止壺觴畢陳吟嘯發其和琴棊助其適郡人瞻望飄若神仙署曰喬公之亭志古也噫士君子達則兼濟天下窮則獨善其身未若進退以道小大必理行有餘力與人同樂為今之懿也是郡也有汝南周公以為守有潁川鍾君以為佐故人多暇豫嵗比順成旁郡行再雩之禮而我盛選勝之會鄰境興閴戶之嘆而我賦考室之詩播之氓頌其無愧乎余向自禁掖再從放逐故人胥會山水窮遊良辰美景賞心樂事有一於此宜其識之立石刊文以示來者於時嵗次乙卯保大十三年三月日東海徐鉉記
