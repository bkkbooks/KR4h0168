front:
  text: 全唐文欽定全唐文卷五百六十三韓愈十七
  hash: sha256:aa781aa7c07aaf677ada5560928f45daa34ebc68320c48926078cde9b3de6a9a
body:
  text: 有女奴抱嬰兒來致其主夫人之語曰妾張圓之妻劉也妾夫常語妾云吾常獲私於夫子且曰夫子天下之名能文辭者凡所言必傳世行後今妾不幸夫逢盜死途中將以日月葬妾重哀其生志不就恐死遂沈泯敢以其稚子汴見先生將賜之銘是其死不為辱而名永長存所以蓋覆其遺允子若孫且死萬一能有知將不悼其不幸於土中矣又曰妾夫在嶺南時嘗疾病泣語曰吾志非不如古人吾才豈不如今人而至於是而死於是耶若爾吾哀必求夫子銘是爾與吾不朽也愈既哭弔辭遂敘次其族世名字事始終而銘曰君字直之祖歡父孝新皆為官汴宋閒君嘗讀書為文辭有氣有吏才嘗感激欲自奮拔樹功名以見世初舉進士再不第因去事宣武軍節度使得官至監察御史坐事貶嶺南再遷至河中府法曹參軍攝虞鄉令有能名進攝河東令又有名遂署河東從事絳州闕刺史攝絳州事能聞朝廷元和四年秋有事適東方既還八月壬辰死於汴城西雙邱年四十有七明年一月日葬河南偃師妻彭城人世有衣冠祖好順泗州刺史父泳卒蘄州別駕女四人男一人嬰兒汴也是為銘公諱啓字某河南人其大王父融王父琯仍父子為宰相融相天后事遠不大傳琯相元宗肅宗處艱難中與道進退薨贈太尉流聲於茲父乘仕至祕書少監贈太子詹事公胚胎前光生長食息不離典訓之內目擩耳染不學以能始為鳳翔府參軍尚少人吏迎觀望見咸曰真房太尉家子孫也不敢弄以事轉同州澄城丞益自飾理同官憚伏衛晏使嶺南黜陟求佐得公擢摘良姦南土大喜還進昭應主簿裴胄領湖南表公為佐拜監察御史部無遺事胄遷江西又以節鎮江陵公一隨遷佐胄纍功進至刑部員外郎賜五品服副胄使事為上介上聞其名徵拜虞部員外在省籍籍遷萬年令果辨憿絶貞元末王叔文用事材公之為舉以為容州經略使拜御史中丞服佩視三品管有嶺外十三州之地林蠻洞蜒守條死要不相漁劫稅節賦時公私有餘削衣貶食不立資遺以班親舊朋友為義在容九年遷領桂州封清河郡公食邑三千戶中人使授命書應待失禮客主違言徵二太僕未至貶虔州長史而坐使者以疾卒官年五十九其子越能輯父事無失謹謹致孝既葬碣墓請銘銘曰房氏二相厥家以聞條葉被澤况公其孫公初為吏亦以門庇佐使於南乃始已致既辦萬年命屏容服功緒卓殊氓獠循業維不順隨失署亡資非公之怨銘以著之子厚諱宗元七世祖慶為拓跋魏侍中封濟陰公曾伯祖奭為唐宰相與褚遂良韓瑗俱得罪武后死高宗朝皇考諱鎮以事母棄太常博士求為縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號為剛直所與遊皆當世名人子厚少精敏無不通達逮其父時雖少年已自成人能取進士第嶄然見頭角衆謂柳氏有子矣其後以博學宏詞授集賢殿正字俊傑廉悍議論證據今古出入經史百子踔厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之貞元十九年由藍田尉拜監察御史順宗即位拜禮部員外郎遇用事者得罪例出為刺史未至又例貶州司馬居閒益自刻苦務記覽為詞章泛濫停蓄為深博無涯涘一自肆於山水閒元和中嘗例召至京師又偕出為刺史而子厚得柳州既至歎曰是豈不足為政耶因其土俗為設教禁州人順賴其俗以男女質錢約不時贖子本相侔則沒為奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭足相當則使歸其質觀察使下其法於他州比一歲免而歸者且千人衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀其召至京師而復為刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜疏願以柳易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕悅酒食游戲相徵逐詡詡強笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髮比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍為而其人自視以為得計聞子厚之風亦可以少愧矣子厚前時少年勇於為人不自貴重顧藉謂功業可立就故坐廢退既退又無相知有氣力得位者推挽故卒死於窮裔材不為世用道不行於時也使子厚在臺省時自持其身己能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮然子厚斥不久窮不極雖有出於人其文學辭章必不能自力以致必傳於後如今無疑也雖使子厚得所願為將相於一時以彼易此孰得孰失必有能辨之者子厚以元和十四年十一月八日卒年四十七以十五年七月十日歸葬萬年先人墓側子厚有子男二人長曰周六始四歲季曰周七子厚卒乃生女子二人皆幼其得歸葬也費皆出觀察使河東裴君行立行立有節概重然諾與子厚結交子厚亦為之盡竟賴其力葬子厚於萬年之墓者舅弟盧遵遵涿人性謹慎學問不厭自子厚之斥遵從而家焉逮其死不去既往葬子厚又將經紀其家庶幾有始終者銘曰是惟子厚之室既固既安以利其嗣人公諱道古字某曹成王子其先王明以太宗子王曹絶輒復封五世而至成王成王諱皋有功建中貞元閒以多才能能行賞誅為名至今追數當時內外文武大臣成王必在其閒公以進士舉及第獻文輿三十卷拜校書郎集賢學士四遷至宗正丞憲宗即位選擢宗室遷尚書司門員外郎以選為利隨唐睦州刺史遷少宗正元和九年以御史中丞持節鎮黔中十一年來朝遷鎮鄂州以鄂嶽道兵會平淮西以功加御史大夫十三年徵拜宗正轉左金吾上即位以先朝時嘗信佞人柳泌能燒水銀為不死藥薦之泌以故起閭閻氓為刺史不效貶循州司馬其年九月三日以疾卒於貶所年五十三長慶元年詔曰左降而死者還其官以葬遂以其年某月日葬於東都某縣公三娶元配韋氏諱修修生子紘紘為進士學女貢嫁崔氏夫人隋雍州牧鄖公叔裕五世孫父士佺蓬山令次配崔氏諱藥生綽紹綰女會嫁鄭氏季毗夫人父昭嘗為京兆尹今夫人韋氏無子父光憲光祿卿其葬用古今禮以元配韋氏夫人祔而葬次配崔氏夫人於其域異墓公宗室子生而貴富能學問以中科取名善自傾下以交豪傑身死賣宅以葬銘曰太支於今其尚有封當公弟兄未續又亡其遷於南年及始衰雖黜不復而以喪歸海豐彌彌萬年于畿載其始終以哀表之君諱㣥字宏之世為滎陽人其祖於元魏時有假封襄城公者子孫因稱以自別曾祖匡時晉州霍邑令祖千尋彭州九隴丞父迪鄂州唐年令娶河南獨孤氏女生二子君其季也以進士選吏部考功所試判為上等授正字自鄠縣尉拜監察御史佐鄂嶽使裴均之為江陵以殿中侍御史佐其軍均之徵也遷虞部員外郎均鎮襄陽復以君為襄府左司馬刑部員外郎副其支度使事均卒李夷代之因以故職留君歲餘拜復州刺史遷祠部郎中會衢州無刺史方選人君願行宰相即以君應詔治衢五年復入為庫部郎中行及揚州遇疾居月餘以長慶元年八月二十四日卒春秋六十即以其年十一月二十二日從葬於鄭州廣武原先人之墓次君天性和樂居家事人與待交遊初持一心未嘗變節有所緩急曲直薄厚疏數也不為翕翕熱亦不為崖岸斬絶之行俸祿入門與其所過逢吹笙彈箏飲酒舞歌詼調醉呼連日夜不厭費盡不復顧問或分挈以去一無所愛惜不為後日毫髮計留也遇其空無時客至清坐相看或竟日不能設食客主各自引退亦不為辭謝與之遊者自少及老未嘗見其顏色有若憂歎者豈列禦寇莊周等所謂近於道者耶其治官守身又極謹慎不挂於過差去官而人民思之身死而親故無所怨議哭之皆哀又可尚也初娶吏部侍郎京兆韋肇女生二女一男長女嫁京兆韋詞次嫁蘭陵蕭瓚後娶河南少尹趙郡李則女生一女二男其餘男二人女四人皆幼嗣子退思韋氏生也銘曰再鳴以文進塗闢佐三府治藹厥蹟郎官郡守愈著白洞然渾朴絶瑕謫甲子一終返元宅公諱戎字元夫其上祖懿為晉安西將軍實始居河東公之四世祖嗣汾陰公諱德儒為隋襄城郡書佐以卒襄城有子二人皆貴其後皆蕃以大而其季尤盛官至邠州刺史邠州諱寶允有子九人皆有名位其最季諱縑為河南令以卒河南有子四人其長諱同卒官湖州長史贈刑部尚書尚書娶吳郡陸景融女有子五人皆有名蹟其達者四人公於倫次為中子仁孝慈愛忠厚而好學不應徵舉沈浮閭巷閒不以事自纍為貴常州刺史李衡遷江西觀察使曰州客至多莫賢元夫吾得與之俱足矣即署公府中職公不辭讓年四十餘始脫褐衣為吏衡遷給事中齊映自桂州以故相代衡為江西公因留佐映治映卒湖南使李巽福建使柳冕交表奏公自佐詔以公與冕在冕府纍遷殿中侍御史冕使公攝泉州冕文書所條下有不可者公輒正之冕惡其異於己懷之未發也遇馬總以鄭滑府佐忤中貴人貶為泉州別駕冕意欲除總附上意為事使公桉置其罪公歎曰公乃以是待我我始不願仕者正為此耳不許冕遂大怒囚公於浮屠寺而致總獄事聞遠近值冕亦病且死不得已俱釋之冕死後使至奏公自副又副使事於浙東府轉侍御史元和四年徵拜尚書刑部員外郎遷河南令歷衢湖常三州刺史所至以廉直寬大為稱朝廷嘉之某年拜越州刺史兼御史中丞浙東觀察使至則悉除去煩弊儉出薄入以致和富部刺史得自為治無所牽制四境之內竟歲無一事公篤於恩義盡用其祿以周親舊之急有餘頒施之內外親無疏遠皆家歸之疾病去官長慶元年九月庚申至於蘇州以卒春秋七十五奏至天子為之罷朝贈左散騎常侍使臨弔祭之士大夫多相弔者以其年十一月庚申葬於河南偃師先人之兆次以韋氏夫人祔公凡再娶先夫人京兆韋氏後夫人趙郡李氏皆先卒子男二人曰沂曰洽長生九歲而幼七歲矣女四人皆已嫁愈既與公諸昆弟善又嘗代公令河南公之葬也故公弟集賢殿學士尚書刑部侍郎放屬豫以銘其文曰薛氏近世莫盛公門公倫五人咸有顯聞公之初志不以事纍僶俯以隨亦貴於位無怨無惡中以自寶不能百年曷足謂壽公宜有後有二稚子其佑成之公食廟祀楚國夫人姓翟氏故檢校御史大夫宋州刺史良佐之女今司徒兼中書令許國公之妻前鄜坊節度使散騎常侍兼御史大夫公武之母夫人在家以孝友聰明為父母所偏愛選所宜歸以適韓氏韓氏族大且貴又太尉劉公甥內外尊顯夫人入門上下莫不贊賀事皇姑齊國太夫人肅恭誠至奉養不怠皇姑以夫人能盡婦道稱之六親其事夫義以順其教子愛以公司徒公曰我之能守貴富不危溢者楚國有助焉耳大夫領梁偏師卒就蔡功受節居藩為邦家令人父母之教然也夫人以元和十四年十一月一日薨於鄜之公府春秋若干大夫委節去位奉喪以居東都詔起之辭以羸毀不任即命又加喻勉固不變天子嗟歎之長慶二年三月某日葬夫人於洛陽北山夫人生二子長曰肅元為太子司議郎以卒贈尚書主客郎中其次大夫公武也銘曰翟氏之先蓋出宗周璜顯於魏以佐文侯高陵相漢義以家酬遷於南陽始自郎苗逮魏晉宋代不絶史以至夫人太守之子司徒之妻大夫之母公居河東子在鄜畤為王屏翰有壤千里公曰姑止以承我祀子曰母兮莫我撫已文駟雕軒往來有煒莫尊於母莫榮於妻從古迄今孰盛與夷用昭厥裔篆此銘詩國子司業竇公諱牟字某六代祖敬遠嘗封西河公大父同昌司馬比四代仍襲爵名同昌諱允生皇考諱叔向官至左拾遺溧水令贈工部尚書尚書於大歷初名能為詩文及公為文亦最長於詩孝謹厚重舉進士登第佐六府五公八遷至檢校虞部郎中元和五年真拜尚書虞部郎中轉洛陽令都官郎中澤州刺史以至司業年七十四長慶二年二月丙寅以疾卒其年八月某日葬河南偃師先公尚書之兆次初公善事繼母家居未出學問於江東尚幼也名聲詞章行於京師人遲其至及公就進士且試其輩皆曰莫先竇生於時公舅袁高為給事中方有重名愛且賢公然實未嘗以干有司公一舉成名而東遇其黨必曰非我之才維吾舅之私其佐昭義軍也遇其將死公權代領以定其危後將盧從史重公不遣奏進官職公視從史益驕不遜僞疾經年輿歸東都從史卒敗死公不以覺微避去為賢告人公始佐崔大夫縱留守東都後佐留守司徒餘慶歷六府五公文武細粗不同自始及終於公無所悔望有彼此言者六府從事幾且百人有願姦易險賢不肖不同公一接以和與信卒莫與公有怨嫌者其為郎官令守慎法寬惠不刻教誨於國學也嚴以有禮扶善遏過益明上下之分以躬先之恂恂愷悌得師之道公一兄三弟常㣥庠鞏常進士水部員外郎朗夔江撫四州刺史㣥以處士徵自吏部郎中拜御史中丞出帥黔容以卒庠三佐大府自奉先令為登州刺史鞏亦進士以御史佐淄青府皆有才名公子三人長曰周餘好善學文能謹謹致孝述父之志曲而不黷次曰某曰某皆以進士貢女子三人愈少公十九歲以童子得見於今四十年始以師視公而終以兄事焉公待我一以朋友不以幼壯先後致異公可謂篤厚文行君子矣其銘曰后緡竇逃閔腹子夏以再家竇為氏聖愕旋河犢引比相嬰撥漢納孔軌後去觀津而家平陵遙遙厥緒夫子是承我敬其人我懷其德作詩孔哀質於幽刻孔子之後三十八世有孫曰戣字君嚴事唐為尚書左丞年七十三三上書去官天子以為禮部尚書祿之終身而不敢煩以政吏部侍郎韓愈常賢其能謂曰公尚壯上三留奚去之果曰吾敢要君吾年至一宜去吾為左丞不能進退郎官惟相之為二宜去愈又曰古之老於鄉者將自佚非自苦閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨來往也今異於是公誰與居且公雖貴而無留資何恃而歸曰吾負二宜去尚奚顧子言愈面歎曰公於是乎賢遠於人明日奏疏曰臣與孔戣同在南省數與相見戣為人守節清苦論議正平年才七十筋力耳目未嘗衰老憂國忘家用意至到如戣輩在朝不過三數人陛下不宜苟順其求不留自助也不報明年長慶四年正月己未公年七十四告薨於家贈兵部尚書公始以進士佐三府官至殿中侍御史元和元年以大理正徵纍遷江州刺史諫議大夫事有害於正者無所不言加皇太子侍讀改給事中言京兆尹阿縱罪人詔奪京兆尹三月之俸權知尚書右丞明年拜右丞改華州刺史明州歲貢海蟲淡菜蛤蚶可食之屬自海抵京師道路水陸遞夫積功歲為四十三萬六千人奏疏罷之下邽令笞外桉小兒繫御史獄公上疏理之詔釋下邽令而以華州刺史為大理卿十二年自國子祭酒拜御史大夫嶺南節度等使約以取足境內諸州負錢至二百萬悉放不收蕃舶之至泊步有下碇之稅始至有閲貨之燕犀珠磊落賄及僕隸公皆罷之絶海之商有死於吾地者官藏其貨滿三月無妻子之請者盡沒有之公曰海道以年計往復何月之拘苟有驗者悉推與之無算遠近厚守宰俸而嚴其法嶺南以口為貨其荒阻處父子相縛為奴公一禁之有隨公吏得無名兒蓄不言官有訟者公召殺之山谷諸黃世自聚為豪觀吏厚薄緩急或叛或從容桂二管利其虜掠請合兵討之冀一有功有所指取當是時天子以武定淮西河南北用事者以破諸黃為類向意助之公屢言遠人急之則惜性命相屯聚為寇緩之則自相怨恨而散此禽獸耳但可自計利害不足與論是非天子入先言遂斂兵江西嶽鄂湖南嶺南會容桂之吏以討之被霧露毒相枕藉死百無一二還安南乘勢殺都護李象古桂將裴行立容將楊旻皆無功數月自死嶺南囂然祠部歲下廣州祭南海廟廟入海口為州者皆憚之不自奉事常稱疾命從事自代惟公歲常自行官吏刻石為詩美之十五年遷尚書吏部侍郎公之北歸不載南物奴婢之籍不增一人長慶元年改右散騎常侍二年而為尚書左丞曾祖諱務本滄州東光令祖諱如圭海州司戶參軍贈尚書工部郎中皇考諱岑父祕書省著作佐郎贈尚書左僕射公夫人京兆韋氏父种大理評事有四子長曰溫質四門博士遵孺遵憲溫裕皆明經女子長嫁中書舍人平陽路隋其季者幼公之昆弟五人載戡戢瞿戈公於次為第二公之薨戢自湖南入為少府監其年八月甲申戢與公子葬公於河南河陰廣武原先公僕射墓之左銘曰孔氏卅八吾見其孫白而長身寡笑與言其尚類也莫與之倫德則多有請考於文公諱仲舒字宏中少孤奉其母居江南游學有名貞元十年以賢良方正拜左拾遺改右補闕禮部考功吏部三員外郎貶連州司戶參軍夔州司馬佐江陵使改祠部員外郎復除吏部員外郎遷職方郎中知制誥出為峽州刺史遷廬州未至丁母憂服闋改婺州蘇州刺史徵拜中書舍人既至謂人曰吾老不樂與少年治文書得一道有地六七郡為之三年貧可富亂可治身安功立無愧於國家可也日日語人丞相聞問語驗即除江南西道觀察使兼御史中丞至則奏罷榷酒錢九千萬以其利與民又罷軍吏官債五千萬悉焚簿文書又出庫錢二千萬以丐貧民遭旱不能供稅者禁浮屠及老子為僧道士不得於吾界內因山野立浮屠老子象以其誑丐漁利奪編人之産在官四年數其蓄積錢餘於庫米餘於廩朝廷選公卿於外將徵以為左丞吏部已用薛尚書代之矣長慶三年十一月十七日未命而薨年六十二天子為之罷朝贈左散騎常侍遠近相弔以四年二月某日葬於河南某縣先塋之側公之為拾遺朝退天子謂宰相曰第幾人非王某耶是時公方與陽城更疏論裴延齡詐妄士大夫重之為考功吏部郎也下莫敢有欺犯之者非其人雖與同列未嘗比數收拾故遭讒而貶在制誥盡力直友人之屈不以權臣為意又被讒而出元和初婺州大旱人餓死戶口亡十七八公居五年完富如初桉劾㣥吏奏其贓罪州部清整加賜金紫其在蘇州治稱第一公所至輒先求人利害廢置所宜閉閣草奏又具為科條與人吏約事備一旦張下民無不抃叫喜悅或初若小煩旬歲皆稱其便公所為文章無世俗氣其所樹立殆不可學曾祖諱元暕比部員外郎祖諱景肅丹陽太守考諱政襄鄧等州防禦使鄂州采訪使贈工部尚書公先妣渤海李氏贈渤海郡太君公娶其舅女有子男七人初哲貞宏泰復洄初進士及第哲文學俱善其餘幼也長女壻劉仁師高陵令次女壻李行修尚書刑部員外郎銘曰氣鋭而堅又剛以嚴哲人之常愛人盡已不倦以止乃吏之方與其友處順若婦女何德之光墓其有石我最其績萬世之藏君諱繼祖司徒贈太師北平莊武王之孫少府監贈太子少傅諱暢之子生四歲以門功拜太子舍人積三十四年五轉而至殿中少監年三十七以卒有男八人女二人始豫初冠應進士貢在京師窮不自存以故人稚弟拜北平王於馬前王問而憐之因得見於安邑里第王軫其寒飢賜食與衣召二子使為之主其季遇我特厚少府監贈太子少傅者也姆抱幼子立側眉眼如畫髮漆黑肌肉玉雪可念殿中君也當是時見王於北亭猶高山深林巨谷龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子娟好靜秀瑤環瑜珥蘭茁其芽稱其家兒也後四五年吾成進士去而東遊哭北平王於客舍後十五六年吾為尚書都官郎分司東都而分府少傅卒哭之又十餘年至今哭少監焉嗚呼吾未耋老自始至今未四十年而哭其祖子孫三世於人世何如也人欲久不死而觀居此世者何也樊紹述既卒且葬愈將銘之從其家求書得書號魁紀公者三十卷曰樊子者又三十卷春秋集傳十五卷表箋狀策書序傳記紀志說論今文讚銘凡二百九十一篇道路所遇及器物門里雜銘二百二十賦十詩七百一十九曰多矣哉古未嘗有也然而必出於已不襲蹈前人一言一句又何其難也必出入仁義其富若生蓄萬物畢具海含地負放恣橫從無所統紀然而不煩於繩削而自合也嗚呼紹述於斯術其可謂至於斯極者矣生而其家富貴長而不有其藏一錢妻子告不足顧且笑曰我道蓋是也皆應曰然無不意滿嘗以金部郎中告哀南方還言某師不治罷之以此出為帛丿糸州刺史一年徵拜左司郎中又出刺絳州帛丿糸絳之人至今皆曰於我有德以為諫議大夫命且下遂病以卒年若干紹述諱宗師父諱澤嘗帥襄陽江陵官至右僕射贈某官祖某官諱泳自祖及紹述三世皆以軍謀堪將帥策上第以進紹述無所不學於辭於聲天得也在衆若無能者嘗與觀樂問曰何如曰後當然已而果然銘曰惟古於詞必已出降而不能乃剽賊後皆指前公相襲從漢迄今用一律寥寥久哉莫覺屬神徂聖伏道絶塞既極乃通發紹述文從字順各識職有欲求之此其躅公諱郱字某雍王繪之後王孫道明唐初以屬封淮陽王又追王其祖父曰雍王長平王淮陽王生景融景融親益疏不王生務該務該生思一思一生岌比四世官不過縣令州佐然益讀書為行為士大夫家岌為蜀州晉原尉生公未晬以卒無家母抱置之姑氏以去姑憐而食之至五六歲自問知本末因不復與㣥兒戲常默默獨處曰吾獨無父母不力學問自立不名為人年十四五能暗記論語尚書毛詩左氏文選凡百餘萬言凜然殊異姑氏子弟莫敢為敵浸傳之聞諸父諸父泣曰吾兄尚有子耶迎歸而坐問之應對橫從無難諸父悲喜顧語㣥子弟曰吾為汝得師於是縱學無不觀以朝邑員外尉選魯公真卿第其所試文上等擢為同官正尉曰文如李尉乃可望此其後比以書判拔萃選為萬年尉為華州録事參軍爭事於刺史去官為陸渾令河南尹鄭餘慶薦之朝拜南鄭令尹家奴以書抵縣請事公走府出其書投之尹前尹慚其庭中人曰令辱我令辱我且曰令退遂怨之拾掇三年無所得拜宗正丞宰相以文理白為資州刺史公喜曰吾將有為也讒宰相者言之上曰是與其故故得用改拜陜府左司馬公又喜曰是官無所職吾其不以吏事受責死矣長慶元年正月丙辰以疾卒春秋七十三公內外行完潔白奮厲再成有家士大夫談之夫人博陵崔氏朝邑令友之之女其曾伯父元暐有功中宗時夫人高明遇子婦有節法進見侍側肅如也七男三女邠為澄城主簿其嫡激鄜城令放芮城尉漢監察御史滻滉潘皆進士及公之存內外孫十有五人五月庚申葬華陰縣東若干里漢韓氏壻也故豫與為銘其詞曰愈下而微既極復飛其自公始公多孫子將復廟祀
