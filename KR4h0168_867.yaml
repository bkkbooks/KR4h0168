front:
  text: 全唐文欽定全唐文卷八百六十七楊夔二
  hash: sha256:1f8c2530f47a6a1061898a82d55b945b2aa4d76b301008226cc176cc32a1d816
body:
  text: 故相國趙郡李公諱紳寶歷中廉問會稽日以吳興僧大光有神異之迹為碑文托郡守敬公建立於卞山法華寺會昌中詔毀佛寺此寺隨廢時縣令李式其碑述相國先人曾宰烏程遂移立於縣之東亭迨今五十載其碑毀折汝南周生以明經賜命重宰烏程覩其廢逸遂求於故老獲舊文比類於折碑所失者數字因重刊於石所闕文字不敢臆續蓋所以避不敏遵宣聖不知而作之誡也兼其舊傳云東亭之池始相國誕於縣署學弄之歲乳母惰於保持俾相國墜於池人莫之覺食頃如有物翼出於池面家人方得以拯焉衆方懾駭而相國笑語無替於平日人咸異焉初有石數尺勒其事歲月綿遠石失其處故汝南生廣其亭濬其池再刻其碑重敘厥由蓋欲存縣之故事也生中和初宰此邑及朞而代居閒閉關淡薄自得郡帥隴西公潛使人伺其所為知其安於貧樂於道閱百代而自娛未嘗以闕物為撓由是官有乏必俾承乏而生所至以靜理聞癸丑夏復詔生宰烏程民吏欣欣再遇寬政閣鞭聽訟事簡庭閒君子哉汝南學古入仕有其經矣生家於陽羨數世以經明獲祿後㣥從昆弟並一舉而捷凡浙右之士因以嚮風國庠聞其名咸亦推先焉夫善為政者雖欲人安而俗阜必當於事有立於意不忘以羽翼厥道也今徭賦既調風俗既安逋逸有歸惸孑有依然後搜遺文刊墜碑此所以見興廢之心也建新亭疏洿池此所以見繼絕之志也於戲當大兵之後民困於繁役克俾其民康其務均俗固母視於尹長矣今施政之暇人有餘力然後興起廢墜彰明故事非圖遠經久者孰能為此哉生既重立大光上人之碑遂命某紀其年月別立於石且以旌新亭之興替有自也宏農子始卜居於前溪得地數畝構草堂竹齋植修篁竹齋之前有地周三十步因命僮執鍤穴為池焉逗前溪餘派以漲之流或時涸則汲井以滿環池樹菊及諸菜果可以左右俎机者暇則散襟曳笻修吟自怡或從風微瀾或因雨暗溢則江湖之思滿目矣宏農子性潔不喜淆雜故一卉一木爽靜在眼前池之上未嘗許片葉寸梗頃刻浮泛以是耕僮頗厭其役客有知者誚其勤懇跬步之地何所裨哉廣不袤丈深不逾雉竭其水不足以澤生物窮其深不足以安龜鼈無蒲藻以潛其魚無波瀾以方其舟孜孜矻矻虛耗僮力言未訖宏農子舉頤而答曰爾以此小而無用乎以其潔而魚鼈不宅乎以其狹而舟艥非便乎吾豈不欲深及於淵以滋液畦圃耶豈不欲周植其蒲以繁育魚蝦耶豈不欲廣導其流以乘風沿泝耶吾恐利於生植其見乎疏決無窮矣聚夫鱗甲則動夫竭澤之魚矣湊其舟艥則起夫濟涉之爭矣矧夫植其物則有北資菉以盜其澤者叢其藻則有虺蜮以附其伏者利其濟則有重載以掇其溺者嘻水之利也衆矣其害也亦深矣故吾所以獨潔此沼亦以鏡其心也將欲撓之而愈明揚之而不波決之而不流俾吾性終始對此而不渝豈效夫瀦其水以豢鱗蓄介為艬一作巉僭之備亦曰池而已矣叔孫昭子聘於晉晉受邾人之愬執昭子寘於箕使吏藩之昭子不以拘為意止之舍有壞必葺去之如始至故春秋賢之今有受九重之命母百里之民凋瘵者繫之以綏訛弊者藉之以移既休於公館覩其隳摧圯漏忍而不治者無乃取譏於君子乎丹陽余公以再命尹於烏程降車之期月察訟決獄之暇周視縣署其門傾其廳欹其牆其廡偃頺簷側楹倒移相倚風雨罔庇寒暑是窘公歎曰建之者何人壞之者何心既叨守邑其敢不力自懋以圖嗣修乎然屬天末悔亂兵火猶熾專城而居者其可無備乎故我郡儲甲數萬以戒不虞而軍須軍餼僉賦於縣務繁力匱久莫克舉公乃宵分而寐五鼓而興行忖坐惟不遑所安近越於時方克僝功於是節冗費之用鳩贖辟之金僦力於農休徵功以厚賞聽斷之餘策杖以巡慰其勞者勗其惰者設茗及飧日自省視由是工操其斧如蟻集羶傭運其材如水赴泜財以儉而蘊故其用給人以悅而使故其功倍不期年而衆宇鼎新矣有若換大門中門修大廳小廳東閣西閣新押司錄事院建人吏祗候房砌縣之外城凡百餘雉剏宅之周垣近一百堵修衆寮之宅五造廳庫之橋六疏西亭之汙池制公廨之什物有遺罔不增構其尤赫赫者如每歲徵賦主胥類於廳之西廡以其輸賦駢湊逋逸是虞乃編筠接軒權間隔之訖賦則毀去厥費頗夥公乃增廡之一楹構木為欄以限其內外俾永絕妄耗此以見公謀之經久也縣之西北隅舊有帳院蓋鄉吏團集里書之所歲月綿遠崩陊無幾每遇霖潦則束席就燥以避其霑濕亦有時矣加以往來者御奔走泥淖之患舉邑是病無戶而革公於是歷揆其損以籌完葺正傾支摧增新易壞類夫重構復建修廊以達於都門雨有依暑有庇從役者不知其勞矣此以見公情之恤下也公帑摧敗下冗下濕周垣雖設腐不為固易所以刺慢蓄而誘盜也公乃擇堅以革枯選宏而化陋厚厥墉嚴厥闕此以見公志之防閑也縣之圜扉頹垝莫治彼犯大辟得繫者豺狼野心脫走是勝苟閈閎不謹牆垣不慎是遺肉於虎吻也或有縶墮事由微眚蓋俾其懷過而省非也豈使敵於見善毒於暱枕哉而糞壤狼籍穢不可邇彼罪無輕重俱執於此不其酷歟公乃剗積弊滌宿汙明壞牖圩毀墉席以潔其榻食以茹其餒苟獲戾而入如宴於此以見公之處心愛物也先是縣之秋曹尉蘇許公頲釋褐之官也公始至兼戎曹務遇上已節郡有角觝之戲郡守出觀則司戎者職其事因乘小艇往來以檢馭不整郡治之南溪波浩洋許公馭檝以涉而舟覆焉衆皆駭惋謂不可援俄聞空中有言曰無損蘇公忽有幹流以出其舟而許公存焉彼同溺者俱不為水困俗旌其地為蘇公潭大歷中縣令李晤則故相國紳之先也相國誕於縣署幼弄之歲墜於縣之東池逾數刻忽若有物翼出於池面相國畧不為苦二者皆縣之故事而圖經不載公乃檄請於邑人太學博士邱光庭編緝遺墜其或善未書能未紀者罔不畢錄此以見公興廢而繼絕也凡此數事豈前政之未知乎抑知而不為乎非公勤於理敏於用視公猶私曉夕匪懈何以及此哉始公之臨承授政之後人稔於易衆務煩猥綱在而目紊公迺肅之以整嚴之以恪遏強字弱優老恤匱旌別枉直屏空奸慝不逾月而法令如一勸賞分明清靜簡當內外祗肅鞭朴閣於庭爭訟息於野宣尼所謂慢則糾之以猛猛則濟之以寬猛寬相濟者余公得之矣前是公纔再稔而報代鄉之老肆之長咸賴撫導數百人列狀牆立於郡庭以乞畱太守隴西公以代其任者特勅之命不可有滯然私器其能頗自憾不偶良吏以共育尫瘠公遂退寓於德清屬邑駕水軒釀春醪治蔬圃修釣艇以吟醉自逸明年冬為縣者以譴停其任杖媒依勢求代用者檄累於几上隴西公至而弗視且曰烏有民病方急而擯良醫乎遂飛簡以召公洎其至隴西公提印以授曰子之前治邑其及物之澤被於㕓野未得盡子之術貽吾中悔今還舊邑其為我撫其疲遏其酋俾民獲蘇無替初心公三讓而后即縣張弦易調新其戶牖剔蠧抉弊刮垢磨頑不次不序咸復舊貫凡利於民濟於公事無巨細必自我始丙辰春公將受代吏民等以為受其教庇而忘諸載祀俾後之人不得詳其俶落是食其旨廋其處也於是列其狀謁言於宏農楊夔夔學於春秋固當以紀功書績為勇公前任日崇修先聖之祠為文讚功刻石於縣岸今復紀此宏烈蓋欲慰縣人久久之虔思也況公以民吏之勤請不可拒絕兼凡所革易剏製皆力殆心罄而后克濟且慮夫什器後之人不同乎慎惜也恐其傾陊後之人不同乎繕治也苟沮衆請何以鏡將來耶由是採石鐫勒之費莫不悉自於清俸益以見慎而有立也嗣厥理者可不懋乎乾寧丙辰秋七月記天祐丁卯歲月直辛亥有星自積水流入於輿鬼知天者曰輿鬼之宿是為鶉首於辰在未之衡日丑為星紀則牛斗之分也據茲星祥秦之鄣郡漢之丹陽其有水為沴乎厥應當在戊辰之丁巳明年夏四月辛丑宣歙睦雨周一甲子平地水丈餘四日而後止新安郡之新城繼為暴水所汨雉堞咸圯郡帥太尉潯陽公周視其壞色沮神戚將捐去而莫修則功存之可祕也將徵役以完舊則民勩之可憚也迨於兩月不遑發命又念強敵未殄方礪鏃伺間豈可惜費重力慢蓄輕守以速寇心乎秋八月乃頒役於五邑先降簡於邑令且誡其程功無使隱民厄於豪族擅諸利俾率怨於下以益上者匪德也邑令承命躬自閱籍功之延促事之繁簡由窶向豐罔有弗均於是五邑之民不再命而鹿君至於新城之下凡板幹畚築之用皆未令而具初公巡壘觀設審頤厥由且歎其雖新水之異以害茲城亦始構之疎以稔其失也烏有於泛沙流石之上而能為永永之基哉乃命指揮使劉贇徐璋三城使朱環及節級等各畫分而督役遂諭以城之舊址浮而斯濫今當發深一仞抉去砂石實以精壤重加鎮築然後廣其宿基增諸石版必使堅永侔於鐵壁役或務則民瘃築或務慼慼則民疲弗弗慼繫爾曹寬猛之有中也無以苛忍相矜無以遄速為代諸侯受教夙夜胥勗勉於恪勤以勵厥躬故執畚者繩繩操斧者詵詵輦壤輸財蟻列子臻笑語忻忻爭先有期自旭及晡役未嘗懈遠而望之則疊巘層巒屹如天設迫而視之則崇岡連阜捷若神化迴合叢倚崖束山抱建邦則險此焉是覯自八月庚子興役暨十月之壬寅而役罷工者函斧築者閤鍤太尉潯陽公建斾而巡諸乃曰城之完屋之新實麗實堅非諸邑之奉公焉得民不擾而力齊乎非諸校之盡節焉得役不煩而功速乎所以見二三子之忠勤以佑吾政也自公之臨是邦也法明而兵勁刑審而罰中故民樂其化安其土及徵庸而屬邑之民父誨其子兄教其弟以公之問俗也未嘗有猾吏之擾以公之撫封也未嘗有外寇之虞以公之治戎也葵藿之禁無敢有觸者以公之獎善也鱗介之美無敢有侵者故十五餘年綽綽焉如鱗之潛遇其廣淵雍雍焉若禽之獲棲其蒙翳絕釣網之慮無畢弋之患詩所謂愷悌君子民之父母見於我公矣今水壞城壘重興畚築苟或進退不副公之用是謂奸慈父之命其為悖戾神豈爾容哉故民不俟令而爭集不勞促而自課非恩信之昭感何以迨乎此哉於戲事有奇績有異不克稱頌以流於裔秉筆者之過也閿鄉楊夔自勝弁力學以暨於髮落齒墮屬茲喪亂洎在民伍獲承公殊衆之遇每歎其有志無時許將其促鱗弱介遊泳於豐沼無以酬獎之意敢撰重築新城記以獻時歲在降婁周正之月十一日記予讀周書至武王滅紂倒戈歸馬示天下不復用跡其事惑焉以武王之聖有望旦之輔滅獨夫紂旌其功於一時可矣且曰終不復用其未然乎夫上古淳結繩知禁中古朴赭衣懷畏末俗巧嚴法不化故淳散而朴朴散而巧巧之變萬詐生焉則內荏外剛之心詎革於干戚之舞乎周之祚七百誠曰永久然以臣臨君以兵向闕者多矣齊桓南伐楚北伐戎晉文取叔帶於溫定襄王於鄭非二國崇示大順尊獎王室則周之社稷存若綴旒自漢而下有國者罔不以兵力秦以黷武而滅梁以無備而亡我太宗究滅亡之源委房杜以政房杜以天下之大不敢決於胸臆於是敢諫則先王魏論兵則讓英衞深謀宏法來代有準洎林甫即明皇既安之日隨旨順色以稔君惡乃以羯夷勇暴之卒專我兵柄竟使獸心為國禍本其為黷亂國常褻慢武義不亦甚乎且蒐苗獮狩所以講武經閱戎事也故曰預備其不虞有備而無患則武之道豈可一日而忘諸嗚呼班子之善斲不能以鉛刀攻其堅造父之善御不能以朽索制其逸則有國者可以棄兵乎子貢以管夷吾之奢晏平仲之儉質於宣尼宣尼以管仲之奢賢大夫也而難為上晏平仲賢大夫也而難為下蓋譏其僭上偪下之失或謂無所輕重予敢繼其末以論先後焉夫齊桓承襄公之失政接無知之亂常久亡於外自莒先入有國之後銳心以求其治及叔牙言夷吾之能脫囚服秉國政有鮑叔之助隰朋之佐遂能九合諸侯以成霸業此逢時之大者也若平仲者立於衰替之朝有田國之彊有欒高之侈時非曩時君非賢君當崔杼之弒也能挺然易其盟陳氏之大也能曉然商其短獨立於讒諂之伍自全於紛擾之中人無間言時莫與偶若桓公九合諸侯不以兵車信夷吾之力也使晏子居桓公之世有鮑隰之助則其尊周室霸諸侯功豈減於管氏乎以其鏤簋而朱紘孰若豚肩不掩豆以其三歸而反坫孰若一狐裘三十年矧國之破家之亡者以奢乎以儉乎語曰奢則不遜儉則固與其不遜也寧固然後知聖人輕重之旨斯在貞觀中文皇帝聽政之暇問房魏以創業守文之難易房對以創業魏對以守文蓋房以經綸之始備極勤劬所以見創業之難矣魏以升平之後率多懈怠所以見守文之難也然則創業之初雄豪未賓生民嗷嗷惟德是歸所以開基之主皆乘釁而起覩覆車之轍焉肯更循其軌哉當其雲雷未亨天地猶蒙龍虎交馳煙塵晝昏故得一士則前席以待問聞一言則傾耳而聳聽用人若不及從諫若轉圜勇於得而悚於失冒履鋒鏑涉歷險危其取也既勞其得也亦勤誠為創業之難也及乾坤霧霽山河有主四海之內罔不臣妾言而必從如影之附欲而必至如響之應愛之可以升九霄怒之可以擠九泉順意者駢肩逆耳者畏忌好惡之情不由其臧否賞罰之道匪關於功過下懾以求命衆怒而莫諫此所以為守文之難也然則自漢而下有天下者孰不始則孜孜以親萬機將徯乎治及時既平俗既康以泰自逸怠於庶務者多矣其終而不惰者則幾希矣且創業之主既得之後猶隳夙志以壞大業而況求既治之後即己安之朝其能納讜言任正人屈己以順衆抑心以從下者不亦鮮乎魏文貞公守文之難豈初心盈中心昃也總而論之療饑者易為食其創業乎醫者難為藥其守文乎文選樓者梁昭明太子選文之地時逾四代年將五百清風懿號藹然不泯況廣陵乃隋室故郡遺事斯存求之於今陳跡盡滅斯猶巍巍久而益新其不由以學而立道者道則不朽以文而經業者業則不磨乎宏農子經於是樓提筆路絕且慮夫不文不典者肆而處乃泣以銘云峩峩萬宇匪歌則舞美哉此樓獨以文修自由名貴不以華致雖超千古靡有顛墜孰堪其登必精必誠孰可以居必賢必明無聚優以為娛無習伎以稱榮吾恐其素德懷辱於冥冥搢紳先生牧於東郡繩屬吏有公於獄者某適次於座承間諮其所以為公之道先生曰吾每窺辭牒意其曲直指而付之彼能立具牘無不了吾意亦可謂盡其公矣某居席之末不敢以非是為決因退而辯其公且傳曰君所謂否臣獻其可君所謂可臣獻其否是謂彌縫其不至也及君可亦可君否亦否故平仲罪邱據踵君之意叔向譏樂王鮒從君者也所以智詢於愚以其或有得也尺先其寸或有長也皆庸其涓滴將助其廣大也況末世纎狡內外荏剛烏有不盡其辭而能必究其情乎使居上者得其情屬踵而詰之可謂合於理未足言公也忽居上者異於見遠於理亦隨而鞫之取叶於意所謂明於不法烏可為公哉且不師古之言非不可為也為之不能遠不由禮之事非不可行也行之不能久故君子盡心法古動必本禮將遠而不泥久而不亂也若乃告諸獄任意以為明其屬狥己以為公是使懷倖者有窺進之路挾邪者有自容之門矣矧藂之內辛苦備至何須而不克而況承執政指其所欲哉嗚呼欲人之隨意者吾見亂其曲直矣樂人之附已者吾見汨其善惡矣而猶伐其治譽其公無乃瞽者衒別諸五色乎晉室南遷制度草剏永嘉之後囂風未除廷臣中猶以謝鯤輕佻王澄曠誕競相祖習以為高達卞壼厲色於朝曰帝祚流移社稷傾蕩職茲浮偽致此隳敗猶欲崇慕虛誕汚蠧時風奏請鞫之以正頹俗王導庾亮抑之而止噫西晉之亂百代所悲移都江左是塞源端本之日也猶乃翼虛駕偽崇扇佻薄躡諸敗踪踵其覆轍以此剏立朝綱基構王業何異登膠船而泛巨浸操朽索以馭奔駟乎設使從卞壼之奏黜屏浮偽登進豪賢左右大法維持紀綱則晉亦未可量也其後王敦作逆蘇峻繼亂余以為晉之亂不自敦峻而稔於導亮或植蘭荃鄙不遄茂乃法圃師汲穢以溉而蘭淨荃潔非類乎衆莽苗既驟悴根亦旋腐噫貞哉蘭荃歟遲發舒守其元和雖瘠而茂也假雜壤亂其天真雖沃而斃也守貞介而擇祿者其蘭荃乎樂淫亂而偷位者其雜莽乎受莽之偽爵者孰若龔勝之不仕耶食述之僭祿者孰若管寧之不位耶嗚呼業圃者以穢為主而後見龔管之正敬亭叟家毒於鼠暴穿埇穴墉室無全宇咋囓篚筐帑無完物及賂於捕野者俾求狸之子必銳於家畜數日而獲諸汴歡逾得駿飾茵以棲之給鱗以茹之撫育之厚如字諸子其攫生搏飛舉無不捷鼠懾而殄影暴腥露羶縱橫莫犯矣然其野心常思逸於外罔以子育為懷一旦怠其紲逾垣越宇不知其所逝叟惋且惜涉旬不弭宏農子聞之曰野性匪馴育而靡恩非惟狸然人亦有旃梁武於侯景寵非不深矣劉琨於疋磾情非不至矣既負其誠復返厥噬嗚呼非所蓄而蓄孰有不叛哉天后幽中宗之後有不下閫闈移六合之志故徐敬業唐之奇等於揚州起兵以興復唐室然皆不旋踵而敗遂引用酷吏開羅織之門以懾伏內外一日狄梁公獨對天后曰吾自用俊臣思正來朝臣知所懼否梁公曰朝廷小人不達天命或有異議然陛下以木有一實之蠧將翦樹而棄之乎錦有一點之汙將全匹而燔之乎養隼者誠欲其鷙於烏鳶乎鷙於鸞皇乎鷙而無別不如不鷙矣天后默然衆曰善未必善觀其善之為也衆曰惡未必惡觀其惡之由也行詐以自衒取媚於小人其足為善乎任直以獨立取惡於非類其足為惡乎故擇善採於譽則多黨者進去惡信於言則道直者退王莽折已以下士而諸父失其權彼言善者可憑乎京房守正以極諫而嬖倖指為逆彼愬惡者可聽乎故能鑒其善者必觀於衆之所惡能鑒其惡者必取於衆之所善所以衆謂之悖也非孟子之賢無以旌章子之孝衆謂之智也非國僑之明無以誅史何之詐嗚呼道之大非遇於賢明何常不汨哉宏農子遊卞山之陰遇鄉叟巾不完履不全負薪仰天吁而復號因就訊諸抑有喪而未備乎抑有寃而莫訴乎何聲之哀而情之苦耶叟致薪而泣曰逋助軍之賦男獄於縣絕糧者三日矣今將省之前日之逋已貨其耕犢矣昨日之逋又質其少女矣今田瘠而貧播之莫稔貨之靡售且以為助軍之賦豈一一於軍哉今十未有二三及於戎費餘悉為外用又黠吏貪官盈縮萬變去無所之往無所資非敢懷生奈不死何宏農子聞其言且助其歎退而省於世萬類中最為民害者莫若虎之暴將賦之以警貪吏庶少救民病是夕夢鷙獸而人言曰爾欲警於貪將以吾為首雖爾之潔奈辱我之甚乎余曰賊人之畜以自飽腹爾不為貪哉獸曰不豢不農何以給生苟不捕野無實吾嗛吾以其饑而求食之苟或一飽則晏然匿跡不為謀矣豈爾曹智以役物豢之畜之畋之漁之以給其茹也桑之育之經之營之以供其用也一物之可求一貨之可圖汲汲為謀孜孜繫心如壑如溪莫滿莫盈豈與吾獲一飽則晏然熟寢而欲比方哉宏農子驚而寤諦而思若然則人不如獸也遠矣梁武平齊盡有其內獲侍兒十餘輩頗娛於目俄為郄后所察動止皆有隔抑拗其憤恚殆欲成疹左右識其情者進言曰臣嘗讀山海經云以鶬鶊為膳可以療其事使不忌陛下盍試諸梁武從之郄茹之後妒減殆半帝愈神其事左右復言曰願陛下廣羞諸以遍賜㣥臣使不才者無妒於有才挾私者不妒於奉公濁者不妒其清貪者不忌其廉俾其惡去勝忌前皆知革心亦助化之一端也帝深然其言將詔虞人廣捕之會方崇內典誡於血生其議遂寢
