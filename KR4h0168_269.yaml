front:
  text: 全唐文欽定全唐文卷二百六十九覿中宗朝官監察御史
  hash: sha256:abc8a9a9998013c0a7982cc9a9eb27c4a8c75d176f43f32e57d3641797bf2cf3
  markers:
  - {type: head, offset: 14, content: 王覿, id: KR4h0168_NFKB_269-h1, level: 1}
body:
  text: 臣覿言竊惟祔廟之禮在於尊祖奉先肅事之儀豈厭惟親與德伏見恩勅令安國相王與李多祚參乘且多祚夷人有功於國適可加之寵爵豈宜逼奉至尊將帝弟以連衡與吾君而共輦誠恐萬方之人不允所望昔文帝引趙談參乘袁盎伏車前曰天聞天子所共乘輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載於是斥而下之多祚雖無趙談之累亦非卿相之重不自循省無聞固讓豈國乏良輔更無其人史官所書將示於後何袁盎之強諫獨微臣之不及惟陛下詳擇焉夫立身之功莫大於行道行道之功莫大於逢時行道則孝悌才學有聞逢時則仁信機謀及物有其時無其材斯固自犬彘也有其材無其時得不憤心涕血歟則知無代無材計用與不用耳高祖起於沛光武起於南陽而籌畫功勳獨出豐宛之士蕭丞相從漢高入關封府藏而收圖籍房太尉從太宗征討捨珠玉而採人材二君子之材豈偶然也十八學士皆煬帝之臣曷闇於隋而明於唐是有其材而無其時矣如晦元齡止於一尉或非好去任或挂網徙邊禇亮虞南不離下位或嫉才見謫或七品十年暨我國家則有道兼文武器重珪璋者慷慨大節臨機能斷者仁孝忠直預識存亡者潔行檢身而有英畧者好學敏達詳明吏道者出入軍旅涉歷危難者不憚兵威樹立忠誼者博聞貞儉文翰兼絕者風韻閑雅善於吟咏者精練詁訓長於講論者夫如是則立身行道之事盡在於斯矣得不冥心契志以自勗勵哉覿每覩十八學士圖空瞻贊像而已輒各採本傳列其嘉績庶幾閱像者思其人披文者思其人非惟臨鑒耳目抑可以垂誡於君臣父子之間也廷珪河南濟源人第進士補白水尉舉制科異等神龍初為中書舍人再遷禮部侍郎開元初累遷少府監封范陽縣男以太子詹事致仕二十二年卒年七十餘贈工部尚書諡曰貞穆其為局也不徵荊山之璞不用藍田之質兀若元龜之起爛若繁星之出約勝負仗明信俱分類而抗行咸背深而列陣唯智是役唯貪是慎敗不同奔鬬不齊進曉之者敵衆多以寡少懵之者起徑寸猶萬仞徒觀其彈射萬變精妙入神口與心計行隨意新作氣者直摶乎九天之上猶檀欒而旁擊受敵者橫墜乎九地之下甘棄置而歸仁行必假道居必擇鄰衝危以陷其兩虎陪險更生乎一秦至若狂生俠少使氣為主顧懷將恡動越規矩競緣局而斜衡爭隔矢而曲取既向角而散亂復當中而攢聚苟萬一之偶中何輕狡之云數曷若恬和之士神清意遠豈棊布而興來亦手運而情遣先和容而取則兼中敵而為善務專一於道求寧苟貪於席卷或聊假以喻大或有迷而知返夫局勢將畢觀者逾樂兩敵相持三顧而作劃去者箭飛分索者星落眄四隅之豁然若萬里之清廓臣廷珪言伏見景龍二年三月十一日勅河南北桑蠶倍多風土異宜租庸須別自今以後河南河北蠶熟依限即輸庸調秋苗若損唯令折租乃為常式者臣聞皇天無私覆后土無私載日月無私鑒陰陽無私毓是以明王聖帝則而像之慶浹萬邦政敷一德故書曰無偏無黨王道蕩蕩無反無側王道正直伏惟聖朝御歷皇極在人正朔所覃率土奉若百年於茲矣頃於災歲重賦饑人頓革彞典特開變例雖施蠻貊之邦臣愚猶知不可況此兩道枕倚大河南接神州北通天邑郡縣雄劇人物昌阜既類股肱之地尢宜得其欣心豈可殊其土風異其徭賦不恤災患而殫其財力者即以桑蠶別加徵稅至如隴右百姓羊馬是資山南諸州椒漆為利其或銅錫鉛錯貨自巖通蜃蛤魚鹽財自海殖土物惟性錯貢方隅咸有澇年並無他稅旱歲各準常規豈獨斯人外之王度且天災所降年穀莫登在於貧弱或至殍殣生理既甚難恃人心固未易安就其憂危載空杼軸窮斯濫矣將無不至臣效官潁服實在河南每見部人眾稱冤苦伏思景龍之際時多賊臣有若宗楚客紀處訥武延秀韋溫等蔽虧日月專擅威權各食實封遍河南河北屬當水旱屢致蠲除因而遂矯制命固非先朝之本意也伏願陛下廣天成之德均子育之愛式崇大體追復舊章許河南河北有水旱處依貞觀永徽故事一準令式折免則在蒼生不勝幸甚謹因所部司法參軍鄭元亮奏澇損謹附表以聞臣聞國之威柄在於賞罰賞中則人知勸罰中則人知沮二者苟得則四海獲安二者乖宜則萬人無措況陛下始復初業甫登寶位率土禺然欽佇聖化凡欲興事亦何容易外有竊議臣請盡言至如張易之兄弟窮罪極逆蒼生苦之良有歲月憑託城社無所告訴陛下仁聖明斷憂在黎元一朝誅夷孰不慶抃在於親故並合從坐然量宜制法理或未宏何者然也臣歷觀自古以來革故即新之際莫不先行誅戮以服眾心此皆素無人望理藉如此今陛下先朝子孫唐德未改乃天地之眷人祇之望非陛下而誰誠宜布恩施德以答之崇仁尚寬以理之豈更誅夷以虧至德況易之兄弟榮盛多時趨附之徒天下大半欲盡殺之則罪不加眾欲少殺之則法難畫一在都城者乍可有數遍四方者未知幾人反側者多不可不察安之之理必在於寬自非至親及於謀首請一原宥令其自新仁風大行在斯一舉臣無任云云臣廷珪言伏見發使及典傔等大齎繒錦將於石國和市犬馬臣聞書曰犬馬非其土性弗畜珍禽奇獸不育於國者故明王欲極於德忠臣願畢於議偕護於細行保於大猷冀無閒然能致盡善也今以陛下之明何失不見以陛下之斷何欲不懲復禹順於走丸法堯易於迴掌誠可却走馬訓旅獒聖心通於兆人德言應於千里一感則法星退舍一解則亢陽出雲豈宜勞遠人玩異物有從禽之漸無恤下之先使明詔遐臨聖意昭布上非治國之要下非即戎之功將恐新麥未獲舊穀巳空饑饉荐臻邊荒速寇昭告則然上帝赫矣大君無以解其倒懸續於請命邇不自給遠不能輸戶口流離公私懷懼此臣之所以憂陛下順天之心從人之願省無益之用救必然之急先社稷後犬馬此天下之幸國家之福豈獨微臣哉無任竭忠竭誠之至謹錄奏聞伏聽勅旨臣廷珪言夫佛者以覺知為義因心而成不可以諸相見也故經云若以色見我以音聲求我是人行邪道不能見如來此明真如之果不外求也陛下信心歸依發宏誓願壯其塔廟廣其尊容已遍於天下久矣蓋有住於相而行布施非最上第一希有之法何以言之經云若人滿三千大千世界七寶以用布施及恒河沙等身命布施其福甚多若人於此經中受持及四句偈等為人演說其福勝彼如佛所言則陛下傾四海之財殫萬人之力窮山之木以為塔極冶之金以為像雖勞則甚矣費則多矣而所獲福緣不愈於一禪房之匹夫沙門之末學受持精進端坐思理亦明矣臣竊為陛下小之今陛下廣樹薰修又置精舍則經云菩薩所作福德不應貪着蓋有為之法不足高也況此營建事殷土木或開發盤礡峻築基陛或填塞川澗通轉採斫碾壓蟲蟻動盈巨億豈佛標坐夏之義愍蠢動而不忍害其生哉今陛下何以為之又役鬼不可唯人是營通計工匠率多貧窶朝驅暮役勞筋苦骨簞食瓢飲晨炊星飯饑渴所致疾疹交集豈佛標徒行之義愍畜獸而不忍殘其力哉今陛下何以為之又營築之資僧尼是稅雖乞丐所致而貧闕猶多郡縣徵斂星火逼迫或謀計靡所或鬻賣以充怨聲載路和氣未洽豈佛標隨喜之義愍愚民而不忍奪其產哉今陛下何以為之且邊朔未寧軍裝日給天下虛竭海內勞弊伏惟陛下慎之重之思菩薩之行為利益一切眾生應如是布施則經所謂不住色聲香味觸法布施故其福德若東南西北四維上下虛空不可思量矣何必懃懃於住相凋蒼生之業崇不急之務乎臣以時政論之則宜安邊境蓄府庫養人力臣以釋教論之則宜救苦厄滅諸相崇無為伏願陛下察臣之愚行佛之意務以理為上不以人廢言幸甚幸甚謹言臣某言臣奉勅河北道宣勞今發都下從白司馬坂所遇見轉運材木顧役人夫臣勘問檢校官左藏置監事馮道得狀奉今月八日勅於坂所修營臣竊以天后朝僧懷義營剏大像并造天堂安置令王宏義李昭德等分道採斫大木虐用威勢鞭捶官寮鑿山填溪以夕繼晝傷殺丁匠不可勝言費散錢數動以億計其時百姓愁苦四海騷然皇天孔明實茲降鑒凡所營構並為災火所焚懷義之徒相次伏法而死自此之後停寢十年近者狡豎張易之昌宗昌儀等將欲潛圖大逆為國結怨下人兼售私木以規官利遂又與僧萬壽等設計移此坂營建今暨逆豎夷滅皇運中興陛下先發德音頻下明制除不急之務罷土木之功所以少監楊務廉遠徙屏黜頒示天下凡在中外不勝抃躍若此像閣重復修營則與制書義殊乖越尚令二逆遺惡未除臣雖至愚固知不可且窮土木之作竭倉庫之資將非崇樹勝緣求諸福德者也今則興起營造採木作坂蠕動含生因緣致死每遇一日之內算數尚不可知比及累歲而成譬喻豈復可及廣殺而求福德所獲焉補所亡慈悲之理深未宏暢方今仲春作候當務農業臣今在路經過全未見人耕種訪聞咸稱乏絕苟求朝夕米糧此則百姓切急誠若倒懸矣陛下受天明命作民父母可不先解倒懸之切而方罄財竭力修營不急之務乎特乞即日停造大像等仍量抽其錢賑濟窮乏如天恩允臣等所請天下蒼生幸甚謹遞表奏聞伏聽勅旨臣廷珪言昨奉進止別宅婦女皆遣入宮勅至黃門臣已執奏停寢數日宰相重宣陛下以人廢言未蒙允納密旨增峻制獄益嚴事相牽聯重有追掩竊聞輿議足以傷心或母子生離或男女永隔冤酷之至有甚於死方春德澤萬物昭蘇豈獨斯人不霑雨露一傷和氣恐沮聖恩況所進宮人皆非婉麗陛下容易將入下人迫脅而行不作無益害有益臣必知其然矣又陛下至明之君當比德於上皇豈校迹於中古況春秋鼎盛慶祚無窮樹德將逮於千年臣尚謂少行事儻乖於一物臣竊有疑且臣位在黃門年高白首常恐寵祿過厚顛墜微躬何所覬覦輒有干議伏以遭逢昌運沐浴湛恩如不披心竭誠無乃希旨苟免六合雖廣取容何地不勝愚懇之至謹重昧死奏聞伏望曲流天鑒少垂矜采臣廷珪言檢貞觀永徽故事婦人犯私並無入宮之例準天授二年有勅京師神都婦女犯姦先決杖六十配入掖庭至太極修格已從除削唯決杖六十仍依法科罪今不依貞觀永徽典故又捨太極憲章而依天授之法臣愚竊謂未便且法令者與天下共之者也君不可失之於上臣不可違之於下如或失之於上則無以御下矣如或違之於下則無以事上矣所以古之聖人垂範作式縣諸象魏銘於景鍾昭示萬方期於畫一由是法有定禁時無濫刑化致雝和俗登仁壽鸞鳳巢閣麒麟在郊膏露浮甘卿雲布彩方今聖道包於天地仁恩洽於品物明無不燭聰無不聽時康俗泰遠肅邇安豈可昇平之朝而行末令之罰臣之愚鄙伏深疑懼無任懇迫之極謹昧死重連正勅奏聞特乞天恩曲垂矜鑒得令別宅婦女各準法處分率土蒼生幸甚如允臣所請仍望便停令勅內宣降進止臣廷珪言竊見國家於河南北和市牛羊及荊益等州市奴婢擬於登萊州置監牧此必有人謂頃歲以來軍裝所資國用不足或將見陶朱公公孫宏卜式之事而為陛下陳其策耳臣愚以齷齪小算有損無益不足為盛明天子行法於代也何以明之彼三人者實為匹夫藉空虛之地罄勤勞之力畜牧積歲增致千金苟以一家言之其計得也今聖朝疆域四海臣妾萬方天覆地載莫非所有而欲必取於人從牧於國何示人之不廣而近樹私也況和市遞送所在騷然公私煩費不可勝計臣聞諸古人曰百姓足君孰與不足百姓不足君孰與足蓋君之與人上下同體無所閒也今河南牛疾甚處十不一存農傷豈徒百姓而已又今牧童取其牛在㹀者下俚尢要一則利其孳產二則不廢營農家家保之豈願輒賣今雖和市甚於抑奪百姓之望是牛再疫而農重傷此則有損無利一也頃者諸州雖定估價既緣併市則雖平準如其簡擇事須賄求侵刻之端從此而出牛羊踴貴必倍於常百姓私陪則破家業雖官得一牛一羊而百姓巳失兩牛兩羊價矣此則有損無利二也登萊之境是稱海隅因之水氣加以風迴秋則早寒春則晚煦深山大澤咸生蛟蛇若置㣥牧必多死損此則有損無利三也高原之田百姓耕植下濕之地不堪放牧若奪百姓高處兩州皆失丁田至於牛羊復相踐暴久長如此闔境不安非直百姓被侵蓋失國家租賦則有損無利四也且又荊益等州和市奴婢多是國家戶口姦豪掠來一入於官永無雪理況南北既遠風土非宜乍到登萊必生疾疫此則有損無利五也且方今東洎滄海西洎流沙亭障多虞甲冑未息戎機調發歲時相繼由是丁兵逃散戶口流亡畧舉大凡十有數四陛下天憐黔首光啟元猷將命使臣分道巡撫簡而靜鎮難必乂安矧乃征伐外繁徵求內廣欲使萬方兆庶安堵復業亦猶翦鳥之翼而望其騰騫脫魚之鱗而願其遊泳臣又聞之君所恃者人人所生者食食所資者耕耕所恃者牛廢耕則去食去食則無人人無以生君將何恃然則牛者君國字人之本豈可無故一旦取之哉臣又度羊之為須非軍國切要假令畜牧能遂繁滋三數歲間億萬可致陛下豈可鬻之於外蕃射其利為用乎又可鬻之於中土割其命為資乎牛之為損則如彼羊之無益則如此臣雖愚戇知其必不可也伏願陛下特加審慎詳圖損益諸有所和市及新置監牧等儻迴聖慮即日停絕天下蒼生豈勝幸甚昧死上奏以聞臣聞古有多難興王殷憂啟聖者皆以事危則志遠情迫則思深故能自下登高轉禍為福者也伏見景龍之末中宗遇禍先天之際兇黨搆謀社稷有危於倒懸國朝殆均於絕紐陛下神武超代精誠動天再掃氛沴六合清朗而後上順皇旨俯念黔黎高運璿衡光膺寶籙以日月所燭之地書軌未通之鄉無不霑濡渥恩被服元化十堯九舜未足稱也明明上帝照臨下土宜錫介祉以答鴻休然頃歲以來陰陽愆候九穀失稔萬姓阻饑關輔之間更為尢劇至有樵蘇莫爨糠麧靡資不暇聊生方憂轉死偶會昌運遘茲艱否臣竊思之皇天之意將恐陛下春秋鼎盛神聖在躬不崇朝而建大功自藩邸而陟元后或簡下濟之道獨滿雄圖之志輕虞舜而不法思漢武以自高是故昭見咎徵載加善誘欲大君日慎一日雖休勿休永保太和以固邦本也斯則皇天之於陛下睠顧深矣陛下焉可不奉若休旨而寅畏哉臣愚誠願陛下約心削志澄思勵精考羲農之書敦朴素之道登庸端士放黜佞人屏退後宮減徹外廏場無蹴鞠之翫野絕從禽之賞休石田之遠境罷金甲之懸軍惠恤惸嫠蠲薄徭賦去奇技淫巧捐和璧隨珠不見可欲使心不亂自然波清四海塵銷九域農夫樂其業餘糧棲於畝則和氣上通於天雖五星連珠兩曜合璧未足多也珍祥下降於地雖鳳凰巢閣麒麟在郊未足奇也或謂天之鑒戒不足畏者則將上帝憑怒風雨迷錯荒饉日甚無以濟下矣或謂人之窮乏不足恤者則將齊甿沮志億兆攜離愁苦怨極無以奉上矣斯蓋安危所繫禍福之源奈何朝廷曾不是察況今陛下受命伊始敷政惟新卿士百僚華夷萬族莫不清耳以聽刮目以視延頸企踵冀有所聞見禺禺如也何可怠棄典則坐孤其望哉虛心字無逸右庶子維子舉孝廉景龍中官御史中丞歷荊潞揚三州大都督府長史入為工部尚書東京畱守累封南皮郡子卒贈揚州大都督諡曰正嘗試論之曰融為瀆結為阜則詞人之體物詳之矣智樂水仁樂山則聖人之微言列之矣或乃參里愚谷因居以制號紫葢白雉像形而定極分石帆而為破石對射的而云射堂武關之啟地門下都之建天柱莫不萬彙斯毓五精是應必踐魑魅之塗式作隱淪之宅傳諸簡牒備乎聞見竊比岳宗自均魁父北岳恒山者北方之巨鎮也爾其崗巒紛糺根底盤薄或壁立或砥平傍匿千嶺下括眾壑珍禽奇獸益虞之目駭不能名芳草甘木桑宏之心計莫之數瓊膏石髓慶忌林兵時時間出往往迭見舒丹氣籠翠微薈蔚朝隮披重壤以雲亭騷屑暮起吸萬籟以風怒漢宗聽宋昌之策以諱遷常趙主從姑布之談以賢臨代林麓之富何有何無但觀夫㟧容峭峙地勢坱軋迤太行而綿碣石負寒谷而面冰川限華夷之表裏壯宇宙之隘害培塿九折胚胎四明一佇望州載磔瞻魯崇巖似畫匪阽危以增虩清廟如在不加敬而自祗夫其重扃固護交軒密勿三間四表神漠漠以扶傾東序西廂心思思而發悸朱鳥拂棟玉女窺牕藻繢丹青侔赤城之霞起圖寫精異疑絳河之仙集恍恍忽忽若陰若陽吁可畏乎其駭也以先天二年有瀛州青菀縣人魏名確爰因行李至岳廟之前乃見二人一者白衣一者紫服侍從甚肅進止不凡自云我是岳廟大使發兵馬六十萬衆為國討賊五岳大神九月三日俱來此山大為歡會名確遷延未去諸神遂乃作怒牽至廟中用申責罰祝史楊仙童親見其事乃馳告官司州將駭之隨以聞奏勅遣上官及內謁者齎神衣禮物以赴會期凡厥寮寀共陪享祭惟神妙畧遐舉猛銳長驅不勞載鶡之師已決陣蛇之效國家德邁堯封道兼虞覲盛唐入詠竭南服以登灊訓夏從游窮西荒以銘弇髽首貫胸之族俗有望雲文鉞碧砮之賮府無虛月瘞峯沈渚不爽於告成五載四朝自遵乎升道書云十有一月北巡狩至於北岳豈不以崇望秩之儀備矣得諸侯之度宏矣以為不嚴而理本乎禮樂既富而教寄以循良晤闕一字棠之匡坐借長孺之高臥刺史高豫化以亂繩導規長者操其宣布託諷虛儀一澄睇於露冕幾揚仁於風扇長史嚴德珪司馬董闕一字漢編博達西蜀明其犯斗晉政記言南史推其直筆恒陽縣令劉元宗系肇御龍位光馴雉蒲城務簡歎淹中以勿欺丞王晏洛汭浮仙淮流襲慶楚國在壇之寶庾室豐年之玉文章雄伯昔入仲宣之跪人物雌黃今得林宗之拜主簿姚繪之尉閻宏摶扶逸翮未遷振鷺之行縱壑巨鱗且任烹鮮之輔岳令司徒乾造和光偶俗內剛外柔不附膏腴自安下仕鄉望等並海岳精靈燕趙奇傑賓從奕奕選徒於擁篲之賢氣調凜凜結友於負荊之將平原旅食是日處囊太子新交乘風聽筑地極殷阜袨服如雲俗尚儒術青衿成市侶琴尊以卒歲優哉遊哉狎泉石之娛老無營無欲手舞足蹈異口同音詢墨客於千里標黃爾於億載故能屈蔡中郎之詞彩以紀豐碑訪王右軍之神蹤以鐫金石其詞曰土之聚兮成山山巃嵷兮石斕斑屹常岳兮作鎮披重壤兮聳千仞將觀日以齊宗兼極天而比峻跨荊巫迤蓬壺挾慕容之舊都帶簡子之藏符列真宇兮隱淪宅巖花開兮樹果圻既闕一字天地險又作華夷隔嚴祠沕穆神儀儼雅迫而察之駭人也雕楹翕赩兮赮駮緣霤清泠兮露灑獯虜咆哮闕一字荐北郊岳靈赫怒兮殄落傾巢銘十角於燕嶺獲隻輪於晉崤皇道貞明兮太階平梯山驟水兮奄裨瀛順出豫兮勒功成一巡肆覲兮考幽明寄剖竹兮仁風清名題輿兮康哥行郎出宰兮百里榮桓不樂兮六安輕州縣勞職兮人之英恒碣降神兮岳之精詢謀僉同兮表至誠披文相質兮蹟堅貞懸一字兮莫與京俾干祀兮昭令名髣髴風塵兮垂頌聲
