front:
  text: 全唐文欽定全唐文卷七百八十六庭筠本名岐字飛卿太原人數舉進士不第徐商鎮襄陽署為巡官歷方城隋縣尉卒
  hash: sha256:a14c6621751d6d8d4ac0893b695f36e5b318175188be74e40db613664e17a7a7
  markers:
  - {type: head, offset: 14, content: 溫庭筠, id: KR4h0168_NFKB_786-h1, level: 1}
body:
  text: 檜有再生之瑞天符聖運之興挺松身而鱗皴迥出布栢業而杳藹相承隨道既窮則沒身於亂土唐朝將建故發德於休徵原夫日將興而幽暗皆明君應期而纎微必表生於枯朽證受命於敗德之時長則繁華示寶祚於延慶之兆想夫拔陳根而已茂聳修幹以方妍凌朝而還宜宿露向晚而尢稱新煙以狀而方生荑之枯楊若此以理而喻易葉之僵柳昭然效殊祥以示後願眾瑞而居先嘉其擢本旁榮抽條迥秀歷朱夏而彌盛冒霜雪而不朽應昌業於龍潛之際豈曰無心彰聖德於虎視之前孰云虛受徒觀夫載光紫府效祉皇家竦亭亭之柯葉擢鬱鬱之輝華可以播之於萬古可以流之於四遐是知歷數歸唐禎祥啟聖何厚地之朽木報上天之明命殘陽未落宮庭之林藪忽生明月初懸玉砌之桂華復盛矧夫貞節獨異高標自持散芳氣而微風乍動入重陰而宿鳥猶疑葢天所贊也亦神以化之客有生遇明時身蒙至德窮勝負於朕兆慕休祥於邦國敢獻賦以揚榮遂布之於翰墨闌裏花春雲邊月新耀粲織女之朿足嬿婉嫦娥之結璘碧繶緗鈎鸞尾鳳頭鞻稱雅舞履號遠遊若乃金蓮東昏之潘寶屧臨川之江姬匍匐非壽陵之步妖蠱實苧蘿之施羅韈紅蕖之豔豐跗皜錦之奇凌波微步瞥陳王既蹀躞而容與花塵香跡逢石氏窈窕而呈姿擎箱回津驚蕭郎之始見李文明練恨漢后之未持重為系曰瑤池仙子董雙成夜明簾額懸曲瓊將上雲而垂手顧轉盼而遺情願綢繆於芳趾附周旋於綺楹莫悲更衣牀前棄側聽東晞珮玉聲庭筠累日來洛水寒疝荊州夜筋骸莫攝邪蠱相攻蝸睕傷明對蘭缸而不寢牛腸治嗟藥錄而難求前者伏蒙雅賜葫蘆筆管一莖久欲含詞聊申拜貺而上池未效下筆無聊慚怳沈吟幽懷未敘然則產於何地得自誰人而能絜以裁筠輕同舉羽豈伊蓍草空操九寸之長何必靈芝獨號三株之秀但曾藏戢冊省永貯仙居却笑遺民遷茲佳種惟應仲履忽壓煩聲豈常見己墮遺犀仍抽直幹青松所築漆竹藏珍足使玳瑁慚華琉璃掩耀一枚為貴豈異陸生三寸見珍遂兼揚子謹當刊於巖竹寘以郊翰隨纎管而為牀擬凌雲而作屋所恨書裙寡媚釘帳無功實靦凡姿空塵異貺庭筠狀庭筠白節日僮幹至奉披榮誨蒙賚易州墨一挺竹山奇製上蔡輕煙色奪紫帷香含漆簡雖復三臺故物貴重相傳五兩新膠乾輕入用猶恐於潛曠遠建業尫羸韋曜名方即求雞木傅元佳致別染龜銘恩加於蘭省郎官禮備於松櫺介婦汲妻衡弟所未窺觀廣記漢儀何嘗著列矧又元洲闕上苑青瑣西垣讐字猶新疑籤尚整帳中女史猶襲青香架上仙人常持縹祑得於華近辱在庸虛豈知夜鶴頻驚殊慚志業秋虵屢綰不稱精研惟憂痗物虛投蠟盤空設晉陵雖壞正握銅兵王詔徒深誰磨石硯捧受榮荷不任下情庭筠再拜昨夜安東聽倡牖北追涼柟枕才欹蘭缸未艾縹繩初解紫簡仍傳麗事珍繁摛華益贍雖則竟山充貢握槧堪書五丸二兩之精英三輔九江之清潤葛龔受賜稱下士難求王粲著銘想遐風易遠俱苞闕盡入闕遺逸皆存纎微悉舉鷃觀鵬運豈識逍遙鯢入鮒居應嗟坎窞願承謦欬以啟愚蒙庭筠狀伏蒙又抒沖襟詳徵故事蒼然之氣仰則彌高毖彼之泉汲而增廣方且驚神裭魄寧惟衿甲投戈素洛呈祥翠媯垂貺龜字著象鳥英含華至於漢省五丸武都三善仲宣佳藻既詠浮光張永研工常稱點漆逸少每停質滑長康常務色輕闕乃韋書知為宋畫荀濟提兵之檄磨盾而成息躬覆族之言削門而顯敢恃蛙井猶望鯤池不任慚伏宗仰之至庭筠狀竊以童山不秀非鄒衍可吹眢井無泉豈耿恭不拜墨尢之事謂之獲麟筆聖之言翻同倚馬靜思神運不測冥搜亦有自相里而分豈公輸所削流輝精絹假潤清泉銘著李尢書投蘇竟字憂素敗不長飛揚闕研蛀胎而合美配馬滴以成章更率荒蕪益慚疎畧庭筠狀驛書方來言泉更湧高同泰畤富類敖倉怯蒙叟之大匪駭王郎之小賊尢有闕中巧製廟裏奇香徵上黨之松心識長安之石炭馬黔靡用龜食難知窺虞器以成奢闕梁刑而嚴罪便當北面不獨棲毫庭筠狀庭筠閱市無功持撾寡效闕蝸睆傷明庸敢撫翼鵷鵬追蹤驥騄每承函素若涉滄溟亦有叢虫祭尚存箋餘可記至於縗從墨制既禦秦兵綬匪舊儀仍傳漢制張池造寫蔡碣舍舒荷新滏之恩空沾子野發冶城之沼獨避元規窘類頡羹辭同格卞其為愧怍豈可勝言庭筠狀昨日浴籤時光風亭小宴三鼓方歸臨出捧緘在酲忘答亦以蚳蝝久罄川瀆皆隕豈知元化之盃莫能窮竭季倫之寶益更扶疎雖有瀚海疊石須陽水號煙城倥詠剩出青松惡道遺蹤空留白石扇裏止餘烏牸屏間正作蒼蠅豈敢猶彎楚野之弓尚索神亭之㦸謹當焚筆不復操觚矣庭筠狀某啟某櫟社凡材蕪鄉散質殊無績效堪奉恩明曷當紫極牽裾丹墀載筆顧循虛淺實過津涯豈知畫舸方遊俄昇於桂苑蘭扄未染已捧於芝泥此皆寵自昇堂榮因著錄勵鴻毛之質託羊角之高風日用無窮常仰生成之德時來有自寧知進取之規競惕彷徨莫知所喻末由陳謝攀戀空深某啟某材謝梗柟文非綺組閒關千里僅為蠻國參軍荏苒百齡甘作荊州從事寧思羽翼可勵風雲豈知持彼庸疎栖於宥密迴顧而漸離緇垢冥昇而欲近煙霄榮非始圖事過初願此皆揚芳甄藻發跡門墻邱門用賦之年相如入室楚國命官之日宋玉登臺一日光陰百生輝映末由陳謝伏用競惶某聞有以疎賤而間至貴者古人之所譏笑有以單外而蘄末契者君子之所兢戒何則無因以至豈庸辨其妍媸有為而然曾不計於能否有談嘲異狀詭激常姿希彼顧贍斯為衒造則亦受嗤於識者見詆於通人者矣抑又聞三月而行士人之常準十年乃字女子之常期永為干世之心厥有後時之嘆某尋常爵里謬嗣盤盂離方遁圓因陋成寡亦嘗研窮簡籀耽味聲詩頗識前修之懿圖葢聞長者之餘論顓愚自任并介相忘質文異變之方驪翰殊風之旨粗承師法敢墜緹緗伏以侍郎宏繼濟之機謀運搜羅之默識思將菲質來挂平衡遂揚南紀之清源謹効東皋之素謁越石父彼何人也夙佩遺文趙臺卿敢欺我哉敬承餘烈輙以常所為文若干首上獻某聞朔禽違雪海鳥知風苟曰含靈咸思擇地况乎謬窺墳素常稟盤盂從師於洙泗之間擢跡於湘江之表能不成周問道先詣伯陽故絳侍言惟從叔向伏惟侍郎稟生成之秀窮先哲之姿言成訓謨信比暄燠某率茲孤植勔彼單家持擊缶之凡音嗣操琴之舊事於是持撾自警割席相徵味謝氏之膏腴弄顏生之組繡勞神焦慮消日忘年雖天分不多尚慚於風雅而人功斯極劣近於謳歌頃常撰刺門人投書齊帥蒙垂盼飾致在褒稱既而文圃求知神州就選遂得生芻表意腐帚生姿永言棲託之懷不在翾飛之後今者商飇已扇高壤蕭衰楚貢將來津塗悵望高堂有念末路增悲願持款啟之心先偵生成之施倘或洛陽种暠猶記姓名建業張逵方宏采拾則百靈斯畢一顧為榮謹以新詩若干首上獻延露蚩聲皇華下調有慚狂瞽不稱仁私無任依投之至某啟聞効珍者先詣隋和蠲養者必求倉扁苟無懸解難語奇功至於有道之年猶抱無辜之恨斯則沒為癘氣來撓至平敷作冤聲將垂不極此亦王公大人之所慷慨義夫志士之所歔欷某性實顓蒙器惟頑固纂修祖業遠愧孔琳承襲門風近慚張岱自頃爰田錫寵鏤鼎傳芳占數遼西橫經稷下因得仰窮師法竊弄篇題思欲紐儒門之絕帷恢常典之休烈俄屬覊孤牽軫藜藿難虞處默無衾徒然夜嘆修齡絕米安事晨炊既而覊齒侯門旅遊淮上投書自達懷刺求知豈期杜摯相傾臧倉見嫉守土者以忘情積惡當權者以承意中傷直視孤危橫相陵阻絕飛馳之路塞飲啄之塗射血有冤呌天無路此乃通人見愍多士具聞徒共興嗟靡能昭雪竊見元宗皇帝初融景命遽惻宸襟收拭瑕疵申明枉結劉丞相導揚優詔蘇許公潤色昌謩五十年間風俗敦厚逮及翔泳未安其所雨暘不得其和匹夫匹婦之吁嗟一聚一鄉之幽鬱欲期昭泰必仰陶鈞某進抱疑危退無依據暗處囚拘之列不沾渙汗之私與煨燼而俱捐比昆蟲而絕望則是康莊並軌偏哭於窮途日月懸空獨鄣於豐蔀伏以相公致堯業裕佐禹功高百姓咸被其仁一物不違於性倘或在途興嘆解彼右驂彈劍有聞遷於代舍瞻風自卜與古為徒此道不誣貞明未遠謹以文賦詩各一卷率以抱獻縑緗儉陋造寫繁蕪干冒尊高無任惶灼某聞邱明作傳必受宣尼王隱著書先依庾亮或情憂國士或義重門人咸託光陰方成志業抑又聞棄茵微物尚軫晉君壞刷小姿每干齊相豈繫効珍之飾葢牽求舊之情某邴第持囊嬰車執轡旁徵義故最歷星霜三千子之聲塵預聞詩禮十七年之鉛槧尚委泥沙敢言蠻國參軍纔得荊州從事自頃藩牀撫鏡校府招弓戴經稱女子十年留於外族稽氏則男兒八歲保在故人藐是流離自然飄蕩呌非獨鶴欲近商陵嘯類斷猿况隣巴峽光陰詎幾天道如何豈知蕞陋之姿獨隔休明之運今者野氏辭任宣武求才倘令孫盛緹油無慚素尚蔡邕編錄獲偶貞期微迴謦欬之榮便在陶鈞之列不任靦冒彷徨之至某聞石苞覊賤早遇何曾魏武尊高猥知徐晃其後咸成閒氣訖立鴻勳簡冊增輝尊彞動彩則道惟熙載皆資甄藻之時德邁賡歌必用搜羅之道是以皇綱克序茂範咸凝某荊氏凡材雕陵散質謬傳清白實守幽貞矍圃彎弓何能中鵠邱門用賦尋恥雕蟲常患荒蕪殊非挺拔依劉薦禰素乏梯航慕呂攀嵇全無等級分甘終老莫有良期既而竊仰洪鈞來窺皎鏡墳壚下土敢望頒形甕盎頑姿寧希鑒貌豈謂不遺孤拙曲假生成拔於泥滓之中致在煙霄之上遂使龍門奮發不作窮鱗鸎谷翩翻終陪逸翰此則在三恩重吹萬功深空乘變律之機未得捐軀之兆豈可猶希鼓鑄更露情誠伏念良馬嘶風非堪伏皁饑鷹刷羽終恥棲籠誠知豢養之恩頗有飛翔之志而又專門有暇曾習政經閉戶無營因窺吏事既辨張湯之鼠深知子產之魚書劍彷徨年光忽徒思効用無以為資倘蒙再扇薰風仍宣厚澤庶使晏嬰精鑒獲脫於在途蔑微班得昇於收器纔聞謦欬便是扶搖某聞舉不違宗得於王濟近因其族聞自謝元雖通人與善之規亦前哲睦親之道某謬參華緒得庇餘陰固己鯉庭蒙翼長之恩阮巷辱心期之許遂得遷肌改骨擁本揚英則窮鳥入懷靡求他所覊禽繞樹更託何枝昨者膏壤五秋川塗萬里遠違慈訓就此窮棲將卜良期行當杪歲通津加嘆旅舍傷懷相公河潤餘津雲行廣施調羹之味未及宗親育物之餘希沾幼弱倘或假一言之甄發隨百蟄之昭蘇庶令葛藟之陰均其煦育椒聊之實遂彼扶疎成鍾儀操樂之規寬顧悌拜書之戀下情無任某聞日麗於天洪纎必及月離於畢枯槁皆蘇斯則推彼無私彰於大信苟關於宰匠咸仰以生成其或潤接西郊流金未已光承北陸豐蔀猶深則亦分作窮人甘為棄物歲華超越京洛風塵忽爾號咷固非阮籍泫然沾灑不為楊朱畧亡靦冒之辜惟以哀矜為主伏念三餘簡墮六尺伶俜臨濟輝華昔懸陳榻洛陽覉旅今造膺門己驚於自葉流根敢望於裒多益寡但以謝家故墅事屬臨川陸氏先疇名遷好畤同氣雖均於昭泰連枝或累於榮枯是以更就洪鈞來呈瑣質雖戴逵之弟志尚無聞而何準之兄恩輝已遍豈宜苟希河潤更望餘波投驥尾以容身執豚蹄而望歲然則迹同袁子質異山郎梓柱雲楣獨居蝸舍綺襦紈袴巳臥牛衣若乃清旦問安長筵稱壽貂璫畢集少長俱來膏沐之餘則飛蓬作鬢銀黃之末則青草為袍莫不顧影包羞填膺茹嘆倘或王庭辨貴許厠九疑京縣坐曹令懸五色校於同列未越彞章則衞館遺孤常聞出涕山陽舊曲不獨傷心誓將居必在勤行惟鞭後潛知寄託所望於江州必効忠貞得酬於吏部無任惶懼之至某聞仁祖乘流先知彥伯張憑植棹正值劉惔豈惟俄頃遭逢抑亦初終汲引當其覊遊臨汝旅泊丹徒遐思謦欬之音杳絕煙雲之路苟無直道將委窮途何異於懸水揚音九弄有潺湲之曲嚴霜戒節兩欒含清越之儀某融襟蟻術造跡龍門三千子之聲塵曾參講席十七年之鉛槧夙預元圖而性稟半癡機無兩可收堯羝而寡術舉舜鳳以無緣使何準之兄皆為梓戴逵之弟獨守蓬茅至於詞藻辛勤儒林積習自期燕笥不愧秦臺伏以相公周輅輪轅虞琴節奏早振經邦之業果敷華國之姿伊尹安危本同於兆庶深源行止必繫於興衰既而放跡戎軒遺榮畫室劉尹秣陵之柳尚有清風召公陝服之棠空留美蔭竊聞謠詠即付樞衡是以負笈趨塵贏糧載路願奏書於台席思撰履於侯門倘張禹尊高猶為戴榮說禮鄭元嚴毅便令服慎聞詩敢嘆朝飢誠甘夕死加以旅途勞止末路蕭條不無悽惻之懷豈只覊離為主仰瞻旌棨如望蓬瀛不任懇迫之至某聞瘦馬依風悲皆感土秋鷹厲吻飢即投人能知豢養之恩頗識歸飛之兆是以臺卿瀝懇先告孫賓越石棲身惟親晏子觀賢達始終之趣察古今行止之規必有良知願諧依託某伶俜弱植憔悴孤根詞林無渙水之文官路乏甘陵之黨每持疎拙久謝紛華既而曳履侯門經時不遇牽裾憲府越月而昇九衢獨愧於迷津五省纔霑於掌庾相公初締鄭棟甫潤殷林寧知蕞陋之姿首在陶甄之列拔於郎吏委在絃歌元日縱囚殊無異政清晨探賊未報殊恩豈期遽露精誠猶煩鼓鑄近者私門集釁同氣貽災孀幼流離關河綿邈淚變萇宏之血髮同園客之絲萬里銷魂孤燈弔影葢生人之大痛行路之同悲泉壤長辭何緣取决人琴併絕不得申哀端居則有愧簪纓乞告而曾無事例又以孔懷酷遠先塋非遙永言龜告之期遂在蟈鳴之月倘解其所任契彼私心絕緬冒於官曹獲優遊於教義孤誠所願九死如歸其或念以艱虞難於罷免亦有虛閒散秩不漏於幽微終鮮之悲無慚於顯晦伏增哀迫懇款之至某聞珠履三千猶憐墜屨金釵十二不替遺簪苟興求舊之懷不顧窮奢之飾亦有河南撰刺徵彼通家虢畧移書期於倒屣志亦求於義合理難俟於言全某菅蒯凡姿邾滕陋族釋耕耘於下邑觀禮樂於中都然素勵顓蒙常耽比興未逢仁祖誰知風月之情因夢惠連或得池塘之句莫不冥搜刻骨默想勞神未嫌彭澤之車不嘆萊蕪之甑其或嚴霜墜葉孤月離雲片席飄然方思獨往空亭悄爾不廢閑吟強將麋鹿之情欲學鴛鴦之性遂使幽蘭九畹傷謠諑之情多丹桂一枝竟攀援之路斷豈直牛衣有淚蝸舍無煙此生而分作窮人他日而惟稱餓隸頃者萍蓬旅寄江海覊遊達姓字於李膺獻篇章於沈約特蒙俯開嚴重不陋幽遐至於遠泛仙舟高張妓席識桓溫之酒味見羊祜之襟情既而哲匠司文至公當柄猶困龍門之浪不逢鸎谷之春今日俯及陶鎔將裁品物輒申丹慊更竊清陰倘一顧之榮將迴於咳唾則陸沈之質庶望於騫翔永言進退之塗便決榮枯之分如翩翻賀鷰巢幙何依觳觫齊牛釁鐘將遠苟難窺於數仞則永墜於重泉空持擁篲之情不識呌閽之路不任懇迫之至某跡在泥途居無紹介常思激勵以發湮沈素稟顓愚夙躭比興因得誅茅絕頂薙草荒田默想勞神冥搜刻骨遂使崇朝覽鏡壯齒成衰暇日欹冠元髫變白望將蕪菲來貢文明伏遇尚書秉甄藻之權盡搜羅之道誰言凡拙獲預恩知華省崇嚴廣庭稱獎自此鄉閭改觀瓦礫生姿雖楚國求才難陪足跡而邱門託質不負心期一旦推轂貞師渠門錫社顧惟孤拙頻有依投今者正在窮途將臨獻歲曾無勺水以化窮鱗俯念歸荑猶憐棄席假劉公之一紙達彼春卿成季布之千金沾於下士微迴咳唾即變昇沈羇旅多虞窮愁少暇不獲親承師席躬拜行臺輕冒尊顏伏增惶懼某聞古者窮士求知孤臣薦拔或三歲未嘗交語或一言便許忘年奇偶之間彼何相遠則運租船上便獲甄才避雨林中俄聞託契此又無由自致不介而親者也某洛水諸生甘陵下黨曾遊太學不識承宮偶到離庭始逢种暠懸蘆照字編葦為資遂竊科名纔沾祿賜常恐澗中孤石終無得地之期風末微姿未卜棲身之所侍郎議合機彖望逼台衡每敘㣥才常推直道昨者攝齊邱里撰刺膺門伏蒙清誨垂私溫言假煦內惟孤賤急被輝華覺短羽之陵飈似窮鱗之得水今者方祗下邑又隔嚴扃誰謂避秦翻同去魯佇見漢朝朱博由憲長以登庸願同晉室徐寧因縣僚而遷次下情無任某自東道無依南風不競如擠井谷若泛滄溟莫知投足之方不識棲身之所孫嵩百口繫以存亡王尊一身困於賢佞伏念濟絕氣者命為神藥起僵屍者號曰良醫自頃常奉緒言每行中慮猥將瑣質貯在宏襟今則阮路與悲商歌結恨牛衣夜哭馬柱晨吟一笈徘徊九門深阻敢持幽款上訴隆私伏以舍人十六兄法上聖之規行古人之道俯敦中外不陋幽沈跡在層霄足有排虛之計身居大艑寧無濟溺之方伏在庭除希聞謦欬下情無任某啟某聞孫登之獎嵇康薎之逢叔向葢亦仙凡自隔豈惟流品相懸雖三秀鮮華終難苟得而一言輝發因此相期曷嘗不仰企前修追懷逸躅豈期陋質偶竊貞規某器等缾筲居惟嶺嶠徒然折簡非孔門之詞率爾中科忝劉繇之第殷硎協律闕頃因同籍遂及論交竊示裏言奉揚嚴旨張司空汲引先及陸機楊丞相銓衡竟遺劉炫實亦義同得祿榮甚登門伏以舍人川瀆降靈星辰効祉所冀陶鈞之日不忘簪屨之餘報不先期竊比齊門座客情非自外欲為顧氏家丞徒自捐軀安能報德下情伏增依託某聞七桂希聲契冥符於淥水兩欒孤響接元暎於清霜感達真知誠參神妙其有不待奔傾之狀寧聞擊考之功亦有芝砌流芳蘭扃襲馥已困彫陵之彈猶驚衛國之弦而暗達明心潛申讜議重言七十俄變於榮枯曲禮三千非由於造詣始知時難自意道不常艱某荀鐸搖車邕琴入爨委悴倌人之末摧殘膳宰之前不遇知音信為棄物伏以學士舍人陽葩搴秀夏采含章靜觀行止之規已作陶鈞之業遂使枯魚被澤病驥追風永辭平坂之勞免作窮途之慟恩如可報雖九死而奚施軀若堪捐豈三思而後審下情無任某步類壽陵文慚渙水登高能賦本乏材華獨立聞詩空尊詣道在蜀郡而惟希狗監泝河流而未及龍門常嘆美玉在山但揚異彩更恐崇蘭被逕每隔殊榛徒自沈埋誰能攀擷一旦雕於敏手佩以幽襟免使琳慚寧貽蕙嘆潛虞末路未有良期今乃受薦神州爭雄墨客空持硯席莫識津塗既而臨汝運租先逢謝尚丹陽傳教取覓張憑輝華居何準之前名第在冉耕之列俄生藻繡便出泥沙誰言獻輅車軨先期畢命猶懼吹竽樂府未稱知音倘更念毛輶終思翼長贖彼在途之厄仍遺生芻脫於鳴坂之勞兼貽半菽平生企望終始依投不任感恩干冒之至某聞物乘其勢則篲汜畫塗才戾於時則荷戈入棘必由賢達之門乃是坦夷之逕是以陸機行止惟繫張華孔闓文章先投謝眺遂得名高洛下價重江南惟彼歸荑同於拾芥某弱齡有志中歲多虞模孝綽之辭方成牋奏竊仲任之論始解言談猶恨日用殊多天機素少揆牛涔於巨浸持蟻垤於維嵩曾是自強雅非知量李郢秀奉揚仁旨竊味昌言豈知沈約扇中猶題拙句孫賓車上欲引凡姿進不自期榮非始望今者末塗怊悵覊宦蕭條陋容須託於媒揚沈痼宜蠲於醫緩亦嘗臨鉛信史鼓篋遺文頗知甄藻之規粗達顯微之趣倘使閣中撰述試傳名臣樓上妍媸暫陪諸隸微迴木鐸便是雲梯敢露誠情輒干牆仞某識異旁通才無上技幸傳丕訓免墜清芬衡軛相逢方悲下路弦弧未審可異前朝郭翻無建業先疇稽紹有滎陽舊宅故人為累僅得者肝薄技所存殆成雞肋分陰屢轉尺涕難收仲宣之為客不休諸葛之娶妻怕早居惟數畝不足棲遲智効一官靡能沾沃荒凉散社流寓窮途高堂之甕社難充下澤之津蹊可見竊以棄茵懷舊尚動深仁投釣言情猶牽末契敢將幽懇來問平衡昇平相公簡翰為榮巾箱永祕頗垂敦獎未至陵夷倘蒙一話姓名試令區處分鐵官之瑣吏厠鹽醬之常僚則亦不犯脂膏免藏縑素豈惟窮猿得木涸鮒投泉然後幽獨有歸永託山濤之分赫曦無恥免干程曉之門進退彷徨不知所喻某啟某聞周公當國東伐淮夷陸抗持權北臨江漢或陳師鞠旅或築室反耕然後王府圖功台庭陟恪猶垂壯烈尚播雄圖屬者邊塞失和羌豪俶擾煙塵驟起烽燧相連犬牙秦雍之疆蠆尾河汾之地雖登壇授鉞屢選中權而禁暴安人殊無上策相公手捐相印腰佩兵符威不搴旗信惟盈缶莫不周勤體物煦嫗垂仁足食足兵俄成於富庶惟風及雨立致於生成今者再振萬機重宣五教方從易簡及表優崇凡列陶鎔咸增抃賀從此罇彞著德鐘鼎流芳四海遐瞻共卜歸還之兆一陽初建便當霖雨之期某忝預恩知實踰倫等某聞欒氏垂恩延於十世屈生罹譴不過三年雖行一切之科宜聽九刑之訴某謬因門蔭獲忝朝私雖位以恩遷而官由政舉累經重事皆立微勞頃年初忝邕南頗常弊事皆條奏不敢曠官冰蘖自居膏腴不染南蠻俶優邊徼先聞始事詳觀飛章備述黃伯選根基深固溪洞酋豪準詔懷來署之軍職李蒙妄因非罪忽使誅鋤某離任之初濫稱遺愛伍營校隊千里農桑呌譟盈途牽留截鐙爰從初任以至罷還不戮一夫聞於眾聽其後既經焚蕩又遣統臨糠籺不充菅蓬自覆曾無祿賜惟抱憂危至無尺絹貫緡以為歸費及蒙罪狀煥在絲綸以為徒忝官常曾無制置且經營甫爾物力未周拜疏將行替人俄至仰恩波而不浹駐官局以何由懦怯請兵才非將帥今者九州徵發萬里喧騰憑賊請鋒己至城下則以三千土著眾寡如何兩任經年曾無掩襲雖有煙塵之候不踰朝貢之州無勞北軍己自抽退伏念至德建中之際長虵大豕之間願報國恩盡縻家族松楸未拱帶礪猶存顧慙無用之軀旋漏不私之貸僑居乞食蓬轉萍飄生作窮人死為醜鬼伏惟相公業開伊呂朗鏡臨人運值堯湯平衡宰物伏乞錄其勳舊假以生成免令家廟豐碑尚垂蟲篆秋庭陋巷長設雀羅戀闕傷魂臨途結欷無任懇迫伏承己踐埋輪光膺弄印夙承知遇欣賀伏深大夫二十三兄銑社光輝珠庭宅慶居方可裕秉直無從誠宜便捨圭符來調鼎鼐而乃芝田挺秀不許於三農蕙畝流芳寧同於百卉伏想嵇山靈爽鏡水澄明仰止尊高居然勝絕隱貧居而坐聞絲管調仙家而行有旌旗竊料己飾廉車行離郡界高風在律爽氣盈軒未窮皋壤之秋己領江山之秀瞻望恩顧攀結倍深右前件進士所納詩篇等識畧精微堪裨教化聲詞激切曲備風謠標題命篇時所難著燈燭之下雄詞卓然誠宜牓示眾人不敢獨專華藻並仰牓出以明無私仍請申堂並牓禮部咸通七年十月六日試官溫庭筠牓
