front:
  text: 全唐文欽定全唐文卷八百五十弼晉天福二年官太常博士
  hash: sha256:b6bf8be60fa16eff20bd392331d695482d44385f160eb59e505ff1b60af127b8
  markers:
  - {type: head, offset: 13, content: 林弼, id: KR4h0168_NFKB_850-h1, level: 1}
body:
  text: 漢賓常恃倜儻不習廉隅遏鄴都姦卒之流言時銷叛亂卻華師親隨之浮議俗致安康開國承家忠貞保義而又散己俸而代逋欠闢荒榛而種麥來麰民有袴襦之謠野無萑蒲之患安民禁暴威惠兼行而又知進退存亡之理得善始令終之名亦所為知幾其神也諡法忠道不撓保節揚名曰貞愛民好學寬裕慈仁曰惠請諡貞惠光乂晉天福二年官汴州浚儀縣主簿竊見諸處邊郡小縣多是山鄉雖舊有勅正官滿時不許差攝充替無那遠地多越明規攝官既己到來見任豈敢違拒況聞所差攝者大半是本州府使長臨時與旋署虛銜強替見任正授官員其最不可者頗有當年之內或兩度三度替移來者須逆去者須送配從門內率自鄉中悉是權行誠非本分如斯得倖豈肯力官非惟紊公當且害物自今後伏乞特行明勅顯自新朝其邊郡縣官仰節度刺史或有見任因事停罷即許差曾入仕者權令撫綏仍又須候正官到官不可以攝替攝官或經半載或過一年如能志遠脂膏道著清白招添得戶口徵督得賦租百里傳聲㣥黎咸惠衆狀舉請即仰奏聞特乞大朝便行真命如此則皇王恩遠赤子幸深免被煩苛漸期蘇息竊見諸道選人合格下解不出十月立定三旬此則常程向來舊制卻是或有因解樣所誤式例稍虧字內點畫參差印處高下訛舛便乃駮犯致有艱難其如有七年八年選期千里萬里途路羈窮取士辛苦到京若粟錯不容乃滯塞無計自今後伏乞特行明勅顯布新規其黃衣選人只驗出身文書己有前任者據考牒及解繇歷子轉年得盡合格不許便與判行小小不賜駮犯則天下感明時事易聖主恩寬不使吏徒得行奸計者簉晉天福二年官隴州長史伏見近年百姓頗遇災荒縱納得王租即不充口食此蓋播種不廣頃畝無餘既稅外無溢數之苖致民中有不及之弊且國以民為本民以食為天苟百姓不足君孰與足伏請曉示天下應有荒田一任百姓開種候及三年外即檢照所開種頃畝多少量納一半租稅所貴國家富饒上下通濟者元休晉天福二年官朝議大夫行殿中侍御史述夫元黃判而清濁分三才敘而萬彙育散乎元素簡易之體猶存降闕一字中庸澆薄之風益扇雖㣥分類聚上智下愚靡不惡其死而愛其生闕一字其得而闕一字乎喪緬惟盤古爰及當今咸欲致身於常樂之鄉立名於無疆之域而嗜慾窒性好尚由心闕一字苦海而闕一字迴蹈迷途而繼踵竟致惡而必得愛而必忘浩浩闕一字猶百川之闕一字者闕二字而言也至於用慈儉闕三字體沖虛而為質駕闕二字鸞之侶俯仰八紘餐霞御氣之流逍遙六合或丹邱暫別或羽化俄歸亦不能忘情於生死之源絕跡於闕一字夷之境降茲以往何足道哉洎乎西域誕靈曜列星而應瑞漢庭入夢挺金質以呈祥法被寰中言超象外遠究天人之際廣開方便之門現無生為不死之闕一字示有相入無形之域修正真之闕三字網能除闕三字之至明闇室皆曉觸類斯長無幽不通元化普洽而不窮虛谷有聲而必應至矣哉總萬法而為方即絕跡出塵無如佛者夫其道也大慈廣運宏濟無方闢衆妙闕二字元關闕一字啟導一乘之教覺路難登寂滅虛空真如綿邈窈冥莫測識智難量是知翥長空者必假以羽翰濟巨浪者須資於舟檝將欲以言觀法以法觀心窺解脫之門究闕五字是者即莫闕一字乎經夫其要也始則演以一音次則偈於四句變拳石為千峯之秀導勺水為萬派之源於是貝葉緹紬流行斯廣龍宮寶藏闕二字攸繁莫不指示迷方津梁彼岸使闕二字珠者必求罔象涉麗水者果獲祥金披文則萬象皆呈得意則一言以蔽能宏是者其唯釋門之達士哉即今經藏主隱公是其人也公生於鎮州靈壽縣俗姓裴氏法名志隱出家於奉恩寺受戒於光化寺幼無童心長有佛性名山勝境靡不經遊先止於岨崍山光化寺修行二十餘年剃度三十餘人遠近傾依緇俗贍仰是院先有主者僧順公本貫定州深澤縣人也俗姓李氏法名智順出家於本州開元寺受業於法華院後因巡禮遂至山門與先院主僧道言相繼住持六十餘載剃度二十餘人修崇院宇功德佛事並已周圖濮陽化召得施主李彥章等特建鐘樓經藏雖斤斧丹青煥乎畢備而經文典誥咸且闕諸遂乃堅請主持假其緣化既從請託遂果成闕三字募彼信心資乎敏手堅比移山之志勤用覆簣之功僅越十年始就前願凡寫藏內經律論及聖賢傳記等共五千四百八十卷并新紙墨咸得精詳永用緘藏是圖悠久今院主僧行闕一字供養主僧行感典座闕一字行隱並禪林擢秀闕一字水澄波護戒珠而如握靈虵傳祖印而非關墮鵲三千世界不染六塵八萬法門皆歸一念身居五濁蓮花生於淤泥闕一字燃百燈太陽入於闇室住持真境炳煥釋闕一字況方嶽之中岱宗為首地臨齊魯境壓淮沂玉几金牀宛畱勝迹天門日觀下瞰長空爰屬盛明即期封禪方今千載啟運四境無塵緇徒雖廕於法門野老咸知其帝力府主太師相公勳高社稷闕一字列山河下車而比戶咸蘇出令而連營盡肅論兵玉帳謀深起翦之流禮士金臺價重鄒枚之選故得時康俗阜氣淑年和成此莊嚴闕二字風教遂釋子歸依之願契如來付囑之言得不備以良因紀之貞石元休功虧力學敏謝生知幸見託於斯文實懷慚於染翰式揚功德迺述銘云浩浩浮生茫茫曠刧惡積禍胎福生善業覺路難尋愛河易涉瞻彼波瀾闕二字舟檝爰有大士百億化身戒珠不纇闕一字鏡無塵演茲妙法濟彼蒸民門闢覺路指示迷津妙旨幽深微言祕奧窅窅靈源茫茫元造孰究真宗孰探法寶闕二字欲探必資經誥猗歟闕一字典列聖徽猷一音闕一字演萬法斯流雕金鏤玉貝葉緹紬將求佛性捨此何求偉哉達士成此至功闕一字乎寶藏宛若龍宮生雖有岸法本無闕一字天長地久永播真風溫顏晉天福三年官隰州蒲縣令兵不可不戰將不可不擇每於月旦宜令教習楚莊立功而心懼晉文戰勝而色憂居安慮危古之道也此乃鴻圖永固霸業彌芳居誨晉天福三年供奉官與張匡鄴奉使于闐自靈州過黃河行三十里始涉沙入党項界曰細腰沙神樹沙至三公沙宿月支都督帳自此沙行四百餘里至黑堡沙沙尤廣遂登沙嶺沙嶺党項牙也其酋曰捻崖天子渡曰亭河至涼州涼州西行五百里至甘州甘州回鶻牙也其南山百餘里漢小月支之故地也有別族號鹿角山沙陀云朱邪氏之遺族也自甘州西始涉磧磧無水載水以行甘州人教晉使者作馬蹄木止四竅馬蹄亦作四竅而綴之駝蹄則包以釐皮乃可行西北五百里至肅州渡金河西百里出天門關又西百里出玉門關經吐蕃男子冠中國帽婦人辮髮戴瑟瑟云珠之好者一珠易一良馬西至瓜州沙州二州多中國人聞晉使者來其刺史曹元深等郊迎問使者天子起居瓜州南十里鳴沙山云冬夏殷殷有聲如雷云禹貢流沙也又東南十里三危山云三苖之所竄也其西渡都鄉河曰陽關沙州西曰仲雲族其牙帳居胡盧磧云仲雲者小月支之遺種也其人勇而好戰瓜沙之人皆憚之胡盧磧漢明帝時征匈奴屯田於吾盧蓋其地也地無水而常寒多雪每天暖雪消乃得水匡鄴等西行入中雲界至大屯城仲雲遣宰相四人都督三十七人候晉使者匡鄴等以詔書慰諭之皆東向拜自仲雲界西始涉磧無水掘地得濕沙置之胸以止渴又復渡陷河伐檉置水中乃渡不然則陷又西至紺州紺州于闐所置也在沙州西南云去京師九千五百里矣又行二日至安軍州遂至于闐聖天衣冠如中國其殿皆東向曰金冊殿有樓曰七鳳樓以葡萄為酒又有紫酒青酒不知其所釀而味尤美其食粳沃以蜜粟沃以酪其衣布帛有園圃花木俗喜鬼神而好佛聖天居處嘗以紫衣僧五十人列侍其年號同慶二十九年其國東南曰銀州盧州湄州其南千三百里曰玉州云漢張騫所窮河源出于闐而山多玉者此也贊後唐明宗朝以太子左庶子遷工部侍郎晉天福四年為兵部侍郎伏以聖代設科貢闈取士必自鄉薦來觀國光將叶公平惟求藝行蓋廣搜羅之理且非喧競之場伏見常年舉人等省門開後春牓懸時所習既未精研有司寧免黜落或嫉其先達或恣以厚誣多集怨於通衢皆取駭於㣥聽頗虧教本卻成亂階宜立新規以革前弊自今後諸舉人不是家在遠方水陸隔越者望本令各於本貫選藝精通賓寮一人考試如非通贍不許妄薦儻考覈必當即試官請厚於甄酬若薦送稍私并童子盡歸於竄逐冀彰睿化免紊儒風庶絕濫進之人共守推公之道居儉清河人少舉進士梁貞明中累官御史中丞後唐同光中授刑部侍郎改兵吏二部侍郎尚書左丞戶部尚書晉天福四年卒年七十贈右僕射今年選人內八十三人無闕注擬詞訴紛紜蓋因近勅減選入仕者多門雖可區分難抑詞理請下格式取四月後合用員闕發遣中書門下奏先以銓曹論員闕遂卻置戶椽一員諸州一百五十員格式元送闕簿六百四十餘處後又許超折資序又堂帖令畿赤己上雖擬議許開銓後除授不合豫請用四月後員闕望於移省限內並須了絕不得更令選人有詞雲叟本名遨滑州白馬人避後唐明宗廟諱以字行昭宗朝賞應進士舉不第遂以隱逸終後唐天成中徵為左拾遺晉天福初徵為右諫議大夫皆謝不起賜號逍遙先生四年卒年七十四臣聞君子有應敵之方因時俯仰介士有不移之操與性逍遙康堯佐舜者洽道於君臣洗渭巢箕者寄形於天壤惟聖人之效業在庶物以由庚微臣學圃無成文場不調頃屬兵交四海怨暴三場梁室亂離走蘭成於荒谷江都淪覆遁庾衮於天山而又蔡順少孤虞邱三失倉野之女遠國飄零王祥之男一時彫落喪家室而有鰥在下悲身世而無處求生因投迹元元委心虛靜長揖當途之客㣥居在野之人幽蘭以備於重襟灌木用成於虛室或臨窗嘯傲或植杖耕耘樂在其中老而將至西山採藥己有咏歌北闕彈冠曾無夢想安期綸綍下及煙蘿日月方耀於太清世冑適躋於高祖任賢勿貳位事惟能衡門不傑之才繇來有愧詔局殊常之命未敢以聞夫功大者其任尊職充者其責重任必安於所據責不致於非才方今內服百工外拜五長百爾黎獻一存至公載惟清朝奚急百士誠繇陛下天綱地絡容無所遺夏雨春風恩無不及青陽振其沉穎旭旦起乎幽棲將令匹微罔不率俾固宜勇別環堵言隨車茸言勇切車拜丹地之明廷奉皁囊之清職東望心踊其如病何賦分隱淪滅思聞見九徵而往雖有語於莊周三召不行獨無求於殷浩仰祈皇鑒俯宥愚衷顗字伯真京兆萬年人少舉進士梁貞明中累遷中書舍人入後唐歷兵吏二部侍郎尚書左丞拜中書侍郎同中書門下平章事晉祖入立罷為刑部尚書遷戶部天福五年卒年七十五贈左僕射奉詔臣等同修先皇帝實錄進呈自承天旨尋戒百官同申太史之舊章徧訪茂陵之遺牒莫不囊螢汗簡寢筆懷鉛粗成典冊之大綱詎副宸旒之重委臣聞刻木結繩之代泥金簡王之朝傳茂實於無窮播英聲於不朽良以絃歌誦美竹帛書勳然則序皇猷而有質有文論帝道而或疎或密疎則見譏於良史密則利澤於洪源故禹穴藏書作法永垂於千古橋山刻木化民何止於百年恭惟明宗聖德和武欽孝皇帝務實去華本仁祖義鄙漢家之霸道薄用刑名遵老氏之元言克敦慈儉爰自仗義旂於參野總戎鉞於渠門三紀訓兵奉列聖而重安鼎祚八年御宇育黎元而別創蘿圖臣歷覽前經詳觀哲后無如先聖居宗室而扶持景運作維城而屏翰皇家鷹揚豹變之奇蠖屈龍伸之智年纔總角位己建牙輔獻祖太祖之經綸解僖宗昭宗之禍難東平曹蔡北靜藩渾披榛棘而立朝廷斬豺狼而興社稷及莊宗失馭寰海橫流方哀義帝之喪堅守唐侯之位而謳歌遽迫歷數爰歸於是革秦皇漢武之澆風修貞觀開元之仁政以臣幽淺何以發揮自捧絲綸如挾冰炭但緣職分難避擬掄臣即與判館事修撰官中書舍人張昭遠中書舍人李詳左拾遺吳承範等依約典謨考詳記注按編年之舊體各次第以分功起龍潛受命四十年成鳳冊新書三十卷雖研精覃思備振於綱條而事重才輕仍憂於漏畧加以裝褫鹵莽繕寫生疎旋命直館右拾遺楊昭儉虔切指蹤專司校勘尚虞舛誤未盡周旋將冒犯於進呈實倍增於憂負明王御宇哲后垂衣必崇郊薦之儀以表君臨之道伏自陛下興隆寶祚展禮㣥神每祈福以為人必差官而行事先七日受誓戒於南省后三日各致齋於本司必在精誠以感靈貺臣伏見南郊壝壇之側及諸祠壇並無宿齋之所請下所司量事修建屋宇俾嚴祇事允屬聖朝近宰臣盧文紀上章請條理選部臣聞事不師古匪說攸聞又曰仍舊貫何必改作此先王之格言也臣案六典吏部三銓尚書侍郎分典吏部其格擇人有三實四才孟冬三旬集人有地里之差若循彼綱條依其格限人無濫進官得實才只自天成四年十月詔罷侍郎分銓只以尚書併領正官又闕多是他曹權差才力或有短少遂致發遣凝滯團集遲畱移省既失常規選人隔年披訴臣請卻依六典分銓朝廷列職分司比期釐務置之閒地何表分憂望各委典銓於事為宜伏以運當昭泰時屬豐成金鑾己議於省方綵仗將離於上國沿路供億固有舊規況聞詔旨丁寧不許分外科率所在藩侯郡守竭力推忠奉迎須備於貢輸徵斂或及於黎庶伏望更加示諭免至煩勞使四海九州遐邇共聞於聖德千乘萬騎經過不擾於疲民俾諧望幸之心以顯來蘇之義韜光字龍府洛京清河人自京兆府參軍累遷諫議大夫給事中梁貞明六年充知匭使入後唐授工禮刑部侍郎天成長興中歷尚書左右丞晉天福初以戶部尚書致仕五年卒年八十贈右僕射臣聞春秋傳曰將賞為之加膳將刑為之徹樂此明君之愛人也伏乞下大理刑部兩司凡經定罪之時結正之際徧覽格律簡驗盡舉勅文討尋俾獲罪者甘心受罰者無怨人知法有畫一之義律無再易之門諸縣力及人戶多為州使影占或臺省投名惟貧民客戶在縣應役例有不均之歎且多僥倖之流請議禁止融汾州平遙人後唐天成初授華州節度判官長興四年入為右補闕晉天福初拜尚書吏部郎中天福二年自左諫議大夫轉御史中丞改尚書右丞分司西都六年卒年六十臣近覩河南畱守高行周狀奏修大內事以大厦既成燕雀尚猶相賀皇居是葺臣子豈不同歡然則時方屬於多虞事宜停於不急臣聞帝堯古之聖君也其所居宮室則茅茨不翦土階三尺漢文帝古之聖主也欲造露臺以費百金之值尋罷其役莫不道光圖籍德冠古今為千載之美談作百王之懿範況漢文承三代之基業御一統之寰區百姓富饒四方寧謐金帛盈於帑藏粟麥溢於囷倉尚惜其財不從其欲今雒陽宮殿雖有先遭焚毀其所存者猶且彌滿於帝堯之茅茨而又重有修營其所貴者豈不倍多於漢文之臺榭伏自陛下一臨華夏再歷寒暄聖猷雖契於上元皇化未覃於遐徼復又鄴城殘寇歷歲逋誅黎民猶困於轉輸將士頗勞於攻討庫藏虛竭支費殷繁此則是陛下宵衣旰食之時非陛下營造宮室之日且百姓是陛下之赤子也陛下是百姓之慈父也子既有疾父寧不憂今天下黎民莫非疲弊天下州縣靡不凋殘加以率斂頻仍徭役重謺尤宜撫恤俾遂蘇舒勿謂愚而可輕勿謂賤而可棄古人有言民猶水也君猶舟也水所以載舟亦所以覆舟可不畏乎兼自去年正月已來陰陽繼虧星曜失度此則上天垂象使陛下修德節儉之戒也固合修德以應之向使百姓安寧則陛下雖當櫛風沐雨未以為苦也若或兆民愁苦則陛下雖處瑤臺瓊室豈得為安乎伏願陛下襲帝堯之舊風繼漢文之餘烈且停工役免費資財使寰海之普寧或修營之未晚則天下幸甚百姓幸甚重榮小字鐵胡朔州人後唐長興中為振武道巡邊指揮使後歸晉授成德軍節度累加至使相天福六年舉兵向闕杜重威斬之臣昨據熟吐渾節度使白承福赫連公德等各領本族三萬餘帳自應州地界奔歸王化續準生吐渾並渾契苾兩突厥三部落南北將沙陀安慶九府等各領部族老小并牛羊車帳甲馬七八路慕化歸奔俱至五臺及當府地界己來安泊累據告勞具說被契丹殘害平取生口率畧羊馬凌害至甚又自今年二月後來須令點檢壯強置辦人馬衣甲告報上秋向南行營諸蕃部等實恐上天不祐殺敗後隨例不存家族所以豫先歸順兼隨府族各量點檢強壯人馬約十萬衆又準沿河党項及山前山後逸利越利諸族部落等首領並差人各將契丹所授官告職牒旗號來送納例皆號泣告勞稱被契丹凌虐憤惋不已情願點集甲馬會合殺戮續又朔州節度副使趙崇與本城將校殺偽節度使劉山尋己安撫軍城乞歸朝廷臣相次具奏聞昨奉宣頭及累傳聖旨令臣凡有往復契丹更須承奉當候彼生頭角不欲自起釁端貴守初終不衍信誓仰認睿旨深惟匿瑕其如天道人心至務勝殘去虐須知機不可失時不再來竊以諸蕃不招呼而自至朔郡不攻伐以自歸蓋繫人情盡由天意更念諸陷蕃節度使等本自勳勞早居富貴沒身邊塞遭酷虐以異常企足朝廷冀傾輸而不己如聞傳檄盡願倒戈如臣者雖是愚蒙粗知可否不思忌諱罄寫丹衷細具敷陳冀裨萬一
