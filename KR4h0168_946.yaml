  text: 全唐文欽定全唐文卷九百四十六
  hash: sha256:47eeae65b218fc999ef00a32c40a2faf1d52e7beef5c11909f50fcb42c981f63
  markers:
  - {type: head, offset: 14, content: 馮真素, id: KR4h0168_NFKB_946-h1, level: 1}
body:
  text: 日杲而朝隮月朧而宵出稟純陽而合彩體沈陰而盈質照未被於覆盆光豈周於暗室顧茲燈之煥炫保謙光於自薦推九華於洞房攢百枝於複殿嗟微瑣之陋質侍君子之高讌光逶迤於舞袖影朦朧於歌扇絲竹夜響綺羅春絢玉階星列金釭花徧至若上客將歡中樽未闌吐氤氳於玉宇流豔溢於金盤雜行月而浮桂乘流風而泛蘭瑟韻喧兮逾炳更籌深兮轉寒覺離筵之闃寂知別恨之良難別有蕩子遼水賤妾空閨掩錦屏而帛丿糸歎下羅幔而長啼既嬋娟於永夕亦委鬱於孤棲花伴妝而共落煙遶思而俱迷况復古人處否通道居幽門庭闃寂景物清秋憤書劒之無託意年華之不留抱枯以銳想對寒燈而足愁及其遇曉韜暉乘昏吐耀明以利物光非自照希助美於太陽豈聯暉於庭燎雖寓詞於感物終有類於體要不應為楊甲溺志妙賞開襟季月探幽仙術既播美於銷災賾彼禮經復傳芳於作賦萸房辟惡插鬢徒存菊花泛罇傷足旋及下堂之懼空負子春之懷登階與言方貽婦人之笑窮其孝道雖則致於毀傷校彼刑章豈有涉於情故乙誠妄告甲乃無辜輒賜片言能符至理元象凝邈㣥品必具沈潛昭著衆感無隱懿哉公孫躬履節養悼彼祖母欻纏饑疾心乎謂何天亦明視驗粟有殊於籬下泣堇終同乎澤中可謂嗣德劉殷追蹤李密激芳塵於西蜀藹嘉聲於東晉霜竹擢笋自可包羞冰魚振鱗頗亦慙德第如蔡順伏柩劉昆叩頭驚風由其蓄緒洪焱為之卷燄精誠所致緗素備列嗟乎至孝孤其善隣所司科妖將涉厚誣之酷明使旌異深符清德之美至哉求士之方稽彼側陋書乎善良備采擇於鄉老爰升薦於天王乃曰行之實藝之長可謂舉不踰等信乎幽而有芳用之則行豈遐方之繫滯時不可失逢昭代之明揚於是申衆寡稱旗章播唐風而靡闕同周制而有常操兢兢願獻巖廊之器率徒濟濟咸從禮義之鄉佐理之源匡時之盛可以榮鄉黨可以輔國政豈徒稱藝能襃德行而已亦以示尊寵尚賢能再拜之儀設五物之禮興俾地官而是載命天府而爰登膺選以行豈黃冠而是阻策名之後見青雲而可升所謂納芻蕘拔淹滯或端莊而果行或踴躍而負藝聞善必舉誠哉不過其辭惟賢是求豈曰後難為繼是以臻彼道德致乎雲霄多士如流可閱一編之上㣥才是選寧辭萬里之遙矧物類之咸若在皇明之孔昭考鄉閭之中既已為善顧周行之內無愧嘉招原夫進以守法明乎化洽庶所以觀士無取乎徹甲方今搜賢鄉黨致理國經具名氏於尺牘先貢獻於彤庭隨籍而來先容必假於垂白進善以致克已自期乎拾青士有其心徒堅其誠未果道寧忘於光大藝必慚乎微瑣沈潛下國隨鄉書而計偕希望榮名在王庭之試可王者置關是為巨防所以察出入驗符繻故終軍入秦棄之以擊節臧文相魯廢之而受嫌彼何人斯輒此踰越稱急切之利往冀刑章而免科當今烽堠無虞蠻貊請職荒徼不聞於擊柝私室寧容於度關請科罔上之人用杜憑虛之說皇帝奉天心執人柄自毛㣥之賤品及水族之微命咸安其生各遂其性小既化矣諒庶物以知歸大亦宜然由一人之有慶允所謂法中孚以立極體渙汗而施令其信也符天之不言其德也與道際其聖徒觀其行藏出處安逸逍遙時乃上冰且不爽於春候時乃登俎幸見錄於清朝何政令之不誠何性命而不保清瀾自適則樂我深泉行葦不傷則樂我豐草趨時者保去留之性默處者契雍熙之道懿夫堯之為理行路皆如此易之取象叶義必同塗物苟在微則豈唯豚爾類苟在隱則何必魚乎可謂德侔造化道泯虛無無遠不均將由夫大而不約何幽未及詎同彼小且未孚穆穆巍巍我后垂衣域已臻於仁壽信乃及於賤微恣彼噞喁在安流而長逸睹其膚革與至道而俱肥斯可以見聖皇軌物誠理是非奚獨龜龍假而表瑞麟鳳降而增輝而已哉士有象既得而言欲忘信己誠而行庸謹安貞誓於耄期慎獨稟乎齠齔觀光上國感豚魚之以孚願仕清朝匪巖穴之可隱風入秋而方勁露如珠而正團映蟾輝而迴列疑蚌剖而俱攢綴別葉之中時翻的的轉衰荷之上微振珊珊虛靜內瑩圓明外寒且驗目前之美何殊掌上而觀懿夫寓物成規效微應節含綠葵而結綠方麗耀黃菊而中黃轉澈落蒹葭之浦誠媚川而可移泫庭宇之間雜照廡而何別所以未逢朝溘還著夜光當助海而為深功雖至薄蒙沈泉之是棄德且非涼比蟬飲之為狀與蛇銜而允臧發澤之道素昭結霜之儀漸露咸欣遐被之德寧起暗投之怒遙瑩空際思縹緲之金莖散照林中謂璀璨之瓊樹宛轉無窮精明有融乍見紅蘭之內如尋赤水之中稍迷逕蔓偏入園叢每祕彩於晝景何流形於夜風時也草始化螢星逾流火叶物候而增美信晶熒而必果想游女於水上訝鮫人之淚墮降自天而任彼無私照於乘而孰云不可湛湛方積纍纍正凝彌增皓鶴之警不憚驪龍之興遠睇平蕪俛首而鮮苗益潤俯觀朝藿傾心而靈液是承嗟乎彼以少而為貴此以多而豈賤遇沾衣而未化如被褐而初見其克好以員來孰若順陰而適變輕徭賦則人安不覆巢則鳳集有司徵算誠遠符於漢主母邱探卵斯近慕於晉臣癸且有詞實庸人之告訴邱為無賴何小子之猖狂若國用耗虛自七歲而宜算宅居鄰里思一顧而便窺亦何限於冠年須發怒於登木况為無事詎藉稅錢之斂既幼而小何處望風之責甲宜釋放癸請不徵三推貽訓昭賁於天田萬井開規發揮於地利故五稼庭碩成厚下之道四甿阜滋得奉上之績甲圭衡賤彙農保浮生青郭無起伏之田綠野有菑畬之地爰稽版籍舊列郊封匪蠶而衣著於前誡不耕而食豈免後科且甲異嗇夫師非田畯瞻惟惰窳不勤百畝之勞空致質劑未舍三夫之稅訟旅師之散利以避罰而尤人美疑合券以免科終飾非而為已眷茲甲罪宜峻刑章惟彼旅師請從寬典直上千萬仞周圍數十里昂焉若嵩岱之奇形隱焉若蓬壺之雅趣丹梯磊落絢五色之彩霞元峒幽虛吐四時之嵐氣懸崖墜石有㣥羊伏虎之形激澗翻波若排鴉捕蛇之勢幽溪修阻絕岸崢嶸蘆莽森羅嘉禾充牣韋使君性該武禁藝博文樞窺禍福於未萌察安危於無像往以釁起蕭墻變生肘腋處茲險奧爰創州臺位列班曹砥平繩直周圍四面悉用雕鐫絕壁千尋宜皆刊刻前臨沃壤黍稷與稻秫芬芳後通崇隅嵐氣與翠微隱映澄江東逝波開羅錦之花林麓西屯樹擁長青之葉遠山近水匪暴客之咽喉澗戶湯池豈奸雄之鼓吹寃蹤退散怨跡沈埋同氣之誼日隆手足之情元厚豈不戴名山之景祐沐靈嶽之洪休危而為安禍而為福聊鐫翠岱謹述徽猷大哉唐之為盛授寶歷兮握金鏡御乾符兮秉坤政順四時以立法侔上帝而作聖其德維新其照惟均金也者取剛克以成質鏡也者取清明之在身染之無汚磨而不磷守清淨以自立形大小而各陳是故傅咸擬之於良史莊氏比之於至人懿夫不鼓不鑄匪雕匪斲堅貞為義同匪石以居心溥博其功異明珠之在握見而後信動必先覺細察毫芒遠包海嶽處明難疲居昏不濁含清輝於寂默體元化以希夷有以取象無得可持雖每分於動息終不混於妍媸斯實百王之道也可與三光而揭之原夫司契之君端拱而理北辰定位南面恭已惟其道之有孚必心鏡之為始何彊名於此意嘗試言其所以豈非體合沖漠功優照臨苟遇物而必覽信緣情之所任皎皎團月既昏曉而常潔沈沈精彩豈塵垢之能侵作此鏡焉生於化權無形象以留賞有光華而克全清明象水廣大配天討之不窮隨五行而往復韜之無際假六氣以周旋則知守寶者持之罔捨於以宣化源統天下如是三皇之與五帝較我德之殊寡縣官執大法闡大猷道惟行遠化必通幽彼朱草以合朔示皇天之降休月始而生用資乎陰步馬月虧而落事契夫冥搜其於作候靡或不由乃知天罔私親神惟輔德苟明智之有務必冥報而無忒或產水涯或生巖側布赤葉之蒨練挺朱柯之翕赩既周復而莫窮與乾坤而不極誰究其義吾知其為美一人之化洽俾萬國而澤被由是節候不疑生榮以時依天聽以叶祉順月魄以呈姿朔告合焉表皇化之無異草名朱也比丹心兮自持較瑞不慙於蓂莢稱珍豈讓夫靈芝觀其光彩妍媚文理密緻資亭毒以榮落以神祇之奧祕三五之前逐蟾光以潛長二八之後與桂華而暗墜匪權量之能侔將漏刻而齊致其氣芬芳其色焜煌聖帝攸感靈仙是常何纖芥之微物遇休明而効祥諒君恩之克播致天意之溥將可以同規日月共貫陰陽豈止漬元醴變金漿而已哉懿夫分莖灼爍擢穎超遙候朔自呈詎比夫偶陽而動既望斯隕寧同乎見晛曰消幽元不測神化孔昭自然澤浸有截化行無外三光並明兩儀交泰於靈草以配歷冠古今而為大常居汝潁奇才邱園高士干進二千石自謂五百年陳思王之藝能惟聞自舉馬相如之文藻故且先容蓄銳門庭審屠龍之已就露才州府望維駒之有期舉善進賢英翹是務負才任氣倨傲何傷計吏猶揖司空處士何卑刺史或是栖遲之侶禮律未閑流宕之夫拘檢不足取優退劣赦過舉賢庶以為宜未敢懸定臣某言伏奉某月日恩制授臣兄前湖南觀察判官侍御史內供奉賜緋魚袋國子監博士雨露殊私忽霑微賤儒雅盛職光寵衰門承命震驚感恩躍踴臣聞聖王勸學庠序為本故堯命后夔典樂以教冑子周立師氏以教三德漢制博士以教五經歷考學校之官葢今博士之任用人之選非賢莫居臣兄幸遇昌時守臣之訓孤貧好學以傳家業而聖代推恩遂及兄弟位登五品光賁一門感鶺鴒之詩增友悌之愛齒羔雁之序媿荀陳之才况臣受任方隅莫申涓効寵榮薦及灰粉難酬誓期殺身以酬萬一無任感戴隕越之至諸侯列土貢士有差稱彼地靈登之天府括州水鄉遐服台嶺仙區梓漆標材幾馳聲於俊造竹箭為美亦飛譽於東南頃以充賦上京頗規前古在褰帷而未失何直繩之見欺然則國家獵異搜奇招弓頓網移鄧林之茂樹接影槐庭掩澤國之王褱材連芳芸閣既惟新而製典何昔禮之云稱廉使此推葢申朝憲州將雖拒有昧隨書歲月驚過人生若浮棲露不居空嗟溘死截飇易往共盡何言令緒歎交臂之無依恨同心而遽失瞻九原而長想白日何年撫三益而傷魂青松上月雖墳未宿草而室無其人同宿睪疑之奄終類一哀而出涕寢門興慟未見其容外野申悲嘗聞斯旨致哭雖稱失位寧戚亦著前聞禮貴因情夫何推究息絃軫兮大樸元同忘琴音兮至人守中道不緣情則去聲而外寂德惟抱素故含和而內融於是見高士之心出常人之境其養貴默其伎尚靜及卷懷而克順反不鼓而是逞蘊藝如何元德靡他知迷則達用晦實多虛張不彈俾指節而交暢全聲入妙脗心曲而同和且人心靜為常琴心虛為主將寧體於道樞亦守器於德宇懷之無故常寂響而有餘用之則虧乃含音而莫吐故自適於胸臆亦何用於角羽顏子所以如愚昭文由是不鼓近情好樂尚德養空罷奏南音悟人間之客寄不操三峽體山下之泉蒙斯懷柔之古者竟生白於仙宮夫動極則靜音繁不復守樸外真含虛內肅施絃罔舉則見素而如絲沈聲莫發乃繁根而猶木因雅韻而不奏識道情之所蓄此則恬然誰與寂爾自躭希夷既造妙理難探栗里無絃淵明則矯王門碎質安道更慚是以飾外者貴其體備厚內者尚其包含於戲琴心懸解幽響何答於以閑和於以虛納十指攸措咸制動而是宜五音知常各處寂而不雜故琴默而美昭信仁靜而道合執勞謙者可以為天下君習撝謙者可以為天下勳在易也有自牧之義於書也有受益之文行已立身而道自著御人率衆而德有云在上則騰茂實居下則播令聞亦足以化乎四表而行乎三軍若乃天地之義鬼神之理或禍其滿盈或福其廉恥故執羔雁而行者得之而益貴秉耒耜之列者得之而易使在臣下之尚然况繼天而為子是以敷之而化行執之而教立被車書之所至霑雨露之所及故能邇無不洽遠無不賓豈不以言出乎口行發乎身求之於己加之於人者也夫心者難備物者難兼故先王所以戒慎往哲所以崇謙不然者宣子何以稱賢太伯何以為德書三讓之策文作千古之程式其執謙也必在乎合宜其在卑也亦存乎隨時過之者俯而就矣不至者跂而及之無貽誚於巽牀之義無見刺於相鼠之詩惟木兮從繩則正惟后兮從謙則聖雖不富於其鄰而有助於為政理於身也合仁義之五常理於國也則文武之二柄宜播美於筆端傳謙德之雅詠奇謀入妙巧思參元雖一枰之可美起三隅而邈然似將軍之出塞若猛士之臨邊及其進也則鳥集雲布陣合兵連或參差而易決或齟齬而難便開馬眼以防後張虎口而遮前磊磊似玉石之相飾粲粲若衆星之麗天爾其深思遠慮知白守黑以仁義為反道用詭譎為明德或意在東南而偽擊西北類行藏之通變同陰陽之不測於是且侵且戰不恃不平雁行絡繹魚陣縱橫寧扶危以救死不貪敗以喪生或備攻於畧地或專命於用兵或轆轤以成劫或宛轉而入征雖勞形而竭思固難得以言名及夫雌雄有決疑多勝寡思悠揚而不定氣沈吟而未下名不可竊智不可假千慮萬計復何為者行必量力動則相時其措意也屢巧其適變也多姿既得之者榮失之者辱此餘而未已彼懷而詎足馳神不竭應運無窮勢出心外命懸手中圍初開而復閉路欲塞而還通伊仁智之可翫豈造化之為功使夫離婁喪睛隸首迷術公子罷宴而驚視樵客入山而忘出為官擇人聿求俊乂強學干祿必正科名彼乙伊何不求諸已射宮明試無聞六義之能藻鏡掄材將亂九流之序况今唐虞御極才子在官王裴持衡至公選士方聽得賢之頌寧容詐假之辜顧三面而闕斯宅既稱未得須議減論第一得一湯火績已儲水性乃盡如斗中米如稱上魚高低適平無過不及為度蓋一而不偏雜者也天得一以清地得一以寧湯得一可建湯勳第二嬰湯薪火方交水釜纔熾急取旋傾若嬰兒之未孩欲責壯夫之事難以哉第三百壽湯人過百息水踰十沸或以話阻或以事廢始取用之湯已失性矣敢問皤鬢蒼顏之大老還可執弓抹矢以取中乎還可雄登濶步以邁遠乎第四中湯亦見夫鼓琴者也聲合中則失妙亦見磨墨者也力合中則失濃聲有緩急則琴亡力有緩急則墨喪注湯有緩急則茶敗欲湯之中臂任其責第五斷脈湯茶已就膏宜以造化成其形若手顫臂嚲惟恐其深缾觜之端若存若亡湯不順通故茶不勻粹是猶人之百脈氣血斷續欲壽奚苟惡斃宜逃第六大壯湯力士之把針耕夫之握管所以不能成功者傷於麄也且一甌之茗多不二錢茗盞量合宜下湯不過六分萬一快瀉而深積之茶安在哉第七富貴湯以金銀為湯器惟富貴者具焉所以榮功建湯業貧賤者有不能遂也湯器之不可捨金銀猶琴之不可捨桐墨之不可捨膠第八秀碧湯石凝結天地秀氣而賦形者也琢以為器秀猶在焉其湯不良未之有也第九壓一湯貴欠金銀賤惡銅鐵則甆瓶有足取焉幽士逸夫品色尤宜豈不為瓶中之壓一乎然勿與誇珍衒豪臭公子道第十纏口湯猥人俗輩煉水之器豈暇深擇銅鐵鉛錫取熟而已是湯也腥苦且澀飲之逾時惡氣纏口而不得去第十一減價湯無油之瓦滲水而有土氣雖御胯宸緘且將敗德銷聲諺曰茶瓶用瓦如乘折脚駿登高好事者幸志之第十二法律湯凡木可以煮湯不獨炭也惟沃茶之湯非炭不可在茶家亦有法律水忌停薪忌薰犯律踰法湯乖則茶殆矣第十三一面湯或柴中之麩火或焚餘之虛炭木體雖盡而性且浮性浮則湯有終嫩之嫌炭則不然實湯之友第十四宵人湯茶本靈草觸之則敗糞火雖熱惡性未盡作湯之泛茶減耗香味第十五賊湯竹篠樹梢風日乾之然鼎附瓶頗甚快意然體性虛薄無中和之氣為茶之殘賊也第十六魔湯調茶在湯之淑慝而湯最惡煙燃柴一枝濃煙蔽室又安有湯耶苟用此湯又安有茶耶所以為大魔四海既清萬人求理在乎平均井賦議計師田脩閭里之政役辨夫家之名數是分衆寡無失重輕必當按彼版圖稽其勞逸故三年大比國有彞倫百役小差人其胥怨由是周官克崇於大閱蕭相先務於圖書瞻言諸州不克致理未能洗舊汚之俗開新政之源使懷土知歸趨邑如市而乃拒省司之命紊軍國之經此而可容孰不可忍乙也鑿井通墳而獲古鏡抱春銅之色涵明月之輝罷照秦樓未懸溫室玉女窺而不倦仙人磨而益明異龎儉之得銅殊宣尼之對缶既曰奇觀理合歸官雖隱則有愆刑故無捨然物非古迹事或可矜請更詳審方可裁斷敦陣整旅必務成師正合奇勝亦資制敵苟取強於技擊豈見貴於軍旅惟甲推轂總戎請纓為將仲升投筆方期燕頷之封馮緄發笥且得蛇文之兆於是間途伺敵減戍恤人渠答爰施踐更斯遣賦晉臣之一鼓俾困蒺藜削漢卒之伍符佇歌杕杜虜塵坐清於艽野公問寧候於瓜期誠可論功孰宜書罪且如器械為費用不假於千金士卒獲休功乃逾於三捷止戈若稱惰職棄甲何所論刑執簡是科失言斯甚雖疾惡為事叔孫誠得於指楹而見善則遷子夏自宜於投杖舍而勿問斯則為然符璽出入惟帝之命節傳迓送有國之恒寶山圖獸知林木之多虞澤國用龍取江海之安祲飾之玉者惟人所持萬里無塵寢於廟堂之上四郊多壘行於軍陣之間癸何人斯不率而盜子卿漢朝之勇將擁節不移無忌魏國之名臣竊符加罪彼已之子曾不是思藪之萑蒲尚聞攻伐邦之旌節安可穿窬請歸義於鈞金庶無譁於束矢皇帝念儒林之繁會當天地之交泰降萬乘以爰來使八方而咸賴視其鼓篋之地文在其中禮於釋菜之庭化行乎外睿想難踰精搜典謨屬車連延輾御陌而後入翠華容裔向文囿以前驅臺觀惟新牆垣盡飾宗伯禮賢以蕆事司成執經而奉職端冕旒而綵仗初立始駐六龍發聲教而翠華未旋以行萬國整衣裳之楚楚習威儀之翼翼入門而冠劍陸離布位而貂蟬逼側若乃展先師之禮示後進之人張國容以貴道闡文教以尊神升夫子之堂所謂以德行行周公之禮豈可不躬親不然者何以自謙於至聖而親饗於陪臣哉是以講學斯陳德音遠播念月將而日就各呈材而切磋龍顏不遠顧探索之惟勤天步下臨曷斯須之敢惰雲布星攢周回可觀彼儒風之習習資睿思以安安頤指於學海儒林自因澤及目擊乎雄詞麗藻誰謂才難恩下育而冬暖命遐宣而晝寒濟時以勤學為先居上以易俗稱大俾惰遊者咸思於經籍好勇者亦高其冠帶既而宣化畢盛禮終繳素志播皇風轉龍旂於祥煙之表返鑾輅於瑞氣之中盛矣哉載筆之史不紀乎教化之宮
