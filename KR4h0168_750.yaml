front:
  text: 全唐文欽定全唐文卷七百五十杜牧三
  hash: sha256:d015e99598cf0442d18b35b001b43b8e5fa4e3e0d9cd7a0ebf8248daa6b77879
body:
  text: 敕夏州節度押衙知進奏朝議郎前權知杭州長史兼監察御史上柱國柳師元等將軍護塞師元主留邸之職從瑜繼怤以墨縗徇公喪葬告滿圭專書府藂委之務咸有勞能遷獎正名亦其常也各宜專謹勿罹悔尤可依前件敕鳳翔府節度押衙知進奏銀青光祿大夫檢校祕書監前兼亳州長史殿中侍御史上柱國賴師貞等師貞主大藩留邸之事少鄘專史閣錯雜之務皆公謹歲久官次宜遷元爽俾佐郡符亦有可取湖外飢人相聚為寇蕩覆鄉縣勢如燎火蓋不得已遂至翦伐桂直用命一舉滅之言念功勤宜有褒賞名郡上佐帖以憲秩耀爾軍旅可增義勇可依前件敕宣武軍節度押衙知進奏起復銀青光祿大夫檢校太子賓客兼歙州司馬上柱國景思齊等諸侯之任各有職貢小者得循事例大者决於朝廷聞白啓導屬在留邸爾等咸以謹密能膺任使或外除喪服或超授新命不失職祿勉於忠勤可依前件敕湖南同團練副使馮少端等皆長沙勇士同擢凶徒言念功勤咸宜升獎帖之憲秩試以崇班名郡掾曹亦為美稱特加恩寵非用彞章耀爾轅門以增忠壯可依前件朱諫周豹二人委本道量事優獎官健升滿等一百二十八人弩手并子弟周質等四百八十五人并委本道酌事量加賞給敕具官某等夫折衝果毅皆吾武位以延勇士國朝用此以進立戰功至將軍者衆矣自府兵一廢名存實亡今之來者豈其人哉近以邊障隙開寇戎患結豈無萬人之敵奮於下位之中但使披文空增拊髀並可依前件敕朕聞先王之理也設法誤罹雖大必赦不忌故犯縱小必誅况乎凶狠不悛罪戾日積更欲矜免其如法何銀青光祿大夫檢校刑部尚書兼左驍衛大將軍御史大夫張直方念以來朝嘉其慕善付之寵祿頗極尊榮為執金吾鞭小過而至死作禁軍統去異縣而恣遊尚以生自邊陲素乏教義退之散秩以懲非心俟其抆拭舊痕湔洗前過必欲牽復用存始終豈暴虐得於天生險悍著於心本抵冒刑憲縱恣胸臆法所惡者爾皆為之白晝九衢指摘萬手作橫日甚而不自知滿於聽聞豈可悉數禮曰凡有罪惡屏於四裔不留中國唯舜能之况堅頑有不移之姿網羅無屢開之典荒服作掾猶曰寬恩爾能自新豈惜後命可守恩州司戶參軍員外置同正員仍即馳驛發遣敕守愛州九真縣尉員外置同正員王著漢家之制雖丞相子亦當戌邊隋文之令盜邊穀一升坐法斬首蓋以西北鎮戌華夏保障法苟不立所虞非細爾當羌寇犯塞之日天子拊髀之時命守關防以為遮扞而乃占役兵糧自取傭直屏之荒服以謹其類乃令厥子呌閽稱寃再命坐獄備見罪狀幸以得無逋負可以矜寬為列郡之掾曹換萬里之一尉足得循省吾不負人可守端州司戶參軍置同正員仍即馳驛發遣敕朝散大夫守光祿少卿李玕昔開元致理之初冀州刺史平嗣光闕溫凊之禮遂奪其官放歸田里是故四十餘年風俗忠厚教化之本豈先斯乎爾為將相之家窮極富貴坐有大第官為亞卿母子異居僅將十載有司彈劾事狀昭著於吾用法爾當何罪俾佐名郡尚曰寬恩可守撫州司馬員外置同正員仍即馳驛發遣敕朝議郎前守景陵臺令上柱國姜閲等盜逆無狀輒犯陵寢侵攘法物聞之震驚爾等官業在於守奉懈怠所致是誰之過言於末減朕不敢議各宜佐官用正典刑可依前件仍並馳驛發遣敕守崖州司戶參軍員外置同正員武易簡寇來乘城不能死節以此播棄爾亦何辭然漢誅李陵是為虐典魏捨于禁實得中道力不足者法宜矜焉守臣教為吾爪牙能與別白使易簡導生還之路朝廷無失入之刑咨爾三事大僚百司庶尹率能守此可期治平各宜盡規朕不惜命可守梧州司馬員外置同正員敕繁纓趨朝交㦸入侍委以兵衛固須信臣內樞密使驃騎大將軍行右威衛上將軍知內侍省事上柱國晉國公食邑二千戶王元宥儉而多才忠而能力事君盡禮處已無私自主樞要益見誠信今者十萬全師北落禁旅視吳漢差強人意非韓信無可計事是以輟自心腹寄茲爪牙以盡爾材出於余志爾戢斂豪猾整肅威容無使鄉閭致有侵害勉酬倚任以報君親可行右驍衛上將軍知內侍省事充右神策軍護軍中尉兼右街功德使散官勳封如故敕控秦塞之西扼胡苑之左乃眷岐隴為國藩牆命以監撫宜崇班秩鳳翔監軍使銀青光祿大夫右領軍衛大將軍員外置同正員上柱國汝南郡開國公食邑二千戶賜紫金魚袋周元植事君以敬處仕無私節操凌霜而不雕肝膽開忠而洞見謙以自得高而益兢纍監三軍推誠一貫言念西塞未得高枕用其聲實以護藩垣夫處於兵戎豫今誡汝無怨不過於遠利伏衆莫若於律身立事成功酬恩垂美在此二者汝其勉之寵以內省之崇仍兼將軍之貴往服休命無忝恩榮可守右監門衛大將軍知內侍省事散官勳封賜如故依前監鳳翔節度兵馬敕新授景陵判官上騎都尉朱能裕朕以橋山弓劍渭北衣冠霜露之心悽感常切以汝端謹有守操尚無尤常在旁側備見忠孝用是獎擢爰資守奉夙夜勤敬無忝委任可將仕郎內侍省掖庭局宮教博士員外置同正員餘如故敕賜緋魚袋上柱國劉全禮等置在旁側皆有才能既歷歲時合霑班秩各宜敬恭職祿不懈忠勤可依前件敕詩稱鵲巢禮榮翟茀既彰牙爪之效宜齊伉儷之榮左神策軍護軍中尉兼左街功德使特進左領軍衛大將軍知內侍省事上柱國廣平縣開國侯食邑一千戶宋叔康妻清河縣君房氏懿慈柔淑作配忠勳能潔蘋蘩克叶姻族成此內則穆其壼風稱為令人實光婦道爰疏封爵用舉典章可服寵榮勉於輔佐可封河東郡夫人敕詩美夫人禮稱內子允膺腹心之任宜從家室之榮弓箭軍器等使特進行右領軍衛大將軍知內侍省事上柱國陰山縣開國公食邑一千五百戶吐突士煜妻咸陽縣君田氏生於富貴作配忠貞柔婉自卑儀範可則職勤賓祭道睦姻親既諧閨門克成婦德爰加禮秩之貴以彰輔佐之勤榮我疏封無忘內助可封雁門郡夫人主者施行敕某臣等感恩知義奉贄不闕居大海之外為有禮之賓爾國是也自列國卿至於署丞皆吾文吏之選次第授爾亦所以表他國不同禮也將我恩寵耀爾殊鄰慎勿怠違永作藩屏並可依前件仍並放還蕃敕古者天子守在四夷蓋以恩信不虧羈縻有禮春秋列潞子之爵西漢有隰陰之封考於經史其來尚矣西州牧首頡干伽思俱宇合逾越密施莫賀都督宰相安寧等忠勇奇志魁健雄姿懷西戎之腹心作中夏之保障相其君長頗有智謀今者交臂來朝稽顙請命丈組寸印高位重爵舉以授爾用震殊鄰無忘敬恭宜念終始可雲麾將軍守左驍衛大將軍外置同正員餘如故敕沙州專使衙前左廂都知押衙吳安正等自天寶以降中原多故莫大於虜盜取西陲男為戎臣女為戎妾不暇弔伐今將百年自朕君臨豈敢偷惰乃命將帥收復七關爰披地圖實得天險遂使朝廷聲聞聞於燉煌爾帥議潮果能抗忠臣之丹心折昆夷之長角竇融西河之故事見於盛時李陵教射之奇兵無非義旅爾等咸能竭盡肝膽奉事長帥將其誠命經歷艱危言念忠勞豈吝爵位官我武衛仍峻階級以慰皇華用震殊俗可依前件敕燉煌管內釋門都監察僧正兼州學博士僧慧菀燉煌大藩久陷戎壘氣俗自異果産名僧彼上人者生於西土利根事佛餘力通儒悟執迷塵俗之身譬喻火宅舉君臣父子之義教爾青襟開張法門顯白三道遂使悍戾者好空惡殺義勇者徇國忘家裨助至多品地宜峻領生徒坐於學校貴服色舉以臨壇若非出㣥之才豈獲兼榮之授勉宏兩教用化新邦可充京城臨壇大德餘如故敕幽州道入朝賀正契丹大酋領討魯等天子有道守在四夷爾今來朝豫亦增愧綏之玉帛榮以班秩宜懷恩寵永保封疆可依前件仍並放還蕃敕黔中道朝賀牂牁大酋長攝亠兊州刺史趙瓊林等夫西南諸國自古多順在法度之外居繩墨之表來朝有禮歸貢不闕玉帛以將厚意階級以峻等袠各服寵榮無忘恭敬可依前件仍並放還蕃敕黔中道朝賀訓州昆明繼襲部落主嵯阿如弟攝訓州刺史嵯阿蒲等招攜以禮懷遠以德此國家所以殊俗貢聘不倦命舌人以通志意委屬國以厚宴享仍峻階級式爾恩榮無警邊陲以念終始可依前件仍並放還蕃敕具官劉縱徒步詣闕上獻封章又自敘其先臣陳許間事皆歷歷可聽公侯子弟多溺於驕邪爾能讀書學文自可嘉獎圖籍之府命爾為郎豈惟振滯求能且不欲使勳勞之後栖栖於塵土中也可祕書省祕書郎敕某等豫大祭于廟祧而哀夫先後之家寖替而不章乃詔有司博求其世爾等名在戚里序于王朝各因其官增位一等冀以上稱神靈之意豈特慰豫追遠之心可闕臣某言臣伏奉某月日敕旨自某官授臣黃州刺史以其月日到任上訖臣某誠惶誠恐頓首頓首臣某自出身已來任職使府雖有官業不親治人及登朝二任皆參臺閣優游無事止奉朝謁今者蒙恩擢授刺史專斷刑罰施行詔條政之善惡唯臣所繫素不更練兼之昧愚一自到任憂惕不勝動作舉止唯恐罪悔伏以黃州在大江之側雲夢澤南古有夷風今盡華俗戶不滿二萬稅錢才三萬貫風俗謹朴法令明具久無水旱疾疫人業不耗謹奉貢賦不為罪惡臣雖不肖亦能守之然臣觀東漢光武明帝稱為明主不信德教專任刑名二主相繼聯續五十年當時以深刻刺舉號為稱職治古之風廢俗吏之課高於此時循吏衛颯任延王景魯恭劉寬陳寵之徒止一縣宰獨能不狥時俗自行教化唯德是務愛人如子廢鞭笞責削之文用忠恕撫字之道百里之內勃生古風凡違衆背時徇古非今王者公侯尚難其事豈一縣宰能移其俗此蓋漢人之為治以古人之法為一時之法以治古之教教之即治古之人以一時之法齊之即一時之人國家自有天下已來二百三十餘年間專用仁恕每後刑罰是以內難外難作者相繼土地甲兵權柄號令盡非我有終能擒之此實恩澤慈愛入人骨髓俗厚風古不可搖動今自陛下即位已來重罪不殺小過不問普天之下蠻貊之邦有罹艱凶一皆存恤聖明睿哲廣大慈恕遠僻隱厄無不歡戴受十四聖之生育張二百四十年之基宇臣於此際為吏長人敢不遵行國風彰揚至化小大之獄必以情恕孤獨鰥寡必躬問撫庶使一州之人知上有仁聖天子所遣刺史不為虛受蒸其和風感其歡心庶為瑞為祥為歌為詠以裨盛業流乎無窮在臣之心則然豈材術之能及無任感激悃懇血誠之至謹奏臣某言伏奉三月二十七日敕党項剪除北邊寧靜華夏同慶道路歡呼臣誠慶誠抃頓首頓首伏以上天有震耀殺戮王者有攻討誅夷是以不暫費者不久寧不一勞者不永逸伏以自古夷狄處中華未有不為患者春秋時長狄攻魯北戎病齊破衛陵燕侵秦撓晉西漢趙充國納先零於內地東朝馬文泉置當煎於三輔自後熾大侵亂關中戰爭十年騷擾四海陵逼京邑發掘園陵段熲不生終不能滅後至曹公因胸奴衰弱分為五部處在汾晉散而居之元海傑然首亂華夏中原喪沒凡數百年國朝貞觀之初突厥破滅太宗惑彥博之利口忽文貞之成算處其降衆置於河南不數十年果殘燕趙興師命將輸穀饋財天下騷然始能殄滅是知今古夷狄處在中土未有不為亂者伏以党羌雜種本在河外生西北之徑俗稟天地之戾氣為西戎所蹙舉種來降國家納之置於內地爰受冠帶兼服征徭角觡既成抵觸是務天寶至德之際北燕偏重中原一掀大歷建中之際逆胡餘波巨盜再起党羌因此亦恣猖狂兔伏鳥飛為戎虜之耳目狼心梟響作郊畿之殘賊比以回鶻未殄吐蕃正強且須羈縻未可重撅於是邊疆日駭種類歲繁每至徑弓折膠童馬免乳以魁健之質張忿鷙之凶劫饋穀以焚舟殺軺車而閉道衆虺盤結㣥犬吽牙依據深山出沒險徑近在宇下游於彀中艱難已來不能剷削伏惟聖敬文思和武光孝皇帝皇天縱聖赫日資明威極風霆謀先造化潛運睿算獨决神機箕宿禡牙狼星斂角戌日禱馬太白揚眉桉瑣而邊事無遺聚米而兵形盡見披其要地搗以奇兵獸窮摶人鹿急走險囊封赤白雜水臼繼來雉走檄書遠近同至蘇辛李蔡傅鄭甘陳十萬齊呼四面同入行軍於枕席之上敗虜於險阻之中或以利戈舂喉或以長矛挾脅僵尸積謺千山之草木飛腥霆電轟喧萬里之威靈大震詩曰不弔昊天亂靡有定此言中國不振蠻夷入伐下人號天以告亂也復曰宣王薄伐小雅中興是知武功不成文德不洽臯陶無遺之誡史佚非類之言若不殄除何為家國自此兵為農器革作軒車泥紫金於常山沉殘戎於青海天覆盡得禹畫無遺統華夏為一家用夷狄為四守萬物由道百度皆貞遠超三代之風使無一人之獄臣僻左小郡朴木敇散材空過流年徒生聖代尚能為詩見志作歌極情上詠神功庶垂後代限以守土不獲稱慶無任踴躍款懇之至謹奉表陳賀以聞臣誠惶誠恐頓首頓首謹言右臣奉某月日敕牒令撰故江西觀察使韋丹遺愛碑文臣官卑人微素無文學恩生望外事出非常承命震驚以榮為懼伏以洪為州府逾於千年言念疲羸常患水火風俗如此改革無因韋丹受朝廷分憂為百姓去弊不踐舊跡特建宏謀凡三年苦心去千歲大患兼之灌溉種蒔豐其衣食渤海潁川之治邵父杜母之恩校之於丹未足為比伏惟皇帝陛下陟降順帝施設如神納諫若轉丸去惡如反掌是以兵刑措寢年穀豐登而猶念切疲人及於循吏緬韋丹已效之績慰江西去思之心特與彰揚創為碑記是宜使內直學士西掖辭臣振發雄文流傳後代至於臣者最為鄙陋明命忽臨牢讓無路俯仰慙懼神魂驚飛臣不敢深引古文廣徵朴學但首敘元和中興得人之盛次述韋丹在任為治之功事必直書辭無華飾所冀通衢一建百姓皆觀事事彰明人人曉會但率誠朴不近文章受曲被之恩私如生羽翼報非次之拔擢宜裂肝腸無任感激懇悃血誠之至其碑文本謹隨狀封進以聞謹奏臣某等言伏以收復河湟廓開土宇北絶梓嶺西過榆溪壯中夏起塞之雄奪西戎理弓之地至使強虜不敢觸鋒山鎖七關地闢千里歌貍首而息射詠枤杜以勞旋聖德神功超今越古某月日臣某等於延英殿面奉德音陛下以克寸定舊疆獲承先志歸功祖考追尊鴻名臣等伏念國家之為治也溢三皇之軌躅奮百代之上下天寶之末天下泰寧恃富庶而醉飽無虞韜干戈而凶逆潛作大歷貞元之際河北河南之地朝廷行姑息之政郡國皆叛亂之臣苟且之令行畫一之法廢月增日長雄唱雌和李錡宗子劉闢書生東據石頭西斷劍閣朝廷所有唯止兩京伏惟憲宗皇帝順上帝之心酌列聖之法爵不踰等舉不失賢親莊正之人去側媚之士然後提挈綱紀震謺雷霆誅夷㣥凶灑掃四海百度如律九功可歌天業益張聖統無極詩曰惠我無疆子孫保之復曰周雖舊邦其命維新伏惟元和之初實開中興之業伏惟聖敬文思和武光孝皇帝陛下修先王之大道行天下之達德廣問延諫褒直盡下首雪寃獄常對法官是則虞舜恤刑文王慎罰無以過也開張聰明延納諫諍守職業者無職不舉被言責者無事不言皆獲甄升豈唯假借夫仲尼以三人有我師大禹以愚夫能勝豫是仲尼之好問大禹之拜言無以過也是以百姓手足皆安於措置四海風俗益臻於平和尚猶午夜觀書日昃聽政下採人瘼上求天瑞帝典曰聖敬日躋湯銘曰日日新是陛下之德有以過之仲尼曰禹立三年百姓以仁仰陛下之至理知孔聖之可驗夫西戎強盛自古無之包有引弓之人盡為跨馬之國天下獻力備邊不充四海輸賦養兵不足廣川薦草盡為所有健兵倅馬不可當鋒雖李廣材能充國沉勇但能閉壘豈敢交綏伏惟聖敬文思和武光孝皇帝陛下畜睿算於霄漢之表畫聖謨於造化之先捕虜將軍射聲校尉羽林突陳之騎酒泉校射之兵親自指蹤同時受命信星效祉靈旗呈祥壁壘巖巖而洞開渠魁纍纍而自縛解辮削袵投戈委弓懾怛威靈歡呼冠帶破種徙域空漠靜邊指北海而封燕然中西域而立幕府鄭吉之理烏壘班超之鎮他乾大庇生人一寬天下昔漢武帝之逐北虜四海耗半殷高宗之伐鬼方三年乃克尚書班史稱德詠功今陛下用仁義為干戈以恩信為疆場所求必至有鬬必先不遺一矢不頓一刃洗八聖旰食之恨雪百年亡地之羞小雅盡興大業無極為而不有歸功先帝禮曰天子有善上讓於天仲尼曰武王周公其達孝矣乎蓋以善於繼述能光祖考今者陛下謙讓之道符於禮經繼述之孝稱於孔聖臣等待罪宰相目覩升平謹具太常追尊順宗皇帝憲宗皇帝諡號如前伏聽敕旨臣某等言伏見湖南團練使奏生擒衡州草賊鄧裴及徒黨等伏以湖湘旱耗百姓飢荒遂有奸凶敢圖嘯聚今承擒滅已盡根株臣等誠歡誠忭頓首頓首臣聞三代之英兩漢之盛姦宄亂常之類挻災搆逆之黨乘間即有遇隙便生伏惟聖敬文思和武光孝皇帝陛下威極風霆德滋雨露正開壽域盡納㣥生永戢干戈將臻富庶逆賊鄧裴蕞爾小孽敢因艱食漸誘飢人剝亂鄉閭陵驚郡邑徒堅黨合事巨寇牢或據深山或閉官道遂使湖嶺之外人不聊生慎由指揮義徒總齊武士仰憑睿算遠仗皇威不經歲時盡剪豺虺党項已寧於朔北妖黨復殄於巴西今擒鄧裴一清湖嶺用夷狄為四守統華夏為一家言念秋毫無非帝力臣等備位台鼎日奉聖謨無任忭舞慶快歡呼踴躍之至伏奉宸翰以邊塞未靜將帥乏才唯務誅求不謀兵食者伏以陛下自即位已來正朝廷而舉典法肥天下而壽㣥生故能不血刃以收河湟用文誥而降羌寇干戈偃戢遠邇安寧今者尚以戌邊未得高枕深憂將帥不副憂勤或但恣於侵貪或不事其兵食須有戒勵形於詔書此乃周文小心克勤大禹不自滿假比於聖德無以過焉臣等備位鼎司親奉睿旨銘鏤肝鬲專令防虞無任忭躍屏營之至右中使某至奉宣聖旨賜臣等新絲者伏以繭蠶所繫在於纂組言功之大與食爭先陛下仁德動天雨澤順序柔桑沃若蠶女工勤皛比凝霜縈如委霧繭稅不逋於鄉井被覆皆遍於華夷盡荷皇慈同歌帝力臣等備位台席親逢盛時無任踴躍歡忭感恩之至臣某言伏奉今月日制書除臣某官同中書門下平章事祇奉成命進退失圖捧詔兢惶銜恩戰栗臣誠惶誠恐頓首頓首臣本書生仕逢聖代掌綸言於西掖作藩守於名邦自顧才能已是踰越陛下奬遇不次拔擢過分春闈典貢地官掌財咸無政能粗免闕及擢為管榷纍受寵榮雖竭盡疲駑欲裨萬一而才智疏拙不效涓塵夫宰相之任前賢有言如涉川有舟如幽室有燭代天理物為人具瞻豈伊小臣而膺大任今朝廷髦俊並作名德森然或多歷庶官皆有功實或四方屏翰已著勳勞舉而用之無不可者如臣凡淺豈宜委任伏乞俯回天鑑更擇時賢必能丹青帝圖金玉王度使微臣無尸祿之誚聖主有得賢之名非唯微臣獲安實亦天下幸甚無任悃懇血誠之至臣某言臣伏奉今月日批答令臣宜斷來表不許牢讓者仰承鴻澤跪奉芝緘戰越失圖啓處無地臣某誠惶誠恐頓首頓首臣昨奉詔書付以魁柄自顧斗筲之器朴木敇之才乘恩寵時竊棟梁任只合效蔡謨堅臥孔霸懇辭尚猶拜謝天顏進見卿士榮忝既積憂惶實深是以拜章上陳懇辭自敘冀回聖鑑更擇時賢豈意睿旨重臨綸言再下不令徇志且遣守官大君之成命已行微臣之丹懇不遂誓當戮力盡瘁粉骨捐軀知無不為見死寧避冀答君親生成之德用酬乾坤覆育之恩無任感激血誠慙惶戰越之至謹奉陳謝以聞右臣某言伏以降誕之辰生靈同慶合均天之廣樂九奏諧和令錫宴於仙祠百辟歡忭臣等幸生聖代獲備台階雖欲殺身豈酬大造無任感恩踴躍之至右臣某等言伏以大慶吉辰榮霑錫宴鴻恩繼至王人薦臨旨酒名茶玉食仙果來於御府莫匪天慈適口忘憂已滿小人之腹殺身粉骨難酬聖主之恩臣無任感恩忭躍之至右中使某至奉宣聖旨賜臣告身一通馬一匹并鞍轡臣生逢聖代竊位巖廊奉告令之詔書丹霄之雨露猶濕錫代勞之駿馬內棧之風雲尚隨寶軸煥絲綸之言逸足騁拳奇之態螢光爝火何裨日月之明弱質孤根但荷乾坤之德殺身寧報撫已知慙無任感恩忭躍懇悃之至右舊例宰臣每於閣內及延英奏論政事及退歸中書知印宰臣盡書其日德音及宰臣奏事送付史館名時政記史官憑此編入簡策伏以敷陳時政承奉聖旨事非一端時移數刻退朝循省執筆讚論但記出已之辭或忘同列之對若獻替之說或闕則史策之書不詳臣今商量每閣內奏事及延英對回陛下所降德音宰臣所奏公事人自為記共成一篇既得精詳必無遺漏付與史氏便得直書伏乞天恩永為常式右今月十八日中使某至奉宣聖旨令臣領江西觀察使紇干衆所寄撰韋丹遺愛碑文人事綵絹三百匹者恩隨幸至榮與利并抃躍慙惶罔知所措伏惟皇帝陛下皇天縱聖赫日資明大獎功勞不計存沒舉韋丹江西之績特令微臣撰碑墮淚之思豈慙羊祜黃絹之妙實愧蔡雍今者更蒙恩私廣受絲帛捧戴兢惕無地容身不勝感恩慙悚之至具官臣某等言伏惟聖敬文思和武光孝皇帝陛下天覆地容堯仁舜孝四海波靜三春物華故於彤庭大開錫宴竊以三事大僚百司庶府願持玉巵上千萬壽未敢專擅伏俟德音輕瀆宸嚴無任戰越之至具官臣某等言遲日正麗廣場洞開張仙樂者三千餘人列正羞者二十六豆酒傾瑤罋食置雕盤列圭組以成行酌金罍以為勞屬饜而止飽德以歸既醉太平之風共樂仁壽之域千年一遇百辟同歡臣等備位台司親逢聖日歡呼抃躍不能自勝具官臣某等言叨陪錫宴竊覩鈞天百品並陳三酒皆具微臣所志已極滿盈豈意鴻澤重霑錫賚殊等朱緑元黃之繒綵精金文錦之珍奇捧戴自天啓處無地不勝抃躍感恩之至前件官執德以進嚮道而行藹有令名備歷清貫掌綸言於西掖才稱發揮參密命於內庭衆推忠慎自珥貂近侍主鑰東門聲實益重於搢紳磨涅始彰其堅白伏以南省實天下根本兩丞為百司管轄苟非其選必致敗官今若以臣所任回授敬復庶能肅清臺閣提舉紀綱既曰陟明實不虛受伏乞天恩允臣所請伏準某年月日敕內外文武常參官上後三日宜舉一人自代者伏以前件官仁義素彰文學早著揚歷臺閣宣昭令名嘗為諫官無所避忌及領藩鎮實惠疲羸頃者不附權臣例遭左官今逢明代猶典小州伏以封還詔書駮正時事職業實重選擇宜精今若以臣此官回與蔣係既不虛受實為陟明伏乞聖慈允臣所請謹狀某啓伏以相公自專魁柄一闡大猷鎮撫四夷訓導百吏無不信順皆有程品猶尚不遺微賤特降慰誨重疊滿幅榮耀闔門捧戴生光啓處無地聞於白屋之輩皆願殺身詢於黃耉之徒以為異事慰示天下長育人材魚頡鴻冥之潛邱中島上之隱皆可以結戀隨指效用盡心接地際天日出月入盡得臣妾無不謳歌蒼生禺禺實有所望某一門骨肉皆受恩知效命之誠瀝血自誓無任攀戀感激懇悃之至謹狀某啓伏以近日當州人吏往來及諸道賓客行過皆傳相公以淮海之地災旱纍年仁憫之心憂念深切廣求人瘼大革土風恤養疲羸抑挫豪猾備職者思勵其已業官者得用其能鰥寡孤惸飛沉動植仁煦必及惠愛無遺吏不敢欺法能必束上行下效家至戶到閭里安泰史冊未聞竊以聖上倚注既深相公勳業愈重况茲異政即達宸聰伏料窮邊絶塞將議息兵宣室明庭必思舊德重秉鈞軸固在旬時某忝跡門牆不勝抃躍攀望棨㦸下情無任戀結之至謹狀某啓人惟朴木敇材實朽下三守僻左七換星霜拘攣莫伸抑鬱誰欣每遇時移節換家遠身孤弔影自傷向隅獨泣將欲漁釣一壑栖遲一邱無易仕之田園有仰食之骨肉當道每歎末路難循進退唯艱憤悱無告今者大君繼統賢相秉鈞遺墜必舉髦雋並作伏惟尚書秩高天爵德冠人倫為搢紳之紀綱作朝廷之標表凡遊門館莫非雋賢至於小人最為凡器頃者幸以屬郡祇事廉車奉約束而雖嚴滌昏蒙而無術實多闕每賴恩容敢望尊嚴特自褒舉手示遠降羈魂震驚感激倣徨涕淚迸落便無跛倚如生羽翰全忘鼠循忽欲鳥舉雖闕下一召歲中四遷校其光榮不能踰越禮曰君子愛其死以有待也養其身以有為也是小人忘生殺身之地刳腸奉首之報今得之矣復何求焉江山絶域登臨己秋猿吟鳥思草衰木墜黎侯寓衛有式微之詩趙王遷房創山木之詠流落多戚今古同塵回望門牆涕戀唯積起居末由無任血誠懇悃之至謹狀某啓某比於流輩疏闊慵怠不知趨嚮唯好讀書多忘為文格卑十年為幕府吏每促束於簿書宴遊間刺史七年病弟孀妹百口之家經營衣食復有一州賦訟私以貧苦焦慮公以愚恐敗悔仍有嗜酒多睡厠於其間是數者相遭於多忘格卑之中書不得日讀文不得專心百不逮人所尚業復不能尺寸銖兩自強自進乃庸人輩也復何言哉今者欲求為贄於大君子門下尚可以為文而為其禮詩所謂有靦面目視人罔極者也謹敢繕寫所為文凡二十首伏地汗赧不知所云謹狀
