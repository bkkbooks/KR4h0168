front:
  text: 全唐文欽定全唐文卷五百十八梁肅二
  hash: sha256:a27a1f76967bfd16a32497f1043a0cce4d5e1694c3c2e46f1fceaecdc4839672
body:
  text: 唐興九世天子以人文化成天下王澤洽頌聲作洋洋焉與三代同風其輔相之臣曰鄴侯李公泌字長源用比興之文行易之道贊事盛聖辨章品物疏通以盡理閎麗而合雅舒卷之道必形於辭其偉矣夫予嘗論古者聰明睿智之君忠肅恭懿之臣敘六府三事同八風七律莫不言之成文歌之成聲然後浹於人心人心安以樂播於風俗風俗厚以順其有不由此者為理則麤在音則煩麤之弊也悖一作朴煩之甚也亂用其道行其位者歷選百千不得十數嘻才難不其然乎開元中公七歲見丞相始興張公九齡張駭其聰異授以屬辭之要許以輔相之業洎始興歿不六十載公果至宰相封侯有文集二十卷其習嘉遯則有滄浪紫府之詩其在王庭則有君臣賡載之歌或依隱以玩世或主文以譎諫步驟六義發揚時風觀其詞者有以見上之任人始興之知人者已初太上當陽公以處士延登內殿實敷黃老之訓至德初宣皇以元良受禪公則獻泰階頌昭纂堯之道睿文以廣平伐罪公則握中權之柄參復夏之功大德不官既追五嶽之隱大用不器終踐代天之職方將熙庶工以成邦教載直筆以修唐書命之不融凡百興歎既薨之來載皇上負扆之暇思索時文徵公遺編藏之御府於是公之文辭光大一門近歲肅以監察御史徵詣京師始得集錄於公子繁且以序述見託公之執友諫議大夫北平陽城亦謂子曰鄴侯經邦緯俗之謨立言垂世之譽獨善兼濟之畧藏在冊牘載於碑表唯斯言不可以不傳於後嘗謂肅曰吾子辭直盍存乎篇序既詠歎之不足因著其所以然貽諸好事者凡詩三百篇表誌碑贊序議述又百有二十其五十篇缺獨著其目云文章之道與政通矣世教之汚崇人風之薄厚與立言立事者邪正臧否皆在焉故登高能賦可以觀者可與圖事誦詩三百可以將命可與專對若子產入陳以文辭為功仲尼弟子用文學命科文學者或不備德行德行者或不兼政事於戲才全其難乎有唐故祕書監丹陽公包氏諱佶字幼正烈考集賢院學士大理司直贈祕書監諱融實以文藻盛名揚於開元中洎公與兄起居何又世其業競爽於天寶之後一動一靜必形於文辭由是議者稱為二包孝友之美聞於天下擬諸孔門則何居德行公居政事而偕以文為主不其偉歟諷諭其從政則執度行志率誠會理不苟晦昧以撓其守故其言體要而動有事功易稱君子之光傳美忠文之實公之謂也大歷丁巳歲夏四月有唐文宗常州刺史獨孤公薨於位秋九月既葬門下士安定梁肅咨謀先達稽覽故志以公茂德映乎當世美化加乎百姓若發揚秀氣磅礡古訓則在乎斯文斯文之盛不可以莫之紀也於是綴其遺草三百篇為二十卷以示後嗣乃繫其辭曰夫大者天道其次人文在昔聖王以之經緯百度臣下以之弻成五教德又下衰則怨刺形於歌詠諷議彰乎史冊故道德仁義非文不明禮樂刑政非文不立文之興廢視世之治亂文之高下視才之厚薄唐興接前代澆醨之後承文章顛墜之運王風下扇舊俗稍革一作作者迭起不及百年文體反正其後時寖和溢而文亦隨之天寶中作者數人頗節之以禮洎公為之於是操道德為根本總禮樂為冠帶以易之精義詩之雅興春秋之裦貶屬之於辭故其文寬而直而婉辯而不華博厚而高明論人無虛美比事為實錄天下凜然復覩兩漢之遺風善乎中書舍人崔公祐甫之言也曰常州之文以立憲誡世裦賢遏惡為用故議論最長其或列於碑頌流於詠歌峻如嵩華浩如江河若贊堯舜禹湯之命為誥為典為謨為訓人皆許之而不吾試論道之位宜而不陟誠哉公諱及字至之祕書監府君之中一作第四子道與之粹天授之德聰明博達剛毅正直中行獨復動靜可則孝弟一作仁厚積為行本文藝成乎餘力凡立言必忠孝大倫王霸大畧權正大義古今大體其中雖波騰雷動起伏萬變而殊流會歸同志於道故於賦遠遊頌嘯臺見公放懷大觀超邁流俗於仙掌函谷二銘延陵論八陣圖記見公識探神化智合權道於議郊祀配天之禮呂諲盧弈之諡見公闡明典訓綜覈名實若夫述聖道以揚儒風則陳留郡文宣王廟碑福州新學碑美成功以旌善人則張平原頌李常侍姚尚書嚴庶子韋給事韋穎叔墓銘鄭氏孝行記李睢陽楊懷州碑纂世德以貽後昆則先祕書監靈表陳黃老之義於是有對策文演釋氏之奧於是有鏡智禪師碑論文變之損益於是有李遐叔集序稱物狀以怡情性一作稱物狀之美而暢其情性於是有瑯琊溪述盧氏竹亭記抒久要於存歿之閒則祭賈尚書相里侍郎元郎中一作員外李叔子文其餘紀物敘事一篇一詠皆足以追蹤往烈裁正狂噫天其以述作之柄授夫子乎不然則吾黨安得遭遇乎斯文也初公視肅以友肅仰公猶師每申之話言必先道德一作德禮而後文學且曰後世雖有作者六籍其不可及已荀孟樸而少文屈宋華而無根有以取正其賈生史遷班孟堅云爾唯子可與共學當視斯文庶乎成名肅承其言大發蒙惑今則已矣知我者其誰哉遂銜涕為敘俾來者於是觀夫子之志若立身行道始終出處皆載易名之狀故不備之此篇文之作上所以發揚道德正性命之紀次所以財成典禮厚人倫之義又其次所以昭顯義類立天下之中三代之後其流派別炎漢制度以霸王道雜之故其文亦二賈生馬遷劉向班固其文博厚出於王風者也枚叔相如揚雄張衡其文雄富出於霸塗者也其後作者理勝則文薄文勝則理消理消則言愈繁繁則亂矣文薄則意愈巧巧則弱矣故文本於道失道則博一作傳之以氣氣不足則飾之以辭蓋道能兼氣氣能兼辭辭不當則文斯敗矣唐有天下幾二百載而文章三變初則廣漢陳子昂以風雅革浮侈次則燕國張公說以宏茂廣波瀾天寶已還則李員外蕭功曹賈常侍獨孤常州比肩而出故其道益熾若乃其氣全其辭辨一作其辭源辨博馳騖古今之際高步天地之閒則有左補闕李君君名翰趙郡贊皇人也天姿朗秀率性聰達博涉經籍其文尤工故其作敘治亂則明白坦蕩紓徐一作餘條暢端如貫珠之可觀也陳道義則游泳性情探微豁冥渙乎春冰之將泮也廣勸戒則得失相維吉凶相追焯乎元龜之在前也頌功美則溫直顯融協於大中穆如清風之中人也議者又謂君之才若崇山出雲神禹導河觸石而彌六合隨山而注巨壑蓋無物足以遏其氣而閡其行者也世所謂文章之雄舍君其誰歟弱冠進士登科解褐衞縣尉其後以書記再參淮南節度軍謀累遷大理司直天子聞其才召拜左補闕俄加翰林學士夫士之處世用捨繫乎才進退牽乎時始君筮仕值蔽善者當路故屈於下位天寶末房公琯韋公陟薦公充史官諫司之任當國者不聽乃已中歲多難時方用武故委於外藩及夫入宣室而揮宸翰也方用人文以飾王度則因疾罷免嘻昔之君子賢人運與事并得信其志者寡矣其餘屬雅道喪缺黃鐘毀棄若孟子轗軻士安多病亦何可勝論惟斯文足以振當世餘烈足以遺後嗣此之謂不朽君既退歸居於河南之陽翟家愈貧而祿不及志愈邁而文益壯暇日以嘗所述作三十卷目為前集命予序之君與予實有伯喈仲宣之義故書於篇沛乎聖人在穆清之中合四序茂萬物謂二月之吉殷天人之和肇以是日為中和節原夫中以立天下之本和以通天下之志明君所以總萬邦也奉時以協氣播氣以授人元侯所以承王命也於時上元甲子之六歲地平天成河清海晏君臣高會由內及外粵我主公牧揚州領東諸侯既承湛露之澤且修式燕之禮乃邀中貴人及我上介部從事列將㣥吏大官重客峨星弁執象笏脫劒曳綬列於賓席者百有餘人火旗在門雷鼓在庭合樂既成大庖既盈左右無聲旨酒斯行迺陳獻酬之事乃酣無算之飲於是㣥戲坌入絲竹雜遝毬蹈槃舞橦懸索走之捷飛丸拔距扛鼎踰刃之奇迭作於庭內急管參差長袖嫋娜之美陽春白雪流徵清角之妙更奏於堂上風和景遲既樂且儀自朝及暮惟節有度君子謂福祿之所浹在是命矣既醉小子輒起而言曰大君有命令節茲始我公宴喜于以受祉歌以發德詩以頌美于胥樂兮胡可廢己公曰善迺俾坐客偕以六韻成章授為序上以志王澤所及次以紀方鎮之歡末以示將來盛事云爾德充則體和道勝則境靜抑常理也前左馮翊崔公意遺富貴跡叶幽曠與浩氣為徒故不導引而壽以善閉為事故無江湖而閒春池始平芳草如織乃啟虛館延㣥賢鳴琴漉酒以侑談笑搴英翫華以賞景物修竹滿座以環合紫籐垂旒以縈結地有滄洲之趣鳥無城郭之音信上智之高居人閒之方外者也於時眾君子飽公之和惜日不足顧相謂曰夫養正在我敘位在時今朝廷虛老更之席以待園綺公實舊德行將論道不暇焉可晦而息乎蓋詩可以興可以㣥盍歌詠之以志斯會且用祝公以君子萬年受茲介福焉爾古之厚風俗美教化必播於歌詠垂於無窮故風有二南之什傳稱兄弟之政其事尚矣二孫鄰郡詩者前道州刺史李萼賀晉陵吳郡伯仲二守之作也二公修懿文之烈成變魯之政地無夾河之阻人有同舟一作風之樂抑近古未之有也故道州詩而美之屬而和之者凡三十有七章溢於道路蓋云盛矣初伯氏用雅度碩畫掌柱下史一作方書出壅麾幢四領江郡仲氏以茂學達才由尚書郎貳京兆守上饒興元貞元閒偕以治行聞天子器之於是仲有吳苑之寄伯受晉陵之命自庱亭以東禦兒以北面五湖負大江列城十二縣環地二千里政教同和風雨同節禮讓同俗熙熙然有太平之風每歲土膏將起場功向畢二公各約車輿將命者十數人循行邑里勞之斯耕喻之斯藏民樂其教且飽其和然後用籩豆斚展友愛於交壤之次綽綽怡怡有裕有歡二邦之人於斯觀德可謂之榮矣本夫詩人之志有四焉美其德美其位美其政美其鄰信可以編諸唐雅昭示後學豈止於塗歌里誦遐邇悅慕而已肅嘗辱二公之眷謹序篇首庶采詩者得之陳於太師以知吳風昔趙文子觀九原有歸歟之歎謝靈運適朱方興墓下之作或懷德異世或感舊一時而清詞雅義終古不歇十三年春予與友人歐陽仲山旅游於吳里巷之閒有墳巋然問於人則曰吳將軍周公瑾之墓也予嘗覽前志壯公瑾之業歷於遺墟想公瑾之神息駕而弔徘徊不能去昔漢綱既解當塗方熾利兵南浮江漢失險公瑾嘗用寡制眾挫強為弱燎火一舉樓船灰飛遂乃張吳之臂壯蜀之趾以魏祖之雄武披攘躑躅救死不暇袁彥伯贊是功曰三光三分宇宙暫隔富哉言乎於是時彌遠而氣一作名益振世逾往而聲不滅有由然矣詩人之作感於物動於中一作感於物象發於詠歌形於事業事之博者其辭盛志之大者其感深故仲山有過墓之什廓然其慮粲乎其文可以窺盤桓居貞之道梁父閒吟之意凡有和者當繫於斯文上德與汗漫為友無江海而閒其次則仁智相從有山水為樂故合志同方賢者有柴桑之隱游道同趣吾徒為雲門之會其造適一也先會一日沙門釋去諠命我友相與探玉笥上會稽然後泝若耶過鳳林而南意欲脫人世之羈鞅窮林泉之遐奧於是捨舟清瀾反策閒原遞杳靄而歷嶇嶔入深翠以泛迴環遂至於雲門觀其㣥山謺翠秦望拔起五峯巉巉列壑沈沈上摩碧落旁湧金界其下則百泉會流蓄為澄潭涵虛鏡徹激瀨玉潄泠泠之聲與地籟唱和不待笙磬而五音迭作眺聽不足則凝思宴息怳焉疑諸天樓觀列在咫尺庭衢之中別有日月既而動步真境靜聆法音合漆園一指之喻一作論詣淨名無住之本萬累一作慮如洗百骸坐空視松喬為弱喪輕世界於棗葉蓋道由境深理自外獎故也昔之遠公紀廬山謝客題石門道流勝賞今古一貫曷可不賦貽雲山羞乃各為詩以誌斯會同乎道者有隴西李公受高陽齊霞舉約會未至亦請同賦此篇用廣夫游衍之致云初公以文似相如得盛名於天下大歷再居獻納俄典書命時人謂公視三事大夫猶寸步耳爾來六七年同登掖垣者已迭操國柄而公方自廬陵守入副九卿器大舉遲不其然歟前史稱漢文帝對賈生語至夜半且有不早見之歎矧公才為國華識與道并當欽明文思之日繼宣室前席之事必將敷陳至論超履右職使賢能者勸彼棘寺竹刑豈君子淹心之地乎亦既撰吉晉陵主人於夫子有中朝班列之舊是日惜歡會不足乃用觴豆宴酬以將其厚意意又不足則陳詩贈之屬而和者凡十有一人小子適受東觀之命從公後塵行有日矣存乎辭者祗以道詩人之意而已至於瞻望不及之思不敢自序云使君至德初以一命領太原尉俄歷御史參丞相軍事所從之主則李侍中王黃門其人當時議者謂翰音上騰非決起所及展轉祿仕三十餘年乃以宰邑功次除晉安守其恬於名利如是體命者歟後時然乎傳稱士任重而道遠惟先尚書文公茂德盛名光乎前朝吾子淑慎其身荷伯父覆露銀章皁蓋秩二千石方將布王澤以牧閩人得不謂重且遠乎行當變未善之俗使至齊魯然後祗承優命超處蕃閫迺其盛也七月之吉火雲在天征車徂東瞻望不及所當慎者殘暑而已豈以遠道為戒哉摻袂如之何序以道意昔司馬相如當漢六葉為言語侍從之臣今天子用人文化成亦以君有相如之才擢居諫職且掌宸翰賦頌書奏粲然同風夫君子之道與命與時三者并則不期達而達不然則或鼓或罷或塞或通是以長卿屢去其官而君亦以疾退息各其時也君曩時祭夏圭一作主頌比於馭龍射虎其詞最盛如夏雲秋濤變化騰湧蔚乎當代學者誦之及夫朝夕論思上尤所器異故乞身之表七上而後賜告有以見聖王之愛才也夫賢者境不靜則神不怡身不安則疾不去故夫子暫游江湖樂其靜也復還少室就其安也易傳稱養正則吉矧夫氣甚和志甚邁興愈贍而才未竭是行也方憩於雲林之中陶然自養以餌浩氣然後階浮雲翼疾風登紫垣步清漢當此時無妄之疾抑自去不暇安肯住於肌膚閒哉始君未為近臣時論有積薪之歎及其造退朝廷厚優賢之禮今也于歸君子賦考槃之詩此數者足以觀子之義不可以不序焉爾國家方偃武事行文道命有司修圖籍且慮有闕文遺編逸詩墜禮分命史臣求之天下若汲冢墓陵山穴之徒必從而搜焉拾遺耿君於是乎擁輕軒奉明詔有江湖之役黽勉已事將復命闕下七月乙未改轅而西將朝夕論思左右帝扆用廣夫天祿石渠之籍託諷於吟詠情性之作當堯舜之聰明魏丙之謨猷以拾遺之才之美其翰飛遠邇不可度已眾君子蓋將賀不暇彼吳秦離別於我何有作者之志小子承命而序之上將以道莅天下先命大臣舉有道以備司諫故朱君長通有拾遺之拜時議以為明天子在上百僚奉職於下化既成矣而猶廣獻納以通諷諭聖人之心其至矣初長通以比興之文名震翰林又以元遠之致升聞天朝其靜也眄滄海以遂志其動也披白雲以受詔吳中賢士大夫相賀不暇長通方移疾餌藥不出東山者三年或曰以君之才之識宜行而止宜語而默且君命召其可以久乎由是不俟駕亦不敢言病獻歲之吉涉江而西夫宴息以宏道由道以致遠位在乎忠道在乎辭蓋拾遺之志如此彼離別之難秦吳之遠前期之不易皆付之樽中可也又曷足置於心胸閒㣥賢於是乎酒酣歌詩以代雜珮之贈至哉聖人在穆清之中注意左右獻納之臣於是扶風竇易直由華陰令擢拜左拾遺詔下之日士大夫相見而喜曰易直舉矣直道其行乎頃之會國家舉風力以變元氣闡文明以張四維上曰五諫寂寥七臣安在由是獻可弻違者悚以奉職而君亦朝服賁然時然後行七月初吉整車祀軷安定梁肅舉觴以祝曰夫有其道而不得其位得其位而不得其時昔人所以為歎也君以懿文當百寮師師之盛履王臣謇謇之位行見夫朿帶彤墀之下高議明堂之側宣上德抒下情唯夫子是望彼吟咏風騷優游平勃之事又曷足為長者言耶非歌詩無以見惜別之志不可以不賦高人出於華族冠冕處乎山林於士儀見之矣在魏周際逍遙韋公語默之閒全清淨之道閒餘二百載之子以純懿貞粹追烈祖之蹤一門清風光映今古可謂全美也已初士儀與孔君述眷同隱於嵩邱上嗣位舉逸民孔以諫議大夫徵且調護太子乘輿還自漢中吾子方徜徉於松桂之下鶴板入谷拜左拾遺固辭獻納之任遂有江湖之適議者稱孔之兼善吾子之自得出處一轍消息同符然後知刻意而高待時而動者俱失其道理矣揚州刺史杜公蘊伊邵之望悅禽息之風士儀依仁游道幾歷寒暑既浩然有歸思乃忽乎以將行子嘗同召諫官同被儒服所不同者執李公之御與蹈潁陽之塵而已會脫韁鎖隨烟霞訪吾子於嵁巖之側豈或碌碌久為躁靜之異乎先言寄懷且以序眾君子考槃之什才全者必幾於道志正者必安於時初劉君以文章游翰林深於文者以公幹越石為比中歲有邁世志脫畧纓弁住江湖閒論者又比之阮始平陶元亮未幾詔掌柱下方書出參蜀漢軍事俄復自適其適道岷江浮湘潭歷敷淺原而東君子謂君涉履所至擬司馬子長遂留滯吳南以道自居其名益振其致愈遠向非才全志正又曷由光茂如是乎今軒堯在上伊傅作輔方舉賢能以熙眾職故劉君朝服賁然將如京師御史延陵包公祖而觴之且曰易傳不云立誠以居業論語不云邦有道則智吾子居可大之業當則智之時是往也將賀不暇豈愴別乎二三子尚未醉盍各賦詩以代疏麻瑤華之贈中丞既歌首章命和者用古意皆以一百字成之凡七篇今年春上以副丞相鮑公領太原尹假節主河東諸侯北門宴閑夷夏是賴秋七月其部從事大理司直周頌自廣陵赴焉是宜復命禮也初朝廷謂晉陽國家之豐沛天下勁兵所處故以推轂之任付鮑公公謂三軍經用仰淮湖之餽非仁智不足任也故以汎舟之役咨司直司直器畧宏遠文敏忠信夫文則經遠敏則有功忠信則厚事三務既成單車而還議者謂司直道將光大乎不然時之與才何其參會也夫躡搏風之便者其翼必大搆大厦之重者其材必廣頃鮑公田尚書郎為韓侯之佐三四年閒董戎於藩穆如清風文武為憲以司直之懿文碩畫翔集翰林之上陵厲之勢不可度已非光大而何士有不佞嘗辱盛府之召之子於役我心載馳因賦思鴈門一章蓋取夫欲往從之路遠莫致云爾秋風木落臨水一望遠客之思多矣而裴侯復告予將歸故國傷懷贈別之詩於是乎作也夫道勝則遇物而適文勝則緣情而美裴侯溫粹在中英華發外既乘興而至亦虛舟而還與夫泣窮途詠式微者不同日矣若悲秋送遠之際宋玉之所以流歎也况吾儕乎予同郡皇甫生膚清氣和敏學而文嘗纂家範數千言自遠祖漢太尉晉元晏先生以還門風世德煥耀篇錄生聿修之志可觀矣予聞璵璠在璞與碔砆等耳及夫琢而成器則價重當世以吾子之質且琢之不已名者公器其可避乎鎮南杜公負佐世之才有盛名於天下門閭之賓唯吾子屬斯往也亦以赴知己而沽善價吾儕贈之以詩蓋勉行而已豈以遠道為戒乎唯酒可以破別愁眾君子不可以不醉焉爾恒衞大陸之閒土厚風淳世生偉人其大名大節之後著於天下唯張氏為盛曩予得其叔季曰芃曰苞始冠章甫游翰林蓋相知矣而未深也閒八九年又相遇於江淮閒則叔也秀才登科已知名於代季也立誠居業為後進之表加以直強毅恭寬信敏文史足用弛張不窮向吾所稱土風偉人蓋此也今年上求士於四方揚州牧扶風公嘗得叔為門閭之賓因以充選議者謂扶風舉賢不避親叔得舉不以私則其才可知也季屬文以氣為主以經為師慕宗伯之賢從州黨之賦則其志可知也始大歷末予應詔至京師時子伯氏以文德都絲綸之任博約之道於予最深絕絃之悲仰前修而未遠斷金之契於吾子而益厚別者人所不免况予情乎凡道不合則信不深言不盡則意不見序所以盡言而信道焉爾無金玉爾音焉鄭侯身甚否而意甚泰家愈貧而學愈富言政必及王言性必及道言文必及經而動不踰閑貞不絕俗年出三十其志未光抑有由哉夫風之行也則萬竅怒號時之止也不能動纖毳士不用則塊爾而已遇則雲蒸雨隨是牽於時而不由於已鄭侯雖有洛下之才淹中之學其如時止何傳曰美惡周必復吾子困於臲卼星幾周矣或者其將復乎予材薄體弱曩遇晉陵守獨孤公方執文柄為當時律度見視有終日不違之歎公既問服予將絕絃寢門銜悲適覯吾子子即晉陵之出也一見而觀其禮再見而同其志志同而忘其言悲歎兩集而不知其止邇來蓋一紀矣詩人賦繁霜之月予滯於吳子遊東陽當逆旅之次送乘桴之士命旨酒登高樓酣歌氣振人莫知者夫物不可以終聚必受之以散離會不紀何用文為既而敘行且以見志上人形就而心和行獨而志潔辱與僕游殆三十年矣初用文合晚以道交淡而文文而敬他人未之知也今年春予有幽憂之疾謁長桑氏於東南上人以無住為樂將邁乎壽陽相待形骸之外相忘江湖之上比夫世閒重事者不同日矣彼都人士高陽許生孟容開封鄭侯通誠皆於上人有忘言之契想與夫二君道舊之暇必荷錫而遊問小山叢桂何在濠上鯈魚樂否子至東越亦訪支許故事歸而於虎邱之精廬先出後期以志少別云爾至人不在方實相無所住此沙門鑒虛所以順理而隨世也適遊皇都談天於重雲之殿今也于歸將休於沃洲之山泛然無事獨與道俱遇物成不遷之論閒吟有定後之作可謂遠也矣曩予師來越業天台之道追石門之遊爾來已十數年長松飛泉寢寐吟想送子於往情如之何東南高僧有普門元浩予甚深之友也相遇之際幸說鄙夫擾擾俗狀且當澡灌心垢再期於無何之鄉尊師以齊物為師抱神為事有年數矣外則質貌蒼古遺是非於耳目內則沖氣浩然卷虛無於橐籥常誦道德上下篇往來吳中諸山如浮雲獨鶴自適其適吾陋且遁跡不暇又焉識其所以戊辰仲夏覿於山陰精舍於時方牧追右軍許邁之期下走作壺邱禦寇之遇亦既合契於焉飽和百骸自理滓濁如洗先是師藏道書於卞山之下留止未幾忽乎將行不受一毫之施且輕千里之別有以見無待之情矣予欲脫形神於鞅絆蹈方外之逸軌有志未就心馬火馳命養空而游相從於赤水之上師乎師乎斯言不苟也夫益都有司馬揚王遺風生嘗薄游西南覽其江山頗奮文辭歎蜀解嘲四子講德之式及夫秀士升貢有司處之以上第時輩歸之以高名飄飄然有排大風摩青天之勢今歲後四月謝諸朋游輕騎東出且以五綵之服拜慶於庭闈榮哉孝乎是往也予嘗與生為五湖之游矣今則繫在柱下不能奮飛送歸如何為媿為羨大雅云敬慎威儀以近有德蓋雖有雜珮不如此詩輟而為好以志少別自三閭大夫作九歌於是有激楚之詞流於後世其音清越其氣淒厲吾友君貺者實能誦遺編吟逸韻所作詩歌楚風在焉初元之明年予與君貺兄洪俱參淮南軍事屬河外塵起羽書狎至每沈迷簿領之際一見夫人清揚則煩襟洗如也又常愛其人也澹然其靜也曠然其適也泛然其無不與也且從賓薦之禮以赴揚名之期又見其志也秋氣云暮蕪城草衰亭臯一望烽戍滿目邊馬數聲心驚不已感離別於茲辰限鄉關於遠道孰曰有情而不歎息傷時臨歧者得無詩乎聖非道不生道非教不明教非人不行是三者相依而住道有大小權實故淨名以在家成化人有聖賢淺深故智者以初依啟法然後因言遣言即象忘象俾後學有以得正真之終始遊道義之門戶祖而述之存乎其人天台上人比邱然公纂智者之法裔探毗耶之妙賾一貫文字之學會歸解脫之淵以為昔智者大師之演是經也備偏圓頓漸之義盡方等生蘇之體其旨遠其道微微言在茲茲用不惑故常外闡其訓內澄其照凡百學者望崖而歸嘗謂門弟子曰祖師所述其道甚著而嗜者或病其繁習精者則遺其麤吾欲因而就之以伸其教刪而裁之以存其要何如弟子比邱眾作禮以請公於是削其浮辭合為十軸不失舊則其義惟明與前部偕行號為淨名畧疏原夫聖人有以見生生根器之不齊也故用四教五味經而緯之有以見萬法弛張之不殊也故用一道一乘會而成之然則聖人隨感以利物故其數不得不差賢哲因感以立誠故其業不得不傳觀其所感則毗耶之與天台杜口之與立言雖階位不同廣畧異宜至於赴機施化其揆一也肅嘗受經於公門遊道於義學雖鑽仰莫能而嗟歎不足故序其述作之所以然著乎辭疏成之歲歲在甲辰吾師自晉陵歸於佛龕之夏也晉陵守河南獨孤公以德行文學為政一年儒術大行與洙泗同風公以為使民悅以從教莫先乎講習括五經英華使夫子微言不絕莫備乎論語於是俾儒者陳生以魯論二十篇於郡學之中率先講授乃季冬月朔公既視政與二三賓客躬往觀焉已而公遂言曰昔文翁用儒變蜀蜀至於魯當大歷初元新被兵饉之苦今御史大夫贊皇李公為是邦愍學道闕開此庠序自後孝秀並興與計偕者歲數十人子衿之詩起而復廢鄉飲酒之禮廢而復興至於今風俗遂敦美矣哉仁人之化也摳衣之徒承其波流得不勉歟既誨而厲之又悅以動之朱輪遲遲逮暮而歸士有獲在左右覩公之施教退謂人曰夫四時繼氣而成物仁賢繼功而成化是學校也非贊皇不啟非我公不大鼓之以經書潤之以仁義君子得之以修詞立誠小人仰之以遷善遠罪泱泱乎不知所以然以致夫政和而人泰舊史記前召後杜而南陽移風民到於今稱之矧贊皇植學之本與我公道之以德德則有成而未播於敘述後人謂之何哉鄙不佞謹紀公之雅訓或傳諸好事者云爾氣之貫萬物也盛矣本乎天者資之以生本乎地者資之以成古之善為道者知氣之在人不利則鬱鬱則傷性伐其命而不可援也於是乎張而翕之導而引之熊經鳥伸吐故納新使流於六藏暢於四支浹於肌膚之會固其筋骸之朿然後百病不生耳目聰明可以保神可以盡年和之至也故歧伯得之為軒轅師廣成子得之千二百歲而身不衰彭祖得之上及有虞下及五霸後學得之隱名山而遊人閒壽考者不可詳而紀矣原其所出皆以歧伯為祖有浮山隱居朱少陽者得其術於黃帝外書又加以元化五禽之說乃志其善者演而圖之被以章目凡三篇究其所由蓋久視之門戶樞之善喻者也少陽年涉期頤神氣轉壯每至虛空之中自試此法或屈或伸或盤或旋或迴互翕闢終日不倦每振寂郵肯綮之際必圭石然響然用力甚微而合於桑林之儛此又技之甚尤異者也暇日以所述示予予喜而序之以寘篇首俾博覽者以知還年之一路道者之雅戲云天寶中言雅樂者稱馬氏琴石侯嘗得其門而入矣故其曲高其聲全余嘗觀其操縵味夫節奏和而不流淡而不厭凜其感人而忘夫佚志已而謂余曰鄙夫徒能彈之而至和樂獨善其身足使情反乎性吾聞其語矣未辨其方也敢問何為而臻哉古之聰明睿智其能為乎余愀然曰善乎夫子之問是道也吾嘗聞諸師矣夫人生無其節則亂故聖人道之天和作樂以救之於是乎有五絃之琴以暢五音以協五行以宣五常以紀五事後世聖人以為五絃備其本而未行其變變而裁之莫先乎文武之用於是究夫剛柔復益其絃者非他也文武之道也亦猶八卦既列復因而重之然後既可以動天地而鼓萬物盡變化而感鬼神極聖人之能事反百慮於一致此琴之以為貴也故虞帝以之乃歌南風禹湯以之而作夏頀周文武以之萬邦協和卜代三十成康以之刑措不用仲尼以之見文王之象而樂正雅頌各得其所若琴道不行則君子之道消而王澤不下故殷紂失之而棄河海幽厲失之而周道中絕晉悼失之師曠一彈而國大旱琴之興廢與理亂相並夫備殷薦以配祖考肅相庶幾神降則不可廢於郊廟矣若夫和平其志氣暢達於動用使邪物不接則不可廢於律度矣故自有國有家下逮於庶人莫不尤重焉君子所居於是有左琴右書士無故不徹蓋謂是也周穆載雲和空桑龍門之琴禹貢嶧陽之桐以為之歷代善琴之士與幽蘭白雪之號則吾子其自知己夫何言哉問曰若如所云則今之為琴者多矣君子之風何其未扇歟對曰琴樂之雅者也雅者正也正者謂能宣正其聲而行正道今夫鄭衞之移人久矣其人或正則其位未大其位未大故正聲未被君子風薄不其然乎夫雅樂之所貴者豈取清商流徵不失度曲而已彼各有所起也言畢石君善之俾予紀其辭遂號為序云
