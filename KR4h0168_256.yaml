front:
  text: 全唐文欽定全唐文卷二百五十六蘇頲七
  hash: sha256:5d40835b652dc803723c556657937227d797713c5fdf88379fba946aae79c8c1
body:
  text: 臣等伏承太史奏昨一日太陽虧陛下爰發行宮不御常服聖慮淵默天情寅戒頓於行在不可禜社以責陰凡厥觀瞻不殊登臺而視朔自停午過晡申寒沍成春陽光轉大伏惟皇帝陛下纘千歲之統擁三神之休道洽功成增高益厚金繩玉檢轥迹於前聞日觀雲封降祥於即事且疇人察序太史宣職以歷而推式聞常度至時不蝕乃自殊祥陛下昭事於上天上天昭答於陛下若是之速其何響會非常之祉孰不欣懼臣等忝預從臣無任踴躍慶抃之至頃者西郊不雨南陸陽上動聖情下憂農事一人以禹湯罪已百姓以堯舜為心知天人之合符非土龍之可致德音朝降才出於巖廊膏澤晚飛已周於城闕麥宜早秀日助清光禾欲潤成歲知秋穫惟皇建極天且弗違用爾作霖臣復何補既叶夢魚之吉預占鳴鸛之期抃躍之誠萬萬恆品右臣等昨面奉聖旨以近日暴風雨恐麥有損陛下務農在候輟膳終朝憂勞之甚起居不懌臣等聞重華之德昌發用心夏禹則為人先成湯自以身禱求諸往事未或前聞天與聖符風將雨止杲杲之日吐扶桑而已霽芃芃之野合岐麥而皆秋仍滋北里之禾更潤南山之豆京坻可望不知日用之功旒扆注懷尚切在豫之念臣叨陪近侍親奉德音上貽慮於納隍下增憂於折鼎無任惶悚之至右巢於黃門外省過官廳事丹眸瑩徹明若流珠嘉毳鮮華光如蘊玉臣等謹按瑞應圖白雀主鐵券陰之精也不來則國無後嗣伏以青宮踐位慶重離於上天黃閣曾巢屬五瑞於明日固以事優銜符聲高作頌臣等叨陪近侍喜萬恆情無任抃躍之至臣等聞喪禮俯就所貴從宜古先哲王莫非孝子則知服紀漸變以至於除既除之後無不從吉祔即吉祭示不可踰頃者正自山陵奉安宗廟終服變禮今則其時執而不行將何用禮伏惟皇帝陛下孝思罔極首冠禮經然以神器至公理循故實今尚未臨正殿猶御慘衣夫以安上理人莫善於禮今若順情廢禮何以正人㣥下喁然不知所措臣等謬陪樞密輒敢陳祈伏乞以禮制情式遵常典無任悚迫之至臣等伏奉墨制固違㣥請未許公除臣等茫然罔知攸措臣聞孝者貴合道禮者貴從宜合道始可行孝從宜始可達禮況先皇遺旨行孝者共遵國朝舊章達禮者同守非宜將焉用禮違命豈得稱孝伏以至尊之制與凡庶不同故易月更除以時漸降山陵既畢謂之反虞宗廟當祔無不從吉今若除不易月降不以時豈得虞而不祔尚居喪服所以先儒執禮適變而除王者從權將除必降伏惟聖懷永慕雖增罔極故事不遠孰可虧違臣等至愚期於死請臣等愚昧頗觀禮典數百年來漢晉閒事主天地者不以私廢公行喪紀者故以日易月貞觀之後三宗遺訓著在實録垂之不朽匪臣等敢率下情屢希上達伏以聖懷罔極孝思永慕失人祇之大願持曾閔之小節使祖宗之禮家國成規陛下因而違之臣等固知其不可皇極神器天下至公曠時不親衆務皆闕阻㣥情非順也喁喁億庶仰望天光徂夏及秋旬有四月陛下何以承顧託何以撫黎元臣等惶然不知忌諱敢昧死陳請冀垂昭納明日望於別次視事以寧臣子荒迫之心右臣謹按地圖舜陵在九嶷之山舜廟在太陽之溪舜陵古老已失太陽溪今不知處秦漢以來置廟山下年代寢遠祠宇不存每有詔書令州縣致祭奠酹荒野恭命而已豈有盛德大業百王師表沒投荒裔陵廟皆無臣謹遵舊制於州西山上已立廟訖特望天恩許蠲免近廟三五家令歲時掃灑以為恆式豈獨表聖人至德及於萬代實欲彰陛下元澤被於無窮謹録奏聞臣近者特奉玉階親承聖旨伏知今月十四日夜月蝕當盡此驗非遠即胡滅之祥臣以為太陰之蝕必在於望太史司占不言邇日聖人同契果應先天而不測為神前知者聖臣昨宵將暝精慮仰觀初則桂魄正圓俄見蓂枝遂缺乙夜之後所蝕便既臣載欣載躍聞所未聞但恐默啜禍盈命危勢蹙百年之運晷刻當窮三象之微蔽虧先肇臣等忝階近侍喜萬恆情無任欣躍之至內常侍趙元亨奉宣恩旨以臣被竊盜失物賜臣衣一副臣素以慢藏闕於周備令尹為過尚不可逃太邱有言復不能學使臣知政未息盜於萑蒲加臣匪服遂增輝於樗櫟顧深咎翻荷恩慈捧戴循環再三惶懼無任下情之至亠兊州人平辨受業於田才才亡辨著服六年廬於墓側刺史以為違經越禮妄造異端禁錮三年辨妻遣小女上表稱冤廉察彈刺史刑獄不當田才地居鄒魯家習文儒業擅籯金道光珍席夙漸升堂之教早傳藏壁之書學市攸開几筵爰設故得詢疑請益還如北海之前函丈摳衣更似西河之上平辨雩川童子關里諸生常因閉戶之勤豫受專門之業庶祈榮於青紫希變采於朱藍日就月將罰水之恩何極陵夷谷徙穨山之痛已深舊宅淒清空聞絲竹遺壇寂寞無復琴歌嗟二物之長收願百身而奚贖方思重服用表深衷一對松揪六遷檀柘曩時儒肆喜遇祥鱣今日凶廬悲逢弔鶴論情雖會於寧戚據理未允於通途刺史職在宣風政乖道俗沉憂六載亦可驚嗟積禁三年固其未得少女以銜冤伏奏雅叶於雞鳴大使以糾慝彈豪正諧於隼擊即宜録奏伏聽宸衷學古入官不殖將落聖人所以留範君子誰非用心倚哉寧生勤亦至矣手繩口誦何劉實之能匹負書擔笠豈蘇秦之可加悠悠長途是諷是詠撫中襟而始勵經巨險而方歸師以來晚見嫌聊申檟楚令以罰非其罪乃起異端在師雖則傷嚴遣謝又乖通論且尊無謝卑之禮卑有順上之心蒙雖不才此為未允王丁果行育德師逸功倍參則不敏佇揚名以立身回也如愚自聞一而知十好問斯在請益無疲拾紫期榮滿金非寶朝遊霧市披學序之圖書暝出香街聽嚴城之鐘鼓歸與不逮行者宜息墨綬榮班黃圖貴令懲姦擲伏冀靜於桴鼓慕道崇儒豈威於鞭撻奚殊政本不抵彞條竟釋吏人之執旋辱宰君之惠繡衣驄馬石室生風警夜巡晝金吾翊道雖將順其美不在伺察而各恭爾職罔或愆違有觸疏綱允符嚴右散騎常侍兼國子祭酒崇文館學士舒公邦之碩儒也富於學深其智秉辟雍之禮講金華之義者嘗有日焉辨大而言若訥位高而志益下造膝則人無異辭匪躬則我有餘力儀正可象聲希必應此所以孔光密而張輔寵也故進避榮而榮自取退崇讓而讓得之既而命列幡旗焜煌照於西第徒成俎豆眷戀馳乎東國每灑涕而祈主將候顏以拜親天子懷公達之舊惜康成之往乃眷中留久而下制是月惟閏乘春載陽服老萊之衣飄組丈二擁終童之傳送車數百晨省偉其傳呼晝游嘉其飲餞來而喜懼經躍鯉之新泉至則光輝對回龜之舊浦夫志於道者二三子之莫逮善于孝者千萬人之所說未有丹誠注於闕下白首登于堂上門生仰而結轍邦牧趨而負弩豈非訓虞受封就宋傳業俾魯師之教者其馮母之榮乎於是絲庭華省之家虎觀鴻都之士屬鶬鶊鳴矣楊柳依依情搖江上之楓思結河邊之草吳州日見楚山雲絶莫不捧袂黯然彈毫以贈庶幾離言之至知儒行之尊歟唐開元四年太歲景辰二月戊申朔二十六日癸酉銀青光祿大夫刑部尚書昭文館學士中山公薨於京師宣陽里私第享年六十先五日扈駕自新豐湯井還其日奉制持節復賽于湯所以降雨故也還歷二日自說齊祭滌濯之事願言賦詩至其夕賓友皆散因作扈從詩十韻遲明命以示頲詩成而寢奄忽生災此即夫子獲麟之卒章也既殮公子壻右金吾倉曹博陵崔望之自其家取以見遺嗚呼翰墨未燥形神已離舉朝驚嗟之聲不崇朝而達于遠矣公文特稱于世每謂知音則寡同氣相求逮觀此詞何異於理正在心而為咏豈交臂而相失曾未數刻恨不回車擊節而如舊也撫膺一慟不覺涕之漣洏痛矣中山長無見日雖子期不聽存者可以絶絃而相如有作歿者竟傳遺草故録如右記其事云禮部尚書兼益州太都督府長史使持節劒南安南節度諸軍州事許國公蘇頲敬造因寓言曰吾見夫山連岷嶓水合江沱山兮水兮路窮嶮鬱南望兮此情多吾又見像法住世於巖之阿百千萬億兮相觀我載琢載追兮吾匪他伊古昔兮焦莒不懼必忠信兮艱危若何故吾因空而即有孰不回向於檀冉行矣些陽景穨兮翠改色陰風起兮白增波論曰君子疾沒世而名不稱恥當年而節莫覩故發義以立志從道以成功激清一時流譽千古然立志者必義也成功者必道也資於義而志可明徵於道而功可見志以立節功以成名名之成昭其道也節之立昭其義也能潔其身後代有準非夷齊歟能利其國當時翳賴非四皓歟揆而度之憂而柔之循其事而理于是乎在考其功而論於是乎著蓋周德既廣則夷齊讓國而歸焉漢業既興則四皓受命而出焉天之棄商矣諫武王正臣禮也人之戴漢矣護太子忠主道也忠之所存者大則正之所行者高高而能行者節所謂立也大而能行者名所謂成也若夫志士仁人將合而已進足以成退足以立用足以兼濟否足以獨善不辱其身則安食其粟不降其志則言采其薇墨胎氏之子不屈也嬴之德衰則巖穴全生劉之德盛則衣冠就列夏黃公之徒知時也舉其成事各同乎其成矣究其立事各異乎其立矣深惟終始敢無優劣統而論之其美也一別而敘之其跡也二棄身以遂志夷齊之烈矣愛國以屈身商皓之行矣曰若稽古以質乎今四皓見賢於子房夷齊稱仁於宣父與其稱仁於宣父不猶愈於見賢於子房哉百行之極三才以教聖人敘經曾氏知孝全謂手足動稱容貌事君事親是則是效法本無著而乃強名名言則斷法止不生應化得真示空歸有言似或中法皆虛受以心觀心無淨無垢大唐唐隆元年六月二十二日右金吾將軍駙馬都尉臣韋鐬等奉為先聖三七日繡阿彌陀像一鋪臣聞北極尊者有在天而捨萬邦西方聖者有在天而應三界上比義則無不通下抒情則無不感小臣鐬受恩之極昔也尚主悲鳳聲之莫留中於事君痛烏號之靡逮徵慕則殞越何補回向則精誠所憑爰縷陳於法象仍繡揚於繢事伏願蓮花之池莊嚴盛其樂土穀林之野順豫清其梵宮如是重宣敢稱贊曰大聖天子去遺舄大師世尊迎讓席布金摛繡圖神迹厭代乘雲此光宅道之元尊洞照前劫身也淨信終成後業後業伊何暢我元風元風伊何俾我韋公頃發皇揆鎮于蜀國竭心為政盈耳頌德哿矣夫人繢茲㣥真亟遷副相欻夭如賓府署因修庭除改製既丹既皓或轉或翳公則斯念余其載覿慕齊舍堂追魯壞壁金海珠樹清都碧虛魂歸自此像設如初禽鳥不入文翁是務神靈所扶文考是賦粵幽贊者老焉釋焉其信受者式護式傳歸以戀兮未以益現即前兮過為昔玉江流兮錦城闢歲永永兮帛丿糸奕奕開元乙卯歲東夷君長自肅慎扶餘而貢白鷹一雙其一重三斤有四兩其一重三斤有二兩皆皓如練色斑若綵章積雪全映飛花碎點所謂金氣之英瑤光之精高髻偉臆長距秀頸奮發而鋭堅剛則厲摩天絶海電擊飇逝觀其行時令順秋殺指揮應捷顧盼餘雄當落鵬之賞薎仇鷂之敵實稀代之尤也皇上祗膺聖圖欽若王道方寶賢重穀尊儒養艾後宮撤綺繡前殿焚珠玉與王侯卿士朝夕論思異無所貴輕衛公之好鶴奇無所珍同漢皇之却馬畋豈務於馳騁獵以存乎搜狩未嘗合圍掩㣥截羽灑血乃強不攫而猛不噬矣然以萬方入貢懷其來也三年重譯嘉其至也故仁為之心有仁則勇威為之力有威則重況此鳥猛過於衆重倍於凡禮於君則勸忠祭於祖則立敬壯其體則用武綷其翼則成文彼寵而服之鶡也能果榮而戴之蟬也能潔矧乎職命司寇師維尚父聞針剌姦擇善為吏蓋選士之是式匪從禽之足云此所以備於圖而警在位也微臣奉制敢稱贊曰鷹之大者精明竦峻徑而橫絶雄則遠振錦文素綵珠聯玉潤往乃奮威將軍所徇鷹之次者勇鋭光芒截海而至乘風載揚絡以紅聯文其綵章下韝必中惟吏之良將馭黠馬利之銜策彼其有人敢奉行役曷用綵箋爛其華篇文字當代此實歸焉卷舒荷心登用則可清白相照其源自我紵之以績藍因之染緑兮衣兮俯拾斯漸吳越之縞裁縫之袴懷風納涼君子尚素蓋聞上聖膺期流虹演慶大仙昭事滿月開祥故能因時叶符感通福應伏惟太上皇提衡御極握鏡臨人萬㝢宅心百蠻翹首緬懷姑射乃傳政於繼名寂想耆闍用崇因而詮妙既而炎曦戒律序屬長嬴大電繞樞辰推載誕顧猗蘭之不遠攀寶樹以先低則有敬範真容虔資願力洎功德成就莊嚴圓滿近披金縷徹珠頂以凝華傍映水精寫瓊毫而洞色有緣起念無疆薦祉格于上下普逮飛沈咸啓方便之門轉躋仁壽之域敢為銘曰惟皇誕睿承於宥密惟佛生天同於夢日爰規法相是獻福田脣含妙果步起芳蓮仙宮所出曠劫方傳唐開元五年歲在丁巳四月庚午朔二十一日庚寅故悼王薨於上陽之中禁年曰二歲而未及周嗚呼哀哉王即開元神武皇帝第九之愛子也以某月二十七日景申葬於萬安山之東南嶺壙唯五尺棺不三寸壘石塔一丈於其上不雕不礱奩省薄也其銘曰南有萬安兮北有洛城城可望兮天之京嗚呼悼王寧不戀兮嗚呼悼王寧不見兮倚素塔兮陵翠微空不礙兮雲則飛嗚呼悼王兮其何歸大矣哉鐘之為用軒轅氏和音樂之夏后氏陳義聽之此皇王所寶也太微君上真撫之紫虛君元方撫之此仙聖所珍也國家誕發元系丕承景業與時偕行惟道則佑以太清觀金庭晃朗玉京崇絶七映嚴飾四明洞開戛雲璈推雷鼓嘗有之矣然而陶鑄三品大造融於得一範圍四名大空合於吹萬其鳧氏鴻鐘歟工以思專神以響會爐用乃息器或云聚攫蹲獸而俯捧儼旋蟲而上扶號遠則傳聲希以節廣於已日普集諸天契九仙於福堂起六幽於苦海重以珍珠為闕琉璃作地皓魄初滿清霜始飛近召香童遙徵羽使時環而載擊載考律應而不舒不疾西升路接韻閶闔之清風北斗城連含未央之夕漏非與其至妙孰臻於此乎在昔圖旗常勒彞鼎者所以建功樹善紀德昭事未有萬人斯和傾耳歸真四魔是革調心服道徹於千界揚我巨唐之聲懸於億劫齊我巨唐之算安可不篆銘於銑者哉其詞曰碧落朱宮兮鬱其崇金振玉叩兮殷而鴻九牧是獻兮百神工成之不日兮鏗乘風聲無已兮福無窮先天歲夏五月頲蒙恩旨傳還洛京時韋祭酒丈人任膺居守嘗撰素木盤盂分諸好事頲既至丈人垂眷猶昔銜衣撫孤得拜清顏訴窮款於此矣他日復往又以木器分之亦頒斯惠豈散則當棄木有先容而見知豈朴則能堅器有晚成而獲贈覩以為誡仍邀作銘退而力鄙懼不如命山有木兮全真而生君子器之審用而成渾則不矯受則不盈辨以文直牢因素真抱朴委性誡奢遠名慮終謀始能合道精
