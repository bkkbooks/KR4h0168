  text: 全唐文欽定全唐文卷四百三十翰字子羽第進士上元中官衛縣尉入為侍御史纍遷左補闕翰林學士大歷中卒
  hash: sha256:691ffdaf515074e42f7516a08d45282a6a195343f067ce6030e09af86c509931
  markers:
  - {type: head, offset: 13, content: 李翰(一), id: KR4h0168_NFKB_430-h1, level: 1}
body:
  text: 禹平水土溝洫之功大棄粒蒸人稼穡之務重自古有國家未嘗不率由斯道底慎其業故登平足以厚生殖禍難足以定凶災未有易此而能理者自羯戎亂常天步多艱兵連不解十有四年因之以飢饉重之以夭札死者暴露亡者惰遊編版之戶三耕其二歸耕之人百無其一將多於官吏卒衆於農人古者八家為鄰一家從軍七家從之猶曰興師十萬內外騷動不得操農桑者七十萬家今乃以一夫家食一伍一餘子衣一卒師將不立人將不堪此聖上所以旰食宵興求古今令典可以濟斯難者莫出乎屯田廣德初乃命相國元公倡其謨分命諸道節度觀察都團練使統其事擇封內間田荒壤人所不耕者為之屯求天下良材善政以食為首者掌其務屯有都知㣥士為之都知有治即邑為之官府官府既建吏胥備設田有官官有徒野有夫夫有任上下相維如郡縣吉凶相恤如鄉黨有誅賞之政馭其衆有教令之法頒於時此其所以為屯也雖天子命之股肱贊之至於宣上命齊下力經地域制地事辨土宜均土法穡器修稼政陳三省之種而敬其始考九農之要而成其終則都知之職專達其事焉詎可以非其人哉浙西觀察都團練使御史中丞兼吳郡守贊皇公經國大賢憂公如家慎擇厥官以對明命浙西有三屯嘉禾為大乃以大理評事朱自勉主之且揚州在九州之地最廣全吳在揚州之域最大嘉禾在全吳之壤最腴故嘉禾一穰江淮為之康嘉禾一歉江淮為之儉公首選於衆獨當其任有寬惠和之德知艱難勤儉之事政達乎本智通乎時仁愛足以結下機權足以成務嘉禾土田二十七屯廣輪曲折千有餘里公畫為封疆屬於海濬其畎澮達於川求遂氏治野之法修稻人稼穡之政芟以殄草剔以除木風以布種雨以附根頒其法也冬耕春種夏耘秋穫朝巡夕課日考旬會趨其時也勤者勞之惰者勗之合耦助之移田救之宣其力也下稽功事達之於上上制祿食復之於下敘其勞也至若義感於內誠動於中徇國忘家恤人猶已野次露宿簞食瓢漿盡四體之勤趨一時之役大寒栗烈而猶執鼖鼓盛暑赫曦而不傳車蓋如登高去梯與之死生投醪均味忘其飢渴然後知仁義之政必見於耕穫井田之法可施於甲兵夫如是人將竭其力地將盡其利天將與其時自贊皇為郡無凶年自朱公為屯無下歲元年冬收入若干斛數與浙西六州租稅埒朝嘉厥庸授廷尉評公又稽氣授時如前代法有白雀集於高豐屯廩蓋大穰之徵也屯官某乙等聚而稱曰初公為屯人有二懼焉邑人懼其暴屯人懼其擾今溝封犬牙而不相侵疆場日履而人不知方舟而上以饋師旅此功及於國也登量而入以寬征稅此德加於人也古者智效一官政修一鄉猶歌之咏之手之足之况朱公之績如此其大者乎遂相與斫琬玉表阡陌南陽太守豈專刻石之功桐鄉嗇夫終踐大農之位其辭曰茫茫九區陽九足廠田坴災兵荒瘥札田卒汙萊天步未移連師滿野不耕不穫仰食於下嗷嗷遺人糊口饋軍帝曰豫憂爰立其屯且戰且耕古之善經辟師肅祗王命是將嘉禾之田際海茫茫取彼榛荒畫為封疆朱公蒞之展器授方田事既飭黎人則康我屯之稼如雲漠漠夫伍棊布溝封綺錯朱公履之勸耨趨穫稂莠不生螟蝥不作歲登億計征寬稅薄息我蒸人遂其耕鑿我屯之庾如京如坻嘉量是登方舟是維贊皇獻之達於京師飽我六軍肅將天威畎距於溝溝達於川故道既湮變溝為田朱公濬之執用以先浩浩其流乃與湖連上則有塗中亦有船旱則溉之水則泄焉曰雨曰霽以溝為天俾我公私永無飢年公田翼翼私田嶷嶷不侵其畔不犯其穡我倉既盈爾廩維億屯人熙熙邑人怡怡不擾其務不干其時我無爾暴爾無我欺我有官屬朱公訓之我有徒侶朱公恤之我有衆役朱公率之我有微功朱公序之起於田中印綬纍纍何以况之福祿如茨何以久之刻篆於碑臣聞聖主裦死難之士育死事之孤或親推轜車或追建封邑厚死有以慰生撫存有以答亡然後君臣之義貫以生死激勸之道著於存亡君所以不遺於臣臣所以不背其君君恩臣節于是乎立伏見故御史中丞贈揚州大都督張巡生於昌時少習儒訓屬逆胡搆亂凶虐滔天挺身下位忠勇奮發率烏合之衆當漁陽之鋒賊時竊據洛陽控引幽朔驅其猛鋭吞噬河南巡前守雍邱潰其心腹及魯炅以十萬之師棄甲於宛葉哥舒以天下之衆敗績於潼關兩宮出居萬國波蕩賊遂僭盜神器鴟峙兩京南臨漢江西逼岐雍㣥師遷延而不進列郡望風而出奔而巡獨守孤城不為之卻賊乃繞出巡後議圖江淮巡退軍睢陽扼其咽頷前後拒守自春徂冬大戰數十小戰數百以少擊衆以弱制強出奇無窮制勝如神殺其凶醜凡九十餘萬賊所以不敢越睢陽而取江淮江淮所以保全者巡之力也孤城糧盡外救不至猶奮羸起病摧鋒陷堅俾三軍之士噉膚而食知死不叛及城陷見執終無撓詞顧叱凶徒精貫白日雖古之忠烈何以加焉伏以光天文武大聖孝皇帝陛下聰明文思睿哲神武提一旅之衆復配天之業賞功裦節大賚㣥臣遂贈揚州官及其子此誠陛下發德音之美也而議者或罪巡以食人愚巡以守死臣竊痛之今特詳其本末以辨巡過以塞衆口惟聖聰鑒焉臣聞人稟教以立身刑原情而定罪故事有虧教則人道不列刑有非罪則王法不加忠者臣之教恕者法之情今巡握節而死非虧教也析骸而爨非本情也春秋之義以功覆過咎繇之典容過宥刑故大易之戒遏惡揚善為國之體録用棄瑕今衆議巡罪是廢君臣之教絀忠義之節不以功掩過不以刑恕情善遏惡揚録瑕棄用非所以獎人倫明勸戒也且逆胡背德人鬼所仇朝廷衣冠沐恩纍代大臣將相從逆比肩而巡朝廷不登坐宴不與不階一伍之衆不假一節之權感肅義旅奮身死節此巡之忠大矣賊勢憑陵連兵百萬巡以數千之衆橫而制之若無巡則無睢陽無睢陽則無江淮賊若因江淮之資兵彌廣財彌積根結盤據西向以拒王師雖終於殲夷而曠日持久國家以六師震其西巡以堅壘扼其東故陝鄢一戰而犬羊北走王師因之而制勝聲勢才接而城陷此天意使巡保江淮以待陛下之師師至而巡死也此巡之功大矣古者列國諸侯或相侵伐猶有分災救患之義况諸將同受國恩奉辭伐罪乎巡所以固守者非惟懷獨克之志亦以恃諸軍之救救不至而食盡食既盡而及人乖其本圖非其素志則巡之情可求矣設使巡守城之初已有食人之計損數百之衆以全天下臣猶曰功過相掩况非其素志乎在周典之三宥其一曰宥過失故語巡之忠則可以敦世教議巡之功則可以繫中興原巡之情則可以宥過失昔夫子作春秋明裦貶齊桓公將封禪略而不書晉文公召王河陽書而諱之蓋以匡戴之功大可以掩僭禪之過也今巡蒼黃之罪輕於僭禪興復之功過於匡戴罪疑惟輕功疑惟重聖人之訓昭然可徵臣故謂巡者足可以為訓矣臣又聞罰不及嗣賞延於世此三代所以直道而行今巡子亞夫雖受一官不免飢寒之患江淮既巡所保戶口充完臣謂宜封以百戶俾食其子臣又聞強死為厲遊魂為變有所歸往則不為災巡既身首支離將士等骸骼不掩臣謂宜於睢陽城北擇一高原招魂葬送巡并將士大作一墓而葬使九泉之魂猶思效命三軍之衆有以輕生既感幽明且無寃厲亦國家志過旌善垂戒百世之義也臣少與巡遊巡之生平臣所悉知今巡死大難不覩休明惟期令名是其榮祿若不時紀録日月寢悠或掩而不傳或傳而不實而巡生死不遇誠可悲焉臣敢採所聞得其親覩撰傳一卷昧死獻上伏惟陛下大明在上廣運臨下仁遐之德洽於艱難有善必紀無微不録儻以臣所撰編列史官雖退死邱壑骨而不朽臣翰誠惶誠恐頓首頓首死罪死罪儒家者流博而寡要勞而少功何哉其患在於習之不精知之不明入而不得其門行而不由其道何以徵之夫五經㣥史之書大不過本天地設君臣明十倫五教之義陳政刑賞罰之柄述禮樂制度之統究理亂興亡之由立邦之道盡於此矣非此典者謂之無益世教則聖人不書學者不覽懼人冥煩而無所從也先師宣尼祖述堯舜憲章文武七十子之徒常宣明大義三代之道百代可師而諸子云云猥復制作由其門則其教已備反其道則其人可誅而學者以多閲為廣見以異端為博聞是非紛然塞胸滿腹鴻洞茫昧而無條貫或舉其中不知其本原其始不要其終高談有餘待問則泥雖馳驅百家日誦萬字學彌廣而志彌惑聞愈多而識愈疑此所以勤苦而難成殆非君子進德修業之意也今通典之作昭昭乎其警覺㣥迷歟以為君子致用在乎經邦經邦在乎立事立事在乎師古師古在乎隨時必參今古之宜窮終始之妙始可以度其終古可以行於今問而辨之端如貫珠舉而行之審如中鵠夫然故施於文學可為通儒施於政事可建皇極故採五經㣥史上自黃帝至於我唐天寶之末每事以類相從舉其終始歷代沿革廢置及當時㣥生論議得失靡不條載附之於事如人支脈散綴其體凡有八門勒成二百卷號曰通典非聖之書乖聖人微旨不取焉惡煩雜也事非經世緯俗程制亦所不録棄無益也若使學者得而觀之不出戶知天下未從政達人情罕更事知時變為功易而速為學精而要其道甚直而不徑其文甚詳而不煩推而通放而準語備而理盡例明而事中舉而措之如指諸掌不假從師聚學而區以別矣非聰明獨見之士孰能修之淮南元戎之佐曰尚書主客郎京兆杜公君卿雅有遠度志於興邦篤於好古生而知之以大歷之始實纂斯典纍紀而成杜公亦自為序引各冠篇首或前史有闕申高見發明以示勸誡用存景行近代學士多有撰集其最著者御覽藝文玉燭之類網羅古今博則博矣然率多文章之事記問之學至於刊列百度緝熙王猷至精至粹其道不雜比於通典非其倫也嗚呼今之人賤近而遺遠昧微而觀著得之者甚鮮知之者至稀可以歎息也翰與杜公數旬探討故頗詳旨趣而為之序崔公吏于華葉再黃矣士之才也天高其興益之以小山焉山臨清池峭絶孤踊岑無一仞波無一勺而洲嶼縈帶巒崖盤鬱則巫廬衡霍不出於庭間矣若其琴幌朝開書堂晚清緑筠森疏下見松雪登蕙蘭之徑諷瓊瑤之章則雍雍詠歌盡在丹壁又與一二文士以吟以賦謂之後集焉後周大冢宰宇文護軍鎮河外之地築為層樓遐標碧空影倒洪流二百餘載獨立乎中州以其佳氣在下代為勝槩四方雋秀有登者悠然遠心如思龍門若望崑崙河南尹趙公受帝新命宣風三晉右賢好事遊人若歸小子承連帥之眷列在下客八月天高獲登茲樓乃復俯視舜城傍窺秦塞紫氣度關而西入黃河觸華而東匯龍據虎視下臨八州前輩暢諸題詩上層名播前後山川景象備於一言上客有前美原尉宇文邈前櫟陽郡鄭鯤文行光達名重當時吳興姚係長樂馮曾清河崔邠鴻筆佳什聲聞遠方將刷羽青天追飛太清相與言詩以繼暢生之作命豫紀事書於前軒吾友晉陵郡丞河南尉遲緒節闊達志遐遠含和而不假修推誠而不詭行外若可渾其中甚清外如可雜其中甚靜夫求賢達之趣當考其中若然夫子其達者歟而境或超詣心或獨得飄飄然不知冠冕之在已浩浩然不知天地之為大其冥機慎道迹繫心曠人或未覩吾能知之大歷四年夏乃以俸錢搆草堂於郡城之南求其志也材不斫全其朴墻不雕分其素然而規制宏敞清冷含風可以却暑而生白矣後有小山曲池窈窕幽徑枕倚於高墉前有芳樹珍卉嬋娟修竹隔閡於中屏由外而入宛若壺中由內而出始若人間其幽邃有如此者夫子又有雄辭奧學潤色其事階上何有有㣥書萬卷階下何有有空林一瓢非道統名儒不登此堂非素琴香茗不入茲室是知草堂之貴夫子之靜天下茫茫人未易悉吾與夫子昔同賓賦三十四年於茲矣吾則棄於世矣歎夫子下位每求其故而有疑焉今觀夫子之志乃鄰於道寥寥草堂自致之資書於壁微吾奚俟其歲秋八月乙丑朔記司馬蓋元武之官號周官大司馬掌王之六軍將皆命卿諸侯大國三軍次國二軍小國一軍將亦命卿軍有司馬見於古矣周衰惟晉秉禮尊主屢因大搜以正三軍鄢陵之役韓厥為司馬雞澤之會魏絳為司馬絳將新軍張老代之蓋今之行軍司馬出於周制矣秦罷侯鑠天下之兵列郡不復有軍軍司馬由此廢矣漢制將軍不常置四夷背誕則命將征之趙充國以軍司馬從二師班超以軍司馬從竇固討虜皆其職也自魏至周南北分王建置不同時方戰爭衆軍恆設凡將軍杖節鎮仍開府者以將軍開府居刺史者皆有其官隨將廢置隋開皇混一天下省罷衆軍司馬之官不專武事廢為州吏員矣國家修唐虞大同之化庭周漢不賓之俗邊雖有防示不久設軍出於內謂之將鎮於外謂之使佐其職者謂之行軍司馬行軍司馬之職弻戎政掌武事居常習搜狩之禮有役申戰陳之法凡軍之攻戰之備列於器械者辨其賢良凡軍之材食之用頒於卒乘者均其賜豫合其軍書契之要比其軍符籍之伍賞罰得議號令得聞三軍以之聲氣行之哉雖主武蓋文之職也舊制朱衣銅印墨綬開元故事多選臺郎為之淮南節度行軍司馬尚書戶部郎中兼侍御史王公以經邦緯俗之才佐淮夷方面之寄敦詩説禮之學當節府大賢之舉政協乎邦要慮通乎事微奉中權之旗鼓戒㣥帥之鐃鐲師律既和軍容丕肅淮南之府有功宣王室身佩侯印將門良家藩國貴種以禮綏之則恭淮南之衆有吳楚鋭士燕韓徑卒奇材劍客猿臂虬鬚以恩撫之則順淮南之地提封千里徵令百役稅以足食賦以足兵以寬征之則安淮南之衝南走閩越北通幽朔關梁不閉朝聘相望以歡交之則固自韋公統戎旅王公翼戎行威加於大則將不驕惠及於細則卒不惰減役輕斂則人不困待賓省旅則境不危堂堂然混一體以為力雄雄然鼓衆心以為氣封疆之外隱如敵國封疆之內不知有軍古人云懸勢於上而下自定置器於平而物自安者蓋用是也茲所謂銷患於未形制危於未萌伐謀之功大於積甲山齊攻心之術強於虎賁百萬彼善師不陳未戰先勝却軍於談笑之際折衝於樽俎之間今古一時也夫舉善人以行其教大則四海服小則邦國寧舜舉皋陶蠻夷率服帝王之事也秦任百里奚巴戎致貢諸侯之舉也國僑為政乃子皮之功晉侯勤王信魏絳之力任賢用善合契同德盛府有焉翰獲庇於有禮之俗遂安於無虞之境書績示後豈待命乎揚州本大都督府親王居中長史理人有府號而無兵甲至德初羯胡難作始以長史為節度而有行軍司馬古者敬其事則命以始乃自初置列敘之於壁云大歷五祀夏五月丁丑記
