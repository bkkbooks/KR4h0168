front:
  text: 全唐文欽定全唐文卷三百六十三九言開元時官太子舍人攝殿中侍御史內供奉朔方節度判官擢起居舍人遷右司員外郎
  hash: sha256:14944653c6342ac12d55eff0e128468d1d71724d8456877c6fa86af9d1232b69
  markers:
  - {type: head, offset: 14, content: 陳九言, id: KR4h0168_NFKB_363-h1, level: 1}
body:
  text: 夫上天垂象北極著於文昌先王建邦南宮列為會府六官既辨四方是則大總其綱小持其要禮樂刑政於是乎達而王道備矣聖上至德光被睿謀廣運提大象以祐生人躬無為以風天下三台淳曜百辟承寧動必有成舉無遺策年和俗厚千載一時而猶搜擇茂異網羅俊逸野罄蘭芳林殫松秀盡在於周行矣夫尚書郎草四司凡六十一人上應星緯中比神仙咸擅國華以成臺妙修詞制天一之議伏奏為朝廷之容信梓之藪澤衣冠之領袖頃朝榮初拜或省美中遷升降年名各書廳壁訛誤多矣總載闕如非所以傳故實示不朽者矣今諸公六聯同事三署並時排金門轔華轂鸞蹌鳳跱肩隨武接而不因僉謀補其闕典其於義也無乃太簡乎左司郎中楊公慎餘於是合清論創新規徵追琢之良工伐荊藍之美石刊刻為記建於都省之南榮斷自開元草九年咸立石于次且往者不可及來者不可遺非貴自我蓋取隨時班位以序昭其度也豐約從宜昭其儉也俾夫金石長固英華靡絶不編班固之年自然成表未讀馬卿之賦已辨同時不其偉歟諤開元中濮州鄄城縣尉倬彼甫田爰分沃塉定其差等故九州攸同處有勞逸誠萬人是繫周官掌事征稅畢均皇明燭幽遠邇咸勸德音天發直指風行既有察於農功將不遺於屋粟翦萊非季路之政就蕪興元亮之詞責郡縣之勞煩慰黎氓之薄訴借如據畝數以枚率隨上下而加減蓋議事以制示得便宜重戒年饑頗符日用苟殊乾沒獲戾何堪使司雖欲科懲愚謂傷於嚴刻且萊田不稅實師古之通方倉庾流衍乃自公之上務繡衣匪同楚失應副九重州縣請宥漢章賞其一切維佛曰覺是法曰空鎔範所謂敬田薰崇可兼意境自西林晏滅東夏聞教納㣥動故廣闢度門詣真宰即密傳智印功應沙劫化懸金界支提所以列寰宇建葺所以遍山林石壁寺者晉之西山舊號石壁谷隋隸西壽陽縣唐改壽陽為文水先朝分置交城而立寺焉太宗昔幸北京文德皇后不豫輦過蘭若禮謁禪師綽公便解衆寶名珍供養啓願玉衣旋復金榜遂開因詔天下名山形勝皆表剎焉所以報護力廣真諦也特起紺臺之制頗餘紫禁之恩禪師尋終官寺初創分身建塔遺跡巋然多寶不開吾徒安仰年籥四紀紹復六僧修伽藍者瓘潤脫造山閣者毅本元竟未雄成且為能事粵邑宰燉煌張公令孫清信香緣台鉉英胄隱若敵國知無不為行春之餘瞻星開製琢拓巖突所以面雙峯築基林間所以立前殿飛廊右轉高門南豁化檻粲爛於虹澗潄渠杳藹於龍鱗附麗張皇公之教也復次寺大衆縣諸吏鄉三老等端念斷結回向增修屬廊殿功間請鼓鑄象設信施山積稽懇雲奔弦朔再移公難久抑爰咨上座普公曰和上萬億之中已經付囑一方之內僉謂導師此處山泉人間卓絶常歎庭宇淺狹形像卑古既衆心同欲敢仰屈專知先捨俸錢次添淨襯想望耆闍之往思摹兜率之留寶臺繫念於儀形華林正觀於神衛倬開元草六年十月十五日鑄鐵彌勒像一座良冶攻士冖䂞神物助銅回祿爇雲而噴練飛廉噫風而沸液焰涌鈞外乃徹金光非普公之總衆罄心調御之慈悲冥應則何以髣佛相好成是福潤十二月八日設大齊而出之都人嚴護以禮供掌事藂掀而改座鏟刜設色睟湛起容頃者都師思九先患兩足綿歷數年醫巫竭精蹇躄生念忍苦強步有加無瘳當監理之夜忽覺輕舉及成像之日曳舄如初此則指魔易容如鳥出㲉之攝也此寺幽深遠邃林壑猛獸不育濡草羅生列郡旱亢祈之則霖雨闔境歲儉念之則豐饒戒觸加敬警俗整僧此則軒臺不敢西射廬山長存東首也然結構大廈兼寫聖容工不召而來役不言而應始謂陶唐之俗家盡歸依追悟巧妙之徒人皆飭力殿像云畢居處自空此則梵帝輸靈匠育王獻神兵也夫金者物之堅剛像者代之崇奉見不壞相故因感以存質在有為跡故憑應以住法是梵場也其炳煥乎上座普敬寺主惠璡都師思九法師元炎大德茂忠守辿常念寶定洎龍象法允貞實貞華戒珠圓明智劍猛利當對初地暫澤勝於間安果證中天已授記於文佛鄉望王思貞縣吏郝仙壽等五色鵷鸞千里騏驥瓊樹塵映玉匣氣浮古署或列於桐鄉虔承遂陪於奈苑奉鍾離之舊政喜得人心結曇毗之後緣仍為佛事於戲否往泰來聖作惠出微妙用之發揮匠意表刻紀靈則我皇之會昌景福天主之示現功利不其茂絶穹谷摩滅蒼岑者哉諤侘傺不偶誠敬闕二字興徒發於簡栖白林為頌詞欲徵於靈運石壁言詩貝葉尚記買園線花亦題施樹佛則無愧謹偈銘云世尊傳兜率天彌勒宴坐對諸仙晉山記石壁寺佛影下來留此地新殿開望昭回白毫放兮照雲隈危樓敞臨懸象翠微濃兮洗煙上張公作神鬼諾五十六億龍華樂靈匠罷真僧楷八萬四千師子駭鎮帝鄉歸梵場法輪轉兮衆福證銖衣拂兮聖劫長倇一作婉常山人開元中為太原府録事參軍大荒無限天下如截柔遠能邇老安少懷惟彼越人沐茲造化境遙銅柱聞伏波而暫擊聲暨珠崖非尉他而能制屬星躔北陸日屆南長天子登靈臺觀雲物命㣥臣以成列執五瑞而知禮牛羊勿踐駕象奚趍來丹禁之庭不載黃門之樂今朝高會笑塗山而未倫法奏虞章鄙蠻風而詎設棘司以多聞闕殆直置先繩越人以古有典刑曾何敢侮且中古以降五運相乘太康之時九儀亦備具物云在時人屬遷須崇改更之文無致因循之禮聖人設教克勤於學胄子從師罕能由禮惟彼成均奉職宗伯分官將舞籥以持旄俾歌詩而序齒進而函丈知拾紫之華退而負牆識滿金之喻不傳其習或失於多嗟爾寡聞孰云功倍叩之勿應則待於從容發然後禁何驚於扞格誠宜撲作二物吾與其進焉用僰寄四夷若斯見罰伺行父之逐鳥豈殆庶乎徵楚子之奪牛理固深也不帥之教雖載於禮經侵冒之刑合歸於司寇仍為多訴無乃厚誣忠嗣華州鄭人始名訓父海賓征吐蕃戰死授尚輦奉御時年九歲因入見賜今名養禁中試守代州別駕以功纍遷左威衛將軍代北都督封清源縣男開元二十九年徙封河東縣公領河西隴右權朔方河東佩四將印討吐谷渾於墨離平其國李林甫忌其功使人誣告忠嗣嘗養宮中云欲奉太子訊驗罪應死哥舒翰請以官爵贖其罪乃貶漢陽太守徙漢東卒年四十五寶應元年追贈兵部尚書臣聞北方雜虜之中突厥為大其風俗彊悍弧矢利習而諸蠻夷皆出其下所以憑陵河塞歷代患之太原涇陽豈惟前事山東渭上曾是近憂自陛下君臨萬邦無遠不至惟此種落尚懷二心陛下執九有安危之樞制四夷長短之運如垂霈澤則斯與草芥同風若震天威則彼惟魚肉而已故從開元二十九載部落日以攜離可敦西殺并諸侯王貴人以下前後款塞者殆至萬計其餘復相保聚更立烏蘇米施為可汗陛下又使內史尹招倩等曉以安危俾其內附鬼神所殛米施伏誅去秋又詔臣率驍騎直至薩河內山以問其罪而左廂阿波達于等一十一部並應時誅擒獨右廂之衆未平今又為九姓所破白眉特勒之首既傳於藳街骨咄祿娑匐可敦又獻於闕下霜刀未交而㣥凶盡殪王師未老而大漠將空自先帝擒頡利靜北荒以來復見於今日矣伏請頒示天下宣付史館不矜至德初官范陽府功曹參軍兼節度掌書記惟唐紹統兮歲作噩天宅幽都兮鎮戎索彼命啓與禪虞繼鳳舉而龍躍馭閶闔而朝南面服日月而升寶殿在璿衡以正乾坤握金鏡兮臨宇縣東宅四水西都八川天應景福億萬斯年神祗肸蠁而丕祐風化洋溢而昭宣凝心姑射既邁黃軒之理端思真境高撫洪崖之肩迥出三界超居四禪我御史大夫忠而孝哲而賢裨我唐祚崇斯福田昔在棘城結願已修於寶塔屬茲版蕩除惡務盡於幽燕開拓郡縣馳突戈鋋咸荷威力掃逆清邊樹茲幢相游刃忘筌割淨資以檀舍施珍俸於慈緣爰居爰處載詢載度剃金界於祇園擇伽藍之勝託徵郢匠稽朴斫具鉤繩備丹雘才生明而畚鍤攸萃月貞朔而陶瓬斯作暨峻砌而崛起堂皇聚楨幹而上干寥廓爾其庀徒有節力工惟時隱金椎以雷動走瓴甋以星馳椓之登登斗栱磊硌以扶衛築之閣閣甃甓和羅而緝熙駢密石以疏趾齊玉璫以鎮陲班間布白九隅八維風伯雨師扣靈壇而請命雷公電女擁仙座以忘疲熠如聚雁赫若奔螭岌嶪天假髣佛神資千龕櫛比以攢構萬塔凌兢而護持觀其捫重扃披藻井鴻蒙異狀咄咤靈影霞駮雲蔚陽舒陰靜游三界而須臾視一劫而俄頃示大方便開大法境聞偈而刀輪折鋒承風而火穽收猛嶷若蜃樓之孤秀皎類扶桑之回映蓮花吐日攢太華之三峯香爐抱雲矗廬巖之一頂若乃八部經行萬方委輅離火宅啓筏喻魚貫爭上雁行齊赴隮穹崇陟回互嗜真如者拾級聚武而局行慕釋猷者阽虛悉倅而徐步攀棼橑以失視援井幹以增懼龍象翕赫扶欂櫨而蓄威鬼神睢盱捫頳壁以含怒將以經啓萬祀永代作固置呪於梵剎之中釋網於毗耶之路啓招提之勝果祛樊籠之緇蠧行善者技癢而爭趍為惡者震栗而憂怖逗塔影者洽背而魂竦聞鈴音者叩頭而心注是用敬我天威保我唐祚彼幢相之徼福荷無疆之率裕也客有扣虛幕府忝掾神州愧三語之默對歸八解之禪流巋然寶塔永贊鴻猷護鵝珠以守戒持鴿珍以精修刻字金版垂芳朔幽雲行雨施自公乃侯永錫難老厥德允修恭察視之嚴命敢不拜揚王休我聞西方有大聖佛伽號曰覺在伽毗羅城精舍閣內能庇極四天超證諸果而毫照劫界之外罔不諦聽而歸之時戰茶外道昧佛威力有善相者諗之曰汝當墮無間大地獄受旃檀羅業若能悔過從正悛心歸真當於劫毗羅城三岐古塔崩壞日久無人修崇能造輪棖書陀羅尼呪於其塔內念誦精持減罪恆沙受大安樂其名曰無垢淨光塔夫塔者所以覩像生敬祈者所以昭德塞違虔誠依投罔不示應我大唐皇帝陛下孝因冥感聖以天資太上皇不宰功成禪代法禹創業垂統時雍象堯復寶位為太上與兆人為父母珍符景命充溢寰瀛止難鋤凶洗清天宇光祿大夫范陽郡大都督府長史河北節度兼支度營田海運等使攝御史大夫歸義王史思明碩量天假宏謀神授仁被楃重植忠越古今竭節布懇成其名砥心礪行存乎道昔在平盧也於曹禪師早發宏願於彼造塔初經始未搆屬中原亂離有難便赴范陽其塔便罷修葺今重承恩命允釐東郊緬想闕誠式副前願敬於憫忠寺般若院造無垢淨光塔一所池五飾疑工力已周夫其始也堙垝墉精院疑掘地及泉寶其炭隱以金椎岌其階公輸運斤離子督墨摹規彠矩而陶甓霧集俗馳緇走而瓴甓雲屯工以子來人以心競哉生明月既望乃勤朴斫夫其甃凹摩凸刓方鏟圓龍鱗錯落以用密闕一字傑豎以儹扣闕一字栱杈闕一字以分赴綺疏回合以洞開夫如是月有旬矣爾其層構削成棖輪孤聳金幢插漢截虹霓以中分寶鐸連星礙望舒而假道密邇睚眦以缺立㣥仙闕一字曳而下來怪獸蜿拏而捧龕石人屭贔以承級崒若蓬壺仙館聳珠闕闕二字重皎如天台四明蒔琪林於絶頂夕而望之月當蒙汜星辰晶晃而攢臨曉而望之日上扶桑雲霞蔽虧而捧出既懺諸纍能植勝緣時八部天人九有緇俗日夕匍匐而歸之徒觀其趨福庭登梵扃披倒景躋重冥啓洞戶排疏櫺勃窣嶙峋闕二字青熒俯瞰萬像平步高元回惶怛悸既如折元牝於閶闔涉級聚武又若搏壁上之翠屏爾乃周游層甍嬰倚飛楹闕二字棧道詰立四顧而震魂井幹陵臨窮覽周流而失瞬至於契闕一字法者湛乎真寂悟八解者得乎津梁於是艤涅槃岸屏瀑流河窺其神呪置於層剎之中峩峩梵幢列於毗羅之院逗影而八苦皆懺聞鈴而三業都捐用能裨佑熙朝希嘏保佑門閥闕修文偃武康闕於極樂之國歸馬休牛鼓腹於華胥之代求蒙是作式創銘云都聚相之嚴厲兮巍然孤聳如天下來兮若地之踴瓊龕層剎兮駢巃嵸龍蛇獸拏兮鬼神捧輪棖岌嶪兮土宇瞻悚鈴音聰合兮威力潛拱亞相持邊兮被光寵鎮此門兮謀重富國保家兮千萬億鉉開元中隱居終南山臣聞明流八荒者日也聲飛萬古者道也故貞明不出於古先德聲豈遠於身外是以聖人洗心以至道如蹴踘焉然則氣無形端有若道準固以柔鞹逃之無因取興則小其宏則大微臣幸逢堯運忝預巢由服志中巖有易潤澤因編於儒典薄求於道書見仙家保命之真言思君親永壽而無極真言祕旨纍翳縑緗誠則天鑒昭回私心懼勞聖覽是以披歷精要載騰真聲進明白於一貫退光宣於少得故樂者易成功見之不駭俗誠皇極之道也經所謂王侯得一以為天下貞者不空言哉斯蓋上元老真延齡永壽之前梯也因以名曰上元高真延壽赤書焉赤書者上以明星火資於土德中以殷仲夏之朱明下以達微臣之丹懇也靈經云俾國太平轉災成福當用五老赤書作鎮也今屬三氣炳節降慶神期敢獻延壽之書冀申誕賀之禮伏惟開元聖文神武法天至道皇帝陛下道滿天大覆燾無私德通坤厚光載罔極不恥牧童之詞豈愧芻蕘之言言不賤廢天下幸甚書一軸凡八篇積數千字皆衆聖高真之至言也在掌握之內足見長生之道焉璲元宗時人夫璞以假器必藉工能正聲闡揚亦資明哲承真如之奧典啓不二之法門其誰曰然不遠千里法師東陽金華人也俗姓王氏其先太原苗裔昔永嘉南遷因官而處焉總角辭家童蒙入道發大精進堅持戒地一門之中數人緇服簡而無傲咸悉慈心傳曰積善之家必有餘慶經云難行能行難忍能忍削跡名利而歸於佛難矣哉閭閻依投親戚仰止覩其顏則知三善入其門乃聞三異允諧衆望精確道宗彌縫聚落能無法忍之心空間林中了入寂然之意法師學習師古義承先聖八部經理宛在掌中三乘法源盡於度內曉了中事恆無貢高猶如琉璃內外明徹是謂山嶽之秀河海之英國之橋梁人之師範善療衆病為大醫王應病與藥令得奉行乃我法師之器量宏博羌難得而涯也粵六載我皇帝加號爰有制度於時太守秦公長史狄公知其行高遂以名薦主此寺焉二公常相謂曰法師通深妙法元無上義聞一得三言發響應昔利涉辨博僧會智周與之齊驅未可同日退食之暇匪夕即朝私奉禮敬以為法主晏居無何事有成應舉一隅則三隅可視豈小子造次而談矣葺搆廊宇繕修佛像墾爾田疇蓄爾倉廩人有善欲天必從之虔奉夙心雅志斯在弟子忝預同盟宗祊有叙慕仰節操欽藉堅持限以孤陋寡聞曷能宣揚盛事不録戒行何以核諸不記精修何以示衆小子狂簡斐然成章述德書能以傳不朽凡我同好寧孤讚之時天寶八載孟春正月童蒙入道總角辭家清理歸正忍辱降邪結習已盡不染天花心如法水瑩徹金砂其一形貌端嚴風神體正卓爾孤標堅持佛性如竹之滋如松之盛晏居寂然智慧清淨其二法門之主天人之師能息三毒更慎四知磨而不磷涅而不緇闡我正聲非師而誰其三法本不生今亦無有賢哉真公戒業堅久宣揭寶偈義傳金口記其行能永為不朽其四續駙馬都尉鐬之孫元宗末官天興令自三皇以前結繩為政至太昊氏文字生焉所謂依類象形謂之文形聲相益謂之字著于竹帛謂之書書者以代結繩之政也故事有六文一曰象形日月是也二曰指事上下是也三曰形聲江河是也四曰會意武信是也五曰轉注考老是也六曰假借令長是也又曰字有五易倉頡變古文史籀制大篆李斯制小篆程邈制隸書漢代作章草是也其八體者更加刻符摹印蟲書署書殳書傳信并大小篆為八體也後漢東陽公徐安于搜諸史籍得十二時書皆篆神形也又加二十三體共定五十六列之於後僎元宗末人昔犧后作易周公創禮孔父修雅豈徒異之而已將實大造化之根出君臣之義考風俗之正耳若三聖不作則後王何述故天地非伏皇不昭長幼非周公不序雅頌又非孔子不列矣是三聖者所謂能宏其道而由之也茲又論夫文字發軔箋翰殊出本於其初以迄今代三千餘載渺然難知而書斷之為義也聞我后之所好述古能以方之不謂其智乎較前人之尤工陳清頌以別之不謂其白乎體物備象有大易之制紀時録號同春秋之典自古文逮草跡列十書而詳其祖首神品至能筆出三等而備厥人所謂執簡之太素含毫之萬象申之宇宙能事斯畢矣若是夫古或作之有不能評之評之有不能文之今斯書也統三美而絶舉成一家以孤振雖非孔父所刊猶是邱明同事偉哉獨哉君哉臣哉前載所不述非夫人之能誰究哉回薊人天寶中官監察御史肆覲㣥后事資班瑞疇庸千乘義取朝宗等威有正位之常名器無假人之道甲以榮參賜則齒列建侯位若附庸僭東蒙而為主地非成國異南面而稱孤虛揖五玉之班徒承四時之事關內受賦獨申恩於萊田邱中食采未延賞於茅土恩齊國典方期率職眷言彼甲何煩就封皮辨守官寧拒有司之命毳衣知禮無違先正之書璵鳳閣侍郎方慶六世孫元宗好神仙廣修祠祭璵希旨上言擢太常博士侍御史為祠祭使肅宗立纍遷太常卿又以祠禱見寵乾元三年拜浦同絳等州節度使以中書侍郎同中書門下平章事四年罷為刑部尚書出為淮南節度使徙浙東召入再遷太子少師卒贈開府儀同三司諡曰簡懷諸色祭官等並寬縱日久不懼刑憲當祭之日或逢泥雨或值節序盡皆請假曾無形跡自今以後臣皆私自察訪實無事故妄請假及不肅敬者録名奏聞望加貶責應緣行事或稍後到小疏遺望請量事大小便牒所司奪其俸祿鑄天寶時人粉潔白兮壁宏壯白者取潤色於明光壯者取雄居於君上成圬人之手澤起漢皇之心匠凝雪彩耀冰狀扆旒居際謂分照於此日之君冠劍朝時欲和光於為鹽之相茲殿攸起不無所因寧在於白亦以象真守靜含虛上以鄰貞明於千年之主保純不汚下以範恬淡於萬國之臣煥北極而開瓊室激南風而生玉塵月桂低檐失蟾暉於午夜御柳垂砌惹絮色於三春則知粉壁之道齊乎元造達上下而明明通晝夜之杲杲日昃之後慰天勤而暝遲夙興之時副聖恩而曙早信可大而可久實永堅而永好懿夫榮雖闕畫飾不至驕挺嶪岌以莫變洞閒華而自昭可使楚客具瞻羞持練而稱獻荊人仰止恥懷寶而來朝豈止光動玉戶氣射金屋秋露懷慙冬霜自伏蛾眉夜侍意瑤臺之已升玉顏曉臨若瑞雲之相逐而已哉觀夫匼匝皎皛回環廣袤濃潤交翕浮華相透處高莫蔽通四目之敷求含明必竟受百官之草奏雖奢儉不失精研克構終未可小桂椒為糠粃汰茅茨為厄陋然為用因有貴飾形居安撫極抱素常寧色不喪真久已生於虛白白能受采冀一及於丹青噫漢皇立則未足為模我聖作範實謂殊途象為壁兮則搜材於豫章之器代其粉也則聚賢於堅白之徒以張皇二儀為光明之殿以照耀四海為粉壁之隅故錯薪從楚安輪以蒲是得趨於金馬希便維於白駒主張於地之血脈者豈不曰水伯乎爾自獸為身面為人控牽兩龍窟宅百谷億有祀矣故斁倫於元氣之液弄權於坤輿之竅所云老而不死是謂之賊伊我謂爾有是夫何者三載二月春服既成冠者五六人才子六七人皆簸揚文精開闔武庫游嬉春晝沿洄江干興飛壯心舞曳齒胄皆貸白龜之德不負赤鯉之本爾何為陰發暴殄潛生毒痡簣禍階於沙岸垣死府於花島如數子者皆載垂堂之誡爾始若懸流三十仞跳沫四十里固應尊而不親釁豈相及爾岸不崒屼流不唐突設人所倚之福陷爾孔易之誘俾水衒貫堅之功舫如蜩螳之聲捫空呼天迄死不救倏恣化魚之惡誰下拜牛之惠溺我國寶豈明時廾珠之泉沈彼綵船實去夜藏舟之壑與夫覩右山四耳之獸夢潁川一角之人置於大江未匹斯甚使揭竿求父之子投箋請弟之兄奏箜篌傷妻之夫厲波濤徇壻之婦罹其凶害不忍荼毒並告無辜於上下神祇行哭失聲於爾安乎爾今肆行賊虐者豈不謂性與習成乎何哉曩者溺孫興公於後湖之中淪炎帝女於東海之上化鱉於黃氏之母為魚於歷陽之郡爾應恃以舊捷蔓其後圖殊不知事不欲數數斯辱矣惡貫已滿天命誅之然今歷視爾自昔為過之所或天涯或地岊起於侯甸之外且非輦轂之下豈比今日俯九門臨四達使哀聲悲響上及聰聽爾誰欺欺天乎然曲江者南峙仙閣北距靈宮足可效赤水産黃帝之珠胡為纖蒼生竊司命之契况之人也皆編中華俗游無何鄉所冀猛火烈山而莫焚大浸稽天而不溺既遇爾省括之中縱使術飯解漂之餌山經不沈之木豈可免爾之圖乎茲中江自首創至於今時數千百年更代易主島流波耗才可接腋於井蛙詎堪持頤於海鱉爾之所處豈不狹隘乎人之所賞豈有舳艫乎逮天寶載吾皇恢土德以博之竇澤流以濬之積潤下之波瀾用濟川之舟楫豈不謂幸於爾也爾何滿以致溢凶以自斃使彼都人士自此之後懼爾同失神之海惡爾甚探手之湯匪徒歇爾盛事過自掇也雖悔可追然靈莫尊於君人時莫美於陽春君固愛人種德乘春宥罪省囹圄去桎梏爾奚得恃宅無聞括守有曲襲不辜於止獄之候繫餘殃於積慶之家僕謂數子呌天曹訴地府黜爾主職在於斯須不然僕見欲上書於承明廬徵菑欣速周處擊劍長逐擘波深搜爾若遁逃則焦僥東請長臂者灑漉之又於雄棠北使長股者憑踐之不然邀離朱以視之命宋定以縛之然後調烏梅扇獸炭是烹是醢以報東門爾儻若混空隱形和水匿象則使牛曳蛇尾絶其本根縱逢山見彘毛終難必復矣僕亦宜念五六日至於旬時恐爾有詞曰豫不誡視成不令而行故矢在弦上垂而未發儻能易轍僕則既往不咎若為刻舟爾則何辭以對徐察爾變惟審圖之
