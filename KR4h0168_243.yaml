front:
  text: 全唐文欽定全唐文卷二百四十三李嶠二
  hash: sha256:97e21f1309b2ce8838fbde7d9c3e92a7c52aa9090ca17d2b33964db8f40253e5
body:
  text: 臣某等言臣聞享帝立廟陳乎太極之典尊祖配天載乎厥初之頌蓋用嚴宗虔祀敦孝睦親以修海內之職以崇天下之訓斯千帝百王之所因襲也四學三雍之所講肄也伏惟大周繼天作聖踵武嗣徽湛恩洎於行葦崇構興於帛丿糸瓞陛下纂祖宗之洪緒資聖神之睿問乾坤合德日月在躬利澤浹幽顯光明燭宇宙用能誕膺休歷丕臨大寶近惟神祇福祿之祚遠想稼穡艱難之業后稷以弼諧大舜隆姬錫受命之符太皇以翼亮有唐聖武當樂推之運七百之鴻基不墜九五之尊位以光天休薦委靈命再集豈非積善纍慶深仁厚德之致歟夫源長者流深道悠者利博是以商廟觀德享祀彌乎七代牧野追尊行號光於三葉今者徽章改物宗石變音神靈扶更始之運億兆慶維新之業宜其憲章典禮損益質文奉嚴配之恆事採褒崇之故實三昭三穆對於不遷之祖八簠八簋存乎如在之敬然後上以化下卑不臨尊宏詩人永錫之義合周易大觀之象豈惟祖考來格實懷安樂之心故亦夷夏式瞻載佇雍熙之福伏願浚發皇鑒時流天璽考經籍哲王之典雜搢紳先生之議涓時擇日册祝備禮臣等得參陪振鷺洗滌大牲承奔走之下列觀肅雍之盛典則一人有慶子孫承永保之祥四海宅心臣下得自安之地無任勤懇之至臣某等言臣等聞正覺既隱而苦海橫流衆教不興而業風亂起則有至人應運元聖撫期援手而拯其沈淪推心而救其焚爇四生不慧必將有以宅其緣六度未康必將有以振其緒慈氏越古金輪聖神皇帝陛下業隆四諦德懋三空道成於祗劫之初迹遠於梵天之外而深惻末教俯哀流俗宏善推之略下濟蒼生屈無上之尊降臨丹扆神功暢於明一至德覃於吹萬三千國土咸登福壽之庭百億天人並出塵勞之境能紹七佛之鴻業躡三身之正位雖多寶之證明法教出見空虛釋迦之愍護凡愚來遊穢濁未足以仰參神變遠媲仁慈臣等宿植有因生平多幸聖朝難遇類蓂葉之希逢法主儻來似曇花之一出屬千齡之大慶欣萬劫之禎符是用下訪謳歌旁稽讖籙攀玉署鴛鴻之議雜金園龍象之謀拜手闕庭虔奉徽號叫帝閽而延佇徒罄丹誠仰天路而遲回不流元霈朝野失望衣冠沮色竊惟聖人忘己以百姓為心菩薩救時共衆生合體是故屈伸進退因其志而不違變化感通順其求而不隔伏乞暫回聖慮俯鑒愚誠宏至公之大道略鳴謙之小節特命有司勉膺殊典使尊名嘉號與法日而俱懸寶算靈基比恆沙而不極臣等得預陪下列攀奉末光長登正法之筵永樹來生之果豈不幸矣豈不大矣無任誠懇之至謹詣闕固請以聞臣某言伏奉五月十一日制書陛下俯順㣥情懋膺大典垂光休於百代被鴻私於萬族凡在含生孰不慶幸臣某中賀臣聞太朴既謝旦昏之迹己殊聖道不追王霸之風且雜雖崇號廣溢遞享於尊名而德薄政衰不光於神器伏惟越古金輪聖神皇帝陛下承大雲之法記應榮河之寶籙以天上天下之尊為隆平太平之主不言而理三階正而六氣調不怒而威萬宇清而百蠻服延富壽於和平制雍熙於易懷恩慕化之黨雨占風疇德瑞聖之符非煙若霧青襟詠歎於庠孰黃髮謳吟於衢路固可使堯舜擁篲禹湯扶轂踰賢劫而首唱邈梵天而高視豈登三咸五邁古超今而已哉嘉號初登殊章備舉鋪帝容而建皇極大寶重光撫乾軸而正坤維洪爐再造仙渙與祥風俱動湛恩將洊雷並作緩姬文之獄既削爰書錫漢后之酺且頒戎級滂流之澤出九掖而浸㣥方抃躍之音自三川而周四海加以崇祗肅於梵宇致嚴恭於清廟申冤舉滯而有善必甄享德報功而無文咸秩規模粲而洋溢道德純而布濩豈徒朝野稱慶觀美化之維新故亦神祇降祥見鴻基之載永臣叨延龜組繆分虎符千年有遇更逢開闢之初百辟相歡不預趨馳之末瞻雲路而式怍仰天庭而載佇踴躍之懷企聳無極不任鳧藻悅豫之至謹遣某官奉表陳賀以聞臣某等言臣聞至道充被而沖和感發元化沈潛而祥物昭應伏惟皇帝陛下合德天地齊光日月陶正氣之氤氳降元符之肸蠁用能經緯六合驅馭百靈垂旒法宮而品物清晏揆景中土而風雨休若三元肇革九陽初動撞黃鍾而布氣順元冥而率職曾陰候律豐澤順時薈蔚方興起太山之膚寸參差荐委自平地而盈尺銅街治其如素金隄紛其遂滿縈樓棲檻凝璧臺之九重落絮飄花似芳林之二月豈惟洛神呈象來舞帝宮故亦海騎相趨下朝仙闕東皋欣而望歲南史慶而書祥萬寶登秋居然可詠雙銅叶唱即事非遙自非睿感通微乾心輔德何以降神靈之滋液發兆庶之歡慶臣等恭承元造沐浴太和欣聖澤之滂沛對天休而踴躍無任鳧藻之至謹詣朝堂奉表稱賀以聞臣某言自涉隆冬頗虧甘液皇情眷佇聖德憂勤慜囹圄之罹念祈寒之在節爰發恩造親慮囚徒絲綍始行寒光巳布德音才降同雲便飛落絮飄花與新梅而競彩凝光吐艷共霄桂而連輝俄盈九域之中遍灑四瀛之外遂使狴牢式舞布霈澤於三天畎畝長歌佇豐年之萬庾報應之速固影響而無違慶躍之私在臣妾而何極無任欣抃之至謹奉表陳賀以聞謹言臣某言自元冥授節素液未流宿麥翹滋陳根俟拔聖情回眷天造曲成載想狴牢有矜幽滯方臨聽訟之觀且閲明刑之書中旨才宣上元俄應沛乎降澤油然興雲凝瑞色於千里散禎祥於六出積素彌晝下集於瓊臺飄花滿空旁霈於玉樹海神奔走而來賀田畯謳吟而共舞靈心昭發事速於置郵聖意冥通有同於合契臣等謬當樞近親覿休祥抃躍之情實百恆品無任欣慶之至謹奉表陳賀以聞謹言臣某等言臣聞大人造物亨衢所以貞觀上帝懸象層穹所以照臨合其德而先後不違契其誠而表裏潛應伏惟聖母神皇陛下仰應顧託俯順謳歌臨天下之大寶當域中之正氣斟酌律度三神援亭毒之權鼓舞陰陽萬象入財成之契六幽金鏡四時玉燭凱澤將膏雨共流協氣與景風齊暢故能使天地儲祉靈祇降福樞紐薦符勾芒錫壽自呈有命洛書肇出惟宗社之饗德迪神明之祚聖象物昭應休徵煥發每至十二月元珉啓匣緑錯披題遷寶祕於東序視衣纓於北闕必有仙鶴翔集雲烏杲曜祥光入於九重異氣懸於三象雖復鼎來汾水黃雲冠於北山劍在豐城紫氣沖於南斗無以方斯影響近此闕天作符籙動而有徵日官考驗以為常準日在朔月時惟孟秋奉鴻休而正位先告辰而解網休日申酉衆姬稱賀申禮既畢詔示帝圖芝檢初開扶光未徙即有氤氳傳漢發祥於俯仰之間蕭索浮天舒彩於折旋之際於時晬容當寧嬪儀在列文物充於紫庭暉光察於元象或抱或戴拱環佩之威儀非煙非雲奪褘褕之彩色兩宮胥抃六妃式舞欣就望之近臨悅光靈之下濟臣等謹案孝經援神契王者德至於天則日抱戴又黃氣抱日輔臣納忠瑞應圖曰天子德孝則慶雲出又曰天下太平慶雲見陛下宵衣旰食至德通於九元皇帝錫類推恩純孝刑於八表惟明求道若金在礪自物觀化如草從風屬千齡之景業承肆眚之鴻霈乾坤合而喜氣生圖籙啓而禎符作既以發揮天德昭寶運之隆平且以光翼端章究靈心之終始自非上下和洽幽明薦成何以徵造化之神偉合天人之符契昔者元圭受命無聞感召之祥赤土披圖不發昭回之貺故知冥祇戢道歷載祀而潛休靈物俟時當聖明而效用事超六籍之外聲高百王之表卓哉至矣無得而稱臣等謬奉隆知親承大慶朝聞夕死每竊抃於昌期手舞足蹈敢承歡於下列無任鳧藻踴躍之至謹詣闕奉表陳賀以聞臣某等言伏見今月十一日誅反逆王慈徵等乃有慶雲見於申未之間蕭索滿空氛氳蔽日五彩畢備萬人同仰伏以慈徵等並典司戎旅出入禁闈反德亂常背天逆理聖靈感通神祇昭應雖逆節始萌而潛謀必兆窮姦回之密計盡包藏之巨慝並膏斧鑕俱肆朝市五屬明啓嚴刑應於九秋萬宇悅豫嘉氣呈於三象此實天人合德宗社降休欣紫宸之永固在蒼生而知幸無任嘉慶之至謹拜表稱賀以聞臣某等言伏見內出靈桃四實共同一蒂禁園芳果仙庭奇樹名珍杏奈族茂櫻胡鮮花發於上春嘉實成於早夏四而為一表四夷之一君異而為同明異方之同貫漢宮留核曾所未窺衛國報瓊何能竊似殊祥靈應疊貺駢臻凡在見聞孰不歡躍臣等謬當樞近纍覿休符喜抃之情實萬恆品無任欣慶之至謹奉陳賀以聞臣某等言伏見舊明堂基前有叢竹抽新筍數莖緑籜含霜紫苞承雪淩九冬而擢穎冒重陰而發翠伏惟陛下仁兼動植化感靈祇故得萌動惟新象珍臺之更始貞堅效質符聖壽之無疆鄰帝座而虛心當歲寒而抱節一人有慶萬類呈祥凡在見聞孰不欣躍無任慶抃之至謹奉表稱賀以聞臣某言伏見衡州所進瑞石其形似龜頂上有文曰大周并有乾坤卦字左邊有王武九千字又有水火金木土字各依其方北邊兼有井字臣等詳觀靈字伏覩奇文事實非常理同神契首列大周之字表元首之尊左有王武之名明左契之執合乾坤之兩卦分金木之五行五行展轉而不窮兩卦周流而無極井以養物而知渥澤之下覃石以補天乃顯貞文而上列將以九千之寶祚嗣七百之鴻基兆發靈心事符嘉運況復名為元武叶國姓而呈休出自炎方迎嚮明而發祉神祗之命受託於四靈感應之符實超於千載臣等叨延恩獎屢覩嘉祥喜抃之情實百常品無任慶躍之至謹奉表陳賀以聞謹言臣某等言伏見瑞石有文曰武帝李彰好生臨國永保吉昌伏惟陛下受命旻穹降靈宗祏復棟重簷之禮嚴配昭升五刑九辟之科平反宥恤故能使三精孚德七廟垂祥頻降靈符屢彰潛祉好生臨國實開琬炎之文永保吉昌顯示堅貞之籙隆萬代之遐算曠千齡而不聞臣等叨沐恩私謬當樞近親覿休寶相趨抃躍無任喜慶之至謹奉表稱賀以聞仍請出示百寮并録付史館臣某等言臣聞高明博臨無遠不應正直潛感雖幽必通伏惟皇太后陛下慶發曾沙業隆大寶以至明當宗社之寄以至聖合乾坤之德荷三葉之休光承五形之歷紀平秩庶政大亨㣥物冠帶遐荒之域天福日臨閭閻富壽之氓禮變樂和液露霑洽休徵昭顯用能上披乾象下發坤珍吐川之靈祕開神之韞匱伏見雍州永安縣人唐同泰於洛水中得瑞石一枚上有紫脈成文曰聖母臨人永昌帝業八字臣等抃窺靈迹駭矚珍圖俯仰殊觀相趨動色竊惟聖德奉天遞為先後神道助教相因發明陛下對越昭升欽若扶揖允塞人祇之望實當天地之心所以幽贊嘉兆傍通景貺且人稱同泰縣實永安姓氏將國號元符土地與石文明應表裏潛會樞機冥發明宴坐之逾昌驗皇基之永泰則自然之無眹不測之謂神非夫道格昊蒼德充幽顯豈能發何言之微旨臻不召之靈物考皇圖於金册搜瑞典於瑤編則有蟲蠹成文魚鱗吐匣丹書集於昌戶緑錯薦於堯壇或詞隱密微或氣藏讖緯莫究天人之際罕甄神祕之心未有昭聖育靈發祥隤祉明白顯著燭曜暉光若斯之盛者也且夫導洛疏津卜瀍經宇是開帝王之宅實謂龜書之泉伯禹以致孝鬼神九疇天錫陛下以虔恭顧託八篆靈開超萬祀而同存歷百世而罕逮況乎陰陽景測朝市天臨號令施於四海機衡動於萬國靈心叶贊景業會昌薦希代之鴻寶獲非常之嘉應固可以明禋大寶禮秩介邱副神宗之乃眷答上元之蕃祉臣等遇偶休明榮參簪笏千年旦暮邀逢纍聖之期百辟歌謳喜屬三靈之慶無任鳧藻踴躍之至謹奉表詣闕陳賀以聞臣開大悲握契汲引之數盈千元聖垂機感現之瑞不一隨緣應俗或作孺童降迹通凡常為長者然則前佛皆同一字可通一作道非道理兩名至矣哉不可得而稱也伏惟天册金輪聖神皇帝陛下功成塵劫迹御金輪萬姓樂推百靈欣戴如來備記昔避天女之宮菩薩降生遂坐人王之國臣等一昨伏見西嶽雲臺觀道士奏稱御像瑞石大妙至極天尊一鋪創造聖容未施五色宿昔之頃畫繢自然不加之分宛同神化七十二相合而成體八十一好散而成章披絳雲之室闢明霞之館千乘億騎浮空而下九仙五老步虛而來羽抱錦帔風搖雲起龍文而鳳章日縣而月綴威儀而晬侍衛舞聲坐疑龍漢之遊何必仙山之會自非陰陽不測變化無方憑法匠之威靈假神功之動用其孰能與於此中賀臣等又聞先天後天聖德合於無象欲雨而雨元契通於不言日者王室闕聞炎方在候陛下乘朱駱駕赤騮歷太陽之中道居明堂之左個百神受職萬國來朝既配帝而嚴禋亦統天而布政是時也慈雲結慶甘露流香微風蕭然纖塵不起凡百在宥動色相歡咸以為天者萬人之本物有不霑於澤者則仰皇天而望之有不覃於惠者則籲告而請之更祈洪澍輒聞流潦俄而油雲族晚覆雙闕而朝隮膏雨及私浹三川而夜下郊原吐潤呈彙霑蘇麥壟纖莖巳濯兩岐之秀黍田香粒方滋合穎之苗凡在㣥生不勝幸甚然後知御雲臺而占繇幸洛陽而録囚蓋其眇少曾何髣佛臣等幸忝簪笏預睹珍符惟德洞冥即叶元皇之化惟靈薦福長延梵帝之尊抃蹈之情倍百恆品無任鳧藻之至臣某言今月十六日聖上擬檢行安置大像處其夜舊著大像曜儀院內從南行向北總有八十一麟迹見外無入處內有出蹤靈貺潛開禎符顯發惟此仁獸獨冠毛㣥識變知機通靈感化悟金輪之欲轉即見殊祥知玉輦之方遊先呈異迹九九為數明歷算之無疆濯濯咸歌見休明之有應五蹄顯五方之會一角彰一統之符式廣鴻基方宏象教昔有鳳巢軒閣纓冕相趨龍止堯壇神祇動色豈若祥開紫掖瑞感元樞發揮萬劫之符幽贊三天之果美超五籍珍越四靈曠千古而不聞超九皇而獨遠臣濫承驅策親覿嘉祥欣慶之情實倍恆品無任抃躍之至謹奉表陳賀以聞伏請頒示天下録付史館臣某等言伏見遼東都督高仇須承露布逆賊孫萬斬等驅率凶黨燒逼州城城中出兵與其賊拒戰則有飛廉作氣回祿揚熛起沙礫而薄天助茲鼉鼓吹煙火而漲日燎彼鴻毛靈應潛施勇士皆奮遂使妖徒震懾亂轍而搴旗善戰橫行摧枯而拉朽僵尸蔽於草芥俘馘聚於轅門善馬咸牧名王且縶無假燒雞之策而觀其自焚不勞燧象之師而撲其餘燼又凶渠不逞將竊號而假名逆黨未悛止挻妖而怙亂或神摧其股或夭厲其身似安國之登車同伯牛之自牖故知高明輔順正直司惟辟好仁與乾坤而合德惟狂樂禍在神鬼而同誅方看翦滅之期行覿凱旋之奏臣等叨延獎渥謬奉軒墀抃躍之情實萬恆品無任慶快之至謹奉表稱賀以聞謹言臣等某言伏奉今月日詔書鑾駕停幸洛邑臣等輕生多幸淺識逢時青襟遊聖人之國白首觀太平之化常恐涓涘難效溝壑易期所以眷戀軒宇徘徊霄極日者農秋暫缺庶政微勤天皇損上益下忘身循物便欲移鑾徙蹕望河洛之封畿削賦蠲徭罷咸秦之力役臣等仰銘元造退揆愚心誠以天府膏腴帝畿殷實雖災畬之務稍闕於千箱而衣食所資尚豐於纍載況惸嫠賙給家室乂安何容使扆座鳴謙聖躬服劬勞之事衡門高枕臣等蒙過差之澤是用低徊局蹐杼柚慙惶方且選議蓬茨推中襟於白屋因言槐升下情於紫路不謂乾心俯應聖德潛融降六璽而紆紱回三光而改照人欲天從既通誠感稟靈含氣疇非慶躍竊惟政途非一朝務有恆國彞不可以恩廢家征不可以事闕天皇愛精頤壽答兆庶之歡心臣等畢力窮年供黍稷之餘稅庶得百度無曠九功惟敘伏望皇明乃眷輿輦少安則海甸蒸人撫耕鑿而知勉渭濱遺老仰雲天而識庇無任踴躍之至臣彥先等言臣於梁王三思處見御書雜文尺牘凡九十卷跪發珍藏肅承瑤檢天文景鑠璧合而珠連聖理雲回鸞驚而鳳集究黃軒鳥迹之巧殫紫府結空之勢偃波垂露會寶意而咸新半魄全曦象天形而得妙固已奇蹤絶俗美態入神掩八體而擅規模冠千齡而垂楷法重以語成四教文總六詩聲咀徵而含宮旨懲違而勸德用之於國敦風俗而厚人倫行之於家習雍和而崇孝敬惟彼良翰特蒙殊獎銘厚渥而歡悚竭深誠而奉戴是用編之玉軸勒以銀繩盡罄梁珠特裝瑁之匣總收陶璧用飾琉璃之笥雕鏤十品緹巾萬襲藝香却蠹芝體為封珍寶之精下燭西崑之岫文章之氣上纏東壁之象實可謂天下之妙迹域中之奇觀者焉臣等幸遇休明叨近簪笏駭矚非常之瑞欣逢不世之寶足蹈手舞徒懷鑽仰之心夕死朝聞豈識名言之地無任抃躍歡欣之至謹奉表陳賀以聞臣某等言伏見五月九日制書將拜圖溫洛肅事南郊御朝堂列㣥后恭聞大禮不勝慶躍臣某中賀微臣泛覽金册詳窺玉版商較於七十二代下上於數百千年以羲軒稱皇所貴者河圖龍出以堯舜稱帝所尊者洛書龜負猶未聞總集靈命宏敷聖業籠大勛於萬代盡能事於一朝非天下之至神其孰能與此乎伏惟皇太后陛下肅膺遺託光踐丕基皇業高於補天母德隆於配地東西浹洽窮八際而流河海南北貞明洞六幽而懸日月淹中訪禮汶上披圖情每留於布政義不忘於宗祀於是全謀聖造異制神行迎四象而疏闈向八風而闢牖上圓法天而煙雲為之動色下方象地而龜玉所以呈姿元功睿範洋溢於歌頌祕采靈文昭彰於篆刻豈白銀青王惟傳地理之經黃魚黑鳥但播天乙之號可以答上元之命可以光纍聖之隆制有司陳法駕用禋柴之典採沈璧之儀然後負黼扆而朝百神垂衣裳而會萬國不亦休哉不亦盛哉臣忝預出征恨深留滯河西弔影銜珠之託未申洛北馳心拊石之歡何極不任悚懼之至臣敬仁言昨因奏事蒙恩入對伏見陛下所御湛露殿三間兩間雨漏無所修葺又因顧問之次伏承聖旨云去年口中生一齒今年又生一牙臣伏以聖德謙沖躬自菲薄富有四海尊居萬乘而中堂外扉不閲於寒暑上棟下宇未離於燥濕降紫宸而齊白屋屈帝力而用氓心雖昔之采椽土階茅茨蒿柱漢皇之儉用夏后之卑宮六籍之所讚揚百家之所記述曷足以希風上聖仰帝道之崇高擁篲後塵望皇輿之軌躅臣又聞之易有四營金牙為壽考之象詩有六義玉齒載神仙之謠還年而編貝不虧却老而瓠犀仍出亦有堅而不脫聞於導養之方落而更生得自靈飛之散斯並道藏幽記術隱上清誠福力之所招匪勤求而可致陛下端莊靜默寬惠仁慈抑嗜欲而省煩勞恤飢寒而甘弊陋宜其延貺宗社受報黎元集天地之休和享靈祇之介祉故得百祥護體五福登年同鎬邑之夢齡邁鑣宮之錫壽豈徒一人有慶常居北極之尊實乃萬姓同歡共仰南山之固臣謬以庸賤獲奉宸嚴欣聖壽之延長願稱大慶見宸居之挹損思揚至德乞宣示海內仍録付史館庶使六合之中知寶算之方永百代之後頌休風而不絶無任抃躍之至謹詣闕奉表陳賀以聞臣承嗣等言伏見逆賊盡滅未誅先斃叛奚部落不守自降或貫盈而亡或懾懼而伏行從除殄不勝慶快臣承嗣等中賀臣聞違逆助順穹昊所以照臨振遠懷荒邦家所以砥定蠢茲豺虺憬彼犬羊稱亂白山虔劉蒼海豈徒石砮楛矢式遏於天朝故亦桑弧鐵衣憑陵於邊朔陛下乃眷愚悖情深遵養聊用七旬之舞未加五戎之罰雖大聖之德恆存於好生而冥祇之心有切於除害驅桃都之厲鬼剿檀石之妖魁不資舉網之勤而長鯨已曝無假合圍之費而封豕先屠有以知神道之難誣有以見天心之不遠元凶既覆餘孽旋殲畏威者鼠竄而離心懷惠者鴈行而革面毳幕連路氊裘成市與夫姬得瑞穎期越裳於纍年漢獲駢柯俟胸奴於後歲若斯而已也方傾巢而盡落佇匣刃而藏鋒自非睿感潛通靈符叶贊豈能使天地假手幽顯同心及有秩之方歌屬斯干之肇獻上棟下宇儲百福而擁神休開陽闔陰積千祥而宜聖壽配南山而永固與北極而長尊仙聖所以安居黎元由其式抃臣等幸逢昌運叨延嘉獎喜遐陬之霧廓且覿歸牛欣大厦之天臨方同賀雀願奉需雲之慶思承湛露之歡無任區區之誠謹上禮食若干輿蘋羞何有希陳上帝之筵芻豢非珍遂同野人之獻旋顧單菲追增悚怍謹隨表進奉以聞臣承嗣等誠歡誠喜頓首頓首臣某以下文武官九品以上二千七百五十人等言臣等伏見今月九日恩制緣逆人親屬有能公勤清白者自當隨材擢用不以為瑕宜各坦懷佇收來效臣等仰承恩造伏誦德音感戴屏營忭舞相屬臣某等誠歡誠喜頓首頓首死罪死罪臣聞父殛子興聖賢忠厚之教身死宗戮季末陵夷之道或罰不及嗣或禍并其族淳朴浸往惻隱不逮於昆蟲法令滋章網羅必及於麛卵天厭淫虐誕興明聖掃百王之餘弊張網羅而更理去貪殘而遂生育品物昭蘇哀獄訟而緩虔劉寰瀛凱懌刻薄之風盡敦厚之化流猶且締想納隍凝情溝壑在豫之旨固以刑於萬方拯物之心豈直解其三面日者亂臣干紀巨猾滔天將傾渤海之流且觸崑山之柱陛下傷澆浞之為變弔管蔡之不咸法雷電之威誅而不怒用春秋之義斷必以情擢其髮而葬其尸殲其魁而宥其黨漢主三夷之法黜而不行秦王九族之刑矜而莫用至若連萍託枝附葉隨或玉石難分或淄澠易混俱削嫌疑之迹概從寬大之文遷州貶縣才示於小懲竄海投沙尚班於榮級則是我有大造於㣥凶也而聖慈無巳天澤逾隆並運四時乃錫造於平分之外不遺萬物尚加惠於曲成之表使枯朽之幹向秋而更榮窮涸之鱗在轍而能躍藏其疾而舍其垢責其效而要其功雖魏士之私於外朝獲安反側商人之染於汙俗咸與維新無以匹此含宏方斯滌蕩陛下祚始酆鎬嗣周家之忠信卜於瀍洛承夏鼎之休明三后在天日歆於盛德四夷為守永慕於高義方當鬼神降福豈止黎庶歸心臣等沐道昌期叨榮顯列觀太平之德禮聽中和之詩頌雨露之施徒仰於財成天地之仁豈議於酬答無任欣戴踴躍之至謹詣朝堂奉表陳賀以聞臣某等誠歡誠喜頓首頓首死罪死罪謹言臣某言臣由衷之辭已具前表分外之澤仍叨後恩祗命低回不知所處臣某誠惶誠恐頓首頓首死罪死罪臣九能無術五技不成空荷陶甄竟微知效陛下篤猶子之愛用家人之慈流其渥恩被以簪組析圭分器等姬氏之藩維裂壤誓河承漢家之禮秩皇儀曉列拜金扆而升玉墀仙蹕晨遊陪柏梁而侍蒿柱在臣榮幸實冠等夷惟臣妄庸已成忝越豈可以仍祗大命更竊厚恩任濟時之股肱為巨川之舟楫且臣屬居宗室地接葭莩惟社稷之安危乃門庭之休戚豈不願磨頂至踵裨高益深徒以智力有涯勉強無地懼傾輈之為敗憂折鼎之生災匪藏器而謀身實輸誠而體國伏乞俯矜愚劣永鑒隆替思懋賞懋官之義用知臣知子之心特停過恩速寢嚴命則物情輿議咸仰於至公叨榮謬官不塵於則哲無任慙懼屏營之至謹詣閣奉表以聞臣及善言臣叨荷殊私冒陳至懇而惕慮昏於凡識深誠蔽於短辭丹概罔通紫泥徒渥祗奉還答周惶失措臣中謝臣才疏行缺運偶時來榮匪德遷官由恩達法河象嶽升臺歷府行參八命坐陟九霄彤軒皂騶非振鷺之飾青組丹紱是濡鵜之譏施重邱山效微涓滴妨賢自久速謗滋深頃因齒髮之衰得蒙骸骨之賜西河退老非玩經書東海歸間空求藥餌方養支離之疾翻成愷悌之恩曲降絲綸重收簪屨徵榮朽木責焰寒灰將使策蹇磨鉛入總樞祕牽羸引憊參典鈞石仰抃恩渥顧探心守桑榆且晏蒲柳先秋方與絳縣老人論其甲子淄川艾耋比其容貌將何以對揚金扆趨奉玉墀當鳳沼之便蕃望龍闈之清切況寅亮皇極經綸帝道功參濟巨義等作霖隆替是因具瞻斯在永言授受豈當容易是用深鋻陳力載懷量己方憂折鼎乞保懸車且今百度惟貞九流式序鵷鴻齊列俊乂在官豈可使畫虎承羞豐貂竊幸謬中孚之好爵辱大雅之能官伏願深惟至公俯收曲澤矜此疲劣改命才賢則器滿之凶不纍於愚叟棟隆之吉永光於聖代無任慚懼屏營之至謹重詣朝堂奉表以聞
