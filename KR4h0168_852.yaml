front:
  text: 全唐文欽定全唐文卷八百五十二保裔晉天福時人
  hash: sha256:74d5bb5ee3c1b5eb77d0b9b9a59d0b0b437567ad8a7cc815d4ca08ad7df2f321
  markers:
  - {type: head, offset: 14, content: 韓保裔, id: KR4h0168_NFKB_852-h1, level: 1}
body:
  text: 伏請天下狴牢特頒惻憫抱沉疴者宜加藥餌無骨肉者勿使饑寒庶裨解網之仁用補泣辜之德鵬字大舉大名人少舉進士後唐閔帝鎮魏州辟為從事及即位拜右拾遺歷左補闕考功員外郎充史館修撰遷刑部郎中晉天福中擢中書舍人卒竊聞司封格式內外文武臣僚才升朝籍者無父母便與追封追贈父母在即未叙未封以臣所見誠為不可此則輕生者而重死者棄今人而録古人其榮有何其理安在又云父母在品秩及格者即與封其母不言其父便加邑號兼曰大君遂令妻則旁若無夫子則上若無父豈有父則賤而母則貴夫則卑而妻則尊若謂其父未合加恩安得其母受賜若謂以子便合從貴曷得其父不先伏以父尊母卑天地之道尊無二上國家同體今母受封父無爵名教不順莫大於茲臣伏乞自今後文武臣寮父母在其父己有官爵者即敘進資品以及格式或不任祿仕即可授以致仕或同正官所貴得以敘封妻室即父母俱榮孝子無不逮之感閨門交映聖君覃慶賞之恩噫荷陛下孝治之風受陛下榮親之祿者靜而屈指不過數人陛下得以特議舉行編為令式勸天下之為善令域中之望風自然見前代之闕文成我朝之盛典況唐明宗朝長興元年德音內一節應在朝中外臣寮父母在並與加恩司封不行明制堅執前文倘布新恩兼合舊敕庶使事君事父嘗遵一體之規為子為臣不失兩全之義臣又聞司封令式內外臣寮官階及五品己上者即封妻廕子固不分於清濁但祇言其品秩且諫議大夫給事中中書舍人並是五品贊善大夫洗馬中允奉御等亦是五品若論朝廷之委任宰相之擬掄出入之階資中外之贍望則天壤相懸矣及其敘封乃為一貫相沿至此其理甚非而況北省為陛下侍從之臣南宮掌陛下彌綸之務憲臺執陛下紀綱之司首冠㣥寮總為三署當職尤重責望非輕此則清列十年不遂顯榮之願彼則雜班兩任便承封廕之恩事不均平理宜改革伏乞自今後應諸司官及五品己上者即依舊制施行應三署清望官及六品已上便與封廕清濁既異秩品宜升仍下所司議為恆式夫天地肅物松柏猶或後雕郊藪呈芳芝蘭焉能長秀故老氏有必摧之歎仲尼興不實之悲衆木低而梁棟傾嚴霜重而祥瑞去物之有矣可得喻焉公諱周敬字尚素其先顓頊之裔也封於羅以國為氏地連長沙因家焉公即長沙之後也曾祖讓皇檢校司空纍贈太師封南陽王娶宋氏封越國太夫人祖諱宏信皇天雄軍節度使檢校太師兼中書令長沙王纍贈守太師纍封趙王諡曰莊肅娶趙國夫人呂氏先薨又娶吳國夫人王氏為時之瑞命世而生倜儻不㣥英雄自許有唐之末大盜勃興鎮守一方廓清干里上則忠於社禝下則施及子孫烈考諱紹威皇天雄軍節度使守太師兼中書令鄴王贈守尚書令諡曰貞莊天地鍾秀山河孕靈下筆則泉湧其文橫戈則雷震其武惠惟及物明可照姦曠古己來罕有其比貞莊有子四人長廷規天雄軍節度副大使檢校太傅駙馬都尉少薨贈侍中次周翰義成軍節度使檢校太傅駙馬都尉亦少薨贈侍中次周允前保大軍行軍司馬檢校兵部郎中兼御史大夫柱國賜紫金魚袋早歷通班繼為上介綽有器業可奉箕裘公即貞莊公第三子也性稟淳和生知禮樂早失天廕幼奉母儀秦國夫人劉氏即故亠兊州節度使太師公之第三女也肅雍無比柔順有聞示以愛慈加之訓導遂令諸子悉著美名時梁乾化初公之次兄方鎮南燕公時年九歲秦國夫人歸寧於亠兊州太師之宅遂命侍行至闕下梁闕一字主宣召入內對揚明庭進退有度上甚器重之遂授檢校尚書禮部員外郎仍賜紫金魚袋自此恆在宮禁出入扈從乘輿與皇親無間侍立冕旒多備顧問無非辨對深洽宸衷上尤奇之其年秋七月歸南燕甲戍秋七月公之次兄薨於滑州之公府上聞訃奏乃謂近臣曰羅氏大勳之後宜賞延遂命公權知滑州軍州事檢校禮部尚書冬十月上表乞入覲十一月至京師朝謝畢翌日有制授宣義軍節度使檢校尚書右僕射年方十歲位冠五侯甘羅佩印之初未為少達王儉登壇之日己是老成十二月至自京師乙亥春三月鄴中搆亂河上屯兵況處要衝屬茲征伐事無巨細公必躬親道路有頌聲軍民無撓政丙子春二月移鎮許田加檢校尚書左僕射是歲公年始十二作事可法好謀而成政絶煩苛人臻富壽忽下徵黃之詔俄諧會尸之期戊寅秋七月朝於京師有詔尚主公拜表數四辭不獲免遂授檢校司空守殿中監駙馬都尉壬午冬十月出降普安公主傅粉何郎晨趍月殿吹簫秦女夜渡星橋一時之盛事難儔千古之清風盡在癸未春三月除光祿卿冬十月唐莊宗收復梁園中興唐祚屬當郊祀無失職司遂封開國侯加食邑三百戶至明宗纂紹之初除右金吾衛大將軍充街使秋九月轉左金吾衛大將軍充街使執金在彤庭之前佩玉向丹墀之上仕宦之貴無出於斯上以公久居環衛之班頗著警巡之效至戊子二月有制授匡國軍節度使加檢校司徒仍賜耀忠匡定保節功臣下車之後布政惟新福星爰照於左馮暖律又來於沙苑庚寅夏四月上以圜丘禮畢慶澤溥行就加檢校太保仍降璽書其年冬十一月朝於京師除左監門上將軍九月轉左領衛上將軍辛卯夏六月轉左武衛上將軍癸己五月除左羽林統軍甲午春加特進階封開國公食邑二百戶改賜竭誠匡定保乂功臣丙申九月唐廢主以汴師北征命公以所部禁旅巡警夷門公英斷不回至仁有勇當危疑之際立鎮靜之功浚郊之民於今受賜今皇帝并門鳳舉洛水龍飛力願推崇首來入覲上嘉其懿效旌彼殊庸遂除右金吾上將軍美哉出總藩宣入居嚴衛外則作疲民之藥石內則為天子之爪牙文武兩班踐揚將遍物禁太盛古之有言壽年未高染疾不起以天福二年七月二十七日薨於汴州道德坊之私第享年三十有三嗚呼皇天莫問徒云輔德之言大夜何長共有殲良之歎上聞所奏惻怛哀慟輟視朝兩日厚加賵幣贈太傅君臣之義終始克全公以己丑歲五月梁普安公主薨於同州後再娶東海郡徐氏夫人即故東川節度使太師第五女也蕙質蘭姿懿德令範孰念孤鸞之歎自傷黃鵠之歌公有姪延闕一字見任間廣既副使即魏博闕一字大將軍侍中之子也朴玉其儀渾金其器度評闕二字相貌闕五字人闕三字公亦三子四女長子延賞守太子舍人次延緒次延宗皆稟庭訓悉紹家聲龍駒鳳雛得非天性良金瑞玉自是國楨終天懷風樹之悲踣地有蓼莪之痛長女適郝氏次適婁氏二女方幼諸子皆普安公主之出也公主靜惟間雅動有規儀休聲首冠於皇闕一字淑德克彰於婦道帝王之女無以過焉公性不好弄幼善屬文嚴毅而至和溫恭而難犯言惟合道動不違仁張充一變之年己功成名遂闕四字之日乃善始令終以丁酉歲冬十月六日安葬於洛陽縣之原禮也孤子延賞等泣告鵬曰公之履行為衆所知公之勳庸歷代罕比若非故舊孰能縷陳鵬列親表之間受顧念尤最難避狂簡輒勒貞珉序不盡言乃為銘曰積慶之門挺生奇傑入覲堯庭出持漢節十乘啓行萬夫觀政宵旰無憂袴襦入詠英華發外清明在躬惟忠惟孝立事立功滑臺去思璧田來暮藹然休光綽有餘裕摛繡文翰傅粉容儀承顏紫禁飛步丹墀門盛七葉祿逾萬石外冠時英內光帝戚歷事纍朝薦逢多難動有成功舉無遺算秋敗芳蘭地埋良玉山雲晚愁林風夜哭王孫一去兮不復還陵園草色兮秋黃春緑繼恭晉天福中威武軍節度福建管內觀察處置等使加特進檢校太傅封臨海郡王閩國一從興建久歷年華見北辰之星位頻移致東海之風帆多阻願言遐想文不逮誠餘遣邸吏林恩列狀申述台符晉天福中以監察御史為尚書膳部員外郎知制誥貢舉之司條貫之道有沿有革或否或臧蓋趨向之不同致施行之有異今欲酌其近例按彼舊規參而用之從其可者謹條如右九經元格帖經一百二十帖對墨義泛義口義共六十道策五道去年知舉趙上交起請罷帖書泛義口義都對墨義一百五十道合今請去泛義口義都對墨義六十道其帖書對策依元格五經元格帖書八十帖對墨義五十道臣今請對墨義十五道其帖書對策依元格明法元格帖律令一十帖對律令墨義二十道策試十條去年罷帖對墨義六十道策試如舊臣今請並依元格學究元格念書對墨義各二十道策五道去年罷念書都對墨義五十道今請依去年起請三禮元格對墨義九十道去年添四十道臣今請並依元格三傳元格對墨義一百一十道去年對四十道臣今請並依元格開元禮三史元格各對墨義三百道策五道去年加對五十道臣今請並依元格進士試雜文詩賦帖經二十帖對墨義五道去年依帖經對義別試雜文二首臣今請依起請別試雜文其帖書對義請依元格童子元格念書二十四道起請添念書都五十道及三十通者故臣請依起請昭序晉天福中官太子賓客纍遷工部尚書伏見本朝儀制北省官為近侍之班遂異常參之禮所以百寮則曰拜蓋云謝食北省官不赴廊飧食於本署故常朝不拜況今耆舊皆目睹躬行伏望陛下順考古道率由舊章正立朝之常規遵先王之定制慎儀晉天福中為翰林學士考功員外郎轉都官郎中改中書舍人今春己來稍愆雨澤陛下念稼穡之重深宵旰之憂倍軫聖心遍走㣥望盈尺則告瑞於元朔如膏則潤浹於暮春可卜豐穰動諧響應請天下凡祠宇有益於人者下本處常令修飾冀集洪休崇弼唐宰相緯子仕後唐自吏部郎中授給事中晉天福中遷左散騎常侍天下州縣長吏每到任造得公廨什物罷任之時多事己有不係案牘此後請公廨什物明立文案不許乾沒免致擾人光贊晉天福中官宗正卿昔周武王奄有天下過商容之閭必式見比干之墓即封蓋褒賞賢良尊崇忠義伏惟皇帝陛下顯膺天命開創鴻圖解網行仁救時順動樂業不知於帝力悅隨但聽於山呼盛德難名太平可待臣伏見滎陽道左有萬石君廟本前漢大中大夫石奮之廟奮有子四人各二千石祿景帝曰人臣尊寵畢集其門故號萬石君德行懿績備列前書唐大中十三年鄭州司馬石貫稱裔孫刊石廟廷備紀其事伏遇皇帝行幸浚郊經過滎水展義已聞於岐路覃恩宜布於幽明其萬石君廟伏乞俯宏霈澤特降封崇俾光遠祖之徽猷益茂我朝之盛典鴻漸晉天福中官將作少監伏覩近年已來士庶之家死喪之苦當殯葬之日被諸色音樂伎藝人等作樂求覔錢物伏乞顯降敕文特行止絶或所在官吏等通容不與覺察請行朝典詳晉天福中官中書舍人臣聞天地之道以易簡示人鬼神之情以禍福為務王者祥瑞至而不喜災異見而輒驚罔不寅畏上元思答譴告臣聞北京地震日數稍多臣曾覽國書伏見高宗時晉州地震上謂㣥臣曰朕政教不明使晉州屢有震動耶侍中張行成對曰天陽也地陰也陽君象陰臣象君宜動轉臣宜安靜今晉州地震彌旬不休將恐女謁使事臣下陰謀且晉州陛下本封今地震焉尤彰其應伏願深思遠慮以杜未萌又開元中秦州地震尋差官宣慰又降使致祭山川所損之家委隨事制宜奏聞伏惟陛下中興唐祚起自晉陽地數震於帝鄉理合思於天誡臣伏思陛下統臨萬國於今六年猛將如雲鋭師如雨出無不捷叛無不擒歲稔時豐人安物阜實慮天意恐陛下忘創業艱難之時有成功矜滿之意欲陛下有始有卒於兢兢業業也今伏望聖慈特委親信兼選勳賢且往北京慰安密令巡察問疾苦於黎庶俾議蠲除備祭祀於山川各加虔禱然後乞陛下鑒前朝得喪之本採歷代聖哲之規近君子而遠小人任賢無二杜邇言而求讜議擇善而從崇不諱之風罷不急之務則景公修德熒惑退舍以為祥太戊小心桑穀生朝而不害自然妖不勝德所謂宏之在人寰瀛永定於無疆遐邇長歸於有道臣聞除舊布新故順天而設教惟名與器不假人以樹恩所以示㝢縣之至公所以仰朝廷之大柄今則既逢英主未革前蹤是敢聊舉一端輕塵四達酌其損益幸補涓埃伏覩南北兩班內庭諸局或有不文不武非舊非勳論技術則罔有所長語才行則罕聞其異但思月限以冒官常俾五細以在庭使四方而何則有虛華級仍蔭私門忝榮更及於子孫祿利徒銷於府庫況今方興戎事久困生民因無用之官寮具員無闕計有限之財力帑藏正虛若不去留空成耗蠹伏望略加澄汰稍辨幽明則支分或減於殷憂內外庶成於通濟又覩十年已來肆赦頻降諸道職掌一例奬酬藩方不守於規程奏薦罔論其高下僕隸則動逾數百絲綸則皆示特恩所以倉場管鑰之微人曹局簡札之小吏至於伶倫賤類灑掃庸奴初命便假於貴階銀章青綬拜賜遽披於法服牙笏紫袍乃致貴賤不分寵榮濫被雖雷雨作解渥澤恐遺於萬物而衣裳在笥貞規何法於百王此後或有溥恩應諸道職員除主兵將校外其衙前職列伏乞明示條章俾循事體節度州只許奏都押衙都虞候教練使客將孔目官及有朱記大將十人仍取上名支郡則只許薦都押衙都虞候孔目官其諸色人並委本道量轉職次則得之者感恩有異受之者與衆稍殊寰區仰天子之尊藩后知王澤之貴名器之重治亂是資伏惟皇帝陛下俯回宸覽略照愚衷勿謂小善不行勿謂舊弊難改失之在漸謀之在初倘或因此留神自可觸類而長異李朝隱一判破桓敬等五家附會三思狀驗斯在天下聞者莫不寒心刑部尚書從此而得知新晉天福中官考功郎中嘗使契丹尚書省京師會府輦轂繁司奏議雖委於官寮行遣亦資於胥史六典之制官史有俸有糧其尚書省諸司令吏伏請給賜月糧俾其奉職麟晉天福中官刑部員外郎臣聞漢朝除吏苟稱其職不數遷移自先朝開國己來牧守多酬勳舊以寵勞臣竊見晉朝除刺史或數月驟替或一歲即移不惟送故迎新轉成煩擾其次廉能者未暇施政貪濁者轉急誅求以臣愚管望朝廷立定年限觀其考課以議轉遷保極閩人後唐天成中進士纍遷禮部倉部員外郎晉天福中桑維翰居相位奏貶衛尉寺丞尋復為倉部員外郎卒元冬告謝密雪未零竊慮今夏龍德啓圖鑾旌赴闕擁十萬衆臨九重城讋怖龍神震驚方位致瘥札為沴風雨失時請在京諸寺觀置迎年消災資福安土地龍神道場
