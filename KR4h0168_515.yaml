  text: 全唐文欽定全唐文卷五百十五京字慶復大歷元年第進士德宗朝歷官考功員外郎再遷給事中兼集賢殿學士罷為祕書少監
  hash: sha256:9234b6048191262d469a1ab668026acb73c1e33f14582f782fbd2b9d36f8723a
