body:
  text: 今年十月祫享太廟并合享遷廟獻祖懿祖二神主春秋之義毀廟之主陳於太祖未毀廟之主皆升合食於太祖太祖之位在西而東嚮其下子孫昭穆相對南北為別無毀廟遷主不享之文徵是禮也自於周室而國朝祀典當與周異周以后稷配天廟為始封之祖而下乃立六廟廟毀主遷皆在太祖之後禘祫之時無先於太祖者故太祖東嚮之位全其尊而不疑然今年十月祫饗太廟伏請據魏晉舊制為比則構築別廟東晉以征西等四府君為別廟至禘祫之時則於太廟正太祖之位以申其尊別廟登高皇太皇征西等四府君以序其親伏以國家若用此義則宜別為獻祖懿祖立廟禘祫祭之以重其親則太祖於太廟遂居東向以全其尊伏以德明興聖二皇帝曩既立廟至禘祫之時當用享禮今則別廟之制便就興聖廟藏祔為宜臣前為太常博士已於建中二年九月四日奏議祫享獻懿二祖所安之位請下百寮博採所議其時禮儀使顏真卿因是上狀與京議異京議未行伏見去年十一月二十八日詔下太常卿裴郁所奏大旨與京議相合伏以興聖皇帝則獻祖之曾祖懿祖之高祖夫以曾孫元孫祔列於曾高之廟豈禮之不可哉實人情之大順也今年夏禘饗於太廟須定太祖景皇帝東向之位并遷廟之位伏以禘祫是審禘大合祖宗次序之祭必遵太祖之位以正昭穆今年遇禘大祭恐須定比來所議之禮饗日既近臣職忝刊緝經籍謹遂奏聞伏以建中二年及貞元七年十一年特令都省詳議者三竟未正太祖東向之位至十二年禘十七年祫猶未得中其於至正之饗不可重難依違又以過此也在昔兩漢之政咸勤東京之事最明共理邦邑必難守宰不獨孝宣二千石之選也我國家宏啓至化稽對前謨領縣掄材自邇敷遠實先三輔載首屬城恆寧厥人多及於理不有卓異曷揚頌歌未通神明誰鏤金石由是貞元十一年秋閏八月十七日辛巳詔諭銘紀左馮翊澄城令鄭楚相功德於其理所之南門也澄人謂余方從郎謬跡書殿飽循吏之事業聆采詩之風謠求成其文置美公焉公字叔敖鄭州滎陽人高祖元胄皇朝散大夫祠部郎中曾祖慈力皇朝議大夫蔡州刺史祖敬賓梓州通泉丞烈考琨冀州南宮尉纍葉盛德咸稱能賢慶遺後人蔚變才子既冠試吏逢時屢遷及壯佐州遇守方缺拾紫大綬假御兩轓名盈利權道厭曠貴念代游之不吐去巨卿之舊儀遂以幅巾諸生修刺先進醇粹流藻馨香立言德成敢雄籍奏用申擢秀才第東觀校書郎勞謁者於遺編勉訓士以主簿愛仙家於早歲安緱氏以彌年秩滿從調判及殊績授長安尉而至於宰是邑也致理大端本人和氣孝崇悌順心通性革當同財而離居驟撤屋而周處用成賦由平頒役諭閲廢精淪蕩俠愛俾懸衡以自占偶踐更而省役敏樹柔桑阜蕃多稼讓鄰終畝并力從化順祈報以登入洽禮節而息宴井冽河闊浴汲投艱寒燠異宜男女半道戒鑿深厚商利遠邇會廬之義肇周八家不窮之養旁行四序藝蔬屢豐恆闕四字諸圃者放於園公三畝俱存百本咸育生生之禮備赫赫之名成鴻細必為夙暮載考厚藏不散之竁盡秩有益之祠枯泉由靈而正出鷙蟲抱義而大去此又感會元昧之可紀者也念歲孤之襦餘散俸廩於里舍訪善良之疾苦降服馬於鄉亭此又願懷隱微之可稱者也統齊多方宗詣元念臻於大稔登於洽平人閒歲安風清雲明雞犬攸聞煙火闔境表率王甸圖像廷城匪君子理道之至歟是皆根於研心持權端操軼倫先時劇幟中歲充賦疾如影響利用卷舒摛詞則宣章練政則居最俄函詔除裦者遂冠惠文行之其猶子康太傅伯師尚書之徵於馮翊崔君慎寵乃寮聞言於獻狀詢績以作掾於是百姓孫士良等報德誠明請命朝省而斯頌作焉詞曰澄有賢令兮為鄭父文雅揚班兮學齊魯執業操刀兮造新部更宅闢戶兮調舊宇家多令井兮漫畦圃野播膏苗兮斂鍾畝泉異二師兮亦我樹獸同安成兮不吾禦西海少婦兮慎莫渡潁川四君兮敢為伍螭龜爰伐兮題廣路崔巍靡泐兮偉終古虔休字君佐汝州梁人本名延貴大歷中纍擢步軍都虞候兼御史中丞封同昌郡王賜今名遷潞州長史昭義軍節度使檢校工部尚書貞元十五年卒年六十二贈左僕射諡曰敬臣某言臣聞於師夫君子為能知樂是故審音以知樂審樂以知政則理道備矣故清明廣大終始周旋與天地同其和與四時合其序豈止於鐘鼓管磬云乎哉伏惟皇帝陛下繼明御極理定功成則星辰之度以授人時酌昊穹之心以為政本五行隨其用捨九有荷其陶鈞鳥獸魚鱉無不咸若伏見開元中天長節著於甲令每於是日海縣歡娛稱萬壽之無疆樂一人之有慶故能追堯接舜邁禹踰湯自周以後不復議矣臣竊以陛下降誕之辰未有維新之典雖太和已布於六氣而大樂未宣於八音毋乃臣子之分或有所闕愚臣不揆頑昧思所祖述每私歌竊忭忘寢與食久矣適遇有知音者與臣論及樂章探微賾奧窮理盡性臣乃遣造繼天誕聖樂一曲大抵以宮為調表五音之奉君也以土為德知五運之居中也凡二十五遍法二十四氣而足成一歲也每遍十六拍象八元八凱登庸於朝也所冀與雲門咸池永傳於律呂空桑孤竹同薦於宮懸不聞惉懘之聲長作中和之樂可使九域之人頓忘於肉味四夷之俗皆播於薰風與唐惟休終古盡善臣不勝懇款屏營之至謹昧死陳獻以聞其所造譜謹同封進臣某言臣聞無翼而飛者聲也無根而固者情也無方而富者生也聖恩以臣謹聲教固物情嚴為防禁以尊其生由是梯山航海歲來中國鎮安殊俗皆稟睿圖伏以承前雖有命使之名而無責成之實但拱手監臨大略而已素無簿書不恆其所自臣親承聖旨革剗前弊御府珍貢歸臣有司則郡國之外職臣所理敢回天造出臣匪躬近得海陽舊館前臨廣江大檻飛軒高明式敘崇其棟宇辨其名物陸海珍藏徇公忘私俾其戴天捧日見聖人一家之為貴窮祥極瑞知天子萬方之司存今年波斯古邏本國二舶順風而至亦云諸蕃君長遠慕望風寶舶薦臻倍於恆數臣奉宣皇化臨而存之除供進備物之外並任蕃商列肆而市交通夷夏富庶於人公私之閒一無所闕車徒相望城府洞開於是人人自為家給戶足而不知其然况北戶之孱顏南冥之睢盱國異俗泰而安宅生振忘歸而樂業百寶叢貨罔黷於人心㣥瑞效靈顧懷於天憲臣謬專任重啓處不遑供國之誠庶有恆制海門之外隱若敵國海門之內宣知變風後述職於此者但資忠履信守而勿失不刊之典貽厥將來聖恩以軍府交代之際委臣在鎮不獲捧圖陳薦拜舞天庭無任感戀慚惶之至彤京兆人德宗時官太常博士伏見駙馬都尉張茂宗猶在母喪聖恩念其亡母遺表所請許公主出降仍令茂宗借吉就婚者伏以夫婦之義人倫大端所以關睢冠詩之首者王化之先也天屬之親孝行為本所以齊斬居服之重者人道之厚也聖人以二端為訓人之本不可變也故制㛰禮曰納采問名納吉納徵皆主人几筵聽命於廟稱事立禮謂之嘉所以上承宗廟下繼後嗣也又制喪禮曰創巨者其日久痛甚者其愈遲三年之喪二十五月而畢稱情立文通謂之凶所以送死有已復生有節也然後夫義婦順父慈子孝馴致不失臻於太和歷代寶之以為致敬昔者魯侯改服晉襄墨縗事至重於奪情義亦許其權變又兵法鑿門而出以凶禮處之以情相因體或為類若茂宗釋縗服而衣冕裳去堊室而行親迎雖云輟哀借吉是亦以凶瀆嘉豈惟失先王之重典抑亦為國家之爽法儻茂宗留俟免喪則日月非遠今公主指期下嫁又儀注有嫌固不可廢重而就輕捨大而取小伏惟皇帝陛下體天撫運統人立法何常不守先王之至德聖哲之明謨下盡㣥言上留元鑒彞倫式敘懿範昭明所以八表肅清四夷歸化方宏禮義之日大敦名教之時於無為之朝有異議之事衆情未達疑懼交深伏願抑茂宗亡母之誠顧典章不易之義待其終制然後賜㛰收天情於至難察有司之懇守垂之史冊聖德彌光則天下幸甚臣謬備禮官懼於失職不勝致君愛禮之至臣等謹按禮經前代故事在廟無朔望祭食之儀於陵寢有朔望上食之禮國家自貞觀至開元修定禮令皆遵舊典天寶十一年閏三月初別令尚食朔望進食於太廟自太祖以下每室奠享其進奠之儀在臣禮司並無著令當時禮官王璵不本禮意妄推緣生之義請用宴私之饌此則可薦於寢宮而不可黷於太廟一時之制久未變更至今論禮者貶王璵之議伏請今月八日進止令宗正與太常計會辨集者伏以陛下虔奉宗廟齊心自中事歸有司各合盡敬然後詳議故實臣得竭誠謹按禮祭統云夫祭者非物自外至者也自中出生於心也心怵而奉之以禮由是牲牢有定制籩豆有常數罄天生地長之物極昆蟲草木之異苟可薦者莫不咸在先王以此饗宗廟交神明全孝敬也若王之食飲膳羞八珍百品可嗜之饌隨好所遷美脆旨甘皆為褻味此先王以此宴賓客接人情示慈惠也則知薦饗宴食於文已殊聖人別之以異為敬今若以熟食薦太廟恐違禮本又祭義曰祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故礿祠蒸嘗感時致饗此聖人俯就之中制也今陵寢每月二祭不為疏也太廟每歲五饗不為數也則人臣執事在疏數之閒得盡忠也若令牲牢俎豆之司更備膳羞盤盂之饌月朔月半將以為常環四時之中雜五饗之禮為數既甚黷亦隨之雖曰不然臣不信也夫聖主之制必師於古訓不敢以孝思之極而過於禮不敢以肴膳之多而褻於味伏願陛下遵開元萬代之則省天寶權宜之制陵寢之上得極珍羞宗廟之中請依正禮臣等忝司禮職敢罄愚衷子陵蜀人大歷十三年進士貞元十年舉賢良方正擢太常博士轉主客司門二員外郎十八年卒年五十九儒有學而未殖敏而多識庶幾立言無念進德當年以倦中道而息余雖不知請喻斷織伊昔孟子受學輟然如疲日忘其所志月忘其所知母也賢只教之勤斯拔銛刃以一割應鳴梭而中隳且自賢亦自滿泥鈞成器玉琢成瓚鄰於墓爾則有踴躍築埋之非近於鄽爾則有嬉游賈御之短是用居爾於學宮之舍納爾於經籍之館期子襟之青青致履道之坦坦胡為乎不勤以學惟事於散苟爾學之可停猶吾織之斯斷其貌既舒其言又徐投杼惘爾操刀介如絲之傷一緯飄其無緒帛之裂千經蕩其無餘前工後拙始密今疏牽梃為之中止杼軸猶其一虛且以絲喻人以織喻學若金受礪如木斯斫夫絲可以衆而不可以寡織可以勤而不可以舍一絲所纍以倍乎尋常一織所工而衣乎天下因茲細故以及大者彼婦道之信然况君子之事也故形於織女思其功移於學士念其終業暢於外美歸於中則以顧綃之理宏素王之風我友我生無落無廢學若山積心無蓬穢當求斷織之義若之何以自艾創物者必正其名以清命簟惟簟斯清雙入巧作連心織成始葱蘢而席卷終絢練而砥平本其初則王爾運心班匠寓目吳溪赤剛楚澤寒竹皓簳冰截素膚縞裂斷此枝閒略其溝節然後爾軼手匠妙意文理橫生波瀾洊至雕龍綺錯切玉鱗次淡冰泮而泉開分霜徑而雪墜信通才之云欲非吾人之所為於是時授炎暑天旋太陽山成爛石泉若探湯有美一人兮明時節求暑備兮珍簟長知薜荔之空靡意荃蘭之虛芳若乃買以兼金緣以純錦思因人之共敝庶君子之安寢出此入彼俱處芳蘭之室上據下承必兼芬若之枕况乃虛館方晝華堂且空高梧閟景密篠生風撤文茵與綺席虛翠幕及朱櫳惟珍簟之在御望美人之來同美人遲兮隔修路對珍簟兮日已暮矚筵幌之虛深臥層雲之空度帶餘霞而斂綺映片月而舒素昭列宿之清光披青天之薄霧於時輕箑屏用微綃罷服霜自凄冰壺增肅凉風忽至獲五福之康寧炎氣四除忘庶徵之時燠且物有小而喻大事有淺而用深道之將行我則開而當暑道之將廢我則卷而在陰是謂清簟之理願為君子之心智者創物以見意立成轆轤以為天下利木德標象金行效事與桔橰之用則同比筍簴之形不異井之勿幕瓶亦汔至當於要路之津存乎兼濟之地忠也陳力而就列孝也致養而不匱圓轉則智士之心通流乃仁者之志故轆轤之體一有君子之道四觀其得位攸處居中特立從繩以寸工假器以尺汲自上自下者念茲以有成虛往實來者釋此而何執利物不言利急人之所急舍之則其道可卷而懷用之則其功可俯而拾及夫挈瓶所施懸綆所統崇朝以聞乎三捷永日何啻乎七縱為萬人仰與天下共其靜也則無機之機其動也則有用之用德必不孤賢亦有準泉蒙者道為之廢井泄者心為之軫無忘乎牽攣蓋存乎汲引斯亦惠而不費乎賢人之業於是乎盡也珊瑚生矣於彼滄溟稟精於天地之氣擢秀於魚龍之庭含九泉之滋液冠百寶之神靈在涅不緇既同象玉之潔有枝無葉亦如見樹之形當其萌芽欲成根柢初結同堅冰之有漸類陰火之潛爇瓊枝碩茂鐵網森列貫纖目而玲瓏映重泉而昭晰海人於是方舟以進拭目而觀牽夫密網出彼清瀾潤奪白虹之氣光連赤玉之盤厥價伊何有逾於琥珀其色則爾取類於雞冠及夫漢帝思仙神君降質堂惟大小帳有甲乙植以珊瑚之樹綴以明珠之實何幽茂以凌秋獨青葱而照日亦有王家貴戚石氏財雄爭豪世上使氣胸中視珊瑚之若芥運如意以成風彼植之以為貴此碎之又何謂諒無補於經綸徒見稱於祥瑞今也聖人御天所寶惟賢斂雲物之容不書於策斫珠玉之脛而沈於泉車有龍首鸞衡不以珊瑚為柱馬有乘黃茲白不以珊瑚為鞭故雖古人之所貴獨吾君能舍旃皇帝垂衣裳而治萬國舞干戚而來九區包之橘柚至自江湖歲以為常知方物之咸有時而後獻表庭實之何無本其來則風秋洞庭霜落寰海元侯布教下吏旁採碧林冬生大小異名已去霜蒂初辭緑莖然後盛以瀟湘之竹束以江淮之菁背楚塞以西走望秦雲而北征上方端想元默深居穆清扇鴻鈞而不宰張大樂而無聲閲彼要荒之貢得斯華實之英乃明四目乃停九歌朱紱方來以彰其道泰碩果可食以表其時和時和在乎務本道泰在乎柔遠一果熟知百果之不荒一方來知萬方之未晚橘之名也則珍橘之熟也惟新越彼千里獻於一人丹其實體南方之正酸其味含木德之純足以附荔枝於末葉遺檳榔於後塵然以出自荒陬升聞莫由煙波無已歲月空流豈知夫湮沈可達職貢可修辭草澤以孤往入金門而見收物之因人也其則以衆人之象物也豈不或中儻草木之可儔希成名以入貢蘭為國香生彼幽荒貞正內積芬芳外揚和氣所資不擇地而長精英自得不因人而芳况乃崖斷坂折溪分石裂山有木而轉深徑無人而自絶柔條獨秀芳心潛結翡翠戲而相鮮蘼蕪生而共悅然後衆草之中迥為一叢卑以自牧和而不同揚翹布葉錯翠舒紅宵承皓露曉泛光風傾於陽希所照無隱託其地知其道有終且求之昔人徵以邃古宛成章於楚客爰命操於尼父佩之衆匪蘭不紉曲之多匪蘭奚鼓夫以薰蕕之喻臭味斯殊同之則十年猶有異之則一日而無乃清以為露滋而為畹比德者以之守貞贈離者以之傷遠宜其出幽谷之濱為階除之珍羅堂未晚被徑知春依瑤池而自庇與玉樹之為鄰杜若芳芷香辛白蘋俱受生於大塊獨取象於同人是故蘭也之采伊人所急篇章閒起比興俱入道之廢可鋤而去道之興可俯而拾為君灑微芳於素襟希見寶於重襲絃有五色而播蓋出乎舜宮方理之而登於壽域故制此而歌夫薰風黑與青閒青與赤通或以白而受采或以黃而居中本乎朱襄以至陶唐因加而自七至八以少乎惟宮與商事匪因於蠶餌或不由於蟹筐園客以登夫鈎軫墨子徒歎於蒼黃及其瓠巴所彈師文所學流連昭曠縹眇帛丿糸邈莫不因其靜好生此和樂張伯牙之號鐘含師曠之清角八音克諧兮自此五色相宣兮有以雖因聲以致用終假色而為美清音從內而發和氣由中而起奏激楚則引以紶風歌陽春則雜以流徵或向虛壑或臨積水影歷歷而分形聲泠泠而過耳直其躬而能屈鮮其色而受汙惡以紫而奪朱常恐新而代故大白若辱有以見至道之源小扣必鳴有以昭儒者之度召姑洗則草木潛發歌黃鐘而川池異沍泉魚瀺灂以躍鱗雲鶴婆娑而拂羽至如心有所感聲成於文既為事而為物亦有臣而有君哀而不慘樂而不分著萬物之情性和二氣之絪縕別有鳴琴在筵實篚無覩木繩則直色然後取儻同聲之不遙願聞乎亂之以武半夏生木槿榮時五月鵙始鳴楝葉結綵絲襭祭彼三閭蛟龍不竊祭之水曰汨羅祭之日曰端午情既本乎楚俗奉又告乎壽縷壽縷其娜色絲五紽色絲何始金閨之子畫嘉嚬於青蛾發宜笑之皓齒國風既哀其窈窕家事詎忘乎絲枲則有恩從天上飛入宮中二八春日十五玉童誰其尸之奉蘋藻於清廟何彼穠矣司衣裳於聖躬洎天子御絺之日后妃獻繭之時顏似渥丹對回鸞之十字手如振素盤續命之五絲其五絲也蕙緑輕重蘭紅淺深皎皎而有鶯其領采采而亦翠其襟既比方而一色又條暢乎數尋觀其髮齊萬計花柔四赩宛委虬盤張皇虹直植其鷺羽雜之而奪其鮮對彼鳳毛久之而寡其色別有金華別殿鈎弋靚粧褰開筐笥貢奉君王懿壽絲之禮大續寶命之天長衮冕紱珽縈壽絲以成錦游纓錫美比壽絲以無疆錯以五采準日以符節也綜以萬緒盈數以尊壽也龍爛蛇伸光氣騰騰以禦邪也瑞等乾坤拜啓獻也汪濊霑止其兵辟也不待萬歲蟾蜍其理疾也豈藉單衣龍子四海銷夭札之癘百姓登仁壽之祉微臣敢問天寶之建元則曰甘露黃龍之年紀今儒者乃援子雖齊聖不先父食之語欲令已祧獻祖權居東嚮配天太祖屈居昭穆此不通之甚也凡在左氏不先食之言且以正僖公之逆祀儒者安知非夏后廟數未足之時而言禹不先鯀乎且漢之禘祫蓋不足徵魏晉以還太祖皆近是太祖之上皆有遷主歷代所疑或引閟宮之詩而永閟或因虞主之義而瘞園或緣遠廟為祧以築宮或言太祖實卑而虛位惟東晉蔡謨憑左氏不先食以為說欲令征西東嚮均之數者此最不安且蔡謨此議非晉所行前有司不本謨改築之言取征西東嚮之一句為萬代法此不可甚也臣又思之永閟瘞園則臣子之心有所不安權居正位則太祖之尊無時而定則別築一室義差可安且興聖之於獻祖乃曾祖也昭穆有序饗祀以時伏請奉獻懿二祖遷祔於德明興聖廟此其大順也或以祫者合也今二祖別廟是分食也何合之為臣以為德明興聖二廟每禘祫之年亦皆饗薦是亦分食奚疑於二祖乎
