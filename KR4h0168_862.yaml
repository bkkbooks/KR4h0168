  text: 全唐文欽定全唐文卷八百六十二魯五代時人
  hash: sha256:21fcb0f26bacd7e4bb0c6a8da0426d8396eff8415c4c3c55346b63133b6d3254
  markers:
  - {type: head, offset: 14, content: 邊魯, id: KR4h0168_NFKB_862-h1, level: 1}
body:
  text: 維丙戌之歲仲商之月又十六日嗚呼我先伯父長官遘疾傾殂於故里以闕月十四日攢塗於正寢欲詢踰月之制得以送終繼逢逐鹿之秋未遑安厝綿聯歲序可得而知粵有朝議郎試大理評事前行鄚州鄚縣令兼侍御史賜緋魚袋慎奇光祿大夫守刑部尚書行御史中丞上柱國陳留縣開國伯食邑一千五百戶歸讜即長官之弟闕一字姪也念深同氣痛切嚴書因感義於鶺鴒遂撫心於霜露特齎餘俸卜葬先靈乃謂諸姪孫曰方今海宇寧謐三農告隙俾營遠日之禮貴就叶龜之吉若非刊勒莫紀聲容其所志銘汝當論撰罔遺其善弗虛其美魯仰奉明誨難愧匪詞追往質今對揚實録謹敘長官姓邊諱敏字德成其先陳留人也本支百世代不乏賢或魚符而列職或墨綬以聯芳王父諱行存順州司馬神情磊落間氣深沉抱王褱偉之奇才蘊中和之至德妥鍾厥後實曰俊明烈考諱承遇任邱令孝治承家溫恭秉性蒞事每勤於夙夜臨民恆示於愛威而教彼子孫備有趨庭之訓敬其祖禰必勤薦享之儀先妣太夫人太原郡王氏天資益秀婦道彌芳含茲淑善之風終啓繁昌之允恭惟長官英姿倜儻偉量恢宏辭才則賈馬無稱孝敬乃曾顏讓美當未登顯仕恆奉溫凊見喜色以問安露憂容而侍疾身能禮樂性存典墳爰從赴聘於招弓便可分榮於宰字擢為高陽縣令蒞政之後嘉聞允彰單父臨民綽有七絲之詠中牟作宰不無三異之稱及罷任之初未及踰載而除官路縣復起頌聲屏宣臥虎之威廳集巢鳩之美立言必雅莫常顯已所長用意絶私未可屈人之短大小之物罔不躬決聞望俱高位祿已重賦潘嶽閒居之詠起陶潛歸去之思固罷厥官卻訪田里豈謂景福未終昊天不祐碧落之孤雲易失風窗之短焰難停歷任三十年享壽五十八我伯母平昌郡孟氏亦以不登遐壽奄逝流光貞魂諒合於延年青骨同安於蒿里有子四人長日照故幽都府永清縣令松筠定操金玉溫身方傳襲慶之榮俄遘涉洹之夢次日隱前攝鄚州長史仁義兼資溫恭有譽守其祭祀不怠厥初次曰延徽以積慶韞光未趨顯仕而歿幼子商裔運州左都押衙以職居鄉外身列陪臣空深怙恃之思莫奉松楸之禮孫子六人讓能去非光乂霸孫嵐孫天留並謙沖立志詩禮飭身咸懷踵慶之風大有興宗之譽孫女三人義姐王師小姐或訖有絲蘿或年才齠齒克著雍容之德允守貞順之規於戲生而無過歿而有後者其為長闕二字幼闕五字不歌舂杵不鳴歸墟也闕一字連車乃鄧梁之闕一字贈弔有闕一字則金張之絲以庚申年十一月草四日安神於任邱縣長邱鄉孝慈里靖隧先墳之次禮也靈輀駕野丹旐懸空爰開烏兆之塋實掩賢英之墓恭承日照嚴旨謹作銘云博哉貴胄踵慶於門山河其度金玉其身蘊十善道為百里君立功於國流愛於民豈期遘禍一旦歸魂委宅幽壤慮謝音塵爰刊貞琬紀録其勤日往月來兮良銘此地付子孫兮傳揚兮萬春錫五代時人四海之廣萬幾之衆雖堯舜不能獨治必擇人而任之今陛下以一身親之天下不謂陛下聰明睿智足以兼百官之任皆言陛下偏迫疑忌舉不信㣥臣耳不若選能知人公正者以為宰相能愛民聽訟者以為守令能豐財足用者使掌金穀能原情守法者使掌刑獄陛下但垂拱明堂視其功過而賞罰之天下何憂不治何必降君尊而代臣職屈貴位而親賤事無乃失為政之本乎益汾州平遙人唐光化中隸李克用麾下天成中纍授費州刺史應順初加西面行營都巡檢使晉初領光州防禦使改河陽三城節度充鄴都行營都虞候移鎮潞州天福四年遷武寧軍節度同平章事五年徙鎮泰州充西面都部署遷河中尹護國軍節度契丹入汴授鳳翔節度漢祖即位加兼侍中乾祐中授開封尹兼中書令封魯國公周廣順初封楚國公改太子太師又改封齊國公顯德元年致仕入宋乾德三年卒伏自收復汜水關日以逆賊張從賓於莊宗舊蓋亭子上與官軍鬬敵臣以為莊宗歷數雖謝精爽猶存願靜妖氛特立祠廟果應虔禱尋獲關防臣欲排此瓦木往就修營臣頃歲曾為偏將往伐叛逆有願如范延光歸降兵無血刃即於招討使楊光遠中軍寨建一佛剎自後延光果能歸款克契發心光遠尋施錢三百貫文與臣共力營葺今修成天王院一所乞賜名額儀字可象薊州漁陽人晉天福中舉進士漢初召為左補闕禮部員外郎周廣順中纍遷儀部侍郎拜端明殿學士判河南府兼知西京留守事恭帝即位遷兵部侍郎入宋乾德四年卒伏以朝廷設科比來取藝州府貢士祇合薦能爰因近年頗隳舊制其舉子之弊也多是才謀習業便切干名周儀未詳赴三禮之舉公穀不究應三傳之科經學則偏試帖由進士則鮮通經義取解之處譸張妄說於辛勤到京之時奔競惟求於薦託其舉送之弊也多是明知荒淺具委凶粗新差考試之官利其情禮之物雖所取無幾實啓幸非輕凡對問題任從同議謾鑿通而鑿否了無去以無留惟徇人情僅同兒戲致令至時就試不下三千每歲登科罕踰一百假使無添而漸放約須畢世而方周乃知難其舉則至公而有益於人易其來則小惠而無實於事有益者知濫進不得必致精勤無實者欲多放無能虛令來往且明經所業包在諸科近間應者漸多其研精者益少又今之童子比號神童既幼稚之年禀神異之性語言辨慧精采英奇出於自然有則可舉竊聞近日實異於斯抑嬉戲之心教念誦之語斷其日月委以師資限隔而游思不容仆抶而痛楚多及孩童之意本未有知父母之情恐或不忍而復省試之際歲數難知或念誦分明則年貌稍過或年貌適中則念誦未精及有司之去留多家人之訴訟伏況晉朝之日罷此三科年代非遙敕又見在今宜釐革別俾進修臣謬以非才獲承此任本重難而為最復遺闕以相仍虔奉敕文重令條奏或從長而仍舊亦因弊以改為上副聖情廣遵公道除依舊格敕施行外其明經童子請卻依晉天福五年敕停罷任改就別科赴舉其進士請今後省卷限納五卷已上於中須有詩賦論各一卷餘外雜文歌篇並許同納祇不得有神道碑志文之類其帖經對義並須實考通三已上為合格將來卻復晝試候考試終場其不及第人以文藝優劣定為五等取文字乖舛詞理紕繆最甚者為第五等殿五舉其次者為第四等殿三舉以次稍優者為第三第二第一等並許次年赴舉三禮請今後解試省試第一場禮記第二場周禮第三場儀禮三傳第一場左氏第二場公羊第三場穀梁並終而復始學究請今後周易尚書併為一科每經對墨義三十道仍問經考試毛詩依舊為一科對墨義六十道及第後請並咸為上選集諸科舉人所對策問或不應問曰詞理乖錯者並當駮落其諸科舉人請第一場十否者殿五舉第二場三場十否者殿三舉其三場內有九否者並殿一舉其進士及諸科所殿舉數並於所試卷子上朱書封送中書門下請行指揮及罪發解試官監官等其監官試官如受取解人情禮財物請今後並准枉法贓論又進士以德行為基文章為業苟容欺詐何稱科名近年場中多有詐僞託他人之述作竊自已之聲光用此面欺將為身計宜加條約以誡輕浮今後如有倩人述作文字應舉者許人告言送本處色役永不得仕進又切覽唐書見穆宗朝禮部侍郎王起奏所試貢舉人試訖申送中書候覆訖下當司然後大字放榜是時從之臣欲請將來考試及第進士先具姓名雜文申送中書奏覆訖下當司與諸科一齊放榜光範字子儀并州陽曲人後唐天成二年起家榆次令召為殿中丞長興四年改太常丞晉天福中纍遷光祿少卿少帝即位拜右諫議大夫改給事中開運元年權知鄭州二年入為樞密直學士拜尚書禮部侍郎知制誥充翰林學士漢初改檢校刑部尚書衛尉卿周廣順初出知陳州遷祕書監召拜御史中丞復為禮部侍郎世宗即位改刑部侍郎遷戶部入宋開寶四年卒臣聞太宗有言曰朕居深宮之中視聽不能及遠所委者惟都督刺史則知此官實繫治亂本須得人臣竊見今之刺史或因緣世祿或貢奉家財或微立軍功或但詢官序實恐撫民寡術抑貪吏以無方以此牧民而望民安未可得也特乞除此舊訛委其能吏將袪民病永召時和玭澶州人晉天福中補集賢小史纍遷秦成階等州觀察判官後以城降周顯德初授郢州刺史歷汝密澤三州刺史入宋纍官左監門衛大將軍太平興國三年卒處士諱高字崇景其先北海郡人枝派清蕩不可殫言上因官從職遷為越州諸暨靈泉之里人也曾皇父諱朝皇父諱霞皇考諱防清崇道德風月怡情皆沒跡雲端世推之上也處士才鋒韞鋭仁海凝波不重百辟之榮而嗜寸陰之道見一善而忘百非洞施恩而不念報滔滔為冠世媒階蕩蕩作後來梁櫓何期覆載興否三清晦明淑人君子胡不萬齡處士芳壽不惑之歲未升壯室之年有五以中和三年歲次癸卯秋九月甲子朔十九日壬午之辰天降深祟魂沉逝流遂奄終於後流私第嗣子三男二女孟曰崔婆仲曰口部口林皆當齔歲禮義未分扶柩啞嘔孰不傷憫痛哉季子董婆襁負懷抱倚廬之門運業何因終天之苦長女娉受周氏禮未及歸幼女齒未及笄遽遭酷罰夫人清河張氏孀情慘裂涕泗交凝笄纚無光蓬鬢髽首泣青萍之去跡哭緑綺之斷絃夫人遂抑哀整容咸告兒女曰禮難可踰吉擇日月善卜名原以年冬十月甲午朔草七日庚申將窆於石解皇父之塋右壬首之墳原禮也虞以日居月諸山谷渝變哀告請銘玭宿契金石敢慙璅才掩涕握管而為銘曰蕣之華蜉之游石之火水之漚四之質難久留尊道德洞仁義望長材成大器孰知天興禍至醴泉竭德星墜女未歸男尚稚孀妻房冷秋水覩遺蹤逗雙淚宿何緣無終始泣告余請銘志昉字明遠深州饒陽人漢乾祐中進士歷集賢殿修撰周顯德二年擢主客員外郎知制誥集賢殿直學士四年加史館修撰遷屯田郎中翰林學士入宋纍官中書侍郎平章事至道二年卒降婁魯之分濟河惟亠兊州大野既荒西狩獲麟之地崇山作鎮東溟見日之峯郡國已來土賦稱大舊制非便必惟具新蓋民衆吏少則奸易生治稱任平則時克乂皇朝建濟州於巨野縣猶魏室分厭次為樂陵郡耶我太祖聖神恭肅文武孝皇帝發天機張地紀皇建丕祚帝於萬邦不枉政以厚民生不克寸法以重民命以為分是理頒是條施之一方而用寧通之四海而不泥者其惟良二千石乎故所選牧守咸用賢能得人者昌於斯為盛今皇帝嗣守洪業光揚聖謨率勤儉為天下先惟幾微成天下務所謂皇王綱統之道明矣邦國紀律之務成矣而研核精鍊日不暇給以戒弛墮之患所謂視聽聰明之德充矣內外上下之情通矣而啓迪開納國無留事以防壅塞之弊凡軍國機要刑政樞務事無巨細必詳於聽覽凡公侯卿士牧伯長史任無重輕必考其才器是以設爵愈重分職愈精人人自謂我民康家家自謂我土樂粵嗣位元年冬十月詔以前趙州刺史任公檢校太保牧於濟濟新造之郡也麟州之名其廢已久歲月差遠土風寖醨民忘其歸或肆為梗重以控地既大苞荒用遐山幽藪深亡命攸萃灌莽悉伏戎之地萑蒲為聚盜之資妖以人興嘯召或成於風雨法由貪弊羈縻遂至於逋逃良田有蟊實害嘉穀惟夫年號豐稔時無札瘥滯穗餘糧棲偃於千畝京倉坻庾阜衍於九年猶或脅遊惰之夫釋耒耜之用鉤鋤弦木竊弄於鄉閭之間矧饑沴之歲乎至乃野無戰血天藏殺機鞏甲雕戈戢鋒鋩於武庫庸租井賦緩征督於鄉胥尚或誘輕生之民聚無賴之族巢梟穴狡竊發於海溟之中矧兵革之際乎民既病而疇思其治醫雖良而藥或未工蓋用有所長才難求備文吏束名教之檢則必曰導之以德盜用侮而益暴法家持剛猛之折則必曰齊之以刑盜用駭而彌逸自非文武兼資之用英雄斷制之才蒞是任而居是邦者厥惟艱哉公天授將才生知理本以戰則勝元機出應變之先以化則孚心術同希微之表抗一旅而戾止撫萬室以瞻言以為川壅汚潢利源派而當宜濬畝田荒藨蓘樹嘉苗而必極芟夷於是令以先庚申之後甲介馬負先馳之勇陰門提夜出之兵獵叢社以平妖盡誅其類狩平林而得㺄悉伏其辜狂童震驚四野竦駭狼心盡革民患皆除乃峻以隄防敜其窞穽決獄盡疏其留滯窮源用滌其瑕疵分命鄉民設其警候伏乙夜以搜慝扼衝途而伺奸盜跡之來若罹罿畢申命降寇招其叛徒恩信著用以結其心攝伏羈留以杜其變盜意之改若愈膏肓非夫術以變通奸由惠照太阿所擊刜洪鐘而不留玉弩載張應靈機而自發其孰能如此耶甚矣哉除盜之難其來有素中古澆漓之後㣥心變詐之興縱燎夷荒或敗蕭蘭之秀尋柯伐蠧因傷梓之材唯賢者之用心則是非而無混故公嫉盜之意切而誅盜之令嚴去盜之術行而屏盜之譽顯夫盜既去矣民將息矣然後緩之以約束寬之以法令養之以惠愛勸之以禮讓化之無或戾信之無或欺則龔黃之風彼亦奚尚是以黃髮鮐背之叟農工商賈之類含哺而嬉媒舞且詠以為康莊播頌雖昭盛德之容琬炎裁碑宜耀披文之質郡將官吏唱言僉同乃詣闕上陳願塞㣥望帝用嘉許綸言式敷詔左拾遺李昉俾文其事以述濟民之請微臣不才孤奉明旨揣闔祕思懼遺休聲稱實課虛斯謂無愧而太史氏紀功臣之績云公名漢權蜀國人也以武略事纍朝以戰功登貴仕亟握兵要連分使符初牧於丹有排亂折衝之積移治於趙有安邊鎮靜之功所至皆有能名而濟之人獨能宣其事業以示不朽亦可謂賢矣系曰事有該於謠俗傳於耆舊者千載之下尚為美談矧文以銘而勒之於石乎他日知使君之政者其將質於此故其詞云道失其要淫刑而暴人心用違良民為盜令嚴而申政肅而淳人心用依盜為良民民即盜也盜亦民也善惡之化實由乎人猗歟使君克善其治始以嚴誅去其奸宄申以約束靜其鄉里里無惰農鄉無狡童曾未逾月澄清四封相彼林矣豈無豺虎暴心不生與麟為伍循彼陔兮亦有荊棘惡蔓既除與蘭同色使君之賢如山如淵濟民之頌聲聞於天刻石播美垂千萬年
