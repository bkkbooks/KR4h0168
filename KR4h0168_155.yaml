front:
  text: 全唐文欽定全唐文卷一百五十五上官儀二
  hash: sha256:fa4b8e017d8d5059d8d6a53bf967f31fc6c323e89797aae2fe65590a4be7f5cf
body:
  text: 臣某等言臣聞乾元惟大播四序而無言坤儀蓋厚寧萬象而復一至於號均三大體覆載以曲成聖表千齡順剛柔以藏用是以可久可大永固皇王之緒貞觀貞明獨照陶鈞之上故可登封泰嶽類帝以尊天降禪肅然禋宗以厚地伏惟陛下膺圖紹籙儀天纂鏡受昭華而光寶位正璣衡而握金符銷伏鼇而綴上蒼剪應龍而清下瀆於是靈臺偃伯暢轂埋輪刑政肅清削秋荼之繁蕪雅頌先烈激圓海之漪瀾就月幽覃則燭龍開景薰風遠暢則蟠木增華沒羽浮金之章昭載筆於仙室韋韝卉袵之首襲長纓於蘭錡九疇式序七德攸宣發神化之丹青敷禮義之粉澤既而睿德潛通至誠冥召禎圖載啓神物發揮雙觡呈班馴擾於君囿九芝獻彩燭耀於帝池太史標祥鏡流千里卿雲表貺凝華五色江茅鄗黍歲時鱗萃東鰈西鶼日月波屬鴻符巨慶疇可詳言誠乃岱郊佇遂云坰望蹕臣某等誠惶誠恐死罪死罪永言遐載緬鏡前徽王迹之所葳蕤帝圖之所凝遠龍官結繩之后鳥紀垂衣之君治定功成俱備升中之禮塵清海晏咸申謁欵之誠異世同符千載一揆諒以增高益厚式酬靈眷陛下德光宙始文煥震初席蘿而因萬物典襄而濟下元鎔範生靈張四維於地絡締構函夏建八柱於神樞宏規絶迹功無與二駕三五而遙集超八九而騰驤加以璇歷啓徵躔南至於朔旦金鼓問罪削左袵於交河固可恭柴燎之展采穆靈壇之禋敬焉得徇小節於沖挹忘至公之鴻典絶三神之歡拒萬方之志雖復翹心天路未留三舍之感延佇帝閣逾邈九霄之望伏惟陛下紆瑤池之渺轡屈姑射之凝神酌令典於中樽遵時邁於嬴里採公卿之嘉議覽搢紳之讜辭逸記重甄頺章再紐詔雨師以先路命風伯以清塵六飛案軌九族齊列榮光承幰非煙翼衡輯瑞而嘉肆覲瘞玉而恭儲祉方使日觀增華仙閣改飾神光霄映若流照於舂陵雲色晝開似凝暉於豐谷表咸池於翠萬歲叶其殷薦席藳秸於紫壇八神歆其明祀籠千古之偉觀孕七百之丕業臣等命與時偕濯景昌運優遊渠閣之內怊悵南風之弦棲息蓬山之阿弋釣先皇之道至於朝猷國紀頗踐奧隅陛下推而不居竊所未喻鬱云梁之典缺懷庭之儀沮神主之欲漏貪天之議伏願杲其日出照其傾陽之心油然作雲降其離畢之澤庶使飛英騰茂祕玉檢而遐傳手舞足蹈扈翠華於喬嶽臣元嘉等言臣聞太陽含字天之命也德水呈文地之符也是知光膺寶籙非幽贊無以享鴻名對越兩儀非神物何以昌丕緒故有元龜負卦繇表軒功朱鳥銜書兆彰姬籙非聖人之撫運孰能與於此乎伏惟皇帝陛下慶韞上元與天皇而合德祥凝太始體耀魄以齊明作周錫允王業本於冰翼生商降祉寶祚基於玉筐然後樞電效神皇虹授彩彤雲淡景標映龍顏瑞火流光呈發鳥迹由是凝圖作極握紀中天化洽九垓恩綿八表功成戢武散騑服於桃園業定宏文覃正朔於昌海輯五玉而彰禮備陳萬舞而表樂成至德至仁垂拱巖廊之上乃聖乃神遠算廟堂之下憲文王而授立招天奬於夢齡象漢帝以登賢選仁明於副二國重曜而臨照家萬宇而永貞是以淹歲亢陽離耀升而元澤降春疇罕闕震方建而年稼登受册之辰隨輕輪而翊佳氣夏弦之月接飛蓋而吐芝英郡國陳孝德之符煙浮霧集縣道奏明靈之貺電擊雷奔豈與夫日至月書可同年而語矣伏見涼州都督李襲譽表奏昌松瑞石合百一十字文曰高皇海出多子李久王八千年太平天子李世民王千年太子李治書燕山人樂大國主尚注諤奬文仁邁千古大王五王六王七王十王鳳尾才子七佛八菩薩及上果佛田天子文武貞觀昌大聖延四方上下萬治忠孝為善其文不次者略而不載敕遣禮部郎中柳逞馳驛檢覆並同所奏皆素文玉潔若瓊樹之華滋元質碧鮮擬翠微之遠色雖復霞熛冠嶽暉鏤采於介邱海鏡浮山昭列名於稽方茲秀麗曾何足云臣等歷選皇猷稽河圖於東序詳觀帝籙披册府於西崑媧燧以前不可得而知矣羲農以降考載籍而言焉若乃馬遰堯壇鳳銜虞册驎遊吐字頗涉劉邦葉蠧為文才稱病巳元石降徵於典午赤伏錫命於炎精皆髣佛如神徵文見意或傍通以取證或索隱以求端猶且動色當年光華曩志矧茲天册顯發靈瑞頌聖德之欽明通史筆之揚堯典述國祚之悠永倍龜策之卜周年追美先朝衍軒邱之德姓式昭儲后邁鈞臺之有光豈非天鑒孔明聖猶大者祥彌著靈心至察德加厚者祚逾長是用越契超繩光前振古績無與二慶溢登千臣等自省微生幸霑鴻造荷重光之煦育覩三才之宅心雀躍無以表其誠鳧趨不足勝其喜臣無任悅豫之至臣某言伏以塗宮方撤祖載有期蹐厚地而靡容局高穹而標絶臣昔逢開運委質藩朝荏苒迄茲年將一紀位非德漸榮以恩滋顧視涯分何階致此而今谷林啓隧宸衛將移袵席遺簪纏哀罔極方願整素翿而攀慕奉劒舄而崩號送往以窮事居方永時希宸鑒曲遂荒襟伏紙失圖罔知攸措臣某言臣輕生多幸早逢昌運締構之初得效駑蹇誠款雖竭功績靡伸沐浴恩光謬叨榮級歷居近要出納隆顯顧循庸菲踰溢涯分思展塵露以酬洪造鏤骨銘肌無忘夙夜但犬馬之齒甲子巳多風雨之疾惛眊日甚雖年非致仕而力不當官簿領沈迷端緒紕繆久尸厚祿靦懼在躬內省愆尤外慙物議乞解見職退就衡門朽質餘生獲從藥療冀蒙渥澤未歸泉壤難預朝請瞻望闕庭葵藿微心方希臨照不任悃款之至伏願天慈特垂矜許輕塵聽覽愈增震越臣某言竊以日月迅驅歎留侯之過隙桑榆易晏嗟趙孟之愒陰是以杖國之儀曩籍之通訓夜行之誡先達之明範臣三河素品一藝罕稱斂袵衡泌之間優遊農仕之際特以雲雷肇構龍德在田遂得混吹齊庭薄遊梁苑昧昔賢之先覺慶生涯之嘉會屬大橫固祉奬澤荐臻同菅蒯之靡遺喻袵席而無改叨竊非據綿歷歲時智能之效寂寥何紀伐檀以茲興刺濡翼由是致譏况乎時迫耄期識用衰耗仲宣體弱遽與年並修齡疾甚亦隨衰及范緌在飾深驚蒲柳之秋葆鬢承冠逾慙仁壽之鏡空貽謗毀坐紊官曹虛受之來履薄未均危懼知止之分餘生實所庶幾披瀝丹愚諒非矯飾伏願大明委照曲遂今請退影間屝待終初服倘弊帷未掩岱宗少駐擊壤歌其自逸高枕歡其有餘望瑤池之還駕候仙閭之歸躅臣筮仕聖朝位非才授曾微涓滴少答鴻私敢請骸骨心顏靦怍微臣限茲外任不獲拜奉闕庭犬馬之戀徘徊何巳臣某言臣聞高年致政前徽之彞準仲秋授杖綿載之通規正以制逮乎桑榆愒陰於鍾漏臣顧惟菲陋輪轅無所瞻言賓實高謝等夷筮仕之初不期通顯干祿所望抑在代耕初以生涯多幸屬奉昌數仁被草木德洎昆蚑奬飾曲流豐恩傍洽言揚德舉內視缺然比彥參賢載離滋永至於姬駿長驅奉元池之廣晏姒龍遙騖陪樂野之宣遊塵露罕稱榮異空甚捫躬靦怍罔歷心顏既而二膳在辰懸輿甫及光華云旦聖造方深蒲柳行秋朽材知止勝西羌而側勇惟東都而自牧伏請褫帶彤門歸骸故里挹清風於國讓追盛範於陽元效釣璜於渭濱類飛星於河渚是知疲驂解馭辭金根而不歸袵席帷幄去青蒲而方遠望軒屏而徘徊仰煙霄而鯁戀無任感愧之至臣某言臣一介薄才不周時務命隨事偶超竊宦途歷職文武榮兼內外年餘三紀受恩兩朝循涯省分實優常品自違丹陛寒暑亟移限以大藩久絶朝覲頃以年頽疹迫風眩日增懷闕庭而載佇仰雲霄而聳望陛下昔居春禁臣預應朝集披膽祈恩特蒙鑒許尋奉明詔入衛鉤陳惠澤曲流其來自遠誓生沈族未識所酬今以衰疾之年久違趨拜望充計吏一奉宸闈頃者希天聽卑期照心靈振蕩冰谷非危干黷旒纊伏知待罪謹言臣某言臣聞漢朝中葉陳農求訪於圖書魏歷初基袁渙請收於篇籍遂使容臺增飾册府載輝雅道照於前古風流被於末裔伏惟陛下睿德緯天神功光表截海班朔益地延圖垂衣視典探㣥玉之幽賾虛巳緣情動兼金之歌詠由是藝香祕室青具陳璧水上庠漆書咸集臣大父隋荊州刺史元操筮仕登朝官成三代學綜書部思洽詞源雖歲序寂寥微塵無弭河東薛道衡人推才傑范陽盧思道時號文宗並叶契相忘齊聲比價競炫梁車之寶爭摛鄴騎之珍而二家文集久蒙宸照獨於臣門未汙天燭貽厥之訓在臣宜守獻書之典有國通規今繕寫巳訖合若干卷謹詣闕奉進問棘津登輔不因階於尺木莘郊作相豈憑資於纍遷蓋道有攸存時無可廢爰暨澆訛必修班序先容乃器因地拔萃共相沿襲遂成標準今聖上務切懸旌心搖啓繇雖衣冠華裔巳喬遷於周列而衡泌幽人罕遙集於魏鼎豈英靈不孕於山澤將物理自係於古今無蔽爾辭切陳其致對鳳德方亨必資英輔龍光未聘實俟明君既藏器以須時亦虛襟而待物莫不理符靈應道叶冥通類霜降而鐘鳴同雲蒸而礎潤祕策赴之如投水神心應之若轉規用能感會一時抑揚千古是以沈鱗暫躍遂遊泳於天漢墜羽才遷乃騰驤於日陸宏心體之妙旨播舟水之嘉謨義列丹青德融金璧逮乎時鍾季叔化漸澆訛拔萃之惠罕流因地之階愈篤使西都金子奕葉稱榮東國袁生八公為貴廷尉之明窮識理十載無知黃門之妙極摛文八遷寧進徒使干星秀氣永翳窮塵照廡奇光長湮幽石自可循風市馬襲軌畫龍三反不虧七年無廢戔戔束帛指邱園而畢陳翹翹車乘望林泉而載轄則材摽海若霧集丹墀德表星精雲飛紫闕豈直高尚之士遙集於台司衡泌之儔喬遷於鼎識謹對問獄市之寄自昔為難寬猛之宜當今不易緩則物情恣其詐急則姦人無所容曹相國所以殷勤路廷尉於焉太息韋弦折衷歷代未聞輕重淺深佇承嘉議對攘袂九流披懷萬古覽七書之奧義覿金之遺文覩皇王臨御之迹詳政術樞機之旨莫不則乾綱而張禮樂法霆震而置威刑縱使軒去鼎湖非無鹿之戮舜辭雷澤遂有崇山之誅自皋繇不嗣忿生長往甫侯設法徒有説於輕重子産鑄書竟無救於衰敗是知風淳俗厚草艾而可懲主僻時昏黥鑿而猶犯我君出震繼天承國宰化孕十堯而遐舉吞九舜而上征猶以為周書三典既疏遠而難從漢律九章巳偏雜而無準方當採韋弦於往古施折衷於當今若能詔彼刑章定金科之取捨徵其張趙平丹書之去留必使楚國受金不為莊生所責長陵盜土必用張子之言謹對周字賓王博州茌平人武德中補州助教太宗朝纍官至中書侍郎兼太子右庶子遷中書令以本官攝吏部尚書貞觀二十二年卒年四十八贈幽州都督高宗立追贈右僕射高唐縣公微臣每讀經史見前賢忠孝之事臣雖小人竊希大道未嘗不廢卷長想思履其迹臣以不天早失父母犬馬之養巳無所施顧來事之可為者唯忠義而巳是以徒步二千里而自歸於陛下陛下不以臣愚瞽過垂齒録竊自顧瞻無階答謝輒以微軀丹款惟陛下所擇臣伏見大安宮在宮城之西其牆宇門闕之制方之紫極尚為卑小臣伏以東宮皇太子之宅猶處城中大安乃至尊所居反在城外雖太上皇遊心道素志在清儉陛下重違慈旨愛惜人力而蕃夷朝見及四方觀聽有不足者臣願營築雉堞修起門觀務從高顯以稱萬國之望則大孝昭乎天下矣臣又伏見明敕以二月二日幸九成宮臣竊惟太上皇春秋巳高陛下宜朝夕視膳而晨昏起居今所幸宮去京三百餘里鑾輿動軔嚴蹕經旬日非可以旦暮至也儻太上皇情或思感而欲即見陛下者將何以赴之且車駕今行本為避暑然則太上皇尚留熱所而陛下自逐涼處溫凊之道臣竊未安然敕書既出業巳成就願示速反之期以開衆惑臣又見詔書令宗室功臣悉就蕃國貽厥子孫嗣守其政非有大故無或黜免臣竊惟陛下封植之者誠愛之重之欲其繼嗣承守而與國無疆也臣以為必如詔旨者陛下宜思所以安存之富貴之何必使代官也何則以堯舜之父猶有朱均之子儻在孩童嗣職萬一驕愚則兆庶被其殃而家國蒙其患正欲絶之也則子文之治猶在正欲存之也則欒黶之惡巳彰與其毒害於見存之百姓則寧使割恩於巳亡之一臣明矣然則向所謂愛之者乃適所以傷之也臣謂宜賦以茅土疇其戶邑必有才行隨器方授則雖其翰翮非強亦可以獲免尤纍昔漢光武不任功臣以吏事所以終全其代者良得其術也願陛下深思其宜使得奉大恩而子孫終其福祿也臣又聞聖人之化天下莫不以孝為本故曰孝莫大於嚴父嚴父莫大於配天又曰國之大事在祀與戎孔子亦云吾不與祭如不祭是聖人之重祭祀也如此伏惟陛下踐祚以來宗廟之享未曾親事伏緣聖情獨以鑾輿一出勞費必多所以忍其孝思以便百姓遂使一代之史不書皇帝入廟之事將何以貽厥孫謨垂則來葉臣知大孝誠不在俎豆之間然則聖人之訓人固有屈巳以從時特願聖恩顧省愚款臣又聞致化之道在於求賢審官為政之基必自揚清激濁故孔子曰惟名與器不可以假人是言慎舉之為重也臣伏見王長通白明達本自樂工輿皂雜類韋槃提斛斯正則更無他材獨解調馬縱使術踰儕輩能有可取止賜金帛以富其家豈宜列預士流超受高爵遂使朝會之位萬國來庭騶子倡人鳴玉曳組與夫朝賢君子比肩而立同坐而食臣竊恥之然成命既往縱不可追謂宜不使在朝班預於仕伍也臣歷觀前代自夏殷周及漢氏之有天下傳祚相繼多者八百餘年少者猶四五百年皆為積德纍業恩結於人心豈無僻王賴前哲以免爾自魏晉以還降及周隋多者不過五六十年少者才二三十年而亡良由創業之君不務廣恩化當時僅能自守後無遺德可思故傳嗣之主政教少衰一夫大呼而天下土崩矣今陛下雖以大功定天下而積德日淺固當思隆禹湯文武之道廣施德化使恩有餘地為子孫立萬代之基豈欲但令政教無失以持當年而已且自古明王聖主雖因人設教寬猛隨時而大要惟以節儉於身恩加於人二者是務故其下愛之如父母仰之如日月敬之如神明畏之如雷霆此其所以卜祚遐長而禍亂不作也今百姓承喪亂之後比於隋時才十分之一而供官徭役道路相繼兄去弟還首尾不絶遠者往來五六千里春秋冬夏略無休時陛下雖每有恩詔令其減省而有司作既不廢自然須人徒行文書役之如故臣每訪問四五年來百姓頗有嗟怨之言以為陛下不存養之昔唐堯茅茨土階夏禹惡衣菲食如此之事臣知不可復行於今漢文帝惜百金之費輟露臺之役集上書囊以為殿帷所幸慎夫人衣不曳地至景帝以錦繡纂組妨害女工特詔除之所以百姓安樂後至孝武帝雖窮奢極侈而承文景遺德故人心不動向使高祖之後即有武帝天下必不能全此於時代差近事迹可見今京師及益州諸處營造供奉器物並諸王妃公主服飾議者皆不以為儉臣聞昧旦丕顯後世猶怠作法於理其弊猶亂陛下少處人間知百姓辛若前代成敗目所親見尚猶如此而况皇太子生長深宮不更外事即萬歲之後固聖慮所當憂也臣竊尋往代以來成敗之事但有黎庶怨叛聚為盜賊其國無不即滅人主雖欲改悔未有重能安全者凡修政教當修之於可修之時若事變一起而後悔之則無益也故人主每見前代之亡則知其政教之所由喪而皆不知其身之有失是以殷紂笑夏桀之亡而幽厲亦笑殷紂之滅隋煬帝大業之初又笑齊魏之失國今之視煬帝亦猶煬帝之視齊魏也故京房謂漢元帝云臣恐後之視今亦猶今之視古此言不可不誡也往者貞觀之初率土荒儉一匹絹才得一斗米而天下帖然百姓知陛下甚憂憐之故人人自安曾無謗讟自五六年來頻歲豐稔一匹絹得粟十餘石而百姓皆以陛下不憂憐之咸有怨言又今所營為者頗多不急之務故也自古以來國之興亡不由積聚多少唯在百姓苦樂且以近事驗之隋家貯洛口倉而李密因之東都積布帛而王世充據之西京府庫亦為國家之用至今未盡向使洛口東都無粟帛則世充李密未必能聚大衆但貯積者固是有國之常事要當人有餘力而後收之若人勞而強斂之更以資寇積之無益也然儉以息人貞觀之初陛下巳躬為之故今行之不難也為之一日則天下知之式歌且舞矣若人既勞矣而用之不息倘中國被水旱之災邊方有風塵之警狂狡因之以竊發則有不可測之事非徒聖躬旰食晏寢而巳古語云動人以行不以言應天以實不以文以陛下之明誠欲勵精為政不煩遠采上古之術但及貞觀之初則天下幸甚昔賈誼謂漢文帝云可慟哭及長太息者言當韓信王楚彭越王梁英布王淮南之時使文帝即天子位必不能安又言賴諸王年少傅相制之長大之後必生禍亂歷代以來皆以誼言為是臣竊觀今諸將功臣陛下所與定天下者皆仰稟成規備鷹犬之用無威略振主如韓彭之徒難駕馭者而諸王年並幼少縱其長大當陛下之日必無他心然即萬代之後不可不慮自漢晉以來亂天下者何嘗不是諸王皆為樹置失宜不預為節制以至於滅亡人主豈不知其然但溺於私愛故使前車既覆而後車不改轍也今天下百姓極少諸王甚多寵遇之恩有過厚者臣之愚慮不唯慮其恃恩驕矜也昔魏武帝寵樹陳思王及文帝即位防守禁閉有同獄囚以先帝加恩太多故嗣主疑而畏之也此則武帝寵陳思適所以苦之也且帝子何患不富貴身食大國封戶不少好衣美食衣食之外更何所須而每年別加優賜曾無紀極俚語曰貧不學儉富不學奢言自然也今陛下以大聖創業豈惟處置見在子弟而巳當須制長久之法使萬世遵行之臣竊見流內九品巳上令有等第而自比年入多者不過中上未有得上下以上考者臣謂令設九等正考當今之官必不施之於異代也縱朝廷實無好人猶應於見任之內比較其尤善者以為上第豈容朝廷之士遂無堪上下之考者朝廷獨知貶一惡人可以懲惡不知褒一善人足以勸善臣謂宜每年選天下政術尤最者一二人為上上其次為上中次為中上其次為上下則中人以上可以自勸臣聞朝謁以朝思相見也講習以晝思相成也燕飲以昃思相歡也婚合以夜思相親也是以上下有威內外有規動息有時吉凶有儀先王之教不可黷也今陛下欲謀其始而亂其紀不可為也夫卜筮者所以定猶豫決嫌疑若黷禮慢經先王所不用也理天下者以人為本欲令百姓安樂惟在刺史縣令縣令既衆不可皆賢若每州得良刺史則合境蘇息天下刺史悉稱聖意則陛下可端拱巖廊之上百姓不慮不安自古郡守縣令皆妙選賢德欲有遷擢為將相必先試以臨人或從二千石入為丞相及司徒太尉者今朝廷獨重內官縣令刺史頗輕其選刺史多是武夫勳人或京官不稱職方始外出而折衝果毅之內身材強者先入為中郎將其次始補州任邊遠之處用人更輕其材堪宰草泣以德行見稱擢者十不能一所以百姓未安殆由於此
