front:
  text: 全唐文欽定全唐文卷八百七十宏冀南唐嗣主長子初封東平郡公徙王南昌嗣主襲位宏冀留守東都徙鎮潤州封燕王以討吳越功立為太子顯德六年薨初諡宣武改諡文獻
  hash: sha256:af396d9c2ec4148223af74c3e9df33065a5b5c5deb58cd0c2352df116df6bd3b
  markers:
  - {type: head, offset: 13, content: 李宏冀, id: KR4h0168_NFKB_870-h1, level: 1}
body:
  text: 蓋聞聲叶洪鈞功垂浩劫集善之利惟茲可嘉因發乃誠是為良願上所以祝君親富壽將日月以齊休下所以期官庶興居與山河而共泰由衷之念永永何窮知證徐溫第五子仕吳歷州刺史至節度使入南唐封江王改封魏王道之為用也天得之以清地得之以寧萬物得之以生侯王得之以為天下正豈唯鞭龍控鯉之遊出日入月之賞飱霞飲露之妙長生久視之術而已哉故聖人知淳朴散而仁義立智惠出而詐偽興或託質塵寰或易名巖谷斡運元化鼓扇真風為俗梯航作世陰步馬商山四老秦莫得而縶維桂嶺八公漢何由而屈折餘芳遺烈代不無之廬山董真君廟者即晉永嘉元年真君種杏之壇上升之地是也真君諱奉字君異閩中侯官縣人其仁也誘道明而活士燮其義也納屈女而儷胡君其功也醫貧病而散穀帛其德也通元造而垂旱雨則夤亮行狀敷暢名實備縡傳記此故略焉天寶元年制下俾所管載加葺修以時齋醮及罹兵火唯餘鎡基自是之後鄉黨取便遷建於石塘橋咸通九年江東牧苗公紳自石塘橋移入山口且星紀聯綿殿廡殘毀狸蹤狐徑殆不堪其憂豫撫江民之五稔也爰考圖經得杏壇舊址靠蓮花峯鎮詠真洞榛蕪雖沒林泉可嘉噫歷異代而興良緣損有餘而奉不足得非徯豫哉於是以故隴西郡君李氏粧奩餘物俾復靈蹤不日舊壇盡從新製造大殿三間堂廡門屋共一十六間并塑像銅鐘供養道具等以升元三年夏六月聞奏敕改為太一真人殿莫不簷楹鑠日金碧射人鴛一九冰角戢角戢而欲飛虹梁矯矯以疑動雨餘秋檻練拖九派以前驅雲斂寒空黛拂五峯而後殿猿鶴率舞林麓增輝足可以伸精懇於希夷拯香魂於冥寞克昭靈貺永奉殊休豫以再任宣城之二載也是時升元六祀歲在壬寅秋七月有六日應運匡國佐聖功臣寧國軍節度宣州營田觀察處置等使特進檢校太尉兼中書令使持節宣州諸軍事宣州刺史上柱國食邑一萬戶韓王知證記從謙南唐嗣主第九子歷封鄂國公宜春王進吉王出鎮江州及貶制度仍降鄂國公入宋改名從誧纍官武勝軍行軍司馬侯姓干氏諱秀字聳之渭人也曾大父仲森碧虛郎大父挺凌雲處士父太清方隱於幽間輒以卓立卿自名衣緑綬佩玉玦奏聞之就拜銀緑大夫秀始在胚胞已有祖父相生而操持面目凌然僉曰鳳雛而文虎鞹而斑斑秀之謂也不日間昂霄聳壑姿態猗猗遠勝其父久之材堅可用時秦王病暑席溫為下常侍不稱旨有言秀甚忠能碎身為王得之必如意王亟召使者駕追鋒車旁午於道既至引對王大悅詔柄臣金開剖喻秀以革故鼎新之義然後剖析其材刮削其粗編度令合又教其方直縝密於是風采德能一變有司奏上殿王宣旨云恨識卿之晚賜姓名為平瑩封夏清侯實食嶰谷三百戶瑩以賜姓名改字少覃自此槐殿虛敞玉窗邃深瑩專奉起居往往屏疏妃嬪以身藉瑩向之喘雷汗雨隱不復見如超熱海登廣寒宮王病良愈謂左右瑩每近吾則四體生風神志增爽雖古清卿清郎何以尚茲寵遇益隆偃曹侍郎羽果支頭使沈水養足功臣添憑皆出其下瑩暇日沐浴萬珠水醺酣百穗香辟穀安居咏籜兮之詩以自娛感子猷此君之稱嫌牧之大夫之謗回視作甲者勞於魏武為冠者小於漢高白虎殿之虛名童子寺之寡援未嘗不傷其類而長太息也不懈於位前後五年秋歸田園夏直軒閣功日大無何秦王有寒疾不可以風席溫再幸兼拜羅大周為斗圍監蒙厚中為邊幅將軍同司臥起瑩絶不占蹤迹卷而不舒潦倒塵埃中每火雲排空日色如焰則憶昔悲今淚數行下乃上表乞骸骨得請以便就第終王世不用子嗣節襲國有罪除其封人以凝秋叟呼之既不契風雲但以時見於士庶家亦得人之歡心後世尚循瑩業流落遍於四方惟西北地寒故轍迹所不至云文進字國用范陽人少事劉守光為騎將降後唐莊宗遙授壽州刺史後奔契丹為幽州兵馬留後明宗即位率所部來奔授滑州節度使移鎮鄧州纍加同平章事入為上將軍長興中復出鎮潞州清泰中改安州節度使晉祖入立率所部奔金陵李升命為宣州節度使卒於江南頃以新州團練使李存矩提衡郡邑掌握恩威虐黎庶則毒甚於豺狼聚賦斂則貪盈於溝壑人不堪命士各離心臣即拋父母之邦入朔漠之地幾年鴈塞徒向日以傾心一望家山每銷魂而斷目李少卿之河畔空有怨辭石季倫之樂中莫陳歸引近聞皇帝陛下皇天眷命清明在躬握紀乘乾鼎新革故始知大幸有路朝宗便貯歸心祇伺良會臣十月十日決計殺在城契丹取十一日離州押七八千車乘領十五萬生靈十四日已達幽州義方始名元達事南唐先主為侍御史先主倚以肅正邪慝取前朝王義方名以易之餌丹病瘖卒古之任御史者非止平獄訟肅班列也有怙威侮法棄忠賊義樹朋黨蔽聰明者得以糾彈至於人主好遊畋聲色説奢侈佞媚賞非功罰非罪得以爭論使諸侯不敢亂法百司不得盜權則御史為不失職今文武材行之士固不為乏而貪墨陵犯傷風教棄仁義者猶未革心臣欲奉陛下德音先舉忠孝潔廉請頒爵賞然後繩糾乖戾以正典刑小則上疏論刑大則對仗彈奏臣每痛國家之敗非獨人君不明蓋官卑者畏罪而不言位尊者持祿而不諫上下苟且至於淪亡今臣誠不忍忘君親之義有所不盡惟陛下幸赦之翊京兆人仕吳為武騎尉後見知於宋齊邱授府中從事南唐代吳擢虔州觀察判官西昌令維皇王之建國分中外於上京憑山河以作固閾夷狄而騰聲誠曰咽喉吞八荒而則大是稱巖險控萬國以來平周有掌貨之節禮無關門之征巨防宵扃倚洪波而作鎮重扉擊柝連太華而為城創中代之新號變函谷之舊名柱史老聃擁仙雲而西邁終軍童子建使節而東行文仲不仁廢六關而興誚王元有説封一丸而永清若用備不虞取諸繫象作邦畿之襟帶杜姦宄之來往長墉矗兮雲屯曾樓赫以霞敞登臨者有知其地雄踰越者無漏於天網亦有孟嘗奔走長宵未曙何白馬之不談學雞鳴而乃去逢尉臣之一失或愚者之千慮至如楚漢爭雄沛公先入旗鼓照耀兵戈翕習南面則三傑齊驅東井則五星俱集實靈命之所應亦人謀而是及王道廓而已清帝業巍乎乃立窮四塞之艱阻成百王之都邑故知建功定霸期乎此關武侯矜於固險婁敬説乎河山視前烈之軌躅覽陳迹而躋攀既登高而能賦希駟馬而言還鎔相州人先世有錫爵公乘者遂以為氏事南唐嗣主嘗奉命與伴送使陳植航海修好於契丹臣鎔自去年六月離罌油七月至鎮東關遣王朗奉表契丹九月乃有番官彞離畢部牛車百餘乘及鞍馬沿路置頓十月至東京留三日契丹主遣間廣既使王庭秀稱詔勞問兼述泰寧王燕王九月同行大事兀欲即世母妻併命又遼東以西水潦壞道數百里車馬不通今年方至幽州館於愍忠寺先迎御容入宮言先欲見唐皇帝面乃引見如舊儀問國書中機事臣即述奕世歡好當謀分裂之事契丹主喜問復有事否臣曰軍機別有密書契丹主接至褎間乃云吾與唐皇帝一如先朝往來因置酒合樂又諭臣曰使人泛巨海而至不自意變起骨肉道路有聞亦憂恐手斟一玉鍾酒先自啜乃以勸臣令飲釂自旦至日餔始罷自時數遣使宣勞三日一賜食謹遣王朗賫骰號子歸聞奏文蔚字君章建安人後唐長興中舉進士為河南府館驛巡官坐秦王重榮事奪官奔吳為宣州觀察巡官歷比部員外郎知制誥南唐代吳改主客郎中拜中書舍人嗣主襲位纍遷御史中丞以請誅馮延已魏岑貶江州司戶參軍召還為翰林學士保大十年卒年五十二諡曰簡賞罰者帝王所重賞以進君子不自私恩罰以退小人不自私怒陛下踐阼以來所信重者馮延已延魯魏岑陳覺四人皆擢自下僚驟升高位未嘗進一賢臣成國家之美陰狡圖權引用㣥小陛下初臨大政常夢錫居封駮之職正言讜論首罹譴逐棄忠拒諫此其始也姦臣得計欲擅威權於是有保大二年正月八日敕公卿庶僚不得進見履霜堅冰言者恟恟再降御札方釋㣥疑御史張緯論事忤傷權要其貶官敕曰罔思職分傍有奏論御史奏彈尚為越職况非御史孰敢正言嚴續國之戚里備位大臣不附姦險尚遭排斥張義方上疏僅免嚴刑自是守正者得罪朋邪者信用上之視聽惟在數人雖日接㣥臣終成孤立陛下深思遠慮始信終疑復常夢錫宥密擢蕭儼侍從授張緯赤令㣥小疑懼與酷吏司馬正彞同惡相濟迫脅忠臣高越之於盧氏義兼親故受其寄託痛其侵陵訴於君父乃敢蔽陛下聰明枉法竄逐㣥凶勢力可以回天在外者握兵居中者當國師克在和而三凶邀利迭為前卻天生五材國之利器一旦為小人忿爭妄動之具使精鋭者奔北饋運者死亡穀帛戈甲委而資寇取弱鄰邦貽譏海內同列之中有敢議論則馮魏毀之於中正彞持之於外搆成罪狀死而後已今陳覺延魯雖已伏辜而魏岑猶在本根未殄枝幹復生馮延已善柔其色才業無聞憑恃舊恩遂階任用蔽惑天聰斂怨歸上高審知纍朝宿將墳土未乾逐其子孫奪其居第使輿臺竊議將帥狐疑陛下方以孝理天下而延已母封縣太君妻為國夫人與弟異居捨棄其母作為威福專任愛憎咫尺天威敢行欺罔以至綱紀大壞刑賞失中風雨由是不時陰陽以之失序傷風敗俗蠧政害人蝕日月之明纍乾坤之德天生魏岑道合延已蛇豕成性專利無厭逋逃歸國鼠姦狐媚讒疾君子交結小人善事延已遂當樞要面欺人主孩視親王侍燕喧譁遠近驚駭進俳優以取容作淫巧以求寵視國用如私財奪君恩為己惠上下相蒙道路以目征討之柄在岑折簡帑藏取與繫岑一言先帝卑宮勤儉陛下守之勿失而岑營建大第廣役丁夫孽子之居過於內殿亭觀之侈逾於上林前年建州勞還文徽入覲西苑會燕捨爵策勳岑披猖無禮狂悖妄言與延已用意多私行恩不當俾軍士懷恨怒之志受賞無感勵之心將校爭功喧動京邑姦謀詭計誑惑國朝致漳州屠害使者福州違拒朝命百姓肝腦塗地國家帑藏空虛福州之役岑為東面應援使而自焚營壁縱兵入城使窮寇堅心大軍失勢軍法逗遛畏懦者斬律云主將守城為賊所攻不固守而棄去及守備不設為賊掩覆者皆斬昨敕赦諸將蓋以軍威政令各非已出岑與覺延魯更相違戾互肆威權號令並行理在無赦烈祖孝高皇帝櫛風沐雨勤勞二紀成此慶基付之陛下比諸鄰邦我為強國奈賞罰大柄肆姦宄之謀軍國資儲為凶狡所散昨天兵敗衄統內震驚將雪宗廟之羞宜醢姦臣之肉已誅二罪未塞㣥情盡去四凶方祛衆怒今民多飢饉政未和平東有伺隙之鄰北有霸強之國市里訛言遐邇危懼陛下宜軫慮殷憂誅鉏虺蜮延已不忠不孝在法難原魏岑同罪異誅觀聽疑惑請行典法以謝四方廣吉州吉水人南唐保大中上書嗣主言邊鎬必敗事驗召授本縣令臣近遊潭州伏見節度使邊鎬初非將材偶逢聖代加之任使措置乖刺大失人心致奉節兵士乘夜大呼共焚譙門會明而遁散不然幾致大變是仁不足惠下也朗陵近在肘腋曾不為虞乃圖桂林以取奔走是智不足謀遠也與監軍使昌延恭不相協和動輒疑阻是義不足和衆也堂堂幕府空無才賢是禮不足得士也軍中號令朝出暮更是信不足使人也五者無一長考之前古未或不敗請擇帥濟師以全境土煥南唐開國時舉進士後主襲位擢校書郎昔梁武事佛刺血寫佛書捨身為佛奴屈膝為僧禮散髮俾僧踐及其終也餓死於臺城今陛下事佛未見刺血踐髮捨身屈膝臣恐他日猶不得如梁武也齊邱字子嵩廬陵淦陽人仕吳纍遷右諫議兵部侍郎告歸九華山尋起除中書侍郎遷右僕射平章事入南唐進司徒同平章事出為鎮南軍節度使徙鎮海軍復歸九華山賜號九華先生封青陽公起拜太傳中書令封魏國公賜號國老奉朝請出鎮洪州周侵淮北起為太師領劒南東川節度使進封楚國公周顯德五年嗣主李璟詔放於青陽自縊死臣事先朝逮三十年每論議之際常恐朝廷百官之中有忠赤苦口之人壅蔽不得達其意懇今始即位而不與㣥臣相見是陛下偏專獨任自聖特賢而已是以古之帝王一人不能獨聞假天下耳以聽一人不能獨明假天下目以視故無遠邇㣥情世態不必親見躬聞而可得知之蓋能延接疏越異方之人未嘗隔絶也今深居邃處而欲聞民間疾瘼艱苦是猶惡陰而入乎隊道也然臣老矣墓木亦既拱矣桑榆之景而可待以旦乎某學武無成攻文失志歲華蹭蹬身事蹉跎胸中之萬仞青山壓低氣宇頭上之一輪紅日燒盡風雲加以天步陵遲皇綱廢絶四海淵黑中原血紅挹飛蒼走黃之辨有出鬼沒神之機廣平宋齊邱字子嵩性傭讀書不知古今然好屬意於萬物萬物有感於心者必冥而通之所以或得萬物之情或見變化之妙遂著化書以盡其道凡六卷百有十篇上二卷説道與術中二卷説德與仁下二卷説食與儉皆化之旨也蓋道不足化之為術術不足化之為德德不足化之為仁仁不足化之為食食不足化之為儉食儉二化其物甚卑其名甚微其教甚大其化甚廣可以裨道德奮仁義厚禮樂誠忠信噫不知萬物之化小人也不知小人之化萬物也又不知小人之化化書也不知化書之化小人也化之道如是時大吳大和庚寅歲序夫衆生者晝則共一明夜則共一暗明不為之缺暗不為之分蓋衆生同一智而共一見也佛佛相授祖祖密傳以茲為法實無法也仰山心偈天下泳之正為此也然其化導大綱祖教專用傳襲源流謂石亭仰山之宗則涌公嗣其後也公法號光涌豐城縣張氏也誕生之夕神光照庭鄰人以為珠璧之祥間而伺之生男子也七歲請學儒詩書禮樂若有素習十三請學佛經論禪智悉如生知一旦請遊方求師父母器而從之於時石亭之羶風行四海乃往禮之石亭為之剃度復就開元寺真公傳淨名經密旨十九詣襄州壽山寺戴公受大戒遂攜瓶錫遍禮有德以有間斷意契無間斷心以有生滅身得無生滅體石亭有似驢之問涌公有非佛之對石亭堂見諸方學人來便問子來作麼學人對曰禮拜和尚來石亭曰還見和尚否對曰見石亭曰見和尚何似驢學人無對石亭將此語每問折到學人未有能對者石亭乃問涌公云子將作麼對曰禮拜和尚來石亭曰還見和尚否對曰見石亭曰見和尚何似驢對曰某甲見和尚亦不似佛石亭曰既不似佛似箇什麼對曰若更有所似與驢何別石亭曰凡聖兩忘情盡體露吾有此語來近二十年無人決了境子大利根當自保任吾不能盡標子異日可知而自行矣嘗大奇之謂之肉佛可以化人矣石亭歸寂公燃第三指以報法又燃第四指以報親皆不㣥之事也仍歸止於仰之棲隱寺紹祖風也洪帥南平鍾王聞其名若禪師家麟鳳無有肩其威德者遂遣使迎止於府下使者至師不起於是州牧邑尹至亦不起已而士民皆來又不起乃共訴之曰師如不起貽郡縣之咎由是不得已而後從之既至復館師於石亭繼美名也是時為人説法明色空一相人佛同種使士者捨書劍農者棄耒耜工者忘糾纆賈者散金玉萬務失緒官不能禁師之教化明白也如是天祐十四年秋還如舊隱升元二年夏順化於禪寢僧臘七十俗齡八十有九門人具梵禮塔於山之西南隅表至德也嗚呼涌公王者固召不就因慈悲而後就之真天人也將來者多方求知猶有弗獲足見涌公不泯其能蓋力救末法之弊爾入室弟子彥新執古之士也任彼肉耳聆余廣譽不遠千里自袁而來以行狀授余請銘殊不知人不勝名文不勝德然哀其誠慤強而應之其辭曰佛佛佛乃真物自迷誤無得失曹溪歿仰山出曹溪髓仰山骨曹溪虛仰山實佛兮涌涌兮佛
