front:
  text: 全唐文欽定全唐文卷七百二十八敖字碩夫渤海蓨人元和十年進士太和中拜中書舍人宣宗朝歷禮部吏部侍郎封渤海男拜興元節度使為左散騎常侍大中十一年拜太常卿出為淄青節度使進戶部尚書卒
  hash: sha256:4c6a91b934a70e541ae2505c7db794f657d596d7f82979a58582b6acee2aed25
