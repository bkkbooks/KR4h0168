body:
  text: 門下朕常日出視朝與三四宰臣百辟卿士詳求理本期臻大和矧軍旅之事豈忘念慮古者命將必登壇告廟推轂授脤所以示專征之任也况許昌宜祿鄜畤三鎮之重一時所難誠當注意之求俱承並命之選銀青光祿大夫檢校工部尚書兼御史大夫充邠寧節度觀察處置等使上柱國太原郡開國公食邑三千戶王宰誠貫金石秀鍾山河文該禮義之源武服鈐符之奧銀青光祿大夫檢校右散騎常侍兼右金吾衛大將軍御史大夫充右街使上柱國渤海郡開國公食邑二千戶高承恭心澄水鏡嚴奪秋霜幼知仁義之方壯慕功名之業朝散大夫豐州刺史檢校工部尚書兼御史大夫賜紫金魚袋田牟風雲應兆鵰鶚當秋素懷搏擊之威夙負騫騰之志而皆公台令嗣勳閥才人奉嚴訓以承家推大忠而許國游心百氏有志四方知山川險易之形識古今興亡之道累更任用咸著聲猷或屏衛四郊而西戎修舉或誰何右仗而緹騎整嚴或安靜朔陲而虜塵載息吾之用汝不愧知人今以忠武師徒始終誠節南征北伐每聞盡瘁之誠破敵摧堅必茂策勳之典洎乎新平捍疆場之要洛郊當控帶之衝固其金湯利彼牙爪凡為展効皆竭忠誠爾其為吾申惠慈布膏澤懷忠伏順者延其賞窮羸孤瘵者加其恩使人人知吾待爾之心其厚若是勿獨以皷鼙之壯號令之嚴報于朝廷是曰為政服我休命爾其戒哉舊秩新恩同登八座之貴搖旌展斾分榮十乘之行宰可本官充陳州節度使承恭可檢校工部尚書充邠寧節度使牟可守本官充鄜坊節度使門下旌善所以勸人毓才所以任事其有誠明夙著績效兼聞舉其風猷以示甄擢况貴擁旄鉞榮分土疆苟非僉諧豈在良選正議大夫檢校左散騎常侍隴州刺史充本州防禦使上柱國賜紫金魚袋史憲忠生知臣節幼學兵符氣高風雲聲振河朔許國之心既壯忘家之義已明忠必盡于君臣情可斷于昆弟秉是名節服吾周行使寵榮陽旋歷環衛稱職之論流芳可聽日者輟于牙爪守在邢隴戎事既肅氓心用安求瘼而承醫盡痊折煩而迎刃先解頗謂良牧真為才人今以涇上右軍平原善地左接甸服右連蕃疆固酆鎬之金湯窒犬戎之巢穴是以擢自郡邸陟于齋壇曳尚書之履聲舉將軍之戎律爾其靜我邊鄙撫我師徒嚴如秋霜愛若冬日於戲亞夫之營細柳叔度之化潁川彼之何人茲實望爾憲臺華省節制澄清敬服寵光勉揚茂効可檢校工部尚書充涇原等節度使門下渭州之北泰山之東乃眷雕陰實曰鄜畤兵甲完勁賦輿殷繁扼朔塞之咽喉為鎬京之管鑰苟非勳賢令嗣術業聞人則不可列彼土疆授之鈇鉞式舉成命其惟至公銀青光祿大夫檢校左散騎常侍兼左金吾衛大將軍御史大夫左街使上柱國彭城縣開國公食邑三百戶劉礎唯爾先父在長慶中自幽陵舉斾歸國志誠白日節高青雲艱難已來勳績無對果有令嗣何嘗乏賢而礎居然將才蔚有公望孫吳之機變學則能通頗牧之功名企而必及踐歷中外周旋寵榮拖朝服而休問洋洋握郡符而理聲籍籍動有餘裕行多去思洎官奉誰何力勤巡檄有勞夙夜備竭忠公是用旌其器能爰在推擇寵以維翰榮以建牙擁紅斾以臨戎宣皇風而問俗十乘在列雙旌啟行節制連營澄清屬郡長冬官之峻秩冠柏署之崇班無以貴自矜無以善自伐勉樹爾德克揚家聲敬之戒之無忝休命可檢校工部尚書兼御史大夫充鄜坊等州節度使門下築壇命將在選攸難建斾臨戎為榮斯極况幷汾有豐沛之舊蒲絳居關輔之雄擢其才能付我憂寄河中節度使檢校右散騎常侍御史大夫上柱國博陵縣開國男食邑三百戶崔元式族茂鼎甲器合珪璋明當察毫智必周物所莅之職居然有聲晉絳行營諸軍節度使銀青光祿大夫檢校工部尚書武威縣開國男食邑三百戶石雄業擅韜鈐志堅金石勇無前敵義必忘身所舉之鋒何往不利况佩服榮顯作時津梁或劇職名藩累聞于尤績或南征北伐常紀于殊勳龔黃之接武尚優廉白之差肩無媿爾其懿效吾乃宣言陟明之命是曰彞憲噫并部叛卒已見成擒壺關狡童尚偷餘息干戈未偃飛輓猶勞爾其外訓甲兵內康黎庶誅妖剪怪勳庸勿讓于他人布渥行恩愷悌俾流于鄰壤儀曹起部長憲尹京俱成提劍之榮各重擁旄之任敬服寵命佇聞休聲元式可檢校禮部尚書充太原節度使雄可守本官充河中節度使仍晉絳行營諸軍征討等使門下庾嶺之南五諸侯而番禺總其襟帶他管之務豈相侔焉琛賮叢湊蕃夷交錯非廉平之操不可以勵其風非幹敏之才不可以齊其俗副我所任惟時之良中散大夫前宣州觀察使崔龜從襟靈坦夷器局沈厚溫玉外朗澄瀾中深慎言克保其樞機養德善周其藩屏早藉重價歷登華資望高綸綍之工才見版圖之極常鎮關輔人懷去思試操銓衡刃有餘利洎乎重剖符竹初命廉車江左奧區宣為右地一去臨莅五更炎凉風猷溢聞課第居最陟明之典誰實爾先吾以登齋壇授戎柄百越稽顙雙旌建牙可謂宦遊峻途儒者極致旌爾懿効服吾寵光况儀曹居八座之榮副相冠柏臺之首重以朝命崇其使車爾宜廣施惠慈遠去珠玉無使伯周獨擅名于合浦隱之未繼美于貪泉佇聞淑聲用益休命可檢校禮部尚書兼御史大夫充嶺南節度等使門下入則掌邦計操利權績雖綿于歲時事不虧于國用經費之道吾所委焉出則築齋壇授戎柄才可寄于分閫令可信于貞師節度之雄吾將付也苟非全器孰謂當人正議大夫戶部侍郎兼御史中丞范陽郡開國子食邑五百戶賜紫金魚袋盧商天生才能必稟忠厚心鏡融朗情田坦夷固道德于藩籬服仁義之干櫓早以文行備由班資休問溢于臺閣善政行于封部先朝輟自廷尉牧于長洲治成歌謠聲達輦轂亟長憲署委登廉車總十連之阜殷澄六郡之風俗由是徵自藩服歷居劇權貳秋曹而無留獄大京兆而有餘地及授其征賦較其盈虛屬武車在郊軍食繼輓役其心慮所効則勤均以勞逸用旌久次梓潼據梁蜀之險紅斾飾皷鼙之嚴仗茲變通允乃文武訓以戎事修其政經遠俗俟爾而安皇風俟爾而暢布政佇聞于盈耳服榮無忝於建牙題劒儀曹持綱憲府用光朝寄式壯戎麾可檢校禮部尚書兼御史大夫東川節度使門下節制之重難其任者莫不貴擁旄鉞榮分疆土連營申號令之嚴列郡舉澄清之化况許國為河洛之屏中山當朔漠之衝時維重藩吾實注意將命其帥必資才人義武軍易定節度使銀青光祿大夫檢校吏部尚書上柱國李執方道茂宗枝葉光任用武有成筭文多據經卬卬其姿倜儻負丈夫之氣中大夫檢校工部尚書兼秘書監賜紫金魚袋盧宏宣名重詞苑價高朝行青雲有聲白玉無玷落落其狀雍容得君子之風而皆明當察毫智必周物大小惟叩方員靡常求瘼而咨爾良醫折繁而宜爾利器常踐顯任俱流淑聲或執金吾而勤晝巡夜警之績或尹京兆而著擒奸擿伏之名輦轂之下風稜甚舉人有懷矣予常賴之類其勞能宜在推獎比者河橋作鎮元武董戎訓練有律于貞師惠化頗行于問俗回遷易水入拜蓬山耀武庫之戈矛煥麟臺之圖籍綽有令望宜承寵光建牙三煥其雙旌授鉞再榮于十乘天官舊貫人部新曹同假正卿分兼大憲式示登壇之貴用申列土之榮勉服官常無忝休命執方可檢校吏部尚書兼御史大夫充陳許節度使宏宣可檢校戶部尚書充易定節度使省表具知回鶻背棄恩親犯擾邊鄙梟音不息獸性難馴自號天驕常為國患比者雖聞困弱尚肆猖狂朕念以親姻隱忍而已良思忌器難决用師曾無悔禍之詞屢有干誅之狀戎臣奮志甲士齊心用奇而果建殊勳决勝而且無遺策今則公主歸止元兇遁逃罪惡既盈誅夷難逭用頒制命以正典刑每思除害之言豈以佳兵為念故非獲已有愧賀章省表具知討彼狡童萃乎戍卒星霜既換牛馬未遑每軫勞懷渴聞捷報今者王宰麾下大破賊徒廣治砦既已平除陽城縣復見誅滅自茲乘勝足以震威蕩定有期凱旋可待外禦多忠臣之力內謀有賢相之籌豈無成功亦復何慮所賀知省表具知有名之伐義勇爭登干紀之兇幽明共戮逆順之理何嘗不然况內有賢相之謀外多良將之力舉則必勝動皆成功吉語屢聞闕六字來獻相繼于道涂斬級申威每盈于原野畜產兵仗所獲蓋多武力軍聲殊為善陣想其危亟坐見清平卿義極謨猷道光翼贊推功之賀懷愧良多所賀知省表具知回鶻恃衆忘恩棄盟犯境朕以勳親是念討伐未行而乃尚肆梟音敢回狼顧恣行驅刦渝見奔衝戰士等蓄銳多時奮身自効猶鬬之獸何足以枝梧成擒之虜幸獲于逃遁蜂蠆自滅馬牛皆歸此實上帝威靈輔臣謀畧豈予薄德所可致焉循省賀章良多愧慰所賀知省表具知朕聞匈奴為中國之患者久矣爰自漢魏迄于周隋制控之謀罕見其術暨乎國朝以懷柔之道稍致和寧然猶邊兵遠屯貴主下嫁國用且費人心未甘昨者回鶻以失國為詞塞相託朕懸知矯詐且示含容旋肆梟音屢聞狼顧虜騎唐突羽書飛馳方命戎臣各嚴師律可汗不知藏匿尚敢猖狂繇是我武張天威震貔貅之勇蹔奮其威稜犬彘之微豈煩于牙齒邊塵掃蕩公主歸還豈獨壯于茲辰實可超于遠古此皆上元降佑九廟垂休台輔元臣咨謀允叶不然予之寡昧何以致焉順美之詞省章多愧所賀知省表具知卿蹈履中和修潔大雅推經笥而微言如貫聽文韻而清音不窮亟稱才能歷踐華顯洎尹正洛汭臨戎孟津治行推高號令有律遽遷白馬重擁青幢接畛素洽于謌謠先聲載揚于道路既聞至止當慰予懷所謝知省表具知負才畧者不辭于難事付重難者思得于才人朕以上黨雄軍壺關重寄劉悟始以勳力授之旌旄而擁鄆州兇孽之餘汙潞府忠良之俗苛法脅衆偽言欺天洎從諫襲有父兵坐邀朝命嘯聚姦惡稔成悖兇狡豎何知㣥逆相濟以卿端厚可以鎮俗誠明可以訓戎舉二鎮之旌旗滌五州之汙染果有變節翻為吾人今元兇盡誅舊風可復已知到鎮用深慰懷善撫傷夷務矜凋瘵俟爾報政副予所知省表具知卿道茂搢紳望高班列夷澹自處端莊有嚴直如朱絃清比嘉玉內庭西掖留重價于雄文憲府南宮藹餘芳于嘉話出入更踐便蕃寵榮所莅有聲溢于聞聽是用授之鈇鉞鎮以荊蠻壓江漢之上游總吳蜀之都會苟非良幹其誰付焉知已下車故多勞止勉宏政術必副憂勤所謝知皇帝舅敬問贊普外甥尚屈立熱論拱熱等至得書并物具悉外甥雄武挺生英威特立本邦奉化鄰國推賢修仁義以保名仗誠明而遂物櫜弓匣劍無聞戰伐之音被野緣原不廢耕耘之具儻非理化孰見和寧足觀盛業興行人心率服以茲觀政深用慰懷朕自守丕基敬遵前訓君臨四海子育萬方誠信必及于豚魚恩澤不遺于草木况外甥親臨極分歲月滋深雖山河阻修而音耗鄭重疆分二境地合一家載覽來章具悉深旨所欲務存久要頗見良圖但能各重其歡各厚其俗戎車息駕烽火不飛共保封疆兩均休戚質神明而不惑覽日月而長明宜體至懷永綏多福承前朝覲人數界首素有常儀公家之事難于違越昨者尚屈立熱等到鳳翔隨從共七十人準舊例只合十人入朝今緣兩國和好不同元和已前遂令三十五人赴闕自今已後所遣使須遵舊例不得剩更差人勿令交馬之後妄有論請拱熱等還蕃有少物數如別錄勅段琮傍段酋琮獨揀楊遷趙文奇蒙善政李守約等各蘊器能夙懷忠義宣功爾室贊理本邦禮樂具修車書必會勵輸忠之節操披嚮化之誠明亟涉道途遠尊職貢威儀就列同慶于三朝筐篚充庭有勤于萬里道光殊俗禮慕華風克成君長之賢深見佐臣之美勞忠可尚鑒寐寧忘勉守令圖用慰遐矚得前嶲州錄事參軍陳元舉男播狀稱父及弟妹等二十七人自太和三年沒落在彼未蒙追索詳其語旨切在感傷朕思骨肉之情人倫所極家鄉一異音耗兩亡生死莫知幽明同怨為人君長深用軫憂今與豐祐書中具言其事卿等職當毗贊義重君臣執之何補于良圖歸之尤重于交好想同參議用解幽寃今賜卿少信物具如前數勅渤海王大彞震王子大昌輝等自省表陳賀并進奉事具悉卿代襲忠貞器資仁厚遵禮義而封部和樂持法度而渤海晏寧遠慕華風聿修誠節梯航萬里任土之貢獻俱來夙夜一心朝天之禮義克備龍庭必會鯷域何遙言念嘉猷豈忘寤嘆勉宏教義常奉恩榮今因王子大昌輝等迴國賜卿官告及信物至宜領之及副王長史平章事等各有賜物具如別錄勅契丹王鶻戌大首領末荷得等至省所朝賀及進馬具悉卿英雄挺出忠信生知威令可固于封疆誠素必彰于禮義情深向闕志切輸忠萬里趨風表堅明之節操元辰稱賀見罄盡之忠勤想屬再三寧忘寤寐將綏多福勉守令圖今賜卿少物至宜領之以下及男等并兵馬使屯勅史梅落達磨縣令等各有賜物具如別錄末荷等各賜官告想宜知悉春寒卿比平安好否兵馬使以下並各存問之遣書指不多及勅契丹王鶻戍某至省所進馬事具悉卿才雄沙漠氣勁燕山忠良自稟于生知毅勇豈資于時習禮備正朔誠懸表章職責聿修遠致右牽之獻威儀就列常嘉左袵之風節及元正慶均多福永遵令善無替前勞相屬之懷寤興為念今賜卿少物至宜領之維年月日嗣皇帝臣稽首大聖祖高上大道金闕元元天皇大帝伏以百穀實生靈之本萬姓為國家之基言念老農常思薄德今時雪罕降宿麥是憂同雲未施嘉穀何望臣祇膺景運亭育兆人德不動天言徒罪己粢盛慮闕于明薦災沴恐及于生靈誠竭齋莊禮虔夙夜伏惟元功不宰至道無言垂福祐于㣥生假膏濡之德澤謹遣尚書兵部侍郎高元裕啟告以聞謹詞維年月日嗣皇帝臣稽首大聖祖高上大道金闕元元天皇大帝臣猥奉顧託獲臨宇宙四海之寧晏萬物之生成必繫厥躬敢忘其道是用虔恭大業寅畏上元勵無怠無荒之憂勤期一風一雨之調順苟或愆候常多愧心今三伏之時五稼方茂稍渴膏潤未為愆陽而憂勞所牽念慮已及恭持丹懇上瀆元功冀宏清淨之源溥施霑濡之澤粢盛必遂煩燠可消將展敬于精誠俟降靈于霶霈謹遣吏部侍郎韋湛啟告以聞謹詞莫高者天莫大者道天以不言而信道以不宰而功元關潛契於虛無祕籙廣傳於妙有由是自我聖祖達吾神孫微言載流真教不墜膏濡動植亭育生靈豈獨鍊氣谷神保元恬淡而已伏惟仁聖文武至神大孝皇帝陛下生知至道宿應上元紹列聖之皇圖冠㣥仙於紫府光承景運溥濟含靈凝旒而道用沖深端拱而元風淡泊伏以今月十一日皇帝降誕之辰女道士等焚香行道敬修功德伏惟聖壽山固皇恩海深將四序而周行與三光而長燭天覆地載何得而名道護神扶臻乎無極清淨無為之謂道是非有作之謂名道知其源名亦歸正由是㣥生遂性咸臻妙有之功四氣順時自契不言之信洪鑪假喻大塊無形載厚地以繁滋覆高天而悠久伏以今月二十七日憲宗皇帝忌女道士等齋戒精修焚香虔懇伏願追蹤元運息駕黃庭保聖祚於無疆降神功於有截日月所照福祐同霑夫道本無為雖強名而不離清淨功歸不宰運陰陽而必致乎生成今四氣環周三光燭耀勾萌盡達閉蟄皆驚和風競發於年華元造豈知其日用女道士等奉為皇帝稽首齋戒焚香莊嚴伏惟冥鑒照臨神功保衞精誠上感至道潛通高明廣被於無窮福祐庶垂於有感南山比壽將聖祚而齊隆東海量恩與天波而長潤旁沾動植溥救幽陰咸保乂寧永綏多福維大中二年歲次戊辰夏五月己未朔二十一日己卯懿安皇太后崩于興慶宮冷井殿旋殯于大內兩儀殿之西階粵十一月丁未朔二十六日壬午遷座于景陵之別寢命太尉具陳祖饋殿廷禮也池紼就列神攢啟封晴霜拂禁曙月彎空叶龜謀之吉兆儼蜃衞于行宮皇帝孝本自天禮期踰節仰遺令之是稟抑宸衷而敢越宵載既備祖庭爰設緬行珮之徂征駐轀輈之去轍顧謂簡冊克揚休烈臣敖奉詔敢獻文曰大圓清升大方渾凝日正陽德月司陰職人倫既分伉云儷云自甿之卑達帝之尊有國有家以君以親光光母后列列門冑鼎允中榮天枝外秀河祥岳祉蘭香玉美汾陽之孫昇平之子有命既集來嬪帝宮奉維城之中饋光戚里之華容赫赫憲皇龍潛未躍貽孫鍾紫極之慶知子奉青宮之樂惟后之明執禮而行莊敬必嚴于父道盥潄將俟乎鷄鳴及二聖歸真三光正色日朗黃道月盈霄極中興是贊陰教維則時詠肅雍功推輔翼服澣濯以警其華煥讓封拜以誠乎謙抑蘋藻潔蠲于宗廟葛藟吟諷于宮掖高禖有慶大電膺祥誕元良而立極纘丕構而圖昌于是養素便殿齋心洞房宸嚴捧負孝道輝光噫馳飇兮未幾迅朝露兮何常人代之推遷莫極仙家之日月猶長婦事三朝母臨五葉禮益上載恩方下接無何秘籙求真空門悟劫追弓劍之悠遠感霜露之履涉謂十地兮可躋謂丹梯兮可躡金屋不知其長往彤管空遺乎舊法嗚呼哀哉姜嫄讓德任姒推名仰符軒耀俯順坤靈容範不邀乎箴史婉娩自恊乎柔明終厭浮代期歸福庭謝明時于清禁即修夜之元扃嗚呼哀哉蘭殿靈嚴椒房幽寂日下珠簾塵生粉壁禁樹暮兮煙慘宮瓦寒兮霜白瞻象設兮如在捧褘褕兮成昔嗚呼哀哉車書畢會容衞周陳黃山指路清渭臨津姑射之雲霓自遠鮒隅之簫鼓空聞想冥冥于寥廓徒望望于逡巡嗚呼哀哉天上無歸人間一別盼三清之縹緲畱四德之昭晰詩著陰陽之詠書徵卜筮之說啟叶吉于新阡爽同歸于故穴雖壽宮相望參差陵樹之煙而仙路有期繾綣瑤池之月嗚呼哀哉嚴字子肅壽州壽春人第進士舉賢良方正第一拜拾遺累遷駕部郎中知制誥累遷太常少卿大和五年權京兆尹卒問皇帝若曰蓋聞舜禹之有天下也起於側微積德累勤多歷年所未經盛聖之慮豈有遺哉然猶好問察言勤求賢士蓋以承天之任重憂人之志深也况朕長於深宮涉道日淺奉列聖之鴻緒撫萬㝢之矜人夙夜嚴恭不敢有懈實懼燭理未究省躬未明所以詳求讜言以補不逮子大夫是宜發所蘊畜沃予虛懷當極意正詞勿有所隱昔王政之興必臻於康泰霸道所立猶致於富強我國家提封溢于三代酌憲兼於百王無堯湯之災積祖宗之理而人未蕃庶俗尚彫訛家無葢藏公闕儲蓄卒乘之數貨幣之資統而校之莫繼前代豈率土生殖變于古歟將阜時政令戾於今歟固已揣摩必窮利病明徵末失之漸具陳興盛之謨且文武兼學以成身士農迭居以豐業故家給足以固本才周足以應時近古各循一端不相資用致令從事異心難於成課去秩無守輕為惰遊指明共貫之方訢合二途之利永言化理期酌厥中施為或差得失斯遠將修睦勸善則在下難知將任數馭情則人心益偽思聞指要得合誠明精別比周之情敷詳忠厚之道知人則哲從古攸慎九徵恐泥五事難精或望可服人而才非周物或言皆詣理而行或乖方宜陳取舍之端用彰真偽之辨至于朝廷之闕四方之弊詳延而至可得直書退有後言朕所不取子大夫其勉之對臣言臣少從師學講論載籍為皇為帝為王為霸之所行理亂興衰之所由起迨壯歲而以身處窮賤又得農桑工賈之利病人情風俗之厚薄思願一發於明天子之前鬱抑於中無因自致乃月正日陛下有事於南郊迴御丹鳳樓赦天下臣與百姓咸觀列在大陸之南祥風北來時聆德音乃聞有直言極諫之召私自快喜得進所志於今日也今蒙陛下親策於赤墀之下懼以燭理未究省躬未明乃使臣極意正詞勿有隱諱臣其敢不直不極而有闕陋哉臣生三十年實沐唐化恨無以自效於日月之下乃逢昌運獲進箴言願增天高以益地厚懇迫激切不知所裁謹昧死上對制策曰昔王政之興必臻於康泰霸道所立猶致於富強國家提封溢於三代酌憲兼乎百王無堯湯之災積祖宗之理而人未蕃庶俗尚雕訛家無葢藏公闕儲蓄卒乘之數貨幣之資統而校之莫繼前代豈率土生植變於古歟將阜時政令戾於今歟固已揣摩必窮利病明徵末失之漸具陳興盛之謨臣聞以道化者皇以德教者帝以禮樂刑政理者王夫以處天下之尊舉四海之力為皇為帝為王為霸致之一也猶反掌之易而况人之誠偽時之厚薄必由上而下者乎帝王之道高不降於天厚不取於地遠不致於四夷師友輔弼而已矣師友輔弼豈有他求哉賢哲忠信而已矣是以古之聖帝明王念天地之無全功也不自尊其德仰日月之有薄蝕也不自是其明必求賢哲置諸左右然後德尊而益至臣日獻其謨君日行之臣日聞其過君日改之其始也一善出於臣其終也百善歸於君以為皇者師帝者友卒未聞師聖於皇而友明於帝後之王者其或不然臣有所獻或慮乎美歸於下是以言有所不聽臣有所替或慮乎惡彰於己是以過有所不去然則曰諫我之曲彼必正乎曾不知疾之在身必飲醫工之藥而醫工未必免病也飲其藥者或有效焉必待其筋力異於人顏色殊於眾而後飲其藥則疾之根本得不為深乎今陛下邁皇帝之聖輔弼有師友之賢所謂聖賢相逢而上古之理可得而致猶慮乎人未蕃庶俗尚雕訛則理不優於三王德不超於五帝其致之哉誠有道焉臣願陛下詳觀典圖舜禹所以待夔契者何如哉殷之成湯周之文武所以臣伊呂周召者何如哉貞觀所以任房杜者何如哉開元所以用姚宋者何如哉其所以致堯舜成湯文武之名貞觀開元之理何如也今陛下自即位以來舜禹之心已刑于四海矣陛下尊敬師傅拔用忠良謫棄奸貪發散滯積皆舜禹之心也臣願陛下尊敬之不廢其道拔用之不廢其言謫棄之今復用之散發之今勿斂之夏書曰靡不有初鮮克有終陛下能終之又何憂葢藏不瞻於下人儲蓄有闕於公府鑄鋒銷鏑卒乘之數可減于後時薄賦節用貨幣之資可益於前代末失之漸莫甚於賢不任而政不修興盛之謨莫先于復開元而履貞觀則三代之康泰可翹足而致彼五霸富強之術安足為陛下道哉制策曰且文武兼學以成功士農迭居以豐業故家給足以戀本才周可以應時近古各循一端不相資用致令從事異心難成考課去秩無守輕為惰游指明共貫之方訢合二途之利者臣以為文武之道雖不同士農之業雖各異而要歸于修其職業而濟于時也今之所謂文者何哉文采而已所謂武者何哉騎射而已欲求兼學其可得乎經緯古今文之業也用之於武武之德也禁暴戢兵武之業也用之于文文之輔也不修其本而事其末欲求其備其可得乎今苟各視其才以授其任亦可以濟天下之務矣是以仲尼有四科以廣其道漢高有三傑以成其功所以不求備于人故能創業於前代垂教于無窮者也士農迭居以豐業今所以輕為惰游者國家自幽薊兵興人無土著士者農者遷徙不常慕政化則來苦苛暴則去祿有厚薄在桑土不均則知去秩者無守不為惰游者何所歸乎陛下端心克己於上任賢使能於下則文武各得其任士農各安其業矣寧慮家有不給才有不周之患乎制策曰永言化理期酌厥中施為或差得失斯遠將修睦勸義則在下難知將任數馳情則人心益偽思聞旨要得合誠明旌別比周之義敷詳忠厚之道陛下以修睦勸義為念而以難知益偽為慮豈耳目之臣未盡得賢乎何憂歎之深也自中代已降淳樸既漓賢不肖混淆莫能酌辨臣以為天下之事統而計之善而不可以為惡者十一二焉惡而不可以為善者十一二焉其間六七之多率中人也法令修明則賢人多也懲勸不精則貪冒眾也必在上有所施行而在下有所承流者乎且陛下左右惟賢所進惟賢則四目明四聰達不難知矣陛下左右非賢所進非賢則偽行堅偽言辨心益偽矣今陛下必擇忠賢居之左右以為耳目以為腹心矣任忠賢所進者復何疑乎誠若是則管夷吾鮑叔牙友進之不為比祁奚祁午父進之不為私是在陛下有所任之而已制策曰知人則哲從古攸慎九徵恐泥五事難精或望可服人而才非周物或言皆詣理而行則乖方宜陳取舍之端用明真偽之辨者陛下清問及此非念切求賢取士之道乎夫求賢取士所以備官也設官所以分理眾務也夫得一尺之木將斵以用之必使匠者有一塊之土將埏而器之必使陶者今陛下選人以仁天下皆歸於仁矣選人以義天下皆歸於義矣夫理天下者必以仁與義矣今朝廷用人不以仁而憫默低柔進人不以義而因循持疑言有不符於行才有不足於用矣陛下雖欲精五事五事何術而精雖欲法九徵九徵焉得而法若是求眾務之理者是以材與陶以土與匠而求器用之得也不亦難乎今朝廷開取士之門不為不廣其中選擇精詳望為俊彥者通於進士中外之重擢清秩選於是者十八九誠有才有器亦盡萃於中然而所采者浮華之名所習者雕蟲之技是以主教化者不道皇王之術官牧守者不知疾病之源豈其有任事之才而無任事之智乎蓋藝非而職異也臣聞古者有豢龍之官夫龍神妙不測變化無窮而能節其嗜欲察其動息擾而制之無所不得者蓋代襲其官述修其業也楚人之操舟冀人之乘馬豈盡性哉必習而善矣今縱未能大更其事苟明殿最考績之科驅天下之人於修效飭行之地假如任某官著某行立某事舉某善雪某寃必擢而遷之又能著某行立某事舉某善雪某寃又擢而遷之蔑然無聞不待罪而黜之則下無蔽善黨惡之情矣下無蔽善黨惡之情則賢者不進於朝廷復何往也安有言行相乖才望不稱者乎制策曰至於朝廷之闕四方之弊詳延而至可得直書退有後言朕所不取者臣陳帝王之道於前矣陛下又垂問以朝廷之闕四方之弊豈不欲躋人於善道補政之闕遺哉臣又陳取士任賢之道矣陛下誠能任賢於上待人於下朝廷豈有闕而不修四方焉有弊而不去何必備繁細之事以干聰明者矣夫有天下者莫不欲使人富使人壽使人遷善使人無惡統四夷於荒外正百事於朝廷夫欲人之富莫若厚耕殖欲人之壽莫若和陰陽欲人遷善莫若明勸賞欲人無犯莫若慎刑罰服四夷莫若修文德正百事莫若任忠賢忠賢不任雖日親眾務百事莫得而正文德不修雖日致干戈四夷莫得而服刑罰不慎雖日殺千人奸盜莫得而止勸賞未明雖日爵千人禮樂莫得而修寃濫未盡雪陰陽莫得而和浮屠未盡去耕殖莫得而厚此六者政之大端也伏惟陛下念之抑臣又聞非知之艱行之惟艱陛下懼化之未光懼德之未洽懼一物之失所懼眾政之有乖訪遺闕於下臣張條目於清問凡前強對者莫不備陳所得則陛下知之不難矣在行之何如耳臣又以天下之事小大萬端陛下深居九重廣有四海安得勞心神于思慮之外極聖明於視聽之表臣願陛下為一事必師于古行一道必法於天明日月之光正星辰之位降雨露之澤振雷霆之威內得夔龍掌萬機之務外選方召視百事之成利於上者必慮於害人懌於志者必求諸非道則天下之望慰微臣之志塞矣謹對
