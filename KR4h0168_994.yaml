front:
  text: 全唐文欽定全唐文卷九百九十四闕名三十五
  hash: sha256:b186df15ed1a9d6299205e776058665b1796b475ab81831e89dc9f4c206d5cb7
body:
  text: 公主諱闕字闕隴西狄道人皇帝之第三女也天潢疏潤圓折浮夜光之采若木分暉穠華照朝陽之色故能聰穎外發間明內映訓範生知尚觀針於女史言容成則猶習禮於公宮至於怡色就養佩帉晨省敬愛兼極左右無方加以學殫綈素藝兼鞶紩令問芳猷儀型閨閫某年某月有詔封汝南郡公主錫重圭瑞禮崇湯沐車服徽章事優前典屬九地絶維四星潛曜毀瘠載形哀號過禮繭纊不襲鹽酪無滋灰琯亟移陵塋浸遠雖容服外變而沈憂內結不勝孺慕之哀遂滅傷生之性天道祐仁奚其冥漠以今貞觀十年十一月丁亥朔十六日闕主諱某字某隴西成紀人也夫天靈啓聖迹被崑崙之墟皇雄命氏道光昆夷之土至於補元立極之功駕羽乘雲之業握瑤圖於景宿懸寶祚於貞符其唯大唐者與曾祖元皇帝被風化於墳枚始艱難於邠籥祖武皇帝升陑誓牧之旅汾水襄城之駕卷懷列辟財成㣥有父巢刺王劼圭疏奧壤戚茂維城雨曷楚澤之雕雲聚淮南之仙氣遂使苕華孕美結緑開珍景溢星潢祥聯珠婺晨栖阿閣聲調丹穴之禽夕指瑤池色麗青田之羽及其趨承蘭掖漸潤椒庭水移銀箭尚敷袵於師氏燈滅金羊已鏘環於傅母栖志圖史游心幾律盼萋葉而興勤聽喈音而遺被意匠言泉之旨飛雲垂露之端柳密妝窗乍起流鶯之賦月含花簟因裁搗衣之篇採擷纂組之規澄渶紘綖之務靡不思窮妍麗慮歸間謐貞觀十五年正月五日封文安縣主脂賦開榮公宮從訓乃以某月十四日降烟於工部尚書駙馬都尉紀公之世子段儼華舒穠圃秀發夭蹊迓雨生輝副笄增飾尸芳牖下既奉宣平之羹思媚諸姑還侍河陽之帚嬪儀載穆閨饋惟馨循淑性於珩璜韻柔情於琴瑟瞻窈窕而遐騖歌悅懌而長懷朝露溘晞詎留光於瑤草秋風忽起空滅彩於瓊林弄玉乘烟怨吹簫之徒巧常娥飛月痛仙丸之不追以貞觀草二年二月三日卒於長安頒政里之第春秋草六嗚呼哀哉惟主心資淑慎體茂清明碧霜絳雪不能渝其操秋菊春松有以方其質香名遠集尚申戒於芳褵咎言斯屏每含辭於蘭氣信以黼藻中闈抑揚內範淑人不永傷哉如何怨家道之無庇痛藐是之何託戚里兼酸宸襟凝歎即以其年三月草二日陪葬於昭陵窀穸所由恩旨隨給周京歸賵寵切於前哀澶水尋盟事渝於昔禮湘川之下還見舒姑之泉鮒隅之陰方傳貞女之峽采彤管之遺詠雕芳塵於不朽其詞曰帝降元圃宸居紫微金柯謺秀璇萼分輝桂輪澄彩星津結霏誕茲才淑克嗣音徽延慈丹禁稟訓彤闈綴珠為服雕玉成衣拂景孤唳淩霞獨飛婉娩其性逶迤其質春緒含雲秋情儷日降嬪君子來宜家室李徑初華梅林未實潔資芳錡心調友瑟鳥變禖祥熊虧夢吉顧菟俄掩奔駒遽逸卜遠將及靈驂已巾音儀遂泯褕翟空陳平原改邑清渭迷津埋龍毀劍壁璧疑侵塵佳城日黯道泉新帷傷奉倩簟恨安仁一生何有萬古銷春闕一字令賓墓志銘闕四字令賓南陽人也帝顓頊之苗裔曾闕三字魏征西大將軍祖伯齊北銀州刺史闕二字隋歷亭縣並蘊山嶽之高苞河漢之闕二字奕葉光華名流千載也君德懷邈遠志尚清居怪張議之憤闕四字之貞粹行齊三徑情欣五柳隱不遂闕一字痼由斯起災風濫及先拂高花忽於顯慶五年十二月草六日卒於家第春秋八十有一但以死生契濶幽明有殊即以辛酉之年月己酉之日葬河陽西北九里冥冥有分腸之痛永永有莫覩之悲酸哽不紀其切刊石題之不朽嗚呼哀哉乃為銘曰峩峩高德渺渺懷深志尚沖寂榮位無心神情亮遠清居可尋道於時外名利何侵舒散闕一字候放闕一字情沈痼疾因動大漸相臨死生闕一字暗運往無禁形雖忽謝永播芳愔君諱汪字光明隴西狄道人也昔樞電降祥允軒臺之遠構瑤光薦祉派若水之長瀾由是瓊萼敷華靄寰中而披葉覽條振穎疏海內以分柯亦有二師將軍功來汗馬護羌校尉績著闕四字猿臂稱工聲高西漢龍門表峻譽滿東京舄奕於簪裾蟬聯於纓紼而已曾祖沖明魏本州主簿金城郡守元猷素範月亘霞軒綱紀百城威恩千里祖爽周黃門侍郎使持節洮州諸軍事洮州闕一字史高情罩日逸氣淩雲司鵷紼以馳芳建鳥旟而振馥父樂淵周原州平高縣令肅州長史器局宏遠識量韶華政弭中牟之蝗風振南康之鶴君承芳蕙畹謺映冰壼綺歲標奇齠年構嶷敏參元道理照黃中魚鈐豹略之謨海牒山經之記靡不精窮玉帳奧極書臺矣然渥水騰姿必超千里東岑照彩自蘊十城大業中起家授鷹揚郎職司陛㦸勤效周廬用簡帝心更遷右職大業十年改闕一字揚郎將既而俗反商闕七字材為晉用於時長鯨未戮封豕尚殷魏公李密擁闕一字庾以稱雄據成皋而高視令君輕軺遠騖宣我國恩才出宜陽便為世充所獲君方思報主且託僞庭引拜左龍驤大將軍遂受世充驅策既而本圖不果函洛載清武皇特以宋盟宥君殊死尋授左親衛校尉北門長上既司中壘之營兼掌北門之重考績酬庸用光戎秩貞觀二年授右武衛九嵕府別將十七年改任寧州蒲州府果毅都尉隨班例也俄闕一字禮非筋力挂冠之志獲申豈謂景落崦峯易簀之辰斯及以顯慶五年九月二十三日薨於隴西里第春秋八十有三夫人安定梁氏隋鷹揚郎寵之女高門鼎胄輝映一時懿德柔風儀型百代福騫偕老夙丁偏罰以大唐龍朔元年十一月二十九日合葬於隴西郡曲陽陝安都之原禮也闕一字子等痛過庭而殞淚念風樹而銜酸白楊悽兮雲日曉青山黯兮原野寒闕一字緹緗之有蠧憑貞珉而不刊銘曰胄軒延緒翊夏分柯功懸日月賞懋山河扶疏賢葉渺漫鴻波遺風六闕五字其一運逢戎馬時屬烟塵忠能奉主謀足解紛挾纊綏衆蹈軍摶風始激落景俄後闕君諱文字緯隴西成紀人周柱史聃之後也原夫元鳥含靈闕三字誕聖迹爰履莘女載生命氏開家其來尚矣至如闕五字樹姓焉自紫氣西浮瑤源已濬仙舟東泛玉葉闕六字可略言矣曾祖闕一字齊金郡太守恤人求瘼雨逐車闕二字政闕一字風鸞隨馬去祖突周任定州録事參軍鉤深索隱懍風格以繩違賾要探機肅霜毫而糾繆父闕一字幼承詩禮早奉金籯綺歲談天髫年對月務舉晉王府參軍事君克劭菑畬載揚弓冶昭彰闕一字緒淑郁家風時屬末隋不遑儒業所以學未優贍志在前鋒應接義旗忠誠可紀錫以戎律實給寵章授騎都尉方當矯翼雲路騁足長衢豈知天不憗遺殲良奄及藏舟易往隟馬難留薤露一朝生平萬古以永徽二年十月二十九日歹卒於私第春秋七十有一夫人彭城劉氏閨門從訓斷織流慈既勗魚官還嗤馬迹實光君子簪杖蒿藜何圖眉壽不終頽曦遽謝以麟德元年二月二日卒春秋八十有二粵以麟德元年歲次甲子二月己卯朔十八日丙申合葬於同州馮翊縣武城鄉之平原禮也孤子武仁等追惟岵屺載想蓼莪面風樹以銜悲仰高堂而灑淚痛深曾閔哭甚柴由永薦冰魚長羞雪竹恐陵谷更貿桑海互遷敢勒遺塵式銘元石云爾履迹孕靈指樹含生聃浮氣紫膺泛舟輕達人知足至理無名分枝乃聖奕葉惟英其一天長地久人事推遷鶴書易促鵩讖難延既騫山壽終奄窮年風停郢斫波輟牙絃其二一從蒿里四野蒼芒春雲結靉秋月凝光塋寒吹急壟晦煙長聊旌琬炎式紀遺芳其三君諱興字文達河內人也自隆周御歷大漢膺期或公或侯鬱映於圖史允文允武紛綸於簡牒祖闕譽齊上儀同務舉韓王府參軍事託乘梁蕃聯裾魏邸聲塵洽來葉光價騖當年父闕隋任澤州濩澤縣丞弼宰絃歌嘉猷遠播翼綏黎庶令績遐彰以貞觀二十年五月一日歹卒於私第春秋卌有五夫人南陽張氏門風演慶載誕容華四德洽於母師六義光乎女則豈期天道冥昧賦命循環薤露溘晞燭風俄逝以總章三年七月二十二日歸於蒿里春秋七十有二粵以咸亨元年歲次庚午朔闕四月癸酉同葬於河陽縣東北一十七里平原禮也俄摧千丈徒懷肅肅之音奄閟三泉空軫冥冥之歎懼桑田有變陵谷尚移故勒碑銘乃為詞曰荒源蒿里寂寞佳城泉門永閟地戶長扃松風警霜月凝塋生平已矣空餘頌聲其一八火焚軀忽然歸故先墨盡龜卜居安厝神靈具飛遊魂還墓既返轜車寂然無怖其二九泉寂寂幽壙冥冥分辭周戶永別英聲翔鴻作伴狐兔盈庭闕君諱闕一字字闕十二字之後矣締構層華望仙雲而連若木闕四字浮潤海而接霄漢公天挺英靈神資朗哲髫年吐秀綺歲含芳初舉茂才為許州闕三字令懿德裁風美青鸞之儛化嘉猷偃俗光彩翟之依仁政舉薰風譽流天扆又詔遷闕二字刺史諸軍事淮南公被雲雨之膏液降霜霰之輕威區㣥荷子育之恩庶彙挹陶鈞之闕一字褰帷千里衢歌何暮之謠露冕百城門嗟來晚之詠遇周社之傾覆會鼎祚之流移鹿散中原梟鳴宇縣高班厚袠屬喪亂而傾淪墨綬金章偶崩離而失主嗣子洪貴六人及孫恆周三人等蓄耀珠泉潛華玉岫光逾月采闕一字爛星暉玉樹分榮聳亭亭於回薄金柯引翠抽鬱鬱於長林或則學贍文豐兵韜武略或則風雲在議金石斯懷珍謝玉而咸珍貴韋珠而並貴崇基之失緒咨峻趾之湮沈徘徊木雁之門仿佯語默之致於是懷五慎佩九針孝二尊篤三益咸以壑舟夜徙薤露朝晞天不憖遺溘然長謝公周天統二年終乎私第春秋八十有二以隋開皇元年十月一日與夫人馮氏合葬於龍山之陽闕一字原之里禮也其地東窺邵堞伐楚之迹猶存西邇滍城避狄之隍如在南鄰滍水神龜游括地之瀾北瞰龍山仙鶴憩聳天之岫爾其珍木葱翠嘉樹紛闕一字是汝都之形勝荊楚之闕二字者焉曾孫善達義節八人等痛風枝而結思悼霜露以摧心遠謝闕一字裘遐慙落構恐闕二字變海陵谷貿遷耿介長淪芳菲永歇勒茲貞石乃為詞曰承芳蕙苑誕秀清流闕二字開屏懿德臨州夙虧風槩早歇英猷爰有嘉允遠謝箕裘敬雕闕一字兮翠炎庶永播兮清闕一字夫人杜氏京兆杜陵人也闕四字望雲降丹陵而育慶朱冠白馬御冥道而闕二字赫闕三字之雄周列神羊之住備於方策闕一字略言焉七代祖闕二字征西將軍武庫靈姿智囊神用通其變闕二字地表闕二字而顯則麟闕一字知歸曾祖績左監門將軍善寶唐闕一字州海陽闕二字父嘉猷唐務州參軍體道居貞含章挺秀瓊山闕一字峙爰開抵鵲之珍碧浪川融必亘採龍之寶夫人姿靈婉淑闕二字貞凝風舉闕一字榮川流蕙問名為不朽聞杜氏之春秋年則闕一字行見楊家之輪轂承筐景貺征南之緒允克隆斷緯沈機關西之主饋斯在驚逝川兮龍劍沒乘上月兮鳳臺孤樹德徙鄰孟里以之為美欽刑輟饋雋獄於是勝殘委霜霰而無改冒雷霆而不懼信可傳芳史管著象甘泉者哉豈意拾翠天津與舒泉而共沁薦桃仙樹將暮槿而同期嗚呼哀哉以長安三年五月草八日終於幽州之官第春秋六十有三粵以長安三年十月十五日葬於雍州長安縣高陽之原有子朝議郎行豳州司功參軍事履行以膝下之恩無待口澤之戀空存廠田坴永慕於蘭闕一字結深悲於蓼闕一字茲夕何夕春非我春鬱鬱佳城無復長安之闕三字舞鶴不聞京兆之天何修夜之不暘而短歌之可作其闕二字則天垂象就日重輝在夏龍御居殷豕韋靈源濬出慶緒闕二字禮樂攸往衣冠大歸其一鳳簫寥亮霜紈皎潔頌發春椒韻浮闕一字雪丹霞濯錦素塵生闕一字琴瑟不流松蘿罷月其二曰仁者壽彼蒼者天無聞靜樹空想寒泉蕪城閟景松架來煙未辨何日誰論幾年其三君諱師亮字永徽安定烏氏人也若夫河汾潯涘大啓濫觴之源豳雍林坰勃興拳石之址則有武威太守軒冕赫奕於鄉亭并州刺史旌棨駢闐於門巷大父殊隋任右監門録事顯考金柱唐奉義郎並行高周壤道蔑王侯揚雄非聖之書我家時習方朔易農之仕吾人所尚君珠藪夜光玉田朝彩張仲孝友早為立身之具夫子溫良特作揚名之本未嘗欺於暗室何謝古人初不忤於虛舟自符先達棲遲禮讓擯落驕奢弋釣邱墳耕耘道藝詞包吐鳳傲三變而英峙字抱回鸞雄一臺而介立馳聲日下辨振雲間後進欽其領袖時輩宗其瑚璉起家任唐朝左春坊別教醫生摳衣鶴禁函丈龍樓究農皇之草經研葛洪之藥録術兼元化可以滌疲痾學該仲景因而升上第屬龍庭日滿鹿塞塵驚命將出師千金之費逾廣飛芻挽粟萬里之糧宜繼君戶庭不出鞍甲匪疲遙同轉輸之勤遂獲茂功之賞永隆二年以運糧勳蒙授上柱國既而欽明饜代宮車晏出守文承歷園陵繕修紀市功成實憑子來之力穀林務畢仍覃發哀之旨垂拱二年以乾陵當作功別敕放選釋褐補隱陵署丞解巾從宦智效聿宣結綬當官幹能斯著秩滿俄而上延朝譴授珍州榮德縣丞二職千石贊務一同蠻陬乂寧平人是賴終使悠悠墨授方宏上艾之風泛泛銅章行闡中牟之化隨牒行滿解印言歸吹蠱餘災廠田坴迫少城之地游魂永逝崩摧武山之石以萬歲通天元年七月二日終於益州蜀縣春秋卌有七嗚呼哀哉即以萬歲通天二年三月六日葬於雍州城南終南山至相寺楩梓谷信禪師塔院之東陪先塋也嗣子齊望嬰號越日孺慕彌年悲懷袖之靡依慨舟壑之潛運黃壚九地始殷荒戀之情元夜三泉終藉題鐫之事乃為銘曰東京后族北地邦君七侯馳譽三主揚芬瑞掩金冊榮繁寶鐏核諸隆盛曾何足云祖考餘慶英髦間出嘯傲參元乘淩喻日溫恭宅性廉白成質談思漆書儲精緑袠鴻陸初漸龍門早升聲敷寢廟智效園陵天朝我黜縣道為丞績凝邊徼化協黎蒸還途未極生涯遽已瞑目他鄉歸骸故里新封暫啓賓御懆而野雲愁舊隴長扃松檟昏而山霧起碑闕兮交映陵谷兮潛徙所悲螻蟻之埏銷淪天地之紀公諱思訓字逸太原平陽人也昔姬文作周運璿璣而一宇宙虢叔命氏錫介圭而列山河鬱為國師燕臺揭起誕降人母金穴橫開世緒蟬聯公侯克復曾祖興周上黨郡守平東將軍青綬登朝朱旗降野執霜戈而問罪方薤水而澄心祖則隋淮陵郡守度支郎銀青光祿大夫珥金貂而伏奏鳧舄將飛齊亂繩以臨人牛刀自解父敬同徙居洛陽今為洛陽人也幽素舉及第以孝不仕弄鳥承顏恥毛生之捧檄懸雞就養式茅容之致歡不屈道而期榮穆真風而自逸公乾綱之精融密泉潔學以天授言以行成襲門緒解褐睦州建德縣主簿應吏職清白舉及第轉滄州樂陵縣丞南郡地狹屈仇香而佐時六安路遙坐桓談而不樂敕除溫王府兵曹參軍事轉太子典膳監芙蓉映水攀仙樹而逢仙蓮莆牽風坐瑤山而和鼎應孝悌廉讓舉及第敕授大理司直灼灼四方簡孚其正哀敬折獄對霜練而論刑上帝弗蠲泣丹毫而書罪彼蒼不弔殲我良圖以景雲二年九月十三日寢疾終於長安醴泉里之私第公孝友溫恭文行忠信哀昊天之罔極式閭巷以光時蔭棠棣而聚星肅閨門之有禮奄棄於代與善何徵辭北寺之榮班舊車長謝望東周之故里旅櫬空歸夫人清河張氏平陽柴氏並穠華賁春輕雲蔽月結離作儷乘旭雁而移天采蘋是羞應鵲巢而主饋昔時南斗兩劍分輝今日西階雙魂共穴以景雲二年歲次辛亥十二月辛丑朔十五日乙卯遷合於洛陽北部鄉之原陪葬先塋之壬地禮也青烏卜地白鶴標墳桂酒蘭肴無復平生之賞佳城繐帳空餘冥漠之悲嗣子審之弟雍州武功縣尉思謨乃攀號劈踴瀝泣摧心長懷陟岵之哀永結在原之思嗚呼哀哉乃為銘曰榮最之緒纍代重昌其人如玉邦家有光道全忠孝德裕巖廊士林蕭索人之云亡寒郊慘兮山門險松扃閉兮宿草荒君諱佺字尚真安定人也遠祖因宦遂居介休夫榱椽是佐錯胡綜之文章清白知名見胡威之父子光光懿烈不替先風簡牒詳諸可略言矣祖買隋孝廉舉文林郎幼洽詩書長崇禮樂太初玉樹夙擅嘉聲韋氏金籯遽升高第父端養素不仕情貪野薜志蔑裘裳道在邱岑跡存山水君濯濯儀形汪汪軌度珠胎孕月光彩絶倫蘭若銜風幽芳自遠鄉里稱善喻彼少游文籍自娛同夫孟陋遺纍囂滓傲性煙霄簪軒不介於懷寵辱不驚其慮歲臨辰巳鄭康成於是云亡月犯少微謝慶緒俄而致隕春秋七十卒於私第夫人石氏穠荷比秀美箭齊貞宜其室家和如琴瑟翰林之鳥始雙飛而雙飛龍門之桐俄半生而半死嗣子懷爽懷玉岵屺長違霜露增感粵以開元三年歲次乙卯龍集單閼十月己酉朔二十五日癸酉遷窆於介休縣東二十里平原禮也帛丿糸上山傍昭餘澤右懼陵谷而驟易思封樹而永懷乃為銘曰盤根安定散葉汾壖乃祖乃父光後光前惟君節槩業尚虛元鬼瞰庭宇鳥鳴座筵不逢石髓俄歸玉泉一閟邱隴長嗟逝川夫人賀蘭氏曾祖虔隋上柱國祖靜皇朝左千牛父元哲潞州司士並宏翰深識布聲於代夫人即協律之姑女也童姿粉妍笄態瓊淑惟德是與乃賓我裴公宜其鏘鏘和鳴晏晏偕老女也不慝天胡降災綿聯沉痾三浹其歲洎大漸移寢於濟法寺之方丈蓋攘衰也粵翌日奄臻其凶春秋卌有四即開元四年十二月十日至十九日遷殯於鴟鳴塠實陪信行禪師之塔禮也夫怛化妙域歸真香塋衡之冥果則已無量有子大元等或孩提而孤摽以泣嗚呼生人之至艱也裴公傷奉倩之神痛安仁之簟圖範貞石俾光泉門銘曰芙蓉劍兮蛟龍質梧桐枝兮鳳凰匹天何為兮降斯疾俾雌雄兮歡不卒延津女牀奄相失千年萬古哀白日
