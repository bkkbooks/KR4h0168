front:
  text: 全唐文欽定全唐文卷七百五十五杜牧八
  hash: sha256:70642366496442149f3caf246f43b62301c50991b3d93de55147df1903418566
body:
  text: 秀才盧生名霈字子中自天寶後三代或仕燕或仕趙兩地皆多良田畜馬生年二十未知古有人曰周公孔夫子者擊毬飲酒策馬射走兔語言習尚無非攻守戰鬬之事鎮州有儒者黃建鎮人敬之呼為先生建因語生以先王儒學之道因復曰自河而南有土地數萬里可以燕趙比者百數十處有西京東京西京有天子公卿士人畦居兩京間皆億萬家萬國皆持其土産出其珍異時節朝貢一取約束無禁限疑忌廣大寬易嬉遊終日但能為先王儒學之道可得其公卿之位顯榮富貴流及子孫至老不見戰爭殺戮生立悟其言即陰約母弟雲竊家駿馬日馳三百里夜抵襄國界捨馬步行徑入王屋山請詣道士觀道士憐之置之門外廡下席地而處始聞孝經論語布褐不襪捽草為茹或竟日不得食如此凡十年年三十有文有學日間習人事誠敬通達汝洛間士人稍稍知之開成三年來京師舉進士於㣥輩中酋酋然凡曰進士知名者多趨之願與之為交生嘗曰丈夫一日得志天子召於座前以笏畫地取山東一百二十城唯我知其甚易耳因言燕趙間山川夷險教令風俗人情之所短長三十年來王師攻擊利與不利其所來由明白如彩畫一一可以目覩開成四年客遊代州南歸某月日於晉州霍邑縣界晝日盜殺之京師名進士聞之多有哭者資其弟雲至霍邑取生喪來長安以某年月日葬於城南某鄉里其所資費皆出於交遊間曾祖昌嗣涿州刺史祖顗易州長史父勸鎮州石邑令某常以生之材節薦生於公卿間聞生之死哭之因志其墓會昌五年十二月某自秋浦守桐廬路田錢塘龔軺袖詩以進士名來謁時剌史趙郡李播曰龔秀才詩人兼善鼓琴因令操流波弄清越可聽及飲酒頗攻章程謹雅而和飲罷某南去舟中閲其詩有山水間淡之思後四年守吳興因與進士嚴惲言及鬼神事嚴生曰有進士龔軺去歲來此晝坐客館中若有二人召軺者軺命駕甚速始跨鞍馬驚墮地折左脛旬日卒余始了然憶錢塘見軺時徐徐尋思如昨日事因知尚殯於野乃命軍吏徐良改葬於卞山南去州城西北一十五里嚴生與軺善亦不知其鄉里源流故不得記嗚呼胡為而來二鬼驚馬折脛而死哉大中五年辛未歲五月二日記唐佐四帝十九年宰相牛公諱某字某八代祖宏以德行儒學相隋氏封奇章郡公贈文安侯文安後四世諱鳳及仕唐為中書門下侍郎監修國史於公為高祖文安後五世集州剌史贈給事中諱休克於公為曾祖集州生太常博士贈太尉諱紹太尉生華州鄭縣尉贈太保諱幼聞太保生公孤始七歲長安南下杜樊鄉東文安有隋氏賜田數頃書千卷尚存公年十五依以為學不出一室數年業就名聲入都中故丞相韋公執誼以聰明氣勢急於褒拔如柳宗元劉禹錫輩以文學秀才皆在門下韋公亟命柳劉於樊鄉訪公曰願得一相見公乘驢至門韋公曰是矣東京李元禮為後進師隋奇章公仁德祿位二者包而有之公登進士上第元和四年應賢良直諫制數強臣不奉法憂天子熾於武功詔下第一授伊闕尉以直被毀周歲凡十府奏取不下伊闕滿歲郤公士美以昭義軍書記辟凡三上請詔除河南尉拜監察御史丁母夫人憂制終復拜監察御史轉殿中侍御史遷禮部員外郎都官員外郎兼侍御史知雜事改考功員外郎集賢殿學士庫部郎中知制誥賜五品命服半歲遷御史中丞宿州剌史李直臣以贓數萬敗穆宗得偏辭於中稱直臣寃且言有才宰相言格不用公以具獄奏上曰直臣有才可惜公曰彼不才者無飽食以足妻子安足慮本設法令所以縳束有才者祿山朱泚是才過人而亂天下上因可其奏曰善賜章服金紫遷戶部侍郎掌財賦事上益親重欲相之會中書令韓宏男公武謀曰大人守大梁二十年齊蔡誅後始來朝今不以財援中外設有飛一辭者誰與保曰公武齎宏書獻公錢千萬公笑曰此何名為公亟持去明年宏公武繼卒主藏奴與吏訟於御史府上憐宏大臣父子併死稚孫將家事走中使至第盡取財簿自閲視凡中外主權多納宏貨獨朱勾細字曰某年月日送戶部牛侍郎錢千萬不納上大喜以指歷簿遍視旁側曰果然吾不謬知人言訖殿上皆再拜呼萬歲尋以本官平章事明年正位中書侍郎加銀青三品兼集賢殿大學士監修國史敬宗即位與武士畋宴無時徵天下道士言長生事公亟諫曰陛下不讀元元皇帝五千言以清靜養生彼道士皆庸人徒誇欺虛荒豈足師法未一歲請退不許連四月日間以疾辭乃以鄂嶽六州建節號武昌軍命公為禮部尚書平章事為節度使公始至問民疾苦皆曰城土疏惡歲輸襄竹為苫具姦吏旁緣主為侵取費與稅等歲久前後政欲畫計策訖無所施公即除去冗長用公私錢陶磚甃城凡五年乃就明年文宗即位就加吏部尚書明年急徵拜兵部尚書平章事重拜中書侍郎宏文館大學士鄭注怨宋丞相申錫造言挾漳王為大逆狀迹牢密上怒必殺公曰人臣不過宰相今申錫已宰相假使如所謀豈復欲過宰相有他圖乎臣為中丞愛申錫忠良奏為御史申錫之心臣敢以死保之上意解由是宋不死大和六年西戎再遣大臣贄寶玉來朝禮倍前時盡罷東嚮守兵用明臣附李太尉德裕時殿劒南西川上言維州降今若使生羌三千人燒十三橋搗戎腹心可洗久恥是韋臯二十年至死恨不能致事下尚書省百官聚議皆如劍南奏公獨曰西戎四面各萬里來責曰何事失信養馬蔚茹川上平涼坂萬騎綴回中怒氣直辭不三日至咸陽橋西南遠數千里雖百維州此時安可用棄誠信有利無害匹夫不忍為况天子以誠信見責於夷狄且有大患上曰然遂罷維州議大和六年檢校右僕射平章事淮南節度使經六年至開成二年連上章請休官詔益不許公曰臣惟退罷可以行志夏五月以兵付監軍使拜疏訖就道除檢校司空留守東都明年拜左僕射上恐公不起詔曰朕比有疾良已思一面敘公不得已至闕下一拜謝閉門不出明年檢校司空平章事襄州節度使出都門賜黃彞樽龍杓凡六品名出周禮詔曰精金古器用以比况君子非無意也襄州七年饒假軍人入賦不一公至據地造籍免貧弱四千萬均入豪強皆曰甘心不出一怨言明年武宗即位就加司徒會昌元年秋七月漢水溢堤入郭自漢陽王張柬之一百五十歲後水為最大李太尉德裕挾維州事曰修利不至罷為太子少師未幾檢校司徒兼太子少保明年以檢校官兼太子太傅留守東都劉禎以上黨叛誅死時李太尉專柄五年多逐賢士天下恨怨以公德全畏之言於武宗曰上黨軋左京控山東劉從諫父死擅之十年後來朝加宰相縱去不留之致禎叛竭天下力乃能取此皆公與李公宗閔為宰相時事從諫以太和六年十二月十七日拜闕下實以其月十九日節度淮南明年正月從諫以宰相東遷河南少尹呂述公惡其為人述與李太尉書言禎破報至公出聲歎恨上見述書復聞前縱從諫去謺二怒不一參校自十月至十二月公凡三貶至循州員外長史天下人為公挼手吒罵公走萬里瘴海上二年恬泰若無一事今天子即位移衡州汝州長史遷太子少保少師凡四年復位大中二年十月二十七日薨於東都城南別墅年六十九天子恫傷不朝兩日册贈太尉天下善人執手相弔哭公忠厚仁恕莊重敬慎未嘗以此八者自勉而終身益篤為宰相急於銓品凡名清官不忍持一資以假非其人以道德謨於天子每指古義為據有言機利克迫必鈲名使之摧破三大邦去苛碎條約除大患其輕巧吏欲賊公愛惡希嚮所為渾然終不能見故所至必大治衣冠單窮出俸錢嫁其子女月與食歲與衣資送其死喪凡數百家李太尉志必殺公後南謫過汝州公厚供具哀其窮為解説海上與中州少異以勉安之不出一言及於前事鎮武昌時軍容使仇士良為監軍使公律以禮敬暑甚大合軍宴拱手至暮一不搖扇益自儉克平居非公事不出內屏周三歲語言舉止率有常度仇軍容開成末首議立武宗權力震天下每言至公必合手加顙曰清德可服人但過吝官財與人無一毫恩分耳不肯引譽不敢怨毀淡居其中公始自河南薦鄉貢士為郎官考吏部科目選三開幕府中丞宰相外凡取六十餘人上至宰相次布臺閣皆當時名士每暇日宴語寮吏必言古人修身行事旁誘曲指微警教之不以己所長人所不及裁量高下以生重輕後進歸之承望聲光得一言許可必自矜重夫人辛氏以公封張掖郡贈僕射祕之長女士林稱為婦師凡三十年前公八年歿五男六女長曰蔚監察御史次曰藂浙南府協律郎皆以文行登進士第不藉公勢次曰奉倩河南府洛陽尉二人皆雅齒長女嫁戶部郎中上黨苗愔次女嫁河中節度副使檢校郎中范陽張洙次女嫁河南府戶曹集賢校理常山張希復次女嫁前進士鄧叔次女未笄一人始數歲以某年月日葬少陵南某鄉某里銘曰道既訛衰必有以扶厥公之生以隆其汙幽以燭明暵以雨濡以教其徒以佐天子滅絶霸駮如有樞柅摽揭峙倚巍乎二紀臣宗德老巨傑魁礨孰為忌畏潛去南海不校不辨旋復顯大百行渾圓鄰於及年以歸其全周平王次子烈封汝墳侯秦以汝墳為汝南郡侯之孫因家焉遂姓周氏自烈十八世至西漢周仁繼烈封侯其後逃西晉亂南去黃岡靈起仕梁為桂州剌史生炅在陳為車騎將軍炅生法明年十二一命為巴州剌史陳滅臣隋為趙之真定令隋亂歸黃岡起兵取蘄安沔黃武德中籍四州地請命授總管蘄安十六州軍事光祿大夫封國於道太宗命虞世南銘書墓碑相國為六代孫曾祖惲汝州梁縣令祖沛左拾遺皇考頲右驍衛兵曹參軍贈禮部侍郎公少孤奉養母夫人以孝聞舉進士登第始試祕書正字湖南團練巡官母夫人亡哭泣無時里人過公廬曰無驚周孝子後自留守府監察真拜御史集賢殿學士李公宗閔以宰相鎮漢中辟公為殿中侍御史行軍司馬後一年復以殿中書職徵歸時大和末注訓用事夏六月始逐丞相宗閔立朋黨語鉤挂名人凡百日逐朝士三十三輩天下悼懾以目受意附凶者屢以公為言注訓曰如去周殿中恐人益驚竟不敢議注訓取公為起居舍人文宗復二史故事公濡筆立石螭下丞相退必召語旁側窺帝每數十顧遷考功員外郎帝曰周某不可不見宜兼前官數月以考功掌言事謝日帝曰就試翰林公辭讓堅懇帝正色以手三麾之遂兼學士遷職方郎中中書舍人政事細大必被顧問公終身不言事故不傳武宗即位以疾辭出為工部侍郎華州剌史八禁軍二十四內司居華下者籍役等百姓不敢妄出一辭李太尉德裕伺公纎失四年不得知愈治不可蓋抑遷公江西觀察使兼御史大夫公既得八州施展教令申明約束發虔守陳弇贓坐弇以法死吏手膠拳窮鄉遠井如公在旁縛出洞寇劉大朴大朴徒數百人斸撥根脈無有遺失彭蠡東口戌五百人上下千里無一賊迹遷禮部尚書鄭滑節度使老將某項領不如教約公鞭背降為下卒聲北入魏皆曰周尚書文儒能治百姓仁愛兵士而復敢爾是豈可一犯九歲入拜兵部侍郎度支兼戶部吏曹事積邊糧穀九十萬石今天子即位二年五月以本官平章事後一月正位中書侍郎監修國史就加刑部尚書因河湟事議不合旨以檢校刑部尚書出為劍南東川節度使明日入謝面加檢校右僕射公自舉進士第非其人不交言旁睨後進鐫心鏤志及為將相近取遠挽悉置於位李太尉德裕會昌中以恩撰元和朝實録四十篇溢美其父吉甫為相事公上言曰人君惟不改史人臣可改乎元和實録皆當時名士目書事實今不信而信德裕後三十年自名父功衆所不知者而書之此若垂後誰信史竟廢新本并帥王宰剷所部財貨承事貴幸自請來朝聲言我取平章事鎮大梁公上言曰宰破太原取汴梁不知天下治所凡幾得如太原汴之大者可飽宰欲乞宰還鎮自補其殘後二日還宰詔下駙馬都尉韋讓求為京兆尹公言曰尹坐堂上階下拜二赤縣令屬官將百人悉可笞辱非有德者京兆不可為豈止取吏事讓議竟寢自此非道求進者鼠遁自屏及鎮東蜀一歲欲歸間洛師微得風恙公曰我今去是以疾去疾愈去非晚大中五年歲在辛未二月十七日薨於位享年五十九訃至廢朝三日册贈司徒命諫議大夫盧懿弔恤其家公信於朋友公於為官事嫠姊出告反面家事不敢自專同曾祖兄弟入門呵笞奴婢衣服飲食無二等免相位西去送公還者雖武將散秩嘆息咨嗟曰周相公無私我惜其去豈有私乎夫人義興蔣氏先公某年終生二男一女長曰寬饒崇入校書次曰咸喜京兆參軍皆孝謹有文學女嫁起居舍人薛蒙大中六年歲次壬申二月十三日歸葬先塋河南府河陽縣穀陽鄉立行里銘曰姬之支封國自為姓以周為氏入唐不盛烈後幾世厥生賢孫當唐中興為唐相臣文思天子跨古為治提起王道以公為倚迒蹊隙竅去者鳥駛誰塞誰勞公評指三屏大邦駿壯武事哺撫稚老父母赤子曰將曰相公其愧幾指古為比公其無愧以公遺唐而後公死不錫壽考誰其辨之韋公會昌五年五月頭始生瘡召子壻張復魯曰三稚女得良壻死以是託墓宜以池州剌史杜牧為志復魯曰公去歲兩瘡生頭今始一尚微何言之深公曰吾年二十九官校書郎時嘗夢涉滻水既中流有二人若舉符召我者其一人曰墳墓至大萬日始成今未也今萬日矣天已告我我其可逃乎謝醫不問以其月十四日年五十八薨於位公從父弟某書公功行以公命來命牧牧位哭序且銘之公諱溫字宏育韋氏自殷周秦漢邱明馬遷班固輩爭書其人以光其所為書至後周逍遙公敻出世家富貴中隱身行道當其時及後代論者以蜀嚴鄭谷口不能為比逍遙公五世生潞州上黨尉贈諫議大夫希元上黨生吏部侍郎贈太尉肇吏部生右補闕翰林學士右散騎常侍致仕贈司空綬常侍生公於逍遙公為九代孫年十一以明經取第為太常寺奉禮郎祕書省校書郎選判入等咸陽尉監察御史公曰是官豈奉養所宜耶上疏乞免改著作佐郎當貞元中常侍公事德宗為翰林學士帝深於文學明察人間細微事事有密切多委之歲久憂畏病心帝曰某之心我其盡之以致仕官屏居西郊公早夜侍側溫凊飲食迎情解意一經心手積二十餘年丁常侍喪自毀不欲生後相國李公逢吉以相印鎮武昌皆虛上職書卑辭至門公起赴武昌未至府拜監察御史遷左補闕事文宗皇帝時宰相百吏願條帝功德撰號上獻公獨再疏曰今蜀之東川川溢殺萬家京師雪積五尺老幼多凍死豈崇虛名報上帝時耶帝乃止遂訖十五年不答尊號事改侍御史尚書吏部考功員外郎當大和九年文宗思拔用德行超出者以警雙天下故公自考功不數月拜諫議大夫召為翰林學士遂欲相之公立銀臺外門下拜送疏入具道先常侍遺誡子孫不令任密職言懇志決乃命掌書舍人閣下公復堅讓不半歲轉太常少卿一歲遷給事中皇太子侍讀公復陳先誡以侍讀辭自宰相下皆曰帝以一子請教於公是宜避耶公不聽凡拜三章帝終不能奪靈武節度使王晏平罷靈武以戰馬四百匹兵器數萬事去罪成貶康州司戶不旬日改撫州司馬仙韶院樂官尉遲璋以樂官授光州長史晏平以財賂貴幸璋太有寵於上公皆封詔書上還上比諭之公持益急竟以康州還晏平璋免長史莊恪太子得罪上召東西省御史中丞郎官於內殿悉疏莊恪過惡欲立廢之曰是宜為天子乎㣥公低首唯唯公獨進曰陛下唯一子不教陷之至是太子豈獨過乎上意稍平不數日遷尚書右丞朱衣魚章遷兵部侍郎亟請丞相願為治人官出為陝州防禦使兼御史大夫服章金紫回鶻窺邊劉楨繼以上黨叛東徵天下兵西出禁兵陝當其衝公撫民供事就不兩告苦入為吏部侍郎典一冬選老吏無所賣復以御史大夫出為宣歙池等州觀察使賦多口衆最於江南公急惡寬窮益自儉苦刑律其俗凡周一歲無所更改自至大治公幼不戲弄冠為老成人解褐得官超出㣥衆中人不敢旁發戲嫚及為公卿在朝廷省閣中大臣見公若臨絶壑先忖度語言舉止然後出發其所執持不可者筆一落紙言一出口雖天子宰相知不能奪俯委遂之不以德行尚人人自敬畏不施要結於人人自親慕後進凡持節業自許者獲公一言矜奮刻削益自貴重官卑家貧時主將家事在私閫內高曾兄弟鐫琢教誘嫁娶衣食無有二等疾甚將終悉召親屬賓吏稱先常侍詩句云在室愧屋漏因曰今知沒身不負斯誡遂涕下不禁當夫子世得七十子國小俗儉復有聖人為之師使生於今與公相後先必有能品之者夫人隴西李氏贊善大夫慫之女先公四歲終生四男長曰礭前國子監四門助教次曰璆前明經次曰瓖次未免乳女四人長嫁南陽張復魯復魯得進士第有名於時為試太常寺協律郎鄂嶽觀察支使其下皆稚齒相次銘曰德則至矣位以充乎如其充兮可大厥功以施生人天先告之萬日之期天實為之君諱方元字景業刑部尚書贈司空貞公長子貞公事憲宗皇帝兄弟受寄四鎮在漢南時戰淮西未利監軍使崔談峻讒言中入為太子賓客後淮西平李光顏移鄭滑陳許無帥帝間宴獨言曰徑兵三萬誰可付者談峻侍側曰有大臣家不三十口俸錢委庫不取小僮跣足市薪此可乎帝曰誰為者談峻進即以貞公言帝即日起貞公為陳許帥其儉德服人如此景業少有文學年二十四一貢進士舉以上第升名解褐裴晉公奏以祕書省校書郎校集賢殿祕書聰明才敏老成人爭與之交後以協律郎為江西觀察支使裴誼觀察判官有殺人獄法曹官斷成當死者十二人景業訊覆數日內雪十二人寃尚書以上下考奏裴公移宣城授大理評事團練判官後尚書馮公宿自兵部侍郎節鎮東川以監察裏行為觀察判官不一歲御史府取為真御史分察鹽池左藏吏盜隱官錢千萬獄竟遷左補闕遇事必言不知其他丞相固言以門下侍郎出鎮西蜀奏景業以檢校禮部員外郎參節度軍謀事仍賜緋魚袋徵拜起居郎出為池州剌史始至創造籍簿民被徭役者科品高下鱗次比比一在我手至當役役之其未及者吏不得弄景業常嘆曰沈約身年八十手寫簿書蓋為此也使天下知造籍役民民庶少活復定戶稅得與豪滑沈浮者凡七千戶裒入貧弱不加其賦堤州南五里以涉為衢凡裁減蠹民者十餘事城東南隅樹九峯樓見數十里鑿齊山北面得洞穴怪石不可名狀刊石於巖下自紀其事凡四年政之利病無不為而去之罷去上道老民攀哭景業季父刑部侍郎建與貞公以德行文學俱高一時時之秀俊半歸李氏門下景業復聰明少鋭儉苦溫謹早與長者遊備知天下之所治實慨慷有意於經綸少在諸侯府入為朝官出為剌史早夜勤苦為學不已屈指計量必伸已志雖時之名士亦以此許之罷池廉使韋公溫館於宣城會昌五年四月某日卒於宣城客舍年四十三七代祖遠後周柱國大將軍都督熊陜十六州陽平郡公曾王父珍玉綿州昌明令昌明生震雅州別駕贈右僕射僕射生貞公遜先夫人滎陽鄭氏贈本縣太君後夫人范陽盧氏男若干女若干人銘曰顯莫識其端幽莫見其緒已乎景業何付與之多而奪之何遽天顏病冉孔子不知其故於景業兮杳欲何語嗚呼哀哉亡友邢渙思諱㣥牧大和初舉進士第於東都一面渙思私自約曰邢君可友後六年牧於宣州事吏部沈公渙思於京口事王并州俱為幕府吏二府相去三百里日夕聞渙思佽助并州巨細合宜後一年牧奉沈公命北渡揚州聘丞相牛公往來留京口并州峭重入幕多賢士京口繁要遊客所聚易生譏議并州行事有不合理言者不入渙思必能奪之同舍以為智不以為顓并州以為賢不以為僭侵遊客賢不肖不能私論議以一辭公事晏歡渙思口未言足未至缺若不圓牧曰往年私約邢君可友今真可友也盧丞相商鎮京口渙思復以大理評事應府命今吏部侍郎孔溫業自中書舍人以重名為御史中丞牧以補闕為賀客孔吏部曰中丞得以御史為重輕補闕宜以所知相告牧以渙思言中丞曰我不素知願聞其為人牧具以京口所見對後旬日詔下為監察御史會昌五年渙思由戶部員外郎出為處州時牧守黃州歲滿轉池州與京師人事離濶四五年矣聞渙思出大喜曰渙思果不容於會昌中不辱吾御史舉矣渙思罷處州授歙州牧自池轉睦歙州相去直東西三百里問來人曰邢君何以為治曰急於束縳黠夷冗事弊政不以久遠必務盡根本牧曰邢君去縉雲日稚老泣送於路用此術也復問間日何為曰時飲酒高歌極歡牧曰邢君不喜酒今時飲酒且歌是以不用繫慮而不快於守郡也復問曰日食幾何曰嗜彘肉日再食牧凡三致專書曰本草言是肉能閉血脈弱筋骨壯風氣嗜之者必病風數月渙思正握管兩手反去背仆于地竟日乃識人果以風疾廢舟東下次于睦兩扶相見言止不能拜語及家事曰為官俸錢事骨肉親友隨手皆盡蓋壯未期病病未期死今病必死未死得生至洛幸矣妻兒不能知矣君進士及第歷官九歷職八始太子校書郎協律郎大理評事監察御史京兆府司録殿中侍御史戶部員外郎處州剌史歙州剌史職為浙西團練巡官觀察推官度支巡官再為浙西觀察推官轉支使為戶部員外郎判度支案代劉禎為制使使鎮魏料軍食賜緋服銀章初副李丞相回再副高尚書銖撫安上黨三面征師大和三年六月八日卒於東都思恭里年五十邢氏周公次子靖淵封為邢侯國滅因以為氏西漢宇為太尉子綏為司空曾孫世宗光武時為驃騎將軍世宗元孫禺因居河間禺當曹魏時參太祖丞相事終於太常邢有河間南陽君實河間人太常後也後至晉魏巳降皆有官祿唐麟臺郎中舉於君為曾祖麟臺生奉天令待封奉天生緱氏丞至和君即緱氏子兩娶前夫人隴西李氏忠州剌史佐次女今夫人南陽張氏壽州剌史植女四男曰懌丨皆溫郎壽郎用某年某月某日葬于偃師縣某鄉某里某原葬有月日其孤立使者哭告於柩來京師請銘銘曰十五知書二十有文三十登進士五十終剌史才能溫良并包與之而止於斯七政在天一回一旋差以氂數能窮知賢賢者多天不肖壽考誰為聖魁孔不能究無可奈何付之以命曰如命何牧大和元年舉進士及第鄉貢上都有司試於東都在二都㣥進士中往往有言前十五年有進士李飛自江西來貌古文高始就禮部試賦吏大呼其姓名熟視符驗然後入飛曰如是選賢耶即求貢如是自以為賢耶因袖手不出明日徑返江東牧曰誠有是人吾輩不可得與為伍矣後二年事故吏部沈公於鍾陵宣城為幕吏兩府凡五年間同舍生蘭陵蕭置京兆韓乂博陵崔壽每品量人之等第必曰有道有學有文如李處士戡者寡矣是卑進士不舉嘗名飛者牧益恨未面其人且喜其人之在世也大和九年為監察御史分司東都今諫議大夫李中敏左拾遺韋楚老前監察御史盧簡求咸言於牧曰御史法當檢謹子少年設有與遊宜得長厚有學識者因訪求得失資以為官洛下莫若李處士戡牧謝曰素所恨未見者即日造其廬遂旦夕往來開成元年春二月平盧軍節度使王公彥威聞君名挈卑辭於簡副以幣馬請為節度巡官明年春平盧府改君西歸病於路卒於洛陽友人王廣思恭里第享年若干君諱戡字定臣七代祖渤海王奉慈祖杠衢州盈川令父䔲婺州浦陽尉浦陽晚無子夫人吳興沈氏夢一人狀甚偉捧一嬰兒曰豫為孔邱以是與爾及期而生君因名曰天授君幼孤旁無㣥從可以附託年十餘歲即好學寒雪拾薪自炙夜無燃膏默念所記年三十盡明六經書解決微隱蘇融雪釋鄭元至于孔穎達輩凡所為疏注皆能短長其得失一舉進士恥不肯試歸晉陵陽羡里得山水居之始開百家書緣飾事業每有小功喪訖制不食肉飲酒語言行止皆有法度陽羡民有鬬諍不決不之官人必以詣君所著文數百篇外於仁義一不關筆嘗曰詩者可以歌可以流於竹鼓於絲婦人小兒皆欲諷誦國俗薄厚扇之於詩如風之疾遠嘗痛自元和以來有元白詩者纎豔不逞非莊士雅人多為其所破壞流於民間疏於屏壁子父女母交口教授淫言媟語冬寒夏熱入人肌骨不可除去吾無位不得用法以治之欲使後代知有發憤者因集國朝以來類於古詩得若干首編為三卷目為唐詩為序以導其志居江南秀人張知實蕭置韓乂崔壽宋邢楊發王廣皆趨君交之後皆得進士第有聲名官職君尚為布衣然於君不敢稍怠君在洛中困甚河陽節度使蕭洪移鎮鄜州諫議大夫蕭俶以君言於洪洪素敬諫議即欲謁君以請君曰人間譁言洪盜籍外戚一窺其面能易吾死尚且不忍死况為其黨乎居數月洪果敗娶宏農楊氏女早卒子二人長曰審之次曰鼎郎始五歲以某年月權葬於常州義興縣某鄉里某於君為晚交得君最厚因為之銘曰命如煙雲道比宮宅煙雲飄揚莫知往來為道不至無以偃息有道有命偶然相值命不在我不肖亦貴豈可指此與彼為市嗚呼定臣曰德孔修曰學必聖飭我兢兢一不言命可傳其心以教後生嗚呼哀哉君諱顗字勝之曾祖涼州節度使襄陽公贈左僕射希望大父司徒平章事太保致仕岐國公贈太師佑皇考駕部員外郎贈禮部尚書從郁君幼孤多疾目視昏近先夫人不令就學年十七讀尚書十三篇禮記七篇漢書止賈誼傳不復執卷年二十四明年當舉進士始握筆茸闕下獻書與裴丞相度書指言時事書成各數千字不半歲遍傳天下進士崔歧有文學峭澀不許可人詣門贈君詩曰賈馬死來生杜顗中間寥落一千年年二十五舉進士二十六一舉登上第時賈相國餗為禮部之二年朝士以進士干賈公不獲有傑強毀嘲者賈公曰我祇以杜某敵數百輩足矣始命試祕書正字匭使判官李丞相德裕出為鎮海軍節度使辟君試協律郎為巡官後貶袁州語親善曰我聞杜巡官言晚十年故有此行大和九年夏君客揚州六月授咸陽尉直史館君曰訓注必亂可徐行俟之至汴二凶敗及洛以疾辭東下居揚州龍興寺丞相奇章公僧儒請君入幕府君謝曰李公在困未願副知己開成二年春目益昏冬遂喪明李為淮南節度使復請為試評事兼監察御史支使兄牧自馮翊迎醫石至曰是狀腦脂下融名曰內障如蠟塞管蠟去管明俟脂凝可以抉去無不愈者後二年石曰可治治不效自馮翊別迎醫醫曰嗟乎障有赤脈如木根橫去牢不可斷是法名曰日腳內障生日腳者法不可治君因居淮南築室治生不復言治眼事聞於天下無不嗟嘆君安泰自如令人旁讀十三代史書一聞不遺客來與之議論證引聽者忘去年四十五大中五年二月二十五日卒一男曰麟師年十歲女曰署兒始五歲六年二月八日歸葬先塋實萬年縣洪源鄉少陵西南二里牧今年五十假使更生十年為六十人不夭矣與君別止三千六百日爾况早衰多病敢期六十人乎忍不抑哀以銘吾弟銘曰古之達人以生為寄為夢以死為歸為覺不知生偶然乎其有裁受乎偶然即泯為大空與不生同其有裁受乎嗚呼勝之今既歸而覺矣其自知矣何為而然乎嗚呼哀哉公諱銓字謹夫河西隴右節度使襄陽公贈司空之曾孫司徒歧國公贈太師之孫司農少卿贈給事中之子公以岐公蔭調授揚州參軍同州馮翊縣丞衛尉寺主簿鄂州江夏縣令復州司馬年六十某年月日終於漢上別業岐公外殿內輔凡四十年貴富繁大兒孫二十餘人晨昏起居同堂環侍公為之親不以進門內家事條治裁酌至於筐篋細碎悉歸於公稱謹而治自罷江夏令卜居於漢北泗水上烈日笠首自督耕夫而一年食足二年衣食兩餘三年而室屋完新六畜肥繁器用皆具凡十五年起於墾荒不假人一毫之助至成富家翁常曰忍恥入仕不緣妻子衣食者舉世幾人彼忍恥我勞力等衣食爾顧我何如後授復州司馬半歲棄去終不復仕以某月日歸葬於長安城南少陵原司馬村先塋某為從父弟泣涕而書銘曰公侯之家所業唯官薄官業農墾荒室完入仕多恥以農力勞等衣食爾勞力者賢歸全故邱慶期孫子君諱希顏字某裴氏於百氏中獨標其族曰眷三分之為東西中君東眷裴在國朝名位最大曰冕艱難中定册立肅宗於靈武而相之繼相代宗僅十五年國史有傳冕於君為堂伯祖父皇考某終朗州刺史娶宣州寧國公滎陽鄭某女生四男君為首生朗州為厔河西令道朗二州刺史公廉剛簡強於愛人凡關百姓一毫事與京兆尹節度使爭論大聲於庭府間前如無人然未嘗以仗責治家家人有過失則諭之諭不變者出之為良人終不忍牽鬻於市將終鄭夫人泣請遺令曰吾之廏騾為厔時役之今踰十年聽其老死慎不可賣言訖而絶君生寖染仁父之化溫良柔友窮居鄠縣飢寒餘二十年未嘗出一言以慍不足司農卿裴及為雍府經略使辟君為從事得南方疾歸大中二年某月日卒於其家享年若干不娶無子牧娶裴氏實君之私其弟覺泣來請銘銘曰淑其性生無位死無子孰識其端
