front:
  text: 全唐文欽定全唐文卷一百八十王勃四
  hash: sha256:dcc75a5dda9b008a1fbfda08be3cb779d06af309cf9ea0a242a32a224a1e0990
body:
  text: 某啓一昨弟勛至奉命以憲臺詩十首垂示氣橫霜署彩洞雲扃繡衣兼藻肆之華白簡控元機之奧仙驄在馭踐文路而驅神冠獬下臨望詞林而直指某質惟茅艾名隔搢紳虛霑自出之榮每愧諸甥之列恩華曲被誨誘傍臨識謝知音榮深覩奧虞韶忽奏聽律呂而忘疲楚匣遙開仰光芒而不暇昔孔融之逢元禮罕覩高文王粲之謁伯喈終慚懿戚援今企古議德疇恩荷栗兼儲悲欣兩集但才非酷似攀宅相而多慙慕切如存臨渭陽而增感不勝荷戴屏營之至某啓某聞元螭掩耀光銷赤堇之芒白鶴摧輝影滅青胡之寶由是紫氛霄耿指牛漢而忘歸丹水神迷道驪泉而罔悔其有龍文已遠輕圖剸兕之功魚目濫持自擬靈蛇之色循榮覽分朝聞夕可君侯締華椒閣席寵芝扃粲貂冕於金軒藻龜章於玉署月開鸞鏡懷精鑒以分形霜湛虬鐘蘊希聲而待物吞九溟於筆海若控牛涔抗五嶽於詞峯如臨蟻垤馳魂霧谷欣逢紫岫之英驛思霞邱佇接青田之響某北巖曲藝東皋下節攀翰苑而思齊傃文風而立志迹疲千里未陪丹轂之遊葉契三英尚隔黃衣之夢謹憑洪貸輒録舊文輕敢上呈列之如右涓波有託望日谷以馳誠鐘鼓無施伏雷門而假息謹啓某啓一昨不緣媒紹輕承盼飾祗寵相驚俯仰無地何則循方極弊尚虧風雨之間撫翼濡鱗猶失江湖之上况乎九天鵬術一代龍門榮枯舛致山川在目而可以追騰白日忘言於咫尺之書干突青雲投跡於尋常之境徒以北林增秀弱翰知歸東壑流謙纖鰭未已神交道合君侯昭片善之榮千載一時下走得長鳴之所是用謬憑高獎曲撰蕪音游海無際過雷自讋雖黃金激憤指秦路而方窮蒼璧慙恩伏焦原而未遠謹啓某啓某聞林騰秀羽族知歸暘谷流謙波臣有託然則朝光八聖尚欣牧豎之詞道濟五殘未隔輿人之誦謹憑斯義輒呈宸遊東嶽頌一首當仁不讓下走無慙於自媒聞善若驚明公豈難於知我龍門高遠眇黃道而無階爵里既投叫丹閽而有地伏願暫停左右曲流國士之恩廣進芻蕘俯息樵夫之議輕陳徑捷退用倣徨某啓一昨奉命令寫新對臺策及前後舊文謹憑國士之恩敢進輿人之頌竊以龍鑣就路駑駿相懸鵲鏡臨春妍媸自遠亦有飛霜匝地蘭蕭銜共盡之悲列火埋岡玉石抱俱焚之慘然則知音罕嗣流水空存至寶不同荊山有淚君侯飾揚芻議提獎蕪詞白圭成再見之榮黃金定一言之重鵬飈既接仰雲徑而將趨龍阪可登指星臺而有望循襟佩德撫事知恩山嶽有輕河漢無極謹啓某啓自恭陳薄伎祗奉話言咳唾成恩盼睞為飾征夫擊節方思孤竹之風壯士寒心實有長楊之作謹憑嚴命輕呈乾元殿頌一首將冀導江至海常以筆札見知南館西園遂與簪纓為伍德雖無盡攀驥尾而方遙生也有涯比鴻毛而非重謹啓某啓猥承衡鏡驟照階墀本慙刀筆之工虛荷雕蟲之眷殊恩屢及嚴命頻加責光耀於昏冥課宮商於寂寞進退惟谷憂喜聚門誠恐下官冒輕進之譏使君侯招過聽之議貴賤交失恩愛兩虧所以戰懼盈旬遲回改朔懷鄭璞而增愧捧燕珉而自恥某性惟懵昧識謝沈冥蒙父兄訓導之恩藉朋友琢磨之義好學近乎智力行近乎仁知忠孝為九德之源故造次必於是審名利為五常之賊故顛沛而思遠雖未之逮也亦有其志焉孔子曰言及之而不言謂之隱今者接君侯者三矣承招延者再矣抑亦可以言乎夫文章之道自古稱難聖人以開物成務君子以立言見志遺雅背訓孟子不為勸百諷一揚雄所恥苟非可以甄明大義矯正末流俗化資以興衰國家由其輕重古人未嘗留心也自微言既絶斯文不振屈宋導澆源於前枚馬張淫風於後談人主者以宮室苑囿為雄敘名流者以沈酗驕奢為達故魏文用之而中國衰宋武貴之而江東亂雖沈謝爭騖適足兆齊梁之危徐庾並馳不能止周陳之禍於是識其道者卷舌而不言明其弊者拂衣而徑逝潛夫昌言之論作之而有逆於時周公孔氏之教存之而不行於代天下之文靡不壞矣國家應千載之期恢百王之業天地靜默陰陽順序方欲激揚正道大庇生人黜非聖之書除不稽之論牧童頓顙思進皇謀樵夫拭目願談王道崇大厦者非一木之材匡弊俗者非一日之衛衆持則力盡真長則僞銷自然之數也君侯受朝廷之寄掌鎔範之權至於舞詠澆淳好尚邪正宜深以為念者也伏見銓擢之次每以詩賦為先誠恐君侯器人於翰墨之間求材於簡牘之際果未足以採取英秀斟酌高賢者也徒使駿骨長朽真龍不降衒才飾智者奔馳於末流懷真蘊璞者棲遑於下列易不云乎言行君子之所以動天地失之毫釐差以千里書不云乎敝化奢麗萬世同流餘風未殄公其念哉嗟乎蓋有識天人之幽致明國家之大體辨焉而不窮酌焉而不竭抱膝無悶盱衡自得彼悠悠小技焉足為君侯道矣自非奉閒宴接清談未可一二言也然竊不自揆嘗著文章非敢自媒聊以恭命謹録古君臣讚十篇並序雖不足塵高識之門亦可以見小人之志也伏願暫停左右少察胸襟觀述作之所存知用心之有地謹啓某啓側聞金烏聳轡俯圓燧而抽光瑤兔浮輪候方諸而吐液斯則洪纖異數冥符造化之津高下相懸精契陶鈞之表故知聲同義合存長幼於三州理隔氣殊置山川於一面神交可託風雲於杵臼之間道不虛行涇渭於簪裾之列其有跡申知已投爵里於思齊事迫當仁抱龍泉而願割雖荊山已峻多輕抵鵲之珍而渤澥方春敢進歸鳧之影伏惟丈人珠躔降德銑社抽英河嶽縱其神器煙霞發其符采江東第一家傳正始之音日下無雙譽重名流之首三冬文史先兆跡於青襟百里絃歌即馳芳於墨綬彭澤陶潛之菊勝氣仍存河陽潘嶽之花芳風遂遠榮加徙秩上膺蘭府之遊寵奪攀輪更掌蓬山之務麟圖緝諡定榮辱於三泉鵷閣裁書考薰蕕於四部既鶴鳴雲路望偃朝端鴻漸星臺俯諧僉議廉平譽號李宣伯之當官雅操繩時山巨源之稱職加以文場武庫發揮廊廟之師瓊樹瑤林寥廓風塵之表一邱一壑同阮籍於西山一嘯一歌列嵇康於北面詞條鬱霧遙騰駕日之陰辨鍔橫霜直上衝星之氣鳧鐘蓄韻聞片言而指掌鸞鏡懸心見一善而明目情源九派士流欣滿腹之期德宇千門詞人有庇身之望方當坐談帝席雄視㣥公豈徒比跡天府雌伏郎官而已哉某崇徽啓緒盛德傳家承太子之仙宗析將軍之遠系朱輪在漢列高士於三台青蓋浮江扈平王於七姓遺風舊烈尚存清白之基祖德家聲代有縱橫之目及金陵東覆玉馬西奔髦頭傑起文儒繼出鳳鳴朝日森梢煙雨之標龍躍雲津盤礡江山之氣雖雄名雅譽隨朔野而揚聲而華冕雕軒比南風而不競陳太邱之積善羔鴈成㣥謝車騎之餘芳蘭蓀不替趨庭洽訓共歌朱萼之篇避席成歡猶守青箱之業嘗謂酣神北阜藉春渚而忘歸動影南櫺坐秋山而長往不意蘭皋獨嘯輕交委鶴之書芝澗行謠坐辱飛龍之使年殊賈誼仰宣室而方同業謝劉繇俯長途而遂恧塞上浮雲之跡空倦吳山隋侯明月之珠終悲暗室豈不知拂衣長謝林泉多倦俗之因安枕有餘廟堂非養高之所松楹坐月臨黛壑而遐征桂席攀風俯青岩而自足而欲俯首屈膝逡巡多士之林弔影慙魂骯髒文昌之府徒以牛蹄已倦臨大壑而驤鱗羊角可逢想高衢而撫翼參名國士方叨智伯之恩揮迹奉常冀雪公孫之恥識正平於處士雖在孔融期仲容於望外終資許允猶恐先馳折翮頻驚鶂路之風再舉枯鱗空擊龍門之水丈人借以顏色資以恩波垂雅契於長年敘情交於纍代情加倒屣知頃步之生光禮極升堂覺聲名之有地是用俯抽丹思上瀆清顏鏤殊獎於肝膽銜德音於咳唾懦夫增氣先歌易水之風壯士投心思赴吳門之火恩崇命淺瞻呂梁而可從山高海深陟孟門而何險謹啓某啓自違隔恩華嬰纒風恙守愚空谷斂跡仙臺同衛玠之虛羸談非正始愧劉楨之逸氣臥似漳濱朝野既殊風猷遂隔望芝蘭之漸遠覺鄙吝之都生所以暫下松邱言遊洛邑永懷前眷逡巡元禮之門延首下風匍匐文章之府實願稍捐人事少奉清言質儒釋之幽疑訪空元之極境願聞者道敢披江海之心祈進者榮非慕軒裳之重雖齒絶位殊空塵左右而道存目擊豈隔形骸輕陟階堂伏深悸越謹啓某啓某聞古之君子重神交而貴道合者以其得披心胸而盡志義也是以叔牙苟在管仲分多而不貪無知尚存陳平受謗而非罪何則達其趣者能申其迹收其大者能讓其細也今某東鄙之一書生耳少懷耿亮頗慕高烈俯仰相得則屠博可遊造次不諧則軒冕異路蒙君侯國士之遇受君侯長者之禮繾綣談謔殷勤誨誘今有情而不告是不盡也有窘而不託是有疑也將恐季布無侶於後葉孫臏獨稱於前古嗟乎可以竭誠矣敢不盡言乎勃家大人天下獨行者也性惡儲斂家無儋石自延國譴遠宰邊隅常願全雅志於暮齒揚素風於下邑而道里敻遙資糧窘鮮秩寡鍾釜債盈數萬此勃所以側目扼腕臨深履薄庶逢知已之厚以成大人之峻節也古人有言富觀其所與貧觀其所取又曰損有餘補不足於君侯何如哉然則定其交而後求敢無愧已易其心而後語夫何飾焉賑給之義既惟其常厚薄之差伏希俯訪輕塵視聽伏增兢惕黃帝八十一難經是醫經之祕録也昔者岐伯以授黃帝黃帝歷九師以授伊尹伊尹以授湯湯歷六師以授太公太公授文王文王歷九師以授醫和醫和歷六師以授秦越人秦越人始定立章句歷九師以授華他華他歷六師以授黃公黃公以授曹夫子曹夫子諱元字真道自云京兆人也蓋授黃公之術洞明醫道至能遙望氣色徹視腑臟洗腸刳胸之術往往行焉浮沈人間莫有知者勃養於慈父之手每承過庭之訓曰人子不知醫古人以為不孝因竊求良師陰訪其道以大唐龍朔元年歲次庚申冬至後甲子豫遇夫子於長安撫勃曰無欲也勃再拜稽首遂歸心焉雖父伯兄弟不能知也蓋授周易章句及黃帝素問難經乃知三才六甲之事明堂玉匱之數十五月而畢將別謂勃曰陰陽之道不可妄宣也針石之道不可妄傳也無猖狂以自彰當陰沈以自深也勃受命伏習五年於茲矣有升堂覩奧之心焉近復鑽仰太虛導引元氣覺滓穢都絶精明相保方欲坐守神仙棄置流俗噫蒼生可以救耶斯文可以存耶昔太上有立德其次有立功其次有言言非以徇名也將以濟人也謹録師訓編附聖經庶將來君子有以得其用心也總章二年五月癸卯余自長安觀景物於蜀遂出褎斜之隘道抵岷峨之絶徑超元溪歷翠阜逮彌月而臻焉若乃採江山之俊勢觀天下之奇作丹壑爭流青峯雜起陵濤鼓怒以伏注天壁嵯峨而橫立亦宇宙之絶觀者也雖莊周詫呂梁之險韓侯怯孟門之峻曾何足云蓋登培塿者起衡霍之心游涓澮者發江湖之思况乎躬覽勝事足踐靈區煙霞為朝夕之資風月得林泉之助嗟乎山川之感召多矣余能無情哉爰成文律用宣行唱編為三十首投諸好事焉敘曰書以記言其來尚矣越在三代左史職之百官以理萬人以察揚於王庭用實大焉苟非可以燮理情性平章邦國敷彞倫而敘要道察時變而經王猷樹皇極之綱維資生靈之視聽皆可略也昔者仲尼之述書也將以究事業之通而正性命之理故曰吾欲托之空言不如附之行事道德仁義於是乎明刑政禮樂於是乎出非先王之德行不敢傳非先王之法言不敢道紀千數百歲斷自唐虞迄於商周風流所存百篇而已以此見聖人言約理舉神明不勞而體時務之撰矣故能法象天地同符易借前箸於筌蹄驅後生於軌物密而顯宏而奧久而彌新用而不竭非古之聰明聖智元覽博達孰能為此哉孔安國曰帝王之制坦然明白可舉而行嗟乎其言甚大可使南面稱聖人之後矣自時以降史述陵遲人自為家標指失中陳事亂而無當制理參而不一由是大典散而人文乖是非繁而取舍謬與夫古先哲人制述之意不其疏乎我先君文中子實秉睿懿生於隋末覩後作之違方憂異端之害正乃喟然曰宣尼既沒文不在茲乎遂約大義刪舊章續詩為三百六十篇考僞亂而修元經正禮樂以旌後王之失述易讚以申先師之旨經始漢魏迄於有晉擇其典物宜於教者續書為百二十篇而廣大悉備嗟乎賢聖之述豈多為哉噫亦足垂訓作則冒天下之道如斯而已矣當時門人百千數董薛之徒並受其義遭代喪亂未行於時年永久稍見殘缺貞觀中太原府君考諸六經之目則忘其小序其有録而無篇者又十六焉嗚乎茲不可復見矣家君欽若丕烈圖終休緒乃例六經次禮樂敘中說明易讚永惟保守前訓大克敷遺後人勃兄弟五六冠者童子六七祇祇怡怡講問伏漸之日久矣躬奉成訓家傳異聞猶恐不得門而入才之不逮至遠也是用勵精激憤宵吟晝詠庶幾乎學而知之者其修身慎行恐辱先也豈聲祿是殉前人之不繼是懼間者承命為百二十篇作序而兼當補修其闕爰考衆籍共參奧旨泉源浩然罔識攸濟嗚乎小子何敢以當之也其盡心力乎始自總章二年洎乎咸亨五年刊寫文就定成百二十篇勒成二十五卷昔者文中子曰漢魏之禮樂未足稱其書不可廢也尚有近古之對議存焉制詔冊則幾乎典誥矣後之達悟者將有得於斯文乎於時龍集閹茂勉踵前修在大唐御天下之五十七祀也咸亨二年六月癸巳梓潼縣令韋君以清湛幽凝鎮流靖俗境內無事艤舟於江潭縱觀於邱壑渺然有山林陂澤之思遂長懷悠想周覽極睇思其人則呂望藉茅於磻溪之陰屈平製芰於涔陽之浦覺瀛洲方丈森然在目於是間以投壺酬以妙論亦有嘉肴旨酒鳴絃朗笛以補尋幽之致焉預於斯者若干人爾昔在調御利見迦維光宅淨都撫臨法界抑揚垢路之業以疆理情田闡導毗尼之藏以隄防性海二邊雲徹方知實相之尊十剎風行乃識真如之貴將使龍象緇服維明克允鶖鷺元盟有恥且格五篇垂範豈同訓夏之科七聚分宗寧比歌虞之制功存離欲道在降魔仙苑創基因善果以調物提河滅跡憑淨戒以為師誠拯溺之舟航而禦黠之銜策者矣故能莊嚴百福粉繪三身摧憍慢山拔生死樹覆簣菩薩之道濫觴正覺之源除惑箭而斷愛枝銷恚刀而解疑網自銀棺掩耀金杖殊珍五師煙騰四分雲譎波離睿旨明而更明飲光妙跡盛而愈盛其後卑摩覃思猶沈赤水之輝惠遠研精尚玷元巖之彩遂使瓊編浩汗利涉迷於要津瑤軸紛綸登高暗於飛陛熟習者博而寡用志學者勞而少功七衆所以遲回八部由其太息丕應冥發睿感潛融爰挺異才式扶象訓有西京太原寺索律師俗姓范氏其先南陽人也殷霸洪允周藩茂族八鸞與四牡競馳紫繪與青緺照六軍卿胄績著於鍾彞三傳儒門業流於訓詁律師沖襟霞映峻局霜淒筠抱顯於髫齡蘭芬凝於丱齒由是糠粃禮樂錙銖名教以堯舜為塵勞以周孔為桎梏爰依白法遂托元徒探鷲嶺之微言得龍宮之祕藏咸亨之祀椒房諒陰捨槐里而構菴園因金穴而開銀地伽藍肇建號曰太原明陽所及咸收時望自價隆康會譽重摩騰竺法猷之苦節支道林之遠致將何以發明禪宇光應綸言律師乃以道衆羽儀釋門棟幹粵自宏濟來遊太原經行德人於茲為盛既而懼六和之紊緒悼三聚之乖宗稽法令之遺文討惠猷之舊業網羅近護吞含覺明原始要終探賾索隱芟夷疣贅剪截駢枝收絶代之精微詰往聖之紕繆葭灰屢變槐燧驟遷開遮持犯之異同廢立止作之輕重故以該象牙之扇窮貝葉之圖鑽研刊削五載而就名曰開四分律宗記凡十卷三十七萬六百三十言律師又以為仲尼述易申妙典於繫辭元凱談經託餘文於釋例爰因多暇更輯舊章牢籠祕察之宗發揮沈鬱之旨名曰開四分律宗拾遺鈔凡十卷四十萬餘言所以裨助三明抑揚四諦宏八正之道成一家之言庶使衆善雷奔㣥疑霧斂照歡戚之兩鏡蕩欣憂之二瓶憑此戒田方躋定境豈直功周沙甸道制鐵圍而已哉弟子才非元度識劣真長本乏淩雲之詞虛荷彌天之眷揄揚盛烈顧孫綽而多慚歸依勝侶仰郤愔而自勵輒牽庸陋輕序德音豈比夫公理昌言資繆襲之引太沖作賦假士安之談蓋所謂觀豹而識班聞樂而竊抃者矣故曰四分律宗記序銅溝水北石鼓山東星辰當畢昴之墟風俗是唐虞之國雖接燕分晉稱天子之舊都而向術當衢有高人之甲第祥風塞戶瑞氣沖庭芳酒滿而緑水春朗月間而素琴薦家童掃地蕭條仲舉之園長者盈門廓落東平之室梧桐生霧楊柳搖風眺望而林泉有餘奔走而煙霞足用神龍起伏俱調鼎鑊之滋鳴鳳雌雄並入笙竽之奏高情壯思有抑揚天地之心雄筆奇才有鼓怒風雲之氣南庭興晚東徑陰生石髓拆而隱士歸玉山崩而野人醉僉為文在我卜翰苑當仁王羲之之蘭亭五百餘年直至今人之賞石季倫之梓澤二十四友始得吾徒之遊陶陶然落落然則大唐調露之元年獻歲正月也上元二年歲次乙亥十有一月庚午朔七日丙子子將之交址旅次南海有好事者以轉輪鈎枝八花鑑銘示子云當今之才婦人作也觀其藻麗反覆文字榮回句讀曲屈韻調高雅有陳規起諷之意可以作鑑前烈輝映將來者也昔孔詩十興不遺衛姜江篇擬古無隔班媛蓋以超俊穎拔同符君子者矣嗚乎何勤非戒何述非才風律句存士女何算聊撫鏡以長想遂援筆而作敘仁者樂山智者樂水即云深山大澤龍蛇為得性之場廣漢巨川珠貝是有殊之地豈徒茂林修竹王右軍山陰之蘭亭流水長隄石季倫河陽之梓澤下官天性任真直言淳朴拙容陋質眇小之丈夫蹇步窮途坎土禀之君子文史足用不讀非道之書氣調不羈未被可人之目潁川人物有荀家兄弟之風漢代英奇守陳氏門宗之德樂天知命一十九年負笈從師二千餘里有宏農公者日下無雙風流第一仁崖知宇照臨明日月之輝廣度沖襟磊落壓乾坤之氣王夷甫之瑤林瓊樹直出風塵嵇叔夜之龍章鳳姿混同人野雄談逸辨吐滿腹之精神達學奇才抱填胸之文籍簪裾見屈輕脫履於西陽山水來遊重橫琴於南澗百年奇表開壯志於高明千里心期得神交於下走山人對興即是桃花之源隱士相逢不異菖蒲之澗黃精野饌赤石神脂玉案金盤徵石髓於蛟龍之窟山樽野酌求玉液於蓬萊之峯溪橫燕尾巖豎龍頭鍛野老之真珠掛幽人之明鏡山腰半折溜王烈之香膏洞口橫開滴嚴遵之芳乳藤牽赤絮南方之物産可知粉漬青田外域之謠風在即人高調遠地爽氣清抱玉策而登高出瓊林而更遠漢家二百所之都郭宮殿平看秦樹四十郡之封畿山河坐見班孟堅騁兩京雄筆以為天地之奧區張平子奮一代宏才以為帝王之神麗珠城隱隱闌干象北斗之宮清渭澄澄滉漾即天河之水長松茂柏鑽宇宙而頓風雲大壑橫溪吐江河而懸日月鳳凰神嶽起煙霧而當軒鸚鵡春泉雜風花而滿谷望平原蔭藂薄山情放曠即滄浪之水清野氣蕭條即崆峒之人智搖頭坐唱頓足起舞風塵灑落直上天池九萬里邱墟雄壯傍吞少華五千仞裁二儀為輿蓋倚八荒為戶牖榮者吾不知其榮美者吾不知其美下官以詞峯直上振筆札而前驅高明以翰苑橫開列文章於後殿情興未已即令樽中酒空彩筆未窮須使山中兔盡高興之後中宵起觀舉目四望風寒月清鄰人張氏有山亭焉洞壑橫分奇峯直上鬱然有造化之功矣嗟乎大丈夫荷帝王之雨露對清平之日月文章可以經緯天地器局可以畜泄江河七星可以氣衝八風可以調合獨行萬里覺天地之崆峒高枕百年見生靈之齷齪雖俗人不識下士徒輕顧視天下亦可以蔽寰中之一半矣惜乎此山有月此地無人清風入琴黃雲對酒雖形骸真性得禮樂於身中而宇宙神交卷煙霞於物表至若開闢翰苑掃蕩文場得宮商之正律受山川之傑氣雖陸平原曹子建足可以車載斗量謝靈運潘安仁足可以膝行肘步思飛情逸風雲坐宅於筆端興洽神清日月自安於調下云爾
