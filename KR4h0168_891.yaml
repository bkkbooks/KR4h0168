front:
  text: 全唐文欽定全唐文卷八百九十一光溥蜀人仕後蜀為觀察判官進翰林學士後主時兼兵部侍郎廣政十一年改中書侍郎兼禮部尚書同平章事尋罷相卒
  hash: sha256:2cf2ff58a2f23e26fa4c5125a3db45c2adbc3e2a350e04b3844c0b661c9f1ac6
  markers:
  - {type: head, offset: 14, content: 徐光溥, id: KR4h0168_NFKB_891-h1, level: 1}
body:
  text: 我蜀被山帶江足食足兵實天下之強國也我公本仁祖義允武允文乃天下之賢主也以我公之賢拓土開封取威定霸固得其宜矣而况內則有紅蓮上客參帷幄之謀外則仗細柳將軍專斧鉞之任率土之內足可保磐石之固泰山之安顧惟冗賤何補高明但念智者百慮必有一失愚者百慮必有一得狂夫之言聖人擇之樵童之歌哲王聽焉竊以惟賞與刑國之利器懲惡勸善君之要權不可偏行尢須具舉歷觀往典備考前規或王命而不通或公室以多難列國率聞於專制諸侯或可以從權苟有利於生靈又何辭於通變昔來歙鄧禹擅命於征伐之間蜀主岐王承制於隔絶之問事俱非已實欲安人昨鄰近諸藩間諜上國有虎視狼貪之意阻君臣魚水之歡添益兵師動搖生聚况我公恆修貢職不虧楚子之茅遽搆讒邪竟擲曾參之杼以至兩川歃血合從連橫列校齊心奉辭伐罪今則旋平狖穴漸拓鴻基立功者悉望升榮向化者皆思敘進方屬路途有阻恩信未通二星不見於雲霄三蜀久於雨雪將期勸善切在報功酬庸合議於策勳列爵宜遵於故事自今以後若且行墨制以布鴻恩式副㣥情無虧大體先宜曉諭後可施行所冀設爵待功免授逾時之賞允協稱霸之宜鶚青社人仕後蜀為御史明德元年為彭州倅權刺史事出家長頭未除煩惱為衣挂像豈敬慈尊向禪室以邪淫發妖言而惑衆妄裁歷數上侮朝廷謾述災殃下迷聾俗况今有漏未證無生將修功德以為名積聚私財而作賈但以正人息事君子含宏未議剪除致茲猖熾所嗟鄙俚競言妖稱列狀詣衙欲希迎請須行嚴令以絶風情所由入界把捉候到決脊彬字齊美衡州衡山人仕蜀為翰林學士王氏亡復仕後蜀廣政初纍官尚書左丞出為寧江軍節度使十三年卒臣聞滄海澄波納百谷朝宗之水皇風扇物來萬邦向化之人蓋由負罪不誅銜冤獲免鄭伯沐焚棺之惠許男荷解縳之仁得不頂戴穹旻仰祈渥澤恭惟皇帝陛下承乾啓運握鏡開圖發機而上應天心恤物而下從民欲斷十八祚崇隆之德高步泰階應一千年挺特之風廣施王道混車書於天下走聲教於域中而臣僻在遐方遠居蜀部承先父經營之業為巴人主者之司但荒聾瞽之迷罔顧危亡之患玉帛既乖於正朔包茅是闕於薦羞殊不知唐德惟新元功再造致王師之遠辱勞雄武以遐臨太陽出而冰雪自消睿澤敷而黔黎盡泰而臣自知罪釁不敢逭逃命戎士以倒戈挈壺漿而塞路遂即舁棺麾下朿手馬前向丹闕以馳魂掩黃沙而聽命豈謂魏王布惠真宰垂仁入臣境無犯纖毫問臣罪不加一二推陛下好生之旨闡堯天宥惡之文釋殘生於撲蛾之燈全必死於戲魚之鼎使肌骨重生於聖日燋枯再沐於天波然則盡節輸誠安足以贖臣之罪塗肝碎膽不足以報君之恩幸得捧日傾心歸明向化積懼而鋒鋩聚背推忠而丹赤貫心今則已遠龜城將趨鳳闕雖亡家國喜歸有道之朝縱別鄉園幸在太平之化臣以正月二日與母親并姨舅兄弟骨肉等發離當道奔赴京師攀望聖慈無任瞻天仰德惶懼戰越死罪之至淳成都人後蜀廣政中官龍遊令伏見三年以來民頗怨嗟謂陛下求賢失道為政不平重纂組奪女工貴雕鎪損農事法令不信賞罰無誠納諫之心微自滿假馭朽之念漸乖始卒載舟覆舟不可不懼而况北有大敵方藉支禦若失人心其何以濟臣又見頻發士卒遠戍邊庭人心動搖莫測其故家搆異議如臨湯火人且憂駭將何撫寧若夫舉衆興師須明利害况關大事豈可容易必若金鼓一鳴前鋒稍接一敗一成疾如反掌願陛下先事而計無貽後患今之動靜頗涉因循臣不知所發之兵為防邊乎為赴敵乎若云防邊不當驟有徵發若云赴敵則須先決便宜師出無名三軍必怨三軍既怨何以成功以我朝之甲兵擬柴氏之士馬以我朝之將領比柴氏之師帥以我朝之帑藏比柴氏之囷廩至於法律刑名聲明文物彼長此大差等不同須用權竒以謀拒捍若二國交鬬恐未十全况我天府之邦用武之地一夫守隘萬旅無前假使柴師能於野戰攻城奪壘利在平川儻入隘途如無手足願陛下以短兵自固扼塞要衝分布腹心把斷細徑精加號令老彼敵師縱柴氏親來未敢便謀深入以日繼月以月繼年敵勢自羸我師彌鋭不折一戟不失一卒而柴氏自疲信所謂彼竭我盈以逸待困此為上計符合天機今甲子欲交陰陽變動天運人事合有改更如采厚斂之末議必亂經國之大倫此犯天意者一也太乙所行將離分野初來為福末去為譴轉災作福是宜早圖若更倍賦加租則將有不測之禍此犯天意者二也四海財貨盡屬至尊散在民間積為資産或有科索誰敢抵拒陛下何不舍其小畜以成大有乎此損君道者一也夫百姓六軍之主也百姓足則軍莫不足百姓不足軍孰與足務奪百姓專贍六軍此其損君道者二也縠仕後蜀纍遷監察御史戶部尚書余少博㣥言常取得志雖秋螢之照不遠而雕蟲之見自佳古人云自聽之謂聰內視之謂明也又安可受誚於愚鹵取譏於書廚者哉暇日因閲李杜集元白詩其間天海混茫風流挺特遂採托奧妙並諸賢達章句不可備録各有編次或間窗展卷或月榭行吟韻高而桂魄爭光詞麗而春色鬬美但貴自樂所好豈敢垂諸後昆今纂諸家詩歌共一千首每一百首成卷分之為十目曰才調集庶幾來者不謂多言他代有人無嗤薄鑒云爾炯蜀人仕後蜀歷官武德軍判官翰林學士中書舍人鏤玉雕瓊擬化工而回巧裁花剪葉奪春豔以爭鮮是以唱雲謠則金母詞清挹霞醴則穆王心醉名高白雪聲聲而自合鸞歌響遏青雲字字而偏諧鳳律楊柳大堤之句樂府相傳芙蓉曲渚之篇豪家自製莫不爭高門下三千玳瑁之簪競富樽前數十珊瑚之樹則有綺筵公子繡幌佳人遞葉葉之花箋文抽麗錦舉纖纖之玉指拍按香檀不無清絶之辭用助嬌嬈之態自南朝之宮體扇北里之倡風何止言之不文所謂秀而不實有唐已降率土之濱家家之香徑春風寧尋越艷處處之紅樓夜月自鎖常娥在明皇朝則有李太白應制清平樂詞四首近代溫飛卿復有金筌集邇來作者無愧前人今衛尉少卿趙崇祚以拾翠洲邊自得羽毛之異織綃泉底獨殊機杼之功廣會衆賓時延佳論因集近來詩客曲子詞五百首分為十卷以炯粗預知音辱請命題仍為序引乃命曰花間集將使西園英哲用資羽蓋之歡南國嬋娟休唱蓮舟之引武石照人仕蜀纍遷峽路應援招討使入後蜀加秩侍中統飛棹諸營為峽路行營招收討伐使卒年八十餘歲夫禎祥應見事著前聞期至聖之效徵為有年之先兆備傳故實預保時康武唐大順已酉嵗以伐叛勤王之忠忝專城剖竹之寄時茲石出焉去夏復領魚符再蒞巴蜀值岷涪澄徹瑞應重覩內循薄德寧契殊祥但荷天休遂刻貞石曉字秀川永康人後蜀廣政初授朝散郎守尚書祠部員外郎善修煉養生之道別號真一子按神仙傳真人魏伯陽者會稽上虞人也世襲簪裾惟公不仕修真潛默養志虛無博贍文詞通諸緯候恬淡守素唯道是從每視軒裳如粳粃焉不知師授誰氏得古文龍虎經盡獲妙旨乃約周易撰參同契三篇又云未盡纖微復作補塞遺脫一篇繼演丹經之元奧所述多以寓言借事隱顯異文密示青州徐從事徐乃隱名而注之至後漢孝桓帝時公復傳授與同郡淳于叔通遂行于世公撰參同契者謂修丹與天地造化同途故託易象而論之莫不假借君臣以彰內外敘其離坎直指汞鉛列以乾坤奠量鼎器明之父母係以始終合以夫婦拘其交媾譬諸男女顯以滋生析其陰陽導之反復示之晦朔通以降騰配以卦爻形於變化隨之斗柄取以周星分為晨昏昭諸刻漏故以乾坤為鼎器以陰陽為隄防以水火為化機以五行為輔助以真鉛為藥祖以元精為丹基以離坎為夫妻以天地為父母互施八卦驅役四時分三百八十四爻循行火候運五星二十八宿環列鼎中乃得水虎潛形寄庚辛而西轉火龍伏體逐甲乙以東旋易曰聖人有以見天下之賾而擬諸其形容象其物宜公因取象焉非天下之至通其孰能與於此哉乃見鑿開混沌擘裂鴻蒙徑指天地之靈根將為藥祖明視陰陽之聖母用作丹基泄一氣變化之元漏大冶生成之本非天下之至達其孰能與於此哉其或定刻漏分晷時簇陰陽走神鬼蹙三千六百之正氣回七十二候之要津運六十四卦之陰符天關在掌鼓二十四氣之陽火地軸由心天地不能匿造化之機陰陽不能藏亭育之本致使神變無方化生純粹非天下之至明其孰能與於此哉契云混沌金鼎白黑相符龍馬降精牝牡襲氣如霜馬齒如玉犬牙水銀與姹女同名朱汞共嬰兒合體明分藥質細露丹形盡周已化之潛功大顯未萌之眹兆非天下之至神其孰能與於此哉其有假借爻象寓此事端不敢漏泄天機未忍祕藏元理是以鋪舒不已覼縷再三欲罷不能遂成篇軸蓋欲指陳要道汲引將來痛彼有生之身竟作全陰之鬼非天下之至仁其孰能與於此哉復有通德三光遊精八極服金砂而化形質餌火汞以鍊精魂故得體變純陽神生真宅落三尸而超三界朝上清而登上仙非天下之至真其孰能與於此哉曉所分真契為章義者蓋以假借為宗上下無準文泛而道正事顯而言微後世議之各取所見或則分字而義或則合句而箋不無畎澮殊流因有妍媸互起末學尋究難便洞明既首尾之議論不同在取舍而是非無的今乃分章定句所貴道理相黏合義正文及冀藥門附就故以四篇統分三卷為九十章以應陽九之數名曰分章通真義復以朱書正文黑書旁義而顯然可覽也上卷分四十章中卷分三十八章下卷分十二章內有歌鼎器一篇謂其詞理勾連字句零碎分章不得故獨存焉以應水一之數喻丹道陰陽之數備矣復自依約真契撰明鏡圖訣一篇附於下卷之末將以重啓真契之戶牖也曉因師傳授嵗久留心不敢隱蔽元文是用課成真義庶希萬一貽及後人也昌利化飛鶴山真一子彭曉敘參同契者參雜也同通也契合也謂與諸丹經理通而契合也凡修金液還丹先尋天地混元之根次究陰陽分擘之象明水火相克復為夫妻認金水相生反為父子故有男兼女體則鉛內産砂女混男形則砂中生汞日者陽也日中有烏陽含陰也月者陰也月中有兔陰含陽也此天地顯垂真象令達者則之可謂真陰陽也復有陰陽反復之道水火相須之理造化生成之徑既知其徑須原其根根者則天地混元之根也既得其根須取其象象者則陰陽分擘之象也既得其象須循動靜既循動靜須知其數既知其數須依刻漏既依刻漏須明進退既明進退須分龍虎既分龍虎則南北之界定矣金木之形全矣大道之丹成矣復有內外法象內外水火有壇竈焉有鼎室胞胎焉有爻象焉有水火之候焉有抽添之則焉有搗駕之模範有離合之形體此皆頭頭俱備闕一不可志士又須徹聲色去嗜欲棄名利投靈山絶常交結仙友隱密曹溪盡夜無怠方可期望或不如是則虛勞勤爾故陰真君曰莫辭得失一志而修還丹可冀也時孟蜀廣政十年嵗次丁未九月初八日昌利化飛鶴山真一子彭曉敘昊字穹佐自言唐相紳之後少隨父籍關中昭宗時以亂流寓新平蜀武信軍節度使劉知俊署為從事後主時歷翰林學士蜀亡入後唐授檢校兵部郎中奉詔偕趙季良至蜀後蜀主辟為觀察推官遷掌書記及開國擢禮部侍郎翰林學士後主立領漢州刺史纍拜門下侍郎兼戶部尚書同平章事封趙國公加司空領武信軍節度使國亡入宋拜工部尚書卒年七十五贈右僕射臣生自并門長於蜀土幸以先臣之基構得從幼嵗以纂承只知四序之推移不識三靈之改卜伏自皇帝陛下大明出震聖德居尊聲教被於遐荒慶澤流於中夏當凝旒正殿虧以小事大之儀及告類圜丘廣執贄奉琛之禮蓋蜀地居遐僻路阻闕庭已慙先見之明因有後時之責今則皇威電赫聖略風馳干戈所指而無前鼙鼓才臨而自潰山河郡縣半入於提封將卒倉儲盡歸於圖籍但念臣中外骨肉二百餘人高堂有親七十非遠弱齡侍奉只在庭闈日承訓撫之恩粗勤孝養之道實願克終甘旨保此衰年其次得子孫之團圓守血食之祭祀伏乞皇帝陛下容之如地蓋之如天特軫仁慈以寬危辱臣復輒徵故事上黷嚴聰竊念劉禪有安樂之封叔寶有長城之號皆因歸欵盡獲全生顧眇昧之餘魂得保家而為幸庶使先臣寢廟不為樵採之場老母庭除尚有問安之所見今保全府庫巡遏軍城不使毀傷將期臨照臣昶謹率文武見任官望闕上表歸命按漢書諸侯王上疏稱陛下應劭釋云陛者升堂之陛王者必有執兵陳於陛階之側㣥臣與至尊言不敢指斥故呼在陛下者而告之因卑以達尊之意若今呼殿下閣下侍者足下執事之類是也臣等以為凡上箋皇太子合連殿下呼之若等候起居祇合稱皇太子萬福其前導者亦祇呼皇太子來不宜呼殿下來詳殿下陛下之稱顯是指陛殿之下他人也今若言殿下來即是他人來請百官起居祇稱皇太子萬福前導者呼皇太子來伏以故東川節度使董璋與臣為鄰從初不睦常厚誣於表疏每深間於朝廷欲竊兵權來并土宇及審聖聽不惑物論難從臣合此時奮激驍雄誅殛姦宄尋屬陛下翠華外駐黃屋未安捨亦何傷剋之不武用是益勞宵旰因議寢停雖隱忍以纍年且參商而終日其後故臣安重晦特承君寵恣弄國權窺劍外之有萌示寰中之無畏闕一字料聖君之意必推亡以固存其如幸臣之言恐怒衆而難犯臣與董璋愛以暫合和而不同雖玉帛之交馳豈心貌之相類誠知蘊蓄且務包容儻敢飛揚必當掃殄其董璋至今年四月二十八日暴興兵甲五月一日驟入漢州臣其日先差昭武軍節度兵馬留後兼左廂步軍都指揮使趙廷隱總領三萬人騎發次新都臣自統領衙內親軍二萬人騎繼之俱列營於彌牟鎮北至三日詰旦結其大陳俟勦元凶其董璋至午時敢領妖徒來當鋒鋭臣則親驅戈甲趙廷隱手奮鼓旗一擊而魚潰鳥離四合而豕分蛇斷斬首一萬餘級執俘八千餘人生擒賊中都指揮使元璝衙內副都指揮使董光演及以下指揮使都頭八十餘員奪下甲馬五百餘匹收獲衣甲器械十萬餘事其餘逆漏之徒尋令搜捉並盡其董璋只與親男衙內都指揮使董光嗣並從騎二人罄馬而奔棄甲而遁撫隻輪而掩泣視亂轍以咸哀烏江之死所不遙赤壁之慙顏更厚臣幸以疾雷之勢破其急電之機臣便統領大軍壓背追襲其董璋至四日巳時走入東川至午時有前陵州刺史王暉知窠巢之已傾驗城池之不守梟斬董璋父子首級相次迎獻軍門徑進師徒收下城壘平定一方之衆止於四日之間莫不遐仗皇威戡除鄰穢臣方以自違君命未達臣誠捷音雖審其風馳奏疏未遑於羽插豈謂皇帝陛下才聆動靜遽軫憂勞遄降使臣特頒明詔諭董璋之姦罪勉微臣以削平仍敕軍前俾施掎角並得暗合方略顯應神機更無脣齒之虞永荷股肱之寄粵若蠶叢啓國魚鳧羽化於湔山望帝開基鱉靈復生於岷水然則疏鑿巫峽管鑰成都而猶樹木柵於西州跨土田於南越其後兼並梁漢睥睨巴賨獵騎奔馳會秦王於裦谷石牛來去闢蜀路於劍門空驚化玉之微寧獲糞金之利爰自朔分秦歷聲接華風代有雄豪迭為侯伯運當奇特子陽乘虎踞之機時遇非常元德負龍蟠之勢若乃張儀之經營版築役滿九年楊秀之壯觀崇墉功加一簣洎我唐臨御聖德昭融武威雷駭於百王文德日輝於四海惟茲益部扼彼卭關蒙王肆猾夏之心坦綽苞亂華之志時或窺吾臥鼓覘我韜戎彎弧學射之山飲馬沈犀之水玉帛子女漂流鑿齒之鄉珠翠綺羅散失雕題之域纍朝是忘逸樂深軫殷憂夢卜良臣控彈巨屏南康王以儒術柔服教習詩書燕國公以將略威懷淬磨斧鉞息波瀾於錦水創制度於羅城踰百雉之恆規補一隅之闕事有備無患庇蜀人以金墉避狄蒙塵安僖皇之玉輦雲蠻稽顙遣使來朝航滇河以獻珍越沈黎而納款當廟社阽危之際鑾輿出狩之秋坐制南荒終無北寇乃燕公之力也往以元穹告變天祿中微夷門方轉其斗魁王氏遂分其鼎足既而莊宗繼絶皇祚中興靈旗西指於巴庸蜀主東朝於伊洛先帝以初復地土方懷遠人須仗權謀乃眷勳戚於是詔飛丹鳳召何晏於並門節立蒼龍封杜悰於井絡即我太尉侍中平原公分茅金闕受瑞彤廷帳移竹馬之邦輪輾木牛之路星馳十乘霧廓三川宣皇風於上事之初慰人望於下車之日且以城邑自經剋復勢尚搔搖公來如太華之安帝寄得磐石之固益民多福而遇賢侯公曠度涵空英風曠古襲門胄則重侯纍將保勳榮則帶河礪山會族而象簡盈牀奕葉而貂冠滿座其為盛也無得名焉頃者以龍戰元黃虎爭區夏殺氣晝昏於日月陳雲宵蔽於星辰天柱傾欹海波動蕩鼓鼙未息干戈日尋公是時斡運璇樞端持瑤鏡贊神謀於不測斷人事以無疑獻替經綸折衝樽俎決勝廟堂之上制敵掌握之間借筯為籌舉無遺算內則翊戴天子外則承寧諸侯言正色莊有犯無隱成少康祀夏之德弻光武興炎之功再造巨唐削平新室歷數允集神器知歸皆由公協和元勳光輔洪業是知取威定霸崇文教以興隆安上治民修理容而鎮靜足以神交旦奭士撫平參力致大同宜亨廣運以之首揚紅斾式遏錦川古有遺機待乎作者公臨鎮之始年中興之四載也嵗在丙戌春正月十有一日杖鉞而至無何期月逆帥康延孝自普安竊兵叛亂矯詔窺覦犯我鹿頭營於雒縣勢將率衆必寇近郊公白清野待敵於民何罪堅壁而守謂我無謀况城雖大而弗嚴隍已平而可涉衆情憂恟公意晏如飛羽檄以會兵伐林木而立柵森然棨戟密爾橫簫環以深溝屹如斷岸五日之內四面尋周民一其心士百其勇於是精選將領分部熊羆電激妖巢火熏狡窟一鼓而元凶氣喪載攻而同惡疲頽擒鄧艾於轞中斬龎涓於樹下長蛇碎首封豕析骸獻捷功於王廷掃逋穢於侯甸一除芽蘖大定疆陲公於是提振紀綱恢宏典法六條已正七德兼修言出令行家至日見未幾先皇厭世今上纂圖聖政惟新睿思求舊不改山河之寄永繄社稷之臣一年而加珥貂再嵗而升掌武將軍幕下列虎豹之爪牙丞相府中排鴻鵠之腹背猶且爵盈而不飲肴乾而不食診療生靈討論獄訟固以忠為令德孝出因心力奉國家勤修職貢賝賮縈紆於劍棧包茅旁午於玉京史不絶書府無虛月閲其庭實標出㣥芳推晉文尊獎之誠詔齊桓糾合之業天子得以居南面之貴銷西顧之憂萬里長城岌然存矣公一旦謂諸將吏曰夫華陽舊國宇內奧區地稱陸海之珍民有沃野之利郛郭則樓臺謺映珠碧鮮輝江山則襟帶牽連物華秀麗閭閻碁布鄽陌駢羅不戒嚴陴是輕武備耳亂臣賊子何嘗不窺南詔西羌會聞入寇將沮豺狼之意須營羊馬之城吾已揣之衆宜協力封章上奏揆日量工分界繩基辨方畫址百城酋壯呼之響答以雲來十萬貔貅令之風行以霧集杵聲雷震版緣雲排王猛鬻畚於城隅傅説飛鍬於巖下公間日巡撫役者忘疲周給米鹽均頒牢酒如效五丁之力才踰三旬而成克就厥功不於素遠而望也象衆山之迆邐俯而瞰也若峭壁之斗懸掘大壕以連延增長隄而固護鷙鳥搏兮可越武夫勇兮莫干摩壘者諒之摧心守陴者由之示暇舊城崢嶸而後竦新城崨嶪以前蹲勢而言之若泰嶽之與梁甫亞而稱矣若夫子之與顏回重門開而洞深危樓亘而翼展至若八月之江澄寒碧七星之橋架晴虹偉乎津梁成茲壯麗公以羅城雖設智有所虧重築大敵鎮於四角嶔岑挂兔突屼栖烏儼樓櫓於泬寥懸刁斗於天表其東南也直分象耳迥眺蛾眉雲霞斂吳楚之天煙水送黔夔之棹其西南也旁連玉壘平視金隄宵瞻火井之光曉望峰之彩其東北也樹遙雲頂氣鬱金堂雨收而疊嶂屏新靄薄而重巒晝暗其西北也襟袖廣漢肘腋天彭魚龍躍萬歲之池鸞鶴舞陽平之化其或碧雞啼曉金馬嘶風擁旄戟以登臨覩山川之形勝有以見公心同軒鏡竄讋鬼神手秉漢鈞錙銖造化能於昭代樹此豐功鄙金甌為漏卮小鐵甕為凡器其興也已當農隙其罷也不害農時帝旨咨嗟王綸獎録詔書敕知祥省所奏重修葺當府城池已取十二月一日興功事具悉卿寵分玉節榮鎮錦城守富貴以無疆慕功名於不朽特峻金湯之固以威蠻貊之邦况屬年豐復當農隙既暫勞而永逸尤豫備於不虞益見廟謀允符朝寄省閲陳奏嘉歎殊深公猶歸善於君讓功於下諸軍馬步軍都指揮使光祿大夫檢校太保守彭州刺史上柱國李仁罕左廂馬步軍都指揮使金紫光祿大夫檢校司空守漢州刺史上柱國趙廷隱右廂馬步軍都指揮使金紫光祿大夫檢校司空守州刺史上柱國張知業等家傳義烈世襲丕勳拓弓而霹靂聲乾揮劒而魚麗陳破曹景宗鼻頭火出薛延陀髭尾煙生英毅無儔智謀咸博左都押衙金紫光祿大夫檢校司空守蜀州刺史上柱國潘在迎等或鼎鐘盛族或書劒名門佩鞬執弭以從戎憑軾搴帷布佐理至於華皓不墜忠勞是能領袖雄藩表儀會府而皆躬臨卒列統攝庶工無揚干之亂行絶趙羅之辭役明興晦息日就月將巨績告母㣥才叶贊自天成二年丁亥嵗十二月一日起工版築至三年正月八日畢手公再飛章上奏詔曰敕知祥省所奏修治城壕畢功事具悉百堵皆興四旬而畢亘羅城而雲矗引錦水以環流外禦蠻夷中權帷幄公家之事相業可觀備覽奏陳殊深嘉獎於以表綸綍裦揚之寵知朝廷倚注之恩其新城周圍凡四十二里竦一丈七尺基闊二丈二尺其上闊一丈七尺別築陴四尺鑿壕一重其深淺闊狹隨其地勢自卸版日構覆城白露舍四千九百五十七間內門樓九所計五十四間至三月二十五日停運斧斤其版築採造軍民共役三百九十八萬工其執事餱糧及役罷賞賚斗支稱給緡貫囊裝其數凡費一百二十萬其諸將大校出良駒於皂棧解重帶於腰圍選其纖柔釋其好玩曾無顧愛一以頒酬其縣大夫及寮佐已下或賞之器帛或給以緡錢咸有等差無不均普公卻奢從儉節事省財馬如羊而不入私門金如粟而不藏私橐悉肆公家之利盡充王事之資圖有謂之功非無度之費也公誠欲為而不載朴而無文衆意未然牆進固請四民喧闐於衙閫萬口號沸於階墀父老曰公侯政洽神明慈如父母前年定延孝之亂今歲防蠻蛋之虞盡力城隍務安井邑遂使我等保家庇族養老寧沖如是者功德在民憂勤報國安可不敘述休烈雕篆貞珉豈不美歟何容辭也公謂諸賓佐曰抑聞乘人之約義士猶或不為貪天之功智者宜然不取所修邊備式耀國威將欲罄臣節於一時彰帝猷於萬古殊非已力難遏人情誰當遊夏之才請紀見聞之事昊相門牢落堂構蕭條翁歸文武之材明時待問荀息忠貞之志暗室不欺寐酣而白鳳昂藏染翰而墨龍夭矯嗟乎鄧禹秉鈞之歲雖慶承家陛機赴洛之年不堪觀國空餘壯節退卜良知驅車幸返於故園提筆謬登於華館金臺玉帳敢差俊彥之肩緑水紅蓮獲繼鵷鸞之踵酷慙薄技莫贊雄猷杜征南以矜大平吳沈碑漢水竇車騎以章明出塞勒碣燕山猶能炳著簡書發撝功業寧偕巨制永固坤維尚乏黃絹之辭孰拂白圭之玷受恩稟命紀事表年巍巍乎不騫不崩何患於為陵為谷寅遜夔州雲安監人仕後蜀後主起家茂州録事纍遷翰林學士加工部侍郎判吏部三銓事領簡州刺史國亡入宋授右庶子開寶五年為鎮國軍行軍司馬罷職年九十餘卒臣聞諸召公曰玩人喪德玩物喪志不作無益害有益功乃成不貴異物賤用物民乃足又曰不寶遠物則遠人格所寶惟賢則邇人安夫心猶火也縱則自焚故文王命周公召公太公畢公輔相太子發太子嗜鮑魚太公不進曰鮑魚不登於俎豆豈可以非禮養太子哉由此觀之飲食必遵禮况起居玩好乎高祖皇帝節衣儉食惠養黎元化家為國傳之陛下陛下宜親賢俊去壬佞視前代書傳究歷世興廢選端良之士置於左右訪時政得失天下利病奈何博戲擊鞠妨怠政事奔車躍馬輕宗廟社稷昔陶侃藩臣猶投摴蒱於江况萬乘之主乎前蜀王氏覆車不遠矣臣又聞食君之祿懷君之憂臣雖為外官每聞陛下賞一功誅一罪未嘗不振衣踴躍以為再覩有唐貞觀之風也今復聞陛下或採戲打毬雖宮禁無事止於釋悶亦可一兩月時為之臣慮積習生常不唯勞倦聖體復且妨於庶務諸司申覆因之淹滯其次奔蹄失馭奄有驚蹶陛下雖自輕奈宗廟社稷何
