front:
  text: 全唐文欽定全唐文卷三百四十五巡字巡鄧州南陽人舊唐書云蒲州河東人又樂史太平寰宇記亦云巡蒲州河東人開元末擢進士第三以書判拔萃入等天寶中由通事舍人出為清河令調真源安祿山反巡募豪傑拒賊與單父尉賈賁入雍邱城守雍邱令令狐潮降賊引衆數萬圍城凡四月巡衆才千餘每戰輒克河南節度使嗣虢王巨屯彭城假巡先鋒俄東平陷賊巨引兵東走巡失外援拔衆至雎陽與太守許遠城父令姚誾等合敗賊將楊朝宗詔拜巡主客郎中副河南節度使至德二載御史中丞賊將尹子奇圍之經年城陷遇害年四十九贈揚州大都督
