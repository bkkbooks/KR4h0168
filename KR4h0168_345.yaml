body:
  text: 想峨睂之碧峯豫遊西蜀追騄駬於元圃保壽南山逆賊祿山殺戮黎獻蹂汙一作腥羶闕庭臣被圍四十七日凡一千八百餘戰主辱臣死當臣效命之時惡稔罪盈是賊滅亡之日薦必及時政無墜禮雨雹可禦淒風不流惟乙淩陰是司將頒肉之列愛侯伐冰之家將當夜頌有此上數句應有闕誤朝覿無戒且不違於西陸蓋取異於東鄰既憐申豐將除苦雨之變翻慚高子不爭靈星之詩御史職在乘驄誠為直指有司義乖祭筐猶曰非時徒欲事於煩言得無同於矯舉罪之則可訴亦難從甲楷法有聞頗齊刀筆之吏象形自業偏在寫書之官不能殺竹惟青臨池盡黑當年有立應已盈裾計日不移無慚尺牘今乃字詁是事日課有違左氏門庭雖多筆硯稚川史籍不滿巾箱曾莫負於五車徒見司於雙管以是會意雖則麾肱不能中程何為當理今之簿訴將俟片言欲遲單父之書須辨洛陽之紙然則類之大小猶或可問刑之出入於是乎在遠杭州鹽官人右相敬宗曾孫初從軍河西為磧西支度判官劾貶高要尉安祿山反召拜雎陽太守纍加侍御史本州防禦使賊將尹子奇攻城遠與張巡姚誾固守城陷被害贈荊州大都督太一先鋒蚩尢後殿蒼龍持弓白虎捧箭眢井鳩翔老堞龍攖光弻營州柳城人起家左衛親府左郎將襲封薊郡公安祿山反郭子儀薦其能詔攝御史大夫持節河東節度副大使知節度事尋加魏郡太守河北採訪使范陽大都督府長史范陽節度使肅宗立更授戶部尚書同中書門下平章事至德二載遷司空拜鄭國公乾元元年兼侍中為天下兵馬副元帥上元元年拜開府儀同三司中書令河中尹晉絳等州節度使進太尉寶應二年進封臨淮郡王賜鐵券藏名太廟圖形淩烟閣長慶二年薨年五十七贈太保諡曰武穆臣自去月十七日舊疾發動有加無瘳至今月五日臣自量氣力恐至不起謹忍死口占陳露上聞臣受國重任荷國厚恩自陛下臨御以來方隅多故加以疾病不任扶持竟未獲趨拜闕庭瞻奉宸極忽此危亟氣候奄然將冥沒聖代長辭白日撫心內痛割切五情且鳥之死其聲尢哀况臣繫心聖朝結戀慈母倚枕西向覲謁永遙所以循環晷刻心腸斷絶臣以素無成效纍加封邑每經陳讓不蒙允許今臣將死靦冒猶存若使無功之子嗣守素封臣赴下泉亦不瞑目况生人凋弊國用不充軍興所須實資錢穀謹上前後所賜實封二千戶請歸之有司庶裨萬一蓋臣宿素必守之誠伏惟聖慈特賜臨照行營兵馬使已下至將士及資糧營田所繇等並令恭守所職伏聽進止仰天瀝懇誠切氣微俯首嗚咽申吐不盡不勝哀迫痛戀之至奚珣開元時官禮部侍郎汙安祿山僞命昔者聖人之作樂也將以動天地感鬼神節風雅導人倫樂假器而成用器以樂而見珍或採孤篠於鄒魯或收浮磬於泗濱或斷彼金石或制自陶鈞被諸大道輝光日新逮乎上皇云謝戰國相滅雄殺氣於五兵崩禮容於八列大樂之器斯焉是缺剝極則賁天臨我皇化東戶而咸若歌南風而有光觀奮豫而崇上帝舞干戚而柔大荒樂器成列盈乎太常客有覩而駭者曰國之盛事殫所未識雅象純殷叢光翕赩樹羽紛纚崇牙崱屴玉管清通瑤琴古色朱絲疏越之制雷鼓靈鼉之飾青笳閟列於軍容畫角融怡於武力故能頓應朄張柷敔猛獸赫怒而擎鐘金人嵌巖以負簴鸞笙在目疑髣佛於周王鳳簫可吹紛肸蠁於嬴女況復天球曜逸金鋭蒙鴻大籥清警虛籟生風怒齊竽之濫吹壯秦缶之爭雄稽爾既倬猗歟載豐匪天子之明德孰以成其衆美總四夷而徵妙越六代而高視思其鏗鍠嘈囋清暢逶迤五色成文而不亂八風從律而不虧窮高遠而測深厚故乃盡美而在斯太華之山削成四面方直者五千餘仞蓋嶽之雄也往因行邁望之不及今來何幸作尉於茲因而賦之以歌厥美華山維嶽㣥嶽之雄天開厥狀神致其功昔與襄山連岡不絶河水長注橫流曲折神元再造拓崖而兩分仙掌常存倚天而回列其後多歷年所至於夏王窮地絡正乾綱緑甲之功既就元圭之業有光定我祀典因為舊章同夫三事偉哉煌煌徒觀其倚伏而起削成而峻作秦塞之高標為豫州之巨鎮其南接楚其北臨晉嶔乎數都之間豈惟直上者五千餘仞遠疑將適近若將騰氤氳緑潤霮䨴青凝發地壁立連天石稜披重霄而自致與元氣而相陵旁望㣥山兮盡為幽側猶夫南面兮用資峻極巍巍乎掩夏雲之奇峰蒼蒼然合秋天之正色近壓關輔載樞京國此其所以為嶽者也若乃人寰不遠勝氣常清石含古色泉落秋聲懸巖蔽虧謂乾坤之闔闢洞壑幽邃泛雷雨之滿盈恍恍乎又似龍虎潛伏鬼神含精伊彼崇林望之盡目參灝氣而森秀侔斷山之遙矗仙草殊品靈花異族不以無人而不芳香風灑乎函谷皆負靈造是潤是黷具物靈繁故難詳鞫蕭條世俗髣佛神仙玉女明祠星壇尚在羊公舊室石榻常穿霧雨迷處雲臺巍然則知大象所存何有於古列真攸萃寧獨於先國家南正司天北正司地人神不擾方嶽定位森森象設之若生憺憺威稜而可畏宗伯制禮巫咸視事殺氣每登騂剛必備蓋所謂敬而無黷厲夫精意此則邦之禮物也受命如響依人而榮攸歆盛德載答嘉生不夭夭心旬時作為雲雨白漿既挹黃玉斯睹隤止如山永康中土此則神之叶贊也揔被山嶽非無壯麗或隱峰於㣥嶺或結根於荒裔空聞象外之談何貴人間之世而我直兩都之大道當三條之正中偏近日月高謝紛濛通天之氣成天之功鑾輅常幸聲明有融能事無爽揚言莫窮舉天下而爭長故難可而比崇代有劒兮物之至珍精鋼百鍊處匣千春含光匿耀守靜全真蘊切玉之姿咸稱往歲呈斬蛇之鋭幸在今辰至如歐冶素蘊風胡久委許提拔而非遙期磨礱而在邇蓮鍔熒煌思緑水之是投霜鋒煜爚諒碧天之可倚孰云巨闕亦曰龍泉借衛身而用光眉壽將行佩而永保流年俯而察乃白光略地仰而觀則紫氣射天若乃取舍從人沈淪委質埋厚地之聲有年望司空之來何日擊兕之名已彰決雲之勢不失大哉寶劒之神用等天地而齊畢劒之利者有豐城之寶鍔夫其始也赤山破邪溪涸洪爐洞融金景煽爍雖發揮於人事乃兆朕於天作爾其為狀也煆霆電明秋水殺氣森映光輝四起歐冶失律風胡吅丂一視豈徒決浮雲絶地紀若斯而已矣爾其大運回薄陵谷推遷東南地沒不知夫數千百年騰精動地直上衝天斗牛之間夜雄雄然異金陵之浮王氣同寶鼎之在汾川本知浮精粹剛決必備明而用晦者君子之時義窮而待達者丈夫之志事兼此數德難乎見棄知我者寡大賴張公每讀舊書多茲感通不覺毛髮盡樹起雷息於胸中逮乎發蒙泉開祕匣文積幽翳上藏鱗甲磨礪畢兮見文章搖白日兮星煌煌鋒稜可畏動人膽表裏分明照眼光黃金裝兮緑龜飾荷提攜兮耿霜色豈辱命於洪造冀成能兮武力君其試將倚天外不日為君清絶塞苟軍國之用在豈能雌伏於一代有懷其寶而未別候以其時而自絶始藏用而有疑終因人而一決蓋時有遇否非事有工拙願一二於擊轅之歌左右以相劒之說於越之君以五劒聞方潛神以閉匣非有意於決雲且切白玉其猶泥斷截蛟龍忽若篲泛夫以中庸之近者惡識天下之良劒有客來越其至自秦心以通於物理鑒有邁於人倫昔也聞風而悅今為觀國之賓以天機之見明利器之因天氣得中而不易金精順理而無逆翼乎秋水之欲波渙乎春冰之將釋陽散陰漫霜鍔雪脊好勇者不能禦其折衝善說者不能離其堅白滿谷之馬未可齊乎此價傾城之金安能賣乎此客況非景罕匹流星莫闕八字歐冶之術為優此名器因而有作明至寶不得無妄劒非人而何識人非劒而何相雖煆鍊於良工皆等衡於哲匠劒之能可以相著士之用可以劒明抱識者闕一字乎牽復藏器者以其彙征願以小人之道而進期君子之鑒惟清重曰析薪如之何匪斧不克求劒如之何匪相不得純鉤之器秦客所識非常人之區域序曰懸象著明莫大乎日月我聖人之文也發祥儲祉莫大乎神祇文之所繇興也原夫天作太華氣雄㣥山秉靈伊何受命如響自坤元之所開拓虞帝之所巡遊祀典雖存宏圖蓋闕洞陰陽之不測其惟大聖歟於是藻翰自天發揮神化建碑於廟以光寵焉乃命朝英實司其事經始勿亟庶人子來徒觀其神輸坤珍美石次玉追琢之際厥聲泠然磨礱之後其光洞納樹之平地嶷若斷山六龍盤薄糾其上㣥神羅立負其下藝事既畢宸章乃開竊以洪爐大造之時天動地嶪祕籙聿來之日風搖雲起詞義至廣含元氣而運行翰墨至精吐奎星而飛動剛柔相錯神妙無方合而五光昭離而萬象列宇宙之間粲如也由是發巖巒之氣色益祠廟之風稜不怒而威有來加敬蓋因大君之一顧也寵秩榮幸不其至哉初有司以法駕時巡路直斯地將選巨石先期底功天意若曰夫人神之主也嚴神以為人也今穡事未已工徒復興人儻失業神將何據方待歲暮以須後圖粵若碑版嶪乎刊刻通其變則人不倦節其用而財不傷俾夫役者逸於從事天之臨下其道有赫曲成萬物何往非宜時厥使臣乃昌言曰國之大事在祀神之所歆在德以德舉事吾君有光比夫周銘弇山存乎車轍馬跡漢祀少室蓋欲遙輿一作興輕舉至誠逮下可同年而道哉頌聲未作詞客之過小人固陋遊聖難名實賴文宗繼其不逮敢託呂補闕向為之頌云鳳凰于飛聲中律呂雌雄是聽道在伶倫通乎忽微探彼幽賾瞻言乙也忝跡於斯豈術數之未精而飾情之有訴且軒轅已降歲序茲深推律者寧止於一家探竹者無聞於絶塞遐求嶰谷近捨金門荀勗聲高懸同此設京房識遠有愧其能既謝知音宜從置罪新安主簿高侯知名之士也自角巾私第居多散逸不遠伊邇薄遊於畿濟源宰寇公此侯之舊也乃昌言曰敝邑褊小何以娛賓是用戒朋遊選休暇總轡出郭頓夫濟瀆焉昔陶唐宅天洪水方割夏后敷土沈災克清瀆之稱位斯焉肇起夫其含靈厚載託勝中州初若爭雄截黃河而徑渡去而有禮揖滄海以朝宗均祀典於通侯蓋取諸此然後命舟子為水嬉垂安流窺洞穴烟華釣浦彩徹金潭表裏皆明下觀鱗石風雨時霽遙影一作映雲山荷芰香而酒氣添濃洲渚隱而榜歌聞曲船移鳥下岸靜蟬鳴沿流溯洄坐得桃源之趣矣況時當大夏氣惟溽暑沸海焦陵流金爍石獨有茲地勢隔人寰高樹森沈窅若無日修竹陰映蕭然納清徘徊久之體靜心愜思壯士以翻景與諸公為窮年不覺晴雲向山涼露霑夕對歸騎而將散負幽情而更多如何志之詩可以興軹縣西北數十里濟水出焉稽乎舊章可得而道自河浮緑甲帝命元夷疏甽澮而正乾綱鏟陵巒而通委輸所謂四瀆資我而成彼三川者或在幽僻遠而見奇伊何足貴豈與夫體清淳之氣據函夏之中平地開源分空正録表裏皆淨似若非深舟楫既加乃知無底沖和自抱斯君子之量歟從此而東截河通汶不以險阻殊其勢不以清濁汨其流終能獨運長波滔滔入海沈潛剛克斯君子之量歟意者洞幽明貫天壤包荒萬類出入無間形與化遊復歸於道不然何其異也雖金火交作變通殊制而浮沈之事亦無捨旃國家南正司天北正司地以為百神授職則陰陽無錯繆之災㣥望聿修水土得平均之序欽若稽古道豈虛行閟宮有侐象設如在流目一望森森動人覺毛髮之間風飇四起然後以諸侯之禮禮而祀之至於下人日用蘋藻吉凶悔吝則以情言且神道無方豈存於此而物類相召或有憑焉㕎溜潛通動植滋液高樹直上百尺無枝虛篁下清四時一色意隔人世空聞鳥聲陽浦先春草心方變㩻岸猶冷苔生未穠紅晶落而天下陰青靄凝而衆山暮留賞無厭歸情坐忘中途載懷歷歷在眼庶記豪翰光昭厥美云希烈宋州人開元中常於禁中講老易纍遷祕書少監李林甫引為左相兼兵部尚書同知政事封潁川郡開國公楊國忠嫉之罷知政事守太子太師祿山之亂與張垍達奚珣同掌賊機衡肅宗返正賜死於家伏見太清宮道士蕭從一云今日五更欲於殿上焚香行至三清門忽有一片紫雲從空下兼有異常音樂忽然如夢身心驚駭見空中有異人兼仙童玉女謂從者曰我是元元皇帝可報吾孫汝是上界真人令侍吾左右吾冥使天匠就助成就訖長衛護汝受命無疆災害自除天下安樂言訖隨雲氣便入殿門謹案諸道士學生皆稱今日淩晨於三清門外見道士蕭從一鞠恭唱喏三四聲有紫雲及音樂移時不散伏惟陛下虔誠奉道福祐所歸置玉石真容侍聖祖左右仙樂下慶天將助成紫雲徘徊移時不散空中有語所報非常言聖壽之延長億萬載之無極伏望宣付史官臣伏見今月二十日恩制以莊子號南華真人書曰南華真經所說皆理身之要發明奧義有十萬元言祖述道經含五千微旨昔常侍講跪演經文至於七篇陛下顧謂臣曰其篇有養生主已悟長年之術其次有德充符豈無非常之應臣稽首對曰陛下德充於內符應於外發言之後必有大慶以應之後篇之中所謂應帝王之篇是也今元元皇帝果降靈符彰寶祚無疆之福含真人知來之旨尊以稱謂陳其象設希代之禮曠古未聞臣於此經宿願深重受持讀誦三十餘年作禮焚香庶裨聖化獲逢殊慶倍百常情望宣付史官以昭靈應茅山紫陽觀右臣奉敕與修功德使元靜先生李含光內謁者監程元暹等同檢校修造前件觀並了并設齊謝上訖去年九月二十二日録奏奉敕宜付所司修造觀回殘錢二百四貫二百八十五文右修造外有前件回殘為造觀成附奏奉敕便賜觀家充常住郡司已準數分付三綱訖臣又與觀主道士劉行矩等商量請於便近縣置一庫收質每月納息充常住其本伏望長存觀額及徒衆先受地頃畝並足今載所收納苗子支來載糧亦充并觀內先有奴婢四人小牛六頭車一乘見在右臣今對所管縣官及三綱檢責觀內先有前件産業數勘覆並同其糧食已有歲支來春請加營種觀內什物五行等右觀家先貧什物數少昨修功德使程元暹奉敕支供黃籙齊外有回殘銀一百兩令臣分付觀內徒衆將回市所缺什物等並令充足觀內松竹果木等右臣伏以觀在茅山㣥仙所集院宇雖則華壯松竹先多缺少比為非時未由種植請至開春專令栽蒔并於南池種藕庶望周遍謹具以聞丹陽郡太守林洋奏件狀如前中書門下牒丹陽郡牒奉敕宜依牒至準敕故牒天寶八載正月八日左相兵部尚書陳希烈左僕射兼右相林甫林甫高祖從父弟長平王叔良曾孫初為千牛直長開元中纍拜黃門侍郎禮部尚書同中書門下三品加銀青光祿大夫中書集賢殿大學士兼領隴右河西節度加吏部尚書天寶初易官名為右相遷尚書左僕射加開府儀同三司十一載卒贈太尉揚州大都督域中之大有四道之首而王者統焉方外之人有五神為之首而聖者用焉非道也無以致神非神也莫能感聖自炎師水玉軒訪峒山窅藐汾陽徘徊河上且猶私一巳之利屈萬乘之尊或得之而不存或求之而不及則未有宏心六合元化被於海隅滌覽九重異人臻於闕下密傳仙契潛役神功端拱紫庭坐進金鼎如我開元天寶聖文神武皇帝之至感也蓋德邁者其業崇道宏者其化博上初戡巨難纂睿圖以為唐虞盛理教人而已矣乃昭禮物考經志於是乎帝典王綱罔不畢備及夫一戎夏致雍熙又以為軒昊上德恭已而已矣乃敦清淨復淳朴於是乎偃甲垂衣示於無欲故載歷三紀功包九皇乃時有真人方士不召而至者儼然而進曰臣聞昔者太初之先也嘗有受命握符一君千歲後代聖人順其外為封禪修其中為導養故玉檢有不死之名金丹為長生之要五三以降茲道蔑聞陛下承紫氣之真宗接黃神之遠運玉檢之文已備金丹之驗未彰天將授之其在今矣上覽其議而告之言朕聞神丹者有琅玕雪霜三化五轉太乙得之為上帝之伯元君得之為下教之尊必將假無為之功任自然之力乃可就矣於是考靈跡求福庭以為嵩陽觀者神嶽之宅真仙都之標勝直天中晷影之正記烈祖巡遊之所抱汝含潁風交雨會陰陽之所蒸液偓佺之所往還丹竈琳堂往往而在乃命道士孫太沖親承密詔對授真訣一之日披圖於天府二之日陳醮於山壇然後俾太乙啓罏陵陽傳火積炭於廡下投藥於鼎中固以扃鐍窒其窗戶隙光不容人跡罕到自河尹官屬邑宰吏僚目對封泥手連印署太沖乃與中使嶭履信銜命而東涉海沂過蒙羽行且千里歸已十旬然後剋日聚觀開封發印餘燼未滅還丹赫然則已六轉矣明年移藥於緱氏山升仙太子廟其役制之功神異之效又如初焉每至降御詞陳祝冊紫泥素表倏忽飛天元酒玉杯繽紛移座祠官眙供吏驚呼靈貺昭答有如此者其餘瑞鶴卿雲祥光祕語匪朝伊夕不可勝記按中丹經云金華符成威光鼎就則有朱鳥呈異白日激輝斯非類乎九轉既畢馳驛以獻聖上方滌慮穆清齊心虛白神期應會如合契焉於是三事百僚奉觴稱賀曰陛下撫㣥黎而歸壽域上真降殊休而報聖德神丹一御與天無極且夫宏化至道先烈也還風太初昌運也異人委質聖感也靈藥薦壽天符也此四者皇圖帝載所未聞焉微臣預春秋之徒忝申甫之地上清事隱非魯冊之可徵大洞功成豈周頌之能紀強銘琬炎永播乾坤其詞曰太古兮上皇千歲兮一君自軒轅兮獨往遂歷代兮無聞有唐兮英聖六葉兮十紀維天寶兮合符故淳風兮變始嵩有峯兮潁有瀾交靈氣兮集仙壇資聖壽兮效神丹神丹御兮福庭會虹霓旗兮紫雲蓋臨萬邦兮彌億載臣聞昔在唐堯則歷象日月敬授人時降及虞舜則璿樞玉衡以齊七政夏后則更置小正周公則別為時訓斯皆月令之宗旨也逮夫呂氏纂習舊儀定以孟春日在營室有拘恆檢無適變通不知氣逐閏移節隨斗建洎乎月朔差異日星見殊乃令雩祀愆期百工作沴事資革弊允屬宜更昭代敬天勤民順時設教是以有皇極之敷言親降聖謨重有刪定乃依杓建爰準攝提舉正於中匪乖期於積閏履端於始不爽候於上元節氣由是合宜刑政以之咸序遂使金木各得其性水火無相奪倫蓋所謂順乎天而應乎人者也乃命集賢院學士尚書左僕射兼右相吏部尚書李林甫門下侍郎陳希烈中書侍郎徐安貞直學士起居舍人劉光謙宣城郡司馬齊光乂河南府倉曹參軍陸善經修撰官家令寺丞兼知太史監事史元晏待制官安定郡別駕梁令瓚等為之注解臣等虔奉綸音極思何有愧無演暢之能謬承載筆之寄義深罕測學淺無能莫副天心空塵聖意謹上伏以吐蕃此城正當衝要憑險自固恃以窺邊積年以來蟻聚為患縱有百萬之衆難以施功陛下親紆祕策不興師旅頃令中使李思敬曉諭羌族莫不懷恩翻然改圖自相謀陷神算運於不測睿略通於未然纍載逋誅一朝蕩滅又臣等今日奏事陛下從容問臣等曰卿等但看四夷不久當漸摧喪德音才降遽聞戎捷則知聖與天合應如響至前古巳來所未有也請宣示百寮編諸史策伏見陛下因太子生日撰仁孝詩障子并書臣等伏以宸章煥發睿札凝輝懸日月而齊光自雲霄而下濟驚心靡據動色相歡太子稟自生知備承聖訓沖姿有裕令望夙彰陛下示以義方形於翰墨爰於誕育之日勗以仁孝之經上揚祖宗之美傍考天人之際錫類所宏教義斯遠足可發揮前古垂範將來凡在衣冠之流咸知父子之道豈比周稱教諭造齒胄於上庠漢寵元良但招賢於望苑王化之本實此知歸人倫所資罔不申勸臣等愚陋謬典樞衡特奉鴻私幸覩殊貺捧天書而竊抃仰聖澤以無寧無任悅豫之至仍望具寫六章頒示中外兼編諸簡策傳之不朽
