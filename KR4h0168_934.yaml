front:
  text: 全唐文欽定全唐文卷九百三十四杜光庭六
  hash: sha256:e4f7ec712d5bb785a6f14c68e39586ca5528db0ad4b3cf86001f35a70e136e87
body:
  text: 繁陽山麻姑洞即三十四化之第一陽平之別名也在繁水之陽因以為名本際經云天師張道陵所遊太上說經之處在成都府新都縣南陵江十五里衆山連接孤峯特起是也神武皇帝潛龍之時光化二年己未五月四日丙申山土摧落洞門自開縣吏時康鄉所由楊靖道士張守真等以事申府云自洞門開後每日有百姓往來者府差縣典楊澤畫工任從同往檢覆畫圖申上稱把燈燭入洞看檢其第一門對北高二尺濶三尺五寸入至第二門約五尺以來第二洞門方一尺六寸入內竝是黑處長一丈二尺濶六尺有石窟兩處在東畔竝西南有洞門兩路南畔一路圓濶一尺六寸入內長一丈二尺濶一丈高四尺南畔有窟三處西畔兩路入內通繞門圓濶一丈七尺內各濶五尺高六尺以來門相去一丈門屋一所高五尺闊四尺從內往來有刻枓栱甬瓦瓦約山作石日月兼作日字月字隔子房一所濶二尺五寸高一尺五寸刻枓栱甬瓦瓦石竈一所高一尺濶一尺五寸門濶五寸石窟三處各濶七尺又西入洞門圓濶一尺七寸彎曲入向南門屋一所高六尺濶四尺從內往來有石枓栱甬瓦瓦又有竈模兩所共一牀高一尺濶二尺三寸門濶八尺有石枓栱西北角又有一門方一尺六寸四方二丈以來南畔西畔北畔各窟一所南角又有一洞圓濶一尺六寸以來將燈燭近前有黑氣出燈火即滅更入不得其洞連接繁陽本山相去三里以來其山據諸鄉張生張贇等狀稱繁陽是古跡山每准敕祭祀其洞亦是元有往往閉塞元和中南康王韋皋蒞蜀洞忽開時人咸云洞門開即年豐物賤尋又閉塞至是復開其後果豐稔其洞本名麻姑洞側有麻姑宅基蓋修道之所也帛丿糸州昌明縣豆圌山真人豆子明修道之所也西接長岡猶通車馬東臨峭壁陡絶一隅自西壁至東峯石笋如圌兩崖中斷相去百餘丈躋攀險絶人所不到其頂有天尊古宮不知所製年月古仙曾作繩橋以通登覽而緪笮朽絶已久里中有言曰欲知修續者腳下自生毛相傳如此咸通中山下有毛意歡者幼而為道常持誦五千言著敝布褐於市乞酒醉而登山攀緣峭險以絶道為橋山頂多白松樹繫之繩橫亘中頂布板緣繩上善男女隨而度焉數年繩朽橋壞無復緝者咸通嵗令與賓客醮山於西峯時展禮毛師他遊人謂令曰此峯之側有小徑抱崖才通人跡無所攀援意歡常遊此而去逾旬不出令疑其隱在穴中座內有廣陵郭頭陀者令請由此徑往探求之頭陀驚眙不能語久之而後言曰此徑去約三十餘丈然到一穴口才三五尺下去平地猶數百尺穴內可坐十餘人中有巨木匱緘鎖極固意歡讀經處石面平滑有足膝之痕而經卷在焉不知意歡之所其家有一妻一女而已凝其得道者也意歡每多持燈碗度繩橋山側居人視之以為常矣山多毒蛇猛虎里中人莫敢獨往意歡夜歸亦無所畏焉常有二鴉客將至必飛鳴意歡整飾賓階坐榻未畢客果至矣蓋聞天元設象運日月以璇衡地道綱維布山河而列政有王屋山者在洛陽京北百餘里黃河之北勢雄氣壯岡阜相連高聳太虛倚懸列宿西接於昆邱東連於滄海謹按龜山白玉上經曰洞天周回萬里山水之源圖經曰上則接於昆邱下即侵於蓬島最高者首名天壇山也黃帝內傳云為之瓊林臺真誥云瓊林者即清虛小有之別天也其下即生泡濟之水中有水芝人得服者長生耳昔黃帝上臺見一級高可及二丈許下石二級高可七十尺許四方壁立皆造化融成黃帝於此告天遂感九天元女西王母降授九鼎神丹經陰符策遂乃克伏蚩尢之黨自此天壇之始也其上多石可生草木實為五嶽四瀆十大洞天三十六小洞天神仙朝會之所每至三月十八日及諸元會日五更之初天氣清明輒聞仙鐘從遠洞中發寥寥之聲清宛可入耳將日出則日氣炯炯可以見生死之情狀觀天地之變化當曉時分別之際則聞仙雞報曉往往飛棲下地象小於家雞其毛如雪又壇心有石燈臺四門中高可丈餘製造甚奇鎮於洞天諸元會日靈山真聖皆朝會壇所考校學仙之人及世間善惡籍籙之案是日往往則陰雲蔽固竟日方散是日有道之士學修仙之人投簡奏詞醮謝其下壇隅有造石燈臺小碣記云天寶八年新安尉公使內使宮圍令符筵喜因為國為民醮壇置碣陰刻盧同高常嚴固至太和五年凡字缺損壇心高突秀出㣥峯每日初出影西度掩西方山脊亦可及千餘里上無飛鳥風若松聲太虛中孤危而四面無礙人立於上沖和血氣狀如勇心直脛而立目視歷歷亦可自辨其形影似憑高眺遠飛越崖谷長天未曉身若浮萍又如精氣所乘飇不得落此果乃真仙遊行之所也心若不志銷爍其精魂耳似有怖懼凡有道之士身若輕舉天明日朗則夜聞人語笑之聲或簫鼓奏於其上又壇西有懸泉名曰太一泉其水味甘如醴其泉水流如線落在石㪷中深可數尺千人飲之不耗經年不汲如故次西一石巖名曰黑龍洞洞上半崖高數十丈有一洞深二丈許正射西北天門名曰按雲庵舊有葛梯人蹬躡可到昔太乙元君修道於此其太一泉水伏流其下東為濟水其泉次南有一巖曰紫金堂昔軒轅黃帝駕憩於此沿堂側其道徑甚嶮至一石門側身可上乃止壇頂其門名曰東天門門東有換衣亭壇頂上有三清殿東西有廊廡壇畔有四角亭臨崖百尺憑闌四望南視嵩峯少室大河如帶西有王附山東北有王母三洞壇東北隅有一石長丈餘濶尺許突出崖頭下深百丈登壇人供侍香火朝拜王母三洞心有恐怖者不敢上石名曰定心石北望析城山東北望太行東觀日出如生滄海四面瞻視㣥山卑如邱阜方顯洞天之獨尊高表神仙之聖跡壇東一峯甚秀名曰日精峯壇西峯名曰月華峯峯南一平嶺號曰躡雲嶠下有一澗名曰避秦溝西南下十八盤次南曰仙人橋東有伏龍嶺南一小峯名曰雞子峯次下仰天池次南路有歇息亭自壇頂至上方院八里又曰中巖臺乃司馬子微修行遊息之所前下紫微溪至陽臺觀八里中有仙貓洞不老泉觀東有燕真人洗耳井仍存在陽臺觀東北百餘步俗呼燕家泉其觀前分八岡名曰八仙岡昔司馬承禎天師河內溫城人也乃西晉司馬宣王之後今溫縣西二十里招賢城是也尚有晉三帝墳在焉唐睿宗皇帝女玉真公主好道師司馬天師天師住天台山紫霄峯後睿宗宣詔住上方院其司馬初師嵩嶽潘師正師正師茅山王升真升真師華陽隱居陶仙翁其四世不失正道唐明皇即位於開元十二年敕修陽臺觀明皇御書寥陽殿榜內塑五老仙像陽臺有鐘一口上篆六十四卦曰萬象鐘有壇曰法象壇有鐘樓名曰氣象樓殿西北有道院名曰白雲道院司馬號白雲先生有亭曰松亭有先生廟堂先生撰文一部曰白雲記篆書別為一體號曰金翦刀流行於世先生未神化時注太上升元經及坐忘論亦行於世至開元十五年八月十五日有雙鶴繞壇西北而去彼時白雲自堂中出聞簫韶之聲此先生顯化之驗也王屋縣宰崔日用聞奏明皇異之先生神化時年八十有九諡贈銀青光祿大夫諡白雲先生堂西壁上畫先生遊行乘駕黃犢車白雲步步相隨觀西有山神廟即王屋山神也天寶年其神用陰兵助郭子儀破安祿山後明皇封為總靈明神天王仍敕修其廟觀南有太山廟南王屋縣去西八里有藏花洞其水春緑夏赤秋白冬紫水味甘美壇東南附山名青羅峯下有青羅仙人觀碑存焉壇北有五斗峯通麻籠藥匱二山王屋山中有洞深不可入洞中如王者之宮故名曰王屋也藥匱山次東有趙老廠田坴昔趙真人修道於此及四真人煉丹於此有石室二十餘間霍仙人修煉於此名霍師堂壇東南有山名齊嶺下有山名垂簪峯又側有清虛小有洞洞內周遊萬里昔唐建三清殿及清虛觀其洞內有因兵火居民避亂穢氣所觸民出洞後有石落塞合洞門真誥云其洞中日月晝夜光明輝映朗接太虛與外日月無異此乃為日月伏根也日曰神精月白陰精明照在洞天之中天亦高大星宿雲氣無草木萬類洞宮之中有金玉之殿及多寶貝黃金琉璃瓊璧不可名狀有五闕五山加於五嶽上生紫林方華星髓金津碧毫朱靈夜粲細實竝壺中洞天之所生也人得食之乃長生神仙矣洞主王君掌校仙籍善惡之録處事其中矣太素三元上道君遣青真左夫人郭靈蓋右夫人楊玉華賫神策玉璽見授王君為太素清虛真人領清虛小有洞天王分主四司左保上公治王屋山洞天之中給金童玉女各三百人掌上清玉章太素寶元祕籍上品九仙靈文山海妙經盡掌之焉又總洞中明景三天寶録得乘龍跨虎金輦瓊輪八景飛輿出入上清受事太素寢宴太極也小有洞天者乃十大洞天三十六小洞天七十二福地之宗首也仙都所宗太上所保故重其任以委㣥真矣元始天王曰夫小有洞天者是十大洞天之首三十六小洞天之總首也齊嶺東一山名曰玉陽山山東次南有瀑水如練長百尺落半崖澗下有深潭名曰攛鐘浤其山名西玉陽山靈靈都宮東北有山名東玉陽山山有洞深百尺國家時投金龍於此洞旁有一憩鶴亭高數丈上有鶴跡存焉昔因周靈王太子王子晉與師浮邱公遊天壇回憩鶴於此天壇四面附山峯巒澗嶺泉谷勝跡總目於石頌曰王屋天壇福地元清虛小有洞天仙無窮勝境於人物有感神通今古傳長安富平縣北定陵後通關鄉入谷二十餘里有二洞一名東女學一名西女學其東女學崖壁懸絶洞門在崖面躋攀不及夜往往聞讀書之聲其西女學約山有路可到洞門近門一石室可容一二十人其洞門時有人秉燭可入行一二十里兩面有五門皆各有題記或云通蓬萊及諸仙境近年有石摧下遮閉洞門不通人入又山頂有一天井直下深二丈許有自然橫石旁出石下天井亦可二丈餘可通人過其底傍有崖龕梯磴而上曲屈甚廣龕內有道經數萬卷皆置於柏木板牀之上有一石人俯首憑案而坐形如生人天井之底有道門所投之簡委積朽爛不知其數其大順年中富平奉道人姓徐第七曾於洞內取養生經出外傳寫却送山洞中又向北行二十餘里有三泉山谷中有石山嵌可容二三百人當谷內有三石盆其盆各廣丈餘制度光滑殆非人功三盆湧出泉水常滿餘水流出山外故老云時有仙人浴此盆大都此山有人觸犯即立致雷雹傷損苗稼由是鄉里多隱蔽蹤跡難於尋訪山上有仙人鬬聖蹤跡極多東女學山前有神鵰一窠常護洞門人或侵犯者神鵰擊之立致隕斃古有道流刻五石人置於山上民有鋤禾者為鵰所驚走避於石人之下置笠於石人頭上鵰即擊之石人頭隕於今見在其山下通關鄉多姓公孫賈家山上石保村多姓呂氏麻氏亢旱自天豈容私禱急難告佛實出微誠恭惟定光菩薩智海難量便門廣闢不辜衆生之願肯辭千里之遙靉靆慈雲既無心而出岫滂沱法雨端有意於為霖世人多以隸書始於秦時程邈者非也隸書之興興於周代何以知之按左傳史趙算絳縣人年曰亥有二首六身是其物也士文伯曰然則二萬六千六百有六旬也蓋以亥字之形似布算之狀按古文亥作亢全無其狀雖春秋之時文字體別而言亥字有二首六身則是今之亥字下其首之二畫豎置身傍亥作豕此則二萬六千六百之數據此亥文則春秋之時有隸書矣又酈善長水經注云臨淄人有發古冡者得銅棺棺外隱起為文言齊太公六代孫胡公之棺也惟三字古文餘同今書此胡公又在春秋之前即隸書興於周代明矣當時未全行猶與古文相參自秦程邈已來乃廢古文全行隸體故程邈等擅其名非創造也臣聞太上開圖元皇演教三籙定金明之典功被人天九幽懸玉匱之科惠周存沒竊尋經旨遵按元文仰祈遷拔之恩輒備懺陳之懇今月二十五日是臣先妣唐楚國夫人蜀追封宋國太夫人劉氏忌辰今月三十日是臣先考唐丞相太子太師致仕蜀追贈太尉忌辰謹賫油燭香花供養之具於成都府玉局化北帝院奉修靈寶明真道場一晝一夜道士一十四人三時行道三時轉經對乾象以披心馳香龍而上奏伏惟高尊憫鑒衆聖垂光暜告四司關明三界降九龍符命開長夜寒庭鍊沐形魂遷拔神爽出元陰之府入洞陽之宮罪咎蠲消冤讐解釋落名地簡列籍道階輪轉福鄉克登仙品九元幽識咸遂超升誓勤修奉之心上答真靈之澤伏以妙道元功濟時佐國真經祕旨拯物救人肇宏規於億劫之前宏大化於萬天之內宗之者儲祥納祐修之者駕景登晨披究古今昭彰典誥張氏克承禎貺運偶聖明被沐天光輝華帝澤循懷顧分常抱兢憂省已修躬每為炯戒實恐往世之積瑕米懺此生之纍釁將深幽陰有注誦之書冥漠有考延之籍又張氏今年天符臨於木墓之位暗曜住於飛化之年火星照於身宮仍當剋之性分大運逢王金之上火力稍微小運值生金之鄉木氣已薄緬思厄會倍用憂虞竊惟大道無方施恩暜洽式申虔祝必介休祥是用蠲潔丹心修崇黃籙像瑤壇而肅列按瓊韞以敷陳質信諸天燭蘭缸於午夜告明三界飄檀蕙於九時露懇馳誠希恩悔過伏惟高尊太上萬聖千真憫鑒叩祈昭宣渥澤敕天司地府命陰職陽寮黑簿落名青宮著籙和平債訟消解冤讐北都除執對之篇年齡增遠南極定延長之紀祿祚尢宜五行祛災滯之文九曜息照臨之咎常歡舜日永廕堯天眷屬樂康子孫忠孝九元七祖往逝先亡或拘滯昏衢未超福路願承道力便遂往生利佑見存允蒙貞吉其有三塗六趣夜府寒鄉亦因懺滌之緣盡獲逍遙之果陰陽將吏宅宇龍神長悅豫以安寧俾凶衰而殄息上願皇圖遐廣聖壽延洪卜年克大於姬周享祚更隆於炎漢寰瀛一統書軌混同共傾捧日之心咸沐自天之祐伏聞道本無為降元精而生二象象而後數羅五緯而備㣥形維地麗天無違於律歷陽舒陰慘咸繫於裁成由是善惡循環吉凶倚伏乾剛坤載不能排九六之期蟾魄烏輪不能革盈虧之勢况乎二儀稟質三命定生未超變化之機固有推遷之理是宜兢懷省己審過知非常加策勵之心冀動真靈之鑒臣夙承元廕早沐洪休運偶睿明身叨寵任推忠陳力未申匡濟之勞翊聖扶天纍荷超逾之渥將壇相印委遇益隆蒼佩行師徽榮彌厚戒滿盈而徒切報君父以何階尚恐動靜行藏有乖於素分屬心舉念有忤於神明或在公有失於賞刑統衆有愆於裁斷或往世之尢違未解或積生之冤債未祛有一於斯皆宜懺滌又今年二運俱逢於墓位飛天仍直於火星雖居華蓋祿德之方恐有刑剋照臨之數以茲兢懼倍切懇誠徐氏年運之中亦有災滯大小二運金火氣微飛宮遇於計都天符臨於生月恐為災滯志在懺祈是敢恭備信儀虔申齊潔按元都品格修黃籙道場嚴香花於二日六時召真聖於諸天諸地凝神注念瀝懇披心伏惟萬聖回光衆真流鑒憫其丹款錫以休祥赦已往之罪瑕息將來之厄滯明星暗曜無臨照之凶三命五行除衝妨之會冤仇和釋債訟消平嗣允繁昌壽祿延益九元蒙福幽夜開光眷屬康寧龍神安豫上願聖躬萬壽大業永昌布聲教於九圍咸歡舜澤混車書於八極共樂堯仁百穀豐盈六氣均暢誓傾忠孝上酬英睿之慈克勵精誠仰副真靈之祐伏以大道元功至真妙感隨方流貺應念垂慈佐國濟人恩周於動植祛災降福惠及於幽明凡所啓祈必蒙昭鑒某氏以今年大小行運之內恐三命衰微陰陽宿曜之中恐五星臨照致成災厄無所告祈竊聞黃籙妙齊功德廣大無災不解無厄不禳輒罄丹誠冀蒙元祐謹依科法開置壇場三日香燈九時懺謝至真冥應有感必通伏願三境諸天高真衆聖降無涯之澤垂廣覆之恩為某氏解除積世罪瑕多生冤債隨懺消平應時除蕩眷屬安貞公私和泰誓傾忠孝永奉聖朝伏聞冥寂之初混元之首道生一氣分彼兩儀陰陽有升降之殊清濁有仙凡之異是則紫清金闕高居太妙之庭黃軸風關下鎮窮泉之域隨機染惑因生進退之疑委跡沈浮遂有飄零之痛既非先覺必在指迷元元大帝當東漢之季年啓南宮之寶笈首傳真籙大拯㣥生修之則駕景沖虛行之則濟人佐國或蕩平氛沴或懲革凶妖正日月之天綱風雲叶候靜災邪於地紀生植無愆歷代所尊垂休靡極臣夙承道廕獲奉皇慈功輕而渥澤愈隆力薄而君親未報常思稟窺祕籙宗受靈文勤旦夕之香燈勵精虔而禱祝所冀家國同納禎祥今則嚴備信儀恭開壇墠通宵懺滌稽首歸依蘭燈夜燭於九冥檀炷晨飛於三境恭馳懇款冀達尊靈伏惟太上三尊元元大帝十方衆聖三洞威神鑒丹懇之誠賜通感之應靈官真氣咸賜授傳使內保身安外袪災沴名臻道籍罪滅陰曹九元離積夜之香永棲長樂舉族享無涯之善常奉休明算壽遐延公私清泰上願龍圖悠久鳳歷延洪增聖壽於無疆乾坤共永布皇恩於有截海嶽咸安同為至道之風共暢無為之化臣聞靈寶陳規齊戒感希夷之兆真文設教行藏通修鍊之功莫不啓之於心宏之於道上可以虔祈穹昊昭達元微次可以宣布精誠祇延福祐永言奉信敢薦虔恭伏以皇帝劃地開基法天垂覆定禍亂而爰承土德闡真明而克應金行翼翼小心宏朽索薄冰之懼朝乾夕惕有櫛風沐雨之勞備歷嵗時益勤祇敬是致年豐嵗稔國富兵強定蜀漢之疆圻扼黔巫之襟帶允文允武咸序彞倫至公至平式崇治本四方慕義萬里歸仁梯航無隔於高深書軌盡同於風教蓋九霄之靈蔭信大道之冥扶用啓帝圖聿昌宸算永言戴仰彌切兢持近者以星象留行稍掩時景分野觀矚實資禱祈是用潔志清心忘機滌慮召十洲之法侶約三洞之元科敬設清齊仍啓大醮伏願上真降鑒衆聖宣慈回機軸於元關啓輝光於丹道凡言災沴竝獲消除但有吉祥皆承應感增聖壽於千秋之外播皇猷於萬宇之中壽山罙峻於五山福海更深於八海與乾坤而齊固共日月而合明叶華戎推奉之情遂臣子依憑之懇盡繄至教俯契微衷冒瀆真仙無任兢惶戒懼激切屏營之至謹遣得一大師賜紫張茂卿等一十四人虔修法事願鑒丹誠伏聞道運虛無泮元黃為九元之始象疑恍惚標化育為獨化之源於是覆載以乾坤照臨以日月三才共道剛柔之用迭興品彙攸生善惡之端遂列然後降之以君父佐之以股肱法高皇不宰之慈體大帝無言之煦宏安疆域大庇黎氓伏惟皇帝陛下出震臨人承乾御歷稟樞機之精耀含嶽瀆之靈源明契三辰運符四序當天人之允屬表讖瑞之咸臻因念陵夷遂康蒸庶鎮寧郡國割裂江山辛勤侔大禹之功化洽成周之德豈忘宵旰莫憚焦勞是用和平永期清泰某等今以時當端月節遇正陽屬二氣之將交處午位之炎景恩宏百福用薦千齡啓金籙之靈壇造玉京之勝地伏願皇帝明齊月桂壽比天榆握金鏡以御寰瀛致衢樽而歡億兆垂旒問道覩元凱之忠貞負扆調元獲夔龍而翊贊四三皇而共固一六合以無虞仰奉虛皇俯垂元造冀納虔祈之志共申懇禱之誠伏以浩邈無涯育乾坤者至道彌綸莫極運造化者元功凝一氣以生三才周六虛而吹萬有所以春皇秋帝雲紀火官承妙用以御寰瀛體無為而統天地曷嘗不含和韞粹端拱穆清執大象以臨人乘飛龍而布化雖流金爍石湯德彌光懷山襄陵堯風益扇皇帝應圖負扆握鏡開基慕元元慈儉之宗仰黃帝華胥之躅日慎一日雖休勿休故得聲教旁敷京坁積稔俗臻暇豫民樂雍熙交歡自洽於鄰封賝贐爭來於絶域倍增寅畏祇荷穹旻昨以垂象飛芒天文炯戒躔次雖殊於分野禱祈勵切於焚修恭啓皇壇敢希鴻福仰玉清之元化稽首知歸開金籙之道場齊心發願所貴者達誠碧落薦壽皇躬與日與月之同明共天共地之咸久青詞奏御俾金慧以韜光丹表通真致珠囊之叶度災躔永息禎瑞常臻鳳歷克調狼烟不警政隆三五祚越億千位忝儲宮實欽仙境輒傾素懇仰望元慈
