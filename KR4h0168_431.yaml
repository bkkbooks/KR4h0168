front:
  text: 全唐文欽定全唐文卷四百三十一李翰二
  hash: sha256:4082a6aacd103e2833137c12a78c3b42bd7407a2343a6822ce32cfd8bc2e7e8a
body:
  text: 或稱漢祖建五等封異姓其計得乎高后立四王非劉氏其事順乎嘗試論之曰夫思治惡亂體國之常理去危就安宅生之大域然而制業圖遠隨化會機是非較於毫得失差於興滅可不謂然乎揆夫高祖造漢殷鑒亡秦宗族無尺土之封子弟立空虛之地故衆枝莫助而孤根易拔封建之心肇於此矣又為大業可以力取神器推於命歸思得攬四海以獨富舉百郡而從欲而外誘異端內疑成計及見㣥心交阻偶語閒興適悟天下不可獨理專欲不能蓋衆分利推恩先封雍齒然後將士斂手不懷反覆豪俊息意知難搖動五等之制於是行焉既而鑾輅龍旗皆王室穆昭黼衣朱黻即功臣子孫君利世祚人安定主上敦子愛之情下結體信之志㣥后固犬牙之勢匹夫絶烏合之舉此所以為計之是也何創五等之議不遵三代之典境土踰溢隄防漏下權敵上都制方偶國過當啓陵僭之端怙強速交爭之兆賈誼痛其將亂朝錯憂其必危卒使諸侯失節朝廷忿忌此所以為計之非也且夫中興之主不讓肇基之勳成務之臣有高佐命之力故禮樂大備取維新之格言琴瑟不調除仍舊之斃法觀乎孝惠既崩高后稱制侯王諸呂何不可哉當若早署祿産之位宜序親疏之節小其國以圖全薄其勢以遠害而陳平周勃亦分茅錫土將相之後誓同山河舅甥之國穆若唇齒預閉覬覦之心不踐嫌猜之路克復明辟決自我躬高謝壽陵不負先帝安有齊兵之觀變代邸之危疑哉此所以為計之得也神害久盈物無兩大以呂氏之盛跨漢朝之權專禁兵以候疑秉大政以速謗趦趄異姓畜奸俟隙刺促大臣側目相視自投機穽實履憂虞此所以為計之失也嗚呼物有益之而損損之而益凡人臨事多惑視往則明向使高祖呂后觀既往之勢折當時之疑斷必全之策杜未萌之禍則惠文之閒無劉呂之難哀平之末有晉鄭是依况復周陳諸家休戚連漢黎獻思德謳歌未改雖天命興廢孰能明之然人謀叶密必無悔矣或問於翰曰昔諸葛亮擁膝南陽為梁甫吟自比管仲樂毅州平元直以為信然雖涯量罕窺而遺跡可見夫此三名臣者亦有優劣乎願聞其說翰辭不敢對至於再三問者固請不得已而應之曰豈易言乎豈易言乎夫目小者不足以論大體近者不足以量遠奈何泛議大賢然執律管者可以候四時之徵測日晷者可以知千里之度察微觀著由虛考實儻容寄言象於斯矣如僕所揣則管不逮樂孔明其伯仲之閒與問者曰何為其然也昔管仲相桓公九合諸侯一匡天下興齊定霸尊周勤王功其懋哉仁亦至矣孔明收荊州散敗之餘建策通吳合從破魏奉先主西入劍門下車而三分天下翊戴後嗣纘修舊勳刑政孚於偏方威德振于中夏雖短祚中否而王業殆成樂生一為燕將才勝齊師挫衄於二城之閒狼狽於兩國之際軍不振旅身卒奔亡子獨推而崇之冠於二賢之首誠所未喻其有說耶翰應之曰子之所問者末與語功則信然語才則不爾夫才生於代功與運成固有才優而功微運合而才劣先當格以道德合於終始審其邪正觀其去就然後事可明也夷吾當既亂之時輔有過之主功濟諸夏澤被生人信為美矣然邀功事讎務入之情速矣肆奢越禮盈量之意見焉故仲尼雖稱其仁終小其器止於霸者之佐殆非王臣之良孔明從容三顧後起籌畫必當締搆必成事屯而業亨主暗而國治兵弱而強鄰畏服功大而本朝不疑斯亦難矣然窺其軍令跡其用法必俟中原克復然後厚賞寬刑元德常稱馬謖言過其實不可大用卒致喪敗斯所謂濟于事而未全於道得諸已而未審於人樂生一戰舉齊二城未下待之以德收之以禮捨權變於攻取之際行王道於軍旅之閒事雖不成業亦宏矣向使昭王不死惠王不疑則其功未可量也夏侯太初論之詳矣及其逃燕之責亡而奔趙趙王問以圖燕之策樂生流涕而對曰臣昔之事燕昭王猶今日之事大王也千秋萬歲之後尚不敢侵其僕隸而况謀子孫乎因棄祿宵遁善夫長者之言可謂懷祿不屑其榮周身不違於道比諸二子不亦優乎主恩非臣下之所圖天命豈生人之所制安可以功業之成敗斷才能之長短耶且夫運有通塞命有修短蓋天意也豈人事乎昔韓信將伐魏問得不以周叔為將乎聞不用乃大喜向使魏人用之則漢師不敢濟河矣然則周叔之才亦韓信流亞也終湮滅而無聞焉古之大才而功不著者亦何可勝道哉翰長兄御史君體純至之德負經遠之才常感憤於周韓之閒嘯咏於管樂之際守之以忠信文之以禮樂蘊弻諧之大略以康濟為已任進逢國難謀猷不行退有家艱哀毀過禮官才元士命止中年位不登於廟堂名不書於史冊斯才也斯運也誰見三分九合之優劣辭燕對趙之去就哉由此觀之斷可知矣問者嘆息而退賓有囊錦握蘭韜劍懷玉介然獨立默而無言主人怪而問之曰僕觀今之士君子所求速進體必盡飾而足下望門若有疑造庭若有懼隱文采匿芬芳掩光輝潛穎利此何謂也豈有以哉客曰夫順時而動嘉會不可以智求藏器於身知已不可以力致有道足輔天地而不用於人行足應神明而不信於俗僕所以候寬和之色伺清宴之閒願因左右思待擯介或沒齒不遇豈直斯須之頃與主人曰僕方運思量深游精絶遠巨蚌潛於溟海剖而探其珠靈龜巢於嘉林灼而訪其兆而況同聲相應同氣相求者乎蟋蟀候秋而吟蜉蝣乘陰而出豈借援於左右求容於擯介哉而足下牽流議於俗忽常道之要豈安彼詭隨昧而不察茲理將有所感激憤而為此言者乎客曰主人可謂知其一未知其二夫察言觀行下之所以上達言有邪正百慮糾紛行有是非萬變舛錯憂虞不可以一徑驗悔吝不可以一理徵士固有上不援下無黨禮義以為干櫓忠信以為甲胄見利不虧其分見害不更其守仗必然之畫恥干節而進復有從俗浮沈與物厚薄潔其衣服矜其車徒俯仰權貴之門逶迤富利之室人玩其飾孰察其心然則矩步規行不如由徑之速達一辭三讓不如苟合之易親據邀乘邪是有先鳴之勢難進易退但積後時之悲此主人所宜察者一也士固有履敦懿佩禮文漸漬德教之泉栖息道素之域然而委身草莽沈跡蓬茨位末名卑譽不聞於左右含光蓄鋭價不動於當時雖折節求容毀譽取合行衰於寡黨才蔽於世人復有養交釣名之徒勳餘戚裔之位歷元闕排朱門䴏翼鳳翔乞言鄒枚之口虎皮羊質假論崔馬之談而悠悠者莫不望景星奔藉響風靡夫向聲背實人之常情索隱探微代所希及田父獲玉驚輝廡之暉靈蛇獻珠貽按劍之怒然則遵古人懿業類芻狗之已陳道先王法言比屠龍而莫用此主人所宜察者二也士固有聚精會神盡智畢議謀於未兆慮於未形探元妙之源養浩然之氣冥立㣥情之表獨與大道為鄰復有騁變效奇闕談詭論文雕琢之辨縱煒煜之詞不思作則垂訓期於動聽駭目夫繁聲奪雅令色惑真綆短不可以汲深楮小不可以懷大曲彌高而和寡技逾下而賞多此主人之所宜察者三也士有作矜莊之色厲耿介之辭披苦懷揚憤思悉精鋭貢中誠矯枉推直深言切詳宏其體防翦其淫侈復有事無可否順之如流言無是非應之如響博訪遠引不綜成敗之幾虛美飾非但以苟容為度夫吉人之辭寡躁人之辭多頌德紀功易以藻飾間邪介疾或犯忌諱逆耳之談容之者少利口之說悅之者多然則辨佞進而登庸忠謇退而獲戾此主人之所宜察者四也士固有懷經濟之略蘊弻諧之才而擬非其倫履失其位皆屑屑聚論者騰喧咋之辭連袂並驅者效趨走之技龍驥捕鼠非所騁其逸足牛鼎烹雞豈復殊於常器然則含章秀發祕思混而不分默識元通幽旨隱而莫啓此主人之所宜察者五也士固有當理之言由方以進而關梁非所鑿枘異宜或以小人所長乘於君子所短或以已所未達不信人所能然則道源蔽而不通心境曠而不接辨雖博萬物不能釋其疑辭智雖絡天地不能效其長策故語曰誰能為之孰令聽之此主人之所宜察者六也且夫春樹桃李秋收其實春樹棘茨夏蒙其刺生實未成同為后土所生俱沐陽和之施不殖不藝終歲闕甘旨之豐不芟不耘毫末成尋拱之患亮明才智之士匡時尊主之臣可不熟計其吉凶深究其得失乎而或安于近禁玩於浮名忘至理而悅侈言貴辨僞而惡切直外恃位以陵物內自負而輕士譬猶廢東作而待歲馳北轅而適越是以宏獎之意未嘗異取舍之要未嘗同徒有好賢之名終無用賢之實亦良可悲矣安在其進乎主人曰若然者行不必達言不必揚賢人沉抑以為常良士無登進之理將何以革此斃而求其通乎賓曰何為其然也夫揚振風以扇物清濁必效其響懸明鏡以鑑形美惡無隱其象苟能坦其量清其心先公而後私捨名而責實得意而忘象遠佞而納忠則君子可知不仁者遠於是循夷途以招絶跡總修林以刈翹楚則何才不舉何藝不揚是知行藏有宜取捨有分為仁由已芝蘭雖幽而自芳子苟好之珠玉無脛而自至審此要也夫何問焉主人矍然謝賓而退齊居三日罷鐘鼓遠宴私執謙下之心去驕伐之色夢想正士饑渴直言然後備禮延賓升堂而訪焉言行計從于是家安而國治矣論曰王氏之先蓋出於有周自后稷公劉逮乎太王王季以至文武成康纍聖重光以成王業故能卜世三十卜年七百天所命也下及靈王厥德雖衰而天命未改有太子晉者登仙於伊洛之閒其後代子孫遂稱為王氏考其綿系不亦遠乎既而姬氏運窮戰國蜂起有錯為魏將翦為秦將咸以武功翊扶霸業宏謀遠略二國賴焉自秦至漢有吉有駿為漢代名賢自漢至晉有覽有祥為晉室公輔時徐州刺史呂虔檄祥為別駕虔有佩刀工者相之以為三公之器虔謂祥曰苟非其人刀或為害卿有公輔之量故以相與祥固辭不獲而後受之祥在魏為司空太尉封睢陵侯晉武帝踐阼拜太保爵為公年八十餘賜几杖不朝為國元老祥臨薨以佩刀授其弟覽曰汝後必興足稱此刀覽拜光祿大夫封即邱子門施行馬覽生撫軍長史裁裁生丞相始興文獻公導匡輔中興遷都建業元帝倚以宰衡之任而王氏盛於江左矣其正緒也則悅洽珣珉以宏雅清亮重於時其旁枝也則渾戎衍經以曠達易坦高於物若乃器宇崇邈風鑑昭朗則宋侍中左光祿大夫開府儀同三司特進豫寧文侯其人也忠肅恭懿宣慈惠和則宋侍中金紫光祿大夫開府豫寧忠敏侯其人也開物成務緯地經天則齊中書監尚書令太尉南昌文獻公其人也廉正澄潔恬虛潤則梁侍中金紫光祿大夫中書令南昌安侯其人也美幹英姿通機敏藝則梁侍中金紫光祿大夫五兵尚書南昌章侯其人也博學高才鴻筆麗藻則周內史太子太保驃騎將軍開府儀同三司司空司徒石泉康公其人也有典有則如圭如璋則隋安都郡太守石泉侯其人也道韻清穆德徽光劭則太子舍人荊王府司馬皇朝贈魏州刺史其人也其餘枝分葉散嶽峙川流孝範忠規仁聲義烈女嬪帝子男尚王姬公侯保輔之尊令僕卿尹之貴紐龜鳴玉紫蓋朱軒赫奕蟬聯繽紛菴藹市朝亟改而無替舟壑驟遷而不易衣冠禮樂百代傳之而比肩人物風流四海望之而延頸豈不美哉雖復魯三桓之子孫鄭七穆之宗族晉之欒范齊之國高張氏之七葉貂蟬楊家之四世台衮石奮石慶恭慎重規胡質胡威清廉謺軌父子儒學桓榮與桓郁相承兄弟文章陸機與陸雲齊舉未足以延茲家範麗我門輝所謂積善之家必有餘慶盛德必有百世之祀者也善乎郭景純之言淮水絶王氏滅此非其效與石泉公承積德之基挺舉和之氣髫齔之歲便能竭力以事親其性純篤率由而至精神朗悟特異常童好學讀書略無懈倦常研味經史雖寢食有所不遑才及成童已為博達朋侶推薦朿髮而就列焉歷仕州郡咸以材能底績既以賢良文學舉又以夙行公方進遂乃升臺府拜卿僕三典名嶽一佐神州始學之今得而行之以明察禦姦豪以慈和撫孤弱以謹靖成公務以清白杜私求珠玉非所寶脂膏不能潤故能所廣者紀不令而行千里應其言百姓歸其德所謂愷悌君子人之父母者也及其翔鳳池執螭劍出納王命弻諧帝猷理在將順怡然而奉旨事當進色侃然而犯鱗常欲興禮制樂刑寬政獎儒術抑吏道正風俗厚人倫乃蘧瑗之忠誠史魚之端操孟公綽之不欲季文子之無私羊興祖之衣惟葛袍公孫宏之食惟粟飯陳寵之奏藳咸削孔光之溫樹不言我之行事立名殆出於數公之右矣由是特為上所親倚常以忠賢許之其好古博雅述作無倦遊心於千載之表騁思於九流之域雖堆案盈几積訟充庭汗懷鉛晷刻無捨所蒞之職由中及外或考其事或相厥土博採前志旁求故實輒加撰録無或闕遺至以祖德家聲前言往行追述編紀動成部帙有忠孝之道焉有禮義之規焉有經邦之則焉有正家之訓焉固可以貽厥孫謀播乎長世者也易曰君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事又曰君子進德修業忠信所以進德也修辭立其誠所以居業也又曰君子學以聚之問以辨之寬以居之仁以行之詩曰瑟兮僩兮赫兮喧兮有斐君子終不可喧兮道盛德至善人所不能忘也又曰樂只君子邦家之基又曰嘉樂君子顯顯令德宜民宜人受祿於天若石泉公者可謂備君子之德矣其為聖朝輔佐受天之祿也宜哉贊曰仙緒山賓靈液流津積德纍仁生賢清神孝以事親忠以為臣履道正身秉國之鈞君子哉若人尚德哉若人世稱裴將軍射虎而不及見駕部郎中兼侍御史滎陽鄭公博物好古旌能尚藝於裴氏子得其先人射虎圖傳以示豫壯哉古今之未有倫也夫弧矢之用所以服猛除暴而威戎狄故士生則以蓬矢射四方君立則以五侯選諸侯五侯之正皆飾以熊虎猛獸之皮象而射之也昭除暴不若也周官曰張五侯則遠國屬射而中之威不庭也昭昭乎除暴威遠之義蓋射之大端若殺不加有罪威不及不庭雖有百中之功而無一發之矢彀弓鳥下捨矢猿號工則工矣是射之末節開元中山戎寇邊元宗命將軍守北平州且充龍苑軍使以捍薊之北門公嘗率偏軍橫絶漠策匹馬陷重圍搖轆轤而百萬洞開驅士冖䂞駝而沙場一掃聲振北狄氣懾東胡稜威大矣而北平連山廣野地實多虎擇肉於人如有飛翼薦食邊鄙甚於戎夷㣥老憂而請焉公於是屏車徒去矛鎩曰賈豫餘勇挺身以餌之耽耽甝虎九烈烈騰逝當其威怒也百獸以伏萬夫莫亢而公馳單騎彀白羽挑之使來翼之而回從容返視咫尺旋玩心即其度手張其機左射右拂縈三謺四中皆沒羽倒必應弦毛紛血灑腋洞心穿或叱之而餌伏或箠之而卻走將威有所勝氣有所全精專於中志正於內故能以一人之力戰㣥虎之命使鋸牙鉤爪戢而莫措雷聲電視消而不揚猛摧於柔衆怯於獨其為易也若獵狐兔聯鶖鶬雖有矯牙冠㣥亦垂頭搨尾應鏑而斃如此者幾三十有一矣其餘竄匿不敢復出大漠之南千里罷扃鳥獸咸若山川以寧胡人服藝畏威不敢南牧願充麾下者五百餘人茲所謂剛猛除暴而戎夷格昔漢飛將軍亦為北平守擊胡有困辱之事射虎有騰傷之患其與將軍神勇非為侔矣鄭公既寫其圖俾豫贊之詞曰憬彼山戎噬我封略有㣥者虎載肆騰搏邊氓懍懍若崩厥角將軍出塞屏黜車騎進馬前當挺身以餌威有所服精有所聚氣全以雄力果而取震驚矍矍虎反如鼠威武桓桓人反如虎徑弓雷霹長矢電激中口穿胸貫心洞腋視如空皮劃若破的應發連斃紛紜枕籍據鞍遙叱揮箠逆擊閉目沈冥喪精劈易三軍駭呼萬靈動魄海波為騰塞草皆赤卞莊俟鬬方聞兩獲漢將如飛幾為所扼將軍神勇冠世超昔號猿未工飲羽非敵弧矢之設以威四方㣥虎既夷狄人來降收闥罷扃山川以寧至今北荒猶畏其靈太宗文皇帝既一海內明君臣之義貞觀十九年東征島夷師次殷墟乃下詔追贈殷少師比干為太師諡曰忠烈公遣大臣持節弔贈申命郡縣封墓葺祠置守冢五家以少牢時享著於令甲刻於金石故比干之忠益彰臣子得以述其志也昔商王受毒痡於四海德悖於三正肆厥淫虐下罔敢諫於是微子去之箕子囚之而公獨死之非捐生之難處死之難非處死之難得死之難故不可死而死之是輕其生非孝也得其死而不死是重其死非忠也王之叔父親莫至焉國之元臣位莫崇焉崇高不可以觀其危親昵不可以忘其祖則我成湯之業將墜於泉商王之命將絶於天整扶其顛遂諫而死剖心非痛殷亡是痛公之忠烈也其若是乎故能獨立危邦橫抗興運周武以三分之業有諸侯之師資十亂之謀總一心之衆當公之存也則戢彼西土及公之喪也乃觀於孟津公存而殷存公喪而殷喪興亡所繫豈不重歟且聖人立教懲惡勸善而已矣人倫大統父子君臣而已矣太師存則正其統歿則垂其教奮乎千古之上行乎百王之末俾夫淫者懼佞者慚睿者思忠者勸其為式也不亦大哉而夫子稱殷有三仁豈無微旨嘗敢頌之曰存其身存其宗固仁也存其名存其祀亦仁也亡其身存其國亦仁也若進死者退生者狂狷之士將奔走焉裦生者貶死者宴安之人將置力焉故同歸諸仁各順其志殊途而一揆異行而齊致俾後之人優游而自得焉蓋春秋微婉之義也必將建皇極敘彞倫宏在三之規垂不二之訓以昭於世則夫人臣者既移孝於親而致之於君焉有聞親失而不爭覩親危而不救從容安地而稱得禮甚不然矣夫孝於其親者人之親皆願其為子忠於其君者人之君皆欲其為臣故歷代帝王莫不旌顯周武下車而封其墓魏氏南遷而創其祠我太宗有天下禋百神而盛其禮追贈太師諡曰忠烈申命郡縣封墓葺祠致守冢五家以少牢時享著於令甲刻於金石鳴呼哀傷列辟主食舊封德為神明秩視㣥望身滅而名益大世絶而祀愈長然後知忠烈之道其感激天人深矣天寶十祀余尉於衛拜乎祠堂魄感精動而廟在鄰邑官非式閭刊石銘表以志丕烈詞曰糜軀非仁蹈難非智死於其死然後為義忠無二體烈有餘氣正直聰明至今猶視咨爾來代為臣不易謹按此文亦見李白集今據圖書集成及唐文粹為李翰作
