body:
  text: 夫惟哲人罔有敗德几杖攸誡盤盂見勒容過於鏡則照窮任重於才則道塞多藏必害常謹不忒茲撲滿之陶形假埏埴以為靈其中混沌竅開兮沈以默其外空蒙忽合兮炯而青藏鏹符於神論固壘同於道扃謙以自守虛而能受奚初積而終散竟出無而入有乍苦乎巨蚌之全滿而則剖不異乎亢龍之悔盈莫能久故君子永鑒是式允執厥中道不可以常泰物不可以屢空雖聚寶含真立制之端自我而辭豐忌覆致用之數在公何茲器之微賤蓋與時而變通苟利物而害巳亦持盈而省躬豈獨夫魯國宥坐誡欹虛巳周階銘玉端口窒欲損之有餘補之不足明遠鑒之退止訓勞謙之軌躅稽長倩以投贈庶平津而自勗伏見貞觀十七年監修國史房元齡與史官給事中許敬宗著作佐郎敬播修高祖實録二十卷成制封元齡一子為縣男賜物一千段敬宗一子為高陽縣男賜物七百段敬播改授太子司議郎賜物五百段仍並降璽書褎美又神龍二年五月監修國史中書令魏元忠與史官太常少卿徐彥伯國子司業崔融等修則天實録三十卷成制封元忠一子為縣男賜物一千段彥伯等各賜爵二等物五百段自餘卑官加兩階物段准處分仍並降璽書褎美今史官劉子元吳兢等撰睿宗實録又重修則天中宗實録並成進訖准撰太宗實録例益修官巳下加爵及賜命子元等經臣援引古今欲臣聞奏臣謹尋故事例有恩賞事屬當時不可為准子元等始末修撰誠亦勤勞敘事紀言所緣雖重承恩賞賜固不在多子元吳兢望各賜物一百段準禮大行皇帝山陵事終即合祔廟其太祖第七室先祔皇昆義宗孝敬皇帝哀皇后裴氏神主伏以義宗未登大位崩後追尊至神龍之初乃特令升祔春秋之義國君即位未踰年者不合列昭穆又古者祖宗各別立廟孝敬皇帝恭陵既在洛州望於東都別立義宗之廟遷祔孝敬皇帝哀皇后神主命有司以時享祭則不違先旨又協古訓人神允穆進退得宜在此神主望入夾室安置伏願陛下以禮斷恩聖人啓運休兆必彰故化馬為龍預流謠頌秀為天子早著冥符臣等今見薛謙光所獻東都鼎銘大聖天后所製其文云上元降祉方建隆基豫州處天下之中所以遠包四海銘文獨聖后所製固必先感二儀靈慶昭彰曠絶今古臣等忝陪近侍喜萬常情請宣付史官並頒示內外太廟殿本是苻堅所造隋文帝創立新都移宇文朝政殿造此廟國家又因隋氏舊制歲月茲深朽蠧而毀山有朽壤尚不免崩既久來枯木合將摧折偶與行期相會不是緣行乃崩且四海為家兩京相接陛下以關中不甚豐熟轉運又有勞費所以為人行幸豈是無事煩勞東都百司巳作供擬不可失信於天下以臣愚見舊廟既朽爛不堪修理望移神主於太極殿安置更改造新廟以申誠敬佛不在外求之在心圖澄最賢無益於全趙羅什多藝不救於亡秦何充苻融皆遭敗滅齊襄梁武未免災殃但發心慈悲行事利益使蒼生安樂即是佛身何用妄度奸人令壞正法庸儒執文不識通變凡事有違經而合道者亦有反道而適權者昔魏時山東有蝗傷稼緣小忍不除致使苗稼總盡人至相食後秦時有蝗禾稼及草木俱盡牛馬相噉毛今山東蝗蟲所在流滿仍極繁息實所稀聞河北河南無多貯積儻不收穫豈免流離事繫安危不可膠柱縱使除之不盡猶勝養以成災陛下好生惡殺此事請不煩出敕乞容臣出牒處分若除不得臣在身官爵並請削除自垂拱後被告者類自誣當是時以告言為功故天下號曰羅織甚於漢之鉤黨雖陛下使近臣覆訊彼尚不自保敢一搖手以悖酷吏意哉且被問不承則重罹其慘張虔勗李安靜等皆是也今賴天之靈發寤陛下凶豎殲夷朝廷乂安臣以一門百口保內外官無復反者陛下以告牒置弗推後若反有端臣請坐知而不告臣聞詩云秉彼蟊賊付畀炎火漢光武詔曰勉順時政勸督農桑去彼螟蜮以及蟊賊此除蝗誼也且蝗畏人易驅又田皆有主使自救其地必不憚勤請夜設火坎其旁且焚且瘞乃可盡古有討除不勝者特人不用命耳王者陰盛陽微則先祖見變今後宮非御幸者宜悉出之以應變異舉畯良撙奢靡輕賦慎刑納諫爭察諂諛繼絶世則天人和會災異訖息忽辱箋翰喜慰攸集退惟自省慚懼亦深實智力之所不逮也宜朝廷之所見責也僕本凡近之才素非經濟之具叨承過聽謬膺朝委自少及長從微至著唯以直道為業匪以曲路期通歷官三朝年逾一紀凡所稱薦罕避嫌疑實有祁奚之舉非無許允之對則天之世巳被流言行之有恆久而自辨近蒙奬擢倍勵駑庸每以推賢進士為務欲使公卿大夫稱職豈楊橋之或用及解狐之可為而悠悠之徒未足矜察嗷嗷之口欲以中傷上恃天聰俯仗神道既不得奉身而退但知信心而前然顧無隱慝亦死為分明矣猥惟不敏敬承厥休持當座銘永為身寶元崇頓首劉聰僞主也德不勝妖今日聖朝也妖不勝德古之良守蝗蟲避境若言修德可勉彼豈無德致然今坐看食苖忍而不救因此饑饉將何自安切闕八字彰昊天之思罔闕三字施渥牛涔效淺每以弄烏勤侍恩反哺而馳魂記鳳淩虛願銜書而走魄聞夫踐寶田之界登壽域於三明揚慧炬之暉警迷塗於六暗爰憑聖福上洽君親懸佛鏡而朗堯曦流乳津而霑血屬下該妙有旁括太無並悟真詮咸升覺道銘曰地踊珍塔天飛聖儀丹楹日泛錦石蓮披酌慧難測資生不疲長褰欲網永庇禪枝古人云富貴者人之怨也貴則神忌其滿人惡其上富則鬼瞰其室虜利其財自開闢巳來書籍所載德薄任重而能壽考無咎者未之有也故范蠡疏廣之輩知止足之分前史多之况吾才不逮古人而久竊榮寵位逾高而益懼恩彌厚而增憂往在中書遘疾虛憊雖終匪懈而諸務多缺薦賢自代屢有誠祈人欲天從竟蒙哀允優遊園沼放浪形骸人生一代斯亦足矣田巴云百年之期未有能至王逸少云俯仰之間巳為陳迹誠哉此言比見諸達官身以後子孫既失覆蔭多至貧寒斗尺之間參商是競豈唯自玷乃更辱先無論曲直俱受嗤毀莊田水碾既衆有之遞相推倚或至荒廢陸賈石苞皆古之賢達也所以預為定分將以絶其後爭吾每靜思深所歎服昔孔子至聖母墓毀而不修梁鴻至賢父亡席捲而葬昔楊震趙咨盧植張奐皆當代英達通識今古咸有遺言屬令薄葬或濯衣時服或單帛幅巾知真魂去身貴於速朽子孫皆遵成命迄今以為美談凡厚葬之家例非明哲或溺於流俗不察幽明咸以奢厚為忠孝以儉薄為慳惜至令亡者致戮尸暴骸之酷存者陷不忠不孝之誚可為痛哉可為痛哉死者無知自同糞土何煩厚葬使傷素業若也有知神不在柩復何用違君父之令破衣食之資吾身亡後可殮以常服四時之衣各一副而巳吾性甚不愛冠衣必不得將入棺墓紫衣玉帶足便於身念爾等勿復違之且神道惡奢冥途尚質若違吾處分使吾受戮於地下於汝心安乎念而思之今之佛經羅什所譯姚興執本與什對翻姚興造浮屠於永貴里傾竭府庫廣事莊嚴而興命不得延國亦隨滅又齊跨山東周據關右周則多除佛法而修繕兵威齊則廣置僧徒而依憑佛力及至交戰齊氏滅亡國既不存寺復何有修福之報何其蔑如梁武帝以萬乘為奴胡太后以六宮入道豈特身戮名辱皆以亡國破家近日孝和皇帝發使贖生傾國造寺太平公主武三思悖逆庶人張夫人等皆度人造寺竟術彌街咸不免受戮破家為天下所笑經云求長命得長命求富貴得富貴刀刃段段壞火坑變成池比來緣精進得富貴長命者為誰生前易知尚覺無應身後難究誰見有徵且五帝之時父不葬子兄不哭弟言其致仁壽無夭橫也三王之代國祚延長人用休息其人臣則彭祖老聃之類皆享遐齡當此之時未有佛教豈抄經鑄象之力設齊施佛之功耶宋書西域傳有名僧為白黑論理證明白足鮮沈疑宜觀而行之且佛者覺也在乎方寸假有萬像之廣不出五蘊之中但平等慈悲行善不行惡則福道備矣何必溺於小說惑於凡僧仍將喻品用為實録抄經寫像破業傾家乃至施身亦無所吝可謂大惑也亦有緣亡人造像名為追福方便之教雖則多端功德須自發心旁助寧應獲報遞相欺誑浸成風俗損耗生人無益亡者假有通才達識亦為時俗所拘如來普慈意存利萬損衆生之不足厚豪僧之有餘必不然矣且死者是常古來不免所造經像何所施為夫釋迦之本法為蒼生之大弊汝等各宜警策正法在心勿效兒女子曹終身不悟也吾亡後必不得為此弊法若未能全依正道須順俗情從初七至終七任設七僧齊若隨齊須布施宜以吾緣身衣物充不得輒用餘財為無益之枉事亦不得妄出私物徇追福之虛談道士者本以元牝為宗初無趨競之教而無識者慕僧家之有利約佛教而為業敬尋老君之說亦無過齊之文抑同僧例失之彌遠汝等勿拘鄙俗輒屈於家汝等身歿之後亦教子孫依吾此法顓門業入室推賢名惟科首行則士先是為上足寧同及肩亡之命矣懷之喟然君子欲訥吉人寡辭利口作戒長舌為詩斯言不善千里違之勿謂可復駟馬難追惟靜惟默澄神之極去甚去泰居物之外多言多失多事多害聲繁則淫音希則大室本無暗垣亦有耳何言者天成蹊者李似不能言為世所尊言不出口冠時之首無掉爾舌以速爾咎無易爾言亦孔之醜敬之慎之可大可久敬之伊何三命而走慎之伊何三緘其口勗哉夫子行矣勉旃書之屋壁以代韋弦稱者衡衡天下之平也君子執之以平其心夫衡在天以齊七政在人以均萬物稱物平施為政以公毫釐不差輕重必得是執衡持平之義也聖人為衡四方取則志守公平體兼正直用於天官銓綜斯得行於里閈紛競以息故南北以對左右以持稱物低昂不差毫釐使錙銖不惑輕重無疑智不能矯愚不能欺存信去詐以公滅私無偏無黨君子似之法者天下公器官者庶人之師其身既正不令而行在下無怨唯上之平故曰上之所仰人皆其向我之所教人皆其效心苟至公人將大同心能執一政乃無失嗟爾多士欽哉勉旃庶以觀則同夫佩弦琴者樂之和也君子撫之以和人心夫其調五音諧六律則移風易俗感舞禽獸而况於人乎故身不下堂不言而理者蓋鳴琴故也樂導至化聲感人情故易俗以雅樂和人以正聲樂有琴瑟音有商徵琴音能調天下以治異而相應以和為美和而不同如彼君子故善為國者若彈琴宮君商臣則治國之道大急小緩豈安人之心不調者改張踰於立法聲悲者調下感於知音昔武城單父以弦歌樂職鄒忌雍門以辨對匡國美此調撫而人是則昭告後來無怠於德執鏡者取其明也夫內涵虛心外分朗鑒物不可以匿詐體無得以逃形是以野鹿窺而慚山雞對而舞故君子是繪是畫置之座隅蓋將照姦回之心絶險詖之路也詩曰我心匪鑒不可以茹亦其理焉秦樓明鏡鑒有餘暉色自凝曉光能洞微飾以鞶組匣以珠璣龍繞池臥鳥臨月飛傍入四鄰中延萬象濟物攸博利人斯廣握在帝心則宇宙融朗懸諸銓目則翹楚瞻仰且明不匿瑕君子是嘉不疲屢照君子是效嗟爾在職為代作則刑不可濫政不可賊凡今之人鮮務為德紛綸諂媚汨沒忠直當須如鏡之明斷可以平如鏡之潔斷可以決敢告後來無忝前哲辭金者取其廉慎也昔子罕辭玉以不貪為寶楊震辭金以四知為慎列前古之清潔為將來之龜鏡原其立者俯而揖讓也跪者仰而受恭也俾左右顧盼又得謙恭之道焉古之君子策名委質翼翼小心乾乾終日慎乎在位欽乃攸司請謁者咸息苞苴者必辭爾以金玉為寶吾以廉慎為師爾以夜昏可納吾將暗室不欺若爾有贈吾今取之爾則喪寶吾則懷非故曰欲人不知莫若無為欲無悔吝不若守慎慎之伊何主誡在乎瓜李悔之伊何讟謗由乎薏苡慎則禍之不及貪則災之所起苟自謹身必無謗恥凡所從政當須正巳誡往修來慎終如始冰壺者清潔之至也君子對之示不忘乎清也夫洞徹無瑕澄空見底當官明白者有類是乎故內懷冰清外涵玉潤此君子冰壺之德也玉本無瑕冰亦至潔方圓相映表裏皆徹喻彼貞廉能守其節凡今之人就列稱臣當官以害剝為務在上以財賄為親豈異夫象之有齒以焚其身魚之貪餌必曝其鱗故君子讓榮不憂辭滿為珍以備其德以全其真與其濁富寧比清貧吳隱酌泉龎參致水席皮洗幘縕袍空裏雖清畏人知而所知遠矣嗟爾在位祿厚官尊固當聳廉勤之節塞貪競之門冰壺是對炯誡猶存以此清白遺其子孫垂拱以來以峻法繩下臣願政先仁恕可乎朝廷覆師青海未有牽復之悔臣願不幸邊功可乎比來壬佞冒觸憲綱皆得以寵自解臣願法行自近可乎后氏臨朝喉舌之任出閹人之口臣願宦豎不預政可乎戚里貢獻以自媚於上公卿方鎮寖亦為之臣願租賦外一絶之可乎外戚貴主更相用事班序荒雜臣請戚屬不任臺省可乎先朝褻狎大臣虧君臣之嚴臣願陛下接之以禮可乎燕欽融韋月將以忠被罪自是諍臣沮折臣願㣥臣皆得批逆鱗犯忌諱可乎武后造福先寺上皇造金仙玉貞二觀費巨百萬臣請絶道佛營造可乎漢以祿莽閻梁亂天下國家為甚臣願推此鑒戒為萬代法可乎楚王吞蛭厥疾用瘳叔敖殺蛇其福乃降趙宣至賢也恨用其犬孔子將聖也不愛其羊皆志在安人思不失禮今蝗蟲極甚驅除可得若其縱食所在皆空山東百姓豈宜餓殺此事崇巳經面奏定訖請公勿復為言若救人殺蟲因緣致禍崇請獨受義不仰關闕十七字乃有闕五字其有高山峻極闕二字磊闕一字而不窮大川靈長清瀾浩汗而無絶闕一字芳闕四字雲闕一字者其惟于闕四字乎君諱知微字辨機其先周封闕十一字東海闕一字為闕二字其後仕於魏亦家於代闕一字代闕一字謹左僕射太子太師雍州牧子孫相承故今為京兆萬年人也高祖闕一字周涇州剌史闕一字安郡守驃騎大將軍開府儀同三司潼兗邵四州剌史涇州總管建平郡公諡曰剛曾祖宣道周儀同大將軍隨內史舍人左衛率上儀同闕一字安子皇朝贈涼州剌史諡曰獻早執圭璧纍傳茅土履闕一字遍於文武聲華被於中外祖志寧皇朝秦王友禮部尚書侍中尚書左僕射太子太傅太師蒲岐華三州剌史上柱國燕國公贈幽州都督諡曰定山河授闕一字星象降精負明闕一字之闕二字佐絲綸之大業謀猷瑣闥動合全模詳綜禮闈言成故事聲徽滿於天下位望極於人臣父立政皇朝吏部郎中國子司業太子率更令渠虢二州剌史太僕少卿公子公孫多材多藝闕六字聲實豈惟臺閣取則抑亦河海稱宜公丹穴融姿生而五色青田表質動則千里言為士範行乃人師包括藝文闕一字詞場而獨步甄明政理登闕二字而先闕一字朝浣闕二字之衣心闕一字地義夕寢闕二字之被性篤天倫行必由信不負黃金之諾舉無失德逾慎白圭之玷正假馬之非禮革攘羊之為直風塵不雜契芝蘭而獨秀歲闕一字無闕二字松柏之闕一字雕每屈於書生亦闕二字公子不恃才闕一字傲物將闕四字仁永徽元年補宏文生爰以佩觿之年且戀過庭之訓特降恩旨許其在家比及三冬方齊闕一字哲擢第釋褐授太子內闕一字丞闕一字年遷授祕書郎兼通事舍人內供奉闕四字峻闕二字增闕二字有詞令之闕一字遂兼敷奏之職緣親延纍下遷常州司兵參軍梁州西縣令同州司法岐州岐山縣令汙池戢鸖棘林栖鳳固闕一字高而位下惟小屯而大亨謙而彌光闕一字而不雜闕二字無闕一字齊闕六字之受闕二字條范滂之責成千里中都之彰善疸惡上蔡之易俗移風蓋無以過也俄丁窮罰殆至滅性雖槐榆屢變而創痛猶殷服闋被徵闕一字為舉首敕授魏州貴鄉縣令闕一字任未幾闕一字在京違豫公乃請休急躬尋醫緩專專代喘感而遂瘳於時魏州連夏大旱州縣祈禱靡愛牲璧密雲徒積甘澍罕闕一字公入境闕一字人闕一字心闕一字戴闕一字薪艾闕一字即未焚灌壇風雨闕一字其闕一字洽闕二字隨誠降雨施及公私枯稼蔚為嘉苗赤地變為膏野百姓鼓舞而相賀五穀滋蕃而遂登尋被巡察使升進制加朝散大夫行城門郎大名之邑人結去思闕三字門朝推稱職俄兼夏官郎中闕三字著闕一字兼五熟昔稱歸闕一字是膺俊選阮籍之樂東平孫盛之思小邑願從所好天且不違乃出為許州司馬纍除蒲晉潤三州長史龍瞼一闕一字驥足載馳闕一字下河史亟展闕一字輿之政延陵闕一字瀆纍闕一字歸闕三字既闕一字人謠遂紆朝奬長壽二年制授鄂州刺史無何又纍除道利二州刺史化被荊楚威覃蜀漢去獸遷蝗以奉最斥為患雖經討闕一字曾不衰止有果州流溪縣丞邢曇之等聞公政術深思拯庇仰鄰燭之延佇慕河潤以傾勤曇之因使入京乃以父老等狀上請情詞懇到闕二字天心乃降優旨授公檢校果州刺史褰帷一視㣥闕一字出奔下車三令闕一字境闕一字息神功之歲復除恆閬二州刺史礪嶽北臨劒門南峙是為襟要實賴才雄公以身率人令行禁止河朔拒二天之謁漢中興五袴之歌惟揚奧區是闕一字重鎮事兼闕二字允藉親賢久視元年又改授揚州大都督府長史地總淮海路兼嶺蜀僑舊相雜良猾莫分攘敓為恆椎埋所聚公懸明鏡以臨照稱物無闕一字撝利劍以斷割隨機有裕補張綱之闕一字政紹何武之遺績江圯之闕一字於是乎在長安二年改授常州刺史毗陵大藩實要良守輟巳成之務就有待之司顧盼而澆俗自清咄嗟而闕一字政咸理公每懷敬止恐闕二字之漸蕪願近鄉閭雖執鞭而可仕屢陳章表具列款誠闕二字時在鳳閣侍郎預知闕一字政備悉情素常為贊成乃屈資除雍州司馬從其好也粵以宏才俯從闕一字尹闕一字晞闕二字有犯闕六字惟賢是闕一字能名播於京輦公心闕二字人吏既推宿德闕二字舊資朝廷稱歎聲聞旒扆乃加銀青光祿大夫改授絳州刺史州管軍府戶多雕散惟良之任自昔稱難公隨方撫馭應時闕一字理奸盜畏威而闕一字境流闕一字感恩而復業以公闕一字舊正人德業斯重講闕一字之任髦俊是闕一字乃除太子左庶子又遷太僕少卿并纍封東海郡侯行本忠良器實高茂膺負璽之清級播恭慎之嘉聲鄒魯闕一字番闕一字摽舊國闡揚文教馮藉師資乃除亠兊州都督公五百挺生博聞強記三千受業發瞽振聾撫俗則黃霸重生講藝則顏回不死俎豆益先生之饌歌詠光夫子之門發餘燧於槐檀導末流於洙泗公讀闕二字傳乃慨然歎闕一字古人云闕一字相視盡闕一字壽哉闕一字况闕四字殘光詎幾昏中闕一字壁餘歲可知乃懷鼓缶之娛遂抗懸車之請至誠上達優旨旋許追二疏之逸軌訪四皓之幽居張禹韋闕一字之流魏舒闕二字之輩遂異代闕二字殊塗同歸者焉景雲二年封闕一字海郡公又檢校鴻臚少卿公遠覽夜行之誡自傷月告之年僶俯承恩斯須罷職嗟乎鄭辰甫及謝酉難移既勞息之有期豈桐闕一字之可救以闕二字二年六月草五日薨於長安常樂之里第春秋七十九泰山其頽仰曾峰而何及長河既竭望清瀾而遽遠以開元二年十一月十八日遷祔於京兆府三原縣萬壽鄉長坳原舊塋禮也公闕一字海闕一字族三台闕一字胄行為模楷言成准的居家盡孝奉國竭忠情叶段干直以道義為富性符徐邈唯以詩書自娛歷居官次每著殊尤之績篤於友道非虧然諾之心嗟乎闕一字憗溫闕一字永往子安何闕三字仙鶴之聲元伯長闕二字有素車之闕一字平原四望闕二字春闕一字荒燧千年蔓草秋露旌旐低而復舉簫鼓咽而不鳴涕淚成冰瞻昔恩而未重柱檻皆素顧今禮而為多嗣子朝議大夫行密州別駕上柱國東海郡開國男克勤次子朝議郎行左監門率府長史上柱國武陽縣開國男克構朝議郎行華州司戶參軍上柱國黎陽縣開國男克懋等聿修祖德不墜家風冬日將夏日相輝金友與玉昆交映闕五字以闕義相規別闕一字逾闕五字遂闕一字良友既沒誰堪制服之悲知音者希空軫絶絃之痛龎馬之室本不分於客主管鮑之契固無限於存亡見闕一字為文辭不獲免平生言行誠僕所知揄揚事業則吾豈敢將闕三字之迹闕一字題無愧之詞云爾江河派別兮靈長芝蘭挺秀兮芬芳象賢襲慶兮忠良過庭承訓兮義方本百支兮無疆彌七葉兮未央心懸明鏡兮氣鋭干將化成雉狎兮德闕一字鸞翔或闕二字而馳譽或闕二字而為光列爵窮於五等為尹邁乎三王入龍樓兮膺侍接擁鳩杖兮體歸藏東川不待西域無香盧敖仰兮無逮王喬去兮何常思武子之可作歎公業之不亡露闕一字泣於闕五字於闕四字玉兮長想臨挂劍兮增傷
