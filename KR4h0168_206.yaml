front:
  text: 全唐文欽定全唐文卷二百六崇字元之陜州硤石人本名元崇以與突厥叱利同名武后時以字行至開元時避帝號更名崇為孝敬挽郎應下筆成章舉授濮州司倉五遷夏官郎中超遷侍郎同鳳閣鸞臺平章事尋遷鳳閣侍郎為張易之所譖改司僕卿猶同鳳閣鸞臺三品出充靈武道大總管神龍元年預謀誅張易之兄弟以功封梁縣侯睿宗立拜兵部尚書同中書門下三品進中書令先天二年改紫微令進封梁國公授開府儀同三司罷知政事除太子少保以疾不拜開元九年薨年七十二贈揚州大都督諡曰文獻十七年重贈太子太保
  hash: sha256:34a505f68c9f1ae0ff92b0f46d55c883bbaa15ef141392e3ab9ad22198080616
