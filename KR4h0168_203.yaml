front:
  text: 全唐文欽定全唐文卷二百三元孫琅邪臨沂人垂拱初進士考功員外郎歷官長安尉太子舍人亳州刺史
  hash: sha256:c506aa773f6fe0173ff2d04503e5df3768980bda1ee10e7f1593c5af856ce57e
  markers:
  - {type: head, offset: 12, content: 顏元孫, id: KR4h0168_NFKB_203-h1, level: 1}
body:
  text: 史籀之興備存往制筆削所誤抑有前聞豈惟豕上加三蓋亦馬中闕五逮斯以降舛謬實繁積習生常為弊滋甚元孫伯祖故祕書監貞觀中刊正經籍因録字體數紙以示讎校楷書當代共傳號為顏氏字樣懷鉛是賴汗簡攸資時訛頓遷歲久還變後有㣥書新定字樣是學士杜延業續修雖稍增加然無條貫或應出而靡載或詭衆而難依且字書源流起於上古自改篆行隸漸失本真若總據說文便下筆多礙當去泰去甚使輕重合宜不揆庸虛久思編輯頃因閒暇方契宿心遂參校是非較量同異其有義理全僻罔弗畢該點畫小虧亦無所隱勒成一卷名曰干祿字書以平上去入四聲為次且言俗通正三體偏旁同者不復廣出字有相亂因而附焉所謂俗者例皆淺近唯籍帳文案券契藥方非涉雅言用亦無爽倘能改革善不可加所謂通者相承久遠可以施表奏箋啓尺牘判狀因免詆訶所謂正者並無憑據可以施著述文章對策牌碣將為允當有此區別其故何哉夫筮仕觀光惟人所急循名責實有國恆規既考文辭兼詳翰墨升沈是繫安可忽諸用舍之間尤須折衷目以干祿義在茲乎綆短汲深誠未達於涯涘歧多路惑庶有歸於適從如曰不然請俟來哲集源瀧州開陽人武后時歷右豹韜衛將軍蓋聞中天顯跡千劫誠希遇之因楃一出相騰暉三界表獨尊之稱悟其指則直心是道場契其源則淨身為佛土可以神闕一字事絶於筌蹄難以名言理歸於真寂故八十種好不可以色覩真容十二部經不可以詞詮至理然而煩惱郭重貪愛河深六趣輪回劒葉與刀山競起四生湮沒毒蛇將惡獸交馳由是法雨橫流慈雲普雨謢宏化城於嶮路朗惠炬於迷津大乘小乘隨淺深而悟道中莖中葉逐性分以含滋皆所以安樂㣥生提孩衆品施殷憂以無裹息多難以夷途大矣哉無得而名也此龍龕者受形於渾沌之闕一字擢秀於開闢之日孤峰峻峙卓深徑而出雲霞危壁削成排日晨而轥霓漢峭崿秀麗為衆巖之欽挹花藥奇卉實先聖之安憩是故龍出龍入每脫骨於巖中仙隱仙棲屢承空於香氣因得龍骨故曰龍龕云武德四年有摩阿大檀越永寧縣令陳普光因此經行遂回心口願立道場即有僧惠積宿緣善業響應相從惠積情慕純陀巧自天性即於龕之北壁畫當陽像左右兩廂飛仙寶塔羅漢聖僧雖年代久遠丹艧如闕一字粉色凝沈采影猶在洪鐘一叩響徹三十三天石磬再鳴遠聞十八地獄虯蟠外揚彩影亂於雲霓香煙內騰素氣通於迥闕一字故得法流荒俗釋教被於無垠元化遐覃振錫窮於有截豈如白馬駝經靈泉創於方丈緇衣闡教廬山頓其威儀者哉既而年代浸遠石龕無毀壞之期歲序奄遷粉黛有沈湮之理昔之惠積早隨劫而為灰寶亮亦投身於餓虎兩僧勇猛志貫白雲雖學不出境而精情自溢上元年先男叔瓊不廾前蹤龕中造立當陽連地尊像一軀近有交趾郡僧寶聰弱歲去家即詣江左尋師問道不惑圖南聞有此龕振杖頂禮覩佛寺之摧殘心目悲眩共成勝因又檀越主善勞縣令陳叔圭陳叔闕一字陳叔垓痛先君之肇建悲像教之淩遲敦勸門宗更於道場之南造釋迦尊像一座遂得不日而成功德圓滿為七代之父母修六道之緣屬聖神皇帝御紺殿以撫十方動金輪以光八表宏護大乘紹隆教覆載之恩土夕黔黎乎赤子雲雨之施等潤澤於蒼旻地平天成河溓海晏雖復道被匡中而凝懷俗表將使比屋之化契法俗以草杜全菩提垂拱之風叶治真而成覺就日與慧日俱明油雲共法雲同覆遠矣大矣無得言焉是知觀夫秉氣舍靈有生之類七識巳具六精斯起攀緣於虛妄之境馳騖於名色之間譬彼騰猿猶茲狂象棲托於愛河之內遨遊於火宅之中方石幾銷冰炭之㣥不息須彌屢盡鼎鑊之報無窮輪回長夜終焉莫曉同亡異術豈不哀哉大矣能仁隨機誘喻或宣四諦或導一乘潤小枝而不遺淨滿楃一出以圓燭繫想於方寸之間而神超於闕一字塵之表喻起生死歸乎寂滅其為淨室禪龕者也闕一字永鐫勒以希不朽爰命解劒之夫運茲不斌之筆庶海變桑田終無毀日敬題年紀不文而質其詞曰巖巖石室鬱鬱禪枝五門清淨八解連漪神高習海道溢須彌欲求蟬脫良津在斯龕自天工室唯地絡石磬長懸洪鐘不著無假梁棟自然花葉掩室杜口何憂何樂爰飾金繩於茲勝境闕二字畢修雕龍咸整雲起山窗花開蓮井蕭爾間曠悠然虛靜篤矣親信共宏利益或捨衣資或傾銀帛詎勞斤鑿無煩匠石湛然真相嶷爾無斁三十二相八十種好佛日之日天寶之寶猛虎相宿波闕一字降早闡六渡於迷津踐三乘之悟道元宗字承真琅琊臨沂人隱嵩山號太和先生傳黃老術垂拱二年卒於戲昔有唐氏作吾中遇而生姓王名元宗字承真本琅琊臨沂人晉丞相文獻公十代孫陳亡過江先居馮翊中徙江都其肇錫考系則國史家諜具矣降年五十有五直垂拱二年四月順大衍之數奄忽而終終後可歸我於中頂舊居之石室斯亦墓而不墳神無不在耳且伊洛之間乃昔者周南之域吾祖上賓之地吾家得姓之鄉反葬中嶽幾不忘本也舉手長謝亦復何言示人有終乃為銘曰馮馮太清悠悠太寧混沌無我其中有精忽然為人吾何以停歸於真宅此室冥冥不封不樹絶待忘情道無不在神無不經幽傳祕訣默往仙京萬物共盡時哉乃形理通寂感陰聚陽並知常得姓無狀無名闕一字體嵩石言追洛笙去來千洞䘪馳八靈風雲聚散山水虛盈谷神不死我本長生紹宗字承烈揚州江都人徐敬業起兵高其行以幣劫之不起敬業怒將殺之賴唐之奇諫以免事平大總管李孝逸表其節擢拜太子文學纍進祕書少監坐與張易之交往廢於家鄙夫書翰無工者特由水墨之積習恆精心率意虛神靜思以取之每與吳中陸大夫論及此道明朝必不覺巳進陸後於密訪知之嗟賞不少將余比虞七以虞亦不臨寫故也但心準目想而巳聞虞眠布被中恆手畫腹皮與余正同也伊垂拱二歲孟夏四日恍曶寅卯之際吾六兄同人見疾大漸惟幾將遷冥於未始委化於伊洛之間僑居惠和里之官舍自古有死於乎哀哉他日先誥其第七弟紹宗曰吾宅性元鄉保和仁里寄居㣥有遊心太無乘陽以生遇陰而滅物之恆也汝固知之化後汝可依道家無為之事諸子姪行儒教喪紀之迹吾聞精神者天之有也形骸者地之有也觸處而安不須擇日單車時服不俟營為紹宗敬奉緒言不敢失墜此時沛國桓先生道彥亦在吾兄之側因歔欷而報曰此真率之理道流所尚有情有信安敢違之其後升真潘先生門徒同族名大通越中嶽而來自遠問疾知吾兄真命巳畢又申勸曰儻或不諱願歸神中頂石室之中曩者升真臨終亦令宅彼况與先師平生居止宿昔神交冥期不昧宜還洞府再三敦請則又從之此吾迹也重違爾然不須別鑿堂宇恐傷土石但託體山阿而巳吾嘗幽贊真誥肇創元圖祕録別傳內本人境不傳如或不忘款志儻存其兆可取一塊青石其上有自然平者刊刻為字俾諸來裔知吾之用心也其銘文皆力疾帛丿糸微勉情去手課含精㝢爽藉響乘光仿佛曖昧不獲巳而口授之外姻密友憑真考行強號曰太和先生庶追道跡光衆妙也承慶聖歷初太常博士臣聞自古帝王皆有美惡休祥所以昭其德災變所以知其咎天道之常理王者之常事然則休祥屢臻不可矜功而自滿災變奄降不可輕忽而靡驚故殷宗以桑穀生朝懷懼而自省妖不勝德遂立中興之功辛紂以省生大鳥恃福而自盈祥不勝驕終致傾亡之禍故知災變之生將自覺悟明主扶持大業使盛而不衰理須祇畏神心警懼天誡飭身正事業業兢兢則凶往而吉來轉禍而為福昔殷湯禱身而降雨成王省事以反風宋公憂熒惑之災而應三舍之壽高宗懲雊鼎之異而享百年之福此其類也自陛下承天理物至道事神美瑞嘉祥洊臻狎委非臣所能盡述日者變生人火損及神宮驚惕聖心震動黎庶臣謹按左傳曰人火曰火天火曰災人火因人而興故指火體而為稱天火不知何起直以所災言之其名雖殊為害不別又漢書五行志曰火失性則自上而降及濫焰妄起所謂人火其來雖異為患實同王者舉措營為必關幽顯幽為天道顯為人事幽顯迹通天人理合今工匠宿藏其火本無放燎之心明堂教化之宮復非延火之所孽煨潛扇倏忽成災雖則因人亦關神聖臣愚以為火發既先從麻主後及總章意將所營佛舍恐勞而無益但崇其教即是津梁何暇紺宮方存汲引既辟在明堂之後又前逼牲牢之筵兼以厥構崇大功多難畢立像宏法本擬利益黎元傷財役人去且煩勞家國承前大風摧木天誡巳顯今者毒焰冥熾人孽復彰聖人動作必假天人之助一興工役二者俱違厥應昭然殆將緣此臣以為明堂是正陽之位至尊所居展禮班常崇化立政玉帛朝會神靈依憑營之可曰大功損之實非輕事既失嚴禋之所復傷孝理之情陛下昨降明制猶申寅畏之旨㣥寮理合兢畏震悚勉力司存豈合承恩耽樂安然酺晏又下人感荷聖德覩變增惶神體克寧豈非深悅但以火氣初止尚多驚懼餘憂未息據以歡事遏之臣恐憂喜相爭傷於情理故傳曰可憂而為樂取憂之道又古者有火祭四墉四墉積陰之氣祈之以禳火災火陽之氣歡樂陽事火氣方勝不可復興陽事臣聞災變之興至聖不免聿修其德來患可禳陛下垂制博訪許陳至理而左史張鼎以為今既火流王屋彌顯大周之祥通事舍人逢敏奏稱當彌勒初成佛道時有大魔燒宮七寶臺須臾散壞斯實諂妄之邪言實非君臣之正論暗昧王化無益萬幾夫天道雖高其察彌近神心雖寂其聽彌聰交際皇王事均影響今大風烈火譴告相仍實天人丁寧匡諭聖主使鴻基益固天祿永終之意也伏願陛下乾乾在慮翼翼為懷若涉巨川如承大祭審其致災之理詳其降眚之由無瞢天人之心而興不急之役則兆人蒙賴福祿靡窮幸甚幸甚伏見比年巳來天下諸州所貢物至元日皆陳在御前惟貢人獨於朝堂拜列但孝廉秀異國之英才既隨方物以充歲貢宜同珍幣列見王庭豈得金帛羽毛升於玉陛之下賢良文學棄彼金門之外恐所謂貴財而賤義重物而輕人甚不副陛下好道之心尊賢之意伏請貢舉人至元日引見列在方物之前以播充庭之禮謹按王制天子七廟三昭三穆與太祖之廟而七此載籍之明文古今之通制皇唐稽考前範詳採列辟崇建宗靈式遵斯典但以開基之主受命之君王迹有淺深太祖有遠近昔湯武祚基稷坰人坰太祖代遠出乎昭穆之上故七廟可全若夏繼唐虞功非由鯀漢除秦項力不因堯及魏晉經圖周隋撥亂皆勛隆近代祖業非遠受命始封之主不離昭穆之親故肇立宗祊罕聞令制夫太祖以功建昭穆以親崇有功百代而不遷親盡七葉而當毀或以太祖代淺廟數非備更於昭穆之上遠立合遷之君曲從七廟之文深乖迭毀之制皇家千齡啓旦四業重光景皇帝睿德基唐代數猶近號雖崇於太祖親尚列於昭穆且臨六室之位未申七代之尊是知太廟當六未合有七故先朝惟有宣光景元神堯文武六代親廟大帝登遐神主升祔於廟室以宣皇帝代數當滿準禮復遷今止有光皇帝以下六代親廟非是天子之廟數不當有七本由太祖有遠近之異故初建有多少之殊敬惟三后臨朝代多儒雅神祊事重禮豈虛存規模可沿理難變革宣皇既非始祖又廟無祖宗之號親盡既遷其廟不合重立若禮終運往建議復崇實違王制之文不合先朝之旨請依貞觀之故事無改三聖之宏規光崇六室不虧古義謹議義範龍朔中官右戎衛長史父慈子孝起自天經君義臣忠資於地理三尊之重君最為先五教所崇父居其首人倫之綱紀臣子之歸宗佛道興隆之前緇俗異貫陵遲之後同籍國王連河制之於主君厲鄉盡編為天戶况釋迦滅度付囑國王事如內府監議中彈李老裔孫克成宏構緇黃代俗握寶鏡以君臨縱使佛道尊嚴天位彌重帝王國母無上最尊稽首虔誠無妨悟道事如同文議中彈至真之理猶曰勤修禮佛拜天彌成正覺謹議行敏龍朔中官右崇掖衛長史竊以釋老二教語迹雖殊恭順之理雅同儒轍事如右司禦議中彈豈有尊極之處抗揖等於平交師僧之前拜伏過於輿皂事如右威衛議中彈既驚物議且斁彞章革此舊風咸謂為允事如右司禦衛議中彈况黃冠荷天基之慶緇衣受付託之重事如左司禦衛議中彈劬勞盡生育之恩欲報申昊天之義二門之法謇倨乖於恆典五敬之所投拜允合常儀謹議敬則龍朔中官右典戎衛將軍竊以三教殊塗俱極尊崇之道五儀齊致實隆嚴敬之規而釋老二門本求虛寂周孔兩法歸於教義若乃君臣之禮固無易於緇黃事如司更寺議中彈父子之容豈有隔於賢智崇樹既久積習相沿損益惟宜允歸明聖臣等詢議請從拜禮謹議元逸龍朔中官右監門衛中郎將竊以親生膝下鞠養之愛惟深一人至尊嚴敬之儀斯重豈以身披緇服而不拜於君親彈曰誠固以此而佛不令拜俗首掛黃冠遂替子臣之禮謹議思儉龍朔中官衛尉少卿剛折柔存扇元風之妙旨苦形甘辱騰釋路之微言故能開善下之源宏不輕之行事如祕閣議中彈是以聲聞降禮於居士彈曰經云淨名居士示疾毗耶見有妻子常修梵行見有眷屬常樂遠離雖為白衣奉持沙門清淨律行既同僧伍拜跪故是常儀况乎示彼宿心得法寧容不荷引斯為例竊恐非宜柱史委質於周王此乃成緇服之表綴立黃冠之龜鏡自茲巳降喪其宗軌歷代溺其真理習俗守其迷途彈曰佛教入華歷經英聖五遭拜伏三被屏除咸以事理難違還遵舊轍今言守迷溺理似傷迂誕一人有作萬物斯覩紐維天地驅駕百王轉金輪於勝境構玉京於元域遂使違真道士追柱史之遐風矯釋沙門緝聲聞之絶典彈曰佛教所明人有二種一聲聞二菩薩菩薩形無定質應隨類以為宜聲聞剃髮染衣守高蹈而成則教制聲聞之伍不令禮彼白衣順以奉行何名矯釋况太陽垂耀在天標無二之明大帝稱尊御宇極通三之貴且二教裁範雖絶塵容事止出家未能逃國彈曰沙門所以不拜俗者正以絶於塵客非為逃國者也至如嚴光干木之流穎涘商山之伍或踞謁長揖至之而不屈洗耳辭榮聘之而不至此亦高蹈而爾寧逃國乎同賦形於姒鏡皆仰化於姚風豈有抗禮宸居獨高真軌然經尊傲長在人為悖臣君敬父於道無嫌考詳其義跪拜為允謹議處元龍朔中官司馭寺丞禮無不敬名教是先君父同資彞倫所尚况真人善下妙在和光菩薩不輕義摧我慢事如司衛議中彈斯則舛慮齊致分波共源所以綱紀百王則成萬品者也而緇黃之侶沿習為常銷愛敬於君親行貢高於尊極苟殉私欲彈曰沙門棄鬚髮去華競守道不屈豈殉私耶易稱言行君子樞機榮辱在焉何不慎也坐紊天經點厲鄉之清塵負連河之妙旨彈曰連河通教皆云今沙門不拜君親謨誥顯然何云負旨靜言永念良可寒心彈曰梵綱經云出家人法不禮拜國王父母又薩遮尼乾經云若人謗聲辟支佛法毀呰留難者諸善神王不護其國四方賊起水旱不調死亡無數今不信佛教抑令跪拜此則謗法此則留難若佛語有徵則粉首碎身無以塞責豈寒心靜念而可免之哉如愚管見致拜為允謹議元貞龍朔中官內府監丞竊以禮無不敬名教是先君父同資彞倫所尚且佛滅度後法付國王舒卷之規里鍾明聖彈曰右春坊議云夫付囑者佛以像法末年淳心漸薄邪見增長正法衰替四部之衆無力宏宣是以付囑國王令王擁護如其不護法當自壞豈勞付囑令王毀壞誠哉得付囑之旨也但非常之制黔首恆驚雷同之心君子為恥自我作古方懸日月之典可使由之寧拘風雨之好如愚管窺致拜為允謹議仁方龍朔中官都水使者愛敬之道義極於君親恭和之德事昭乎釋老豈有生因覆載將抗禮於人天質稟髮膚遂齊尊於父母眷言方外未離天地之間顧惟俗表尚處閻浮之域事如司衛寺議中彈而為不拜天子類嚴遵之不臣長揖至親似宋人之名母何以津梁品彙導引凡庶聖智之教豈至於斯彈曰易稱藉用白茅又云巽在牀下紛若之吉乃為無咎未有抑令致拜復曰津梁尊而辱之何以去取奉勑議聞伏請令拜謹議約龍朔中官司更寺丞釋教開俗儒風範化即途雖言異軫證理誠則同歸事如右清道衛議中彈莫不粉澤仁義舟輿恭儉然後克闡徽猷以隆遠大何則忠為令德孝實天經惟君惟父同取其敬借使行超物表道備人師豈可長撎於顧復之親抗手於宸扆之貴事須適變未可膠絃彈曰正以君親容養開以方外抗手長撎豈自為矣君父尊嚴申拜為允謹議思元龍朔中官中臺司列少常伯竊以佛道二教本尚虛元演方便於三乘契忘言於一指惟寂惟寞何寂寞之不包非有非無何有無之不鑒今之法侶實繁有徒久損拜跪之儀彈曰清問何處令拜而言損耶自處高尚之地約有為之戒律揖無上之君親彈曰剃削既奉釋宗守戒不宜設禮推之人情情涉縱誕求之至理理所未通彈曰推之人情巢許無云縱誕求之至理沙門寧曰不通令致敬於君親庶垂範於來葉謹議大師龍朔中官左司禦衛長史竊以光分兩曜是顯尊卑之容位辨三才爰彰父子之性明乎愛敬之禮與天地而齊生君臣之義將造化而俱立至若金人啓夢慧日初開紫氣浮關元風肇扇此乃興於中古教始漸移雖復各設法門津梁庶品究其所指終會儒宗事如司更寺議中彈庇俗既是同方遵敬何煩異路必將道體為別有犯未合繩違彈曰有犯非僧繩違寧容不可無守道設禮有纍君親遺教制在國王設禮寧容不可事如左春坊議中彈况三乘之典無聞傲誕之經五千之教詎載矜誇之義敬親何妨重道拜主豈廢尋真事如左戎衛議中彈且割股捨頭猶無訴苦尊君愛父詎即辭勞彈曰割股捨頭必益無宜訴苦敬君拜父慮損豈敢辭勞參練是非拜誠為得謹議
