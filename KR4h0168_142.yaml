body:
  text: 下臣側聞先聖之格言常覽載籍之遺則伊天地之元造洎皇王之建國曰人紀與人綱資立言與立德履之則率性成道違之則罔念作忒望興廢如從鈞視吉凶於糾纆至乃受圖膺籙握鏡君臨因萬物之思化以百姓而為心體太儀之潛運閱往古以來今盡為善於乙夜惜勤勞於寸陰故能釋增氷於瀚海變寒谷於蹛林總人靈以胥悅極穹壤而懷音赫矣聖唐大哉靈命時維太始運鍾上聖天縱皇儲固本居正機悟宏遠神姿凝映顧三善而必宏祇四德而為行每趨庭而為禮常問寢而資敬奉聖訓以周旋諟天文之明命邁觀橋而望梓即元龜與明鏡自大道云革禮教斯起以正君臣以篤父子君臣之禮父子之親盡情義以兼極諒宏道之在人豈夏啟與周誦亦丹朱與商均既琱且琢溫故知新惟忠與敬曰孝與仁則可以下光四海上燭三辰昔三王之教子兼四時以齒學將交發於中外乃先之以禮樂樂以移風易俗禮以安上化人非有悅於鐘鼓將宣志以和神寧有懷於玉帛將克已而庇身生於深宮之中處於㣥后之上未深思於王業不自珍於匕鬯謂富貴之自然恃崇高以矜尚必恣驕很動愆禮讓輕師傅而慢禮義狎姦諂而縱淫放前星之耀遽隱少陽之道斯失雖天下之為家蹈夷險之非一或以才而見升或見讒而受黜足可以省厥休咎觀其得失請粗畧而陳之覬披文而相質在宗周之積德乃執契而膺期賴昌發而作貳啟七百之鴻基逮扶蘇之副秦非有虧於聞望以長嫡之隆重監偏師於亭障始禍則金以寒離厥妖則火不炎上既樹置之違道見宗祧之遄喪伊漢氏之長世固明兩之遞作高惑戚而寵趙以天下而為謔惠結皓而因良致羽翼於寥廓景有慚於鄧子成縱理之淫虐終生患於強吳由發怒於爭博徹居儲兩時猶幼沖防衰年之絕義識亞夫之矜功故能恢宏祖業紹三代之遺風據開博望其明未融哀時命之奇舛遇讒賊於江充雖借兵以誅亂竟背義而終宣嗣好儒大猷行闡嗟被尤於德教美發言於忠謇始聞道於韋匡終獲戾於恭顯太孫雜藝雖異定陶馳道不絕抑惟小善猶見重於通人尚傳芳於前典中興上嗣明章濟濟俱達時政咸通經禮極至情於敬愛敦友于於兄弟是以固東海之遺堂因西周之繼體五官在魏無聞德音或受譏於妲己且自悅於從禽雖才高而學富竟取累於荒淫暨詒厥於明皇構崇基於三世得秦帝之奢侈亞漢武之才藝遂驅役於㣥臣亦無救於彫弊中撫愛相表多奇重桃符而致感納鉅鹿之明規竟能掃江表之氛穢舉要荒而見羈惠處東朝察其遺跡在聖德其如初實御牀之可惜悼愍懷之云廢遇烈風之吹沙盡性靈之神藝亦自敗於凶邪安能奉其粢盛保此邦家惟聖上之慈愛訓義方於至道同論政於漢幄修致戒於京鄗鄙韓子之所賜重經術而為寶咨政理之美惡亦文身之黼藻庶有擇於愚夫慚乞言於遺老致庶績於咸寧先得人而為盛帝堯以前哲垂裕文王以多士興詠取之以正人鑑之於靈鏡量其器能審其檢行必宜度機而分職不可違方以從政若其惑於聽受暗於知人則有道者咸屈無用者必伸謟諛競進以求媚翫好不召而自臻直言正諫以忠信而獲罪賣官鬻獄以貨賄而見親於是虧我王度斁我彞倫九鼎遇姦回而遠逝萬姓望撫我而歸仁蓋造化之至育惟人靈之為貴獄訟不理有生死之異途寃結不伸乖陰陽之和氣士之通塞屬之以深文命之修短懸之於酷吏是故帝堯畫象陳恤隱之言夏禹泣辜盡哀矜之志因取象於大壯乃峻宇而雕牆將瑤臺以瓊室豈畫棟以虹梁或凌雲以遐觀或通天而納涼極醉飽而形人力命痿蹙而身受殃是故言惜十家之產漢帝以昭儉而垂裕雖成百里之囿周文以子來而克昌彼嘉會而通禮重旨酒之為德至醉歸而受祉在齊聖而溫克若其酗醟以致昏沈湎而成惑痛殷受與灌夫亦亡家而喪國是故伊尹以酣歌而作戒周公以亂邦而貽則咨幽閒之令淑實好逑於君子辭玉輦而割愛固班姬之所脫簪珥而思愆亦宣姜之為美乃有禍晉之驪姬亡周之襃姒盡妖妍於圖畫極凶悖於人理傾城傾國思昭示於後王麗質冶容宜永監於前史復有蒐狩之禮馳射之場不節之以正義必自致於禽荒匪外形之疲極亦中心而發狂夫高深不懼胥靡之徒韝緤為娛小豎之事以宗祏之崇重持先王之名器與鷹犬而並驅陵艱險而逸轡馬有銜橛之理獸駭不存之地猶有靦於獲多獨無情而內愧以小臣之愚鄙忝不貲之恩榮擢無庸於草澤齒陋質於簪纓遇大道行而兩儀泰喜元良會而萬國貞以監撫之多暇每講論而肅成仰惟神之敏速歎將聖之聰明自禮賢於秋實足歸道於春卿芳年淑景時和氣清華殿邃兮簾帷靜灌木森兮風雲輕花飄香兮動笑鶯嬌囀兮相鳴以物華之繁靡尚絕思於將迎猶允蹈而不倦極耽翫以研精命庸才以載筆謝摛藻於天庭異洞簫之娛侍殊飛葢之緣情闕雅言以贊德思報恩以輕生敢下拜而稽首願永樹於風聲奉皇靈之遐壽冠振古之鴻名嘉靈禽之擢秀資品物以呈祥含金精於兌域體耀質於炎方候風海而作貢備黼黻以成章繡領綺翼紅衿翠裳飾以朱紫間以元黃碧雞仰而寢色金鵝對以韜光亘萬里之重阻隨四夷而來王既逾嶺以自致亦凌江而遡翔開神情之聰辨發樞機而抑揚粵惟上聖先天成命在萬物而畢覩舉四海而咸鏡仁沾草木信暨翔泳咨此鳥之來儀亦攝生而遂性辨方物於圖象具靈表於言詠酬對清敏發吐祥正實靡靡而可悅雖喋喋而無競徘徊阿閣容與堂皇背風雲之遐路承日月之休光聽簫韶之逸響味椒掖之餘芳更無歎於羅罻終懷恩於稻粱齊鵬鷃於一指屬鵷雛而兩忘翠融孔質鴻鶱鶚跱應舞節以鸞回慕知來而鵲起先假道於朱咮方徐行於紺趾配六象以表德參四靈而效祉庭開霧夕景淨霞空乍褰珠網始出金籠遊萬年於木末翫四照於花叢窺仙盤而飲露登井幹以承風懷故鄉之遠思戀羈雌之舊侶望天衢以寄聲托歸飛而延佇不假物以自衞必任真於出處以薄伎而見知亦無憂於鼎俎不違道以飾智故忘情於所語豈止往來丹陛周旋玉除悅芝英之艹靃靡愛蓂莢之扶踈將以整六翮而遐逝望一舉而沖虛希九成之兆吉覬七日以傳書時光華而始旦歲蹉跎而遽晚彼候雁與賓鴻違風霜而未返嗟銜蘆以避繳恨日暮而途遠羨嚶嚶之好音獨遷喬於上苑仰上林之爽塏襲崑閬之重規實神祕之棲息萃㣥飛之羽儀翔靈囿遊天池翳叢薄汎漣漪况能言之擅美冠同類以稱奇奉皇恩之亭育將謝生而莫施惟一人之有慶願千載其若斯馬南郡天才豔發含章挺生既研精於舊史亦流悅於新聲佩銀章於東洛分竹使於南荊芬盛德於蘭茝獵香風於杜蘅縱調文於雅笛留神思於和笙客有遇於郢都者聞結風之妙曲預高堂之歡宴拂長袖而善留絕飛纓以增眄重鳳翼之次羽愛鸞音之清轉請體物而味言寄風流於藻絢君曰懸匏出自西河奇簳生於南國山川載挺之異班倕攄思之德固常人之所知無假言於翰墨至於曲引繁會之美才人妖麗之則實有動於余衷庶陳辭而祛惑覬傳芳於風雅將永代於刊勒客曰唯唯惟八音之遞作總六律而相旋徐疾短長之攸濟寒暑風雷之所宣清廟象功則韶武播於金石良辰歡宴則鄭衞流於管絃豈無求於變俗將區分而在焉於是元英變呂青陽戒律雲捲蕙樓風生蘭室柳佩翠而辭寒梅含香而受日始覺華樹鶯啼早不悟雕梁燕來疾縱勝氣之逍遙眷春光而怡逸命郊驛以迎賓爛華茵而促膝玉饌厲而不爽金罍湛而將溢佳麗新妝徐步長廊風搖裙佩日照釵梁慣同琱輦乍出閑房時顧步而疑進或輕臨而欲翔耀千金之重價婉二八而成行發繁絃於流徵動浮磬於清商舒披蓮於舞席散垂藻於歌牀獨仙吹之容裔將凌雲而抑揚見秦趙之音劣識巴渝之調下掩衆技而奪氣諒聲高而和寡歌狂會於楚謠詠承筐於周雅既駭聽於吳札亦留神於晉野婉婉鴻驚喈喈鳳鳴或萬殊而競響乍孤囀而飛聲清則混之而不濁濁則澄之而不清實當無而應有固虛受而徐盈舄奕多緒紛綸難狀抑之則徘徊帛丿糸密申之則散朗寥亮始掩斂以夷靡終優游以怊悵隨流睇而煦愉應微嚬而悽愴挫玉簫之清管息瓊篁之虛唱落遺囀於梁間墜纖腰於掌上既而重門半掩高宴將終飄餘音於霄漢遏嬌韻於房櫳遠而聽之若遊鴛翔鶴嘹唳飛空近而察之譬瓊枝玉樹響亮從風信絕俗之神解何變態之無窮爾乃綺帳垂妓行散巫雲斂楚歎獨婉孌於瑤笙尚厂田坴綿於皓腕蘇合薰兮龍燭華連理解兮鴛枕粲既藉寵而橫陳恣深心之祕翫懼管聲之易歇恐君愛之難終起長歌於清夜寄微意於春風歌曰新聲雖自知舊寵會應移無令棗下吹變作一枯枝重歌曰為想雍門歎當思執燭遊不惜妾身難再得方期君壽度千秋臣聞聖人與天地合其德與日月合其明含吐陰陽之氣彈壓山川之精叶吹萬以亭育總得一而為貞我所以誕膺明命大寶鴻名闕惟皇唐之獨運冠風聲之往初練五氣於圓葢張四極於方輿定㣥雄之逐鹿拯方割之為魚在炎靈之交喪屬皇輿之敗德降薦瘥於上元恣咆哮於中國無小無大圖帝圖王匹夫匹婦為蟊為賊舉率土而咸棄雖同舟而作慝彼獨夫之肆志何汨典而亂常固違道而滅德實罔念而作狂始結怨於庶黎終自絕於彼蒼八荒九有山潰川竭天軸且迴地維將絕文章咸盪風雅咸缺在忠良而必焚罄冠冕而同裂或滔天而嫁禍或觸山而作孽極殷區以陸沈盡漢塗而喋血天縱神武景屬上皇自白水而龍躍肇參墟而鳳翔在中塗而聽誦將再駕而翦商惟神機之獨運乃撫翼而高驤命蒼兕而臨河曲殺黑龍而濟冀方指牧野而大誓師鳴條而悔亡惟聖德之懷遠敷彞倫於絕漠在窮髮而畢冠伊左袵而俱削戎亭虛警守大荒之外地險悉平夷中國之軼合綦會而作貢極遐方而獻琛薦環裘而委質候風海而歸心周八荒而率俾重九譯而相尋效狻猊於昧谷維神屏於鄧林應咸池而率舞游上苑而懷音竭寶用而咸競罄虛心而畢舉乍鳴觀閣時遊林籞文表仁義聲諧律呂下神雀於帝臺道甘泉於神渚龜書龍匣河洛將遊東鰈西鶼云亭載佇其餘藏山祕澤之珍摭實排虛之侶俱叶契於圖牒差無得而稱序昔天靈之八萬千歲姬周之三十六王蓋歷數之小曾不足以揄揚惟聖朝之期運符上帝之會昌臣下拜而稽首獻福壽之無疆資卜年與卜歷共地久而天長大禮與天地同節大樂與天地同和六宗五帝禋祀惟永名山大川饗禮無輟而告成方岳獨異師古自朝及野馳心蕩慮伏願御六氣之辨順四序之和升彼岱宗具斯盛禮聽萬歲之逸響紹千載之遐蹤自陛下受命已來詔示天下薄賦輕徭恤刑慎獄躬行節儉減損服御雖堯舜德音無以過此然陰氣鬱積亦恐是旱之咎徵往年雖出宮人未為盡善竊聞大安宮及掖庭內無用官人動有數萬衣食之費固自倍多幽閉之寃足感和氣亢陽為害亦或由茲突厥雖云一國然其種類區分各有酋帥今宜因其離散各即本部署為君長使不相臣屬縱欲存立阿史那氏惟可使存其本族而巳國分則弱而易制埶敵則難相吞滅各自保全必不能抗衡中國矣仍請於定襄置都護府為其節度此安邊之長策也臣聞天帝受無上之法景福會昌輪王致正真之道神祇合德是則聖人執契元化潛通至誠所感冥功斯應皇情西顧法海東流如開洪範之圖似得圓光之夢持綫妙典發金口而祕綸言書葉舊章自龍宮而升麟閣昔迦維馭世大啟法門懸明鏡於無象運虛舟於彼岸空有兼謝生滅俱忘絕智希夷之表遺形動寂之外然隨緣利見應跡生知震大地而萃人天放神光而掩日月百億須彌俱霑聲教三千世界盡入提封愍三毒之韁鎖矜五陰之厂田坴葢惜飛電於浮生歎懸籐於逝水八關云闢開慧識於幽途三乘方軌運慈心於朽宅龍興霧集神動天隨大道為心望法雲而遐舉聞聲悟道漸初地而依仁遷柰苑之喬枝入祇園之奧室酌智水之餘潤承慧日之末光既而稅駕連河歸真雙樹聖靈逾遠像教浸微大義或乖斯文將墜穿鑿異端分析多緒是末非古殊塗別泒天親初學之輩尚致西河之疑龍樹究竟之儔彌深東魯之歎仰惟法寶盡諦無為故經文云佛以法為師佛從法生佛依法住豈止研幾盡性妙物窮神出入無間包含元氣而已若夫惟天為大寒暑運其功謂地蓋厚山澤通其氣是以姬文以大聖之姿幽贊易道邱明懷同恥之德祖述微言諸經著論俯同斯旨大乘莊嚴論者無著菩薩篹焉菩薩以如來滅度之後含章秀發三十二相具體而微八千億結承風俱解宏通正法莊飾經王明真如功德之宗顯大士位行之地破小乘執著成大乘綱紀其菩提一品最為微妙轉八識以成四智束四智以具三身詳諸經論所未曾有可謂聞所未聞見所未見聖上受飛行之寶命總步驟於前王屈天師之尊智周萬物應人皇之運道照三明慈慧外宣神機內湛端扆而役百靈垂拱而朝萬國彌綸造化之初含吐陰陽之際功成作樂既章韶舞治定制禮言動翠華金輪所王封疆之固惟遠芥城雖滿龜鼎之祚無窮光闡大猷開導㣥品凡諸內典盡令翻譯摩伽陀國三藏法師波羅頗伽羅蜜多羅唐言明友即中天竺剎利王之種姓也以得大唐貞觀元年十二月入京法師戒行精勤才識明敏至德隣於初果多能亞夫將聖繼澄什之清塵來儀上國摽生遠之逸氣高步宏門帝心簡在皇儲禮敬其博聞強記探幽洞微京城大德莫不推許粵以貞觀四年恭承明詔又勅尚書左僕射邢國公房元齡散騎常侍行太子左庶子杜正倫詮定義學法師慧乘慧朗法常智解曇藏智首道岳惠明僧辨僧珍法琳靈佳慧賾慧淨元謨僧伽等於勝光寺共成勝業又勅太府卿蘭陵男蕭璟監掌修緝三藏法師云外國凡大小乘學悉以此論為本若於此不通未可宏法是以覃思專精特加研究慧淨法師聰敏博識受旨綴元元謨法師善達方言又兼義解至心譯語一無紕繆以七年獻春之始撰定斯畢勒成十有三卷二十四品勅太子右庶子安平男李百藥序之云爾
