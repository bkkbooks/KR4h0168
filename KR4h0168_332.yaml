front:
  text: 全唐文欽定全唐文卷三百三十二子儀字子儀華州鄭縣人以武舉異等補左衛長史纍遷朔方節度右兵馬使安祿山反進衛尉卿兼靈武郡太守充朔方節度以本軍東討以功加御史大夫肅宗即位拜兵部尚書同中書門下平章事至德二載進司空充關內河東副元帥兩京平加司徒封代國公上元三年進封汾陽郡王廣德元年賜鐵券圖形淩煙閣德宗立攝冡宰賜號尚父進位太尉中書令建中二年薨年八十五贈太師諡忠武
