body:
  text: 臣聞古先哲王莫不崇儉以阜時戒奢以敦本勤以樹善利在化淳伏惟乾元大聖光天文武孝感皇帝陛下纘成盛業備歷諸艱功存造化澤被氓俗至於服用之飾聲樂之娛宜有所增加以彰聖德今月十六日臣等伏蒙天恩幸霑內宴切見後庭伎樂其數非多衣製儉薄頗為逼下顧無麗綺之玩是行質素之風恭惟睿慈允臻於道昔漢文念中人之産晉武焚外國之裘皆抑止於有餘匪謙讓於當分以今比古無德而稱況聖作物覩著自格言上行下效存以理體陛下以農桑未乂軍務猶虞思維富教之繇率先儉約之化康寧之福莫尚於此臣等備位宰臣職當毗贊恐聖烈無紀臣下未知請編之史策宣示中外臣聞功莫大於締搆乾坤孝莫先於纘承社稷伏惟皇帝陛下繼述冠於周武中興邁於漢光曩者巨逆慢天中原失序生人罹厥角之禍皇運甚綴旒之危陛下親討元凶指麾戎旅尊先帝於靈武返上皇於巴蜀以一旅而歸定二京不再周而克寧九廟是陛下締搆之功也及乎先帝厭代姦臣窺國懷躡足之變搆無將之端陛下隳將成之禍胎挫已就之凶計申大義而誅呂全至公而嗣文日月蝕而重明寰宇傾而再定陛下纘承之孝也臣伏以古先帝王繼體踐祚者年踰則改元創業垂統者功成則上號陛下頃以先帝梓宮象設猶在橋山石室弓劒未藏固違體天之典將申寧戚之義孝思之至又何加焉今二聖靈輴永安陵寢萬方黎庶悉夢華胥聖人之哀榮畢矣帝王之功業成矣宜其大崇徽號允㣥臣禺然之望惟新正朔覃四海莫大之澤伏願降明詔下有司許臣等徵三代之故事考百王之通典改元立號革故鼎新懸之無窮倬映千古臣子儀等與㣥臣萬姓不勝懇請大願之至陛下昔在藩邸及登儲闈聰明徇齊齋肅端冕遇闕則下入廟必趨及乎著代成人繼明踐祚聖資天縱神化日新學貫九流觀書過於乙夜文高五始逸興麗於秋風此則陛下明昭之文德也頃者凶羯亂常彞倫失敘陛下親總戎旅誅討元凶掩慶緒於雒陽斬朝義於河朔罷三司而復其位職人懷莫大之恩收兩京而不問脅從國賀非常之澤洎先帝大漸凶臣伺釁陛下釋服即戎提戈清難九重遘慝王室危於綴旒百姓不知天下安於山嶽此則陛下安難之武功也若夫心遊繫象之表理絶名言之外聖斷沈遠同陰陽之不測睿謨鉤深與鬼神而爭奧休氣潛盈草木化為禎祥淳風遠覃蠻夷效其獻貢加以明並日月德參乾坤風雨應時自有雍熙之兆魚鱉咸若更登仁壽之期此則陛下莫大之至聖也至於色養盡心慎終追遠問安內侍豈一日而忘朝視膳宰夫知再飯而方退及乎三聖違代九域侵臨至性自天哀容觸地門外之理權依易月之期從心之喪實履終天之痛財傾象設力竭山陵莫不德通於神明哀感於天地故得役徒百萬之衆皆曰子來送終三十餘日曾無塗潦此則陛下感通之至孝也若乃神告聖運天呈寶符陛下登極之辰泗水見其五璧天兵滅虜之日黃河清於千里神烏白雀之祥填林溢囿卿雲甘露之瑞歲至月書此皆靈貺昭告休期之大應也且夫允恭濬哲有軒轅戰伐之功焉德合乾坤有伏羲尊聖之業焉降天休呈地寶有夏禹元圭之感焉經天緯地之謂文立極中興之謂武變化無方之謂聖精誠上通之謂孝降天和騰地氣生無期出無盡之謂寶文以昭之武以定之聖以成之孝以通之寶以應之夫然後可以充天地之洪名崇帝王之大號故臣等犯冒萬死奉上寶應元聖文武孝皇帝尊號伏願陛下祇膺景命對越神祇應天理人光膺大典臣等謹當撰吉日修禮容設九賓覿㣥后昭告列聖清廟展黃琮之儀有事昊穹圜丘陳蒼璧之禮臣子儀等與㣥臣百姓不勝大慶謹上尊號以聞儷宸極者允歸於淑德諡徽號者必副於鴻名當履運而承天則因心而追往此先王之明訓聖人之茂典也伏惟先太后圓精挺質方祇稟秀禎符協於四星典禮敦於萬國得元和之正氣韞霄漢之清英顧史求針道先於壼則撝謙率禮教備於中闈太陰無昊朓之徵丙殿有祝延之慶尊敬師傅佩服禮經勤於蘋藻之薦罔貴珩璜之飾徽音允穆嘉慶聿彰憲度輔佐之勞緝熙元默之化足以光昭宗祀作配紫微豈騶虞之風行於江漢之域葛覃之詠起自岐陽之下爰膺歷數作啓聖明大拯艱難永清夷夏雖復文母成周王之業慶都誕帝堯之聖異代同符彼多慚德昊蒼不弔聖善長違當圓魄之成玉英早落有坤儀之美象服未加悲懷於先遠之辰感動於易名之日伏以山陵貞兆良吉有期虞祔之儀式資配享率由故實敬奉嘉名謹按諡法敬慎高明曰章法度明大曰章夙興夜寐曰敬齊莊中正曰敬敢遵先典仰圖懿德謹上尊諡曰章敬皇后伏以太尉職雄任重竊憂非據輒敢上聞今日開府敬令琬至伏奉墨詔不蒙允許仰觀聖旨惶駭失圖臣疇昔之分早知止足今茲纍請竊懼滿盈義實由衷事非矯飾志之所至敢不盡言自兵亂以來紀綱寖壞時多躁競俗少廉隅德薄而位尊功微而賞厚實繁有衆不可殫論臣每見之深以為念昔范宣子讓其下皆讓欒黶為汰不敢違也臣誠薄劣竊慕古人務欲以身率先大變浮俗是用勤勤懇懇願罷此官庶禮讓興行由臣而致也臣位為上相爵為真王參啓沃之謀受腹心之寄恩榮已極功業已成尋合乞骸保全餘齒但以寇讎在近家國未安臣子之心不敢寧處苟西戎既敘懷恩就擒疇昔官爵誓無所受必當追蹤范蠡繼迹留侯臣之鄙懷切在於此伏願察臣愚款照臣血誠遠降德音俯停新命上以廣聖明德讓之美下以免微臣無極之災畢力捐軀萬死無恨纍上封章固辭新命未蒙亮察猥見裦崇應繇臣性分愚魯言辭蹇訥不足以遠回天聽上感宸衷伏念兢惶心魂若失臣備位將相於今十年嘗願竭力奉公以身格物宏簡退之化移躁競之風不使食浮於人賞僭於德區區之志實在於斯今臣受命徂征不越畿甸顧惟勤效尚未梟夷論功則毫髮未聞議賞則邱山已重而舊官秩外更授崇班忝曰秉鈞將何率下實恐浮薄之輩從茲寖甚禮讓之道不復興行在臣微軀胡顏自處臣歷觀古今備見否藏貴而能降者盡獲保全進而忘退者卒遇傾覆臣深知此理安敢貪榮所以抵冒威嚴昧死陳讓陛下雲雨之施既以光寵其始亭育之恩豈不保持其末所冀免臣橫死錫臣餘年碎首為請期於必遂伏奉廣德二年十二月三日制加臣尚書令餘並如故受恩逾量魂守飛越臣聞王政之本繫於中臺天下所宗謂之會府大録其事自古攸難宣五常之教儀刑百辟揆六聯之務阜成兆人非才則闕不可濫處臣以薄劣素乏行能逢時擾攘猥蒙驅策內參朝政外總兵權上不能翼戴三光下不能糾逖㣥慝功微賞厚任重恩深覆餗之憂實盈寤寐臣昨所以固辭太尉乞保餘年殊私曲臨遂見矜許竊謂陛下已知其願深察其心豈意未歷旬時復延寵命以臣褊淺又寡知謀安可謬職南宮當茲大任況太宗昔居藩邸嘗踐此官纍聖相承曠而不置皇太子為雍王之日陛下以其總兵薄伐平定關東飲至策勳再有斯授豈臣末職敢亂大倫德薄位尊難逃天下之責負乘致寇復速神明之誅伏乞天慈俯停新命非惟名器無假實冀骸骨獲全在於微誠皇穹所鑒臣伏以尚書令武德之際太宗為之一昨瀝懇上陳請罷斯職而陛下未垂亮察務欲裦崇區區微誠益用惶懼何則太宗立極之主聖德在人自後因廢此官永代作則陛下守文繼體固當奉而行之豈可猥私老臣隳厥成式上掩陛下之德下貽萬方之非臣雖至愚安敢輕受況久經兵亂僭賞者多一人之身兼官數四朱紫同色清濁不分爛羊之謠復聞聖代臣頃觀其弊思革其源以逆寇猶存未敢輕議今元凶沮敗計日成擒中外無虞妖氛漸息此陛下作法之際審官之時固合始於老臣化及班列豈可輕為此舉以亂國章國章亂於上則庶政隳於下海內之政皆亂則國家又安得永代而無患哉陛下苟能從臣之言俯察誠請彼貪榮冒進者亦將各讓其所兼之官自然天下文明百工式敘太平之業可得而復也臣誠蒙鄙識昧古今志之所切實在於此臣德薄蟬翼命輕鴻毛纍蒙國恩猥廁朝列會天地震蕩中原血戰臣北至靈武覲先皇帝乃舉兵而南大搜於岐陽先帝憂勤宗社託臣以家國俾副陛下掃兩京之妖陛下雄圖丕斷再造區宇自後不以臣寡劣委文武之二柄外敷邦教內調鼎飪是以常許國家之死實荷日月之明臣本愚淺言多詆直慮此招謗上瀆冕旒陛下居高聽卑察臣不二皇天后土察臣無私伏以器忌滿盈日增兢惕焉敢偷全久妨賢路自受恩塞下制敵行間東西十年前後百戰天寒劒折濺血霑衣野宿魂驚飲冰傷骨跋涉艱阻出沒死生所仗惟天以至今日陛下曲垂惠獎念及勤勞貽臣詔書一千餘首聖旨微婉慰諭綢繆彰微臣一時之功成子孫萬代之寶自靈武河北河南彭原鄜坊河東鳳翔兩京絳州臣所經行賜手詔敕書凡二十卷昧死上進庶煩聽覽臣聞雍州之地古稱天府右控隴蜀左扼崤函前有終南太華之險後有清渭濁河之固神明之奧王者所都地方數千里帶甲十餘萬兵強士勇雄視八方有利則出攻無利則入守此用武之國非諸夏所同秦漢因之卒成帝業其後或處之而泰去之而亡前史所書不唯一姓及隋氏季末煬帝南遷河洛邱墟兵戈亂起高祖倡義亦先入關惟能翦滅姦雄底定區宇以至於太宗高宗之盛中宗元宗之明多在秦川鮮居東洛間者羯胡構亂九服分崩河北河南盡從逆命然而先帝仗朔方之衆慶緒奔亡陛下藉西土之師朝義就戮豈唯天道助順抑亦地形使然此陛下所知非臣飾説近因吐蕃淩逼鑾駕東巡蓋以六軍之兵素非精練皆市肆屠沽之人務挂虛名苟避征賦及驅以就戰百無一堪亦有潛輸貨財因以求免又中官掩蔽庶政多荒遂令陛下振蕩不安退居陝服斯蓋關於委任失所豈可謂秦地非良者哉今道路云云不知信否咸謂陛下已有成命將幸洛都臣熟思其端未見其利夫以東周之地久陷賊中宮室焚燒十不存一百曹荒廢曾無尺椽中間畿內不滿千戶井邑榛棘豺狼所嗥既乏軍儲又鮮人力東至鄭汴達於徐方北自覃懷經於相土人煙斷絶千里蕭條將何以奉萬乘之牲餼供百官之次舍矧其土地狹厄才數百里間東有成皋南有二室險不足恃適為戰場陛下奈何棄久安之勢從至危之策忽社稷之計生天下之心臣雖至愚竊為陛下不取且聖旨所慮豈不以京畿新遭剽掠田野空虛恐糧食不充國用有闕以臣所見深謂不然昔衛文公小國之君諸侯之主耳遭懿公為狄所滅始廬於曹衣大布之衣冠大帛之冠元年革車三十乘季年三百乘卒能恢復舊業享無疆之休況明明天子躬儉節用苟能黜素餐之吏去冗食之官抑豎刁易牙之權任蘧瑗史鰌之直薄征弛力恤隱逮鰥委諸相以簡賢任能付老臣以練兵禦侮則黎元自理寇盜自平中興之功旬月可冀卜年之期永無極矣願時邁順動回鑾上都再造邦家惟新庶政奉宗廟以修薦享謁陵寢以崇孝思臣雖隕越死無所恨寧朔縣界荒地廣十五里有黑禾穀出遍地每日側近百姓掃盡經宿還生前後可得五六千石其禾圓實味甘美臣以為天啓興王瑞先百穀故漢稱雨粟周頌來牟豈瑞禾自出家給人足蓋陛下富教安人務農敦本光復社稷康濟黎元之應也臣不勝大慶朔方國之北門西禦犬戎北虞獫狁五城相去三千餘里開元天寶中戰士十萬戰馬三萬才敵一隅自先皇龍飛靈武戰士從陛下收復兩京東西南北曾無寧歲中年以僕固之役又經耗散人亡三分之二比於天寶中有十分之一今吐蕃充斥勢強十倍兼河隴之地雜羌渾之衆每歲來寇近郊以朔方減十倍之軍當吐蕃加十倍之騎欲求制勝豈易為力近入內地稱四節度每將盈萬每賊兼乘數四臣所統將士不當賊四分之一所有征馬不當賊百分之二誠合固守不宜於戰又得馬璘牒報賊擬涉渭而南臣若堅壁恐犯畿甸若過畿內則國人大恐諸道易搖外有吐蕃之強中多易搖之衆外畏內懼將何以安臣伏以陛下廣制勝之術力非不足但慮簡練不精進退未一時淹師老地闊勢分願陛下更詢讜議慎擇名將俾之統軍於諸道各抽精卒成四五萬則制勝之道必矣未可失時臣又料河南河北山南江淮小鎮數千大鎮數萬空耗月餉曾不習戰臣請抽赴關右教之戰陳則軍聲益振攻守必全亦長久之策臣猥蒙任遇垂二十年今齒髮已衰願避賢路止足之誠神明所鑒琯字次律河南人以門廕補宏文生授祕書省校書郎天寶中纍遷憲部侍郎元宗狩蜀拜文部尚書同中書門下平章事加銀青光祿大夫奉使靈武册立肅宗尋抗疏自請將兵詔加持節招討西京兼防禦蒲潼兩關兵馬節度等使遇賊於陳濤斜敗績罷為太子少師還京師加金紫光祿大夫封清河郡公寶應二年拜特進刑部尚書廣德元年卒年六十七贈太尉竊惟當今主英臣誠海平天清干相國者更言朝廷之遺闕黔黎之艱阻妄矣琯直以有詞不自明徵積心無與消散此亦一夫不獲願就相門陳之或議相門重深賤士罕及進言不少非人則廢退而或念止於旬時若借人為容則恥殊特達欲持情徑往則懼致忽遺思所以自奇圖左右見異僭用舊禮獻此琬圭冀贄列得啓其書書窮思見其人矣至於輕好行怪易為犯德琯非敢如此也願左右明之琯嘗聞既往布衣之士亦賤者也而一人下之三公崇之將欲分其賢愚而係其理亂琯自料必不能有損益於盛朝徒亦形似英哲之蹤辱纍圭璋之德希左右以公選琯因以私進所私者則敢終而言之琯幼而先相國棄代委翳於蓁蕪之下文粹作琯幼為先相國棄委翳於蓁蕪之下因物遂遷與農者莫辨不忍窘厄然後以災穫為懷將祇若遺謀乃發前言筐篋有相公述作焉有先君鑒誡焉約之立言依以扶信若赴古道則適若逢今人則乖或謂之非或謂之是求我哲匠擊此困蒙顧此身在下流無聞上士未足為先君之嗣不可見先君之友況有貴賤之異為之隔闊乎深惟達音者希恐不可再得忽不知相國之富貴如此琯之貧賤又如此期相國乃曰人以道義求我我不當以貴賤隔之借如宣父有相國之貴寧拒遊夏之徒歟夫其此心千載一用豈琯也當之又見禮經有難進易退者戒貪也起人來學者勸道也琯趣仁者而久未行何乎衣惟素褐乘非車馬閽人斥之馭者排之長衢高門驟拜左右則近於論訴豈聞道之士乎故獻玉貢書以先其意或垂善誘使得登其門假以溫和之顏賜其清間之宴大觀宗廟旁見百官上咨為人之紀綱次及作文之利害然後陳百一之誡諷南山之詩醉德寫誠俯而告退琯之願也未敢忘也若其取於是日許時入奉一歲之內得再廁法曹舍人聞詩禮焉人子畢矣豈有恨哉至如笥有衣裳天有秩序聖君在上何人不欲如琯今日未敢生心倘見露之時為左右所器亦願起自燕國門下令衆人別意瞻矚也貪竭鄙志不覺多言妨塵宴私憂危失措倘左右垂無窮之惠降不測之禮錫數字之答加一介之使則相國保下士之譽小人獲見知之榮光照微軀價傳多士輒飾瑣貌以俟軒車厥初道在人和上皇取象以濟其略中古淳薄人散東周出禮以順其動後代澆極人妄西方流化以復其情夫動與禮違靜與道遇詩書之義尚乎聰明其終動以乖乘戒之旨反乎視聽其終靜以適然則先王之作其未盡歟如來之道其無上歟觀其數乘方駕愚智各新其業大悲一貫胎化咸遂其情法要揚言佛性可以懸得禪宗陰契菩提可以程至通天上地下之事達前生後身之理歷劫必遇其勝因纍生因成其圓果輪回拯厄無物不盡非釋迦如來孰能至於此乎精宮為歸誠之地比邱是覺後之人非明主良臣孰能崇於此乎此宇宙我高祖創集之我烈祖潤色之則天皇后中微之孝和皇帝再興之此龍興寺則孝和之天下諸州各建同號所以慶王業也雖棟宇已立而裝持未嚴開元十七年天火下焚僅獲半存州將皇三從叔無言聖允帝緒稟受自高發慮存誠與庶品不類於彼無度外之物在我無纍已之人廣不可尋深難以測政成化溥身逸俗康位居藩牧與天子共理親則叔父與人主同家護社稷深於他臣視龍興別於餘寺興言多感舉意大成以家率先施錢數萬合境僧尼等道會一體物通十方同力來奉佛塔此州是闔廬故國太伯始封習俗尚華人士克讓聞義風偃捨財雲集上座戒嚴長江氣雄心朗才傑寺主行虔外想遺形苦心堅行相與戮力營衛受伏州主由是發人取財輦貨購匠川流咽塞道路相望體製咨決於公輸王褱巧採奇於衆藝程式既定百工齊舉素無特起舊有增飾允正殿之西霤蔓長廡之南垂廓開房室增加廏庫高閣疊起以下覆三門並建以相挾如少華之承西嶽少室之拱維嵩彩翠虹新欒櫨雲密歘爾已就宛然化成右驛亭左城堞亘望直視一面齊啓背倚闤闠俯朝盈夕散之人前枕通莊閲朝京通越之士地當聚落之腹壯為塔廟之首標吳中之巨麗實天下之景福向若衆生無緣則佛不出世象教何由及此乎聖祀非長則帝不出震龍興何以建寺乎州無賢牧則蒸庶不化財力何以得廣乎百祥畢備成是寶功足可以光揚前烈孚佑下人也琯浮客一過捨舟投體目駭奇功心賞直節輕諸敘事不甚明暢銘而頌之實在能者
