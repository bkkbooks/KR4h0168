body:
  text: 易窮則變變則乃通二氣相感萬物初蒙拆於陽甲化於陰風彼君臣有際會屠釣無終窮其未遇也如獸之檻如禽之籠其德合也起阿衡於莘媵獲太師於渭翁覩公孫之發迹知漢帝之尊崇厄則異元亨則同火有炎光木有根柢寒者斯附暑者蒙蔽苟得其所亦為大惠動必有獲自然之勢抑折節以下人亦開國而來詣衣布被而薄已散金帛以賙濟近乎仁者之心與裘馬而俱敝以光招賢之策不失終身之計故能多士爰處僉謀是行拓南蠻之徼增朔方之城大啓侯國載揚天聲與夫蚩蚩以致誚孰若兢兢而立名僭上則差逼下則鄙反坫誰咎豚肩陋矣或儉奢而得中即達人之至理嗟服勤以抗節在庶幾乎君子璞玉在山白虹在上精靈不隱物理相暢君任下以不疑臣薦賢以答貺失之者喪得之者王況乎左右股肱舉爾無妄道有興廢人亦焉廋屈之則否伸之則休不正其名亦去其實賓閣既關擁門自佚使賢醜錯雜而不分登駑駘於招士之室喟然宣父悲之已久儻相府之可依銘盛德於不朽軹道秦故亭名也今在京師東北十五里署於路曰秦王子嬰降漢高祖之地豈不傷哉余披榛往而訪之則莽蒼如也夫以戰國之弊天下創夷又困於秦使無所訴罪在於政而戮乎嬰嗚呼殺降不祥項氏之不仁也遂作賦以弔云長林之墟荒草無垠躊躇訪古隱嶙如存耆老曰此秦之軹亭也莫不隕泣而傷魂我聞中原板蕩歷數更造來為都邑去為郊道化育人寰盛德攸保其有隨覆車之遺跡躡咸陽以崩倒陳炯戒而罔懷終滅裂以蕩掃今者行旅有悲涼之色將未識聖人之大寶聽之哉不義而強其敝必速徒以金城千里介馬萬軸九國既夷上慢下黷東遊莫返白帝先哭是以沙邱閟禍制出趙氏扶蘇賜死大事去矣海內洶焉雷駭飇起自非蹂先王而隳道德亦無能而及此五星夜聚漢瑞秦亡白馬素車降於道傍非子嬰之罪也而殺身於項王悲夫以暴易亂莫知其極且聞追懷而霸楚無乃弛義而爭國東城引劒亦其宜哉至於后稷貽周三聖九賢合於成康千有餘年猶復慎終如始爰作顧命宣文武之重光訓艱難於執政乃尸天主遂誥諸侯高奭內軸齊魯外輈此周之所以磐石相維數革龜謀孰與夫離擯子弟甘心賊臣身死國滅如火燎薪設使雍州為輿伊傅為輪當朽索之不馭豈龍虎之能馴不其然乎賈生聞之於是讓東陵故侯曰昔王子有殷墟之歌大夫有周廟之作子秦人也豈無情哉邵平乃太息久之且為歌曰道不虛行兮史鰌沒位吾寧范伯之徒與感夷齊而多愧麟鳳遠去龍則死之河水洋洋兮先師莫歸往者不可諫來者吾誰欺姑退身以進道曷揚言而受非彼蕭相國知子乎布衣聖人以美利利天下作舟車禹乃開鑿百川紆餘舟不可以無水水不可以通輿遂各麗於所得非其安而不居橫浮梁於極浦會有跡於通墟借如經綸淮海陶鼓仁義藏用於密動物以智每因宜以制模則永代而取寄伊津梁之不設信要荒之莫致思未濟於中流視安危之如戲故可取於古今豈徒閲千乘與萬騎惟梁於灞惟灞於源當秦地之衝口束東衢之走轅拖偃蹇以橫曳若長虹之未翻隘騰逐而水激忽須臾而聽繁雖曰其繁潰而不雜懷璧拔劒披離屯合當遊役之嗷嗷自洪波之納納客有居於東陵者接行埃之餘氛薄暮垂釣平明去耘傍連古木遠帶清濆昏曉一望還如陳雲乃臨川而歎曰亡周霸秦舉目遺址前車覆軌不變流水歎往事之誠非得茲橋之信美皇風不競佳氣常依既東幸而清道每西臨以駐旗連袂挾轂煙闐雨飛嗟乎此橋且悅明盛徒結網於川隅視雲霞之暉映聊倚柱以歎息敢書橋以承命設樽養老序賓惟賢將必發乎直言用光被乎孝德徵元會之燕射展古義於君臣金奏洋洋合明神於九變青氣靄靄布慶雲於一色則當嘉賓戾止彞倫孔彰㣥儒就經之日天子尊師之禮袒割以俾其冕旒乞言以成其福祿昔之所廢今之所崇瞻彼有司未詳光祿嗟引翼之攸懵何令式之無稽徒欲致譏誠堪聳誚俾爾公侯敬服王命乃升賢俊昭宣訓典惟甲蕃屏有垣既孜孜於審擇黜陟咸若亦賢賢而修貢三詣三適登漢室之明科九德九徵贊虞臣之寅亮有如取火於燧故能任事加爵且汝惟勿伐則繼圭瓚不誣今也自賢豈曰彤弓是允與其表請孰若謙光廷尉有詞匪伊妄作昌齡拜手奉書吏部侍郎李公座右夫道有一昌齡有心明公有鑒三者定矣而又元氣潛行㣥動相鼓乘時則利遇難則否斯亦分於數矣今或者譎觚旁礡以為己任發心不中中無不通雖大愚之人猶知不可況賢智之士乎茲數者如昌齡之心非不知也明公之鑒非不明也惟明公能以至虛納惟昌齡敢以無妄進故未便絶意願就執事陳之若明公以為隅曲置之度外則昌齡未識定分為向時之客乘時不利動則遇否至虛不納無妄不進將使天下之士永絶望於明公矣豈獨小人哉初聞明公克舉大體不尚小節竭智附賢貫道選數亦已確鎮外物翕然有歸於是窮居獨閒未用之士將遁幽貞千里未審明公何以待之夫夷吾窮困樂毅羇旅孔明躬耕子房養志此四賢未遇之時則乃不遇意固不能俯首局步與衆人爭得失於吏曹之門就使四賢生於明時無所服用則下士之不若也亦當與衆人四方而來竦於明公之門未審明公何以處之伏惟明公居堂上之陰知日月之次覩堂下之士知四方之賢若者終不自若也伏惟明公熟察焉天生賢才必有聖代用之用之於天子先自銓衡則明公主司天下開塞天下之所由也可不慎之嗟乎持衡取士專在文墨固未盡矣况文章體勢其多面焉苟不相容則太迂闊一時不合便即棄之伏恐傷鉤賾之明結志士之怨吁可畏也又有恢恢無明精誠洞物大不施小屈於章句蓋屈寸而伸尺小枉而大直君子行焉儻斯人也木訥自守默然而退明公不以為賢是小人敢正顏色鼓喉舌欲伸大直於明公能容之否所為直者如何明公若以為㣥區一舉自有常式富貴為懷曾莫下視則明公何以異近代合古人匪惟高賢雅量在小子亦知之矣明公昔未居此任豈不曰伊人也棄正任巧我為宗臣必將革之操持升降正在今日伏願密運心鏡俾無逃形振拔非常以資天軸乃明公論則振拔者亦膺摩赤霄必將逆進其類以光王國自邇及遠其誰曰不當任乎一為元龜自可數千百年不衰其政矣敬之無任使小人之口波蕩振駭君子誾誾以俟賢俊昌齡久於貧賤是以多知危苦之事天下固有長吟悲歌無所投足天工或闕何借補之苟有人焉有國焉昌齡請攘袂先驅為國士用棼絲之務最急之治實所甘心昌齡豈不解置身青山俯飲白水飽於道義然後謁王公大人以希大遇哉每思力養不給則不覺獨坐流涕啜菽負米惟明公念之直科不得不謀其始夫惟明公深念之投報徇義非一言而能盡也昌齡常在暇日著鑒略五篇以究知人之道將俟後命以黷清塵伯成開元時官尚書左司郎中河南少尹議曰諡者德之表行之迹將以激勵風俗檢束名教固無虛譽是尊實録準張說罷相制云不肅細微之人頗乖周慎之旨又致仕制云行虧半古防闕周身未免瓜李之嫌而喧衆多之口且王之有瑕尚可磨也人之斯玷焉可逭焉諡曰文貞何成沮勸請下太常更據行事定議謹議夫道非言言以明道也空非相相以泯空也禪師彌天冥符曠劫傳印出等等騰非非適來時也適去順也上自宸扆下達蒸黎才仰青蓮之光旋驚白林之會中書侍郎嚴公探祕藏決詞江洋洋乎文宗昭昭乎靈迹伯成殊昧先覺忝在後塵糾合㣥公激揚衆美豈翰墨以云朽將金石以齊固所謂非六經曷以明夫子也非四偈曷以曉真如也凡捨淨財者人具題爵里於時歲在辛巳五月庚戌十八日丁卯皇唐開元草九年也謹案碑刻嚴挺之大智禪師碑銘之下題河南少尹陽伯成撰通直郎行河南府伊闕縣尉集賢院待制兼校理史惟則書元成天寶時官考功郎中知制誥遷中書舍人制策問朕聞理國莫尚乎前篇作於任賢命官必資乎前篇作於選衆堯舜以聲不登科記及前篇並作而以度考核良難殷周取德兼取言登科記及前篇並作而取名徵求匪易朕所以載懷經術之彥夕遺其寢虛佇藝能之士朝忘其饑子大夫光我弓旌應登科記及名賢策問並作膺斯揚擇為政作法豈無前範安人濟時亦有令躅宜敘立身之志各言從官之才前篇作心至如七輔八元施何綱紀十臣四老正何得失並一作各陳事迹兼詳登科記作述前篇作言名氏夫登科記及前篇並無夫字朝會古禮登享舊章九儀式辨其賜六贄各明所前篇作其執雍畤起自登科作於何年前篇作代亳社立於何代前篇作年天士地士此前篇作復何所封諸布諸嚴彼何所主前篇作立又穆邦家而濟生死三聖之教何長利動植而益黎元前篇作庶五材之用登科記作術何要工商兩前篇作二業在俗何先文武二前篇作兩柄適時何急凡此數科不獲雙美必去者方於去食可存者同夫存信十四字登科記及前篇並作必存者均乎存信所去者同乎去食朕將親覽爾等前篇作則明言對臣聞大聖有國將興至理總庶官以匡化覽㣥議以登賢所以奉若天紀作為人極觀堯舜之興則四嶽僉舉九載陟明考核之端立矣監殷周之策則三駕訪德六廉察事徵求之道行矣非睿哲明慮深體化源亦安能董正理官推伏賢傑者也今陛下纘興聖業昭布天光舉良弻以謀至道綜㣥才以康庶績故乃嶽生維翰星降士師嘉猷日聞正言彌啓肅然在位燦然盈朝矣且猶郡邑公選巖穴敷求遺寢載懷比歲臨問佇經術以佑職想藝能以建官則古之坐明堂議衢室安可以儔清問之深也固將卓立化首廓開政先豈唯紹明恆訓踐修常軌而已臣素微經藝之術謬忝弓旌之招誠不足以登進王庭恭承明策至若為政作法之要安人濟時之體臣雖愚鄙竊有志焉臣聞政務利人法期濟物布法由道行政在官官必其才則人沐於化法必於正則物賴其安故庇人以和所以興其義率人以禮所以致其淳賦之必均所以綏其業役之必度所以務其時恤其轉死所以保其命薄其收入所以全其生此安人之畫濟時之要總其大趣存其至心而臣節無隱者爾故王者安人則審政興政則任官任官必良則為政皆善善政溥洽則黎人用康德之本也是以深居而情鑒萬里高拱而明照八極其在任人之術歟夫至公克守於鳴謙臣節必存乎無隱況王心虛鏡容光必察詢其立身之志考其從官之才臣之愚衷具以上達若蒙飭躬召入程器收用使得履文石以獻議瞻法座以陳誠序安人之大訓言濟時之良政抗恆節以忠主申遠圖以戴君臣之宿心永願畢矣立身之志實在於斯從官之才安敢自必蓋無善不應有開必先七輔立於先朝充四目以鑒遠八元翼於舜日播五典以宏風或理歷茂時天道以敘或辨方寧亂地紀用章或內平外成樹稼而蒸人乃粒或忠肅恭懿敷教而理訓克從原其紀綱較然明著十臣佐命周道蔚興四老為賓漢儲底定文武以濟靈臺光偃伯之期羽翼既成寵子罷奪宗之計匡正得失格言斯在風后力牧膺七輔之名伯奮仲戡居八元之列周公呂尚為十臣之宗園公綺里參四老之目八元盡高辛之裔十臣有文王之子事跡斯辨名氏可徵矣夫朝會者所以正君臣之位登享者所以盡誠敬之極故物稱其禮舉之表儀功被於人施之祀典蓋辨其位序而不多其玉帛先其敬意而不繁其樽俎明王道之制也自道遠聖逝侈及嬴劉薦幣興利酎金逞罰祭非其鬼妖望其祥瞻古語事斯謬甚矣周官大宗伯之職以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯蓋以懋功訓德審官乂人也又以禽作六贄以等諸臣孤執皮幣卿執羔大夫執雁士執翟庶人執鶩工商執雞蓋象事以明等威以示禮也秦修雍祠而古有雍畤焉周祭亳社宜社有屬亭焉孝武祈仙封於欒大將以通天地之道也故天士地士懸以五利之名焉漢氏廣禱主於小祠將以期純嘏之集也故諸布諸嚴設於㣥望之祭焉夫谷神不死道宗於元默至覺而生釋歸於清淨書於聖典固在儒流然練神虛心釋道以空慧為法可以濟於生死矣興政致理周孔以禮義為訓可以穆於邦家矣教之攸設儒則為長天生五材利溥㣥物火炎水潤動植以滋刳木範金黎氓攸濟稟於元象土德厚載而居多施於物宜五行廢一而不可工以繕器商以通財財則聚人器則周用疾其浮侈商以政而當遏資於器械工在俗而為先聖人覩天地以成文象震曜以興武文次九序武標七德利用開物禁暴夷凶二柄所資百代無易兩參王政互為國經若寰海晏如則武備都偃干戈日揚則文教式衰自有偏廢之辰皆無必去之道理曠者不可以言極道深者不可以意明乾象照臨聖模廣運臣材非秀茂學非敏博對越天旨誠無足觀謹對器深州安平人天寶中舉明經為奉先令祿山陷西京器受賊署仍守奉先後詣靈武為御史中丞兼戶部侍郎從肅宗至鳳翔加禮儀使克寸復二京為三司使吏部侍郎御史大夫上元元年卒右件官打殺本部富平縣令杜徽恩旨以其能放拋石免死奪官自身配陝郡效力中書舍人賈至等未即行下奏請奉進敕旨議者臣等伏以法者天地之大典帝王守之猶不敢專也若王去榮者乃敢擅殺是臣下之權過於人主開元以前無者尊朝廷也當今疑為天下主愛無親疏得一去榮而失萬姓何利之有又八議名例都無此名十惡科條乃居其一殺本部縣令而陛下寬之王法不行人倫道屈臣等奉詔不知所從夫國以法勝有恩無威慈母不能使其子養由基射穿七札楚王以為辱國林慮公主男犯法漢君不為減罪賤技則去榮何有受法則林慮可徵晉文棄原取信以信大於原也今陝雖要郡不急於法則海內無處不克寸疑況陝郡乎無法也賈至等皆朝之忠良見克寸疑在近謹議綰字公權華州華陰人舉進士補太子正字天寶十三載舉詞藻宏麗科擢右拾遺肅宗即位擢起居舍人知制誥纍拜中書侍郎同中書門下平章事集賢殿崇文館大學士卒諡文簡國之選士必藉賢良蓋取孝友純備言行敦實居常育德動不違仁體忠信之資履謙恭之操藏器則未嘗自伐虛心而所應必誠夫如是故能率已從政化人鎮俗者也自叔世澆詐茲道寖微爭尚文詞互相矜衒馬卿浮薄竟不周於任用趙一虛誕終取擯於鄉閭自時厥後其道彌盛不思實行皆徇空名敗俗傷教備載前史古人比文章於鄭衛蓋有由也近煬帝始置進士之科當時猶試策而已至高宗朝劉思立為考功員外郎又奏進士加雜文明經加帖經從此積弊寖而成俗幼能就學皆誦當代之詩長而博文不越諸家之集遞相黨與用致虛聲六經則未嘗開卷三史則皆同掛壁况復徵以孔孟之道責其君子之儒者哉祖習既深奔競為務矜藝者曾無愧色勇進者但欲淩人以毀讟為常談以向背為己任投刺干謁驅馳於要津露才揚已喧勝於當代古之賢方正豈有如此者乎朝之公卿以此待士家之長老以此垂訓欲其返淳朴懷禮讓守忠信識廉隅何可得也譬之於水其流已濁若不澄本何當復清方今聖德御天再寧寰宇四海之內喁喁向化皆延頸舉踵思聖朝之理也不以此時而理之則太平之政又乖矣凡國之大柄莫先擇士古先哲后皆側席待賢今之取人令投牒自應非經國之體也望請依古制縣令察孝廉審知在鄉閭有孝悌及信義廉恥之行加以經業才堪策試者以孝廉為名薦之於州刺史當以禮待之試其所通之學其通者送名於省自縣至省不得令舉人輒自陳牒比來有到狀保辨識牒等一切並停其所習經取左傳公羊穀梁禮記周禮儀禮尚書毛詩周易任通一經務取深達奧旨通諸家之義試日差諸司官有儒學者對問每經問義十條問畢對策三道其策皆問古今理體及當時要務取堪行用者其經義並策全通為上第望付吏部便與官其經義通八策通二為中第與出身下第者罷歸其明經比試帖經殊非古義皆誦帖括冀圖僥幸並近有道舉亦非理國之體望請與明經進士並停其國子監舉人亦請準此如有行業不著所由妄相推薦請量加貶黜所冀數年之間人倫一變既歸實學當識大猷居家者自修德業從政者皆知廉恥浮競自止敦龎自勸教人之本實在茲焉事若施行即別立條例孝廉舉人請取精通一經每經問義二十條皆須旁通諸義深識微言試策三道每日問一道問古今理體取堪行用者經義及策全通為上第望付吏部便與官義通七策通二為中第與出身下第者罷之論語孝經聖人深旨孟子儒門之達者望兼習此三者為一經其試如上先取在家有孝義廉恥謙恭之行好學不倦精通經義並堪對策者縣令徵於鄉里送名於州刺史與曹官對試以其通者送省既是貢士刺史縣令不得以部人待之加其禮數隨朝集使以十月二十五日到省其鄉飲酒及至上都朝見並謁先師並依舊式又以寇難之故衣冠多去故鄉所居必聞才行斯在望許所在州縣且舉所諳知者秀才舉人準舊格惟試方略策五條望令精通五經每經準孝廉例問義二十條對策五條每日試一道全通為上第送中書門下超與處分十條通七策通四為中第送吏部與官下者罷之又國子監舉人亦請每歲本業博士推擇才行送名與祭酒依鄉貢例試通者送省舉人自縣至州皆不得輒自陳牒比來有到狀保辨識牒等請並停明法舉人望付刑部考試易坤之為義臣道也君子履之文言曰直方大不習闕一字不利又曰陰雖有美含之以從王事然後以黃中通理之道闕終則受黃裳之吉矣安貞應地者其順矣乎公闕十二字在闕一字為伯益若豫上下在周為非子闕字重闕七字因其生也濟物之慶垂名闕九字河東著族其後始大以至於大闕逮先考贈司空闕二字君重之以明義虞闕二字公公少而闕十一字於近究末而必慎其初嘗闕足以盡闕一字則闕一字然矣介是者君子之所闕六字為寶闕八字而不察解褐以門蔭授興寧陵闕之功用刑者必求其意闕一字法者闕一字極於文闕六字疑闕九字加徒役辭闕一字翻動文致於理闕體闕一字自前修闕一字批案云才辨不足闕一字人威力不闕十二字省闕七字別曹奪已闕一字之闕外闕一字轉司勳吏部郎皆掌曹事前古官省而久任中代闕七字鄉里之闕七字掄材之重專闕萌難闕一字隱匿闕一字環訛為闕一字結投刃不惑應弦而闕二字自闕三字不自尊其闕三字問望已闕一字於公輔矣丁內闕太守外闕三字中權闕一字擾私欲闕一字求不給則闕三字貶守闕四字稱惜闕五字郎中至德初闕二字賊庭將闕賀於朝闕一字拜給事中纍遷尚書右丞兵部戶部闕一字校吏部闕一字郎闕二字之後以擢闕四字之道闕一字而多端公鑒以闕年除吏闕一字侍郎平章事時寇戎未平闕一字國多務闕一字以數變生害穀以不通為急公闕四字敬闕一字之信不擅其利不闕則闕一字而闕一字溫雅闕一字浮詭闕二字矜伏諷諫見闕三字內懼闕五字為文闕一字惟左右近闕二字記削闕一字之疏數莫知其闕食一百戶又追先闕二字之德寵贈正司以闕一字勉焉公以年當賜杖禮有懸車不矜闕五字簿守官之節固請遏闕上難闕二字至闕一字太子少傅又以官制闕一字明選曹求舊還除吏部尚書遷右僕射再闕四字人願也公和順積中闕欲進之闕一字及踐大任無自喜之色當其未可審其體而能安當其可蹈其闕一字而不失每闕一字安危故事興替舊章諭同闕極上列祭闕一字實賦養不加厚謙以自持酒醴之歡儉故能廣林泉之闕五字惠愛以合親施舍以周給古之闕以大歷十年十月二十九日薨於闕一字年縣升平里之私第以明年二月二十闕一字日闕二字於東都萬安山之舊塋闕一字諡曰闕二字公禮也詔使闕二字典客護喪卿大夫庶僚百吏追送於國門之外生榮歿哀人理至矣有子太子闕踐德之闕三字抱闕一字之闕三字之義以文見託論撰闕四字不闕一字其銘曰天生萬物有典有則人之秉彞好闕四字空之天古訓是式知闕一字知闕一字有嚴有翼慤善同允敬闕一字奉職五刑恤闕是力闕六字自闕七字其直是非闕八字盈虛與時消息闕四字哀榮同域闕鵲巢配德合好之義深象服建封寵光之致極況動循法度躬事蘋蘩揭四德而表儀高門秉一心而輔佐君子則有夫人王氏有唐元輔汾陽王之伉儷本其盛族著於太原高祖長諧皇左武衛大將軍秦州都督平原郡公贈荊州大都督陪葬獻陵曾祖德元銀青光祿大夫唐州刺史祖士會河南府陸渾縣令父守一寧王府掾贈亠兊州大都督或勳閥可稱或理行尤異積仁儲慶奕葉聯華夫人即亠兊州府君之長女敏悟生知孝慈天性誕含柔範光起韶儀親執組紃備詳圖史女宗之美燦然有光年既及笄禮從納幣言告師氏歸於汾陽汾陽時寵祿未崇盛業猶晦夫人循節儉之行服浣濯之衣祇事舅姑恪恭朝夕視庖主饋未嘗假人下氣怡聲率由至性生既極其養歿又過乎戚慎徽衆善敦敘六宗睦娣姒以仁接中表以義由是閨門以穆婦道有聞天寶中汾陽分鎮河中策勳王府夫人從夫之義封琅琊縣君尋又進封太原郡君其後寇盜橫厲風雲元感汾陽乃首啓戎行宣力王室出則統一師旅入則燮贊台階元勳既崇殊賞斯至內訓之功其子或位列通侯或室嬪貴主姻連右戚榮冠中朝門通河漢之津地成冠蓋之里每令節嘉賞長筵高會青紫照庭佩環盈室薰灼人代莫之與京然約已尚柔從夫體順服仁不倦守禮無為總是具美允膺多福亦嘗排鳳闕謁龍顏及承制曰汾陽郡王妻太原郡君王氏婉娩淑德齊莊令容稟訓姆師友於琴瑟作賓君子宜爾室家克著艱難之勳實由輔助之力可封霍國夫人初汾陽受命東征長驅河朔夫人處於西土三徙其居導諸子以義方規衆女以典則用能聿遵禮度伊加等之顧問奉殊常之寵錫容止合度威儀可觀帝嘉其賢尤所稱重宜其阜昌盛業蕃衍華緒荷恩渥於上天保榮耀於當代而夫人蘊高世之度抱出塵之節以為致盈必損理有固然誓棄浮華願歸正覺於是損其服玩斥其愛染思契理於勝因將息心於了義乃捨京城西別業奏置法雄寺又於法雲寺寫藏經修塔院置經行之室立禪誦之堂景福所憑斯焉茫昧遐齡未及奄爾薨殂享年七十三以大歷十二年正月辛未終於平康里之私第皇慈興歎中使臨弔汾陽以睽偕老之期深遺掛之恨撫襟長慟悼亡何及即以其年六月二日卜葬於萬年縣鳳栖之原恩詔贈賻率加常典哀榮之盛今昔罕儔有子六人長曰銀青光祿大夫太子詹事上柱國太原郡開國公曜次曰開府儀同三司行左散騎常侍趙國公晞次曰開府儀同三司行尚書吏部司封郎中上柱國樂平郡開國公晤次曰銀青光祿大夫試殿中監駙馬都尉曖次曰銀青光祿大夫守殿中少監曙幼曰朝散大夫守祕書省著作佐郎映有女八人長女適成都縣令盧讓金次女適鄂州觀察使吳仲次女適衛尉卿張浚次女適殿中少監李洞清次女適司門郎中鄭渾次女適邠一作汾州別駕張雍次女適和州刺史趙縱幼女適太常寺丞王宰並銜恤在疚是崇窀穸帝女降天人之貴從主婦之儀手制衣衾親臨祖載自宮徂野徒行號劈此又盛德所感明靈永慰者也汾陽屬當出鎮瞻望不及思刻金石以紀徽猷綰顧無贊美之能虛承敘德之命式揚茂實以副永懷銘曰赫赫崇勳鬱為元臣峩峩淑德奄有方國夫貴妻尊恩深寵極聿修閫政以懋嬪則妥自中年嘉聲克宣魚軒昭曜翟茀嬋娟嬪從如雲歌鍾沸天永言浮世載悟真詮元夜何速青鳥斯卜惻愴笳簫蒼茫陵谷惟貞石之不朽庶斯言之可復
