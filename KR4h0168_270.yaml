front:
  text: 全唐文欽定全唐文卷二百七十晉禮部尚書豫弟亦以文名世
  hash: sha256:b57a1078cb1facee6694ee9ec1ee9d091c5019e185a970adc7f9728d8aa64a2f
  markers:
  - {type: head, offset: 13, content: 席晉, id: KR4h0168_NFKB_270-h1, level: 1}
body:
  text: 樂備鐘鼓功存雕刻必資萬物之飾以助成器之雄況猛趪趪負筍嶷嶷懸以千石扣乎萬鈞繢而為形畢存旁行之彙微而俾著何隔羽鳴之族所司昧禮未曰博通且考工之記實存其目梓人之職亦著恆規盡伯益之能名咸一夔而可變事既有據刑欲何施天下一家王土萬里吳蔡齊秦之客憧憧往來東西南北之人靡靡行邁食矣遊子將道他邦喬木坐違飄蓬自遠同仲尼之去魯方事問津異伯鸞之適越詎能登嶽若使符繻不給行者乃逋逃之流今則旌節有憑伍人何逐捕之有空效重邱之徇楚則失之便為圜土之囚齊亦未得誠宜俾其專達豈可徵於有授事同違於周典理難投於呂刑元泰武后朝清源尉入為殿中侍御史內供奉臣聞國家者至公之神器神器一正則難傾神器一傾則難正遠自虞夏及乎周秦金水相生成敗相繼者豈惡於成而欲於敗蓋迷於事而失於機者也夫機者事之微也當今中興之初政教之始幾微之際可不慎哉昔夏之興也卑宮菲食四海會同其衰也峻宇雕牆五子咸怨殷之興也佑賢輔德輯寧邦家其亡也崇信姦回放黜師保周自文武及乎成康風化大行夷夏有截暨乎幽厲王室遂卑強弱相吞㝢縣交戰秦皇以降罷侯置守焚書坑儒頭會箕斂嚴刑峻法驪山之徒未息閭左之兵已起夫夏桀殷紂非不欲傳子孫也周幽秦皇非不欲保社稷也而軍敗牧野鳥竄南巢國殘於犬戎地奪於項籍者豈不以侮慢自賢反道敗德開邪僻之路鉗忠直之口左右侍奉惜祿位而不悟焉伏惟應天皇帝陛下再造區宇重光日月應五行之景運嗣纍聖之洪基九服歸心三靈叶贊回羲舒之耀無幽不燭灑雲雨之澤無生不潤然萬方百姓禺禺然莫不傾耳以聽拭目以視思聞太平之風願見先朝之化如農夫之望歲同善人之愒日自頃營建寺塔廣度僧尼朝夕依歸襯施不絶陛下好善之德以被蒼生然濟時之道恐非急務何則頃者林胡叛換獯虜侵擾帑藏虛竭戶口流亡豈人有厭於枌榆乃事良由於賦斂下人失業不可謂太平也邊兵未解不可謂無事也水旱為災不可謂年登也倉廩未實不可謂國富也而乃驅役饑凍雕鐫木石營搆不急勞費日深恐陛下中興之務又異如來慈悲之法臣比見都邑坊市相率為渾脫隊駿馬胡服名為蘇莫遮旗鼓相當軍陳之勢也騰逐喧噪戰爭之象也錦繡誇競害女工也徵斂貧弱傷政體也胡服相觀非雅樂也渾脫為號非美名也安可以禮義之朝法胡虜之俗以軍陳之勢列庭闕之下竊見諸王亦有此好衣馬既盛奢麗相高今藩邸初開庶官必具何不董之賢傅教之義方明君臣之禮磐石之固豈不偉哉方乃驅率下人相尚胡戲自家刑國豈若是焉詩云京邑翼翼四方是則非先王之禮樂而示則於四方者斯實愚臣之所未喻也臣謹按洪範八政曰謀時寒若君能謀事則時寒順之何必裸露形體澆灌衢路鼓舞跳躍而素寒焉又禮記曰立秋之月行夏令則寒暑不節夫陰陽不調政教之失也休咎之應君政之感也理均影響可不戒哉夫樂者動天地感鬼神移風易俗布德施化重戎狄之化不足以移風也非宮商之度不足以易俗也無八佾之制不足以布德也非六代之樂不足以施化也四者無一何以教人臣本凡愚不識忌諱而生草澤頗曉物情知而不言非忠也言而不實罔上也忠於國者以臣為讜言佞於朝者以臣為誹謗伏惟陛下少留意焉臣聞君舉必書有國彞訓書而不法後嗣何觀臣又聞建國君人尊師重道禮由天作樂以地制禮樂備風化行焉伏願陛下敦風化之本重黎庶之費興念或躍思締搆之艱難矜孤恤窮思時政之可否安人和衆覽先朝之事業非軍國之衆則息而罷之有佞諛之言則察而退之有忠直之諫則誘而進之豈惟天下幸甚實亦社禝之大計也臣奉陛下搜賢之制忝所知直言之舉雖乘鴈雙鳬不為損益而主聖臣直敢不庶幾安能和光同塵懷忠蓄憤上失陛下求賢之望下虧愚臣事主之節亦何以視息於人間飲啄於聖代伏惟陛下少加詳擇臣聞天地不私於動植所以稱其大日月不偏於燭耀所以稱其明陛下六合為家萬代作主布慈悲於沙界樹功業於元劫霓旌寶蓋接影都畿鳳剎龍宮相望都邑雖寶塔踴出真容再見不足以論其相好不足以並此莊嚴為萬國之福田作㣥生之因果然釋氏真教平等為宗本之以慈悲加之以布施臣頃因行役涉歷塞垣人之艱危盡知之矣緣邊鎮守數十萬衆或野戍孤烽迥臨沙漠或裹糧帶甲遠伺煙塵歲月既深衣服久弊形容枯槁無扞禦之用朝夕殷憂有饑寒之色及邊荒小醜微有風塵暫交矢石已聞喪敗豈沉謀祕略有謝於種虜乃天恩佛法未覆於士卒之所致也乃今胡馬窺於塞下羽檄傳於上京調發師旅憂勞聖慮府藏虛竭百姓疲勞臣每思之痛心疾首伏惟陛下以平施之德成育養之恩回營造之資充疆場之費則如來布施之法也賜之穀帛惠及饑凍則如來慈悲之化也絲綸既行中外胥悅則如來平等之教也功德既樹賞罰斯明將士知恩則三軍賈勇犬羊懾息萬里無塵自然烽燧罷燃干戈不用天下士女並修耕織徭戍減少府藏充盈則陛下之深恩社稷之大計如來之教不偏於京雒大乘之法遂遍於長沙今廣費錢力空修棟宇中下士女直覩莊嚴邊疆戍卒不免饑弊同沐太平之化而勞逸以殊俱承雨露之恩而榮枯遂隔恐非如來平等之意又異陛下亭育之恩臣謹按金剛般若經云若以色見我以音聲求我是人行邪道不能見如來是知大乘之宗聲色不見豈釋迦之意雕琢為功今之作者臣所未喻臣又聞黃帝堯舜文王盛德充於宇宙餘芳流於絲竹者乃盡善盡美茅茨土階叶和萬邦親睦九族之致也蓋非勞搆之功佛法之助晉魏越競梁宋澆漓釋教行於中國伽藍遍於天下然喪亂不絶邦國未安者豈佛教之使然乎蓋好尚非所聚斂過度人不堪命之所致也漢文惜露臺之産化比成康秦皇起阿房之宮禍成傾覆伏願陛下祖述堯舜憲章文武覽帝王之成敗驗黎庶之安危則天下幸甚自神功之後百姓荐饑臣之所見此之為甚重以林胡叛換六軍齊沒胸奴侵擾趙定為疆徑卒壯夫死於鋒刃少妻弱子遭於驅掠衰老童幼街號巷哭者悲感行路伏惟陛下為之父母可不念之昔者匹婦稱孝匹夫稱賢哀怨所及尚致霜旱況忠臣孝子傷心泣血者動以萬計感於陰陽成其水旱不足怪也方修寺造塔塑畫尊容峻宇雕牆丹楹刻桷驅役貧賤斂賦鰥寡以求其福臣用為疑臣又聞胸奴之俗以騎射為業以攻擊為務教卒練兵以日繫月國之所好經行設齊持戒忍辱捧鉢振錫剔髮染衣至於練習弓矢者十室之中未聞其一以此衆戰臣竊惑焉伏願陛下以邊疆為慮以百姓為心防之於未萌理之於未亂休力役罷修造恤窮乏勸耕桑愛養戰士慎擇邊將妙選牧宰招攜亡散則成康文景之風可翹足而致彼氊裘獯醜之虜何足為憂臣聞主聖臣直有犯無隱誠則愚賤不敢庶幾惟陛下萬機之暇少垂聽覽子餘寧州刺史守真子舉明經纍補鄠縣尉景龍中為左臺監察御史開元初纍遷冀州刺史又為岐王府長史加銀青光祿大夫十四年卒諡曰孝議曰謹按前件四廟等並前皇嫡嗣殞身昭代聖上哀骨肉之深錫蒸嘗之厚憲章往昔垂法將來今欲使陵廟有憑神靈是享故禮曰禮從宜又曰夫孝者善繼人之志善述人之事禮從宜者明可置也善繼志者不可改也我太宗文武聖皇帝功成理定制禮作樂太上皇能事斯畢窅然高視皆以禮順於情情通則類應樂感於物物感則德和所以深悼友于敬申孝享範圍軌躅潤色鴻名昔嫄廟列周戾園居漢並位非七代置在一時斯並前史宏規後賢令範固知父子之愛兄弟之恩情有所殷方從大教又按春秋狐突適下國遇太子使登僕曰豫將以晉秦秦將祀豫此則太子之言無後明矣對曰神不歆非類人不祀非族君祀無乃殄乎此則晉有其祀立廟必矣雖史有詳略而微旨見存又定公元年立煬宮經傳更無異說鄭元注云煬公伯禽之子季氏禱而立其宮也竊以宮廟國號建立不殊季氏陪臣煬公遠祖因禱立廟尚不為嫌豈與夫睿聖深恩闡揚至化篤惟親之祀垂可久之法考之漢儲晉嫡則如彼言乎周廟魯宮則如此豈可使晉求秦祀戾匪漢思所枉者深所直者鮮黷神慢禮理必不然昔災德滅秦自以功高百代天下郡國皆立高廟二祧不遷九祖並享三分國用四海共違徒議廢興竟無得失既而疾因夢譴嗣闕承祧雖天道有因亦人事何補既非比例不假榷揚但樂有差等禮亦異數恭聞正議虔訪有司金石取象於軒懸牢禮不虧於乾豆談樂廢廟絶恩棄德神之無形亦可欺也又按周禮官有其職修其事若廢官去職何以敬神失敬與誠何以降福且尊以儲后位絶諸侯諡號既崇官吏有典去羊存朔非理所安徇利忘禮何以為國謹議議曰死者不可復生刑者不可復續故聖人但訊於㣥臣仰採爰書俯窺刑鼎應議之科有八議親之意特深犯死之條有二犯贓之刑非重廣骨肉之禮則德盛而教尊崇錐刀之禁則化衰而情漠謹按國子司南之嗣爵重阜陵當膠東之榮位齊列無聞樂善有墜昭害疑但以刑故宥過議人不捨武帝忍受於漢親抵罪可矜高祖約法於秦暴則知原情輕重與事淺深哀死者之銜冤不以親而廢法憫生靈之無識不以法而陷人盜為因官犯罪專殺以盜之比正盜而為輕因殺而非重進雖傷於貪穢退非負於幽寃豈惟乾坤感氣雨露所偏然而睦彼親親須明惻隱謹議景源神龍中官補闕陛下以仁孝理國以名教齊人徽號之聞宜超敻古理有未便冒觸天慈伏見天下諸州各置一大唐中興寺觀者故以式標昌運光贊洪名聖圖遠著無得而稱焉竊有未安廣進芻言至如永昌登封創之為縣名者是先聖受圖勒石之所陛下思而奉之不令改易今聖善報慈題之為寺閣者陛下申恩竭力之致故崇而仰之獨昭其號伏惟應天皇帝陛下深仁至孝之德古先帝代未之前聞也況唐運自隆周親撫政母成子業周贊唐興雖有紹三朝而化牟一統既承顧復非謂中興夫言中興者中有阻間不承統歷既奉成周之業實揚先聖之資君親臨之厚莫重焉中興立號未益前規以臣愚見所置大唐中興寺觀及圖史并出制誥咸請除中興字直以唐龍興為名庶望前後君親俱承正統周唐寶歷共協神聰穆之神龍時中書舍人內供奉莫賀就日輸琛占風削袵既踰䓤嶺便集藳街頻承湛露之恩幾荷油雲之施至若綾開翥鶴映濉浦以成文錦縟翔鴛艷江波而濯色近九重之厚錫充萬里之輕齎關司寄重咽喉任光襟帶物皆違樣既生非馬之疑事乃出蕃須既鳴雞之失既緣恩賜有異常途勘責不虛固難留滯粵允矣於昭聖唐天子中興拓跡開統乃建皇極握乾符驅駕百靈總齊萬類貴與天乎比壽富與地乎侔資日月回薄以淑清告象陰陽變通以樂和乘氣龍不隱德鳳不潛靈懷生之徒根著之物咸遂其性固能使河海靜默宇宙文明舊物維新昌圖啓旦大定禮樂戢藏干戈人學而還淳刑措而不用覆燾之恩溥生育之理足於是邑老田父擊壤而歌張掖而儛顧而為頌曰康哉堂哉乃聖乃神代有非常之主必有非常之臣非常者所謂殊尢傑出與時偕運則我賢令盧公其人焉古曰聖主得賢臣今見之矣百里令長親人之要者也煩劇所鍾賢良是責故有四科堂室孔甫稱乎冉求三國股肱趙武知乎邢伯應星雷而鎮風雨類父母而若神明鄭産之開喻獲禽魯恭之垂仁及獸循聲流於簡牘良政在於歌謠斯焉取斯之子之遠若乃張英風於上國宣懿範於中都允升大猷厥有成績休光終不圉盛德莫與京觀其化焉則盧公之心可知矣公名正道字真直范陽人昔元年景辰上帝甄其九萬正月甲子太公課其八百漢祖以同日相愛利建藩維魏祖以餘風可嘉聿推楨幹或清虛而循禮典早識張華或文思而發詩書深知越石曾祖昌衡隋金州刺史儀同三司太子左庶子風神淡雅經史該博宣六察而馳熊軾翊三善而列鳳條德為人表行為士則祖寶素隋晉州別駕有禮有法於紀於綱得管輅之清談發王祥之雅詠考安壽皇朝朝散大夫襄州司馬綿州長史蘭芬桂紫月鑒霜明珠皋則洗幘擅奇玉壘則題輿緝化公五行秀氣五色淳光忠肅恭懿以立身孝敬溫良以行已涵珠孕璧懸闞澤之高名舞柏吟松動嵇康之逸韻文史足用方朔之言有徵器宇難量叔則之才可覿解褐調為冀州信都縣主簿轉絳州太平縣丞長河之間彼汾之曲朱鈎理劇黃綬安卑鴻漸於磐鶯遷於木敕授陝州司士參軍又改汴州浚儀縣令佐襜帷於陝服式允清嚴綰銅墨於梁城克敷恩信我皇紹膺丕業嗣守珍期明一之徽號聿崇凡百之榮階式敘神龍元年制加朝散大夫隨班例也居無何制為洛州新安縣令又改滎陽縣令爾其索亭舊邑滎澤奧區郊連北制地按東里上躔鶉火旁控龍泉神州則帶河泝洛洪漕則通江達海五方雲湊公驟私奔百族星稠邀時射利盤根錯節允屬於升卿先教後刑必推於季子公下鳬舄用牛刀承天理人以居其職尊五屏四以制其範開道途焉設隄防焉陳之以禮樂導之以德義宣柔嘉恤孤寡去末返本利用厚生至為濟濟庠孰莘莘冠履王渙之勸率佐吏范寧之惠養生徒人識廉讓之儀家行俎豆之禮其崇學有如此者龍鱗促務馬骨攘灾就穡占於五星納稼詳於十月子奇之鑄器童恢之易牛其勸農有如此者持寬濟猛以禮代刑兩造盡其根源五聽窮其詞色穿窬自息請託不行歸遇臘之囚原復讐之罪桴鼓罕施於道路桎梏無用於狴牢其政令有如此者貌年巡戶定賦徵徭情僞必探高卑咸若心同懸鏡自辨妍蚩手類持衡不差輕重其平直有如此者果行育德循巳正身徐邈之有常石奮之無潤冰壺載潔塵甑自空其清白有如此者入其境則田疇自墾草萊盡闢此恭敬以信故其人盡力也入其邑則牆屋甚完樹木甚茂此忠信以寬故其人不偷也至其庭府吏甚清明諸下用命此明察以斷故其政不擾也可謂季路為宰復在於斯任人以逸從諫如流耳目平而心氣和四肢全而百工理父事三人以教孝兄事五人以教悌可謂子賤為宰復在於斯固以得良吏之要津行古人之至道頃者年穀不登時雨未降聖皇減太官之膳出幽圄之囚是歌雲漢之詩式備山川之禱恐一物之失所慮百姓之阻饑徙有之無遂起汛舟之役賑貧救乏爰行發廩之施公上祗元澤下罄丹誠家到戶至裒多益寡優之柔之撫之育之里詠途歌人安俗泰雖雲行載沐旋符以夜之期而風教特隆實荷如春之德導揚庶美字育㣥氓惠化所以周洽風流所以藉甚豈直王談在職時叟號其無雙張既臨官京輔稱其第一而巳河南道巡察使衛州司馬路敬潛以政術尢異奏聞使乎使乎得其人矣是知韓稜之飛章已奏徵入有期焦貢之行雨載馳願留難遂丞馬據主簿解伯宗尉高賁司馬昭道等並千將重寶新甫貞柯道可濟時位不充量溟海即鯤鵬所化枳棘非鸞鳳所棲翊贊多方聲華有裕望逸驥而將遠撫留犢以增傷孤我德而無鄰勞我思而無極爰有等慈寺頭陀逸僧識法師俗姓桑氏漢丞相之後秀也天稟聰偉生而俊奇發願為國敬造阿彌陀石碑像并頌聖德及鑄神鍾鄉人前巴州曾闕一字縣尉劉虔獎録事王虔福常守一佐史里正等或簪纓著族夙勞州郡之班或仁義在躬暫屈鄉閭之任耕田鑿井遭聖主之休明孝道忠規受君子之名教以為呌丹閽而一借未達由衷樹翠碣而長懸方存相質惠我無疆之澤徽烈允光思君不樂之情德音何已殷溝作頌文在茲乎其詞曰大地山河中天朝市玉帛萬國子男百里惟索之亭惟京之水膴膴原隰森森梓其一粵茲撫字須彼仁賢俗之化者君之宰焉操我利器亨我小鮮聞歌下邑舞洽重泉其二其政不嚴其儀不忒秩秩詩禮光光道德爰務耕桑罕施徽纆無偏無黨有典有則其三琴鳴宓賤花發潘仁俸惟計日甑乃生塵視人如子臨事若神秋鷹坐化瑞雉行馴其四自冬徂春密雲不雨曲降絲綍載傾敖庾沐蘭奠桂救病濟窶旋感月離方期歲取其五祝良何德汲黯何功達望千載寧踰一同既流膏雨克播循風聲聞於外化協於中其六鳳使載揚驥途攸展芳菊無絶甘棠勿翦式紀清芬爰憑翠篆歌詠不足聊稱其善其七欽緒萊州膠水人第進士纍遷太常博士歷吏部員外郎出為華州刺史開元十三年由御史中丞徙吏部侍郎歷汴魏二州刺史朝集使魏州刺史臣欽緒等二百四十六人言臣聞三統稱皇五德號帝道實為大義不可名且以明覆載之尊協神人之望稽衆允迪萬邦咸休伏惟陛下道合乾坤明並日月敷廣運之德懋昭格之功充塞六合光被二儀陛下之聖理也禮展園廟孝感禎祥陛下之神應也經天緯地制禮作樂陛下之文德也柔遠能邇戡難定亂陛下之武成也殫百王之能事創千古之終禮幽明感慶華裔帥信伯益所謂乃聖乃神乃武乃文者也今大號雖稱神武未備聖文臣等忝官州郡幸因朝集不勝至願望上尊號開元聖文神武皇帝謹於朝堂昧死上表侍中臣乾曜中書令臣說等言臣聞自古受天命居大寶者必登嵩高之嶽行封禪之事所以展誠敬報神祇三五迄今未之闕也是以高宗因文武之業盛岱亭之禮方冊所記虞夏同風聖移三朝年經五紀封崇之典缺而未備山川望幸屬在今日陛下靖多難遵先朝天所啓也承天統臨萬邦天所命也焉得不陟東嶽禪云亭報上元之靈恩紹高宗之鴻烈則天地之意宗廟之心將何以克厭哉且陛下即位以來十有四載創九廟禮二郊大舜之孝敬也敘九族友兄弟文王之慈惠也卑宮室菲飲食夏禹之恭儉也道稽古德日新帝堯之文思也憐黔首惠蒼生成湯之深仁也化元漠風大和軒皇之至理也至如日月星辰山河草木羽毛鱗介窮祥極瑞蓋以薦至而為常衆多而不録正以天成地平人和歲稔可以報於神明矣鴻生碩儒上章奏而請封禪者前後千百聖情撝挹天鑒未回臣等仰考聖情傍採衆望封巒展禮時不可抑陛下縱不欲以成功告天豈不以天休報德臣等昧死上請以聞臣乾曜說等言臣等考天人之際稽億兆之性以為理定功成登封告禪鴻名盛則屬在聖明陛下讓德沖深未允㣥情神祇觖望臣等懼焉且今四海和平百蠻率職莫不含道德之甘實嗅仁義之馨香是以上帝聿懷名山望幸珍符薦委年穀屢登開闢已來未之有也臣聞自古受命而封禪者七十二君安有殊風絶業以方今也然猶躡梁甫登太山飛英聲騰茂實而陛下功德之美符瑞之富固以孕虞夏含殷周有何退讓逡巡於大禮哉夫昭報天地至敬也嚴配祖宗大孝也厚德蒼生博惠也發策紀號丕業也陛下安可以闕哉天地之符彰矣祖宗之靈著矣蒼生之望勤矣禮樂之文備矣陛下安可以辭哉故臣等願因神祇之叶贊順華夏之懇誠早稽舊章特降明詔庶及仲春農桑之隙以展巡狩肆覲之儀則天下幸甚周禮凡言祭祀享三者皆祭之互名本無定義何以明之按周禮典瑞職云兩圭有邸以祀地則祭地亦稱祀也又司几筵云設祀先王之胙席則祭宗廟亦稱祀也又內宗職云掌宗廟之祭祀此又非獨天稱祀地稱祭也又按禮記云惟聖人為能享帝此即祀天帝亦言享也又按孝經云春秋祭祀以時思之此即宗廟亦言祭祀也經典此文不可備數據此則欽明所執天曰祀地曰祭廟曰享未得為定明矣又周禮凡言大祭祀者祭天地宗廟之總名非獨天地為大祭祀也何以明之按鬱人職云大祭祀與量人受舉斚之卒爵尸與斚皆宗廟之事則宗廟亦稱大祭祀又欽明狀引九嬪職大祭祀后祼獻則贊瑤爵據天無祼亦無瑤爵此乃宗廟稱大祭祀之明文欽明所執大祭祀即為祭天地未得為定明矣又周禮大宗伯職云凡大祭祀王后有故不預則攝而薦豆籩徹欽明惟執此文以為王后有祭天地之禮欽緒等據此乃是王后薦宗廟之禮非祭天地之事何以明之按此文凡祀大神祭大祇享大鬼臨事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍制大號理其大禮制相天王之大禮若王不與祭祀則攝位此已上一凡直是王兼祭天地宗廟之事故通言大神大祇大鬼之祭也已下文云凡大祭祀王后不與則攝而薦豆籩徹此一凡直是王后祭宗廟之事故惟言大祭祀也若云王后合助祭天地不應重起凡大祭祀之文也為嫌王后有祭天地之疑故重起後凡以別之耳王后祭宗廟自是大祭祀何故取上凡相天王之禮以混下凡王后祭宗廟之文此是本經科假明白又按周禮外宗掌宗廟之祭祀佐王后薦玉豆凡王后之獻亦如之王后有故不預則贊宗伯按此王后有故不預則宗伯攝而薦豆籩外宗贊之內宗外宗所掌皆佐王后宗廟之薦本無佐祭天地之禮但天地尚質宗廟尚文玉豆宗廟之器初非祭天所設請問欽明若王后助祭天地在周禮使何人贊佐若宗廟攝后薦豆祭天又命何人贊佐並請明徵禮文即知攝薦是宗廟之禮明矣按周禮司服云王祀昊天上帝則服大裘而冕享先王則衮冕內司服掌王后祭服無王后祭天之服按三禮義宗明王后六服謂褘衣搖翟闕翟鞠衣展衣褖衣也褘衣從王祭先王則服之搖翟從王祭先公則服之闕翟饗諸侯則服之鞠衣以采桑則服之展衣以禮見王及見賓客則服之禒衣燕居則服之王后無助祭於天地之服但自先王以下又三禮義宗明王夫人之服云后不助祭天地五嶽故無助祭天地四望之服按此則王后無祭天之服明矣又三禮義宗明王后五輅謂重翟厭翟安車翟車輦車也重翟者后從王祭先王先公所乘也厭翟者后從王享諸侯所乘也安車者后宮中朝夕見於王所乘也翟車者后采桑所乘也輦車者后遊宴所乘也按此則王后無祭天之車明矣又禮記郊特牲義贊云祭天地無祼鄭元注云惟人道宗廟有祼天地大神至尊不祼圓丘之祭與宗廟祫同朝踐王酌泛齊以獻是一獻按此后無祭天之事大宗伯次酌醴齊以獻是二獻按此則祭圓丘大宗伯次王為獻非攝王后之事欽明等所執王后有故不預則宗伯攝薦豆籩更明攝王后宗廟之薦非攝天地之祀明矣欽明建議只及引禮記祭統曰夫祭也者必夫婦親之按此是王與后祭宗廟之禮非關祀天地之義按漢魏晉宋後魏齊梁周陳隋等歷代典籍與王令主郊天祀地代有其禮史不闕書並不見往代王后助祭之事又高祖神堯皇帝太宗文武聖皇帝南郊祀天無皇后助祭處高宗天皇大帝永徽二年十二月辛酉親有事於南郊又總章元年十二月丁卯親祀南郊亦並無皇后助祭處按大唐禮亦無皇后助祭南郊之禮欽緒等幸忝禮官親承聖問竭盡聞見不敢依隨伏以主上稽古志遵舊典所議助祭實無正文若以王者制禮自我作古明主立斷非臣下敢言謹議
