body:
  text: 臣聞兵者凶器不獲已而用之今西域諸蕃莫不順軌縱鼠竊狗盜有戌卒鎮兵足宣式遏之威非降赫斯之怒此師之出未見其名臣又聞安不忘危理必資備自近及遠強幹弱支是以漢實關中徙諸豪族今關輔戶口積久逋逃承前先虛見猶未實屬北虜犯塞西戎駭邊凡在丁壯征行略盡豈宜更募驍勇遠資荒服又一萬行人詣六千餘里咸給遞䭾並供熟食道次州縣將何以供秦隴之西人戶漸少涼州已去砂磧悠然遣彼居人如何得濟又萬人賞賜費用極多萬里資糧破損尤廣縱令必克寸其獲幾何儻稽天誅無乃甚損請令計議所用所得校其多少即知利害况用者必費獲者未量何要此行頓空畿甸且上古之時大同之化不獨子子不獨親親何隔華戎務均安靖洎皇道謝古帝德慙淳猶尚綏懷不崇征伐有占風覘雨之客無越海踰山之師其後漢武膺圖志恢土宇西通絕域北擊匈奴雖廣獲珍奇多斬首級而中國疲耗殆至危亡是以俗號昇平君稱盛德者咸指唐堯之代不歸漢武之年其要功不成者復焉足比議惟陛下圖之臣聞王者發號施令必法乎天道使三綱敘十等咸若者善善明惡惡著也善善者懸爵賞以勸之也惡惡者設刑罰以懲之也其賞罰所不加者則考行立諡以褎貶之所以勸誡將來也斯並至公之大猷非私情之可徇故箕微獲用管蔡為戮諡者臣議其君子議其父而曰靈曰厲者不敢以私而亂大猷也則其餘安可失衷哉臣竊見節愍太子與李多祚等擁北軍禁旅上犯宸居破扉斬關突禁而入兵指黃屋騎騰紫微孝和皇帝移御元武門以避其銳親降德音諭以順逆而太子據鞍自若督眾不停俄而其黨悔非轉逆為順或迴兵討賊或投狀自拘多祚等伏誅太子方自逃竄向使同惡相濟天道無徵賊徒闕倒戈之人侍臣虧陛㦸之衞其為禍也胡可忍言於時臣任將作少匠賜通事舍人內供奉其明日孝和皇帝引見供奉官等雨淚交集謂曰幾不與卿等相見其為危懼不亦甚乎臣每思之不勝憤毒今聖朝雪罪禮葬諡為節愍以臣愚識竊所惑焉夫臣子之禮嚴敬斯極故過位必趨蹙路馬芻有誅昔漢成之為太子也行不敢絕馳道當周室之衰微也秦師過周北門左右免冑而下王孫滿猶以其不卷甲束兵譏其無禮知其必敗由是言之則太子稱兵宮內跨馬御前悖禮已甚矣况將更甚乎而可襃諡此臣所未喻也以其斬武三思父子而嘉之乎然弄兵討逆以安君父可也當解甲於朝以請罪而乃欲因自取之是競為逆可褎諡乎此又臣所未喻也將廢韋氏而嘉之乎然韋氏逆彰義絕雖誅之亦可也當此時也韋氏未有逆彰未為義絕韋則母也太子子也豈有廢母之理乎且既非中宗之命而廢之是刦父廢母亦悖逆也可褎諡乎此又臣所未喻也夫君或不君臣安可不臣父或不父子安可不子借如君父有桀紂之行臣子無廢殺之理况先帝功格宇宙德被生靈廟號中宗諡曰孝和皇帝而逆命之子可褎諡乎此又臣所未喻也昔獻公惑驪姬之譖將殺其太子申生公子重耳謂之曰子盍言子之志於公乎太子曰不可君安驪姬是我傷君之心也曰然則盍行乎曰不可君謂我欲弒君也天下豈有無父之國哉吾何行如之使人辭於狐突曰申生不敢愛其死雖然吾君老矣子少國家多難伯氏苟出而圖吾君申生受賜而死再拜稽首乃自縊其行如是其諡僅可為恭今太子之行反是可諡為節愍乎此又臣所未喻也昔漢武帝末年江充與太子有隙恐帝晏駕後為太子所誅會巫蠱事起充典理其事因此為姦遂至太子宮掘蠱得桐木以誣太子時武帝避暑甘泉宮獨皇后太子在太子不能自明納其少傅石德謀遂矯節斬充因敗逃匿非稱兵詣闕無逆謀於父然身死於湖不葬無諡至昭帝時有男子詣北闕自稱衞太子制使公卿識視至者莫敢發言京兆尹雋不疑後至叱從吏收縛之或曰是非未可知且安之不疑曰諸君何患於衞太子昔蒯聵出奔輒拒而不納春秋是之衞太子得罪先帝亡不即死今來自詣此罪人也遂送制獄天子聞而嘉之曰公卿大臣當用經術明於大義者及後太子孫立為天子是曰孝宣皇帝太子方獲禮葬而諡曰戾今節愍太子之行比之豈可同年而語其於陛下又猶子也而諡為節愍乎此又臣所未喻也昔項羽之臣丁公常將危漢高祖高祖謂之曰二賢豈相厄哉丁公乃止及高祖滅項氏遂戮丁公以徇曰使項王失天下者丁公也夫戮之大義至公也不私德之所以誡其後之事君者今節愍太子之為逆復非欲保護陛下其可褎諡乎此又臣所未喻也陛下天縱聖哲所任賢明以臣至愚寧可干議然臣又惟堯舜聖君也八凱五臣良佐也猶廣聽芻蕘之言者蓋為智者千慮或有一失愚者千慮或有一得也故曰狂夫之言聖人擇焉臣輒緣斯義敢以陳聞願得與議諡者對議於御前若臣言非也甘受謗聖政之罪赴鼎鑊之誅仍請申明義以示天下使臣輩愚惑者咸蒙氷釋則無復異議矣若所諡未當奈何施之聖朝垂之史冊使後代逆臣賊子因而引譬資以為辭是開悖亂之門豈示將來之法伏望改定其諡務合禮經其李多祚等罪請從宥免不謂為雪以順天下之心則盡善盡美矣臣聞王者制禮是曰規模規模之興實由師古師古之道必曰正名名之與實固當相副其在宗廟禮之大者豈可失哉禮祖有功而宗有德祖宗之廟百代不毀故殷太甲曰太宗太戊曰中宗武丁曰高宗周宗文王武王漢則文帝為太宗武帝為代宗其後代有稱宗者皆以方制海內德澤可宗列於昭穆期於不毀稱宗之義不亦大乎伏惟孝敬皇帝位止東宮未嘗南面聖道誠冠於儲副德教不被於寰瀛立廟稱宗恐未合禮况別起寢廟不入昭穆稽諸祀典何義稱宗而廟號義宗稱之萬代以臣庸識竊謂不可陛下率循典禮以闡大猷有司所議以致此失或虧盡善豈不惜哉望更詳議務合於禮臣聞諸易曰何以守位曰仁何以聚人曰財然則非財無以建國國之府庫非自殖財還資於人賦斂而制也人之貲產非自然生勞筋苦骨竭力而致也人所以甘於征賦者知用之不為私也資以散人人有何怨若乃用之或不節散之以非公既盡而厚斂則人不堪命鮮不怨叛矣歷觀有先有天下者未嘗不以薄賦斂省徭役而興焉征稅重人力殫而滅焉並詳諸載籍列為龜鏡然曩以邊烽驟驚戎幕薦興每應機須頗傾帑藏臣竊計即時庫物如此嘗用略支一歲殊恐不足而觀寺興工土木所料動至巨萬更空竭之必不支年矣頃年天下災損流行乏絕稍多申奏相繼每延聖念總令賑恤更加賦稅則人交不堪衣食靡供調斂安出儻邊烽尚警戎虜南牧軍資糧用將何以濟乎此臣所以深憂也今營觀寺者蓋謂修德以禳災也以臣寡聞稽諸史冊人君修德有異於是昔殷大戊時桑穀生朝七日大拱太戊問伊陟陟曰臣聞夭不勝德帝其修德太戊懼早朝宴退務撫百姓三年遠方重譯而至者六十國桑穀日枯殷道中興此豈造寺觀哉宋景公時熒惑守心公召子韋而問焉子韋曰其禍當君雖然可移於相公曰相所以與理國者也曰可移於人公曰人死寡人將誰為君乎曰可移於歲公曰歲饑人餓必死為人君而殺其人誰以我為君乎子韋曰君有至德之言三天必三賞君今夕星必徙舍君延二十一歲公曰子何知之對曰君有三善故有三賞星必三舍舍行七星星當一年君延年二十一矣果如子韋之言此由仁發於衷亦非造寺觀也且修德者謂躋萬姓於仁壽不徇私於一巳任忠直退諂諛省賦役也自陛下御極修之久矣何災不禳何祥不至而欲忽生靈之重命崇棟宇於空祠適足為憂何益聖德此臣竊為陛下不取也况道德之宗興乎元元皇帝其經曰聖人後其身而身先外其身而身存以其無私故能成其私此乃抱素守真薄以厚物輕稅節用清淨無為之旨也今欲困人弊國峻宇雕牆思竭輸飾窮壯麗以希至道其可得乎近古以來修黃老術者漢之文景豈造寺觀乎惟寡欲清心愛人省費而時康俗阜海內晏然此得之矣秦始皇規一身之樂忘神器之危銳意神仙將圖羽化此失之矣伏願陛下究道家之旨備不虞之機緩非急之作務實府庫以育黎甿則寶祚愈隆寰瀛永久矣臣伏見敕停金仙玉真兩觀以救農時可謂為得矣今仍使司市木仍舊又大修觀內所費不停國用將空何以克濟支度一失天下不安泰官耒陽縣令學者人之本也必資乎窮要道勵專心故假農以為喻將克已而攸箴筆力載耕既研精而不倦情田以耨將覃思而惟深懿茲善喻豐滋是務當勤勞而有獲豈滅裂而不固種德潛潤比土膏之勃興修業大成方雲稼之森布切磋討論將究其根孜孜而其功且倍矻矻而其教彌尊苟惰以自安則耒耜之用廢習而不輟則藨蓘之道存蘊經笥而煥乎既庶成行業而油然實繁且夫以茲訓語譬彼樹藝學者在清其本末農者在立其根柢庶存心而有補期竭力而無替顧三冬之足用且俟經時異四體之不勤而能望歲其道既敷其志不渝自微至著生有於無厥修乃來類京坻之可積不思則罔同水旱之是虞原夫匪獨化人聿兼為已寧徒取於披閱固可移於任使功成久習宋人之揠足傷事不兩全樊遲之學誠鄙稽其存於日省就此月將覩專專以開帙媲汲汲而築場勞而不怠焉奚必乎四之日祿在其中矣可期乎萬斯箱客有服膺糟粕惟善是樂恒慮失而不逮詎懷安而自若敢竊比於農夫懼見逢於搖落珦雍州藍田人第明經調鄠尉垂拱初拜右臺監察御史累擢戶部尚書賜爵河內郡公授太子賓客檢校詹事以老致仕開元三年卒年八十一贈亠兊州都督諡曰文建皇極者存乎正名體元命者存乎作程彼宗周之創業遂體制而緣情職名六官必先庚而著令歷分三統因建子而為正當是時也元律司候黃鍾紀月伊歲序之允初懿陽和之始發於是懸邦國之六典致象魏之兩闕俾萬人觀而取象罔敢逾越者也大矣哉示人有則布政惟時既當途而明矣亦浹日而斂之是則是效念茲在茲乃人君之大象諒王國之元龜是知象魏之章煥為故實分章授事典司非一或以理象為理人之規或以教象為教人之術觀之者仰而可見從之者貞而且吉俯黃道而高懸與蒼龍而迴出法之不朽雖草創於前王體有可傳亦恢張於是日國家以務人為本以施命為先拱北極之六星庶官咸備張南端之雙闕舊典常懸是知大聖君臨名臣不乏欽承帝道足以為法以之安人其國斯廣敢引此以為喻亦因茲而取象懸法魏闕其教可以普施懸法禮闈其人可以外獎夫然則青雲可期於影響崇敏高宗朝官戶部員外郎問易稱議獄書載恤刑人命所繫於茲為重然姬旦制三典之宜蕭何定九章之律漢文除肉刑之科孝景減笞箠之令互相沿革雖復不同志在明威終資慎罰今既道符太古德侔往初化越可封時當刑措專欲道德齊禮纔畫衣冠反樸還淳肌膚不慘復死隨時之義草艾不足懲其愆揆事立方赭墨無以防其偽歷代輕重捨用之規幸為陳之何者便俗對某聞天播四時資寒暑而成歲國持二柄慎賞罰而稱權然逖聽上皇異冠韡而知禁洎乎後葉迺黥刖以懲非故議獄緩刑著乎易象欽哉惟恤勒在虞書姬旦佐周量國政而為三典蕭何輔漢取秦法而定九章逮文景仁明幾稱刑措減笞箠之令除肉刑之科降及當塗至於典午或遞相輕重筆削異端雖變易隨時各殊塗而並駕禁邪助禮乃一揆而同歸我皇叡哲欽明丕承寶祚道高連陸績邁羲軒元德潛通神功侔於造化損已利物惠澤洽於含靈馭俗調風布春官之大禮明威止殺削秋荼之繁刑任皋陶以士師命定國為廷尉惟明克允人自不偷比屋有可封之人道路無赭衣之伍納黎元於仁壽反甿俗於淳和蕩蕩巍巍無德而稱矣五刑八議金科玉條沿革合其規模損益得其輕重較如畫一法無二門用化洽於時雍將行之而不犯循之為美改作非宜謹對宏敏顯慶元年官豫州刺史徙吳興遷右清道府率問昔在隋季厫庾空虛爰逮皇家京坻彌望既乘前弊年蓄未登自東徂西依常運漕今送納之所物賤本州欲齎直買輸利益兼倍對什一而稅布政之通規九稔為儲經國之成務倉廩實而知禮夷吾之論有徵金湯守而惟粟墨翟之言無守昔隋季凋殘厫庾並竭洎皇明纘籙黎獻咸熙並孝弟力田信可封於比屋家給人足實委餘而棲畝於是上直常平將備水旱下斂薄賦以蓄京坻故遠近諸州隨方輸轉陸輦車而接軫川漕引而連檣但六合時雍菽粟流而衍五錢標價水火埒其饒若政利從機惠美無費以送納之所物賤本州欲令齎直買輸不勞而益如愚管見竊未為宜何者任土稅田定差於不刊之籍配租納稅設條於惟行之令豈可取越公途苟從私益革送納之通式開買輸之權利者歟謹對升顯慶時人嗚乎琴兮鼓者人亡則留為虛器友之樂盡將顧而生悲妻莊氏字清卿明姿耀玉慧性旋珠垂髫而貞度山安待筓而麗辭泉涌蠶桑之暇癖嗜絲桐家有美材命工精斲音律既協性命相依年廿四歸余琴即為媵春花芬而奏薰風秋月皎而操流水寢食與並好合彌徵纔及十年遽罹娩難春秋卅有四惜哉一息靡憑豈謂九原可作七絃無恙誰禁五內併傷乃以服御之具閉置高閣瘞琴於山巔殉所自也唯埋軫弛絃希聲於太古濡翰勒石飲恨以千秋銘曰生不逢辰兮人物棄捐音徽不遠兮南山之巔銘幽表淑兮有待他年檢遺篋感深意福無靈人先棄勒貞珉還資施遂亮顯慶中官侍御史出為陵州刺史原夫皇王所以朝萬國制百靈清海外而舉天維宅寰中而恢地絡莫不揚七德以馭遐荒耀五兵而肅邊徼雖質文異軌步驟殊途揖讓之與干戈受終之與革命皆載勞神武未戢佳兵是知凶水挻妖九嬰遂戮洞庭搆逆三苗已誅若乃式鑒千齡緬惟萬古當塗代漢典午承曹至於任重鑿門禮崇推轂馬伏波則鑄銅交阯竇車騎則勒石燕然竟不能覆鯷海之奔鯨絕狼山之封豕况邱樹磨滅聲塵寂寥圓鼎不傳方書莫紀蠢茲卉服竊命島洲襟帶九夷懸隔萬里恃斯險阨敢亂天常東伐親鄰近違明詔北連逆豎遠應梟聲况外棄直臣內信祅婦刑罰所及唯在忠良寵任所加必先諂倖摽梅結怨杼軸銜悲我皇體二居尊通三表極珠衡毓慶日角騰輝輯五瑞而朝百神妙萬物而乘六辯正天柱於西北迴地紐於東南若夫席龍圖褎鳳紀懸金鏡齊玉燭拔窮鱗於涸轍拯危卵於傾巢哀此遺甿憤斯兇醜未親弔伐先命元戎使持節神邱嵎夷馬韓熊津闕一字一十四道大總管左武衞大將軍上柱國邢國公蘇定方謺遠構於曾城派長瀾於委水叶英圖於武帳標秀氣於文昌架李霍而不追俯彭韓而高視趙雲一身之膽勇冠三軍關羽萬人之敵聲雄百代捐軀殉國之志冒流鏑而逾堅輕生重義之闕四字而難闕一字心懸水鏡鬼神無以蔽其形質過松筠風霜不能改其色至於闕三字撫邊夷慎四知去三惑顧氷泉以表潔闕一字霜柏以凝貞不言而合詩書不行而闕三字將白雲而共爽與青松而競闕一字遠闕三字咸有慚德副大總管冠軍大將軍闕三字衞將軍上柱國下博公劉伯英上闕八字廊廟之材闕一字將相之器言為物範行成士則詞溫布帛氣馥芝蘭績著旂常調諧律呂重平生闕三字輕尺璧於寸陰破鬼之勳常闕一字不足平闕一字之策闕一字未涉言副大總管使持節隴州諸軍事隴州刺史上柱國安夷公闕六字舉雄圖闕一字六藝通三略闕八字能令魏軍止渴無勞闕八字副大總管左領軍將軍金闕四字溫雅器識沈毅無小人之細行有君子之高風武既止戈文亦柔遠行軍長史中書舍人闕二字儀雲翹吐秀日鏡揚輝風偃搢紳道光雅俗鑒清許郭望重荀裴辯箭騰闕二字九流於學海詞闕一字發穎掩七澤於文闕二字太傅之深謀未堪捧轡杜鎮南之遠略猶可扶輪闕二字鳳池或清鯨壑邢國公運祕鑒總驍雄陰羽開偃月之圖陽文含曉星之氣龍韜豹鈐必表於情源元女黃公咸會於神用况乎稽天蟻聚闕一字地蜂飛類短狐之含沙似長蛇之吐霧連營則豺狼滿道結陣則梟獍彌山以此兇徒守斯窮險不知懸縷將絕墜之以千鈞累碁先危壓之以九鼎于時秋草衰而寒山淨涼飊舉而殺氣嚴逸足與流電爭飛謺鼓共奔雷競震命豐隆而後殿控列以前驅沴氣祅氛掃之以戈㦸崇墉峻堞碎之以衝闕一字監闕一字軍總管右屯衞郎將上柱國祝闕二字右一軍總管使持節淄州刺史上柱國闕一字元嗣地處關河材包文武挾山西之壯氣乘冀北之浮雲呼吸則江海停波嘯咤則風雷絕響嵎夷道副總管右武衞中郎將上柱國曹繼叔久預經綸備嘗艱險異廉頗之強飯同充國之老臣行軍長史岐州司馬杜爽質耀璿峯芳流桂畹追風籋電騁逸轡於西海排雲擊水搏勁翮於南溟驥足既申鳳池可奪右一軍總管宣威將軍行左驍衞郎將上柱國劉仁願資孝為忠自家刑國早聞周孔之教晚習孫吳之書既負英勇之材仍兼文吏之闕一字邢國公奉緣聖旨委以班條闕二字金如粟而不窺馬如羊而不顧右武衞中郎將金良圖左一軍總管使持節沂州刺史上柱國馬闕六字之闕七字之闕七字郡闕一字良邢國公闕一字奉神闕二字專節度或發揚蹈厲或後勁前鋒出天入地之奇千變萬化闕四字之闕一字電發風行闕四字英聲載路邢國公闕五字甚投醪逆命者則肅之以秋霜歸順者則潤之以春露一舉而平九闕三字而掃三韓闕二字元之闕二字則千城仰德發闕二字之飛箭則萬里銜恩闕六字及太子隆闕二字王餘孝一十三人幷大首領大佐闕七字成以下七百餘人既入重闈並就擒獲闕四字載以牛車闕薦司勳式獻清廟仍變斯獷俗令沐宏猷露冕褰闕一字先闕三字烹鮮製錦必選賢良庶使剖符績邁於龔黃闕三字高於卓魯凡置五都督卅七州三百五十縣戶廿四萬口六百廾萬各齊編戶咸變夷風大書闕一字觀闕三字所以旌其善勒辭鼎銘景鐘所以表其功闕一字州長史判兵曹賀遂亮濫以庸材謬司文翰學闕三字氣闕一字風雲職號將軍願與廉頗之列官稱博士猶闕一字賈闕一字之衡不以衰容猶闕四字戈闕十字九闕十二字乃闕十八字桑田同天闕一字永久闕三字島與日月長懸其銘曰悠悠遂古闕九字化權輿闕五字飲闕一字居以以闕一字或畋或漁闕九字及闕二字代非一主揖讓唐虞革命湯武闕五字均九土屢擾干戈式闕三字未闕一字西闕六字我聖皇德叶穹蒼闕二字千古闕六字遠徼遐哉大荒咸受正朔闕三字疆闕六字三光叛族障國憑淩水鄉天降飛將豹闕一字龍驤弓彎月影劍動星芒貔貅百萬電舉風揚闕七字桑氷銷夏日葉碎秋霜赳赳武夫明明號令闕二字廟闕二字齊軍政風嚴草衰日闕二字淨霜戈闕十三字勁巨闕一字授首逋誅請命闕四字邊隅闕二字嘉樹不翦闕二十字刊闕三字用紀殊功拒闕三字永固回地軸以無闕一字敬一永徽時人大像主王師德成伏德夏侯雅沈端沈士公賈達張則劉客僧許士政封遐張苟子徐甑朱懷成難陁劉倫劉君闕一字賈奴奴程徹張徹張桂張表毛天生張端王愛竊聞無上慈尊隨緣演教廣開方便汲引㣥迷故知極彼浮泡救斯沈溺若不示跡現容凡生何以歸仰爰暨夢靈西照象法東流或斲玉摸形或刻檀為質今有洛陽鄉望父老等卅人並修因往刦生在太平思念大聖無由得覩遂謹於此堪敬造尊儀因山之固鐫瑩真容藉此莊嚴同希浮境庶使城空芥盡福智常流刦石衣銷法輪常轉不因刻勒何以紀功冀盛德長存芳徽永著其上資皇家下沾靈識詞曰闕一字理幽元真趣無形相有分別事闕一字化城鄉中高士邑里達人心樂三寶情捐六塵優遊智岸蓯蓉法津愛闕一字斯錮闕二字方新成福永徽時人州城俯臨江水先是江皋磽确崎嶇不平展拓無地置州築城東西南北縱橫纔百餘步城內惟有倉庫刺史宅曹司官宇自司馬以下及百姓並沿江居住城內更無營立之所每至夏中江水泛漲浸沒年別修理夫役極多補整之間實大勞敝欲求移轉更無去處今歲夏水又湮江岸崩頹道路斷絕附郭雉山縣置在州東更甚卑下曾經大水漂失蓋藏屋被浸沒一州管三萬餘戶置州西界州西惟有四鄉其桐廬等縣並在州東水陸兩途二三百里江山險阻已極艱虞加之夏雨暴至進退不能前有待死桐廬縣令先後三人皆為赴任上州並遭沒溺言之可痛聞者傷心是以建德等三縣在州東者官人百姓並請移州就建德道里稍平輸納租庸沿江甚易空船歸棹遲亦無妨其建德地形高爽當三江之口五縣之中近歲以來不曾遭水若許移州治並移雉山縣入州舊城亦得牢固既益公私不敢隱蔽龍朔朝官司宰寺丞竊以釋門垂範義在沖虛道家立言理歸損挹豈自矜尚然後為高事如祕閱局議中彈若乃君臣父子之儀尊卑貴賤之序與夫儒教分路同趨但緇服黃冠未通正法真言淨戒莫能堅受惟憑衣鉢以自尊崇彈曰經稱袈裟者諸佛幢相又言同于佛塔鉢盂應法之器自古諸佛皆用此器故十輪經云象王見獵師著袈裟敬故自拔其牙與此獵師又四分律云大律娑伽陁伏毒龍置於鉢中是知應器法衣其功不小法服之貴何事深疑且負版冕衣仲尼猶敬矧茲器服而不尊乎謙撝之道既虧熏修之行彌失然則尊嚴之極本屬君親資敬所歸道俗何別上動皇鑒下擇蒭詞改而更張請遵拜議謹議
