front:
  text: 全唐文欽定全唐文卷二百湊字彥宗京兆萬年人永淳二年解褐婺州參軍六遷司農少卿加銀青光祿大夫開元時遷右衞大將軍封彭城郡公拜太原尹兼節度支度營田大使卒年六十五贈幽州都督諡曰文
  hash: sha256:12f54eee04631630eca5de54d66051a06de459016c5b670b6d33b235dac28f3a
