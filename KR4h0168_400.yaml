front:
  text: 全唐文欽定全唐文卷四百同德開元時擢書判拔萃科
  hash: sha256:fe2b5f1ca8f3d77be075d327d4b3e022ac8b561186accf649e675e75cf9d08eb
  markers:
  - {type: head, offset: 11, content: 武同德, id: KR4h0168_NFKB_400-h1, level: 1}
body:
  text: 禮經三百列爵五等食菜地以居榮封茅土以建號代不絶祀人其捨諸乙以孫謀瞻言祖德精意以享展如在之儀利用建侯思不復之始詢諸家祭酌彼周官薦羞之容無聞於肥腯不毛之事有異於粢盛且物貴緣情猶言禮不下庶而乙非妄作何妨儉而合禮既能師古奚事驚愚所司告言頗為漏略大易自宜窒訟春秋寧待有詞物生有象象而後數洎夫化原孰得其始惟此甲也算莫善焉乃窮日者之言纍盡唐生之術不測謂神推陰陽之度數暖能變谷知律呂之短長想彼娶妻寧因匪斧之克興言生子備見弄璋之慶與物相召誰其忽諸人告為妖一何誣也之翰開元時擢書判拔萃科封植之規盛自三代享祭之設編諸五禮故存欲其貴梁竦發勞人之言沒憂其祀若敖興餒而之歎乙祖幸攀日月視列山川堂構不貽於謀孫廟食遂虧於厥祖乃云可薦孰致其嚴洪業不享其牲牷明懷誰歆其黍稷所司重從周之訓糾以常刑愚者昧反魯之言尚多紛訟彼不愛禮奚能舍諸須置恆辜雅符通議甲道窮靈府藝盡數原探鄒衍之幽谷總洛閎之妙術洞律呂相生之算尚陰陽更配之理推計必究其精微變育乃均乎造化言其孕子如逢蘭夢之徵語以好仇似叶楊生之慶且智殫風律尚有革於京生況妙極元穹豈無知於鄧道稽之自古尚不為妖察之於今如何結罪告者無理咸從配之嚴開元時擢書判拔萃科廟者曰貌則事之若生鬼之言歸則敬而莫黷考孔子之要道將入必問覽周文之繫象輿尸且凶鄭太久挹家聲素高門閥自宣王之母弟承后稷之神人讀司農之經榮分爾族聽尚書之履代著其名爵賞不泯錫承家而開國垣廟而立寵貽孫而及祖禍鍾斯兆哀慕何追父已喪親緦亦從嫡奠延無主孫也哭曾自宜別外內之嫌分吉凶之敬謁廟以輿尸見責寧合禮經告人以狂怪見尤豈諧典則太從笞罰有蔭須寬於贖刑告者任還無識不勞於反坐智明開元時擢書判拔萃科聖人返古之道崇尚雅樂笙鏞鏘洋絲竹宴衍后夔節響子野垂聽文侯睹而存魏仲尼悅而留齊故列其樂司班以胄子九變至妙五年成聲奏之方澤地祇升登之圜丘天神降師則獲考所由奚疑童蒙之求可以漸進功不聞教胡用抑為格令無文謂宜憑據王者制田庶人計畝徵孟子之説徹故難移讀公羊之書禁皆不可然則食土之子與執圭之人按籍既有常法加田固宜不稅此乃行古之道誠非近今之宜甲之所執或未為允隨侯開元時人有西域之奇獸顯嘉名於古今因匠石之著象非虞羅之所擒若乃良牧見悅觀者同欽以可重而作鎮將制猛以示心仁而能馴似悅君子之德獸用不擾無假虞人之針爾其拂拭為容剖斫成質臨玉簟而雙麗向雕楹而對出形勢雄壯似生入戶之風浮彩輕明欲奪臨軒之日用之則進舍之則藏信賢智之堪擬豈飛走之可當幸茲為玩設彼華堂視之者震來虩虩對之者容自鏘鏘俯以琉璃之砌安以玳瑁之牀芳座豔綺羅之色錦衣染蘭麝之香光耀銅武彩映銀章威懾百城褰帷見之而增懼坐鎮千里伏猛無勞於武張有足不攫若知其豢擾有齒不噬更表於循良豈比夫昔者作貢從來於遠幸蒙處之羅薦氶榮靡倦一為席上之珍幾對高堂之宴棄置為從於取舍光價幸生乎顧盼觀乎府庭之內莫之為最其情也無欲於中其質也見神於外既狎人之不恐亦與物而何害願承翦拂之恩長表衣冠之會壯哉太華兮為金方之鎮削成四面壁立千仞勢厄河關兮橫地以傑出氣雄宇宙兮極天而增峻疏鑿則禹封崇則舜歷選列辟咸五載而一巡於昭有唐曷不登以肆覲我聖君之開元一十八載威靈限乎無外至德與日月齊明寶位與乾坤比大鴻澤洋溢湛恩滂沛萬國同於文軌百蠻襲於冠帶河海清夷風雲昭泰鬼神奔走而奉職玉帛梯航而入會蕩蕩乎巍巍乎誠聖人之神用也美不可得而稱載至若祖武宗文之業觀風問俗之勤舉由禮兮動為仁禔百福兮延㣥神無文之典咸秩中和之政惟醇邦國之鴻徽克播帝王之盛事畢陳若乃詩書禮義之府禮樂典章之則設金馬石渠之署修成均崇文之職坐公卿以論道養更老而崇德詢善而當寧委裘禮賢而日旰忘食振木鐸而施令正銅儀而御極歌舞盡盛德之容聲明彰具物之飾此聖人之文教也先王剡木為矢弦木為弧所以修戎器戒不虞於是簡車徒誓將帥百官象物而動軍政不戒而備重之以三令五申示之以戎昭果毅正卒伍駢部位鵝鸛魚麗兮鴈行鱗次鳴笳謺鼓兮隱天動地自朝及野兮千乘萬騎谷轉山移兮天旋雲被赫赫震震耀武中原兮將除害以興利因農隙而講武事羌夷覩之以奪魄蠻狄間之以挫氣雖商湯有景亳之命方此以知慙周成有岐陽之搜比茲而多愧然後班師旅行慶賜穆穆煌煌焉舍爵策勳而飲至此聖人之武功也太原啓聖誕受駿命傳萬代兮本枝盛上黨興王休有烈光應大橫兮天業昌漢高不忘於豐沛光武本起於南陽故踰孟門越太行鏟危磴夷高岡馬無泛駕兮鑾佩鏘鏘車靡摧輪兮和鈴鉠鉠紛曶霍以電邁震隱轔以軍坌入乎舊宮之皇皇思祖宗之艱難詠潛龍於沂康出德教兮修國章問老病兮勸農桑豈徒率子弟以佐酒歌大風而還鄉此聖人之巡狩也古者為高必因邱陵為下必因川澤去舂陵之天邸望臺駘之星陌黃軒訪道乃逍遙於廣成丹陵出遊還悵望於姑射踐唐人之舊壤遵漢家之餘迹祠后土於汾陰盛禮容於瑤席既而泰折啓方壇闢有潔在盛有牲在滌奏咸池兮羅金石欽瘞繒兮埋玉璧幽髣佛兮地祇格電輝輝兮神光赫時展豫兮㣥瑞臻紛景福兮隨吾君黃龍降兮應景運寶鼎見兮寫龍文整樓船兮濟橫汾縱歡樂兮歌白雲此聖人之報地也禮行於郊百神受職焉禮行於社百貨可極焉既即陰以報地遂就陽而禮天因吉土歷廣廛跨周服掩秦田萬乘星陳出直城之郊外八方雲會就京兆之天邊騎雜沓車駢闐赫赫奕奕而燭川以屆乎圜丘之前於是牲用特酒尚元樂以雲門是重禮以蒼玉為先推高祖以作配五精率而來旋達上下合腥膻設柴燎致高煙上帝降監兮享明德子子孫孫兮萬億年此聖人之禮天也王者受命必升中以因名山告成功而紀厥美四時以春方首事五嶽以岱宗為始無懷以降七十有餘管仲所詳十二而已我皇承先王正統繼列聖遐軌幽明協同靈物蕃祉故天不愛其寶地不愛其珍卿雲爛漫而動色醴泉湧溢而流津莫赤匪狐九尾而自擾莫黑匪烏三趾而來馴况復西鶼比翼東鰈呈鱗秬黍生於鄗沚苞茅出於江濱一莖九穗之禾備粢盛而競發雙骼共抵之獸供犧牲而自臻可不謂然乎我皇雖以地平天清時和歲貞欲行封禪之事猶執謙撝之情則有冠冕列辟搢紳諸生互陳嘉頌爭獻懇誠候屬車之塵者率土皆是請闕庭之下者靡日不盈於是備法駕順卜征襲時服肅天行河洛之人尚觀於後乘鄒魯之地已識其前旌水湛千年之色山呼萬歲之聲常龍之峯帝鄉之白雲遙接金雞之岫長安之曉日再明所以登封降禪所以騰鴻飛英既刻石以頌美亦泥金而告成信四三皇而六五帝曾何周漢之足名然後審度量正權衡咨嶽牧問黎氓人荷復除之惠家蒙牛酒之榮此聖人之東封也宗廟所以本仁祭祀所以尊祖馨香寧止於黍稷備物必該於水土故醴盞在堂粢醍在戶歌采茨肆夏之節奏文始五行之舞有來斯雍助我明主祝嘏祠説豈云虛取宜其時和人豐而神降之祐也故所以靈芝秀祥飇興月毳下膏露凝奉先帝而追孝遂加敬於園陵此聖人之致孝也倬彼靈嶽傑出秦畿豁為巨防壯我皇威雖國家盛德之無限固先王設險而可依雄天府以岌岌符聖壽而巍巍萬物生華稟少陰之精粹五星分緯融太白之光輝俯壓黃壤上干翠微况靈異之所蓄乃神仙之所歸實五鎮之為首諒㣥山之所稀且夫西嶽之為鎮也大焉西方之為義也多矣其色也白白為五色之質其音也商商為五音之紀其味也辛辛為五味之和其行也金金為五行之始帝則少皞居神位則蓐收在祀歲時有揫斂之功王褱寶多金石之美然所以能協我大君之明命永作固而配天高峙也徒觀其交錯糾紛之勢盤礡峻秀之形巖崿巘嶬停停熒熒紛刻峭其若削洞峆岈以杳冥樹色凝黛天光結青暗谷山孝嵺而藏胚渾之氣幽巖晱暘而化神仙之靈中融寒暑下聞雷霆南澗載陽而北澗停雪西峯見日而東峯見星偉哉靈造上峩穹昊憑之者永安陟之者難老謺嶂重巒互稠沓千巖萬壑相縈抱其虛谷也數行發地緣茂松其峻壁也百仞懸崖不生草夫崑閬峙於方外蓬瀛傑於海島皆元聖之所遊非化人之可保豈若茲嶽俯臨京鎬上有明星玉女峯下有長安洛陽道作鎮并崇於雍豫靈祠化傳於灑掃雖則祀典遠更於百王都未若祚我唐之壽考矣然則神其聰明正直而一既德則斯輔知信不可失往歲垂天文運宸筆勒苕琬崇望秩云待余安民治國然後徐思其事懿夫俗阜時康今也正惟其日故可揚鴻徽而騰茂實奚不指河潼而嚴警蹕也又欲大康兆人兮嶽翼化淳四海兮嶽布有沖和無疵癘兮嶽獎定禮樂諧神人兮嶽聽今萬邦胥悅四海肅清禮交樂舉人和政平豈猶茲嶽之所致實維我后之明明又曰斯嶽降神生此多士則庶績咸若百工允釐河東地近領袖既得乎裴公上神人帷幄復歸於張氏况業固磐石城維宗子以為肺腑之親更任股肱之理惟邦是翰諒在乎此生甫及申豈惟於彼况乎聖德幽運通天至精山靈附化而開石磎路非人而自成舊日隘途將帝道而俱泰從來絶險與太階而共平非我后至聖之所感豈能使造化之力再呈至乃紫闕東臨黃河北注嘉氣通於郊野休光被於草樹桃林之野佇天馬而來遊蓮花之峯翼華蓋而高度昔禹禪吳會穆幸崑邱既江山勞止徒轍迹空留豈如是嶽不遠皇州何云歲時展狩信亦朝夕可遊今左馮郡縣萬方黎獻僉曰吾王不遊吾何以休吾王不豫吾何以助咸傾想於班瑞之辰屬望幸於肆朝之處國家頻成大禮天下大和豐穰歲積符瑞日多聖人雖欲行謙光遜讓之禮其如天意人欲何其如鬼神符命何誠可備西封之盛儀採東巡之舊制順三秋之仲月升二華而展祭巨靈贔屭願高掌以扶輪仙廟虛佇欲睟容而警衛尋可封十狀之美盡遙陟七梯之勢命茲毛女執左纛而先驅策彼茅龍隨六馬而高逝坐金機於雲表題玉册於巖際象榻與瑤壇共華石鼓將天聲俱厲如是則鴻猷振於萬古盛烈光於千帝然後臨大河而沈璧更秩於百靈眷東洛以回鑾永延於億歲已而歸格藝祖道洽華胥更崇太室之事復率東岱之初遂就恆山而展禮望衡嶠而移車聖主功成永穆羲皇之化小臣多幸敢獻登封之書押一作狎開元時擢書判拔萃科學貴博通九流異軫書稱祕奧四微攸藏必溫故而知新方不朽而致遠丁服勤罔倦考古斯多精孔甲之書方求筮仕獲鄭莊之薦終聞推轂登朝有譽常懷報德之心司敗在官遂致無私之罰此乃韓厥之舉郤詵其人旌國史而無慙訪朝英而罕輩彼或止者何其小哉請息挽弓之言以錫來車之寶能興雲雨山川有咸秩之文以懸日月祭祀為不刊之典必考前志是謂禮經或忘甲令寧因官守惟彼恆山鎮茲魏國有虞巡狩玉瑞班乎冀州無恤登臨寶符并於代郡準天之極括地之維先王是崇上公攸視四時有禮圭璧或聞其瘞埋百代常行牲牢不忘於刲割所司有事故實無稽沈既殊乎大川辜亦非乎小祀山川反覆禮物徒施職業廢隳刑章安捨惠文直指始迹事而平彈尸祝無能遽繁詞而直對不有丕蔽何懲曠官楚瓊開元時擢書判拔萃科五材並用水德靈長八卦裁成坎宮流潤銀河有漂查之浪金堤苦懸釜之憂漢書以溝洫興謠史記乃河渠發詠疏導得理編氓以寧眷彼諸州是稱修葺隄堰縱橫瓠子須切黎人阻飢匏瓜莫食遠由蘭署庶救梅林何高見之不同而平價之無給夫則非人莫可人則非食罔存數日暫勞猶宜不許纍旬重役焉可闕如官供尚且云無私備奚能取濟况國家無事主是唐堯河內有倉吏非汲黯但使準格興役何必申省拘文公課自有常程令式寧無舊例免徭請價蒙竊惑焉縝開元時擢進士第首四時曰春貞百度曰聖復其度必聖之元定其時惟春之孟太史先謁以明在木之文上公奉儀乃讀行春之令故漢王修之以展禮晉后奉之以施敬伊歷載之或虧洎我唐之斯盛若夫太昊統節勾芒御辰歷以元而天地更始氣直震而物候惟新皇上乃順時令序彞倫載青旗之容與服蒼玉之璘玢辨色而金貂列位迎春而玉輅回輪爰奉令以進讀遂授時而發春俯僂前止精誠上陳曉色分於丹陛韶華發於紫宸遂煥爵以頒秩乃布德而昭仁則知臣職不愆國典靡闕修陽事而考陰令祀朝日而享夕月陳而未讀千門之寒氣猶飛捧而既宣九有之春輝已發覽讀斯竟慶賜乃行緩政刑於肅殺遂性命於生榮習習和風扇萬物而條暢遲遲麗景照八極之文明陳盛禮於元辰酌宏謀於往舊祀為國本燔柴斯用乎上辛食惟政先祈穀必當於太蔟莫不汨之則斯禍敘之則斯祐所以敕上公之恆典俾疇人之敬授穆穆祕殿明明我皇體乾道以從事閲春令而頒方可謂君奉時而罔失臣出言而有章時歷克正憲度克揚既同文於戎貊亦暨教於要荒諒皇家之宏務將永世而觀光登開元時官中書舍人天子卜惟洛食受於河圖開上陽之別館取大壯之規模爾其則以三象當乎四術沓雲構而承天擎露盤而洗日俯馳道而將半臨御溝而對出疑海上之仙家似河邊之織室昔者嚮明南面十月遊巡既其避暑亦以迎春鏤章霞布環衛星陳集諸侯則朝乎萬國張廣樂則和乎千人得橫汾於即事將燕鎬而為鄰既而大駕斯去華宮不御閉玉戶而藏春掩金臺而罷曙見芳草之空積看桂花之獨著人多望幸之誠地惜離宮之處別有洛陽下客東魯餘風辭官北部對問南宮賦甘泉於此日希客薦於揚雄聖人在位體天法地示人以五行應天以五事修其貌也時雨若正其言也時暘至彼氣象之或乖將反身而可致皇哉我君元德敷聞御極而三才交正乘時而四序平分十有六年以至今載旬有一雨不愆乎晦所謂元化之功行於太平之代粵在春餘而乘夏初或土官以位或火正其居土勝於水午衝於子陽景且曜陰風莫起當天數之適然非歲行之常紀惟帝念茲聞諸有司莫獻舞雩之請或陳齋社之期省而不録云奪農時直以萬乘之貴躬親三日之祠王言既出聖心惟一天昭厥誠神降之吉霈然為雨不俟終日明明聖后知微知彰迪彼炎暑化為清涼恐二氣之相迫於兆人而不臧以身作戒因物考祥當是時也收其威而雷不敢作隱其耀而電不能爍昭其令而風不憒憤布其和而氣不交錯徒以元默為貞清明惟神簡服用興德仁如此者上獨感其雲行下獨成其雨施六合雖廣一朝畢被其始至也亂希微霧雜煙霏其少進也湛覃凌厲泉飛飇逝驚碎滴於瑤池噴懸流於錦砌傳聲竹樹之末濯色菱荷之際乘日月而此多仰年豐而可計帝乃罷薰風之絃奏其雨之篇歸功於大造致美於皇天詞因喜降義以情傳是禮也且高於商武斯文也復掩於周宣非聖德之兼濟何以臻於此焉巍乎聖主謙以自輔慮其率土猶稱疾苦申命文武更求多祜又吹之以軒后大風又沐之以殷宗霖雨潤再洽兮恩重溥自朝廷兮至草莽鑠皇篇兮熙帝譜於胥德兮振萬古則以三壤均乎九賦或愆歲計之期必降時宜之典荊河惟豫芋區在蜀往有菜蔬之色獲充藜藿之資采葑以菲且存下體如葵非智斯無衛足既而吏作輕稅人因薄言雖稱漢代有文頗異堯年作法且所緣歲損合豫申陳六條初不上言百姓無從下免任從收稅豈謂合宜立嫡以長不惟其賢或有時而捨兄則因次而謀弟惟甲克紹先烈啓迪後生有高陽之才聚太邱之德聿求門子聽是廟謀螽斯其繩雖有衆多之義雁行以列然乖長幼之序義則非據人斯見尤必欲搆之以神何如節之以禮况楚君遺法殷家舊制人實不等代亦頗殊縱為疑義益彰違越罪之僭失在甲宜以準科懲之後先其男請從改正朝隱曲阜人開元時擢進士第室勿自索凶其罕除因憑神之道戒夭厲之災所以職在夏官事殷元月煥其金目紛若侲童是知阼階之儀用符堂贈之禮况夫時方代序推蓂砌而已殘物有札瘥在桃符而何闕載紊舊典合置彞條天生小人以事君子各徇所守式恭爾位恪勤或懈法罰必施居官之恆雖細不宥既署名於小吏則委質於功曹持劍為儀執炬行夜乙誠微品猥搆無良徒效激節慕奇不知安卑守道遂使披蓮寶鍔向春樹而棄捐爇桂華焰委宵途而撲滅執御洋洋不爽伊善為士諤諤果貽其傷空思強梁罪欲何逭食以為天農固其本幾缺有秋之稔徒有望歲之憂睇彼荊河實惟菜色豐祥不聞於鳴雀徇急頗見於蹲鴟地雖化於岐山豈臻豐富人已歌於翟氏詎得徵收百姓有詞理固難奪咸開元時擢書判拔萃科天子建國諸侯立家率由舊章克備恆典列昭穆以有序承繼嗣而逌著粵惟彼甲若昔大猷無忝乃先懋昭有訓同乎班氏思欲敘其家聲類夫韋孟將以傳其祖德雖圭璋克荷而嫡庶尨戎載懷捧翟之倫猶疑幹蠱之嗣協比長幼陰步馬廟祧庶降祉以象賢憑靈貺以立德同其楚國先棄疾之當璧方彼衛人乃祁子而順兆神所命也則嘗聞之龜有知焉實在茲矣或非無藝甲擇有孚欲置於理誰謂其可郊開元時擢書判拔萃科行已以恭執事在敬同人攸往於野則亨苟踐禮而不踰必遊目而從睹瞻言解式惟是長年道契三人方擬同心之利名參百行亦專好德之寵行邁云靡邱陵是升覽雲物於五方壯山河於千里不從吾視奚率爾虞事類武侯且未屈於吳起義同文子仍不徵於叔向禮經有紊檟楚收威實長者之訓恭何薄言之速訟淫刑以逞外臺於是觸藩寬政荐敷仙省準一作宜其射隼璆開元時擢書判拔萃科法均賦斂州訴恐年飢無以給貸且使司法例不平不伏處斷宇宙為家實惟天府疆理為畝成賦中邦而九州同風萬國共貫莫不開廬井而平賦稅準沃塉以明勞逸則人狎於野穡而成功是以晉置爰田既易種於差美周任稍地復出布於不毛相彼萊田是稱餘地舊不應稅今則有徵事將利國法焉循古雖紛若人訟而略陳地宜何者彼田若焚剃草溝塍相錯稼穡屢登亦可據畝數以均收隨上下而加減必孟春月陳新未即事不應而可坐處非法而奚疑况州阻飢饉薄言給貸倣均地之法事舉其中軫憂人之道斂從其薄勸農便國待子而行即置徽纆未為允當紐金曳組賢不兼利決水窒陂權曷由已伊甲開氓洗務無聞史起之功鳩藪牧皋習為翟進之理俾初汪萬頃隱長天而不見載翔千仞下高風而有言評其放紛涸將必復而草木震色猶失其潤况舄鹵偏溉孰不思肥寄黃鵠而遺音食蹲鴟而猶美且受羹含菽利不天來委畝宿糧事資陂漲今奪衆水不及私恩是曰殘人何以富俗更收威也能無辭乎與其秉權以求利曷若乘祿以自馭請遏其清畎之流罔愆我宜鱗之所
