front:
  text: 全唐文欽定全唐文卷五百九十柳宗元二十二
  hash: sha256:9245af8d3fa2980fbdf1800e36f6768a45324b2d8ec4beec44ae4da7d7d727fc
body:
  text: 惟貞元十二年龍集景子三月日前萬年縣丞柳君終於長安升平里之私第享年五十長子宏禮承家當位次曰傳禮幼曰好禮奉夫人洎仲父之命考時定制動合古道三日而殯三月而葬粵五月十九日甲子克開長安縣高陽原祔於先塋禮也先時撰辰酌禮稱義備物外姻畢至宗人來會從弟宗元受族屬之教泣涕濡翰書辭紀行曰君諱元方字某解人也系自周魯後得柳姓七代祖虬後魏中書令封美陽公四葉至皇考惇皇朝散大夫資陽令祖延州司馬考頤宣州寧國丞濟德克紹厥類藏聰晦明粹為淑和少孤季父建撫字訓道通左氏春秋貫歷代史旨畫羅列接在視聽嗜為文章辭富理精以門廕出身調補宣州溧水尉網簿貢職入於天府特授同州馮翊尉改京兆府雲陽主簿轉長安主簿遷萬年丞端靖守貞處劇不撓秩滿居養素食貧常好竺乾之道自搌塵昏之外泊如也既而嬰被沈疾不克永壽姻戚動懷朋友道傷僉曰天之報施善人何如哉君前娶河南獨孤氏左司郎中緬之女無子早世繼室以裴夫人諫議大夫虬之女陰教內則著於閨闈有女三人焉嗚呼銘誌之來古矣是不可闕遂勒元石措於陰堂銘曰振振吾宗德之宅耶惟君之德至期頤耶德而不壽今既厄耶松柏蒼耶不朽石耶段處士宏古讀縱橫書剛峭少合尤濩落不事產人或交之度非義輒去以故年五十不就祿常以法家言抵御史大夫何士幹延以上座將用之會士幹死聞襄陽節度使于頔愛人大言遂干以兵畫一見喜甚居月餘視頔終不可與立功又遁去隴西李景儉東平呂溫高氣節尚道義聞其名求見大懽畱門下或一歲或半歲與言不知日出溫卒景儉逐前右拾遺張宿與然諾南見中山劉禹錫河東柳宗元二人者言於御史中丞崔公公時降治永州知其信賢徼其去又南抵好義容州扶風竇㣥途過桂林守舊知君拒不為禮君憤怒發病不肯治曰平生見大人未嘗相下今窮於此年加老接接無所容入也益困於俗笑吾安用生為埋道邊耳居六月死逆旅中崔公為出涕命特贈賻致其喪來永州哭為祭之與喪具道里費歸葬澧州安鄉縣黃山南麓上君之死元和九年八月十六日後某月日葬祖某官父某官妻彭城劉氏子知微知章皆未冠銘曰廉不貪直不倚困者安之通者不以不懲其躓卒以亢死觀游非類有賤非鄙何以葬之黃山南趾柳氏子某為平陸丞王父母之喪寓於外貞元二十一年始葬於虢之閿鄉窆墨遇食乃貽書其族尚書禮部員外郎宗元使為其誌且曰吾之先自魏已來為宰相者累世我高祖諱萬齒為伊闕令襲其先河間郡公曾祖諱某浙州刺史咸有懿德洎於兵曹府君諱某勤身惠志好義能讓而同故交者固直而敬故親者睦凡舉明經者四皆獲美仕初為陸渾主簿次吳縣尉次上黨丞次潞州兵曹參軍其勾稽摘發毗贊關決無不勝職加朝散大夫某年月日終於官次殯於州若干里會世多難家又貧窶故不及夫事嗚呼我曾祖王父葬於潁陽我伯祖叔祖洎伯父皆葬閿鄉皇天原望壽里潁陽北臨間其地陰狹岸又數壞大懼不克久安神居是以從他兆於茲卜用七月六日甲子將以具於元堂之下固故有望乎爾也於是刪其書為文置於郵中俾移於石上毛氏夫人父曰儀禹豐州別駕祖宏義濟州戶曹夫人歸譚氏曰損為鄧州司倉參軍損父昌為常州錄事參軍祖曰元愛為左羽林大將軍宏農男惟譚洎毛氏於周咸為諸侯譚入於莒毛及魏為后族千歲復合夫人生丈夫子曰隨隨謹愿好禮始克於裴柳為姻隨娶裴氏今中書舍人次元之族弟也女子嫁柳氏曰從肇曰予族兄也予早承族兄之教聞夫人之德且曰隨之所以能立洎吾嫂之所以令皆夫人之訓則宜有以文其聲詩刻而措諸墓夫人諱某壽若干某年月日終某月日祔於此誌曰周之列國譚子毛伯合是二姓從其匹敵夫人有訓乃策厥族惟時善良不享豐福懿厥子姓追號憲德內言不出孰表貞節願垂休銘永誌幽谷郭師名無名無字父爽雲中大將無名生善音能鼓十三絃其為事天資獨得推七律三十五調切密邃靡布爪指運掌掔使木聲絲聲均其所自出屈折愉繹學者無能如自去乳不近葷肉以是慕浮屠道既失父母既棄去兄弟自矒緇入代清涼山又南來楚中然遇其故器不能無撫弄吳王宙刺復州或以告乃延入強之宙號知聲音抃蹈以為神奇會宙貶賀州遂以來性愛酒不能已因縱髮為黃老術薛道州伯高抵宙以書必致之至與坐起伯高褒邪人也嗜其音至善處輒自為擊節教閽管謹視出入餌仄柏不食穀三年變服遁逃九疑叢祠中披取之益善親遇終不屑卒乘暴水入小船下岣嶁山求道籙會歐陽師死不果受張誡副嶺南又強與偕誡死至是抵予時已得骨髓病日猶鼓音四五行居數日益篤既病自為歌死三日葬州北岡西志其詞曰雲州生柳州死年五十病骨髓天與之音今已矣丁酉之年秋既季月缺其團於是始心為浮屠形道士仁人我哀埋勿棄嬰臼死信孤乃立王侯世家天水邑㣥字容成系是襲祖某父某仕相及嗟然秀才胡伋伋體貌之恭藝始習娶於赤水禮猶執南浮合浦遽遠集元和庚寅神永戢問年二紀益以十僕夫返柩當啟蟄瀟湘之交瘞原隰稚妻號叫幼女泣和者悽欷行路悒追初憫夭銘茲什氏曰馬字曰淑生廣陵母曰劉客倡也淑之父曰總既孕而卒故淑為南康謳者李君為睦州詆狂寇見誣左官為循州錄過而慕焉納為外婦偕竄南海上及移永州州之騷人多李之舊日載酒往焉聞其操鳴絃為新聲撫節而歌莫不感動其音美其容以忘其居之遠而名之辱方幸其若是也元和五年五月十九日積疾卒於湘水之東葬東岡之北垂年二十四銘曰容之丰兮藝之工隱憂以舒和樂雍佳冶彫殞逝安窮諧鼓瑟兮湘之滸嗣靈音兮永終古天寶中詔李氏由涼武昭王以下皆得籍宗正故沂州刺史福以姑臧人附屬於寧歧為族曾祖生樂壽令昱昱生虢州司馬叶世以儒聞叶生監察御史澣字濯纓明兩經仕歷永興臨晉尉會天子方事誅伐南平蔡北服趙西走戎東討齊魯五年間兵征卒戍糴行千里凡進用唯財賦為難君以試大理評事佐荊南兩稅使督天下諸侯之半調食饒給車擊舟連又守湖南鹽鐵轉院以能遷官移嶺南益積功勞以介厲敦勤為率㣥吏先年五十三元和十三年月日卒妻廬江何氏凡五世世鄭出父曰士鍔季父曰士幹有大名君之子二人曰夔曰導女一人曰某夔導皆幼不能事何夫人哭且戒柩行萬里人咸觀其禮焉葬伊闕用明年某月日甲子銘曰涼為帝基克顧厥允皇宏國牒四邑顯進沂以屬尊世仕倚儒憲憲濯纓亦用學徒既穀既官式懋爾勞四方用師卒食之饒致其廉介率是諸侯於荊於交關石是鈞邦有休功惟吏之勤冀施於大以盡其有孰司壽夭君不克久吉日來祔伊闕之墓子嗣孫承有達宜興銘詔於神永永是徵裴氏之昭曰贈戶部尚書諱某穆曰起居郎諱某生均州刺史諱某均州與其弟大理更為刑部郎用文史名於朝善杜禮書長子曰某射進士策不中去過汴韓司徒宏迎取為從事以聞拜太子通事舍人進大理評事當伐蔡及鄆州嘗為軍首贊佐有勞既事將侍太夫人於京師道發疽元和十四年月日終於河南敦厚里年若干字曰某弟某以其喪歸葬於某縣某里未果娶有男子二人女一人男之長曰某通兩經始杖且廬銘曰世守不遷秀於士鄉不利有司爰客於梁梁委其躬乃相戎政宮臣理屬仍受國命南蔡北曹五載首兵柔剛輔理平視太平馬牛既寧告養於京棧車草草我來周道載飢載勞神奪其孝形經於洛魂其焉如庶終爾誠陰侍里閭膳飲不違有弟之恭既安且盈厥志斯從銘之故人以慰爾衷晉之亂柳氏始分曰耆為汝南守居河東又五世曰慶相魏魏相之嗣曰旦仕隋為黃門侍郎其小宗曰楷至於唐刺濟房蘭廓四州楷生夏縣令府君諱繹繹生司議郎府君諱遺愛皆葬長安少陵原遺愛生御史府君諱開葬南陽其嗣曰寬字存諒讀其世書揚於文詞南方之人多諷其什頗學禮而善為容修吏事始仕家令主簿進左驍衞兵曹試大理評事為嶺南節度推官荊南永安軍判官府罷為游士出桂陽下廣州中厲氣嘔泄卒於公館元和六年八月七日也年四十七前娶瑯琊王拱子拱國子祭酒後娶河東裴陵子陵告成令裴氏之出曰裴七君之從弟以君之喪歸過零陵哭且告於宗元曰吾伯兄從事嶺南其地多貨其民輕亂能以簡惠和柔匡弼所奉假守支郡海隅以寧鬬狠仇怨敦諭克順從公於荊綏戎永安仍專郡治政用休阜是時蜀寇始滅邦人瘡痍懷君之澤咸忘其痛其理也惠而不施之於大其行也和而不至於年其言也文而不顯其聲今將以某月日祔葬苟又不得令詞而誌焉是無以葢前人之大痛敢固以請嗚呼予懼辭之不令以為神羞予曷敢不諾銘曰柳族之分在北為高充於史氏世相重侯中書之世實曰蘭州夏縣政良司議德優營營御史乃佐元侯惟君是嗣其政克修儲闈補吏環衞分曹南越之龎從事以寧永安披攘荐仍於兵是董是經既柔且平浩浩呻呼革為和聲胡不使壽而奪之齡柩於海壖壙於鄧邦厥弟孔哀惟行之恭呱呱小子縗而不廬充充令妻髽首而居鳥獸號鳴助我踟躕刻此悲辭藏之奧隅祕書郎姜㟧字某開元皇帝外孫也始楚國公皎與上游益貴幸子慶初得尚某公主生㟧㟧生三日上曰他物無以餉吾孫即敕有司以第六品告與緋衣銀魚得通籍出入凡名是官七十某年終不徙然其間在蜀漢荊楚以大諸侯命守州邑輒以勞稱時缺則復命好游嗜音以生貴富畜妓能傳宮中聲賢豪大夫多與連歡後加老風病手足奇右可用不能就官士有載酒來則出妓搏髀笑戲觀者尚識承平王孫故態元和十四年月日終桂州都督御史中丞裴公曰噫帝戚也葬不可以廉為具物祭以豚酒月日葬州東南一里子某年若干母曰雷姬銘曰始賤終貴於世為遂幼榮老窮在物為凶均之得喪誰缺誰豐若君者銀朱於始生鐘鼎以及壯不矍矍於進取不施施於驕伉左絃右壺樂以自放雖老而客死未嘗戚乎已與夫拳拳恐悸蒙諂負義得之拘拘榮不葢愧以終其身而不能止者不猶優乎貞元十八年月日天水趙公矜年四十二客死於柳州官為斂葬於城北之野元和十三年孤來章始壯自襄州徒行求其葬不得徵書而名其人皆死無能知者來章日哭於野凡十九日唯人事之窮則庶於卜筮五月甲辰卜秦誗兆之曰金食其墨而火以貴其墓直丑在道之右南有貴臣冢土是守乙巳於野宜遇西人深目而髥其得實因七日發之乃覯其神明日求諸野有叟荷杖而東者問之曰是故趙丞兒耶吾為曹信是邇吾墓噫今則夷矣直社之北二百舉武吾為子蕝焉辛亥啟土有木焉發之緋衣緅衾凡自家之物皆在州之人皆為出涕誠來章之孝神付是叟以與龜偶不然其協焉如此哉六月某日就道月日葬於汝州龍興縣期城之原夫人河南源氏先歿而祔之矜之父曰漸南鄭尉祖曰倩之鄆州司馬曾祖曰宏安金紫光祿大夫國子祭酒始矜由明經為舞陽主簿蔡帥反犯難來歸擢授襄城主簿賜緋魚袋後為襄陽丞其墓自曾祖以下皆族以位時宗元刺柳用相其事哀而旌之以銘銘曰誗也挈之信也蕝之有朱其紱神具列之懇懇來章神實恫汝錫之老叟告以兆語靈其鼓舞從而父祖孝斯有終宜福是與百越蓁蓁羈鬼相望有子而孝獨歸故鄉涕盈其銘旌爾勿忘有唐故溫縣主簿韓慎字某漢弓高侯其先也徙於南陽傳世至今唐侍中諱瑗克用貞亮奮於國難傳侍中兄子郢州刺史諱某某生御史著作郎諱某某生尚書庫部郎中萬州刺史諱某嗣以文行大其家業君萬州長子也以父任為建陵挽郎累調授王府參軍襄州襄陽尉至於是邑貞元十六年又調於天官署河陽丞未拜十有一日暴病卒於長安永崇里先人之廬又十有二日龜策襲吉祔於咸陽洪瀆原先人之墓禮也先三日外姻家老謀為之志季弟泰哀不能文故託於友焉嗚呼生也以其弟之恭知君之為友沒也以其弟之戚知君之為愛惟友愛出於孝移於忠施於人事無往不達予故得受其辭書於石曰友而愛而忠孝宜之貌稱其行行稱其詞賤而不壽為善是悼祔於祖考初筮攸告季也之純寘哀無垠終窶且貧控於仁人備物稱家其儀式陳爰相其悲載刻茲珉東明先生張氏曰因嘗有以文薦於天子天子策試甚高以為長安尉一年投去印綬願為黃老術詔許之居東明觀三十餘年受畢法道行峻異得眾真祕書訣籙聚經籍圖史侔於麟閣以弟回口秩封州先生曰吾老矣支體不可解也遂從以去明年回之子襲死哭之慟遂病既亟以命回曰吾生天寶訖貞元乙酉歲十月今死於汝之手盈吾志矣京師吾生也畢原先人之歸也必以返葬乃自為誌而卒明年正月某日葬如其言弟子某等為碑以誌於墓辭曰匪祿而康匪爵而榮漠焉以虛充焉以盈言而不為華光而不為名介潔而周流苞涵而清寧幽觀其形與化為冥寂寞以成其道是以勿嬰世皆狂狂奔利死名我獨浩浩端一以生或曰先生友弟以遁慈幼以死若不能忘情者何耶吾曰道去友耶去慈耶從容以求其得之耶盪莽狠悻道之非耶且夫虧恩壞禮枯槁顦顇墮聖圖壽離中就異歘然與神鬼為偶頑然以木石為類倥侗而不實窮老而無死先生之道固知異夫此也乃書於石以紀河東聞喜裴君諱某字某好學未仕年若干元和十四年月日終於京兆渭南墅君之弟中丞公督桂州命其寮柳宗元以銘君之出河間邢㣥以狀來告曰曾祖諱某寧州刺史贈戶部尚書祖諱某起居郎父諱某尚書刑部員外郎議官及浮圖事獨出載在史冊以八使行天下當河北道疑危頑狠難處分之地用天子命制斷得宜於時為第一天下皆仰以為相會疾終再贈至大理卿長老咸曰裴氏世積德起居丞相弟也以文史用大理名世人也咸聞而不大君以友悌愨植承其休光幽而不揚豈天鍾美於中丞嗇而不克並耶不然君無位以夭其可問哉君前娶韋氏成都少尹士謨女生二子字曰某名曰某以文敏中丞公尤愛幸恆從不幸卒於桂林某舉明經後娶於薛氏無子父寀位卑是年月日葬渭南某里遷韋夫人之喪自萬年來有俟猶異室銘曰疇之沃沃宜其嘉穀有耕有耨同施異祿明昭次穆丞相之族尚書之孫大理之門有慶實延宜碩而繁不位不年晦於邱園懿懿大理惟德之元摧佞抑釋太史是論黜陟冀幽邦命以尊神嗇豐福不并於君渭之洋洋爰墓其南孝思是懷祖考之依郡人作銘惟相其哀覃季子其人生愛書貧甚尤介特不苟受施讀經傳言其說數家推太史公班固書下到今橫豎鉤貫又且數十家通為書號覃子史纂又取鬻老管莊子思晏孟下到今其術自儒墨名法至於狗彘草木凡有益於世者為子纂又百有若干家篤於聞不以仕為事黜陟使取其書以氏名聞除太子校書某年月日死永州祁陽縣某鄉將死嘆曰寧有聞而窮乎將無聞而豐乎寧介而躓乎將溷而遂乎葬其鄉後若干年柳先生來永州戚其文不大於世求其墓以石銘銘曰困其獨豐其辱太傅公既志滎澤君之葬明年為中書侍郎同中書門下平章事以卒滎澤君之嗣曰膺備物具貨入於汴汴陷於戎喪焉不果行會世難不幸膺亦死膺之亞曰太素仕至雲陽令求其志將行謫南海上元和九年移信州猶有累不克如其鄉大懼緩慢滋久哭命其子某以某月日啟君之喪至於某葬用某月甲子志用太傅公之辭又命河東柳某書緩故且志終事之年月日先夫人姓盧氏諱某世家涿郡壽止六十有八元和元年歲次丙戌五月十五日棄代於永州零陵佛寺明年某月日安祔於京兆萬年棲鳳原先侍御史府君之墓其孤有罪銜哀待刑不得歸奉喪事以盡其志姪洎太夫人兄之子宏禮承事焉嗚呼天乎太夫人有子不令而陷於大僇徙播厲土醫巫藥膳之不具以速天禍非天降之酷將不幸而有惡子以及是也又今無適主以葬天地有窮此冤無窮既舉葬紖猶以不孝之辭擬述先德且志其酷焉嘗逮事伯舅聞其稱太夫人之行以教曰汝宜知之七歲通毛詩及劉氏列女傳斟酌而行不墜其旨汝宗大家也既事舅姑周睦姻族柳氏之孝仁益聞歲惡少食不自足而飽孤幼是良難也又嘗侍先君有聞如舅氏之謂且曰吾所讀舊史及諸子書夫人聞而盡知之無遺者某始四歲居京城西田廬中先君在吳家無書太夫人教古賦十四首皆諷傳之以詩禮圖史及翦製縷結授諸女及長皆為名婦先君之仕也伯母叔母姑姊妹子姪雖遠在數千里之外必奉迎以來太夫人之承之也尊己者敬之如臣事君下己者慈之如母畜子敵己者友之如兄弟無不得志者也諸姑之有歸必廢寢食禮既備嘗有勞疾先君將改葬王父母太夫人泣以莅事事既具而大故及焉不得成禮既得命於朝祗奉教曰汝忘大事乎吾冢婦也今也宜老而唯是則不敢暇抑將任焉苟有日吾其行也及命為邵州又喜曰吾願得矣竟不至官而及於罪是歲之初天子加恩㣥臣以宗元任御史尚書郎封太夫人河東縣太君八月會冊太上皇后於興慶宮禮無違者既至永州又奉教曰汝唯不恭憲度既獲戾矣今將大儆於後以葢前惡敬懼而已苟能是吾何恨哉明者不悼往事吾未嘗有戚戚也而卒以無孝道不能有報焉喪主子婦七歲而不果娶竄窮徼人多疾殃炎暑熇蒸其下卑濕非所以養也診視無所問藥石無所求禱祠無所實蒼黃叫呼遂遘大罰天乎神乎其忍是乎而獨生者誰也為禍為逆又頑狠而不得死逾月逾時以至於今靈車遠去而身獨止元堂暫開而目不見孤囚窮縶魄逝心壞蒼天蒼天有如是耶而猶言猶食者何如人耶已矣已矣窮天下之聲無以舒其哀矣盡天下之辭無以傳其酷矣刻之堅石措之幽陰終天而止矣夫人姓李氏辨族氏者曰趙郡贊皇之東祖祖某為某官父冲為單父尉夫人生於良族嶷然殊異及笄德充於容行踐於言高朗而不傷其柔嚴恪而不害其和特善女工翦製之事又能為雅琴素聲操縵之具婦道既備宜為君子之配偶焉我伯祖臨卭令府君諱某受夫人於李氏之廟而歸於正室臨卭府君之先曰我曾王父清池府君諱某清池之先曰徐州府君諱某又其先曰常侍府君諱楷常侍之兄曰中書令諱奭自中書以上為宰相四世噫我伯祖以宗冑碩大而濟其德厚夫人以族屬清顯而修其禮範合二姓以承先祖為士者榮之故佐奉養承祭祀婦德用光家道甚宜無何伯祖終於臨卭而窆焉夫人從子而反於淮滸嗚呼我先府君每得仕未嘗不奉迎供養必誠必親男既立必使之有祿仕女必使之有家將嫁己子必先擇良士可以配諸姑者定然後議焉仲父殿中侍御史府君由是志也夫人生男一人諱某不幸終於宣州旌德尉女三人皆得良壻隴西李伯和為楊子丞疾痺癈痼而沒太原王紓今為右補闕潁川陳萇為校書郎渭南尉知名貞元十六年王氏姑定省扶持自揚州至於京師道路遇疾遂館於陳氏以諸壻之良諸女之養無不得意焉享年八十一是歲六月二十九日終於平康里自小斂至於大斂比及葬則二壻實參主之有孫二人長曰曹郎奉之以縗而正於位八月二十四日葬於萬年縣之少陵原實棲鳳原介於我先府君仲父二兆之間神心之所安也嗚呼嗣子早夭臨卭萬里以歲之不易未克合祔哀孰甚焉諸姑命宗元以為斯志以從人之道內夫家外父母家且又葬於我志於我故敘柳氏為備銘曰藹其芳壽且康大梁鶉火沈幽光夙淪夫子嗣又喪輤幃不復岷之陽兆靈趾棲鳳里艮之山兌之水靈之車當返此子孫百代承靈祉誰之言者青烏子夫人諱則字內儀姓陸氏家於吳郡蓋江左上族以宗子在他國家牒逸墜故曾王父王父之諱官不克究知而闕其文父覃皇河南陸渾令夫人生而柔笄而禮會伯舅為河南尹撰擇寮寀謂我文學掾仲父士林殊英儒流推高故夫人歸於我夫人之志也溫順以承上沖厚以字下不敢踰於冢婦不敢侮於臣妾是宜允膺福壽集成母儀稟命不淑享年三十有五貞元十二年十一月己亥終於長安太平里第嗚呼夫人生男一人曰曹婆幼孺在抱委縗就位女一人曰喜子匍匐繈緥寄婦人之手哀哉蓋衰門薄祐神道不相顧仲父違背於歲首而夫人捐棄於是日遺孤眇藐未克承紹凡我族屬其痛巨乎遂以其年十二月十三日庚午合祔於少陵原之墓恭惟仲父之諱字夫人之爵齒備於版文今不書懼再告也唐貞元十七年九月六日甲子前渭南縣尉潁川陳君之夫人河東柳氏終於平康里將終告於陳君曰吾生四十有四年為陳氏介婦九年謹飭不怠以至此命也既成婦矣宜祔於皇姑從兆於三原然而不幸中道而有痼疾既不及養於舅姑又不得佐於蒸嘗生君之子不朞月而殞嘗謂君宜有貴位而不克見執親之喪不得終紀皆天譴之大者也且願殺禮以成吾私邇先夫人之墓而窆我焉將俟君之不諱而歸復於正其可也陳君乃卜十二月十八日權厝於城南原曰棲鳳如夫人之志且以時日甲子授於宗元曰子之姑孝於家移於我之長睦於族施於我之黨是用賓而禮之如益者之友今則去我已矣吾無以報焉他日嘗謂子愨而文願以為誌庶幸而有知將安子之為也萇無恨矣嗚呼貴不必賢壽不必仁天之不可恃也久矣遂哭而受命書夫人之世以記於茲石夫人六代祖諱慶五代祖諱旦位皆至宰相高祖諱楷為濟州刺史曾祖諱某為徐州長史祖諱某為清池令考諱某為臨卭令妣李氏趙郡贊皇人其他則俟改葬而後備柳氏至於唐其著者中書令諱奭中書之弟之子曰徐州府君諱子夏實有孝德世其家業清池府君諱從裕繼之以茂實德清府君諱察躬承之以善政以至於侍御史府君諱鎮用貞信勁正達於邦家克生賢女以配於裴氏裴氏至於唐其著者禮部尚書諱行儉禮部之子曰侍中諱光庭嗣用忠肅書於國史祠部府君諱貞業之以貞直以至於金吾府君諱儆用純懿端亮聞於天下實生良子以配夫人嗚呼夫人與仁孝偕生以禮順偕長始於家純如也終於夫族穆如也其為子道也孝以和恭以惠取與承順必稱所欲先君與太夫人恩遇尤厚故夫人侍側無威怒之教焉天禍弊族夙遭大故我諸孤奉太夫人之養不敢圖死至於復常夫人三歲無湯沐無鹽酪頓踊叫號哀徹天地外除髮不勝笄體不勝帶太夫人泣而命之固猶不食朝夕諭誨僅而濟焉其為妻道也貞順之宜恆服於身體疑忌之慮不萌於心術忿懥之色不兆於容貌同焉而合於禮婉焉而得其正其為婦道也惟聽順謹敬睦姻任恤之行甚備常以不幸不及姑舅之養用為大恨是故相春秋之事眎滌濯羞簋簠勞以待旦每怵惕之感至焉則又移其孝於裴氏之門而以睦於冢婦介婦必敬必親下以不失其赤子之心姻族歸厚率由是也嗚呼我之大譴歟裴氏之大不幸歟以夫人之德行宜貴壽宜康寧然而年始三十不克至於壽良人官為參軍事不及偕其貴骨髓之疾實鍾於身以貞元十六年三月十三日甲子終於光德里第痛矣夫始夫人之疾也夫人之族視之如己其家老長妾臧獲之微皆以其私奔謁於道路禱鬼神問卜筮者相及也既病太夫人在側尚慮積憂傷於尊懷猶持形立氣紿以少間故二稚未齔良人在遠不及有緒言遺念以傳於後則我呼天之痛宜有加焉嗚呼天胡厚是懿德而闕其報施獨何咎歟予一不知天之忍也既逾月良人至自洛師望門而哭曰無以立吾家成吾身矣凡生三子幼曰崔七先夫人八月而殯魂氣無不之也次曰崔六後夫人五旬而夭因祔焉今其存者曰崔五幸無恙託於乳媼以虞水火哀哉其年八月十八日甲子安厝於長安縣之神禾原從於先塋祔於皇姑宜也母弟號哭而為之志毒痛憑塞略不能具敢告無愧辭無溢美庶用正直克安神心嗚呼至哀無文至敬不飾故無其辭
