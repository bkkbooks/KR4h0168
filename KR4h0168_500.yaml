front:
  text: 全唐文欽定全唐文卷五百權德輿十八
  hash: sha256:681e4fad7bf2ed1234ebe1c3a04cf474d744c6beb7ea48663d3e1c26bae3eb28
body:
  text: 王者奉三無私以勞天下則崇德報功加恩飾終與覆載照臨相為用一也惟正平節公以愷悌文敏為二千石尚書郎人浮於食位不配德纂積後之緒業貽克家之燕翼流光裕蠱為代師式乃元和二年夏五月追命告贈為尚書左僕射孝本乎忠榮生乎哀用攄罔極以刻金石云公諱倩字容卿河東聞喜人其先嬴秦同姓因封受氏魏晉已還號為多才八賢方駕百族歸重自魏冀州刺史徽五代至中軍將軍雙虎中軍五代至隋左光祿大夫皇朝贈原州都督忠公仁基忠公生皇銀青光祿大夫禮部尚書定襄金牙兩道節度行軍大總管贈太尉聞喜憲公行儉公之曾祖也憲公生皇光祿大夫侍中兼吏部尚書宏文館大學士贈太師正平忠獻公光庭公之王父也忠獻公生皇尚書祠部員外郎贈太子賓客禎公之烈考也公天姿宏裕虛受通理臧氏之有後於魯管氏之代祀於齊遠至之器發於岐嶷年十一以相庭推恩授家令寺丞滿歲選部銓第甲乙補太常寺主簿居先府君喪水漿不入於口孺慕殆於滅性宗門憂其死於孝禮文俯就衣服外除歷華陰馮翊二郡司戶參軍轉祕書郎俄丁內艱毀瘠如初禮違難江介就拜洪州司馬改太子司議郎徵為殿中侍御史拜度支駕部二員外遷司勳郎中祕書少監歷信饒二州刺史復徵為度支郎中其佐鍾陵也領留府之重居議郎也贊計司之職暨登中臺亞中祕皆兼柱下方書之任自淮而南涉江而西荊衡漢沔湘中夏口半天下奧壤為都府者十數公四顓使車連佩數印督課郡國調其盈虛吏祿兵食之仰給輸將轉漕之回遠法錢牢盆之制田租口賦之差權其輕重商其功利察下人之疾苦廉長吏之善否車不輟鞅有勞於時其始受命也寇劇橫厲三川如燬陰方出師慕義助順代宗焦勞念慮命德宗以雍邸總戎賦輿所會征繕不給有詔輟東方軍市之租移用於中都屬受鉞之臣矜功觖望師老專利便文自營公慨然牒書譏切備至嚮之廢格悉用平鐫義夫以之感激王旅以之震躍其理信州也用寬惠誠厚輯柔所部穡事滿野嘉禾同穎年以順成人斯洽和復其庸亡五千室闢其農耕二萬畝交代之日不書於簿且曰吾以恤隱豈當沽美不伐之善欲蓋而彰方帥表理行第一增秩至正議大夫加金印紫綬其為饒州屬所代者非其人因緣權幸貪猾無狀公以廉平頒詔條以慘怛撫痍傷四封愛戴如熱斯濯其後徵拜也朝廷誅內臣修百度彌綸經費委重有司公以郎吏代故相第五琦專判度支事方冀裁成九賦超贊六職以美利利斯人令望日大天胡不惠以大歷七年秋七月考終命於長安光德里第春秋若干以某年月日歸全於萬年縣神禾原之大墓禮官博士以公處難不謀其身牧人不私其功能固所守以行制度易嘉名以旌往行禮也惟公直而溫而文才裕於物器周於用靜若蓍龜動如干鏌秉是貞厲終焉節適著文集十卷湓城集五卷比興屬和聲律鏗然引拔參佐皆一時名士風采資材邁絶㣥倫齒位未極為薦紳所痛夫人京兆韋氏扶風太守恆之長女以大宗之家人諸侯之內子襟鞶承訓籩豆助祭當室以敬睦親以仁姿操卓淑音徽宏大盛德著於母儀惠心通於佛乘五蘊不入六姻是憲始封咸寧郡君後三追錫至邠國太夫人有子曰均以御史大夫工部尚書尹正荊門節制上遊就加吏部尚書右僕射元和三年抗章入覲真拜右僕射判度支加秩金紫光祿大夫由河東郡公進封郇國歲中進左僕射同中書門下平章事撫征漢南臨長諸侯惟郇公直清宏重有文武楨幹得時大行為王室輔慮善以動官修其方賦政以惠南國宣威以靖西蜀師長百工阜成中邦兵符將印焜耀章灼樹善程能之績勤身體遠之用居則有猶動則有功率循風訓以復尊大君子曰憲公忠獻公之休烈丕矩再世盛德屈於郎位必復之慶其在是乎初郇公之授律也孝文追贈公絳州刺史其進律也順宗贈公禮部尚書今皇帝永懷義方於是有左揆之命公之積慶郇公之孝思可謂至矣郇公以三代論撰皆上台雄文猥以通舊忘其卑鄙辭則不腆庶傳信之無愧焉銘曰河汾之東慶祉所鍾公相葳蕤德耀昭融矯矯節公體仁修性乃貽後昆實稟先正太尉經武太師翼聖施於儲賓執德之柄公用循良惠於二邦公有德澤宣於四方急病尚仁履險乘剛化被煩苦斯焉樂康吉祿方摯壽堂已閟藹此家聲揚於令嗣恩崇鼎鉉績茂師帥中外服勞安危注意便蕃屬任宏大名器孝理是覃義方所自九原之中禮盛服充王三錫命襚飾宗工連岡崢嶸介原穹崇陵谷有變令聲無窮興元元年春二月太子右庶子王公艱貞歸全於京師新昌里夏五月王師震耀祲沴銷散天子以公忠義風節可以聳勵人臣追命左散騎常侍且詔有司護葬加禮冬十一月寧神於咸陽縣胏浮原先公之兆域既葬十二歲其孤仲周以德輿昔在羈丱獲見於公無容之敬嘗拜於牀下乃泣狀代德俾表識於神道云公諱定字鎮卿京兆人其先魏信陵君無忌之後秦滅魏謂之王家周太尉尚書令羆以勳勞閥閲為藩衛威重從太尉三代至隋司金上士邢孟洺相等七州刺史明進明進生同州河西縣令喜喜生蒲州長史贈禮部郎中慶慶生吏部侍郎揚州大都督府長史贈禮部尚書揚州大都督易從積是德善叢滋彰大公即尚書第若干子弱冠遊太學舉進士甲科補太子校書以文雅盛德名聲四暢屬執事者用喜怒為刑賞上蔽天明婚親坐纍微文痛詆歷湘潭藍山雲夢鹽城四邑之屬天寶末違難家食於淮湖間四征五府聘問狎至某年中書元載廉問九江表公為介授右驍衛兵曹參軍以疾乞告不屑就無何元拜小司徒執憲乘軺實顓徵令復表公為大理評事奉詔踵門詞禮皆切不得已而從之恥騖功利每稽中正酌輕重之法通方圓之宜叩雖應於舂容技寧投於肯綮才逾旬朔復以疾辭時薦紳先生多遊寓於江南盍簪清議以天爵為貴退然潔矩名動京師宰相得君且務樹善俄除監察御史不樂拘屑換太子司議郎公望寖盛徵書纍下不就朝論以九遷是望大僚之七發相繼拜起居舍人尋加理匭使歷禮部吏部二員外於是昭法誡廣聰明裁百辟之章疏治九流之刀尺私回屏伏公是興行遷考功郎中每歲核㣥吏之能否書其上下之籍有司賦祿此焉質正吏詐諼以嘗巧法靡密而不勝公乃大為之防盡去其弊於是選部以稱職聞或賀之者舉手曰此考功之力也豈敢攘善尋以本官知制誥歲中遷諫議大夫掌誥如故且加命服凡贊書名命必輔以精誠其旨在於搴菁華而去枝葉故實體要不為蔓辭明年宰臣伏法移太子洗馬今上嗣統柬求吏師授隰州刺史以南京歸重尋拜吏部郎中再授方面命循行方國初自淮淝至於汝南後自上黨亘於山東辨逆節以致誅宣王澤以宏化德立刑行時公之功遷太子右庶子集賢院學士或歎以才全位散非公所宜者公蹴然曰此豫仲父之職官也竊懼不稱豈必使濡翼臘毒然後為得耶明年冬上思避狄之亂玉虬西狩公聞挈二子奔扈行宮在塗發疾為凶黨所得不敢加害劫送京師元惡惜公素名汙以右職桀犬日至盜言孔甘不時赴就期以大戮公瞑目噤口其心確然私謂所親曰忘君恩以苟生非忠蹈賊刃以誅死非孝於是藥攻五臟艾灼四肢耗其神形終啓手足任重道遠君子以為難前此理命其子曰吾嘗被冕服近天子之光不能酬恩刷恥而遭罹執劫得正而斃猶生之年但慮竊國泉以賻我義無所受勿使偽命汙吾之行口占遺表言終而絶禮盛服充追崇身後君君臣臣其至矣哉故尚書吏部郎中趙郡李公洎公皆德輿先大夫之執也李公嘗稱公交道之深評議之正天下之人以為知言前夫人京兆韋氏刑部尚書贈太子賓客堅之女繼夫人隴西李氏右金吾衛將軍資州刺史延業之女龍旗麟趾之慶重於淑哲皆叶公之志而先公之歿長子逢以進士宏詞甲科歷咸陽萬年縣尉監察御史殿中侍御史佐制河東之畫才名休茂不幸蚤代幼子仲周亦以進士甲科使車交辟以廷尉評攝監察御史佐元侯外任實商功利利用敏職文行修明論撰先烈炳然詳實故採獲始終用成斯文銘曰大玉孚尹慶霄絪縕有卓王公清方直溫考績中臺吏理有倫密侍右掖化成人文時或屈伸道無緇磷別殿清近東朝顯尊盜泉滔天猛瘈狺狺不虧其全不害其人凜凜風節追崇厚恩玉印金貂襚於墓門家法憑厚慶叢後昆纂敘德輝敬而不諼岡連夏屋木拱秦原傳信貞珉令聲無垠國家以孝理天下裦有功之臣寄崇元侯澤及先子印綬名器賁於冥冥繇是王公三受追命有金貂附蟬之飾公諱崇術字敬方其先太原晉陽人晉司徒渾之後也中以閥閲徙於帝邱今以名數籍於轂下曾王父皇集州司倉參軍元素元素生朝散大夫滑州衛南縣令王褱王褱生蔚州司法參軍宏效皆用儒行自守故纓轂未華仕不過郡掾史縣大夫而休問四暢公即司法府君之子方嚴密靜忠厚溫克覽六籍三略如見古人之心開元中舉孝廉仍歲為有司所詘因罷卷慨息慕班超傅介子之為人遂從河西節度杜尚書暹撫劒相合一命昭武校尉蘭州金城府別將再命鄜州修武府左果毅都尉伐謀決勝多以咨之居戲下數歲因喟然曰務功伐而違敬養豈吾之心耶陟屺倚門慈戀交感乃嘉仲由而罪吳起去危事以承歡顏既至郡按察使表其義行可移於教化有詔試守鄜州伏陸令為之三年禮俗休和入有怡聲出有循政熙熙然千室以仁遂焉雖宓不齊之理單父庚桑楚之居崴不是過也察廉薦延者方因公以俟上賞俄丁太夫人憂喪期斬焉闋而猶毀又喟然曰嚮所以不擇祿者備膳羞耳今則求志豈蘄畜於樊中耶於是善閉以葆其身教忠以大其門語仁義於燕間集寵嘉於後昆以天寶八年春正月考終命於濮陽縣享年七十二嘉耦北平田氏夏州司馬藝之息女淑慎柔正宜於家室後七歲沒於徐州有子三人長曰奇哲俶儻沈勇與河內尚衡扶義於河南積功勞至恆州刺史蹈難以沒不害於仁次曰棲榮亦以忠力策謀至左威衛將軍幼曰棲曜寬明博大有文武略左右征師炳著威功掃蠆毒於姑胥靜鴟喧於夷門興元元年以太子詹事加御史大夫繇太原縣侯進封琅琊郡王貞元三年從晉國韓公來朝京師拜輔國大將軍左龍武軍將軍明年又以御史大夫為鄜坊丹延等州節度觀察等使十二年就加禮部尚書納忠服勞考禮修職克稟風訓為時翰垣旋觀賦政之府乃公筮仕之地感霜露於怵惕展蒸嘗於吉蠲蓋貽慶考祥必有所自不然何回復宏大於是邦耶初大歷十年朝廷以尚書偏師策勳贈公開州刺史貞元九年又以撫劒宣力贈公宋州刺史是歲天子以一純二精大饗報本其明年贈公左散騎常侍夫人始贈北平郡太君再封北平郡太夫人至是三加為燕國太夫人十年十月追錫之車服器用改葬之裧輤合祔於濮陽洛城鄉全義里之西原先是尚書既得吉卜如始居喪之戚纍章請乞親壤樹土以戎閫委重俾其子正元往襄事焉噫嘻追養繼志有哀有敬義方啓迪之遠纂服裕蠱之盛蕃衍昌阜叢於子姓宜哉斫石舊封以攄德善其銘曰仕不必貴難乎其備抑抑王公修仁踐義戎昭再命宏厥武事美化一同炳然文吏燕居就養消息恬智從心之年亦已過二沒代流慶密章下賁北追劇藩乃進常侍婉彼燕國柔嘉樂易光協閨門克昌後嗣蟬冠象服同穴茲地金石繫辭式昭遺懿公諱南仲字某吳興武康人姚墟媯水根柢峻茂後漢青州刺史恢始違難東徙周華州刺史北絳郡公僧坦以行義道術聞生二才子曰察曰最最仕隋為蜀王友六葉至公曾王父績仕絳州曲沃縣令王父元宋州宋城縣令烈考發天寶中舉秀才十上不合慨然自奮從西平王哥舒翰於隴上積功勞至右領軍衛將軍他日以公之勤贈國子祭酒公抗行厲操清方謙儉以規為瑱以禮為輿以多文為富以不貪為寶潔如大圭鏗若黃鐘宏毅以任重溫良而能斷自射策筮仕至於綏吉祿啓手足繇是道也其初應制條對理道授太子校書內史吏部表其才能凡三結黃綬至萬年尉前後考課為府中最擢拜右拾遺久次歷右補闕發文石封皂囊諷議十年彌縫百度大歷中中宮憫册既卜壽原陳古義以上達疏近郊之非便即日詔可下其章於宰司特超五階被以命服執事內詔以上賀近臣修職而競勸服薦紳者誦之執記者書之尋以本官充理匭使今皇帝嗣位之初慮化不下究以通邑長人導利之源出為蘇州海鹽縣令韓晉公滉時總方任延於幕庭改殿中侍御史興元歲大輅省方深燭理本柬求俊乂徵詣行所洎清宮旋蹕拜左司員外郎紀綱品式練達明備轉兵部員外郎時武師告成祲沴肅清四征㣥帥條上功級材官勇爵差次賞典受命顓達疇庸式敘遷本司郎中凶旱之後被邊囏食近關蒲晉十餘城之地因其徵令悅以平糴乃董使車贏糧息人拜御史中丞歲中換給事中正色匪躬清公不苛大朝以肅右曹亦理明年授同州刺史三載考績復以御史中丞領陜府長史陜虢觀察使居五年就加右散騎常侍左輔有離宮公田之劇焉陜服居函關砥柱之衝焉於二千石元侯之選斯近而重賦政廉平馨香流聞以修班制以厚風俗上以靈昌居兩河之郊鄭為支郡是皆要害且今徑兵處也自丞相魏國公政成入弻厥後守臣再物故而魏公之澤寖遠思得寬明忠智之長以輯柔之進公左散騎常侍御史大夫為滑州刺史鄭滑節度使於是握兵符乘單車惠然易入布條職恤鰥寡用仁制強禦用明居常以柔克臨事以貞勝士吏悅勸夫家寬息阜俗成師納忠間邪衆情皆雙而公益厲十六年介圭來朝牢讓師帥繇是詔魏公以左僕射居相府命公為右僕射公既得請命其軍司馬盧㣥以代焉為仁由已是稱方國之表知臣者君乃膺師長之任詔奉常具儀法以蒞中臺禮官贊引宰政為客諸曹羅拜於堂下郎吏捧牘於階序禮成渥縟秉直者榮之虔奉朝請恪居官次慥慥然守業修職未嘗以耆碩尊禮自處山甫之匪懈考甫之益恭古人與稽華髮彌固十九年秋七月乙亥感疾薨於宣平里第享年七十五天子廢朝悼歎俾中貴人弔祠追命為太子太保恩之所加可勝言哉惟公粹和而能貞厲恬淡而有儀矩履方持重坦坦光大詩曰愷悌君子求福不回言樂易而不違於道也又曰靖恭爾位好是正直言遭明君其道行也斯二者君子謂公得之夫人河南縣君元氏魏景穆帝之裔宣州録事參軍光宗之息女也和易淑柔以肥家道先公而歿十八年矣嗣子太僕寺主簿衮潔清好古誠信得禮與其弟亮茹荼問卜以閏十月已酉奉公之喪與夫人之殯合祔於少陵原黃渠里以儉襄事率循家法雖宗姻四布皆泣而辭之且曰理命也猶懼先人懿實寢而不章刻茲穹石以永終古銘曰黃目鬱器禮神所貴佩玉金龜君子是衛秩秩姚公其心秉彞抱義戴仁造次無違公之所履中立不倚廉車淑旗所嚮風靡政無吐茹道若砥矢事君愛人斯謂至矣中臺崇崇端右宗公皇明嘉獎陟是師長卓爾道行渺然化往少陵鮮原美檟新阡龜筮告繇塗芻儼然白驥蕭蕭黃渠潺潺姚公之德兮楬此貞堅今皇帝始初清明永貞紀號追命故工部員外郎王公為華州刺史改元元和之明年再命為禮部尚書裕蠱之風訓漏泉之慶澤父所以教忠於子臣所以移孝於君人道之極盡於是矣公諱端字某太原人曾祖景肅皇澧州刺史祖威德州司馬父思獻襄陽令公方嚴有志尚沈粹潔清不流於俗舉進士宏詞連中甲科授崇文館校書郎纍遷監察御史殿中侍御史工部員外郎其於奉朝請之外或介隴坻或留洛邑以疾乞告遇安祿山反書聞南浮江湖自適其適乾元已亥奄至大病悲夫自開元天寶間萬方砥平仕進者以文講業無他蹊徑薦紳之倫望二臺如登青天公與河南元德秀天水閻仲璵同歲中正鵠其後冠惠文趨建禮憲章奏議與名聲俱當時士君子猶以未充量為歎其文峻清不汨於波流者還一齋記惠上人碣銘微妙虛空深入無際嘗與故太師顏魯公暨柳郎中芳陸員外據殷永寧寅為莫逆之交陸嘗言王之莊柳之辨殷之介皆希代鴻寶知言者以為實録有三子長曰綽入道精修為桑門上士次曰紓以文行篤實歷右補闕起居郎右司員外郎庫部郎中次曰紹本名犯皇帝諱而更焉忠厚宏裕為德宗所器歷任戶部侍郎戶部兵部二尚書咨俞關決過於宰府大政密議須其一言持平以有守樹善而不伐天下之人謂之長者睿聖繼明以檢校吏部尚書為東都留守東都畿內防禦使以檢校右僕射為徐州刺史武寧軍節度使元和七年入覲復為兵部尚書俄判戶部事四征六職烜赫尊大故公再有追錫之命夫人亦纍贈隴西郡太夫人龍泉魚軒賁飾于冥冥之下名教德器有哀有榮孝理之感人深矣初公之捐館也行次信州瘞於玉山前此夫人沒於洛師窆於潁陽僕射竭其誠信日月有時矣不幸薨落理命其三子嗣事焉繇是僕射之孫曰門下省典儀元泰試大理評事攝監察御史元質右威衛倉曹參軍元弻等窮毒在疚護王父母之輤車間關跋履泣問蓍蔡以八月某甲子祔於萬年縣鳳棲原克纂先志禮無違者而又哀請父黨篆茲祖德永楬神道用愧蕪辭銘曰懿懿王君黃中有文清時發身舒翼卿雲執憲平明含香馝香分慶靈下鍾復大其門追錫儀曹徽章顯尊鳳棲古原龜策不諼泣祔雙魂禮成孝孫刻銘斯碑君子之墳種德考祥賢人積厚之業尊仁安義君子揚名之孝其敬養也諭之於道其貽慶也教之以忠宏保乂於元臣集寵靈於追命見之於尚書武公矣公諱就字廣成沛國人周室之興本於忠厚趙王之裔厥有勳賢元魏步兵尚書鴈門朔方雲中馬邑四郡太守洽啓封晉陽田祿益大生國子祭酒受陽公諱神龜受陽四葉至太原王諱華太原生酇國節公諱士逸節公生河間郡王諱仁範河間生潁川武烈王諱載德代以文武上才為將軍二千石識芒碭之氣密贊皇圖承沙麓之祥分封戚里潁川生考功員外郎修文殿學士諱甄字平一以字行於時未弱冠有重名閎覽博學為人文龜玉在天后朝纍徵不起以公族好爵為懼常晦其明與桑門大士修無生法中宗復辟甫踐周行載筆論思特盛淵雲之選賦詩感激必以昌霍為誡雖位有陟降而道無磷緇叢滋後昆纂服遺烈公即考功府君第三子也肅而清而廉忠方伉直信厚強固博洽文誼周通憲法始以方聞之士對詔策佐宮衛李梁公峴之守右扶風也表為兵曹掾宣皇在岐供㣥有勞改永樂令歷河中府戶曹轂下求吏轉萬年丞建陵復土推擇充奉拜醴泉令朝廷嘉其才擢為殿中侍御史修起矩度堅明不回時朝廷戎車方駕泉貨力屈皇華載馳董荊衡漢沔之賦以嚴見憚為吏議所侵貶郴縣尉句容丞二地有南嶽三茅靈仙遺迹於是浩然自得以道為徒方解纓紱以暢天理且曰窮與通在吾靈龜耳外物其如豫何本道觀察使挹其風聲薦授祕書郎潤州團練使入為京兆法曹加中散大夫忽忽不樂求為潤州司馬滿歲徙家嵩洛愈尚夷曠中朝名卿大夫四方賢侯通人多與公為道義之交賈太傅魏公用清靜理東郡以蓋公待公亦既戾止俄然化性時貞元六年冬十一月享年七十八理命終制視道門儀法以明月之晦降體魄於邙山北原有靈鶴百數徊翔嘹唳其休徵歟其元契歟惟公以文學政事蒞官十二次冠神羊駕四牡剛腸正詞臨事風生君子之方有忤有合或忌公之直或愛公之才行藏牽乎時而道不屈得喪宜乎已而神益王嘗與張禮部謂元容州結歌詩唱和著文集五卷自有塗中之適異乎澤畔之詞前夫人隴西李氏生長子談而歿談為金壇令士行清修官屈其志繼夫人汝南縣君周氏中書舍人思鈞之孫單父令瑛之女專柔淑慎以正家道有子曰元衡文行宏懿靜深周密遵道而行有儀可象代天工以熙帝載賦明命以贊皇極元和三年春正月由戶部侍郎拜門下侍郎同中書平章事秋八月兼領戶部侍郎事冬十月又以門下侍郎檢校吏部尚書成都尹劒南西川節度觀察西川八國瀘南安撫等使自文水縣男徙封至臨淮郡公上以井絡之下新去湯火亦既震耀是圖生殖於是輟台宰之重為慈惠之師黃樞金鉉鏚鉞秬鬯旬歲間三錫命烜赫嘉會綢繆樞極信賞禮賜冠於㣥倫豈非公之道厄不申而昌大於後抑義方家法固有類乎公捐館四年而夫人歿其明年臨淮公乃舉公之窆與夫人之喪改葬緱氏潁川王之兆從先封以敘昭穆禮也初臨淮王至監察御史而孤其後再為中執法朝典覃恩贈公杭州刺史其司大政也再贈公吏部尚書夫人始追封文水縣太君益封汝陰郡太夫人顧復罔極之報哀榮歸厚之禮成於德器名教稱之臨淮公考功府君之謫掾於吳也與德輿王考府君有僑札之歡油素斯在清徽未泯德輿獲與相君交代為地官小司徒陪外廷之末議承宰府之寬政有命論撰忘其菲薄刻茲樂石以表鮮原銘曰君子之道剛方潔矩或消或長或默或語於惟尚書執憲天朝密侍殿內肅清㣥寮鋒鋩肯綮湖海飄颻以恬養智無落吾事吻合虛元脫遺聲利題劒告第寵靈斯備元衮介圭流光所自煌煌台司天子是毗廕庥岷峨灑濯癘疵視此忠力無非孝思緱氏峻原兮幽宅悠久崔嵬介石兮夭矯螭首鏤嘉聞兮以示厥後
