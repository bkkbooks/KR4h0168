front:
  text: 全唐文欽定全唐文卷九百二十宗密俗姓何氏果州西充縣人元和二年依遂州道圓禪師出家住終南山草堂寺太和三年賜紫會昌元年卒於興福塔院年六十二諡定慧禪師
  hash: sha256:c0a7402d61672948186d667882aa2669bea32863d3c570b25ec154e2d7266013
  markers:
  - {type: head, offset: 13, content: 宗密, id: KR4h0168_NFKB_920-h1, level: 1}
body:
  text: 一切衆生無不具覺靈空寂與佛無殊但以無始劫來未曾了悟妄執身為我相故生愛惡等情隨情造業隨業受報生老病死長劫輪回然身中覺性未曾生死如夢被驅使身本安間如水作冰而溫性不異若能悟此意即是法身本曰無生何有寄託靈靈不昧了了常知無所從來亦無所去然多生習妄執以性成喜怒哀樂微細流注其理雖然頓違此情難以卒除須長覺察損之又損如風頓止波浪漸停豈可一身所修便同佛用但可以空寂為自身勿認色身以真知為自心勿認妄念妄念若起都不隨之即臨命終時自然業不能繫雖有中陰所向自由天上人間隨意寄託若愛惡之念已泯不受分段之身自然易短為長易粗為妙若微細流注一切寂滅圓覺大智朗然獨存即隨現千百億身度有緣衆生名之曰佛始於混沌塞乎天地通人神貫貴賤儒釋皆宗之其惟孝道矣應孝子之懇誠救二親之苦厄酬昊天恩德其惟盂蘭盆之教焉宗密罪釁早年喪親每履雪霜之悲永懷風樹之恨竊以終身墳壟卒世蒸嘗雖展孝思不資神道遂搜索聖賢之教虔求追薦之方得此法門實為妙行年年僧自咨白四事供養三尊宗密依之修崇已歷多載兼講其誥用示未開今因歸鄉依日開設闕一字俗耆艾悲喜遵行異口同音請製新疏心在松柏豈慢鄉閭式允來情發揮要道鏡心未淨像色元空夢識無初物境成有由是惑業襲習報應綸輪塵沙劫波莫之遏絶故我滿淨覺者現相人中先説生滅因緣今悟苦集滅道既除我執未達法空欲盡病根方談般若心境齊泯即是真心垢淨雙亡一切清淨三千瑞煥十六會彰今之所傳即第九分句偈隱略旨趣深微慧徹三空檀含萬行住一十八處密示階差斷二十七疑潛通血脈不先遣遣曷契如如故雖策修始終無相由斯教理皆密行果俱元致使口諷牛毛心通麟角或配入名相著事乖宗或但云一真望源迷派其餘胸談臆注不足論矣河沙珍寶三時身命喻所不及豈徒然哉且天親無著師補處尊後學何疑或添或棄故今所述不攻異端疏是論文乳非城內纂要名意及經題目次下即釋無煩豫云元亨利貞乾之德也始於一氣常樂我淨佛之德也本乎一心專一氣而致柔修一心而成道心也者沖虛妙粹炳煥靈明無去無來冥通三際非中非外洞徹十方不滅不生豈四山之可害離性離相奚五色之能盲處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧天大矣哉萬法資始也萬法虛偽緣會而生生法本無一切惟識識如幻夢但是一心心寂而知目之圓覺彌滿清淨中不容他故德用無邊皆同一性性起為相境智歷然相得性融身心廓爾方之海印越彼太虛恢恢焉晃晃焉迥出思議之表也我佛證此愍物迷之再歎奇哉三思大事既全十力能摧樹下魔軍爰起四心欲示宅中寶藏然迷頭捨父悟有易難故仙苑覺場教興頓漸漸設五時之異空有迭彰頓無二諦之殊幽靈絶待今此經者頓之類歟故如來入寂光土凡聖一源現受用身主伴同會曼殊大士創問本起之因簿伽至尊首提究竟之果照斯真體滅彼夢形知無我人誰受輪轉種種幻化生於覺心幻盡覺圓心通法遍心本是佛由念起而漂沈岸實不移因舟行而騖驟頓除妄宰空不生華漸竭愛源金無重礦理絶修證智是階差覺前前非名後後位况妄忘起滅德等圓明者焉然出廄良駒已搖鞭影埋塵大寶須設治方故三觀澄明真假俱入諸輪綺互單復圓修四相潛神非覺違拒四病出體心華發明復令長中下期克念攝念而加行別遍互習業障惑障而消亡成就慧身靜極覺遍百千世界佛境現前是以聞五種名超剎寶施福説半偈義勝河沙小乘實由無法不持無機不被者也噫巴歌和衆似量騰於猿心雪曲應稀了義匿於龍藏宗密髫專魯誥冠討竺墳俱溺筌蹄惟味糟粕幸於涪上針芥相投禪遇南宗教逢斯典一言之下心地開通一軸之中義天朗耀頃以道非常道諸行無常今知心是佛心定當作佛然佛稱種智修假多聞故復行詣百城坐探㣥籍講雖濫泰學且師安叨沐猶吾之納謬當真子之印再逢親友彌感佛恩久慨孤貧將陳法施採集般若綸貫華嚴提挈毗尼發明惟識然醫方萬品宜選對治海寶千般先求如意觀夫文富義博誠讓雜華指體投機無階圓覺故參詳諸論反復百家以利其器方為疏解冥心聖旨極思研精義備性相禪兼頓漸勒成三卷以傳強學然上中下品根欲性殊今將法彼曲成從其易簡更搜精要直注本經庶即事即心日益日損者矣萬靈蠢蠢皆有其本萬物藝藝各歸其根未有無根本而有枝末者也况三才中之最靈而無本源乎且知人者智自知者明我今稟得人身而不自知所從來曷能知他世所趣乎曷能知天下古今人事乎故數十年中學無常師博考內外以原自身原之不已果得其本然今習儒道者祗知近則乃祖乃父傳體相續受得此身遠則混沌一氣剖為陰陽之二二生天地人三三生萬物萬物與人皆氣為本習佛法者但云近則前生造業隨業受報得此人身遠則業又從惑展轉乃至阿賴耶識為身根本皆為已窮其理而實未也然孔老釋迦皆是至聖隨時應物設教殊途內外相資共利㣥庶策勤萬行明因果始終推究萬法彰生起本末雖皆聖意而有實有權二教惟權佛兼權實策萬行懲惡勸善同歸於治則三教皆可遵行推萬法窮理盡性至於本源則佛教方為決了然當今學士各執一宗就師佛者仍迷實義故於天地人物不能原之至源余今還依內外教理推窮萬法初從淺至深於習權教者斥滯令通而極其本後依了教顯示展轉生起之義會偏令圓而至於末文有四篇名原人也一從別後相憶是常未審朝暮用心在何境界得背塵合覺否外境內心覺了不相關否定慧輕安適悅否修行若忘失菩提心知之總是魔業否數數覺察勤勤觀照習氣若起當處即休輒莫隨之亦莫滅之何以故陽焰之水不應趁故不應滅故不應趁故免落凡夫縱情不應滅故免墮二乘調伏圓宗頓教畢竟如斯但與本性相應覺智自然無間長時之事難可具書略標大分自須努力不多述也義叶會昌中沙門太和乙卯嵗潁川郡陳公為左神策將軍以其誅暴息亂宸衷親付之右地公上酬天造忠奉國恩內戢三軍外安百姓擁二州之地霧卷波澄寧萬乘之心雲銷煙滅冀恢宏乎至道實匡贊我有唐至開成戊午嵗公因觀地無遺利農則有秋遂謁闕一字元以告清慎拜大像以請鴻福方歎鳩鴿巢頂荊棘掩砌廊宇霖漏樓殿欹傾寺無居僧爰詰耆舊曰頃者莊田典賣於鄉里林木摧毀於樵童賴闕舊地出清俸以收贖因茲請僧重復其業然耕耘災穫未有倫次焉尚書乃命僧藏乂為赴知已者時不歷二祀裝慈尊以金闕一字飾闕一字殿以丹雘而衆事云畢至於儲蓄車乘與生生之具兼頃畝年代並録之於寺記碑陰以示鄰里鄉黨為免侵奪不朽之驗凡百君子敬而聽之元楚大中時江夏沙門觀音之於諸先覺猶孔門之有亞聖其悲智應用鴻纖毫億剎常如示諸掌是以郢川屈殳因伯兄宗厚上人為空王入室弟子手足相愛嘗得聞斯語遂捨二十萬於新殿東南造觀音方丈一間四厦西嚮峻棟嵒嵒間出廊廡又以香泥伏暜門功德克類端莊天飾梵儀如語如默危冠百寶風容動搖式繄拳拳靈貺斯在俾愚菲薄旌置堅貞愚無文苟欲贊其播植善稼於斯而已矣噫茲寺也自晉至唐五百餘嵗以土木有壞因而造之者數也真風未弭因而復之者時也由是前九江太守給事中博陵公奉詔指撝之舊龍象三十人經營建立之方三四年基構宏壯特新前象遂得爐峰增色圖牒再張車蓋貴遊結轍林下逢迎相賀輝動巖軒挹虎溪之波瀾清塵尾之風韻閲繹故事飽飫前生從容吟嘯而去若是則安知來者之無柴桑乎往者之無雁門乎矧馨香庭實千花雪明重修白社期在旦夕矣愚江干宿齒常夢寐舊岑力抒肺腸遠謝泉石亦厚公之惠也以唐十六葉聖宣皇帝大中六年壬申春二月十五日江夏僧元楚記清越大中時敬亭山沙門十三年秋嗣天子用舊制安天下釋像明年二月茲寺巨殿石砌果而成功維時冠祠剎尊貌踞極敞千戶比其在階陛得無堅強耶始台傑河東公定而崇之儼然峻峙既像素壁繪座嚴侍列中瞻環眩千一煥若乃丹其甍乃赭其楹林池谷壑煜爚輝變遂以修甓務周其功不六七年蒿張蔓植圮缺大半盱者傷目咸不為然始十年秋徒聚文議以為祇敬有本不類他構言其石也於器堅永能百千萬嵗天地日月而終始者餘無如之因擇其善俾化於俗鳩贐悉偳易而牢之寺有耆德惟恭行苦心真亟欲俾壯惟俟勝樂聞其善犁晨遽征詢道之俗雖祈寒暑燠衣壞履冗不暇修歇晝思夕慮惟殿之陛如是凡五年而完之其為利則深矣為功則永矣信夫根斯而施也覽㣥施而無儔焉故始末之知人多不與殆知之則裊生師內萬室皆空艱於化緣肯綮難就不有徑志孰能修之且不固其根不理其源豈高棟大廡徒得輒而處之耶抑初召工選石他嶠內懷糾纏不泄於抱及就礱琢曲折勢狀自新於心目皆奇之陛級鏤飾若本天匠則陰沴浸徵陽火蒸鑠信無變泐以隳其初余謂庶幾乎既而甓翼廊楯前廡材石交結闕硎鐵好上符稱氣增名藍繇是賓車日來僉共嗟敬譽極樂者又何云乎噫大道汨而像設見彼誙誙然不知所歸汲不以茲耶其或嘻嘻族居不能以毫益豈慈聖之徒耶必為而忘之神不茲泥則遊外者亦何以誚余謂後五百嵗嗣佛子作佛事如恭者人無間然大中十四年二月二十一日敬亭僧清越記正言大中時沙門安國寺大達法師弟子正言自小入道謬列一作烈緇倫陪行伍今緣身嬰風疾恐僧務多有故用悟用三寶聖言所有罪障不敢覆皆消滅有少許貝親利充衆僧外請將自出錢買得廢安所在萬年縣滻川鄉並先莊並院內家具什物兼莊內若外若輕若重並囑授內供奉報聖寺三教談論首座答製賜紫大德兼當寺主有手下弟子李自遷並付莊悉是自出錢物買得盡不並諸同學等事並皆無分今法師為主一捨永捨生死綱維和上老宿大德徒明謹疏高間湖州烏程人出家開元寺後入長安住薦福西明等寺大中朝賜紫加號十望大德後歸鄉里卒於本寺此齋破除京中所得物猶未盡豈得更受相助錢物勞送此意便令却還本請檢納六日高間白延昭俗姓劉氏餘杭人咸通中鎮州保壽寺沙門師諱義元曹州南華人也俗姓邢氏幼而穎異長以孝聞及落髮受具居於講肆精究毗尼博賾經論俄而歎曰此濟世之醫方也非教外別傳之旨即更衣遊方首參黃檗次謁大愚其機緣語句載於行録既受黃檗印可尋抵河北鎮州城東南隅臨滹沱河側小院住持其臨濟因地得名時暜化先在彼佯狂混衆聖凡莫測師至即佐之師正旺化暜化全身脫去乃符仰山小釋迦之懸記也適丁兵革師即棄去太尉默君和於城中捨宅為寺亦以臨濟為額迎師居焉後拂衣南邁至河府府主王常侍延以師禮住未幾即來大名府與化寺居於東堂師無疾忽一日攝衣據坐與三聖問答畢寂然而逝時唐咸通八年丁亥孟陬月十日也門人以師全身建塔於大名府西北隅敕諡慧照禪師塔號澄靈合掌稽首記師大略住鎮州保壽嗣法小師延昭謹書知宗咸通中沙門師諱道宗俗姓田唐千牛將軍賓庭之後元和九秋師年弱冠於燕庭金閣寺受戒禮志敬寺如琳為師後至永泰大師所與師契合謂師曰薊門舊里田盤靈山可搆淨居師蒙指教驚喜難名太和二年屆盤山峯頂多逢獸迹莫面人蹤境類虎溪地蟠龍腹師止棲處所如在四禪柏茶半斤稻米數斗二年所食一半猶存皎月銀河借為燈燭松風石溜指作笙簧息煩焰於塵塗瑩戒珠於巖岫曾遊絶嶽墜地無傷山現蓮池龍降香水猛虎每蹲於坐側巨蛇長繞於階前一上雲嶺兩更嵗華偶因樵采之夫始見住持之迹初傳鄉里漸達州邦千里風聞四衆雲集方伯太尉相國清河張公仲武遙瞻道德渴想音徽專飛簡章特有招辟師以松蘿誓節雲水堅懷三十九年不下棲隱侍中清河張公允伸大闡釋風遠欽道行頻馳清奉纍降尺書命建豐碑以崇盛德於是沙門知宗撰文節度判官梁知至書石咸通七年暮春之月師化緣時畢説偈整衣悄然靈脫至咸通九年茶毗於靈壇獲舍利數千塔於寺之東南隅詞浩乾符中京左街永報寺沙門妙覺出興廣宏利濟教演多途開聾除翳惟其尊勝三世佛心能慈能惠惟密惟深其力闕一字大其功頗徵塵沾影覆盡獲超升今之建置斯有所為資先考靈冥途永離神棲浮剎闕二字花闕一字三惡道閉七寶路通真空永入幻有長袪豈勞歷劫便獲無餘文貞中和時興禪寺上座大德以唐宣宗大中十二年春來燕選名寺以憩留嚮德者盈途青松節峻白雲志高侍中張公崇敬別卜禪居於遵化坊吉地闢開梵宇儼似蓮宮奉請賜額為善化登輝悟達國師門人昭宗龍紀時內殿講德賜紫滅六趣業震十方界既笵以考法響無礙惟唐龍紀元年十月十七日梓州三軍官吏百姓等以節度吳郡顧公繕甲治兵扈僖皇帝有功授鉞典我邦稱禮以監軍使樂安孫公輟自親侍撫吏民以法家財施命其季漢州刺史彥暉叔僧棲讓鑄重五百鈞以十一月二十六日懸像殿之右南敘景福中左街內殿講論兼應制大德沙門茲舍利者昔隋文帝潛龍日有梵僧自印土至授舍利一瓶曰此釋迦佛遺形耳檀越可為主洎登寶位年號開皇至草年改仁壽至仁壽二年壬戌正月敕天下大州一百處建舍利塔時幽州節制竇抗創造五層大木塔飾以金碧扃舍利於其下至大唐文宗皇帝太和八年甲寅經二百卅三年天火焚塔邇後五六年間武皇乃闕一字釋教至宣宗初登寶位嵗在丙寅敕修廢藍將興畚闕一字得石函於故基下時旌麾清河公曉示人天溥令供施遷藏於憫忠寺多寶塔下復經卅三載中和二年嵗在壬寅又值火災延憫忠寺樓臺俱燼旋遇燕闕一字陶汰空侶不期年隴西令公大王大庇生靈巨崇像設捨已祿俸造觀音閣橫壯妙麗逾於舊貫寺僧復嚴陳力化導塑觀音像當景福壬子年僉欲遷舍利於閣內乃陳辭上瀆請發封壤上許之即是年六月徒侶雲萃各竭其誠塵壒曜靈香坌人手未淹食頃俄逢巨函縫印香泥記鐫貞石繇是撤其蓋發其緘舍利光芒異香郁烈尋録狀捧金函詣子東門上獻旌幢中權後營皆澡闕一字沐心通宵瞻禮重沓襯施復還本寺顯示城隍道俗闕一字黃金瓶如牟麥量內藏一粒仁壽舍利也二粒在塔闕一字內又二粒在小金合子內又九十粒如銀粟狀在琉璃瓶內玉環二髮七綜金銅棺槨異香金義釧等今又有二粒舍利光彩甚瑩在銀結條琉璃瓶內即故臨壇大德明鑒平昔隨身供養臨終授弟子拪忍今同收函內矧夫聖日久歿遺形尚留為福人天堅固不壞幸遇王臣信重正法興隆同於寶坊載禮金骨而今而後何年更逢匪獨人心澆醨抑亦時侵末法重閟於此觀音象前谷變陵摧猶憑刊石記曰大燕城內地東南隅有憫忠寺門臨康衢中有寶閣橫雲嶪虛閣有巨象觀音聖軀當象之前緘於舍利外石函封內金函閟填以異香雜以珍器用記嵗年景福壬子亞棲洛陽人善書光化中賜紫凡書通即變王變白雲體歐變右軍體柳變歐陽體永禪師褚遂良顏真卿李雍虞世南等並得書中法後皆自變其體以傳後世俱得垂名若執法不變縱能入石三分亦被號為書奴終非自立之體是書家之大要澄玉天祐時中嶽沙門且夫疏山者貫造化之工為而有矣分地鏡而插天心用之則圓蓋方輿共為覆載攝之則橫河石阜饒借其形嶷峙堞而吹浮雲列澎流而走洪浪龍渦鳳翼萬象含虛牛首蛇岡千峯簇翠昔是周迪王分霸之場畚鍤基壘尚在連漪巴徼控截郡城襟帶七閩奇分五嶺自大中之初有儒士何仙舟棄爵藏名隱乎此地釣臺書榭基址篔簹有猛獸時來樵人懼矣荒榛之後立為道觀觀將圯墜延至僧居僧則未詳其字也道孤性靜茅室草菴獨而住矣時遇白丁攘辟鯨鰐相吞四海沸騰諸藩蟻聚郡無苛政民絶憀生至中和之初攙搶方定隨土所立為主帥矣掌領郡印貴在安民上貢不停乃有敕下封官寵優其爵令知郡矣即汝南危公也曰諷公乃寬而得衆強而有謀一鎮臨川三十餘載銷劍戟而為短耜化箭鏃而作長爐賦稅薄施俗無飢色至大順元年我大師領徒而至太守危公見而深加敬仰乃令都押衙前江州刺史曾公曰徒於阜郭山林僉居曾公遂驟駟而巡到茲山回對曰去此六十里有山曰書山是周迪王匡霸之地古儒讀書之場因而俗號也極而勝概堪作禪居汝南危公堅請而住大師允而居焉後改為疏山也師則廬陵郡淦陽人也俗隴西李氏其父在仕師自誕生之時紫胞異瑞龍章鳳質頗峻靈儀凡是俗茹不愜其情年至八嵗乃於一日而告親曰且夫雲羅霧縠癡愛著身銀箭金壺生死之本安能解脫矣乃往投於政禪師出家禪師則薯山大師上足弟子也師為立號匡仁自剃度給侍三五年間凡是教文深達其理後年登闕品至於東都鉢塔院集毗尼藏三年觀其文義洞達指歸乃嘆曰吾聞先德云離文字學吾今何滯乎遂以布毳芒鞋巡遊請益乃聞高安之西有山曰洞即新豐是也有大善知識衆五六百而可往之師以言險路峻凡有問者失其機矣我大師此時遂扣之故知道合符契一聞十悟得大總持譬如兩鏡對明終無異照鋒鋩相㰌彼亦何虧乃駐泊法筵纍經炎燠至咸通十有一載方乃出山南造大溈又成淹泊至乾符嵗屬庚子聞廬陵有山號嚴田遂往開闢時禪侶相依乃告檀越李公曰衆既聚而山又薄居必難乎吾聞巴山聳峻貫屬臨川可往而遊乎至中和三年方開巴山白雲禪院檀越朱公為遏邊使師又告曰山深地冷時植不收僧衆漸多難為供饋遂出山見太守危公公乃延請而住茲山矣師退而讓之公曰佛尚不違衆生之願師何得讓乎乃允而住焉遂以芟剃蒿蕪基平峙瀆翦擎雲之梓斫嶰谷之琅玕重簷將鳳翅而齊飛謺石與龍頭而並舉崢嶸寶殿疑從兜率飛來精粹金容真似天宮降下窗連碧岫時跨虹霓門枕郵亭日明螮蝀宵扃戶牖聞疏磬之三聲曉卷簾櫳見長江之一帶奇分閬苑壯若蓬壺麻姑之仙鶴時來乳洞之靈香不散名花異草四季長存高節禪流五湖併集汲用既廣事有闕緣水磨山泉久銷人力衆議取備乃就其工鵝管流通走歸皂棧靈材築險勢截秋江鏗輷而斗轉輪飛岌嶪而雷奔電卷桄榔闕色不異蘇山諸緣且置饘饋尚微師曰秋稼如雲自乏東皋之分故知水月相映啐啄同時乾寧甲寅嵗春乃有上饒郡太守汝南危公曰昌公即臨川刺史之季子也隼旟闕筆盡掌虎符乃心捨祿下水田莊一所並火幕牛犢等永充常住為供衆僧之齋粥矣師曰如來出世道蓋恆沙吾今資生未聞帝耳時有京堂後官虞公武夷人也自閩回歸京朝覲因假道歇駕而來禮敬師焉公尋便結駟而辭曰師之所住院額何無師曰茅屋草菴逐時難擬公曰到京之日專為奏置焉後乃有敕下賜為疏山白雲禪院額并隸僧一七人住持貴在焚修寶剎轉正法輪沐浴皇風永延國祚師曰人無心於物萬物未嘗無符契之緣自然而已時有袁州牧鍾公曰時即洪州廉使之子也公以懷善心在求因於佛乃捨洪鐘一口入院莫不鏦錚簨簴振海上之清音蹻躩蛟龍闕天邊之落月又潯陽太守潁川陳公曰卓公以身居王務無暇禮延乃素幅寫師真用飾瞻敬並捨俸祿之財於江之西南隅去院各十里置莊兩所一曰西莊南號佐俄是也後以風俗所談聞而益敬乃有軍事押衙李勛常來請問師曰凡俗進修且以福智二嚴得為釋梵報矣後忽言弟子有小莊近院之北願捨入常住師乃受矣無何否泰不時星臨郡壁秣馬利兵之衆強敵而來師嘗欲遊山果行止此時遂往福船南連嶺界漸遠舊址聲徹閩城廉使琅琊王公曰知望風而敬乃以差僧三人賫持箋疏虔請衆欲就而師曰臨川太守危公特遣軍將隨行侍衛又安能就請矣天祐五年春師却返故山緑蘿青靄早拂簷楹禪徑苔陰欲平履迹至天祐六年淮海統兵收復當郡危公公既陷而軍將散矣師端居丈室不欲離雲左右侍衆堅舁而去師曰且釋迦遇金鏘馬麥之難復何往乎乃憫衆而出曰數半旬便回歸院矣自郡城部屬淮南除替官資不停周至孫孫至劉劉至隴西李公盡申虔敬並為外護檀主李公曰德誠捨俸祿之財於山之東置莊一所永充常住之齋粥矣師其年七十有三化緣將盛僧匡七百衆矣其有扣敵者如攘芥投鋒承機者若澄油瀉鋌其有所主張院事盡是挺持之人前替後來無非強幹衆多德行不可一一標名時有僧可圭杖錫離雲循環梁苑旋之東洛謁見前建州刺史隴西李公曰肅公乃建安人也以文華居身進士及第纍遷官品敕與郡符公不副任後轉為檢校司空知租庸發運使矣公聞師道化如蜂聚王乃問僧可圭曰山門事力有何闕乎對曰知識所居山記塔銘二俱未備公曰願為置矣遂捨帑藏之財與僧歸山而置之矣師令余為文澄玉才非刻鶴藝拙雕龍無愈頭五十紙之書乏洗眼一千行之頌所冀年移代寖勒為不朽之工烏日元霜永鎮蓮宮之界乃為記矣
