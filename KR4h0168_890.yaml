front:
  text: 全唐文欽定全唐文卷八百九十藝仕蜀後主為翰林學士
  hash: sha256:78cb35cf7932b5ff529a69a3998bea0aa7b3daa23d8c32b422fc4ccdbfba48b9
  markers:
  - {type: head, offset: 13, content: 鄭藝, id: KR4h0168_NFKB_890-h1, level: 1}
body:
  text: 臣嘗讀唐書竊覩太宗每以為將致治平必先仁義得賢則理失人則危可鑒格言足徵邃古豈不以化馴易服威束難齊哉然農戰交修德刑共舉將亂也其政必隳將弊也其風必佻將圖九合之威亦賴五臣之佐苟虞害衆莫若任賢視今可以知昔矣高祖皇帝以汴賊弒君唐朝絶嗣左袒罕聞其歸漢同聲皆倣於吠堯上下相蒙酣為醉國寰區之內億兆無依競陳推戴之誠願正君臣之位難違衆欲遂啓丕圖戡禍亂而俟中興協會盟而歸大國為蜀之帝報唐之恩明孝皇帝受命之六年天清地寧珠連璧合肇修人紀於變時雍至若皇墳帝典之精河圖洛書之奧步驟於羲軒之際損益於文獻之間不然何其盡美盡善之如是也遂使蠻夷向化吳越輸珍麟鳳效祥草木呈瑞矧復英賢間出俊乂羅生上猶以為未也方且思聖父勤求登用才哲循名責實較德論功沮勸有謀黜陟不濫鑿乾締構允歸睿作之功壽國陶鎔必有挺生之佐式扶昌運對越上元由是中外文武將相公卿洎庶尹庶史各率厥職奉若天旨越正月武德軍將校吏民緇黃耆艾等列狀詣護軍使請以節度使徐延瓊德政上聞願勒碑紀且以借留為請上憂勤庶政以百姓為心凝旒稱嘆者久之謂翰林學士藝曰朕司牧元元將開壽域使國內郡縣治行皆如梓潼朕何憂哉夫吏久於官古之道也况衆欲之乎朕既俞其請矣卿為我托其懿實播無窮之聞以塞民望微臣奉詔恐懼敘曰臣聞龍飛九五山川效雲將之靈鵬擊三千風水運波臣之化雖復同心同德雅資十亂之功乃聖乃神永賴八元之佐內則皋夔協贊外則方召專征神謀且貞師律具有兼膺注意宜屬宏材此我皇帝之御宇也丕顯帝圖顧茲天力四神踐雪五老飛星投綸負鼎之賢爭伸宏業委輅請纓之士競奮深機蕙帳空而明月常孤蒲輪至而清風自激猗歟雖居宣武之間未若我朝得人為盛也其或家連戚里身陟齋壇益揚謙損之風靡見驕矜之色功超賈鄧政邁黃韓有若武德軍節度使徐公斯可謂一時之英也公名延瓊字敬明東海剡人即國之元舅也世緒標奇門風襲煥鎮為峯鼎用作雄鋩父子則貴比金張兄弟則政同魯衛騰八龍之聲價齊一鳳之羽儀阮竹皆芳田荊並茂金相玉印各炫晨葩虎節獅壇共觀晝錦徒思遍舉抑亦倦談公王父唐京兆武功縣令追贈尚書左僕射太師高平王政績頻彰勳華早振自激封侯之志夙垂濟世之名並西晉殊功勞連邸第南朝雅望地顯官婚貽謀各著於承家致用皆光其佐命朱輪華冕豈獨推恩甲令門風實先種德是賢奕葉孰與提衡歷佐昌朝宜鍾異氣公中邱會秀大爽炳靈幼挺英姿夙彰雅操稟説禮敦詩之教蘊經文緯武之才欲紹家聲遂參戎右敵國相吞之候決在毫釐陰符必勝之機制於掌握雕戈寶鼎門崇八命之榮玉帳金壇神授六韜之妙故能名高大國業嗣良弓輕鎮北之無文恨征南之不武圯橋靈叟謂謀略之可傳汶水神翁知功名而必立自繼膺睿眷兩踐渙符四封無刁斗之音千里有袴襦之詠政成剖竹擁重執金掌領孤兒每警巡於晝夜扈隨大駕遠鎮定於邊陲才復六飛將分雙節上以郪城奧壤潼水名區粵自艱難久罹瘡痏獄市無寄杼軸皆空㣥盜猖狂幸寇恂之去日遺黎憔悴望郭汲之來時不有改張何其俾乂爰求賢帥式愸雄藩乃授公武德軍節度使公攬轡遄征下車畢理彈壓豪驁封殖疲癃究本尋源提綱振領害於人者雖大必去利於人者雖小必行嘗謂人曰法者政之要也不可不峻其隄防禮者教之本也不可不謹其律度食者民之命也不可不勤其稼穡兵者戰之器也不可不肅其號令率是四者盡其一心上可以翼衛朝廷下可以儀刑藩翰吾得之矣爾其觀焉公以管內數多亡命姑務偷生久聚萑苻常為虺蜴狡穴皆依於窮谷妖巢各恃於幽林化之不悛來而復叛郡邑虞其蹂躪路歧苦於敓襄攴公密運良籌周旋峭格盡投私罟皆挾禍胎益其戎兵誡其強吏商旅無滯貢奉罔艱王尊申京兆之威龔遂去潢池之患勞徠罕倦蕩析咸歸動有常規賞無橫費上勤時貢下贍軍須月未及其授衣士已欣於挾纊賑其匱乏釋彼愁顏幸夜犬不驚宵魚自放哀矜庶獄慎恤惟刑赭衣盡伏其神明丹筆立分其情偽絶加等之聚斂革無名之征徭平衡不謬於錙銖嘉量罔欺於圭撮公又仰稽前古俯瞰遺蹤思棗祗闢地之謀味韓浩屯田之計膏腴靡棄黍麥頻豐夢果應於牧人利可資於寡婦貢賦加倍獻奉相望又嵗別進軍食因沃潤之鄉置牢盆之務商徒繁會官帑委輸檢吏通民機能制用矯時阜俗儉以率先貫天錢而已應星文認寶氣而已有雄劍闕來奏課連最聞薤本可留足表富人之術芋區難並咸知濟物之方公以鳴社嘉辰繞樞令節祈聖壽有莊嚴之懇祝宗祧於降誕之期自捨俸金於惠義寺構華嚴大閣向者公府未完軍衛莫稱於是載修輪奐別創規模庭架虹梁門羅虎戟層樓燕賀偏增鼓吹之雄廣厦翬飛益動旌旗之色路當衝要地控都畿使車晝夜以交馳候館往來而宿餉每傾公帑用飲賓筵休聲洽聞靈貺昭感紫芝三秀黃犢並生天唯發祥地不愛寶迥掩得禾之異果符登麥之文歌德詠仁言將不足含和吐氣樂固難名大矣哉公之問俗觀風阜財述職焉可得而稱也爵賞既行中外同喜遂册拜中書令趙國公加食一千戶通前五千戶公嶽降標奇星精稟異溫如圭璧郁若椒蘭智合韜鈐言無鈎距運籌決勝荀攸可比於良平仗鉞祓威謝艾足同於方召研幾昭禮植操資忠允武允文多材多藝軍中講學馬上注書揮刀則立覩飛泉盤弰則惟聞折樹而又貴不自滿謙而益光饗士投膠延賓比飯帳下之犀渠貝胄咸感吮癰樓中之螓首蛾眉寧矜笑躄閨門密行簪組美談里巷相觀風雲動色宸衷夙注寵詔已行致闔境之允諧固本朝之是衛况家豐懿戚治陟殊尢心膂連營蓄雷霆於北落股肱重鎮寄柱石於東川克副分憂合膺異渥宜其珉麗德瑩檢圖功懋績著擁旄化行偃草比屋而乞留侯霸叫閽而願借耿純詎可使螭首翠碑未披文而相質麟臺彩筆不寫照以傳神臣志慕陽秋工非潤色仰遵睿旨敢述殊勳曾無少女之詞豫怯中郎之鑒所冀陵遷谷變尚窺沈水之文地久天長永覩生金之字謹為銘曰金行啓運鼎業鑿乾麟御瑞紀鳳舞昌年層潤浩注國祚遐延光凝寶匣福靄祥編上哲繼文皇圖增煥得一踐羲登三轢漢懿綱牢籠大罏真觀宗社還資微明接旦太虛寥寥中有元精麗物為瑞麗人為英英英徐公為氓而生脂膏不染獄市無驚智勝兵強化行民附屢立奇功繼膺寵數帝念徐公聿齊其務乃眷梓潼并有饒賦公至若何時雨雱雨水它枯苗濯穎涸轍騰波摧姦禁暴刓弊止訛襁負而至動植興歌八政何先以食為天臥鼓勤農免胄服田耒耜接肘臺笠摩肩閭閻風靡稼穡雲連衆害既去纖惡皆除頒宣化育慎恤刑書徽纆自朽囹圄常虛輕徭薄斂政協蒲盧老安少懷遠至邇肅風雨時若家給人足戶溢版籍賦登公牘儲峙孔多貢輸相屬神明之正誰為之師公之俱美福祿攸宜位隆鳳詔恩注龍墀梓人頌德天子嘉之爰命荒墟奉揚馨烈揚子神疲江生思絶涪水東注銅山西揭帶礪無期永旌賢哲鍇字鱣祥天復時奉使西川因留蜀官翰林學士遷御史中丞武成二年除中書侍郎同平章事後唐莊宗滅蜀入洛陽官刺史臣先人受鉞坤維作藩唐室一開土宇垂四十年屬梁孽挺災皇綱解紐不能助逆遂至從權勉徇輿情止王三蜀固非獲已未有所歸逮臣纂紹罔敢怠遑自保土疆以安生聚陛下嗣唐虞之業興湯武之師廓定中區奄征不譓梯航畢集文軌大同臣方議改圖便期納款遽聞致討實抱驚危今則委千里封疆盡為王土冀萬家臣妾皆沐皇恩輿櫬有歸負荊俟罪望回日月之照特寬斧鉞之誅容佇德音以安反側儻墳塋而獲祀實存沒以知歸臣無任望恩虔禱之至伏以羲皇演卦神農造書陶唐克讓是昌禮樂有虞濬哲乃正璇璣禹湯文武功濟天下故能卜世延遠垂裕無窮逮乎六國諸侯力征秦滅墳典以愚黔首遂使聖人糟粕掃地都盡漢承秦弊下武尊文蕭何入關唯收圖籍文帝修學校舉賢良海內晏然興崇禮義景帝躬履節儉選博士諸儒以備顧問麟書鳳紀填溢於未央玉版金繩充牣於祕府班固曰周稱成康漢稱文景宜哉武宣之世乃崇禮官開金馬石渠之署以議典禮樂置協律之官以分雅鄭公卿大夫間作於世或紓下情以通諷諭或宣上德以盡忠孝孝成之世奏御者千有餘篇獻納論思之盛敻古罕比世祖承喪亂之餘龍驤宛葉去暴誅亂拯溺救焚寬以用人明以率下兵革既息寰海乂寧乃起立太學招致鴻碩㣥臣每有奏議必命史官撰集以傳後世數引公卿講論經義夜分乃寐不以為勞孝明師事桓榮躬親文墨朝誦夜講明達過人孝章崇尚文儒有太宗之遺風嘗於白虎殿會集㣥儒推演乾坤考合陰陽上申聖人下述品物參於傳記內別六經若披浮雲而覩白日設華燈而入暗室詔元武司馬班固纂集其事名曰白虎通魏武博覽㣥書特好兵法鈔略書史名曰節要又注孫子十三篇尢好篇詠動為典則文帝八嵗能屬文博覽古今貫穿經史及居帝位益尚謙和坐不廢書手不釋卷晉宣博學洽聞服膺儒教當曹氏中微總攝百揆萬幾之暇未嘗廢卷景文之間咸重儒術宋高祖豁達大度涉獵典墳討伐之中亦重文墨文帝博涉經史尢善隸書每誡諸子率以廉儉南齊高帝深沈大量清儉寬厚嗜學好文曾無喜慍常曰學然後知不足余恨無老成人得與周孔比德兼善草隸有飛動之勢梁武該博多聞有文武之略在位冬月秉火執筆手為皴裂諸子悉有文藝聚書討閲晝夜忘疲元帝好易韋編三絶東閣聚書十四萬卷象牌玉軸輝映廊廡陳武倜儻雄傑過人窮究兵書耽玩史籍文帝留意經典舉動端雅後魏道武立臺省興儒學五經各置博士講問如市孰序成林北齊有文林學館周武帝保定中書盈萬卷平齊所得才至五千卷置麟趾殿學士以掌著述隋平陳之後牛宏分遣搜訪異書經史漸備凡三萬餘卷煬帝於東都觀文殿東西廂貯書寫正副各五十分為三品除祕書所掌而禁中之書在焉唐高祖統一區宇剗革暴隋六合宅心四海歸德躬行仁義以息亂階太宗神睿聖文天資英武嘗在藩邸命博學之士房元齡杜如晦等一十八人為秦府僚佐大較儒術廣聚經史及居帝位隨才擢用於是宏文館皆置學士元宗開元五年於乾元殿置修書使召學士張説等宴於集仙殿東廊下寫四部書以充內庫麗正殿置修書使又召學士張説等宴於集仙殿改名集賢其修書使為集賢殿學士自是圖籍不獨祕書省宏文崇文館皆有之集賢所寫則御書也分為四部一曰甲為經二曰乙為史三曰丙為子四曰丁為集兩京各一本共二萬五千九百六十卷經庫書白牙軸黃帶紅牙籤史庫書青牙軸縹帶青牙籤子庫書紫檀軸紫帶碧牙籤集庫書緑牙軸朱帶白牙籤以為分別以大學士專掌之歷代以來咸有祖述廢置沿革或有差異今但略舉帝王故事及祕書之職幸冀垂覽焉纂桐廬人一云長沙人唐左拾遺蛻子仕蜀歷任禮部尚書國亡復事孟氏下之從上如風偃草以仁義理法化之則為謹願之行以驕奢淫佚化之則為狂薄之俗今一國之人皆效醉粧臣恐邦基頽然如人之醉而不可支持也禹卿成都人蜀乾德四年對策擢右補闕出為秦州節度判官國亡從後主入洛陽後主被誅題詩驛門逃去不知所終臣禹卿頓首死罪臣聞堯有敢諫之鼓舜有誹謗之木湯有司過之士周有戒慎之鞀蓋古者明君克全帝道欲知己罪要納讜言將引咎而責躬庶理人而修德陛下自承祧秉籙正位當天愛聞逆耳之忠言每許犯顏而直諫且先皇帝許昌振迹閬苑興師歷艱辛於草昧之時受危險於虎爭之際胼胝戈甲寢寐風霜申武力而助中原立戰功而平多壘亡軀致命事主勤王方得成家至於開國今日鴻基霸盛大業推崇地及雍岐界連荊楚信通吳越威定蠻陬郡府頗多關河甚廣人物秀麗土産繁華當四海輻裂之秋成萬代龍興之業陛下生當富貴坐得乾坤但好歡娛不思機變臣欲望陛下以名教而自節以禮樂而自防修道德之規受師傅之訓知社稷之不易想稼穡之最難惜高祖之基模似太宗之臨御賢賢易色孜孜為心無稽之言勿聽弗詢之謀勿用聽五音而受諫以三鏡而照懷少止宿於諸處林亭多歷覽於前王書史別修上德用卜遠圖莫遣色荒無令酒惑常親政事勿恣間遊臣竊聞陛下欲出成都看於邊壘且天雄地遠路惡難行險棧欹雲危峯插漢稍雨則吹摧閣道微泥則阻滑山程豈可鳴鑾唯堪叱馭又復秦州敵境咫尺塞邑荒涼人雜羌戎地多疫瘴別無風華異境不可選勝尋幽隴水聲清邊笳韻咽營中只帶甲之士城上宿枕戈之人看烽火於孤峯朝朝疑慮覩望旗於絶嶺日日隄防是多山足雲之鄉即易動難安之境麥積崖無可瞻戀米谷峽何足聞知縱過嗟山須通怨水秦穆圉馬之地隗囂僭位之邦其次一人出行百司參從千㣥霧擁萬衆星馳當路州縣凋殘所在館驛隘小止宿尚猶不易供需固是極難縱若宮中指揮自破屬省錢物未免因依擾踐觸處凌持以此細論不合輕動其類蒼龍出海雲行雨施豈合浪靜風恬必見傷苗損物所以鑾輿須止天步難移况頃年大駕只到山南猶不下關進發兵士此時直至天水未審制置如何當初打破梁原城池鹵掠義寧戶口截腕者非一斬首者倍多匪惟生彼人心而亦損茲聖德今去洛京不遠復聞大駕重來彼則預有計謀此則便須征討况鳳州久為讐敵必貯姦謀切慮妄指妖詞致生釁隟又陛下與唐國方申歡好信幣交馳但慮聞道聖駕親行別懷疑忌其事專差使命請陛下境土會盟未審聖躬去與不去若去則須似秦趙爭強彼此難屈若不去則便同魯衛不睦戰伐滋興酌彼未萌料其先見願陛下思忖臣伏聞自古皇帝省方巡狩弔民伐罪展義觀風然後便歸九重別安萬姓陛下纍曾遊歷未聞一件教條止於踐履山川驅馳人馬閬苑則舟船幾溺青城則嬪婇將沈自取驚憂為何切事及還京輦並不説於軍民迫鬱衆情莫彰帝德憶昔先皇帝在日未有無故巡遊陛下纂承已來樂意頻離宮闕此時依前整蹕又擬遠別宸居昔秦王之鑾駕不回煬帝之龍舟不返陛下聖逾秦帝明勝隋皇且無北築之虞焉有東遊之弊陛下寬仁大度廣孝深慈知稼穡之艱難識古人之成敗自防得失不縱襟懷豈忍致却宗祧闕二字道斷使蒸民以何託令慈母以何辜若不慮於危亡實恐乖於仁孝况玉京金闕寶殿珠樓內苑上林瑤池瓊圃香風滿檻瑞露盈盤鈞天之樂奏九韶回雪之舞呈八佾簇神仙於紫禁耀珠翠於皇宮如論萬乘之君便是三清之境人間勝致天下所無時或追遊足觀奇趣何必顧於遠塞看彼荒山不惜聖躬有何裨益方今中原有人大事未了但當國生靈受敝盜賊橫行縱邊庭無烽火之虞而內地有腹心之患陛下千年膺運一國稱尊文德武功經天緯地孝逾於舜仁甚於湯百行皆全萬幾不撓聰明博達識度變通深負規模獨懷英鑒方居大寶正是少年既承社稷之基復抱山河之險何不視遠聽察居安慮危闢四門以求賢總萬幾而行事咸修一德端坐九重使恩威並行賞罰必當平分兩路遍療瘡痍庶表裏寬奢保子孫昌盛布臨人之惠化蓋救物之元功選揀雄師思量大計振彼鴟張之勢壯茲虎視之威秣馬訓兵豐糧利器彼若稍有微釁此則直下平吞正取時機大行王道自然百靈垂祐四海歸仁衆心成城天下治理今則蜀都強盛諸國不如賢士滿朝聖人當極臣願百姓樂於貞觀萬乘明於太宗採藥石之言聽芻蕘之説愛增社稷醫療君民同武王諤諤而昌鄙商紂唯唯而滅無飾非拒諫之事有面折廷諍之人固我春朝保我皇化陛下莫見居人稠謺謂言京輦繁華蓋是外郡淩殘住止不得所以競來湊集暫且偷安今諸州虐理既多百姓失業欲盡荒田不少盜賊成㣥伏乞陛下稍布腹心即當聞見蜀國從來創業多乏永謀或德不及於兩朝或祚不延於七代劉禪俄降於鄧艾李勢遽歸於桓溫皆謂不取直言不恤政事不行王道不念生民以至國亡人心何保山河之隘不足為憑陛下至聖至明如堯似舜豈後主而相匹豈子仁而比倫有寬慈至孝之名有遠見長明之策不信倡媚不耽荒淫出入而所在防微動靜而無非經久必致萬年之業終為四海之君願陛下且駐鑾輿莫離京國候中原無事八表來王天下人心咸歸我主若㣥流赴海衆蟻慕羶有道自彰無思不服匪惟要看天水直可便坐長安是微臣之至懇舉國之深願也臣聞昔者天子有爭臣七人雖無道不失其天下是以輒傾丹懇仰諫聖明不藉官榮不謀名譽情非訕上理切愛君雖無折檻之能但有觸鱗之罪不避誅殛爰叩天庭臣死如萬類之中去一螻蟻陛下或全無忖度須向邊陲遺聖母以憂心令庶寮以懷慮全迷得失自取疲勞倘有不虞悔將何及臣願陛下稍開諫路微納臣言勿違聖后之情且允國人之望俯存大計莫去邊陲干犯冕旒無任憂惕冒死待罪激切屏營之至謹奉表直諫以聞臣某誠惶誠恐頓首頓首死罪死罪謹言今朝廷所行者皆一朝一夕之事公卿所陳者非乃子乃孫之謀暫偷目前之安不為身後之慮衣朱紫者皆盜跖之輩在郡縣者皆狼虎之人姦佞滿朝貪淫如市以斯求治是謂倒行
