front:
  text: 全唐文欽定全唐文卷六百十六簡字幾道德州平昌人舉進士登宏詞科元和中累官太子賓客分司東都長慶三年卒
  hash: sha256:e11739de783fdfe7f543bda6fe16a2d968b998df5e735018e098465444b92c17
  markers:
  - {type: head, offset: 13, content: 孟簡, id: KR4h0168_NFKB_616-h1, level: 1}
body:
  text: 驗白烏之祥牒告皇家之寶祚蓋由天子張至仁本太素享宗廟而無爽薦孝敬而有度何常日浴飜皓體以來儀曾異火流奚丹羽之可慕凌翯翯之白烏類振振之翔鷺稟純德而自甄誠眾色之難汙觀其皎皎奇狀明明麗質霜毳潔朗玉姿閑逸不愛其瑞嘉載飛之可瞻思效其祥見莫黑之如失寧爰企於往代可俯窺於今日原乎孝理通元格皇至虔惟烏感應其容昭宣抱正色而道洽從反哺而名全不然則有威鳳之可紀何白烏之是傳樂而有聲且不棲於楚幕潔而成質故自協於靈篇出林而日華亂動繞樹而月影相鮮嚮至化而遠集想皇風而戾焉眾而何為悲子生之八九大而無慮笑水擊之三千爾其超遙高翥來不可遏見歸飛之薦臻誠愷悌之四達諒深仁之所化固至性之難奪若乃載鳴嗷嗷浮彩皓皓受西方之精氣自洪爐而鎔造遐想其蒼赤呈祥豈與乎雪霜同縞且夫仰稻粱而自若彼徒籠夫僊鶴待馴狎而不還何必招於白鷴且養素而委質非取容而強顏故下臣賀瑞而歌曰素德式昭兮何舄奕元質從化兮為潔白符仁孝兮叶往冊見祥瑞兮流聖澤薛陟不知典教豈辯賢良驅遣健徒憑陵國士殊無畏憚輒恣威權翻成刺許之賓何異吠堯之犬然以久施公效尚息杖刑退補散將外鎮收管太山諫卿受氣端勁為文雅拔由進士尉陽羨安定公愛其道直延為從事是時鄙夫次受辟書故得與諫卿遊處最密常記其撰南鎮碣彩章輝煥物象飛動當貞元之丁丑也迨元和甲午簡自給事中蒙恩授浙東道都團練觀察處置使薦遊此地歲十八返矣尋奉御祝有事於鎮求當時之碣則未樹立因訪太山之故吏乃得舊本爰徵樂石磨琢鐫刻流芳自此諫卿永貞年為讒賊所中謫居汀州今皇帝踐阼宰臣論其冤濫故福建廉使閻公得以上請復歷大理評事遽徵拜監察御史未經歲臺丞上薦不次遷侍御史以言語明切將酬相府且不入出為巴州刺史持逸㣥之才略瘳疲人之疾苦理行居最再移資州如巴之政今復為洋州課績大著噫共戴華髮相逢幾時所不間者頃以至人寶相淨樂之法更說迭講次真空處入性海道動於世間而不世間故可記也十年十月十日建垍字宏中河東聞喜人第進士貞元中賢良極諫對策第一元和初為翰林學士轉考功郎中知制誥累遷戶部侍郎三年拜中書侍郎同中書門下平章事加集賢院大學士罷為兵部尚書六年改太子賓客卒贈太子太傅臣聞格天周物之功繼統事難疑之績屬當興運則事顯一時貽之後來則名示百代是以舜謂盡善禹稱無間典謨斯在芳烈可徵雖垂訓必資於濬哲顧不朽亦賴之紀述伏以德宗皇帝臨御天下殆三十年躬勤庶政戡薙㣥慝消復厄運大拯橫流貞元之後天下無事亭障寢柝梯航獻珍納蒸人於壽域兼前王之能事加以聖政多暇睿文間作篆諸金石播於管絃扶持翼武之勳死節納忠之士亦猶星拱辰極雲從飛龍君臣協期事業光大宜當刊錄以垂無窮陛下掃清寰區恢復祖業執契求理思覿前鑒爰詔臣等俾加撰錄臣與修撰官祕書少監蔣武以去年八月論著絕筆勒成德宗實錄五十卷繕寫整飭今巳就功臣等學愧前修職叨東觀雖談天測海未究其高深而襃善貶惡靡慚其良直徒極搜采尚懼闕遺臣屬有犬馬之疾未任躬自獻上伏以國之大典夙奉德音編簡既終稽慢為罪其實錄五帙五十卷并目錄一卷謹隨表獻上衣者蠶桑也食者耕農也男女者繼祖之重也而二教悉禁國家著令又從而助之是以夷狄不經法反制中夏禮義之俗也傳曰女子十四有為人母之道四十九絕生育之理男子十六有為人父之道六十四絕陽化之理臣請僧道士一切限年六十四以上尼女官四十九以上許終身在道餘悉還為編人官為計口授地收廢寺觀以為廬舍汾陽事上誠藎臨下寬厚每降城下邑所至之處必得士心前後遭罹倖臣程元振魚朝恩譖毀百端時方握強兵或方臨戎敵詔命徵之未嘗不即日應召故讒謗不能行代宗幸陜時令以數十騎覘賊及在涇陽又陷於胡虜重圍之中皆以身許國未嘗以危亡易慮亦遇天幸竟免患難田承嗣方跋扈魏州傲很無禮子儀嘗遣使至承嗣西望拜之指其膝謂使者曰茲膝不屈於人若干歲矣今為公拜李靈曜據汴州公私財賦一皆遏絕獨子儀封幣經其境莫敢留之必持兵衞送其為豺虎所服如此麾下老將若李懷光輩數十人皆王侯重貴子儀頤指進退如僕隸焉幕府之盛近代無比始與李光弻齊名雖威略不逮而寬厚得人過之歲入官俸二十四萬貫私利不在焉其宅在親仁里居其里四分之一中通永巷家人三千相從出入者不知其居前後賜良田美器名園甲館聲色珍玩堆積羨溢不可勝紀代宗不名呼為大臣天下以其身為安危者殆二十年校中書令考二十有四權傾天下而朝不忌功葢一代而主不疑侈窮人欲而君子不之罪富貴壽考繁衍安泰哀榮終始人道之盛此無缺焉唯以讒怒誣奏判官戶部郎中張譚杖殺之物議為薄逢吉字虛舟隴西人第進士德宗朝以薦為左拾遺元和中累遷中書舍人加朝議大夫門下侍郎同平章事罷為劍南東川節度使穆宗立拜兵部尚書復知政事敬宗朝封涼國公兼右僕射出為山南東道節度使徙宣武召拜左僕射兼守司徒大和九年卒年七十八贈太尉諡曰成皇唐之與伊唐也濬哲文思異代同時咸進善以欽若又建旌以求之不進善焉何以延側陋之士不彰別也何以嘉讜正之詞是宜式創宏模聿陳令典綴析羽以藻耀植修竿之偃蹇相其地以崇樹所宜因其人以康莊是踐即之者有以翊聖瞻之者於焉遷善忠謇之徒風馳雲趨畢效臣節同膺帝俞猶金礪而君臣合契類土圭而形影相符迴立岧亭而克同國柄直行勁挺而自陟天衢由是悉索草茅罔資介儐高懸垂逮下之德仰視知不言之信咸策足以員來思捐軀而自徇同於舞羽至誠之感必臻異彼弨弓非禮之招不進大哉求仁其必有因懿此標表本乎諮詢制其事者上惟允恭之帝集其下者眾皆可封之人是必隨謗木以用舍與諫鼓為等倫若夫容衞繁多制度奇詭元蛇始務其厭勝翠鳳式崇乎侈靡熊虎之示勇則那日月之比崇徒爾寧有裨於啟沃且無取於率俾偉夫有臺有宮胡為乎途中所以闡於聖聰使無不通爰樹爰揭豈惟乎人悅所以尊彼雋傑使皆就列然後朝廷邁德嗣於羲軒得賢方於稷契躬好問之裕有知人之哲固以日奏於嘉言矧斯旌之攸設維寶歷元年歲次乙巳四月甲戌朔二十日癸巳攝太尉銀青光祿大夫檢校右僕射兼太子少師上柱國天水郡開國公食邑二千戶臣趙宗儒及文武官六千五百四十一人等言臣聞自古王者之御極也必上奉乎天地丕承乎廟祧法天地所以宅八紘嚴宗祧所以垂萬葉非休聲震越不足以齊燾載非尊稱超卓不足以光祖宗則名實之際不可誣也肇自上古質文未具號兼三五事本嬴劉其後正閏相承南北更王僉事因襲而罔圖旌別苟鴻猷既洽徽數莫申貽諸裔昆靡所稱謂抑當時臣子之罪非所謂納君於善者皇唐列聖備有典常高宗而降代享丕號以至於元宗之治平肅宗之盪定德宗之烈文憲宗之戡翦先聖之克荷重熙累盛震邁古昔未有不由斯者已伏惟皇帝陛下濬哲自天寬仁在躬聖齡方富睿德咸稱行懋於朱邸聲飛於青宮始踐阼而虞舜之大孝聞焉既郊天而文王之小心著焉竭愛敬於西宗疑示儀刑於四國慎柬名傅優寵直言自嗣位已來百度維新九圍式敘邊烽罔不罷屬國罔不來靈化有肸蠁之助風雨無伏愆之候至元至賾可勝道哉由是百辟㣥司耆儒碩士文武臣庶緇黃幼艾殊形一心異聲同辭隳肝瀝膽元上徽稱其誠至矣吾皇猶惕然三讓不得已而俞焉斯謙尊而光卑而不可踰者也夫經緯天地曰文則二儀交泰矣克定禍亂曰武則八蠻順軌矣格於上下非聖歟通乎神靈非孝歟臣等恭考庶言強名聖德不勝大願謹奉玉冊玉寶上尊號曰文武大聖廣孝皇帝伏惟陛下祗上帝之眷命荷累聖之儲休外順四夷內從百辟時承昌運昭受鴻名然後躬大易不息之義思禮經日新之旨鑒拜休之至誠考無過之格言以緝熙庶績重其文以斥去㣥邪盛其武以目達四聰載大其聖以慎守九廟益廣其孝克儉克勤有初有終所疎者佞所近者忠畋遊必省獻替必從無忘我高祖太宗之丕烈以永家邦臣宗儒等誠歡誠懼頓首頓首謹上匡廬之秀粹於眾嶽五老之英奇於眾峰謂泉嵐卉木煙靄之性和而利福茲收居無鬱厲無翳勃之害於物也大哉上上疑之清寧之境耶吾頃年奉家君牧九江得從白鹿先生濬之遊觀焉志羨則詠真之鄰也有獅子峰下古傳謂幡竿源者其風清英泉石可依足以變昧職之歸真寧歟疑濬之導吾結隱室於是源而居誠以逃俗染溫智習飲超揚之味分浩然之氣也不得不為擇地而歸耶洎折桂上都選調分秩之後忘是境也嗚呼迅變十有三祀矣隱室有浮圖杜氏者守而燕葺焉杜氏泛道者之譽熙熙焉亦久矣家君之夙契者浮圖真士也吾今罪走虔謺道取湓城思隱室逍遙之風悒悒滴淚杜氏訪吾迺喜色浮而恨痾釋半矣不復泉嵐之期誠快快乎隱室歸杜氏人與地相符則無虛擲也得杜氏言曰僧之居儒之居名其異也今君子隱居易為庵狀有年矣欲錫以名同日月數斯名無朽哉抑吾昔性識因地而清道業因室而精性清道精而名乃成本實無忌者吾門至行也室既為庵宜以折桂為名貞元辛巳歲六月十五日李逢吉述唐有天下仁聖奕葉文武重光憲章於古損益以正革去雜霸煽揚淳風於二皇三代有全德於周公孔父無違命獨以空門金人之教清淨叶於天綱孝慈禪於人紀考之經義則不悖施之帝典而可大式克惇尚許其踐修於是人知崇本家有清信空法匝於寰區真經侔於墳籍則道斯備矣凡彼列剎布於列郡而我三壇角於三都在西都曰靈感壇在東都曰會善壇在北都曰甘露壇洪惟適道之通軌歸心之真宅甘露壇在府之交城縣石壁寺清淨大苾蒭慎微稽謀之初欽若佛旨日將漸位地疑是繄禁戒惟厥授受必資壇場不嚴重何以肅凡心不精頎罔克迴聖鑒不宏闡曷足流大化不砥礪莫有就靈功且欲以齊二京之宏觀補是邦之闕典乃銳其戮力誓之以死蘄於高貲邸彼崇信入貨者波委就役者子來掘及九泉實以香土築之三層布以正礎殫山水之勝極土木之工功費鉅萬王褱奇莫二自貞元癸酉歲暨丁丑歲而能事畢是歲有事於靈壇凡數郡之內碩學舊德顓蒙之師大和會凡千里之外激節齎志去家之徒駿奔走自四月八日至二十四日而法會罷俾夫來者宿殖遽生聚舊汙闕清滌恆性鎮有守妄見寢不作至靈加之易外境汨之難精誠歆以交感凡聖忽其相接歡聲喜氣被於山谷休譽令儀播乎宇宙其大哉茲至道妙賾之無量無邊其魄疑見於事者可略而紀昔應身示滅像教爰布輪既三轉趨之不一而闕別道俗攝持身口莫疾於尸羅近世之弊主者有經費求者必執贐既叨懫而有交利之患顧怠惰而無與進之心則中途而北者十四五而大化斯蠧矧或師未善教而法禁廢弛事鮮成命而去取溷淆懿夫宏濟為心周給於眾則人以勸廷辯其能詳定其要則事有倫五載而一會使人跂之也萬眾而無擇使人趨之也謂東漢感夢以還釋流傳授未有盛於此者故自興作每多符應巨功方半景甚清霽甘露垂珠於草樹者三日以旌美志緇素同觀大眾日集時屬旱暵靈泉湧溜於山澗者數所以辦禮食賓主咸賴由是節度觀察使禮部尚書李公以文武中肅休勳懿行而志尚營道監軍使以勤敏寬仁長材曠度而性惟與善相與叶心同德表請錫名曰甘露無礙義壇且又降之素書用嘉襃美出其清俸以為賜予斯足以駭見聞而洽謠誦矣夫宏道設教得其人而後行前志又云天時不如地利禪師本姓齊氏薊人也姜水舊族漁陽德門界襲軒冕夙彰行義脫屣代祿奉身高驤初隸名本郡憫忠寺窮修多之藏究毘尼之學演律為粵主傳戒為常師了法之無住遊方而至止因感父德先后聆神鍾疑剏仁祠之勣嘉道綽大士精修禪觀躋淨界之風而峰壑崇邃林泉詭異據全晉之右壤面興王之舊京宜作聖域以嚴佛事亦既經始於焉肆勤綱維及寺之耆艾上首等率能奉法以慎身觀妙以咸性用充佐佑誕臻厥成則又知清行勝概之若此雖欲勿烜為宏圖而莫可已於是緇流俊賢搢紳諸儒洎清信士女百千人俱議欲刻石以存不朽弟子逢吉用六經之餘雅修無生而亦窺龍宮之祕故得以聖朝君臣之至化空門聖賢之妙道合而為頌以簡於後其辭曰釋氏之宗泊乎無為生殖光大眾妙攸依道號無涯智不得知誕設炯戒揭其宏規亦既潤色為之羽儀乃睠後賢異代如期持律之士若優波離能以厥躬為眾元龜亮直端潔宜作之師在法末流典制寢隳忘味輟寢誓志興衰乃經斯壇究盡瑰奇赴者如市來其如歸靈泉川流膏露珠垂佛日在上赤乎增輝穆穆聖君唐虞同時端拱思道而人畢隨京邑有三壇乎如之越有大賢鎮安朔陲請錫嘉名用光於茲既賜予矣襃之以詞緬懷元猷祇率皇威顯允都政真清道機萬有千年煇耀於斯
