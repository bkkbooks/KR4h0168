front:
  text: 全唐文欽定全唐文卷三百五十五昕字中明河南人少舉崇文進士再中博學宏詞科纍遷左拾遺哥舒翰為副元帥辟掌書記翰敗入蜀纍遷祕書監代宗幸陝轉國子祭酒大歷初轉工部尚書封晉陵侯德宗幸奉天遷太子少傅爵郡公兼禮部尚書以太子少師致仕貞元七年卒年九十三贈揚州大都督諡曰懿
  hash: sha256:de7b3130de9486fe162c62cf319aaf55fe0f39a31bfdb8d6ed69f7ae20c7dafd
