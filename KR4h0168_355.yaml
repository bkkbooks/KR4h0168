body:
  text: 大君嚮明神道設位恢三皇之軌物張五帝之經緯居皇極以體尊配升平而作諡上棟下宇圖出震之垂功崑崙辟雍模大壯之成器分五行以配德合四時而導氣審圓象以規天揆方儀而法地因節候之開闢得陰陽之奧祕不然何以審寶位之尊彰后王之貴者也夫其體物辨方因宜制變壯雲構之直聳屬星躔而右轉玉露朝落金風夕扇收帝藉於西成誓武人於南面然後緝以衆政休茲百工草黃月季虛正昏中釋菜吹豳命樂人而萬舞斬牲示戮習軍威於五戎既依方以服玉遂候呂以吹銅徒觀其在陽體尊規模所存取閟寒暑以法乾坤環沔彼之流水設有閌之高門布政居方順時開闔乞言講德肆志討論宣八風而配律齊七政以同渾爾其大禮盡設明堂洞開興亡之迹厥德不回見周公之負扆看紂王之罹災設殷監於既往垂大軌於將來邃宇九房採唐堯之茅屋神階十二懲夏癸之瑤臺故當勤求庶政想望英才不爾何勞謙於昃日而旋斡於飛灰既而四方述職九品陳儀禮有攸敘政無不施發聲明於風動趨劍履而星移道敷鵷鷺兆合熊羆永恭已而南面故垂拱而無為非斯宇以攸贊亦何取於成規是月也天子禮神祇展牲玉感物增思虔心以勗既嘗稻以薦犬亦趨刑而斷獄明大閲以講威訓㣥騶而撫俗別有粉署承風金門獻款念無媒以贈策謬談天於窺管大哉聖德望之如雲苑囿期廣動植惟分匪狙獷之獝狘將煦育於氤氳伊生靈之遂性實咸若於吾君為白鹿之呈瑞時或友而或㣥夫其充牣禁苑喜樂王國庇豐草而擇陰感食蘋而懷德奮角觡以共抵粲圭璋而混色將攸處以寢興非挺走而畏逼既而濯濯不㣥呦呦慕類狎威鳳以來格侶騶虞而必萃笑元豹以深藏哂飛黃而遠致貞姿麌麌若皓鶴之㣥驚逸足駸駸齊素翬而麇至然後飲刷銅沼咆哮瓊田忽往顧以騰倚時決驟以周旋分形雪散曳影霜懸豈有虞之可即將不羈於永年嘉貞祥之肸蠁知君德之屆天大矣哉固當不愛其道不藏其珍我澤如浸我惠如春矧微貺之不腆豈足彰乎至仁者哉伊茲獸之匪陋亦大塊之品物感淳和之相甄會禎祥之駿發將因質以受彩豈不緇而自伐與芻狗之陶甄光圖牒之翦拂泱泱大風盛德惟充嗟不識之狂願賡歌於帝功歌曰德由庚兮㣥物湊協嘉祥兮擾靈獸感欣合於天符遂充塞於君囿歲杪星窮時臨月仲元冥氣肅黃鐘律中北陸陰凝西成物衆觀四郊而息老朝萬國而來貢於是我皇乃親帥百辟觀隙三農整六軍以耀武肆大閲於仲冬然後乃即太廟建元旗事神率禮撫俗觀詩斥聲色以不御守和平而自持山澤從宜候飛霜而校獵川源有秩因涸凍而沈祠謹門閭而守法慎蓋藏以應期斬木陽崖采周官於是月藏冰陰室詠豳詩於此時然後受計郡國大頒錫命祭必先賢室惟行慶駕鐵驪以軌物居元堂而布政因宜制變必酌於古文授時鄉方乃行乎夏令爾其謀猷克臧備物必具飭王政之禮戒土功之務天地既貞陰陽乃裕苟愆伏之必節豈雪霜之是遇故當北辰正而衆星拱東海深而百川赴既一人而作哲惟四方之所注撫空懷以自憐愧揚雄之作賦鄉飲之制本於酒食形於樽俎和其長幼洽其宴語象以陰陽重以賓旅此六體者禮之大序至如高館初啓長筵初肆衆賓辟旋而入門主人稽首而再至則三揖以成禮三讓以就位貴賤不共其班少長各以其次然後肴栗具設酒醴畢備鼙鼓遞奏工歌咸萃以德自持終無至醉夫觀其拜迎拜送則人知其潔敬察其尊賢尚齒則我欲其無競君若好之實曰邦家之慶士能勤之必著鄉曲之行今國家徵孝秀辟賢良則必設鄉飲之禮歌鹿鳴之章故其事可得而詳立賓立主或陛或堂列豆舉爵鼓瑟吹簧動而敬居則莊百拜乃畢用賓於王禮主於敬樂主於同明士苟習於禮樂則可招賁於旌弓庶其緝熙聖迹宣暢皇風豈徒務燕謔而湛樂之是崇夷夏一體正朔同班車服旌旗光分五第聲明文物照臨百官國家庶績其凝四聰咸達九重清問每降於絲綸萬人自奏方聞於復逆景以位階丹陛得奏青蒲竹帛未書既非子孟之錫劍履不脫須置良夫之刑且道在守官物惟藏禮夫子相衛先在於正名謝息守郕無聞於假器既紊彞典須置嚴科選勞策勳辨樂論德師曠侍晉知崇侑食之儀士丐平生頗識蒸肴之禮於是小臣戒備大師辨章笙入懸閒歌升堂上禮亦異數既加籩而稱節樂其無算方及旅而揚觥率禮未見陳弓搢撲固宜行撻國子以行能不著版籍徒編乏周瑜之聽音同孔張之失位使仲尼忘味不及在齊吳札觀風還同自鄶舞師見察而不迷於樂章瞽人妄告請無廢於杜舉桂林巨鎮臨川荒服居五嶺之表控兩越之郊俗比華風化同內地然而洞居寨止人好阻兵有殊貨重吏無廉政選其任者實難其才故郡久曠官朝思稱職以腹心之寄輟爪牙之雄俾其澄清行獨坐之事俾其式遏總防禦之權惟帝知人佇報尤政五月維夏畏途萬里溽暑方起火雲始生履蒼梧瘴癘之郊涉沅湘風濤之壯衆悅是舉而傷此行公陳力滅私飲冰徇節以忠則九折之途可叱以信則三江之水可航聚糧戒徒肅裝候傳無酒酤我緩仳離之憂徵文寵別慰行邁之思僕以渭陽之故而首序云公諱九皋其先范陽人也昔軒轅少子以弦弧受氏別封於張留侯以五代相韓安世以七葉榮漢特生閒氣鍾美大賢餘慶遺芳襲於令嗣矣晉末以永嘉南渡遷於江表皇朝以因官樂土家於曲江高祖守禮隋鍾離郡塗山令曾祖君政皇朝韶州別駕祖子胄皇朝越州剡縣令烈考宏愈皇朝太常卿廣州都督皆世濟明德不隕令名公特稟中和誕生淳懿恭推色養孝自因心幼歲丁太常府君憂孺慕銜哀欒棘無怙毀能達理志若成人及日月外除而顧復就養思致逮親之祿方求筮仕之階籯金不珍琢玉成器殖學以明道修身以踐言弱冠孝廉登科始鴻漸也嶺南按察使尚書裴胄先幕府求賢軺車問俗以公後進之秀藉以從軍表授海豐郡司戶水變貪泉珠還合浦時所稱也其後五溪阻兵㣥蠻聚略帝命按察使裴胄先討焉以公有樽俎之謀韜鈐之用奏授南康郡贑縣令於是坐其帷幄置以戎車公武能宣威文可化俗軍需倚辦供億無留前宣慰使御史梁勛奏公清白有聞後宣慰使竹承構奏公戶口增益共稱尤異裦進上聞特加朝散大夫遷巴陵郡別駕初丞相曲江公之元昆自始安郡太守兼五府按察使以為越井殊方廣江剽俗懷柔之寄實在腹心奏公俱行可為同氣遂授南康郡別駕季弟九章以為桂陽郡長史太夫人在堂賜告歸寧承歡伏臘白華共展於朝夕衣錦時入於鄉閭棣萼美於詩人德星聚於陳氏代所稀也無何丁於內艱柴毀㷀㷀勺飲不納至性聞於州里孝感達於神明白雀馴狎於倚廬黃犬隨號於行哭表其異也服闋除殿中丞又遷尚書職方郎中起草含香停車待漏位高元象職在彌綸及曲江公翊贊廟謨鹽梅鼎實講德論道求賢審官以識量通明與聞其議故能致君堯舜克濟忠貞公之佐也及元昆出牧荊鎮公亦隨貶外臺遂歷安康淮安彭城睢陽四郡守所蒞之邦必聞其政作人父母為國循良於是瑞鵲成巢嘉禾合穎祥烏素翟而狎至焉考績議能詔書裦異遂遷襄陽郡太守兼山南東道採訪處置使以連率之權授以澄清之任化行江漢惠及黎元進封南康縣開國男賞有功也屬南夷不龔西蜀騷動掎角之勢連於嶺隅以公有經略之才委公以干城之任乃除南海太守兼五府節度經略採訪處置等使攝御史中丞賜紫金魚袋天書盈篋廏馬在庭恩華寵光旁午道路公召募敢勇繕治樓船綏懷遠人安集獷俗或指劍山之路或出銅柱之鄉以回舶運糧省泛舟之役以于來授甲寬土著之人寄重務殷用省功倍天子嘉之特賜銀青光祿大夫兼手詔益封開國伯食邑七百戶旌其能也且五府之人一都之會地包山洞境闊海壖異域殊鄉往來輻輳金貝惟錯齒革實繁雖言語不通而贄幣交致公禁其豪奪招彼貿遷遠人如歸飲其信矣秩滿遷殿中監皇輿盡飾玉食惟精六尚委能一心主辦服御器用必信必誠勤勞不遑積憂聚痗以天寶十四載四月二十日疾亟薨於西京常樂里之私第春秋六十有六嗚呼哀哉哲人其萎邦國殄矣皇上哀悼賻贈盈門給遞還鄉首邱歸本遂贈廣陵郡大都督府長史禮儀哀制延素握髮可謂飾終以明年葬於始興郡洪義里武陵原夫人宏農談氏襄陽郡夫人國子博士知幾之子克訓母儀用光閫則粵以永泰三年薨南康郡次以大歷四年合祔焉禮也嗣十一人長曰捷前端州刺史次曰擢前右金吾衛兵曹參軍次曰撝試大理直康州刺史次曰抗檢校戶部郎中兼御史中丞賜紫金魚袋朔方邠寧節度行軍司馬次曰捍前宏文生皆王之藎臣國之多士令德之後必大其門公嘗與季弟同泛滄溟舳艫艅艎凡數百輩忽驚飇震發駭浪山連當呀呷之時謂汨沒同盡為猿為鶴曷可保焉而中宵返風漂泊孤嶼遲明相視各在津亭同役之人僅有存者則知商邱蹈信入之而不傷呂梁履忠游之而莫惴愷悌君子福祿綏之宜其克享永年亦既逢吉且公之立身可謂盡美居喪致哀稱其孝也入幕決勝稱其才也列在藩翰則德化之政聞授之斧鉞則式遏之功著佐元昆則潤色王業睦諸季則致美閨門至於推挽忠良揄揚俊乂力行不怠時議高之夫生死有懷古今同盡歿而不朽君子韙之昕忝跡儒林嘗讀舊史覽賢人之事業知盛德之在焉敢揚休聲以志貞石銘曰軒轅錫羡百代蕃昌弦弧得姓受邑於張五代相韓七貂居漢平子數術茂先翊贊誕鍾餘慶克享大名爰至我公天姿挺生率禮立身依仁從政學該百代官踰三命再登幕府四列藩條威行節制化合謳謠作牧襄陽授兵南越江漢底定要荒胥悅死生有命修短靡常禮贈殊秩魂歸故鄉梧檟成列邱陵無改夏日冬夜精靈斯在維寶應二年歲次癸卯閏正月乙巳朔十六日庚申元獻皇太后啓殯於永昌之陵寢安神於細柳之亭宮粵三月甲辰朔十二日乙卯將遷座於泰陵禮也諡冊昭禮容車儼駕皇帝執通喪而在疚遵遠日以戒期悼憫凶之薦及痛皇妣以銜悲泣外郊而阻禮將徹奠於有司命宗伯之二職陳明德以為詞詞曰兩儀判質二曜分形乾剛坤順陽德陰靈嬪風以婉婦道惟聽王教斯立邦家以寧渭水定祥塗山協德式敷陰教用光內則紃組克修蘋蘩是職雜佩相警副笄盡飾族承嵩嶽德備椒房福履蘭殿祥開畫堂黃花襲慶彤管貽芳姜嫄佐嚳堯母興唐靈婺沈彩仙娥墜魄厚夜無歸重泉永隔義存故劍禮備追冊先志克遵爰開故宅坤儀載穆象服攸宜鸞輅爰止翬衣在斯藹藹邦媛雍雍母儀先天育德早歲聞師日月有期山陵甫制六綍齊引八神警衛龍帷儼其載陳驥服騁以偕逝率土雷動殊方雪涕去城闕之遲遲望郊原之翳翳背黃山而北指渡清渭以東轅野色慘以凝幕青雲重而垂軒儼騑驂以就駕慘徒御而不喧捨曾城之禁掖向新廟之陵園嗚呼哀哉遵周道之合祔美詩風之同穴列容衛於山阿若平生之象設擬靈荃之淒楚泛薤露之清切痛修夜之不暘歎行芳之永絶嗚呼哀哉緬惟在昔嬪德斯臧夫婦以正邦家之光明明淑德誕聖配皇肅威靈之如在欽懿範之不忘嗚呼哀哉維大歷八年歲次癸丑五月乙亥朔十七日辛卯開府儀同三司元帥鄭王薨旋殯於內侍省二十七日甲午冊諡曰昭靖太子洎十年歲在乙卯十二月庚申朔二十六日乙酉遷窆於萬年縣細柳之北原乃詔京兆尹黎幹監護喪事展飾終之儀禮也嗚呼哀哉窮陰肅冽殺景凝沍蜃輅方巾龍驂在御設庭燎以終夕啓欑塗而即路皇帝悼賢王之不淑念愛子之云亡齊彭殤以理遣顧形影而神傷録舊功於藩邸議新諡於太常眷承家於匕鬯追嗣位於元良爰命侍臣式纂遺芳其詞曰維昔啓土膺茲冊命賜爵為王建封於鄭梁國寵異魯邦禮盛明哲在躬溫良成性國步艱難遘茲師旅克生才藝允是文武乃拜元戎俾殲醜虜職思靖亂功期禦侮守師律以殿邦振威聲而先舉問安內豎視膳寢門隨肩明兩順色晨昏光輝棣萼友愛鴒原率禮不違人無閒言招賢南楚愛客西園宗子維城王室以藩樂善未終沈疴斯起㣥望並走衆醫咸理有加無瘳蘭銷玉毀馳光度隟逝川閲水軫皇慈之怛化嗟國人之罷市嗚呼哀哉疇庸未紀度德則優崇以徽號闡其謀猷善則可旌禮無不酬吉凶同域神理難求列前星之儲位昭甲觀之虛慶撰日月以有時備塗芻以將命卜竁從吉辨方居正堇原霜苦松阡雪映起寢廟之崇嚴制園陵之尊敬嗚呼哀哉轀車發軔緹綺前旌祖載奠徹簫笳哀鳴挽出離宮路回直城羽儀以列徒御不驚越素滻以東指背黃山而北征聯岡走以回抱遠樹靡而低傾對驪宮以立表依細柳以開塋閟重局於穸壤悲執紼於桓楹川杳杳以暝色野梢梢以寒聲仰清芬之不泯實昭晰於鴻名嗚呼哀哉翰并州晉陽人第進士為祕書正字遷駕部員外出為汝州長史貶道州司馬淳維不虔塞門多事險其走集雖稱有典當其奔衝安得無戰或逃或死家無康業且人戶平分文昌之舊也邊郡以實先王之制也甲無一德遂編兩貫禮不忘本延州密邇於京轂武以戒嚴鄯府遠鄰於河縣詳其動靜徇欲滋深違之則苦從之則樂國有大事在戎為急邦之榮懷阜人斯可益其遠也不亦宜乎曙宋州人開元二十六年進士送子清酤挹茲瓢杓器為人用勢本天作生也帛丿糸帛丿糸長非濩落工雖能而莫騁賓有量而是度外象招搖中虛士冖䂞籥泛然無繫似為客之漂流浮而不沈如從事之鳴躍許何挂而厭喧顏何飲而為樂傳一杯之引滿更百壺之竭涸儻遇主人之深恩敢忘此堂之斟酌匡字伯循河東人歷洋州刺史三代建侯與今事異請自漢言之漢朝用人自詔舉之外其府寺郡國屬吏皆令自署故天下之士修身於家而辟書交至以此士務名節風俗用修魏氏立九品之制中正司之於是族大者第高而寒門之秀屈矣國朝舉選用隋氏之制歲月既久其法益訛夫才智因習而就固然之理進士者時共貴之主司裦貶實在詩賦務求巧麗以此為賢不惟無益於用實亦妨其正習不惟撓其淳和實又長其佻薄自非識度超然時或孤秀其餘溺於所習悉昧本源欲以啓導性靈獎成後進斯亦難矣故士林鮮體國之論其弊一也又人之心智蓋有涯分而九流七略書籍無窮主司問目不立程限故修習之時但務鈔略比及就試偶中是期業無所成固由於此故當代寡人師之學其弊二也疏以釋經蓋筌蹄耳明經讀書勤苦已甚既口問義又誦疏文徒竭其精華習不急之業而其當代禮法無不面牆及臨民決事取辦胥吏之口而已所謂所習非所用所用非所習者也故當官少稱職之吏其弊三也舉人大率二十人中方收一人故沒齒而不登科者甚衆其事難其路隘也如此而雜色之流廣通其路也此一彼十此百彼千揆其秩序無所差降故受官多底下之人修業抱後時之歎待不才者何厚處有能者何薄崇末抑本啓昏窒明故士子舍學業而趨末伎其弊四也收人既少則爭第急切交馳公卿以求汲引毀訾同類用以爭先故業因儒雅行成險薄非受性如此勢使然也浸以成俗虧損國風其弊五也大抵舉選人以秋初就路春末方歸休息未定聚糧未辦即又及秋正業不得修習益令藝能淺薄其弊六也羈旅往來縻費實甚非惟妨闕正業蓋亦隳其舊産未及數舉索然以空其弊七也貧窶之士在遠方欲力赴京師而所冀無際以此揆度遂至沒身使茲人有抱屈之恨國家有遺才之闕其弊八也官司運江淮之儲計五費其四乃達京邑芻薪之貴又十倍而四方舉選之人每年攢會計其人畜蓋將數萬無成而歸十乃七八徒令關中煩耗其弊九也為官擇人惟才是待今選司並格之以年數合格者判雖下劣一切皆收如未合格而應科目者才有小瑕莫不見棄故無能之士祿以例臻才俊之流坐成白首此非古人求賢審官之義亦已明矣其弊十也選人不約本州所試悉令聚於京師人既浩穰文簿煩雜因此偷濫其事百端故俗閒相傳云入試非正身十有三四赴官非正身十有二三此弊之尤者今若未能頓除舉選以從古制且稍變易以息弊源則官多佳吏風俗可變其條例如後謹議一立身入仕莫先於禮尚書明王道論語詮百行孝經德之本學者所宜先習其明經通此謂之兩經舉論語孝經為之翼助諸試帖一切請停惟令策試義及口問其試策自改問時務以來經業之人鮮能屬綴以此少能通者所司知其若此亦不於此取人故時人云明經問策禮試而已所為變實為虛無益於政今請令其精習試策問經義及時務各五節並以通四以上為第但令直書事義解釋分明不用空寫疏文及務華飾其十節總於一道之內問之餘科准此其口問諸書每卷問一節取其心中了悟解釋分明往來問答無所滯礙不用要令誦疏亦以十通八以上為第諸科亦准此外更通周易毛詩名四經舉加左氏春秋為五經舉不習左氏者任以公羊穀梁代之其但習禮記及論語孝經名一經舉既立差等隨等授官則能否區分人知勸勉一明法舉亦請不帖但策問義并口問准經業科一學春秋者能斷大事有兼習三傳參其異同商榷比擬得其長者謂之春秋舉策問經義并口問並准前一進士習業請令習禮記尚書論語孝經并一史其雜文請試兩首共五百字以上六百字以下試箋表議論銘頌針檄等有資於用者不試詩賦其理通其詞雅為上理通詞平為次餘為否其所試策於所習經史內問經問聖人旨趣史問成敗得失并時務共十節貴觀理識不用求隱僻詰名數為無益之能言詞不至鄙陋即為第一其有通禮記尚書論語孝經之外更通道德諸經通元經孟子荀卿子呂氏春秋管子墨子韓子謂之茂才舉達觀之士既知經學兼有諸子之學取其所長捨其偏滯則於理道無不該矣試策問諸書義理并時務共二十節仍與之言論觀其通塞一其有學兼經史達於政體策略深正其詞典雅者謂之秀才舉經通四經或二禮或三家春秋兼通三史以上即當其目其試策經問聖人旨趣史問成敗得失并時務共二十節仍與之談論以究其能一學倍秀才而詞策同之談論貫通究識成敗謂之宏才舉以前三科其策當詞高理備不可同於進士其所問每十節通八以上為第一其史書史記為一史漢書為一史後漢書并劉昭所注志為一史三國志為一史晉書為一史李延壽南史為一史北史為一史習南史者兼通宋齊志習北史者通後魏隋書志自宋以後史書煩碎冗長請但問政理成敗所因及其人物損益關於當代者其餘一切不問國朝自高祖下及睿宗實録并貞觀政要共為一史一天文律歷自有所司專習且非學者卒能尋究並請不問惟五經所論蓋舉其大體不可不知一每年天下舉人來秋入貢者今年九月州府依前科目先起試其文策通者注等第訖試官本司官録事參軍及長吏連押其後其口問者題策後云口問通若干即相連印縫並依寫解為先後不得參差封題訖十月中旬送觀察使觀察使差人送都省司隨遠近比類須合程限省司重考定訖其入第者二月內符下諸道諸州追之限九月內盡到到即重試之其文策皆勘會書跡詞理與州試同即收之僞者送法司推問其國子監舉人亦准前例一諸色身名都不涉學昧於廉恥何以居官其試之時雖云試經及判其事苟且與不試同諸皆令習孝經論語其孝經口問五道論語口問十道須問答精熟知其義理并須通八以上如先習諸經書者任隨所習試之不須更試孝經論語其判問以時事取其理通必在責其重保以絶替代其合外州申解者依舉選例處分一一經及第人選日請授中縣尉之類判入第三等及蔭高授上縣尉之類兩經出身授上縣尉之類判入第三等及蔭高授緊縣尉之類用蔭止於此其以上當以才進四經出身授緊縣尉之類判入第三等授望縣尉之類五經授望縣尉之類判入第二等授畿縣尉之類明法出身與兩經同資進士及三禮舉春秋舉與四經同資其茂才秀才請授畿尉之類其宏才請送詞策上中書門下請授諫官史官等禮經舉人若更通諸家禮論及漢以來禮儀沿革者請便授太常博士茂才等三科為學既優並准五經舉人便授官其雜色出身人量書判授中縣尉之類判入第三等及蔭高者加一等凡蔭除解褐官外不在用限一其今舉人所習既從易士子趨學必當數倍往時每年諸色舉人主司擇常以五百人為大限此外任收雜色一其前資官及新出身並請不限選數任集庶有才不滯官得其人一不習經書史無以立身不習法理無以效職人出身以後當宜習法其判問請皆問以時事疑獄令約律文斷決其有既依律文又約經義文理宏雅超然出㣥為第一等其斷以法理參以經史無所虧失粲然可觀為第二等判斷依法頗有文彩為第三等頗約法式直書可否言雖不文其理無失為第四等此外不收但如曹判及書題如此則可不得拘以聲勢文律翻失其真故合於理者數句亦收乖於理者詞多亦捨其倩人暗判人閒謂之判羅此最無恥請榜示以懲之一其授試官及員外等官悉不許選恐抱才者負屈若並分集則僥幸者頗多當酌事宜取其折中請令送所在審加勘責但無偷濫並准出身人例試判送省授官日以九品八品官請同黃衣選人例七品六品官依前資解褐官例四品五品依前資第二正官例其官好惡約判之工拙也一舊法四品五品官不復試判者以其歷任既久經試固多且官班已崇人所知識不可復為僞濫矣自有兵難仕進多門僥幸超擢不同往日并請試判待三五年舉選路清然後任依舊法其曾經登科及有清白狀並曾任臺省官並諸司長官已經選擇並不試依常例處分一每年天下選人欲赴來冬選則今秋九月依舉人召集審勘責絶其姦濫試時長吏親自監臨皆令相遠絶其口授及替代其第四等以上封送省皆依舉人例處置吏部計天下闕員訖即重考天下所送判審定等第訖從上等據本色人數收人具名下本道觀察使追之限十月內到並重試之訖取州試判類其書蹤及文體有僞濫者准法處分其合留者依科目資序隨穩便注擬一其兩都選人不比外州請令省司自試隔年先試一同外州東都選人判亦將就上都考定等第兼類會人數明年依例追集重試之還以去秋所試驗其書蹤及詞理則隔年計會替代事亦難為一兵興以來士人多去鄉土既因避難所在寄居必欲網羅才能隔年先試令歸本貫為弊更深其諸色舉選人並請准所在寄莊寄住處投狀請試舉人既不慮僞濫其選人但勘會符告並責重保知非僞濫即准例處分一宏詞拔萃以甄逸才進士明經以長學業並請依常年例其平選判入第二等亦任超資授官一諸以蔭緒優勞准敕授官者如判劣惡者請授員外官待稍習法理試判合留依資授正員官一諸合授正員官人年不滿三十請授無職事京官及州府參軍不得授職事官有司或詰於議者曰吏曹所銓者四謂身言書判今外州送判則身言闕失如何對曰夫身言者豈非洪範貌言乎貌謂舉措可觀言謂詞說合理此皆才幹之士方能及此今所試之判不求浮華但令直書是非以觀理識於此既蔽則無貌言斷可知矣書者非理人之具但字體不至乖越即為知書判者斷決百事真為吏所切故觀其判才可知矣彼身言及書豈可同為銓序哉有司復詰曰王者之盛莫逾堯舜書稱敷納以言為求才之通軌今以言為後亦有說乎對曰夫敷納以言者謂引用賢良升於達位方將詢以庶政非言無以知之其唐虞官百咨俞無幾下及小吏官長自求各行敷納事至易今吏曹所習輒數千人三銓藻鑑心目難溥酬喧競之不暇又何敷納之有乎其茂才以上學業既優可以言政教接以談論近於敷納矣有司復曰士有言行不差而闕於文學或頗有文學而言行未修但以諸科取之無乃未備對曰吏曹所銓必求言行得之既審然後授官則外州遙試未為通矣今銓衡之下姦濫所萃紛爭劇於獄訟僞濫深於市井法固致此無如之何豈若外州先試兼察其行苟居宅所在則鄰伍知之官司耳目易為采聽古之鄉舉里選方斯近矣且今之新法以學舉者一經畢收以判選者直書可否可謂易矣修言行者心當敦固不能為此餘何足觀若有志性過人足存激勸及躬為惡行不當舉用者則典章已備但舉而行之耳有司復曰其有效官公清且有能政以其短於詞判不見裦升無乃闕於事實乎對曰苟能如此最為公器使司善狀國有常規病在不行耳但令諸道觀察使每年終必有裦貶不得僭濫則善不蔽矣問曰試帖經者求其精熟今廢之有何理乎對曰夫人之為學帖易於誦誦易於講今口問之令其講釋若不精熟如何應對此舉其難者何用帖為且務於帖則於義不專非演智之術固已明矣夫帖者童稚之事今方授之以職而待以童稚於理非宜有司復曰舊法口問並取通六今令通八無乃非就易之義乎對曰所習者少當務其精止於通六失在鹵莽是以然耳復曰舉人試策例皆五通今併為一有何理對曰夫事尚實則有功徇虛則益寡試策五通多書問目數立頭尾徇虛多矣豈如一策之內併問之乎匡自述曰啖先生集三傳之善以說春秋其所未盡則申已意條例明暢真通賢之為也惜其經之大意或未標顯傳之取舍或有過差蓋纂述僅畢未及詳省爾豫因尋繹之次心所不安者隨而疏之從心開元朝官御史講學崇儒語郊先禮詩書之奧以佇言揚元妙之門方求理辨初聞慎接具析精微既遇於途詎為傾蓋之厚各持其論以爭重席之功湯池鐵城取言詞而自困焚舟夷竈庶攻擊而無回設喻指之縱橫不聞三倒語折角之勝負方持兩端孔某聽歌知接輿之有德漢高揮洗見酈生之不狂拘繫之端冶長何在言談之下寧越無辜恭論兩賢請從一釋
