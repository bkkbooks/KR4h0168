  text: 全唐文欽定全唐文卷九百五十六
  hash: sha256:56fadc00887759005dc6b3d1184b838720f90a577d923bb0e872e670032fab22
  markers:
  - {type: head, offset: 14, content: 許景休, id: KR4h0168_NFKB_956-h1, level: 1}
body:
  text: 元陰方窮青律肇起霜歸寒雁露洗春冰是以星駕方迴知四時之代謝歲行更始識五行以為法甲以名忝令長頒政邑人固合酌規前經考禮中典將以助養生物叶贊歲時然而固陰沍寒王者以磔雞送節達陽遵禮主司以土牛迎氣所為雖合於典則方色頗乖於禮經訴以立春之前雖有近於月令若以隨方之色誠可寘於秋官州科典刑竊以為當甲將妄訴罪實難逃乙既鑿井將開射鮒之泉欲施繘瓶巳獲盤龍之鏡清源初鑿疑菱花而始成玉甃將升似明月而飛出寶匣藏而晦宇美人拂而生光王濛覽影巳堪自愛秦嘉贈心歎惜何極眷言此得誠所珍奇爰令送官不恡於下誠亦允當固無所疑即以鄰者之言寘乙之辜庸人陷法只堪矜憫請寬於乙將謂恤刑水以潤物飛梁載舟居信順動法謙處柔朝滄溟以委輸習坎德以安流善利為水涵育乎萬族極深不測灌注乎九州壅之則有備無患決之則致敗為憂先設其防以遏奔潦興版築護衢道惟精惟一是經是造其奮鎚也齊叫以雷震其揮鍤也連刃以霜皓矗長隄其若雲岌修岸其如島何固護之克壯息奔突以永保既夾植於菱蓮又夤緣於萍藻雖興役賦而一勞永固牛馬由其望辨樓船可以逕度清深鏡澈時升曳尾之龜左右人稀每帶銜魚之鷺行旅於是乎無虞耕耘於是乎知措夫水可以為人之利隄可以防水之溢隄修則中國無憂水敗則下人多恤亦由人之為政政成人逸政或不成姦詐以出則河隄之義取類非一可以合人之安危可以喻政之得失凡百在位慎乃終吉別有沉淪戒忤漂搖衢術幸登涉於河隄冀霑濡於瑣質體㣥物以舉要多井功之大成灑元氣之洪液翕泉源之至精巽下坎上創庖羲之畫象鍤壤畚土喜伯益之初營澹其味澄其清同不變以育德履剛中而益平汪濊津潤兮物得其利沃盪盥潄兮人賴其生是以養而不窮則取之而逾出止而有分即舍之而不盈故啟幽人之三徑首先王之五行若乃寒漿是汲美人至止玉甃駢固銀牀沓起轆轤宛轉以旋目素綆逶迤而度趾羅袖互引扇皓腕而生香金缾數傾曲纖腰而貯水雖騰突於溜源不混淆於泥滓汔至而繘瀉巳就猶尚潛聲而駭耳濯之既潔潄之則美何自下而汲上與溪壑而殊旨故其旁搜詭迹遐評殊見土精攸出惕羵羊之怪奇缺角巳沉鬱神龍之氣變金色化粥山形留殿源洞德陽之兵勢匿江陵之縣秦分星聚卭都火煽漢皇欻應於雲飛葛公一窺而電烻斯故潛怪之所蓄洩吾不可得而言遍徒美其括坤之靈包坎之德往來井邑用之不忒秉虛澹而能施守卑靜以自得終勿幕之有孚保元吉而無惑苟在時而不泥庶當渫而見食鑿地生泉之為井施人不倦之為義兼濟往來存乎惠也置當衢路仰無私也皎鏡清虛尚其潔也三德既備萬物是仰井乃無心義惟我謀當衢鑿井稱物平施酌而不竭奉衢樽之化焉見義不為恥也遇善莫書過也義既行矣文在茲乎賦曰夫地脈伏泉天文垂井式觀象而遂鑿雖暫勞而功永深不過於數仞用有要乎萬頃風動無波物對生影勁陰殺節挹之而彌溫炎旱蒸天探之而逾冷况地接一都之會邑居狹俗之境川流雨驟車馬於焉往來風舉雲搖帝王由茲行幸魏主罷指梅之策隰朋息尋蟻之請豈非人有其願地不藏靈色湛湛以天碧嵌陰陰而晝冥高風始秋泛落桐之一葉太陽既沒映長天之數星因注水而暫益縱改邑而常寧素綆下懸映垂冰之皛皛銅缾上汲滴淺溜之泠泠清泉既沒白日可見豈獨兼濟行李抑亦取給茲縣隨所求而皆足豈有殊於貴賤若乃連巖之曲闉闍之前雨苔環合生其上露桃蓊鬱植其邊殊季氏之有缶異疏勒之無泉入夜雲開涵長河之短直向晨霧歇映大天之小圓玉甃護崩誰識下無禽矣銀牀防墜不聞中有人焉乃有去國征人奔星驛騎或注情於故櫪或銜悲於遠寄飲之則長鳴而忘其苦辛酌之則充量而欣其普施雖一勺之蓋鮮亦懷恩而感義缾之罄矣既虛來而實歸爾牛來思亦滿腹而受賜故知理邑者賢濟人者井揚聖人之道用而不竭守君子之德澄而彌靜鑿飲忘帝王之力汲用嘉仁明之境儻見惻於莫食庶微功之得省客有遊於太常者叔夜才貌長卿文雅歷階戺之間目簷楹之下彼美聲奏諒先得而聞焉繽紛器物復可令而觀也絲竹畢備匏土俱陳混季氏之八佾擬鳧人之六鈞瑟既稱趙箏還號秦伐修竹於嶰谷來浮磬於泗濱羽蟲畫之也可以成鳳翮鱗蟲刻之也可以作龍脣物以古兮不可識代雖殊兮亦可珍豈直有斯而已哉徒觀其廣厦駢闐修廊逼側蘊今古之殊號被丹青之異色賁路鼗鼓干戚羽旄斑彬翕赩巨萬盈億文墨者莫之而記言談者罕之而識嘉夫貴賤攸重華夷是欽舜湯一舉而進韶濩荒隅一奏而成任君徒見雕瓊鏤玉之餘彩殊不聞宮商徵角之奇音及夫金皋氣變珠樓春始煌煌帝庭濟濟卿士五樂具奏八音俱起惟斯器之有作備無為之燕樂紛綺靡之容裔混魚龍之交錯金木羅張厥用匪常施之於國則政其攸敘饗之於廟乃神其降祥舞青田之唳鶴儀丹穴之鳳凰諒鄙人之罄思固難得而備詳有靈茅之繁育稟堪輿之粹晶間叢薄以孕彩候韶陽之發生與百卉而同氣擅三脊而異名揉纖條以為族拔連茹以彙征延蔓亭皋鋪敷原陸白華霜淨翠莖雲沃雜春澗之長松亂寒潭之明菊不剪彰帝堯之儉縕袍識子路之服若乃薈蔚匝地低昂順風或結根於江漢之澳或蓄苗於嶺岫之中挺芳心兮䔿䔿吐修葉兮叢叢煙霰之所蕩拂昆蟲之所翳蒙納日月之光照資雨露之霑融東市驗左生之術南征紀周王之功嘉此物之為用蓋今昔之攸同至若錫履於齊俾侯於魯頒容衞之所藉實禮儀之攸覩純束美夫詩人縮酒貢其任土宜有意於遺芳諒無替於終古茅之為物也賤尚見采於先王士之所貴者道豈敢昧於文章慕朝宗之涓滴對詞林而抑揚若邦國之是賴希寄心於棟梁偃伯師節也國家武成止戈文致皇極小宗伯樂之廣有命賦國家執道紀酌天和敷皇極以協德作武成而止戈由是天子居穆清之中念康濟之策乃訊元老禮鴻碩恢至道以垂裕議靈臺以偃伯且以韜五兵屏三革服仁義以為壁壘仗道德以為矛㦸俾其庶績咸熙百工惟時弓矢載櫜詎資乎司馬之法仁義無敵寧取乎丈人之師矧乎豐財保大之謂仁濟物安時之謂義義也者所以溥洪暢之德仁也者所以廣生成之施我是以却馬於糞車務仁於穡地然後頌大武歌由庚協神道以廣運致人文以化成以在宥萬物以厚利㣥生則夫乾元貞坤元亨彞倫敘而太階平豈不以其遠至邇安有截無外却兩階之干羽頒五戎以冠帶百神肸蠁以薦福二氣氤氳以交泰亦以播無疆之休昭有道之大固能協乎上下承以天休俎豆陳而五刑措干戈戢而七德修展威儀之秩秩卷旌斾以悠悠始欲登三以咸五豈徒歸馬而休牛尚矣哉茂祉之彰元德之厚真神明之所福宜配天地而長久偃師節於靈臺之上返淳風於混元之首諒遊聖而難知徒叩虛而責有王甲迹厠九流榮參散冗尹乙聲高百里任總絃歌玉樹光庭早襲夢熊之慶銅章列位未洽烹鮮之術禮經攸設存乎冠昏人天所賴在於倉儲緇布有序三加之義式陳禮節其興千箱之積斯在過庭之訓教子未虧於義方作宰之規為政殊乖於慎密矧茲卜筮迺撰良辰惟彼葢藏旋聞弊漏於堂則有虧明禮墮職則須按常刑稽以三千詳諸五聽阼醮陳其升降深謂合宜龜玉毀於櫝中誰執其咎在禮無失於法有違存以威儀同仲尼之好禮輒求解職異淵明之去官加布未爽於前聞罰銅請依於州斷雲蒸晝暝天雨洊降當此激射或頹圜一作環堵乙者何也而貨殖焉既得陶公之術有同宋人之富雖家惟四壁而堂累千金當戒爾不虞宜納善人之訓何故為誨盜不從幹父之情入門各媚信自負於知言飜或為讐欲見疑於忠告引之為證事則可憑訟之無稽法亦難設謂宜按記庶叶簡孚一名亞俱羅其大食王號暮門都此處其士女王褱偉壯大衣裳鮮潔容止閑麗女子出門必擁蔽其面無問貴賤一日五時禮天食肉作齋以殺生為功德繫銀帶佩銀刀斷飲酒禁音樂人相爭者不至毆擊又有禮堂容數萬人每七日王出禮拜登高座為衆說法曰人生甚難天道不易奸非劫竊細行謾言安己危人欺貧虐賤有一於此罪莫大焉凡有征戰為敵所戮必得生天殺其敵人獲福無量率土稟化從之如流法唯從寬葬唯從儉郛郭之內里閈之中土地所生無物不有四方輻輳萬貨豐賤錦繡珠貝滿於市肆駝馬驢騾充於街巷刻石蜜一作木為廬舍有似中國寶轝每至節日則獻貴人琉璃器皿鍮石瓶鉢蓋不可算數粳米白麥丏不異中華其果有桃又千年棗其蔓菁根大如斗而圓味甚美餘菜亦與諸國同葡萄大者如雞子香油貴者有二一名耶塞蔓一名沒國女甲反師香草貴者有二一名查塞菶蒲孔反一名葜蘆茇綾絹機杼金銀匠畫匠漢匠起作畫者京兆人樊淑劉泚織絡者河東人樂呂禮又以橐駝駕車其馬俗云西海濱龍與馬交所產也腹肚小脚腕長善者日走千里其駝小而緊背有孤峯良者日馳千里又有駝鳥高四尺以上脚似駝蹄頸項勝得人騎行五六里其卵大如三升又有薺樹實如夏棗堪作油食除瘴其氣候溫土地無冰雪人多瘧痢一年之內十中五死今吞滅四五十國皆為所役屬多分其兵鎮守其境盡於西海焉又云米祿國在亞梅國西南七百餘里胡姓米者茲土人也其城方十五里用鐵為城門城中有鹽池又有兩所佛寺其境東西百四十里南北百八十里村柵連接樹木交映四面合匝總是流沙南有大河流入其境分渠數百灌溉一川其土沃饒其人淨潔墻宇高厚市廛平正木既雕刻土亦繪畫又有細軟疊布羔羊皮裘估其上者直銀錢數百果有紅桃白柰遏白黃李瓜大者名尋支十餘人飡一顆輒足越瓜長四尺以上菜有蔓菁蘿蔔長葱顆葱芸薹胡芹葛藍單達茴香英薤瓠瓠蘆尤多葡萄又有黃牛野馬水鴨石雞其俗以五月為歲每一作首歲以畫缸相獻有打毬節鞦韆節其大食東道使鎮於此從此至西海以來大食波斯參雜居止其俗禮天不食自死肉及宿肉以香油塗髮又云苦國在大食西界周迴數千里造屋兼瓦壘石為壁米穀殊賤有大川東流入亞俱羅商客糴此糶彼往來相繼人多魁梧衣裳寬大有似儒服其苦國有五節度有兵馬一萬以上北接可薩突厥可薩北乂有突厥足似牛蹄好噉人肉夏分五等周開九命國庸人爵貽厥孫謀青土白茅將傳欒郤之室裘裳鐘鼎必襲金張之家丁既慶積山河用光家國不聞必復之業旋有逋逃之讓榮命不顧同顏闔之鑿坏遁迹方來共丁鴻之蹈海一去鄉縣幾變星霜冀疇庸之有主在昆弟而可錄不謂政也無二法不容私終使長襲代封沮元成之宏義幼而時棄允張純之格言瞻彼景也是何人斯逋逃故鄉離逷爾土苟不家食常懷旅遊比巢幕之未安如轉蓬之不定聿來茲郡奠厥攸居爰歷星霜載罹寒暑河源沙塞地鄰戎狄必資膂力以鎮疆場惟景伊何當是役也自可有死無隕為主將之先鋒結袵抽戈斷賢王之右臂不聞為力翻事游詞孰有沐君之恩食君之土偏蒙五稔之復不徇六尺之軀人之無良罪宜從重當復滅鼻無或噬膚乘秋日之遊豫縱奇觀於長川惟秋水之清泚宗大壑而潺湲波浩蕩而不極影澄澈而彌天波沉馬色類真人之雲度岸迷牛影疑織女之河邊柳浸影而如臥萍隨流而似牽鳧帶藻而聲澀魚亂流而水圓晴霞晚鋪如漢江之濯錦夜月初上若銀鈎之映泉乃與斷金之好連璧之友矜壯歲之紅顏怯衰年之白首效淡水之密契就河濱而置酒惜素節之彫荷歎嚴風之入柳況夫澄淡逶迤涵空寫淨符老君之上善同至人之不競處下不辭其垢濁攻堅豈難乎流盛星光夜照如臨剖蚌之珠菱影朝開似照盤龍之鏡爾乃長波澒洞洪濤泛溢晴天淨而空鮮夏雲臨而峯出照鄒忌之蕞貌鑒陸雲之笑疾遂有感於莊篇託微言於拙筆元者道之真宗珠者物之至寶南華醜去聖之昏惑因立言以探討將依物以見真故假名以喻道豈不以精理冥默妙體希微任元覽而自契運無涯而反違共趣於真所觀皆指齊驅於苟何適不非是以遺之者異跡得之者同歸若乃軒轅之理蓋以心中正天下肥猶復築特室靜端闈思瑩之而英華不泯懸之而日月齊輝於是捐聰塞明離形去智兀然而心無所適漠然而體無所寄在宥而同乎太和守靜而成乎簡易不自矜伐而人受其賜斯則不違黃屋之間而得元珠之義豈同年無脛而走有纇可收百金擬價徑寸無儔焉假物而則是在身心而自修搏之不得何言契詬之能致視之不見豈離婁而足求且夫珠以精真比道道以圓澈比珠豈瓦礫之能雜固聖賢而不殊是以似之者將千里之遠照懷之者如三光而莫逾況國家騰淩羲軒鬱映文史重光累聖抱一而理自元元而得之傳我皇而未巳傳之謂何無為是紀得之曷若徵賢選士契漆園之寓言悟元珠而有以況人能宏道道豈遠人體之則是任之則淳不獨遊於崑崙之側臨乎赤水之濱而在於彼獨得其真夫珠之為義豈只喻道亦以比德將求價而不收同君子之否塞況其勞於翰墨握而為則懷恩欲報照乘斯得料明哲之深知冀投之而不忒設官分職體國經野風雨不時山川是禜眷彼新鄭地惟故韓歷代升平俗懷遺愛百里之任無製錦之能四時之愆乏如絲之雨青青媚草卷書帶於槐壇灼灼鮮花發綬文於李徑密雲不雨徒矯首於龍星離畢無徵空舒誠於免月其才不淑縣令寧假於鈞金明德惟馨尸祝勞神於斬木州佐道優展驥法峻蒼鷹責其不藝之辜處以免官之坐愚謂直筆理合緘詞禹別九州秦稱百郡非無沿革屢有廢興苟損益之或差亦因循而是務頃者暫遇奸宄人或流亡軍旅是加荒饉仍及遂使黔黎失業喬木罕見於人烟井邑為墟壞垣寧聞於犬畝洎乎皇威遠被寰宇肅清頻霑利澤之私遂亡干戈之患省司以罷人是恤議廢置於州縣百姓以遐路告勞難駿奔於隸屬衆以減員是請或願取新官以省邑為謀盍宜仍舊從人欲也無或違之若夫隨陽之鳥翩翩者鴻高飛晴日長鳴朔風乘秋陰於迥塞結陣影於遙空觀其羽翮聯翩出入寥廓念江山而猶遠犯霜露而無託昔年春去愛洲渚之芳菲今日秋來值關山之搖落借如良人遠戍賤妾孤居帷屏曠望意息空疎路杳渺而無限心嬋娟而有餘憶紫塞之年盡怨青樓之夜虛莫不聞之者憤惋聽之者漣如罷迴文之織錦思繫足之邊書若乃明月宵懸黃雲盡洩牢落天地蒼茫溟碣行宛轉而初上影參差而不絕愁輕岱北之雲訝負遼西之雪既而南遊澤國北別沙塲千里萬里懷稻懷粱強能鳴以取愛恐不才而見傷所願免虞人之矰繳得狎君之池塘者也歲律仲冬寒生季朔尊狩而臨清祀因蜡而祭嘉平承八政之勞農暢四人之休息既而日沉西障月下南軒夜復清而多閑神將肅而是享主不存位祭則無依幽靈無地元酒何設如在之誠事既驗於闕行虧禮之尤理合從於寘罪乃典職之有失事未一作曷可容類龜玉之將毀人何逃責有司推詰理一作妙合其宜訴非可憑庶歸常典鄰婦時命先秋生涯凋落四德之名尚在九泉之魄俄沉存既寡於周親沒亦感於鄰義既而朱火不舉俯凶事而無從元未臨仰生人而何託聞人以蹈危為意憂濟留心爰行博施之恩自合無喪之服論其主斂則親屬為先語其科辜則聞人無罪雷電作威先王以嚴刑斷獄脂膏不潤古人以從政立身故貪乃敗名子罕以不貪為寶財悖而入疏廣以多財累愚河南帝城四方取則毗贊之職必惟其人季昭策名清時沐我元化不能獨峻其節有勵冰霜翻乃難滿為心自同谿壑況飛龍在運振鷺盈朝官材必孚名器無假不義而富聞夫子之有言刑故無赦著文王之作罰臨財苟得古則恥之陳力不能今也宜止黃圖貴令欲以枉法定刑繡衣御史斷為真盜論罪既立文帖應有限期或即結刑恐成疑獄空仰九天之問慙無一割之能待詰事由寘之邦典曼倩持法恭聞至理之名公閭在官雅得平反之績與其失善寧可利淫頃以澤被寰中風行水上象雷雨以作解自昆蟲而必及五流之罪恩降一至於徒年三宥之條會慮復加於清雪渙然無咎咸與惟新大理以慮合從寬雅符平典刑部以徒非本坐何太深文閑邪存誠禦奸以德彼訓人者為政先之其有風俗未齊泉藪為患共成黨與率相比周作法於涼且從權而救弊誰能執熱故逝濯以隨時惟景化俗臨人除患務本散落奸黨在三輔而尤異糾訴豪族為一切之權宜同夫汙衣致偷問羊知馬類鈎距之能事物無隱情俾袍鼓之稀鳴人皆懼法既且違於從政復何恤於人言効廣漢之缿筩聿聞操簡比國僑之刑鼎終見貽書既度時而立功亦反經而合義如肯綮之投刃乃豪猾之云鋤何八使之縱劾在一畫而斯蔽繕理通衢必遵時令葢藏多暇農人務閒既刊木以為工亦隨方而適用於是取材深谷興役平人將肆力於夷塗必希心於公道馳騖由其克濟行李於是知歸何所虧違論其罪坐必情惟害物據法須峻刑名若功可利人撫狀猶宜獎應縣為斷結理未融平請更下推使其無訟朔風驚沙枯梢號寒子行亦良苦聞之京師曰米如買珠薪如束桂膏肉如玉酒樓如登天驟雨至矣黑潦滿道則馬如游龍清霜激風客衣無襦抱膝而苦調則火如紅金子之遊京師所以待此具者其挾幾何豈子之家位高金多父母兄弟渠渠款款厚撫以遺子乎曰無有也豈子之鄰里鄉黨相悅以義出門辭東家而西家待贐矣寧有是乎曰無有也豈子之昵親俠友入室握手說無說有把酒相別飲酣氣張有解劍而指廩者乎曰無有也然則子之此遊挾何術以往曰吾視囊中不見其有物視吾胸中耿耿者尚在也以吾之耿耿者遊天地間庶幾必有合乎予聞其言而壯之曰今人適百里必宿舂而浙乃敢出門戶今子有數千里之役徒手以往浩然無憂予固驚怪子矣果如子言予來春於江南林石之下聞北方有焰焰者必子也夫觀卉木之庶類而松柏之異㣥貫四時而不改柯易葉挺千尺而恒冒雪淩雲抗高標於物外遠卑冗於代紛其榦則直其理則文驗受命於方地信無奇於此君於是載離風霜多歷年紀持本性而常茂抱幽貞而獨美太華之上森森映仙掌之峯台嶺之傍落落蔭靈溪之水經冬不改憐江南之竹箭乘春暫榮笑東園之桃李故見稱於前聖喻德於君子夫其勁節可嘉明心不忒實繁衆類生我邦國故將枝葉無隔於心源豈同橘柚有限於南北錯萬物以為佐求其族而始得是以後凋之義久不刊於魯經有心之言永昭著於戴禮吉士遠託或亭亭於嶺上山苗乍淩時鬱鬱於澗底雖彼此殊軌而榮華一體若乃背徂年當芳歲林烟乍卷秋雨時霽仙侶或遊隱淪常憩莫不對偃葢以瀟灑仰仙雲而搖曳暢方外之遐遊滌樊籠之流滯若乃幽澗之側高岫之端葉離離而日來冬暖枝梢梢而風至夏寒不以無人而不秀又同美乎芳蘭至若大廈方構長材是求詣藪澤訪陵邱遠近必度大小所謀有斯木之特達惟工倕而擇不重曰歲聿云暮兮何木不變惟松柏兮淩霜葱蒨儻有心之可嘉期君子之一眄學以入官貞足幹事苟隨時而制法則助化之通方施於在公是亦為政景忠而奉職知無不為置以缿筩方茲水器觀書記而察過託子弟以為言冀乎擒奸固隳黨與嗟爾人吏胡為告訐未能反身三省而乃相怨一方不悛厥心覆怨其上使司急夫求瘼務彼澄清察以不能責其非當斯則小人難養抑亦君子何情顧禮義之不愆奚糾舉之能恤賞功行封父歿子繼義存昭穆理在宗枋夏殷以前罕詳斯制周漢之後咸用此途甲忝籍勳庸得參纓冕誠宜率德改行嗣先人之業翼子謀孫崇保家之道焉可忘析薪之荷搆佯狂之謀內虧孝子之心外爽忠臣之節同衣裘而鮮食類接輿而欲歌必事等元成何替名家之譽情符孟縶不聞良史之嫌即按所司之科恐失惟輕之典待盡情偽方申斷割乙妹三從靡依一志空潔榮落朝蕣魂棲夜臺生則事兄義或遵夫歸妹死而誰主禮用行乎寡妻夫無執紼之姻里有主喪之尹雖親不可間義並連枝而事寧敢逾禮從異教決曹謬舉職我之由訴者有詞今汝則盡尚恐邑多匍匐之子家有不相之鄰未詳其宜莫適問罪天子建國法合掌於三辰諸侯立家禮許修其五祀非直為之糾禁抑亦辨其名物各有職守無相奪倫至如日月運行陰陽消息乾坤測度之法山川沉埋之儀葢存公道布憲於觀臺豈合私為輒陳於采地宗人所祀正當左道之條保氏所陳深得禮刑之制
