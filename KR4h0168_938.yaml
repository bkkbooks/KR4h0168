front:
  text: 全唐文欽定全唐文卷九百三十八杜光庭十
  hash: sha256:e3052926251eea48dc0532c29424fe2689cf67274c4d34c9809496550fa3986e
body:
  text: 伏以岷蜀雄都西南巨鎮下蟠萬壑上拱九清為造化之殊庭乃神仙之奧府瑤宮璿闕深祕於洞臺翠壁丹崖仰呀於雲霧高真之所棲息上聖之所宴遊實掌休祥以福寰海臣獲逢道化夙荷元慈慚無塵芥之功難報乾坤之德而立身處俗易結罪尢往世此生寧無過咎五行三命恐值災衰躔次星文慮為臨照或冤仇所滯或債訟未明有一於茲是用憂懼輒敢披心靈嶠稽首仙都輒備信儀遙申禱祝伏願鑒其丹懇錫以元恩使景福潛資壽涯延益災凶銷蕩罪咎蠲除冤債和寧祿祚繁永兼乞子孫嗣續宗緒昌隆誓傾虔奉之心以答仙靈之祐不任伏聞道化裁成天元立極申命真宰主張眾靈於是乎賦命禀神流形挺質咸資籙籍以繫上元臣荷大道生成感睿明倚注地分岷楚任極鈞衡功業所彰未裨於造化恩榮所錫已冠於古今况屬天步艱難皇輿省狩恨不得手扶宸極身衞帝車克定乾坤重清日月永安大寶以致中興虔叩真靈冀扶忠節仰惟青城巨鎮天國仙都㣥聖依棲列真統制必能振揚神力驅役陰兵蕩災運而靜中原拯橫流而匡大業爰遵祕格虔啟醮壇願迴不測之威以介無疆之福使妖氛寧息帝祚隆昌鳳歷龍圖天長地久臣積生咎釁未兆災蒙因此懺祈咸希銷解臣今年大小二運俱在酉鄉與命辰對衝又火星所照既臨分野仍在身宮土躔厄會之方金伏乖背之宿年臨三殺之位仍當六害之門恐災咎所加伏深憂惕惟憑醮酌以達精虔所祈災數剋平忠誠大展盡報主酬君之節成摧兇定難之謀光佐聖朝實佇靈祐不任伏以二象炳靈三元運化稟形毓質仰資大道之仁賦命受生率荷神明之德臣獲承元廕叨遇休明累忝恩榮載塵職祿顧勳勞而未立感寵澤以殊深而慎行謹身敢忘惕勵運心屬念尚慮曠遺况所主重難務當宰膳宴賓犒士須備烹羞撫眾訓戎時行懲賞實恐刑章之內或爽於重輕庖割之中寧無於故誤因成冤債遂積罪瑕或往世此生宿愆未解五行三命厄運未祛今年則暗曜土星在身宮之上天符五鬼臨行運之方火星近刑厄之宮金星躔剋性之位忽成疾苦久未痊除伏恐災咎方深叩祈無所竊惟至真濟物大道好生廣開禳謝之門俯示感通之力是敢按遵科典虔啟醮壇遍九曜以披心瞻列星而瀝懇伏冀天光下鑒聖造旁資解故傷誤殺之冤赦積世他生之罪銷平厄會清蕩災凶六氣宣通百疴痊復續將盡之福祿祚增延賜再生之恩算命延益公私昭泰眷屬乂寧仰望元慈不任伏以虛無大道孕育於㣥生天地萬神主張於庶品至於誕形稟氣垂象炳靈咸資鼓鑄之功率賴生成之力臣內惟涼德夙荷道慈勳勞未贊於聖朝寵遇已隆於藩翰隼旟龍節謺奉殊榮相印兵符頻叨睿奬顧茲虛薄實切兢憂每慮賞罰不明刑章不當舉措有乖於理體綏和未叶於物情興修有土木之煩宴犒有烹燔之費故傷誤殺往債宿冤兼此罪尢成其譴責或五行三命暗曜列星共結災躔遂為疾厄尚未痊復倍用驚危臣今年大運居衰氣之鄉小運在馬破之位木星退身宮之上土星照三合之方金水二星臨乖背之宿飛天火曜居本命之辰九宮土星復當生月覩此災運深切禱祈是故按靈寶元科河圖祕格設周天大醮懺謝上元伏冀萬聖感通眾神照鑒納其懇志介以福祥解宿債前冤赦深災重過續其祚祿增其壽年五星四景之中永銷危厄天府地司之內別注休禎所疾蠲平克賜安豫益堅忠孝上奉君親即仰荷眾尊祐護之恩不任臣聞垂象炳靈代天行化發揮道用昭著神功粵自剖判之初即顯司明之力生靈動植咸賴元恩臣獲稟天慈深叨帝澤功業未酬於覆載寵榮已冠於人臣常慮綏撫乖宜賞刑有失金科玉律或爽於哀矜伐叛誅兇或輕於鈇鑕前代之冤讎未解此生之過咎旋彰於此省循常懷震惕又臣今年大小二運俱在對沖首尾蝕神皆為臨照支干火木在衰氣之中天符飛行居驛馬之上併為災滯尢切憂惶近則微恙所嬰尚未痊復希恩謝過倍切禱祈輒因本命之辰虔誠奉醮伏惟至聖俯鑒丹襟赦已往之罪瑕解將來之厄會增延算祿和釋冤疑得以罄竭微衷扶持大寶撫安疲俗匡贊中興誓傾修勵之心永答真靈之貺不任伏聞三光麗天下司㣥品死生是繫罪福攸司臣以塵微仰蒙鑒祐而三命之內水火力微值辰戌魁綱為天羅地網二運逢墓併屬災期又火星到元首之宮暗曜在命宮之位災數重謺憂懼殊深是敢遵按明科虔申醮奉仰崇齋福精備醮祈三日恭嚴九時關奏伏冀元慈俯燭洪澤濡臨賜臣災運銷平凶衰超度克延祚祿允介福祥永保乂安常加護祐奉親事主報國寧家誓罄丹誠上酬元澤不任伏以稟氣分靈全資大道挺生毓質仰繫上元報有盈縮之期理協始終不之分五行倚伏二氣推移實憑宰制之功敢怠敬恭之懇臣今年火曜居本命之方九宮金星在行年之上久躔疾苦未獲痊平竊慮履行運心有虧陰步馬字人育物有曠政經或積生釁咎未除或往世冤讎未解構茲重厄無路懺祈况境控仙山地當洞府明誠可告真鑒難誣敢因本命之辰虔備醮祈之禮洗心謝過瀝懇希生伏惟少駐鸞驂下臨塵壤愍其歉迫假以恩休輟死籍於黑書再延命祿定生名於丹籙盡赦疵瑕冤債和平災凶銷解公私昭泰眷屬安寧敢忘策勵之心上副真靈之祐不任伏以三氣肇胎九元裁質清浮濁厚真精鑠造化之鑪出震乘乾大易啟乾坤之韞堯天繼覆舜日傳明五教允敷未革懷襄之數四門是闢尚纏昏墊之憂惟我睿明拯茲下土驅馳四載勤瘁萬方浩浩無虞百谷識朝宗之路巖巖可仰㣥山知維嶽之尊區別九州撫寧庶彙鑄鼎之功既集錫班之報攸彰懋此宏勳光於終古臣夙承洪澤獲奉仙祠巴雨巫雲捧臨瑤殿岷江楚澤瑩蕩瓊階願迴疏曠之慈俯鑒虔祈之懇探經玉洞展醮靈岑副蜀王遐祝之誠遂微臣歸還之願不任伏以道氣分光元功宰制下鎮靈化上配列星萬聖之所宴遊㣥仙之所棲息肇於歷劫以逮茲辰玉女上賓認香泉於江滸元元駐駕留玉局於城隅耀天日之祥華以安井絡啟洞宮之徑隧以福坤維為錦都靈勝之墟乃蜀國神仙之府而繕營久曠蕪薈幾侵清壇為蹂踐之場閟殿染膻腥之雜我蜀王迥開神鑒矚此元關遽命澄清俾其嚴飭拂烟煤於石壁早挹仙儀薙蒿篠於荒階再窺靈洞邇後累加締葺漸獲精新堂宇相望樓臺櫛比復還門闥俯及康衢夕磬晨鐘得以備朝修之禮朝香暮火得以申蠲潔之儀報德何階感恩有自輒陳醮祝冀達真靈伏惟廣灑神休大頒嘉貺增聖主遐長之算寧謐萬方延蜀王椿桂之年乂安三蜀連營將校各崇竹帛之勳比屋生靈共樂和平之化龍神悅豫稼穡豐穰疵癘無侵鋒鋋永戢其有薰腥穢凟穿鑿侵傷承此懺祈咸蒙銷解臣等佐時濟俗行教立功奏御上通遵修咸契公私貞泰眷屬利安然願往化法流先師舊德冥關無滯道果速圓內外職寮陰陽將吏遷功加品永贊福庭克宏至道之風常荷尊靈之澤不任伏以真精表瑞元氣分形積秀氣於人寰凝為仙嶽集幽奇於物外儼設洞天上屬星辰下福邦國由是瓊宮珠闕祕邃難窺羽葢霓幢飄颻特降二真人三都跡顯九鼎功成白晝登真丹霄控景威靈益振物象長新寶冊真經琅函玉篆貯靈宮而作鎮與嘉躅而常存遐想元風遙馳素懇今以三川觀化累遇干戈鳳札龍書靡存於魯壁虎符龜籙難訪於秦坑大教淩夷所宜宏拯是用翹懃翠巘稽首白雲申醮酌之儀冀神仙之鑒輟鶴洞緘藏之本為人天宗奉之經佇建殊功却還舊所竊惟道無不在法許流通仰望鴻休允諧丹欵亦願潛迴禎貺暜及寰瀛元元之祚允繁昌聖主之宮城匡復九圍寧謐萬彙昭融臣境宇乂安生靈康泰災躔自息算祿增延永持忠赤之心上副至真之祐不任伏以元化既分茲山作鎮前臨楚望旁控巴城眾流迴環嚴設龍蛇之府㣥峯拱衞秀為真聖之都二真騰翥於前朝千載昭彰於懿躅巖巒蔽日松檜參雲禎祥時耀乎編福祉潛資乎邦國蜀王扶天茂績命世雄姿八國二江早列封圻之內黔城楚硤皆歸陶冶之中惟此仙山光於境㝢仰靈蹤而稽首遙展誠祈望閟境以馳心虔修醮酌將以求書禹穴佇逢八會之篇探洞庭願值五符之訣敷宏奧賾演暢真宗况屬大教淩遲中原多難俾其紹習須俟流通某躬泛長波式遵成命焚香昭告願鑒丹誠所期汜水橋邊不獨傳於漢相典陽泉上豈止授於干君捧秩西歸中興聖教不任伏以道冠虛無功先覆載陶甄有物亭育無私綿劫歷以長存後天地而悠久裁成不竭生化彌彰臣夙荷元休克承道運功輕塵露任重台衡數千里之山河周旋六鎮十七年之臨撫宰制一方每虞福過為災力微成釁兢榮循省憂懼難勝况復大駕未還中原多壘訓兵勵士徒懷於報國勤王望闕馳心其奈於天高日遠微勳靡効孤懇何申今復大遊四神方在雍秦之野小遊天一仍臨梁蜀之鄉地一次於坤宮月孛行於井宿仰茲緯候緬彼災蒙深慮鳳輦鸞輈百二之關河未復陵園寢廟九重之城闕猶虛惟切禱祈佇迴鑒祐是用按依元格遵鍊明科修黃籙道場設羅天大醮九清三界咸陳懺謝之儀天真地靈備展奏祈之禮暜日月星辰之域遍山川嶽瀆之司畢罄齋莊用期通感伏冀天尊降命聖祖貽休俯借神功載康國步鴻圖克固鼎祚中興齊北極以常寧比南山而共永臣允承天澤長奉唐年享椿松延廣之齡竭金石忠貞之節境無災沴嵗洽豐穰雨澤不愆干戈不作龍神安鎮士庶乂寧幽扃霑開度之慈絕域慕和平之化誓宏清淨以答真靈不任伏以元葢上浮黃輿下鎮元精降瑞應運開圖握六紀以君臨恩周率土體三才而司牧惠洽㣥生塞寰區而聲教攸傳亘古今而光靈不泯臣謬膺天澤作鎮坤維荷覆燾以難勝誓忠貞而有守屬乾綱未舉天數中微瞻雲而河洛方遙捧日而山川尚阻徒傾丹赤莫展勤勞今又大遊四神在雍秦之分小遊天一次梁蜀之鄉地一鎮於坤隅月孛行於井宿考遵緯候伏切憂虞是用披按明科修崇黃籙備羅天大醮祈三界真靈願假神休共迴天數使忠貞義烈振風雷埽蕩之威文武尊神借戡定經綸之力重昌祚歷永息妖氛九圍覩清晏之期三蜀荷安寧之賜災祛未兆福降無窮動植存亡同臻恩祐不任臣伏按歷緯今年大遊四神在雍秦之分小遊天一次梁蜀之鄉地一屆於坤宮月孛臨於井宿仰披天度緬屬災期省已拊心伏增憂惕是敢按遵元格崇啟壇場修黃籙寶齋備羅天大醮輒披元蘊敷露真文伏冀尊神迴景上元貽休下土旁垂禎貺永息災躔賜臣封境乂安龍神輯睦生靈康泰遠近昭蘇疵癘無侵干戈弭戢唯虔修奉上副神功不任伏以二象昇淪剛柔定位三靈恢廓川岳裁形坤儀彰厚載之功品物荷資生之德雖混淪莫極猶虞九六之期廣博無疆以繫屯亨之數今以陰陽所運歷緯所甄天一小遊既移於梁蜀四神太乙亦次於雍秦地一屆於坤宮月孛行於井宿仰惟天度伏用震惶竊以臣叨荷寵恩久司藩屏封圻六鎮襟帶重江水惟四瀆之尊山居五嶽之長仙壇靈化皆驂虬馭鶴之蹤珠岸金堤乃禹導秦通之野真靈攸處祥應實繁必介休符以副虔祝是敢齋陳黃籙醮啟羅天冀眾聖之垂光會萬靈而降福共安天步永奉帝圖蕩昏曀於神京重瞻聖日混車書於海宇克保唐年臣境土安寧生靈舒泰邊無烽燧俗洽謳歌息未兆之災躔解已往之愆咎誓虔砥礪以答神功不任伏聞元功宰制道化宣行稟象流形凝神運氣天覆地載爰起於渺茫日照月臨肇分於萬有至於陰陽昇降劫歷推移乾坤有九六之期烏兔有盈虧之數將期拯護允仗真靈臣以微躬遭逢昌運叨塵異渥踐履殊榮龍節虎符攝封壤山河之重金科玉律掌生靈性命之權常慚撫育非才每以滿盈為戒而屬中原多難天步方艱社稷綴旒寰瀛塗炭訓齊武旅徒懸報國之誠迢遞神都莫得扶天之路今者稽求歷緯考察經圖大遊四神方在雍秦之野小遊天一傍臨梁蜀之鄉地一屆於坤宮月孛躔於井宿緬維天度彌切憂兢是敢披靈寶文按河圖品格設羅天大醮開黃籙寶壇仰金闕玉京虔祈萬聖遍寰中象外暜告眾靈馳意馬以披心託香龍而薦懇冀蒙鑒佑允降威神伏惟三界諸天四司五帝乾元主宰地府尊靈降陰陽不測之神假變化無窮之力神兵密助真應潛彰大業中興萬方安泰皇基永固四海澄清埽彗孛於長空勦鯨鯢於巨浪常瞻聖日共載堯天賜臣境域安寧災凶弭息五兵韜戢四氣均調黎元無瘥疫之虞稼穡有豐登之望三川六鎮士庶龍神克洽歡康同臻貞吉其有幽魂滯識六趣三塗沐元澤以生神詣朱陵而受福存亡開度動植蘇舒誓傾忠孝之誠仰副神明之鑒不任伏以人為神主神依人以變通神福於人人資神而讚祐承天統地有國有家惟古及今率由斯道我大唐皋陶種德聖祖垂休光宅中原傳二十帝元風扇於萬㝢皇澤浸於九圍徧彼㣥倫咸蒙覆燾而運鍾艱否時屬播遷天數未寧帝車未復忠臣義士皆懸報國之心望日瞻天敢怠勤王之志今以小遊天一躔梁蜀之鄉大遊四神在雍秦之野月孛行於井宿地一次於坤宮緯候所明兢憂是切是敢按遵元格披考靈科修黃籙寶齋設羅天大醮下窮九壘上極三清嚴陳懺請之儀願假感通之應伏惟尊神眾聖憫鑒丹誠雷發神威風回景貺埽欃槍於碧落殄氛翳於皇都永固鴻圖中興大業次願封疆分野銷解災蒙祛厄會之期致和平之氣龍神輯睦風雨均調疵疫無侵戈鋋允戢誓勤握政上副神功黍稷馨香必虔於蠲潔蘋蘩薀藻克展於齋莊瀝懇陳情不任伏以元穹列耀上表於龍星方局裁形下分於仙化實司命籍以統人倫臣獲稟元機夙臻景祐早承寵渥牧此烝黎綰六鎮之封疆德慚涼薄控諸化之靈勝誠切欣榮常虞政理之乖莫副真仙之鑒今屬太乙行運分野慮災或臨梁益之方或在雍秦之境月孛躔於井宿地一災於坤隅稽考緯書伏增憂懼况嵗當丁卯是臣元命之年月屆仲春是臣稟命之節詣本命之化以本命之辰虔備香燈精申禱祝伏冀元尊憫矚眾聖鑒臨騰素欵於上宮錫鴻休於下土帝圖興復息災期而輦蹕還秦境㝢康寧銷否運而禎祥介蜀俾罄報君之節允符憂國之心百穀豐登㣥生和泰龍神貽貺疵疫無侵臣七祖生天年齡增永誓宏道化以答靈恩不任伏以元道聿分化機肇啟清濁定昇淪之位陰陽運刑德之樞南斗主生垂吉昌而勸善北宮紀死編罪惡以繩非神明用之以化人帝王用之以致理纖微不失今古攸同臣宿稟真謨仰宗元訓敢忘勗勵以自秉修而叨備官榮屬茲多事雖加勤恪實有懼於曠違徒切兢憂固取譏於尸素誅奸癉惡或舉刑章或督懲或施鞭楚犒士或開其宰戮宴賓難廢於烹燔恐因故殺誤傷遂結深冤厚釁又臣行年所歷小運逢災宿曜所躔火星為照月臨申未天符居本命之辰位對丑寅飛旗當衝破之地慮成厄會彌切震驚雖省已循懷寬刑慎行減饌節酒遠色防非猶慮凶咎未蠲福祥莫應恭披典冊虔詣靈山按南斗文儀法上元分緯九微燈影星羅遠擬於六星一德香烟雲色高連於三素竹殿既招其虛實松軒可降於真靈向此披心敢期符祐伏願六宮上聖輟死籙以延生五緯尊神碎禍車而流福冤尢銷解災厄和平骨月安寧境邑康泰風雨調順穀稼豐登寇盜不興沴瘥無作所請靈寶玉篆赤帝天書伏願解臨照於南丹錫恩慈於下土永承貞吉以遂禱祈不任之至伏聞元天垂象斗極居尊統萬彙以無私御四時而成嵗下司命籍總制吉凶有感必通有祈皆應臣粵自童丱竊仰威靈以七星為天地之樞五氣為裁成之本主張禍福制錄鬼神傾心每奉於上元有醮必存於北斗謺蒙昭祐累降禎祥動若影隨事猶響答至或願捐所職謝病尋醫或懼履禍機違凶就吉或雪志於侵誣之際或滌瑕於猜忿之中潛瀝懇於長天暗馳誠於永夜至真在鑒有願咸從而多事所縈靈恩未報常期精潔冀啟醮筵今者天徇深衷神諧夙望幸叨攝任獲在仙鄉玉闕瓊都咫尺封隅之內凝嵐積翠高低城邑之旁况屬命辰仍當秋景遂得躬披松檜深躡雲霞展三獻之禮容猶申公務酬積年之祈禱兼遂私心省分循懷既榮且忭是敢奉持詞欵營備香燈雖澗蘋行潦之微難迴聖鑒在隨感赴機之德願納愚誠所祈答已往之恩佇將來之澤賜其貞吉介以康寧俾縣境無虞農功有嵗人和俗阜遠睦邇安臣或本命五行災衝所及天文九曜臨照所經或政理有所未明賞罰有所未當新冤往債故殺誤傷竝乞蕩除永承恩祐不任伏以二氣肇分五行運化鼓陰陽之士冖䂞籥執生死之樞機亭毒無私陶融靡倦司短長於五帝校善惡於三官維斗居尊總御㣥品臣自維幽陋仰荷裁成獲備冠裳每憂叨竊遵素儒之明訓守元聖之格言尚慮動息成非行藏乖道難階福善易結過尢仍恐三途推移或逢災數九曜躔次或在厄宮况今年天符臨勾絞之方小運當伏吟之位十三宿內月孛所經大運行年猶居衝破以茲疑懼恐履災凶敢用本命之辰虔申醮謝伏惟真聖俯鑒誠祈赦已往罪尢和冤釋結錫將來福祉增祿延年眷屬寧康公私和泰即永荷眾尊慈祐之恩不任
