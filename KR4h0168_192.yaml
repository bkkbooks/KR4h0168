front:
  text: 全唐文欽定全唐文卷一百九十二楊炯三
  hash: sha256:72b50e1c81a62dc04d64aa89232d373406364db3526630eb20ed6af0e76b7a97
body:
  text: 法象莫大於天地變通莫大乎四時懸象著明莫大乎日月備物致用莫大乎聖人夫子諱某字仲尼魯國鄒人也龜龍負讖帝鴻驅八翼之軒魚鳥呈文天乙降三分之璧五十二戰權輿驟帝之基二十七征草昧馳王之業平域中之禍亂掃天下之虔劉以盛德大業之尊當開階立隧之重及其山崩海竭日薄星回歷數不還謳謠遂遠元子賓周而建國二王之車服可尋上卿翼宋而承家三命之衣冠再襲是故陰陽混合泄符瑞於平鄉宇宙氤氳灑休徵於闕里龍準而龜背月角而雷聲有軒帝之殊姿有殷王之異表山開遁甲尼邱落於紫垣星掌巫咸鉤鈐墜於蒼陸淨光童子來遊姬旦之郊乾象明靈下俯庖犧之國十五而志學三十而有成申下問於伯陽屈帝師於郯子天為木鐸九州知發號之期吾豈匏瓜一國有來蘇之望嘗登委吏稍踐中都天下可臨諸侯取則以之禮而國定司空之官以成禮以之義而國平司寇之官以成義掌山林於夏典物得其生聽獄訟於秋官人忘其死大夫亂法仍行兩觀之誅陪臣執權即問三雍之罪強公室弱私家敘君臣明長幼用能使犧牲秬鬯不登闤闠之庭羽戟旌旄不列壇場之位當斯時也三光薄蝕九土分崩夷狄有君中華無禮周京赫赫成康之至教蔑聞魯國巖巖賢聖之餘風巳墜河圖未出吾道不行周流八方經營四海治亂運也窮通命也荷天下之至聖仍逢盜跖之軍仗天下之至和猶有匡人之逼德生於我樂天命而何憂文不在茲臨大難而無懼使仁者必信安有伯夷使智者必行安有王子豈三千擊水牛蹄不能鼓橫海之鱗九萬摶風雞羽不能扇垂天之翼然後上不臣天子下不事諸侯乘殷之輅服周之冕或屈伸於季孟之間或動靜於魚龍之際下學而上達將聖而多能博而無名信而好古察殷周之禮樂損益可知觀杞宋之文章賢才不足數年學易伏羲龍馬之圖三月聞韶媯帝鳳凰之典信存乎德術數貫於神明意見乎時制作侔於造化已所不欲則一言可以終身人之莫違則一言可以亡國惡鄭衛之亂雅樂惡利口之覆邦家榮辱定於樞機褒貶存乎牘精誠密召北辰開紫掖之星福應全來中極敷元雲之氣乃若知幽明之故見天地之心有感而遂通不行而克至年當甲子潛知啓漢之萌音叶宮商預察亡秦之兆星移大火追責天司月入陽街無勞雨備季桓子羵羊之井推水石之禎祥陳惠公集隼之庭驗蠻夷之貢賦然後歷三辰而玉步照四極而金聲坐於緇帷之林浮於亶州之海門生七十仰天路以無階弟子三千望宮牆而不入哲人之能事畢矣先王之至德行矣配乎二象不能遷必至之期參乎兩曜不能稽非常之動南遊楚國遂聞衰鳳之歌西狩魯郊獨下傷麟之泣夫子周靈王二十一年冬十月庚子生至魯哀公十有六年夏四月已丑卒凡享年七十二於今一千餘歲泰山頽而梁木壞微言絶而大義乖傳饗祀於百家奉琴書於十代秦始皇見登牀之讖始亂衣裳魯恭王看壞壁之書猶聞絲竹漢圖起於六千日賜金之禮載優魏德行於五十年刻石之風未泯述文武者皆憲章於聖人修學校者僉折衷於夫子自韋鞲玉歷毳幕瑤圖皇天無皂白之徵戎狄起豺狼之釁摧六律絶笙竽塞師曠之耳天下之人廢其聽矣散五彩滅文章膠離朱之目天下之人黜其明矣我高祖神堯皇帝因三靈之寶歷藉萬國之歡心風起北方月行中道削平宇宙戢干戈於羊馬之年彈壓華夷照文物於龍蛇之代太宗文武聖皇帝升瑤壇於曲洛受玉版於平河經天緯地蕩海夷嶽坐元宮而密轉紫微光帝宅之尊戴黃屋以深居赤縣列神州之貴今上天無私覆道不虛行馭六氣而平太階乘八風而制㣥動星連月合層臺有觀朔之勞海晏河移直筆有書祥之倦封泰山而禪梁甫千載同歸敞衢室而築明堂百靈咸秩雲行雨施品物流形天尊地卑乾坤定矣若乃虞夏商周之禮考正朔而三遷東西南北之人混風聲而一變環林拂日映高柳而對扶桑圓海澄天走鯤池而涵象浦粵以乾封元年有詔追贈夫子為太師咸亨元年又詔州縣官司營葺學廟憑風雲於異代照日月於殊途逝者有知歿而無朽如綸如綍大君施號令之嚴匪朴匪雕上宰極司存之敬長江令楊公宏農華陰人也即華山公之孫大將軍之子朱宮帶地明河一葦之西黃闕中天神嶽千花之北山川壯麗於區宇人物繁多於海內齊九龍而闊步一門鍾豹變之榮襲五公而長驅四代赫蟬聯之祉出忠入孝誕秀興賢冠蓋城邑池臺鐘鼓英靈輻輳鏘鏘萬玉之門嘉瑞駢羅濟濟千金之子是故北方多士太一壯其魁梧南國仙人中書偉其端雅椅桐可仰丹漆兼施照明月於胸懷吐清風於襟袖臧武仲之智卞莊子之勇可以為大臣矣韓尚書之臨八座發迹下邳卓太尉之踐三階來從密縣自操刀入仕聞魯邑之絃聲解劒分司察豐城之寶氣汝陰徐令人號無雙河內王君時稱未有飛雪千里不能改松柏之心名都十城不能動夷齊之行先是殊方暴客常嚴巨野之兵絶磴姦豪每縱黃池之暴數州常以為弊歷政所不能移行人為之聚衆耕父由其釋耒公英謀獨斷鋭氣無前奮一劒以戮元凶馳單車而躡遺噍道旁牛馬並屬羅衡縣內神明皆稱傅炎若乃山林猛獸動星象而垂文江漢貙氓鼓風飈而作氣城門六閉未防虞吏之災都市三言終有山君之暴公雄心裂眥壯髮衝冠按東海之金刀飛北斗之石箭岡巒不擾有符劉孟之城坑穽無虞更似童君之邑自非愛人猶子視物如傷豈能躬斬凶渠親除災害與夫赤繩不用道被於瑕邱桴鼓希聞化移於京洛可同年語哉然後示之以禮義陳之以庠序憑三時之間暇興役鳩工視四野之川原依城負郭青泥險磴斜連白馬之關赤岸長波遠注黃牛之峽懸四方而開益部照參伐於天光賦三錯而闢梁州絶岷嶓於地德背山臨水掩全蜀之膏腴望日占星採公宮之法度丹牆數仞吐納雲霞椽柱三間蔽虧風雨琉璃曉闢東宮雀目之窗玳瑁朝懸西漢蛇鱗之桷圖光芒於北斗聖質猶生赫符彩於連珠宏姿可想至於月衡月準山額山庭侃侃星文堂堂日角莫不向之如在疑遊北上之山望之儼然似矚東流之水博士助教某等西州聞望南國英靈駭飛兔於文場躍雕龍於筆海揚雄博識神遊象繫之端李郃幽通思入璣衡之表每至韶光令月朱鳥乘春爽氣高天元龜送歷瓊籩玉豆中堂奉先聖之儀石磬金鐘南面習諸侯之禮華陽曾子鼓篋來遊蜀國顏生摳衣請學絃歌在側還升武騎之臺禮樂居前重覩文翁之室祁祁茂德濟濟時英聖人千載之風儒者一都之會丞主簿尉某等青田戒露望華蓋而長鳴緑地生風下仙閭而直轡大夫貞節還居內史之丞文學明經猶歷南昌之尉鄉望某等王孫獵騎騁原隰之盤遊公子文鋒敘江山之體勢符偉明以都官謝職逢有道而相推趙元淑以郡吏從班見司徒而不拜僉以鄉閭少事風月多懷命童子於靈臺就門人於相圃冬禮春詩之化再造雙川淹中稷下之風一匡三蜀若夫平南壯烈沈流水於裁碑逐北勳庸登燕山而刻頌庾太尉新亭之墓尚有黃金鄭康成通德之門猶存白瓦况乎功苞大象績被蒼生豈使銘典闕如音塵不嗣是則雕牆峻宇列冠蓋於宜城塞陌填街考春秋於太學小人狂不知所以裁之夫子文章今可得而言也詞曰西崑玉闕南海金堂惟惚惟恍一陰一陽三辰赫赫九土茫茫太極天帝神州地皇驪連上古混沌中央降及軒頊終於夏商四時玉斗五緯珠囊聖德千載淳風八荒天開赤籙日照青光識協金匱兵符玉璜化隆文武澤盛成康天子穆穆諸侯皇皇春秋代謝宗社危亡帝典無象人倫不綱山河命德天地興祥禮樂三變文明一匡原承少典祚啓成湯吹律丹鳳銜符白狼三仁去國再命循牆不有積善其何以昌降靈鄒邑誕哲平鄉月角摛彩星鈐吐芒文行忠信恭儉溫良或默或語能柔能剛學而不厭師亦何常通禮明德尊賢毀方古之君子昔者明王道協公旦神交帝唐攝官從事服冕端章示之以德臨之以莊澤如春雨威若秋霜男女斯別尊卑克彰時逢板蕩運屬栖遑入齊損味居陳絶糧登山極目臨水徜徉無道斯隱舍之則藏季孫大賚敬叔揄揚問官郯子受樂師襄神明協贊雅頌鏗鏘紫麟遙集丹鳥遠翔生靈水火家國舟航功符日用德協天長倏嗟崩嶽奄歎摧梁昧昧神道悠悠彼蒼書開壞宅讖識登牀與代輕重因時弛張氊裘黼黻沙漠壇場璣衡慘丨載籍膏肓汾河水白晉野星黃軒電臨斗殷雷入房九圍臣妾八極城隍東序西序上庠下庠粵惟銅墨寶號金箱靈山地輔德水天潢芝蘭秀出羔鴈成行玉匣孤劒瑤臺驌驦懲姦挫右濟猛移蝗風傳積石道被滄浪絲言渙汗經葺相望夏井蓮植秋窗桂芳繡楹文玤綺綴明璫四注飛閣三休步廊禮行釋菜敬盡明薌圖非有若地異空桑伏羲書契女媧笙簧匏土金石圭琮璧璋高門程鄭碩學王楊威儀秩秩宮徵瑲瑲山棲烏鳥水宿鴛鴦蜀門荷戟江津濫觴落星高堰明月回塘丹碑不朽清廟無疆敘曰銀衡用九天門壓西北之荒銅蓋虛三地戶坼東南之野回七星於上列太清不能潛混茫之機環四海於中州巨塊不能祕生成之業聖人有以見天下之賾擬諸形容聖人有以見天下之動行其典禮靈圖廣運百姓日用而不知神理潛行萬方樂推而不厭古者熊山南眺金崇橫上帝之居鳳穴西臨玉室考元皇之宅五龍乘正按天讖以希微六羽提衡驗星謠而汗漫洎乎尊盧赫胥之代驪連栗陸之君皇名邁於上元帝圖始於中葉莫不憑三靈之寶位鼓舞陰陽藉六合之尊名財成宇宙未有貴而無位博而無名大禮由其再造大樂出其一變蕩蕩乎民無得而稱焉巍巍乎其有成功者也若夫司徒立勳於天地還承帝嚳之家微子開國於商周仍纂成湯之業雖元禽歷數推移於景亳之都而白馬旗常赫奕於風邱之國由是千年有屬萬物知歸乾坤合而至德生日月會而明靈降奎婁胃昴風驅白虎之精角亢房心雲鬱青龍之祉君王異表儀石紐而法丹陵輔相宏資壯皋陶而圖子産豈止鑿就元象摛光芒於北斗之宮括成地形騰瑞氣於東山之曲非天下之至精其孰能與於此神冥造化德合陶鈞獲沖用於生知運幽機於性道窮庶事之終始協庶品之自然覩者不識其靈仰者不知其德步三光於太極昭曜三門含萬象於中區聲明萬國惟深也能通天下之志惟幾也能成天下之務非天下之至神其孰能與於此道尊德貴挫鋭同塵始於中都宰終於大司寇能使長幼異節男女別途路無拾遺器不雕偽姦雄獨立初明兩觀之誅政教未行仍赦同狴之罪盟齊侯而歸四邑夷不亂華黜季氏而覆三都家無藏甲非天下之至剛其孰能與於此青光歇滅赤籙衰微一匡為海岱之尊一戰有河防之霸故得三王不相襲禮亡於寇戎五帝不相沿樂入於河海是以哀生靈之板蕩痛宇縣之分崩歷聘諸侯栖遑異國其為大也法象莫之能容其為高也黎元莫之能覩時非我與遂厄宋而圍陳道不吾行終樂天而知命非天下之至柔其孰能與於此泰山不辭土壤故能成其高滄海不讓細流故能成其大自季孫之賜我也交益親矣自敬叔之乘我也道彌尊矣於是歷郊社之所考明堂之則金人右對仍觀太祖之階斧扆前臨還訪周公之位然後刪詩書而續易象動天地而感鬼神運百代之舟車開千齡之戶牖是故雷精日角聞道德而摳衣月頰山庭奉琴書而撰杖非天下之至文其孰能與於此智以藏往有感而必通神以知來無微而不照論五行於帝輔潛觀太皞之先揆七廟於天災預察釐王之過星流十月徵歷象於衰周日泛三江採謳謠於霸楚神無方而易無體聖人通變化之津河出圖而洛出書聖人悟興亡之兆非天下之至明其孰能與於此極天蟠地之禮周旋揖讓之規百神於是會昌二儀以之同節非禮無以別父子兄弟親疏之序非禮無以辨君臣上下長幼之位本之於元氣徵之於太古德足以法於九圍道足以周於八極服先王之制度黜紅紫而無施斂上帝之明威感風雷而有變非天下之至恭其孰能與於此五行四氣十二月還相為本五聲六律十二管還相為宮至音將易同和廣樂與神明合契盛於中國還陳武象之容奄有四方自得文王之操南風奏雅知大舜之溫北里宣淫體殷辛之暴非天下之至和其孰能與於此悲夫日中則昃動靜之常也月滿則虧盈虛之數也自太平王佐委龍翰於芳年禮樂霸臣摧虎文於華月則知天之將喪也則知道之將廢也雖復頽山壞木兆悲歌於兩楹夏棟周牆陳盛制於三禮猶使文明照爛百王知察變之機鐘石鏗鏘萬代挹希聲之樂信可謂備物致用立成器以為天下利者莫大於聖人也既而三河失統九州之寶幣不歸四塞提衡萬里之長城繼作星祅日祲乾象暗而恆文乖禮壞樂崩彞倫斁而舊章缺洎夫碭山休氣潛膺赤帝之圖沛國真人密召黃星之録尊褎成之厚級殷崇聖之榮班學校於是大興文武由其不墜年當晉宋運距周隋泰山覆而崑崙倒天柱傾而地維絶三重赤暈還開爭戰之端千里黃埃洊有干戈之務亂罹瘼矣黔首何依王室蠢然蒼生無主閭閻匝地今來為講武之場荊棘參天昔日作談經之巿皇家撥亂返正應天順人鼓之以雷霆潤之以風雨馳毚槍而掃穢上廓鵬雲決河海以澄姦下清鼇極今天子握大象運洪爐星重輝海重潤乾回北列垂衣裳於太紫之宮日出東方備法駕於中黃之道混沌之無天無地盡入提封伯陽之有物有象咸乘禮節太階三襲明瑞氣於朱符中極四遊法祥光於玉燭東膠西序雲閣蓬邱國號陶唐家成鄒魯遂使西山童子陳歌謠於璧水之前南國老人受几杖於環林之下乾坤之大德行矣皇王之盛節明矣江茆鄗黍晨昏薦帝之祥鳳穴麟州晷刻因天之瑞乘輿乃選吉日協靈辰詔風伯以行觀促雷師而出豫房為天駟仍施列缺之鞭斗為帝車即動招搖之柄奠玉帛奏金絲登介邱下梁甫擁神休而尊明號莫之與京按玉册而考銀繩於斯為盛於是回輿轉斾臨曲阜之郊畿駐蹕停鑾訪雲壇之軌迹若使九原可作大君得廊廟之才千載有知夫子託風雲之會即以乾封元年追贈太師禮也咸亨元年又詔曰宣尼有縱自天體膺上哲合兩儀之易為億載之師表顧惟寢廟義在欽崇諸州縣廟堂及學館有破壞並先來未造者遂使生徒無肄業之所先師闕奠祭之儀久致飄零深非敬本宜令州縣速加營葺新都學廟堂者奉詔之所立也因三農之暇陳復道之規考幃帳於西京訪埃塵於東魯梅梁桂柱深沈風雨之津鏤檻文㮰曠望江山之表納流雲於上棟白日非遙披濁霧於中階青天在矚雕鐫暐煜窮妙飾於重欄山海高深盡靈姿於反宇門生侃侃如倍文杏之壇胄子鏘鏘若預崇蘭之室每至南方二月草樹華滋蛇陸三秋風煙搖落莫不列蘋蘩於上席行禮敬於質明奠椒桂於中尊敬神明於如在爾其邑居重復原野平蕪出江干之萬里入參星之七度龜城藹藹煥繁霞於百尺之樓蛟浦澄澄洗明月於千秋之水文翁舊學日往年歸劉禪平堂煙荒霧慘武侯龍伏猶觀八陳之圖壯士弛崩仍辨五丁之石左巴右獠之勝域陸海三江之奧壤大都督周王天皇第八子也元元繼天而作降仙才於玉斗之庭武昭應運而生開霸業於金城之域五潢高映流滋液於咸池十日旁羅散光華於若木星懸帝子遙澄井絡之郊嶽列天孫遠控彭門之野姬公以明德之重行寶化於周南曹植以懿親之賢發金聲於魯北通議大夫行長史南陽來恆隋十二衛大將軍榮國公之元子申侯太嶽鎮其靈襟傅説長河昭其神彩龎士元聚西申之逸羽始踐題輿管公明絆東道之雄姿初臨別乘朝議大夫守司馬宇文紀左衛將軍靈州都督之次子台門鼎族傳呼棨戟之榮玉質金相海若河宗之寶庾冰清識得嚴令而非常桓溫貴遊無郗公而不樂縣令鄭元嘉滎陽人也東周玉裔北海金宗列矛戟之森森吐風流而蒨蒨尺兵不用瑕邱有上德之君枹鼓希聞洛陽有神明之宰丞京兆韋德工主簿扶風馬仁礪尉清河張嗣明北地傅懷愛等荊藍灼爍鄧杞扶疏許元度入風月之清關郭林宗獲神仙之妙境南昌晦迹共梅福而齊衡左部韜真與喬元而等列博士張元鑒助教費仁敬等碧雞雄辨則滄海沸騰白鳳宏辭則煙霞噴薄一州聞道親居典學之官四子乘風來聽中和之曲圓冠列侍執巾舄於西階大帶諸生受詩書於北面泮宮之上更開通德之門小學之前復見華陰之市鄉望等魚文驥子震耀於平原漢女巴姬駢羅於甲第杜陵亭長終成輔相之才桐鄉嗇夫且著廉平之號莫不公私務隟即聽絃歌陰雨時間仍觀俎豆逍遙城郭拜夫子之靈祠髣佛風塵見夫子之遺像天道之璣衡莫測下問書生陽精之遠近未知來求小子當仁不讓思齊於上古之名遊聖難言有愧於中郎之石其辭曰太虛寥廓洪罏噴薄上綴三宮旁清八絡元精獨化聖人攸作鼇柱為居龍門是託爰清爰淨惟寂惟寞其一龜讖韜名魚圖表靈火紀雲紀天正地正君臣禮制宇宙輝明文武既沒成康遂行㣥飛海水若羽天星其二玉筐曾裔金符遠系鐘石雖遷山河不替乾坤降德陰陽合契虎嘯風清龍騰雲逝三元載停萬方攸濟其三魯道既昏帛丿糸帛丿糸若存祿移公室政在私門學而方仕謙而彌尊聽之也厲即之也溫義責齊國刑懲季孫其四多能惟聖道廢惟命天下莫容諸侯走聘至於是邦必聞其政仁義立身溫恭成性不圖為樂終悲擊磬其五九野八方栖栖遑遑從周返魯考夏觀商先王道術夫子文章可久可大為龍為光星衡入室月準升堂其六智周通塞神兼語默頎然而長黯然而息漢承周運胡亡秦國察往知來研精茂德無必無我自南自北其七萬象皆尊千靈共同惟變所適居常待終樂天知命匪我求蒙北辰之北東海之東百王遺訓萬世餘風其八時亡玉斗運鍾陽九周井龍沈秦原鹿走生人卷舌道路鉗口禮樂崩頽典章殘朽萬邦請命三靈授手其九日角升圖星精應符載揚風教重闡規模數遷三國年當五胡星芒夜指日暈朝枯環林摧折璧沼荒蕪其十赫矣高皇粵若稽古丕哉文皇照靈下土地維旁綴乾紘上補鯤化三千龍飛九五爰有列聖重規襲矩其十一我君文思念茲在茲金鏡八海珠囊四時三雍九室秋禮冬詩絳帳語道青襟質疑載垂仙渙廣創靈祠其十二披圖按籍遠求陳迹玉檻煙開金窗雨闢晬儀侃侃雲居寂寂弟子摳衣門人避席階列簠簋庭羅絲石其十三地接臨卭山橫劒峯滇池躍馬沮澤蟠龍中望擊節高門叩鐘陰靈肸蠁文雅雍容書池必變坐席常重其十四今還古往寂寥無尚泰山既頽吾將安仰梁木斯壞吾將安放異代風行殊塗影響敢立言而徵聖冀得意而忘象其十五臣聞崑崙西北之天門也則五帝處其陽陸三王居其正地泰山東南之日觀也則秦皇刻其石銘漢帝探其玉策故知建都邑正方位劃崇墉刳濬洫必憑天地之險然後四海為家擁神休尊明號協時月同量衡必致山川之祠然後㣥神受職少室山者山嶽之神秀者也憑河圖而括地用遁甲以開山發揮宇宙之精噴薄陰陽之氣壁立而千仞削成而四方北臨恆碣猶如聚米南望荊衡才同覆簣共工觸皇天之八柱未足擬議龍伯釣溟海之三山無階想像考於含神霧白玉猶存驗於山海經黃花不落其名有序則太室西偏其位可知則嵩高佐命若乃乾坤之所合雷雨之所交仰足廠田坴七星之野俯鎮三河之曲朝市臨於域中樞機正於天下六合交會於是乎有天帝之下都九州名山於是乎有靈仙之窟宅臣謹按少姨廟者則漢書地理志嵩高少室之廟也其神為婦人像者則古老相傳云啓母塗山之妹也昔者生於石紐水土所以致其功娶於塗山家室所以成其德后宗之位象南宮之一星外戚之班比西京之列傳惟幾不測其道無方騁神變而揮霍降精靈而肸蠁亦猶蔣侯三妹青溪之軌迹可尋虞帝二湘水之波瀾未歇何止祠稱丁婦廟號滕枯少女宅於西宮夫人館於南嶽山臨白岸空聞石室之靈浦對青崖獨有金臺之異若斯而已矣時更魏晉數歷周隋四望於是莫修八神以之無主炎涼代序寧觀俎豆之容霜露沾衣非復絃歌之地國家乘天造之草昧屬人謀之與能奄有大寶遂登神器天地水火之無象則女媧氏補之於是乎鍊其五石東西南北之失位則神農氏立之於是乎甄其四海天皇貴與天乎合德富與地乎侔資窮變化之理盡神明之數伏犧畫卦唯觀鳥獸之文黃帝垂衣蓋取乾坤之象利兼於成器功周於備物瑤臺美化闡邦國之風猷銀榜嘉聲茂君親之典禮稱才子者八族則叔獻季貍有亂臣者十人則太顛閎夭若夫圓邱方澤所以享天神地祇復廟重簷所以序文昭武穆命秩宗之位分太宰之官考虞夏之質文定殷周之損益其大禮有如此者高陽有飛龍之樂始會八風帝舜有儀鳳之音初調九奏后夔典其教制氏辨其聲鐘磬笙竽致其和尊卑長幼成其序其廣樂有如此者太微營室明堂布政之宮白獸蒼龍象魏懸書之法下應猶草王言如絲北辰而拱衆星南面而朝天下其為政有如此者糾萬人者施之以八刑詰四方者戒之以三典畫衣不犯載酒無冤免禽獸於網羅納寰瀛於軌物其恤刑有如此者周人之養國老始闢西膠漢氏之召諸生初開太學辟雍所以行其禮泮宮所以辨其教童子五尺羞稱霸后之臣冠者六人惟述明王之道其文德有如此者涼風至司馬於是乎陳兵太白高將軍於是乎宜戰乘斗杓而誓旅出星門而杖鉞莊周稱天子之劒舉之按之呂望言聖人之兵如風如雨其武功有如此者稽其殷令有文犀利劒之效珍考其周書有茲白乘黃之騁力東漸西被南馳北走盧敖之窮觀六合不出於城隍陶侃之飛入八門未遊於仙室其疆理有如此者察璿璣而孚大運天回地遊吹玉律而部人時陽動陰靜煙雲蕭索而合彩日月淑清而啓旦豈直鳳巢阿閣入軒后之圖書魚躍中舟稱武王之事業其休徵有如此者然則囊括混沌發揮生靈大庭不足使驂乘驪連不足使扶轂可以會玉帛可以答靈祇行聖人之大孝既郊祀而宗祀昭帝王之盛節亦因天而事天猶復下聽輿人旁求故實以為唐堯五載無聞太室之儀殷帝八遷未卜王城之地是用陳圭置臬建周后之兩都詔蹕鳴鑾巡漢皇之中嶽熒惑先列招搖在上隱天而動地欱野而噴山旌旗則日月運行鐘鼓則雷風相薄道伊闕據轘轅怡然肆望邈乎周覽壯靈山之雲雨仍求載祀之經對間寢之邱墟思秩無文之禮於是降天渙命司存因其舊迹葺其新廟詳費務議工徒下隴蜀之名材致荊藍之寶玉易者言乎悅使人忘其勞詩者歌乎子來成之不日東西轇轕南北崢嶸繡栭兮雲楣光昭耀兮奪目桂棟兮蘭橑氣氤氳兮襲人皎日登於綺疏奔星下於閨闥珠簾匣上高閣而三休金柱銀楹步長廊而中宿窮山海之王褱寶盡人神之壯麗豈直河庭貝闕俯瞰馮夷之都洛水瑤壇旁臨宓之館爾其巖嶂重復岡巒左右青霞起而照天白露生而匝地餘基隱嶙仍知萬歲之亭古木摧殘尚辨三花之樹明公舊祀棟宇岧嶢仙女層臺風煙爛漫軒轅之訪大隗先求牧馬之童太一之徵少君直下乘龍之使夫峻極也天帝因而會昌夫降神也景福由其興作於是乎昭之以明德聽之以和聲可以羞澗溪沼沚之毛可以奠潢汙行潦之水聰明正直唯鬼神而有知玉帛犧牲在誠信而無愧日之吉靈之來霓為旌兮翠為蓋雷為車兮電為策鼓之以南箕風嫋嫋而先路潤之以西畢雨冥冥而灑道其始至也若海靜山空曈曈曨曨昭白日於扶桑之東其少進也若移星轉漢燦燦爛爛吐明月於瀛洲之半佩珠璣而玓瓅襲羅縠而飄颻建晨興之寶冠踐遠遊之文履命儔兮嘯侶徙倚兮徘徊㣥賢畢集衆靈咸至有西華之紫有中黃之素女華山之上明星遠燭陽臺之下暮雨潛通或瓊室以飛霞或銀臺而薦樂天孫忽降暫停支石之機神女相歡即起投壺之電左侍右衛則甲申之瓊石乙已之蘭蕭妍倡妙伎則憑悅之清歌幽靈之鼓瑟樂章既闋禮容斯備回風兮雲旗入不言兮出不辭荷衣兮蕙帶倏而來兮忽而逝惟神享德降百福而無疆惟嶽配天視三公而有典昔者夏后氏之乘四載曾開宛委之圖周穆王之御八龍猶紀弇山之石况乎上照下漏地平天成人主宅中旁羅於宇縣山靈顯位密邇於神州豈使令德不傳頌聲無紀由是三天降策有南霍之升儲八丈鐫銘有西王之服道魏國鍾繇之字惟勒歲年晉家張載之文遂成明制其詞曰上帝有命皇天無親樹之元后以牧蒸人光宅六合懷柔百神德成郊祀禮備宗禋其一軒稱配永崑墟帝出堯號則天汾陽詔蹕觀人設教協時同律有感必通無文咸秩其二皇家啓聖受命於天上鍊五色旁疏百川開階運斗宅海乘乾王母益地周公卜年其三天子建德重規疊矩聖敬日躋宗文祖武範圍三極和平萬宇率由舊章粵若稽古其四璇宮夜敞銀榜朝開德象陰月聲符震雷山河翼戴星緯鹽梅能事畢矣乾元大哉其五治定制禮功成作樂日月旗常夏殷正朔德澤天外文明地角氣白星黃風搖露濁其六兩京畿甸五載巡遊馳驅太一部列蚩尤將見大隗爰尋許由回鑾躑躅寓目周流其七鬱鬱靈鎮巖巖積石直上五千去天三百帝休非遠真經可覿石室徘徊瓊膏滴瀝其八山維地德神即陰靈瑤姬逐雨玉女隨星陰陽不測黍稷非馨倏忽年代荒蕪廟庭其九旁求祀典載垂天渙始詔林衡俄成壯觀紫梲星錯丹梁霞煥似對青溪如遊白岸其十文貍赤豹電策雷車隱隱中道訇訇太虛遂停龍駕永託神居天回地止霧歇雲除其十一衆靈睒目易㣥仙容與衡嶽夫人漢濱遊女洛川解佩天河弄杼顧慕招攜繽紛儔侶同氣同聲爰笑爰語其十二于以采蘋南澗之濱于以采藻于彼行潦日吉兮辰良浴蘭湯兮沐芳揚枹兮拊鼓奠桂酒兮椒漿神其醉止降福穰穰其十三
