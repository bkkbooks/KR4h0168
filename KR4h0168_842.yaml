front:
  text: 全唐文欽定全唐文卷八百四十二舜卿字贊聖渤海艹修縣人仕梁為禮部侍郎知貢舉開平三年奉使幽州入為翰林學士
  hash: sha256:b44ab4b7da792b16eac9975bddd13e8f76fa7f6f5351fdd2be9dc602a773b833
  markers:
  - {type: head, offset: 14, content: 封舜卿, id: KR4h0168_NFKB_842-h1, level: 1}
body:
  text: 維天祐三年歲次丙寅九月辛亥朔十五日乙丑皇帝若曰惟后法天以降命式協無私惟臣體國以垂功迺興厥后周裂宗盟之土漢封子弟之邦非劉或論於諸儒同姓亦譏於太史疇庸懋賞是曰能君顧茲渺躬實屬艱運允賴元勳廓清寰宇勤勞夙著憫子怠荒開創箕裘保我丕嗣舉同心協力者無虛日推祕畧宏謀者無間時俾列疏封以昭馭貴況江山右地吳越名區百雉則前朝舊都會稽乃夏后遺趾宜旌社土以統藩維咨爾定亂安國功臣鎮海鎮東等軍節度使浙江東西等道觀察處置營田招討淮南四面行營安撫兩浙鹽鐵制置發運等使開府儀同三司檢校太師守侍中兼中書令持節都督杭越等州諸軍事守杭越等州刺史上柱國越王食邑一萬戶食實封六千戶錢鏐大昴流精維嵩孕祉萃東南秀異之氣鍾文武英畧之姿襃然不㣥卓爾斯在自總戎三紀作奠兩藩崇名輝於廟堂茂績冊於盟府處受脤執膰之寄服貂璫犀首之榮行既超人勳無任己勝殘務理經遠詢謀不恃貴以專刑不務功而驕志深厚廓公侯之度剛明執忠孝之規威加敵國而愈謙化被隣封而垂訓以一當千之銳卒勇且知方育幼養老之編氓恭而好禮負戡亂濟時之術蘊天資神授之機設燎延賢築壇禮士詩盈篋笈傳癖橫經比飯均羹席上盡雕龍之客投醪散庫營中皆搏虎之人勁節貫於雪霜至誠格於天地頃者浙人蟻市稱霸蚊雷振妖爾則統仗順之師整爭先之旅飈馳勇敢冰泮渠魁書於鼎彞煥若縑素近則淮夷作孽傖儈無君拒抗王師邀截貢賦竊據州邑斷絕梯航先皇上賓之時不展號弓之慕㣥后咸秩之禮莫申執幣之儀神人共憤其侵陵華夏爭誅其干犯爾則率義兵以疾討統王師而急征期粉巨盜之骨必揕元兇之顱是用金璽昭德彤弓報功明國法之是彰示王澤之非濫委麟符而出征戴鷩冠而登祭慎爾修之克有終也今遣使臣中散大夫右散騎常侍上柱國賜金紫魚袋王矩副使朝議郎守尚書司勳郎中上柱國賜緋魚袋裴筠持節冊爾為吳王於戲加王爵之極號授封建之殊名天鑑孔昭則俾予永契魚水盟踐如日則俾爾益繁子孫往盡乃心服我徵命翥梁貞明初為鎮州節度使王鎔判官父教子忠為臣不易知人則哲惟帝稱難任官惟良底祿以德莫不進方正之士獻賢能之書詩詠繡裳禮設庭燎衣冠濟濟鳴玉珮而來朝文雅鏘鏘望金門而待詔祁大夫之請老內選其親范文子之讓能豈遺其舊皆舉不失職義不在私晉國建其一官魯史成其一作乎三物士遇知己惟其似之覩星使之來儀長歌棫樸覽霜臺之糾謬反示疑狐裘寧假有辭自然無咎秦起曲江之沼漢興濯龍之泉或因山壅流或平地出水皆導達溝瀆修利隄防竭役費財窮侈極麗今國家罷苑囿燕游之所為農桑禾黍之場浸彼稻粱實我箱庾事失業廢其何可知楊氏用因其資大興其利非直務盡地利蓋亦誘人歸本我疆我理既叶農夫之慶載勞載役徒使邑人有言鼎梁貞明六年進士先生諱貫字子元范陽人曾祖濟蜀州司馬祖計掌膳郎父斌守植不仕先生性寬平家人州里莫得見其喜怒長短頗覽書傳尤工詩句天才器識少有倫侶益修黃老之術初賀監知章得攝生之妙近數百年不死負笈賣藥如韓康伯近於台州上升徧於人聽元和己亥年先生遇之謂先生曰子寬中而柔外可語以至道也僊家品秩如青紫基級不可驟寘必以退節為首退節則寡欲寡欲則神逸神逸則無為無不為也反此而求道猶卻走以追奔也子其志之後遇今歲遇爾於小有也乃授斷穀丹經先生盟而受之吞一粟則十年不饑門人得之皆符經訣於是先生道譽喧動公卿耳目求見就謁凡累十人丁酉年鄂侯楊公為華牧張公乞丹於先生先生曰學道先乎養神然後吞藥藥吏也神君也君逸於上吏勞於下以勞助逸是謂萬畢貫將吞丹也坐忘所思行忘所之卻視其身蕭寥希夷所以絕穀十年不饑今張公萬乘柱石百姓父母一物失所必軫於懷欲無勞神其可得乎雖九轉還丹亦無補也公曰其言至矣己亥年秋九月先生召門人壻姪曰二儀者萬有之逆旅兩曜者百靈之燈燭欲燈燭之不曉安逆旅之不去怪矣況賀公之期至矣乃就沐浴如有所候粵八日奄然委化壽九十有五先生夫人胡氏蚤死無嗣一女適張審言無男一女適黃虞卿雖別族姓皆得鳳毛伏覽經法養志邱園聲華籍甚則曰先生無愧矣始刻石子壻與表姪孫謝步馬門弟子閔仲孚等議曰昔婁妻諡其夫曰康至今韙之二三子得不以黔妻為式乎我先生聽於無聲視於無形不曰通乎言不訟物之短心不繫時之非不曰和乎謹號通和先生以彰先生之德也何如僉曰俞遂刻號於石其年冬十一月十一日葬於宅東北隅祔胡夫人墳右世禮也鼎亦先生所教者奉門人壻姪命為墳表銘曰北西山南東湖水為陵山為洿先生名字終不誣步馬梁貞明中官衡州長史進所撰地理手鏡十卷妙為曲者暢於情樂為心者和於聲微至儀之難象因貫珠而強名豈不以符雅正契虛盈聆纂纂之音無遺曲折體纍纍之狀取象圓明方其咀宮商激志氣雖直己而成善亦導和而為貴當發德詠功之際侔照乘之聯輝在一唱三歎之時若呈祥而聚緯其聲既全其質彌元發皓齒而潛融熠熠隨雅調而暗轉連連間赤水兮虛瑩異滄海兮孤圓動白雪之聲初疑剖蚌度元雲之曲終類投泉是知善臻其極喜可以飾不煩不體乃端乃直赴於節意的爍以交光盛於文想瑩煌而化一作比色懿夫歌以心而虛受珠以元而可久表於直而不表於邪貫於心而不貫於手其奏也乃生於自然其闋也復歸於無有掩抑虛徐溫如皦如誠激揚而導志諒璀璨而澄虛所以表和平所以類輝煥陽春為罔象之得綠水乃驪龍之翫知音者誠審其無象無形而不知音者徒謂其有條有貫且道以物而相符事有類而形殊擇其善者騰光於瞬息去不善者匿曜於斯須吾將激流徵習帛丿糸駒精於曲喻於珠庶賞善而不昧比至寶以無渝延字世美鄭州長豐人梁相李琪薦為即墨令馮道作相召拜左補闕累遷刑部尚書以太子少保致仕卒年七十三一縣之內所管鄉村而有割屬鎮務者轉為煩擾益困生民請直屬縣司鎮唯司賊盜鄩密州安邱縣人中和中事青州節度使王敬武為小校光化初以破張蟾功表為登州刺史移刺淄州天復三年從王師範降梁表為鄜州畱後天祐二年授右金吾衛大將軍梁開平元年充諸軍馬步都指揮使檢校司徒累遷佑國同州軍兩使畱後尋為永平軍節度使四年加檢校太保同平章事末帝即位授開封尹貞明元年加檢校太尉授滑州節度使領鎮南軍節度使五年遷泰寧軍節度使六年授河東道招討使命討朱友謙尹皓段凝輩素忌鄩言鄩逗遛養寇詔歸洛河南尹張宗奭承密旨逼令飲酖而卒年六十四贈中書令臣受國深恩忝茲閫政敢不枕戈假寐罄節輸忠昨者比欲西取太原斷其歸路然後東收鎮冀解彼連維止於旬時再清河朔豈期天方稔亂國難未平纔出師徒積旬霖潦資糧殫竭軍士札瘥切慮蒼黃乖於統攝乃詢部伍皆欲旋歸凡次舍經行每張掎角又欲絕其餉道且據臨清纔及宋城周陽五奄至騎軍馳突變化如神臣遂領大軍保於莘縣深溝高壘享士訓兵日夜戒嚴伺其進取偵視營壘兵數極多樓煩之人皆能騎射最為勍敵未可輕謀臣若苟得機宜焉敢坐滋患難臣心體國天鑒具明翰梁時人顯允君子德充慶延叔世家魯陋巷生淵同師將聖俱謂能賢千載之下清風凜然翔字子振同州馮翊人乾符中舉進士不第梁祖以為館驛巡官開平中授崇政院使遷兵部尚書金鑾殿大學士友珪篡立拜中書侍郎同中書門下平章事唐莊宗入汴自經死國家連年遣將出征封疆日削不獨兵驕將怯亦制置未得其術陛下處深宮之中與之計事者皆左右近習豈能量敵之勝負哉先皇帝時河朔半在親御虎臣驍將猶不得志於敵人今寇馬己至鄆州陛下不畱聖念臣所未諭一也臣聞李亞子自墨縗統眾於今二年每攻城臨陣無不親當矢石昨聞攻楊劉率先負薪渡水一鼓登城陛下儒雅守文未嘗如此俾賀王褱輩與之較力而望攘逐寇戎臣所未諭二也陛下所宜詢於黧老別運沉謀不然則憂未艾也臣雖駑怯受國恩深陛下必苦乏材乞於邊陲效試守光深州樂壽人幽州節度劉仁恭之子拘父自立僭號大燕為後唐莊宗所誅臣守光謬叨戎寄向受國恩既有血誠合宜披訴伏自陛下初登寶位纔建皇基四方尚擾於干戈諸道未賓於聲教唯臣不勞兵刃不俟詔書便貢表章率先歸致令河北一面晏然無虞其後又以河東結搆邠岐朋附淮蜀久稽天討屢軫宸襟臣又密設機謀指揮夏侯敬受已下令翻賊寨遣向朝廷鑾輿纔至於陜郊兵騎悉歸於行在使兇渠北遁致翠輦東歸獲立微勞稍寬聖慮其於向國粗竭丹誠昨者兄守文遽於明時擅興兵革堅貯吞并之志全無友愛之情誑惑宸聰即言迎侍勾牽戎虜元逞他圖兄之行藏臣實所諳悉當於此際備見狡謀必知要當道之土疆為朝廷之患害累曾申奏莫不丁寧今者既破賊軍足以細驗前事昨於陣上所殺契丹兵馬絕多及寨內收得契丹與往來文字不少今又捉得自來與臣兄謀事人道士褚元嗣學院使鄭緒等皆言兄本計謀極大妄動絕深不唯窺取其一方實亦將圖於大事苟非臣親當戰陣手執干戈大掃㣥兇生擒戎首則滄州得志蕃衆轉狂合勢連衡為患非細固不是臣自矜小捷妄有飾詞其褚方嗣等分析文狀謹同封進其褚元嗣文狀多述守文結搆說誘幽州將士及會契丹窺算幽州城池皆是自相魚肉又言如守文得志必謀亂中原以迎侍為名實欲并吞燕薊又滄州鼓角門東有誓眾碑一所其辭願破梁國卻興唐朝及見幽州歸向朝廷遂拆卻碑樓其碑坑於樓下文字見在又守文所遣男延祚入質不是親兒又守文令褚元嗣將琉璃水晶金銀等器錦綵與契丹將領約取幽州後別圖富貴其契丹少君遂差使還書願與守文勅令守文乃言得契丹下大夫所贊也襲吉洛陽人自言左相林甫之後乾符末舉進士遇亂避地河中依節度使李都為榷鹽判官後去之太原李克用署為府掾出為榆次令光啟初署為掌書記三年遷節度副使拜右諫議大夫天祐三年卒後唐同光二年追贈禮部尚書一別清德十有餘年失意杯盤爭鋒劍㦸山長水闊難追二國之歡鴈逝魚沉久絕八行之賜比者僕與公實聯宗姓原忝恩知投分深情將期棲託論交馬上薦美朝端傾嚮仁賢未省疎闕豈謂運由奇特謗起奸邪毒手尊拳交相於暮夜金戈鐵馬蹂踐於明時狂藥致其失歡陳事止於堪笑今則皆登貴位盡及中年蘧公亦要知非君子何勞用壯今公貴先列辟名過古人合縱連衡本務家邦之計拓地守境要存子孫之基文王貴奔奏之交仲尼譚損益之友僕顧慙虛薄舊忝眷私一言許心萬死不悔壯懷忠力猶勝他人盟於三光願赴湯火公又何必終年立敵懇意相窺徇一時之威靈取四郊之倦弊今日得其小衆明日下其危牆弊師無遺鏃之憂鄰壤抱剝牀之痛又慮悠悠之黨妄瀆聽聞見僕韜勇枕威戢兵守境不量本末誤致窺覦且僕自壯歲己前業經陷敵以殺戮為東作號兼并為永謀及其首陟師壇躬被公衮天子命我為㣥后明公許我以下交所以斂迹愛人蓄兵務德收燕薊則還其故將入蒲坂而不負前言況五載休兵三邊校士鐵騎犀甲雲屯谷量馬邑兒童皆為銳將鷲峰宮闕咸作京坻問年猶少於仁明語地幸依於險阻有何覘覩便誤英聰況僕臨戎握兵粗有操斷屈伸進退久貯心期勝則撫三晉之民敗則徵五部之眾長驅席卷反首提戈但慮隳突中原為公後患四海㣥謗盡歸仁明終不能見僕一夫得僕一馬銳師倘失則難整齊請防後艱願存前好矧復陰山部落是僕懿親回紇師徒累從外舍文靖求始畢之眾元海徵五部之師寬言虛詞猶或得志今僕散積財而募勇輩輦寶貨以誘義戎徵其密親啗以美利控弦跨馬寧有數乎但緣荷位天朝惻心疲瘵峩峩亭障未忍起戎亦望公深識鄙懷洞迴英鑒論交釋憾慮禍革心不聽浮譚以傷霸業夫易惟忌滿道貴持盈儻恃勇以喪師如擎盤而失水為蛇刻鶴幸賜徊翔僕少負褊心天與真氣間謀詭論誓不為之惟將藥石之譚願託金蘭之分倘愚衷未豁彼抱猶迷假令罄三朝之威窮九流之辯遺迴肝膈如俟河清今者執簡吐誠願垂保鑒僕自眷私睽阻翰墨往來或有鄙祠稍侵英聽亦承嘉論每賜罵言敘歡既罷於尋戈焚謗幸蠲其載筆窮因尚口樂貴和心願袪沈閼之嫌以復壎箎之好今者卜於曩分不欲因人專遣使乎直詣鈴閤古者兵交兩地使在其間致命受辭幸存前志昔賢貴於投分義士難於屈讐若非仰戀恩私安可輕露肝膈悽悽丹愫炳炳血情臨紙嚮風千萬難述伏以變法不若養人改作何如舊貫韓建蓄財無數首事朱溫王珂變法如麻一朝降賊中山城非不峻蔡上兵非不多前事甚明可以為戒且霸國無貧主強將無弱兵伏願大王崇德愛人去奢省役設險固境訓兵務農定亂者選武臣制理者選文吏錢穀有司刑法有律誅賞由我則下無威福之弊近密多正則人無譖謗之憂順天時而絕欺詐敬鬼神而禁淫祀則不求富而自富不求安而自安外破元凶內康疲俗名高五霸道冠八元至於率閭閻定間架增麴糵檢田疇開國建邦恐未為切緘幽州劉仁恭故吏使鳳翔還李克用畱署為推官歷掌書記從莊宗經畧山東承制授檢校司空魏博節度副使胡柳之役歿於亂兵夫以玉燭搖光碧落霄懸於合彩金輿厚載丹邱靈毓於祥音斯蓋運契星足厂墨道符天意流淳化於萬類動植咸熙抽勝策於九章華夷景服王澤流於上龢風悅於下故有雲連峭壁藹如畫之煙嵐質異山梁翥凝霜之毛羽是知鳳鳴汧右千年而山得佳名鶴降遼東萬古而地稱佳號我嗣晉王珠履表異玉節傳榮廓氛祲於中原躋生靈於壽域沈研麟史征南徒釋於三編擒縱龍韜忠武虛譚於八陣劍橫大樹㦸中小枝睦鄰而將罷東征富俗而民歌棲畝矧乎三清分派九合昇壇刑白馬以會同盟致丹鼠而忘巨猾昔歲金橋之戰勢掩昆陽近年丑水之征威符淝上豈謂重燃興燎惡蔓猶滋豨跳將害於周禾烏合連㣥於伏莽於是躬提千乘途邁六辰行方結於魚麗路復經於龍墅睨蒼翠之側於蘙薈之中覩靈雉而低翔當神騏之逸足可謂練舒皓色玉潔爭光有同於天上飛來無異於目前化出花冠踴竦瑩瑩而珠點雙眸霜翮秦翹閃閃而雪翻兩翅嗣王祝之曰既瑞世瑞時可勿驚勿畏乃虛之以雕籠擁之以襟袂忘十步一啄之心有帝扇后褕之意若棲於瓊花枝上皎潔爭分或飲於水晶壺邊精瑩莫認天命此墅也稅蠲青畝山封白雞前古之越裳入貢効祉殷朝而今以晉王薦祥永光唐史緘學慙重席世奉初誕背文總愧於色絲辭鄙應還於夢錦山唯紀事用垂帛丿糸長佐命忠勳序列銜秩時天祐十載龍集癸酉鴻鴈來賓之月十五日記德倫河西部落人少為滑州牙將梁祖領四鎮德倫以本軍從累歷刺史畱後遷平盧節度使魏博楊師厚卒代其任貞明元年三月魏軍亂執德倫囚之李克用入魏以符印上克用授雲州節度使為監軍張承業所殺臣當道兵甲素精貔貅極銳下視并汾之敵平吞鎮定之人特乞委臣招討之權試臣湯火之節苟無顯效任賜明誅
