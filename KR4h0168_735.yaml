front:
  text: 全唐文欽定全唐文卷七百三十五沈亞之二
  hash: sha256:534bcae91f0f827b46869f0193dd679b88198220ada3ef4ea2afca95b5fac211
body:
  text: 九月十日都團練副使沈亞之謹再拜狀所願陳於閣下某伏念從古以來懷其所為抱其所用者非知己之進無能自揚也自咎繇之蒙舉顏回七十子之蒙范叔之蒙鮑叔之推至於今知己之功相嗣而不絶非有文字之記其功雖如前數士而後代無聞也可不惜諸往者某始得以文謁閣下於吳之嘉興明日權幼公謂某閣下言吾見古史者亞之也其後涉於仕路困則遭恩其知如此且以閣下居為世之端表故衆影依之言為世之典謨故衆聽傾之其重如此使一遊其門則天付以幸也而況知而推之哉提而用之哉然亦懼不申於文字而後代莫覩是以前者敢以先人所業之書上干清鑒求其筆為之光以揚於幽故而為後代寵奉獻之日惕恍咽然不能周露誠以黷矣伏願憐其繼志之心使輝華裔著於百代雖大寵何以加於此焉伏惟俯賜終筆書辭再陳無任惕汗謹再拜二月二十八日都團練副使沈亞之拜書復獻大使中丞閣下亞之昨與二三子同途晨問起居指教所謂薄疾未除將欲有請草奏具示始則卒然愕窒不知詞對及退舍伏念閣下之所苦者惟中年之士八九而有之未嘗聞以此而有去告閣下惟不為出入遊宴耳其餘決教益理膳息無減况方在強茂之時徒以小恙暫留虜中乃欲為告以自遂豈當宜也且今時仕俗守榮路者雖已老朽支扶昏恍矣然則固其所居惟恐有損如此者亦十八九而閣下瞭然自悟所向若此得無獨清之纍積疾於彼人之胸中哉閣下骨肉交姻如有遠萬里者即聞是請寧知其退讓也必且疑驚隱慮莫能自浣設使憂能侵人閣下何以解也亞之見識孱淺無足以奉請事今極慮深陳於前誠願得於中庸使人無加口語也非敢憑緣取領厚祿而終斯説伏惟稍緩高明之鋭以周慮之冒陳端白何任恐懼伏惟憐之二月二十一日都團練副使沈亞之拜書遣獻中丞閣下昨日候吏自外來急告以赦至亞之誡前後左右不得常步及下馬就次揖謁先聖獨張侍御不領祇言哮呼詬訾捽拽導將移罵侵怒俚言攻淩不容須臾之間以黨證攘掉呀騰如欲見食自㣥官衆將至於聚立者咸聞見其粗聲奮態圜來驚視誠以亞之樗鉛之材處不當任可逃遭此衆辱宜矣然誠恐積暴不除異日酒場恃醉率肆所為又為侵作誣言飛入清聽以是寒心自悲不能無患亞之幸蒙過意提在賓階雖無分銖之能以事萬一然誓將鞭勵孱謹以效終身伏願哀其端拙察以無辜稍借光明使各得分限免見侵迫過此之虞餘何敢請伏惟加察幸甚幸甚謹再拜月日新及第進士沈亞之再拜稽首給事閣下亞之幼學見其往記説曾參閔子騫之孝至於跬步不忘雖騃幼亦能蹴然內慕自是常思其人有能跂於曾參閔子騫之行者即往傳其名於親戚朋友卿大夫間使其聲不滅昔者五年亞之以進士入貢至京師與其等清河張宗顏比居嘗與往來言始愛其人無遊詞至春宗顏去還家久聞其親喪又明年亞之東歸至洛聞人稱宗顏之孝曰宗顏貧無以事喪乃與其兄東下至汴出操契書奴自賣聞者皆慟感流涕然盈月不得售汴帥聞之持百縑使弔勞歸之盡發其先故羇柩歸葬於所是歲亞之至彭城日話其事彭城人曰此吾里之孝子也八九歲時喪私親貧不能奉飯含乃繫木為車與其兄自挽而送吾里謠之曰拖車郎是今曾閔之行難而閭里盡熟亞之竊痛賢公卿未得稱其如此伏思閣下於異行尤能鋭樂故亞之敢以宗顏之事為請伏惟訪察之幸不默默已也中丞閣下法者古王一其度於天下蓋欲必信於人耳非執事之臣能得專喜怒以自弄今或奉之未如其意何哉乃十四日亞之晨出南府門見一人衣縞不帶乘捷馬北馳健僕呵道衆僕皆左右馬分走甚嚴亞之意謂執事有服者即止馬匿道下既去私曰執事寧不帶耶不則又何呵也問其僕曰是方士李元戢者繫盜他郡焉亞之曰既繫何謂縱而遨乎僕曰彼言能化黃金反童齒今一郡大惑下自豪吏盡欲德之故馳過其家旦暮不暇亞之因仰而呼俯而揖曰是能化黃金反童齒焉凡執左道亂正者在殺不以赦今其人且繫尚能惑設冠帶自儀而孰不陷前日信州刺史以夕祀黃老不當理官臣譖之得罪幾夷誠可寒心今閣下獨不省悟亞之雖不肖亦知為閣下畏伏惟亟誡獄吏使固手足之繫與常死罪者等無令出入自便不然法為吏侮而閣下安所任主哉幸留意焉亞之再拜今年秋亞之求貢於郡以文求知已於郡之執事凡三易郡失其知輒去其友相率而笑之亞之為之語曰里人有良金鬻於市而里之豪亦鬻焉俱將售於衡者豪人金雖精里人出其左衡人畏豪奪其價而先豪里人懷而去明日之他市而衡之直復不同又懷去又明日之他又然歸而聚黨與謀曰聞某市有衡人不欺一市之人謂之直遂往與㣥金角俱歷火升衡市人曰雖然願先豪衡人曰是精粗在目輕重在衡衡目可欺乎市人慙而退其直果然今亞之負詞之來於執事其望亦同於直者也伏惟熟察無忽亞之再拜孔子之徒三千而言升堂者十輩然皆不能周其德故各以其所長出人者稱之名曰四科百世之下皆言孔子聖是知無全能者也今亞之雖不肖其著之文亦思有繼於言而得名光裔裔不滅於後由是旨春秋而法太史雖未得陳其筆於君臣廢興之際如有義烈端節之事輒書之善惡無所回雖日受摧辱然其志不死亦將俟能為孔子之心者拔之是以晝夜增矣時亦有人勉亞之於進士科言得祿位大可以養上飽下去年始來京師與㣥士皆求進而賦以八詠雕琢綺言與聲病亞之習未熟而又以文不合於禮部先黜去今年復來聞執事主選京兆長安中賢士皆賀亞之曰某執事斯謂明矣其取舍必以目辨而察亞之曰微亞之以八韻為畏對曰不然夫良工為厦而選材者不以桷廢棟不責能此而否彼又曰無求備於一人此聖人採取之至言也亞之文已貢矣執事其服孔子之心有素如其取捨之際亦能留意乎亞之再拜馮生足下前辱書時會鄙人將有適方事役在焉今則足下又赴省於東故束書久不遑答有負懇款無以自露然則書辭所屬寧鄙人宜當託是乎乃敢自酌以揆其意惟智府悟之樂府倡為歌十年聲流邯鄲下而魏歌者往請之曰聞古之韓娥其歌也能易哀樂變林籟則有是也何自而及是乎今子能揚韻激妙感物態矣而人投聲請價者宜以遂之必且語我使聞聽於衆耳以得售進入為王左右之娛對曰若韓娥之歌韻合於氣聲合於情是故草木之於地也氣為之君五腑之居人也情為之長草木之生其根處瘠則其表訥處潤則其表昌瘠之訥潤之昌不過其草木及氣之作也為溫陽則萬族舒為晦寒則衆色稚瘁五腑伏五行設如金困於內則肺亢應於外而嗅厭極則反之木極於內則肝怠應於外而食亂困則反之困而厭極而亂不過一發於內一應於外而已及情之作也為喜適則七竅走而會之怡為悲愁則六氣集而赴之慘自皆不得自任也韓娥之得也在此馭二情以攻之故能易哀樂歧二氣以襲物則能變林籟其神至矣亦尚未聞飫寵賞於當時者何也所感者智人也草木仰天性智人不混於纍夫衆庶之目怫於視世俗之耳離其聽故擊弊缶貫鼠革聚觀於市促促之歌巴聲夷辭唱一而和百贊之者千萬人南風之絃雲和之瑟曠世莫用烏能自唱其德於聲音雖韓娥之妙欲誰繼者今足下將行者古道也將操者至聲也鄙人方困世之厭斥安足以使之聞聽於衆耳發嘉譽於此日乎猥辱雅向願悉所識幸甚幸甚亞之白辱書覽所指令僕人持書致安南守使從雅旨以恝所欲意者謂僕人居峻勢能可驅其意一作謂僕職在軍副其力可驅彼之情易如瞬眴夫何妄誤容易而不見知其不能如此哉且安南守其志木佷自齊從事已下咸以公籍督稽歷受訕侮繼章謗淩彼恃門矜耄無所加責前日韋同舍亦然顧亞之孱畏靜常遭尤况又掌刑書纍以法操其吏彼無路而露忿於僕人耳今來書指教欲使有為是執仇而赴於敵也何能致其願乎幸終悉省不宣亞之再拜降書誨慰滓滯之情稍以揚矣昨日奉策應對之日操意張謀唯恐不遠刻文勵語唯恐不工思欲不肩於俗以為世之大寵及遭不録退舍自念夫若是也非窮心於此安能堅然而顧之雖窮心極思而風水之力所排者又安能固之於此固之於彼非吾兄韓兵部安能無所惑者知與既寡攀援將誰近世復以知人為恥既知而譽乃謂之私反不若譽姻黨耳以此自悲不能無憤亦欲極老目之力不忘於文以思雪於後代之人耳吾兄豈嘗失味於是耶乃教之空門之説小人狹薄尚為激然之氣戰燎於胸中故九引達者之波而澆之而熱腹九泄未知其救也果兄之教復至是將有可開也自廣之詞紙不能盡亞之再拜郢崖謫吏敬對所詰引言為書致於九江郡守鄭君閣下詰之既深焉得默默已也固折委譴之于章遂用悉陳惟聽之國朝天后之時使四裔達威德之令皆儒臣自喬知之陳子昂受命通西北兩塞封玉門關戎虜遁避而無酬勞之命斯蓋大有之時體臣之常理也然喬死於讒陳死於枉皆由武三思嫉怒於一時之情致力克寸害一則奪其伎妾以加害一則疑其擯排以為纍陰令桑梓之宰拉辱之皆死於不命嗟乎嗟乎自是之後臨戎觀危酌逸勞之狀為使者而儒臣莫與矣前年天子以兩河逐叛之兵連歲不解負挽之輸而不造廩庫皆從便道為戰士衣食之給於兩河之間歲尚賑賙輦轂之下執笏常謂請罷所討者十八九獨諫大夫自以為習知叛臣之情日就窘請得往導愍痛以歸之既可所奏即請以亞之為副又以為古者單車為使有功則為戎臣輕害之遂於行請兵以自柄詔書仍以便宜從事又詔邯鄲巨鹿兵各以百騎與俱蓋欲重擊鑿之柄也及過平原郡城而有常山卒分居之諫大夫因令亞之為書檄之書成亞之題帛引弓射書於常山帥帥得書以期請降滄海之人聞之降者日百有餘輩及滄海寇款與符印偕至即請以城歸使者是日往受城亞之復引前驅騎馬先至滄海同捷與其徒繫頸者服衰不帶伏軍門之左委命於使執事於是諫大夫遣河南將石稅部獻闕下稅夜殺同捷於平昌亞之分道馳還以報事道中不得乘乃乘羸驅馳至貝魏之門守長皆為艱日昃不得食因中病於廣武之間歷再旬而謫書降即奔上所委今閣下罪諫大夫以為狷急忘體冒危取禍習傳不察其端本附言和唱敢避忌應對哉昔者酈生馮軾下齊城七十韓信劫而烹之在前代且爾况今持兵連營淹歲經時既費且敗萬無以自塞之際而使臣奉命詔銜解羈裂網之恩啓萬死重生之路曝鰓就鼎之枯彼不思于降復何歸矣今習詩書步規矩而進於是者固未嘗習武事况親於戰鬬之間耶必多武臣之言以為信何者重己之不李祐避能耳誠邁越之談也或亦有詰亞之曰李祐避壁攻平原城城危且急尚不聞有效且使臣居間曾不逾月而云城降者何端亞之應之曰獨不見童子之情乎夫童子師與終身之益何惡而不附乳母蠕蠕之常恩而投戀肆喜何者氣微意迫則毅容之難洽而告欣之言在前也是則向使之卒披堅甲持鋭鋒以相攻差剛決於敵者不瞬而殞形喪魄矣有如使臣之煦諭明白寧有忘生趍死之渝乎此解析之言誠不當為閣下説説亦不能降聽以委書之丁寧者蓋欲流之於世以俟通方之士次第於所誤耳梗概之録不文於詞亞之敬再拜亞之再拜稽首大夫閣下亞之昨去長安時歷別於所知親友門所知親友謂亞之曰安所適安所為亞之對曰適鄜將假貸於諸侯門所知親友賀亞之曰鄜有長賢大夫也喜文學仁義之道故其所為文學仁義之道欣欣焉走其門者日有之亞之納喜於心充充焉捶馬走僕忘其勞失其怠望閣下之境日近日喜及至之也且觀將謁之禮於其門乃見納客之官奔奔而入促促而出言不及吐道不及陳退居三日不知所為乃復聽閣下採取賓士之道高下之等則曰某自某方來以某執事書為之輕重書之多者館善宇飽善味書之次者又次之其有無因而至者雖辨智過人猶以為狂即與偶然之輩徼幸之徒退棲陋室與百姓雜處卞惡味且走來閣下門者亦不獨盡窮餓無依而來求粟帛於閣下亦有抱其智懷其才聞閣下好賢而來求臧否於閣下而望其推引之濟耳今一貫而禮一類而惠賢愚顛倒而又以書不書而為之輕重竊恐天下之士其來閣下門者皆相爭齎書為糧受閣下之惠者不曰閣下之惠而皆曰某官之書禮我也何有愧於閣下不惟不愧而已亦有憤激於衷而終怨怒者竊恐閣下勞費以取無益亞之愚獨為閣下惜伏願閣下稍精接士之道使賢愚明白閣下能知此則四方之士聞之皆謂閣下不吝己之不至而求其方直如此今亞之冒旌戟之嚴敢言進於閣下亦希知言之士聞之知亞之不苟曲於閣下而存其直如此戰戢無任亞之再拜昔者亞之西遊過岐山而令秩始謝余將就給食人曰故令雖貧然能卑人厚禮何不往舍也時方暑既見解帶坐令衣弊繒短衣使兒孫姪捧案前賓食食已有客越而請曰聞令家無女使賤走賓客食必夫人親治之誠厚士勤矣且賓之來者無賢不肖皆即混然齊飽是愚為冒矣而賢者安所愧乎今願擇之而厚結如何也令曰古者侯生亦有言人固未易知夫士以食而來我者留於門無繫帶之間尚已為久矣焉能待辨而後進乎亦寧有給之一食而使其甚愧固如是雖賢愚何望哉客慙而退至今三年與令遇未嘗再會食客今令窮來京師人無假氣而延於進者嗟乎會豫與令各有適故書前事以敘所憤云歌詩之所以為發寤其旨甚遠夫物情暢樂怨抑之感吁而散之大空還會於風雲降於水土包聲於陶埴之器髣佛之變盡搖於樂樂之所感微則占於音章則見於詞微於音者聖人察之章於詞者賢人畏之故勤人之君欲以聞其下忠主之佐使以達其上夫往代之詩樂皆能沿聲諧韻今徵其文以觀之而其代興衰可見也寧近世學者固不變風從律耶何為其詞不聞充陳於管絃乎今樂府既闕所奏如有忠言之意衆所仰哉余故友李賀善擇南北朝樂府故詞其所賦亦多怨鬱悽豔之巧誠以蓋古排今使為詞者莫得偶矣惜乎其終亦不備聲絃唱賀名溢天下年二十七官卒奉常由是後學爭躍賀相與綴裁其字句以媒取價嗚呼貢諷合韻之勤益遠矣膠亦諸王孫頗專七言詞始來長安人以為思轍賀今一不中第言歸故楚江陵下豈欲以廣其情於煙波顧有撰余乃敢悉序詩歌之大端以為別贄初亞之提筆西入關留舍鮑溶於揚州溶出詩吟至夕過百篇而窈窕之思雜發亞之歎息曰後生亦有繼之哉鮑溶言前在長安常出入冡官杜氏家㣥孫皆喜溶是時憓方學何虞詩于其音往往能自振激後可得也及亞之與生昆弟遊其相樂之愛故與溶等而溶言果然十年春生長上知生之志謂生曰巴漢瀟湘之水皆淪流於東合而為大江猛注於江陵揚州兩地之間其名山圜連橫秀之色屬江而起前文者自馬遷皆經遊之六代為詩之士而得聲名騰翔矣因命生去遊以廣其思三月生即路亞之喜鮑之知言又樂生受命之遊故終始以序清河張生少以善言語應對聞長又好六符神略嘗從奇丈夫遊至北邊歷塞經受降城以宗人蒙幸於上將軍受降城扼塞得與方鎮列方鎮諸侯時節更置其使通殷勤生以善言語故遂得居使者位今年夏生使於夏得其歡而還夫以節度尚書公專聲重義為天下望者重目故以四方使其來者難如此不必言受降城上將軍之善應對不辱於此而見其不辱也不必言尚書公專聲重義於此而見其專重也六月壬子尚書公餞使者於陽平樓命幕府賓佐相與追詩以為贈不以亞之為不知言者皆願以亞之言為首自佛行中國已來國人為緇衣之學多幾於儒等然其師弟子之禮傳為嚴專到於今世則儒道少衰不能與之等矣於其流亦有派別焉為之師者量其性之高下而有授説故有暝坐而短行毀刑而鼓談之道歧於是也十一年春豫東上會稽還造江有緇衣洪遜從余假渡自言能贊導佛語嘗與其曹㣥居講誦恆為宿輩推信他日復來言當之關中欲余以序之夫西都輻集之地居多豪緇得進於上前者車服之饒擬於卿士而遜得無欲乎在自勉而已余不知佛故序無以備汝曹之事去年淮夷誅凡諸侯執兵者皆統在侍中故侍中得坐制於大梁以長子常侍帥萬人臨事破堅北涇皆先諸侯軍故宣武論功得為上令今年齊淄不順命天子復使討圜其境之諸侯咸會兵四塞於是侍中空大梁驅甲馬三萬騎與攻壓之具金鐵草木飛石騰祶之器載而引者亦三萬乘擇日出夷門門下之賓參於幕者張生從焉生舉進士得第因東客於侍中門以協律銀綬而居侍中器之以為敏良可親起居必與俱及考鉦有期故謂余敘其所以云古之取仕得明經為清選近世即為進士亞之叔父獨謂古道可恃乃曰我儒世家也當勤經策義取高第耳業之三貢果得中遂理橐言歸亟思以賀為高堂之壽嗟乎斯古孝廉之職叔父盡之無愧耳及東出都命諸子亞之撰序詩以贊行云昔西河之流未歸而中書公為魏將因其師喪故門下將卒咸以戎事歸中書公天子從人之欲而拜之凡類之制無大小皆俟決於朝朝之命士卒有所不熟聞者往往孽齬一年而化其後四年天子討淮夷使其中子布與兵五年命討常山悉師臨淮南宮城七年淮夷滅八年常山貢二郡赦之秋命討齊魯移兵東河渡急攻濟北九年拔之斬其魁以獻其秋入覲盡以昆弟諸子去魏從謁京師者十餘人十年常山帥卒常山人以其狀來告中書公由此得其事前白奏於是拜帥常山自以魏歸不十年天子之兵南滅淮夷東清兩河而曰中書公之勤也乃以兄為尚書留置洛以其弟執金吾以子肇為亞尹居歧以將軍右持節回中以犨為將軍居北軍又以㣥為將軍居列位午為少將作牟為殿中丞以支恭玉昆弟姪俱以中書公蒙寵居官然皆謹恭下士人多以為當任與儒者比長慶初少子牟牟弟早令覲中書公明日出都門來顧余以云轂下名人文士必以文寵別欲余有撰於是與述終始之迹以塞其勤或曰近世有府之侯邀士拜賓不由己之所尚而使㣥居不類故有諛言順容積微之讒以基所毀四鄰之地更效遞笑飛流短長天下聞之矣而其侯尚且不寤夫言諛足以瞽明薄毀足以害忠若是雖欲明其橈直而明莫之遂也雖樂聞己之所闕而闕莫之聞也彼思勤過畏者一牽於諛讒即爾而况己之所尚又使㣥居不類是以慎行者之所畏也昔者余嘗得諸吏部昌黎公凡遊門下十有餘年北渚公之諸孫也左右杖屨奉應對言忠情勞其餘則工為魏晉之詩盡造其度今年春進士得第冬則賓仕於江西府且有行日其友追詩以為別乃相與訊其將處者而誰與曰有引農生倞耳夫引農慎行其道不欺者也北渚之往吾無虞其類之患勉矣惟爾不衰於道而已或者以文為客語曰古人有言仍舊貫如之何何必改作乃客之所尚也恢漫乎奇態紬紐己思以自織剪違曩者之成轍豈君子因循之道歟客應曰草木之病煩也使秋以治之繼孱萌於窮枿之餘搔風披露相望愁泫陽津下潛雖佳懿之彩猶且抑隱惟恐失類於慘禪煙黃之色耳安暇自任其所長耶即春以治之擢氣於其根升津百體之上暢之風露而繡英作誇紅奮綺緗縹紺紫錯若畫揚華流香靄蕩乎天地之端各極其至使肆勇曜如是寧可以一狀拘之人有植木堂下欲其益茂伐他幹以加之枝上名之樹資過者雖愚猶知其欺也且裁經綴史補之如疣是文之病煩久矣聞之韓祭酒之言曰善藝樹者必壅以美壤以時沃濯其柯萌之鋒由是而鋭也夫經史百家之學於心灌沃而已余以為構室於室下葺之故材其上下不能逾其覆拘於所限故也創之隟空之地訪堅修之良然後工之於人何高不可者祭酒導其涯於前而後流蒙波稍稍自澤靜略於祭酒其宗也遵道十年而功就頗秀出流類今既別而延蔓將遊乎河江豈欲益其自廣哉惟其勉無怠秦隴之地其氣雄而能産出奇夫良士由是古稱賢士大夫多隴西秦川在隴右數百里而隴峻水夷川之源出其左余吳興人生於隴之陽長而西望秦原水土精神之氣昏旦異狀豫又怪近世奇夫良士不繁出於此往者五年豫自東來京師見中山劉定命言天水權武其人可教耳吾嘗語善於武武發言往往次道及出門行事多以言明日豫過言之復其語則仁與不仁義與不義必汗流肌栗胸目如即事既罷定命又從容為豫言志所未遑者則下涕頓首又曰吾有女弟欲以歸武願言成之事皆未及會豫東拜親於江淮冬還都下不幸而定命死其親友赴喪者數十人武臨喪具事終日維哀無絶聲豫持其手曰秦隴之能産賢由賢之能産德誠未窮矣既葬武當西去豫贈之曰夫孝慈仁誼忠信廉直總於已曰賢辨是而行之不惑曰明子有之矣慎終行之夫金之為物也鎔而為器無不能然則將求為大用必圖於善冶者當其未善必更之當其善無墮鎔十年新及第進士將去都乃大宴朝賢卿士與來會樂而都中樂工倡優女子皆坐優人前贊舞者奮袖出席於是堂上下匏吹絃簧大奏即暮既罷生揖語亞之曰吾家世居蜀嘗以進士得第吾少能嗣其業幸子之文得稱甚光願為我序還家之榮亞之辭謝不敏曰願無讓曰始生與兄之來舉進士得絀及綴字為便口之句歷贄其文於公卿之門由是一歲而名八年成都貢士生名在貢首九年生與其兄試貢京兆京兆籍貢名生名為亞首生之兄亦在列下十年禮部第士生名在甲乙如是而後歸亞之以為相如還蜀之榮而生未後也夫匠心於浩茫之間為其為者必有意氣所感然後能啓其象也此凡一舉志則爾而況六藝之倫乎余聞之學者曰昔張旭善草書出見公孫大娘舞劍器渾脫鼓吹既作言能使孤蓬自振驚沙坐飛而旭歸為之書則非常矣斯意氣之感歟今山人王傳乂學為旭書居故吳公子光劍池山傍積十年而功就歷遊天下慕其出已者師之欲增其功也及至長安舍豫家為豫題旌故平盧節士文因感之聳髮寒肌謂吾友生曰願欲余序其書意者豈豫之文以感王生之志於鼓噪劍氣之勢乎顧不敏誠以孤生之望也聊題百數十言以塞其志
