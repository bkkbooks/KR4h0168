  text: 全唐文欽定全唐文卷五百七權德輿二十五
  hash: sha256:8531634b7f72171d57dc8d08298695adc50744eb541d9c958d615d7a554e05a1
body:
  text: 曾祖勤嘉皇朝散大夫青州司馬隴城縣開國子祖克明皇瀛洲高陽縣令贈國子祭酒父沼皇陝州芮城縣尉纍贈慈州刺史祕書監河南府洛陽縣遵化鄉恭安里盧邁字子元年六十狀公以仁為經以義為用宗四教之根本探六籍之菁華其門風士行天下歸重以居室之和移諸官署以率性之道宏於事業自解巾試吏至於佩相印不為利疚不為物遷令名豐祿與之終始推是道也年未志學纍丁齊斬純孝孺慕外除猶毀博貫儒書不耀其華特為叔舅太傅文貞公之所賞鑒經明筮仕補太子正字藍田尉會府試言拔乎其萃轉河南主簿尋有詔充集賢校理建中初上方靖端百度修起五諫拜右補闕俄換侍御史興元元年遷刑部員外郎閒一日又以本官兼侍御史介相國蕭公宣慰於江淮奉憂勤之旨宣豈弟之澤四牡所及熙熙如春既復命轉吏部員外郎每歲赴調者雜而多端廢置關決在於郎吏情僞之所伏姦利之所因攻堅木導大窾從容折中而優為之又以京師食貧諸孤衣食為念求出為滁州刺史仁惻之政人到於今懷之朝廷嘉其理行徵入為司門郎中自時厥後比歲超拜歷諫議大夫左曹右轄乃參大政皆用德進人無異詞閒一歲遷中書侍郎平章事又一歲感風痺寢疾周月除太子賓客貞元十四年六月某日薨於家追命太子太傅公寬舒宏重有姿度風表而憲章品式故事成法經通縝密靡不周貫居諫諍之官言必削藁自非成命頒行而人莫知者又嘗以考課之法溢美相蒙革其已然當自二府時居左垣固辭上第宰政歎其能讓因以從之庶官之濫者知懼而百職修矣燮和台階秉直間邪率循中庸左右皇極德輝陶然不見其際詩曰衣錦褧衣裳錦褧裳惡其文之著也公誠有之不然豈移疾家居者旬歲上章乞告者七反然後得請至於飾終追錫有加禮焉此固有以異於常而得之也早歲以遊寓於南譙與崔文貞公講學至穀梁傳因附經義有以規者文貞慙歎為之著重請銘且曰吾以爾為甥亦以爾為友知免於大過矣其推重如此天性篤於慈仁厚於情禮每居功緦之喪其於言而不議議而不及樂率皆容稱其服而有加焉故事宰臣非上公承攝之禮圜丘齊祀之敬則未嘗以騶騎導出國門者公從父弟歿於蜀都輤車之來道秦赴洛出東門十數里以展哀送度越常檢名教多之其居部也叔父下邽令休沐至止朋來憧憧侍食佐酒彌日通夕與㣥從之丱者冠者均其指使章紱之外無以異焉再娶無子或以嗣不可絶諭之他求者則曰吾舅文貞嘗言之矣兄弟之子猶子也引而進之可以主後事故自成童至於捐館其所留於聰明接於心術者中正之外無自入焉歷官俸賜必振六姻之乏即遠裳帷唯資四布之賻季文之廉忠張仲之孝友魏舒之宏粹孔光之慎密兼而具之日月有時盍徵諡法是用傳信移諸有司謹狀貞元十四年九月十四日故吏朝議郎守尚書司勳郎中知制誥雲騎尉賜緋魚袋權德輿謹上尚書考功禮有易名本於周道必視其行勸孰甚焉謹按故朝議大夫守太子賓客贈太子太傅盧公德範禺卬如大圭彞器閨門風訓儀表人倫乃持國均以鎮雅俗潔矩居易有初有終瞻彼九原既徵先遠之卜節其一惠敢忘至公之議謹上曾祖符皇潭陽郡太守祖大智皇河南府士曹參軍贈吏部郎中父休皇太子少保贈司徒諡文忠公京兆府萬年縣芙蓉鄉龍遊里韓洄年六十三狀公字幼深其先潁川之人自同姓於周受封於韓逮獻子而為正卿至景侯而開列國司馬氏代家言之詳矣八代祖播徙居潁川遂為潁川人繼有勳力代名忠孝以至文忠公用醇仁清德左右元宗致中和以為國經躬愷悌以為家法公纂承茂緒幼有令聞直方重博厚宏大該涉㣥書尤治春秋詩禮之學必覩其奧而踐乎中未弱冠以門蔭補宏文生滿歲參調侍郎達奚珣矯枉過正以地望降資署章懷太子陵令且將察其詞氣以為銓藻公恬然受署初無慍容當時識者知其致遠天寶末盜陷西京兄姪七人遭罹不淑茹痛違難寓於江南布衣蔬食不聽聲樂者積六七年友悌行義士林以為難翹車辟書旁午而至纍授漢中郡江陵府二功曹大理司直兼漢中郡司馬蘇州司馬且皆有賓介之請所至之邦待公政成甘於粗糲聚其祿廩辦治葬具歸於京師七喪祔窆禮無違者名教之士翕然稱之洪州刺史張鎬以故相之重作鎮江西奏授本州長史莫徭副史懷徠夷落嚮方率教乾元中江淮凶饑相扇嘯聚而新安郡負山洞之阻為害特甚朝廷推其能名除睦州別駕知州事俄拜監察御史又轉殿中侍御史賜緋魚袋充江西都團練判官軍州庶政多所訪決歲餘張終於位公上介領留務時吳楚剽輕法禁未一每長吏交代人心輒搖公臨以威重撫以慈惠輯寧封部以待守臣李梁公峴之充江淮選補使也引為判官多所宏益大歷初轉運使劉尚書晏盛選從事分命四方而江淮上流為之樞會奏改屯田員外郎兼侍御史知揚子留後纍歲就加司封郎中肅給而有守清明而中節有司之移用不匱上國之經費有倫六七年閒號為稱職名實益茂徵拜諫議大夫數與左補闕李翰連上封章極言得失未幾以本官知制誥參掌宥密式敷聲明炳然訓辭潤色王度時元載持衡深相器重公愈不自安每因災眚必疏古義且以西漢賜上尊酒之比深警戒之元終不悟竟及於禍公以謗纍貶邵州司戶今上踐位勵精理本徵為淮西淮南等道黜陟使復拜朝議大夫攝衣登車以澄清風俗為己任未及行拜權判戶部侍郎專判度支賜金印紫綬先是公兄太傅忠肅公實居其任受邦國之比要制財用之均節物力不屈王府以充其出牧也厥職寖廢公乃革煩政振舊綱既無暴征亦無遺利罷省胥吏冗食者二千餘人明年太府卿張獻恭廣廩庫以受歲杪量入之數又於長安萬年二縣界奏貯米穀數十萬石視年之豐耗而為之發斂人無艱食歲無災荒雖元凱之智略壽昌之功利不是過也上方倚以大任為執事者所抑出為蜀州刺史蜀多火災自古所患俗以為常無所懲禁公到部逾月令事時里胥不勞州兵多暇乃省經用之費給大半之庸俾其埏埴以易蓬蓽翬飛鳥革相望如雲授之逾年乃償其直三歲在郡四封恬然闢田之汙萊三千餘頃復人之庸亡二千餘戶教之樹藝俾之生植井絡之下人至於今懷之朝廷陟明奏課公實居最有詔徵還既至拜兵部侍郎在職數月遷京兆尹兼御史大夫三輔難理轂下尤甚賊泚之後旱蝗相乘連師十餘萬屯於蒲坂戎兵馬仰給京師內安罷氓外贍軍實師克濟而人不困公之力焉轉刑部侍郎刑罰者國之大典所以禁暴而衛善人也而或巧詆比况因緣為奸公講求紀律明為式例悉以條奏頒於四方吏無舞文人得從善矣遷祕書監乃奏置五經正本補㣥書之闕蓬閣之中粲然如初復除兵部侍郎纍歲改國子祭酒自兵興以來多趨末流而棄夷道故學者不振而子襟之詩作焉公曰崇化勵賢本於六籍不學將落吾其憂乎乃表名儒袁頤韋渠牟列於學官講左氏春秋小戴禮摳衣鼓篋之徒溢於國庠講誦之聲如在洙泗公所至必化其用無方方將荷介祉以錫難老亮天工以纘舊服人望未塞以貞元十年二月九日寢疾終於昌化里之私第皇情軫悼追贈戶部尚書哀榮之禮於公備矣公有識度風鑒而博愛容衆與朋友交死生以之明於吏職能斷大事疏達而有節粹和而不流約身以周急潔己而恕物先師四教克蹈其全中臺六職常居其半無忌之鎮靜安國之忠厚延壽之恩信惟公兼而有之允所謂邦之才臣終溫且惠者也龜筮叶吉日月有期易其名者請徵舊典謹狀三月日故太中大夫守國子祭酒潁川縣開國男賜紫金魚袋贈戶部尚書韓公故吏某官某謹上尚書考功夫士之生也躬五常以致用其沒也節一惠以尊名則善否有章賓實不撓謹按故韓公嗣直方於舊德播功行於清朝通而有守忠而能力樹善匪懈好謀而成課績中臺道光太學大雅明哲惟公有之考行飾終古先令典謹撰録所履布諸有司請徵叔發之諡以叶周公之法謹上曾祖君才皇右武候大將軍南陽郡公祖珉皇右鈐衛倉曹參軍纍贈尚書右僕射父季龍皇大同軍使嵐州刺史幽州經略副使纍贈司空汝州郟城縣臨汝鄉石臺里馬燧字洵美年七十太傅英朗特達剛方中正體苞五常致其用以贊皇極國有二柄壯其猷以合神武終始盛烈為唐宗公原夫代有功德延耀儲祉王佐之業至公而光年十四從師講學因輟卷喟然曰大丈夫當建功立名以康濟天下豈能矻矻為章句儒耶讀左氏春秋孫吳兵法與歷代君臣大本成敗大較忠賢功用奇正方略會其歸趣妙指諸掌十九丁內艱泣血三年以孝聞天寶末安祿山擁幽陵之師南向以光祿卿賈循為留後公以書干循勸誅逆將向潤容牛庭玠等然後傳檄仗順可覆而取之循疑留不決竟及於禍踰月閒行至恆山時河朔擾攘物情恟懼公方以裦衣長裾游談感激因其謀而扶義建節者衆矣寶應中陳鄭節度李涼公抱玉移鎮上黨雅知公才表為晉州趙城尉時王師既破史朝義乃復河洛有回鶻可汗之助因肆暴而歸以功自負其強難屈節將使上介致餼皆懼不敢行公官方解巾急病不讓徑詣其壘申明要約氣盛詞直虜皆優從可汗乃授以旗幟委之供辦且曰有犯禁者公其董之於是藩部肅然莫不畏服後有酋長求賂於公者立斬十餘人可汗大駭疾馳出境安人禁暴之略兆於斯矣河北副元帥僕固懷恩居將相之重恃父子之勇可汗又其子壻也藉以為援將有異圖公密覘其情請為之備初僞范陽節度使李懷仙與相衛恆定等四帥相繼來降懷恩結為黨助奏復其職至是擁衆據汾上子瑒圍太原相衛餽餫以相掎角公至安陽說其帥曰懷恩憯刻以逞欲其子輕佻而好勝人人自為計坐待帳下之變耳深陳利病勸喻激切由是感公言至涕泣改圖因約懷仙等三人奉章獻款既回鶻北歸懷恩與瑒繼死公之明識遠略皆此類也本使尋奏改左武衛兵曹參軍歷太子通事舍人著作郎以至祕書少監兼殿中侍御史轉營田節度二判官永泰中拜鄭州刺史兼侍御史至是頒六條撫四方分憂於上施惠於下時兵食方調杼軸其空乃闢其田畝均其戶版每歲一稅百姓便之生齒益息庶物蕃阜大歷中改懷州刺史其夏大旱公以救災沴莫若修教化掩骼埋胔蠲苛恤隱使皆得其欲而無窮人端居潔誠默以心禱至七月穭穀滿野墉亡者襁負而至朝廷以陽被邊宜得文武之守拜隴州刺史兼御史中丞公乃訓州師修器備郡城之西有路與蕃境相直凡二百餘步上連峻峰公乃躬自行視塞其蹊隧功堅力省疆場以寧又置譙門於厄狹之地中制扃鐍上施干櫓積歲之患旬日而安連帥憚公威望日盛羈留幕府因以受代家居京師者久之先皇帝召見奇其才授商州刺史兼御史中丞未旬日屬河陽三城逐其帥擇可以撫寧之者特拜左散騎常侍兼御史大夫充河陽三城使是歲大歷十年也夏五月汴宋兵馬使李靈耀以濮陽叛俄據浚郊國家始務靖人特屈常憲因以節度留後授之而又結魏師以略東郡不利六月詔公與淮西節度李忠臣夾攻之時寇鋒寖盛忠臣每合皆北將棄師以免者數矣公嘗激以壯志或紿之吉夢忠臣既慙且憤引師復還先是忠臣軍汴南公軍汴北每與虜角所向無前初敗之於滎澤又破之於西梁固至是靈耀以其勇悍者八千人號為餓狼營盡鋭來拒公引戲下決戰遂勝入郛時魏之救兵二萬距大梁三十里許公又合諸侯之師用奇設伏以敢死士三千人鼓譟先登大敗之魏將軍單騎遁去靈耀以其徒宵潰翌日餘黨以城內八千人降於公公悉讓忠臣推而不處閉壘移疾退於坂橋其士吏鹵獲悉以家財購而復之大梁之人至今知感履險則忠以盡敵成功則讓以保身此又將帥之明哲也十二年三月詔復魏博之地諸侯班師公乃歸鎮河陽秋雨暴至河流決溢軍吏等具楫櫂請公登舟以避公曰城中凡數十萬戶吾實主之而苟以一家求安所不忍為也既而人皆感泣水不為患十四年閏五月皇帝即位深燭理本以太原王業所起國之北門非勳德爛然者不能鎮定特拜工部尚書兼御史大夫太原尹北都留守充河東節度觀察等使於是修班制正事典險其走集訓其輿師講車徒戰陳之法教金鼓聲氣之節分畫之下變化如神自是烽候罷警胸奴不敢南向而牧矣建中二年夏六月來朝京師加兵部尚書封豳國公初魏博席伯父之勢而得專地既踰年與東平常山復為從約七月魏以兵三萬圍邢州攻臨洺昭義節度使上請公為援朝廷許之十月公會昭義之師與神策行營兵馬使故太尉西平王於漳州先是魏以浚郊之敗讋公威望至是以節度之師專征伐之任兵刃完利部校訓齊軍聲大振士氣益勵魏人又分鋭騎合恆定李惟嶽之衆萬餘人於臨洺南雙岡下樹柵以自固公自晨至晦急擊大潰殺其將楊朝光時臨洺之圍濠壘四匝復與昭義鼓行而前腹背受敵飇塵翳景士皆決死凡百餘合公自據西濠口扼其喉以襲破之凶徒斃踣亂相蹂蹈收其車重兵械各數十萬魏人棄營而遁邢圍迎潰上嘉其功拜尚書右僕射先是公與軍吏約曰苟戮力成功者當竭産以賞至是悉索家錢與車服臧獲等奠其價之上下視其功之薄厚散於軍中約五十萬且曰苟可以夷患難勉師人赤誠之外無非長物故盡其私積賈其餘勇士皆歔欷感激爭以效命報焉優詔裦異命史臣書之且詔有司以量入之賦如其數以復於公其毀家佐軍輕費厚下皆此類也三年正月魏人又乞師於東平恆山衆且四萬壁於洹水公曰不備不虞不可以師且以河陽三城常所訓定上請為助有詔從之乃建三橋夾河為壘乘變出奇如環無端初則銜枚以趨敵因乘其未備後則雉草以滅火使計不得用然後分鋭士飇馳以犯之而後從之獲首級者殆半餘皆走林溺水僵尸相屬腥穢川陸公愀然曰是皆平原人也彼但暴服之耳亦既就死忍其委骨肉如是耶使得以族屬收瘞既而聞者知感由是洛博二州僞署刺史各以其地來降鄴魏之閒以咫尺之書招下二十餘城朱滔誘其鄰帥復來助寇四月公有魏城之捷五月詔同中書門下平章事仍封北平郡王時諸軍連捷師留且久或有復其侵地則怠於攻取公具以上聞有詔朔方節度使李懷光應援征討六月朱滔以漁陽之甲三萬至於城下初諸侯有議班師者公曰彼三戰三北假息孤城且宿兵十萬聞援強而退縱敵生患何以復命於朝廷耶既而㣥帥相勵皆百其勇七月加魏州大都督府長史仍充魏博澶相四州節度招討等使四年二月又敗之於成安魏軍退於館陶深壁以自固以十月盜臣竊發鑾輅狩於近郊公忠憤逾逼密圖方略懷光統朔方之旅乘歸心以赴難公齧臂伏泣以大節感動之時朱滔招連北虜邊鄙日聳公謂諸將曰夙駕整旅以扈屬車人臣之分也儻北都不守即兩河三川搖矣豈行師捍患之義也耶乃還太原遣行軍司馬王權統鋭騎五千與監軍使者赴行在所又令男彙與大將等男各一人赴焉軍食祿賜器備服用一以條奏獻於行宮公初旋師也以晉陽大鹵用武之地北蕃東夏且有外虞而都城之東平坦受敵乃股引汾晉二川漲為平湖能順地泐以導水勢守陴者歲減其役濱河者日厚其生而又廣隄濬池密樹如織金湯自固板幹不勤其明智善利之及人也如此公自出車纍歲功捷相繼而軍中衣食多出寇境河東之人省調給饋餫之勞歲減其賦封內相賀因中貴人以聞願刻金石詔從其請公避名不伐懇疏方止其勞謙之詞邦人誦之此所以尊而光晦而彰者也公常揣摩諸侯開導功善能通其變以誘其衷盡益友之直諒啓純臣之志略因所以建大順立大勳者有焉興元元年二月李懷光貪天犯上衡連逆泚脅其人以河中叛公威聲素振壤地相接支郡屬城降者繼至秋七月皇帝既平大盜乃清宮廟加河東保寧奉誠等軍行營副元帥有詔許公與諸軍同討河中九月既望師及於絳僞刺史王克同棄城而遁餘黨來降分徇下縣進軍寶鼎斬其將徐伯文先是懷光之師勇於豨突至是獲甲首千數凶徒奪氣矣貞元元年六月公以軍國大要非表章所盡釋位來朝親稟睿略乃屈指成算請三旬芻粟以平之秋七月與河中節度使今侍中咸寧王及同華邠寧之師次於長春宮公以單騎傅於城下召賊將徐廷光西向受命且以君恩喻之曰兵興以來逾三十年而朔方之師最為忠力今乘時自效若建瓴水豈甘心嗇禍終汙鋒刃耶開陳逆順聲泣交感又曰跬步之內矢石所及若決為匪人亦在今日因披襟直前當之廷光俯伏拜泣莫敢仰視抗詞未畢堅壁洞開公徑入撫安奉宣皇澤於是城中周呼曰吾等復為王人矣八月公與咸寧合軍而東至於焦離堡降其將尉圭乃次河中陳於城下懷光傳首其衆請命是舉也不勞師獻功如其平素就加侍中歸鎮北都三年二月來朝京師寇戎既清乞罷藩鎮六月拜司徒兼侍中詔有司具儀法冊命禮賜備厚昭德報功人臣榮之屯師河中也靈武節度杜希全獻體要八章上因著君臣針以賜之公奉表陳賀上又賜公宸扆台衡銘各一首公令男暢詣闕謝恩並請楬而書之於起義堂之側詔下優答其略曰卿有訏謨濟代之誠保衡輔朕之志情之所尚遂飾以詞比夫盤盂自銘亦冀輔佐同德遂許刻石兼賜題額寵渥之盛冠耀當時五年九月嘗與故太尉西平王同對於別殿上曰卿二人與朕休戚是同各賜圖形麟閣並御製文命皇太子書於閣壁至於君使臣臣事君選賢與能之盛盡忠作憲之績煥乎天文與日月並明矣九年十月公以足疾久闕朝請因至中書奉表起居召對拜舞手誤至地上驚遽自起以接之公慚惶局蹐感甚以泣上曰元首股肱本為同體卿之疾痛何異朕身乃遣中使梁懷幹扶掖下殿十一年二月以年及懸車再表讓侍中優詔敦獎終不得請八月十七日薨於安邑里私第皇帝震悼不視朝四日先是詔宰臣詣宅問疾御醫禁方旁午於途疾劇遺表指陳邊事純誠至公言不及私薨之明日詔贈太傅又詔文武百寮就宅弔哭京兆尹護喪萬年令為副司農卿嗣吳王巘充弔祭使鴻臚少卿王權為副賻贈絹二千匹布五百端米粟二千石二十七日命太常卿裴郁副使少府少監路恕備禮持節冊命上所以待大臣之禮備矣惟公始以文史參佐至於牧守師帥功業見乎變德刑焯於時所以順天明從君命布皇澤宣國威能竭忠力而為藩衛理軍如家馭下以誠拊循厚而士勵法禁明而衆整誓師鞠旅皆樂為用料敵致勝如在彀中此戰之所由克也凡再分兵符而三破劇賊開相府十四年以上公居中者九年至於盡沃心之言當注意之重密啓詭詞人莫得而知之昔舜之官人也作司徒龍作納言惟公居之周之命將也方叔元老申伯於藩惟公嗣之加以馮異之推功趙奢之饗士子囊之城郢文子之不屬其子惟公備之故歲時為饎追遠盛公侯之禮會朝鳴玉拜後聯卿士之榮公之展孝也公之教忠也凡自府辟多為國華登中朝以潤王度分外閫而貞師律公之知人也公之舉善也洪範之乂用三德嚮用五福惜公不踰期頤其他則無不及也德輿自左補闕三歲而為右史掖垣之屬備承功烈裦獎之禮獲奉命書今先遠有期祖載將及易其名者敢告有司謹狀貞元十一年十月十六日宣德郎守起居舍人知制誥雲騎尉權德輿謹上尚書考功夫建侯行師先王之所以懲不恪也考行尊名先王之所以勸人臣也謹按故司徒兼侍中上柱國北平郡王贈太傅馬公勤勞王家功德茂盛其謀猷合於君其忠利加於人用登公相以殿邦國今體魄則降日月有時敢録實行請徵諡法謹上
