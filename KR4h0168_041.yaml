front:
  text: 全唐文欽定全唐文卷四十一元宗二十二
  hash: sha256:c832fe2bf79163d62abf38cddabcd52195ffd8684978b73b4f53cc15b86f2d3a
body:
  text: 朕聞上古其風朴略雖因心之孝巳萌而資敬之禮猶簡及乎仁義既有親譽益著聖人知孝之可以教人也故因嚴以教敬因親以教愛於是以順移忠之道昭矣立身揚名之義彰矣子曰吾志在春秋行在孝經是知孝者德之本歟經曰昔者明王之以孝理天下也不敢遺小國之臣而況於公侯伯子男乎朕嘗三復斯言景行先哲雖無德教加於百姓庶幾廣愛刑於四海嗟夫夫子沒而微言絶異端起而大義乖況泯絶於秦得之者皆煨燼之末濫觴於漢傳之者皆糟粕之餘故魯史春秋學開五傳國風雅頌分為四詩去聖愈遠源流益別近觀孝經舊注踳駮尤甚至於迹相祖述殆且百家業擅專門猶將十室希升堂者必自開戶牖攀逸駕者必騁殊軌轍是以道隱小成言隱浮僞且傳以通經為義義以必當為主至當歸一精義無二安得不翦其繁蕪而撮其樞要也韋昭王肅先儒之領袖虞翻劉邵抑又次焉劉炫明安國之本陸澄譏康成之注在理或當何必求人今故特舉六家之異同會五經之旨趣約文敷暢義則昭然分注錯綜理亦條貫寫之琬王庶有補於將來且夫子談經志取垂訓雖五孝之用則別而百行之源不殊是以一章之中凡有數句一句之內意有兼明具載則文煩略之又義闕今存於疏用廣發揮堯以天下禪舜舜以天下禪禹禹將宅百揆總萬國一讓於稷再讓於皋繇稷先舉彼商與周以之更盛皋繇後大我國家於茲受命非舜以考天而疇咨審靈命之陰騭非禹以享天而德讓知歷數之有歸及乎元元閒出光大前慶垂道德而統運依清虛而立法天祚我李厥惟舊哉并州起義堂者皇天造帝之初高祖誓衆之地也隋氏失御國亂無象小道自賢大才胥忌惟宮室陂池之好惟沈湎暴慢是保上帝不歆黎人咸戚六軍踰海而東敗萬乘過江而南覆豺狼入邑䝟貐爭人黔首囂然方將無訴我高祖感之乃龍躍晉水鳳翔太原百神前驅萬姓來奔開咸陽入天門用湯武之兵靜新室之亂遵唐虞之典承太王之基率百官受終于文祖輯五玉班瑞于諸侯類圓禋方之禮備封功爵德之議允約法惟代虐以寬子惠困窮懷柔蠻貊金石一變日月重華近古以來未有革命易姓若此之盛者也非天私我有唐惟天祐于積德非唐求于人庶惟人懷于纍仁當此之時太宗內啓聖謀外行專斷躬擐甲胄跋履山川駕英雄而為奧主一區域而定大業周詩曰昊天有成命二后受之信今之謂也若夫修德以降命奉命以造邦源濬者流長根深者葉茂天人報應豈相遠哉觀周之興始於后稷公劉承以太王王季皆勤儉忠厚克廣前烈至於文王成之武王啓之康王安之故卜代三十卜年八百天所命也我唐之興也始於皋繇元元承以景皇元帝皆立言邁德垂裕後昆至於高祖受之太宗有之高宗守之中宗復舊業睿宗新景福比之周室我何謝焉且如陳德明刑庶其躬稼之績元宗道要小其避狄之仁化流率土狹其江漢之域義寧大朝羞其牧野之戰故武德中太行出大聲曰唐興理萬年蓋天之所命年代未可涯也仲尼曰惟天為大惟堯則之又曰韶盡美矣又盡善也非至德其孰能如此其大者乎於戲先后捨元子而立豫主鬯煩大位而付豫天下自高祖創業百有六戰欽承丕緒十有四載東西南北無思不服山川鬼神亦莫不寧實惟藝祖儲福之所致豈豫幼孫菲德之所及方將運心於元妙之境厲志於造化之爐發令為祥符施惠為霖雨任賢為兩曜仗能為四時俾天之下有形者遂全懷生者自足樹鋪野繭田種嘉穀斫雕為朴捐珠棄玉追大庭而齊風夢華胥而同俗非曰能爾願憑宗祏而效焉癸亥之歲獻春正月濟河橫汾省方展義存問黎老緬慕本邦城郭巋然桑梓如舊覽風物之憂思尋王業之艱難惟高祖若天地之開闢化成萬類惟太宗若日月之照臨光於四表舉晉陽之甲除君側之盜由唐侯之封升天子之號肇基發迹實在於茲仙駕無所或顧懷於舊土靈魄無方儻來歸於此堂郡縣之所宜嚴奉前人有言曰禮不忘本樂殊其德如姬詠周原而劉歌沛邑思我烈祖如聞歎息之音嗟爾後人無忘成功之頌廣陵李鍊師上清品人也撫志雲霞和光代俗為豫修福靈迹將赴金壇故賦詩寵行以美其志元靜先生稟和清真樂道虛極頃來城闕善利同人緬思林泉洗心外俗豫嘉焉重焉式遂其意言念于邁賦詩寵行鍊師氣遠江山神清虛白道高八景而學兼九流每發揮元宗啓迪仙籙延我以玉皇之祚保我以金丹之期敬焉重焉深惜此別因賦詩以餞行云耳古之王者皆受天命禮樂有權神祇是主郊兆所設雖定於厥居精靈所感則通乎其變大抵歸正旁行不流惟創制者為能之亦安在守文而巳脽上祠者本魏地鄈邱之舊而漢家后土之宮汾水合河梁山對麓地形堆阜天然詭異隆崛岉而特起忽盤紆而斗絶景象相傳肸蠁如在有物不可以終否有典不可以遂廢故推而行之神而明之歲在癸亥始有事於茲焉在昔后王時邁省方柴燎告至幽隱胥洎大舜則五載一巡武帝則三歲一祭古今代變人神禮煩朕就為損益折以法度一紀再駕亦無閒焉二十年冬勒兵三十萬旌旗亘千里校獵上黨至於太原赫威戎於朔陲沛展義於南夏肆覲羣后道有以大備懷柔百神文無而咸秩先是有司宿設恪敬乃事己未師次於齊宮庚申親祀於后祇聖考在天侑而作主何禮不舉靡神不遍往者漢氏之祠也牲以養牛五歲繭粟所以貴其誠藉以采席六重藳秸所以尚其質事與古反義不經見朕因其地而不因其儀取其得而不取其失凡牲幣法物之事歌舞接神之類咨故實於方澤不遂過於元鼎此皆公卿大夫鴻生巨儒獻其方聞匡於不逮朕何有也且王者事天明事地察示有本教以孝奈何郊丘之禮猶獨以祈穀為名者耶於戲享於至誠錫以繁祉黃雲蓋於神鼎降光燭於靈壇自昔巳然乃今復見斯固陰精有所寓寶氣為不誣雖寂寥而不動亦動之而斯應顧朕之不德靈感何從賴纍聖儲祉福流所致乃眚災肆赦與物更始大賚天下有慶兆人山川鬼神鳥獸魚鱉莫不允若莫不咸寧此所以承覆載報生植資元元盡翼翼豈與夫封禪有牒專在求仙祕祝有辭密於移過而巳天有四序星辰辨其分地有五方山嶽鎮其域陰陽交暢則品物形矣精氣相射則神祇著矣西嶽太華山者當少陰用事萬物生華故曰華山踞中土西偏當七官正位是稱西嶽披圖以察削成而四方信焉立表以算其高五千仞明焉石壁磔豎而雄竦衆山奔走而傾附其氣肅其勢威其行配金其辰直酉前對華陽之國後壓華陰之郡左抱桃林之塞右産藍田之玉諒少昊之下都即蓐收之別館也軒帝遊焉以會衆神虞舜柴焉以覲羣后爰自夏氏迄於隋室朝延五姓載歷三千祀典相因舊章未改壇場廟宇何代不修一禱三祠無歲而缺所以報生殖事靈神不有怠也故亦祥休明災淫慝未嘗爽也皇天眷祐馨我烈祖奄有萬方逮乎六葉郊天地望山川精意必達墜典咸甄亦命州將四時告虔加視王秩進號金天若是何者抑有由焉豫小子之生也歲景戌月仲秋膺少昊之盛德協太華之本命故常寤寐靈嶽肸蠁神交玉帛未陳幽贊必先意而啓椒醑雖薄景福杲應期而集元感昭賽可一二而道邪記云下有方士真人金鼎石室上有明星玉女仙草瑤池茅龍一去毛女千祀前代帝王多有僥覬朕學犧文之道故非斯人之徒憂在至道之不宏不憂富貴之無永患在蒼生之不理不患年壽之若流以功施四海為長生以業傳百代為不死焉羡置集靈之宮虛望非福立存仙之殿勞思輕舉者哉於戲維嶽配天上弼豫志豫欲大康兆人嶽翼豫欲定禮樂諧神人嶽聽豫思其維嶽降神生此多士無俾申甫專美於嵩語酌古訓心通神境善而不答誠而不應未之有也嶽其念哉十有一載孟冬之月步自京邑幸於洛師停鑾廟下清眺仙掌雲拂石牀霓裳可接風過松嶺仙駕如聞久勤報德之願未暇封崇之禮遲回刻石梗概銘山萬姓瞻豫言可復也朕聞寥廓之際真宰存焉溟涬之初聖人利見其教善貸而不有其道日用而惟新則煥乎雲篆仙書祕乎瑤篇玉簡非握圖授籙之後不能行其教非棲真宅元之士不能窺其文明真有科太上留誡為務度人歸依大道是者真元聖主上方開化無極太上靈寶天尊居一氣化均之天九清自然之國翠華闕庭紫真宮掖升千光雲殿登七珍寶座俯視蒼生崇猷或略於是天尊宣揚教範命真仙之衆傳經化人誦之者履天尊之域行之者遊太上之鄉故洞元靈寶太上天關經云上方玉虛明皇天尊見輕清之形儀衣蒼穹之冠履運春夏秋冬之動植主君臣父子之枯榮統三界仙凡修短禍福增減是以圖立形儀欲代人歸命信禮而求長生仍可敬之伏聞稱讃上方天尊懺文欽哉至聖至真五境出三羅之界無顛無頂八方朝七寶之宮統黃上之天元鎮中央之地極威光奕奕神德巍巍精叩感通至誠善應如人禮念恭信則見存獲福香花供養則巳往生天普願歸依同成道果朕聞大道幽深妙門虛寂龜山之文不測龍漢之旨難窺況復記録漸訛年齡浸遠黃庭妙或逢燕彘之疑縹府真言多有魯魚之失遂令玉京後進覽祕篆而無從金闕羣遊習靈符而有誤恭惟老氏國之本宗遺述元經朕之夙好詳其乖舛深可吁嗟爰命諸觀大德及兩宮學士討論義理尋繹沖微披珠叢玉篇之衆書考字林說文之羣籍入其閫閾得其菁華所音見在一切經音義凡有一百四十卷其音義目録及經目不入此數之中庶以宣闡青元發揮碧落毗助風化訓導氓黎令其託志希夷永絶陶陰之惑歸心徼妙長袪晉亥之迷云爾老子者太上元元皇帝之內號也元元道宗降生伊亳肅肅皇祖命氏我唐垂裕之訓無疆之祉長發遠祥系本瓜瓞其出處之迹方冊備記道家以為玉晨應號馬遷謂之隱君子而仲尼師之翻經中其太謾問禮歎乎龍德是孔某無閒然矣在周室久之將導西極關令尹喜請著書於是演二篇焉明道德生畜之源罔不盡此而其要在乎理身理國理國則絶矜尚華薄以無為不言為教故經曰道常無為而無不為侯王若能守萬物將自化又曰我無為而人自化我無事而人自富我好靜而人自正我無欲而人自朴理身則少私寡欲以虛心實腹為務故經曰常無欲以觀其妙又曰不貴難得之貨不見可欲又曰塞其兌閉其門挫其鋭解其紛而皆守之以柔弱雌靜故經曰柔勝剛弱勝強又曰知其雄守其雌此其大旨也及乎窮理盡性閉緣息想處實行權坐忘遺照損之又損元之又元此殆不可得而言傳者矣其教圓其文約其旨暢其言邇故遊其廊廡者皆自以為升堂覩奧及研精覃思然後知其於秋毫之端萬分未得其一也經曰有物混成先天地生吾不知其名字之曰道強為之名曰大故知大道者虛極妙本之強名名其通生也莊子曰太初有無有無者言有此妙無也又曰無有無名無名者未立強名也故經曰無名天地之始強名通生曰道故經曰有名萬物之母莊子又曰物得以生謂之德德得也言天地萬變旁通品物皆資妙本而以生成得生為德故經曰道生之德畜之則知道者德之體德者道之用也而經分上下者先明道而德次之也然體用之名可散也體用之實不可散也故經曰同出而異名同謂之元語其出則分而為二咨其同則混而為一故曰可散而不可散也則上經曰是謂元德又曰孔德之容又曰德者同於德又曰常德不離下經曰失道而後德又曰反者道之動又曰道生一又曰大道甚夷是知體用互陳遞明精要不必定名於上下也經徑也言通徑也又常也言通徑常行之道每惟聖祖垂訓貽厥孫謀聽理之餘伏勤講讀今復一二詮疏其要妙者書不盡言粗舉大綱以裨初學者爾源乾曜謇謇匪躬謙謙自牧正身率下直道事人無聞伐己之功每立致君之節顧問則出納斯允左右則啓沃居多德行可稱自宜升擢張說以道佐時以忠處事顏雖不犯嘗聞獻替之誠言則不諛自得謀猷之體政令必俟其增損圖書又藉其刊削才望兼著理合褒升並考中上杏壇槐市儒述三千回也亞聖某也稱賢四科之首百行之先秀而不實得無慟焉德重和鼎功逾濟川詞林秀發翰苑光鮮專城之重分陝之雄人多惠愛性實謙沖亦既利物存乎匪躬為國之寶不墜家風詞江瀉液義苑含芬別有真氣青溪出雲卓爾無對超然不羣幽人薊子道士封君校文天祿論經上庠華詞宛麗雄辨抑揚萬物去來陰陽反覆百歲光陰宛如轉轂悲樂疾苦橫夭相續盛衰榮悴俱為不足憶昔宮中爾顏類玉助內躬蠶傾輸素服有是德美獨無五福生平雅容清縑半幅我大聖祖誕敷衆妙光宅上清貽厥孫謀屢彰幽贊晝現殊相空浮瑞色七耀五明之服玉童金媛之儀道釋人天作禮瞻奉昔真誥傳於羊角寶祚無疆今宸儀炳於龍巖妖氛將殄豈惟歷代師授前王得一斯乃宗社降祥後昆惟萬申命藻繪示諸郡國若對寥陽之宇如臨太極之庭贊曰猗我烈祖闡教乘時理身理國曰希曰夷上開仙洞俯視靈姿昭融至道叶贊無為巖谷增麗丹青罔追神光爍爍淑景遲遲當朝稱慶列郡來斯福祚流衍千齡在茲邈彼炎漢天圖中缺萬彙消殘三靈蕩越惟師應運神威迅發躬侍元元親傳祕訣妖毒雲驅崇山劒裂大布聲教全清蠱孽一振無為永光有截鸞鶴斯邁丹青是設玉相真儀傳芳不歇邈矣真仙孤高峻節氣貫穹冥元元示訣落落神儀亭亭皓月誅邪斬精魅驅鬼徹漢代明威流傳不絶我求令長保乂下人人之所為必有所因侵漁浸廣賦役不均使夫離散莫保其身徵諸善理寄爾良臣與之革故政在惟新調風變俗背僞歸真教先為富惠恤於貧無大無小必躬必親責躬勸農其惟在勤墨綬行令孰不攸遵曷云被之我澤如春孰為天大此焉取則均以寒暑分諸晷刻盈縮不愆列舍不忒制器垂象永鑒無惑鑄於郡懸於觀天長地久福無算梁園勝躅碣館佳遊苔深石暗山斜路幽橋非七夕節是三秋爰停弄杼共此淹留神也者妙有物而為言化也者應無方而成象言豈立神之主象徵宰化之知苟言象之不存焉則神化或幾乎息矣窮神而極化者其唯至聖之人乎我遠祖元元皇帝道家所號太上老君者也建宗於常無有立行於不皎昧知雄守雌為天下溪知白守辱為天下谷故能長上古而日新雕衆形而化淳韲萬物而不為戾澤萬代而不為仁巍乎不覩其頂深乎不測其極復歸無物存教迹以立言奄有太清感聖期以利見肇我高祖之提劒起晉太宗之仗鉞入秦鵬搏風雲麟鬬日月夏臣醜而巳去殷鼎輕而未徙老君乃洗然華皓白驥朱髦見此龍角之山示我龍興之兆語絳州大通堡人吉善行曰吾而唐帝之祖也告吾子孫長有天下於是一開赤伏而萬姓宅心一麾白旄而六合大定傳曰有聲之聲不過百里無聲之聲延及四海非夫神唱明德翕叶人祇者歟善行以武德三年二月初奉神教恐無明徵未之敢泄至四月老君又見曰石龜出吾言實於時太宗為秦王討宋金剛總戎汾絳晉州長史賀若孝義以其狀上啓遽使親信杜昂就山禮謁俯仰之際靈貌察焉昂馳還曰信矣乃遣昂善行乘驛表上比至長安適會郇州獻瑞石龜有文曰天下安千萬日高祖徵其二異拜善行朝散大夫命舍人柳憲往祠焉玉帛既陳尊儀復見其始覿也杲杲炅炅若紅峯緑嶺吐春日之光景其却隱也蕭蕭條條若雨息雲消視秋天之泬寥來莫知其所自去莫辨其所往出於寂寞入於恍惚蓋不可得而詳諸汾陽之龍角山者天地降福之庭高祖用師之道峯上有華池靈府下有石穴洞宮氣接姑射集神仙之別館脈通霍鎮潤珠玉之鄰家高祖以雲轡頻回霓裾纍𧝬故版廟於行過之所劃壇於受命之場刻飾聖容彩繪真衛神光離合殿堂宛轉於空閒雲氣踟躇笙磬往還於天路因改浮山縣名神山焉志靈應也是歲仲秋及五年三月晉州奏老君言我亳廟之中枯柏更生子孫當王又云我神兵助軍伐劉黑闥立夏當平事果如言皆先事之讖也爾後太宗貞觀則矞雲泊於廟宇高宗垂拱則卿雲涌於神座今又祠中柏樹蒲萄裊而託根門端桹木枯枝蓊而還茂謺黛豐本撲翠繁柯聚祥烟青靄黕黕一色散佳氣葱鬱麟麟萬重識者以為太和暢陳朽之徵王會納殊鄰之象懼彼虛應搖然夕惕朕演靈金根纂命璿扆篤學道記常味至言是用假塗禮樂託宿仁義尋末以窺本澄粗以詣精為無為於此心事無事於天下而宗社大福寰縣小康實上祖惠無疆之休亦下人率自然之化夫唯幽容昭見偉事也神告帝符王褱瑞也發祥善行吉類也慶雲重作鴻懿也戎果附植合異也槁幹華滋蕃熾也此六者興王之嘉祉曠歷之絶記者巳朕不敏頗聞君子之教矣繼其父者天其祖習其訓者父其師揄揚道德情存孝敬商頌美乎成湯周雅尊乎后稷先王之舊典也吾豈墜其文哉夫戴角之類龍為之長羊也定形而不易龍也神化而無端龍蓋五土之精國家乘土而王故改山號名龍角焉乃銘金石以彰靈變詞曰思文聖祖元默靁聲混兮無名超兮至清清入神舍名損物假身尊元元後有天下高祖鳳翔雲舉晉陽太宗龍戰風趨秦甸龍角仙都王師戒塗聖形入有神言出無瑤衣玉騎告帝天符神方據我人亦來蘇乃立清室微微謐謐衆仙停蹕乃興慶雲氛氛氳氳再瑞明君庭有柏兮遠果寄秀門有桹兮瘣條更茂顧慙菲德蒙神之祐誦我道經介我神聽繼明五聖禋事三靈請從格言天德出寧大道幽蔭湛慈廣接意路何階言津難涉化有影響神無華葉朕宅帝位十有四載顧惟不德懵於至道任夫難任安夫難安茲朕未知獲戾於上下心之浩蕩若涉於大川賴上帝垂休先后儲慶宰衡庶尹交修皇極四海會同五典敷暢歲云嘉熟人用大和百辟僉謀倡豫封禪謂孝莫大於嚴父謂禮莫尊於告天天符既至人望既積固請不巳固辭不獲肆豫與夫二三臣稽虞典繹漢制張皇六師震疊九㝢旌旗有列士馬無譁肅肅雍雍翼翼溶溶以至於岱宗順也爾雅云泰山為東嶽周官曰亠兊州之鎮山實惟天帝之孫羣靈之府其方處萬物之始故稱岱焉其位居五嶽之伯故稱宗焉自昔王者受命易姓於是乎啓天地薦成功序圖録紀氏號朕統承先王茲率厥典實欲報元天之眷命為蒼生之祈福豈敢高視千古自比九皇哉故設壇場於山下受羣方之助祭躬封燎於山上冀一獻之通神斯亦因高崇天就廣增地之義也乃仲冬庚寅有事東嶽類於上帝配我高祖在天之神罔不畢降粵翌日禪於社首侑我聖考祀於皇祇在地之神罔不咸舉暨壬辰覲羣后上公進曰天子膺天符納介福羣臣拜稽首千萬歲慶答歡同陳誡以德大渾叶度彞倫攸敘三事百揆時乃之功萬物由庚兆人允殖列牧衆宰時乃之功一二兄弟篤行孝友錫類萬國時惟休哉我儒制禮我史作樂天地擾順時惟休哉蠻夷戎狄重譯來貢纍聖之化朕何慕焉五靈百寶日來月集會昌之運朕何感焉凡今而後警乃在位一王度齊象法榷舊章補缺政存易去煩苛思立人極乃見天則於戲天生蒸人惟后時乂能以美利利天下事天明矣地德載物惟后時相能以厚生生萬人事地察矣天地明察鬼神著矣惟我藝祖文考精爽在天其曰懿豫幼孫克享上帝惟帝時若馨香其下丕乃曰有唐氏文武之曾孫隆基誕錫新命纘戎舊業永保天祿子孫其承之豫小子敢對揚上帝之休命則亦與百執事尚綏兆人將多於前功而毖彼後患一夫不獲萬方其罪豫一人有終上天其知我朕惟寶行三德曰慈儉謙慈者覆無疆之言儉者崇將來之訓自滿者人損自謙者天益苟如是則軌迹易循基構易守磨石壁刻金記後之人聽詞而見心觀末而知本銘曰惟天生人立君以理惟君受命奉天為子代去不留人來無巳德涼者滅道高斯起赫赫高祖明明太宗爰革隋政奄有萬邦罄天張宇盡地開封武稱有截文表時雍高宗稽古德施周溥茫茫九夷削平一鼓禮備封禪功齊舜禹巖巖岱宗衎我神主中宗紹運舊邦惟新睿宗繼明天下歸仁恭己南面絪縕化醇告成之禮留諸後人緬豫小子重基五聖匪功伐高匪德矜盛欽若祀典丕承永命至誠動天福我萬姓古封泰山七十二君或禪奕奕或禪云云其迹不見其名可聞祗遹文祖光昭舊勳方士虛誕儒書齷齪佚后求仙誣神檢玉秦災風雨漢汙編録德未合天或承之辱道在觀政名非從欲銘心絶巖播告羣嶽人者道之子道者人之母子不知母謂之不孝人不識道謂之至愚故上士能勤行下士惟大笑背道求道從迷至迷且魚在水中水為魚命人在道中道為人生道去則人亡水渴則魚困不知即身以求道而乃徇福以喪真何其誤歟遂積不義之財以為布施棄無為之教別云修善豈知善本破惡不合邀名施本濟人不合求報哉求道者以心為舟以信為車車用在於運舟用在於虛常取不足勿求有餘靜心而不繫者虛舟也運動而不倦者信車也今將告爾以元言之首施勿求福而福自至齊勿貪功而功自備心勿向邪而道自致施而求福福必不足齊而貪功是謂有欲向邪求道是謂聾俗忠者臣之分孝者子之心柔弱為趨道之津誠敬乃入真之馭不益己不損物以不貪為寶以知足為富內保慈儉外能和同念身何來從道而有少私寡欲夷心注元若然者可為勤行之士爾其勗哉爾其勗哉夫大道坦坦去身不遠修之於身其德乃真爾當慎汝身洗爾心內養五神外合一氣去萬惡增萬善長生久視沐浴元波真經之旨畢於是不死之方盡於是爾其勗哉闕二字易與天地準故君子洗心焉夫出處審乎時默語存乎道易成其大勞謙闕一字於吉闕五字有人闕七字公闕四字右相國忠之父也純孝足以合禮移忠足以和義體仁足以長人貞固足以幹事包大易之四德闕六字莫京闕十二字以嗣者矣公諱珣字仲珣華陰人也叔虞翦圭自周封晉伯喬食菜受邑君楊氏族之先也黃雀四環闕九字潔白闕五字五公四代乘車輪者兩漢百人門閥之宗也公曾祖汪隋國子祭酒吏部尚書戴國公探道秉德闕四字大父令本庫部郎中闕一字沂闕一字三郡守講信修睦不隕厥問烈考志謙青城令追贈陳留太守修辭辨學薄遊以取榮沖用晦德積慶以垂裕闕六字有闕一字光公承闕二字之陰騭體積譱之陽報氣稟清白生資禮樂故藝能無不總博覽無不該嘗讀書至事親章乃輟卷長歎曰夫子志在春秋闕二字之闕一字行在孝經闕三字也乃闕一字心所至誓不違親然鳴鶴遠聞招弓屢辟確乎不拔皆以色養懇辭青城府君每加誨誘俾之從政公乃闕五字面承大人庭訓孝乎惟孝友于兄弟施於有政是亦為政也府君乃撫而慰之就成雅志自是三十餘載非躬薦甘旨不以潔闕十一字定非闕一字疾無闕二字之憂致闕一字養極三牲之樂當時君子議以為難及丁家艱哀毀踰制遂結廬墓左手植松楸郡縣以孝聞服滿召闕五字以旌闕一字行遷延不行者久之或曰生極其養不違親以易身孝本乎仁豈懷寶而迷國又太夫人有苦切之誡乃應命焉換左衛兵曹以闕四字州司士轉杭州司士闕四字職及欒棘僅起衰麻外除謂楚祿萬鐘永無及巳孔門四教庶有立乎乃息心參調優遊著述尋以親闕七字察使察罪舉能闕二字元武令公闕一字從政也蘊中和以息機推誠信以動物草木無夭況人庶乎鬼神知感況豪右也所以堂上鳴琴闕八字所在闕五字用公之道行公之志推以一邑持宰天下亦信然乎神欺輔仁位不充德亭伯勞於郡掾仲躬止於太邱闕六字時宰竊位而闕一字歎命之不偶闕三字猶今享年五十有一開元五載遘疾終於元武之縣廨公始自解褐應召及乎易簣歸闕一字凡六徙闕六字者三闕一字人者一闕四字之屯闕一字無慍恚於三黜以之造次必周旋於四科傳曰涅而不緇磨而不磷公之謂矣夫人中山張氏僕射闕六字州希闕一字之闕一字女恭儉之德訓於公宮貞信之教行於嬪族命之不造華年早凋以開元二十七年十月十六日合葬於岐陽之安平山南原禮也天寶七載追贈魏郡太守夫人中山郡夫人其孤國忠濟美代業應期王佐則我有社稷爾能衛之我有廊廟爾能宰之叶和九功九功惟序平章百姓百姓昭明俾九流衣冠萬邦黎獻丕乃大言曰咸有一德思皇萬年時惟爾勞時惟爾弼若然者雖我君臣之闕二字契理運亦乃祖闕二字之訓貽厥門風於是美闕二字之克家霈春澤以流葉天寶十二載三月重贈公武部尚書追封鄭國公夫人鄭國夫人所以彰父教子忠君嘉臣節也俾萬載闕十一字希音則巨鹿名將空深漢主之懷闕里先師逾愧魯侯之誄銘曰先王至德訓人惟孝倬哉楊侯獨立名教宏道由己聚學依仁悾悾勵節諄諄奉親明惟其物暗不欺神闕十二字顏冉其倫君子委和嵩神屬慶挺生王宰精微亞聖光爾前烈毗豫大政延贈夏卿追封舊鄭安平原兮岐之陽闕三字兮闕二字鄉闕三字兮闕三字冥冥歸兮泉路長獨九京之豐石播終古兮名揚州都督葉尊師碑銘并序朕聞軒轅三皇之盛者尊廣成唐堯五帝之盛者師尹壽夫以聖人之道教聖人之才守之七日又守之九日朝徹而後能見獨是道也入水不濡蹈火不嘯叱風雨鞭笞魔魅無方而後能進獨是神也神則惟變道亦旁通苟得其人抑所謂神道設教者也師諱法善字道元自諸梁食采是謂葉公邑亦如之因而命氏則昔為南陽人也曾祖道興祖國重父慧明贈歙州刺史賁邱園者一貫吾道食舊德者百代可知故名溢宇宙之中身在江海之上則今為古括人也至隋大業歲在景子法師是生凡六百四十二甲子洎我開元歲在庚申形解升雲則春秋百有七矣其生也年長而色若孺子其化也委蛻而神則默仙嘗從朕遊仰之彌高鑽之彌堅藏察無象鉤致不測若言匡國輔主鼓舞發揮焉朕可推而尊之不可得而臣也其始終出處之跡可得而言者初師甫七歲涉江而遊逮及三年人以為溺及還問其故則曰三青童子引之憩於華堂峻宇咽靈藥吸雲漿太上鎮之是以留也十五中毒死又見昔青童曰天台茅君飛印印其腹始殊閟絶良久豁如師以靈應感通殊尤若此遂乃杖策遊諸名山遠訪茅君而遇嶽骨上起目瞳正方冰雪綽約嫣焉微笑曰爾來乎爾名巳登仙格身逢魔試故此相救宜勉之當以輔人弼教為意無汲汲於去來也由是便於青城趙元陽受遁甲步元之術於嵩高韋善俊傳八史雲蹻之道宴息於括蒼羅浮往還於蓬萊方丈靈圖祕訣仙符真度寶籙生券冥感空傳臨目而萬八千神咽胎而千二百息或潛泳水府或飛步火房或剖腹滌腸勿藥自復或刳腸割膜投符有加或聚合毒味服之自若或徵召鬼物使之立至呵叱羣鬼奔走衆神若陪隸也故海內稱焉千轉萬變先朝寵焉一晝三接朕在藩邸纍聞道要及臨㝢縣虛佇昌言奸臣寓謀凶醜僭逆未嘗不先事啓沃亟申幽贊故特加紫綬以大公侯之封而確固黃中不乘軒冕之賞可謂德博而施道尊而光者也適來無迹為夫子之時邇去無吝為夫子之順歲在鶉尾月鶉火是也返真懸解翊日追贈越州都督踰月歸藏於括蒼之山免朝章從夙志也先生幼有奇質長標特操神照體外骨秀形表故萬先生目之曰子書成仙格方自仙宮吾將及爾為同僚也信哉易曰君子或出或處出者無山林之逸處者無軒冕之貴雖道同則應而迹異難兼先生養神太和觀妙元牝君子或處之盛也金印襲貴紫綬方來君子或出之盛也非夫道臻博大德合神明其孰能與於此也故於王室則承恩者五代當朕時則傳道者數人皆曰宗師無閒然矣夫為文者紀其實稱德者尚其訓先生知余余寧不述訓寓言而無愧可披文而相質銘曰忽然勃然莫不出焉油然瀏然莫不入焉百昌之源萬化之泉於此觀妙實云列仙列仙伊何銷化却老觀妙伊何豈假至道旁通幽贊神變靈造淫祠厲階無隱不討討逆輔順功就佐時藏往察微業與神期章紱加等方來不欺視緣若遺恍然我思大有元吉黃中通理默仙委蛻元達無巳葉縣鳧飛遼城鶴止元風盛烈鬱乎千祀開元二十七年歲在己卯十二月己未朔二十六日乘化而往彼則悠哉不忘舊情紀諸事迹仙山海畔碑石依然
