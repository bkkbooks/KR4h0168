front:
  text: 全唐文欽定全唐文卷四百八十七權德輿五
  hash: sha256:95ce6d114c57f654ccd72f931af16b27b3413fd1a445b490216bd219987fd08c
body:
  text: 右易曰聖人感人心而天下和平書曰嘉言罔攸伏然則致理之道在感之而已伏惟陛下睿聖欽明覆露宏納獎善求理冠於百王一昨許孟容以齊月匆未有殊勞超擢非次上州刺史品秩過優駁議之司愛惜法度迫於守職不敢顧身封進詔書披瀝誠懇中朝久無此事人情為之吅丂一然陛下特開延英非時召對輟已行之詔察無隱之忠天下之人踴躍相慶麟鳳五靈未足為瑞臣能匪躬君能虛受使百執事之人盡忠奉上此實瑞之大者自前日已來衆情為孟容危懼昨日已來衆情荷陛下開納巍巍聖德橫絶古今朝廷欣欣感甚以泣臣忝職近侍受恩每深不任忭躍悅懌之至謹奉狀陳賀以聞臣德輿誠歡誠喜頓首頓首謹言右少陽丁憂已近五十日未有恩命起復除官比來諸道節將每有起復皆不如此淹久亦聞少陽疾病頗甚如少陽不起即朝廷因此便可處置況蔡州四面懸絶與山東不同伏計聖謨已有前定至如今日起復即恐不可過遲況頃來朝中儒臣文吏如杜祐樊澤路寰皆不免有此今若議除替即須准擬興師師徒一舉勞費則甚京邑旱儉恐且須安靜養威蓄力以俟其時少陽風疾頗甚臣先已聞奏其勢非久可為後圖東都與淮西相近在臣憂虞至切敢以踈遠干冒宸嚴輕瀆上陳伏待罪責無任惶悸隕越之至謹奏右伏准建中元年正月五日制常參官上後三日舉一人以自代者前件官操履淳固識度清明學通典憲文稽雅頌損益儀制實當其才謹具名如前謹奏仕郎守太常博士賜緋魚袋鄭儋右伏准建中元年五月五日制常參官上後三日舉一人以自代者前件官文藝敏達行義貞循直道正詞確然有立使之司諫才實過臣謹具名如前謹録奏聞謹奏右伏准建中元年正月五日制常參官上後三日舉一人以自代者前件官詞學精實晦而不耀操尚純素貞而有恆司諫十年其道一貫凡所踐履臣頗諳知使之記言庶裨法教謹具名如前謹奏右伏准建中元年正月五日制常參官上後三日舉人以自代者前件官識理精通文藝典實行潔而敏氣和而專施於政事動有成績察其素履堪列近臣宏奉訓辭庶能稱職謹具名如前謹録奏聞謹奏右伏准建中元年正月五日制常參官上後三日舉一人以自代者前件官文詞朗茂學識宏暢常任起居郎禮部員外郎出守四年日新其道司言草奏所任誠切酌於公議次有其才謹奏右伏準建中元年正月五日制常參官上後三日舉一人以自代者前件官通識敏行強學懿文為官擇人堪備清近發揮書命必有可觀謹具名如前謹録奏聞謹奏輿準制舉自代官朝議郎守尚書司封郎中充集賢殿御書院學士判院事上騎都尉陳京右伏準建中元年正月五日制常參官上後三日舉一人以自代者前件官文學宏深資性貞實歷博士補闕三為郎官該達古今議論堅正掖垣之任望實所歸使之司言必能稱職謹録奏聞謹奏右伏準建中元年正月五日制常參官上後三日舉一人以自代者前件官文詞精雅器業端醇久踐職員多所練達求才誠重考藝尤難將辨妍媸必歸鑒裁使居其任尤允至公謹具名如前謹奏督潭州諸軍事兼潭州刺史御史中丞賜紫金魚袋楊憑右伏準建中元年正月五日制常參官上後三日舉一人以自代者前件官文學政事侃然自立器宏道直材茂識精纍居中外克著聲實稽其志業可處大官司徒二左右邦教以臣忝據恐紊彞章陟明而授庶允公望謹録奏聞謹奏右伏準建中元年正月五日制常參官上後三日舉一人以自代者前件官敏識全才焯見理本久司綸翰乃擢禮闈凡所典領克揚聲績伏以夏官之二務切簡稽國朝以來望實皆重其於選任頗異他曹以臣居之玷辱為甚掄才以授敢獻所知謹録奏聞謹奏權德輿準制舉自代官朝議大夫守右散騎常侍上柱國宏農郡開國公賜紫金魚袋楊憑右伏準建中元年正月五日制常參官上後三日舉一人以自代者前件官曠度偉才明誠直道卓爾山立不隨波流自踐朝倫時推公器話言形於風概聲猷發於事業庶政根本在於南宮臣以庸虛五贊其職憑積望實未階茲選物議時情共知不可輒量力以循分期類能以審官庶允至公以明朝典謹録奏聞謹奏右伏準建中元年正月五日制常參官上後三日舉一人以自代者前件官文學行義堅明中正早登郎吏謹貫法程頃任給事中抗議不回德宗為輟已行之詔自二職司寇權領選曹強志在公克舉官業今銓衡務重朝選所難臣頃轉兵部才經數月驟茲擢遷必速官謗中臺之首尤在得人推於至公庶允㣥議謹録奏聞右伏準建中元年正月五日制常參官上後三日舉一人以自代者前件官含和抱素宴息道樞循性履方遠跡聲利徵拜諫列乞歸故山實有古風可司教本伏以賓護之任道德所宜不嬰事物時謂清重正職員於三品列商皓於四人豈臣小生忽據尊秩久於塵玷自速愆尤過蒙恩私猶處優禮俯仰慙灼上負聰明賦祿命官必歸耆碩以臣負罪非所克堪推賢讓能朝有恆制大僚厚德慶洽時情謹録奏聞謹奏右伏準建中元年正月五日制常參官上後三日舉一人以自代者前件官才茂識精密靜宏遠久於右掖重履南宮儀曹取士聲實不惑小宰掄才流品皆敘伏以奉常典禮首冠㣥卿古今盛選不可虛授以臣愚薄纍奉恩榮前後職官無非忝濫逮今獎命尤懼非宜將何以協和神人祇肅郊祀跡邠公望當處大僚循分讓能朝有彞典謹録奏聞謹奏右伏準建中元年正月五日制常參官上後三日舉一人以自代者㣥官選任猶合讓能況台司寄重倍百常等臣自受任以來夙夜惶怖必知敗覆無補盛明竊見前件官等含章履道忠孝諒直實有宰物之器皆有致君之誠足以上承睿謨下決庶政伏乞罷臣袞職以付材能則訏謨可行授受惟允㣥情斯在非敢自私手疏上陳伏惟鑒聽無任誠懇戰懼之至謹奉狀陳讓以聞謹奏右件官器行端茂文學閎深自中書舍人歷禮部吏部二侍郎太常卿皆與臣交代諳其政事伏準建中元年正月五日制常參官上後三日舉一人以自代者臣頃待罪非據首尾四年無補休明合當譴黜聖慈寬宥猶守本官受恩之日惶駭失次又蒙特令宰臣奉宣進止獎飾慰喻至於再三謂臣更無罪過恐臣妄有憂愳承命震灼感入肺肝宰臣退免未有斯比實當怵惕之際再沐生成之恩臣以違奉近侍不合申謝慮煩省覽不敢拜章輒因舉代之時特荷非常之澤況宗伯秩禮選任重難以邠代臣實允公望謹録奏聞謹奏右伏準建中元年正月五日制內外官上後三日舉一人以自代者前件官端操敏用秉彞嚮方專席兩臺察廉三郡自理煩處劇再二六官克茂休聲益彰直道保釐河洛從古重難宏修武備宜得威望揆才量力敢以薦言謹録狀奏聞謹奏右留鎮將士雖有三千八百餘人偃師陽翟登封告成等分鎮并軍將口傔諸色所由外在都城日敕二千人城門街鋪守當悉在其內陽翟當蔡州要路鎮兵不滿三百人都城人數已少更分減不得自舞陽劫殺已來臣夙夜憂切陽翟只隔襄城便與郾城接界寇盜侵軼事資隄防伏請量加置前件人數分在都城及陽翟鎮兩處防備所冀完守遏其窺覦倘非事理迫切豈敢輕瀆聖聽謹録奏聞伏聽敕旨右伏奉今月十四日敕留鎮將士宜加鎮二千人都城及陽翟分鎮仍速令招召精選強壯數足奏聞者臣伏以都畿官闕之重四方水陸之衝密邇淮夷兵數鮮少安危之計責在微臣夙夜憂惶逼擾是懼陛下神武獨運睿略下臨加此新軍保安洛土凡在都邑已如金湯敢勵孱庸以膺驅策無任感恩悅懌之至其招召事宜已具別狀分析聞奏謹録奏聞謹奏右伏奉今月十四日敕留鎮將士宜加置二千人速令招召者伏以自元和三年準敕停防禦軍後皆散在坊市工庸為生今令招召揀去老弱又畿內山谷間有武力徑悍者四軍留鎮軍子弟有成長強壯者旬日內且合拾得一千人其餘至後月內並合得足伏以前件人等又籍軍籍不免饑寒招募之初須有露賚藉其速至必在樂從況當冬賜之時宜均挾纊之澤伏望天恩許臣招召入軍者便準舊官健例給冬衣月糧伏望下有司且支一千其餘一半待招召有次第後續具聞奏謹録奏聞謹奏右伏奉今月十九日敕東都留鎮創立新軍所招將士切須精選要得府縣共詳簿書況分正副守仰惟舊典宜令裴次元以本官充東都副留守者伏以居守之任分政是崇舊制河尹多兼副職以臣虛薄謬忝保釐陛下俯憂敗闕命此陪二今淮右狂寇尚稽天誅洛京重地每軫宸慮況新承詔旨創置軍師其於選募多闕府縣以尹守之劇同此在公佐庸菲之材俯矜不逮受恩斯重量力難任見與次元計會於諸色人中設法招召續具條奏無任感恩戴荷之至謹奉狀陳謝以聞謹奏準今月十七日敕移義成軍一千五百人鎮陽翟縣右伏奉今月二十日詔敕淮西未寧東都兵少今詔闕平發步軍一千五百人於陽翟縣鎮守令權取臣指撝與次元計會差官專往勾當供頓及排比兵馬下處善於綏撫無失機宜如淮夷奔衝即逐便除討若無侵掠但且防遏優恤之間必資得所者詔命自天睿獎稠謺捧戴惶悚若無所容伏以東畿之中陽翟最重地非巖險境接淮夷斯為要衝實在捍蔽兵力素少疆場是虞忽承天書已在睿算分滑臺之堅甲佐甸邑之偏師戎行賈勇河洛增氣臣以懦劣素乏才謀陛下權令指撝假以威重謹當下竭庸管上稟睿謀循已何堪省躬知懼應緣置頓及到縣下處臣已與次元計會排比差官勾當其於撫綏必冀便安候將士等到鎮續具聞奏謹奉狀陳謝以聞謹奏右件見管兵士如前其中分在陽翟偃師外鎮并諸色軍將所由及口傔等並在數內今在都城二千人已下極為寡少臣去年七月五日面辭親奉聖旨欲却置防禦軍去年十月十六日又具狀聞奏至今未蒙進止東都與淮西地近又少陽丁憂未聞疾狀非輕慮有軍中動靜苦無備擬不免憂虞又陽翟去冬闕有劫殺亦為在鎮人少所以草竊公行居守寄崇臨制東夏淮西緩急切在隄防須假軍聲以重威望以臣庸懦又兵力至少夙夜懷懼曠敗是憂在臣至微豈敢逃責但以常備重任過承鴻私恐負恩寄有辜任使事理所迫不敢不言伏惟聖慮速賜裁擇輕冒塵瀆神爽震驚無任惶懼隕越之至謹差押衙雲麾將軍守左金吾衛大將軍兼試殿中監上柱國成黨奉狀陳請以聞謹奏
