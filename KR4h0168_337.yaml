front:
  text: 全唐文欽定全唐文卷三百三十七顏真卿二
  hash: sha256:7dc0d84e48c251c4486e12d6d6f2c103a04015858c783bbbe6c8c014cda7fb3a
body:
  text: 侑食以樂執恭展禮以辨等威以明貴賤乙以筮仕策名清朝從大夫之後既登三命循先人之祭有事十倫已而鏗鏘具舉和平不爽苾芬承祀胡考之寧舉特且叶於禮經加牢未虧於祀典人告其僭罔知攸伏楊志堅素為儒學遍覽九經篇詠之間風騷可托愚妻覩其未遇遂有離心王歡之廩既虛豈遵黃卷朱叟之妻必去寧見錦衣污辱鄉閭敗傷風俗若無裦貶僥幸者多阿王決二十後任改嫁楊志堅秀才贈布絹各二十匹米二十石便署隨軍仍令遠近知悉十一月日金紫光祿大夫檢校刑部尚書上柱國魯郡開國公顏真卿謹奉書於右僕射定襄郡王郭公閣下蓋太上有立德其次有立功是之謂不朽抑又聞之端揆者百寮之師長諸侯王者人臣之極地今僕射挺不朽之功業當人臣之極地豈不以才為世出功冠一時挫思明跋扈之師抗回紇無厭之請故得身畫淩煙之閣名藏太室之廷吁足畏也然美則美矣而終之始難故曰滿而不溢所以長守富也高而不危所以長守貴也可不警懼乎書曰爾惟弗矜天下莫與汝爭功爾惟不伐天下莫與汝爭能以齊桓公之盛業片言勤王則九合諸侯一匡天下葵邱之會微有振矜而叛者九國故曰行百里者半九十里言晚節末路之難也從古至今臮我高祖太宗已來未有行此而不理廢此而不亂者也前者菩提寺行香僕射指麾宰相與兩省臺省已下常參官並為一行坐魚開府及僕射率諸軍將為一行坐若一時從權亦猶未可何況積習更行之乎一昨以郭令公以父子之軍破犬羊凶逆之衆衆情欣喜恨不頂而戴之是用有興道之會僕射又不悟前失竟率意而指麾不顧班秩之高下不論文武之左右苟以取悅軍容為心曾不顧百寮之側目亦何異清晝攫金之士哉甚非謂也君子愛人以禮不聞姑息僕射得不深念之乎真卿竊聞軍容之為人清修梵行深入佛海況乎收東京有殄賊之業守陝城有戴天之功朝野之人所共景仰豈獨有分於僕射哉加以利衰塗割恬然於心固不以一毀加怒一敬加喜尚何半席之座咫尺之地能汨其志哉且鄉里上齒宗廟上爵朝廷上位皆有等威以明長幼故得彞倫敘而天下和平也且上自宰相御史大夫兩省五品已上供奉官自為一行十二衛大將軍次之三師三公令僕少師保傅尚書左右丞侍郎自為一行九卿三監對之從古以然未嘗參錯至如節度軍將各有本班卿監有卿監之班將軍有將軍之位縱是開府特進並是勳官用蔭即有高卑會宴合依倫敘豈可裂冠毀冕反易彞倫貴者為卑所淩尊者為賤所逼一至於此振古未聞如魚軍容階雖開府官即監門將軍朝廷列位自有次序但以功績既高恩澤莫二出入王命衆人不敢為比不可令居本位須別示有尊崇只可於宰相師保座南橫安一位如御史臺衆尊知雜事御史別置一榻使百寮共得瞻仰不亦可乎聖皇時開府高力士承恩傳宣亦只如此橫座亦不聞別有禮數亦何必令他失位如李輔國倚承恩澤徑居左右僕射及三公之上令天下疑怪乎古人云益者三友損者三友願僕射與軍容為直諒之友不願僕射為軍容佞柔之友又一昨裴僕射誤欲令左右丞勾當尚書當時輒有酬對僕射恃貴張目見尤介衆之中不欲顯過今者興道之會還爾遂非再猲八座尚書欲令便向下座州縣軍城之禮亦恐未然朝廷公宴之宜不應若此今既若此僕射意只應以為尚書之與僕射若州佐之與縣令乎若以尚書同於縣令則僕射見尚書令得如上佐事刺史乎益不然矣今既三廳齊列足明不同刺史且尚書令與僕射同是二品只校上下之階六曹尚書並正三品又非隔品致敬之類尚書之事僕射禮數未敢有失僕射之顧尚書何乃欲同卑吏又據宋書百官志八座同是第三品隋及國家始升別作二品高自標致誠則尊崇向下擠排無乃傷甚況再於公堂猲咄常伯當為令公初到不欲紛披僶俯就命亦非理屈朝廷紀綱須共存立過爾隳壞亦恐及身明天子忽震電含怒責斁彞倫之人則僕射其將何辭以對辭後明日至宅奉送承已當時出闕不獲重捧袂至今為恨仲春漸暄不審太保尊體何如真卿粗爾不審初到如何佇承異績以慰瞻仰因中郎張漵往謹附狀不宣謹狀二月十四日刑部尚書顏真卿狀上李太保大夫公閣下張漵昨艱難時首末得力願在麾下有容足處庇之幸甚謹空奏事官至蒙問增慰馳誠冬閏初寒伏惟太保尊體安適真卿悲疢何言蕃寇推退為憲之功忝沐深情俱增喜躍前後不逢之信遂闕修狀何時入奏未聞悲係無喻謹還狀不次謹狀閏月十有四日刑部尚書顏真卿狀上李太保大夫公閣下謹空真卿粗自奉別渴仰何勝昨緣馬奔遂失馳謁想蒙情恕也真卿十五日離家大小俱安汍汍病瘡少愈勿憂為佳正遠披承益期自愛謹勒參候不次刑部尚書顏真卿頓首李太保大夫公閣下千手贊已領訖然尚少第二隔恐在書府希更根尋足疏拙抵罪聖慈含宏猶佐列藩不遠伊邇省躬荷德恩貸實深兢栗之誠在物何喻仲春暄甚不審太保尊體何如所苦當轉勝也真卿緣驛上無馬私乘泡轉幾死前進不得今日始至藍田即便取路不獲執別此情如何珍重珍重謹附狀不次謹狀二月十一日陝州別駕顏真卿狀上李太保大夫公閣下不審所苦何如奉計已痊復真卿緣馬病朝回已乏未遂馳謁謹勒參候不次謹狀刑部尚書顏真卿狀上李太保大夫公閣下千手贊檢得未帖之謹空拙於生事舉家食粥來已數月今又罄竭祗益憂煎輒恃深情故令投告惠及少米實濟艱勤仍恕干煩也真卿狀陰寒不審太保所苦何如承渴已損深慰馳仰所檢贊猶未獲望於文書內細檢也病妻服藥要少鹿肉脯有新好者望惠少許幸甚幸甚專馳謁不次謹狀二十九日刑部尚書顏真卿狀上李太保大夫公閣下謹空真卿謹別上書於御史閣下竊聞尊候平和真卿瞻仰瞻仰前所會廟上諸公未悟唯御史論高百寮振古未有雜事可置況朝廷自有次序不足念乎真卿昨奉辭但增悵仰承已過埭不得重別情深惘然珍重謹此不宣真卿白二十四日蔡明遠鄱陽人真卿昔刺饒州即嘗趨事及來江右無改厥勤靖言此心有足嘉者一昨緣受替歸北中止金陵闔門百口幾至糊口明遠與夏鎮不遠數千里冒涉江湖連舸而來不愆晷刻竟達命於秦淮之上又隨我於邗溝之東追攀不疲以至邵伯南埭始終之際良有可稱今既已事方旋指期斯復江路悠緬風濤浩然行李之間深宜尚慎不宣真卿報聞鄒遊與明遠同來欲至采石計其不久亦合及吾淮泗之間脫若未到見之宜傳此意遣此不宣真卿報蔡明遠真卿奉命來此事期未竟止緣忠勤無有旋意然中心悢悢始終不改遊於波濤宜得斯報千百年間察真卿心者見此一事知我是行亦足達於時命耳貞元元年正月五日真卿自汝移蔡天也天之昭明其可誣乎有唐之德則不朽耳十九日書近聞劉中使至瀛州吳希光已降足慰海隅之心耳又聞磁州為盧子期所圍舍利將軍擒獲之吁足慰也真卿頓首奉承十四日遷厝承問悲慕不能自勝惟攀慕不及摧毀何堪痛當奈何痛當奈何凝寒惟動靜支適兒子等保侍真卿離官已久事須十間前至鄭州汴州已來專奉侍一日只擬一驛計過大事後發猶恐遲必望知此緩急勿遲滯足下不來義無獨去之法必請矜此狼狽所望今到汴州水下不愁河凍書祭器等先下船去真卿十一日且發東京佇望早來早來謹不次真卿頓首夫人閣下十一月八日問訊頌翽蒙郎郎和奴光嚴深遠憶或至十三日得發政可守不可不守吾去歲中言事得罪又不能逆道徇時為千古罪人也雖貶居遠方終身不恥緒汝等當須會吾之志不可不守也真卿承聞大華嚴會已遂圜成取來日要詣彼隨喜如何如何幸周副老草不悉真卿頓首和南澄師大德侍老十日敬空得示問廣平碑本了來數日故當封呈真卿頓首近作一文殊師利菩薩碑但欲發揚主上聖意蓋不近文律耳今奉呈充蓋醬之用可乎真卿白天氣殊未佳汝定成行否寒食只數日間得且住為佳耳真卿頓首中夏以還暑氣日甚病懶益不喜所為前欲書石當須稍涼作之也幸不以差緩過之京人來何消息嘉否賊軍未平使僕不憤見故先修書但召諸子弟與語不具真卿真卿具前楮訊後所苦何如立斯極位雄廷江上佳山秀水在公庭戶想日有樂事甚得佳士相延公高才逸韻自有晉宋間人風坐此肆局不易處上方招致仁者如公之儔豈久在江左乎行聞迅召以快士議真卿頓首顏氏之先出自黃帝之孫安為曹姓其裔邾武公名儀父字伯顏子友別封郳為小邾子遂以顏為氏世為魯國卿大夫孔門達者七十二人顏氏有八回居四科之首其後戰國有率躅秦有芝貞漢有異肆安樂魏有斐盛盛字叔臺歷青徐二州刺史關內侯其後子孫咸著宦族有若宏都之德行巴陵記室之書翰特進黃門之文章祕監華州之學識肇自魯國格於聖代紛綸盛美舉集於茲述遵前人不敢失墜建中元年歲次庚申秋七月癸亥序古之為文者所以導達心志發揮性靈本乎詠歌終乎雅頌帝庸作而君臣動色王澤竭而風化不行政之興衰實繫於此然而文勝質則繡其鞶帨而血流漂杵質勝文則野於禮樂而木訥不華歷代相因莫能適中故詩人之賦麗以則詞人之賦麗以淫此其效也漢魏已還雅道微缺梁陳斯降宮體聿興既馳騁於末流遂受嗤於後學是以沈隱侯之論謝康樂也乃云靈均已來此未及覩盧黃門之序陳拾遺也而云道喪五百歲而得陳君若激昂頽波雖無害於過正榷其中論不亦傷於厚誣何則雅鄭在人理亂由俗桑間濮上胡為乎帛丿糸古之時正始皇風奚獨乎凡今之代蓋不然矣其或斌斌彪炳郁郁相宣膺期運以挺生奄寰瀛而首出者其惟僕射孫公乎公諱逖河南鞏人其先自樂安武水寓於涉而徙焉父嘉之以詞學登科官至宋州司馬公風裁澄明天才傑出學窮百氏不好非聖之書文統三變特深稽古之道故逸氣上躋而高情四達羌索隱乎混元之始表獨立於常均之外不其盛歟年數歲即好屬文十五時相國齊公崔日用試土火爐賦公雅思遒麗援翰立成齊公駭之約以忘年之契爾後遂有大名故其試言也年未弱冠而三擅甲科吏部侍郎王邱試竹簾賦降階約拜以殊禮待之相國燕公張説覽其策而心醉其序事也則伯樂川記及諸碑志皆卓立千古傳於域中其為詩也必有逸韻佳對冠絶當時布在人口其詞言也則宰相張九齡欲掎托疵瑕沈吟久之不能易一字公之除庶子也苑咸草詔曰西掖掌綸朝推無對議者以為知言凡斯夥多庸可悉數故燕國深賞公才俾與張九齡許景先韋述同遊門庭命子均垍申伯仲之禮江夏李雍自陳州入計繕寫其集齎以詣公託知已之分其為先達所重也如此公又雅有清鑒典考功時精核進士雖權要不能逼所獎擢者二十七人數年間宏詞判等入甲第者一十六人授校書郎者九人其餘咸著名當世已而多至顯官明年典舉亦如之故言第者必稱孫公而已夫然信可謂人文之宗師國風之哲匠者矣公凡所著詩歌賦序策問贊碑志表疏制誥不可勝紀遭二朝之亂多有散落子宿絳成等夙奉過庭之訓咸以文章知名同時臺省乃編次公文集為二十卷列之於左庶乎好事者傳寫諷誦以垂乎無窮亦何必藏名山而納石室也真卿昔觀光乎天府實荷公之獎擢見命為序豈究端倪時則永泰元年仲秋之月也至若世系閥閲蓋存之別傳此不復云開士懷素僧中之英氣概通疏性靈豁暢精心草聖積有歲時江嶺之間其名大著故吏部尚書韋公陟覩其筆力勗以有成今禮部侍郎張公謂賞其不羈引共遊處兼好事者同作歌以贊之動盈卷軸夫草藳之作起於漢代杜度崔瑗始以妙聞逮乎伯英尤擅其美羲獻茲降虞陸相承口訣手授以至於吳郡張旭長史雖姿性顛逸超絶古今而楷法精詳特為真正某早歲嘗接遊居屢蒙激勸告以筆法資質劣弱又嬰物務不能懇習迄用無成追思一言何可復得忽見師作縱橫不㣥迅疾駭人若還舊觀向使師得親承善誘亟揖規模則入室之賓舍子奚適嗟嘆不足聊書以冠諸篇首國家設觀察使即古州牧部使之職代朝廷班導風化而宣布德意振舉萬事而沙汰百吏者也民俗之舒慘兵賦之調發刑獄之冤濫政治之得失皆得以觀察而行之其任可謂重矣江西貴溪高君寬仁初舉明經歷任中外克勤職務政績昭著升福建觀察使夫君子之仕不以位尊為榮而以盡職為貴福建大藩也其地東帶滄溟南接交廣居民若是其衆也政務若是其煩也職乎州郡者果皆循且良尚不能保其無一事之不舉矧未必皆循良乎弱之食強之取飢寒顛沛而漁奪之不厭則犬畝之民若之何能求其安也自古為民之病者多類此是以居高位而欲下之安其道難也故衆皆以位高為寬仁喜豫獨以盡職為寬仁勉所以盡職者無他正已格物而已忠君愛民而已子與寬仁交久且厚豫所以望於寬仁者豈但在於政事文字之間而已哉振肅風紀表儀一方盡致君澤民之道使聲名流芳史册茲行是望於是乎書劉太沖者彭城之華望者也自開府垂明於宋室澤州考績於國朝道素相承世傳儒雅尚矣夫其果行修潔斯文彪蔚鄂不照乎栘華龍驥驤乎雲路則公山正禮策高足於前沖與太真嗣家聲於後有日矣昔豫作郡平原拒胡羯而請與從事掌銓吏部第甲乙而超升等夷爾來蹉跎猶屑卑位雖才不偶命而德其無鄰故沖之西遊斯有望矣江月弦魄秦淮頂潮君行句溪正及春水勗哉之子道存何居魯郡公顏真卿敘醇白之士曰隴西辛晃鋭業班漢顓門名家十五而志學克明五十而勵精益懋拳拳不失慕回也之服膺袞袞可聽同茂先之善説昔我高叔祖鄆州使君著決疑一十二卷問答稱為大顏曾伯祖祕書監府君集注解成一十二帙名儒斟酌煩省捃托英華勒成三十篇名之曰漢略夫其發凡舉例晃序言之已詳惜乎困於縑緗不獲繕寫遂使精義沈鬱暗然未彰吁足歎也二月初吉金陵氣暖抵淮上之諸侯所如必合及滁川之美景未至方歡㣥子賦詩以寵之豫罷秩醴泉特詣京洛訪金吾長史張公旭請師筆法長史於時在裴警宅憩止已一年矣衆師張公求筆法或有得者皆曰神妙僕頃在長安二年師事張公皆大笑而已即對以草書或三紙五紙皆乘興而散不復有得其言者僕自再于洛下相見眷然不替僕因問裴警足下師張長史有何所得曰但書得絹屏素數十軸亦嘗論諸筆法唯言倍加工學臨寫書法當自悟耳僕自停裴家月餘日因與裴警從長史言話散卻回京師前請曰既承兄丈一本作九丈獎諭日月滋深夙夜工勤溺於翰墨儻得聞筆法要訣終為師學以冀至於能妙豈任感戴之誠也長史良久不言乃左右眄視拂然而起僕乃從行歸東竹林院小堂張公乃當堂踞牀而坐命僕居於小榻而曰筆法元微難妄傳授非志士高人詎可與言要妙也書之求能且攻真草今以授之可須思妙乃曰夫平謂橫子知之乎僕思以對之曰嘗聞長史示令每為一平畫皆須令縱橫有象此豈非其謂乎長史乃笑曰然而又問曰直謂縱子知之乎曰豈不謂直者從不令邪曲之謂乎曰均謂間子知之乎曰嘗蒙示以間不容光之謂乎曰密謂際子知之乎曰豈不謂築鋒下筆皆令宛成不令其疏之謂乎曰鋒謂末子知之乎曰豈不謂以末成畫使其鋒鍵之謂乎曰力謂骨體子知之乎曰豈不謂走歷筆則點畫皆有筋骨字體自然雄媚之謂乎曰轉輕謂屈折子知之乎曰豈不謂鉤筆轉角折鋒輕過亦謂轉角為暗闊過之謂乎曰決謂牽製子知之乎曰豈不謂為牽為製決意挫鋒使不怯滯令險峻而成以謂之決乎曰補謂不足子知之乎曰豈不謂結點畫或有失趣者則以別點畫旁救之謂乎曰損謂有餘子知之乎曰豈不謂趣長筆短常使意勢有餘點畫若不足之謂乎曰巧謂布置子知之乎曰豈不謂欲書先預想字形布置令其平穩或意外字體令其異勢是謂之巧乎曰稱謂大小子知之乎曰豈不謂大字蹙之令小小字展之為大兼令茂密所以為稱乎長史曰子言頗皆近之矣夫書道之妙煥乎其有旨焉字外之奇言所不能盡世之書者宗二王元常逸迹曾不睥睨筆法之妙遂爾雷同獻之謂之古肥旭謂之今瘦古今既殊肥瘦頗反如自省覽有異衆説芝鍾巧趣精細殆同始自機神肥瘦古今豈易致意真迹雖少可得而推逸少至於學鍾勢巧形容及其獨運意疏字緩譬猶楚音習夏不能無楚過言不悒未為篤論又子敬之不逮逸少猶逸少之不逮元常學子敬者畫虎也學元常者畫龍也豫雖不習久得其道不問之言必慕之歟儻有巧思思盈半矣子其勉之工精勤悉自當妙矣真卿前請曰幸蒙長史傳授筆法敢問工書之妙如何得齊於古人張公曰妙在執筆令其圓轉勿使拘攣其次諸法須口傳手授之訣勿使無度所謂筆法也其次在於布置不慢不越巧使合宜其次紙筆精佳其次諸變適懷縱捨規矩五者備矣然後齊於古人矣敢問執筆之理可得聞乎長史曰子傳授筆法之老舅彥遠曰吾聞昔日説書若學有工而迹不至後聞於褚河南曰用筆當須如印泥畫沙思所以不悟後於江島遇見沙地平淨令人意悅欲書乃偶以利鋒畫其徑險之狀明利媚好乃悟用筆如錐畫沙使其藏鋒畫乃沈著當其用鋒常欲使其透過紙背此成功之極矣真草用筆悉如畫沙則其道至矣是乃其迹可久自然齊古人矣但思此理以專想工用故其點畫不得妄動子其書紳豫遂銘謝再拜逡巡而退自此得攻書之術於茲五年真草自知可成矣豫不信佛法而好居佛寺喜與學佛者語人視之若酷信佛法者然而實不然也豫未仕時讀書講學恆在福山邑之寺有類福山者無有無豫迹也始僦居則凡海印萬福天寧諸寺無有無豫迹者既仕於崑時授徒於東寺待客於西寺每至姑蘇恆止竹堂目豫實信其法故為張侈其事以惑沙氓則非知豫者矣閬州之東百餘里有縣曰新政新政之南數千步有山曰離堆斗入嘉陵江直上數百尺形勝縮矗欹壁峻肅上崢嶸而下回洑不與衆山相連屬是之謂離堆東面有石堂焉即故京兆尹鮮于君之所開鑿也堂有室廣輪袤丈蕭豁洞敞虛聞江聲徹見㣥象人村川壩若指諸掌堂北磐石之上有九曲流杯池焉懸源螭首蹙噴鶴咮釃渠股引迾坐環溜若有良朋以傾醇酎堂南有茅齋焉遊於斯息於斯聚賓友於斯虛而來者實而歸其齋壁間有詩焉皆君舅著作郎嚴從君甥殿中侍御史嚴銑之等美君考槃之所作也其右有小石廅焉亦可蔭而踆據矣其松竹桂榑冬青雜樹皆徙他山而栽蒔焉其上方有男宮觀焉署之曰景福君弟京兆尹叔明至德一年十月嘗任尚書司勳員外郎之所奉置也君諱向字仲通以字行漁陽人卓爾堅忮毅然抗直易有之曰篤實輝光書不云乎沈潛剛克君自高曾以降世以財雄招徠賢豪施舍不倦至君繼緒其流益光弱冠以任俠自喜尚未知名乃慷慨發憤於焉卜築養蒙學文忘寢與食不四三載展也大成著作奇之勗以賓薦無何以進士高第驟登臺省天寶九載以益州大都督府長史兼御史中丞持節充劒南節度副大使知節度事劒南山南西道採訪處置使入為司農少卿遂作京兆尹以忤楊國忠貶邵陽郡司馬十有二載秋八月除漢陽郡太守冬十有一月終於所任官舍悲夫雄圖未伸志業已空葬於縣北表附先塋禮也君之薨也冡子光祿寺丞昱匍匐迎喪星言泣血自沔泝峽湍險萬重肩稿足局扳笭引舳凡今幾年皸瘃在目因心則至豈無僮僕臮昱之季曰尚書都官員外郎炅克篤前烈永言孝思懇闕二字志反葬於茲行道之人孰不跂而真卿猶子曰紘從父兄故偃師丞春卿之子也嘗尉閬中君故舊不遺與之有忘年之契叔明昱炅亦篤世親之歡真卿因之又忝憲司之寮亟與濟南蹇昂奉以周旋益著通家之好兄允南以司膳司封二郎中弟允臧以三院御史皆與叔明首末聯事我是用飽君之故乾元改號上元之歲秋八月哉生魄猥自刑部侍郎以言事忤旨聖恩全宥貶二於蓬州沿嘉陵而路出新政適會昱以成都兵曹取急歸覲遭我乎貴州之朝留遊締歡信宿陘峴感今懷昔遂援翰而志之叔明時刺商州炅又申掾京兆不同躋陟有恨如何帝唐龍集後壬寅仲夏己卯朔十五日甲午刻於門序之左右
