front:
  text: 全唐文欽定全唐文卷九百七十三闕名十四
  hash: sha256:f66a29a61d7153c4dbd4dc24fe1ce698f2f26cfca7ab12922d0bb50041f57614
body:
  text: 准天福十二年六月中敕追尊六廟當司尋各牒所司請排比法物修制冊寶并衮龍服通天冠絳紗袍鎮圭等所司修制並無次第者伏緣當司勘造逐年四季祠祭晝日內正月上辛祈穀四月孟夏雩祭及夏至九月季秋大享明堂十一月冬至禋祀昊天上帝夏至祀皇地祇十月孟冬神州地祇皆以祀前二日准禮例奏告太廟一室配座并四孟月及臘饗於太廟伏以國之大事在祀與戎晝日無配座之儀宗廟闕薦饗之禮今詳典墳有虧禮敬伏乞再下所司申請修制准天福八年四月一日敕條舉前後敕文內一件准天福五年十月二十七日敕應州縣官書得十六考敘階至朝散大夫者并歷任內曾升朝及兩使判官者准元敕一選集選期既近理減尤難不得援常選人例妄乞減選每一任無遺闕者候再除官別與加恩其曾任節度觀察推官巡官防禦團練軍事判官并諸出選門官等如卻授令録者並依見任官選數赴集若在任有考課准格合減選者並與理減除此外今任合七選集者特與減一選八選已上與減兩選仍並合格日取解赴所司磨勘無違礙者即録名送中書漢朝諸陵二仲差官朝拜今鼎命歸周不合管係伏准赦書睿陵宮人職員時日薦享如舊二仲合差官朝拜太常禮院申七月一日皇帝御崇元殿命使奉冊四廟以舊儀服衮冕即座太尉引冊案入皇帝降座引立於御座前南向中書令奉冊案進皇帝搢圭捧授冊使使跪受轉授舁冊官其進寶授寶儀如冊案恭以興王之始稽古為先四方見尊祖之心萬代傳敬親之道臣等參詳至時請皇帝降階得司勳郎中許遜申權主判吏部格式選人皆稱值去年十一月內失墜告牒雖尋舊式有例檢行竊緣官員上任之日只憑告敕籤符罷秩之後即藉解繇歷子既失官牒得以檢其敕甲若無解繇難知真僞欲請今後若無解繇歷子考牒者候牒本道州縣勘尋有何殿最候回文與陳狀官員事理同即依牒申銓取保再給憑繇貴無踰濫之人免有徼求之幸商賈及諸色人等訴稱被牙人店主人引領百姓賒買財貨違限不還其價亦有將物去便與牙人設計公然隱沒又莊宅牙人亦多與有物業人通情重謺將店宅立契典當或虛指別人産業或浮造屋舍僞稱祖父所置更有卑幼骨肉不問家長衷私典賣及將倚當取債或是骨肉物業自已不合有分倚強淩弱公行典賣牙人錢主通同蒙昧致有爭訟起今後欲乞明降指揮應有諸色牙人店主引致買賣並須錢物交相分付或還錢未足仰牙人店主明立期限勒定文字遞相委保如數內有人前卻及違限別無抵當便仰連署契人同力填還如諸色牙行人內有貧窮無信行者恐已後誤業即許衆狀集出如是客旅自與人商量交易其店主牙行人並不得邀難遮占稱須依行店事例引致如有此色人亦加深罪其有典質倚當物業仰官牙人業主及四鄰人同署文契委不是曾將物業已經別處重謺倚當及虛指他人物業印稅之時於稅務內納契日一本務司點檢須有官牙人鄰人押署處及委不是重謺倚當錢物方得與印如違犯應關連人並行科斷仍徵還錢物如業主別無抵當只仰同署契牙保鄰人均分代納如是卑幼不問家長便將物業典賣倚當或雖是骨肉物業自已不合有輒敢典賣倚當者所犯人重行科斷其牙人錢主並當深罪所有物業請准格律指揮如有典賣莊宅准例房親鄰人合得承當若是親鄰不要及著價不及方得別處商量和合交易只不得虛撎價例蒙昧公私如有發覺一任親鄰論理勘責不虛業主牙保人並當科斷仍改正物業或親戚實自不便承買妄有遮吝阻滯交易者亦當深罪祭禮宗廟之祀三年一祫以孟冬五年一禘以孟夏所以別尊卑審昭穆也四時之祭薦其常事故禘祫之月則不行時饗恭惟追尊四廟經今三年准禮合改十月孟冬薦享為祫太廟神主將至前一日儀仗出城掌次於西御莊東北設神主行廟幄幕面南其日放朝㣥臣早出西門皇帝常服出城詣行宮㣥臣起居畢就次神主將至㣥臣班定皇帝立於班前神主至太常卿請皇帝再拜㣥臣俱拜神主就行廟幄幕坐設常饌㣥臣班於神幄前侍中就次請皇帝謁神主既至㣥臣再拜皇帝進酒畢再拜㣥臣俱拜皇帝還幄㣥臣先赴太廟門外立班俟皇帝至起居俟神主至㣥臣班於廟門外皇帝立於班前太常卿請皇帝再拜㣥臣俱拜皇帝還幄㣥臣就次宮闈令安神主於本室訖㣥臣班於廟庭太常卿請皇帝於四室奠饗逐室皇帝再拜㣥臣俱拜四室祔饗畢皇帝還宮前件儀注望付中書門下宣下郊祀圭璧制度准禮祀上帝以蒼璧祀地祇以黃琮祀五帝以圭璋琥璜其玉各依本方正色祀日月以圭璋祀神州以兩圭有邸其用幣天以蒼色地以黃色配帝以白色日月五帝各從本方之色皆長一丈八尺其圭璧之狀璧圓而琮八方圭上鋭而下方半圭曰璋琥為虎形半璧曰璜其圭璧琮璜皆長一尺二寸四圭有邸邸本也圭著於璧而四出也日月星辰以圭璧五寸前件圭璧雖有圖樣而長短之說或殊按唐開元中元宗詔曰禮神以玉取其精潔比來用珉不可行也如或以玉難辦寧小其制度以取其真今郊廟所修圭璧量玉大小不必皆從古制伏請下所司修製古者文字皆書於冊而有長短之差魏晉郊廟祝文書於冊唐初悉用祝版帷陵廟用玉為冊元宗親祭郊廟用玉為冊德宗朝博士陸淳議准禮用祝版祭已燔之可其議貞元六年親祭又用竹冊當司准開元禮并用祝版梁朝依禮行之至明宗郊天又用竹冊今詳酌禮例祝版為宜新除起居舍人邊珝任徹其邊珝已謝任徹奉使未回任徹自左補闕除授邊珝自右補闕除授任徹舊宮已在邊珝之上今任徹自敕頭近日同制授官多以先謝為上伏慮任徹使回行立班次難定准宣法書行用多時文意古質條目繁細使人難會兼前後敕格互換重謺亦難詳定宜令中書門下並重刪定務從節要所貴天下易為詳究者伏以刑法者御人之銜勒救弊之斧斤故鞭撲不可一日弛之於家刑法不可一日廢之於國雖堯舜淳古之代亦不能捨此而致理矣今奉制旨刪定律令有以見聖君欽恤明罰敕法之意也竊以律令之書政理之本經聖賢之損益為古今之章程歷代以來謂之彞典今朝廷之所行用者一十二卷律疏三十卷式二十卷令三十卷開成格一十卷大中統類一十二卷後唐以來至漢末編敕三十二卷及皇朝制敕等折獄定刑無出於此律令則文辭古質看覽者難以詳明格敕則條目繁多檢閲者或有疑誤加以邊遠之地貪猾之徒緣此為姦寖以成弊方屬盛明之運宜伸畫一之規所冀民不陷刑吏知所守臣等商量望准聖旨施行仍差侍御史知雜事張湜太子右庶子劇可久殿中侍御史帥汀職方郎中鄧守中倉部郎中王瑩司封員外郎賈玭太常博士趙礪國子博士李光贊大理正蘇曉太子中允上伸等一十人編集新格勒成部帙律令之有難解者就文訓釋格敕之有繁雜者隨事刪除止要諧理省文兼且直書易會其中有輕重未當便於古而不便於今矛盾相違可於此而不可於彼盡宜改正無或牽拘候編集畢日委御史臺尚書省四品以上及兩省五品以上官參詳可否送中書門下議定奏取進止奏新敕起今年正月一日後授官並以三周年為月限閏月不在其內者當司所書較內外六品下赴選官員考第今後以一周年較成一考如缺日不在計限滿三周年較成三考如考滿後未有替人在任更一周年與成第四考如缺日不在計限兼逐年須具到任年月日自上以來課績功過第二考須具經考後課績不得重謺計功其未考須具得替年月日比類升降自今年正月一日以前授官到任者欲准格例三十個月書較三考今年正月一日後來授官到任者准新敕三周年為月限每一周年書較一考閏月不在其內所有諸道州府較考申發考帳及當司較奏各依前後格敕施行應諸司諸色流內出身人等准格並須待附申考近年不經奏考便至參選頗啓幸門應在司見役人等自今後逐年起六月初一日後正身於所司投狀請申較勞考省司據狀却牒本司勘會補奏年月日敕甲頭姓名見掌案分公事牒報省司將元狀檢勘同即與准例申較仍自此後須逐年九月以前較奏了畢不在更與隔年併書之限其考牒本無綾紙書寫敕例今後每年奏下逐人給省牒一紙使大張紙書不在使綾紙及併年都給限據省較敕之日有公事在外差出不虛即本司雜事須具在職功過及出外事繇牒報考功不得有妨逐年書較如不與申牒其雜事令史量情科決仍殿一選如無故自不經省投狀請奏較不在論訴之限者當司緣新敕促期限慮恐較考遲違今後應合較考人請起自五月一日正身投狀限十日畢至七月三十日以前較奏了畢餘依元格施行文武百官每日赴朝參不到如是常朝不到於本官料錢上每貫罰錢十五文如是內殿起居入閣行香出城衆集及非時慶賀御殿闕行參不到並是倍罰臺司先榜幕次曉示本官限三日外即牒三司剋折如有故曾陳牒即將領由呈驗又十六愆條准元和二年十二月內御史臺奏文武常參官准乾元元年三月敕如有朝堂相弔慰相跪拜待漏行立失序談笑喧譁入衙內執笏不端行立遲慢至班列行立不正趨拜失儀拜跪不俯伏舒腳穿班伏出門不即就班無故離位廊下食行坐失儀拜起無度抵夜退朝不從正衙門出非公事入中書每犯者奪一月俸今商量比舊條各減一半如所由指揮尚或抵拒即准舊例録奏貶降
