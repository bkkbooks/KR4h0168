front:
  text: 全唐文欽定全唐文卷六百二十伯庸貞元中進士
  hash: sha256:7e113dcd728236bef49d6b1f9134e1c5613048a915b52094449044bc8a17de6f
  markers:
  - {type: head, offset: 13, content: 韓伯庸, id: KR4h0168_NFKB_620-h1, level: 1}
body:
  text: 陽和布氣兮動植齊光惟彼幽蘭兮偏含國香吐秀喬林之下盤根眾草之旁雖無人而見賞且得地而含芳於是嫩葉旁開浮香外襲既生成而有分何掇采之莫及入握稱美未遭時主之恩納佩為華空載騷人之什光陰向晚歲月將終芬芳十步之內繁華九畹之中亂㣥峰兮上下雜百卉兮攢叢况荏苒於光陰將衰敗於秋風豈不以處地稍幽受氣仍別蕭艾之新苗漸長桃李之舊蹊將絕空牽戲蝶拂花蕊之翩翾未遇來人尋芳春而采折既生幽徑且任榮枯羃輕烟而葱翠帶淑氣而紛敷冀雨露之溥及何見知之久無及夫日往月來時占歲覩遇達人之回盼披荒榛而見取橫琴寫操夫子傳之而至今入夢為徵燕姞聞之於前古生雖失處用乃有因枝條嫩而既麗光色發而猶新雖見辤於下土幸因遇於仁人則知夫生理未衰采掇何晚幽名得而不朽佳氣流而自遠既徵之而見寄願移根於上苑公進字德昇官右衞兵曹參軍幽有寂兮蘭有香香者取其服媚寂者契其韜光是以綠葉紫莖偶貞士而必佩深林絕壑挺奇質而獨芳觀其異彩特秀結根自遠靡生於門寧滋於畹朝陽照而雜花不得間其榮光風轉兮眾草無以齊其偃杳杳深處芬芬絕倫保貞操以擅美發英華以藻春葉凝露以珠綴花含烟而色新移於友也則斷金之利樹之庭也則如玉之珍豈比夫協夢呈祥表嘉名於鄭國循陔見采流雅詠於詩人而已哉蘭之幽兮芳可折幽無人兮芳不絕蘭之生兮美自豐生得地兮美無終故雖敗於凉飆諒有嘉於前古方比契於松筠詎齊名於蘅杜且夫麗白雪之綺靡被長坂之芬敷激餘芳以孤映極幽致而自殊則在握者何有居澤者何無蘭處幽而轉芳芳無遠而不襲賢尚晦而必著著何道而不入伊哲人之素履盍徵蘭以自執苟馨香之發聞越江山而采拾炯貞元中進士元和中出為衡州刺史乾坤至誠草木無情神靈乘化而致理枯朽效祥而發生當聖澤未沾故兀然枯瘁及天光迴照遂藹爾敷榮因萬物以咸遂與百祥而畢呈故得垂陰瑣闥之中固本鳳池之側始孤標而穎拔乍苒弱而條直長充西掖之佳翫迥奪東門之秀色芬敷自異永垂不朽之名變化無常用表好生之德懿其荑生漸蔚榦聳惟條拂瑞景而增麗褭祥風而獨搖可以彰聖王之元感可以見昊天之孔昭舒卷以時陋梧桐之半死榮枯順理鄙松柏之後凋且春布發生之慶秋行肅殺之令於天地而不失其常在金木而各得其性眾皆畢出盡達我則向日而衰眾皆黃落萎腓我則感時而盛不然何以知至德之動天運神功而瑞聖者矣翠色牂牂異酒泉嘉柰之祥輕陰澹澹同鄱郡枯梓之感烟銷雨霽霏素雪於宸居日晏春深雜繁花於睿覽青翠葳蕤垂軒拂墀在日月偏臨之處當鴛鴦集苑之時至矣哉天降靈貺聖為明證既得地而不雜眾流常託根而獨標美稱知是天聽自人而應者也復貞元中歷官嶺南道節度使瓊州本隸廣府管內乾封中山洞草賊反叛都督李逸控馭失所遂致淪陷巳經一百餘年臣差判官監察御史姜孟京崖州刺史張少逸等悉力致討累經苦戰方克舊城便令降人開翦荊榛建立城柵屯集官軍臣竊觀瓊州控壓賊洞若移鎮軍在此必冀永絕姦謀伏望升為下都督府仍如瓊崖振儋萬安等五州招討遊奕使其崖州使額請停之愿汝南人元和中官兵部員外郎古人之文有旌物而為者歌功而為者詭時而為者感舊而為者旌物諡也歌功形也詭時詐也感舊情也若乃折裂金石騷牢鬼神莫尚乎感也予所作者其感舊耶客曰何謂也愿與百越節度使扶風馬公曩時俱為南海連率隴西李公復從事公詔移滑臺扶風公洎予又為幕下賓從容兩地七改星火今扶風公勳庸滿世文翰飛走續鎮南海作民父母而愿才貌單薄亦為刺史繇是二客雙鯉殷勤於楚越隴西短齡閱川而物故予感一也隴西先人諱齊物被大德嘗為竟陵郡守公生於守之日故名復嗚呼愿以散拙忝公先人之州往為子寮今刺父郡悲夫隴西也歌鍾燼滅於池館九原極零乎薤露其感二也愿頻歲與太子文學陸羽同佐公之幕兄呼之羽自傳竟陵人當時羽說竟陵風土之美無出吾國予今牧羽國憶羽之言不誣矣扶風公又悉於羽者也代謂羽之出處無宗祊之籍始自赤子洎乎冠歲為竟陵苾芻之所生活老奉其教如聲聞辟支以尊乎竺乾聖人也羽字鴻漸百氏之典學鋪在手掌天下賢士大夫半與之遊加以方口諤諤坐能諧謔世無奈何文行如軻所不至者貴位而已矣噫我州之左有覆釜之地圓似頂狀中立塔廟篁大如臂碧籠遺影蓋鴻漸之本師像也悲歟似頂之地楚篁繞塔塔中之僧羽事之僧塔前之竹羽種之竹視天僧影泥破竹枝筠老而羽亦終予作楚牧因來頂中道場白日無羽香火遐歎零落衣搖楚風其感三也是為三感說七言詩以語陳事扶風公覽三感之說豈得不酸涕濕目以著詞致於塔下冠愿鄙章之首邪行先德宗時人臣某言中使第五守進至伏奉今月日制命授臣開府儀同三司潞州大都督府司馬知府事充昭義軍節度營田澤潞邢洺等州觀察留後兼賜名虔休雨露湛恩光臨非次蚳蝝眇質負戴難勝臣某中謝臣出自行間器識麤淺理兵從眾問陣無師一心守愚六藝皆闕自謂才無經濟智乏周防吐誠託人損巳待物每日揣分有時撫膺徒生於此何以報主得免獲戾巳足為榮敢求聞達妄進階級豈意陛下顥元合德日月在躬敻開獨見之明特降發哀之詔拔自泥滓致於烟霄臣之榮幸孰與為比伏以虔休之義恭諮有章簡自帝心納於臣口自訟增感以榮為憂魄散心殞罔知所措况名器所慎春秋格言服之不稱詩人是刺雖欲勿議誰能捨諸曩日劉元佐之領浚郊李元諒之居關輔皆勳崇台揆業濟艱難方開加等之恩姑受錫名之寵臣何為者坐繼前人三省駑駘未展涓埃之效百身灰粉何酬天地之恩臣某言頃者元誼等擅固城池有違詔命臣出師野次持守經年以水攻圍俟其離變誓殲兇叛以靜方隅伏以陛下至德至仁好生惡殺恐失理死不忍誅夷特令中使就此招撫今洺州收復閭井獲安此皆天威光被神武底定顧惟愚陋載荷鴻私不勝感戴踊躍之至右中使某至伏奉敕書墨詔緣大禮後慰問臣及將士官吏等又緣近臘日便賜臣前件藥物臣謬履鈞衡守茲戎鎮星霜屢改渥澤逾深內悚外慙不知所措文明啟運殷薦告成郊廟展嚴禋之儀蒸黎洽時雍之化大宥五刑之典廣霑萬物之恩自天有慶與人更始臣名器俱忝宸睠曲臨節近嘉平恩延寵錫香膏凝潤於寶器上藥祕重於仙方澤變衰顏不知老之將至光生憊質空驚疾乃有瘳祗奉舊章式披新歷想天長而地久看日往而月來右中使某至伏奉手詔慰問臣及將士等又緣臘日賜臣口脂紅雪並新歷日等伏以蜡節嘉辰載於六籍皇恩隆洽賚及萬方金膏不祕於上清蘭澤遠傳於中禁加以元霜絳雪素能愈病析酲顧惟賤庸承此恩造隕越無地惶悚失圖縱知死所豈答元造載頒新歷永傳億萬斯年欣奉明時獲辨七十二候右中使某至伏奉手詔慰撫臣及將士等又賜臘日口脂并新歷日等伏以清祀嘉名載於前典實追歡之盛節亦和樂之良辰况天休光臨聖慈遐布顧臣賤陋竊奉明恩感戴周全不知所措蠲邪愈疾驗絳雪於仙方卻老駐顏覩瓊膏於寶器式頒聖歷仰贊皇猷永為四海之尊更續千齡之壽臣不勝歡躍右中使某至伏奉敕書手詔宣慰臣及將士等兼賜臣春衣等鴻恩濡澤忽降轅門霧縠冰紈猥加介冑臣等謬膺委使徒展寸誠曾無逐獸之功每懼伐檀之刺捧受祗慄不知所裁仰戴恩光將何上答彌憂不稱其服益用內愧於心右中使某至伏奉敕書手詔宣慰臣及將吏等又賜前件春衣臣等駑駘賤品介冑匹夫未彰塵露之功洊及雲雷之澤喜抃兢惕怳然失圖捧戴恩私不知所據以御府紈素耀晴景於三春天宮蘭麝襲回風於十步豈土木之質被服所宜雖灰粉其身上答何極右臣昨奏前件亭子及五龍院等伏望天恩賜額為寺於當府抽有道行僧二十七人住持修理為國崇福者伏奉敕旨允臣所奏賜額為貞元寺者特沐殊私俯遂愚懇采寶歷之二字開浮域之一名演皇劫無窮之期示蒼生迴向之路莫大之福實在於斯且上黨古郡先皇舊藩星辰曾降於謳謠符瑞見存於圖牒昔為磐石之地新作布金之園廣梵宇於域中資聖祚於天上闔境臣庶歡抃難勝臣忝列藩維戴荷何極臣某言伏承雲南㣥蠻率其類八國獻款歸附以某月日至於闕下臣伏惟皇帝陛下端拱九重高視千古聖謨廣運方昭不宰之功至德柔遠是有非常之慶不然者荒陬蠻貊左衽鳥言文軌未通嗜慾有異不知父子之性獨識皇王之恩此皆天誘其衷神助其請歸我龍德革彼狼心豈假渡瀘之師俄同兩階之舞夏啟之征有扈高宗之伐鬼方書之載籍適足慚恥臣限以守職藩維典茲戎旅不獲隨列稱賀抃舞丹墀之至右伏奉今月日墨詔令選擇馬軍三百騎隨中使赴唐州臣當時已具聞奏訖臣所管士馬常經校試蓄銳斯久惟忠益彰常持報國之心盡秉懷恩之分忽奉詔命頓生光輝豈意宸私俯察誠願三軍抃舞闔境歡呼並喻以勳忠形於感激雖慚數寡不愧眾多蔚為天討之師自假神威之福其器械軍容等並得鮮潔亦稍豐饒以今月十三日從鳳翔府隨中使進發訖臣職當護塞志切除奸不獲齒列諸軍身先士卒助銛鋒於破賊逆節斯摧俾寸燭以燎原焚枯可待臣無任憤悱踊躍之至良弼貞元間進士官左司郎中夫作德儲祉垂裕錫羨元運之符也以爵馭貴顯親昭孝國令之勸也然則道先於物者靈徵速功備於人者恩典異參厥命數考其慶端至哉太原茂業斯在矣公諱太一陽平臨清人也其先帝嚳高辛氏孫曰元元有功於唐堯封路中侯建德賜氏公即其後襲興圖紀才不虛世迨於隋也曾祖襄位至上儀同三司大長秋令文皇之建極大父文昇仕至左光祿大夫秦州刺史中宗之紹復烈考元哲官至并州榆次縣令惇忠淑亮異代同節公淵凝有志度合尋表心順性命體形格訓至道可鄰浮運可端造融理極得天地之全者也始年八歲丁尊夫人艱自然崩毀異日不食既孤無疑睦幼弟溫慈誘最息更氣時務於勸誡者每推於教本舉以誨人年十五讀老氏春秋精用所得不為虛學以先蔭補太廟齋郎歷衞益齊三州司功參軍思其官會其要雖決恆務有宏大猷所去之邦服其理尋擢授并州太原縣令故相國河東公張嘉貞時典此郡以公諫納今古風韻環朗嘗密謂所親曰雅道不隕今復見於斯人由是有要託始終不隔公禮之分矣其實為邑之政潔其性源異氣齊和土壤可信出處語默無非教焉及秩滿送歸之日老幼畢至瞻望嗟涕如去其親嗚呼運及世期靈歸化本春秋五十七於歸途逆旅遘疾而終時開元五年八月十三日也夫人滎陽鄭氏始州臨津縣令方喬之女禮部侍郎溫琦之妹清顯闕裔考明閨訓經理於內上則是宣故得叶議純賢誕昭後慶後公十載而沒以開元二十三年合祔於京兆府萬年縣少陵原從先塋禮也有子四人長曰兼之撫州司法參軍次曰梁客蘇州海鹽縣令次曰羽客鄭州別駕咸該蘊器藝殂命下位季子兵部尚書冀國公贈尚書右僕射嗣恭啟應前休挺傑宏表苞合文武為朝碩臣城朔方清嶺表乾綱立西北之柱坤位正東南之極夙敷惠術實德於人六專尚書再仗麾鉞於是建國命爵崇廟饗靈寶應初始贈公同州刺史夫人滎陽郡太夫人今聖踐祚遷贈左散騎常侍幽祿之恩照融上徹貴寵之位歷乎兩朝宏密之行光宣二詔且夫體仁居貞含德自保大道之宗也福流來允克昌大業積善之應也貂冠具服位光近列揚名之義也籩豆有序饗獻以時罔極之尊也備茲懿典其可已焉建中三年夏五月孝孫前祕書省著作郎應洎令弟懷州刺史恕前祕書省校書郎憑天釁崩心血哀過性楚瘵匍匐旌樹先塋式遵無念用彰不朽以良弼冀公幕府之舊見託書詞敢存實錄之紀以成尊祖之業其詞曰於惟太原貞表峩峩含為淵鑒發為中和大道有本至聖匪磨雖求其約竟獲其多齔歲執喪自然知毀友慈幼弟已外之已作則三語為天百里雅器虛融時髦所韙名全上德壽闕下寮後裔斯顯天監孔昭湛恩被壤宜運登朝一命五馬再榮八貂東南之原歷世封交重岡轉伏對闕蒼聳山色靡移松陰不動烈祖之碑孝孫所奉克構故懷澤縣主壻檢校右贊善大夫臣頃以國親超受寵祿及縣主薨逝臣官遂停臣陪位出身未授檢校官日自有本官伏乞宣付所司許取前銜婺州司戶參軍隨例詣選宇貞元中官侍御史天作淵極神將宅焉神者何靈化之真宰者也夫神之俶落實曰盬宗閭閻禱之不在祀典先皇朝有元老韓公滉之總邦賦以大鹹之功康濟是博上以供宗廟之費下以代田野之租升聞於天請加禮秩帝曰可於是冊為靈慶公俎豆之數視於淮濟享謁之期載在王府故及東都留守禮部尚書崔公縱頃知河中院以神之舊宮僻在幽阻既崇其禮宜敞厥居是用遷置於斯乃飭殿堂開像設面奫淪之積水跨邐迤之重岡陰陰森森容衞畢備立卒走壁儼然如生雖水府靈居未之若也今職方郎中兼侍御史馮公興纂其是職推置信讓無小無大報之以德頃以天久不雨慮失其歲職方於是齋心累辰親執牲帛將至誠之德告靈化之源嘗不朝而雨斯足如是者數四是則人有德於神神亦有德於人德交歸焉政是用長宜其建石表異徵文紀靈是以有太常博士崔君之頌也逮夫石自他山而至文自奉常而來知解縣池詹事府司直陸位事以道自集商以仁自來知安邑池大理評事韋縱財以清自豐吏以明自肅此二公者以為職方之精意可達於鬼神如之何不奉矣乃相與就其磨礱覆以棟宇自朔及朢揭焉而舉洪範曰潤下作鹹夫敘讚靈慶公陰潛之功亦所以表聖皇澤及於萬姓者也恐其頌或有闕乃命山客重紀於背陰貞元十三年七月二日記絪貞元二十年自水部員外郎除括州刺史元和元年徙湖州卒官去秋徂冬旱既甚矣分遣官吏徧禱山川爰及春旦大降甘雨草木滋茂萌芽甲坼我來茲山躬修臣職敬陳報禮應顯靈德友諒河南人容管經略使結從子至哉天王之盛德也若乃噓大海為川陸扇須彌為塵霧即藥父眾破修羅屬赫然天王示其威神也住水晶宮護閻浮界那吒捧塔以前峙天女持花以凝睇示其威福也懸鹿轤劍秉黃金㦸龍蛇鼓怒以騰目神鬼睚盱而捧足示其威力也天寶中表其神靈衞我唐土化身於于闐之國摧鋒於百萬之醜使聖聰無勍敵之虞士馬絕奔騰之患示其變通也汶川古塞戎馬之境山雄玉壘軍壯威戎有護國精舍凝翠峰謺甘涼泉湧創立天王殿一座其初也故使惠澄討論之寺主智昕繕成之社眾精肅崇構之兩變星霜方盡其美我兵馬使賀若崟雷霆在天威戢戎貊冠簡晶曜山川載清當其門闌布德之秋桃李成蹊之日副使彭城劉公命昌輔佐戎軍恆持妙略昔聞飛將今見輕車判官西河藺公弇風流倩倩文質彬彬阮元瑜書記之能王仲宣從軍之樂汶川縣令太原王公炅水鏡臨人清風偃草邑稱三異名慎四知都虞候及諸大將等弓張秋月劍落繁霜為蜀國之長城作轅門之巨塹社眾冉州守攝判官李建俌等風情廓落文武縱橫俱懷奉主之心共守安邊之術故能拔倫騰秀宏此聖猷曙起宵興率先勿替遂感祥光迭委靈氣薦臻十旬不愆貞質山立金冠照爛寶殿玲瓏山橫棟宇之奇花綻霧嵐之異祐我皇也弧弓不能壯其威表其神也靈怪不能藏其用寺主智昕俗姓湯氏梵行沈密道容真清勾當僧惠則俗姓李氏潔白虛衷秋潭月照俱能輔贊其美宏闡法梁巍峨之勳萬古不革之道也詞吏仗命敢碑斯文賁然德宗時人在昔帝軒之裔有控帶絕擁據㣥雄殆於萬斯年得茹茹之部謂名王盛族大人鴻冑聯華魏室接慶齊庭鐘鼎焜耀於數朝土田陪敦於烈辟自拓跋宇文氏降為著姓焉則公之先也公諱義忠本家雁門今為雁門人矣祖惠隋定州深澤縣丞父簡皇澤州永固府左果毅都尉莫不果行毓德修身踐言以北方之強為南金之寶英風雋列海內知名公特稟元和偏鍾間秀王褱貌傑出雄鋩挺生幼則知書長遂多藝知人能事靡不盡善有識一見即以遠大相期然而家傳崇榮業尚豪舉雖曰雅好博物終恥猶為腐儒未嘗不一心殉邊百死許國與孫吳而暗合以驃衞為巳任開元中以良家子戰功居右補涇州四門府別將策勳之授也久之秩滿六鈞伎癢七札賈餘歷試粉闈長驅金埒措杯入妙曾不出正相圃擇賢觀者如堵以武部試甲科改授河南府王屋府果毅加游擊將軍用絕倫也累遷汝州魯陽府折衝尋改虢州金門府折衝驟增武功級敘忠武將軍夫其策名委質積行累功祿以實干職無越請雖晉用之有次亦周行而未高至於幕有急賢司有渴理乍資規畫爭請於宏羊或藉詞華競留於阮瑀豈直軍形地勢聚米成圖抑亦國要時須立談集事是亦為政奚必褰帷之與綰墨歟但以公之德之才令聞令望執先府君先夫人之喪也二連之孝聞與上交下交之契也三益之信著在師旅有不可犯之色於鄉黨則謙似不能言寬猛得其中卷舒合夫禮可謂古之文武不墜斌斌君子者矣擁旗旄享茅土亦術內之事耳性頗樂道情兼慕閑每凝想於清高不致身於趨競僶俛芳歲蹉跎後時未展丹心徒嗟白髮命之不偶李廣寧遂於封侯生也有涯賈誼終傷於嘆鵩天寶元年蓋寢疾者浹日以六月十九日薨於京兆長安縣太和里之私第春秋八十嗚呼哀哉梁木壞乎將壇隳矣罷市無喻輟舂如何有才子三伯曰元顥皇易州遂城府左果毅仲曰元晃左羽林大將軍季曰元曜則今之驃騎大將軍行左羽林大將軍知軍事上柱國雁門郡王當斯時也靡不血泣無訴柴毀過人即以其七年七月十六日葬於京兆長安縣永平鄉阿房殿之墟禮也先是夫人陳留郡君謝氏贈沂國太夫人語成圖史動合禮容德重陶親賢過孟母然而當年桂歇早歲蘭摧石窌之封徒高薤露之悲終積於戲大業之後景系之餘間雖陵夷小不進用尋必福履大賢出焉故公以之陰步馬於身善積於物河瀆為之吐秀山嶽為之降靈挺然鬱然生夫驃騎矣皎若片玉粲如渾金明月照人干將立斷長才廣度茂績殊勳羽林應天上之星雁門封塞下之地公侯必復斯之謂歟若不然者則頃疑以凶釁次鍾伯早世克家紹構孑然一人而能敘終身之悲展罔極之痛二十年上有詔贈公為汾州刺史拜冊於先塋斯亦可謂事親之禮終哀榮之道備矣且陵或變谷海有為田滕椁未開防墓誰辨匪憑不朽之石曷傳無媿之詞爰訪墨卿以述銘曰秦殿南趾漢池東曲莽蒼開原蕭條古木吁嗟雁塞赫矣雄族昔也摐金茲焉埋玉鏌鎁徒挂大屈終藏日色不暖風枝自傷萬事颯而烟盡片石歸而天長庶德祖之來思無慚黃絹幸仲宣之見背不墜餘芳
