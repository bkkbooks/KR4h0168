front:
  text: 全唐文欽定全唐文卷五百四十一令狐楚三
  hash: sha256:1852a5f43e8cef22a00cc6d72cee854b778f5f89d729f42f68288213a54a0b90
body:
  text: 伏以江淮閒數年已來水旱疾疫凋傷頗甚愁歎未平今夏及秋稍較豐稔方須惠恤各使安存昨者忽奏榷茶實為蠧政蓋是王涯破滅將至怨怒合歸豈有令百姓移茶樹就官場中栽植摘茶葉於官場中造作有同兒戲不近人情方在恩權孰敢沮議朝班相顧而失色道路仄目而吞聲今宗社降靈奸凶盡戮聖明垂祐黎庶合安微臣伏蒙天恩兼領使務官銜之內猶帶此名俯仰若驚夙宵知愧伏乞特回聖聽下鑒愚誠速委宰臣除此使額緣軍國之用或闕山澤之利有遺許臣條疏續具聞奏採造將及妨廢為虞前月二十一日內殿奏對之次鄭覃與臣同陳論訖伏望聖慈早賜處分一依舊法不用新條唯納榷之時須節級加價商人轉賣必較稍貴即是錢出萬國利歸有司既無害茶商又不擾茶戶上以彰陛下愛人之德下以竭微臣憂國之心遠近傳聞必當感悅臣永惟際會受國深恩以祖以父皆蒙裦贈有弟有子並列班行全要領以從先人委體魄而事先帝此不自達誠為甚愚但以永去泉扃長辭雲陛更陳尸諫猶進瞽言雖號叫而不能豈誠明之敢忘今陛下春秋鼎盛寰海鏡清是修教化之初當復理平之始然自前年夏秋已來貶譴者至多誅戮者不少伏望普加鴻造稍霽皇威歿者昭洗以雲雷存者霑濡以雨露使五穀嘉熟兆人安康納臣將盡之苦言慰臣永蟄之幽魄右臣得進奏院狀報中和日伏蒙天恩賜臣男公敏內宴并賜前件綾羅三十匹銀碗一者臣伏以桃花始開蓂莢初吐陛下式崇佳節以慶仲春舞八卦於廣庭陳四詩於別殿道光在鎬義冠濟汾蓋所以勞徠勳賢昭明慈惠男公敏年方童幼智乏老成何殊一芥之微忽宴九天之上乳口而餐嘗鼎食青襟而陪列朝班越次之恩已深踰涯之賜仍及色絲成匹爛盈其箱篋白金為器皎映於杯盤澤流而九族皆榮信至而萬夫相慶生子如父無功則同知臣者君報德何日徘徊官次喜懼交并戎守有限不獲陳謝無任感恩結戀屏營之至右臣得男公敏狀今月十八日中使王希朝到院奉宣聖旨緣臣男患耳賜絹一百匹以充藥直并遣醫人劉江診療者臣自受國恩已更歲序其於功績絲髮未伸夙夜憂兢不知所處男公敏昨緣耳疾今赴上都素乏義方未能典謁豈意陛下惻隱之德俯加於纖芥敦睦之慈旁流於枝葉殊恩猥及渥澤曲臨特降醫工厚沾藥直雛犢之疾料即痊除君親之恩何可報效榮光燭於府舍喜氣溢乎閨門恩深命輕繼以感泣戎役有限未獲躬詣闕庭陳謝不勝感戴右臣得進奏官趙履溫狀報中使姚文嵩到院奉宣進旨賜臣男公敏冬至節料羊酒麵等伏以愚臣在邊賤等螻蟻弱子兼疾微如塵埃豈意陛下施惠必均推恩皆及屬登臺以望之日降其出如綸之言錫香醪而滿壺頒肥羜以盈几伏自惟念不勝所蒙一門驚莫大之榮百衆賀非常之慶未知報效空積慙惶日月高明照臣忠懇所守有限未獲躬詣闕庭陳謝不勝感戴戀結之至右臣得進奏院狀報前月二十九日中使某至奉宣進旨賜臣男公敏歲料羊酒麵等臣自領北藩於今五稔曾無明略以奉大猷孤直愚忠未足報陛下萬分之一男公敏伏緣醫療勒赴京都尚未平除爰逢歲節豈意翩蜎微物飛舞於東風靃靡輕生霑濡於春雨降少牢而頒賜中使以宣傳麵起玉塵酒含瓊液鼷鼠飲河之腹聞以滿盈老牛舐犢之心喜無終極深恩似海宏覆如天寧惟感激一門實亦光明九族何階報答終日慙惶空將許國之身誓竭在邊之力所守有限不獲陳謝無任感恩抃躍之至右臣得進奏院狀報二月二十九日中使某至奉宣進旨賜臣男公敏寒食節料羊酒麵等至二十一日中使某又宣賜麥粥餅餤者臣伏以天地之恩所加斯厚君臣之義有感則深臣自守近藩曾無薄效緣恩據義以月繫年男公敏未識憲章獲參班序每因令節又沐殊私頒首之羊委其全體擢芒之麥散以輕塵粥既擬於瓊膏餤有同於萍實出為寵錫皆申上帝之心食以充盈莫非小人之腹涓毫未展叨餮已頻常懷覆餗之憂有忝分甘之施苟仁之逮下微物敢讓於生成如澤或因臣瑣質何堪於負荷官守有限不獲陳謝無任感恩抃躍之至右臣得進奏院狀報今月九日中使李朝誠到院奉宣進旨賜前件節料麵肉等次十日中使徐智嚴奉宣聖旨又賜麥粥餅餤者寵榮便繁錫賚稠謺或陳於廊廡或貯在樽壺酒可駕車麵疑經市而况㞕杏實以為粥味甜於蜜卷牢肉以成餤規大於拳皆出御廚無非仙饌面牆之目未嘗窺見含糗之口忽此捧嘗恩逾涯分榮冠倫列在微臣而過幸日益憂兢念小子之何知無由答效身輕施重負荷難勝所守有限不獲陳謝無任抃躍之至右件將士中使朱孝誠監領某月日平安到太原其賞物并敕給付訖臣伏以受命以行人臣之節斯著及期而代君父之仁已深陛下愛育武夫綏懷猛士采薇遣戍既霈挾纊之恩出車勞旋又有分縑之澤才識家而兢入俄拜賜以嵩呼盡忘征役之勞固感生成之德况臣叨居將帥獲沐恩波所守有限不獲陳謝右臣得行營兵馬使李黯狀報伏蒙聖恩賜前件匹段設料者伏以懷生之類莫非王臣有事之時惟聽君命今者天誅小醜恩施㣥雄豈謂偏裨皆蒙賜賚需以飲食比肩而膚革充盈賁於束帛連袂而衣裳華楚空知飽德何以勝恩競堅摩壘之心爭竭拘原之力臣叨居將帥誓掃寇仇感戴屏營倍萬恆品右臣得兵馬使李黯狀伏蒙聖恩賜前件物等者伏以狂賊未平偏師在遠臣並全支器械厚給衣裝陛下念以戰爭矜其寒苦特頒星使猥降天波衣絮八蠶之帛丿糸暖如狐腋弓纏九牛之角徑若烏號頒及連營來從內府遙知被服皆不憚於兵鋒緬想操張悉將穿於虜骨歡聲感動勇氣蒸騰信山嶽之可移豈妖氛之足滅臣名叨將帥志掃寇讎沐恩澤而空深效勤勞而尚淺誓將忠懇以勵驍雄所守有限不獲陳謝右臣今月七日中使朱孝誠至伏奉詔書兼宣恩旨賜前件絁絹等臣伏以武夫之用職在防虞壯士之心樂從征役陛下仁慈廣被渥澤旁流諭以功名賜之帛丿糸帛荷殊私而東拜悉有兼衣賈餘勇而西行若無遠道同將日力共振天聲臣猥守藩隅叨居將帥欣榮感戴實百恆情右臣中使朱孝誠至伏奉詔命慰問臣并宣慰旨允臣所奏當使諸將官賜前件告身者寵命從天榮光溢路歡呼感戴皆不自勝臣素質懦愚叨居上將微誠空竭薄效未伸伏蒙陛下曲降天波俯加王澤華資清秩周及於百夫喜氣歡聲喧傳於一道家藏寶軸人受綸言三軍驚非次之榮萬井賀殊情之慶誓將苦節上答明恩謹准敕捧受分給訖臣與諸將等限以所守不獲詣闕陳謝無任抃躍之至右監軍李輔光回伏奉敕書手詔宣慰臣及參佐將校官吏等者臣竊位大藩連榮近屬戴山之力雖竭橫草之功未聞寢興以思憂愧若厲伏惟陛下日明於上子育其人降玉筯之天書遣銀璫之星使宸心照育下浹於將校慈旨丁寧旁霑於掾吏歡呼之聲雷動舞抃之袖雲翻榮光併臨愁疾如失不勝欣喜感戴之至右監軍使李輔光回伏奉敕書手詔慰問臣及將士等者臣自守大藩未伸微效每承渥澤實所慙惶今者伏蒙陛下宏覆幬之仁與天為大廣照臨之意如日斯升特遣王人復還使府捧絲綸之明詔光寵賤微吐汗漫之溫言霑濡㣥萃浮空而喜氣成霧動地而歡聲若雷空知受恩何以勝德所守有限不獲陳謝無任感戴之至右中使孟升進至伏奉口敕慰問臣及將士等臣素非公才叨總戎律清平無事績用未彰伏惟陛下子惠兆人天成萬物降星分之使宣綸出之言問以炎凉勉其勞役恩踰素望榮冠常倫跪聽歡呼衆心如一臣等不勝感戴之至右監軍使某回伏奉敕書手詔兼宣恩旨慰問臣及將士等伏以天地大鈞固無私於覆載豚魚微類皆有荷於生成臣實庸虛叨膺獎用至於師人輯睦封略乂安皆稟廟謀無非宸算豈意夭慈廣被聖眷旁流歸復監臨昭宣慰撫為膏之雨泛灑於編人如綍之言傳聞於列校歡生衆口感結㣥心同守節以戴天各輸忠而報國臣與將士等不勝感恩抃躍之至右某月日中使某至伏奉敕書手詔慰問臣及將士參佐等并賜臣官告旌節兼宣口敕授臣節制者臣伏以聖澤汪洋高卑盡滿皇明照耀微細不遺內愧瑣材上煩慈旨朝聞夕惕豈復遑寧夜思晝行不敢失墜今者三軍輯睦萬井歡康皆憑天威盡出宸算慙將孱劣虛受恩榮某月日已差衙官某奉表陳謝訖無任感戴之至右中使至伏奉某月日詔書令中使宣慰諸州刺史外鎮將士等令臣亦使人安撫者臣准詔差虞候張液隨中使某所在存問以某月日却到太原伏以設官分職邦國之恆規秉義納忠人臣之素分伏惟皇帝陛下嘉其奉上念以守邊降驛騎於九重諭天心於萬里法南風之長養豈擇卑微並白日之照臨不遺遐遠邊城將校井里黎人競鼓舞於皇明盡霑濡於聖澤室家相慶關塞無虞臣忝守戎旃無任欣抃之至右中使尹偕至伏奉手詔慰問臣等伏以聖澤均霑天光下燭欣榮感戴不勝自任臣生代未諧遭家不造嬰孩之日長養於外家童冠之年因依於伯姊容身寄食以至於今李說念臣以密親署臣以散職誓將裨補義不依違誠意莫申大期俄迫今者獲成安泰仰荷聖明豈期特降恩波深蒙慰撫昆蟲賤命不可以戴天葵藿微心空知其向日親疏共感存歿同榮無任感恩抃躍之至右今月十八日本道監軍使李某至奉宣口敕問臣所疾十九日中使張良祐至伏奉詔書賜臣烏藥蓼子各一合藥方兩紙并借供奉醫官兩人醫臣疾者臣素是凡庸猥當朝寄暫乖將息特軫聖慈綸出王言朝昏不絶星馳驛騎道路相望頒仙藥於雲中降神醫於天上仰承榮寵冀即痊平兢惶失圖感戴無地蒲柳之心猶壯誓竭丹誠狗馬之齒更長敢忘元造臣見准詔書與醫人商量服飲未及塗藥將息腫氣已退煩熱未定所守有限不獲陳謝無任感恩結戀之至右臣奏事官高榮朝回伏奉墨詔問臣所疾并奉宣口敕賜臣藥方者臣疲駑之質寒熱所侵仰憑天慈今日已損豈意猶煩睿想尚軫聖衷特降千金之方兼飛五色之詔榮光一燭愁疾如遺誓畢微生以酬殊造無任感戴之至右監軍使李輔光回奉宣口敕問所疾者臣頃因時旱疾以憂生仰蒙覆育尋就痊除伏以君恩過厚天聽至卑縷形於詞如撫以手顧慙微細特繫於宸衷內省疲羸尚關於睿想榮深益懼喜極而悲當望雙闕以注心守一隅而盡力不勝感結抃躍之至右中使王進卿至伏奉詔書慰問臣兼宣恩旨賜臣及諸將衣并百索銀器等者臣伏以夏之為仁實由乎長養王者所寶莫重於賢能故事將錫長年皆於今月因頒珍玩遐及庶方誠上帝之殊私信天朝之盛典臣才無所取政不足稱獲守司存已為尸忝豈意九天之慶賜每歲必來五日之祺祥無年不受衣裳霧疊詔旨雲繁篋中盈綵絲之索案上滿真金之器方圓通用紅紫交光命輕而服拜難勝身賤而鋪塵不稱以榮為懼當喜而憂終無補於成功空有慙於僭賞并准敕捧受兼分給諸將訖所守有限不獲陳謝右中使吳千金至伏奉敕書慰問臣并賜前件口脂臘脂紅雪紫雪各一合并歷日一卷等者伏以歲將更始節及嘉平陛下凝香為膏聚藥成散頒日月於歷上奮龍鸞於筆端星分九天之使雲布一日之澤此誠無私之殊造均養之深仁而臣空抱愚忠曾無方略一居藩鎮三度受恩朱奩忽開鮮膩與芳馨相雜素編既列閏餘將分至不差披尋而齒算延長塗傅而口容芳潤油雲之覆逾廣無以勝任帛丿糸地之封粗安未為報效捧受賞玩形神渙然無任感戴之至右中使董文萼至伏奉詔書慰問臣并宣恩旨賜臣前件物等者臣伏以天書垂露御歷頒年靈膏有瓊液之容仙散擬雪花之狀司天推步定分至於四時尚藥煎和辨君臣於百品無不關於睿想發自宸衷下錫勳烈之臣猶無過分幸霑庸微之質實所難勝况乏潤身之資欣蒙苦口之利謹當奉揚節候下告於萬人宣播光輝旁誇於九族殊私未答渥澤逾深夙夜寢興無任感戴右臣得男公敏狀稱伏奉恩旨賜歲節料麵兩石羊一腔酒五㪷口脂臘脂紅雪各一合者臣謬以庸虛叨塵任使陛下前因蠟日已降使臣既霑澤口之膏又賜雪煩之散一從捧受實未遑寧豈疲病小男復蒙寵錫酒漿口腹充溢於杯盤藥餌脂膏馨香於懷袖雖君父用賞延之義微細不遺而臣子非立功之人光輝斯極豈德澤之私於一物俾恩波之重若三山夙夜寢興以榮為懼戎守有限不獲陳謝無任感慶屏營之至右中使某至伏奉詔書宣賜前件物臣伏以衣服者身之文章尺寸者王之律度被於四體不衷則災考以二分無差為貴伏惟皇帝陛下陶蒸萬類軌物兆人每及新春皆頒上賞其或才堪國用智代天工福至而驚名成猶懼循省涯分比數藝能臣實無任纍承斯寵曳紫光於腰下稱佩黃金操素質於掌中如持白璧窺看耀日舉止生風誠聖主全覆育之仁顧微臣無秉持之力蒙恩過厚忍愧逾深終申一寸之功用答九重之賜欣榮感惕不勝自任右中使駱元榮至伏奉敕書手詔慰問臣等并賜臣春衣二副牙尺一枝軍將衣二十副者臣伏以行慶於下惟德所廣受賞於上無功則難臣實何人叨居重任履冰非懼食蘗為甘今者伏蒙陛下推漢后解衣之恩寵錫春服稽有虞審度之典榮頒象尺樂官考正無纍黍之差女御裁縫有奪朱之麗而况端平皎潔無慙七寶輕盈綷䌨不謝六銖此臣所以捧觀而似覩鈞衡服拜而如生羽翼謹便分散諸將傳示衆人感戴欣抃歡與臣同所守有限不獲拜謝無任欣躍之至右中使宋文璨至伏奉敕書手詔慰問臣及將士等并宣恩旨賜臣等前件冬衣者臣伏以爪牙之寄才實甚難衣裳之賜恩為至厚臣之器質無所任用誠不足以膺重寄而蒙厚恩今陛下陶以太和蓋其多闕及戒寒之月屬授衣之時喻比賢能頒宣慈惠跪聽清問欽承寵章宛是蠶帛丿糸爛如獸錦長皆被土貴實兼金分列校不辨鮮華在微臣最為重謺自承天澤不憚風威仰戴恩光有千鈞之重俯循功績無一縷之微空知竭誠難以勝德謹并捧受分給訖所守有限不獲陳謝無任感慶屏營之至右中使某至伏奉敕書手詔慰問臣及將士兼宣恩旨賜臣等前件冬衣者伏以綸綍之言出於天澤衣裳之受必以王功臣職在總戎任當平寇效無絲髮非聖主而豈容施若邱山在愚臣而將壓今者司寒肇至命服載新降自九霄來經千里錯鳥章於襟帶奮龍文於素箋兼並縟麗備極王褱奇木石之姿過蒙鮮飾冰霜之氣頓減嚴凝曳婁而賤質生光憤悱而懦心增勇終期薄效用答深恩謹准敕受兼分給諸將訖所守有限不獲陳謝無任感戴之至右中使吳千金至伏奉敕書手詔慰問臣及將士等并宣恩旨賜臣冬衣兩副及諸將衣二十副者臣守國之藩荷天之寵名聲績用未有可稱伏惟皇帝陛下仁育四方澤均㣥動當元律開冬之候念祁寒用事之初書詔交飛衣裘疊至墨盡龍蛇之妙綾兼龜鶴之奇服玩而衰殘有光拊循而孱懦增氣自臣而下萬口一聲臣並准敕分配訖不勝歡抃愧戀之至右監軍使李輔光回奉宣恩旨賜臣前件絹者臣當道比年未豐經費不足懼乏供億慙無智能陛下散燭幽之光垂逮下之德絲綸既出縑帛賁來數至纍千價盈巨萬廣狹中量鮮明如冰足以贍三軍之賜豫充百工之餼廩捧受欣抃不知所裁無任右臣先准敕撰成封進訖奉某月日敕旨敬依典禮無任號慕者伏以範天地之大者難為狀鐫金石之堅者難為工况先皇之武烈文明迥超前古而微臣之瞽言懵學不及中人顧惟庸虛謬獲紀述叨蒙恩獎特賜宣行竊文士之名誠有慙色彰聖人之德實荷經綸右中使王進卿至奉宣恩旨賜臣前件僧尼告身并院額等臣伏以有為功德莫大於化人無上菩提亦先於奉國臣以前因慶誕輒貢敷陳期降福於上天庶效祥於今古伏蒙陛下用至真之印轉不退之輪寵錫僧名榮頒院額仰窺金榜跪捧瑤緘龍翥四維鸞回三點憑大悲之力便至道場承上聖之仁必成菩薩光生十地歡動一方荷天眼之昭明願法身之清淨所守有限不獲陳謝無任欣戴之至右中使蘇明俊至奉宣聖旨賜臣巾襪香茶念珠袈裟等伏以推恩之義法雨露而必均受施之心戴邱山而不墜伏惟皇帝陛下為人心印得佛髻珠垂衣於空寂之門倒屣於清凉之境每因令月常降信臣輦珍寶於九天散芳馨於十地巾裁吳紵靡不輕盈帔衲齊紈無非麗密臣某等名非長者跡在凡夫既結襪以經行又焚香而宴坐啜楚山之新茗煩惱頓除持越海之名珠聖賢可數而煎和百品周遍萬僧覩奕葉以重光知分畦而謺慶豈大雄慈悲之力盡上帝福德之田誓當潔已禱天虔誠報國以無疆為聖壽以常樂為昌期長承覆護之仁永助清平之理限以修習不獲匍匐陳謝無任感戴之至右中使蘇明俊至奉宣聖旨賜前件袈裟蓮子念珠等物均散五臺山諸寺伏以稻畦可製降自九天蓮菂親規生於八水或光浮眼界或香滿鼻根豈意凡夫今蒙寵錫山積於樓臺之下無不莊嚴雲散於林嶺之中悉皆周遍咸承覆露孰不欣榮誓將傳印之功以助垂衣之慶謹并准敕分散訖無任感戴之至
