front:
  text: 全唐文欽定全唐文卷一百一帝姓朱氏諱晃初名溫宋州碭山人唐大中六年生初從黃巢尋降於河中節度使王重榮重榮表奏僖宗授左金吾衞大將軍賜名全忠天復元年封梁王天祐二年加相國改封魏王備九錫四年四月受唐禪改今名開平三年加尊號睿文聖武廣孝皇帝在位六年年六十一諡曰神武元聖孝皇帝廟號太祖
  hash: sha256:52b76f0192c1d1f011768d82525b89a6955779c95dfd7108639bb5ee503eb5b4
  markers:
  - {type: head, offset: 12, content: 梁太祖, id: KR4h0168_NFKB_101-h1, level: 1}
body:
  text: 王者創業興邦立名傳世必難知而示訓從易避以便人闕或稽其符命應彼開基之義垂諸象德之言爰考簡書求於往代周王昌發之號漢帝詢衍之文或崇一德以徽稱或為二名而更易先王令典布在縑緗寡人本名兼於二字且異帝王之號仍兼避易之難郡職縣官多須改換況宗廟不遷之業憲章百世之規事叶典儀豈憚革易寡人今改名晃是以天意雅符於明德日光顯契於瑞文昭融萬邦理斯在是庶順元穹之意永臻康濟之期宜令有司分告天地宗廟其舊名中外章䟽不得更有迴避王者受命於天光宅四海祗事上帝寵綏下民革故鼎新諒歷數而先定創業垂統知圖籙以無差神器所歸祥符合應是以三正互用五運相生前朝道消中原政散瞻烏莫定失鹿難追朕經緯風雷沐浴霜露四征七伐垂三十年糾合齊盟翼戴唐室隨山刊木罔憚胼胝投袂揮戈不遑寢處洎上穹之所賛知廣運之不興莫諧輔漢之謀徒罄事殷之禮唐主知英華已竭算祀有終釋龜鼎以如遺推劒紱而相授朕懼德弗嗣執謙允恭避駿命於南河眷清風於潁水而乃列嶽㣥后盈廷庶官東西南北之人斑白緇黃之衆謂朕功蓋上下澤被幽深宜應天以順時俾化家而為國拒彼億兆至於再三且曰七政已齊萬幾難曠勉遵令典爰正鴻名告天地神祇建宗廟社稷顧惟涼德曷副樂推慄若履冰懍如馭朽金行啟祚玉歷建元方宏經始之規宜布維新之令可改唐天祐四年為開平元年國號大梁書載虞賓斯為令範詩稱周客蓋有明文是用先封以禮後嗣宜以曹州濟陰之邑奉唐主封為濟陰王凡曰軌儀並遵故實姬庭多士比是殷臣楚國羣材終為晉用歷觀前載自有通規但遵故事之文勿替在公之效應是唐朝中外文武舊臣見任前資官爵一切仍舊凡百有位無易厥章陳力濟時盡瘁事我古者興王之地受命之邦集大勳有異庶方霑慶澤所宜加等故豐沛著啟祚之美穰鄧有建都之榮用壯鴻基且旌故里爰遵令典先示殊恩宜升汴州為開封府建名東都其東都改為西都仍廢京兆府為雍州佑國軍節度使集非常之事必有挺非常之才建第一之功必有居第一之位朕膺圖受命負扆開階未嘗以真太尉之官輕於擬議大司闕之職易於求蓋由其爵尊其任重不有英佐孰當異恩啟聖匡運同德功臣淮南鎮海鎮東等軍節度使淮南浙江東西等道管內觀察處置充淮南四面都統營田安撫兼兩浙鹽鐵制置發運等使開府儀同三司檢校太師兼中書令杭越等州大都督府長史上柱國吳越王食邑一萬五千戶實封一千戶錢鏐海岳騰英星雲誕秀契君臣咸一之德有文武兼備之才宣慈惠和忠正廉毅敦詩說禮樹百行於藩維去暴除奸敵萬人於帷幄弼予興運明乃嘉謨頃屬淮彞不賓王化自爾益封吳會兼鎮廣陵追擒每盡於隻輪覆溺連收其巨艦復聞奸宄屢擾巡封謂天蓋高若水可恃爾又橫戈憤悱獨力支吾妙運神機大殲戎醜元雲陣起雄風驅下瀨之師白露圍開沴氣散常州之化再安生聚重復土疆薛公之三策咸明漢主之一奇斯在況早攀鱗翼備見肺腸同德同心二紀密參於締構惟忠惟孝四方咸則於儀刑苟非劇恩何以加賞是用鏤於彞鼎冊以輅車擬呂望之尊崇正列侯之貴重仍加真食復寵兼官式是奬酬且旌忠烈於戲進以正大易所以經邦慎厥終格言用之居位勉思遵守克荷寵靈服予訓辭錫爾繁祉可守太尉加實封二百戶餘並如故左馮背叛元惡遁逃如聞相濟之徒多是脅從之輩若能迴心向國轉禍全身當與加恩必不問罪仍令同華雍等州切加招諭如能梟斬溫韜或以鎮寨歸化必加厚賞仍奬官班兼委本界招復人戶切加安存朝廷命使臣下奉行唯於辭見之儀合守敬恭之道近者凡差出使往復皆越常規或已辭而尚在本家或未見而先歸私第但從已便莫稟王程在禮敬而殊乖置典章而私舉宜令御史臺別具條流事件具黜罰等奏聞夫嚴祀報本所以通神明流澤覃休所以惠黎庶斯蓋邦家不易之道皇王自昔之規敢斁大猷茲惟古義粵朕受命於今三年何嘗不寅畏晨興焦勞夕惕師唐虞之典上則於乾功挹殷夏之源下涵於民極欲使萬方有裕六辨無愆然而志有所未孚理有所未達致奸宄作釁旱霪為災驕將守邊擁牙旗而背義積陰馭氣陵玉燭以干和載考休徵式昭至警朕是以仰高俯厚靡惜於責躬履薄臨淵冀昭於元覽兢兢慄慄夙夜匪寧及夫動干戈而必契靈誅陳犧粢而克章善應苟非天垂丕祐神賛殊休則安可致夷凶渠就不戰之功變沴戾氣作有年之慶況靈旗北指喪犬羊於亂轍之閒飛騎西臨下鄜翟若走丸之易息一隅之煙燧復千里之封疆而又掃蕩左馮討除峴首故得外戎內夏益知天命之攸歸喙息跂行共識皇基之永固仰懷昭應欲報無階爰因南至之辰親展圜丘之禮茲惟大慶必及下民乃宏渙汗之私以錫疲羸之幸所冀漸臻蘇息亟致和平噫朕自臨御已來歲時尚邇氛昏未殄討伐猶頻甲兵須議於餽糧飛輓頻勞於編戶事非獲已慮若納隍宜所在長吏倍切撫綏明加勉諭每官中抽差徭役禁猾吏廣歛貪求免至流散靡依凋弊不濟宜令河南府開封府及諸道觀察使切加鈐轄刺史縣令不得因緣賦歛分外擾人凡關庶獄每尚輕刑只纔罷用軍必當便議優給德音節文內有未該者宜令所司類例條件聞奏國之大事惟祀與戎祭法所標禮經猶重其齊心必至備物精臻方感召於神祇乃降通於福祐近者所司祠祭或聞官吏因循虛破支供動多虧闕致陰陽之失序仍水旱以為災每一念思實多凜若宜加提舉用復敬恭須委元臣以專重事自今後應在京四時大小祀及諸色祭祀並委宰臣貽矩專判躬親點無令怠墮有失典常自開創以來凡有赦書德音節文內皆委諸道搜訪賢良尚慮所在長吏未切薦揚其有卓犖不羈沈濳用晦負王霸之業蘊經濟之謀究古今刑政之源達禮樂質文之奧機籌可以制變經術可以辨疑一事軼羣一才拔俗並令招聘旋具奏聞然後試其所長待以不次所貴牢籠俊傑採摭英翹戎機方切國用未殷養兵須藉於賦租輓粟尚煩於力役所在長吏不得因緣徵發自務貪求苟有故違必行重典立法垂制詳刑定科傳之無窮守而勿失中書門下所奏新定格式律令已頒下中外各委所在長吏切務遵行盡革煩苛皆除枉濫用副哀矜之旨無違欽恤之言扈氏不恭固難去戰鬼方未服尚或勞師其蟻聚餘妖狐鳴醜類棄天常而拒命據地險以偷生言事討除將期戡定問罪止誅於元惡延災可憫於遺黎每念傷痍良深愧歎應天兵所至之地宜令將帥節級嚴戒軍伍不得焚燒廬舍開發邱壠毀廢農桑驅掠士女使其背叛之俗知予弔伐之心兩漢已來日蝕地震百官各上封事指陳得失蓋欲周知時病盡達物情用緝國章以奉天誡朕每思逆耳罔忌觸鱗將洽政經庶開言路況茲謫見當有咎徵其在列辟羣臣危言正諫極萬邦之利害致六合之殷昌毗予一人永建皇極懷州刺史段明遠少年治郡庶事惟公兩度祗奉行鑾數程宿食本界動無遺闕舉必周豐蓋能罄竭於家財務在顯酬夫明奬觀明遠之忠勤若此見思安之悖慢何如闕前朝官寮譴逐南荒積年未經昭雪其閒有懷抱材器為時所嫉者深負冤抑仍令錄其名姓盡復官資兼告諭諸道令津致赴闕如已亡歿並許歸葬以明恩蕩朝廷之儀封冊為重用報勳烈以隆恩榮固合親臨式光典禮彞章久缺自我復行今後每封冊大臣宜令有司備臨軒之禮稱朕意焉潞寇未平王師在野攻戰之勢難緩於寇圍飛輓之勤實勞於人力永言輟耒深用軫懷宜令長吏丁寧布告期以兵罷之日給復賦租令下諸州去年有蝗蟲下子處蓋前冬無雪今春亢陽致為災沴實傷隴畝必慮今秋重困稼穡自知多在荒陂榛蕪之內所在長吏各須分配地界精加翦撲以絕根本邇者下民喪禮法吏舞文銓衡既失於選求州鎮又無其舉刺風俗未厚獄訟實繁職此之繇上貽天譴敦尚儉素抑有前聞斥去浮華期臻至理如聞近日貢奉競務奢淫或奇巧蕩心或雕鐫溢目徒殫資用有費工庸此後應諸道進獻不得以金寶裝飾戈甲劒㦸至於鞍勒不用塗金及雕刻龍鳳如有此色所司不得引進車服以庸古之制也貴賤無別罪莫大焉應內外將相許以銀飾鞍勒其刺史都將內諸司使以降祗取用銅冀定尊卑永為條制仍令執法官糾察之祀典之禮有國之大事也如聞官吏慢於展敬禮容牲饌有異精虔宜令御史䟽其條件以聞秩俸所以養賢而勵奉公也兵車未戢貢賦莫充朝謁甚勤祿廩蓋寡朕今啟建都市已畢郊禋職采至多費用差少其百官逐月俸料委左藏庫依前例全給朕自膺眷佑勉副樂推三載於茲多難未弭但蒙靈貺每竊休徵致稼穡之有年乃陰陽之克敘昨者以災興右地叛結左馮連邠鳳之凶狂據關河之險固王師纔進逆黨生擒寸刃未施重門盡啟以致元凶自遁遺壘皆降賊除不出於浹旬兵罷匪踰於一月而況時當炎暑路涉惡山風迎馬以納涼雲隨車而不雨功因捷速役免滯留非眇質之敢當賴上元之垂祐合申告謝用表精虔宜令所司擇日親拜郊祀封岳告功前王重事祭天肆覲有國常規朕自以眇身恭臨大寶既功德未敷於天下而災祥互降於域中慮於告謝之儀有闕齋虔之禮宜修昭報用契幽通宜令中書侍郎同平章事于兢往東岳祭拜禱祀訖聞奏追養以祿王者推歸厚之恩欲靜而風人子抱終身之感其以刑部尚書致仕張策及三品四品常參官二十二人先世各追贈一等劉知俊貴為方伯尊極郡王而乃背誕朝恩竄投賊壘固人神之共怒諒天地所不容雖命討除尚稽擒戮宜懸爵賞以大功名必有忠貞咸思憤發有生擒劉知俊者賞錢千萬授節度使首級次之得孟審登者錢百萬除刺史得都將孫坑卓王褱劉儒張隣等賞賜有差奇邪亂正假偽奪真既刑典之不容宜犯違而勿赦應東西兩京及諸道州府制造假犀玉珍珠腰帶璧珥并諸色售用等一切禁斷不得輒更造作如公私人家先已有者所在送納長吏對面毀棄如行勅後有人故違必當極法仍委所在州府差人察收捕明行處斷朕聞歷代帝王首推堯舜為人父母孰比禹湯睿謀高出於古先聖德普聞於天下尚或卑躬待士屈己求賢俯仰星雲慮一民之遺逸網羅巖穴恐片善之韜藏延爵祿以徵求設丹青而訪召使其為政樂在進賢蓋繇國有萬機朝稱百揆非才不治得士則昌自朕光宅中區迄今三載宵分輟寐日旰忘餐思共力於廟謀庶永清於王道而乃朝廷之內或未盡於昌言軍旅之閒亦罕聞於奇策眷言方岳下及山林豈無英奇副我延佇諸道都督觀察防禦使等或勳高翊世或才號知人必於塗巷之賢備察芻蕘之士詔到可精搜郡邑博訪賢良喻之以千載一時約之以高官美秩諒無求備唯在得人如有卓犖不羈沈濳自負通霸王之上略達文武之大綱究古今刑政之源識禮樂質文之變朕則待之不次委以非常用佐經綸豈勞階級如或一言拔俗一事出羣亦當舍短從長隨才授任大小方圓之器寧限九流溫良恭儉之人難誣十室勉思薦舉勿至因循俟爾發揚慰予翹渴仍從別勅處分自朔至今暴風未息諒惟不德致此咎徵皇天動威罔敢不懼宜徧命祈禱副朕意焉關防者所以譏異服察異言也況天下未息兵民多姦改形易衣覘我戎事比者有諜皆以詐敗而未嘗罪所過地叛將逃卒竊其妻孥而影附使者亦未嘗詰其所經今海內未同而緩法弛禁非所以息姦詐止奔亡也應在京諸司不得擅給公驗如有出外須執憑繇者其司門過所先須經中書門下點宜委宰臣趙光逢專判出給俾繇顯重冀絕姦源仍下兩京河陽及六軍諸衞御史臺各加鈐轄公私行李復不得帶挾家口向西其襄鄧鄜延等道並同處分滑宋輝亳等州水澇敗傷人戶愁歎朕為民父母良用痛心其令本州各等級賑貸所在長吏監臨周給務令存濟邠岐未滅關隴多虞宜擇親賢總茲戎重應關西同雍華鄜延夏等六道兵馬并委冀王收管指揮凡有抽差先申西面都招討使仍別奏聞庶合機權以寧邊鄙常山背義易水效尤誘其蕃戎動我邊鄙南侵相魏東出邢洺是用遣將徂征為人除害但初頒赦令不欲食言宥而伐之諒非獲巳況聞謀始不自帥臣致此厲階並繇姦佞密通人使濳結犬戎既懼罪誅乃生離叛今雖行討伐巳舉師徒亦開招諭之門不阻歸降之路矧又王鎔處直未曾削爵除名若翻然改圖不遠而復必仍舊貫當保前功如有率衆向明拔州效順亦行殊賞冀徇來情免令受弊於疲民用示惟新於汚俗宜令行營都招討使及陳暉軍前準此勅文散加招諭將安衆懼特舉明恩鎮州只罪李宏規一人其餘一切不問胡規比緣微效遂委劇權不能禁戢諸軍而敢侵淩百姓輒生狂計欲起亂階備見包藏何堪委用從來凶逆已露鋒鋩此際侮輕足量肝膽苟無極斷慮掇後艱胡規并男義方委宗奭準軍令處置其婦女任從所適都指揮使韓勍已下一十二人罰俸有差夫興隆邦國必本於人民惠養疲羸允資於令長苟選求之踰濫固撫理之乖違如聞吏部擬官中書除授或緣親舊所請或為勢要所干姑徇私情靡求才實念茲蠧弊宜舉條章自今以後應中書用人及吏部注擬並宜省藩身之才業騐為政之否臧必有可觀方可任用如或尚行請託猶假貨財其所司人吏等必當推窮重加懲斷有司官長別有處分生育之人爰當暑月乳哺之愛方及薰風儻肆意於刲屠豈推恩於長養俾無殄暴以助發生宜令兩京及諸州府夏季內禁斷屠宰及採捕天民之窮諒由賦分國章所載亦務興仁所在鰥寡孤獨廢疾不濟者委長吏量加賑卹史載葬枯用彰軫惻禮稱掩骼將致和平應兵戈之地有暴露骸骨委所在長吏差人專功收瘞國癘之文尚標七祀良藥之效亦載三醫用憐無告之人宜徵有喜之術凡有疫之處委長吏尋醫方於要路曉示如有家無骨肉兼困窮不濟者即仰長吏差醫給藥救療之亢陽滋甚農事已傷宜令宰臣于兢赴中嶽杜曉赴西嶽精切祈禱其近京靈廟宜委河南尹五帝壇風師雨師九宮貴神委中書各差官祈之共理庶民是資牧宰克勤厥職必選端良儻徇私以滅公則興災而歛怨豈遵條教實蠧風猷其所在長吏不得因緣差役分外誅求律令所施典刑具在寧容殘忍合務哀矜宜令所在長吏不得淫刑酷法須臻有道免致無辜謗木求規集囊貢事將裨理道豈限側言應內外文武百官及草澤並許上封事極言得失建國稱都俾新其制況山河之險表裏為訪今二京俱在關東以內仍以潼關隷陝州近年文武官諸道奉使皆於所在分外停住踰年涉歲未聞歸闕非唯勞費州郡抑且侮慢國經臣節既虧憲章安在自今後兩浙福建廣州安南邕容等道使到發許住一月湖南洪鄂黔桂許住二十日荊襄同雍鎮定青滄許住十日其餘側近不過三五日凡來往道路據遠近里數許日行兩驛如遇疾患及江河阻隔委所在長吏具事由奏聞如或有違當行朝典命御史點糾察以儆慢官勅鎮東軍牆隍神龎玉前朝名將劇郡良材頃因剖竹之辰實有披榛之績剏修府署綏輯吏民豈獨遺愛在人抑亦垂名終古況錢鏐任隆三鎮功顯十臣能求福而不回致效靈而必應願加懿號以表冥符宜旌岌嶪之功用顯優隆之澤宜賜號崇福侯仍付所司牒至準勅者近年以來風俗未泰兵革且繁正月燃燈廢停已久今屬創開鴻業初建洛都方在上春務達陽氣宜以正月十四十五十六日夜開坊市門一任公私燃燈祈福自升州作府建邑為都未廣邦圻頗虧國體其以滑州酸棗縣長垣縣鄭州中牟縣陽武縣宋州襄邑縣曹州戴邑縣許州扶溝縣鄢陵縣陳州太康縣等九縣宜並割屬開封府仍升為畿縣豐沛之基寢園所在悽愴動關於情理充奉自繫於國章宜設陵臺兼升縣望其輝州碭山縣宜為赤縣仍以本縣令兼四陵臺令劉知浣逆黨之中最為頭角龍虎軍親兵之內實冠爪牙昨者攻取潼關率先用命尋則擒獲知浣最上立功頗壯軍威將除國難所懸賞格便可支分許賜官階固須除授但昨捉獲劉知浣是張溫等二十二人一時向前共立功效其賞錢一千貫文數內一百貫文與最先打倒劉知浣衙官李稠四十三貫文與十將張溫二十人各與錢四十二貫八百五十文立功勅命便授郡府亦緣同時立功人數不少所除刺史難議偏頗宜令逐月共支給正刺史料錢二百貫文數內十將張溫一人每月與十貫文餘二十一人每月每人各分九貫文仍起七月一日以後支給人與轉官職仍勘名銜分析申奏當與施行大內皇牆使諸門素來未得嚴謹將令整肅須示條章宜令控鶴指揮應於諸門各添差控鶴官兩人守帖把門其諸司使并諸司諸色人等並勒於左右銀臺門外下馬不得將領行官一人輒入門裏其逐日諸道奉進客省使於千秋門外排當訖勒控鶴官舁撎至內門前準例令黃門殿直以下舁進輒不得令諸色一人到千秋門內其興善門仍令長官關鏁不用逐日開閉皇牆大內本尚深嚴宮禁諸門豈宜輕易未當條制交下因循苟出入之無常且公私之不便須加鈐轄用戒門閭宜令宣徽院使等切準此處分
