  text: 全唐文欽定全唐文卷四百四十七臮字靈長扶風人建中時官范陽功曹檢校戶部員外郎汴宋節度參謀
  hash: sha256:f8541315d60c87818b9e5fd1c032c8f932098d505d2a1e0e0a3eaa9529d6a505
  markers:
  - {type: head, offset: 14, content: 竇臮, id: KR4h0168_NFKB_447-h1, level: 1}
body:
  text: 古者造書契代結繩初假達情浸乎競美自時厥後迭代沿革朴散務繁源流遂廣漸備楷法區別妍媸洎於我唐天寶末國有寇難府庫傾覆散墜閭閻而興復京都所司徵購得其歸者蓋寡矣余至德中往往偶見祛積年之遐想駭此生之新觀雖欣鄙夫之幸遇實為吾君之痛惜恨沈草莽上達無階因記彼而固求願沽諸而善價然為監臨動靜公私貿遷徒暫披玩終歸他室今記前後所親見者并今朝自武德以來迄於乾元之始翰墨之妙可入品流者咸備書之周一人史籀秦一人李斯漢二人蔡雍杜操魏五人韋誕虞松司馬師司馬昭鍾會吳二人皇象賀劭晉六十三人齊獻王元帝成帝康帝孝武帝武陵王會稽王楊肇山濤嵇康張翰蔡充顧榮劉琨孔侃孔瑜陶侃熊遠應詹卞壼劉超謝藻庾亮庾懌庾翼庾準郗鑒郗愔郗曇郗超郗儉之郗恢謝尚謝奕謝安王導王劭王珉王羲之王獻之王廞王濛王述丁潭何充劉訥劉炎張澄劉璞張翼桓溫桓元江灌沈嘉劉王褱之劉廞范汪范寧諸葛長民劉穆之溫放之楊羲宋土廷宋二十五人武帝文帝孝武帝明帝南平王海陵王謝靈運謝方明張茂度張永羊欣孔琳之薄紹之王敬宏王思元顏峻桓護之駱蕭思話龎秀之巢尚之裴松之徐爰江僧安賀道力齊十五人齊高帝武帝竟陵王禇淵禇賁徐孝嗣王僧虔王慈王志王儉劉撝顧寶光胡楷之徐希秀張融梁二十一人武帝簡文帝邵陵王孝元帝蕭確蕭子雲王克陸杲任昉傅昭朱异王籍殷鈞阮研王裦蕭特庾肩吾陶宏景江蒨周宏讓范懷約陳二十一人武帝文帝煬帝沈后新蔡王廬陵王永陽王桂陽王釋智永智果江總徐陵沈君理袁憲毛喜蔡景歷蔡徵顧野王伏知道謝嘏賀朗北齊一人外五代祖劉珉隋五人劉元平房彥謙盧昌衡趙文深趙孝逸唐四十七人神堯皇帝文武聖皇帝則天武后睿宗開元皇帝漢王元昌岐王元範李懷琳歐陽詢歐陽通虞世南虞纂虞煥禇遂良陸柬之薛稷房元齡殷仲容王知敬王紹宗孫過庭張旭賀知章徐嶠之徐浩李造韓擇木田琦衛包蔡有鄰鄭遷李權李樞李平鈞王維王縉史惟則李陽冰家舅繪姨兄明若山宋儋李璆蕭誠張從申呂向長兄蒙馬氏妻劉秦姝等應親見者所言並錯綜優劣直道公論或理盡名言即外假興喻雖闕標舊品而畢寄斯文刊訛誤於形聲定目存於指掌其所不覩空居名額并世所傳搨者不敢憑推一皆略焉其辭曰嘗考古而閲史病賤目而貴耳述勳庸而任人揮翰墨而由已則知親矚延想如見君子量風雅之足憑奚卷舒之能已古猶今也斯得美矣雖六藝之末曰書而四人之首曰士書資士以為用士假書而有始豈特長光價於一朝適容貌於千里王羲之書蕺山姥六角扇五字字索百錢人競買去梁元帝書亦云千里之面首轉覺為能矣篆則周史籀秦李斯漢蔡雍當代稱之俱遺芳刻石永播清規籀之狀也若生動而神憑通自然而無涯遠則虹紳結絡邇則瓊樹離披斯之法也驅妙思而變古立後學之宗祖如殘雪滴溜映朱檻而垂冰蔓木含芳貫緑林以直繩伯喈三體八分二篆棨㦸彎弧星流電轉纎逾植髮峻極層巘周秦漢之三賢余目驗之所先石雖貞而云亡紙可寄而保傳史籀周宣王時史官著大篆教學童岐州雍城南有周宣王獵碣十枚並作鼓形上有篆文今見打本吏部侍郎蘇勗敘記卷首云世咸言筆蹟存者李斯最古不知史籀之迹近在關中即其文也李斯上蔡人終秦丞相作小篆書嶧山碑後其石毀失土人刻木代之與斯石上本差稀又至德中安史敗後四從弟沼于河陽清水渠下得傳國璽其文曰受命于天既壽永昌點畫皆隱起作龍鳥狀側文小篆曰魏所受漢傳國璽背上蟠螭一角折鼻尖有黃疵瑕按驗譜牒乃無差舛云斯所書蔡雍字伯喈陳留人終後漢左中郎將今見打本三體石經四紙石既尋毀其本最稀惟稜雋及光和等碑時時可見草分章體肇起伯度時君重而立名自我行而作故掣波循利創質畜怒杜操字伯度京兆人終後漢齊相章帝貴其蹟詔上章表故號章草今見章草書五行魏之仲將奮藻獨步或迸泉湧溢或錯玉班賦蹟遺情忘契入神悟然而負才藝履危懼膏明自煎鬢髮改素生非其代痛惜不遇名微格高復見叔茂體裁約肌骨豐嫮如空凝斷雲水泛連鷺韋誕字仲將京兆人終魏光祿大夫時凌雲臺成先誤釘榜明帝使誕坐籠以鹿盧引上就書去地二十五丈及下鬢髮皓然虞松字叔茂會稽人終魏中書令大司農今見隸紙草書具姓名一紙十一行也挹子元之王褱蹟高子上之雄神量蘊文儒才苞古真或寄詞達禮任道懷仁或仰則鍾繇平視衛臻如晴郊駟馬維嶽降神司馬師字子元河內人終魏録尚書事大司馬忠武公及炎受禪追尊曰景皇帝今見正書帶名一紙一十二行弟昭字子上終魏相國録尚書事封文王追尊文皇帝今見正書具姓名兩紙共一十二行觀士季之軌轍審鍾家之超越將遺古而偕能與象賢而蹈拙如後生之可畏實氣蓋於前哲鍾會字士季潁川人繇子終魏征西將軍今見帶名行書一紙八字吳則廣陵休明朴質古情難以窮真非可學成似龍蠖蟄啓伸盤復行皇象字休明廣陵人終侍中吳青州刺史今見帶名章草帖表七行并寫春秋哀公上第二十九卷首元年餘自二年至十三年盡尾足其紙每一大幅有一縫線聯合之六元凱押尾云此是繭紙緊薄有脈似樺皮以諸繭比類殊有異者也賀氏興伯同時共體瘠而不疏逸而寡禮等殊皇賀品類兄弟賀劭字興伯吳興人終吳太子太傅見章草書帶名一帖五行司馬氏之受禪炎為帝祖偉哉齊王手蹟目覩翰墨之外仁賢是優重則突兀嵩華輕則參差斗牛司馬攸字大猷文帝第二子武帝弟封齊獻王官至侍中大司馬今見正書帶名凡四段共三紙書有痛惜羊祜之言晉姓司馬國犯先諱不言晉也逮乎龍化東遷景文興嗣天然俊傑毫翰英異元帝之用筆可觀世瑜之呈規仰似如發硎刃虎駭鶚眙懦夫喪精劍客得志元帝諱睿字景文東朝中興之主當東遷謠曰五馬浮渡江一馬化為龍即其人也今見潛潤正書具姓名一紙七行兼雜批約有十處成帝則生知草意穎悟通諳光使畏魄青疑過藍徑力外爽古風內含若雲開而乍覩晴日泉落而懸歸碧潭成帝諱衍字世祿元帝孫明帝子庾氏內今見草批謝草張澄啓七行康帝則幼少間慢迥出凡境駟馬安車不尚馳騁康帝諱嶽字世同成帝弟今見行書批劉訥啓四紙共七行真率孝武不規不矩氣有餘高體無所主若露滋蔓草風送驟雨孝武帝諱曜字昌明簡文子今見行書一紙又兩帖等雜批六處共有二十一行也赳赳道叔遠淳邇俗全姓名而孰多議風度而不足元子憚其威武吾徒遵其軌躅武陵王晞字道叔明帝弟今見具姓名正書一紙三行道子雅薄帛丿糸密纎潤露輕藏沈假曲躡峻猶尺水之含衆象小山之擬萬仞會稽王道子孝武帝子今見具姓名行書一紙凡七行季初則隱姓名展纎徑寫搨共傳賞能之盛猶踞牙鉤爪超越陷穽楊肇字季初滎陽人晉荊州剌史今見草書一紙十行有古署榜無姓名今共傳搨之巨源正書朴略仍餘染翰忘筌寄情得魚若披堅草澤匿鋭茅廬山濤字巨源河內人晉侍中司徒今見正書帶名一帖四行叔夜才高心在幽憤允文允武令望令聞精光照人氣格凌雲力舉巨石芳逾衆芬嵇康字叔夜譙國人晉中散大夫今見帶名行書一紙五行季鷹有聲古貌磅礡雖無名驗攀附張索芝靖如凝陰斷雲垂翅一鶚張翰字季鷹吳郡人晉大司馬掾今見草書一帖三行有古榜名滿騫押尾子尼約片月孤峰千歲之下森森古容蔡充字子尼陳郡人晉成都王掾子謨過江食蟹遇毒者本朝尚書僕射見帶名草書一帖四行彥先尚質無而不有猶崆峒之上世俗誰偶顧榮字彥先吳郡人晉驃騎將軍今見草書帶名三帖共有一十二行越石偉度粃糠翰墨如伐樹而愛人似問鼎而在德劉琨字越石中山人晉太尉今見行書半紙具姓名五行敬思敬康二孔殊芳思行則輕利峭峻類驚虯逸駿康草則古質鬱紆如落翮摧枯孔侃字敬思會稽人晉大司農今見具姓名行書一紙七行孔瑜字敬康會稽人車騎將軍今見具姓名一紙三行雍容士行季孟公旅肌骨閒媚精神慢舉如辭山登朝混迹雜處陶侃字士行秣陵人晉侍中大將軍今見帶名正書一紙十行孝文剛斷謹正援毫古雖拙利今稱且高如貴胄之躍駿武賁之操刀熊遠字孝文豫章人晉大將軍長史今見具姓名正書啓七紙思遠則藁草懸解筆墨無在真率天然忘情罕逮猶㣥雀之飛廣厦小魚之戲大海應詹字思遠汝南人晉鎮南大將軍今見草表帶名二紙共一十七行望之之草緊古而老落紙筋盤分行羽抱如充牣多士交連雜寶卞壼字望之濟陰人晉侍中驃騎大將軍今見帶名草書一紙共六行體大法殊實推世踰稟天然而自強亂帝札而見拘猶朝廷宿舊年德相趨劉超字世踰琅琊人晉衛尉零陵忠侯今見帶名正書一帖三行超手筆與元帝相類自職居近密遂絶其與外人所交之書也叔文法鍾纎薄精練用筆雖巧結字未善似漸陸之遵鴻等窺巢之乳燕謝藻字叔文會稽人晉中書侍郎今見具姓名正書啓兩段合為一紙五行其半先在官半在外及得之勘合如一得新故異也博哉四庾茂矣六郗三謝之盛八王之奇至如強骨慢轉逸足難追斷蓬征蔓葛垂任縱盤薄是稱元規庾亮字元規潁川人晉太尉今見草書五紙行帖共八行具姓名草書又一縱十一行遺古效鍾叔豫高蹤雖穩密而傷浮淺猶葉公之愛畫龍庾懌字叔豫潁川人晉衛將軍今見正行書帶名一紙四行積薪之美更覽稚恭名齊逸少墨妙所宗善草則鷹搏隼擊工正則劍鍔刀鋒愧時譽之未盡覺知音而罕逢其荒蕪快利彥祖為容似較狡兔於大野任平坡之所從庾翼字稚恭晉車騎將軍今見草書四紙共二十六行具姓名正書一帖三行懌與翼並是亮弟庾準字彥祖希子亮孫晉豫州刺史今見具姓名草書一紙凡八行道徽之豐茂宏麗下筆而剛決不滯揮翰墨而厚實深沈等漁父之乘流鼓枻高平奕葉盛德遺能方回重熙接翼嗣興回則章健草逸發骩廉稜若冰釋泉湧雲奔龍騰密壯奇姿撫蹟重熙若投石拔距怒目揚睂景興當年曷云世乏正草輕利脫略古法蹟因心而謂何為吏士之所多惜森然之俊爽嗟薎爾於中和處約道允家之後俊狂草勢而兄優謹正書而弟潤俱始登於學次慙一虧於九仞郗鑒字道徽高平人也晉太宰今見草書三紙共十七行郗愔字方回曇字重熙並鑒子愔晉司空見章草書寫父雜表一首四十三行草書八紙曇晉中郎將今見具姓名草書一紙四行郗超字景興愔子晉臨海太守今見具姓名行草書共四紙郗儉之字處約晉太子率更令今見具姓名草書兩紙郗恢字道允晉鎮軍將軍今見具姓名草書及行書共兩紙處約道允並是曇子謝氏三昆尚草特峻猶注飛㵎之瀑溜投全牛之虛刃達士逸蹟乃推無奕毫翰云為任興所適能事雅量末歸安石至夫蘊虛靜善草正方圓自窮禮法拘性猶恆德之仁智應物之龜鏡恨其心懼景興書輕子敬塞盟津而捧土損智力有餘病謝尚宇仁祖陳郡人晉散騎常侍今見具姓名草書一紙六行謝奕字無奕晉鎮西將軍今見帶名行書一紙六行謝安字安石尚弟晉侍中太傅今見具姓名正書二紙三十行安得獻之書時斷作紙夾焉業盛琅琊茂宏厥初衆能之一乃草其書將以潤色前範遺芳後車風稜載蓄高利有餘類賈勇之武士等相驚之戲魚有子敬倫蹟存目驗以古窺今調涉浮艷尚期羽翼鴻漸芝蘭香染與兄搨而弟真將奢也而寧儉繩繩宜爾傑出季炎露鋒芒而豁懷傍禮樂而無檢猶摶扶搖而坐致超峻極而非險王導字茂宏琅琊人晉丞相諡曰文獻公今見具姓名草書兩紙共六行王劭字敬倫即導子晉車騎將軍今見具姓名草書一紙六行兄即恬洽不見真蹟洽子珉字季炎晉中書令今見具姓名草書一紙凡八行然則窮極奧旨逸少之始虎變而百獸跧風加而衆草靡肯綮遊刃神明合理雖興酣蘭亭墨仰池水武未盡善韶乃盡美猶以為登泰山之崇高知㣥阜之迤邐逮乎作程昭彰裦貶無方穠不短纎不長信古今之獨立豈末學而能揚幼子子敬創草破正雍容文經踴躍武定態遺妍而多狀勢由已而靡罄天假神憑造化莫竟象賢雖乏乎百中偏悟何慙乎聖斯二公者能知方祁氏之奚午天性近周家之文武誠一字而萬殊且含規而孕矩然而真蹟之稱獨標俁俁忘本任心余所不取何哉且得於書法失於背古是知難與之渾朴言可以為礱斫主矣王羲之字逸少晉右軍將軍前後多見行草書唯正書世上稀絶幼子獻之字子敬晉中書令今世上多見行書獨步不可具舉蹟書之書稱二王輒加真字餘雖超越者並通謂之絶跡蓋俗學之意也溫溫伯輿亦扇其風風流之表軒冕之中骨體慢正精彩沖融已高天然恨乏其功如承奕葉之貴胄備夙訓之神童王廞字伯輿即導孫薈子晉司徒左長史今見帶名草書一紙七行粵若太原之英二子閒生仲祖慕元常之則懷祖通文獻之情方言慕而我愧言慕鍾繇比叔文而彼榮比叔文即謝藻習所通而不及言通王導參放之而先鳴參溫放之結束體正肆力專成猶棟梁富於合抱巧匠斫而未精即王濛也高利迅薄連屬欹傾猶鳥避羅而勢側泉激石而分橫即王述也王濛字仲祖太原人晉金紫光祿大夫今見具姓名正書一紙二行王述字懷祖太原人晉尚書令藍田侯今見具姓名草書一紙三行若夫反古不忘吾推世康似無逸少如稟元常猶落太階之蓂莢掇祕府之藝芳丁潭字世康會稽人固孫彌子晉散騎常侍今見正草書各一紙共十行次道淳實寡於風彩自是雄姿翰墨具在如士大夫之京華遊處參貴胄而膚質未改何充字次道廬江人庾亮舅晉侍中司空今見帶名行書三行行仁靡雜唯鍾是師悅端間於高軌能終始於清規雖帶偏薄亦能鄰幾若鳳雛始備於五彩長松僅攀乎一枝劉訥字行仁琅琊人晉散騎常侍今見康帝啓四紙共有三十五行也真長則草含稚恭之厚爽正邇越石之羈束輕浮森峭穠媚藻縟落衆木於秋杪狎㣥鷗於水曲劉炎字真長沛郡人晉丹陽尹今見具姓名行書及草各一帖共六行國明勵躬鍾氏餘風壯利纎薄守雌知雄如道門之子仙路時通張澄字國明吳郡人嘉之子晉光祿大夫今見咸康八年帶名正書上成帝啓一紙七行猗歟子成徇蹟過名正隸敦實藳草沈輕元常高風雖疏復呈猶不考擊之鐘鼓含律呂之音聲劉璞字子成南陽人晉光祿勳即得道南嶽魏夫人之子夫人魏舒女父義晉河內修武令今見具姓名行書及草兩紙共二十行君祖馳馭藝忝令譽窮正驗草而罕逮其能作僞亂真而未可為據正企鍾而悠邈草師王而莫著與夫敬仁道㣥王修江灌或拔茅以連茹猶鋭意鵬舉致身鷹翥張翼字君祖下邳人晉東海太守時穆帝令翼寫王右軍手表帝自批後右軍殆不能別久乃悟云小人幾欲亂真今見具姓名正草書總三帖共十六行元子正草厚而不倫若遺翰墨猶帶真淳似山林之樂道非玉帛之能親桓溫字元子譙國人彞子晉丞相大司馬南郡宣武公今見其行草書帶名四紙共三十行敬道耽玩鋭思毫翰依憑右軍志在凌亂草狂逸而有度正疏澀而猶憚如浴鳥之畏人等驚波之泛岸桓元字敬道溫子歷晉義興太守自署丞相僭號曰楚今見帶名正行草書總十紙共六十行道㣥間慢氣格自充始習新制全移古風與伯輿之合極王廞若子敬之童蒙猶富禮樂之世胄備神彩於厥躬江灌字道㣥陳留人晉侍中中護軍今見帶名行書一紙七行長茂草勢既捷而疏慕王不及獨斷所如猶鷙鳥擊搏而失中因蹭蹬於古墟沈嘉字長茂吳郡人晉吳興太守今見具姓名草書共三行元寶剛直兩王之次骨正力全軌範宏麗凌突子敬病於輕肆同變武而習文若訪龍而獲驥劉王褱之字元寶沛國人晉御史中丞義城伯今見帶名行書九行季舒纎徑循古有禮遇稀難評唯署一啓劉廞字季舒會稽人晉光祿大夫今見書名啓一紙也順陽筆精吾見元平近瞻元常俯視國明張澄利且掩薄能多似生如班輸之運斧乏棟梁以經營范汪字元平順陽人晉安北將軍今見具姓名正書謝賜瓜啓四行矣武子正筆頗全古質去凡忘情任朴不失猶高人之與釋子志由道而秉律范寧字武子汪子晉中書侍郎今見帶名正書啓三紙共二十一行長民則全效子敬便於性分宏逸生於天機衆妙總而獨運凌所師而小薄壯若已而不紊猶豁其流而冰開殷其響而雷奮諸葛長民琅琊人晉輔國將軍宣城內史今見具姓名行書一紙六行道和間雅離古躡真慢正由德高蹤絶塵若昂藏博達之士謇諤朝廷之臣劉穆之字道和東莞人晉侍中司徒今見具姓名行書一紙六行放之率爾草健筆力豈忘保持足見準則猶片錦呈巧細流不極溫放之太原人嶠子晉黃門侍郎今見草書具姓名二行楊真人之正行兼淳熟而相成方圓自我結構遺名如舟楫之不繫混寵辱以若驚真人諱羲宏農人今見行書帶名六行宋珽訛緊足光利用習古者或以為輕日新者必因而重猶朴散而分形器務成而立賦頌宋珽廣平人晉相府參軍今見行書具姓名凡四行宋武德輿法含古初見答道和之啓未披有位之書觀其逸毫巨麗載兆虎變高躅莫究其涯雄風於焉已扇猶金玉礦璞包露貴賤劉裕字德輿彭城人翹子晉太尉中書監封宋公後受禪稱宋武帝今見帶名批劉穆之啓兩紙共六行矣皇矣文帝天知正隸舉已達於縱橫攀王媚於緊細獻之向精專而習熟幾可與之興替尚瞻擊水之鵬摶且並聞天之鶴唳文帝諱義隆武帝第三子今見帶名正行書兩帖共七行雜批五處共有二十行也孝武則武威戡難翰墨馳聲雖稟訓而已高恨一簣而未成徒忌人之賢已異及父之令名武帝書視文帝為未及與思話而雄強追彥琳而愧恥蕭思話孔琳之若夷狄之佳麗慕顏容於桃李孝武帝諱駿字休龍文帝第三子今見帶名正書啓十行又行書都四紙共十三行太宗徽音用壯之心遺棄鄙野不無高深快突俗工匠古鄰今冠樝梨之下果怯鸞鳳之珍禽明帝諱彧字休炳孝武帝弟今見帶名行書四紙并批雜啓等共八行也南平休元筆力自全幼齒結構老成天然比夫鳥在鷇龍潛泉符彩卓爾文詞粲然南平王鑠字休元文帝第四子今見帶名啓正書兩行休茂尚沖已工法則長於用筆結字短於精神骨力性靈可觀運用未極猶鳧雛鵠子初備羽翼海陵王休茂文帝第十四子今見正書帶名啓四行姚懷珍押尾後見三謝兩張連輝並俊若夫小王風範骨秀靈運快利不拘威儀或擯猶飛湍激矢電注雷震謝靈運陳郡人宋侍中祕書監今見帶名行書七行方明和穩媚且潤如幽間女德禮教士允謝方明陳郡人惠連父宋會稽太守今見帶名正書籤三行也茂度逸翰景初清規或大言而峻薄景初對文帝云臣恨二王不得臣之體或寡譽而拙奇王僧虔書用拙筆以自容並心輕兩王蹟及宗師擬鶴鳴而子和殊鯉退而學詩張茂度吳郡人敞子宋會稽太守今見具姓名行草書兩紙共十行張永字景初茂度子宋征西將軍今見正行草書五紙共三十行矣敬元則親得法於子敬雖時移而閒出手稽無方心敏奧術虛薄而不忘本分縱橫而粗得師骨遇其合時髣佛唐突猶圖騏驥而莫展塑真仙而非實爾後王羊謬同衆靡餘風彥琳敬叔允執厥中孔則愈於緊速病於乾偏超舉之餘窺羊及肩猶蓬瀛心想濩武風傳競其豐利又覩薄氏纎圓克成骨力猶稚精彩潤密乃誠莫二掩友凌師抑亦其次雖鍮無金價而珉實玉類羊欣字敬元泰山人不疑子宋中散大夫與邱道護同授獻之筆法今見正行草具姓名書二十餘紙凡六七卷所言王羊謬同諺云買王得羊不失所望言虛也孔琳之字彥琳會稽人宋太常卿今見具姓名正行書三紙共二十行薄紹之字敬叔丹陽人宋給事中與楊孔並師小王今見具姓名行書四紙共二十八行淮水茂族敬宏不墜胡朝餘風翰墨兼至既約古而任逸亦遺能而獨駛猶創埏埴於昔人全朴略而成器王敬宏琅琊人導孫桓元姊夫宋侍中左光祿大夫今見具姓名草書一紙四行也蔓衍枝派思元不忘穩厚而無法度淳和而蓄鋒芒猶君子自適順時行藏王思元琅琊人宋南康太守今見具姓名行書三行顏氏儒門士遜墨妙大令典則中散氣調薄首孔肩體格惟肖如驚弦履險避地膺峭顏竣字士遜琅琊人延之子宋右將軍東揚州刺史今見具姓名行書一紙五行言薄首孔肩則獻之羊欣紹之琳之桓公護之神凝筆遲富雅景乏士規猶門寒道高衣薜言詩桓護之字彥宗洛陽人宋寧朔將軍今見具姓名行書一紙四行翩翩正祖恭已法則師資小王深入閫域安知逸氣未詳筆力猶驥異真龍紫非正色駱字正祖丹陽人宋巨野令今見行書一紙五行有姚懷珍徐僧權等押尾思話帛丿糸密緩步娉婷任性工隸師羊過青似鳧鷗鴈鶩游戲沙汀蕭思話蘭陵人宋征西將軍丹陽尹今見帶名正書啓兩紙共十三行具姓名行書三行二王變古法有所屬兢兢秀之斂翰謹束如仙童樂靜不見可欲龎秀之宋江州刺史今見正書具姓名啓一紙十行仲遠循常由衷邇俗企彥琳之牆仞遵茂度之軌躅張茂度豈聞一而得三同出吳而入蜀巢尚之字仲遠魯國人宋寧朔將軍今見帶名行書七行世期旁通崛強斷利參方回之章法郗愔得敬元之草意羊欣匪庖丁之解牛同君子之不器裴松之字世期河東人宋散騎常侍大中大夫今見具姓名章草書慰勞文一卷二十四行長玉靡慢神間態穠荷小王之偉質錯明帝之高蹤執德而風塵不雜發言而禮義攸從徐爰字長玉琅琊人本名瑗避傅亮諱除玉宋大中大夫今見正書具姓名上明帝啓一紙五行江侯僧安健利而乾貌兼輕媚體出多端猶廣庭之卉木小苑之峰巒江僧安陳留人宋太子中庶子今見具姓名行書一紙八行道力草雄圓轉不窮壯自躬之體格疲逸少之遺風猶立言而逍遙出世驗迹乃夙夜在公賀道力會稽人宋吳興令今見具姓名草書二紙共二十行齊高則文武英威時來運歸挺生紹伯墨妙翰飛觀乎吐納僧虔擠排子敬昂藏鬱拔勝草負正猶力稽牛刀水展龍性蕭道成字紹伯蘭陵人永之子宋右僕射太尉封十郡為王及受禪即位稱齊高帝今見具姓名行草書及雜批三十餘紙世祖宣遠象賢豈敢仰英規而無功超筆力而有膽莫顧程式率由胸襟能騁逸氣未忘童心若橫波束薪泛濫淺深武帝諱賾字宣遠高帝長子今見帶名行草書及雜批等十餘紙子良則能知未善心遠蹟邇家風若遺古則翻鄙雖有力而無體將從真而自美猶土階茅茨儉德之始竟陵王子良武帝子今見帶名行書四行彥回無節筆翰亦爾快利不拘足用而已如拔楓柳抑亦梓褚淵字彥回河南人宋末與高帝同掌樞密後齊臺建以佐命功授司徒中書監今見具姓名草書二紙共一十三行蔚先忠良自我名揚老成不虧和雅允臧若窮隱肥遁志傲侯王禇賁字蔚先淵之子齊祕書監因父憂免職便不仕時人以為恥父失節於宋室遂爾屏居今見正書啓具姓名一紙凡八行非禮不言從容始昌如碩德君子道義難量而盛德有素筆精源長徐孝嗣字始昌東海人齊太尉尚書令今見正書啓共二紙穆父子載茂餘芳僧虔則密緻豐富得能失剛鼓怒駿爽阻圓任強然而神高氣全耿介鋒芒發卷伸紙滿目輝光才行兼而雙絶名實副而特彰如運籌決勝威震殊方伯寶次道並資義訓兄則雜太祖高帝而外兼稟家君於已分弟則纎薄無滯過庭益俊並能間墨妙逸速毫奮比達士與君子人不知而不慍仲寶同夫季舒署名莫窺牆仞王僧虔琅琊人曇首子齊尚書令穆公今見正書具姓名啓二并行書共十五紙王慈字伯寶王志字次道並僧虔子慈齊侍中冠軍今見具姓名行書兩紙共二十五行弟志齊侍中吏部尚書今見具姓名行書三帖共七行王儉字仲寶僧綽子齊尚書令今見署名啓行字而已與孔廞同廞字季舒茂謙則壯而不密騁志恆俗輕師模任縱欲如勇夫格獸徑越林麓劉撝字茂謙彭城人齊太子洗馬御史中丞今見行書兩紙共二十行寶光楷之同調合韻差池去就羽翮齊振依蕭附王道成僧虔俱曰慕藺論骨氣而胡壯驗精神而顧峻猶岸柳之先春得地連於河潤顧寶光吳郡人齊司徒左西掾今見具姓名行書兩紙共二十行胡楷之南昌人齊度支尚書今見帶名行書一紙八行希秀之蹟敬叔之倫薄紹之正則謹促有度草則拘檢靡伸如儉德君子清朝士人徐希秀琅琊人齊驍騎將軍今見具姓名行書草書兩紙共十二行思光逸才揮翰無滯超寶光之力從僧虔之制越恆規而涉往出衆格而靡繼如塞路蓬轉摩霄鳶唳張融字思光吳郡人齊司徒左長史今見具姓名草書一紙九行梁則高祖叔達恢宏厥躬泯規矩合童蒙文勝質而辭寡明察衆而理窮猶巧匠琢玉心愜雕蟲蕭衍字叔達蘭陵人順之子齊左僕射征東將軍封梁王及受禪即位稱梁武帝今見帶名行書及制草雜批等四十餘紙文摹鍾不瑕有害慠景喬而含古蕭子雲肩邵陵而去泰文帝諱綱字世纘武帝第三子今見帶名正書啓四紙并寫禪師碑文六紙及行書四行世調則氣吞元常若置度內方之惠達蕭特旨趣猶昧擅時譽而徒高考遺蹤而罕逮邵陵王綸字世調武帝第六子今見帶名行書三紙孝元不拘快利睢盱習疏於一體加緊薄而小殊惟數君之翰墨稱去聲天倫之友于皆可比蘭菊殊芳鴻鴈異軀孝元帝諱繹字世誠武帝第七子今見具姓名行書一十五行仲正則而壯賒而密婆娑蹣跚綽約文質稟庭訓而微過任天然而自逸若衆山之連峰探仙洞而不一蕭確字仲正綸子梁廣州刺史永安侯今見具姓名行草書兩紙一十五行景喬則潤色鍾門性情勵已豐媚輕巧纎慢旖旎詩雖易其國風賜豈賢於夫子猶鸞窺鏡而鼓翼虎不嘻而履尾蕭子雲字景喬蘭陵人梁侍中國子祭酒今見正書具姓名啓及臨右軍書共三十行又見草書六十餘紙名劣筆健乃逢王克通流未精疏快不忒猶腐儒宿士運用自得王克琅琊人梁尚書僕射今見具姓名草書四行有胡昂印尾陸杲迅熟騁健遣能任縱便無風稜如郊坰羽獵羽戉狨奔騰陸杲吳郡人梁光祿大夫揚州大中正今見具姓名草書九行體雜間利覩夫彥升構牽掣而無法任胸懷而足憑猶注懸泉咽凝冰任昉字彥升樂安人梁吏部侍郎掌著作今見具姓名草書五行茂遠捷鋭足以自給彥和連環迅不可及如過雨之奔簷霤飛燎之赫原隰傅昭字茂遠北地人梁祕書監金紫光祿大夫貞子今見具姓名草書一紙一十一行朱异字彥和吳郡人中領軍右僕射今見具姓名草書一紙十三行文海緊快勢逸氣高未忘俗格鋭意操刀猶樂成名於朝野嗤遁迹於蓬蒿王籍字文海琅琊人僧虔子梁左塘令今見具姓名草書凡八行季和慢速風規所屬圓轉頗通骨氣未足殷鈞字季和陳郡人梁國子祭酒今見行草書兩帖共有一紙三行文磯纎潤穩正利草軟媚橫流姿容美好若其抑阮裦殷庶幾同塵似泉激溜於懸磴木垂條於晚春阮研字文磯陳留人梁交州刺史今見具姓名正行草書五十餘紙惟子深與惠達總景喬之幼志俱親拂毫同陪結字深正穩而寡力達草而豐意或比父而疏省或過師而巧媚誰與別其羅紈且欲同乎篋笥王裦字子深琅琊人規子梁尚書僕射蕭特字惠達子雲子梁海鹽令今見正行草書具姓名共有二十六紙肩吾通塞并乏天性工歸文華拙見草正徒聞師阮阮研何至遼敻使鉛刀之均鋒稱並利而則佞庾肩吾字子慎新野人梁度支尚書今見具姓名行書三紙通明高爽緊密自然捭闔宋文峻削阮研載窺逸軌不讓真仙猶龍髯鶴頸奮舉雲天陶宏景字通明丹陽人隱居山林武帝追諡貞白先生今見具姓名正行書一十二行彥淵氣懦任力或滯猶翮短風高升沈靡制江蒨字彥淵濟陽人梁吏部侍郎今見具姓名行書一紙三行宏讓迅快放誕可觀利疾速著輕乾若星居僻陋木蔓樛盤周宏讓汝南人宏正弟今見草書七行有胡昂押尾蠢蠢懷約任已作制若孤陋儒生辛勤一藝范懷約吳郡人梁東宮侍書今見正書寫正覽一卷并具姓名行書一紙爰及陳氏霸先創業盤桓有威牢落無法等王師憑怒挫衄攻劫嗟文煬而不知徒染毫而敗法陳霸先潁川人文讚子歷梁司空丞相封為陳公後受禪即位稱陳武帝今見批沈格啓行書四行文帝諱蒨字子華武帝子見批陸瓊啓行書三行煬帝諱叔寶字元秀宣帝子今見帶名行書一紙沈氏后德名標婺華允光親署獨美可嘉如晚晴陳雲傍日殘霞煬帝后沈氏吳興人君理之女今見署啓一紙婺華后字叔齊鬱然署押而已伯仁軟慢尺牘近鄙欽榮之之徑舉雖師心而入流高疏壯浪復覩伯謀並如策馬馳逐葦航泛浮新蔡玉叔齊字子蕭煬帝弟官至侍中國子祭酒見署名書一紙廬陵王伯仁字壽之煬帝子官至光祿大夫中武將軍今見具姓名行書四行永陽王伯智字榮之廬陵王弟官至左翊將軍今見帶名行書七行桂陽王伯謀字深之永陽王弟官至丹陽尹今見帶名行書五行智永智果禪林筆精天機淺而恐泥志業高而克成或拘凝重蕭索家聲或利凡通周章擅名猶能作緇門之領袖為當代之準繩並如君子勵躬於有道高人保志而居貞會稽永欣寺僧智永俗姓王氏右軍孫今見具名真草千文數本并帶名草書二紙僧智果會稽人帶名草書一紙坡陀總持獨步方外甘率性而衆異非接武於興會若時違隱淪卒不冠帶江總字總持濟陽人陳尚書令今見具姓名草書一紙三行孝穆鄙重剛毅任拙猶偏裨武夫膽勇智怯徐陵字孝穆東海人陳左僕射今見正書帶名啓一紙仲倫則快速無度馳突不疏尺題已終筆勢仍餘似逸籠檻之衆鳥恣飛鳴之所如沈君理字仲倫吳興人陳尚書吏部郎中駙馬都尉今見具姓名草書一紙德章率爾流浪急速骨氣乍高風神入俗符縱志而失道等潰河與顛木袁憲字德章陳郡人陳右僕射今見具姓名草書兩行有胡昂印尾快哉伯武心空手敏古風若遺令範惟允如平郊逸驥晚景飛隼毛喜字伯武滎陽人陳吏部尚書今見具姓名草行書共有四紙翩翩濟陽茂世希祥任朴無聞適俗不忘父輕而迅子凜而強蔡景歷字茂世濟陽人陳度支尚書今見具姓名行草書三紙子徵字希祥陳中書令今見具姓名草書二紙接武隨波雷同野王如異磽肥之挺質俱竹柏之凌霜顧野王字希馮陳黃門侍郎領大著作今見具姓名草書二紙知道則疏弛慢無可取則削凡常病窒塞猶岸陸縱獺艱辛騁力伏知道昌平人陳鎮北長史今見具姓名草書三紙含茂悠悠薦臻同德迫時季而陵替俱道喪於翰墨徒麋鹿為後先非勝負可差忒謝嘏字含茂陳郡人陳中書令今見具姓名草書三紙賀氏曰朗雖非動人不事筆力猶阻學貧三者若宦游旅泊衣化風塵賀朗會稽人陳祕書監今見具姓名行書三紙文深孝逸獨慕前蹤至師子敬如欲登龍有宋齊之面貌無孔薄之心胸趙文深天水人後周為書學博士書蹟為時所重孝逸湯陰人隋四門助教深師右軍逸效大令甚有功業當平梁之後王裦入國舉朝貴胄皆師於裦唯此二人獨負二王之法俱入隋臨二王之蹟人閒往往為寶耳蕭條北齊浩汗仲寶劣充凡正備法緊草遐師右軍歘爾由道究千變而得一乘薄俗而居老如海嶽高深青分孤島劉珉字仲寶彭城人彥英子北齊三公郎中今見具姓名草書十二紙隋則元平嗣芳訛熟名揚彥謙草力浮緊循常糟粕右軍之化依稀夫子之牆皆如益星榆之衆象無月桂之孤光劉元平珉之子潔志高蹈隋贈貞範先生今見具姓名行書二紙房彥謙清河人司隸刺史今見具姓名草書十紙昌衡跌宕率爾而作雖蔑法而或乖乃由衷而不怍似野笋成竹長風隕籜盧昌衡字子均范陽人隋侍中贈司空父道虔子均隋禮部侍郎太子左庶子今見具姓名行書二紙我巨唐之膺休一六合而闡幽武功定文德修高祖運龍爪陳睿謀自我雄其神貌冠梁代之徽猷神堯皇帝隴西李氏諱淵仕隋官至殿內少監右驍衛將軍大丞相封唐王及受禪即位革隋為唐又王右軍書柱作爪形時觀者號為龍爪書高祖師王裦得妙故有梁朝風格焉太宗則備集王書聖鑒旁啓雖躡閭井未登階陛質詎勝文貌能全體無風骨總法禮文武皇帝諱世民神堯子當貞觀年中鳩集二王真蹟徵求天下并充御府武后君臨藻翰時欽順天矜而永保先業從人欲而不顧兼金則天皇后沛國武氏士彠女臨朝稱尊號曰大周金輪皇帝時鳳閣侍郎石泉王公方慶即晉朝丞相導十世孫有纍代祖父書蹟保傳於家凡二十八人緝成一十一卷后墨制問方慶方慶因而獻焉后不欲奪志遂盡摹寫留內其本加寶飾錦繢歸還王氏人到于今稱之右史崔融撰王氏寶章集序具紀其事睿宗垂文規模尚古飛五雲而在天運三光以窺戶睿宗皇帝天后第四子性淳和好書史尚古質書法正體不樂浮華開元應乾神武聰明風骨巨麗碑版崢嶸思如泉而吐鳳筆為海而吞鯨諸子多藝天寶之際蹟且師於翰林嗟源淺而波細開元天寶皇帝仁孝慈和兼負英斷好圖書少工八分書及章草殊異英特自諸王殿下已下多效吳嗣李涂雖有工夫不能高遠開元中八分書北京義堂西嶽華山東嶽封禪碑雖有當時院中學士共相摹勒然其風格大體皆出自聖心漢王童年自得書意夙承羲獻守法不二漢王元昌文皇帝弟惠文靡倦博好敦勸恨夫有始無終灰燼成空苟懼存而投閣徒榮歿而升宮尚可謂梁園筆壯樂府文雄纍聖重光之盛業六書一藝之精工非所以抑至人之徇已服勇士以雕蟲責繁聲於韶濩徵艷色於蒼穹者也岐王元範追冊惠文太子開元皇帝弟時天府圖書為張昌宗竊換張氏誅後歸薛稷稷沒為王所得初不聞奏後慮焉乃盡焚之言樂府文雄者王多能好事有文詞特為歌者所唱爰有懷琳厥蹟疏壯假他人之姓字作自己之形狀高風甚少俗態尤多吠聲之輩或浸餘波李懷琳洛陽人國初時好為僞蹟其大急就稱王書及七賢書假云薛道衡作敘及竹林敘事并衛夫人咄咄逼人嵇康絶交書並懷琳之僞蹟也有姓謝名道士者能為繭紙嘗書大急就兩本各十紙言詞鄙下跋尾分明徐唐沈范蹤迹烜赫勞茹裝背持以質錢貞觀中敕頻搜尋彼之錢主封以詣闕太宗殊喜賜縑二百匹懷琳乃上別本因得待詔文林館故在內之本有貞觀印焉頃年在右相林甫家後本在張懷瓘處尋博易與李起居若乃出自三公一家面首歐陽在焉不顧偏醜䫜翹縮爽了裊黝糾如地隔華戎屋殊戶牖學有大小夏侯書有大小歐陽父掌邦禮子居廟堂隨運變化為龍為光歐陽詢長沙人紇之子幼孤陳中書令江總收養書出於北齊三公郎中劉珉官至率更令太常少卿子通亦能繼美拜納言封渤海公永興超出下筆如神不落疏慢無慙世珍然則壯文磯而老成與貞白而德鄰如層臺緩步高謝風塵纂煥嗣聖體多拘檢如彼碔玞亂其琬玉虞世南會稽人荔之子蹟居四公之上官至祕書監贈禮部尚書封永興公子纂孫煥皆能繼世煥授武官在仗宿衛初隋有猛將來護兒子恆濟皆負才學入唐繼登三事故陸元方所云來護兒兒把筆虞世南兒帶刀言物極則反一至於此也河南專精克儉克勤伏膺告誓鋭思猗文恐無成於畫虎將有類於效顰雖價重衣冠名高內外澆漓後學而得無罪乎褚遂良河南人兼愛子尚書左僕射河南公兼愛名亮東都人柬之效虞疏薄不逮少保師褚菁華却倍超碩鼠之效能愧隋珠之掩纇陸柬之吳郡人仁公子虞氏之出官為著作郎薛稷河東人太子少保房文昭則雅而和隱乃訛精神乏氣胸臆餘波若蘋萍異品共泛中河房喬字元齡清河人彥謙子官至司空贈太尉文昭公殷公王公兼正兼署大乃有則小非無據騏驎將騰鸞鳳欲翥題二榜而蹟在歎百川而身去殷仲容陳郡人不害之孫令名之子奕世工書尤善書額官至禮部郎中書汴州安業寺額京師裒義開業資聖寺東京太僕寺靈州神馬觀額皆精妙曠古王知敬太原人門傳孝義工正行善署書與殷殊塗而同歸兼草書弟知慎工圖畫兄官至祕書少監當時雙絶與仲容齊肩天后詔一人署一寺額仲容題資聖知敬題清禪俱為獨絶洛川長史德政二賈碑在修行寺東南角即知敬之蹟極峻利豐秀清禪資聖寺至今路人識者駐馬往觀普濟度寺即父令名手蹤皆為後代程式王祕監則首未全貞尊道重德或終紙而結字或重模而足遵句反墨濩落風規雄壯氣力播清譽而祖述屢見賞於有識如曲圃鴻飛芳園桂植王紹宗琅琊人修禮子官至祕書少監虔禮凡草閭閻之風千紙一類一字萬同如見疑於冰冷甘沒齒於夏蟲孫過庭字虔禮富陽人右衛胄曹參軍張長史則酒酣不羈逸軌神澄回眸而壁無全粉揮筆而氣有餘興若遺能於學知遂獨荷其顛稱張旭吳郡人左率府長史俗號張顛雖宜官售酒子敬揮帚遐想邇觀莫能假手拘素屏及黃卷則多勝而寡負猶莊周之寓言於從政乎何有後漢師宜官工書嗜酒每遇酒肆輒書於壁遠近咸觀酒因大售計價償足而滅之王子敬以帚泥書壁觀者如市已上皆言旭之可比湖山降禮狂客風流落筆精絶芳詞寡儔如春林之絢彩實一望而寫憂雍容省闥高逸豁達解朝服而歸鄉斂霓裳而辭闕賀知章字維摩會稽永興人太子洗馬德仁之孫少以文詞知名工草隸書進士及第歷官太常少卿禮部侍郎集賢學士太子右庶子兼皇太子侍讀檢校工部侍郎遷祕書監太子賓客慶王侍讀知章性放善謔晚年尤縱無復規檢年八十六自號四明狂客每興酣命筆好書大字或三百言或五百言詩筆唯命問有幾紙報十紙紙盡語亦盡二十紙三十紙紙盡語亦盡忽有好處與造化相爭非人工所到也天寶二年以老年上表請入道歸鄉里特詔許之重令入閣諸王以下拜辭上親製詩序令所司供帳百寮餞送賜詩敘別知章表謝手詔答曰卿儒才舊業德著老成方欲乞言以光東序而乃高蹈世表歸心妙門雖雅意難違良深耿歎眷言離祖是用贈詩宜保松喬慎行李也兒子等常所執經故令親別尊師之義何以謝焉仍拜其子典設郎子曾為朝散大夫本郡司馬以伸侍養知章以羸老乘輿而往到會稽無幾老終元年冬十二月詔曰故越州千秋觀道士賀知章神清志逸學富才雄挺會稽之美箭蘊昆岡之良玉故飛名仙省待詔龍樓願追二老之奇蹤克遂四明之狂客允協初志脫落朝衣駕青牛而不還狎白鷗而長往舟壑靡息人琴兩亡惟舊之懷有深追悼宜加縟禮式展哀榮可贈兵部尚書者也廣平之子令範之首婭姹鍾門逶迤王後武都先覺翰墨泉藪子敬元常得門窺牖侍中穆異代同友於孔門而升堂惜顏子之不壽徐嶠之東海人廣平太守子浩中書舍人國子祭酒李造隴西人武都公言侍中穆即子雲僧虔韓常侍則八分中興伯喈如在光和之美古今遠代昭刻石而成名類神都之冠蓋韓擇木昌黎人工部尚書歷右散騎常侍赫赫許昌翰苑文房徵前賢而少對當聖代而難方田琦鴈門人德平之孫工八分小篆署書圖畫寫洪崖子張氳雲樓并雪木行於世官歷陝令豫蘄許等州刺史兼裝背有孫栖梧尤妙其事德平武德功臣拜兵部尚書衛包蔡鄰功夫亦到出於人意乃近天造衛包京兆人工八分小篆通字學兼象緯之術官至尚書郎蔡有鄰濟陽人善八分本拙弱至天寶之閒遂至精妙相衛中多其蹟滎陽昆弟內外光華揮毫美麗自是一家幼弟曰逾丹青大誇信斫玉而剖石即揀金而披沙鄭遷及弟邁遇並工八分崔氏出中書令湜之甥遷官至浚儀尉季弟逾善山水天寶中知名梁宋溫良之德書畫兼美誠依仁以遊藝同上善之若水皇室李權工八分弟樞工小篆姪平鈞亦善小篆兼妙山水並冠絶一時淮安王神通曾孫權官歷金州刺史樞侍御史平鈞富詞學江陵掾詩興入神畫筆雄精李將軍世稱高絶淵微已過薛少保時許美潤合格不珍右丞王維字摩詰琅琊人詩通大雅之作山水之妙勝於李思訓弟太原少尹縉文筆泉藪善草隸書功超薛稷二公名望首冠一時時議論詩則曰王維崔皓論筆則曰王縉李雍祖詠張說不得預焉幼弟紞有兩兄之風閨門之內友愛之極史侍御惟則必優世業階乎籀篆古今折衷大小應變如因高而矚遠俯川陸而必見史惟則廣陵人殿中侍御史即諫議大夫白之子白善飛白吾家世業趙郡李君嶧山並騖宣父同㣥洞於字學古今通文家傳孝義意感風雲李陽冰趙郡人父雍門湖城令家世住雲陽承曰門作尉冰兄弟五人皆負詞學工於小篆初師李斯嶧山碑後見仲尼吳季札墓志便變化開闔如虎如龍徑利豪爽風行雨集文字之本悉在心胸識者謂之蒼頡後身澥子騰冰子垍並詞場高第幼子曰廣勤學孝義以通家之故皆同子弟也延安君則快速不滯若懸流得勢三原君則婉媚巧密似垂楊應律吾舅諱繪彭城人也延安都督姨兄明若山西平原人京兆三原縣尉大理評事宋儋李璆擅美中州李師王而意淺宋祖鍾而體流宋儋字藏諸廣平人高尚不仕戶部侍郎宇文融薦授祕書省校書郎作鍾體而側戾放縱跡不副名開元末舉場中後輩多師之李璆隴西人御史大夫傑之兄子性速達輕財重義筆蹟緊媚亦有聲於代為狄宇清李漸所師員外蕭公名成於薛安西變體光潤愈悅蕭公名誠蘭陵人梁之後起家奉禮郎開元初時尚禇薛公為之最拜右司員外郎善造斑石文紙用西山野麻及虢州土穀五色光滑殊勝子彭張氏四龍名揚海內中有季弟功夫少對右軍風規下筆斯在張從申長史文場擢第弟從師監察御史從儀灼然有才從申志業精絶工正行書握管用筆其於結密近古所少恨歷覽不多聞見遂寡右軍之外一步不窺意多搨書闕其真蹟妙也呂公歐鍾相雜自是一調雖則筋骨乾枯終是精神嶮峭其於小楷尤更巧妙呂向東平人開元初上美人賦忤上時張說作相諫曰夫鬻拳脅君愛君也陛下縱不能用容可殺之乎使陛下後代有愎諫之名而向得敢諫之直與小子為便耳不如釋之於是承恩特拜補闕賜綵百段衣服銀章朱紱翰林待詔頻上賦頌皆主諷諫兼皇太子文章及書官至給事中中書舍人刑部侍郎文詞學業當代莫比有子曰廣聰利俊秀有吏才拜監察御史吾兄則書包雜體首冠衆賢手關目瞥瞬息彌年比夫得道家之深旨習閬風而欲仙家兄蒙字子全司議郎安南都護馬家劉氏臨效逼斥安西蘭亭貌奪真蹟如宓妃遺形於巧素再見如在之古昔翰林書人劉秦妹歸馬氏押署則縫僧權似長松挂劍尾滿騫如盤石臥虎徐僧權中山人滿騫富陽人繁多乃懷充懷珍稀少乃延祖允祖唐懷充晉昌人姚懷珍武康人陳延祖長城人范允祖順陽人熾文時有何妥近覩雖正姓名美其傲古恨連書於至寶無尺牘之行伍沈熾文武康人何妥外國人翊子梁中書侍郎名作當時書證印驗則玉斫胡書太平公主武氏家玉印有四胡書今多墨塗存者蓋寡梵云三藐母䭾四字也金鐫篆字少能全一多不越四國署年名家標望地獨行龜益即魏王恭家印並設竇臮范陽功曹竇臮書印貞觀開元文止於二太宗元宗所用印陶安東海徐李所祕徐祭酒嶠之印李起居造印萬言方寸翰囿所類延王友竇永書印張氏永保張懷瓘印任氏言事古小雌文東朝周顗東晉僕射周顗印審定竇蒙議郎竇蒙書印亭侯襲貴猗歟劉鄭門承貂珥義仰彭城金部郎中劉繹書印鄴周印異相國鄴侯李泌印宣州長史周昉印或有慙於稽古諒無乏於雅致宋虞和表聞於明皇帝齊穆書答於竟陵王表稱委盡書乃備詳宋中書侍郎虞和上明皇帝表論古今妙蹟正行草楷紙色褾軸真僞卷數無不畢備表本行於世真蹟故起居舍人李造得之齊司空穆公琅琊王僧虔答景陵王子良書序古善書人評議無不至當本行於世其真蹟今御史大夫黎翰得之藻鑒則梁高祖巧而未博武帝時撰書評邵陵王博而未至蕭綸亦撰書評庾中庶失品格拘以文華梁庾肩吾撰書品論傅五兵比亡年廣於職位梁傅昭撰書法目録名録編於司馬隋蜀王府司馬姚最撰名書録善狀集於散騎左散騎常侍姚思廉集善書人名狀李亞相著藻飾之繁右御史大夫李嗣真撰書品張兵曹粗習玩之利率府兵曹鄂州長史張懷瓘撰十體書斷上中下考數公之著稱多約傳而立記余不敏於登高豈虛言而求備敢直筆於親覩非偏譽於所嗜也我小司空韋公曰述職該藝府才同史筆茂族挺生聖朝閒出若乃闡異聞之旨接片善之勤則必忘疲吐握不閒風塵所談而改觀成市所寶而增價為珍小擅聲於自我大推美於其人彼凡百而馳名既往遇此公而其德唯新可謂千載一時孤標絶倫矣韋述京兆人尚書工部侍郎及乎驗德力之工拙知古今之優劣余稽古而玩能因假能而有說匪徒姓名記録面首超越相質披文虛空歲月者矣是用相如慕藺撫新蹟而忘懷豈甘賜也望回抱遐心而結舌終冀乘時出處備展名節其或萃傅巖鍾紹京南康人中書令光祿大夫聚寶捐金川流海納而會潁川家伯諱瓚邠王司馬耽玩達旨固求不匱歸右史李造拂鏡旁通傾心善價而入補闕席巽安定人右補闕心專務得家業或遺祭酒徐浩法則道存徵求非利翰林之尋繹張懷瓘兄弟懷王褱盛王府司馬並翰林待詔俱好無厭亦能臆斷烏臺潘履慎滎陽人監察御史克遵能事採玩芳猷粉署之敦閲蔡希寂濟陽人金部郎中習學潤身假借盈愜欣給事之道宏族兄紹給事中志宏雅道不倦虛求仰議郎之區別家兄鋭思窮源增輝改觀韓生委輸韓滉潁川人給事中委質慮遠推誠道博滕子擁決滕升歙州婺源縣令取舍若流通利泉藪張氏旁求懷瓘海陵人皇鄂州司馬利無推斥道在專精陸家胥悅陸曜吳郡人卷緝餘芳事窮前志釋朏超彼岸東京福先寺僧良朏新羅人俗姓林氏遇捐衣鉢逸冠儕流梅仙行無轍高志宜渤海人同官尉氣合古風利加能事溫播金聲溫朝太原人國子簿悉心景慕徒衆博求崔含冰潔崔曼倩清河人鄠縣尉浩汗經營見如不及若驚陳趙陳閎潁川人陳王府長史趙微明天水人或志敦習學或自悅古能皆玩之無斁也賈勇徐薛徐守行東海人監察御史薛雍河東人郎中或推古招致或究能跧拔並求之不已關郭雙奮飛關僞隴西人郭暉太原人或規規耽好或楚楚傳寫潘袁兩傾竭潘淑會稽人袁明陳郡人或披尋洽道或耽籍樂貧簪纓布素申道閒設既輻輳而川流並觀光於後哲速珠玉之無脛可得略而言曰長安則穆聿聿咸陽龎店人少以販書為業後至德中因告訐徵搜古蹟并強占石泉公家則天皇后所還書功白身受金吾長史改名祥蹈險邀榮乘危射利王昌遼東人詞荒智役導其源葉豐括州人貌恭性僻田潁長安人志凡識滯委其軀必拾遺市駿懷寶飛鳧洛陽則杜福河南人論熟行巧劉翌洛陽人節苦心廉窮彌固齊光河南人道寡業微趙晏河內人智專別識樂忘劬此四人者洛陽販書者皆誇目動利實繁有徒詩不云乎匪斧語有之曰反隅若或徵數子之運用甘千里之殊塗則我雞犬而無來無往子衣裳而不曳不裾成一家之憬彼睽四海之友于言通貨利事符道因心與日親幾變灰律涉歷冬春互為賓主往返周秦左翊吾兄業窮幽遠名錫同州別駕龍興張揖道契貞淳與潘淑獻書拜官今任龍興縣尉雅興閉關以隨扣古風開卷以襲人不然者何窮獨而恣怡悅何市朝而貪隱淪言尚往來衆矣森然往哲來賢一朝而星羅入眼百代而雲披及肩身已沒兮若休蹟遺芳而可傳彼金印玉璽豐碑貨泉蟲篆制而八分閒矣正隸興而藳草行焉不可量乎所覩又何極乎備宣若乃流譽前代效績當年録軍機而羽括鷹隼述國命而發揮貂蟬通親友以感節啓咨謀以聞天接武波委嗣芳鱗連則余不讓於賦頌敢分媸而別妍恃乎幼好而晚知之至熟也曲察而直言之無愧者將拭目而衆別輕言入掌而百憂寫爾其藤苔縑縠衡理蜀幅花麻黃絢緇赭紺緑淪壓而邇蠧亡文蓄非其人雖邇朝亦朽蠧保持而遠完緘卷處之得地雖遠古亦完全上智所以懸解直曉中庸所以交戰疑之取迷伊他貽笑鄙賤則有烏絲褾首紫璽露面好丹時更悲素色變狀元豹之霧隱規雕虎之風扇雖置水彌旬移裝屢遍益深沈於直質乃容易於覽見嗟乎捨不疑於古疏高取憑假於俗眩昡惑誘淺情於末興肆凡賞而留盼何其妄哉寧知立法而虧真作德而還淳忘情是悅代有其人言定是非必也易背以時時在正夏受彩無欺敏洽和之妙道得潤軟之成規用麥丏調適候陰以成疏密苦樂殊形異宜厚薄完蠧上約下豐始增末裨接上下前後例沽將實名位充合離改折署榜餘地或附卷均端足使其夷薄而蠧者或鳴砧妥帖然後呈姿厚而完者探尋源流志逸肥遁緝合翦截躬勞不悶明齊短長暗結分寸誠忽忽於或躁袪悢悢之遺恨至如虹縈絲帶鸞舞錦褾青閒綾文出之衣表檀心鼊首金映銀絡舒囊貌妍撫卷香作多此飾類又難詳備並言檢討裝背也若乃見稀意欲雖可棄而崑山片玉玩久厭充雖可寶而紈扇秋風競舍茲而易彼誇視審而聽聰或芟穢於匿迹或喪真於矜工夥哉耳設鮮矣目窮因既原乎識量遂懸別其淹通已分流而茲在徒並騖而爭雄言申博易假使作僞心勞亂真首出眯目童幼摧殘紙筆終令君子棄瑕以拔材壯士斷腕以全質期補勞於得喪勵採葑於始卒子猷之竹在焉曷可無其一日言務宏道夫喻大始於事卑方崇極於類聚況物著公器賞推善主異清白而非弓裘豈孫謀而紹宗祖抑如堯禪舜舜命禹道必貴乎聲同天無親而德輔歸可保於授受靡自私而禦侮故知乖其趨者則密戚而心捐合其軌者則舉儲而掌傳亮玉白之利末望吾徒之義先先言傳付後總樂成以終也至其罷琴間堂散袠虛牖閲新連之卷軸傾舊滿之樽酒暢懷古而遺形荷逢時以濡首炎涼所寄偃仰無咎煙積孤松春過五柳想薜蘿而在眼狎鸞鳳而盈手善鄰得朋知我益友暗遺名利臥度卯酉遂志願兮苟若斯生可憑兮死不朽雖金翠溢目陶匏聒耳徒潤色於多歡實無階於競美賢賢易色勿藥有喜茅居食貧陋巷飲水誓將敦素業而畢矣振清風而何已辭曰資樂道兮善莫大佐元覽兮寄所賴芝蘭滿室兮遺美芳朋友忘言兮古人會想賢玩蹟儼如在史冊悠悠幾千載蒙字子全肅宗時試國子司業兼太原縣令吾第四弟尚輦君字靈長翰墨厠張王文章凌班馬詞藻雄贍草隸精深平生著碑志詩篇賦頌章表凡十餘萬言較其巨麗者有天寶所獻大同賦三殿蹴踘賦以諷興諫諍為宗以匡君救時為本帝乃咨爾可編策書中使王人榮曜戚里龍章鳳篆寵錫儒門及乎晚年又著述書賦總七千六百四十言精窮旨要詳辨祕義無深不討無細不聞徵五典三墳九邱八索詩騷禮易文選詞林猶不盡所知故別結語立言曲申幽奧一字一句數義旁通尚輦君學究天人才通詁訓注解分析皆憑史傳注有未盡在此例中意有未窮出此格上凡古今時哲正文呼字尊貴長老各言其親或取便引官或因言稱爵句則兩字三字五言四言而於其以之間或六或八改時革命之際舉一相從慮學者致疑仍施朱點發此則語之理例別有字格存焉凡一百二十言并注二百四十句且裦且貶還同諡法披文感切撫已崩摧手跡宛然如向來之放筆天才卓爾成千載之分襟考義銘心言笑在目一枝先折痛貫肝腸兩眼先枯哀廠田坴骨髓
