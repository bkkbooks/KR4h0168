front:
  text: 全唐文欽定全唐文卷七百七十一商隱字義山懷州河內人少為令狐楚巡官開成二年登進士第會昌二年又以書判拔萃王茂元鎮河陽辟掌書記為侍御史久不調會鄭亞廉察桂州請為觀察判官大中初亞貶循州商隱隨赴嶺表三年入為京兆尹盧宏正掾曹又從為掌書記補太學博士柳仲郢鎮東蜀辟為節度判官檢校工部郎中大中末卒
  hash: sha256:c739bf431d9b2042d35e68cd55e937be8588860ecd6bcb3baa474a8c070ca5b8
