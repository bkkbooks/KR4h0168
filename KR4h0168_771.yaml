body:
  text: 亦氣而孕亦卵而成晨鳬露鵠不知其生汝職惟齧而不善齧回臭而多跖香而絶夜風索索緣隙憑壁弗聲弗鳴潛此毒螫厥虎不翅厥牛不齒爾兮何功既角而尾臣某言臣聞長育之功允歸於天地疾痛所迫必告於君親是以今月某日竊獻表章上干旒扆備陳舊恙當此頽齡乞解藩維一歸京輦衰羸則甚戰灼猶深臣某中謝臣早以庸虛久塵恩渥四朝受任二紀叨榮華省黃樞皆驚竊位專征處守每愧非才豈不願竭螻蟻之微生盡桑榆之暮景靡敢言病罔或告勞然事有不可因循力有不堪勉疆苟懷情不盡則事主非忠且漢上雄藩褒中重鎮統臨至廣控壓非輕以臣昔年尚憂不理在臣今日其何敢安亦既揣量豈容緘默固合即時離鎮隨表歸朝伏料睿慈必從丹款拜魏闕而獲伸積戀訪秦醫而冀愈沉疴乏絶之時馳驅未晚臣巳決取今月某日離本道東上無任祈恩危迫之至臣某言臣聞達士格言以生為逆旅古者垂訓謂死為歸人苟得其終何怛于化臣永惟際會獲遇升平鐘鼎之勳莫彰風露之姿先盡雖無逃大數亦有負清朝今則舉纊陳詞對棺忍死白日無分元夜何長淚兼血垂目與魂斷臣某中謝臣早緣儒學得厠人曹克紹家聲不虧士行詞賦貢名于宗伯書檄應聘于諸侯東泛西浮南登北走時推倚馬人或薦雄西掖承榮得以言之無罪曲臺備位粗明物有其容永謂才難便叨郎選振衣華省歷履名曹高步內庭光揚密命憲宗皇帝以臣行多餘力忠絶它腸進無所因靜以有立過蒙顧問深降褒稱乃于同列之中獨許非常之拜殊恩既浹當路相排旅翮未高孤根巳動河潼為郡盟津統師溺以待援痿而念起憲宗旁求輔相即記姓名果遣急徵仍加大用戴君之力雖弱許國之誠在茲實有微衷可裨元化况初誅背叛務活疲羸方伏奏于鳳扆之前忽庀徒于鳥耘之次小吏抵罪邪臣結謀指之有名默不得訴空甘罪戾仰托聖明粗得生還幾臨死所其後官移督護四年不謁于承華任改察廉一日暫留于分陜欲舉而墜將安更危賴敬宗皇帝纘乃丕圖是思求舊振于洛宅榮彼夷門自茲以來敢虛其遇周旋五紀鎮守惟切分憂前後兩歸闕庭皆非久次拙直不同于衆讒毀每集其躬含意未宣救過不暇伏思自長慶厥後開成之前凡幾忝遷升幾遭退斥若非不欺天地不負君親至於幾微尋合顛隕伏惟皇帝陛下道超覆載仁極照臨既委鹽鐵又分端揆逮今控壓亦在重鎮陛下之恩微臣何益微臣之節陛下方知興言及斯碎首殊晚然臣從心之年巳至致政之禮宜遵尋欲拜章以求歸老伏以諸道節制頻歲更移其于送迎例多積纍臣在此雖無一毫侵損亦無纎介誅求帑藏甚殷倉儲可羡特緣行李忍過秋冬而江山之氣候難常蒲柳之蕭衰易見自夏則膝脛無力入冬則腸胃不調對冠冕而始訝儻來指墓墳而巳知息處今月八日臣巳召男國子博士緒左補闕綯左武衛兵曹參軍綸等示以歿期遺之理命使內則雍和私室外則竭盡公家兼約其送終務遵儉約勿為從容以致慮居至十二日夜有僕夫告臣云大星隕地雅當正室洞照一庭臣即端坐俟時正辭無撓臣之年亦極矣臣之榮亦足矣以祖以父皆蒙褒寵有弟有子並列班行全腰領以從前人歸體魄以事先帝此不自達誠為甚愚但以將掩泉扄不得重辭雲陛更陳尸諫猶進瞽言雖呌呼而不能豈誠明之敢忘伏惟皇帝陛下春秋鼎盛華夏鏡清是修教化之初當復理安之始然自前年夏秋以來貶譴者至多誅僇者不少伏望普加鴻造稍霽皇威歿者昭雪以雲雷存者沾濡以雨露使五稼嘉熟兆人樂康用臣將盡之苦言慰臣永蟄之幽魄臣某云云臣當道兵馬巳差監軍使竇千乘勾當其節度留務差行軍司馬趙祝觀察留務差節度判官杜勝訖有舊規模無新革易悉當輯睦決無喧驚臣心雖澄定氣已危促辭多逾切鳴急更哀升屋而三號豈來赴壑而一去無返忠誠直道竟埋沒于外藩腐骨枯骸空歸全于故國回望昭代無任攀戀永訣之至謹奉表代辭以聞臣某誠號誠咽頓首頓首臣某言今月某日中使王士岌至奉宣恩旨改授臣某官并賜臣前件告身一通者寵命天臨恩光春煦兢惶無措抃蹈失容臣某中謝臣幸逢昭代本自諸生文以飾身學實為已寧韞玉而待賈竊運甓以私勞春闈再中于明經天官一升於判第階級甚薄際會則多藝閣讐書藍田作吏中間因依知巳契濶從軍其後超屬憲司驟登郎署埋輪而出高懸八使之威起草以居遠謝三臺之妙每含香而自歎常襆被而待行伏惟皇帝陛下鈞陶庶彙亭毒萬方憂心同堯好諫若禹東掖垣內封章何有于日聞青門前列位徒參于夕拜擺波濤而鯤鱗才變望煙霄而鸞翮初高誓將竭誠非敢養望然虛受難處忝據非安忽擁隼旟竟辭龍闕猶賴雲日未遠關城不遙虔奉國章粗免官謗豈意便升亞相之班秩復委大藩之廉問魚箋帝語象軸神工拜受而若捧千鈞伏讀而如聽九奏誠雖深于負荷戀實切于違離况曲阜遺封導河舊壤列九州之數帶五嶽之雄古為詩書爼豆之鄉今兼魚鹽兵革之地訓整合資于武幹撫循宜屬于柔良豈伊孱微堪此委寄謹當氷霜勵志金石貫誠駑馬奮十駕之勤鉛刀淬一割之用即以今月二日雪泣西拜星馳東下帝城思入雖有類于陳咸關外居安敢同于楊僕無任瞻天戀闕之至謹附中使某奉表陳謝以聞臣某言臣自承明詔移鎮東藩望闕而雪涕以辭戒途而星奔不息即以今月五日到任上訖當時集軍州官吏等宣布皇風闡揚元造歡聲雷動喜氣雲高臣某中謝臣本由儒業獲厠朝榮粵自烏臺至于青瑣纍更近地皆奉休期用盡心以書紳長憂福過取知足而銘座敢傲時來旋屬皇帝陛下垂意關城推心甸服俾之防遏兼使緝綏橫被天波未移星琯豈期非次忽致殊遷察俗雄藩分榮大憲地濱河濟山奄龜蒙本孔里周封有堯祠舜澤九州之名數甚古三代之禮樂舊傳退省何人合安茲地撫躬而浹背汗下仰恩而溢眥淚流况所部驍雄素兼節制為於當代便屬文臣畫武聚螢昔惟久事筆硯佩鞬帶鶡今寧能執干戈幸臣前在華州日虔奉詔條克宣戎律檢下而羊無九牧馭黠而犬用左牽用令去任之時大有遮留之請盡三屬縣至萬餘人不放即途皆來臥轍竟稽朝發遂致宵奔請于茲時亦因前政冀漸令蘇息長使謐寧然後遠訪云亭高尋日觀備萬乘登封之所設諸侯朝宿之儀盛禮獲窺微願斯畢過此以往不知所圖無任戴恩隕越之至謹差某官某奉表陳謝以聞臣某言今月某日得本道進奏院報以聖躬痊和右僕射平章事臣涯等奉見聖躬訖社稷殊祥生靈大慶臣忝分朝寄四奉國恩無任抃舞踴躍之至臣聞天普覆也應運而健若龍行日至明焉有時而氣如虹貫伏惟皇帝陛下道超普覆迹邁至明思社稷之靈惟德是輔念蒸黎之廣以位為憂求衣未明觀書乙夜壽域既臻於躋俗大庭微闕於怡神是以自北陸送寒暫停禹會及東郊迎氣爰復堯咨四海方來百辟咸在六幽雷動萬壽山呼惟臣獨以一麾載離雙闕犬馬之微誠徒切鵷鴻之舊列難階提郡印而通宵九驚對使符而一食三起今幸巳俗臻殷富年比順成伏惟稍簡萬幾以迎百福託調燮于彼相責綏撫于列藩承九廟之降祥副兆人之允望臣某不勝慺慺慊慊之至謹差某奉表陳賀以聞臣某言臣聞風葉露華榮落之姿何定夏朝冬日短長之數難移臣幸屬昌期謬登貴仕行年五十五歷官二十三念犬馬之常期死亦非夭奈君親之厚施生以無酬是以時及含珠命餘屬纊心猶向闕手尚封章撫躬而氣息奄然戀主而方寸亂矣臣某中謝臣少而羈絏長乃遭逢常將直道而行實以明經入仕王畿作吏非州府之職徒勞侯國從知愧軍旅之事未學憲宗皇帝謂臣剛決擢以憲司穆宗皇帝謂臣才能登之郎選忝霜威而無所摧拉歷星紀而有紊次足廠田坴旋屬皇帝陛下大明御宇至道承乾澄汰之初臣不居有過超擢之際臣獨出常倫高選掖垣針規未效入居瑣闥論駁無聞自去年秋來典河關兼臨甸服惟當靜而阜俗清以繩姦粗致豐穰幸逃逋責豈意陛下謂臣奄有三縣未稱其能謂臣出以一麾未足為貴爰降綸綍移之藩方錫以海隅與之嶽鎮將吾君之驍果萬計使得總齊聯吾君之牧伯三人以居巡屬時雖相羡臣實深憂既屬聖恩果遭鬼瞰况臣素無微恙未及大年方思高挂饋魚不然官燭成陛下比屋可封之化分陛下一夫不獲之憂志願未伸大期俄迫忽至今月十日夜暴染霍亂并兩肋氣注當時檢驗方書煎和藥物百計療理一無痊除至十一日辰時轉加困劇漸不支持想彼孤魂已遊岱嶽念茲二豎徒訪秦醫對印執符碎心殞首人之到此命也如何戀深而乏力以言泣盡而無血可繼臣某誠哀誠戀頓首頓首臣當道三軍將士準前使李文悅例差監軍使元順通勾當訖臣與順通近同王事備見公才假之統臨必能和協其團練觀察兩使事差都團練巡官盧涇勾當訖臣亦授之方略示以規模伏惟聖明不致憂軫臣精神危促言詞失錯行當窮塵埋骨枯木容身螻蟻卜鄰烏鳶食祭黃河兩曲長安幾千生入舊關望絶班超之請力封遺奏痛深來歙之辭回望昭代不勝荒惙眷戀之至謹差某奉表代辭以聞臣某言伏奉正月九日制書南郊禮畢改元為某大赦天下者奉郊禋以定天位新歷象以授人時乾健離明震動兌悅跂行喙息罔不慶幸臣某中賀臣聞禋昊天而旅上帝者聖王之重事覃殊休而發大號者哲后之宏猷故必致四圭以達誠制六器而伸敬將崇嚴配必在元旬先之以蒼璧騂牲重之以雲門大呂然後王猶有闕於薦敬爽彼告虔周官三代之文絶而不續漢氏萬靈之位失而莫尋豈若皇帝陛下以大道遂㣥生以至公臨寶祚上苞元象下總皇祇黜幽陟明興廢繼絶靈芝甘露鄙之而不告史官赤雁白麟陋之而不編瑞牒然後因孟月卜上辛率于國南式是歲首且天以陛下為子故必饗明誠人以陛下為天故必流睿澤踰千越萬邁五登三何則取直言之科則聽輿論者不足算設宥過之令則除鄉議者未可儔延賞推恩用以勸禦災捍患之士減租退責將以矜火耕水耨之人養庶老頒淖糜暖帛之資走㣥望潔刳牲瘞幣之禮古不覩者復覩古不聞者復聞萬蟄蘇而六幽盡開五刃藏而九土咸闢臣當時集軍州官吏等丁寧告示訖况臣嘗備論思獲叨侍從當時仙禁慙視草以無能此日泰壇望給薪而靡及徘徊甸服局蹐關城雖有慶于文明竟無階于奔走司馬談闕陪盛禮沒齒難忘蕭望之願立本朝馳魂莫及無任抃舞結戀之至臣某言臣伏奉某月日德音以妖星謫見思答天戒者臣當時集軍州官吏丁寧宣示訖仁深覆載恩極照臨究祖宗之令圖極皇王之盛事圓首方足罔不欣慶臣某中賀臣聞覆載莫大於天地而升降之氣或不接照臨莫大于日月而薄蝕之度或有差豈惟休咎之徵自是陰陽之事旋觀彗孛載考策書雖欲為災曷嘗勝德伏惟皇帝陛下荊枝載茂棣萼重輝既居正以體元亦觀文而察變仰觀星彩稍越天常於是深軫皇情重回宸眷省躬之懼洞感于幽明及物之恩畢沾于華夏戒田遊則成湯祝網之意釋寃滯乃大禹泣辜之慈罷去修營惜漢氏十家之産勸課耘耔復周邦九歲之儲德巳厚矣仁巳極矣然猶避寢自責撤膳貽憂以此延休何休不至以茲備患何患能為足以高步三王平窺百古鞭撻守成之主秕粳中代之君抑臣又聞之昔貞觀之理也太宗文皇帝吞蝗而災沴息泰岱之封也元宗明皇帝露坐而風雨消炯戒猶存神靈未遠陛下永懷貽厥有切欽承為其所不為至其所不至佇見地泉流醴天酒凝甘人知朱草之祥家識白麟之瑞又豈芒角足懼晷度可憂者哉臣素乏器能謬當任使東雍西嶽雖首化于百城日遠天高但心存于雙闕聽金石而慙殊舞獸無羽翼而恨異冥鴻惟當虔奉詔條頒宣德澤成陛下無偏之道畢微臣盡瘁之勤所冀不置簡書免拘司敗如其禮樂非臣所能無任感恩戀闕懇悃屏營之至臣某言得本州進奏院狀報今月某日夜彗星不見宰臣某等奉表稱賀請御正殿復常膳者天道甚密聖心不遐感極而災亦為祥誠至而妖寧勝德臣某中賀臣聞殷湯以六事責躬止七年之旱宋景以一言修德退三舍之星歷代以來咎徵常有苟君能克已則禍不移人伏惟皇帝陛下寅奉丕圖恭臨大寶遵符列聖酌憲前王昨者天象之間星文稍異載深歸咎爰用覃恩倉箱畢復于九年羅網並開其三面去營繕絶蕩心之巧申寃結除滅耳之俘而又正殿不居大庖盡減精誠昭達懇惻敷聞芒焰遽銷晷度如舊况蕞爾戎羯正犯疆場載思星見之徵恐是虜亡之兆伏惟稍寬聖慮以擁皇休遵九廟之降祥副兆人之欽屬臣又聞皇王之事天也雖至理之時不遺於憂畏雖至和之氣不忘于將迎是故神農焦勞軒帝憔悴堯既癯瘠舜亦胼胝此四主側身于昔時陛下用心于今日千載符契萬方懷柔臣常忝內朝今居近甸拱辰不及空瞻北極之尊就日無因忽覺長安之遠惟知忭蹈莫可奮飛况時及初正禮當元會華夷畢至玉帛皆陳小國行人外藩下士皆得入趨鳳闕仰望獸樽臣獨限關河坐縈符竹戀既深而詞懇慶巳極而涕零無任感恩賀聖鬱戀屏營之至臣某言臣得本州進奏院狀報稱元日皇帝陛下御含元殿受朝賀者上正三辰下臨萬國事雖舉舊命則維新臣某中賀臣聞聖祖垂訓王者處域中之尊公羊紀時春者為一歲之始載稽故實抑有典章近歲以來此禮多闕或事因惜費或時屬告休伏惟皇帝陛下道被無垠政敷有截全取發生之德無非欣合之仁蒼昊降符黃輿告瑞石碑既見文作太平銀甕旋臻字成萬歲而又憂勤不輟刻責方深精誠旁達于八紘懇惻上通于九廟仙厨撤味獸館休畋遂使化妖宿為壽星變小飢為酺飲慶由聖感令屬神行爰在新正式修闕典彤庭列位丹陛陳儀凝旒而天啓其門服衮而日升於觀巽風發越解澤滂沱左右賢臣駿奔多士國無諛佞擢靈草而不搖朝絶姦邪儼神羊而莫動禮成而退物有其容足以光耀瑤圖丹青玉版耀前映後邁五登三臣竊訪碩儒遠徵舊典帝堯華封之祝惟止匹夫神禹塗山之義且非元會然猶堯有多憂之戒禹存後至之誅在和平而尚乖孰歡呼之可致豈與茲日而得同年臣方守河潼正分符竹不獲躬承玉帛首率梯航况又嘗以藝文叨居禁密雖遠離天上猶近關西忭賀空深就望無所心馳紫闥非夢寐而不通魂繞皇闈羡歸飛而莫及無任荷恩祝壽戀闕屏營之至臣某言臣伏奉正月九日制書郊禋禮畢改元為某大赦天下者既事虞郊復新堯歷天潢瀉潤日觀揚輝普天率土罔不慶幸臣某中賀臣聞君人之孝莫大於尊祖王者之敬孰踰干事天故必用因高之儀伸嚴配之禮百神攸序萬靈昭蘇乃可覃殊澤渙大號禮成而德備惠敷而慶宏然而秦尚武功先祈禳之事故柴燎蕭薌未必饗漢稱文物重神仙之道故雲門太蔟未必和既不講于禮官終致譏于儒者伏惟皇帝陛下與春生育並日照臨究三代之質文酌百王之損益定午位卜上辛潔齋之誠先掃除而遐達孝思之志協氣臭以升聞然後推作解之恩降惟新之令設科以招諫諍宥過以務哀矜巳責既恤于三農録勳無遺于十代頒粟帛而養耆老走牲幣而遍山川舉皇王之廢官盡古今之能事臣當時集軍州官吏丁寧告示訖况臣嘗奉恩光叨居華顯當太史撰日之際猶立漢庭及宗伯相儀之時巳辭魏闕怊悵郡印徘徊使車徒深傾藿之誠實積懸匏之歎召公邑內敢思棠樹以追蹤尹喜宅中惟望靈符之復出臣不勝慶幸踴躍之至臣某言臣伏奉去月八日制書授臣前件官臣即以某月日到任上訖當時集軍州官吏僧道耆老等揄揚王化宣布睿慈連營咸鼓于巽風闔境均霑于兌澤臣某中謝臣才謝漢飛義慙燕使獻書求試學劒邀勳大舸千艘早竊樓船之任勝兵萬數晚兼車騎之名雖任在啓行而時當柔遠珠崖銅柱祇務廉平麻壘艾亭莫能恢復旋屬皇帝陛下荊枝協慶棣萼傳輝臣得先巾墨車入拜丹陛蘭臺假號署參榮奉漢后之園陵獲申送往掌周王之廩庾方切事居不謂遽董戎旃還持武節賜國既高于七命承家又慶于重侯維彼璧田實聯鼎邑古之近甸今也雄藩想像汝南星聚而先賢未遠經過穎上水濁而強族皆除况在昔年常鄰多壘載瞻軍額深見士心貴忠孝之兩全則忠可移孝正文武之二道則武可輔文將謀將領之能必重英豪之選豈虞拔擢乃去孱微謹當阜俗而必致人和貞師而不為兒戲使流庸自占驍悍知方任棠水薤之規臣當可復黃霸米鹽之政臣亦不遺粗勤報效之資用贖貪叨之責奉違軒鏡幾落堯蓂比園葵以自傾晝惟向日羡海槎之不繫秋則經天感激而淚血沾衣兢憂而汗雨浹背無任感恩戀闕兢惕屏營之至臣某言臣聞事君以忠者所宜效死食君之祿者亦戒妨賢苟非內慊私誠外憂官謗則安肯固辭武節強委信圭拒七命賜國之榮捨萬里封侯之策必知不可安敢無言臣某中謝臣因緣代業遭逢聖時竊嘗有志四方不掃一室奉隨武之家事無愧陳辭纂鄧傅之門風不傷清議屬者每憂不試深因媒自薦之書朝投象魏殊常之澤暮降藝香其後契濶星霜羇離戎旅從軍王粲徒感所知草檄陳琳亦常交辟呂元膺東周保之日李師道天平畔援之時潛入其徒盈于留邸臣此時尚持白簡猶著青袍元膺知臣傳劒論兵本于仁信佩鞬插羽亦識孤虛俾以發姦假之捕盜幸無容刃以及焚巢旋帶銀章俄分竹使隼旟楚峽出以分憂熊軾鄖城忽然通貴豈意復踰五嶺更授再麾中間叨相青宮忝司緹騎才通閨籍又處藩條越井朝臺備經艱險貪泉湞水益勵平生是甘馬革之言常懼武皮之誚及聖造遠流南極許拱北辰黃犢留官胡牀挂柱如生羽翼若出嬰羅誓以歸彼冗員處之散地俄以朝那闕守昆壤須人一去闕庭五罹寒燠處京畿五百里之地控蕃寇數十州之多提鼓燒烽增埤濬洫雖國家遠追上策不事交爭然蛇豕難防犬羊易縱苟罷嚴徹警則負約渝盟臣自受命以來為日斯久未嘗一日不修戰格未嘗一日不數軍儲使士有鬬心人無虛額使之偵候咸亦聞知尚未能率厲驍雄揣摩鋒鏑遠收麻壘直取艾亭成大朝經武之威畢微臣報主之分可書竹帛不辱旗常蓋以久處炎荒備薰瘴毒內搖心力外耗筋骸雖馬援據鞍尚能矍鑠而班超攬鏡不覺蕭衰恐無以早就大功久當重任自思已熟求退為宜伏惟皇帝陛下道冠百王功高三代照臨若日覆露如天况今國不乏人時稱多士有才略在臣之右齒髮少臣之年俾代處是邦遞臨斯位以之責效誰曰不然俾前達後生皆無蔽滯由中及外得以交相成陛下適時之方減微臣固寵之責臣不勝祈恩懇迫之至謹差某官奉表以聞臣某言今月某日得本道進奏院狀報今月六日宰臣鄭某等率三省官屬入論皇太子事者褫魄疆場馳魂輦轂莫知本末伏用驚惶臣某中謝臣聞禮贊元良易標明兩是司匕鬯以奉宗祧華夏式瞻邦家大本自昔質文或異步驟雖殊既立之以賢則輔之有道北宮養德東序承榮務近正人用光繼體周則周公為太傅太公為太師漢則疏氏二賢商山四老內揚孝道外盡忠規猶在去彼嫌猜辨其疑似不由微細輕致動搖乃得守三十代之丕圖延四百年之景祚著于史册煥若丹青伏惟皇帝陛下道冠百王功高三古事窺化本謀洞幾先皇太子自正位春坊傅輝望苑陛下旁延雋乂以贊溫文並學探泉源氣壓浮競嗜魚不進求玦莫從有王褒之獻針無卞蘭之奏賦今縱粗乖睿旨微嗛聖心當以猶屬妙齡未加元服或攜徒御時縱逸遊樂野夏儲亦常觀舞南皮魏副屢見飛觴陛下睿發慈仁殷勤指教稍踰規戒即震威靈雖伐木析薪必循其理而逝梁發笱亦有可虞抑臣又聞父之於子也有嚴訓而無責善君之於臣也有掩惡而復録功故得各務日新並從夕改同置于道不傷其慈儻犯在斯須便遺天性過當造次遽抵國章則以古以今孰為令子在朝在野誰曰全臣虛牽復之微言失不二之深旨伏惟陛下侔覆育于天地霽赫怒于雷霆復許省勵宮闈卑謝師傅蹈殊休于列聖慰欽矚于兆人臣才則荒涼志惟朴騃因緣代業蒙被官榮竊諸侯之土田領大將之旗鼓當車折檻合首他人瀝膽剌心正當今日而名非朝籍務切軍機道阻且修佇立以泣龍樓獻直戴逵之詞翰莫聞鳳闕拜章張儼之精誠未泯干冒宸極無任隕涕祈恩之至謹遣某官某奉表陳論以聞臣某言今月某日中使某至奉宣恩旨加授臣某官依前充四鎮北庭行軍兼涇原等州節度營田觀察處置等使散官勳賜如故并賜臣官誥一通者初謂風傅忽從日下怔忪自失忭舞不能臣某中謝臣夙探史册頗究職官尚書則虞曰納言兵部乃周之司馬是司九法爰統六師歷代以來非賢不處田穰苴之文武始議超居張孺子之尊崇方宜入拜罕有以茲名器遠假藩維况臣識愧通人號非名士藝香補吏方同班固之私循象魏獻書有異東方之自薦因緣蔭第齒列周行乃藉時來不期官達屬者出征海嶠再撫蠻陬獨向一隅遂踰萬里王邵伯之犢生則還官吳隱之之魚食寧去骨粗無悔咎得及旋歸才望京華又分旄節擁戎馬于涇上獲田穀于回中罷講艨艟學燒熢燧四頒堯歷一別漢庭蔥嶺猶羶雪山未復拔劒而憤彎弧不平豈謂皇帝陛下收雲中長者之名録義陽絶域之志暫寬乃眷即議酬勞借寵于總軍分榮于整武前叨末塞後忝轉加紀在綵箋卷之瑤軸然臣退思其所內顧其能貪天之功前經攸戒受爵不讓古人所非富哉是言服之無斁高封大邑君親誠用以推恩銘座循墻臣心詎忘于揣分自昔避乎全盛懼彼高明度其私誠豈徒虛飾直恐任踰其量事過其涯則鬼亦害盈天能概滿因循且爾顛覆隨之雖在至愚實知斯義伏惟皇帝陛下溫以煦物曒而燭幽待乞追還使臣寢息嚴命苟臣重憑廟略粗振兵威少能斷臂扼吭下城徇地此而進律庸敢自媒俟陶侃之書勳方加羽葆待班超之立績始議鼓鼙使遷擢之有章亦望位而相稱臣某不勝志願懇迫之至謹差押衙某官某馳奉恩告陳讓以聞臣某言今月某日得本道進奏院狀報今月某日以皇太子奄謝東宮輟今月十三日至來月一日朝參者前星失色少海驚波欷結一人悲廠田坴萬國臣某誠涕誠咽頓首頓首伏以皇太子地當守器賢可承祧金馬銅羊早開正位鸞旌雞戟方慶修齡豈謂舋屬黃離禍生蒼震宣猷庭內秋冬之學空存博望苑中監撫之儀莫覩伏惟皇帝陛下悼深伊將念切瑤山嗟上賓之不留惜外陽而無驗青宮掩涕元圃酸心臣限守邊隅久違京闕不獲奔走奉慰闕庭無任悲咽惶慕之至臣某言臣聞螻蟻知雨雖通感于元天蒲柳望秋必凋華于厚夜况臣攝生寡要將命無方寒暑頓侵精神坐竭竈乏傳薪之火餘焰幾何隙無留影之駒殘光即盡叩心戀闕忍死封章呌白日而不回望青天而永訣臣某中謝臣雖忝望族本實將家自先臣出總郊圻遇大國靜無師旅被服元化翺翔盛時遂與季弟參元俱以詞場就貢久而不調因以上書自薦求通干時預試藝香作吏始筮仕于德宗瑞節臨戎復分憂于陛下雖性分有限而忠誠不移固無韓彭為將之能實慕趙竇散財之義兩踰嶺嶠四建牙旗約已潔身絶甘分少良田五頃慮莫及于子孫厚祿萬鍾惠頗霑于賓客恭承詔命以守藩條而掌事者徒以元和中呂元膺留守東都李師道潛謀洛邑託以郡邸入之甲兵臣當時為元膺賓僚值師道竊發藍衫不脫竹簡仍持因為麾兵虜其元帥遂以將材相許戎統見期頡頏遐途纂修舊服光陰荏苒遷授頻仍昨者分領許昌兼臨河內當上黨阻兵之始是孽童拒詔之初臣方將奮勵疲駑指揮精鋭所冀解鞍赤狄息駕晉城大攘蜂蠆之㣥以雪人神之憤自前月某日後軍聲大振賊勢少衰人一其心士百其勇燕頷有相曾無定遠之期馬革裹尸實負伏波之願而精誠靡著志望見違援桴之意方堅就木之期俄及忽自今月某日疾生腹臟弊及筋骸藥劑之攻擊愈深神祗之禱祠無益固巳騰名鬼録收氣人寰復然無望於死灰更起難同于仆樹然臣素窺長者曾慕達人省知變化之端粗識死生之理豈其有貪富貴敢冀長延但以未報國恩未誅賊黨視胄長免對弓莫彎思犬馬以自悲悼鐘漏之先迫志有所在傷如之何撫節而乏淚可流伏韜而無血可衉臣某中謝其行營三軍巳舉牒差某官某河陽留務差某官某懷州留務差某官某訖並皆授之方略各有司存竊計旬日必無逗撓臣又伏思任司農大卿之日授忠武統帥之時紫殿承恩彤庭入對躬瞻堯日親沐舜風獲覩陛下神武之姿獲聞陛下憂勤之旨即北藩小寇東土微妖亦何足煩陛下之甲兵汚陛下之鈇鑕伏願時推明略光啓睿圖內則收德裕讓夷紳鉉之嘉謨外則任彥佐元逵宰沔之威力廓清華夏昭薦祖宗然後瘞玉勒成鏤金垂烈臣雖百死復何恨焉臣精爽已虧言辭失次氣無復續蒙以纊而莫勝口不能言飯用貝而何益故國千里明君萬年永捐覆載之恩長入幽冥之路殘魂不昧雖溫序之思歸枯骨有知遇杜回而必亢回望昭代哀號不能無任荒惙攀戀之至謹奉表代辭以聞
