front:
  text: 全唐文欽定全唐文卷五十一德宗二
  hash: sha256:9d0ac1068ad344ed3d42fee2749ecd498fb9615dd4d6e8131429c8811f2be319
body:
  text: 見危致命之謂忠臨義有勇之謂烈惟爾克勵臣節不憚殺身惟朕式嘉乃勳懋昭大典曰台不德罔克若天遘茲殷憂變起都邑惟爾卿士嗷然靡依逼畏所加淄澠共混故開府儀同三司檢校禮部尚書司農卿上柱國張掖郡王段秀實操行嶽立忠厚精至義形於色勇必有仁頃者常鎮涇原克著威惠叛卒知訓咨爾以誠賊泚藏姦欺爾以詐守人臣之大節洞元惡之深情端委國門挺身白刃誓碎凶渠之首以敵君父之讎視死如歸履虎致咥噫天未悔禍事乖垂成雄風壯圖振駭羣盜昔王蠋守死以全節周顗正色而抗詞惟我信臣無愧前哲聲聞寰宇義冠古今足以激勵人倫光昭史冊不有殊等之賞孰表非常之功爰議疇庸特超限著之甲令樹此風聲可贈太尉諡曰忠烈宣行史官仍賜實封五百戶莊宅各一區長子與三品正員官諸子並與五品正員官仍廢朝三日收京城之後以禮葬祭旌表門閭朕承天子人臨馭億兆一夫不獲則曰時予之辜況誠信不達屢致寇戎使抱義之臣陷於凶逆有臨危致命歿而愈彰有因事成功權以合道苟利社稷存亡一致酬報之典豈限常員並委所司訪其事蹟續具條奏當加襃異錫其井賦圖形雲閣書功鼎彞以彰我有服節死誼之臣傳於不朽閒者變興京邑朕播越奉天李懷光仗義帥師自遠赴難逆黨奔潰危城解圍錄其茂勳嘉其明節所以任崇元帥位極上台而祿滿盈慮迴惑信受閒諜自生疑貳朕以匡復大計藉其成功曉諭將相禮待殊厚而野心不革狂顧逾甚欺誘羣帥襲奪衆軍誣陷信臣拒違詔命與朱泚結固通使往返放肆凶威彰示狂逆務為劫脅迅發醜言萬情失圖諸將咸憤所以重茲巡狩越次梁岷違奉宗祧淪汙士庶撫心自咎良增愧歎寔由朕格物之誠不至知臣之鑒不精永惟此軍功著王室安祿山之作亂肅宗以朔方之衆復區夏僕固懷恩之縱逆代宗用朔方之師靜關塞洎朕涉此多難露處奉天內則擐甲登陴外則歷險赴難寒不挾纊夜不釋戈邦國不傾寇仇斯屏竭誠致命力衆一心朕方期收復皇都策勳命賞永同休戚大報功勞豈圖餘孽未平叛臣連禍臨制將士莫由自申憤激於中誓不同惡每一念此惻然疚心猶以懷光舊勳務於容貸其副元帥太尉中書令河中尹朔方等諸道節度觀察等使宜並罷免改授太子太保其所管兵馬委本軍自舉一人功高望重者便宜統領速具奏聞當授旌旄以從人欲應朔方及諸軍在行營并奉天兵士春衣等時方暄熱並未支給每想暴露豈遑安居今江淮轉運般次即至續當支遣朕知朔方將士忠順惜朔方將士功名所以殷勤再三視遠如邇斯言必信毋自棄焉朕越自邦畿至於梁漢而庶尹卿士各勤其職雄以鋒刃之下倉卒遇害親戚阻絕孤魂何依豈不以予一人不德而使子大夫罹其禍也永言憫惻增軫於懷爰申寵贈俾如常典李懷光往因職任頗著幹能朕嗣位之初首加拔擢託為心膂授以旌旄頃歲河朔不寧令往征討任兼將相恩極邱山及朱泚猖狂誘姦作亂擾動京邑逼迫奉天懷光率領全軍奔赴國難凶逆逃遁宗社再寧保安朕躬實有所賴委元帥河中府之權兼太尉中書令之秩廣增戶食賞及宗親人臣之盛莫與為比豈朕於懷光不盡豈朕報懷光不崇京邑未收嫌釁巳搆被朱泚潛使姦人說誘又受張佋等惑亂之辭曾不覺知自生疑阻遂與元惡通和往來朕志在推誠事皆掩覆禮遇轉厚委任轉深都不悛心凶惡日甚勅書慰問將士懷光並不令宣三軍咸欲收城懷光並不令出自云巳共朱泚定約不能更事國家兼朱泚所遣來人令見宣慰勅使公言迫脅無復君臣朕以眇身獲承鴻業務全大計遷幸山南蒼黃之閒備歷危險賴朔方等軍將士保守忠義恥陷惡名不謀同辭誓守臣節懷光知將士之意不可改移徑往河中偷安朝夕據有罪迹情實難原然以奉天解圍嘗著勳烈昨又遣男璀等謝罪懇請束身歸朝朕憫其改過之誠念其赴難之效以功贖罪務在優容令給事中兼御史大夫孔巢父齎先授懷光太子太保勅牒河中宣慰訖三日內便與懷光同赴上都所在保護不得邀截驚動違者按以軍令仍許懷光將百人巳下隨身防援如欲使令家口同行亦聽懷光若至闕庭必保全終始厚恩寵命待之如初仍賜實封五百戶子孫承襲代代無絕信如皦日朕不食言朔方軍素推忠義國家每有危難未嘗不立大功子儀兩收京城皆是此軍之力昨又遠從河北來赴奉天逆賊畏威望風奔遁眷言殊績朕豈暫忘其事將士各竭忠志叶心勠力橫遭迫脅無路自申每一念之痛心自咎比者君臣阻隔只為懷光一人今懷光自請入朝猶捨其罪況諸將士並是功臣各宜坦然更勿憂慮所有官爵實封並賜名定難功臣一切如故仍準元勅超五資與改轉朕臨御萬方失於君道兵革不息於今五年閔衆庶之勞悔征伐之事而李希烈蔑義棄德反道虐人朕哀彼生靈陷於塗炭苟存拯物不憚屈身故於首春特布新令赦其殊死待以至誠使臣纔及於郊圻巨猾巳聞其僭竊酷烈滋甚吞噬無厭將相大臣咸懷憤激繼陳章䟽固請討除朕以所行天誅本去人害兵戈既接玉石難分言念勳臣橫遭脅制雖思改革厥路無由乃受汚終身啣冤沒代淪胥以逞誠可痛傷豈孽自一夫而毒流萬姓為人父母寧不愧懷宜令諸道節度使將欲進軍先加曉諭王師致討唯止元凶所有脅從一切勿問如能去逆效順因事建功明設科條以示襃勸朕一經播遷久曠禮儀不唯霜露之感實貽失墜之憂賴先澤在人上帝臨我克平大難載復舊京方欲展禮郊丘請罪宗廟而乃股肱卿士詢謀異同明孝敬之大端陳古今之正義三省章表深體乃誠以義制心允從衆請予之不德愧歎良深其來年告謝郊廟百寮請俟後期者可之其元日御含元殿準式君臣之義生錄其功沒厚其禮況才優任國忠至滅身朕每興歎勞於寤寐故光祿大夫守太子太師上柱國魯郡公顏真卿器質自天公忠傑出出入四朝堅貞一志屬賊臣擾亂委以存諭拘脅累歲死而不撓稽其盛節實謂猶生朕自貽斯禍慚悼靡及式崇嘉命兼延爾嗣可贈司徒仍賻絹帛五百端米三百石男頵碩等至喪制終後所司聞奏超授官秩諸道節度觀察使所進耕牛委京兆府勘責有地無牛百姓量其產業以所進牛均平給賜其有田五十畝巳下人不在給限瑟瑟之寶中土所無今產於近甸實為靈貺朕不飾器玩不尚珍奇嘗思返樸之風用明恭儉之節其出瑟瑟處任百姓求採不宜禁止朔方及諸軍應在河中將士頃赴奉天濟朕危難皆是功臣懷光脅其妻孥脫身無路朕屬者下詔招諭官爵實封一切如舊雖獲於陣上亦無所傷皦然此心無負忠義今馬燧渾瑊並諸軍勝捷相繼河中將校歸降頗衆皆奉國捐家足以見軍士之心興言感歎宜加優撫宜以馬燧渾瑊充招撫使棄逆歸順一切不問歸順將士仍別建營屋優給任用各盡其才所在誘諭務稱朕意朕祗膺祖宗之業猥臨億兆之上任大守重不敢康寧永懷萬事之統懼有所闕夕惕若厲中夜以興求賢審官期於致理而政化猶鬱太平未臻思得海內忠良竭誠規諫洎經術之士才略之臣以明教化以立武事惟茲三者政之大經慮巖穴之閒尚多遺逸故科別條目廣延異能賢良方正能直言極諫韋執誼等達於理道甚用嘉之位以旌能宜升秩敘其第三等人委中書門下即超資與處分第四等人即優與處分第五等人即與處分嗟乎強學以待問進德以及時昔公孫宏猶聞十上失之正鵠必反諸身凡為多士宜各自勉郊祀之禮本於至誠制禮定名宜從事實五方配帝上古哲王道濟蒸人禮著明祀論善計功則朕德不類統天御極則朕位攸同而祝文稱臣以祭既無益誠敬有黷等威此豈朕禋祀聰明昭格上下之意前京兆府司錄參軍高佩上䟽其理精詳朕重變舊儀訪於卿士申明大義是用釋然依從改正以敦至禮自今巳後五方配帝祝文勿稱臣餘禮如舊百辟卿士實惟股肱頃屬艱虞損家殉節累經寇難靡不困窮洎復上京薦遭歉歲官俸既薄公田不收外虧導從之儀內懷凍餒之戚朝列尚爾蒸人何堪軫於深衷良用愧惻應文武常參官等宜共賜錢七萬貫委度支據班秩職事及所損職田多少量等級從今至明年四月以來隨月支給凡厥多士宜悉朕懷朕以眇身仰承列聖不能纂修先志以洽昇平馴致寇戎屢興兵革上元降警蝗旱為災年不順成人方歉食言念於此實用傷懷是以齋心別宮與人祈穀雖陽和候而黔首無聊稱慶於予竊所不敢其來年來正月一日朝賀宜罷滌有禦災之術有字物之方人不流亡事皆辦集惟是一邑之內獨無愁怨之聲古之循良何以邁此可檢校工部員外郎兼本官賜緋魚袋並賜衣一襲絹一百匹馬一匹凡百君子各宜自勉李希烈負恩作亂刦脅平人朕念生靈無辜務欲息兵捨罪累行赦令皆許自新言必再三事出誠素此朕含垢忍恥屈法為人之心天下所明知也希烈又固執凶圖驅脅將士違我詔命犯我軍兵今月三日遣偽署申隨唐鄧四州都知兵馬使杜文朝率馬步五千人入襄州北界山南東道節度使樊澤勒兵馬與戰大破其徒斬級擒生盪除略盡又於陣上生擒杜文朝及大將馬坦然等此皆朕德不昭感教未敷行致使平人脅從逆命其帥有罪其人何辜朕所以省表悼心感事增歎猶冀改過尚可息兵明稱屈己之心式洽好生之義其陣上生擒將士馬坦然等七百九十人宜令樊澤給衣服糧食並却放還并寫前後赦文勅命宣示淮西將士等有能向化者準赦令一切不問官爵如初其傷痍未盡復者並委醫療令其得所其陣上所殺人宜差所繇官於側近埋瘞兼立碑記無使暴露鬱吾春和其杜文朝身領全軍事得繇己不能歸順力屈就擒待到日當有處分風雨等師升為中祀有烈祖成命況在風雨事切蒼生今雖無文朕當屈己再拜以申子育萬姓之意開元禮國家盛典列聖增修今則不列學官藏在書府使効官者昧於郊廟之儀治家者不達冠婚之義移風固本合正其源自今巳後舉選人有能習開元禮者舉人同一經例選人不限選數許集但問大義一百條試策三道全通者超資與官義通七十條策通二道巳上者放及第巳下不在放限其有試官能通者亦依正員官例處分其明經舉人有能習律一部以代爾雅者如帖義俱通於本色減兩選令即日與官其明法舉人有能兼習一經小帖義通者依明經例處分左右金吾及十六衞將軍故事皆擇勳臣出鎮方隅入居侍從自天寶艱難之後衞兵雖然廢闕將軍品秩尤高此誠文武勳臣出入轉遷之地宜增祿秩以示優崇並宜加給料錢及隨身糧課仍舉故事置武班朝參其廊下食亦宜加給其十六衞各置上將軍一人秩從二品左右金吾上將軍俸料次於六統軍支給欲求致理必藉兼才文武遞遷不全限隔自今內外文武缺官於文武班中量才望相參敘用仍依故事於本衞量置衞兵所司條件以聞昔我皇祖光宅天下厎綏四方修德以安邊悅近而來遠朕嗣守丕構姑務息人頃以西蕃載申信約蓋欲惠康庶士協靜封陲而戎狄無厭大棄明義入我河曲害我生靈鹽夏兩州淪陷蕃醜哀此蒸庶家業流離去父母之邦捐骨肉之愛繇朕薄德俾人罹殃興言疚懷若墜焚灼側身惕慮豈敢遑寧所宜省躬深自咎戒今視朝避正殿十五日百僚奏事悉於延英處分庶答天譴用惕深衷咨爾三事大夫洎於百辟所宜一乃心力共弼予違式佇嘉謀克清寇患宣示中外使悉朕懷比者卿士內外朝夕公務今方隅無事蒸民小康其正月晦日三月三日九月九日三節日宜任文武百僚擇勝地追賞每節宰相常參官共賜錢五百貫文翰林學士一百貫文左右神威神策等十軍各賜五百貫金吾英武威遠及諸衞將軍共賜二百貫客省奏事共賜一百貫委度支每節前五日支付永為常制蕃寇雖退疆理猶虞安邊之策必有良算各委常參官具所見封進每坐日三四人陳奏利害古稱俯就是謂通喪恩之所加禮亦有變銀青光祿大夫前行光祿卿員外置同正員駙馬都尉張茂宗華冑恭仁溫良美茂當申下嫁之命式寵舊勳之家頃屬待年俄聞在疚以其倚門之訓且在遺言築館之期當從先近俾參秩於環衞以承榮於湯沐可雲麾將軍起復左衞將軍員外置同正員駙馬都尉
