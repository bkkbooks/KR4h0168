body:
  text: 當貞觀之朝則廣開醫學及開元之代則親制方書爰在明朝宜遵故事方今暄熇在近疫癘是虞言念軍民宜加軫閔其邊遠戍卒及貧下農人既難息於苦辛宜偶縈於疾患地僻既無藥物家貧難召醫師遂致疾深多罹物故荷戈執耒皆展力於當年問疾賜醫宜覃恩於此日其諸處屯戍兵士令太醫署修合傷寒時氣瘧痢等藥量事給付大軍主掌以給有病士卒之家百姓亦準醫疾令合和藥物救其貧戶兼請依本朝州置醫博士令考尋醫方合和藥物以濟部人其御制廣濟廣利等方書亦請翰林醫官重校定頒行天下臣竊見明法一科久無人應今應令請減其選限必當漸舉人謹案考課令諸明法試律令十條以識達義理問無疑滯者為通所貴懸科待士自勤講學之功為官擇人終免曠遺之咎況當明代宜舉此科恭以肇啓鴻圖惟新黃屋左宗廟而右社稷率由舊章崇祖禰而辨尊卑載於前史雖文質互變義趣各殊式觀損益之規咸繫興隆之始伏惟皇帝陛下體元立極本義祖仁開變家成國之基尊奉先思孝之道言為軌範動合典墳起百代之哲王總一時之盛業據禮官議立四親廟允叶前文噓唏化北溟而歸南溟者豈籓籬之羽翼行西海而遊東海者非池沼之鬐鱗大鵬摶扶文鰩迅疾一息萬里壯哉偉哉所以二華截靈河不無擘者六鼇負仙島亦有釣人豈殊乎傑出一時雄誇千古開桓文之列國襲吳越之真王況牽牛婺女之奧區允常壽夢之故地犀渠鶴膝俗尚英豪煮海鎔山人多富庶有九溪六谷之廣通三江四瀆之饒非間世英奇豈能開創丕構非承家賢哲豈能光大勳門尊長纍朝綿聯數世今見吳越國矣武肅王以雄傑之姿居喪亂之代拂衣雲壑礪劍煙巖立勤勞於六十年間拓封疆於三千里外名光華夏誓著山河當四境多虞即主盟而稱霸及中原甫定即述職以來廷履行功庸富貴壽考已載於世家矣王爰居長德早己嗣承益昌家國之基復積子孫之慶方繄夾輔忽罹淪亡巨嶽其頺上元不憖英靈謝世德澤在人爰有嗣王克光前烈陳元方序先君之美胡伯始稱乃父之清乞書無愧之碑願列不刊之史皇帝孝治寰海仁守寶圖終覽奏章備明哀懇恩殊常品寵異㣥藩爰詔輔臣俾光先正序曰錢氏之系闕四字按氏族廣類風俗通曰周禮有錢府上士之官其後氏焉晉史有錢鳳宋史有錢樂之陳史有錢導戢前朝有配饗功臣巢公錢九隴近則有翰林學士右丞錢起光前映後皆見信書列派分枝咸為著姓曾祖宙纍贈太尉尊道貴德應運適時韞陸瑁之義風包王常之忠節德星聚處早光陳實之門仙鶴去時己云孫鍾之貴祖寬纍贈太師澡身浴德著信立誠幼則比其雙珠長則方於三虎簪纓劍佩生參臺省之資簠簋鉶登歿享公王之祭考諱鏐天下兵馬都元帥闕四字尚父吳越國王諡武肅七曜祥光五行秀氣躬嘗墮於九日夢曾到於八天項籍喑嗚人皆披靡甘寧謦咳敵己悚惶頃者土德崩離乾綱弛紊當戎馬生郊之後乃龍蛇起陸之時於是金璧延才英賢畢附豆觴撫士勇毅爭歸才思倚柱之謠尋應懸刀之夢苦身焦思沐雨櫛風戰波浪以拓城隍滅煙塵而靜邊鄙神資福地民詠樂郊所以翼子貽孫永使尊周輔漢王即武肅之第七子也諱元瓘字文寶杭州安國縣人也龍章鳳姿金相玉振五色露迥推溫潤九天霞別是輝鮮象弭宏開射雲鴻而中鏑金壺墨涌書巖石以成文智自神傳才由天縱馬鄭將闕一字於學校早洞禮經孫吳未演於韜鈐己明兵法薩孤延之沈勇電爇虯鬚豆盧績之至誠泉生馬足三時不害六府孔修理民則簡靜居懷恤物則仁慈在念銅斗鐵尺俾列肆以均平魚網兔罝試小民之遊惰五稼則分歧合穗萬民則棄戟捐矛每行皂蓋之春復繼緇衣之美王起家為鹽鐵發運巡官奏授尚書金部郎中賜紫金魚袋尋以偏裨許再思徐綰等狼心素野鼠首無恆忽搆狂謀私邀外寇田頵言惟樂禍志欲朋姦遽興烏合之徒將逞雞連之勢及聊加賞犒即請敘姻親荀家共舉於慈明郤氏果求其逸少遂請行而赴選用繼好以恤人雖駐危郊益宏善道俟銷釁隟尋卻歸寧既自孝以移忠宜經文而緯武承制改其端揆授以親軍左旋右抽每加訓整先偏後伍益顯機謀尋摧貔虎之師遂展鷹鸇之勢於是領吳郡組練破處郡妖狂牲牢才禡於軍牙露布己懸其賊首其後邊烽忽舉鄰寇相侵六奇先視於羸師三鼓俄觀於酣戰才交鋒鏑大廓氛霾陸征則活擒李濤水鬬則兼誅渦信既係俘囚而塞路收器甲以齊山邇後欲率鄰藩同修職貢知不從於藥石遂再動於征鼙王躬領舟師壓其闕一字境威生霆霹光奪雪霜熊羆畫布於江心雕鶚旌飛於天面火鎔鎖斷共仗奇謀箭壓舟平咸推敏智鯨噴駭浪龍吼驚濤擒賊將以尋誅獲戰船而猶在因茲大捷永絶相侵備奏豐功請覃茂賞自此曾無虛歲紹受明恩總青旌元纛之權兼黃閣紫垣之秩匡時濟代福國庇民事父事君惟忠惟孝尚父武肅王疾生六氣奠應兩楹欲嘗藥以無徵幾絶漿而過毀將茲冥福爰構嚴祠修道宮於割錦之坊創佛寺於布金之地紅樓紺殿豈殊七寶之金玉磬瓊鐘不讓五雲之境尋以恭承治命退國稱藩俯順㣥情割哀視事連營受賜比屋知恩給親族以優豐待友于而敦睦拱極之誠益至勤王之節不渝洎大晉開基中原無事續整梯航之禮益傾鐵石之心推戴既堅旌酬亦至封吳越國王授天下兵馬都元帥又授尚書令金印玉册闕一字黻闕一字裳並復世官可明朝獎九重城內解寶帶以頒宣十二間中選名駒而錫賚天福六年闕二字王以弟兄歸任絲竹張筵因抒嘉篇久吟警句別淚己多紅蠟淚離杯須滿緑荷杯詩罷酒闌情傷疾作其後融風忽扇烈焰俄烘駭愕既多虛羸遂甚上池之藥無效聚穴之香不神至八月二十有四日薨於瑤臺之正寢享年五十有五即以七年二月乙卯朔十九日癸酉備鹵簿葬於國城之南原禮也先皇帝初聞訃奏倍極悲傷久輟視朝厚頒祭禮王娶扶風馬氏故雄武軍節度使同平章事綽之女也賢明無對令淑罕儔玩圖史之華著組紃之妙如賓合禮逮下符詩方繄內助之功忽動早雕之歎手拳魯字既叶嘉祥腸繞吳門復彰吉夢先二年薨有子十三人嗣王宏佐粹和正氣嚴重英姿鵷雛著瑞世之文驥子騁睨雲之步無益之事略不經心非法之言未嘗出口咸推夙習共仰老成服周孔之楷模繼曾顏之士行實興門之良允乃搆夏之全材自罹憫凶共傷羸瘵楚棄疾正當拜處早顯神符孫仲謀未是哭時須從衆議尋知國事經稟朝恩行慶賜以合人心省科徭而求民瘼而況郭汾陽之將佐皆是公侯蕭丞相之宗親咸從軍旅同心協力送往事居市無易肆之喧戶有不扃之咏朝廷喜其嗣襲尋降渥恩便封列土之王用獎克家之子制授宏佐起復鎮軍大將軍左金吾衛上將軍員外置同正員檢校太師兼中書令鎮海鎮東等軍節度浙江東西等道管內觀察處置兼兩浙鹽鐵制置發運營田等使杭州越州大都督上柱國吳越國王食邑一萬戶食實封一千戶仍賜保邦宣化忠正功臣次年又加食邑七千戶食實封三千戶仍賜保邦宣化忠正翊戴功臣長子宏僎溫州靜海軍使先一年卒次曰宏稱東府安撫都指揮使次曰宏侑弓馬諸軍都指揮使次曰宏僔先立為吳越世子先一年薨次曰宏倧衙內諸軍副都指揮使檢校司徒次曰宏偡衙內諸軍左都知兵馬使檢校司空次曰宏俶衙內諸軍右都知兵馬使檢校司空次曰宏億衙內諸軍左右馬步都虞候檢校左僕射次曰宏偓宏儼宏仰並檢校禮部尚書瑤山並秀珠樹相輝學禮言詩咸聞博贍彎弧擊劍盡富韜鈐薑被同歡田荊永茂次曰宏儒為國披緇法號元悟捨王公之娛樂就法宇之清幽湯休尚著於文章支遁猶憐於逸駿有女四人三人各有粉田一人早棲禪宇王惠洽三吳威加百越近則同趙他士燮遠則方句踐闔廬服太叔之九言師宣尼之四教十朝獎重三紀光華擇吉日以宣恩選名臣而將命癸已歲命將作監李鍇為起復使戶部侍郎張文寶吏部郎中張絢為守中書令使甲午歲命給事中張延兵部員外郎馬義為册封吳王使乙未歲命右常侍孔昭序駕部員外郎張璹為册封越王使丙申歲命禮部尚書兼太常寺卿李懌戶部郎中姚遐致為吳越王金印使戊戌歲命禮部尚書兼太常卿程遜兵部員外郎韋稅充吳越國王官告使己亥歲命尚書右丞王延司門郎中張守素充吳越國王册禮使庚子歲命刑部尚書李懌膳部郎中薛鈞充天下兵馬元帥官告使辛丑歲命右諫議大夫高延賞兵部郎中李元龜充天下兵馬都元帥并尚書令官告使壬寅歲命太子賓客聶延祚吏部郎中盧撰為尚書令册禮使議者以王三端迥著五福俱全且夫體物緣情才思逸於盧駱象形會意筆法繼於歐虞補藝閣之舊編著錦樓之新集六角扇羲之讓美五朵雲韋陟慚工褒之者入雲霄挫之者墜泥滓孰不避王之筆端乎勇可抉門力能扛鼎燧象燧牛之智屢有成功添竈減竈之謀纍聞破敵射穿蹲甲彈落翔禽著白袍黑矟之威受玈矢彤弓之錫陸斷犀兕水斬蛟螭孰不避王之劍端乎智周物表言合機先能悅豫以使人善撫循而感物剛柔有節語默中規通白虎之㣥書繼碧雞之秀辨孰不避王之舌端乎爰自妙齡至於壯齒聳風姿而嶽立蘊氣度以川渟凡有位而必升至無官而可授天下之馨香已播人間之榮樂實多雖未及鮐背雞膚亦己有霜髯雪鬢豈不曰壽乎鎮千乘之邦食萬鍾之祿明珠大貝輻湊一方霧縠冰紈雲屯百帑龍猛之金闕一字頗小齊奴之錦帳未多採聲妓於娃宮合絲簧於綺閣豈不曰攸好德乎疾疹雖加襟懷不撓如浮雲之易散念急景之難停啓手足而保全傳箕裘而得所豈不曰考終命乎有是衆美夫何恨焉臣素乏口才仍疏腹稿方愧弼諧之績又虧紀述之能仰奉絲綸俾銘貞琬辭讓不獲漏略茲多雖文過江南不及韓陵之石而恩深浙右必同峴嶺之碑仰副聖慈謹為銘曰雲起龍驤化為侯王鴻騫鳳翥鶚立鷹揚凜然徑氣卓爾雄鋩大名之後五世其昌武肅開基奄有吳越恩洽百城名馳雙闕既委招懷復專征伐燾土苴茅秉旄仗鉞尚父棄代元帥承家傳榮集慶奕葉重葩有典有則去甚去奢威名烜赫事望光華談藪縱橫詞源浩渺曹植思遲崔儦書少月夕花朝猿巖雁沼筆落綵箋風清緑篠神傳射訣天富兵鈐龜文月角燕頷虬髯威能伏獸名可愈痁撫衆以惠待士持謙事必有恆政皆求理扶弱遏強先人後己但見偃風莫聞狎水阜康蒸黎廓清邊鄙量陂素廣德嶽彌高禮延耆舊令肅權豪庭趨忠烈府集英髦講論韜略獎勸勳勞自再稱藩益勤述職虔布詔條動遵楷式每陳貢輸常踰萬億表率方隅匡扶社稷功庸罕對渥澤無倫禮優伯舅位極人臣鎔金鏤玉龜紐龍綸永言當代莫繼芳塵禁暴戢兵取威定霸方賴控臨忽聞夢謝雲慘長空星沈永夜號慟軍民涕泗華夏初聞訃奏尋輟視朝深嗟旦奭不及松喬倍加贈襚久罷簫韶君臣分至水陸程遙間傑淪亡英賢繼襲劈踊悲摧無所逮及益務撫循加之周給人情既安兵威自戢一方肅靖三世輝榮朝宗事大誓表傾城欲光家世上奏聖明願書貞石用顯聲名金玉令人鼓旗良帥德盛功崇文經武緯述之莫窮言之無愧庶幾乎萬歲千秋人見之而墮淚礪漢乾祐二年為西京留臺侍御史周顯德初為知雜侍御史二年以太常博士權知宿州軍州事坐推劾弛慢除名臺司奉去年四月敕西京留司官員雖有留臺點簡故聞多不整齊宜令太子太師盧文紀都更提轄今有自去年五月後至今每稱疾請假最多太子太保王延太子洗馬張季凝舊例朝臣百日假滿落班簿延與季凝每遇百日將滿即一度赴拜表行香俱是拜跪不任昨高祖神主祔廟之時留司班列至彭婆鎮奉迎其主延只到五鳳樓前季凝稱有疾不出陳力就列往聖之明規拜表行香留司之常務既疾疢不任於出入筋骸難強於扶時所宜上稟憲章內思貪冒虔瀝退休之懇用循止足之文雖優宏繫自於朝廷而彈舉敢隳於職業嶠官郃陽縣令為宣武軍節度使蕭翰掌書記因隨入契丹翰誅無所依居契丹七載當周廣順三年逃歸自幽州西北入居庸關明日又西北入石門關關路崖狹一夫可以當百此中國控扼契丹之險也又三日至可汗州南望五臺山其一峰最高者東臺也又三日至新武州西北行五十里有雞鳴山云唐太宗北伐聞雞鳴於此因以名山明日入永定關北此唐故關也又四日至歸化州又三日登嶺嶺東西連亘有路北下四顧冥然黃雲白草不可窮極契丹謂嶠曰此辭鄉嶺也可一南望而為永訣同行者皆慟哭往往絶而復蘇又行三四日至黑榆林時七月寒如深冬又明日入斜谷長五十里高崖峻谷仰不見日而寒尤甚已出谷得平地氣稍溫又行二日度湟水又明日度黑水又二日至湯城淀地氣最溫契丹苦大寒則就溫於此其水泉清泠草軟如茸可藉以寢而多異花記其二種一曰旱金大如掌金色爍人一曰青囊如中國金燈而色類藍可愛又二日至儀坤州渡麝香河自幽州至此無里候其所向不知為南北又二日至赤崖蕭翰與世宗兀欲相擊遂及述律后戰於沙河述律兵敗而北兀欲追至獨樹渡遂囚述律於朴馬山又行三日遂至上京所謂西樓也西樓有邑屋市肆交易無錢而用布有綾錦諸工作宦者翰林技術教坊角抵秀才僧尼道士等皆中國人而并汾幽薊之人尤多自上京東去四十里至珍珠寨始食菜明日東行地勢漸高西望平地松林鬱然數十里遂入平川多草木始食西云契丹破回紇得此種以牛糞覆棚而種大如中國東而味甘又行東至裊潭始有柳而水草豐美有息雞草尤美而本大馬食不過十本而飽自裊潭入大山行十餘日而出過一大林長二三里皆蕪荑枝葉有芒刺如箭羽其地皆無草兀欲時卓帳於此會部人葬太宗自此西南行日六十里行七日至大山門兩高山相去一里而長松豐草珍禽野卉有屋室碑石曰陵所兀欲入祭諸部大人惟執祭器者得入入而門闔明日開門曰拋盞禮畢問其禮皆祕不肯言嶠所目見囚述律葬太宗等事與中國所記差異已而翰得罪被鎖嶠與部曲東至福州福州翰所治也嶠等東行過一山名十三山云此西南去幽州二千里又東行數日過衛州有居人三十餘家蓋契丹初虜中國衛州人築城而居之嶠至福州而契丹多憐嶠教其逃歸嶠因得其諸國種類近云距契丹國東至於海有鐵甸其族野居皮帳而人剛勇其地少草木水鹹濁色如血澄之久而後可飲又東女真善射多牛鹿野狗其人無定居行以牛負物遇雨則張革為屋常作鹿鳴呼鹿而射之食其生肉能釀麋為酒醉則縛之而睡醒而後解不然則殺人又東南渤海又東遼國皆與契丹略同其南海曲有魚鹽之利又南奚與契丹略同而人好殺戮又南至於榆關矣西南至儒州皆故漢地西則突厥回紇西北至嫗厥律其人長大髦頭酋長全其髮盛以紫囊地苦寒水出大魚契丹仰食又多黑白黃貂鼠皮北方諸國皆仰足其人最勇鄰國不敢侵又其西轄戛又其北單于突厥皆與嫗厥律略同又北黑車子善作車帳其人知孝義地貧無所産云契丹之先常役回紇後背之走黑車子始學作車帳又北牛蹄突厥人身牛足其地尤寒水曰瓠河夏秋冰厚二尺春冬冰徹底常燒器消冰乃得飲東北至襪劫子其人髦首披布為衣不鞍而騎大弓長箭尤善射遇人輒殺而生食其肉契丹等國皆畏之契丹五騎遇一襪劫子皆散走其國三面皆室韋一曰室韋二曰黃頭屋韋三曰獸室韋其地多銅鐵金銀其人工巧銅鐵諸器皆精好善織毛錦地尤寒馬溺至地成冰堆又北狗國人身狗首長毛不衣手搏猛獸語為犬嘷其妻皆人能漢語生男為狗女為人自婚嫁穴居食生而妻女人食云常有中國人至其國其妻憐之使逃歸與其筯十餘隻教其走十餘里遺一筯狗夫追之見其家物則銜而歸則不能追矣其説如此又曰契丹常選百里馬二十匹遣十人齎乾北行窮其所見其人自黑車子歷牛啼國以北行一年經四十三城居人多以木皮為屋其語言無譯者不知其國地山川部族名號其地氣遇平地則溫和山林則寒洌至三十三城得一人能鐵甸語其言頗可解云地名頡利烏干邪堰云自此以北龍蛇猛獸魑魅㣥行不可往矣其人乃還此北荒之極也契丹謂嶠曰夷狄之人豈能勝中國然晉所以敗者主暗而臣不忠因具道諸國事曰子歸悉以語漢人努力事其主無為夷狄所虜吾國非人境也韡周顯德二年官右補闕臣聞宣宗知民間之事則曰共理者其臣惟良唐太宗為天下之君且云刺史乃我當自擇是知雖皇王闕一字統馭闕七字子之闕三字於事有美有惡難將一馬同歸或隆或汚實類九闕一字相遠失人則苛政喻於猛虎得士則善吏闕二字良闕一字可不慎乎可不重乎皇帝纂丕圖臨萬有以授受難乎選以理治急乎才漸行日月之闕一字輾成古道終扇陰陽之炭銷盡兵鋒一日闕一字承闕一字曰衛州士庶列狀以聞述去盜之由稱守臣之美宜乎旌其長闕一字其闕一字命之刊勒闕一字其闕一字光乃敕朝請大夫行右補闕柱國臣杜韡闕一字乃銘之臣虔奉闕十字式闕三字固闕一字仁者安人斯其至矣盜亦有道其可尚乎矧乃抱奇闕一字之闕二字昂藏之闕一字奮迅於平陂綿亘於數闕一字誠大丈夫號闕一字太守闕八字回闕三字竹闕十三字卦豈同亡闕五字麟經闕一字契奔奉之事闕二字汾陽公其人也公名進闕一字州闕二字人也皇帝即位之年自登而牧衛維彼商墟闕四字任俠自尚剛壯相沿闕三字而闕一字疾成風橫緑波而流惡不盡公至止未幾闕二字而思且闕二字求中靜乎內而勸乎外闕一字身率下儉於己而便於人未有澄其沙而水之不清去其闕一字而木之不茂先之以力制次之以德攻化洽於斯何盜之有公集闕一字地闕二字於天府一度量闕三字謹出納闕一字間審重輕之數拔規求之闕一字塞闕二字之源闕三字先去其闕一字廩之闕一字乎夫馬寒則毛縮魚勞則尾赬物之生也豈有異哉公能闕五字之附益闕二字羊之闕六字得不謂先去其杼軸之盜乎闕一字之闕一字邑闕一字乃有經闕一字符令則削煩省督責則息費得不謂先去其簿書之盜乎闕二字於日中貨來於天下宏羊適至不韋未歸法前闕二字通同抑有司之侵利得不謂先去其闤闠之盜乎公人臨事以自懲貪吏因時而變態於是乎卜要衝之所布闕一字諭之文既革面以闕二字或洗心而尚晚俄乃付之逮闕二字以刑章夏蟲適性以疑冰夜蛾舞空而赴火或巢摧而梟散或穴闕一字以兔奔雖沿波之時固討源而是切且拔茅之後恐連茹以宏多回思顧望之徒闕一字設并容之術闕二字化之勉之撫之安之曰爾胡不盜天時地利以耕鑿超衣食之源爾胡不盜毛㣥介蟲以捕獵求山澤之産或剖石採玉或披沙汰金取之不為貪得之不為竊闕四字梁上偷生草中始務匿藏終貽勦絶明申闕一字甲休拘趙禮之兄盡滌昨非不問展禽之弟於是衆相謂曰嫉惡如讎公於國闕一字視民如子私於我闕一字聞其美言何闕一字酬於布帛服其異政何以答於袴襦由是闕一字其闕一字知其禁強梁者遷善返側者銷憂棄戟捐矛卻問農耕之早晚帶牛佩犢遂勤稼穡之艱難闕一字所謂靜乎內而勸乎外儉於己而便於人者也自然山闕四字清里閈戴若思之投劍誰預客船陶士衡之駐車不言官柳室家相慶上下咸和爾乃闕七字集醯酸而蛟至肉羶闕三字適桑土而長謠登春臺而胥闕一字可以闕一字乎孟可以召乎江山下火而為賁邱園雲上天而闕一字需酒食政既成矣獎闕一字至矣公神闕五字沉闕十字見風雲之氣洞達闕一字機命闕一字而闕一字藉時而闕一字蛟龍遇水闕四字雕鶚乘闕四字刺於坊磁又遷於闕一字登衛闕二字之才聲華迭闕四字鍊轉見晶熒樂至九闕一字益聞清越闕一字編清史闕一字紀闕五字赴童子闕二字源流闕一字爾闕一字卿賜三公闕二字千載交輝美矣盛矣論者曰闕一字之藏用在乎闕七字猛於闕二字自闕一字熊之後善闕二字民垂畏愛於闕一字門流忠孝於昭代闕庭稱闕一字風俗自新闕二字周有亂臣翻使衛多君子皇帝下闕一字書闕九字必闕一字倣側帽之闕三字效墊巾之闕一字其則不遠見賢思齊引而伸之則闕一字知矣紀太闕一字而有闕二字明府以居多未若當鈴閣之前於闕一字門之闕二字之貞玉傳之子孫臣幸闕一字楃斥闕一字曾闕四字鏤闕一字而見誚闕二字瓦以非工謬承聖主之恩用播賢臣之美凝神握管空成蝌斗之書拭目披文不稱闕二字之闕一字強抽祕思謹作銘云闕八字連珠有爛合璧無闕一字固本維何在民者矣共理闕二字擇人而己倬彼郭侯系我成周闕三字李事異闕一字劉鄉曲闕三字煙闕一字擊劍引闕二字弓開霹靂鼓隨畫角闕一字逐朱輪誰闕三字自樂行春始刺於坊今牧於衛闕一字海便宜闕一字川煩碎方圓並闕一字思愛齊闕五字盜散萑蒲帝王兮念功闕二字兮愛賜他山兮闕三字蓮兮贔屭闕一字之兮二天勒之兮八字剖竹兮有光操觚兮無愧
