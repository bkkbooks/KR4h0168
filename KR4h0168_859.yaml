front:
  text: 全唐文欽定全唐文卷八百五十九凝字成績汶陽須昌人年十九舉進士梁義成軍節度使賀王褱辟置幕府入後唐纍遷中書舍人工部侍郎晉初拜端明殿學士兼判度支轉戶部侍郎天福五年拜中書侍郎同中書門下平章事少帝嗣位加右僕射開運初罷相轉左僕射漢祖入立拜太子太保封魯國公周顯德初遷太子太傅二年卒年五十八贈侍中
  hash: sha256:e78e58bf44ecbcc2966512db32f4ed58f8fbfc4cd0f11f114e36151002fb2425
