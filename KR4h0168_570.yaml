front:
  text: 全唐文欽定全唐文卷五百七十柳宗元二
  hash: sha256:12bd9ea2212275b2dad289d542c908b1948ee12f93a1285275644e8fb4fd9feb
body:
  text: 臣某言伏以聖王之纂承天位也臣子必竭懇誠獻尊號安敢為佞禮在其中一則以告天地神祇二則以奉宗廟社稷三則以安華夏蠻貊巍巍大稱其可廢乎臣等誠歡誠望頓首頓首伏惟皇帝陛下協周文之孝德齊大禹之約身宏帝堯之法天過殷湯之解網未踰周月四海將致於時雍甫及元正率土更欣於再造然神人之願億兆之情有所不安率謂未盡善者以為帝德廣運而尊號猶闕郊廟備禮而祝嘏無辭凡百兢懷華夷屬望臣謹桉昔臯陶之頌舜伊尹之頌湯皆臣子至公面揚君父以敷於當代以播於無窮夫豈飾哉率由事實帝王尊號蓋漸於此皇家光被四表祖宗烈文時當太和尊號表德耳目所接簡牘斯存稽之於前典則如彼考之於聖朝則又如此今龜筮習吉元正戒期當品物惟新之時乃皇王大禮之日陛下郊天地享宗祧陰陽協和動植交暢不建至尊之稱恐違列聖之心所以臣等冒死陳聞請上尊號伏惟陛下小一作抑謙讓之節安延企之情特召名儒禮官百僚庶尹詳明故實議崇聖德則人望允厭神心獲安山川效靈光贊無疆之壽祝史陳信永彰不朽之功臣等蒙國寵榮備位班列無任懇望之至臣某等言臣等再陳丹悃謹獻鴻名天心未從隕越無措臣某等誠惶誠恐頓首頓首謹桉堯曰咨爾舜舜曰格爾禹湯曰吾甚武自號曰武王則堯舜禹湯皆當時王者之號也考皇帝之故實徵往聖之憲章允協禮經煥乎圖牒伏惟皇帝陛下允恭克讓約巳謙尊參天兩地之功為而不有安上理人之德置而不論至哉王言非㣥下所能仰望也然臣等伏以為尊號者所以類上帝饗祖宗萬人所稱百蠻所仰表聖德於率土播天聲於無疆臣下請之之謂禮帝王承之之謂孝孝大於讓禮先於謙百王不刊之典安可得而廢也臣等又以春秋本於五始元者一歲之首春者四時之首王者受命之首正月者政教之首郊天大禮者立極之首今天地交泰俯臨元辰正始之美正當其運陛下確違㣥願固守謙冲此臣等所以兢惕失圖恛惶無措上冒嚴憲敢逃厚責伏乞俯垂天聽察納微誠詔禮官議臣所請揆日推禮虔奉鴻休盡敬於此猶恐天光未照三獻無徵彷徨闕庭伏待斧鑕無任聳望之至臣某伏奉月日制陛下膺受尊號率土臣子慶忭無窮臣聞立極之大四海無以報神功配天之尊萬物不能崇聖德惟有徽號是彰中興所以上探天心下極人欲中謝伏惟元和聖文神武法天應道皇帝陛下統承千載光被六幽蟊賊盡除福應皆集有首有趾咸識太平勳臣增爵祿之榮戎士加賞延之寵片善必錄微功盡昇獨惟聖謨事絕酬答萬國觖望百工怨思是以啟元和之盛典延昊穹之景祚理歷凝命實曰聖文和眾定功時惟神武運行有法天之用變化乃應道之方鬼神協謀夷夏同志大禮既建鴻恩遂行歡呼遠匝於九圍滲漉普周於八裔慶超邃古美冠將來臣獲守蠻荒遠承大典潢汙比陋河清幸遂於千年塵壤均微山呼願同於萬歲無任慶賀屏營之至臣某言某月日諸縣耆老某等若干人詣臣陳狀辭意迫切以陛下尊號未復請詣闕上表者人心已鬱安可久違天意實勤諒難固拒撫狀感悅深契微誠臣某誠懇誠迫頓首頓首伏惟皇帝陛下聖神之功貫於天地文武之道超乎古今盛德愈大而謙光益深元化已成而徽號未復遂使神祇觖望人庶怨思沐浴鴻澤者敢懷晷刻之安捧戴皇恩者不知寢食之適負愧懷憤萬方一心日月以冀遂淹星歲况今地不愛寶致百穀之豐穰天惟降衷呈眾瑞而繁委汙萊瘠鹵之地混成大田草木蟲獸之微化為神貺萬靈垂鑒昭然甚明此而不從臣所大惑矧又兵戎永戢夷狄咸懷煦然長春樂以終日是以耆老等深感聖育踴躍不寧上奉天恩跼蹐知懼頓顙闕下願復鴻名不謀而同不期而至此皆上元幽贊以誘其衷列聖垂靈以悟其意臣以為陛下當敬承斯旨不可忽也臣又伏以陛下賞功與能舉賢出滯小言不廢片善是襃豈可使臣子之效雖微而必旌君父之德盡美而無稱凡在覆載不勝懇禱惶恐之至謹封耆老等狀奉表昧死陳情以聞謹言京兆府長安縣耆老臣石靈等言伏奉墨詔批答臣所請復尊號未蒙允許者捧對惶遽不知所裁天實命之於臣何有臣等誠懇誠懼頓首頓首臣聞聖君以奉天為心不以執謙為德以順人為大不以崇讓為優今陛下深拒天人之誠猶懷謙讓之道臣等愚惑未知所歸且百祥荐臻特表昊穹之睠五穀蕃熟用彰后土之勤億兆嗷嗷籲天請命上下交應幽明同心舉而違之臣所未識况臣等共被仁育同臻太和陛下德達上元以豐臣之衣食道躋壽域以延臣之歲年沐浴皇風二十餘載兒童感化鰥寡知恩故臣等出鄉之時歡呼遍野閭里勉臣以不進不止妻孥誓臣以不遂不歸惟竭血誠退無面目便當殞首闕下終不徒還伏惟陛下照臣懇迫之情哀臣羸老之命臣等不勝嗚咽慚恨之至謹奉表陳謝以聞臣某言臣伏以耆老等並發丹誠將貫白日請復徽號以光聖謨臣以其懇款自中不可禁止遂抗表陳請備述微誠伏奉墨詔批答未蒙允許者眾心尚阻天意未從懇迫愈深兢惶無措臣某中謝伏惟皇帝陛下道大益謙化成彌損雖江海善下每應朝宗之心而日月居高久稱照臨之位况復上承天命下覩人誠若然辤之理有不可伏以陛下功參造化政體乾坤萬邦宅心百靈效職此聖之至也明並兩曜信如四時先天不違窮神知化此神之極也道德純備禮樂興行宸翰動於三光睿藻窮於六義此文之備也五兵不試七德咸宣殊方者知歸負固者率服此武之成也黃龍皓兔甘露慶雲神禾嘉瓜祥蓮瑞木萬物暢遂百穀茂滋此天之至靈也黎老班白伏守闕庭鰥嫠童幼謠歌道路此人之至誠也有其德而無其號拒乎天而違乎人雖陛下謙讓之至美抑非臣心之所安也伏以賤志難明微誠莫達戴天彌懼履地益慚不任懇迫屏營之至伏願早建大號以稱天人之心謹再奉表昧死陳請以聞京兆府長安縣耆老臣石靈等言臣伏以陛下尊號未復一十九年盛德彌光大化益被加以休徵咸集福應具臻至於今歲紛綸尤盛風雨必順生長以時五稼盡登萬方皆稔神意人事正在於斯天不可違時不可棄臣等誠懇誠迫頓首頓首臣聞恩深必報德盛必崇以陛下九重之尊推崇無上以陛下四海之大報效何施惟有尊名用光聖理闕然未復誰所敢安臣心則微天意甚重伏惟皇帝陛下體昊穹以施化虔上帝以致誠今即萬祥應期百神奉職飛走之物皆已效靈草木之類咸能應聖天命降於上人誠發於中此而可辤孰云有奉况野多滯穗畝有餘糧足食之慶充溢於京坻阜財之謠歡呼於道路盡非人力皆是天成神祇之望既勤遐邇之心又迫况臣等得生邦甸幸遇盛明身體髮膚盡歸於聖育衣服飲食悉自於皇恩被元化而益深望鴻名而未覩懇禱之至夙夜不寧謹詣光順門昧死請復聖神文武之號以副天地宗社之心使海內赤子得安其所臣等不勝懇禱迫切之至謹奉表以聞臣某等言臣聞大道必體於至公大孝莫高於善繼上觀列聖旁考前王罔不俯就禮文仰承大事嚴奉宗廟慰安元元然後德教惟新邦家永固伏惟皇帝陛下寢苫泣血號慕無時貫於神明動於天地未臨庶政猶徇至誠凡在人臣孰不哀懼伏惟先聖遺旨俾陛下抑哀而聽政本朝乏人使臣等竭忠以奉上非敢懼死輒布懇詞期於必從以慰寰宇且王業至重軍國方殷一日萬幾不可暫闕伏願追尊顧命蹈履成規恢王者華夷之望順上帝乃眷之懷臣等不勝哀迫誠懇之至臣某等言臣聞聖凡殊途邦家異禮故王者捨己從物用身許天雖居達喪猶以事奪伏以大行皇帝道成鑄鼎僊等御龍萬姓長號九有禺望陛下以聰明睿聖嗣守寶圖爰及宅憂迨茲累日而孝思罔極尚輟乃雍之言庶政未釐頗闕如絲之命臣等嘗覽載籍麤知喪紀若成周顧命歷代猶遵西漢詔音前王所奉我國家以孝理天下文明應期上用此法胥以傳授蓋事歸至當則不可不遵禮貴從宜則不得不守理固然也臣等是以上陳愚懇輕瀆宸嚴冀遂血誠俯親國政而陛下執喪逾切聽理未聞億兆嗷嗷不知所訴臣以為天子之孝在於保安社稷司牧烝黎功超百王慶流萬代亦何必守臣下之小節蔑皇王之大猷固阻㣥情務成謙德伏願以遺詔為念奪在疚之懷就臨軒之制天下幸甚伏以萬幾至重遺旨難違再獻表章上塵旒扆精誠徒竭天意未迴內外遑遑人神企望臣聞王者之孝異於匹夫禮不相沿道資適變當承平之代故殷帝宅憂而不言遇有事之時則周王未葬而誓眾况今戎車猶駕邊候多虞兩河之寇盜難除百姓之瘡痍未合亂者思理危者求安天下嗷嗷正在今日誠宜抑其至性以副㣥心成先帝之大功繼中興之盛業豈可寢苫啜泣庶政闕然九廟之靈何報萬方之望何塞臣等職參樞近誠切邦家若陛下未忍臨軒尚持前志臣等有死而已不敢奉詔不勝哀懇迫切之至臣某言太子中舍嚴公弻至奉某月日敕書慰諭伏承陛下以某月日虔奉典冊允昇寶位凡在㣥生孰不慶幸臣某誠歡誠忭頓首頓首臣聞天地泰而聖人出雷雨解而品物榮是以五行迭用木火更其位十葉重光宗廟輔其德殷宗恭默再開成湯之業漢文聰明克承高祖之緒陛下重離出曜體乾繼統主鬯彰孝恭之美撫軍著神武之功欽承遺訓永保鴻業遏密之中施雨露以被物遐邇之地覩日月之繼明則四維之外八極之表人神胥悅草木皆春煦嫗生成不失覆載况臣謬膺藩守累受國恩爰自出身洎乎領鎮沐浴聖澤優游昌時不獲覩闕庭之禮展臣庶之分戴天賀聖倍萬恆情臣某等言伏奉今日誥今月九日冊皇帝改貞元二十一年為永貞元年自貞元二十一年八月五日昧爽以前應犯死罪特降從流流以下遞降一等者寶命方始聖歷用彰載宣臨照之明遂施渙汗之澤臣某等誠慶誠賀頓首頓首伏以重光下濟積慶旁行漢祖推奉教之尊文王遂無憂之志正名紀歷表運行於萬方宥過輕刑流汪濊於四海歡呼忭蹈遐邇攸同臣某等親奉聖謨仰承大化踊躍之至倍萬恆情無任蹈舞欣慶之至臣某等言伏奉今日太上皇制命陛下即皇帝位光奉寶圖丕承鴻業溥天率土慶躍難勝臣某等誠喜誠抃頓首頓首臣聞皇建其極存諸大訓帝出於震著在易經繼明以照於四方重熙以臨於萬國動植品彙永賴昭蘇山川鬼神咸用欣戴臣某等獲備班列親仰聖明踊躍之誠倍萬恆品無任忭躍喜慶之至臣某等言伏奉今月二十四日制廣陵郡王宜冊為皇太子改名某仍令所司擇日備禮冊命者天序有奉皇圖載寧臣某等誠慶誠賀頓首頓首臣聞尚書載以貞之文漢史傳早建之議不惟立愛期在繼明陛下奉率前規敷揚盛典顧茲守器之重爰正承華之位尊義方之教載錫嘉名崇建樹之禮式光典命以長而立自符於慎擇必子之選遂合於至公邦本不搖王業彌固此皆宗社垂祉啟佑皇心乾坤合謀保安聖運足以播休氣於四海洽太和於萬靈食毛含齒所同歡慶臣等奉承制命蹈舞周行踊躍之誠倍百恒品無任慶忭感悅之至謹奉表陳賀以聞臣某等言伏奉今日制書皇太子冊禮云畢思與萬方同其惠澤者盛典斯舉鴻恩遂行凡在率土不勝忭躍臣某等誠喜誠賀頓首頓首伏惟皇帝陛下克奉神休以正邦統建天下之本宗廟以安致萬國之貞兆人攸賴典冊既備慶澤載流既廣愛而推恩亦好生而布德緩刑而囹圄知感進勳而嗣續增榮崇教諭之方忠良是舉嚴贊襄之禮賜與有加旌孝弟以厚於人倫敬鬼神而修其祀事况行禮之日則屏翳收蹟太陽宣精用彰出震之休更表重離之曜神化旁暢皇風遠揚自華及夷異俗同慶臣等謬參著定倍百恆情無任歡慶踊躍之至臣某等言臣聞大人繼明百神所以受職天子有道萬國由是承風伏以皇帝陛下纘聖垂休順時御極負扆而會朝夷夏踐祚而統和天人幽明感通遐邇昭泰遂使祥光下燭嘉氣旁通周王謝流火之符魯史愧書雲之典食毛含齒歡忭無窮臣某等幸覩昌時獲奉大慶踊躍之至倍萬恆情無任蹈舞欣躍之至臣某言伏奉正月二日制書大赦天下永貞二年宜改為元和元年者太陽既昇煦育資始霈澤斯降膏潤無遺臣某誠慶誠賀頓首頓首伏惟皇帝陛下仁化旁流孝理宏闡紀元示布和之令肆眚見恤人之心曠然滌瑕得以遷善渙發大號申明舊章農有薄征巿無強賈勳勤是錄爵秩以班寵寧間於幽明澤必周於夷夏近甸輕榷酤之入遠人忘水旱之災既行慶於官僚亦推恩於天屬諸生喜黌塾之廣庶老加絮帛之優量入所以備凶興廉期於變俗爰襃有客尊賢之典惟新載奉素王宗子之道斯在綸言一降庶政畢行懷生之倫感悅無量臣某等守在遐遠親奉詔條踊躍之誠倍百恆品無任感恩忭舞屏營之至謹奉表陳賀以聞臣某等言伏奉今月日誥良娣王氏冊太上皇后良媛董氏冊太上皇德妃宜令所司備禮冊命者母儀有光坤道克順陰教方行於萬國內理克和於六宮臣某等誠慶誠賀頓首頓首伏惟皇帝陛下對若天休奉揚睿旨長秋既登其正位褕狄亦被於恩光奉養見三朝之安周旋有四星之輔豈獨配乾稱大助日為明所以表王化之源知孝悌之本冠映千古儀刑四方臣等捧戴施行踊躍無地無任蹈舞欣喜之至臣某等言今月日太上皇后冊禮云畢率土臣妾慶忭無窮臣某等誠慶誠賀頓首頓首伏以太上皇后著虞嬪之至德嗣周母之徽音表率六宮明彰萬國陛下克修理本以暢化源神道之事地之方人倫識尊親之大豈惟婦順斯備陰禮用修足以播正始於王風致時雍於帝典臣某等謬塵榮位獲覩盛儀踊躍之誠倍萬恆品臣某言今月日宰臣以幽州所進嘉禾圖各一軸示百寮者伏以嘉穀順成靈貺昭格天人合應遐邇同風臣某誠歡誠慶頓首頓首伏惟皇帝陛下睿謀廣運神化旁行植物知仁祥圖應聖靈嶽不愆於贊祐燕谷用遂於生成豐稔既均知朔南之被澤休嘉克協見天地之同和六穗慚稱於漢臣異畝恥書於周典自中形外均慶同歡臣某謬職憲司獲覩休瑞無任忭躍之至臣某等言伏見今月某日內出劍南所進嘉禾圖及陜州所進紫芝草示百寮者珍圖煥開瑞彩交映遐邇偕至福應攸同臣某等誠慶誠賀頓首頓首伏惟皇帝陛下緝熙至道保合太和天惟發祥地不愛寶嘉禾擢質靈草抽英獻於王庭唐叔慚同穎之異薦諸郊廟班史謝連葉之奇既呈薿薿之祥更覩煌煌之秀豐年斯著聖壽用彰飲和之人歡忭無極臣某等優游至化披翫殊姿慶忭之誠倍百恆品臣某言今月日中使王自寧出徐州刺史張愔所進嘉瓜圖及白兔兒一並出陳許等州觀察使上官說所進許州連理棠樹圖示百寮者惟天眷命是降百祥惟聖欽承用膺多福臣某誠慶誠賀頓首頓首臣伏以太和所蒸至德斯應圖物獻瑞周於遠方神瓜合形式表帛丿糸帛丿糸之慶異棠連質用彰韡韡之榮况金風發祥白兔來擾告有秋之嘉應著成歲於神功雜遝紛綸如山斯委人盡登於壽域物咸暢於薰風况臣特感深恩欣逢眾瑞踊躍之至倍萬恆情臣某言中使王自寧至伏奉宣聖旨出延和殿前丁香樹甘露一大合示宰臣未時又出一大合令明日示百寮甘露見降未止者元化昇聞靈貺昭答必呈尤異之應以告天地之和臣某誠歡誠慶頓首頓首伏惟皇帝陛下均煦育之功敷滲漉之澤太和潛達閟瑞克彰發於天霄特降宮樹朝光初燭方湛湛而不晞畏景轉炎更瀼瀼而未已綴葉而珠璣積耀盈器而氷玉呈姿芳襲椒蘭味兼飴醴然則零其庭而著異紀於年以標奇徒矜往辰孰並茲日况樹有丁香之珍殿即延和之號所以著芳風之遠播期聖壽於無疆事絕古今慶傳遐邇臣謬承渥澤獲覩殊祥忭躍之誠倍萬恆品臣某言伏見今月日內出滄州所進白龍見圖又出西內定禮池中青蓮花并神龍寺前合歡蓮子示百寮二十三日又出鹽州所進合歡黃瓜圖者二氣交泰萬國同和動植思協於殊祥遐邇畢陳其嘉應披圖桉牒聖理彰明臣誠歡誠慶頓首頓首伏以天地非遠睿感必通疊瑞重祥累集宮禁池蓮表異靈化非常敷彼青光徵佛書而尤絕成其嘉實驗祥經而甚稀積慶旁流自中徂外遂使龍騰白質乘秋果應於金行瓜合黃中表聖更彰於土德遠通邊徼近出苑園合慶同歡周於億兆况復邦畿之內雨霽必時宿麥大穰嘉穀滋茂和風孕育靈氣陶蒸是皆發自帝心達於天意周流升降成此歲功惠彼㣥生自為嘉瑞臣某深惟多幸獲遇斯時觀靈貺之備臻知人和之溥洽無任慶忭躍蹈之至臣某言伏奉進止宣示前件白鵲者霜毛皎潔玉羽鮮明色實殊常性惟馴狎臣聞聖王之德無所不至有感則應無幽不通伏惟陛下恩霑動植仁洽飛翔故得茲禽呈休效質伏以白者正色實表金方鵲以知來式彰寇服用符歸化之兆克耀太平之階臣職參禁垣獲覩嘉瑞無任慶忭之至臣某等今日內出浙東觀察使賈全所進越州山陰移風鄉產嘉瓜二實同蔕圖示百寮者寶祚惟新嘉瑞來應式彰聖德克表天心臣等誠慶誠賀頓首頓首伏惟皇帝陛下保合太和緝熙黎庶德馨上達神化旁行嘉瓜發瑞來自侯服質惟同蔕見車書之永均地則移風知化育之方始雖七月而食豳土歌王業之難五色稱珍東陵詠嘉賓之會未聞感通若斯昭著者也臣某等遭逢聖運親仰珍圖忭躍之誠倍百恆品無任慶悅之至臣某言今日某時中使某奉宣聖旨出西內神龍寺前水渠內合歡蓮花圖一軸示百寮者祥圖煥開異彩交映贊天地之合德表神人之同歡臣某誠歡誠慶頓首頓首伏惟皇帝陛下道協重華慶傳種德陶陰陽之粹美孕造化之精英吉慶每見於天心發祥必自於禁掖是使雙華擢秀連蔕垂芳香激大王之風影耀天泉之水煥開宮沼旁映給園靈貺應期天龍護聖寶歷敻超於小劫神功允洽於大千臣某獲覩昇平濫居榮寵聞瑞應而稱慶仰繢事而增歡無任忭蹈喜躍之至
