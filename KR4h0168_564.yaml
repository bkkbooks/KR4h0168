front:
  text: 全唐文欽定全唐文卷五百六十四韓愈十八
  hash: sha256:f30572f174e7d4784b4c84dd3711d53274c42d26bac7422aa02ee3de854d68de
body:
  text: 張君名徹字某以進士纍官至范陽府監察御史長慶元年今牛宰相為御史中丞奏君名迹中御史選詔即以為御史其府惜不敢留遣之而密奏幽州將父子繼續不廷選且久今新收臣又始至孤怯須強佐乃濟發半道有詔以君還之仍遷殿中侍御史加賜朱衣銀魚至數日軍亂怨其府從事盡殺之而囚其帥且相約張御史長者毋侮辱轢蹙我事毋庸殺置之帥所居月餘聞有中貴人自京師至君謂其帥公無負此土人上使至可因請見自辨幸得脫免歸即推門求出守者以告其魁魁與其徒皆駭曰必張御史張御史忠義必為其帥告此餘人不如遷之別館即與衆出君君出門罵衆曰汝何敢反前日吳元濟斬東市昨日李師道斬於軍中同惡者父母妻子皆屠死肉餧狗鼠鴟鴉汝何敢反汝何敢反行且罵衆畏惡其言不忍聞且虞生變即擊君以死君抵死口不絶罵衆皆曰義士義士或收瘞之以俟事聞天子壯之贈給事中其友侯雲長佐鄆使請於其帥馬僕射為之選於軍中得故與君相知張恭李元實者使以幣請之范陽范陽人義而歸之以聞詔所在給船輿傳歸其家賜錢物以葬長慶四年四月某日其妻子以君之喪葬於某州某所君弟復亦進士佐汴宋得疾變易喪心驚惑不常君得間即自視衣褥薄厚節時其飲食而匕筯進養之禁其家無敢高語出聲醫餌之藥其物多空青雄黃諸奇怪物劑錢至數十萬營治勤劇皆自君手不假之人家貧妻子常有飢色祖某某官父某某官妻韓氏禮部郎中某之孫汴州開封尉某之女於余為叔父孫女君嘗從余學選於諸生而嫁與之孝順祗修㣥女效其所為男若干人曰某女子曰某銘曰嗚呼徹也世慕顧以行子揭揭也噎喑以為生子獨割也為彼不清作玉雪也仁義以為兵用不缺折也知死不失名得猛烈也自申於暗明莫之奪也我銘以貞之不肖者之呾也夫人姓苗氏諱某字某上黨人曾大父襲夔贈禮部尚書大父殆庶贈太子太師父如蘭仕至太子司議郎汝州司馬夫人年若干嫁河南法曹盧府君諱貽有文章德行其族世所謂甲乙者先夫人卒夫人生能配其賢歿能守其法男二人於陵渾女三人皆嫁為士妻貞元十九年四月四日卒於東都敦化里年六十有九其年七月某日祔於法曹府君墓在洛陽龍門山其季女壻昌黎韓愈為之志其詞曰赫赫苗宗族茂位尊或毗於王或二於藩是生夫人載穆令聞爰初在家孝友惠純乃及於行克德門肅其為禮裕其為仁法曹之終諸子實幼煢煢其哀介介其守循道不違厥聲彌劭三女有從二男知教閭里歎息母婦思效歲時之嘉嫁者來寧纍纍外孫有攜有嬰扶牀坐膝嬉戲歡爭既壽而康既備而成不歉於約不矜於盈伊昔淑哲或圖或書嗟咨夫人孰與為儔刻銘置墓以贊碩休貞元十七年九月丁卯隴西李翺合葬其皇祖考貝州司法參軍楚金皇祖妣清河崔氏夫人於汴州開封縣某里昌黎韓愈紀其世著其德行以識其葬其世曰由梁武昭王六世至司空司空之後二世為刺史清淵侯由侯至於貝州凡五世其德行曰事其兄如事其父其行不敢有出焉其夫人事其姒如事其姑其於家不敢有專焉其在貝州其刺史不悅於民將去官民相率歡譁手瓦石胥其出擊之刺史匿不敢出州縣吏由別駕以下不敢禁司法君奮曰是何敢爾屬小吏百餘人持兵仗以出立木而署之曰刺史出民有敢觀者殺之木下民聞皆驚相告散去後刺史至加擢任貝州由是大理其葬曰翺既遷貝州君之喪於貝州殯於開封遂遷夫人之喪於楚州八月辛亥至於開封壙於丁巳墳於九月辛酉窆於丁卯人謂李氏世家也侯之後五世仕不遂蘊必發其起而大乎四十年而其兄之子衡始至戶部侍郎君之子四人官又卑翺其孫也有道而甚文固於是乎在處士諱於陵其先范陽人父貽為河南法曹參軍河南尹與人有仇誣仇與賊通收掠取服法曹曰我官司也我在不可以為是廷爭之以死河南怒命卒捽之法曹爭尤強遂并收法曹竟奏殺仇籍其家而釋法曹法曹出徑歸臥家念河南勢弗可敗氣憤弗食嘔血卒東都人至今猶道之處士少而孤母夫人憐之讀書學文皆不待強教卒以自立在母夫人側油油翼翼不忍去時歲母夫人既終育幼弟與歸宗之妹經營勤甚未暇進仕也年三十有六元和二年五月壬辰以疾卒有男十歲曰義女九歲曰孟又有女生處士卒後未名於其年九月乙酉其弟渾以家有無葬以車一乘於龍門山先人兆愈於處士妹壻也為其志且銘其後曰貴兮富兮如其材得何數兮名兮壽兮如其人豈無有兮彼皆逢其臧子獨迎其凶茲命也耶茲命也耶太學博士頓邱李于余兄孫女壻也年四十八長慶三年正月五日卒其月二十六日穿其妻墓而合葬之在某縣某地子三人皆幼初于以進士為鄂嶽從事遇方士柳泌從授藥法服之往往下血比四年病益急乃死其法以鉛滿一鼎桉中為孔實以水銀蓋封四際燒為丹砂云余不知服食説自何世起殺人不可計而世慕尚之益至此其惑也在文書所記及耳聞相傳者不説今直取目見親與之遊而以藥敗者六七公以為世誡工部尚書歸登殿中御史李虛中刑部尚書李遜遜弟刑部侍郎建襄陽節度使工部尚書孟東川節度御史大夫盧坦金吾將軍李道古此其人皆有名位世所共識工部既食水銀得病自説若有燒鐵杖自顛貫其下者摧而為火射竅節以出狂痛呼號乞絶其茵席常得水銀發且止唾血數十升以斃殿中疽發其背死刑部且死謂余曰我為藥誤其季建一旦無病死襄陽黜為吉州司馬余自袁州還京師襄陽乘舸邀我於蕭洲屏人曰我得祕藥不可獨不死今遺子一器可用棗肉為丸服之別一年而病其家人至訊之曰前所服藥誤方且下之下則平矣病二歲竟卒盧大夫死時溺出血肉痛不可忍乞死乃死金吾以柳泌得罪食泌藥五十死海上此可以為誡者也蘄不死乃速得死謂之智可不可也五穀三牲鹽醯果蔬人所常御人相厚勉必曰強食今惑者皆曰五穀令人夭不能無食當務減節鹽醯以濟百味豚魚雞三者古以養老反曰是皆殺人不可食一筵之饌禁忌十常不食二三不信常道而務鬼怪臨死乃悔後之好者又曰彼死者皆不得其道也我則不然始病曰藥動故病病去藥行乃不死矣及且死又悔嗚呼可哀也已可哀也已安定桓王五世孫睿素為桂州長史化行南方有子四人最季曰紳卿文而能官嘗為揚州録事參軍事故宰相崔圓圓狎愛州民丁某至顧省其家後大衙會日司録君趨以前大言曰請舉公過公與小民狎至至其家害於政圓驚謝曰録事言是圓實過乃自署罰五十萬錢由是遷涇陽令破豪家水碾利民田頃凡百萬君諱岌桂州君之孫司録君之子亦以能官名少而奇壯而強老而通以元和元年六月十四日卒年五十七娶京兆田氏女男曰家女曰門曰都皆幼初君樂虢之土田山水求掾其州去官猶家之既卒因以其年九月某日葬州北十里崔長史墓西銘曰凡兆於茲惟其家之財蓋歸有時四門博士周况妻韓氏諱好尚書禮部郎中諱雲卿之孫開封尉諱俞之女開封娶趙氏生二女三男開封卓越豪縱不治資業喜酒色狗馬趙氏卒十一年而開封亦卒開封從父弟愈於時為博士乞分教東都生以收其孥於開封界中教畜之而歸其長女於周氏况况進士家世儒者曾祖諱延潭州長沙令祖諱晦常州參軍父諱良甫左驍衛兵曹參軍况立名行人士譽之韓氏嫁九年生一男一女年二十七以疾卒葬長安城南鳳棲原其從父愈於時為中書舍人為銘曰夫失少婦子失壯母歸咎無處滂韓氏子其先仕魏號安定桓王滂父老成厚謹以文為韓氏良子弟未仕而死有二子滂其季也其祖諱介為人孝友一命率府軍佐以卒二子百川老成老成為伯父起居舍人某後起居有德行言詞為世軌式滂既兄弟二人而率府長子百川早死無嗣其叔祖愈命滂歸後其祖滂清明遜悌以敏讀書倍文功力兼人為文詞一旦奇偉驟長不類舊常吾曰爾得無假之人耶退大喜謂其兄湘曰某違翁且踰年懼無以為見今翁言乃然可以為賀㣥輩來見皆曰滂之大進不惟於文詞為人亦然既數月得疾以死年十九矣吾與妻哭之傷心三日而斂既斂七日權葬宜春郭南一里於戲其可惜也已銘曰天固生之耶偶自生耶天殺也耶其偶自死耶莫不歸於死壽何少多銘以送汝其悲奈何夫人盧氏諱某蘭陵太守景柔八世孫父貽卒河南法曹法曹娶上黨苗氏太師晉卿兄女生三女三男夫人最長法曹卒苗夫人嫁之唐氏充充明經宰相休憬曾姪孫出郤氏外王父昂中書舍人夫人年若干嫁唐氏凡生男與女九人年四十二元和四年正月二十二日卒其年四月十五日葬河南府河南縣之大石山下銘曰夫人本宗世族之後率其先猷令德是茂爰歸得家九子一母婉婉有儀柔靜以和命不侔身茲其奈何刻銘墓石以告觀者乳母李徐州人號正真入韓氏乳其兒愈愈生未再周月孤失怙恃李憐不忍棄去視保益謹遂老韓氏及見所乳兒愈舉進士第歷佐汴徐軍入朝為御史國子博士尚書都官員外郎河南令娶婦生二男五女時節慶賀輒率婦孫列拜進壽年六十四元和六年三月十八日疾卒卒三日葬河南縣北十五里愈率婦孫視窆封且刻其語於石納諸墓為銘貞元十五年靈州節度使御史大夫李公諱欒守邊有勞詔曰欒妻何氏可封息國夫人元和二年李公入為戶部尚書薨夫人遂專家政公之男五人女二人而何氏出者二男一女夫人教養嫁娶如一雖門內親戚不覺有纖毫薄厚御僮使治居第生産皆有條序居卑尊間無不順適命服在躬承祀孔時年若干元和七年甲子日南至以疾卒明年八月庚寅葬河南河陽夫人曾祖某綏州刺史祖某潞州別駕父某晉州録事參軍二男戡左威衛倉曹參軍成左清道率府録事參軍戡強以肅成敏以和女子嫁興元參軍鄭博古將葬戡與成以其事乞銘於其鄰韓愈愈乃為銘曰男主外事治不為易施於其家難甚吏治又况公侯族大而貴夫人是專厥聲惟懿昔在貞元有錫自天啓封備服以疇時勳婉婉夫人有籍宮門克承其後以嫁以婚遂葬東土在河之陽遙望公墳而不同藏君諱適姓王氏好讀書懷奇負氣不肯隨人後舉選見功業有道路可指取有名節可以戾契致困於無資地不能自出乃以干諸公貴人借助聲勢諸公貴人既志得皆樂熟軟媚耳目者不喜聞生語一見輒戒門以絶上初即位以四科募天下士君笑曰此非吾時耶即提所作書緣道歌吟趨直言試既至對語驚人不中第益困久之聞金吾李將軍年少喜事可撼乃蹐門告曰天下奇男子王適願見將軍白事一見語合意往來門下盧從史既節度昭義軍張甚奴視法度士欲聞無顧忌大語有以君生平告者即遣客鈎致君曰狂子不足以共事立謝客李將軍由是待益厚奏為其衛胄曹參軍充引駕仗判官盡用其言將軍遷帥鳳翔君隨往改試大理評事攝監察御史觀察判官櫛垢爬癢民獲蘇醒居歲餘如有所不樂一旦載妻子入閿鄉南山不顧中書舍人王涯獨孤郁吏部郎中張惟素比部郎中韓愈日發書問訊顧不可強起不即薦明年九月疾病輿醫京師某月某日卒年四十四十一月某日即葬京城西南長安縣界中曾祖爽洪州武寧令祖微右衛騎曹參軍父嵩蘇州崑山丞妻上谷侯氏處士高女高固奇士自方阿衡太師世莫能用吾言再試吏再怒去發狂投江水初處士將嫁其女懲曰吾以齟齬窮一女憐之必嫁官人不以與凡子君曰吾求婦氏久矣惟此翁可人意且聞其女賢不可以失即謾謂媒嫗吾明經及第且選即官人侯翁女幸嫁若能令翁許我請進百金為嫗謝諾許白翁翁曰誠官人耶取文書來君計窮吐實嫗曰無苦翁大人不疑人欺我得一卷書粗若告身者我袖以往翁見未必取視幸而聽我行其謀翁望見文書銜袖果信不疑曰足矣以女與王氏生三子一男二女男三歲夭死長女嫁亳州永城尉姚挺其季始十歲銘曰鼎也不可以柱車馬也不可使守閭佩玉長裾不利走趨祗繫其逢不繫巧愚不諧其須有銜不袪鑽石埋辭以列幽墟夫人姓盧氏范陽人亳州城父丞序之孫吉州刺史徹之女嫁扶風馬氏為司徒侍中莊武公之冢婦少府監西平郡王贈工部尚書之夫人初司徒與其配陳國夫人元氏惟宗廟之尊重繼序之不易賢其子之才求婦之可與齊者內外親咸曰盧某舊門承守不失其初其子女聞教訓有幽間之德為公子擇婦宜莫如盧氏媒者曰然卜者曰祥夫人適年若干入門而媼御皆喜既饋而公姑交賀克受成福母有多子為婦為母莫不法式天資仁恕左右媵侍常蒙假與顏色人人莫不自在杖婢使數未嘗過二三雖有不懌未嘗見聲氣元和五年尚書薨夫人哭泣成疾後二年亦薨年四十有六九年正月癸酉祔於其夫之封長子殿中丞繼祖孝友以類葬有日言曰吾父友惟韓丈人視諸孤其往乞銘以其狀來愈曰日嘗聞乃公言然吾宜銘銘曰陰幽坤從惟德之恆出為辨強乃匪婦能淑哉夫人夙有多譽來嬪大家不介父母有事賓祭酒食祗飭協於尊章畏我侍側及嗣內事亦莫有施齊其躬心小大順之夫先其歸其室有邱合葬有銘壼彞是收殿中侍御史李君名虛中字常容其十一世祖沖貴顯拓跋世父惲河南溫縣尉娶陳留太守薛江童女生六子君最後生愛於其父母年少長喜學學無所不通最深於五行書以人之始生年月日所直日辰支干相生勝衰死王相斟酌推人壽夭貴賤利不利輒先處其年時百不失一二其説汪洋奧美關節開解萬端千緒參錯重出學者就傳其法初若可取卒然失之星官歷翁莫能與其校得失進士及第試書判入等補祕書正字母喪去官卒喪選補太子校書河南尹奏疏授伊闕尉佐水陸運事故宰相鄭公餘慶繼尹河南以公為運佐如初宰相武公元衡之出劒南奏奪為觀察推官授監察御史未幾御史臺疏言行能高不宜用外府即詔為真御史半歲分部東都臺遷殿中侍御史元和八年四月詔徵既至宰相欲白以為起居舍人經一月疽發背六月乙酉卒年五十二其年十月戊申葬河南洛陽縣距其祖澠池令府君僑墓十里君昆弟六人先君而歿者四人其一人嘗為鄭之滎澤尉信道士長生不死之説既去官絶不營人事故四門之寡妻孤孩與滎澤之妻子衣食百須皆由君出自初為伊闕尉佐河南水陸運使換兩使經七年不去所以為供給教養者及由蜀來輩類御史皆樂在朝廷進取君獨念寡稚求分司東出於戲其仁哉君亦好道士説於蜀得祕方能以水銀為黃金服之冀果不死將疾謂其友衛中行大受韓愈退之曰吾夢大山裂流出赤黃物如金左人曰是所謂大還者今三矣君既歿愈追占其夢曰山者艮艮為背裂而流赤黃疽象也大還者大歸也其告之矣妻范陽盧氏鄭滑節度使兼御史大夫㣥之女與君合德親戚無退一言男三人長曰初協律次曰彪其幼曰還適三歲女子九人銘曰不贏其躬以尚其後人公諱溪字惟深丞相贈太師隴西恭惠公第二子十九歲明兩經獲第有司沈厚精敏未嘗有子弟之過賓接門下推舉人士侍側無虛口退而見其人淡若與之無情者太師賢而愛之父子間自為知己諸子雖賢莫敢望之太師纍踐大官臻宰相致平治終始以禮號稱名臣晨昏之助蓋有賴云太師之平汴州年考益高挈持維綱鋤削荒纇納之太和而已其囊篋細碎無所遺漏繄公之功上介尚書左僕射陸公長源齒差太師標望絶人聞其所為每稱舉以戒其子楊凝孟叔度以材德顯名朝廷及來佐幕府詣門請交屏所挾為太師薨始以祕書郎選參軍京兆府法曹日伏階下與大尹爭是非大尹屢黜己見歲中奏為司録參軍與一府政以能拜尚書度支員外郎遷倉部郎中萬年令兵誅恆州改度支郎中攝御史中丞為糧料使兵罷遷商州刺史糧料吏有忿爭相牽告者事及於公因徵下御史獄公不與吏辨一皆引伏受垢除名徙封州元和六年五月十二日死湘中年四十九明年立皇太子有赦令許歸葬其子居中始奉喪歸元和八年十一月甲寅葬於河南河南縣萬安山下太師墓左夫人鄭氏祔公凡再娶皆鄭氏女生六子四男二女長曰全正慧而早死次曰居中好學善為詩張籍稱之次曰從直曰居敬尚小長女嫁吳郡陸暢其季女後夫人之子公之母弟全素孝慈友弟公坐事棄同官令歸公歿比葬三年哭泣如始喪者大臣高其行白為太子舍人將葬舍人與其季弟澥問銘於太史氏韓愈愈則為之銘辭曰物以久弊或以轢毀考致要歸孰有彼此由我者吾不我者天斯而以然其誰使然唐元和九年歲在甲午八月己亥貞曜先生孟氏卒無子其配鄭氏以告愈走位哭且召張籍會哭明日使以錢如東都供喪事諸嘗與往來者咸來哭弔韓氏遂以書告興元尹故相餘慶閏月樊宗師使來弔告葬期徵銘愈哭曰嗚呼吾尚忍銘吾友也夫興元人以幣如孟氏賻且來商家事樊子使來速銘曰不則無以掩諸幽乃序而銘之先生諱郊字東野父庭玢娶裴氏女而選為崑山尉生先生及二季酆郢而卒先生生六七年端序則見長而愈騫涵而揉之內外完好色夷氣清可畏而親及其為詩劌目鉥心刃迎縷解鉤章棘句搯擢胃腎神施鬼設間見層出惟其大玩於詞而與世抹摋人皆劫劫我獨有餘有以後時開先生者曰吾既擠而與之矣其猶足存耶年幾五十始以尊夫人之命來集京師從進士試既得即去間四年又命來選為溧陽尉迎侍溧上去尉二年而故相鄭公尹河南奏為水陸運從事試協律郎親拜其母於門內母卒五年而鄭公以節領興元軍奏為其軍參謀試大理評事挈其妻行之興元次於閿鄉暴疾卒年六十四買棺以斂以二人輿歸酆郢皆在江南十月庚申樊子合凡贈賻而葬之洛陽東其先人墓左以餘財附其家而供祀將葬張籍曰先生揭德振華於古有光賢者故事有易名况士哉如曰貞曜先生則姓名字行有載不待講説而明皆曰然遂用之初先生所與俱學同姓於世次為叔父由給事中觀察浙東曰生吾不能舉死吾知恤其家銘曰嗚呼貞曜維執不猗維出不訾維卒不施以昌其詩前汝父母右汝兄汝從之居視汝如生遷汝居兮日月之良汝居孔固兮後無有殃如不信兮視此銘章
