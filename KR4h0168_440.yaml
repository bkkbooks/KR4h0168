front:
  text: 全唐文欽定全唐文卷四百四十伯瑾永泰時人
  hash: sha256:3f530f6144ca1aa691c4b4d0df4296fbb6e897656cf1a103bc2531d663528025
  markers:
  - {type: head, offset: 13, content: 閻伯瑾, id: KR4h0168_NFKB_440-h1, level: 1}
body:
  text: 州城西南隅有黃鶴樓者圖經云費禕登仙嘗駕黃鶴返憩於此遂以名樓事列神仙之傳迹存述異之志觀其聳構巍峩高標巃嵸上倚河漢下臨江流重簷翼館四闥霞敞坐窺井邑俯拍雲烟亦荊吳形勝之最也何必賴鄉九桂東陽八詠迺可賞觀時物會集靈仙者哉刺史兼侍御史淮西租庸使鄂岳沔等州都團練使河南穆公名寧下車而亂繩皆理發號而庶政其凝或逶迤退公或登車遠遊必於是極長川之浩浩見眾山之壘壘王室載懷思仲宣之能賦僊蹤可揖嘉叔偉之芳塵迺喟然曰黃鶴來時歌城郭之並是浮雲一去惜人世之俱非有命抽毫紀茲貞石時皇唐永泰元年歲次大荒落月孟夏日庚寅也佑永泰中官支度判官朝散大夫行監察御史兼御史大夫恒州刺史充管內度支營田使清河郡王李公紀功載政頌并序惟天正明命聖人保成允寧萬邦克易我沴嗚呼君非臣無以化化臣非君無以贊贊明明君臣品闕三字陰陽載闕一字草木咸闕一字兆人康闕一字壬寅歲寶應皇帝嗣位敬統舊服惠周於下下罔不格冬十一月我亞相公忠志率東諸侯闕一字出復命元元以貞集太和也先是祿山構亂朋毒中夏闕一字政恤刑覆忠良殖姦宄蒸人側側不貳率乃戮公越在東土受制宇下為侯於恒克裒復寧遏在王室誕宣我化靡闕一字爾凶敷聞帝庭奉若元命帝曰休才正侯良才授恒州刺史封密雲郡公表獻臣也越二年思明肆虐㣥侮王度擅煞無人薄三川威五長搢紳管管不自即乃工公執在厲階登若股上罔咈祗命命我亞闕三字我闕二字恤遺闕一字人心闕三字德式闕庶欲歸於本朝朝廷嘉茂功錫丕命授禮部尚書兼御史大夫成德軍節度使清河郡王賜姓李改名寶臣詔曰懿審奉天威保乂邦本是用司國樞威憚姦回政革風俗是用總朝憲率寧全趙開復東土是用苴白茅昭崇武功允正師長是用援闕四字維城宗我姓闕四字本爾名銘之景鐘以憲於後公固讓不獲祗奉天之明命惟祖惟父佐世有勳享祿無及公大其門公天委全德闕二字有邦忠孝剛義明直闕一字亮家用自我位敘宜才初公牧恒元年偽也偽師剋恒恒不堪命㣥盜眾聚於野闕六字罔極公張官具政明武殄暴暴服如闕一字人諟不虞廬廬旅旅以晏以處士馴業農力穡工就務商通貨四者各正爾下日用乃以闕二字二年春㣥吏更告公曰滹沲會流暨於城下天雨淫降鴻湧泄岸波積如阜奔貫乃雉胥恐為魚其日固久公以聚人慾經闕二字啟導流闕二字天造層城巘巘居人坦坦闕一字德合於無疆冬十月公告成於先帝洎慶緒嗣凶自洛奔鄴修好於公公不闕四字折闕三字得請命焉惟三年二月上以思明作藩於薊臨長於恒夏四月思明篤敘不供賊鎮威眾俾公如薊將賊公也公執忠起闕三字加害殆六月恒闕二字復公闕二字惟四年夏大旱滌滌甫田百穀如焚人曰祈土龍公曰非旱備乃貶躬之食勤人之闕二字神闕一字寅闕一字朝而雨闕八字大闕一字恒有年也惟闕三字秋闕一字兩旬有五日匪害稼不書政冬十一月思明外公以其黨辛萬寶張軍闕二字伺間焉惟闕二字一月闕四字臨公自下流毒畿闕三字延於平人人用齎咨涕洟籲公如天公曰不戢乃暴負乃人夏四月戮萬寶於闕一字門敦行王法保和闕一字極闕三字朝義闕一字逆宗公主五州之侯或曰厚賦人公衋人蒿焉封政不賦乃聳善抑惡發滯佚蕆惠昭利六教既闕一字孳等心於是文訪於易易獎之文訪於定定宗之文訪於深深修之文訪於趙趙齊之克諧五州允奉如一虜不我制公用哆然惟八年闕二字月公大開山東受命王也初朝義播亡係命於公自公歸朝是翦厥翼翌日公會王師於趙郊恭行伐闕一字獨夫惴惴天用勦焉時戎羯飲化爰方啟行夫戎性沓貪蔑煞俘軼殫寶虔劉暴骨厚厲於懷人南自相魏邢貝東至滄德瀛鄚匹夫匹婦蕩在草莽越踐公境宣服公威惕惕瞿瞿攝進成序若公在首五州之人無荒寧風行於冀冀億之境願附公昭請於上上集下望申命用良冀人熙熙嗜化永休惟九年冬帝念宗臣特拜右僕射端武主戎總經外政欽酌彞典敬揚天心繄公德載於人人以蕃殖翼贊三主鋪敦四凶聖咨乃賢神被乃祿其惟有終旨才恒中耆老賈審祥等師錫言曰奸臣反常迭起東土人用墋黷殆無指告惟公牧恒天眷爾下爾有君臣公正爾有父子公保爾有災厲公奠爾有稼穡公成微公疇依恒大也賡曰昭茂德崇豐碑阜成於文庶永於世克建樂石勗揚頌聲頌曰惟君配天惟臣配君蟜蟜我公為君武臣翼贊皇家奄有世勳大盜嚻嚻荒我東鄙孔填不夷元元靡恃恒人保公乃有父子我沴載懲我年載登我用有孚爾無不承貞石峨峨永以垂頌惟公之德不崩綽上元中進士臣某言伏奉某月日制書大赦天下改元罪無輕重一皆蕩滌率土生靈孰不歡抃臣聞生植長育天地之大德在宥布和后王之盛典伏惟皇帝陛下以道御時與天合運當文武之際恢中興之功轉黃道而三象昭明鼓洪鑪而二儀貞觀方告成於郊廟且降祉於人神而猶旁詢時議中守謙德爰輟盛禮載布湛恩正元氣以紀年惠人心而垂化緩死申柔服之義念功宥脅從之徒然後用唐虞官人之訓追周漢考績之法節用所以厚下懋賞所以勸勞誠明動天地利澤施四海大易云神武不殺太上稱仁方之聖猷實有慙德臣謬專方鎮獲奉明詔疲劣何幸沐浴皇風欣抃之至倍百恒情少聿太原人原夫象教東傾正宗西域大塊連鑄造化無功應現十方漸流萬品惟正覺之元妙也傳如來之正教得佛法之寶印者即我和尚三祖諱王祭矣澄神寂靖散識歸貞耆艾相承傳云黃山東是有窀穸元宮焉歿故僧智藏尋此勝山經遘銘記苔文半滅微辨云和尚諱王祭矣遂瞻仰於青山之下頂禮於荒墳之前於大唐廣德二年歲次乙已發心建啟靈塔元宮之上未圓備卒此助成僧智空覩此營修果未圓滿師資相傳願緒構興功德主霍待璧孫待敬等各施淨財成茲勝業各願生生值善四行果圓難苦脫塵又為大唐寶應元聖文武皇帝陛下聖化無竭大寶常存福祚遐長萬品安樂蠢動含靈同霑斯福於唐大歷二年歲次丁未慶讚已畢傳芳永代稱慶遠年若不刻石䥴銘無以示其來者其詞曰佛日高懸神通應異東流像教號曰大智師資相傳三祖諱王祭應現無所靈化無岸凝神西域抱歸山半道俗瞻仰尋求聖蹤闕舍利於元宮之上建寶塔於黃山之東功德相好圓滿頂禮獲福無窮題之永為不朽䥴石以表其神功泉大歷時人夫人鄭氏滎陽人也左衞兵曹敬愛之孫陝州平陸縣令岳之長女世承官族時謂盛門年十八適河南元鏡遠貞姿雅操為閨門之表式夫人師心道流早棄華麗薰茹不味日唯一飯者卅年於茲矣誠宜天祐其福享以永壽何神理之不明而喪此貞善以大歷四年八月十六日遇疾終於緱氏之別業春秋六十三有子三人長曰溥次曰渙季曰鴻皆夫人鞠育成立有慈無成夫人屬纊之際敕溥等於龍門安置溥等遵其理命以其年十一月廿一日安厝於龍門東山南原單車送終儉而得禮恐歲月遐遷失其姓氏敢述平生誌於貞石銘曰滎水長源緇衣襲慶世傳冠冕人唯貞正早棄浮麗歸心道門六塵無染一念常存伊水之佐龍門之側封樹佳城歲年萬億皓代宗朝太常博士天地之性人為貴人之行莫先於孝孝於君則忠於國愛於父則敬於君脫愛敬齊焉則忠孝一矣立君臣定上下不可以廢忠事父母承祭祀不可以虧孝忠孝之道人倫大經孔子曰以孝事君則忠又曰夫孝始於事親中於事君終於立身此聖人之教也至於忠孝不並有為而言將由親在於家君危於國奉親則孰當問主赴君則無能養親恩義相迫事或難兼故徐庶指心翻然辭蜀陵母刎頸卒令歸漢各求所志蓋取諸隨至若奉慈親當聖代出事主入事親忠孝兩全誰曰不可豈以不仕為孝舍親為忠哉況忠孝侯之傳鵲印唐堯之代即有此官伏念美名請依前諡元觀蕭昕同時人乾知大始變化惟眾白日貞輝以著乎運行素月虧盈以紀乎孟仲陰既往而陽受暑既驟而寒送景長而土圭可測氣肅而玉律潛中若乃搖落既謝戚戚無悰霜雪凝凌以戒節天地閉塞而成冬羲和在茲敬授人時周之正則建子為首冬之夜則問如何其北斗闌干乘招搖而直子元堂在座列㣥后以聽辭冬之日可愛聞乎魯史一之日觱發著乎豳詩其神元冥厥德在水其器閎奄事官有司植元珪以絓櫝乘元輅以載旗順物以終乃安其性因宜制節用必克正使夫有為而天下御正無事而天下分定先王以之狩田孝子以之溫凊萬人以之休息㣥辟以之殷聘一以明國家之盛再以誦昭事之令夫惟敗度起功逆時興務重其徭役急彼征賦動眾不隨其物宜馭人不以其裕災異必降甲已之氣乘癘疾必行哭泣之哀聚則知邦國興否噫時令之可懼浩字季海越州人舉明經累官金部員外郎遷憲部郎中肅宗立召拜中書舍人兼尚書右丞除國子祭酒代宗朝拜工部侍郎封會稽縣公德宗立拜彭王傅進郡公建中三年卒年八十贈太子少師諡曰定周官內史教國子六書書之源流其來尚矣程邈變隸體邯鄲傳楷法事則樸畧未有能工厥後鍾善正書張稱草聖右軍行法大令破體皆一時之妙近古以來蕭永歐虞頗得筆勢褚薛以降自謂不譏矣人謂虞得其筋褚得其肉歐得其骨當矣夫鷹隼乏彩而翰飛戾天骨勁而氣猛也翬翟備色而翺翔於百步肉豐而力沈也若藻曜而高翔書之鳳凰矣歐虞為鷹隼陸褚為翬翟焉歐陽率更云蕭書出於章草頗為知言然歐陽飛白曠古無比余年在齠齓便工翰墨忘寢與食胼胝筆硯而性不能逾力不可強勤而逾拙勞而無功區區碑石之間矻矻几案之上亦古人所恥吾豈忘情耶德成而上藝成而下殷鑒不遠何學書為必以一時風流千里面目斯亦愈於博奕亞於文章矣發揮聖賢事業其由斯乎初學之勢特須藏鋒鋒若不藏字則有病病且未去能何有焉字不欲疎亦不欲密亦不欲長亦不欲短小展令大大蹙令小疎肥令密密瘦令疎斯亦大經矣筆不欲捷亦不欲徐亦不欲平亦不欲側側竪令平平峻使側捷則須安徐則須利如此則其大較矣張伯英臨池學書池水盡黑永師登樓不下四十餘年張公精熟號草聖永師拘滯終著能名以此而言非一朝一夕所能盡美俗云書無百日工蓋悠悠之談也宜白首工之豈可百日乎汝曹年未弱冠但當研精覃思心闕目想時復臨本騐其短長可致佳境耳鍾太傅坐則畫地數步臥則書被穿表裏由是乃為翰墨之龜鑑耳自伏羲畫八卦史籒造籒文李斯作篆書程邈起隸法王次仲為八分體漢章帝始為章草名厥後流傳工能間出史籒石鼓文崔子玉篆呂望張衡碑李斯嶧山碑會稽山碑蔡邕鴻都三體石經八分西岳光和殷華馮敦等數碑并伯喈章草並為曠絕及張芝章草鍾繇正楷時莫其先衞瓘索靖章草王羲之真行章草桓元草謝安王獻之羊欣王僧虔孔琳之薄紹之真行草永禪師蕭子雲真草虞世南歐陽詢褚遂良果師述師真行草陸柬之臨書臣先祖故益州九隴縣尉贈吏部侍郎師道臣先考故洺州刺史贈左常侍嶠之真行草皆名冠古今無與為比從齊梁以後傳祕此書跋尾徐僧權唐懷充姚懷珍滿騫朱異等署名太宗皇帝肇開帝業大構圖書寶於內庫鍾繇張芝芝弟昶王羲之父子書四百卷及漢魏晉宋齊梁雜跡三百卷貞觀十三年十二月裝成部帙以貞觀字印縫命起居郎臣褚遂良排署如後石山孫枝樣翦伏羲將扶大隱永契神機至德二年上在鳳翔應制扈從闕中書門下闕上各贈父祖一人官闕任中書舍人兼尚書右丞集賢殿學士正月二十八日制贈公尚書吏部侍郎及上還京廣德元年八月二十一日制復贈公嗣子故銀青光祿大夫洺州刺史上柱國嶠之左散騎常侍洺州府君歷典趙衢豫吉湖洺六州開元二十四年薨塟於洛陽石橋東北十里浩自吏部侍郎貶明州別駕歸鄉拜掃換山口碣石題此額篆有唐既受命在太宗時有若梁公房鄭公魏衞公李格于皇天在高宗時有若梁公狄格于上帝在中宗時有若漢陽王張扶陽王桓興復宗社在元宗時有若梁公姚廣平公宋燕公始興公二張中興王業夫以天柱將傾大盜方起一振綱目再闡皇猷始興公為之公諱九齡字子壽一名博物其先范陽方城人軒轅建國弦弧受氏良位為帝華才稱王佐或相韓五葉或佐漢七貂代有大賢時稱盛族四代祖諱守禮隋鍾離郡塗山令曾祖諱君政皇朝韶州別駕終於官舍因為土著姓大父諱冑越州剡縣令列考諱宏愈新州索盧縣丞贈太常卿廣州都督皆蘊德葆光力行未舉地積高而成嶽雲久蓄而作霖是生我公蔚為人傑弱不好弄七歲能文居太常府君憂柴毀骨立家庭甘樹數株連理王公方慶出牧廣州時年十三上書路左燕公過嶺一見文章並深提拂厚為禮敬弱冠鄉試進士考功郎沈佺期尤所激揚一舉高第時有下等謗議上聞中書令李公當代詞宗詔令重試再拔其萃擢秘書省校書郎應道侔伊呂科對策第二等遷左拾遺封章直言不協時宰方屬辭滿拂衣告歸太夫人在堂承順左右孝養之至閭里化焉始興北嶺峭險巉絕大庾南谷坦然平易公乃獻狀詔委開通曾不浹時行可方軌特拜左補闕尋除禮部司勳二員外郎加朝散大夫超中書舍人封曲江縣男轉太常少卿出冀州刺史以庭闈在遠表請罷官改洪州都督徙桂州都督攝御史中丞嶺南按察兼選補使黜免貪吏引伸正人任良登能亮賢勞事澤被膏雨令行祥風屬燕公薨落斯文將喪擢秘書少監集賢院學士副知院事時屬朋黨頗相排拫窮棲歲餘深不得意渤海國王武藝違我王命思絕其詞中書奏章不愜上意命公改作援筆立成上甚嘉焉即拜尚書工部侍郎兼知制誥扈從北巡便祠后土命公撰赦對御為文凡十三紙初無藳草上曰比以卿為儒學之士不知有王佐之才今日得卿當以經術濟朕累乞歸養上深勉焉遷公弟九皋九章官近州里伏臘賜告給驛歸寧遷中書侍郎丁內憂中使慰問賜絹三百匹奔喪南訃祔塟先塋毀無圖生嗌不容粒白雀黃犬號噪庭塋素鳩紫芝巢植廬隴孝之至者將有感乎既卒哭復遣中使起公本官同中書門下平章事口敕敦諭不許為辭聞命號咷使者逼迫及至闕下懇請終喪手詔曰不有至孝誰能盡忠墨縗之義不行蒼生之望安在朕以非常用賢曷云常禮哀訴即宜斷表賜甲第一區御馬一尋遷中書令集賢學士知院事修國史初公作相也奏差擇元戎皆取良吏不許入請罷賞戰功減諸軍兵省年支賜諛臣儳議事竟不行明年公奏籍田躬耕禮節加金紫光祿大夫進封始興伯每天長節公卿皆進寶鏡公上千秋錄述帝王興衰以為鑒戒公直氣鯁詞有死無貳彰善癉惡見義不回范陽節度潁王澐奏前太子索甲二千領上乃震怒謂其不臣顧問於公公曰子弄父兵罪當笞況元良國本豈可動上因涕泣遂寢其奏武貴妃離間儲君將立其子使中謁者私於公曰若有廢也必將興焉公遂叱之曰宮闈之言何得輒出御史大夫李公尚隱太府卿裴伷先不禮中官皆忤上旨必在殊譴公全度焉幽州節度張公守珪緣降兩番斬屈突干將拜侍中涼州節度牛仙客以省軍用將拜尚書並觸鱗固爭竟不奉詔平盧將安祿山入朝奏事見於廟堂以為必亂中原固請戮之上曰卿以王衍知石勒此何足言無何用兵為虜所敗張守珪請按軍令中留不行公狀諫曰穰苴出軍必誅莊賈孫子行令亦斬宮嬪守珪所奏非虛祿山不當免死再三懇請上竟不從邊將蓋嘉運等上策密發將士襲平西戎公以為不可妄舉結後代讐非皇王之化也上又不納及羯胡亂常犬戎逆命元宗追嘆曰自公歿後不復聞忠讜言發中使至韶州弔祭其先見之明有如此者學究精義文參微旨或有興託或存諷諫後之作者所宗仰焉上表論事事多樞密入皆削藳人莫得知常以致君堯舜齊衡管樂行之在我何必古人由是去循資格置採訪使收拔幽滯引進直言野無遺賢朝無闕政百揆時序庶工允同儕見嫉內寵潛搆罷公為尚書右丞相初不介意居之坦然執憲者素公所用劾奏權臣豸冠得罪借以為累貶荊州長史三歲為相萬邦厎寧而善惡太分背憎者眾虞機密發投杼生疑百犬吠聲眾狙皆怒每讀韓非孤憤涕泣沾襟開元二十八年春請拜掃南歸五月七日遘疾薨於韶州曲江之私第享年六十三皇上震悼贈荊州大都督有司諡行曰文獻公粵來歲孟冬塟於洪義里武臨原近於先塋禮也夫人桂陽郡夫人譚氏循州司馬府君誨之子也淑慎宜家齊莊刑國珮環有節纂組皆工幼作女儀長為內則太夫人樂在南國不欲北轅克勤奉養深得婦禮至德二年十月六日終於私第春秋七十七晝哭門為門日月綿遠同塋異穴卜兆從宜公仲弟九皋宋襄廣三州刺史採訪節度經畧等使殿中監季弟九章溫吉曹等州刺史鴻臚卿腰金拖紫三虎為榮立德行政二馮推美嗣子拯居喪以孝聞立身以行著陷在寇逆不受偽官及收復兩京特制拜朝散大夫太子右贊善大夫孫藏器河南府壽安尉永保先業克秉義方姪殿中侍御史抗文吏雅才清公賢操以兄拯早世姪藏器幼孤未建豐碑乃刻樂石用展猶子之慕庶揚世父之美浩義深知已眷以文章禮接同人惠兼甥舅薄技效德無愧其詞銘曰鳳生丹穴鵬翥南溟天乘粹氣地發精靈傑出我公揚於王庭甫稱降神說表騎星學究經術文高宗匠再掌司言爰立作相忠義柱石謀猷帷帳王綱允帝采惟亮退居右揆出守南荊元鶴緝翼青蠅營營不瞑猶視雖歿如生昭昭令名千古作程演天寶中為太學生大歷中官邢州刺史貞元中歷檢校尚書吏部郎中兼御史中丞余少居淮海日夕觀潮大抵每日兩潮晝夜各一假如月出潮以平明二日三日漸晚至月半則月初早潮飜為夜潮夜潮飜為早潮矣如是漸轉至月半之早潮復為夜潮月半之夜潮復為早潮凡一月旋轉一匝周而復始雖月有大小魄有盈虧而潮常應之無毫之失月陰精也水陰氣也潛相感致體於盈縮也先王立清廟修百祀所以展嚴禋祈景福今釋門之有塔寺亦像教之崇建福焉或謂之人祠或謂之精舍或謂之伽藍或謂之招提名雖不同其實一也河朔之州魏為大魏之招提開元為大開元者在中宗時草創則曰中興在元宗時革故則曰開元道無常名隨時而已矣寶應初歲王師北伐奮其威武或以火攻秉秆翕其延燒積薪吁其可撲由是寺門夷蕩鞠為灰燼緇侶往來莫庇風雨耆老興嘆衣冠疚心共甘沒齒不覩興復洎開國田公之在魏也勒四封之人而撫之閱三軍之實而補之戎務之閑諗於僧曰彼道場勝地麗譙餘址堙替歷稔末之克修吾儕闔廬猶設鍵閉矧乎尊像之所在福田之所植臺觀有素其可闕乎始吾之來有意於此惟是緝綏申儆以供禦上事故未遑也今原野墾府庫實甿庶安居徒逸而締構不備豈吾心哉即持俸錢遠度山木匠伯獻藝役夫僝功時大軍之後良材一罄龍門上游下栰仍阻公乃使河中府以營建之旨咨於台臣精誠內馳萬里潛契山不吝寶貞松大來炎涼未再水濱如積驚和嶠之千丈恧慶氏之百車操繩墨運斤斧者得以功成而不溷亦由材之備矣既立三門鎮之層樓又像雙闕校之連閣甍宇若畫棟桴干雲犖投蓋而靡及嬴抱關而方啟上可以迴眺百里覽川原林麓之富下可以俯瞰萬室察舟車士馬之殷崇乎信一時之壯觀而全魏之卓絕也初樓之經始僧徒皆惑以為舊制已廣後難及也迨樓之集事僧徒皆喜以為有加於前無不及焉其中長老或涕而言曰此寺自神龍至於寶應五十有七年而遇焚毀自寶應以至於茲十有三年而復舊物非夫上天悔禍諸佛護念則前功幾乎泯絕大功不能為謀尚何見斵礱之制丹雘之制煙聚霧合聲馳響應若斯之神速者已是知田公之勇於信施極於修葺非人力也如來付囑大臣有旨哉公頃曾入寺虔恭作禮有舍利兩粒降於其瓶光明圓淨瑩徹心目蓋舍利者非常之瑞雖一粒二粒乃至多粒供養功德以金身等遂於寺內起塔二所而分葬焉入塔之辰見祥雲靈鶴徘徊其上百千人俱歎未曾有得不謂道心純至而冥佑薦委耶公又以此寺經典舊多殘缺哀彼學徒訪聞無所乃寫一切經兩本并造二樓以貯之三四五佛初中後善龍宮所不備矣耳所未聞莊嚴圓滿卷帙充足其闡化之功力有如此公體資海岳德邁人天深了因果高謝繫縛復於此寺度幼子一人俾修淨業以傳法印妙莊故事禳袪前軌既歷多劫公能繼之其樹善之規有如此噫建三門惠也制雙塔誠也繕㣥經智也度幼子慈也有一於此且長享百祿慶流後裔況能備茲四者加以氣懾貔豹心雄鐵石一為蒼生之父母一為天子之股肱受登壇之寄畫雲臺之像未云多也公令弟御史大夫兼貝州刺史北平郡王廷琳雅量沖遠天姿穎出內安黎庶紹龔黃之名外鎮封疆宏魯衞之政公愛子左散騎常侍兼御史中丞悅駕部郎中兼御史中丞綰從子太子賓客兼御史中丞昂等皆才傑而妙器周而敏卓然自立克茂家聲如龍如虎森森翼翼豈必觀懿氏之兆而後識其昌聽卜偃之說而乃知其大論者以開元天寶以來北平士望腰金拖紫者多矣未有如公弻諧帝室總統方面侯王將相萃於一門數十年間光華照灼雖方召衞霍輯寧周漢垂名竹素曷以過之寺主僧法敬昂公所度之子也幼而聰達閑於禮訓求封君之錫土慕太子之踰城上座僧志高都維那僧道圓及諸徒眾等並精通妙法堅持密行名稱普聞威儀無缺遠則澄釋繼踵近則福寂比肩莫不欽公之徽猷承公之令範懼瓊琚之匪報思鼎鼐之有銘聿相與轉石山足立碑門右以無忘我田公之茂績其詞曰碣石巉巖滄浪沖融蘊茲間氣生我田公道可濟時材任理戎擁旄杖鉞作藩於東八座爰涉三台累踐人臣寵榮今古或鮮祗率常命式敷彞典殊勳載崇真門日闡三門峩峩舊址已傾刊木萬里匪公誰成雙塔嶷嶷光現是呈運甓千夫匪公孰營無量法寶允資流布有梵有室所聞必具無量眷屬允資佛護若女若男遇緣則度儉德凜如清心澹如傾家以施內不畱儲恢我佛乘壯我禪居永綏福壽其樂只且叔蒙大歷中浙東處士原天地之本始不知根荄孰先蓋自坯璞卵胎並鼓於太素也天人之變古今言者詳矣著之成說存諸史冊故無以間然而地靈之推運水德之經緯則夫恒數與天並騖探而究之可得歷數而計之也前史氏蔑如不記其無乃有闕典乎夫陰陽異儀而反違以其反違故賴以相資是故天與地違德以相傾剛與柔違功以相致男與女違性而同志造化何營蓋自然耳若夫凝陰以結地融陰以流水鍾而為海泒而為泉或配天守雌或制火作牝觀其幽通潛運非神謂何是故潮汐作濤必符於月百泉不息以經地理猶三光未息之健於天也晦明牽於日潮汐繫於月若煙自火若影附形有由然矣馳輪不轉轂固無是也地載乎下㣥陰之所藏焉月懸乎上㣥陰之所繫焉太溟水府也百川之所會焉北方陰位也滄海之所歸焉天運晦明日運寒暑月運朔朢錯行以經大順小異以合大同是大運廣度也夜明者太陰之主也故為漲海源月與海相推海與月相明苟非其時不可踵而致也時既來不可抑而已也雖謬小準不違大信故與之往復與之盈虛與之消息蜉蝣伺日蜄蛤候月蕣以晨榮藫以晦零況海月乎方諸接明水陽燧延景火昭昭乎見日月之感致矣
