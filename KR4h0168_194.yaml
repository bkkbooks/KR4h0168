front:
  text: 全唐文欽定全唐文卷一百九十四楊炯五
  hash: sha256:c53615cbe32da2075233f7ba950de68032adb243cd1bc0ed42c6387620ff337c
body:
  text: 成氏之先有周之後姬文受命三十八王郕伯象賢二十一代漢之少府國家維城晉之廣楊王室藩屏公諱知禮其先上谷人也子孫避地徙於某曾祖休寧後魏汾州刺史齊特進左右衛大將軍宇文朝江州刺史隋成陽郡公諡曰武勳格皇天澤充區域該備寵榮兼包命賜祖少遐北齊民曹郎中宇文朝地官上士襲成陽公建國之屬以訓五品以親百姓父綽隋金紫光祿大夫唐深州刺史上柱國天子大夫金章紫綬天王使者皁蓋朱輪公誕保靈和受茲介福講之以學合之以和純粹以積其中文明以宣其外出於口者必是先王之言萌於心者莫非君子之德戒慎乎其所不覩恐懼乎其所不聞時止時行左宮右徵在朝濟濟在家雍雍祇服宏業克丕堂構襲成陽公歷箕州平城洛州邯鄲二縣令武鄉里閈榆社隄封公宰平城日宣三德悲歌相聚袨服成㣥公宰邯鄲雷震百里儀刑嘉誨範乎人倫令問廣譽塞乎天壤將蹈九列平三階豈意太和交薄而天道難諶降年不永春秋若干以某年月日終於某所夫人宜城縣主聖神皇帝之堂姊王姬外館之長女夫人道峻於閨房名輝於邦國我大周敘洪範作武成大賚而萬姓悅垂拱而天下理法號惟舊制贈荊州刺史生則唐堯不用沒則周武追封為龍為光有始有卒立名於後以顯其親反葬於周不忘其本以某年月日歸葬於某原碣石恒山燕南趙北禮儀光被宗族相臨大夫弔桓子之喪天子歸惠公之賵蘧瑗之葬不害良田孔邱之塋不生荊棘長子司衞少卿兼檢校魏州刺史大辨中子左鷹揚將軍大方少子朝議大夫行司漢主簿大琬等門承四代德盛三賢有終身之憂盡生人之本璽冊裒贈宜宣無窮景鍾勒銘若古有訓嗚呼哀哉其銘曰神岳之英大川之精如山之峻如流之清行之斯立言之斯成登車發耀在邦有聲傳於舊國舊國惟平宰於二縣二縣惟寧余聞舊說天鑒孔明誰謂靈誕喪落淑貞永錫不匱克揚其名冊書光寵沒有餘榮系曰列星垂象兮炳天光白露為霜兮沾人裳彼蒼天兮殲我良列星垂象兮炳天暉白露為霜兮沾人衣九原可作兮吾與歸南方火德陽精赫雷電之威西陸金行秋令毒風霜之氣達其變聖人所以定天下之文象其宜聖人所以觀天下之變或衣裳六合舞干戚而掃虔劉或鐘鼓八紘用甲兵而誅暴亂若夫皇天失紀彗孛飛流后土不綱山河崩竭蚩尤食石災害於生人項羽拔山憑陵於上國天子聞鼓鼙之響思將帥以龔行將軍屬甲冑之容攬英雄而決勝則風雲潛感豪傑挺生得七星之武曲破軍受五運之金多木少四時繁弱射連尹於嶅山萬辟太阿殺顏良於官渡然後達人知足徒興白髮之歌烈士徇名不受黃金之賞與夫棄其筆墨漢家封萬里之侯稱爾戈矛周王命百夫之長豈可同年而語哉君諱則字宏規其先渤海人也後代因官遂家於涇州之安定縣神房阿閣泰山橫日觀之峰金闕銀臺滄海蔽天虛之岸風土形勝關河表裏三分六州之大業師尚父贊其經綸一匡九合之元勳齊桓公拓其疆場高柴至德藉東魯之聲名高鳳沈研盛西京之學校英才磊落而秀發人物蟬聯而間起三光不墜察高星於太紫之宮八柱無疆奠高嶽於中黃之域曾祖沖北齊鷹揚郎將周左屯衞清宮府別將成軍夜火教戰秋風九天揚後一之兵六合擁前三之陣張良入漢行觀滅楚之徵微子奔周坐見兦殷之兆祖赦周襃郡南和縣長陶元亮攝官於彭澤道契羲皇陳仲弓歷職於太邱德符星緯飄風驟雨不入灌壇之鄉暴虎蒼鷹潛出瑕邱之境考才朝議郎上開府孫子荊之天骨亮拔不㣥王夷甫之道心神鋒太峻議郎清秩懸符處士之星開府崇班上接台階之位君雄心獨斷猛氣無前用兵書六甲於自然知射法三篇於性道早圖星象管公明懷察變之心幼識旌旗陶恭祖有行師之略屬隋人板蕩天下崩離朱陽夾飛鳥之雲紫極現雄雞之象陳兵爭戰窺玉策於中州姚石壇塲竊金符於㝢縣我高祖黃雲大帝白水真人風雷海嶽之純精天地陰陽之正氣媧皇受命殺黑龍而定水災漢祖乘機斬白蛇而開火運君夜觀乾象晝察人情審熒惑之謌謠驗嵩山之讖記關中王氣不勞甘德之言沛國真星無待殷馗之說賊薛舉豺狼梟獍檮杌窮奇守幽隴以行災負關河而作孽天王按劒出軍於玉帳之前猛將分麾受律於金壇之下以義寧二年王師薄伐趙國公長孫無忌精兵若獸利器如霜問君以帷幄之謀待君以心腹之寄營當月暈因八門之死生陣法天星乘五將之關格蔭華蓋歷明堂以我和而制其離以我直而摧其曲敗楚師於柏舉未足權衡執秦俘於崤陵無階等級此實君之功也其年詔授朝散大夫賜物三百段排患而釋滯功成而不居比疏傅而辭榮追留侯以高蹈三靈革故君子於焉待時四海清平謀臣以之歸第自太王基命成康隆玉版之圖高帝受終文武盛金刀之業家給人足天成地平猶勞水旱之餘尚想京坻之積咸亨三年春奉勅於河陽檢校水運使搜粟都尉河堤使者銅橈鐵舳蒼鷹白鶴之船竹箭桃花貝闕龍堂之水引紅粟於淮海汎歸舟於秦晉遂使齊臣獻納先陳不涸之名漢后絲綸即有常平之號望千石之氣可以療飢開萬箱之儲自然知禮此又君之功也其年詔賜上騎都尉嗟夫河流曲直天道盈虛鬼神莫之要聖賢莫能預高臺下泣孟嘗君之惻愴可知梁木興謌孔宣父之平生巳矣上元三年春三月日終於樂邑里之私第享年七十六惟君魁梧動俗符彩驚人忠孝天資溫良日用一門兄弟盡同鍾毓之車千里賓朋時命嵇康之駕每至白雲生海素月流天未嘗不顧盼山河抑揚琴酒馮異之大樹對諸將而無言子夏之名山謝時人以長往四林遊刃八水忘筌能袪有漏之因早得無生之法雖十年俱盡陸士衡之長歎有徵而千戴猶生藺相如之壯心恒在即以冬十月丁酉葬於安定東南二十里之平原禮也陶公相宅郭璞占墳面丹鳳而背元龜兆青烏而徵白馬三百篇之後卜筮何從二千石之榮子孫無替長男仁叡中男仁楷少男仁護仁昉等或體窮三變潘陸不足以昇堂或力敵萬夫關張不足以扶轂有元方季方之長幼傳學詩學禮之門風金友玉昆忠臣孝子窮號積於心髓創鉅纏於肌骨星辰巳變昊天無報德之期霜露潛移君子有終身之感葬之以禮垂制度於三王思之以時別蒸嘗於四季然後按韋賢之舊德敘潘岳之家風戴逵銘北海之文張昶刻西山之石若使鄧將軍之一見自得嘉名魏太祖之來觀懸知絕唱其詞曰金闕千仞銀宮百常發揮雷雨震動陰陽山水形勝人神會昌九州霸業賜履勤王樂只君子邦家之光驚雷氣候大昴徵祥運屬飛海時逢吸霜中原逐鹿西嶽兦羊漢起高帝周興太王乃披荊棘即奉壇塲國步猶阻黎元未康將軍不拜使者相望陣合星斗兵符玉璜殲夷叛逆刷滌邊荒化穆三代時清九皇猶思禮節尚試堯湯漕通淮海水泛舟航蒼鷹鷁軸紫貝龍堂功立身退懸車杖鄉百年俄頃萬緒悲涼昔時華屋今日元房平天慘慘半月蒼蒼地謂西郭山言北邙曲池無處松檟成行君諱通字某其先沛國譙人也近代因官遂居於瓜州之長樂縣故今為縣人焉顓頊高陽之子孫曹叔振鐸之苗裔山河白馬漢丞相開一代之基譙沛黃龍魏武帝定三分之業承家䘏允岳峙星羅居雍州之西境斷匈奴之右臂門容駟馬旌旗玉塞之雄坐列三貂人物金行之秀祖某隱居不仕父顯盪寇將軍河庭寶玉廣都鸞鳳或閭閻之內禮敵於諸侯或枹鼓之間威振於千里功則可大以官族而為官德亦不孤惟將門而有將君天才卓越雄略縱橫陶謙性好於幡旗王濬志在於長㦸東方諫議口誦孫吳諸葛武侯坐吟梁甫屬有隋之末四海分崩皇運之初三光草昧五星同聚田橫猶在於海中九代飛榮隗囂尚屯於隴右賀拔盛操符誓衆斬木稱兵以被髮左袵之餘負檮杌窮奇之號遂欲驅馳我塞北撓亂我河西天子不懌於廟堂鼓其雷電使者相望於道路申其弔伐武德元年乃詔侍中楊仁恭出使先之以德義陳之以兵甲七旬干羽不藉有苗之師萬國侯王坐見防風之戮君深知逆順獨斷胷懷去危即安轉禍為福非如馬援遨遊二帝之都不學竇融自保三分之重勅授昭武校尉鮮卑醜類慕容殘孽遷於大棘之城止於小蘭之介雖謂其㣥下願聞禮於上京而拜於將軍遂誇大於諸國貞觀八年詔特進代國公李靖為行軍大總管登壇拜將授鉞行師開太一之三門閉陰符之六甲決勝於俎豆然後折衝萬里信賢如腹心故能匡正八極君當仁不讓聞義則行從王粲之戎旅棄班超之筆研係單于之頸有類長沙斬樓蘭之王更加平樂詔除上騎都尉車師舊國俯枕前庭戊巳遺墟斜連後壁負天山而板蕩擁蒲海而虔劉聖人之德非欲窮兵黷武王者之師蓋為夷凶靖亂十四年詔兵部尚書侯君集為行軍大總管軍營玉帳武略珠韜旌旗蔽於日月金鼓聞於天地安人保大實憑帷幄之謀斬將搴旗咸藉武夫之力君緬懷高義思報國恩從來六郡之子是為萬人之敵梯衝所及披靡堅城矛㦸所臨野無橫陣一舉而清海外再戰而滌河源飲至策勳抑惟恒授詔除上柱國君備嘗艱阻頻有戰功天子聞之累加徵辟慕田疇之節羞賣盧龍之塞高魯連之義請從滄海之遊遂乃散髮鄉亭拂衣邱壑為趙魏之老在羲皇之年關內諸公深知郭解洛陽人物高談劇孟家僮有禮皆使拜賓門客多才咸能市義南宮養老坐聞鳩杖之榮東岳遊魂俄見鶴書之召以龍朔元年某月某日終於里第嗚呼哀哉夫人某官之女也沅湘降祉河洛騰休符玉石之堅貞貫風霜之慘烈鏡飛天上窺祥鳳於銀臺劒動星文秘蛟龍於玉匣以某年某月日終越某年月日合葬於某原君孝實因心忠為令德鮮花匝樹盡兄弟之歡娛好鳥鳴林展交遊之宴喜太初朗月俯照金鞍叔夜清風來生寶劒故能戰必勝攻必取西零種族遙憚武臣北漠酋豪見稱飛將雖死之日猶生之年園令獨慕於相如漢帝長懷於李牧長子遊擊將軍和政府右果毅都尉上柱國永雄次子朝散郎行西州柳中縣主簿上騎都尉知君等三餘廣學百戰雄才就養之方兼申愛敬慎終之道不忘哀戚雖雨崩防墓無孔子之格言而水齧前和有文王之故事即以某年月日改葬於木城之平原長婦某氏即永雄之妻也某官之女柔風淑譽習禮聞詩上奉舅姑亠勹方睦娣姒溫家之婦方歡白玉之臺盧氏之妻空對黃金之椀先以永淳元年某月日終至是即陪窆於塋內右翊衞宏軌兵圖日用劒術天知六郡許其良家三川養其聲利思宏祖德願敘家風託無愧之銘跋涉載勞於千仞訪他山之石東西向踰於萬里炯効官昌運負譴明時始以東宮學士出為梓州司法傾蓋相逢當仁不讓庶使見曹娥之碣楊修歎其好詞讀元壽之文高祖稱其佳作其詞曰大矣丞相天地寅亮烝哉王侯子孫蕃昌條分葉散源濬流長金城北峙玉關西侯山澤駢羅衣冠輻凑降神生德興賢誕秀曰萬人英材標國楨髫年學劒丱歲論兵以身許國東討西征皇家啟聖撥亂反正逆賊遊魂不恭王命亦既授首河西大定蕞爾湟中車書未同帝赫斯怒攢其英雄風行電轉谷靜山空二庭遺孽交河路絕天子聞鼙元戎按節王師無戰海外有截歸我田廬功成不居歲云秋矣日月其除壽非金石命也何如孝乎兄弟葬之以禮蓼蓼者莪人生苦多言猶在耳邈若山河漢丞相之尊官大位乘輪滿於十人齊景公之利用厚生有馬盈於千駟羽旄冠劒摐金鳴玉疊其前苑囿池臺清歌妙舞喧其後崇高在於寵祿大欲存於食貨義然後取橫玉帶以當仁道不虛行坐鹽梅而自得若乃時之不與數之不通貴賤任於天窮通由於命左太冲之詠史下僚實英俊之塲嵇叔夜之著書賤職為老莊之地雖復勢力以高下相懸尊卑以商周不敵孔宣父中都之小宰幽厲多謝於陪臣陳仲弓太邱之一官公卿有慚於縣長是以德成者上道在斯尊陶潛則安枕北窗言偃則鳴弦東武抑揚足以儀四海顧盼足以破三軍代有人焉斯為盛矣公諱晃樂安博昌人也其後因官遂家蒲州之永樂天子令德軒皇為誕姓之源諸侯計功薛國在宗盟之後西京執法則有御史大夫東漢循良則有會稽都尉任光鄉里之忠厚任隗朝臣之鯁直益州從事術數知名臨海真人清貞克巳况乎東西海岱強齊九合之都表裏山河全晉三分之國車馬雷駭衣冠鼎盛盟書百代可謂功臣遷徙邱陵實惟豪族曾祖顯祖熙考憬並策名天爵獨步人師懷素履之幽貞保黃裳之元吉張家碑碣荊州有七代孝廉荀氏鄉亭潁川有八人才子君外資剛健內育文明合千載聖賢之間鍾五行金木之秀王恭濯濯春柳懷風和嶠森森寒松列景有曾參之孝有史魚之直有子夏之文有冉求之藝先王德行固名言而在茲大聖溫良亦顛沛而於是當朝一見許其王佐之才行路相逢加以美人之贈解褐為家令寺主簿天王太子之位赫赫前星天地長男之宮巖巖左闕出身事主元良永固於萬邦束髮登朝匕鬯不驚於百里秩滿授將作監主簿千門萬戶張華窮壯麗之圖東主西賓班固盡謳謠之致職掌宮觀是名將作大司馬桓溫之府績用在於元琳大將軍竇憲之曹文章寄於亭伯累遷右衞長史南京左掖上將陪藩北落師門天軍列衞東觀漢記梁統有清白之名中興晉書薛兼有恪勤之譽詔遷朝散大夫行益州溫江縣令華陽西極漢水東流背面通秦越之鄉左右夾巴涼之城風煙可接懸車束馬之山雲物潛通織女牽牛之象神仙所宅則有二十四居途路所經則有五千餘里金城石郭還聞上代之風國富人安時聽中和之樂於是乎龍泉獨斷龜兆亠勹方求品命千名封疆萬戶暫過亭長乘軒之望可知且詣中軍理劇之才有屬旌孝悌勸農桑省徭役恤鰥寡所以一縣稱平所以百城尤最蕭育是杜陵男子不入後曹黃浮非鄉里所知不寬同歲洛陽行馬門士無心齊國池魚權家絕望鄭文公邵陵之縣但稱男子之名師尚父灌壇之鄉唯有神人之哭實謂樞機八座上下三階豈惟縛柱鞭絲操刀製錦巫馬期之任力弊起乘星鍾離意之悅人災生解土享年五十有九以儀鳳二年六月二十五日卒於官第夫人姚氏徵士神俊之女也壽邱僊葉媯水靈苗定姚信之璣衡審姚光之術藝明星燄燄不臨太邱之前暮雨沈沈不散巫山之曲婦人謂嫁女子有行織絍組紃棗脩榛栗南斗千齡之匣忽愴沈江北方三代之儀終悲其穴先以咸亨三年七月二日終於西京翊善里之私第越儀鳳三年冬十一月一日歸祔於永樂縣歷山之平原卜虞芮之閒田帶關河之設險居人致祭桐鄉有朱邑之祠怪石成墳葉縣有王喬之墓君燕趙奇士神仙中人容貌魁梧衣冠甚偉揚子雲之窮巷好事來遊段干木之閭居通侯展敬自陳力就列居家可移妾本絕於織蒲馬無聞於食粟原子思之厚秩徧給鄉人孔文舉之中罇延留坐客加以備觀圖史尤精釋教夢幻泡電知一切之皆空園林貨財見三陽之巳淨遭時屯坎浮生蹇剝佳人不再荀奉倩之傷神赤子無期潘安仁之慘慟天乎到此命也如何及其瞑目少城歸魂舊壤平原古樹唯餘孺子之墳春露秋霜非復皋陶之祀於是鄉鄰作主朋友加麻撰德銘之於素常披文刻之於翠石魯哀公作仲尼之誄天不憗遺蔡伯喈為有道之碑人無媿色其銘曰軒帝之族漢朝之臣西州智士東海真人豪傑天縱衣冠日新實生其德必有其鄰道在為貴知幾則神氣衝南斗價直西秦大蒙之信太平之仁辨窮非馬學究成麟孝友為政觀光利賓重明比德少海為春宮室之象南斗北辰甲兵之衞閶闔鈎陳山控金馬江迴玉輪天文井絡地紀梁岷庭前置水甑內生塵園蠶有績野雉來馴時命屯蹇生涯苦辛寶金义虛贈玉樹長淪輔德無輔親仁不親百年夭枉一旦歸真雷鳴之下長河之濱旌旃委鬱徒御逡巡悲風汨起血下霑巾死而可贖人百其身金城裂地之災玉弩驚天之禍蹴崑崙以西倒蹋泰山而東覆三微歷數盡薰歇以聲沈萬國衣裳咸土崩而瓦散是故殷憂啟聖聖人騰海岳之符草昧興王王者受風雷之祉則有思窮圖讖潛觀赤伏之萌識洞禨祥暗察黃星之兆天懸兩日詢去就於河宗地震三川考興兦於柱史危邦不入亂邦不居翦荊而叩天門臨壇塲而對休命及其元黃再造日月重輪功成而不居名遂而身退南華吾師也親居賤職東方達人也安乎卑位然後武城絃唱優游禮樂之中彭澤琴樽散誕羲皇之表雖杜當陽之文武蘭菊猶存而薛孟嘗之池臺風煙遂歇悲夫死生命也貴賤時也用之則行舍之則藏出處者君子之恒務左右者君子之攸宜吾聞其語矣今見其人也君諱楚才衞州衞縣人也昔繞樞神電軒轅氏之馭百靈貫斗祥星顓頊氏之臨四海金科作範商邱有帝系之雲玉札披圖幽谷有貞人之氣由是公侯策命歷千載而彌昌鐘鼎歡娛經百王而不替豈直將軍列位孫吳暗合之兵協律當官天地冥符之樂若斯而巳矣曾祖裕後魏東宮舍人太子洗馬使持節徐州諸軍事徐州刺史燉煌郡開國公贈亠兊豫二州刺史直城西望高闕東臨非無置驛之歡實有前驅之寵琅琊負海八門都督之榮玉漳瀕河百代封侯之貴大父昌北齊彭城王府中兵參軍事隋濟陰郡守襲封燉煌公文塲筆海炤爛等於星辰辯囿談叢鏗鏘協於風雅九千里之丹鳳始踐王門七十日之黃龍初階郡職考孝友隋晉州岳陽縣令顏回稱太平王佐月角殊姿仲由稱禮義霸臣星衡詭狀唐都晉野有恒山太嶽之風墨綬銅章有錯節盤根之化若夫于公之宅駟馬爭驅辛氏之門五龍齊駕英靈不巳還當命代之期將相有徵克保承家之業東郊競日探祕跡於璣衡西蜀談元測靈心於造化雄才壯思首九奏而和八音廣見洽聞披五車而誦三篋加以興居禮樂出入孝忠簡於一人備於萬物弓旌疊湊始命賢良幣帛交馳載徵巖穴從微至著濫觴萌括地之波積小成高覆簣漸排雲之構隋大業十二年補謁者臺散從員外郎非其好也屬三千否運百六災年諸侯窺玉鼎之尊天子厭金陵之氣蚩尤則命風召雨桀黠於中州共工則折柱傾維崩騰於海縣能扶天下之危者必據天下之安能除天下之憂者必享天下之樂我高祖神堯皇帝所以從人望宅靈心鎮天關迴地軸鼓聲雷駭親張霹靂之威旌羽星懸手握招搖之柄君沖情索隱妙筭知來候東井而考前聞裂西河而尊故事上略中略奏山石之奇謀文韜武韜奉川璜之祕訣義寧二年授車騎將軍累加開府武德五年遷右衞二十四府右車騎將軍仍於卭州鎮守皇階甫闢猶勞尉候之虛天步初夷尚有風塵之警示之以文德陳之以武功所以外戶不扄所以重門罷析六年轉中山府左列南州舊俗淫其白獸之祠西僰餘甿背我黃龍之約王師直進陵劒棧以長驅廟略遐宣指銅邱而決勝七年詔君討襲楓天棗地金門玉帳之營方卦圓蓍剡木弦弓之射以此衆戰誰能敵之以此攻城何城不克雷出而星曜龍騰而鳳飛一鼓而擒四姓三戰而平百濮大夫耆老非唯二十七人拓土開疆豈直五千餘里返行飲至舍爵策勳焉禮也其年加上大將軍賞口十六人幷良馬一匹而俄以爭功得罪游俠從軍特降王綸遐遷騰府通塞有命潘安仁之緒言富貴在天卜子夏之餘論無階封禪空嘆息於周南絕望夏臺竟棲遲於漢北太宗文武聖皇帝承聖皇之大寶奉天帝之休期雷雨八瀛光華四極旌賢赦過維新之命屢覃念功簡勞惟舊之恩累洽貞觀元年授長樂監仍命於北門供奉宜春禁苑太液神池浸石菌而揚波擢金莖而挹露南經丹徼恒陪萬乘之遊北繞黃山再奉三驅之禮當是時也穆穆焉皇皇焉濟濟焉鏘鏘焉一陰一陽而有序自南自北而無外猶復中宵不寐殷勤多士之林昃景忘疲渙汗非常之辟十四年應詔四科舉射策登甲第明於國家之大體達於人事之始終可謂宰相之璞可謂皇居之寶洛陽才子一承宣室之談魯國儒生行踐中都之邑尋授靈州嗚沙縣令累遷原州百泉縣令科通紫徼印負黃州涼秋九月寒沙四面平雲匝隴處處而秋陰圓魄低關蒼蒼而夜色君乘輜演教佩紱臨人德被三城風移五縣抽琴命操還臨單父之堂繫石飛鳴即對李泉之學明以御下將水鏡而通輝清以立身共水壺而合照神行有感方登玉鉉之階靈化無方獨歎瓊棺之墓春秋七十有一以顯慶元年十二月八日終於官舍君年十一丁內艱朋友相哀家人不識昔稱曾閔今曰荀何近古以來未之有也隋郡東曹掾江溢見而歎曰此真可謂保家緯化嗟尚者久之大業末年皇綱漸紊不掃一室自懷包括之心獨守太元且忘名利之境於時魏特進房僕射杜相州等並以江海相期煙霞相許付同心之雅會訖刎頸之良遊或閉戶讀書累月不出或登山涉水經日忘歸斯賢達之素交葢千年而一遇洎塵埋五岳海沒三山辭殷而奉周背楚而歸漢深謀遠慮即良平無以加也行軍用兵則韓彭不能尚焉數奇命蹇遂無望於高門日往月來竟銷聲於下邑情均寵辱則萬象同歸跡混彭殤則百齡俱盡浮生若寄大漸彌留遺誨子孫庶幾薄葬等梁鴻之宅兆邈矣他鄉符祭仲之高居依然新鄭唯仁與達君其有焉存榮歿哀此之謂也即以某年月日葬於某原夫人廣平宋氏齊尚書左丞士順之曾孫隋建安郡司法長文之季女霜淒月瑩菊艷苕華淑問秀於閨房柔風洽於詩禮琴前鏡裏孤鸞別鶴之哀竹死城崩婦湘之怨長子金河府校尉上柱國輔仁等十輪方駕萬石駢衡窺上帝之兵鈐入先王之冊府指蒼天而永訴血下霑襟對白日以長號悲來填臆於是緦麻執友素葢賓朋傳祖德於高陽考豐碑於太學庶使城隍一變猶知鄧艾之名陵谷三遷尚識鍾繇之字其銘曰玉斗之英瑤光之精巡河幷洛握紀提衡柱史論道將軍用兵陸離簪紱奕葉公卿岳牧騰譽弦歌有聲階蘭疊影巖桂增榮山澤通氣風雲表靈凝脂點漆月角珠庭白玉無玷黃金滿籯忠為令德孝實天經朋友千里烟霞百靈琴尊野尚松竹山情數屬郡海時逢鬬星黃龍電震白騎雷驚赫矣高祖元亨利貞聖人有作天下文明自此提劒因茲間行攀鱗北海附翼南溟水火之陣孤虛之營左提右挈東討西征巨猾斯斬元兇載清功符衞霍知若良平自滿知損居中忌盈蕭條異縣坎土禀浮生降以中旨賓於上京陳書詣闕對問揚庭山連鴈塞野接龍坰朞月而巳三年有成波瀾不息箭刻無停梁木其壞高臺巳傾關雲斷絕隴鴈飛鳴頓雙鳧於葉縣跼四馬於滕城經天緯地之帝求制禮作樂之才撥亂反正之君資拔山超海之力繼韶夏而崇諡號非無陣戰之風披皇圖而稽文武或用干戈之道故能彌綸宗廟彈壓山川苞四海以為家一六合而光宅是以二十八宿懸列將而察休徵三十五星聚天軍而赫符彩呂望垂竿於渭涘道峻匡周張良授策於圯橋功崇佐漢乃有心如鐵石氣若風雲洛讖書名河圖祕象青絲電燭歷大塊以三休碧羽霜淒倚渾天而一息岑彭許允征南鎮北之名馮異王昌大樹中軍之號杜太行而泥函谷猛氣無前戮封豕而斬長鯨雄圖不測元戎十乘驅衞霍於前軍甲士三千列孫吳於後殿秋風白露執金鼓而齊六軍泰山黃河折銅符而光百代建廟堂之策為社稷之臣孰能與於此乎在我右將軍矣公諱哲字知人鉅鹿陽曲人也七代祖靖非前秦征北大將軍鎮北地上郡其後子孫因居於寧州襄陽縣開國承家之始誕姓命氏之源大名發於本支當塗峻於層構三辰鬱鬱天街分畢昴之都九野茫茫地險列山河之境丞相以萬機論道匡大運以震威嚴尚書以八座當官贊金行而標領袖文昭武穆方駕齊驅公子王孫朱輪華轂大鵬垂翰馭風伯而指南溟天馬騰姿偶雲師而集東道祖唐隋天水郡丞河陽都尉瑤林瓊樹擢標格以千尋圓折方流委波濤而萬頃雄飛有望豈惟京兆之丞陰德不何直丹陽之尉父寶皇朝通議大夫總管府司兵參軍事東家孔子至德生於上天南國申侯明靈誕於中岳君朝翊贊道先王之法言公府弻諧對上天之休命若夫聖人作而萬物覩元首明而庶事康日月粲其光華山川鬱其雲雨則有英靈間出丹陵諧白獸之祥符瑞庭生黑帝感蒼龍之傑隋珠一寸魏后揚睂和璧千金秦王動色顏生殆庶聞於竹馬之年揚子參元發自銅車之歲建情峯而直上疏筆海以橫流彫牆則百堵皆興峻宇則千門並列可大可久無忘簡易之途為子為臣率由忠孝之境郭林宗之披霧豈敢名言孔文舉之欽風每相推荐若乃五材並用誰能去兵七德兼施止戈為武出師於九天之上暗合兵書取睽於十日之前懸符射法固以文武之道揄揚滿於域中將相之才籍甚聞於海內貞觀十五年起家補國子博士喬林掃日驚白鳳於詞條璧水澄天駭雕龍於義壑班超慷慨常懷萬里之心季路平生每負三軍之氣十六年勅授左翊衞北門長上祿賜同京官仍令為飛騎等講禮鄧司徒之舊事馬上讀書祭征虜之前聞營中習禮宮花如錦還臨拜將之壇槐葉成帷復對閱軍之市自皇王眷命大帝應期運璇衡而制八方調玉燭而臨四極元兔白狼之野來奉衣簪蟠桃析木之鄉尚迷聲教太宗文皇帝操斗極把鈎陳因百姓之心問三韓之罪勝殘去殺上憑宗廟之威禁暴戢姦下藉熊羆之用公丹心白刃本自輕生六郡三河由來重氣烏江討逆剖項籍於五侯鹿野懲奸磔蚩尤於四宰二十年詔除游擊將軍右武候信義府右果毅都尉長上如故顯慶二年以內憂解職痛深吳隱哀極顏丁蹐厚地以崩魂訴高天而泣血紫泥垂渙頻降璽書墨縗臨戎遂從金革三年詔除左衞清宮府左果毅都尉尋圉谷府折衝都尉並長上如故又以應詔舉對策甲科遷左騎衞郎將於時長榆歷歷烽火猶驚高柳依依邊風尚急關山夜月遂為丹徼之秋西北浮雲翻作穹廬之景四年詔公為鐵勒道行軍總管陳兵玉塞按節金微學常山之蛇擬麗譙之鶴鐘鼓嘈囋上聞於天旌旗繽紛下蟠於地伏尸百萬因瀚海而藏舟闢地數千即燕山而築觀武臣雄略氣慴西零神將宏圖威加北狄武德元年詔遷左驍騎中郎將尋檢校右監門左武衞將軍本官如故昔者封禪陟云亭之後七十二君圖書出河洛以還三千餘歲振兵釋旅方崇薦帝之儀道洽功成必致禋天之禮粵以皇家闢統之五十年今上開基之十七載登封告禪玉牒金繩建顯號而施尊名揚英聲而騰茂實華夷輯睦皆承萬歲之恩朝野歡娛咸奉千年之慶乾封元年詔加明威將軍本官如故大風遺孽叛渙青邱小水殘魂憑陵碧海率百官於文祖尚興彭蠡之師會萬國於塗山猶有防風之戮是歲也詔公為遼東道行軍總管軍營對日兵氣橫天開玉堂而按部坐金城而勒陣闕鞏之甲犀兕七重艅艎之舩舳艫千里駕鼉梁於聖海秦皇息鞭石之威泛鼇釣於仙洲愚叟罷移山之力然後風行電卷斬將屠城塞丹浦之遙源伐黑林之奧本王孫公子名霑皁隸之臣深谷大山境入樵漁之囿二年詔加上柱國仍檢校安東都護導之以德齊之以刑威振六官風揚五部兵戈載戢無勞尉候之虞桴鼓希聞寧有穿窬之盜仰太陽而晞湛露方預四朝臨逝水而急寒風俄悲一去齊孟嘗之下淚高榭曲池魯司寇之悲歌頹山壞木長安杳杳還符日近之言京兆悠悠竟絕天高之問玉關生入自判無期繡服晨還竟知何日總章二年三月十六日遘疾薨於府第春秋五十有四嗚乎哀哉詔贈左監門將軍禮也唯公被服忠孝周旋禮樂仁者見之謂之仁智者見之謂之智研幾冊府金縢玉版之書索隱兵鈐元女黃公之法每建旟推轂三令五申躬擐甲冑親當矢石軍井未建如臨盜水之源軍竈未炊似對嗟來之食由是南馳北走東討西征運之無旁按之無下戴筐宮裏遙登大將之壇飛閣星邊獨列中軍之位雖龍泉匿字薰歇光沈而鱗閣飛名天長地久夫人扶風馬氏隋濠州刺史圓之孫也五松春艷牽少女之祥風八桂秋榮降仙娥之寶魄謝家之子歌柳絮而知慚劉氏之妻頌椒花而自恥三從按禮無虧內則之風四德揚蕤載闡中閨之訓宿盤龍於月鏡早沒鸞牀矯飛翼於霞樓先沈鳳穴珠星璧月終陪季子之階金鼎銀罇竟列齊侯之寢以貞觀十五年五月五日終於某所越咸亨元年某月日祔於某原長子瓜州司倉擇木次子右衞親衞元封等門傳萬石庭列雙珠花萼爭榮芝蘭藹秀天經地義欽承避席之談日就月將虔奉趨庭之教變槐檀而瀝膽木石悲酸代霜露以崩心幽明感動葬之以禮祭之以時生人之本盡矣死生之義備矣孝子之事親終矣於是門生故吏共緝家聲才子文人思傳盛德庶使藺相如之生氣歷千載而猶存隨武子之餘風盡九原而可作其詞曰文王受命畢公餘慶玉樹連芳金枝疊映三分並列七雄齊競建國承家重熙累盛功宣蹈舞德流歌詠河洛垂文山川出雲驪珠育照虹玉呈文直立孤聳天然不㣥棲遲膠塾悅懌邱墳恥為儒者自許將軍伊祁不懌軒轅討逆陣擁遼河兵屯碣石班超投翰揚雄執㦸弓合三材刀長四尺爰清尉候載澄疆埸得人者昌失人者兦皇恩俾乂帝曰明敭幽桂含馥滋蘭吐芳承天待詔觀國賓王茂績斯遠英聲克彰鵬池淼漫鷄山禍亂出閫辭家夷兇靜難金微瓦解玉亭冰泮扈駕天門陪祠日觀萬邦胥悅千齡啟旦斗骨危城占蹄舉兵丸山霧塞渤海波驚帝赫斯怒王師有征虔劉北貊戡翦東明導以文車丸宣其德刑太微上將文昌貴相非熊非羆令聞令望寵踰軍幕榮參武帳本謂來朝何期返葬原野蕭瑟風烟悽愴天道如何吞恨者多松風夜響薤露晨歌秋月如練春雲似羅榮華滅後寒暑經過青烏邱壠白馬山河
