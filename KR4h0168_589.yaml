front:
  text: 全唐文欽定全唐文卷五百八十九柳宗元二十一
  hash: sha256:c38e37090c60127d80e70ef50e0fdcbb9f14a311211b491e49d6c17f45c29f2e
body:
  text: 夫人姓劉其先漢河間王王有明德世紹顯懿至於唐有文昭者為帛丿糸州刺史號良二千石其嗣慎言為仙居令光州長史克荷於前人光州夫人之父也夫人既笄五年從於北海王府君諱某府君舉明經授任城尉左金吾衛兵曹修經術以求聖人之道通古今以推一王之典會世多難不克如志卒以隱終夫人生二子長曰彞倫舉五經早夭少曰叔文堅明直亮有文武之用貞元中待詔禁中以道合於儲后凡十有八載獻可替否有匡弼調護之勤先帝棄萬姓嗣皇承大位公居禁中訏謨定命有扶翼經緯之績由蘇州司功參軍為起居舍人翰林學士將明出納有彌綸通變之勞副經邦阜財之職加戶部侍郎賜紫金魚袋重輕開塞有和鈞肅給之效內贊謨畫不廢其位凡執事十四旬有六日利安之道將施於人而夫人卒於堂蓋貞元之二十一年六月二十日也知道之士為蒼生惜焉天子使中謁者臨問其家賻以布帛嗚呼夫人之在女氏也貞順以自處孝謹以有奉其在夫族也祗敬以承上嚴肅以蒞下事良人四十有九年而勤勞不懈生戶部五十有三年而教誡無闕年七十有九而戶部之道聞於天下為大僚垂紫綬以就奉養公卿侯王咸造於門既壽而昌世用羡慕然而天子有詔俾定封邑有司稽於論次終以不及時有痛焉是年八月某日祔於兵曹府君之墓銘曰夫人之德溫柔敬直承於陰教式是嬪則克生良子用揚懿美有其文武宏我化理天子是毗邦人是望若若紫綬榮於高堂惟昔孟氏號為母師在漢稱賢有雋不疑懿懿夫人惟其似之山北之里神禾之原問於靈龜閟此顯魂勒石垂休永永萬年唐永州刺史博陵崔簡女諱媛嫁為朗州員外司戶河東薛巽妻三歲知讓五歲知戒七歲能女事善筆札讀書通古今其暇則鳴絃桐諷詩騷以為娛始簡以文雅清秀重於當世其後病惑得罪投歡州諸女蓬垢涕號柳氏出也以叔舅命歸於薛惟恭柔專勤以為婦妻恩其故他姬子雜己子造次莫能辨無忮忌之行無犯忤之氣一畝之宅言笑不聞於鄰元和十二年五月二十八日既乳病肝氣逆肺牽拘左腋巫醫不能已期月之日潔服飭容而終年若干某月日遷柩於洛某月日祔於墓在北邙山南洛水東巽始佐河北軍食有勞未及録會其長以罪聞因從貶更大赦方北遷而其室巳禍巽之考曰大理司直仲卿祖曰太子右贊善大夫環曾祖曰平舒令煜高祖曰工部尚書真藏簡之父曰大理司直煜祖曰某官鯢唐興中書令仁師議刑不孥其二世大父也巽之他姬子丈夫子曰老女子曰張婆妻之子女子曰陀羅尼丈夫子曰某實後子銘曰翼翼仁師惟仁之碩一言刑輕帛丿糸載二百其慶中缺曾元不績簡之溫文卒昏以易七男三女八我之出仍禍六稔數存如歿宜福而災伊誰云恤惟薛之婦德良才全鄰無言聞臧獲以虔推仁撫庶孩不異憐兄公是怙夫屬欣然髲髢峨峨籩豆惟嘉蒸嘗賓燕其羞孔多有苾有嚴神饗斯何奚仲仲虺胡祐不遐高曾祖考胡嘏之訛淑人不居誰任於家書銘告哀以置巖阿馬室女雷五父曰師儒業進士雷五生巧慧異甚凡事絲纊文繡不類人所為者余覩之甚駭家貧歲不易衣而天姿潔清修嚴恆若簪珠璣衣紈縠寥然不易為塵垢雜年十五病死後二日葬永州東郭東里以其姨母為嫂於余也將死曰吾聞柳公嘗巧我慧我今不幸死矣安得公之文志我於墓其父母不敢以云葬之日余乃聞焉既而閔焉以攻石之後也遂為砂書元磚追而納諸墓魏氏世墓於某縣某原唐興有聞士諱之逖者與子及孫咸舉進士嗣為儒家帛丿糸州涪城尉諱全珤魏州臨黃主簿諱欽慈太常主簿諱緄尚書膳部員外郎兼江陵少尹諱萬成凡五代名高而不浮於行才具而不得其祿江陵府君益之以閎達之量經緯之謀故豪士賢大夫痛慕加厚生郎中府君諱宏簡字曰裕之以文行知名既冠而德禮聞於鄉黨既仕而法制立於官政溫柔發乎外見而人莫不親直方存乎內久而人莫不敬由進士策賢良連居科首授太子校書歷桂管江西福建宣歙四府為判官副使纍授協律郎大理評事三為御史賜緋魚袋在州六年而人樂之廉使崔衍曰吾敢專天下之士獨惠茲人乎遂獻於天子拜度支員外郎轉戶部郎中邦賦克舉人望逾重年四十七貞元二十年九月三十日不疾而歿震悼之聲遐邇一辭且曰斯人也而不得為善之利中人其怠乎君嘗三娶而卒無主婦庭無倚廬堂無抱孤有令兄弟以主其喪有孝女以守其祀故哭於客位弔於殯東者咸加哀焉凡為部從事府喪而當其位者三州缺而居其守者二皆得其理君之先再世貧不得葬故以祿仕遊於諸侯薄衣食損車馬凡十有餘祀卒獲於厥心其族屬之無主後者皆位於墓娣姪之無歸從者咸會於家由是處約以終其世既斂家宰庀其政視廩惟釜鍾視藏惟束帛無餘積焉十有一月遣車歸於洛師某日祔於墓監察御史柳宗元聞其道而玩其文也久居又同閈故哀而銘之其辭曰郎中之道惟直是保淳泊坦厚溫恭孝友郎中之文惟孝是宣溥暢周流炳蔚紛綸為周賢能為漢賢良始仕讐校篇籍有光仍授使檄訏謨用揚二居郎位征賦以理休聲載起顯命伊始生而不壽孰知其止歿而不嗣孰濟其美有翩其旗爰舉裳帷行道遲遲望墓而歸象物是宜卜筮孔時里人作銘不愧於辭維元和五年九月十五日壬子永州刺史崔公薨於位享年六十八己未殯於路寢景寅遷神於舟以某年某月日歸葬於某縣某原祔於皇考吏部侍郎贈戶部尚書府君之墓尚書諱漪元宗南巡內禪聖嗣府君以謀畫定命起一旅以復天下厥功載焉尚書之先曰貴鄉丞贈太常少卿府君諱子美太常之先曰揚州江都丞府君諱道禎行高位卑華冠士族公諱某字某承世德之清源浚之以蠲潔以端其志采㣥言之枝葉植之以茂實以修其能始由右千牛備身佐環衛更盩厔三原藍田尉仍有大故三徙同位繼授許州臨潁汝州龍興令推以直道二邑齊風哥舒曜尹河南鯨寇猾驁黎人播越表公尉河南糗糧芻茭戎備畢給版圖田洫民事時乂遷揚州録事參軍實吳楚之大都會也政令煩拏貢奉叢沓一日不葺鐫譙四至公為之優游有裕長史司徒杜公與之揖讓異於賓僚入為太子司議郎拜歸州刺史巖險湍悍人類鳥獸古號難理公克有聲遷永州刺史朝散大夫惟是南楚風浮俗鬼戶為胥徒家有禳更大者虐鰥孤以盜邦賦毆愚蒙以神訛言悖於政經莫有禁禦公於是修整部吏黜侵凌牟漁者數百人以付信於下而征貢用集擒戮妖師毀焄蒿淫昏者千餘室以舉正㣥枉而田閭克和寬以容物直以率下邦人方安其理縉紳猶鬱其望體魄遽降哀何有窮嗚呼公前夫人徐州參軍滎陽鄭巨女有子曰義和早夭後夫人萬年尉范陽盧彤女嘉淑之德繼聞宗族有子曰貽哲貽儉克承於家洎公之兄子曰勵曰禮誠願志於墓無忘公之德銘曰孰為德門清河濬源遠哉沄沄自葉而根世有顯懿揚其清芬煥炳增華昭於後昆惟魴與鯉舊史是尊孰為茂功尚書清風藹其有融勃焉而興披草從龍布令諸夏敷和六戎赫矣太陽克升於中孰為惠政公嗣餘慶形於謠咏小程其功大遂其性黠吏是省妖風以正於邑於邦克揚休命孰為遺愛公去昭代邦人斯痗始焉是賴今也何戴孰葬我公於洛之會何以銘之徽音不昧博陵崔君由進士入山南西道節度府始掌書記至府留後凡五徙職六增官至刑部員外郎出刺連永兩州未至永而連之人訴君御史桉章具獄坐流歡州幼弟訟諸朝天子黜連帥罷御史小吏咸死投之荒外而君不克復元和七年正月二十六日卒孤處道洎守訥奉君之喪踰海水不幸遇暴風二孤溺死七月某日柩至於永州八月甲子藳葬於社壝之北四百步崔氏世嗣文章君又益工博知古今事給數敏辨善謀畫南敗蜀虜西遏戎師其慮皆君之自出後餌五石病瘍且亂故不承於初今尚有五丈夫子夫人河東柳氏德碩行淑先崔君十年卒其葬在長安東南少陵北君以竄沒家又有海禍力不克祔三年將復故葬也徒志其一二大者云鯢為祖煜為父世文儒積彌厚簡其名子敬字年五十增以二葬湘澨非其地後三年辭當備漢光中興馬援雄絶域之志晉武一統陶璜布殊俗之恩理隨德成功與時並今皇帝載新景命丕冒海隅時惟張公祗復厥績交趾之理續於前人公諱某字某某郡人也曾祖彥師朝散大夫尚書駕部郎中祖瑾懷州武德縣令考清朝議郎試大理寺丞贈右贊善大夫咸有懿美積為餘慶公以忠肅循其中以文術昭於外推經旨以飾吏事本法理以平人心始命蘄州蘄春主簿句會敏給厥聲顯揚仍以左領軍衛兵曹為安南經略巡官申固扞衛有聞彰徹轉金吾衛判官三歷御史績用宏大揚於天庭加檢校尚書禮部員外郎換山南東道節度判官復轉郎中為安南副都護賜紫金魚袋充經略副使遷檢校太子右庶子兼安南都護御史中丞充本管經略招討處置等使公自為吏習於海邦凡其比較勤勞利澤長久去之則夷獠復亂復至而寇攘順化及受命專征得陳嘉謨誓拔禍本納於夷軌乃命一其貢奉平其斂施牧人盡區處之方制國備刑體之法道阻而通百貨地偏而具五人儲偫委積師旅無庚癸之呼繕完板幹控帶兼戊己之位文單環王怙力背義公於是陸聯長轂海合艨艟再舉而克殄其徒廓地數圻以歸於我理烏蠻酋帥負險蔑德公於是外申皇威旁達明信一動而悉朝其長取州二十以被於華風易皮辨以冠帶化姦宄為誠敬皆用周禮率由漢儀公患浮海之役可濟可覆而無所恃乃刳連烏以闢坦途鬼工來并人力罕用沃日之大束成通溝摩霄之阻硩為高岸而終古蒙利公患疆埸之制一彼一此而不可常乃復銅柱為正古制鼓鑄既施精堅是立固圉之下明若白黑易野之守險逾邱陵而萬世無虞奇琛良貨溢於玉府殊俗異類盈於藳街優詔纍旌其忠良太史嗣書其功烈就加國子祭酒封武城男食邑三百戶凡再策勳至上柱國三增秩至中散大夫某年月薨於位年若干天子震悼傷辭有加明年其孤某官與宗人號奉裳帷率其家老咨於叔父延唐令某卜宅於潭州某原葬用某月某日人謀皆從龜兆襲吉乃刻茲石著公之閥以志於邱竁告於幽明銘曰周限荊衡秦開百粵交州之治炎劉是設德大來服道消自絶伏波南征漢威載烈宛陵北附晉政爰發我唐流澤光於有截皇帝中興武城授鉞肅肅武城惟夫之哲更歷毗贊顯揚彰徹既受休命秉茲峻節度其謀猷守以廉潔厚農薄征匪貊匪桀通商平貨有來胥悅踐山跨海堅其鶴列制器足兵潰茲蟻結烏蠻屈服文單翦滅柔遠開疆會朝天闕銅柱乃復環山以硩海無遘忤賊罔踰越琛賮之獻周於窮髮帝嘉成德載旌茂閥增秩策勳土封斯裂位厄元侯年虧大耋邦人號呼夷裔悽咽卜葬長沙連岡啓穴書銘薦辭德音罔缺公諱某字某實惟文皇帝之元孫別子曰承乾為皇太子以藩愛逼奪危栗致禍後封恆山為愍王贈荊州大都督繼別曰象蘄春郡太守贈越州大都督封郇國公大宗曰玭太子詹事贈祕書監生廙尚書左丞凡四代有土田居貴仕公丕承之以率南服克荷天庥繼有功德公始以通經入崇文館登有司第選同州參軍入佐金吾衛進太僕主簿參引大駕府移為左右神策行營兵馬節度以為推官拜監察御史賜緋魚袋凡二使其率皆范司空希朝進殿中侍御史湖南都團練判官以寬通簡大輔治得中道府遷主後事師人愛慕欲以貞元故事為請公恐懼抑留復從浙東為都團練副使轉侍御史又徙浙西如其職加著作郎凡三使其率皆薛大夫蘋刺嶽信二州得劉向祕書以能卒化黃白日召徒試術為仇家上變就鞫無事敕笞殺告者猶降建州司馬陟刺泉州會烏許夷刺殺郡吏毆縛農民詔以公都督雍州兼御史中丞賜紫金魚袋為經略招討使既至則韜弓士冖䂞甲去斥候禁部內無敢以賊名使得自浣濯諸酋長咸頓首送款放虜獲輸稅奉貢願比內郡人遣子吏都督所人復耕稼無有威刑居五月頃有黑螭鼓江流壞北岸直城南門覆船殺人然後去父老泣曰吾公其殆矣嘗合汞流黃丹砂為紫丹能入火不動以為神服之且十年然卒以是病暴下赤黑數日薨實元和十三年六月十五日年五十七僚宰庀事有緹五兩無金銀泉貝幾不克斂夷人號呼致幣歸以明年月日葬祔其穆長安西南高陽原上夫人陳氏先公十五年歿父曇亦都督雍州終孤孟輿願且文亞曰仲權次曰季謀年自九歲以下有兩壻博陵崔行儉徑峭有立志滎陽鄭師貞敏捷能㣥皆聞名銘曰文濬維祥實亘實延冢讒不嗣宗以支傳郇公克庸詹事繼賢湜湜左丞惟道之宣公寬且惠以教則順五參戎政二佩郡印師歡民愛克懷以信詖辭告訕卒白其訊烏許猖狂盜海剽山帝命平南逖彼㣥蠻虎龍煌煌英蕩是將舟之金玉以為公服公既蒞止告以文理推義赴仁韜弓服矢闢是垣壘完其父子復我邦賦弛豫卒士貌不功矜情不伐喜蠻人涕懷投刃以俟方底成績蟲孽告妖悍石構災升屋而號椎䯰卉裳來賻來觀膴膴鱗原祔之顯魂松柏芊芊封域安安代有高墳堯文之孫君諱某字某南陽人漢司徒禹之後也曾祖倚皇建州浦城令祖少立皇滄州司馬考雍皇左武衛兵曹參軍惟君敏給以御下廉忠以承上幹蠱之稱洽於諸侯信謹之跡彰於所蒞故自始仕以至沒世未嘗無聞焉初以試太常寺奉禮郎更職於劍南湖南江西前後連帥咸器其能以柄於事於劍南則亭擬閲實以循官刑盡哀敬之情致淑問之頌寬猛之適克合於中於湖南則外桉屬城內專平準蒞丱人錫石之地參鳬氏鼓鑄之功溢山告祥國用益贍吏無並緣以巧法人無怨讟以苦役凡處斯職莫能加焉於江西則旁緝傳置下繩支郡俾無有異政以一於詔條財賦之重待君而理無何雍州經略使路公恕奏署試大理評事兼貴州刺史參帷幕之任董龜虎之威夷俗敬愛革面受事朝廷將以武定南服命安南大校御史中丞趙良金為雍州復以君兼招討判官録其異能奏加司直升招討副使兼統橫廉貴三州事厖茸之下直道有立獷悍之內義威必行賦增而不擾法一而無憾然以憂栗間於多虞卒成耳目之塞遂致齒牙之猾元和五年五月二十一日疾卒於公館年五十五明年某月日返葬於潭州某原夫人隴西李氏大理評事練之女年三十三貞元十六年終於郴州有子四人曰贄曰某贄十三年矣哀禮具焉京兆尹宏農公始由湖南為江西再以君為從事知之最厚痛君之能不施於劇任惜君之志見屈於㣥疑且以志授宗元使備其缺古者觀其所使而知在上之德今也觀其所使而知在下之誠嗚呼可無辭乎銘曰曼姓之裔司徒隆漢惟君是承有植其幹始屬奉常出參藩翰議讞西蜀平其狴犴巡視南楚總茲條貫貿遷化居貨殖攸贊改煎鎔範貢輸增算既飭財賦亦專傳館去牧荒陬肅其聽斷敓襄攴以息暴戾斯逭行非選事進不避難始賴其寧終聞見憚疾與憂積志隨魄散年極中身葬茲高岸才耶命耶君子興歎呂氏世居河東至延之始大以御史大夫為浙東道節度大使延之生渭為中書舍人尚書禮部侍郎刺湖南七州生四子溫恭儉讓以溫為尚書郎再贈至右僕射恭字敬叔他名曰宗禮或以為字實惟呂氏宗子尚氣節有勇略不事小謹讀從橫書理陰符握機孫子之術曰我師尚父胄也大父洎先人咸統方嶽今天下將理平蔡兗冀幽洎戎猶負命早夜呼憤以為宜得任爪牙畢力通天子命作文章咸道其志云又曰由吾兄而上三世世為進士吾為文不墜教誡獨武事未克纘厥緒因棄去從山南西道節度府掌書記預謀畫不甚合以試守軍衛佐加協律郎入薦為長安主簿復出以監察御史參江南西道都團練軍事府表進殿中侍御史為桂管都防禦副使元和八年去桂州相國尚書鄭公遮留假嶺南道節度判官至廣州病痞瘧加帶六月二十八日卒妻裴氏戶部尚書延齡女有丈夫子三人曰爽曰王褱曰特女子三人曰環曰鸞曰倩皆幼行於道而倩又死遂以柩如洛陽祔葬於大墓款志呂氏世仕至大官皆有道宜興於世溫洎恭名為豪傑知者以為是必立王功活生人不幸溫刺衡州年四十卒恭未及理人年三十七又卒世固有有其具而不及其用若溫恭者耶恭貌奇壯有大志信善容物宜壽考碩大而又不克呂氏之道惡乎興銘曰渢渢之風兮不可追有志之大乎今安歸呂君去我死乎吾誰依元和九年月日扶風馬君卒命於守龜祔於先君食卜葬明年某月庚寅亦食其孤使來以狀謁銘宗元刪取其辭曰君凡受署往來桂州嶺南江西荊南道皆大府凡命官更佐軍衛録王府事番禺令江陵戶曹録府事監察御史皆為顯官凡佐治由巡官判官至押番舶使經略副使皆所謂右職凡所嚴事御史中丞良司徒佑嗣曹王臯尚書胄尚書伯儀尚書昌皆賢有勞諸侯其善事凡管嶺南五府儲跱出卒致穀以謀畫平哥舒晃假守州邑民以便安殄火訛殺吏威海鹽增算邦賦大減所至皆用是理年七十不肯仕曰吾為吏逾四十年卒不見大者今年至慮耗終不能以筋力為人贏縮因罷休以經書教子弟不問外事加七年卒君始以長者重許與聞凡交大官皆見禮司徒佑嘗以國事徵顧謂君曰願以老母為纍受託奉視優崇至忘其子之去君諱某字某曾祖某某官祖某某官父某某官嗣子隴西李氏出曰徵由進士為右衛胄曹早歿次四子皆京兆韋氏出曰警曰倣曰敏曰庭女一人嫁柳氏壻曰宗一其銘曰不懈於位不替於謀慮寇以平撫民以蘇僭火不孽悍吏不侔惟寶於鹽亦贏其籌公以忠施私以義躋既至於年乃靜於懷衣柔膳甘子侍孫攜觀經考古教導斯齊克壽克樂嗚呼終哉於陰之原爰位其墓千萬子孫來拜來祔孟氏之孤曰遵慶奉其父命書九篇為善狀一篇來告曰月日君薨月日將葬於某敢請刻辭嗚呼公自假左贊善大夫桓王司馬太常少卿為義成軍中軍兵馬使其帥魏國公耽為宰相命公左領軍衛將軍事德宗順宗今上立朝九年加朝議大夫居喪會用兵於趙起復居故官為左神策行營先鋒兵馬使知牙而趙兵罷不受祿去金革服喪終期命安州刺史仍加侍御史安州防遏兵馬使貶柳州司馬公嘗佐魏公平襄陽靖梁州立義成軍魏公宏大恢奇公能以任軍政是以又為衛將軍虔恭潔廉動得禮節伐趙之役堅立堡壘誓死麾下法制明具權力無能移進不避患退不敗禮安州迫寇攘多戎事政出一切吏以文持之故貶明年用兵於蔡朝廷諸公洎外諸侯咸以公為請未及徵氣乘肺溢為水浮膚而卒年六十惟公志專於中貌嚴於外嘗立廷中毅然望之若圖形刻像聞國難輒不寢食謀度憤吒以故病不可治曾祖某官諱某祖某官諱某父某官諱某公之諱曰常謙子遵慶弟曰某銘曰魯仲孫氏其世為孟賁勇光武軻儒紹聖公傳師法以訓戎政執稽以庸咸致厥命濟濟於朝冕服以光墨非從利終役復喪忠孝孔明君子攸彰昔者雲中六級下吏公刺於安法亦可議黜伏南荒豪士歔欷聞難以激去食廢寐神乖氣離支膈莫遂廷臣進言侯伯拜章帝命將施俄仆於京代山丸丸植柏與松其名維何忠孝孟公年月日尚書都官員外郎和州刺史連州司馬富春淩君諱準卒於桂陽佛寺先是六月告於州刺史博陵崔君曰余嘗學黃帝書切脈視病今余肝伏以澀腎浮以代將不臘而死審矣凡豫之學孔氏為忠孝禮信而事固大謬卒不能有立乎世者命也臣道無以明乎國子道無以成乎家下之得罪於人以謫徙醜地上之得罰於天以降被罪疾余無以禦也敢以鬼事為纍又告為老氏者某曰余生於辰今而寓乎戌辰戌衝也吾命與脈叶其死矣乎吾罪大懼不克歸柩於吾鄉是州之南有大岡不食吾甚樂焉子其以是葬吾及是咸如其言云孤夷仲求仲以其先人之善余也勤以志為請嗚呼君字宗一以孝悌聞於其鄉杭州刺史常召君以訓於下讀書為文章著漢後春秋二十餘萬言又著六經解圍又文集未就有謀略尚氣節賙人之急出貨力猶棄粃稗年二十以書干丞相丞相以聞試其文日萬言擢為崇文館校書郎又以金吾兵曹為邠寧節度掌書記泚涇之亂以謀畫佐元戎常有大功纍加大理評事御史賜緋魚袋換節度判官轉殿中侍御史府喪罷職後遷侍御史為浙東廉使判官撫循罷人桉驗汙吏吏人敬愛厥績以懋粹然而光聲聞於上召以為翰林學士德宗崩邇臣議祕三日乃下遺詔君獨抗危詞以語同列王伾畫其不可者十六七乃以旦日發喪六師萬姓安其分遂入為尚書郎仍以文章侍從由本官參度支調發出納姦吏衰止以連纍出和州降連州居母喪不得歸而二弟繼死不食哭泣遂喪其明以沒蓋君之行事如此其報應如此夫人高氏在越孤四人南仲殷仲在夫人所未至執友河東柳宗元哀君有道而不明白於天下離愍逢尤夭其生且又同過故哭以為志其辭哀焉銘曰噫淩君生不淑學孔氏揚芬郁好謀謨富天祿讐禁書贊推轂觀靈龜獲貞卜徙東越翊明牧罷人蘇汚吏覆升侍從躬啓沃匡危疑興大福吏尚書徒隸肅佐經邦財用足道之躓身則辱烏江垂九疑麓仍禍凶遘茲酷能知命無怨毒罪不泯死猶僇何以葬南嶺曲魂有靈故鄉復封茲壤歸骨肉為之銘志陵谷元和某年月日立太子赦下嘗有非其罪柩得返葬淩氏孤夷仲求仲自連桂陽舉其先人之柩龜筮吉利某年月歸於杭之新城祔於其墓刻前志志其行益以後志志其時立碣於墳東南隅申志於外噫亦勤矣以其先人之行宜克大於後以其孤之志宜克承於初艱其躬以延於無窮承而大宜哉
