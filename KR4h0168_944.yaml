front:
  text: 全唐文欽定全唐文卷九百四十四杜光庭十六
  hash: sha256:c157d0da84d467e25735138ede7835096a0bc0c929081f68ac6cb6929784a132
body:
  text: 伏聞大道垂科元真設教正一有祈恩之品河圖有謝過之文虔告尊靈必賜昭鑒某氏以夙叨靈貺擢質人寰祇荷恩庥常深戒懼近者忽嬰疾恙未獲痊平竊恐履行立身措情屬念有違誤之過有抵觸之非或結釁流殃有所延注或明星暗曜有所照臨搆此災纏未蒙消解旦夕憂懼罔敢遑寧又以身宮之中當土曜行度命當危迫誠切告祈是敢遵按明科虔修大醮伏惟三寶上聖九曜尊神垂罔極之慈降護持之力賜某氏解消災厄和釋寃仇延續年齡增加祚祿使百病痊愈六氣均調蕩滌凶衰蠲除罪咎永期修奉上答元恩不任謝罪祈真虔誠請命激切之至謹詞臣聞賦祿稟形資於道化延生保命繄彼神功至有三命興衰五行代謝星躔經歷卦象吉凶苟逢厄會之期必示修禳之旨是則元真愍俗大道好生垂法濟人有感斯應三天正一寶章宣致福之儀太元河圖醮品啓移災之旨古今遵奉拯護尤多臣叨荷靈休躬逢昭代恩榮隆異名分超逾拊己循懷每切器盈之戒誓心戮力常思福過之虞今則大運猶住戌鄉小運仍當亥位今年之內併值天羅竊慮舉念屬心率成釁咎積生往世宿有愆瑕雖切秉修寧無違誤又暗曜行於辰分火星在於身宮况寵極才微功輕位重恐貽災滯深積兢憂是敢考按元經肅恭丹懇精修醮禮拜奏章文謝過九天祈恩衆聖伏冀真靈鑒省渥澤滂流詔天境地司敕陽官陰府赦罪尤於既往蕩衰沴於將來消宿曜之災解天羅之厄豐延祿祚增益年齡得虔忠孝之誠永贊聖明之化誓勤砥礪上副元慈不任歸命之至伏以至化將行元文肇著五千垂教六甲開圖首於虞舜之朝傳自姬周之代修於內則凝真反一駕日月而躡煙霄行於外則保國寧民康品彙而豐萬宇為法之本歷代所尊臣等獲賴元符况逢皇運真風廣被妙旨遐宣願遂參修永期遵守允當嘉節虔露明誠伏惟元聖融慈衆真流鑒成其懇願降以威光使存注感通功行圓就九元開度積過蠲消福善攸臻壽年增益濟人佐國宏道宣經永揚清靜之風克保希夷之道不任歸命之至謹詞伏以正一南宮紫陽玉殿祕陽華之真籙緘飛化之靈圖下可以制禦凶妖宣和氣序上可以輯寧區宇朝會神仙保國安人古今攸稟臣獲逢聖日咸沐道風早振氛囂俱棲羽褐願期參受克勵焚修伏惟衆聖宏慈俾諧宗尚衣星履斗契九天飛步之蹤佐世立功成大道化時之效炷香拜手歸命祈真翹望元恩不任激切之至謹詞伏聞河圖寶典垂醮品以濟生正一明科顯章文而助化俱宣道要廣福生靈臣獲奉元關叨參祕籙而焚修每闕過咎旋彰主務在公動多悔吝或詳評獄訟賞刑有爽於重輕訓撫師徒沮勸有虧於申令捫心省己夙夜增憂非仗元功無門懺謝又五月之末土火將入於身宮以此憂惶志希禳救今則精嚴信幣求乞章文伏惟太上衆尊三天化主垂大慈之澤降罔極之恩命天官之吏兵依職祐護賜臣罪瑕除蕩寃債和平九曜回臨照之災三命息刑衝之厄克獲貞吉常遂亨通誓虔焚炷之誠上答尊靈之祐不任伏聞生成妙道宏大教以度人不宰元功布慈風而及物隨迎靡滯拯護無遺由是青簡丹篇繼著登真之品幽關夜府亦該鍊化之仁薪火傳明古今攸普某身逢景運名造真乘每虔焚祝之心潛希道力冀啓延洪之福上答君恩期靈常勵於丹襟屬念早參於元籙翹勤徒切景仰何階伏惟仙君道逸冥鴻壽逾遼鶴指三山而高舉莫認雲程越纍歲而暫歸想非塵世某慚盧敖之末跡瞻若士之遐蹤瀝懇齊心燃香拜手佇回真鑒俯沃元波俾於修學之中少達希微之趣推誠律己永酬君父之慈見素全真願奉神仙之躅不任伏聞至道垂科正一啓醮祈之品河圖著訓太元開懺謝之門蓋所以拯護人倫恢宏法力恩庥廣被今古攸宗臣運偶昌期叨膺重寄雖竭誠而報國未效涓埃懼福過以災隨因罹疾疹今則黑符飛化正入中宮本祿納音為災尤重是敢冥心元極稽首清壇恭備香燈虔申醮祝伏惟元元降鑒五帝宣慈敕九宮貴神命三官曹屬解消厄運和釋寃仇蕩滌罪瑕增延祿算使百關調豫久疾痊平誓傾忠孝之心冀啓聖明之澤永遵妙道仰副元慈不任伏聞天地萬靈陰陽庶品資元和而覆育稟道氣以生成三命五行是定吉凶之數南宮北府爰司罪福之文善惡無遺錙銖不爽况復三元遷易九曜躔移示謫降祥影隨響答得不兢懷悚惕祇敬真靈某氏以土火二星行於午地既當命位仍在身宮小運丑中况為六害大運戌土又值墓神大運則午命稍衰小命則壬祿初薄以茲憂懼恐履災期是敢精勵丹誠歸依元象遵拜章之典式稽首三天備祈醮之物儀馳心九曜伏惟至真憫祐衆聖垂恩赦往歲之罪瑕解積生之寃債消平災厄拯度凶衰延益壽年增加祿祚克蒙覆護常賜安貞永奉真靈誓勤修敬不任歸命虔祈之至伏聞列曜凝光麗天垂象南昌上府生籙是司致福流祥潛資邦國河圖祕戒式明瞻敬之文正一靈科亦備存修之旨敢披元訓虔罄素誠臣夙荷洪庥躬逢景運便蕃寵澤踐歷恩榮無濟時匡國之功叨相印兵符之重循懷震惕難酬造化之私誓志恪恭冀答君親之德但勤砥礪敢怠初終是以輒就生辰精修醮禮仰丹臺而稽首望元極而冥心靈炷騰煙期達九清之上良宵效懇願通六聖之前賜臣災滯蠲消寃仇和釋增加祚祿延益年齡赦已往之過尤介將來之禎福九元升度舉族康寧誓嚴尊奉之誠永副真靈之祐不任歸命虔祈之至伏聞混元既判融結分形惟彼岷山廣吞西徼壓二江而作鎮冠五嶽以居尊窟宅神仙含藏洞府層峰謺巘捧日月於雲閒積翠堆嵐隔塵埃於人世闢天國而真靈雜集廓成都而芝术駢羅是曰福庭統茲形勝希夷真君道成上古名重高真軒帝南巡嘗展師資之禮明皇西幸仍加崇飾之功敞豐祠於炎漢之年旌懿號於中和之日每彰休應丕祐寰區頃者躬拂煙蘿仰瞻羽衛睟容在目寤寐寧忘近以闕闥層楹風凋雨漬歲華暗貿頽朽可虞爰命慧進大師行真度木鳩工成茲大壯飛甍耀景碧霤排空四垣之圖像如新重檻之階陛不改爰復正寢永播元休俾天地山川神明職秩常加禎貺大庇蒸黎鷙暴不侵沴瘥無作稼穡蕃稔風雨以時旻穹觀璧合珠連夷夏覩文修武偃邊烽靜息妖孽殲平車書佇混於萬方正朔期同於九有生靈蒙福宗社永昌式勤蘋藻之儀常奉馨香之薦遣廣成先生杜光庭虔修大醮昭謝真靈遐望雲軒仰希元鑒不任蓋聞天設神墟地開仙府真靈是宅幽顯攸尊握㣥嶽之紀綱司萬方之休否雲峯霞觀歷代所崇垂貺庇人古今受賜頃者以遠披蘿薜躬造軒庭仰堂宇之威容覩四垣之儀衛光靈如在翹矚常深遂命圖繪神姿鋪舒內殿朝燃玉穗夕備銀釭檮祈蓋切於生民注念非關於祕祝欽惟不昧必鑒斯誠今則山觀之中己加興葺鼎新殿宇別命焚修既無葷雜之虞益有清嚴之致是用特申醮禮精具告陳謁請真靈復還仙觀霓幢鶴轡優游松月之鄉蕙郁蘭芬瀟灑虛無之路永安真域丕祐邦家自茲寰海之民常徯龎洪之福不任祝望之至謹詞伏以道化肇分百靈受職晦明幽顯咸繫統臨既興棟宇之功即辨主張之位或五姓有宮商之異八宅標乾坎之殊陰陽各配於德刑亥已互陳於首尾吉凶區別悔吝乃彰違之或慮其災殃順之寧虧於福善伏自恩賜第宅於茲數年近象闕以巍峩接天橋而煥麗每慚薄德靡稱華居今則咫尺對街大興土木雖阡陌之有阻且斤斧之相聞禊事時修慶長安之佳麗極樞電繞宜上聖之篤生星拱㣥心葵傾率土伏念某世崇香火身囿帡幪幸逢育聖之辰敢效呼嵩之敬諷演琅函之旨披陳玉軸之文用傾螻蟻之誠仰祝龜蛇之衛伏願一劍掃除於妖氣六丁拱衛於仙班德日新日日新齊天悠久壽萬歲萬萬歲永世無窮三月三日天氣新篤生上聖萬年萬壽文德洽取薦微誠共惟佑聖之資實作元天之主孕太陰而成質一氣甚宏涵水德以耀靈五陽方壯惟功行圓成之久故威嚴變化之神宜民庶之皈依拱帝尊之高上某泊焉五濁陋甚一寒夙修香火之緣久託雲天之庇恭逢盛旦輒控丹衷輔正除邪永作北方之鎮銷災降福益綏南服之民無上元元化身萬億開闢乾坤古今莫測萬象之宗帝王之則先天地生備全道德粵自三無已降迄於巨唐寶軸靈文或隱或見出於史策或著在別傳至宋朝簡寂先生校讐之際述珠囊經目萬八千卷其後江表干戈秦中兵革真經祕策流散者多後周武帝立通元觀收集衆經猶及萬卷洎隋火板蕩唐土龍興翦掃氛妖底定寰宇至開元之歲經訣方興元宗著瓊綱經籙凡七千三百卷復有玉諱別目記傳疏論相兼九千餘卷尋至二胡猾夏正教凌遲兩京祕藏多遇焚燒上元年中所收經籙六千餘卷至大歷年申甫先生海內搜訪京師繕寫又及七千卷長慶之後咸通之閒兩街所寫才五千三百卷近屬巨寇淩犯大駕南巡兩都烟煤六合榛棘真宮道宇所在凋零玉笈琅函十無三二余屬茲艱會漂寓成都扈蹕還京淹留未幾再為搜訪備涉艱難新舊經誥僅三千卷未獲編次又屬省方所得之經尋亦亡墜重遊三蜀更欲搜訪纍阻兵鋒未就前志時大順二年辛亥八月初三日庚辰成都玉局化閲省科教聊紀云爾杜光庭述夫所言太上者統教之尊名證聖之極果也太者大也上者高也太者大也無大於太上者高也無高於上乃修行證果極位之稱也世人修行自凡而得道自道而得仙自仙而得真自真而得聖聖之極位升為太上太上者六通萬德無不畢備紹法王位統臨萬聖即得居此尊名亦如代閒皇帝代代紹位皆得稱之自元始天尊之後即有太上大道君太上老君太上丈人太上高皇帝皆極此位而太上丈人高皇帝雖兼有尊極之名而不行教其傳祚行教為萬天之主惟道君老君耳元者深也妙也亦云道也天也至高至妙不可言詮約妙與深以元為證言深妙元遠以明道體故謂之元元者初也始也祖也爾雅云肇道根源萬物宗祖處世出世之法皆為之本始故謂之元皇者大也謂大道也道大曰皇尚書序曰三皇之書謂之三墳言大道也帝者天也其德配天次於道也德大曰帝道德兼稱故云皇帝又云法道法天謂為皇帝秦始皇既一統天下垂法後代上取三皇之尊名下取五帝之美號兼而稱之曰皇帝焉尚書序曰五帝之書謂之五典言常道也內號者隱號也老君千名萬號不可備窮以當時天下所稱謂之老子亦乃道尊德貴不可斥名天上人間咸稱曰老子是則以老子之內號也我大唐高宗天皇大帝乃老子三十三代聖孫大唐之第三帝太宗文皇帝之第三子也承平嗣極握記垂衣耀仙李之靈葩展升平之盛禮回鑾苦縣謁聖真源表大孝於奉先贊元元於聖號以乾封元年太歲丙寅二月二十八日下詔曰東臺大道混成先二儀而立稱至人虛已妙萬物以為言粵若老君朕之本系爰自伏羲之始暨乎姬周之末靈應無象變化多方游元氣以上升感日精而下降或從容宇宙吐納風雲或師友帝王丹青神化譬陰陽而不測與日月而俱懸屬交喪在辰晦迹柱下大宏雅訓垂範將來雖心齊於太虛而理歸於真宰若夫絶聖棄智安排寡欲寂寞杳冥之際希夷視聽之表淡爾無為宛然自得酌之不竭用之不盈執大象而還淳滌元覽而遣纍邈乾坤以長久跨陶鈞而亭育至矣哉固無得而名也况復大聖所資克昌寶祚上德所履允屬休期朕嗣膺靈命撫臨億兆總三光之明而夙宵寅畏居四大之重而寢興祇惕盡孝敬於宗祧慶懷柔於幽顯行清淨之化承太平之業登介邱而展采坐明庭而受記飛烟結慶重輪降祥鶴應九皋山稱萬歲越振古而會休徵冠帝先而為稱首大禮云畢回輿上京迂駕瀨鄉躬奠椒糈仰瑞柏以延佇挹神泉而永歎如在之思既深敬始之情彌切宜昭元本之奧以彰元聖之功可追上尊號曰元元皇帝仍改谷陽縣為真源縣當縣宗姓特給復一年冀敦崇遠之情用申尊祖之義布告中外咸使知聞主者施行又永淳二年癸未十二月四日下詔曰君崇於道宅紫微以垂衣臣修於德罄丹心而作礪若使上守於義下尊於禮名教所以乖淳忠信由其漸薄在昔胥庭連陸媧燧伏羲不宰而天下化軒頊堯舜禹湯文武至公猶行深仁尚積及秦居閏位奢泰之漸聿興漢襲霸圖元默之風已替遐觀魏晉近鑒周隋代益囂浮人踰僭侈窮百王之弊俗極千年之否運以承大亂之後方開大聖之期既逾交喪之辰必興交泰之緒我高祖神堯皇帝受鑣宮之景命蕩轡野之妖氛重懸日月一匡宇宙太宗文皇帝披圖汶水杖鉞參墟降斗極之神兵滌懷襄之巨浸張四維而安赤縣勞百戰而徇蒼生聲教遐覃隄封遠亘緬維洪業無得而稱朕以寡昧忝膺丕緒未嘗不孜孜訪道戰戰臨人日慎一日三十四載於今矣况下安則上逸時弊則君憂雖身處九重而情周萬姓建本之懷愈切抑末之念遽深今庶績雖凝而淳源未洽朕之綿系兆自元元常欲遠叶先規光宣道化變率土於壽域濟蒼生於福林屬想華胥載勞寤寐所冀內外寮寀各竭乃誠敦勸黎萌俱從質舊染薄俗咸與惟新憑大道而開元共普天而更始宜申霈澤廣被紘埏可大赦天下改永淳二年為宏道元年仍令天下諸州置道士觀上州三所中州二所下州一所每觀度道十七人以彰清淨之風佇洽無為之化主者施行是則奉先尊祖復朴還淳之旨也毛仙翁者名于字鴻漸得久視之道不知其甲子常如三十許人其齠容稚姿雪肌元髮若處子焉周游湖嶺閒常以丹石攻疾陰功救物受其錫者不可勝紀大中戊寅歲進士張為薄遊長沙落魄數載以詩酒自得不汲汲於隨計一旦值女奴於嶽麓山下若豪家之青衣焉奔而歸之張遽惑焉歲餘寖成羸疾尫瘠骨立待時而已毛翁自海陵來泊於逆旅即張所止也請謁之者逡巡盈門皆曰尊師十年二十年一屆於市人仰其惠猶夏日之陰冬日之陽也蒙其澤者多矣顧見張愍之曰子妖氣邪光洽遍肌骨苟不相值殞於旦夕也吾有鮑南海丸以一粒授為於香爐焚之郁烈之氣聞數百步張之魅妾長號一聲蹶然而斃因共視之即木偶人也心下至足肌肉如人心上至頂猶木偶之狀衆共異之棄於江中師曰此魅逝矣子之性命可全形骸可保也又以丹砂三粒其狀如黍米命張吞之旬月之閒肌豐力倍憊疾都瘳師忽告去不言所之張遂為詩別焉其略云羸形感神藥削骨生豐肌蘭炷飄靈烟妖怪立誅夷重覩日月光何報父母慈黃河濁滾滾別淚流澌澌黃河清有時別淚收無期自是去別莫知所適湘江閒至今以為口實張後亦南入釣臺山訪道而去今覩朝彥贈仙翁文集果符長沙之事裴晉公度牛公僧孺令狐公楚李公程李公宗閔李公紳楊公嗣復楊公於陵王公起元公禎當代之賢相也白公居易崔公郾鄭公尉浣李公益張公仲方沈公傳師崔公元略劉公禹錫柳公公綽韓公愈李公翱當代之名士也望震寰區名動海島或師以奉之或兄以事之皆以師為上清品人也或美其登仙出世或紀其孺質嬰姿或異其藏往知來或敘其液金水玉霞綺交爛組繡相宣蓋元史之盛事也自元和洎大中戊子五十餘年容色不改信非常人矣奇章公獨以上升為疑者乃拘教守常未達神仙之深旨矣夫仙之上者骨肉升飛與天無極又九天之上無何之鄉為極陽之都神仙之府也世之得道者鍊陰而全陽陰滓都盡陽華獨存故能上賓於天與道冥合則黃帝駕龍而騰躍子喬控鶴而飛翔赤松乘雨而飄颻列寇御風而上下史昭著又何疑焉所云胡國胡法將終之事是設幻化之誣詞謗神仙之輕舉者有是焉耳嘗試論之真一既判元精肇分清氣為人謂之三才皆稟妙於無成於妙有人之生也參天而兩地與氣為一天地所以長存者無為也人所以生化者有為也情以動之智以役之是非以感之喜怒以戰之取捨以弊之馭努以勞之氣耗於內神疲於外氣竭而形衰形凋而神逝以至於死矣故曰委和而生乘順而死率以為常也修道之士黜嗜欲隳聰明凝然無心淡然無味收視返聽萬慮都冥然後虛空生胎吻合自然觀化之初窮物之始浩然動息與道為一矣與道為一則恣心所之從心所欲是非不能亂勢利不能誘寒暑不能變生死不能干指顧乎八極之外逍遙乎六虛之表無所不察無所不知目能洞視耳能洞聽亦能視聽不由乎耳目何者神鑒於未然智通於無地也如此則世人之休咎壽夭富貴貧賤皎然在目豈待乎陰陽之數蓍龜之兆而後知之乎毛仙翁則其人也衆君子歌詩志之序述讚之曷足盡仙翁之道哉因以神仙之事亦紀仙翁之功書之於卷末云通政元年丙子三月七日辛酉杜光庭記
