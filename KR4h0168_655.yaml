front:
  text: 全唐文欽定全唐文卷六百五十五元稹九
  hash: sha256:b9921cf163a280bcbe69668f87bb75bfac33c102883caf087b8ff7353eef44c2
body:
  text: 長慶二年某月某日司禮氏持第一品幰弩已下備衛椎鉦鼓鳴鐃簫笳笛前導我沂國公洎某國夫人某氏合葬於某縣某鄉某里某原先是沂國嗣子肇乞豫銘墓石按沂國公姓田氏諱某字某平州盧龍人曾祖璟官至鄭州別駕祖延惲官至安東都護府司馬沂國既貴贈尚書右僕射父庭玠官至銀青光祿大夫相州刺史中丞沂國既貴纍贈至司空公本諱興司空第某子幼敏雋年十八為魏博衙前都知兵馬使自是魏劇地劇職盡更之由太子賓客沂國公纍加殿中御史侍御史中丞祕書監元和七年同節度副使步射之衆皆隸焉魏帥季安卒子懷諫始十餘嵗惡輩樹之不纍月魏法大壞一旦萬衆相呌噪皆曰田中丞當為帥公曰叱叱止止衆曰何謂也公曰爾輩牽制孺子猶一纍吾焉能受爾輩即欲受吾使用我乎皆曰諾公曰孺子之家敢有辱者死擅殺人者死掠財者死天子未命敢有言吾麾節者死訖吾世敢有不從吾忠孝者死汝輩可乎皆曰可公乃狀其事於先帝先帝大悅降工部尚書魏博相衛貝澶六州節度支度營田觀察處置制刻節以授之而又賜緍錢赦死罪復租入公乃獻地圖編口籍修職貢上吏員凡魏之廢置不關於有司者悉罷軍司馬已下皆請命於廷然後斬暴亂敘勞舊除僭異弛禁閉家家始以燈火相會聚親戚吉凶通弔問出入封無所詰魏之人老者聞見平時多出涕少者不知所以然百辟四方皆奉賀明年錫嘉名又明年加僕射十三年子布功於蔡加司空十四年帥師克東平加司徒平章宰相事八月朝京師乞侍從先帝付以山東加侍中實封以遣之十五年會上新即位成德表帥上曰非吾勳賢莫可入者轉中書令以往焉是日命子布節度河陽以張之公既入鎮去就事法猶在魏魏之人相與立石乞文於陛下陛下詔臣稹為文以付之先是瀛之樂壽博野入於鎮公乃奏歸之長慶元年七月幽州亂公即日命將悉帥麾下集於境鎮人初受制未慣用於王是月二十八日潛作亂公薨於師年至五十八天子震悼罷五日朝册贈太尉下詔徵天下兵且命子布脫縗絰總魏師以自報兵勢未合布寃憤自殺遂罷討三年鎮人歸其喪詔葬有加焉嗚呼魏之法虐切疑忌諸將以才多死者公既故為刺史子又多才好讀書識理亂形勢孝友信義士衆多附服官望已重不宜免然而晦養謹慎不下二十年訖無禍用是建大勳更大鎮模樣聲名施於後世身以忠歿子以孝歿纍纍在墳下者如公幾何人公若干男若干女子布終魏博節度使子肇鳳翔府少尹子犨某將軍子某某官子某某官女邵氏某氏婦近世勳將尤貴富者言李郭然而汾陽西平猶不得父子並世為節制公與子布同日登將壇諸子洎伯季龜緺金銀被腰佩者十數人不亦多乎哉銘曰忠乎仁乎可以用於彼而不可用於此乎何魏人之不我以異而鎮人之不與我為徒化萇宏而為血辨青旗於葦蒲感異物之先兆豈人力之能圖送橫之客歌薤露吁嗟沂公今已乎按李發事魏為橫野將軍申國公十一世而生有唐綏州刺史明明生太子中允進德進德生昌明令珍玉珍玉生雅州別駕贈禮部尚書震公即尚書第三子諱建字杓直始以進士第二人試校祕書郎判容州招討事復調為本官會德宗皇帝選文學公被薦上問少信臣皆曰聞而不之面唯宰相鄭珣瑜對曰臣為吏部侍郎時以文入官當校祕書者八其書則馳他人書建不馳故獨得上嘉之使居翰林中就拜左拾遺會德宗皇帝崩鄆帥擅師于曹詔歸之公不肯與姑息時王叔文恃幸異公意不隨卒用公意鄆果帖後一年司直給事府會朝廷以觀察防禦事授路恕治於鄜恕即日就公求自二降拜六而後許詔賜五品服供奉殿中以二焉會恕復取不宜為賓者公罷去歸為殿中侍御史有詔天下俟三節來獻先是襄帥均裴均獻在邸亟相命俟節以獻之公力爭不可意作謬官詩尋為員外比部郎轉兵部吏部始命由文由部而仕者嵗得調編類條式以便觀者罷成勞書凡成否之狀急一月人皆便之遷本曹郎換兵部郎中知制誥丞相視草時微有竄益遂不復出樂為少京兆會仲兄尚書遜被口語上疏明白出刺澧州入以亞太常於禮部中核貢士用已鑒取文章選用多薦説者遂為禮部侍郎遷刑部權於吏部郎衆品一夕無他恙而奄忽將盡舉族環之請召咒妖巫搖首若不欲者寡嫂至斂衣若禮焉竟不克言而遂薨年五十八是嵗長慶元年之二月二十有三日也上為之一日不視事以工部尚書追命之後四月祔先君於鳳翔府某縣某鄉某里實五月之二十有五日夫人渭源縣君房氏容州濟之女在太尉琯為猶孫生五男長曰訥始二十朴恪慤碩次第焉二女皆十年而下長於議論用體識為文章於朋友間好盡言然而未嘗以勝負形喜慍進退之際幾微不苟受官法與操行牢不奪亦未嘗皎皎自辨性潔廉而沓貪有才者皆進之考行取友甚峻能銖兩人倫而滔滔者莫見其厚薄終肯延薦人常為諱避其短善承受得喪故沒身無誕歎之言沒之日會上合百辟宴御史吏驟聞其喪聞者皆怛然愛惜無異詞公始校祕書時與同省郎白居易元稹定死生分至是稹與白哭泣不自勝且相謂曰杓直常自言在江陵時無衣食賴伯兄造焦勞營為縱兩弟遊學不數年與仲兄遜舉進士並世為公卿而伯兄先杓直沒今杓直復不以疾聞於許一旦發其喪其兄何如哉許信至果誨其猶子訥曰爾父有不朽行宜得知者銘吾悲撓不忍為爾其告若父之執子訥遂來告曰為志且銘銘曰日出入安歸今日之日是前日耶非君去此安之念君夢君兮是君也非之死信冥冥兮安用銘此為死而尚可識兮魚膏大夜安忍觀此詞有魏昭成皇帝十一代而生我隋朝兵部尚書府君諱某後五代而生我比部郎中舒王府長史府君諱某君即府君之第二子也諱某字元度娶清河崔鄰女生四子長曰易簡滎陽尉次從簡曲沃尉次行簡太樂丞幼宏簡長女適劉中孚中孚早卒次嬰疾室居次適蘇京舉進士次適李殊殊妻早夭君始以恆王參軍附太學治春秋中授左清道府録事參軍歷湖丞秩罷丁比部府君憂服闋調興平長安萬年尉丁滎陽太君憂服闋除萬年丞遷監察御史知轉運永豐院事殿中侍御史留務河陰加侍御史賜緋魚袋元和十四年以疾去職九月二十六日歿於季弟虢州長史稹之官舍嗚呼我尚書府君有大勳烈於周隋氏我比部府君積大學行搢紳間我諸父法尚嚴家極貧而事事於喪祭賓客雖帚除薪水不免於吾兄貞元初蝗且儉我先太君白府君貨女奴以足食君泣曰太夫人專門戶不宜乏使令取新婦氏媵婢以給貨向是三十年養育八男女始元和中乃復奴婢之籍焉先府君叢集㣥言裁成百葉書抄君懼不得授乃日一食以齋其心者一月先太君憐而請焉由是盡付其書是嵗貨婢足食之一日也日一粥而課寫千言三嵗乃卒業先府君違養之嵗前纍月而季父侍御史府君捐館子伯兄由官阻於蔡叔季皆十年而下遺其家唯環堵之宮耳皆曰貨是以襄二事可也君跪言於先太君曰斯宇也尚書府君受賜於隋氏乃今傳七代矣敢有守失以貽太夫人憂死無以見先人於地下由是匍匐乞以終其喪自興平長安萬年尉俸不過三四萬然奉顏色潔礿祀備吉凶來賓客無遺焉均也已雖遊千里貿費毫未嘗不疏之於書還啓先太君下示仲叔季且曰尊夫人慈不我責不如是自束陷不義矣其在於京邑專捕盜者八年破囊士冖柘掘盤牙不可勝數莫不刑者不懇強者不暴其在河陰也朝廷有事於淄蔡纍百萬之費一出於是朝令朝具夕發夕至者周五星嵗而後功成役罷凡主供饋之百一於君者皆以課遷唯君終不言賞賞亦不及嗚呼君之生六七十年矣四十年事親無一日之怠三十年養下無一詞之倦撫諸弟無正色之訓而亦不至於不恭教諸子無鞭笞之責而亦不至於不令以間處劇而吏不忍欺以直立誠而忤不及物沒之日三子不侍無一言之念知叔季之可以教姪也室空墻壁無一顧之憂知叔季之可以任喪祭也嗚呼愛我者張仲知我者鮑叔豫生幾何懼不克報或不忘記之斯文銘曰唐元和之己亥惟孟年十一月十六日仲月之良辰合葬我元君於咸陽縣之洪瀆川從先太君之後域而共閟於夫人崔之墳君諱某字莫之有魏昭成皇帝十七世而生某官某君即某官之次子也少孤母曰渤海封夫人提捧教訓不十四五其心卓然讀書為文舉進士每嵗抵刺史以上求與計去且取衣食之資以供養意義漸聞於朋友間無何宗姪義方觀察福建子幼道遠自孤其行拜言勤求請君俱去太夫人曰吾有爾兄養吾足矣爾其遂行旋受建州浦城尉宗姪之心腹耳目之重以至閨門之令盡寄於君上下不怨誠且盡也又無何宗姪觀察鄜坊君亦俱去心腹耳目之寄皆如初宗姪歿子公慶號駭迷謬無所據君自始至卒任持之公慶事公雖及喜慍不敢專元和中丁封夫人喪痛毒哽咽結氣膏肓既免喪卒不散十五年八月二日終於京城南享年五十八公慶襄其事夫人濮陽吳氏賢善恭幹生一女女亦惠和夭君前纍月嗚呼吳夫人可謂生人太苦矣子與君伯季之間十嵗相得師學然諾出入宴遊無不同也及逾三十年豫亦竊位偷名官進不已然而終無濡縷之力及君君何足悲適自悲耳銘曰維元和庚子十一月之四日四禽交加六神沒吁嗟元君歸此室豫陸氏姊事父母以孝聞事姑如事母善伯仲以悌達事夫如事兄睦族以惠和煦下以慈愛四者謂之吉德然而不貴不壽夭也嗚呼享年三十有五歿世於夏陽縣之私第是嵗有唐之貞元二十五年十二月之初五日也冬十月十有四日葬於河南洛陽之清風鄉平樂里之北邙原從祖姑兆太上永貞之元年嵗乙酉朔旦景申辰在己酉須時順也我繫祖有魏昭成皇帝後嗣失國今稱河南洛陽人焉六代祖諱嚴在周為內史大夫以諫廢在隋為兵部尚書昌平公以忠進君子曰忠之後必復降五世而生我皇考府君府君諱某以四教垂子孫孝先之儉次之學次之政成之當乾元廣德之間郡國多事由雲陽昭應尉馮翊猗氏長遷於殿中侍御史或未環嵗或未浹時而五命自天非夫公不來則人不蘇公不遷則善不聳何是之速也董方書奏議者凡八人其在比部郎中也宗人得罪有不察夫玉與珉類而不雜者屈我府君為虢州別駕纍遷舒王府長史至則懸車息宴浩如也嘗著百葉書要以萃㣥言祕牒一開則萬卷皆廢由闕懼夫百氏之徒一歸於我囿所不樂也故世莫得傳嗚呼盛德大業至矣不峻其位不流其化時哉時哉我外祖睦州刺史滎陽鄭公諱濟官族甲天下我太夫人聖善儀六姻訓子婦以憫默罰婢僕傭保以莊厲為鞭笞用至於兒稚不能名夏楚而嗃嗃於他門肆我伯姊穆其嚴風柔以慈旨於人有加矣生十四年遂歸於吳郡陸翰翰國朝左侍極兼右相敦信之元孫臨汝令泌之元子魏出也魏之先文貞有匡君之大德翰少孤事親以至行立釋褐太平主簿我姊由是而歸之逮陸君之宰夏陽也事姑垂二十年矣姑愛之若慈母婦敬之若嚴君雖母兄之饋不授於姑則不至而况於私其財乎閨門之內未嘗以往復之言聞婢僕而况於相色乎及太夫人之沈痼也夫人亦不利行作有年矣然而藥不嘗於口則不進衣不出於手則不獻冬之夜夏之日環侍其側者周二三嵗衣不釋體倦不形色曾不以己之疾為愈矣嗚呼閔之養其親也方於此何如吾不知也至於陸君之在疚也克哀敬以終之舊疾暴加不數日而釁作陸君縻職他縣至則無及矣將訣之際子號女泣問其遺訓則曰吾幼也辭家報親日短今則已矣不見吾親親乎親乎西望而絶痛夫孝於親敬於姑順於夫友於兄弟辭世之日母不獲撫夫不及決兄不得臨弟不得侍天乎淑善反以為罪乎二女曰燕曰迎兩男師道嶠夫人兄沂兄秬弟積弟稹或遊遠或守官或歸養皆不克會葬陸君先是職於使又不克董喪從父季廙以二子襄事禮也我尊夫人有命於小子稹曰吾大懼夫馨香之行莫熾於後爾其識之是用銜恤隕涕篆銘於壙銘曰嗚呼有唐陸氏孝夫人元氏之墓唐少保贈僕射韋公幼子左千牛珮母曰武威段氏故衢州司田參軍岌之第二女也其四代祖褒國公揚州都督贈輔國大將軍生曾祖宣州長史諱宏圭生大父鄜州刺史諱懷本先是僕射裴夫人早世女抱子幼思所以仁之者命主養之始長安令至於都留守持門戶主婚嫁者殆十五嵗當貴大之家處謙謙之勢然而不怨不德禮得其宜信難矣今僕射喪益不失非盛勳烈之後其孰能如此哉元和四年九月十九日暴疾終於履信第享年四十定其年十二月二日葬於河南縣龍門鄉之午橋村凡韋氏之族姻聞其喪莫不親者悲疏者歎不亦善處其身哉故僕射諸子洎諸女皆服兄弟之母服而哀有加焉始豫亡妻生不月而先夫人歿免水火之災成習柔之性用至於粧櫛針組書誡琴瑟之事無遺訓誠有以賴焉是以豫妻之言於豫曰離則思思則夢夢則悲疾則泣戀戀然豫不知其異所親矣訣豫之際切以始終於敬為託焉今日之志其終乎銘曰母以子貴貴必因人人本乎祖祖盛厥勳昔我稚室沒懷其仁仁莫之報沒而有云今復泯矣報之斯文公諱某字某河東聞喜其望也唐故長安縣令諱安期贈左散騎常侍諱後已贈工部尚書諱郜其父祖其曾也贈晉陽縣太君王氏其母也故清河縣君房氏其室也昭應縣令稷虔州刺史遜盩厔縣令及其季也進士誨進士警其子也辛少穆孝堯一陽觀李及其壻也參軍於彭尉於雒丞於湖城復尉於奉先主簿於太常録事於華戶曹於京兆檢校水部員外郎侍御史佐於襄令於醴泉檢校庫部員外郎侍御史兼中丞團練觀察於福建其官也中大夫上柱國紫綬金魚其階其勳其賜也嵗某月之某日癸卯某月之某日甲辰某月之某日其始其薨其葬也某縣某鄉某里之某原其墓也少好學家貧甘役勞於師雨則負諸弟以往卒能通開元禮書中甲科在湖城時杖刺史若初寵卒返致若初謝在華時會刺史故相郢將至舊法盡取行器於人公不取給官司所有粗陳之其他廉法不撓皆稱是刺史郢卒以上下考酬之初狀請白京兆尹於陵由是奏為劇曹掾佐襄時新換帥公為新帥均馳撫其師會衆卒將食舊帥賓公遏之不果食既而均至傲狠不用禮公去之在坊時嵗旱廪庫空少不數年皆羡溢在鄭時朝廷有事淄蔡驢車粟芻一出於鄭均次征役征人用不擾義成節度光顏將出師乞自副且專留事訖師還不絶糧餉義成換帥仍為副皆帶刺史事理鄭凡三年鄭人宜便觀察福建時遠俗佻剽食稅重繁急則散去緩則偷苟持之五載不失所逮其就徵內外以才自許為劇職者皆開路不幸薨於揚天子聞之罷一日朝降使者賻粟帛仍以左散騎常侍追加焉豫與公姻懿相習熟及豫來東自謂與公會於途晨涉淮而夕聞其訃其子誨雅知豫有舊因請銘大凡公之行孝愛友順顯揚前人冬曹晉陽寵備幽穸而又勤盡讓不為競爭官卑時多為官重者所與居重官人皆以經慣吏理為美談不如是安能富貴其身哉銘曰實而無文行則不振不有好辭安知令聞我有祿位榮於子孫亦又記志其期不泯公少好學始以大歷八年舉進士禮部侍郎張謂妙選時彥在選中不數年補太子正字歷櫟陽尉試為大理評事福州支使復以監察裏行為宣歙觀察判官轉殿中兼侍御史充團副加檢校著作郎賜章服入拜尚書刑部員外郎一年轉太原少尹賜金紫尋加北都副留守兼御史中丞又加行軍司馬檢校司封郎中特命為銀青光祿大夫檢校工部尚書河南節度支度營田觀察處置等使兼太原尹御史大夫北都留守再命加檢校尚書右僕射三命加金紫光祿大夫檢校尚書左僕射扶風郡開國公食邑二千戶四命加檢校司空始特命至是凡九年朝京師真拜尚書右僕射依前檢校尋以檢校司空拜荊南節度觀察支度等使兼江陵尹御史大夫進封鄭國公食邑三千戶後纍歲遷山南東道節度觀察處置支度營田等使兼襄州刺史司空大夫皆如故就加淮西招撫使徵拜太子少保依前檢校司空換檢校司徒兼太子少保判光祿卿事復換太子少傅依前檢校司徒疾告久之有司上言百日不視事當絶俸特詔有司無絶俸長慶二年五月二十七日薨於家上為一日不聽朝詔贈太保出內帛以贈賻之恩有加也初貞元中宣歙觀察使劉贊以公勤信精盡深所委異十年之間政無細大一以咨之及贊府除掌贊餘務德宗皇帝善公之所為是有刑曹之命且欲任用焉會太原節度使李説嬰疾曠廢遂命副助之其實將代説矣公事説愈謹待下愈謹及説薨而人人皆願為帥德宗皇帝因人焉元和初楊惠琳反於夏公上言曰陛下新即位惠琳不誅威去矣臣請偏師斷其頭優詔許之公乃秣芻以載於車蒸糧以曝於日齎挽輊重人利百倍惠琳誅是有金紫大夫尚書左揆開國扶風之命焉明年賊闢劫蜀兵以叛詔公分師以會伐令司空光顏將往會公乃悉出帳下衛以驍果之柄以付之然後豐其資賞副以兼乘涉棧道者五千餘騎人無徒步而進者馬有羡力兵不勞困蜀人駭竄自我功為多役罷是有檢校司空之命焉公之始帥太原也內外乘馬不過千餘匹三年皂而秣之者六千匹出之於野者以萬數及今十不能一二焉嘗大閲於并城東種落畢會旗幟滿野周回數十里不絶時回鶻悔録將軍來在會聞金鼓震伏其在江陵也蠻酋張伯靖殺長吏劫據辰錦諸州連九洞以自固詔公討之公上言曰緣溪諸蠻狐鼠跧竄王師步趨不習嵌嶮泝水行舟進寸退里晝不得戰夜則掩覆攻實危道招可懷來臣今謹以便宜未宣討詔先遣所部將李志烈齎書諭旨俟其悛心不十餘日伯靖果以隸黔六州之地乞降下公天子褒異一以委公公命志烈復往伯靖遂以其下舒秀和等來就戮詔公皆署麾下將以撫之由是六州平而伯靖亦卒為我用荊俗不理室居架竹苫茅卑庳褊逼風旱麾戛熇然自火公乃陶瓦積材半入其直勉勸假借俾自為之數月之間廛閈如化災害減少人始歌之及朝廷有淮蔡之師乃命公為襄陽節度以招撫之既至再旬而王師濟漢器備車徒皆若素具俸秩廩祿一以資軍公之大概推誠厚下善用人之所長故誅琳破闢柔伯靖秀和皆談笑指麾而人人自輸其效理身理家和易孝敬親喪不自支事兄嫂有過人者前後四顯親而先府君位尚書先夫人封虢國朋友姻戚泳遊於德宇者如歸焉自始建牙選將開幕壁於今才二十年矣目擊為將相者逮不肖凡九人焉其餘從公而同奉朝請者可知也公之先自兩漢至隋氏郡守列侯駙馬御史郡丞將軍刺史著作郎數百年冠冕不絶代若公之出入更踐位與壽極其上無如也高祖協貞觀中文皇征遼為海東運糧使洮州都督自高祖至王考禮部府君為政皆嚴明無畏避初府君為松滋江陵令恃豪賴軍目氣勢者比比皆杖殺邑人相與刻石歌詠之先是開元天寶間安之尉京劇挺之更右職破壞豪黠如神明至是挺之子武洎府君又著稱有唐言剸斷者先嚴氏焉自公始用儒素謙廉見推於早歲及為大官益自勞謹貴貴尊尊而哀賤下於己者雖走胥負卒幼子童孫終不得聞辱詬之言而窺怠惰之容矣用是享年七十七仕五十年一為尚書三歷僕射六兼大夫五任司空再踐司徒三居保傅階崇金紫爵極國公荊并襄皆天下重地也繼為統帥者十有四年前後奏名刺率百辟以慰慶吉凶者凡八載然而褫免之誚不聞於耳憂悔之緒不萌於心非夫上取信於其君下取信於其友權近不疑於畏逼戎旅賴我以安全其孰能如此哉詩所謂終溫且惠淑慎其身於實敢信備録聞諸有司謹狀上尚書考功稹變贊無狀孤負明恩天付郡符官未稱責日夜憂畏豈暇為文無何太保公諸子以稹門吏之中恩顧偏厚具狀官閥且訃日時願布有司以旌懿行其間親承講貫子孫不得而聞者往往漏略恐他人纂撰益復脫遺感念曩懷遂書行實其所行事由荊而下皆所經見由荊而上莫非傳信飾終定諡期在至公謹狀維年月日通州司馬稹用肴酒為州人告於畬三陽之神圖籍鐫載耆艾傳述通之盛時戶四萬室耕稼駢緻謠謳湧溢廛閈珠玉樓雉丹漆孝順子孫廉能吏卒軒然神功坐受嘉栗政式不虔人用不謐奪富撓豪軋窮役疾弱者逋播悍者憤怫飢饉因仍盜賊倉卒閭落焚燔城市剽拂人民遂空萬不存一神居毀蕩神氣蕭飋再完陋宮榻不容膝僅有雞豭無復芬苾豺虎號噪麋鹿幽噎厲鬼疸人貪吏殄物闤闠邱墟門戶蒿蓽神又何情受人祈乞嗚呼罔天軸地羅星走日水火炎潤原隰生出古不獨加今不獨屈化由人興胡不為率我二茲邑星歲三卒熟視民病飽聞政失自喪守後月環其七弊深力薄未暇纖悉都盧虛持先後排比附防風俗簡用紀律功不甚農虛不勝實乃勸州人大課芟銍人人自利若受鞭抶旋六十里功旬半畢嗚呼教則人功理有陰隲農勸事時賞信罰必市無欺奪吏不侵軼非神敢煩在我有術雷蟄雨枯蒸頑曝鬱闕導百來呵厲四逸非我敢知有神之吉惟我惟神各恤其恤神永是邦我非常秩繼我者誰為神斯栗尚饗稹聞天好平施而特纍山嶽許其嵩崇聖王亦視之公侯不惜牲幣蓋以其鎮定區宇舒貯風雲育櫟櫨棟礎洎百穀萬貨以資養於人也至於蒙翳薈羅惡木穴窟虺蜥虎豺迎礙吞噬以遂其高傲堅頑之勢非天意也按通之載號神為名山川且邇邑屋而扶道途然而不砟不穫不礎不柱藂集貙蟒蔽弊道路將五十年矣實人力之不足於山也非神之過今天子斬三叛之明年通民畢賦用其間餘夾津而南開山三十里為來年農種張本自十月季旬周甲癸而功半就郡司馬元稹率屬攸置酒肴以告於神曰通之邑居才二百室一旦為神剪翳穢戮豺狼幅員六十里之地亦足為用力於神神其戒哉敬用嘉祝祝曰為山輸力為民豐食廩以萬億蟊賊以殛報用黍稷諡用正直播布不殖淫厲不息風雨不式豭麋不比俾民無得將他山是嗇棄神之域為神之羞永永無極神其畏哉尚饗維元和十三年九月十五日文林郎守通州司馬權知州務元稹謹遣攝録事參軍元叔則以清酒庶饈之奠以報於三陽神之靈越九月始踐朔霖雨既旬式從禜典俾吏拜稽首祈三辰克霽於明神神初饗若不踰祈幽妖靈虬不克亂負輸穫熟者賴神之仁仁必報式備報典不敢諼伏惟尚饗稹始以長慶二年夏六月相天子無狀降居於同愁慙焦勞求念人隱思有以報陛下莫大之恩涉歲於茲理用不效冬不時雪春不時雨越二月宿麥不滋耒耜不利大懼茲歲患成於人以羞陛下之獎寄刻責罪悔罔識攸咎大凡天降疵厲必因於人豈豫心之虛削孤獨依倚氣勢耶將豫刑之僭濫失所寃哀無告耶或豫政之抑塞和令開泄閉藏耶舉動云為罔不在我神怒天譴降災於我身我不敢讓今夫蠢蠢何罪物物何知使不肖者長理而災害隨至無乃天之降罰不得其所耶痛毒惻怛無所赴露惟龍司水於同同人神之謹齋戒沐浴叩首揮淚願以小子稹為千萬請命於龍龍其鑒之克三日雨我田疇其有以報不然災於子身亦足以謝伏惟尚饗同州刺史元稹謹以清酌庶饈之奠敬祭於九龍之神是月己巳刺史稹以二從事蒙受塵露百里詣龍為七邑民赴訴不雨豫固慙惻言訖涕下親為龍言龍意享若是夕而應庚午而降辛未而洽癸酉而飫甲戌而霽乙亥而報報典不渝龍祐宜永訖是嘉穀勿旱勿霪歲其有成無忘龍德尚饗維長慶元年歲次辛丑五月景申朔十四日己酉孝曾孫嗣皇帝臣諱某敢昭告於太祖景皇帝天革隋暴付唐養理高祖太宗奉順天紀元宗平寧六合同軌物盛而微墉崇則毀網漏鯨鯢隟開螻蟻幽燕狼顧齊趙虎視割據封壤傳序孫子不貢不覲自卒自始聖父披攘震駭波委擒滅斬除如運支指冀方獨迷再伐再巳碣石是徵承詔唯唯逮臣寡昧虔奉先旨洞照誠明滌濯痕恥承元雲奔總亦風靡悉率賦輿盡獻州里不命一將不戮一士不費一金不亡一矢五紀逆命一朝如砥實天垂休實聖垂祉敢薦成功以永千紀尚饗維元和九年歲次甲午十二月朔甲辰某日辰使謹遣某用少牢醴酒之奠昭禱於淮瀆長源公之靈浩浩靈源滔滔不息流謙處順潤下表德清輝可鑑浮穢不匿月映澄鮮霞明煥赩經界區夏左右萬國百川委輸萬靈受職越海貢誠載舟竭力明哲用興凶戾潛殛眇爾吳頑蔑然蟊賊鴟張蔡郊蟻聚淮側喪父禮虧干君志愎天子命我滌除妖慝卒乘桓桓戈鋋嶷嶷電率爪牙雷胸臆王心示懷士剪猶抑柔叛誘衷取順捨逆咨爾有神逮爾有極彼暴我仁彼枉我直歸我者昌倍我者闢不斬祠祀不湮溝洫不殄渠魁不虐畏逼不進梯衝不耀矛戟火滅燎原人歸壽域然後潔神牛羊奉神黍稷告神有成謂神不忒尚饗嗣子稹等謹以常饌嘉蔬之奠敢昭告於皇考贈右散騎常侍皇妣贈滎陽郡太君今皇帝二月五日制書澤被幽顯小子稹參奉班榮得用封贈越七月二十八日乃詔先夫人曰滎陽郡太君洎八月之九日復詔先府君曰右散騎常侍祗命隕越哀號不逮追念顧復若亡生次惟積洎稹幼遭閔凶積未成童稹生八歲蒙騃孩稚昧然無識遺有清白業無樵蘇先夫人備極勞苦躬親養育截長補敗以禦寒凍質價市米以給晡旦依倚舅族分張外姻奉祀免喪禮無遺者始亡兄集得尉興平然後衣服飲食之具粗有準常而猶卑薄儉貧給不暇足慈訓備至不肖乃立積初一命稹始奉朝供養未遑奄忽遺棄釁罪不死重羅纓裳遷換因循遂階榮位大有車馬豐有俸秩書扇雖存舊老已盡顧是所有將焉用之嗚呼生我者父母享此者妻子勤悴者兄嫂優餘者婢僕追孝不過於一奠薦寵不過於揚名哀哀劬勞亦又何報摧殞裂酸傷五情謹於先太君載誕之日祗告贈典并焚黃制以獻號慕莫及痛毒肝心伏惟尚饗孝孫稹敢昭告於皇祖陳州南頓縣丞贈尚書兵部員外郎府君祖妣贈晉昌縣太君唐氏惟元統運嘗宅區夏選建賢善俾公彭城公實能德延於後嗣降及兵部為隋巨人抑揚直聲扶衛衰俗戶部績紹傳於魏州蘊鬱懿粹族用繁昌始兵部賜第於靖安里下及天寶五世其居冕辨駢比羅列省寺一日秉朝燭者凡十四五叔仲伯季姊妹諸姑洎友壻彌孫歲時與會聚者百有餘人冠冕之盛重於一時燕寇突來人士駭散蔭籍朘削龜繩用稀我曾我祖仍世不偶先尚書盛德大業屈於郎署小子稹蒙幸餘福據有方州今皇帝嗣位之初澤被幽顯尚書府君洎滎陽郡太夫人當進封贈小子稹伏念先尚書嘗以比部郎乞換追命朝列不許大孝莫申是用追述先志乞回恩於祖父祖妣是歲八月十八日詔以兵部員外郎晉昌縣太君來告第摧慕感咽五情傷殞謹以仲冬日至修奉常薦焚獻制書昭告神几伏惟尚饗孝曾孫稹謹以清酌庶饈之奠敢昭告於曾祖岐州參軍府君禮稱礿禘蒸嘗一歲用是四者而已唐制位五品皆廟祀廟祀亦以求吉日其餘未廟祀者各奉家傳疏數每異昔我先府君深惟孝思終已不怠每歲換正至涉佳辰覩兒孫賓遊相會聚未嘗無悲是用日至暨正旦仲夏之五日季秋之初九莫不修奉祠祀以達事生之意焉逮小子稹冒華靦榮當立廟以事先人於京師會值譴出未果修構宗子積牧民於金復不克以上牲陪祀每衣裘葛酸傷五情今謹依約廟則每歲以一至二分暨正旦與宗積彼此奉祀於治所始用變禮不敢不告伏惟尚饗維元和六年七月某日文林郎守江陵府士曹參軍元稹謹遣弟某姪男祗酌捧饌敢昭告於白氏太夫人之靈嗚呼分同伯仲古則拜親既陪長幼之列遂生骨肉之恩禮由情展情以義殷情至則爾豈獨古人况稹早歲而孤資性疏愚既不得為達識者所顧亦不願與順俗者同趨行過二十塊然無徒及太夫人令子藝成學茂德馨一舉而搴芳蘭署再舉而振藻彤庭愚亦乘喧濫吹謬列莖英迹由情合言以心誠遂定死生之契期於日月可盟誼同金石愛等弟兄每均捧檄之祿迭慶循陔之榮用至於二門之童孺莫不達廣孝之深情逮稹謫居東洛泣血西歸無天可告無地可依喘息將盡心魂以飛太夫人推濟壑之念憫絶漿之遲問訊殘疾告諭禮儀減旨甘之直續鹽酪之資寒溫必服藥餌必時雖白日屢化而深仁不衰天乎是感人乎詎知不幸餘生苟活重戴冠纓再展升堂之拜旋為去國之行闕一字澤畔之云幾奄天禍之無名朋友訃告慰問縱橫猶恍恍而期誤忽浪浪而淚盈處衆憫默入門屏營移疾於趨府之辰孰知潛慟視惟幼女在側無處言情行吟倚嘆夢哭魂驚往往不寐晨鐘坐聽豈由禮而當爾蓋感深之所縈嗚呼仁之莫報哀不得申闕一字太夫人以猶在感今古之同塵嗚呼哀哉太夫人族茂闕二字仁深聖善勵諸子以學故大被擇鄰示諸子以正故寸蔥方判保參不疑戒歜非淺仲則金鑾之英季則蓬山之選豈闕一字因地而德所貴飭躬而顯何昊天之不弔罔終惠於哲人既生賢與種德何憔悴之相因見聚螢而肄業知織縷之嘗勤闕一字將期於萬石曾不待夫重茵嗚呼哀哉誰非顧復我實闕二字疾有萌漸禍無因緣哀感行路况乃令子之交親雖千詞之稠終萬恨之莫陳嗚呼哀哉伏惟尚饗外孫女壻朝議郎守尚書祠部郎中知制誥元稹謹以清酌嘉蔬之奠敢昭告於庾氏太夫人扶風郡太君韋氏之靈赫赫韋門祁祁騫騫蹙蓄峻峙洛澤清源公卿委纍賢彥駢繁金玉不耗芝蘭有根厥生孟母德盛教尊訓下以順睦族以姻猶子猶女惟弟惟昆至者處者終無間言他族之長豈無豐溫自我均養人用不怨佛氏有云世火焚燔慧劒斷網摩尼照惛心焉獨得深入妙門嗚呼良人早世素業空存戒歜以義為軻避喧教自髫齔成於冠婚鬱為重器瑚璉璵璠南北臺省東西掖垣更踐迭處以慰朝昏孝女視膳令婦執笄封崇茅社抱弄荃蓀陔蘭始茂隙駟俄奔神不可恃天何足論嗚呼哀哉白日入地畫翣羅軒燎火宵燼銘旌曉翻望望踰閾遲遲改轅佳城故兆風樹秋原哀子泣血行人斷魂稹也幼婦時惟外孫合姓異縣謫任遐藩升堂不及執紖空敦伏讀哀誄跪薦芳樽辭訣有禮悽愴無垠嗚呼哀哉伏惟尚饗嗚呼敘官閥志德行具哀詞陳薦奠皆生者之事也於死者何有哉然而死者為不知也故聖人有無知闕二字嗚呼死而有知豈夫人而不知豫之心乎尚何言哉且曰人必有死死何足悲死且不悲則壽夭貴賤縗麻哭泣藐爾遺稚蹙然鰥夫皆死之末也又何悲焉况夫人之生也選甘而味借光而衣順耳而聲便心而使親戚驕其意父兄可其求將二十年矣非女子之幸耶逮歸於我始知賤貧食亦不飽衣亦不溫然而不悔於色不戚於言他人以我為拙夫人以我為尊置生涯於濩落夫人以我為適道捐晝夜於朋宴夫人以我為狎賢隱於幸中之言嗚呼成我者朋友恕我者夫人有夫如此其感也非夫人之仁耶嗚呼歔欷恨亦有之始豫為吏得祿甚微以日前之戚戚每相緩以前期縱斯言之可踐奈夫人之已而况攜手於千里忽分形而獨飛昔慘悽於少別今永逝與終離將何以解豫懷之萬恨故前此而言曰死猶不悲嗚呼哀哉惟神尚饗維長慶元年歲次辛丑八月甲子朔十八日辛巳皇帝遣通議大夫行內侍省常侍賜紫金魚袋李某祭於百神之靈朕奄宅萬有亭毒品類日月所照永思和寧上極於天下蟠於地包山絶海窮冥入元至於毛鱗裸羽之神咸秩無文以祛不若秋序始肅時將順成且報且祈用舉常祀罔害嘉穀以貽神羞嗚呼英英君子汲汲仁義壽則道亨夭亦德熾滔滔衆人沒沒名利材不稱官老不識事紫綬榮身黃髮垂穗徒擲天年竊耀名器石頑慧明亦有何貴君雖促齡實大其志呼吸風雲擺落塵膩泥濜珠玉糞土名位瞪目凡流傾心俊異譽如不聞毀亦不忌不求近效直詣殊致圈檻豺狼籠御鵬驥塹山堙海吞河噴渭嶽立英髦粉碎庸媚德我者煌煌虐我者惴惴赫赫其門揚揚其氣念昔日之盡言此唯君之大意夭不降年志亦沒地我輩猶在尚可希冀故曰交本乎道道通乎類身沒類存道則不墜信後圖之未忘奈目前之歔欷昔江濆之送君每重宵而疊醉曾不易其津涯忽莫陳於喪次孀婦號呼哀徹提稚拜我者曩日之舊童示我者絶時之遺字埋萬恨於深心灑終天之別淚嗚呼哀哉尚饗
