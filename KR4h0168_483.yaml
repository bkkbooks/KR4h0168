body:
  text: 紛羽族之多端兮同翾飛而類殊有鸜鵒之微禽亦播質於洪爐因稚子之嬉遊得中園之墜雛恣飲啄以馴擾來目前與坐隅爾乃棲以籠檻鎩其羽翼冀留軒以為娛俾遐翥之無力乍踉蹌而將舉顧㰚褷而復息雖主人之見容終使喪天和於自得或親賓至止徽軫徐觸每聞絃而鼓翼亦追節而翹足貌宛轉以成態聲間關而助曲乍寂寥以閒睱若凝情以相矚理輕毳以自潔類山元之珮玉每翔集以安卑同君子之自牧思謝尚之起舞邁風流之逸躅苟魯昭之不君固乾侯之出辱方渡濟以申警伊凉德之自覆徵故老之相傳驗曩記之或存在端午之司晨翦其舌而能言巧喉囀以達情順人心而不諼方渴日以呈材願朱明之駿奔忽愀慘以憔悴響哀音於簾箔竟啁啾而不去若徊翔之有託恍心訝而未辨歘狸狌之攫搏俄斃踣而不勝紛血灑以毛落彼葛盧與冶長通鳥獸之音聲闕君子之周防無古人之至精既不能縱爾於遼廓又不能遂爾之生成使異類之得志曾未極其飛鳴則本夫養之之惠適足以害其生生又憶夫清江之使者東海之波臣苟其時之不來則刳腸而涸鱗鶋鐘鼓而反悲馬皂棧而多死雖為遇之已甚固又夭其天理嘗聞乎賢聖之理物也智愚殊方薰蕕異藏善用無棄兮互見其長各有攸處兮兩不相傷官天地而府萬物由此道而為常吾既悟斯理之不早因失之而後防收視聽以冥觀兮遂㣥性之茫茫湖渺渺兮蕩東風以發春春溜滿兮連淨緑以無垠接遠色於青草散晴輝於白蘋及夫反照安流煙花明麗霞生水底鳥沒空際聽櫂謳之四起見片帆之遠逝杳空曠以澄鮮窮千里於一睇若乃路轉涔陽波連沅湘杜蘅秀兮蕙若芳寫雲翠兮沉夕陽月明露下靄蒼蒼結遐想於騷人兮悄目極以心傷婉婉長離翩翩彩鷁遠泛桃花之浪去從蓮府之辟雲兮水兮指前程於空碧有美一人兮桂為楫蘭為舟逗遠樹之晴影泛春江之碧流乍迷雲葉稍映蘋洲凝暮色於愁睇空藹藹以悠悠的的輕舟亭亭遠質喜揚舲之漸近嗟轉岸而還失映微波以䓗蒨貯嵐翠之蒙密愴南浦之別離占橫塘之風日柳怨別兮楓傷春望不辨兮愁殺人空江邊兮遠郊外紛離緒兮相對顰摽落照以微明羃夕煙而又晦波茫茫兮景沉沉思結纜於清陰惜歸舟之不駐傷遠目以軫離心敕寅亮天工緝熙王度調陰陽以遂㣥品敷教化以統百官必得其人乃濟於理是咨茂德允式具瞻中散大夫守太常卿上柱國賜紫金魚袋齊抗植操清貞秉心諒實精達政理詳明典彞才器可以濟時忠正可以激俗蒞事惟肅休聲茂聞宜入贊於中樞俾發揮於景化式是百辟毗豫一人可守中書侍郎門下平章事散官勳賜如故於戲政之得失在於弼諧爾其竭誠啓沃以廣視聽盡規獻納以贊謀猷俾人叶中時乃之績無替朕命厥惟懋哉問六經之後百氏塞路微言大義寖以乖絶使昧者耗日力以滅天理去夷道而趨曲學利誘於內不能自還漢廷用經術以升貴位傅古義以決疑獄誠為理之本也今有司或欲舉建中制書置五經博士條定員品列於國庠諸生討論歲課能否然後刪非聖之書使舊章不亂則經有師道學皆顓門以為如何當有其說至於九流百家論著利病有可以輔經術而施教化者皆為別白書之問易曰君子夕惕若厲語曰君子坦蕩蕩禮之言絅衣則曰惡其文之著也儒行則曰多文以為富或全歸以為孝或殺身以成仁或玉色以山立或毀方以瓦合皆若相戾未能盡通顏回三月不違仁孟軻四十不動心何者為優柳下惠三黜而不去子文三巳而無慍何者為愈召忽死子糾管仲相小白棠君赴楚召子胥為吳行人何者為是析疑體要思有所聞問周制什一是稱中正秦開阡陌以業農戰今國家參酌古道惠綏元元均節財征與之休息豐年則平糴於轂下恆制則轉漕於關東尚虞地有遺利人有遺力生之者少靡之者多粟帛寖輕而緡錢益重或去衣食之本以趣末作自非翔貴之急則有甚賤之傷欲使操竒贏者無所牟利務農桑者沛然自足以均貨力以制盈虛多才洽聞當究其術至若管仲通幣之輕重李悝視歲之上下有可以行於今者因亦陳之美利嘉言無辭悉數問懲忿窒欲易象之明義使驕且吝先師之深誡至若洙泗之門人故人漸漬於道德固已深矣而仲由慍見原壤夷俟其為忿與驕不亦甚與商不假蓋賜能貨殖從我之徒而吝缺如是皆所未達試為辨之問育材造士為國之本修辭待問賢者能之豈促速於儷偶牽制於聲病之為耶但程試司存則有拘限音韻頗叶者或不聞於軼響圭璋特達者亦有纍於微瑕欲使楚無獻玉之泣齊無吹竽之濫取捨之際未知其方子曰盍各言爾志趙孟亦請七子皆賦以觀鄭志又古人有述祖德叙家風之作衆君子藏器而含章者久積善而流慶者遠各言心術兼敘代德鄙夫虛佇以廣未聞問先師之言辨君子小人而已勤學則舉六蔽咸事則稱九德推其性類又極於是矣孟軻之數聖者有清有和文子之言人位上五下五列夷惠於天縱頗有所疑況牛馬於最靈豈為至當班固之古今表劉邵之人物志或品第乖忤或鈎托纖微誠有可觀恐未盡善既強為巳之學必有析理之精敬俟嘉言以袪未達問乃者西裔背盟勞師備塞今戎王自斃邊遽以聞而議者或曰因其喪而弔之可以息人或曰乘其虛而伐之可以闢地或曰夷實無厭兵者危事皆所以疲中國也不若如故是三者必有可採思以辨之問漢廷董仲舒公孫宏對策言天人相與之際而施於教化韋元成匡衡之論以明經至宰相封侯皆本王道以及人事今雖以文以經貴祿學者而詞綺靡於景物寖失古風學因緣於記問寧窮典義說無師法經不明家有司之過敢不內訟思欲本司徒之三物崇樂正之四術不率教者屏之遠方則名義益修風俗益厚程孝秀之本業參周漢之舊章慮難改作式佇嘉話事關理本必議上聞斯乃誠求諸生母忽問齊人之所以務於賦輸用給公上其大抵饋軍實奉邊備而已今北方和親亟通禮命南詔納欵屢獻竒功而蠢茲西戎尚有遺類猶調盛秋之戍頗動中夏之師思欲盡復河湟之地永銷烽燧之警師息左次人無外徭酌古便今當有長策乃者戎人願修前好因請其俘或曰彼實無厭絶之以固吾圉或曰姑示大信許之以靖吾人或曰歸貴種以懷其心或曰奪長技以翦其翼當蘊較然之見備陳可舉之方問祖宗昭穆王者之盛典明祀嚴禋有國之大事頃歲奉常上奏以獻祖之位非正太祖之尊未申而公卿諸儒雜有其議皆以百代不遷宜居東向而獻懿二主所歸不同或曰藏於夾室或曰置於別廟或曰祔於德明興聖酌殷周之制或曰遷於園寢石室採漢魏之儀而又有並居昭穆之列竟虛其位分饗禘祫之禮互處於西衆議云云莫有所一至今留中未下誠聖意所重難也至當無二衆君子辨之問人之生也禀五行之秀其化也順一氣之散而牛哀為獸杜宇為鳥趙王為蒼犬夏鯀為黃熊傅巖之相為星圯橋之老為石變化糾紛其故何也夭壽貴賤賦命萬殊而驪山之儒長平之卒歷陽之魚鱉南陽之侯王豈稟數斯同復適然也衆君子通性命之理究古今之學幽探造化佇所未聞問有司之求才與多士之求進其心不相遠也諸生知之乎計偕者幾乎五百籍奏者不逾二十蓋二十五之一也諸生又知之乎雕龍之辨皆謂有餘靈蛇之珠無非在握射或失鵠瑜寧掩瑕雖涇渭終分而蓬麻未直匿名飛語詆訿云云誠無他腸時有讒口豈有司之道未至復諸生之所習難化耶異時有司固諸生之所履也復何如哉非有防川之心願聞易地之說問古之善為政者在得人而已在求理而已周以功德詔爵祿秦以農戰居職員漢武帝詔察茂異可以為將相者夫功與德非常才所及也農與戰非筮仕所宜也安危注意之重非設科可俟也是三者同有利病幸錯綜言之又三適之宜九品之法或計戶以貢士或限年以入官事有可行法有可採制度當否悉期指明問夏殷周之政忠敬文之道承弊以救始終循環而上自五帝不言三統豈備有其政或史失其傳嬴劉而下教化所尚歷代相變其事如何豈風俗漸靡不登於古復救之之道有所未至耶國家化光三代首冠百王固以忠厚勝茲文弊前代損益佇聞討論遽數之中所希體要也問古者士足以理官業工足以備器用商足以通貨賄而農者居多所以務三時之功有九年之蓄用阜其業實藏於人乃者惰游相因頗復去本今皇帝勵精至化在宥萬方德音聖澤際天接地凡宏於理道者無不至也裕於濟人者無不被也而又詢吏祿公田之制稽財征榷管之宜使㣥有司質政損益庶官匹士皆得上言衆君子躬先師之儒生盛聖之代佇茲嘉話當薦所聞問昔伊尹酒保傅說胥靡竟昌殷道以阜王業春秋時觀丁父彭仲爽申鄀之俘也克州蓼封陳蔡楚邦賴之漢廷韓安國徒中拜二千石張釋之以資為郎並稱名臣焯敘前史然則俘徒作役或財用自發前代取之而得人如是魏晉已降流品漸分筮仕之初率先文學或薦賢推擇皆秀發州閭而致理之風頗未及古豈朴散寖久或求之太精其故何也常有所懵今四門大闢百度惟貞執事者固欲上副聰明悉搜才實幸酌古道指陳所宜問言身之文也又曰灼於中必文於外司馬相如揚雄藉甚漢廷其文盛矣或奏琴心而滌器或贊符命以投閣其於溺情敗度又奚事於文章耶至若孔融禰衡夸傲於代禍不旋踵何可勝言兩漢亦有質朴敦厚之科廉清孝順之舉皆本於行而遺其文復何如哉為辨其說問孔聖屬詞邱明同恥裁成義類比事繫年居體元之前已有先傳在獲麟之後尚列餘經豈脫簡之難徵復絶筆之云誤子産遺愛也而賂伯石叔向遺直也而戮叔魚吳季札附子臧而吳衰宋宣公舍與夷而宋亂陳為鵝鸛戰豈捷於魚麗詛以犬雞信寧優於牛耳子所習也為豫言之問三代之弊或朴或薄六經之失或愚或誣夫以殷周之理道詩書之述作施於風俗豈皆有所未至耶輟祭納書誠為追遠執戈桃茢無乃傷恩何二者之相反耶兩楹坐奠歎有切於宗子九齡魂交數能移於與爾何二者之不一耶山節藻梲豚肩狐裘皆大夫也又何相遠耶檀弓袒免子游麻衰何如直諒而忠告之耶各以經對問四營成卦三古遺文本自河圖演於羑里而西鄰禴祭斯乃自多箕子利貞且居身後豈理有未究復古失其傳乾之彖辭乃次六爻之末坎加習字有異八純之體無妄則象稱物與同人則彖引卦名或備四德而才至悔亡或無一德而自居貞吉訪於承學思以稽疑至若康成之陰陽象數輔嗣之人事名理異同優劣亦為明徵問左史記言古之大訓何首載堯典而乃稱虞書當文思之代而九官未命及納麓之時而四凶方去豈允恭克讓待元德而盡善耶仲虺作誥伊尹作訓豈臣下忠規之稱耶伯禽費誓穆公秦誓豈帝王軌範之書耶好風好雨既從於箕畢時若恆若復係於休咎何所適從耶伏生傳於耄耋魯壁得於殘缺前代講訓孰為名家可以詳言用窺奧學問二南之化六義之宗以類聲歌以觀風俗列國斯衆何限於十四陳詩固多豈止於三百頌編魯頌奚異於商周風有王風何殊於鄘衛頗疑倒置未達指歸至若以句命篇義例非一瓜瓞取帛丿糸帛丿糸之狀草蟲序喓喓之聲斯類則多不能具舉既傳師學一為起豫企聞博依之喻當縱解頤之辨問魯史成文以一字為裦貶漢廷尚學有二傳之異同雖子夏授經孫卿肄業而去聖寖遠傳疑儻多閏以定時何非乎告朔雩乃閔雨奚有於去讓文有無天之說定有無王之年例或難通理亦未盡衛輒辭以尊祖於義安平許止闕於嘗藥受誣乃甚以茲凝滯皆藉發明穀梁子之言固當有據應上公於古復是何神諸儒待問一為覼縷問孔門達者列在四科顏子不幸伯牛惡疾命之所賦誠不可同至若攻冉求以鳴鼓比宰我於朽木言語政事何補於斯七年可以即戎百年可以去殺固弛張之有異曷遲速之相懸為仁由已無信不立拜陽貨則時其亡也辭孺悲則歌使聞之聖人之心固當有為鄙則未達子其辨歟問魯史之文先師用明於王道漢武之代左氏不列於學官誠義例之可觀終巫艷而多失鳳凰啓兆陳氏不得不昌鸜鵒成謠季氏不得不叛既未然以前定於立教而謂何同恥釋經豈其如是夏五之闕雖繫月而何嫌艮八之占於兼山為何象因生因諡未詳命氏之殊德命類命請數制名之義生既充賦無辭說經問冠婚成人著代之義一獻之饗舅姑先降以奠酬三加彌尊母兄皆拜而為禮責婦順而則可於子道而謂何一與之齊終身不改而狄儀有問服二姓之合為重而孔門多出妻蹈白刃或易於中庸引重鼎奚列於儒行裼裘襲裘之制繼別繼禰之差生既講聞佇觀詳辨問周制六官以倡九牧分事任之廣計名物之多下士吏胥類頗繁於冗食上農播殖力或屈於財征簡則易從寡能理衆疑宋母之失實豈周公之信然今欲舉司徒之三物教賓興之六藝又慮樂舞未通於韶濩徒玩干旄鄉射有昧於和容務持弓矢適廢術學豈資賢能至若六變八變致神祗之格天産地産有禮樂之防忝二春官企聞詳說問作易者其有憂患乎又曰樂天知命故不憂鼓天下之動者存乎辭又曰吉人之辭寡寂然不動則感而遂通見幾而作乃不俟終日豈各有所趣幸備言其方至若巽之於人為廣顙白眼坎之於馬為美脊薄蹄誠曲成以彌綸何取象之細佇聞體要然後忘言問堯之文思也命羲和四嶽敬授人時其道巍巍矣舜之登庸也則流放竄殛考績黜陟熙帝載而亮天工者二十有二人其理昭昭矣至禹則別九州導九河分五服建五長辛壬癸甲荒度土功其勤云云矣夫以陶唐虞夏皆聖人也而勞逸斯殊豈時不得不然復道有所不及何事功元德煩簡相去之遠耶願聞其說問三綱之道有君臣焉有父子焉周南召南以風化于天下關雎鵲巢乃首於夫婦舉后妃曷若先天子美夫人曷若稱諸侯豈自邇而及遐將舉細而明大又太師所採孔聖所刪以時則齊襄先於衛頃以地則魏土褊於晉境未詳差次何所後先一言雖蔽於無邪六藝乃先於譎諫既歌乃必類何失之於愚理或出於鄭箋言無憚於匡說問裦貶之書宣父約於史氏清婉之傳卜商授於門人經有體元且無訓說日稱夜食頗近迂異徵禿眇之修聘聚綦輒之方言晉大夫奚俟於偕行衛公子豈名其夭疾隱居攝以崇讓鄭討叛以滅親未曰申邪寧為積慮鄒氏夾氏學既不傳尸子沈子復為何者鄙夫未達有佇嘉言問子曰君子無終日之間違仁又曰仁遠乎哉則子文之忠文子之清由也之果求也之藝皆曰不知其仁豈盡非君子耶胡為乎登夫子之門而稱齊楚之賢大夫也其愚如愚寧武與顏生孰愈三思三省季文與曾子孰優虞仲隱居以放言下惠辱身以降志頗殊取捨皆曰逸賢探索精微當有師說問春秋者以仲尼明周公之志而修經邱明受仲尼之經而為傳元凱悅邱明之傳而為注然則夫子感獲麟之無應因絶筆以寄詞作為裦貶使有勸懼是則聖人無位者之為政也其於筆削義例豈皆用周法耶左氏有無經之傳杜氏又錯傳分經誠多艷富慮失根本既學於是頗嘗思乎問大學有明德之道中庸有盡性之術闕里宏教微言在茲聖而無位不敢作禮樂時當有開所以先氣志然則得甫申之佐猶曰降神處定哀之時亦嘗聞政致知自當乎格物夢奠奚歎於宗子必若待文王之無憂遭虞帝之大德然後凝道孰為致君爾其深惟以判斯惑問潔淨精微研幾通變伏羲重其象文王演其辭設位盡通於三極修德豈惟於九卦何思何慮既宜以同歸先甲先庚乃詳於出令儉德避難頗殊蹇蹇之風趨時貴近有異謙謙之吉窮理盡性之奧入神致用之精乾元用九之則大衍虛一之數成性有存存之道知幾窮至至之言既所講聞試陳崖略問洪範之美大同也曰子孫其逢吉數五福也曰考終命皆其極致也至若允恭克讓而生丹朱方命圯族乃産神禹何吉凶之相戾也金縢請命方秉圭以植璧元龜習吉乃啓鑰而見書豈賦命之可移也絶地天通未詳厥理血流漂杵何乃溢言待問而來宜陳師說問風化天下形於詠歌辨理代之音厚人倫之道鄘褊小尚列於篇楚宋奧區豈無其什變風雅者起於何代動天地者本自何詩南陔白華亡其辭而不獲谷風黃鳥同其目而不刊舉毛鄭之異同辨齊魯之傳授牆面而立既非其徒解頤之言斯有所望問穀梁名經興於魯學劉向博習稱於漢朝或貶絶過深或象類無據非立異姓乃以莒滅成文同乎他人豈謂齊侯之子異端頗甚後學難從諱親諱賢當舉其例耳理目理幸數其言何詞所謂近於情何義所謂失於短凡厥師授為豫明之問夫子以天縱之聖畏匡厄陳行合神明固久於某禱將行理道奚矢於天厭對社栗之問宰我強通嘆山梁之時仲由未達季氏旅岱冉求莫救皆見稱於達者或才比於具臣嘗隸善言顧多滯義末卷載游夏之事終篇紀舜禹之詞頗疑不倫可以敷暢問天下理本繫於朝廷乃者夏州阻命益部干紀皇帝神武制勝指期致誅二方晏清九有貞觀紀律載新於耳目爵命畢集於勳賢內修八柄外宏九法教理刑政之要制軍詰禁之宜使人皆嚮方兵不復用一其禮俗以致和平酌於古而行於今舉其大而遺其細佇達聰聽子其昌言問聖人虛心思天下之理至矣求天下之士勤矣搜於中林縻以好爵者往往至焉君子澡身聚學被褐藏器方伯上薦賁然而來與夫充賦計偕者異而論也其何以佐理道陳嘉猷去徭戍而徼塞無虞減農征而財用不乏子所蘊積悉期指明問四方之人萃於選部六品以下實繁有司積資者豈盡獲吏能考言者或見遺敏行一日之鑒固不能周四方所稽亦慮未盡近自甸內達於海隅命官親人利病所屬欲使舉皆稱職吏必首公則輪轅適宜鰥寡受賜企聞體要一二言之問儒館設科以優華緒亦明勤學然後審官諸生或以紈綺之年講誦未暇在琢玉之或怠於製錦而如何儻稍舉章程以明課試因粲粲之質加孳孳之勤可以遠圖固為盡善但因循既久慮物議為難盍自言之將求折衷問左掖東朝載宏學斆貴游門子於是翔集法禁或弛藝實難徵推恩補員據闕升第或人疑張祿或詞假葛龔誠瑕不掩瑜豈仕優則學澄汰則衆心未允因仍則流弊寖深有司病諸幸喻其術問鄉賦國庠已有定制又闢兩館以延諸生蓋砥礪貴游而進之於學也二三子江夏童年頗聞岐嶷舞雩春服皆已鮮明雖異賓興亦稱講業於經書所好何句於古哲所慕何人兼陳從政之方用辨保家之美問莊生曰吾聞庖丁之言得養生焉蓋以其游刃無全善刀而藏之故也禦寇則曰養生如何肆之而已莊生曰嗜欲深者天機淺禦寇則以朝穆善理內而性交逸何二論背馳之甚耶夫一氣之暫聚為物之逆旅誠不當傷性沽名以耗純白儻昧者未通矯抗之說因遂耳目之勝甘心置力則如之何既學於斯佇有精辨問駢拇之言曰有虞氏招仁義以撓天下天下莫不奔命於仁義以易其性庸詎知不有性於仁義而不可易者耶以伯夷死名於首陽之下庸詎知伯夷非安於死而不可生耶徵濠上觀魚之樂則莊生非有虞與伯夷也又安知有虞伯夷之不然耶徵鳧鶴短長之脛又安知有虞與伯夷之性非不可斷不可續者耶雖欲齊同彼是先忤後合惡用謬悠卓詭如是之甚耶蓬心未達幸發吾覆問至人恬淡外其形骸使如死灰如木雞斯可矣至若蹈履水火而不燋沒雖以誠信庸至是乎斯所以有疑於呂梁丈人商邱開之說也蓋有以誠信安於死而不遷者未有以誠信蹈難而不必死者此何所謂其質言之問安時處順泊然懸解至人之心也故曰材全而德不形又口休影息迹與夫五漿先饋屨滿戶外者固不侔矣然則以紀渻之養雞痀僂之承蜩匠石之運斤梓慶之削鐻用志不分移於教化則萬物之相刃相靡者悠然而順暗然而和奚在於與無趾無眼之徒支離形德然後為得耶願聞其說問文子元虛師其言於老氏計然富利得其術者朱公疑傳記之或差何本末之相遠人分五位智辨居忠信之前體包五藏耳目乖肺肝之主皆何故耶當有其說至於積德積怨實昧其圖上義上仁願聆其旨大辨若訥大道甚夷豈在顛之倒之使學者泥而不通也
