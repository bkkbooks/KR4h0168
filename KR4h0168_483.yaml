front:
  text: 全唐文欽定全唐文卷四百八十三德輿字載之天水略陽人貞元時纍官禮部侍郎轉戶部元和五年拜禮部尚書同中書門下平章事罷為本官檢校吏部尚書留守東都封扶風郡公拜太常卿徙刑部尚書出鎮興元卒年六十贈左僕射諡曰文
  hash: sha256:e7090965d12af104a4843fd66a440c439d9b37784afa75b4512e0dd9b08c375e
  markers:
