front:
  text: 全唐文欽定全唐文卷九百六十五闕名六
  hash: sha256:6c174d4579ed2a0cbdbbac9cf097f667e414c6f4d0f3d8e89acb107bb20259d2
body:
  text: 官省則事省事省則人清官煩則事煩事煩則人濁清濁之由在官之煩省國家自天寶已後中原宿兵見在軍士可使者八十餘萬其餘浮為商販度為僧道雜人色役不歸農桑者又十有五六則是天下常以三分勞筋苦骨之人奉七分坐衣待食之輩今內外官給俸料者不下一萬餘員其間有職出異名奉離本局府寺曠廢簪組因循者甚衆況斂財日寡而授祿至多設官有限而入色無數九流安得不雜萬物安得不煩漢初置郡不過六十文景醲化百王莫先則官少不必政紊郡多不必事理今天下三百郡一千四百縣故有一邑之地虛設㣥司一鄉之甿徒分縣職所費至廣所制全輕伏請勅吏兵部侍郎郎中給事中中書舍人各一人錯綜利病詳定廢置吏員可併省者併省之州縣可併合者併合之每年入仕者可停減者停減之此則利廣而易求官少而易理稍減冗食足寬疲甿又國家舊章依品制俸官一品月俸三十千其餘職田祿米大約不過千石自一品以下多少可知艱難已來禁網漸弛於是增置使額厚請俸錢故大歷中權臣月俸有至九十貫者列郡刺史無大小給皆千貫常衮為相始立限約至李泌又量其閑劇隨事增加時謂通濟理難減削然猶有名存職廢額去俸存閑劇之間厚薄頓異將為永式須立常規比遠州縣官請量減四選五選六選請減一選七選八選九選各請減兩選十選十一選十二選各減三選伏以比遠處都七十五州選人試後懼不及限者即伏請注擬雖有此例每年不過一百餘人其比遠州縣皆是開元天寶中仁風樂土今者或以俸錢減少或以地在遠方凡是平流從前不注至若勸課耕種歸懷逃亡其所擇才急於近地有司若不注授所在唯聞假攝編甿益困田土益荒請減前件選祕書省等三十二司除疎理外見在食利本錢應見徵納及續舉放所收利錢准勅並充添修當司廨宇什物及令史驅使官厨料等用准元和九年十二月二十九日勅仍委御史臺勾當每至年終勘會處分其諸司疎理外見在本錢據額不得破用如有欠失即便勒主掌官典所繇等填陪者其諸司食利本錢疎理外合徵收者請改案額為元和十年新收置公廨本錢應緣添修廨宇什物及令史府史等厨並用勒本司據見在戶名錢數各置案歷三官通押逐委造帳印訖入案仍不得侵用本錢如人戶辦納本利錢縱都數未足亦勒據數與納召主別置案歷准前通押如至年終勘會欠少本利官典諸節級准法處分如主掌官典改移亦勒造帳交付承後官典具單帳報臺交割分明即給前官典牒知公驗如欠少本利送臺勘責具事由聞奏所冀官錢免至散失年額既定勾當有憑恩勅蠲放百姓兩稅及諸色逋懸等伏以聖慈憂軫疲氓屢蠲逋賦將行久遠實在均平有依倚權豪因循觀望忽逢恩貸全免征繇至於孤弱貧人里胥敦迫及期輸納不敢稽違曠蕩之恩翻不霑及亦有奸猾之輩僥倖為心時雨稍愆已生覬望競相誘扇因致逋懸若無綱條實恐滋弊自今後忽逢不稔或有恩蕩伏請每貫每石內分數放免輸納已畢者准數折免來年租稅則恩澤所加強弱普及人知分限自絕奸欺文武官五品以上請准式敘母妻邑號乖濫稍多或國疑敘軍功妄參勳籍或偶逢慶澤冒引詔條今請應在城諸軍衞官未至將軍使在外未至都知兵馬使押衙都虞候縱有散官與勅旨文相當者並不許敘封其流外官諸司諸吏職務并伎術等官跡涉雜類並請不在封限今年諸縣夏稅折納綾絹絁細絲帛丿糸等並請依本縣時價只定上中下等每匹加饒二百文帛丿糸每兩加饒十五文絲每兩加饒二十文其下等物不在納限小戶本錢不足任納絲帛丿糸斛斗須是本戶如非本戶輒合集買成匹段代納者所由決十五枷項令衆自秦漢以來天子之后稱皇后母稱皇太后祖母稱太皇太后加太字者所以加尊稱也國朝典禮皆稱舊制開元六年正月太常奏昭成皇太后諡號已牒禮部禮部以太字非之太常報曰入廟稱后義係於夫在朝稱太后義係於子並載在史策垂之不朽今百司文牒及奏狀參詳典故恐不合除太字如諡冊入陵神主入廟即當去之當臺食利本錢從貞元十一年至元和十一年息利十倍以上者二十五戶從貞元十六年至元和十一年息利七倍以上者一百五十六戶從貞元二十年至元和十一年息利四倍以上者一百六十八戶伏見去年京畿諸司本錢並條流甄免其東都未蒙該及者竊以淮寇未平供饋尚切人力小弊衣食屢空及納息利年深正身既沒子孫又盡移徵親族旁食無支族散徵諸保保人逃死或所繇代納縱有嫠老孤獨仰無所依立限踰年虛繫錢數公食屢闕人戶不堪伏乞天恩同京諸司例特甄減裁下字人之官從古所重遂許論薦冀得循良其或不依節文虛指事跡既開謬舉之路是長倖求之風望自今已後所舉人事迹與節文不同及簡勘無據并到官後不稱職及有負犯等事並請量輕重坐其舉主輕則削奪重則貶謫伏以前後勅文雖有條約比來銓覈多務因循今重申明所期畫一其舉人到省後所簡勘如與節文不同仰具事由並舉主名銜申中書門下如所司鹵莽便與判成察知事狀違越則所司舉主同坐謹按曾子問賤不誄貴幼不誄長禮也古者天子稱天以誄之皇后之諡則請於廟江都集禮引白虎通曰皇后何所諡之諡之於廟又曰皇后無外事無為於郊傳曰故雖天子必有尊也准禮賤不得誄貴子不得爵母所以必諡於廟者諡宜受成於宗廟故天子諡成於郊皇后諡成於廟今請准禮集百官連署諡狀訖讀於太廟然後上諡於兩儀殿既符故事允合禮經御史同制除官承前名字高下為班位先後為名在前身在外到却在舊人上後先有紊勞逸不均今請以上日為先後未上不得計月數西夷虺蜴攸居歷年貢賦不入有司羞之今則化被齊民便為善地其申光蔡等州今所貢鸂鶒綾生石斛等並同日到其諸道貢物舊例至今月十五日已進納訖臣今便欲取申光蔡貢物以元日陳於樂懸之南示中外禮畢請准式送納戶部度支鹽鐵三司錢物皆繫國用至於給納事合分明比來因循都不剖析歲終會司無以準繩蓋緣根本未有綱條所以名數易為盈縮伏請起自今以後每年終各令其本司每年正月一日至十二月三十日所入錢數及所用數分為兩狀入來年二月內聞奏併牒中書門下其錢如用不盡須具言用外餘若干見在如用盡及日侵用來年錢并收關並須一一具言其鹽鐵使所收議列具一年都收數并已支用及送到左藏庫欠錢數其所欠亦具監院額緣某事欠未送到戶部出納亦約此為例條制既定亦絕隱欠如可施行望為常典伏准今年閏正月十七日勅令百寮議錢貨輕重者今據㣥官楊於陵等議伏請天下兩稅榷鹽酒利等悉以布帛絲帛丿糸任土所產物充稅並不徵見錢則物漸重錢漸輕農人且免賤賣匹帛者伏以㣥臣所議事皆至當深刊公私請商量付度支據諸州府應徵兩稅供上都及留州留使舊額起元和十六年已後並改配端匹斤兩之物為稅額如大歷已前租庸課調不計錢令其折納使人知定制供辦有常仍約元和十五年徵納布帛等估價其舊納虛估物與依虛估物迴計如舊納實估物并見錢即於端匹斤兩上量加估價迴計變法在長其物價價長則永利公私初雖微有加饒法行即當就實比舊給用固利而不害仍作條件處置編入旨符其監鹽利酒利本以榷率計錢有殊兩稅之名不可除去錢額但舊額中有令納見錢者亦請令折納時估匹段上既不專以錢為稅人得以所產輸官錢貨必均其重輕隴畝自廣於蠶織便時惠下庶得其宜其土乏絲麻或地連邊塞風俗更異賦入不同亦請商量委所司裁酌隨便宜處置來年正月三日皇帝有事於南郊同日立春後丑祀風師按周禮大宗伯以槱燎祀風師鄭元云風箕星也故今禮立春後丑於城東北就箕星之位為壇祭之開元禮祀吴天上帝於圜丘百神咸秩箕星從祀之位在壇之第三等伏以皇帝有事南郊徧祭之義百神咸在其五方帝并日月神州以下緣對昊天上帝皇地祇尊不得申並為從祀悉無上公行事并御署祝版之儀風師既是星神厭降之儀便當陪祭如非遇郊祀其時祭祀如常儀將欲清風俗必在厚人倫竊見皇甫鎛權位盛時班行之中多所親附及得罪後議論立變憎嫉如讐俗之衰薄一至於此惟班肅以曾為郎官判度支案終始如一獨送出城周行之間多美其事今郡秩已罷望授一省官以表其行伏以太宗平突厥高宗平高麗皆告陵廟蓋以高祖嘗蓄憤於北虜太宗亦銳氣於東夷武功未終後聖繼志亦既平盪所宜啟告伏以鎮冀一道弔伐再加幽薊八州兵戎數起陛下仁聖臨御皆使自効忠誠不勞干戈盡復區宇祖宗宿憤霧廓烟消兵力所致功實相萬豈必獻俘函首方告清廟詩曰維天之命太平告文王也考之經典義亦相符望下禮官撰儀擇日薦告太廟以彰陛下纘服之業上慰聖靈准制諸道年終勾帳宜依承前勅例如聞近日刺史留州數內妄有減削非理破使者委觀察使聞風按舉必重加科貶以誡削減者其諸州府仍請各委錄事參軍每年據留州定額錢物數破使去處及支使外餘剩見在錢物各具色目分明造帳依格限申比部准常限每限五月三十日都結奏旨下之後更送戶部若違限及隱漏不申錄事參軍及本判官並牒吏部使闕謹按肅宗代宗故事與吐番會盟并不告廟惟德宗建中末與吐番會盟於延平門欲重其誠信特令告廟至貞元三年會於平涼亦無告廟之文伏以事出一時又非經制求之典禮亦無其文今謹參詳恐不合告應十惡及殺人鬬毆官典犯贓并詐偽訴良劫盜竊盜及府縣推斷訖重論訴人等皆是姦惡之徒推鞫之時盡皆伏罪臨刑之次即又稱寃或冀有動搖或貴延日月每度稱屈皆須重推遂使知證平人嘗被追擾經涉時歲獄具無期一姦人自犯刑章數十家因緣破散若無懲革為弊實深伏請自今已後有此色賊臺及府縣并外州縣但通計二度推官不同人皆有伏款及經三度斷結者更有論訴一切不在重推問限其中縱有進狀勅下如是已經三度結斷者亦請受勅處聞奏執論庶得公務肅清姦源杜絕如是告本推官典受賄賂推斷不平及有寃濫事狀言訖便可立驗者即請與重推如所告及稱寃推勘又虛妄及依前無理者除本犯是死刑外餘罪於本條更加一等科罪如官典取受有實者亦請於本罪更加一等如有寃屈不虛者其第三度推官典伏請本法外更加一等貶責其第二度官典亦請節級科處冀使下無冤人上無濫法諸司要官密戚周親見任府縣官伏以所立隄防正緣權要今諸卿監保傳三少詹事祭酒王傳西班將校等亦無威力敢冒典章一概防閑事誠太過自今已後應宰臣及左右僕射御史大夫中丞給事舍人左右丞諸司尚書侍郎度支鹽鐵使在京城者并諸王駙馬朞周以上親并女婿親外甥請准廣德二年三月十一日及貞元二年二月十三日勅不得任京兆府判司次赤及畿令長安萬年丞簿尉其餘一切並不在此限冀典法易遵㣥情大愜謹按周禮天子七廟三昭三穆與太祖之廟而七荀卿子曰有天下者祭七代有一國者祭五代則知天子上祭七廟典籍通規祖功宗德不在其數國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷高祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王其下三昭三穆之外是親盡之祖雖有功德禮合祧遷禘祫之歲則從合食伏以堯舜之政二典存焉君臣之間都俞之旨罔不備載厥後雖代有史官多出於追書所以其事或紀其言蓋畧太宗文皇帝躬勤庶政朝多良臣論思獻替動可紀錄故能遠繼堯舜煥乎其文章國朝舊制每正衙奏事史官載筆於玉階之下所有議論政事悉得聞之及永徽以後仗下便退宰臣謀議外莫得聞長壽二年宰相姚璹以為帝王謨訓不可闕於紀述史官疎遠無因得書請自今已後所論軍國政要委宰相一人撰錄號為時政紀此事久廢史官不復得聞惟寫誥詞記除授而已臣等常竊憤悱大懼皇猷未有以光揚於天下伏望天恩許臣等每坐日所有謀議事關政事者便日撰錄號為聖政紀書紀緘封至歲末則付史官永為常式庶得睿謀所載如日月高懸聖政惟新與天地廣運臣等不勝大願伏以吏部每年集人及定留放至於注擬皆約闕員近者入仕歲增申闕日少實由諸道州府所奏悉行致令選司士子無闕貧乏者凍餒滋甚留滯者喧訴益繁至有待選十餘年裹糧千餘里累駁之後方敢望官注擬之時別遇勅授私惠行於外府怨謗歸於有司特望明立節文令自今已後諸司諸使天下州府選限內不得奏六品已下官伏以景陵光陵以來諸司諸使所差補押當及雜職掌等官皆據舊例合得減選其中有無選可減者便放非時選吏曹緣是承優放選例多判成有過格年深身名踰濫赴常選不得者多求減選職掌圖得非時集因緣優勅成此倖門其吏曹為弊頗甚今請應差前資官充職掌並不得取選數已過格人庶絕奸冒今年二月十三日應赴御樓陪位宗子前資見任及常選未出身宗子據狀共三千二百八十九人前件陪位宗子等准赦書節文仍據始封每王後與一人出身委宗正卿詳圖譜取一房最沉翳者充數具名聞奏者伏以所赴陪位宗子緣遇參選時遠方臻集并京畿之內人數至多若據赦書節文所放全少始封王後只有四十八房今請條流從長慶元年四年寶歷元年三度遇恩並未霑及者伏請准寶歷元年正月七日赦書節文每戶下放一人出身其從寶歷元年已前三度受恩已曾放出身檢勘三代名同者並不在此限伏冀沉翳適霑恩澤遠房孤弱盡獲出身山陵挽郎准光陵合補二百二十人伏以近者仕進多門身名轉濫苟循往例為弊滋深取前宏文崇文館生及已考滿太廟齋郎充如人數不足兼取前明經充其中有未過者請放冬集仍減兩選已定各集者減二選敬宗廟祝文皇帝稱孝弟臣審詳孝字載考禮文義本主於子孫理難施於兄弟按禮記卜虞之文子孫曰哀兄弟曰某然則虞之稱哀與祭之稱孝其義一也於祖禰則理宜稱孝於伯仲則止於稱名又東晉溫嶠議宗廟祝辭以為非子者不得稱旁親直言敢告當時朝儀咸以為宜今臣上考禮經無兄弟稱孝之據下徵晉史有不稱旁親之文臣謂饗敬宗廟宜去孝弟兩字古有當祭告喪義在申情同體過時及哭於理稍乖禮院所請合輟朝者若以聞喪之來日請依餘約太常所奏別具品列輕重進定謹按儀制令百官正一品官喪皇帝不視朝一日又准官品令自一品至三品以上薨歿通有輟朝之制伏以君臣之間情理所及事必繫於委遇官則與時重輕一用舊儀或乖中道臣等參酌其留守節察防禦經畧等使及京輔刺史並請各據所兼憲官為例諸道應奏州縣官銜散試官及無出身人幕府遷授致仕官諸京司奏流外諸道進奏官等兩畿及諸道奏長馬縣令錄事參軍簿尉等兩京及諸道州府六品已下官除初授外並合是吏部注擬近日優勞資蔭入仕轉多每年選集無闕可授若容濫請是啟倖門遂使平人不無受屈今請並停淮山南三川硤內及諸道比遠雖吏部注擬不情願赴任者及元不注擬者其縣令參軍長吏倚賴義不容私如有才術優長假攝勞效特許前資見任及有出身人中奏請每道不得過三五人如諸道縣令錄事參軍政事異能決疑及緝理殘破若須旌賞者許所在奏論然須指事而言在選限內亦請准寶歷二年十二月七日勅處分京諸司流外官並每年繫部闕員今並不許奏請致仕酌法循舊頗越典章自今請自常參官五品以外官及四品者許致仕餘停又幕府遷授章服貞元元和之間使府奏職至侍御史然後兼省官至於章服皆獎時效人思勤勉克已慕名近日奏殿中及戎卒便請朱紫數事俱行其中著綠腰金皆非典故請自侍御史後年月足後便始與省官至於朱紫許於本使府有事跡尤異為衆所知者然許奏請唯副使行軍奏職時如先著綠便許著緋餘不在此限又諸道進奏官舊例皆不奏正官近既奏請仍於別道占請有俸祿處頗乖典制今量請奏當道官如資歷已至五品考滿日已前者望許至考滿日應禮部諸色貢舉人及吏部諸色科目選人等凡未有出身未有官如有文學只合於禮部應舉有出身有官合於吏部赴科目選近年以來格文差互多有白身及用散試官並稱鄉貢者並赴科目選及注擬之時即妄論資次曾無格例有司不知所守其宏詞拔萃學究一經則有定制然亦請不在用散試官限其三禮三傳一史三史明習律令等如白身並令國子監及州府同明經進士薦送如考試及第明習律令同明經一史三禮三傳同進士三史當年關送吏部便授第二任官如有出身及有正員官本是吏部常選人則任於吏部不限選數應科目選三史則超一資授官如制舉人既諸色人中皆得選試則無出身官人並可以請不用散試官伏以陛下勤求治本澄清化源不以靈芝白鴈為瑞應方將時安人和為嘉祥宸翰昭宣睿情斯屬伏請自今已後祥瑞俱申有司更不令進獻尚食局新舊本錢總九百八十貫文伏以尚食貧虛更無羨餘添給伏乞聖慈更賜添本錢二千貫文許臣別條流方圓諸色改換收利支用庶得不失公事
