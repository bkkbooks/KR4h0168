front:
  text: 全唐文欽定全唐文卷九百六十九闕名十
  hash: sha256:c02fa5d285c6e2a84702ccecfc63f43a5416ec33da2b8ce9232686569269e5a9
body:
  text: 東漢受命伯升豫其始謀西周尚親叔虞荷其封邑故皇兄存凋零霜露綿歷歲時恩莫逮於陟岡禮方宏於事日皇姪故雍州節度使友寧故容州節度使友倫頃因締構俱習韜鈐並以戰功歿於王事永言帶礪合議封崇伏見北齊文士魏收著後魏書於時自魏太武之初至於北齊書不獲就乃大徵百官家傳刊總斟酌隨條甄舉搜訪遺亡數年之間勒為一代典籍編在北史固非虛言臣今請明下制敕內外百官及前資士子帝戚勳家並各納家傳具述父祖事行源流及才術德業灼然可考者並纂述送史館如記得前朝會昌已後公私亦任抄録送官皆須直書不用文藻兼以兵火之後簡牘罕存應內外臣寮曾有奏行公事關涉制置或討論沿革或章疏文詞有可採者並許編録送納候史館修撰之日考其所上公事與中書門下文案事相符會或格言正辭詢訪不謬者並與編載所冀忠臣名士共流家國之耿光孝子順孫獲記祖先之丕烈而且周德見乎殷紀舜典存乎禹功非惟十世可知庶成一朝大典臣叨庸委任獲領監修將贖素餐輒干元覽河南諸方鎮節度刺史昭洗之後未有新官每上表章只書姓名未頒渙汗必負憂疑望宣付各降制命以表新恩本朝法書自朱溫僭逆刪改事條或重貨財輕入人命或自徇枉過濫加刑罰今見在三司收貯刑書並是偽廷刪改者兼偽廷先下諸道追取本朝法書焚毀或經兵火所遺皆無舊本節目只定州敕庫有本朝法書具在請敕定州節度使速寫副本進納庶刑法令式並合本朝舊制每日常朝百官皆拜獨兩省官不拜準本朝故事朝退於廊下賜食謂之廊餐百官遂有謝食拜惟兩省官本省有厨不赴廊餐故不拜伏自僖宗幸蜀回以多事之後遂廢廊餐百官拜儀至今未改將四十載禮恐難停惟兩省官獨尚不拜豈可終日趨朝曾不一拜獨於班列有所異同若言官是近臣於禮尤宜肅敬起今後逐日常朝宣不坐除職事官押班不拜外其兩省官與東西兩班並齊拜準本朝故事加封建諸王內命婦及宰相翰林學士中書舍人諸道節度觀察團練防禦留後郎中書帖官告索綾紙票軸下所司書寫印署畢進入宣賜其文武兩班並諸道官員及奏薦將校敕下後並合是本道進奏院或本官自於所司送納朱膠綾紙價錢各請出給伏自偽庭皆隳本朝事例每降文字下中書不分別重輕便令官給告示遂致所司公事全失規程自今後如非前件事例並請官中不給告示其內司大官並侍衛及賞軍功將校轉官即不在此限所冀受宣賜者倍榮恩渥非事例者不敢希求一則致顯辨尊卑一則免無名費耗糾轄之任時謂外臺宰字之官古稱列爵如非朝命是廢國章近日諸道多是各列官銜便指州縣請朝廷之正授樹藩鎮之私恩頗亂規程宜加條制自今後大鎮節度使管三州已上者每年許奏管內官三人如管三州已下者許奏管內官二人仍須有課績尤異方得上聞若止於簡慎無瑕徵科及限是守常道只得書考旌善不得特有薦奏其防禦使每年只許奏一人並無尤異不得奏薦刺史無奏薦之例不得輒亂規程更有將資官員請他處除授謂之橫薦最亂格文其已前事件如敢違所司不得輒與通進若奏下中書亦不在施行之例賞善罰惡致理之源選材任能為政之本所在刺史縣令有政績尤異為衆所知或招復戶口能增加賦稅者或辨雪寃獄能活人生命者及去害物之積弊立利人之新規有益於州縣為衆所推者即仰本處逐件分明開奏不得輒加緣飾以為浮詞據事狀不虛則加獎激以勸能吏如在任貪猥誅剝生靈公事不治為政怠惰具事節聞奏勘核不虛當加譴罰以戒慢官其州縣官任三考滿即具闕申送吏部格式候敕除銓注本道不得擅差攝官輒替正授者新除諸道節度觀察防禦經略等使刺史縣令及諸道幕府兼諸司帶憲銜兼官合納光臺錢謹具本朝元納及後減落錢數如後兼御史大夫元納三十貫減落外今納一十五貫兼御史中丞元納二十貫減落外今納一十貫文兼侍御史元納八貫三百減落外今納五貫一百五十文兼殿中侍御史元納一十一貫三百減落外今納五貫六百五十文兼監察御史元納一十三貫三百減落外今納六貫六百五十文以前臺司準本朝例及減落外後徵前數分析如前應有諸道節度觀察使刺史經略防禦等使及諸道幕府上佐官并諸司班行新授兼官者並合送納前件光臺憲禦禮錢今欲準例勒辭謝驅使官申報牒兵部勒告身案除準宜取外準例須候送納光臺禮錢了朱鈔到方可給付轉帖諸道進奏及知後院等準從前事件申報催徵無致有隳舊規準本朝故事州府官員府置司録參軍外有功倉戶法兵事六曹州有録事參軍亦置六曹縣置令丞主簿各一員尉三員分判公事自後除兩京外都督府及州置戶法二員餘四員並省縣置令主簿各一員丞尉並省者伏以今年除本分合格選人外有有郊禋行事人數絶多伏見州官事簡掾曹請依舊兩員縣局務繁佐官請添一員其間有尉無簿者請添置主簿一員其赤畿次畿並請準此除兩京外其判司只置司戶司法兩員諸道節度防禦刺史各著功名並全忠孝洎蒙升獎皆荷渥恩雖萌為治之心未展分憂之效况聞藩府不可以久虛侯伯不可以久闕藩府虛則兵不輯侯伯闕則化不行繇此觀之為務甚急請令歸本任不奉詔旨不得輒離治所準本朝故事當司六察合行職事條例如後吏察應吏部行內南北兩曹磨勘選人合具駁放判成人具名銜報分察使及三銓應鎖注官後具前銜後擬報分察使典簡如有踰濫即察使舉追本行令使推勘兵察應兵部司公事一一合報察使戶察應戶部司諸州戶帳貢物出給蠲符具事件合報察使刑察應刑部司法律赦書德音流貶量移斷罪重輕合報察使禮察應禮部補轉鑄印諸祠祭料法物合報察使工察應工部司工役等合報察使伏以御史臺六員監察謂之分察使察訪綱舉動靜必行但緣曠廢久不施行今欲重行條貫凡有進狀乞官及諸州府初奏請判官薦舉前資自詣中書求官等竊聞所稱頭銜多有踰越中書既無舊案除授何以為憑起今後凡有諸色前資若命官者除近曾任朝官及有科第外清資官為衆所知並須追到前任告敕中書點檢後方進擬貴絶虛授以杜僥求吏部三銓門下省南曹廢置甲庫格式流外部銓等司公事並繁長定格循資格十道圖等前件格文本朝創立簡制姦濫倫敘官資頗謂精詳久同遵守自亂離之後巧偽滋多兼同光元年八月車駕在東京權判南曹工部員外郎盧重本司起請一卷蓋以興復之始務切懷來凡有條流多失根本以至冬集起選人並南郊行事官及陪位宗子共一千三百餘人銓曹檢勘之時互相援引去留之際不絶爭論若有依違必長訛濫望差權判尚書省銓左丞崔沂吏部侍郎崔貽孫給事中鄭韜光李光序吏部員外郎盧損等同詳定舊長定格循資格十道圖務令簡要可久施行偽廷之時諸藩參佐皆從除授自今後諸道除節度副使兩使判官除授外其餘職員並諸州軍事判官各任本處奏辟其軍事判官仍不在奏官之限所冀招延之禮皆合於前規簡辟之間無聞於濫舉獻可效忠前經之令典因時建議有國之明規道既務於化成事亦敷於競勸敢裨宸聽輒罄芻言伏惟陛下業茂經綸功成理定五材七德威冠於伐謀百氏三墳義彰於知教爰自中興啓運下武膺期照臨而日月光華鼓舞而乾坤交泰英明取士睿哲崇儒誠宜便廣於搜羅豈可尚令於淹抑但以今春貢士就試不多即目選人磨勘未畢宗伯莫臻於俊乂天官難辨於妍媸况已過秋期將行公事側聞道路悉是家貧比及到京多踰程限文闈選部皆礙條流伏請權停貢舉一年俟遷鶯者更勵進修希干祿者益加循省然後精求良幹博採異能免其遺賢庶同樂聖伏準禮喪三年不祭惟祭天地社稷為越紼行事此古制也爰自漢文益尊神器徇至公絶私之義行以日易月之制事久相沿禮從順變今園陵已畢祥練既除宗廟不可以乏饗神祇不可以廢祀宜遵禮意式展孝思伏請自貞簡太后升祔禮畢應宗廟使樂及㣥祀並準舊施行按本朝舊儀自一品至三品婚禮得服衮冕劍佩衣九章今皇太子興聖官使繼岌雖未封建官是檢校太尉合準一品婚禮施行其準禮婦人從夫之爵亦準一品命婦至行親迎之日太常鹵簿鼓吹前導乘輅車其花叉九枝博鬢褕翟衣九等其日平明皇帝差官告親廟一室宗正卿攝婚主行禮其夕親迎興聖宮使乘輅車鹵簿鼓吹前導至女氏之門以結綵車御輪交車近并魏州為東京簡諸道州縣須先定兩府始可各定官品未審依故事京兆河南為兩府太原興唐為次府天復以興王之地別有進止敕不惟府額各定於等差兼亦都名須正於升降將為經久之制宜遵固本之文本朝故事雍州為西京京兆府雒州為東都河南府是謂京都兩府并州舊為北都太原府在兩府之次近以中興大業以魏州為東京興唐府權謂東京為雒京竊以雒京歷代帝王之都四方朝貢所便爰自漢魏迄於隋唐方建都城是比辰極宜依舊以雒京為東都魏州改為鄴都興唐府與北京太原府並為次府豈獨設官分職命秩免惑於有司抑亦畫界分疆取則無違於故事當司準流內銓牒應請定冬集舉人內有前鄉貢童子者三銓已前團奏冬集皆署前鄉貢童子伏準格文只有童子科此無鄉貢字銓司先為請定冬集舉人九經張仲宣等內有前鄉貢明經童子成光誨遂檢尋六典及蘇冕會要又無本朝書子細檢討惟有十三年閏十二月敕諸道應薦萬言及童子起今後不得更有聞薦據此童子兩字皆由諸道表薦固無鄉貢之名又無口議帖經亦不合有明經之字進則止於暗誦便號神童此外格文別無童子其成光誨銓司準格只收署前童子團奏去二月十五日具狀申留司宰臣取裁奏例準申者伏緣三銓見團奏冬集右內有鄉貢及明經字已依成光誨例準格只署童子團奏次諸左伏以院司常年考試皆憑諸道表薦降敕下到當司準格考試及格者便放及第其同光二年童子郭忠恕等九人皆是表薦童子敕內并納到家狀並有鄉貢兩字院司檢勘同便榜示引試及第後先具白關牒報吏部南曹續便團奏者關奏狀下到中書省追當司元下納家狀檢點同覆奏放敕經過諸處敕下後方始到當司備録黃關牒報御史臺尚書省并吏部南曹今準流內銓牒伏緣院司承前皆憑敕命施行童子敕內並有鄉貢兩字若使下落恐涉專擅者案故事中書門下翰林學士在朝文武百官內諸司使供奉官已下從成服三日每日赴長壽宮朝臨自後不臨其服以日易月三十日除至小祥合釋服每至月朔月望小祥大祥釋服日未除服者縗服臨已除服者則素服不臨並赴長壽宮先拜靈訖移班近東進名奉慰又奏準故事文武前資官及六品已下未升朝官并士庶等各於本家素服一臨禁衛諸軍使已下各於本軍廳事素服一臨僧尼道士各於本寺觀一臨內外命婦各於本家素服朝臨三日諸道節度觀察防禦團練刺史及寮佐等聞哀後當日成服三日改慘十三日除右補闕楊途先奏毀廢京內南北城臣檢到同光二年八月二十七日河南尹張全義奏臣自僖宗朝叨蒙委寄節制雒京臨涖之初須置城壘臣乃取南市曹界分兼展一兩坊地修築兩城以立府衙廨署今區宇一平理合毀廢其城濠如一時平治即計功不少百姓忙時難為差使今欲且平女墻及甕門餘候農隙別取進止者奉敕京都之內古無郡城本朝多事以來諸侯握兵自保張全義土功斯毀李罕之塞地猶存時既朗清故宜除剗若差夫役又恐擾人宜令河南府先分劈出舊日街巷其城濠許人占射平填便任蓋造屋宇其城基內舊有巷道處便為巷道不得因循妄有侵占仍請限一月如無力平剗許有力人戶占射平填偽蜀官員先有赦旨黜降近者員數極多相次到闕並是未承前敕慮抱憂疑宜令御史臺具所到官員出身歷任三代家狀約偽官品秩準前敕次第當擬同正官奏復如是偽蜀將相家屬稍多即於山東州府安置如位卑家屬少者或是本朝舊人有骨肉見在班行即任便居止或是三川居人願還本土亦俟三兩日放歸本處或有本朝曾登科第歷任班行材器為衆所知可以甄録即續具人才酌量奏擬
