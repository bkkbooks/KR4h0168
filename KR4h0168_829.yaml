front:
  text: 全唐文欽定全唐文卷八百二十九蕘官給事中中書舍人
  hash: sha256:17707a0da4604b0618692dc0523cb9fd2f98a72d4c73fc3ba8cdd68531f0089b
  markers:
  - {type: head, offset: 14, content: 顏蕘, id: KR4h0168_NFKB_829-h1, level: 1}
body:
  text: 顏公姓薛氏字茂聖少工為五言詩天賦其才逈超名輩蕘同年文人故許州節度使尚書薛公字大拙以文人不言其名擅詩名於天下無所與讓唯於顏公許待優異每吟其警句常曰吾不喜顏為僧嘉有詩僧為吾枝派以增薛氏之榮耳性端靜寡合而價譽自彰名公巨人爭識其面余景福間為尚書郎故相國陸希聲為給事中一日謂余曰顏公自荊門惠然訪我興盡而去無以贈其行請於知交賦送別余亦勉為應命而莫之披覩也後數載余罷自合江沿浹流而下至荊之日方遂疑闕閲其篇章虻其儀相然後知師之盛名不虛得也向之送別者自故太傅相國韋政公而下凡四十三首余亦別為一卷陸相公為序余繼忝清華薦兼史任宜以師之名字書於文苑傳中緝編未遑漏略是懼今且掇師之序於詩集之前其五言七字詩凡四百篇以為儒釋之光余與師周旋殆將十稔始仰師為詩家之傑今與師為方外之期契分知心言之無愧若師本教之行自為其徒所宗則非愚儒之所敢知也光化三年孟夏序詷光化時人夫仁明至儉之君返淳覆邪懲嗜欲玩好俾奇侈捐隱異貢燬烈而不能致純玉而不用者蓋宗廟之彞器在貞達和順之全德也故和氏三刖而不死崑岡縱焚而不夷俾受瑞者於今稱其美焉然則稱其美固亦久矣而知其美之名者將在於何焉夫惟詩書秦人焚之既燼益活抑可對於是而又大矣則今之人稱詩之美者亦久矣闕一字旨也將在於何焉洎乎得其綱組序而明之則二南隱微之旨行於世為百家宗旨者在乎序也詷讀左邱明傳素王微旨則知懲勸之道教化之本周孔之標度盡在於詩矣顧詩之言惡可容易而語乎釋門高德顏公尚為詩不入聲相得失哀樂怨歡直以清寂景搆成數百篇其音清以和其氣剛以達妙出無象虛涵不為冷然若懸未扣而響信其功之妙也不可得而稱矣信其旨之深也不可舉而言矣嗚呼河漢蕩蕩而東人見其浮重載矣不知其所以浮者何也雅頌郁郁而南人見其化夷俗矣不知其所以化者何也吾師復不拔於彼植於此其所以者何也詷常搜文獵儒乘邱索穴睹師之作異而序之不足舉師之美為後人宗旨也嶽吉州廬陵人十舉進士不第江西鍾傳辟為從事光化中議以蒲帛徵之不果卒聖人之道以春秋而顯聖人之文以春秋而高聖人之文以春秋而微聖人之旨以春秋而奧入室之徒既無演釋故後之學者多失其實是致三家之傳並行於後俱立學官焉噫絶筆之後歷戰國之艱梗經暴秦之焚蕩大漢初興未暇崇儒術至武帝方設制策延天下英雋有董仲舒應讖記而通春秋仲舒所業惟公羊傳仲舒既歿則有劉向父子向受業穀梁歆業左氏左氏之道假歆而振自斯學者愈茂欲存左氏而廢公穀則西漢鴻儒向歆欲存公穀而廢左氏則邱明與聖人同代是以皆各專一傳夫經者本根也傳者枝葉也本根正則枝葉固正矣本根非則枝葉曷附焉矧公羊穀梁第直釋經義而已無他蔓延苟經義是則傳文亦從而是矣經義非則傳文亦從而非矣左氏釋經義之外復廣記當時之事備文當時之辭與二傳不類或謂邱明受經於仲尼豈其然歟苟親受之經則當橫經請問研究深微間不容髮安得時有謬誤致二傳往往出其表邪蓋業左氏者以二傳為證以斯為證謂與聖人同時接其聞見可也謂其親受之經則非矣聞不如見見不如受邱明得非見歟公羊穀梁得非聞歟故左氏多長穀梁多短然同異之理十之六七也鄭元何休賈逵服虔范杜元凱皆深於春秋者也而不簸粳蕩秕芟稂抒莠掇其精實附於麟經第各釀其短互鬬其長是非千種惑亂微旨其弊由各執一家之學學左氏者則訾公穀學公穀者則詆左氏乃有膏肓廢疾墨守之辨設焉謂之膏肓廢疾者則莫不彌留矣亡一可砭以藥石者也謂之墨守則莫不堅徑矣亡一可攻以利者也明啓龍德時人昔秦始皇蠶食諸侯夷滅六國乃命將軍蒙恬開拓泥陽北地以縣陽周是為寧郡理所三十六郡之一也粵以南屬新平北連安化密邇藩落咫尺塞垣復以襟帶乎神州保障其疆宇故以底寧而命州之名焉自歷代莫不慎選英奇文武兼資之才牧守茲郡今也隴西司空牛公名知業字子英秀稟嶽靈氣涵天表先朝一舊奕葉承光申勤劬於昧爽之間竭匡輔於紹開之際博文經武寇河內復可見于漢年尚德代謀平荊州不獨稱於晉世孝弟性符於天爵忠貞道冠於人臣固已敦詩書説禮樂親仁樂善好古慕今虛席待賢輕財重義公之先太師威公佐命元勳宣力王室表儀雄傑駕馭忠良靖難扶傾決勝於百餘戰內變家為國推功於四十年間凡統制劇郡雄鎮精師鋭旅積勳纍業不可具陳蓋已載於青史列傳矣我司空公素稟父風早師家範挺耿介不㣥之志有匡扶盡瘁之勞朝廷紀宣孟之勳裕茲垂後初授司空公房州剌史尋之郡所布六條之政治千乘之賦草上之風自偃車後之雨旋隨而是州多有淫祠土風祀以徼福咸費産殫用亟具酒食娑抃相聚奔走若狂廢彼農功求於鬼道公患之悉命焚之惟列於祀典者廟貌如故自爾方易其妖弊之俗其編戶亦頗多譽公之明鑒遠識矣故使其愛之如父母畏之如雷霆方歡來暮之歌遽有去思之戀公以河朔之煙塵未靖征鎮之金鼓方殷乃自表上聞請從軍展效將選行日欲赴河壖於是耆艾鯢鮐率其父子兄弟詣襄陽本府請奏舉留公陳乞往來繞路旁午比離郡之日諸里寓髦雋及官吏僧道耆老至百姓攀臥擁軾匍匐相與殆千百人使蕃於前僅六十里或呼或立且止且行公敦諭慰勉之數四將暝方散其士民懷之留惜有如是矣於是經皇闕躬面天顏聖上俯讚至公嘉乎丕績錫之珍玩奇品不可紀載爾喻以魚水之道委諸心膂之師尋授右羽統軍躬擐甲胄身先士卒莫不名高八校義冠六師去歲以寧州前政江司空為岐涇乘間伺隙犒軍內寇烽爟交舉斥堠馳奔境鄙虔劉民斯俶擾俄而失其守禦旋至淪胥此州既為攻陷上以疇咨可康僉諧亮采乃命公帥本軍分總柄戍西征收復至則戎憝專據凶悍方熾反為深壁欲老我師公所統禁衛之精驍皆中堅之良族丹兕文駟鶴列魚麗燧象雞跳貙擲貘久養勇於投石拔拒自迎前於破竹拉枯得莒嫠度紡之程有堇父斷布之徇於是殷輪親鼓摩壘凌牆拔燕幟於瞬息之間復齊壁於誰何之際比及克下而居人蕩空遺堵窽墟巋然在目公於是自右羽林統軍金紫光祿大夫檢校司空授寧州牧守視事之日止水在庭問俗之辰露冕按部布德行慶授方任能去奢即儉自邇柔遠義以懷之忠以告之令以濟之威以董之綏之斯來動之斯和分條共貫革故鼎新事曷僶俯理務振提求之而必究短長盡瘁而匪懈夙夜惸嫠覃惠貧窶復蘇勵廉隅而不讓還珠殖生聚而相斆佩犢循善胥勸姦宄屏迹無鞠之元慷慨而欣戴二天相郭之人倚賴而勞門五日附如羶蟻漸以相勼咸連臂而興歌喜息肩以有所此州之公署廨宇郵亭自建州之始迄今載祀遠矣本悉在交牆之西中阜之上比年以來飛縱燎煨燼之末繼加毀折至是略盡殄闕一字無遺者矣心匠神贊宏規間起濬發奇制見惟獨明於是爰度隙地剃彼荒榛畫斯子牆方必中矩負艮山之八次坎水之一遂乃備板幹具畚鍤定之方中火亦未見興役於三農之隙賦徒無二事之讟悅以使之寬以濟之恩惠洽而士乃同心力役均而民無倦色量功命日不愆於素浹月之間崇墉俄就嶷如斷壑亘若長雲闉堞矗聯睥睨相屬干櫓重沓楯槊森羅百雉既周九拒可掎平岡已迤固即之而固護金湯斷㮙延緣豈假之於依憑郢漢新子州之南埤建門臺之高觀為鳴鼙吹角之所鬱然特起以面修衢丹雘赫奕粉素皎晶是謂山有木工則度之次下馬門次中衙戟門大廳小廳內廳寢堂中堂暖堂皆棟梁宏麗柱礎丁當廊廡四周階圯重復戶牖簷霤掩映亦不在乎山節藻梲刻桷丹楹矧乃棼楣副密軒檻縈回窮思於解飛取謀於梓慶鈲槻孕妙歌闕一字呈能曲直從繩袤丈必中美哉煥焉自餘廣既庫曹署軍事院州院牙將孔目諸院馬將鞠場教旗講武馳驛之傳舍兵食之儲廪皆新所創置焉然後疏彼康莊高其閎閈右列廠墨闠賈區貿貨於日中平分井居堵闕一字周環於宇下四民各敬其本百工用肄其業既富既庶矣苟完苟美矣衛文公之治本國孰可比方皇甫嵩之蒞并州正應如此今公之創修是州也本無廡下之金悉解橐中之素計是用家財之費盈於巨萬金矣今不復列其緡鏹之數具在別計闕一字詩云樂只君子邦家之基又曰顯允君子宜民宜人子曰善人為邦可以勝殘去殺矣是知名邦大國無其人則曷能序三才崇五教奉六氣制七情移風易俗阜財解慍與然則君子居之何陋之有斯郡比以厥俗淳質厥民朴略寡桑柘之惟黂枲紡綜以資衣裳若夫允濟九功皆可歌乎厚生利用光全七德遂溥洽乎和衆安民加以雨順風調年豐道泰此即我司空憂民及物之所應矣百姓皆曰愷悌君子民之父母明啓奄中鄙士闕里諸生謬沭奬知退慚菲薄遽承指命便輒搜研詎能敷盛美之形容適足致揶揄之闕一字誚務歸托實情鄙虛華聊備刊記用垂永久潏官京兆尹出為宣歙觀察使氓巢虐池之二年潏自平原郡得此郡其始至也無屋宇城壁之事無市井人物之類瓦骼凹亞相甃雜視一之月檢訪鄉籍二之月完聚瘡痍三四月後病者起亡者歸瓦者投骼者掩明年春夏熟冬熟其歸者起者有風雨之備而江盜未息天租無寄故郡人有廨宇城壁之請既城壁焉則人得以避寇既廨署焉則物得以營帑鼓角器械廳堂簷廡自濠塹周於四隅其間合建置者一無所闕木端鐵橫分別出入於戲自永泰至乾符戊戌歲是城也以李僕射為祖自乾符至於中和癸卯歲是城也潏不敢讓勞其基趾始末存韓剌史裴晉公語中鑾輿幸蜀之四年冬是年王師始克宮闕記玢官溧水縣令兼監察御史古今神仙舉世知之然飛騰隱化俗稀可覩先賢有言曰人間得仙之人且十不聞其一況史書不載神仙之事故多不傳於世詳其史意以君臣父子理亂忠孝之道激勵終古也若敦尚虛無自然之迹則人無所拘制矣史記言三神山在海中仙人居金銀宮闕不死之藥生其上人有欲近山者則風引船而去終莫能到斯亦激勵拘制之意也大哉神仙之事靈異罕測述云初之修也守一鍊氣拘謹法度孜孜辛勤恐失於纎微及其成也千變萬化混迹人間或藏山林或遊城市其飛升者多往海上諸山積功已高便為仙官卑者猶為仙民何者十洲間動有仙家數十萬耕植芝田課計頃畝如種稻焉是有仙官分理仙民及人間仙凡也其隱化者如蟬蛻留皮換骨保氣固形於巖洞然後飛升成於真仙信非虛矣玢生而慕道常愧積習自幼及長遊歷宦途周遊寰宇凡接高尚所説或覽傳記兼復聞見皆銘於心而書於牘又以國史不書事散於野矧當中和兵火之後墳籍猶闕詎有秉筆紀而述作者處世斯久人漸稀傳惜哉他時寂無遺聲今故編録其事分為三卷冀資好事君子學道之人談柄用顯真仙者哉朝請郎前行溧水縣令兼監察御史賜緋魚袋沈玢撰詠官澤州録事參軍堂陽縣者王趙古封清漳大邑厥貢惟上其民實繁山川超絶於水經物産闐駢於地志覽高海岸過田光春雪之言會出河魴動張翰秋風之思為貨泉之藪澤乃煙月之津梁者焉其東亭也地壓上流名居勝境傍依古堞下瞰平原羅物象於簷楹簇江山於左右一川風景隨朝暮以長新四面煙花逐炎涼而各異至若春草碧春波清雲乍合雨初晴風揚柳花汀鷺起棹穿荷葉浦魚驚此景也桃源金谷謬得其名又若秋蓼紅秋水緑菡萏香鳬鷗浴陌上人歌隴首詞月中漁唱江南曲此時也青草洞庭比之不足故得蘭臺俊彥蓬島神仙或因稅駕之飲競縱臨川之賞乃有扶風員外悉皆留題粉壁著詠雕梁隋珠與趙璧相鮮鳳竹共鸞絲迭奏回鏘詞律妙盡精華乃文苑之儀刑實翰林之圭臬詠竊窺宗伯強述荒蕪何異對烏兔而耀螢光見珠璣而衒魚目孰知不可安忍無言輒憑藤角之花少紀蘭臺之事白沙製序徒向慕於古人淥水裁詩竟有虧於先哲遽成一絶以厠㣥英者矣天祐初春月日戊寅謹序恕韶州始興人官刑部郎中伏以革故從新方恢於聖運赦過宥罪繼洽於君恩故澤布九天無所不及慶流萬國無所不周伏惟皇帝義布幽明化均動植改秦隋之覆轍繼周漢之昌圖上簡帝心蕩蕩方臻於壽域下符民欲熙熙將返於淳風彌寬含垢之情遐廣推恩之道臣伏見去年閏十一月二十九日赦書節文應偽廷貶降官未量移者與復資責授官亦與復資應徒流收管人並放還者又覩今年八月二十五日德音節文應自創業已來降黜者並與放還枯鱗再泳朽木重芳是知宏貸之朝大舉哀矜之典所有偽廷貶降官等雖經量移盡思歸復每望雲天之澤嘗懸省責之心特冀聖慈更加念恤未敢希復序資品且乞令放還鄉閭所冀表明代之好生遂小人之懷土臣叨司刑典獲奉赦條願回解網之仁用廣垂衣之化昌序昭宗時人夫大聖示其不滅證以無生燃慧炬以燭幽泛慈航而拯溺在三千界開八萬門誘捨愛河勸離苦海香山月殿長侍晬容鷲嶺龍宮時聞半偈與消塵劫令出昏衢按後魏志阿育王役使鬼神於閻浮提造八萬四千塔華夏之中有五秦國岐山得其一焉又按神州三寶通録華夏有塔一十九所岐陽聖迹復載其中朝觀光相夕覩聖燈究異草之西來驗靈迹之所止供盈香積罏馥旃檀面太白而千謺雲屏枕清渭而一條翠帶又文皇遷寢殿而修花塔冀拔㣥迷天后闢明堂而俟真身庶康萬彙編於史册傳以古今粵自有周洎乎大漢至於晉魏爰及齊梁隋文則誓志焚修我唐則纍朝回向莫不歸依聖教恭敬真宗募善行於阿育王結慈緣於金龍子嘉徵迭變靈應無窮或元鶴飛翔不離於紺宇或卿雲搖曳靡捨於金繩分舍利於五十三州增福田於千萬億祀間生芝草頻現雨花真形試火而火不焚因其吳主寶塔居水而水不近彰自薊門禮懺者沉痼自痊瞻虔者宿殃皆滅金仙入夢白馬戒塗傳經既自於西天演法俄流於東土今則天演稟異帝裔承榮立鴻勳於多難之秋彰盛烈於阽危之際遍數歷代曾無兩人增美儲闈傳芳玉牒將中興於十九葉纂大業於三百年竭力邦家推誠君父身先萬旅屢掃欃槍血戰中原兩收宮闕故得諸侯景仰八表風隨朝萬國而無慙伯禹叶五星而不讓高皇惡殺好生泣辜罪已天復元年施相輪塔心橖柱方一條天復十二年以舊寺主寶真大師賜紫沙門中闕大師繞塔修覆階舍二十八間至十三年迄契至誠果諧元感迅雷驟起大雨中闕吹沙涌出寶階化成金像移山拔海未足稱奇聖力神功咸驚不測天復十四年中闕及塑四十二尊賢聖菩薩及畫西天二十闕祖兼題傳法記及諸功德皆彩繪中闕內外塑畫功德八龍王天復十九年至二十年蓋造護藍牆舍四百餘間及甃塔庭兩廊中闕天復十九年二十年四月八日遣功德使特進守左衛上將軍上柱國隴西縣開國伯食邑七百戶李繼潛僧録中闕首座普勝大師賜紫沙門寡辭宣奉絲言敷傳聖懇兩件施梵夾金剛經一百卷蓋自王奉教精勤躬親繕葺不墜祇園之教普傳貝葉之文塔前俵施十方僧衆受持兼香油蠟燭相繼路歧至天復二十年庚辰至壬午歲修塔上層緑琉璃甎瓦窮工極麗盡妙罄能斧斤不輟於斯須繩墨無虧於分寸法雲廣布佛日高懸不殊兜率天中靡異菩提樹下悟其寶相了彼真空金像巍峩福護於鳳鳴之境神光煜爚照臨於鶉首之郊必使玉歷長新瑤圖永煥紹高祖太宗之丕搆邁三皇五帝之宏猷王子天孫光承運祚大君聖后罔墜花香修寺主安遠大師賜紫沙門紹恩戒行圓明精持堅確稟先師之遺訓成大國之良因放鶴掌中降龍座下護珠內潔世垢莫侵虔奉宸嚴遐裨勝果希傳永永爰刻磷磷昌序藝愧彩毫詞非黃絹謬承睿旨俾抒斯文殊匪研精難逃荒鄙天佑十九年歲次壬午二月壬子朔二十六日丁丑記偓字致光京兆萬年人第進士佐河中幕府召拜左拾遺纍遷左諫議大夫宰相崔允判度支表以自副入翰林為學士遷中書舍人從昭宗幸鳳翔遷兵部侍郎進承旨朱全忠惡之貶濮州司馬再貶榮懿尉徙鄧州司馬挈其族南依王審知卒瞥見紅蕉魂隨魄消陰火與朱華共映神霞將日腳相燒謝家之麗句難窮多烘繭紙洛浦之下裳頻換剩染鮫綃鶴頂儘侔雞冠詎擬蘭受露以殊忝楓經霜而莫比趙合德裙間一點願同白玉唾壺鄧夫人額上微殷卻賴水晶如意森森山雙山雙脈脈亭亭舊玉之瑳來若指彤雲之剪出如屏鶯舌無端妒天桃而未咽猩脣易染嬲浮蟻以難醒在物無雙於情可溺橫波映紅臉之艷含貝發朱脣之色僧虔密炬爍桂棟以難藏潘嶽金釭蔽繡幃而不隔大凡人之麗者必動物物之尤者必移人不言而信其速如神所以月彩下蠙珠之水梅酸生鶴嗉之津寧關巧運自合天真有影先知無聲已認體疏而意密迹遠而情近天穿地巧幾人語絶色難逢萬古千秋唯我眷紅英不盡色配中央心傾太陽布葉近臨於玉砌移根遠自於銅梁草口咢緑華未遇楊羲冠簪駊騀杜蘭香喜逢張碩巾帔飄揚銀漢之星機欲曙金臺之漏箭初長動人妖艷馥鼻生香千里鵠雛濫得名於太液三秋菊蘂虛長價於柴桑向日微困迎風欲翔周昉神疲吮筆而深慙思拙江淹色沮擘箋而所恨才荒蝶翅堪憎蜂鬚可妒幾多之金粉遭竊一點之檀心被污何須逼視漢夫人之鴛寢多羞不待含情晉天子之羊車自駐激電寒暄跳丸烏兔得不淹留深勞顧慕懊恨張京兆唯將桂葉添眉悵望齊東昏卻把蓮花襯步騷人易老絶色多愁曷忍在綺窗側畔唯當居繡戶前頭目斷猶駐魂消未收映葉而似擎歌扇偎欄而若墮妝樓感荀粲之殷勤誓無緘著怨謝鯤之強暴未近風流清旦鶯啼黃昏客散鶴頸兮長引猿腸兮屢斷攀條立處林烏應笑於後棲欹枕看時梁燕或聞於長歎已而已而唯有醉眠於叢畔貽範處喪未數月遽使視事傷孝子心今中書事一相可辦陛下誠惜貽範才俟變縗而召可也何必使出峩冠廟堂入泣血柩側毀瘠則廢務勤恪則忘哀此非人情可處也東內之變敕使誰非同惡處之當在正旦今已失其時矣臣見陛下詔書云自劉季述等四家之外其餘一無所問夫人主所重莫大於信既下此詔則守之宜堅若復戮一人則人人懼死矣然後來所去者已為不少此其所以忷忷不安也陛下不若擇其尤無良者數人明示其罪置之於法然後撫論其餘曰吾恐爾曹謂吾心有所貯自今無可疑矣乃擇其忠厚者使為之長其徒有善則奬之有罪則懲之咸自安矣今此曹在公私者以萬數豈可盡誅邪夫帝王之道當以重厚鎮之公正御之至於瑣細機巧此機生則彼機應以終不能成大功所謂理絲而棼之者也況今朝廷之權散在四方苟能先收此權則事無不可為者矣臣才不邁㣥器非拔俗待價既殊於櫝玉窮經有愧於籝金遭遇清時涵濡睿澤峩冠振珮已塵象闕之班舐筆和鉛更入金門之召擊鉢謝楗纂組非工撫已循涯以榮為懼遐思宮體未敢稱庾信工文卻誚玉臺何必倩徐陵作序粗得捧心之態幸無折齒之慚柳巷青樓未嘗粳粃金閨繡戶始預風流咀五色之靈芝香生九竅咽三危之瑞露春動七情如有責其不經亦望以功掩過昨日奉示及不任悚荷偓以風毒腳氣發動今日亦不任入謁彼此抱病切徒詠思出得且以面相為意幸甚幸甚謹狀八月二日偓狀某所聞甚不恆勿惜示及偓今日衰迫情地旦夕難勝況又孤侄已下兼與小男等四處分散中夜往往驚呌便達曉號咽衰邁之年不自堪忍計申令聞此寃慟必賜軫念不更滯留亦望眷私委曲見為仰托小版計日夕相見諸郎君學問當進自此分飛未知何日復遂相見言及此黯然久之珍重珍重謹狀偓狀特惠粉藥無非濟安不任佩荷之至楊氏方寫了竟未勘畢既承切要徐送何故又忽急徵此方也本欲來拜謁見取藥方或慮無暇接客以俟別日香粉合復并裹半祙復并元朴楊子方復子伏奉撫偓熱躁甚曲不成字此信偓狀蛇藥神效已顯驗紫微不小悉兒必達中喜蛇垂不濟入口便拔特謝謹疏乞不容易與人必恐所言詮處切切托托不是惡心肚蓋名方神藥自古皆禁妄傳縮水法亦乞不泄見有人相尤竟未見他非試驗不敢發大道無事且下訪何太疏徐所不會吝十二日偓狀悶甚欲略出人馬若間伏願一借若可允遂稍早令來免衝甚熱苟或有幸他使亦乞在賜斯處謹狀草一偓狀燈下狀曲不成字旬日前所咨啓乞一書與建州為右司李郎中經過希稍延接況承舍人亦與正郎舊知聞必切於施分今晚有的的人去若可踐言速乞封示幸甚幸甚偓雖承建州八座眷私自是旅客難於托人伏惟照察偓狀十月十五日偓狀楊學士兄弟來此消梨子兩日前已尋得花時伏望拴拔謹狀十四日偓狀今日若不他出可以略借人馬否先冀到宅兼別行一兩處人事脫或有所拘牽即乞不垂形迹以俟後期伏惟照察謹狀六月草七日早偓狀前者三賢采戲共輸弟羅吾弟主辦偓偶先擲五隻深覺巋然幸有輸右省長行三儇輒欲助成一味適舍人傳語來使今謹送上所以在前狀中不言今特修此伏惟照察謹狀念六日偓狀乏楮甚小簡甚欲拜侍且是怕惱亂此會不知何時定為之眷私借及女使衣服不任悚荷來早令入州人馬必希踐言泉州書謹封納書中亦説皆咨托必望周而述之幸甚謹狀九日偓狀憂眷借及米二碩不任濟荷鈍拙無謀惟撓知與不勝愧赧之至即冀拜謁它冀面述謹狀念二日偓狀嵩字降神長溪人登乾符二年進士除祕書省正字值黃巢之亂遂東歸觀察使李晦辟為團練巡檢官轉度支使後除毛詩博士官至金州剌史山舊無寺乾符間僧師待始築居於此乃圖其秀拔三十三峰遊太姥者東南入自金峰庵東入自石龍庵即謺石庵又山外小徑自北折而東亦入自石龍庵西入自國興寺寺西有塔北入自玉湖庵庵之東為圓潭庵國興寺東有巖洞奇石萬狀曰玉笋芽籤曰九鯉朝天曰石樓樓下有隱泉曰觀音洞曰仙童玉女曰半雲洞曰一線天石壁夾一小徑如委石石罅中天光漏而入僅容一人行長可半里躡登而上路中曰牛背石石下曰萬丈崖崖上為望仙橋橋西曰白龍潭有龍伏焉雷轟電掣之時洞中韸韸如鼓聲天旱禱雨輒應潭之西曰曝龍石峯上曰白雲寺又上曰摩尼宮室後有頂天石石有巨人迹二可長二尺此摩霄頂太姥山顛也山高風寒夏月猶挾纊山木無過四尺者石皆皸瘃秋霽望遠可盡四五百里雖浙水亦在目中已下闕乾符六年記顏子聖聲與日月而不盡黔婁貧譽等江河而共存於戲先貧俱足亦顏黔之流而能於詩惜哉不雍容金馬門踧踖宣尼戶乾符七年閩城殞賊悲夫先生名朴字見素生於釣臺而長於甌閩與李建州頻方處士干為詩友一篇一詠膾炙人口鸑鷟屈軼祥瑞皇家迂僻而貧聾瞽不重高傲縱逸林觀宇宙視富貴如浮雲蔑圭璋如草芥惟山僧釣叟相與往還蓬門蘆戶不庇風雨稔不粳歉不變晏如也詩人張為嘗貽先生詩曰到處只閉戶逢君便展眉閩之廉問楊公發李公誨中朝重德羽翼詞人奇君之詩召而不往或曰達寮憐才而子避之何也先生曰二公憐才吾固不往苟或見之以吾之貧恐以攝假之牒見黦耳亦接輿於陵未能加也松蟠鶴翅泥曳龜尾一邱一壑寬於天地先生為詩思遲盈月方得一聯一句得必驚人未暇全篇已布人口有僧樓浩高人也與先生善捃拾先生遺文得詩一百首中和二年冬十月攜來訪余且驚且喜余欲先生之文與方干齊集畢遂為之序小子以詞賦博挂投文非所業但直舉其美文靦作者曙吏部侍郎褧子大順中進士官右補闕宋玉九辨曰悼余生之不時也甲辰竄身巴南避許潰師郡剌史甚歡接春一日登郡東樓下臨巴江饌酒簇樂以相為娛言間有馬處士末至善擊甌者請即清宴爰騁妙絶處士審音以知聲余審樂以知化斯可以抑揚淫放頓挫匏竹運動節奏出鬼入神太守請余賦之余曰不圖為樂之至於斯酒酣舐筆乃為賦云器之為質兮白而貞水之為性兮柔而清水投器而有象器藉水而成聲始因心而度曲俄應手以徵情莫不敲蕭熠爚撇捩縱橫胡不自匏絲而起胡不從金石而生孰謂節奏樂我生平何彼穠矣高樓燕喜叩寂含商窮元咀徵拂綺井以連騫送楓汀之靡迤巖隈有雪彪咻而雕虎揚睛潭上無風捷獵而金蚪跋尾目運心語波回浪旋似欲奮而還駐若將窮而復連得不似驚沙呌鴈高柳鳴蟬董雙成青璅鸞飢啄開珠網穆天子紅韁馬解踏破瓊田眙衡盱神清調古既嗟歎之不足諒悲哀以為主誓不向單于臺畔和塞葉胡笳定不入宋玉筵中隨齊竽楚舞疾徐奮袂曲折縈組潺湲下隴底之泉嗚咽上涔陽之櫓鶯隔溪而對語一浦花紅猿裊樹以哀吟千山月午斯皆從有入無妙動元樞灔颭則水心雲母丁當則杖杪真珠於是發春卉駭靈姝羞殺兮鈿箏金鐸愁聞兮鬼嘯神呼時也曲闋酒闌煙迷霧隔覽故步以躑躅有餘聲而滴瀝臨流而欲去依依轉首而相看脈脈太守曰遘止良辰好樂還淳諷賦已勞於進牘謳歌為序其芳塵余乃歌曰江風起兮江樓春千里萬里兮愁殺人樓前芳草兮關山道江上孤帆兮楊柳津是何況我兮擊拊眷我兮殷勤回首而漁翁鼓枻凝眸而思婦霑巾夫當筵一曲人生一世何紛糅乎是非顧何慕乎隆替飄纓宜入醉鄉來自識天人之際損唐末宰相犀有異角其名通天外徑挺以孤聳內清明而自全匪刻匪雕既含章而無隱如追如琢亦通理於未然當其遠徵搜備琛賮得自烏鳶之野斷以龍泉之刃瑟兮素理如線之狀既呈灼爾清光似玉之形方潤豐下鋭上勢圓質峻儻成象以表奇必駭雞而取信明徵以驗分剸是資美勝截肪之日珍逾剖蚌之時素光的的而中貫元彩規規而外滋良玉無瑕既呈奇而異矣白圭有玷將配美兮遠而故其分堅貞比金石光通上下色潤膏澤透掌而纎粟必分窺天而秋毫不隔況本精粹蓄絪縕依稀象物皎潔成文或似雙魚映緑水而鬐鬛皆見偶成孤鶴翔碧霄而羽翮斯分則知變態不恆衆美難越契人情之用矣豈天意之貽厥故能貞而不變明而不昏粲奇文之炯炯暢美質之溫溫則貝有文兮不必為異羲列卦兮何足而論究其所然徵其所自雖常情難得之貨蓋造物偶然之意何異夫筆誤點而狀蠅蟲食葉而成字若然者則文犀之美故不足為瑰異善夷唐末官尚書伍相公員也廟在澧江之渚自為寇之擾為兵火所焚為野火所燎為風雨所壞為江浪所侵垂二十年向為墟矣雖有鍾山蔣侯之驗其神亦無所依止澧守欲重建廟宇里人曰不可員楚之仇也鞭我死君其過也甚又曰員孝於父者其廟廢之則無以旌其孝建之則無以勸其忠太守不決一日問余愚曰太守不知伍員非不忠於君者楚平王非員之君也書曰普天之下莫非王土率土之濱莫非王臣楚之君即非天子也當平王之時君上乃周景王也楚子實天子之臣員即楚之陪臣吳楚之君乃五等封以其國迫近蠻夷地雖廣不得為侯伯而為子男故仲尼修春秋吳越楚雖大而不稱王止稱吳子越子楚子而已王乃彼之自僭則欺天欺天則安得其下不逆夫覆載之內天子為君上固不可異二諸侯賜弓矢然後征賜斧鉞然後殺楚之諸子觀兵滅國無代無之子胥周之臣也君在上不欺天者忠也復父仇者孝也忠孝既備安得無馨香之祀乎春秋僖公四年齊桓公合諸侯之師盟于召陵責楚之苞茅不入問昭王南征而不復楚子使屈完對曰貢之不入寡君之罪也敢不供給昭王南征之不復君其問諸水濱按昭王南征至漢舟人膠其舟王遂溺死夫山林川澤天子祀之必有其神楚人膠其船而禍其君神不能福神之罪也余過漢見其波濤滉漾而責其水辭曰漢之廣兮風波四起雖有風波不如蹄涔之水蹄涔之水不為下國而傾天子漢之深兮其隄莫量不如行潦之汪行潦之汪不為下國而溺天王漢之美者曰魴吾雖飢不食其魴恐污吾之飢腸
