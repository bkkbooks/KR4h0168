front:
  text: 全唐文欽定全唐文卷六百九十九李德裕四
  hash: sha256:3c6de10115e26e33b3518100647c02d9b2914e14ed09e3062d9ca79416815c2e
body:
  text: 敕重順卿代傳忠孝志在功名朕每用注心豈忘終食况卿先父當太和之際已有誠款思靖鄰封臣節昭彰遐邇稱嘆澤潞一軍素聞忠順從前命帥皆是儒臣穆宗以劉悟有歸闕之功委之心膂令居善地鎮靖一方及殂謝之時不能堅守臣節遂使三軍上請以幼子總戎其時朝廷因循姑務安靖授以旄金戊事蓋從權今從諫疾恙所侵頗聞綿惙昨士林奏至大將及下復請劉稹權知軍務朕深惜劉悟一門自夫逸懷以來纍代忠節今劉稹又欲自擅隳其門風當撤瑟之辰罔聞憂戚嘗藥之際更窺兵權尤為臣子所當共棄卿宜訓練戎旅嚴固封疆候彼軍中有變便須遣書告諭令其三軍送劉稹歸闕請朝廷推新擇帥朕必遣舊德重望委之撫循劉稹厚加爵賞別有任用如妄自制置邀求寵榮國家典法亦難寬宥澤潞一鎮與卿事體不同勿為子孫之謀欲存輔車之勢但能顯立功效自然福及後昆勉務良圖副茲委遇高秩厚祿無所丨吝焉卿智略挺生忠誠特著每陳章奏皆契朕心言念壯猷無忘寤寐今緣從諫疾病頗以沉綿深慮將校異謀妄有制置太原地連河朔城府空虛已詔劉沔旋師却歸本鎮又緣回鶻餘燼未滅塞上須有防虞藉卿長才列於禦侮邊境戎事悉以副卿宜深體朕懷勉宏方略控馭朔塞為我長城當使早殄餘妖永清絶漠副茲委遇以保功名敕古者涼風至白露下天子乃命將厲兵以征不義申令誓衆今則其時况蓐收司刑助天而肅殺金星動色應節而耀芒咨爾帥臣為豫之佑得不敬順天道振揚兵威近有詔書令取七月中旬五道齊進王元逵久蓄忠憤為國除殘率兵先諸軍深入其險阻拔宣務要害之壘絶堯山應援之兵既以厄咽必當破膽而卿不務疾雷先奮欲以歲月勝彼凡為將帥誰不樂此豈祭遵之安重致欒伯之遷延且不副於詔書以後期於成德若未可深入亦要先聲宜早進軍速臨賊境樹立城柵羅列旌旗深溝高壘勿與之戰兼擇猛將時出奇鋒令彼一方疲於奔命如此足分賊勢益壯東師昔趙充國征羌漢宣帝詔曰太白出高用兵深入敢戰者吉卿宜思古名將早立奇功無執狐疑之心勉務鷹揚之舉國之大事賞罰必行當體朕懷勿稽詔命想宜知悉卿纍當大任實總元戎既行節制之師須務綏懷之德養威持重屬在於卿至於負羽先登搴旗深入本非將帥之事當假拳勇之材况自古出師皆有副二臨難則權以相濟料敵則智以相資故韓信伐趙張耳為二吳漢征蜀劉尚副軍國朝以來多用此制李績之取平壤參以道宗李靖之襲陰山副之公謹近者劉沔全師北伐按甲雲州委石雄先鋒大破回鶻朕以石雄近摧醜虜已著威名久在徐州諳練士卒今輟自天德與卿副領諸軍卿宜選徐州陳許精兵三千人便令先入勵其猛氣必立奇功倘能挫覆妖巢亦自勳歸元帥勉以率下深務協心體朕至懷以圖丕績敕石雄古者有必勝之將無必勝之人欲立奇功實在謀帥朕所以求鷙鶚於纍百得飛將於無雙總率諸軍以臨賊境况卿受尺一之詔初無辦嚴盤丈八之矛果能蕩寇眷言勳績深注余懷近聞從諫時百姓相驚云卿以七千兵至數告於衆魄兆於人今天策向晨已及成軍之候龍驤建斾必叶渡江之謠舊史昭然冥符可驗加以天道在乎西北順歲有功福星煥乎龍庭為國大慶勉宏方略契此休徵昔鍾會以二十萬兵頓於劒閣鄧艾才一萬衆直抵城都只在決機豈由衆寡知卿能辦故諭此懷然聞卿每自履軍常先士卒既為輕敵未足耀奇朕借卿一舉之功以定必擒之計至於小陳不可自行魏武帝嘗戒夏侯妙才曰為將當有怯時不可但恃勇也當以勇為本行之以智計但無知任勇一匹夫敵耳張遼單身入昌狶家魏武責曰此非大將法今卿為萬人之帥啓十乘之行舉必貴謀動資持重報國在於平賊不在輕身為將本於坐籌寧勞陷陳卿宜以朕之戒嘗自書紳務建功名副茲委遇緣卿二年在外城府久虛今殘虜未平南北皆有戎事欲令卿却歸本鎮應接兩隅行營諸軍未知所付聞王逢頗有武用卿所素知今已追赴太原欲令充本道行營都知兵馬使又緣例偏裨日近官秩尚卑指揮諸軍未即宜稱今緣石雄王宰皆欲進兵得卿一軍齊入足分賊勢卿宜審自籌度歸本鎮後在朝及側近武臣誰人堪付行營兵事宜密狀具一兩人進來如卿離行營後兵力事勢深入未得亦須審具事實聞奏不要隱情今取決於卿切在審詳訪聞近日賊中轉更窮蹙自相殺戮人心不安即日軍權多在郭誼因此誘動必應事機李丕是郭誼親密尤合相信卿宜暫追赴使令與郭誼書諭以利害遣其自圖劉稹早務歸降倘效誠必重酬賞卿宜面看李丕手疏兼令便自封題分付王逢遣密作計召軍人百姓送入澤潞其書草卿宜封進材幹筋革出自江淮除進奉之外並敕令所禁蓋以有國之制固須立防朝廷法度理當畫一卿國之懿戚時之信臣方進徑兵坐清殘孽誠宜假以利器壯軍威朕之於卿固無愛惜但以河朔數鎮事體應同若一度賜卿必轉相援例恩信不一非撫御之遠圖賜與頻繁隳朝廷之舊制卿是朕之心腹必合樂守憲章故示至懷想當知悉省所奏劉稹令賈㣥齎李恬書與卿將兵屬同赴闕庭兼請歸葬東都事宜具悉比者河朔諸鎮惟淄青變詐最多劉悟隨來舊將皆習見此事察其情偽深要精詳蓋緣四面王師克寸期闕八字石雄王宰已據天井卿當道又得石會既失重關之嶮將弋在穴之妖鎮衛徑兵皆臨境上城孤援絶情計已窮所以密將詞歸命上相恐是偷安旬月潰緩王師稍得自完復來侵軼况饋運日有所費春作漸已及時勞我師徒恐非至計卿與其要約令面縛來降卿即馳至界首親自受納苟不如此且須進軍必不得因此遷延令其得計仍不得先受章表便與奏聞今賜與劉稹書白想宜知悉省所奏差張公輔入澤州潞州亦粗得賊中軍情若許招誘乞賜詔命事宜具悉劉稹喪父之初已拒朝命旋又焚爇晉絳廬舍侵逼萬善孤軍罪惡貫盈言詞甚悖自卿全師壓境頻挫其勢尋得天井重關下臨高平危壁邇來頗自知懼方獻偽詞然天奪其心鬼迷其志宋人已病不告析骸之情朱鮪乞降曾無面縛之效尚聞張皇叛卒覬望鴻恩不戢㣥凶徒云繼襲想卿忠憤必志梟夷况自去年以來闕頻奄畢今又福星煥耀正臨天駟東漢書云畢為天網網羅不善之人房為明堂方集重華之慶懸象昭晰前史所書朕奉天道以行誅守祖宗之成法顧茲小寇終不貸刑亦知晏實是卿之愛弟將申大義在抑私懷豈無鴒原固慎名器今料其初通信使必謂卿且駐軍想彼叛徒猶希洗雪乘此討襲必有奇功韓信襲歷下之軍李靖剪陰山之寇皆因敵心懈弛故得機討不遺想卿久習兵符備詳虜態便須覆其巢穴不可更有招擕劉稹縱有表章請自面縛不得便自報答亦須奏聞當務遠圖勿拘小信速宜攻討以副朕懷想宜知悉昨以李石文吏不可自赴行營令在太原應接戎事緣親兵在外城府空虛楊辨糾合征師衆才一旅追逐主帥擅領兵權尋詔近地行營量抽兵馬便令剪撲計日梟夷緣鎮州地接土門最為便近已詔元逵出師五千人為向南諸軍聲援顧茲小寇未足勞卿大軍緣何清朝下河水官健曾經楊辨將領久與亂軍同處恐其自思家屬因此搖心宜速與卿本道都頭密意動靜與清朝計會掎角相應如萬一清朝官健禁戢不定抽歸太原已令把絶鴈門遏其歸路卿便須出軍掩襲勿遣漏失凶徒每事與清朝商量務從權便應機在速不更待奏聞敕自古出師莫重謀帥李廣臨塞威動殊鄰吳漢理軍陰如敵國舉茲制勝方見成功往者羯胡亂華伊洛未靖光弼以上勛元宰移守盟津即知急病救艱因事為重以卿近破狂虜已著英名河內當賊咽喉為吾雄屏爰求威望將以撫寧昔漢光武謂寇恂曰潁川迫近京師當以時定惟念卿獨能平之從九卿復出憂國可知也卿勿以纍換雄藩輕此寄任策勛之日遷擢必殊詔到便宜擇精兵二千人自領赴鎮直抵萬善震耀威聲壯忠武一作捕鹿犄角之形分常蛇首尾之勢今屬水潦將至農事已興偃武息人固難淹久勉宏方略副朕誠懷將帥大略前史備書保境者以守險自固進攻者以過險必克寸制其死命務須批亢今賊在網羅只守巢穴廣立虛柵多設疑兵蓋謂自防豈暇侵軼且欲偷安歲月以老王師卿分兵相守果中姦計况卿已得天井尋扼咽喉遊刃其間更何顧慮聞天井前後寨柵二十餘所以備奔衝如此費兵固須寡力料賊四面設備兵數可知卿進大軍便須拒捍何暇更於諸路敢軼封疆以近事明之足可為據昨者榆社兵馬盡赴太原自沁至儀五百餘里賊已却得石會其間細路至多數旬無備竟不馳突卿以此揣度可見其情又諸軍都頭各守一寨遷延避寇苟務過時卿若更廣詢謀取其自便必恐撓卿思慮難見成功卿宜密度事機自為心計其賊路逼近州縣及當卿腹背受敵之處即須留兵防守用備寇虞其他抽隨大軍併力攻討如此則出其不意必覆妖巢國家無徵發之勞計司減饋運之費足得制勝豈在濟師又聞每度出兵傷夷不少待其瘡痛皆復不免戰鬬闕人今為卿方圓無所愛惜其陳沒官健如無子弟便別擇少壯者充替其亡歿家糧賜亦許不停其傷夷校重有妨役使者亦任擇人充替其傷夷者仍不停糧非惟感勵士心亦冀漸完兵力卿宜以此宣示各使聞知故令中使專往看卿處置須待事了方得遣回謹按集有賜石雄詔意與此篇略同於姦計下云聞冀氏翼城寨柵有一十八所以備奔衝自此以後又同宰詔于各使聞知下云又聞將士有苟避兵鋒全不得力者卿宜便令守寨不要將行其彥佐隨使衙隊自大將至晏設及工巧之徒除卿先令歸本道外聞在者尤多卿既領節旄自有土地並宜曉諭發遣不要更留仍具人數奏聞雖卿善於撫衆皆自樂從然亦在割情不令撓事故令中使專往看卿處置卿須待了方得遣回比緣暑熱未退固難進軍想卿至誠豈安終食今清商已至鼙鼓聲雄白露將凝戈鋋氣肅擊隼應節而逾勵代馬嘶風而自豪順天行誅正在今日近者天井冀氏頻有交鋒蓋緣卿等當軍未抵邢州莫分賊勢併有精卒得以奔衝今四面王師一十萬鎮魏兩軍自當其半屯集在境已及歲期雖罰罪除殘誠無所吝然人生膏血杼軸其空朕既為父母豈有坐延歲月想卿忠憤固不懷安况卿當道頃為盧從史劉從諫所敗與澤潞素是深讐卿之騎兵海內精徑將虔劉殘憤士有鬬心宜乘此機豈可玩寇想詔到之後速抵邢州但得綴其精兵不令併力西向朕當詔王宰石雄齊心攻討破此殘寇決在今秋故令中使往諭朕意想卿勿更疑惑副茲朕懷謹按何宏敬詔中改未抵邢州為未過漳河况字以下改為卿奉親之孝朕所深知想陟岵有懷循陔思養違離周歲固切歸心當早決機豈宜玩寇近頻捉得賊界生口及收得投降人等每知賊中精卒數亦無多只是應急旋抽併當一面破其此計實在共攻緣王宰即過乾河便抵澤州城下恐賊併取山東兵馬抗拒南面王師卿宣詔到日便須深入綴其精卒不遣東西旬月免有救兵王宰必能成事如因此犄角便克澤州則卿之功勛更高王宰朕每念陳兵原野又屬炎熱由此孽童致茲暴陵然獫狁孔亟周宣興六月之師淮夷未寧公且有三年之役事非獲已諒匪勞人卿當深體朕懷早圖戡剪上薦功於宗廟下息患於生靈則卿之子孫永受休祿朕之酬賞必極寵榮布告三軍咸令知悉近者寇孽初平海內無事方欲永櫜弓矢保乂生人國遠開邊誠非朕志然盛衰倚伏皆有其時古人云聖人無巧時變是守蓋惜其時也昔漢武帝命將出師輕齎深入耗中國三十餘年竟不得臣伏胸奴蕩定沙漠此未得其時也至宣帝值胸奴百年之運因壞亂危亡之機單于稽首三代稱藩鋒燧不設邊城晏開此遭遇其時也近則回鶻常以兵助中國有戡難之功朝廷纍降姻親歲致繒絮因我為緣振服諸蕃百有餘年最為強盛及本國衰亂種落流離景附北邊猶為傑鷔因其入塞暫舉偏師遂大破穹廬却收公主歸降甚衆梟戮至多一國銷亡易於拉朽豈非得其時也今吐蕃未立贊普已是三年將相猜擕自相攻擊緣邊兵馬頗已抽歸想其城鎮皆空守備多闕倘彼鬬戰未定自有黨讐一國之中疑懼相半則備邊城守固有異心計卿軍鎮必有舊人諳練邊事深入窺探來往是常易知隱伏之情足見存亡之兆宜精意選練務得其人切須識見精專誠信可保資以財帛俾其陰通自隴山天寧關北至蕭關原州安樂州烏蘭橋等皆是賊之險路入寇要津各要知兵馬多少何人主領如兵數寡少人心動搖乘此危機必易為計多設反間密用奇謀使自歸心豈勞兵力觀釁而動取若拾遺此兵法所謂不戰而屈人之兵善之善也國家河西隴右四鎮一十八州皆是吐蕃因中國有難相繼陷沒今當其破滅之勢正是倚伏之期取亂侮亡聖人遠略斯乃以直報怨非是不守和盟想卿精忠必達此旨故令劉濛專往親諭朕懷卿宜選練師徒多蓄軍食使器甲犀利烽火精明尺籍伍符盡無虛數務修實效勿顯事機制置之間尤須密靜詔書有所不盡皆已指示使臣勉建良圖副茲委遇卿頃蒞澤州頗彰惠政彼之黎庶自合有情申以恩威正在今日卿宜大布誠信且務綏懷不得焚其室廬剪其桑梓自當壺漿塞路襁負而歸兼招取丁壯三五千人不要分給器械每至填壠攻壘皆遣先驅料澤州城內非其父兄即其子弟必合自相愛惜豈願交接兵鋒兼宜遣使逼其軍城再三號令若能捨逆效順速自歸降非但生全仍加優賞克城之後不犯秋毫如堅守危巢坐待撲滅必當不存噍類務極兵威料其聞此先聲皆自感勵勉於方略副朕深懷敕楊辨起於卒伍獲在偏裨方屬徂征敢為桀逆追逐戎帥嘯聚叛徒朕姑務苟安未加顯戮舍其悖亂令赴行營遂駐南轅之軒已盜北門之管戰備符璽並而竊之啓石會重關潛輸逆稹釋賈㣥縲絏俾遠姦謀惑榆社之義心召橫水之同惡蠆毒近發於懷袖蟻壞幾漏於江河康政等被枌邑之遺風習華墟之有禮遽亡臣節仍助凶威撫弦登陴曾不興嘆以卵投石自取滅亡雖禁暴除殘國之大典然俾其陷辟終用愧懷敕理髖髀者不可以芒刃圖蔓草者必絶乎本根故前代陳甲兵以正其刑伐鐘鼓以聲其罪爰用重典庶清亂邦逆賊郭誼等狐鼠之妖依邱穴而自固牛羊之力得水草而逾凶久從叛臣首負逆氣頃自劉從諫背德反義掩賊藏姦稽其怙亂之謀無非親吏之計劉公直安全慶等各憑地險屢抗王師每肆悖言靡懷革面吳寇將敗周邱尚務於陸梁隴坁向平王揵猶稱於必死况郭誼王協聞邢洺歸懼義旅覆巢賣孽童以圖全據堅城而請命擐甲以祈於撫納要君以蓋其前天地神祗所難容舍昔伍被詣吏不免就誅延岑出降終亦夷族致之大辟無所愧懷郭誼王協劉公直安全慶李道德李佐堯劉武德董可武各宜處斬其餘反黨各從別敕處分敕頃者劉從諫與李訓鄭注結刎頸之交濟其姦謀以圖不軌張皇兵力脅制朝廷自擅一方外為三窟張谷陳揚庭等皆凶險無行狡詐多端比在京師人皆嫌惡自知險薄無地庇身投迹戎藩寄命從諫久懷怨望得肆陰謀或妄設妖言成其逆志或偽草章表飾以悖詞既無禮於君親曾不愧於天地自朕君臨萬宇姑務含容而怙亂益堅包藏未息誘受亡命招聚逆徒志猶恃於金湯心不利於王室近又敢為狂計挾助孽童汚我忠義之軍叶其豺豕之黨神之所棄人得而誅逆賊劉稹弟曹九滿郎君郎姊四娘五娘堂兄洪卿漢卿周卿堂弟魯卿匡堯等張谷並男涯涯男解愁陳揚庭弟宣力男醜奴張溢並男歡郎三寶等門客甄戈伎術人鄭諗蔣讜逆賊李訓兄仲京郭行餘男台王涯姪孫與韓約男茂章茂實王璠男圭並就昭義梟斬訖夫為善者天報以福為惡者天報以殃今沴氣既消逆節咸服方布和於四海庶息患於五兵宣示中外各令知悉敕我國家臨統萬宇列塞在陰山之南先可汗惣率本部建牙於大漠之北各安土宇二百餘年此天所以限隔內外不可逾越近聞為紇扢斯所敗加以飢荒國邑為墟尸僵道路今可汗稍收離散漸近邊城將議遠圖今先文誥故茲命使宜聽朕言可汗纍代以來推誠向國往者中原有難助剪㣥凶列聖念功每加優寵寧國咸安二公主降嫁龍庭爰及先朝復以今公主繼好又以土無絲纊歲遣縑繒恩禮轉深諸蕃稱羡久保誠信兩絶猜嫌但以國家舊章藩漢殊壤稍逾經制豈朕所安去歲嗢沒斯特勒已至近界邊將憤激便請袪除朕念其無主可歸且令安撫今可汗既立彼又降附便合率領漸復舊疆漂寓塞垣殊非良計又得宰相頡干伽思等表借振武一城權與可汗公主居住中國之制與外蕃不同須守前代規模祖宗法度昔漢朝單于乖亂呼韓塞宣帝送單于出朔方雞鹿塞唯賑以米粟國初太宗皇帝命李思摩建牙於漢南遺趾並存事皆可驗未有深入漢界借以一城與退渾黨項微小雜種同為百姓實亦屈可汗之尊貴亂中國之舊規若以未復本蕃或欲別遷善地求大國聲援戢諸部交爭亦須率思歸之人且於漠南駐止朕當許公主朝覲親問事宜倘須應接必無所吝冀令彼國從此輯寧豈不謂去危就安轉禍為福朕緣公主將可汗丹誠來告深感於衷制置之間須存遠大故遣右金吾衛大將軍兼御史大夫王會副使宗正少卿兼御史中丞李師偃馳往喻懷爰定所居便申誓約神明是質豈可食言可汗並保一心自求多福朕想可汗公主以久修鄰好纍降嘉姻望我國家如歸親戚朕每宏容納之意固無纖芥之嫌但以將相大臣纍陳公議以可汗代居絶漠臨長諸蕃名聲既雄部伍甚衆今逗留塞上逼近邊城百姓不安人心疑惑耕種盡廢士馬疲勞朕二年以來保護可汗一國內阻公卿之議外遏邊將之言朕於可汗心亦至矣可汗亦須深見事體早見歸還所求種糧及安存摩尼尋勘退渾黨項劫掠等事並當應接處置必遣得宜唯是擬借一城自古以來未有此事天地以沙漠山河限隔南北想蕃中故老亦合備知只如長安東有潼關西有散關南有藍田關北有蒲關今四海一家天子所都猶有限隔况蕃漢殊壤豈可通同且天下者高祖太宗之天下朕守祖宗成業常懷兢畏豈敢上違天地之限中隳祖宗之法每欲發一號施一令皆告於宗廟不敢自專所借一城理絶言議想可汗便須息意勿更披陳其餘令楊觀專往示喻朕意楊觀至覽表欲求糧食牛羊糧食已許自巳馬價絹就振武和糴三千石緣中國以農為本最貴耕牛百姓所蓄無多常斷屠殺羊則産於北土不出中華惟塞上蕃渾各有畜牧朝廷未嘗徵率務使安存今之所求難允來意又所請束縳嗢沒斯送歸者嗢沒斯比自投邊將屢獻誠自本國破亡之初奔迸先至塞上不隨可汗公主已是二年慮彼猜嫌自懷憂懼窮迫歸命望朕保持未嘗有交構之言離間兩國前可汗已緣失制馭之道無兼愛之仁侵擾諸蕃肆為暴虐所以親屬內叛部落外離國破家殘實由於此今可汗失地遠客危難之中尤須追悔前非以安反側若又仁愛不至骨月相殘可汗左右信臣誰敢自保朕統萬國非止一蕃未附者須務懷柔歸誠者因宜存撫倘徇可汗之意殊乖覆育之恩今已特許歸降止於存其種族必不別有任使授以腹心在可汗不失恩慈於朝廷免虧信義豈不兩全事體深叶良圖况前代以來盡有故事漢朝呼延邪單于塞其下大將烏厲屈烏厲溫敦並來降附漢宣帝封以列侯又國初頡利可汗之破敗也降者甚衆酋豪首領至朝廷皆拜將軍僅百餘人無不撫納想可汗深明朕意勿更再論摩尼教天寶以前中國禁斷自纍朝緣回鶻敬信始許興行江淮數鎮皆令闡教近各得本道申奏緣自聞回鶻破亡奉法因茲懈怠蕃僧在彼稍似無依吳楚水鄉人性囂薄信心既去翕習至難且佛是大師尚隨緣行教與蒼生緣盡終不力為朕深念異國遠僧欲其安堵且令於兩都及太原信嚮處行教其江淮諸寺權停待回鶻本土安寧即却令如舊朕自臨寰區為人父母惟以好生為德不願黷武為名故自彼國不幸為紇扢斯所破來投邊境已歷歲年撫納之間無所不至初則念其飢歉給其餱糧旋則知其破傷盡還馬價前後遣使勞問交馳道路小小侵擾亦盡不計今則可汗尚屯近塞未議還蕃朝廷大臣與四方節將皆懷疑忿盡請興師雖朕切務含宏亦所未喻日昨數使却回皆言可汗只待馬價及令交付之次又聞所止屢遷或侵掠雲朔等州或讐掣羌渾諸部未知此意終欲如何若以未交馬價且近塞垣行止之間亦宜先告邊將豈有倏來忽去遷徙不常雖云隨逐水草動皆逼近城柵遙揣深意以恃姻好之情每觀蹤迹實懷馳突之計况昨到橫水柵下殺戮至多蕃渾牛羊豈吝驅掠黎庶何罪皆被傷夷所以中朝大臣等皆云回鶻近塞已是違盟更戮邊人實乖大義咸願因此剪逐以雪殂謝之寃然朕志在懷柔情深屈已寧可汗之負德終未忍於幸災石戒直久在京城備知仁心憤惋發於誠懇因請自行嘉其深見事機不能違阻可汗審自詢問速擇良圖無至不悛或貽後悔敕姑遠嫁絶域二十餘年跋履險難備罹屯苦朕每念於此良用惘然恭惟太皇太后春秋已高慈愛深厚比者望姑朝謁再敘悲歡倏已歲暮寂無音耗想姑見舊國之城邑能不銷魂望漢將之旌麾必當流涕今朔風既至霰雪已零絶國蕭條固難久處旃墻罽幕何以禦冬肉飯酪漿且非適口朕撫臨萬宇子育㣥生一物未安終食三嘆况姑纍年漂泊何日忘懷想姑高明必是懸鑒姑承宗廟之餘慶為王室之懿親先朝割愛降婚義寧家國謂回鶻必能禦侮安靜塞垣使邊人子孫不見兵革射獵者不敢西向畏軒轅之臺今回鶻所為甚不循理蕃渾是朕之人百姓牛羊亦國家所有因依漢地遂至蕃孳回鶻託以私仇恣為侵掠每馬首南向姑得不畏高祖太宗之威靈欲侵掠邊疆姑得不思太皇太后之慈愛為其國母足得指揮若回鶻能不稟命則是棄絶姻好今日以後不得以姑為詞若恃我為親稟姑教令則須便自戢斂以繼舊歡想姑以朕此書喻彼將相令其知分更不徇非塞外祁寒且無絲纊朕每御裘服則思彼未授衣豈可回鶻譸張遂忘親愛今寄冬衣若干具如別録
