front:
  text: 全唐文欽定全唐文卷二百十五陳子昂七
  hash: sha256:e7729d321d78f01ea8a7945ff2a401c7c3713d84489797068bfb9744bc7b6e0f
body:
  text: 君諱嗣字宏嗣其先陳國人也漢末淪喪八代祖祗自汝南仕蜀為尚書令其後蜀為晉所滅子孫避晉不仕居涪南武東山與唐胡白趙五姓置立新城郡剖制二縣而四姓宗之代為郡長蕭齊之末有太平者兄弟三人為郡豪傑梁武帝受禪網羅英豪拜太平為新城郡守尋加本州別駕弟太樂太蒙蒙為黎州長史都督護南梁二郡太守樂為本郡司馬即君之高祖父也生曾祖方慶好道不樂為仕得墨子五行祕書而隱於武東山生烈祖湯湯仕郡為主簿遇梁季喪亂避時不仕生皇考廣迥迥早卒君即迥之第二子也少孤而有純德恭己飾行一日三省家代本以清白崇德逮君之孤素業空矣君有仁兄養母以孝君克順至行同勤苦節夏不避暑冬不避寒蒸蒸服事行年四十有五入則孝出則弟謹而信泛愛衆而親仁無餘力也以是不憂於道逮親終歿春秋巳高從事不可以養矣乃輟干祿之學修養生之道山壑高居農野永歲雅聞漢有王丹者放居不仕家纍千金以自奉田稼勤者載酒肴從之鄉里承化以相懲沮乃歎曰彼王丹者是為政矣奚其為政也由是始考林澤闢良田習山書務農政天道時變地道化成邱陵泉藪星歲雲物靡不用心也原田莓莓黍稷漠漠汶陽之稼如雲矣春日載華歲聿其秋白露時降百穀收熟君常乘肩輿省農夫饋田畯刑以肅惰悅以勞勤若孫吳之用兵鷙鳥之搏擊也卓彼甫田歲取十千倉庫實崇禮節恤丨旬分寡賑窮乏九族以親之鄉黨以歡之居十餘年家纍千金矣其鄰國有偷衣食帶刀劍推埋胠篋之類鬬雞走狗之豪莫不靡下風馴素節曰里有仁焉吾何從之也遂頓浮窳之節肅恭儉之規修孝悌飾廉恥將欲效君之素業也君時年巳耳順素無經世之情林園遺老元默忘歲遂保先君武東山之故居行不由徑非公事未嘗至於州縣也昔襄陽有龎德公谷口有鄭子真東海王霸西山蜀才皆避人養德退耕求志軒冕不可得而羇憂患不可得而纍逮於我君作者五人矣於戲古者至人不利苟得不務近貴量腹而食度身而衣非其道萬鍾不足豐也非其榮五鼎不足飪也躬勤耕稼植其杖而耘不答子路之問者豈我君之徒與帛丿糸帛丿糸羅網冥冥高鴻躍躍竹竿穆穆幽龍其與禍敗之遼絶如胡越哉然則兩龔不免於蘭焚二老不免於薇歎其近貴利邪夫上無憂悔下無飢寒含道以制嗜欲達命以順生死仁以愛身智以養德俾爾耆而艾俾爾昌而熾君子保之以永壽考非我君者乎享年八十有五太歲壬辰五月十三日考終厥命臨終戒曰啓子足啓子手吾聞古人有言珠玉而瘞之是暴骸於中原也古者不封不樹後代聖人易之以棺槨吾不敢違聖人可具棺槨而已斂以常服墳無邱隴吾將庶幾以奉先人之清業也有子某等皆能祗奉遺訓聿從先志長壽二年龍集癸巳某月某朔日元月載踰卜兆時吉始啓殯昭告奉遷於舊塋武東山之陽禮也鄉里會葬者千餘人皆涕泣號慕悲純德之不見咸曰君子沒矣仁何以名陵谷不朽匪唯頌聲小子不敏謹述鄉人之教其詞曰肅肅我祖國始於陳中裔淪喪洎此江濱山川隆鬱旗鼎氛氳生我君子於鑠元真惟孝肅悌惟仁善鄰樂我耕稼忘我搢紳茫茫田藪歲也其春農人肅事君子犒勤孰為夫子植杖而耘弋者何慕鴻飛高雲楚狂懼殆夷叔求仁良時一作圖終矣不考於身我異於是非隱非淪撫化隨運安排屈伸大年既沒長夜何辰聖達不免宇宙同塵桐棺三寸豈我窶貧自古有死吾從聖人嗟爾百代子子孫孫驕奢自咎天道無親思我松柏恭儉是遵敘曰蒼生蚩蚩其動也直蓋顓蒙乎聖人皓皓其汲也教務皇中乎則時至其理樹之君公弼其機馭之師之疑非能駿尊上帝保乂黎元誰則荷天之寵析人之爵行其禮樂驟覩於中和裕其廉平載聞於謠誦我之遺愛者不從事於是邪嘗試論之公名某字某渤海蓨人也昔后稷有德於邰文王受圖於鎬珍符冊命始自於西周圭社建侯奄荒於東土裘鼎軒冕有家代焉曾祖子繡齊潁川渤海二郡太守霍州刺史隋通直郎通州刺史榮分麾蓋道邁循良時雨洽於齊陳惠風被於唐楚祖德於北齊著作郎隋扶風郡南陽縣令藝扃一作編覩奧見天下之圖石桂聞琴知君子之化父安壽皇朝尚衣直長懷州司馬豪一作濠州刺史湖州刺史良二千石聞乎共理之尊肇十二州榮多刺舉之首公則使君第某子也沖和誕命光大含章實公侯之子孫有山河之氣象明不外飾默昭於元機敏實內融養蒙於用晦故其廉不直物恕不由衷崇善足以利仁自彊足以從事有朋友之信焉有閨門之肅焉非夫恭人其孰能景行行之者也年始若干為國子生言從太學之遊以觀先王之道某年以明經擢第解褐守恆州參軍秩滿補許州司法參軍許惟舊國陳實多巫君子豐明利用乎獄載以課最纍加秩焉又轉洺州司兵參軍叢臺袨服一旦成市非利器者政以多荒公實佐之官無留事信矣乎能其理者有其任濟其業者享其功我豈蒙求物思其理某年選補臨邛縣令夫蜀都天府之國金城鐵冶而俗以財雄弋獵田池而士多豪侈此邦之政舊難其人公按轡清途下車而宰覽其謠俗永歎於良圖想其風流慨然於惠化以為太上之理因人者也通變之機隨時者也必使無訟不亦由吾用乎利貞夫何在物於是謀其教令肅其儀刑敬其事以順其人正其文以利其義以為昔者聖人之務本也在乎稼穡有稼穡然後可以養人故公之勸人也用天之道分地之利以為昔者聖人之利用也實在財貨有財貨然後可以聚人故公之化居也貿遷有無和其衆寡以為昔者聖人之事生也謹其制度然後可以富故公之節用飲食有節車服有數以為昔者聖人之事死也慎其喪祭有喪祭然後可以睦人故公之送死也葬之以禮祭之以禮以為昔者聖人之用獄也崇其法制有法制然後可以禁人故公之恤刑也唯齊非齊有倫有要夫如是者豈苟其利哉唯欲潔乎其源正乎其本慎之於謀始要之於用終將使敓襄攴矯虔而是以息孤寡不穀而是以寧者哉夫然後磨之以仁琢之以義使男女異路班白不提熙乎其若春肅乎其若神然後文以禮樂幾乎以淳朴道豈遠乎嗚呼昊天不悅降此荼毒某年以太夫人憂去職於時公之蒞始逾年矣然三載考績是用未成百姓哀惶人吏嗟咨咸云我父去矣而人悴矣鄉望老人前某官等五百餘人或金隄之秀玉宇之英並服美於寬允嚴祗於教義遂走之州府訴之上官冀奪其哀摧禮終秩不謀而同者日有百數司馬元公帝王之裔也康歌協化盛德在人憫蒸庶之求思嘉我君之懿績以為古之借寇者何以踰是哉遂用疇咨舊章允懷氓誦奪之公禮上之於文昌臺非將協贊天工慰彼黎庶君子之教而日見之哉班白之老胥吏之徒又以天子在宸勤毖孝理我君云邁誰其嗣之千餘人復連表詣闕投匭乞君以墨縗從事遑遑焉若有望而未至也鬱陶增思寤寐永歎將欲思慕不朽想見懿德乃相與言曰昔者君子思其人而愛其樹蒙其澤則歌其詩封君之仁我無金石乎又述其行狀訪余以銘勒之事縣丞等有弼諧之美刀筆之能永思清風歎息仁化尉安定梁慎盈知名之士也墨妙幾於草聖文義總於辭雄昔仕京畿左遷此職自以為贊封君之化有日矣承封君之德有年矣夫其忠信之教寬猛之機古之官人君其殆庶乎父老之請允矣余朅來舊國傳據其實恭聞其去思而親覩其遺愛余所備者敢述斯文猶懼後生有言以為口實河東薛稷隋內史公之孫也文章之伯而時所宗故憑其實録寄之為頌其詞曰天地之閒有渤海焉伯宗伯谷神山在焉精氣飛騰生良宰焉良宰實生代祿代卿君達好道風雲上征武興察孝州郡有聲陳其弓冶戴其簪纓筮仕斯邑我龜觀貞深期高悟絶策遠明既至肅肅其來英英臨事若祭視人如嬰三農慜困折獄以情輕重共用穀貨以平我裳既襲我簋斯盈於惟我君張仲孝友家膺五福堂享三壽溫凊不違喜懼兼守枯魚銜索疾風過牖匪降自天誰執其咎棘心劬勞匪莪伊蒿彼蒼不弔惟其永號借寇為請惠此嗷嗷曾是奔告謂天蓋高升仙橋下赤車使者客於臨邛文雅雍容觀風萬里謁帝九重嗟嗟其舊椎牛擊鍾門於君墨借翰雕龍專思君兮不返伐石登山山高兮望遠懷車馬於言告欲絃歌於言偃人實去思我無愧詞彭州九隴縣丞獨孤君有恭懿之行柔毅之才臨官以莊敬事而信清白苦節勤恪厚躬廉而不矜利以不浼有特立之操焉在位四年無一日自倦精專力務澤潛氣通天彭之人陶然大化居秩歲滿單車告歸邦思其仁國詠遺愛乃樹碑刻石追崇厥庸既頌歎之又思福之以金仙世尊慈善萬物遂貢金鑄像祈祉冥休悠悠之人至今稱賴夫官不必貴政惟其才獨孤丞上迫宰君下雜㣥尉文墨教令不專在躬然力行務仁推誠愛物謳吟者不歌其宰頌議者必歸於丞豈欺也哉吾每聞一言可以永寧天下者在能官人而已苟謬其任綱維以穨感獨孤丞智效一鄉惠孚百里況其大者乎於戲官人哉乃作頌曰於維國家建官以理得人則盛匪人則英英我君清節素履恭寬敏惠將順其美禮實在躬人以知恥歲秩其暮薄言歸止祁祁吏人何嗟及矣涕戀沱若遺愛罔巳瞻德樹碑造真祈祉不有其惠孰能享此悠悠彭門千載有紀至哉天子在穆清之中端元默之化萬國日見百姓以親誰其昭宣令長其任也然則國有小大政有污隆遭其和平則循理之功易值其凋瘵則革弊之業難況罹乎薦瘥救其塗炭力倍於中而功不半之利盡其仁而澤未全洽則我府君當欽明之世承苛慝之燼緝穨靡之餘遂能撫寧矜殘淳耀敦懿改制立憲昭德顯仁竒跡光乎曩賢惠風穆於茲日我行千里而得一賢傳曰夫用我者而豈徒哉府君姓張氏名知古蓋漢少傅留侯之裔也昔留侯得滄海力士東報於秦遇黃石老人西歸於漢山河鍾鼎子孫保之代在關中今為宜州人也高祖藝周恆州司馬曾祖歡隋許州司馬祖雄唐并州榆次令考琳原州平原令皆稟瑚璉之器著經濟之才大位不躋元德滋茂其昭祉復襲於我府君府君體英竒之姿沖希默之量齊敏內肅端外融夫其孝友睦姻研幾成務深斷守節之固撥煩要之能在於家邦聞其政矣起家補同州朝邑尉歷太州鄭縣尉左金吾衛倉曹參軍洛州洛陽主簿黃圖左翊豪俠所湊赤墀佐理實賴其能又遷雍州明堂縣丞時皇帝恭默明臺清問下吏西南矜寡有詞上官曰刺史沓貪而苛縣令威施而忍奸宄因舋㣥行敓襄攴哀哉氓黎顛在荼毒朝廷憫之帝曰俞允哉乃用敕撫此荒邑噫嘻昔者苛政未作封境保安茲都衝要襟帶全蜀百濮兼錯萬裔之泉寶利珍貨盡四海矣逮殘猛聿至蟊賊內訌始於碩鼠之侵終屠餓狼之喙杼軸既盡郛邑殆空悲夫仲尼云苛政虐於猛虎豈猛虎而已哉我府君殷然始宣皇明恭職事巡省黃髮周爰令圖所以綏亡固存蠲虐去暴與百姓更始者輿人斐然乃作誦曰我有聖帝撫令君遭暴昏椓丨旬分寡紛民戶流散日月曛君去來兮惠我仁百姓蘇矣見陽春然不躬不親庶民不信於是府君知人散久矣黷於詐罔巳曰未遂躬六曹之務先五美之訓下官斂手牟食革心人始翕如也初官戶在版圖者萬有五千餘家歷政侵殘逃者過半歲月永久廬井湮蕪蠨蛸在堂蟋蟀空歎先是有敕天下逃人歸復舊業者免當年租庸公以柔遠能邇政之大端乃下令曰於戲天子誠憫斯人是用命我其訖有濟若逋不及惠幽不能明吾之罪人部內有逃越他境能相率歸者免一歲租及征徭若丨旬分嫠貧窶不能自濟者當別議優之其長正耆老可明喻此誠使被幽谷令既下克己示信或有逃者引首而歸公親循寧慰贍理其業於是小大悅賚遠近承風四封諸通一朝景附夫負妻戴子荷蓑提笠首尾郊郭者凡七千餘家熙乎若鴻鴈之得春也既至矣則勞來之既止矣則安輯之或三年或十年舊館已無喬木猶在公緝屋塗室剃陌開阡為其并疆人得其居矣田畯失業農野榛荒此邦膏腴利在江浸有金鴈白魚二水是其朝雲澤麓無虞溝畛填塞公濬其塗洫川澮始通人得就耕矣流亡初復貧鞠兼半食不糊口力未贍農公又假富資貧耦耕分種助其銍刈歲以有年人得其食矣曩者征稅橫敓商旅不行貿遷有無廛肆半絶公阜其貨財交易復通日中噬嗑人得其利矣乃種樹畜牧蠶漁工賈什伯之器車服之庸婚姻之時喪祭之禮莫不盡為度數制其權衡征賦既均千室如一於是百姓允賴鼓舞而歌其歌詩凡六章題曰逃還樂其首章蓋言天子之德也其二章憫前政之虐也其三章喜公惠之至也其四章言逃還之樂也其五章美公化行而奸慝不興也其六章善政令均平賦斂不淫也時日月會於龍尨歲功成平孟冬百嘉備蒸品物咸乂府君乃稽版籍考幽明親巡乎邦廬存問乎鰥耄黃耇稚齒山原之民乃接手賡歌迎擁馬首纍乎道路者以百千輩晝肆酒夜聯燭㣥舞蹈詠迎途餞郊皆歌前六章慶公惠也是以封內歡康境外萌動企公德美有若神明府君嘗因公事至成都成都之民駕肩相矚蓋籍甚其異也封人有喪者廬於墓側鞠然在疚負土成墳公親從寮吏弔其苫席自是禮讓行焉學校興焉長史河南竇公旌別尚賢廉居政以公甄理穨弊躋美中和歷政逋亡一朝狎至遂表其狀奏之於闕庭屬獯鬻孔亟戎車未暇郊壘既夷邦憲清穆刺史南陽張公幨幃臥理寬猛以濟儒術兼優吏畏獨坐人歌來暮甄綜品鑒物無遺才又以公保邦乂民勝殘去殺重理前秩升聞宸扆夫升聞者豈循良而已哉蓋激清勵貪聳善懲惡祈元嘉命優公寵章於是鄉旄邦彥華髮杼首或名淹玉壘家擅銅山如王宏馬靖等若干人皆以政洽仁顯功著頌宣揚金帛嘉止不日而至至則國肥矣去則民瘠矣況我邦族其將疇依兄弟睦親不可以從往也筐篚玉帛不足以永貺也隔千里而不昧與百姓而長存非刻金石列圖象揚宏懿崇耿光則喁然衆情孰克慰滿於是乃從旅鑿巉巖自金水之山得玉玫之石農夫田婦擔扛力運皆懼公往遺像莫瞻共琢之磨之議之謀之子昂時因歸寧采藥岐領父老乃載酒邀諸途論府君之深仁訪生祠之故事永我以典禮博我以文章夫千里一賢義者所貴今百城一理公獨有之不熙其烈光以示當世則孱弱者胡以激節貪垢者曷以悛心敢因此義乃氓謠而作頌曰頌缺尊師業尚沖密勤毖幽深理心事天所寶惟嗇絶聖棄智不耀其光故真感冥期珍圖祕學性與天道不可得而聞也若乃崇標曠迹遐情遠思志摩青雲蓬視紫闥高宗每降鑾輦親詣精廬尊師身不下堂接手而已每歎曰大丈夫業於道不能投身霄嶺滅景雲林而疲痾此山以煩時主吾之過也遂欲東求蓬萊孤舟入海屬天皇敦篤斯道祈款逾深踟蹰山隅絶策未往既而金革一作格有命鑣轡遺區於戲昔姑射有神人堯輕天下崆峒有至道軒屈順風元真高蹤萬古同德何其盛哉尊師有弟子十人並仙階之秀然鸞姿鳳骨眇愛雲松者惟潁川韓法昭河內司馬子微皆稟訓一作命瑤庭密受瓊室專太清之業遺下仙之儔谷汲芝耕服勤於我蓋歷歲紀也始尊師受籙於茅山升元王君王君受道於華陽隱居陶公陶公至子微二百歲矣而元標仙骨雅似華陽夫階真蹈冥鍊景遊化者其必有類乎法昭等永惟尊師靈跡洞業高深邁古而棄代往矣其若之何乃斫石幽山申頌元德其頌曰觀元化兮求古之列仙得瑤圖與金鼎信元符之自然神與道而為一天與人兮相連苟精守以專密必駕景而淩烟丹邱不死兮羡門子黃宮度世兮吾體元體元至德兮洵淑美沖心養和保元始初學茅山濟江水乃入華陽洞天裏道逢真人升元子授以寶書青台旨令守嵩陽玉女峯雲棲窮林今五紀聖人以萬機為貴而我以天下為纍聖人以大寶為尊而我以天下為煩是以冥居於㟪山纍寄遺跡於軒轅有唐高宗兮天子之光好道樂仙兮思彼雲鄉千旌萬騎兮翠鳳凰遨遊汝海兮箕山陽朝拜白茅夕紫房齊心潔意緬相望祈問玉真及玉皇何以得之受天昌黃庭中人在子身窅窅冥冥精甚真去汝驕氣與淫神勤能思之道自親遂解形而遺世乘白雲而上賓弟子不知其所往乃刻石以思其人昭夷子諱元亮一無亮字字貞固汲人也本居河閒代為大儒至祖掞尤博雅耽道隋徵八學士與同郡劉焯俱至京師補黎陽郡長始居汲焉有二子禮輿禮轅輿官至臨潁縣丞轅為校書郎並著名當代昭夷即禮輿季子也元精沖懿有英雄之姿學不常師志在遐遠年二十七褐衣遊洛陽天下名流翕然宗仰㣥蒙以初筮求我昭夷以元轂發機故蓬居窮巷軒冕結轍時代議迫厄不容其高乃屈身泥蟠求祿下位為幽州宜祿縣尉到職逾歲默然無言唯採藥彈琴詠堯舜而已州將郡守穆然承風君之道標浩如也因巡田入隴山見烏支丹穴密有潛遁之意蒼龍甲一作丙申歲在大梁遭命不造發痟疾而卒時四一作三十九嗚呼哀哉天下士人聞之知與不知莫不為之垂涕蓋傷其有濟時之量而無長駐之年夫上德道全器無不順中庸以降才好則偏有張也之莊無展也之道好由也之勇緬回也之仁侈宰豫之言遺淡臺之行務端木之智忘寧武之愚或正而不竒或達而過雜君獨五味足六氣和通衆賢之不兼暢㣥才之大適雖不至於聖道其殆庶乎故人無閒言物飽其義吾嘗論人事有十君得其九一不至者命也夫於戲名聞天下而不達於堂上智周萬物而不適乎一人也其時歟其事歟君故人雲居沙門釋法成嵩山道士河內司馬子微終南山人范陽盧藏用御史中丞巨鹿魏元忠監察御史吳郡陸餘慶秦州長史平昌孟詵雍州司功太原王適洛州參軍西河宋之問安定主簿博陵崔璩咸痛君中夭鼎飪不實百代祀德故老或云以為名者德之表諡者行之迹君囊括代道位屯時艱困乎臲卼光景不耀乃共稽隲舊行考諡定名問於元蓍象曰明夷于昭夷昔歎才位不兼大運有數嘗哀時命而作頌云諸公以余從君之遊最久故秉翰參議其頌曰天道宏運兮物各有時匪時不生匪運不成昔者元精回潏陽九滔災大人感生堯禹恢能陰陽既和元帝傳家五百數終桀驁暴邪子乙提運水火革明匪賢不昌尹乃阿衡六百運徂受始淫狂西伯考元歷在躬昌匪雄不決匪謀不臧姜牙皓眉實逢其良投釣指麾奄有八荒周有天下七百餘年太公之後不聞大賢豈無仲尼負道周旋無勢一挈無土一廛然則大運之所來時哉時哉時隘業隘運巨功巨苟非其時草木為伍昭夷作頌云爾又嘗著汲人嚜記言變化之事且曰請爾靈龜永晏息乎浩初君諱某字某渤海蓨人也昔周天子命我太公受封東海鍾鼎寶玉七百餘年故其公侯代有國祀曾祖勵字敬德北齊朔州大行臺僕射襲爵清河王改封樂安王周授開府隋授楊楚洮三州刺史我唐有命崇寵典章貞觀初贈恆定并趙四州刺史垂拱中又贈特進非明德上公孰享之哉祖宗儉字士廉皇朝太子太傅上柱國申國公食邑三千戶贈司徒并州刺史永徽初贈太尉配享太宗文皇帝廟庭諡曰文獻昔帝光天下公實佐之至是元勛克配清廟父慜字履行秦府軍直千牛滑州刺史將作大匠金紫光祿大夫太常卿洪州都督上柱國申國公尚東陽長公主駙馬都尉衣冠禮樂盡在是矣故帝乙歸妹尚于中行公則駙馬之元子也含章丹穴籍寵黃扉承禮訓於公庭盡儀刑於士則年若干嗣封申國公十四解巾授干牛備身趍奉紫璋已有光矣秩滿補海監府左果毅都尉再遷遊擊將軍右師府郎將遂升榮禁衛承寵司階千廬之務式遵八舍之榮攸襲又授朝散大夫尚輦奉御再遷尚衣奉御屬扆宮搆難巫蠱禍興坐堂弟岐左遷循州司馬蒼梧南極桂海東浮是唯篁竹之區而有山夷之患永隆二年有盜攻南海廣州邊鄙被其災皇帝哀洛越之人罹其凶害以公名家之子才足理戎乃命專征且令招慰公奉天子威令以喻越人越人來蘇日有千計公乃惟南蠻不討之日久矣國有大命將布遠方欲巡禦象林觀兵海裔彼蒼不弔夭我良圖因追寇至廣州遇疾薨於南海之旅次時年若干嗚呼哀哉珠鼎之秀邦國之光負才能重書劍方將克崇舊業祗寵前人降年不長永墜厥緒嗚呼哀哉夫人京兆韋氏銀青光祿大夫太子詹事武陽侯琨之第某女也有淑慎之德窈窕之賢長於公宮少習婦道年十六歸於申國鳳臺尊閟鵲巢斯在雖珠玉翡翠職是其儀而浣濯蘋蘩不改其操故我君子琴瑟友之年三十儀鳳二年先公而歿其年權殯先塋嗚呼哀哉始公之適南裔也夫人逝矣死生言別永懷燕越之悲旌旐同歸終淪松柏之路先是公有命合葬宏道歲靈櫬自南海還嗣子紹等追惟永終仰遵先志粵載初元年歲在攝提格始昭啓亡靈改卜遷祔某月日遂合葬於少陵原禮也嗚呼哀哉霸山南望秦川滿目紫臺鍾鼓方對於青春白楊邱陵獨悲於元夜紹等以東西之人懼岡陵之變古不樹今則墳焉君諱某字某其先太原人也昔周文王有聖人之德甲子受圖至我靈王誕膺丕顯太子晉得鳳凰之瑞恭揖㣥后上為帝賓帛丿糸帛丿糸生人作我王氏逮秦有賁翦并吞諸侯晉有渾祥功格帝室魏至慧龍為貴種矣十二代祖卓晉常山公主子也始公主湯沐邑在汾陽永嘉淪夷不及南度因樹枌檟而結廬焉卒葬於長壽原至今鄉有太原之號也曾祖亮周開府儀同上大將軍隋信州刺史樽俎之師也祖儉隋離石郡守唐石州刺史贈嶽州總管廣武烈侯社稷之器也父諶唐虞部郎中荊州大都督司馬商壁鄜許冀五州刺史加銀青光祿大夫瀘州都督金水敏侯上柱國廊廟之才也敏侯有功於國始賜土田白茅苴之在鄠之曲因食菜今為雍州人君即敏侯之元子炳靈珍粹輝采幽黃願而以恭寬而以栗青襟聞道已光大矣天子立太學所以養賢公子齒上庠所以觀國君休烈泉塞志業雲翔年若干為國子生其中射策甲科解褐補吳王府參軍事時吳王帝之愛子國選英寮君三德允章六行既穆與某郡劉孝孫首光此舉誦詩三百和淑其仁而醴酒不恭楚筵亦廢坐除滑州録事參軍又轉隴州録事參軍時樂成公劉仁軌以宰相之貴持節此州曖然推中主諾責下君提綱未幾㣥轄載孚劉公坐嘯以為能也舉遷汾州平遙縣令其地有臺駘之怪蟋蟀之人君黃鼎分中鳴琴不下鐘鼓既考風俗允和帝曰良哉而格我政加朝散大夫遷岐州扶風縣令昔尹翁歸以文武之幹緝熙此邦黃圖雖寧赤丸未乂君以先庚斷甲設距投鉤赭裾始繩堊面咸革丁我敏侯艱遂茹哀苫廬銜恤終祀是歲申國不理元寮佇才制加朝請大夫授申州司馬屬太夫人有羸老之疾去官不之白華增勤綵衣是慕至於朝盥夕膳色承歡夔夔齊栗蒸蒸不匱有若楚老萊子之為嬰兒也嗚呼昊天不弔降我鞠凶太夫人以眉壽薨時君年已七十二矣禮以飲酒而君絶漿虞以降哀而君泣血煢煢在疚欒棘其心新穀未升匪莪以殞以某年青龍癸巳薨於某里第之正寢孝之終也嗚呼哀哉昔聖人五十而慕先子謂之至德今君七十二而盡其哀非敦篤允元深仁淑德者疇能離此哉夫人宏農楊氏隋內史侍郎丹川公演之孫女也幼有淑德而美令儀採蘩昭華穠荷比秀至於內嚴閫訓外匡君子麟趾以穆雞鳴有章誠可道映公宮事宣彤管晚年以儒因未究冥業惟深遂揭無生之筌將遺有漏之屣顓潔道行受蓮花經理極翻三心滅不二形亡緣盡歸真化冥歲在丁酉處順而往始我府君以懸車之歲從負米之勤夫人亦能肅恭晨昏嚴祗左右夫至行莫大於孝崇義莫顯乎忠君克勤於家盡力於國刑於妻子至於朝廷夫矜而不與物或有違廣而無適義所以比君好謙達禮研幾成務摹其法器無不馴從其事政無不理夫用我者而豈徒哉嗟夫矜而能廉利而不浼百行允備三事不階臧文仲其竊位與柳下惠其直道與有子四人長曰某官至武連縣令先公而卒次子某等皆肅奉嚴訓景行高山達於家邦光於禮樂永號罔極泣血旻天始府君臨終遺令薄葬墨龜未食青烏不封權殯於某所需吉兆也龍集己亥律躔應鍾金雞鳴玉狗吠黃腸密啓丹旐徐飛始遷神於某原之陽禮也青龍在左朱鳳居前雙衾共封二室同宛珠玉不瘞邱隴誰傳刻此金石以旌後賢
