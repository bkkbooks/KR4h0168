front:
  text: 全唐文欽定全唐文卷六十九帝諱昂穆宗第二子元和四年生長慶元年封江王名涵寶歷二年十二月即位改今名在位十四年年三十三諡曰元聖昭獻孝皇帝廟號文宗
  hash: sha256:d5b2f5e15d8aebfb73916c91b1ccc6a9c9e8627402af22f468736abe2753f21a
  markers:
  - {type: head, offset: 12, content: 文宗皇帝, id: KR4h0168_NFKB_069-h1, level: 1}
body:
  text: 大行皇帝聰斷英明臨下以法方將致理以一區夏而妖兇構禍矯宣遺言不詢羣臣專斷神器恃近而迫衆倚兵而取威謂天地可欺神明可罔既而奸謀發洩兇黨彰聞寡人義重君臣毒甚手足拊膺號惋誓清兇徒果有義烈副此誠志遂以宰相定議乃親率左右神策護軍中尉心腹近臣及諸職事官并左右神策六軍使兼諸軍使及飛龍將士等搜摘伏匿大擒諸妖或血刃當辜或赴井自斃其劉克明田務澄蘇佐明王嘉憲石定寬等二十八人並正刑書罔有漏逸歡呼震地抃快聞天此皆宗社威靈文武協力翦盪兇寇克有成算豈伊菲薄敢貪天功想於羣公多士中外藩嶽皆累朝勳績先聖寵任致茲刷憤哀慶當同大行皇帝正柩於太極殿前率依光陵故事有司條上務盡誠信其冢宰司空平章事裴度當攝立功將士節級各有優賞布告遐邇咸使聞知搆大廈者實先梁棟之材濟巨川者必資舟楫之用朕越自藩邸膺期大統夙夜震兢若蹈泉谷況齊甿思乂艱步甫寧上奉山陵七月之期內佇訏謨庶政之始匡我眇末置之極樞將恢興運之功俾協具瞻之望博閱名實獲茲忠賢實帝賚予其誰與讓正議大夫行尚書兵部侍郎知制誥充翰林學士上柱國賜紫金魚袋韋處厚體道為徒見義能勇居易以行古至和而不流冰霜挺松柏之姿貞白秉珪璋之德文揮風雅學該儒元器洽而保之以謙識明而用之以晦選自經藝侍於穆宗擢司密命實賛先帝壹彼直操彰其遠猷臨危勵難奪之誠推忠備宏益之道屬者變生宮掖謀俟經綸首參厎定之功載竭忠貞之效雪憤橫涕披肝貢詞約我以禹湯罪己之勤博我以古今致理之要聽必感動悉其條陳洪纖靡差夢卜斯協必能式是中外啟茲雍熙俾予沖人克遂垂拱是用擢升鼎鉉式亮帝圖庶無愧於知人且用光於斯道於戲前哲有言良臣惟聖處殷憂舉衆之任荷濟理沃心之期注四方傾聽之勤在百度維新之際無怠於誨無廢於身無曠於登庸無忽於詢事慎爾初守固其持平協廟廷卿士之和衷復貞觀開元之令政用乂乃辟罔非在中崇易久大之規茂庶富阜康之績勿替明戒時惟永圖汝往欽哉無忝我命可中書侍郎同中書門下平章事散官勳賜如故宰相之任所以撫鎮國家出納王命弼亮刑政燮理陰陽為一人之股肱注四方之耳目僕射之職在於參賛萬務統率六官師長百寮總臨臺寺冠中朝之碩望為多士之具瞻其有久司利權累分閫寄位重邦教任隆臺階爰因入覲之榮再賜登庸之命俾升鼎鉉用輟旌旄淮南節度副大使知節度事管內營田觀察處置臨海監牧等使兼諸道鹽鐵轉運等使銀青光祿大夫檢校司徒同中書門下平章事揚州大都督府長史上柱國太原縣開國男食邑七百戶王播知識精深機神敏達長才適於通燮雅量得於寬明亟登將壇仍佩相印休聲早振於全蜀成績近著於維揚山澤之貨無遺輸轉之資相繼用佐經費克彰忠勞朕獲守宗祧君臨億兆尚賴匡救厎於輯寧於戲爾有嘉謨我求懿德將期納誨以及交修冀霖兩之濡能普施於四海舟楫之利無專美於一方寵以端揆之榮仍茲榷筦之重往踐乃位汝其欽哉可尚書左僕射同中書門下平章事依前充諸道鹽鐵轉運等使散官勳封如故門下節制師戎考察風俗誠藩方之倚任實朝廷之注意至於拔常所重難況齊魯分疆河朔接境過寇虞而固封守宣德教而按州部付之專柄思得全才是用輟近輔之循良撫東平之凋瘵式孚成命所為至公正議大夫崔宏禮文學發身擴之以襟度忠信為主輔之以誠明累分郡符亦揔戎鎮理行第一奏課連最來必畏晚去常見思挹長者之聲光得大臣之體要屬樂陵未靖戎事方殷上宰憂勞舊恙厂田坴迫念茲易置期在惠安當使恩威並行剛柔適用率之以義則無不化齊之以禮則罔不服恢武略以經務清吏職而約法必有餘地以康吾人大將鼓旗諸侯弓矢文昌顯秩憲府雄班參以命之寵茲俞往承我休德勿替前修可檢校戶部尚書使持節鄆州諸軍事兼鄆州刺史御史大夫充天平軍節度鄆曹濮等觀察處置使散官勳如故綏輯萬邦實資乎元首弼成庶績允屬於股肱將以導宣化源崇固理本立我皇極賛於時邕故任賢著於禹謨納誨彰於說命眷求懿德斯惟僉諧中散大夫守尚書兵部侍郎知制誥充翰林學士上輕車都尉賜紫金魚袋路隨性稟中庸氣含大雅身無擇行學不為人敏識周通宏才恢博挺然仁者之勇蔚為君子之儒祗事穆宗侍經內殿敷堯舜之大典暢周孔之遺風雅言玉音奧義冰釋潤色王度發揮聖聰出入禁闥踐履華貫位彌高而惟謹任愈重而滋恭逮及先朝復參密命雍容侍從早巳賦於甘泉左右便蕃未嘗言及溫樹周旋九載始終一心直道匪躬讜言盈耳每訪謨猷之指用陳裨益之誠出不忘於詭辭退必聞於削藳器可經國忠能致君跡其公正之方用升毗倚之任於戲干戈未息爾其宏智用以靜寇攘役戍尚勤爾其宣柔服以懷戎狄均國賦以安阜百姓振朝綱以綜覈羣才退無後言動必慮善貞爾百度弼予一人寵以峻階委之極務往踐厥位時乃之休可正議大夫守中書侍郎同中書門下平章事勳賜如故王者祗順天道統理人極茂育品類燮調陰陽必在旁求服肱宣翼機務朕嗣守寶位於今四年屬滄景搆奸河朔未靜兵甲屢釁蒸黎匪寧納隍在予輟食興歎今苗頑既革華夏思安爰登臺臣弼我元化正議大夫尚書吏部侍郎上柱國襄武縣開國侯食邑一千戶賜紫金魚袋李宗閔立德秉彞履道居業文行可以經邦國忠正可以動神祇周知燮通識達今古自望高多士名重四朝奉絲綸於掖垣平銓綜於省闥公直有裕清貞自持固可以相導雍熙光膺夢卜以匡台德用濟巨川宜昇樞軸之尊俾叶鈞衡之政於戲知臣匪易求賢惟勞膺三台之崇賛萬機之重啟沃之義注於予衷爾其舉正去邪以清百辟提綱舉法以肅羣司政勤心以安兆姓推誠忠恕以靖四方嚴制度以宏典常信賞罰以旌淑慝有犯無隱進思弼違服茲寵光尚致予理敬戒休命無替嘉猷可守本官同中書門下侍郎平章事散官勳封如故朕恭承寶位欽若璿衡兢業戒懷懼忝洪搆今皇嗣誕秀既流慶於天枝白茅啟封宜分王於土宇用崇大典式固丕圖長男永植性端莊稟靈聰哲神氣挺於岐嶷和粹精於儀形姿範藹然是用嘉慰將奉聞詩之教冀彰樂善之風俾洽寵恩允膺錫命庶表祥於麟趾爰建社於龜蒙敬哉戒哉無忝我列聖之休德可封魯王仍令有司擇日備禮冊命昔漢宣帝用邴魏以成中興之業我元宗任姚宋以致開元之理其術無他得賢而巳朕猥居大寶首涉五年宵旰靡遑憂勤至切將倚任於國柄宜登進於人傑俾其復運樞極載清化源斷自朕懷允膺僉屬武昌軍節度鄂岳蘄安黃申等州觀察處置等使金紫光祿大夫檢校吏部尚書同中書門下平章事使持節鄂州諸軍事鄂州刺史上柱國奇章郡開國公牛僧孺氣含元精體包大雅識用夷密襟靈沈粹窮聖賢旨奧之學鋪邦國經緯之文蔚為名臣秀出羣萃長慶御歷登賢濟人廊廟有光臣工得職代天協理時乃之休先朝與能出兼征鎮甿俗丕燮師旅大和宣力事君時乃之績朕飽聞器業虛佇風儀會曹參之促裝喜韓侯之來覲便殿延對前席與言通古今理亂之源知教化損益之務其應如響不知所然是宜卿長夏官平章大政康濟四海毗予一人於戲君不能自為堯舜必待其臣以致之臣不能自為伊皐必待其君而任之致則期於盡忠任固在於聳善然後上下交泰君臣相須爾其使百官得其人萬事得其序邪正之路必判清濁之流必分金堅一心扼制羣類無重否德予皆仰成可兵部尚書同中書門下平章事散官勳封如故朝有正人時稱令德入參廟算出總師干方當寵任之臣橫罹不幸之酷殄瘁興歎搢紳所同故山南西道節度管內觀察處置等使銀青光祿大夫檢校司空兼興元尹御史大夫上柱國趙郡開國公食邑二千戶李絳神授聰明天賦清直抱仁義以希前哲立標準以程後來抑揚時情坐致台輔佐我烈祖格于皇天仗鉞宣風聯居樂土乘軒鳴玉嘗極清班先聲而物議皆歸不約而羣情自許漢中名部俾遂便安而變起不圖禍生無兆殲良之慟聞計增傷是極哀榮用優典禮三公正秩品數甚崇式表異恩以攄沈痛可贈司徒仍令所司擇日備禮冊命賻布帛三千段米粟二百石出納大命宰司元化調四氣以統和天人貞百度以鎮安夷夏必資髦傑用委鈞衡朕嗣守丕圖思宏至理萬物之重屬於台臣仄席勤求冀裨不逮況素效久彰於密勿精才巳得於詢謨擢自內庭授以衮職爰立左右斯為得人朝議郎守尚書右丞上柱國賜紫金魚袋宋申錫岳降全德天資正性處約居厚蹈中秉彞文每掇其精華學必探其元賾夙播休問拔乎羣倫自選入周行參我內署奉職恭肅率心坦夷蘊沖用以究國經鋪訓詞以潤王度密賛彌久宏益滋多朕累因暇日召於別殿訪以大政觀其立誠而胸襟洞開肝膈無隱識精詞直實契虛求固可以掖持化權參決理本是用升於鼎鉉付以樞機繇仙闈總轄之司當宰輔具瞻之地熙此庶績弼予一人於戲元首以司牧萬方股肱以協賛皇極上推公以馭下臣竭忠以戴君際會交感而臻大化歷視前古何莫繇斯予方率是道以臨兆人爾宜悉乃心以成一德敬戒厥位永孚於休可正議大夫行尚書右丞同中書門下平章事勳賜如故王者教先立愛義不遺親豈於同氣之中可致異詞之閒如或慎修不至詿誤有聞搆為厲階犯我邦紀未加殛竄尚屈彞章漳王湊手足之親盤石是固居崇寵秩列在戚藩頃多克順之心亦有尚賢之志而滿盈生患敗覆自圖姦兇會同謀議滋及汙我皇化彰於中外初駭予衷載驚羣聽尚以未具獄詞猶資審慎建侯之命姑務從寬於戲朕嗣守宗祧敷宏至教自家之訓未立掩義之私敢忘是用降封有醜朝典凡百多士宜諒朕懷可降封巢縣開國公君臣之道義切初終股肱之良任存正直苟涉邪枉自紊憲章既虧恪慎之心難委弼諧之任正議大夫行尚書右丞同中書門下平章事上柱國賜紫金魚袋宋申錫學習儒門職參翰苑備我顧問洽茲寵光謂其啟沃竭忠擢登鼎鉉而乃踐修不慎自厎愆尤知臣之規俾予增愧欲遏姦回之路宜先懲勸之源豈可猶秉樞機仍司考轄罷居台席列位龍樓誠謂寬恩用全至體朕以事狀之閒慮其冤濫鞫驗之際須務詳明當竚得情以申後命可行太子右庶子散官勳封如故勅正議大夫新授太子右庶子上柱國賜紫金魚袋宋申錫頃由藝文擢處近密謂能潔己可以佐時遂越常資超升大任自參樞務驟易寒暄嘉謀蔑聞醜跡斯露致茲獄訴實駭朝聽俾窮根本亦對詞稱以左驗之閒有所漏網正刑之際姑示寬恩於戲朕自君臨推誠宰輔常務仁恕以保和平豈意魚水之期翻貽吳越之慮撫事興歎中宵耿然是用重難親臨鞫問謀及耆德徧於名卿庶其盡忠頗為審克屈茲彞憲俾佐遐藩凡百具竂宜知朕意弼亮鈞衡宣翼統紀明景化以凝庶績啟嘉謨以建大中爰求國楨以輔台德銀青光祿大夫守兵部尚書上柱國賛皇縣開國伯食邑七百戶李德裕元精孕靈和氣毓德堅直成性清明保躬貞規澹夷敏識沖遠學總九流之奧文師六義之宗令聞夙彰僉諧允屬自提綱柏署掌誥禁闈釐紀律詳平之司竭訏謨密勿之節洎廉察浙右總鎮滑臺再委旌旄緝安邛蜀克有殊政咸懷去思諒惟全才茂此聲績朕以疇庸之典彞訓所先入遷司馬之崇彌積濟川之望是宜納誨朝夕擢居股肱勉宏伊呂之勳以嗣良平之美業傳相印門襲戎旃紹絲綸內職之榮繼鼎鉉中樞之重珪紱之盛恩輝罕儔爾宜罄乃忠貞副我毗倚無忝承命服茲寵光可守本官同中書門下平章事散官勳封如故居端揆之任再踐國鈞稽筦榷之功兼司邦計爰崇舊德以緝新規自朕心用光僉屬金紫光祿大夫守尚書右僕射充諸道鹽鐵轉運等使上柱國代郡開國公食邑二千戶王涯元精降靈體道秉哲恬智成性清貞保躬文行可以經邦風操可以鎮俗以明用晦處貴滋恭憲宗以禁署竭忠擢登輔弼先帝以台階宿望寵授旌旃陰陽燮調藩服寧謐機務允理政經交修洎綜銓九流式序百禮提釐紀律統明貨泉法必便人事先體國聲績茂暢洽於羣謠朕以邊鄙防微猶存兵戍資儲之備供億尚繁頃者支費轉輸任分兩使量入制用誠患多門俾足食以豐財在省員而務是用合此二柄委於元僚正茲通變之初藉我服肱之重勉思率職無或憚煩敬戒乃心欽承休命可守本官同中書門下平章事充度支及諸道鹽鐵轉運使省表具知朕以誕生之日延集緇黃式遵常儀用宏二教卿等啟心輔德叶地納忠稽貞觀開元之舊章述慶善千秋之令範爰崇誕日請號慶成顧予寡昧懼忝彞典今以同歡心於萬國申盛禮於兩宮深嘉誠勤是用依允王者子弟畢封藩戚並建所以式固盤石克茂本枝故澧王大男漢可封東陽郡王第二男源可封安陸郡王第三男演可封臨川郡王故深王大男潭可封河內郡王第二男淑可封吳興郡王故絳王大男洙可封新安郡王第二男滂可封高平郡王故洋王大男沛可封潁川郡王淄王大男澣可封許昌郡王沔王大男瀛可封晉陵郡王祁王大男溥可封平陽郡王仍並賜光祿大夫宜令所司擇日冊命職代天工望歸人傑必資求舊允副僉諧山南西道節度管內觀察處置等使兼興元尹銀青光祿大夫檢校禮部尚書同中書門下平章事上柱國襄武縣開國侯食邑一千戶李宗閔巖廊正人宗室全德才惟不器道實生知粹茂體陰陽之和周旋成禮樂之用外宏踈朗中實誠明白璧凝溫朱絲秉直文窮三變學洞九流早以忠規契於審象雅有元略能宣大猷厎寧戎蠻協賛郊祀見可而進知難靡回啟心常罄其嘉謀造膝必聞其法語行父事君志存於嫉惡皐陶承弼道遠於不仁康濟而金柅有倫燮調而玉燭無爽謇諤勵大臣之節端莊清至化之源修明典章慎選方岳敷我利澤臻於治平自出鎮漢中既周星律巴俗雖歌乎來暮國人頗詠於去思遂用徵還蓋從公望及延召宣室益加前籌是宜再陟中樞直修衮職咨爾良輔其聽朕言夫天地交泰則時和君臣訢合則國治眷求一德出納萬機勉宏如水之心式副濟川之用命官罔及於私昵詔爵必俟於賢能俾庶績惟凝彞倫攸敘無忝注意敬之戒之可守中書侍郎同中書門下平章事散官勳封如故仍歲水旱黎民艱食其宰牧非才貪殘為害及承前積弊須有條流或冤獄留滯速宜䟽決者並委觀察使糾察詳訪具狀聞奏用弭天眚寅亮皇猷丹青景化爰從選衆之舉乃得非常之才前浙西道都團練觀察處置等使朝議大夫檢校禮部尚書持節潤州諸軍事兼潤州刺史御史大夫上柱國姑臧縣開國男食邑三百戶賜紫金魚袋賈餗識達韻孤學深行直貞和自立介特不羣能操至公每契中道聲逸羣聽善諧朕心自尹京師尤彰望實亟召便殿屢陳嘉謀罄肝膈以納忠規推誠明而無外飾察言考事深用得之近命列藩益聞僉論固可以參我大政陟於中樞天啟予懷賚此良弼爾其守法制平鈞衡貞王度以振國經釐百工以凝庶績舉直錯枉當官而行於戲為君之戒在知賢而不任為臣之患在保位而不言罔或依違虧吾則哲可守中書侍郎同中書門下平章事散官勳封如故有國之典本於明罰為君之道必在去邪皇王大政諒無易此姦兇與比誠敬盡虧無君之心因事輒見豈可尚居崇秩猶列東朝銀青光祿大夫守太子賓客分司東都上柱國賛皇縣開國伯食邑七百戶李德裕性本陰狡材則脆弱因緣薄藝頡頏清途既忝藩鎮旋處鈞軸靡懷愧畏肆意欺誣廢撓舊章汩亂彞序賢良盡逐當白晝而重關詭詐是謀逮中宵而萬變朕嘗以寒暑得疾初甚驚人凡百臣子奔走道路而德裕私室宴然全無憂色王涯駐車道左絡繹追呼滿朝傾駭竟以不至又在西蜀之日徵逋縣錢僅三十萬貫使疲羸老弱轉徙溝壑交結異類任用憸人賄賂流行朱紫無辨是宜處之重典以正刑書猶以夙經委使載深寬宥俾佐遐服用示寬恩可守袁州長史馳驛發遣惟昔太宗聰明睿聖克致治平惟魏徵左右文祖叶建皇極矧朕寡薄思紹丕列旁求魏徵之比寘諸巖廊庶裨不逮用厎於道御史大夫李固言生於山東瑞此王國爰在下位早揚直聲介然無朋中立不懼文經邦俗行表人倫和嶠負棟梁之材辛毗有骨鯁之操便蕃華貫光啟令圖日者徵自近郊延於便殿言多方格道不容回嘉謨有倫正色無撓朱絃暢䟽越之韻美玉呈特達之姿洎長憲臺彌彰休問固可以斟酌理本燮調化源疇咨僉同夢卜斯協命爾予翼倚為股肱登於黃樞參我大政爾當一乃心志罄貫忠貞澄清品流旌別淑慝俾四夷左衽咸寧吾教侯伯卿士各稱厥官罔曰難理惟其至公罔曰弗能惟其悉力欽哉戒哉無忝前良可門下侍郎平章事出納王命流品衆職覃理化於區夏謹法度於巖廊是有文可經邦才惟濟代列於百辟之上俾輝三台之光令我夢勞果獲惟肖爰舉並命以寵非常朝議郎守御史中丞兼刑部侍郎上柱國賜紫金魚袋舒元輿杞梓長材金玉正性道懷邴魏詞擅菁英居然不器之能雅蹈中庸之美自擢領綱紀肅清朝廷碩望允歸於應期讜言莫匪乎體國守兵部郎中知制誥充翰林學士賜緋魚袋李訓軒纓鼎族河岳閒賢德茂皐夔文含雅誥窮易悟象繫之表吐論成邦國之經洎參職內庭發揮王度盛業見乎造膝明識藹於伏蒲並沖敏執中端粹不倚咸蘊莫磷之志克宏作礪之規珪璋有聲鸞鳳有采朕常法宮高視所寶惟賢方清化源遂得時傑嗚呼君執象以端扆臣推公以秉鈞夙夜一心小大同體則和天地序陰陽臻乎治平吾所寢寤爾宜率匡國之道明理人之方俾其致君無愧往哲咸陟樞柄佇宏大猷秋官禮闈莫非寵任祗厥成命往惟欽哉往者朕究大易皆訓之義也尚未終卷政事之暇宜三兩日一度入翰林兀輿可守尚書刑部侍郎同中書門下平章事訓可守尚書禮部侍郎同中書門下平章事仍賜紫金魚袋門下王者峻其禮秩所以報殊庸崇其職業所以歸碩望其竭股肱以宣力抱誠明而戴君調四氣以統和天人貞百度以鎮安夷夏勤彰於山澤德冠於巖廊不舉寵章曷示襃勸金紫光祿大夫守司空兼門下侍郎同中書門下平章事兼充宏文館大學士太清宮使及諸道鹽鐵轉運等使上柱國代郡開國公食邑二千戶王涯誠貫金石行通神明氣含元精識洞著蔡窮聖賢旨奧之學擅邦國經緯之文為時而生作予良弼長才推於精敏雅量得其寬和乃者重升帥壇所至必理載踐台席楙昭休勳當險夷之途貞白無染在風雨之晦操尚不衰莅事秉明哲之心臨難有大臣之節執萬機之政柄統四海之利權處劇而神慮益閑在貴而家法愈儉憂國盡瘁罄其訏謨爰自累年江淮水旱煑海之利日用而不虧佐賦之功歲杪而後顯轉輸之利相繼牢籠之資無遺經費有餘時乃之力況邦計之務總領尤難付之均節克有饒羨朕今以茶法稍弊理須變更凡斯重難悉以資委禮當優異式表至公俾進級於三司仍策勳於八命予皆仰成汝其欽哉往踐厥位可開府儀同三司充諸道鹽鐵轉運榷茶等使餘並如故
