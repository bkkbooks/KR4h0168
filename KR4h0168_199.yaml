front:
  text: 全唐文欽定全唐文卷一百九十九駱賓王三
  hash: sha256:93ceaf9d3bdee389705767f76455b838b6278cfe38aa5d28c9a4701ae058ddd6
body:
  text: 偽臨朝武氏者性非和順地實寒微昔充太宗下陳曾以更衣入侍洎乎晚節穢亂春宮密隱先帝之私陰圖後庭之嬖入門見嫉蛾眉不肯讓人掩袖工讒狐媚偏能惑主踐元后於翬翟陷吾君於聚麀加以虺蜴為心豺狼成性近狎邪佞殘害忠良殺子屠兄弒君鴆母神人之所共疾天地之所不容猶復包藏禍心竊窺神器君之愛子幽在別宮賊之宗盟委以重任嗚乎霍子孟之不作朱虛侯之已亡燕啄皇孫知漢祚之將盡龍漦地后識夏庭之遽衰敬業皇唐舊臣公侯冡子奉先帝之遺訓荷本朝之厚恩宋微子之興悲良有以也袁君山之流涕豈徒然哉是用氣憤風雲志安社稷因天下之失望順宇內之推心爰舉義旗以清妖孼南連百越北盡三河鐵騎成㣥玉軸相接海陵紅粟倉儲之積靡窮江浦黃旗匡復之功何遠班聲動而北風起劍氣衝而南斗平喑嗚則山岳崩頹叱咤則風雲變色以此制敵何敵不摧以此攻城何城不克公等或居漢地或叶周親或膺重寄於話言或受顧命於宣室言猶在耳忠豈忘心一坏之土未乾六尺之孤安在儻能轉禍為福送往事居共立勤王之勳無廢大君之命凡諸爵賞同指山河若其眷戀窮城徘徊岐路坐昧先幾之兆必貽後至之誅請看今日之域中竟是誰家之天下移檄州郡咸使知聞尚書兵部臣聞北極列象六合奉天子之尊南面乘乾一統成聖人之業是知衣裳所會義有輯於殊鄰霜露所均誠兼育於異類故塗山萬國誅後至者防風丹浦一戎緩前禽者就日然則利弧矢以威天下法雷霆以靖域中四時行焉天道不能去殺五兵備矣皇業所以勝殘雖事切救焚苟順時以濟物恩深祝網不獲巳而用兵伏惟皇帝陛下登翠媯以握圖憲紫微而正象元功不宰混太始以凝神至道無名佇華胥而得夢闡文教以清中夏崇武功以制九夷環海十洲通波太液之水鄧林萬里交影甘泉之樹反踵穿胷之域襲冠帶以來王奇肱儋耳之酋奉正朔而請吏逆賊蒙儉和舍等浮竹遺種沈木餘苗邑殊禮義之鄉人習貪殘之性日者王明廣燭帝道遐融頗亦削左衽而被朝衣解椎髻而昇華冕而豺狼有性梟獍難馴遂敢亂我天常變九隆而背誕負其地險攜七部以稽誅騷亂邊疆皮襄皮州郡是用三門授律長驅無戰之師五月渡瀘深入不毛之地去月二十一日軍次三朏崑崙鎮前後捕得生口知守捉山羌傍山連結十部蠻首徒五萬眾此山即南郡中之巨防也岡蠻千里西通大荒之郊溪谷萬重南極炎洲之境聳喬林而插漢陰兔有假道之標拔崇巖以隱天陽烏無迴翼之地峯危束馬路絕懸車賊踞臨岱之形負建瓴之勢徵風召雨蝟起蜂飛驅雜種以挺灾封狐千里肆沈黎而作孼雄虺九頭臣以為制敵以權柔遠者祇成於德教伐叛以義決勝者不在乎干戈於是廣布朝恩恭宣帝澤申之以安撫曉之以存亡信重蠻陬無負黃龍之約賞隆漢爵不渝白馬之盟而地接冉駹詞屢殫於喻蜀俗通槃瓠聲不輟於吠堯臣遣左三軍子總管寧遠將軍前守右驍騎萬安府長史折衝都尉上柱國劉會基率檢校果毅驍騎尉井陘縣開國男劉元暕等銜枚遠襲卷甲前驅偃危斾而設潛兵疑從天落乘間道而掩不備若出地中又遣右三軍子總管明威將軍行右武衞翊府中郎將上柱國高奴弗率左武衞天水府折衝都尉張仁操等陟南山之南衝其要害之路又遣左一軍子總管前右金吾衞翊府左郎將上柱國孫仁感率衞尉府右果毅都尉王文雅等陵北山之北絕其飛走之塗賊首領楊虔柳諾沒弄諾覽斯等振螳螂之力拒轍當輪縱蚊蚋之㣥彌山滿谷劉會基高奴弗孫仁感等並忠勤克著知略遠聞識明君之重恩輕生有地提太阿之神劍視死無時彎弧而兇黨土崩舉刃而妖徒瓦解雖危苕沸鼎未窮梟首之誅救死扶傷猶致析骸之爨二十二日臣遣副總管兼安撫副使定遠將軍前左驍騎翊府中郎將令狐知通率右武衞良將壯府左果毅都尉韓惠德等擁貔豹之雄順天機而左轉遣管內安撫副使朝議大夫使持節守銀州刺史上柱國宜春縣開國男李大志率前左武衞靜初府右果毅都尉上柱國陳宏義等驅象犀之卒乘地軸以右迴又遣行軍司馬朝散大夫守嶲州都督府長史上柱國梁待辟率守右金吾衞宜昌府果毅都尉閻文成等總投石拔距之材蹈中權而拊其背又遣前守右威衞龍西府果毅都尉康留買等騰躍鐵歕金之騎犯前茅而扼其喉臣等率守左衞清宮府左果毅許懷秀等橫玉弩以高臨縱金鉦而直進元雲結陣影密西郊赤莖揮鋒氣衝南斗飛塵埃而匝地白日為之晝昏掃氛祲以稽天滄溟為之晦色兵交刃接鳥散魚驚自卯及申追奔逐北斬首千餘級轉戰三十里激流膏而為泉似變萇宏之血委亂骸而擠壑若泛鼈靈之屍既而照盡高舂雲昏乙夜賊乃收集餘眾保據重巖臣度彼遊魂慮其宵遁使三軍齊進四面合圍二十三日乘魚爛之危啟蛇行之陣揚麾誓眾杖節訓兵一鼓先登賞必懸於芳餌九攻桉律罪無赦於嚴誅五部雄材三河俠少或生居燕地尤工即墨之圍或家本秦人早習昆明之戰叱咤則江山搖蕩慷慨則林壑飛騰舉鵬力以揚威燿犀渠而賈勇澄氛廓祲回夏景以潰春冰滅迹掃塵若霜風之捲秋蘀戰踰百里時歷三朝前後生擒四千餘人斬首五千餘級諾沒弄楊虔柳等殞元行陣懸首旌門蒙儉和舍等委眾奔馳脫身挺險雖復刑以止殺丁壯咸伏於誅夷禮不重傷班白必存於寬宥昔魏臣賦蜀徒聞蒟醬之奇漢使開卭纔通竹杖之利豈若膺紫泥而弔伐指丹徼以臨戎一戰而孟獲成擒再舉而哀牢授首斯並皇威遠暢廟略遐覃奉元猷以配天徒知帝力掩皇輿而闢地豈曰臣功無任慶快之誠謹遣某奉露布以聞軍資器械別簿條上臣聞七緯經天星墟分張翼之野八紘紀地炎洲限建木之鄉西距大秦雜金行而布氣南通交趾枕銅柱以為鄰俗帶白狼人習貪殘之性河淪赤虺川多風雨之妖水積炎氛山涵毒霧竹浮三節肇興外域之源木化九隆頗為中原之患年將千紀代歷百王鄭純之化不追孟獲之風逾煽故三年疲眾徒聞定笮之譏五月出師未息渡瀘之役然則大人拯物上聖乘期法乾坤以握樞體剛柔而建極知仁義不能禁暴設刑網以勝殘知揖讓不可濟時用干戈而靖亂伏惟皇帝陛下祥摛戴玉拓地軸以登皇道契書繩掩天紘而踐帝元雲入戶纂靈瑞於丹陵蒼籙升壇薦禎圖於翠渚垂衣裳以朝萬國崇玉帛而禮百神昭儉防奢露臺惜中人之產宣風布政明堂法上帝之宮致㣥生於太和登品物於仁壽四神踐雪五老飛星君囿祥麟樂班文於仙卉女牀鳴鳳韻歸昌於帝梧四隩同文五方異色鄧林萬里纔疏苑囿之基曾城九重未出池隍之域六合照臨之地候月歸琛大鑪覆載之間占風納賮蠢茲蠻貊敢亂天常橫赤熛以疏疆背朱提而設險山林萬仞巖邑千尋望秦阜以相傾崤陵失四塞之阻對梁山而錯峙劍門成一簣之峯自謂絕壤遐方中外足以迷聲教憑深負固江山可以逃靈誅不知玉弩垂芒凶水無九嬰之沴瑤階舞戚洞庭有三苗之墟臣等謬以散材忝專分閫自白招乘候順秋帝以揚旌絳節臨邊通夜郎而解辮雲開嶲穴斾轉卭川峻岐折坂之危盡忘襟帶滇池漏江之固曾莫籓籬唯逆賊設蒙儉等未革狼心仍懷豕突陸梁方命旅拒偷生城接祠雞竟無希於改旦山多神鹿終未息於擇音臣以大帝宣威有征無戰明王仗順先德後刑宏聖澤於中孚緩天誅於大造庶南薰解慍仰雲闕以翔魂東律變音扣轅門而頓顙而祝禽踈網徒開三面之恩毒虺挻災逾肆九頭之暴乃鳩集餘眾蟻結兇徒儋耳椎髻之渠千里霧合鑿齒雕題之孽一呼雲屯淩石菌以開營拒巖椒而峻壘崇巒切漢若登藏寶之山絕壑憑霄似瞰封泥之谷以前月十七日連營布陣踞險揚兵東西三十餘里馬步二十餘萬聚蚊蚋而成響聲若雷霆縱蛇豕以為㣥氣衝宇宙臣遣中郎將令狐智通等擁拔山超海之師當其步陣遣銀州刺史李大志等驅躍景騰雲之騎乘其馬軍遣嶲州都督府長史行軍司馬梁待辟等領勁卒三千絕其飛走之路遣臨源府果毅馬仁靜等勒精兵九百斷其潛伏之軍臣率行軍長史韓餘慶等負霜戈而直進指雲陣以長驅庶令斬馘七擒戰士挾雷公之怒伏屍百里蠻夷識天子之威於是三略訓兵五申誓眾先登陷敵無遺大樹之功后拒亂行必致曲梁之罰楚人三戶蜀郡五丁氣擁元雲精貫白日喑嗚則乾坤搖蕩呼吸則林壑沸騰列旗幟以雲舒似長虹之東指橫劍鋒而電轉疑大火之西流刃接兵交洞胷達腋自辰踰午魚爛土崩沸殘息於層峯更切守陴之哭積圓顱於重阜殆成京觀之封唯賊帥夸干未悟傾巢之兆敢懷拒轍之心獨率馬軍憑川轉鬬驚塵亂起六合為之寢光殺氣相稽四溟由是變色副總管李大志忠唯殉國義則忘軀臨危而貞節逾明制敵而神機獨遠丹誠自守雖九死其如歸白刃交前豈三軍之可奪投袂則妖徒霧廓搴旗而逆黨氷摧於是乘利追奔因機深入困獸猶鬬如戰廩君之魂窮鳥尚飛如驚杜宇之魄斬甲卒七千餘級獲裝馬五千餘匹僵尸蔽野臨赤坂而非遙流血灑途視丹徼以何遠首領和舍等並計窮力屈面縛軍門寬其萬死之誅宏以再生之路唯蒙儉脫身鋌險負命窮山顧巢穴而靡依延晷漏其何幾况妖徒革面徼外非復他人部落離心舟中皆為敵國瞻言梟首指日可期凡在歸降隨事招撫與之經始復其故業首邱懷戀疑臨故國之墟安堵知歸似入新豐之市然后班師遯水振旅禺山建鴻勳於武功暢元猷於文教庶荒陬襲中邦之禮邊疆息外戶之虞華封祝堯兆皇基於千載夷歌頌漢美王澤於三章宜與夫天帝前星廣賜秦公之冊坤元益地遙開王母之圖蓋亦有云曾何足紀斯並元謨廣運廟略遐覃一戎而荒景肅清再鼓而邊隅底定豈臣等提戈擐甲克全百勝之功仗節揚麾能通九變之策詣藳街而獻旅大帝成規聞杕杜以勞旋小臣何力不勝慶快之至謹遣行軍司馬朝散大夫守巂州都督府長史上柱國梁待辟奉露布以聞軍資器械別簿錄上夫以五岳棲真杳眇清溪之上六爻貞遁寂寥滄海之濱斯並激俗矯時獨善之風自遠懷材蘊智兼濟之道未宏長史公元牝凝神虛舟應物得喪雙遣巢由與許史同歸寵辱兩存廊廟與山林齊致乘展驥之餘暇俯沈犀以開筵曲浦澄漪似對任棠之水芳亭興洽如歸山簡之池加以秋水盈襟寒郊滿望洲渚肅而蒹葭變風露凝而荷芰疎忘懷在真俗之中得性出形骸之外雖四子講德已頌美於中和而五際陳詩未形言於大雅爰命虛諛題其序云弁側山頹自有琴歌客操觚染翰非無池水助人盍各賦詩式昭樂事云爾白帝徂秋黃金勝友解塵成契冒雨相邀問涼燠則鴻雁在天敘交游則芝蘭滿室砌花舒菊還同載酒之園岸葉低松直枕維舟之浦參差遠岫斷雲將野鶴俱飛滴瀝空庭竹響共雨聲相亂仰折巾於書閣行閱飄麰挹雅步於琴臺坐聞流水字中蝌蚪競落文河筆下蛟龍爭投學海珠簾映水風生曳露之濤錦石封泥雨濕印龜之岸泛蘭英於戶牖座接雞談下木葉於中池厨烹野雁墜白花於濕桂落紫蒂於疎藤雖物序足悲而人風可愛姓名於金谷不謝季倫混心迹於玉山無慙叔夜夫天下通交忘筌蹄者蓋寡人間行樂共烟霞者幾何㣥賢抱古人之清風翫新年之淑景情均物我緇衣將素履同歸迹混汙隆廊廟與江湖齊致於時春生城闕氣改川原聞遷鶯之候時行欣官侶見游魚之貪餌坐悟機心加以慧日低輪下禪枝而返照法雲凝蓋浮定水以涵光忘懷在真俗之中得性出形骸之外雖交非習靜多慙谷口之談然醉可逃諠自得山陽之氣詩言志也可不云乎黯然銷魂者豈非生離之恨與帝里天津槐衢分黑龍之水巴陵地道楓江連白馬之門親友徘徊締歡言於促膝故人樽酒掩離涕於交頤於時晚吹吟桐疑奏別離之曲輕秋入麥似驚搖落之情白日將頹青山行暮想姑蘇之地夕露沾衣望吳會之郊斷風飄蓋嗟乎岐路是他鄉之恨溝水非明日之歡玉斗臨吳太阿之氣可識金陵背楚小子之路行遙盍各賦詩式昭離緒分首三春送君千里青山白日非舊國之春秋翠斚清樽是他鄉之盃酒况復圭峰南望切登高之情渭水北流動臨川之嘆於時寒光將歇春景未華殘雪飄花猶開六出輕氷涵影未解三川晨風軫孫楚之情岐路下楊朱之淚雖載言載笑賞風月於離前而一詠一吟寄心期於別後詩言志也可不云乎麴錄事務切皇華指輪臺而鳳舉㣥公等情敦素賞臨別館而鳧分促樽酒而邀懽望山川而起恨於時露團龍隰雲斂雁天落葉響而庭樹寒殘花疎而蘭皋晚聞秋聲之亂水已愴分溝對零雨之飄風倍傷岐路五日之趣未淹蘭籍之娛二星之輝行照葱河之境清飆朗月我則相思隴水秦川君方嗚咽行歌不駐遽驚班馬之嘶贈言可申聊振飛魚之藻人探一字一韻一篇夫人生百齡促膝是忘言之契大夫四海交頤非贈別之資然而想山川之遽遙送歸將遠惜歲華之不待行樂無時是用輟征驂以少敞離亭而多暇山芳襲吹坐疑蘭室之中水樹含香宛似楓江之上加以御溝新柳近入離絃賓館餘花遙催別酒既而滎波東注灞岸南登綠蟻傾而高宴終金烏落而離言促雖相思有贈終結想於華滋而素賞無暌盍申情於麗藻人為四韻各賦一言夏日江干駕言臨眺於時桂舟始泛蘭棹初遊鼓吹沸於江山綺羅蔽於雲日女便娟舞袖向綠水以頻低飄颺歌聲得清風而更遠是以臨波笑臉艷出浦之輕蓮映渚蛾眉麗穿波之半月靚粧舊飾此日增奇絃管相催茲辰特妙能使洛川迴雪猶賦陳思巫嶺行雲專稱宋玉凡諸同好請各賦詩云爾昔挂瓢隱舜蹈箕山而不歸解組逃齊泛滄波而長往咸用潛心物外擯影邱中豈若儗迹小山陶心大隱叶仲長之怡性偶潘岳之棲閑㣥公或道合忘筌契金蘭而貴舊或情深傾蓋披玉葉以交新於時玉女司秋金烏返照烟含碧篠結虛影於鱗枝風起青蘋動波文於翼態庭榴剖實擎丹彩以成珠岸石澄瀾泛清漪而散錦既而誓敦交道俱忘白首之情欵爾連襟共挹青田之酒不有雅什何以攄懷共引文江同開筆海云爾元武山有聖泉焉浸淫歷數百千年垂巖泌湧接磴分流下瞰長江沙堤石岸咸古人遺迹也茲乃青蘋綠芰紫苔蒼蘚遂使江湖思遠寤寐寄託既而崇巒左岥石壑前縈丹㟧萬尋碧潭千頃松風唱響竹露熏空瀟瀟乎人間之難遇也方欲以林壑為天屬琴樽為日用嗟乎古今代謝方深川上之悲少長同遊且盡山陰之樂盍題芳什共寫高情余以三伏晨行至七里瀨此地即新安之江口也有嚴子陵釣磯焉澄潭至清洞澈見底往往有㣥魚戲歷歷如水上行舟人有釣者試取餌投之或有游而不顧者或有貪而輒吞之者引竿而舉因以獲焉其始出也掉尾揚鬐有若恃力而自免其少退也則鼓鰓濡沬有似屈體而求哀嗟乎勢牽於人道窮乎我將欲以下座而歌馮子又安能中轍而呼莊周哉余乃祝之曰猛獸搏也拘於檻穽鷙鳥攫也縶於樊籠素龜靈也被髮河津白龍神也挂鱗且網何不泥潛而穴處何故貪餌而吞鈎乎於是放之江流盡其生生之理時同行者顧詰余曰夫至人之處世也擬迹而後投隱心而後動終始不易其業悔吝不乖其情而吾子沈緍於川登魚於陸烹之可以習政術羞之可以助庖廚曩求之將何圖今舍之將何欲余笑而應之曰聖人不凝滯於物智士必推移於時知幾之謂神含生之謂道殷乙聖也囚於夏矣孔某賢也畏於匡矣以明哲之賢尚罹幽憂之患况鱗羽之族能無弋釣之累哉故曩吾有心也恐求之不得今吾無心也既得之而亡求夫求與舍不亦雙美乎烹與羞不亦兩傷乎况療饑者半菽可以充腹為政者一言可以興邦亦奚必因小鮮而後明三異之規勦大命而後寄一飧之飽擒而不殺可不謂仁乎獲而不饗可不謂廉乎且夫垂竿而為事者太公之遺術也形坐磻溪之石兆應渭水之璜夫如是者將以釣川耶將以釣國耶然後知古之善釣者其惟太公乎又有妙於此者其惟文王乎夫文王制六合為鈎懸西伯為餌薦之於清廟投之於巨川一引而獲太公再舉而登尚父由此觀之蹲會稽而沈犗者鮑肆之事也踞滄海而負鼇者漁父之事也斯並眇小者之所習安知大丈夫之所釣哉惟靈降精辰象委質昌期棄筆文場早徇封侯之志彯纓武帳坐昇戎秩之榮屬滇浦挻妖昆明習戰應星文而動將奉天罰以揚威不能宏妙筭於五戎叶神謀於九變致令王師失律兇狡憑陵巂穴南臨同五溪之深入卭關北阻類雙崤之不歸亭候多虞故有負於明代春秋責帥豈無愧於幽途夫任賢與能明君之事也陳力就列忠臣之義也雖見危授命固誠節之有餘臨難權機何智謀之不足嗚乎哀哉某猥以散材謬專分閫途經夷落路踐戎場停疲驂於九原悲來有地痛遺骸於四野泣下無從暫輟征旅之勤爰崇掩骼之義庶幽靈有托梧邱息入夢之魂壯士不還薤露起送終之曲嗚乎九真邊徼萬里長安城危䟽勒山峻皋蘭因原為隴即壤成棺夕陰曦而平蕪晦秋風急而荒戍寒嗚乎哀哉異域幽埏但有新栽松柏他鄉古木非復舊邑枌榆感平生其若斯聊申絮酒倘聰明之不昧式薦簞醪
