front:
  text: 全唐文欽定全唐文卷一百八十四王勃八
  hash: sha256:5aa5320bef035cc685fd58d9fe146787970ec5879fedf097322448f82f194a0b
body:
  text: 若夫仙樓白玉窈冥崑閬之墟神闕黃金寂寞蓬瀛之浦斯則岡巒髣佛稽鳳冊而空存島嶼憑陵舟羲龍舟而罕逮至若按皇軒於夏籙考璿構於殷圖周王北洛之宮秦帝南山之閣西京故事下聽雷霆東國餘基俯臨風雨莫不陵遷谷變共榛灌而邱墟火絶烟沈與風雲而坱莽其有據坤靈之寶位借神道之冥扶占象緯而圖基揆川原而宅址蜂臺映月還臨舍衛之城雁塔尋雲即對耆闍之嶺成而不毀者將斯之謂歟兜率寺者隋開皇中之所建也爾其林泉糾合之勢山川表裏之制抽紫巖而四絶謺丹峯而萬變連溪拒壑所以控引太虛蒸雲駕雨所以蕩泄元氣涪江千仞波潮將旭日爭光都城百雉甍棟與晴霞共色信造化之奇模盡登臨之妙境元房霧轉抗金樞於桂岊之前紺殿星開栖玉剎於梅林之下巖花落沼近拂天衣澗葉低陰斜籠寶座宵汀鶴警乘鼓吹而齊鳴曉峽猿清挾霜鐘而赴節若乃巡碧磴歷元階瑣窗澄彩瓊鋪洞照神姿滿月疑臨石鏡之峯衆馥揚烟似對香爐之嶽信可下清人境上配天都為勝地之先鳴執名山之右契者也爰有信弟子某乙等夙祛塵網早植慈根悲梵室之未宏悼禪居之猶褊以為上棟下宇河圖避風雨之災廣榭崇臺時令著高明之宅是以菩提長者競潔舍衛之壇天帝人皇爭闢仙宮之塔則知威容下麗㣥生解瞻仰之因材朴重雕黎人有子來之地乃於寺內建浮圖一所某年月日鄉望等兆基宏願繼發淨因陵轢中天規模大壯高列砌架迥浮輊軒直上千尋周回百步占氛候景神祇叶幽贊之功揆墨端行班倕逞絶㣥之思收岱宗之梓聚崑山之玉石土兼五色金逾百鍊龍蟠萬栱策屏翳而高驤鶴矯千楣冠扶搖而獨運重簷靄靄雲將反覆於櫺軒洞宇寥寥風伯栖遑於戶牖仙娥去月旅方鏡而忘歸寶婺辭星攀圓璫而未返元甍湛䨴若鵬飛之戾九天丹楹聯騫如鳳翔之據九仞每至韶光照野爽靄晴遙列郊墟於四野開雲氣於千里風恬雨霽烟霧藻天地之容野曠川明風景挾江山之助則有雕簾繡軸排淨域而停輪寶騎銀鞍指珍臺而聳轡於是披岫幌抵巖扃攀翠復而三休步元梁而十憩廊軒外敞淑氣長延陰室中開鮮飈自激俯環瀛而極望積蘚非遙出雲漢而高踐靈槎可託真福地之殊觀香城之巨麗者乎寺主等沈研二諦振耀三明抵蒼璧於邪山攬元珠於定水挹其流者曲成般若之緣承其風者濬發菩提之願長史河東裴某風神朗潤操履貞勤蕭條江海之心磊砢冰霜之節下岷關而叱馭寄切全都臨蜀野而宣條功深半剌縣令衛元海內高流河東望族榮高銅墨任屈絃歌浹辰而風化大行踰月而姦豪屏氣陶潛彭澤自得高人王吉臨卭仍延重客縣丞胡敬仁三河舊族一代良材提鏌鋣而願割局驊騮而待步江湖秋至方懷縱壑之圖海浪風高未接垂天之翼鄉望等並中和受氣孝友承家才稱江漢之靈地實岷峨之秀或以時良入選擢迹鄉鄰或以朝望來儀升名郡縣並沐康衢之化俱承比屋之封瞻彼岸而同歸登春臺而共樂咸以垣墉遽覆猶傳路寢之歌銀鼎俄窮尚勒靈臺之頌况乎崇基奕奕與天地而爭工層構峩峩配山川而永固豈可使宏規在我空存蔽日之基雄筆同時不借淩雲之氣謹聞命矣乃作銘云二象成紀三才定位開剖太虛導引元氣紛紛化迹飈飈聖致行傑趣約歸同棄異法王西眷教迹東遊功超道茂義冠儒流丹青既備棟宇旋周梵宮霞積香閣星浮緬想蓬瀛金臺迥起曠瞻崑閬瑤房峻峙壯矣名都神居攸止大哉英服茲峯誕紀金繩對嶺玉榜分岑松扃委鬱桂幌深沈雲龕樹晦烟洞花深重巒霧結復澗泉吟肅肅禪衆遙遙淨鏡鹿野經文龍宮佛影梵臻金室光來石井峽曉猿清池曛鶴警岷峨舊族江漢英姿爭開法願重峻崇基占雲接廡揆景分墀天人合應幽顯呈期靈思孤出神模獨湧霧積千楹霞張萬栱玉牖星羅璿璫月擁復榭龍蟠重甍鳳聳峩峩峻岊奕奕崇標雕簷切漢寶綴淩霄深窗閟景洞戶流飈銀釭夕映珠鐸晨搖我辭秦隴來遊巴蜀勝地歸心名都憩足甫建鄉縣頻移灰燭聿從良時仍尋妙躅曠望原陸周流江汜桃李春風芙蓉秋水烟霞四面關山千里他鄉寓目茲焉復幾昔者萬人疾疫神農鞭草而救之四維凋瘵夏禹刊木以除之豈非物外其性則道功出事其和則任跡著傍稽素篆仰叩元扉即時義而規大覺因彞倫而佇真諦向使三災克殄八正咸修人握戒珠家藏寶印則三十二相不可得而視也八萬四千法不可得而聞也然則聖人以運否而生神機以道喪而顯况迦維授手摩竭推心高張妙用之功自拯橫流之弊蓋不獲已豈徒然哉故能業擁大千化形真一由樂推而起七覺因來蘇而坐三昧發揮五演以寂滅為身常提挈四流用慈悲為化迹黑風宵遁波旬忘反噬之心緑沼晨開天常識問津之所括夷塗於九相蹇步其安納慧晷於重昏迷方自曉大矣哉應物而起興運而終至自於崑冥復歸於無物雖金沙宴駕雙林無可作之期而玉牒遺文六塵有經行之俗象法不可以無主微言不可以遂喪六千羅漢競結香緣五百仙人分開講肆星龕月殿俄盈震旦之墟鳳剎霓旌坐遍閻浮之域屈伸闔闢其道矣哉夫寶莊嚴寺舍利塔者梁大同三年內道場沙門曇俗法師所立也其琅邪貴族則漢庭峻節祖德猶傳梁甫高吟嘉聲未遠法師夙登真地深入慧門照果業於三明拂塵勞於八解羊車綺歲懸欣半月之詞鳳閣觿年已振彌天之響道惟堅固行乃頭陀百結斯安斥羅綃而不御十珍雖貴對藜藿而甘心於時以丕應天人大宏緇侶法師至誠幽感獨步元宗豈直王公欽振錫之風固亦天子降同輿之禮寶瓶宵注則雨露隨軒玉柄朝撝則風霜滿席既而素懷有在潛營擯俗之圖爰定我居首托棲霞之寺爾乃巖開石霤邑跨金陵魚峯多讚唄之歡虎溪有送迎之限紫蘿山徑居藏勝緣青松澗戶坐諧幽致枕石潄流者久之原夫見化有緣應身欲謝昊天罔極追懷自遠故有諸天會聚共位神光列國交兵闕三字譯求其致豈不深哉然則麟鳳下靈猶稱瑞貺玉石微玩尚騰精彩亦有楚鐸淪照擢紫靄以衝星周鼎沈華吐黃雲而噴景誠浩作者之述足稱希代之貴况乎釋迦妙相如來真骨雖八萬四千之寶塔散在㣥方而九十二道之靈虹終聞間出立誠斯應瞻庭廡而時逢非德不鄰歷山川而罕致是以憂填頓顙思存電下之光波匿投身願奉巖間之影粵在梁武精求不暇以為秦登碣石而事止尋仙漢索瀛洲而心非好善於是齊筵鳳設上祈忉利之宮講帳星隨下請龍王之藏輕齎棹海重賞梯山庶玉匣之全移幸金棺之半啓以法師智遺人我識洞幽明思假妙因冀通靈感爰承綸綍載踐滄溟過石門而右指歷銅標而左顧乘桴月沂戒楫星沼相彼遐陬實維荒裔一音演說本承聽受之鄉五日繼明素隔照臨之域珍奇乃萃聖德攸傳則知有感必臻信覃幽境不行而至豈隔殊方法師既達國城式敷朝命受銑筐而頂禮撫瑤緘而跪發盡收其寶重載而歸亦猶珠匿弊衣須馬鳴而後用金藏陋宇待龍樹而方開梁氏之都妙算而仰神光家之繇也十四字疑有脫誤炎涼可質往返九十旬楫柂不輟風潮八千里以大同三歲届於茲邑法師性豐幽淡質固虛羸綿歷是淹疲疴屢積維摩見病益伸方便之門道安謝歸思遠朝廷之事願居此剎有詔許焉仍分舍利俾宏真福國惟甌絡郡實番禺爾其封疆跨躡之壯海陸會同之衝上當星紀下裂坤維階百越而鄰三吳軹雕題而陬交趾神仙氣色汀洲建不死之鄉舜禹精靈原隰現行宮之地閭閻霧撲士女雲流謳歌有霸道之餘毗俗得華風之雜蜃樓高峙猶埋夕帳螺臺峻積尚識朝基信夷夏之奧區而仙靈之窟宅也此寺乃曩在宋朝早延題目法師聿提神足願啓規模爰於殿前更須彌之塔因緣盛力人以子來徵日官而正墨集風師而舉草育王奔命掃地戶而獻神兵梵事馳心感天官而下靈匠崇階遽積寶樹俄周不殊仙造還如湧出故其粉畫之妙丹青之要璿基岌其六峙雕關紛其四照仙楹架雨若披雲翳之宮綵檻臨風似遏扶搖之路散華璫於月徑璧合非遙撥網於星潯珠連可驗玉虬承霤傃雲竇而將騫金爵提甍拂烟衢而待翥瑤窗繡戶洞達交輝方井圓泉參差倒景雕鐫備勒飛禽走獸之奇藻繪爭開復地重天之變懸梁九息良馬踆走而未窮謺磴三休的盧騁犍而知倦是栖銀槨用府瓊函採舍衛之遺模得浮圖之故事爰自梁末以迄皇初城邑屢新軒墀若舊雖復百魔蜩沸聽鼓鐸而懷音六賊蜂屯仰椽欒而革面多回淨施罕犯仁宮則知遐吹所會斯同偃草慈雲所潤豈直流根故能比蜀守之祠堂長為典制均魯王之祕殿若有明徵宜其作鎮一隅俯炎荒而獨秀盤基有地冠終古而長存者乎國家業擁太初事用皇極高祖以援危撥亂伏紫氣以登三太宗以端拱繼明自黃離而用九皇上纘乾坤之令業振文武之英風太階平而百度理中國定而兆人樂時和歲阜邑頌塗歌以五刑不用六械徒設舟車四達難論貢賦之差襟帶八荒非復華夷之隔天寶降地符升木石甄祉飛沈效慶雖叶和制變實賴文思之功而持盈守成亦資連帥之助大中大夫使持節廣韶等州都督李某早登清貫夙踐崇軒嘉猷迥發於天朝善政果行於朞月越溪仙鍔吐光芒而駭人岱嶺寒松排風飈以成性美哉稱由功著鶻響徹於雲霄方為時須熊軾疲於道路廣陵單轂如送張綱浡海亂繩復思龔遂王尊皂蓋欣臨折坂之前吳隱朱軿更集貪泉之右高名夙著佛化橫飛㣥盜屏跡而歸農姦吏聞風而去職京坻坐積圄犴潛回汲黯之臥淮揚直聞清淨王堂之居汝郡但舉賢良用能使檻穽不施猛獸巡江而遠竄市廛無擾商旅倍道而相歡颶風寢毒炎埃罷厲人稱有道家實無為加以援翰寫心自契真廉之旨高談見意不踰元默之津學究儒林真窮釋部知通人事且味禪宗道可以知歸物繇其顯會是歲也忽於此塔重覩神光玉林照灼金山具足倏來忽往類奔電之含雲吐焰流精若繁星之轉漢傾都共仰溢郭周窺士女幾乎數里光景動乎七重實孟冬之日也觀夫至道不私瑞生必由乎樂國慶基有會福至必依於善人自非化足動微教非飾迹何以發真如之盛契壯實相之輝華在昔鳳集潁川宣后歸功於良守龍游湘浦章帝布德於賢臣歷選前猷茲為故實然後上和下睦主聖臣良滅火返風雖有辭於進壤母修子應亦何愧於當仁至於百越衣纓三闕耆老或代傳篁竹氣推丹桂之城家擅芝蘭名動蒼梧之野出平原而袪甲擁崇闥以鳴鐘並為蕃部之恩親覩招提之瑞同祈介福共潔齊壇罄龍象於南州盡衣鉢於西竺會吞方仗供備盂蘭法鼓振而沙界肅洪鐘鏘而鐵圍淨妙財爰捨法施爭流華轂牣於香城文駟填於寶廣既鏹藏巨億更入僧田價直百千還登佛座豈徒照車十乘列隋氏之明珠盈篚萬金積大顛之寶具而已朝散大夫守長史某地乘華緒價偃名流豫章擢而成幹騏驥生而躡影山濤天骨無情吏隱之間王衍風神自出塵埃之表自忝榮嶺海作式瀛幽略其小術包其大體振溫良之逸步得毗贊之宏綱布道移風善寵邦政歸休置驛獨守家聲然則野老行歌雖致功於露冕藩君坐嘯固藉美於題輿化成異壤抑由同德故能道揚法教揮斥蓋纏家懷方廣之恩人慕韋陀之學傳燈繼爌曳組成陰下逮府寮旁周縣寀並志薰修同希福慧時有明威將軍行禺府折衝都尉李公天子之舊屬朝廷之夙將也靈根自遠聖族多奇受睇盼於甘泉奉衣纓於平樂青龍帶劍先超殿閣之榮白虎銜珠早陟齊壇之寵自招皇誕作鎮邊城湟水樓船遂勞都尉灞陵車馬尚識將軍魂驚斷雁之峯恩盡沈鳶之浦濡鱗涸轍處定水而彌勤撫翼香林在窮途而更切頻光法會薦委殊珍護持攸仰招提是屬其兆基也如此經綸黼藻其大矣哉爰有上座寶輪等並妙根宿值勝果將圓翰飛般若之林高步檀那之舍慈襟密洞散明月於談筵智鍔相輝化繁霜於寶刃思雕琬璧式播徽猷弟子家嗣太邱忝閨門之薄宦地連睢渙竊藻繪之餘工爰託下才用旌高躅豈知仲宣旅泊方銜深井之悲長卿罷歸空負淩雲之氣我之懷矣乃作銘曰太息頽運嗟乎失道德弊為仁物壯則老縶猿情暗求梟計早赤水沈珠元邱墜寶皇矣妙覺蒸然應期宗深微妙業奧慈悲燃燈匡俗捨筏濟時槃不住般若無思俯迹見生和光不滅色音雖昧規模尚切猗歟上人穆彼惟新智傾八藏心超六塵凄涼燬宅解脫迷津鴻冥佇想龍蟄存身青蓋遺邦黃旗故服原隰形勢江山重復澗戶秋明巖盤夜燭鼓鐘於宮聲聞於外聿求紫闥言尋丹瀨絶域棲遑驚濤顛沛至誠冥感神珍顯會甄陶設險翼軫疏源尉陀餘國盧循舊邊邑居雄盛人物殷全是維樂土實曰龍川護持靈剎莊嚴寶塔基構鼎新亭欒櫨嶪奔日宵排歸雲曉納架壁三休連甍四合分惟星紀境控天池棟宇帛丿糸邈衡津推移神機丕應瑞景潛儀光合玉廡彩動金枝凡我寮庶同嗟權實周顗情勤王濛思逸咫尺幽鍵往來靈室共蔭法堂俱歸慧日四維信受三明宏益貝葉紛綸龍華舄奕講肆宏敞齊筵巨翼供引純陀飯回香積天人合契幽顯同心傾家奉賄破産移琛軒裳敻騖纓珮交臨蘭薰習遠檀那意深偉哉連率沖乎德化職重隼裳秩遵熊駕酌貪貽則還淳息詐道濟香城禎凝寶舍琳琅什種梓緇徒調輕僧會辨析文殊奔螭易失令鼠難拘願刊貞珉永冠康衢伊我窮途欣茲勝謁文休泛海仲翔遊越倘想知音有懷明發謬惟雅顧叨陪天骨爰抽弱翰式敘高蹤孤音易竭獨賞難逢思起王粲悲生蔡雍豈無章甫誰適為容粵若三靈混極惟神藏妙物之機六氣潛周惟聖握財成之柄考龜龍於百代覺路先迷徵象馬於三川元津晚闢豈非君臣朴靜則上皇扶失道之危仁義沸騰則大雄拯橫流之弊然後階四禪而縱觀再造淳風生三昧而端求一匡澆俗詳窮祕躅迥測冥機觀俗化之浮沈考經綸之去就則知理非徒寢勛華粃天下之功教不虛行周孔雪寰中之誚遂能往來真極表裏睿圖談慧日於昏衢廕慈雲於燬宅由是妙音鴻漸化迹龍飛為法棟梁作人父母諸天競寫金仙滿目之容異事爭傳貝葉璿花之偈慧義寺則安昌寺之遺基周使持節車騎大將軍儀同三司大都督新州剌史安昌公之所建也公諱則字孝規後魏景穆皇帝之元孫司空安昌王之元子雄才廣度身膺海嶽之靈華冕雕軒地積王侯之氣晚參周運位列虞賓爰撫新州來光舊蜀江分石犀猶連赤岸之山路對金牛尚疑青泥之磴榮高牧刺養隔晨昏披厚褥以驚心撫長筵而下泣以為臨川積慕尚疏鍾阜之巖康樂追懷竟鑿廬峯之壁傍稽勝託俯植靈因窮廣漢之名山得長平之絶岫憑危列戶亘險乘甍龕臨明月之宮塔對浮雲之徑青蓮湛目下映香泉頳果含唇斜交寶樹重扃寫翠攀謺磴而烟周復樹回丹委連岡而電屬真童入衛山前桂樹之壇神客來遊水上芙蓉之殿千楣鳳矯橫鳥道而斜飛萬栱虬蟠俯虹土而沓起霞明春牖即對談雞露下秋亭仍傳唳鶴松門不雜禪清避俗之心竹院長間響合遊仙之梵若夫招提淨域棟宇長存精舍祇洹規摹可襲亦猶林光舊址遂起甘泉之宮露寢餘基因立靈光之殿自先后膺歷今聖乘時堯曦將佛鏡俱懸軒車與法輪同轉眷香城而側席懷妙葉而旁施爰加慧義之名用徙安昌之號鐫鎔間起締飾爭飛前司馬蘇良乂首引甄操前長史唐秀卿繼敦崇拓乃立彌勒下生像一鋪諸佛新變相一龕並對巘呈規分崖合勢容華秀絶相好端明盡雕刻之奇摹執丹青之有契隨峯寫狀旌旗舍衛之兵因石生姿花葉祇園之樹山靡進晚麗飾晨巖澗戶迎宵神光夜燭如來應化上辭兜率之天菩薩分身下入須彌之座時有就禪師者俗姓馮氏行遺生滅思出塵勞修定水之隄防擢禪林之棟幹法忍以精求解脫俯會無生慧嚴以身證槃坐觀真諦受蹤故事隔代同符形骨猶存英靈可視豈若武擔山下惟傳智士之名蜀郡江前別畫文翁之像而已哉又有慶法師者俗姓王氏貞機苦節以般若為心謀輔弻匡迷以菩提為已任遂使邑南偃化爭傳廉恕之風濮右馳情競起松篁之節爰有庾子山者文場之俊客也自黃旗東掃青蓋西還承有晉之衣纓作大周之杞梓嘉聲內振健筆傍流翠碣高懸丹書未缺瓊鐘俯徹猶參吐鳳之音石鏡傍臨尚寫回鸞之跡朝請大夫長史河東裴爽公侯映代貞白承家臨九折以長驅下雙流而作鏡清通舊德王休徵之不虛領袖耆年龎士元之獲展縣令衛元冰霜用足江漢情多傳衛玠之清談兼衛恆之博識牛刀屈鋭陵劍壁而裁風鳳軫鳴徽望琴臺而助化寺主大明法師俗姓淳于氏蓋齊上客之遺苗漢廷尉之洪允避地岷濮代為豪酋法師住持真教棲息妙塗臨雁塔而虔誠仰龍宮而繹思禪居遁蹟嚴君平之出塵梵肆延賓楊季卿之好事上沐皇王之澤下承連宰之功收里巷之謳謠覽江山之體勢咸以為安昌故跡雖篆德於前聞新野殘書未兼芳於後葉爰求勝律重勒奇蹤託勃以知已之賓校勃以當仁之分文通景純之筆何後何先襄川峴嶺之碑為陵為谷敢憑真眷俯竭虛懷披翰苑而長鳴下辭庭而步揚子雲之繼馬人遠乎哉蔡伯喈之嗣張吾知之矣敢作頌曰三千淨土八萬名山銀臺海上金闕雲間禪居不雜覺路長間鸞鶴棲舉風烟往還蜀門南望岷波東瀉川路黃牛關城白馬寶光仙鎮來清巨野紫磴三危丹峯四下顯元安昌俾侯江漢英威外發妙謀內斷慧則心機孝為身幹聿求勝蹟爰疏壯觀跨嶮垂甍緣崖構極玉座交映珍龕間飭磴道魚鱗山形鳳翼露清軒冕霞明篆刻重巒架嶮曲岫回廊岩扉側啓澗戶斜張松門石塔竹院沙場齊庭合梵講肆浮香鬱紆甍棟參差林沼葉障奔禽花岩度鳥地遙心曠塵疏俗少鶴唳更秋猿吟漏曉法門幽寂禪宮寥敻樹杳煙深泉飛虹映實為妙域傍滋道性屢延銘表頻流藻詠銅梁上德玉壘名師飾傳覺照顛闈文思千齡道術萬古風期重規謺矩何代無之原夫玉都瓊室紫垣光大帝之庭金闕銀臺元壁壯㣥仙之域故能使神明有宅駕日月以長驅鸞鳳知歸撫雲霓而上出斯則層巢墐穴上皇迷棟宇之尊考室靈臺中古識巖廊之貴然後冕旒前序提四海以為家登步太階列千門而有閌况乎耆山形見旁行草昧之先闕光宅乾坤之右雖鶴臨西閟龍宮與正法同亡而象化東流雁塔與遺儀繼起白鶴寺者蓋菩提寺之餘址梁武皇之所建也香城福地之舊三巴五蜀之湊裂岷山之奧域分井絡之榮光西包玉壘之墟北瞰銅陵之野南扃列第門庭萬家東戶連峯岡巒千里實伽藍之勝迹得迦衛之英模憑絶磴以圖規俯長溪而作固自金陵不競玉鏡無章城池興南路之悲亭障切北風之候崩山鬬水觸地網而三分墜月奔星劃乾綱而五裂中原錯戾慈門為虎豹之墟滄海橫流定水穴鯨鯢之浦懷山既蕩法衆咸淪林院榛蕪軒堂委寂遂使悲生棄井堙玉甃於三泉歎積為山移瓊峯於九仞皇上攝千秋之寶運緒三聖之宏機挾宇宙而先神御雷風而首出靈功不宰華夷沾共貫之恩至道無私霜露得平分之序考禎圖於日慎寤寐同符稽妙冊於年刀幽明合貺然後東巡巨鎮追六聖而撫寰中南面太壇朝萬方而小天下皇威既暢寶應齊歸川嶽薦靈風烟動慶丹烏抱日疑增帝閣之華素鶴低雲若赴仙庭之會昔白魚黃竹業未峻於崇封赤雁芝房名不登於梵宇爰徵瑞典肇錫嘉名重興般若之臺更起招提之院金繩夕布帛丿糸秀嶺以開壇玉榜晨舒擁回峯而闢戶爰有宏演上人者法門之秀士也行超常凍思越恆饑悲淨域之為墟喜皇波之普泛縱還舟於苦海驚浪旋夷叱歸馭於邪山靈關非險於是淨財雲委真衆烟馳如趨摩竭之宮似向毗邪之國縣令梁宏悅首加甄緝縣丞梁敬一親昭施典上憑天旨爭開舍利之壇俯會衆心競起須彌之座禺同故嶺石鮮堅華廣漢餘坰地多疏斤事關經始人懷祗懼重階不就空思太室之氓寶像無資未獲黎陽之土豈非冥期肸蠁功參造化之外故能果唇間發蓮眸周映貝齒含滋璿毫起照三十二相臨玉座以相輝八十四儀擁金山而圓立層甍四合爍奔電於丹楹復殿三休絡浮烟於翠幌因高積磴疑遷倒景之臺架險連榮似立迎風之觀雕簷競注縈霧道以龍回繡桷爭飛傃雲衢而鳳矯寫歸禽於寶鏡誤接朝鸞圖走獸於文璫疑栖夕免雷霆蓄泄裁臨承霤之間烟雨飛浮未出層欒之下輝丹青於菌壁妙跡疑存炳銑鋈於蓮龕神輝自燭鏘鏘櫩鐸聲傳桂葉之風焰焰山爐氣結松陰之靄仰真容於始旦滿月晨昭窺列棟於方宵長虹夜發香泉激溜有符溫淨之池珍木成行無忝祇園之樹信煦尼之別府實兜率之殊庭者乎愛友上座法師等情機藻瑩戒律圓明披玉笥以研芳候瓊鐘而肅慮禪姿曉映依稀同雞岫之前梵唄晨臨髣佛像魚山之曲縣令獨孤儉等或鵬垂待運終燮道於中台或蠖屈求伸且毗風於下邑鄉望儀曹等或鹽泉錦室家稱三蜀之豪或抱朴懷仁譽擁雙流之美或以為山川肆踐猶紀石於弇州陵谷生哀尚沈碑於峴首况乎德因時盛慶流封拜之辰名為功登事屬文明之運豈可使璿猷被物終昧燮於元機金字韜華不題勳於翠炎敢作頌曰睿塗菌藹靈機翕忽玉架天都金裁地闕法王利見香城繼發雁塔齊雲龍宮瘞月長江近域廣漢遺居禪扃共往梵宇全疏迹均梁後義切秦餘山川牢落榛莽邱墟有聖聿興惟皇降撫因天因地為雲為雨日觀龍驤烟壇鶴舉肇開嘉號重光淨土猗歟上士道場真政物觀成章子來興詠土石呈彩人靈合慶寶座晨嚴金山夕映紫微分殿青岑曜郭復袖縈樓攢峯跨閣月低璿鏡星連寶鐸彩鳳將飛蟠虹未落森沈桂宇肅穆筠壇花明柳砌葉暗朱欄溪留夏雪澗咽秋湍山虛梵冷谷靜鐘寒法衆爰依禪徒戾止望風三蜀征塵千里頓首元墀歸心翠扆業超有色功齊無始偉哉冥化妙矣能仁去來均迹前後俱身寂滅為樂般若為因題芳翠珉敢詣靈津
