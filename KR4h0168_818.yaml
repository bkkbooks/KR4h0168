body:
  text: 伏以前年冬再有震驚俄然巡幸主司宗祏迫以蒼黃伏以移蹕鳳翔未敢陳奏今將回鑾輅皆舉典章清廟再營孝思式備伏請降敕命所司參詳典禮修奉瓘廣明二年官閬州晉安縣主簿黃帝以天下既理物用具備乃尋真訪隱問道求仙冀獲長生久視所謂先理代而登仙者也時有寧封子為陶正有神人過為其掌火能出入五色煙久則以教封子封子積火自燒隨煙氣上下一旦飛去往流沙食飛魚暫死二百年更生黃帝師其道從封子游於蘭沙使風后負書常伯荷劍旦往洹沙夕歸蒲晉行萬里而一息洹流如沙塵足踐則陷其深不測大風吹沙如霧霧中多神龍魚鱉皆能飛翔有石藍青色堅而甚輕從風靡靡覆於流沙之上一莖百葉千年一花故寧封子遊海詩曰青藍灼爍千載舒百齡暫死食飛魚有務光子身長八尺七寸神仙者也有赤將子輿者不食五穀啖百草花長年有容成公善補導之術守生養氣谷神不死能使白髮復黑齒落復生帝慕其道乃造五城十二樓以俟神人即訪道遊華山首山東之泰山時致怪物而與神會通接神人於蓬萊迥乃接萬靈於明庭京兆伸山寒門甘泉谷口黃帝於是祭天圜丘將求至道即師事九元子以地皇元年正月上寅日齊於首山復周遊以訪其道將見大隗於具茨之山方明為御昌寓驂乘張若謵㢁前導閽滑稽後從至襄城之野七聖皆迷遇牧馬童子問途焉若知具茨之山乎曰然若知大隗之所存乎曰然黃帝曰異哉小童非獨知具茨之山又知大隗之所存乎請問為天下小童曰夫為天下者亦若是而已矣又奚事焉余少而自游於六合之內余適有瞀病有長者教余曰爾乘日之車而游於襄城之野今余病少痊余又且復遊於六合之外夫為天下者亦若此而已矣又奚事焉帝曰夫為天下誠非吾子之事雖然請問為天下小童辭黃帝又問小童曰夫為天下者亦奚以異乎牧馬哉亦去其害馬而已帝再拜稽首稱天師而退帝曾省天皇真一之經而不解三一真氣之要是以周流四方求其釋解乃至圜丘之上其國有不死之樹食其實與葉人皆不死丹巒之泉飲之長生有巨蛇害人帝以雄黃逐之留一時而返帝令三子習服之皆壽三百歲東到青邱見紫府先生登於風山受三皇內文天文大字以敕召萬神役使㣥靈南到五芝元澗登元隴蔭建木觀百靈所登降採若乾之芝飲丹巒之水西見中黃子受九茹之方位北到鴻隄上具茨見大隗君黃蓋童子受神仙芝圖十二卷登稽山陟黃屋開石函發玉笈得金鼎九丹之經復授九轉之訣於元女南至江登熊湘往天台受金液神丹之方聞廣成子有道在空同山見之曰聞吾子達於至道敢問至道之精吾欲取天地之精以佐五穀以養人民吾又欲官陰陽以遂㣥生為之奈何廣成子曰汝欲問者物之質也汝欲官者物之殘也自汝理天下雲氣不待族而雨草木不待黃而落日月之光益以荒矣汝佞人之心翦翦者奚足以語至道哉黃帝退捐天下築特室藉白茅閒居三月復往邀之廣成子南首而臥黃帝順下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何可以長久廣成子蹶然而起曰善哉問乎來吾語汝至道之精窈窈冥冥至道之極昏昏默默必靜必清無勞汝形無搖汝精乃可長生目無所見耳無所聞心無所知神將守形乃可長生慎汝內閉汝外多知為敗我為汝遂於大明之上矣至彼至陽之原也我為汝入於杳冥之門矣至彼至陰之原也天地有官陰陽有藏慎守汝身物將自壯我守其一以處其和故我修身千二百歲矣吾形未嘗衰也黃帝再拜稽首曰廣成子之謂天矣廣成子又曰彼其物無窮而人皆以為終彼其物無測而人皆以為極得我道者上為皇而下為王失吾道者上見光而下為土今夫百昌皆生於土而反於土故將與汝入無窮之門以遊無極之野我與日月參光與天地為常當我緡乎遠我昏乎人其盡死而我獨存乎黃帝得道之要復周遊四海車轍馬跡丹井遺書往往而有越元闕見中黃丈人登雲臺入青城天國之都見寧先生受龍蹻之經築壇於山上封寧先生為五嶽丈人使嶽神一月再朝嶽神灑六時之泉以代晷漏帝問先生真一之道先生曰吾得道始仙耳非是三皇天真之官實不解此真一之文近皇人為扶桑君所使領峨嵋山仙官今猶未去可往問之帝乃到峨嵋之山清齊三月得與皇人相見皇人者不知何世人也身長九尺元毛被體長皆尺餘髮才長數寸其居乃在北山絶巖之下中以蒼玉為屋黃金為牀然千和之香侍者皆衆仙玉女座賓三人皆稱太清仙王方見皇人飲以丹華之英潄以玉井之漿黃帝匍匐既至再拜稽首而立請問長生之道皇人曰子既官四海復欲不死不亦貪乎帝曰萬兆無主則相陵暴今為制法足以傳後私心好道遠涉四海幸遇道君願垂哀告竊見真人食精之經徒省其文而弗綜其意挹其辭而不釋其事乞得教誨皇人大驚良久乃答曰汝安得聞見此乃金籙之首篇上天之靈符太上之寶文矣白日升天飛步虛空身生水火變化無常此天仙之真惟有龍胎金液九轉之丹守形絶粒辟除萬邪役使鬼神長生久視乃血脈流宣腸化為筋百災不能傷延期至億千則惟有真一食五牙之文此二事但使南斗君領録參於太常楗籥自非仙人四千年一出約皆不得背科而妄泄也又西王母祕此書於五城之內其外衛備有仙樓十二藏以紫玉之匱刻以黃金之札封以丹芝光華印以太上中章其無仙籍者不得聞知也子未可聽天音於地耳矣便可去也帝答曰昔已受神丹於元女惟未受五牙食真之經今運會得見道君既不以授生道是臣相命不得度世耳因叩頭流血唯乞愍濟太清三仙王復愍助之曰此子先世有功德及鳥獸故芳氣之流光於帝位何為隱其真牙之經乎可教而成之也皇人命帝坐而告之曰汝向所道之經蓋上天之氣歸於一身一身分明了可長存耳夫人有生之最靈也不能自守其神而却衆惡若知之者不求佑於天止於其身則足矣且一身猶一國也胸腹之位猶宮室也四肢之列猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也故知理身則知理國愛其民所以安其國吝其氣所以全其身民散則國亡氣竭則身死亡者不可存死者不可生所以至人消未起之患理未病之疾堅守之於無事之前不追之於既逝之後民難養而易散氣難保而易失審威德所以固其理割嗜欲所以成其真然後真一存焉三一守焉泥丸絳宮丹田三一之宅也子勤守之萬毒不傷潄華池食五牙便為真仙矣吾受此經於九天真王今以相付存之於口名曰朱鳥之丹取之於身名曰真一勤乎祕哉大有旨曰五穀為刳命之鑿五牙為長生之根也帝受道畢東過廬山署九天使者秩次青城丈人比御史主總仙官之籍為五嶽之監司也帝又封灊山君為九天司命主生死之録復以四嶽皆有佐命之山而南嶽孤峙無輔乃章祠三天太上道君命霍山為南嶽儲君灊山為南嶽之副以二其政以輔佐之乃寫九州山川百物之形又作五嶽之圖用傳於世帝鍊石於縉雲之山有縉雲之瑞立縉雲之堂丹邱存焉帝藏兵法勝負之圖六甲陰陽之書於苗山帝又合符瑞於釜山奉事太乙元君受易形變化藏於空同之巖帝考推步之術於泰山稽力牧著體診之訣於岐伯雷公講氣候於風后窮律度於容成救殘傷綴金冶之事畢該祕要窮究道真傳陰符則內合天機外合人事理天下南洎交址北至幽陵西極流沙東界蟠桃帝曰吾聞在宥天下不聞理於天下我勞天下久矣息駕元圃以反余真也修封禪禮畢乃採首山之銅鑄鼎象物鼎成以象太一於雍州其鼎知吉知凶知存知亡能輕能重能息能行不灼而沸不汲而盈自生五味真神鼎也遂鍊九鼎之丹服之以丹法傳於元子重盟而付之丹經藏於九疑之東委羽之山承以文玉覆以磐石金簡玉字刻其文帝又以靈寶五符真文金簡書之一通藏於鍾山一通藏宛委之山帝所鑄劍鏡鼎器皆以天文古字題銘其上或有祕讖之詞焉時薰風至神人集成厭代之志留冠佩劍舄於鼎湖極峻處昆臺之山立館於其下有馬師皇者善醫馬通神明忽有龍下於庭張口閉目師皇視之此龍有病乃引針以針龍口中以牛乳煎甘草灌之龍病即愈師皇乘龍而去黃帝聞之自擇以戊午日升天果有黃龍垂胡髯迎帝帝乘龍登天與無為子及臣僚升天者七十二人其小臣不得上者攀斷龍髯及墮帝弓小臣抱弓而號因曰烏號弓萬姓仰天而呼因名其地為皇天原亦名鼎湖其後有臣左徹削木為黃帝像率諸侯而朝奉之臣僚追慕取几杖立廟而祭之取衣冠置墓而守之於是有喬山之冡黃帝曾游處皆有祠焉五百年後喬山墓崩空室惟劍與赤舄在一旦亦失去黃帝居代總二百一十年在位一百年升天為太乙君又為軒轅之星備黃龍之體在南宮之中後代享之列為五帝居中配天蓋黃帝土德中央之位兼總四方也以鎮星為子上配五老下配五帝黃帝之子昌意居弱水昌意之弟少昊帝妃女節所生也帝之女溺於東海化為鳥名曰精衛常銜西山木石以堙東海焉少昊名摯字青陽即帝位號金天氏黃帝之子也顓頊高陽氏黃帝之孫也有聖德在位七十八年九十八歲母蜀山氏都商邱濮陽禺強黃帝之允顓頊之子與顓頊俱得道顓頊為元冥禺強為北方水神帝嚳高辛氏黃帝之孫帝生而神靈自言其名都偃師在位七十年年一百五歲帝堯陶唐氏黃帝元孫姓伊祁名放勳興於定陶以唐侯為帝都於平陽在位九十八年年一百八十八歲帝舜有虞氏姓姚名重華黃帝八代孫都蒲坂年百歲得道登遐於九疑之山夏禹號夏后氏黃帝元孫姓姒名文命殷湯黃帝十七代孫黃帝子孫各得姓於事帝吹律定姓者十二少昊有子姓曼顓頊姓姬堯姓伊祁舜姓姚禹姓姒湯姓子又張鄧軒路黃寇朱酈白薛虔資伊祁申屠黃公托跋黃帝有子各封一國總三十三氏出黃帝之後子孫相承凡一千二百五十年自黃帝己酉歲至今大唐廣明二年辛丑歲計三千四百七十二年矣易簡僖宗時人官待詔衡州耒陽尉所著琴訣琴說宋史通志通考俱見著録琴之為樂可以觀風教可以攝心魂可以辨喜怒可以悅情思可以靜神慮可以壯膽勇可以絶塵俗可以格鬼神此琴之善者也鼓琴之士志靜氣正則聽者易分心亂神濁則聽者難辨矣常人但見用指輕利取聲溫潤音韻不絶句度流美但賞為能殊不知志士彈之聲韻皆有所主也夫正直勇毅者聽之則壯氣益增孝行節操者聽之則中情感傷貧乏孤苦者聽之則流涕縱橫便佞浮囂者聽之則斂容莊謹是以動人心感神明者無以加於琴蓋其聲正而不亂足以禁邪止淫也今人多以雜音悅樂為貴而琴見輕矣夫琴士不易得而知音亦難也易簡嘗慕昔賢悉善鼓琴自九歲學之至十二拊黃鍾雜調三十曲工三峽流泉南風游弦天弄十七歲彈胡笳兩本鳳游雲烏夜啼懷陵別鶴操仙鶴舞鳳歸杯沈湘怨楚客吟秋風嵇康怨湘妃歎閒弦白雪秋思坐愁游春緑水十八弄後益苦心周游四方聞有解者必往求之凡所彈雜調三百大弄四十善者存志精之否者旋亦廢去今所彈者皆研精歲久竝師傅勘譜親授指法猶未敢言妙每以授人聲數句度用指法則毫寸不差如指下妙音亦出人性分不可傳也嘗覽操弄之名凡數百首然自古琴者祇工三兩弄便有不朽之名或自制雜弄或傳習舊聲固不以彈多為妙也今人皆不知志惟務多為故云多則不精精則不多也夫鼓琴之時雖無人須畏懼如對長者則音韻雅正可以感動幽冥攬琴在膝身須卓然乃定神絶慮情意專注指不虛發弦不誤鳴凡打弦輕重相似往來不得不調用指兼以甲肉甲多則聲乾肉多則聲濁甲肉相半清利美暢矣左右手於弦不可太高亦不可低弦不疾不徐手臂調暢暗用其力戒於露見夫琴之甚病有七彈琴之時目覩於他瞻顧左右一也搖身動首二也變色慙怍開口努目三也眼色疾遽喘息粗悍進退無度形神支離四也不解用指音韻雜亂五也調弦不切聽之無真聲六也調弄節奏或慢或急任已去古七也此皆所甚病病去則可以為能矣康士字安道僖宗時人有琴調十卷新唐書及通考通志宋史俱見著録余學琴雖因師啓聲後乃自悟遍尋正聲九弄廣陵散二胡笳可謂古風不泯之聲也其餘操曲亦曠絶難繼自元和長慶以來前輩得名之士多不明於調韻或手達者傷於流俗聲達者患於直置皆止師傳不從心得豫因清風秋夜雪月松軒佇思有年方諧雅素故得弦無按指之聲韻有黃冰之實乃創調共百章每調各有短章引韻類詩小序焉元宴字寅節昭宗朝翰林學士門下成周之建藩翰也本以宗盟大漢之分茅社也先諸子弟推強幹弱枝之義遵自家型國之文用能夾輔公朝尊獎王室朕上承宗廟下撫黎元固安萬邦惠綏㣥品事必在於師古理寧繫於狥私爰舉舊章式為令典第十一男禎忠肅挺秀清明在躬孝敬本於生知端粹資乎神授蘊題鞭之妙思慕置醴之前規第十二男祥美秀呈姿溫良育德體寬雅以成性持願恭而立身踵為善之懿圖繼好學之休譽咸在齠齔克守義方必當益茂清徽俱為令器是用各分圭瑞並立封疆申以渥恩委之善地於戲當綺紈之歲膺茅土之榮雁序聯芳犬牙錫壤爾宜以草泣衆儉而在公善友應徐敬師申白交修魯衛之政俾成虞芮之風往惟欽哉服我丕訓禎可封雅王祥可封瓊王仍令所司擇日備禮冊命主者施行門下沛澤遺封硭山奧壤俗稱雄富人本質良古為用武之鄉今乃優賢之地况自嬰多難極迫挻災蒸黎嘗困於流離全材久專於綏撫既觀試可爰議正名時舉寵章用申獎勸具官龎從夙懷明略早負壯圖精專能習於豹韜王褱偉素推其燕頷襟靈豁達氣宇剛嚴居然將領之才邈爾深沈之度差肩頗翦接武韓彭揚閫外之休聲富幄中之嘉畫自委之留事頒我詔條惠愛行於鄉閭威望揚於士伍克成謠詠遠副憂勤臨戎既耀於雄稜撫俗備揚其善政遄移歲月足洽寵靈是宜錫以旌幢進其官秩奄有徐夷之一境爰撫大彭之故都膺吾眷求永作藩翰於戲敬敷五教光總十連踐論道之華資加御貴之榮級無忘惕勵以奉恩光可某官仍改名師古主者施行門下錫以土田付之旌鉞必擇非常之士載宏不次之恩况沛澤雄藩涇川巨鎮委用咸彰於試可節制宜膺其正名爰舉徽章式分戎閫具官王敬蕘夙號將才早探軍志襲淮流之積慶挺山立之雄姿勇實兼人智能周物蘊變通之茂用懷經濟之遠圖具官張珂閥閲名門韜鈐祕略孝友克宣其遺美忠勤幼闡於令名劍氣干霄鳳音合律撫士則能均甘苦推誠則可貫神明頃者頒我詔條各成政化惠愛亟沾於疲瘵威聲益布於鄉閭爰自主留彌觀奉上既播褰帷之美勉承建節之榮仍俾疏封用光列鎮噫硭碭壓境種落連營握兵符而皆是通侯掀大斾而具為上將當思報效以服恩榮敬蕘可某官珂可某官主者施行門下分節制之任所以嚴我翰垣膺廉問之權所以宣吾風化矧夫界連梁楚襟束咸秦據廣漢之上游振終南之巖險昔為禦侮之地用固神州爰升連帥之雄以酬丕績言從人欲乃降朝恩昭信軍防禦使特進檢校太子太保使持節金州諸軍事守金州刺史御史大夫上柱國長樂縣開國伯食邑七百戶馮行襲決雲利刃逐日奇蹤禰衡垂一鶚之名關羽蓋萬人之敵御衆布投膠之德禮賢懷比飯之恭智略出㣥忠果成性造次不違於尊獎周旋備音見於公勤自委以頒條命之剖竹蒞事繼懸魚之美臨人宣建隼之威疲薾既成其息肩豪右屢聞於破膽獻奉無闕賦租罔况頃者荊襄路途兵戈驟起而能遽開間道俾達上京盡通江嶺之貢輸來助朝廷之經費尋彰績效今有甄酬而一境緇黃數邑耆艾咸陳章疏請降節旄膺吾入保之榮茂彼登壇之寵往服休命毋忘敬恭可某官主者施行門下洋源奧區鄜畤重鎮近境深聯於甸服長川古號於塞門念斯節制之雄眷乃察廉之寄必資才傑用赴選求乃者雕陰實惟戎事壁壘具勞於九拒干戈僅遍於四封姑務安人爰從易地具官李思敬練達韜鈐振揚威望保風雨不渝之操得寬猛相濟之機奉上誠專康時績茂常蓄持危之志雅推御衆之能具官李繼顏驍勇馳聲剛柔蘊用負致君之全略逞邁俗之宏規克秉義方幼知忠孝發黃間而破敵麾白羽以臨戎並早沐恩榮俱分憂寄不乏循良之稱亟彰持重之名繼成襦袴之歌顯著山河之誓今則俾之迭處用叶厥宜公台不改其華資終始各思其竭節於戲土田共廣爵秩互榮當遜志以保家勉輸誠而佐國勿恃險以生事宜恭巳而守常服我寵光無忘敬慎思敬可某官繼顏可某官主者施行門下朕言念蒸黎常勞旰食其在遐徼尢所注懷况閩越之間島夷斯雜非威望不足以懾伏匪仁恕詎可以惠綏其有善政巳成殊庸未陟則宜假之鈇鉞錫以麾幢俾兼節制之權式寵察廉之寄具官王潮術深金匱學富玉鈐彎弧傳百戰之名撫劍號萬人之敵才高御衆志本勤王風雲暗合於機謀霜雪不移其節概為仁由己重士逾山雅負將才猶精夷理自撫寧列郡振舉六條疲氓懷愛戴之心漓俗仰廉潔之德集是休烈溢於聽聞而職貢交修賦輿靡闕尊主之誠可見勝殘之化無踰是用負海建牙踰閩錫社徇彼遠人之懇慰其闔境之情爰壯中權仍遷左揆爾其守茲舊貫服我新恩勿恃貴以驕人無作威以生事更勵奉公之節益堅惠下之規別俟寵靈罔虧績效可某官主者施行門下邠土雄藩西郊故壘封境克連於甸壤城池近接於昆夷爰膺節制之榮兼奉察廉之寄向非雄傑孰稱選求况仍歲干戈未蘇惸獨鎮靜允先於良將拊循猶藉於通賢得不因彼士心茂茲朝委我有休命人其聽諸具官某生知武略夙號將才得黃石之沈機總青萍之利用貞心貫日壯氣凌雲蘊豐財和衆之名遵抱義戴仁之事自四郊多壘一劍臨戎推誠明以奉君親仗忠信以為甲胄處衆每觀其自奮遇敵雅號於無前茂著功庸動張節概乃者剖符隴坻建隼吳山頒條早振其休聲守土載揚其善政既委之鈇鉞錫以土疆撫成紀之遐封治秦川之拓地投醪布德減竈傳謀憂國忘家赤心可見飲冰食糵清操難儔今則再寵緑徽是光黑矟增其好爵廣彼爰田用分宵旰之憂式徇疲羸之請爾其將我惠澤施於一方簡以臨人寬而整衆可推養賢之志用宏輯睦之規無怠親鄰勉思稼穡奉於公者必舉涉於私者勿為副此虛懷更圖明陟某啓某今日伏奉宣召伏蒙聖慈令充職翰林者出白埏鎔成茲忝越循涯積感揣分增榮某洛下諸生隆中散族進取本無其聲援歸休復迫於羇離白首為郎固乏堂堂之稱青雲無路但甘碌碌之嗤愈迫低徊欲成淪沒相公殊常降德不次施恩拔自迷途置諸密地蒙虎皮於下駟抑以騰驤綷鵠羽於寒鴟教之騫翥遂使專詔誥教令之事為言語侍從之臣內省孱微益深榮懼謹啓某啓某伏奉今日敕授尚書駕部郎中知制誥依前充職者某才殊敏健識異精通既無環潤之姿焉有矜嚴之譽繆因鎔鑄驟陟煙霄掌禁苑之文詞列金門之侍從顧惟鯫淺尋過津涯忽自秋而徂冬每素飱而尸祿愈成靦益被顯榮相公曲示洪鈞重磨頑璞降始終之茂德宏特達之深恩再假丹青復掀羽翼遂使移粉署應星之列帖掖垣掌誥之名盡出殊私皆為華給蚊蚋難勝於山嶽韲灰何報於生成謹啓某啓某今日伏奉恩旨宣召充職翰林者出鈞鎔之巨力收扂楔之小材拔自塵泥驟升霄漢撫己實知其忝越銜恩載切於屏營某洛下諸生朝中孤宦進取本無其聲援歸休又迫於羇離既碌碌以終時亦倀倀而度日伏蒙相公十九兄殊常降德不次施恩生暖甲於枯荄化豐肌於朽骨出諸陷阱置在門闈綷鵠羽於寒鴟教之騫翥蒙虎皮於下駟抑以騰驤但自捫心何階報德况專詔誥教令之事為言語侍從之臣內顧孱微益深榮懼惟冀永賫肝膈長託爐錘但當有命以酬固亦無言可謝謹啓某啓某今日伏奉聖旨令充職翰林者龎鴻恩重螻蟻命微循涯增感激之誠揣己積叨踰之懼伏以某名慚巨下人異隆中無賦雪之詞華乏論天之才辨頃歲才萌進取便獲攀投及門人指其登龍託質時推其附鳳因得交朋改觀行止增光遂忝決科俄榮筮仕始優遊於諫省旋履歷於霜臺郎署一棲星霜六變而偶茲多難方困迷津永無振奮之期益勵退藏之志僕射憫其孤拙哀以棲遲忽垂大恩顧及衰緒孜孜保證矻矻維持竟使凡材遽膺劇職參玉堂之侍從掌金殿之書詞榮非始圖事過初望惟誓永將死節上報生成倍激糜捐冀申萬一某啓某伏奉敕命授尚書駕部員外郎知制誥依前充職者某藝能無取才格俱凡任孤僻以趨時守顓愚而樂道敢於榮顯竊冀遭逢伏蒙僕射不次垂恩踰涯降德雕朽曲施其敏手磨鉛俾耀其銛鋒因得擺脫塵泥升騰霄漢專玉堂之詔誥追金馬之遊從尋過津涯每慚靦冒孰謂才踰纍月又陟華資南宮秩換其詞司西掖名參於演綍生成益被灰粉何酬感深空集其涕洟恩重但期於隕越某啓某忽蒙宸獎擢處內庭循省荒蕪倍懷兢懼某才殊二妙譽愧三英趨時既乏於梯媒退跡倍悲於萍梗某官常回恩獎曲賜吹揚遂使虛孱成茲忝越列侍從於金門之下掌書詞於禁苑之中榮非始圖事過初望某啓某伏奉手誨伏蒙相公十九兄特以某初叨宸獎賜及衣服假等捧戴尊念感激伏深况鶴紋價重龜甲樣新纖華不讓於齊紈輕楚能均於魯縞掩新蒲之秀色奪寒兔之秋毫莫稱頑姿難勝縟旨倍切肝腸之感永為裼襲之榮謹啓某啓某文愧靈蛇質慚威鳳謬因鎔鑄遂竊顯榮粉署握蘭詎有堂堂之稱禁林視草全乖藉藉之名驟忝轉遷盡由撎舉伏蒙相公俯回念録過賜褒稱尊誨下臨恩言俯被假金駿為駑駘之飾賤骨難勝引朱絃於燋朽之餘深恩有自某啓昨日獲忝轉遷出於提獎伏知舍人次當視草曲賜褒稱裁成五色之紛綸啓導九霄之渥澤過勞江筆潤色堯言指頑石為瑤瑾之流謂駑馬有驊騮之足揣循驚感倍切肺肝某啓某人惟冗末地匪清華異前修稽古之勤乏往彥求己之志偶塵科級旋履宦途甘蒙碌碌之嗤實愧堂堂之稱惟思勇退祇欲自強孰謂僕射念及孤沈獎茲顓僻遇孔梨之津潤別借齒牙因姜被之包容俯明肝膈昨晚面承尊旨曲奉溫言直欲拔自塵泥置之霄漢恩既生於望外喜載溢於情衷况憫恤垂仁念惜兼至假毛羽而使遂騫翥回鞭策而俾學騰驤盡自生成益隆邱嶽但慮藝無所取材不足稱仰纍埏鎔或孤撎舉誓節永依於門館酬恩冀盡於死生苟違斯言是欺皎日某啓某昨日早趨崇屏面奉宏慈承許與之恩言荷提拔之隆旨循涯自失沒齒知歸某孤拙無媒迂疏寡合且乏幹時之具仍慙悅世之機一忝班行八移年歷未絶遭逢之望分無騫翥之期伏以某官光輔丕圖啓迪昌運當此艱危之際克展經綸之才孰謂庸虛亟塵褒採况丹霄侍從清籞遨遊資枚馬之流以闡堯湯之化顧茲孱薄詎可論思倍懷感激之心冀竭效酬之節但以鉛刀鈍質不可厠於龍泉瓦缶凡姿固難齊於神鼎雖感恩而載切實顧己以難勝某啓某才非敏達器異閎深乏百函飛翰之能虧九紙課詩之業植操虛凌於霜雪干時未脫於塵埃自忝班行尋踰涯分豈謂承旨侍郎念茲單拙憫及埋沈密回吹借之隆私顯示挈維之重德今日早面承尊旨曲奉恩言必欲拔自泥沙置之霄漢擇千里驊騮之足未棄駑駘合九成韶濩之音不遺惉懘感深泣下喜過悲來但虞不稱雕鏤實慮有孤提拔循涯揣分感德慚恩之至某啓某伏思借其毛羽則鍛翮者能飛鼓以笙簧則無心者知感輒陳引喻仰謝吹噓某濮上庸音墦間賤品植操但期於霜雪趨時未脫於塵埃徒激攀棲難希褒勵近者伏見宮相楊侍郎右司趙員外奉揚尊旨竊話昌言伏審侍郎學士俯録鯫微獎稱孱薄指其迂拙謂以貞修假鉛紅於蕞陋之資回剞劂於離奇之木感深泣下喜過悲來維乾寧二年歲次丙辰十月戊申朔十二日己未嗣皇帝臣稽首太上聖祖大道金闕元元天皇大帝伏以強名曰道迥出氤氳之表惟天為大是生恍惚之中融和氣以陶蒸藹真風而煦育况黃庭碧落集列聖之威儀絳闕丹臺聚㣥仙之步武爰起祈恩之路實開請福之門敢用真誠陳於下會今雖物無疵癘年獲豐登遠人不倦於梯航絶塞靡虞於烽燧而鯨鯢作慝蛇豕為妖塗炭黎元黷亂紀律宮朝載罹於焚毀簪裾仍迫於羇離敢不寤寐思曉夕引咎於是廣延真侶重叩元關幣帛交陳香燈備設伏願堅覆露之德暢亭毒之恩使氛祲盡消萬彙咸泰復安宗社大定寰區及臣眇身同霑宏造謹詞浦官右拾遺出梓城百三十里山開而川長城川而為之縣縣其名曰通泉由縣以出西山峭而壓於泉宇巖而為之廟廟其名曰靈鷲靈鷲居通泉僧境之絶其初有頭陀僧選而居焉僧有神通力乘白驢與白象同視一眼而五眼具蜀民為商者行及太原北上五臺山求見大菩薩衆堅莫能致有老人出曰菩薩在蜀爾弗見耶奚遠跡吾山焉就窮所隱指是頭陀即其人還蜀而望拜且深訴其辭為商者因大布所聞自是頭陀乃遍告邑人以西行邑有烏衆寺僧騎白驢揖對言別略無差焉咸請備僧食而餞不移晷而千戶畢至歸無疾而坐終巖上幽隱而來化自顯而化去少動蜀人之耳目暨藏其身巖側百餘年僧宇大廢劚巖發其骨深莫能獲殆今無遺跡窅不可測獨有所刻佛像有感必契前邑長以頭陀勝跡不可泯閉於巖穴中及僧居盡復顧像在巖猶感聲其事後數十年方啓其跡而宇焉僧有惠澄者能經律有道行未能成其宇而卒邑人共致禪僧道嚴續而成之是宇也中出翠微旁開石室古木凝黛疏篁鎖煙於冬夜燠當夏晝寒且屏立前峯席鋪四野望冠㣥宇卓然境異異泉石出滴其涓流而通大像之側自一而干汲必敷其用泉與像跡始於頭陀於今靈不絶焉浦客是邑日登是山或夕景將過曉色未隆當軒月行半壑雲起披襟獨嘯萬象在目而嚴禪師端居禪室客塵不動教所謂證戒定慧乃自戒以得定自定以入慧也言不戒而在定者妄人耳未定而求慧者妄人耳今嚴定不離戒而慧可求吾信其能嗚呼天下言禪者多矣行禪者寡矣嚴其行禪者乎同居僧法如亦久遊禪林深入禪境心相契而事同其徒行源律自束而禪習焉齒甚少未可紀其巖室浦以文自處豈識禪者耶徒見待以頭陀之前事未有紀者希頌而刻之得述其靈異之旨并嚴禪之跡同碣於巖下光啓二年丙午九月九日立休符光化二年檢校左散騎常侍守融州刺史兼御史大夫前賢撰述有事必書故有三國志荊楚歲時記湘中記奉天記惟桂林事蹟闕然無聞休符因退居粗録見聞曰桂林風土記聊以為敘
