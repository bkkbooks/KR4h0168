  text: 全唐文欽定全唐文卷八百十八延昌字光遠咸通末進士遷監察御史擢司勳員外郎翰林學士纍進兵部侍郎拜戶部尚書以中書侍郎同中書門下平章事兼刑部尚書以病罷拜尚書左僕射
