front:
  text: 全唐文欽定全唐文卷四百四十五真為成德軍李寶臣書記寶臣子惟嶽倚田悅拒命真切諫不從兵敗召真議歸順悅遣使來責惟嶽懼斬真以謝王武俊表其忠贈戶部尚書
  hash: sha256:06a03504ce97865552a44b2b5fcabc6afee1a28b709b42b11b265f7e762d1f62
