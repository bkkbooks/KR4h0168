  - {type: head, offset: 14, content: 卲真, id: KR4h0168_NFKB_445-h1, level: 1}
body:
  text: 義以發衷形外昭施物也井以下汲上導彰濟人也河間公鑿井於城垣之次陽門通莊之右偏署曰義正哉導之深源經以善利庇彼邃宇達於交衢鐵其瓶以永不羸石其甃以給無泥飛輪周散泄竇前注淬而平之隨用不私主發生以流潤當赫曦以伏炎在搖落而激清抵凝沍而不閉環四序以一其惠俾憧憧者知飲濯所嚮焉蔑燠暘之虞濟煩乏之艱昏愲者得以淘蕩瘵痗者由之蠲愈滌汰氛坌沃灑蒸灼淡然不改與地配久化囂闠為閒敞鄰梵宮以清淨修廊對開連樓鬱峙嘯真侶以宴息速嘉客以盥潄指心而授應日而就彼豐福吉祿繁榮重慶欲不萃於河間之門得乎故北寺司刑上卿也南臺專席中丞也戎府佐政司馬也參二外閫顯榮當朝騫騫青冥前視萬里是鑿井為濟川之漸斫輪為秉軸之兆可轉盻而待矣公才蔚量碩質貞氣淳名膺王官心拂塵纍制物以經遠恤人以遂成回俸節財蕆事彰義將獻祉于大君貢休于元戎歸壽于高堂三事體太公之宏誓乃戒司翰者書實刊記揭于井外時大歷六祀春季月記恆北山之鎮也易朔門之衝也山形東下萬嶺相屬得抱陽之一峯岌然孤標對引雙翼前面豁向陽光抱中故以抱陽名山山有定惠寺建于隋開皇成于今大歷左有精舍上有寶坊憑巖架壑崛起堂殿甃石為趾飛空構梁回廊盤蹬層閣鬱峙陽崖森竦以木秀陰壁沮洳以泉灑可以資蔭庥可以備飲濯朝日上海千巖下平晴雲捲霄百里前盡萬靈之所孕育衆聖之所栖憩賓延真至驅伏魔怪登聾俗於覺路化空山為金界羌難得而畢載也皇帝御天下之十三年至化汪濊被於無垠紹興像法荷護釋種我成德節度使太子太傅尚書左僕射兼御史大夫隴西郡王李公寶臣光膺朝寄主東之諸侯保和師旅康靖方夏民既咸理法亦隨建遺功墜跡悉命修復有若新羅真子曰談藏浮海而至止於山間回向懇到發其誕願乃於寺內建文殊師利菩薩堂焉又於堂內立我隴西王洎夫人邠國夫人谷氏真形於其次所以存相展敬荷恩昭報也規心匠智庀徒蕆事徵工攻木陶瓬窮妙凝鑠人隨悅來事與念就乃畢土木乃備丹素綵錯翬飛霞張電烻儼八部以營衛列四天以護持如登化城窈入空境作禮端肅則文殊垂教之跡可歸也潔誠趨奉則隴西護法之恩可報也夫大雄現世乘化演教陰濟㣥動泯而歸無大賢佐世康物毗政協宣元氣退而不有以性相示不以文字成元純冥符其理宗一則歸向者不必入毗耶之會方受真如之旨虔敬者不必趨丞相之府方承文告之令心念目覩隨而應祉於此堂也息真子之心回是顯績樹為介福固我皇極不騫不崩登我明祚如岡如陵俾我隴西公位尊而壽功業長久俾我邠國既熾而昌福履穰穰輔公朝以作鎮配茲山以等固宜之哉真實掌中軍之記敢拜嘉命書于貞石時大歷甲寅歲孟冬既望大歷中官大理評事府君盧姓其先姜氏范陽人焉十代祖後魏司徒敬侯尚之之允鹽山縣尉知誨之子諱濤字混成年十九明經擢第常調補安德縣尉佐幕遷左監門録事參軍轉西華縣令太原府司録咸以抱德經物不言而治示清白而觀國蘊仁孝以克家况學富文高禮崇身儉穆穆棣棣夫何言哉嗚呼昊天罔極灾我于欒皇天不弔殃余乎蓼荼天寶十二年癸已九月遇疾精誠無感禱祠不降冬十月彌留大漸五日棄背于官舍春秋五十有三長子楹不幸短命無祿而終哀哉次子前大理評事栝前杭州餘杭尉札前潤州丹陽尉槇構等不天在疚泣血存禮其年十一月十八日安厝於河南縣萬安山之陽夫人滎陽鄭氏易州司馬日大皿之女也至若螽斯之德鳲鳩之仁為三族九姻之靈龜明鏡矣及先君違世繄夫人拊鞠教導訓誘克遂成立享年六十有三大歷十年乙卯二月三十日傾背于壽陽鶴邱縣安定里之私第等殃罰罪苦號叩崩裂無顧無復何怙何恃明年丙辰十一月乙卯十六日庚午歸葬于本塋合祔從周制也欽若祖德詒厥孫謀恭惟懿範罔敢墜地於戲撰德行存圖史誠孝子之節著志銘幽礎銜酷何申係曰於穆列考猗那文母道光邦國德振今古思皇多祜維清緝熙休有烈光子孫其保之嗚呼蒼天白日昭昭青松嫋嫋冥兮窅壽堂門卞兮切孤藐光晟京兆盩厔人起於行間有舊恩於王思禮思禮為河東節度使擢為兵馬使建中元年拜右金吾將軍改太僕卿朱泚僭逆汙僞命為節度使兼宰相泚敗伏誅回紇本人非多比助其彊者㣥胡耳今聞其國方亂頓莫賀新立未得衆移地健有孽子及宰相梅録各將數千人方相圖未服且兵非利不往人非財不聚虜無財利一亂不可定夫撫弱攻昧取亂侮亡者聖人之道陛下不以此時乘之而復歸其人奉其弊此真所謂借寇兵而資盜糧者也請盡殺之行先肅宗時人臣某言監軍副使回伏奉敕書手詔宣慰臣及將士黎庶等并賜幕府大將已下改官告身二百八十七通聖澤鴻私發揚㝢縣榮光喜氣充溢轅門臣某中謝伏惟皇帝陛下配天立極撫運乘時酌萬姓而為心法四時之行信汗馬之勞必録鳴雞之用不遺實均雨露之澤曲播乾坤之造頃以戎臣殞喪軍國憂惶將校叶心佐寮奉職皆能獎忠守義俟命於天致使州縣砥寧風塵不驚此乃臣子常分國家舊規守而勿失幸免獲戾豈意聖謨廣運睿渥旁流特令甄敘寵授官命勗以忠貞之效優其爵秩之榮光啓朝端昭宣海內凡是含識孰不知恩其來希皓等二百餘人無不感極成悲銘心殞涕不勝荷戴之至臣某言洛州元誼等防秋將士以今月日盡發上道訖氛沴清廓藩維砥寧臣某中謝伏惟皇帝陛下元德升聞鴻猷允洽致生靈於富壽均覆載於乾坤舞兩階之干而苗氏有格收三面之網而庶類知歸頃者元誼等竊據城池載經寒暑陷危疑之死地抵逗撓之刑章逭業逋誅視陰假息臣統茲卒乘臨問郊坰不能執桴鼓於行間盡敵而反擁旌旗於閫外胡顏自安每貽宵旰之憂實負春秋之責伏以陛下好生宥過軫悼發哀許其悛心納其請命俾遵向闕之路使足勤王之師妖星見日而自銷喜氣乘春而乃發凡在率土孰不歡心况臣所部實增忭躍臣恨以職拘戎旅不獲稱賀闕庭無任悚戀屏營之至臣某言臣聞慰疑理之代不無逆節軒轅用師於中冀唐堯出征於丹浦啓戰有扈文王伐崇以至聖除至凶至順除至逆或小戰而勝或因壘而降誠審於用兵得其道也伏見承嗣旅拒倏已再歲靈曜跋扈今又踰時天兵四合竟未殲殄得非千慮一失未盡制敵之方乎臣常終夜不寢詳推其故不敢膚引遠古安危之體請以天寶至德以來成敗言之夫以祿山陰深姦矯真巨猾也凶詐逆謀之計亦無元海石勒之流當其發幽燕陷洛陽涉崤函傾秦雍當國家理平之運忘戰日深初命將出師若封常清高仙芝哥舒翰程千里遇寇必敗奔北相望此則未究敵情小之而不設備以至於是也先聖悟既往之失苦心焦思發號靈武觀兵鳳翔良將徑卒風馳景附勇者為之用智者效其謀命陛下為元帥以儲二之重威四遠俾子儀為副以節制之任鎮九軍卒能恢復咸洛削平㝢縣此先聖之雄略陛下之有憾也疑其後相城之役陛下不行衆無適從竟以潰奔洎思明繼逆毒甚祿山狡算猖狂抑又有次光弼守河陽以挫其勢朝恩鎮陝服以制其侵陵竟未能覆其巢穴屬陛下紹興皇極又命元子為帥俾懷恩為副以討之復能梟夷巨逆砥定東夏始自先聖與二凶相持無帥則無功有帥則有克士庶之所深知今河北河南更唱迭和然其用兵暴急與曩者二凶懸殊非惟才之不逮抑亦事之有異祿山思明之卒死而無退今承嗣靈曜之衆豈有是耶祿山思明之馬既多而且逸今承嗣靈曜之騎豈可方耶祿山思明橫行而無懼今承嗣靈曜深居而入保臣竊料其非不欲也蓋違天道失人心歸之退而自固其滅亡之兆了然可知幸北有寶臣朱滔與承昭合勢西有忠臣李勉與馬燧連衡惟正已小有逗遛未肯戮力此正當陛下命帥專征之日豈可持疑而不斷哉儻陛下採臣愚計時有臨遣忠淳者必叶心競進攜二者必遷善來同未踰旬時當有成績如或務於含垢偷以過時不立元帥寄之諸將乘吐蕃寇盜回紇驅侵人心動搖賊勢滋蔓事宜一失無可奈何則吐蕃回紇四支之病承嗣靈曜腹心之病四支不理未足為憂腹心或病此則為患若內外受敵膏肓已成雖逢和扁針藥無及又聞二賊奏請言詞不恆河北則數云請降河南則云今已翻賊豈遷延晷刻以候西陲有虞伏惟與公卿大夫審圖利害在於神速不可遲回昔諸葛亮聞孫權破曹休軍因上疏蜀主云㣥疑滿腹衆難塞胸今歲不征明年不戰使孫權坐而併有江東蜀主深感其言終以覺寤臣忝六官之二待罪朝行內慙塵忝無補毫髮近者抵冒輒上封章已歷兩旬未蒙召見伏以君臣之際家國共同君安臣榮國危家敗此臣所以竟夕不寢復敢再陳其愚伏願省臣前意覽臣此疏天下幸甚天下幸甚無任惶懼之至增大歷十四年檢校尚書刑部員外郎兼鳳翔少尹侍御史巨唐大歷已未歲春正月假府君之子四鎮北庭涇原鄭潁等州節度使開府儀同三司御史大夫張掖郡王曰秀實追琢貞石光昭先考展孝思旌休烈也夫流濬者其源長德充者其後大更八姓而丕膺五福府君其人焉君諱行琛字行琛宗周柱史垂其裔前漢都尉昌其業大尉之威懷戎落驃騎之光啓冀方四燕兩魏高位碩德扶疏於史牒者向二百人以至高門平原忠武王孝先弼亮北齊奄荒東夏恢武經而抗衡西帝揆文教而師尹南宮曾祖德濬初罹否運播遷隴坻度地肯堂鬱為望姓在周辟奉朝請入隋值文林館靖恭厥位獲沒先朝大父操握機未發早齡即世考達從調夏官藝極龍豹致果為毅職統熊羆皆保家之良主府君生知六行之美學究三經之奧既齒鄉賦高標甲科簡修獨耀於錦衣從事仍屈於黃綬學有著位我實當之郡有子弟我實誨之自隴及岐鼎新儒行雖東里子産西蜀文翁誠存物應蓋未之比厥有成績聞於家邦厭名位而知止賁邱園而用晦我國家雖右斷胸奴之臂時修大刑於絶漠之表旁求百夫之特永清萬里之外府君顧謂子張掖王曰爾居能服勤性成惟孝出可承命遊且有方虎穴不探龜組何獲爾之元昆介弟可以供指使我之先人遺業可以終餘齒忠不擇事安實敗名因割慈以激昂俾宣力以勤遠君子謂府君知有愛子之道矣王投筆占募馳驛徂征坐籌必勝之略動獲前禽之利洎王宦登通貴佐律副軍銀章已綰玉關未入府君溫其在邑樂且有儀九流百氏經目輒誦四憂十義因心必達然猶深居自琛與物為春希言中倫知幾其神內葆光以恬真外行簡以倚仁子獲奉親之祿欲養而不待身寄有涯之生遷化而無天寶九載夏之季序遘疾於汧陽御史里之第乙酉奄歸無物其年于斯七十五稔夫人樂平狄氏吳山縣丞哲第六之女心婉志柔靜專動直承筐而繁衍其實主奠而敬恭無忒下壽初登先時永逝門子祥潁仲子秀成季子同潁等柴立長號稽謀宅兆明年春孟序辛亥遷皇祖及諸父之無後者偕葬於隴山東麓柏谷掌次列五墳同施一域送終之禮備矣屬歲旅天朔塵驚薊門徵會沙場之右殄殲鐵額之醜王飛郵及國劈地崩心夷凶難遂於情理哭墓復隨於軍正既清海裔又牧回中一蒞疲人薦彰丕績廣德二年秋九月乙未詔追贈府君祕書省著作郎夫人太原縣太君恩深歿後之寵慶表生前之訓上又以王翊亮三節綏御七戎致位崇獨坐之班成軍雪多壘之恥大歷十年夏五月詔加贈府君婺州刺史夫人太原郡太夫人十一年冬舊使尚書左僕射扶風郡王馬璘遘疾彌留表王請貞師律詔仍遷御史大夫既操二重之權克施五利之策平凉安定曲荷其亭育先零罕幵遙服其威信四封無聳三務有成十三年五月命朝丹禁面彊戎索帝曰朕翁孫也俾寫真麟閣稿拔而遣焉及季夏壬寅又贈府君揚州大都督夫人欣國太夫人榮親揚名二美兼著傳曰子之能仕父教之忠詩曰維其有之是以似之見於府君矣雖封植無改而銘頌未刻過聽謬採於芻蕘修詞愧陳于質要銘曰於穆端士神所勞矣貞惠資身義方訓子育德無倦徇名知止宜其後昆式是繁祉繁祉伊何後昆則然西服戎胡東定幽燕殊績克著湛恩上延贈光三錫慶洽重泉熊軾增寵牛岡啓繇北控涇源西憑隴岫列塋如始紀石增舊淑德清婉終矢永茂珣貞元時人惟聖作乂先天授人惟天輔德啓聖無親故我皇齊七政協三辰化孚大麓道暢經綸是以慶集天寶祥開地珍法威刑於震耀效生植於陽春鴻名既增睿歷伊始當渙汗之初發聽春雷之肇起將克宣陽罔忒時紀導達萬萌震驚百里南山望遠乘雨氣而方來長門聽深象車聲而未已若降在下如飛在天鬱重電而虺虺殷高棟以闐闐作解㣥物揚靈上元啓春和於蟄戶兆農慶於豐年若乃勢猛陵空聲雄出地形未遷而必肅政不戒而潛至渾渾其象含四氣於一朝虩虩其威警千官於庶位及夫薈蔚云卷煙埃稍廓餘雲既稀厲響不作攄殘怒於平野轉輕音於峻閣來雖莫制必先戒而後臻去則何言知勸善而懲惡是故知聖人御氣立極居貞體元災攘不令祉降攸繁豈與夫震廟為凶方知展氏之慝雹災莫禦乃訊申豐之言則有抱影窮居在陰向隅雖倚楹而有得終棄室以思濡進道則望深知已觀光而業謝冥符感雲雷之布澤思自達於通衢脫解字一韻句容西南三十三里曰赤山天寶中改為絳巖山以文變質也山外周流厥有湖塘舊址考於前志則曰吳人創之梁人通之矣洎金火有變積為習坎灌莽之所我唐麟德歲邑宰楊嘉延亦纂前服利農為名雖迹於傳聞而事斯芒昧楊氏之後今餘百年實滋菰蒲莫植粳稻剝極則賁候能而伸大歷十二祀縣大夫兼大理司直太原王公昕能蘇罷人且易弊俗臨湖而歎以欲從人吟使臣之清風酌良牧之高課將圖永逸匪顧暫勞因察其地形訪以輿誦謀始作則庀徒撰工月在休農雲其荷鍤周匝百頃蓄為湖塘置兩斗門用以為節旱暵則決而全注霖潦則瀦而不流收功濟時道甚明遠開田萬頃贍戶九鄉洎成奧區頗無凶歲魚稻之盛公實為之昔叔敖草陂能張楚國史起漳水竟富魏邦秦稱鄭白漢歌召杜皆謂是也每商羊罷舞龍見而雩比屋有憂於銷鑠連阡莫覩於耘耨我則黛波奫淪白鳥飛滅下洞庭之鳬雁泳中流之鱣鮪橫塘之右構為新亭芬其芰荷樹以柳楊楚江嶺憧憧是途行李實獲於蔭庥詠歌或藉於觀覽懿乎哉君子之用心也孰愈崇其島榭侈以林堂此而莫文翰墨奚述大歷十二年十月三日記式南陽人大歷中進士官殿中侍御史內供奉遷左司員外郎戶部郎中貞元十五年為河南少尹飛騎尉燕昭以齊魏黷武楚趙專征地僻援寡城孤勢輕體未遑於安席心每寄於懸旌外矜嚴以示懼中慷慨而不平欲羅天下之彥總海內之英爰築臺於國以尊隗為名知夫喬林之木可選他山之石可轉將在物之非珍謂求賢之不顯苟白駒之可縶信黃金之可賤且設而為已則以奢設以為人則為善岌然既就赫矣斯存象徘徊於前殿色晃朗於朝暾人所貴惟金我以為土時以士為賤我以為尊誠列辟之未制掩前經之所論昔銅雀創於鄴都陽臺起於荊國聳高麗之殊觀備珍奇而盡飾徒竭用而殫人自矜豪而逞力洎夫遺情繐帳徒愴淫心結夢巫山空資穢德豈同夫慮成經始所寶惟賢初假物以求士終得魚而忘筌不然者鳥將棲於茂樹魚自躍於深淵臣亦效誠於大國人遠誰仕於弱燕所謂興亡必繫於賢哲勝負寧由於衆寡庶斯焉而取斯誠大者而遠者及夫劇辛不召而至樂毅無媒而萃咸委質而納忠願長途而騁驥然則賢為強國之器臺實招賢之餌空悲霸業之雄不覩濫觴之自異乎哉歷萬古而共觀信諸侯之一致後之士寧無郭隗之才後之君但守燕昭之位是以千乘雖貴一士雖微必禮之而後為用必求之而後能歸不可誘之以利不可劫之以威因酌古之遺意惜臺平而事非惟天陰隲下土恢宏相導降聖啓運生賢佑時猶三光五行晷度盈缺之無夭夭心候也當元宗開元之後景化昭融選建明德大旌文學肅宗嗣位首革艱運方用大刑蕩穢闕二字則武功戡難議獄緩死闕一字代宗闕三字今上纂丕圖參任二柄以康億兆會稽公歷奉四后周旋五紀各因其會振耀長才有潤色皇猷之詞匪躬納諫之直有銓綜九流之鑒威懷九德之重故外統闕二字內亞冢卿開國承家分茅胙土所不至者未升鼎司儒流展用亦已厚矣公姓徐氏諱浩字季海東海郯人隋杭州錢塘縣令澄之元孫皇朝逸人闕一字敬之曾孫亠兊州九龍縣尉贈吏部侍郎師道之孫銀青光祿大夫洺州刺史贈左散騎常侍嶠之之子稟命于天稟訓于先稟氣于山川國器斯全輔之沆研無得而闕一字鬱為通賢年十五究經術首科升第始擢汝州魯山主簿闕三字卑時論稱之無何詔徵俾闕二字賢院大學士燕國公說文之滄溟間代宗師嘗覽公應制喜雨賦及五色鴿賦兼和製等詩曰後進之英今知所在賞歎不足闕一字為上聞賜帛出於中禁依聲播於樂府無翼而飛遽闕六字實愛其才申其用始終以之進太子校書集賢殿待詔改鞏縣尉尋拜右拾遺張守圭之節制幽薊恩冠諸侯欽承威名特以幕僚陳乞優遂其請授監察御史闕一字常侍府君憂服除補京兆府司闕一字參軍闕二字荼蓼毀濱於滅無復宦情既闕一字逾年勉從親故之諭起就常調授河南府司録轉河陽令先是有暗昧疑獄繫囚六十人公下車鏡照一立塵洗猶闕一字雷啓闕五字闔境闕二字熙熙如也桐鄉遺愛碑頌闕二字改太子闕一字議郎東土留守王闕一字辟從其事有河清俚人僞作符命埋深溪而表異滋拱木以徵年然後假獻歲之辰矯元元之誥審言闕八字以得之益雷同之口矣且云祚聖難以闕四字既說於聽聞史筆方裁於簡冊公明徵篆隸立辨乖訛正大謬於已然折㣥言於獨是既而致詰悉驗其姦遷金部員外郎轉都官郎中充嶺南闕八字求成俗事多詐濫吏闕四字公闕二字潔闕四字憎枉信義必行於夷獠廉平可動於鬼神五嶺百越頌聲四合同詣方面請建旌德碑都督張九皋為之飛章朝議以為主聖臣忠闕一字建聖德頌人到于今歌之轉刑部郎兼司農少闕三字兵部尚闕五字幽陵始禍㝢縣興師公以官在職司志當靜亂馳驛詣闕陳謨納忠度向背於兵鋒算隄防於地理慮先物表機變日闕一字天子奇之方超大任奸臣忌害闕四字除闕一字州㓨史建旆即路皇情乃寤念翦桐之立信謂剖竹之非輕乃加本州防禦使錫金印紫綬及京師失守翠輦西巡成都築受養之宮靈武奉繼闕一字之制傳召公詣行在所拜中書舍人集賢殿學士時鑾輿未復鶴詔急宣尤資倚馬之能多類奮鞭之速公虔恭法闕一字咫尺天顏握管風生落箋泉灑皆如響答特邁詞鋒上奇其才謂闕一字幽贊以本官兼尚書右丞封會稽縣開國男喪亂既平皇極反正輔宣天子之孝奉揚君父之慈元宗降孝感光天之詔肅宗獻至道闕二字之闕一字啓沃兩宮之闕三字三接之恩獨以雄文闕四字前代文闕一字之盛孰可儔其類歟當時以陷賊衣冠正名同惡百辟會議三司定刑其徒三千將置重典公上引大易三驅之闕一字雅誥惟輕之義近徵侯君集反於輦轂太宗唯罪四人越王闕四字狄仁傑議誅元惡而言國章有素故事斯在詞簡理要端如貫珠百寮傾聽無復異論廷諍三進竟獲減論李輔國憑寵恃勳台臣側目有命將授左散騎常侍闕四字公敷陳曰敗由官邪名不可假登闕一字珂鳴之地侍從顧問之間授非其人期不奉制有命改授大詹事且曰將來命官若此者皆許以聞然蹇諤之誠幸伸於一捷而浸潤之譖竟中於多言因除國子祭酒遂貶廬州長史代宗踐祚公論勃興乃闕一字復中書舍人加銀青光祿大夫集賢殿學士副知院事尋遷工部侍郎楊眘微病久政荒歿於南海馮崇道陰奸伺隟盜據新息以為杖節闕一字綏非公莫可拜嶺南道節度觀察等使兼御史大夫公折簡飛書先明大信順流鼓棹以示不疑見書者皆曰此選補徐郎中之名也父母至矣復何所求既而傾巖洞以請命闕一字戈鋋而頓顙窮南極東人迹罕通習習祥風蕩其闕二字無闕三字舉闕七字復闕一字庶富而後教之會來年有吏部之拜復兼集賢學士嘗領東都選務銓第舉科凡百其流拔奇者一人而已比居宰輔闕二字踰年即闕一字相闕一字齊公其人焉洞鑒深識皆此類也闕一字不闕一字德瑕不掩瑜闕一字執法者所繩又黜朗州別駕皇上登寶位徵拜彭王傅加會稽郡開國公食邑二千戶覩風儀之可法惜春秋之已暮尊德尚齒方欲以論道之位處之其明年薨於長安永寧里之私第享齡八十告第加等贈太子少師終焉公禮義之輿中和所蘊智周顯晦行茂家邦班固謂董仲舒公孫宏倪寬以儒術通世務闕一字三人似闕一字其闕三字度德以義復何愧於前賢先府君擅書公嘗受筆法闕二字忘倦草隸兼優開元天寶之間傾玉帛刻琬玉者一門二妙而已議無優劣以王右軍父子擬焉始自登朝特為中書令張曲江所器忘年定契不復以禮秩關情故當代英選孰非交友闕二字彥異自我吹噓所以纍登石渠再踐西掖入更臺省出擁旌旄九遷而碩望彌高三黜而輕痕不汙賓實本末信中庸之君子歟公以建中三年四月二十五日薨以其年十一月葬于東都偃師縣先塋之左闕一字洎貞元十五年嗣子現罷宰王畿之新安璲為東府法曹掾璫玫舉進士未第伯仲之存者四人現嘗以家傳遺文俯敘其志曰史牒藏諸冊府墓隧閟於幽扃永惟世德尚隱松楸未奉紀功行於金石留九闕二字百代朝建夕殞闕二字無恨國有干戈之故家有死喪之戚懇願未就垂二十年辭將涕從禮以情激則聖人所謂揚名於後代以顯父母者揚己之美與揚親之美俱孝子也其闕三字顧闕二字寂之請闕四字之效銘曰東南有截強霸者越中蟠會稽旁浸海浙含風蘊玉浴日孕月象合粹靈氣生才哲才哲伊何惟會稽公克闕一字克亮克孝克忠種蠡宏謀王謝高風實探其奧實闕一字其蹤其一會稽之德和柔且直朗邁溫重威儀抑抑乃辨姦諂㣥疑去惑載讞典刑刀鋸減息內外更踐卑高稱職績著縑緗愛留邦國其二會稽之文代天為言藻繪皇猷恢宏化闕一字含和變闕二字澤伸寃邃劇淵塞疾如雷奔宣明日月贊翊乾坤敷暢大號親親尊尊草隸兼善鍾張抗論一臺二妙獨耀吾門其三會稽之武非謂暴虎建旆鞠旅往綏南土南之凶殘民痛里殫盜邑乘城餘孽桓桓于以代起推誠靜獻人謂投戈我唯揮翰翰墨所經人胥輯寧其四會稽之終翰苑其空宸扆軫悼邦人輟舂楷模遺草景行中庸大雅道喪誰其發蒙成周之東天地之中邙洛向背終華會通故塋新壟闕四字勒石銘德悠悠不窮其五偃大歷末為都官員外郎朱泚之亂僞署中書舍人賊敗李晟收斬之王者之政變人心為上因人心次之不變不因循常守故者為下故非有獨見之明不能行非常之事今陛下以惟新之政為萬代法若不革舊風令歸正道者非也當今道士有名無實時俗鮮重亂政猶輕唯有僧尼頗為穢雜自西方之教被于中國去聖日遠空門不行五濁比邱但行粗法爰自後漢至于陳隋僧之廢滅其亦數乎或至坑殺殆無遺餘前代帝王豈惡僧道之善如此之深耶蓋其亂人亦已甚矣且佛之立教清淨無為若以色見即是邪法開示悟入唯有一門所以三乘之人比之外道况今出家者皆是無識下劣之流縱其戒行高潔在於王者已無用矣况是苟避征徭於殺盜淫穢無所不犯者乎今叔明之心甚善於臣恐其姦吏詆欺而去者未必非留者不必是無益於國不能息姦既不變人心亦不因人心強制力持難致遠耳臣聞天生蒸人必將有職遊行浮食王制所禁故有才者受爵祿不肖者出租征此古之常道也今天下僧道不耕而食不織而衣廣作危言險語以惑愚者一僧衣食歲計約三萬有餘五丁所出不能致此舉一僧以計天下其費可知陛下日旰憂勤將去人害此而不救奚其為政臣伏請僧道未滿五十者每年輸絹四匹尼及女道士未滿五十者每年輸絹二匹其雜色役與百姓同有才智者令入仕請還俗為平人者聽但令就役輸課為僧何傷臣竊料其所出不下今之租賦三分之一然則陛下之國富矣蒼生之害除矣其年過五十者請皆免之夫子曰五十而知天命列子曰不斑白不知道人年五十嗜欲已衰縱不出家心已近道况戒律檢其情性哉臣以為此令既行僧道規避還俗者固已大半其年老精修者必盡為人師則道釋二教益重明矣景亮字長晦幽州范陽人第進士宏詞授祕書郎遷右補闕德宗朝貶朗州司馬憲宗立由和州別駕召還再遷中書舍人卒贈禮部侍郎揭金盤而受露擢仙掌而凌雲當朝陽之出海屬寥廓之無氛霽色曈曨金輝晃皛光奕奕於九霄之際色昭昭於衆象之表大明既照甘露方盈金景相映銀華自清高不可攀駐王喬之羽駕仰不可視奪離朱之目精彼方丈之金闕洎天台之赤城或煒煌而景耀或煥赫而霞明出人寰之杳渺隔海嶠之崢嶸孰與我之為異標景光於上京觀其巃嵸雙立岧嶢上騖輕靄不飛纖雲不度九成爛爛搖翠影於樓臺四野熒熒落浮光於草樹斯亦域中之殊觀豈惟作器而盛露且夫先王立晦獨覩太陽卷天宇之夜色引帝庭之曙光惟大君之攸俟仰㣥后之所望其彩若電其形若月列缺雖伏常煒煒而不收蟾蜍已歸實亭亭而未沒日無私而見照盤既遇而斯發請言露盤之始也林巒掩映崖谷重深自蘊於石孰為之金遭漢皇之雅尚會良冶之幽尋忽範鎔而有作爰奉承之是任不然者在塗泥而委棄與瓦礫而湮沉安敢望微耀之輝映初陽之照臨金之為質也光盤之為體也靜從有感而出日諒無心而生景念志士之未偶因達人而後騁顧淺陋之凡才寧覬覦於天幸
