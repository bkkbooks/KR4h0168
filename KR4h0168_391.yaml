front:
  text: 全唐文欽定全唐文卷三百九十一獨孤及八
  hash: sha256:5337f50cc956037c61b0f871cd119a0c3f557f53ca0c87b285ca716534a596e5
body:
  text: 少保諱遵皇唐太祖景帝七世孫也祖瑜鄭州刺史追贈太常卿烈考日暈官至太僕贈太子太師揚州都督公聰朗奇偉豪邁曠達率性忠孝臨節有勇開元十年初仕天寶六年出守始於淄川歷濟南汝南以剛明莅衆所居政肅民受其賜生為立祠十四年秋九月由執金吾為彭原郡守明年長安覆沒元宗遜於南京便橋之役我師敗績自新平屬之五原二千石皆反為賊守莫有勤王者肅宗以餘騎十數次於彭原公頓首迎謁且憤且喜因獻衣服鞍馬泣問大計乃悉發倉庫募敢死士獲九百人公自誓衆扈蹕而北翌日師次臨涇又北至於平原收攜貳逆命者斬之以殉破其餘黨進幸靈武旬日之間有衆至數萬王師遂張於時法駕播越神器無主公與裴冕等率㣥臣勸進陳天意上尊號以定民志上乃即皇帝位拜公尚書工部侍郎領宗正卿乘輿南旋公封鄭伯舊京始復公典營建社稷宗廟園陵壇墠罔不畢修百工咸若乾元二年論功行封策為鄭國公定食實封二百戶加特進工部尚書宗正如故上每拜公相命將帥建妃后公悉參焉渥澤滂沱羔雁盈門家有陸生之士冖䂞樂兼魏絳之賜中興宗臣荷寵莫二會李輔國泄省中語且諷公卿舉已為相公不從密陳其奸明年肅宗崩公由太子少傅貶袁州刺史竟為盜憎且讒勝故也寶應二年拜鴻臚尋復加太子少保貶永州司馬大歷二年七月某日薨於永州春秋若干夫人盧氏蘄春郡長史諭之子以副筓宜室封范陽郡夫人而偕老夭夭心願先公十二歲而歿大歷三年夏五月庚申合葬於萬安山北原禮也惟公宣力殷憂之際克扶艱難之業忘身衞上忠之至者及居職任事知無不為永泰之後以列侯朝請則放志達生以親其身再處左官皆非其罪知公者謂公進因策勳退不附邪善無近名直而忘懷斯可謂之達矣有四子謂誦諲諤願書其先人之勳烈使後嗣子孫得酌而觀之於是公母弟祕書少監日勛謂及忝佐典三禮宜知先王先公之昭穆故命及為誌其詞曰貞松之姿匪寒不知公之清規見於國危抗憤忠勤發民濟師戮力扶義天步乃夷奄有滎波遂荒鄭封帝曰俞往汝作共工澤流於家慶積恩重門羅軒蓋賜有歌鐘再謫湘源謂當後笑遂遊岱宗天實不弔寂寞舊館淒涼江徼琢石泉戶摛其光曜公諱濤皇唐太祖景皇帝六代孫也曾祖道立嘗典陝濟陳三州刺史封高平郡王祖景淑畢國公父仲康官至尚書主客郎中楚州刺史世秉懿德為公族領袖語在皇室譜公純孝忠厚貞信廉讓直而遜明而晦朴而不固靜而應物克已復禮時然後言策名居官清畏人知弱歲好學篤志經術專戴氏禮晚節耽太史公書酌百代之典故以輔儒道以經明行修宗正寺舉第一初仕許州臨潁縣主簿歷宋州宋城縣尉皆以恭寬信惠聞於千室議黜陟幽明者謂公文行吏事宜登三臺會河朔軍興避地江表相國崔渙承詔署衢州司士參軍於時五府辟召之權移於兵間務苟進者多由徑而致顯位公儉德正志安貞俟時未嘗以得喪夷險芥蔕方寸視榮辱晏如也論者高之乾元二年某月日寢疾終於揚州春秋若干某月日權窆於衢州嗚呼仁可以師表縉紳而無貴仕禮可以軌範風俗而不遐壽沖用休績卷而未形溘焉化往使善人相弔嗚呼哀哉公歿後十有二載從父弟涵以宗室柱石為御史大夫按節江東痛仁兄生不登公侯卿大夫之位歿不備踰月外姻至之禮遂茹哀筮日減月俸以庀喪具由是大歷九年夏四月二十七日公長子居介及居佐居敬居易奉公之輤柩歸葬於洛陽先使君夫人宅兆之側凡今孝乎惟孝友於兄弟者於此乎觀禮及謂知公者宜莫若懿親今將以無媿之詞申報幽路故作銘以刊之於石其詞曰天地方否君子安卑世道既夷隙駒莫追仁而不壽才既無施積善必慶天何余欺襜襜裳帷泝江絕淮蒼蒼故山玉樹斯埋死喪之威兄弟孔懷令德家風與天壤偕夫人諱某字某楚王交傅孟裔孫唐許州司馬皎曾孫渭南主簿懿之孫兗州金鄉縣尉商伯季女祕書省著作郎睦州刺史儹之妹其先自彭城郡徙京兆從丞相賢後九世至本州大中正穆始有東西眷之號二十五世至徵士敻居魏周二代出不降志處不隨俗時人號為逍遙公夫人之七世祖也逍遙公生民部尚書建安公世恭建安生上大將軍宋州刺史仁祚將軍生給事中旅即許州之禰也夫以四言之遺直一經之遺烈十徵之高風焯於古今宜其秉哲垂懿百代不隕地之華望之崇與春秋之唐杜范氏漢晉之袁楊王謝侔其熾大矣哉三十八葉之明德茂祉降衷於夫人故孝慈貞儉溫惠淑慎文敏好禮三者皆天機生知不待師訓而至廣德二年夏六月歸於我衣服飲食躬自菲薄夙夜戒敬致孝於荇菜接娣姒以謙馭幼賤以敬敦善勸義恕不知而矜不能喜怒未嘗見於容止也其德禮所化宗族以睦兒童知讓生一子四歲而夭大歷四年夏六月癸丑再孕不育乙卯歿於舒州春秋若干仁厚而不福德備而不壽是天不惠於我家也向使錫厥永年正家承筐宜爾子孫百祿是享非夫人曷歸啟手足之日長幼號咷外姻內姻親疎皆行哭失聲也宜哉是歲九月甲申以輤裧裳帷遷於洛陽十一月丁已安宅兆於舅姑先塋之西南隅恐時逝事遷景行不貽於後故刊石以志卒葬且謹而日之殤子河南獨孤氏小字韋八以其弱而未名也故以字稱北齊司空行臺尚書令臨川郡王七代孫有唐安南郡長史府君之曾孫潁川郡長史府君之孫左驍衞兵曹參軍公之元子祕書省著作郎京兆韋儹之甥生有奇表溫明聰秀覃訏於保姆傅婢之手嶷然異於凡童氣閑體和取與必時諸父諸姑每謂興我家者必此兒也賓客之至者看玉人不暇倘假以壽命則成器致位未易度也不幸多病大歷六年歲次辛亥十二月二十二日夭於舒州壽止五歲三十甲子長幼惋毒六姻悼惜嗚呼天將不昌我後裔乎不然曷使此孩不至於成歟大歷八年夏四月十六日以其喪歸洛陽祔於王父母宅兆之側其仲父銜涕書其始終記於墓云唐天寶元年歲次壬午潁川郡長史府君第三子曰憕寢疾卒於潁川至德二載冬十月四日權窆於洛陽龍門之西山焉至大歷四年五月十有二日詔追贈潁川府君祕書監是歲七月十有一日壬午遷宅兆於壽安祖塋甘泉鄉之原以君之喪葬於塋之左禮也君沈毅出於天成幼年性即果斷岸然不可以屈撓資稟㯋悟過目成誦若出之素得兼之好學不倦朝夕無廢時弱歲專於左氏春秋晰疑洞義二百四十二年之事若列之指掌尤工於畫尤善音律圖書之奧靡不深究津津乎神遊而趣洽所以為之即得其理意氣倜儻達節不欲以細行竊名志氣方遠未仕不幸多病年方二十二而歿嗚呼修短之經聖人罕論同塵顏冉茹恨何言嗚呼夫人諱某魏景穆皇帝九代孫也祖諱某皇朝贈太子少保父諱某克荷前烈不幸早世夫人在孕而孤鞠育於叔父相國潁川公天機聰明生知仁孝被服法度綜習文史年十四嫁河南賀若璿璿積功勞剖符為郡夫人輔佐以副筓宜室能睦其族且勸以義而風藻禮範儀刑閨門晚節厭離心垢嚴持禪誦而道機未宏壽量有極永泰元年三月某日終於渠州享年若干嗚呼以夫人之柔明孝慈溫惠淑茂况承景穆之餘裕少保之貽則季父當國良人專城河潤澤及福綏宜遠胡弗眉壽鍾是短歷潁川公之慟其可既乎大歷二年二月二十二日反葬於京兆鄠縣之某原宜列景行貽於彤史恐陵岸或遷音徽將沫故月而日之銘諸堅石蓋猶父之志也其詞曰人亦有言天祚明德吁嗟邦媛未偕壽域家節既成蕙芽方植仁而無報為善者惑夜臺超忽神斯冥默貞石有磷德音罔極乙已歲四月二十六日有唐新平長公主季女姜氏卒於京師昊天觀五月六日葬於某原長公主歎季女姿度榮茂溫惠淑慎能修女師之訓動中禮範其曾祖柔遠位至尚書地官侍郎祖皎以勳舊歷太常祕書剖符封楚其父慶初能踐修祖考之耿光嗣爵舊國復居太常元宗其外王父也肅宗其舅也天池波瀾澤潤本根謂德鍾下錫祉與壽宜君子家室且貽芳於彤管乃未筓而夭命也夫嗚呼窈窕專柔含德而未形雖當鵲巢小星采蘩殷雷之德今已矣夫史氏蔑由記之矣長公主之慟其庸可及乎故月而日之銘諸堅石焉其詞曰思孌季女生於公族稟懿德兮天世其祿不遐其福胡不淑兮彭殤同躅數不可續哀靡極兮夫人諱某博陵安平人也曾祖恭禮國朝駙馬都尉延齊易三州刺史封博陵郡男祖興宗饒州長史考雋亳州臨渙縣丞夫人少孤在家以純孝稱既筓莊明而賢柔順有識年若干歸於獨孤氏奉蘋藻供祭祀事長撫幼糾合宗族敬恭而誠孝愛備至動必由禮非法度未嘗踐也生子四人教之以義方夙夜貞勵家道以正娣姒服其義親戚稱其慈天不降衷於我大歷八年十一月某日享年若干歿於壽州少長行哭六姻涕泗傷夫人有宜室之美勸義之明而司命奪其長算使德與壽反嗚呼哀哉明年十一月日公使長男勣奉夫人之喪返葬京師某原先塋之側禮也刊石以誌庶德不朽其銘曰夫人之德柔明淑慎從夫以禮承筐以順奉若家節率由彞訓遐福是期溘至何迅謂仁者壽天實不信同塵彭殤歸根大運於以刊石永播淑聞夫人諱某趙郡人也皇朝德州將陵縣令銛之長女天生柔懿齠齔知禮年十六歸於崔氏丕承宗祀虔恭中饋謙敬恭儉貞固淑溫閨門化之宗族以睦生一子年十一而殤有女四人長女夭於襁褓次女適范陽盧履純第三女適河南獨孤及年若干早世少女適樂安蔣鎮皆柔明好禮淑慎有德循度勸義雖造次不違仁實夫人之教訓也輔佐君子三十有九年夙夜靡違家道以正向使神祈正直天報德善宜登期頤與君子偕老嗚呼不造春秋五十四而歿凡所顧復太半道夭撤琴瑟之日無兒主祭德與事反哀有何極嗚呼哀哉是歲十月某日卜宅兆於某山某原追紀往行以志幽石禮也及忝婚姻之故常瞻清懿逝歿相尋報德靡及敢不備書實錄期於不朽其詞云莊敬柔順婦行之極抑抑夫人秉是懿德衿鞶為戒蘋藻惟職四始之美六姻是式仁而必報當躋壽域天實匪忱古今同惑變化忽恍音徽冥默闑右遺範是效是則夫人其先隴西人也皇唐高平郡王道立之元孫畢國公景淑之曾孫祖仲康開元中為尚書主客郎中楚州刺史父濤以貞信篤行為宗室冠冕歷宋城尉衢州司士參軍而歿德厚而位不稱啟手足之日為守道者所痛夫人吾之姊子也稟氣於家君之中和母氏之柔明故姿度淑茂恭儉謙順天性孝慈聰慧有識讀書善鼓琴造次必以禮自持莫見其喜怒之容言歸於崔以德宜夫事姑禮節儀刑閨壼輔佐之美六姻是瞻有識者謂當有鵲巢之貴鮐背之壽天則反是使春秋二十七而終醫不至歟命有極而然歟適來適去皆忽然歟吾痛且惑傷悼之不足故形於文且遂為誌其文曰爾德爾容天實爾鍾爾志爾年天何不從勸義孤望歸安跡絕哀哀母氏泣盡繼血刻字此石記爾芳烈公諱誠字元成魏郡頓邱人也九代祖誕魏太傅陳留郡王從太傅七葉生左威衞將軍翊左威衞生汾州長史昇長史生濮陽令諒濮陽生公四歲知禮七歲善屬文年十六戶部尚書姚珽以賢良薦比之終賈開元三年舉進士十年舉茂才十七年舉文學皆射策取甲科由太平尉為金吾曹監察御史河南司錄美原令膳部員外郎天寶元年考功郎中知制誥修國史二年中書舍人五年祕書少監七年十二月終於京師自初仕至終二十七年歷官十享壽五十三動靜由禮交不諂瀆宏毅貞諒直而不肆居官必忠執事必敬未嘗以悔吝改操為權倖屈法由是自御史為河南府司錄持正不阿故也宰美陽周月收案大猾除其根株然後布政及期而美陽無訟乃有涸泉湧流白雀馴於庭開元中蠻夷來格天下無事搢紳聞達之路惟文章先公以俊造文賦皆第一京師人傳寫策藁相示以為式無何司言載筆乃典祕書公才盛名高與職位俱論者謂公以文學政事取公器如拾芥雖不至公卿其令聞令望足貽後昆夫人孝義縣君宋氏萊州司馬元同之女禮樂風操家之範也柔明孝慈天之質也清淨厭離修之惠也能修采蘋之職以正家節李氏之閨門肅九族睦實夫人是賴乾元元年隨長女從夫於洋州二年正月二十五日終於某居享年五十七遂權窆焉路難不克反葬故也有才子二人曰興曰殷悉能荷先大夫之德興三十為左補闕起居舍人殷舉秀才甲科永泰二年興請命於上迎夫人喪至自洋州十月二十七日合祔於澠池先塋夫惟天地能長且久若邱隴陵谷則無不遷者也故纂其先人之景行勒於石以為誌府君諱璵河南洛陽人漢世祖光武皇帝第二子沛獻王輔之昭也齊臨川郡王河陽道行臺僕射洛州刺史永業府君五代孫國朝明威將軍文惠府君第二子越州都督浙江東道節度觀察處置使兼御史中丞右金吾大將軍峻府君之季弟也聰明仁恕專直寬信擾而毅溫而厲弱冠筮仕以藝即戎藏器安卑非其志也天寶十四年安祿山反朝廷以淮淝海沂三吳咽喉宜擇良佐以貳藩鎮命府君為泗州長史無何換滁濠二州倅戎備參吏職忠敏肅給所涖繄賴御史中丞崔公昭之尹河南也盛選僚佐表府君為太常丞兼殿中侍御史營田判官使罷轉湖州別駕大歷五年崔公受詔持節牧宣歙池三州府君復為從事以太子右諭德兼殿中侍御史遷大理少卿兼侍御史方謂宜民宜人祿與壽俱遭命不淑春秋五十五而歿是歲大歷九年春三月二十四日也夫人隴西李氏以柏舟之誓提攜諸孤某等奉府君之喪言歸洛陽某月日窆於某原禮也府君少孤事兄嫂以友悌稱在邦在家言信行果居官祗事強志能力及其冠法冠佐太府上以勤恪周爰成務下以明誠勞謙應物和禮正家敦睦族姻自疏及親必慈必愛而命不我與年未下壽天天其椓嗚呼哀哉初府君之金吾伯兄擁旄浙東也拔崔公於郡吏之中升為軍司馬推誠委政之分猶晉得韓厥宋得子罕及中丞之開府辟掾府君為首既而府君之喪也中丞哭之慟贈賻賙給加於人一等由是稚子孀妻得奉喪而西三月而葬禮無違者賻布之餘足備祭器君子謂金吾之明哲詒厥兄弟宣州之交情見於死生知已之道斯其行者鮮矣及敢不以直詞書仲父之美於墓石其辭曰叔父懿德承家令儀惠迪哲兄踐脩靡違移治於官發跡淮沂及佐皇華亦繡其衣天子命我再參軍機駱馬嘽嘽所從其誰顯允君子為諸侯師府君委質咨諏載馳式壯其猷耄未及之陰陽為寇子鵩洽期昔也陟岡哀哀永思今也反真匪公曷依伯兮叔兮今乎已而他年九原公誰與歸歲在丁未七月丁卯有唐故右散騎常侍李季卿薨享年五十九文經邦國行滿天下無人非鬼責之悔以近後劇無中人十金之產以補祭於身歿顧謂宗子家老必以巾車一乘斂手足形還葬其孤馮翊縣令霸等泣奉遺命以某月庚寅附宅兆於長安九陴原之先塋名公上士護喪會葬同道必至哀纏都邑初公烈考曰適神龍中歷官中書舍人昭文館學士工部侍郎才高而明為文章蓍龜公生而好學地使然也豁然宏達天所縱也臨大節而賈勇不私其身也進賢不進不止事君以忠也當昔天步方艱王師有征公入參諫臣出佐軍政直躬咨諏戎臣賴之其後領二曹判二州再司王言三貳京尹由祕書少監為吏部侍郎復兼御史大夫慰撫山東淮南明年勞旋典選如故大歷三年拜右常侍其勤王家十有餘年舉措由道行止以直居貞守忠慾不能惑思賢求才若渴若飢推心吐誠親疏以之執德之經不為利回正進退於忠信視得失如洟涕凡君子在位則不仁者遠攸徂之邦宜皆蒙福遽奪公算是不惠於斯人也天難忱斯嗚呼哀哉諸公以為不可奈何者壽夭之數若奮揚景行宜在知已由是尚書右丞長樂賈至作銘以銘之有唐祕書監永安縣侯姚公諱子彥字伯英其先馮翊蓮勺人也至高祖僧洪徙家河東祖思聰祕書少監父坦汝州梁縣丞贈祕書監公忠諒孝愛寬仁愿恭質方氣沖天所授也而力行博學溫故知新錯綜六藝以作詞賦初舉進士又舉詞藻皆升甲科尉清苑獲嘉永寧三縣開元二十九年詔立黃老學親問奧義對策者五百餘人公與今相國河南元公載及廣平宋少貞等十人以條奏精辯才冠等列授右拾遺內供奉歷左補闕於時天下無金革之虞選多士命百官先文行而後名法而柱下方書南宮章奏主張綸翰典司禮文尤精其選非盛名莫居由是遷公殿中侍御史禮部員外郎禮部郎中知制誥中書舍人太常少卿天寶十四年奉詔宣慰江東淮南覽觀風俗無何二京陷覆太夫人捐館公外罹憂患內厂田坴惸疚銜憤泣血毀瘠滅性乘輿反正公適外除拜太子右庶子於時迍難始康百揆草創官復其職人亦求舊俄又授公中書舍人禮部侍郎光祿卿左散騎常侍加銀青光祿大夫復知制誥廣德二年授祕書監以儒行懿德策名三朝遺跡故事周徧臺閣資忠體和惟道是居正身奉上中立不倚恐懼戒慎形於隱微故遭值傾否出入夷險而未嘗有悔名與身偕德善是依明哲以保故也享壽七十有八大歷二年四月某日薨於位五月某日詔贈禮部尚書知言者以為壽富康寧攸好德考終命洪範謂之嚮用五福而公居四焉以清儉貽厥子孫故所不至者富焉爾非明德介祉何以享茲有子曰驍曰驥曰驂曰駰曰驌號於昊天痛欲報之罔極也銜恤問禮抆血襄事十月丁酉卜兆此原惟盛德與公器若川流之無還垂芳如之何刻銘於其墓之門將以志不朽其詞云恂恂祕書蘊粹含和服膺孔門行鄰四科遭時之康天下尚文公奮羽翰翺翔慶雲晚逢中興貴德尚齒公秉懿範入作卿士逮事三后出入二紀典禮司書媚於天子居貞保儉與祿終始鬱鬱佳城烈烈餘美日月有逝令聞無已
