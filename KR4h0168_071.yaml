front:
  text: 全唐文欽定全唐文卷七十一文宗三
  hash: sha256:65b9911289208d57417ea0e778fc3981362178a5f7355c7bcdfd4f37331282ec
body:
  text: 秀實忠衛宗社功配廟食義風所激千載凜然間代勳力須異等夷宜賜綾絹五百匹以度支物充仍令所司供少牢并給鹵簿人夫兼太常博士一人檢校志本於道蓋道以致君為先代實生才蓋才以濟理為務不索何以獲其實不言何以知其志故帝堯垂詢衆之訓殷宗首沃心之術其傳曰嘉言罔攸伏又曰俊人用章漢魏以還詔策時作暨於我唐遵為故事繇是善政惟乂魁能間出朕祗荷大寶勤恤兆人明不燭於幽暗惠未流於鰥寡御朽兢慮求賢永圖是以詔命有司會羣材列稽疑延問闕政子大夫達學通識儼然來思操觚濡翰條誨宿滯慰我虛佇必宏嘉猷故臨軒命書策以審訪繼燭俟奏其悉乃辭各宜坐食食畢就試左散騎常侍馮宿太常少卿賈餗庫部郎中龎嚴宜並充考制策官王者謹天戒酌人言叶時凝命資賢贊理斯為令典也朕以菲德祗膺大統歲屬凶旱人思砥寧庶察弊以勤理因舉能而詢衆科別條問臨軒致誠載搜尤才果副虛佇賢良方正能直言極諫科舉人第三等裴休裴素第三次等李郃第四等南卓李甘杜牧馬植鄭亞崔璵第四次等崔讜王式羅紹京崔渠崔慎由苗愔韋昶崔槫第五上等崔渙韓賓詳間吏理達於教化科舉人第四次等宋昆軍謀宏遠堪任將帥科舉人第四次等鄭冠李栻等皆直躬遵道博古知微敷其遠猷志在宏益實能攻朕闕紹政經究天人交際之理極皇王通變之義指切精洽粲然可觀既校才於試可宜旌能於受祿其第三等第三次等人委中書門下優與處分第四次等第五上等人中書門下即與處分王者重統紀尊儲兩所以上嚴國本祗叶禮經睦人倫以正邦典崇丕基而昭彞式其或德契元良恩當追命道雖間於存歿義有表於哀榮仰惟舊章用攄憫志故開府儀同三司晉王普先帝冢嗣間氣夙鍾孝敬發於岐嶷溫仁形於襁褓翦圭分社光祝册於參墟錫土啓藩假威尊於上黨朕頃戡內難謬屬與能以王齒在嬰提事絶推讓方期就傅謂致修齡既因猶子之義俾膺主鬯之選天不憖遺殲我本枝泣悼永往空餘典禮嗟樂善而莫報顧十起而何追銜悲良慟此誠無極是用稽諸前訓申我宿愛布曩懷於此日告如在於幽靈式備虛儀曷瘳深痛可贈悼懷太子仍令有司擇日備禮追册朕撫有四方子育兆庶虔恭夕惕罔敢自暇庶乎天地交感人神洽和如聞山東降災淫雨泛濫豈政理有所未明人情有所未達邪中宵待旦惕然疚懷應是諸州遭水損田苗壞廬舍處宜委所在吏切加訪恤如不能自濟者宜發義倉賑給普令均一以副朕懷凡權知授官皆緣本資稍優未合便得藉才擢用故且權知若通計五考即便同正授極為僥幸自今巳後應諸州府五品長馬權知正授通計六考滿停其勒留官如有未滿六考停給課料者便準此卻與支給朕初撫天下實在便安故委同捷節旄處以華壤顧彼童孽豈宜當之然蔑棄君親不合容覆忠臣義士咸同忿嫉非朕生事至於興戎鎮州王庭湊承纍朝恩榮據四郡士衆將為率先問罪以圖策勳而乃影援逆寇干犯王旅諸道使命縶為纍囚內兵滄州抗戰四境交支郡之管籥棄鄰好之姻親無恩於家忘義於國而猶特遣中使許其轉禍詞旨堅執曾無少悛近日又令宰臣遺書許以效順王誥一去寂爾無聞朕以成德一軍代建勳力聆風拭目待之實殊豈為庭湊一人致使傷及百姓今迫藩臣懇請連章繼來朕猶不能獨斷宣示羣公卿士參詳可否以觀衆情義不容誅列狀斯在今亦酌其便以適事機亦以嘗在先朝曾效忠慤寵獎逾等驟至三公開其自新以全臣節朕之恩義亦不負矣其諸道與鎮州鄰接處宜並絶其進奉嚴加警備其有突犯及隨指揮併合宜依詔旨處分諸道須有移軍出界並不得焚燒廬舍橫加殘害歸投者撫之拒命者禦之如有忠臣義士以一州或城鎮降者並依討滄州例處分其上都進奏院宜令御史臺京兆府切加守捉禁其出入待後敕處分如庭湊翻然改悔乞效忠勳上表陳誠須有聞奏亦委鄰界當時轉與進上不得停留於戲朕示帝王至仁以安兆庶以黃老清淨用寧寰宇文誥屢施而不從兵革在郊而未弭德不能洽誠有未孚致此費辭良多愧歎門下雷霆雪霜上天所以成物明罰敕法聖人垂之易象豈陽春不可以獨化將輔理固在於威刑乎則遏亂禁非法天齊俗諒有為而然也何則三綱五常王化之正本彰善疸惡國經之大防君人者苟不提此柄以示天下是納人於陷穽道俗於豺狼而欲家固人安上和下順猶北轅而適楚也李同捷罪暴寰宇告之則悖寵之益凌亂君臣父子之紀綱棄覆育生成之恩義則綏討之命蓋不得巳焉而王庭湊為我藩臣久膺寵命致爵位於擾叛之際齊恩澤於忠義之倫贖過圖功宜百羣帥而首扇同捷使起自墨縗黨惡之心劇於虎兕負德之醜逾於梟獍驅忠義之旅以授凶渠率悅順之人以侵鄰壤藩方統帥飛疏互來朝右公卿懇章繼奏皆期鳴鼓問罪奮戈啓行朕道希包荒志在含垢多端曲護大開坦途諭之使致奇功告之將酬重位顯招密示抑義降心繼馳信臣纍諭深旨而傲很彌甚凶肆不悛飾惡言於布章資盜糧於狡寇拘四鄰忠告之使堅一境代襲之謀與逆豎為輔車絶舊歡於姻好屢有降卒備驗姦蹤潛軍入援德棣縱燎以焚瀛莫河東易定被毒騷然憲誠從諫見侵相繼加以猜戮無辜安忍逞欲有族坑屋誅之令極削下僭上之圖井邑銜冤道路以目自頃冀其迷復未議加刑但令閉境猶希補過而乃大舉將卒期覆定州取怒人祇迎風瓦解稔慝搆亂前古罕見若尚為包容則孰分逆順其王庭湊在身官爵並宜削奪應諸道州鎮接界處各宜逐便攻討其鎮州將士如有梟斬王庭湊者先是六品以下官者便授三品正員官其先是五品以上官者節級超獎仍賜莊田各一區錢二萬貫兼授以土地及賜實封如有能率所管兵馬以州郡來降者超三資與官仍便正授刺史賜錢一萬貫以城鎮來降者超兩資與官仍賜錢五千貫如先未有官者即特授三品四品官如以一身降者亦與改轉仍賜錢帛其諸道將士有因立功能梟斬王庭湊者亦準前例處分成德一軍山東所賴扼制徑險控束河防武俊之拯橫流承元之變舊俗言念誠節何日可忘知感弟兄見劫妻子為質愍惻之志朝夕在懷當無疑謀自致恩外昔光武存大信而捨朱鮪魏祖推至誠而納張繡非無故事朕不食言如庭湊自能束身歸朝並與洗雪若執迷安禍罪止其身其餘脅汙一切不問縱有迹涉逆節事出一時劫於凶威並從寬宥四州之內如有謀為向順屈於垂成家族無辜殘酷所及者宜優加追贈并賜錢帛其有子孫得脫免委四面節度切加搜訪當議與官四州管內百姓久困冤害橫罹挾制念同赤子莫匪吾人諸軍所次不得妄加殺戮并焚爇廬舍暴掠財産及有拘繫以為纍囚四州百姓久廢生業如有歸投各宜存撫老幼丁壯量加優恤仍給與空間田宅使之如歸事平之後願還本貫亦聽於戲原野陳師雖前王之不免干戈屢動諒菲德之所興孤我宿尚良深憮然咨爾輔弼之臣暨於藩守羣帥爾尚悉乃忠力匡豫寡昧經遠猷以端理本恢上略以速戎功緝庶政以康中邦明大教以昭昧俗宣示內外俾知朕懷見危致命之死不顧據其義則白刃可蹈得其所則鴻毛猶輕此忠臣烈士所以垂名不朽者也故棣州剌史充本州鎮遏兵馬使欒濛稟受正氣發揮壯猷屬逆豎亂常反形潛具濛於此時密獻成算朕且欲諭以文告革其非心重難興師因寢其奏而沈謀中泄搆茲深冤眷言此心傷恨何巳可贈工部尚書仍許歸葬上都令所在路次州縣供熟食兼遞夫等應緣葬事所須並令官給賊平之後仍訪其子孫親屬武德巳來輔相之臣以道致君以勞定國若贈司空徵故侍中知古贈太尉冕語其功次皆在第一清風餘祉宜及乎後昆爾等乃其曾孫式叶搜獎俾奉貽謀之慶用覃延賞之恩各命以官勉思祖德王者誅暴亂賞勳勞既正紀綱式頒爵位朕以菲德理乖勝殘使釁生誨盜刑用戎鉞屬者庭湊用滄州為輔車以謀專土同捷恃棣州為屏捍遂成阻命實賴英帥共恢壯圖爰議酬庸式獎宣力武寧軍節度使徐泗濠等州觀察處置等使充滄德行營招撫使光祿大夫守司徒中書門下平章事上柱國太原郡開國公食邑二百戶王智興可特進封代國公食邑三千戶餘如故平盧軍節度使淄青登萊棣等州觀察處置等使兼押新羅渤海兩蕃等使銀青光祿大夫檢校尚書僕射御史大夫上柱國會稽縣開國公食邑一千戶康志睦可檢校尚書左僕射餘如故正議大夫檢校工部尚書使持節鄆州諸軍事兼鄆州剌史御史大夫賜紫金魚袋崔宏禮可檢校尚書右僕射餘如故其棣州城下武寧軍節度使諸道立功將士巳甄録外委智興條疏聞奏棣州應見在百姓宜復一年其將士有決戰攻壘奮不顧身中刃被瘡遂成廢疾者並賜衣糧終身勿絶其武寧軍及平盧軍浙西宣歙天平等五處兵馬在棣州城下者並宜放歸本道於戲並命申威分疆翦寇界大河之南北委藩守以廓清立績者既以勞施圖功者方期盡敵勉宏勝策無至老師共臻輯寧副我勤屬朕詳觀列聖紀册祖宗盛業粲然在前或道有污崇政有善否未始不繫乎當時輔弼常因便殿言諸宰臣勉其匡益叶心推戴且以去歲乙巳登應門敷大號俾疇賢相以訪遺裔或血食不繼宗祊巳蕪如遂良之委笏面諍名垂史書仁傑之恢復廟社事形先覺宋璟之文吏骨鯁功參理平元紘之守規畫一時成有裕其胄僅存不絶若髮各授邑吏使其自試其故中書令褚遂良五代孫虔可汝州臨汝縣尉內史狄仁傑曾孫元封懷州修武縣尉侍中宋璟曾孫滶嶽州沅江縣尉中書侍郎李元紘曾孫伉鄧州向城縣尉輦轂之下法在肅清姦盜竊發理難容舍親仁坊今月五日賊依前委京兆府左右街使鳳翔邠涇金商同華等州切加捕逐如獲頭首準法科斷其餘支黨一切不問於戲唯此凶災是彰非德情敢忘於罪己惠所貴於及人施令布和期於蘇息凡厥臣庶宜體朕懷主者施行朕以菲德祗膺大寶深求理本將致時雍以慈惠恭儉為休徵以人和年豐為上瑞夙夜思省無以過之至於嘉穎連理之祥飛禽走獸之異出於邦國來獻闕庭虛美推功非豫所尚歲晏奉陳於清廟元正列上於大朝探討古今亦無明據恭惟靈聖豈俟薦聞事非經通理當釐正庶使溥天之下知豫務實之心其諸應有三等祥瑞並不得更有聞奏亦不要申牒所司其臘饗太廟薦獻太清宮并元日受朝奏祥瑞儀主宜停頃以德州未下俾宣朝旨慰勉勤瘁詢謀事機計日指程其速達而所至留滯請兵自隨假勢張皇乘險縱恣奏報蔑聞擅入滄州專殺大將捕置逆校潛送凶渠物議紛然遠近駭聽滄德宣慰使諫議大夫柏耆可貶循州司戶參軍判官殿中侍御史沈亞之可虔州南康縣尉門下聖人之教先德後刑王者之師有征無戰所以體人經遠要終貴實導利天下端由一人情雖獲巳務臻斯道朕以寡昧嗣守丕業威不能禁暴叛戢干戈德不能濟生靈完物力以至於起師戎之役陳原野之刑然謂有功固以多愧始者逆賊李同捷統戎專地弄兵恃寵不受文告不服朝廷本貴清淨惟務含宏常欲安其反側匿其瑕穢曾不悔禍是用徂征賴天地降靈中外叶力凶渠就戮滄海甫安我本興師事止於此言念士衆以及里閭並遭脅從久陷塗炭殺傷之外殘瘵可哀巳各有獎録及令賑恤仍委長吏更加綏輯王庭湊因緣同捷遂此沈迷及交鋒刃益縱豺豕今滄德既巳平殄庭湊猶未悛懲合乘兵威便圖攻討然欲更令思省未忍重有傷殘又以行營諸軍久勞於外憫其暴露且議旋歸況兵有可用而不用謂之不武則失柄有不假用而用謂之黷武則興亂弛張在我豈止一途其鎮州四面行營兵馬並宜各歸本界且自休息使耕農不廢儲峙有常見存者苟獲阜安未來者亦將焉往朕志巳定姑務保寧諸道縱有能指期攻取鎮州者亦非朕意何者庭湊一身負纍三軍百姓皆是吾人豈忍非辜罹其殺害朕為父母義切生成每念迫以凶威不得保其性命或使役夫遠念家業或割剝資糧或朝夕不免於飢寒或冤濫以致其愁痛寢食之際未嘗暫安其幽州河東易定齊德昭義魏博等道但要保境勿相往來若庭湊以四郡之地三軍之衆率誠歸闕翻然效順則不獨棄其舊惡兼亦別議新恩以至自知計力窮盡而能束身請命亦當待以不死惟此一事與達表章其餘並勿聽信鎮州四面節將或功勳巳茂或感憤方深皆欲乘時以圖盡敵然國家之本愛人為先縱能翦平豈免傷殺今但環境設備使之不能侵軼須以歲月自當誅除此所謂不戰之功不勞而定也其應討滄州行營將士並巳遣使各加賜勞其死事之後傷痍之人及濱河州縣兵戈所聚水潦為敗者並有制命令悉惠養優恤副我意焉然猶慮長吏未能將明或有漏落委中書門下準五月十三日敕詢訪事實務令周給於戲我理天下但恐道化未至不慮寇孽不平若宗社之靈風教所及則四夷八蠻猶當梯山航海慕化而來豈山東四郡獨能拒命夫退修教而降崇不戮人而克敵豫之所尚今也其時凡在中外庶僚羣帥悉力竭忠尚弼豫理宣示遐邇各體朕懷主者施行帝王之御大器也上法天意下順人情何嘗不欲舞干羽以致懷來滌舊垢而宏惠貸朕以寡昧獲守昌圖享二百餘年之丕基纂十三列聖之洪業而涉道猶淺燭理不昭德未洽於生靈信未孚於微隱至使河朔殘梗藩臣阻絶既多在豫之責每軫納隍之念頃者滄州拒命將帥專征有國彞章非朕敢赦諒功成於九伐當事止於一方況成德本軍早列勳籍庭湊初意亦獻嘉謀因緣細隙互搆隟闕且聞朝廷則挂刑書雖欲上陳固難自達及滄德翦定甲兵偃戢拜章辨數納款鄰封爰妄疑台臣俾通王命備聞恭惕延望私恩感激而情動三軍歡呼而聲馳四郡朕猥居兆人之上常懼一物失所雖外示君臣之義實內猶父子之親豈可使覆載之中不沾雨露照臨之下獨隔輝光斷自豫衷靡聽輿議既改之而不吝則待之而如初俾服官榮載膺寄任爵服盡在恩禮用加其王庭湊可依前授金紫光祿大夫檢校司徒兼鎮州大都督府長史御史大夫上柱國太原郡開國公食邑二千戶充成德軍節度鎮冀深趙等州觀察處置等使於戲天道之所助者曰順人倫之所重者曰忠為君在於不疑為臣在於不二然後上下交暢以砥泰寧當宏令猷勉收來效凡百卿士宜體朕懷刺史分憂得以專達事有違法觀察使然後奏聞如聞州司常務巨細所裁官吏移攝將士解補占留支用刑獄等動須稟奉不得自專雖有政能無所施設選置長吏將何責成宜委御史臺及出使郎官御史嚴加察訪廉使奏聽進止本判官不能規正及刺史不守朝章並量加貶降若所管州郡控接蕃夷軍戎之間事資節制即不在此限漢水上遊梁山東險控巴岷之道路作咸鎬之藩屏實命長帥必惟全才求臣僚僉屬邦彥是用築齋壇以賜鈇鉞登廉車以察風俗一方之事悉以咨之大中大夫守尚書右丞上護軍祁縣開國子食邑五百戶賜紫金魚袋溫造風度端雅質量閎厚立朝正色直道當官自登周行藹有休稱前在憲府爰持國綱人所未能心巳獨至聽言盡主於忠信指事必根於理化豈彼嘗意自謂知人洎南宮提領右轄郎曹承式體要宏通屬聞漢中撫事多故非寬仁不可以理軍旅非廉實不可以輯編氓擇任之時誠異他日繇是命爾尹正褒國節制梁川首列侍從之臣秩遷御史之率至若革故弊以存遠略因其事以定衆心姑務載安勿使告病弛張威惠在爾能之勗哉惟勤無忝我推轂之命可檢校右散騎常侍兼興元尹御史大夫充山南西道節度管內觀察處置等使卿學貫六經究春秋之微旨業精五典得册之精華編年紀述於皇猷記事備陳於王業垂堯言而可法彰禹績而有光極思盡誠宣我祖德閲覽之際虔感彌深賜監修國史路隨及見在史官司封郎中蘇景允起居舍人陳夷行屯田員外郎李漢右拾遺蔣係各錦綵銀器有差蓋儉以足用令出惟行著在前經斯為理本朕自臨四海憫元元之久困日昃忘食宵興疚懷躬絶文繡之飾尚愧茅茨之儉亦喻卿士形於詔條如聞積習流弊餘風未革車服第室相高以華靡之制資用貨寶固啓於貪冒之源有司不禁侈俗滋扇是朕之教導未敷使兆庶昧於恥尚也其何以足用行令臻於至理歟永念慚歎逮茲申敕自今內外班列職位之士其各務朴素宏茲國風有僭差尤甚者御史列上主者宣示中外知朕意焉如聞時稼甚滋人心望歲近者時雨稍乏憂懷載深慮有留獄致傷和氣應京城諸司見禁囚徒宜令御史臺選清強御史二人各就司疏決處分具輕重以聞春夏之交稼穡方茂永念東作其勤如傷況時屬陽和令禁麛卵所以保茲懷生仁遂物性如聞京畿之內及關輔近地或有豪家特務弋獵放縱鷹犬頗傷田苗宜令長吏切加禁察有敢違令者捕繫以聞如聞御史臺大理寺京兆府及諸縣囚徒近日訊鞫例多停滯自今巳後宜令所司速詳決處分其諸司應推獄有稽緩稍甚與奪或乖者仍委尚書左右丞及分察御史糾舉以聞昔漢以孔光降置几之詔晉以鄭沖申奉册之命雖優隆耆德顯重元臣而議政不及於咨詢用禮止在於安逸朕勤求至理所寶惟賢顧諟舊勞敢不加敬繇是委宰制於大政釋參決於繁務時因聽斷誠望弼諧遷秩上公式是殊寵特進守司徒兼門下侍郎同中書門下平章事充集賢殿大學士上柱國晉國公食邑三千戶食實封三百戶裴度稟河嶽之英靈受乾坤之間氣圭璋特達城府洞開外茂九功內苞一德器為社稷之鎮才實邦國之楨故能祗事纍朝宣融景化在憲宗時掃滌區宇爾則有出軍殄寇之勳在穆宗時混同文軌爾則有參戎入輔之績在敬宗時阜康兆庶爾則有活國庇人之勤逮弼朕躬總齊方夏爾則有弔伐砥寧之力皆不遺廟算布在編功利及人不可悉數而朝論益重我心實知方用皋陶之謨適值留侯之疾瀝懇牢讓備列於奏章塞詔上言動形於言色果聞勿藥之喜更俟調鼎之功而體力未和音容尚阻不有優崇之命孰彰寵待之恩宜其協贊機衡宏敷教典論道而儀刑卿士宣德而鎮撫華夷嗇養精神保綏福履為國元老毗豫一人可司徒平章軍國重事待疾損日每三日五日一度入中書散官勳封實封如故裴度上獻表章固辭册禮沖謙之志發自懇誠嘉歎良深用依來請其册禮宜權停如聞近日京城頻有寇賊府縣所繇至少防制實難須假軍司共為捕察宜令左右神策各差人與府縣計會如有盜賊同力追擒仍具所差人數姓名并所配防界牒報京兆府應捕獲賊並先送府縣推問如有諸軍諸使勘驗知情狀如實是殺人及強盜罪迹分明不計贓之多少聞奏訖牒報本司便付京兆府決殺其餘即各牒送本司令準百姓例之罪科決待府司添補所繇人力稍足即別條流其外縣有軍鎮處亦準此處分夫宗子維城本枝百代封爵便宜無令廢絶常年宗正寺解送人恐有浮薄以忝科名在卿精揀藝能勿妨賢路其所試賦則準常規詩則依齊梁體格
