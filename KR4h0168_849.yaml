front:
  text: 全唐文欽定全唐文卷八百四十九元龜後唐清泰元年官刑部郎中
  hash: sha256:23613260e5e0f9e6d6602f29d9ba086d90bcbe74978af5a9d3bcdd43c49b91e0
  markers:
  - {type: head, offset: 14, content: 李元龜, id: KR4h0168_NFKB_849-h1, level: 1}
body:
  text: 開成格凡貶降官本處春秋以存亡報省如沒於貶所有骨肉許歸葬如無骨肉本處便與埋葬盈休後唐清泰元年官司勳郎中奉詔各令於律令格式內抄出本司合行公事本司職典勳官近日凡初敘勳便至柱國臣見本朝承平時至於位至宰輔藩臣其勳亦從初敘蓋示人敭歷功用之重也勳格自武騎尉七品至上柱國正二品凡十二轉今後㣥官得敘勳首並請自武騎尉依次敘進無容隔越崇龜後唐清泰初官翰林待詔右贊善近日星辰變度苦雨霖霪是生靈共感之災致緯象垂芒之異惟宜修德以答元穹臣竊以修德遍在君臣非獨在於君父自古創業守文之主未有無災變者但能修德省躬則化災為福臣見今月三日夜五更初有二星變易一出軒轅前路一出室壁之間凡五星之氣不合五行一德稍虧五星變異臣恐自戰爭己來或有功臣義士枉抱幽寃或有名山大川失於禋祀今九月震雷極為異事雷者天之號令八月收聲今震伏不時是號令失節之象陛下繼覃赦宥虔禮神祇惟德動天其災必退更宜師古以合天心惡殺好生資於睿化遘後唐清泰二年官刑部郎中臣忝掌刑名合論法律臣見比年己來有前州縣官或假侵官不量事體皆投匭乞官況大朝取士之門有舉有選苟有長才茂器舉選安敢滯畱國家置匭之意本為訢寃士人乞官安得造次又閭里淺識濫繇官路妄有求請不顧格律條章所司以陛下方開言路不敢是非典法是國家大經誰可析言輕議此後凡投匭上言乞官亂法者望下所繇法司勘驗可否鳳幽州人仕梁為博州刺史判官遷鄆州節度判官後唐莊宗取鄆州得鳳以為扈鑾學士同光二年授禮部侍郎天成四年拜門下侍郎同中書門下平章事尋罷為安國軍節度使清泰初召還授太子太保二年卒先奉勅旨纂修太祖武皇帝莊宗光聖神閔孝皇帝兩朝實錄進呈者臣學虧富贍功愧裁成職司獲奉於簡書祖述濫承於綸旨國家神符運祚代出忠賢始祖自太宗朝初鎮鍾離爰崇官族帶礪之紛華不絕鼎彞之盛美可尋懿祖昭烈皇帝立功元和翼戴章武東平淮蔡西闢河湟憲祖文皇帝既紹家聲愈遵堂構破晁夷而還貴主誅潞孽而定徐方仗鉞分憂振雄名於聞服維城作固濬靈派於天潢太祖武皇帝投袂勤王誓心報主拯三朝之患難邁五霸之英威經綸既叶於上元眷祐乃延於下武莊宗神閔皇帝謀猷特立睿哲遐宣訓卒練兵櫛風沐雨纘崇鳳歷恢三百載之世功平盪梟巢刷四十年之讐恥一登大寶四換周星其閒天地參舒君臣善惡旋自宮闈變動簡牘散亡遂徧訪於見聞庶備詳於本末修撰朝議郎左補闕張昭遠博於記覽早預編排自今六月一日與同職官員等共議纂修獲成紀錄臣叨司筆削比乏史才如甘英妄測於河源裨竈強論於天道殺青斯竟代斵增慙又以三祖追尊有殊受命約之舊史必在正名謹敘懿祖書一卷獻祖書二卷太祖書一十七卷並題目紀年錄先帝自龍飛晉陽君臨天下以日繫月一十九年謹收成實錄三十卷誠多紕繆仰瀆休明顧鉛素以驚心塵冕旒而浹背自宣宗朝己來時歷四朝未有實錄年代深遠簡牘散亡更歷歲時轉失根本自中興己來累於諸道購纂四朝日歷報狀百司關報亦恐己曾撰到實錄值亂亡失乞下兩浙湖南巡屬購募四朝野史及除自報狀關報等庶成撰集之功當館職備編修理無曠失將美惡而具載庶古今以同風垂訓將來傳範不朽實有國之重事乃設教之本根伏自寇盜寖興皇唐中否四朝之聖君令命寂寞無聞數世之忠臣楷模湮淪罔紀至於后妃貴主帝子皇孫禮樂廢興制度沿革不偶文明之運難崇祖述之規既遇昇平須謀纂集當館奉勅修懿祖獻祖太祖莊宗四帝實錄自今六月初一日起手旋具進呈次伏以凡關纂述務合品題承乾御宇之君行事方云實錄追尊冊號之帝約文只可紀年所修前件史書今欲自莊宗一朝名為實錄其太祖已上並目為紀年臣叨被睿慈獲親密勿在可言之地居掌誥之司其或事異常規禮關草創程式先謀於國輔封章善貢於天聰庶顯公忠免貽錯失今月九日宮傳命令修張全義書題將行父事之儀有玷君臨之道既行文翰難決否臧奉行則罔叶國經違命則恐虧臣節遂修記事取則宰臣貴動合於楷模期永垂為規範以茲奉職庶顯致君臣聞覆萬物者天載萬物者地非聖主無以體乾道非賢后無以法坤儀百代攸同二儀無改伏惟陛下恢張九五統御元黃外設明庭內崇陰教言動而華夷知仰弛張而幽顯欽承張全義雖位極於王公而名不離於臣校承陛下曲旨受皇后重儀致紊彞章不防輿論臣又聞纂洪基者真主行直道者忠臣不可務一時之緘藏失久長之體制得不恭陳手疏罄露血誠庶裨益於神聰免隳弛於王度伏乞皇帝陛下俯容狂瞽動畏簡書時開睿敏之懷允守文明之訓使聖后式全其內則元臣可保於令圖永揚日月之光載理乾坤之體臣職叨侍從名忝論思儻避事以不言是偷安而冒寵贊魏州人少舉進士累遷戶部員外郎後唐天成中歷知制誥中書舍人遷御史中丞刑部侍郎改祕書監兼秦王傅秦王得罪長流嵐州清泰二年詔歸田里卒年六十餘往例應諸道節度使及兩班大寮凡對明庭例合通喚近日全廢此義伏乞特詔所司重定向來格品若合通喚准舊施行中書帖四方館令具事例分析申上據狀稱舊例節度使新除中謝及罷任赴闕朝見合得通喚文班三品以上官武班二品以上官新除中謝及使回朝見亦合得通喚臣聞信者使民不惑義者使民知禁非信無以彰明德非義無以顯聖猷此乃三代英風百王令則伏惟陛下恭臨寶位虔紹鴻圖握金鏡而照萬方運璇璣而調四序遐敷至德廣納忠言凡列周行許陳封事雖皆聽覽而尚寡依行縱所依行亦未遵守自此或有益國利人之術除姦去弊之謀可以擇其所長便為允制仍乞特頒詔令峻立條章豈惟示信義於域中抑亦振威風於海內既遵法度必致治平矣彥鎔後唐司農卿清泰二年為太僕卿國家四時祠祀郊廟㣥神當時供應羊犢皆是前一月於度支請錢付行市人買雖得供事終匪度程伏惟舊例祀羊犢晉絳慈三州每年供進純白羯羊一百一十口赤黃特犢子四十頭內一十五頭繭栗二十五頭角握乞下三州每年依例供進本處以省錢收市縞以明經登第又登拔萃科仕梁累官太常少卿後唐同光中遷中書舍人明宗時坐覆獄不當貶綏州司馬復為太子賓客長興四年遷戶部兵部侍郎清泰初改國子祭酒三年卒年八十贈兵部尚書臣聞詩美何穠傳稱築館將就肅雍之德必分內外之規故曰主王姬者自公門出舊禮以几筵告於宗廟以候迎者故於廟之外朝門築館得禮之正也昔漢賈誼上書云古者見君之乘車必下見君之几杖必起入正門必趨又孟子云朝廷不越位而與人言不踰階而相揖孔某過位色勃蘧瑗望闕趨風近亦有僕射與員外郎共列謝官班次蓋以公器不私尊無二上亦得禮之正也臣竊以入公門必趨不踰階相揖著於前史實有舊文則豈可以臣下而於宮殿門庭行賓主揖讓之儀使華夏觀禮之人惑於非據言動必書之史疑爽彞倫臣雖處典司寧分禮道以其所見恐未合宜伏乞宣付中書門下參酌可否施行古者禮嫂叔無服文皇創意以弟兄之親不宜無服乃議服小功今令文省服制條為兄弟之妻大功不知何人議改而寘於令文伏准兩漢舊事以諸侯王宗室入承帝統亦必追尊父祖修樹園陵西漢宣帝東漢光武孝享之道故事俱存自安帝入嗣遂有皇太后令別崇謐法追曰某皇所謂孝德孝穆之類是也前代惟孫皓自烏程侯繼嗣追父和為文皇帝事出非常不堪垂訓據禮院狀漢安帝已下若據本紀又不見帝字伏以謐法德象天地曰帝伏緣禮院己曾奏聞難將兩漢故事便述尊名請詔百官集議伏以宗廟立制今古通規損益所宜徵求可見伏惟陛下俯徇㣥願入纘丕基率土推誠遐方向化臣是以竊規舊典敢有上聞伏見漢晉以來以諸侯王宗室承襲帝統除七廟之外皆別追尊親廟漢光武皇帝立先四代於南陽其後自安帝以下亦皆遐考前修追崇先代四時禋祀陳豐潔於豆登多士駿奔認等差於藻梲伏以陛下奄有四海為天下君雖繼統承祧無忘日慎而敦本崇往尚鬱時思伏乞以兩漢舊事別立宗廟於便路履霜露以陳誠薦馨香而盡敬禮於是在誰曰不然坦後唐清泰三年官司門郎中去年六月詔京百司舉本司公事當司官屬關令丞及京城諸色人出入過所事久不施行其關牙官守捉權知者伏以關防以備奸詐令式素有規程既奉綸言合申職分關防所過請准令式守吉後唐清泰三年官吏部員外郎伏覩兩道興兵所宜備慮臣恐京師天下州府所禁囚徒獄戶不完凶徒多狡或踰垣破械結黨連㣥或聚綠林或奔逆壘以此為患事狀非輕臣望所禁重囚除惡逆放火殺人外可恕者量減本罪一等斷遣兼州縣近山澤人烟闊遠處量令州縣置舖警巡以防聚集勝後唐清泰中官深州司功夫道貴適時謀須應務不可專遵前古不可苟徇今時必在合宜方能致理臣見賊盜律凡盜竊資財多少及放火燒場據所燒物數為錢數裁斷比來法司嘗行此律令若情敦去殺道在恤刑欲令惡鳥移聲小人革弊致風行草偃須以猛濟寬臣竊見鄉村人有殺牛賭錢嗜酒不事家產者初則恣其凶頑後則利於財物若以嚴刑止絕因茲蟻結蜂屯便成㣥盜耳臣以為但是竊盜不計財物多少及放火刦舍並望且行極法俟餘風稍殄澆俗既移然後用輕刑未為晚也臣又見諸州置捕賊巡務比來以備警巡近者卻被為非人詐為巡司刦盜閭里既難辨認為惡滋深乞一切去除此務凡盜賊出於百姓其原出於屠牛賭博飲酒不務營生請下諸州府巡屬普令沙汰此色之人嚴刑條法則無盜矣何必別置巡司臣又見州縣鄉村有力戶於衙府投名服事如有差役祇配貧戶臣請州縣節級立定人數其餘令歸田里即不困貧民淵後唐清泰時人黃巢造變從亂㣥盜發人冡墓掘取金寶遇大穴焉方丈餘中環石十有八片形制如槨其葢穴石題曰有齊褚澄所歸啟葢棺骨已蛇蟻所穴環石內向文字曉然盜疑兵書移置穴外視之棄去先人偶見讀徹囑鄉鄰慎護明年具舟載歸欲送官以廣其傳遭時兵革不息先人亦不幸遺命異物終當化去神書理難久藏其以褚石為吾橔之石實隱則骸骨全褚石或興吾名亦顯淵募能者調墨治刻百本散之餘遵遺戒先人諱廣字叔常在德蜀人後唐末帝朝官太常丞朝廷任人率多濫進稱武士者不閑計策雖披堅執銳戰則棄甲窮則背軍稱文士者鮮有藝能多無士行問策謀則杜口作文字則倩人所謂虛設具員枉耗國力逢陛下維新之運是文明革弊之秋臣請應內外所管軍人凡勝衣甲者請宣下本部大將一一考試武藝短長權謀深淺居下位有將才者便拔為大將居上位無將畧者移之下軍其東班臣寮請內出策題下中書令宰臣面試如下位有大才者便拔居大位處大位無大才者即移之下寮延朗汴州開封人仕梁為鄆州糧料使後唐天成中累拜忠武軍節度使長興元年授三司使特進工部尚書充諸道鹽鐵轉運等使歷泰寧雄武軍節度使末帝即位遷吏部尚書兼中書侍郎平章事判三司晉祖入立被誅臣濫承雨露擢處鈞衡兼叨選部之銜仍掌計司之重況中省文章之地洪鑪陶鑄之門臣自揣量何以當處是以繼陳章表謺貢情誠乞請睿恩免貽朝論豈謂御批累降聖旨不移決以此官委臣非器所以強收涕泗勉遏怔忪重思事上之門細料盡忠之路竊以位高則危至寵極則謗生君臣莫保於初終分義難防於毀譽臣若保茲重任忘彼至公徇情而以免是非偷安而以固富貴則內欺心腑外負聖朝何以報君父之大恩望子孫之延慶臣若但行王道惟守國章任人必取當才決事須依正理確違形勢堅塞倖門則可以振舉宏綱彌縫大化助陛下含容之澤彰國家至理之風然而讒邪者必起憾辭憎嫉者寧無謗議或慮至尊未悉㣥謗難明不更拔本尋源便俟甘瑕受玷臣心可忍臣恥可銷只恐山林草澤之人稱量聖制冠履軒裳之士輕慢朝廷臣又以國計一司掌其經費利權二務職在捃收將欲養四海之貧民無過薄賦贍六軍之勁士又藉豐儲利害相隨取與難酌若使罄山採木竭澤求魚則地官之教化不行國本之傷殘益甚取怨黔首是黷皇風況諸道所徵賦租雖多數額時逢水旱或遇蟲霜其閒則有減無添所在又申逃係欠乃至軍儲官俸常汲汲於供須夏稅秋租每懸懸於繼續況今內外倉庫多是罄空遠近生民或聞飢歉伏惟朝廷尚添軍額更益師徒非時之博糴難為異日之區分轉大竊慮年支有闕國計可憂望陛下節例外之破除放諸項以儉省不添冗食且止新兵務急去繁以寬經費減奢從儉漸俟豐盈則屈者知恩叛者從化弭兵有日富俗可期臣又聞治民尚清為政務易易則繁苛並去清則偏黨無施若擇其良牧委任正人則禁內蒸黎必獲蘇息官中倉庫亦絕侵欺伏望誡見在之處官無乖撫俗擇將來之涖事更審求賢儻一一得人則農無所苦人人致理則國復何憂但奉公善政者不惜重酬昧理無功者勿頒厚俸益彰有道兼絕徇情伏望陛下念臣布露之前言閔臣驚憂於後患察臣愚直杜彼讒邪臣即但副天心不防人口庶幾萬一仰答聖明德鈞本名行實幽州人後唐莊宗賜姓名曰紹斌累遷滄州節度使同光三年移鎮幽州明宗即位歸本姓始改名德鈞天成中加侍中授東北面招討使累官至檢校太師兼中書令封北平王晉祖起義晉陽末帝以德鈞為諸道行營都統時范延光領兵於遼州德鈞欲併其軍奏請不從乃遣使契丹求立為帝晉祖入立契丹鏁以入蕃天福二年卒於契丹先羌將軍陳繼威使契丹部內今使還得狀稱今年七月二十日至渤海界扶餘府契丹族帳在府城東南隅繼威既至求見不通竊問漢兒言契丹主阿保機己得疾其月二十七日阿保機身死八月三日隨阿保機靈柩發離扶餘城十三日至烏州契丹主妻始受卻當府所持書信二十七日至龍州契丹主妻令繼威歸本道仍遣撩括梅老押馬三匹充答信同來繼威見契丹部族商量來年正月葬阿保機於木葉山下兼差近位阿思沒姑餒持信與先入番天使供奉官姚坤同來赴闕告哀兼聞契丹部內取此月十九日一齊舉哀朝廷及當府前後所差人使繼威來時見處分候到西樓日即並放歸重績字洞微少學數術後唐莊宗鎮太原拜大理司直晉天福初擢太子左贊善大夫遷司天監卒年六十四漏刻之法以中星攷晝夜為一百刻八刻六十分刻之二十為一時時以四刻十分為正此自古所用也今失其傳以午正為時始下侵未四刻十分而為午由是晝夜昏曉皆失其正請依古改正歷象王者所以正一氣之元宣萬邦之命而古今所記攷審多差宣明氣朔正而星度不驗崇元五星得而歲差一日以宣明之氣朔合崇元之五星二歷相參然後符合自前世諸歷皆起天正十一月為歲首用太古甲子為上元積歲愈多差闊愈甚臣輒合二歷創為新法以唐天寶十四載乙未為上元雨水正月中氣為歲首延光字王褱相州臨漳人後唐同光中拜檢校工部尚書明宗即位擢宣徽南院使遷檢校司徒遷樞密使出為成德軍節度使長興中加同平章事清泰中徙宣武軍節度使加檢校太師兼中書令晉祖入立封臨清王天福二年舉兵反尋敗降改封高平郡王以太子太師致仕為楊光遠所殺贈太師副使王欽昨報管內頻有盜賊剽刼坊市鄉村差兵巡捕嚴切隄防緣此歲蠶麥不熟游惰之徒結鹿木為惡或傷殺攘奪及捕獲處斷又前後法條不一以天成二年勅應山林㣥盜害物殘人若捕捉勘結不虛全家處置有偶然刧盜者正身准法知情者同法又以長興四年勅據天成勅只為界內連結黨惡害物殘人所以誅族此中興之初權行之法若斷獄只坐此條恐違於律令今後結黨連㣥為害者并男十五已上並准元勅處斷其父母兄弟妻女小兒一切不罪有骨肉中與賊同惡者亦同罪如同謀不行或受贓不受贓則准律科斷臣當管賊盜屢發蓋見用法太寬只罪一身又不籍沒家產又不連累家屬得以恣行兇惡今後捕盜權行重條俾其知懼易為禁止
