front:
  text: 全唐文欽定全唐文卷六百五十九白居易四
  hash: sha256:4ef1f44d1fbe17ec7e4d6292dba48f26065604a8796dab7f237bd651712d0386
body:
  text: 敕牧守之官與吾共理下之安否繫乎其人必稽前功方降是命某官李佑夙負材器纍經任用當領軍郡頗著政聲而平陽舊都近罷征鎮土疆事物既廣且殷藉爾良能為豫撫字夫均其征役其科禁謹身省事以臨其人而人不安未之有也往宏是道以康晉人可依前件敕王昌涉等早以材力召募從軍元和以來南征北伐咸有勞績著於一時主帥上聞乞加褒賞故以寺卿憲職序而寵之無棄前功在申後效可依前件敕某官馬總亡祖母韋氏播茲懿範貽厥嘉謀施及孝孫實居貴仕將明餘慶其在追榮不惟垂裕後昆抑且光昭幽壤宜降封邱之命以慰令伯之心可贈某夫人敕藩隅之重委以侯伯軍府之要掌在賓寮貫等以文行修身以智謀從事佐廉問澄清之務撫華夷錯雜之人俾其乂安實在參贊宜及寵命以光所從可依前件敕周設七萃漢列八屯皆以拱衛王宮肅嚴徼道統茲騎吏其屬親賢某官鄭何擢秀士林挺質公器以貞和陶其性以禮樂文其身善積德門慶連戚里况久踐名職纍著聲猷念舊獎能宜加榮寵環列之尹不易其人俾宣力於爪牙不失親於肺腑可右衛將軍餘如故敕公主之封號也或以善地或以嘉名立愛展親茲惟舊典第四女端明成性和順稟教靜無違禮故組紃有常訓動必中節故環珮有常聲歲茂穠華日新淑問乃眷肅雍之德俾開湯沐之封可封某公主敕河東節度都押衙試太子賓客兼御史中丞宋朝榮嘗因戰功擢領邊郡揆能適用故有轉遷龍樓上寮衙門右職雖有兼命未表殊恩宜加騎省之榮不改憲臺之重以茲寵任足報忠勳爾其敬承無墮乃力可檢校左散騎常侍餘如故敕故某官某等王師問罪至於淄青爾等同執干戈親當矢石忠而盡瘁勇而亡身或退卒於師或進歿於戰俱死王事深惻朕心念捐軀於軍前宜追命於泉下郡守之貴以示褒榮可依前件敕平齊之役也諸軍指期衆校合戰某官等各輸戮勇同樹勳勤永思積日之勞頗愧逾時之賞故於獎授有所超遷朝右貴班宮坊清秩或參憲職分以命之庶知我心不忘忠力可依前件敕某官某等謁廟郊天改元肆眚是為大慶與衆共之矧股肱心膂之臣與吾同體延賞任子其可廢乎爾等或以文華或以吏職有所修立稟於義方自當褒升况霑慶澤俾舉展親之典用叶推恩之道猶子愛壻各命以官爾其敬承無忝朝獎可依前件監賓客咨議衛佐同制敕某官夏侯仕戡等前命鄭歡之入回紇也爾等參護使車用祗王命悉心盡力有恪恭跋涉之勤焉宜以省寺軍衛之班宮坊府邸之用舉為賓典分以寵之辨等旌勞於是乎在可依前件敕虢州司戶參軍盧昂前負瑕疵事多曖昧今聞修省善亦昭彰况有大僚同知情狀且明非罪仍舉有才吾信人言遂可其奏爾思自效無辱所知可依前件敕右散騎常侍張維素亡祖某縣令某德合上元才終下位命屈於當代慶流於後昆故其孝孫實登貴仕經曰無念爾祖詩曰貽厥孫謀此言孫之謀能顯揚其先祖之德能垂裕於後也不追榮於列宿曷旌德於太邱可贈戶部郎中敕鄭公逵等或以行稱或以才舉進修所致班秩不卑改命序遷各適其用且乘朱輪於郡邸曳長裾於王門士子名宦至斯亦不為不遇也立朝案部各敬爾官可依前件敕審材之要考察為先吾之於人試乃可用李正卿頗窺吏道因假郡符畏法愛人善於其職夫速旌其能則吏勸久於其政則化成未可轉遷就加真秩副吾知獎無怠始終可陵州刺史敕某官蘇浰嘗以幹良分領劇務受任稱職主者上聞績既有成賞安可缺前進士王績亦以藝學籍名太常著為令聞及此慰薦一以課進一以才升咸加班榮同以褒獎臺官校職爾各欽承可依前件敕某官王璀郡司馬之官秩祿頗厚凡在戎行有軍課者多兼命以優寵焉而璀以鞭弭櫜鞬從事征鎮前後主帥咸稱有功宜加新命仍率舊職蓋欲旌往勞而責來效也爾其勉之可兼柳州司馬敕某官黃士傪戎首來降陪臣告捷服勤靡盬將命無違宜以恩榮獎其勞效貴階崇秩兼而寵之可依前件敕具官徐綰以丞相之子為尚書郎人得見於會朝而不得見於私室其言不敢近政其動未嘗違謙用是寡尤式彰能訓論者美宣祖大臣以行至移風稱易名者必曰光嗣之王父也爾克敬有後敏以自圖多所周防恐墜遺法而皆以去列可使陟居武庫部都曹郎選惟重并舉而授無墮當官可依前件敕刑曹郎闕朕詔執事擇可以善於其職者而殿中侍御史王鎰自居殿中能察非法連鞫庶獄多協平允加以溫敏靜專可當是選一歲之獄決在秋冬今方其時宜敬乃職節度判官浙東判官試大理評事韓佽可殿中侍御史巡官試正字朝朴可試協律郎充推官同制敕某官孫等凡使府之制量職之輕重以命官揆時之遠近以進秩俾等殺有常序遷次有常程勞逸均而名分定矣自登憲司佐相幕府暨糾天府皆有可稱而佽等亦以文學發身謀畫效用荊揚浙右實籍賓僚况今之公卿大夫皆由此途出慎爾職事爾無自輕可依前件敕某官田練幹敏立身公勤濟事奉州將之手疏達軍人之血誠念其忠勞宜有寵擢假憲名於殿內遷郡秩於治中茲謂兼榮爾其敬受可依前件敕新授深州刺史薛常翽平蔡之役常領偏師實立勳勞遂膺寵任今屬方隅多故將守用能且以翽之長材居邢之要地故命魚符換郡熊軾移轅夫事至而功成時來而節見此忠良之事業也爾其念之哉可依前件制敕某官兼御史中丞權知深州事牛元翼命官之要凡試吏者必俟成效然後即真而元翼有理戎之才扞城之略權領軍郡能修武經士樂人安厥有成績是用假威臺憲真拜郡符仍以金貂示其兼寵吾聞忠臣立節烈士垂名其要無他得時而巳勉竭才力副豫斯言可依前件敕前虔州刺史王衆仲聚學修身由文飾吏纍經任使頗著良能前牧南康亦聞有政宜新印綬載領藩條而衡湘之間蠻越雜處無以俗陋不慎乃事無以地遠而怠厥心副吾陟明俟汝奏課可依前件敕右金吾衛將軍田盛夫任官至執金吾古今所榮重也而盛生勳德門有文武略居貴介而無佚領誰何而有勞言念徼巡之功宜及轉遷之命處左攝事以表使能可依前件敕某官陳君賞夙承義訓幼有令聞專繼弓裘之名通知軍旅之事因仍憲職兼佐郡符敬服寵章勉從任使敕太子左諭德崔承寵早登班級亟換星霜自陳力於貴朝屢奉辭於外國職由事博績以勞成就力宮坊既申贊諭之美分符郡邸佇聞刺舉之能宜勵公心祗承寵命敕前貝州刺史崔鴻嘗牧貝邱能修其職及辭印綬頗厪去思相時之宜從人之望俾換新命再臨舊邦况聞貯蓄時材諳詳物務而方州思理侯伯薦能勉勤為政之心勿忝知人之舉敕前吉州刺史李繁纍奉藩條皆奏課第故移縉雲之政俾牧廬陵之人雖降璽書未臨郡邸屬魚章改造熊軾追還事既謀新職宜仍舊勉率分憂之任庶成來暮之謠敕某官萬重皓嘗資武力早備戎行頗歷艱虞亦聞勤效而藩隅未靖遷轉從宜言念前勞宜加優秩可坊州司馬敕鄆曹觀察判官監察御史裏行崔墉文行飾躬公清奉職士林推美藩府薦能軍旅之間久資其用忠勤之後不隕其名宜拔才於功臣俾試吏於府掾可依前件敕文武之才內外迭用軍國之任出入遞遷斯所以優勳賢而均勞逸也某官魏義通以戎功積久榮委旌旄某官李進賢以軍課居多寵分符竹各勤其職咸用所長是以河陽三城鎮靜而不擾泗濱一郡緝理而有勞我有禁軍爾宜分領親信則倚為心膂動用則張為爪牙苟非其人不副此任咸假貂蟬之貴仍兼憲職之榮勉哉二臣無替一志可依前件敕黔州觀察使兼度支使李元成等或蘊蓄能才咨謀是藉或分領劇務課績有成并可奏書各遷憲職勉勤乃事無忝所知可依前件敕夫積善者慶鍾於後顯揚者光昭於先而總貴為邦君賢為國士荷貽謀之訓用率義之文上獻表章有所陳乞朕念其祖德褒以臺郎所以復陳實必興之言慰范喬泣涕之思庶使幽顯兩無恨焉可贈某官敕樂璘專習武經旁通吏道試補郡守以觀其能連帥上聞果副所舉夫審官之要在因其所長而任之則政速成而化易就也才既試可官宜即真何以寵之就加憲職可朔州刺史兼御史中丞敕田疇官列環衛職參禁軍慎檢有聞恭勤無怠顧是勞效例當轉遷郡佐官寮以示兼寵敕裴敞等昭義義成今之重鎮實藉賓介以參謀猷而二帥皆勤於奉公精於辟士度才而授職循序而請官頗合所宜咸可其奏可依前件敕高榮朝常領鋭師入攻堅寇因纍獎賞位至專城才有所長宜遷戎職功不可忘兼進榮班勉事元戎無替勞效敕韋綬等去年春夏同奉寢園事集禮成副吾哀敬宜加封爵以報恪勤可依前件敕故某官烏重明等夫生樹功勤歿加褒飾有國之常典也重明等在興元初常執勤於奉天策勳為定難無祿即代有勞未圖星歲屢遷光塵不昧聞鞞之念豫心曷忘俾慰幽泉各追顯秩可依前件敕夫軍衛警則內外嚴爵賞明則忠勤勸爾等咸以材力列於禁營屬去年以來屢陳儀仗雖加賜豫未答勤勞因詔有司舉行賞典吾匪虛授爾宜敬承文武班資各從序進可依前件敕新羅使倉部郎中金良忠等朕以文明御時以仁信柔遠聲教所及駿奔而來况溟漲一隅舟航萬里爾慕我化我圖爾勞隨其等倫命以寵秩無替前效永為外臣可依前件門下朕聞后德惟臣臣德惟良在太宗時實有房杜贊貞觀之業在元宗時實有姚宋輔開元之化咸克佑我烈祖格於皇天朕祗奉丕圖懋繼前烈思欲貞百度和萬邦建中於人垂拱而理永維房宋之化寤寐求思至誠感通上帝眷佑果賚良弼輔豫一人正議大夫行尚書戶部侍郎上柱國賜紫金魚袋裴垍器得天爵文為國華行有根源詞無枝葉忠敬恭順貫之以誠心方潔貞廉輔之以通識玉立不倚金扣有聲洎內掌綸言密參樞務嚴重有大臣之體溫雅秉君子之文每獻納之時動有直氣當顧問之際言無隱情遠圖是經大事能斷匡豫不逮時乃之功及領地官且司邦賦會計務劇出納事殷投利刃而皆虛委棼絲而必理歷試已久全才益彰宜登中樞以副僉望夫宰輔者下執邦柄上代天工為國蓍龜注人耳目爾尚降乃德以親百姓廣乃志以序九流匡朕心以清化源從人欲以致和氣豫欲宣力汝為股肱豫欲詢謀汝為心膂豫違望於汝弼勿謂不從汝言逆於朕心必求諸道獨立勿懼直躬而行明聽斯言敬踐乃位嗚呼罔俾房宋專美於前可中書侍郎同中書門下平章事散官勳賜如故主者施行元和六年十一月門下為君之心惟功勞是念有國之典以賞勸為先其有輯睦師徒保綏黎庶盡勤王之節建護塞之勳則宜進以官常委之軍要兼文武之秩參內外之榮斯所以彰念功而明懋賞也四鎮北庭行軍兼涇原等州節度支度營田觀察處置等使光祿大夫檢校工部尚書使持節涇州諸軍事涇州刺史兼御史大夫上柱國鴈門郡開國公段祐早膺事任纍著公忠名因義聞位以勤致自分戎閫實控塞門明舉武經大修邊務士卒有勇保障無虞虜不近邊農皆狎野展執圭之勤禮瀝戀闕之深誠方圖爾勞且遂其志夫六官庀職大司馬列於前二翼分師大將軍處其右長夏官以率屬領環衛而拱宸苟非信臣安可兼委嘉乃實效副豫虛求將慎重其腹心宜進登於喉舌敬服休命勉揚令圖可檢校兵部尚書右神策軍大將軍知軍事散官勳封如故主者施行門下王者以尚齒尊賢為禮以念功任舊為心况文武之才有以兼備則中外之職所宜迭居所以寵舊勳而優耆德者也前荊南節度管內支度營田觀察處置等使金紫光祿大夫檢校兵部尚書兼江陵尹上柱國天水郡開國公趙昌聚學飾身修誠致用久膺事任纍著勳猷統護交州威惠之聲克振鎮臨南海撫循之政有經自移部荊門馳心魏闕增修職貢益勵忠勤爰舉寵章用旌茂績夫望優四皓然後能調護春闈才冠六卿然後能綱紀會府惟爾年德足尚可以周旋其間宜增喉舌之榮以崇羽翼之任服我休命其惟懋哉可檢校吏部尚書兼太子賓客散官勳封如故主者施行
