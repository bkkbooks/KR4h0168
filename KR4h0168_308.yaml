front:
  text: 全唐文欽定全唐文卷三百八逖潞州涉縣人開元初應哲人奇士舉山陰尉遷祕書正字十年應制登文藻鴻麗科拜左拾遺轉左補闕累拜中書舍人天寶三載權判刑部侍郎病風求散秩改太子左庶子轉太子詹事上元中卒廣德二年贈尚書右僕射諡曰文
  hash: sha256:fb8777be5e509bef8eace65aec26bb5afccdbcb94a241bfb62dc1b8405999609
  markers:
  - {type: head, offset: 12, content: 孫逖, id: KR4h0168_NFKB_308-h1, level: 1}
body:
  text: 智者創物有以而然簾之為用博利存焉若乃少婦重閨王孫華館映錦屏以猗猗增繡戶之煥煥瓊鈎上而齊女謳珠影垂而楚妃歎葢私宴之樂飾異在公之達觀至於因依華省隱映長廊交輝朱紱接影金章隔至人之清鏡雜仙署之餘香禁鐘啟明納晴天之曙色嚴城警夕引華月之宵光盼睞成寶終然允臧豈備物而致用亦道同於君子輕明無隔將引喻於虛心卷舒任時足炯誡於行已組織成象含游夏之文繩約善結得老莊之理豈徒然哉斯盡美矣原夫青青梁苑猗猗淇澳冒雪停霜是稱修竹紆匠人之巧思列冢卿之華屋甘剖節而離根奉榮光而再穆則有製長笛成洞簫器同握玩聲引風飇徒擅名於昔日豈齊美於今朝彼美嘉席施於高堂廣狹有準卷舒匪常承以彩薦貯之牙牀玉几蟠蜿而上列寶屏邐迤而外張狎高瑟以透響染薰鑪以流香瞰金牕以隔影瑩珠箔而凝芳洎乎禮義多則卑高異行或主或賓浹歡於北院東嚮西嚮取上於南方南方何有是肴是酒或因食而即前或屬虛而盡後彼固若是不亦如斯必順時以革易乃任人以推移不正不坐道通於曩儀寒溫暑凊自有其先規所以簟因夏設席乃冬施傾莊敬以揖讓誠君子之攸宜管寧別居且申情於分割曾子避坐將有敏於謙撝若夫行之於俗蘭房之曲有美一人容顏如玉摳長裾而來就斂雙睂而下矚憐織綴而留心賞華新而不足淩晨啟鏡入夜燒燭每因眠而取暖加以羅衾怨孤坐而多寒增之錦褥則有務學之子安貧順理潔一作挈酒琴耽籍翫史居環堵而養性遙泰階而虛俟出陳子之幽扃慕戴公之重美既懷珍而待聘當彈冠而入仕詩言我心匪席不可卷也斯言豈謬矣門下中樞之要久闕其官仄席而求實難其選中大夫檢校尚書工部侍郎兼集賢院學士上柱國徐安貞清才特達雅量深沈為德行之宗師是文詞之雄伯頃司水土兼典圖書博綜惟精彌綸有敘王言是屬公議攸歸宜增秩於五字俾齊名於三入可守中書侍郎餘如故門下慶傳於家者代濟其美才許於國者時無與讓由是密勿為用訏謨所歸銀青光祿大夫行黃門侍郎修文館學士河東縣開國男參知機務嶭稷河汾之英廊廟之寶相門前社則名優作誥詞場舊業則譽動飛文公貞性成仁和道勝坦然之量㣥物不干其靜穆如之風九流不測其度頃罹多難克仗嘉謀翼戴朕躬保寧王室厥功茂矣朝廷賴焉俾迴踐於綸闈以增輝於鼎席可行中書侍郎餘如故主者施行門下朝議大夫守諫議大夫上柱國褚國廷誨師臣舊業官序良才文儒實百行之資翰墨當一時之妙駮正為務疇咨所難宜遷左禁之榮式允中朝之望可守給事中散官如故門下右省署掌諫之官立司過之史所以書君舉箴王闕不次而授唯才是與道士尹愔識洞微妙心遊淡泊祇服元言宏敷聖教雖渾齊萬物獨諳於清真而博通九流兼達於儒墨朕方貴無名之璞期不言之化資其妙道寘彼周行宜居納誨之職仍存記言之地可朝請大夫守諫議大夫集賢院學士兼知史官事門下朝議大夫前行尚書駕部郎中上柱國襄國縣開國男宋渾清才敏識人望時英未可易量將其必復頃辭省闥言侍庭闈雖私心則然而公用久闕策名委質非無古人之訓移孝為忠宜在諍臣之列可守諫議大夫散官如故門下太子右贊善大夫兼御史專知大府出納權知御史中丞事楊慎矜堅正有才通明足用久持天憲兼掌國泉竭忠公之一心杜訛偽之千變爰升獨坐用肅具寮而潜懇固辭執謙難奪願收恩於後命祈盡節於前功得失不驚將敦薄俗始終如一以勸守官特遂由衷之誠仍居出納之任一作納諫之職可行諫議大夫兼侍御史仍依舊知大府出納敕朝議大夫守職方郎中兼試知制誥達奚珣文學素優忠勤克著自經試用備問詳密草奏南宮已擅一時之妙掌綸西掖愈彰五字之能宜就列於即真俾正名於近侍可守中書舍人散官如故門下朝請大夫守給事中騎都尉賈登修詞自達守道為師有大雅之文章稟中和之德行駮正之地已著能名綸綍之司更膺高選可守中書舍人敕朝議郎守尚書兵部郎中梁淑通明致用博雅為文才冠時英望高人譽五字之選一臺所推宜旌起草之能俾效司綸之職可中書舍人散官如故門下國子司業韋斌貞規不雜敏識惟精標麗則以工文秉直聲而濟美久從散秩未展清才豈避姻親遂妨公用宜特昇於禁掖俾專事於司言可行中書舍人敕朝議郎守尚書考功郎中仍試知制誥兼知史官事李元成中和有裕直道自然文章為致用之資慎密是周身之本久司綸綍深愜器能宜拜命於即真俾甄才於試可可守中書舍人兼知史官事敕朝議郎前行左補闕楊齊宣規行介立守道安貞雅致表於文詞清標傳於緒業頃參諫職考績已深自聞謝病歲年滋久雖宰臣立節每避舉親而公器須才終難滯用宜發命於中旨俾分官於左言可行起居郎散官如故敕朝議郎守太子舍人攝殿中侍御史朔方節度判官陳九言朝議郎行太常博士兼史館修撰劉貺等清才雅望敏學工文是周行之俊乂有致遠之良具史臣之選公議所歸宜並拜於軒墀俾分官於左右九言可行起居舍人散官如故貺可行起居郎餘如故敕朝議郎前行右拾遺內供奉楊齊宣耿介不㣥精明有識傳清白之素業著詞華之令名達禮云終外除將久宜承密命更列近臣可左補闕餘如故敕前行潤州丹徒縣主簿盧惟等士族見推人才亦著威儀有則詞令可觀明試以言既嫺於敷納為官而擇宜在於軒墀並可通事舍人餘如故門下端揆之職官之師長宰輔之位朕之股肱有能兼領必在時傑光祿大夫吏部尚書兼集賢殿學士上柱國李林甫國之懿屬有濟時之明略自委三事於茲九年大猷是經庶績惟敘使夫人登福壽俗致和平垂拱而化以瑧於道葢天之贊我亦時乃之休況矜慎有恆終始如一外無滿盈之色內秉謙卑之誠歲寒彌堅夕惕彌厲褎德之義又何與之宜兼三綬之榮俾在百僚之首可尚書左僕射兼右相餘如故門下紀綱中省贊貳六卿稱職惟難任賢斯在滎陽郡太守陸景融等夙昭時望見重人倫修德行為本源用文章為潤飾清心雅道獨運虛舟敏識英才高標利器著名滋久更事亦多天臺缺官廷議僉屬宜膺求舊之舉俾叶往諧之命可依前件門下朝議大夫守益州大都督府長史持節劍南節度支度營田副大使知節度事兼採訪處置使攝御史中丞上柱國張紹貞中積溫惠外形嚴肅通才應物妙理為心亟踐方州咸推課最爰施密命且寄專征而紀綱一臺彌綸百事缺官斯久選眾尢難宜輟南轅用昇右轄可尚書右丞散官勳如故門下紀綱一臺爰資右轄彌綸五教必擇亞卿通議大夫尚書刑部侍郎借紫金魚袋宋鼎雅操貞規為律人之器朝議大夫守尚書工部侍郎上輕車都尉郭虛已通才敏識有成務之能並文行相資公忠自達履周行而有裕在歷官而必聞柯葉不移芳馨可久宜允副於朝選俾遞遷於省闥鼎可守尚書右丞虛已可尚書戶部侍郎散官各如故門下司會之府尤重於紀綱舉能而官必慎於名器大中大夫守河南郡太守本道採訪處置使上柱國崔翹文儒纘業忠闕六字為徇公之節歷官滋久更事亦多南省缺員中朝選舊宜取才於攬轡更馳名於握管可守尚書右丞散官如故門下緝熙九法董正六師必在具瞻以宏兼領金紫光祿大夫戶部尚書中書門下平章事上柱國成紀縣開國男李林甫宗盟有慶王國生才明德為章懿文成範事君之節貫忠貞於四時應物之誠調惠和於一氣爰立作相以期於理不仁斯遠丕績用彰而詰禁制軍安人和眾是為邦政深期汝諧俾謀猷於七兵仍啟沃於三事可兵部尚書餘如故門下敬敷五教保息萬人缺官而擇副相惟允通議大夫檢校御史大夫上柱國賜紫金魚袋裴寬器識高明風規端肅謇諤之用累鷙鳥而莫當操割之能斷犀革而何有亟登臺閣嘗擁旌旄禮樂為從政之文德刑是戢兵之武雖地卿所掌實佇通才而天憲唯艱尚資兼領宜曳尚書之履仍紆大夫之印可守戶部尚書兼御史大夫散官勳賜如故門下六卿分職朝選猶難三典佐王邦寄尤重朝議大夫守河南尹攝御史大夫持節江南東道宣撫招討處置使上柱國賜紫金魚袋裴敦復深沈偉量磊落宏才識無不通俎豆兼於軍旅行有餘力文學資於政事頃者巡撫江徼肅清姦宄大叔之謀既能止盜穰苴之法亦在安人功實簡心賞宜超等委之刑柄俾踐白雲之司錫以身章更增金印之秩可銀青光祿大夫守刑部尚書勳賜如故門下小宰之官久虛其位至公之用唯才是舉守尚書左丞陸景融珪璋成器禮樂為文剛亦不吐柔而能立恬淡之性足以抑退浮華徽明之識足以激揚淹滯類能而使僉議允屬俾澄清於九流期風俗之一變可守吏部侍郎散官勳如故門下綜彼天秩亞於邦家易人之舉選眾尤難尚書兵部侍郎李彭年人望時秀雅才清識德以全誠文而致用操必割之器遇時事無前持不轉之心在公庭難奪必能敷求名實底慎銓衡宜輟七兵之務俾修九流之法可守尚書吏部侍郎門下冢卿宗伯均國和人乃立其貳非才莫可正議大夫行尚書禮部侍郎權知吏部侍郎上柱國彭城縣開國男韋陟明斷一堅純鋼百鍊中書舍人權知禮部侍郎上騎都尉達奚珣忠公淑慎白珪三復各推邦直皆擅詞雄峻節彌高清標不雜頃膺時事之委深得選賢之稱如有所試已副於僉諧必也正名宜光於並拜陟可吏部侍郎珣可中散大夫守禮部侍郎勳封各如故門下六官之任夏卿尤重貳職之選時望惟屬正議大夫行尚書戶部侍郎上柱國燕國公賜紫金魚袋張均才略經通文詞濟美修身自達擅鴻陸之羽儀莅事無難有龍泉之斷割累拜省闥彌彰器用芳蘭可久垂棘重歸宜允副於僉擇俾增修於舊政可行尚書兵部侍郎散官勳封如故敕朝議大夫守太僕少卿上柱國趙郡開國公李彭年清和稟識博雅為文堅貞懷匪石之心果斷有刜鐘之利夏卿之亞歲調方殷缺官而擇至公斯在宜副才難之選將觀試可之能可權判兵部侍郎事散官如故敕朝散大夫守京兆少尹奉明縣開國男韋濟衣冠吉士文雅清才蘊忠信於身謀傳孝友於門德明而克允遇理必通剛則近仁臨事能斷自升華省迨佐神州皆有令名咸歸雅望地官之亞朝選尤難我其試哉無替厥命可試尚書戶部侍郎散官封如故門下周有地官小司徒佐敷五教魏置度支尚書以濟軍國之用政有餘地然可兼之正議大夫行尚書右丞韓滉惟先臣左右列祖格於皇天濟美之盛中朝所重好學師古潔其清純文不流放言無枝葉素練成式用推至公所更之任事可垂遠久司臺轄嘗亦官人姦吏無竄其情㣥才各序其位今戶版不實地征未均每歲經費以之匱竭迺者命使以總領且非典故擇郎以專掌又慮權輕歸於有司期在折衷昔杜元凱之處斯職內以利人外以救邊法可施行者五十餘條以資當時之急委注煩重宜熟計之可行尚書戶部侍郎專判度支散官如故主者施行敕朝議大夫行兵部員外郎李暐等清才雅器人望時英咸以令名光於俊選自膺推擇久効彌綸宜甄滿歲之勤俾進為郎之秩可依前件敕至公之用本無偏黨惟善斯擢豈隔親疎四從叔前京兆府奉天縣令上柱國知止等咸有人才見推公族秉惟清之操兼致遠之資朕每精念同盟不勤於德當懸右職以觀其徒先委宗卿精為內舉量能考行歷載踰時名數則多升聞葢寡倘膺是選諒在得人固可擢以清要遷於臺閣將觀志於七子冀齊名於八人宜各悉心佇聞成績可依前件書不云乎九族既睦平章百姓葢由內而理外必自近而及遠凡我懿戚可不慎歟違道慢常義無私於王法謹身勵節恩豈薄於他人期於率先勵我風俗深宜自勉以副明言敕朝議郎行京兆府司錄參軍上柱國李岫訓稟詩禮才稱英妙既博藝而能文亦謹身而勵節疆場決勝是賴於台臣爵服懋功宜及於允子雖讓為德主父則固辭而賞以恩延國有恆典俾增章紱之寵仍在神仙之地可朝散大夫行尚書司勳員外郎勳如故敕朝議郎行河南府司錄參軍張博濟心和識遠藝博詞優清白承於教忠通明達於從政頃在河洛備聞紀綱郎官選俊雅望攸歸時宰避親良才久滯宜膺特命俾踐劇曹可尚書戶部員外郎散官如故敕殿中侍御史章仇兼瓊雅有堅操嘗懷遠圖義不辭勞忠能盡節頃逾沙磧能正糾繩興國利於懸車振朝威於絕漠甄其績用宜遷禮閣之榮寄以澄清仍受憲臣之任可尚書主客員外郎餘如故門下左司員外郎楊仲昌朝散大夫戶部員外郎李巖等雅才明識敏行能文修身懷止水之清應物有操刀之利並膺時選所謂人英宜遷禮闈之秩更展劇曹之用仲昌可吏部員外郎巖可兵部員外郎散官各如故門下朝散大夫行河南府倉曹參軍關內道度支判官上柱國彭城縣開國侯劉繹緒業清華行能修飭表通明於吏跡持雅正於公心幕府徵才久聞成效星臺列位宜膺俊選可尚書虞部員外郎餘如故門下肅我具寮謂之秉憲貳於次相必也任賢中書舍人上柱國王敬從雅量深遠周才博達修德行於身謀致文詞於國用自居近密頗歷歲時忠公盡於掌綸淑慎形於削藳必能執其繩準正彼簡書宜拜三獨之雄且膺八使之選可中散大夫御史中丞仍充京畿採訪處置等使勳如故門下副相之亞朝綱允屬缺官之舉時選攸難鴻臚少卿蕭諒直道有恆澄心不撓果斷之用操利器於筆端通明之識置煩文於度外所歷清要必聞聲實將求獨坐更佇兼才斯正色於準繩俾生風於臺閣可御史中丞充京畿採訪處置等使門下列彼三獨儆於百寮選眾為難舉能斯在中大夫檢校大府少卿東都和糴等使護軍蕭隱之敏行深識貞標雅器性與公清寧欺於暗室才優決斷豈避於盤根自任以長府委之平糴備聞堅正深叶和均將寄朝綱允副人望宜贊貳於南憲俾肅清於東都可行御史中丞仍充東京畿採訪處置使兼充和市和糴使散官勳如故敕行殿中侍御史呂周等體資忠厚器蘊通明能兼飭吏之文更有過人之實並膺明選克振朝綱宜展才於草議俾遷榮於執法可依前件敕朝散大夫行河南府陸渾縣令李常等堅白持操通明効官彰吏跡於神州著公方於近縣秉憲之職惟方是與俾諧僉議用肅具寮可依前件敕朝議郎行大理評事蔣冽等修身有裕從事惟明標麗則於文場効公清於吏道方期遠致必藉兼才宜膺刈楚之求俾叶持繩之寄可依前件敕朝議郎前行同州司法參軍關內道採訪使支使上輕車都尉蕭縣開國男姚閎等砥名勵節博藝多能或嘗佐台臣以清關輔或頃諧宮職見美朝端度才而昇舉善以勸俾同官於察視宜竝拜於丞郎可依前件敕前守監察御史邢巨器能通敏詞藻清新久著令名兼稱利用終喪有禮既及於除執憲須才宜居於舊可監察御史
