front:
  text: 全唐文欽定全唐文卷九百二十三果不知何許人武后時隱中條山往來汾晉間自云年數百嵗武后遣使召之佯死不赴開元二十一年恆州刺史常濟以同遣使齎璽書邀迎之至東都元宗好神仙欲以玉真公主降之果不奉詔懇辭歸山乃賜號通元先生銀青光祿大夫為造棲霞觀於隱所入恆山不知所之
  hash: sha256:5f32a1d0a4f3d96c2b595be77f13d8f9ea974c93b2dd8691e63e6c1700683c15
