body:
  text: 夫渾然未兆得喪無涯名質既分則凡聖義顯然凡不自悟必積感以求通聖不棄物亦因機而設教教緒彌綸寧容窮數約其一應之迹所謂道德所言道者極妙環中圓通物化因通立稱故名為道德者殊能廣洽全任無功成迹可目故名為德然則道以通化彰名忘通則會旨德就全任標稱泯迹則德全斯二兼忘宗極無主者也將欲顯彼元源導茲弱喪法不自闡宏之在人故先以老子標為首題萬物藝藝封心華競至人懸解返本無為故曰老子體雖泊然機來則應應迹嗣興目之為子德不自樹妙成在法本其所通字之曰道然道體虛凝常為軌訓其名不去號之為經建言至末此章為首故曰道體論陰符自黃帝有之蓋聖人體天用道之機也經曰得機者萬變而愈盛以至於王失機者萬變而愈衰以至於亡厥後伊呂得其末分猶足以拯生靈况聖人乎其文簡其義元凡有先聖數家注解互相隱顯後學難精雖有所主者若登天無階耳近代李筌假託妖巫妄為注述徒參人事殊紊至源不慚窺管之微輒呈酌海之見使小人竊窺自謂得天機也悲哉臣固愚昧嘗謂不然朝願聞道夕死無悔偶於道經藏中得陰符傳不知何代人製詞理元邈如契自然臣遂編之附而入注冀將來之君子不失道旨矣夫九要者要乃機要也以應大丹九轉故以道分九篇法顯九門九門合理篇篇歸根雖不得親師之旨得此要如親師訓得者坐獲天機悟之者為之心印若依行者在欲無欲居塵出塵分立九門還元二儀學道君子細意詳之先序顯用次要應體以體兼用性命備矣法善括州括蒼人自曾祖三代為道士皆有攝養占卜之術法善少傳符録尢能厭劾鬼神高宗聞其名徵詣京師將加爵固辭求為道士因留內道場睿宗即位稱法善有冥助之力先天二年拜鴻臚卿封越國公仍為道士京師景龍觀開元八年卒年一百七嵗贈越州都督道士臣某言臣江海野人素無道業澗飲木食枯槁自居屬聖朝宗道之門大興元範臣得沐皇化服事五朝竭忠盡誠披肝瀝膽一有所補萬死無恨况屬聖朝重張㝢縣再安品物凡在含識咸用昭蘇陛下不棄芻蕘復收簪履臣愚陋過蒙恩渥假其列棘之司加以茅苴之封褒榮欣被澤漏泉扃然臣胡顏堪此大造灰身刎首不能上答前嵗天恩賜歸鄉里殘魂假息獲拜先塋聚族聯黨不勝悲慶屬親姊莫年百餘三嵗見臣還邱壑載喜載悲才逾一旬奄忽先逝雖死生有命理則固然而骨肉有情豈無哀痛積年之疹一朝遂發形容枯劣殆不能勝往者虔奉綸音俾投龍璧奉使之後禮應復命心馳魏闕意欲駿奔病在江鄉力難勝致自前年之冬末驟辭南土去嵗之夏首才達東京死魂餘步抑難訓說寧有形枯心疾叨厠莫宜紫綬金章人臣極貴自非功高帶礪不可錫其光寵况道本希夷無關視聽謬膺匪服實玷國猷伏願陛下特賜餘魂得歸邱墓則物善遂性天覆無涯方違闕廷不勝攀戀無任懇禱之至謹詣朝堂上表以聞臣誠惶誠恐死罪死罪謹言道士臣某言二月二十一日扶病陳誠特乞餘魂歸修塋墓而高天未聽局地無所因此舊氣發動殘生如線未辭聖代奄成異物幸賴天覆含育未即泉壤貸及餘命得遂微心臣前奉絲綸賜歸桑梓既齎龍璧備歷山川夙夜周章恭承國命比及鄉里時迫嚴寒屬數年失稔百姓逃散親族餒饉未辨情理欲樹碑碣私願莫從而碑石猶在蘇州未能得達鄉里臣焦心泣血以日為嵗若此不遂死不瞑目伏惟陛下覆燾亭育昆蟲遂性孝理之教被及含生臣皮骨空存命均風燭乞餘喘未絶所願獲申一聞聖恩九泉無恨方當辭違宸極舁疾江湖伏枕疏襟不勝悲戀謹詣朝堂上表以聞臣誠惶誠恐死罪死罪謹言臣聞孝道之大人行所先故洪覆無言神女有卷綃之應厚載至廣江鱗表充膳之徵斯實感於神祇通於天地者矣伏惟皇帝陛下孝道叶天地聖德符神祇齊郡擢靈芝陵寢降甘露此陛下孝感之應故當錫類及物而臣幸生孝理之代目視靈應之符身無橫草之功虛受茅苴之錫九卿之任下譬江海五等之爵上應星緯臣崦嵫日迫泉壤無幾生我父母竟未答於劬勞覆我聖恩實有重於山嶽臣誠則微物豈能無心自忝辱朝列日夜惶懼生無益於聖代死實負於康時而犬馬私情切有所願乞以陛下所授爵位回贈先父臣上不違陛下孝道之風下得展臣罔極之念一遂哀疚萬死為幸且臣雞皮鶴髮形骸若是殘魂假氣奄忽無時去冬辭違闕廷輿疾道路曲蒙陛下覆養之德復喜生全令得重謁紫宸趣躡丹地及茲餘喘披瀝微誠陛下所假臣厚祿賧錢乞納天庫官名封號以被泉門則聚族糜軀合宗隳膽存亡幸甚所不敢言伏願天慈沛然聽許再生非重百身靡贖不勝哀苦悲懇之至謹詣闕上表以聞臣誠惶誠恐死罪死罪謹言汝將吾詩及書進上不得求官當奉詔監喪歸葬括蒼吾去後百六十年外卯山當出一人更過於吾若有人於吾舊居修行即其人也元英字子實陝州人隱居東海貞觀五年召至京師永嶽中流郁州夫莊子者所以申道德之深根述重元之妙旨暢無為之恬淡明獨化之窅冥鉗鍵九流括囊百氏諒區中之至教實象外之微言者也其人姓莊名周字子休生宋國睢陽蒙縣師長桑公子受號南華仙人當戰國之初降衰周之末歎蒼生之業薄傷道德之陵夷乃慷慨發憤爰著斯論其言大而博其旨深而遠非下士之所聞豈淺識之能究所言子者是有德之嘉號古人稱師曰子亦言子是書名非但三篇之總名亦是百家之通題所言內篇者內以待外立名篇以編簡為義古者殺青為簡以韋為編編簡成篇猶今連紙成卷也故元愷云大事書之於策小事簡牘而已內則談於理本外則語其事迹事雖彰著非理不通理雖幽微非事莫顯欲先明妙理故前標內篇內篇理深故每於文外別立篇目郭象仍於題下即注解之逍遙齊物之類是也自外篇以下則取篇首二字為其題目駢拇馬蹄之類是也所言逍遙遊者古今解釋不同今泛舉紘綱略為三釋所言三者第一顧桐柏云逍者銷也遙者遠也銷盡有為纍遠見無為理以斯而遊故曰逍遙第二支道林云物物而不物於物故逍然不我待元感不疾而速故遙然靡所不為以斯而遊天下故曰逍遙遊第三穆夜云逍遙者蓋是放狂自得之名也至德內充無時不適忘懷應物何往不通以斯而遊天下故曰逍遙遊內篇明於理本外篇語其事迹雜篇雜明於理事內篇雖明理本不無事跡外篇雖明事迹甚有妙理但立教分篇據多論耳所以逍遙建初者言達道之士智德明敏所造皆適遇物逍遙故以逍遙命物夫無待聖人照機若鏡既明權實之二智故能大齊於萬境故以齊物次之既指馬蹄天地混同庶物心靈凝淡可以攝衛養生故以養生主次之既善惡兩忘境智俱妙隨變任化可以處涉人間故以人間世次之內德圓滿故能支離其德外以接物既而隨物升降內外冥契故以德充符次之止水流鑒接物無心忘德忘形契外會內之極可以匠成庶品故以大宗師次之古之真聖知天知人與造化同功即寂即應既而驅馭㣥品故以應帝王次之駢拇以下皆以篇首二字為題既無別義今不復次篇也而自古高士晉漢逸人皆莫不耽玩為之義訓雖注述無可間然竝有美辭咸能索隱元英不揆庸昧少而習焉研精覃思三十年矣依子元注三十三篇輒為疏解總三十卷雖復詞情疏拙亦頗有心迹指歸不敢貽厥後人聊自記其遺忘耳旻貞觀時希元觀三洞道士觀夫天德惟溥亭育肇其不差人靈本智聞見資其愈甚是以役成則百用不足事逸則萬物皆勤莫不鼎鉉黃金尊崇居處闕四字資養性靈青襟慚於履霜白首成於聚嶽但畏途捷徑豈所般遊風葉寒荄忘其飄踐假使維捎挂席終違寶岸縣車束馬詎越崇山闕一字未有若斯之甚者也至人應世為而不處援手濡足拯溺救焚滌其含垢之性復其既迷之轍立關鍵樹隄防艤慈舟於罕濟之川明慧炬於未昕之夕當其虛往應以真知被薜紉蘭吞虹噬月踐赤墀而宏衆妙排翠扆而播元風踵牧臺之舊蹤襲闕一字山之遺軌勝業與鼇峯竝峻睿澤共鯤海同流理絶名言事忘稱謂可久可大猗歟偉歟法主姓王諱遠知字廣德琅琊臨沂人也眇迹周闕十字襲於上賓之胄非同薛族託闕一字於平輿之門垂密雲而灑潤御長風而縱響道無常器應有常倫故得幽貺鬱其枚條潛祉被其遐構則有葉縣奇蹤雷門逸響闕二字閲世伯喈珍其異闕二字信遁時威明貴其縫掖故乃百川紛湊滄溟浸無涯之廣纍石不窮惟嶽至極天之峻法主大父景賢梁征北將軍江州刺史考曇選散騎常侍太子右衛率輕車將軍陳車騎將軍揚州刺史建安郡公食邑三千戶鼓吹一部班劍二十人袞華載鬱台扃啓曜動成儀表肅以具瞻法主鎮五石於生宮韞三田於命府降靈以資妙氣受鍊而浴蘭池闕二字潄其芳津二儀賦其純闕一字望德門而直指眷華宗而誕曜母氏濟陽丁夫人陰祇降嬪柔德垂美夙有神明之契先稟嘉祥之符嘗因晝寢夢身為飛鳳所集既寤見赤光貫乳遂感而娠七日便啼聲聞於外才經少選而載闕一字焉昔浩靈受錫仰神嗣於瑛柱史流沙託日精於元妙叶符元慶高騰聖迹復乃流光外朗豫顯火傳之教希聲內發先聞導俗之音既而聖縱自天稟至知於弱植道闕三字備闕二字於藏往孝友冥至就養無方業隆幹蠱情忘健羡加以俯同學斆盡鋭典墳三易述其殷周四詩傳其鄒魯著康成之韋簡聽季長之絲竹作黼藻三古琴瑟百家玉書見重金籯取貴明毀縣鏡照奪清淄乃深棄俗纏早生厭離寂寥愛網牢落塵情望元關而一息傃蒼雲而長往時有國師宗道先生識洞幽微智深元妙宣風黃道作訓紫宸九重致禮百工興敬攝齊撰履妙簡英奇法主以體二沐元風知十升堂奧握照廡於荊藍之下抱燭乘於隨合之濱宅空成性智之所漸沿無致學惟幾必彰理詣希微忘所言而知道情遺徑庭就日損以為德爰在冠年虔修上法乃有族雲浮紫㣥鶴呈素暗曖高垂徘徊迥屬周尹候氣詎可參衡晉野揮弦曾何扶轂斯蓋元心廣運遠結冥祥故能幽貺不言嘉瑞爰發法主顧衆芳以指信因㣥靈以攄抱內戰斯止道勝則肥去有欲之廉息多聞之智六經三史縹帙緗囊昔所研味竝皆棄絶物色真應耽尚元虛吐納六宮去來三景峻巢由之節勵夷皓之行便即辟穀休糧惟資松水六塵不染智照杜其氛埃五味性空慧口絶其甘旨遂乃避聲於銜枚之路滅影於至陰之域茅山華陽即三十六洞天之第八也峯秀龍文之鼎水叶鳳門之泉仰三山以交真思五便而竚聖乃抗表闕廷願歸巖谷黃門侍郎賀徹奉宣中旨繼是山棲所須竝令官給既而雅志獲從幽襟獨往高蹈俗外舉手時人㣥公祖道衣裾聚觀法主投簪有所終焉是託潤淹草樹光溢林泉拂雲徑以展足援喬枝以移視雖復金錞和鼓獨韻新聲玉琯調時偏諧雅氣與夫道風遐暢遠秀松筠之表勝趣挺生孤映烟霄之外安可亂其清越革我寒暄故以仙伯嗟其格高雲將談其氣遠仍值旗蓋南歇禮樂西歸法主養粹中巖不染氛穢隋開皇十二年晉王分陝維揚尊崇至教欽味夙範具禮招迎辭不獲命出自山谷長史王子相承候動止咨議顧言每申談對法主豪墨所至必罄今古辭義所該殆無遺逸幽尚有本固請還山晉王重違所守遣使將送遂投於天窗背嶺鑿崖考室卷晦聲迹才可修行十三年正月七日夜端坐精思倣佛朱衣羽人握節而進謂法主曰岫隱川藏事由獨善寓形寰宇宜宏利益重官品藻以卿開教一方可宣揚法味開度後學既受茲靈誥始有應物之心焉於是澄止水於衆象竦貞松於㣥望應運元機盛談名理重關復奧故以啓其幽深六瑚四璉曾不矜其器用山門著録三千許人竝立精舍實為壯麗十九年敕使鄭子騰送書詢問欽尚殷勤誠深下輦大業七年煬帝遣散騎員外郎崔鳳賫敕書迎請見於涿郡之臨朔官帝乃歎曰朕昔在揚州師已素髮今茲重覩更有童顏豈非道固存焉養之得理者六軍返斾扈駕洛陽奉敕於中嶽修齊俄而炎德遂卑忠良解體欃槍遠燭格澤旁流沈馬謬三十之占膠船無五反之慎蒼生塗炭天命有歸大唐景運龍與元象斯構皇上繼明理物光宅黔元參天二地經文緯武神謀廣略道屬雲雷躔晷曜於已晦綴參辰於將落毀隅具固闕二字廓清復修袵席還為俎豆非夫唐風惟大大章可以作歌軒德如雲雲門所以流詠其孰能至於此乎故使天成地平其武功也如彼戢戈歸獸其文德也如此諒可以四三王而六五帝蹈東戶而穆南風瑞發雲星祥應赬素涸泉獻醴茂棘垂柔神筵衛廚芳蓂翊砌巍巍蕩蕩未有若斯之盛者歟猶復役情動慮旰食已勤克己思治宵衣彌篤仁高穹昊澤漏重泉於是嗣興至教尚想元極在昔藩朝頻經降問法主卷懷處世三變市朝語默人間一逢有道既遇龍田方知必舉之翼將攀鳳羽故審扶搖之勢以茲先覺曲招恩禮纍有陳聞乞還江外乃詔洛州資給人船竝施法服敕潤州於舊山造觀一所賜田度道士七十人以為侍者貞觀九年四月至山敕文遣太史令薛賾校書郎張道本太子左內率長史桓法嗣等送香油鎮綵金龍玉璧於觀所為國祈恩復遣朝散郎蕭文遠賫璽書慰問竝賜衲帔几杖等皇太子以其年六月又遣將仕郎張萬迪送香油龍璧供山中法事敕又遣桓法嗣送香八月十三日至觀法主沈吟久之方遣恭受謂弟子曰此香何能燒盡可分四近諸觀廣供齊講冀能感徹十四日午時適因睡寤喜形於色侍者在旁咨問所以答曰吾向暫遊洞宮仙官見報欲以疲朽補為仙伯名位已定行在不久十五日沐浴冠帶焚香正坐集諸弟子述聖朝立觀之由勵學人策勤之志十六日旦忽聞異香入室鳥獸哀嘷顧謂侍者曰日時早晚曰辰時乃應曰好即轉身平臥自正衣冠九易之形一朝解束春秋一百二十有六嵗肢體柔軟顏色不變停殯句餘倍勝常日州遣行參軍馬君偉訃山弔祭并以狀奏聞越二十八日以符竹託祔定録神山之右夫劍解之道皎昧難知至於刊名伯札勒功仙品青銑成文召帝晨之旨紫玉為簡錫太元之命建圖獨立總要㣥靈若得之於千載猶逢之於萬劫自許葛以來未之有也初法主從容謂所親曰國家為吾造觀恩德極重自惟徵應恐不見其成至是時也斧斤始就前刺史辛君昌與五縣官人爰集山所定方準極八桂運於瑤阜五杏伐於緇林塹荊峯而求寶玉決河宮而取珠貝郢人負其塗器般匠獻其奇斤百姓子來四方悅服闕一字排若堵鍤動如雲商略雲崖考量泉石乃於積金洞門之右太元降真之地其山則峯岫開天逼乾行之峻溪谷括地窮艮象之深滴瀝縣流因風振響葳蕤喬木承雲聚翠於是式摹大壯建其精宇據修原而却指陪秀嶺以斜列飛陛排雲危墉列漢構元櫨以轇轕纍丹栱以崔嵬儼香閣於烟空鬱珍臺於倒景烏容拂曉假道璇題之間兔色分宵晦影綺統之側埃壒滅而瑤甍遠寒暑隔而寶殿深綺霞共藻梲爭輝清風與琅玕競響披軒回眺鬱鬱之千巖不窮鑿牖俯臨蒼蒼之萬壑同色螭龍鱗甲動青玉之鐙雲霧光芒列赤璚之案罽闕一字九色雜流蘇而回卷華幡百戲拂藻井而斜縈霜鐘韻鳧氏之音仙蓋盡輪人之妙列卭佺於東序憩羽客於南榮簷度元霜庭凝絳雪昔漢宗宗萬乘元宮才峙於豫章齊侯九合正寢止聞於拱柏未若綸誥爰發雕礱勝地元都萬雉植立天窗之間蕭臺九層輝耀洞天之表故以一罄崑驪中貧海瀆又於內殿奉為文德皇后造元始天尊像一軀二真夾侍擬香園之妙寫空歌之遐邇歸依人天讚仰法輪常轉洪恩不替州伯武陟公李使君諱厚德真人胄裔衣冠舊緒天潢分其遠派帝圃竦其旁枝政循化穆途謠里頌崇信法門義不忘本弟子陳羽弱年服道暮齒不疲稟洞神之言得入微之致平昔應徵已當付囑今茲綜理復隆堂構弟子王軌夙挺機緣幼恭德宇鑽仰聞於奧室舉措循於綱常清言餘論演暢有歸羽等乃與遠近同門道俗耆舊以為日月回薄總盈縮之期春秋遞代運盛衰之道實宜騰芳垂茂遠播清塵但韋編既絶宣尼深易道之歎簡書遽落束皙補由庚之辭是用樹彼高垣題其琬石立言紀事傳諸不朽上願皇圖定七百之基符千載之運同玉京而等固與金闕而俱遙敢述山微猷乃為銘曰生靈蠢蠢世界悠悠吉凶竝騖愛惡相謀如彼蕣華望晷不留如彼蕙菌棄朔無秋至人顯用夙膺元籙勝己克勤導揚斯屬非相遊道無言匡俗物有可甄寧憚濡足幾探其妙鑒獻其明鍊微育德凝元肆情才高楚澤價重秦城義堂縱辨文路蜚英跡淪青嶂聲邇丹屏蹈禮河濱當仁茨嶺師臣是屬如綸攸騁爰召王褱材構茲嚴整偉哉瞰迥壯矣淩虛儀形元圃輝映方諸櫩垂謺璧甍間連珠岧嶢仙阜焴爚神居迷迭香階合昏奇樹擾鹿各遙集馴霓迥赴入嵗招缺騎箕引傅蔽虧日月杳冥雲霧化周道息靜鑒潛神鸞旗宛宛象躅鱗鱗乘飆叔茂析理元賓永言終古無絶清塵崇武后時太清觀主授金紫光祿大夫鴻臚卿員外置同正員河內郡開國公夫至道難究虛皇不測雖無為無形而有情有信無為無形也忘功用而起視聽有情有信也孕生靈而運寒燠乾坤得之以開闢日月得之以貞明天子得之以致理國祚得之以太平為一切之祖首萬物之父母也若乃虛空自然變見生為凝靈結氣化成聖人即元始天尊之謂也故經云無狀之狀無物之象是謂恍愡又云恍惚中有物恍愡中有象杳冥中有精其精甚真其中有信又云元始者道之應化一之凝精因氣感生轉變自然此既不由胎誕因經姓系夫有天地方有人焉有人焉方有氏族天尊生於混沌之始何宗祖之有乎其後改號示變應迹垂靈託胎洪氏之胞降形李母之腋蓋有由矣然五身既分三代斯別隨機應物拯溺安危汲引㣥迷財成庶族慈悲覆燾難以勝言所謂真身者至道之體也應身者元始天尊太上道君也法身者真精布氣化生萬物也化生者堀然獨化天寶君等也報身者由積勤纍德廣建福田樂靜信等也然元始天尊太上道君高上老子應號雖異本源不殊更託師資以度㣥品或命尹喜入天竺以化胡人或與鬼谷之崑崙以行聖教茲濟之道無遠不通蓋方圓動靜黑白燥溼自然理性不可易也吹管操絃修文學武因緣習用不可廢也夫自然者性之質也因緣者性之用也因緣以修之自然以成之由此而言高仙上聖合道歸真固增廣善緣精進無退度人濟己通幽洞冥變粗為精鍊凡成聖而惑者遂云神仙當有仙骨骨法應者不學而得何其謬哉然法界高深天宮悠曠五億五萬布其方域三千大千分其國土則有元都妙境玉京延至聖之游宛利仙居寶臺致神君之化真庭杳眇陽和七曜之天妙躅深沈太微九靈之觀斯乃存諸浩劫著自遐齡厥迹紛綸卒難詳載夫津梁所建開度攸先國土不安陰陽致沴凶衰係起疫毒流行遂能保祐帝王安鎮黎庶此之功德何以加焉然道士立名凡有七等一者天真二者神仙三者幽逸四者山居五者出家六者在家七者祭酒其天真神仙幽逸山居出家等去塵離俗守道全真蹤寄寰中不拘世務其在家祭酒等願辭聲利希入妙門但在人間救療為事今劍南江表此道行焉所以稱之為道士者以其務營常道故也至於法衣非無差降黃裳絳褐式崇正一之儀鳳氣飛雲用表洞元之服載諸經教此不縷陳原夫真經實惟深奧或凝空結氣自然成章或浮黎協晨聖人演妙或天書下降玉字方傳或代出聖師撰述靈旨其後遞相傳授使得流通或寶座敷揚十方聽受所以護持帝王使國土安寧拔度淪亡使魂神遷陟利人濟己契道冥真法力幽通難以為喻崇信者因而享福毀謗者於是挻災若影之隨形響之應聲也是以軒轅夏后崇信也致升仙之道成太平之功梁武齊宣毀謗也招禍敗之辱受覆亡之報我國家承宗李樹襲訓騫林恆締想於真靈每稽芳於道德無為無事載揚垂拱之風乃聖乃神逾闡不言之教既而彤闈少事紫掖多閒披鳳笈之仙章啓龍緘之祕訣文多隱諱字殊俗體欲使暜天率土廣識靈音故敕金紫光祿大夫鴻臚卿員外置同正員上柱國河內郡開國公太清觀主臣史崇為大使銀青光祿大夫檢校太子僕射上柱國臣盧子真為副使宣議郎試右領軍衛長史臣史杲為判官與銀青光祿大夫檢校中書令兼太子右庶子昭文館學士上柱國平安縣開國子臣崔湜金紫光祿大夫行禮部尚書昭文館學士上柱國晉國公臣薛稷銀青光祿大夫右散騎常侍昭文館學士權檢校左羽林將軍上柱國高平縣瓶國公臣徐彥伯銀青光祿大夫右散騎常侍昭文館學士權檢校右羽林將軍上柱國壽昌縣開國侯臣賈膺福銀青光祿大夫行黃門侍郎昭文館學士上柱國贊皇縣開國男臣竺乂銀青光祿大夫行太子右諭德昭文館學士兼宋王侍讀上柱國臣邱悅正議大夫行工部侍郎昭文館學士柱國臣盧藏用正議大夫行祕書少監昭文館學士柱國臣韋利器正議大夫行太府少卿昭文館學士上柱國吳興縣開國男臣沈佺期通議大夫主爵郎中權檢校右羽林將軍兼昭文館學士上柱國臣李猷正議大夫行太子洗馬昭文館學士上柱國臣張齊賢大中大夫昭文館學士輕車都尉臣鄭喜朝散大夫檢校祕書丞昭文館學士臣胡皓金紫光祿大夫崇文館學士上柱國魯國公臣祝欽明銀青光祿大夫行黃門侍郎兼修國史崇文館學士東海郡開國公臣徐堅朝散大夫守中書侍郎崇文館學士臣王琚銀青光祿大夫崇文館學士上柱國平凉縣開國子臣員半千銀青光祿大夫崇文館學士上柱國臣胡雄銀青光祿大夫行國子司業崇文館學士兼皇太子侍讀上柱國臣禇無量通議大夫行祕書少監崇文館學士知館事上柱國居巢縣開國子臣劉子元朝議大夫行中書舍人崇文館學士上輕車都尉臣賈曾朝散大夫中書舍人內供奉崇文館學士柱國臣蘇晉大德京太清觀大德張萬福大德劉靜儼大德田君楷大德阮孝波京元都觀主尹敬崇大德京東明觀主寇義待大德京太清觀法師孫文俊大德時居貞大德單大易大德高貞一大德張範大德田克勤大德范仙廈大德宗聖觀主侯元爽大德東都大福唐觀法師侯抱虛上座張至虛劉元良大德絳州玉京觀主席抱舟等集見在道經稽其本末撰其音義然以運數綿曠年代遷易時有夷險經有隱見或劫初即下劫末還升或無道之君投以煨燼或好尚之士祕之巖穴因而殘缺紊其部伍據目而論百不一存今且據京中藏內見在經二千餘卷以為音訓具如目録餘經儀傳論疏記等文可易解者此不詳備其所散逸佇別搜求續冀修繕用補遺缺而經且久遠字出靈聖梵音罕測雲篆難窺或為無識加增或為傳寫妄誤或持浮僞之說竊揉真文或採菁華之言將文釋典不可齊其所見斥以靈篇今之著述或所未晤中間闕疑用俟能者名曰一切道經音義竝撰妙門由起六篇具列如左及今所音經目與舊經目録都為一百十三卷崇等學昧琅書情昏寶訣伏承天渙敢罄謏聞披錦蘊而多慙對絲言而自失太霄成都人武后時度為至真觀道士先師族王氏俗諱暉法名元覽先祖自晉末從并州太原移來今為廣漢綿竹暜閏人也太霄繼體承華蒙恩入道豈能敞先人之舊德測天性之涯量哉伏聞鄉老說師年十五時忽異常日獨處靜室不㣥希言自是之後數道人之死生兒童之壽命皆如言時人謂之洞見至年三十餘亦卜筮數年云不定棄之不為而習弄元性燕反折法捷利不可能當耽玩大乘遇物成論抄嚴子指歸於三字後注老經兩卷及乎神仙方法丹藥節度咸心謀手試既獲其要乃攜二三鄉友往造茅山半路覺同行人非仙才遂却歸鄉里歎長生之道無可共修此身既乖須取心證於是坐起行住惟道是務二教經論悉遍披討究其源奧慧發生知思窮天縱辨若懸河瀉水注而不竭而好為人相蠶種逆知豐損別宅地之利害見墓田之氣色識鬼神之情狀况衆威信重之嘗有一家欲造屋材木已具問立屋得不不許立至明年又問得不又言不得更至明年又問得不亦言不好於是數月間家遭官事屋宅資財無以供賣此人方念斯言有一家兒子患眼為祭其門前桑樹朽孔遂差或有問病為處方合藥驗後以為奇有人平常請問災厄或報云至明年四月一日方好果至月前三十日夜中亡縣中故人家有患難無遠近皆往問即便為言臧否人信之及還如所言或到深厚家莫不盡出子女親表求相皆為列言其貧富壽夭預鑒於未然行事多奇皆此類也亦教人九宮六甲陰陽術數作遁甲四合圖甚省要年四十七益州長史李孝逸召見深禮愛與同遊諸寺將諸德對論空義皆語齊四句理統一乘問難雖衆無能屈者李公甚喜時遇恩度為道士隸籍於至真觀太霄時年兩嵗也既處成都遐邇瞻仰四方人士欽挹風猷貴勝追尋談經問道將辭之際多請著文因是作真人菩薩觀門兩卷貽諸好事曾往還州路遇道靜人稀時有賢者在後數十步有一老人如隱者狀逆行來過顧視師良久逢賢者語云此人是真人賢者問若為老人曰眼瞳金色言訖行去以是論之亦元會於嘉號矣年六十餘漸不復言災祥恆坐忘行心時被他事繫獄一年於獄中沈思作混或奧藏圖晚年又著九真任證頌道德諸行門兩卷益州謝法師彭州杜尊師漢州李鍊師等及諸弟子每咨論妙義詢問經教凡所受言名録為私記因解洪元義已後諸子因以號師曰洪元先生師亦不拒焉又請釋老經隨口便書記為老經口訣兩卷竝傳於世時年七十二則天神功元年戊戌嵗奉敕使張昌期就宅拜請乘驛入都閏十月九日至洛州三鄉驛羽化嗚呼人而云亡道焉乎在非經文翰千載誰傳蘇遊靈驗記雖略陳梗概太霄以暗乏不明慈訓有預聞見寡於深遠謹集諸子私記分為兩卷竝為序傳題曰元珠取其明淨圓流好道元人可貴為心寶故以珠名之師亦名之為法寶故法寶序云聖人之經淺者見之有淺義深者見之有深理深淺俱通真僞等用竊以往古當今元文空論清言脆句趨道之速未居於上非得之於赤水奚以鑒諸云爾
