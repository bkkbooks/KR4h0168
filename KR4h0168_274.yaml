front:
  text: 全唐文欽定全唐文卷二百七十四子元本名知幾以避元宗嫌名改舉進士長安中擢拜鳳閣舍人景龍初封居巢縣子景雲中遷太子左庶子兼崇文館學士加銀青光祿大夫開元初遷左散騎常侍坐子貺累貶安州別駕卒年六十一贈工部尚書諡曰文
  hash: sha256:061e3528028359fe710aeab8b729694686ac7cac33b12b66b958e777b84c08dc
