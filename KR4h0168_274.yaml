body:
  text: 賦形天地受氣陰陽生樂死哀進榮退辱此人倫之大分也然歷觀自古以迄於今其有才位見稱功名取貴非命者衆克全者寡大則覆宗絕祀堙沒無遺小則繫獄下室僅而獲免速者敗不旋踵寬者憂在子孫至若保令名以沒齒傳貽厥於後允求之歷代得十一於千百某嘗迹其行事畧而論之至如望夷篡奪鴻溝戰爭包燕葢之異志踐恭顯之邪迹或干紀亂常或窺窬僥倖此而獲罪固其宜也爭二城而相殺期五鼎以就烹獻魚炙以交鈹舞雞鳴而伏鑕或幸災樂禍或甘死徇生求而得之又何怨也降茲以外有異於是莫不重七尺於泰山恡一毛於尺璧徒惡其死而不知救死之有方但惜其生而未識衞生之有術何者地居流俗之境身當名利之路皆物之相物我之自我當仁不讓思倍萬以孤標唯利是視願半千而秀出行高於人衆必非之官大於國主必惡之而名譽娛其耳光榮炫其目口甘腴豢嗤鈎吻之腐腸身安棟宇誡垂堂之折足自謂長無六疾永固百齡巋然可與金石齊堅松喬比壽者矣殊不知關張以傲誕為將桑霍以滿盈居職晁錯削國以獻忠伯宗匡朝而好直處父則純剛立性張溫則太明為識見之者為之寒心聞之者為之變色亦猶臥於積薪之上而不知火之將然巢於折苕之末而不悟風之已至既而惡稔釁盈道窮數極黃沙在縶懷上蔡而無追白刃臨頸揮廣陵而長歎猶以為禍出不虞災非素漸以茲自卜奚其謬歟假有舉一反三麤分菽麥知豐屋之不誡悟覆車之足尤而皆宴安鴆毒遲疑猶豫交戰未勝而禍機先發不杜之於欲萌方悔之於既兆用使茂先將戮顧諍子而多慙安仁已收負慈親而永訣嗚呼自古所以多殺身亡族者職由於此也因斯而言則知禍福無門惟人自召自貽伊戚匪降於天而謂之不幸未之聞也昔夫子有云仁遠乎哉我欲仁斯仁至矣竊以仁為百行之首大聖其猶病諸然必以中才之人企勉而行猶或可及況其慎者葢不過慎言語節飲食知止足避嫌疑若斯而已矣非有朝聞夕死去食存信之難也違之則為凶人蹈之則成吉士其為宏益多矣而世人罕能修身厲已自求多福方更越禮過度坐致覆亡此宣尼所以譏鮑莊子之智不如葵而孫叔敖譬以螳螂伺蟬不知黃雀在後余早遊墳素晚仕流俗觀古今之人物極矣見吉凶之成敗衆矣夫貴不如賤動不如靜嘗聞其語而未信其事及身更之方覺斯言之徵矣加以守愚養拙怯進勇退每思才輕任重之誡智小謀大之憂觀止足於居常絕覬覦於不次是以度身而衣量腹而食進受代耕之祿退居負郭之田庶幾全父母之髮膚保先人之邱墓一生之願於是足矣但才非上智習以性成猶恐覩芳餌而貪生處鮑肆而神化苟或靜退之心日弛則馳競之慾日增顛沛以之嗟何及矣常思列銘几杖取配韋弦刻心骨而不忘傳諷誦而無斁葢語曰明鏡可以覽形往古可以知今是用尋往哲之遺事驗古人之得失寄彼形言存諸炯誡列之座右題其賦云吾嘗終日不食三省吾身覺昨非而今是庶舍舊而謀新原夫天地之大德曰生聖人之大寶曰位生也者賢愚定其美惡位也者朝市總其名利七情由其不等百行以之咸異儻無心以自謀良局途其必躓何者得不思失雄獨忘雌耽人爵以健羨窮代路之險巇是則平衡而登九折直轡而踐三危干戈生於肘腋胡越起於藩籬假使履獸尾而不咥探龍頷以獲奇省僥倖以適願非仁者之所為也借如幽室鑿坯窮居負郭二頃樵採一廛耕穫困沈名於抱關志充詘於懸箔俄拔跡於羊豕摶飛於燕雀金紫照其陸離銀黃煥其沃若彼滿盈之難守伊榮茂之易落朝結駟而乘軒暮齒劒而膏鑊方思上蔡之犬追念華亭之鶴奚一身而足怪廼九族其惟索爾其寂寞無事殷憂不平恥當年而功不立疾沒世而名不成懷書訪道學古言兵擅雲閒之美譽馳日下之休聲夫鐸穴由於足響膏爍起於多明趙國從而蘇裂齊城下而酈烹吹律誅於西漢獻寶刖於南荊逐懷沙於楚塞囚說難於秦庭李仕登朝而就戮嵇道超代而逢刑苟才智之為患雖語默而同傾若乃猛將出師謀臣獻策鱗翼攀附風雲感激開黃閣與朱門樹高幡及長㦸恃龍蛇之舊恩望鳥兔之盡獲思擅寵於邦家誓傳名於竹帛蜀既平而艾檻吳已霸而胥溺黜淮陰以斃韓遷杜郵而死白彼功成而不退俄寵謝而招隙何追憶於布衣翻興思於下澤各入門而自媚徒弔閭其何益亦有爵非才舉榮因寵遷吮癰求愛舐痔逢憐朝承恩而袖斷夜託夢而衣穿嗤弦直之死道喜邪徑之敗田氣噓霜而吸露力轉日而迴天自謂方江湖而共永比嵩岱而齊堅一朝失據萬古凄然至於申侯逼迫而辭楚盧綰披猖以去燕彼丁傅之崇貴將梅茹之威權疇一姓其或在覆五宗而不全次有跡鄙衡門情娛俠窟出入田竇往來平勃歌無魚以自媒獻文蛇而請謁疑臥薪之可久謂巢葦之恒安烈火照其潛燎衝風歘其上摶曹門傾而夭鄧賈室壞而夷潘班坐刑於黨竇殷取戮於臣桓顧噬臍而不及知觸藩之為難夫化赤漸乎鄰丹為黔資於邇墨生於麻者既革其操染於藍者亦變其色交非鮑叔遊異田蘇忘臭肆之不惡持甘醴以為娛餘推誠而狎耳蕭結契而連朱始刎頸以交約終反噬而相屠王綢繆於魏諷石嫌疑於州吁孫秀與趙倫齊貫石顯將牢梁並驅汙無禮以自及蹈不義而同誅別有直若史魚正如伯厚飾智驚物露才不偶持瑾瑜而指瑕鑒冰鏡而求垢彼獨潔之為雅固㣥醉之所醜況乃誹謗朝廷擯斥朋友方搢紳以豚犢延冠葢以雞狗符結怨於晉台彭肆言於蜀后禰悲號於座上庾嘲謔於行後揆榮辱之在身猶樞機之發口儻一言其靡慎奚四大之能守然則禮無微而不警怨無小而不讎察關張之同敗審韋弦之所由豈直君子不可罔而小人獨可仇倜儻英跱昂藏遠邁覩厮隸其如萍觀輿臺其若芥本無猜於螻蟻寧有忌於蜂蠆安知鵝炙輟授七尺由其喪亡羊羹匪均三軍以之覆敗苟有怨其必復諒無所而不誡於是考茲出處稽彼行藏咸知進而不知退知存而不知亡惑多言之必敗迷暴貴之不祥彼有足而䍐衞行立身而靡防猶乘車之去軌若涉海之無航既百慮而一致故異術而同喪唯夫明達高人賢良智士知滿損而謙益驗弱生而強死無為福先無為禍始節其飲食謹其容止聚而能散為而不恃潔其心而穢其跡濁其表而易其裏範闇室而整冠循覆車而易軌以道德為介冑忠貞為劍履愛髮膚而不傷保家室以不恥若乃詢木鴈於園吏訪光塵於柱史萬石守慎以全榮二疏既滿而辭仕袁不及於憎愛柳忘情於慍喜漢先主之立誡莫尚中庸衞大夫之所羞獨為君子余雖不佞嘗從事於斯矣重曰夫含靈稟質異品殊倫生何如而弗貴命何如而弗珍鴈含枚以避繳狐聽冰而涉津葵傾心以衞足櫟不材而謝斤彼草樹之無識惟禽獸之不仁猶稱能以遠害尚假智以全真矧百行之君子廼三才之令人何自輕於養性何自忽於周身儻狂歌之可採伊輿誦之可詢敢刊銘以勒座遂援翰而書紳趙魏君子跡著明文有韋弦之淑慎在躁靜以區分於以誡德在我於以表正事君稟剛以宣其志守柔以播其勳動靜有恒得樞機於要道佩服無斁合規矩於典墳昔董安于事趙子虛心固節收目反視由一國之具瞻在四德之為美誡孜孜於不怠諒勤勤於所履觀其弦之勁姿可以勵其攸止式標其道於焉克已所謂惕禍以垂休故以善終而令始且其天道何常順之無悔察是非之倚伏節行藏於進退守而取則在剛柔以為箴動必可觀比玉劍之為佩鄴令乃曰躁用乖於正性故安卑以從時靜既恭於五德故不暴以為師命韋帶之閒緩體君子之舒遲惟器可象惟賢則之佩蘭則殊於楚客象環有慕於宣尼信建物之表意實善之人之所資故知欲不可縱儉以足用德或可移中以成規識君子之容止見淑人之表儀周旋之中寧假於宮徵內外相制亦合乎壎篪大哉景行剛柔異性緩之於韋用和急之於弦表正既守道而恒佩因履端而不競懿夫式彰茂德分意表情禮節既備敬慎孔明參衣冠而振序列簪紱以齊榮猗二子之垂誡與千古之揚名君子嚴其牆仞戒以心胸知躭味之易入俾回邪而不容其慎德也白圭是聞其三復其好賢也緇衣必薦其九重自然契巳坦蕩清心肅雍玩喪志而何有欲敗度兮何從昔如王者三朝遠人重譯執贄山委獻琛雲積豈不知納寶庫為子孫之藏映玉墀嘉戎夷之績葢以難得之貨有損不貪之寶無斁獲狼而荒服不臻却馬而漢皇受益嗤虞公受玉之敗美晉帝焚裘之迹匪騁欲而適願將去奢而無怨滿堂足戒黃金寧慎其四知連城不求白璧何勞於三獻所愛者禮所懷者仁君由之而乂國士用之以防身衣服有常非敢玩於千襲飲食不溽寧專美於八珍其愛才也必擇能而得儶其慕友也亦資忠而履信將辭直而不違知言甘而有吝是窒其欲無忽於微五色足躭審之則朱紫不奪八音可樂慢之則鄭雅同歸思禁邪而制放慮今是而昨非上則宣風下同偃草將還淳而復樸在躭德而味道蒐田失度則念虞人之箴慈儉或虧必思老氏之寶至矣哉好之者儒以多聞為潤屋立義為分社孝既慕於參乎學願從於回也孜孜屑屑束修問寡如此人所以銘座而弗忘書紳而不舍皇業權輿天地開闢嗣君即位黎元更始時則藉非常之慶以申再造之恩今六合清晏而赦令不息近則一年再降遠則再歲無遺至於違法悖禮之徒無賴不仁之輩編戶則寇攘為業當官則贓賄是求而元日之朝指期天澤重陽之節佇降皇恩如其忖度咸樂釋免或有名垂結正罪將斷決竊行貨賄方便規求故致稽延畢霑寬宥用使俗多頑悖時罕廉隅為善者不預恩光作惡者獨承徼倖若乃方正直言之士守善嫉惡之夫每欲攬轡埋輪效鷹鸇而報國褰帷露冕去蝥賊以安人而遇赦無以效其功閱恩無所施其巧古語曰小人之幸君子之不幸斯之謂也望陛下而今而後頗節於赦使黎民知禁姦宄肅清海內具僚九品以上每歲逢赦必賜階勳至於朝野宴集公私聚會緋服衆於青衣象板多於木笏皆榮非德舉位䍐才升不知何者為妍蚩何者為美惡臣望自今以後稍息私恩使有善者逾効忠勤無才者咸知勉勵昔有唐御歷列職命官國多刓印之譏人有積薪之歎自陛下臨朝頓革此風然矯枉過正以為甚矣至如六品以下職事清官遂乃方之土芥比之砂礫其有行無聞於十室即厠朝流識不反於三隅俄登仕伍斯固比肩咸是舉目皆然罕聞翹楚之歌惟見伐檀之刺今尸祿謬官其流非一若遂不加沙汰誠恐有累皇風臣聞漢宣帝云與我共理天下其惟良二千石乎二千石者今之刺史也移風易俗其寄不輕求瘼字人僉屬斯在然則歷觀兩漢已降迄乎魏晉之年方伯岳牧臨州按部或十年不易或一紀仍留莫不盡其化下之方責以理人之術既而日就月將風加草靡故能化行千里恩漸百城今之牧伯有異於是倏來忽往蓬轉萍流近則日月仍遷遠則踰年必徙待廳事為逆旅以下車為傳舍或云來歲入朝必應改職或道今茲會計必是移藩既懷苟且之謀何暇循良之績用使百城千邑無聞廉杜之歌萬國九州䍐見趙張之政臣願自今以後刺史非三歲以上不可遷官仍以明察功過精甄賞罰冀宏共理之風以贊垂衣之化伏以古者爰自大夫以上皆乘車而以馬為騑服魏晉以降迄於隋代朝士又駕牛車歷代經史具有其事不可一二而言也至如李廣北征解鞍憩息馬援南伐據鞍顧眄斯則鞍馬之設行於軍旅戎服所乘貴於便習者也按江左官至尚書郎而輒輕乘馬則為御史所彈又顏延之罷官後好騎馬出入閭里當代稱其放誕此則專車憑軾可擐朝衣單馬御鞍宜從褻服求之近古灼然之明驗也自皇家撫運沿革隨時至如陵廟巡謁王公冊命則盛服冠履乘彼路車其士庶有衣冠親迎者亦時以服箱充馭在於他事無復乘車貴賤所行通用鞍馬而已臣伏見比者鸞輿出幸法駕首途左右侍臣皆以朝服乘馬夫冠履而出止可配車而行今乘車既停而冠履不易可謂唯知其一而未知其二也何者襃衣博帶革履高冠本非馬上所施自是車中之服必也而升鐙跣以乘鞍非惟不師古道亦自取驚今俗求諸折中進退無準且長裾廣袖翼如襜如鳴佩紆組鏘鏘奕奕馳驟於風塵之內出入於旌棨之閒儻馬有驚逸人從顛墜遂使屬車之右遺履不收清道之傍絓驂相續固以受嗤行路有損威儀今議者皆云祕閣有梁武帝南郊圖多有衣冠乘馬者此則近代故事不得謂無其文臣案此圖是後人所為非當時所撰且觀民閒有古今圖畫者多矣如張僧繇畫㣥公祖二疏而兵士有著芒屩者閻立本畫昭君入匈奴而婦人有著帷帽者夫芒屩出於水鄉非京華所有帷帽創於隋代非漢宮所作議者豈可徵此二畫以為故實者乎由斯而言則梁氏南郊之圖義同於此又傳稱政宜因俗禮貴緣情殷輅周冕規模不一秦冠漢佩用捨無恒況我國家道軼百王功高萬古事有不便理資變通其乘馬衣冠竊謂宜從省廢臣懷此異議其來自久日不暇給未及搉揚今屬殿下親從齒冑將臨國學凡有衣冠乘馬皆憚此行所以輙進狂言用申鄙見謹按今俗所傳孝經題曰鄭氏注爰在近古皆云鄭注即康成而魏晉之朝無有此說至江左晉穆帝永和十一年及孝武帝太元元年再聚㣥臣共論經義有荀茂祖者撰集孝經諸說始以鄭氏為宗自齊梁以來多有異論陸澄以為非元所注請不藏於祕省王儉不依其請遂得見傳於時魏齊則立於學官著在律令葢由膚俗無識故致斯訛舛然則孝經非元所注其驗十有二條據鄭君自序云遭黨錮之事逃難注禮黨錮事解注古文尚書毛詩論語為袁譚所逼來至元城乃注周易都無注孝經之文其驗一也鄭君卒後其弟子追論師注所述及應對時人謂之鄭志其言鄭所注者唯有毛詩三禮尚書周易都不言孝經其驗二也又鄭志目錄記鄭之所注五經之外有中候書傳七政論乾象歷六藝論毛詩譜荅臨碩難禮駮許慎異義發墨守鍼膏肓及荅甄子然等書寸紙片言莫不悉載若有孝經之注無容匿而不言其驗三也鄭之弟子分授門徒各述師言更相問荅編錄其語謂之鄭記唯載詩書禮易論語其言不及孝經其驗四也趙商作鄭先生碑銘具稱諸所注箋駮論亦不言注孝經晉中經簿周易尚書尚書中候尚書大傳毛詩周禮儀禮禮記論語凡九書皆云鄭氏注名元至於孝經則稱鄭氏解無名元二字其驗五也春秋緯演孔圖云康成注三禮詩易尚書論語其春秋孝經則有評論宋均詩緯序云我先師北海鄭司農則均是元之傳業弟子也師所注述無容不知而云春秋孝經唯有評論非元之所注於此特明其驗六也又宋均孝經緯注引鄭六藝論敘孝經云元又為之注司農論如是而均無聞焉有義無辭令予昏惑舉鄭之語而云無聞其驗七也宋均春秋緯注云元為春秋孝經畧說則非注之謂所言元又為之注者汎辭耳非事實其序春秋亦云元又為之注也寧可復責以實注春秋乎其驗八也後漢史書存於代者有謝承薛瑩司馬彪袁山松等其為鄭元傳者載其所注皆無孝經其驗九也王肅孝經傳首有司馬宣王之奏云奉詔令諸儒注述孝經以肅說為長若先有鄭注亦應言及而都不言鄭其驗十也王肅著書發揚鄭短凡有小失皆在聖證若孝經此注亦出鄭氏被肅攻擊最應煩多而肅無言其驗十一也魏晉朝賢論辨時事鄭氏諸注無不撮引未有一言引孝經之注其驗十二也凡此證驗易為討覈而代之學者不覺其非乘彼謬說競相推舉諸解不立學官此注獨行於代觀夫言語鄙陋義理乖踈固不可以示彼後來傳諸不朽至古文孝經孔傳本出孔氏壁中語其詳正無俟商搉而曠代亡逸不復流行至隋開皇十四年校書學士王孝逸於京市陳人處買得一本送與著作郎王邵邵以示河閒劉炫仍令校定而此書更無兼本難可憑依炫輙以所見率意刊改因著古文孝經稽疑一篇邵以為此書經文盡正傳義甚美而歷代未嘗置於學官良可惜也然則孔鄭二家雲泥致隔今綸旨發問校其短長愚謂行孔廢鄭於義為允又今俗所行老子是河上公注其序云河上公者漢文帝時人結草庵於河曲仍以為號以所注老子授文帝因沖空上天此乃不經之鄙言流俗之虛語按漢書藝文志注老子者有三家河上所釋無聞焉爾豈非注者欲神其事故假造其說耶其言鄙陋其理乖訛雖使纔別朱紫粗分菽麥亦皆嗤其過謬而況有識者乎豈如王弻英才雋識探賾索隱考其所注義旨為優必黜河上公昇王輔嗣在於學者實得其宜又按漢書藝文志易有十二家而無子夏作傳者至梁阮氏七錄始有子夏易六卷或云韓嬰作或云丁寬作然據漢書藝文志韓易有十二篇丁易有八篇求其符會則事殊隳刺者矣夫以東魯伏膺文學與子游齊列西河告老名行將夫子連蹤而歲越千齡時經百代其所著述沈翳不行豈非後來假憑先哲亦猶石崇謬稱阮籍鄭璞濫名周寶必欲行用深以為疑臣竊以鄭氏孝經河上公老子二書舛訛不足流行孔王兩家實堪師授每懷此意其願莫從伏見前勅令所司詳定四書得失具狀聞奏臣尋草議請行王孔二書牒禮部訖如將為允請即頒行謹議臣才雖下劣而學實優長竊自不遜以為近古已來未之有也當以鄭氏孝經河上公老子二書訛舛不足流行孔王兩家實堪師授每懷此意其願莫從伏見去月十日勅令所司詳定四書得失具狀聞奏臣草議請行孔王二書牒禮部訖但今庸儒淺識聞見不周可與共成難與慮始葢孔父有言曰行夏之時乘殷之輅服周之冕此則今古循環愚智往復豈前者必是而後者獨非乎是以老篇莊子興於晉代公羊穀梁寢於魏日春秋左氏因元凱而方著尚書孔傳至光伯而始行斯皆尚好不同晚乃覺悟承習既久近輒弛張伏惟開元皇帝陛下嘗以九重餘隙窮覽文藝百氏詳觀游心經典爰降綸綍俯逮芻蕘臣輒以愚識上符睿旨伏望明恩曲垂炤察如將為允請即班行不可使隨流腐儒參論其義僕幼聞詩禮長涉藝文至於史氏之言尤所躭悅尋夫左史右史是曰春秋尚書素王素臣斯稱微婉志晦兩京三國班謝陳習闡其謩六朝江左王陸干孫紀其歷劉石僭號方策委於和張宋齊膺籙惇史歸於蕭沈亦有汲塚古篆禹穴殘編孟堅所亡葛洪傳其雜記休文所缺謝綽裁其拾遺凡此諸家其流葢廣莫不賾彼泉藪尋其枝葉原始要終備知之矣若乃劉峻作傳自述長於論才范氏為書盛言務其贊體斯又當仁不讓庶幾前哲者焉然自策名士伍待罪朝列三為史臣再入東觀終不能勒成國典貽彼後來者何哉靜言思之其不可有五故也何者古之國史皆出自一家如魯漢之邱明子長晉齊之董狐南史咸能立言不朽藏之名山未聞藉以衆功方云絕筆惟後漢東觀大集㣥儒著述無主條章靡立由是伯度譏其不實公理以為可焚張蔡二子糾之於當代傳范兩家嗤之於後葉今者史司取士有倍東京人自以為荀袁家自稱為政駿每欲書一事載一言皆閣筆相視含毫不斷故首白可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載書為博爰自近古此道不行史臣編錄唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該訪㳂革於臺閣簿籍難見雖使尼父再出猶且成其管窺況僕限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弒也執以往而近代史局皆通籍禁門幽居九重欲人不見尋其義者葢由杜彼顏面防諸請謁故也然今館中作者多士如林皆願長喙無聞䶦舌儻有五始初成一字加貶言未絕口而朝野具知筆未栖毫而縉紳咸誦夫孫盛實錄取嫉權門王韶直書見讎貴族人之情也能無畏乎其不可三也古者刊定一史纂成一家體統各殊指歸咸別夫尚書之教也以疏通知遠為主春秋之義也以懲惡勸善為先史記則退處士而進奸雄漢書則抑忠臣而飾主闕斯並曩賢得失之列良史是非之準作者言之詳矣頃史官注記多取稟監修楊令公則云必須直詞宗尚書則云宜多隱惡十羊九牧其命難行一國三公適從安在其不可四也竊以史置監修雖古無式尋其名號可得而言夫言監者葢總領之義耳如創紀編年則年有斷限草傳敘事則事有豐約或可畧而不畧或應書而不書此刊削之務也屬詞比事勞逸宜均揮鈆奮槧勤惰須等某帙某篇付之此職某紀某傳歸之彼官此銓配之理也斯並宜明立科條審定區域儻人思自勉則書可立成今監之者既不指授修之者又無遵奉用使爭學苟且務相推避坐變炎涼徒延歲月其不可五也凡此不可其流實多一言以蔽三隅自反而時談物議烏得笑僕編次無聞者哉比者伏見明公每汲汲於勸誘勤勤於課責或云墳籍事重努力用心或云歲序已淹何時輟手竊以綱維不正而督課徒勤雖威以刺骨之刑勗以懸金之賞終不可得也語曰陳力就列不能則止僕所以比者布心知已歷抵㣥公屢辭載筆之官願罷記言之職者正為此耳抑又有所未諭聊復一二言之比奉高命令隸名修史而其職非一如張尚書崔岑二吏部鄭太常等既迫以吏道不可拘之史任以僕曹務多閑勒令專知下筆夫以惟寂惟寞乃使記事記言苟如其例則柳常侍劉祕監徐禮部等並門可張羅府無堆案何事置之度外而使各無羈束乎必謂諸賢載削非其所長以僕鎗鎗鉸鉸故推為首最就如斯理亦有其說何者僕少小從仕早躡通班當皇上初臨萬邦未親庶務而以守茲今直不附姧回遂使官若土牛棄同芻狗逮鑾輿西幸百寮畢從自惟官曹務求以留後居臺常謂朝廷不知國家於我已矣豈謂一旦忽承恩旨州司臨門使者結轍既而驅駟馬入函關排千門謁天子引賈生於宣室雖歎其才召季布於河東反增其媿明公既位居端揆望重台衡飛沈屬其顧眄榮辱由其俛仰曾不上祈宸極申之以寵光僉議搢紳縻我以好爵其相見也直云史筆闕書為日巳久石渠掃第思子為勞今之仰追唯此而已抑明公足下獨不聞劉炫蜀王之說乎昔劉炫仕隋為蜀王侍讀尚書牛宏嘗問之曰君王遇子其禮如何曰相期高於周孔見待下於奴僕宏不悟其言請聞其義炫曰吾王每有所疑必先見訪是相期高於周孔酒食左右皆饜而我餘瀝不霑是見待下於奴僕也僕亦竊不自揆輙敢方於鄙宗何者求史才則千里降追語宦途則十年不進意者得非相期高於班馬見待下於兵卒乎又人之品藻貴識其性明公視僕於名利何如哉當其坐嘯洛城非隱非吏惟以守愚自得寧以充詘攖心但今者僶勉從事攣拘就役朝廷厚用其才竟不薄加其禮求諸隗始其義安施儻使士有澹雅若嚴君平清廉如段干木與僕易地而處亦將彈鋏告勞積薪為恨況僕未能免俗能不蔕芥於心者乎當今朝號得人國稱多士蓬山之下良直差肩芸閣之中英奇接武僕既功虧刻鵠筆未絕麟徒殫太官之膳虛索長安之米乞以本職還其舊居多謝書請避賢路惟明公足下哀而許之史才須有三長世無其人故史才少也三長謂才也學也識也夫有學而無才亦猶有良田百頃黃金滿籯而使愚者營生終不能致於貨殖者矣如有才而無學亦猶思兼匠石巧若公輸而家無楩柟斧斤終不果成其宮室者矣猶須好是正直善惡必書使驕主賊臣所以知懼此則為虎傅翼善無可加所向無敵者矣脫苟非其才不可叨居史任自敻古以來能應斯目者罕見其人長安二年余以著作佐郎兼修國史尋遷左史於門下撰起居注會轉中書舍人暫停史任俄兼領其職今上即位除著作郎太子中允率更令其修史皆如故又屬大駕還京以留後在都無幾驛徵入京專知史事仍遷祕書少監自惟歷事二主從官兩京遍居司籍之曹久處載言之職昔馬融三入東觀漢代稱榮張華再典史官晉朝稱美嗟予小子兼而有之是用職思其憂不遑啟處嘗以載削餘暇商搉史篇下筆不休遂盈筐篋於是區分類聚編而次之昔漢世諸儒集論經傳定之於白虎閣因名曰白虎通予既在史館而成此書故便以史通為目且漢求司馬遷後封為史通子是知史之稱通其來自久博采衆議爰定茲名凡為廿卷列之如左合若干言於時歲次庚戌景龍四年仲春之月也予幼奉庭訓早遊文學年在紈綺便受古文尚書每苦其辭艱瑣難為諷讀雖屢逢捶撻而其業不成嘗聞家君為諸兄講春秋左氏傳每廢書而聽逮講畢即為諸兄說之因竊歎曰若使書皆如此吾不復怠矣先君奇其意於是始授以左氏期年而講誦都畢於時年甫十有二矣所講雖未能深解而大義畧舉父兄欲令博觀義疏精此一經辭以獲麟已後未見其事乞且觀餘部以廣異聞次又讀史漢三國志既欲知古今沿革歷數相承於是觸類而觀不假師訓自漢中興以降迄乎皇家實錄年十有七而窺覽畧周其所讀書多因假賃雖部帙殘缺篇第有遺至於敘事之紀綱立言之梗概亦粗知之矣但於時將求仕進兼習揣摩至於專心諸史我則未暇洎年登弱冠射策登朝於是思有餘閑獲遂本願旅遊京洛頗積歲年公私借書恣情披閱至如一代之史分為數家其閒雜記小書又競為異說莫不鑽研穿鑿盡其利害加以自小觀書喜談名理其所悟者皆得諸衿腑非由染習故始在總角讀班謝兩漢便怪前書不應有古今人表後書宜為更始立紀當時聞者共責以童子何知而敢輕議前哲於是赧然自失無辭以對其後見張衡范日昱集果以二史為非其有暗合於古人者葢不可勝紀始知流俗之士難與之言凡有異同蓄諸方寸及年已過立言悟日多常恨時無同好可與言者維東海徐堅晚與之遇相得甚歡雖古者伯牙之識鍾期管仲之知鮑叔不是過也復有永城朱敬則沛國劉允濟吳興薛謙光河南元行沖陳留吳兢壽春裴懷古亦以言議見許道術相知所有揚搉得盡懷抱每云德不孤必有鄰四海之內知我者不過數子而已矣昔仲尼以睿聖明哲天縱多能覩史籍之繁文懼覽之者不一刪詩為三百篇約史記以修春秋讚易道以黜八索述職方以除九邱討論墳典斷自唐虞以迄於周其文不刊為後王法自茲厥後史籍逾多苟非命世大才孰能刊正其失嗟予小子敢當此任其於史傳也嘗欲自班馬以降迄於姚李令狐顏孔諸書莫不因其舊義普加釐革但以無夫子之名而輙行夫子之事將恐致驚愚俗取咎時人徒有其勞而莫之見賞所以每握管嘆息遲回者久之非欲之而不能實能之而不敢也既朝廷有知意者遂以載筆見推由是三為史臣再入東觀每惟皇家受命多歷年所史官所編粗為紀錄至於紀傳及志則皆未有其書長安中年會奉詔預修唐史及今上即位又勅撰則天大聖皇后實錄凡所著述常欲行其舊議而當時同作諸士及監修貴臣每與其鑿枘相違齟齬難入故其所載削皆與俗浮沈雖自謂依違苟從然猶大為史官所嫉嗟乎雖任當其職而吾道不行見用於時而美志不遂鬱怏孤憤無以寄懷必寢而不言嘿而無述又恐沒世之後誰知予者故退而私撰史通以見其志昔漢世劉安著書號曰淮南子其書牢籠天地博及古今上自太公下至商鞅其錯綜經緯自謂兼於數家無遺力矣然自淮南以後作者無絕必商搉而言則其流又衆葢仲尼既沒微言不行史公著書是非多謬由是百家諸子詭說異辭務為小辨破彼大道故揚雄法言生焉儒者之書博而寡要得其糟粕失其菁華而流俗鄙夫貴遠賤近傳茲牴牾自相欺惑故王充論衡生焉民者冥也冥然罔覺率彼愚蒙牆面而視或訛音鄙句莫究本源或守株膠柱動多拘忌故應邵風俗通生焉五常異稟百行殊軌能有兼偏知有長短苟隨才而任使則片善不遺必求備而後用則舉世莫可故劉邵人物志生焉夫開國承家立身立事一文一武或出或處雖賢愚壤隔善惡區分苟時無品藻則理難銓綜故陸景典語生焉詞人屬文其體非一譬甘辛殊味丹素異彩後來祖述識昧圓通家有詆訶人相掎摭故劉勰文心生焉若史通之為書也葢傷當時載筆之士其義不純思欲辨其指歸殫其體統夫其書雖以史為主而餘波所及上窮王道下掞人倫總括萬殊包吞千有自法言以降迄於文心而往固以納諸胸中曾不蔕芥者矣夫其為義也有與奪焉有襃貶焉有鑒誡焉有諷刺焉其為貫穿者深矣其為網羅者密矣其所商畧者遠矣其所發明者多矣葢談經者惡聞服杜之嗤論史者憎言班馬之失而此書多譏往哲喜述前非獲罪於時固其宜矣猶冀知音君子時有觀焉尼父有云罪我者春秋知我者春秋抑斯之謂也昔梁徵士劉孝標作敘傳其自比於馮敬通者有三而予輙不自揆亦竊比於揚子雲者有四焉何者揚雄嘗好雕蟲小伎老而悔其少作子幼喜詩賦而壯都不為恥以文士得名期以述者自命其似一也揚雄草元累年不就當時聞者莫不哂其徒勞余撰史通亦屢移寒暑悠悠塵俗共以為愚其似二也揚雄撰法言時人競尤其妄故作解嘲以詶之余著史通見者亦互言其短故作釋蒙以拒之其似三也揚雄少為范踆劉歆所重及聞其撰太元經則嘲以恐葢醬瓿然劉范之重雄者葢貴其文彩若長楊羽獵之流耳如太元深奧難以探賾既絕窺踰故加譏誚余初好文筆頗獲譽於當時晚談史傳遂減價於知已其似四也夫才唯下劣而跡類先賢是用銘之於心持以自慰抑猶有遺恨懼不似揚雄者有一焉何者雄之元經始成雖為當時所賤而桓譚以為數百年外其書必傳其後張衡陸績果以為絕倫參聖夫以史通方諸太元今之君山即徐朱等數君是也後來張陸則未之知耳嗟乎儻使平子不出公紀不生將恐此書與糞土同捐烟燼俱滅後之識者無得而觀此予所以撫卷漣洏淚盡而繼之以血也維開元四年歲次景辰秋八月甲辰朔十七日庚申昭成皇太后梓宮啟自靖陵將遷祔於橋陵皇帝乃使某官姓名設祖於行宮禮也丹旐既舒元宮載闢俶龍轀而命駕指鮒隅而卜宅哀子嗣皇帝諱瞻蓼莪而罔極感芣苢而增傷嗟鏡奩之不御痛珠匣之沈光緬考前烈旁稽舊史顧西陵以永懷託東觀而書美其詞曰觀津鍾祉平陵誕靈作嬪西漢為母東京地專戚里門承后族重覩玉衣再開金屋爰初笄總實負才賢學殫詩禮工極紘綖方松等勁比菊齊妍慶膺懷月祥兆捫天膠東胙土濟南開國邦媛思才河魴佇德柔閑植性婉順成則六行畢彰四訓無忒粵自朱邸來昇紫微政成閫闥化穆閨闈孕毓三母牢籠二妃桃夭闡譽葛藟增徽五福多爽百齡過隙地裂方祇天傾圓魄歸神蒿里滅彩椒掖德音若存儀形遽隔嗚呼哀哉痛鍾宸扆禮極哀榮諡踰光烈儀比功成尋周闕之先夢奉堯門之舊名撫遺鏡而增咽攬賜衣而疚情嗚呼哀哉龜兆協謀龍輴戒轍指黃山以徐轉背青門而永訣挽鐸鏘其競喧旒旐儼其齊列萬國慘而潛怛六宮悲而慟絕嗚呼哀哉入松徑園歸穀林見寒山之月苦聞拱樹之風吟玉座空兮壽宮寂金釭閉兮泉戶深想清徽之不昧寄彤管以流音嗚呼哀哉
