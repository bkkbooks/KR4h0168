front:
  text: 全唐文欽定全唐文卷六百九十一符載四
  hash: sha256:d75d4892db9bff7dfa5a44cdbd46d0f208d76c148409a739ec1b9d6626147261
body:
  text: 師姓張氏婺州東陽人十四出家依明州大德祝髮二十五受戒於杭州竹林寺初參國一服勤五年大歷十一年隱於大梅山建中初謁江西馬祖二年參石頭乃大悟遂隱當陽紫陵山後於荊南城東有天皇寺頃因火廢僧靈鑒將謀修復乃曰苟得悟禪師為化主必能福我時江陵尹右僕射裴公稽首問法致禮迎至師素不迎送客無貴賤皆坐而揖之裴愈加敬石頭之道殆盛於此師患背痛臨終大眾問疾師驀召典座近前師曰會麼對曰不會師拈枕子拋於地上即便告寂壽六十坐三十五夏法嗣三世曰惠真曰幽閒曰文賁實元和二年四月十三日也有形必盡至精不死默默順道歸根復始靈龜或昏鮮得造彼仙師獨覺閉跡山水巖巖廬峯上承太空紫雲深處石室在中靈以靜生境因圓融形氣無眹與天渾同道昭成毀時則代謝人皆惡遷我不拒化鶴飛塵外壇寄松下唯餘天風蕭瑟晨夜五帝已遠道則浸微真氣蕭索淳風不歸愛惡糾訐遂成妍媸鑽鑿正性潰為瘡痍邈哉先生體尚無為爰自東岱汎然來茲宴坐空山照本冥思萬慮去矣視身如遺時時輔和醇酒一卮谿聲松籟盡為塤篪天有晦明形亦遷移頹然委順與化相推元德素風敦薄扶衰瞻望廬岳烟霧凄其勒銘巖頂與山並垂武氏之得姓遠矣府君之世家貴矣左右僕射司徒太尉尚書令楚僖王士讓之元孫九江王宏度之曾孫納言司徒同中書門下平章事定王攸暨之孫尚書膳部員外郎徐州刺史勝之子外祖母為元宗皇帝之姑皇妣為肅宗之姨豫章之根大天津之流廣穠華靈潤鍾於府君焉府君諱充字虛受墻岸魁峙操履堅峻蘊之文武辯有口才喜立名跡以排難拯時為事業始以高蔭補兩館生解褐授洪州南昌尉操利刃也次授潤州江寧尉馳驥足也自廣州司士掾轉陳州錄事參軍甲子歲蔡賊希烈叛猛用兇器逆師至於襄城遣裨將鄭貴以精卒一萬來逼我城焉刺史薛寶任公如臂指憑公如金湯顧盼成邱陵呼嘯為矛㦸寇用懾息不得攻取井邑完固我之力焉俄而大梁陷茲地孤險實慮吞奪遂馳謁劉宣武不免介冑而說之換兵鬬騎動如響答保安究竟我功綽焉劉司徒嘉其威毅咨其策畫延至幕府以為賓榮是時希烈赫然東平勢雄或相寵亂以膏濟火公復驅皇華之車投之以心膂諭之以逆順張之以禍福示之以機宜秘謀飛辯得轉丸反掌之勢由是淄青致寧陵之師解陳州之圍合匡君之力摧兇邪之氣破堅陣擒宿將平姦隙結歡好誅逆將在茲一舉得不謂三寸之舌賢於百萬之師乎司徒表其勳績亟聞乎闕下累遷尚書虞部員外郎報功也無幾何丞相府除退歸鄭郊五六年間居易食貧雖四方禮辟日至其戶不苟其所從也適值有土者懟其不答或用陰訕遂有臨賀之拜焉至郡教民以慈愛易俗以禮讓達其志意通其嗜慾曾未朞歲大用治理嗚呼南方氣炎春秋稍高冀遷元土養護餘齡居任凡六霜竟困於足痺年六十九以貞元十八年夏五月丙戌卒於官舍遺孤扶護以十九年秋七月戊子葬於滎澤之廣武原禮也嗚呼才與命二者難幷今古其猶病諸上帝實司之為之奈何以公之行業誠信宏才敏識宜躋上位利及庶物而纔止尚書郎二千石牢落遠地竟至於殂纓紱之士愁憤慨思可勝道哉夫人隴西李氏朝散大夫秘書丞相光之女母儀陰教輝華士族先公數歲而歿至是而合祔焉嗣子曰異曰典溫厚謹良奉承家風茹荼毀瘠動中於禮從子沇貳其窀穸之事以余為舅之友也見托為銘曰悠哉悠哉位不勝才一郡褊小六年徘徊逸翮徒張高風不來炎徼隕落搢紳悲哀舊檟新墳滎澤之隈冥冥鸞鳳同棲夜臺唐益州犀浦縣令宏農楊府君春秋三十九以大歷十四年冬十月卒於郫縣之私第且迫多故權窆於是縣之近郊有才子衡進士擢第官曰左金吾衞倉曹參軍為桂陽部從事以貞元十五年十月某日啟護於成都以十六年春二月某日歸葬於鳳翔之陳倉某鄉某原從先塋也府君諱鷗字叔儀漢太尉次子復之裔羽林衞大將軍襲觀國公之曾孫金吾衞大將軍漢潤夔濮等六州刺史令深之孫朝請大夫絳州司馬昭獻之子發緒洪流丕承和粹世嗣厥德休有光耀府君涵五氣之英華挺九流之上才端睦孝慈勇義而文年甫弱冠儔朋推揖鄉里舉秀士未果銓試遭司馬捐館崩迫歸絳營邱三年服除承順遺命再射羿彀以制科登第補修前績怏怏有遺意也解褐授隴州隴縣尉會大盜入國上皇南巡地衝賊要方急完禦公以一尉之柄推挽令長驅徒走吏摧沮橫猾用張我師天子聞而嘉之詔授大理評事參佐汾陽公幕府謩猷碩畫實詢我焉是時公年未三十聲華隱發青萍出匣霜鋩照人人既心畏我復自負繇是有貝錦之詩焉遂除成都府戶曹參軍事太夫人在堂公養志氣奉遺體動無違顏唯疾之憂故州閭稱其孝也孤寡稚弱族居百口饘褐齊一莫間我爾故朋友尚其義也有從祖父誤淪罪網家為奴隷宗屬顧視咄嗟而已公破鬻田產露坐佛寺不計旦夕悉以貲贖世母與太夫人重聯娣姒之歡眇焉室妹奮出泥滓嘉耦於吉士故鄉黨服其仁也於風流興詠高標敻遠妻嫂姑姊妹㣥從子弟又雅為文每良辰美景指烟月眄琴酒未嘗不操觚拂硯搜拾奇麗不出庭戶璨如瓊瑤亦一門之盛永泰三載蜀將亂迫公不從之築塞門戶視死不應相國杜公鴻漸景行操履奏授犀浦縣令函牛之鼎用烹小鮮一邑之理固不待歌頌而知矣時視僚友杜員外甫岑郎中參郗舍人昂聞公風聲望公飛翔謂青冥寥廓舉翼而至不幸殞落鄰乎短祚遠邇承風失聲咨嗟與善降祥其安在哉夫人李氏趙郡之望族也祖崇饒州司馬考譔成都府法曹夫人貞懿文淑風度明茂奉上撫下閨門穆然天寶十四載春秋十七而歸於我在蜀前公二歲而歿故至是而合祔焉倉曹少孤露始在齠孺荼蓼辛螫厚自砥礪攻文種譽樹身須時克荷家聲君子以為孝嗣矣某與倉曹為山林之友二十年矣迢遞萬里見托為誌故得備采風烈銜恤為銘刻於墓門之石銘曰寶鷄古地鬱穹崇兮高山大澤氣所鍾兮神歸卜宅安其中兮延休發祉方未窮兮嗚呼蘭陵蕭君蘊賢人之業藏佐世之德大君未盡其力生人未享其福鍾厲遘痾殞靈休時哀哉君諱存字成性梁武帝季子鄱陽王恢之裔五世祖唐刑部尚書生雅州都督都督生左衞長史元恭長史生密州莒縣主簿旻主簿生揚州府功曹穎士穎士字茂挺特達聰明業於上才以詩書禮樂皇帝王霸之術為己任開元中進士擢第靈鳳神龍煥乎文章高價風馳撼動八荒是時禺禺昂昂賢雋之士揖涯岸趨聞望如百川之委溟海㣥山之仰嵩岱君即功曹之子也稟乾坤清粹之氣聚而為德義散而為識度行可以輔教才可以拯時大抵根儒術尚名理喜言人之善鋤人之惡其餘九流百氏質文沿革雖千古敻絕如以眸子視左右掌也大歷初與昌黎韓愈天水趙贊博陵崔造素友善齊名李大夫棲筠領浙西掇華刈楚遂奏授蘇州常熟縣主簿顏太師真卿典吳興纂文編韻延納以修術疑之任宰相劉公晏司轉運與能咨畫奏授左金吾衞兵曹參軍明年遷廷尉評建中包諫議佶掌鹽鐵聆風欽舊奏授監察御史明年轉殿中侍御史自貞元元年夏至十年春凡再為侍御史四為尚書郎初御史大夫張滂董戎天子之俾君畱務於上國時主計者張權侵官交關有司君不阿撓庭辯可否哆南箕燭光芒繇是愁憤乞守外職竟罷歸潯陽君有草堂在廬山下紫霄峯晚節學無生得禪悅之味每天氣寥朗神有所詣輒駕紫騮擕酒壺學業同紫府之客恣遊其上弄泉坐石不記早暮無幾何登黃石巖之絕巔谷飇風劉丁毒腑臟右體麻痺不仁雖藥膳充席疑岐和疊跡不得施其力焉春秋六十二十五年冬十月五日遘疾十六年冬十月五日卒於潯陽湓城之私第遂以是年十一月十二日權窆於承仙之西岡未克葬於臨汝故也凡纓紱之倫痛環璧之破碎悲豫章之摧拔莫不驚惋憯怛嚮風凄欷焉夫人河東裴氏王父璡越州倉曹參軍事皇考光輔蘇州吳縣丞資淑和之氣承禮義之訓陰範內則璨然有光有子四人曰敻曰東曰愿曰奐咸端素溫良克荷家聲吞茹荼蓼若絕生理今相國齊公抗河南尹張式給事許孟容鄭郢州正則兵部楊郎中憑憑弟吏部郎中凝盧輔闕景亮陸殿中澧投分許與期於莫逆眾君子振鱗奮翼日薄霄漢君未中壽獨歸泉壤匣有豪曹櫪有飛黃不發不馳埋骨摧鋩可哀也哉可哀也哉相國於君有死生之交情至於葬舊鄉撫嵇紹蓋餘力也足以慰其精靈焉載後學小子日遊於藩故遺芳盛烈備得詳悉見託誌錄銜酸為銘銘曰崇山鬱鬱連西岡青龍白虎為壽堂靈其少安樂且康旄頭不明歸舊鄉維年月日某官某祭於某官之靈乾坤瑞氣蓊鬱淳精誕生碩臣為才為英其體軒昂其神清明大包九德全貫五行聞望昭宣勳榮崢嶸靜專動直淵默雷聲甲子之歲宗社震驚塵飛四野人弄五兵公在隴州保捍孤城師徒顦顇凶孽縱橫一發沈機萬夫掃平天維地軸為之不傾天子報功夫何超越全蜀千里虎旗龍節堅完卒乘延納賢傑武事雄稜文華昭晰西戎夭矯南詔敻絕德惠震威投心象闕激揚風教提擕義烈二十年間沱江澄澈爰有獷人驃國彌臣化所未洽古之不馴飲我大誠沛然來賓遂使皇澤播其無垠奉聖功成樂府聲新一時事業萬古紛綸實冀昊穹福善與人何豫章之磅礡奄摧落乎青春嗚呼曩者危疑之際邪臣交搆獨秉精誠飛章上奏忠同折檻詞近及霤昏霧忽清太陽乃晝凄凉陳跡惋毒中壽志未展於生前寵徒光於身後於戲某以薄劣獲事旌旃猥承國士之顧謬居㣥彥之先徬徨授署昧懵機權顧無能於布政懼取譏於大賢蕭條歧路眇默風烟諒祖奠之無路瞻壽堂而澘然至道之世君臣聖明必有賢才為之挺生昭昭我公得一居貞窺神靈之壺奧涵天地之淳精胸襟洞達方畧縱橫文房啟而風雅斯在武庫開而禍亂乃平甲子之歲逆泚變節河海沸騰宗社阢隉孤軍隴上勢窮援絕激臨危之肝肺成曠世之勳烈帝有寵命擁旄蜀川威聲烜赫德禮昭宣家有美政人無兀賢熙熙穆穆二十餘年機謀內發英明獨照頓挫西戎經營南詔通驃國之幽阻導彌臣之呌窱咸屈膝於君王信萬古之榮耀方期驅兵率乘覲謁帝庭承汪濊之殊澤陳訏謨之大經如何尊重遘茲殞靈地偃喬岳天沈輔星昨者疾瘳之日咸望再起頻造屏內候公動止憂國慷慨請立太子事苟未行歿而後已今上嗣位人神交喜哀傷大賢不見如此某謬以菲薄監臨此軍參蕭曹之議論覩伊霍之功勳凄凉門館顧慕風雲非百身之可贖寄一慟於斯文維年月日祭於某官之靈聖歷應數今古同風五百年間運屬我公長河噴射太華穹崇鬱起生人之表獨棲顥氣之中往者鯨鯢蕩海波濤洶洶京洛風塵人神震恐公遂屹立天授智勇斬刈師徒扶持隴逆黨顦顇心摧計擁繇是安危繫之輕重天子報功禮數乃殊既握龍節亦執金吾國之西南實曰成都夷夏混合山川盤紆苟非哲人莫啟令圖咨我賢達付之方隅公乃厭坤維之厚德注㣥生以和氣應變參乎杳冥布政歸乎簡易剗風俗之姦窳平人心之險陂肅貔虎以雲屯禮英髦而鹿君至蠲萬痾於藥草新百貨於厂墨肆綢繆賓客之歡肅穆鬼神之祀補前人之漏畧極當時之能事道尊而獷俗承風聲烜而殊鄰慕義狺狺犬戎背約報仇疆塲蠆毒大邦寇讐公動機權控扼咽喉闢其陬落係其魁酋峨和窣雲大渡橫流伏不敢動垂二十秋伊昔南蠻嚮化虔奉朝旨將率非良撫綏失禮興兵戰伐深入邊鄙十萬之師蕩為厲鬼公以誠往彼由感起拜新詔於皇都歸舊封於越雋提擕椎髻之類簉列青衿之齒驃國之與彌臣伏聯蹤而疊軌臣製樂以奉聖裁文以敘美考一德之輝光諒有唐而已矣方期五福之壽享九命之尊至雍熙於宇內相玉帛於天門何至業之堙鬱逢逝水之迅奔竭涸滄海摧頹崑崙精靈一去徽烈空存嗚呼哀哉錦城秋暮北郊長路寂寞山川蕭疎草樹雖蘋藻之屢薦終轜車而不駐慟軍府之悲涼增煙霞之思慕某等俱以孱鈍獲事旌旄庇蓮府之光彩無汗馬之勳勞戴恩愧厚顧位慙高問沈痛之何有與三江之滔滔維年月日祭於某官之靈惟靈和粹在躬行方而通瀟灑囂塵之外翺翔禮樂之中與物大信推之至公落落賢人之慶恢恢長者之風學有餘力備攻眾藝環璧文章龍蛇草隷江湖之地東西無際獨負高名聞乎早歲赫赫太師光鎮此川大啟幕府盡心招延運籌帷幄之內折衝樽俎之前鬱然時論謂蜀得賢某也不才接武隨肩緬茂三益周旋十年或朝遊古寺或夜接華筵歡呼醆斚嘯傲風煙神理無狀忽鍾沈疾顧侶無悰懷仁若失陰深府舍寥落煙日雖道義不間於同心而笑語每乖乎促席何士林之凋瘵碎金相與玉質某以懦劣謬司戎律方屬理兵未遑造室眷言襟契何啻膠漆一面有乖百齡俄集舊鄉迢遞素帷蕭瑟望精爽以申哀誠不知涕洟之所出惟靈總四科之要推六藝之先襟懷灑散文翰聯翩寄情琴酒長嘯風煙有名當世三十餘年誠謂羽翼中朝潤色王度翔鸞彩鳳翅翼雲路荏苒江海蹉跎晚暮道乃光華疾成沈痼崇巖絕壑松摧桂蠧哀茲下泉永寐不寤某頃同舍周旋後塵肺腸見許筆硯相親顧以孱虛每慕仁人實冀鄙志於茲大伸奈何昭時奄落窮塵永懷道義臨風酸辛畫翣柳車白日青春鄉關樹老岷蜀塋新戎事見覉執紼無因具罇罍以寫意聊寄恨於江濱維年月日祭於某官之靈惟靈行業端簡襟期高朗類彼雲霄萬夫是仰根蟠一德冥入㣥象和自中來道非外獎風儀峻峙神氣森爽清濟橫流蓮峯直上爛爛文章早歲擅塲鏘金扣玉折桂穿楊昔在太師作鎮坤方大啟幕府聿求賢良君赴招延價重珪璋賓主之際赫然有光余復繼來厠接周行契侔金石韻擬笙簧並几聯曹擁闥環廊紛紜笑謔爛漫壺觴昨者象緯成災禍丁故使門庭倉卒軍旅沸渭猥蒙遺令俾司畱事顧此孱虛實憂殞墜東川無狀橫相猜忌破表焚牋封山掠騎因得討罪誅其不義屢犯鋒鋩幾經憂畏天子明察龍旌旋至何事謏才忽膺重寄告語未接潰瘍已熾晷刻小暌音容永閟如何昊蒼負此沈意危迫是同歡榮乃異嗚呼哀哉賓寮分切親懿情偏念家道之霜藐若肺腸之焦然位不過郎署壽纔及中年彼禍淫與福善吾將仰首而呼天一罇酌奠百慮纏綿維撫孤之感躅庶幾誠之在焉嗚呼子有四教文行忠信惟公佩服終身不磷惠慈敦厚溫恭淑慎趨善如流惟賢是進公方可與利用無眹騄驥絕塵青萍淬刃累參戎府九牧大郡教化諏謀作程垂訓不躋高位丁此巨釁茫茫上天殲我賢俊嗚呼佑自弱齡實奉周旋綢繆出處四十餘年昔佐此府周行接聯佑忝末介公總中權朝整金鑣夕同綺筵揮動醆斚沈吟風烟對博干塲春日秋天氣振耳熱勝負爭前今也冥冥音容藐然沈思永痛涕泣纏綿嗚呼世且多故權窆茲地苟安其宅豈靈之意悠悠羸疾浩浩官吏無因執紼遠送幽隧天寒景淑雲愁雁思傾一卮以寫誠痛百年之永異巖巖泰山㣥嶽攸宗公有盛德與之比崇高朗沈深神超氣融禮樂方外粹和積中禺禺昂昂大人之容天高起鶴泉深見龍早張雄詞扣玉鏗鏦文塲一戰陷敵摧鋒結綬玉畿部局生風拾遺丹階危言匪躬公嘗從事浙西盛府咨籌畫畧輝光賓主皇帝順狩褒梁重阻納貢匍匐達行在所帝曰首至西方惟汝建社擁旄於鄂之渚自公之來法舉令行鋤姦翦暴振獨蘇惸疆理封域繕完甲兵十五餘年夏水潦清德宇宏曠威容光明日冀休時調鼎和羹嗟此梁棟奈何頹傾位竟不來負我蒼生嗚呼載有蓬戶廬山之曲接連人郡沿迴往復早獲請謁許布心腹掩過與能情優禮縟想公振揚清風無鄰律呂翰墨龜龍搢紳遺我細微合我嘉姻永言感慟破骨傷神嗚呼哀哉去歲春暮旌旗滿路眄睞風煙畱連草樹前日東亭天光曉晴金罇玉管芳樹流鶯誰謂累夕幽明遽隔瞬目交臂遂成古昔心敬無飾詞哀必激寫慟絕於江千疑精靈之可覿伏惟尊靈涵清明之氣秉中庸之德事業存乎教化忠厚形於家國文章根風雅之奧議論探元聖之域虎視犀額山立玉色惟公昔年聲譽赫然拾遺補闕丹陛之前天子思理垂意藩外聿來沔鄂十五餘載浩浩茲邑民繁境大通至信於豚魚被深仁於幼艾秋霜可畏春日可愛卷風波於夏水失險阻於西塞嗚呼地有四海候公而清天有三階望公而平昊穹謂何殲我賢明小人君子號呼震驚嗚呼賓主之道人倫之義情禮所加殺身有地如朗小子孱愚下位無絕俗之姿寡卓然之異猥辱提引叨居賢次顧侶之榮撫心多愧頃將重命驅車遠使不憚山川敢告顦顇昔我往矣寵節煌煌今我來思丹旐悠揚慟哭江干若摧肺腸儻神靈之昭鑒殊辛酸之未央大方浩浩天高地厚彼上人者空門稱首塵埃三界揮斥萬有如淨蓮花出泥離垢早歲蜀中師事全公一言悟解了得真空靈境內虛妄境外融寶山見月性海無風某謬以菲薄投心依止周旋瞻仰年踰一紀東洛之濱湘江之涘晨朝後夜談元析理破壞結縛我則用喜甘露洗心簫韶洞耳一昨猥受朝寄聿來此方撫俗未幾懷仁不忘師雖無心應物則深尺素紆屈千里相尋纏綿舊故啟迪塵襟窮弊邑之風物暢平生之登臨嗚呼風火扇災遽成沈疾暌累旬之晤語謝百靈之形質雖真性之湛然愴尊容之已失荒郊野塔秋晨曉日幡蓋飄蕩香花蕭瑟寄慘怛於斯文諒悲懷之不一良友三人來自蜀川身棲廬嶽氣屬雲天至寶多脆靈芝不堅君與王生早落窮泉當時食貧窆禮從權殯宮蕭索二十餘年在風塵中觸故牽纏每懷曩昔深衷惻然頃亦有意祗承付託訪君姻族獲歸京洛賢舅緇褐外弟罷弱實恐歲時遂移舟壑神本尚簡禮貴適時即其故地而窀穸之衞玠短命伯道無兒千秋拱樹我心傷悲嗚呼我李處士已而已而天有神氣地有山川交感絪縕實生大賢聰明惠和忠厚塞淵體剛法健動直靜專在昔安卑屈宰堯山聿來射策遽登紫垣異日從容危冠上前以手畫地慷慨論邊道合時來舜日堯年纏綿三接奮發九遷帝念和戎公駕軺軒詞危氣激張威懾蕃擁旄襄漢建斾荊蠻卒乘完勁勳庸昭宣征南當陽芳若蘭荃我有令問與之周旋嗚呼仁人在上安危所屬世且多難奪公何速溘然朝露壞乎梁木望缺三台壽虧五福大誠至信漸人被俗擁杵輟舂鄉號里哭嗚呼載本諸生器識孱愚猥辱拂拭化珉為瑜昔歲渚宮灌涸濡枯前年南擁顧重禮殊將致賓僚將貢國都感念厚意使人捐軀漢水之陽峴山之隅千乘煜煜旦夕陪趨秋景沈寥春華芳敷爛漫醆斚淒鏘笙竽拜首節旄將去踟蹰吟嘯敘什丁寧匡廬星霜未周幽顯異途神歸蒼昊魄散黃壚明明知音今也其孤仰天涕下被臆交襦嗚呼舊山之下石田疎惡智昧經營食無藜藿歲時淹久情禮漏畧瞻望壽堂脾酸肺削驅策輿隷匍匐宛洛清酒隻鷄申哀獻恪凉風白露帷帳蕭索門㦸朝開井梧夜落生芻一束意不為薄寫慟絕於精靈冀斯文之可託波澗濬廣根柢深長沃日淮海捎雲豫章氣韻孤高鴛鴻翺翔高行端簡秉心直方在天寶中族大且光一門六姻鳴玉琅琅作宰藍田政聳民康棲遲半刺亦振芬芳才盛位卑屈聲昭彰遂登侯牧答時之望雨洩雲蒸虬螭騰驤浩路方騁羽鱗摧傷嗚呼昔公典郡歸江之涘小子旋蜀道途舍此扁舟旋泊弱植殘鄙公辱車馬晤言則喜與能獎善感慨知己意敵周親禮成半子迫切寧覲不遑畱止爰方浹旬遽征千里縈紆巖嶂浩蕩雲水惠愛纏綿簡書填委食貧多故淹歷周祀遠侍板輿敬符深旨嗚呼哀哉歲暮朐䏰積雪皚皚旅館蕭條凶訃亦來望風一號使人甚哀心腸結塞彌旬不開公嘗好古服膺儒藝擅美素琴騰芳草隷洎拜靈座清塵四蔽札蠧徽銷空知灑涕嗚呼公用中孚納人於誠人負長者薄塵頌聲道孤無鄰怨抑不平逝景潛晦崇山忽傾孀稚寃號自硤徂荊霜降露濡毒漬中情今則虔恭歸厝先塋靈有安宅道無弛程泬寥之晨萬象悽清野曠鴻斷天色光明煌煌素車翩翩銘旌出祖荒逵惋慟交幷聞諸格言黍稷非馨意有所欽生芻豈輕湛彼罇罍冀降明靈儻精爽之如在庶哀詞之是聽坤道尚順婦德尚柔於維夫人璨璨寡仇玉樹易摧慶雲不畱零落當年職此之由禮云牉合意不為薄矧余於子既和且樂一朝已矣百端無託穆穆中闈從茲寂寞常日和鳴尚為邈然此別如何遂欲終天夏木蓋庭新陰芊眠美景如舊孤魂不還同穴相從乃曰義全斯言旦旦神無懵焉嗚呼莫莫女蘿縈紆葛藟我有弱妹克配君子關睢之化夫婦之始禮奉籩豆義濟生死常恐寡訓昧章懵理夙夜箴規庶無愧恥結褵成婚垂三十春樂踰鼓瑟敬越如賓才盛道貴為唐碩臣擁旄樹羽夏水之濱鼎食錦衣長㦸朱輪宗族百口庇公清塵浩浩陂池常為無津坊崩水涸哀此窮鱗嗚呼序當仲姊自慚疎昧用禮過恭豐家甚泰良辰美景長幼高會錯落圓方抑揚眄睞神理如何杳杳茫茫朝榮夕落使人摧傷言自漢江將歸洛陽喪旗旅櫬新墳舊鄉苟可薦誠蘋藻馨香感深恩而何報寄沈痛於孤孀嗚呼婦姑之間尊嚴而已情苟不至兩城千里吁嗟新婦德禮具美心之所親如臂有指齒髮衰暮方用依倚天降鞠凶骨驚心死新婦門緒薰華派流深遠貞淑端一聰明婉娩奉余以敬待夫有則舉案得如賓之禮均養實鳴鳩之德勤勞絲枲吉蠲酒食自中閨之與外姻莫不盡其心力嗚呼爾之事我善非一端柔聲順色迎意承歡晨雞初鳴風高露寒環佩至止我心則安今也年高人間意闌爾復捨我窮泉杳漫房帷空虛孤稚摧殘深沈注視焦然肺肝嗚呼鄉關迢遞道路乖阻權厝茲地非為永處壽堂猶近如聞晤語靈其慰安無或覊旅撫棺永訣持觴奠醑寫一慟於高秋望素車以延佇熊羆之門將大而榮必有令母贊成家聲於維尊儀涵懿稟靈德補陰教言為婦經輔助司空淑茂芳馨大君有命啟封於邢宜保攸長既休且寧鞠凶何謂鍾我天齡英英冡子少年仗鉞身靜邊烽世間忠節孟子賢聖陶侃勳烈實由二母卜鄰截髮端揆承訓事君禮竭知與古人異時同轍杯圈猶澤扇枕永訣創鉅痛深茹荼泣血某以拙薄叨鎮藩維偕分天子之茅土共列太常之旌旗歲月崩迫窀穸有期拘以戎事無因載馳風景蕭索山川逶迤遣蘋藻以寫慟瞻壽堂而凄其
