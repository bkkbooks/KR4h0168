front:
  text: 全唐文欽定全唐文卷三百七十一益贈僕射休烈子天寶初進士為翰林學士
  hash: sha256:2506387443bc9c9f42627ce5d2875d9094eb294aabf347345f6bd5d3f179f041
  markers:
  - {type: head, offset: 14, content: 于益, id: KR4h0168_NFKB_371-h1, level: 1}
body:
  text: 淳維之地上戴斗極其氣徑悍其人驍雄間生將才恢我王略其革去故俗鼎從新風建功惟忠戡難以武常衽戈革每襟邊陲胙土連華重代襲祉啓迪後嗣光昭前人可得而言也公諱道生其先呼韓之宗谷蠡之允代居南部早入中原漢典論封特命弓高之秩周臣赴會爰書潞子之班祖廣琛雲麾將軍左羽林大將軍心膂北軍爪牙中壘徼道以肅期門有嚴父崇禮忠武將軍左金吾衛翊府中郎將職副緹騎名雄鶡冠警於誰何勤以夙夜公誕自朔漠習於干戈太公之符如已神授孫子之要動皆暗合心傾奉國膽略禦邊鎮在疆場統其番部尋為寧朔州刺史兼部落主恩附獷俗威除寇攘軍門罷扃虜騎遠遁開元中信安郡王禕以宗室之賢受登壇之寄每有討伐命公先鋒寇必能嘗險不避難馘黠虜之首繫林胡之俘仍援河湟大破戎醜數實過當議功居多一自捍邊三十餘載終於左衛大將軍春秋六十夫積善疇慶嗣續不忘辛氏繼封耿門多將求之於代公實有焉其子朔方先鋒使同節度副使開府儀同三司試太子詹事左武衛大將軍上柱國南陽郡王元光勇乃絶倫忠而能力九伐之際常為戰鋒勞旋策勳議績當最封開八國秩亞三司皇上寵乃茂功義崇追遠恩光照於幽穸厚澤降於重泉贈公太子賓客夫人康氏為越國太夫人喪事官供有加常等以永泰元年三月二十四日遷窆於萬年縣鳳棲原禮也雙旐同引千車會送更刊貞石式建蘴碑同武庫之間樵蘇永禁比祁連之象丘壠長存銘曰地在元朔代生良將名重關西氣雄塞上繼秉金鉞遞居玉帳戰必為鋒居常保障粵有令子時高茂勳援戈揮日杖劒決雲東平寇孽西掃祅氛志由忠立名以勇聞刻茲貞石以表孤墳肅贈僕射休烈子與兄益相繼為翰林學士終給事中贈吏部侍郎衡嶽之峻極於天作鎮五嶺炎海之包括於地委輸百川以崇山之靈漲溟海之濶孕育粹氣實生英才厥有韋府君則其人也自豕韋開國積德纍業西漢丞相父子繼為醇儒衣冠相襲傳慶不絶得其姓者見重於時可謂源深派長本大枝茂者矣公諱某京兆人也祖某不仕父楚皇任朝散大夫內給事中武德使判宮闈令事皆奕世載德繼美承家公幼有奇操形神爽邁器宇沈正識者異之髫齔之年參內侍省出入門閣情志專良開元十年解褐授內府局丞典御府之藏列內官之秩勤願慎密肅恭矜莊洵美可觀碩大且儼事因績著官以課遷尋充市舶使至于廣府賝賮納貢寶貝委積上甚嘉之每宣諭諸道曾無寧歲敷揚詔旨人皆悅服天寶初拜朝議郎判宮闈令知本局事至五年加朝散大夫內謁者監皇唐六葉道泰時康朝野歡娛禮物備具公以才藝敏悟頻操員職垂青組之榮綰銀艾之寵受宣詔命侍衛軒墀顧盼增輝時望歸美尋加朝議大夫拜內給事中判本官事眷遇愈深品秩優異上方垂衣致理端冕穆清或侍獵長楊扈遊間館隨雕輦而稱警接瓊筵而獻壽排金戶己登玉堂請奏密命承傳天憲公之德形於外可得而言公之美暢於中不可得而知也懿夫近臣之職其來尚矣位著天象官分周制蓋以萬乘崇嚴九重深邃出納綸旨陪奉宸居宜有司存委任親重或導從輿輦或典司禁署凡百千數不可殫論若非理識端詳幹略稱最者則不得揮翰內省分曹局司以公之才雅有令聞嗚呼蘭孫方茂秋風敗之以乾元元年七月二十八日終於私第春秋六十有六皇情軫悼僚執零涕悲夫公歷事兩朝效官三紀其奉上也敬其與人也忠其蒞職也勤其立身也信雖伯子好善史遊納忠方之於公彼有慙色夫人宋氏德行溫厚姿容婉淑從夫之貴尋封廣平縣君以至德二年先公而逝乾元二年五月七日合祔於長安縣龍首原禮也嗣子中散大夫守內侍省上柱國賜紫金魚袋守宗次子內侍省內侍伯守堅次子內侍省宮教博士守幹皆克紹前修佩服嚴訓永慕蓼莪之痛長懷創巨之悲揚名顯親頌德裦美昊天罔極孝莫大焉敬述徽猷書於樂石銘曰英英韋公山嶽粹氣植性敏達存誠忠懿應物之材刜鐘之利踐言履信依仁守義五登秩序三掌職司便蕃省闥密勿軒墀進退容止周旋羽儀壯圖未展遷壑廠田坴悲鳳城之側龍首之陽墳生宿草魂閟連岡逝川兮茫茫隴樹兮蒼蒼勒銘兮貞石千古兮傳芳師道天寶十三載官潭州刺史司空山者桉梁任彥升述異記云司空姓張名岊字巴玉清河郡人也齊明帝時仕至司空及東昏侯嗣位政尚煩苛內不修禮制外不聽臣諫縱恣穢行害虐生民常令宮人作散叛髻百姓爭學之又作三橋裙向後總而結之司空乃興歎曰正直不任而耽女色齊國亡矣遂具奏闕下挂冠東門請休詔不許乃曰君不任臣臣今老矣人生所貴者在乎適意耳詔乃許傾朝餞送司空於是攜家去闕思樂林泉聞有勝境雖遠千里未嘗不一訪尋蓋欲希長生以避世也自此遍歷名山俱無可樂處忽一日有叟至而告曰瀟湘之南有壽山山有朱陵洞可以樂隱何不適此司空欣從其説遂領家入山操舟沿流上而造焉仰瞻巒嶂俯視流泉浮屠舍宇環謺左右乃歎曰奉教元皇身心清淨僻居一涯杜絶澆競安能與世營營乎據聞洞南有麒麟山者漢代蘇隱真人隱此得道真人白日駕麟車而沖天以是得名於是傾家南來登山四顧雲岫回合松蘿蓊鬱泉源清泠乃遇神人曰上帝使吾語汝止此修真功行已滿十五日午時當沐浴俟命司空俯伏神人舞為謝乃乘雲而去十四日詰旦司空呼家僮侍妾語之曰吾晨當受上帝命今仙壇在焉誰可止此為主者內有侍女盧瓊言願止此司空曰汝形貌貞烈可作仙壇主者遂取衣一襲以遺之令徙居山前仍以手撫其背曰好住好住司空來晨於是登壇自晨至午天花交下綵霧盤空忽有紫雲直下壇所見一金童身穿青衣頭綰髽髻捧玉册一道仙衣一通司空俯伏謝恩受衣册倏聞鈞天鏗爾鸞鶴翔鳴司空乃躡足登雲全家八十餘口白日沖天後至陳天嘉初有丹陽章馬二先生來此語人曰我二人乃司空弟子也同入此山精修道行至四年二月十四日功滿亦跨鶴執節升仙矣唐天寶十三年師道始刺潭州下車桉治未期月適時有旱暵之災民不聊生死者相枕遂整騎適於六邑城邑有廩米富民多其蓄積悉發而賑貧民自是民間始獲蘇息至攸有司空山者乃梁朝張司空輕舉之地遂命車而造焉時有道士鍾仙芝從山下見迎遂與同遊乃詢靈迹得其實令左右以筆記之以聞於田曹顧公喜聞勝事命豫為記豫不敢讓謹桉其事而記曰湖南攸邑為地最僻有司空山去縣四十五里當南嶽之東隅連雲陽之福地振瀟湘之勝境作郡邑之崇邱東西廣一百二十里南北一百八十里高二千六百丈下有溫水源故名溫泉山焉亦名紫麟山及司空隱此得道遂名司空山焉中有大觀一所昔唐天寶七年主上因搜郡國圖籍以司空全家輕舉之異五月十三日敕下建造祠宇標額為朱陽觀蓋取南嶽朱陽洞當此山之南故也乃度道士焚修禁止樵採每遇歲旱居人祈禱無不昭應自是十方歸從紛若雲臻殿砌之前有古壇三級方廣數丈故老相傳云司空朝斗之壇也傍有杉松開四季不謝之花松皆偃蓋每清秋景寂皓月當空居人過客靜夜之間山王山王猶聞步虛杵臼之聲自觀遠近司空遺迹尚可尋訪東南隅有秀峯十三聳翠卓立其峯有畫屏青牛大蓮花小蓮花紫蓋瑞雲洞門紫麟遠吟隱真回龍白鶴名稱不一又壇之西二里有真武岡相傳云真武常出現於此又名土地坰蓋盧瓊徙居止此為土地主者故今鄉俗以真武土地為一堂而祭之凡所祈禱無不感應司空宅在山之西去觀一十里今殿宇有像壇井基圖宛然在焉宅左有光石山書院故基尚存北一里有惠光寺前有洗藥池池水冬溫夏涼異香襲人掬飲可以愈病又十里有菩提寺寺前有池方廣二十丈其水亦如藥池歲旱不涸傳云司空昔常於此水沐浴今謂之仙池又去三十五里有隱真崖是司空煉藥時棲止之地故崖之左右平石之上有石臼僅二尺許臼底微紅猶有藥氣傍有石池方廣一丈水清如鑒中有荷生芳華甚異每花開五色相間傳云司空種荷之池也於戲自司空發迹於茲奇迹遺蹤異址不鮮若夫志學之士棲心之人尋訪於此山王山王亦有遇焉今道士鍾仙芝年過九十而顏貌益少領徒數十增修妙行持香火而皆清虛道服非天地儲異江山炳靈則曷由纂懿流光若斯之盛者哉師道幸承餘烈敢刻金石而志之時則十四年冬十月也軫鄭王亮四世孫官歙州別駕夫崇孝悌者必竭力以事親厚忠貞者亦盡心以奉上故聖人廣而教之以勸遐裔至若馬遷續太史之紀安國傳夫子之書潘氏家風謝公別傳內足以貽厥後昆外足以錫祉爾類小子不敏仰希前哲竊述類本用表流光君諱孟犨字公悅其先乃太上元元之系五代祖景皇帝始封於唐高祖諱亮至德初追册鄭王諡曰孝曾祖諱神通武德初以佐命元勳封淮安郡王開府儀同三司尚書左僕射諡曰靖烈祖諱孝義武德初封安永郡王貞觀中改封膠西郡公銀青光祿大夫司農卿上柱國冀貝等州刺史烈考諱璥易州司馬朝散大夫上柱國襲膠西郡公至德初追贈平陽太守皆斧藻至德琢磨令範仁經義緯敦教易俗理化勳庸備詳史牒君純懿靈粹得之自天先府君貶南州也以正直忤物為邪醜正辛已告終於官舍君未弱冠號天踴地漿勺不入禮過成人寮吏賵贈一無所受扶護艱險泣血萬里提攜幼稚盡室獲全以某月日遷塋配廟禮物無闕由是以純孝聞服闋調補梁州參軍轉右衛録事參軍相王府戶曹以清幹稱恩詔特加朝散大夫出宰郃陽猗氏三原德風洽聞香聲遠茂君之臨猗氏也萊田數十里上蔽荊榛下闢舄鹵逋逃夜聚豺狼曉嘷公曰穀不足者地有遺利食不足者人有遺功長其荊棘孰若樹其禾稼聚其豺狼孰若利其貧窶乃尋斧於拱木疏鑿於涑川化草莽為陂塘變磽確為墳壤人民胥悅工亦子來雖史起決漳鄭國開白亦何加也人荷其德邑茂其功建頌立碑迄今斯在後中司撫循廉桉嘉公丕績薦為鄧州司馬兼陸門堰稻田使君乃溪白水之口壅樊陽之陂築甬雲屯謺石山積樹楗立則截流施扃制蓄泄之門為水府之權分血脈之經緯為農夫之司命條流百道浸潤七邑疆畦綺錯稼穡龍鱗田疇之歌何獨子産宗司舉以郎署擢授禮部員外屬東封扈蹕轉虞部員外郎出牧泗州清明肅治行第一而地接吳楚氣候卑濕因之痁癘辭以疾歸開元十九年十一月十九日終於大梁旅館享年五十有五權厝大行山至德初纍贈宋鄭二州刺史季子翼自衡鄂轉運使兼漢南租庸從事爰適上國分途啓扈奔就吉辰以大歷元年十一月十四日遷窆於京兆萬年縣之畢原先夫人崔氏稱祔焉禮也今夫人清河人也父諱惟明纍遷海沂等州司馬兄鏡邈隱居大行纍辟不起弟國輔秀才擢第制舉登科歷補闕起居禮部員外郎夫人沖和備體柔順居中出起仰茂先之針閨門遵大家之誡自府君捐世庶務親臨存孤撫稚有妨禪寂是以通大乘頓悟門挹沆瀣餌花香而又現舉止之異者有二凡於宴坐口吐舍利香骨頂生如佛螺髻驚聞中外得未曾有翼等以額珠外見意寶內明釋氏前言今為見世遂感涕奉戴歸於故園起塔瞻奉莫之測也及天寶末隨子權赴陝州司馬屬狂賊犯闕中原鼎沸權負板輿自宏農藍田值潼關失守朝野震驚扶老攜幼潛避山谷重壑固陰深林酷冷因之違豫至於彌留以其年九月二十九日薨於終南山居享年七十有三有子六人長曰權故金州刺史次曰衡故洺州清漳尉次曰樞故檢校虞部員外兼侍御史次曰軫歙州別駕次曰房故渭南令季曰翼陝府長史兼侍御史丞陝府都防禦觀察陝虢等使惟軫與翼永號孤苦松楸斯拱銘碣未彰感奉遺範懼深失墜敬尊典故不慙以文其詞曰於赫大祖蟬聯我王夢蘭異感翦葉殊祥擇賢建德立社封疆肇分枝族貽厥其昌淮安忠黨英靈倜儻率衆關西濟師江上膠西酷似文武不墜運屬休明化流撫字烈考謫官遭罹艱時酷吏深文天下共悲君之岐嶷生知敏識磨礱節行韜晦仁德鍾罰蠻貊膺填氣塞天之輔護日茂嘉聲參卿發迹語掾馳名宰邑佐都事明理貞為郎起草後範規程出守泗濱明德惟馨繼疏躡陸修身知止福亮未極壑舟旋徙猗那夫人性合天真心遊志道迹棄喧塵嘉偶君子敬待如賓衣冠之族禮樂之門詞林翰苑金友玉昆垂芳後葉流慶無垠令聞不朽貞石斯存諲蒲州河東人天寶初進士纍歷虞部員外郎侍御史肅宗即位於靈武諲馳赴行在拜御史中丞從幸鳳翔遷武部侍郎乾元二年以本官同中書門下平章事遷黃門侍郎上元元年同中書門下三品纍加銀青光祿大夫封東平男坐昵中官馬上言貶太子賓客拜江陵府尹卒年五十一贈吏部尚書諡曰肅聖人法天兮無物不成皇天輔聖兮有貺必呈蓂莢之嘉瑞爰乃應乎休禎稟神靈以擢質因堯階而得名抽莖䔿䔿布葉英英二八而落三五而盈陰德自然仰蟾蜍而知晦太陽常近與葵藿而同傾爾乃丕體其祥博考其義所以厚上天之德所以表皇王之瑞其國亂也則植之猶難其國理也則生之孔易惟我后之欽若亦合符而受賜承榮金殿旁霑三露之滋每奉玉階上蔭五雲之施豈無萱草以悅其性豈無靈芝以彰其盛芝擢其秀既以紛綸於策書萱樹於堂曷能彌縫於明聖未若蓂莢生於皇朝與夫髦士來應弓招受成於天諒多聞於國瑞託其得地且有異於山苗竊預談於皇道庶有望於遷喬霍山神者黃帝之中子也生於天靈之紀著雍赤奮若之歲封冀總領海內名山錫璜黃裳以象其德青帝赤帝之子元司白司之神咸稟承焉堯時洪水為災遣黃熊入洪波導禹故禹承舜命乘四載先登太嶽霍山禱之於是隨山刊木奠高山大川地平天成萬世永賴妃厥藐姑輔厥五老帶以黃河礪以太行中條五臺衙官僕從也當殷之衰蜚廉助紂為虐神賜之死亦給石棺周季晉獻公六年伐霍霍公求奔神令復之而賜晉穰及晉衰趙子秉國政神使從者致帝命又使使遺襄子竹書曰趙母恤余霍山山陽侯天使也三月丙戌余將使女反滅知氏將賜女林胡之地後世且有伉王亦黑龍面而鳥噣鬢麋髭髯大膺大胸修下而馮左衽介乘奄有河宗至於休溷諸貉南伐晉別北滅黑姑襄子受之至雍稱武靈王焉嗣是而秦而漢歷魏六朝變化靈應以對上帝以答天下隋氏之末民罹塗炭聖唐啓運高祖執義旗救寰宇神靈幽贊引翼王師爰定大業於關中嗚呼太嶽之山神符帝謂望氣者徒知鬱鬱蔥蔥含芳吐秀羅植萬物以美珠玉夫亦知神之所以為神乎豫故為傳以神之而初非故神其説也揆字端卿隴西成紀人開元末進士補陳留尉獻書闕下試中書擢拜右拾遺遷考功郎中知制誥扈從劒南拜中書舍人乾元初兼禮部侍郎遷拜中書侍郎平章事貶萊州長史入為禮部尚書德宗幸山南用為入蕃會盟使拜尚書左僕射興元元年還至鳳州卒年七十四贈司空諡曰恭臣某言中使某至奉宣聖旨知臣無宅以光宅坊去內最近賜臣宅一區寵渥特臨喜懼交集臣某中謝臣自惟固陋謬忝恩私陛下收其瑣材擢以密職司言北闕已揮翰於紫垣秩禮南宮復彯纓於丹地故得回翔三省出入九重此皆稟自宸衷不因人譽毛髮之內曾未報於生成雨露之恩猥有加於疵賤頃以寓居失火事忽聞天闕三字慈親垂恤問環堵之業雖有愧於魯經賜宅之仁遂承榮於漢詔況王人啓戶大廈當衢顧螻蟻而知慙迎燕雀而相賀古制宮闕近地公卿不居惟信臣密戚時聞詔賜所謂北闕甲第者蓋由遠近差之今宅在廟圖地近丹禁朝天不遠於咫尺捧日如奮於雲霄仰惟明主之恩實私微臣之幸銜恩撫已尤懷戰局誓當竭心盡節鏤骨刻肌豈捉足而獲安誓捐軀以為報昔西漢以南北軍相統攝故周勃因南軍入北軍遂安劉氏皇朝置南北衙文武區分以相伺察今以羽林代金吾警夜忽有非常之變將何以制之維上元元年太歲庚子六月已未朔二十六日甲申皇帝第十二子持節鳳翔等四鎮節度觀察大使興王紹薨於中京之中邸殯於寢之西階粵八月丁亥册贈皇太子廟號恭懿冬十有一月庚寅詔葬於長安之高陽原禮也燕隊開封龍輴進轍陳祖載而就位儼塗芻而成列皇帝哀玉林之閟景憫璿萼而罹霜瞻蜃綍而增思懷鴈池而永傷考諡惟古裦崇有式爰詔史臣恭宣懿德其詞曰維天祚唐纍葉重光中興景運再紐乾綱本枝建國磐石疏疆克開聖允實曰賢王驪源孕彩日幹騰芳深仁廣孝蘊藝含章秀發孩笑惠彰髫齒蹈禮知方尊賢叶旨對日流辨占風繼美魯衛後塵間乎絶軌胡孽初構王師未班爰從襁褓載歷險艱愛備中掖名崇懿藩居常凜訓動不違顏禮及佩觿朝加分器胙土延壤登壇受帥璇軾金箱文經武緯樂善為寶崇儒是貴濬哲外朗溫文內深閲書成誦觀樂表音五經在口六律諧心才優藝洽絶古超今蛇豕猶梗寰區未泰滌慮祈真焚香演偈食去葷血心從定慧庶福邦家俾清凶穢霜露嬰疾聰明害神沈疴始遘彌曠盈旬正慮無擾發言有倫在膏方亟問膳逾勤雲物告徵星辰變象楚藥無救秦醫莫仗靈儀杳而上賓徽音邈其長往違舊邸於青社即幽陵於黃壤嗚呼哀哉魂氣奪兮去何之精靈在兮孝有思痛君親之永隔託夢寐而來辭延桂宮而震悼貫椒壼而廠田坴悲旌遺芳於碣館賁新令於儲闈嗚呼哀哉先遠戒候占龜獻吉指鶉野而西臨背鳳城而右出天慘慘而苦霧山蒼蒼而翳日揚薤挽之哀悽盼松埏之蕭瑟罷烏服以禮竣掩黃腸而思密望馳道而長辭赴幽途而永畢嗚呼哀哉生為寵王兮宸愛所鍾歿追上嗣兮朝典斯崇升玉笙於洞府閟銀棨於泉宮金石誰固兮人生有終簡册攸記兮德音無窮敢直詞以篆美庶永代而承風嗚呼哀哉諝字士明禮部尚書寬子擢明經纍擢京兆倉曹參軍襄鄧營田判官史思明叛偽授御史中丞陰疏賊虛實於朝賊平除太子中允遷考功郎中代宗朝歷太子右庶子進兵部侍郎河南尹東都副留守卒年七十五贈禮部尚書夫諫鼓謗木之設所以達幽枉延直言今輕猾之徒援桴鳴鼓始動天聽竟因纎悉若然者安用吏理乎構雲宜春人天寶中為刺史李璟所薦元宗欲官之固辭歸里上元元年卒臣聞大德曰生非慈無以宏其用含容曰道非聖無以闡其功伏惟開元天地大寶聖文神武證道孝德皇帝陛下以慈子育以道君臨蠻夷宅心禎祥應化巍巍蕩蕩豈容臣言而夢寐賢才搜訪巖谷臣濫聞天聽近赴闕庭處臣以羽客真居飽臣以仙廚玉食勸臣以入仕慰臣以遠來臣固辭無能乞歸養疾賜臣以束帛榮臣以副衣而更憫其疲羸送以專使非大慈何以安茲懦耎非至道何以被斯稊稗光寵之極於臣實超以今月二日到郡延望城闕犬馬之戀長深感戴衣縑閭里之歡交集徒知手舞足蹈無怠晨昏實慙滴露微塵尤增戀結謹因中使房嘉進送臣回附表陳謝以聞震河東人天寶間進士猗夫乘間氣孕淳精扇風雲蕩河嶽體五行之秀應三才之靈者繄我劉公而是焉公諱感彭城人也曾祖諱眘隱德不仕耽逸邱園祖諱晃父因子貴克大吾門皇朝贈南磎郡司馬公清德難尚至理可師屬我皇撥亂之開元也公提劒以從杖戈而先附鳳高翔攀龍潛躍遂使㣥凶泥首萬方革面解褐授翊衛副尉行興州大桃戍主遷右衛寧州彭池府左果毅靈鑒洞照應變知微命偶聖君職參都尉又改昭武校尉行左衛陝州曹陽府折衝轉左領軍衛同州襄城府折衝參謀帷幄之中制勝樽俎之右無何拜寧遠將軍左武衛翊府右郎將賜紫金魚袋旋授定遠將軍行右龍武軍翊府右郎將又遷明威將軍右龍武翊府中郎將公位階鴻漸宦達虎賁騰淩建信之名標準公幹之氣轉雲麾將軍左龍武將軍上柱國進封彭城郡開國伯食邑七百戶皇帝乃命圖形麟閣賜印雲臺公侯伯子之榮封河山茅土貝胄朱綅之貴列長戟高門忽興逝水之悲終銜過隙之歎以天寶十二載二月草一日薨於永興里之私第春秋七十一以其年十月卅日葬於咸寧縣黃臺鄉之原禮也嗚呼地埋勇骨天落將星蕭瑟松門悽涼薤挽嗣子秀等哀哀血淚欒欒棘心願頌惟家之風以篆他山之石銘曰三秦岡九泉窟鶴報地兮潛恍惚森拱木閴荒墳人瘞玉兮碎氛氳
