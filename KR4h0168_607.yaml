front:
  text: 全唐文欽定全唐文卷六百七劉禹錫九
  hash: sha256:d3417aea12b39247ee01e66e8deb20f517fb8ec3fce34a408d273ad8e52be703
body:
  text: 世之言天者二道焉拘於昭昭者則曰天與人實影響禍必以罪降福必以善來窮厄而呼必可聞隱痛而祈必可答如有物的然以宰者故陰步馬之說勝焉泥於冥冥者則曰天與人實刺異霆震於畜木未嘗在罪春滋乎堇荼未嘗擇善跖蹻焉而遂孔顏焉而厄是茫乎無有宰者故自然之說勝焉余之友河東解人柳子厚作天說以折韓退之之言文信美矣蓋有激而云非所以盡天人之際故余作天論以極其辨云大凡入形器者皆有能有不能天有形之大者也人動物之尤者也天之能人固不能也人之能天亦有所不能也故余曰天與人交相勝耳其說曰天之道在生植其用在強弱人之道在法制其用在是非陽而阜生陰而肅殺水火傷物木堅金利壯而武健老而耗眊氣雄相君力雄相長天之能也陽而藝樹陰而揫斂防害用濡禁焚用光斬材窾堅液礦硎鋩義制強訐禮分長幼右賢尚功建極間邪人之能也人能勝乎天者法也法大行則是為公是非為公非天下之人蹈道必賞違之必罰當其賞雖三族之貴萬鍾之祿處之咸曰宜何也為善而然也當其罰雖族屬之夷刀鋸之慘處之咸曰宜何也為惡而然也故其人曰天何預乃人事耶惟告虔報本肆類授時之禮曰天而已矣福兮可以善取禍兮可以惡招奚預乎天耶法小弛則是非駮賞不必盡善罰不必盡惡或賢而尊顯時以不肖參焉或過而僇辱時以不辜參焉故其人曰彼宜然而信然理也彼不當然而固然豈理耶天也福或可以詐取而禍亦可以苟免人道駮故天命之說亦駮焉法大弛則是非易位賞恆在佞而罰恆在直義不足以制其強刑不足以勝其非人之能勝天之具盡喪矣夫實已喪而名徒存彼昧者方挈挈然提無實之名欲抗乎言天者斯數窮矣故曰天之所能者生萬物也人之所能者治萬物也法大行則其人曰天何預人耶我蹈道而已法大弛則其人曰道竟何為耶任人而已法小弛則天人之論駮焉今人以一己之窮通而欲質天之有無惑矣余曰天恆執其所能以臨乎下非有預乎治亂云爾人恆執其所能以仰乎天非有預乎寒暑云爾生乎治者人道明咸知其所自故德與怨不歸乎天生乎亂者人道昧不可知故由人者舉歸乎天非天預乎人爾或曰子之言天與人交相勝其理微庸使戶曉盍取諸譬焉劉子曰若知旅乎夫旅者㣥適乎莽蒼求休乎茂木飲乎水泉必強有力者先焉否則雖聖且賢莫能競也斯非天勝乎㣥次乎邑郛求蔭於華榱飽於餼牽必聖且賢者先焉否則強有力莫能競也斯非人勝乎苟道乎虞芮雖莽蒼猶郛邑然苟由乎匡宋雖郛邑猶莽蒼然是一日之途天與人交相勝矣吾固曰是非存焉雖在野人理勝也是非亡焉雖在邦天理勝也然則天非務勝乎人者也何哉人不宰則歸乎天也人誠務勝乎天者也何哉天無私故人可務乎勝也吾於一日之途而明乎天人取諸近也已或者曰若是言之則天之不相乎人已信矣古之人曷引天為答曰若知操舟乎夫舟行乎濰淄伊洛者疾徐存乎人次舍存乎人風之怒號不能鼓為濤也流之泝洄不能峭為魁也適有迅而安亦人也適有覆而膠亦人也舟中之人未嘗有言天者何哉理明故也彼行乎江河淮海者疾徐不可得而知也次舍不可得而必也鳴條之風可以沃日車蓋之雲可以見怪恬然濟亦天也黯然沈亦天也阽危而僅存亦天也舟中之人未嘗有言人者何哉理昧故也問者曰吾見其駢焉而濟者風水等耳而有沈有不沈非天曷司歟答曰水與舟二物也夫物之合並必有數存乎其間焉數存然後勢行乎其間焉一以沈一以濟適當其數乘其勢耳彼勢之附乎物而生猶影響也本乎徐者其勢緩故人得以曉也本乎疾者其勢遽故難得以曉也彼江海之覆猶伊淄之覆也勢有疾徐故有不曉耳問者曰子之言數存而勢生非天也天果狹於勢耶答曰天形恆圓而色恆青周回可以度得晝夜可以表候非數之存乎恆高而不卑恆動而不已非勢之乘乎今夫蒼蒼然者一受其形於高大而不能自還於卑小一乘其氣於動用而不能自休於俄頃又惡能逃乎數而越乎勢耶吾故曰萬物之所以為無窮者交相勝而已矣還相用而已矣天與人萬物之尤者耳問者曰天果以有形而不能逃乎數彼無形者子安所寓其數耶答曰若所謂無形者非空乎空者形之希微者也為體也不妨乎物而為用也恆資乎有必依於物而後形焉今為室廬而高厚之形藏乎內也為器用而規矩之形起乎內也音之作也有大小而響不能踰表之立也有曲直而影不能踰非空之數歟夫目之視非能有光也必因日月火炎而後光存焉所謂晦而幽者目有所不燭耳彼狸狌犬鼠之目庸謂晦而幽耶吾故曰以目而視得形之粗者也以智而視得形之微者也焉有天地之內有無形者耶古所謂無形蓋無常形耳必因物而後見耳烏能逃乎數耶或曰古之言天之歷象有宣夜渾天周髀之書言天之高遠卓詭有鄒子今子之言有自乎答曰吾非斯人之徒也大凡入乎數者由小而推大必合由人而推天亦合以理揆之萬物一貫也今夫人之有頭目耳鼻齒毛頤口百骸之粹美者也然而其本在乎腎腸心腹天之有三光懸㝢萬象之神明者也然而其本在乎山川五行濁為清母重為輕始兩位既儀還相為庸噓為雨露噫為風雷乘氣而生㣥分彙從植類曰生動類曰蟲倮蟲之長為知最大能執人理與天交勝用天之利立人之紀紀綱或壞復歸其始堯舜之書首曰稽古不曰稽天幽厲之詩首曰上帝不言人事在舜之庭元凱舉焉曰舜用之不曰天授在商中宗襲亂而興心知說賢乃曰帝賚堯民之餘難以神誣商俗已訛引天而驅由是而言天預人乎客有能通本朝之雅故者曰時之汙隆視輔臣之用否房與杜迹何觀焉建官取士之制地徵口賦之令禮樂刑罰之章因隋而已矣二公奚施為余愀然曰三王之道猶夫循環非必變焉審所當救而已隋之過豈制置名數之間耶顧名與事乖耳因之何害焉夫上材之道非務所舉必的然可使戶曉為迹也吾觀梁公之迹章章如縣㝢矣曷然哉請借一以明之史不云乎初太宗怒渾戎之橫於塞也度諸將不足以必取當寧而嘆曰得李靖為師快哉靖時告老且病矣梁公虛其心以起之靖忘老與病一舉虜其君郡縣其地而還夫非伐國之難能起靖之難能也靖非不克之為慮居功之為慮也古之為將度柄輕不足以遂事重則嫌生焉是以有辭第以見志有多産以取信有子質以滅二有嬖監以虞謗其多患也如是若靖者名既成位既崇重失畏逼其患又甚焉微梁公之能盡才能捍患能去忌能照私彼姑藉舊勞居素貴足矣惡乎起哉夫豈感空言而起耶心相見久矣夫豈飾小信而要耶道相籠久矣其後敬元擅能失材臣而敗隨之林甫自便進蕃將而亂隨之由是而言固相萬矣子方規規然窺上材以戶曉之迹此吾之所不取也若杜萊公者在相位日淺將史失其傳然以梁公之鑒裁自天策府遂以王佐材許之則是又能以道籠房公者矣房之許與迹孰甚焉客無以應而作子劉子曰觀書者當觀其志慕賢者當慕其心循迹而求雖博寡要信矣古之人動必有以將意故執贄之道自天子達焉夫芬芳在上臭達於下而溫粹無擇有似乎聖人者鬯也故用於天子清越而瑕不自掩潔白而物莫能汙內堅剛而外溫潤有似乎君子者玉也故用乎諸侯執之不鳴刑之不嘷似死義者乳必能跪似知禮者羔也故卿執焉在人之上而有先後行列者雁也故大夫執焉耿介而一志者雉也故士執焉視其所執而知其任是故食愈重而志愈卑位彌尊而道彌廣耿介之志惟士得以行之何也務細而所試者寡齒卑而所蔽者衆言未足以動聽故必激發以取異行未足以應遠故必砥礪以沽聞借令由士為大夫捨雉而執雁其志也隨之故耿介之名不施於大夫矣况其上乎然則為士也不思雉之介為卿也能思羔之禮歟今夫或者不明分推理而觀之則曰此居下而嗜直者是必得志而稔其訐矣彼當介而務宏者是必處高而肥其德矣曾不知訐當其分則地易而自遷宏非其所則志遂而無制矣於戲責士以卿大夫之善猶喻君以士之行耳余以執贄之道得其分苟推分明矣求刑罰之僭濫得乎史稱華他以恃能厭事為曹公所怒荀文若請曰他術實工人命繫焉宜議能以宥曹公曰憂天下無此鼠輩耶遂考竟他至蒼舒病且死見醫不能生始有悔之之歎嗟乎以操之明略見幾然猶輕殺材能如是文若之智力地望以的然之理攻之然猶不能反其恚執柄者之恚真可畏諸亦可慎諸原夫史氏之書於冊也是使後之人寬能者之刑納賢者之喻而懲暴者之輕殺故自恃能至有悔悉書焉後之惑者復用是為口實悲哉夫賢能不能無過苟置於理矣或必有寬之之請彼壬人皆曰憂天下無材耶曾不知悔之日方痛材之不可多也或必有惜之之歎彼壬人皆曰譬彼死矣將若何曾不知悔之日方痛生之不可再也可不謂大哀乎夫以他之不宜殺昭昭然不足言也獨病夫史書之義是將推此而廣耳吾觀自曹魏以來執死生之柄者用一恚而殺材能衆矣又焉用書他之事為嗚呼前事之不忘期有勸且懲也而暴者復藉口以快意孫權則曰曹孟德殺孔文舉矣孤於虞翻何如而孔融亦以應泰山殺孝廉自譬仲謀近霸者文舉有高名然猶以可懲為故事矧他人哉乾之爻皆九而坤六何也世之儒曰吾聞諸孔穎達云陽尊復兼乎陰陰不能兼乎陽也他日余與董生言及易生曰吾聞諸畢中和云舉老而稱也請徵諸揲蓍夫端策者一變而遇少與歸奇而為五再變而遇少與歸奇而為四三變如之是老陽之數分措於指閒者十有三策焉其餘三十有六四四而運得九是已故易繫注云乾一爻三十六策也一變而遇多與歸奇而為九再變而遇多與歸奇而為八三變如之是老陰之數分措於指間者二十有五策焉其餘二十有四四四而運得六是已故易繫注云坤一爻二十四策也借如一變而遇少再變三變而遇多是少陽之數分措於指間者二十有一策其餘二十有八四四而運得七一變而遇多再變三變而遇少是少陰之數分措於指間者十有七策其餘三十有二四四而運得八故九與六為老老為變爻七與八為少少為定位故曰舉老而稱亦曰尚變而稱且夫筮為乾者常遇七斯乾矣常遇九斯得坤矣筮為坤者常遇八斯坤矣常遇六斯得乾矣在左氏國語有之晉公子親筮之曰尚有晉國得貞屯悔豫皆八八非變爻故不曰有所之桉坎二世而為屯屯之六二為世爻震一世而為豫豫之初六為世爻屯之二豫之初皆少陰不變斯非八乎卦由老數而舉曰六筮由蓍數故斥曰八在左氏春秋傳有之曰穆姜薨於東宮始往而筮之遇艮之八史曰是謂艮之隨夫艮艮下艮上之隨震下兌上唯二不動斯遇八也餘五位皆九六故反焉筮法以少為卦主變者五而定者一故以八為占艮之六二曰艮其腓不拯其隨其心不快史以為東宮實幽也遇此為不利故從變爻而占苟以說於姜也何則卦以少為主若定者五而變者一即宜曰之某卦觀之否師之臨類是也變與定均即決以內外今變者五定者一宜從少占懼不吉而更之故曰是謂艮之隨是謂之云者苟以說也故穆姜終死於東宮與艮會耳而杜元凱於此注以為雜用三易故有遇八之云非臻極之理也劉子曰余與董生言九六之義信與理會為不誣矣余又於左氏二書參焉若合形影然而世人往往攘臂於其間曰生之名孰與穎達著邪而材孰與元凱賢邪歷載曠日未嘗有聞人明是說者雖余憤然用口舌爭持貌從者什一二焉嗟乎由數立文所如皆合昭昭乎若觀三辰其不晦也如此然猶貴聽而賤視齗齗五姧反然莫可更也矧無形之理不可見之道邪余獨悲而志之以俟夫後學初董生言本畢中和中和本其師師之學本一行云第一指餘一益三餘二益二餘三益一餘四益四第二指餘一益二餘二益一餘三益四餘四益三第三指與第二指同右掛從下起指亦自下始第一指法地故益成偶第二法天故益成奇第三人極法天故同第一指遇一益三并掛一為五遇三遇二並謂之少與一同第二指遇一益二并掛一為四第三指遇一益二并掛一為四右三指俱遇少通計十三策其餘三十六策四四運之得九為老陽故易繫云乾之策二百一十有六注云陽爻九一爻三十六策六爻二百一十有六第一指遇四益四與掛一為九第二指遇四益三與掛一為八遇三亦同第三指遇四益三與掛一為八遇三亦同右三指俱遇多通計二十五策其餘二十四策四四運之得六為老陰故易繫辭云坤之策百四十有四謂陰爻六一爻二十四策六爻一百四十有四第一指遇一益三并掛一為五第二指遇四益三并掛一為八第三指遇四益三并掛一為八右初指少第二第三指多以少為主通計二十一策其餘二十八策四四運之得七為少陽第一指遇四益四并掛一為九第二指遇一益二并掛一為四第三指遇一益二并掛一為四右初指多第二第三少以多為主通計一十七策其餘三十二策四四運之得八為少陰第一指遇少謂一二也并止於五第二指遇多謂三四也并止於八第三指又遇少謂一二也并止於四右初指少第二指多第三指又少以多為主通計一十七策其餘三十二策四四運之得八為少陰第一指遇多謂四也止於九第二指又遇多謂三四也止於八第三指遇少謂一二也止於四右初指第二指并多第三指獨少以少為主通計二十一策其餘二十八策四四運之得七為少陽第一指遇少止於五第二指又遇少止於四第三指遇多止於八右初指二指并少三指獨多以多為主通計一十七策其餘三十二策四四運之得八為少陰穆姜薨於東宮始往而筮之遇艮之八史曰是謂艮之隨夫艮艮下艮上之隨震下兌上唯六二爻不動餘五盡變變者遇九六也二不動者遇八也晉公子親筮之曰尚有晉國得貞屯悔豫皆八夫屯震下坎上六位盡不遇六九故不動既無所之即以世爻為占桉屯是坎宮二世卦故以一為占則遇八夫豫坤下震上是震宮一世卦以初六為占亦遇八韋昭於此注云內曰貞外曰悔震下坎上為屯坤下震上為豫言得此兩卦震在屯為貞在豫為悔八為震兩陰爻在貞在悔皆不動所以筮史占之謂閉而不通者爻無為也乾之策二百一十有六謂陽爻九一爻三十六策六爻當二百一十六言三十六者舉老陽也坤之策一百四十有四謂陰爻六一爻二十四策六爻當百四十有四言二十四者舉老陰也凡三百有六十當朞之日二篇之策萬有一千五百二十當萬物之數六十四卦都三百六十四爻陰陽相半各一百九十二爻陽爻一爻三十六策合為六千九百一十二陰爻一爻二十四策合為四千六百八一行大衍論云三變皆剛太陽之象也三變皆柔太陰之象也一剛二柔少陽之象也一柔二剛少陰之象也少陽之剛有始有牡有究少陰之柔有始有有牡有究因綜四象之變而成八象焉八象之位而八卦之本列矣注云太陽始動施於太陰而生震象之七謂少陽之七為震初九再動於牡而生坎象之七謂再索而得男也三動於究而生艮象之七謂三索而得男也太陰始動施於太陽而生巽象之八謂少陰之八為巽初六再動於牡而生離象之八謂再索而得女也三動於究而生兌象之八謂三索而得女也是以九六七八分為八象國語又云董因迎公於河公問焉曰吾其濟乎對曰臣筮之得泰之八曰是謂天地配亨小往大來今及之矣何不濟之有韋昭云泰三至五震象為侯陰爻不動其數皆八與貞屯悔豫義同劉子曰昭此說用互體有震桉董因之言天地配亨是六五帝乙歸妹以祉元吉之爻夫泰乾坤體全內外位正內為身外為事卜得國事也以外卦為占六五居尊位故統論卦下辭曰小往大來爻遇歸妹故曰天地配亨何必取互體也或問乙曰書足以記姓名而已工與拙何損益於數哉答曰此誠有之蓋舉下之說耳非蹈中之說亦猶言居室曰避燥濕而已言衣裳曰適寒燠而已言飲食曰充腹而已言車馬曰代勞而已言祿位曰代耕而已今夫考居室必以閌門豐屋為美笥衣裳必以文章鮮澤為甲評飲食必以精良海陸為貴第車馬必以華輈絶足為高遷祿位必以重侯纍封為意是數者皆不行舉下之說奚獨於書也行之耶禮曰士依於德游於藝德者何曰敏曰至曰孝之謂藝者何禮樂射御書數之謂是則藝居三德之後而士必游之也書居數之上而六藝之一也語曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已是則博奕不得列於藝差愈於飽食無所用心耳吾觀今之人適有面詆之曰子書居下品矣其人必逌爾而笑或謷然不屑有詆之曰子握槊奕碁居下品矣其人必然而愧或艴然而色是故敢以六藝斥人不敢以六博斥人嗟乎衆尚之移人也問者曰然則彼魏晉宋齊間亦嘗尚斯藝矣至有君臣爭名父子不讓何哉答曰吾始欲求中道耳子寧以尚之之弊規我歟且夫信者美德也秦繆尚之而賢臣莫贖黃老者至道也竇后尚之而儒臣見刑道德且不可尚矧由道德以下者哉所謂中道而言書者何處之文學之下六博之上材鈞而善者得以加譽遇鈞而善者得以議能所加在乎譽非實也不黷於賞所議在乎過非罪也不紊於刑夫如是庶乎六書之學不堙墜而已乎子劉子曰五達之井百汲而盈科未必涼而甘所處之勢然也人之詞待扣而揚猶井之利汲耳始余為童兒居江湖間喜與屬詞者游謬以為可教視長者所行止必操觚從之及冠舉秀才一幸而中說有司懼不厭於衆亟以口譽之長安中多循空言以為誠果有名字益與曹輩畋漁於書林宵語途話琴酒調謔一出於文章俄被召為記室參軍會出師淮上恆磨墨於楯鼻或寢止㣥書中居一二歲由甸服升諸朝凡三進班而所掌猶外府或官課或為人所倩昌言奏記移讓告諭奠神志葬咸猥並焉及謫於沅湘間為江山風物之所蕩往往指事成歌詩或讀書有所感輒立評議窮愁著書古儒者之大同非高冠長劍之比耳前年蒙恩澤授以郡符居海壖多雨慝作適晴喜躬曬書於庭得已書四十通逌爾自哂曰道不加益焉用是空文為真可供醬蒙藥楮耳它日子壻博陵崔生關言曰某也嚮游京師偉人多問丈人新書幾何且欲取去而某應曰無有輒愧起於顏間今當復西期有以弭愧者繇是刪取四之一為集略以貽此郎非敢行乎遠也魏司空王昶名子制誼咸得立身之要前史是之然則書紳銘器孰若發言必稱之乎今余名爾長子曰咸允字信臣次曰同廙字敬臣欲爾於人無賢愚於事無小大咸推以信同施以敬俾物從而衆說其庶幾乎夫忠孝之於人如食與衣不可斯須離也豈俟余勖哉仁義道德非訓所及可勉而企者故存乎名夫朋友字之非吾職也顧名旨所在遂從而釋之夫孝始於親終於事君偕曰臣知終也貞元季年夏大水熊武五溪鬬決於沅突舊防毀民家躋高望之溟涬葩華山腹為坁林端如莎湍道駛悍不風而怒崱嶷前邁浸淫旁掩柔者靡之固者脫之規者旋環之矩者顛倒之輕而泛浮者硠礚之重而高大者前却之生者力音殪者弛形蔽流而東若木柿然有僧愀焉誓於路曰浮屠之慈悲救生最大能援彼於溺我當為魁里中兒願從三四輩皆狎川勇游者相與乘堅舟挾善器維以修乍杙於崇邱水當洄洑人易置力凝目盧執用俟可而拯大凡室處之類穴居之彙在牧之㣥在豢之馴上羅黔首下逮毛物拔乎洪瀾致諸生地者數十百焉適有摯獸如鴟夷而前攫持流枿首用不陷隅目旁睨其姿弭然甚如六擾之附人者其徒將取焉僧趣訶之曰第無濟是為目之可里所而不能有所持矣舟中之人曰吾聞浮圖之教貴空空生普普生慈不求報施之謂空不擇善惡之謂普不逆窮困之謂慈嚮也生必救而今也窮見廢無乃計善惡而忘普與慈乎僧曰甚矣問之迷且妄也吾之教惡乎無善惡哉六塵者在身之不善也佛以賊視之末伽聲聞者在彼之未寤也佛以邪目之佛惡乎無善惡耶吾嚮也所援而出死地者衆矣形乾氣還各復本狀蹄者躑躅然羽者翹蕭然而言者諓諓然隨其所之吾不尸其施也不德吾則已烏能害為彼形之乾髬髟而之姿也彼氣之還暴悖之用也心足反噬而齒甘最靈必肉吾屬矣庸能躑躅諓諓之比歟夫虎之不可使知恩猶人之不可使為虎也非吾自遺患焉爾且將遺患於衆多吾罪大矣子劉子曰余聞善人在患不救不祥惡人在位不去亦不祥僧之言遠矣故志之河東薛公景晦以文無害為尚書刑部郎中以訕為道州刺史居郡大理至於無事清機羡溢盡付山水一旦以書來誇曰吾得異境於近郊自城西門並南山俯江水有石穹然如夏屋其左右前後又如回廊曲房藻繡雕彤之象雲生日入怪狀迭發水石卉木杳非人寰意其當為食霞御氣者之所遊息委蛻而去不知其幾千百年逮今得諸黃冠野夫及請而往因名其地曰含輝洞蓋詩家流所謂山水含清輝者是已吾子常以詞雄於世盍為我志焉愚得書退而深惟若薛公者少居江湖間遊名山東探禹穴歷四明句曲金華陽羡南過九江薄匡廬以涉彭蠡天下山水之籍存乎胸中第其高下銖兩不失及是而口呿不能名顧謂奇信矣若江華者九疑三湘之佳麗地也前此二千石御史中執法河南元次山諫議大夫北平陽亢宗司刑大夫東平呂和叔皆碩人也考槃招隱之致恆汲汲然卒使茲境貴於異日豈地愛其寶有時而發耶顧謂異信矣夫物之有作俟言而遠故述焉以書於洞陰曰營陽鬱鬱山水第一洞有含輝遊人忘歸忘歸孔樂請言其朔先是斯境翳於榛薄天姿孤絶凡目所忽閟其清光有待而發公之來思探異玩奇茇野憩林而民悅之既悅其至益知所嗜捫陘歷峴來適公志偶得奇絶聿來告公駕言從之谷岸溟濛有石如門又如垣墉樛蔓交木似綸似組乃芟乃治乃可布武伸脰掉臂空洞無阻左右回環儼若廊廡飛泉出竇練縋花吐觸石吹沙珮搖絃撫側徑寅緣豁然見天有石如堂度之五筵東西二門與日明昏奧者如室宣者如軒因其高下爰構亭榭匠生於心隨指如化開山翦木役以私屬結構塈茨子來嬉嬉無事而就邦人不知淑清之辰休浣之時雅步幅巾琴壺以隨前無俗人與白雲期耳目盡適形神不羈元氣皓然觀吾朵頤遵渚之鴻有時而飛石門之下可以棲遲此谷而盈彼邱而夷維公之羭跡永在斯元和十五年再牧於連州作吏隱亭海陽湖壖入自外間不知藏山歷級東望恍非人寰前有四榭隔水相鮮凝靄蒼蒼淙流布懸架險通蹊有梁如霓輕泳徐轉有舟如翰澄霞漾月若在天漢視彼廣輪千畝之半翠麗於是與世殊貫澄明峭絶藿靡葱蒨炎景有宜昏旦迭變疑昔神鼇負山而忭摧其別島置此高岸海陽之名自元先生先生元結有銘其碣元維假符余維左遷其間相距十五餘年對境懷人其猶比肩天下山水非無美好地偏人遠空樂魚鳥謝公開山涉月忘還豈曰無娛伊險且艱溪山尤物城池為伍却倚佛寺左聯仙府勢拱臺殿光含廂廡窈如壺中別見天宇石堅不老水流不腐不知何人為今為古堅焉終泐流焉終竭不知何時再融再結余為連州四年江華守河東薛景晦以所著古今集驗方十通為贈其志在於拯物余故申之以書異日景晦復寄聲相謝且咨所以補前方之闕醫拯道貴廣庸可以學淺為辭遂於篋中得已試者五十餘方用塞長者之問皆有所自故以傳信為目云元和十三年六月八日中山劉禹錫述余為書殿學士四年所與居皆鴻生彥士一旦詔下懷吳郡章而東門下生咸惜是行且曰吳中富士必有知書宜為太守所禮者及下車閲客籍森然三千有巨鹿魏生將所著書來謁曰不佞始讀書為文章凡二十年在貢士中孤鳴甚哀卒無善聽者退而收視易慮伏北窗下考前言成兵要十編度諸侯未遑是事將笈而西求一言以生羽翼余取其書觀之始自黃帝伏蚩尤終於隋氏平江南語春秋戰國事最備磅礡下上數千年間其攟托評議無遺策用是以干握兵符貴人宜有虛已而樂聞者子盍行乎吾知元侯上舍不獨善雞鳴彈長鋏三五九九之伎顓之而已
