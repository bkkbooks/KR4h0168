front:
  text: 全唐文欽定全唐文卷三百六十杜甫二
  hash: sha256:6781e2e52dcc9c19124ac9a17d3ec832afc9204eb9589c3504780cb49171368e
body:
  text: 右臣甫智識淺昧向所論事涉近激訐違忤聖旨既下有司具已舉劾甘從自棄就戮為幸今日已時中書侍郎平章事張鎬奉宣口敕宜放推問知臣愚戅赦臣萬死曲成恩造再賜骸骨臣甫誠頑誠蔽死罪死罪臣以陷身賊庭憤惋成疾實從間道獲謁龍顏猾逆未除愁痛難過猥厠衮職願少裨補竊見房琯以宰相子少自樹立晚為醇儒有大臣體時論許琯必位至公輔康濟元元陛下果委以樞密衆望甚允觀琯之深念主憂義形於色况畫一保泰素所蓄積者已而琯性失於簡酷嗜鼓琴董庭蘭今之琴工遊琯門下有日貧病之老依倚為非琯之愛惜人情一至於玷汙臣不自度量歎其功名未垂而志氣挫衄覬望陛下棄細録大所以冒死稱述何思慮始竟闕於再三陛下貸以仁慈憐其懇到不書狂狷之罪復解網羅之急是古之深容直臣勸勉來者之意天下幸甚天下幸甚豈小臣獨蒙全軀就列待罪而已無任先懼後喜之至謹詣閣門進狀奉謝以聞謹進宣議郎試大理評事攝監察御史賜緋魚袋岑參右臣等竊見岑參識度清遠議論雅正佳名早立時輩所仰今諫諍之路大開獻替之官未備恭惟近侍實藉茂材臣等謹詣閣門奉狀陳薦以聞伏聽進止右臣竊以逆賊束身檻中奔走無路尚假餘息蟻聚苟活之日久陛下猶覬其匍匐相率降款盡至廣務寬大之本用明惡殺之德故大軍雲合蔚然未進上以稽王師有征無戰之義下以成古先聖哲之用心茲事元遠非愚臣所測臣聞易載隨時不俟終日先王之用刑也抑亦小者肆諸市朝大者陳諸原野今殘孽雖窮蹙日甚自救不暇尚慮其逆帥望秋高馬肥之便蓄突圍拒轍之謀大軍不可空勤轉輸之粟諸將宜窮掎角之進頃者河北初收數州思明降表繼至實為平盧兵馬在賊左脅賊動靜乏利制不由已則降附可知今大軍盡離河北逆黨意必寬縱若萬一軼略河縣草竊秋成臣伏請平盧兵馬及許叔冀等軍鄆州西北渡河先衝收魏或近軍志避實擊虛之義也伏惟陛下圖之遣李銑殷仲卿孫青漢等軍邐迤渡河佐之收其貝博賊之精鋭撮在相魏衛之州賊用仰魏而給賊若抽其鋭卒渡河救魏博臣則請朔方伊西北庭等軍渡沁水收相衛賊若回戈距我兩軍臣又請郭口祁縣等軍驀嵐馳屯據林慮縣界候其形勢漸進又遣李廣琛魯炅等軍進渡河收黎陽臨河等縣相與出入掎角逐便撲滅則慶緒之首可翹足待之而已是亦恭行天罰豈在王師必無戰哉愚臣聞見淺狹承乏待罪未精慎固之守輕議擒縱之術抑臣之夢寐貴有裨益謹進前件圖如狀伏聽進止乾元元年七月日某官臣狀進中興之四年王潛為唐興宰修厥政事始自魚衆寡惸獨而和其封內非侮循循不畏險膚而行而一咨於官屬於㣥吏於衆庶曰邑中之政庶幾繕完矣惟賓館上漏下濕吾人猶不堪其居以容四方賓賓其謂我何改之重勞我其謂人何咸曰誕事至濟厥載則達觀于大壯作之閈閎作之堂構以永圖崇高廣大踰越傳舍通梁直走嵬將墜壓素柱上承安若泰山兩傍序開發泄霜露潛靜深矣步櫩復霤萬瓦在後匪丹雘為實疏達為回廊南注又為覆廊以容介行人亦如正館制度小劣直左階而東封殖修竹茂樹挾右階於南環廊又注亦可以行步風雨不易謀而集事邑無妨工亦無匱財人不待子來定不待方中矣宿息井樹或相為賓或與之毛天子之使至則曰邑有人焉某無以栗階州長之使至則曰某非敢賓也子無所用俎四方之使至則曰子貺某多矣敢辭贄或曰明府君之侈也何以為人皆曰我公之為人也何以侈子徒見賓館之近夫厚不知其私室之甚薄器物未備力取諸私室人民不知賦斂乃至於館之醯醢闕出於私廚使之乘駟闕辦於私廏君豈為亭長乎是躬親也若館宇不修而觀臺榭是好賓至無所納其車或浩蕩無所措手足獲高枕乎其誰不病吾人矣疵瑕忽生何以為之是道也施舍不幾乎先覺矣杜之友朋嘆曰美哉是館也成人不知人不怒廨署之福也府君之德也府君曰古有之也非吾有也余何能為是亦前州府君崔公之命也余何能為是日辛丑歲秋分大餘二小餘二千一百八十八杜氏之老記已石鱉老放神乎始清之天遊目乎浩劫之家泠泠然馭乎風熙熙然登乎臺進而俯乎寒林退而極乎延閣見龍虎日月之君亘乎竦梁塞乎高壁骨者鬣者皙者黝者視遇之間若嚴寇敵者已伊四司五帝天之徒青節崇然緑輿駢然仙官洎鬼官無央數衆陽者近陰者遠俱浮空不定目所向如一蓋知北闕帝君之尊端拱侍衛之內于天上最貴矣已而左元之屬吏三洞弟子某進曰經始繢事前柱下史河東柳涉職是樹善損於而家憂於而國剝私室之匱渴蒸人之安志所至也請梗概帝君救護之慈朝拜之功曰若人存思我主籙生之根死之門我則制伏妖之興毒之騰凡今之人反側未濟柳氏柱史也立乎老君之後獲隱默乎忍塗炭乎先生與道而遊與學而遊可上以昭太一之神威于下下以昭柱史之告訴于上玉京之用事也率土之發祥也惡乎寢而庸詎仰而先生藐然若往頽然而止曰噫夫鳥亂於雲魚亂於河獸亂於山是畢弋釣削格之智生是機變退邀攫拾之智極故自黃帝已下干戈崢嶸流血不乾骨蔽平原乖氣橫放淳風不返雖書載蠻夷率服詩稱徐方既來許其慕中夏與夫容成中央氏尊盧氏輩結繩而已百姓至死不相往來茲茂德困矣矧賢主趣之而不及庸主聞之而不曉浩穰崩蹙數千古哉至使世之仁者蒿目而憂世之患有是夫今聖主誅干紀康大業物尚疵癘戰爭未息必揆當世之變日慎一日衆之所惡與之惡衆之所善與之善敕有司寬政去禁問疾薄斂修其土田險其走集以此馭賊臣惡子自然百祥攻百異有漸天下洶洶何其撓哉已登乎種種之民舍夫啍啍之意是巍巍乎北闕帝君者肯不乘道腴卷黑簿詔北斗削死南斗注生與夫圓首方足施及乎蠢蠕之蟲肖翹之物盡驅之更始何病乎不得如昔在太宗之時哉石鱉老畢辭三洞弟子某又某靜如得動如失久而去走不敢二問韓幹畫馬毫端有神驊騮老大腰裊清新魚目瘦腦龍文長身雪垂白肉風蹙蘭筋逸態蕭疏高驤縱恣四蹄雷雹一日天地御者間敏去何難易愚夫乘騎動必顛躓瞻彼駿骨實惟龍媒漢歌燕市已矣茫哉但見駑駘紛然往來良工惆悵落筆雄才聞西山漢兵食糧者四千人皆關輔山東徑卒多經河隴幽朔教習慣於戰守人人可用兼羌堪戰子弟向二萬人實足以備邊守險脫南蠻侵掠卭雅子弟不能獨制但分漢徑卒助之不足撲滅是吐蕃馮陵本自足支也宀隹量西山卭雅兵馬卒叛援形勝明矣頃三城失守罪在職司非兵之過也糧不足故也今此輩見闕兵馬使八州素歸心於其世襲刺史獨漢卒自屬裨將主之竊恐備吐蕃在羌漢兵小昵而釁隙隨之矣况軍須不足姦吏減剝未已哉愚以為宜速擇偏裨主之主之勢明其號令一其刑賞甲其哀恤致其歡欣宜先自羌子弟始自漢兒易解人意而優勸旬月大浹洽矣仍使兵羌各繫其部落刺史得自教閲都受統於兵馬使更不得使八州都管或在一羌王或都關一世襲刺史是羌之豪族發源有遠近世封有豪家紛然聚藩落之議於中肆與奪之權於外已然則備守之根危矣又何以藉其為本式遏雪嶺之西哉比羌族封王者初以拔城之功得今城失矣襲王如故總統未已余諸董攘臂何王尹之獄是矣田策嗣羌王關王氏舊親西董族最高怨望之勢然矣誠於此時便宜聞上使各自統領不須王區分易制然後都靜聽取別於兵馬使不益元戎氣壯部落無語或縱一部落怨獲㣥部落喜矣無爽如此處分豈惟卭南不足憂八州之人願賈勇復取三城不日矣幸急擇公所素諳明了將正色遣之獠賊內編屬自久數擾背亦自久徒惱人耳憂慮蓋不至大昨聞受鐵券爵祿隨之今聞已小動為之奈何若不先招諭也穀貴人愁春事又起緣邊耕種即發精卒討之甚易恐賊星散於窮谷深林節度兵馬但驚動緣邊之人供給之外未見免劫掠而還賃其地豪族兼有其地而轉富蜀之土肥無耕之地流冗之輩近者交互其鄉村而已遠者漂寓諸州縣而已實不離蜀也大抵祇與兼并豪家力田耳但鈞畝薄斂則田不荒以此上供王命下安疲人可矣豪族轉安是否非蜀仍禁豪族受賃罷人田管內最大誅求宜約富家辦而貧家創痍已深矣今富兒非不緣子弟職掌盡在節度衙府州縣官長手下哉村正雖見面不敢示文書取索非不知其家處獨知貧兒家處兩川縣令刺史有權攝者須盡罷免苟得賢良不在正授權在進退聞上而已杜子曰凡今之代用力為賢乎進賢為賢乎進賢賢乎則魯之張叔卿孔巢父二才士者聰明深察博辨閎大固必能伸於知已令聞不已任重致遠速於風飇也是何面目黧黑常不得飯飽喫曾未得富家奴茲敢望縞衣乘軒乎豈東之諸侯深拒於汝乎豈新令尹之人未汝之知也由天乎有命乎雖岑子薛子引知名之士月數十百填爾逆旅請誦詩浮名耳勉之哉勉之哉夫古之君子知天下之不可蓋也故下之知衆人之不可先也故後之嗟乎叔卿遣辭工於猛健放蕩似不能安排者以我為聞人而已以我為益友而已叔卿靜而思之嗟乎巢父執雌守常吾無所贈若矣泰山冥冥崒以高泗水潾潾瀰以清悠悠友生復何時會于王鎬之京載飲我濁酒載呼我為兄周禮司巫若國大旱則率巫而舞雩傳曰龍見而雩謂建已之月蒼龍宿之體昏見東方萬物待雨甚大故祭天遠為百穀祈膏雨也今蜀自十月不雨月旅建卯非雩之時奈久旱何得非獄吏只知禁繫不知疏決怨氣積寃氣盛亦能致旱是何川澤之乾也塵霧之塞也行路皆菜色也田家其愁痛也自中丞下車之初軍郡之政罷弊之俗已下手開濟矣百事冗長者又以革削矣獨獄囚未聞處分豈次第未到為獄無濫繫者乎穀者百姓之本百役是出况冬麥黃枯春種不入公誠能暫輟諸務親問囚徒除合死者之外下筆盡放使囹圄一空必甘雨大降但怨氣消則和氣應矣躬自疏決請以兩縣及府繫為始管內東西兩川各遣一使兼委刺史縣令對巡使同疏決如兩縣及府等囚例處分衆人之望也隨時之義也昔貞觀中歲大旱文皇帝親臨長安萬年二赤縣決獄膏雨滂足即嶽鎮方面歲荒札皆連帥大臣之務也不可忽凡今徵求無名數又耆老合侍者兩川侍丁得異常丁乎不殊常丁賦斂是老男老女死日短促也國有養老公遽遣吏存問其疾苦亦和氣合應之義也時雨可降之徵也愚以為至仁之人常以正道應物天道遠去人不遠秋杜子臥病長安旅次多雨生魚青苔及榻常時車馬之客舊雨來今雨不來昔襄陽龐德公至老不入州府而揚子雲草元寂寞多為後輩所褻近似之矣嗚呼冠冕之窟名利卒卒雖朱門之塗泥士子不見其泥矧抱疾窮巷之多泥乎子魏子獨踽踽然來汗漫其僕夫夫又不假蓋不見我病色適與我神會我棄物也四十無位子不以官遇我知我處順故也子挺生者也無矜色無邪氣必見用則風后力牧是已於文章則子遊子夏是巳無邪氣故也得正始故也噫所不至於道者時或賦詩如曹劉談話及衛霍豈少年壯志未息俊邁之機乎子魏子今年以進士調選名隸東天官告余將行既縫裳既聚糧東人怵惕筆札無敵謙謙君子若不得已知祿仕此始吾黨惡乎無述而止后妃之制古矣而軒轅氏帝嚳氏次妃之迹最有可稱存乎舊史然則其義隱其文略周禮王者內職大備而陰教宣詩人關睢風化之始樂得淑女蓋所以教本古訓發皇婦道居具燕寢之儀動有環珮之節進賢才以輔佐君子不淫色以取媚閨房雖彤管之地功過必紀而金屋之寵流宕一揆稽女史之華實嗣嬪則之清高亦時有其人偉夫精選淑妃諱某姓皇甫氏其先安定人也惟卨封商於赫有光伊元祖樹德於今不忘必宋之子莫之與比伊清風繼代惠此餘美夫其系緒蕃衍紱冕所興列為公侯古有皇父充石則其宗可知也夫其體元消息經術之美刊正帝圖中有元晏先生則其家可知矣嗟乎我有奕葉承權輿矣我有徽猷展肅雍矣積㣥玉之氣自對白虹之天生五色之毛不離丹鳳之穴曾祖烜皇朝宋州刺史祖粹皇朝越州刺史都督諸軍事父日休皇朝左監門衛副率妃則副率府君之元女也粵若襁褓體如冰雪氣象受於天和詩禮傳乎胎教故列我開元神武之嬪御者豈易其容止法度哉今上昔在春宮之日詔詰良家女擇視可否充備淑哲太妃以內秉純一外資沈靜明珠在蚌水月鮮白美玉處石崖岸津潤結襦而金印相輝同輦而翠旗交影由是恩加婉順品列德儀雖掖庭三千爵秩十四掩六宮以取俊超㣥女以見賢豈渥澤之不流曾是不敢以露才揚已卑以自牧而已夫如是言足以厚人倫化風俗彌縫坤載之失夾輔元亨之求嗚呼彼蒼也常與善何有初也不久好奈何况妃亦既遘疾怗如慮往上以之服事最舊佳人難得送藥必經於御手見寢始回於天步月氏使者空説返魂之香漢帝夫人終痛歸來之像以開元二十三年歲次乙亥十月癸未朔薨於東京某宮院春秋四十有二嗚呼哀哉望景向夕澄華微陰風驚碧樹霧重青岑天子悼履綦之蕪絶惜脂粉之凝冷下麟鳳之銀床到梧桐之金井嗚呼哀哉厥初權殯於崇政里之公宅後詔以某月二十七日己酉卜葬於河南縣龍門之西北原禮也制曰故德儀皇甫氏贊道中壼肅事後庭孰云疾疢奄見凋落永言懿範用愴於懷宜登四妃之列式旌六行之美可册贈淑妃喪事所須並宜官供河南尹李適之充使監護非夫清門華胄積行纍功序於王者之有始有卒介於嬪御之不僭不濫是何存榮沒哀視有遇之多也有子曰鄂王諱瑤兼太子太保使持節幽州大都督事有故在疚而卒豈無樂國今也則亡匪降自天云何吁矣有女曰臨晉公主出降代國長公主子滎陽潛曜官曰光祿卿爵曰駙馬都尉昔王儉以公主恩尚帝女為榮何晏兼關內侯是亦晉朝歸美公主禮承於訓孝自於心霜露之感形於顏色享祀之數缺於灑掃嘗戚然謂左右曰自我之西歲陽載紀彼都之外道里遐絶聖慈有蓬萊之深異縣有松檟之阻思欲輕舉安得黃鵠未議巡豫徒瞻白雲望闕塞之風煙尋常涕泗懷伊川之陵谷恐懼遷移於是下教邑司爰度碑版甫忝鄭莊之賓客遊竇主之園林以白頭之嵇阮豈獨步於崔蔡而野老何知斯文見託公子泛愛壯心未已不論官閥遊夏入文學之科兼敘哀傷顏謝有后妃之誄銘曰積氣之清積陰之靈漢曲回月高堂麗星驚濤洶洶過雨冥冥洗滌蒼翠誕生娉婷其一婉彼柔惠迥然開爽綢繆之故昔在明兩恩渥未渝康哉大往展如之媛孰與爭長其二珩珮是加翬褕克備先德後色纍功居位壼儀孔修宮教咸遂王于獎飾禮亦尊異其三小苑春深離宮夜逼花間度月同輦未歸池畔臨風焚香不息嗚呼變化惠好終極其四馮相視祲太史書氛藏舟晦色逝水寒文翠幄成彩金爐罷燻燕趙一馬瀟湘片雲其五恍惚餘迹蒼茫具美王子國除匪他之恥公主愁思永懷於彼日居月諸邱隴荊其六巖巖禹鑿瀰瀰伊川列樹拱矣豐碑缺然爰謀述作歘就雕鐫金石照地蛟龍下天其七少室東立繚垣西走佛寺在前宮橋在後維山有麓與碑不朽維水有源與詞永久其八甫以世之録行迹示將來者多矣大抵家人賄賂詞客阿諛真偽百端波瀾一揆夫載筆光芒於金石作程通達於神明立德不孤揚名歸實可以發皇內則標格女史竊見於萬年縣君得之矣其先系統於伊祁分姓於唐杜吾祖也我知之遠自周室迄於聖代傳之以仁義禮智信列之以公侯伯子男春秋傳云穆叔謂之世祿其在茲乎曾祖某隋河內郡司功獲嘉縣令王父某皇監察御史洛州鞏縣令前朝咸以士林取貴宰邑成名考某修文館學士尚書膳部員外郎天下之人謂之才子兄升國史有傳縉紳之士誄為孝童故美玉多出於崑山明珠必傳於江海蓋縣君受中和之氣成肅雍之德其來尚矣作配君子實惟好仇河東裴君諱榮期見任濟王府録事參軍入在清通同行領袖素髮相敬朱紱有光縣君既早習於家風以陰教為已任執婦道而純一與禮法而始終可得聞也昔舅歿姑老承順顏色侍歷年之寢疾力不暇於須臾苟便於人皆在於手淚積而形骸奪氣憂深而巾櫛生塵尊卑之道然固出自天性孝養哀送名流稱仰允所為能循法度則可以承先祖供給祭祀矣維其矜莊門戶節制差服功成則運有若四時物或猶乖匪踰終日黼畫組就之事割烹煎和之宜規矩數及於親姻脫落頗盈於歲序若其先人後已上下敦睦懸罄知歸揖讓惟久在嫂叔則有謝氏光小郎之才於娣姒則有鍾氏洽介婦之德周給不礙於親疏泛愛無擇於良賤至於星霜伏臘軒騎歸寧慈母每謂於飛來幼童亦生乎感悅加以詩書潤業導誘為心遏悔吝於未萌驗是非於往事內則致諸子於無過之地外則使他人見賢而思齊爰自十載已還默契一乘之理絶葷血於禪味混出處於度門喻筏之文字不遺開卷而音義皆達母儀用事家相遵行矣至於膳食滑甘之美韋必結縫線之難展轉忽微欲參謀而縣解指麾補合猶取則於垂成其積行纍功不為薰修所住著有如此者靈山鎮地長吐煙雲德水連天自浮星象則其看心定惠豈近於揚榷者哉越天寶元年某月八日終堂於東京仁風里春秋若干示諸生滅相越六月二十九日遷殯於河南縣平樂鄉之原禮也嗚呼哀哉琴瑟罷聲蘋蘩晦色骨肉號兮天地感中外痛兮鬼神惻有長子曰朝列次朝英北海郡壽光尉次朝牧女長適獨孤氏次閻氏皆稟自胎教成於妙年厥初寢疾也唯長子長女在側英牧或以遊以宦莫獲同曾氏之元申號而不哭傷斷鄰里悠哉少女未始聞哀又足酸鼻嗚呼縣君有語曰可以褐衣斂我起塔而葬裴公自以從大夫之後成縣君之榮愛禮實深遺意蓋闕但褐衣在斂而幽隧爰封其所廞飾咸遵儉素眷茲邑號未降天書各有司存成之不日嗚呼哀哉有兄子曰甫制服於斯紀德於斯刻石於斯或曰豈孝童之猶子歟奚孝義之勤若此甫泣而對曰非敢當是也亦為報也甫昔臥病於我諸姑姑之子又病間女巫至曰處楹之東南隅者吉姑遂易子之地以安我我是用存而姑之子卒後乃知之於走使甫常有説於人客將出涕感者久之相與定諡曰義君子以為魯義姑者遇暴客於郊抱其所攜棄其所抱以割私愛縣君有焉是以舉茲一隅昭彼百行銘而不韻蓋情至無文其詞曰嗚呼有唐義姑京兆杜氏之墓五代祖柔隋吏部尚書容城侯大父元懿是渭南尉父元哲是廬州慎縣丞維天寶三載五月五日故修文館學士著作郎京兆杜府君諱某之繼室范陽縣太君盧氏卒於陳留郡之私第春秋六十有九嗚呼以其載八月旬有一日發引歸葬於河南之偃師以是月三十日庚申將入著作之大塋在縣首陽之東原我太君用甲之穴禮也墳南去大道百二十步奇三尺北去首陽山二里凡塗車芻靈設熬置銘之名物加庶人一等蓋遵儉素之遺意塋內西北去府君墓二十四步則壬甲可知矣遣奠之祭畢一二家相進曰斯至止將欲啓府君之墓門安靈櫬於其右豈廞飾未具時不練歟前夫人薛氏之合葬也初太君令之諸子受之流俗難之太君易之今茲順壬取甲又遺意焉嗚呼孝哉孤子登號如嬰兒視無人色且左右僕妾洎厮役之賤皆蓬首灰心嗚呼流涕寧或一哀所感片善不忘而已哉實惟太君積德以常臨下以恕如地之厚縱天之和運陰教之名數秉女儀之標格嗚呼得非太公之後必齊之薑乎薛氏所生子適曰某故朝議大夫亠兊州司馬次曰升幼卒報復父讐國史有傳次曰專歷開封尉先是不祿息女長適巨鹿魏上瑜蜀縣丞次適河東裴榮期濟王府録事次適范陽盧正均平陽郡司倉參軍嗚呼三家之女又皆前卒而某等夙遭內艱有長自太君之手者至於婚姻之禮則盡是太君主之慈恩穆如人或不知者咸以為盧氏之腹生也然則某等亦不無平津孝謹之名於當世矣登即太君所生前任武康尉二女曰適京兆王佑任硤石尉曰適會稽賀撝卒常熟主簿其往也既哭成位有若冢婦同郡盧氏介婦滎陽鄭氏巨鹿魏氏京兆王氏女通諸孫子三十人內宗外宗寖以疏濶者或元纁玉帛自他日互有所至若以為杜氏之葬近於禮而可觀而家人亦不敢以時繼年式志之金石銘曰太君之子朝儀所尊貴因長子澤就私門亳邑之都終天之地享年不永歿而猶視維開元二十九年歲次辛已月日十三葉孫甫謹以寒食之奠敢昭告於先祖晉駙馬都尉鎮南大將軍當陽成侯之靈初陶唐出自伊祁聖人之後世食舊德降及武庫應乎虬精恭聞淵深罕得窺測勇功是立智名克彰繕甲江陵祲清東吳建侯於荊邦於南土河水活活造舟為梁洪濤莽泛未始騰毒春秋主解稿隸躬親嗚呼筆迹流宕何人蒼蒼孤墳獨出高頂靜思骨肉悲憤心胸峻極於天神有所降不毛之地儉乃孔昭取象邢山全模祭仲多藏之誡焯序前文小子築室首陽之下不敢忘本不敢違仁庶刻豐石樹此大道論次昭穆載揚顯號于以采蘩于彼中園誰其尸之有齋列孫嗚呼敢告茲辰以永薄祭尚饗維年月日外孫滎陽鄭宏之京兆杜甫謹以寒食庶羞之奠敢昭告于外王父母之靈嗚呼外氏當房祭祀無主伯道何罪元陽誰撫緬維夙昔追思艱窶當太后秉柄內宗如縷紀國則夫人之門舒國則府君之外父聿以生居貴戚釁結狂豎雌伏單棲雄鳴折羽憂心惙惙獨行踽踽悲夫景分飛忽間于鳳凰咄彼讒人有詞異於鸚鵡初我父王之遘禍我母妃之下室深狴殊塗酷吏同律夫人於是布裙屝屨提餉潛出昊天不傭退藏於密久成凋瘵溘至終畢蓋乃事存於義陽之誄名播於燕公之筆嗚呼哀哉宏之等從母昆弟兩家因依弱歲俱苦慈顏永違豈無世親不如所愛豈無舅氏不知所歸誓以偏往測戀光輝漸漬相勗居諸造微幸遇聖主願發清機以顯內外何當奮飛洛城之北亡山之曲列樹風煙寒泉珠玉千秋古道王孫去兮不歸三月晴天春草萋兮增緑頃物將牽纍事未遂欲使淚流頓盡血下相續者矣捧奠遲回炯心依屬庶多載之灑掃循茲辰之軌躅維唐廣德元年歲次癸卯九月辛丑朔二十二日壬戌京兆杜甫敬以醴酒茶藕蓴鯽之奠奉祭故相國清河房公之靈曰嗚呼純朴既散聖人又歿苟非大賢孰奉天秩唐始受命㣥公間出君臣和同德教充溢魏杜行之夫何畫一婁宋繼之不墜故實百餘年間見有輔弻及公入相紀綱已失將帥干紀煙塵犯闕王風寢頓神器圯裂關輔蕭條乘輿播越太子即位揖讓倉卒小臣用權尊貴倏忽公實匡救忘餐奮發纍控直詞空聞泣血時遭祲沴國有征伐車駕還京朝廷就列盜本乘弊誅終不滅高義沈埋赤心蕩折貶官厭路讒口到骨致君之誠在困彌切天道濶遠元精茫昧偶生賢達不必際會明明我公可云時代賈誼慟哭雖多顛沛仲尼旅人自有遺愛二聖崩日長號荒外後事所委不在臥內因循寢疾憔悴無悔夭閼泉塗激揚風概天柱既折安仰翊戴地維則絶安放夾載豈無㣥彥我心忉忉不見君子逝水滔滔泄涕寒谷吞聲賊壕有車爰送有紼爰操撫墳日落脫劍秋高我公戒子無作爾勞斂以素帛付諸蓬蒿身瘞萬里家無一毫數子哀過他人鬱陶水漿不入日月其慆州府救喪一二而已自古所歎罕聞知已曩者書札望公再起今來禮數為態至此先帝松柏故鄉枌梓靈之忠孝氣則依倚拾遺補闕視君所履公初罷任人實切齒甫也備位此官蓋薄劣耳見時危急敢愛身死君何不聞刑欲加矣伏奏無成終身愧恥乾坤慘慘豺虎紛紛蒼生破碎諸將功勳城邑自守鼙鼓相聞山東雖定灞上多軍憂恨展轉痛傷氤氳元豈正色白亦不分培塿滿地崑崙無㣥致祭者酒陳情者文何當旅櫬得出江雲嗚呼哀哉尚饗
