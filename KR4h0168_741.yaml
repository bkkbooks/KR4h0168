body:
  text: 右臣伏蒙聖恩以臣當府所奏周公祠靈泉湧出畫圖進上示臣手詔幷賜潤德泉者紫泥緘啟鴻澤光臨因聖德以感通詔微臣而褒獎捧戴無任兢惶失圖臣伏以君有至德及於山川神降休祥見於祠宇功宣潤下道叶流謙臣所以披圖按籙考往校今明元化之式敷彰皇猷之無遠冀光帝典用表祥經臣忝守邦獲逢理代不合蒙蔽輒具奏聞豈謂俯迴天睠乃賜嘉名特降綸言垂於不朽與日月而明並豈金石之能移臣見令刻石紀年置之泉側為一時標異俾百代同觀無任屏營感忭之至謹陳謝以聞當府岐山縣鳳棲鄉周公祠舊有泉水枯竭多年去冬十一月十七日忽因大風其泉五處一時湧出深一尺已來又有七處見出臣差府參軍郭鎊專就泉所檢驗得狀謹具泉水面方圓深淺分寸五處大泉水面各方圓四尺已下各深一尺已來七處小泉水面各方圓一尺已下各深三寸已來右臣得縣鎮狀報有此靈泉差官勘覆事皆詣實詢諸故老博訪里閭咸稱此泉出必時泰歲豐者臣伏以周公聖人爰正禮樂勤勞周室克佐成王載在詩書揚於風雅宜乎神用不測澤流無窮伏惟陛下叶德坤乾侔功造化節宣四序綏懷萬方由是地理呈祥靈泉感應名標上善運屬和平不然何已涸之泉因風復有此蓋彰於聖德發自神功事出尋常義高圖籙豈特淆之不濁乃鑒女妍積以成川方勞舟檝也臣才非周召時偶成康荷恩渥而莫効涓塵覩休徵而空增喜躍謹具奏聞伏請付史官以光典冊無任歡賀悃欵之至具圖一面謹隨狀奏進謹錄奏聞謹奏從易長慶中官宗正寺丞太和九年官廣州刺史兼廣州都督伏以周禮設六功之官皆配烝祭漢晉已降或以祫配國朝禘祫二享功臣皆得配於廟庭蓋以崇勳表忠亦冀招賢廣類者也故自武德已來功臣列在祀典三十八人俾其按樽俎之榮列君臣之位祭神如在因祭來貺宗廟合祀之時元勳配享之禮苟非誠敬曷表告虔竊見今年四月十三日禘享功臣配食者單席暴露列在殿庭雖有風雨亦不移避仰惟國之大典卑褻至此伏讀國史開元十七年元宗詣昭陵彷彿見太宗立於神遊殿前及寢宮聞室中謦欬之音又於寢宮門外設奠以祭陪陵功臣將相蕭瑀房元齡等如聞蹈舞之聲事驗神徵光輝史冊慢易乖敬則何以上副高祖太宗待劉魏房杜之本意也臣本管宗司專奉廟事庶修職業不敢因循伏請自今已後勅有司先事修備幕次及新潔席褥以申如在之敬用展報功之思璵字朗士宰相珙弟長慶初登第又制策登科開成末累遷至禮部員外郎會昌初以考功郎中知制誥拜中書舍人大中五年遷禮部侍郎七年權戶部侍郎封博陵縣子轉兵部侍郎河中節度使丹青神化寅亮天工將寄陶鈞必歸才望故漢中大業魏邴克贊其謨謀開元盛時姚宋同匡其治理嘗覽前載緬懷斯人寤寐以求夢卜終協適當舉眾不讓知賢戶部尚書判度支崔龜從道峻嵩華志淩霄漢氣包元精識邁前哲巖廊符瑞禮樂英華宏通多鑒物之明堅直抱佐時之術而學窮源委詞涌濤波吐論素勵於公忠理躬不踰於信厚烈火方熾珪璋更寒飛霜已嚴竹柏猶翠自出入劇職迴翔清途經歷五年恭勤一貫粉署潔賜衣之操掖垣高白鳳之文澄清宣威節制持重暨位延舊德再掌地圖任切良材柄耑國用閭閻不困帑藏有餘邦賦程均節之能軍食表供須之効我有好爵本邀茂勳况乎國楨宜在人傑是用命汝同心弻予升於鼎司執此政柄吉甫德全於文武彥回望著於臺衡既諧具瞻實允元輔當酌古訓以恢今猷帖人部喉舌之雄免計曹經費之務期爾鎮撫式彰顯榮於戯惟木從繩載懷藥石之戒惟風偃草冀流霖雨之功與其順美以昭忠不若盡規而輔德與其嚴刑而就理不若齊禮以安人佇聞嘉言共底交泰無令伊傅獨美典墳可戶部尚書同中書門下平章事勅統環營於中禁司徼道於右街非節効素彰見義而錙銖爵祿威謀夙著宣力而踐更翰垣則何以為我信臣膺茲寵寄檢校刑部尚書兼左金吾大將軍張直方沈果知機忠烈繼志承許國之義訓有能軍之勇名豹變除習俗之風鷹揚多御眾之術自脫屣幽薊奉職警巡勤固有夙夜之勞謹嚴得誰何之任前太平軍節度使田牟體懷忠厚氣概雄邁襲台耀之洪伐振家聲於勳籍深識戰器之本亟升勇爵之班馬嶺鴈塞常絕煙塵之警西楚東魯每聞輯睦之方而皆早讀父書動合軍志克隆紹續之業備詳奇正之機是宜委以禁戎為之禦侮長期門以絕席擁緹綺而式遏俾之重閉斯謂爾勞題劍弄印仍祇舊服勿替徽問勉承寵光直方可右龍武將軍牟可右金吾將軍上闕特進侍中贈太尉鄭國文貞公魏氏在貞闕一字立家廟于長安昌樂里後二百卅五年有來闕歲既協于帝道化光洽前此詔贈先闕三字侍御史闕一字君為吏部侍郎先夫人南陽闕姓曰吾惟聖訓祭器不假宗廟為先今吾闕二字德慙前人而闕一字位卿相歲時尚祭寢然崇祀闕廟而新之則流光歸列祖雖然吾非達禮必稽於有司闕二字太常順考禮令酌損前文闕一字勳勞考公于是靖端虛中列上感疚既獲俞命闕八字書練時日闕一字工興事陶斵築闕一字堅闕物宿設助祭夜鼓四通公祇祓夙興纓冠鳴玉入進于位賓親就闕一字祝史贊導虔奉祖考鄭公闕部府君諱闕一字神主第升于室室上闕二字以祖考妣鄭國夫人闕一字東裴氏皇考妣河東裴氏皇考妣闕之事既成而退他日使門吏左補闕鄭愚闕一字謂璵曰某滌慮虔思闕一字教以移忠竭忠以致位因位以闕詳求能敵余之重託者宜莫如子璵聞命震悚即走相君之門固辭不獲歸次其世冑德行官業垂承烈休闕文侯能師聖門人而不好古樂故風頹而不得闕一字五伯至無忌不闕二字而封信陵與齊趙楚公子相矜奮闕派緒滋廣因自別為西祖暨諸戎盜華晉鼎凌闕四字遷廿仕闕二字頓邱四世之孫曰釗樹勳捍難為闕懷忠亂朝直封言互政侵轢姧倖不容於時出長屯畱闕一字無溫色或有闕一字詞致誚者方激發愾吒志氣橫厲闕屬時濁昏劻勷西東懷奇含耀濡足闕一字晦竟逢大晨助日闕二字龍攄鳳鳴為祥輔昌闕一字我闕見國書為臣克配於國享為祖不遷於家祀雖童子婦人亦闕九字府君諱闕一字琬祖訓闕濬於廿次為顯考以相國位猶滯于三品室未備數尚闕一字孝思司業闕一字潁州府君是為第闕一字室闕之跡闕五字宜孰歸第三室河西府君天資恢闕一字抱器卓邁闕一字無不通而以先德實嘗闕司成師儒道光教源益闕四字殘躪狼藉牛空於犒耕無以力乃用古闕四字犂作為區闕一字歲大有闕一字宿秉闕積慮洽聞業履無忝命塞不闕三字蔽罪無頗邑長獲申剛中特操前無闕四字是舉出為闕二字猗氏令人咸為闕於時為邑南陽當希烈猖猘之餘邑闕二字機難闕二字中闕二字立德無方而闕四字蘊之華藻當時賢闕一字逖聽風闕長有為中貴人干政者違言交肆闕四字召拜大理司直闕四字小大時當性不苟闕二字當官闕四室即吏部府君渾粹秀發識洞元闕十字北西廿無闕四字沒振謂天道闕二字相闕一字永之闕一字遷始以大理評事兼察換殿中侍闕鄭公忘勞大伐為闕可朝聞夕拜疏視闕文宗益欲寘于側即闕終始一德命求昆裔期肖前人以闕上書草充溢囊篋使好事者得之皆闕索將勇闕一字整易干城之不材者蚤闕故會昌中權倖惡忌擠之外郡閒闕材以成之厥後綿歷祀為他人闕征兼領邦憲閒歲進陟公台仍專闕中被袞朝天又葺故廟奉時闕之舊宅永興里肇卜貞觀闕猗猗後為右補闕至公恭守闕爰操肇闕一字皇闕一字廓端闕銘石於麗牲其烝夷之志歟闕居第奉祠不敢闕一字為袞職舊官闕孔昭厥緒益遙人爵或替闕綏嘏錫闕五字考私闕二字報闕魏還祖居旌真恩購闕聞躬潔祼羞俎折闕陵闕猶在闕二字言之闕右史入侍未嘗不闕一字之闕征繕是圖闕三字府大體闕惟忠與孝可謂大備季友贈太保頔子尚憲宗女永昌公主拜駙馬都尉殿中少監太和時出為明州刺史此寺碑記嘗為寇盜隳壞久無竪立有好事僧惠印錄其舊文藏於篋笥又與老宿僧明秀志詮寺主僧志闕一字上座僧栖雲都維那僧巨嵩會議重建其碑焉余美其樂善會剡越間有隱逸之士曰范的業文攻書未遇于時常萍泊雲水間余邀以書之添聖境遊觀之一事畧記端由于碑後云太和七年十二月一日明州刺史于季友記宏宣字子章開成中官給事中累遷節度使進太子少傅封固安縣伯臣近訪知郭釗妻沈氏公主之女代宗皇帝外孫有男仲詞已選尚主仲文不合假冒自稱嫡子若仲文承嫡即沈氏須黜居別室仲詞不合配尚貴主伏以郭仲文尚父子儀之孫太皇太后之姪戚里勳門無與儔比婚姻嫡庶朝野具瞻奪宗之配實黜風教且仲文仲詞既非同出襲封尚主不可並行伏請付御史臺追勘啟大和三年官中書舍人伏奉勅旨宜令左右常侍諫議大夫給事中中書舍人審同詳議僕射與御史中丞以下街衢相遇儀式奏聞者謹按儀制令諸文武官隔品卑者皆拜其准令應致敬而非相統屬者則不拜致敬之式在途則斂馬側立又按舊儀僕射上日除兩省供奉官外尚書省御史臺及諸司四品以下皆拜于階下蓋以端揆之重師長百僚雖在別司皆為統屬故用隔品拜禮非為無據臣續准元和七年二月七日勅雖停拜禮每至上日臺官就僕射廳事列班送上與尚書省官不異則途遇致敬闕一字在不疑臣等又按令文屬官于街衢相遇隔品者致敬禮絕者下馬無迴避之文雜令所言轉避貴重賤者祇謂迂直之間各申遜讓非令藏匿惟車駕出入警蹕行人事關嚴上不屬臣下但卑寮自後多就他途百姓無知亦皆相效道途迴避因此成例就中臺官以職在彈糾人情畏奉他官相遇苟務推崇始自私敬漸為公禮相循既久將謂合然籠街專道止絕行旅奔避不及即以為罪徵異說于前古訪近例于走卒國章明具不復檢尋遂于師長亦欲均禮臣等自奉勅詳定累牒禮部及太常禮院御史臺檢詳武德以來禮令制勅各得牒報並無臺官於僕射合與司官不同之文臣等議伏請自今以後御史中丞以下與僕射相遇依令致敬斂馬立侍僕射過僕射謝官日大夫中丞與三院御史就幕次叅見其觀象門外立班既以後至為重大夫中丞到班後朝堂所由引僕射就立傳呼贊導如大夫就列之儀僕射朝退出宣政門朝堂所由贊引至幕次及興化門侍與叅從相得而退御史大夫與僕射既隔品自合分道而行庶輕重得宜典章不紊模大和六年試左金吾衞兵曹參軍維大僊宣妙有鼓慈風闢元理於虛空拔眾生於黑海總持之力妙不可論故人天趍其域敬其誠貞其風固迺本像者法者剎者幢者繼而修之嚴而飾之百千同歸㣥魔銷跡祥洽乎有無之際慶流乎恍忽之中宏之在人扣無不應惟此幢設本乎當寺宿老寺主法號法峻割淨財洗垢穢琢石於藍峯之頂冥機于青蓮之界博考形勝以選所安叶願契心竭力茲地則大悲之光景巍乎可觀也速疾之法其可測歟若乃書幢空裏鐫雕路隅治塵者于以福生休影者於焉罪滅况能捨施專精石幢可以延師之祿滋師之福美矣哉演自金闕一字以祐賢人門弟子等咸能誓志永慕元風法子法孫慶爾多福刊佛言亦以益儒典也鐫佛頂亦以敷國光也輅文宗朝官崇文館校書郎人之有生修短貴賤聖人固常言命矣至於纖芥得喪行止飲啄亦莫不有前定者焉中人以上罔有不聞其說然得之即喜失之則憂遑遑汲汲至於老死罕有居然俟得靜以待命者其大惑歟余顓愚迷方不達變態審固天命未嘗勞心或逢一時偶一事泛乎若虛舟觸物曾莫知指遇之所由推而言之其不在我明矣大和中讎書春閣秩散多暇時得從乎博聞君子徵其異說每及前定之事未嘗不三復本末提筆記錄日月稍久漸盈筐篋因而編次之曰前定錄庶達識之士知其不誣而奔競之徒亦足以自警云爾王褱吳郡人開成元年進士滄浪之水兮伊楚之濆汗漫蕩漾兮清泠奫淪控三湘之淺浪從大別而派分澄澹清景離披曉雲彼美人兮何其獨商歌以思君覩斯水之洞徹惡吾纓之垢氛將濯其纓亦潔其已逐臣逋客漁翁樵子吟刈楚以激昂詠伐檀而筮仕哀靈均之濯足笑許由之洗耳載泛載浮曷云其已洎夫白日始晞青天收潦千尋湛而見底萬里淨而猶掃漾磷磷之淺沙蕩靡靡之纖草縈紆浦漵邐迤洲島興既遠兮情亦閒纓再濯兮身亦澡于彼濯矣伊水之濱于彼澡兮君子之身滌我滓穢去我埃塵且潔淨以精微又肆志而王神孰與夫澤畔憔悴空見悲於楚客心之憂矣匪興刺於詩人已焉哉士生世兮患于不立朝聞夕死道之所急偶滄浪之且清豈坎窞之能習易載出處詩稱維縶歲冉冉而不畱雖追悔而何及辭曰滄浪之水兮徵楚辭臨清漪兮應昌期濯吾纓兮有所思幸我生兮及明時進德修業兮已矣拔茅彙征兮良在茲麗景云暮歡情奈何水散循環之勢桮浮一勺之多樽俎必呈反本源於抔飲歌鐘合奏起觴飲於流波爾其洋溢折旋從容娛樂觀滴瀝以繚繞將灌注而酬酢袒裘解帶笑沈醉以山頹永日微風期竭歡於水涸狎翫未已迴環不窮方醴泉之自異念酒池而莫同滿座酡顏盡染桃花之水緣隄芳草尚遺蒲杓之風是以布令如流娛情忽起已控清流而引滿遂用銷憂而飾喜且異載沈而載浮寧同以水而濟水情符泛愛誤比投醪之時曲辨靈長足見濫觴之始爾乃負舟無力載酒何如波卷每觀其泛蟻鈎深自致乎無魚成禮交歡寧酒流而生禍效奇行怪豈杯渡以憑虛所以上下隨波方圓在器念縮茅而自別比浮芥而亦異獻壽終歎於流川如澠倍符於此地已傾壺而揚觶默爾無諠方枕麥曲而藉糟塊然復醉想夫飲流畢會倒載為期乘波而潏潏迴疾入曲而悠悠轉遲投轄畱賓自有清澄之色汙樽就飲翻疑樸畧之時分巡而小大殊矣遶座而左右流之時也酒且已闌景云暮促愜蘭亭之嘉會散陽春之麗曲宴已終而時移但山高而水綠大哉洪鈞賦象觸類而生或分氣四序配位五行惟彼冰之堅質包履霜之漸成夫其體含上善色侔晴雪妍媸自明表裏虛徹原其物也則昏危應位覘其時也則元冥御節陰氣盛陽晶滅殺氣鴻洞嚴飇栗烈當此時也何水不凝何潭不結瞻山則萬壑俱閉歸海則百川潛泄諒造化之自然羌難得而備說佳其空冷愈堅風凄益壯汗漫稜層委積亭障交河則戰士加守合浦乃漁人迷望况乎天道無私所應多姿雲禽下覆彰后稷之聖德泉魚出躍表王祥之孝思然而題周官順時令皎皎雪聚皚皚山淨盤重澗而疑璧瀉圓池而若鏡與海鏡而混輝將玉壺而相映闕何層冰峩峩形埋奔浪勢壓衝波坎位臨時則慎於馬窟離光再誕示合於滹沱豈直若斯而已哉固見美於將來其藏之也黑牡秬黍以享候其出之也桃弧棘矢以除災取順則人不天札用逆則時多震雷故以北陸而收西陸將啟冬鑒秋刷識寒暑之情大盤夷盤表君臣之禮徒觀其謙也每避燥而就濕其讓也亦背陽而向陰偉何點之入喻著豳詩而見欽皎爾自安同達人之守節渙乎將解若天道之無心故先賢取危於履薄作戒於臨深或曰眾雖類而多名曷方茲而至妙明陰陽之本為識時之要可以羞之於王公可以薦之於宗廟儻水鏡之一察猶明暫於迴照重曰深山窮谷凌人鑿頒賜從來天下聞別有川池捐棄者終思采斲獻明君昔漢兵未罷師屯垓下物格時變威輕勢寡兩雄較武焉知劉氏昌乎四面聞歌是何楚人多也且其秦以二世漢之五年當重圍而外合聆逸韻以初傳令肅轅門如貫珠而有序聲環戎壘聞彈鋏以相宣將清氛祲於茲夕寧遏行雲於遠天由是互變新聲復轉餘弄效巴人而四起明漢祚之一統宣於里巷千門而㣥犬吠聲靜入房櫳一夜而滿城驚夢爾其本秦人也盡當秦聲爰作郢曲以移楚情將以表升平之道引謳誦之清威楚外虞風急而鼓鉦動地曲終迴顧月上而旌旗繞城楚王乃起自帳中憮然悲惋腰間之劍斯在麾下之師已散在昔割河渠分理亂東也為楚西也為漢乘時負約情激憤以空深言志增悲意浮游而不斷但聞迭唱以繼和寧肯側聆而屢歎迴首無計虞兮奈何汝起楚舞吾將楚歌弱冠舉兵霸世之名則振窮途敗績拔山之力空多固知天命有歸雄圖不遂念繞梁之未閱信創業之難致戰征七十空傳海內之名子弟八千誰返江東之地已而楚幕旗偃漢軍角悲雖潰圍之遠遁終漏網以難期便繼遺聲可成功而作樂果符先兆乃獻凱以旋師嗚咽奏之一曲決雌雄於此時朗開成三年進士儒有悅聲教以自勗覩至樂於實錄如元宗之聖代制霓裳之麗曲豈惟象德以飾喜將以變風而易俗原夫鼎湖道洽薰絃思深惡繁聲以惑志思雅樂以理心調乎琴瑟之間無非故曲奏自雲韶之下盡是凡音乃制神仙之妙響是知鄭衞之難侵與鈞天之潛契冀瑤池之可尋時也廷臣並觀樂品斯設絃匏由是而居次簫管因之而在列假宮商之具舉成曲度之妙絕變虛徐之歌態始訝遏雲振飄颻之舞容忽驚迴雪既應絃而合雅亦投袂而赴節已而樂自宸慮備於太常首瓊殿之法曲改梨園之樂章配八佾以稱美旌九功而無荒盡文物之全盛致眾庶之歡康是知和平有因雅正無比既容與而在目復周旋而盈耳融融然節奏合度傞傞然周旋有旨逸調奏兮既徹嘉名播兮未已今皇帝奕葉繼代明德是資開元之聖運復啟羽衣之餘響寧遺觀兩階之舞干既柔殊俗覩三清之仙樂復播明時下臣就列以貢賦喜聞韶而在茲昶吏部侍郎愈子大和元年進士釋褐邠州從事試宏文館校書郎又為襄州從事除高陵尉集賢殿校理遷度支監察御史拜左拾遺牛僧孺鎮襄陽奏為支使拜秘書省著作郎遷國子博士除襄陽別駕檢校禮部戶部郎中大中九年卒年五十七昌黎韓昶字有之傳在國史生徐之符離小名曰苻幼而就學性寡言笑不為兒戯不能闇記書至年長不能通誦得三五百字為同學所笑至六七歲未解把筆書字即是性好文字出言成文不同他人所為張籍奇之為授詩時年十餘歲日通一卷籍大奇之試授諸童皆不及之能以所聞曲問其義籍往往不能答受詩未通兩三卷便自為詩及年十一二樊宗師大奇之宗師文學為人之師文體與常人不同昶讀慕之一旦為文宗師大奇其文中字或出於經史之外樊讀不能通稍長愛進士及第見進士所為之文與樊不同遂改體就之欲中其彙年至二十五及第釋褐柳公公綽鎮邠辟之試宏文館校書郎相國竇公易直辟為襄州從事校書如前旋除高陵尉集賢殿校理又遷度支監察拜左拾遺好直言一日上疏或過二三文字之體與同官異文宗皇帝大用其言不通人事氣直不樂者或終年不與之語因與俗乖不得官相國牛公僧孺鎮襄陽以殿中加支使旋拜祕書省著作郎遷國子博士因久寄襄陽以祿養為便除別駕檢校禮部郎中丁艱服除再授襄陽別駕檢校戶部郎中大中九年六月三日寢疾八日終于任年五十七其年十二月十五日葬孟州河陽縣尹村娶京兆韋放女有男五人曰緯前復州參軍次曰綰曰緄曰綺曰紞舉進士女四人曰茱曰谿曰當曰著在室曾祖叡素朝散大夫桂州長史祖仲卿秘書省秘書郎贈尚書左僕射父愈吏部侍郎贈禮部尚書諡曰文公銘曰噫韓子噫韓子世以昧昧為賢而白黑分眾以委委為道而曲直辨生有志而卒不能就豈命也夫豈命也夫㣥老大和中進士佛道化而無私天道運而無積無私闕一字以廣濟無積固乃應時此上二者同德而異名寂寞幽元眾妙之門考其煦育一也今斯佛場大拯生死百姓日用於此何益有矣夫俾眾情知去惡而就善去禍而就福唯上智與下愚不移抑各有所利大畧不然者則曷以載育庶物度彼蒸民令殊路而同歸如百川朝宗咸會于海夫其佛法流傳肇於漢代瑞符聖夢善副天心自西徂東繇是崇立士庶各館皇王異尊靡不庶幾歸信者什一遂令覩者生善悟理達宗察性是空反本知卒若然者則真諦之源廣濟矣佛及菩薩共說㣥教言雖多事從一萬法攸歸物物自備苟舉一隅諸不書也初京師首剏白馬殆吳越大興佛寺昔近畿洛皆天子及公卿捨業聿修精舍今江陰縣興建寺者則梁大同元年二月四日渤海太守費公衡之所建衡則黃門侍郎昇之子肇興西漢衣冠承嗣迨今德望尚不湮微捨其別業載葺伽藍春園桃李爾乃易為禪林俗館居廬是以崇乎月殿佛法從儀沙門傳教金鐘玉磬兩韻蕭疎簷蔔㫋檀二香馥郁殿中石佛泛海而來莫知年代寺僧咸相謂曰先古宿德請歸此寺歲忽炎旱以焚香致敬甘澤必至邑人僉依靈効斯在其地昔有鳳巢於樹乃載於圖書伍相延湖固彰于版籍後負郭邑南接雲山左控姑蘇之雄右據毗陵之勝殖貨臻凑人風蘭穆十室之家殆于諸族皆有忠信或迹為俶載樂業隱逸及其幽居閑暇高遁園林諒魯連之士矣仁義束身詩書檢行者而亦有諸今此鄉閭永依佛寺擔警葷羶遂躋歸敬先屬中道陵夷緇徒寖微前上座僧請靈寺主僧惠都維那僧請林山嗣以續紹隆常住未遑勒石今寺主文獻上人及太守之苗裔數人兼諸檀越君子等共議樹碑文其往事靡不僉從其願文獻上人乃法門喉襟遠近瞻敬鈴鍵寺事條貫僧徒文道外通戒行內蘊生肇豈易休遠畧同上座靈玩上人秉節彌堅冰霜潔操運心戮力紀綱恢宏未隸寺時早曾葺理常住贖田數頃繼香積暨寶歷元年于寺西隅造法華院捨園地以充基址兼獎勸庶緣共為功德今將工郢向畢杼材成文遂得寺域周旋甚當樞要始自一簣今侔九層佛哉斯善者夫都維那季文戒行貞廉胡能有類仁德忠信善道孔昭與三綱等經之營之咸贊洪業寺舊有宿德法雲靈慎法屬清宴等導其初今已歸寂嗟夫道林賓徒遞相湮沈雖捨報身于此方故乃甄昇于上界今之道友導其後克開厥功載興載葺廣為福善伏用資我皇家而已于郡守韋公縝剛毅公廉仁明愛人搢紳之徒其從如水頻由台鼎方領此郡用弗擾政慰安罷民先張刑法以威之次施道德以育之視百姓如同小子勦兇絕豪護持大梵縣宰張公伯達煦仁風以撫俗出牛刀而佐時鳥鵲龜魚各得其化繩彼姧猾衞此佛法丞任主簿崔尉劉禇許並以遠代簪纓馳芳不泯洪才綺靡譽彰仙籍僉曰斯美者歟余自洛師而迴寺僧慮先古之業湮微見命為銘紀繕今昔之事其言也直然後躬詣精舍觀其置寺處雖無崇巒峭嶺石路雲谿乃有湖島亘前諒具區之巨浸阡陌起側侔京畿之廣途修林茂竹叶四氣以氤氳穹阜迴崗連㣥境而壯觀不然者焉能感瑞像泛溟海以招來靈鳳望煙林而巢處大叶貞祥不其盛歟劫石將燼夫何鎮於千古今憑故事于豐碑豈不斯為可久銘曰邈哉寶剎洞矣元門道尊天地德重乾坤俾未悟者來知真源愚智萬種破惑一言洛及吳都歸心已于公卿捨業競造精廬士庶崇信迴向如趨一葉化世三車引途偉哉梁代善有其人費氏別館建斯福因禪林永茂松柏長春鴈塔凌漢鉷鐘報晨臺殿雲連鴛鴦瓦翠道徒鈴鍵運心克志闢開厥功迴廊周備載興載葺是崇是置世途隳矣福場久斯石盡刱改山漂海移於焉靡誌夫何記其眾議礱石樹茲豐碑大和二年戊申歲二月八日主寺僧文獻置進士魯郡郁㣥老撰圖文宗時人君諱源字文宗先帝王之苗裔也遠祖商漢中書侍郎祖壹唐林泉不仕父興闕園放居古之君子也周秦之世晉宋以來徙從吳郡海鹽勝邑樹德樹居不仕朝廷隱從闕嗚呼以開成元年十一月二十五日卒于私第以其年十二月庚寅朔十九日甲寅葬于海鹽縣南三里地號烏夜鄉名海鹽其塋也長松藹日青楓倚天其所也東流滄海西接甘泉南枕秦山之隅北抵武原之地君壽也六十有二娶河南司徒氏生三子少怦少通少平其子立也雖未閶闔之途有懷謹終之孝日月逝矣歲不我畱勒石記之用存今古其詞曰野霧蒼蒼寒郊茫茫猗歟闕俄遭夜霜
