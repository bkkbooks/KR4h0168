front:
  text: 全唐文欽定全唐文卷七百四十一珙博陵安平人書判拔萃高等累佐使府太和初由泗州刺史入為太府卿七年拜嶺南節度使徙武寧軍節度使開成二年入為右金吾大將軍遷京兆尹會昌初轉戶部侍郎領諸道鹽鐵轉運使以本官同平章事兼刑部尚書進門下侍郎銀青光祿大夫兼左僕射素與崔鉉不協鉉輔政貶澧州刺史再貶恩州司馬宣宗立徙商州以太子賓客分司東都起為鳳翔節度使大中三年辭疾以太子少師分司東都就拜畱守復節度鳳翔卒
  hash: sha256:9f20406a2cd307bd26717936d5e377796e9ac82d4652fc46aee3403859bced1b
