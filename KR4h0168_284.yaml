front:
  text: 全唐文欽定全唐文卷二百八十四張九齡二
  hash: sha256:e45c5cc4a8b87c09661d4b3756aeaf42d9734a92c58664643df275d072fab37e
body:
  text: 敕每歲舉人求士之本專典其事寧不重歟頃年巳來惟考功郎所職掌位輕事重名實不倫欲盡委長官又銓選猥積且六官之例體國是同況宗伯掌禮宜主賓薦自今已後每諸色舉人及齊郎等簡試並於禮部集既衆務煩雜仍委侍郎專知敕朕所時邁皆順物情頃屬關輔無年遽爾東幸固非為已將以息人今百穀既成庶務皆省而五陵所奉誠在京師安可更留周南有闕時薦宜以來年正月七日取南路幸西京所司準式應緣行幸所須務從節減所由明為條例勿使勞煩敕歲比不登人或流亡言念菜色朕用疚懷而牧宰是寄惠養猶缺黎元為本賦斂未均當寧思之良所於邑且十連為率六察分條周漢以還事有因革帝王之制義在隨時其天下諸道宜依舊逐要便置使令採訪處置若牧宰無政不能綱理吏人有犯所在侵漁及物土異宜人情不便差科賦稅量事取安朕所責成貴在簡要其餘常務不可橫干其使宜令中書門下即簡擇奏聞朕將親覽敕言念蒼生心必遍於天下自古良牧福猶潤於京師所以歷選列城聿求連率豈徒刺察將委輯寧朝散大夫檢校御史中丞關內道宣慰賑給使上柱國盧絢等任寄已深聲實兼茂咸貫通於理道益純固於公心或華髮不衰或白圭無玷可以範儀郡國康濟黎元間歲已來數州失稔頗致流亡能勿殷懷吏又不畏不仁人或不安不便誠須矯過必在仗賢而前此使車不無殷鑒事皆掣肘務欲總權小有舉於毫髮大莫振於綱領本不條察却用煩苛永言所期豈云自弊今既各膺重寄允謂通才以蠲疾苦之原當叶大中之義若令行一道利及萬人朕所設官以待能者朝之優秩必歸令譽言可復也宜副朕懷可依前件敕諸贈太子頃年官為立廟並致享祀雖欲歸厚而情且未安蒸嘗之時子孫不預若專令官祭是以疏閒親遂此為常豈云教孝其諸贈太子有後者但官為致廟各令子孫自主祭其祭置及官悉停若無後宜令依舊敕天地以大德生㣥品聖人以大寶守萬物古者受命之君謂之承天之序明有所代夫豈徒然若道無欽崇命不永保帝實臨汝人曷戴君朕所以每期庶乎合於仁覆之意也夫宓羲神農黃帝堯舜或誅而不怒或教而不誅彼亦何為獨臻於此朕自有天下二紀及茲雖未能畫衣以禁亦未嘗刑人於市而政猶踳駮俗尚澆漓當是為理之心未返於本耳凡人豈不仁於父母兄弟不欲於飲食衣服乎而卒被無孝友之名不溫飽之困其故何哉蓋未聞義方不識善道或任小智而為詐或見小利而苟得致遠則窮繼之以暴已而身受戮誅家不相保愚妄之徒類多自陷訟獄之弊恆由此作吁可悲乎亦在教之不明也蓋刑罰者不獲已而用之天下黔黎皆朕赤子以誠告示其或知歸何必用威然後致理先務仁恕寧不懷之且五常循行豈須深識六親和睦何待丁寧自宜勉之以副所望刑措不用道在於茲今獻歲之吉迎氣伊始敬順天常無違月令所由長吏可舉舊章諸有嫗伏孕育之物蠢動生植之類慎無殺伐致令夭傷九土異宜三農在候聚衆興役妨時害功特宜禁止以助春事至若家有征鎮人或孤惸物向陽和此獨憂悴良可憫也亦宜所由隨事優恤蓋不體仁無以為長不知道無以用心故道者衆妙之門而心者萬事之統得其要會義可以兼濟於人失其指歸生不能自全於已故我元元皇帝著道德經五千文明乎真宗致於妙用而有位者未之講習不務清淨欲令所為之政教何從而致於太和者耶百辟卿士各須詳讀勉存進道之誠更圖前席之議至如計校小利綜緝煩文邀名直行去道彌遠違天和氣生人怨心朕甚厭之所不取也各勵精一共興元化俾蒼生登於仁壽天下還於淳朴豈遠乎哉行之可至其老子道德經宜令士庶家藏一本仍勸習讀使知指要每年貢舉人量減尚書論語一兩道策準數加老子策俾敦崇道本附益化源朕推誠與人有此教誡必驗行事豈垂空言今之此敕亦宜家置一本每須三省以識朕懷敕求賢濟理詢事考言務取由衷以觀深識頃年策試頗成弊風所問既不切於時宜所對亦何關於政事徒徵隱僻莫見才明以此擇賢良未得所卿等各膺推薦副朕虛求宜其悉心各盡所見勿復仍舊空載游詞各宜就食食訖就試敕諸縣令等自古致理其在命官今之所切莫如守宰朕每屬意尢重此官有善者雖遠必升無能者縱近必廢惟取才實非務官資事亦坦然天下所見而浮競之輩未識朕懷俾其宰邑便為棄地或以煩碎而不專意或以僻遠而不畏法或以徇已而貪婪或以畏法而巽愞浸染成俗妨奪為常嗷嗷下人於何寄命朕所以寢興軫念思以濟人故命吏曹精選才幹卿等各膺推擇用簡朕心若能理化有聲名實相副必有超擢終不食言如其謂人不知惟利是視自速負敗兩喪身名智者所圖應不至是各宜勉勵以副勤屬敕新除河南府密縣令張稷等令長之任黎庶尢切比嘗選舉未盡得人然而勇進之流乃非其好矯弊之政豈無所革令既各膺獎用當盡良能期月有成聲能若著所列清要惟待賢才既爾有聞不患無位各宜勉勵以副朕心敕朕憫茲下人不忘寤寐庶乎富教寄在牧宰所以推擇才能親加考核卿等各膺時用副朕虛求亦既得人佇聞佳政若能鋭精為理聲績有稱即當待以不次信斯言之可復如其政不能舉行且有遺豈獨敗於厥躬必將坐於舉主此亦明約不得不然各宜勉之以成名節今賜卿少物各宜領取並於朝堂坐食食訖好去敕布帛不可以尺寸為交易菽粟不可以杪勺貿有無故古之為錢將以通貨幣蓋人所作非天實生頃者耕織為資乃稍賤而傷本磨鑄之物却以少而致貴頃雖官鑄所入無幾約工計本勞費又多公私之間給用不贍永言其弊豈無變通往者漢文之時已有放鑄之令雖見非於賈誼亦無費於賢君況古往今來時異事變反經之事安有定耶終然固拘必無足用且欲不禁私鑄其理如何公卿百僚詳議可否朕將親覽擇善而從敕朔方軍節度大使兵部尚書信安郡王禕總戎朔陲經略萬里賦車籍馬精卒鋭兵自其有虞莫不素練而醜虜背誕偏師致誅謀若有神取如俯拾雖廟略之云遠亦將士之力焉威武載揚頑凶且懾狂寇覆巢以奔北㣥師掉鞅而來歸因其凱旋聊加宴樂各宜坐食相與盡歡其軍將巳下官賞別有處分信安郡王禕與一子官敕幽州老人師知禮等比者林胡翻覆薦歲不寧戎馬之鄉良亦深苦而賊虜自叛天實誘之主將致誅略無遺噍實除邊患且減征徭卿等忠義因心遠來陳賀深所嘉尚並宜坐食各有賜物食訖領取敕時向炎蒸人或冤繫豈忘仁恕固須審察其京都城見禁囚宜令中書門下及留守檢覆訖徒已下罪各諉所由長官據情狀量決罰便放死罪巳下遞降一等有情狀難容合決格杖者決訖準例處分天下諸州亦並準此敕邊境為患莫甚於林胡朝廷是虞幾煩於將帥車徒屢出芻粟載勞使燕趙黎氓略無寧歲而山戎種落常為匪人近有野心窮而歸我曾是懷附每所撫柔而不變梟音輒為獸搏幽州節度使副大使張守圭等乘閒電發表裏奮討積年逋逃一朝翦滅則東北之祲便以廓清河朔之人差寬征戍此皆上憑九廟之略下仗㣥帥之功今其凱旋敢不以獻宜擇吉日告九廟所司準式敕辥泰朕撫育降奚每事過厚衣食供給數年於茲而禽獸無知不懷恩信相率種落一時叛亡此於國家譬猶蚊虻耳無所憚惜惟惡惡心總是亂階私相招誘若不撲滅何以示威卿可率所統與紀思誨王忠嗣等計會進討卿既身在邊鎮深練兵權進退動靜惟變所適敵則預料奇出臨時會在審量不可輕舉氣候漸暖卿及將士已下並得如宜遣書指不多及敕安西副大都護王斛斯使人兼趙璧近至省表具之前已敕卿嚴加部勒近得奏請皆依處置卿當此信任必用盡誠蕃鎮之虞且無西顧頃者劉渙凶悖遂起姦謀朕以偏荒比加隱忍而惡跡轉露人神不容忠義之徒復知密旨自聞伏法自取誅夷狂愚至深亦何足道卿與彼地近想備知之突騎施北來窺隙會須審察至竟如何蕃中人來未可輕信但當撫養士卒而臨事制宜必先保全以此為上夏初已熱卿及將士已下平安好遣書指不多及敕西州都督張待賓纍得卿表一一具知劉渙凶狂自取誅滅遠近聞者莫不慶快卿誠深疾惡初屢表聞邊事動靜皆爾用意即朕無憂也夏初漸熱卿及將士官僚百姓已下並平安好遣書指不多及敕清夷軍使虞靈章窮寇傷殘寄命無所猶以遺噍敢犯塞垣卿義勇過人臨難無苟親當矢石逐此犬羊略有梟夷足申威武邊寄盡節朕甚嘉之仍聞鋒鏑既交在卿亦有所損神道助順應不為災今將藥物可以時療所有將士用命即具狀以聞其不幸陳亡固將深悼惜亦宜追恤當有加贈夏末甚熱卿及將士巳下並平安好遣書指不多及敕伊州刺史伊吾軍使張楚賓近得卿表知沙陀入界此為劉渙凶逆處置狂疏遂令此蕃暫有遷轉今劉渙伏法遠近知之計沙陀部落當自歸本處卿可具宣朝旨以慰其心兼與蓋嘉運相知取其穩便豐草美水皆在北庭計必思歸從其所欲也卿可量事安慰仍勿催迫處置了日具以狀聞夏中盛熱卿及將士百姓已下並平安好遣書指不多及敕河西節度使牛仙客邊事煩總苦已勞神若不纖悉安得條理頃聞訓練士馬蓄積軍儲資用有餘動不忘備是卿忠烈更勤經略事事如此朕復何憂摩管之聞想皆得所卿近有奏請並已處分夏末甚熱卿及將士百姓已下並平安好遣書指不多及敕北庭將士瀚海軍使蓋嘉運已下逆胡忿戾乘此猖狂驅率匪人圍犯邊鎮皆如素慮不出下策卿等雖在絶境且據堅城將士一心莫非義勇觀釁而動取亂在茲宜臨事籌之無失此便但蘇祿本以姦詐誑誘㣥胡無德在人何能有國今乃驅烏合之衆作不義之舉師曲在老族滅其時卿可因其不固之心乘其已疲之衆掎角歸路翦滅逋醜此亦天與豈直人謀仍熟料之取萬全也國之重賞惟待奇功豈在言之自良圖耳比秋氣已冷卿及將士百姓並安好遣書指不多及敕西州都督張待賓及官吏百姓已下不虞狂賊擁衆多時彼州軍人素乏器械聞其悉力能不懸心卿等堅守孤城敵此凶寇亦既久拒終然萬全斯乃義可感幽鬼神相助妖不勝德氛祲自銷來無所能去無所得犬羊之衆道路埋魂其於破傷亦云甚矣向使甲戈有豫士卒且強躡彼歸途可無噍類即令所司支料以備後來其有功之人各且據實以時敘定當有酬賞其龍泉寺小堡被其殘破雖巳收拾猶慮損傷各宜宣慰令得存活秋氣巳冷卿及寮吏百姓巳下並平安好今賜卿衣一副至宜領取遣書指不多及敕北庭將士部落及百姓等忠義所感在臣子而固然凶惡必誅雖鬼神而亦爾逆賊劉渙不意含氣有此狂愚忽於夷塗坐生逆節姦謀雖起狡數自窮誘人不從欺天斯甚由是忠義奮發凶醜就擒雖則奴庸何足比數然則荒徼亦云除惡皆是卿等同心盡力向國輸忠能協人鬼之謀不貽戎狄之笑朕每以嘉歎無忘於心所云有功皆巳優賞懲惡勸善實在於茲夏中甚熱卿並平安好遣書指不多及敕新羅王金重熙金獻章及僧沖虛等至省表兼進獻及進功德並陳謝者具悉卿一方貴族纍雄材秉忠孝以立身資信義而為國代承爵命日慕華風師旅叶和邊疆寧泰況又時修職貢歲奉表章進獻精珍忠勤並至功德成就恭敬彌彰載覽謝陳並用嘉歎滄波萬里雖隔於海隅丹悃一心每馳於闕下以茲歎賞常屬寢興勉宏始終用副朕意今遣金獻章等歸國並少有信物具在別録卿母及妃並副王宰相以下各有賜物至宜領之冬寒卿比平安好卿母比得如宜官吏將士百姓僧道等各家存問遣書指不多及敕新羅王開府儀同三司使持節大都督雞林州諸軍事上柱國金興光賀正使金碣丹等至兼得所進物省表具之海路艱阻朝賀不闕歲亦忠謹日以嗟稱所謂君子為邦動必由禮頃者渤海靺鞨不識恩信負恃荒遠且爾逋誅卿嫉惡之情常以奮勵故去年遣中使伺行成與金思蘭同往欲以叶謀比聞此賊困窮偷生海曲唯以抄竊作梗道路卿當隨近伺隙掩襲取之奇功若有所成重賞更何所愛適欲多有寄附實慮此賊抄奪不可不防豈資窮寇待蕩滅之後終無所惜一昨金志廉等到緣事緒未及還期忽嬰瘵疾遽令救療而不幸殂逝相次數人言念殊鄉載深軫悼想卿聞此良以增懷然死者生之常固其命也固當理遣無以纍情初秋尚熱卿及首領百姓已下並平安好今有答信物及別寄少信物並付金信忠往至宜領取遣書指不多及敕河西節度使牛仙客戎狄無義禽獸不若但當以兵威取此豈可人道論之突騎施頃者通和朕每撫之如子行李往來不隔歲時賜與優饒非直君長而窺我邊隙圖陷庭州闕俟斤所以見誅天下孰云不當不思已過仍敢我讎率其犬羊犯我皇堡是其送死之日可謂天亡之時若不因其自來乘危決策一失此便後悔何追宜密令安西徵蕃漢兵一萬人仍使人星夜倍道與大食計會取護㪍達等路入碎令王斛斯自領精騎取其家口河西節度內發蕃漢二萬人取州比高同伯帳路西入仍委卿簡擇騎將統率仍先與西庭等計會克寸日齊入比已敕朔方軍西受降城定遠城及靈州兼取大家子弟並豐安新泉等軍共徵二萬於州北庭招託就中簡擇驍健五千人先入直赴北庭從州宜給一月熟糧若至北庭糧貯可支五年以上凡此諸道徵發並限十二月上旬齊集西庭等州一時討襲時不可失兵貴從權破虜滅胡必在此舉卿可火急支計無失便宜今故使內侍程元宗催遣兵馬一一口具秋氣漸冷卿及將士百姓已下並平安好遣書指不多及敕瀚海軍使北庭都護蓋嘉運及將吏軍士百姓已下蘇祿反虜敢為寇讎犯我邊城初聞蟻附投兵死地果自冰銷朕始料之一不差也近得卿表知其狼狽而賊既不利衆必攜離犯順違天招殃破國將在此舉已見其徵卿等堅守孤城赤心邊徼言念及此嗟尚久之初解重圍差有勞苦將士已下並得如宜又卿表所云護被殺事勢合爾殆非妄傳向若安西出兵乘虛討襲碎逆醜皆可成擒應為懸軍未能越境逆虜漏刃莫不由茲今賊雖請和恃我張勢以防大食之下以鎮雜虜之心豈是真情此其姦數卿可與王斛斯計會向其動靜因利乘便取亂侮亡不以此時知待何日儻成功立業重賞高班信若四時固必然也近者所有效功一皆委卿甄録各據實狀具以名聞初冬漸寒卿及將吏軍士百姓並平安好遣書指不多及敕王斛斯得卿表知諸將接勇亦有克捷是卿指麾獲此凶醜蘇祿背德敢茲寇讎自斃犬馬之㣥我無毫釐之失聞其狼狽疲羸滿道乘此翦撲勢若摧枯張羲之等雖各行誅猶恨其少古之善用兵者不必在衆能制敵者會在出奇狂賊此來真亦送死衆既不整心且非一烏雜之虜持久氣衰向有奇決破之必矣且如所奏亦足申威其將士立功擒殺有狀各據實聞奏當加優賞頃來諸軍奏請所患在於不實將既虛敘人則妄求如此相蒙自然撓法朕以信示下以賞勸勞豈於其閒亦容有詭故委卿在遠所寄則深必取誠實勿令致此冬初已冷卿等及將士以下並平安好遣書指不多及敕幽州節度副大使兼御史中丞張守圭漁陽平盧東北重鎮胸奴斷臂山戎扼喉節制之權莫不在此朕所以雅仗才識誠思遠圖既膺此舉當成本志今奚賊殘破固不足言契丹餘孽猶且為梗將遂掃蕩懸賞須明至如寇抄之來邊境常事苟非大敵不勞我師頃者偏小邀功或亦附益其事言而不實示信何歸賞而有虛敘勞何勸適使貪嗜小利之輩不思翦滅大舉之策則深謀重賞更待何人而革弊成功當在卿爾其有賊非大下因有擒馘灼然殊效者可量事奏聞其餘微勞並任軍中賞賜冀能自勉令有後圖若信其苟為終若成事而綱紀不立夷狄笑人以卿之明固在目擊也秋氣已冷卿及將吏以下並平安好遣書指不多及敕張守圭安祿山兩蕃自昔輔車相依奚既破傷殆無遺噍契丹孤弱何能自全復聞突厥徵求欲有逃避傳者縱其未實此虜終已合然藉卿運籌徐以計取況祿山義勇武藝絶人謀帥得賢裨將復爾以討殘蕞勢若摧枯仗順而行何敵之有今者又云遇賊略有芟夷乘其數窮日向殲盡其灼然有功效者可具以狀聞會取實勞以當優賞趙堪云卿見部勒欲以師行兵貴從權以時經略在卿臨事一以委之效命輸忠成名立事居今慕古千載一時衛霍之儔獨何人也邊事煩總無乃為勞冬初薄寒卿及祿山並諸將士已下並平安好遣書指不多及敕劒南節度副大使兼採訪使益州長史攝御史中丞王昱蠻夷相攻中國大利自古如此卿所知之然吐蕃請和近與結約㣥蠻翻附彼將有詞卿可審籌其宜就中處置使蠻落不失望吐蕃又無憾詞柔遠懷來在卿良算所請入奏豈欲固違屬諸蠻初降正有邊要馳傳以入不日遄歸來去不遑逮為勞力卿當此重寄每竭公忠言念遠情當亦想見義非獲已來歲何遲冬初薄寒卿比平安好遣書指不多及
