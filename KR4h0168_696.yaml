front:
  text: 全唐文欽定全唐文卷六百九十六德裕字文饒趙郡人宰相吉甫子文宗朝拜兵部尚書以本官同平章事封贊皇伯為中書侍郎集賢殿大學士罷為興元節度使徙鎮海軍武宗立召授門下侍郎同平章事兼左僕射守司徒進太尉封衛國公宣宗立以太子少保分司東都再貶潮州司馬又貶崖州司馬卒年六十三
  hash: sha256:5d5801c4b5b53ae162c2bae6b9d1c39f5e90d87a1a398edbb8494bb27770f4b1
