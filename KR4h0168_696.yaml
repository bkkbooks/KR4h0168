body:
  text: 蜀道有青城峩眉山皆隱淪所託辛亥歲有以鑄金術干余者竊嘆劉向纍世懿德為漢儒宗其所述作根於聖道猶愛信鴻寶幾嬰時僇况流俗之士能無惑於此乎因作賦以正之漢武帝遭世承平百蠻以寧自謂德成堯禹功高湯武聞升龍於鼎湖乃甘心於斯語有方士李少君譎詐丕誕乘邪進取盛稱化丹砂為黃金可以登青霄而輕舉時董大夫侍側帝曰子知其術乎仲舒進曰臣惟聞天地變化聖人鎔範方士之言臣以為諂至如圓方為爐造化為冶鼓風為士冖柘熾陽為火元黃之氣絪縕和粹稟而生者為仁為智是以生寶實繁終古不匱天地之鎔範鼓鑄也如是及夫堯舜之化大道為爐中和為冶聲教為士冖柘文明為火以法天為造以得賢為寶是以得其鴻名後天難老至於仲尼無位大莫能致猶鑄顏與冉底於極智聖人之鎔鑄也取類若乃不務德業營信祕籙祈年永久以極嗜欲斯則不由於正道無益於景福帝曰善乃罷方士而去之故得漢道隆盛令名不虧成都夾岷江磯岸多植紫桐每至暮春有靈禽五色小於元鳥來集桐花以飲朝露及華落則煙飛雨散不知其所往有名工繪於素扇以賚稚子余因作小賦書於扇上桐始華兮緑江曙粲鮮葩兮泫朝露樹煜煜兮霞舒鳥爛爛兮星布彼嘉桐兮貞且猗當暮春兮發英蕤豈鵷雛之珍族又棲託乎瓊枝被零露兮甘且白涵曉月兮灑鮮澤豈青鳥之靈儔常飲吮乎玉液有嘉穀而不啄有喬松而不適獨美露而愛桐非人間之羽翮逮花落而春歸忽雨散而川寂悵丹穴之何遠想瑤池而已隔爰有妙工圖其麗容宛宛兮若餐珠於芳蘂飄飄兮疑振羽於光風感班姬之素扇空皎潔兮如霰亦有美人增華點絢雀伺蟬而輕騖原注南朝畫扇尤重蟬雀女乘鸞而微眄未若繪斯禽於珍箑動涼風於羅薦非欲發長袂之清香掩高歌之孤囀庶玉女之提擕列崑墟之瑤宴乃為歌曰青春晚兮芳節闌敷紫華兮蔭碧湍美斯鳥兮類鵷鸞具體微兮容色丹彼飛翔於霄漢此藻繪於冰紈雖清秋之已至常愛玩而忘餐客有以通犀帶示豫者嘉其珍物古人未有詞賦因抒此作蓋盡其美焉君子以良玉比德豈不以溫潤而近人惟駭雞之至寶亦含章而可珍包黃中之粹色發奇彩之彬彬芝草繞葩而獵葉煙霞異狀而輪囷雖復孕元兔於月魄隱青鸞於鏡塵顧霄漢之悠遠悵工人之弗真匠者以其靈可禦邪光能遠燭剪截本末發揮藻縟砥若礪金剸如切玉析以為帶加之盛服御之則祔一作附身褫之則韞櫝似達人之卷舒不專玩乎掌握矧乎白璧雖美尚不掩瑕何茲物之無玷豈待瑩而增華溫兮如玉氣舒虹粲兮若晨光爍霞彼廓落之繁飾諒無足以稱嗟若乃名山岑寂珍圖譎詭柳谷則麟馬粲然扶風則魚龍隱起徒有象而無施故雖奇而莫擬然則美服珍玩近於禍機虞公滅而垂棘返壯武殘而龍劍飛先哲所以聞象則服防患則微經侯委珮而去宣子辭環以歸鼓吹本軒皇因出師而作前代將相有功則假之今藩閫皆備此樂余往歲剖符金陵有童子六七人皆於此藝特妙每曲宴奏之及再至江南並逾弱冠悲流年之倏忽憶前歡而悽愴乃為此賦追昔吳會之年思為衛霍之將懷瀚海而發憤想狼居而在望厭桑濮之遺音感簫鼓之悲壯每聞茲樂心焉猶尚爰有侲童原注出西京賦㯋秀含聰思慮未敢專和發中繁會曲折變態不窮交簻爍電揮手成風或纍發而碎隱或徐辨而從容管孤引以嘒嘒鼓輕投而逢逢若乃清景妍和嘉客來萃登高臺而互動對芳樹而並吹見鵬鶚之爭厲聳壯士之憤氣原注鵬鶚爭壯士怒皆鼓吹曲名忽疑翔雁呌於寒煙胡沙蔽於天地其始也若伐木丁丁響連青冥喧禽萬族聲應崖谷其縱也狠羊鬬角奔兕相觸轉石振於崩溪燎野焚於寒竹其終也如風飈暫息萬籟皆肅天地霽而雷霆收川波靜而魚龍伏昔我往矣子襟青青我今來思突而辨兮諒昔人之多感覩移柳而興悽惜歲年之易往歎親好之常暌於是勉其成人再命迭作念所思而不見慨悲翁之蕭索原注所思悲翁並曲名音豈殊於今昔情自有於哀樂乃知孔將比於鳴蛙陸反思於唳鶴彼衰退於憂傷並榮華之昭灼金陵城西池有白芙蓉素草口咢盈尺皎如霜雪江南梅雨麥秋後風景甚清漾舟緑潭不覺隆暑與嘉客泛玩終夕忘疲古人惟賦紅蕖未有斯作因以抒思庶得其倣佛焉朱明夕霽佳木凝陰蘭未歇其秀色鳥尚流其好音泛回塘兮清景暮環修渚兮碧流一作雲深誠有感於逝節思更新於賞心是時黛葉已繁瓊英始發搖瑞彩於波上挺纎莖於蘋末忽疑巨蚌濯一作捧漪暫覩其明月復似處子映松遙覿其冰雪煥列宿於長河耀良玉於方折點白露於葭菼散飛鴻於林樾余乃鼓輕枻入澄原注楚詞曰楚人呼池澤中曰度柳杞一作杞柳越蘭蘅徘徊容與放志遺榮近汀洲而菱密出蓮徑而潭平飛鸂敕鳥起鵁鶄揮水珠而濺葉動波紋而抗莖傳羽卮而適性合金絲而寫情管度風而音遠歌臨流而轉清既而稍憩一作出川陰暫遊霄外極望漪瀾靜無夕靄又如遊女解珮於漢曲宓採蓮一作芝於湍瀨舒薀藻以為席倚立荷以為蓋發巧笑之芬芳感嘉期之來會嗟夫楚澤之中無蓮不紅惟斯華以素為絢猶美人以禮防躬銀輝光而流燭玉精氣而舒虹雖有貴其符采且未匹其華容由是南國之姝以為麗觀延華頸於沼沚曳羅裾於磯岸且謂降元實於瑤池徙靈根於天漢悵霄路兮永絶與時芳兮共玩聽高柳之早蟬悲此歲之過半彼妍姿之昭灼待風雨而消散乃為歌曰秋水濶兮秋露濃盛華落兮嘆芙蓉菖花紫兮君不識萍實丹兮君不逢想佳人兮密靜處顏如玉兮無冶容吳興郡南白蘋亭有重臺芙蓉本生於長城章后舊居之側移植蘋洲至今滋茂余頃歲徙根於金陵桂亭奇秀芬芳非世間之物因為此賦以代美人託意焉昔柳惲為吳興太守顧座客而嘆曰遊汀洲以採蘋憶瀟湘之故人悲白日之已晚惜青春之不返且欲拾瓊蘂於桂山折瑤華於蘭畹客乃稱曰彼有清川爰生瑞蓮紅葩煒而日昱日昱翠葉小而田田原注此花大於常蓮而葉小於衆荷願得薦佳名於君子悅麗色於當年於是縱蘭棹泛淪漣吟朱鷺於笛一作簫管鳴鵾雞於瑟絃臨漪瀾以遠望嘆華艷之何鮮是日際海澄廓微風不起涵麗景於碧湍爛朝霞於清沚鮮膚秀㯋攢立叢倚疑西子之顏酡自館娃而戾止遠以意之若珠闕玲瓏映崑峯粲玉女之光色抗霓旗以相從迫而察之若桂裳重復鬱撓丹谷思江之窈窕發紅羅之紛郁爾其映蘭芷出蘋萍掩萋萋之衆色挺嫋嫋之修莖泫清露以擢秀流鮮飇而發精雖草木之無情亦獨立而傾城若乃行潦既收秋光始靜見涼野之夕陰悵回塘之餘景思摘芳以贈遠更臨流而引領翡翠失其輝鮮珠璣奪其光㯋惟斯物之特麗宜獨秀於寥天在靈境而何降居下澤而何偏有繁華而不實嗟淑類而莫傳念莊薑之無子非巧笑之未妍彼天意之所屬諒難得而知焉原注此花無實徙根又不三數年故人間罕有乃為歌曰吳山秀兮煙景媚因淑女兮感斯瑞蓮雖多兮無厥類蘭徒芳兮何足貴人已去兮代不留獨含情兮託茲地仰山在郡之坤隅高松翳景名翬所集有麗鳥殊色原注殊色出應瑞鸚鵡賦文如縟繡邑人呼為山鳳凰愛其毛羽重於身命雖遭矰繳終不奮飛比夫雄雞斷尾則殊知異心矣余感而賦之以貽親友懿靈山之岑寂實珍禽之可依何文章之英麗信羽族之所稀混赤霄而一色與白日而增輝煥若玉女擕宓凌丹壑兮遊翠微振桂裳兮垂組綬騰鑣駕兮曳鸞旗粲若夭桃發兮山已春朝霞爛兮露欲晞或飲於澗或集於磯糅芙蕖之絳采掩虹霓之夕霏既而衡網高懸虞人合圍身挂纖繳足履駭機畏采毛之摧落不凌厲而奮飛乃知玉之敗也以致其瓊辨翠之焚也猶襲其寶衣何異夫懷祿耽寵樂而忘歸玩軒冕而不去惜印綬而無時嗟乎乘君子之器與茲鳥而同譏故人以孔雀見遺死於中途將命者提挈一作擕空籠與翠尾皆至余憫而為賦感君子之嘉惠意未忘於所知擕珍禽以贈余諒有貴乎羽儀去舊國之岑寂歷三湘之嶮巇念未飛之衆雛懷獨宿之羇雌忽哀鳴而望絶遂委翼而長辭異黃鵠之高翔揭空籠而載馳想綷羽而不見覩修尾而增悲蘭色芊鬱金華陸離垂之兮疑拖緑盩音戾綬名舉之兮如飛翠緌嗟紱冕之寄身與鍛翮而一概雖暫榮而可樂終以飾而賈害况復德輶如毛而鮮舉福輕乎羽而莫載何必負斯尾之翹翹冒長途而效愛余嘗感漢朝錯魏桓範皆號為智囊不能全身竟罹大患揚子稱或問多以智殺身雄對曰臯陶以其智為帝謨箕子以其智為武王陳洪範殺身者遠矣余久欲賦之比屬逾紀總戎願言不暇今俟罪江徼倣徨歲深筐篋之中典籍皆闕聊以所記古今興敗粗成此賦夫天之清氣為人而人之清氣為智苟虛心而沖用必窮神而索至况恬養以保身豈憂患之能纍何與敗之相詭乃躁靜而殊致或明遠而無疵或馳騖而役思故由於彼而入聖門出於此而爭利器若乃淡然元默應變無方韜隨和而不耀匣干越而寶藏雖不止如炙輠猶淵然如括囊君子所以有斯號者蓋欲保無咎於末光夫智可以養生乃能周物道無夷險用有工拙得於身也祭以免而荀以全失於邦也臧不容而湯不沒彼前軌之昭然曾未戒於危轍嗟乎水濟舟以致遠亦覆舟於畏途智排患以解紛亦有患於不虞將不殆於無涯信莫尚於冥樞或有好學務敏擇仁乃廬斯先哲之所履亦庶幾於不渝然則天智間間不嬰世故舉始終而後入先奔沉而預慮或衛足之無術故離形而盡去呂易宗於奇貨疾知來於武庫雖乘勢與億中非淑人之所務鴟夷子喟然嘆曰昔我經世徒聞智憂索遺珠而不得復明燭其焉求與萬物而道夭又何謨於大猷今我所謂智者乘五湖之浩蕩永終老於扁舟此郡巖壑重復榛林鬱盛樵採之子未嘗輟音往往沿流而下詣余求售余因積薪於庭竊有所嘆乃為積薪賦賦曰邈巖居之幽遠有楚澤之放臣方絶學以自爨誠未暇於披榛悲顏子之飯煤感萊蕪之生塵時束蘊一作縕以請火訪蓬茨於善鄰乃遇樵客維舟水濱余訊之曰樵採賤業常棲隱淪詩既嘉於刈楚傳亦嘆於析薪爾豈延瀨之客不取金而且貧又豈叔敖之子以好廉而苦辛何乃負擔不已其生實勤客顧余而嘆曰貴則近禍富多不仁寄迹於此以養吾真善大雅之知言信芻蕘之可詢既而交加纍積高下齊均矗若井幹似龍鱗避氿泉而無浸先曲突以斯陳苟知防患之術終無焦爛之賓嗟長孺之昧道常喻此而求伸雖後來而高處亦居上而先焚使薪為能言之物豈容入爨而揚芬未若生幽崖之側糾芳桂之輪不近野田之燎免罹匠者之斤冒霰雪以終歲齊天年於大椿癸丑歲余時在中樞丞相路公見遺欹器贈以古人之物永懷君子之心嘗欲報以詞賦屬力小一作少任重朝夕盡瘁固未暇於體物今者公已歿世余又放一作旋逐忽覩茲器悽然懷舊因追為此賦置公靈筵詞曰昔周道砥平既安且寧赫赫公旦配德阿衡謂難守者成難持者盈始作茲器告於神明至仲尼憲文武之道思周公之德入太廟而觀器覩一作見遺法而嘆息且曰月滿而虧日中一作盈則昃彼天道而常然欲久盛而焉得乃沃水於器微一作俯察要終挹彼注茲受一作授之若沖虛則臲卼似君子之困蒙中則端平若君子之中庸既滿則跌一作滿則傾跌霆流電發器如坻隤水若河決非神鼎之自盈異衢樽之不竭蓋欲表人道之隆替明百事之有節然茲器也不以中而自藏不以跌而自傷其過也如彼薄蝕其更也浸發輝光得其道者居則念於豐蔀動乃思於謙受顏既復而不遠惠屢黜而何咎知任重之必及悟物盈之難久雖神道之無形常參然於前後昔與君子同秉國鈞公得之為賢相余失之為放臣覩遺物之猶在懷舊好而悲辛思欲克巳以復禮永報德於仁人此郡多蚍蜉余所居臨流實繁其類或聚於袵席或入於盤盂終日厭苦而不知可禦之術因戲為此賦令稚子煜和之惟江潭之下國况幽居於澤畔何螻蟻之微物亦有徒而凌亂或泮散於經笥或夤緣於食案余乃戲而問之曰爾能居厚地而漏山阿無乃處吾身而為大患蟻不能言辭以意宣其旨曰我稟形於造化亦一氣之所甄嘗濟齊師之乏亦聞媯德之羶覩封穴而知雨驗寸壤而得泉出以時而不息故學者得而稱焉戴粒而遊若巨鼇之冠神嶽繞磨而行若日月之麗清天若乃依垤緣壁奕奕其聚無聲其行無迹值晏溫而出遊當祁寒而入隙迅雷作而不駭微雨灑而自適生雖瑣細亦有行藏止若㣥羊之聚進加旅雁之翔乘其便也雖鱣鯨而可制無其勢也雖蛭蟥而不傷今願悔過戢於垣墻豈同青蠅之點白汙君子之衣裳此郡帶江緣嶺野竹成林每向夕有白鷺㣥飛集於林杪今所居在峯岑之上臨眺一川玩其往來有以自適因為此賦日之夕矣川陸載陰有㣥飛之振鷺顧儔匹而弄音始遵渚以亂下若濤起於清潯俄矯翼以歸來疑霰集於平林爾其遊止有度不徐不疾散雪彩於江煙皎霜容於寒日映楓葉而暫見入蘆花而還失嘆美羽之翩翻感余生之憂栗若乃不為鷁退常與鴻冥乍回合兮如練忽寥落兮如星陋汀葭之靡靡棲岸竹之青青又似素旄陳於曠野白筆森於廣庭悲夫緑篠枝弱巢非所據既蕭瑟而多風亦扶疏而受露豈不知陂澤可宿荊榛易固惡下流而不居恐摶獸之當路逮乎天清潦收獨立漣漪意態間暇羽毛襂襹或暫往而得遊鯈或終夕而守空陂隱青沙以延佇若田父之輟災重曰振鷺于飛于彼滄洲聊自適於遐曠本無心於去留思有客於微子愧植羽於宛邱信茲禽之可玩何必從海上之㣥鷗問泉途思沈侯也原注沈使傳師也余與沈侯同侍禁林俱守藩翰出入光寵垂二十年君性樂山水尤好絲竹良辰美景不廢賞心常嘆人世險艱多言可畏固未得盡其所懷也昔尚子平稱吾已知富不如貧貴不如賤未知存亡何如耳陶靖節亦稱人生實難生如之何今作賦以問之昔我與子同升玉堂回先帝之英盼被霄漢之輝光君聳駕於長沙余建斾於朱方且欲極山水之臨泛盡人生之樂康謝既好於絲竹陶亦間於壺觴雖爵服之已貴何憂思之未忘寶瑟獨奏於門庭玉顏不畜一作出於洞房今則逝矣前榮可傷於是託意宵夢久而乃寐問冥昧於故人求神道之髣佛或曰生特在於行樂死何用於虛諡或言唯令名之不泯非苦節而安致彼終古之茫茫竟斯言之誰是又曰君有瑤席尚可陳兮君有清香尚可焚兮昔之艷姬復得見兮昔之哀歌復得聞兮誰為朋友展戲謔兮豈有樽酒接殷勤兮余聞神之清者上為列星德之粹者復為賢人萬化轉續如在鎔鈞或壽或夭或鄙或仁亦受氣於蠻貊仍託形於介鱗獨讒人沒於泉下不得同於物化懷君子之素風方俟命於昊穹無乃困武叔而見宏石迫無極而值充躬有明龍而害正有儀尚之蔽忠苟不罹於此患固無傷於道窮余茲年五十久嬰沉痼楚澤卑濕杳無歸期恐田園將蕪不遂懸車之適乃為此賦五十已至生涯可知在安樂而猶嘆况形神之支離傷壽有賈生之痛招魂無宋玉之詞邈故園之寥遠念歸途之未期顧稚子而悽惻想田廬而涕洟有客戾止問我何悲仲尼晚而喜易郤縠老而敦詩原注國語公問元帥於趙衰對曰郤縠可行年五十矣守學彌篤苟朝聞於聖道雖年往而未衰余乃對曰心之憂矣子豈知之嗟世路之險隘矧駑駘之已疲法先哲以行止經險阻而勿違陽息駕於折坂思保身於不危文飛轡於崤道若遺風一作大風而載馳幸回車之未晚與此路而長辭嗟乎亢必有悔盈難久持李耽寵而忘返豈黃犬之可思種嬰患而且一作乃寤渺滄波而莫追雋畏勢一作畏形勢而自引非罻罹之所羇宜見險而高舉顧軒冕其如遺雖高華之難企在哲人之所為何必求季主之盡性訪詹尹而決疑商有山兮逶迤從園公兮採芝湘有水兮漣漪繼漁父兮維絲既已覺於今是豈遑遑於路歧荊楚多飛梟余所居在岑壑之中蓋茲鳥族類所託不足嘆其蕃也天寶末韋郇公謫守蘄春時李鄴公亦以處士放逐嘗中夜同宴屢聞梟音郇公執爵流涕嘆曰長沙下國鄴公曰此鳥之聲人以為惡此好音聽之則無足悲矣請飲酒不聞梟音者浮以大白坐客皆企其聲終夕不厭余因其夜鳴不已感前賢亦罹其患乃為此賦我樂遐深幽居北岑積杉松之翠靄蔽箘簵之清陰風氣常合頽陽易沉何飛梟之茂族盡棲息乎繁林余以修短委命行藏縱心既無情於忌鵬非有嘆於巢人鳿初未嘗張羅於叢薄射宿於川潯誠不忍於思炙惟載懷於革音嗟夫天地之間禽有萬類彼鵷一作雛鳳之靈姿故特稟於間氣標靜素於鴻鵠賦妍華於孔翠獨茲鳥之可傷無一美而自庇或曰人之所處不宜來萃故聞其音而凄慘覩其貌而眙由是翔集無所摧頺逼威晝戢翼於蒙籠夜相鳴而悲思余乃嘆曰天有定命聖不能知彼冥數之未兆非畏之而可移梟集牙而戰勝入笥而福綏一作復綏造化默以潛運倚伏難以預祈一作期况乎愛子及室恩斯勤斯齊萬物以遂性豈美惡而異宜至人入鳥而不亂至治層巢而不窺我若不容於深谷使其伏竄而何之余所居在江流之上每值清景必杖策獨遊見蘆人漁子則樂而忘返莊生稱就藪澤樂間曠釣魚間處此江湖之士避世之人也班嗣亦稱漁釣一壑則萬物不姦其志是知古之賢人皆樂於此彼之垂釣者未可量焉因為觀釣賦臨江臯以四望愛春水以悠悠赴滄海以東會引清湘而北流原注此水北流想鴟夷而可覿冀漁父之出遊將欲訪行止於二子永棲遲於一邱徘徊春渚忽值釣舟奏小海之悲曲發阿激之棹謳觀其垂綸川上或縱或收悟直針之莫致原注直針楚詞察芳餌之自求追感夫子遑遑歲暮麟鳳不來弦歌誰訴客有皓髮愕而招路問孔氏之何治獨危真而未悟悲聞道之已晚乃引舟而遠去子寂聽其拏音季授綏而不顧逮乎屈平既放飄爾南征不泛泛以隨波或皎皎而揚清漁父嘆其違俗大夫甘其徇名遂鼓枻而孤往猶放歌乎濯纓若乃川霧始收秋光向夕蘭露泫而風清竹煙散而潭碧映微月於湍瀨嚮哀猿於巖壁喜良夜而不歸更鳴桹而遠適或有略小務大邈乎難量任公期年而釣鰲呂望何時而得璜且夫一竿之説所貴不綱九罭未具難希鱒魴顧余情之無欲彼大小而皆忘雖餌食而不取思寄適於濠梁余寓居郊外精舍有湘中守贈以斑竹筆管奇彩爛然愛玩不足因為小賦以報之山合沓兮瀟湘曲水潺湲兮出幽谷緣層嶺兮茂奇篠夾澄瀾兮聳修竹鷓鴣起兮鈎輈白猿悲兮斷續實璀璨兮來鳳根連延兮倚鹿往者二不從獨處茲岑望蒼梧以日遠撫瑤琴兮怨深灑思淚兮珠已盡染翠莖兮苔更侵何精誠之感物遂散漫於幽林爰有良牧採之巖址表貞節於苦寒見虛心於君子始裁一作操截以成管因天資而具美疑貝錦之濯波似餘霞之散綺自我放逐塊然巖中泰初憂而絶筆殷浩默而書空忽有客以贈鯉遂起豫以雕蟲念楚人之所賦實周詩之變風昔漢代之方侈增其炳煥綴明璣以為柙飾文犀以為玩原注傅子曰漢末一筆之柙雕以黃金飾以和璧綴以隨珠以翡翠此筆非文犀之飾必象牙之管也徒有貴於繁華竟何資於藻翰曾不知擇美於江潭訪奇於湘岸况乃彤管有煒列於詩人周得之以操牘張得之以書紳維茲物之日用與造化之齊均方資此以終老永躬耕於典墳夫受天地之正者惟松柏而已故聖人稱其有心美其後凋豈無他木莫可儔匹豫嘗嘆柏之為物貞苦有餘而姿華不足徒植於精舍列於幽庭不得處園池之中與松竹相映獨此郡有柳柏風姿濯濯宛然荑楊而冒霜停雪四時不改斯得為之具美矣惜其生而遐遠人罕知之偶為此賦以貽親友惟天地之生物均覆載而不私雖草木之殊性皆榮落之有時感松柏兮一作之得真一作自得經隆冬而乃知常集霰於窮節終秉心而不移觀夫竹嬋娟以挺秀松英茂以含滋可蔭蔚於臺榭故封植於園池嗟緑柏之貞苦爰自託於幽崖或森森於寒壠或肅肅於江一作神祠何炎徼之僻陋或珍木而在茲齊蓊蔚於蘭若儷芬芳一作貞姿於桂枝遠而象之聳幹參差疑翠旌之陸離迫而玩之布葉低垂若羽一作孔蓋之威蕤又似翠列巢以㣥棲鸞奮翼而來儀含輕煙於夕景泣零露於朝曦待一作逮秋實之繁衍綴青珠以纍纍嗟乎材不可備人亦如斯子張之容雖盛柳惠之貞則虧有長孺之正色無思曼之風姿嘆此物之具美以幽深而見遺非欲企瓊林於塵外方玉樹於前墀望舊國兮無際思故人兮未期曾不得倚樹而一作瓊樹泛瑤瑟攀條而獻蘭芝慨路遠而莫致抑毫端而孔悲顧謂稚子煜起為謠曰楚山側兮湘水源美斯柏兮託幽根條總翠兮冬轉茂實垂珠兮秋始繁彼變化兮不測焉知非張緒之精魂此郡多白猿其性馴而仁愛所止榛林不瘁果熟乃取不敢與猴相狎猴亦畏而避之昔傅休奕有猿猴賦但悅其變態似優以為戲玩且不言二物殊性余今作賦以辨之爾賦曰昔周穆之南邁將奮旅於湘沅既隻輪而無返化君子以為猿嗟物變而何常故族類而始蕃或哀吟於永夜或清嘯於朝暾峯合沓以連響水潺湲而共喧矧三聲之未絶感行客之銷魂觀其雖為異物而猶善處動不為暴止皆擇所柳松鬱而不殘楂梨熟而後取顧狖鼯與猱狿信莫得而儔侶若乃靈變難測神通有知原注淮南子稱有神曰猿女試劍而方接舉修簻而止馳養矯矢而未發眄喬柯而已悲凌峻壑而電耀挂長蘿而匏垂避側足而不履尚有畏於阽危施於射則李控弦而盈貫用於道則華養形而不衰原討華陀五禽戲中有戲猿也彼沐猴之佻巧雖貌同而心異既貪婪而鮮讓亦躁動而不忌嗟斯物之既馴有仁愛而可畏故鄧生以違性興感齊后以望恩掩泪嗟乎人之化也實可悲辛或少貴而老賤或始富而終貧中行之後困於犬畝叔敖之子疲於負薪何止鯀化熊而為厲哀成虎而不仁變欽梟於瑤席鳴杜魄於巴岷乃知人世之可厭不足控摶而自珍
