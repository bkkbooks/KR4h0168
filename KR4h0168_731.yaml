front:
  text: 全唐文欽定全唐文卷七百三十一餗字子美河南人第進士太和初拜中書舍人禮部侍郎轉兵部授京兆尹兼御史大夫封姑臧縣男九年拜中書侍郎同中書門下平章事加集賢殿大學士李訓謀誅宦官事敗餗罹其禍
  hash: sha256:010e50de333b65796e329e49443dce2060179732188fea638e2fc1f3f727e18a
  markers:
  - {type: head, offset: 14, content: 賈餗, id: KR4h0168_NFKB_731-h1, level: 1}
body:
  text: 惟天為大惟聖奉天所以就陽位郊上元禮高明之覆育答生植之陶甄告太一以祇敬擁神休而吉蠲於是米遺範於周故封土以成邱取法於乾故象形以應圓顧椒糈之莫達憑柴燎以斯傳是時星昏東壁日躔南至爰命有司肅將祀事羅幄帟以雲黕駢罍俎以鱗次藉白茅兮取諸潔薦蒼璧兮象其類皇威允穆司儀辨等而以班明德惟馨祝史陳辭而不愧於是啟禁扃警仙蹕千官拱立六龍齊膝濟濟鏘鏘匪徐匪疾奉常告備乘輿乃出覆玉葉之卿雲昭扶桑之初日齊心滌慮所以感無不通樂徧禮成故能神降之吉觀夫廣場還合泰壇互峙告萬物之生成當一陽之初晷揖㣥望以咸秩列眾靈以備祀紫微開兮天意通元氣調兮薰風起祀之大者莫盛茲道展敬乎皇心報功乎元造奏搏拊之清樂徹純殷之蒼昊實祀典之所崇諒邦家之攸保若乃陳以牲幣酌以秬鬯歌大呂以為節舞雲門以為狀達誠於氤氳之際降靈於閭闔之上騰瑞氣而宛延燭神光兮溥暢我國家報本克禋順時脩祭配太祖於座於以敬宗祀皇天於郊為能饗帝此所以神祇降鑒天人合契保昌運兮永貞崇明祀兮不替有美一人兮操其矢獻其藝發茲手敏與彼心契廣場爰設砥平乎百步之中眾目所瞻星流乎片葉之際恒規規而月滿乍肅肅而風厲是時也固當審毫釐分巨細槁木斯立自應往昔之無貫珠而來孰謂後難為繼豈非妙歸至習道合惟精積少之多而無失以小觀大而有程克中之時喫詬不能以施力造微之處離婁不得以爭明不然則一矢之短寧期乎必至一葉之微若有乎餘地諒有開而必先故無往而不利然後知射也舍耳而任目外形而專意出乎一札焉知來者之不如中乃百全勿慮前功之盡棄且夫稟絕倫之技當明試之前為眾所推發不可不中冀君所賞情不可不專由是舍矢而破固葉是穿翻光而白雪馳羽振響而清風激弦名加徹札術異攻堅非後來之居上信直道而無偏夫然則習藝者不得暫閱控弦者不可不察弦不發則吾何以述藝不修則爾亦無必安得窮五善之妙出百夫之能積時之功且棄必獲之美徒稱嗟夫今之習射則多選材斯眾若穿楊葉者曠千載而一中窮萬化之指歸得七篇於往昔何真人之形氣以異類而遷易將以明道之樞喻心之適徐徐在寐忽羽化於他方栩栩既遊忘魂交於此夕是知溥天之下萬物一也雖飛走之或殊何生成之為假形隨夢改豈必大人占之心與物遷孰云夫子聖者澹然休息怳爾飛揚闇出蠨蛸之戶潛辭蟋蟀之堂風景熙熙但娛情於胡蝶是非草草已委蛻於蒙莊既而忽忽悠悠東西泛浮動皆造適止必忘憂草上翩翻與百花而共媚林間搖曳似一葉之先秋彼賢愚波注禍福環周信乃人間之累非同域外之遊且夫浩浩陰陽茫茫㣥眾紛胷襟之憂患勞日夜而迎送是以至人因茲託諷為魚而江湖可入為鳥而風雲可控飄然而往安知棄我如遺倏爾復來又疑與爾俱夢故得弔詭之理明懸解之規方形神之寂寞有變化之云為夢也者不期而會飛也者以息相吹豈銜髮之能診蓋忘蹄之可知至乎往復須臾以化為徒寤與覺而未辨蝶將周而已殊是以大同而言萬物為肝為膽小異而說一身為越為胡苟愚智而自得實聖靈之軌模客有志業未如居多不愜六夢紛其夜動七情忘於晝接乃陳古以况今賦莊周之夢蝶聖人克崇祀典大啟皇綱布發生之新令遵迎氣之舊章於以式綏景福於以宏開化光南至生春送固沍之元律東郊展禮迎煦嫗於青陽於時太史陳詞歲發其木天子乃警仙蹕纛黃屋蒼龍矯首以虛徐玉輅啟行而肅穆千官萬騎拱神位於中霄太皡勾芒扇和風於東陸明德惟馨蒼精降靈寒色尚畱於壇墠淑氣已生乎杳冥少陽始來隨初日而其輝未赤新春乍應拂大旌而其色彌青天統則彰禮容斯覿樂聲動蕩於木氣黃道麗彩於蒼璧氣先四序克配於木德震宮光被八紘不逃於金壺玉歷迎之伊何神人以和明命既頒於執事遐邇必聞於賡歌時也韶景熙熙仁風習習日月克符於躔次草木遂生於原隰施惠而穀雨垂恩發號而春雷起蟄其道孔昭其律已調禮展於斯且殊夫禮月之夕拜之於曉有類乎拜日之朝我后崇五帝之經教酌三代之典禮振六樂之鏘鏘列千官之濟濟八音已陳乎濩武萬祇既歆於壇陛夫如是者惟聖所符惟天所啟故迎氣之祀事正皇王之大體者矣黯然若秋水者楚王有太阿之鋒窮其原則三尺成狀窺其底如百尺無蹤可以照魑魅鑒形容涵空而表裏泓澄詎私毫髮騰氣而風雲慘澹如隱蛟龍原其極良冶之功出洪鑪之裏薛燭增駭風胡視千里萬里之斜漢耿耿方侔八月九月之洞庭沈沈相似深淺難測精光不死磨越砥疑穿石之泉淬葛溪如貫河之水氣晶熒而不息質瑩徹而難比流影耀金精之上涯涘皆空凉飇鳴玉匣之中波濤不起韜映無匿埃塵不居澄曉峽黯清渠俯視則孤光溢目橫窺而一帶澄虛旁臨挾刃之徒疑開別派近映腰金之士似躍游魚比練之流奚匹容舟之所寧如其文也流而無極其清也掬之不得短長如任器之狀蕩漾有盈科之則似無雲之溪澗徑挺其形如落木之江湖深沈其色龍泉非偶巨闕難儔蓮影如植龜文若遊星綴明珠孰辨懷珠之浦環分圓月終疑映月之流洎乎霜露冷天地秋繇是票力勍敵決冤讐故得名溢古今聲流遠邇解晉鄭於紛若埽欃槍於嘒彼予一智刃於胸中其精如此冰之薄兮消釋可期人之履兮憂患是持將秉心於處險諒投足而增疑故君子假輕重之喻為安危之資跬步未移顧見吉凶生矣躊躇欲泮行觀左右流之是以義比垂裳戒同狎水乍兢兢而股戰時剡剡而屨起步雖免於褰裳憂有甚於濡履則知吉凶繫乎物動靜由乎己不敢不蹐雖厚地而莫安時止時行固輕冰之可以故知我者見我戰戰兢兢不知我者謂我視川若陵既無咎於素履尚可期於積冰或北陸初結或東風始興覩之也知其脆易破涉之也恐其任不勝由是屏氣而行虛心而進在陽敢思乎不冶通陰庶懷乎克慎身若重於千鈞冰疑消於一瞬憂心輾轉危步虛徐空色不分每疑於滅趾冰容無響或遠於曳裾將釋兮畏明君之渙若其行也懼大易之屯如然則觀薄冰之為象知立身之所尚類將墜於焦原之前如待然於積薪之上始玲瓏而若盡復皎皛而可望就其淺玉石無以隱其輝臨其深魚龍不能掩其狀大矣哉其薄斯在其虞則深將以戒乾乾於終日持惕惕之小心當見晛而或躍懼霜霰之未任故曰古之機言今之攸戒儻所行而不惑俾處薄而勿壞猱之為物兮敏捷無倫人之設教兮質性是因顧升木之容易豈從師之苦辛於是授以程度使之緣循步步彌高同下學而上達孜孜不倦若游藝而依仁原夫引進他材發揮以智不言而化若喻於義指蹤在手所謂導而不牽嗜學因心誠宜誘之孔易俾夫趫容所騁迅足無累笑碩鼠之五能掩都盧之百戲初疑鴻漸訝走險之翩翩卒若熊經忘阽危之惴惴則知夫性自天而莫改教率性而斯在失之者進寸而退尺得之者師逸而功倍從輪桷之異規隨曲直於真宰故君子將遷於物必省厥躬彼可適道吾方擊蒙野性既馴自殊於狼子怒心不發何愧於狙公牧羊以不鞭為機養雞以似木為傚一則行之而未遠一則久之而成教孰與簡易為師攀援是資既得心乎愛矣方將教以化之負淩雲之材庶幾仰止守墜地之道難可求思至矣哉發彼驍騰賴茲引力足循循而風舉木杳杳而繩直千尋雖險亦可超而宛升一跌無虞那肯勃如戰色豈翫物以為用將育材而取則所以木不告勞猱惟效順學無間於時習功自得於日進彼以求易於難致遠由近可因茲而立信凉風起兮秋初步簷宇兮躊躇有微蟲之窈窕挂輕影於空虛績不待筐固無求於蟹結而成網若有羨於魚觀其周旋細密往復輕疾縷積於纖綸成若屈其身也或垂之如墜其絲也亦動而愈出成章無札札之聲不漏得恢恢之質夜居於外同熠燿之宵行日就其功異蟻子之時術於是規模既辨詭麗無儔纖羅礙日薄霧含秋圜影初成有似毀方而合輕絲乍吐還同不茹其柔塵飛空而罒厶月結葉下樹而縈畱可以待遊蟲於死地為終日之養羞嗟夫積少者多因微者大始一絲而輕絡成眾目之交會言其巧乃織婦不如語其功孰彫蟲可配豈徒玩迴文之縹緲閱浮景之明昧風乍觸而將紛露微霑而成纇實亦愛其組織憐於琢磨將懸心而有待信役力而無他客有志業未騁勤勞則多文章徒緝職競不羅覩在戶之呈妍爾功既就慙閉門而守拙吾道如何聖上覩萬國之無事偉三農之可嘉因月令之初爰詢播植俾年豐之慶無隔幽遐於是文武畢成威儀斯列爰修耒耜之務用廣異同之說將期國實京坻人懷禮節捧書而進知地利之可分足食是圖見天心之載悅既而啟文字儼簪裾煥夔龍之獻納掩河洛之圖書得富國以如此契生人於厥初稽重穀之言徒稱董仲騐深耕之法何愧朱虛所以候驚蟄之辰應夾鍾之律昭八政之所用蓄九年之罔失是藨是蔉將致乎千斯倉爰始爰謀必因乎四之日故當載陽之候以進為邦之術俾農識不耕之凶歲獲終畝之吉且中也者表天地之交泰和也者象德化之優柔致中和之令節展稼穡之允修將明肥磽異等豐歉殊收人靡在阿之歎野傳擊壤之謳已矣哉富庶之規既如此弼諧之道必於是佐元化之風行動黎元而草靡故得祥生地表慶發天宗百穀允修臣罔慙於后稷兆人乃粒帝有邁於神農伊斯事之明盛掩前代之輝映因獻壽之嘉辰遂啟心於善政何必考李悝之地力覽崔實之月令懿此㣥公之書永作九州之慶格天之功兮不宰而成麗天之象兮乃合其明躔次無差乃可立圭以辨貞符既叶必俟重璧而呈於是曜陰魄騰陽精將周旋而一體異遠近之相傾時也萬類昭融四方清泰激朝輝之杲杲發夜色之藹藹懸異象於人間吐榮光於天外挺連城之價誰敢指瑕居匹夫之懷非同賈害金烏共色玉兔增鮮麗萬室兮瑤臺共美泛千林兮瓊樹爭妍變方流於斜漢謺圓影於遙天落照西沈若欲抵於昧谷澄暉東上又如返於虞泉熒煌異質燭燿非一抱珥之彩潛銷如圭之容闇失於以表元象明陰隲瑞至德於堯年契昌期於漢日懿其經紀不忒明宵有程聯彩徘徊似有求於潘子雙形宛轉若可賜於虞卿既同道以脗合亦相推而運行見乎天則一人有慶比於玉則百度惟貞矧今馮相觀祲而罔愆羲和敬授而無闕將冥照於幽昧在宣精於日月是以靈符必集休祜可包不縮不盈自契於三年之閏無偏無黨何憂乎十月之交豈止合采呈姿和光效異陵珠星而掩縟透洛水而增媚東西並耀疑夾鏡於長空昇降相沿異藏珍於厚地然後操觚進牘賦邦家之盛事露彩呈祥厥狀非一表四方之具慶故五色而俱出間朱青以騰文雜元黃而成質則沐聖澤者疇敢不祇被湛恩者罔有不率大化式孚瑞物斯覩究其原兮則一分其色兮惟五曖空之際若麗非煙之祥潤塊之時如啟建侯之土坤化無方至精宣光且見凝夫渥彩孰云晞以朝陽雖有本於三光三光不得不比諒無當於五色五色不得不彰豈直超絳雪掩元霜空挹瀼瀼之靈氣酌湑湑之神漿始也結以成形自東方而轉色今也出於恊慶猶上天而降康則知時在中和何物不樂超飛走而為瑞與風雨而咸若不資揭以金莖寧假承於瓊爵鍊石初染狀媧皇之補天鴛瓦纔霑類彩鳳之巢閣在漢武時方朔陳詞涉吉雲之異境得五露之靈滋曷若我后統寰海之有截應天地之無私包眾瑞之備矣選列辟而觀之自然陰陽降祉天人合應吸沆瀣延楚客之情詠厭浥動詩人之興若以彼而方此曾不得侔色而揣稱行盡煙蘿仙峯隱嶙兮高掌巍峩無得而踰扼金方之險固不言而信指秦地之山河觀其贔厂贔削成崟岑遠蹠斡開元氣剖破凝碧五千餘仞兮似假扶持百二之都兮如能指畫每勞瞻望徂秦適洛之人誰可攀援駕鶴驂鸞之客勢比捫天形標一拳旁臨而靄靄無際直上而巉巉克全稍謂動搖帶晨光而耀若如同拊擊聞石鼓以轟然可以引㣥生麾八極孤標承露之狀想蓄拔山之力霽雨飛盡見毛女同掌上之人嵐岫叢分對蓮峯為握中之色勢孤聳於岩岩形不類於纖纖折煙霞以斯出控關防而可瞻夕清而丹桂輪低疑將禠佩晝短而六龍駕逸似欲攀髯挐攫難窮規模酷似莓苔剝綠以盈握葛藟駢青而繞指因罅裂以文成偶嵌空而脈起齊大道之悠久挈坤維之綱紀有客西遊時當凜秋始憑軾以遐睇惟攀雲而寫憂吾聞太華中立黃河西流有巨靈兮受天之命擘奇峯兮裂帛斯柔故得一帶東引致洪濤而直注千尋西峙標異跡以長畱况乃豫鎮稱雄秦城是仰沈潛之右臂斯見示化之前蹤可賞豈非大壯皇都制遐荒而示諸掌議曰定尊號考列聖終古之重事有司宜用大者遠者上質百王之明烈下開千載之成法參天人之意極臣下之誠酌而舉之以正大諡故稱天以誄大莫加焉微臣得議公莫至焉所謂大者遠者蓋總夫一朝之治化四海之惠澤夷夏之率職元元之受賜皇明所臨之遠近睿斷所繫之巨小何如耳其他苟不足以升降盛德者固得畧而不論伏惟大行皇帝以英睿之資紹膺丕歷啟皇輝於磐石浴聖德於少海每欽承冊命天下感悅既即尊位孝思踰顯列聖之道率履不違禮行乎郊禋敬達乎宗廟富四海以致養榮兩宮以問安推恩廣愛累霈鴻渥發號施惠洽於百靈而又天資嚴正睿德沈毅時海內承憲宗穆宗威靈德澤之厚朝野無事生人休息初臨大寶委政宰庭春秋至富而遠蓄剛辯既閱庶務四聰益達英斷自己任賢不疑故卒能光啟誠明載安天下橫議或熾聖衷愈堅忠勳內外叶贊雄畧於是舉兵食之大計示經營乎四方而不庭之藩首自夷殄礪忠奮節視師於朝承風嚮化遐邇聳動夫不怒而威不戰而勝王者之武也推是大旨引而伸之則未形之用可見矣惜乎號未光乎天地澤未浸乎四海而變生非慮遐抱天關生靈之惋憤其可既乎七月將至同軌既集臣謹上稽國典傍考物情約以經義合諸諡法表功節惠庶叶大中書曰惟睿作聖夫以濬哲之材繼聖明之業而祖宗成式修舉罔墜禮百神而親九族尊儒術而容諫諍鋪鴻闡號聖德彰明非睿而何諡法威強叡德曰武制勝朝堂之上而威稜遠馭不俟車甲非武而何昔漢昭帝之所以為昭如此而諡法亦曰明德有功曰昭大行皇帝初雖謙讓然終任其剛斷以顯明德非昭而何夫愍者臣下追惋之誠所深切者也諡法在國逢難曰愍聖朝既討讐戡亂明告四方有司所宜率億兆之心極君親之義薦誠隆感非愍而何諡法慈惠愛親叶時肇享皆曰孝孚愛敬於率土刑家邦之孝理躬親嚴配之典奔走職來之助廣慈至德非孝而何傳曰臨之以莊則敬又記曰莊敬則嚴威擬盛烈之形容參歷古之訓典謹上尊諡曰睿武昭愍孝皇帝廟號曰敬宗謹議皇帝即位四年滄寇既平河朔無事方偃戢兵刃與人休息惟東郡地臨討伐之境歲積水旱之後罷勞之師始旋於奔命殘耗之甿久困於煩役物力殫竭資用凶荒牧養之寄於是為急乃詔兵部侍郎贊皇公李德裕以檢校戶部尚書兼御史大夫出鎮茲土時公由浙右連帥以治行第一徵復南宮既至未浹月乃膺是選擇於是日對越明命抗斾遄征若決江漢以起焦涸至則究宣詔旨躬問痛疾俾人識皇澤吏識朝典軍識法令俗知教化推心於萬人之腹下令於流水之源怠則張而振之弊則掃而更之下車三日而新政興涉旬而舊俗革周月而風偃三郡逾時而澤流四境朞年而人和歲穰厥績大成屬蜀人新被蠻寇流散未復詔選天下諸侯威可訓齊而惠可生殖者公又遷秩兵部尚書往鎮撫焉以遺愛之地所以揚豐碑而表異政也古今紀嘉績詠去思者多矣大抵久於其位方顯其跡舜典三載考績仲尼亦曰三年有成子產相鄭三年而國人始信次公居潁川前後八年而曰郡中愈治未有起積困之俗施難行之化勞徠安集生聚教訓未至期年而闡耀丕業流光馳聲若是之速也公廉明剛健精力過人博以文雅濟以經術發強開敏貫達吏事刃下無肯綮彀中無逃遁其治軍也法令嚴而賞罰信閱實其籍修利其器征勦之勳守備之勞一有可追罔不甄寵除去姑息之弊剗革因循之政戶庭無紀綱之僕營壘盡腹心之師嘗稱記曰軍旅有禮則武功成故先之以禮誼傳曰以不教民戰是謂棄之故勤之以教習至夫鑠金割革之程制耳目聲氣之容飾日省月試莫匪躬親於是師徒感悅人百其武而政成於戎旅矣其馭下也正其身以為表懸其令而莫犯守以畫一提以憲章故百吏聳視㣥職修舉廣漢之推功善而吏人稱之不容口翁歸以一警百而吏人皆改行自新與善懲違咸得其術而政行乎州邑矣其養人也拔其害本浚其利源安之而後勸功業之而後興教苛役重賦人之所困明令以蠲之樹藝畜牧生之所急躬勸以課之於是萬井千閭感勵恩德若人人皆自其手而持道之也郡有渚田千頃蓋上腴也先是畝種之人盡主兼幷之家至則均其耕墾首及貧弱俾共其利而一其征詩曰愷悌君子人之父母愷以強教之悌以悅安之故流庸四歸播殖滿野化嘆息愁恨為樂和之聲而政洽乎甿庶矣其訓俗也舉先孝弟養先惸獨敬教勸學驅而之善俾干櫓之鄉剛悍之俗粲然有文以相接驩然有恩以相愛仁聲感物順氣成象年穀大稔人無札瘥畎畝之中至有親戚致憂相報以養者比比旌顯陶然一境日飲其和而政達乎教化矣其理財也愛人以生之節用以阜之無名非法之費飾奢崇侈之給踵弊或久一皆去之行之期年力乃滋殖百姓與足千箱既盈通商而百貨不匱訓工而五材咸理繇是軍有餘用吏有常祿而政施乎物力矣其約己也躬儉行簡居無玩好日公之詣部與家屬偕路人非見其旌幢雖告以掾吏之家不信也及郡凡昔之仰給於官不應法令者悉還之吏人皆驚而相告曰而今而後吾知官之與法矣吾儕其敢貪冒以愧吾賢帥耶至若均祿廩以贍軍費節宴游以寬日力忠愛之私視官猶家而政先乎簡約矣政事本諸身行乎吏人成乎師旅給乎甿庶美於風俗阜於財用六者治之大節也引而伸之觸類而長之則其他可得矣及戎軒西去將校官吏三州耆耄感公之惠訓懷公之明德道路號嘆若無所歸冀獲寇恂之借益深召伯之愛既而大將鞏仲良范凑別駕衞炫一十六人泣瀝丹誠伏述功美願刻金石垂諸無窮監軍使田內侍全操今節度使叚尚書嶷繼以事聞恩詔嘉許俾萬方將帥聆音聳勸實朝廷之重典也公趙郡人贊皇其本邑也濬源長發賢達奕代烈祖贊皇文獻公諱栖筠大歷中為御史大夫清風峻節振服天下烈考忠懿公諱吉甫元和初再為丞相崇功盛業燿動古今公承忠勳之積慶負鴻畧以繼起年未弱冠而濟美之望見推於時釋褐詔授校書郎累至監察御史元和十五年以本官召充翰林學士時穆宗皇帝初嗣位對見之日即賜金紫遷屯田員外郎考功郎中知制誥其侍從如故又遷中書舍人專承密命論思參贊沃心近膝言隱而道行者蓋多矣會邦憲任缺帝難其人乃拜御史中丞直己端誠道無吐茹百職以治朝綱以肅明年以御史大夫兼統浙西六郡仍總其車服以鎮靖焉公時年三十有六大和元年就加禮部尚書二年加銀青光祿大夫詔書方勉舉漢宣故事以寵休績在金陵凡六載其仁風惠化磅礡於封部洋溢於歌謳天下聞之久矣及貳夏官至未發軔復慰滑人徯來之思滑人既乂復用滑之治迹以慰蜀人蜀人謳謠今復詔下則化日宏宣膏澤愈大其用舉茲而斷可識矣峩峩翠碣永載德政上請斯文迨於末學恭承明詔無愧直筆其詞曰天有德星所臨者福王有良翰以撫藩服惟昔茲土歲仍十饑師役罷勞人困流離衣食所儲蕩無孑遺上帝監觀俾公來思公之來思勞役乃息人望如草俟我生殖煩苛盡去吏奉條式禁止惰游阜昌物力歲聿未周乃無疲人寒者厭襦饑者厭飧野無閑田百穀茂蓁襁負而來闔境如春教化既興德刑具舉政行州邑禮行師旅人趨法令鄰服威武矯矯三軍勇餘可賈俗換風移日用不知鴟鴞之音魯侯化之臸曰門之盜隨會逃之成人之服子皋為之人有父子惟公親之人有作業惟公勤之軍政既成吏理既清百室既盈乃流德聲乃奉詔書俾鎮全蜀人失召父軍去方叔㟪壘之甿尚知尸祝今茲功德曷其自足乃疏成績達於宸聰帝曰俞哉宜爾顯崇建石通衢追琢嘉庸書詞罔愧播美無窮唐寶歷二年歲直景午浙右連帥御史大夫贊皇公新建聖祖院于大茅峯下崇元觀之前上直夫華陽洞之南門集㣥仙之靈慶資聖壽於億萬本其經始實感周先生出應昌運為唐廣成薦瑞表祥式旌不朽於是恩錫院額號曰寶歷崇元聖祖院元門之盛輝動嵓谷時唐興二百有九載天子以神聖文武惟新景命德合乎五千文之元訓明繼乎十二聖之丕業以清淨源化理以仁壽域生靈陶之以太和躋之於至順故自臨馭大寶則申詔百辟旁延萬邦推誠備禮徵訪至道寤寐孜孜如恐不及夫明天子勤求於上必賢方伯感致於下君臣一德而道德可興乃其年秋七月公以天子之命齋戒虔懇果得周先生曰息元實元精之全德大道之宗師也先生葆真抱一涵光吹萬天下聆其風者久矣而遐襟曠迹冥寄希夷顯晦自我人莫能識夫元珠非喫詬可索至道惟精誠是致故累聖之所不能起而一朝感契洪化蒸然來思且謂公曰昔廣成對理身之問鴻蒙啟養心之說二者皇王之大本也今息元亦將以斯道上報吾君公於是澄心清神思所以慶皇休而贊景福遂與先生圖議選置元宇相彼形勝栖靈此峯昔梁朝福鄉太子置道觀二其古壇廢井遺址猶在乃鏟荒夷險鬱起層構散俸錢以資其費擇幹吏以董其役翬飛矢直不日而成像設崇嚴殿宇沈邃神仙儀衞左右森列幷按舊史氏得仲尼問禮關尹請著書之像咸備於前蓋將會通仙而肅百靈以永為國家齋醮之勝選也况三茅精氣二許馨烈古來得道於是者代有其人考傳騐圖若可攀揖而繚垣之內有流泉嘉木滋飾幽潤地靈境秀觸類益增懋此成績與山無窮永惟聖祖育德乎大極之前顯靈於未形之表當是時也合散消息莫可名象明而為日月動而為風雷播育而不測運行而不殆君得之豕韋以挈天地臣得之傅說以相武丁吾何為哉道本一貫及夫神化挺生含章炳靈象帝之先資我疆名將寄言以顯元樞錫羨以興皇業猶龍既見萬物方覩是宜夫垂休儲祉長發其祥億萬斯慶集於寶歷此崇元新院所以得時而啟也初公以上方崇嚮道德計天下有道之士可以當是大選者惟周先生一人而已故其招致之忠藎訪求之精實則先生不得不出而公之誠節不得不伸既而聖情感愜萬國瞻賀其逢迎之優異禮貌之嚴顯自古尊師重道之盛無以加也則真宗元極至道之精不得不洞契乎上心播宣於理術俾風流澤浸廣被八區嗚呼此先生所以出而不疑亦可以示天下之不可不致如己者當吾君之至理適吾道之可行千載一期起乃時耳矧公以濟代全才合乎休明樹風南藩績最天下前歲興建儒學而天降膏露顯於廟庭俗變風移遂至於道今之輝崇真館闡奉元化上感睿旨下孚元元仁聲順氣流溢四境推是為政大而伸之則致君興國之用可見矣又况封部之內融汰之下徧識元元之教俱為㟪之人顧難乎哉餗謬列屬城獲詳事實又嘗以春秋屬詞為學故承命奮筆直而不文其銘曰聖運光啟山川效靈黃帝為君起乃廣成崆峒至言今復行兮明明天子以道致理方伯虔誠先生戾止累聖莫致今茲起兮元感既宣化流溥天公拜稽首天子萬年何以薦神御元元兮閟宇崇崇聖祖尊容神而明之神應豐融華陽仙洞大茅峯兮金榜瑤壇仙術真官羽節淩風珠佩珊珊是醮是齋百福延兮名從天錫鏡占地久下薦臣忠上資聖壽靈山萬歲績不朽兮有天地而萬物生焉形氣推遷行識相緣一受其形萬化而未始有極沙界塵劫驅迷走妄浩乎若汨諸巨海而無垠也倀乎若囚諸闇室而無曉也四蛇六賊攻其內熱燄燋芽寓其質而昧者舉世猶竊竊然以彊力敏智可大取所欲攘螳臂而戰蝸角其不勝也則憂悲恐懼日以交馳曾未知夫牽於名而溺於惑者以形質之相雖天地秋毫細大殊耳其有限一也其必盡一也以壽觀夭雖萬齡一瞬修促異耳其有限一也其必盡亦一也况大不及天地而遠不至萬齡者又惡足以擬議哉此西方之聖人所以懸覺照於無極也自大迦葉親承心印二十九世傳菩提達摩始來中土代襲為祖派別為宗故第六祖曹溪惠能始與荊州神秀分南北之號曹溪既沒其嗣法者神會懷讓又析為二宗初師子比邱以遭罹大難恐異端之學起故傳袈裟以為信迨曹溪凡十世而其間增上慢者徇名迷實至決性命以圖之故每授受之際如避仇敵及曹溪將老神會曰衣所以傳信也信苟在法衣何有焉他日請祕于師之塔廟以熄心競傳衣繇是遂絕師嗣法於神會大師者也上距大迦葉三十六代皆以真空妙有覺性佛心默傳密付印可懸解行之謂般若到之謂涅槃得之者變凡聖為反掌失之者淪生死於浩劫不以心得不著佛求知佛性之在我亦無我而可證洞然與空虛為體無起無滅包大千而不礙窮萬古而不老而神通自在顯晦無迹陶冶萬有未始生心然後為得也其教之大畧如此師諱雲坦代宗皇帝賜號曰大悲姓武氏蓋則天太后之族孫也父宣官至洛陽令師生而神雋七歲舉童子及第年二十歷太子通事舍人逸㣥高步脫落覊束雖在軒冕之中泊如也及隨父至洛陽聞荷澤寺有神會大師即決然蟬蛻萬緣誓究心法父知其志不可奪亦壯而許之凡操篲服勤於師之門庭者八九年而元關秘鑰罔不洞解一旦密承囑付莫有知者後十五日而荷澤被遷於弋陽臨行謂門人曰吾大法弗墜矣遂東西南北夫亦何恒時天寶十二載也師既佩真訣遊無定所以為非博通不足以圓證故閱大藏於廬江浮查寺非廣問不足以具足故參了義於上都忠禪師繇是名稱高遠天下瞻企將東吾道固請出關天子降賜名之詔以顯其德時大歷八年也既周流江表四十餘載或山而栖或邑而遊鏡懸於空萬象俱納蚩蚩橫目所至成市癡愛貪欲榛荒心路以太無畏廓而闢之元和三年故丞相趙公之為揚州始虛州之華林精舍以邀止焉初師之東遊也以世道交喪其日固久將息言向晦與物相遺恍惚之間若有以傳燈之契來授者且印指於頭曰以是為信厥後每將演導則指迹如丹若乃制毒龍於金山柔猛虎於定山在江陰則神龜靈蛇之感現在江都則山鬼城神之慴伏皆顯仁藏用以示慈力斯眾目之所覩故畧不盡書而或者以為怪迂之說不可為訓是未聞菩薩大士遊乎不思議解脫者無心於物而物自交應者乎住華林九年年一百有八歷僧夏八十有八以元和十一年秋九月八日返真於其寺明年建塔於州之西原門人遍於天下荷其教者惟上都西明寺全證證以自達摩以來皆有論譔而師之樂石未刻謂余能盡知其道寶歷元年駐錫於毗陵持其教宗與師之行事願得文而建諸塔廟余因采其昭昭可述者載於碑時丞相太原公總戎淮南之三年也其銘曰茫茫萬有兮生死同纏業風振海兮識浪滔天覺者云誰兮有西方之大仙慈悲廣大兮妙力無邊八萬度門兮異派同源文字言說兮罔非蹄筌惟心法皎皎兮如月斯懸惟大迦葉兮首得而傳代代繩繩兮燈不絕然迄於荷澤兮師又嗣焉法存形謝兮諸祖其然門人思慕兮塔彼西原將祈不朽兮余可無言
