front:
  text: 全唐文欽定全唐文卷十二高宗二
  hash: sha256:c6f3c35ac87a71a306ab59098c117dec60c7e94d91f07207a3cc1f0ab810ccdc
body:
  text: 如聞在外有婆羅門胡等每於戲處乃將劒刺肚以刀割舌幻惑百姓極非道理宜並發遣還蕃勿令久住仍約束邊州若更有此色並不須遣入朝為國之道必從惠正家之義允歸儉約故知興替之本得失之基爰自六宮刑於四海既而西都之后累葉驕奢東漢之君相繼淫佚魏庭晉室採擇無厭水運倉積選納逾廣節文既廢怨曠滋深糜費極多流弊忘反朕以寡薄嗣奉瑤圖臨馭八紘亭育萬類向隅之念每切於憂兢納隍之心實勞於夙夜率由成訓仰遵先旨即位之初備加寬貸年老宮人巳令放出椒掖之內人數猶多久離親屬之歡長供掃除之役永年幽閉良深矜憫又去年霖雨頗傷苗稼在於州縣非無乏少資給後庭有妨國用宜申茲大造更量放出宮人可令官司料具錄名帳所司依狀散下歸其戚屬若無近親任求配偶所在官府存心安置勿使輕薄之徒輒行欺誘空有竊貲之弊便無偕老之託務加存恤令遂所懷昔泰伯高讓載昌姬宗東海之藩克隆漢祚故能業傳端委胙錫龜蒙飛茂實於前英播清虛於遠葉皇太子忠分景扶木稟慶天津早加寵樹禮絕㣥后比因朝見屢陳撝挹論嫡庶之分辨貴賤之禮以貴則皇后有子以賢則不敢當仁前後數四情辭懇惻義高曠古道邁前修宜遂雅懷以成厥美可封梁王食邑二萬戶持節都督梁洋集璧四州諸軍事梁州刺史仍別食二千戶賜物二萬段甲第一區梁州仍置都督府洊雷揚祉承祧之道爰著重離闡曜守器之方斯存故能撫寧軍國永保邦家詳覽瑤圖緬瞻遐冊繼業垂統咸率茲典代王宏道居嫡允天縱英姿器質沖華神鑒昭遠恭謙表志仁孝居心夙彰睿哲之風早通詩書之業朕以虛薄方啟無疆之祚永傳不朽之基取則前王思隆正緒宜升上嗣養德東宮可立為皇太子仍令所司擇日備禮冊命上封人所進食極惡情之憂灼中宵輟寐永言給足取愧良深夫國以人為本以食為天百姓不足君孰與足朕臨御天下於今七年每留心庶績軫慮農畝而政道未凝仁風猶缺致令九年無備四氣有乖遂使去秋霖滯便即罄竭所以佇西郊而結念眷東作以勞懷豈下乏農夫上甘珍饌宜令所司常進之食三分減二朕受命上元嗣膺下武每肅恭旒冕延想英奇俯振鷺而企貞臣仰飛鴻而慕良輔雲臺側席玉管屢移宣室整衣金壺亟改寂寥靡覿鑒寐興懷比年雖嘗進舉遂無英俊猶恐棲巖穴而韜奇樂邱園而晦影宜令河南河北江淮以南州縣或緯俗之英聲馳管樂或濟時之器價軼蕭張學可帝師材堪棟輔者必當任之不次可明加採訪務盡才傑州縣以禮發遣濟時興國實佇九功禦敵安邊亦資七德朕端拱宣室思宏景化將欲分憂俊乂共逸巖廊而比者貢寂英奇舉非勇傑豈稱居安慮危之志處存思亂之心如不旌賁遠近則爪牙何寄宜令京官五品以上及諸州牧守各舉所知或勇冠三軍翹關拔山之力智兼百勝緯地經天之才蘊奇策於良平馳功績於衞霍蹤二起於吳白軌雙李於牧廣賞纖善而萬衆悅罰片惡而一軍懼如有此色可精加採訪各以奏聞天地之尊人倫巳極舅姑之敬禮經攸重苟違斯義有斁彞則如聞公主出適王妃作嬪舅姑父母皆降禮答拜此乃子道云替婦德不循何以式序家邦儀刑列辟自今以後可明加禁斷使一依禮法若更有以貴加於所尊者令有司隨事糾聞朕撫育黎庶思求政道欲儉以訓俗禮以移風菲食卑宮庶幾前軌比至五月五日及寒食等諸節日并有歡慶事諸王妃主及諸親等營造衣物雕鏤雞子競作奇技以將進獻巧麗過度糜費極多皆由不識朕心遂至於此又貞觀年中巳有約束自今以去並宜停斷所司明加禁察隨事糾聞釋典沖虛有無兼謝正覺凝寂彼我俱忘豈自尊崇然後為法聖人之心主於慈孝父子君臣之際長幼仁義之序與夫周公孔子之教異轍同歸棄禮悖德深所不取僧尼之徒自云離俗先自貴高父母之親人倫以極整容端坐受其禮拜自餘尊屬莫不皆然有傷名教實斁彞典自今以後僧尼不得受父母及尊者禮拜自西蕃罹亂三十餘年比者賀魯猖狂百姓重被劫掠朕君臨四海情均養育不可使凶狡之虜恣行侵漁無辜之甿久遭塗炭故遣右屯衞將軍蘇定方等統率騎勇北路討逐卿等宣暢皇風南道撫育遂使凶渠畏威夷人慕德伐叛柔服西域總平賀魯父子既巳擒獲諸頭部落須有統領卿早歸闕庭久參宿衞深感恩義甚知法式所以冊立卿等各為一部可汗但諸姓從賀魯非其本情卿等纔至即降亦是赤心向國卿宜與盧承慶等準其部落大小位望高下節級授刺史以下官朕聞踐華固德百二稱乎建瓴卜洛歸仁七百崇乎定鼎是以控膏腴於天府啟黃圖於渭濱襟沃壤於王城摛綠字於河渚市朝之城麗皇州之九緯丹紫之原邈神皐之千里二京之盛其來自昔此都中茲宇宙通賦貢於四方交乎風雨均朝宗於萬國置槷之規猶勤測圭之地載革豈得宅帝之鄉獨稱都於四塞來王之邑匪建國於三川宜改洛陽宮為東都上棟下宇彼勞昔以難前廣廈高臺我名今而改後仍茲舊貫式表宸居古稱釐降唯屬王姬比聞縣主適人皆云出降娶王女者亦云尚主濫假名器深乖禮經其縣主出嫁宜稱適娶王女者稱娶仍改令文凡百具僚㣥公卿尹除命甫及多存飾讓言勵己以辭榮未舉能以自代既取當年之誚還愆曩烈之風自茲厥後須革前事必欲稅駕濠濮褫紱巖廊宜各舉所知自代仍宜顯述才行送付中書省將隨才敘用孔宣設教正名為首戴聖貽範嫌名不諱比見鈔寫古典至於朕名或缺其點畫或隨便改換恐六籍雅言會意多爽九流通義指事全違誠非立書之本意自今以後繕寫舊典文字並宜使成不須隨義改易如聞父母初亡臨喪嫁娶積習日久遂以為恒亦有送葬之時共為燕飲遞相酬勸酣醉始歸或寒食上墓復為歡樂坐對松檟曾無戚容既點風猷並宜禁斷仍令州縣捉搦勿使更然東臺若夫華裔列聖異軫而齊驅中外裁風百慮而同致自周霄隕照漢夢延輝妙化西移慧流東被至於元牝邃旨碧落希聲具開六順之基偕叶五常之本而於愛敬之地忘乎跪拜之儀其來永久罔革茲弊朕席圖登政崇真導俗凝襟解脫之津陶思常名之境正以尊親之道禮經之格言孝友之義詩人之明準豈可以絕塵峻範而忘恃怙之敬拔累貞規廼遺溫清之序前欲令道士女冠僧尼等致拜將恐振駭恒心爰俾詳定有司咸引典據兼陳情理沿革二塗紛綸相半朕商搉㣥議沈研幽賾然箕潁之風高尚其事遐想前載故亦有之今於君處勿須致拜其父母之所慈育彌深祗伏斯曠更將安設自今巳後即宜跪拜主者施行比每誕育王子公主諸親慶賀多進錦繡纂組金銀雕鏤虛有糜費深乖節儉自今以後即宜並停哀矜折獄義先呂訓明慎用刑事昭姬象朕以寡昧嗣登宸極思闡大猷式隆景運陷冰是懼屢想於懷中御朽彌兢馳襟於裕下虛己待物每從寬政如聞率土州縣留獄尚繁困於囚繫致於病死一歲之中數盈二百蓋繇上愆亭育之化下乖堯舜之心深責在躬興言多媿抑又聞之與我理天下者其惟良二千石今之所任或虧政道未詳欽恤之旨但徇苛刻之情幽縶困滯證逮遐廣寒暑相襲風露交侵淹乎年月成其病苦加以搒笞失度桎梏違法巧詆深文去將安適獄市之寄何其爽歟自茲以後宜革前弊罪無大小不得稽留其囚病患及罪輕并笞杖等雖法有常規恐典吏妄生威福官人不存較或顏面囑請觸類以之若仍舊不悛當加重罰布告天下知朕意焉海東二蕃久愆職貢近者命帥薄伐軍務事殷緣河州縣勞於征役比雖多有蠲免庶事優矜萬邦俱會恐致煩擾勞逸二途理無兼遂介邱大禮及幸東都並宜且停天德施行陽和在節言念幽圄載惻分宵雖復每有哀矜猶恐未免枉濫在京繫囚應流死者每日將二十人過右相兼行殷王府長史河閒郡公李義府緣茲小技累升顯地塵露之益未表於銓流公廉之譽有紊於彞典漏禁中之語鬻寵授之朝恩交占之人輕朔望之哀禮蓄邪黷貨實玷衣冠稔惡嫉賢載虧政道特以任使多年未忍加其重罰宜從遐棄以肅朝倫可除名配流巂州其子太子右司議郎津專恃權門罕懷忌憚奸淫是務賄賂無厭交遊非所潛報機密亦宜明罰屏跡荒裔可除名長流振州朕以寡昧纂承鴻烈肅扆巖廊之上凝襟華裔之表馭奔深於日慎儲祉存於勿休勉己勵精詳求大化往為奉成先志雪恥黎元是以數年之閒稱兵遼海雖除凶戡暴義匪諸身疲人竭財役興於下泛滄流而遐濟踐危途而遠襲風濤競駭或取淪亡鋒鏑交揮非無捐仆顧惟匪德事有乖於七旬在躬延責情致慙於四海湯年罪己鑒寐斯在漢載富人周旋切念日者翹車聯映賁帛相輝庖鼎之前猶潛秀異關柝之下未盡英奇傳逸翰於西雍牣殊寶於東序比王師薦發戎務實繁州縣官僚緣茲生過力役無度賄賂公行蠧政傷風莫斯為甚前令三十六州造船巳備東行者即宜並停凡百在位宜極言得失悉陳無隱以救不逮仍分遣按察大使問人疾苦黜陟官吏兼司元太常伯竇德元往河南道並持節分往其內外官五品以上各舉巖藪幽素之士廣加詢訪旁求謠俗式企英材充毗闕政必使八紘之內咸得朕心萬㝢之中同夫親覽宜速頒賜率土知此意焉宜以三年正月式遵故實有事於岱宗所司詳求茂典以從折衷其諸州都督刺史以二年十二月便集嶽下諸王十月集東都緣邊州府襟要之處不在集限天下諸州明揚才彥或銷聲幽藪或藏器下僚並隨嶽牧舉送周京兆尹左右宮伯大將軍司衞上將軍少冢宰廣陵郡公宇文孝伯忠亮基心貞堅表志淫刑既逞方納諫而求仁忍忌將加甘捐軀而殉節年祀雖永風烈猶生宜峻徽章式旌華冑其孫左威衞長史思純可加授朝散大夫今陽和布氣東作聿興甘澤雖霑猶未周洽睠茲南畝彌用憂勤瞻彼西郊良深兢惕宜順發生之序以申恤之恩西京及東都諸司雍雒二州見禁囚徒宜準龍朔元年慮囚例處分其西京令左侍極兼檢校大司憲陸敦信充使東都令右肅機盧承慶充使必令息彼冤滯稱朕意焉夫氣象初分乾坤之位斯定剛柔遞運寒暑之節攸施而晦朔相循炎涼再革歸乎推步方紀歲時顓頊應期重黎司天地之職放勳承統羲和掌日月之官履端之道無暌舉正之典斯在洎乎末代漸至踈闊鄧平之術既巳多乖朱浮之言罕能遵用九章五紀莫究精微日次月躔寧循舊度朕御天撫歷君臨萬方眷言茲道將恐淪缺欽若垂化曷為憑焉爰命所司研窮詳正仰稽七曜傍綜五家去其煩衍裁以要密古所未通今則備載陰陽之數可測盈縮之理無愆改元履初占考此歷歲唯甲子得於天正合朔之後應以嘉祥五緯若連珠二曜若合璧雖上元致瑞實增祗愧而推測所詳固以精悉氣序恒順分餘弗舛以授農時升平可致昔洛下閎造漢歷云後八百歲當有聖人定之自火德洎我年將八百事合當仁朕亦何讓宜即宣布永為昭範可名曰麟德歷起來年行用之舊文舞武舞既不可廢並器服總宜依舊若懸作上元舞日依奏神功破陣樂及功成慶善樂并殿庭用舞並須引出懸外而作其安置舞曲宜更商量作安穩法並錄凱安六變法象奏聞朕聞德契機神盛烈光於後代化成天地元功被於庶物魯大司寇宣尼父孔某資大聖之材屬衰周之末思欲屈己濟俗宏道佐時歷聘周流莫能見用想乘桴以永歎因獲麟而興感於是垂素王之雅則正魯史之繁文播鴻業於一時昭景化於千祀朕嗣膺寶歷祗奉睿圖憲章前王規矩先聖崇至公於海內行大道於天下遂得八表乂安兩儀交泰功成化洽禮盛樂和展采東巡回輿西土途經茲境撫事興懷駐蹕荒區願為師友瞻望幽墓思承格言雖宴寢荒蕪餘基尚在靈廟虛寂徽烈猶存孟軻曰自生人以來未有若孔子者也微禹之歎既深襃崇之道宜峻可追贈太師庶年代雖遠式範令圖景業維新儀刑茂實其廟宇制度卑陋宜更加修造仍令三品一人以少牢致祭襃聖侯德倫既承允緒有異常流其子孫並宜免賦役主者施行大道混成先二儀而立極至人虛己妙萬物以為言粵若老君朕之本系爰自伏犧之始暨乎姬周之末靈應無象變化多方遊元氣以上昇感日精以下降或從容宇宙吐納風雲或師友帝王丹青妙化譬陰陽而不測與日月而俱懸交喪在辰晦迹柱下大宏雅訓垂範將來雖心齊於太虛而理歸於真宰若夫絕聖棄智安神寡欲寂寞杳冥之際希夷視聽之表淡爾無為悠然自得酌之不竭用之不盈執大象以還淳滌元覽而遣累邈乾坤而長久跨陶鈞而亭育至矣哉固無得而名也況乎大聖所資克昌寶祚上德所履允屬休期朕嗣膺靈命撫臨億兆總三光之明而夙宵寅畏居四大之重而寢興祗惕盡孝敬於宗祧罄懷柔於幽顯行清靜之化承太平之業登介邱而展采坐明堂而受記飛煙結慶重輪降祥鶴應九歌山呼萬歲越振古而會休徵冠帝先而為稱首大禮云畢回輿上京肅駕賴鄉躬奠椒醑仰瑞柏而延佇挹神泉而永歎如在之思既深敬始之情彌切宜昭元本之奧以彰元聖之功可追上尊號為太上元元皇帝聖母為先天太后祠堂廟宇並令修創置令丞各一員以供薦饗仍改谷陽縣為真源縣朕以寡德嗣守宗祧雖明發載懷肅恭禋祀踐霜露而興感奉盥洗以增哀每惟宗廟至敬虔誠祼享而二尊一奠情有未安思革舊章用崇嚴配管子曰禮者因人之情緣禮而為之節也故三王五帝禮制不同損益隨時期於適便況罔極之恩既展於茲辰終身之慕情深於是日豈可以因循經禮乖違敬誠自今以後宗廟薦享爵及簠簋豋鉶各宜別奠其餘牢饌並依常典泉布之興其來自久實古今之要重為公私之寶用年月既深偽濫斯起所以採乾封之號改鑄新錢靜而思之將為未可高祖撥亂反正爰創軌模太宗立極承天無所改作今廢舊造新恐乖先旨其開元通寶宜依舊施行為萬代之法乾封新鑄之錢令所司貯納更不須鑄仍令天下置鑄之處并鑄開元通寶錢夫受命承天崇至敬於明祀膺圖纂錄昭大孝於嚴配是以薦鰷鱨於清廟集振鷺於西雍宣雅頌於太師明肅恭於考室用能紀配天之盛業嗣積德之鴻休永播英聲長為稱首周京道喪秦室政乖禮樂淪亡典經殘滅遂使漢朝博士空說六宗之文晉代鴻儒爭陳七祀之議或同昊天於五帝或分感帝於五行自茲以降遞相祖述議論紛紜是非莫定朕以寡薄嗣膺丕緒肅承禋祀明發載懷虔奉宗祧寤寐興感每惟宗廟之重尊配之儀思革舊章以申誠敬高祖大武皇帝撫運膺期創業垂統拯庶類於塗炭寘懷生於壽仁太宗文皇帝德光齊聖道極幾神執銳被堅櫛風沐雨勞形以安百姓屈己而濟四方澤被區中恩覃海外乾坤所以交泰品物於是咸亨掩元闕而開疆指青邱而作鎮巍巍蕩蕩無得名焉禮曰化人之道莫急於禮禮有五經莫重於祭祭者非物自外至也自內生於心也是以惟賢者乃能盡祭之義況祖功宗德道冠百王盡聖窮神業高千古自今以後祭圜丘五方明堂感帝神州等祠高祖大武皇帝太宗文皇帝崇配仍總祭昊天上帝及五帝於明堂庶因心致敬獲展虔誠宗祀配天永光鴻烈皇太子宏近因釋菜齒冑上庠祗事先師馳心近侍仰崇山而景行眷曩哲以勤懷顯顏曾之特高揚仁義之雙美請申襃贈載甄芳烈朕嘉其進德冀以思齊訓誘之方莫斯為尚顏回可贈太子少師曾參可贈太子少保並配享朕以寡薄忝承丕緒奉二聖之遺訓撫億兆以初臨馭朽兢懷推溝在念而上元垂祐宗社降休歲稔時和人殷俗阜車書混一文軌大同玉泥金升中告禪百蠻執贄萬國來庭朝野歡娛華夷胥悅但為郊禋嚴配未安太室布政敷化猶闕合宮朕所以日昃忘疲中宵輟寢討論墳籍錯綜㣥言採三代之精微探九皇之至賾斟酌前載製造明堂棟宇方圓之規雖兼故實肆筵陳俎之法獨運財成宣諸內外博考詳求度其長短冀廣聞見而鴻生碩儒俱稱盡善縉紳士子並奏該通創此宏模自我作古因心既展情禮獲申永言宗祀良深感慰宜命有司及時赴作務從折中稱朕意焉今陽和在辰景風扇物昆蟲草木咸獲康寧朕之百姓尚多勞止思覃惠澤與共更新可大赦天下改乾封二年為總章元年大辟罪以下皆赦除之
