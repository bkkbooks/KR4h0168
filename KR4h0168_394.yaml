front:
  text: 全唐文欽定全唐文卷三百九十四叔明字晉卿閬州新政人本姓鮮于氏擢明經乾元中為司勛員外郎纍除太子右庶子拜東川節度使遂州刺史移鎮梓州建中初檢校戶部尚書遷左僕射德宗幸興元出家資助軍加太子太傅封薊國公朝京師拜尚書右僕射貞元三年卒諡曰襄
  hash: sha256:b492410ebd83061620aa65c9766d10c9748a42d2d077fa4dfd55378f5665284b
  markers:
