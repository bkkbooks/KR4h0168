body:
  text: 佛空寂無為者也道清虛寡欲者也今迷其內而飾其外使農夫工女墮業以避役故農桑不勸兵賦日屈國用軍儲為斁耗臣請本道定寺為三等觀為二等上寺留僧二十一上觀道士十四每等降殺以七皆擇有行者餘還為民璀河東人鄉舉進士天寶末為河北海運判官三遷大理評事至德初纍轉吏部侍郎廣德二年為河中尹兼御史大夫永泰元年授散騎常侍集賢院待制大歷五年遷戶部尚書十年卒贈太子太師白虹為氣太陽為精堅其質孕其明卞子識之而曰至寶他山之石攻而挺英融雪華於潛潤洞冰彩而凝清彼其良玉焜焜煌煌瑩若既兼縝密燦乎其有文章積千金而比價掩十城以騰光將以配君子比皇王豈徒潤林薄蘊巒岡而已哉伊何配之溫潤含滋瑕穢不匿貞心固持性自然也灼而不變質有餘也涅而不緇溫以作德成我邦式天子展四時之儀庶官修五等之職圭以為瑞佩以比德上下有軌尊卑有翼既山水節其文元蒼差其色四者爰備勞逸是主民也事也右叶於角徵君也物也左諧於宮羽反而規旋而矩其志不散其容斯取況居則設朝則結進退鏘鳴抑揚磬折禮樂之儀著非僻之心絶是則維身允固惟玉不撤且駭雞之珍驪龍之寶雖赩其豔煥其藻但侈於庶心何補於王道豈若玉之義也深乎博乎詩人以生芻取喻賢則高矣孔氏以佩環讓德謙莫比夫故藏之瑞府偶之河圖奉之者生敬執之者不趨幸無棄於照廡得一獻而論都嗣恭字懿範京兆三原人始名劒客以世蔭為鄴尉遷蕭關令連徙神烏姑臧考績為天下最元宗以為可嗣漢魯恭因賜名永泰二年為江西觀察使大歷八年兼嶺南節度使封冀國公德宗立拜兵部尚書東都留守加懷鄭汝陝河陽三城節度東都畿觀察使卒年七十一贈左僕射信州弋陽人張球父歿五年廬於墓側哀毀過禮墓門磚上生芝草七莖有鵲巢於墓之叢竹請旌表門閭耽字敦詩滄州南皮人天寶中舉明經纍授汾州刺史入為鴻臚卿大歷十四年領山南西道節度使興元中召為工部尚書貞元九年拜右僕射同中書門下平章事封魏國公順宗立進檢校司空守左僕射永貞十年卒年七十六贈太傅諡元靖臣聞楚左史倚相能讀九邱晉司空裴秀創為六體九邱乃成敗之古經六體則為圖之新意臣雖愚昧夙嘗師範纍蒙拔擢遂忝台司雖歷踐職任誠多曠闕而率土山川不忘寤寐其大圖外薄四海內別九州必藉精詳乃可摹寫見更纘集續冀畢功然而隴右一隅久淪藩寇職方失其圖記境土難以區分輒扣課虛微採掇輿議畫關中隴右及山南九州等圖一軸伏以洮湟舊墟連接監牧甘涼右地控帶朔陲歧路之偵候交通軍鎮之備禦衝要莫不匠意就實依稀像真如聖恩遣將護邊親書授律則靈慶之設險在目原會之封略可知其諸州諸軍須論里數人額諸山諸水須言首尾源流圖上不可備書憑據必資記注謹撰別録六卷又黃河為四瀆之宗西戎乃㣥羌之帥臣並研尋史牒翦棄浮詞罄所聞知編為四卷通録都成十卷文義鄙朴伏增慙悚謹隨表奉進臣聞地以博厚載物萬國棊布海以委輸環外百蠻繡錯中夏則五服九州殊俗則七戎六狄普天之下莫非王臣昔母邱出師東銘不耐甘英奉使西抵條支奄蔡乃大澤無涯罽賓則懸度作險或道里回遠或名號改移古來通儒罕遍詳究臣弱冠之歲好聞方言筮仕之辰注意地理究觀研考垂三十年絶域之比鄰異蕃之習俗梯山獻琛之路乘舶來朝之人咸究竟其源流訪求其居處闤闠之行賈戎貊之遺老莫不聽其言而掇其要閭閻之瑣語風謠之小說亦收其是而芟其僞然殷周以降封略益明承歷數者八家渾區宇者五姓聲教所及惟唐為大秦皇罷侯置守長城起於臨洮孝武却地開邊障塞限於雞鹿東漢則哀牢請吏西晉則裨離結轍隋室列四郡於卑和海西創三州於扶南江北遼陽失律因而棄之高祖神堯皇帝誕膺天命奄有四方太宗繼明重熙柔遠能邇踰大磧通道北至仙娥於骨利幹置元闕州高宗嗣守丕績克廣前烈遣單車賫詔西越葱山於波刺斯立疾陵府中宗復配天之業不失舊物睿宗含先天之量惟新永圖元宗以大孝清內以無為理外大宛驥騄歲充內廏與二師之窮兵黷武豈同年哉肅宗掃平氛祲潤澤生人代宗剗除殘孽彞倫攸敘伏惟皇帝陛下以上聖之資當太平之運敦信明義履仁包元惠養黎蒸懷柔遐裔故瀘南貢麗水之金漠北獻余吾之馬元化洋溢率土霑濡臣幼切磋於師友長趨侍於軒墀自揣孱愚叨榮非據鴻私莫答夙夜兢惶去興元元年伏奉進止令臣修撰國圖旋即充使魏州汴州出鎮東洛東郡間以衆務不遂專門績用久虧憂愧彌切近乃力衰朽竭思慮殫所聞見藂於丹青謹令工人畫海內華夷圖一軸廣三丈從三丈三尺率以一寸折成百里別章甫左衽奠高山大川縮四極於纖縞分百郡於作繪宇宙雖廣舒之不盈庭舟車所通覽之咸在目並撰古今郡國縣道四夷述四十卷中國以禹貢為首外夷以班史發源郡縣紀其增減蕃落敘其衰盛前地理書以黔州屬酉陽今則改入巴郡前西戎志以安國為安息今則改入康居凡諸疏舛悉從釐正隴西北地播棄於永初之中遼東樂浪陷屈於建安之際曹公棄陘北晉氏遷江南緣邊纍經侵盜故墟日致堙毀舊史撰録十得二三今書搜補所獲太半周禮職方以淄時為幽州之浸以華山為荊河之鎮既有乖於禹貢又不出於淹中多聞闕疑詎敢編次其古郡國題以墨今州縣題以朱今古殊文執玩簡易臣學謝小成才非博物伏波之聚米開示衆軍酇侯之圖書方知厄塞企慕前哲嘗所寄心輒罄庸陋多慙紕略無任戰惕之至庖犧氏觀鳥獸之文象形指事作書契以代結繩降及夏殷周通謂之古文至宣王太史史籀著大篆十五篇古文小異七國分裂篆與古文隨其所尚始皇兼并海內丞相李斯作倉頡七章中車府令趙高作爰歷六章太史令胡母敬作博學七章並約籀文而篆體轉工即世謂之小篆後發卒理獄茲多吏趍省易隸書出焉漢興書師以隸合小篆為五十五章教閭里平帝元始中徵通小學會京師者百有餘人揚雄採掇其可用者作訓纂八十九章除其重復東漢班固加十三章共一百二章六千一百二十字㣥書所載略備自三國後隸書盛行古文篆籀寖微矣歷晉魏周隋宋齊梁陳通篆籀者日寡惟碑頌之額時覩數字仍十中八九檢文題之國家成均六館書居其一學者粗紀畫點鮮造精微至德後方事之殷鄉吏富家咸俯拾青紫郡邑髦楚不復積功於六萟惟趙郡李陽冰神假篆法上鄰李斯時人獲之悉藏篋笥大歷中篆故李司徒新驛記於東廳之門右筆法古淡識者宗師猶子檢校祠部員外郎騰能嗣其業耽每歎隸書轉訛難究會意篆體如正方辨發源小學中獨許慎說文最為首出目録五百四十言衆字之根若能研慮於中則聖人之旨趣可得而知因請騰繼世父之妙書坯山之石藉其久垂示將來茲亭控白馬之古津實皇華之都會流傳模寫以俟君子彰字伯陽京兆富平人天寶中以軍功纍遷至左衛員外郎將安祿山叛僞署博滑二州刺史統兵屯滑臺彰思以節自顯悉籍士馬州縣以獻拜御史中丞兼滑州刺史滑亳魏博等六州節度使史朝義滅遷御史大夫封霍國公加檢校工部尚書右僕射贈太傅臣自事陛下得備藩守受恩則重效節未終長辭聖朝痛入心骨臣誠哀懇頓首頓首臣受性剛拙亦能包含頃因魚朝恩將掠亳州遂與臣結怨當其縱暴臣不敢入朝專聽天誅即欲奔謁及魚朝恩死即臣屬疾苦又遭家艱力微眼暗行動須人拜舞不能數月有闕欲請替辭退即日望稍瘳冀得康強榮歸朝覲自冬末舊疾益重瘡腫又生氣息奄奄遂期殞歿不遂一朝天闕一拜龍顏臣禮不終忠誠莫展臣之大罪下慙先代仰愧聖朝臣竭誠事上誓立大節天地神明實知臣心心不遂行言發自痛當使倉糧錢絹羊馬牛畜一切已上並先有部署三軍兵士州縣官吏等各恭舊職祗待聖恩臣伏見吏部尚書劉晏及工部尚書李勉知識忠貞堪委大事伏願陛下速令檢校上副聖心臣男建等性不為非行亦近道今勒歸東都私第使他年為臣報國下慰幽魂臨歿昏亂伏表哀咽峘德棻五世孫天寶末進士纍遷起居舍人大歷中遷司封郎中知制誥建中初進禮部侍郎纍貶衢州別駕順宗立以祕書少監召未至卒元和中贈工部尚書臣聞傳曰近臣盡規禮記曰事君有犯而無隱臣幸遇昌運謬參近列敢竭狂愚庶裨分寸伏惟陛下詳察焉臣嘗讀漢書見劉向抗疏論王者山陵之誡良史稱歎萬古芬芳何者聖賢之心勤儉是務必求諸道不作無益故舜葬蒼梧不變其肆禹葬會稽不改其列周武葬於畢陌無邱隴之處漢文葬於霸陵因山谷之勢禹非不忠也啓非不順也周公非不友也景帝非不孝也其葬君親皆守微薄至宋文公始厚葬用蜃炭益車馬其臣華元樂舉春秋書為不臣秦始皇葬於驪山魚膏為燈燭水銀為江海珍寶之藏不可勝計千載非之故桓魋為石椁夫子曰不如速朽子游問喪具夫子曰稱家有無張釋之對孝文曰使其中無可欲雖無石椁又何戚焉是以漢修霸陵皆以瓦器不以金銀為飾繇是觀之有德者葬逾薄無德者葬逾厚昭然可睹矣陛下自臨御天下聖政日新進忠去邪減膳節用不珍雲物之瑞不近鷹犬之娛有司給物悉依元估利於人也四方砥貢惟供祀事薄於己也故澤州奏慶雲詔曰以時和為嘉祥雍州奏金坑詔曰以不貪為寶恭惟聖慮無非至理而獨六月一日制節文云應緣山陵制度務取優厚當竭帑藏以供費用者此緣仁孝之德切於聖衷伏以尊親之義貴於合禮陛下每下明詔發德音皆比蹤唐虞超邁周漢豈取悅凡常之目有違賢哲之心與失德之君競其奢侈者也臣又伏讀遺詔曰其喪儀制度務從儉約不得以金銀錦綵為飾陛下恭順先志動無違者若制度優厚豈顧命之意邪伏惟陛下遠鑒虞夏周漢之儀深惟夫子釋之之戒虔奉先旨俯遵禮經為萬代法天下幸甚今赦書雖頒行諸條猶未出因之奉遺制敷聖理固其時也伏望速詔有司悉從古禮臣聞愚夫之言聖王擇焉況臣忝職史官親述睿德恥同華元樂舉之為臣也願以舜禹之理紀聖猷也夙夜懇迫不敢不言祗犯聖明實憂罪譴言行身黜雖死猶生正議大夫行太子右庶子史館修撰上柱國晉昌縣開國男令狐峘述惟深也故能通天下之志惟幾也故能成天下之務君子極深而研幾不出戶而制動行諸已而馭化其惟聖德乎有唐名臣贈司徒魯郡文忠公顏公奉大順為元功建大節為至忠以安橫流以紐頽綱秉是一心祇事四朝今上興元元年八月三日蹈危致命薨於蔡州之難貞元二年春蔡州平冬十一月二旬有三日嗣子櫟陽尉祕書省正字碩銜恤奉喪歸葬於萬年縣之舊原皇帝徹懸震悼乃冊贈上公詔有司具鼓吹羽儀送於墓所遣中謁者弔祭贈錢五十萬粟三百石命太常考行誄德諡曰文忠凡厥士庶臮方侯伯識與不識晞聲想形莫不惕然創焉感慕思齊為人子者益孝為人臣者益忠為人弟者益順為人吏者益敬有以見盛德之儀型也公諱真卿字清臣琅琊臨沂人蓋孔宣父之門人曰回好學知機道亞聖人公其後也五代祖之推北齊黃門侍郎為海內大儒著家訓稽聖賦冤魂志及文集藏在書府歷代傳之高祖思魯亦儒行仕我太宗掌記秦府列於國史曾祖勤禮著作郎宏文館學士祖昭甫晉曹二王侍讀贈華州刺史考惟貞薛王友贈太子少保儲和葆沖是感間氣用集於我公公受天純休克廣前烈識度元遠節行不㣥早孤太夫人殷氏躬自訓育公承奉慈顏幼有老成之量家貧屢空布衣糲食不改其樂餘力務學甘味道藝五經微言及百氏精理無所不究既聞之必行之尢工文詞善隸書書格徑逸抗行鍾張弱冠進士出身尋判入高第授祕書省校書郎天寶初制策甲科作尉醴泉又以八使表能遷於長安未幾拜監察御史洊承詔旨巡撫河隴曾至五原有冤訟久而不決公理之得情郡人悅服時方炎亢而甘澤澍焉巷俗謠言謂之御史雨又士族有斁於名教者朝臣有侮於憲度者公悉彈奏正以禮法憲綱震肅朝旨嘉焉遷武部員外郎屬宰臣楊國忠以外戚登庸惡不附已者出為平原太守公性本宏裕及到官推是道也以臨其人躬疾苦以勸義征徭以勸學令不肅而信行教不敷而化洽十四年賊臣安祿山豕突蟻動逆常干紀徵師矯命自薊長驅公血憤中激乃宣言曰焉有人臣忍容巨逆必當竭節龔行天討會郡中方集靜塞軍屯丁三千餘人公因之又召境內舉武藝者仍發財募義勇之士未踰旬成萬人軍於是戒嚴固守仍表其狀是時海內承平祿山竊發兩河之間未有奉章表者時祿山陷洛陽害留守李憕中丞盧奕御史蔣清以三人之首傳脅河北列郡至平原公斬其使收三人之首哭而葬之遂有表上聞初元宗每朝以薄俗罪已及得公表大悅稱歎者久之顧謂左右曰真卿何如人而所為乃得爾因就拜戶部侍郎兼領平原又加河北採訪招討使仍賜以詔書云卿之一門義冠千古由是公之德聲震於天下時公從父兄常山太守杲卿同公建義憤激於衷生縛賊將何千年高邈獻於闕下遂通太原之路忠烈之風出於一門詩云孝子不匱永錫爾類夫忠臣亦如之是時漁陽太守盧全誠濟南太守李隨清河長史王懷忠景城司馬李暐各擁兵數千或至萬人以附於公鄴郡太守王燾被祿山移攝河間燾俾掾吏李奐斬僞署河間長史杜暮睦以河間衆歸於公北海太守賀蘭進明率精鋭五千濟河有詔助公討伐自是仁者赴仁義者赴義勇者不敢愛其力智者不敢祕其謀清河詞客李萼少年有志獻奇於公以通鄰好增補軍實前殿中侍御史沈震鹽山尉穆寧武邑尉李銑清河主簿張淡清池尉賈戢各抒器能參贊成務公以長事進明衆同甘苦莫不畢力能公之役賊帥袁知泰恃衆犯我聊城之西公二鼓而破之獲斬萬計其時河朔一十七郡同日嚮願進兵二十萬橫絶燕楚旁貫井陘啓土門通太原河北節度使李光弻朔方節度使郭子儀得橫行河朔復常山趙二郡大破賊帥史思明於嘉山皆公之由也推誠無私信及旁郡平盧將劉正臣以漁陽來歸公以漁陽賊之本根欲堅其意乃割愛子頗令越海與正臣通問兼遣軍資十有餘萬俄而寇陷京師駕在靈武往來傳置梗圯不通公以帛書表章封於蠟丸內俾健步宵行晝伏四遠以聞因奉詔肅宗即位之初遣使乘驛布於江淮王命再通繄茲是賴又遷工部尚書兼御史大夫採訪招討等使如故其年冬十月賊將尹子奇史思明等以徑兵十萬發自燕南先陷滄瀛次陵德棣猛若燎火衝如決防公內無兼月之蓄外絶同盟之援度勢量力義無幸給不敢委身待擒貽國之恥遂與麾下歸於鳳翔有詔遷憲部尚書尋兼御史大夫西京平思復舊章屢進讜議觸鱗忤旨竟不久留出為馮翊太守換蒲州刺史充本州防禦使又為酷吏所搆貶饒州刺史遷升州刺史充浙西節度使時劉展在於睢陽反狀己萌公乃飭偏師利五刃水陸戰備以時增修都統使李峘奏以為過防駭衆肅宗有詔追拜刑部侍郎進爵縣公尋而劉展陵陷江淮李峘敗績奔走時之議者皆多公之先覺怒峘之沮計焉御史中丞敬羽詐佞取恩惡公剛直以謗語陰中之天威赫然責命斯極貶蓬州長史代宗即位移利州刺史未之任徵拜戶部侍郎轉吏部侍郎加銀青光祿大夫進金紫光祿大夫除江陵尹兼御史大夫充荊南節度觀察使未辭闕而鑾輿幸陝州公扈蹕行在拜尚書右丞及還京遷刑部尚書續兼御史大夫充朔方宣慰使進封魯郡公食邑二千戶宰臣元載怙權專政每有公議公正言引經不為之屈指擲將如規之載心銜色忿蓄而將發者數四矣會攝享太廟誣以祭器不修啓於宰臣載因奏公謗讟時政貶峽州別駕未到任換吉州別駕移撫州刺史轉湖州刺史政尚清淨長孤養耆徹備浚隍式廉明進吏事特責大旨而已郡人悅之立碑頌德而耽嗜文籍卷不釋手初在德州嘗著韻海鏡源遭難而止至是乃延集文士纂而成文古今文字該於理者托華撮要罔有不備為三百六十卷以其包荒萬彙其廣如海自末尋源照之如鏡遂以名之又著吳興集十卷廬陵集十卷臨川集十卷並行於代大歷末姦臣伏誅宰臣楊綰常袞舉公舊德宜在中朝徵拜刑部尚書公乃奏上所著韻海鏡源帝嘉之藏於集賢書院及祕閣公前後三領大司寇以年老辭榮上愛其才遷吏部尚書清汰九流用正庶官代宗晏駕朝廷以公鴻儒詳練典故舉充禮儀使祗護陵寢率禮無違加光祿大夫太子少師使如故著禮儀集十卷上方倚以為相為權臣所忌遷太子太師外示崇高實以散地處之也建中四年賊臣李希烈阻兵淮右詔公奉使宣慰豺狼方熾或諭公逗遛以需公曰君命也焉避之既見希烈奉宣朝旨詞不屈志不撓賊黨乃交刃脅之慢罵不遜公視之凜如責以悖逆希烈不敢亢逼而退久之置酒大會將餞公復命行有時矣遇叛臣李元平陷我汝海委質賊庭公於座上數其背恩厲氣叱責叛者慙赧密以異語動於希烈希烈意變遂執公囚於官舍防以甲士或掘穽於側或積薪於前或紿以瘞填或許以焚爍虐毒萬計期公毀節公謂之曰願假一劒豈勞多端服義而終乃其所也賊竟不敢逼貞元初希烈陷汝州是時公幽辱已三歲矣度必不全乃自為墓志以見其志是年遇害於汝州之龍興寺春秋七十有六自登朝及作藩牧常以安君厚俗為務獎善伐惡為志言非至公不發於口事非直道不幾於心植操則夷齊之高也理戎則羊陸之仁也當朝則汲黯之正也蒞下則廉范之通也蘊是具美行乎至儉強暴莫敢衝千飇不能動大義久廢公起之醇風久醨公還之非賢人之業何以臻此然虛已下士不以名位自高苟有道者蓬門鶉衣必與抗禮在平原嘗薦安陵處士張鎬有公輔之量數年間鎬位列鼎司論者稱之善與人交執友之子義均甥姪介操所至不遷其守剛而中禮介而容衆靜而無悶動而有光便於已希權幸不為也君有命蹈湯火不辭也心在弭亂不在功志圖報國不圖生故其殺身成仁視死如歸雖漢之龔勝魏之王經無以加焉昔衛銘孔悝魯頌僖公載在禮經形於雅什僉以為公之事君事親愛敬直清跬步不忘德充也服義戴仁顛沛以之行極也探賾儒府述古立言文經也勤勞王家靖難安仁武功也頌聲不昭後嗣何觀於是故吏廬州刺史李萼乃刊石建碑旌於不朽以峘嘗參公會府公卿之末備位史臣俾讚丕烈永示將來敢竭不才恭述所聞銘曰天祚聖唐降賢救時烈烈魯公育德應期巖峙玉鎮伊傅之師文武忠信天子是毗亦既升朝侃然正色潤我王度作藩於德賊為豺虺流蠆下國公飭王旅殄掃妖慝解紛以和柔逆以忠萬里狂飆半為淳風君子知微遇變則通全我庶人入奉宸聰乃副丞相是司喉舌周旋七命內外胥悅營營青蠅不害其潔危行言孫保茲明哲用啓土宇俾侯於魯式是百辟彞倫攸敘亂靡有定盜擾淮浦帝曰汝賢代豫宣撫孰不懷忠處死難之於赫我公視險若夷猛獸齗齗履之不疑扇彼薄俗惟緝惟熙昔在申伯作藩周室詩人歌頌尚播聲律矧我文忠人之紀綱功侔四時節貫雪霜煥乎立言歿而彌彰日居月諸垂範無疆衡至德中歷官散騎常侍檢校禮部尚書兼御史大夫天寶初適於平陽平陽太守稷山公則衡之從考舅雅好古道門尚詞客當今文人相與多矣嘗歎曰取士之道才其難乎或精文而薄於行或敦行而淺於文斯乃有失其道一至於此顧衡曰吾嘗謂爾知言爾其言之衡私門以文場而進五世鄙雖不嗣忝藉餘訓敢著元龜以敘其事元龜曰文道之興也其當中古乎其無所始乎且天道五行以別緯地道五色以別方人道五常以別德易曰觀乎天文以察時變觀乎人文以化成天下非五緯孰可以知天非五方孰可以辨地非五常孰可以化人文之為道斯亦遠矣天人之際其可得於是乎夫卦始乎三畫文章之閫大抵不出乎三等斯乃從人而有焉工與不工各區分而有之君子之文為上等其德全志士之文為中等其義全詞士之文為下等其思全其思也可以綱物義也可以動衆德也可以經化化人之作其惟君子乎君子之作先乎行行為之質後乎言言為之文行不出乎言言不出乎行質文相半斯乃化成之道焉志士之作介然以立誠憤然有所述言必有所諷志必有所之詞寡而意懇氣高而調苦斯乃感激之道焉詞士之作學古以攄情屬詞以及物及物勝則詞麗攄情逸則氣高高者求清麗者求婉恥乎質貴乎情而忘其志斯乃頽靡之道焉古人之貴有文者將以飾行表德見情著事杼軸乎天人之際道達乎性命之元正復乎君臣之位昭感乎鬼神之奧苟失其道無所措矣君子也文成而業著志士也文成而德喪然今之代其多詞士乎代由尚乎文者以斯文而欲軌物範衆經邦敘政其難致乎化成悲夫敢著元龜庶觀文章之道得喪之際悔吝之所由者也
