front:
  text: 全唐文欽定全唐文卷五百八權德輿二十六
  hash: sha256:578109196ffd9405f0f9057917034622def1b188b27fd943db7d16368d1665d7
body:
  text: 吳筠字貞節魯中儒士也少通經善屬文舉進士不第性高潔不伍流俗乃入嵩山依體元先生潘師正為道士傳正一之法苦心鑽仰盡通其術開元中南遊金陵訪道茅山久之東遊天台筠尤善著述在剡與越中文士為詩酒之會所著歌篇傳於京師元宗聞其名遣使徵之既至與語甚悅令待詔翰林帝問以道法對曰道法之精無如五千言其諸枝詞蔓説徒費紙札爾又問神仙修鍊之事對曰此野人之事當以歲月功行求之非人主所當適意每與緇黃列坐朝臣啓奏筠之所陳但名教世務而已間之以諷詠以達其誠元宗深重之天寶中李林甫楊國忠用事綱紀日紊筠知天下將亂堅求還嵩山纍表不許乃詔於嶽觀別立道院祿山將亂求還茅山許之既而中原大亂江淮多盜乃東遊會稽常於天台剡中往來與詩人李白孔巢父詩篇酬和逍遙泉石人多從之竟終越中文集二十卷其元綱三篇神仙可學論尤為達識之士所稱凡為文詞理疏通文彩煥發每製一篇人皆傳寫雖李白之放蕩杜甫之壯麗能兼之者其惟筠乎維永貞元年歲次乙酉十月景申朔孝孫嗣皇帝臣某伏維大行皇帝德合天地作人父母纂承光明建用皇極昔在寶應制天下賦輿戚藩以大自魯疏雍師律既貞會陝收洛克燀威命廓開王塗自登上嗣乃宅丕后服藝祖神宗之大烈有乾乾翼翼之至敬敷佑迪哲尊嚴懿恭燭明四極發育萬物濯沐乎仁澤澄清乎理本巍巍乎建中風聲與貞觀同符洎時有祲沴變生京轂省方履薄宏陰步馬之功整旅致誅申震耀之令氛祲滅息侯王軌道丕冒持載鏡清砥平然後明禋毖祀萬靈以接翕受敷施九德咸事含宏亭毒以致其和博采虛受以通其志政刑有針宸扆有銘煥乎文明之化成也因時創節象卦設樂薰然中和之被物也納嘉言於近侍輟已行之詔疾讒口於宵人宥過誤之罪去徽號而約已正廟祧而尊祖九譯通道萬方來庭賨旅焯乎勳籍夷歌陳於樂府霜露所隊車書大同順氣旁達天休滋至慶霄輪囷德水清徹三辰秉陽以宣耀百嘉麗地而交感飛走呈祥肖翹遂性在宥天下二十有七年夫文思光被陶唐之盛也憯怛忠利虞帝之教也亹亹穆穆周文之業也聰明神武漢祖之烈也窮古先之大律極帝者之上儀方將扈升介丘侍檢玉牒奄遺天命永棄萬方億兆嗷嗷哀號靡訴顧惟沖昧懼忝孫謀君父有命付茲神器虔恭貽訓感慕滋深今因山既建同軌畢至一二元老宗工碩生考稱天之禮稽節惠之法式遵古義敢薦大名謹遣攝太尉門下侍郎平章事杜黃裳謹奉册上尊諡曰神武孝文皇帝廟曰德宗伏惟聖靈昭格膺是典禮幽贊丕祉流於無窮嗚呼哀哉維元和十一年歲次景申某月朔日哀子嗣皇帝臣某伏維大行皇太后柔明承天廣大法地齊二儀以發育含萬物而化光靜專宅心謙儉約已塗山積厚淮水秉靈四德交修六宮承式於德宗有逮事之孝敬於先皇有輔佐之憂勤啓迪風徽儀刑天下伏以永貞誥命脫屣寰區乃居太上之尊乃正中宮之位顧茲沖眇上荷劬勞自幼逮長稟邑薑之教勗繼體纂圖申長信之供養率用慈訓施於理道母儀所被子惠所覃一紀於茲萬方蒙福以載物之量包逮下之仁嗣任姒之徽音慕黃老之清淨宜錫丕祉壽如岡陵昊蒼不憗艱俄及追惟顧復創巨感深銜恤茹荼叩心罔極今祔虞即遠龜筮告吉順厚夷體幽嚴就路宰政卿尹與典禮之官詢考古式詳稽諡法以周道章明未之或改形容擬議敢易大名謹遣攝太尉中書侍郎平章事臣裴度奉册上尊諡曰莊憲皇后伏惟皇靈降格淑聖幽贊昭配清廟對越鴻休與太陰方祇永永無窮嗚呼哀哉維元和十二年歲次丁酉七月戊子朔十五日壬寅孤孫山南西道節度管內支度營田觀察處置等使銀青光祿大夫檢校吏部尚書興元尹御史大夫扶風郡開國公食邑二千戶某敢昭告於王考贈尚書禮部郎中府君伏惟尊行令德不丁於時義方教忠貽厥延耀今王妣靈輤至自澤國龜筮叶吉啓祔有期聖慈孝理贈典裦賁敢用遠日祗焚命書襚服徽數加大夫之飾官守拘限不獲躬親謹遣男監察御史裏行璩以柔毛剛鬣嘉薦醴齊將命襄事伏惟尊靈降格維云云敢昭告於王妣夫人宏農楊氏伏惟坤順協德閨門流慶昔歲違難假葬南方今龜策告猷歸祔伊洛先遠將及恩禮特加王考府君有裦錫之命限以守在方任兼領戎師不獲榮護道途躬奉窀穸殘生孤苦萬感在心謹遣男璩以柔毛剛鬣嘉薦醴齊展禮伏惟尊靈降格維云云敢昭告於考贈太子太保貞孝公妣贈絳郡太夫人隴西李氏追惟齓歲奄失嚴訓逮至立年再鍾荼蓼零丁孤藐苟未滅身自幼逢聖明獲備將相祗循教義摧割肝心伏以潤州壤樹久已安宅但地遠江介心焉匪寧遷神反祔永懷怵惕伊水之陽喬木斯在伏以二尊棄代年紀寖遠四承追命再受封疆禮官易名考功奏議今因祖載備舉徽章王考府君恩加贈典申下養之義遂罔極之誠孤蒙無似觸緒崩裂受命守土有闕躬親謹遣男璩以柔毛剛鬣嘉薦醴齊將事祗薦伏惟尊靈降鑒永寧厚載維建中二年歲次辛酉某月朔日試右金吾衛兵曹參軍權德輿謹以清酌時羞之奠敬祭於故屯田郎中柳公之靈在漢理平子陵退耕運鍾明時公遂性情典校司諫便蕃清秩南宮之拜詔書三出中朝虛左公志不屈優遊化源消息心術四時芬芳百鍊精剛德充於中用晦彌光是非萬殊不滑其常和易內蘊發於文章性命之際希夷之域理無不窮言必冥極救彼文勝作為典式扶教立言實在清德時方逐進公則尚退人或外獎公則理內獨立不惑以身矯世萬頃淵然孰知其際顧惟小子猥奉音徽賞則過實勗常中非目想德容心存清機今則不見涕流沾衣嗚呼哀哉人世則異清風不匱繐帳寥寥泉臺下閟常聞福善今也無嗣立命如何斯文其墜尚饗維建中三年歲次壬戌某月朔日試右金吾衛兵曹參軍權德輿謹以清酌庶羞之奠敬祭於故海陵縣尉李君元易之靈我得元易於茲三年粹秀清和仁義在焉行有餘裕其文燦然五字之中含寫風煙巖扉舊隱常聞清興諸生討論雅有時稱初與盧㣥德倫同隱居於譙山理實歸研境無逃勝嘉招既至虛中以應從容解巾作尉江濱退以直道進無其人性志彌篤郊居食貧衡茅之下孤石藂筠連牆者何則有元鈞元鈞名喻君之族父探味元奧疏適心神晚獲覯止心乎愛矣扁舟往復就館於子靜賞煙霞深窮名理友直友諒惟君是以行不苟容必俟良工棧縶絶足櫝閉銛鋒竟嗟不試一命淪躓身沒迹晦靡申素志惟富與壽君則不至人皆有子君獨無嗣繐帷飄飄靈座深閟幽顯此殊嗚呼元易尚饗維建中四年歲次癸亥月朔日從姪某謹以清酌庶羞之奠敬祭於故戶部員外郎十四叔之靈福善降祥是為教源至於性命古人罕言沴氣交薄作為夭昏慘閼時和殄瘁仁賢不極修途不登大年命屈其志古今共然追惟叔父顯顯令德統九流於靈府貫百行於精識昔在巾褐即為聞人冰玉之姿穎然不㣥禪惠通性文章發身清談一室車騎如雲辟書交至使者結軌譏孟晉以近名隘並介之不起從容翔集盡於知己故顯昧之間皆酌中合禮江南擁旄主東諸侯參佐之選時稱先儔婉婉良畫心和智周始於一言惠澤旁流再歷郎署三參憲府十年之間赤紱在股暢恬淡之元姿期青冥於步武厚夜何言夷途遂阻憶昨拜手猶承晤語旬朔之間奄成終古塗芻既列哀挽既發族子之念偏深林下之歎永絶胡為造物胡為夭閼悠悠九原拜奠酸咽尚饗維貞元二年歲次景寅十月朔日試右金吾衛兵曹參軍權德輿謹以時羞之奠敬祭於故李處士十六兄之靈惟先吏部文德冠時天下翕然有所宗師鍾美於兄式克似之爰自稚歲淡然清姿惟我與兄世有舊歡應若塤篪芳若芝蘭居易處厚中明外寬發於濬源激為清瀾放懷外物清機善謔討論不倦名教為樂迭用古義以相博約先王觀風命史陳詩雅南之後其道日醨騷楚怨思王風澆夷升降之義與代相隨國朝數公稍振舊風兄實求已服勤於此敷陳麗則不野不史含寫佳境優遊精理七發未終俄驚不起追惟前年訪我由拳握手開襟殷勤款言孰謂此訣死生間焉今我來斯舊館依然文伯既沒敬薑哀慟子敬下世徽之永痛嗚呼哀哉流形賦命孰主張是昏囂闒茸或壽或貴方直清明乃夭乃否如何斯人才命不侔未室未仕溘與化俱志業靡申沈痛泉壚福善與仁胡其忽諸嘉殽在籩旨酒在壺寄此一慟汍瀾涕濡尚饗維貞元三年歲次丁卯十二月朔子壻試大理評事攝監察御史權某謹以清酌庶羞之奠敬祭於外舅故相右庶子安平公之靈元精熙熙大化沄沄合散萬形以陶以鈞感和合祥則生鳳麟含粹炳靈乃有仁人嗚呼安平受天清淳全德不器大方無垠恭聞稚歲卓爾殊異亦既冠字確乎其志去華務實探幽索祕窮盡化源深入精義上下千古周流百氏自觀靈龜不嗅驕餌考古立言其文煥然乃論皇極乃志元德識洞窈冥言經邦國幽蘭在林鳴鶴在陰嘹唳芳芬越自重深安貞用晦其道乃大卷舒之間律呂相會相會者何時惟贊皇受命開府作藩東方美公德輝暗然而章車乘翹翹重禮以將連茹時賢是集是翔禺禺卬卬萃於公堂古之待士懼其不至故賓不自賤而主不自貴道薄俗醨其風寖隳苟於所以又患失之故戟戶益尊蓽戶益卑名節不立廉隅以虧公之出處時之準的誾誾直詞婉婉嘉畫贊皇為主安平為客化被句吳幾於恥格令德孔昭觸邪登朝或塞或通不磷不凋乃補衮職柔嘉剛克右掖既言其詞則直直方明謨與古為徒以直言為己任願致君於黃虞屢封皂囊亦伏青蒲爰啓爰沃乃咨乃俞㣥墨惡白行吟楚澤歲久逾芳剖符建陽政和用易邦人樂康興元之初王旅未振或任專征且迷大順區區遐方獨抗忠憤馳書激切誚喻方鎮飛章間道旁午奔問密疏安危以扶皇運翠華旋宮馳驛命公選部為郎郁郁清風克厭帝心給事於中乃贊大政以釐百工謂俾元元既庶而富未展緝熙遽罹沈痼移疾請告乞身抗疏留中久之不忍其去乃相東朝禮備優賢方冀勿藥再持化權蒼蒼者何不錫永年壽屈其才從古以然內惟小子倥蒙褊吝昔歲羈牽遇公於信亭伯直道君山佐郡莫際波瀾幸窺牆仞因曰世與道交喪恬與智相養盍晦而明盍性而情虛中蹈道以此為經亦既歸止貧居練水靜守緒言期於沒齒芳訊忽至開緘盈耳申以嘉姻眷同國士心合義固尺書而已禮異常情感深知己音徽相繼封壤或殊逮前年之中春獲結甘於楊都夙承師友載反門閭阻拜禮於上國承施襟於外姑九江之西謬見羈束惠愛則深格言相屬固窮難進是導是勗心知善誘力有不足一曠清德七年於茲物類形留神交坐馳亦謂恬曠漸消癘疵不虞不圖凶訃來斯哀激中腸浹於四支恨情禮之未展痛幽冥之永辭藐彼二連欒欒孝思德以遺後魂無不之東洛西江支離拘限迹滯幕庭心馳祖奠嗚呼哀哉賢人之生力命難並年中身兮道未行去昭昭兮即冥冥一往不復空留淑聲銜酸托辭庶達明靈尚饗維貞元七年歲次辛未五月朔日故吏前江南西道觀察支使監察御史裏行權德輿謹以清酌時羞之奠敬祭於故國子祭酒李公之靈伏惟峻閥洪宗有勞有忠光耀北朝黎申繼封世名清純以至先公彌綸盛時德位昭融文武吉甫克嗣其風儲慶發淳擇乎中庸天寶中年仕無異門講道積學五經綸紛以能詔官校理祕文溫若玉質郁如蘭薰絃琴峩峩擁傳轔轔兩無留事並著嘉聞題輿佐理剖竹為政均彼化條其徵令風行草靡飲和發咏難理之時四封謐靜纍遷大郡亦佐成師宣其馨香蠲彼癘疵時有行止道無磷緇虛中十年觀我靈龜大君嗣位推擇良守乃眷上遊作藩夏口報政獻功察廉一方再扞大憝以完南邦盡殪舟師王旅乃張衆寡相懸以律而臧就加副相乃鎮西江來歡去懷金石洋洋剛柔全德蹈履不忒外無牆藩之峻中踐夷坦之域為仁由已率誠不飾播厥美利根於易直災去水火人滋衣食流庸胥附生齒益息亦既七年慰安斯人沖用知止封章乞身朝典崇儒徵拜成均遽歎夢奠俄驚返真猥以蒙蔽再塵盛府重問縟禮蓬茨之下惠愛博約深誠見與左右彌縫愧無所取九江拜手浹日前期如何奄忽過隟生悲羊公峴首良會無時庾亮樓中永絶清機前歡幾何圓魄才缺承訃長慟潺湲涕咽返葬迢遞西周古原柳車芻靈飛旐翻翻體魄則降德馨長存拜奠心碎難酬舊恩尚饗維貞元七年歲次辛未某月朔日前監察御史裏行權德輿謹以清酌庶羞之奠敬祭於故殿中侍御史薛七兄之靈有生必化大鈞之方盛極而衰乃理之常又曰善慶鍾為福祥今則繆盩天乎茫茫追惟明靈夙播馨芳解巾憲府纍冠神羊清明之用百鍊堅剛麗藻之文六律鏗鏘雅言婉婉令問章章靖恭端和休有耿光才踰強仕未踐周行衆情禺然日遲鶱翔早維通舊已飫馨香晚忝嘗寮載換星霜府庭同舍居室鄰牆切劘惠愛何可弭忘憶昨從公沿泛長江賓榻初散雲帆並張晨登佛廟晚眺魚梁善謔理窟清言智囊既濟江浦俄驚府喪同歡未幾今也則亡古稱臧孫德遠流長遽歎伯道永絶蒸嘗嗚呼不傭難究蒼蒼上歸元漠下閟幽荒呼天者兄哭晝者孀琴書已矣行路悽傷柔嘉備籩澄齊滿觴神其格思揮涕浪浪尚饗維貞元八年歲次壬申五月朔日故吏金部員外郎蕭存太常博士權德輿大理寺丞王純等謹以清酌庶羞之奠敬祭於故祕書包七丈之靈在漢鴻臚蔚為名儒以續簪裾乃生祕書純誠伉直古訓是式納忠宣力有勞王國昔自秀造翰飛扶搖彌綸劇曹領袖清朝出入諷議嘉聲孔昭道塞時通乃領藩條俄復郎署俾均繇賦經費委輸待公而具受命匪躬於汴之東秩宗之二司憲之雄鑾輅時巡關梁未通每以貞勝行於險中登賢求舊入佐司寇中和直清望與實並乃總師氏三德興行又領祕邱六藝章明偃息文囿優遊漢庭雅韻拔俗清機入冥立言大旨為經為紀行中文質不華不俚魯史一字詩人四始泝其源流用制頽靡以誼藩身與道為鄰虛中皎然不棲緇塵動靜專直儀刑搢紳得喪虧成靡滑吾真宜介遐福宜受戩穀未及下壽胡為不淑遺孤藐然銜恤茹毒善慶不誣期於必復某等劣薄嘗承討論通世宿好嘉招厚恩舞雩春遊昔實童子峴首良會俄叨知己歲月遄邁或行或止慰薦難忘音徽不已各忝官命來歸帝里話舊語新悲歡未幾驚疾癘之潛遘冀無妄而有喜信宿之間格言在耳精識不亂達生大觀謝醫禱於門人順一氣之聚散大鈞無期化往何之邦國殄瘁古今悽其虛室寥寥繐帷披披哀從中來雪涕交揮柔嘉列籩清酤滿巵神之聽之噫嘻格斯尚饗維貞元九年歲次癸酉正月庚辰朔二十一日庚子右諫議大夫陽城給事中徐岱李衡中書舍人奚陟尚書駕部郎中知制誥張式左補闕權德輿謹以清酌庶羞之奠敬祭於故給事中呂公之靈君子之道貴乎艱貞公用踐履剛中粹精文學政事蔚然時名出處屯夷用晦而明命佐戎車於彼淮甸方國多虞妖氛潛煽每以明誠冀其革面外蒙恥以枉尺中飛章而告變白刃臨前丹心炳然貞其困而後濟忘其生而後全祲沴既平忠勞亦著草奏南宮嘉聲載路出領符竹澄清遠部夕拜黃扉昭宣王度獻歲朝天侍立君前華纓玉珮行止鏘然周旋陟降接踵差肩如何纍日奄閟重泉嗚呼哀哉寓形此世無非大夢寢門之外莫甚斯慟交歡幾時踰月於茲每冀休沐相從宴私孰謂奄忽俄生癘疵醫禱不及形神已離某等或辱在嘗寮或忝陪下列喜雲霧之初披恨幽明之遽訣瞻彼塗芻言旋洛都平昔志氣復歸虛無酒殽靜嘉盈俎滿壺何以道意潸然涕濡尚饗維貞元九年歲次癸酉十一月朔日左補闕權德輿等謹以清酌庶羞之奠敬祭於故右補闕贈禮部郎中梁君之靈我思古人乃得敬之今則不見嗚呼噫嘻賢哲之生作瑞於時中立不倚大道甚夷人或多方以取世資君懼其至泊然靈龜遊夏遠矣文章運衰風流不還作者蓋希君得其門獨斥澆醨遐蹈古始六經為師初冠章甫在江之滸忘形交臂或出或處久要之契吻然相與直諒切劘曠懷無阻漢庭虛左尺一旁午心與雲間翼隨風舉恬漠虛白環中之樞篤厚誠明君子之儒精義入神英華發舒人所景行君之緒餘乃補衮職乃侍皇儲北宮密命東觀直書致用無方迎刃皆虛漸漬教化暗然而孚文武憲章堯舜典謨空結時望莫申令圖宜錫華皓以極其道鍾美實多歸全太早子淵之仁叔度之賢皆厚其才而奪之年吁嗟敬之今亦已焉孰司化工不與其全凡我同人官次周旋微言嘉話恍若目前吾欲問蒼蒼而訴冥冥索夫子於重泉末如之何從古以然平生一樽哭奠靈筵魂氣何往空傷絶絃尚饗維貞元十年歲次甲戌三月朔日徵事郎守左補闕權德輿謹以清酌庶羞之奠敬祭於故國子祭酒韓十四丈之靈伏惟德厚流光炳靈發祥傳慶於公鬱為圭璋宣力中外道光明代動必有裕直而無悔從容諫垣密勿絲言炳然憲章潤色化源天官之二京劇之貴四方取則九賦不匱蓬山祕書大學尊儒選重前代非賢勿居率是明德便藩右職宣其馨香昭其物則四科難並全才乃克利用無方沛然餘力再世金鉉確乎匪躬光輔帝道是為門風緇衣棣華宜復於公終缺人望天乎不傭顧惟小子夙承先友骨肉之契歲寒逾久爰自齠丱深仁善誘恤此殘生均其所有衣而食之祿而仕之闔門仰給纖悉無遺仁惻之道曲盡其宜二十年間完安保持比肩多士忝迹清時必由念慮敢不知思秦原蒼蒼丹旐遲遲精魂何往音容莫追沈哀激中雪涕交揮神鑒如在含酸託詞尚饗
