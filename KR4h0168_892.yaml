  text: 全唐文欽定全唐文卷八百九十二嵩潯州平南人南漢白龍元年舉進士第一官翰林學士
  hash: sha256:40391f639ccbe72554859e52a35b32166328930965658f8c518d045579f60d73
  markers:
  - {type: head, offset: 14, content: 梁嵩, id: KR4h0168_NFKB_892-h1, level: 1}
body:
  text: 蒼蒼茫茫道遠倚倚望望情傷念蕩子之久別投慈心於遠方渺渺何之動幽懷於眷戀滔滔不返向上國以觀光當其截髮投師操心託迹遙望皇都俯登紫陌齧臂於衞國門前題柱於昇仙橋側擔簦日久希寸祿以資榮負米程遙仗何人而請益征輪蓬斷別騎塵飛睇眸睠睠凝思依依欲歷而既升雲路遙憐而獨倚柴扉汨沒難明我則每晨昏而悵望宗支有託汝盍計蚤晚以言歸常曠望於烟霄每凄凉於蓬蓽杳杳兮故路寂寂兮舊室幾行雁陣空來萬里尺書難述水聲山色遽驚懷古之人別恨離情愁對秋風之夕眷戀徘徊憂心靡開抑鬱之情恒自切湮淪之事有誰哀念一葦於津涯誠難去矣聽孤鴻於碧落得不悲哉想彼淹留傷乎離索躊躇兮不止優游兮何託盈庭之萱草徒榮滿目之蘆花自落楊朱陌上蕭條而恨淚澘澘漢武臺邊宛轉而殘霞漠漠恨山海之高深念行役以難尋憶昔伯俞之志寧無泣杖之心對月而常憐獨坐聞蛩而每憶寒吟勤茲懷土之思惟憑蜀魄觸爾還鄉之計暗託秋砧嗟夫峩峩中立殷殷士子獻書之疏復何如干祿之心幾時止遣我日日望紅塵未見此心終未巳允章其先邕州人徙家番禺一曰宣化人南漢先主時舉進士累遷中書舍人三主時拜工部郎中知制誥後主立擢尚書左丞參知政事宦官許彥真誣以謀反族誅大漢享國之三十有三祀龍集巳酉季冬蓂開十四葉上以萬幾有暇四海無波時屬祁寒節當冬狩九卿扈駕百司隨鑾闕巡英州舍於閬石翌日排仙仗整翠華羽衞星羅旗幢雲布嶽靈警蹕風伯清塵上衣龍章絳袍曳鳳文翠綬佩流黃鏤金之劍御飛靈淩崖之輿幸茲盤龍石室者也伏惟陛下聖惟天縱功格帝堯味道探元奉真元之化端拱垂衮返淳樸之風百度惟貞九圍承式因訪清虛之景爰追汗漫之游斯山之勝㮣也得非元化興機巨靈運智丹臺璿室真為上帝之居乳竇芝房宛是長生之境白犬吠而壺天晝永幽禽語而洞壑雲深神草含華元泉瀉瑞於是拂石牀而設御停玉輦以凝旒遂感龜鶴呈祥河宗效器俄頃有一道流衣短褐斂容而至自稱野人本無姓名云昔時葛先生於此石室煉丹砂藥成息焰躡雲而舉令野人且伏火延神祕丹於靈府幷云後五百載當有真人降此子宜以還丹呈獻昨畧算之起重光單閼之嵗迄屠維作噩之年將四百九十祀果令金德主來幸驗其君之言明矣野人因匍匐而來上喜聞所陳問仙者靈丹何在野人曰咫尺耳遂捫蘿於峭壁中取出一小石函函上有金書古篆題九蛻之丹四字內有神丹七粒大如黍粟光彩射人仙者開函取丹躬自持獻野人遽旋踵隱入石縫間罔知厥止時有近臣奏曰聖上德契元微感茲靈異尚以兆民係念四海為心雖獲還丹未宜輕服上然所奏遂屏左右乃召從臣吳懷恩捧丹隨御於石室深邃處鑿石祕之眾莫知矣擇日亟命道眾設壇場陳齋醮以申告謝靈貺繇是龍顏開豁圓葢舒晴緩撫瑤琴弄流泉之激越親灑宸翰奮睿思之縱橫奏九成之簫韶烟霞縹緲感百獸之率舞洞府喧闐㣥后子來皆朝於禹會眾仙萃至競祝於堯齡微臣榮列紫垣獲隨鑾輅紀仙靈祕奧之事愧乏好辭頌聖朝煥赫之功慚無麗藻拜承綸旨伏積兢惶時乾和七載記守中南漢大寶七年官西御院使集賢殿學士承旨大中大夫行左諫議大夫知太僕寺事原夫真空無相劫火銷而性相何來妙法有緣元氣剖而因緣何起造化莫能為關鍵元黃不可為種根乩乎十號之尊出彼三祇之劫增莫知而減寧覩詎究始終望不見而名無言孰明去住不有中有不空中空匪動匪搖常寂常樂拘留孫之過去釋種圓明毗婆尸之下生元符合契繇是修行道著相好業成爰授記於定光迺度人於摩竭自是一音演說二諦宏宣開八萬法門化三千世界大乘六而小乘九慧業難基欲界四而色界三昏波易染所以興行六度接引四生求真者競洗六塵修果者咸超十地盡使昏衢之內俱萌捨筏之心大廕人天俾居淨土其後衣纏白㲲屣脫金沙示無住之身現有終之理於是迦葉結集阿難證真遞付心珠住持法藏象教遠流於千輦覺花遍滿於十方馬鳴興護法之功龍樹顯降魔之力師師相受法法相承大化無窮不可思議而自我祖承運明帝御乾符聖夢以西來圖粹容而東化金言玉偈摩騰行首譯之文鹿苑雞林佛朔遂身游之化迨於魏晉迄至隋唐達理者甚多得道者非少其如歷帝歷代有廢有興未若當今聖明欽崇教相者也伏惟睿聖文武隆德高明宏道大光孝皇帝陛下德參覆載道合照臨叶九五之龍飛應一千之鳳歷承帝嚳有堯之慶鴻業勃興體下武繼文之基聖功崛起每念八紘紛擾九土艱虞耀干戈弧矢以宣威救生靈塗炭用聲明文物而闡教致寰宇雍熙櫛沐忘勞鑿大禹之所未鑿造化不測開巨靈之所未開慶雲呈而甘露垂嘉穀生而芝草出其於儒也則石渠金馬刊定古今八索九邱洞窮淵奧其於道也則探元抱樸得太上之妙門寶籙靈符授虛皇之祕訣於幾暇既崇於儒道注宸衷復重於佛僧是妙奉三寶於虛闕一字福萬民於寰宇紺宮金剎在處增修白足黃頭聯辰受供而乃頻彰瑞感顯應昌期矧以韶石奧區曹溪勝地昔西來智藥三藏駐錫於曹溪曰一百七十年後當有無上法寶肉身菩薩於此興化學道者如林故號曹溪曰寶林也二十八祖之心印達摩東傳三十三代之法衣祖師南授洎六祖大師登正果之後所謂學者如林天下高僧無不臻湊者矣大慈雲匡聖宏明大師者則別㯋一枝也大師澄真不渾定性自然馳記別之高名躡迦維之密行慧燈呈耀智劍發硎六根淨而五服清不染不著四果證而三明朗自悟自修啟禪門而定水浤澄搜律藏而戒珠瑩澈水上之蓮花千葉清淨芬芳空中之桂魄一輪孤高皎潔機無細而不應道有請而必行故得百福莊嚴萬行圓滿盡諸有漏達彼無為大師諱文偃姓張氏吳越蘇州嘉興人也生而聰敏幼足神風不雜時流自高釋性纔逾丱嵗便慕出家乃受業於嘉興空王寺律師志澄下為上足披經譯偈一覽無遺勤苦而成依年具尸羅於常州戒壇初習小乘次通中道因聞睦州道蹤禪師關鑰高險往而謁之來去數月忽一日禪師發問曰頻頻來作什麼對曰學人已事不明禪師以手推出云秦時車度轢鑽師因是發明微而有理經數載策杖入閩造於雪峯會下三禮之後雪峯和尚頗形器重之色是時千人學業四眾咸歸肅穆之中凡聖莫測師朝昏參問寒燠屢遷昂鶴態於㣥流閉禪扉於方寸因有僧問雪峯曰如何是觸目不見道運足焉知路雪峯曰吽其僧不明舉問師此意如何師曰兩斤麻一疋布僧又不明復問何義師曰更奉三尺竹僧後問於雪峯峯曰噫我常疑箇布衲其後頗有言句繁而不書乃於眾中密有傳授因是出會游訪諸山後雪峯遷化學徒問曰和尚佛法付誰峯曰遇松偃處住學徒莫測偃者則師之法號也遺誡至今雪峯不立導未屆於曹溪旋謁靈樹故知聖大師如敏長老以識心相見靜本畧同儔侶接延僅逾八載丁丑知聖忽一日召師及學徒語曰吾若滅後必遇無上人為吾茶毗及戊寅嵗知聖大師順寂恰遇高祖天皇大帝駕幸韶陽至於靈樹敕為焚爇果契前言也師是時奉詔對敭便令說法授以章服次年又賜於本州為軍民開堂師據知聖筵說雪峯法牧守何希範禮足曰弟子請益師曰目前無異草是日問禪者接踵其對答備傳於世師爾後倦於延接志在幽清奏乞移庵帝命俞允癸未領眾開雲門山搆創梵宮數輦而畢莫不因高就遠審地為基層軒邃宇而湧成花界金繩而化出曉霞低覆絳帷微襯於雕楹夕露散垂珠網輕籠於碧月匼匝盡奇峯秀嶺逶迆皆潑黛堆藍泉幽而聲激珠璣松闕一字而勢拏空碧由是裝嚴寶相合雜香廚摳衣者嵗溢千人擁錫者雲來四表菴羅衞之林畔景象無殊耆闍崛之山中規模匪異院主師傳表奏造院畢功敕賜額曰光泰禪院至戊戌嵗高祖天皇大帝詔師入闕朝對有容因宣問曰作麼生是本來心師曰舉起分明帝知師洞韞元機益加欽敬其日欲授師左右街大僧錄遜讓再三而免翌日賜師號曰匡真大師延駐浹旬賜內帑銀絹香藥遣迴本院厥後常注宸衷頻加賜賚尋伏遇中宗文武光聖明孝皇帝纘承鴻業廣布皇風廓靜九圍常敬三寶復降詔旨命師入於內殿供養月餘仍賜六銖衣錢絹香藥等却旋武水幷顯賜塔院額曰瑞雲之院寶光之塔師禪河浩淼聞必驚人有問禪者則云正好辨有問道者則云透出一字有問祖師意者則云日裏看山凡所接對言機大約如此了義元遠法藏幽微化席一興嵗華三紀師於生滅處在色空中來若鳳儀作僧中之異瑞去同蟬蛻為天外之浮雲於屠維作噩之嵗四月十日寢膳微爽動止無妨忽謂諸學徒曰來去是常吾當行闕二字命侍者奉湯師付湯椀於侍者曰第一是吾著便第二是汝著便亟令修表告別君王乃自札遺誡曰吾滅後不得斆俗着孝衣哭泣備喪車之禮則違我闕三字也付法於白雲山實性大師志庠其日子時瞑目怡顏謺足而化嗚乎化緣有盡示相無生端然不壞之身寂爾歸真之性惠海雖乾於此界法山復化於何方風雲慘澹以低垂眾鳥悲鳴而不散學徒感極瞻鴈塔以銜哀門客戀深拜禪龕而雪涕以當月二十有五日諸山尊宿四界道俗送師入塔壽齡八十六僧臘六十六香飄數里闕二字一隅護法龍神出虛空而閃爍受戒陰步馬現髣髴之形容其後諸國侯王普天僧眾聞師圓寂競致齋羞而後一十七年我皇帝陛下應天順人垂衣御極順三靈而啟聖紹四葉之耿光大振堯風中興佛法至大寶六年嵗次癸亥八月有雄武軍節度推官阮紹莊忽於夢中見大師在佛殿之上天色明朗以拂子招紹莊報云吾在塔多時汝可言於李特達秀華宮使特進李託也託他奏聞為吾開塔紹莊應對之次驚覺歷然是時李託奉敕在韶州於諸山門寺院修建道場因是得述斯夢修齋事畢迴京奏聞聖上謂近臣曰此師道果圓滿坐化多年今若託夢奏來必有顯現宜降敕命指撝韶州都監軍府事梁延鄂同本府官吏往雲門山開塔如無所壞則奏聞迎取入京梁延鄂於是准敕致齋然後用功開鑿菩薩相依稀旋覩蓮花香馥郁先聞須臾寶塔豁開法身如故眼半合而珠光欲轉口微啟而珂雪密排髭髮復生手足猶軟放光於方丈晃耀移時興瑞霧於周迴氤氳永日即道即俗觀者數千靈異既彰尋乃具表聞奏敕旨宜令李託部署人船往雲門修齋迎請天吳息浪風伯清塵直濟中流俄達上國敕旨於崌崍步駐泊翌日左右兩街諸寺僧眾東西教坊四部伶倫迎引靈龕入於大內螺鈸鏗鏘於玉闕幡花羅列於天衢聖上別注敬誠賜昇祕殿大陳供養謺啟齋筵排內帑之王褱珍饌天廚之薀藻列砌之驪珠斛滿盈盤之虹玉花明浮紫氣於皇城闕一字靈光於清禁聖上親臨寶輦重換法衣謂侍臣曰朕聞金剛不壞之身此之謂也於是許㣥僚士庶四海蕃商俱入內庭各得瞻禮瑤林畔千燈接晝寶山前百戲聯宵施闕三字不可殫紀以十月十六日乃下制曰定水澄源火蓮發豔夙悟無生之理永留不朽之名萬象都捐但祕西乾之印一真不動惟餘南祖之燈韶州雲門山證真禪寺匡真大師早契宗乘洞超真覺雖雙林示滅十七年靡易金軀隻履遺蹤數萬年應迴葱嶺朕顯膺歷數纘嗣丕圖洎三朝而並切皈依乃一心而不忘迴向仰我師而獨登果闕一字在沖人而良闕一字歎嘉宜行封賞之文用示裦崇之典可贈大慈雲匡聖宏明大師證真禪寺宜昇為大覺禪寺重臣將命乳奠坤儀太常行禮於天墀綸誥宣恩於雲陛固可冥垂慈貺密運神通資聖壽於延長保皇基於廣大師在內一月餘日聖澤優渥七寶裝龕六銖裁服頒賜所厚古今難倫當月二十九日宣下李託部署去迴山門有參學小師雙峯山長老廣悟大師賜紫竟欽溫門山感悟大師契本雲門山上足小師應悟大師常寶等同部署真身到闕亦在內庭受供恩渥異常其諸上足門人常厚等四十餘人各是章衣師號散在諸方或性達禪機或名高長者在京小師悟明大師都監內諸寺賜紫常一等六十餘人或典謀法教或領袖沙門臣才異披沙學同鑄水虔膺鳳旨紀實性以難周愧匪雄詞勒貞珉於不朽乃為銘曰於穆大雄教敷百億亭育二儀提攜八極不滅不生無聲無色卓爾神功昭然慧力其一化無不周道無不備法既流兮教既布矣爰未滅樂歸乎妙理寶性真宗枝分風靡其二祖祖傳心燈燈散燭詮諦騰鑣聖賢交躅種種津梁門門杼軸正覺廣焉尋之不足其三厥有寶林重芳一葉布無上乘登無上檝法炬曈曨尼珠煒煜拯溺迷津救焚塵劫其四南北學徒摳衣朝夕無醉不醒無昏不釋示其生焉來彰慧績示有滅焉歸圓真寂其五湛然不動塔韞寶光玉闕一字彌赫金相彌莊時乎未來我則晦藏時乎至矣我則昭彰其六爰於明朝現茲法質如撥障雲重舒朗日瑞應皇闕福隆帝室聖覽禎祥恩頒洋溢其七三翼沿泝千里請迎迎來丹闕設在三清金銀羅列瓊璧堆盈俄生紫氣潛覆皇城其八日陳供席夜奏笙歌施億寶貝捨萬綺羅神傾薝蔔天降曼陁前佛後佛顯應斯多其九明明聖君仁仁慈主聖比和風慈同甘雨祚與天長教將地固勒之貞珉永芳千古其十
