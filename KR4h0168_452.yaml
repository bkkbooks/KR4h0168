front:
  text: 全唐文欽定全唐文卷四百五十二説相州安陽人天寶中進士為史朝義判官朝義敗降郭子儀纍授長安令祕書少監遷吏部侍郎太子詹事建中三年坐為朱泚草奏訟嚴郢寃貶歸州刺史卒
  hash: sha256:ed43d5d2918dc3ccc2e06dd3adf5d57586706940258cf5545676e2c33f0e0bab
  markers:
  - {type: head, offset: 14, content: 邵說, id: KR4h0168_NFKB_452-h1, level: 1}
body:
  text: 至道元默真宗朴素莫究其源孰知其故將假物以明象乃忘言而立喻若筌在魚若蹄在兔苟或藪澤之內以時而肅設溪澗之間應節而周布乃凌岑壑忘蹄與筌興言薄狩命駕忘旋魚潑潑以隨波樂只兔爰爰而得性怡然好之者徒發嘆於終日觀之者空起羡於臨川斯無虞於即鹿寧有望於烹鮮於戲道有興廢時有通塞羡魚如之何匪筌不得逐兔如之何匪蹄不克猶蹄在兔兔既獲而蹄可以忘猶筌在魚魚既烹而筌可以息亦何異遊道藩者揮郢匠之斤御道樞者削公輸之墨彼損之而又損故不得而有得是以聖人立教所寶惟真勤求若喪之旨遠索忘言之津還淳返朴求於道要絶聖棄智無為實賓故卓立政始輝光日新夫子將欲論筌蹄於宜觀盍若考前途而後遵臣某言伏承今月二日册皇太子六日朝獻太清宮七日享太廟八日有事于南郊者欵謁宮廟尊崇祖禰展敬天之禮百神受職宏主鬯之義萬國以貞率土之濱孰不欣戴臣限以出鎮闕覩盛儀仰白日以心馳望赤墀而手抃無任歡慶之至臣某言臣以殃釁頃遭汚染知臣者或哀其逼切畏忌者或肆其讒誣自授南宮分銓東洛于茲纍月憂懼實深火心水背若墜泉谷何則拜命之始遇山陵附近奉辭之日屬虞祭未終不得入覲天顏少申誠慊此臣所以達曙不寐終朝疚懷徘徊倣徨莫知死所今情有至切不敢不盡陳其愚衷臣家本儒素代傳名節臣祖長白山人貞一以周朝權統革命潛遁終身臣父殿中侍御史瓊之遇元宗撥亂興邦揚歷數四纍登甲乙之第再踐準繩之任微臣積釁殃禍所鍾十六而孤長於母手誓心墳史不出戶庭逮至天寶年中謬忝詞場擢第適會老母棄背服喪河洛及祿山之至禮制當終臣愚不脫縗麻更踰再歲而賊中言議往往紛然臣懼凶黨不容寓遊洛魏值慶緒奔遁保於相城大搜詞人脅為已用以凶威責臣不至以驛騎逼臣遂行與潘炎始陷凶逆遽聞思明欵附燕趙服從欲取黃沙嶺路因此得歸闕下屬思明數萬之衆南鎮趙州送臣於范陽抗疏以聞奏肅宗特降中旨授臣左金吾衛騎曹將軍宣恩命示聞卿遠來可且於思明處憩息留滯未幾忽遇烏承恩事彰由是井陘路絶再陷凶盜而思明朝義負恩之際臣亦纍達欵誠伏蒙肅宗皇帝賜臣敕書云卿志士苦心王臣勵節藝成俎豆迹陷豺狼頃年鄴中策馬歸命出於萬死臣節尤彰忠誠若茲不負於國比朝義將敗謀守河陽臣知回紇利於野戰沮破其計及朝義奔走臣得西歸伏死於闕庭獻狀於先聖中使特宣進止云卿之狀迹多肅宗時事三數日內即授卿官當蒙除臣延王府功曹參軍宣進止云卿所進狀見令在院及翰林檢勘至其年六月十九日與王胄同時召見先聖謂臣及王胄曰卿所進狀朕一一已令檢勘卿之誠節可謂著明尋除王胄侍御史除臣殿中侍御史仍遣宣進止中書門下令制詞中盡言其事詞云王胄邵説有文學政事之資飾溫良恭儉之行嘗應推擇薦屬流離失身淹時無路自免然而深知逆順潛竭欵誠當慶緒之難已彰臣節及朝義之敗更沮凶謀言念忠懇何傷點汚思申雅器且表至公宜擢憲司式宏國體則先聖疇昔之意盡已知之自是再忝柏臺四登郎署宰理京劇倅二祕書一十八年備更任使今復以非次待之不疑斯發自天斷非常情所及且棄瑕録用古昔攸難稽之載籍所傳無幾則齊桓諸侯之主能收管仲太宗非常之聖特任魏徵咸為得人終成大業如臣行藝寡薄知識凡淺有殊管魏之事曾無管魏之才必恐受謗於衣冠不容於輩列速愚臣之禍傷聖主之明其理必然固無疑也古語曰女無好醜入宮見妬士無賢不肖入朝見嫉臣雖掌銓日近切慮見嫉已深伏願哀臣血誠免臣此職四門已穆百度惟貞在於微臣死生感戴無任懇切之至臣某言臣以玷缺懼辱高位一昨瀝肝上請泣血祈天冀達愚衷俯停新命不謂聖慈裦飾宸鑒未回伏讀墨詔載深兢惕臣某中謝臣嘗覽載籍備知古今用人之道其流不一遇艱難之際或有棄瑕偶文明之時固當慎擇如臣頃陷凶逆大節已虧雖昔曾獻欵而罪難自贖今中朝無事八表會同有符帝舜之理日漸時雍之化已明四目特序九流豈臣汚染之餘合受清通之寄縱使陛下憐臣宿志察臣脅從無那取捨㣥才易招毀黷亦安可家至戶説令盡知愚臣疇昔之血誠哉何則今歲吏曹至難十倍常歲缺員至少從調者多益之功優其數尤廣又準選格以判留人十輩之中放其六七彼輩衣糧自遠旅食經時固不甘心必大騰口脫有誣謗上疑聖心事等投杼將何取雪此臣之懼敢不盡言況朝廷冠冕如雲咸稱俊傑或以文行砥祿或以政術知名出入中外纍更任使而臣謬司左職實用多慙伏見戶部郎中蕭定司農卿庾準才優識遠望重一時伏望罷臣別授定等庶光朝選克辨人倫則徐毛裴王復存聖代無任懇願迫切之至臣子儀言臣得同華州節度使華州刺史周智光牒稱得耆壽薛遠等狀以華州是臣所生之地奏請與臣立紀功頌德碑天慈曲臨已蒙聽許又得奉天縣令程暹狀得百姓仇廷珍及僧山海等狀亦請與臣立碑及生祠者伏以皇家受命祚運延昌雖妖孽暫興而天地終泰收兩京之際陛下親總元戎臣忝職驅馳躬執鞭弭指蹤逐寇皆聖主之雄圖靖難夷凶顧微臣而何力又奉天之役大挫渠魁亦仗天威以集戎事必欲紀之金石播美無疆理合昭宣聖功垂於不朽豈臣薄劣輒敢當仁寤寐兢惶莫知死所瘡痍之後凋瘵未平更屬春時實妨農業乞回成命一切勒停庶老臣無貪天之責疲人有息肩之望懇欵迫切之至謹奉表陳讓以聞臣子儀言伏以華州及奉天耆壽等請與臣立碑及生祠昨已奉表請停未蒙允納夙夜省度不勝戰悸臣某中謝臣以孱庸謬承驅策雖東征西伐莫顧微軀而保大定功皆憑睿算今欲刊諸貞石永播徽猷實為貪天之功難勝蹐地之愧況今兵革未息瘡痍未平忽此勞煩必有妨奪顧臣薄劣將何自安臣雖至愚深知不可再陳旒扆伏用兢惶所望聖慈遂臣誠請無任懇迫之至臣子儀言臣聞人臣事君稟命而已若君有非常之略則臣成佐命之勳象彼四時運行實因於上帝配諸百谷廣大在宗於滄溟頃陛下監國撫軍則再安宗社及飛龍踐祚又克清夷狄所有成績莫匪雄圖臣雖在行何力之有今奉天華州耆壽請為臣建碑立祠且陛下聖功已書簡策微臣薄效何足裦稱耆艾之徒昧於事體謬請刊紀殊乖名實昨已再表懇辭冀達誠慊陛下未察令斷來章奉詔兢惶若墜泉谷況今畿內百姓日益凋殘糧無半菽室如懸磬以不急之務擾至疲之人竊顧心顏益增靦懼又比來耆壽陳狀是官吏指麾恐以臣備位台司妄為希附縱有勤請或由矯飾所祈聖造特遂愚衷區區之誠敢以死請無任懇迫之至臣子儀言伏以奉天耆壽等請為臣立碑及生祠臣自揣功業至薄不足以當刊紀百姓至敝不可以興力役歷獻愚懇至于再三言不動天未蒙允納夙夜兢懼不遑寧止臣非有馬援南征之績竇憲北伐之功安敢飾詞以陳謙讓但以兵革不息十年于茲天下之人未獲其所臣幸備相位尚負憂責頃歲之克復京都去冬之小却夷醜所有微效皆稟聖謀然未能使其干戈盡銷郊甸罷警北有亡命之虜西有無厭之戎公卿大夫未免旰食臣幸而獲宥其榮已多豈可竊功僥名以圖不朽其若千古何昔漢為霍去病理第辭以胸奴未滅無以家為況今殘孽尚存而敢播美金石臣雖才不逮名竊慕古人之志所望再效駑蹇遠斥凶渠三虜之首必懸四海之波自定從茲偃伯可以息人然後紀功亦未為晚臣以誠願實在於斯伏乞聖恩特遂勤請無任惶怖懇迫之至臣某言伏奉今月日制授臣河東副元帥河中節度使寄深匡輔任切安危寵命遄臨憂惶如灼臣某中謝臣智術凡淺才略無聞承日月之光偶風雲之會自奉先帝徇以驅馳披甲即戎載罹寒暑比憑朝算克振天聲雖毫髮之功曾無足紀竟不能掃蕩妖孽使八方攸同謬踐中樞仍叨上將分茅錫土榮冠一時慺慺之誠竊自增愧今又猥蒙驅策出鎮河中授臣以連帥之權委臣以專征之務雖才輕方召而任比桓文此陛下除姦之時乃微臣死難之日竊覩自古忠義之士莫不扶危救禍憂國忘家雖在暮年猶思報主則廉頗強飯馬援據鞍以臣方之有甚前哲軍國重事不敢固辭誓竭股肱之力以副腹心之寄倘皇猷獲展寇難克平殞身戎行實無所恨無任感恩臣某言今月日伏奉恩制授臣使持節都督雲州諸軍事兼雲州太守充河東節度度支營田大使大同軍使管內採訪使祗拜休命內揣薄才委任專崇周章失據臣某中謝臣聞邊之安危係於所用事之成敗諒在先謀故寸璧必求良工尺錦亦資善製況夫謀無智勇備列戎旃自守封疆頗淹歲序肅將朝命翦滅凶徒此乃天功匪惟臣力陛下不遺犬馬念以驅馳收其分寸之勞加以邱山之賞禮因位重恩與日深常恐顛危不克負荷所以昨有陳讓乞停范陽而手詔曲垂不蒙允許退就私室竊愧明時素餐之詩自臣攸作今又更承獎命兼以河東邊境相連三千餘里烽燧列警斥堠須明雖則居安終資有備以臣獨制謂必無失然以能處一事身任一官猶擇其人且懼曠職況臣旁綰三節控帶數藩智有所不周心有所不及兵權倘失奔駟寧追實慮授受乖宜簡書是畏望特矜臣不逮察臣愚誠更選良能付以旄鉞則樵夫絶議官序有倫臣無任臣某言伏奉某月日制授臣太子詹事兼封上谷郡王祗奉榮命以慙以惕臣聞論德而建封者聖王之事也量功而受賞者忠臣之義也封或謬建則王綱斯紊賞或虛受則臣體以乖聞之古先敢忘斯誡伏惟皇帝陛下大聖繼統神武經邦道邁纂堯功高復禹頃幽燕肆逆汾澮阻兵朝義叛渙於前懷恩旅拒於後陛下宸謨獨斷睿略潛行曾未三年克平二豎此蓋皇穹保祐宗社降靈豈臣愚蒙敢叨封爵假使進能排難退克全軍為臣之節固當若是以茲干賞實為包羞昔漢祖仗義而西滅秦項韓彭諸將異姓同封然而德薄位崇卒見傾覆以臣智略敢方先賢苟或受之其能自保力微任重福過災生俯仰增憂心魂若勵乞停嚴令俯遂私情儻聖澤旁流天光曲照俾從散秩得齒周行臣之至願死將不朽無任懇迫之至臣某言伏奉今月日制書授臣元帥左廂兵馬使兼知滑州兵馬使恭承寵命祗懼兼深臣某中謝臣聞至理之代為官擇人故能謨謀有成授受惟允若才不稱職任非其能冒進求榮必貽禍敗伏惟寶應元聖文武皇帝陛下道齊濬哲德邁徇齊惟新景命再造區宇微臣薄劣早荷恩私慙無樽俎之謀纍忝腹心之寄擁旄仗鉞自北徂南未翦凶渠已嗟挫恧守節雖同於蘇武喪師有類於孟明議以刑章分從虀粉陛下察其本志念臣微忠特全要領再加驅策位兼風憲職典禁兵撫已循涯實為塵忝每思陳力之誠竊懼妨賢之責不謂更沐殊恩猥當重任佐皇太子元戎之律統王畿御侮之權內省凡庸必多敗事乞停新命別授時英則朝章式序軍政無闕臣無任云云臣某言伏奉二月二十一日恩制敕賜臣一子三品之官并階鴻私曲臨魂守飛越臣某中謝臣聞祿位之設以待勳賢苟非其人必貽伊咎臣之弱子未有令聞方且勵以義方教之詩禮遽承殊澤特授崇班非唯有黷朝章名器難假實亦懼招官謗顛沛為憂寤寐兢惶罔知攸處況臣榮登上相任重總戎子弟數人盡居右職過亢之誡切在於心常懷㨂撓之災寧忘屋漏之愧乞停寵命俯遂愚衷庶幼童無冒進之嫌微臣有知足之誼無任感懼屏營之至臣等某言某日開府魚朝恩以所造周易鏡圖於中書門下奉宣聖旨傳示臣等仰觀易象遠見天心捧對循環載欣載躍臣某中謝臣聞太極既立是生兩儀六書以畫卦四營而成易備君臣父子之道盡陰陽變化之源理亂吉凶必以類應自古哲后曾未研精爰及近臣莫聞訓習而朝恩深窮損益繢以成圖陛下重有激揚示之於外臣幽觀妙用周覽元言警誡人君恢張治道陛下欲成其政必在勤而行之儻能建中於人實亦天下幸甚臣無任臣某言月日中使某至伏奉恩旨敕賜臣臘日香藥金花銀合子兩枚面脂一盒裛香二袋澡豆一袋者開奩氣馥拜蹈增慚臣某中謝伏以時當大蠟節號嘉平歡已洽於人神賜仍出於黻冕沐茲芳澤傅以香蘇忖陋體而何幸顧頺齡而可駐邱山施重雨露恩深感戴慙惶不知所報無任荷恩稠謺之至臣某言中使某至伏奉某月日墨詔賜臣新歷日一通并口脂面藥紅雪紫雪等窮溟之上寵詔忽臨大蠟之辰慶賜爰及跪承慈渥戰汗失容臣往塵近掖實曠天心洎守遐藩多昧戎略殊私未答官謗將營陛下聖德包荒宸嚴曲貸猶存寵任便浹恩波覆燾不遺於遐陬賜賚亟霑於尸素況日官頒歷承敬授之規綸旨宣慈沐逾涯之獎蘭膏滋潤綘雪珍芳捧持而炎瘴自消潤飾而衰容坐變邱山非重草芥至微雖百其身豈酬鴻造無任感恩瞻戀之至臣某言伏奉月日墨詔等恩波遠被寵賜薦臨捧持傾心局蹐無據臣某中謝臣分麾五嶺謬竊殊榮蒞鎮三年毫無績效陛下不遺舊齒猶獎非才恩禮浹於遐藩慶賜覃於令節天心宏覆慈旨優醲頒聖歷以授時降寵恩而撫俗薰風溥暢陽景照臨輝華遍於草木忭舞盈於路衢蘭膏綘雪沐雨露之湛恩陋質凡姿荷乾坤之厚施伏以三元在近國度維新百辟獻芹獨馳心而望闕二毛垂領唯懇願以朝天犬馬微誠感戀逾切無任感恩戀主屏營之至臣某言中使某至賜臣母趙國太夫人手詔並衣一副銀碗一事百索十軸兼賜臣敕書及手詔並衣一副銀碗一事百索十軸又賜將軍等衣共五副百索共二十軸者聖慈稠謺感戴無階臣某中謝臣恭守舊規謬知重務功慚毫髮寵荷邱山滿篋詔書偏承睿顧傾家服玩皆自天來叶彼良時旌其益壽淮南藥碗對此殊輕漢帝露盤方斯匪重索盈千縷衣備五時雨露恩深不遺於老母乾坤施廣遍及於下臣受賜若驚銜恩載躍誓當戮力祗奉威靈縱有百身何階報效無任感恩臣某言臣聞忠邪不可以並立善惡不可以同㣥吳任宰嚭而伍胥鴟夷楚任靳尚而屈原放逐遠惟前事孰不痛心伏見澧州刺史裴冕明允忠肅道高德厚匪躬無怠有謇諤之風首佐先帝驅馳靈武贊雲雷之業成社稷之勳程元振忌其直道剛方遂加誣構貶謫荒裔天下稱寃空懷醜正之悲莫雪盜憎之恥今姦邪屏退聖政文明百度惟貞四門已穆而寰海之內元元之人莫不延首德音思聞至化伏願特令追冕列在朝廷俾之台座端揆庶僚平章百姓處訏謨之任當燮理之權必能協和萬邦致君堯舜臣位兼將相職忝股肱竊思賢傑共熙帝載無任懇迫之至臣某言臣聞郤宛之死罪由無極申侯之戮譖起濤塗惡直醜正其來自遠伏見故開府儀同三司兼工部尚書安思順并弟羽林軍大將軍兼太僕卿元真等竭心聖代宣力先朝或任重疆場或寄深環列刈單于之壘殿天子之邦播算竹帛圖形文素既稱名將實為勳臣哥舒翰與之不叶因謀陷害云共祿山通應兄弟盡受誅夷寃痛之心歿而猶在安祿山牧羊小醜本實姓康遠自北番來投中夏思順亡父波主哀其孤賤收在門闌比至成立假之姓氏及祿山擁旄薊北思順授鉞朔方雖則兄弟而情非黨與祿山未反之日思順屢已陳聞朝廷百僚無不委悉豈意姦人罔上成此盜憎生為盡節之臣死為銜寃之鬼趙母以先請免坐思順以變告覆宗死而有知飲恨何極伏惟陛下以至聖之德紹休帝圖蕩定妖氛肅清寰海軫納隍之念深解網之仁陷賊衣冠咸蒙齒列豈令思順兄弟獨隔恩私忠義之臣所為流涕此臣所以特祈昭洗昧死上聞但雪此一家必萬方感惠何則逝者抱屈尚蒙見申則存者謀安故無寃濫雖有不賓之俗將聞風而悅服蓄疑之將當委質而來朝豈惟天下歸仁實亦幽明欽德無任懇願之至天道三十年一小變六十年一大變祿山思明之難出入二紀多難漸平向之亂今將變而之治宜建徽號承天意而方謁郊廟大赦各士誠恐雲雨之施未普鬱結之氣未除願因此時修享獻欵郊廟裦有德録賢人與天下更始振災益壽之術也某白一昨猥辱面奉徵及玫瑰敝廬所有敢不供上輒獻數本惟恕其非多此物常開花明媚可置之近砌芳香滿庭雖萱草忘憂合歡蠲忿無以尚也夫花卉以明媚芳香之故閣下不憚煩以採掇則士之有才有藝者必將盡力而搜求人人相賀皆有望於明公矣某猶慮花卉移植之際或有夭閼其生詢樹藝之叟求長養之術叟曰以吾鄙見先務及時第能當春徙之度地居之順其陰陽遂其成性根莖未固擁之以沃土枝葉未茂溉之以寒泉則扶疏鬱映紅芳可得而玩矣觀叟所為其理信然某誠以臃腫之姿願附於玫瑰之末擁土溉泉非明公而誰良時在茲無或遐棄不宣某頓首惟天水趙公諱睿沖公惟隋員外散騎常侍平東將軍渭源公顯和之元孫開府儀同三司博州刺史世立之曾孫皇朝監察御史君煦之孫虢王府法曹參軍徵之子自渭源四代咸著清德洎公纂承嘉聞益彰志業貞簡形儀朗異以孝友謹敬協柔昆弟以義禮誠純接奉朋交文蔚行茂顯于當世天后時應明堂大禮科上異其對授陝州陝縣尉轉汾州平遙尉囂劇之地以幹敏稱秩滿從調吏部侍郎蕭至忠以公所試超等授大理評事公迫於祿養請署同州河西丞贊二其政氓輯吏肅劇賊遁逋伏姦不興縣六百石郡二千石皆受成仰辦而已道長運速奄忽遷殂以景雲二年冬十月二旬有一日終于縣館享年五十二及夫人平陽敬氏卒以開元草四年四月草一日合祔于虞鄉縣五老原初公寢疾告其二子良器良弼曰吾祖成季宣孟忠勳炳著逮漢吏部尚書融晉黃門侍郎允亦能勦攘寇難捍衛王室二祖皆為河東守子孫因徙家焉由魏歷隋位與時升爾後仕唐三葉而未登吉祿以吾祖宗之福豐慶演固不當湮抑淪廢意爾曹爾嗣其將必有達人洎公即世適三十歲而良器官至中書舍人未五十歲而良弼官至陝華等七州刺史御史中丞浙東嶺南兩道節度使太子賓客元宗朝以嗣子參掌綸誥追贈公虢州刺史夫人平陽郡太夫人肅宗朝以次子節制方面纍贈公太常卿今聖踐極嗣孫密雍薰復縱衮等咸擅才業宦成三署竟如公疇昔之所識於戲趙氏再世昌茂克大其門皆虢州祗奉先軌貽裕後續仁積訓深之所致也宜其誕受光飾享茲徽章敢篆石立表紀旌風烈銘曰德積於微業成而彰先時蹇舛允羡其昌於烈趙公亶惟貞良砥修行學顯茂家邦施子及孫再世以光登朝就烈佩玉鏘鏘澤洊本根沃潤黃腸有苾遺風久逾馨香於斯篆刻裕美無疆
