body:
  text: 九州既滌是資築護庶役斯起於以僝工俾湍悍不生而安居作乂彼已之乙謂為何人率作而毀豈增修而蕆事壞乃致害仍推過於所由言則飾文慮實無備然壓溺不弔酌戴禮而何傷而殺人者死在蕭章而難忘論以故傷闕則是減稱其誤殺科其不應爾徒有詞吾從丕弊後漢至行董君諱黯字叔達句章人也依乎中庸率性純白少孤獨立事親不匱歠菽以盡其歡柔色以溫其省高堂登壽慈顏裦如以和肥家安不擇地其徙居也庭出寒泉其執喪也林集祥鳥明誠必感厥德惟懋施及千載橫於四海其大孝也歟夫大道未隱不獨親親逮德下衰乃有慈孝行以名蕩情以禮飾季武矯而服縗子春強而過禮此離道以善非天性之孝也子云無違參則直養素冠有諷和琴不成此禮經之孝也文舉棄子士游出妻動非先意何以觀式雖曰可紀或近沽名此非教之孝也夫子一與之質道與之和生於東溟介居夷島俗遠詩禮性復著存無貽一日之憂終報共天之怨負土成壟枕干不言卒斬東鄰祭於中野所謂生知而上成心以隨欲葢而彰強名曰孝加於古之君子數等矣和帝聞其異行特舍專殺之罪召拜郎中不起竟以壽終夫受命於時惟松柏也冬夏青青稟靈於天惟夫子也能全正性六代祖仲舒漢中大夫嗣孫子春領盧江太守世為郡中名族故以董孝名鄉慈溪署縣貿江之族薰然遺風皇唐大歷八載余分竹茲郡訊古欽賢環堵已蕪遺記將落徘徊故邑尚想餘範則夫子之行可以德類於人葺宇崇祠昭銘垂代豈不務矣銘曰白刃可蹈仁鮮能存黃金可鑠德無間言道喪於季賢生復古知禮近夷變風於魯豈曰無衣寒燠以寧豈曰無魚泉流在庭黃鳥哀音下感棘心器無常聲洒血盈襟江水蕩蕩東注窮越夫子德音與之不絕武安息道行軍大總管待價曾孫從德宗幸梁州除殿中侍御史轉刑部員外郎出為絳州剌史憲宗時拜京兆尹卒贈吏部尚書凡三年一祫五年一禘祫則㣥廟大合禘則各序其祧謂主遷彌遠祧室既修當祫之歲當以獻祖居於東嚮而懿祖序其昭穆以極所親若行禘禮則太祖復延於西以眾主列其左右是則於太祖不為降屈於獻祖無所厭卑考禮酌情謂當行此為勝栩貞元九年官福建觀察使福州剌史諸州並設軍額防虞役使更置執刀甚為煩費既乖簡要又給資糧况臣本道頻遇水旱百姓艱乏職貢或闕臣自到官已訖乞停其管諸州並請停罷其資糧等望借臣充當管軍資所要待年豐人戶歸復即收送度支以裨國用友正貞元時人明明漢皇文物昭彰順帝以化俾人從康將欲敷聖政舉皇綱乃分國之八使而宣命於四方八使伊何朝中之善將假其權尤難其選稱直指而獨立歌皇華而分遣繡衣既盛於新儀四牡載光於古典當官而行受命無忝善微毫而必舉惡纎芥而必貶舉善兮必尋其清流之源貶惡兮必去其阿諛之諂或負宮闕之厚援不顧城社之微托無懼薰燒不驚矰繳肆豺狼之毒懷梟獍之惡徑持斧而前進歘下鞲而直搏誓將去大族而拔盤根安問狐狸之與鳥雀其有銳志公私翟力力王室知賢才而能進察奸佞而能黜必將上聞於天子寧俟於終日道之不僭人亦焉廋操利劒而剸其固懸明鏡而燭其幽使乎使乎萬方觀德天下之治也賢者當其權天下之亂也不肖居其職求訛偽之訟採妖豔之色方直者於以退藏阿諛者由是登陟若謂之治也歟適足以亂其國我國家統紀有經超古作程采虞典之考績法漢家之分行舉八元而普天輯睦按十道而攬轡澄清泰階既平君聖臣明豈待久於其道而後天下化成昔漢武志闢中原謀綏遠裔選使者之招撫得終軍之雄厲握瑞節將彼俗斯懷請長纓必其王是繫惟越之王南方之強擁百城而竊位扼五嶺而為防隔上國之正朔弄先王之憲章子雲乃奉辭象魏銜命要荒因壯志以中憤遂雄謀而外揚蕞爾小國又非內屬締交火鼠之鄉連結雕題之俗地遠人曠山重暑溽不可以師旅加不可以威刑束請今流聖澤以旁浸引皇明而遐燭雖百越難覊而長纓可足何者欲以請長纓之容欲以革斷髮之風使有執珪以展敬庶無鳴鏑以稱雄既而化被越裳威行南土解椎髻而襲冠冕舍卉服而垂纓組其合浦之明珠與炎州之翠羽咸奔走於外域共充盈於內府緩頰來九譯之朝一言敵兩階之舞是知纓以長為美士以才為主當其時也爰陳敢請之辭於以繫焉果致未覊之虜觀其興言無愧適足無畏有以見四方之氣功諧所籌事愜所求有以見千金之謀士之處代貴乎排難解紛扞災攘禍重立信於金石急成仁於水火儻見授於長纓願輕生而致果習射之妙惟精惟審其審也在無偏無頗其精也在不食不寢是則動之不虛由巳求諸三侯張而六鈞始彀一鵠中而百發如初月滿指掌星飛庭除已因鵠修其德惟積鵠為巳任其射寧疎志氣中敘威儀外舒正其身而有則有準合其奏而匪疾匪徐原夫彼鵠父射為父子射為子並列其名各承其美假以成績修之在已射不應而有善誰觀藝不臻而有時奚俟專功繹志每歎於流年時中成人敢忘其寸晷以此懷之常憂殆而日月既往弧矢既持心超超兮有歲魂怳怳兮無時非不慎乎規矩逮恐失於毫釐周旋可托進退維茲鏃破的兮流光散出弦應手兮飛羽相追實此鵠之是念惟彼侯之敢思立則惟心成因在手且一控而一發亦何先而何後舍意雖脫和容已久喜滿勢而暫維媿直弦之屢受若乃旌竿並舉侯狀皆升曉露中滴晴光上凝觀武於茲可明七德之要取才於彼亦彰一藝之能以其獨弄旁觀者眾豈比夫啼猿散繞飛鴈雙中儻射已鵠之可稱冀鳴弦而再控東海有三山山有六巨鼇鼇則偃蹇以戴山下橫乎大壑山則穹崇以壓海迥出乎洪濤哂鯨鯢兮瑣細視嵩華兮秋毫此則鼇之所以為大山之所以為高乃有龍伯之國巨人攸處謂天生之神物可以充乎鼎俎壯圖方啟高足云舉曾移十步之餘已淹五山之所於是載揭長竿別綸巨緇俯滄溟其流如帶垂芳餌有肉如坻既投之以潛下果食之而不疑其肉未入於口而鈎已貫於頤爭心既憤勇氣相持崩騰渤澥磅礡嵎夷蹵天柱裂地維地雖廣兮振矣天雖高而殆而欲出不出騰躍非一萬川倒流八氣旁溢血吞瓊田之草波陷鮫人之室輕共工之觸山小夸父之逐日豈長蛇趨閬風之足數大鵬徙天池而可匹爾其駭百神奔萬族波臣蕩而失水海若迸而登陸以鼇之靈憑帝之福謂優遊以無窮何瞬息而連六猶將灼其骨豈惟離其肉於以洎之幾竭東海之水於以燔之足盡南山之木㣥仙於焉以墊溺三山由是而淪覆且山之峩然若與天連鼇以首戴之里數不知其幾千彼大人兮併之於背負之而顛斯其為大也胡可得言而稱天恃其人人有所不及恃於力力有所不全若使以陰陽為網以道德為筌以信智為機於其上以仁義為餌於其前則所為獲物者其為鼇也大焉黃帝稽六氣正三光頒命於伶倫之職伐竹於嶰谷之鄉創管籥於方寸審制度於毫芒為十二之首律導初九之潛陽伺青陸之功微而可紀察黃鍾之氣闇然而彰所以位定於初道生於一將啟四分之歷潛運三重之室取厚竅而均者當分至而藏密統緹幔以依辰布葭灰以候律經天順地察晷度而有常陰伏陽迴知萌芽而溥出超土圭之至理得銅渾之妙術在沍涸之窮冬引發生之遲日既而推萬物之道統三正之元清濁既分於上下躔次不愆於晝昬是日也百辟稱賀萬邦以則垂元化於本始體高明於柔克一氣潛應定立均於數源七曜旋行酌至神於物極變化之道周流可測人事尚暗於先春天統已彰於陽德由是平之以六紀之惟三仰經綸之祕奧終視聽之所覃單穆不獨稱其美周景抑亦懷其慙故以鳳為名也於盡善而稱未以律為候也實用之而不既振潛伏以蒙泉贊元微以通氣靜室無聲微風不驚吹灰於中八音由是乎卒獲動穀於口五聲以是乎相生國家上法黃軒推衡律呂覘一律之動靜俾四時而式序彼唐堯敬授羲和欽若未曰窮於寒暑者哉惟北有谷純陰之位無溫煦以生成失膏腴之美利是吹孤竹之管將變不毛之地聲能叶候期四序以平分氣乃應時見三陽之總至伊彼鄒衍仰師伶倫窮雅韻於條暢得和聲於厚均爾乃循窈窱傍嶙峋有薰風以舒物敷順氣以和人一奏而層冰以解再揚而槁木驚春是知道契至精事符元覽谷居陰靜宜陰慘之莫舒律屬陽方因陽和而相感且陳夾鐘之管召清角之音聲之所涵者博志之所達者深律氣旁通於陽氣人心上導於天心夫乾德無隔土宜有恒南無嚴凝北無鬱蒸若變寒為燠昊穹所未必能以荒為稔后稷所不足徵將祁寒之恒若諒大化之何稱爾乃天下盛陽此谷飛霰日中方晝此谷見晛豈無三光曾照臨之不徧雖有四氣曾沍寒而莫變寧知至人爰來陽律斯扇清音未發猶萬壑之荒凉和風方流忽千林之蔥蒨故谷得陽以盈陽因律以生田疇以之沃衍節氣以之和平我墟既耕我黍既成耦十千而南東其畝廛三百而庾廩如京實無窮之嘉績與造化而爭衡別有處幽谷而思遷待暄風而撫翼空勞苦寒之詠獨厲後凋之色儻一借於吹噓願均榮於動植處高明所以蕩陰滯臨顯敞所以窮遠睇故有岳峙九層雲峩百里極元功以壯址殫山林於崇構者人力也今則排層空架重峯高出星漢之上坐馳寰區之表者天造也州之陽漸乎水木之陰攢乎山山有佛寺而迴廊翼旋飛閣雲褰萬家井邑在我宇下實一方之勝槩也柱史魏公將命駕遊焉公徘徊賞味情有餘致每美其峯闕一字聳絕靈氣紛郁乃竦勁策躍輕屐縋蔓梯崖逕造夫巔焉高哉曠乎果天下之絕境也乃命剷巉嵒夷蘙薈心匠密構亭形虛無而賓從莫之窺也然後跨峻谷掖修木謺石為趺無尋常之地其崇卑廣袤與斲樸杇塗之節稱焉峩峩絕頂一上千仞未幾營之屹而冠焉屬東風敷和春物爛山公乃敞層軒披晴空憑九霄以高視周八極而遐觀塊如眾山盃分百川籠吳楚之封境領江湖之氣象有足廓虛懷而攄曠抱矣眺覽未既壺觴云舉瞽史陳藝笙簧合奏仁風洋洋下俚同歡而吳哇褭空楚舞嬌春隨天籟以遠去映花林而半出仰之者有若子喬方平弄玉飛瓊相與樂㣥仙於上清自公之暇理於茲撫傷夷懷流離流離旋矣傷夷痊矣而猶阜俗康民之志慊如也今巿囂在耳村煙在目可以廉風俗之趨尚省農桑之豐耗况又暢四肢攄七情神完氣全宣為太和自當渟源普洽上下交澤况有襦袴謠乎公問俗之來四序分矣蓮府將復星軒莫留人之情也步武所及有一物契於素懷者雖細必錄况目經心攝獲千古之遺勝者愛而不書得無寤寐思之乎然歙人被公之仁化也深思異日攀公之轅不及瞻此亭也友正家在此山之下獲遊此亭之上思刊懋績輙課庸詞若莛扣鍾而蠡挹海蓬渤之音溟茫之波可得而希也又茲峯之高棲天宇上簉雲族朝薈蔚而暮氤氳亭無處所晴景一照敻焉標空今建名披雲義在此也其潤色寺宇輝華郡郭增東南之巨麗者無終極乎貞元壬午夏四月大火南次之七日記灣字巨川西蜀人自號滄洲子貞元元和間李勉帥永平辟為從事灣聞蓬萊之山藏杳冥之中行可到貴人之門無媒而通不可到驪龍之珠潛於瀇滉之中或可識貴人之顏無因而前不可識某自假道路問津主人一身孤雲兩度圓月凡載請執事三趨㦸門門人謂某曰子私來耶公來耶若言公小子實非公若言私公庭無私不得入以茲交戰彷徨於今信知庭之與堂不啻千里况寄食漂母夜眠漁舟門如龍而難登食如玉而難得食如玉之粟登如龍之門如龍之門轉深如玉之粟轉貴實無機心翻成機事漢陰丈人聞之豈不大笑屬谿上風便囊中金貧望甘棠而歎自引分而退灣白伸舉寶歷元年賢良方正直言極諫科第三等上嗣位明年澧陽郡藥山釋氏大師以十二月六日終於修心之所後八歲門人持先師之行西來京師告於崇敬寺大德求所以發揮先師之耿光垂於不朽崇敬寺大德於余為從母兄也嘗叅徑山得其心要自興善寬敬示滅之後四方從道之人將質疑傳妙罔不詣崇敬者嘗謂伸曰吾道之明於藥山猶爾教之闡於洙泗智炬雖滅法雷猶響豈可使明德不照至行湮沒哉惟大師生南康信豐縣自為兒童時未嘗處㣥子戲弄之中往往獨坐如思如念年十七即南度大庾抵潮之西山得惠照禪師乃落髮服緇執禮以事大歷八年受具於衡嶽希琛律師釋禮矩儀動如宿習一朝乃言曰大丈夫當離法自靜焉能屑屑事細行於衣巾耶是時南嶽有遷江西有寂中嶽有洪皆悟心契乃知大圭之質豈俟磨礱照乘之珍難晦符彩自是寂以大乘法聞四方學徒至於指心傳要眾所不能達者師必默識懸解不違如愚居寂之室垂二十年寂曰爾之所得可謂浹於心術布於四體欲益而無所益欲知而無所知渾然天和合於大無吾無有以教矣佛法以開示㣥盲為大功度滅眾惡為大德爾當以功德普濟迷途宜作祶航無久滯此由是陟羅浮涉清涼歷三峽游九江貞元初因憩藥山喟然嘆曰吾生寄世若萍蓬耳又何效其飄轉耶既披榛結菴纔庇趺坐鄉人知者因賫攜飲饌奔走而往師曰吾無德於人吾何以勞人乎哉並謝而不受鄉人跪曰願聞日費之具曰米一升足矣自是常以山蔬數本佐食一食訖就座轉法華華嚴湼槃經晝夜若一始終如是殆三十年矣遊方求益之徒知教之在此後數歲而僧徒葺居禪室接棟鱗差其眾不可勝數至於沃煩正覆導源成流有以見寂公先知之明矣忽一旦謂其徒曰乘郵而行及暮而息未有久行而不息者我至所詣矣吾將有以息矣靈源自清混之者相能滅諸相是無二色窮本絕外爾其悉之語畢隱几而化春秋八十四僧臘六十夏後二十日入室弟子冲虛等遷座建塔於禪居之東遵本教也始師嘗以大練布為衣以竹器為蹻自薙其髮自具其食雖門人百數童侍甚廣未嘗易其力珍羞百品鮮果駢羅未嘗易其食冬裘重燠暑服輕疎未嘗易其衣華室淨深香榻嚴潔未嘗易其處麋鹿環繞猛獸伏前未嘗易其觀貴賤迭來頂謁牀下未嘗易其禮非夫罄萬有契真空離攀援之病本性清淨乎物表焉能遺形骸忘嗜慾久而如一者耶其他碩臣重官歸依修禮於師之道未有及其門閫者故不列之於篇銘曰一物在中觸境而搖我示其元不境不跳西方聖人實言道要道要既得何言惟妙我源自濟我真自靈大包萬有細出無形曹溪所傳徒藏於密身世俱空曾何有物自見曰明是謂至精出沒在我誰曰死生刻之琬玉立此巖岫作碑者伸期於不朽奕隴西姑臧人姑臧穆侯承十世孫秘書少監益之子選士命官有國之大典察言考行先王之舊規古者命於鄉而升諸學俾大樂正論造士之秀者而升諸司馬曰進士進士者謂可進而授之爵祿也然則前一作歷代選士其科不一洎聖一作暨有唐高祖以神武而靜天下用文教而鎮萬姓武德五年帝詔有司特以進士為選士之目仍古道也自鄉升縣縣升州州升府皆歷試行藝秋會貢於文昌咸達一作造帝庭以光王國然後會㣥后謁先師備牲牢奏金石尊儒教也若明試其業主張其文覈一作覆能否於聽覽之間定取捨於筆削之下職在考功郎後至元宗開元二十五年重難其事更命春官小宗伯主之而業文志學之士勸矣於是獻藝輸能擅場中的者牓第揭出萬人觀之未浹旬而名達四方矣近者佐使外藩司言中禁彈一作峩冠憲府起草粉闈由此與能十恒七八至於能登台階參密命者亦繁有徒所謂選才授爵之高科求仕濫觴之捷徑也不其然歟粵自武德逮乎貞元閱崔氏本記前後嗣續者在吾宗為多焉顧惟寡昧獲與斯文因濡翰而為之序貞元七年春三月丁亥序濯趙州別駕李惟岳叛濯與剌史康日知盟挈州歸朝廷聖人定天保據皇圖法乾坤之正位當河洛而建都閟宸居於斗極立象魏於天衢明堂㨖雲可以恭祖考之配土圭測景可以騐盈縮之符蓋將以同光日月比德唐虞以為損之又損不可取則觀象不壯不麗安可威戎耀胡乃蕆匠石命班輸審曲之官必萃明中之士載驅建崇樓於闕下聳飛閣於城隅諒維新以樸斲蓋仍舊之規模因子來而悅使豈殫力以為娛材露桐柏階駢碔砆應龍蜿蟺以驤宇猛獸贔屭以乘桴明璫藻耀於懸井朱鳥鶱翻於薄櫨璇題景曜銀牓霞鋪及麗譙而崛起謺井榦以相扶月透榱璧星懸網珠莫不功侔造化妙盡洪纎雉堞相望而闇連宮闕門闈廣達而俯接閭閻德陽傍倚少室前瞻散春光於玉戶擁佳氣於珠簾桂棟連雲巢儀彩鳳蓂枝擢秀影伴初蟾若乃皇輿戾止羽衞龍趨召西園之花萼奏北里之笙竽湛堯樽而百辟和暢皦舜樂而四海歡愉窮歡浹日宴樂成需下金屋之仙伎出瓊樓之豔姝飛曼唱則眾類斯洽激清聲則煩憂自無皇情穆然聖慮夕惕數路必達四門廣闢撤懸損膳捐金抵璧懼侈心之有萌恐澆俗之未革乃延直史引詞客正八音稽六籍以為深居內視不足以觀政化是用發號施令將欲以省力役慮一物之乖所念九重而斯隔故坐衢室以觀謗登總章而側席乃命遒人以勸農宣木鐸以徇路求大隗之至道示赫胥之太素樂俗安居者皤皤而鼓腹啜粟飲水者熙熙而含哺撫薰風歌湛露開罪洛陽之獄望氣大庭之庫象乎帝先廓我鼎祚巍巍乎應天地之變通蕩蕩乎作皇王之軌度皇帝順時觀武乘暇會㣥百蠻在庭如蟻慕於羶附干官翊聖類星拱之垂文於是時也嚴霜翦木晴空滅雲都人士女雜沓繽紛或側肩以馳見或奔躍以樂聞眾觀迭改㣥心如待於是渥洼神驥齊逸足以翩翩宮禁名姝耀雜妝之彩彩莫不游纓寶校玉珂金玦挾刃明霜衣金被鐵搴旗命伍抽戈按節侔三邊之挑戰壯六軍之校閱翹趾金鞍之上電去而都閑委身玉鐙之傍風驚而詭譎人矜綽約之貌馬走流離之血始爭鋒於校場遽寫鞚於金埒若乃楊葉既指琱弓斯彀百步應的七札皆透天顏微怡雷鼓訇奏由羿忸於手拙幽并慚於伎陋於是髳戎羯氊裘辮髮心目吅丂一眙形神隕越屈膝天庭稽首魏闕荷臣子之欣戴咨譯人以啟發曰天臨有唐撫綏萬方文德廣洽武義大揚且柔婦之克妙矧驍夫之可量於是王公卿士手舞足蹈歌湛露之既浹詠天保之攸報乃言曰斯伎也義同七德名冠六藝惟便習之至精在教理之發厲是知物無不學學無不濟我皇豈不曰非婦人之職任蓋欲以激君子之磨銳君房貞元時人冠六宮六職者公桑而已矣既卒蠶於世婦乃奠繭於天子稽諸祭典實可重考諸女工斯為美信率土而在茲亦奉先而是以當其令布明堂時更青陽蠶事既卒女工式臧然後衣禮服出牆奉茲珍繭盈彼懿筐纍纍乎如將薦卵皎皎乎有類凝霜既依於后亦獻於王所以伸課績之勞止展威儀之孔將遂繰三盆修六服或黼或黻或朱或綠期有事於王公庶無勞於杼柚侯其禕而實足尚之享廟之容克備展敬之禮允釐斯蓋夫人之畏慎王者之肅祗不然者賦有織紝之筐貢有畎岱之絲海人奉冰蠶至止園客將絲緒來茲冠冕之服可成祭祀之儀可輯可以重其珍美可以揚其裼襲何必桑壇而世婦斯復繭館而夫人乃入俾來者既殫恒日不暇給蓋欲輸於勤苦表我敬恭厚禮奉於先祖躬勤勸乃農功使三宮之有序斯百代之攸崇是以獻繭之道治國之要將取於三推明至誠於九廟濟有瀾兮清泠不窮以清激濁兮洪河之中迤靈長而委注忽荐至而爭雄懼淈乎泥我則貫而愈淨將合於道我則和而不同徒觀其虛明皎潔秀色澄澈漾清泚以遐分界飛濤而劃絕始騁迅以中瀉載流謙而東洩德惟靜自澄之於本源體雖柔豈混之於派別懿夫貞不受汙清非可混噴中流而激射劈巨浪之崩奔狀浮雲決開晴天之灑空碧若輕埃乍歛明鏡之洗蒙昬遠而望之孤煙橫於曲渚迫而察也霜練引於靈源是知夫道惡比周物莫相與彼流濕之為類尚沿源而異處非泥沙之可雜豈湍洑之能阻越洪濤之浮浮駛清浪之悠悠不學淄澠之難辨且殊涇渭之同流於以用之甘見和之醴就其深矣欣可泛乎舟狀盤渦之瀺灂不染乎濁湔跳沫之飛驚不傷夫清均上善以清美含至虛而體平度龍堂而愈灑洗貝闕而增明何必溱洧之陽然後濯其髮寧俟滄浪之畔然後澡其纓截河而流所以為異導沔而注明乎所自釃濁波而迴逗沛驚湍以自致庶彌久而不渝鑑妍女兮無媿酒以養德則盛於樽樽之用獸可得而言若乃王春會朝初正元吉穆穆嚴宸濟濟良弻元化凝以垂衣讜詞進於造膝則從繩之義斯正投水之言自必是以白獸在司樽彞舉酒攫地空象夫髬髟而揚睛欲聞乎哮吼信履尾而不咥雖編鬚而何有俾夫嘉話允臧睟容有光樽則雲飛而山峙獸乃白質而黑章物盛其容若耽耽而視君能納諫遂諤諤而昌嘉言既藥用舉夫爵所以展其威儀匪空留乎斟酌獸之為樽用舍有時獸之喻人猛毅在茲懼威則君之設謬矣忘諫則臣之節殆而酌之伊何惟器所稟禮殊百拜味珍干品皇恩既錫且同夫湛湛露斯君德不回寧比夫厭厭夜飲彼美觩然泰階之前與諫鼓而齊設比撲滿而能全斯期箴闕用以旌賢將同衢樽之道幸注焉而酌焉彼潛織兮泉室之人曳文綃兮結氷縷灼錦彩兮照花新背窮海以入貢望君門而效珍於以獻之爰彰至德非同㡛氏之練更異仙家之織臨風始啟全含琪樹之芳向闕爰開遙寫蜃樓之色固奇工之所就豈常情之可識當其彩縷方織鳴梭靜聞絢霞光於陰火綴縟藻於卿雲舞鳳翔鸞乍徘徊而撫翼重葩疊葉紛宛轉以成文疑映地之花折似飲渚之虹分弄杼斯成既呈妍於泉客垂衣可仰欣有奉於明君啟瑤緘而駭視方霧縠而難擬離披耀彩臨玉砌以蓮舒燦爛生姿映金門而霞起固將保其所異孰能識其所以投熾焰而靡燎為灰濯清流而不濡於水原夫獻琛方至捧篋員來臨虛庭而障倚俯洞戶以屏開蝶翩翻而誤起鳥眄睞以驚迴物無情而自感化有孚而斯應以文為貴寧同巷伯之詩表德方來且異美人之贈非同禹貢不謝堯時對天庭而照燭向麗景而葳蕤皎潔凝光爰識冰蠶之緒霏微發色不惟園客之絲既而煥彼文章作為黼黻方可重於遠人寧有譏於翫物維絲伊緡體道之要繭之緒可以為垂釣之綸綸之微可以精用釣之妙綿聯輕竿之上荏弱深泉之徼裊長風而若絕度晴空而引耀剖粒為餌寧取乎五十之牛懸縷為綸奚期夫三百之釣觀夫其釣不釣元之又元在河之涘期道為筌且夫綸細如忽魚潛在泉振而不絕則其動也直深而能致是其靜也專隨驚波而乍緊逐潛流而曳引時髣髴而如見忽漂搖而將盡其細雖爾其用彌深三尋豈勞於人手百丈自發於泉心神之凝不覺魚之得綸之細亦隨釣而沈美茲綸之裊裊浮長川之浩浩疑空外之游絲罒厶月波中之弱藻斯綸也異園客之功斯釣也得詹何之道釣術既臧惟道能方其竿不撓其餌非芳中之者功多於金鏁引之者道叶於玉璜信可以投於濮水信可以泛彼滄浪必釣乎深先定乎慮得象以契於忘筌得魚斯謂之冥助魚既得兮心亦冥收纖縷兮旋迴汀將大釣於方國冀滄流之大寧物之利者稱乎劒人之尊者稱乎天固一人之所執諒四海之攸先必當曜武德靜氛煙舉之無上揮之莫前獨立而光連日月橫行而氣壓山川請詳其功夫莫之盛偉夫至寶克符元聖東溟之大不足淬其鋒北斗之高乍若迴其柄信元功之不宰曷凶德之能競足令六合靜三光正佩服而寰中康指撝而天下定夫然則鄙歐冶掩平津賤鏌鎁棄純鈞彼勇不過於匹士我威方御於兆人偶聖斯呈天地感通之謂道逢昬是去陰陽不測之謂神豈比高祖提之而起沛始皇按之而王秦為斯劒之等倫哉原其始也吹氣毌鍊元精為爐而九土開闢鼓士冖䂞而八風克生應以六律制以五行帶之以恒山渤海鋒之以燕谿石城故能所向無敵莫之與京既而徵三度亦以正三統劃宇宙以元通宰乾坤而利用彼蓮花發色玉貝騰文揮大野之中疾如雷電倚長天之外上決浮雲爭能擊剌較勢繽紛所謂一夫之勇非為四海之君如是則犀不足剸鍾不足刜繄以聖功配茲神物我皇應昌期恢盛時不耀兵鋒設道德以為固不先武力抗仁義以為師人神協贊遐邇清夷真所謂天子之劒也敢繼莊生而賦之
