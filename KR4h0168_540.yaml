front:
  text: 全唐文欽定全唐文卷五百四十令狐楚二
  hash: sha256:0ec024dee510a159db336d7eeffa5b2aab78146f3b8bdf813e93b7c5af0ffb7f
body:
  text: 臣某言伏見制書大行皇帝靈駕剋以某月日遷座崇陵先太后梓宮自靖陵啟發同時合祔萬邦永慕悲纏於弓劒七月有期痛延於蠻貊伏惟皇帝陛下孝思罔極至性自天攀奉山園聖情難處中慰先朝臨御悠長威靈遐被儲祉傳聖以福四方今祇祔禮終清廟如在率土臣庶實謂哀榮臣職忝方隅分憂地遠不獲仰陪下列奉慰外朝無任瞻戀哀惶之至臣某言得進奏院狀報義章公主今月九日薨輟朝七日者臣伏聞公主分輝帝籍擢秀皇闈麗有掩於舜華纔成下嫁慶初傳於螽羽奄有上仙伏惟陛下仁愛方深恩慈所屬始其凋謝軫以悲傷臣限守邊陲忝聯枝葉不獲陪位奉慰無任哀塞悽愴戀結之至臣某言伏奉六月十四日勅旨太常奏大行太皇尊諡曰至德大聖安孝皇帝廟號曰順宗臣某誠感誠慶頓首頓首臣聞入廟觀德載在前言聞諡知行傳於故志伏惟順宗大聖安孝皇帝統承九聖保乂萬邦繼耀大明合符真宰方同天以下覆俄厭代以上仙伏惟皇帝陛下哀慕未忘孝思罔極痛衣冠之永閟攀弓劒而無階殷薦鴻名光昭懿德廟號非徵於漢魏帝圖自掩於羲軒百代見聖人之功四方知君子之孝率土臣子以欣以感臣限於鎮守遠在方隅不獲奔赴闕庭陪位稱賀無任踴躍之至臣某言臣聞斗筲之器不可持盈腹背之毛安能翔遠是以知進忘退易象之深戒在寵若驚道家之切訓此微臣所以遑遑然久積肝血銜恩陳露而未得者也中謝臣代業儒素心游文史雖自勵巳豈敢發身始望之官止於中臺郎吏外郡牧守而巳幸而因緣昌運遭遇盛時振拔㣥倫驟登台衮伏惟皇帝陛下欽明御歷睿哲配天華夏宅心俊賢翹首方當選眾固合退身豈意遷於黃閣之崇參以紫微之重特出睿旨不因人言九重所知萬殞何答誠宜建用皇極保合太和宏聖功於堯舜之時追恪德於夔龍之列而和羹乏用覆餗為憂空有仰於清光實無裨於元化一自叨竊遽經炎凉跼影兢魂痛心疾首伏乞鑒其悃欵察其疾羸賜以冗員置於散地溥求俊傑委屬鈞衡則大君知人之明永光於典策微臣妨賢之責將息於廟謀天下幸甚微臣幸甚不勝感恩屏營之至臣某言衙官竇及迴伏奉十月二十九日詔書授臣朝散大夫檢校工部尚書兼御史大夫太原尹北都留守充河東節度度支營田觀察處置等使勳賜如故者寵章明命忽降自天捧受兢惶不知所措臣某中謝某性本愚懦才惟薄劣居常勵巳進匪因人心無所營宦不期達伏蒙陛下旁羅俊乂登用賢良擢臣於博士之中授臣以良史之任其後驟昇郎署猥在朝行塵忝日深光耀隆極徒思報効未有因緣旋屬邊上選能軍中乏使特蒙宸眷遣佐兵符空知徇公無以稱職望帝城而積戀倏巳四年處戎幕而懷憂若臨千仞本使李說暫嬰疾苦奄從薨逝伏以天威遠被廟略克成將士等盡忠義之心竭恭敬之力保完府庫鎮定城池奸宄不生三軍如一監使李輔光器能周敏智識通明與臣同心祗奉王事豈意殊常渥澤忽出於宸衷不次榮名併加於朽質仰承雨露使在雲霄跼影兢魂心驚股戰進非所據懼不自勝臣伏以太原守在北門地方千里豐沛故壤陶唐遺人合求勳賢膺此委任如臣山東弱植海內散材非郤縠禮樂之資無翁歸文武之用將何以佩六官之印綬平三府之憲章節御萬人典司百事天庭高邈陳讓無由感恩而泣下霑襟忍愧而汗流浹背謹以三日上訖敷陳天意叶暢軍情綸言一宣列校相慶臣誓當恭承睿算虔奉聖慈以安人和眾為心用報國忘家為志冀伸分寸上答聖明所守有限不獲陳謝臣無任感戴屏營之至臣某言伏奉前月二十七日詔旨授臣朝議郎使持節懷州諸軍事守懷州刺史御史大夫充河陽三城懷州節度使寵任非常怔營失次巳再奉表陳謝訖臣某中謝臣器質庸懦材能駑下文詞小技不足飾身軍旅大權未嘗措意頃者叨居近密親事聖明選擢皆出於宸衷遭逢偶協於昌運進每憂國退常樂天曾不知操舟者忌臣及津執轡者畏臣先路雖皎皎下燭鑒一心之無瑕而營營謗興扇十手以相指去秋方半巳出嚴扃今夏正中又離禁掖伏惟睿聖文武皇帝陛下恩深君父德厚乾坤憫棄席之恩軫遺簪之念微臣自臨關輔恭守章程非官辦而政成幸人安而事集既無罪悔亦望歸還豈意便昇疆場超授鈇鉞再麾飄颻而出守十乘隱轔以啟行荷委寄而誠深苦離違之稍遠就日積戀瞻天靡遑拂儒冠以自驚對朝服而增歎以今月十四日到本鎮上訖伏以郡稱河內山倚太行古為雄藩今號要地但緣瘡痍未復杼軸巳空力欲輯綏曷由振舉謹當拊循羸卒字育疲甿橫征擅賦誓不為峻法嚴科議不用與之休息使得便安以此執心期於報德前臨河瀆羨朝宗而指期仰觀眾星俟拱辰而何日所守有限不獲詣闕辭讓無任感激攀戀涕咽之至臣某言伏奉今月日制書授臣宣州刺史兼御史大夫充宣歙池等州觀察處置等使者命自九重恩加一介兢惶感惕無地自容臣某中謝臣本以凡材從來孤立謬居要地常積憂危頃者陛下嚴奉園陵孝思弓劒微臣職當營護理合勵精而昧於隄防誤有任使既招牒訴合抵憲章豈意陛下恩過生成念深簪履寬朝廷之典制委藩鎮之賦輿飛魂再還戰汗交集誓當飲冰食蘖鏤骨銘肌冀申絲髮之効上報乾坤之德不勝感恩惶恐屏營之至臣某言中使第五守進至奉宣勅旨擢臣知節度觀察等留後臣即以今月十八日上訖非常之命降自宸衷不次之恩猥加賤質奉戴兢惕罔知所圖臣某中謝臣內顧孱庸素無器業量力揣分委質戎行身居將列朝絕親援不識公卿之第粗聞宰輔之名雖學孫吳未知七德之要嘗師顏閔不究六經之旨愚惟守直訥未近仁顧瞻等夷每愧劣薄苟求寡過之地竊慕事君之道朿髮筮仕逢盛時以自怡執心許國遇暗室而增懼臣之愚素敢忘恩榮頃以陪臣獲隨覲見比辭瑤陛瞻覩天顏遂因頒慶竊膺寵錫自謂生足榮矣死無恨矣豈意聖慈煥發睿獎曲成拔自轅門寄之藩閫洎天心特達因屈朝章而人望乖疎必速官謗內念惶灼浩無津涯且上黨重鎮赤狄遺人師旅薦興風俗難理猛則生怨寬不知恩鄰接強暴地當關塞加之以仍歲灾沴不足以兩稅徵科軍政稍乖壓覆是懼臣雖竭股肱之力瀝肝膽之誠不知何以上答乾坤少裨塵露云云臣某言伏奉某月日勅旨授臣道州刺史恭承榮命拜伏寵光如出井谷而見日月臣某中謝臣聞周室建侯每先親舊漢朝置守必選循良臣公才蔑聞利用無取自幼及壯終艱且拙然而竭誠以許國必盡力而在公一辭朝右累守郡佐不寒自慄無水而沈伏惟陛下頒帝堯分命之典敷孝宣共理之詔方須俊乂以輯惸嫠若臣之倫何敢望此不圖恩從上降命自中出付以金印委之竹符立有光耀坐生羽翼荷天地之德戴山為輕感雨露之仁測海猶淺謹以某月日便道到州上訖誓當佩韋以勵志置水而清心酌遠俗之便宜節下人之好惡使豪舊歛手疲羸息肩雖不足稱陛下慎擇眷求之意其於乾乾憂濟庶分萬一臣官守所限不勝蹈舞天庭無任臣某言去年九月十五日於宣州伏奉某月日勅旨貶授臣使持節衡州諸軍事守衡州刺史散官勳賜如故仍馳驛發遣者嚴威成命忽降自天戰灼飛魂如臨於谷臣某中謝臣素以凡品謬登高位雖滿盈是戒每刻肺腑而怨讟所歸難防頰舌屬奉陵無狀選吏不精多偷見緡連斃枯木擢臣之髮豈可贖罪粉臣之骨不足勝刑伏惟皇帝陛下德厚於乾坤明齊於日月斷自深慮遽置寬科降受郡符錫留命服九重殊渥再荷生成萬殞殘骸何由報効以今月十二日到所部上訖伏以君親同致臣子一例情有思於聞達理合具而奏陳今臣官忝頒條職非奉使謝上之外拜章無因欲隱默而不言懼中傷而未巳何者微臣頃蒙朝獎謬列宰司誠不曾壅隔賢才怨臣者至寡辭京之後毀臣者則多今去望朝廷更無庇援曲全孤賤唯託聖明特乞眷慈俯鑒哀懇庶使窮鱗懷躍波之望幽蟄有聞雷之期仰天垂涕伏地流汗不勝感恩懼罪戰慄屏營之至臣無任臣某言伏奉某月日恩制授臣石州刺史持節石州諸軍事謹以某月日到所部上訖祗奉明命伏深戰越臣某中謝臣本瑣材素無明畧雖被堅執銳曾立絲髮之功而化人成俗未知韋弦之政豈意陛下錄其微効委此無能付臣以六條之法委臣以千里之地况離石古郡洪河巨防官惟其人位不虛授內顧庸劣將焉克堪誓當宣陛下之風達其堙鬱布陛下之澤潤其枯槁少助神化微分聖憂然後退居農畝以避賢路臣不勝悃欵屏營之至臣某言伏奉某月日恩旨南郊禮畢進加臣朝議大夫拜受嚴命感惕交集臣某中謝臣泗濱諸生塞上從事被蒙恩澤齒列才俊戴高履厚實有恧焉乃建子月伏惟皇帝陛下殷薦祖宗嚴禋天地而限從外役不侍中禁有望雲就日之戀無給薪除地之勞今者爵賞遠加寵榮俯及拾級以上早忝諸侯之秩歷階而升又厠大夫之品峩峩象笏燦燦銀章自揆何人敢安非據伏以神休既擁王澤巳流難申牢讓之心空秉益恭之禮無任慶幸屏營之至臣某言今月七日中使尹偕至伏奉勅書手詔慰喻臣及將士參佐等并賜臣官誥旌節寵命併臨榮光謺至欽承捧受感惕難勝臣某中謝臣昔為諸生所冀微祿揣摩鉛鈍際會清平伏惟皇帝陛下至德配天大明并日朝有多士國無幸人若臣庸虛何足比數階緣所職被服殊私居郎吏之中巳為饕竊立戎旃之下安所堪任前奉詔書除臣節度託肺腸而三省覺魂魄之九飛懇欵未申恩光荐及使從天上拜迎而萬姓歡呼王在日中照臨而一方安泰編綸言於寶軸揮宸翰於綵牋既賜諸侯之旌又降將軍之節委之刑賞許以便宜臣實何人忽蒙斯寵重如山壓薰若火炎無以為容不知自處謹以今日准勅拜受訖臣伏以旌惟進善節以詰姦昔常傳聞今即祗受度才非將雖天下所知稟令於君豈風塵敢犯誓當保安四境和叶三軍灑帝澤於州閭振皇威於邊徼難酬天造庶竭臣心所守有限不獲陳謝無任感戴抃躍之至臣某言伏奉恩旨授臣太原少尹兼御史中丞充河東節度使行軍司馬祗承榮命以感以懼臣某中謝臣器質凡下行能無取父母生之陛下知之頃陷官謗會從吏議伏賴陛下聖明乃得全活既而肩隨多士掌領孤兒警夜巡晝庶將終老跼天蹐地誓不違遠豈意陛下不量臣之能否拔自近侍貳於大藩且御史丞執憲之任府少尹理民之官也軍司馬握兵之職也皆須率其屬以贊其長必國之良猶懼不稱况於疲病安所堪任此臣所以行思坐念常恐失墜以某月日到府上訖伏以太原建國興王大都嘵囂五氏合沓萬室動見指視甚難為理唯稟謨猷於廊廟同心力於幕府勤以臨事清而處身至若上分乃眷之憂下塞具瞻之望雖欲自勵終非所能離去殿階巳彌旬月攀望不及腸迴目斷無任云云臣某言臣得進奏院狀報今月七日聖慈召臣男公敏令對見其日中使馬承倩奉宣進止賜緋魚袋欽承失圖啟處無地臣某中謝臣才非動眾勇不兼人仰緣枝葉獲展筋力荷天百祿幸據於周詩遺子一經誠慙於漢史男公敏義方未教容止無儀伏蒙陛下召入清禁之中立於丹墀之下遠憂顛沛伏用兢惶豈意明命曲臨榮光下燭小觽猶佩忽帶金章褐衣纔解便綰朱紱生成之功不次浸潤之澤無涯重若戴山輝如衣錦匈奴未滅方忍恥於愚臣童子何知復蒙恩於聖主六姻交賀百眾同歡空竭節於邊陲豈酬仁於覆載銘膚鏤骨不敢殞墜所守有限不獲陳謝臣無任感激屏營之至臣某言去二月日中使某至伏奉勅書手詔并賜臣春衣一副牙尺一條宸翰葳蕤寵錫稠謺捧受榮抃如將不勝臣聞衣裳在笥與必有道刀尺為器用惟其人臣魯國小儒漢庭下士因緣霈澤汙染官牒顏嘗忍愧心不容憂陛下仁發於中惠周於外矜臣以濕暑之患賜之葛衣念臣無忖度之能降其寶尺輕新有楚廣狹不踰被服而炎蒸坐銷秉持而長短立辨揆才量力將何補於分寸運肘延頸實有塵於領袖當期畢命無以酬恩臣無任臣某言今月日中使周某至奉宣口勅賜臣春衣一副并端午衣一副銀盌一口百索一軸累受寵光載懷兢懼自揣涯分若臨冰淵臣某中謝臣以昧於知人交通元載合從牽累伏待刑章豈謂俯迴宸翰特有殊賜罪當褫帶忽頒御府之衣憂可傷生重延長命之縷更加珍器曲被深恩徒懷推食之仁立遣素餐之責施均雷雨荷重邱山雖畢命以自期終粉身而無恨臣無任臣某言中使某至伏奉勅書手詔兼賜臣及大將軍等春衣一副金縷牙尺一條拜奉天書光生萬里即受殊賜喜溢三軍臣某中謝臣素以庸虛特承聖獎寄深分閫恩重邱山祗奉朝章布宣皇澤藩夷即敘懸道廓清將士無戰伐之勞四時沾衣服之賜况榮頒尺度禮叶典經敢懷寸進之心空積違顏之戀臣無任云云臣某言中使某至伏奉勅書手詔兼賜臣衣甲器械刀斧銀器及藥物等并賜臣下軍將者賜因寄重報覺身輕蹈舞若驚載欣載躍中謝臣力慙致果迹忝理戎六月之師纔申國討九天之詔先布皇慈將以忠勤恤其暴露側身拜命覩物知恩念臣或抱羸疴是加藥物矜臣必摧凶醜載錫戎裝弓倍六鈞刀逾百鍊衣分元甲戰則保全器有白金食唯豪貴寵連諸將榮冠一時漢主賜人空聞寶劒宋朝頒藥但理金瘡豈如兼備五兵盡蠲萬病榮茲陋質感戴奚殫無任感恩捐軀之至臣某言某月日中使至伏奉勅書手詔等捧戴拜賜榮感兢惕軍城歡抃海曲光輝臣某中謝伏惟尊號皇帝陛下至仁育物元德統乾恩被生靈惠周遐邇臣猥蒙寄任謬領方隅寒暑驟移庶績罔紀王人忽降慈旨曲臨涉遐遠之道途敷殊常之渥澤詔書既啟仰觀垂露之華珍服俯臨實懼維鵜之刺慶同戎府榮及閨門况節戒元冬戀深丹闕授衣感自天之錫盡力堅粉骨之誠屬垂溥天和布代化萬方昭泰四海無虞空知報効之勞願同犬馬未展涓埃之績何答邱山寢興靡遑慙懼交集無任受恩悃懇之至臣某言去年十二月中使至奉宣勅書手詔兼賜臣口脂紅雪各一合十年歷日一通捧緘跪發以喜以駭臣某中謝臣聞平分四時堯有歷象聚蓄百藥周之憲章至若雪散耀紅紫之名香膏蘊蘭薰之氣合自金鼎貯以雕奩是宜寵錫大臣榮加有德用灑非常之澤式彰不次之恩而臣遠守嶺隅賤同凡器曾無薄技上答殊私陛下惠與露行德如天覆發於中禁及此下藩諭以綸綍之言頒其啟閉之節脂膏一潤覺面目之有光藥石載攻知肺腑之丟疾誓當延年聖代戮力清朝戴昊天而不勝瞻魏闕而增戀無任臣某言臣得進奏院狀報三月二十五日本道監軍李輔光奉宣進止賜臣男公敏絹五十匹衣一副着蓋椀一并合發遣往東都辦護喪事至二十六日伏奉勅賜臣妻博陵郡夫人崔氏晉國夫人欽承明命以悲以歡臣某中謝臣某帝枝末屬天壤微生幸偶升平叨居要劇生成之德無以奉於君親封賞之榮豈望及於妻子今者一門之內二日之中王澤浹於幽明天光蟠於高下受恩過厚忍愧逾深且翦葉為珪晉封所以稱其大織縑如雪班女由是咏其妍既耀溢於親疎實感纏於存歿未知所答難以自陳空知想泉路以傷心仰天衢而稽首所守有限未獲陳謝無任臣某言臣聞君猶父也臣猶子也子事父有冬溫夏凊之禮臣事君有大聘小聘之義臣雖庸鄙嘗感斯言况乃地離京師千里而近身去王室十年有餘心既傾而陽光未迴目巳極而雲路猶阻此臣所以形留神往淚盡血繼者也况監司之寄甚重馬乘之務非細或物有因襲革之而無妨或事無典據為之而有利咸非翰墨所可升聞貯於中心期以上達伏惟陛下迴天地之鑒垂日月之明俯借恩光暫令朝奏儻得飛纓於赤墀之下委佩於彤庭之前目見龍顏足履丹地則犬馬大幸與天無窮無任悃欵之至臣某言臣自罷侍龍樓出班馬政星霜驟變十有三年伏惟陛下光宅寰瀛惟新景命奏簫韶之九變獨臣未聞舞干羽於兩階唯臣未見累歲有違離之苦終朝懷戀慕之誠是以屢獻封章懇求朝覲愚衷不達聖眷未迴邊山之中躑躅愁結比者臣雖庸鄙兼領嵐州職在治人固難離局今既專知監務特有使名伏櫪多暇望雲增切且臣所部濱河近塞兵家利病時事便宜難於遠陳願一敷奏而况道途非遠僕御不多次舍之費誠未擾於郡縣往來之期當不踰於旬月伏望俯迴天鑒曲遂臣心使得稱慶於中朝然後代勞於外广既至願斯畢死無所恨無任懇迫戀結之至臣某言臣聞心孤者觸緒而悲意切者發言皆懇揣情循理今古同塵嘗謂無之今乃信有臣某中謝臣雖頑鄙無取亦嘗側聞長者之論上自古昔迄至於今才能事業百十於臣而不升名宦之級不知祿廩之數者何可一二其紀臣某無耿介之節開濟之能且有極愚至陋之累而微生際會事陛下於藩邸之中周旋出處雖無擁戴神聖之績便蕃左右曾有侍從言語之樂竊自欣賀若升雲天伏惟陛下握圖御極凝旒垂象惠均於動植信及於細微擢臣於方岳之中委臣以監牧之務仰憑殊造俯竭愚衷封人粗安國馬稍息今者秩視賓客位為大夫耳煩絲竹之音響口厭粱肉之滋味馳驅駿足偃息華榱蒙陛下覆育之恩巳為太過顧微臣止足之分實所甚榮豈敢更冒寵光別求獎用伏以狗馬之齒衰暮相迫螻蟻之命危殘不常日往月來懼貽敗覆天長地久不勝瞻戀每至木葉下邊馬嘶切思指畫君前以畢平生之力常恐先霜露填溝壑不見丹闕長恨黃泉伏惟陛下仁愛惻隱及於萬類察臣之至願表臣之赤心使一入帝城死無所恨無任哀迫懇苦之至臣某言臣聞天地之大曲成於品物臣子之心無隱於君父下情上達至化旁流伏惟開元天寶聖文神武應道皇帝陛下睿謀作聖孝理奉天蒼生之願不違皇極之慈廣運不以臣微劣無取累擢大官位高尹京職重居守犬馬陳力未酬明主之恩霜露感懷遽有私家之請臣某中謝先臣墳墓俯在近郊頃歲以來闕伸拜埽每至寒節展臣情禮晨往暮還所職無闕又臣於墳塋立碑恐其向就建樹之際獲遂躬親重泉承日月之光舉家蒙雨露之澤不勝罔極之至臣某言伏惟皇帝陛下某月日臨御某殿射飛雁一隻應弦而落歡動宮闈武暢環衞中謝臣家世為將揚聲朔野弧矢之事少嘗習焉每張侯為鵠注鏃而釋期於必中十不一二今則禽飛於青冥之際箭發於倏忽之間一聲劈雲雙翼墜地此皆神授審固靈扶端直以成陛下神武之威也臣才質無取蒙恩深厚脫劍免冑之餘輒思撰射雁歌一章隨此上獻誠不敢繼抗墜列風雅姑以抒下情宣上德附於大武之末而登歌焉無任歡抃怔營之至臣某言得當道征馬使穆林狀稱忻州定襄縣王進封村界去五月十二日夜孳化馬㣥內異駒一匹白騧文馬畫圖送到者臣謹差虞候辛峻專往考驗并母取到太原府而毛色變換與青騧色駝頭跌額紅鼻肉駿尾上茸毛額帶星及旋肋骨左右各十八枝四蹄青兩眼黑續得穆林狀稱當生之夜㣥馬皆嘶靈質炳然休徵備矣中謝臣聞馬之精也自天而降馬之功也行地無疆是以武藉其威文榮其德謹按馬經云肋數十六者行千里伏惟陛下握負圖之瑞總服皁之靈異物殊祥蔚然叢集臣觀前件駒靈表挺特雄姿逸異頸昂昂而鳳顧尾宛宛以虬蟠信坤元之利貞誠太乙之元貺自將到府便麗於宮每飲以清池牧於芳草則彌日翹立驅之不前及長風時來微雨新霽輒驤首奔騁追之莫及臣某恒親省視專遣柔馴倘駿骨峯生奇毛日就獲登華广既既備屬車遠齊飛兔之名上奉應龍之馭天下大慶微臣至願見今養飼至秋中即專進獻伏惟陛下兼愛好奇想其風彩今謹圖畫隨表上進伏乞聖恩宣付史館俾此丕烈垂於無窮臣無任戰越之至
