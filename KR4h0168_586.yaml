front:
  text: 全唐文欽定全唐文卷五百八十六柳宗元十八
  hash: sha256:1f93702b42c7d378c36a8118f9763f0b8b2fca20f42572760cff27f2ea95a939
body:
  text: 吳子問於柳先生曰先生晉人也晉之故宜知之曰然然則吾願聞之可乎曰可晉之故封太行掎之首陽起之黃河迤之大陸靡之或巍而高或呀而淵景霍汾澮以經其壖若化若遷鈎嬰蟬聯然後融為平川而侯之都居大夫之邑建焉其高壯則騰突撑拒聱岈鬱怒若熊羆之咆虎豹之嘷終古而不去攫秦搏齊當者失據燕狄惴怯若卵就壓振振業業覷關蹀戶惕若僕妾其桉衍則平盈旋緣紆徐夷延若飛鳶之翔舞洄水之容與以稼則碩以植則茂以牧則蕃以畜則庶而人用是富而邦以之阜其河則濬源崑崙入於天淵出乎無門行乎無垠自胸奴而南以介西鄙衝奔太華運肘東指混潰后土濆濁麋沸黿鼉詭怪于于汨汨騰倒馬失越委泊涯涘呀呷欱納摧雜失墜其所蕩激則連山參差廣野壞裂轟雷怒風撼鵨于山戛崩石之所轉躍大木之所擢拔漰泙洞踏者彌數千里若萬夫之斬伐而其軸轤之所負橦檣之所御鱗川林壑隳雲遁雨瞬目而下者榛榛沄沄百舍一赴若是何如吳子曰先生之言豐厚險固誠晉之美矣然晉人之言表裏山河者備敗而已非以為榮觀顯大也吳起所謂在德不在險此晉人之藉也願聞其他先生曰大鹵之金棠溪之工火化水淬器備以充為棘為矛為鍛為鉤為鏑為鏃為槊為鍭出太白徵蓐收召招搖伏蚩尤肅肅褷褷合衆靈而成之博者狹者曲者直者歧者徑者長者短者攢之如星奮之如霆運之如縈浩浩奕奕淋淋滌滌熒熒的的若雪山冰谷之積觀者膽掉目出寒液當空發耀英精互繞晃蕩洞射天氣盡白日規為小鑠雲破霄跕墜飛鳥弓人之弓函人之甲膠角百選犀兕七屬乃使跟超掖夾之倫服而持之南瞰諸華北讋㣥夷技擊節制聞於天下是為善師延目而望之固以拳拘喘汗免胄肉袒進不敢降退不敢竄若是何如吳子曰夫兵之用由德則吉由暴則凶是又不可為美觀也先軫曰師直為壯曲為老况徒以堅甲利刃之為上哉先生曰晉國多馬屈焉是産土寒氣徑崖拆谷裂草木短縮鳥獸墜匿而馬蕃焉師師兟兟溶溶沄沄轠轠轔轔或赤或黃或元或蒼或醇或龐黭然而陰炳然而陽若旌旃旗幟之煌煌乍進乍止乍伏乍起乍奔乍躓若江漢之水疾風驅濤擊山蕩壑雲沸而不止㣥飲源稿回食野赭浴川蹙浪噴震播灑潰潰焉若海神駕雪而來下觀其四散惝恍開合萬狀喜者鵲厲怒者人搏決然坌躍千里相角風騣霧鬣斸山抉壑耳搖層雲腹捎衆木寂寥遠遊不久而復攫地跳梁堅骨蘭筋交頸互齧鬬目相馴聚溲更噓昂首張齗其小者則連牽繳繞仰乳俯齕蟻雜螽集啾啾潗潗旅走叢立其材之可者收斂攻教掉手飛縻指毛命物百步就羈牽以荀息御以王良超以范鞅軒以欒針以佃以戎獸獲敵摧若是何如吳子曰恃險與馬者子不聞乎故曰冀之北土馬之所生是不一姓請置此而新其説先生曰晉之北山有異材梓匠工師之為宮室求大木者天下皆歸焉仲冬既至寒氣凝成外凋內貞瀋液不行乃堅乃良萬工舉斧以入必求諸巖崖之欹傾澗壑之紆縈淩巑岏之杪顛潄泉源之淦瀯根絞怪石不土而植千尋百圍與石同色羅列而伐者頭抗河漢刃披虹霓聲振連巒柿填層溪丁丁登登硠硠稜稜若兵車之乘淩其響之所應則潰潰漰漰洶洶薨薨若騫若崩若螭龍之鬬風霆相騰其殊而下者札山戛捎殺摧崒坱圠霞披電裂又似共工觸不周而天柱折鵾鸛鶖鶬號鳴飛翔貙犴虎兕奔觸讋栗伏無所入遁無所脫然後斷度收羅捎危顛芟繁柯乘水潦之波以入於河而流焉蕩突硉兀轉騰冒沒類秦神驅石以梁大海抵曲鱗蹙匯流雷解前者汨越後者迫隘乃下夫龍門之懸水摺拉頽踏捽首軒尾澒入重淵不知其幾百里也濤波之旋滔山觸天既渟既平彌望悠焉良久乃始昂屹涌溢挺拔而出林立峰崒穿雲蔽日渙然自撓復就行列渾渾而去以至其所唯良工之指顧叢臺阿房長樂未央建章昭陽之隆麗詭特皆是之自出若是何如吳子曰吾聞君子患無德不患無土患無土不患無人患無人不患無宮室患無宮室不患材之不已有先生之所陳四纍之下也且虒祁既成諸侯叛之先生曰河魚之大上迎濤波羅壅津涯千里雷馳重馬輕車遂以君命矢而縱觀焉大罟斷流修網亘山罩罶罣䍡織紝其間巨舟軒昂仡仡回環水師更呼聲裂商顏於是鼓譟沓集而從之扼龍吭拔鯨鰭戮白黿逐毒螭叱馮夷立水湄搜攪流離掬縮推移梁會網蹙騰天彌圍掉躃擁踊以登夫歷山之垂如川之歸如山之摧如雲之披其有乘化會神振拔漣淪摛奇文出怪鱗騰飛濤而上逸生電雷於龍門者猶仰綸飛繳頓踏而取之莫不脫角裂翼呀嚇匍匐復就臠切莫保龍籍具糅五味布列雕俎風雲失勢沮散遠去若夫鯊鱨鮪鯉鰋鱧魴鱮之瑣屑蔑裂者夫固不足悉數漏脫紘目養之水府而三河之人則已填溢饜飫腥膏舄鹵聞膾炙之美則掩鼻蹙頞賤甚糞土而莫顧者也若是何如吳子曰一時之觀不足以夸後世口舌之味不足以利百姓姑欲聞其上者先生曰猗氏之鹽晉寶之大也人之賴之與穀同化若神造非人力之功也但至其所則見溝塍畦畹之交錯輪囷若稼若圃敞兮勻勻渙兮鱗鱗邐瀰紛屬不知其垠俄然決源釃流交灌互澍若枝若股委屈延布脈寫膏浸潗濕滑汨彌高掩庳漫壠冒塊決決沒沒遠近混會抵值堤防瀴瀛沛濊偃然成淵漭然成川觀之者徒見浩浩之水而莫知其以及神液陰漉甘鹵密起孕靈富媼不愛其美無聲無形熛結迅詭回眸一瞬積雪百里皛皛羃羃奮僨離析鍛圭椎璧眩轉的皪乍似隕星及地明滅相射冰裂雹碎巃嵷增益大者印纍小者珠剖涌者如坻坳者如缶日晶熠煜螢駭電走亘步盈車方尺數斗於是裒斂合集舉而堆之皓皓乎懸圃之巍巍皎乎溔乎狂山太白之淋漓駭化變之神奇卒不可推也然後驢吂月馬凡牛馬之運西出秦隴南過樊鄧北極燕代東逾周宋家獲作鹹之利人被六氣之用和鈞兵食以征以貢其賚天下也與海分功可謂有濟矣若是何如吳子曰魏絳之言曰近寶則公室乃貧豈謂是耶雖然此可以利民矣而未為民利也先生曰願聞民利吳子曰安其常而得所欲服其教而便於己百貨通行而不知所自來老幼親戚相保而無德之者不若兵刑不疾賦力所謂民利民自利者是也先生曰文公之霸也援秦破楚囊括齊宋曹衛解裂魯鄭震恐定周於溫奉册受錫夾輔糾逖以為侯伯齊盟踐土低昂玉帛天子恃焉以有諸侯諸侯恃焉以有其國百姓恃焉以有其妻子而食其力叛者力取附者仁撫推德義立信讓示必行明所嚮達禁止一好尚春秋之事公侯大夫策文馬馳軒車出入環連貫於國都則有五筵之堂九凡之室大小定位左右有秩禽牢餼饋交錯文質饗有嘉樂宴有庭實登降好賦犧象畢出犒勞贈賄率禮無失六卿理兵大戎小戎鐘鼓丁寧以討不恭車埒萬乘卒半天下鼓之則震旆之則畏其號令之動若水之源若輪之旋莫不如志當此之時咸能歡娛以奉其上故其民至於今好義而任力此以民力自固假仁義而用天下其遺風尚有存者若是可以為民利也乎吳子曰近之矣然猶未也彼霸者之為心也引大利以自嚮而摟他人之力以自為固而民乃後焉非不知而化不令而一異乎吾嚮之陳者故曰近之矣猶未也先生曰三河古帝王之更都焉而平陽堯之所理也有茅茨采椽土型之度故其人至於今儉嗇有溫恭克讓之德故其人至於今善讓有師錫僉曰疇咨之道故其人至於今好謀而深有百獸率舞鳳凰來儀於變時雍之美故其人至於今和而不怒有昌言警戒之訓故其人至於今憂思而畏禍有無為不言垂衣裳之化故其人至於今恬以愈此堯之遺風也願以聞於子何如吳子離席而立拱而言曰美矣善矣其蔑有加矣此固吾之所欲聞也夫儉則人用足而不淫讓則遵分而進善其道不鬬謀則通於遠而周於事和則仁之質戒則義之實恬以愈則安而久於其道也至乎哉今主上方致太平動以堯為準先生之言道之奧者若果有貢於上則吾知其易易焉也舉晉國之風以一諸天下如斯而已矣敬再拜受賜有問柳先生者曰先生貌類學古者然遭有道不能奮厥志獨被罪辜廢斥伏匿交遊解散羞與為戚生平嚮慕毀書滅迹他人有惡指誘增益身居下流為謗藪澤罵先生者不忌陵先生者無謫遇揖目動聞言心惕時行草野不知何適獨何劣耶觀今之賢智莫不舒翹揚英推類援朋謺足天庭魁壘恢張㣥驅連行奇謀高論左右抗聲出入翕忽擁門填扃一言出口流光垂榮豈非偉耶先生雖讀古人書自謂知理道識事機而其施為若是其悖也狼狽擯僇何以自表於今之世乎先生答曰敬聞命然客言僕知理道識事機過矣僕懵夫屈伸去就觸罪受辱幸得聯肢體完肌膚猶食人之食衣人之衣用人之貨無耕織居販然而活給羞愧恐栗之不暇今客又推當世賢智以深致誚責吾縲囚也逃山林入江海無路其何以容吾軀乎願客少假聲氣使得詳其心次其論客曰何取先生曰僕少嘗學問不根師説心信古書以為凡事皆易不折之以當世急務徒知開口而言閉目而息挺而行躓而伏不窮喜怒不究曲直衝羅陷穽不知顛踣愚憃狂悖若是甚矣又何以恭客之教而承厚德哉今之世工拙不欺賢不肖明白其顯進者語其德則皆茫洋深閎端貞鯁亮苞并涵養與道俱往而僕乃蹇淺窄僻跳浮嚄唶抵瑕陷厄固不足以趦趄批捩而追其迹舉其理則皆謨明淵沈剖微窮深劈析是非校度古今而僕乃緘鉗默塞耗眊窒惑抉異探怪起幽作匿攸攸恤恤卒自禍賊固不足以睢盱激昂而效其則言其學則皆總攬羅絡橫豎雜博天旋地縮鬼神交錯而僕乃單庸撇莩離疏空虛竊聽道塗顓嚚蒙愚不知所如固不足以抗顏搖舌而與之俱稱其文則皆汗漫輝煌呼噓陰陽轇轕三元陶鎔帝皇而僕乃朴鄙艱澀培塿潗湁毫聯縷緝塵出坱入固不足以攄摛踊躍而涉其級茲四者懸判雖庸童小女皆知其不及而又裹以罪惡纏以羈縶客從而擠之不亦忍乎且夫白羲騄耳之得康莊也逐奔星先飄風而跛驢不出泥滓黃鍾元間之登清廟也鏗天地動神祇而嗚嗚咬哇不入里耳西子毛嬙之蹈後宮也皎朝日煥浮雲而無鹽逐於鄉里蛟龍之騰於天淵也彌六合澤萬物而蝦與蛭不離尺水卓詭倜儻之士之遇明世也用智能顯功烈而麼眇連蹇顛頓披靡固其所也客又何怪哉且夫一涉險厄懲而不再者烈士之志也知其不可而速已者君子之事也吾將竊取之以沒吾世不亦可乎乃歌曰堯舜之修兮禹益之憂兮能者任而愚者休兮蹮蹮蓬藋樂吾囚兮文墨之彬彬足以舒吾愁兮已乎已乎曷之求乎客乃笑而去柳先生既會州刺史即治事還遊於愚溪之上溪上聚黧老壯齒十有一人謖足以進列植以慶卒事相顧加進而言曰今茲是州起廢者二焉先生其聞而知之歟答曰誰也曰東祠躄浮圖中廄病顙之駒曰若是何哉曰凡為浮圖道者都邑之會必有師師善為律以敕戒始學者與女釋者甚尊嚴且優遊躄浮圖有師道少而病躄日愈以劇居東祠十年扶服輿曳未嘗及人仄匿愧恐殊甚今年他有師道者悉以故去始學者與女釋者倀倀無所師遂相與出躄浮圖以為師盥濯之扶持之壯者執輿幼者前驅被以其衣導以其旗怵惕疾視引且翼之躄浮圖不得已凡師數百生日饋飲食時獻巾帨洋洋也舉莫敢踰其制中廄病顙之駒顙之病亦且十年色元不厖無異技硿然大耳然以其病不得齒他馬食斥棄異皂恆少食屏立擯辱掣頓異甚垂首披耳懸涎屬地凡廄之馬無肯為伍會今刺史以御史中丞來蒞吾邦屏棄㣥駟舟以泝江將至無以為乘廄人咸曰病顙駒大而不厖可秣飾焉他馬巴僰痺狹無可當吾刺史者於是衆牽駒上燥土大廡下薦之席縻之絲浴剔蚤鬋刮惡除洟莝以雕胡秣以香萁錯貝鱗纕鑿金文羈絡以和鈴纓以朱綏或膏其鬣或劘其脽御夫盡飾然後敢持除道履石立之水涯幢旟前羅杠蓋後隨千失翼衛當道上馳抗首出臆震奮遨嬉當是時若有知也豈不曰宜乎先生曰是則然矣叟將何以教我黧老進曰今先生來吾州亦十年足軼疾風鼻知羶香腹溢儒書口盈憲章包今統古進退齊良然而一廢不復曾不若躄足涎顙之猶有遭也朽人不識敢以其惑願質之先生先生笑且答曰叟過矣彼之病病乎足與顙也吾之病病乎德也又彼之遭遭其無耳今朝廷洎四方豪傑林立謀猷川行㣥談角智列坐爭英披華發輝揮喝雷霆老者育德少者馳聲丱角羈貫排廁鱗征一位暫缺百事交并駢倚懸足曾不得逞不若是州之乏釋師大馬也而吾以德病伏焉豈躄足涎顙之可望哉叟之言過昭昭矣無重吾罪於是黧老壯齒相視以喜且吁曰諭之矣拱揖而旋為先生病焉自吾居夷不與中州人通書有來南者時言韓愈為毛穎傳不能舉其辭而獨大笑以為怪而吾久不克見楊子誨之來始持其書索而讀之若捕龍蛇搏虎豹急與之角而力不敢暇信韓子之怪於文也世之模擬竄竊取青媲白肥皮厚肉柔筋脆骨而以為辭者之讀之也其大笑固宜且世人笑之也不以其俳乎而俳又非聖人之所棄者詩曰善戲謔兮不為虐兮太史公書有滑稽列傳皆取乎有益於世者也故學者終日討説答問呻吟習復應對進退掬溜播灑則罷憊而廢亂故有息焉遊焉之説不學操縵不能安絃有所拘者有所縱也太羹元酒體節之薦味之至者而又設以奇異小蟲水草楂梨橘柚苦鹹酸辛雖蜇吻裂鼻縮舌澀齒而咸有篤好之者文王之昌蒲葅屈到之芰曾皙之羊棗然後盡天下之味以足於口獨文異乎韓子之為也亦將弛焉而不為虐歟息焉遊焉而有所縱歟盡六藝之奇味以足其口歟而不若是則韓子之辭若壅大川焉其必決而放諸陸不可以不陳也且凡古今是非六藝百家大細穿穴用而不遺者毛穎之功也韓子窮古書好斯文嘉穎之能盡其意故奮而為之傳以發其鬱積而學者得以勵其有益於世歟是其言也固與異世者語而貪常嗜瑣者猶呫呫然動其喙亦勞甚矣乎魏公子丕由其父得漢禪還自南郊謂其人曰舜禹之事吾知之矣由丕以來皆笑之柳先生曰丕之言若是可也嚮者丕若曰舜禹之道吾知之矣丕罪也其事則信吾見笑之者不知言未見丕之可笑者也凡易姓授位公與私仁與強其道不同而前者忘後者繫其事同使以堯之聖一日得舜而與之天下能乎吾知小爭於朝大爭於野其為亂堯無以已之何也堯未忘於人舜未繫於人也堯之得於舜也以聖舜之得於堯也以聖兩聖獨得於天下之上奈愚人何其立於朝者放齊猶曰朱啓明而况在野者乎堯知其道不可退而自忘舜知堯之忘己而繫舜於人也進而自繫舜舉十六族去四凶族使天下咸得其人命二十二人興五教立禮刑使天下咸得其理合時月正歷數齊律度量權衡使天下咸得其用積十餘年人曰明我者舜也齊我者舜也資我者舜也天下之在位者皆舜之人也而堯隤然聾其聰昏其明愚其聖人曰往之所為堯者果烏乎在哉或曰耄矣曰匿矣又十餘年其思而問者加少矣至於堯死天下曰久矣舜之君我也夫然後能揖讓受終於文祖舜之於禹也亦然禹旁行天下功繫於人者多而自忘也晚益之自繫猶是也而啓賢聞於人故不能夫其始繫於人也厚則其忘之也遲不然反是漢之失德久矣其不繫而忘也甚矣宦董袁陶之賊盈矣丕之父攘禍以立強積三十餘年天下之主曹氏而已無漢之思也丕嗣而禪天下得之以為晚何以異夫舜禹之事耶然則漢非能自忘也其事自忘也曹氏非能自繫也其事自繫也公與私仁與強其道不同其忘而繫者無以異也堯舜之忘不使如漢不能授舜禹舜禹之繫不使如曹氏不能受之堯舜然而世徒探其情而笑之故曰笑其言者非也問者曰堯崩天下若喪考妣四海遏密八音三載子之言忘若甚然是可不可歟曰是舜歸德於堯史尊堯之德之辭者也堯之老更一世矣德乎堯者蓋已死矣其幼而存者堯不使之思也不若是不能與人天下凡人之獲謗譽於人者亦各有道君子在下位則多謗在上位則多譽小人在下位則多譽在上位則多謗何也君子宜於上不宜於下小人宜於下不宜於上得其宜則譽至不得其宜則謗亦至此其凡也然而君子遭亂世不得已而在於上位則道必咈於君而利必及於人由是謗行於上而不及於下故可殺可辱而人猶譽之小人遭亂世而後得居於上位則道必合於君而害必及於人由是譽行於上而不及於下故可寵可富而人猶謗之君子之譽非所謂譽也其善顯焉爾小人之謗非所謂謗也其不善彰焉爾然則在下而多謗者豈盡愚而狡也哉在上而多譽者豈盡仁而智也哉其謗且譽者豈盡明而善褒貶也哉然而世之人聞而大惑出一庸人之口則㣥而郵之且置於遠邇莫不以為信也豈惟不能褒貶而已則又蔽於好惡奪於利害吾又何從而得之耶孔子曰不如鄉人之善者好之其不善者惡之善人者之難見也則其謗君子者為不少矣其謗孔子者亦為不少矣傳之記者叔孫武叔時之顯貴者也其不可記者又不少矣是以在下而必困也及乎遭時得君而處乎人上功利及於天下天下之人皆歡而戴之向之謗之者今從而譽之矣是以在上而必彰也或曰然則聞謗譽於上者反而求之可乎曰是惡可無亦徵其所自而已矣其所自善人也則信之不善人也則勿信之矣苟吾不能分於善不善也則已耳如有謗譽乎人者吾必徵其所自未敢以其言之多而舉且信之也其有及乎我者未敢以其言之多而榮且懼也苟不知我而謂我盜跖吾又安取懼焉苟不知我而謂我仲尼吾又安取榮焉知我者之善不善非吾果能明之也要必自善而已矣興王之臣多起汙賤人曰幸也亡主之臣多死寇盜人曰禍也豫咸宜之當兩漢氏之始屠販徒隸出以為公侯卿相無他焉彼固公侯卿相器也遭時之非是以詘獨其始之不幸非遭高光而以為幸也漢晉之末公侯卿相劫戮困餓伏牆壁間以死無他焉彼固劫戮困餓器也遭時之非是以出獨其始之幸非遭卓曜而後為禍也彼困於昏亂伏志氣屈身體以下奴虜平難澤物之德不施於人一得適其傃其進晚爾而人猶幸之彼伸於昏亂抗志氣肆身體以傲豪傑殘民興亂之伎行於天下一得適其傃其死後耳而人猶禍之悲夫豫是以咸宜之市之鬻鞭者人問之其賈直五十必曰五萬復之以五十則伏而笑以五百則小怒五千則大怒必以五萬而後可有富者子適市買鞭出五萬持以夸豫視其首則拳蹙而不遂視其握則蹇仄而不植其行水者一去一來不相承其節朽黑而無文材掐之滅爪而不得其所窮舉之翲然若揮虛焉豫曰子何取於是而不愛五萬曰吾愛其黃而澤且賈者云豫乃召僮爚湯以濯之則遫然枯蒼然白嚮之黃者梔也澤者蠟也富者不悅然猶持之三年後出東郊爭道長樂坂下馬相踶因大擊鞭折而為五六馬踶不已墜於地傷焉視其內則空空然其理若糞壤無所賴者今之梔其貌蠟其言以求賈技於朝者當其分則善一誤而過其分則喜當其分則反怒曰豫曷不至於公卿然而至焉者亦良多矣居無事雖過三年不為害當其有事驅之於陳力之列以御乎物以夫空空之內糞壤之理而以責其大擊之效惡有不折其用而獲墜傷之患者乎吏而商也汙吏之為商不若廉吏之商其為利也博汙吏以貨商資同惡與之為曹大率多減耗役傭工費舟車射時有得失取貨有苦良盜賊水火殺敓焚溺之為患幸而得利不能什一二身敗祿奪大者死次貶廢小者惡終不遂汙吏惡能商矣哉廉吏以行商不役傭工不費舟車無資同惡減耗時無得失貨無良苦盜賊不得殺敓水火不得焚溺利愈多名愈尊身富而家強子孫葆光是故廉吏之商博也苟修嚴潔白以理政由小吏得為縣由小縣得大縣由大縣得刺小州其利月益各倍其行不改又由小州得大州其利月益三之一其行又不改又由大州得廉一道其利月益之三倍不勝富矣苟其行又不改則其為得也夫可量哉雖赭山以為章涸海以為鹽未有利大能若是者然而舉世爭為貨商以故貶吏相逐於道百不能一遂人之知謀好邇富而近禍如此悲夫或曰君子謀道不謀富子見孟子之對宋牼乎何以利為也柳子曰君子有二道誠而明者不可教以利明而誠者利進而害退焉吾為是言為利而為之者設也或安而行之或利而行之及其成功一也吾哀夫沒於利者以亂人而自敗也姑設是庶由利之小大登進其志幸而不撓乎下以成其政交得其大利吾言不得已爾何暇從容若孟子乎孟子好道而無情其功緩以疏未若孔子之急民也東海若陸遊登孟諸之阿得二瓠焉刳而振其犀以嬉取海水雜糞壤蟯蛔而實之臭不可當也窒以密石舉而投之海逾時焉而過之曰是故棄糞耶其一徹聲而呼曰我大海也東海若呀然而笑曰怪矣今夫大海其東無東其西無西其北無北其南無南旦則浴日而出之夜則滔列星涵太陰揚陰火珠寶之光以為明其塵霾之雜不處也必泊之西澨故其大也深也潔也光明也無我若者今汝海之棄滴也而與糞壤同體臭朽之與曹蟯蛔之與居其狹咫也又冥暗若是而同之海不亦羞而可憐哉子欲之乎吾將為汝抉石破瓠蕩㣥穢於大荒之島而同子於向之所陳者可乎糞水泊然不悅曰我固同矣吾又何求於若吾之性也亦若是而已矣穢者自穢不足以害吾潔狹者自狹不足以害吾廣幽者自幽不足以害吾明而穢亦海也狹幽亦海也突然而往于然而來孰非海者子去矣無亂我其一聞若之言號而祈曰吾毒是久矣吾以為是固然不可異也今子告我以海之大又目我以故海之棄糞也吾愈急焉涌吾沫不足以發其窒旋吾波不足以穴瓠之腹也就能之窮歲月耳願若幸而哀我哉東海若乃抉石破瓠投之孟諸之陸蕩其穢於大荒之島而水復於海盡得向之所陳者焉而向之一者終與臭腐處而不變也今有為佛者二人同出於毗盧遮那之海而汨於五濁之糞而幽於三有之瓠而窒於無明之石而雜於十二類之蟯蛔人有問焉其一人曰我佛也毗盧遮那五濁三有無明十二類皆空也一也無善無惡無因無果無修無證無佛無衆生皆無焉吾何求也問者曰子之所言性也有事焉夫性與事一而二二而一者也子守而一定則大患者至矣其人曰子去矣無亂我其一人曰嘻吾毒之久矣吾盡吾力而不足以去無明窮吾智而不足以超三有離五濁而異夫十二類也就能之其大小劫之多不可知也若之何問者乃為陳西方之事使修念佛三昧一空有之説於是聖人憐之接而致之極樂之境而得以去㣥惡集萬行居聖者之地同佛知見矣向之一人者終與十二類同而不變也夫二人之相違也不若二瓠之水哉今不知去一而取一甚矣曰吾子來也以有餘而欲及人乎曰然若用子而能使竭忠孝乎曰否夫無忠而忠見無孝而孝聞曷若使不見而忠無聞而孝肅然已出熙然已及夫己也渾然矣乎
