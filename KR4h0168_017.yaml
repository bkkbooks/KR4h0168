front:
  text: 全唐文欽定全唐文卷十七中宗二
  hash: sha256:09a96e31b6b172cb32442a1f2cc9d8d5353caad5a79ecd84207b408f11a19039
body:
  text: 臨歧感愴深惻朕懷勉慎行鑣佇足還轡但正直之士為邪佞所憎慮有不逞之徒知卿在路無備因茲射險忽肆兇狂萬一損卿追悔無及縱加鼎鑊何補於卿朕心口為憂明發不寐今故遣千騎四人緩急任卿驅使日本國遠在海外遣使來朝既涉滄波兼獻方物其使真人莫問等宜以今月十六日於中書宴集勅昔有獻高寢禮遵於仲月將上原陵昏達於中夜所以銜悲罔極申敬如在鑒於前史抑有舊章朕以寡昧早罹酷罰屬遠安邇肅慶承於七廟霜來露往感積於四時頃迴斾洛師停輿京邑蓋非省風俗希先王徯后之言伏以瞻山園奉聖人因親之教有司巳具成命必行渭北衣冠預嚴於法駕陵東松柏傍蔭於清道先陳翼翼之詩後展蒸蒸之慕孟冬屆序計日數程義在因心不忘寢寐但以近郊井隧有時水旱賦於納秸未瞻圭田取彼盈箱曾徵寶稟而公卿常自獻書立議咸以為明察敬事撫臨愛育若萬乘不備其禮固非敬也百姓不勝其勞故非愛也況駿奔執豆夙夜於象居攀戀遺弓載勤於奉邑以眇身之兼願殊先志之恤隱是則乖於濟物咎必在予所不忍言諒非獲巳俯順衆情逾增遠思前以今年十一月二十日親謁乾陵者且停彼州往緣寇盜戶口凋殘委任失材乃令至此卿處事強濟遠邇寧靜築城務農利益巳廣木栝綏輯復業者多宜須政成安此黎庶況百姓又有表請不須來也朕叨居寶位惟新闡政再安宗社展恭禋之大禮降雷雨之鴻恩爰及緇黃兼申懲勸如聞天下諸道觀皆畫化胡成佛變相僧寺亦畫元元之形兩教尊容二俱不可勅到後限十日內並須除毀若故留仰當處官吏科違勅罪其化胡經累朝明勅禁斷近知在外仍頗流行自今後其諸部化胡經及諸記錄有化胡事並宜除削若有蓄者準勅科罪朕承天宰物光宅中區嗣祖宗之丕基承聖善之洪業嚮明負扆實奉成規往自永淳至於天授奸臣稱亂鼎運不安則天大聖皇后思顧託之隆審變通之數忘己濟物從權御宇四海繇其率順萬姓所以咸寧唐周之號暫殊社稷之祚斯永天保定爾實繇於茲朕所以撫璇璣握金鏡事惟繼體義即纉戎其若文叔之起舂陵少康之因陶正中興之號理異於茲宜革前非以歸事實自今巳後更不得言中興其天下大唐中興寺觀宜改為龍興寺觀諸如此例並即令改卿列霜忠在觸邪遂能不懼權豪便有彈射眷言稱職深領乃誠然楚客等大臣須存禮度朕識卿姓名知卿鯁直但守至公勿有迴避晝巡周衞夜警巖廊既曰爪牙實稱心腹左金吾衞大將軍成王千里聲高沛獻德邁二南以磐石之崇班當執金之重寄察奸無對討猾若神固以威動千廬勤宣五校近者衙仗之內輒有詐偽之人曾不斯須遽令擒獲能官之目久巳馳芳稱職之名從茲著號可賜衣一副兼賜物一百段朕以匪躬忝承丕業雖撫寧多失而平恕實專矧夫三聖重光元元統序豈忘老教偏意釋宗朕志款還淳情存去偽理乖事舛者雖在親而亦除義符名當者雖有怨而必錄頃以萬幾餘暇略尋三教之文至於道德二篇妙絕希夷之境天竺有空二諦理祕真如之談莫不敷暢元門闡揚至賾何假化胡之偽方盛老君之宗義有差違文無典故成佛則四人不同論弟子則多聞舛互尹喜既稱成佛巳甚憑虛復云化作阿難更成烏合鬼谷北郭之輩未踐中天舍利文殊之倫妄彰東土胡漢交雜年代亦乖履冰而說涅槃曾無典據蹈火而談妙法有類俳優誣詐自彰寧煩縷說經非老君所制毀之則匪曰孝虧文是鄙人所談除之則更彰先德來言雖切理實未安宜悉朕懷即斷來表朕嘗因暇景博覽前修帝籍皇圖略稽其迹至若二靈肇判三才聿興驪連栗陸之辰尊盧大庭之日時猶朴略未著圖書洎乎出震應期畫八卦而成象炎皇御歷播百穀以興農車服創於軒轅之朝歷象建於唐堯之代封建之事闕爾無聞自周漢巳來方崇藩屏至於三微更王五運迭興以古揆今事迹有爽比者別宗撫歷異姓興邦伏以則天大聖皇帝內輔外臨將五十載在朕躬則為慈母於士庶即是明君往者垂拱之中嗣皇臨政當此之際魯衞並存及乎全節興妖琅琊搆逆災連七國釁結三監既行大義之懷遂有泣誅之事周唐革命蓋為從權子姪封王國之常典卿等表云天授之際武家封建唐家藩屏豈得並封者至如千里一房不預逆謀還依姓李無改舊惠豈非善惡區分申明逆順矣今以聖上乖豫高枕怡神委政朕躬纂承丕緒昨者二月之首攸暨等屢請削封朕獨斷襟懷不依來請昔漢祖以布衣取天下猶封異姓為王況朕以累聖開基豈可削封外族㣥公等以天無二日土無二王抗表紫庭用申丹懇者然以賞罰之典經國大綱攸暨三思皆悉預告凶豎雖不親冒白刃而亦早獻丹誠今若卻除舊封更慮有功難勸學生在學各以長幼為序初入學皆行束脩之禮禮於師國子太學各絹三匹四門學絹二匹俊士及律書算學州縣各絹一匹皆有酒脯其束脩三分入博士二分助教又每年國子監所管學生國子監試州縣學生當州縣並選藝業優長者為試官監試皇帝問洛州滎陽縣令盧正道卿才行早著清白有聞夙夜在公課最居首使車昇獎朕甚嘉之今贈卿祿秩以襃善政勉勗終始無替嘉聲維神龍元年歲次乙巳五月己卯朔十五日癸巳皇帝若曰咨古者之命官也有德尊以爵有功尊以祿用能百揆時序庶績其凝詳其利建之跡也異姓則鬻熊封之於楚宗子則召奭宅之於燕惟皇作極率由前典咨爾銀青光祿大夫中書令監修國史漢陽郡王張柬之効祉星辰資靈川嶽負佐時之略有經邦之材以忠孝為己任以仁義為事業頃者巨猾未殄常思克清一朝奮臂二兇行翦竟燃臍於東市終掛膽於西州遂得聖祚中興皇運光啟乾坤再闢日月重明刑白馬而書功未足云答指青山之比礪曾何足酬是用命爾為特進漢陽郡王爾其靖共乃職咸允具瞻使厚秩尊官永全於長代春蘭秋菊無絕於終古往欽哉可不勉歟可不慎歟維神龍元年歲次乙巳六月己酉朔六日甲寅皇帝若曰咨德懋懋官功懋懋賞萬古常行之則千載不刊之典故五十一之啟漢三十一之中興或舉代趙如拾遺或取秦隴如偃草結丹青之誓莅白馬之盟祚土包茅與洪河而永固分珪錫社共天壤以俱隆緬考舊章率由此道爾中書令上柱國博陵郡王崔元暐夙負雄圖早懷英毅蘊公輔之量有王佐之才頃者元兇搆姦圖危社稷遂能懷忠抱義奮不顧身重國輕生意全王室艱難既濟國家永清勤亦至矣功亦大矣昔賞及於鬻熊聿封於楚功尊於臧綰乃建於燕異姓封王抑惟前典憲章故事庶載疇功是用命爾為博陵郡王用旌誠効宣其忠節松竹無渝往欽哉汝諧可不慎歟維神龍元年歲次乙巳六月己酉朔六日甲寅皇帝若曰咨夫母以子貴妻以夫榮聞諸通古列在方策惟爾博陵郡王崔元暐妻盧氏筮惟福允歸乃慶餘備嫺詩禮夙擅言辭斷織捐金道姆師之雅訓採蘋銘菊遵女史之明規向時王室艱難逆臣放命敬暉等忘家殉國翦暴除凶二曜重朗萬姓相歡爰命疇庸聿予茂賞大名隆器巳錫於所天徽號寵章宜覃於齊體今遣銀青光祿大夫行尚書右丞上柱國蘇王褱副使通議大夫守太常少卿韋叔夏持節賫冊於是命爾為博陵郡王妃爾其無違藩守務於和理而使家可長久聖人重之可不美歟敬之哉維景龍三年歲次己酉九月甲寅朔二十三日丙子應天神龍皇帝若曰昔孔某云歿魯哀由其作誄晏嬰既往齊景為之行哭且謂陪臣義由存此甫懷良相情則過之咨爾故尚書右僕射同中書門下三品監修國史上柱國鄭國公楊再思河嶽粹靈廟堂神器率由百行能具九德自弼諧庶績師長㣥寮清白所以樹風丹青所以成化有若巫咸之保乂傅說之欽承故能宣慈惠和邁跡垂憲而運同過隙悲深撫几興言軫悼載想謨猷發金縢之舊銘詢葬亳之前訓俾加印綬秩齊於子真式奉園陵志畢於元凱是用增寵命於端揆茂徽章於連帥今贈爾持節并州大都督遣太府少卿韋璿持節備禮冊命方使五公門閥二臣邱壠魂而有靈懿茲榮贈嗚呼哀哉維景龍四年歲次庚戌二月闕二字朔二十二日應天神龍皇帝若曰咨爾故開府儀同三司知軍國重事上柱國芮國公致仕豆盧欽望朕聞古之哲王必有賢佐其存也俾乂謂之奮庸其歿也不朽謂之立德可不然與爾十紀羽儀三朝冠冕專直為操非法不言溫謙在容非禮勿履故能揆路斯穆台階以平而韋賢罷歸䟽廣辭退致虛守靜方密道樞居常待終竟從冥錄是用輟朝增歔趨仰興懷榮以建旗正其服衮今贈司空并州大都督持節備禮冊命則二儀式奉九原可作冀爾魂魄嘉夫寵數嗚呼哀哉門下聞天地盈虛四時有消息之度皇王興替五運有遷革之期稱號斯殊驪騵亦異受明命者罔不由茲我大唐高祖神堯皇帝聖期首出天與神器有大功於區夏有大造於生靈太宗文武聖皇帝道則繼明業推搆極類商湯之起亳若姬發之承周彈壓九皇牢籠萬古高宗天皇大帝上聖御圖大明司契手調元氣心運洪鑪齊五緯而平太階應三神而登日觀網羅開闢包冠羲胥大猷備闡能事斯畢仙駕不追逆臣開釁敬業挺災於淮甸務挺潛應於沙場天柱將搖地維方撓非撥亂之神功不能定人之危矣則天大聖皇帝亶聰成德濬哲應期用初九之英謨開太一之宏略振玉鈐而殪封豕授金鉞而斬長鯨受河洛之圖書當昊羲之歷數惠育黎獻並登仁壽既而凝懷問道屬想無為以大寶為勞生遂復忝於明辟且有後命俾承先緒光啟大唐之圖用崇興復之基交際在辰情深感慰奉高祖之宗廟遵太宗之社稷不失舊物實在於茲業既惟新事宜更始可改大周為唐社稷宗廟陵寢郊祀禮樂行運旗幟服色天地等字臺閣官名一事巳上並依永淳巳前故事其神都依舊為東都北都依舊為并州大都督府永昌來庭兩縣並從廢省其百姓依舊分屬河南洛陽兩縣周朝宗廟陵寢及官宜令所司商量處分朕之遠系出自老君靈佑所資貽慶長久宜依舊上尊號為元元皇帝省司差使冊告天下村落佛堂並令開門灑掃不得因茲聚歛創加修葺庠序之規風教之首京都兩學尚且闕修欲令四方何以取則其京都學館及先聖廟堂所有破壞未營造者逐要修葺速令畢功不得浪有勞擾樂府之設國風所繫豈惟易俗抑且和神至若絲竹繁聲倡優雜伎深乖禮則並宜量事減省國之禮儀巳經改撰隨時逐變務在宏通宜令禮官重加詳審於行事有不便者即從損益制勅刪定處分巳久宜從易務速施行設官固須量才稱職比來委任稍亦乖方遂使鞫獄推囚不專法守撰文修史豈任祕書營造無取於將作勾勘罕從於比部多差別使又著判官在於本司便是曠位並須循名責實不得越守侵官皇家親屬籍沒者則天大聖皇帝雖巳溥暢鴻恩其先有任五品以上官枉遭陷害者並宜改葬式遵典禮若有後嗣還其資蔭其別勅安置并左貶者亦復其屬籍量還官爵仍遣諸流移人除犯贓賄及畜蠱毒造偽避讎反逆緣坐勘會不免者餘並放還天下軍鎮不要者多轉輸艱辛府庫虛耗事須改弊不可循常宜簡內外官人有才識者分遣充使巡邊按覆須留鎮遏及應減一事以上並委使人共所管詳度還日具利害聞奏其應支兵先取當土及側近人仍隨地配割分州定數年滿差替各出本州永為格例不得踰越五品以上致仕曾伏事先朝者賜爵一級曾任州府幕府及任洛州牧日官人並勘責奏聞經任東宮官僚見任六品官計階應入五品者特宜不拘年限餘依常例三衞細引主帥直司行署番官七絕等通前各減二年勞考滿者各加勳一轉合得官者稍與處分中書門下官人計階考入五品者優量令史番官準羽林例處分分直省及外司官與二十二日誅賊之時緣祗承在中書省者各賜勳一轉諸司有品直司宜加一階無品直司賜勳一轉禮官緣即位修執儀注者各賜物二十段正月當番三衞監門等於武成衙內明福門外南衙及諸門者賜物十段左右羽林及東宮北門廚供膳及匠準例各賜物二十段正月量追三衞細引監門細引直長飛騎雜技飛騎各賜物十段東宮北門官及三衞細引監門直長各賜物二十段仍類例功夫多少奏聞其引玉冊及轝冊讀冊等官人各賜物五十段授冊使人賜物一百段書冊人各賜物十段其轝腰轝官人賜物二十段飛騎各賜物十五段其轝香蹬三衞及轝寶人各賜物二十段頃者戶口逃亡良田差科繁劇非軍國切要者並量事停減若要和市和雇先依時價付錢自非省支勒索不得輒有進送諸貢物皆須任土當處無者不得別求仍於常數每事量減緣百姓閒所有不穩便者並委府州具狀奏聞朕當親覽即為釐革天下百姓並免今年租及地稅自今以後租庸準符配定更不須徵折脚價錢其巳前未徵得者亦即免放天下宗姓並準舊式房州百姓宜給復三年其諸司官員并雜色役掌幕士門役之徒兼音聲人丁匠等非灼然要籍並量事減省所司速為條制廄馬數多皆須秣飼食人之粟日費滋深殿中諸閑廄馬量支留以外抽送外州馬坊及本監牧其東宮諸王公主等馬應官供者亦令隨事減省奢淫伎巧實為蠧弊皆因節日宗屬婚親王公妃主競相賀遺或造珍麗妄為進奉錦綵異飾雕鏤奇文假撰樓臺偽裝禽獸諸如此類深是害時宜明勅格嚴加禁斷衣服采章一準令式夫鄒纓齊服尚且變俗移風朕率先百僚必期化成兆庶東都正月當上番兵年至五十五即放出前赦及今制處分有不盡者並令所司類例續奏布告遐邇咸使知聞主者施行竊聞星迴日薄懸象著明之謂天龍躍鳳翔握鏡乘時之謂聖天以不言為德非言無以暢其神聖以無名會道佇名然後筌其用營窟橧巢之代猶昧典章如雲類海之君方崇號諡所以闡揚功美榮鏡古今伏惟大行皇帝稟樞電以降靈應星虹而延睿以大聖而乘聖克昌寶歷之基由至德而纂德載廣金圖之運對日之歲窮象外之微言弄田之辰盡天下之能事逮入膺儲副養德春闈恒侍禁中問安之道斯極長居膝下色之誠逾勵因心隆於愛敬率性感於神明此先聖之孝德也洎乎正位旒扆光宅區縣孚俗軫如傷之念負重懷若厲之心求瘼恤隱寒扇渴漿追夏禹之焚甲襲殷湯之解網一物有違則滿堂興慮一夫弗獲則推溝寘懷此先聖之仁德也無幽不察觀六合於目前無遠不昭視八紘於掌內循機授政則旁燭於九圍命將出師則坐知其萬里此先聖之明德也寅畏上元肅雍清廟以義制事以禮制心提衡均馭朽之危履石同蹈冰之懼雖處泰乘闕休而勿休此先聖之恭德也卑宮菲食土簋茅檐身好弋綈之衣手無金玉之玩翬裘必燼䍧袂安撤闕士星疑莫施劫於影而勿馭此先聖之廣德也榮河綠錯授宸鑑而生知溫洛丹清澡璇襟於性奧汾水秋風之唱仰天翰而扶輪媯汭叢雲之歌欽睿詞而擁篲此先聖之文德也以德敷化無遠而不懷以我伐戎有征而必伏提封所亘拓地位於鄒瀛正朔所通闢境踰於亥步此先聖之威德也闕為於無事鳴鑾訪道敬拜小童之言修道就闕載感大庭之夢此先聖之元德也體至道而調一氣舒卷陰陽運沖和而契兩儀發揮風雨將百靈以交際與萬物而通誠珍瑞普彰休徵畢應此先聖之神德也以茲九德上則九元顧連陸於後塵掩胥燧而高視若乃茂育㣥方之惠財受貺於元符封嶽沒疑金復推功於文疑帝巍巍蕩蕩無得而名方冀千祥翊聖萬瑞讃德長居北極之尊永契南山之壽豈謂十枝墜景遽淪懸晷之輝八柱傾天奄落闓陽之構雲輿在御仙路方遙攀號無再奉之期摧殞深百年之痛鼎湖弓劒逾增日遠之悲璇寢衣冠空愴月遊之感顧以虛菲夙承乾蔭既忝彰明之地常懷輔佐之誠薦螢燭以助光引鶴露而添海而聖心虛受無來不應每聽覽餘暇侍奉誥言論道德則洞啟元樞語忠孝則廣通心極敘軒頊之淳化積若神交述堯禹之清風宛成晤對在位三十五載功超七十二君傳象所莫傳開闢所不覩罄楚越之竹書善未窮極泉雲之才頌德難盡自賢猷疑厭俗緹律亟移禍變相仍荒梗彌切正惟憑几之夕爰及啟廞之際神情湛正顧託殷勤痛道範之既遠懼先聖之無述所以偷延荒息強終彞倫望霄漢以興摧瞻扆筵而永慕今者龜謀既襲蛩將臨敬上尊號之儀燕叶大名之典謹按自然覆育曰天明一合道曰皇無所不包曰大謹狀上議曰天皇大帝廟稱高宗昨奉嘉命廣開正路翳巳燔矣褶亦去焉師傅之言實獲我心皇帝敬問突厥可汗使人他滿達干至所言堅昆使來及吐蕃使不願入漢並奚契丹等俱知之朕於西夷亦信而巳來無所拒去無所留可汗好心遠申委曲深知厚意今附銀胡瓶盤及雜綵七十匹至可領取朕請安秀二師宮中供養萬幾之暇每究一乘二師並推讓云南方有能禪師密受忍大師衣法可就彼問今遣內侍薛馳詔迎請願師慈念速赴上京蓋聞蒼蒼者天列星辰而著象茫茫者地奠川嶽以成形仰觀天文既如彼也俯循地理又若斯焉夫以妙旨幽微名言之路攸絕真如湛寂性相之義都捐然則發啟心聾資法雷之激響獎導迷衆俟覺首以司方故知假名不壞於常名樂說乃詮於無說至若象外之象獨稱三界之尊天中之天爰著六通之聖法王利見孕育於七十二君梵帝乘時牢籠於萬八千歲周星閱彩言符誕降之徵漢日流祥載叶通神之夢故能威揚沙劫化彼塵區玉毫舒耀而除昏金口宏宣而遣滯破煩惱之賊詎藉干戈壞生死之軍惟憑慧力闢圓明之界廣納於無邊開常樂之門普該於有識縱使浮天欲浪境風息而俄澄漲日情塵法雨霑而便廓歸依者銷殃而致福迴向者去危而獲安可謂巍巍乎其有成功蕩蕩乎而無能名者矣但四生蠢蠢未悟無常六趣悠悠俱纏有結詎知空華不實水月非堅馳逐於五陰之中播遷於三界之域納諸品彙終俟法門自白馬西來元言東被世尊則隨類敷演衆生乃逐性開迷馬鳴擅美於瓊編龍樹騰芳於寶偈於是遙通震旦遠布閻浮半滿之教區分大小之乘並騖澄安俊德接武於勝場琳遠高人駢蹤於法宇遂使微言著範歷千古而暢英聲至賾流規周十方而騰茂實頃屬後周膺運大扇魔風遂使天下招提咸從毀廢寰中法侶並混編甿嗟乎閴寂禪居空留宴坐之處荒涼慧苑無復經行之蹤爰洎開皇重將修建旋逢大業又遇分崩鬼哭神吟山鳴海沸既遭塗炭寧有伽藍正法消淪邪魔增長於是人迷覺路邅迴於苦集之區俗蔽真宗羈絆於蓋纏之內我大唐之有天下也上淩巢燧俯視羲軒三聖重光萬邦一統威加有截澤被無垠掩坤絡以還淳亘乾維而獻款再懸佛日重補梵天龍宮將八柱齊安鷲嶺共五峯爭峻大宏釋教諒屬皇朝者焉大福先寺翻經三藏法師義淨者范陽人也俗姓張氏五代相韓之後三台仕晉之前朱紫分輝貂蟬合彩高祖為東齊郡守仁風遠扇甘雨隨車化闡六條政行十部爰祖及父俱厭俗榮放曠一邱逍遙三徑含和體素養志恬神摘芝秀於東山挹清流於南㵎可謂尋幽丹嶠棲偃白雲皐鶴於是吞聲場駒以之縶影法師幼挺明悟夙彰聰敏纔踰辯李之歲心樂出家甫過遊洛之年志尋西國業該經史學洞古今總三藏之元樞明一乘之奧義既而閒居習靜息慮安禪託彼山林遠茲塵累三十有七方遂雅懷以咸亨二年行至廣府發蹤結契數乃十人鼓櫂昇航惟存一己巡南溟以遐逝指西域以長驅歷巖岫之千重淩波濤之萬里漸屆天竺次至王城佛說法華靈峯尚在如來成道聖躅仍留吠奢城中獻蓋之跡不泯給孤園內布金之地猶存三道寶階居然目覩八大靈塔邈矣親觀所經三十餘國凡歷二十餘載菩提樹下屢攀折以淹留阿耨池邊幾濯纓而藻鑑法師慈悲作室忍辱為衣長齋則一食自資長坐則六時無倦又古來翻譯之著莫不先出梵文後資漢譯摭詞方憑於學者銓義別稟於僧徒今茲法師不如是矣既閑五天竺語又詳二諦幽宗譯義綴文咸由於己出措詞定理匪假於旁求超漢代之摩騰跨秦年之羅什所將梵本經僅四百部合五十萬頌金剛座真容一鋪舍利三百粒以證聖元年夏五月方屆都焉則天大聖皇帝出震膺期乘乾握紀紹隆為務宏濟為心爰命百寮兼整四衆虹幡彗日鳳吹遏雲香散六銖華飄五色鏘鏘濟濟煒煒煌煌迎於上東之門置於授記之寺共于闐三藏及大福先寺主沙門復禮西崇福寺主法藏等翻華嚴經後至大福先寺與天竺三藏寶思未多及授記寺主惠表沙門勝莊慈訓等譯根本部律其大德等莫不四禪凝慮六度冥懷懸法鏡於心臺朗戒珠於性海詞林挺秀將覺樹而聯芳慧炬揚輝澄桂輪而合影渾金璞玉諒屬其人誠梵宇之棟梁實法門之龍象巳翻諸雜經律二百餘卷繕寫云畢尋並進內其餘戒律諸論方俟後詮五篇之教俱明八法之因備曉鵝珠尚護蟲命無傷浮囊必取於不虧油鉢終期於靡覆崇聖教之紀綱啟含生之耳目伏願上資先聖長隆七廟之基下逮微躬恒佐九天之命遷懷生於壽域致薄俗於淳源歲稔時和遠安邇肅顧以萬幾務總四海事殷爰憑乙夜之餘式賛彌天之德課虛扣寂聊題序云粵以景龍三年賓鴻九月乘紫機之餘暇歷翠籞以寅遊爾乃氣肅商郊風驚兌野波收元灞澄霽色於林塘雲歛黃山藹晴暉於原隰銜蘆送響疑傳蘇武之書化草翻光似臨車允之帙於時詔懿戚命朝賢屬重陽之吉辰呈九皐之嘉瑞萸房薦馥辟邪之術爰彰菊蘂含芬延年之驩攸著人以酒屬喜見覆於金杯文在茲乎盍各飛於玉藻淵明抱菊且浮九醞之觀畢卓持螯須盡一生之興人題四韻同賦五言其最後成罰之引滿戒珠皎潔慧流清淨身局五篇心融八定學綜真典觀通實性維持法務綱統僧政律藏異兮傳芳象教因乎光盛宿植明因專求正真庵園晦迹蓮界分身闡揚釋教拯濟迷津常流一雨恒淨六塵辨圃方開言泉廣濬護持忍辱勤修精進講集天華微符地震運斯法力殄茲魔陣爰標十觀用契四禪普斷煩惱遐袪蓋纏心源鑒徹法鏡澂懸慧筏周運慈燈永傳名紫宸聲流紺域梵衆綱紀僧徒楷則鎮洽四生曾無懈息播美三千傳芳百億
