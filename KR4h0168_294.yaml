front:
  text: 全唐文欽定全唐文卷二百九十四無量字宏度杭州鹽官人擢明經第纍除國子司業兼修文館學士元宗即位遷左散騎常侍兼國子祭酒封舒國公為麗正殿直學士開元八年卒年七十五贈禮部尚書諡曰文
