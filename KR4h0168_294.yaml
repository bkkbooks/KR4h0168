body:
  text: 臣聞尚書洪範傳云王者陰盛陽微則先祖見其變昔成湯遇旱引事自責云女謁盛耶今則太廟毀壞即是先祖示變後宮衆多即是陰盛陽微伏請後宮之中非所幸者親享之後出少多以應其變則上答先祖必災異自消昔殷帝武丁祭成湯有飛雉升鼎耳而雊武丁憂懼問其臣祖乙祖乙曰王勿憂先修政事武丁乃修政行德殷道復興昔太戊之時桑穀二木共生於朝一暮大拱此不恭之罰也太戊修德桑穀自清昔周武王之時周公輔政三叔流言秋熟未穫天大雷電以風禾則盡偃大木斯拔邦人大恐王乃與大夫盡出郊天乃返風禾則盡起歲則大熟昔宋景公之時熒惑守心景公問之司星子韋對曰禍在君可移於相公曰宰相所與共理國也曰移於人公曰人死誰為君曰移於歲公曰乏食人必死子韋曰天處高而聽卑君有至德之言三必三賞熒惑果徙三舍至漢之文景並睿明天子也亦災異繼起修德行政其名益光愚又竊聞左右近臣妄奏云國家太廟其材木是苻堅時舊殿臣按括地志云隋文帝創立新都移宇文廟故殿改造此廟元非苻堅及宇文氏所作也況我國家及隋文帝貴為天子富有四海豈復遞取苻堅之舊殿以充太廟者乎此則言僞而辨殊不足採納伏願精選舉用賢良節奢靡輕賦稅繼絶代慎刑罰納諫諍察諂諛夫賢良任用則能興化臻理矣節奢靡則不恣耳目之欲清靜之風行矣輕賦稅則下人樂以奉上不困窮矣繼絶代則崇德報功有勸沮矣慎刑罰則寬猛相濟不濫罰矣納諫諍則日聞巳過人竭忠矣察諂諛則君子道長無邪僻矣非禮勿動順時行令夫如是則人和人和則氣和氣和則天地和矣天地和會災異自消伏願陛下虔奉神心兢謹天誡幸甚臣謹詳諸史氏案以禮經有親親之義尊尊之道所以重王室敬耆年今陛下纘舊惟新睦親尚齒朝儀品列宜更申明至若命以嗣王用崇主祭養夫國老蓋在乞言會於朝班合從上列準令嗣王正一品今乃居庶官之次頗為閒雜須有甄明臣伏見開府儀同三司在三品前立望請嗣王亦與開府同行諸致仕官各於本司之上則重親尚齒典禮式存昔虞舜之狩秩山川遍㣥神漢孝景祠黃帝橋山孝武祠舜九疑高祖過魏祭信陵君墓過趙封樂毅後孝章祠桓談冢願陛下所過名山大川邱陵墳衍古帝王賢臣在祀典者並詔致祭自古受命之君必興滅繼絶崇德報功故存人之國大於救人之災立人之後重於封人之墓願到東都收敘唐初逮今功臣系絶者雖在支庶咸得承襲夫郊祀者帝王之盛事國家之大禮行其禮者不可以臆斷不可以情求皆上順天心下符人事欽若稽古率由舊章然後可以交神明可以膺福祐然禮文雖衆莫如周禮周禮者周公致太平之書先聖極由衷之典法天地而行教化辨方位而敘人倫其義可以幽贊神明其文可以經緯邦國備物致用其可忽乎至如冬至圜丘祭中最大皇后內主禮位甚尊若合郊天助祭則當具著禮典今遍檢周官無此儀制蓋由祭天南郊不以地配惟將始祖為主不以祖妣配天故惟皇帝親行其禮皇后不合預也謹案大宗伯職云若王不與祭祀則攝位注云王有故代行其祭事下文云凡大祭祀王后不與則攝而薦豆籩徹若皇后合助祭承此下文則當云若不祭祀則攝而薦豆籩今於文上更起凡則是別生餘事夫事與上異則別起凡凡者生上起下之名不專繫於本職周禮一部之內此例極多在文中不可具録又皇后助祭親薦豆籩而不徹案九嬪職云凡祭祀贊后薦徹豆籩注云后進之而不徹則知中徹者為宗伯生文若宗伯攝祭則宗伯親徹不別使人又案外宗掌宗廟之祀王后不與則贊宗伯此之一文與上相證何以明之案外宗惟掌宗廟祭祀不掌郊天足明此文是宗廟祭也又案王后行事總在內宰職中檢其職文惟曰大祭祀后裸獻則贊瑤爵亦如之鄭注云謂祭宗廟也注所以知者以文云祼獻祭天無祼所以得知又祭天之器則用陶匏亦無瑤爵注以此得知是宗廟也又內司服掌王后六服無祭天之服而巾車職掌王后之五輅亦無后祭天之輅祭天七獻無后亞獻以此諸文參之故知后不合助祭天也惟漢書郊祀志則有天地合祭皇后預享之事此則西漢末代強臣擅朝悖亂彞倫黷神諂祭不經之典事涉誣神故易傳曰誣神者殃及三代泰誓曰正稽古立功立事可以永年丕天之大律斯史策之良誡豈可不知今南郊禮儀事不稽古忝守經術不敢默然請旁詢碩儒俯托舊典採曲臺之故事行圜丘之正儀使聖朝叶昭曠之塗天下知文物之盛豈不幸甚謹議泠然開元五年進士官校書郎梁潁多士聞來久矣出伊洛以南遊登嵩峴以顧視信乎精華實息恢怪森起惟萬戶與千門咸帶山而傍水畿甸殷壯閭閻密邇當天象之西郊近皇居之百里其人和而賢俊其地厚而淳美則吾先文王行化之始烈祖成王定鼎於此宜乎蕃我良能誕生君子世序雖遠英靈不窮其氣渾渾其光雄雄橫古今而特秀者惟我辥公卜幽棲於汝北夷舊業於河東夫其禮樂成器清明在躬官非稱才吾不謂之仕宦人非克已吾不謂之交通處未全隱和而莫同且欲墀岞崿苑蒙籠閒亭一所修竹一叢蕭然物外樂自其中其竹也初栽尚少未長仍小雜以喬木環為曲沼遵遠水以澆浸編長欄而護繞向日森森當風嫋嫋徑節迷其寒燠繁枝失其昏曉疏莖歷歷傍見人交葉重重上聞鳥其亭也溪左巖右川空地平材非難得功則易成一門四柱石礎松櫺泥含淑氣瓦覆苔青才容小榻更設短屏後陳酒器前開藥經辥公謂豫曰自造此亭未有茲客跪而應曰自從為客未見此亭既而物且遍好多能所造亭間坐臥清戶開而向林門下往來翠陰合而無草禁行路使勿伐命家僮使數掃遊子見而忘歸居人對而遺老余何為者纍載棲遑學應成癖走則非狂宇宙至寬顧立錐而無地公卿未識久彈鋏而辭鄉一見竹亭之美竟嗟歎而成章梁王既受封於漢命駕東遊入睢陽之下國弔微子之高邱榮華莫比僭擬無休復欲象昆明之校戰同右武之習流決河間而飲馬治宮樹以維舟當時舊跡此地爰修土木間成起臺宮而似畫絲金並奏和水石而疑秋是時宮人出看上客淹留既成此地勝形無比喬樹青冥而外合層甍岌嶪而斜指曉坐狎鷗春祠薦鮪連小山而夾回磴截長河而分半水徒觀其清泠無點洞徹如凝鏡開珠淨月滉星澄鳬嚼紅藻龜翻碧菱地將昏而霧合天欲雨而雲蒸明則可鑒虛而不竭風靜浪碎日落圓折波含閣而相動潭映空而俱徹此土之池君王所為年深則峴山陵變水浹則滄海塵吹不見射魚之浦空餘養雁之陂皇家化溢成周包含梁宋分星辰以主萬國會江漢而歸一統惟茲之地清而且平居下流而不濁含上善而逾明常以柔而處順豈遺道而從榮時人競渡搖海艦於三春暮客來投落江帆於四岸何今日之登陟皆昔年之池館物是人非所存者半濟巨川必待舟楫得風流還升汗漫儻餘波而可霑幸不遺於所觀國之天府名曰河南水有清洛漲乎新潭夫其貫都成川習坎為德石門呀豁而洞瀉緑樹逶迤而夾植源自山來漕因人力或清淺而見底或深沈而莫測奔狹口以雷聲積中心而黛色若乃方將暮春大集都人錦筵橫石羅幕藉塵騎影攢臨變作桃花之浪衣香亂入翻為蓮葉之津由其地勢多美所以潭名永新觀其城闕映帶閭閻縈繞半向石崇之園斜經潘嶽之沼星月沈浮乎其內烟雲洗沸乎其表不生芰荷但聚魚鳥通舳艫之利於國既多開浸灌之功與人非少自記從調恆來此遊朝林坐而疑夕夏潭行而覺秋清可照人實欣逢於朗鏡虛宜受物佇相引於仙舟帶洛常恥臨淄更羞況獲忝乎餘派終敢希乎下流嘗聞神心保正天道害盈漏巵添而復出欹器備而還傾豈若茲水居然可名既混之而不濁又澄之而不清時止則止時行則行峻隄防則其源見塞開汲引則其道能亨安波不動與物無爭如方圓之得性何寵辱之能驚故為國者取象於止水使其政公平為身者亦同於止水使其心至明至察可尚柔謙何稟思遠道則一葦能杭守貧居則一瓢可飲接下流則卑以自牧鑒㣥物則寬而能審誠用之而舍之在去泰而去甚水之為德也長水之為功也衆散作雲雨畜作潭洞浮芥則傲吏措杯種則幽人抱甕無朝夕之出納有飛沈之狎弄徒觀其深虛見底咫尺宜探千流並入萬象皆涵搖樹影於青岸落山光於碧潭其仁可以濟物其義可以激貪既而壅之不流蒙則未決照春物而畫屏相似映晴空而明鏡無別雨來而圓點亂生風靜而長波自滅任天時以開閉隨王澤而盈絶受涓滴而逾深處冰壺而更徹書云視水積影能見形容視人行事能知吉凶政煩則人擾水濁則魚喁夫子欲精神而不惑俾榮利無繫於心胸比浮雲之於我觀止水而為容兀兮若枯木坐忘淡兮若虛舟見逢正道未遠斯言可從儻不遺於射鮒希有便於登龍觀乎皎皎新月含虛驚闕伺海蛤而齊生候階蓂而俱發既與物而盈偃亦隨時而興歇故其清光未滿斜輪半空依稀破鏡髣佛懸弓離畢墜雨繞暈生風散微華於粉壁集輕照於蘭叢爾其於狀也皎皎的的鏡丹霄而灼爍鮮鮮帛丿糸帛丿糸點清漢而連娟逢輕雲而暫蔽雜華星而共妍寫邊城之羈目監珠箔之嬌絃思閨女之披幌弄舟人於叩舷若乃斷山風入中天氣清雲徹暮景霞開晚晴望頽陽之西落見微月之孤生出煙郊而漫漫映江浦之亭亭凝碧臺以光淨度青樓以色明雖豫情之斯得停搴攬而不盈俄而涼夜未幾低輪半傾墜斜光於森木落餘照於嚴城臨玉墀而不見望亭閣而杳冥豫亦何為者感在空庭飲食安樂兮不易明說君子行之兮斯道不闕英髦俊彥兮攢轡結轍華堂洞開兮綺饌齊列雖珍膳芳鮮而蘇山奇絶原其所營妙實難名味兼金房之蜜勢盡美人之情素手淋瀝而象起元冬涸沍而體成足同夫露結霜凝不異乎水積冰生盤根趾於一器擬崖崿於四明厥狀相類高深殊致或峻或危其勢參差隱映陸離疑雪岫之坐窺乍輝乍煥其色璀璨灼爍皓旰與玉臺兮相亂縱天台揭起而陵霞太華削成而浸漢雖萬仞之奇特非四座之榮觀豈若茲山俎豆之間綵樹而形綺雜紅花而色斑吮其味則峰巒入口玩其象則瓊瑤在顏隨玉箸而必進非固非吝觸皓齒而便消是津是潤儻君子之留賞甘捐軀而自徇律呂之本今古攸尚周行殷歷孔子於是興嗟漢襲秦正劉歆以之條奏莫不考於經傳稽之氣象惟彼歷生稱明算法理須銅壺曉唱則聽雞鳴玉斗夜回方看蟻轉何得輕於杪忽失以毫釐裨竈多言豈知天道羲和廢職幾亂人時遂令太史罷占疇人廢業陸佐公之漏刻莫見新成張平子之渾儀但聞虛設既失推蓂之典何逃置棘之刑使臣巡方天子錫命有能利國無待受辭況詩著考槃易稱嘉遁清高勵俗義道周身致為舉先可以師者御史歲觀風物夜動星芒路出河東載馳驄馬地疑河上便遇真人將觀善以懲違遂薦賢而報國逢萌既違威辟莫辨東西法真不以禮迎何能進退由是黃金見鑠白玉成瑕雖莊周道心以枯槁非本而子貢利口乃渾沌假修人既無情罵叔文而稱矯州寧妄罪鞭寧越以成威先王訓俗禁以窺臨君子執身慎乎登降惟甲才非入室教異垂堂既處隘而乘閒爰興高而眺遠平看雉堞回數人家遍識山川周知國邑殊鄭君之伺敵忽上層埤同漢后之思鄉且瞻長路行未聞於能賦告將惑於妖言不指不呼孰云知禮從輕從重旋欲議刑向若甲是卑流恭隨長者承所視而待問事緣情而可矜今者攀陟不宜驚疑於衆護非有失雖云李徑無言故犯難容亦可棘司懲訓嚴城作限緩獄何逃罪自招於指揮理宜退於心伏將仕郎守太子校書郎王泠然謹再拜上書相國燕公閣下孔子曰居是邦也事其大夫之賢者則僕所以有意上書於公為日久矣所恨公初為相而僕始總角公再為相僕方志學及僕預鄉舉公在官於巴邱及僕參常調而公統軍於沙朔今公復為相隨駕在秦僕適效官分司在洛竟未識賈誼之面執相如之手則堯舜禹湯之正道稷契夔龍之要務焉得與相公論之乎昔者公之有文章時豈不欲文章者見之乎公未富貴時豈不欲富貴者用之乎今公貴稱當朝文稱命代見天下未富貴有文章之士不知公何以用之公一登甲科三至宰相是因文章之得用於今亦三十年後進之士公勿謂其無人何者長安令裴耀卿於開元五年掌天下舉擢僕高第以才相知今尚書右丞王邱於開元九年掌天下選授僕清資以智見許然二君者若無明鑒寧處要津是僕亦有文章思公見也亦未富貴思公用也此非自媒自衒恐不道不知有唐以來無數才子至於崔融李嶠宋之問沈佺期富嘉謀徐彥伯杜審言陳子昂者與公連飛並驅更唱迭和此數公者真可謂五百年挺生矣天喪斯文凋零向盡唯相公日新厥德長守富貴甚善甚善是知天贊明主而福相公當此之時亦宜應天之庥報主之寵彌縫其闕匡救其災若尸祿備員則焉用彼相矣僕聞位稱燮理者則道合陰陽四時不愆則百姓無怨豈有冬初不雪春盡不雨麥苗繼日而青死桑葉未秋而黃落蠢蠢迷愚嗷嗷愁怨而相公溫服甲第飽食廟堂僕則天地之一生人亦同人而怨相公也京房易傳曰欲德不用茲謂張言人君欲賢者而不用徒張此意厥災荒云大旱也陰陽不雨復曰師出過時茲謂曠其旱不生夫天道遠人道邇僕多言者也安知天道請以人事言之主上開張翰林引納才子公以傲物而富貴驕人為相以來竟不能進一善拔一賢漢高祖云當今之賢士豈獨異於古人乎有而不知是彰相公之暗知而不用是彰相公之短故自十月不雨至於五月雲才積而便散雨垂落而復收此欲德不用之罰也仍聞六胡為孽日寇邊陲邦家連兵來往塞下已西諸將必不出師過時之咎也四郊多壘卿大夫之辱也不知廟堂肉食者何以謀之相公在外十餘年而復相國險阻艱難備嘗之矣民之情僞盡知之矣今人室如懸磬野無青草何恃而不恐天則不雨公將若之何昨五月有恩百官受賜公官既大物亦多有金銀器及錦衣等聞公受之面有喜色今歲大旱黎人阻飢公何不固辭金銀請賑倉廩懷寶衣錦於相公安乎百姓餓欲死公何不舉賢自代讓位請歸公三為相而天下之人皆以公為亢極矣夫物極則反人盛必衰日中則昃月滿則虧老子曰功成名遂則身退天之道也今公富貴功成文章命遂唯身未退耳相公昔在南中自為嶽陽集有送別詩云誰念三千里江潭一老翁則知虞卿非窮愁不能著書以自寬賈誼非流竄不能作賦以自安公當此時思欲生入京華歸老田里脫身瘴癘其可得乎今則不然忘往日之栖遲貪暮年之富貴僕恐前途更失後悔難追主上以相公為賢使佐社稷若廾德不讓是廢明君之舉豈曰能賢僕見相公事方急不可默諸桃李公聞人之言或中猶可收以桑榆詩曰投我以木報之以瓊琚此言雖小可以喻大相公五君詠曰淒涼丞相府餘慶在元成蘇公一聞此詩移相公於荊府積漸至相由蘇得也今蘇屈益部公坐廟堂投木報瓊義將安在亦可舉蘇以自代然後為朔方之行抑又聞屋漏在上知之在下報國之重莫若進賢去年赦書云草澤卑位之閒恐遺賢俊宜令兵部即作牒目徵名奏聞而吏部起請云試日等第全下者舉主量加貶削條目一行僕知天下父不舉子兄不舉弟向者百司諸州長官皆無才能之輩並是全軀保妻子之徒一入朝廷即恐出暫居州郡即思改豈有輕為薦舉以取貶削今聞天下尚有四百人應舉相公豈與四百人盡及第乎既有第差由此百司諸州長官懼貶削而不舉者多矣僕竊謂今之得舉者不以親則以勢不以賄則以交未必能鳴鼓四科而裹糧三道其不得舉者無媒無黨有行有才處卑位之閒仄陋之下吞聲飲氣何足算哉何乃天子令有司舉之而相公令有司拒之則所謂欲德不用徒張此意事與京房易傳同故天以大旱相試也去年所舉縣令吏部一例與官舉若得人天何不雨賢俊之舉楚既失之縣令之舉齊亦未得夫有賢明宰相尚不能燮理陰陽而令庸下宰君豈能輯熙風化相公必欲選良宰莫若舉前倉部員外郎吳太元為洛陽令必欲舉御史中丞莫若舉襄州刺史吳靳清輦轂之路非太元不可任臺閣之風非吳靳不可僕非吳靳親友但以知其賢明相公有而不知知而不用亦其過深矣抑又聞之昔閔子騫為政曰仍舊貫如之何何必改作凡校書正字一例不得入畿相公曾為此職見貞觀以來故事今吏部侍郎楊滔目不識字心不好賢蕪穢我清司改張我舊貫去年冬奏請自今巳後官無內外一例不得入畿即知正字校書不如十鄉縣尉明經進士不如三衛出身相公復此改張甄別安在古人有坐釣登相立籌封侯今僕無尚父之謀辥公之策徒以仕於書苑生於學門小道逢時大言祈相僕也幸甚幸甚去冬有詩贈公愛子協律其詩有句云官微思倚玉文淺怯投珠呂氏春秋云嘗一臠之肉知一鼎之味請公且看此十字則知僕曾吟五言則亦更有舊文願呈作者如公之用人蓋已多矣僕之思用其來久矣拾遺補闕寧有種乎僕雖不佞亦相公一株桃李也此書上論不雨陰陽乖度中願相公進賢為務下論僕身求用之路事繁而言不典理切而語多忤其善也必為執事所哂其惡也必為執事所怒儻哂既怒罷方解則僕當持舊文章而再拜來也僕之怪君甚久矣不憶往日任宋城縣尉乎僕稍善文章每蒙提獎勤勤見遇又以齊氓叨承恩顧銘心在骨復聞升進不出臺省當為風流可望故舊不遺近者伏承皇皇者華出使江外路次於宋依然舊遊門生故人動有十輩蒙問及者衆矣未嘗言泠然明公縱欲高心不垂半面豈不畏天下窺公侯之淺深與著緑袍乘驄馬蹌蹌正色誰敢直言僕所以數日伺君望塵而拜有不平事欲圖於君莫厭多言而彰公短也先天年中僕雖幼小未間聲律輒參舉選公既明試量擬點額僕之枉落豈肯緘口是則公之激僕僕豈不知公之辱僕僕終不忘其故亦上一紙書蒙數遍讀重相摩獎道有性靈云某來掌試仰取一名於是逡巡受命匍匐而歸一年在長安一年在洛下一年坐家園去年冬十月得送今年春三月及第往者雖蒙公不送今日亦自致青雲天下進士有數自河以北唯僕而巳光華藉甚不是不知君須稍垂後恩雪僕前恥若不然僕之方寸別有所施何者故舊相逢今日之謂也僕困窮如君之往昔君之未遇似僕之今朝因斯而言相去何遠君是御史僕是詞人雖貴賤之閒與君隔而文章之道亦謂同聲而不可以富貴驕人亦不可以禮義見隔且僕家貧親老常少供養兄弟未有官資嗷嗷環堵菜色相看貧而賣漿值天凉今冬又屬停選試遣僕為御史君在貧途見天下文章精神氣調得如王子者哉實能憂其危拯其弊今公之富貴亦不可多得意者望御史今年為僕索一婦明年為留心一官幸有餘力何惜些些此僕之宿憾口中不言君之此恩頂上相戴儻也貴人多忘國士難期使僕一朝出其不意與君並肩臺閣側眼相視公始悔而謝僕僕安能有色於君乎僕生長草野語誠觸忤並詩若干首別來三日莫作舊眼相看山東布衣不識忌諱泠然頓首紹官考功郎中開元七年由長安令左遷潤州長史顧野王輿地志云季子名札吳太伯十九世孫吳王壽夢之少子長子曰諸樊次子曰餘祭次曰餘昧次曰季札諸樊立為王且死立弟餘祭欲令兄弟傳國以及季子餘祭餘昧卒立季札乃讓不受退耕於延陵即其采邑士人懷德為之立廟闕山謙之丹陽記季子舊有三廟南廟在晉陵東郭外北廟在武進縣博落城西西廟即此是也昔第五倫為會稽太守禁非正之祀宜歸於一故惟存南廟而二廟被毀其後人間悉更復之南廟後有古墓周處風土記韋陟先賢序殷仲堪季子碑皆云此墓即季子墓也墓前有季子廟碑者仲堪為晉陵太守造碑銘命縣人辥玖植碑於南廟至永初中南廟被毀遷碑於西廟今廟前雙碑左廂者即仲堪所製右廂者梁天監十二年九月延陵縣令王僧恕所建紹以開元七年自長安令左遷潤州長史爰洎十年太歲壬戌因巡屬縣廟於延陵與縣令吳興沈炎同謁季子廟申奠禮也慨靈廟之巋然訪貞石而湮滅詢於廟祝因覩舊文雖殷王二君共延陵而俱沒而前後雙製與高風而尚存重鐫刻以懿之紀年月以顯之嗚呼來者觀此亦何異乎夫子之大篆也
