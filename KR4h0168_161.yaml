front:
  text: 全唐文欽定全唐文卷一百六十一桃椎益州成都人澹泊絕俗結廬山中嘗織十屨置道上見者曰居士屨也為鬻米茗易之置其處輒去終不與人接高士廉為長史遣人存問見輒走林草自匿云
  hash: sha256:323ddc316ca2e53d2ddd436aad389dbe8d0f1842e7de65590e8a40003ad8627d
  markers:
  - {type: head, offset: 14, content: 朱桃椎, id: KR4h0168_NFKB_161-h1, level: 1}
body:
  text: 若夫虛寂之士不以世務為榮隱遁之流乃以閑尸立為樂故孔子達士仍遭桀溺之譏叔夜高人迺被孫登之笑况復尋山翫水散志娛神隱臥茅茨之間志想青雲之外逸世上之無為亦處物之高致若乃覩余庵室終諸陋質野外孤標山旁迥出壁則崩剝而通風檐則摧頹而寫日是時閒居晚思景媚青春逃斯澗谷委此心神削野藜而作杖卷竹葉而為巾不以聲名為貴不以珠玉為珍風前引嘯月下高眠庭惟三徑琴置一絃散誕池臺之上逍遙巖谷之間逍遙兮無所托志意兮還自樂枕明月而彈琴對清風而緩酌望嶺上之青松聽雲間之白鶴用山水而為心翫琴書而取樂谷裏偏覺鳥聲高鳥聲高韻盡相調見許毛衣真亂錦聽渠聲韻宛如歌調絃乍緩急向我茅茨集時逢雙燕來屢值遊蜂入冰開綠水更應流草長階前還復濕吾意不欲世人交我意不欲功名立功名立也不須高總知世事盡徒勞未會昔時三箇士無故將身殞二桃福畤高宗時雍州司功參軍坐子勃殺官奴曹達左遷交阯令諡者飾終之稱也得失一朝榮辱千載若使嫌隟是實即合據法推繩如其不虧直道義不可奪官不可侵二三其德何以言禮福畤忝當官守匪躬之故若順風阿意背直從曲更是甲令虛設將謂禮院無人何以激揚雅道顧視同列請依思古諡議為定東皋先生諱績字無功文中子之季弟也棄官不仕耕於東皋自號東皋子貞觀初仲父太原府君為監察御史彈侯君集事連長孫太尉由是獲罪時杜淹為御史大夫密奏仲父直言非辜於是太尉與杜公有隙而王氏兄弟皆抑而不用矣季父與陳尚書叔達相善陳公方撰隋史季父持文中子世家與陳公編之陳公亦避太尉之權藏而未出重重作書遺季父深言懃懇季父答書其略曰兦兄昔與諸公遊其言皇王之道至矣僕與仲兄侍側頗聞大義兦兄曰吾周之後也世習禮樂子孫當遇王者得申其道則儒業不墜其天乎其天乎時魏文公對曰夫子有後矣天將啟之徵也儻逢明王願翼其道無敢忘之及仲兄出胡蘇令杜大夫嘗於上前言其樸忠太尉聞之怒而魏公適入奏事見太尉魏公曰君集之事果虛耶御史當反其坐果實耶太尉何疑焉於是意稍解然杜與仲父抗志不屈魏公亦退朝默然其後君集果誅且吾家豈不幸而多言見窮乎抑天實未啟其道乎僕今耕於野有年矣無一言以裨於時無一勢以託其迹沒齒東皋醉醒自適而已然念先文中之述作門人傳受升堂者半在廊廟續經及中說未及講求而行嗟乎足下知心者顧僕何為哉願記兦兄之言庶幾不墜足矣謹錄世家寄去餘在福郊面悉其意幸甚幸甚太原府君諱凝字叔恬文中子亞弟也貞觀初君子道亨我先君門人布在廊廟將播厥師訓施於王道遂求其書於仲父仲父以編未就不之出故六經之義代莫得聞仲父釋褐為監察御史時御史大夫杜淹謂仲父曰子聖賢之弟也有異聞乎仲父曰凝忝同氣昔二兄講道河汾亦嘗預於斯然六經之外無所聞也淹曰昔門人咸有記焉蓋薛收姚義綴而名之曰中說茲書天下之昌言也微而顯曲而當旁貫大義宏闡教源門人請問之端文中行事之迹則備矣子盍求諸家仲父曰凝以喪亂已來未遑及也退而求之得中說一百餘紙大抵雜記不著篇目首卷及序則蠧絕磨滅未能詮次會仲父出為胡蘇令歎曰文中子之教不可不宣也日月逝矣歲不我與乃解印而歸大考六經之目而繕錄焉禮論樂論各兦其五篇續詩續書各兦小序惟元經讚易具存焉得六百六十五篇勒成七十五卷分為六部號曰王氏六經仲父謂諸子曰大哉兄之述也以言乎皇綱帝道則大明矣以言乎天地之間則無不至焉自春秋以來未有若斯之述也又謂門人曰不可使文中之後不達於茲也乃召諸子而授焉貞觀十六年余二十一歲受六經之義三年頗通大略嗚乎小子何足以知之而有志焉十九年仲父被起為洛州錄事又以中說授余曰先兄之緒言也余再拜曰中說之為教也務約致深言寡理大其比方論語之記乎孺子奉之無使失墜余因而辨類分宗編為十篇勒成十卷其門人弟子姓氏本末訪諸紀牒列於外傳以備宗本焉且六經中說于以觀先君之事業建義明道垂則立訓知文中之所為者其天乎年序寖遠朝廷事異同志淪殂帝閽攸邈文中子之教抑而未行吁可悲哉空傳子孫以為素業云爾時貞觀二十三年正月序太宗龍飛宇內樂業文中子之教未行於時後進君子鮮克知之貞觀中魏文公有疾仲父太原府君問候焉留宿宴語中夜而歎太原府君曰何歎也魏公曰大業之際徵也嘗與諸賢侍文中子謂徵及杜房等曰先輩雖聰明特達然非董薛程仇之比雖逢明王必愧禮樂徵於時有不平之色文中子笑曰久久臨事當自知之及貞觀之始諸賢皆兦而徵也房李溫杜獲攀龍鱗朝廷大議未嘗不參預焉上臨軒謂㣥臣曰朕自處藩邸及當宸極卿等每進諫正色咸云嘉言良策患人主不行若行之則三皇不足四五帝不足六朕誠虛薄然獨斷亦審矣雖德非徇齊明謝濬哲至於聞義則服庶幾乎古人矣諸公若有長久之策一一陳之無有所隱房杜等奉詔舞蹈讚揚帝德上曰止引㣥公內宴酒方行上曰設法施化貴在經久秦漢已下不足襲也三代損益何者為當卿等悉心以對不患不行是時㣥公無敢對者徵在下坐為房杜所目因越席而對曰夏殷之禮既不可詳忠敬之化空聞其說孔子曰周監於二代郁郁乎文哉吾從周周禮公旦所裁詩書仲尼所述雖綱紀頹缺而節制具焉荀孟陳之於前董賈伸之於後遺談餘義可舉而行若陛下重張皇墳更造帝典則非駑劣所能議及也若擇前代憲章發明王道則臣請以周典唯所施行上大悅翌日又召杜房及徵俱入上曰朕昨夜讀周禮真聖作也首篇云惟王建國辨方正位體國經野設官分職以為人極誠哉深乎良久謂徵曰朕思之不井田不封建不肉刑而欲行周公之道不可得也大易之義隨時順人周任有言陳力就列若能一一行之誠朕所願如或不及強希大道畫虎不成為將來所笑公等可盡慮之因詔宿中書省會議數日卒不能定而徵尋請退上雖不復揚言而閑宴之次謂徵曰禮壞樂崩朕甚憫之昔漢章帝眷眷於張純今朕急急於卿等有志不就古人攸悲徵跪奏曰非陛下不能行蓋臣等無素業爾何愧如之然漢文以清靜富邦家孝宣以章程練名實光武責成委吏功臣獲全肅宗重學尊師儒風大舉陛下明德獨茂兼而有焉雖未冠三代亦千載一時惟陛下雖休勿休則禮樂度數徐思其宜教化之行何慮晚也上曰時難得而易失朕所以遑遑也卿退無有後言徵與房杜等並慙慄再拜而出房謂徵曰元齡與公竭力輔國然言及禮樂則非命世大才不足以望陛下清光矣昔文中子不以禮樂賜予良有以也向使董薛在適不至此噫有元首無股肱不無可歎也十七年魏公薨太原府君哭之慟十九年授余以中說又以魏公之言告子因敘其事時貞觀二十年九月記關朗字子明河東解人也有經濟大器妙極占筭浮沈鄉里不求宦達太和末余五代祖穆公封晉陽尚書署朗為公府記室穆公與談易各相歎服穆公謂曰足下奇才也不可使天子不識入言於孝文帝帝曰張彞郭祚嘗言之朕以卜筭小道不之見爾穆公曰此人道微言深殆非彞祚能盡識也詔見之帝問老易朗寄發明元宗實陳王道諷帝慈儉為本飾之以刑政禮樂帝嘉歎謂穆公曰先生知人矣昨見子明管樂之器豈占筭而已穆公再拜對曰昔伊尹負鼎於成湯今子明假占筭以謁陛下臣主感遇自有所因後宜任之帝曰且與卿就成筮論既而頻日引見際暮而出會帝有烏丸之役勑子明隨穆公出鎮幷州軍國大議馳驛而聞故穆公易筮往往如神先是穆公之在江左也不平袁粲之死恥食齊粟故蕭氏受禪而穆公北奔即齊建元元年魏太和三年也時穆公春秋五十二矣奏事曰大安四載微臣始生葢宋大明二年也既北遊河東人莫之知惟盧陽烏深奇之曰王佐才也太和八年徵為秘書郎遷給事黃門侍郎以謂孝文有康世之意而經制不立從容閒宴多所奏議帝虛心納之遷都洛邑進用王肅由穆公之潛策也又薦關子明帝亦敬服謂穆公曰嘉謀長策勿慮不行朕南征還日當共論道以究治體穆公與朗欣然相賀曰千載一時也俄帝崩穆公歸洛踰年而薨朗遂不仕同州府君師之受春秋及易共隱臨汾山景明四年同州府君服闋援琴切切然有憂時之思子明聞之曰何聲之悲乎府君曰彥誠悲先君與先生有志不就也子明曰樂則行之憂則違之府君曰彥聞治亂損益各以數至苟推其運百世可知願先生以筮一為決之何如子明曰占筭幽微多則有惑請命蓍卦以百年為斷府君曰諾於是揲蓍布卦遇夬之革捨蓍而歎曰當今大運不過一再傳爾從今甲申二十四歲戊申大亂而禍始宮掖有蕃臣秉政世伏其強若用之以道則桓文之舉也如其不道臣主俱屠地府君曰其人安出朗曰參代之墟有異氣焉若出其在幷之郊乎府君曰此人不振蒼生何屬子曰當有二雄舉而中原分府君曰各能成乎朗曰我隙彼動能無成乎若無賢人扶之恐不能成府君曰請刻其歲朗曰始於甲寅卒於庚子天之數也府君曰何國先朗曰不載德而用詐權則舊者先兦也府君曰其後如何朗曰辛丑之歲有恭儉之主起布衣而亻併六合府君曰其東南乎朗曰必在西北平大亂者未可以文治必須武定且西北用武之國也東南之俗其獘也剽西北之俗其興也勃又况東南中國之舊主也中國之廢久矣天之所廢誰能興之府君曰東南之歲可刻乎朗曰東南運歷不出三百大聖大賢不可卒遇能終其運所幸多矣且辛丑明王當興定天下者不出九載已酉江東其危乎府君曰明王既興其道若何朗曰設有始有卒五帝三皇之化復矣若非其道則終驕冗而晚節末路有桀紂之主出焉先王之道墜地久矣苛化虐政其窮必酷故曰大軍之後必有凶年大亂之後必有凶主理當然也府君曰先王之道竟兦乎朗曰何謂兦也夫明王久曠必有達者生焉行其典禮此三才五常之所繫也孔子曰文王既沒文不在茲乎故王道不能兦也府君曰請推其數朗曰乾坤之策陰陽之數推而行之不過三百六十六引而伸之不過三百八十四天之道也噫朗聞之先聖與卦象相契自魏已降天下無真主故黃初元年庚子至今八十四年更八十二年丙午百六十六年矣達者當生更十八年甲子其與王者合乎用之則王道振不用洙泗之教修矣府君曰其人安出朗曰其唐晉之郊乎昔殷後不王而仲尼生周周後不王則斯人生晉夫生於周者周公之餘烈也生於晉者陶唐之遺風也天地冥契其數自然府君曰厥後何如朗曰自甲申至甲子正百年矣過此未或知也府君曰先生說卦皆持二端朗曰何謂也府君曰先生每及興兦之際必曰用之以道輔之以賢未可量也是非二端乎朗曰夫象生有定數吉凶有前期變而能通故治亂有可易之理是以君子之於易動則觀其變而玩其占問之而後行考之而後舉欲令天下順時而進知難而退此占筭所以見重於先王也故曰危者使平易者使傾善人少惡人多暗主衆明君寡堯舜繼禪歷代不逢伊周復辟近古亦絕非運之不可變也化之不可行也道悠世促求才實難或有臣而無君或有君而無臣故全之者鮮矣仲尼曰如有用我者吾其為東周乎此有臣而無君也章帝曰堯作大章一夔足矣此有君而無臣也是以文武之業遂淪於仲尼禮樂之美不行於章帝治亂之漸必有厥由而興廢之成終罕所遇易曰功業見乎變此之謂也何謂無二端府君曰周公定鼎於郟鄏卜世三十卜年八百豈亦二端乎朗曰聖人輔相天地準繩陰陽恢皇綱立人極脩策迥馭長羅遠羈昭治亂於未然筭成敗於無兆固有不易之數不定之期假使庸主守之賊臣犯之終不促已成之期於未衰之運故曰周德雖衰天命未改聖人知明王賢相不可必遇聖謀睿策有時而弊故考之典禮稽之龜策即人事以申天命懸歷數以示將來或有已盛而更衰或有過筭而不及是故聖人之法所可貴也向使明王繼及良佐踵武則當億萬斯年與天無極豈止三十世八百年而巳哉過筭餘年者非先王之功即桓文之力也天意人事豈徒然哉府君曰龜策不出聖謀乎朗曰聖謀定將來之基龜策告未來之事遞相表裏安有異同府君曰大哉人謀朗曰人謀所以安天下也夫天下大器也置之安地則安置之危地則危是以路平安車狂夫審乎難覆乘奔馭朽童子知其必危豈有周禮既行歷數不延乎八百秦法既立宗祧能踰乎二世噫天命人事其同歸乎府君曰先生所刻治亂興廢果何道也朗曰文質遞用勢運相乘稽損益以驗其時百代無隱考龜策而研其慮千載可知未之思歟夫何遠之有府君蹶然驚起因書策而藏之退而學易蓋王氏易道宗於朗焉其後宣武正始元年歲次甲申至孝文永安元年二十四歲戊申而胡后作亂爾朱榮起幷州君臣相殘繼踵屠地及周齊分霸卒亻併於西始於甲寅終於庚子皆如其言明年辛丑歲隋高祖受禪果以恭儉定天下開皇元年安康獻公老於家謂銅川府君曰關生殆聖矣其言未來若合符契開皇四年銅川夫人經山梁履巨石而有娠既而生文中子先丙午之期者二載爾獻公筮之曰此子當之矣開皇六年丙午文中子知書矣厥聲載路九年己酉江東平高祖之政始怠仁壽四年甲子文中子謁見高祖而道不行大業之政甚於桀紂於是文中子曰不可以有為矣遂居汾陽續詩書論禮樂江都失守文中子寢疾歎曰天將啟堯舜之運而吾不遇焉嗚乎此關先生所言皆驗也昌齡冀州南宮人第進士貞觀中補長安尉出為襄州司戶後為北門修撰乾封元年卒問元默垂拱理歸上德法令滋彰事鍾澆季是以唐虞畫象四罪而咸服姬夏訓刑三千而愈擾故知勝殘去殺必在於宏仁反樸還淳不務於多辟方知削茲三尺專循五禮幸陳用捨之宜以適當時之要對兩儀亭育聚嚴刑於積陰四氣平分降明罰於秋序是知觀象設教聖人所以勝殘因物造端懿后由其立辟故媯川受命士師陳九德之歌瑤山載刑呂侯訓百鍰之典然則激揚神化鼓舞皇階資粉澤而宏風俟德刑而振俗是故六轡在御飛龍之駕可期九罭不施奔鯨之害斯兆縱使業優卷領道邁曾巢齊飲啄於鶉居絕往來於犬吠猶未可長懸三禮永擯五刑削茲噬嗑之科專行忠信之薄况今時推纂聖運屬升皇猶勞丹浦之誅尚漏青邱之罪伯夷典禮與猾夏而同科司寇詳刑共春官而聯事自可遠稽九伐近命三驅釋刀鋸於凶魁休甲兵於原野然後施威象闕展事天宗繼美媧黃追風火燧渠魁未滅豈得輒議寢刑中嶽既封自可專循大禮謹對問惟堯則天全潁陽之節惟禹奠川遂滄州之美然則高潔之士出於盛明廉恥之賓不生澆季自皇唐受命驅駕前古貞遁不聞風軌莫繼豈端操之範獨祕於往辰將奔競之徒頓騁於茲日緬懷長往有懵深衷貯聽離賢以袪心疚對則天分命箕山多長往之賓濬畝劬勞滄州有肥遁之客是以北荒孤竹甘草澤而輕周南岳紫芝翫林泉而恥漢此蓋為匹夫小節未達汾陽之旨獨行幽姿寧動少微之宿豈若大風在夢飛熊入兆下箕尾而稱師委旄頭而作傅自大君有命遠頓天紘盡岩穴之英奇總濠梁之薖軸脫荷裳而襲朱紱解薜蘿而綰青綬五尺童子羞稱荷蓧三事大夫恥觀瓢飲將使鄭君谷口擅不言之謠曹相府門多清淨之化方知聖人在上真隱不獲全其高淳風所偃幽貞不能固其節麛卵時性鱗鳳所以呈姿山林不夭風雲以之通氣物既稟和而適變士亦感類而相從調餁自可怡神烹鮮足堪養性猶謂寒泉獨善未臻援手之仁薪槱兼濟有助興王之道謹對知悌許州鄢陵人貞觀朝官中書侍郎遷尚書左丞佐裴行儉平突厥有功終戶部尚書夫含靈受氣稟之於五行攝生乖理降之以六疾至若岐黃廣記蔚有舊經攻灸兼行顯著斯術骨蒸病者亦名傳屍亦謂殗歹亦稱復連亦曰無辜丈夫以癖氣為根婦人以血氣為本無問少長多染此疾嬰孺之流傳注更苦其為狀也髮乾而聳或聚或分或腹中有塊或腦後近下兩邊有小核多者乃至五六或夜臥盜汗夢與鬼交雖目視分明而四肢無力或上氣食少漸就尫羸縱延時日終於歹盍盡予昔忝洛州司馬嘗三十日灸活一十三人前後差者數踰二百至於狸骨獺肝徒聞曩說金牙銅鼻罕見其能未若此方扶危拯急非止單攻骨蒸又別療氣療風或瘴或勞或邪或癖患狀既廣救愈亦多不可具錄略陳梗㮣又恐傳授訛謬以誤將來今故具圖形狀庶令覽者易悉使所在流布頗用家藏未暇外請名醫傍求上藥還魂返魄何難之有遇斯疾者可不務乎敦頤曹州冤句人貞觀中為滄州瀛州刺史永徽五年轉洛州卒竊聞身非欲食如來受純陀之供法無所求淨名遂善德之請皆為顯至理之常恒示凡聖之無二又是因機以接物假相而宏道為之者表重法之誠受之者為行檀之福豈曰心緣於彼此情染於名利者哉仰惟宿植德本非於三四五佛深達法相善識十二部經獨悟真宗遠尋聖迹遊崛山之淨土浴恒水之清流入深法界求善知識收至文於百代之後探元旨於千載之前津梁庶品不皦不昧等施一切無先無後頤等識蔽二空業淪三界猶蠶絲之自纒如井輪之不息雖復順教生信隨緣悟解頂禮歸依受持四句隱身而為宴坐厭苦而求常樂而遠滯無明近昏至理未能悟佛性之在身知境界之唯識心非去取義涉有無不能即八邪而入八正行非道而通佛道譬涉海而無津猶面牆而靡見昨因事隙遂得參奉曲蒙接引授菩薩戒施以未曾有法發其無上道心一念破於無邊四心盡於來際菩提之種起自塵勞火中生蓮曷作為喻始知如來之性即是世間槃之際不殊生死行於般若便是不行得彼菩提翻為無得忽以小機預聞大教頂受尋思無量歡喜然夫檀義攝六法施為優尊位有三師居其一宏慈利物雖類日月之無心仰照懷恩竊同葵藿之知感大士聞法捐軀非所企及童子見佛奉土輒敢庶幾謹送片物表心具如別疏所願照其誠懇生其福田受茲微施隨意所在使夫墜露添海將渤澥而俱深飛塵集岳與須彌而永固可久可大幸甚幸甚春寒尚重願重止休宜謹遣白書諸無所具賈敦頤等和南義方泗州漣水人舉明經貞觀時授晉王府參軍直宏文館累擢著作佐郎顯慶時遷侍御史坐劾李義府左遷萊州司戶參軍秩滿家於昌樂遂不復仕進總章二年卒年五十五臣聞附下罔上聖主之所宜誅心狠貌恭明君之所必罰是以隱賊掩義不容唐帝之朝竊幸秉權終齒漢皇之劍中書侍郎參知政事李義府善柔成性佞媚為姿昔事馬周分桃見寵後交劉洎割袖承恩生其羽翼長其光價因緣際會遂階通顯不能盡忠端節對揚王休策蹇勵駕祇奉皇眷而反憑附城社蔽虧日月請託公行交游㣥下貪冶容之好原有罪之淳于恐漏洩其謀殞無辜之正義雖挾山超海之力望此猶輕迴天轉日之威方斯更劣此而可恕孰不可容金風戒節玉露啟途霜簡與秋典共清忠臣將鷹鸇並擊請除君側少答鴻私碎首玉階庶明臣節伏請付法推斷以申典憲臣聞春鶯鳴於獻歲蟋蟀鳴於始秋物有微而應時人有賤而言忠臣今年歲首自雲陽縣丞蒙擢授著作佐郎極文學之清選未幾又拜侍御史濫膺憲臺之雄職顧視踰涯殞首非報雅欲有犯無隱以廣天聽今李義府擅殺寺丞陛下雖巳釋放臣不應更有鞫問然天子置三公九卿二十七大夫八十一元士本欲水火相繼鹽梅相成然後庶績咸熙風雨交泰則知人主不得獨是獨非皆由聖旨昔唐堯至聖失之於四凶漢祖深仁失之於逢萌魏武勇略英雄失之於張邈此並英傑之主莫不失之於前得之於後陛下繼聖撫有萬邦蠻陬夷落猶懼刑網况輦轂咫尺姦臣肆虐殺一六品寺臣足使忠臣抗憤義士扼腕縱令正義自取絞縊此事彌不可容便是畏義府之權勢能殺身以滅口此則生殺之威上非主出賞罰之柄下移姦佞臣恐履霜堅冰積小成大請乞重勘審正義致死之由雪冤氣於幽泉誅姦臣於白日思帝鄉而北顧望海浦而南浮必也行愆諸已義負前修長鯨擊水天吳覆舟如因忠獲戾以孝見尤四維霧廓千里安流靈應如響無作神羞
