body:
  text: 草莽臣稽首獻頌曰臣聞殊祥大報者皇天無私慎終追遠者祖考來格皆上帝之所協德豈蒸人之克預也我皇帝陛下建皇極行大道體元以煦覆品物以陶運執斗柄而四序潛迴張地維而八埏至靜四十載矣而天下大順巍巍乎其全功歟元元皇帝陛下之烈祖也寶慈儉以垂後昆法清靜而示教文歷千百祀而陛下道存妙有化洽無為動之太和寂以元覽非得一而正乎陛下執大象敷元宗聖祖儀刑於郡國景命紛紜於圖史者蓋百數矣開靈寶於分陝之郊克復明號形縞衣於降聖之閣時庸展親探三華於丹墀之上近而得也想五利於滄波之外遠而治也故朴畧之初三五以降曾不敢以功階並也今太白山人李渾等暫因形動未假神游初入緇帷之林忽變紫微之境古祠之下猶龍肅然霽色雖澈於清霄榮光自分於白晝元宮咫尺仙衞徘徊接霓裳以受辭奉玉顏而專對光啟王室宣昭祖孫方籙實而未宏緬逖聰而奚取由命京畿採訪使戶部侍郎兼御史中丞王鉷發皇華而載馳望白雲之有處瞻仰如在真風宛同歷五洞之杳冥尋一門之䆗窱行前有會感而遂通石臺菡萏而特秀玉版熒煌而自祕式傳無忽祇受不差天香氛氳甘液浹洽陽烏抱戴而上燭卿雲交映而前引率皆科斗之文時人無能之者陛下乃齋心服形絕聖棄知閒居於大庭之館游夢於華胥之國而後攝外慮嚴天思捧元記而納宸極洞一時而覩萬物其辭炳燿而有屬其義綿延而自久齊聖壽於日月恢國祚於宇宙上以和天地下以洽神人臣不知其天之為大也如此遂下明詔臨百官荷億載之殊慶追六聖之遺諡既撰日以嚴配親大祫於閟宮鳴鸞以和清蹕在聽臣又以開闢之後無以尚之於是文武百辟蠻夷君長洎黃緇老幼各有等威雲趨玉闕而請曰陛下奉天之昭錫承祖之大命百王無以徵其符千載不復遇斯瑞崇累朝之德孝之大者掩至尊之美謙莫甚乎既而天聽未迴睿獎猶邈臣下罔知寢處黎人咸造勿褻而言曰天其或者以天下之物無可以稱陛下之德故纘戎徽號因聖祖以發明令陛下不得不名之固非一時之所強名也書曰不臧厥臧人罔攸勸願陛下臧而勸之抑讓之至於三方霈然曰俞哉斯亦天之所俾也遂命稽皇典序國儀韶濩作貂蟬進纂鴻猷而尊冊之明大訓而奉行之雷雨作解小大以正四靈在郊藪以待命三光出足厂墨次而延澤豈祇㣥臣之私乎率土之私乎臣生沐淳風欽承寶化百揆時敘空聞賡載之歌三階底平久著登風之頌伏以神功丕應潤澤生靈挹超代之範圍與下人之陰隲方軼於周王游玉黃帝迎年豈與夫河東壽宮棫陽薦磬而已哉仲尼以舜禹之事邱不得預議者以方今之盛臣實預焉庶效采詩之典曾何萬分之一伏獻頌曰巖巖太白列仙是宅八會真歌三清羽客幽陰肅爽處處靈跡皇唐上祖天人元君揮斥六合時乘五雲貽厥景命昭我聖勳神靈宣功華芝獻壽薦錫元記光資妙有玉字天長石臺地久億載新兆千齡古書字形科斗臺狀芙蕖神力莫測象帝之初烈烈遺諡清廟崇之明明徽號我后尊之天授玉記惟皇之楨微臣薦頌游聖難名皇唐八葉之中興提天綱披寶圖臨八紘俯萬物垂鴻儲休粵十有七年元冬陽月旬外三日天子居北堂左个受厥初之慶自予弼臣百官丞令咸歸休澣則歌康衢樂壽域者具百姓之歡心有司諫掌綸之臣當右掖分宵之直望閶闔沐薰風齋心以虔稽首獻頌其詞曰甲觀畫堂繞樞神光十月良日降生我皇焜殊祥兮纘武繼文時惟聖勳格苗戡黎為天下君望如雲兮蒼蒼海隅達我天衢七戎蠢狄西殲北徂外無虞兮白翟遐通嘉禾薦豐兩樹連理五雲飛空歸大同兮金闕峩峩清晨伊何萬國筐篚千門詠歌歆太和兮舜膳以甘堯尊以酣誕彌之朔旬而有三湛恩覃兮南山于前北辰于天臣某獻壽維億萬年象帝先兮皇唐八葉伐叛取亂再寧區夏四海絕橫流九州無匪人制要荒以從述職分周召以相夾輔有多士為內理有方鎮為外攘垂衣裳而御極惟十有三祀矣大劍之南自秦惠疏疆是一都之會南蠻西戎舊為敵國伺我休戚為爾進退國家之有天下也或懷柔羈縻與之連和或掩義背德與之交鋒尋盟問罪不無事矣當天寶中河隴之外却地千里赤山青海不敢飲牧絕漠無跡我嘗有之屬燕薊猾亂毒痡生人㣥盜乘時舋彼戎復舊怨是以綠林逋藪白晝殘人池隍鞠為茂草邑里化為煨燼墜瓦萬聚頹垣一平大歷三年夏六月分命漁陽伯鮮于公擁旄仗鉞總統東川八州之地自閫之外帝俞欽哉公才包五行體合四氣揮若神劍扣如鴻鍾其始也凜之以威其漸也濟之以恩作之君師為之父母由是遠者來來者安也於是驅豺狼之所嘷翦荊之所蔽一之歲二之歲葺郡邑正疆理而樹牙幢三之歲四之歲闢田疇闐帑藏而耀軍實五之歲而甲兵大振六之歲而勇可賈餘七之歲而人有聚訓有常矣無暴可禁所謂保大定功有財斯豐所謂安人和眾兼之者不戰而勝兵將戢乎畿內諸侯始有賴而捍戎於邠隴矣則知漁陽公外陳藩屏而助威武於鑠哉其為人臣之式歟方今龍安屬邑久為重門待暴之地壤連西山分我天限有閒道可以招戎偵有絕險可以資敵國頻年發中軍之倅為之鎮守今秋自元戎十乘以先啟行白露始降秋草方實筋角勁而膂力既堅樵蘇積而糗糧斯峙如熊羆曰千夫長如貔虎曰百夫特前茅後勁不戮一人君子曰軍政不戒而備矣以此料敵兵必勝戰必剋我武惟揚休有烈光福履所將壽考無疆其猷克壯而佐堯翊湯不其盛歟公名晉字叔明漁陽縣人也其先殷人箕子處其地世有君長北方之強歟至西漢有京兆尹褒惠東漢虎牙將軍輔散遷伊洛相衞之間垂裕後昆繼世流慶粵有高祖父康紹後牧于閬解印寓於新政縣洎曾王父與王父因家焉衣冠來裔松檟斯茂實膏腴而止斯樂土正版圖而終移關內今復為長安人也公先兄仲通擢桂枝綰黃綬不十年而權生殺於梁益之地入為京兆尹公自孝廉專經高第再參環衞累拜棘司四遷柱史連擢華省宰洛邑時號神明牧商於人歌父母有詔加金商均房等州觀察使處置使又入為京兆尹歷左右宮相出牧臨卭兼御史中丞充卭南招討都團練使由中司復加節制焉尋遷御史大夫朝廷以為今之二難時也卓絕載形詔旨談者榮之方將登金鋪調玉鼎徼蒼生之福豈懾殊俗收係虜從衞霍之事乎邵忝嘉賓之末猥厠諸侯之選拜賜之辱奉以周旋頌聲不作無以報德發彼馨香存乎琬玉匪報也永以為好遂作頌曰金火閒秀實生有德風雲所感以佐王國龍韜豹畧天資默識敦詩說禮行有餘力忠於事君立名底績鴻鵠斯舉驊騮登跡風雨如晦我心匪易三川震蕩萬里沙磧宗社既安君臣正焉乃睠西顧實為東川東川伊何人其播遷邑有遺骼家無舊阡爰命虎臣仗茲犀節上天下地惟爾之發拉彼㣥逋輯我遊闕躬之先之不日不月七載勤勸三軍克振龍安之役伐原示信么戎宣驕則我觀舋玉帳潛機金鉦俟進漢思營平先零之功班壯車騎燕然以封軍之所樂吾之所從門生獻頌豈二子之所疇庸哉臣炎等言臣聞自古帝王配天受命必建徽號傳之無窮號者功之表也三五以降皆約所著之功以彰厥德則犧農軒頊之號或質勝文而文勝質悉以一時盛烈而崇號焉伏惟皇帝陛下纘戎立極紹庭應運居域中之大為天下之君聖敬日躋孝理時乂放珍禽奇獸為異方遠物畧嘉禾美瑞俾良史不書洪惟成湯一德率先老氏三寶舞干是務和戎是利惟賢是登惟惡是去雖夏后卑宮菲食漢文帷囊弋綈與我比崇彼實慙德今陵園永閟升祔云畢孝思罔極達於神明克禋克祀卜時撰吉載命元子光啟儲君禮無不備道無不洽而鴻名未揚典故猶缺將何以告清廟謁聖祖對越神祇昭格上下伏乞許臣等上尊號以備大禮有以答乾坤之貺有以符億兆之歡臣等才非啟沃職叅近侍遠愧賡歌空懷赤實不勝懇願屏營之至謹奉表陳請以聞臣炎等言伏以表鴻勳尊明號百王之宏典八聖之嗣烈則可祖述古訓憲章前範上以明帝王無私于已下以表臣子行古之道所以詢於公卿稽彼典常冒昧為請期於必從奉詔還答未蒙聽允阻臣子之協同彰聖人之謙甚當此反側得為安乎臣炎等誠惶誠廹頓首頓首臣聞上覆有名曰天下載有名曰地天地尚著於名位而陛下父母天地端居大寶獨無名乎臣等固知其不可謂此况踰年作制履端於始啟迪乾運祇膺天秩此皆宗社廼睠元元式瞻其當至公不在謙已伏惟陛下首在藩邸親總六軍屬彼昆夷乘我閒釁犯我都鄙扈鑾輿以東幸奮貔武以旋師一呼而上將雲奔傳檄而遠蕃鹿君至朝廷以正華夏以寧旋表元良迨茲臨御顧命之後畏天之威躬履節用勤於宵旰大孝感於神明茂功由乎發號友愛日至觀行不忘顧升平以儉致將徠遠以德服風雨時若妖氛不動夫然則俗可追於大庭人可納於壽域而欲忽鴻名觖人望固以自約其可得乎臣等才謝將明力慙匡輔欣逢至道竊荷寵光願回天私獲罪丹悃無任懇迫屏營之至謹奉表陳請以聞臣炎等言臣等考古訓酌㣥言建大中之道陳徽號之請累表上聞皆抑而未許跼天悚迫屏營失圖臣固以此請者方欲協萬國之歡繫一人之本蓋非私於主而專於已實以荷大賚法上元遵王之路也伏惟皇帝陛下以唐堯四德光宅天下以周文直行陟降庭止應乾立極迨乎逾年又奉今月甲寅詔將有事於郊廟越翼日乙卯復下有司命元子以主器薦珪置幣尊祖配嚴屬車將邁明號未布瞻望霄極遐哉邈乎至乃陳一王之儀合百神之禮祝告史載則謂之何臣又聞之守文纘服繼序不忘遵奉遺烈必思其復惟高祖象雲雷以起經綸惟太宗造區夏以創大業惟元宗倚孤劍以攘臂惟肅宗振一旅而討逆惟代宗總天兵以佐命皆拯生人之崩角安國家之綴旒德澤洽於上蒼功業冠於邃古而皆順人心以敬天命享大名而騰茂實况陛下居雍邸將天下奔西戎約北狄此所以彰武功也其在望苑則問安視膳春誦夏弦尊師以廣其聰明敬老以全其羽翼此所以懿文德也及受顧命反居諒闇勺飲不入杖而後起同軌不踰於七月升祔永終於九虞此所以昭大孝也克勤於邦日親萬務克儉於用化行四海珍禽奇獸不育於國沉珠捐金不受於人此所以返太素也有一於此則可以發揮鴻休光啟尊號豈可尚懷謙損莫顧與能九廟之靈儼思虔告百辟之望終期必從陛下必欲固拒㣥心輕此盛典則祖宗之前號盡為虛美陛下安得而墮之臣愚故知其不可也臣等待罪掖垣屢陳愚欵儻未迴天睠將萬請以之無任大願慺慺之至謹奉表昧死以聞臣仰稽舊章虔上尊號懇誠三瀝中旨未回朝野惶然罔知攸措臣等誠惶誠恐頓首頓首臣聞帝王御極作人司牧德盛者爰加顯號功高者必建鴻名是用叶天地之符塞神祇之望榮非為已義實狥公爰在累聖必從眾欲陛下踐寶祚握瑤圖懸日月而照九圍鼓雷霆而清八極故得吳蜀電滅齊蔡砥平攄祖宗之宿憤救黎元於焚溺今日者威加四海澤浸八荒文軌罔不同華夷罔不服政刑罔不舉符瑞罔不臻闢再造之宏規致中興之昌運而大典猶鬱徽號未崇何以副萬國之心何以答三靈之貺臣等謬居樞近累黷宸嚴望九重之俯從為千載之榮遇雖則祈天之奏伏蒲而未感所冀回日之誠傾藿而必遂臣等不勝懇欵屏營之至臣聞立天下之本故受之以震明兩承統慶元有光期萬國以貞而一人有慶也伏惟皇帝陛下受天明命尊祖嚴配聖謨廣運禮秩咸若六親承式而理六合不論而定伏以儲宮未立人望猶勤奉天順人事不可曠夙聞宣王天資孝敬訓稟詩禮可以奉宗祧之重可以當匕鬯之主朝三命宰則以安親前師後傅則以齒冑伏乞以時冊命報慶天人然後啟承華以論道起博望而養德天下幸甚天下幸甚臣等叅跡樞密倍萬恒情謹奉表陳請以聞臣等言今月十六日敢以古義請建皇儲伏奉恩命未垂允答受命兢悚怳然失圖臣等惶恐頓首臣聞皇王之理必先體統而後正百度以臨四方修人紀以符天道則居震守器重離繼明是先代行於天下也况尊宗廟而奉君親乎此而不先孰可先者陛下尚執謙德方勤庶政略至公之務慎翼子之私是以小嫌而廢前訓今臣等不敢以歷代為據且以國朝以來言之有若高祖義寧二年五月即位六月立建成為皇太子太宗武德九年八月即位十月立中山王為皇太子高宗貞觀二十三年六月即位七月立陳王為皇太子則祖宗垂範如示諸掌今抑而不立豈塞天下之望伏聞宣王以子則嫡以家則孝天姿玉裕雅性沖深足以奉粢盛之重視朝夕之膳然則行一物而三善皆得者建儲之謂也臣等不勝大願懇請之至臣某言臣及文武百寮上乞奉遵遺詔俯垂聽政迨於再三尚阻㣥請所天未覆何地自容伏自焦惶罔知攸處臣以因心之感是陛下私戚顧命之重是先帝至公未有因私戚而忘至公居大寶而懷小節者也且漢文昔王之賢者豈欲垂訓作則自虧其道而後嗣忘其孝思蓋所以垂時制禮從權體國千載不易直道而行曾參閔損俯就者家也周康漢景仰就者國也安以一家之行而隳萬國之務乎今陛下禮以自拘闕一字為全孝臣謂從而觀志存其中則明遺制不可狥禮而忽萬務不可一日而曠臣又聞之子事父以無違臣事君以替否臣陪陛下霑承末命臣言未感甘受不忠陛下固辭豈得稱孝特乞受憑几之顧託損蓼莪之哀思以時闡皇綱創帝範副人之所望悅億兆之心寧止宗社焉依實將教闕一字速及披肝屢啟冀獲哀從無任崩迫彷徨之至臣等欽承顧命遵守舊章冒陳至理上喧霄極冀迴三舍以幸萬方而呼天未聞觸地無厝庶僚何恃而不恐率土何仰而不憂至如仙駕在天元猷未遠窮崩之慕臣子之極同况陛下新離供養纒哀風樹誠不宜屢黷嚴纊仰傷聖心臣等備位台衡與國休戚所顧者小節所全者大體是用頻煩干奏隕越為期臣某中謝竊以三漢成規備乎典冊六宗遺範列在史官歷㣥聖無以易其儀貫百王無以更斯制則知聖人達節而俯就王者屈已以徇時故周發誓師當未葬之日康王作誥繼憑几之辰夫大孝在於述先執禮懲乎廢命所以伯魚止慟稟趨庭之規孝景抑情循易月之制弛張期乎得中壓降在於適時今中夏雖寧而外郊猶警幸屬千年嗣聖九有惟新顧循問䜿之初迨今宅憂之日已交朏魄不決外虞普天率土任重事殷一日暫曠萬務所擁况翌日之詔手澤猶存敢忘導揚以塞恩顧且小大之理須稟聖規聽斷之期已違先旨庶政㣥情惟上帝之降命屬陛下以黎元宜以闡皇綱創帝範副靈祇之望悅兆庶之心焉得極蓼莪之哀忽宗社之重伏惟陛下仰思無改之道俯戒在茅之責抑損至情覽決庶務存萬代之固遺一介之善率繇大道克允至公天下幸甚天下幸甚臣某言稱情立制禮經美人道之文屈已從宜前史稱我王之孝故魏文腷臆以莅事晉襄縗絰而從師誠有由然非不懷也伏惟皇帝陛下屬當聖業纒思遺弓至性出於自然孝情稟於天質雖考妣之慟被於含齒而皇王之道寧有常心天下之志宜通太陽之照難闕况百度惟始萬目未張遂呌帝閽期抑舜慕雖封章累至而閶闔不開九服失圖㣥司沮色豈悟至誠不昧有感必通今日中使某至伏蒙昭迴天鑒允納窮欵皇風廣被神詔沛然觀象於天同伏羲之始畫奉先思孝狹武丁之不言厭極愛於祖宗體乾行之覆育周漢所以繼理政術魏晉由是經綸理道實足垂風萬古作範百王豁億兆惶惑之心示人祗聞奏之路百穀荷膏雨之澤㣥生覩天地之初以悲以歡載號載懼臣某等言再奉恩敕聖心永慕未忍割哀過大祥則素衣練冠銜恤聽政當外除則降從禫服以終喪紀者㣥臣等重於荒迫之中頻奉不忍之詔精魂飛越兢惶失圖臣某等中謝伏惟皇帝陛下孝心自天孝道逾禮宅憂之日痛感人神顧命之文興言不忍微臣等前後五表昧死上陳雖皇恩抑從而猶至十日自鼎湖升馭俯及祥除其閒惟見㣥臣禮展哀感又伏聞杖不能起哭不絕聲常膳頓減至於一溢以王者之尊過子臯之毀然臣等伏以三年之喪古稱云達禮者前王之舊制也三日而聽政二十七日而釋服者先王之遺令也今陛下不勝罔極之痛欲遂因心之哀遠追前古之禮近廢無違之義愚臣荒塞莫知死所且梓宮未遷於陵隧聖慮方切於哀號雖釋服臨朝慰撫臣子猶恐天顏慘戚率土不安㣥臣未通庶事皆闕方今以練冠為易月之服禫制終諒闇之喪㣥臣進見莫勝憂戚又安敢議及時政下延兆庶者哉遐邇幽明同知不可伏乞聖情深思園陵興作之務仰順先聖殷憂之說上尊祖宗傳襲之典請釋服之注俯從有司銜哀永懷豈有時日萬人之命懸在聖躬今臣等昧死請不奉詔上冒宸嚴心魂兢悸言辭失序無任憂國切迫之至臣等至哀至切昧死上表乞奉遺詔順時釋服日月有期而精誠未達率土臣子未知所從况在朝行伏待斧鑕臣等伏以昔漢文帝初制易月之禮以為帝王者不可因喪而廢政若君上重服則率土何心爰建此儀以垂後葉自爾至今殆千載矣豈無哲王皆所尊奉聖朝奄有四海撫寧萬邦重光睿圖孝理天下臣不敢備引前古以煩聖聽乞畧陳元宗先帝即位故事耆老當日所見聞者皆以日易月依禮外除有司繼存儀注尚在臣敢罔冒伏受嚴刑且先王制禮禫服止於兩月為日正當兩日今詔旨降從禫服以終喪臣雖固陋不達禮本今服禫三載實所未聞况君者天也豈有天意慘愴萬物得遂其性父懷隱痛赤子得安其心哉陛下若固違㣥言未奉遺詔非惟臣子哀懼實恐蠻貊不安非陽和發生之道聖人順物之義愚臣等心之所切抵冒國章形神悚越文理繁穢頻黷旒扆庶感天心雖死之日將無所恨無任惶悚之至臣某等言伏聞事有至公不敢避責確守臣職不敢逃刑天心未從有死無二臣伏以大行皇帝憑几顧命俾二十七日而釋服者蓋以天下事重軫慮于懷陛下至孝純深必多損毀竊思因創巨之痛忘艱難之業累聖鴻緒萬邦赤子或一事不得其所豈非重服傷生之患哉所以當大漸之辰託殷憂之命蓋緣社稷之遠計須抑陛下之至情遺旨若此猶未甚割哀况無制命則如何上請且攢宮尚臨於前殿陵寢方興於復土朝野縞素殆將三旬雖聽政俯在於天心而庶務未親其萬一今又禫服終制普告四方典章文物何所設施且西戎北狄頃歲未賓凉秋氣高每伺邊隙今若聞國有大故喪又未除姦謀或生事則非遠雖皇威遐振應時掃除然思患之道必戒不虞善師不陣蓋在此也今陛下若御常服決大事不逾月之內天聲被於八極凡厥夷貊聳聽皇猷自然大者畏威小者懷德稽顙率賦疆埸無虞告成之功上薦於帝則先皇帝之遺旨行矣天子之大孝備矣㣥下之所願遂矣萬國之兆庶安矣陛下不思此事之利害忍違臣子之誠心此臣等所以兢惶無措哀迫失圖叩心三請上冒天憲死而利國臣不敢辭臣之丹心天地明察無任兢迫之至
