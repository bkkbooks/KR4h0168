front:
  text: 全唐文欽定全唐文卷八百三磎字景望江夏人大中十三年進士纍遷吏部郎中拜翰林學士中書舍人黃巢之亂走河陽入拜戶部侍郎遷禮部尚書景福二年同中書門下平章事崔昭緯素疾磎諷劉崇魯裂其麻左授太子少傅乾寧初復相罷為太子少師李茂貞擁兵犯闕殺之都亭驛贈司徒諡曰文
  hash: sha256:0abdcb61fcaf82d4b72279210fd3c112e4fb9e296aac5254753914bf094361fb
