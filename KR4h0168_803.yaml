body:
  text: 敕御史中丞以獨坐為稱豈特崇貴之而已昔韋仁約是其官僚耳猶以雕鶚自許不肯狎公卿激揚清風振駭良吏况長其屬者可忽慢哉兵戈以來紀綱廢壞永惟提舉未易其人執政上言云具官徐彥若掌司憲臺甚著聲績而自轉遷稱速憤鬱猶多使之復為必或愈於前日且其祖在天后朝為大理有正直詳平之聲于公積慶因成相門而彥若克嗣其家端莊自立踐歷華貫聲聞藹然俾持準繩無以易者是用輟天官之二再尊任之爾其砥礪厥心無忝所舉可依前件敕持紀綱以二於中司書言動以歸于太史二者亦重矣而躁競者徒利于轉遷囂薄者止貪于清近問以職業則杳如物外遂使南臺無典章可采東觀無注記可求壞法曠官莫斯為甚某官王搏等並以科籍早登朝列而憲署以搏茂族英才嘗雜事於亞相皆言其所蘊蓄未盡施設請復兼柱下進省曹以用之丞相以柅大臣令子日稟訓於名父皆言其所聞見妙得規模請引之朕前委直筆以觀之是用同獎擢無所疑焉爾其厲乃冰霜謹乃毫簡勿循往例以正時風可依前件敕李轂書府皆以丞相為大學士蓋理化之本在焉而集賢嘗鄙仙殿之稱時之論者亦以為尢重今大學士謂爾轂儒學賢相之後以進士擢科今典籍散亡編簡殘缺轂紹儒學之業實進士之名儻能討籌質正請使校㣥書焉豫嘉而聽之參軍府庭則序官然耳河南京兆大何足論噫苟能副大學士之委諫官御史豈吝汝遷可依前件敕吳敬存等各以才能效其忠節或誘諭軍帥捍蜂蟻之師徒或善葺都門壯鳳凰之城闕嘉績既著賞典宜及將軍職於禁旅司馬兼於憲丞可謂寵榮足以耀於流輩矣可依前件敕朕思報功臣以郡事念遠人以司牧惟是二者寤寐疚懷具官尚汝貞在先皇帝時扈鑾駕功高建隼旟布政非時見代可為愍然具官朱塘將兵之材號為嚴肅勞績聲著罷免歲深惟涪與恩遠郡之沃饒者也資人以優爾亦資爾以救人且以元武之尊夏官之長各從官敘以寵榮之具官蔣王褱婺人言有政化懇乞增秩端右之命以徇其請各堅爾志無或變渝可依前件敕康君立等夫文吏以儒術自進而牧人養物固其所也而論者猶或嘉之而爾等各以軍功達於郡政可謂難矣然武有七德而安人和衆在焉得非皆達其義耶深惟勸能之方遂允為真之請可依前件敕朱誕等並干鏌奇鋒崆洞徑氣或忠臣薦達播于文武之間或軍功著明逈出輩流之右升遷委用無所偏頗各竭爾才以稱吾意可依前件冀檢校尚書充職嶺南東道供軍判官李谷檢校郎中嶺南東道節度判官鄭商郎中賜緋制敕詹承冀等上黨南越俱名鎮也倅戎餽運皆重職也以承冀等並以才業達於帥臣正位加官各從所請可依前件敕楊詔等幕吏之選委之將帥尚矣况元勳大臣而付以嶺表之重者哉詔等或以本官任職或加繡衣白筆之號皆從其請噫以南越之雄富類東閣之招延爾等豈直陟金階躡珠履而已勉贊策畫無惑杯觴報恩酬知於是乎在可依前件敕虞岫等凡別駕長史務簡俸優故在京百司諸侯留邸所以勸勤事之吏砥奉職之勞今以命爾等即循例也可依前件敕盧蟾等十年兵戈兆人流散朕延執政與百執事問所以聚人之方皆慎選令長而已夫畿赤之富平可謂大邑而洪之武寧絳之曲沃越之山陰亦皆著名者也爾蟾等或稱華胄或曰才人華胄以禮讓為本才人以政術為宗而珙嘗於佛寺有遷明皇真像避賊火之功可謂忠敬矣以爾四人為縣庶可聚吾人乎勉端缺能以稱其用可依前件敕宣尼薦弟子之能曰由也果於從政乎何有朕懲兵革之後念疲瘵之人富而教之令長為急具官沈正言等或納圖籍於書府或稱勞績於本官皆不因依明自論列執政詳驗功狀昭然皆可謂果矣夫南鄭亞赤永樂次畿及晉之趙城皆名邑也俾爾各為之宰冀乎有成嗚呼無或果於自謀而殆於從政可依前件敕華原甸服之重分水吳境之清宰宇疑至于屬僚不可輕往以廷溫在官有績罷退稍久景元侯表奏舉其才能資次命之疑缺各勤于職可依前件敕昌緯等宣宗皇帝命明法吏刪刑書為統類十編盡去繁詞而獨著元結縣令針其間是於養人之官殷勤深切矣岐山右輔之名邑固所重也而壁之白石邑之曾口委以養人之任豈以僻陋而輕哉以昌緯等勳臣所薦迹其勤效咸可寵嘉用爾大小等衆俾其並為令長噫風俗雖異戶口雖殊苟無忽于元針則皆可副吾旨矣可依前件敕張謨等或園陵攝官屬籍吉士宗正以其事迹貢表薦揚裴升等各以去任在官勞績深自論列情有可依丞簿陵邑各從資序可依前件敕太宗文皇帝論學書骨力喻政化根源朕既達微言則思觀真迹又欲廣書籍之府以正是非存忠烈之家以勵風俗三者皆吾夢想也而宋郁等進獻論列有以副焉丞簿文學用酬其意可依前件敕張建方古之孝子有為祖母而行服三年者雖有異於禮經而見稱於史筆繄爾至性過絶常流欲追昔賢信為高行然自東西漢以後南北朝以來大臣奪情固已多矣蓋以代更文質事有變通若皆徇私懷則誰當王事况爾職業至重委藉方深宜達奉上之規用叶得中之理從我曉諭是合章程可依前件敕吳承贊早負器能纍更職任清貞自立正直不回加以溫故知新鈎深知遠雅好六經之旨旁求百氏之言以此為官何官不理以此為事何事不行是用稱之清曹委以重務俾其稍展扶搖之翰用彰干鏌之鋒無自晦藏副我精選可依前件敕孫孟宣等並廉正操心溫茂成器自領職務皆著能名無纖瑕可指於㣥倫有嘉績可書於史氏聲譽既洽階秩宜遷噫爾有高才我有高位更宜升進勿自緘藏可依前件敕李全績等夫榮參禁署光總內朝贊文武俾不失威儀導君臣令無所壅隔永言斯任諒在得人以全績等行潔心貞神清氣爽加以洞達名法明解典章不以富貴驕人不以才能傲物居然重器逈出常流自領職司並彰殊效是用不移所任加以官榮無忘操持更俟遷擢可依前件敕楊魯潛萬方兵革之時所難者道路九府困乏之日所切者貢輸而魯潛不顧艱危任當使命俾其琛賮得至賞錫粗行嘉爾勤勞合為遷轉可依前件敕朕每思中興深念庶政至於近密之任尢資忠讜之臣凡所擢居莫非精選具官劉繼明等並介潔自持而器能相比各於職掌並著聲名論功考績之時既無差異加寵進階之日豈可偏私勉務殊榮更期超擢可依前件敕榮居近密任總重難君上之恩渥則殊而人臣之敬忌尢切其有端靜無失進退可稱而復以幹能彰於官業名隨位進行與才兼不有異遷何示獎勸宣徽小馬坊使某潔矩操心溫潤成器剛而不暴柔而不回宣徽含光某本於誠明文以禮樂止而不滯行而不流起復宣徽南院副使某明見事情智通微妙光而不耀晦而不幽皆調金玉之聲並秀松筠之色至於績效實為著明嗚呼守職奉公爾既盡其節矣崇階厚祿吾豈刓於印哉可依前件敕龜範代濟功勳志懷忠烈部領堔賮貢奉闕庭踰玉壘之艱越銅梁之險績效斯異爵賞宜加况奉職可謂歲深處衆獨聞位下不有升陟何謂勸能可依前件敕董全珝等副二之重其來尚矣雖古之列國小侯繼好一使猶尊命介以應事機况我大朝命官而中禁分職貴惟密邇務極繁難若不優以崇班何以責其所任以爾等並懷忠亮盛蘊器能名節不變于風霜勤勞仍彰於歲月况今方馳鴻霈合為升遷示以新恩雅符故事可依前件敕古之為將言有老母而三戰三北者朕每讀其書而非之夫為將者皆然則何以同在三之義勵士衆之心而逃無勇非孝之譏哉苟如斯亦其母之未賢爾忠武軍節度使王蘊方榮色養既孝而忠委以節旄遂稱名將賈勇而力過投石臨陳而義不聞金得非其母趙氏賢以善訓邪豈特築朱序之城寧陳嬰之族而已嘗錫以郡夫人之號今蘊功業益進爵位益隆宜加大國之封以助南陔之慶可依前件臣準西臺牒及金部稱奉六月二十七日敕內園院郝景全事奏狀內訟字音與廟諱同奉敕罰臣一季俸者右臣官位至卑得蒙罰俸屈與不屈不合有以事至分明別關理體若便隱默恐負聖時願陛下寬其罪戾使得盡言臣前奏狀稱準敕因事告事旁訟他人是咸通十一年十月十三日敕語臣狀中具有準敕字非臣自撰辭句臣謹按禮不諱嫌名又按職制律諸犯廟諱嫌名不坐注云謂若禹與雨疏云謂聲同而字異注疏重復至易分曉伏惟睿文英武明德至仁大聖廣孝皇帝陛下明過帝堯孝踰大舜豈自發制敕而不避諱哉故是審量禮律以為無妨耳即引陛下敕文而言不敢擅有移改不謂內園使有此論奏也臣之罰俸實為小屈然今者非敢訴此罰俸也實以從來制敕及百官奏表曾有避嫌名例而因臣致罰即舊章自此有援引敕格者亦須委曲回避便成訛弊臣今已罰俸不合上聞臣聞趙充國為將不嫌伐一時事以為漢家後法魏徵為相不存形迹以致貞觀太平臣雖未及將相忝為陛下持憲之臣豈可為論俸為嫌而使國家敕命有誤也且順宗廟諱萬國儀刑誠不可同於小事願陛下留意察納別下明敕使自後章奏遵禮律處分則天下幸甚古人言敬鬼神之禮有禱祠祭祀皆所以立不刊之典而教人孝悌非謂能為禍福而求益則何以言祈福歟若然者則必知鬼神之所在矣不然則何以知其益耶且書稱帝堯命重黎絶地天通無有降格以言天神不降於地地人不姦於天各有其所自然不擾也左氏傳稱大禹鑄鼎象物使人知神姦莫能逢魑魅魍魎此亦言捍禦僻邪也今據史記列堯先禹後年代甚明若既使重黎能絶地天通則人神已不降格矣夏禹何所加益而鑄鼎耶若禹非妄作實欲知神姦則是重黎不能絶天地之通矣研斯二説將為妄則列之經史以為實則甚相悖今不知鬼神尚在域中耶為前聖所遏絶而不通也有無之間果未可詳辨以為果有耶則宣尼固當語神而不拒子路問事也以為果無耶則丕山黔隧之逢不列於史策阮千里著論亦無復也自此以往或謂之有或謂之無竟無定止有無尚未知而君子敬之豈足求益耶然道固若是矣道斯在豈必徼福而後為哉若徼福而後為則是內懷詐偽曲諂之心非不愧乎屋漏也今江東委巷之禮祠夏禹蜀人則祀先主與武侯祈祝徼福昧亦甚矣且夏之後桀奔南巢蜀之後主面縛於成都苟有神禹先主武侯之靈何不救也豈有未能救其骨肉子孫而愛他人乎推而考之則鬼神未必能專為利害也設令能害盈福謙饗于克誠亦惟德所動吉凶由人而已豈變化所為哉易曰小人不見利不勸不威不懲若以鬼神未能福人而無敬是不見利不勸也未能禍人而無懼是不威不懲也可以君子而同于小人乎是故敬而無失匪有他也禁淫祀勵疏怠匪求益也苟有前聖之典籍在則禱祠祈福亦設教論道而已故君子敬順而勿疑易稱王公設險以守其國夫為國之衛恃於山川邱陵郛郭溝池自古而然也左氏傳司馬侯對晉主以九州之險而不以一姓恃險為殆此欲其夕惕戰栗而進德也説者不知言左氏與大易相反而曰非設險或曰孟子稱地利不如人和夫和不設險以為周備也何以言之昔周室肇基后稷業隆昌發玉璜佐命而寶龜卜七百之祀師逾孟津諸侯不謀而至遂雷詬風猋殷墟圮裂乃定鼎郟鄏遷都洛食聿修祖宗之業非棄德也而無險阻以自固遂使晉文作霸召天子於河陽楚莊問鼎之失足以為鏡矣向使周設秦之險秦法周之德則七百之期可以保強大萬葉之制可以無棟撓也且譬之御者焉闕二十一字今猶任商周之德業述商周之仁義然後阻江漢以險使夷狄賓因嶽鎮以險使諸侯順憑關梁以險使近甸安張四維以險使百官衆斷刑罰以險使盜賊止求明察以險使姦偽白險之時用大矣哉斯所以來遠鎮邇戢兵解甲而守終膠固也謹議魯僖公五年晉殺其太子申生先聖之書惡用讒也是時國中請諡不亦過乎詩曰溫溫恭人惟德之基亦曰溫恭朝夕執事有恪皆極言也是故子服景伯戒其徒曰陷而入於恭閔馬父笑之為周恭王能庇其昭穆之闕而為恭楚王能知其過而曰恭先王恭亦不敢自專稱曰自古在昔由是知恭固不易名也今觀申生之事未有得其稱者夫禍機將發子輿之謀狐突之諫明而知之既不肯用至於將死之日復不能以六日之狀自明而曰君安驪姬君非姬氏居不安食不飽我辭姬必有罪是我傷公之心也乃受賜而死嘻越哉其過也獻公雖暗昧好聽讒非中心知之而猶好之也以晉國之地方千里財用之給士女之衆求聘妃后豈無越於驪姬者哉然而獨任者專寵諸姬莫奪者得非希意釣情機巧甚密以傷君心使然耶如此則必以姬之行為善以姬之言為實安而任之漸至作亂史蘇所謂甘受逞而不知至夫事狀明著姦詐漏泄知其不善顯其不實如醉而醒如寐而覺震電憑怒執而戮之必使夬然剛決矣復安有傷心至於不安居飽食哉設令既戮之復思其儀質而怊悵者則亦念其欺罔忿恨矣謂恐傷心無乃謬歟且申生將使獻公達嘉聲于億載鎮令譽於千古甚于安其居飽其食也失令名于後裔貽讒言於孫謀甚於居不安食不飽也推此大義傷心猶亦不害况於無傷而遽至死耶遂使長惡不懲譖二公子豈曰能庇其昭穆之闕乎沉迷不返人諫而拒豈曰能知過乎親不能庇非執事有恪也過不能知非為德之基也此乃凝滯不通之論謂之恭君亦已過矣諡法曰壅遏不通曰幽如申生者真是也稽之典法改諡曰幽太子使夫後代知所以事君父之道必左右輔弼使不陷令名於簡册之中不獨虛死其身偷安尊者於日夕而已烈而悲者角之聲歡而壯者鼓之聲烈與悲似義歡與壯似勇夫軍以義集以勇進故軍城例樓鼓角于正門以嚴暮警夜二物用固均然凡發語雖先鼓及奏而角先鳴者蓋欲勇生於義云泗城據汴淮奔會處汴迅以射淮廣而吞擰勢雄重翕張氣象故其出人物義且勇與鼓角之聲相叶雖商販四衝舷擊柁交而氣不衰雜防禦使劉公郡人也其義勇智傑拔于萬衆間始為郡諸將黃巢陷關徐以西討急務在廣兵力按舊屬郡名取泗泗稱未奉詔不服徐師因大至公為都馬步司轉司衙皆總兵柄捍守連年徐竟解圍而去已而上欲久安徐泗卒以泗屬徐會有新防禦使昧軍機意泗人含憤復激令背徐不屬公執詔爭不得衆因大呼逐防禦使扶公坐公不得已詔亦因命公徐帥太尉巨鹿王感公於已絶他心曲折惟天子命相得蓋歡甚于故焉公既挈防禦印登城四面望皆拒戰後火燼餘或石拋所傾方圍急城中又壞屋給薪并是屋廬少全者乃鋭意自鞠鬬場上佐院稍稍營葺且謂鼓角樓者軍門眉首宜特華壯樓及左右鼓棚新者二十七間益揭其柱危其檻以激響日沉宵寒聽吹擊者疑岸浦泉窟龍吟鼉作時時相應和既而郡衆列觀欲咨文人紀績或揖衆而進曰公之功行甚多非止此樓門左右臂出廊及都廂等院凡二百餘間悉公重修又修孔子廟佛祠道宮觀文武吏舍靈山神宇凡數百千間又勸里人益構其居荒毀更新鬱鬱如春發寒槎又增武器庫旗矟千竿鎚百柄甲裝三百劍千環箭六萬羽弓弦角千凡營制悉以家私財佐用又教屬縣樹桑柳棗榆至二萬本縱脫無名役除律敕外亶立條歸之簡切用是人益附親逋竄自返萬三千戶朝客中貴人往來饔餼餞迎如完盛時防獲淮浙等貢上錢貫數百萬此其大略公所以能若是者由誠者公具侍下懇為尊中丞郡太君得拜封爵邑連表乞歸侍其誠切動人如此所以能堅奉明天子以首出其政耶由此言之豈一樓而已乎且公用孝資忠用義發勇其壯烈聲又豈鼓角足配乎安可但記一樓而遺他事乎衆曰然則何如而可進談者曰吾聞古人以玉况德以器銘功豈玉足况器足銘耶蓋借玉為喻因器而盡銘他善今儻告文人請借鼓角以况公心而因記樓盡述公之功行可乎咸曰善然健于筆者不能寫是當緩以俟之積月而史官尚書司封郎中李磎自淮楚趨闕驛泗于是郡從事張信與同僚及將吏等磨石濡筆且以衆志白于公請磎為記磎不敢辭即所聞實書于石於戲樓以中和五年二月二十八日成以其年九月三十日書魏曹元首六代論稱夏殷周與人共治歷世數十秦王獨制二世而亡亦言周氏陵夷侵弱大抵非秦廢五等之爵置郡縣之官至晉陸士衡著五等論陳八代秦漢興亡之由言五等之制始於黃唐郡縣之治創自秦漢以為周制萬邦思治㣥后圖身及承微積弊王室遂卑猶保名位祚垂後嗣秦棄道任術顛沛之釁實由孤立夫百世非可懸御善制不能無弊侵弱愈於殄祀土崩痛於陵夷欲權其多福取其小禍總二家之旨皆是五等而非郡縣徒苟救於疾顛而未免於陵夷也譬猶醫者苟欲救人之死而不能愈其病苦豈謂知經脈藥石之本決存亡禍福之機乎且陵夷土崩二患俱免者豈無通論哉但二家不能知耳故皆引五等之長説郡縣之短元首則言五等藩衛引春秋勤王之事以為證欲使秦人割裂州國分王子弟使土有常君人有定主士衡又謂五等之國為已土衆皆我人人安我受其利國傷家嬰其病故為已思治郡縣之長進趨之情鋭安人之譽遲是以侵百姓以利己損實事以養名故為利圖物以為諸侯享食茅土萬國受世及則南面之君各務其治九服之人知有定主此皆不知之説也夫春秋之時諸侯亶相攘伐苟欲求霸則以正王室為事故曰求諸侯莫如勤王外雖詐忠以邀名內實包藏禍心以圖神器此老子所謂將欲弱之必固強之也豈所以為藩衛哉所謂為己思治者誠憂其國傷其家病而致治矣且若國不富兵不強則未出於傷病也若富國強兵疆陵弱衆暴寡蹙而為九并而為七是豈非古制耶故知雖少其力猶益也比身臂則不同矣夫身手者大小常定也諸侯之土變易者也向使臂指能變而為大小於身又烏可得而使耶是知五等之制不計於大小強弱皆得亶權獨斷自有卿相恣之則不遜削之則怨陵夷逆節固必有矣且士衡云勢足者反疾土狹者逆遲夫土狹既不免逆豈過正境土者之災耶假令小制七國則反有遲速者之小異耳豈知郡縣之主權弱勢輕跨有千里負阻山嶠姦謀未畢而身已遷代然而強兵練甲足以禦四夷之患人徒租稅足以滿家國之急則未必無土崩之事而秦漢俱敗豈由此耶元首又徵秦之敗於委政趙高誅夷宗族西漢則王氏亶朝排擯宗室後漢則閹豎執衡孤立於上此乃滅君親臣強之殃而非郡縣之失也設有侯伯之國則亦助亂而已焉足賴哉由是觀之五等與郡縣其利害相去遠矣向使早覺悟廢五等世及之法立郡縣可制之符以矯周枉威靈不假於臣下及刑戮強兵耶疑則必修文武之業設霸王之術設業固則帝位危矣雖各安其國置天子於何地豈可以為思治哉今郡縣或侵百姓損實事然而升降黜陟在於一人比之侯伯固不為大患也又且奉京師之法稟宰輔之威雖職官遷轉不一而法已定矣五等者世及相承亶更法令如魯作邱甲晉立六軍鄭鑄刑書如此者實繁天下所以安上之國土非愛事身與子孫也安與不安在於立教化正法令國雖一姓而法已萬變豈所以為知有定主哉由是知曹陸之論所謂藩衛者乃篡逆之萌也思治者乃禍亂之萌也定主者乃不定也夫如是則焉有不為患也昔漢有吳楚七國之患元首乃懲之於高祖封建地過古制引賈誼之言欲衆建諸侯而少其力使海內若身之使臂臂之使指則下無背叛之心上無誅伐之事士衡亦謂漢大啓侯王境土踰溢以七國為過正之災若然者則班固漢書贊言周制千八百國戴記分天下為九州二百一十國則千八百九十國也公侯百里伯七十里子男五十里其為褊小已極矣其卒也強不一一於骨肉以懲秦失去其弊政用其上策如此則可歷世長遠而支派強大矣豈有周室陵遲嬴氏土崩之釁乎王坦之作廢莊論一篇非莊周之書欲廢之其旨意固佳矣而文理未甚工也且秖言其壞名教頽風俗而未能屈其辭折其辨是直詬之而已莊周復生肯伏之乎其終篇又同其均彼我之説斯魯衛也然則莊生之書古今皆知其説詭於聖人而未有能破之者何哉則聖人果非而莊周果是矣既莊生云非聖人云是是何為不能勝非哉余甚憎之或有曲為之説使兩合於六經者或有稱名實學與元奧不同欲兩存者皆妄也故荀卿曰天下無二道聖人無兩心則異術必宜廢矣余既悟荀卿言嘉王生之用心而憐其未盡故為廣之云世多以莊子為元奧吾獨以為粗見理而未盡耳汪洋七萬餘言然撮其大旨舉類而證其得失可見矣且觀其體虛無而不知虛無之妙也研幾於天命而未及天命之源也樂言因任而未知因任之本也窮極性情而未盡性情之變也何以知之夫虛無用之心也必憑於有者也有之得行也必存於虛也是以有無相資而後功立獨貴無賤有固已疏矣且所謂無者特未明也惠子以其言之無用而應之曰知無用始可與言用矣今夫地非不廣且大也人之所用容足耳側足而墊之至黃泉人尚有用乎此言假四旁之無用也以自喻其虛辭則敏矣然無用之説有三不可混而同一有虛無之無用者有有餘之無用者有不可用之無用者虛無之無用者則老子埏埴鑿戶之説其用在所無也有餘之無用者則側足之喻其用必假於餘也不可用之無用者苖之莠粟之秕也今莊之壞法亂倫是秕莠之無用矣而自同於有餘之無用不亦謬乎此所謂體虛無而未知虛無之妙也稱屠牛而善刀牧羊而鞭其後指窮於為薪皆在生得納養之和壽矣故譏滅裂鹵莽者責袵席之上設食之間而不知滅者然而衛靈公石槨之銘修短必有天數矣豈在鞭與不鞭養與不養哉其理自乖舛此所謂研幾於天命乃未及天命之源也夫因任者因㣥才可任而任之耳而莊生欲天下而不理曰聞在宥天下不聞理天下也天地固有常矣日月固有明矣星辰固有列矣樹木固有立矣禽獸固有㣥矣以為上古至德同於無知其德不離同乎無欲是謂素朴而人性得矣自懸仁義禮樂而人好知爭歸於利也斯甚不然夫天地日月樹木禽獸不假理者也人則假理者也人生必有欲有欲之心發於自然欲不能無求求不能無爭爭不能無亂故聖人立仁以和之陳義以禁之而反以為害之者則今戎狄之相劫殺魚鱉之相啖食孰行仁義禮樂於戎狄魚鱉之間哉含氣之類莫靈於人物有知也有欲也而人反無之何如且果無知也果無欲也則凡是非好惡分別賢不肖宜皆起於人也而稱厲之人夜半生子遽然取火而視之汲汲然恐其似已者言人皆欲好善而惡惡故可放之而自理也夫厲之有是心也豈非聖人之分別驅動使之然乎安可放之耶如曰天機非由於聖人則人固自有知有欲矣仁義禮樂何罪哉此所謂樂言因任而未知因任之本也自生人以來莫不有爭上好勝之心未為之法則爭歸於義先王知其然也故高為之法訓而峻為之行而人競學之亦是爭勝已而爭勝之循道也猶火之燎上也因為之竈以煬之水之趨下也因鑿之溝以注之是亦燎注之得宜也燎與注者得宜則無焚溺之憂矣爭與上者循理則無暴亂之禍矣由知其本而順理之也然則無竈焉火固自燎矣無溝焉水固自流矣將壞竈以絶燎毀溝以息注勢必不可也徒使燎與流者失宜耳無賢聖焉人固有所希慕矣不尚賢殫聖法削曾史之行以絶人之好慕果不可絶徒使所慕所好在於非理耳由不知其本而逆施之莊生徒知好高慕上之離其本而不知好慕之心發於天機欲絶聖賢使天下各止其知安其分而無所慕何異於毀溝壞竈以止水火者乎其術一何迂此所謂窮極性情而未盡性情之變也用是以觀彼於虛無焉天命焉因任焉性情焉譊譊然道之而無一洞明者不知元奧者固如是乎故曰粗見理而未盡者也雖根源老氏而詭聖敗法尢深王生欲廢之宜哉或曰莊子皆寄言爾以名實按之不亦疏乎夫寄言者若大鵬斥鷃肩吾連叔雲將鴻濛漁父盜跖求其理者不可責以事也誡惠子以嗜鼠曹商以舐痔違其趨者可謂之忿也如是吾豈不鍊哉若理之所塞趨之所壅則託以寄言而免也至於稱至人得釀氣之守潛行萬物而不空得道者挈天地騎列星外死生而色若孺子者公為虛誕無足詰焉蔡襲者自言裨將也不詳其氏族源胄至襲居北部振武軍學擊劒沉勇好奇謀功名初無知者嘗任氣與人鬬而斃之時故司空劉沔以右僕射為振武節度使聞之收襲繫獄將杖殺之經宿而死者復蘇故襲得免死謫役數年沔移鎮河東武宗初胸奴犯邊詔沔河東及諸道兵出征襲聞邊方有事將因之以立功乃逃其所務來叩沔曰往君免襲之死是明公屈法申恩而襲之大幸也今天兵有伐於北虜竊願施犬馬之勞於軍前上得以酬君之恩下乞以自補其惡死生畢矣沔聞而壯義之命厠諸卒官軍至大寧聞胸奴已入振武界時大和公主在蕃多年又聞振武欲奪公主沔恐公主為振武所得蓋己功籌策未知所出諸將吏莫能謀襲乃請詐為捕逃者至胸奴營動搖令入河東界沔深然其計遂遣襲往襲至胸奴所揚言云振武鎮守欲殺汝曹河東劉僕射是招撫使若不移必為振武所害胸奴有得此語者遽歸寧武遂移部曲次于屈越城西已在河東界去官軍猶二百餘里襲歸告沔欲奏恐詔問須生口為據襲又獲生口十二人馬十五匹主帥乃具事上聞自後屢有詔令奪公主沔患胸奴衛帳遠欲其近又不能襲遂請以資糧入蕃招引沔從之襲至蕃中見公主公主流涕告以北蕃破亡疾飢孤危無告襲對曰聖明在上公主何不與單于議同入奏以困急耶公主曰此已曾議單于為我去必不還事已不諧矣言畢襲請對單于謁者高達于曰單于自離本國復中路不宜與使相見有故但可與蕃相論之襲遂見蕃相相曰吾病飢竄亡唐不我恤今日唐使來幸得無可懷襲對曰為不知單于消息捕得胸奴十二人詰問方知在唐界外數月河東劉僕射令以資糧一十橐馳寄公主單于宰相兼遣詔命如能南下則所匱竭易相助也今部落甚遠安知旱歉如此蕃相曰人不能曉公法昨者飢莩不得已有所犯干今日汝必以此故來誘殺我遂推襲出帳令步卒以弓弩圍繞曰不露情必當射殺襲曰國家實命招恤如信即往疑盍走諸蕃後悔亦無及矣今虐我何益蕃相曰我若徒走諸蕃亦何悔襲曰單于大蕃與唐為親有舅甥之恩輔車之勢破亡祇宜歸唐反入諸小蕃若為小蕃所蔑安得不悔蕃相乃曰我今歸唐但恐汝主誤我汝若真招徠當為我重誓約襲曰凡作誓者急則萬端襲之為誓異于是遂引手蕃相前請斷左手腕以為誓顏色不動辭令甚壯蕃相不許曰且為我劈心出血後自飲之亦足為信襲乃于心上出血置器中而誓曰我若誤汝入唐境而攜二心天必殛誅烹醢分劈言畢飲盡器中血胸奴乃信遂移帳至雲州北塞谷山東與官軍相距六十里後又詐稱弋獵侵掠振武不利引歸襲在虜庭多日恐不得歸乃誑單于相云更于雲朔州為蕃國取資糧因遂得歸具告沔以誘得胸奴近塞兼胸奴新劫振武還兵勞瘁又以唐家招徠不設備若奪公主必宜乘時疾往沔許諾命將校石雄王峯等與襲皆至單于帳合圍大破之襲突入帳中挾公主于馬上出十數步恐官軍不知誤傷乃呼曰此乃公主也石雄聞以步卒三十人奪之歸公主至河東悉數其事于劉沔又嘗書襲名于尺素中許以上聞又言于監軍呂義忠曰無蔡襲吾不生還矣其知如此公主既歸京師沔加司空石雄授天德軍防禦使唯襲非大君所知主帥不為奏公主亦竟不能為言功業籌策遂曀而不顯而河東絶滅胸奴至今邊塵宴清者本襲運籌之力也會昌二年劉稹據上黨反楊辨於大原乘間拒命見獲四年上黨平今上大中四年南山黨羌反自會昌二年及今征伐襲並有勳績其功皆録在河東簿書惟破胸奴為首功而為人所掩耳至今部曲將校無不稱其智勇李磎曰甚矣功名之見沉也一至於是然古人嘗稱位可排而名不可奪矣由蔡襲以言之其可奪耶其不可耶始余于京洛間聞説者多稱劉石有破虜之功及至太原聞蔡襲方知為舉代之惑也悲夫功業卓然尚可掩抑况才藝耶余念其勤而無益故詳足其事為傳云
