front:
  text: 全唐文欽定全唐文卷三百九十三獨孤及十
  hash: sha256:a01c293ba37f29508f4fb380a55a293455ec9e8eb312ae852342b3e679a80aa7
body:
  text: 夫人河南洛陽人也其先劉氏出自沛獻王輔其裔孫因山命氏中復姓劉自獻王十九世至齊行臺尚書令永業始復為獨孤氏自臨川至潁川郡長史府君六葉明德道炳於世夫人潁川府君長女性聰異有志尚寬仁慈順加之以明柔而不惑儉必中禮歸鄭氏生二男二女而寡男始孩女未齔鞠而育之導之義方長男曰季華次曰子華既長皆敦説詩禮被服文行時人稱夫人善誘善教乾元三年因洛陽再擾隨子北征永泰二年某日終於巨鹿郡享年若干嗚呼仁而宜壽慈儉宜福二者反是為善者惑焉初夫人少因有行思歸寧而不得晚值多故去邦族而無復由是終身有遠父母兄弟之痛焉臨終顧其子葬我必於先大夫之壠季華等泣奉遺旨大歷三年歲在戊申以夫人之喪至自巨鹿冬十一月庚寅反葬洛陽龍門潁川府君塋兆之側夫人之志也及敢書伯姊之德銘諸墓石云有唐逸士吳郡張從師沖和純粹辨博宏達卓犖好古儻蕩逸㣥言不近名惟代耕是謀貞不絶俗以忘機為心秀才高第起家臨濮縣尉歷馮翊伊闕二縣主簿乾元元年拜監察御史御史中丞鄭炅一作旻之擁旄濟江辟為從事轉河南府法曹參軍凡歷官五政享年五十八忘懷樂道終始以之攘臂於爵祿聲利得喪虧盈之間如浮雲無心野鶴獨立形全神全身與化俱上元二年八月辛卯終於吳郡私第其孤惟儉惟靜能稟謨訓弱歲皆精左氏穀梁春秋藐爾在疚零丁何怙季弟祕書省正字曰從申乃茹天倫之哀謀及卜筮以是歲九月二十八日權窆於虎邱山之西原禮也初公祖損之隋大業中進士甲科位至侍御史尚書水部郎損之生烈考浤一作法以碩學麗藻名動京師亦舉進士自監察御史為會稽令文雅之慶施於後昆故擢秀才而衣繡衣者及公三葉君子以為榮少好黃老且修禪慧晚節持六經微言以遺三子三聖之學不墜於地君子以為博詼諧不羈頡頏傲世視軒冕纓紱如塵埃必也臨事能斷義形於色推賢進善不進不止君子以為達當伊川啓戎歷陽為魚公力窘身陷者至於再涵泳沸鼎揭厲橫流而迹無緇磷憂患不能及君子以為智宜享黃髮而升青雲天胡降凶殲我仁人嗚呼先生往無返期談藪清風詞林逸韻墨池真草三事永絶凡今友朋可勝痛乎恐後代邱隴將平川澤相失求遺迹者莫知德音之所始乃志之於石永為靈表公諱某其先劉氏出自漢世祖光武皇帝之裔世祖生沛獻王輔輔生釐王定定生節王正正生長子廣嗣王位次子廙仕漢為洛陽令廙生穆穆生進伯為度遼將軍擊胸奴兵少援不至戰敗為單于所獲遷居獨孤山下生尸利單于加以谷蠡王之位號獨孤部尸利生烏和烏和生二子長曰去卑為右賢王建安中獻帝自長安東歸有李傕郭泛之亂右賢王率其部衛車駕還洛遂徙許復歸國卒次弟猛代立生嗣論嗣論生路孤路孤生眷眷生羅辰從魏文帝遷都洛陽遂為司州洛陽人始以其部為氏用勳伐錫爵永安公位征東將軍定州刺史征東生萬齡官至廷尉諡曰貞廷尉生稽字延平善左右射學究金匱之奧魏世祖初從平滑臺以功授散騎常侍歷守冀定相三州時新定律令慎選廷尉徵公拜焉再世為法官俱以廉平不苛顯名當時榮之加鎮東將軍薨諡曰文鎮東生歸辨聰而才又為鎮東薨贈太尉太尉生冀字希顏以博學侍講東宮歷安南將軍定州刺史贈司徒司徒生永業以文武兼備佐齊王入洛定鄴都督幽洛二州由行臺尚書令升司徒封臨川郡王語在齊史臨川王生子佳在齊為徑努將軍在周為儀同三司在隋守清遠一作懷朔鎮握節死難贈并州刺史并州生義順武德中歷戶部侍郎尚書左丞光祿大夫封洛南郡公洛南生左千牛備身諱元慶公之祖也千牛生朝散大夫定州長史諱思陳公之父也二十三葉之德善鍾其人一作仁於公公剛方廉清貞信宏寬德厚性和與四時氣侔非天下之直道不行非先王之法言未嘗言當出處去就之間非抑與不苟求與朋友交非同道不苟合至守王事臨大節非其正雖臨大兵不懼恪德危行居易中立不可得而親不可得而疏讀書觀忠孝大略不索隱賾屬詞止乎禮義不止詠情性而已太極元年詔舉文可以經邦國者宣勞使源乾曜以公充賦時對策者數百人公與滎陽鄭少微特冠科首起家拜同州郃陽縣尉歲滿授好畤縣尉開元十四年元宗初登封泰山注意二千石令長以煦嫗下民授公益州溫江令公治縣如治家明不至察威不至猛去煩苛繳繞之政施德信刑禮以訓齊之溫江人飲公之化逋者復疲者悅善者勸不善者知恥益州刺史張敬忠以狀聞詔授監察御史轉殿中侍御史會權臣惡直斥去不附已者貶公廬州長史明年惡直者罷位公稍移武功令未到官病免二十三年除寧州司馬二十八年遷潁川郡長史初公為御史嘗以直忤吏部侍郎李林甫是時林甫當國常欲騁憾於我而五府三署每有高選㣥公皆昌言稱公全才且各以臧文竊位自引由是得免於咎然十年再遷而位不離郡佐或勸公卑其道可以取容於世公曰可卑非吾道也屈伸天也非人也人其如豫何天寶元年加朝散大夫二年七一作二月七日寢疾終於位春秋五十七位不尊壽不遐志不行善不報其直虛語守道者相弔以為痛是歲八月殯於郡東至德二年歲次丁酉十月十四日權遷窆於洛陽龍門山西岡大歷四年五月十三日詔贈祕書監命卿之位錫於身後嗚呼哀哉夫人河南洛陽人也薛國長孫覽之元孫咸陽縣丞諱頓府君之女左金吾將軍諱子哲府君之妹稟天元和生知孝慈含德之厚與坤體合執筓助祭四十餘載人莫見夫人喜怒之容躬勤順承動叶禮經宗族以睦長幼以序無言無為化成於家公之加命服也夫人封封邱縣君泛等既孤夫人棄采蘋之度修釋氏教受正觀法於長老比邱尼上方服勤一年得四念處三昧視去諸結猶棄涕唾至德二年隨子東征明年歲在戊戌七月二十四日終於會稽享壽六十有四八月某日權殯於雷門之南泛巨及正等遭天不弔無恃無怙以世故坎壈不克遷祔者十一年矣欲報顧復天胡有極今年問宅兆於前都水使者張係係卜甘泉東伊水西甘泉鄉之原吉謹以歲次已酉秋七月壬午遷公夫人靈坐合安厝於此原猶懼陵谷世人之不我期也故不敢不志抆血勒石以貽後嗣曾祖仁基隋光祿大夫行左光祿大夫皇朝贈使持節都督原州諸軍事原州刺史諡曰忠祖行儉皇朝銀青光祿大夫禮部尚書聞喜縣開國公贈太尉揚州大都督諡曰獻父光庭皇朝光祿大夫行侍中兼吏部尚書正平縣開國男贈太師諡曰忠獻絳州聞喜縣崇慶鄉太平里裴稹年若干行狀公天姿英拔德宇宏曠禺昂公器磊砢高節武庫森戟玉山照人起家以門調補千牛備身歷太子通事舍人太常寺主簿是時萬邦方乂獻公當國天子垂衣穆清以有天下而衮職之闕疇咨之府公入則竭力出則匪躬外詢輿人以備過庭之問陰薦多士用宏審官之選既而濟濟俊乂爛盈東閣邦之得賢於斯為盛畫一之詩作而嘉魚之頌興公之幹蠱也轉京兆府司録參軍輦轂之大綱轄之劇牒訴浩穰文墨填委公遊刃餘地而大郤斯批若網在條而衆目不紊談笑之隙簿領肅如論者知逸驥之足方自此始開元二十一年忠獻公捐館惸然在疚哀越乎禮會執事者醜正作福怙寵匿怨乃因喪乘釁將逞憾於我言之如簧上亦投杼公乃銜恤進牘呌閽抗憤危言自明至誠旁感由是宗祏垂祉高天聽回恩方照微神亦悔禍卒令臧孫有加等之葬公業有不忘之歎公之克家也服闋授起居郎載筆丹墀書法不隱開元二十四年三庶人以罪廢事出宮闈變生飛語時壽王以母寵子愛議者頗有奪宗之嫌道路憫默朝野疑懼公乃從容請間慷慨獻諫上述新城之殷鑒下陳戾園之元龜謂興亡之由在廢立之地天子感悟改容以謝因詔以給事中授公公曰陛下絶招諫之路為日固久今臣一言而荷殊寵則言者衆矣何以錫之上善其敏而多其讓乃止不拜尋除尚書祠部員外郎恪居禮闈休問惟穆宏濟之略因為已任於時搢紳高議方以青雲期公不弔昊天降此短歷開元二十九年某月日薨於私第春秋若干君子謂公貂蟬之葉瑚璉之器壽不及黃耉名不登明堂天其未亡狐趙之勳成宣之德也非昌其身必大於後果介繁祉有才子四人長曰倩尚書駕部員外郎兼殿中侍御史江西道租庸鹽鐵等使次曰警尚書司勳員外郎兼殿中侍御史參中軍元帥雍王軍事次曰倚殿中侍御史試守萬年縣令季曰侑太原府榆次縣尉構廈王褱材切玉利器價敵三虎族擬八王朝廷褎之方倚以成務元年春建辰月肆大眚命有司録勳追舊於是詔贈公諫議大夫猶以禮未超倫位不充德秋八月下詔曰贈諫議大夫裴某操履貞純器能溫敏素推雅望嘗踐清班志業屈於當時風猷悲於既往顧其允嗣久在周行雖禮及前修已申追遠而恩霑後命宜有贈榮俾高列嶽之班更表重泉之飾可贈使持節陝州刺史禮也公天機超邁雅有大略氣直而溫性擾而毅貞可幹事善足救物外坦蕩豪舉朗然不羈內敦敏純固忠而能力至若輕死重義貴身賤名視錢帛如糞土戲公卿若草芥其於履危機臨大節則氣冠賁育徑侔風霜未嘗以得喪夷險蠆芥於胸臆詩云昭明有融高朗令終公實有焉謂宜荷天之休俾熾而大龍泉未試隙駟先往天乎斯才而有斯壽今寵優八命澤及九原已申追遠之恩請遵易名之典寶應二年某月日故吏某官某謹上某年月日某官某乙謹以清酌少牢之奠敬祭於故蘇州刺史兼御史中丞贈吏部侍郎李公之靈嗚呼天以純粹鍾美於公孝友慈惠公廉貞直事君以忠臨節有勇可以師表鄉黨儀刑搢紳宜荷百祿乃朋三壽孰司物化曾莫輔德諸公不死公獨返真官不過八命年未踰六十豈五藥乖養九藏失節以及此乎將修短之域窮達之數止於是乎前期幽報如所修乎俯觀生前亦有恨乎昔公出入臺閣勤勞王事馳驅使車周旋天下克已奉職一何正也姑蘇之役姦幸搆難公秉義勇誅其渠魁海寇圍逼勾吳震駭公率羸師克翦大敵奇謀生於死地貞節見於孤城夫豈惡生誓無奪志臨危致命一何壯也濯纓來朝祗若王命三府高議方以黃散咨公天乎無知不從人欲旅櫬委於空館妻孥恨於遠道其來也駟馬朱轓其往也孤轊丹旐天子興悼台臣雪泣情鍾我輩哀可既乎某乙等義惟寮友季卿等屬忝宗族歡愛如昨書札猶新伸眉未幾交臂忽失形骸留此魂魄何之鳴琴潺湲恍若在耳前路冥寞良遊無期靈之來兮歆此薄酹尚饗年月日某官某乙謹以清酌少牢之奠敬祭於黃門侍郎兼吏部尚書御史大夫嚴公之靈嗚呼天惟匪忱才不必壽冉耕斯疾顏回短命吉凶兆眹凡聖共惑惟公茂質見於芳年菌蠢九葩磊砢千丈頃嘗戮力當代以智開物若發硎之刃決雲切泥長安浩穰憲網疏漏天子命公尹京執法能秉直道以張皇綱盜奔訟清周月報政巴蜀亟擾上為旰食公之攸徂亂亦遄已昆夷授首卭僰飲化乃加冢卿為天喉舌謂當任極台鉉壽如岡陵青雲可攀白日忽暮嗟來桑扈溘與化往孰云夫君而有斯命藂蘭春敗大壑夜失非君興哀吾誰為慟昔公先中書以道消讒勝不踐衮職公復算屈短歷卒無相印蒼生孤望前後同悲曩子論交於豫投分形接意敵聲應事感俱涉世故纍荷寵榮豫忝台司公亦亞相大駕東狩獲陪屬車各負羈絏同扞牧圉誠節見於多難交態彰於困蒙願言悉心共獎王室鎮蜀之役南北頗限猶易前期未嗟少別別未艾也死生間之夙昔歡愛今反為悲真宰何人壽夭誰司善而無報天豈豫欺憶昨攸往火旗電輜今也來斯白馬龍輀鯉書遂絶雞黍無期惜無寶劒挂君松枝旨酒一壺幽明此辭尚饗年月日尚書右丞楊綰吏部侍郎李季卿吏部侍郎王延昌刑部侍郎魏少遊工部侍郎徐浩謹以清酌少牢之奠敬祭於故相國李公之靈嗚呼宗祏儲祉降神生公稟天純懿為國柱石負荷大業儀刑本枝九居專城六處八座五領憲府兩登台司惟公廉忠信是務惟寬厚清靜是守危言獻可未嘗脂韋取容直躬而行不為權幸改操三已無慍一麾乃出其茂勳崇名遺芳餘事輝映策牘標準搢紳所蒞之邦於今頌美若鄭人之思子産周人之歌召伯謂公福如山阜壽登期頤為天子元老以弻成庶政溘與化往嗚呼曷歸何萬人之具瞻與天命之相違窺遺塵於臺閣想見公之容徽嗟道申而壽屈痛迹是而人非綰等恭承嘉惠昔嘗登門接後堂之歡娛參東閣之討論謔浪在耳書札是存奈何少別忽間九原尚饗年月日某官某乙謹以清酌之奠敬祭於故右散騎常侍贈禮部尚書李公之靈嗚呼沖粹之氣生德於公忠孝貞諒聰明宏達卓犖特立英明虛受自司翰持衡觀風執法周旋三閣出入十載能直其道而正其身致命臨節仁而有勇造次顛沛義形於色莊敬發於談笑孝謹扇乎閨門若天祚明德神與正直公宜錫慶鍾壽俾大而昌於何官不至三事年不及六十積德無報為仁者惑焉今行及先遠將安宅兆嗟來桑扈往無返期追思生平夙昔歡好懇款交臂之分殷勤同心之言今則冥寞無非夢想非夫人之為慟吾誰為慟不知神之所在彼乎此乎旨酒一樽庶以為別尚饗年月日某官某乙謹以觴豆之奠敬祭於故某部郎中兼某州刺史員公之靈吳越夭夭心歲元元艱食帝咨四嶽分命於公克勤於邦克儉於家忠而能力剛亦不吐出入臺閣將十五載動合律度言為程式及茲剖符銜疾受命而慨然有表正東夏澄清江湖之心海隅蒼生方望公以大庇朝廷搢紳期公以上台而悠悠蒼天屈公以下壽時既須而命不與智未窮而生有涯嗚呼哀哉昔公繡衣持斧豫忝接武於朝公負譴投荒豫亦左袵異域山川有間交情無極各隨流波在天一方險阻艱難亦既備嘗邂逅相遇荊蠻之鄉惠而好我何日能忘浙右巨鎮甬東孤城風煙相接弔伐同盟未及前驅莫申微誠遽聞沈疴忽間死生九原誰歸萬事長往夙昔歡愛無非夢想舟逝壑走吾將安仰隻雞之薦靈兮歆饗年月日前華陰縣尉獨孤及謹以清酌庶羞之奠敬祭於衢州司士參軍李君之靈惟君砥節礪行抱粹含純剛亦不吐直而能溫筮仕誠立安卑道存宜錫難老亦高其門奈何盛德迫此短辰追惟夙昔修好於君托以良援申之昏姻勸我以義敦我以仁各徇薄宦俱期致身頃復離別幾為胡秦契濶乖阻艱難苦辛君限靡盬陳力甌閩豫集荼蓼零丁海濱弔恤何深舊好殷勤贈言如昨尺素猶新倏忽長往吾誰與親常日音徽平生懿文今則已矣長為古人憐君不知哭君不聞瀝酒墳草灑淚隴雲庶因薄奠髣佛精神尚饗年月日華陰郡守李某謹以清酌庶羞之奠敬祭於故禮部尚書裴公之靈嗚呼元精純粹生德於公峻極降祉貞明在躬濯纓登朝事君以忠出入三閣周旋兩宮褰帷井陘推轂盧龍喉舌是寄淑問斯崇鯤背垂天鴻毛順風亦既左官時更困蒙夷險能齊高明有融三已無慍再命滋恭肇受方伯俄升秩宗將陳謨謀以佐時雍如何不弔降此鞠凶珠履聲絶蒼生望窮機返太素勳留景鐘杳杳龍輀瞻言徂東敬飾薄奠邀神昊穹靈顧來饗髣佛音容嗚呼哀哉尚饗年月日禮部員外郎獨孤及謹以蔬飯壺酒致祭於故吏部郎中元公之靈上士齊死生下士愛生惡死而惑之知生死若幻而不能忘情於其間者我輩所不克免始者與公同弔死問生論議亦頗嘗及此豈謂言未絶口而公又長往昨日經過遽成疇昔何變化之速乃至於是視不及瞬言不及息嗚呼元君今已返於機夫彭祖殤子同歸於盡豈不知前後相哀達生者不為歎公齒髮未老官途方半相視而笑冀前路各有所展豈圖間濶數日而死生間之竹林如故階塵未掃惟人琴兩亡影絶響滅湯湯清弦豈可復聞承以令辰將赴塋闕痛天道之茫昧豫豈無言而悲來從中遠復抒意匪祭也永以為別也尚饗年月日舒州刺史獨孤及謹以清酌嘉蔬柔毛之奠敬薦於故尚書工部郎中壽州刺史兼侍御史張公之靈頃者剖符為郡與公鄰邑祗役往復日以攜手嘗辱嘉惠愛我則深奈何此別後盈魄未周相去無山川之間才聞嬰疾遽告不幸古詩稱一息不相知今乃爾耶別時高論精義在耳袖中尺書灑翰猶溼而形影驟滅了無還期雖欲效古賢謂悲哀為怛化情莫可遏徒虛語耳惟公貞亮溫毅強學好古人皆窪而盈曲而全公獨以峭直接物雖悔吝不改其度人多求田問舍公獨以百家言為寶藏書至八千卷而不止以斯道也施於有政故其德形於事業其仁浹於百姓楚人壽人如得陽春識者揣公壽與位偕今也溘焉而人何望嗚呼王事拘限會葬莫及思賢歎逝執紙涕零若久要之不敢忘也豈不顧饗於今日蘋藻之奠尚饗年月日朝散大夫檢校尚書司封郎中兼舒州刺史充本州團練守捉使賜紫金魚袋獨孤及謹以嘉蔬柔毛之奠敬祭於故揚州大都督府長史兼御史大夫淮南道節度觀察處置使韋公之靈王命九伯砥綏四方惟公剖符作藩維揚往歲斯民匪迪匪康自公戾止視之如傷飾吏以儒出言有章革剗煩苛載戢暴強將吏奉君若網在綱罔或作威以紊典常民斯輯睦政亦允臧和氣被物豐年降祥天之輔仁公宜熾昌奈何不淑景命遽央百城悼心萬民何望及忝列城備守封疆獲宥罪戾庇身餘光德宇所覆今也則亡偏思遺愛追蹈餘芳俯仰興懷望慕悽涼拘限所職路阻且長遙抒下情旨酒一觴尚饗維年月日司空右相楊國忠吏部尚書同中書門下平章事韋見素等謹以少牢之奠敬祭於西嶽金天王之神頃自獻歲達於三月畜極不雨屯膏未光元元其咨滌滌是懼國忠等是用虔奉睿慮聿遵祀典謹遣鳴皋山人韋朝真敢邀福於大神之靈精意才申而休祐肸蠁宸衷遙達而瑞澤滂沛非神之幽贊叶於國神之景命符於人則疇能降祥薦祉如此其速故簠簋犧象敬修享禮雖冥應無方非馨香所答而神威如在庶明靈惟歆尚饗維年月日司封郎中兼舒州刺史獨孤及前舒州司馬皇甫曾等謹以清酌庶羞之奠敬祭於故侍御史舒州桐城縣丞韋公之靈昔公執法柱下某等接武周行嘗趨後塵飽聽公議某既出守曾復播遷公亦負譴黜官辱同官為寮之好敢不知孝悌忠信強毅正直樂善惟恐不及嫉惡不去不止分枉直於心識以澄清為已任形於造次發於自然謂必眉壽且鍾介福奈何強壯之年大才先謝志業所趨未申萬一有生之涯溘然永已慈親羸老弱子未齔反葬無望委骸他山等為歸真艱痛太甚天不我弔哀有何極某等頃嘗以樽酒豆肉邀君同歡今之所獻猶前樽也但夙昔志氣比來話言遽悉冥寞無非夢想往既不及來莫可追猶持此奠以抒永別夭閼之痛夫復何言尚饗維大歷七年四月二十一日朝散大夫檢校尚書司封郎中兼舒州刺史賜紫金魚袋獨孤及謹以清酌庶羞之奠敬祭於故散騎常侍贈禮部尚書賈公六兄之靈嗚呼性命之源仲尼罕言頃者與兄存而不論亦謂景福必鍾德門未虞昊天驟忍我欺所以分手容易前期日往書札祗嗟別離孰云別中死生間之賈生謫去遭世不用以命問鵬千古猶痛兄逢盛世任適梁棟青雲咫尺巨麟始縱溘爾中止俄同大夢天下孤望非兄誰慟追念夙昔嘗陪討論綜核微言揭厲孔門匪究枝葉必探本根高論拔俗精義入神誓將以儒訓齊斯民文章陵夷鄭聲奪倫兄於其中振三代風復雕為朴正始是崇學者歸仁如川朝宗六義炳焉自兄中興大名全才儀刑百工嗚呼彼天胡不祐賢闒茸讒諛或錫永年好學不幸繄兄復然豈天地不仁將斯民薄祜禺禺之望見奪何遽某獲見於兄二十有六年矣兄有七年之長蒙以伯仲相視博文約禮謂仁由已同心之言期於沒齒前後尺牘羅列案几愔愔清論恍恍在耳一旦如失萬事遄已民之所望今也胡俟某守職拘限會葬願乖白馬素車欲往無階寢門一號心酸骨悽容徽自此永不復見若魂魄無不之也豈不覩平生心於今日斗酒之奠乎尚饗年月日舒州刺史獨孤及敬以清酌之奠敬祭於河南少尹贈禮部侍郎相里公之靈嗚呼往歲嘗與公度論死生變化豈不知身與萬物悉當歸無猶謂不惑於道者可以不奪其算豈圖論猶在耳目未及瞬而公度之身復為異物益知觀化而怛自古皆妄而哀來從中妄豈易遣嗚呼公度有志有文量足韜世善可救物宰賜言語冉季政事古莫兩大繄公兼之伊昔密薦可否廷折凶佞京師童兒亦知公名其後江人杭人頌德不暇洛表耆老徯公而蘇秉公論者無賢不肖孰不謂公致君致身方自此始奈何吉未會也凶問隨之天下悼惜士友悽欷况某投分於策名之始並命於剖符之列久要不忘平生實惟公度是望同心同病我身子身也子與化往奈我心何名迹留為故事話言存乎耳目惟音形眇忽無前期可望每一念至哀填胸臆往矣公度去我何之勿言一樽永無共持倘肯顧饗表公我思尚饗年月日常州刺史獨孤及謹以清酌嘉蔬之奠敬祭於故右庶子滁州刺史揚州大都督府司馬兼侍御史隴西李長夫之靈嗚呼才與上壽并者吾不得見之矣得見中壽者斯可矣嗚呼長夫曾未半之官不展才事不如志奄謝昭世溘歸黃泉雖欲茹哀哀可茹乎追惟長夫行茂神俊孝愛友睦諒直仁勇卓犖夸邁英明曠達文武志略邦家必聞為州治行居百城之最詩賦歌事窮六義之美休聲喧於里巷佳句被於管絃圭璋令問中外注耳謂當入拜九卿出分四嶽萬人所望一旦中止行路悼惜豈直同心者之心滄州長挹之談玉溪獨往之興竟迫身世永孤願言儻魂而有知當飲痛泉下往歲滁城之會俱未以少別為戚臨歧道舊坎坎鼓我酒酣氣振言盡歡甚孰知此際以是永訣今萬事如昨書札猶新惟故人音容不可復見悲莫悲兮生別離況長往之別乎王事拘限莫由執紼巵酒豆肉後會無期彼蒼悠悠逝者何之長夫長夫魂兮來斯尚饗維大歷八年二月十五日檢校司封郎中兼舒州刺史獨孤及謹以清酌菜果之奠祭於故博陵郡君之靈嗚呼及顧惟鄙薄謬忝好合采蘩助祭歲時未幾執手偕老昊天遽奪齊體苦晚遺迹太早猶未知壽域有涯短長已臻其極耶將及薄祜速舋宜為淑明所棄耶屋壁挂存琴瑟響絶修法勸義今將疇依日月有時龜筮告協將涉故路祔於先塋及為印綬所拘不獲親自封樹豈虞此別死生間之往歲方舟偕來今也單輤獨歸郊圻一慟心骨可絶頃者萬事無非去塵變化茫茫往矣何道今也巵酒將抒永別尚饗某年月日朝散大夫檢校司封郎中兼舒州刺史獨孤及謹以清酌之奠敢昭告於吳塘神之靈山作靈鎮神實司之人作神主及實尸之神非人罔以薦馨香人非神罔以降福祥馨香不薦伊人之尤福祥不降亦神之羞及剖符為邦今二年矣制節謹度不敢怠遑庶無罪悔以奉禋祀祀未豐潔政或頗纇實及之責非人之愆惟神祐之俾大有年今盛夏旱蒸五稼將枯田畯訴號靡知其辜神明豈不降鑒下土油然為雲沛然作雨使萬人歡康百穀阜滋灑我公田遂及我私我京我庾維萬維億豈伊人粒神亦血食衆心禺禺非歲曷望望之濟否惟神所相尚饗陽驕陰伏女魃作孽孟夏不雨至於是月后土將乾百谷恐竭天道下濟龍德正中宜甘其雨亦祥其風曰歲與時俾和而豐胡然屯膏物乃殄瘁民用艱食神將乏祀豈天不仁豈龍不智盍正直以自輔憫雲漢於下土詔列缺使舉火命商羊以鼓舞暡兮為雲霖兮為雨滲我王土而毛之取我黍稷而膏之俾爾稼如茨俾爾穗如坻實廩實藏為盛為粢無貽龍羞俾神我欺尚饗某年月日朝散大夫檢校司封郎中兼舒州刺史充當州團練守捉使賜紫獨孤及奉敕以清酌之奠敢昭告於岏山神之靈頃緣亢陽不雨粢盛將敗敢以人欲乞靈於神謂必肸蠁遄賜介福俄以浹日未蒙降衷潤礎不徵觸石無望稼穡盡瘁澗溪將竭豈有悔怒將為毒痡不然何癲我以旱使滌滌至此今元元怨咨皇帝旰食下罪已之詔崇㣥神之祀將以敬恭之懇邀福於明神神其沛然回慮驟降以雨使枯苗復生飢者得食上以應聖主乾乾之心下以副萬人禺禺之望是人性命與神存亡敢不以太牢少牢剛鬣翰音之薦以為明祀以報純嘏若猶陽固陰蓄蘊沖如初神則不明人將何賴亦當徹惟馨之奠寢嚴禋之儀祭禮興廢在此一雨敢因陳告庶無神羞尚饗年月日都統江淮之南節度觀察處置等使戶部尚書李峘謹以少牢之奠敬祭於六纛之神天地不仁神明無親惟正是與若響之答敢有象恭滔天搆釁稱亂國有明罰神其捨諸賊臣劉展假寵多難敢包狼心竊發蠆毒將敷虐於我上下神祇使東溟揚波㣥動昏墊皇帝震怒按劒授鉞命我上將砥天之伐於是有虎牙鷹揚之臣蛇矛犀渠之㣥橫行而東我伐用張月羽雲旗以先啓行方將歷潯陽下南陵收京口掃建業斫梟獍以釁鼓封鯨鯢為京觀俾萬里浪破三象霧廓今以令月吉日整駕即路是用邀福於爾有神惟神降衷尚弻豫志敢告無靡旗無絓驂無汰輈無僨車命五將護野萬靈並轂令天地氛祲望風掃除魑魅魍魎罔不率俾莫我敢遏為神祇羞尚饗辛丑歲大旱三吳飢甚人相食明年大疫死者十七八城郭邑居為之空虛而存者無食亡者無棺殯悲哀之送大抵雖其父母妻子亦啖其肉而棄其骸於田野由是道路積骨相支撑枕藉者彌二千里春秋已來不書或謂縣官處師旅飢饉之弊宜穰災於未然既將不時賑恤又苦之以杼軸故及是及以為不然當陽九之厄陰陽錯而災沴降天也非人也於是延陵包佶作道殣文蓋小雅雲漢之流及亦斐然獻弔且告之運命云八風不和六氣不均上天疾威大厲薦臻俾災流行殄殲斯人北自淮沂達於海隅札瘥天昏亦既毒痡匪蹈密網匪罹萑蒲飢饉降喪淪胥以鋪人生寄世孰非遠客嗟爾賦命天年逼迫生不糊其口死不掩其骼曠野茫茫僵尸纍纍髑髏崢嶸如堆如坻里閭無煙雞犬去之死非爾所鬼其餒而水陷歷陽貴賤同之秦坑趙卒內填長平實天不傭謂禍莫京爾復胡為無辜命并將天閼之則如勿生司殺之柄孰云孔明伊昔太古上元之世天無鞠凶物無疵厲父不喪子兄不哭弟亦有華胥民壽千年陰陽常和玉燭常然彼何人斯而生斯時聖人既興大盜亦隨外戶反閉賢愚相欺我先王乃作五兵固不得已而用之堯舜既歿揖讓不傳黃鉞白旄謂之應天德乃下衰干戈相連陽九祅興災廠田坴凶年鳥皆夜鳴人失其全食盡力疲守死道邊不自豫後不自爾先萬世一時運有固然帝在法宮清問下民青旗鸞輅時令惟新叶風和布天下皆春爾往莫及委骸窮塵命不可問嗚呼蒼旻
