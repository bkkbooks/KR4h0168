front:
  text: 全唐文欽定全唐文卷一百五後唐莊宗三
  hash: sha256:9fd50f513897586cc4b3ee29aad305bfb4fd9d7de6ce105a1698e3b3a0643a02
body:
  text: 朕以四海雖寧五兵不可不訓聚之王室務壯神京其如人賴餱糧馬資藳秸飛挽動勞於四達經謀全繫於有司近以水潦為災租賦失額欲巡方嶽貴便兵民卿等細察輿情備陳忠懇慮沸騰於物議俾鎮靜於宸居載覽封章深誠嘉畫忽披諫疏深沃朕心非因讜直以上聞豈致焦勞之外達卿以餽運不繼軍食有虧在京則廩食闕如支計則供頓莫備卿等若別陳意見動叶機宜倘得稍濟軍儲不移警蹕即當旁詢衆懇盡述良籌佇聞敷揚浣豫宵旰仗順討逆少康所以誅有窮纘業承基光武所以滅新莽咸以中興景命再造皇猷經綸於草昧之中式遏於亂略之際朕以欽承大寶顯荷鴻庥雖繼前修固慙涼德此以誓平元惡期復本朝屬四海之阽危允萬邦之推戴近自親提組練徑掃氛妖振已墜之皇綱殄偷安之寇孽國讎方雪帝道爰開拯編氓覆溺之艱救率土倒懸之苦粵自朱溫搆逆友貞嗣凶篡殺二君隳殘九廟虺毒久傷於宇宙狼貪肆噬於華夷剝喪元良淩辱神主帝里動黍離之歎朝廷多棟橈之危棄德崇姦窮兵黷武戰士疲勞於力役蒸民耗竭其膏腴言念於斯軫傷彌切今則已梟逆豎大豁羣情覩歷數之有歸顯神靈之匪昧得不臨深表志馭朽為懷將宏濟於艱難宜特行於眚宥應偽命流貶責授官等已經量移並可復資徒流人放歸鄉里京畿及諸道見禁囚徒大辟罪降從流流已下並赦除之其鄭等一十一人未在移復之限懋德賞功百王明訓疏封列爵國有通規應扈從征討將校及諸官員職掌軍將節級馬步兵士及河北諸處屯駐守戍兵士等皆情堅破敵業茂平讎副豫戡定之謀顯爾忠勤之節並據等第續議奬酬其有交鋒戰陳沒於王事未經追贈者各與贈官如有子孫成立堪任使者並量才甄録叛之則懲服之則捨蓋前經之奧旨為當代之通規既屬纂承是務遵守應舊偽庭位居藩翰任處專城或掌握兵權或捍防邊鄙各為其主以全其名既解甲以歸明或飛章而送款變通斯覩忠節可嘉其逐處節度觀察防禦團練等使及諸州刺史監押及偽庭先差出行營將校都監等並頒恩詔不議改更仍許且稱舊銜當別加新命理國之道莫若安民勸課之規宜從薄賦庶遂息肩之願冀諧鼓腹之謠應諸道戶口宜並罷其差役各務營農所係殘欠稅賦及諸務懸欠積年課利及公私債負等其汴州城內自收復日已前並不在徵理之限應天下諸道自壬午年十二月已前並放其兵戈蹂躪之地水旱災沴之鄉苗稼不登賦徵既減應今年霜旱所損田苗處檢覆不虛便據畝隴蠲免兼北京及河北先為祅祲未平配買征馬如有未請却官本錢及買馬不逮者可並放免往哲宏仁有興滅繼絶之道前王惻隱垂矜孤恤寡之文應有本朝宗屬及內外文武臣寮被朱溫無辜屠害者並可追贈之如有子孫及本身逃難於諸處漂寓者並所在尋訪津送闕庭當行升陟其有義夫節婦孝子順孫並宜旌表門閭量加賑給或魚衆寡孤獨無所告者仰所在各議拯救或有身過八十者免一子從征殷王以恩推解網並務好生帝堯以引過責躬乃思含垢應有先投過偽庭將校官吏等一切不問事由無令輒有恐動側席求賢將臻至理懸旌進善或贊鴻猷應名德有稱才藝可取或隱居朝市或遁迹林泉並仰逐處長吏遍加搜訪津致赴闕朕當量才任使兼偽庭僭逆以來凡有寃抑沈滯之人宜並特與申雪仍加遷陟封遺冢而葬枯骨義出周王祀名山而祭大川禮傳虞帝既立規於前古足垂訓於後昆應所在賢士邱墳並仰聞奏當議封樹或有暴露骸骨亦委逐處葬埋或有百神祠宇不得有虧時祭應德音內有節文不該者並仰所司重具起請分析聞奏當議施行於戲患難以平咸自忠良之力瘡痍未息宜施撫育之恩更在文武元臣中外耆德覩覆亡而立戒竭忠藎以為謀無縱驕矜須知廉慎同致升平之道永全開創之功布告遐邇當體朕懷蓋聞兵者凶器戰者危事故聖王不得已而任之是以大兵之後必有凶年朕自收復汴州戡定蜀郡雖當時秋毫無犯而已前乃十載勞師每歲傷痍寧無災沴言功於己曾莫繼於百王語德於人況未洽於兆庶遂至去歲水潦為災自京以東幅員千里田疇悉多荒廢人戶未免流亡賦租既輸納不充軍食又轉運未及物價騰涌人心煎熬既視人以如傷每敬天而忘戒朕近欲親幸梁宋遍恤生靈又恐大駕省方百司云從道途寧免勞擾州縣復備供承轉慮凋殘莫知攸濟朕自今月三日已後避正殿減常膳徹樂省費以答天譴應同光三年經水災處有不逮及逃移人戶差科夏秋兩稅及諸折配色委長吏切加點檢並與放免仍一年內不得雜差遣見在者加意撫恤流徙者設法招攜其田宅無任有力人戶占射及鄰近毀拆務令歸復以惠傷殘且念給養兵戎撫綏疲瘵冀連營而粗濟思比屋以乂安危困生靈倍懷憂切近者爰頒御札務切濟時有所便宜朕無不聽近歲賦稅尚恐懸闕遠年逋欠豈可督征不惟虛係於簿書兼亦轉困於生聚致其流散職此之由應壬午年已前百姓所欠秋夏殘稅及諸色課利錢物先有敕文悉已放免近聞或不遵守依前却有徵收仰下租庸司及諸道州府切準前敕處分如或更有違越任百姓詣闕論訴當議勘窮以定贓罪其同光元年當戰伐之後是平蕩之初人戶流離多未復業困於租賦須議矜蠲其諸色殘欠差稅及不逮係官課利並與放免分明曉告各遣聞知又輦轂之中郊甸之內時物涌貴人戶飢窮訪聞自陜以西遐及邠鳳積年時熟百穀價和縱未能別備於貢輸亦宜廣通於糶糴近聞輒有稅率已曾降敕指揮尚慮關鎮阻滯行人增長物價仰所在長吏切加檢勘以濟往來推救災恤患之心明奉國憂人之道又京圻之內自全義制置已數十年每聞開墾荒蕪勸課稼穡曾無歉歲甚有餘糧公私貯蓄極多收藏未肯出糶欲俟厚價頗失衆情宜令中書門下條流應在京及諸縣有停貯斛斗並宜減價出糶以濟公私如不遵行即仰聞奏別具檢括仍委河南府切詳敕命處分伐罪弔人既叶前王之令推恩布澤敢忘當代之憂應三川管內王衍父子偽署將相文武官及諸色職吏等除罪名顯著已從刑憲外脅從者固是無辜同惡者亦以歸命一切釋放更不勘尋仍不得將今日已前事敢有告論貴宣曠蕩之澤以安反側之心我國家奄有四海垂三百年西至日入罔不來賓凡有遐方皆我赤子久陷僭偽寧無憫嗟應三蜀管內百姓除秋夏兩稅及三司舊額錢物斛斗并繼岌崇韜申奏減落徵收外所有無名配率急徵橫斂毒害生靈者更委本道新除節度使上後於管內一一檢勘細具聞奏當與放免俾惠傷殘應在京及天下州府凡有繫囚除十惡五逆官典犯贓屠牛鑄錢光火劫舍持刃殺人準律常赦不原外合抵極刑者遞減一等並貸餘生其次罪等悉與減降疏理釋放不得久有禁繫自同光元年後或有犯罪流人情非巨蠧者並許歸還應行營及在京諸軍皆役官健偶因過犯便至奔逃懷憂懼以離家忍飢寒而在外事非在已情亦可矜委所在如有此色人切加招撫或要却歸都幕或願遂便營生盡捨愆尤悉皆聽許春以生而秋以殺天之道也德以教而刑以威君之政也朕惟寡薄敢忘憂勤唯將德惠以臨人庶免災害之及物既垂天戒未致時雍爰施布澤之文是表責躬之道中外臣庶遐邇生靈宜體朕懷罔有不敬維同光三年歲次乙酉八月辛酉朔二十七日丁亥皇帝若曰王者惠濟黎元輯寧方夏重名器任股肱忠而能力則禮崇賞不失勞則人勸所以啓周公之土宇裂漢祖之膏腴録彼茂勳置之異數登進賢哲焜耀事功也天下兵馬都元帥尚父守尚書令吳越國王錢鏐朝海靈源承天峻嶽以英風彰德望以勇氣贊忠貞往因義舉之徒盛推韜略遂著龔行之績高步藩維挺魚鯤鳥鳳之姿擁岸虎水龍之衆居方面任將五十年宣導休聲攘除凶醜摧堅奮鋭鄙許東固圉之謀阜俗頒條廣冀北安居之頌環塹浙江之要雲滋星紀之墟説禮敦詩位崇元帥前茅後徑名重中權守畫一之規奉在三之節信立靡移於風雨義行曷倦於津塗效珍則不顧險難薦幣則常歸宰府振英謨而端右弼鍾懿號而異列藩可謂職貢不乏梯航時至翼戴天子加之以恭也載念尊奬爰示徽章今遣正議大夫守尚書吏部侍郎上柱國贊皇縣開國男食邑三百戶賜紫金魚袋李德休使副朝議郎守起居郎充史館修撰賜緋衣魚袋聶璵持節備禮胙土苴茅册爾為吳越國王於戲地畫數圻賦過千乘墨守闔閭之境軌圍句踐之封子弟量才序進多分於棨戟土疆漸海方輸豈限於魚鹽貴盛富強雖古之封建諸侯禮優夾輔不加於此慎厥初圖厥終無以位期驕無以欲敗度欽承賜履翼豫一人法天取象令王以降衷下民秉籙承乾哲后以膺圖受命莫不運推歷數道濟艱難經綸於草昧之中式遏於亂略之始君臨兆庶子惠萬邦壽域將登眚災是宥朕顧慙涼德誠愧前修祗荷鴻休恭修清問將布維新之政是覃革故之恩遐按彞章溥頒成憲爰自夙承丕構世奉本朝誓雪恥於君親欲再安於廟社所以躬提義旅力殄凶徒漸致小康永清中夏俄屬列藩羣后不謀同辭咸稱偽逆干天宗祧乏享眷命所屬主鬯攸歸以朕籍係鄭王志存唐室合中興於景祚須再造於洪基推戴既堅讓辭靡獲既難違衆遂命有司乃擇元辰率遵前典尋升壇而奠王仍即位以建元欽若舊章敬敷霈澤宜改天祐二十年為同光元年可大赦天下自四月二十五日昧爽己前除大辟罪已下罪無輕重已發覺未發覺已結正未結正咸赦除之惟犯十惡五逆光火行劫持刃殺人官典犯贓屠牛鑄錢合造毒藥不在原赦之限鎮州自收復已來纍行告諭或因緣危艱為保家族久在山中寨柵懼罪遲疑或被張文禮脅從事不獲已者昧爽已前一切不問咸從赦宥宜體豫懷應六軍及行營馬步蕃漢諸道將校兵士等皆以身先冒刃志切勤王或竭節於忠勞或連年而征戍須加恩奬倍撫苦辛其將校尉並賜功臣名號未有官者即超一資與檢校官已有官者亦超一資如官資已高者與加爵邑如曾封爵者即給一子六品已上正員官其長行兵士並賜功臣名號應將士等並勒逐處各定等第優賞應有大勳上將元老重臣或盤維每賴於急難或邦國早資於經濟即安義令公實昆仲之長護軍特進同骨肉之恩不可以名氏標文不可以臣下同等嘉庸如在崇德未申其次有戰沒陳場身終王事須顯忠彞之美咸隆贈諡之榮周德威蓋寓李存璋李思恩李嗣本李存進伊廣等兼應該敕文者並委中書門下各令所司一一具奏各加追贈仍定諡號貴流王澤永飾泉扃應諸道管內有高年踰百歲者便與給優永俾除名自八十至九十者與復一子免役州縣不得差役鄉里有孝子順孫義夫節婦委所在長吏録其節行具以聞奏盡據典章必行旌表內外文武官及諸色人任封事兼有賢良方正抱器懷能或利害可陳無所隱諱直言極諫將一一行之亦委諸道長吏具姓名申奏或所在有義行頗高為鄉里所推者並仰準例舉選所司量才任使澤潞封疆兄弟之國追思舊績言念疲民惠在綏懷恩加撫字各仰沿邊鎮戍布命宣陳咸令樂業營生無使侵疆為患應有奉使危邦罹殃殊域既遭陷害深可憫傷如伊鐸蓋寓戴漢超李承勳之徒並仰所司具名録奏朝廷必議褒贈其貢舉之道誘導為先切要便行貴申奬士委中書門下速商量聞奏其雲應邊陲北山八軍易定幽燕邊陲諸縣自鮮卑入寇仍歲纏災眷彼流人良堪興歎或乍來復業才擬營農尚怯侵擾須加慰恤其稅率仍委長吏量與矜減凡有逋毒孤貧惸嫠魚衆寡歷代皆聞於教化自古共切於軫傷勉致噢咻遍加惠養應有欠負不繫公私若曾重出利纍經徵理填還不逮者並皆釋放夫掩骼著在前經敬神垂於古典告布諸道州縣所在應有暴露骸骨並勒逐處埋瘞及山林川澤祀典神祇各隨處差官崇修祭享教之為本禮儀是先德之所崇昭報在上其民間有曾經三世已上不分居者並與蠲免諸雜差徭倘兵銷患息何須有丹鳳白麟若歲稔人和何必有紫芝赤雁起今後諸道應有祥瑞並不要奏聞其赦文中有未該詳事節者即仰所司條件録奏如敢以赦前事相告者以其罪罪之體元立極樹司牧者大君創業開基定禍亂者真主是以肇分正氣斷鼇足而定四維眇覿元風抗龍首而朝萬國兆人歸往率土駿奔同興牧野之師共赴塗山之會恭行弔伐廣示驅除才應順於人心俄恢張於戎略未踰半歲悉集大功翦窮后於夏郊擒漸臺於新室配天纂祀冤恥咸申向闕來庭華夷率服再移星律得事郊禋獲申報本之儀已展告虔之禮顧惟寡薄愧畏尤深久屬偽室凶狂彞倫失序照臨之內愁疾略同爰當改物之辰乃布惟新之慶與人更始以答天休可大赦天下應同光二年二月一日昧爽已前大辟罪已下所犯罪無輕重已發覺未發覺已結正未結正見禁囚徒常赦不原者咸赦除之十惡五逆屠牛鑄錢故意殺人合造毒藥持仗行劫官典犯贓不在此限賞不失勞百王令典人惟求舊有國通規當宜廣示優恩務酬嘉績應自來立功將校兵士等皆久經戎陳備覩辛勤並宜各轉官資仍加賞給應偽朝流人並左降官未經量移者即與量移已量移者即與復資尚慮道路遐遙未盡知悉中書門下再舉敕文應內外文武常參官節度觀察防禦刺史主軍都指揮使等夙夜在公冰泉斯戒既著顯親之道宜嘉事主之誠父母亡歿並與追贈追封在者各與加爵增封四品已上扈從翊衛整肅威儀展我國容俾成大禮應南郊掌儀仗隨駕官員各有勞奬其扈駕樓下立仗將士及河南將校兵士等亦各賜等第優賞眷惟盡瘁言念輸忠率玉帛以來庭贊郊廟而二事既崇丕烈特顯殊恩凡關竭力之元勳宜舉報功之茂典應藩鎮使臣各賜一子出身仍加功臣名號諸道留後刺史官高者加爵階一級官卑者加官一資宗子維城本支百代禮既行於配祖情敢怠於睦親應本朝皇親近屬因緣偽梁竄遁遐遠並仰所在搜訪如非謬妄即與奏聞到京委宗正寺勘不虛並與量才敘録網羅之中無由自奮蜂蠆之內竟至無辜既淪沒於濫刑宜申明於真節凡本朝內外臣僚枉被朱溫殺害者並仰所司具銜申奏特與追贈仍搜訪子孫量加録用事主之道以立節為先致理之方以賞善為本其懷才抱器不事偽朝衆所聞知顯有節行仰所在官吏將所著事狀具姓名聞奏當加甄奬兼授官秩皇王御宇禮三恪而為賓士庶敦風賴五常而濟世當宜封崇後嗣欽若前修應前代二王三恪及文宣王之後並可各令繼襲仍加恩命所有祖宗廟宇亦宜各與增修其隨處合得俸戶并子孫戶下差稅征徭仍委中書門下較本朝格律施行堯鼓明懸貴聞進諫舜旌旁建比為來賢是宜廣納話言庶針闕政洎偽梁人滋澆薄朝掩忠良蔑聞投水之規莫識從繩之路此後應內省文武常參官并前資草澤之士有謀分利害事合機宜並許上表敷陳朕當選長旌録如有性多毀譽私貯愛憎承寬偶恃於得言縱志惟專於罔善朕亦濳令伺察親要審詳狡蠧有彰罪刑無捨錢者古之泉布蓋取其流行天下布散人間無積滯則交易通多貯藏則士農困故西漢興改幣之志立告緍之條所以權畜賈而防大姦也宜令所司散下州府常須檢較不得令富室分外貯見錢又工人銷鑄而為銅器兼沿邊州鎮設法鈐轄勿令商人般載出境被服錦繡貴賤有倫裁製衣裝短長有度苟無彞則必害女工近年已來婦女服飾異常寬博倍費縑帛有力之家不計卑賤悉衣錦繡念蠶織之匪易顧法制之不行須示條流冀漸遵守委所司散下文榜曉諭御史臺及諸道觀察糾舉違敕水旱之鄉飢寒宜恤兵戈之地勞弊堪傷鄴城及河東久興師旅頗困生靈其近裏州縣又輦運徭役無時暫息應北京以北諸州界及至新州幽州鎮定管界契丹侵掠井邑凋殘兼遼州沁州南界及安義北界澤州諸縣河陽向下至鄆濮齊棣已來邊河州縣數年兵革至甚凋殘自此並宜倍加撫安召令復業應人戶所輸租稅特與蠲減已從別敕處分兼諸道州縣有經霜水旱之災所損田苗納稅不逮懸欠處仰子細詳如不虛妄特與蠲免頃以未殄寇讎嘗勞戰伐況於邊鄙足見凋傷既歲月之滋深在逋逃而可念或主持錢穀管係牛羊既已罄空須憂徵督將叶來蘇之詠宜施在宥之恩應近邊界州縣人戶有舊主持官錢斛斗牛羊諸雜課利送納不逮者並令蠲放自兵屯郊境事迫機宜互有侵漁交相虜掠既變良而為賊實威脅以勢驅人或銜冤朕寧無慮可各下諸處有百姓婦女俘虜他處為婢妾者願歸即並不得占留一任骨肉識認其丈夫曾被刺面者仰勘所在村保如委不係食糧人數便勒本州府各與憑據放逐營生鄉村糴貨斗斛及賣薪炭等物多被牙人於城外接賤糴買到房店增價邀求遂使貧困之家常置貴物稱量之際又罔平人宜令府縣及御史臺於諸門嚴切條流不得更令違犯應天下見使斗稱並是偽朝所定宜令所司別造新朝斗稱頒下諸道其見使者納官毀廢三館蘭臺藏書之府動盈萬卷詳列九流爰自亂離悉多遺逸須行搜訪以備討尋應天下有人能以經史及百家之言進納者所司立等第酬奬喪葬之典合式具言使貧者足以備其儀富者不得踰其制頃自淳風漸散薄俗相承不守等威競為僭侈生則不能盡其養沒則廣費飾其終自今後仰所司舉明條制勿令踰越若故違犯嚴加責罰歷代以來除桑田正稅外只有茶鹽銅鐵出山澤之利有商稅之名其餘諸司並無稅額偽朝已來通言雜稅有形之類無稅不加為弊頗深興怨無已今則軍需尚重國力未充猶且權宜未能全去且檢天下桑田正稅除三司上供既能無漏則四方雜稅必可盡除仰所司速檢勘天下州府戶口正額墾田實數待憑條理以息繁苛國以人為本人困則國何所依人以食為天食艱則人何以濟聞偽朝已來恣為掊斂至於雜色斛斗柴草受納倉場邀詰人戶分外誅求納一斗則二斗未充納一束則三束不了互相蒙蔽上下均分疲敝生靈莫斯為甚自今後仰長吏選清強官吏充主納仍須嚴立條制以防姦欺兼具逐色所納加耗申奏當官者宜守於朝章力田者宜遵於王制苟容僥幸必亂規繩訪聞富戶田疇多投權勢影占州縣不敢科役貧下者更代征徭轉致凋殘最為蠧弊將安疲瘵須擇循良應偽庭內班朝寮及諸色主掌職員等遭無辜殺害者並許昭雪歸葬共理者太守之官親人者縣宰之任戈鋋稍弭政術為先刺史縣令有勸課農桑招復戶甲增加稅額檢勘不虛委本道觀察使條件奏聞當加進陟如貪惰不理害及於人者速便停替務於葺養稱朕意焉況親人之官無先於令録致理之道必擇於才能苟選任不自於朝廷則恩澤全歸於侯伯今日諸道奏請授官人數轉多闕員全占交隳體例須正條綱委中書門下舉舊例條理聞奏刺史總一州之政縣令專百里之權至於糾督之司並謂親人之任偽朝取士多不擇才蓋自藩方奏論及因權勢屬託公行賄賂蔑顧典章到官唯務於追求在任莫思於葺理或聚蓄更希後任或掊斂以報前恩上下相蒙遠邇為害生靈困敝職此之由自此牧守令録之官委中書門下精加選擇至於三銓注擬亦在審詳吏能如貪猥有聞不得更授令録及到官後委本道觀察使切加鈐轄仍勒本州判官專為訪察如掩贓罪不具聞奏豈唯獨罪本官兼亦纍及長吏至於義夫節婦孝子順孫並合搜揚以行旌表德音之所未至赦文之所不該凡百有司各宜申舉於戲圓蓋方輿布陰陽而貿萬物賢臣聖主守紀綱而馭四方所寶者黎元所重者神器久落姦凶之手每傷忠義之心朕以訓練五兵憂勤三紀收復而親經百戰輯寧而敢忽萬機得不居安慮危慎終如始內則委樞衡於元輔庶顯彌綸外則分符印於列侯務觀製緝股肱惟肅宗社是依朕有過而須言臣有善而無掩使百姓時序萬國咸寧共全可大之功式表中興之道天維助順神亦害盈有道即興無道即滅昔漢朝中否俄成王莽之妖昔祚中微復起桓元之禍莫不因緣多難構合異圖謂天地可以心欺謂帝王可以力取殊不知雪霜之後寒松驗貞翠之姿喪亂之期義士見忠勤之節是故南陽宗室京口英雄皆懷仗順之謀悉建平勳之策逆溫萑蒲餘孽犬畝犬畝微民因黃巢將敗之秋於白水喪師之後自知勢蹙遂乃向明聖朝以方切招懷顯行恩渥使從賊將委以齊壇錫全忠之嘉名居夷門之重地爾後連侵四鎮疊擁雙旌非聖朝恩澤不深非聖朝有負此賊而乃結連姦逆攻逼河岐謀害近臣劫遷鑾輅終成大逆遂弒昭皇殺戮宗枝逼辱后萬民相顧而抆淚百辟飲恨以吞聲以致神堯萬代之基陷入碭山豎子之手人祇痛恨天地慘傷況復自僭逆以來猖狂愈甚忌勳舊則殺傷已盡貪財貨則溪壑難盈氏叔琮朱友恭之徒蔣元暉張廷範之輩罪無毫髮皆被誅夷王仲師覆族於前劉知俊脫身於後如斯統馭何以扶持稍成李之嫌便中讒邪之口且鎮定兩地聖唐重藩皆世嗣山河代分旄鉞各以生靈是念封壤求安既拜表以稱臣又竭財而入貢而逆溫不察忠瘁濳肆窺圖詐稱應援之師盜取深冀兩郡見利忘義一至於斯欲令天下歸心乃至舟中敵國昨鎮定大王特差人數徑告敝藩豫遂統師徒躬來應援逆溫已令將王景仁等七八萬衆屯據柏鄉日令步騎攻圍其城終不出鬬遂令引退即便前來既落彀中須施毒手東西掩擊勢若山摧擒戰將二百餘員奪鐵騎五千餘匹橫尸滿野皆龍驤神捷之徒棄甲如山悉長劒銀鎗之類程思權縷陳表本張濤亦備述事機然董卓之臍何煩再舉斬桓元之首正在此時近又岐下淮南皆通間使咸期春首同起義師計柏鄉之勝捷遠聞在兩地之戈鋋轉急天時人事昭然可知伏以公緱嶺名家聖唐勳族因逢國難偶在賊庭當華夷無事之時滿朝朱紫倘社稷中興之後足顯勳名豫高曾自憲宗朝赴闕以來世荷恩寵敢因此際誓復聖唐必不與碭山田夫同戴天而履地豫幕賓王緘僕射九月中鳳翔使回劉知俊令公因遺書示兼傳密意具述足下相與之分最異他人兼憑附達絹書尋令通送又纍得潞州相公家兄文字及招得魏博子將聞得逆溫於公君臣之分巳有猜嫌曾於故鎮著人密欲窺算皆言紀綱不少謀害稍難頗得事機極不虛謬且公彭門侍中之後鴻勳茂業播在史書豈忍屈節賊庭點汚盛族轉禍為福去就奚安箕子去殷項伯歸漢棄骨肉猶稱先智全富貴固是良圖今三鎮嚴師巳及城下敢假丹抱仰達英聰倘蒙俯賜忠言見機知變叶同討逆興復聖唐則身與金石齊堅名與天地同固蓋以久欽重德是敢先貢直言如明鑒未回丹誠尚阻則長濠巨塹築室返耕使飛走以無門固展覿而有日夫相時達變為智士之良圖擇福知機蓋丈夫之能事故有竄身山谷不處危邦今古攸同豪傑共貫近聞鄆州山塞聚徒實繁並是汴雒舊人亠兊鄆奇士見河南之失險知偽數之必亡厭血刃於連年避淫刑於虐主必想元元失所恟恟無依莫知投足之方未有息肩之地豫自去冬親提虎旅徑取楊劉既獲通津巳諧大計視逆豎而便同几上算梁園而巳在彀中謝彥璋營葺梟巢嘯聚河上撩虎頭而難逃碎首伸螳臂而何暇爭鋒今則虐使生民決開天塹築隄壅水自固軍營偷生取笑於庸夫作事頗同於兒戲公私塗炭內外分離既板蕩以不支固冰消而在即豫俯詳人事仰察天時既畫成謀巳圖大舉控新羈之鐵馬礪却日之霜戈屈指定期長驅決勝誓平國恥須復家仇廓妖祲於西郊奉中興於萬葉諸君等或中州義士或大國遺民困兵革而不保田園避殘酷而深藏溪洞聞余義舉計各歡然今既屯聚衆多巳相統屬須自謀畫自立功名或則攻取城池便可跨據州縣因茲事勢以決遠圖梁寇既西有多虞固不暇分兵東去青亠兊則無人之境齊鄆則喪亂之州彼若圖之必定成事斯為上策不可後時凡有兵機豫能接應當俟寰區一統海內為家可於所得封疆遂其富貴之願蒼穹白水豫所不欺若守險偷生濳身匿迹終為亡命自棄何多時不再來機須速決長謀遠算自可擇焉畫野離疆雖有華戎之別惟忠與信不違蠻貊之邦契丹王氣稟貞剛心懷仁義為天山之貴族據玉塞之雄藩恩加辮髮之鄉威讋控弦之俗往者降情修好款塞通盟各守封疆交陳贄幣錦車使者嘗馳問遺之書牙帳賢王頗識會同之禮關山無事風馬有歸青冢路邊罕有射雕之騎受降城北更無遺鏃之憂永保初終不渝信誓近者盧文進濳圖凶逆苟避誅夷苞姦蘊惡之情何方可保有父有君之國皆所不容契丹王未始包藏專聽誑惑黨一夫之罪惡絶兩國之歡盟縱彼犬羊窺吾亭鄣徒刲牛耳難保獸心輒將左袵之徒幸我中原之利見搜兵甲決戰西樓暫勞車騎之師佇見藳街之首南望柏人當漢祖擒姦之地北臨鄗邑有蕭王告類之亭一則成創業之功一則纂中興之緒豫遠提師旅將蕩妖氛假二帝之威靈救萬邦之塗炭俯詳形勝用視郊原陳雲不散於長空殺氣正衝於殘孽逆溫背惠姦我同盟非厚載之所容在典刑而無赦將期勦戮以慰蒸人諒我忠勤幸資神助
