front:
  text: 全唐文欽定全唐文卷一千興光新羅王理洪弟初與太宗同名武后改焉長安二年冊立仍襲兄輔國大將軍行豹韜衞大將軍雞林州都督之號開元二十一年加授開府儀同三司寧海軍使二十五年卒贈太子太師
  hash: sha256:4252dbfcb0ade30a8aa2dba44ef67c78e1aa6a6278baf355cbcac873a826e4a5
  markers:
  - {type: head, offset: 11, content: 新羅王金興光, id: KR4h0168_NFKB_1000-h1, level: 1}
body:
  text: 臣鄉居海曲地處遐陬元無泉客之珍本乏賨人之貨敢將方產之物塵黷天官駑蹇之才滓穢龍廄竊方燕豕敢類楚雞深覺靦顏彌增戰汗伏惟陛下執象開元聖文神武應千齡之昌運致萬物之嘉祥風雲所通咸承至德日月所照共被深仁臣地隔蓬壼天慈洽遠鄉暌華夏睿澤覃幽伏覩瓊文跪披玉匣含九霄之雨露帶五彩之鵷鸞辨惠靈禽素蒼兩妙或稱長安之樂或傳聖主之恩羅錦彩章金銀寶鈿見之者爛目聞之者驚心原其獻款之功實繇先祖錫此非常之寵延及末孫微効若塵重恩如岳循涯揣分何以上酬伏奉恩勅浿江以南宜令新羅安置臣生居海裔沐化聖朝雖丹素為心而功無效以忠正為事而勞不足賞陛下降雨露之恩發日月之詔錫臣土境廣臣邑居遂使墾闢有期農桑得所臣奉絲綸之旨荷榮寵之深粉骨糜身無繇上答彥昇新羅王重興相元和七年重興卒冊授開府儀同三司檢校太尉使持節大都督雞林州諸軍事兼持節充寧海軍使上柱國新羅國王太和五年卒先在太學生崔利貞金叔貞樸季業四人請放還蕃其新赴朝貢金允夫金立之樸亮之等一十二人請留在宿衞仍請配國子監習業鴻臚寺給資糧忠信新羅王興光從弟開元中留宿衞授左領軍衞員外將軍二十二年受代上表臣所奉進止令臣執節本國發兵馬討除靺鞨有事續奏者臣自奉聖旨誓將致命當此之時為替人金孝方身亡便留臣宿衞臣本國王以臣久侍天庭遣從姪志廉代臣今已到訖臣即合還每思前所奉進止無忘夙夜陛下先有制加本國王興光寧海軍大使錫之旌節以討兇殘皇威載臨雖遠猶近君則有命臣敢不祗蠢爾夷俘計亦悔禍然除惡務本布憲惟新故出師義貴乎三申縱敵患貽於數代伏望陛下因臣還國以副使假臣盡將天旨再宣殊裔豈惟斯怒益振固亦武夫作氣必傾其巢穴靜此荒隅遂夷臣之小誠為國家之大利臣等復乘桴滄海獻捷丹闈效毛髮之功答雨露之施臣所望也伏惟陛下圖之士信元和中新羅質子試太子中允臣本國朝天二百餘載嘗差質子宿衞闕庭每有天使臨蕃即充副使轉通聖旨下告國中今在城宿衞質子臣次當行之亠兊仁亠兊辰韓茂竣人天祐中官新羅國翰林學士守兵部侍郎知端書院事聞夫真境希夷元津杳渺澄如滄海邈若太虛智舟何以達其涯慧駕莫能尋其際況復去聖逾遠滯凡既深靡制心猿難調意馬由是徇虛廾實者俱懷逐塊之情執有迷空者盡起趨炎之想若非哲人出世開士乘時高演真宗廣宣善誘何以爰㭊重元之禮得歸衆妙之門潛認髻珠密傳心印達斯道者豈異人乎大師是也大師法諱行寂俗姓崔氏其先周朝之尚父遐苗齊國之丁公遠裔其後使乎兔郡留寓雞林今為京萬河南人也祖諱金避世辭榮幽居養志父諱佩常年登九歲學冠三冬長牽投筆之心仍效止戈之藝所以繫名軍旅充職戎行母薛氏夢見僧謂曰宿因所追願為阿孃之子覺後感其靈瑞備啟所天自屏膻腴勤為胎教以太和六年十二月三十日誕生大師生標奇骨有異凡流遊戲之時須為佛事每聚沙而造塔常摘葉以為香爰自青衿尋師絳帳請業則都忘寢食臨文則總括宗源嘗以深信金言志遺塵俗謂父曰所願出家修道以報罔極之恩其父知有夙根合符前夢不阻其志愛而許之遂迺削染披緇苦求遊學欲尋學海歷選名山至於伽耶海印寺便謁宗師精探經論統雜花之妙義玩貝葉之真文師謂學徒曰釋子多聞顏生好學昔聞其語今見其人豈與青眼赤髭同年而語哉大中九年於福泉寺官壇受其具戒既而浮囊志切繫草情深像教之宗已勞力學元機之旨盍以心求所以杖策挈瓶下山尋路徑詣崛山謁通曉大師自投五體虔啟衷懷大師便許昇堂遂令入室從此服膺數載勤苦多方雖至道闕二字目擊罄成山之志而常齋淡薄神疲增煮海之勞則知歷試諸艱多能鄙事每於坐臥只念遊方遂於咸通十一年投入備朝使金公緊榮闕一字笑之心備陳所志金公情深傾葢許以同舟無何利涉大川達於西岸此際不遠千里至於上都尋蒙有司特具事由奏聞天聽降勅宜令左街寶堂寺孔雀子院安置大師所喜神居駐足勝境棲心未幾降誕之辰勅徵入內懿宗皇帝遽宏至化虔仰元風問大師曰遠涉滄溟有何求事大師對勅曰貧道幸獲觀風上國問道中華今日叨沐鴻恩得窺盛事所求遍遊靈跡追尋赤水之珠還耀吾鄉更作青邱之印天子厚加寵賚甚善其言猶如法秀之逢晉文曇鸞之對梁武古今雖異名德尤同以後至五臺山投花嚴寺求感於文殊大聖先上中臺忽遇神人鬢眉皓尒叩頭作禮膜拜祈恩謂大師曰不易遠來善哉佛子莫淹此地速向南方認其五色之霜必沐曇摩之雨大師含悲頂別漸次南行乾符二年至成都府巡謁到靜衆精舍禮無相大師影堂大師新羅人也因謁寫真具聞遺美為唐帝導師元宗之師同鄉唯恨異其時後代所求追其迹企聞石霜慶諸和尚啟如來之室演迦葉之宗道樹之陰禪流所聚大師殷勤禮足曲盡虔誠仍棲方便之門果得摩尼之寶俄而追遊衡岳參知識之禪居遠至曹溪禮祖師之寶塔傍東山之遐秀採六葉之遺芳四遠參尋無方不到雖觀空色豈忘偏陲以中和五年來歸故國時也至於崛嶺重謁大師大師云且喜早歸豈期相見後學各得其賜念茲在茲所以再託扉蓮不離左右中間忽攜缻鉢重訪水雲或錫飛於五嶽之初暫棲天柱或盃渡於三河之後方住水精至文德二年四月中崛山大師寢疾便往故山精勤侍疾至於歸化付囑傳心者惟在大師一人而已初憩錫於朔州之建子岩纔修茅舍始啟山門來者如雲朝三暮四頃歲時當厄運世屬屯蒙災星長照於三韓毒霧常鋪於四郡況於巖谷無計潛藏乾寧初至止王城薰薝蔔於焚香之寺光化末旋歸野郡植旃檀於薙草之墟所恨正值魔軍將宣佛道孝恭大王驟登寶位欽重禪宗以大師獨步海東孤標天下特遣僧正法賢等聊飛鳳筆徵赴皇居大師謂門人曰自欲安禪終須助化吾道之流於末代外護之恩也乃以天祐三年秋九月初忽出溟郊方歸京邑至十六日引登祕殿孤坐禪床之上預淨宸襟整其冕服待以國師之禮虔申鑽仰之情大師辭色從容神儀自若尊道說羲軒之術治邦設堯舜之風闕一字鏡忘疲洪鐘待扣有親從上殿者四人曰行謙邃安信宗讓規讓景行超十哲名蓋二禪探元鄉之祕宗論絕境之幽致聖人見頻迴麈尾甚悅龍顏至於明年夏末乍別京畿畧遊海嶠至金海府蘇公忠子知府及第律領軍莫不斂袵欽風開襟慕道請居名寺冀福蒼生大師可以棲遲暗垂慈化掃妖煙於塞外灑甘露於山中神德大王光統丕圖寵徵赴闕至貞明元年春大師遽攜禪衆來至帝鄉依前命南山實際寺安之此寺則先是聖上以黃閣潛龍禪扃附鳳尋付大師永為禪宇此時奉迎行在重謁慈顏爰開有待之心再聽無為之說辭還之際特結良因爰有女弟子明瑤夫人鼇島宗枝鳩林冠族仰止高山尊崇佛禮以石南山寺請為收領永以住持秋七月大師以甚愜雅懷始謀棲止此寺也遠連四岳高壓南溟溪澗爭流酷似金與之谷巖巒鬬峻凝如紫葢之峯誠招隱之幽居亦棲禪之佳境者也大師遠探靈巘未有定居初至此山以為終焉之所至明年春二月初大師覺其不悆稱染微疴至十二日詰旦告衆曰生也有涯吾將行矣守而勿失汝等勉旃趺坐繩床儼然就滅報齡八十五僧臘六十一於時雲霧晦冥山巒震動有山下人望山頂者五色光氣衝於空中中有一物上天宛然金柱豈止智順則天垂花葢法成則空斂靈棺而已哉於是門人等傷割五情若亡天屬至十七日敬奉色身假隸於西峯之麓聖考大王忽聆遷化良惻仙襟特遣中使監護葬儀仍令弔祭至三年十一月中改葬於東巒之頂去寺三百來步全身不散神色如常門下等重覩慈顏不勝感慕仍施石戶封閉大師資靈河嶽稟氣星辰居縷褐之英應黃裳之吉由是早棲禪境久拂客塵裨二主於兩朝濟㣥生於三界邦家安泰魔賊歸降則知大覺真身觀音後體啟元關而敷揚至理開慈室而汲引元流生命示亡效鸖樹歸真之跡化身如在追雞峯住寂之心存沒化人始終宏道可謂定慧無方神通自在者焉弟子信宗禪師周解禪師林偘禪師等五百來人共保一心皆居上足常勤守護永切追攀每念巨海塵飛高風電絕累趨魏闕請樹豐碑今上克纘洪基恭承寶籙欽崇禪化不異前朝贈諡曰朗空大師塔名白月棲雲之塔爰命微臣宜修虀臼仁亠兊固辭不免惟命是從輒課菲詞式揚餘烈譬如提壺酌海莫知溟渤之深執管闚天難測穹蒼之濶然而早蒙慈誨眷以宗盟惟以援筆有情著文無愧強名元道將報法恩其詞曰至道無為猶如大地萬法同歸千門一致粵惟正覺誘彼㣥類聖凡有殊開悟無異懿歟禪伯生我海東明同日月量等虛空名由德顯智與慈融去傳法要來化童蒙水月澄心煙霞匿曜忽飛美譽頻降佳召扶贊兩朝闡揚元教缻破燈明雲開月照哲人去世緇素傷心門徒願切國主恩深塔封巒頂碑倚溪潯芥城雖盡永曜禪林建字若夫松嶽郡人大順景福間新羅政衰弓裔據高句麗之地國號泰封建事裔為侍中梁貞明四年逐裔自立後唐長興中冊為大義軍使特進檢校太保使持節元菟州都督上柱國高麗王晉天福六年加授開府儀同三司檢校太師開運二年卒天授元年六月丁巳詔曰前主當四郡土崩之時剷除寇賊漸拓封疆未及兼并海內俄以酷暴御衆以姦回為至道以威侮為要術徭煩賦重人耗土虛而猶宮室宏壯不遵制度勞役不止怨讟滋興於是竊號稱尊殺妻戮子天地不容神人共怨荒墜厥緒可不戒乎朕資㣥公推戴之心登九五統臨之極移風易俗咸與惟新宜遵改轍之規深鑑伐柯之則君臣諧魚水之歡河海協宴清之慶內外㣥庶宜悉朕懷辛酉詔曰設官分職任能之道斯存利俗安民選賢之務是急誠無官曠何有政荒朕叨膺景命顯馭丕圖顧臨涖以難安念庸虛之可懼惟慮知人不明審官多失俾起遺賢之歎深乖得士之宜寢興載懷職此而已內外庶僚並稱其職則匪獨今時之致理足貽後代之可稱宜其登庸列辟歷試㣥公勉務精選咸使僉諧自中及外具悉朕懷乙丑詔曰為國當務節儉民富倉實雖有水旱饑饉不能為患所有內莊及東宮食邑積穀歲久必多朽損其以內奉郎中能梵為審穀使戊辰詔曰朕聞乘機革制正謬是詳導俗訓民號令必順前主以新羅階官郡邑之號悉皆鄙野改為新制行之累年民不習知以至惑亂今悉從新羅之制其名義易知者可從新制辛亥詔曰前王視民如草芥而惟欲之從乃信讖緯遽棄松嶽還居斧壤營立宮室百姓困於土功三時失於農業加以饑饉荐臻疾疫仍起室家棄背道殣相望一匹細布直米五升至使齊民賣身鬻子為人奴婢朕甚閔焉其令所在具錄以聞又詔曰人君運佐時之奇畧樹蓋世之高勳者錫之以分茅胙土襃之以峻秩崇班是百代之常典千古之宏規也朕出自側微才識庸下誠資㣥望克踐洪基當其廢暴主之時竭忠臣之節者宜行賞賚以獎勳勞其以洪儒裴元慶申崇謙卜智謙為第一等給金銀器錦繡綺被褥綾羅布帛有差堅權能實權慎廉湘金樂連珠麻煖為第二等給金銀器錦繡綺被褥綾帛有差其第三等二千餘人各給綾帛穀米有差朕與公等欲救生民未能終守臣節以此為功豈無慚德然而有功不賞無以勸將來故有今日之賞公等明知朕意十五年五月甲申諭㣥臣曰頃完葺西京徙民實之冀憑地力平定三韓將都於此今者民家雌雞化為雄大風官舍頹壞夫何災變至此昔晉有邪臣潛畜異謀其家雌雞化為雄卜云人懷非分天垂警戒不悛其惡竟取誅滅吳王劉濞之時大風壞門拔木其卜亦同濞不知戒亦底覆亡且祥瑞志云行役不平貢賦煩重下民怨上有此之應以古驗今豈無所召今四方勞役不息供費既多貢賦未省竊恐緣此以致天譴夙夜憂懼不敢遑寧軍國貢賦難以蠲免尚慮㣥臣不行公道使民怨咨或懷非分之心致此變異各宜悛心毋及於禍十七年五月乙巳幸禮山鎮詔曰往者新羅政衰㣥盜競起民庶亂離暴骨荒野前主服紛爭之黨啟邦國之基及乎末年毒流下民傾覆社稷朕承其危緒造此新邦勞役瘡痍之民豈予意哉但草昧之時事不獲已櫛風沐雨巡省州鎮修完城柵欲令赤子得免綠林之難由是男盡從戎婦猶在役不忍勞苦或逃匿山林或號訴官府者不知幾許王親權勢之家安知無肆暴淩弱困我編氓者乎予以一身豈能家至而目覩小民所以末由控告呼籲彼蒼者也宜爾公卿將相食祿之人諒子愛民如子之意矜爾祿邑編戶之氓若以家臣無知之輩使子祿邑惟務聚斂恣為割剝爾亦豈能知之雖或知之亦不禁制民有論訴者官吏徇情掩護怨讟之興職競由此予嘗誨之欲使知之者增勉不知者能誡其違令者別行染卷猶以匿人過為賢不曾舉奏善惡之實曷得聞知如此寧有守節改過者乎爾等遵我訓辭聽我賞罰有罪者不論貴賤罰及子孫功多罪小量行賞罰若不改過追其祿俸或一年二三年五六年以至終身不齒若志切奉公終始無瑕生享榮祿後稱名家至於子孫優加旌賞此則非但今日傳之萬世以為令範人有為民陳訴勾喚不赴必令再行勾喚先下十杖以治違令之罪方論所犯吏若故為遷延計日罪責又有怙威恃力令之不可觸者以名聞今年六月內當國中原府入吳越國使張訓等回伏聞大吳皇帝已行禪禮中外推戴即登大寶者伏惟皇帝陛下道契三無恩涵九有堯知天命已去即禪瑤圖舜念歷數在躬遂傳玉璽建夙惟庸陋獲託生成所恨沃日波遙浮天浪闊幸遇龍飛之旦用申燕賀之儀無任歸仁戴聖鼓舞激切之至伏奉吳越國通和使班尚書所傳詔書一道兼蒙足下辱示長書敘事者伏以華軺膚使爰致制書尺素好音兼承教誨捧芝檢而雖增感激闢華牋而難遣嫌疑今託回軒輒敷危袵僕仰承天假俯迫人推過叨將帥之權獲赴經綸之會頃以三韓厄會九土兇荒黔黎多屬於黃巾田野無非於赤土庶幾弭風塵之警有以救邦國之災爰自善鄰於焉結好果見數千里農桑樂業七八年士卒閒眠及至酉年維時陽月忽焉生事至於交兵足下始輕敵以直前若螗蜋之拒轍終知難而勇退如蚊子之負山拱手陳辭指天作誓今日之後永世歡和苟或渝盟神其殛矣僕亦尚止戈之武期不殺之仁遂解重圍以休疲卒不辭質子但欲安民此則我有大德於南人也豈謂歃血未乾兇威復作蜂蠆之毒侵害於生靈狼虎之狂為梗於畿甸金城窘迫黃屋震驚仗義尊周誰似桓文之霸乘間謀漢惟看莽卓之姦致使王之至尊枉稱子於足下尊卑失序上下同憂以謂非有元輔之忠純豈得再安於社稷以僕心無匿惡志切尊王將援置於朝廷使扶危於邦國足下見毫釐之小利忘天地之厚恩斬戮君王焚燒宮闕葅醢卿士虔劉士民女熙姜則取以同車珍寶則奪之秵載元惡浮於桀紂不仁甚於獍梟僕怨極崩天誠深却日庶效鷹鸇之逐以申犬馬之勤再舉干戈兩更槐柳陸戰則雷馳電擊水攻則虎搏龍騰動必成功舉無虛發逐尹邠於海岸積甲如山擒鄒祖於邊城伏屍蔽野燕山郡畔斬吉奐於軍前馬利城邊戮隨晤於纛下拔任存之日邢積等數百人捐軀破青州之時直心等四五輩授首桐藪望旗而潰散京山銜璧以投降康州則自南而來歸羅府則自西而移屬侵攻若此收復寧遙必期泜水營中雪張耳千般之恨烏江亭上成漢王一捷之功竟息風波永清寰海天之所助命將何歸況吳越王殿下德洽包荒仁深字小特出綸於丹禁諭戢難於青邱既奉訓謨敢不尊奉若足下祗承睿旨悉戢凶機不惟副上國之仁恩抑亦紹東海之絕緒若不過而能改其如悔不可追蓋聞微言立教始開闕嗣位至於馬鳴繼美垂妙法於三乘龍樹揚芳見其闕五字相離相非身是身降及闕聞圓覺東入梁朝始見大宏北遊魏室於是師資所契闕四字祖法相承心燈不絕所以闕者焉大師法號忠湛俗姓金氏其先雞林冠族兔郡宗枝闕二字島以分榮託桑津而別派遠祖多闕陶潛而不事王侯希賈詡而寧求祿位所以考槃樂道早攻莊列之書招隱攀吟常避市朝之譽母闕賢之子豈無修聖善之心感此靈奇求生法允以咸通十年八月一日誕生大師生有殊相弱無戲言闕性靈超衆神悟絕倫槐市橫經杏園命筆二親嘗邀相者相之云若至甘羅之歲鳳舉難量終臻賈誼之闕至失於怙恃惟恨栖遑爰有長純禪師是導師修度世之緣當亡父結空門之友大師隨其長老得居闕俗塵方登僧位尋令昇堂覩奧入室鈎深迅足駸駸後發先至覺枝脈脈前開晚成所以偃仰禪林優游闕認印度重光終至相傳窺楞伽再闡迺於龍紀元年受具戒於武州靈神寺既而習其相部精究毗尼捧闕宗論道謂學人曰淺溜穿石同心斷金鑽燧之勤寫瓶之易皆由積微不已跬步遄征俄成學海之功永就闕釋子天日禪僧此間觀曝骨之墟見殭屍之處他山靜境豈無避地之方此地危邦終絕居山之計闕四字華闕者同載而征達於彼岸此時徑登雲蓋禪宇虔禮淨圓大師大師是棲雲壑之居佩石霜之印知大師遠離闕圖南迥奮垂雲之翼豫章向上高揮拂日之枝大師謂曰汝還認其到此階梯預呈其遷喬闕二字所以不離寶所闕河東參禪門於紫嶽故能初窺聖典久棲禹穴之旁始覽靈蹤方到燕臺之畔迺於天祐十闕一字年六月中得達於闕學俱於問訊慶忭交深數月論禪周年問法惟彌天發闕一字及離日搖脣量語路之端酌言闕一字之闕一字此日揣於兩地心闕之光愁見甲兵之色所以便辭金海遙指玉京行道遲遲於焉入境不惟摩勒重敷兼亦優曇一現奉迎內殿尋以闕遙屢吐象王之說重重避席恭披弟子之儀一一書紳結以王師之禮翌日請移闕五字之水淨精廬永元闕術大師遠從丹慊再到京畿所以別飾玉堂令昇繩榻問大師曰寡人少尚威武未精學闕一字不曉先王之典寧闕存亡之志所喜不勞漢夢仍覩秦星世宗之遇摩騰梁武之逢寶誌無以加也生生世世永修香火之因子子孫孫闕吉祥之地尚論往美更加延福之庭志有終焉心無悔矣然則遂於此地高敞禪扃闕二字如雲學人如霧依舊琉璃闕聞興法之談不受大師之誨者處處精舍其徒擯之終日了無語言一宵堅不留宿豈期大師素無疾疹富有闕五年七月十八日詰旦告門人曰萬法皆空吾將去矣一心為本汝等勉旃顏貌如常寂然坐闕一字俗年七十有二僧闕悲盈四部天人增絕學之哀寧惟慟徹諸方士庶泣亡師之痛寡人忽聆遷化尤慟於懷追切洪德不能己巳特闕萬壽之遐長乖㣥情之敬仰今則果雖核矣室可修焉然則先忻於水積魚歸後恨於林傾鳥散所冀早儀明禮正當闕之塔惟大師雪山成道煙洞證心傳十八代之祖宗統三千年之禪教則知浹洽浮世舉其廣則誰曰黃輿周闕忘機仍引狎鷗之興幾多肸蠁無限昭彰可謂闡揚身毒之風敷演竺乾之法者矣門徒弟子五百闕成田陳情而特請龜文瀝懇而頻干鳳德所冀顯無為之化留在水雲期不朽之緣刻於金石闕之心歸美百臺旌國士追攀之志乃為銘曰闕蘇認已藏寶知印慈航沒浪慧炬沈光銀燈石下闕朕聞大舜耕歷山終受堯禪高帝起沛澤遂興漢業朕亦起自單平謬膺推戴夏不畏熱冬不避寒焦身勞思十有九載統一三韓叨居大寶二十五年身已老矣第恐後嗣縱情肆意敗亂綱紀大可憂也爰述訓要以傳諸後庶幾朝披夕覽永為龜鑑其一曰吾國家大業必資諸佛護衞之力故創禪教寺院差遣住持焚修使各治其業後世姦臣執政徇僧請謁各業寺社爭相換奪切宜禁之其二曰諸寺院皆道詵推占山水順逆而開創道詵云吾所占定外妄加創造則損薄地德祚業不永朕念後世國王公侯后妃朝臣各稱願堂或增創造則可憂也新羅之末競造浮屠衰損地德以底於亡可不戒哉其三曰傳國以嫡雖曰常禮然丹朱不肖堯禪於舜實為公心若元子不肖與其次子又不肖與其兄弟之衆所推戴者俾承大統其四曰惟我東方舊慕唐風文物禮樂悉遵其制殊方異土人性各異不必苟同契丹是禽獸之國風俗不同言語亦異衣冠制度慎勿效焉其五曰朕賴三韓山川陰祐以成大業西京水德調順為我國地脈之根本大業萬代之地宜當四仲巡駐留過百日以致安寧其六曰朕所至願在於燃燈入關燃燈所以事佛入關所以事天靈及五嶽名山大川龍神也後世姦臣建白加減者切宜禁止吾亦當初誓心會日不犯國忌君臣同樂宜當敬依行之其七曰人君得臣民之心為甚難欲得其心要在從諫遠讒而已從諫則聖讒言如蜜不信則讒自止又使民以時輕徭薄賦知稼穡之艱難則自得民心國富民安古人云芳餌之下必有懸魚重賞之下必有良將張弓之外必有避鳥垂仁之下必有良民賞罰中則陰陽順矣其八曰車峴以南公州江外山形地勢並趨背逆人心亦然彼下州郡人參與朝廷與王侯國戚婚姻得秉國政則或變亂國家或銜統合之怨犯蹕生亂且其曾屬官寺奴婢津驛雜夫或投勢移免或附王侯宮院姦巧言語弄權亂政以致災變者必有之矣雖其良民不宜使在位用事其九曰百辟㣥僚之祿視國大小以為定制不可增減且古典云以庸制祿官不以私若以無功人及親戚私昵虛受天祿則不止下民怨謗其人亦不得長享福祿切宜戒之又以強惡之國為鄰安不可忘危兵卒宜加護恤量除徭役每年秋閱勇銳出衆者隨宜加授其十曰有國有家儆戒無虞博觀經史鑑古戒今周公大聖無逸一篇進戒成王宜當圖揭出入觀省甄萱新羅尚州加恩縣人本姓李初為裨將嘯聚亡命襲武珍州自稱後百濟王後唐同光八年入都城弒新羅主立主族弟金傅為王後為子神劍幽於金山佛宇乘間奔高麗高麗王待以殊禮號為尚父昨者新羅國相金雄廉等將召足下入京有同鼈應黿聲是欲鷃披隼翼必使生靈塗炭社稷邱墟是用先著祖鞭獨揮韓鉞誓百僚如皎日諭六部以義風不意姦臣遁逃邦君薨變遂奉景明王之表弟憲康王之外孫勸即尊位再造危邦喪君有君於是乎在足下不詳忠告徒聽流言百計窺覦多方侵擾尚不能見僕馬首拔僕牛毛冬初都頭索湘束手於星山陣下月內左相金樂曝骸於美利寺前殺獲居多追擒不少強羸若此勝負可知所期者掛弓於平壤之樓飲馬於浿江之水然以前月七日吳越國使班尚書至傳王詔旨知卿與高麗久通歡好共契鄰盟比因質子之兩亡遂失和親之舊好互侵疆境不戢干戈今專發使臣赴京本道又移文高麗宜相親比永孚于休僕義篤尊王情深事大及聞詔諭即欲祗承但慮足下欲罷不能困而猶鬬今錄詔書寄呈請留心詳悉且夋兔獹送憊終必貽譏蚌鷸相持亦為所笑宜迷復之為戒無後悔之自貽
