front:
  text: 全唐文欽定全唐文卷五太宗二
  hash: sha256:38324a32a5093e24cd2976d769ccd7c5d0b342e0319d1ad6a81423290a4a3c87
body:
  text: 周宣在位巳墜茲禮近代以來彌多所闕朕祗承大寶憲章典故今將履千畝於近郊復三推於舊制宜令有司式遵典禮二十一日親祭先農藉於千畝之甸尚書政本端揆任隆自非經國大材莫或斯舉中書令兼太子詹事邢國公房元齡器宇沈邃風度宏遠譽彰遐邇道冠簪纓兵部尚書檢校侍中蔡國公杜如晦識量清舉神彩凝映德宣內外聲溢廟堂朕自克平宇縣締搆資深叶贊經綸厥功甚茂深謀祕略動合規矩忠議讜言事多啓沃及典司樞要綢繆宸扆開物成務知無不為可謂神降英靈天資人傑並宜總司衡軸光闡大猷元齡可尚書左僕射如晦可尚書右僕射餘如故百行之本要道惟孝一言終身恕而巳矣春生夏長寬仁之令行焉齊禮道德格之義斯在朕爰自幼年夙稟庭訓豈徒學聞詩禮因令匡定家國是以提三尺之劒起一旅之師戮鯨鯢於原野救黎蒸於塗炭雲雷締構備嘗夷險仁發於心義形於色大敵必勇匪為身謀大憝必誅志安天下太上皇留心姑射尚想軒轅駐蹕太安使朕正居紫極顧惟虛薄辭不獲免祗奉制誥負扆當朝乃眷宮宇載懷冰谷未明求衣乙夜忘寢靜思七政言念九功何以答上元之心稱嚴君之意庶欲勤恤典刑舉直措枉允釐人瘼親賢用能拯濟困窮抑損澆偽開直言之路廣不諱之門聞所未聞日慎一日望人皆見德變於志道若一物失所一人有惡則朕躬之責訓道不明也朕聞書曰至諴感神況於兆庶乎比聞遠近黔黎為盜賊州縣囹圄多並空虛豈由德教至此自是人心厭亂因其遷善可以化之朕往因征伐行天下多矣每見村落邱墟未嘗不撫膺太息自登九五不得橫役一人惟冀遐邇休息得相存養長幼有序敬讓興行其孝義之家賜粟五石高年八十以上粟二石九十以上三石百歲加絹二匹婦人正月以來生男者粟一石鰥寡惸獨不能自存逃戶初還家無糧貯州縣長官量加賑恤諸州官人或正直廉平刑清訟或貪婪貨賄害政損人宜令都督刺史以名封進白屋之內閭閻之人但有文武材能灼然可取或言行忠信堪理時務或在昏亂而肆情遇太平而克己亦録名狀與官人同申泣辜慎罰前王所重枉繫一日事等三秋州縣法司特宜存意普告天下知朕意焉朕以眇身祗膺大寶託王公之上居兆億之尊勵志克己詳求至治兢兢業業四載於茲矣上不能使陰陽順序風雨以時下不能使禮樂興行家給人足而關輔之地連年不稔自春及夏亢陽為虐雖復潔誠祈禱靡愛斯牲膏雨愆應田疇廢業斯乃上元貽譴在豫一人元元何辜罹此災害朕是用食不甘味寢不安席瞻西郊而載惕仰雲漢而疚心內顧諸己永懷前載既明不自見德不被物豈賞罰不衷任用失所將奢侈未革苞苴尚行者乎文武百辟宜各上封事極言朕過勿有所隱門下至人虛己忘彼我於胸懷釋教慈心均異同於平等是知上聖惻隱無隔萬方大悲宏濟義猶一子有隋失道九服沸騰朕親總元戎致茲明罰誓牧登陑曾無寧歲老弱被其桀犬愚惑嬰此湯羅銜鬚義憤捐軀抗節各徇所奉咸有可嘉日往月來逝川斯遠雖復項籍方命封樹紀於邱墳紀信捐生丹青著於圖史猶恐九泉之下尚淪鼎鑊八難之間永纏冰炭愀然疚懷用忘興寢思所以樹其福田濟其營魄可於建義以來交兵之處為義士凶徒隕身戎陳者各建寺剎招延勝侶望法鼓所震變炎火於青蓮清梵所聞易苦海於甘露所司宜量定處所并立寺名支配僧徒及修造院宇具為事條以聞稱朕矜愍之意天生蒸民樹之司牧莫不仰膺靈命克嗣寶圖用能永享鴻名常為稱首朕君臨八方於今四載夙興夜寐無忘晷刻履薄馭朽思濟黔黎推心至誠庶幾王道上荷蒼昊之眷下藉股肱之力宇內休平遐邇寧泰率此區域致之仁壽憬彼獯戎為患自昔軒昊以來常罹寇暴是以隆周致涇水之師強漢受白登之辱武夫盡力於關塞謀士竭慮於廟堂征伐和親無聞上策有隋災亂憑陵轉甚疆埸之萌曾無寧歲朕韜干鑄戟務在存養自去歲迄今降款相繼不勞衛霍之將無待賈朝之略單于稽首交臂藁街名王面縛歸身夷邸襁負而至前後不絶被髮左衽之鄉狼望龍堆之境蕭條萬里無復王庭惟頡利挺身逃竄林穴天網雲布走伏何所大同之世諒在茲日斯皆上元降祐清廟威靈豈朕虛薄所能致此方欲至仁化物宜存寬惠思與萬邦同享斯福可大赦天下自貞觀四年二月十八日昧爽巳前罪無輕重自大辟以下繫囚見徒皆赦除之逋負官物三分免一分其謀反大逆妖言惑衆及殺期親以上尊長奴婢部曲反主官人枉法受財不在赦例鰥寡孤獨不能自存者州縣量加賑濟賜天下大酺五日敢以赦前事相告言者以其罪罪之皇太子承乾宜令聽訟在茲恤隱自今以後訴人惟尚書省有不伏者於東宮上啓令承乾斷決今若有固執所見謂理不盡然後聞奏車服以庸昔王令典貴賤有節禮經彞訓自末代澆浮采章訛雜卿士無高卑之序兆庶行僭侈之儀遂使金玉珠璣靡隔於工賈錦繡綺縠下通於皂隸習俗為常流遁亡反因循巳久莫能懲革朕繼踵百王欽承寶運思宏典制垂範後昆永鑒前失義存釐改其冠冕制度巳備令文至於尋常服飾未為差等今巳詳定具如別式宜即頒下咸使聞知端右望隆寄任尤重實資勳德朝難其選左光祿大夫行兵部尚書代國公李靖識度宏遠才略優贍博綜機務兼資文武誠著夷險效彰出納便蕃省闥詳謹有聞宜緝彞倫允茲名器可尚書左僕射朕丕承先緒積慶纍仁上纘鴻基克隆寶祚欽若稽古緬想往册英聲茂實志深褒尚始茲巡省眺矚中塗漢氏諸陵北阜斯託寂寥千載邈而無祀攬轡興懷慨然遐念開闢以降肇有司牧歷選列辟遺迹可觀良宰名卿清徽不滅宜令所司普加研訪爰自上古洎於隋室諸有名王聖帝盛德寵功定亂弭災安民濟物及賢臣烈士立言顯行緯武經文致君利俗邱壟可識塋兆見在者各隨所在條録申奏每加巡守禁芻牧春秋二時為其致祭若有隳壞即宜修補務令周盡以稱朕意突厥種落往逢災厲病疫飢饉殞喪者多暴骸中野前後相屬幽魂靡託醊奠無所永言矜悼有懷惻隱宜令所司於大業長城以南北分道巡行但有骸骨之所酒脯致祭速為埋瘞務令周悉以稱朕意焉朕恭膺寶命握圖馭歷屬喪亂之後承凋弊之餘宏宣德化勵精治道遐邇肅清要荒來服聊因務暇觀省民風遵彼岐梁言臻汧渭百年之老俱稱鼓腹五尺之童咸欣擊壤眷言曩昔亟遊此地歲月踰邁以迄於茲周覽原隰悵然懷舊延問鄉黨僚吏猶存事異宛譙情均豐沛民和俗阜上下歡洽宜宣愷澤俾同慶幸可特赦岐隴二州管內自貞觀四年十月一日昧爽巳前大辟罪以下悉從原免二州戶民無出一年租賦八十以上鰥寡篤疾及舊任二州雜職佐史以上賜物各有差百歲以上就加優恤行經咸陽始平武功三縣見禁之囚徒罪以上各降一等杖罪以下并宜釋放年八十以上及鰥寡篤疾并武功縣舊軍主帥亦加賜物凡此界內名山大川望秩之禮備加牲幣孝子順孫義夫節婦隨事褒顯旌表門閭其賜物之差宜依別敕務從周厚以稱朕意武功舊居與岐隴不異前令減罪未稱朕心其武功一縣曲赦其罪及賜帛免租賦等特宜同岐隴二州省表具懷自有隋失道四海橫流百王之弊於斯為甚朕提劒鞠旅首啓戎行扶翼興運克成鴻業遂何慈眷恭承大寶每日昃思治弗敢康寧兢兢夕惕用忘興寢履薄馭朽不足為喻賴三靈顯命百辟同心海外無塵遠夷慕義但流遁永久凋殘未復田疇多曠倉廩猶虛家給人足尚懷多愧豈可遽追前代取譏虛美所望恂恂濟濟協力盡誠輔其不逮致之王道如得雅頌形於金石菽粟同於水火反朴還淳當如來議甲兵之設事不獲巳義在止戈期於去殺季葉馳競恃力肆威鋒刃之下恣情翦馘血流漂杵方稱快意尸若亂麻自以為武露骸封土多崇京觀徒見安忍之心未宏掩骸之禮靜言念此憫歎良深但是諸州有京觀處無問新舊宜悉剗削加土為墳掩蔽枯朽勿令暴露仍以酒酺致祭奠焉惟王建國厚禮被於元勳惟帝念功茂賞隆於延世是以親賢作屏著在周經支庶畢侯義存漢典開府儀同三司齊國公無忌尚書左僕射邢國公元齡故尚書右僕射蔡國公如晦靈州都督吳國公尉遲敬德左光祿大夫吏部尚書許國公高士廉兵部尚書潞國公侯君集右衛大將軍郢國公宇文士及左武衛大將軍翼國公秦叔寶瀘州都督宿國公程知節等或宇量凝深地兼賢戚或風鑒宏遠功參帳幕或志懷強正便蕃左右或幹略宏舉契闊戎旃或委質藩朝陳力王室誠著出納節表屯夷經文緯武忠勤懇至固巳契叶風雲寄深舟楫雖褒賢之道巳紀於旗常而推恩之令未洽於胄緒宜賜寵章式遵故實無忌元齡如晦敬德各封一子郡公士廉君集士及叔寶知節各封一子縣公俾夫拜前拜後比蹤曩烈如帶如礪垂裕後昆欽明慎徽之朝稽古為本體國經野之制利建為先莫不因可大之功宏可久之德與萬邦同其樂百姓共其安饗祚遐長卜年用永疏爵以五錫壤惟三周監二代煥乎前史魏晉迄今舊章寖廢維城之義缺如建侯之道斯絶王綱暫弛內無拯救之臣國步才迍外無藩屏之衛致令大盜猖獗動有窺覦蒸庶板蕩屢遭塗炭進乖為民之策退失象賢之典寧邦固本其可得乎朕祗膺大寶欽承景命勵精治術安輯夷夏九服同軌六合一家日月所臨無思不服豈伊人力天實賜之既荷殊施休宏大賚疆理都邑褒錫親賢與夫懿戚元功共享其利自我作古不必專依前典允今約古隆基垂統世祿傳家足以載德圖身厚己足以竭誠自然國有常奉民獲其福皇家宗室及勳賢之臣德行可稱忠節顯著者宜令作鎮藩部宣條牧民貽厥子孫嗣守其政非有大故無或黜免酬勤報效仍宜有差宜令所司明為條例等級具以奏聞卿所論太美但朕德甚寡薄恐有識者窺卿為後人所笑卿引古昔無為而治朕未敢擬倫比之近代乍踰之耳卿覩朕之始未見朕之終宜付祕書若朕能慎終如初則可為也如違此道不用後代笑卿焉比年豐稔閭里無事乃有隳業之人不顧家産朋遊無度酣宴是耽危身敗德咸由於此每覽法司所奏因此致罪實繁有徒靜言思之良增軫歎自非澄源正本何以革茲弊俗可先録鄉飲酒禮一卷頒示天下每年令州縣長官親率長幼依禮行之庶乎時識廉人知禮節尊賢尚德義存致治高秩厚禮允屬勳庸左光祿大夫行揚州大都督長史觀國公恭仁識宇凝正風度夷器惟瑚璉望重縉紳歷官有聲歲寒若一而志在虛靜固求間任辭理懇至確乎難奪宜成其美加茲寵命可特進宇文化及弟智及司馬德戡裴虔通孟景元禮楊覽唐奉義牛方裕元敏薛世良馬舉元武達李孝本李孝質張愷許宏仁令狐行達席德方李覆等大業季年咸居列職或恩結纍世任重一時乃包藏凶慝罔思忠義爰在江都遂行弒逆罪百閻趙釁深梟獍雖事是前代歲月巳久而天下之惡古今同棄宜從重典以厲臣節其子及孫并宜禁錮勿令齒敘化及既為魁首又竊名號一門之內凶德尤甚但其兄士及不預逆謀雖云昆季僅免誅戮自委質皇朝勳庸克著彰善疸惡抑有舊章士及一房不在此例布告天下咸使聞知論道台階實賴明哲丹青神化寄深燮理自非鹽梅是屬棟幹有歸則曠職俟能罔或必備開府儀同三司齊國公無忌器宇凝正風度峻遠才包文武地兼賢戚誠著草昧之辰業預艱難之始功侔十亂聲高三傑亮采銓衡庶僚有序儀形端右彞常以穆自任參鼎司位班槐路撝挹之美形於縉紳翼贊之規彰於帷扆宜崇名器允副具瞻可司空所司具禮以時册命昔黃帝得力牧而為五帝先夏禹得咎繇而為三王祖齊桓得管仲而為五伯長朕自居藩邸公為腹心遂得廓清宇內君臨天下以公功績才望允稱具瞻故授此官無宜多讓也昔者明王之御天下也內列公卿允釐庶績外建侯伯司牧黎元惟懼淳化未敷名教或替故有巡狩之典黜陟幽明行人之官存省方俗用能遐邇遂性情偽無遺時雍之化率由茲道朕祗膺寶命臨御帝圖稟過庭之義方荷上元之嘉祉四荒八表無思不服而夙興夕惕勤躬約己日慎一日雖休勿休欲萬國歡心兆民有賴推誠待物近取諸身實謂㣥官受拜賢能自勵乃聞連帥刺舉或乖共理之寄縣司主吏甚多黷貨之罪有一於此責在朕躬是用終夜憮然昃景輟食宜遣大使分行四方申諭朕心延問疾苦觀風俗之得失察政刑之苛弊耆年舊齒孝悌力田義夫節婦之家疾廢惸嫠之室須有旌賞賑贍聽以倉庫物賜之若有鴻材異學留滯末班哲人奇士隱淪屠釣宜精加搜訪進以殊禮務盡使乎之旨俾若朕親覩焉朕嗣纂鴻業思恢至道端拱垂裳於茲九載式修文德寧謐區宇徼外君長海表酋渠無遠不庭無思不服而吐谷渾蕞爾小蕃負固河右地不遠千里衆不盈一萬不量其力不恤其人肆情拒命抗衡上國朕每遣行人入蕃曉諭并引其使者臨軒戒勗示以善道勸以和親欲使境上無虞各安其業訓導積年凶頑未改剽掠邊鄙略無寧息今上書傲很拘我使人內外百僚華夷兆庶同心憤怨咸願誅討宜乘弔伐之機以展鷹鸇之志長驅克寸期窮其巢穴罪止吐谷渾可汗昏耄之主及天柱王一二邪臣自餘部落皆無所問夷凶息暴稱朕意焉天地播氣垂生育之德皇王御極宏覆幬之仁故能財成萬類光宅八表朕祗奉慈訓嗣守鴻業承百王之季末屬四海之凋殘夜興夕惕無忘兆庶克己勤躬思隆政道欲使陰陽順序干戈載戢庶幾前烈致茲刑措而山東之地頻年不稔水雨為災飢饉相屬蠢爾西戎屢擾邊境事不獲巳遂勞兵車良由誠未動天德不被物興言念此撫己多慚加以澆偽尚繁典刑仍用雖復留心聽斷明慎庶獄嘗恐縲絏之中含冤靡訴憲網所及無辜致罪一物有怨責深在余今歲惟暮春時屬生長宜順天布澤與物更新可大赦天下自貞觀九年三月十六日昧爽以前大辟罪巳下皆赦除之其常赦不免者不在赦例鰥寡惸獨不能自存者所在官司量加賑恤書不云乎一人有慶兆民賴之朕虔奉太安愛敬崇極日嚴之養祗憟斯在近日聖躬違豫寢膳有虧憂懼在懷不遑寧處博求醫術備盡蠲療祈告明靈具陳懇篤上元降福遂蒙昭祐應時康愈萬福咸宜慶幸之隆實兼家國思班愷樂洽於卿士然而尚齒興孝德教所先饗餼是加義超常等諸州都督刺史及文武官人老人八十以上并孝子旌表門閭者並宜節級賜物以申饗宴庶使萬國之內同此歡心施於四海皆知朕意伐罪弔人前王高義興亡繼絶有國令典吐谷渾擅相君長竊據荒裔志在凶德政出權門酋渠攜二種落怨憤長惡不悛野心彌熾莫顧藩臣之節曾無事上之禮草竊疆埸虐割氓庶積惡既稔天亡有徵朕君臨四海含育萬類一物失所深責在豫所以爰命六軍申茲九伐義存活國情非黷武其子大寧王慕容順隋氏之甥志懷明悟長自中土早慕華風爰見時機深識逆順以其父愎懷違衆獨蹈迷途遂誅邪臣存茲大計翻然改轍代父歸罪忠孝之美深有可嘉子能立功足以補過既往之釁特宜原免然其建國西鄙巳歷年代即從廢絶情所未忍繼其宗祀允歸令子封順西平郡王食邑四千戶仍授趉胡呂烏甘豆可汗所司量遣使人備禮册命朕以不天夙罹偏罰假息旦暮分沈苫壤仰賴先皇慈恩鞠育爰自幼年至於成家未及弱冠仍屬亂離翼奉義旗身當矢石克平多難任居藩屏遂復委以萬機膺茲景命祗懼虛薄弗克負荷日夜兢兢不遑寧晏加以氣患屢幸九成晨昏定省廢於朝夕今歲停行盡行養禮不謂殃罰深重大行崩背號天叩地無所逮及伏奉遺詔追迹漢文以日易月降其常期顧命之旨誠不可違然三年之喪自天子達殷周以來罔弗遵用漢文變古有乖前式且慈顏日遠欣謁無由俯就之文理即遵奉然朕之情切不可循前荼毒之心何可堪忍皇太子承乾文過志學秉性聰敏頻年治國理務允諧今欲於東宮平決朕得盡哀廬室終其喪紀望㣥公卿士股肱王室興言及此唯增哽絶朝多君子恕朕哀心門下三乘結轍濟度為先八正歸依慈悲為主流智慧之海膏澤㣥生翦煩惱之林津梁品物任真體道理叶至仁妙果勝因事符積善朕欽若金輪恭膺寶命至德之訓無遠不思大聖之規無幽不察欲使人免蓋纏家登仁壽冥緣顯應大庇含靈五福著於洪範三災終於世界比因喪亂僧徒減少華臺寶塔窺戶無人紺髮青蓮櫛風沐雨眷言凋毀良用憮然其天下諸州有寺之處宜令度人為僧尼總數以三千為限其州有大小地有華夷當處所度多少委有司量定務須精誠德業無問年之幼長其往因減省還俗及私度白首之徒若行業可稱通在取限必無人可取亦任其闕數若官人練不精宜録附殿失但戒行之本惟尚無為多有僧徒溺於流俗或假託神通妄傳妖怪或謬稱醫筮左道求財或造詣官曹囑致贓賄或鑽膚焚指駭俗驚愚並自貽伊戚動挂刑網有一於此大虧聖教朕情深持護必無寬捨巳令依附內律參以金科具陳條制務使法門清整所在官司宜加檢察其部內有違法僧不舉發者所司録狀奏聞庶善者必採惡者必斥伽藍淨土咸知法味菩提覺路絶諸意垢高祖大武皇帝天縱神武膺籙受圖可久之德格乎區宇敦睦九族協和萬邦賢能必進德化潛洽革百王之弊興三代之風天平地成邇安遠肅至德被於四海休烈光於千載巍巍蕩蕩無得而稱焉朕嗣膺寶祚夙夜兢惕思述先志被之率土其內外姻戚生平故舊太原元從官人及歷試之所文武寮佐爰及胥吏往雖每降國恩恐未周悉或才用不申階品屈滯或家道貧匱子孫沈淪須有矜量咸使得所先朝憂勞庶政惟以恤民為本諸州都督刺史有政績可稱者具以名聞其諸州百姓奉營山陵者亦宜量有蠲免可令所司詳為條例聞奏並務從優厚稱朕意焉昔周監二代崇文武之典禮漢紹三王尊高光之功烈斯固有國之彞訓不刊之令範高祖大武皇帝聰明神武睿聖徇齊應天順民撥亂反正德侔造化道濟區夏靖率土之沸騰拯黔首之塗炭一戎大定四海宅心制治定之禮作功成之樂天地交泰品物咸寧聲教遐洎休徵雜沓蠻夷戎狄之長輻湊藁街麟鳳龜龍之祥光映圖史然猶日慎一日推而弗居邁邃古之鴻名踰前王之至治朕以寡昧丕承景業緬惟永往攀慕終天思宏尊親之治庶展罔極之志竊惟太原之地肇基王迹事均豐沛義等宛譙理宜別建寢廟以彰聖德詳觀漢典抑有成規但先皇遺旨務存儉約虔奉訓誡無忘啓處宜令禮官與公卿等詳議以聞近以吐谷渾恃其遐阻屢擾疆埸肆行凶虐種類乖離爰命將士申茲弔伐有征無戰所向摧殄渠魁竄迹自貽滅亡朝威遠暢邊庭靖謐朕君臨寰宇志在含宏不欲因彼危亂絶其宗祀乃立偽主之子大寧王慕容順撫招餘燼守其舊業而順曾不感恩遽懷二志種落之內人畜怨憤遂創大義即加剿絶雖復權立其子所部又致擾亂競動干戈各行所欲朕憂勞兆庶無隔夷夏乃眷西顧良用矜惕若不星言拯救便恐塗炭未巳兵部尚書潞國公侯君集等咸才兼文武寄深內外嘉謀著於廟堂茂績書於王府必能宣風閫外克定遐方可量其事機綏撫經略分遣使人明加曉諭如有不遵明旨敢興異志即合精鋭隨便翦撲盡威懷之道稱朕意焉朕既為子卿等為臣愛敬罔極義猶一體無容固陳節儉陷朕於不義也今便敬依來議朕遐想千載旁覽九流詳求布政之方莫若薦賢之典是以元凱就列仄微可以立帝功管隰為臣中人可以成霸業朕緬懷曩烈虛己英奇斷斷之士必升於廊廟九九之術不棄於閭閻猶恐在陰弗和獨善難奪永言髦傑無忘鑒寐是以去夏之中爰動翰墨披露丹腑疇咨海內尺木既樹思覩遊露之㣥雲羅宏舉佇降翔庭之翼而諸州所舉十有一人朕載懷仄席引入內殿借以溫顏密訪政道莫能對揚相顧結舌朕仍以其未覩闕庭能無戰悚令於內省更以墨對雖搆思彌日終不達問旨理既乖違詞亦庸陋豈可飾丹漆於朽質假風雲於決起者哉宜並放還各從本色其舉主以舉非其人罪論仍加一等然則今之天下猶古之天下也寧容仲舒伯起之流遍鍾美於往代彥和廣基之侶獨絶響於今辰故其見知也則平津與樂安並進其不用也則敬通與亭伯同悲淮陰所以興言子長所以貽歎因斯論之良由俊造難進或固栖遲之節牧宰循常未盡搜揚之道撫事長息彌用憮然今州縣依前薦舉皆集今冬奇偉必收浮華勿採無使巴人之調濫吹於簫韶魏邦之珍沈光於漢水務盡報國之義以副欽賢之懷夫生者天地之大德壽者修短之常期生有七尺之形壽以百齡為限含靈稟氣莫不同焉皆得之於自然不可以分外企也雖回天轉日之力盡妙窮神之智生必有終皆不能免是以禮記云君即位而為椑莊周云勞我以形息我以死聖人之至鑒通賢之深識著之典誥詒之話言顯説正詞曾無隱諱末代以來明辟蓋寡靡不矜黃屋之尊慮白駒之過並多拘忌希慕遐年謂雲車易乘曦輪可駐異軌同趨其蔽甚矣有隋之季海內橫流豺狼肆暴吞噬黔首邑里凋殘鞠為邱墟朕投袂發憤情深拯溺扶翼義師濟斯塗炭賴蒼昊降鑒股肱宣力提劒指揮天下大定氛祲清殄區宇平一反澆弊於淳朴致王道於中和此朕之宿志於斯巳畢猶恐身後之日子子孫孫尚習流俗猶循常禮加四重之櫬伐百祀之木勞擾百姓崇厚園陵今預為此制務從儉約於九嵕之山足容一棺而巳積以歲月漸以備之木馬塗車土桴葦籥事合古典不為時用又佐命功臣義深舟楫或定謀帷幄或身摧行陳同濟艱危克成鴻業追念在昔何日忘之使逝者無知咸歸寂寞若營魂有識還如疇曩居止相望不亦善乎漢氏使將相陪陵又給以東園祕器篤終之義恩意深厚古人之志豈異我哉自今以後功臣密戚及德業尤著如有薨亡宜賜塋地一所給以祕器使窀穸時喪事無闕所司依此營備稱朕意焉文德懷遠列聖之宏規興亡繼絶至仁之通訓吐谷渾發迹東胡竄居西域負險自固擅立君長爰在前代通使中原或為叛臣不常厥德近者慕容步薩鉢為主老而不智迷而忘返志懷首鼠虔劉疆埸朕頻命行人殷勤誘諭不納忠信之言惟行蠆之毒及六軍問罪尚令申諭遂無悛革以至滅亡其子順國蹙事窮歷身無所委命下吏輿櫬轅門故令解網釋俘繼其宗祀乃懷二志遵彼覆車曾未浹旬自貽屠戮子燕王諾曷鉢弱不好弄幼稱通理才纂舊業即逢內難故遣旌節遠申安撫遂能率其種類同竭誠款盡其巢落迎謁使者屈膝頓顙遵奉朝化請頒正朔願入提封丹誠內發深可嘉尚宜隆寵章懋茲賞典可封河源郡王食邑四千戶仍授烏地也拔勒豆可汗即遣使人備禮册命文昌治本端副望隆朝綱所屬選衆斯在中書令虞國公溫彥博體業貞固學藝該明器惟瑚璉材稱棟幹任總絲綸職居近密乃心著於帷幄嘉謀表於樽俎寄深啓沃義切鹽梅宜升禮闈允茲彞序可尚書右僕射勳封如故留侯名相濟北之志巳高疏傅人師東都之迹彌著後進仰其遺烈前策以為美談諒可以砥節礪行化俗宏風者也左光祿大夫侍中鄭國公魏徵器量沈敏軌儀詳正文思優贍學業該通自參贊機衡綢繆幃幄知無不為心力備盡格言弗隱正義日聞一德載宣四聰斯達實賴嘉猷用康治道而深執謙損志懷沖退詞誠懇切良用憮然杼軸於懷屢移氣序而固陳丹款義在難違今使伸其雅志以成厥美可特進封如故仍知門下事朝章國典參議得失自徒流以下罪詳事奏聞其祿賜及國官防閣等並同職事元琬律師戒行貞固學業精通方冀宏宣正法利益㣥品不幸沒世情深惻悼
