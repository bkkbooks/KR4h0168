front:
  text: 全唐文欽定全唐文卷一百十九晉少帝二
  hash: sha256:621c55d8aebab4fa34b1983a43b975a21f720301648dab9c4589e3222242666d
body:
  text: 契丹違天背惠猾夏渝盟無名侵犯於封疆縱暴殺傷於生聚毒流數郡怒積羣情果敗衄於漳川乃退歸於燕塞今則長驅虎旅誓滅胡塵雪萬姓之沈冤期四方之昭泰每念蕃寇經過之處邊隅陷沒之人未掩殭尸何安恨魄軫傷既切惠澤宜加其常定邢洺管界蕃寇經過之處枉遭殺害無主收葬者宜令本州差大將一人所在收瘞量事祭奠訖具事以聞盧敻請河南尹親及廟貌冀表精虔在禱山川誠為重事且浩穰都邑豈可闕人今後祭中嶽宜令河南尹往彼行禮眷惟泰郡素乃漢疆偶隸蕃戎久罹塗炭遇王師之進討傾臣節以來降況地處要衝人推勇悍將控臨於黠虜宜係屬於雄藩其泰州宜割屬定州為屬郡以狼山寨主孫方簡為泰州刺史仍較尚書右僕射本州守禦都指揮使充定州東西面都巡陶穀方思豐國切欲勸農以貿易於柴薪多砍伐於桑棗請行禁絶宜舉科條仍付所司囹圄之中縲絏之苦奸吏苟窮於枝蔓平人用費於貨財繇茲滯淹兼致屈塞桑能體茲軫憫專有敷陳請長吏躬親免獄官抑逼深為允當宜在頒行御史臺準前朝故事以郎中員外郎一人兼侍御史知雜事近年停罷獨委年深御史知雜振舉之閒紀綱未峻宜遵舊事庶叶通規宜却於郎署中選清慎強幹者兼侍御史知雜事省所奏以先臣遺命及官吏推請權知國事事具悉圭茅積慶忠孝因心早彰幹蠱之名顯著象賢之譽雅當嗣襲深契物情見先臣知子之明成後嗣克家之美遠陳章奏尤驗純誠欣慰之懷寤寐無巳人之命無以復生國之刑不可濫舉雖一成之典務在公平而三覆其詞所宜詳審凡居法吏合究獄情邊玕近陟周行俄陳讜議更彰欽恤宜允申明諸道不許橫薦官寮爰自近年頗踰舊制起今後諸道藩鎮防禦團練刺史如本處幕席中有闕準元敕合奏薦當與除授不得橫薦前資賓從州縣官及諸色職員希於在朝及外官安排不得有違今年四月二十五日釐革應前資州縣官一考前丁憂一任除官雪活冤獄及在任日招添得戶口稅錢曾授御署官進策官諸州馬步判官諸色選人等今後並須準敕格參選不得直經中書陳狀近日有諸色人依前紊亂紀綱披陳文狀欲嚴行於懲戒先明示於指揮國家大啓銓曹高懸選格諸色選人宜歸常調合赴所司稍立政能足可進退豈得罔循常制唯務僭求敕釐革而不遵帖告示而不退向路隅而陳接隨馬後以喧譁或稱罷秩家貧或訴在京日久朝廷須存公道難狥私懷若事可施行雖朝陳狀而夕得官未足言速既理有違礙雖歷祁寒而經暑雨不必言遲戚本自貽咎將誰執殊不知官不可乞敕不可違若無誡懲何以齊整應諸色選人等並須準近敕取解赴選其有招添得戶口增益得稅錢及雪活冤獄合該敕條酬奬者仰於所司投狀如有司不與公當區分顯有抑滯任經中書陳狀當與指揮此度分明告諭後諸色選人等如更不稟指揮依前妄陳文狀當送御史臺勘問必無輕恕仍付所司文物方興刑罰須當有罪宜從於正法去邪漸契於古風竇儼所貢奏章實裨理道宜依所奏準律令施行控制寰中梁苑得舟車之要撫寧河朔鄴臺有粟帛之饒先皇帝肇啓基扃咸升都邑南北非遠來往是常今則時正晏清當和煦宜回金輅往幸夷門宜取今月十一日還幸東京應沿路州府並不用修飾行宮開治道路食宿頓遞並以官物供給勿令科斂人戶側近州府長吏勿來朝覲凡在遐邇宜體朕懷惟天福八年歲次癸卯十月丙午朔六日辛亥皇帝若曰在天成象拱辰分將相之星惟帝念功啓土列侯王之國朕所以法昊穹而光宅稽典禮以疏封而況世著大勳時推令器探寶符而嗣位仗金鉞以宣威羽翼天朝藩籬東夏宜列諸侯之上特隆一字之封自朕心叶於輿論咨爾保邦宣化忠正翊戴功臣起復鎮國大將軍右金吾衛上將軍員外置同正員檢校太師兼中書令杭州越州大都督充鎮海鎮東等軍節度浙江東西等道管內觀察處置兼兩浙鹽鐵制置發運營田等使上柱國吳越國王食邑一萬七千戶實封四千戶錢宏佐為時之瑞命世而生負經文緯武之才蘊開物成務之志英華發外精義入神亞夫繼社稷之勳顧榮擅東南之美眷言祖考志奉國朝清吳越之土疆執桓文之弓矢天資厥德代有其人荷基構以克家事梯航而述職殊庸斯在信史有光是舉彞章爰行盛典土茅符節方推翼世之賢黻冕輅車更重策勳之禮斯為異數允屬真王今遣使光祿大夫檢校司徒行太子賓客上柱國太原縣開國男食邑三百戶王玫使副正議大夫行尚書吏部郎中柱國賜紫金魚袋趙熙等持節備禮冊爾為吳越國王於戲周寵元臣四履錫命漢封異姓八國始王指河嶽以誓功俾子孫而襲爵爾纂服舊業朕載考前文勿忘必復之言更廣無窮之祚懋昭前烈爾惟欽哉古先哲王開創丕業未嘗不櫛風沐雨旰食宵衣安黔首於八紘保鴻圖於萬世恭惟先皇帝艱難啓運恭儉臨朝以武功定寰區以文德安黎庶日慎一日無怠無荒載洽隆平永傳基構顧惟沖眇獲奉纂承念負荷以為難集哀摧而罔極期終喪制旋逼羣情竭推戴以彌堅執讓辭而不獲勉臨大寶以御兆民宜頒在宥之文用布惟新之澤可大赦天下應天福七年七月十七日昧爽巳前四京及諸道州府諸色罪犯除十惡五逆殺人強盜官典犯贓合造毒藥屠牛鑄錢諸色僞造外其餘罪犯巳結正未結正巳發覺未發覺咸赦除之巳前諸色配流人等除終身不齒常知所在縱逢恩赦不放還人及曾為強盜巳配諸處收管人外其餘並放還其今日巳前放還人內舊有職官者量與敘用弔民伐罪用生懲勸之思改過自新必務含宏之道其襄州安從進如能果決推誠一稟朝旨並從捨釋各與官榮朕恭承顧命初嗣丕基而文武羣臣中外良佐肅清輦轂保佐國家備彰忠孝之心咸竭推崇之力宜覃恩渥用表旌酬在朝內外臣寮侍衛諸軍將校及諸道節度使防禦團練刺史並與加恩修奉園陵考詳故實務遵禮典副朕孝思凡曰在官悉能陳力爰逢昌運宜示溥恩諸道賓幕將校職員見任京六品巳下官州縣官三司場院監冶帶使額者普與加恩其諸道職員押衙巳上與轉官兵馬使巳下與轉職懸車官秩前任職資載敦尚齒之風爰示念功之典致仕官前任文武朝臣內諸使司巳下前任節度使防禦團練刺史行軍賓從少尹上佐官前諸道都指揮巳下前任京六品巳下官及前資州縣官帶使額場院官等並與加恩京師職掌夙夜勤勞竭力有聞推恩無吝應在京諸司職掌亦量與恩澤奉守文之業敦孝治之風宜加幽顯之恩用慰哀榮之意內外臣寮內諸司使及侍衛諸軍指揮使巳上父母在者與官封巳有官封別與遷改巳亡歿者並與封贈巳有封贈更與妻封贈其有郡邑國號者與進封未有者與敘封曾竭臣誠歿於王事良深悼往宜示賞延自天福元年後來文武臣寮中有歿於王事者與追贈巳追贈者更與追贈有子孫未有職官者與録用蝗蟲作沴苗稼重傷特示矜蠲俾令蘇息應諸道州府經蝗蟲傷食苗稼者並差官檢覆據所損頃田與蠲放稅賦仍委逐處長吏切加安撫務令存濟山林逸士草澤遺賢將裨教化之風宜廣搜羅之道應有懷才抱器隱遁邱園者委隨處長吏切加搜訪具以名聞敦崇孝義旌顯門閭式恢王化之基用正人倫之本應有孝子順孫義夫節婦委逐處長吏具名聞奏當議旌表於戲纂繼大業司牧羣黎小心必本於舊章恭巳難忘於朽索不敢逸豫以召和平更賴將相大臣文武多士遵顧託於先帝永翊戴於沖人開保延洪爰覃渥澤報告遐邇咸使聞知赦書日行五百里敢以赦前事相告言者以其罪罪之朕荷上天之眷命守先帝之丕基日午坐朝恐一物之失所夜分不寐思比屋之可封身雖安於九重心嘗懸於億兆屬飛蝗作沴膏雨久流民倍切於撫安征賦頻令於蠲減未能感召深軫焦勞念獄訟之繁當炎蒸之欲臻和氣宜去深文特行寬大之恩用叶哀矜之旨應三京鄴都諸道州府見禁罪人除十惡行劫諸殺人者及僞行印信合造毒藥官典犯贓外人犯死罪者減一等餘並放內有缺官錢者宜令三司酌量與限監出徵理中外遐邇宜體朕意王者化家為國既開創以維艱纂業承基亦負荷而尤重朕虔承遺命嗣守丕圖顧眇躬而懼不克堪持小心而曾無暇逸外以生靈是念內以宗社為憂若涉大川如馭朽索然猶功非及物德不動天蟲螟為害苗之灾夷狄作亂華之患尚賴謀臣猛將義士勇夫共成戡剪之功復致澄清之運今則狂戎逃遁年穀豐登時屬小康禮當終制雖三年無改義欲化於人倫而正朔有常理宜新於鳳歷爰布改元之令仍覃在宥之恩天福九年宜改為開運元年可大赦天下應今年七月一日昧爽巳前三京鄴都諸道州府見禁囚徒除十惡五逆光火劫殺屠牛鑄錢官典犯贓僞行印信合造毒藥外罪無輕重巳發覺未發覺巳結正未結正咸赦除之流竄之徒其實有咎和平之道亦許自新其流配人除終身不齒常知所在人外未經量移者與量移巳經量移者與敘用蟲蝗灾疢之邦流夷頗甚獫狁經過之地凋弊尤深須議優饒用明軫憫其岐雍同華蒲陝涇邠耀威管內人戶委長吏所在招攜復業之家免一年租稅魏博貝冀滄景德等州曾經虜騎剽攘特放今年秋稅其餘經過之地亦量與矜蠲乃眷親軍實推忠節或從征醜虜顯立勳勞或出討叛臣方期平定至於邊陲守戍藩鎮分屯盡繫捍防皆施勤效雖賦稅未集帑藏猶虛宜示頒宣用明奬賞應將校兵士量與等第優給連年失稔常賦期國用未充軍需不足是行率借以濟贍供誠非欲為蓋不獲巳赦書到日盡行罷征出彼家財資豫國力宜加甄別以示優隆出一千貫巳上者特免科徭出一萬貫巳上者咸授官秩無資給者與本處上佐有官名者依本品序遷竭彼臣誠沒於王事恩宜加等禮有明文當契丹侵犯之時有守城臨陳盡節亡身者宜令逐處長吏以名銜奏聞當議超加褒贈或孫或子並與旌酬含垢匿瑕捨過宥罪前王令典有國通規應有曾行劫盜之人並宜放罪願在軍者與配軍收管願歸農者委本縣安存務局因循職掌敗闕空係逋懸之數徒行徵督之文宜示哀矜並令除放於戲承祧繼統御極居尊雖旰食宵衣每勤庶政而利兵秣馬未息殷憂更賴四輔三公五侯九伯文武叶力上下同心竭彼忠貞佐豫寡昧舉朝廷之急務盡軍旅之沈謀使鼓臥旗偃俾成寧謐同文共軌速洽隆平表乃有功致我無事高祖皇帝應天順人化家為國勤勞庶政安輯四方御衆以寬懷遠以德高秩厚祿以奬勳勞推食解衣以重賢戚至於匹夫匹婦皆被亭毒之恩草木昆蟲悉覃忠厚之德朕恭承丕訓嗣守宗祧奉以周旋不敢失墜兢兢業業若涉大川所賴將相公卿同德比義共扶不逮庶洽於隆平而楊光遠頃以微功驟升亞將後承僞命來拒義師始則桀犬吠堯終則背楚降漢先皇帝方宏大義推以赤心忘彼仇讐歡如魚水亟承重寄久綰親軍纍典大藩亦兼重鎮邇後選男尚主待之以懿親裂地封王寵之以極致人臣之盛近代無儔至於諸子之中皆擢為牧守家臣之內多遙領郡符此外有非理邀求違法僭濫國家務存終始悉與含宏奈何自至滿盈不勝富貴恩深致怨物盛乃衰而輒信姦邪虛有怨望聞我大喪之後乘我饑饉之年外則勾引蕃戎倚為勢援內則竊據城壘潛肆窺覦遂使河朔數州頓成瘡痏青邱一境獨陷罻羅朕所以命將興師弔民問罪然猶堅壁拒命自夏徂冬固執其迷自稔其惡其子楊承勳見衆情之攜二知孤壘之困窮深懷滅族之憂遂有悛心之請解其戈甲待罪軍門梟彼凶徒傳首闕下氛霾遽息中外同歡此皆宗社降靈乾坤眷祐將帥勠力士卒齊心掃千里之封狐不為民患除三穴之狡兔甚泰物情念彼一方未能高枕宜行在宥用拯疲羸可取閏十二月十七日昧爽巳前應諸州管內州縣見禁囚徒巳結正未結正巳發覺未發覺罪無輕重咸赦除之捨爵策勳前王之令典録功旌義有國之常規應收復青州將校兵士等一自征行再罹寒暑頻親矢石備歷艱辛賊壘既平秋毫不犯雖巳行頒賚而更議甄酬厚秩美名我無愛惜其將校自副兵馬使巳上員寮并監押使臣並與加恩十將巳上各賜功臣名號巳有功臣者更宜改賜自楊承勳納款歸明楊光遠亦拜章請罪朝廷務宏恩貸特與全生既許自新終懷憂懾遂至疾作以及亡身雖悖逆之人衆所憤怒在君臣之分朕實憫憐斷棺戮尸情所不忍其楊光遠尸首許令骨肉收葬楊承勳比從頑父同作不臣志力既窮覆亡可待而能轉禍為福全身保家果傾嚮義之心所謂見幾而作宜加恩澤以示奬酬其楊承勳宜與起復除授防禦使仍加官秩其一家骨肉並放罪其弟承祚承信巳在哀制放歸私第烈火焚山始識圭璋之性嚴霜隕夜方知松柏之心適當危亂之時乃見忠貞之節故淄州刺史翟進宗清風凜物貞骨淩秋當光遠跋扈之初被逆黨脅驅之際而仗節守義輕死徇忠終異叛徒以及遇害雖巳行褒贈而未稱朕懷宜覃延賞之恩仍示殊常之禮其翟進宗靈櫬委本處類會本人骨肉加禮歸葬葬事官給其子仁欽可特授官資補充東頭供奉官去順效逆頗蠧人倫濟惡助姦難逃國典前登州刺史張萬迪恩隆郡寄顯受朝恩不能事君盡忠輒敢從人於亂備彰逆節須舉明章其張萬迪宜從別敕處分尚在寬宥特免族誅其骨肉並從釋放國家兵士恩澤頗隆賞賜以時衣糧甚厚其中有凶惡之輩輕狡之徒不顧妻孥輒背軍伍如期僥幸難逭嚴誅其青州城下兵士有走投入賊城者並令指揮殺戮所有逐人骨肉宜從釋放叛賊既下汚俗宜新同惡者皆就勦除詭隨者並從停廢其餘詿誤宜示矜寬其楊光遠下惡黨皆巳梟首所有隨幕賓從除巳殺戮外餘皆配送邊遠州府常知所在終身不齒縱逢恩赦不在放還之限其在城及管內州縣鎮員寮將校曾被楊光遠脅從者一切放罪亡命之人比來懼罪所宜招諭却復耕農自楊光遠作叛巳來或有鄉村百姓接便遞相劫殺逃竄山林者並皆釋放仍委本處官吏明宣朝旨招喚歸業如敕命到兩月不歸者復罪如初當令擒捕顯行刑戮其莊田物業亦許力役人戶請射佃蒔忠力之士稟君命而不避危難良善之人入亂邦而橫遭迫脅罹茲患難實可憫傷自楊光遠作叛之初應有差去使臣非理而死者如有子孫量才敘用攻圍之際役使實煩凡有區分皆繫急速稽緩者固當抵罪辦集者豈惜酬勞應青淄登萊亠兊沂密鄆齊棣等州職員州縣等曾部署輦運者並與加階減選及轉官加職軍旅所至雖切戒嚴營寨所經寧無踐食宜寬常賦以慰編氓自王師攻討逆賊大軍下寨之處所有田苗桑棗應遭蹂踐砍伐宜委本處官吏子細通檢除今年見苗供輸外來年夏稅並與放一半其去青州三里內更免今年秋夏殘租興師動衆勞費生靈或則負畚鍤以從軍或則徵輦運而赴役疲於供命不暇息肩言念蒸黎宜加優恤應青州管內及鄆齊棣亠兊沂密等州諸縣人戶自攻討巳來差役科配頻併其今年夏麥殘缺并沿徵錢物並與除放所有逃移戶口宜令逐處長吏切加招攜青州城市居人等久經圍閉頗是凋殘楊光遠率彼資財奪其糧食至此餓殍宜示憫傷其在城見在貧民委本道以食糧賑恤所有城內屋稅特放一年應洞子頭及城下夫役有遭矢石致死者宜令逐處長吏子細通勘與放二年徭役城郭之內餓殍極多墟墓之閒暴骨甚衆方隆渥澤豈限幽明其青州城內餓死百姓及城外墳墓曾遭發掘者並令本道掩藏埋瘞於戲亂常干紀天地不容負國欺君人祇共怒是知福善禍淫之道信而有徵孤恩背義之人敗不旋踵今則干戈少息海岱巳寧凡在股肱更思康濟庶臻治道同享升平布告寰區咸知朕意堯仁御極尚興丹浦之師軒后承乾亦有阪泉之戰是知五材並用王者不能去兵四氣同功天道不能止殺朕自躬傳神器勉徇人謀戢干戈而寧耀武威撫夷狄而但修文德而契丹見利忘義負約渝盟大為猾夏之灾屢肆窺邊之暴須為民而除害遂命將以伐戎駐五輅於大河勞六師於極塞賴乾坤祐助社稷威靈將相一心貔貅勠力致羣凶之敗衄血滿平川使元惡之奔逃魂銷廣漠今則朔陲稍靜中夏小康宜上答於穹旻俾特施於赦宥用導和平之氣適符長養之風可大赦天下開運二年五月二十一日昧爽巳前應三京鄴都諸道州府見禁囚徒除十惡五逆持仗殺人強盜官典犯贓合造毒藥屠牛鑄錢僞行印信外其餘罪犯巳發覺未發覺巳結正未結正咸赦除之諸色配流人除終身勿齒并縱逢恩赦不在放還人及曾為盜賊并自契丹內來諸色人巳於諸處收管外其餘配流人并常知所在者並放歸其開運二年正月一日後來配流人等不在放還之限兵戈之地可料傷殘惻隱之心不舍晝夜所宜優惜用恤疲羸應常定邢貝相并鄴都巳北管界自今年契丹犯境巳來有人戶實經虜殺劫人者其夏稅十分巳令減放二分苗子并沿徵錢物今更特減放一分其今年徵正稅錢物等亦與十分內減放二分行幸之時往來之處奉迎不闕供億實繁宜示渥恩以奬勤效應滑澶兩州迎奉車駕并沿路供頓官員職掌等仰逐處具名銜申奏當與加恩出師巳來遇敵之處忠烈之士皆效命以衝鋒行陳之閒遂捐身而報國宜加延賞用慰貞魂應北面行營將士等除巳與加恩及第支賜優應給外其有沒於王事者職員宜令逐處分析聞奏當議超加褒贈子孫巳有官者當與敘用其節級長行等如有親男堪充征行者宜令逐處酌量配軍收管支給衣糧戎夷侵軼驅脅吏民雖陷虜庭旋歸漢境所宜慰納以示綏懷應近北沿邊州縣軍鎮官員職掌被契丹脅擁入蕃得便逃歸者並放罪仍仰切加安撫眷彼易水最處邊陲經戎虜之攻圍賴軍民之固守將校齊一生聚保全念此忠勇宜加旌賞其易州被契丹圍逼之時應在州守把城池刺史官員職掌等仰具名銜申奏並與加恩征討之際饋運之民不唯飛挽之勞或有抄截之患宜令存恤用示優宏應鎮定邢洺先差隨軍運糧百姓偶有不回者委逐處用勘如有此色其本戶骨肉切加安撫免三年差徭俶擾之際輕俠之徒偶聚盜於雈蒲遂亡命於山澤宜令招攜俾復農桑訪聞鄆齊棣等州管界及河北諸縣百姓內有昨因蕃賊入界接便為非今遇安寧怕罪未來歸業者宜令逐處長吏遍行榜示告諭所有今月一日巳前罪犯一切不問宜令並放歸田業各務營生仍委縣鎮鄉村切加安撫不得恐動如告諭後過百日不來歸業仍前為惡者復罪如初逃背軍都誠為極罪誅夷家口乃是常刑將議寬矜并從捨釋應諸州府見禁及本營枷項并常知所在諸軍逃走兵士家口等並宜釋放場院積弊官吏承寬致課額之逋懸勞朝廷之徵督久淹刑獄深軫豫懷爰示優容俾令除放其安邑解縣兩池前榷鹽使王居敏王景遇禁盤鹽缺折軍將兩界逋懸纍年禁繫宜令三司各詳逐人所缺如有人家業錢填納者可與盡底據數納官餘缺並本人並放如有缺負錢物數內全無家業錢物填納者宜與免死配送邊遠諸處收管仍永不得差使所缺特放河中府雍同華陝虢等州管界內人戶有缺王居敏王景遇盤鹽腳價者並特放於戲鴈磧方秋稍息烟塵之患雞竿肆赦是覃雷雨之恩更賴文武大臣中外宿德或決策巖廊之上或提戈軍旅之閒嘗膽為懷摧凶是念速除餘孽共集殊勳克致澄清永銷氛穢仍遣赦書日行五百里敢有以赦前事相擾告者以其罪罪之布告遐邇當體朕懷
