front:
  text: 全唐文欽定全唐文卷二百五十七蘇頲八
  hash: sha256:75512c9d4b6ca1b415c58b1794257dcb209af4061bf41d1d672ca7bd97fd0d89
body:
  text: 夫情有理會不可以理遣行有義得不可以義定其情者則理無滯寶其行者則義有全故韓馮之妻死哀吟於松上石崇之妓生效命於樓前夫恩至深而必報言至信而罔遺繫於我者深不可奪牽於彼者信不可欺故操刀而割豈為他人所汚書扇而殞竟還夫氏之尸頲嘗誦先王之訓探衆聖之旨蓋本三極而宗五常也汛以觀則吹萬循而照則歸一知夫棄理悟寂與能制事者覺為之路以詣精微定得其門而宏汲引邱鐸不言乎始扁輪不議乎末其真如之蘊邪智有無涯間之以息物無有祕應之以形矣物也者不可使形止有也者不可因無息然後三極冥符適時之義遠五常昭合濟俗之功大其象法之韙也赫矣帝唐發於天光鴻勳鋪億載盛業冠三代欽明濬哲以至高宗天皇紹元命而導要道也時孝敬皇帝儲副承祧晦明示疾一物三善稟人君之量喜而又懼聞王子之言以大威力作宏誓願憑有為之基獲無妄之吉粵明慶元年仲秋癸酉詔於京兆延康里置西明寺以報之先是三藏法師元奘惟應真乎乃成果者首命視延袤財廣輪往以繩度還而墨順次命少監吳興沈謙之傾水衡之藏徹阿宗之府制而縮版參以懸矩鈎北阜之舄伐南山之枚初歷落以星峙忽穹崇以雲曼攢栱岌嶪騫甍宛轉揆陰陽之中居子午之直叢倚觀閣層立殿堂虬鳳夭矯而相承鬼神睢盱而欲起罔不珠綴䆗窱旋題照燭琉璃洞徹菡萏紛敷白日為之隱蔽丹霓為之舒卷者凡十有二所每動微風滴細霤窅然其若來和鎗然其有去音悉豐麗博敞崢嶸曭朗奕奕焉耽耽焉中國之莊嚴未有大荒之神異所絶於是召以正工以考安瑞表湛真容繡色電烻金光火合移忉利之宮鎮菩提之座狀微笑而莞爾意屢言於善哉者不可勝計遂賜田園百頃淨人百房車五十兩絹布二千匹徵海內大德高僧有毗羅靜念滿皓廣説鵬耆辨了鶖子知會凡五十人廣京師行業童子有空淨聞道善思喜法須迦分施撰擇不染者凡一百五十人導天衢指天寺上御安福觀以遣之有則有容昂昂禺禺駢象馬錯人龍幡幢之陰周四十里伎樂之響震三千界使其將法印發妙梯上至乎穆清下遺乎紛濁散而無我見桃李之成蹊聚則有朋知稻麻之為衆若普聞名稱時立威儀行則上首舉為左臂者上座道宣寺主神察都維冉智衍子立傳學元則棲禪靜定持律道成懷素等人法師舍衛是求須彌不動以等空知行如海法如陶器必盡而寫瓶共縛令大律師崇業約身利物維忍辱之行全信役仁守毗尼之律明猶染壘壑比持綖摧伏魔障弼成學徒上座大德神嶽法師開方便品證圓明實貫穿百氏分別四諦藝扄諸彥不敢近論筆墨蓬嶽㣥仙自應遙寄書帙相與禁六賊制六衰紅粟腐積黃金巨萬行天廚之寶輿泛海岸之雕艫日靜楗槌夜鳴鐘柝罔不受薰修戒破煩惱結禪以思默聽以和發商調柔之意書祕密之偈業公愀而嘆曰此身有待諸行無常欽不居之歲月無不滅之泡影樂化成而記壁者請因寺而言之是則有隋尚書令越國公楊素泊我濮王泰宅之舊區豐不當必蔀儉不師且奪終異謀始之則滿非守成之具從梁邸第寧復賓遊封薛池臺果成童牧孰若變為嚴淨歸入檀冉匪化塵之可思匪劫燼之能毀轉以清渠灑道緑樹分行水流舊空花落雨新殿邦而住世者不亦大哉宜宣詠歌以備刊勒矣我開元神武皇帝御十方之四載格上下秩神祇萬人敬百蠻服伊護法者必聖王乎演法者其開士乎敢作頌曰吳作京兮秦之理珠柱寶剎兮從中起䡾相望兮非相似輪乎奐兮不可擬惟聖皇之經始兮惟調御之依止封迦葉之上人兮延德光之太子香為土兮金為界樹低枝兮蓮出水水分接足以駢闐兮盡洗心以歡喜永巍巍兮什梵宮揚大法兮尊大雄有唐神龍元年龍集丁巳應天神龍皇帝出乎震御乎乾也粵若我高祖撥亂反正受天明命太宗震遠懷荒立人紀綱高宗見天之則愛人之力故我祖宗之耿光天人之交際矣功侔於天靡弗覆矣道濟於人靡弗育矣上祗乎闕人心醇醲之化積乎中和樂之聲被乎外則聖母以權居位七廟不可乏主以我明辟萬方由其徯子乃考順應之符旌緝熙之頌有若周文為太子益三朝之恭有若漢文為天王遵五讓之實遂稽盛典張宏綱纂舊物由舊章穆穆皇皇禺禺昂昂俾爾熾而昌俾爾壽而臧其斯之韙也時公卿大夫禮官博士稽首揚言曰陛下誕彌厥月初朔龍也接統伊始元又龍也潛者德之隱飛者德之興觀乎聖人之變合於聖人之契古之白麟赤鴈威鳳神雀或當道而分或中流而魚躍惟萬物之幽贊曾六年之不若陛下宜以大寶加明號其龍之興乎天子方晬容遷慮卑聽深視答神祇之協謀討經籍之遺美於戲軒轅氏升元扈就肴虛者莫如佛之寶也推大聖之蘊超衆妙之機則道方於權智成乎真實修心觀心惟凡證聖即色非色惟覺悟迷小者得其小大者得其大藥草之喻是也有者見其有無者見其無露泡之喻是也使般若之門隨方而啓仁壽之域舉代咸登用於國家六度齊行於人倫五常等豈與夫太后好道而黜於儒曾孫好刑而雜於霸朕當究登庸之休瑞詢往世之宗旨衆生未度而度之百姓有罪而罪已宏風而共貫興化而致理以助天之子人乎因制天下州盡置大唐龍興寺陝州者以宏福寺為之寺則唐武德中所創昔王業始基宜於百億故俟福之宏暨帝圖中缺躍於九四故見龍之興此又前聖之兆後聖之徵也徒觀其阿山豁險當砥柱之湍瀨城雉紆餘瞰崤陵之風雨蓋朝宗之次行在之宮三輔齊劇鄰其左二京分政出其中斯何壯哉郡國之雄也先是香填之金布之神祚之福護之千櫨疊映萬楹叢舉含真珠之赤光帶琉璃之紺色般般遠矚奕奕增新紅電生於樹杪星漢拂於樓間謂須彌耶現空而隱半謂兜率耶住世以臨下如有待者塔廟之靈乎上自清洛而西顧經翠巖而北指七聖不迷百神咸扶旌回守塞輦過間田吟邵伯之甘棠追漢仙之結草勿翦勿伐將有聲而在風曰希曰夷豈無迹而觀妙孰若此寺崇大法之本協中興之符致於間安得所饒益爰發中旨出五采繡及金銀以寵之後庭則雜於四時其布惟五內藏則錯於三品其攻用六飾紅玻條紫磨璀繡色涵鏡光分身應矣金相覩矣雨諸天花隨慶雲而歷亂作諸天樂混清吹以參差善哉彌勒降梯育王讓座弗之比也當月宇披露門注明毫晞淨目者駕肩而湊接足而禮猶稻麻之與竹葦墨黑之與針鋒稱三自歸獲四無畏大德君瑤君愕二禪師上座慈郁維冉道休二法師神入於定力思用於塵勞汨其慮也寺主靈觀上人樂説多聞辨才強學焉可淪以愛染撓其情也亦有廬阜之寄儻冥於影迹剡山之期或褫於襟帶每至斷三苦絶三流止六衰禁六賊修善明之願則罔不偕唱須達之祈則罔不攝受龍王之泉則罔不捨自非淬慈劍破魔邪麾勝幡舉僧正孰能臻於此矣前刺史東平畢使君名構字其忠謇士也清心徑節祗服文藝故其臨事天下謂之直臣今刺史河南元使君名淡字行沖精粹士也正辭雅道研機禮樂故其著書天下謂之良史朝請大夫行陝令清河崔君名昱字盛緒長仁合義睦而奉姊郭奕之儔也友以為兄魯恭之匹也故其虛心應物理家移政則太守樹風以養之宰君承流而廣之始乎精悉終乎惠愛務煢嫠而歸厚惴姦慝而寡悔寂則旁通誠則圓對斯並倜儻卓犖殊尤絶倫者盍務之哉郡有張士龍王忠誠侯元嗣郭琬袁休王方等修業諦聽感緣信受應乎千里聞於十室皆以為周錫王命而藏大鼎漢振天聲而樹隆碣況探密記指元符轉聖輪道皇極使雕篆之辭缺則莊嚴之事眇云何以觀人世殿我邦乎遂載諸厥鐘宣此偈曰賢劫聖惟法王吾君子與巨唐應符契而後翔龍圖永象教昌清燬宅接通莊列璇題崇寶坊翠華轉河之傍青蓮降陝之鄉河之水幕榮光陝之路蔽甘棠東洛邑西咸陽望巡幸歡且康歸調御福穰穰形器分有宰匠名言立有導師上聖卓然大仙之旨也定融於惠惠無不明明證於覺覺無不定虛其照然觀我動以權而應物智周斯大功利斯遠繼善者循乎業欲仁者適乎變業乃至於無相變復存於有作使因城之廣剎土之嚴其來尚矣天竺寺者天竺王子避位出家三藏法師寶思惟之立也夫所宗謂道道崇可讓位況生於佛國所慕惟法法住可濟時況行於人代其吳季子安世高之事魯仲尼康僧會之徒歟不然何以諦俗歸真秉彞宏教之極也故誓於東震發自南離藏戒珠却商寶陵海漲而絶雲島矣屬䑦傾其五兩餘皇折其三翼法師于呀呷渺瀰之際覩觀世音像一軀隨而載之凡七夕觀音則聖極於既墮迦葉以神形於既沒海可以化為之迹變入諸身若是乎海本如故則荊陷莫致瓜步浮杯遂往孰喻乘桴於中道捨筏於彼岸邪至則冕旒贊嘆京師翕習意吉之友而仍得自摩眷之更生與之紐解徵而張絶緒也始憩西明寺譯金光明楞伽文殊師利呪藏廣博嚴淨陀羅尼浴像功德大寶積等經七部顧而言曰機輪未兆礙之殊域志成已信乘之坦塗今微言載剔密藏咸啓吾其往矣況求法不二解空第一竟超西闔之㣥必擇東林之衆常謂洛京闕塞山斷川流枕城池於正陽當日月於亭午脈脈中瀉逶迤左薄黃道映以為界翠屏臨而見空天下地勢之寄也故寶塔曾盤鏡龕延袤御梯憑下敷座因高具次八四方成萬億皆默而許之感遂通者法師乃亂流東濟止彼香山又於山北見龍泉二所洞徹深淺則鋪丹孕碧噀珠連而上跳回敻經復則小雨微風點瓊析而傍散積礫搖動光輝自然琉璃混成毛髮可數法師樂之爰創方丈鄰于咫尺堅持願力善誘檀心皆撤無之歡豫盡布金之須達更于其側造浮圖精舍焉飛觀遙峙仙莖崛起遠而趨之虛空縹眇於其間近而察之岑壑青熒於表裏羌難得而名也景雲歲辛亥月建已日辛卯制以法師所造寺賜名曰天竺維皇建極與天比崇教設而風靡化行而日用法師不忘本而遂初乎殿中侍御史趙國李畬字玉田育粹含采妙機強學佑其垂成憲以從事法師即於山之東偏建丈六石龕匪泐而攻載追而琢四衆圍繞萬人唱和疑隴埏之朝隤狀羅浮之暗徙則圓焰石乳凝陰水精香封韞玉花灑交瓔諒殊特也若乃立三會開八關撞鴻鐘伐靈鼓引清梵稱神咒向之雙泉氛氳五色雲止煙絶星流火變亟福應而神滋焉每熙春載陽庶物和暢此都人士則填城溢陌自北而南遺光相涉㣥聽相接震聞乎數十里外無不舉袂陰峯揚橈沸水潔誠而往修禮而去爾其倚紅樹憑丹檻清泠窈窕聲聞下土披光若滅人得至天其崇信也如彼其安間也如此禪期樂淨道詎越於身心觀豈惡囂事已冥於世界寺之梵衆得無量無轉不退輪永於斯也沙門圓實密行精苦辨才酬對以尸臣之命功藏於宮大夫之靈德撰乎廟矧夫清涼有地常所住持忉利為天宛其相似文殊以之演説耆城因而回向者復何如哉雕而頌之可也俾宣偈曰洛之表兮伊之東山有香兮泉導蒙攢櫨疊栱兮飛在空錯石雕珉兮生梵宮乘豁險兮開素波望參差兮圖綵虹維妙力兮歸大雄天竺之子心定惠轉輪聖王道光濟山之曲泉之涯兮特勝緣與宏誓永安居而悟寂混㣥物而同契惟蘭有香惟玉有璋可吉其夢可勞其弄故稟離成女祥歸太子之家自震為男業盛天人之邸因以貴者德其全與我唐章懷太子有良娣曰南陽張氏之子也邠王守禮之母也初章懷封於雍良娣選以入後章懷謫於巴良娣隨而邁邠王錫元社建黃扉良娣坐華茵驅香轂雖逶迤失於偕老而契濶存乎與成始十四奉吾夫逮笄年而轉茂終六十四違吾子當卦數而同極非婉娩淑慎之則含章尚柔之令孰臻於此矣若乃畫堂清兮羅幕薰匱照曜兮結氛氳杲杲之日英英之雲蓋良娣之才之美是效是則潔素罔捐於篋煒彤益昭於管嫮顏不競徽範自持處獨藹如顧儔芬若施於積善覩從梁駟馬之藩貽厥纍仁傳相漢七貂之緒隋上儀同甘泉府別將嚴之曾孫侍御史睦州刺史詳之孫朝議郎行桂州都督府始安縣令明之女也曾構鬱起昌瀾遠激去遷南國儼西鄂之豐碑來應東朝署西京之戚里不然何謂釐爾女士從以孫子而允為褘袂之良乎及母儀可宗臣軌伊勵師以儉約戒於盈蕩洛濱無祓除之事涇上無粲美之物衣錦褧裳寧吾所好擊鍾鼎食唯爾之兢俾吾王忠肅恭懿既明且哲志於道者本於教也粵景龍二載孟夏之月遘疾棄養於京延康第之寢洎景雲光華春雨自葉睦於我則先受九族慈於王則每深十起永其錫類衆悅以人禮物朝遣使臣廷命金紫光祿大夫行鴻臚卿趙承恩銀青光祿大夫尚書左丞元暕持節册贈曰章懷皇太子良娣祔於陵邑禮也嗚呼山疑鶴駕地即烏號太子賓帝之餘高宗在天之所衣冠道德密近屬於陪乘光表闕塋殊遠嫌於好內又典地司空邠王守禮幼承法度長被暉光九仞之堂咸曾氏而逾蹙萬家之域小韓王之不綱所以傍雕翠炎伏奏丹墀天子孝理之風已周於品物孝思之德況及於兄弟乃敕禮部尚書蘇頲採詢為言由是稽舊聞討前訓位不之易祿不之重而莫顧者鄭媵之足稱也信不負心義不虛事而竟死者越嬪之可徵也或彰君之隱過或徇已之微直曷如有始有卒知柔知剛艱虞則持操服勤富貴則竭誠循禮夫詮一行者尚紀圖書具三從者豈遺刊刻其銘曰天祚有唐於昭烈光兮土分五色作我藩國兮雷震百里維皇元子元子伊何匪淑不娣厥娣伊何終溫且惠桂宮甲觀之聲迹竹苑平臺之往昔車已折兮我未亡鼎其新兮子為王子既王兮我為太殷聖造兮沐嘉會歲不與兮時迅奔華榱壞兮託寢園闉闍崇於上京松柏被於長原子哀哀兮篆碑於是親永永兮歿代如存君子之質則有文也君子之備則有武也蘊其材而正直是與行其道而剛柔迭用經德所以不回稱詩為之立禮碩大之教聞於四海人爵之美奮於百代受天之祜不其然歟公諱某字某彭城人也皇矣漢祖出自唐堯始則豢龍為事終而斷蛇著符非卯金而勿王書之甲令有盤石而命第布在方册於昭慶靈誕發休緒有隋之接統也我曾祖諱某仕至晉州刺史左衛大將軍普安郡公我大父諱某仕至蔚州刺史襲普安郡公皇運之纂圖也我先君諱某仕至江王友上柱國襲普安公追贈陳州刺史者制連五之教以乂其邦攬韜鈐之英以和其衆從師友之訓以崇其術復公侯之業以載其名匪我先人保之孰能後嗣達者公即陳州府君之元子也純潔浩素直專靜密外象威嚴內含光耀弗誦於非聖弗言於非法雖迹繫蕪室而心遊坦塗始有遠大之譽矣弱冠修文明經高第解褐趙王文學金門之賓就以強學席之士來而好問遷荊州司戶參軍轉汾州孝義益州晉元一作源之二令養能於掾吏大機未發從政於宰君中孚是用三人為師之地更成乎魏美四子講德之鄉益變乎夷俗以殊績遷左衛長史佐其戎昭欽若軍令屬永淳之歲元元虧稔命公泛舟之役窮於恆岱委公開倉之利濟於幽燕是寧邦本繄賴家給還擢拜朝散大夫遷原州都督府司馬仍統郡牧事西至崆洞之隅北經都盧之峽其人好武賡歌作咏彼乘有駜雅頌成章豫博之連謀也雖七國之勝兵鋒憚於甚鋭而九州之雄地勢當其懸隔拜公為齊州長史以鎮之難平轉沂鄜二州諸軍事二州刺史令以條察風以化遷願冠者載穆其容嬴鋤者罔矜其色連課第一遷將作監尋加銀青光祿大夫司僕卿惟匠有卿考百工之最惟僕有正稱六官之長蓋任能之遷矣大聖天后崇清廟而尊祖建明堂而配帝作城洫而量土圭圖山川而鑄金鼎縮板以載之置筵以度之三旬以成之百物以備之獨任於公不厥旨非博而稽其禮省而精其事則曷能臻於此乎戎羯之縱暴也易之梯衝頗亡其樓堞魏之桑梓尤固於藩籬令公馳傳檢校魏州刺史以威之寇平召之猶領本職復加將作大匠長安東幸洛陽拜公為右衛將軍司農卿轉右金吾大將軍副京師留守出綜金革比上台之禮者四入司帑藏分洪範之政者一轉嗚呼疑以盛其義通僦以清其緒由是採酇侯之典因營宮室奏齊人之言即回輿駕至則兼領右羽林軍節愍之舉兵也讒臣構東朝之隙上將膺北門之重難無苟免謀無苟合君則有命若將援於鼓旗士咸有約不可犯其介胄已而特授鎮軍大將軍封舒國公食邑三千戶實封三百戶賜以金帶衣物重拜司農卿賞厥誠也公以休咎由人動者悔之始盛衰自我息者機之先故在物害盈謙而受福及引年辭事老而得禮於是乞骸骨抗章疏者至於再三朝廷嘉而遂之矣門列行馬室縣安車遠寓於泛右近持於越寶間心用晦物有自親啓足歸全神無所禱享年七十有七以景龍三年太歲癸酉十二月十五日薨於長安光德里之私第天子輟朝以咨悼都人罷肆以傷惻齊之喪嬰鄭之亡産無以過也乃追贈持節都督亠兊州諸軍事亠兊州刺史降使弔祭賜錦衾襚服官給喪事京官六品一人監護太常考行諡曰貞夫忠者期於盡命孝者貴於立身義者厚於利物信者多於庇人猶五材行而不可闕五味足而不可廢則安夷險保明哲太社於是乎錫其風太常於是乎旌其事練識而言罔毀譽避榮而交非諂黷以溫良恭儉之德知進退存亡之機然後指青門之路美賢於疏廣登洪波之臺長立於周舍於公得之矣粵某年月日葬於某所禮也美哉漢宮宏敞承明在其北秦嶺連屬太白拒其南思上都之冠蓋望先塋之碑表此又臣子之不忘也其孤衛尉少卿曰茂道㣥紀為儔荀何是則二世之業代仍其位三年之制喪過乎哀以為有初有終疇庸之道斯遠匪雕匪刻補代之圖蓋寡荒惟授旐菲也披文乃作銘曰炎漢之靈兮纂堯之德粵若介弟受封南國為侯為王休有其光四牡奕奕赤茀金舄降爾遐福兮邦之仁人昭爾懿行兮朝之藎臣我有忠烈兮以為之寶我有榮華兮何適非道躬清明兮翔廖廓佩金紫兮富圭爵日冉冉兮亟回薄歲崢嶸兮其搖落吾將追於祖疏兮噫何為而葬霍龍山趾兮鳳城端青靄深兮白露溥混㣥物以共盡兮揭之豐碑之是刊欽若於天者謂之代工覆冒於人者謂之成務則調元氣法三象鼓洪爐宜萬物其代工成務之本也大僚所以服其事明先正所以詔其功卜熊羆所以占其兆從龍虎所以合其應匪徒然而已哉有唐元老宋公侯矣公諱璿字休璟晉昌酒泉人也昔在夏商大夫陳其氏姓洎遷汾晉季子聽其聲樂豈軒之後唐之遺乎既仕楚而聞魏亦家秦而滅項涼武昭王攬中州之傑居右地之盟七代祖晉昌宣王和佐厥威霸守其夷險故纍為郡之首族粵宣王逮我曾祖驃騎大將軍開府儀同三司贈亠兊一作襄州刺史諱某世位大將軍二千石大父洛陽令朔方郡贊特贈秦州都督諱某烈考咸陽令贈岐州刺史諱某操斧鉞班圭瑞者耀洪烈於四世垂餘風於百里於穆不已莫之與京公初髫而孤入則孝出則悌承於母兄之旨及冠而立學以聚問以辨從於師黨之言焉張嘉運先授於易森然可見者萬象賈公彥次授於禮坦然可觀者百度射策高第初補吳王典籤歷帛丿糸州巴西尉同州馮翊主簿弗之好也嘗欲屠郅支刺樓蘭執渾邪逐呼韓始自謀於將帥終見器於公輔遂為踈勒道行軍從事策勳至上柱國授營州都督府戶曹參軍尋以朝散大夫檢校朔州刺史蓋養能而成績矣轉安西副都護檢校庭州刺史長壽中武威軍大總管王孝傑之復四鎮實賴其謀表公為西州刺史涉龜沙薄烏壘矛精絶慰渠犂此之謂也公至則扶厥傷止其擅因所利補其闕故西州之士刻石而建碑焉無何遷靈州都督新昌軍防禦營田等使入蕭關殺都尉絶梓嶺討符離此之謂也公至則城彼方要其險狎諸野墾其實故北地之大者有備而無討矣就加銀青光祿大夫入拜左豹韜將軍遷司衛卿未幾攝右肅政大夫檢校涼州都尉假節隴右諸軍事參警夜之肅嚴不時之禁事典之常者惟公是遷受南憲之寵總西方之役邦家之急者繄公是任其年麴莽布支率種落數萬寇於洪源也公訓鉦鐲完甲兵以禦之虜見積尸之凶我懸斬級之賞遁則忘草在而蒙他他籍籍不可勝云朝實休之除右武衛右金吾二大將軍俾仍舊鎮雖貴而不留中也先后稽六官之本思五法之要自我聰明惟天照鑒乃拜公文昌夏官尚書同鳳閣鸞臺平章事隱心而行正色不撓功多微管議切安劉中宗之踐副君旁求中庶特轉公太子右庶子加金紫光祿大夫知政如故召綺里而稱叔孫也屬駕言北垂薄伐東鄙復公為夏官尚書兼幽營二州都督安東都護按河北之州軍自鄘巡遼碣貪夫廉而忌法戰士逸而待寇且有倫要而無怨讟神功初徵拜輔國大將軍同中書門下三品遷特進尚書右僕射食實封三百戶已而居守秦雍今之揆路古曰台司百寮師師萬事理也分郡關而典之鎮京師以留之豈富人之始封亦酇侯之大任位益高而勇退年愈邁而思止抗聞旒扆密奏封章久之聽致仕進封宋國公朝朔望天子方崇文太學講武宣揚延首鴻儒傾心碩老復以公為太子少師監修國史乞言而書法也景雲初胸奴請公主盟使臣為約未堅致辭或紿因命公為特進檢校御史大夫朔方軍大總管以禦之仗宸威肅戎令人莫聞於吠犬騎寧憚於射雕舉則全師還而罷事將棄軒冕神明芝术然邦有大禮樂大政刑率由典謨罔不咨度享年八十有六景命不造延和元年七月戊子薨於長安懷真里第嗚呼哀哉皇上聞哀撤懸出次揮涕追柳莊而亟命思鄭産而安歸制贈使持節都督荊州諸軍事荊州刺史贈物四百段米粟四百石喪事官給仍差官四品一人監護有加等也太常考行諡曰忠書不云殷之得傅用訓朕志而承其道雅不云周之命程是用戒我師而就其緒於戲惟公浚明前典允迪古訓總而成之入則獻規出不言政石建孔光之比決勝千里通知四夷子房充國之亞為將軍尊重於位而謝賓客公之不敢專為丞相開陳其端以歸人主公之不敢伐如是則鏤彞器圖旗常載史官列盟府矣夫翠鵠犀象非不鷙也有其用則不全麟鳳龜龍非不靈也無其時則不至若乃時已偕用不竭身已康名不滅者既明而且哲也公上惟祖禰傍至功緦頃於槐里之間堇原之右卜其兆圖其域各以族而為之度焉臨薨戒諸子曰儉則自完孝不忘本吾之志矣嗣子陳州刺史先眘左千牛中郎將先擇等克奉遺命能循懿業以年月日葬於舊塋亡夫人太原王氏從祔禮也昔禽息進里奚於秦而穆公之政厚虞邱進叔敖於楚而莊王之力霸故有代祀而代祿焉則我師臣計功允子宏風小彼秦楚之事大哉韋平之烈謀可久者敢作銘曰稽古陶唐惟帝之初遷虞事夏俾侯而居曾盤峻峙令德之祉亦曰帛丿糸系誕生君子君子伊何邦之宰臣宰臣伊何秉我洪鈞登於廟堂王則是保服於戎狄公常致討事惟一心恭乃三命崇讓頤老歸間體正天也不憗人之云亡大夫掌域㣥公會喪咸陽北坂渭水南渡其如邢山永此防墓惟開元二年龍集攝提格夏五月哉生明高安長公主薨於長安永平里第享年六十有六嗚呼哀哉景申上發哀於暉政門設次舉聲輟朝加等遣大鴻臚彭城侯劉知柔持節齎書赴弔京兆尹攝大鴻臚鄧國公張暐司農少卿李彥有司帥屬護喪文武五品已上會哭書不云敦族至於九以昭於百姓禮不云敘親居其一以統於萬人此所以追有虞而化天下感配陳而慟宸極復以為素旗誄行彤管區風司常罕留執史多紊乃制銀青光祿大夫行紫微侍郎兼知制誥上柱國許國公蘇頲為銘刻石臣頲不敏揚言拜命云長公主諱某字某隴西狄道人高祖神堯皇帝之曾孫太宗文武聖皇帝之孫高宗天皇大帝之第二女中宗孝和皇帝之姊也太上皇之姊開元神武皇帝之姑也昔軒后修德高陽任而豫之虞臣邁德伯陽沖而用之故先王會昌而王者興前聖受命而聖人作自風偃三代刑清百年揚耿光於祖宗紹期運於神武上以比崇於黃軒至其道次以宗極於元老施其教慶漸帛丿糸瓞恩周行葦重熙而纍盛皇哉而唐哉公主承姊月之華分女星之耀間和美度婉娩令德有循其禮無擇於言鑒圖取則聞詩服義故可以賦絲緍而開湯沐者也於是曳紅綬賜青圭香滿玉罏綵搖金縷允所謂帝乙歸妹以祉元吉魯侯主婚是稱同姓始封宣城公主下嫁乎王氏駙馬都尉故潁州刺史贈右監門將軍太原王府君諱勗字遂古右監門將軍平舒公之孫歙州司馬之子自周儲洛濱之契秦將頻陽之業門昌帝緒家纍天姻徵平叔之才貌得孟孫之閥閲亦既覯止展也令儀成其肅雍率由俊彩至盥漱櫛縱笄總衣紳針管刀礪線纊縏帙若此者敬而持之動必於是則其餘可重也天授中聖后從權革命駙馬非罪嬰酷公主復歸於後庭凡九十甲子口不入辛味耳不聆曼音體逾尚柔言靡敵怨運觀心之智察摩頂之神豈寂以幽通將虛而信受有菩薩現前者數四后每奇之中宗禹物不改漢儀初復乃命宗正卿李珍册拜宣城長公主食實封一千戶并置府僚比侯王之封齊令丞之秩太皇御極又增五百戶改封於高安且重永康之册允符長廣之拜今上握圖又通前加至二千戶尚於德先於親也公主頃歲奉嘗覩高宗畫像雖光靈在天而見似目瞿感咽於地遂成心疾至使名醫萃止御藥相望孝焉而終仁則何輔嗚呼哀哉富貴乃驕奢之資不期而至吉凶乃盛衰之象不召而成故泰忘約吝生動寵怙權邪醜正知得而不知喪知存而不知亡嘗歷觀之熟矣由是黃金象牙明珠翠羽之飾積於外雕文刻鏤衣紈履絲之巧充於內然後堅車良馬漿酒藿肉吹笙竽學歌舞於其間者殊不知以相強而結禍因自恣而招危魯元所以好過度竇太所以縱踰禮鄂邑所以懟抵罪湖陽所以匿犯法館陶所以求不獲昭平所以免河上埒開邙阜允子孰聞田在漢京權臣所奪吁可長歎息者矣我長公主則不然避榮守靜退藏於密端操正色進寡其辭為皇女焉為皇姊焉為皇姑焉非不貴也能戒盈忌滿智崇禮卑儉德之恭讓德之益主無攸遂不專也勤無告勞不匱也宜於秋犢以助宗人率彼春蠶以從王后則未嘗忽諸猶深悟色空大依禪惠觀我生之進退究人事之終始蓋泡夢之為喻也乃散以檀冉離於染著景雲歲請罷賦邑蠲屬官遂沈冥從省曠書上而制違之嗚呼身歿意餘道之微者古有女儀嬪則焉或孟母之勤學敬薑之知禮仲妻之辭相惠婦之光夫然出於素族書之緹史未有居高益下託體至尊如長主之儔矣故能九師讓能三子聞教自我之出與時偕行知微知彰不諂不黷長曰暐銀青光祿大夫太僕少卿仲曰暉朝請大夫衛尉少卿季曰暕尚舍奉御並欲報罔極欒貌心哀以送之龜從筮吉粵某年八月朔十七日葬於咸陽之北原禮也落月過半秋陽浸微清節凝兮朔風斷丹旐列兮秋雲飛望槐里而西馳去萩園而北顧視牽牛兮像設過飲龍兮徑度闉闍䆗窱遠嬴女之樓臺松柏陰煙近漢皇之陵墓其詞曰赫赫上帝臨於巨唐卜年萬倍誕睿興王何彼穠矣休其有光亦既從夫車服不繫亦云主婦蘋蘩以祭在貴能約終溫且惠樂只君子曾不永年未亡之人歸於九天心以理遣身以義全光於纍聖受於明命伯姊延暉皇姑襲慶監以損益辭其滿盛我有空言宗於釋門不生不滅茲道存存兌之降靈西反其魂咏清淺兮天之際憶瀟湘兮日巳逝登寒山兮見超忽生秋草兮坐蕪沒金為字兮琬為碑永貞芳兮實在斯
