front:
  text: 全唐文欽定全唐文卷九百九十五闕名三十六
  hash: sha256:862d75f684cde03fa00e122a84d3ddcb04f3a45503e36622d82868a8d48f6c80
body:
  text: 公諱懷素字貞規本原扶風其先自伯翳馬服具諸史載暨漢南郡太守融命代大儒公即其後也十一代祖機抗直不撓晉御史中丞扈元帝渡江家南徐州丹徒故今為郡人也代以學聞高祖涓博綜墳典仕陳為奉朝請曾祖法雄慷慨倜儻好孫吳不事筆研陳橫野將軍祖果願學禮經不隕素業即學士摳之從父兄也少為尚書毛喜所知陳本州文學從事父文超果行育德精意易道及洪範頗曉氣候貞觀中以有事遼浿策名勳府龍朔初黜陟使舉檢校江州尋陽丞棄官從好遂寓居廣陵與學士孟文意魏令謨專為討論具有撰著公即尋陽府君第三子也幼聰穎六歲能誦書一見不忘氣韻和雅鄉黨以為必興此宗十五遍誦詩禮騷雅能屬文有史力長史魚承日盡特見器異舉孝廉引同載入洛闕一字尚書倉部郎河東裴炎之博學深識見名知人音旨儀形海內藉甚公年甫弱冠便蒙引汲令與子闕一字研覃遂博遊史籍無不畢綜以文學優贍對策乙科乃尉郿無何丁太夫人闕二字憂即陳學士宏直曾孫女也本自名家貞高博識公在艱疚骨立柴毀殆不勝喪服闋授麟臺正字少監京兆韋方直好學喜士善飛白書以公既及冠禮未嘗立字遂大署飛白云懷素字貞規扶風之學士也封以相遺其為時賢所重如此以忠鯁舉除左鷹揚衛兵曹參軍轉咸陽尉時則天太后大崇諫職授左拾遺深盡規諷尋改左臺監察御史歷殿中彈糾不避強禦加朝散大夫轉詹尹丞朝論稱屈遷禮部員外郎與范陽盧懷慎隴西李傑俱以清白嚴明分為十道按察以公詞學贍洽精核文章轉授考功員外郎修文館直學士遷中書舍人與李乂同掌黃畫踰年檢校吏部侍郎實允僉闕一字屬朝廷以刑政所急改授大理少卿關畿佇材除虢州刺史惠實在人入為太子少詹事判刑部侍郎加銀青光祿大夫兼判禮部尋而正除刑部時稱慎恤轉戶部侍郎上以河南蝗旱令公馳驛賑給宣布聖澤所至甘雨使回拜光祿卿遷左散騎常侍轉祕書監四部舛雜頗多殘蠧公倍加校定廣內充積加兼昭文館學士與右散騎常侍褚無量更日入內侍讀每至宮門恩敕令闕一字小爻木上殿自車丞相已來殆將千載始見此禮公疇日自序云慕善嫉惡好學潔已自謂不慚古人無負幽明矣直哉是言不騫厥信以開元六年三月十日遘疾中旨遣御醫賜藥相望道路以開元六年七月草七日終於河南之育材里第春秋六十皇上輟朝二日舉哀闕一字次乃下制曰存樹高烈君子所以立身沒垂令名古人所以貽範銀青光祿大夫故祕書監兼昭文館學士侍讀上柱國常山縣開國公馬懷素越箭含貞楚材登用清芬獨映至德可師自服勤典籍納訓帷扆輔朕以媺道弼豫以正言允資惠迪實表泉懿而曾不憖留歘焉雕落思甘盤之舊學臨宣明以增歎興言感愴用震悼於厥懷可贈使持節潤州諸軍事潤州刺史贈物三百草段米粟三百草碩喪葬所須並令官給京官六品一人檢校公雖纍登臺閣率身儉素俸祿之資賙贍親友及啓手歸全家無資産惟有書數千卷以為燕翼以其年十月十三日窆於洛陽古城之北原禮也有子巽等雖年在童孺禮過成人棘心欒欒感於鄰巷敬勒行事以旌泉戶銘曰益佐理水功施生人羡於馬服守趙却秦東京戚貴南郡儒珍德先惟永奕奕振振其一朝請風素橫野矛戟從事顓禮尋陽洞易公自名家伏膺經籍鼓鐘外遠純漆內積其二用材南楚待問東堂持斧作憲含香拜郎再飛禁掖七踐文昌國傳茅土巷擁旗常其三井春紛綸桓榮稽古行儒師逸高迹誰伍公實踵之堂奧斯覩匪徒外潤爰歸內補其四惟昔殷后學於甘盤一期千載遇君則難充堂阿那其臭如蘭懿哉夫子斯言不刊其五仁謂必壽神期式穀生寄雖浮夜趨何速寵極韓賜恩深衛哭徒望邢山豈忘喬木其六崢嶸徂歲寂歷空岑白日無影寒雲半陰燕城表滅漢水碑沈貞臣之墓樵牧誰侵其七君諱相清河人也神農之苗胄太公之允緒原夫魚吞呂釣應同載以歸周龍躍崔津表嘉名以誕慶曾祖懷隋任鄭州司馬祖文觀隋任豪州録事參軍或六條布政揚至德以宣風或千里輔仁翊公平以闡化君高門華緒間代清姿椅桐吸日月之光松柏梃風霜之節方冀南山錫壽永駐頽齡何期北帝遊魂先悲過隙嗚呼哀哉以開元十年二月草一日終於私第春秋六十有八夫人丁氏蘇氏李氏並母儀婉順婦德惠和移鄰之慶早彰舉桉之歡夙備庶期千月壽保百齡冀椿鶴而齊年奄菌蝣而等謝越開元十年三月八日合祔於村西北二里平原禮也左榮澤右成皋峨峨飛嶠鎮其前滔滔黃河灌其後嗚呼玉樹雙埋金聲兩絶白日杳而三千歲黃泉深而幾萬里悲風起而松柏哀冷露泫而蓬蒿泣嗣子待賓等瞻天靡訴叩地無追長縈銜索之悲永結飱荼之苦銘曰東光不駐西影彌催昆山玉碎蘭苑香摧元霄易掩白日難開母儀夙備婦德早彰匣中劍折鏡裏鸞亡乾坤載合琴瑟重張森森翠柏騷騷白楊千秋播馥萬代流芳君諱守福京兆人也蓋周之遺苗鄭之遠允也昔六國分峙茹姬為魏后之妃七雄並爭茹耳為韓王之相自周歷漢洎晉迄隋朱輪華轂金章紫綬代有人矣曾祖譽祖宏善並耿介清素遹欽儒風高蹈邱園不仕於世父行本上柱國魁岸長者風神駿拔載疇符爵克著勳庸君自始成人預展心力出入扃禁宿衛先朝武太后時選補右領軍衛長上考滿授芳州仁里府別將仍於定陵押當畢授隴州大候府果毅君職雖戎武而學重儒文清慎自出於本心廉讓實由其天性書則尤工草隸算乃妙洞章程伯英慙其筆力宏羊服其心計藝術超邁聲華日聞屬開元祚興選舉尤慎特進王毛仲聞而重之召為監牧都使判官於是隴右巡檢頻為稱職遷懷州吳澤府果毅考滿擢授京苑總監雜掌農衡考課元最頻歷數職判官如故前後十餘歲焉豈非碩人令德善始善終者也君幼而聰敏內崇正覺行六波羅蜜遵不二法門性之自然薰羶不咀於口天之所授經戒克銘於心爰在吏途雅操彌篤雖王事鞅掌劇務紛綸而顛沛必依於仁造次不愆於義嗚呼行之難矣斯人謂歟粵以開元十一年四月草九日奉使隴右道巡監牧六月二日還至京六日已亥遘疾至八日辛丑卒於長安休祥里第享年三百三甲子四旬有二日矣嗚呼降年不永穹蒼靡遺鳴玉未擊而自摧芳蘭不秋而先落君初遘疾之時呼集家人告其死日子女隕泣小大咸驚君乃止之曰生者物之始死者物之終終始循環天之常道又何足悲也於是自為沐浴衣以新衣乃請諸名僧造廬念誦君端坐寢牀精爽不亂言話如故誡囑無遺果如期不愆於驗辛丑夜刻至子奄然而逝趺坐不動左右無驚異哉乎所謂知命君子代之奇人夫人河東薛氏四德聯華九儀克著貞賢外播溫孝內融和鳳雖則先飛神交終當重合即以其年八月有九日合葬於城南香積寺闕一字原禮也嗚呼芻靈發引白馬悲而不前宅兆攸安青烏卜而云吉冀龍山一變知令德之猶闕一字鼇海三闕一字振清徽而不朽乃為銘曰洪闕一字大造厥初生民仕以行義義以贊神惟德可據惟道是鄰取則不遠在乎伊人伊人為何生唐之域筮仕明時束髮從職溫恭淑慎濟濟翼翼孝乎其家忠乎其國馳思元冥樂道之精匪由壯冠發自弱齡松筠勵節冰鏡彌清心歸正覺口誦真經捧戒珠兮不失傳慧炬兮逾明達人知命吏隱王庭有知於死無惋厥生猿坐入定神遷不驚倬哉若人閲此哀榮丹旐翻兮慘引白駒局而悲鳴悠悠窅窅歸窀穸千秋萬古閟松扃公諱憲字令將平陽臨汝人也闕十三字為氏洎七葉有漢大將軍棘蒲侯武又十五闕八字平陽侯子孫家焉祖遠雄武多大略徵晉昌令不就闕五字高量纍辭辟命沒諡真隱先生積德未享是用有後公闕四字氣降虛明之神清暢條理夷雅間秀詞學優深操行無玷闕四字不徇速達年卅鄉貢進士對策上第其年解褐滎澤主簿闕二字師尉明堂尉閿鄉令秩滿受詔關內覆囚旋拜右臺殿中侍御史轉庫部吏部二員外郎丁內艱哀毀過禮服闋除禮部闕一字功二郎中遷給事中中書舍人策勛上柱國除大理少卿出為虢州刺史復大理少卿遷工部侍郎又出為亠兊州都督入拜衛尉少卿復工部侍郎又出為蒲州刺史入拜太子右庶子遷太子賓客纍加封嶽陽縣開國男食邑五百戶凡所歷官咸著成績皆任實以祐物不激譽而干進休名自著僉舉允諧喪仲弟哀感成疾以開元十三年九月草五日薨於東都審教里第春秋七十八粵以開元十四年歲次景寅十一月乙亥朔十六日庚寅葬於偃師縣龍池鄉之北原祔先塋禮也惟公宅乎中庸樂在名教體忘悔吝德全終始者朝廷一人而已又嘗著中道通教二論注周易撰三傳通志草卷集內經藥類四卷合新舊本草十卷並行於代噫可謂立德立言歿而不朽者矣嗣子長安縣尉少儀等孝思純至永懷揚名乃刊石勒銘以志幽宅其辭曰盛德之後兮實生哲人文義博暢兮志業清純孚政光國兮懋寵榮親立言不朽兮全道歸真公諱士恭字履揖其先東海人也漢太守定國之允洎五代祖謹仕魏遂居河南今即河南人也績著前史慶貽後裔曾祖宣道隋左衛率皇涼甘肅瓜沙五州諸軍使涼州刺史成安子祖永寧皇商州刺史增建平公父元祚皇益州九隴縣令襲建平爵尚德靜縣主公即主之次子也公言行周密風儀間雅弱冠以諸親出身解褐授好畤縣尉初大周御宇分邦制邑劃爾畿甸隸為稷州選部甄才擢授斯職亦當時之榮選也自茲已降纍遷郡邑尋贊臨潁復典膚施關右馳聲許邦思惠非此能備也開元十四年春天子若曰縣令在令清白者選日擢用公即隨調選方俟遷陟命何不融疾成不治以其年秋九月戊戌卒於私第春秋六十有六時來不偶其如之何夫人譙郡戴氏妍妙凝華貞順勉行自承饋盥克諧琴瑟降年不永雖恨偏沈同穴相期果然終合開元十五年七月乙酉權祔於京兆神和原禮也拱樹蕭蕭坐看成古佳城杳杳空見微月嗣子弼嬰等泣血崩心絶漿茹蓼昊天莫報長夜不曉慮陵為谷刊石為表銘曰死生有數晝夜不捨嗟彼于公長歸地下高墳峩峩宅此崇阿千秋萬古孰知其他君諱昕字道光京兆長安人也漢廷尉之丕緒晉司空之徽烈印傳雙鵲不墜家聲冠映七貂挺生其美曾祖宗隋襄城郡守和易二州刺史剖符按俗露冕宣風明斷不謝於分縑清白有逾於酌水祖績朝散大夫上柱國行閬州西水縣令術雄五縣恩寵百縑調絃則綵翟馴桑字物乃白鳩巢室父元禕中大夫行寧州長史才高展驥德邁題輿專城假翊中朝藉甚君門承懿範貽教英奇鄉譽克重於歲寒庭訓必先於忠孝取父蔭出身解褐授涇州鶉觚縣尉秩滿選授汾州隰城縣尉丁父憂服終選授京兆府美原縣尉而職司畿甸聲流臺閣冀期朝須方朔欲問西風何圖天要李通便遊東岱以開元草四年秋七月四日奄終於私第春秋五十有七即以其年歲次景子十月三日窆葬於京城南社城東二百步舊塋之禮也夫人京兆韋氏夫人恆農楊氏遷合嗣子等臨鶴而攀號恐冥寞無知鑿石為記其詞曰於昭清河宗社熻赩廷尉重道司空博識家傳鵲印代襲貂蟬剖符求瘼綰墨調絃龐統外臺梅福畿甸德音尚在魂靈不見親親雪泣嗣子攀號式鐫貞炎永播劬勞夫人姓范諱如蓮花懷河內人也洎中行佐晉張祿相秦滂著大才煜稱良史英聲茂閥奕世存焉高祖預祖義慎父元琛並才韻卓犖風調間雅幕梁竦之平生恐勞郡縣詠陶潛之歸去遂樂田園由是冠冕陵遲夫人因為平人也凝脂點漆獨授天姿婦德女功不勞師氏始以色事朝請大夫行河內縣令上柱國琅琊王升次子前鄉貢明經察送深目逆調切琴心昔溫氏玉臺願投姑女漢王金屋思貯阿嬌方之寵焉未足多也而夫人猶自謂桃根卑族碧玉小家每驚齊大非偶能用鳴謙自牧舉事必承先意服勤嘗不告勞而王公感夫區區他日益重雖名齊衣帛而寵實專房粵以天寶三載閏二月十四日因闕一字覆瘡中風終於河內之私第春秋載卅七即以其闕一字歲次甲申四月甲午朔十六日己酉葬於大行之陽原禮也烈烈哀挽壘壘孤壟將懼為陵庶存刊石銘曰長夜窮泉兮一閉千年云誰之思兮令淑殲焉巫岫雲沒兮河陽花死地久天長兮空存女史公諱思廉字思廉天水人其先秦之祖也同源分流實掌天駟封周仕晉繼為國卿漢魏以來世濟厥美高祖修演魏司徒府長史清水郡守贈驃騎大將軍開府儀同三司秦州刺史曾祖士季周秦王府司録亳州總管府司馬陵安郡太守儀同三司祖搆隋秀才侍御史民部郎中毛州刺史父素隋孝廉丹陽郡書佐皇舒州司馬三朝積慶四葉重光門連嶽牧家襲孝秀相府類能儀同踵武於三揖禮闈尚德柱史騰芳於一臺三條舉而百度可見以驃騎之博物洽聞以陸安之出入濟理以毛州之黼黻高選以司馬之優遊上列典禮崇而勛業籍甚矣公之少也婉以從令敏而好學其壯也屹有秀範恬無流心弱冠明經登甲科解褐鄭之滎陽主簿換益之雙流稍遷河南府登封尉再遷枳棘徒仰龍阿之鋒一踐神仙果聞鷹隼之擊能事備矣朝廷韙之天子聞而疇咨曰爵以馭賢不可改已拜監察御史鐵冠不雜石室高標緩步立朝而人皆斂手向風矣闕一字犯法當訊執事者上下其手公匪石難奪直繩不撓推事忤旨左授荊府法曹得寵若驚失職無慍荊山南峙出毀匱而方遙溝水東流逢逝川而靡及大足元年八月十二日寢疾終於南陽之旅舍春秋六十有六夫人博陵崔氏齊薑之著姓也壼室聞詩闖門習禮梧桐半在稍度林下之風寶劍雙飛空挹薤中之露以天寶四載十月乙酉朔十三日丁酉合葬於萬安山陽蓋周公已來即遠事終之達禮也二子悅坦之悅揚歷監察御史江陵安邑二縣令敦惠文敏一時之良美玉有藉連城未得明鏡無塵照鄰皆見日坐事長吏被出非其罪也坦之濟陽尉敬友恭順一闕二字龍期述德於終天顧託文於貞石銘曰闕二字之功宣孟之忠盛德百代聿生我公籯金繼美片玉斯崇黃闕二字物朱絲直躬作椽何所投珠漢東晨裝戒路暝燭隨風南陽地遠闕塞闕一字中孤魂久客雙穴來同冉冉人世蒼蒼旻穹歿而不朽大夜何窮夫人義興人也漢真將軍勃之苗裔晉輔國大將軍處之孫皇明通之女姻不失媛晉以匹秦適為太原王府君靜信之妻昔五典克從三台樹位漢朝之任太尉司空此皆府君之遠祖也夫人四德可則九族從風齊眉之敬無虧如賓之儀有越奉佐君子何憚蒿藜自喪移天久歷星歲期百齡之有永胡一極之備凶天道者何仁罔斯在嗚呼哀哉藥餌無救遂終於延康之私第時春秋六十有五孤嗣號絶猶子悲酸以茲吉晨赴杜城東郊之禮也況丹旌霞掣素幕雲張痛寒風之蕭瑟悲夜月之蒼茫嶽也匪才忝為敘述詞曰昔聞天道仁罔不遂彼蒼如何降禍斯至嗚呼哀哉嗚呼哀哉黃泉已掩白日寧開痛孤嗣之號絶傷行路之徘徊夫人四娘其先彭城人也自留秦分族海隅振藻前史昭晰不能繁云曾祖福祖李買父再歆並鄉閈表儀人倫聞望高尚其事婆娑自適盛德鍾美降生夫人而嬪於衛氏焉其孝事舅姑賓待君子禮接姻黨慈訓長幼則薑施孟母之不死也豈簡翰所得形焉嗚呼鳳梧半死龍劍一沈君以開元草三載三月七日溘先朝露夫人守志彌堅孀節不易奈何天不祐慶以天寶六載遘疾七月十二日終於私第享壽七十有四即以其月草八日附窆於河內郡城西北二里弼諸鄉平原夫之故塋禮也有子克已血泣荼苦骨形柴立爰求匠石敬紀芳猷詞曰彭城流芳兮海隅傳美降生賢婦兮以配君子天何不祐奄此凶矣孝號戀兮哀哀胡恃勒石紀銘兮永光萬祀遠國流芳楚大夫汪之緒也洎乎晉業黃門侍郎嶽之允矣幸唐運龍驤娵觜耀武曾祖佛壽識叶天謀輔翼左右拯濟塗炭永寧邦社拜銀青光祿大夫儀同三司九原郡守祖觀大中大夫行司津監父元簡積學成業溫恭允克仁惠鄉閭博通今古弱冠明經擢第吏部選君名智昭字洛京兆華原人也幼年聰敏識用多奇日誦萬言尤工書算甄別寶玉性間技巧好歌詠事王侯此乃君之行也君之明也養親純孝甘脆無虧交遊克誠信道日益友于兄弟共被均衣見善必悛歸心三寶君之孝也君之仁也曉陰陽義通挈壼術事瞿曇監侍一行師皆稱聰了委以腹心君之德也君之能也掌歷生事習業日久勤事酬功授文林郎轉吏部選時載五十有六運薄陵遲降年不永嬰疾纍月藥餌無徵病甚日篤終於其家嗚呼生兮有涯逝川長沒備凶儀習吉兆以戊子歲實沈月五日癸酉殯於長安龍首鄉禮也有子五人順也運也訓也慎也俊也昊天罔極泣血如流恐代久陵夷高崖為谷孝心遠紀式刊銘志長原孤墳松檟蕭森刊石遐紀流芳德音泰山其頽梁木其摧五子荼毒追慕增哀鳥能飛萬里其有鵬乎魚能吸百川其有鯤乎夫鯤鵬之處者非滄海而不居非扶搖而不動豈秋潦夕吹而能加其志焉士有佐世之才者非艱難而不投非明君而不事豈斗筲凡類而能效其節焉則我南陽張公功可著矣公諱安生譜諜清華門多高士漢有留侯祕略晉有司空博識纍葉冠冕暉曜相繼祖諱泰考諱貞並儒素隱躬遁迹不仕田園蘊道於高尚詩書襲德於風雅後因公列爵追贈考扶風郡司馬父因子貴以忠彰孝公駿骨天資偉貌神秀拔奇材於衆外先武略於㣥右景雲中屬韋氏竊權㣥凶暴溢擾我黔庶殘我王室公乃叶忠謀為佐弼識潛龍必躍於雲霄知牝雞伏誅於斧質提一劍而直入掃九重以殄謐再清京兆之天重捧長安之日謀深於周邵功越於平勃古往已來莫之與匹公以功高職卑者志士之讓初退後進者達人之漸故辭公侯之封就戈戟之任畢能身榮於紫綬門曜於丹戟得馮異大樹之名免蕭何小過之責有始有卒其惟公乎遂解褐授果毅二遷折衝一拜郎將再轉中郎畢於龍武將軍矣食邑九百戶公歷官無虧公務有要處事有則人莫能犯或帝居內宮則警衛嚴肅或駕行外仗則旗隊克齊其動也若鷹鶚迥迅其止也狀師虎㣥怖電轉星流比其速雲回霞卷處其事暨乎晚載自強不息者繄公而已以天寶十三載冬十一月十日扈從薨於昭應縣之官第也享載七十有一初公染疾城中將赴湯所左右留勸作色不從曰吾亦知難保者命但殞隨君側以表忠誠亦知易歿者身但死在營間用彰勤節使魂歸帝鄉之路心存皇闕之下願之足矣汝等勿違言畢扶疾即行到遂終彼所謂臨事無苟憚臨困無苟免及回櫬於路誰不傷悼嗣子庭訓等侍疾而捧藥淚枯返柩而攀輿氣輟夫人太原郡君王氏先公近歿苫廬猶新縗絰重舉泣地未絶號天更哀又以翌載春二月十二日別兆葬於龍首原之禮也素墳上築而永固元堂下甃而深堅白雲孤飛招將軍之勇氣緑柏旁植表武士之高節恐陵谷有遷刻銘以記銘曰鶚之迅兮飛已絶士之勇兮謀且決臨難不懼兮忠臣節奉我明后兮誅暴蘗鶺鴒貴兮雁行列花萼忽凋兮一枝缺獨有功名兮千載存刻石詵銘兮記墳闕噫夫蒼穹不仁殮我能幹德星落彩和璧韜光者歟爰我所珍清河張公字希古晉司空華之裔緒也惟祖厥父耿逸馳芳兢惕怡然匪干榮祿優遊自得凜霜松之操岐嶷孤拔挺風雲之氣公負河嶽之粹英育辰象之靈質亭亭高聳遠振雄名傑傑威稜龍城獨步門延賓侶豈謝季倫精舍樓臺有齊須達加以武略兼著公忠必聞歷踐榮班宿衛清禁纍遷馬邑郡尚德府折衝都尉遊擊將軍上柱國員外置同正員莫不獻肝膽於玉階輸腹心於金闕惟謹惟勵不僭不瑕豈圖二豎興災兩楹搆禍藥物無護酷烈所鍾白日長辭黃泉永赴則以天寶十四載十月十七日終醴泉里之私第春秋七十有三天寶十有五載四月二日窆於鳳城南樊川之北原禮也太夫人天水趙氏恭而有禮時稱孟軻之母圭璋播美松竹茂心誕三子長曰行瑾次曰崇積並武部常選季談俊衛尉寺武器署丞嗚呼誰免乎榮枯適覩全盛今已淪殂梁木折泰山頽三子腸斷二女情摧咄嗟人代天道邅回其詞曰公之英聲振區宇兮公之勇義如龍虎兮彼上蒼蒼何不仁兮僉稱我之至所珍兮泉門此日一關閉兮玉顏何春再相詣兮表余平生情殷至兮飭琬炎以鑿銘記兮河南府法曹參軍有唐逸士吳郡張從師沖和純粹辨博閎達卓犖好古儻蕩逸㣥秀才高第歷官五政忘懷樂道如浮雲無心野鶴獨立上元二年終葬虎邱西原子惟儉惟靜弱歲皆精左氏穀梁春秋弟從申時為祕書省正字從師祖損之隋侍御史水部郎損之生浤碩學麗藻名動京師從師之父也從申自有時名書法甚高公諱希超字少逸其先清河人也漢末因避地過江遂居於杭州鹽官縣焉祖楷陳王府咨議父徵隱遁邱園高尚不仕公即徵之次子也公性實惠和材兼文武行必由本言皆中規忽以貞元元年五月五日寢疾終於袁花里之私第享年五十有七即以其年十月十一日遷窆於皇缸村北平原禮也公有一子曰灞少習典墳遊心文囿銜悲泣血願有志焉其詞曰高岸為谷深谷為陵千年萬歲惟斯可憑君諱思字恭其先安定人也昔秦仲伐西戎有功周平王東遷封少子康於夏陽梁山因而命氏其後竦因才著冀以榮稱禮樂弓裘千載不墜曾祖志誠祖從政父當意並立言立德為龍為光前史詳矣君幼重儒素長好交遊義及友干信誠鄰里不羡榮貴以素琴濁酒為娛屬荒郊有事大國用師公奮不顧身掃清邊鄙特蒙纍功加上柱國錦衣綵服宗族為榮於戲四時流謝易往難追優哉遊哉聊以卒歲大歷十二年七月三日遘疾終於家也春秋八十有七夫人清河張氏閨闈秉德婉孌宜家蓬首終身不移霜操廣德二年八月八日奄然長往公有二子伯曰崇璧次曰廣濟孝情克著追遠思深遂展靈儀旋開兆域以貞元九年歲在癸酉十月十四日卜麟鳳福慶之穴得雞犬鳴吠之辰合葬於平遙城西北一里舊塋禮也辭曰寒郊十月四序旋周白日朝暗黃雲暮愁蕭蕭曠野鬱起荒邱人世此謝泉臺路幽雖餘刓石萬古千秋府君諱昌嶠字光宇本安樂郡人闕第于文公之後近祖昭理蘇州刺史六從之孫府君立性溫和為人敦厚權利刊官知其禮節委以小鋪之惕疑虔虔夕惕若厲無咎嗚呼直心奉公不保餘慶享年卌有七貞元十一年二月六日終於家堂至七月八日葬於新亭山之大墓禮也長子叔海次子叔政兄弟五人弱冠小猶丱角祖母孫氏闕與蘄闕慈親李氏撫孤殞闕銘曰大墓高岡新亭之陽于子世代千古流芳府君諱令圭其先本博陵越人也蓋帝嚳之末裔闕晉永嘉二年遷於南楚曾祖詮皇長沙縣令大父闕軍考日智皇國子助教纂承儒業闕向二百年闕夫人南陽張氏世傳冠蓋奕葉簪纓府君則國子監助教第二子幼而孤夫闕弟更相誨訓未嘗住師闕業成各登闕第府君以闕解褐曹州葉氏縣闕仕標闕邑闕元年遷硤刑長闕百里稱賢頌闕大歷闕安州雲夢守節奉法猾吏秉以貞元闕授朗州武陵去獸逾闕逋亡闕從官四任闕政大夫以闕字人闕稱其賢公庭訟息闕館闕慎始令終府闕武陵祀秩草八載守道闕仕何圖皇天不弔降此哀禍嗚呼元闕何昧闕材賢時貞元十二年龍集闕子三月遘疾七月庚寅闕於闕縣私第夫人廣平程氏令淑有聞威儀紃組敬事闕先始闕以大歷年先府君而終府君享七十有八有子三人長曰倗官至左衛兵曹參軍次子任鄂州武昌府尉少曰紹闕州闕縣尉孤子倗等闕荼淚血號訴聞天視庭戶而蕭條覩空堂而寂寞長幼孤露一門無恃以其年十月四日遇青闕之吉歸祔於鄂州江夏縣長樂鄉順化里黃鶴西山之原禮也孤子倗散闕號泣請銘謹以為志銘曰於戲闕著則其一積善於家肅穆清華其二克勤克昌榮祿闕視其三四從歷闕一門承蔭其四天道何昧降斯災害其五神道胡欺遘其禍其六冀闕眉壽皇天不佑其七庭闈蕭索闕蒼其十貞元十五年歲次己卯七月癸卯朔一日癸卯夫人春秋卌七寢疾卒於幽州薊縣薊北坊以其年十三日權窆於幽州幽都東北五里禮賢鄉之平原禮也曾祖諱祐祖諱沖考諱進其先濮陽人也代生名賢書於史策夫人聰雅惠哲性尚恬和禮節詩書組紃織紝無常師而自成年十八以四德百行糚其容三從五教飾其性乃乘其龍而歸於我彭城劉公琴瑟協韻鴛鸞諧聲軌範宗親肅穆娣姒內則乃成法度貞著蘋舉桉之禮節者得非門之講歟疑於戲哀哉夫喪婦德宗傾母儀惜哉瑤臺落月玉樹飛花皎皎三春痛冥冥而長夜溶溶一水悲渺渺而不回於是劉公仰天而哭曰德何有而無壽來何速而去長偕老之情終天永訣一豫始孩闕一字不勝經痛生人之心矣厥有二女一適於崔一處於室以備晦朔之禮僕非達人焉無銘焉其詞曰性稟淳和志惟貞一作配於劉蘭處瑤室介祉不亨忽辭白日女蘿墮松塵埋玉質大房西倚桑乾東流盤抱元氣質彼元幽
