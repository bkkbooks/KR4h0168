body:
  text: 曰有唐之建都兮蓋法天而立象濬重門於北極聳雙闕以南敞夾黃道而嶷峙干青雲之直上豈一人之是憑抑萬國之攸仰洎乎青陽戒節玉紀回天萬戶聞漏以傳響百僚執贄而獻年遒人之木鐸既徇天子之金章是懸觀乎渙發大號孚崇聖德澤如春流義若泉塞公卿翼翼而仰化黎庶欣欣而無忒自皇明而播九重由京師而降萬國美哉真盛代之聖明也爾其闕之為用也叶古典布新章積非煙之疊疊羃佳氣之蒼蒼扣峻墉以龍峙屹中天而鳳翔伯玉過而必肅子牟懷而不忘若乃盤礡國門巍峩穹昊覆瑤草於輦路接青槐於馳道亘玉斗而彌永半金城以處好既悅功於子來抑有符於靈造及夫霜天肅霽曙景涵風對巖廊而隱轔映玉樹以玲瓏既岌岌以嶪嶪亦穹穹而崇崇縱黃金與紫貝孰並美而傳功童子何知謬膺邦政徒欲竭其鄙思諒難酬於嘉命且賦頌之作本乎情性雖杼軸而屢空聊高歌以為詠亂曰巍巍雙闕兮嶽立雲峙政令因斯以帛丿糸有兮黎元賴此以獲理敢頌美於一時庶流芳於千祀臣真卿言六月二十七日伏承賊陷潼關駕幸蜀郡李光弻郭子儀等正圍博陵郡收兵入土門王師既還百姓震恐憂惶危懼若無所歸臣不勝悲憤之深遂遣腳力人張雲子間道上表猶恐不達又差招討判官信都郡武邑縣主簿李銑相繼間行銑及雲子前後並到靈武郡奉皇帝七月十二日敕伏承陛下命皇太子踐祚改元皇帝上陛下尊號曰上皇天帝臣及官吏僧道耆壽百姓等蹈舞抃躍不勝感咽其張雲子回皇帝授臣工部尚書兼御史大夫其李銑回又授臣銀青光祿大夫顧以庸微頻叨寵命道路隔絶辭讓無由進退失圖伏增惶懼竊以逆賊安祿山孤負聖恩憑陵㝢縣禍盈惡稔尚稽天誅今皇帝撫軍蒼生賈勇豐鎬河洛指期可平伏願陛下垂拱頤神以覩廓清之慶臣官守有限不獲隨例闕庭無任懇款悲戀之至臣真卿言臣聞無功受賞為善不勸有罪不罰為惡罔辨陛下克寸復之期匪朝伊夕至如賞罰二柄事在必行苟或不明於何取則臣以愚懦叨守平原屬逆賊安祿山背叛聖恩擾犯河洛臣堂兄杲卿以常山太守首開土門臣與河北諸郡因之固守人臣本分夫有何功上皇授臣戶部侍郎兼知招討採訪等使已失人望緣賊未滅遂不敢辭又令李光弻郭子儀賀蘭進明等與臣計會同討凶逆三數月間河北向定屬潼關失守大駕西巡光弻等卻入土門諸郡危逼陛下御極又録臣無功寵以非次常伯亞相一時猥集兄允南弟允臧等連榮臺省一男三姪皆授好官在臣一門叨幸斯極殞身碎首無以上報臣常使判官巨鹿郡南和縣丞賈載姪男永王府典軍廣成及行官鄧昌珍楊神功裴法成等十餘人將綵物絹帛相繼渡海與劉正臣計會共和兩蕃正臣等克寸期南來行已有日屬逆賊史思明尹子奇等乘其未至悉力急攻諸郡無援相次陷沒皆由臣孱懦無謀致此顛沛誠合殉命危難死守孤城以為歸罪闕庭愈於受擒賊手所以僶俯偷生過河緣劉正臣使楊神功將牒與臣索兵馬及盤瓶錦帳令應接奚契丹等不與其勾當伏恐陛下貽憂又恩敕先超授吳郡司士鄭育樂安郡太守令於江淮南兩道度僧道取錢與臣召募士馬令應接河北臣由此未獲即赴行在遂至廣陵丹陽等郡各與採訪使計會竟不得兵馬即纍奉聖旨許臣入奏行至武當郡又奉恩命除臣憲部尚書兼令使者送告身與臣捧戴殊私不任惶懼陛下縱含宏善貸不忍明刑在臣靦冒至深胡顏自處臣忝為大臣繫國休戚損臣益國臣受其益損國益臣臣受其損若受任失守還朝屢遷示國無刑於臣大損非敢外飾實披至誠又臣名節雖微任位頗重為政之體必在律人恩先逮下罰當從上今罪一人則萬人懼若怙於寵四海何瞻伏願陛下重貶臣一官以示天憲使天下知有必行之法則知有必賞之令寵榮過於尚書遠矣無任懇悃之至臣真卿言伏奉今日制書以臣兼御史大夫本官如故恩榮纍及成命曲臨捧戴殊私慙惶靡據中謝臣孱微有素抗直無聞比守平原困於凶賊不能死節負義歸朝斧鉞之誅甘心待命崇高之位不次頻叨孟夏之中始操刑柄數旬之內兼總憲司撫已缺如負乘斯甚將何以明刑天下振舉朝綱臣聞秦漢之時凡有制詔皆下丞相御史府人到於今稱為副相東方朔舉自古聖賢以次百官乃以孔某為御史大夫則知其官何可妄授况列曹尚書古之常伯如天之有斗豈易其人昨以表辭非敢矯舉恐煩天聽僶俯就班候隙請間方擬牢讓不圖榮寵又集微軀聖恩頻繁固令即上陳請莫遂惶懼益深又臣竊見近日朝列之內或有身兼數官苟貪利權多致顛覆害政非一妨賢實多臣嘗忿之其忍自冒無任懇迫屏營之至謹詣閣門陳謝以聞倘天聰聽卑猶冀少回恩命停臣一職別授忠賢則雖死猶生期於畢力臣某云云臣真卿言伏奉某月日恩制以臣為吏部侍郎又奉某月日恩制加臣銀青光祿大夫浹辰之間殊澤洊至恭承寵命戴荷交馳中謝竊以國之所急必在官人銓綜之司非賢弗授伏揆虛薄祗懼實深常恐上塵則哲之明下負竊位之責未酬萬一再沐恩私寵命忽臨舊階旋復叨榮既甚宥過何深佩玉腰金實懼在梁之刺忘軀拜賜惟懷粉骨之誠施重力微罔知攸措無任荷戴屏營之至臣真卿言伏奉某月日恩制除臣同州刺史以某日至郡上訖受命祗懼伏增戰越中謝臣自失守平原萬里歸命甘心斧鉞用警敗亡陛下録纖芥之誠捨邱山之罪超司秋典再長憲臺宗伯亞相一時猥集在臣叨幸何以克堪誓當粉骨碎身少酬萬一而力微任重福過災生涓塵莫效咎愆仍積上負聖明之恩下慚魯衛之士槃水加劒未塞深尤禦魅投荒乃為殊造陛下識其睂目矜其要領待罪猶忝於左馮黜官不離於本秩感念恩德淪於心髓木石知變況在微臣伏惟陛下察其戇愚收其後效臣雖萬死實荷所天竊以此郡破亡再陷凶逆生靈塗炭邑室空虛殺傷者雖或蓋藏逃亡者尚未歸復謹當勵精悉力宣諭皇明旬月之間望有所校伏惟陛下減省聖慮不以此郡為憂則臣之愚忠生死萬足其戶口實數并利害切急者伏望容臣括責續狀奏聞無任感戀之至臣真卿言臣今月十一日伏奉五日恩制除臣使持節蒲州諸軍事蒲州刺史充本州防禦使臣緣同州先無佐官蒲州書魚未到遲回纍日不敢赴上中使張抱誠至奉宣恩命令臣與將軍趙瑣計會遊奕兵馬昨以十八日至州上訖祗承寵命伏增感惕中謝臣竊以此州之地堯舜所都表裏山河古稱天險餘凶未殄防禦是先況扼秦晉之喉撫幽并之背既號股肱之郡實資心膂之賢伏惟光天文武大聖孝感皇帝陛下道冠生人恩涵墜履方建非常之業不遺易忘之臣特委大邦俾之集事戴荷殊獎無忘寢食但臣愚駑有素智勇缺然將以鎮遏艱虞導揚德澤拜命之日以榮為憂唯君知臣教其不及勤恤人隱動必以聞陛下不以為煩則臣死而獲考矣無任感戴屏營之至臣真卿言臣聞帝王之德莫大於生成臣子之心敢忘於讚述臣去年冬任升州刺史日屬左驍衛左郎將史元琮中使張庭玉等奉宣恩命於天下州縣臨江帶郭處各置放生池始於洋州興道迄於升州江寧秦淮太平橋凡八十一所恩沾動植澤及昆蟲發自皇心遍於天下歷選列辟未之前聞海隅蒼生孰不欣喜臣時不揆愚昧輒述天下放生池碑銘一章又以俸錢於當州採石兼力拙自書蓋欲使天下元元知陛下有好生之德因令微臣獲廣昔賢善頌之義遂絹寫一本附史元琮奉進兼乞御書題額以光揚不朽緣前書點畫稍細恐不堪經久臣今謹據石擘窠大書一本隨表奉進庶以竭臣下慺慺之誠特乞聖恩俯遂前請則天下幸甚豈惟愚臣昔秦始皇暴虐之君李斯邪諂之臣猶刻金石垂於後代魏文帝外禪之主鍾繇偏方之佐亦於繁昌立表頌德況陛下以巍巍功業而無紀述則臣竊恥之謹昧死以聞伏增戰越臣真卿誠惶誠恐頓首謹言臣真卿言伏奉六月九日恩制以臣為升州刺史充浙西節度使兼江寧軍使聖德含宏不遺簪履捨其罪戾假以麾幢感戴恩榮死生知報臣某中謝臣以為全吳舊國分閫重權煮東海以自資塹西河而作固九州天險之地六代帝王之都是以魏文興嗟甘從南北之限苻堅恃衆爰喪百萬之師豈不以形勝是先腹心斯切親賢重寄鎮遏攸難矧在庸微寧堪及此是以拜命之日以榮為憂制書以今月四日至饒州臣以今日發赴本道取都統節度觀察使李峘處分訖即赴升州即當繕修甲兵撫循將士觀察要害以備不虞假陛下英武之威遵陛下平明之理一心戮力上答天慈伏惟陛下察臣愚忠則死且不朽無任感戴屏營之至臣真卿言伏奉某月日恩命以臣為戶部侍郎榮寵自天感戴交集中謝臣聞地官之任邦教是資侍郎之職非賢不授況臣資性愚蒙行能無取頻以疏拙獲罪朝廷五年之間三貶官次先朝皇極猶佐藩條官階勳封盡蒙黜削待罪三年分從遐棄屬陛下以聰明睿哲嗣聖登庸恩宥廣覃授臣利州刺史詔書始下才涉旬朔不遺易忘之臣忽奉待詔之命生死骨肉受賜已深對見之辰又蒙假以章服小臣懷惠寤寐無寧聖澤頻繁叨戴斯授循涯省分盈量則多粉骨糜軀罔知攸答無任感戴惶懼之至臣真卿言伏奉二十七日恩制除臣江陵尹兼御史大夫充荊南節度觀察處置使寵命自天戰荷無地中謝竊以荊南巨鎮江漢上游右控巴蜀左聯吳越南通五嶺北走上都寇賊雖平襟帶尤切雖叔子仁德元凱智囊居之猶或病諸過此豈宜濫據祗承睿顧伏深慙惕無任感戴屏營之至臣真卿言伏奉二月十七日恩制臣亡祖故曹王屬曹王晉王侍讀先臣昭甫特蒙聖恩超贈使持節華州諸軍事華州刺史天慈錫類泉壤疏榮捧戴殊私闔門感慶中謝竊以臣亡祖伏膺文儒克篤前烈能讀三墳五典八索九邱特為伯父故祕書監先臣師古之所賞愛師古每有注釋未嘗不參預焉又與學士令狐德棻等同侍天皇得備顧問有時無命夭閼盛年臣亡父故嶭王友先臣惟貞亡伯故濠州刺史先臣元孫等並襁褓苴麻孩提未識養於舅氏殷仲容以至成立臣堂兄故衛尉卿兼御史中丞杲卿即元孫之子及臣兄弟等幸承貽厥之訓遭遇明聖之朝各以微誠皆蒙殊獎杲卿雖死為不朽矣臣亦何人屢叨榮祿夙夜祇懼慚戴已深不謂霈澤曲霑裦贈俯及特蒙加等之禮實為非常之恩感戴屏營萬死非報無任戰荷之至謹因中使內謁者監張抱誠冒死陳謝以聞哀號在疚開闢所無誠懇尚違庶僚增懼伏見百辟並已釋除事既合權禮無獨異不可以吉凶兼制臣子殊儀伏乞奉顧命之文節因心之孝順時即吉屈已臨朝則萬姓心安四方事集臣典司儀注不敢輕移冒犯宸嚴無任懇迫孝德動天事踰前古德音俯降感咽載深臣伏守遺詔禮從易月祥禫變除儀注皆備若陛下未忍即吉更服練巾則遺詔不得奉行㣥僚無以覲見伏乞俯順人望仰遵先旨實大孝不虧萬方幸甚臣職在典禮愚守如前無任懇迫之至御史中丞李進等傳宰相語稱奉進止緣諸司官奏事頗多朕不憚省覽但所奏多挾私讒毀自今論事者諸司官皆須先白長官長官白宰相宰相定可否然後奏聞者臣自聞此語已來朝野囂然人心亦多衰退何則諸司長官皆達官也言皆專達於天子也郎官御史陛下腹心耳目之臣也故其出使天下事無巨細得失皆令訪察回日奏聞所以明四目達四聰也今陛下欲自屏耳目使不聰明則天下何述焉詩云營營青蠅止于棘讒言罔極交亂四國以其能變白為黑變黑為白也詩人深惡之故曰取彼讒人投畀豺虎豺虎不食投有北則夏之伯明楚之無極漢之江充皆讒人也孰不惡之陛下惡之深得君人之體矣陛下何不深回聽察其言虛誣者則讒人也因誅殛之其言不虛者則正人也因獎勵之陛下舍此不為使衆人皆謂陛下不能明察而倦於聽覽以此為辭拒其諫諍臣竊為陛下痛惜之臣聞太宗勤於聽覽庶政以理故著司門式云其有無門籍人有急奏者皆令監門司與仗家引對不許關礙所以防壅蔽也并置立仗馬二匹須有乘騎便往所以平治天下正用此道也天寶已後李林甫威權日盛㣥臣不先咨宰相輒奏事者仍託以他故中傷之不敢明約百官令先白宰相又閹官袁思藝日宣詔至中書元宗動靜必告林甫林甫得以先意奏請元宗驚喜若神以此權柄恩寵日甚道路以目上意不下宣下情不上達所以漸致潼關之禍皆權臣誤主不遵太宗之法故也淩夷至於今日天下之弊盡萃於聖躬豈陛下招致之乎蓋其所從來者漸矣自艱難之初百姓尚未凋弊太平之理立可便致屬李輔國當權宰相專政遞相姑息莫肯直言大開三司不安反側逆賊散落將士北走党項合集土賊至今為患僞將更相驚恐因思明危懼扇動卻反又今相州敗散東都陷沒先帝由此憂勤至於損壽臣每思之痛切心骨今天下兵戈未戢瘡痏未平陛下豈得不博聞讜言以廣視聽而欲頓隔忠讜之路乎臣竊聞陛下在陝州時奏事者不限貴賤務廣聞見乃堯舜之事也凡百臣庶以為太宗之理可翹足而待也臣又聞君子難進易退由此言之朝廷開不諱之路猶恐不言況懷厭怠令宰相宣進止使御史臺作條目不令直進從此人人不敢奏事則陛下聞見只在三數人耳天下之士方鉗口結舌陛下後見無人奏事必謂朝廷無事可論豈知懼不敢進即林甫國忠復起矣凡百臣庶以為危殆之期又翹足而至也如今日之事曠古未有雖李林甫楊國忠猶不敢公然如此今陛下不早覺悟漸成孤立後縱悔之無及矣臣實知忤大臣者罪在不測不忍孤負陛下無任懇迫之至謹按禮記曰先王諡以尊名節以一惠故行出於己而名生於人使夫善者勸而惡者懼也而虞夏之質殷周之文至矣而禹湯文武之君咸以一字為諡言文則不稱武言武則不稱文豈聖德所不優乎蓋㣥臣稱其至者是以子不得議父臣不得議君天子崩則臣下制諡於南郊明受之於天也諸侯薨則太子赴告於天子明受之於君也至於周室卑大朴散諡始以兩字為重人或以虛美為榮漢承戰國餘烈參而用之君臣易名事歸至當少不以為貶多不以為裦雖美衆所歸可一言而盡矣魏晉以降蓋不足徵聖唐欽明憲章周漢爰初創業順考古道高祖諡大武用漢制太宗諡曰文行周道也名正理順垂之無窮上元中政在宮壼亂名改作始建神堯文武大聖之號蓋非高宗之所獲已臮元宗之末奸臣竊柄析言而亂舊法輕議以改鴻名遂廣纍聖之諡有加至十一字者皇帝則悉有大聖之號皇后則皆有順聖之名使言之者惑於今行之者異於古非舊制也其後劒門下罪已之詔敘高祖以下纍聖悉用舊諡則元宗悔既往之失亦已明矣寶應中二聖山陵有司請諡事不師古變而行權去古質而尚浮華捨舊名而廣新諡謂一名不足以節惠乃十倍於古焉而纍聖諡名悉以字多者為定是廢高祖太宗之令豈曰愛君今制諡非古人皆知之有司因循其事而無敢言者假使當今守之而不改後人議之以為非然所失豈不大哉何者臣子之於君父莫不欲廣其美稱先王制禮不敢過也故至敬無文至文尚質質之數極於一堯舜之美足以彰矣文之數極於二孝文孝景之德亦已明矣質則近古文則近今此高祖太宗所以更用其法後王所宜守之法也非天下之至聖其孰能定之此天皇所以興聖主而正鴻名太宗所以待孝孫而修廢典微臣所以守經義而崇聖朝陛下宜奉天心繼先太宗之志使子孫蒙其法而萬代守之此天下之能事也臣愚以為高祖以下纍聖諡號悉宜取初諡為定謹按舊制宜上高祖為武皇帝太宗為文皇帝高宗為天皇大帝中宗為孝和皇帝睿宗為聖真皇帝其二聖諡名字數太廣有逾古制臣愚請擇其美稱而正之謹按諡法秉德不回曰孝照臨四方曰明宜上元宗為孝明皇帝又按諡法聖善周聞曰宣宜上肅宗為孝宣皇帝仍準漢魏及國朝故事於尚書省議定奏御夫文敝則救之以質至敬也名惑而反之於正至明也祖作之而孫述之至孝也三者備矣然後能立天下之大本正天下之大名建天下之大業能事畢矣伏惟皇帝陛下詳擇王制天子七廟三昭三穆與太祖之廟而七又禮器云有以多為貴者天子七廟又伊尹曰七世之廟可以觀德此經典之明證也七廟之外則曰去祧為壇去壇為墠故歷代儒者制迭毀之禮皆親盡宜毀伏以太宗文皇帝七代之祖高祖神堯皇帝國朝首祚萬葉所承太祖景皇帝受命於天始封於唐元本皆在不毀之典代祖元皇帝地非開統親在七廟之外代宗皇帝升祔有日元皇帝神主禮合祧遷或議者以祖宗之名難於迭毀昔漢朝近古不敢以私滅公故前漢十二帝為祖宗者四而已至後漢漸違經意子孫以推美為先自光武已下皆有廟號則祖宗之名莫不建也安帝信讒害大臣廢太子及崩無上宗之奏後自建武以來無毀者因以陵號稱宗至桓帝失德尚有宗號故初平中左中郎蔡雍以和帝以下功德無殊而有過差不應為宗及餘非宗者追尊三代皆奏毀之是知祖有功宗有德存至公之義非其人不居蓋三代立禮之本也自東漢已來則此道喪矣魏明帝自稱烈祖論者以為逆自稱祖宗故近代此名悉為廟號未有子孫踐祚而不祖宗先王者以此明之則不得獨據兩字而為不祧遷之證假令傳祚百代豈可上崇百代以為孝乎請依三昭三穆之義永為通典寶應二年升祔元宗肅宗則獻祖懿祖已從迭毀伏以代宗睿文孝皇帝卒哭而祔則合上遷一室元皇帝代數已遠其神主準禮當祧至禘祫之時然後饗祀議者或云獻祖懿祖親遠廟遷不當祫享宜永閟於西夾室又議者云二祖宜同祫享與太祖並列昭穆而空太祖東向之位又議者云二祖若同祫享即太祖之位永不得正宜奉遷二祖神主祔藏於德明皇帝廟臣伏以三議俱未為允且禮經殘缺既無明據儒者能比方義類斟酌取中則可舉而行之蓋叶於正也伏惟太祖景皇帝以受命始封之君處百代不遷之廟配天崇享是極尊嚴且至禘祫之時暫居昭穆之位屈已伸孝敬奉祖宗緣齒族之禮廣尊先之道此實太祖明神蒸蒸之本意亦所以化被天下率循孝悌也請依晉蔡謨等議至五年十月祫享之日奉獻祖神主居東向之位懿祖太祖臮諸祖宗遵左昭右穆之列此有以彰國家重本尚順之明義足為萬代不易之令典也又議者請奉遷二祖神主於德明皇帝廟行祫祭之禮夫祫合也故公羊傳曰大事者何祫也若祫祭不陳於太廟而享於德明廟是乃分食也豈謂合食乎名實相乖深失禮意固不可行周禮大司樂職云諸侯薨令去樂大臣死令弛懸鄭注云去謂藏之弛謂釋下也是知哀輕者則釋哀重者則藏又按庾蔚之禮論云晉元后秋崩武帝咸寧元年享萬國不設樂永嘉元年冬惠帝三年喪制未終司徒左長史江統議二年正會不宜作樂又章皇后哀限未終后主已入廟博士徐乾議曰周景王有后嫡子之喪既葬除服叔向猶議其宴今不宜懸宋書禮志云晉武帝已來國有大喪廢樂三年又按江都集禮說晉博士孔恢朝廷遏密懸而不作恢以為宜都去懸設樂為作不作則不宜懸孟獻子禫懸而不樂自是應作耳故夫子曰獻子加於人一等矣非謂不應作而猶懸也國喪尚近謂金石不可陳於庭又徐廣晉史曰聞樂不怡故申情於遏密諒暗奪服慮政事之荒廢是故秉權通以變常量輕重以降差臣以周禮去樂之文宋志終喪之證徐廣之論寧戚孔恢之說禫懸理既可憑事又故實伏請三年未畢都不設懸如有齊衰喪及遇大臣薨歿則量輕重懸而不作出處事殊忠孝不並已為孝子不得為忠臣已為忠臣不得為孝子故求忠於孝豈先親而後君移孝於忠則出身而事主所以叱馭而進不憚危險故王尊為忠臣思全而歸恐有毀傷故王陽為孝子則知晝之與夜本不相隨春之與秋豈宜同日且以為尚書志業高遠羽儀前朝百行之中能事甚衆議行稱諡固多美名何必忠孝兩施然後表德歷考前史恐無此事敢率愚見請更商量
