front:
  text: 全唐文欽定全唐文卷三百三十六真卿字清臣琅琊臨沂人開元中舉進士又擢制科纍官武部員外郎出為平原太守安祿山反河朔盡陷獨平原城守具備加戶部侍郎肅宗幸靈武授工部尚書兼御史大夫河北採訪招討使代宗朝封魯郡公為刑部尚書加改太子太師盧惡之奏使諭李希烈希烈脅之不屈遂縊殺之年七十七贈司徒諡曰文忠
  hash: sha256:f22e9f17618aa2df3456f1778715c1680ed65eff1fab4849fb50e1548129fcac
