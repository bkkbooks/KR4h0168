front:
  text: 全唐文欽定全唐文卷二百五十五蘇頲六
  hash: sha256:6b9fa72052374c20c3b8051df79342e7b259f514f2291f764959712d133a00b8
body:
  text: 臣頲等言伏以升中禮旋降禪云始五玉既輯萬方胥賴臣等中賀臣聞封太山至梁甫天下之壯觀王者之丕業伏惟開元神武皇帝陛下以天覆之大地容之厚車書不及而來王日月所臨而奉朔周年七百未可語於期運漢里三萬曾何校於提封大和浹區㝢榮貺彌川陸將辭上帝之休靡抗鴻儒之議式考南至之度爰備東巡之禮列戎夷之君長聚華夷之玉帛惠化潛扇納人歡以錫符淳風外流奉天符以行事遂登日觀拜雲封泥瑞芝檢珍玉導以六穗之禾犧以雙觡之獸茅黍畢陳鶼鰈咸在六宗起典則百神之禮具㣥后充庭則肆覲之儀洽乃藏祕冊昭尊名山稱歲以效祥乘溫以儲祉而叶同之令再造於黔黎增廣之仁更張於品物歸功當格於藝祖致美永延於岱宗斯所謂皇哉唐哉唐哉皇哉者也臣等不勝大慶謹奉表稱賀以聞臣頲等無任云云臣某等言伏奉今月二十日勅違此終喪未從權禮恭惟聖旨相顧失圖臣某中謝臣聞孝德稱三事親之道不貳喪禮有五權制之儀居一雖霜露增惕君子有終身之悲而日月其除達人無追遠之義故大賢抑情而俯就不肖庶幾而企及百王同範千古不刊此所以定通喪此所以明大孝陛下欲乖前訓獨展因心棄易月之制申再期之禮臣何人斯輒敢裁議然凡聖殊貫尊卑異等情則無別服則不同漢朝故事行之自久是以先后遺旨具刊節制率土之濱孰不哀奉陛下若違衆慮循私情想欒以纏悲服苴枲而增慕此則非先后之遺意也異通賢之達節也伏願俯依慘制以順權宜屈小節而存至公抑沖襟而明大禮則下願上達人欲天從陛下不違於先旨微臣得申於公議不任悲迫之至謹詣朝堂奉表陳請以聞臣某等言臣聞以日易月著自不刊之典以臣事君竊惟有爭之義㣥心累切聖感未迴臣等焦惶不安啟處中謝臣又聞之高宗諒陰三年不言百官總已以聽於冢宰斯則求古之人自殷宗行之矣但事有通變時有損益或循古法多昧遠圖孝文由是創禮孝景因之從令故漢之帝王獨高文景孝者先於百行豈欲違而致美誠以神器之重天下至公所直小所枉大加百姓而刑四海作程於後罔不率由陛下纂大橫之繇開中興之業每旰食坐朝求衣視事不可得不言也不可得總己也固不可如殷之時也臣請以近事為明是云典故豈三聖追遠曷不甚哉三年制服葢未然矣先后所以末顧之深者欲順成先志不改其道乎若遂乖於所奉固於執見寧獨神祇之望缺億兆之心阻必當太宗有恨於昭陵之仙寢高宗不悅於梁山之元官先后徒勤於憑几之言陛下是忘於綴衣之日矣今禮云衷後聖不宜獨善今禮云非前王故以垂訓其可專之乎況敬於宗廟四時之感斯在廢於禮樂萬邦之化安寄不薦不享久矣其如奉先何禮壞樂崩久矣其如致理何懼非大孝之意也頃公除有數臣等祗若今攢塗又畢時月已遠而陛下廷則簪裾之序居尚苴枲之容至有百蠻入覲千官在列仰晞太陽俾見㣥下便謂君臣之禮舉而有三遐邇之人感且非一彼數事者伏惟熟計之臣等輒以悃悃之懷願抑蒸蒸之孝陛下當迴思遷慮從權達禮思代天理物之大惟愛人治國之機上則遵於累聖稟於遺旨下則順此誠祈因而俯就喁然所戴罔不知幸無任悲迫惶悚之至謹詣朝堂奉表以聞臣某等言臣以易服之禮著之前訓從權之義聞諸格言遂乃披瀝肝血願垂昭亮天心彌固日慮徒勤是用怔惶但深焦懼臣中謝臣聞通喪之制差等不同天子絕朞故云自達此孝情之奧旨非喪服之遺事故雍言致惑子張發問於殷宗除服不疑元凱具陳於晉主此則家國殊禮君臣異貫前帝軌儀備之方冊況皇朝典故駿奔斯在祖宗奉先不違茲躅陛下若以庸言不信上則請按於周禮陛下若以今古異途此則請詢於唐典雖聖情多感臣不忍言而有義可憑終期俯察復以四海無外萬機事大國望時宗猶有權奪則陛下為天下主作人父母司牧㣥方纂膺寶業何忽以冕旒之貴而行布衣之禮也且臣等公除虔奉明訓陛下若素帟未卷縞衣仍服使吉凶殊於內外丹素雜於宮寢無乃哀樂乖宜乎無乃情禮失衷乎又臣以奉君為忠子以奉親為孝孝必順於先志忠必期於助禮今先後遺制服紀具存陛下小不忍行動而愈失陛下則固執儻違於大孝愚臣不請先陷于不忠臣何心顏敢安視息是以不勝慺慺崩迫之至謹詣朝堂固請以聞臣某等言臣聞君親之義臣子同極陛下至孝純深將固三年之典臣等盡忠懇到佇迴三舍之暉是則陛下違先后之遺命臣等忤聖人之嚴旨違命幾於過戚不可以稱孝忤旨嫌於必諍不可以稱忠所以莫顧犯鱗共甘碎首臣等中謝臣又聞之王者代天理物為天所子循至公以臨大寶非獨善以崇小節由是漢之國章始從權之變禮晉之廷議故屈已以因除擁萬乘之尊有萬機之政者示不得同於凡也前王著於不刊其來久矣四聖則常追遠俯而就之陛下罔極之思通喪是執所不忍言莫之省奏遂令霜露多變日月其除皆臣之至愚誠未感聖天意若曰助陛下以非常之功人謀協從尊陛下以非常之號者欲陛下司龍紀受龍圖祗介祉而建皇極擁神休而奉清廟者也故天有景貺不可拒者審矣國有茂典不可廢者明矣鐘鼓不擊不足以旅庭冕旒不施不足以端扆未有膺其冊缺其儀乎臣等茫然悉未能喻況哀戚有制故非同日變通適道甫及載朞誠宜奪因心之慕稽順時之請當建鴻名以承上帝則所直者大所枉者小罔不格于上下通于神祇晞太陽之光曜乘和氣之充塞伏願陛下全之臣等昧死以聞期於必遂臣某等言臣等伏見有司撰既葬反虞之禮陛下當以今月二十七日公除卒哭聖情感慕所未忍言衆慮焦惶罔知攸寘中謝臣等謹按晉書杜預議畧曰天子之位至尊萬機之政至大㣥臣之衆至廣不得同於凡人故大行既葬祔祭於廟則因而除之不除㣥臣莫敢故屈已而除之天下之人皆曰我王仁也我王孝也此乃聖制移風易俗之本於是盧欽魏舒等從其奏議莫不厭服臣等歷選列辟頗徵前史王者為天所子受天明命代天育物先天弗違居大寶之位行至公之道故㳂革而致理變通以成政況先后之末顧聖朝之舊式冊備矣方垂無窮君親臨之寧受非禮而陛下愈遲之痛孝思罔極履曾參之小節遺漢文之故事闕十七字貫於神明粵自開闢天子之德未有如睿宗孝之純深也至使慶雲湧浪井出嘉木連理神芝三秀葢其效歟要不可以情過哀而所枉斯大矣臣又聞七月而葬既葬縗除其月而虞既虞吉祭為之降殺用斷喪服示不得踰之今合於山陵祔於宗廟詢之典訓嘗有稽矣而終不師古始不易月考之事宜又無謂矣舉而書此將何以法陛下昧旦聽朝戚容深視庶官所以環拱近臣莫之利見戴九天之仁覆渴十景之清光禺然之情葢未能諭且追遠興感君子有終身之憂以權制服聖人思屈已之重何必三年之禮稱為百行之端若天無卑聽固違於獻款臣敢先除今附于不義豈司牧黎獻作人父母之意乎伏惟陛下可㣥臣之奏順剛日之請去獨行以致美闡大猷以光濟勿使鴻生鉅儒廢書而鬱悒下學上達草議以屏營臣等至懷期必俯就則凡在動植無任悲幸謹昧死詣朝堂拜表以聞臣某言伏奉制書以臣為尚書左僕射餘如故祗陳惶悸罔知攸處臣中謝臣始孩而孤不承義方之訓及壯思勉又乏殊異之才幸以高曾緒業妄膺俊造州郡徒勞豈議聞達陛下昔居邸第臣得謬連牧馬曳裾之末忽焉三載遺簪之舊親奉六飛攀鱗而踐臺閣撫翼而登霄漢皆聖主造物之恩成小臣飾躬之漸雖出入升降數十年閒紆青拖紫復何功業大行皇帝不以非才擢登近侍貂蟬始拜居守三秦輿駕來旋俯移數月以臣愚直不任政事猶假位選曹留臺洛邑去歲秋暮復叨端揆臣往以謀猷缺如尋而年病相追每經陳乞未賜哀矜屬升遐之際變起倉卒受遺顧託形於制旨臣雖獨拒邪謀莫能死全忠烈則臣之為咎已無所逃豈謂卑聽廼誠曲蒙昭奬非臣微命能荅鴻鈞自光華在辰睿聖登極四罪皆服百工咸事尚書萬機之會僕射庶寮之長正宜明德茂才彌綸經濟豈使妨賢敗政自左而右陛下以維新之業始邀於卜夢而念舊之私尚任於疲老臣知不可議者伊何安敢上累明時下塵良吏伏乞憫臣有涯之忝越然後選衆而舉得人為盛非惟微物覽分固亦朝廷益光無任慙荷屏營之至謹奉表陳讓以聞臣所讓人別狀封進臣某言伏奉制書以臣守侍中散官勳封如故仍西京留守恩隆霄極澤深雲路內省諸已不知所裁臣中謝臣實小人偶識常分志學頗慚於先構致身匪期於遠達將五十年自微而著葢妄庸者何幸而升頃主禁令於管轄臣歷踐而不能肅事訓黎人於五教臣謬遷而不能揚職公私愧靦夙夜憂惶豈悟微物更蒙殊造臣中謝且常伯納言其來自古切問近對敦密於茲王命惟允宰臣之任政刑所繫理亂攸在臣恭聞典謨遠觀載籍得其人則有鹽梅之寄矣失其人則有鐘鼓之妖矣況臣淺陋加以衰疾便欲左貂右蟬負璽陪乘頡頏清禁光耀紫極臣知不可何止流議遂使臣比肩風力接武元凱正恐國家疑事非宿儒莫辯以經術朝廷大體非故實莫稽於政要獻忠納規力不足者負乘致寇誠所宜然官謗已招身尤何塞又秦中帝里天府之奧俞往重寄於臣復忝寧有拜則侍中遠慙於軒歷居同相國多謝於漢圖以臣兼之胡顏而處伏惟應天皇帝陛下中興景運大造㣥物恩周動植故惕慮以求衣化穆彞倫豈非材而補衮伏乞矜臣由衷之請覽臣自卜之祈更擇俊賢曲垂照亮維鵜之作不列於詩人振鷺之儀載揚於史筆臣所以敢守難奪期於必行無任慙懼悚戴之極謹詣朝堂奉表陳讓其所讓人別狀封進臣晙言伏奉制書以臣為兵部尚書同中書門下三品制命先臨魂守飛越臣中謝臣素以凡薄何階遠大明經試史多從州縣之榮陳力就列豈望雲霄之舉爰辱皇揆屢叨宸渥出則雄藩重鎮仗鉞臨戎入則副相常伯彯纓旅位負乘致寇福過生災昔忝今職將貽法罪矜臣愚者聖慈宥臣直者天斷曾莫報効仍紆寵光吏部升冢宰之司并州尹興王之邑臣每自料竊不遑寧豈悟衡軸之委韜鈐之要無通知四夷之畧乏決勝千里之才使臣為之非敢矯飾缺邦家之望則物誰謂宜塵日月之明則臣何以處伏乞察臣自卜之審憫臣由衷之訴更選㣥賢以乂成績庶使朝端不虛授天下知至公臣罄露懇誠期於必遂謹詣朝堂奉表以聞臣某言伏奉制書以臣為太常卿兼檢校左羽林將軍虔奉恩命罔寘心顏臣某中謝臣託蔭宸極分暉景緯從學多滯不足對於三雍為文益踈不足齊於七步日者自天有命裂地而封盛亨岐之井邑比從梁之驂駕旋省慙惶益增忝越不悟前榮始拜後寵仍加且彞倫攸敘百官所以象物方策不墜二柄所以濟時苟非其才將汨于政況上卿之任中尉之重自非膠庠告老桓榮列於東面藩邸求舊宋昌總於北軍臣何妄庸兼此叨竊伏惟皇帝陛下夙祗圖錄光宅區㝢凡厥在位喜聖朝之得人獨此曠官塵睿鑒之知子將何以典司禮樂綜理韜鈐伏乞太陽迴光慶雲灑澤俯察蒙鄙旁求賢俊則冀受授無失謀謨有倫無任下情愧悚之至謹詣朝堂奉表陳乞以聞草土臣某言伏奉恩旨授臣銀青光祿大夫起復行尚書工部侍郎勳封如故制書俯臨荒怖殞絕臣某中謝臣私門不造殃罰所鍾遂延先臣永辭聖代陛下飾終念舊事光前典臣孝誠微薄不自滅身幸忝大臣之允假存主祀追惟慈父之恩不可復得痛殷創鉅豈冀生全臣心欲言言不忍喻陛下孝理天下俊乂在官恤臣遺孤加臣寵命非臣舉族少能謝天誠以吉凶典禮朝廷大政喪親執喪人倫為極使臣廢禮於心極冒榮於喪紀虧紊過甚將焉用之況其不任孰可陳力抱釁窮懇理殊他人匪直悲深名教實亦感增存沒煢煢昧死罔知所裁伏乞聖恩垂寢嚴命無任荒迫之至謹詣朝堂路左奉表陳乞以聞臣某言伏見今月朔旦太陽虧陛下啟輟朝之典有司尊伐社之義臣等伏自尋繹無任惴恐臣某中謝臣聞官或迷象必犯先王之誅辰弗次舍必貽上公之責此乃邦有常刑聖有明訓頃者論道任重衮章猶缺端揆位隆鼎台是亞所以熙帝之載代天之工調六氣之和法三光之度則大化為本非小才所宜崇替率由咎徵斯屬伏惟應天神龍皇帝陛下光被四海對越二儀人祇宅心俊賢翹首但置之左右以為輔弼自忠言啟沃功臣保乂用作霖雨格于皇天臣何人斯而敢叨擬議臣等智能素薄經術殊陋望不過於掾史名不達於州閭徒以遭逢盛明頗皆履歷參廟堂之機密為宗族之光寵者十數年於今矣忠肅恭懿遠謝八元之名進善退惡近慙二君之美陳平有言常則不稱賈詡延誚居然巳得光陰久馳年禮俱逮自應屏黜以清彞序而徘徊聖恩萬一希效僶俛殘歲甲子空多遂超總領之司愈失具瞻之望將何以匡翼庶政儀刑師屬且視事而老才愧千秋之賢待罪安歸憂深萬石之裔久知塵穢寧虞負乘所以素餐加責聚諠於下薄蝕生災見昭於上天之所戒臣不可逃陛下矜而宥之未致於理伏乞收其印綬賜以骸骨則知胡廣罷位抑有前聞徐防免官復自茲始臣竊其幸物誰不宜懇到所祈惶怖交集無任迫切之至臣某言伏奉制書加臣為銀青光祿大夫餘如故寵榮俯臨惶怖交集臣某中謝臣爰自弱齡素無遠操僶俛職事豈期聞達二朝揚歷數載塵冒以茲過聽皆是曠官內省寂寥長懷愧負陛下聖明御極多士如林不以臣不材擢升宰輔每侍帷幄未能招宣景化頃司衡鏡未能澄汰流品若臣之咎將何以逃又擢臣於循良之末賞臣於廉問之閒遂出常規猥班休命臣之涯分頓為忝越比者應踐榮秩各限格文欲使無相奪倫較若畫一臣課効多闕勤勞未著爰屬首秋尚居五品名聞之始階方泛及格根之內考復相懸臣何人斯忽當今授臣縱不能鎮靜流弊安敢不罄其愚直首虧不刊之典坐取非據之榮進退失圖心顏何寘況國之程式示於天下凡有虧紊過在大臣臣自違之復將焉用臣年未知命識非半古旋叨厚祿仍受隆寄求國章其巳默顧身尤而必然聖朝有刺於在梁微臣生灾於瞰室豈惟簪紱之恥抑亦邦家之羞伏乞天恩曲流成貸矜其至懇知匪飾詞反汗收綸亦臣之幸臣無任切迫之至臣某言伏奉今月二十四日勅以臣弟左司郎中臣詵為給事中嘉命猥臻惶怖相視榮以為慼茫然失圖臣某中謝臣兄弟數人獲承累代之庇自幼而長惟愚與直臣弟臣詵初一尉耳竊願從微守分豈思養拙邀榮而乾道曲臨一門特幸前恩罔謝後忝仍及生臣者父母寵臣者聖明非臣等隕首流腸少酬萬分之一臣某中謝臣自叨清切頗歷星霜乏鍾會五字之敏多王濛四年之任竟未能陳一策進一賢雕蟲粗辨其所為濡翼久知其非據下慙先臣戒盈之訓上負聖主則哲之明常甘屏黜以待髦俊豈悟臣詵復私成造比臣則行有餘力選衆則曾無足言遂使聯事掖垣同趨階陛或紊公式必招私議臣知不可物謂臣何安有兄弟妄庸並居東西要近臣懷靦愧非敢身謀事或乖違實塵皇揆伏乞詳臣自卜之審察臣由衷之請臣弟詵殊榮既拜奉綸紱而難迴臣頲薄技何成顧瓶筲而易竭指於十手臣假遑寧不如一腋臣將焉用所冀移臣職守允臣陳乞抑朝章之是穆匪等列之攸宜慺慺款誠昧死期達無任悚荷屏營之至謹詣肅章門外奉表以聞又臣先臣某往忠社稷陛下特賜茅土遂臣所讓因授臣第四弟乂右補闕亦希別從選序不敢同在近侍臣之感恩不識為喻輕黷旒冕懼深冰谷臣某言伏奉今月日恩制除臣兄某太常丞跪發詔書光駭閭里寵盈益懼喜極而悲闔門感恩垂淚相賀中謝臣自登兩府倏至三旬天地之閒未裨塵露雲雨之施已遍公私撫心載驚顧影增惕伏以臣兄列官清憲專於察視臣又承弼皇樞課其條職苟綱紀責在準繩所以請移別官冀循常序聖慈曲被命數有加獲陪卿士之行更列大夫之後遇深賤質誠合懇辭恩及長兄不敢多讓誓將死節上荅生成云云臣某言臣伏奉今月十三日制鑾駕閏九月十日幸長安陛下東封禮還西賓係望喁喁品物不獨耆老屬黃壤年豐翠華時邁制書爰降懇願咸達相聚忻躍不知所裁跡諠路衢聲溢歌頌若臣者奉辭軒屋縈疾鎬京常恐先犬馬填溝壑朝聞既獲瞑目猶生臣某誠歡誠喜頓首頓首死罪死罪臣彌曠旬深官曹事缺乞解見職罄陳前表又伏奉今月五日勅以留司務閑不妨醫療所請辭官不須者臣志不動天身何容地周章慙悸惶駭戰慄退則恩被羽翼德均造化臣之不敢止也進則匍匐罕遂支羸籋然臣之不能任也臣所進退失守涕洟嗚咽宜其重請骸骨豈可虛榮省署竊以鴻私俾療成貸特矜日夜翹清蹕之途炎涼近素秋之節臣希眇視跛履手之足之覬憑渥以還魂輒延慈而待罪不勝悚躍怖懼之切謹附起居使朝議郎右補闕內供奉臣李鄰奉表以聞臣無任云云臣某言奉辭闕庭馳詣州府以某月日上訖臣某中謝臣稟識愚妄受恩忝越十有四年中書省三命承明廬臣竊比方倍逾於是特編皇揆不以人進久於近密衆莫過臣厚施如邱山微功䍐絲髮遂叨宰弼莫允瞻望心慮何補血誠徒勤陛下深慈矜愚至德念舊以臣頗習儒訓更超宗伯臣益用慙負匪遑厎寧豈悟西南重鎮巴蜀奧壤爰雜縣道且聯軍戎付臣兼之才實不逮審自能省亟經聞徹誠謂憑威可盡力諭指期致命臣敢辭事誰云効忠及當官而行臨事益懼者竟乏邊鄙之算倘貽朝廷之辱其於靜人蠲役懲吏抑強惟國之政庶臣能勉流波出浦而嗚咽元鷰辭巢而顧慕況若臣者最蒙聖渥雲山萬里霄漢獨遠闕二字載惕拜章失圖無任云云臣頲言臣學不淵博詞葢實滯陛下過聽被恩最久喜規封岱增天帝王壯觀臣以宗伯秩禮陪清道之輿臣之幸一也又伏覩自天垂象銘岳昭訓臣以有司上載封禪之烈臣之幸二也臣再三之幸萬百常情臣某中謝臣東京奉旨竊聞刻石三頌臣草一敷聖主之元猷次紀宰臣之鴻筆斯事至大咎繇吉甫之難也臣自料度不勝惶悚而議者謂臣光榮之至死且不朽臣所羸疾翳然言罕能述忠闕二字愚臣極思慮罄肝膽而為之伏希演脩德之符非敢助親文之化儻以潤色鴻業一蒙睿覽則臣之至懇萬殞知歸輕塵冕旒若寘冰谷無任區區戰灼之至臣某言伏承某日制以吐蕃侵軼邊隅陛下欲觀總元戎出征秦隴蠢彼羌髳敢為叛渙王赫斯怒整旅龔行實陛下雄畧英威愛人活國之長策也臣聞北狄西戎自古而有雖夏殷之強軒農之盛未息其患也書稱蠻夷猾夏詩著獫狁孔熾未損東漸西被之化帝王馳驟之迹則有南仲出車吉甫維憲縱侵鎬及岐密邇畿甸未聞親征之義及乎漢代則烽火至於甘泉朝那喪其都尉亦止屯兵細柳天子但安於上京何者戎狄荒服忽慌之義也來則拒之去則勿逐以禽獸處之以羇縻御之比諸校獵羽毛不入於服用體肉不登於郊廟則王者不射故知千鈞之孥不為鼷鼠發機也況萬乘之重而與犬羊角勝哉誠勝之不武不足以勞也且陛下有高行者甚衆焚珠翠放鷹狗出宮女納直言為百姓請命故關中豐稔則知皇天所睠通夫至誠今闕小寇難將不久陛下勤脩德音日慎一日當自消弭也且兵法有先聲後實陛下但發親征之令以旨遠而潛遣猛將謀畧之士以濟其師則戎人日便崩挫也岐隴粗熟凋弊積年千乘萬騎往還儲峙恐外有寇虞內興徭沒人不堪命一也又戎虜之性倏來忽往敗不羞走勝不成師若大軍臨邊尋已鳥散則屢出多方我受其誤二也況太上皇萬福鍾愛實深陛下將對寇場必勞憂慮非唯問安頗缺亦恐御膳有違則陛下烝烝之思何以自得三也臣故曰擇將嚴邊旰食脩德為良算也臣愚不識忌諱惟陛下裁擇一昨欲幸蒲州及長春宮臣等以人勞未復不足輕擾輒進狂瞽遂天心下制賢諫臣之奏恤農人之業因而賜停遐邇並知陛下從諫如流之美今月日未久勞役倍前斷可知矣陛下若哀此疲人頓茲戎輅則天下幸甚昔蒯城侯泣諫漢祖曰主上常自苦豈無人使漢祖以為愛我良史書為美談今朝廷將相之衆豈無與陛下盡力哉何勞聖躬之遽行也臣等不勝慺慺之誠謹表以聞臣某言皇情愍彼邊甿忿茲兇醜必親弔伐臣聞天子之怒伏屍百萬流血千里若吐蕃者鼠竊豕食猶魚躍釜中耳又何足以當陛下之怒哉臣愚竊以不可何也頻歲以來百姓不足岐隴河渭動無儲廩今大駕遄征供置倉卒若緩之以法必乏我軍興急之以刑則人無所措此時不可也乘邊將士或交鋒刃飛書告捷首尾繼來料賊之勢不復支久陛下若輕車電發則虧持重之慮如按部徐行又非赴敵之義此勢不可也葢稱王者之師有征無戰謂蕃貢有闕王命征之於是乎理兵其郊獲辭而止非謂擐甲臨軍敵人畏之莫敢戰也是以古者聖帝明王無親將也云黃帝五十三戰者即締構草昧非太平之本也故自阪泉之後修身養德與七聖游於具茨三月齊而訪道今陛下鳳翔藩邸龍躍御天不日而再造乾坤一呼而撥定禍亂是則聖過黃帝而經綸之業備矣故當高居深視制禮作樂禪梁甫登崆峒雅歌從容為後王法閫外之事屬諸將軍何至厭玉輦甘金革邀功馬上為一人之敵也今吐蕃遣偏裨小醜干犯大國我軍未捷而恥巳深而陛下又將屈至尊遠為之敵使攻無不勝戰無不克猶未足以誇四夷適足以驕敵人羞天下也又扈從之人半非鬬士使給往來日費千金與其傾耗資儲孰若回募驍健重賞之下必有勇夫以敢死之師當疲老之寇若排山壓卵何必勞聖躬哉況事有不可輕敵有不可小者昔周師困於祝聃漢祖厄於平城安可謂吐蕃無祝聃耶河右無平城耶千金之子坐不垂堂聖人終日不離輜重不可忽也臣又聞吐蕃之入也惟走耳乚羊馬不至殺掠於人但剝體取衣此窮寇耳又數道俱進按隊徐行者若有所望恐連謀北狄陛下如必親戎邁於岐隴脫幽并警候靈夏馳烽突厥之騎南侵猶如吐蕃之勢長安百姓驚擾太上皇帝豈不憂勞陛下以三賊憑陵誰者先擊豈可挂西軍之衆分禦北胡野次之閒遙謀廟堂不戰之策帝城空虛衆亦何仰臣固曰居中制勝為防萌杜漸之上畧也今但發近縣之兵擇良能之將重為之募嚴為之約其敗衂失律者巳加必罰之誅矣其勇敢殺敵者亦願加信賞之勸焉兼購賊中有能斬酋帥以下歸降者及邊軍之士俘馘醜虜者並厚為賞格以班之我軍必大振矣彼賊聞之自解而去也又承萬騎官者數千其受國恩亦已多矣並習練梟雄遠近所憚陛下若拔為將帥或備軍行勒以從征足可威賊也又數十年來人之多幸乃有全軀保妻子之臣親戚貪佞之輩並人厭階勳家盈封爵乃至紫衣塞路朱服滿朝皆能侵國害人未見尺功寸効自陛下欲櫛風沐雨親冒邊塵不聞獻一奇輸一策主憂臣辱請代此行而但糜府庫之財殫征稅之奉嗚呼此所謂六蝎五蠹者是也臣所以痛心椎膺而為陛下言之耳何不宂食重祿之夫權令禦寇此但惜身自當為國而容養蠹蝎輕勞聖躬賈誼所以長歎息繼之慟哭為此也昔楚漢相持楚強而漢弱漢祖猶曰使刑徒擊公吾不能鬬力也區區之時猶能如此況今四海之內皆為臣妾普天之下莫非王土而蕞爾一寇如一蚊之附九牛陛下便欲降萬乘之尊親銜橛之變輕其帝重逸此庸臣臣竊為陛下不取也夫三皇善用仁聖五帝善用智勇陛下當三五之運而捨其所長非英武之稱也議者或謂陛下前欲征匈奴制行而止今必須一出示信萬人此大謬也夫兵者以正合以奇勝故不厭詐而尚以權今以陛下英雄之資發親征之令敵聞而懼我勢已張更練熊羆推轂將帥見可而進騁變如神適謂幽遠而難知河漢而不測人是以服信是以孚夫何疑也今夫頓岐隴之外擾疲弊之人率徵之兵不過數萬阻饑積歲師不宿飽州縣急於供費力不足以救邊軍容制于部伍勢不足以赴敵脫胡騎紛擾京城空虛人情易動難安不可不慮也如太上皇暫勤旰食是陛下以天下之大不能安其親也惟陛下圖之今卜征有期不可頓止但更延發日示擇良辰以候西軍動靜以為長策臣愚所陳衆計亦願陛下擇善而從之臣聞資父事君惟忠與孝況臣職參衮闕逾念讜言苟益涓塵死而無悔昨四日已於閤門封進一表恐未周覽今復盡愚非敢阻於成規實願廣於天聽輕言時政伏待刑辟
