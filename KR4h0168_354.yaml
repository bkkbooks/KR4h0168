front:
  text: 全唐文欽定全唐文卷三百五十四昱楊國忠之黨國忠領山南西道採訪處置使開幕府引以自佐又用為御史督屯戍後官中書舍人元宗西幸國忠既誅昱亦為亂兵所殺
  hash: sha256:5933d016c1fe322f951e7e026df2b3d548216d333ca9daa783c145e7ed9547f2
