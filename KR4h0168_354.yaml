body:
  text: 夕望兮見碧雲之出岑過太液拂上林配藜四施掩映千尋混蒼蒼之正色垂漠漠之輕陰西陸月弦南山風落輕濃象似倏忽龍蠖集高議之臺連寓直之閣亭亭廣陌異公子之飛蓋裔裔長空如美人之卷幕遂能不遠仙宅來遊帝鄉無心而生自浮洛以徼瑞感化而動乃干呂而呈祥同君子之出處均至人之行藏故吾儕從政之暇觀此而一詠一觴已乎已乎余未始兮可量者也考藝尚實進賢受賞必久於其道乃不失其人甲也齒鄉職於汲引觀其所與以德行為先察其所安則文理為後縱舉不失選僉曰能賢猶同三年乃賓以旌五物無爽筐篚以將其意笙歌以勸其從儒者為榮詞宗立志始於司徒授法終以大夫獻書俊寵於君舊史每令於續食成賦於國前王肇俾於計偕將慎薦延之儀遂下崆峒之拜登於天府二於史職當由致事之歲則匪掄才之時卿則守官諒不愆於侯度臺因懵理頗有乖於紀律有詞不伐無可聽涓天寶中闕一字南道觀察使江陵郡古紀城東有紫氣成雲中有一人衣白衣乘雲氣向上其時安南招討使康令謙及同行軍將等同見臣謹畫圖奉獻伏望宣示中外編諸史冊光義開元中郴州博士大唐開元十二年冬十月刺史趙珵奏割郴縣北之二千室置安陵焉因其江以名縣越十三年秋七月敕乃可其奏若乃考傳驗圖辨方經野天文當翼軫之分地理在衡疑之西禹貢別於荊州此其南郡項王封於義帝闕二字上游代歷北朝年逾千祀自楚都而析壤時有貿遷因桂水而為名不恆其闕八字皇運勃興造有區夏大司徒所以知土地職方氏所以掌封畿萬物由庚而得宜㣥靈仰闕八字元澤既漫蒼生阜成此邦之人既庶而富下邑頗逾於四甸屬城或過於百里故可分其域而辨其官施其職而平其政朝議大夫守別駕上柱國崔公無詖博陵人也伯夷典禮尚父專征遷汶陽之兩派分祕書之闕二字光赫丕業啓迪後人荷清茂之闕一字孕文明之秀宏中律度博藝周求禮樂以由其躬忠信以開於物承渙汗馭屏星州將出師任歸別乘而吳輕楚險慓悍其風侮吏強宗舛悖於理浮食而田疇自蕪末遊而庠孰輟業公覽其頽弊永歎良圖正其法以肅違清其身而勵下若到家戶翕從威令自整綱目三年于茲由闕一字之教確乎無拔明科禁而姦盜不興陳藝極而程課斯辨誠德既敷刑章具舉然後宏恤隱示軌儀道變齊魯人知俎豆其施化闕二字仁而恕其闕六字風闕二字於路衢義讓行於隴畝雖居刺史之半己專邦國之功恭惟睿謨首闕一字興建判官闕十二字奉古殷墟誕裔那處遷苗鑠前代之風森殊向之節資忠履義學禮聞詩栖枳棘以仍留刷闕一字風而未遠從事不撓當官而行澄止水而逾清稟西霜而自肅昔晉陽為禮厥趾攸高手足貽闕二字延於化族國家既旌善之貸削闕一字之思井闕一字若闕一字孰副天獎任其穀貨我則司存賢謂功曹猶當議事乃從闕一字履郊甸闕一字險難闕一字京陵鳩發闕十字而考据爰得茲山是稱爽塏自初闕一字他所義於闕三十字地亦無餘信合闕四字關於思慮挾闕三字仍因闕五十字經始模制闕一字出于二公而費量庀材闕一字令南平縣丞向激闕十五字奧聞緑竹之詩産靈無泯賢材經世濫闕五字途鬱遙俟三年之舉從闕二十五字校功徒於闕二字悅以忘勞人多競勸陳版築闕二十一字相望氣雄南極勢闕三字於是立社稷置膠庠令其盡神教以從學建倉廩闕二字交易有無廨宇星羅以碁布衢街闕一字平而闕二字其川陸襟帶南馳北走旌引炎徼連彼洞庭兼其閭閈之衆積以膏腴之壤萬類所産寧獨齊都四姓名家豈惟吳國信一湘之中一邑之湊也先是豹江之北羊山之西鄰莫聞於協比疆屢移於彼此及創斯邑方掩闕二字宜都之峯無化督郵之石知遠前梧州戎域縣令王思謹吉州永新縣令曹節封州開建縣尉趙辨令録事李遂良與曹祐等並權幹楩楠曜闕一字江鬱舒逸翮於區外薄浩氣於湘江或相如罷歸舊是文園之令或符融未達且歷都官之曹相與聚族而謀曰昔此未縣同夫野廬首闕一字崔公草創之闕五字為理衆務咸熙惠恤優暢規模宏遠輶軒升聞驟徹於上積翰所高闕十字圖其法述作者所以著其言豈名冠曩蹤業高前代使千載之下所述無聞故託於石時縣丞文林郎鄭侯闕一字尉文林郎段元績倉曹許闕一字開元十五年歲在丁卯七月辛未朔九日已卯豎此郴州安陵縣石記左傳載凡蔣邢茅胙祭周公之允則蔣氏系業可知封土期思為漢東之國後以吞削楚實盡之而子孫散於郡縣苗裔守業重侯纍相有若來葉到弋陽之徙大族致杜陵之遷則亦龜組聯徽熊轓並拜逮我高祖詡之臨亠兊州也屬王莽秉政歸臥長安唯行三徑老而不起曾祖助會稽太守祖冕司徒公或良二千石或敬敷五教並立名當代垂裕後昆父橫大將軍浚遒侯服大勛於王室遭遇讒慝功業不遂所生九子悉從降徙公即大將軍之第九子也諱澄字少朗貽慶丕構降生靈哲懷忠國之志立全家之蹤雖滅跡江湖而克雪冤恥大將軍初遘禍薨也為司隸羌路所譖延以非罪泣血枕戈誓將讐復時童謠曰君用讒慝忠烈是殛鬼怨神怒妖氣充塞帝以覺悟覆羌路之族焉諸子各於所居之處受封故以凵了亭鄉侯遂家於此其必復也自憑於我裔其大門也不待於他宗洎三方鼎分楚材晉用各為佐命位在訏謨所以降延代之休所以垂不朽之稱由是體江山之便圖土物之宜有泰伯克讓之風有延陵退耕之地其俗質其氣和吾何以增之乃崇墉築室於周山之陽將老於此馮巖阜之固無郛郭之勞就土壤以為高因泉源而養正芝朮未效形解告薨享年七十有一與夫人司馬氏葬於封內之都山順也公所懷罔極以逮形消取彼讒人感於天罰孝者德之本又何加焉用心惟微允報㣥藝立身之道適意為先故留名道學傳存其事也故城舊廟猶遵餘祀嗣子丹陽太守休襲凵了亭鄉侯可謂公孫之子有後於魯敬仲之裔復為正卿乎我族之熾有如斯也及將軍元遜列於陳史尚書孝儼見於實録無遺德矣司農岑之盡力王室克著休勳遭彼敗言遠從播黜雖清明昭洗而舊位不躋以誣盛德豈其若是凵了亭竄跡之初也非求形勝取致蕃陽後以就封始有茲所今之後嗣夾湖千室秀異於是乎出禮樂於是乎生節義成風而衣冠繼武雖克修代德乃謀孫之貽亦地産惟靈天其與善矣裔孫監察御史朝即司農第三子所志之心厝懷自遠痛夫艱難在目邱隴云平茫茫之迹永迷承奉之地纍纍之墓莫辨薪芻之所故以聚宗黨飾餘蹤刻珉石示來裔大雅云無念爾祖聿修厥德不然子孫何以知之文曰爰分我祖始自凵了亭瞻望代祀倏忽千齡山門失記荒隧沈銘裔孫陟難今來一經用建碑碣載飾松坰其庶幾乎昭明之跡古而彌清令聞之響幽而重聆吁嗟兮壟樹永兮青青懷光開元時人唐開元十五年單閼歲純陽月再旬有三日辛卯常州江陰縣通元觀道士繆行崇等煉衆寶以成神鐘其火朵盤龍掘千鈞而駐迥花開明月銜五音而照空威警三天聲搏八極員淵偶韻夜息焚燒紫府聆音晝飛真氣鴻因嚴備乃記銘云元元聖衆鍊珍精鑄出神鐘響玉京香臺曙擊蓮花月華虡宵懸福德聲音飛碧落回真駕韻度蓬萊噴水鯨恆沙道力無時盡永吟仙府警㣥生嘉會開元十五年太常博士准月令及九月令農功畢大享五帝於明堂貞觀及神龍皆於南郊報祭中間寢廢有虧祀典准孝經宗祀文王於明堂以配上帝請每年九月於南郊雩壇行享禮以睿宗皇帝配從敬開元末官司勳員外郎門下朝請大夫守給事中李彭年等器業宏深風規㯋秀士林楨幹文苑英髦並綜核前言間習政事瑣闈駮正既稱詳密畫省彌綸允推精練俾遷掌於綸綍咸列侍於軒墀可依前件敕宣議郎行大理評事攝監察御史河西節度採訪處置使判官陳山慶植性方雅從事公勤評刑有欽恤之名攝職著軍州之效任惟執憲寄以佐邊此焉擇才佇聞成績可監察御史括字叔弓河中河東人鄉貢進士又應制登科再遷右拾遺內供奉出為果州同州刺史纍遷御史大夫大歷六年卒太古之氣是生兩儀浩然莫測淵乎勿為雖混沌之已判尚冥蒙而未知既不辨其兩偶孰能察其三奇爰有皇聖其惟伏羲索四營之妙理究三才之大規乃畫八卦以窮萬象神可以測來智可以藏往辨庶品於奇功握㣥形於指掌使六位之恆存乃百王之是仰故乾以至健坤以利貞含千變之象類萬物之情起潛龍以設位立牝馬而開名為大易之門戶極天下之至精離以象日巽以為風既明照於天下復扇動於虛空凡有象而皆見無幽而不通誠自然之妙理亦變化之神功爾其震位生木坎方生水擢修木於千尋汨長波於萬里和衆籟而成響寫㣥峯而倒峙則有兌取於金艮乃為止既兼山而立卦亦麗澤而成軌表三索於永終瞻萬物於資始莫究其探賾之妙虛測其精微之理物欲象而斯來窮則變而無已信可決疑辨誤訓人軌物必定志以先占乃端蓍而後揲以通其變使人不倦賢哲好之以洗心愚夫覩之以革面則知卦之為道其亦至微妙不可測理不可違既設爻以盡數亦觀象而知幾天地由其開闢陰陽由其發揮總百慮而一致混殊途而同歸謹案此文一作周存作神蓍之用兮誠稟靈於自然惟神也適變之義至惟用也極數之理全鉤深孰云乎筮短藏密彌彰於德圓再三則蒙捨我而懼瀆五十以學由我而樂天揲之而雖隱必索保之而其靜愈專易之重者胡可比焉原夫質稟精純叢分薆薱覆青雲以表奇伏元龜而克配佐爾筮之貞吉觀我生之進退知微知章而可期何思何慮而或昧於是命彼筮人擇乎上春韞之而必致其用揲之而爰動其神感以洗心遂通端策之志執之指掌空嗤握粟之倫禮事其儀易贊其妙探彼幽賾觀其祕要皆多假爾之能必叶窮神之照將欲觀貞諒無與京乾道變化而悟神明幽贊而生原始要終思盡性於大衍知來數往翼明彖於小成非我無以昭效法之道非我無以稽作易之情於以致百慮於以類萬物象四時四十九數而有常推三才三百六旬而不拂惟蓍之用惟神是聽運不窮而或變通其志而遂寧且提攜而成列有感應而協靈滋而後數布之而可辨生而成象審之而必形何一卉之時育配十朋之天縱恥紅蘭之見鋤鄙白茅之藉用則知夫蓍之可貴也庶類安能而共之哉夫何至德之極兮越五帝而作君羌柔遠以服外廓㝢縣而同文若乃寅奉上天疇咨亮采道備淳白朝無闕殆由是修樂以省風慮未善而將改高樓隱映廣場肅潔冠劍惟序奉天子之風儀笙鏞以和得先王之制節壽觴既已雅樂斯闋然後罷朝宴百僚與耆耋於是旁分美人下徹金奏玉勒齊習雕弓并彀鴻騫龍翥却濩略以驍騰左旋右抽突絢練而馳鬬沛艾多狀蹁蹮不歇香汗與桂條爭薰麗色比桃花競發應繁鼓以頓挫歷層臺而超越何登降之趫悍乍回旋以抑揚寶叉曜目羅衣沐香乍倏忽以變態亦終然而允臧徒觀其匪疾匪徐以舞以蹈旋中規而六轡沃若動合節而萬人鼓譟日既逮昏聖心攸憩斯帝皇所以因壯觀而戒逸遂居安而若厲豈淫樂以惑人見終朝於鄭衛大哉神武四三皇而作主赫矣勳華一六合而為家莫不北荒於窮髮西極於流沙故得殊方效祥則黃銀紫玉禁苑呈瑞則芝草仙花彼成康與文景又安足以道邪美夫一人有作庶品咸若以為不壯不麗無以彰至尊是以上棟下宇將以信景鑠於是建百堵之崇墉起九重之層閣上鬱律兮中窈窕靈煌煌兮神漠漠形直舉而孤標勢將飛而不却俯蘭叢之長坂對旗亭之延郭鑾輿屢降豈寫望於桂巖金榜遄開遂興名於花萼懿哉鴻紛以光寵夫何佳氣之蕭索洎夫冰開御溝春滿皇州青氣始霽旭日初浮皇帝乃被法服登茲樓羅綵仗駐鳴騶開繡戶之銀鎖卷珠簾之玉鉤冠蓋穆然而仰敬睟容端拱而倚旒將欲居北辰而觀萬國嚮南面而朝諸侯豈徒爰居爰處以遨以遊而已哉邈邈凌雲崇崇作固虹梁蟉而霞赩皓壁皛晃而月素亘以遐路近對東郭之門周以繚垣遙接上林之樹流雲衝牖而中斷飛鳥拂簷而斜度賁育之捷猶眙而不能躋揚馬之才斯侍從而為之賦若乃雷雨作解乾坤得一澤布三春歡逢五日陳簪笏之濟濟耀威儀之秩秩皇帝乃臻夫此樓也若其旁倚鳳城却瞻龍首帟幕夥以分布車徒紛以相輮奉常陳百戲之樂大官進千鍾之酒巍巍天子南面山壽德洽蒼生樂乎大有別有失路營營棲遲此情時哉未遇命也難并參歲賦兮徒延佇懷明君兮變芳序思入仕以盡忠悵良時而誰與儻仙郎之高鑒冀夫鵷鷺而為侶作之嘉量其義惟深嘉者以善為節量者用平其心窮微於子穀之數酌憲於黃鍾之音蓋取諸象爰範於金亦既成止其儀可覿堅外可程虛中受益功格於衡鏡實同乎圭錫以分多少寧患乎不均以立信仁抑行之無斁然美其方能立矩卑莫可踰出入罔吝包含式孚徇公滅私乃為而勿有納新吐故亦用當其無理將神而共契跡與道而相符且器守乎謙人惟厥操人非器罔主器非人奚導不謹則詐僞生端無方則羡溢為耗職是司者胡顏相冒由此言旃不其至然外乎則概庣斗乃旁穿既因物以進退亦與時而懋遷施於政而四方仰則毗乎理而百代猶傳誠可美而可尚願斯焉而取焉異乎大小區分高卑奇偶始增撮而就合卒聚升而成斗隨求而獲進獲退順動而何先何後洎乎職興都尉計起宏羊洽平糴而作典布均輸而有方常平由是以實大國因之用強豈比天有斗而酒漿不挹山有谷而牛馬空量然而當春秋分之期為晝夜至之時於以較矣於以用之實萬人之所欲敢望聞於有司明明國章禮樂其康掌在宗伯司乎太常所以納九土之器物崇百王之經教命伶倫使調準徵夔龍使典效於以遊止非禮不履於以觀焉惟樂之先去瀾漫之淫視詠清貞之雅篇是瞻是賞必誠必信遊方有日同季札之來觀入廟以時類孔宣之每問觀其有典有則為紀為綱土木異象金石殊光宮商節其聲韻絲竹分其短長錯龜龍以為飾會雲霞而作章垂鍾炫以清布農瑟穆以高張堂庭別懸置之次左右分文武之行節柷敔以鼓動流戛擊以抑揚遠而瞻則金石絲竹雜之而殊狀俯而察則東西南北懸之而異方乃既埏埴為之塤篪貌有古象制無新規其氣混其音吹此土之器也及夫汶陽之篠入用曲沃之匏見娛爰裁爰截為笙為竽其氣散其音吁此匏之器也收犬羊之皮取虎豹之鞹為鼗為路是模是度其氣勃其音博此革之器也嶧陽之桐孤生荊山之玉秀出是鍊是斫為琴為瑟其氣清其音密此木之器也皆能協六律暢八聲合天地交神明調風雨以順序布陰陽以元亨既粲然以盈目蓋難得而縷名且夫頌功乃作樂因樂乃造器樂盛而德崇器存而樂備樂為和物之所器乃積聲之地所以觀器者思述其由聽聲者願歌其事伊小人之不敏終援翰而翹思玉以至寶見珍斗以至平為器聚圭合而成量瑩瑜瑕以表義蘊石而山谷增輝握樞而春秋定位祕以重璞攻以他山中虛有待旁達無閒內倍殊璧外圓若環用之則稱物平施運之則含照自閒燕石既分楚圭未剝平準獻度良工就琢剡則為璋合而成瑴口應吐納柄隨把握有異擊刁漢營進綴趙幄議其遠邇曾是悠邈特達垂名切磋有成炯光月皎洞徹冰清揣摩律度比較權衡法帝車之杓如軒如輊較嘉量之趾不縮不盈至若劉項爭帝龍蛇起陸楚塞瞻烏秦原逐鹿羽輕灞上之敵漢厄鴻門之酷亞夫按劍張良獻玉雖碎斗以稜威終拔山而取辱比德者何邀功則多佩服惟允關石用和既執契而不遠諒求仁而靡他爾以至公秉彞我以不貪為寶扣之則清越流響祕之則含宏守道光照廡以如虹價連城而無考豈徒玉卮無當冰壺見杲而已是以在天成象在物可師立身而溫潤無匹應用而盈虛有時當為國器藏諸有司若暴新之所執吾何以則而象之閏正月旬有八日李崔二侯命余於邑之南㵎以求魚也洎至止人鮮力微網則虛設遂無所獲願莫我從且漁者卑事非其人猶不可力行特取豈容易哉因貽賦云南有㵎兮湜湜其流北有人兮溫溫寡侔涉春水兮以遨以遊羡嘉魚兮載沈載浮且人以功為志魚以水為利功高則其事易成水深則其魚易致況我網孔張我心匪臧網無及則魚以遐遁魚已遁而人猶未忘亦何異驅倚市者就戰俾善駕者持航雖終朝而筋骨之勞備盡徒悉力而尺寸之功不揚振振者李胡為乎至此平陸不可以行舟干將不可以補履歸止歸止振振者崔胡為乎忽來過屠之嚼何益臨川之羡空回歸哉歸哉蠢爾蠨蛸樂居間邃不資毛羽以為力不假暉光以為媚挺自然之巧蓄多端之思託玉堂以謀生當金窗而得地得地於中因而致功委曲面實回環接空踠長絲於柔指拖纎網於輕躬妙技將臨愛南軒之上月清心欲就愁北戶之生風始裔裔而將盡幾帛丿糸帛丿糸而不窮是經是構既勤既勗或連延於壁隅時蒙羃於楹曲雜花幌而左右交引緣錦屏而遠近相屬爾其軋軋務生運動多情窈窕前移有作調梭之勢逶迤下退無聞震躡之聲遠而瞻籠絡紛披如罾罟罘罳之結出迫而察嬋娟斐亹似綾紈綺縠之綴成至如河漢佳人濮陽美婦蜀江新製秦樓妙手將積功之多塗固仁智而同壽且驗以張弛效其縈紆疏而不漏細而勿逾貼飛花則亂錦霑皓露則垂珠彼蒼蠅兮則縈縈而見縶此粉蝶兮亦栩栩而就拘則知繫縲絏者信非其罪囚羑里者又匪其辜韓非所以飲恨伍子所以捐軀痛凝脂兮若爾祝一面而得乎雖復龍之神兮深其穴而自全隼之捷兮高其巢而取樂龍竟入於炮醢隼終嬰於弋繳彼守道者尚然況履危而可作既而倚伏無次職此之由應塞而止從波而流四皓可以投契五湖可以泛舟即松石之堪保奚名利之足求子徒羈牽於代網期遠害而能無少憂柔得乎剛則變化無方故能令老者以安分使衰者而再芳不然爻之均奚獨殊其棟撓木之衆奚獨舉其枯楊徒觀其枝葉滋潤色帶韶光發枯槁擢毫芒直幹森梢歘浮於青翠高柯偃蹇漸變於蒼黃豈比夫顛木貴枿王褱材稱良而已哉至如和風稍吹遲日久照淡清烟而羃歷合晚靄而凝耀苟非懷蠹狀雖死而猶生忽應鳴禽類先號而後笑是知心動於內氣變於形以類相感因時則冥或叢生落落或孤峙亭亭映平林而迥秀倚長空而半青爰有翰林墨客懿此惟新覩物生興與時為春在陽當榮於枯木理代實資於哲人遂稽大道將期小伸相長楊以體物希百中於茲辰東南一方淮海惟揚爰有喬木是名豫章根坎窞篲天綱鬱四氣煥三光矗縮雲聳離披翼張一擢而其秀㯋發七年而其材莫當懿夫倚荊衡連楚越回合湘沅之浦芬敷吳會之闕點彭蠡而烟垂汨滄浪而吹發清輝豔豔朝灑陽臺之雲翠影亭亭夕皓巫山之月爾其孤幹直指交莖亂傾紺葉煙緑朱華日明掩冥靈之光價奪若木之芳榮卉不暇植蔓不及縈總此衆美疇之與京其下則啼飛猱逐暴武突兀鹿麌爪牙鉤拏盤遊其下蓋難勝數其上則陸鴻漸谷鶯遷孔翠曳曳鸞鵠翩翩翼翳日聲聞天巢集其顛動盈百千嗟乎不囷不輪有典有則其蔭也廣其材也直空懷寶以自棄諒斤斧之未識日者龍宮是構鵲觀云修罄山材之木應榱桷之求何獨不見千金而留為媒紹也闕為出處也幽為爾不任大為賢而致尤今叢木之所忽吾亦為之心憂借如將趙括於上軍秩長卿於下令良驥為鹽車之伏谷松為山苗所映以曼倩而等侏儒尚俳優而輕雅正雖物情之共爾故君子之攸病向若廓君之林池充君之苑囿膏澤既沐鴻休亦覆門柳不可齊華庭梧不能獨秀已矣夫用之則哲抑之則沈隨取舍之攸措何棟梁之所任梓匠之瞻望靡及江潭之歲月空深誰當徙植天池畔終冀成君桃李陰廣都有建木焉大五千圍生不知始高八千尺仰不見顛過雷電遺雲烟倚白日摩青天靡蟠桃於度索之上毫若木於滄海之邊斯未足奇者天收寸雲日在午位明白宇宙光皎燭祕枝枝攢太虛外青葉葉積元氣閒翠無一點之影落之於地故自當玉京之要得天下之中左右仙翁前後玉童潤璚露飀祥風五雲翼之而斐亹八景含之而玲瓏帝或自天而降天寧假羽翼帝或自地而還地不乘虛空以我有飛陸之力以我有太階之功必我之由忽乎遂通如此見其真宰之意生巨材而不易上帝之心寄巨材而亦深不然奚至是哉俗人生代重謺詭譎其或不聞聞之或不信境之絶信之或不往往之或不到智之劣自非天付洞微神與明哲樹杳杳而何在身紛紛而已滅士有以廣都為帝王之宅以建木為台階之臣自謂未達仰慕斯人髣佛雲霄徘徊風塵若巨材之一見希謁帝之有因蔽芾珍樹森森綺堂庇根天壤擢秀春光雖違性於舊國終奉恩於此鄉違性何若主人有勿翦之怙奉恩何其主人有挈瓶之滋君既加我以惠好我亦報君以萎蕤弱其枝圓其葉亂階前之蓂莢跗緑縟萼䒠茸狀中浦之芙蓉既因其理又憐其美懷香則十步必聞含笑則千金可市有實雖漏於貢納有蔭足延乎憩止此木也誠則不材必姑樹其桃李究政化之所歸於蒲盧而可見負么䯢之異族能教誨而知變大鈞所播各異稟而殊方二氣相生遂改形而革面初其穿土取彼桑蟲負以蛸飛之勢置諸蝸舍之中以氣相感以類相通笑鄧攸之輩無兒絶其天性若何晏之為假子養在公宮薨薨鼓翅咽咽傳意本乃與吾同物孰云所畜非類如能肖貌便若假寐因蠕動而稍分與胎教而齊致蠆尾潛出蜂腰未備將革故而就新諒末同而本異嗟乎俱為化育別感生成已改其狀復移其情躡糞土而股戰弄清風而翅輕漸能羽化永別跂行具體皆遷雖似通於應變無心而守曾不知其改更連拳未己奮迅復止謂我自然莫知所以舉螳蜋之臂而動振莎雞之羽乃起化形如蝶既以忘於神遷委蛻若蟬信難窮於天理雖離本質亦匪殊姿遇穴入易逢花去遲見其類而却為非類遇其支而翻訝何支衆彙皆同昔不非兮今不是含生無別彼一時兮此一時然則聖人舉以立言指而垂教謂微蟲兮猶知適變矧伊人兮不能胥效於戲其形稍別其類靡他煦然而方隨氣母蠢爾而共稟天和吾徵夫蜾螺之與螟蛉也見品物而居多父子異論應對殊旨或有不敬必遺其責負劍者甲莫履乎禮爰辟咡而有詔宜掩口而斯答何乃良袂未引哆口斯張心尚滯於童蒙氣先加於長者侔之內則斯闕義方語彼過庭此迷禮訓或非為當仍訴何為駿馬雖死猶聞市骨秋蘭縱敗罔或損香詢訏乃甲名器無瑕稟諸葛之美秀幼敏足稱韞子然之材能早代何速惟良者守克尚於賢仰之彌高未經旌其閭巷思而不見聿將配乎縣社俾善政彰聞下人悅勸伊可韙也何其糾之宜高孔氏之言無取使司之見勞役異等廣狹殊制易固有數授惟從宜爾乙於何伊田是職衣夫襏襫徒思敏以四支闕彼萊蕪難望豐其五穀因而上請冀以曲從但務居塉之嫌莫原負郭之貴且一易再易禮誠舉以加饒近郊遠郊義或隨其衆寡枝辭不已甚所未然
