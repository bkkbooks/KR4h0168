front:
  text: 全唐文欽定全唐文卷五百六十一韓愈十五
  hash: sha256:4a8be4f2fe5dc6c8665a99606efd9edb4cb453b442a65e4dda0f1c5fc26094d2
body:
  text: 夫人之先出於周以鄭為氏因初侯曾祖諱隨祖諱玠厥考諱絳咸垂休歸於房宗生九子左右黍稷祠春秋道順德嚴顯且裕宜壽而富今何謬永貞冬至前四日寓殯墳此非其邱天以唐克肖其德聖子神孫繼繼承承於千萬年敬戒不怠全付所覆四海九州罔有內外悉主悉臣高祖太宗既除既治高宗中睿休養生息至於元宗受報收功極熾而豐物衆地大孽芽其間肅宗代宗德祖順考以勤以容大慝適去稂莠不薅相臣將臣文恬武嬉習熟見聞以為當然睿聖文武皇帝既受㣥臣朝乃考圖數貢曰嗚呼天既全付子有家今傳次在子子不能事事其何以見於郊廟㣥臣震懾奔走率職明年平夏又明年平蜀又明年平江東又明年平澤潞遂定易定致魏博貝衛澶相無不從志皇帝曰不可究武子其少息九年蔡將死蔡人立其子元濟以請不許遂燒舞陽犯葉襄城以動東都放兵四劫皇帝歷問於朝一二臣外皆曰蔡帥之不庭授於今五十年傳三姓四將其樹本堅兵利卒頑不與他等因撫而有順且無事大官臆決唱聲萬口和附并為一談牢不可破皇帝曰惟天惟祖宗所以付任豫者庶其在此豫何敢不力况一二臣同不為無助曰光顏汝為陳許帥維是河東魏博郃陽三軍之在行者汝皆將之曰重允汝故有河陽懷今益以汝維是朔方義成陝益鳳翔延慶七軍之在行者汝皆將之曰宏汝以卒萬二千屬而子公武往討之曰文通汝守壽維是宣武淮南宣歙浙西四軍之行於壽者汝皆將之曰道古汝其觀察鄂嶽曰訴汝帥唐鄧隨各以其兵進戰曰度汝長御史其往視師曰度惟汝豫同汝遂相豫以賞罰用命不用命曰宏汝其以節都統諸軍曰守謙汝出入左右汝惟近臣其往撫師曰度汝其往衣服飲食豫士無寒無飢以既厥事遂生蔡人賜汝節斧通天御帶衛卒三百凡茲廷臣汝擇自從惟其賢能無憚大吏庚申豫其臨門送汝曰御史豫憫士大夫戰甚苦自今以往非郊廟祠祀其無用樂顏允武合攻其北大戰十六得柵城縣二十三降人卒四萬道古攻其東南八戰降萬三千再入申破其外城文通戰其東十餘遇降萬二千訴入其西得賊將輒釋不殺用其策戰比有功十二年八月丞相度至師都統宏責戰益急顏允武合戰益用命元濟盡并其衆洄曲以備十月壬申訴用所得賊將自文城因天大雪疾馳百二十里用夜半到蔡破其門取元濟以獻盡得其屬人卒辛巳丞相度入蔡以皇帝命赦其人淮西平大饗賚功師還之日因以其食賜蔡人凡蔡卒三萬五千其不樂為兵願歸為農者十九悉縱之斬元濟京師册功宏加侍中訴為左僕射帥山南東道顏允皆加司空公武以散騎常侍帥鄜坊丹延道古進大夫文通加散騎常侍丞相度朝京師道封晉國公進階金紫光祿大夫以舊官相而以其副總為工部尚書領蔡任既還奏㣥臣請紀聖功被之金石皇帝以命臣愈臣愈再拜稽首而獻文曰唐承天命遂臣萬邦孰居近土襲盜以狂往在元宗崇極而圮河北悍驕河南附起四聖不宥屢興師征有不能克益戍以兵夫耕不食婦織不裳輸之以車為卒賜糧外多失朝曠不嶽狩百隸怠官事忘其舊帝時繼位顧瞻咨嗟惟汝文武孰恤豫家既斬吳蜀旋取山東魏將首義六州降從淮蔡不順自以為強提兵叫歡欲事故常始命討之遂連姦鄰陰遣刺客來賊相臣方戰未利內驚京師㣥公上言莫若惠來帝為不聞與神為謀乃相同德以訖天誅乃敕顏允訴武古通咸統於宏各奏汝功三方分攻五萬其師大軍北乘厥數倍之常兵時曲軍士蠢蠢既翦陵雲蔡卒大窘勝之邵陵郾城來降自夏入秋復屯相望兵頓不勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者額額蔡城其疆千里既入而有莫不順俟帝有恩言相度來宣誅止其魁釋其下人蔡之卒夫投甲呼舞蔡之婦女迎門笑語蔡人告飢船粟往哺蔡人告寒賜以繒布始時蔡人禁不往來今相從戲里門夜開始時蔡人進戰退戮今旰而起左飧右粥為之擇人以收餘憊選吏賜牛教而不稅蔡人有言始迷不知今乃大覺羞前之為蔡人有言天子明聖不順族誅順保性命汝不吾信視此蔡方孰為不順往斧其吭凡叛有數聲勢相倚吾強不支汝弱奚恃其告而長而父而兄奔走偕來同我太平淮蔡為亂天子伐之既伐而飢天子活之始議伐蔡卿士莫隨既伐四年小大並疑不赦不疑由天子明凡此蔡功惟斷乃成既定淮蔡四夷畢來遂開明堂坐以治之海於天地間為物最巨自三代聖王莫不祀事考於傳記而南海神次最貴在北東西三神河伯之上號為祝融天寶中天子以為古爵莫貴於公侯故海嶽之祝犧幣之數放而依之所以致崇極於大神今王亦爵也而禮海嶽尚循公侯之事虛王儀而不用非致崇極之意也由是册尊南海神為廣利王祝號祭式與次俱升因其故廟易而新之在今廣州治之東南海道八十里扶胥之口黃木之灣常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常節度五嶺諸軍仍觀察其郡邑於南方事無所不統地大以遠故常選用重人既貴而富且不習海事又當祀時海常多大風將往皆憂戚既進觀顧怖悸故常以疾為解而委事於其副其來已久故明宮齋廬上雨旁風無所蓋障牲酒瘠酸取具臨時水陸之品狼籍籩豆薦祼興俯不中儀式吏滋不供神不顧享盲風怪雨發作無節人蒙其害元和十二年始詔用前尚書右丞國子祭酒魯國孔公為廣州刺史兼御史大夫以殿南服公正直方嚴中心樂易祇慎所職治人以明事神以誠內外單盡不為表襮至州之明年將夏祝册自京師至吏以時告公乃齋袚視册誓㣥有司曰册有皇帝名乃上所自署其文曰嗣天子某謹遣官某敬祭其恭且嚴如是敢有不承明日吾將宿廟下以供晨事明日吏以風雨白不聽於是州府文武吏士凡百數交謁更諫皆揖而退公遂升舟風雨少弛棹夫奏功雲陰解駮日光穿漏波伏不興省牲之夕載暘載陰將事之夜天地開除月星明穊五鼓既作牽牛正中公乃盛服執笏以入即事文武賓屬俯首聽位各執其職牲肥酒香樽爵淨潔降登有數神具醉飽海之百靈祕怪慌惚畢出蜿蜿蛇蛇來享飲食闔廟旋艫祥飈送帆旗纛旄麾飛揚暗靄鐃鼓嘲轟高管噭噪武夫奮棹工師唱和穹龜長魚踴躍後先乾端坤倪軒豁呈露祀之之歲風災熄滅人厭魚蟹五穀胥熟明年祀歸又廣廟宮而大之治其庭壇改作東西兩序齋庖之房百用具修明年其時公又固往不懈益虔歲仍大和耋艾歌詠始公之至盡除他名之稅罷衣食於官之可去者四方之使不以資交以身為帥燕享有時賞與以節公藏私蓄上下與足於是免屬州負逋之緡錢草有四萬米三萬二千斛賦金之州耗金一歲八百困不能償皆以丐之加西南守長之俸誅其尤無良不聽令者由是皆自重慎法人士之落南不能歸者與流徙之胄百草八族用其才良而廩其無告者其女子可嫁與之錢財令無失時刑德並流方地數千里不識盜賊山行海宿不擇處所事神治人其可謂備至耳矣咸願刻廟石以著厥美而繫以詩乃作詩曰南海之墟祝融之宅即祀於旁帝命南伯吏隋不躬正自今公明用享錫右我家邦惟明天子惟慎厥使我公在官神人致喜海嶺之陬既足既濡胡不均宏俾執事樞公行勿遲公無遽歸匪我私公神人具依自天子至郡邑守長通得祀而遍天下者唯社稷與孔子焉一作為然而社祭土稷祭穀句龍與棄乃其佐享非其專主又其位所不屋而壇豈如孔子用王者禮巍然當座以門人為配自天子而下北面跪祭進退誠敬禮如親弟子者句龍棄以功孔子以德固自有次第哉自古多有以功德得其位者不得常祀句龍棄孔子皆不得位而得常祀然其祀事皆不如孔子之盛所謂生人以來未有如孔子者其賢過於堯舜遠者此其效歟郡邑皆有孔子廟或不能修事雖設博士弟子或役於有司名存實亡失其所業獨處州刺史鄴侯李繁至官能以為先既新作孔子廟又令工改為顏子至子夏十人像其餘六十二子及後大儒公羊高左邱明孟軻荀况伏生毛公韓生董生高堂生揚雄鄭元等數十人皆圖之壁選博士弟子必皆其人又為置講堂教之行禮肄習其中置本錢廩米令可繼處以守廟成躬率吏及博士弟子入學行釋菜禮耆老歎嗟其子弟皆興於學鄴侯尚文其於古記無不貫達故其為政知所先後可歌也已乃作詩曰惟此廟學鄴侯所作厥初庳下神不以宇先師所處亦窘寒暑乃新斯宮神降其獻講讀有常不誡用勸揭揭元哲有師之尊㣥聖嚴嚴大法以存像圖孔肖咸在斯堂以瞻以儀俾不或忘後之君子無廢成美琢詞碑石以贊攸始羅池廟者故刺史柳侯廟也柳侯為州不鄙夷其民動以禮法三年民各自矜奮曰茲土雖遠京師吾等亦天氓今天幸惠仁侯若不化服我則非人於是老幼相教語莫違侯令凡有所為於其鄉閭及於其家皆曰吾侯聞之得無不可於意否莫不忖度而後從事凡令之期民勸趨之無有後先必以其時於是民業有經公無負租流逋四歸樂生興事宅有新屋步有新船池園潔修豬牛鴨雞肥大蕃息子嚴父詔婦順夫指嫁娶葬送各有條法出相弟長入相慈孝先時民貧以男女相質久不得贖盡沒為隸我侯之至桉國之故以傭除本悉奪歸之大修孔子廟城郭巷道皆治使端正樹以名木柳民既皆悅喜常於其部將魏忠謝寧歐陽翼飲酒驛亭謂曰吾棄於時而寄於此與若等好也明年吾將死死而為神後三年為廟祀我及期而死三年孟秋辛卯侯降於州之後堂歐陽翼等見而拜之其夕夢翼而告之曰館我於羅池其月景辰廟成大祭過客李儀醉酒慢侮堂上得疾扶出廟門即死明年春魏忠歐陽翼使謝寧來京師請書其事於石余謂柳侯生能澤其民死能驚動禍福之以食其土可謂靈也已作迎享送神詩遺柳民俾歌以祀焉而并刻之柳侯河東人諱宗元字子厚賢而有文章嘗位於朝光顯矣已而擯不用其辭曰荔子丹兮蕉黃雜肴蔬兮進侯堂侯之船兮兩旗度中流兮風泊之待侯不來兮不知我悲侯乘駒兮入廟慰我民兮不嚬以笑鵝之山兮柳之水桂樹團團兮白石齒齒侯朝出遊兮暮來歸春與猿吟兮秋鶴與飛北方之人兮為侯是非千秋萬歲兮侯無我違福我兮壽我驅厲鬼兮山之左下無苦濕兮高無乾粳稌充羡兮蛇蛟結蟠我民報事兮無怠其始自今兮欽於世世湘旁有廟曰黃陵自前古立以祠堯之二女舜二妃者庭有石碑斷裂分散在地其文剝缺考圖記言漢荊州牧劉表景升之立題曰湘夫人碑今驗其文乃晉太康九年又題其額曰虞帝二妃之碑非景升立者秦博士對始皇帝云湘君者堯之二女舜妃者也劉向鄭元亦皆以二妃為湘君而離騷九歌既有湘君又有湘夫人王逸之解以為湘君者自其水神而謂湘夫人乃二也從舜南征三苗不反道死沅湘之間山海經曰洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小水為其夫人因以二女為天帝之女以余考之璞與王逸俱失也堯之長女娥皇為舜正妃故曰君其二女女英自宜降曰夫人也故九歌辭謂娥皇為君謂女英為帝子各以其盛者推言之也禮有小君君母明其正自得稱君也書曰舜陟方乃死傳謂舜升道南方以死或又曰舜死葬蒼梧二妃從之不及溺死沅湘之間余謂竹書紀年帝王之沒皆曰陟陟升也謂升天也書曰殷禮陟配天言以道終其德協天也書紀舜之沒云陟者與竹書周書同文也其下言方乃死者所以釋陟為死也地之勢東南下如言舜南巡而死宜言下方不得言陟方也以此謂舜死葬蒼梧於時二妃從之不及而溺死者皆不可信二妃既曰以謀語舜脫舜之厄成舜之聖堯死而舜有天下為天子二之力宜常為神食民之祭今之渡湘江者莫敢不進禮廟下元和十四年春余以言事得罪黜為潮州刺史其地於漢南海之揭陽癘毒所聚懼不得脫死過廟而禱之其冬移袁州刺史明年九月拜國子祭酒使以私錢十萬抵嶽州願易廟之桷腐一九冰於刺史王堪長慶元年刺史張愈自京師往余與愈故善因謂曰丐我一碑石載二廟事且令後世知有子名愈曰諾既至州報曰碑謹具遂篆其事俾刻之徐與秦俱出柏翳為嬴姓國於夏殷周世咸有大功秦處西偏專用武勝遭世衰無明天子遂虎吞諸國為雄諸國既皆入秦為臣屬秦無所取利上下相賊害卒僨其國而沈其宗徐處得地中文德為治及偃王誕當國益除去刑爭末事凡所以君國子民待四方一出於仁義當此之時周天子穆王無道意不在天下好道士説得八駿騎之西遊同王母宴於瑤池之上歌謳忘歸四方諸侯之爭辨者無所質正咸賓祭於徐贄玉帛死生之物於徐之庭者三十六國得朱弓赤矢之瑞穆王聞之恐遂稱受命命造父御長驅而歸與楚連謀伐徐徐不忍鬬其民北走彭城武原山下百姓隨而從之萬有餘家偃王死民號其山為徐山鑿石為室以祠偃王偃王雖走死失國民戴其嗣為君如初駒王章禹祖孫相望自秦至今名公巨人繼迹史書徐氏十望其九皆本於偃王而秦後迄茲無聞家天於柏翳之緒非偏有厚薄施仁與暴之報自然異也衢州故會稽太末也民多姓徐氏支縣龍邱有偃王遺廟或曰偃王之逃戰不之彭城之越城之隅棄玉几研於會稽之水或曰徐子章禹既執於吳徐之公族子弟散之徐揚二州間即其居立先王廟云開元初徐姓二人相屬為刺史帥其部之同姓改作廟屋載事於碑後九十年當元和九年而徐氏放復為刺史放字達夫前碑所謂今戶部侍郎其大父也春行視農至於龍邱有事於廟思惟本原曰故制粗朴下窄不足以揭虔妥靈而又梁桷赤白陊剝不治圖像之威黑昧就滅藩拔級夷庭木禿祈氓日慢祥慶弗下州之㣥支不獲蔭庥余惟遺紹而尸其土不即不圖以有資聚罰其可辭乃命因故為新衆工齊事惟月若日工告訖功大祠於廟宗鄉咸序應是歲州無怪風劇雨民不夭厲穀果完實民皆曰耿耿祉哉其不可誣乃相與請辭京師歸而鑱之於石辭曰秦傑以顛徐由遜帛丿糸秦鬼久飢徐有廟存婉婉偃王惟道之耽以國易仁為笑於頑自初擅命其實幾姓歷短詈長有不償亡課其利害孰與王當姑蔑之墟太末之里誰思王恩立廟以祀王之聞孫世世多有唯臨茲邦廟土實守堅嶠之後達夫廓之王歿萬年如始祔時王孫多孝世奉王廟達夫之來先慎詔教盡惠廟民不主於神維是達夫知孝之元太末之里姑蔑之城廟事時修仁孝振聲宜寵其人以及後生嗟嗟維王雖古誰亢王死於仁彼以暴喪文追作誄刻示茫茫袁公滋既成廟明歲二月自荊南以旗節朝京師留六日得壬子春分率宗親子屬用少牢於三室既事退言曰嗚呼遠哉維世傳德襲訓集余乃今有濟今祭既不薦金石音聲使工歌詩載烈象容其奚以飭稚昧於長久唯敬繫羊豕幸有石如具著先人名迹因為詩繫之語下於義其可雖然余不敢必屬篤古而達於詞者遂以命愈愈謝非其人不獲命則謹條袁氏本所以出與其世系里居起周歷漢魏晉拓拔魏周隋入國家以來高曾祖考所以劬躬燾後委祉於公公之所以逢將承應者有槩有詳而綴以詩其語曰周樹舜後陳陳公子有為大夫食國之地袁鄉者其子孫世守不失因自別為袁氏春秋世陳常壓於楚與中國相加尤疏袁氏猶班班見可譜常居陽夏陽夏至晉屬陳郡故號陳郡袁氏博士固申儒遏黃唱業於前至司徒安懷德於身袁氏遂大顯連世有人終漢連魏晉分仕南北始居華陰為拓拔魏鴻臚鴻臚諱恭生周梁州刺史新縣孝侯諱穎孝侯生隋左衛大將軍諱溫去官居華陰武德九年以大耋薨始葬華州左衛生南州刺史諱士政南州生當陽令諱倫於公為曾祖當陽生朝散大夫石州司馬諱知元司馬生贈工部尚書咸寧令諱煜是為皇考袁氏舊族而當陽以通經為儒位止縣令石州用春秋持身治事為州司馬以終咸寧備學而貫以一文武隨用謀行功從出入有立不爵於朝比三世宜達而窒歸成後人數當於公公惟曾大父大父皇考比三世存不大夫食歿祭在子孫唯將相能致備物世彌遠禮則益不及在慎德行業治圖功載名以待上可無細大無敢不敬畏無早夜無敢不思成於家進於外以立於朝自侍御史歷工部員外郎祠部郎中諫議大夫尚書右丞華州刺史金吾大將軍由卑而巨莫不官稱遂為宰相以贊辨章仍持節將蜀滑襄荊略苞河山秩登祿富以有廟祀具如其志又垂顯刻以教無忘可謂大孝詩曰袁自陳分初尚蹇連越秦造漢博士發論司徒任德忍不錮人收功厥後五公重尊晉氏於南來處華下鴻臚孝侯用適操捨南州勤治取最不懈當陽耽經唯義之畏石州烈烈學專春秋懿哉咸寧不名一休趨難避成與時泛浮是生孝子天子之宰出把將符㣥州承楷數以立廟祿以備器由曾及考同堂異置柏版松楹其筵肆肆維袁之廟孝孫之為順勢即宜以諏以龜以平其巇屋牆持持孝孫來享來拜廟庭陟堂進室親登籩鉶肩臑胉骼其樽元清降登受胙於慶爾成維曾維祖維考之施於汝孝嗣以報以祗凡我有今非本曷思刻詩繫牲維以告之元和五年天子曰盧從史始立議用師於恆乃陰與寇連夸謾凶驕出不遜言其執以來其四月中貴人承璀即誘而縛之其下皆甲以出操兵趨譁牙門都將烏公重允當軍門叱曰天子有命從有賞敢違者斬於是士皆斂兵還營卒致從史京師壬辰詔用烏公為銀青光祿大夫河陽軍節度使兼御史大夫封張掖郡開國公居三年河陽稱治詔贈其父工部尚書且曰其以廟享即以其年營廟於京師崇化里軍佐竊議曰先公既位常伯而先夫人無加命號名差卑於配不宜語聞詔贈先夫人劉氏沛國太夫人八年八月廟成三室同宇祀自左領府君而下作主於第乙巳升於廟烏氏著於春秋譜於世本列於姓苑在莒者存在齊有餘枝鳴皆為大夫秦有獲為大官其後世之江南者家鄱陽處北者家張掖或入夷狄為君長唐初察為左武衛大將軍實張掖人其子曰令望為左領軍衛大將軍孫曰蒙為中郎將是生贈尚書諱承玼字某烏氏自莒齊秦大夫以來皆以才力顯及武德以來始以武功為名將家開元中尚書管平盧先鋒軍屬破奚契丹從戰捺祿走可突于渤海上至馬都山吏民逃徙失業尚書領所部兵塞其道塹原纍石帛丿糸四百里深高皆三丈寇不得進民還其居歲罷運錢三千萬餘黑水室韋以騎五千來屬麾下邊威益張其後與耿仁智謀説史思明降思明復叛尚書與兄承恩謀殺之事發族夷尚書獨走免李光弼以聞詔拜冠軍將軍守右威衛將軍檢校殿中監封昌化郡王石嶺軍使積粟厲兵出入耕戰以疾去職貞元十一年二月丁巳薨於華陰告平里年若干即葬於其地二子大夫為長季曰重元為某官銘曰烏氏在唐有家於初左武左領二祖紹居中郎少卑屬於尚書不償其勞乃相大夫授我戎節制有壃墟數備禮登以有宗廟作廟天都以致其孝右祖左孫爰饗其報云誰無子其有無孫克對無羞乃惟有人念昔平盧為艱為瘁大夫承之危不棄義四方其平士有逮息來覲來齋以饋黍稷王姓李氏諱皋字子蘭諡曰成其先王明以太宗子國曹絶復封傳五王至成王嗣封在元宗世蓋於時年十七八紹爵三年而河南北兵作天下震擾王奉母太妃逃禍民伍得間走蜀從天子天子念之自都水使者拜左領軍衛將軍轉二國子祕書王生十年而失先王哭泣哀悲弔客不忍聞喪除痛刮磨豪習委已於學稍長重知人情急世之要恥一不通侍太從天子於蜀既孝既忠持官持身內外斬斬由是朝廷滋欲試之於民上元元年除溫州長史行刺史事江東新刳於兵郡旱飢民交走死無弔王及州不解衣下令掊鎖擴門悉棄倉實與民活數十萬人奏報升秩少府與平袁賊仍徙祕書兼州別駕部告無事遷真於衡法成令修治出張施聲生勢長觀察使噎媢不能出氣誣以過犯御史助之貶潮州刺史楊炎起道州相德宗還王於衡以直前謾王之遭誣在理念太老將驚而戚出則囚服就辨入則擁笏垂魚坦坦施施即貶於潮以遷入賀及是然後跪謝告實初觀察使虐使將國良往戍界良以武岡叛戍衆萬人斂兵荊黔洪桂伐之二年尤張於是以王帥湖南將五萬士以討良為事王至則屏兵投良以書中其忌諱良羞畏乞降狐鼠進退王即假為使者從一騎踔五百里抵良壁鞭其門大呼我曹王來受良降良今安在良不得已錯吅丂一迎拜盡降其軍太薨王棄部隨喪之河南葬及荊被詔責還會梁崇義反王遂不敢辭以還升秩散騎常侍明年李希烈反遷御史大夫授節帥江西以討希烈命至王出止外舍禁無以家事關我裒兵大選江州㣥能著職王親教之搏力勾卒嬴越之法曹誅五畀艦步二萬人以與賊遌嘬鋒蔡山踣之剜蘄之黃梅大鞣長平鏺廣濟掀蘄春撇蘄水掇黃岡策漢陽行跐義川還大膞蘄水界中披安三縣拔其州斬偽刺史標光之北山隨光化捁其州十抽一推救兵州東北屬鄉還開軍受降大小之戰三十有二取五州十九縣民老幼婦女不驚市賈不變田之果穀下無一迹加銀青光祿大夫工部尚書改戶部再換節臨荊及襄真食三百王之在兵天子西巡於梁希烈北取汴鄭東略宋圍陳西取汝薄東都王坐南方北向落其角距賊死咋不能入寸尺亡將卒十萬盡輸其南州王始政於溫終政於襄恆平物估賤斂貴出民用有經一吏軌民使令家聽戶視姦宄無所宿府中不聞急步疾呼治民用兵各有條次世傳為法任馬彞將慎將鍔將潛偕盡其力能薨贈右僕射元和初以子道古在朝更贈太子太師道古進士司門郎刺利隨唐睦徵為少宗正兼御史中丞以節督黔中朝京師改命觀察鄂嶽蘄沔安黃提其師以伐蔡且行泣曰先王討蔡實取沔蘄安黃寄惠未亡今余亦受命有事於蔡而四州適在吾封庶其有集先王薨於今二十五年吾昆弟在而墓碑不刻無文其實有待子無用辭乃序而詩之辭曰太支十三曹於弟季或亡或微曹始就事曹之祖王畏塞絶遷零王黎公不聞僅存子父易封三王守名延延百載以有成王成王之作一自其躬文被明章武薦畯功蘇枯弱強齦其姦猖以報於宗以昭於王王亦有子處王之所唯舊之視蹶蹶陛陛實取實似刻詩其碑為示無止公諱用字師柔太原人莊憲皇太后之弟今天子之舅太師之子太尉之孫司徒之曾孫元和元年上朝太后南宮大裦外氏自外高王父而下至外王父咸册登公師事載之史皇太后昆弟唯公一人於是特拜銀青光祿大夫太子少詹事未三月因遷大詹事賜勳上柱國爵封郡公國於太原益掌廏苑之事公起外戚子弟秩卑年少歲餘超居上班官尊職大朝夕兩宮而能敬讓以敏持以禮法不挾不矜賓接士大夫高下中度興官耆事滋久愈謹由是朝廷推賢所處號治轉少府監太子賓客別職仍初遷左散騎常侍兼右金吾大將軍皆以選進不專為恩十一年秋將以八月葬莊憲太后前一月壬申以疾告薨春秋四十有七上罷朝二日為位以哭贈工部尚書十一月壬申葬於萬年縣落女原夫人河南胡氏號太原郡夫人有子六人女子一人葬得日公之姊壻京兆尹李翛謂太子右庶子韓愈曰子以文常銘賢公卿今不可以辭應曰諾而為銘曰有蟜氏國實出炎軒蜀塗莘摯正之門孰豐其川不羡其源王氏周胄官封繼繼實生聖女以母唐帝公惟后季天子吾甥卑躬慎德不與寵橫年方未老后哀猶新如何不惠而殞其身刻文茲石久載攸存
