front:
  text: 全唐文欽定全唐文卷二百八凝昌黎人
  hash: sha256:a14f17f19f66120a8fa362721c187a48bfda5c97bcaf9ff1db255fd1b9734125
  markers:
  - {type: head, offset: 12, content: 韓凝, id: KR4h0168_NFKB_208-h1, level: 1}
body:
  text: 天子建德因生賜姓胙之土而命氏從其諡以稱族自羲軒法天洎我唐垂拱取威定霸宏弻皇維者即錫姓封樹公之先伯益典司三禮尚父封公營邱助化唐虞扶傾周漢爵窮五等榮冠百工雖繁華族莫居其右公諱蓋字副世前漢平帝錫字漢賢公生為人瑞歿為人神神而靈應代崇明祀考史冊薨位之歲闕書徵譜諜降神之年無錄原其圖籍建號取公之錫字而名漢賢神矣十一代祖周諡康公因避田和篡亂爰宅於茲曾祖節皇懷州刺史祖賀皇左司郎中考智皇成帝博士公五百年膺期挺生漢代神識沈敏凜肅丰姿經濟之略夙富於襟懷翊贊之源久明於微旨節用於內樹德於外闕一句時無與京伐未萌之謀世何能敵繇是平帝聞之深嘉其器累徵釋褐拜宣議郎大明為臣之節素抱匡時之術肅治明法敬天畏人耿介對問有任座直言諫諍犯顏同朱雲折檻帝念公之為臣乃社稷之臣也乃錫之字時元始季年蕃戎猾夏帝知公神武名略又拜北平將軍受律遄征為民舒福五申誓衆定見無窮之勳三略訓兵決逞必然之捷桴鼓作氣果應神機大潰㣥兇振旅而返獻俘受馘帝輸鴈塞之憂命爵庸勳公拜鳳池之詔除幽州刺史臨下簡肅御衆詳明清聲獨彰飽聞天聽遷冀州刺史爰革舊規維揚新令間執私黨斥遠姦回大副宸衷殊褎丕績封險瀆侯累承渙汗倍戒驕淫絕盤遊之娛除卓弋之物化源既厚錫命愈深又封關內侯兼知河北道事兩綰郡符救旱有隨車之雨二秉侯印臨邊無擊柝之聲任彌重轉勤位踰高尤謹居祿以德不其然乎詩云樂只君子邦家之光公之謂矣時屬漢之季世臣莽巨君逆天肆兇踐極公銜哀之次憤氣填胸按劍呼天曰我先帝朝夕思治寤寐求賢子惠困窮民服厥命任我事効我功與惡而棄好非謀去順而效逆速禍天監孔明敢臣偽主迺於幽冀中分以濟水之南深溝峻壘繕甲兵具車乘戈矛林植雉堞雲平一方民飲公之惠愛尚公之忠節罔不祇若時偽主令大將軍鄧郁帥兵討攘公獨步戎場卓然雄略不恃其險而恃其德進戰虎賁爭先退守金湯莫固大挫勍敵不克寸而還公純臣純孝冠絕古今神勞遠謀思復漢業大勳未集公薨於位冀趙之民號泣如堵耕夫釋耒若子產之喪鄭邦童子不謠類五羖之兦秦國會漢室復興追諡公號禮也有子五人咸名掩前哲克纘鴻業章帝拜孟子為郎中仲子左翊衞大將軍至和順二帝徵命諸子建爵榮位易曰天之所助者順也人之所助者信也公之一門克彰二美順契天道信感人心美哉輪奐清廟闕二字儼然如闕一字二子侍坐奉冡祀焉趨詣者鱗集皆股栗懾威祈禱者雲臻俱心肅生敬列國之君粢盛闕一字替民有災而恩靈必贊歲若旱而雲雨時興德著四維福流千古以爾靈感定霸於茲不文於石奚彰厥美伯儀吳興人武后時為太子右諭德歷官祭酒修文館學士謹按禮有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭元注云禘郊祖宗謂祭祀以配食也禘謂祭昊天於圓丘祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗伏尋嚴配之文於此最為詳備虞夏則退顓頊而郊嚳殷人則舍契而郊冥去取既差前後乖次得禮之序莫尚於周禘嚳郊稷不間於二主明堂宗祀始兼於兩配咸以文王武王父子殊別文王為父上主五帝武王對父下配五神孝經曰嚴父莫大於配天則周公其人也昔者周公郊祀文王於明堂以配上帝不言嚴父武王以配天則武王雖在明堂理未齊於配祭既稱宗祀義獨主於尊嚴雖同兩祭終為一主故孝經緯曰后稷為天地主文王為五帝宗也必若一神兩祭便則五祭十祠薦獻頻繁禮虧於數此則神無二主之道禮宗一配之義竊尋貞觀永徽共遵專配顯慶之後始創兼尊必以順古而行實謂從周為美高祖神堯皇帝請配圓丘方澤太宗文武聖皇帝請配南郊北郊高宗天皇大帝德邁九皇功開萬㝢制禮作樂告禪升中率土共休普天同賴竊維莫大之孝理當總配五天謹議昭德司刑太常伯乾裕子擢明經累官御史中丞如意元年拜鳳閣侍郎同鳳閣鸞臺平章事以怙權貶欽州南賓尉召授監察御史來俊臣誣以謀逆誅神龍二年贈御史大夫建中三年加贈司空臣聞文武之道布在方策豈有巳為天子而為姑立廟乎以親親言之則天皇是陛下夫也皇嗣是陛下子也陛下正合得天子子孫為萬代計况陛下承天皇顧託而有天下若立承嗣臣恐天皇不血食矣虬武后朝官左史六氣氤氳四時平分天道恍忽是生萬物化而為鳥兮有鳴鳳之來儀化而為蟲兮有尺蠖之能屈原夫蠖之為生也不飲不食非榮非利無欲進道處身似智幸稟天地之生亦承雲雨之施哂搏擊而爭疾輕牙而自致其勇也不怯雷霆之聲其慎也寧勞鷹隼之鷙浩然無悶之境獨處不爭之地多其順時而出就暖而長吐微絲以逍遙蹙緩步而來往當靜泉澄遇躁風興屈伸進退翼翼繩繩同吹萬而生養體抱一以含宏聖人書之以作誡君子行之而足徵况不才之下士敢求伸以自矜惟陰陽之播氣實萬類以呈形有微蟲之稟質應甲子而濕生雨欲垂而乃見暑既至而先鳴乍逶迤而鱔屈或宛轉而蛇行內乏筋骨外無手足任性行止物擊便曲徒進退而皓首竟不知其所欲東西詰屈南北夤緣上食塵塊下飲淵泉應軒轅土德之王入蔡邕勸學之篇其體甚微其用至專墐泥塗以自保觸鹽滋而罔全豈造化之賦命信歸之於自然觀夫天地之道轉萬物以自然鱗蟲之聚有蟾蜍而可稱焉鳥吾知其擇木魚吾知其在泉此皆嬰刀俎以生患而我沈冥而得全爾其文章睆目銳頭皤腹本無牙齒之用寧懼鷹鸇之逐或處於泉或漸於陸常不離乎跬步亦何擇於栖宿當夫流潦初溢陰霖未晴乘清秋之良夜散響耳之繁聲澒洞雷殷混萬籟而為一喧豗鼓怒怛異類以那驚既莫知其所止故乃逢時則鳴觀其忘機似智稱善不伐進而無愧恥魚之曝鰓退亦能謀笑龜之灼骨方將樂彼泥中與井底安能出乎河長與海闊稱其異則畫地成川語其神則登天入月豈真窪坳之內而見其浮沒意茲蟾蜍匪陋攸居沼沚之毛恣涵泳之無斁蘋蘩之菜兼糗糧而有餘方其鳴孔公若聞於鼓吹當其怒越子反駐乎乘輿彼龍蛇之蟄也吾不知其所如元旦京兆萬年人擢進士第補東阿尉遷左臺監察御史與張易之有姻屬易之敗貶感義尉召為主客員外郎遷中書舍人景龍二年為修文館學士美原縣東北隅神泉者雖無樹石森深之致而有豁險清泠之異韋子蓋嘗倦簿領泆塵冥爰命丞太原王公主簿平陽賈公尉南陽張公釋事以遊焉喟然而歎曰陵谷之變雖窮造化之功何檢有窮則適變無檢則忘功所以物効其奇事冥其契嗟虖恨不得列之玉檻潄以瓊漿勝負無私流俗所忿徒觀其色潔其味美起自文明首秋時則垂拱元夏隤祥應運非醴泉歟不然何明祈雜闕一字降福肸蠁而幽通之若此也澗形如規四望若掃平地可深百許尺東西延袤七八十尺下積員泉闕一字渟鏡澈莫測其底南流出界雖雲漢昭回而滲漉無端則所謂上善利物谷神不死豈虬龍窟宅靈僊福祐懷清佇俊抱逸尋幽者乎躋顥氣而瑩襟情疏元流而屏喧濁忘歸淡定盍賦詩云齊賢陜州人聖歷初為太常奉禮郎遷博士論禮制合古議累遷諫議大夫禮官狀云經史正文無天子每月告朔之事者謹按穀梁傳曰閏月天子不告朔是知他月天子告朔矣又按左氏傳以魯侯不告朔為棄時政也則諸侯閏月亦告朔矣又按周禮太史職頒告朔於邦國之中禮記玉藻天子聽朔於南門之外皆有閏月王居門之事是天子亦以閏月告朔矣非是天子不告而諸侯亦告也穀梁子去聖尚近雖閏月告朔之義與左氏不同然皆以天子諸侯每月當行告朔之事兩禮之設其文甚著不可謂經史無正文也又禮官狀以周禮天官太宰職云正月之吉始和布治於邦國都鄙乃縣象法於象魏使萬人觀之浹日而斂之即是謂禮記玉藻之聽朔因此遂謂王者唯以歲首元旦一告朔此說非也何者太宰所云布治於邦國都鄙者布其所掌太宰之典也故地官司徒職則布教典春官宗伯職則布禮典夏官司馬職則布政典秋官司寇職則布刑典唯冬官司空職兦以五官之職言之則其職亦當布事典也此乃六官各以正月之吉宣布其職之典非告朔也干寶之注以經所云正月之吉者即是正月之朔日也故解云吉是朔日也今云告朔日者即傳寫之誤不可據以為說也又禮官狀云每月告朔者諸侯之禮故云左氏傳云既視朔遂登觀臺今王者行之非所聞也又云以天子之尊而用諸侯之禮非所謂頒告朔令諸侯使奉而行之謂此大謬也何者左氏所言視朔者猶玉藻之聽朔也今禮官據左氏有魯侯行視朔之禮即謂諸侯每月當告朔玉藻亦有天子行聽朔之禮亦有閏月王居門之事即天子唯歲首一告朔何其一取而一捨也又孝經云昔者明王事父孝故事天明又云明王以孝理天下豈有王者設教使諸侯尊祖告朔而天子不告也非所謂以明事神訓人事君之義又禮官狀云鄭所謂告其時帝者即太皞等五人帝此又非也何者鄭注惟言告其時帝及其神以配文王武王不指言天帝人帝但天帝人帝並配五方時帝之言包天人矣但以文王武王作配則是並告天帝人帝諸侯受朔於天子故但於祖廟告而受行之天子受朔於上天理宜於明堂告其時之天帝人帝而配以祖考也故玉藻疏載賀瑒義亦以時帝為靈威仰等五天帝且聖人為能饗帝孝子為能饗親今若但告人帝則聖人之道未備非所謂能饗也又禮官狀云若天子每月朔旦告祭然後頒之則諸侯安得受而藏之告而行之是明太宰以歲首宣布一歲之令太史從而頒之令既頒矣政既行矣而王猶月月告朔復欲何所宣布者春官太史職云頒朔於邦國是總頒一歲之朔於天下諸侯故諸侯得受而藏之告而行之而王猶月月告朔頒之於官府都鄙也此謂畿內彼謂畿外事不相關也又禮官狀云漢魏至今莫之用者秦人滅學經典不存漢祖馬上得之未能備禮自魏以下喪亂宏多豈可以漢魏廢禮欲使朝廷法之也又禮官狀云禮論等及祠令並無天子每月告朔之禮崔靈恩三禮義宗廟祭服義亦載天子視朔之服不可言無也又貞觀顯慶禮及祠令非徒無天子每月告朔之文亦無天子歲首告朔之事今禮官何以言天子歲首一告朔乎借矛擊楯昭然易了每月告朔在禮不疑尊祖配天於義為得若乃創制垂統損益舊章或欲每月聽政或欲孟月視朔此則斷在宸極事關執政固非㣥議所得參詳謹議昔孫卿子云有天下者事七代有一國者事五代則天子七廟古今達禮故尚書稱七代之廟可以觀德祭法稱王立七廟一壇二墠王制云天子七廟三昭三穆與太祖之廟而七莫不尊始封之君謂之太祖太祖之廟百代不遷祫祭之禮毀廟之主陳於太祖未毀廟之主皆升合食於太祖之廟太祖東向昭南向穆北向太祖者商之元王周之后稷是也太祖之外更無始祖但商自元王巳後十有四代至湯而有天下周自后稷巳後十有七代至武而有天下其間代數稍遠遷廟親廟皆出太祖之後故合食有序尊卑不差其後漢高受命無始封祖即以高皇帝為太祖太上皇之父立廟享祀不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其高皇太皇處士君等並為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西豫章潁川京兆府君等亦為屬尊不在昭穆合食之列歷茲巳降至於有隋宗廟之制斯禮不易故宇文氏以文皇帝為太祖隋室以武元皇帝為太祖國家誕受天命累聖重光景皇帝始封唐公實為太祖中間歷數既近列在三昭三穆之內故皇家太廟唯有六室其宏農府君宣光二帝尊於太廟親近則遷不在昭穆合食之數今皇極再造孝思匪寧奉二月二十九日勅七室巳下依舊號尊崇又奉三月一日勅既立七廟須尊崇始祖速令詳定者伏尋禮經始祖即是太祖太祖之外更無始祖周朝太祖之外以周文王為始祖不合禮經或有引白虎通義云后稷為始祖文王為太祖武王為太宗乃鄭元注詩雍序云太祖謂文王以為說者其義不然何者彼以禮王者祖有功而宗有德周人祖文王而宗武王故謂文王為太祖爾非祫祭㣥主合食之太祖今之議者或有欲立涼武昭王為始祖斯為不可何者昔在商周稷卨始封湯武受命湯武之興祚繇稷卨故以稷卨為太祖即皇家之景皇帝是也涼武昭王勳業未廣後主失國守土不傳景皇始封實基明命今乃捨封唐之盛烈崇西涼之遠構考之前古實乖典禮魏氏不以曹參為太祖晉氏不以殷王卬為太祖宋氏不以楚元王為太祖齊梁不以蕭何為太祖陳隋不以胡公楊震為太祖則皇家安可以涼武昭王為太祖乎漢之東京太議郊祀多以周郊后稷漢當郊堯制下公卿議者僉同帝亦然之唯杜林正議獨以為周室之興祚繇后稷漢室特起功不緣堯祖宗故事所宜因循竟從林議又傳云欲知天上事問長人以其近之武德貞觀之時主聖臣賢其去涼武昭王蓋亦近於今矣當時不立者必不可立故也今既年代浸遠方復立之是非三祖二宗之意也實恐景皇失職而震怒武昭虛位而不答非社稷之福也宗廟事重禘祫禮崇先王以之觀德或者不知其說既灌而往孔子不欲觀之今朝命惟新宜應慎重祭如神在理不可誣請勅加太廟為七室享宣皇以備七代其始祖不合別有尊崇之議謹議萬石聖歷初第進士大足初中嫉惡科神龍初中才高位下科景雲中中懷能抱器科開元初重考及第六年中超㣥拔類科十三年考判入第十六年又入第二十六年中文詞壯麗科凡九登科選問朕聞至道雖微不言而化皇天陰騭相叶其彞信寒暑而生成施雲雨而沐潤垂範作訓樹君育人時有澆淳教垂繁略成湯既聖禹道云兦桑扈谷風屢動詩人之刺塞門反坫時貽宣父之嫌我國家振彼頹綱開茲盛業朕以不德襲號乘時而皇極之道未敷謨明之軌尚闕思宏厥理其義安從至如視聽貌言恒若時若會極歸極作哲作乂一以貫之何方而可夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要又四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋余疑對臣嘗黽勉讀書夙夜匪懈觀前代之事稽王者之風欲樹文明必招俊乂所以平章百姓昭暢萬人負黼扆而海宇清垂衣裳而天下理今陛下朝盈多士野無遺賢猶復發德音下明制張雲羅以掩俊設天網以頓奇片善不遺有能皆進故得飛飛丹鳳棲翼於帝梧皎皎白駒連食於塲藿縱夷齊巢許咸屈於茲臣既庸妄豈敢當此且聲非入異譽不出凡文律未明才用無取謬參推擇濫赴搜揚安敢避直飾詞向華乖實但丹誠有厲至敬無文敢竭鄙聞用當明試然將涓滴以足海用纎埃以增岳雖寡攸助誰能默哉臣聞建國興邦必以黎元為本康時訓代必以政術為先軌謨雖異理化皆一昔者太上之君崇道以致化立德以養物人必欲壽敦禮教而不傷人必欲富薄賦斂而不困人必欲逸則省力而不勞人不欲危即扶持而使固不強人之所惡不禁人之所欲故能無為而理不言而化及至中古行仁履義克巳厲身拯溺於人博施於物即能陰陽不錯風雨以時疾疫必除殀孽莫起洎乎末代政令不作刑法聿修奢侈是崇禮樂非雅時無美善之說俗有姦邪之釁豈不由君失其道臣非其人澆薄浸興淳朴離散者也今陛下出號施令罔有不常齊物正人各得其所然猶綜覈古今稽謀政教視先王之得失崇今日之高明以此天聰尚云不德巍巍至化謙尊而光非臣愚昧所能涯際制策曰皇極之道未敷謨明之軌尚闕思宏厥理其義安從者臣以為皇極將立莫先擇俊得人則政和非人則政失人賢化遠豈不謬哉至如因能任官量賢受祿即百僚濟濟萬姓安安去無用之言除無用之器即情實斯得謬說不繁使人以時謹身節用即倉廩儲積黎庶完豐進有德而退無良即庶位允釐庶官不曠尊有功之子棄無功之人即營事者不惜其身制作者能竭其力罰必當罪及姦回自除賞必中賢則人臣自勸夫如是則海內行大中之道天下有幸甚之言何憂夫皇極之道未敷者也若乃列張輔佐建立官司詢忠直之言開進諫之路用能獻可替否補過弻違外藏主之非內正君之失今陛下乃順時而動非道不行事無不嘉人欲何說故獻納之職諫諍之詞但可略言莫知所議大哉至德實冠古今且朝無妄臣縱朱雲重生安得折檻人不妄從雖辛毗不死曷聞牽裾天子甚明是故㣥臣無事亦何憂文軌之闕哉制策曰視聽貌言恒若時若會極歸極作哲作乂一以貫之何方而可者臣聞王者法乾理物觀象裁規敬順天時恭行月令恒若時若罔有咎徵矣尊九疇之儀修八政之規事不失儀動不違制出處語默皆歸於仁依乎中庸遠棄偏黨垂至道於萬國寄良政於百官直道而行不可則止會極歸極作哲作乂不日而致矣視聽貌言無從而失也制策曰禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明期要者臣聞化難將美人各有心不違制節必有放縱故先王作典禮以防之興雅樂以感之用能移風易俗安上理人矣今陛下行宗廟之禮故能配天地之神履直言之議故能立上下之敬聽宮商之變故能分善惡之俗捐鄭衞之音奏簫韶之樂正疏略之弊敦揖讓之儀州郡大行朝廷式序同異斯達內外罔差既合盡美之端何問不才之子若罄愚而說則陛下無有昧之咨若駐筆而述則陛下鍾佇明之訪實迷誨遊何足知之臣聞大樂與天地同和大禮與天地同節既列同異之因將分內外之殊皇王是尊古今所重俱為時用其功一焉制策曰四時武德制自何君五行文始本之誰代者臣聞四時武德制之以周王五行文始本之於漢帝制策曰昭德武德莫辨所尊昭容禮容未詳所出者臣聞昭德武德實有攸尊之道昭容禮容出於劉氏之代昔者魯哀公問儒行宣尼有更僕之勞孔父訪鳥官郯子生傾葢之倦然宜富學滄海猶黽勉於一隅况乎道謝桂林豈對揚於庶事徒周遊於文苑終展轉於迷津謹對問選賢舉能秀造參用今之所薦誠為得人未聞含聲待扣乃有不耕而穫十室忠信理亦難誣若遂踐於清朝仗何材而濟物又二老歸周見稱何德八元佐舜見述何功滋泉以何術見稱莘邑以何辭作相對昔者聖人之立極也選衆舉能列官分職以通天地之德以類亭毒之功臣哉鄰哉時用遠矣主上重光纘曜紹開中興拜輶軒於受命之初希俊賢於御極之首茲乃羲軒之志堯禹之心勤求道要實所望清光哉故鄧林有必至之材崑山亦無藏價之寶可不謂然乎臣以妄庸藝無兼採謬從卑列應此嘉薦誠非鉛朽所能塞充然天休震動虛求秀逸揚於王庭亦僶俛矣顧當參明試獻嘉謀竭謏聞敷大體言用身退以酬萬一豈所謂不耕而穫邀名幸時而巳哉今見屬有司恭承下問懋陳常務自謂無奇若得飾躬召見對揚天休下學上達舒情竭憤則亦引諭陰陽較明時政之要咸激枉直甄摭授受之宜効其涓埃以增海岳耳若遂踐清朝濟時成務其道甚大惟變所適俾聞後命則藏器而動顧以更僕亦何盡言曲學鯫生居今志古若乃終為令德功實佐時披卷懷人恨為異代雖慚非博物敢不揚言則夫西伯善養夷齊以讓國歸老帝舜舉能元凱以通才受職惟師尚父韜鈐乃適道之功相時阿衡鼎餁獻為君之術雲臺紀績吳鄧懿其元勳麟閣圖功衞霍流其茂實謹對問元龜效祉鼎命昭夏王之祚赤烏呈祥金德總商君之業白魚躍而周道隆丹雀來而秦德霸殷因夏禮損益可知秦盛周衰天人何昧若水滅火起殷周之運匪人若桀暴紂昏廢興之期自我然而龍鬬興於夏日黿祅發於周年災祥兆於前成荒敗形於後政蕩蕩之德何所加焉佇爾揚名為余張目對臣聞天地草昧洪鈞列五運之期雲雷始屯大德分一人之位莫不時來命偶人迪天將白環昭虞后之功元珪錫夏王之德空桑負鼎遇為牲之君渭水張羅得非熊之相伏惟陛下化光坤載道叶乾行總五氣以發生籠百王而亭育粵若稽古推歷數之存亡感而遂通酌天人之符命明揚側陋典採芻詞開闡大猷旁求雅問則天文幽遠誠匪管窺然人事昭彰敢陳壅塞原夫興亡有數符命無差遽啟丹書俄迴白璧君臣道合則遐邇乂安上下情乖則邦家板蕩水火革而天人順暴虐行而桀紂亡百六為霖旱之災七九非湯堯之運歷數斯在惟德動天禍福無門惟人所召故德者五行之義也人者兩儀之心也人心動而悔恡生德義形而陰陽謝必乘金運則殷不及於期果歷木行則周不及於數龍鬬黿祅之發人與事幷白魚丹雀之符德將時應神道設教金土之運匪他人文化成狂聖之來是我蕩蕩之德何敢不通翼翼之心奚施不可天也人也坦然克分時乎命乎昭文斯辨臣優柔理道杳同河漢或躍文江懼深冰谷謹對問東胡逆命北海為墟朝廷循修復之功邊境乏折衝之寄遼水東西城池不復丸山左右職貢猶迷其使三聖遺黎九州故地飄然零落可不痛哉今欲示以威惠申誘約束選衆之舉未覩於今出㣥之略何必是古指明其要無大簡焉對古之王者仁覆萬類不以中外為隔而以兼濟為心固能出門同人遠近感應含生受氣靡不從助焉蠢彼林胡阻分遼漢挺而走險代搆其患昔我大唐之創業也東舉日域北暨幽陵不毛之類僉率貢職頃邊吏不謹我王度夷戎怙亂遂荒塞王亘致乃虔劉朔邊騷驚河冀天地悔禍人亦有心懷我舊章自相魚肉遊魂待命為日久矣光天纂曜景號昭升萬靈與能兩儀交際蠢彼醜裔何獨非人但未諭堯心自疑其譴累息跼眷猶昧占風且舜自側微舞干而有苖即敘湯亦小惠褰羅而異方懷柔今若一選王人以備行李諭茲天造慰彼遺黎則兼程驟步不日而至北極夷障無限於幽荒東絕扶桑盡同於封內何止兵不血刀丶野無勞師復遼水之城池循丸山之琛賮而巳若乃選衆舉能之術五材三略之奇亦鏘鏘廟堂濟濟朝序人誰不職知臣在君何待庸言而後行是羲皇之代戰征不興文景之時韓彭勿用雖欲自效亦無所施謹對三皇威察利用弧矢六藝和容率由飲射故澤宮相圃揆尊卑之節出正中質定賢愚之分既參之以樂章必備之以禮物甲利乃習妙言會其儀豈徒主皮之善將勤君子之爭制氏頗曉鏗鏘班乎樂職屬斯登降須徇疇人寧宜簨簴不修鐘鼓靡奏闕於所守罪亦何疑至如武侯熊侯自天子而斯達采蘋采蘩由命士而有差理合各附等威咸依節制訴非三命巳覺游詞將扣兩端須知甲品請更閱實然後定刑揚吾聖歷初成均博士臣等謹按周禮禮記及三傳皆有天子告朔之禮夫天子頒告朔於諸侯秦政焚滅詩書由是告朔禮廢今明堂肇建總章新立紹百王之絕軌樹萬代之鴻規上以嚴配祖宗下以敬授時令使人知禮樂道適中和災害不生禍亂不作今若因循頒朔每月依行禮貴隨時事須㳂革望依王方慶議用四時孟月日及季夏於明堂修復告朔之禮以頒天下其帝及神亦請依方慶用鄭元義告五時帝於明堂則嚴配之道通於神明至孝之德光於四海靖武后朝監察御史臣聞古之綱紀在乎降殺理道攸寄人命所懸法務於寬刑期尚簡猶慮詆欺過制旋濫不歸臣遠睇前經歷探故事刑得其中則風雨順而陰陽和法失其宜則怨濫興而災眚作虐臣酷吏者資矯佞以事君行刻薄以臨下矯佞似乎用意刻薄類乎無私侮憲害公弄權撓法倚深之奏似公之請既肆淫巧理難聽察其周興來俊臣邱勣萬國俊王宏義侯思止郭宏霸李敬仁彭先覺王德壽張知默者既堯年四凶矣恣愚騁暴縱虐含毒讐疾在位安忍朝臣罪逐法加刑隨意改當其時也囹圄如市朝廷以目既而神靈不昧寃魂有託行惡期報禍淫可徵具嚴天刑以懲亂首臣竊見來俊臣身處極法者以其羅織良善屠陷忠良籍沒以勸將來顯戮以謝天下臣又聞之道路上至聖主傍洎貴臣明明有羅織事矣俊臣既死推者獲功胡元禮超遷裴談顯授中外稱慶朝廷載安破其黨者既能賞不逾時被其陷者豈可銜寃累歲且稱反之徒須得反狀惟據口辨即請行刑拷楚妄加疑答何限故徐有功以寬平見忌斛瑟羅以妓女而受拘中外具知枉直斯在借以為喻其餘可詳臣又聞之郭宏霸自刺而唱快萬國俊被遮而遽兦霍獻可臨終膝拳於項李敬仁將死舌至於臍皆衆鬼滿庭㣥妖橫道近集若響隨聲備在人謠不為虛說伯有晝見殆無以過此亦羅織之一據也臣以至愚不識大體儻使平反者數人衆共詳覆來俊臣等所推大獄庶鄧艾獲申於今日孝婦不濫於昔時恩渙一流天下幸甚挺義興人武后朝官殿中侍御史內供奉歷湖延二州刺史皇明撫運萬㝢欽承墨綬為邦四人從化雖輯寧之道自我國章而惠養之規亦憑良宰劉乙懷符宓賤比績劉平增貲減年誠一時之異政以今方古亦千載而同風撫狀雖欲驚款論情翻可嘉尚請從薦舉用表賢能
