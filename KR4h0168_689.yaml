front:
  text: 全唐文欽定全唐文卷六百八十九符載二
  hash: sha256:105d63f995b4a9f70e152458f9869617c17a0ac0d12fd3c2991b8200199645c3
body:
  text: 國家自祿山犯德五兵勃起毒流天下於鄧最劇是州也地宜政事與他郡不類故得詳備而記之按天官書角亢之下為鄧鄧侯吾離之國也本楚地六國時屬韓秦昭王三十五年取韓地置南陽郡既滅韓徙天下不軌之人而實之至兩漢間多封勳庸大臣外戚主家氣高野曠地方千里控二都之浩穰道百越之繁會藩閫桐柏陂池江漢商於臨汝環我股臂故自前代至於我唐戰爭攘奪千載不息多為暴強者攻取之其望雄其俗豪鬬伉健尚畋獵藏亡匿死橫猾難制其有臨之者疎緻不中輒失聲實天寶十五年春魯炅自商州刺史御史中丞領是州牧是年六月二京陷於胡虜虜帥阿史那王立李節來寇我焉魯接戰大敗之其明年春逆將武珣復圍我焉魯培墉補卒堅峙自據正月至於八月不下他日絕食整旗犯出彼將乘病而困之反手與鬬賊頗橫潰因退保我城焉魯屯居順陽山谷中積數月肅宗皇帝升寶位於靈武詔加御史大夫襄鄧節度復牧我壘完葺如故至德初寇讐滅定潁國公來瑱以御史大夫代魯公之政先是有驍將李釗梁崇義者二人素齊名皆負威望會來朝京師釗得授權柄崇義不欲出其下攘城縱跡因殺而幷之代宗含垢務理未即顯戮遂署為襄陽節度是州隷焉崇義以受命之際狀不明白蒙穢跋扈二十餘年晚節謀叛無臣子道天子命淮西節度李希烈誅之希烈無妄生釁復以怒取使宿賊封有麟主張焉建中四年希烈僭逆於梁諸侯之師荷㦸四會有麟亦嬰城自守連攻不拔景寅歲皇帝厭亂淮西始定連帥陳仙奇裨將李季汶來討之季汶雅有膽畧以機擒敵以誠誓眾遂梟有麟以聞是時天子尤寶鄧為咽喉之地以為兵戎之後黎人破碎苟非賢哲不能生活乃詔尚書金部郎中王公綏而治之其始至也宣天子之恩澤使民沐浴之垂方伯之教令使民承受之然後以大誠受物以至信結物以元機運物以嚴禁肅物構壞竿為廬舍銷遺鏃為鋤耜伐蒿萊為塲圃掘腥穢為泉井交父子之歡正夫婦之倫依仁化者如水赴壑首年而富中年而教季年而政成其籍版自四千戶至於萬三千戶其藏屯粟自三千斛至數一作四萬斛其餘飾傳遽之舍作栖旅之館儲什器之用蓋餘力也先是有奉天禦侮臣十數輩上多其功既侯王之復賜得公田五十萬畝以我郡壤寬且腴將併力焉公以為鄧在邦畿千里之內詭隨授與則上以耗天子之地下以貽齊民之困堅秉古制不輸尺土此又政之殊尤者也於戲民之生也如鳥獸然饑食渴飲難馴易駭名公端士承時之平因俗之阜或以智力理之可也若移之於瘡痏毒痡之後非德信積中和粹發外以誠被物如父愛子則何以臻於此夫人君在上百辟在下其欲正生人之性命敷大中之教化扶淫僭之風俗行明白之刑賞非有功者則不得操其柄焉故刺史於他官為重漢制秩中二千石冠進賢銀印青綬隼旟龍節蓋所以大其威而昭其德也今天下郡國僅四百餘所上憂黔首垂意於理有淳政被民者增秩賜金如漢宣帝時濟濟多士作民父母遐邇一德同思於理則雍熙仁壽之化豈其遠乎載寓遊樂土聞公撫凋瘵之民也善故書宇下以貽為政或足文行佞亦無取焉自貞元二年夏五月郡公名氏品秩遷授雄劇年代寖遠亦列敘其次使將來者覽之端如貫珠也五年八月十五日記錄事參軍之於郡縣紀綱也車轄也綱弛則目疎轄抗則載輸政之成敗亦繇是也自漢魏以還歷江左郡有督郵主簿後魏北齊後周隋文州有錄事參軍煬帝時罷州置郡有東西曹掾主簿國朝省掾主簿復為錄事參軍其於勾稽失糾謬省抄目守符印一州之能否六曹之榮悴必繫乎其人也其人強其務舉其人困其務削循名考實豈容易哉况潯陽古郡也地方千里江涵九派緡錢粟帛動盈萬數加以四方士庶旦夕環至駕車乘舟疊轂聯檣威猛則騰口以飛訕阿懦則腹非而生誚重輕之得尤難其人隴西李尹少昌切玉刜鐘之利也恪勤強毅當官而行其於公家也不掩善以蔽才不隱過而貸非不苛細以作煩不濶畧而破方剛柔疎緻雅得其度繇是官府有程準案牘無畱閒遊我宇下清風凜然是時郡守李公以鉅鹿超異之政來領此郡內用六條外理百姓使人人門戶興行孝睦井賦均一然後從容郡閤時與羽衣縫掖講黃老言其餘枝葉節目委於有司而不領故李君得以息心奉法上事牧守下督寮吏暢於中發於外人無間言也夫士無貴賤尊有道也位無大小觀有政也苟素飱碌碌俾躬處厚祿雖多亦奚以為是宜書錄事之美於壁間聳善而儆不肖蓋春秋之微旨矣先是此庭此宇荒凉褻黷端士不履今前後有修竹左右有廊廡穆然清邃皆自我焉聊記述之序遂以李君為首亦所以重績而新廳也天時有晦明人情有舒慘或感瘁交搆鬱凝不發非登高遠眺望則無以疎達其氣導沖和之性焉藹藹襄陽山水之鄉征南興峴亭之賞賢王造北樓之勝緬邈千載遐襟一致靜操其旨得不根柢於是乎然勢勝則同制作迺異請得本末而言之先前之人公舍之內特達危榭以王褱碩之材樹窪雜之地左右蘙薈顧視生熟人莫能登甚無光輝我公懷之思有所致會異日官府無事擕鄒生枚叟之客高步縱覩於城之墉次於北隅大獲偉地公竟符曩意據陴不去元機一發樓在吾目由是振陳成新拔卑為高經營鼓智才力什一笑抃之下峨峨橫空襄人駭之謂靈物佐助不然者何以不殫貨不峻程不罷民而成不朽之績容易若此之甚也夏五月辛巳公欲亟逞遐矚亦既樂只為食肴酒聚賓而登之異其勢隱軫氣崇融上乘百雉旁壓萬井飛陛虹指長檻雲截陵昭回而永睇關萬態之紛糾楚山無際漢水遠去郢門商雒微茫天外當是時大火炎炎里閈如燔更簟驟盥躁灼不解及其燕也即窈靄靜深端和肅清輕飇四來衝闥動扃座賓相顧如在顥氣况乎春之發舒秋之泬寥固不言而勝矣壯而不侈謂之範作而不費謂之智登降有序謂之禮享宴有惠謂之仁道崇者聲輝位大者物舉搢紳君子咸謂為此樓與羊公峴亭不沒矣若掘客土斬異材礱他山之石奪齊人之力肆浩蕩之觀窮靡嫚之樂實曰涼德賈謗不暇亦文者何述焉野人鯫劣備詳公明白之實敬揚休休為來者大猷五年六月十五日記人之氣剛而直靈而無方欲其全也唯其所養故處卑陋則痾恙慘怛而邪僻戾生焉居高明則遐曠博大而和平康樂生焉其或將移志氣張耳目聳形體使百祥九德沛然洋溢臺觀不作孰為起予是以我尚書劉公有麗譙之制建嘉名者其有旨乎曰太乙五福遊乎神宮之三年也先是茲樓北嚮之廳也穹崇宏敞實惟古制公之家每斷大事行大宴威儀四設必在於是搢紳籩豆陳乎上麾幢鐘鼓羅乎下雖庭階燦爛誠則偉矣而直視南墉雲物悠然蒼茫雉堞若生遠思以聰明斡材智以光華照城壁百堵之上忽生飛樓連甍水臼栱攢倚碧空離坎之地新陳對列相與饒借赫然公府自下而望之也若鼇山冠雲蜃氣橫天霓裳鶴駕縹緲髣髴及其登也居顥氣之中坐青霞之側惝恍自顧謂生羽翼二江東注萬井如畫耳聞天語目視鳥背雲山嶔岑山與雲齊風從中來肌骨淒淒於戲勝不終屈必有伸也天作蜀國殆萬餘祀前人厥陋我能補之恢賢豪之軌躅成藩閫之雄觀何其英特也公涯岸氣業傑出無侶神用迅密參乎化機嘗以至公篤信佐故太尉之幕二十年矣賓主神交中無猜腸薨落之際以柄授手居無幾今天子雙旌千乘而褒寵之熊羆井絡實為天府號令政化風行雷動自纓弁至於椎髻鮐背至於稚齒莫不冠帶其法制飲食其恩信曾未周歲炎炎休聲然後結構之興出我餘力况其新棟宇重威容也陳享宴均慈惠也肆觀覽省風俗也采謳謠裨政教也豈止窮歡娛供視聽臨江遲客當宵待月而已哉有部從事符載揚盛迹刻貞石鎮梁益使百世君子知五福之巍巍也峯巒不巉峭無以為泰華院宇不嚴麗無以為梵閣此寺之有此院猶頭之戴冕弁目之懸眸子有闕是者謂之禺昂丈夫其實誣之矣蜀郡豪也其民侈而夸者有之其土腴而譁者有之偶得靜地黃金以梯梵閣據龜城犀浦之間背郭六七里而遙擺喧傲俗己有真趣及履吾之精院也非天雲而高非川澤而深非江海而遠非山林而靜滿庭多修竹古樹喬柯密葉扶疎膠轕其下向有茅齋洞啟晨朝日出光照屋棟一聞鐘磬焚香掃地其心泠然也亭午無人經行林中凡鳥不來時聞天風其形飄然也沈沈子夜清宵敻絕唯餘皓月鋪軒洞牖其氣凝然也夫人之神不靈者耳目泥也居處蕪也思慮昏也苟身棲清淨之域目睇澄鮮之境心遊寂寞之地雖妄想有金城湯池之固不得與吾為敵矣余為六塵組織因於懺洗嘗與一二善友跳身此來高僧達客微言相誘剎那之下我得本性况復主人棲處偃仰動淹星歲哉院主姓瞿氏真釋種也行業如主璧標韻如松鶴毗尼大藏啟其關鎻壇塲之上鬱有風稱弟子以羸漏之質入旃檀之林臭聞馨香身意快樂故書美以示於道流欲使後之君子遊其地覩其文明其人知余詞之不鹵莽也丁亥歲正月辛卯國家郊天之日也試太常寺協律郎攝監察御史符載厚之記朗州桃源桃花觀南岳黃洞元居焉有弟子姓瞿字柏庭年十四太和未散嗜慾不入傲然懷厭世之志大歷四年庚寅歲自辰溪來稽首宇下願蔭道域厠役隸之末仙師以慈物軫慮遂許之雖處童孺給侍甚謹在醜不美率性恭默每旦暮仙師修朝拜之禮攝齋莊之色焚香搥磬叩頭擎跽如臨君父如是者積一二歲不衰矣或徃徃獨行入谿洞中根究深處信宿方返仙師讓之輒云偶造佳地遭遇神聖覩雲氣草木屋宇飲食使人澹然忘情不樂故處因求願偕徃仙師曰靈仙之府必在左右然尚幼小謂所至之地不即爾也無何有丹砂之役領至襄陽市闤闠之下齊人浩擾則瞑目不視神氣醉泥返至逆旅通宵而後醒問其故捧手對曰太樸散壞者久矣今之人圓冠方屨以詐相尚以利相市余所不堪方大駭其說不敢以常僕僕之其後數以前事請仙師亦有意將逝屬暑雨壞道不得果去八年癸丑夏五月甲辰晦正衣服拜訣於戶外自言靈期逼近難可畱止請自是往至日月合於鶉首復近於茲地焉仙師少加撫愛未即聽遣室有同學道士朱靈辨者恐童子精神懾懦為妖邪所攻將欲載丹筆符而禦之童不懌且多傲詞云他辰之相見歲在降婁矣庭際有大栗樹遠人不過數仞遂背行冉冉從樹旁滅沒化去有聲隆然如風飄雷震眾以為事出言妄怪愕失次馳告鄰落共四圍而索之千崖沈沈漠然無聲洞西行一二里有巨蛇威猛甚盛自道中拖腹橫據勢不得近次至於東隅見右足八指羅印於地上折弱篠八枝縱橫插植若誌冥驗之數餘不復覩先是未潛景之日割芝圃間獲珉石圓大如五銖錢朗瑩可愛跪而授師曰此秦客所棄棊子也幸加秘護後有符契仙師靈辨狀之不昧惜向時之無斷俛然發篋復覩故物其慙愧慕望者可勝言哉後經時曾白晝假寢輒幻罔而至備申摳衣之敬診其容態但以承事尊上為疲耳至於日者之約無替焉仙師以建中元年自武陵卜居於廬山紫霄峯下古壇石室高駕顥氣載弱歲慕道數獲踐履其域話精微之際得與聞此太息良久自感悟曰神遠人乎哉道遠人乎哉夫瞿氏之子受天之氣生人之世百骸六臟非有卓然異色也以一誠之志唯巖洞是慕彼秦人之宅尚得而徃况仙師遁跡空山垂二十年根之以渾元守之以太和遺肢體冥耳目息歸於踵神舍於素窈窈冥冥中含至精方將入天地之門遊化初之原磅礡萬物不見其眹豈遲鸞鶴之馭而滿其道歟門人先徃而師資尚淹畱塵世天其意者以時人溺於羶腥汨亂正氣多札瘥夭昏之患使布陰德大拯生命符三千之數耶弟子風波之民不能自拔泥淖繼芳金籍徒以區區文字紀其糟粕不亦悲夫然庶示於好事者共為起予之地耳貞元元年八月二十日符載記南雍州地靈氣爽號為雄勝峴山漢水環抱里閈東西主人有問於我我或致讓其地荊揚淮楚之不侔也繇是侍御史張公得風景之高朗依連帥之仁愛遂此一廬作為宅居居有園園在萬山東五六里檀溪西三百許步南值漢高廟正相當佛宮數四與岑巒邐迤蒼蒼松檜盡為庭木前有名花上藥㣥敷簇秀霞鋪雪灑㶑灔清波後有含桃朱杏的皪蔭靄殊滋絕液甲冠他囿每天清雲淨雨霽風息山僧羽客洎竹替纓好事者亟來從之開軒設簟耳目袪曠煮茶摘果動至酣樂出門為人寰宴居成山林適自中得萬累何遠故公用是上才草聞風聲舊齒曩曹翰飛青冥令手操財賦之柄心寓希夷之際人謂官薄我有浩氣屈伸通塞頹如也即西園之地實張公營道之塲也是何棲心拔俗之遐曠也如此載匡廬遁客目遊履踐故輒書眾美於素壁之上使異日造辟疆者遂用之為導云丁丑歲六月庚午推歷者以為金畏火而伏之日也符載厚之記雷霆風雨蕩陽之積也河海川谷洩陰之凝也樓觀臺榭宣人之滯也天氣鬱則雨曜不明地氣塞則萬物不生人氣壅則百神不靈我常侍李公架崇岡作新亭導百骸理七情用斯義也况斯郡也翼軫之所照燭江湖之所潀射扼七城控百越地侔千乘艘駕萬舳王臣聘客環至吾府將有以省風而修好也我有善地不築不蓋我有樽酒不斟不酌其將欲斂詩人葛屨之刺乎甚不然也先是東湖汗漫與江邊際秋潦備助人憂為魚故相齊公築塘以禦之厭殺水勢且便車馬盡績則懋為塗或微而洪之民蓋累鉅萬口噫息雷動噓氣霧散繇是行里者駢肩礙踵不得周旋焉我常侍作橋以張之其修也可以發二矢其廣也可以方兩軒結搆高標揭蘖孱顏白晝晴虹東西竟天恢里閈之迫隘通鄉遂之迴環千輪馳萬蹄驅渾渾浩浩水流飇駭盛矣哉澤民利物如是其偉也公樂斯橋之豪大慨斯橋之孤峙常欲建亭卜勢迭為光華會春物含秀嘯領賓從亟來乎其上相與牽率履行而東連岡萃然橫我步武以為茲地必答前志喜形於色竦身而登之即果若真宰以萬古之勝待我矣平㘭漏削涯岸鴻盤數仞不知抔土真天造也公蹔紆密思計校呈狀萬材已構他人不知於是匠受令吏受命談笑眄睞而亭成其望也神張其登也形端其高也渠渠其邃也耽耽橫四棟以燾奡闢八扉而呀豁飛廊連軒以翼翥旁舍杳靄而雲合然後迴首永睇從風開襟當軒萬井直視千里西山邐迤橫擁遼敻占護蒼翠古來無人一朝此地盡得歸我每良辰嘉客思有宴賞輒具肴酒共為歡娛天晴日宴湖光入座寂寞虛徹眇然四去或無鳥過不辨空水於戲牧鍾陵之民五改火矣首年而衣食富二年而姧慝禁三年而禮讓興大抵以清淨惠慈為理本剛明正直為化基與民同欲萬戶一令遂用無事里中或謠曰李公不愉吾何以居李公不室吾何以逸夫如是即斯亭斯榭士林君子猶以為固歟異日捧飛詔擁丹轂霈然為霖沃旱濡焦彼甿之斑白童稚徘徊於階墀軒闥者即羊公之峴首召伯之棠樹謳歌思慕尤在永久而不在茲日也載嘗忝從事重遊舊所猥獲登踐陋顏一開顧茲盛美瞽矇有頌然事光而材薄多見其不知量矣是亭居東湖之上因請諡之曰東湖亭諸侯之封茅受土荷天子心膂之寄者有旌旗車服之盛有生殺賞罰之重宜有以鼓鐘池榭而張大之况長沙大郡也江山亘千里道途控百越有主人焉有大賓焉渾渾四來擊檝摩軒主人苟不以享讌觀遊而禮之者即詩人以為褊故我有東池之製焉壬午歲皇帝命御史中丞楊公領湖南七郡之地公方厚簡重氣岸恢大以文章禮樂藻績德義踐右史歷文昌登少常伯朝廷之休聲茂績沛然也以素望膺盛拜故捧詔之日公卿賀登車之日道路喜下車之日童老慶朞月而苛細去周歲而兵食足三年而風俗清即觀遊池沼之作出於餘力矣先是佛廟之旁有泉沚焉陰流沮洳不能措杯於其上加以隙田數百磽瘠滲漏不產嘉穀莞莎蒲稗狼藉紐織公以重價償僧而求之僧滿志也於是相地形鑿水路掘卑壤築高岸盡東其勢渟深注淺公以美利僦民而營之民悅隨也居是累月池成大水既瀦長江闕二字平澄無邊天空境明一來窺臨百骸以清江湖思遠著人襟靈右有青蓮梵宇巖巖萬構朱甍寶剎錯落青晝左有灌木叢林陰藹芊眠不究幽深四時蒼然柯葉吟風聲若哀絃自北徂南敻邈悠悠鸛鶩鳧鷖差池淹流太陽晨曦金波瞑浮氣象詭怪恍惚瀛洲湘西有山黛色沈沈或時無風影墮池心中間乃背城闉之局束追風物之遐曠盛嘯賓客泛舟而遊駐彩旌動蘭橈逍遙遠去興隨趣往縈涯繞嶼不記㳂沂晤言始歡間以壺觴絲桐緣雲以凄切羅綺從風而翠燦有美一人蛾眉嬋娟綺袖自障清歌采蓮聲發波中宛宛神仙當是時憂者泰褊者曠勞者逸惽者爽豁七情之底滯蕩百靈之疴恙豈比夫高陽習家之醉同年而語哉何長沙之卑濕貽搢紳君子之慮也夫賢達之蘊才智也不得其時即騰陵宇宙鼓鑄萬物且茲地也朝為蹄涔夕為蓬壺茫茫平地波瀾在我識者覩公之為事也量細以度大詳近以徵遠伏知異日必能成天下之務利天下之物斡運元化燮調正氣致君雍熙與咎夔為徒者於此而見之矣載頃年廬岳嘗辱公顏閔之顧賀榮拜寵自舊山以來拂拭孱弱屢陪遊泛覩盛美而不書者君子或以為闕也乃抉謏才頌賢能以耀乎將來者也夏口至西南四百里其山曰西塞其鎮曰土洑山鎮相距可百餘丈崖岸中斷呀然摩霄大江浩浩橫注其下其餘控荊衡走揚越氣雄勢傑岡連水匯者蓋數千里此天用設險於吳楚也苟邊將不虔化為豺狼以一鼓之鐵一邱之木撐鬬鍵鏁絕流東溢則江介之勝吞八九於鎮中矣在昔僭吳偏宋或攻或守年代紛綸莫可悉數永泰中代宗以董秦為淮西節度是鎮隷焉秦素兇戇昧懵王度乘先朝寬大之典幸是地咽喉之固雖無跋扈之志而多割剝之暴至於士民工商連檣如雲必將沿於斯泝於斯主守者乃高其門閎厲其威容恣好吏巧誣聽部伍強丐誤差毫釐誘入罪地輸其緡錢魚鹽丹漆羽毛小則半取之大則竭索之愁痛之聲雷動宇內小人君子咸謂為蠻貊之域無何李希烈自裨將驅除董秦奪其兵柄其土洑之民方組織禍階軍食不足督索之酷倍百前政甲子歲希烈大逆不道皇帝震怒命宗臣曹王臯肅將天威詰誅暴亂節制江西之事春二月王乞靈宗廟一戰而克故是鎮復歸於我遠近皆輟涕為笑姁愉相賀枯骸瘠體脫去擔負然否則傾矣而未甚泰元年夏四月國家裂諸侯之地俾大夫盧公藩壤沔鄂以江蘄等六大郡屬之車始至而沴氣肅清令始設而軸轄滿盈和始扇而魚鼈不驚浹辰之下舊染汚俗咸與保寧矣昨野人出自山林來謁上郡帆次於檻側卒不識禁將不呵問無逗遛於時無裒斂於貨向至暮夜則漁者唱樵者和蕩蕩然罷鳴柝吠犬之驚於戲昔登太行摧輪之險今踐通衢如砥之泰非所托遇仁賢所守用德義則孰能致此歟是知王者之御四海得賢而治失人而亂諸侯之守封畧以德則固恃險則亡其猶影響耶况大夫寬仁惠和文武光明存易簡為約束萬夫知禁倚誠信為政令千里自化變我澆俗寖為貞淳若察近以遠則他日手持陶鈞心運動植嗤嗤橫目知受其大賴矣小子感前後之殊事樂人庶之服悅故為保寧記以獻敢無愧詞貞元景寅歲夏五月三日山客符載記甲子歲我王克蘄春之明年也是時天子居梁州丞相司徒勉出於陳畱逆豎乘是遂為六合鯨吞虎踞使宿賊杜少誠長短兵三萬方將拔蘄取黃濟江而南至於五嶺盡以天子之地懸自受署焉春二月逆師自穆陵陰山白沙三大關支下而進威聲炎炎如無枝梧緣道邏守已陷六七我師洶然少阻氣勢王感慨激三軍沈畧通神明以為是鎮地勝而險固卒薄而孱弱彼必知我將銳志而圖之設伏眾戎盡殪可也乃命兵馬使伊慎傑帥驍悍四千人銜枚宵入張諸柵之卒伏於莽間賊躶闕來以蝥弧偕登於是中軍一鼓萬夫雷呼內兵乘高而唐突之伏卒陵背而芟割之紅旗拉風長㦸如倚晨暮三接朱殷谿瀆獲馬牛百萬蹄斬首數千級其餘斃踣瘡痏皚皚枕籍者遂大築京觀以為武功焉由是氛霧蕩八方日月麗大幽兇醜懷締搆江淮完性命江淮而南父子夫婦無僕虜之患皆一舉之力也故自希烈亂常天下擁兵之諸侯議鴻勳茂績者莫敢承風焉先是包大夫佶司天下之賦將自揚徂荊萬檣峩峩不得安動繄我之捷即陸驅車水方舟驚飇駭雲集貢於天王君子為我王之勳績也大宜載太常刊鼎銘豈獨續簡素而已載忝賓介厠橐鞬之末得備書事揚公休聲貞元元年七月二十日記大唐壬午歲南陽張公宰上元之二年也有甘露降於庭梧瀼瀼靄靄如雨非雨者數日縣大夫謙不敢自道其美胥徒洎邑之緇黃幼艾以狀聞於連帥連帥表奏於天子天子嘉之優詔寵答煥然光曜癸未歲復降於庭梧夏四月余自淮南罷去丞相府將假道以歸主人備勞餞之禮遂盛於杯器以示予予取前箸以嘗之即薰喉淬齒液不及咽而腑臟塗然矣輒自揣大化之精而計之曰夫天地無私也至虛也寂然不動感而遂通若御物之心誠萬人之氣和為祥雲也甘露也或御物之心淫萬人之氣寃為繁霜也苦雨也動於此形於彼自開闢至於茲日無他理矣夫如是張公之政徭賦調歟倉廩實歟風俗厚歟人民樂歟不然則何嘉祥元貺鍾於邑也如此繇是言之二千石至於六百石主有土之教化操生人之性命正即為禎祥邪即為妖沴得不嚴心直志靜操理本上答神明之旨乎茂宰之時政也張君名集某郡某里人也其餘風猷義行存乎碑頌此不書甲申歲十月一日記
