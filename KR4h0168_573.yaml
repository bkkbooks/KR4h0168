front:
  text: 全唐文欽定全唐文卷五百七十三柳宗元五
  hash: sha256:0c75a2fb5927522994c0d2046cbc2321d5fb5a795a8364c4fcc298ffba95014c
body:
  text: 二十六日集賢殿正字柳宗元敬致尺牘太學諸生足下始朝廷用諫議大夫陽公為司業諸生陶煦醇懿熙然大洽於茲四祀而已詔書出為道州僕時通籍光範門就職書府聞之悒然不喜非特為諸生戚戚也乃僕亦失其師表而莫有所矜式焉既而署吏有傳致詔草者僕得觀之蓋主上知陽公甚熟嘉美顯寵勤至備厚乃知欲煩陽公宣風裔土覃布美化於黎獻也遂寬然少喜如獲慰薦於天子休命然而退自感悼幸生明聖不諱之代不能布露所蓄論列大體聞於下執事冀少見采取而還陽公之南也翌日退自書府就車於司馬門外聞之於抱關掌管者道諸生愛慕陽公之德教不忍其去頓首西闕下懇悃至願乞留如故者百數十人輒用撫手喜甚震抃不寧不意古道復行於今僕嘗讀李元禮嵇叔夜傳觀其言太學生徒仰闕赴訴者僕謂訖千百年不可睹聞乃今日聞而睹之誠諸生見賜甚盛於戲始僕少時嘗有意遊太學受師説以植志持身焉當時説者咸曰太學生聚為朋曹侮老慢賢有墮窳敗業而利口食者有崇飾惡言而肆鬬訟者有凌傲長上而誶罵有司者其退然自克特殊於衆人者無幾耳僕聞之恟駭怛悸良痛其遊聖人之門而衆為是也遂退託鄉閭家孰考厲志業過太學之門而不敢局顧尚何能仰視其學徒者哉今乃奮志厲義出乎千百年之表何聞見之乖刺歟豈説者過也將亦時異人異無嚮時之桀害者耶其無乃陽公之漸漬導訓明效所致乎夫如是服聖人遺教居天子太學可無愧矣於戲陽公有博厚恢宏之德能并容善偽來者不拒曩聞有狂惑小生依託門下或乃飛文陳愚醜行無賴而論者以為言謂陽公過於納汙無人師之道是大不然仲尼吾黨狂狷南郭獻譏曾參徒七十二人致禍負芻孟軻館齊從者竊屨彼一聖兩賢人繼為大儒然猶不免如之何其拒人也俞扁之門不拒病夫繩墨之側不拒枉材師儒之席不拒曲士理固然也且陽公之在於朝四方聞風仰而尊之貪冒苟進邪薄之夫庶得少沮其志不遂其惡雖微師尹之位而人實具瞻焉與其宣風一方覃化一州其功之遠近又可量哉諸生之言非獨為己也於國體實甚宜願諸生勿得私之想復再上故少佐筆端耳勗此良志俾為史者有以紀述也努力多賀柳宗元白宗元再拜五丈座前伏蒙賜書誨諭微悉重厚欣踊恍惚疑若夢寐捧書叩頭悸不自定伏念得罪來五年未嘗有故舊大臣肯以書見及者何則罪謗交積㣥疑當道誠可怪而畏也是以兀兀忘行尤負重憂殘骸餘魂百病所集痞結伏積不食自飽或時寒熱水火互至內消肌骨非獨瘴癘為也忽奉教命乃知幸為大君子所宥欲使膏盲沈沒復起為人夫何素望敢以及此宗元早歲與負罪者親善始奇其能謂可以共立仁義裨教化過不自料勤勤勉勵唯以忠正信義為志以興堯舜孔子之道利安元元為務不知愚陋不可力強其素意如此也末路孤危厄塞臲卼凡事壅隔很忤貴近狂疏繆戾蹈不測之辜㣥言沸騰鬼神交怒加以素卑賤暴起領事人所不信射利求進者填門排戶百不一得一旦快意更造怨讟以此大罪之外詆訶萬端旁午構扇盡為敵讎協心同攻外連強暴失職者以致其事此皆丈人所見不敢為他人道説懷不能已復載簡牘此人雖萬被誅戮不足塞責而豈有償哉今其黨與幸獲寬貸各得善地無公事一作無分毫事坐食俸祿明德至渥也尚何敢更俟除棄廢痼以希望外之澤哉年少氣鋭不識幾微不知當否但欲一心直遂果陷刑法皆自所求取得之又何怪也宗元於衆黨人中罪狀最甚神理降罰又不能即死猶對人言語求食自活迷不知恥日復一日然亦有大故自以得姓來二千五百年代為冢嗣今抱非常之罪居夷獠之鄉卑濕昏霿恐一日填委溝壑曠墜先緒以是怛然痛恨心骨沸熱煢煢孑立未有子息荒隅中少士人女子無與為婚世亦不肯與罪大者親昵以是嗣續之重不絶如縷每當春秋時饗孑立捧奠顧盼無後繼者懍懍一作惸惸一作慓慓然欷歔惴惕恐此事便已催心傷骨若受鋒刃此誠丈人所共憫惜也先墓在城南無異子弟為主獨託村鄰自譴逐來消息存亡不一至鄉閭主守者因以益怠晝夜哀憤懼便毀傷松柏芻牧不禁以成大戾近世禮重拜掃今已闕者四年矣每遇寒食則北向長號以首頓地想田野道路士女遍滿皂隸傭丏皆得上父母邱墓馬醫夏畦之鬼無不受子孫追養者然此巳息望又何以云哉城西有數頃田果樹數百株多先人手自封植今巳荒穢恐便斬伐無復愛惜家有賜書三千卷尚在善和里舊宅宅今已三易主書存亡不可知皆付受所重常繫心腑然無可為者立身一敗萬事瓦裂身殘家破為世大僇復何敢更望大君子撫慰收恤尚置人數中耶是以當食不知辛鹹節適洗沐盥潄動逾歲時一搔皮膚塵垢滿爪誠憂恐悲傷無所告訴以至此也自古賢人才士秉志遵分被謗議不能自明者僅以百數故有無兄盜嫂娶孤女云撾婦翁者然賴當世豪傑分明辨別卒光史籍管仲遇盜升為功臣匡章被不孝之名孟子禮之今已無古人之實為而有其詬猶欲望世人之明已不可得也直不疑買金以償同舍劉寬下車歸牛鄉人此誠知疑似之不可辨非口舌所能勝也鄭詹束縛於晉終以無死鍾儀南音卒獲返國叔向囚虜自期必免范痤騎危以生易死蒯通據鼎耳為齊上客張蒼韓信伏斧鑕終取將相鄒陽獄中以書自活賈生斥逐復召宣室倪寬擯死後至御史大夫董仲舒劉向下獄當誅為漢儒宗此皆王褱偉博辨奇壯之士能自解脫今以恇怯淟涊下才末伎又嬰恐懼痼病雖欲慷慨攘臂自同昔人愈疏濶矣賢者不得志於今必取貴於後古之著書者皆是也宗元近欲務此然力薄才劣無異能解雖欲秉筆覼縷神志荒耗前後遺忘終不能成章往時讀書自以不至抵滯今皆頑然無復省録每讀古人一傳數紙已後則再三伸卷復觀姓氏旋又廢失假令萬一除刑部囚籍復為士列亦不堪當世用矣伏惟興哀於無用之地垂德於不報之所但以通家宗祀為念有可動心者操之勿失雖不敢望歸掃塋域退託先人之廬以盡餘齒姑遂少北益輕瘴癘就婚娶求允嗣有可付託即冥然長辭如得甘寢無復恨矣書辭繁委無以自道然即文以求其志君子固得其肺肝焉無任懇戀之至不宣宗元再拜月日宗元再拜獻書丈人座前役人胡要返命奉教誨壯厲感發鋪陳廣大上言推延賢雋之道難於今之世次及文章末以愚蒙剝喪頓悴無以守宗族復田畝為念憂憫備極不惟其親密故舊是與復有公言顯賞許其素尚而激其忠誠者用是踊躍敬懼類嚮時所被簡牘萬萬有加焉故敢悉其愚以獻左右大凡薦舉之道古人之所謂難者其難非苟一而已也知之難言之難聽信之難夫人有有之而恥言之者有有之而樂言之者有無之而工言之者有無之而不言似有之者有之而恥言之者上也雖舜猶難於知之孔子亦曰失之子羽下斯而言知而不失者妄矣有之而言之者次也德如漢光武馮衍不用才如王景略以尹緯為令史是皆終日號鳴大吒而卒莫之省無之而工言之者賊也趙括得以代廉頗馬謖得以惑孔明也今之若此類者不乏於世將相大臣聞其言而必能辨之者亦妄矣無之而不言者土木類也周仁以重臣為二千石許靖以人譽而致三公近世尤好此類以為長者最得薦寵夫言朴愚無害者其於田野鄉閭為匹夫雖稱為長者可也自抱關擊柝以往則必敬其事愈上則及物者愈大何事無用之朴哉今之言曰某子長者可以為大官類非古之所謂長者也則必土木而已矣夫捧土揭木而致之巖廊之上蒙以紱冕翼以徒隸而趨走其左右豈有補於萬民之勞苦哉聖人之道不益於世用凡以此也故曰知之難孔子曰仁者其言也訒孟子病未同而言然則彼未吾信而吾告之以士必有三間是將曰彼誠知士歟知文歟疑之而未重一間也又曰彼無乃私好歟交以利歟二間也又曰彼不足我而惎我哉茲咈吾事三間也畏是而不言故曰言之難言而有是患故曰聽信之難唯明者為能得其所以薦得其所以聽一不至則不可冀矣然而君子不以言聽之難而不務取士士理之本也苟有司之不我信吾知之而不捨其必有信吾者矣苟知之雖無有司而士可以顯則吾一旦操用人之柄其必有施矣故公卿之大任莫若索士士不預備而熟講之卒然君有問焉宰相有咨焉有司有求焉其無以應之則大臣之道或闕故不可憚煩今之世言士者先文章文章士之末也然立言存乎其中即末而操其本可十七八未易忽也自古文士之多莫如今今之後生為文希屈馬者可得數人希王褒劉向之徒者又可得十人至陸機潘嶽之比纍纍相望若皆為之不巳則文章之大盛古未有也後代乃可知之今之俗耳庸目無所取信傑然特異者乃見此耳丈人以文律通流當世叔仲鼎列天下號為文章家今又生敬之敬之希屈馬者之一也天下方理平今之文士咸能先理理不一斷於古書老生直趨堯舜大道孔氏之志明而出之又古之所難有也然則文章未必為士之末獨采取何如耳宗元自小學為文章中間幸聯得甲乙科第至尚書郎專百官章奏然未能究知為文之道自貶官來無事讀百家書上下馳騁乃少得知文章利病去年吳武陵來美其齒少才氣壯健可以興西漢之文章日與之言因為之出數十篇書庶幾鏗鏘陶冶時時得見古人情狀然彼古人亦人耳夫何遠哉凡人可以言古不可以言今桓談亦云親見揚子雲容貌不能動人安肯傳其書誠使博如莊周哀如屈原奧如孟軻壯如李斯峻如馬遷富如相如明如賈誼專如揚雄猶為今之人則世之高者至少矣由此觀之古之人未必一作始不薄於當世而榮於後世也若吳子之文非丈人無以知之獨恐世人之才高者不肯久學無以盡訓詁風雅之道以為一世甚盛若宗元者才力缺敗不能遠騁高厲與諸生摩九霄撫四海夸耀於後之人矣何也凡為文以神志為主自遭責逐繼以大故荒亂耗竭又常積憂恐神志少矣所讀書隨又遺忘一二年來痞氣尤甚加以衆疾動作不常眊眊然騷擾內生霾霧填擁慘沮雖有意窮文章而病奪其志矣每聞人大言則蹶氣震怖撫心桉膽不能自止又永州多火災五年之間四為天火所迫徒跣走出壞牆穴牖僅免燔灼書籍散亂毀裂不知所往一遇火恐纍日茫洋不能出言又安能盡意於筆硯矻矻自苦以傷危敗之魂哉中心之悃愊鬱結具載所獻許京兆丈人書不能重煩於陳列凡人之黜棄皆望望思得效用而宗元獨以無有是念自以罪大不可解才質無所入苟焉以敘憂栗為幸敢有他志伏以先君稟孝德秉直道高於天下仕再登朝至六品官宗元無似亦嘗再登朝至六品矣何以堪此且柳氏號為大族五六從以來無為朝士者豈愚蒙獨出數百人右哉以是自忖官已過矣寵已厚矣夫知足與知止異宗元知足矣若便止不受祿位亦所未能今復得好官猶不辭讓何也以人望人尚足自進如其不至則故無憾進取之志息矣身世孑然無可以為家雖甚崇寵之孰與為榮獨恨不幸獲託姻好而早凋落寡居十餘年嘗有一男子然無一日之命至今無以託嗣續恨痛常在心目孟子稱不孝有三無後為大今之汲汲於世者唯懼此而已矣天若不棄先君之德使有世嗣或者猶望延壽命以及大宥得歸鄉閭立家室則子道畢矣夫是而猶競於寵利者天厭之天厭之丈人旦夕歸朝廷復為大僚伏惟以此為念流涕頓顙布之座右不勝感激之至宗元再拜應叔十四兄足下比得書示勤勤不以僕罪過為大故有動止相憫者僕望巳矣世所共棄唯應叔輩一二公獨未耳僕未之罪在年少好事進而不能止儔輩恨怒以先得官又不幸早嘗與遊者居權衡之地十薦賢幸乃一售不得者譸張排恨僕可出而辨之哉性又倨野不能摧折以故名益惡勢益險有喙有耳者相郵傳作醜語耳不知其卒云何中心之愆尤若此而已既受禁錮而不能即死者以為久當自明今亦久矣而嗔罵者尚不肯已堅然相白者無數人聖上日興太平之理不貢不王者悉以誅討而制度大立長使僕輩為匪人耶其終無以見明而不得擊壤鼓腹樂堯舜之道耶且天下熙熙而獨呻吟者四五人何其優裕者博而局束者寡其為不一徵也何哉太和蒸物燕谷不被其煦一鄒子尚能恥之今若應叔輩知我豈下鄒子哉然而不恥者何也河北之師當巳平奚虜聞吉語矣然若僕者承大一作天慶之後必有殊澤流言飛文之罪或者其可以巳乎幸致數百里之地使天下之人不謂僕為明時異物死不恨矣金州考績巳久獨蔑然不遷者何耶十二兄宜當更轉右職十四兄嘗得數書無恙兄顧惟僕之窮途得無意乎比當大寒人愈平和惟楚南極海元冥所不統炎昏多疾氣力益劣昧然人事百不記一捨憂栗則怠而睡耳偶書如此不宣宗元再拜思謙兄足下昨祁縣王師範過永州為僕言得張左司書道思謙蹇然有當官之心乃誠助太平者也僕聞之喜甚然微王生之説僕豈不素知耶所喜者耳與心叶果於不謬焉爾僕不幸嚮者進當臲卼不安之勢平居閉門口舌無數况又有久與遊者乃岌岌而造其門哉其求進而退者皆聚為仇怨造作粉飾蔓延益肆非的然昭晰自斷於內則孰能了僕於冥冥之間哉然僕當時年三十三甚少自御史裏行得禮部員外郎超取顯美欲免世之求進者怪怒媢嫉其可得乎凡人皆欲自達僕先得顯處才不能踰同列聲不能壓當世世之怒僕宜也與罪人交十年官又以是進辱在附會聖朝宏大貶黜甚簿不能塞衆人之怒謗語轉侈囂囂嗷嗷漸成怪民飾智求仕者更詈僕以悅讎人之心日為新奇務相喜可自以速援引之路而僕輩坐益困辱萬罪橫生不知其端伏自思念過大恩甚乃以致此悲夫人生少得六七十者今已三十七矣長來覺日月益促歲歲更甚大都不過數十寒暑則無此身矣是非榮辱又何足道云云不已祗益為罪兄知之勿為他人言也居蠻夷中久慣習炎毒昏眊重膇意以為常忽遇北風晨起薄寒中體則肌革慘懍毛髮蕭條瞿然注視怵惕以為異候意緒殆非中國人楚越間聲音特異鴂舌啅譟今聽之怡然不怪已與為類矣家生小童皆自然嘵嘵晝夜滿耳聞北人言則啼呼走匿雖病夫亦怛然駭之出門見適州閭市井者其十有八九杖而後興自料居此尚復幾何豈可更不知止言説長短重為一世非笑哉讀周易困卦至有言不信尚口乃窮也往復益喜曰嗟乎余雖家置一喙以自稱道詬益甚耳用是更樂瘖默思與木石為徒不復致意今天子興教化定邪正海內皆欣欣怡愈而僕與四五子者獨淪陷如此豈非命歟命乃天也非云云者所制余又何恨獨喜思謙之徒遭時言道道之行物得其利僕誠有罪然豈不在一物之數耶身被之目覩之足矣何必攘袂用力而矜自我出耶果矜之又非道也事誠如此然居理平之世終身為頑人之類猶有少恥未能盡忘儻因賊平慶賞之際得以見白使受天澤餘潤雖朽枿敗腐不能生植猶足蒸出芝菌以為瑞物一釋廢錮移數縣之地則世必曰罪稍解矣然後收召魂魄買土一廛為耕氓朝夕歌謠使成文章庶木鐸者采取獻之法宮增聖唐大雅之什雖不得位亦不虛為太平之人矣此在望外然終欲為兄一言焉宗元再拜杓直足下州傳遞至得足下書又於夢得處得足下前次一書意皆勤厚莊周言逃蓬藋者聞人足音則跫然喜僕在蠻夷中比得足下二書及致藥餌喜復何言僕自去年八月來痞疾稍已往時間一二日作今一月乃二三作用南人檳榔餘甘破決壅隔大過陰邪雖敗已傷正氣行則膝顫坐則髀痺所欲者補氣豐血強筋骨輔心力有與此宜者更致數物忽得良方偕至益喜永州於楚為最南狀與越相類僕悶即出遊遊復多恐涉野則有蝮虺大蜂仰空視地寸步勞倦近水即畏射工沙蝨含怒竊發中人形影動成瘡痏時到幽樹好石暫得一笑已復不樂何者譬如囚拘圜土一遇和景負牆搔摩伸展支體當此之時亦以為適然顧地窺天不過尋丈終不得出豈復能久為舒暢哉明時百姓皆獲歡樂僕士人頗識古今理道獨愴愴如此誠不足為理世下執事至比愚夫愚婦又不可得竊自悼也僕曩時所犯足下適在禁中備觀本末不復一一言之今僕癃殘頑鄙不死幸甚苟為堯人不必立事程功唯欲為量移官差輕罪纍即便耕田藝麻取老農女為妻生男育孫以共力役時時作文以詠太平摧傷之餘氣力可想假令病盡已身復壯悠悠人世越不過為三十年客耳前過三十七年與瞬息無異復所得者其不足把玩亦已審矣杓直以為誠然乎僕近求得經史諸子數百卷嘗候戰悸稍定時即伏讀頗見聖人用心賢士君子立志之分著書亦數十篇心病言少次第不足遠寄但用自釋貧者士之常今僕雖羸餒亦甘如飴矣足下言巳白常州煦僕僕豈敢衆人待常州耶若衆人即不復煦僕矣然常州未嘗有書遺僕僕安敢先焉裴應叔蕭思謙各有書足下求取觀之相戒勿示人敦詩在近地簡人事今不能致書足下默以此書見之勉盡志慮輔成一王之法以宥罪戾不悉某白
