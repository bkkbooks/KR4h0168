front:
  text: 全唐文欽定全唐文卷八百八司空圖二
  hash: sha256:6a9ba75b1d0891d74afa7a5a29d3e593787a7cdbfe1edb3ad5bbdcaab5003d23
body:
  text: 辨於微而能制之者勢也審乎要而能備之者險也勢所以決用奇之智險所以濟經久之謀雖英豪復生亦毋以易此論也愚中外家世究天人之際而不肖者更闕文自喜不能屈已以救時他日雖苟行亦不可屈已失之機矣苟危極而變當寄之後生者耳煨燼所殘尚存賈僕射耽方域之志披圖校驗成敗可知以是懇懇未能默巳千載之下必有知吾言不昧者司空氏寮鶴亭記夏滿不雨民前後走神所刳羊豕而跪乞者凡三而後得請民大喜且將報祀愚獨以為惑何者天以神乳育百苗穀必時既豐然後民相率以勞神之勤於是而祀焉今始吝其施以愁疲民是神怠天之職也必希民之求而遂應是神玩天之權也既應而俾民輸怨於天歸惠於巳是神攘天之德也推怨何以為義利腥羶之饋何以為仁怠天下之事何以為敬蔑是數者何以為神假曰非吾所得顓然知民之情而不時請於上是亦徒偶於位此愚所以惑也噫天不可終謾民不可久侮竊為神危之奈何自古事冠人倫世綿鳳紀庭列鼎鐘家傳踐履江左雄張山東闊視王則七世侍中楊則四人太尉雖榮開國承家未若因官命氏兒郎偉峩使主炳靈標秀應瑞生賢虹騰照廡鵬運摩天雕彩泫甘綴齒牙而含咀顛龍倒鳳榮肺腑而盤旋千般事豈勞借筯萬里程可在著鞭不學呂望竿頭釣他將相不作李膺船子詐道神仙夫人班濬發金縷延長令儀淑德玉秀蘭芳軒冕則不饒沂水官婚則別是晉陽兩家好合千載輝光兒郎偉且子細思量內外端相事事相親頭頭相當某甲郎不誇才韻小娘子何暇調粧甚福德也甚康強也二女則牙牙學語五男則鴈鴈成行自然繡畫總解文章叔手子已為卿相敲門來盡是丞郎榮連九族更千箱見卻你兒女婚嫁特地顯慶高堂兒郎偉童童遂願一一誇張且看拋賞必不尋常簾下度開繡闥帷中踴上牙床珍纖煥爛龍麝馨香金銀器撤來雨點綺羅堆高並坊牆音樂嘈囋燈燭熒煌滿盤羅餡大榼酒漿兒郎偉總擔將歸去教你喜氣揚揚更扣頭神佛擁護門戶吉昌要夫人娘子賢和會事安存取個國家可畏忠良伏以聖感至誠祥符吉夢久期瞻仰輒用莊嚴上以報罔極之恩下以遂平生之願亦冀仁滋庶類福必旁臻且自叨竊一名曉夕三省慮增隱匿有負深知以此歸心誠無愧色必也行欺暗室業墮分陰飾僞沽名伏機稔惡於家則崎嶇自奉忍骨月之饑寒於國則苟且求容啄生靈之膏血是乃神惟必照鬼得而誅敢將有釁之身曲纍無私之照至若見持蹇分將觸禍機或不幸以逢尤或求金而受毀即常希擁佑必保孤危况積疹初平殊恩有自置齊生日用表成功所期劫蓋微塵不竭依投之懇慶流末裔共成香火之緣粗寫丹誠仰回元鑒夫萬殊苦惱神慈普救於幽冥十會區分王道同歸於平等當觳觫求哀之地是噞喁就涸之時闢夷路於前程遏勝波於沸鼎欲使天人共感存沒均休乃此日設齊之意也况屬豐穰方登仁壽宜屬大衆共締良因無緣則三道寶階如登劍樹有願則十方淨域便越塵區今則妙供巳陳散花乍雨維摩赴會捧瑞露以同沾羅漢飛空曳危峯而亦至齊衆某等或轅門上列或金穴豪家將雛則驥子超㣥命侶則龎眉狎至軒車競路士女傾城法鼓雷硠震泉扃而動鑰天香馥烈擁日氣以盤空於是跪捧寶爐連枝玉軸冀將功德奉事莊嚴伏願諸王及五道六曹真官永作尊神益匡善道使幽冥共仰靈蠢知歸緡繒不讓於樂輸齊潔復申於衆懇諸曹並受㣥品旁沾伏覬過去尊靈見存家眷皆憑護念免怖沉淪恃王心而若恃私心觀地府而如觀天府必致清涼山上逢異鳥而先告吉祥黑暗空間遇神光而別回照爥雖營魂遊岱去住無常而苦海登舟寃樂共濟生生隨願免在殊鄉處處安居便同極樂凡聞誦梵遽脫羈愁用顯含靈咸蘇密網竊以化化無窮遞成遷染孜孜不倦方導沉淪啓祕藏而演毗尼熏戒香以消煩惱風波未息橫智鷁而難超繩墨可遵制心猿而有漸豈容穿鑿但致紛拿雖設諭於三乘同歸覺路蓋防微於㣥品共禀成規泛灑六塵攝持萬行寧俟空林宴坐方為解脫之門令必大地周遊皆詣清涼之境蓋能仁之警策也今者以日光舊疏龍象宏持京寺盛筵天人信受迷後學競扇異端自洛城罔遇時交乃楚印本漸虞散失欲更雕鎪惠確無愧專精頗嘗講授遠欽信士誓給良緣所希龜鏡益昭津梁靡絶再定不刊之典永資善誘之方必期字字鐫銘種慧良而不竭生生親眷遇勝會而同聞敢欺福報之微願允標題之請謹疏非才非聖過泰過榮一舉高第兩朝美官遭亂離而脫禍歸鄉里而獲安門戶粗成簪纓免絶四十八年已往未省歸心百千萬劫常來豈迷善道今終可保止絶何傷災疾所縈古今常理但雖勤懺悔未去羶腥大宜均罪於鼓刀小合誤傷於失手况蚊虻之類屢有傷殘僕乘之勞時加箠楚或存或沒若重若輕並願各遂逍遙永祛寃結目前眷屬世世相逢身後林泉生生自適仰慈悲之宏誓成幽顯之勝因蠢動有情沾濡共泰蓋聞元台秉粹真極設官貫日星而洞六幽攝品彙而尊三府雷鞭電抶未窮搜逖之威鬼伏神藏盡在指撝之列容光必照暗室難欺人倫知教義之宗天吏振綱條之目密宏善貸普濟㣥生固宜上報君親下援戚屬士冖䂞千金而喜捨盡鑄尊儀傾百寶以裝成別崇祕殿共伸虔懇永締良緣使人面狗心不殘賢而害善銅頭鐵額自折角而摧牙免陷危機皆逢懿網况此觀地連名嶽境勝元都在歷覽而可知乃衆星之所集一池菡萏時時而雪裏生香五夜沉寥往往而峯前仙樂聞於盻蠁雅合歸依今則自屬時艱多嗟力罄壞簷不葺朽壁難朽蒙塵而廟貌全隳蘚駁而天衣半褫莫能起敬但速退殃將希保佑之功合發修崇之誓倘使丹青克煥結搆重新必憑香火之因永拔沉淪之苦幽明洞感罪疢咸祛家遊不死之鄉國慶無疆之祚烹妖斫魅免助虐於三蟲控鶴羈龍笑摧枯於一鹿別置金天之社長為玉帝之神凡願列名庶同不朽知道非詩詩未為奇研昏練爽戞魄凄肌神而不知知而難狀揮之八垠卷之萬象河渾沇清放恣縱橫濤怒霆蹴掀鼇倒鯨鑱空擢壁琤冰擲㦸鼓煦呵春霞溶露滴鄰女有嬉補袖而舞色絲屢空續以麻絇鼠革丁丁焮之則穴蟻聚汲汲積而成垤上有日星下有風雅歷詃一作詆自是非吾心也隋大業間房公李公魏公同師文中子嘗謂其徒曰元齡也志而密靖也惠而斷徵也直而遂俾其遭時致力必濟謨庸厥後果然宜有贊激云三賢志同夙尚儒風以值公忠出遇太宗諷議從容謀蹶㣥雄君勞臣惕荒夷阻闢百千年社稷萬仞峩山之險爭竦禍梯一坑浮世之塵長遮覺路騁雲漢而貪味臨鼎鑊以求哀當種善緣方希慈極某早堅信受頻致感通夢則可徵足見未萌之誡行而必稟冀無入晨之虞用建虔誠永貽來裔贊云惟仁之尢警於昭幽將政而阻將軋而遊忤者以寵呻者以謳嶽抃冥冥證因斯休水渾而冰其中莫瑩氣澄而幽萬象一鏡躍然火羽然傲睨浮雲仰公之格稱公之文南陽公夫人彭城郡君憂紀既祥追奉皇考吏部公繡地藏菩薩一軀瞿慕戚容力成至願圖於夫人為內兄得請而贊云三界同倫六幽莫際聖有佛緣極之無滯相不可覩理不可窮人有虔懇感之則通孝實女師工惟婦德成茲妙絶申報罔極言不可無也然為師之說者豈佐競而主勝乎且儒之書曰率性之謂道老之書曰各歸其根而禪酋之東親抉人視聽至而又至者道與本俱忘哉且忘則塵滓孰從而滯耶或者假言而為諭以妄釣真彼或泥於境而滯其機是人魚莫能自辨矣大師之旨吾久得之學者既難遽息必以其言為狂藥誰之咎乎彼巧則病彼愚則競覺之愈妄矯之非正不雲而雷龍何施哉不鼓而舞人何為哉匪豫孰道匪羈孰釋一塵不飄見大師力發粹而文蘊和而秀德無不尊名無不壽內專外濟氣厚神全貞公在此千載聳然道尊教主帝系仙源牢籠天壤施掌羲軒施於孝孫克隆聖祚分祐攸宜忠賢是保秦術戾儒厥民斯酷秦儒既坑厥祀隨覆天復儒讐儒絶而家秦坑儒邪儒坑秦邪巖之巔森㦸鑱天中宅靈仙巖之瀑風幹洞壑地涌山鑿越之裔甌之隅人逸而腴某其師某其牧寺圯而復楚謂獻璞者欺我乃連刖之酷哉曰彼獨鑒之不勝耳然其嗜寶之心皆達於卞子故連刖之無怨玉亦卒受於楚國嗟乎國之嗜賢宜急於楚之嗜寶也必嗜心則上心達於天下則負材求進者雖黜於見疑亦未為怨必有釋其疑者則其卒用於世也可幾矣不猶愈於易其知而嫉其進者耶嗟乎刑與辱上之所以肆於下也楚無嗜寶之心卞豈受刑上無嗜賢之實士豈受辱必待誠而絶愧哉燕雖同類有巧拙之目里人搆其寢始就而拙者遽巢其間巧者既至必摶而逐之俾之他室雖童稚亦以為恨里人不能決其去留者蓋辨之不早辨耳噫彼之所工豈能自固其室已或為拙者所逐沮人尚惜之然則賢不肖之取舍其利害於天下何如耳治亂之兆孰易於此乃繫於所擇先後耳可不惜哉可不戒哉蒲之東七十里山秀而瘠故其水迅激不能蓄鬐介之族著於方志焉王城谷司空氏曰禎貽溪其岩瀑尢為峭束愚嘗派著於庭欲資涵泳之玩或致於他所亦不更夕輒暴去前年捧詔西上復移疾華下則鄰之佛者遽至言石竇泉隟魚皆充牣愚熟念竟不能究其說而佛者謂吾久於是溪雖才嗇而命弛然撫其愛育之心足以達其物類蓋斯魚之産是欲信吾心於方將耳而愚尚以為愧也且以為羈涉歲而後魚集於故山泉彼能達吾之心宅幽而遠害是有物致之且惑愚之妄進姑欲全吾道而退保安耳敢不自警也哉臣聞元胎凝象標器府以飛芒曜魄諧神閲環天而肆會瑤山激響流妙靡於蹌鸞嶰谷搜奇寫玲瓏於嬉鳳叶六氣則生植必茂文八音則錦繡相宣既象物而省風乃昭功而示德周旋盡美黈益隨時清廟嚴禋肅和鳴而侑響紫壇殷薦受繁祉以貽休備緝化之元機契窮神之妙用故以感動天貺紀綱人倫蕩迅羽而落丹霄帖驚波以澄紺海誘歸昌於瓊樹一變標祥導舞佾於瑤階三苗罷祲揄揚盛業粉飾元猷足使鶴列呈妍騁飛容而合緒龍蹲喪味超浩歎以違齊而大朴久雕迷風益扇浮音薄思雅曲沉英要平靡漫之娛競嫋㛐娟之奏金華翠羽逾備飾於充庭去鴈吹蓬已無資於易俗紛葩莫辨流僻萌生司成廢齒胄之文端委昧防民之制雉門災起誰懲燕女之荒鳳德日衰無救關睢之亂頽波競爽詭趣繁興咿注狂會於四夷叛衍扃和於六器瓊樓月榭爭漂亡國之音柳翠花紅似惹迷魂之態况乃高臺騁望團扇傷秋少年狹路之期落日哀蟬之感行人贈恨折楊柳以徘徊隴水分流度關山而幽咽芳樹裊相思之意卷衣追舊寵之歡鳥啼則興詠於遲遲子夜則如憐於脉脉漢殿之雲娥一去柘館銷魂淮王之仙馭不歸小山留唱鵾雞輟曉碣石申壯士之悲寶鍔雄鳴獨祿訴分夭之憤鴛鴦締思蛺蝶纓情襄陽之濃豔驚神鄴下之無愁忘返江天浩麗杳春思於龍舟綺閣驕頻仙姿於玉樹莫不旁羅綴賞分被謳謠芳情盡寄於絃心巧變逾新於濮上悟晉臣之竊視其乃衰乎徵單子之格言將焉用也復有南鄰宴衎北里追隨繡軸爭奔蘭堂洞敞鬬輕盈而入玩逞夷冶以乘春名編協律之籍妙軼總章之觀元雲起唱絳樹分行法嬰之暫賞人間淨婉之曾誇掌上翠娥低斂擬畫扇而初疑鳳翼旋披躡染香而不印緑蘿山畔徒有傳名金谷樓中猶應掩嫮輕埃漸弭泛空碧之橫雲曳緒黎收失凌波之回雪既而麟麛罷饗龍轡傾夕簇紅豔於金擎灩蘭英於琥珀瑤金義遞約粉鏡齊勻炫華藻之新裝捧重霄之寶器凄鏘縹眇輕颸漸拂於花叢鴛鵠和鳴上客潛驚於煙隥雕筵讓促玉斚橫飛墮珥顏牽裾屢舞箋霏彩筆遞申燕婉之情月曉蓮塘更亂雞人之唱必使傾歡買笑悵歸路於太行失意沉情憐霜鋒於使客且秦圖啓霸先輸嬋媛之工楚劍宣鋩寧謝優倡之拙龜山遠蔽迷津則元類吹毛魚藻陳規式宴則唯思在鎬繁華託好淪誤忘歸盛德何觀雅風洞喪愈心炫目俱謀越禮之譏異軫分流彌會相淫之旨猶是史遷銜涕憤沉湎於衰周荀勗披丹願儀形於治古乃曰升下含微握契映調露之微蹤馭道斯元演咸池之積潤雙龍肅駕爰欽九辨之神八鳳迎祥再襲五英之薦非煙育媚應玉燭以登歌皓質依仁樂神扃而暢律雖循機之思必無謝於繼韶而制俗之規猶未先於放鄭夫南薰北鄙禍福相感物窮微興亡是繫繁聲罷奏建武之貞範斯存妖玩無容太初之芳塵可挹得不翹襟酌訓經慮防奢揖璇璣養命之符受帝女昭華之琯探靈測化但纍黍而無差思古妍幽將一夔而可任懸衡睿旨合契乾心追六代之英華汰百王之蕩滌豈容蘇夔席勢膠獨見以邀能高肇憑豪抑㣥儒而徇已變唯尚質貴在揚清動以敷愈綽之仁義非簡節繁文之制不用於明庭非崇嚴煦育之姿不傳於委巷使牛刀學制必箋武邑之猷鷺羽將持敢懼宛邱之刺然後返歌鶯於海嶠維舞驥於璜臺魚龍息曼衍之陳鞮譯沮兜離之獻掖庭絃吹先罷賞於材人司隸糾繩次申嚴於權右儻蓮舟帝子獨貽招隱之詩綺殿台臣別奏登封之頌酒唯洽禮遽無縱於流連樂則緣情但取優於名教俾春濃上苑空凝桃李之情月滿西園寂寞芙蓉之豔式敷圍範交暢人情澄積樂於一時靡清風於四表豈復平西長史薦淑麗以希恩司律中郎恣哇咬而被寵則必三雍八佾休僭濫於豪門春誦夏絃服祇庸於胄子自然調元演慶開瑞歷而貫氛氳駕俗遺華撫鴻鈞而明揖讓臣業慙待扣恩謝識微鹿鳴傳錦里之謠象舞闕青襟之致孤桐韜響唯均雨露之濡泗石含清未冠雲韶之節編蓬反素誓擊壤以亡機汗簡潛心警奪朱而發憤實願希風正始擬制旋宮緬推傷化之源克裕間邪之範訪徽猷於顯慶酌茂實於開元坐鎮澆訛式清緇蠧是用撤書竦志慕高允之貞規企日裁成繼翁卿之讜議春臺自煦舞希金奏之和下曲難投猶阻鈞天之薦諭錦屏而託諷徒欲輸忠仰魏闕以兢魂翻同濫竊議天下之大勢者滯而拘古必曰固於德剛而簡謀必曰弭於威是皆不足扼阽危之機也必濟德於謀濟謀於險庶幾可以壽宗社之數矣前古迂儒瞶耳援據滋惑不能中今之急病而近朝有心於經制者杜司徒之治道李安邑之地志元中書之安邊不謂不馳騁於古今成敗之數也唯賈僕射耽并包華夷綿絡山川披圖摘要繁而不瘠可謂勤而至精者矣雖然量力救時當置遠荒於度外國史事有追惜而不可形於紀述者或關防戰而不守或控制議而不行或食廩棄而不保利害之效可見於斯愚是以玩而不厭也雖失之已久得不慮哉儒以將道肥其內也武以將威肅其外也未有內自瘠而外能勸者焉嗟乎古之用儒其所寄誠重矣儒之將道必欲張其治也獨將之不足侈其道故分已之任以寄於人亦猶資衆力以夷大路綽綽然其甚闢也如有用於時者天下不幾於治哉嗟乎後之為儒其力寢羸矣簡固以自持窘默而多一知所以任之於己不知所以任之於人而責之故雖用於時道亦削然不喻將儒之權耳且古之言兵必本之仁義反是則一決之勇未足為武一智之謀足以奪其機矧兼吾道以制於未萌哉嗟乎道之不可振也久矣儒失其柄武玩其威吾道益孤勢果易凌於物削之又削以至於庸妄於武可也必將反是請先將儒材軼而鷙捷者不待賦而後食蓋濟已之納得以自任也龍雖善致風雲然必有所稟而後能施其澤吾知其不能自神矣苟專其用而汲汲於濟物亦將救禍之不給雖川后嶽靈孰敢撓其所守哉嗚呼時乎時乎蓋賢哲之所宜禀唯用天之用然後功雖約而濟物博殉華公子與誇世豪舉綺紈相遇意氣相許貞茂松心賞微琴緒驥騄齊驅鸞鷖並翥誓風雨而不迷期始終之可保既而睚眦有違寒暄遂移雙情已忤久約方虧遽讒蠅翼交妬娥眉將搖牙而構禍寧棄跡以懷悲於是振俗先生聞而諭曰夫性溫澆漓道方廉恥勢軋則仇名浮則忌仁以利搖情由色醉釁積攜二其來有自謂金石而中渝惟鸚猩之可愧願窒隟以雕談庶追歡而寵誼借如標奇炫世角立爭英雄架橫天之譽高峻冠古之名昧褰華而喪實紛飾智以相傾而木以秀摧鐸由貝敗主能則驕伐勝必殆豈溢美而是競忘撝謙而自愛至乃重侯盛族六貴豪門贙據榮路虹申要津光鑠天地勢驅風雲指顧而傾羲回馭噓歈而窮律驚春而盈爽交分盛衰翻復惜喜室之方開競駭機之潛觸將挾炭以爭奔悼傾舟之已覆况若越溪往麗楚硤神仙擬纖弄冶挑上聲裊㛐娟利臉波豔彎娥月殘妬芳紅之笑白嘆翹翠之嬉蘭而物尢則妖美極則麗二國媯亡六宗姬替或滯愛以罹刑亦寵迷而逮繫必昌色以崇仇是危家而速戾則有邪龜畢萃環貨兼儲庭羅輦璧室玩量珠吏方譏於賄死客有論於錢愚而侈必貽殃聚惟延寇鑠金遽探毀玉猶鬬輕壅利以焚身斯據圖而殞首嗟四者之是嬰詢五交之可疚且夫電波悠悠人生若浮一瞬朝暮百年今古雖復角勢圖王鯨吞武步蓋世稜威排山逞恕壯氣俄摧雄謀焂阻淚空掩於牛山椎已登於驪阜天遂妍蚩如此同期芝華莫咀松子誰追鐘鳴漏盡樂往哀隨花宮綺閣之觀蕭條夷漫清哇豔舞之姬月墮雲飛潛衰暗鑠億恨千悲是以至人達觀物我俱遺混沐戚忘健羡孰壽孰夭孰榮孰賤大笑幾何虛舟無怨豈蹄涔之不生類蝸角之徒戰用招三釁之端期塞兩家之難時也二子魂慙色褫局聽玉音袪蒙爽曙雪涕濡襟明坦夷於末路抉蒂芥於情心願伸縷款永佩良針儒衣而武辨也人望而畏之是威其德也必有操戈待之者矣君子救時雖切亦必相時度力以致其用不可則靜而鎮之以道訓服苟厲鋒氣果於擊搏道不能化力不能制是將濟時重困故元禮之徒終致鉤黨之禍至於張儉又不能引決區區之身雖殘壞天下何裨於吾道哉陳太邱之容衆郭有道之誘人其意未嘗沮物而彼亦不厚其毒利害可見矣且猛摯不革其暴麟不足以為仁也惡鳥不息其鳴鳳不足以為瑞也况彼二三子甘逞於權豪呶呶以至大亂惟據正而能屈己者庶可與權
