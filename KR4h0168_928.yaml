  text: 全唐文欽定全唐文卷九百二十八智遠仙壇觀道士
  hash: sha256:eb5a6df8c1ec12c856f88123dc319d6dbb0baf519a1d9f207826907d5c74f1db
  markers:
  - {type: head, offset: 14, content: 楊智遠, id: KR4h0168_NFKB_928-h1, level: 1}
body:
  text: 昔梅仙君河南壽春府人名福字子真乃西漢成帝時受命洪州南昌縣尉居官清節志厭浮華每以恤民為念未嘗加鞭朴於民時值王莽作亂僭竊神器王鳳專政浸盛災異數見㣥下莫敢言福不忍天下生靈坐於塗炭乃奮忠義之氣上災異書以陳治亂書曰臣聞箕子佯狂於商而為周陳洪範叔孫通遁秦歸漢制作儀品夫叔孫先非不忠也箕子非疏其家也而畔其親也不可與言也昔高祖納善如不及從諫若轉圜聽言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進奇異知者竭其策愚者盡其慮勇士極其節怯夫勉其死合天下之知並天下之威是以舉秦如鴻毛取楚如拾遺此高祖所以無敵於天下也孝文皇帝起於代谷非有周召之師伊呂之佐也循高祖之法加以恭儉當此之時天下幾平繇是言之循高祖之法則治不循則亂何者秦為無道削仲尼之跡滅周公之軌壞井田除五等禮廢樂崩王道不通故欲行王道者莫能致其功也武帝好忠諫說至言出爵不待廉茂慶賜不須顯功是以天下布衣各厲志竭精以赴闕庭自衒鬻者不可勝數漢家得賢於此為盛使武帝聽用其計升平可致於是積尸暴骨快心胡越故淮南王安緣間而起所以計慮不成而謀議泄者以衆賢聚於本朝故其大臣勢陵不敢和從也方今布衣乃窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之㣥蹈藉名都大郡求黨與索隨和而無逃匿之意此皆輕量大臣亡所畏忌國家之權輕故匹夫欲與上爭衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧廟堂之議非草茅所當言也臣誠恐身塗野草尸竝卒伍故數上書求見輒報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻繆公行伯由余歸德今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤悶吐忠言嘉謀日聞於上天下條貫國家表裏爛然可覩矣夫以四海之廣士民之數能言之類至衆多也然其俊傑指陳世政言成文章質之先聖而不謬施之當世合時務若此者亦無幾人故爵祿束帛者天下之砥石高祖所以厲世磨鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之網以為漢驅除倒持太阿授楚以柄故誠能勿失其柄天下雖有不順莫敢觸其鋒此武帝所以辟地建功為漢世宗也今不循伯者之道乃欲以三代選舉之法取當世之士猶察伯樂之圖求求騏驥於市而不可得亦已明矣故高祖棄陳平之過而獲其謀晉文召天王齊桓用其讎無益於時不顧逆順此所謂伯道者也一色成體謂之醇黑白雜合謂之駁欲以承平之法治暴秦之緒猶以鄉飲酒之禮理事軍市也今陛下既不納天下之言又加戮焉夫䳒鵲遭害則仁鳥爭逝愚者蒙戮則知士深退間者愚民上疏多觸不急之法或下廷尉而死者衆自陽朔以來天下以言為諱朝廷尢甚㣥臣皆順承上旨莫有執正何以明其然也取民之所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲直臣而矯曲朝及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諫臣之舌㣥臣皆知其非然不敢爭天下以言為戒最國家之大患也願陛下循高祖之軌杜亡秦之路數御十月之歌留意無逸之戒除不急之法下無諱之詔博覽兼聽謀及疏賤令深者不隱遠者不塞所謂辟四門明四目也且不急之法誹謗之微者也往者不可及來者猶可追方今君命犯而主威奪外戚之權日以益隆陛下不見其形願察其景建始以來日蝕地震以率言之三倍春秋水災亡與比數陰盛陽微金鐵為飛此何景也漢興以來社稷三危呂霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰無若火始庸庸勢陵於君權隆於主然後防之亦無及已又言國舅王曼事帝俱不納復上建三統書曰臣聞不在其位不謀其政政者職也位卑而言高者罪也越職觸罪危言世患雖伏鑕橫分臣之願也守職不言沒齒身全死之日尸未腐而名滅雖有景公之位伏櫪千駟臣不貪也故願一登文石之陛涉赤墀之塗當戶牖之法坐盡平生之愚慮無益於時有遺於世此臣寢所以不安食所以忘味也願陛下深省臣言臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦滅二周夷六國隱士不顯逸民不舉絶三統滅天道是以身危子殺厥孫不嗣所謂壅人以自塞者也故武王克殷未下車存五帝之後封殷於宋紹夏於明著三統示不獨有也是以姬姓半天下遷廟之主流出於戶所謂存人以自立者也今成湯不祀殷人無後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫穀梁傳言其不稱名姓以其在祖位尊之也此言孔子故殷後雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪嫡傳曰賢者子孫宜有土而况聖人又殷之後哉昔成王以諸侯禮葬周公而皇天動威雷風著災今仲尼之廟不出闕里孔氏子孫不免編戶以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天無極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉帝亦不報於是有歸休之志於戲所謂臣之於君再三諫而不從則逃之此豈虛言哉遂解衣挂冠東都門納官棄妻子去九江恐國舅攝之易姓名為吳市門卒以保其身厥後求師慕道訪山採藥多隱名山廣谷之間嘗與張留侯子房執版唱無生曲以快其情也訪鴈蕩諸山即會稽之南也遊南閩入支提山修鍊數年未就為闕所觸憤然曰靈丹九轉愈久愈精何厭成功之晚遂入仙霞山即武夷之東也倣徨乎無人之境逍遙乎塵埃之外猿啼古木虎嘯幽巖有竹曰瘦腰有草曰黃芽靈苗異種雜然莫能盡識遂依巖結菴堅心苦志辟穀餐松慕學神仙積有年矣每望閩粵間有紫氣頗異復往建城立壇修鍊未幾一日山色溟濛煙霞滿室瑞氣浮空紫雲蓋覆於山頂天樂嘹喨有一神人語福曰空洞仙君至須臾仙樂近仙君臨福拜而迎之仙君曰念子學道志堅吾故下臨授汝外燒內鍊還返大丹之法九老仙都濟世之文汝可擇名山依法修鍊方得成仙言竟而梅君謝焉彩雲散空天樂自鳴仙君乃隱隱而去梅君精視天文數日下山行濟世之法無不靈驗初至雞籠山修鍊被尸鬼相魔次至毛竹洞夜夢神人曰此山非先生修鍊之所遂入演仙山修鍊又為野火所燒繼往玉華山修鍊昔神人居焉方欲修鍊而㣥賊四起次至烏石山修鍊樵婦觸之梅君嘆曰道緣淺薄障魔㣥起遂再行濟世之法數年至劍江西嶺修鍊一日祥雲瑞氣覆於山巔開戶視之乃道師空洞君降梅君拜而迎之告道師曰弟子恭依師旨廣行濟世之法遊歷名山修鍊多為魔苦適至於此道師曰汝之道緣在飛鴻山也再授汝八神却魔靈丹乃召二光童子控赤騣白馬於山前君可急乘馬領童至飛鴻山精修成功之日吾當舉汝使汝骨像同升也言訖道師隱於雲中梅君遂乘馬領童至飛鴻山卓菴修鍊千日神遊體外丹光燭天而道成矣遂開爐出丹一丸祭天天神收之一丸祭地地神護之一丸自服服訖拜謝天地畢地神奏於三官三官奏聞天闕言西漢梅福成道於飛鴻山梅君乃乘白馬領童欲回九江二童馬前撫掌吟詩隱於山溪巨石之下須臾紅光射日紫霧漫空甘露天花一時飛降雲中仙樂嘹喨金童持節玉女執幡力士控鸞侍仙捧詔向梅君曰天闕詔下令汝乘鸞上升梅君拜謝天恩棄馬乘鸞升天而去白馬墜於水中自後飛鴻山號曰梅仙山是也山之西有墜馬洲三十里有遺鞭山山之下有登仙里山之東溪有逃童石驂馬渡山之側有甘露源山之後有天花嶺石上有花跡自後鄉人號曰癩石嶺是也至今丹光隱伏猶存山根有梅君道院崇奉香火自後浮屠占之為居址棄仙像塑佛像改名觀音院將梅仙像移入開山堂安奉郡之民相傳只呼梅仙院不從其額其院中有護法五聖公顯靈立廟院側人只呼作梅君廟梅君同其名乃仙聖跡也自漢至今歷二十二丙寅矣自元始中至今貞元二年丙申計一千二百五十九年不泯矣時依建寧府梅仙堂傳本彼有梅山鍊丹之所故云爾道元貞元時人學道於寒棲子昔巢居子奉事東海青童君以節苦心寂奉師禮具暑雨祁寒無懈無怠僅二十年乃口授元法手録聖方曰若求跨鶴升九霄未易致也若優游乾坤之內守皓然之氣容色不改心目清朗壽數百年不歸可得矣然神仙祕術不可傳失其人長安年中巢居子以寒棲子賢人也使沐浴齊戒乃授其事至貞元八年寒棲子以余不揆陋微游放自適所從來者匪世俗之士無聲利之交若天與之正性謂不虛授乃傳之余以隱棲子文華之士昔登上科忽遺馳騖息心道門僅六七年其元法祕術無不得之而至理之要曾似未遇顧余有此遺禮留愛久之而言余知其志士也心忘爵祿遁時稱騷雅之什有而若無實而若虛者哉必當羽化雲飛豈止龜鶴齊壽寶歷乙未嵗霞棲子盧道元敬持太上八方絪縕元寶一軸以授隱棲施君敬之哉戒之哉智清太和寺茅山三觀威儀道士伏以華陽洞天衆真靈宅先奉恩旨禁斷弋獵樵蘇秋冬放火四時祭祀咸絶牲牢自經艱難失去元敕百姓不遵舊命侵占轉深採伐山林妄稱久業伏請重賜禁斷準法獲持差置所由切加檢察庶得真場嚴整宮觀獲安具元禁疆界如前集會昌時人武宗好神仙集以山人進宣宗即位流嶺南居羅浮山大中十一年復徵至長安召問長生術尋歸羅浮太上忘言其次立言流若巵言民斯蔽矣夫執形為有纍無往而可祛悟有為無元隨在而可詣故天地以無名為妙本大道以抱一為真詮應萬彙而大象無形體混成而神功不宰合符帝一超入太信之根孕元宗風宏自元始之㤅逍遙齊物則曰大鵬天籟華蓋隱元則曰玉珮金璫得其意者象帝之先昧其真者墮身於劫獨力而不改周行而不殆者能幾人斯我皇唐大歷之初集棲朱明之野忽石樓前洞圭石然中開視我靈文成茲玉書結空粲以成篇洞幽寥於無眹凡我兆景慎勿以執形求也釐為十有二章統以太霞蓋究厥守中之道原諸法象之宗云爾高上三元能妙一而不窮靈芝八景本在身而非外則此之所云皆為芻狗子來大中末道士嘗止成都隻流縣興唐觀不材吳子知命任真志尚元素心樂清貧涉歷㣥山翛然一身學未明道形惟保神山水為家形影為鄰布裘草帶鹿冠紗巾餌松飲泉經蜀過秦大道杳冥吾師何人矚思下土思彼上賓曠然無已罔象惟親寂爾孤遊翛然獨立飲木蘭之墜露衣鳥獸之落毛不求利於人間絶賣名於天下幽棲道士夫道者在於寂默虛無心冥神契經者資於書寫傳授誦詠宏暢非寂默則莫能契道非敷誦則無以宏經雖宗轍有殊而體貫齊一張之則異域混之則同歸因道所以立經因經所以明道道為經之本體經即道之跡用本跡相明體用元合是以煥真文於空洞之上開洪源於紫極之館則三品真目析㣥方飛天之書七部衆經播雲篆光明之跡於是元始天尊坐於元都玉京紫微上宮以三洞正經居前三大副經居後道德二篇為輔弼玉清隱書為教主且洞元靈寶則三洞中洞之一部無量度人則中洞一部之一卷修習之法則一部多門諷誦之篇則此卷為首上消天災保鎮帝王下禳毒害以度兆民中拔祖宗已身得道斯則巍巍大範獨步三清者哉此經義旨冥奧音韻隱祕皆申明大梵之理非化誘常途之辭故云上聖已成真人通元究微能悉其章所以誦讀者多焉精達者鮮矣今不揆蠛蠓之力強舉千鈞之重直以凡下裁斷聖意儻親奉元師必冀蒙詢誨故為是敘沖昭南嶽道士沖昭弱年悟道近嵗依師洎臨嶽門頻訪靈跡唯求古來舊記希窮勝異之事莫之有者咸云兵火之後其文散失遂遍閲古碑及衡山圖經湘中記仍致詰於師資長者嶽下耆年或得一事旋貯篋笥今據所得上有五峯三澗古來宮觀藥院至於歷代得道飛升之流靈異之端撮而直書總成一卷目為南嶽小録庶道侶遊山得之披覽粗知靈跡之所自云時壬戌嵗冬十月序沖虛後唐同光時太清宮道士謹按瀨鄉記此樹枯來莫知年代自高祖神堯皇帝武德二年太上老君見於晉州羊角山語樵人吉善行云為報唐天子吾是爾遠祖亳州曲仁里是吾降生之地有枯檜重榮唐祚永興高祖遂於羊角山置興唐觀其地改為神仙縣封羊角山為龍角既至亳州果有枯檜樹復生枝蓊鬱後因安祿山僭號之時萎悴及祿山殄滅元宗翠華歸奏枝葉復榮今年十月中又於其上再生一枝約長二尺聳身直上迥出淩虛葉密枝繁獨異衆木少通南嶽道士玉清觀者法玉清聖境而名自吳及梁相續重興漢文帝之祀蘇真人耽自郴陽上升衆仙迎往元辰曾遊斯地吳大帝之代葛仙翁元在句容受道煉丹於湧泉亦經於此不獨實録具在仙籍左右靈蹤古今不泯赤松山畔曾聞叱石之羊王喬嶺前昔現飛鳧之履鄉鄰白鶴有傅翁得道之巖境接赤烏即施君住宅之址社連金闕洞秀玉華草木長春煙雲迥秀黃精遍野白朮盈川闕監臨楊元德門人王太清心營半載箕斂萬緡山現良材地呈貞礎林麓聽丁丁之響庭除觀矻矻之功法天上之皇都布凡間之紫府闕銘曰觀本無名古仙像成會朝金闕遂法玉清寶殿締搆祥雲送迎元功福蔭暜壽函生玉清聖化棲隱名賢誘彼英信搆茲良緣福流曠劫功逮幽元解釋羅酆神登九天棲神之鄉鄰有沖陽其道不宰載之無疆洞馨蘭菊林翥鸞凰表瑞旌祥福資聖唐仰觀洞府靈路稀有蕩滌妖氛資崇祿壽太清太虛建功不朽名載碑珉天長地久原夫自然生道道生太一太一生二儀二儀既立衒明三景三景列像以均四氣四氣氤氳潛配五行五行相屬而聲六律六律爰敘以旋七政七政將平而定八方八方布設是為九宮九宮各據周羅十極十極剖判而成萬彙萬彙既終返乎太乙即太子孕靈之道變化還元妙用虛無之旨也混沌既分張乾褁坤中有太乙虛無之尊騰闢二氣散為真根清濁異體元牝通門道德之祖自然之孫即太乙真精灌溉之理矣右月左日光輪星質大遊小遊分綱列職照運寰區定臨凶吉寒暑數遷災福靡失唯德可順唯道無窒即太乙神處變遷之用矣動靜杳冥中含一精沖和純粹天清地寧統貫三才神靈谷盈春發夏養秋合冬成逐道開布萬化俱生即太乙神氣覆育之道矣紫清之上玉皇御中有太乙之府上台之宮宮有九署三官所宗太乙真人太伯仙翁定生丹籍落死北酆統制萬靈元化無窮即太乙掌符録權總之化也故陰陽不測之謂神神者太乙之祖氣也是以一大謂之天故經云象帝之先即元元之首矣廬山真人殿者按仙傳即太乙真人隱化之所治也連虎溪福地按詠真洞天上應仙曹下通陰府真人逐代降世魏末晉初孕靈於閩川侯官寓姓董氏名奉字君異託跡混時行仁布惠活士燮於交址救屈女於柴桑種杏拯民蘇苗降雨攝欺闕以威虎歸貞信以輕金驗太乙丹符知非常道散無功穀帛遠非常名真人久處下方將朝上界以晉永嘉元年三月十五日感上帝錫命曰太乙真人歷居凡世功滿三千可任碧虛上監仍掌吳楚人民生死之文罪福之籍旌幢降處千條之霓影盤空羽駕行時萬朵之仙花出洞竟望天門隱隱而上即知聖人遁世俗眼何遼千載纍功一朝現化暨乎風遺今古事有改遷道隱時訛民囂淳散巨唐天寶初制下重加葺修後值世更屢經兵火山口半里額挂卑祠少通幸憩名山訪茲聖境榛蕪隘道荊棘漫穹水石亂基狸鼠交穴目淩幽谷對百鳥傷嗟情斷孤雲聽流泉嗚咽默然憤志誓續真風與弟德規力勤三祀形忘疲倦手覺胼胝乃遇韓王節鎮江城仁霑野澤減有餘之俸助無罄之緣匠運斧斤基圓殿宇時感松凝甘露山吐靈光沼綻交蓮林抽合竹禎祥異事郡國咸驚即今上皇帝膺嗣明堂丕圖寶位堯雲四布舜日廣昭仰紫氣於函關重光道德敬朱鬃於羊角繼肅乾坤文明丕彰無為自化保大十一載遣北苑使董源支慶王帑藏錢物計三百萬大建仙宮造四殿五堂重門諸厦都一百三十間正宇塑五十九品真容莫不山見良材巖呈異礎工勤商伯匠巧般輸神助縈勞元資夙智首尾四稔備用都周繇是梁竦虹軀簷飛鳳翅風搖金鐸巖洞響清日映朱欄松筠影翠麗移崑島景象蓬瀛瀑注方池稱養琴高之鯉雲鋪謺砌宜升索靖之鳧九水民歡五峯靈暢山燈夜照巖香曉噴文武星攢緇黃雲集寶臺齊建霞分紅杏之原紺殿晨開光射白蓮之頂鯨鯢鎖躍簨簴龍吟靈應九霄道傳萬古功褾丹雀善記羅酆福利幽陰神超靜冶冀扶帝座長慶皇宮少通受業朱陵叩興真跡非邀名譽貴顯元猷愧無夙契之人直紀象先之德用刊貞石永固仙壇誠懇誠歡勉為銘曰元黃未判大道爰升太乙將兆萬化俱興為而不恃得而不矜日用匪測混然常澄無象有象非真是真道既設教德乃通神功動幽壤福慧生人聖恩不泯等劫長春皇化元化真功神功靈光出谷仙花散空殿雲香靄壇星燈紅天長地久算福無窮江嶺甌閩高仙混塵丹生冥腐杏拯孤貧遺風碧洞流香紫宸感乎聖德像化咸新湓水城南詠真天北晃晃真宮巍巍聖德道合昌時靈扶睿國自晉流唐元功靡測日月輪明人生萬遍山無改遷化有更變杏擁仙壇香噴寶殿實謂瀛洲飛來嶽面山鎖平原亭臺秀麗甘露凝松祥雲繞砌天上何殊人間莫繼化獎元風百千萬嵗唐保大十二年嵗次乙卯十一月記棲霞一名敬真字元隱七嵗以神童及第天祐時避亂南渡為道士徐知誥輔吳召至金陵館於元觀館升元初加金印紫綬賜號元博大師又加號真素先生保大元年卒年六十二粵靈寶者空洞赤書之祕號也鬱勃自然生天地先運無為德被有為作是以太上立德其次立功德者乾坤之大生功者生三中利益也苟德以潤身功能濟物即示輕舉如躡歸徑革喧囂於蛻脫耳且校籍所載真跡所存有非常人立非常功遂歷古今芳猷不絶茅東卿棣鄂以直道仕愷悌立身周物者智樂靜者仁去黨咸陽初依恆嶽尋棲此山介然掩躁克奉元寂陶然若朴惟德動天遽繡衣持九錫之文芝蓋導三清之路元鵠下盤感應無昧斯積業夙習之感哉緬維異代同途繼踵美蹟者諒我公矣公以踐履德業游泳忠信松高韻遠玉真芒寒景鐘麟史臺構襲蹟鳳池龍節鴈序分寵致君一匡錫我所履威臨鐵甕貴擁朱輪智發未萌道了得一蒲鞭舉而過改桑附謠而政遐謂我無欲民朴我無為民化法黃老而熙帝載考始制而宏象教乃顧名都更植世福靈寶院者梁天監嵗貞白陶先生宏景所創也始本昭真其號焉紫陽觀即長史宅界於東小茅嶺雷平山列於南鍾山西朝焉良常北衛焉其餘勝概㣥阜若衆星之環拱不可殫論先是迥臺層漢攸閣匝雲祕三洞璚文集丹邱羽客門人周仙君子良勤修於是崇習元風鍊金石身騰煙霞轍時移代敻瓦木之功寖泯及唐太和中太尉贊皇李公每瞻遺躅屢構遐緣門師道士孫智清復討前址再建是院尋諸舊號額曰靈寶爾後既遇兵焰靈致煨燼荊棘相森凡材圍長狐兔往焉芻蕘往焉弗芟弗剃歷五十載矣棲霞胄叨素業幼專不息雖童丱獲名而屢厄兵難跡不遑處遺構殆空斷梗杳泊自北徂南幸托元化遐欽茲境聿諧所適乃勵畚鍤忘暫勞砌壇植松結茅庇拙紉蘭餌术願言終遁俄奉先齊王旨命出居會府齒朝修事沐浴恩遇揚歷館仞甄道銜表命服再琯再籥是埏是鎔洎我公移鎮是邦自以風痺厥躬告從谷隱公遂捨俸錢一百萬俾於舊基別崇利有稟命之際亹亹勉勵夙夜匪懈思竭克勤冀荷恩教噫事難謀始智寡周防且虎視非一雀之圖而雀終噪蟾盈非片雲可同而雲或掩時哉理非契也非台曜覽幽幾止終廢繇是度揆經營月期日就博邀執斫量材取制墻茨必襄圖蔓必剃平瓦礫以等阜屏豺狼而斷㣥力工約萬綿嵗靡期剞劂督奇丹艧耳酋妙造正殿三間中塑靈寶天尊景從砌壇三級三門三間環繞廊廡一十六間並葺壞整頽降真堂續連於內重新沼沚再築垣墻東北隅即忠義太保公之季弟先於舊閣基建瑞像殿三間兩厦中塑羊角山應現老君西南隅向曰三官堂三間塑像岌岌其狀亭亭其勢金碧其飾輪奐其映瓦謺鴛翠甍差鳳翹睟容禮而若眄侍衛瞻而乍愕旌幢翻翻雲鶴軿軿薱侔崛起異疑飛來非我公願力斯應象教斯感即荒鹵之域安欻睹壯麗乎足使真風永布靈致恆芬配天地而齊壽總山川而介福噩噩烈烈可久可大棲霞智慚絶妙才非述作蓋受恩於始受命於此謁誠竭慮逮茲成功聊實記於質文呈台覽而刊於將來也時太和三年重光單閼嵗九月乙酉朔九日癸巳謹記元卿紫陽真人良常西麓源澤東泄新宮宏宏崇軒䡾䡾雕珉盤礎鏤檀竦楶碧瓦鱗差瑤階肪截閣凝瑞霧樓橫祥霓騶虞巡徼昌明捧闑珠樹規連玉泉矩泄靈飈遐集聖日俯晰太上游儲無極便闕百神守護諸真班列仙翁鵠立道師冰潔玉成漿饌瓊為糜屑桂旗不動蘭幄互設妙樂競奏流鈴間發天籟虛徐風簫冷徹鳳歌諧律鶴舞會節三變元雲九成絳雪易遷徒語童初詎說為毀乾坤自有日月清寧二百三十一年四月十二日建
