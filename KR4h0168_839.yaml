front:
  text: 全唐文欽定全唐文卷八百三十九岳字昭輔其先遼東襄平人遷洛陽少舉進士事梁歷官侍御史貞明初為翰林學士累遷戶部侍郎後唐莊宗入汴貶均州司馬尋授太子詹事明宗即位歷兵部吏部侍郎忤馮道徙祕書監遷太常卿卒年五十六贈吏部尚書
  hash: sha256:817118ff30d8124612c306747d863fa42bb045dabfe2813d4c247ca4f0165644
  markers:
  - {type: head, offset: 14, content: 劉岳, id: KR4h0168_NFKB_839-h1, level: 1}
body:
  text: 凡在立朝悉是為臣之責每蒙進秩咸加報上之忠奉勅命以遷升固當感抃降綸言而襃餙或未捧觀將使知罷陟之繇認訓誥之旨必在各頒官告令覩制詞處班列以增光傳子孫而永耀伏請自今凡有除轉登朝官已上在京召至閤門宣賜在外則付本州使賜之伏以有國命官立朝釐務必資詳練以集事功竊見諸色詞科多昇通籍向者先為列藩從事參佐可稱次經三館職名編修是著方居華秩始在彤逵近或雖有兩任前銜未歷一司公事莫申勞績虛謂滯淹未若委以親人俾之及物粗聞善最無議陟遷免自歎於漂流復有名於選任伏乞特加搜採廣察單平白身者授以佐僚歷官處之縣令歲月俟當於制限班資擢在於朝行理契毓材事惟責實沂字德潤宰相魏公鉉幼子舉進士歷監察補闕昭宗時累遷諫議大夫入梁為御史司憲擢禮部尚書貞明中充西京副畱守入後唐為左丞判吏部尚書銓選司謫石州司馬明宗即位復為左丞以太子少保致仕卒年七十餘贈太子少傅彥卿位是人臣無專殺之理況天津橋御路之要正對端門當車駕出入之途非街使振怒之所況梁觀不時迴避其過止於鞭笞捽首投軀深乖朝憲請論之以法重誨應州人其先本北部豪長後唐明宗鎮安國以為中門使及即位領樞密使遷左領軍衛大將軍兼領山南東道節度使改兵部尚書累加侍中兼中書令徙河中節度使坐與宦者交私明宗令太傅李從璋檛殺之伏以凡是人名皆繇父命侍側者稱以榮左右為後者稱以奉蒸嘗犯廟諱須更同御名亦改降此以外迴避無聞以春秋論之衛侯名惡大夫有齊惡太宗朝有虞世南君不聽臣易名皆所以重人父之命況郭彥夔長在青州霍彥威有時移鎮寧將私敬上凟聖聰若便允從恐多援引只宜如故工部郎史于鄴奏名是盧文紀私諱儻許更名即不至尤違其郭彥夔請在本道宜令權稱致雍在告勅內即須仍舊誠為至論永作通規守殷少事後唐莊宗為奴名會兒及即位以為長直軍使稍遷蕃漢馬步都虞候同光二年領振武節度使兼蕃漢馬步軍天成初拜同中書門下平章事授河南尹判六軍諸衛事加侍中移汴州節度使後謀叛明宗討之力屈自盡臣修雒陽月波隄至立德坊南古岸得玉璽一面上進伏以皇上陛下明德動天聖靈御宇遂使千年之瑞出於九地之間輝煥簡編光華帝道臣竊觀異瑞益表太平逅後唐天成元年官大理少卿此後伏請指揮天下州縣應所禁囚徒不許州縣廂縣大小刑獄委觀察使刺史慎選清強判官一員於本廳每月二十六日兩衙引問明置獄狀細述事端大則盡理推尋小則立限決遣其外縣鎮禁人三日外具事節申本州府仍勘問指揮咸雍後唐天成二年官起居郎賊寇宵行逼脅村舍俾供食宿及當敗露指引行程追禁經時慮妨農作望頒明勅俾得疎治傅後唐天成二年官太常丞當司專典祠祀伏以國城西面㣥祀各有壇墠近年多被民戶侵耕畜牧騰踐莫知處所行事之時旋封土芟草有乖誠敬今正芳春易行止絕者同後唐天成二年官左拾遺天下繫囚請委長吏逐旬親自引問質其罪狀真虛然後論之以法庶無枉濫三尺之法天下共之法一動搖民無所措是知愛育黎庶信及豚魚既禮樂之中興在刑罰之必中陛下初當治亂合肅化條請處分天下州使繫囚逐旬咨長史親自引慮使知罪真虛然後論之以法則獄無寃滯政治和平殷夢後唐天成二年官刑部員外郎伏以挾刃殺人桉律處死投獄自首降罪垂文高宏超既遂復讎固不逃法戴天罔愧視死如歸歷代以來事多貸命長慶二年有康買得父憲為力人張涖乘醉拉憲氣息將絕買得年十四以木鍤擊涖後三日致死勅旨康買得尚在童年能知子道雖殺人當死而為父可哀若從沉命之科恐失度情之義宜減死處分又元和六年富平人梁悅殺父之讎投縣請罪勅旨復讎殺人固有彞典以其申寃請罪自詣宮門發於天性本無求生寧失不經特從減死方今明時有此孝子其高宏超若使須歸極法實慮未契鴻慈明吉後唐天成二年官左補闕竊見天下宮觀久失崇修蓋自朱溫篡逆以來例多毀廢請下諸道應本朝舊置宮觀近經毀拆者皆勒增修以奉祖宗以宏孝治光陛下中興之業顯國家大道之源復我真宗寘茲永世其兩京宮觀有公田乞免科率俾充齋糧以給正名道士庶懇志於焚修期上元之福祐紹光後唐天成二年官少府少監當司掌朝服儀仗祭器服兵戈以來散失向盡苟非得人難為掌轄臣准往例除監一員少監二員外比有丞主簿五署令共一十六員近自偽梁廢省只委曹吏主張遂至因循或多隱漏乞下中書於先廢官員內量置丞簿署令分主當局公事光緯後唐天成二年官右拾遺自本朝應運以來陛下登極之後有赤心事主戮力勤王或代著軍功身已淪沒者乞追崇官爵延賞子孫庶張開國之榮永保承家之慶兼內外重臣已下班行間請許追封以光孝道雖九原之幽暗亦賀明時庶百辟之忠良同扶聖代兟後唐天成三年官膳部郎中諸司諸使職掌人吏乘暖坐帶銀魚席帽輕衣肥馬參雜庭臣尊卑無別污染時風請下禁止金羽後唐天成三年官左拾遺伏覩州縣百姓早因危歲小寇連綿舊染成非習性難改逃刑網外作患民間起晝藏夜出之名懷念惡惰農之志惟觀得失但聽災危不慮嚴章當孤美化法緩則潛藏軍旅法急則流散藩方條令難加網羅莫及是非同等曲直相參伏乞顯示軍門無招此輩永去未萌之咎當平不力之民途後唐天成四年官左補闕明公舉事須合前規竊見京城之內尚有南州北州縱市井不可改移城池即宜廢毀復見都城舊牆多已摧塌不可使浩穰神京旁通綠野徘徊壁壘俯近皇居無復因循常宜修葺正封後唐天成四年官考功員外郎中興平定之初自數十年離亂編民或為兵士所掠沒為奴婢者既無特勅釐革無復從良遂令骨肉流離有傷王化昌魯字安國相州鄴縣人唐末明經登第釋褐項城主簿累遷尚書郎乾符中出為高州刺史遷防禦使為劉龑所殺謹案九國志劉隱入廣州遣其弟龑攻高州昌魯大敗龑軍慮終為所吞乃輦帑庫及士卒千餘人歸湖南馬殷殷奏授永順軍節度副使兼行軍司馬天成中卒與五代史所載不同僕昔占籍鄴中受恩唐室莅高三歲遏黃巢之亂收合生齒堡于掠山因深為塹憑高作壘攻苦食淡以勤士卒洎盜賊平定一境獨全高掠之民至今相戴而中原多故嶺南不賓劉隱亂常僭興師律舉蠻貊之衆成吞噬之心僕常訓勵甲兵躬當矢石掃壘一戰劉巖遁走雖仗義者必勝恃力者必亡然而山越之人瘡痍衆矣殘民以騁所不忍為昔古公去豳竇融歸漢千古之下迭為推美僕雖顓愚景慕前烈竊惟明公負江湖之固有桓文之業土宇至廣仁風素厚願以所部歸於執事謹刺血染翰上達誠悃惟明公圖之協字思化清河人舉進士為度支巡官渭南尉直史館入梁累官兵部吏部侍郎後唐同光初改御史中丞天成初遷禮部尚書太常卿拜平章事四年卒贈尚書左僕射諡恭靖當監舊例初補監生有束脩錢兩貫文及第後光學錢一貫文切緣當監諸色舉人及第後近再多不于監司出給光學文抄及不納光學文錢只守選限年滿便赴南曹參選南曹近年選人並不收置監司光學文抄為憑請自後欲准例應諸色舉人及第後並卻於監司出給光學文抄并納光學錢等各有所業次第以備當逐年修葺公使奉勅宜准往例指揮兼自今後凡補監生須令情願住在監中修學則得給牒收補仍據所業次第逐季考試申奏其勘到見管監生一百七十八人仍勒准此指揮如收補年深未聞藝業虛霑補牒不赴試期亦委監司簡點其姓名年月一一分析申奏元後唐明宗朝官登州刺史天成四年坐無名科率停任山岳之形雄峻奇勢摩霄沖載萬象吻合雲雨怪狀異彩萬有餘品而不可盡名今斯銅山峩峩石稜巉巉青壁巋岌硉矹乍峭乍平左翼龍驤右盤虎踞是以西拓浮邱若捫天心北截長江如浴滄海足可以壯楚之地勢也闕十三字洎大歷十一年冬仲月有大禪師曰信行京兆盭厔人俗姓王氏早歲出家本雲居寺以戒香持身惠珠內瑩止於此山駐錫雲木石坐逾旬無有知者會樵人入山採薪得遇恭師駭然投刃設禮欣讚磬折闕一字貞元十三年春觀察使兼御史中丞博陵崔公行府幕郎官判官李公臻巡戶口兼封閉諸山蘭若例當闕二十字文牒遍告吏民勿令闕一字動至元和中縣令姚公崇信三寶深護法門聞多因公侵漁斫伐林木又給公憑四年天下旱民皆絕粒道路殞斃師乃出山有二居士頂敬禮拜共迎歸山於時四面聞師都歸雲合大會草木生光二居士啟諸公曰和尚高僧久此宏化教諭沉迷開甘露之門示生死之徑不旌敘山門何以答乎禪德公依法言而共建斯法碣乃瑩真礎爰命雕鐫縱劫還海竭太樸寖失斯之不墜嶠晉天福中為虞部郎中知制誥遷中書舍人後唐同光中為翰林學士天成四年遷祕書少監以忤趙鳳奪官長流武州百姓有國有家既定君臨之位無偏無黨方明王者之心苟少虧於同軌同文則微損於盡美盡善竊知河朔令錄須俟本道薦揚朝廷就加其命況今萬國諸侯猶請行而貢職豈使一方令長獨端坐以邀官未敦革故之風深缺維新之化覩茲闕政敢貢直言乞宣付中書委於銓管此後並從常調協和萬邦明主所以安社稷平章百姓哲后所以懷黎民將延七百載之洪基須安億兆衆之黔首臣幸遇聖明之代敢傾愚直之誠伏以朝廷先有指揮今年不更通括苖畝宣從特旨頒作溥恩且屬夏秋已來霜雨頻降在山川高土則必有豐年想藪澤下田非無水沴脫或巳作潢汙行潦猶徵青苖地頭不惟損邦國風化兼恐傷天地和氣儻或皇帝陛下念茲狂直哀彼災祥特於淹浸之田別示優隆之澤重委鄉村父老通括不令州縣節級下鄉如或檢驗不虛即日蠲減租稅或有司以軍糧未濟兵食是虞即請卻於山川之田豐熟之地或於麻畦稈草蠶鹽地頭據其本分價錢折納諸色斛㪷所謂公私俱濟苦樂皆均捨其短以從其長將有餘而補不足臣每因急務方敢上言前後所奏十件有司未行一件伏乞陛下念臣苦思察臣盡心或可施行不令停滯蕘後唐同光初為魏王繼岌推官掌書記明宗朝授河南少尹以秦王從榮謀叛事配石州恭陵所其山園之內被民戶起舍屋居止臺觀皆被侵耕柏城松逕樵採殆盡乞下本縣與寺司重定完本園林地畝楷乾寧二年舉進士重試黜落哀宗時依朱氏為起居郎以舊憾上疏駮昭宗諡號梁祖即位勒歸田里後唐同光中為員外郎天成中累歷使幕會執政欲糾其駮諡之失以憂卒帝王御宇由理亂以審汙隆宗祀配天資諡號以定升降故臣下君上皆不得而私也伏以陛下順考古道昭彰至公既當不諱之朝寧阻上言之路伏以昭宗皇帝睿哲居尊恭儉垂化其於善美孰敢蔽虧然而否運莫興至理猶鬱遂致四方多事萬乘頻遷始則閹豎猖狂受幽辱於東內終則嬪嬙悖亂罹夭閼於中闈其於易名宜循考行有司先定尊諡曰聖穆景文孝皇帝廟號昭宗敢言溢美似異直書按後漢和帝安帝順帝緣非功德遂改宗稱以允臣下之請今郊禋有日祫祭惟時將期允愜列聖之心更下詳議新廟之稱庶使叶先朝罪己之德表聖主無私之明廷範官太常卿昭宗初實彰於聖德後漸減於休明致季述幽辱於前茂貞刼幸於後雖數拘厄運亦道失始終違陵寢於西京徙兆民於東洛軔輦輅未踰於寒暑行大事俄起於宮闈謹聞執事堅固之謂恭亂而不損之謂靈武而不遂之謂莊在國逢難之謂閔因事有功之謂襄今請改諡曰恭靈莊閔皇帝廟號襄宗憓後唐明宗朝官祕書少監遷右諫議大夫凡在御前皆為法物供奉所自出自內司豈假外臣而有營造若無禁止漸謂通規一則乖國朝淳厚之風一則冒典憲防閑之制臣伏見雒都頃當制葺之初荒涼至甚纔通行徑徧是荊榛此際集人開耕便許為主或農或圃逾三十年近歲居人漸多里巷頗隘須增屋室宜正街坊都邑之制度既成華夏之觀瞻益壯因循未改污濁增深竊惟舊制宮苑之側不許停穢惡之物今以菜園相接宗廟祠宇公府民家穢氣薰蒸甚非蠲潔請議條制俾令四方則之
