front:
  text: 全唐文欽定全唐文卷八十九僖宗四
  hash: sha256:582ab90cf7f4dab567d48e69c0c46f3cd6289e67fdbdb6a970b2db9fbca54405
body:
  text: 朕聞天以陽居大夏地以陰居元冬是明任德而不任刑也在帝舜則舉兩階之干羽在成湯則開三面之網羅是明好生而不好殺也朕以眇身嗣膺大寶垂三百年之宗社奉十七聖之威靈夕惕朝乾不忘寤寐豈謂釁生於地謫見於天霾塵暴起於兩京蛇豕交橫於四野宗廟乏饗干戈日尋蓋獲戾於上元俾流災於下土前歲才歸大國又及播遷信由倚任之非良有愧精誠之未至貶衣損食庶塞乎愆違履薄臨深每增於戰懼方修郊廟且復京畿而駐驛才安還宮可俟虔誠罔通於穹昊兵革又起於藩維蓋以朕不敏不明君臨兆庶仁不能叶生成之旨義不能符斷割之幾智無周物之明信寡應時之用陷蒸黎於塗炭致王室之險艱綿歷歲時於茲八稔顧茲頽紊職朕之由且朕深宮九重跬步千里目雖視而不見耳雖聽而不聞罪在朕躬痛入骨髓但仰天而投泣恨無地以容身撫几興言何嗟及矣今則敬行避殿減膳徹縣食無海陸之珍耳絶管絃之樂唯加惕勵冀遂感通將宏及物之恩在布惟新之令應天下見禁囚徒除十惡忤逆官典犯贓持仗劫殺合造毒藥開發墳墓其餘罪輕重遞減一等左降官各與詳所犯量移如巳經兩度量移者宜並放還仍仰所在州府限德音到日準敕處分訖分析聞奏左降官及流人身有死者并許歸葬其鳳翔府所管吏軍百姓等切令招葺務令歸安縱與李昌符關連情非巨蠹及父兄在隴州城內事出脅從者一切不問其隴州城內軍吏百姓不得輒令損傷戴禮之文務先掩骼應有未葬骸骨及橫尸在路委所在長吏速與收斂藏瘞其自兵荒以來殺傷之處委所在州縣以孟冬賞死事之日於北郭除地用雞豚設祭所貴以導和氣且慰幽魂前年冬未出京之時如聞文武朝臣愴惶奔竄或因凍餒或遭鋒刃遂致斃踣深可憫傷自纍年來朝臣有因謫宦遂致殞身或制使遽聞枉橫宜令中書門下尋訪各與贈官孝弟承家忠貞奉國既顯揚名之道宜加布澤之榮應內外文武臣及諸道節度觀察防禦使隨駕諸軍頭亡父母并準舊例各與追贈追封如有母親見存者各與進封左右神策及隨駕諸部兵士等荷戈負弩侍衛勤勞既效節以輸誠實竭忠而排難永言勳績宜有甄酬其隨駕諸都頭宜各與勳爵未有功臣名號具將士次第填補不得虛被衣賜有紊典章如覆視不實節度使奏取進止本判官重加貶責其邊地沃壤極多歲收可望如聞耕牛素少戍卒苟安唯長蒿萊俱乏衣食委節度使良田之處更議添人均配膏腴令其耕種制置利便務令酌中其南山及平夏党項盡是百姓須令保安長吏若能撫綏蕃人自然寧息切不得妄有侵擾致其怨嗟常須使商旅往來部落不得阻塞致理必先於尚儉傷風莫甚於窮奢朕苑囿不修珠玉不寶所思敦素每務去華如聞卿大夫庶士近者競崇侈靡莫辨等威服玩車輿皆越制度蠹於教化朕甚憫焉卿大夫當助我紀綱為人表則宜修儉約以變囂風其京師應有奢僭違令式者聞之當行朝典應諸道申奏有草賊州縣本皆齊人迫於凍餒召聚徒侶遂肆猖狂並仰所在長吏明加曉諭有能自新首罪一切不問如稔惡不悛事狀難恕委所在長吏設法擒捕不得漏網上京諸司及天下州府負犯逃走罪人今春巳降德音除本罪合至死者從咸通五年以前並停追捕歸還故土其數至多慮被奸人遞相恐動悉委所在告諭令其樂業無致驚惶如歸復者惡跡貫盈不能改過更有違犯尋勘不虛便仰併舉前愆一時痛斷不得容隱侵害良善江淮商賈業在舟船如聞近日官中虜借甚苦或傾奪以充運米或題關以備載軍非理滯留散失財貨州縣雖云和雇商人焉敢請錢本求錐刀翻成損折縱有冤屈豈能申論道路怨嗟莫甚於此自今以後委所在長吏切加禁斷其所合供過軍等舟船唯許空載航船便給見錢雇召如見裝貨物者切不得強令騰倒其州縣所合雇船腳多無本色錢物皆是率配疲人起今以後并仰以上供錢充給如有茶鹽舟船關係三司榷課者任準元敕處分自蠻寇侵擾連歲用兵耗蠹生靈海運為甚驅我赤子深入滄波覩駭浪而魂飛泛洪濤而心死繼有覆溺多不上聞仍遣賠填急於風火哀其巳死之衆不可復追念茲將斃之徒用延餘息應江淮四道運糧所有沈覆米損船綱官所由船戶及元發州縣合賠填者並從放免更不得校料追徵應闕海運留繫勘者并一時釋放唯造船官吏須有勘覆者不在此限近日蟲蝗米穀翔貴所在州府須使通流況閉糴之條著在格令近關州府通舟船處不得約勒商人固違敕旨等江淮錢物到各宜優賞以身許國致命捐軀慮茲盡瘁之誠宜飾始終之典應自兵興以來所在都頭大將身歿王事未經贈官者仰本道各與分析聞奏量功勞優與贈官如有子孫仰本道各與補職務令存濟行營將士如身歿王事者其衣糧并仰給與兄弟男姪如有父母無給養者切在安存勿令凍餒雖纍有處分可一切施行或有義士忠臣圖功立事力當國難身歿賊鋒者宜委中書門下優與贈官兼訪子孫俾沾祿仕用伸激勸冀洽恩榮扈從之勞辛勤備履若無升進何以獎酬其到興元宮文武官等宜令優與遷改如巳經獎擢者特與量加階爵自貞觀開元之後建中元和以來翊戴皇家扶持宗社勳績巳銘於鼎鼐謀猷實在於冊書如聞子孫或多淩替贈太師汾陽王子儀臨淮王光弼西平王李晟咸寧王渾瑊贈太尉秀實顏真卿顏杲卿以下子孫宜各與一子九品正員官其子孫有才術可稱委中書門下量才敘用以勸勳賢律有驅率之科所宜原宥人無險詖之路固可矜寬其陷僞庭官寮多因迫脅旋宜敘用勿使棲遲左右神策軍及沿邊諸鎮將士或隄防藩竊或控扼封陲戴甲荷戈眠沙臥磧無抱子弄孫之樂有離鄉去里之嗟自亂離以來衣糧多闕顧茲疲弊深軫朕懷蓋緣諸道賦稅未來致使如此宜委度支戶部及鹽鐵使各委官吏催促江淮及三川上供錢物充給兩軍及邊鎮將士衣賜如催勘有序其官吏各與優獎如全無次第必議懲責於戲朕以寡昧託億兆之上不能克相上帝寵綏四方履地戴天痛心疾首是在股肱叶力藩翰同心保列聖之洪基佐沖人之薄德共成興運以副殷憂為政之方實資共理且一邑之政由乎令長一郡之政由乎牧守一方之政由乎藩翰之臣夫政修於上則化行於下可以安人理國可以阜俗康時此古今之通理也自乾符之後廣明以前節制廉問之臣州牧縣宰之吏或掄擬不當或銓擇非良鎮藩翰者則惠養撫綏之術薎聞居牧宰者則貪婪苛虐之風益甚或淫刑濫殺或剝衣及膚失業亡家父南子北多使饑者不得食寒者不得衣奔竄道途跧藏山谷耕桑甚廢旱沴相仍結為仇讎聚為盜賊冤憤之氣上達於九天激怒之威橫行於千里虔劉郡邑屠戮生靈懷逆節者得以逞其凶桀恣為暴擾蘊忠誠者雖欲平其禍亂益費機謀既往難追將來可保切在遞加激諭漸致和平倘或刺史知惠養之方縣令有撫綏之術公清克己廉慎當官績效彰聞當與遷擢如或貪殘不理害我疲人委中書門下重加懲殿仍令諸道長吏觀察判官切加察訪每歲具善惡奏聞自屬兵戈全妨耕稼遂令壠畝盡變汙萊蓋以殺傷之餘流亡益甚宜加招撫漸復農桑如有刺史縣令招收戶口開墾荒田置買耕牛修置農具者委所在觀察使精加點勘具數聞奏當據課效高低優加升獎朕端拱穆清思宏理道用憂勤而補過守慈儉以律身上展孝思下康庶務其於祀事尤在精崇常憂多難以來有乖敬慎至於牲幣之數醯醢之宜必盡吉蠲或免簡易宜委所司切加鈐轄不得因循夫儉者德之恭侈者惡之大唐堯土階三尺夏禹菲食卑宮先聖遺風後王軌範其有司合進常膳三分宜減一分六宮嬪御見在者人數不多此外不令更有添置或有因緣寇盜流落外方宜委所在長吏便與嫁遣任自營生不用送到駕前冀免虛有勞費自此諸道更不用進聲樂及女弟子歌舞衣服綺繒組繡雕鏤珠璣頗害女工實妨農事奇技淫巧往哲所譏況遇艱難尤宜儉素其諸道不得進奉紋繡宮錦雕鏤輕靡彰施之物五坊鷹犬以備時搜方當勤恤之時寧有畋遊之樂其鷹犬并令解放不用更置諸道亦不須進送艱難巳久增修未知展瑞披圖良多內愧且以為白烏丹鵲不如孝子忠臣甘露醴泉未若風調雨順自今以後諸道所有祥瑞並不要圖畫及進輔成教化實在賢良用副旁求必資博採宜令文武常參官舉刺史縣令有異政殊績者淪滯山林有奇文異行者所期表異無或面欺孝子順孫義夫節婦各加旌表以示鄉閭父老有年九十以上者賜帛二匹粟五石仍令所在以上供物支付瘖聾跛躄鰥寡孤獨者委所在切加存恤無使恓惶名山大川興雲致雨冀保順成之歲宜申望祀之儀太清宮及驪山華嶽南山廣惠公巖谷湫鳳翔啓聖宮邠州要冊湫宜各差官禱謝其諸道應有祠廟禁於祀典及先聖靈跡各委長吏差官精誠啓告凡關百姓安危風土利病俾其蘇息切在撫綏言為弊既多固難遍舉仰所在長吏審詳利害一一條奏所冀凋殘漸成完輯勿辜委遇副我憂勤於戲朕為人君父纍屬亂離一發言未嘗不兢憂一舉足未嘗不愧悼徒思罪己安敢尤人中外臣寮宜悉朕意維乾符五年歲次戊戌十二月壬戌朔三日甲子皇帝若曰朕聞尚德尊賢九命有專征之寄論功誥道四履標列國之榮眷惟碩臣統茲巨屏茂勳克樹殊寵未升爰增疏土之恩式表類能之重成德軍節度使鎮冀深趙等州觀察處置等使開府儀同三司檢校太尉兼中書令鎮州大都督府長史上柱國趙國公食邑三千戶食實封二百戶襲實封一百戶王景崇德星垂耀嵩嶽降神抱匡君濟俗之宏才蘊武庫文房之重器智逾炙輠利比決雲運協祥符懷茂先之博識道高時傑同季野之陽秋臨戎克布其恩威命代榮彰乎經濟惟乃祖禰名光書正氣沖霄忠誠貫日永言勳績著美華夷承家得馭衆之方共理契無為之化成吾心膂藉乃棟梁加以政洽兵農惠分黎庶俾貔貅之衆敬若神明襏襫之徒愛如父母況位升台鼎績著翰垣華資復異於陳蕃顯秩尤光於朱寵更舉封齊之典冀同繼越之尊於戲啓金縢於周公翦桐圭於康叔皆昭彰前史蔚著殊庸況今榮耀八紘富居千乘式茲優異尚此渥恩往惟欽哉敬服厥命今遣使給事中柳韜副使吏部郎中趙祕持節冊爾為常山郡王元化序時日月啓貞明之照神功宰物乾坤垂覆燾之仁萬物仰而遂生百王體以為用朕虔膺眷命恭守丕圖懼忝所承慮違厥道每馭朽以思戒若涉川而靡寧自臨御以來夙宵增勵幸而文修政歲稔人安賞罰惟公忠厚成俗道漸臻於清淨理將致於雍熙由是禮上帝用答天休御端門以崇皇極是彰報本式叶體元尚念蠹於政事者未除害於時宜者未革盡施條制以絶根源更表申恩仍行肆眚昔殷湯解網實謂至仁漢文措刑永稱聖理在宥乃為君之德好生實有國之規今復承以陽春之時布其渙汗之典上符天意旁契人心大禮備陳彞章克舉謀猷廣備聲教遐宣期昭泰於寰區亦涵濡於動植溥天率土既樂元風四海九州宜覃慶澤可大赦天下自乾符二年正月七日昧爽以前大辟罪以下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不原者咸赦除之惟犯十惡叛逆以上及故殺人官典犯入己贓兼情涉巨蠹及持仗行劫并故殺人者雖巳傷未死更生意欲殺傷偶時死者并同巳殺人法處分買賣毒藥開劫墳墓及刑獄之內官吏用情推勘不平因成冤濫無問有贓並不在原免之限敦本睦親古今典制永惟負荷常切憂兢應宗室有材行可升淪落在外並委宗正卿專加察訪旋申尚書門下量材處分惠安皇太后凡有緦麻巳上親各委所在搜訪聞奏仰酬顧復何擇親踈爰念播遷重命牽復至於殂謝亦使惠綏用表深仁以彰元化左降官量移近處巳經移者更與量移如官至刺史準刺史月限例處分諸色官未復資者有司別條流聞奏如合復資者五品巳上中書門下便與處分六品巳下任依常例選集丁憂去任及在憂制貶官者服闋日亦與量移緣責除降資正員官及緣纍停免未經引用者并量與進改流人及降死從流者移近地如巳收敘者量材録用並僧尼道士移隸者亦放還勸善懲違朝廷大典苟或隳紊何以聳人其流貶人中或有情狀巨蠹物議不容者不在該恩流貶人如巳亡歿家口欲還及須歸葬者聽隨所便如緣葬事幼弱饑寒不能自濟者委所在長吏量給棺櫬優恤發遣左降官及流人等有官者如巳歿各還本官亡官失爵痕纍禁錮者並從洗滌諸色流貶人元敕內云雖逢恩赦不在量移之限有自前年十月十二日赦書後巳經量移者五千里更與量移一千里三千里外與量移五百里情狀難容者不在此限天德五城流人負罪素重元敕未經十載不得放還今屬洪恩須令沾及宜減三年如年巳滿便放還從九月四日降郊禮敕後流貶及引決妄稱冤人等并重推覆囚徒并不在此限近日奸險之徒多造無名文狀或張懸文榜或撰造童謠此為弊源合處極法應捉獲此色者準持仗劫人合造毒藥例經赦不原其所得文狀準律文於所在焚毀不得徵逋賊以利疲人是叶政經期為理本京兆府去年夏青苗錢每貫放三百文所放錢如是有司占留色目委戶部準舊例據數支填其咸通十一年以前百姓積缺兩稅斛斗及青苗榷酒錢并稅草職田麥屑䴬棘等徵收不得空繁簿書前年十一月十二日赦令巳蠲放至今尚未了絶宜令所司速具放免錢物數目分析奏聞如在官典所由腹內者不在此限從咸通十三年夏以前京兆府所缺諸陵園及諸軍諸使錢草斛斗并諸雜物一物以上宜並放免其諸縣所缺府司錢草斛斗一物以上亦並放免從咸通十三年夏以前京兆府所缺諸陵掌間彍騎丁資三衛等資錢亦並放免甸內逃亡人戶尚徵稅物切要條流以安疲瘵委京兆府差官逐縣勘覆其逃亡人戶産業田地未有人承佃者其隨田地苗稅除陌榷酒錢及斛斗等並權放三年勒常切招召人戶三年後再差官勘覆據歸復續却收稅從咸通十三年以前甸內所缺延資庫戶部度支榷酒除陌及和糴賑貸錢物斛斗一物以上並宜放免內莊宅使巡官及人戶等應缺大中十三年以前至咸通八年以前諸色錢六萬二千三百八十貫三百文斛一十萬三千七十四石九斗絲二十二萬七千五百八兩麻二千四百七十斤草二十六萬五千八百五十五束念其纍歲不稔人戶貧窮徒有鞭笞終難徵納並宜放免三司所缺錢物巳遣不徵必慮依違尚猶追擾度支戶部鹽鐵三司應收管在城及諸州府諸場監院所缺咸通十年以前諸色錢物斛斗等前年十月十二日赦文并令放免所司不得更生節目妄有進取如聞所司官吏緣循至今尚有盤勘都非公事但務生情歲月轉深奸弊頗甚各委本司差定官一人專勾當但據現在文帳檢勘除官典所由請領官錢和糴和市及在場官供官招商所由帳內正身見在外其身巳亡歿曾經檢責及身見在貧窮家業蕩盡無可徵納者并逃竄捕捉未獲囚繫妻男攤徵保人等仰便據年額請免除去簿書不得更行文牒妄有盤問赦書下後限一箇月內貝放免錢物單數分析聞奏如更稽遲本勾當郎官當議貶黜典吏等痛加懲斷停解天下州縣官銓司注擬便是選自朝廷何故三司監院官索州縣承迎云是制院恐哧嚇州縣影占富豪從今後有監院處亦仰州縣常加聽察如監院官有不公不進各申本州行牒本司便如狀事稍重仰專差使送申狀本司事大則任聞奏兼申中書門下御史臺以憑推勘所冀遞相檢察不敢侵淩諸司更換素有定規近日苟且緣循漸至虛折商徒則獲利倍於往日所司則侵損轉難任持若不條疏積成蠹弊其三司更換宜令準咸通十五年閏四月二十一日度支所奏處分如尚踵前必舉朝典制置新歲酒錢其戶貧破者州縣不令破戶或賣柴傭力以納稅令所由司條流聞奏其河南府界蒿荒地委河南尹於稅錢三分內量與免二分勿令無路營生聚為草賊其天下州縣除巳準元敕徵收兩稅榷酒錢茶鹽利旨支米價等分外餘額外加徵別配及販柴炭之人納稅等元無敕文緣本道奏請降敕并仰敕內便皆停罷仍限敕到後二十日內分析聞奏并不罪今日巳前之事如又不巳必舉明刑曾經水旱巳放徵科或慮緣循須更提舉諸道州府或有遭水旱甚處去年夏稅合納苗稅等錢委本州府長吏酌量蠲放其咸通十年以前所缺負兩稅錢米等在百姓腹內徵收不上者前年十一月十二日赦書巳放免仍委州府速檢勘蠲放分析聞奏所在州縣除前資寄住實是衣冠之外便各將攝官文牒及軍職賂遺全免科差多是豪富之家致苦貧下準會昌中敕家有進士及第方免差役其餘只庇一身就中江南富人多一武官便庇一戶致使貧者轉更流亡從今後並依百姓一例差遣仍委方鎮各下諸州準此檢點江淮運米本實關中只緣徐州用軍發遣全無次第運腳價妄被占射本色米空存簿書遂使倉廩漸虛支備有闕緣循弛慢全自職司宜令轉運使速具條流分析聞奏才及春緩便須差清強官吏節級催驅嚴立科條須及舊額苟或踵前容易必舉朝章郵傳供須遞馬數目素有定制合守前規河南館驛錢物至多本來別庫收貯近日被府司奏請衮同支用遂使遞馬缺闕料糧不充憲司又但務緣循都不提舉宜令東臺館驛使速具條流分析聞奏東都留守所管兵數不少無非市肆之人緩急抽差全不堪用防衛官闕尤非所宜須有條流以革前弊宜令速分析見在闕額并老弱人數聞奏應緣州府經費悉有舊規近者不務在公惟思潤己或聯遇豐稔亦不貢羡餘若小有水旱即競有論請致朝廷事力轉困在臣下誠敬何乖自今以後如輒將上供一錢物支用者并當加譴責不在原貸之限如本道實有災荒積歉為甚衆所知者不在限例朝廷徵發兵士固非獲巳道途頓遞費勞至多又聞節級須得人事裨補每縣不下五千文盡配疲人深可哀憫自今後但供備無闕輒不得踵前率配如或違犯縣令本曹官重加貶降人吏決杖配流其都知兵馬使以下並以枉法贓論立法之始當在必行諸處本置作坊只合制造干戈兵甲及進獻供須昨徐方用軍諸道多無兵器內庫般送填塞道途如聞作坊惟使雜伎弓甲之匠十無一人打築即惟務精新器甲則惣忘修整自節察至刺史皆為信臣不能委曲條流各宜自知改革諸道兵士非惟闕額不堪兼又軍將數多一員敵官健數分又占官健當直遣納課錢其弊數重深要除蕩仰諸道各自檢點如或本自書題又無功效非軍中子弟空請職名并皆疏理其軍將等各遣納課錢者並準入己贓結罪科斷東畿之內留守影占最多稍富者不揀城外村中盡有一虛名文牒亦犯罪者亦稱此名府縣若追但行牒却取事小則推勘了牒送事重者則與勒停委留切不得遮奪免致鬬傷其在京諸司亦仰各依此例如被抑屈但具奏聞且徵兩稅自有常期苟或先自催驅必致齊人凋弊蓋緣機織未畢庤錢未終便須零賣縑繒賤糶斛斗致使豪首迫蹙富戶吞侵須更申明俾其通濟諸州府如有不依旨限先期徵稅者長吏聽奏進止縣令録事參軍並停見任書下考不在矜恕之限關要之外聲教至遙每念疲人尤多橫役訪聞五嶺諸郡修補廨舍城池材石人工並配百姓至於糧用皆自齎持既不折稅錢又全無優恤永言凋瘵實可憫傷自此委節度觀察使接借本錢并刺史百計收拾運轉別立修造案名額遣幹濟官主持常令急遂修營勿遣大段摧毀永放百姓額外差科巳責恤人斯為盛美遐荒賤吏尤可哀矜先於咸通五年梧州糴十萬石米停貯數載之後方令盤送雍交如聞卑濕損傷雀鼠耗折計其所言六萬石餘纍載以來亦頗校料徵納主持軍將十餘輩攤保纍數百家或科決不輕或資財蕩盡典男鬻女力竭計窮盡虛挂簿書徒為羈縶宜從寬宥用釋人憂其所缺米委度支一時放免雍管交趾屯駐兵士全無運糧俾其足食湖南江西管內諸郡出米至多豐熟之時價亦極賤綱官若得錢收糴每斗必有盈餘道途既可經營輸納自無敗闕緣於官倉領米刮鐵平量既潤資陪便致吞侵耗折所以經年纍月舳艫相交江路多有沈淪軍食常憂缺闕自今仰所在長吏切須饒潤綱官並令交付腳錢仍與善價糴買嚴示刑賞不使稽遲雍州安南晏州見屯諸道行營兵士合食米錢等三處兵數近四萬日食錢米費用極多全在諸道州使巡院饋運相繼免失支持近日以南中為警急抽差皆務循將相同常事蓋緣地遠差綱無利皆託以鹽鐵戶部指揮未得分明申報逗遛圖延界分或有未有本色皆云額望收錢及綱官進發之時缺腳錢途路侵盜錢米所至稽停每發一綱便逾星歲致令供軍使頻申三處月限不相接續所司前後申奏行牒督責非不丁寧蓋緣只有科貶之名曾無必行之令遂致全無凜懼但務緣循若不嚴立科條必恐轉成敗失其諸道州使巡場監院所合般送南中供軍錢米各委所在長吏併發綱船以濟軍用仍委逐道節度觀察防禦經略刺史差最大判官一人專判校料其巡場監院官場官自專催促各令設法勾當克濟軍需如依前逗遛不早送申遂使邊軍糧儲久闕供奉不得相續便據所缺錢米處勘還重加貶責如州使官吏巡場監院官能罄誠節慎選行綱支遣及至舟船繼至即重議酬獎河東向管延資庫斛斗五十萬石每歲出陳入新之際勞擾州縣百姓至多未有用時積為深弊宜令本道節度使檢點除道路與邊鎮接近緩急堪般充軍糧者即且準前其餘深僻州縣并速條流分析聞奏義倉斛斗本防災年所貯積歲多翻成侵害又差重丁大戶充倉督子弟主管凡節察及監軍使刺史縣令到任仍須一一毫量差役鄉夫數重勞擾每一量覆缺折轉多主掌之人貼家竭産生靈塗炭州縣困窮從今後宜五年一度變換便糶貨收錢入冬却糴仍委本道監使常加訪察如有上下蒙蔽期隱破除聞奏但不要初上之日須重覆量每度擾人朝廷大弊在於令不行只如經水旱州三降敕命不許將逃亡規攤見在人戶遭災水旱處有於見在戶兩倍徵或至三倍又近年以來節度觀察使或初到任或欲除移是正二月百姓饑餓之時公遣二日條先抽徵見錢每一千文令納三四百此時無不兩倍三倍生生舉債至典賣男女以充納官行彼貪心殘我赤子從今後有如此者必舉極法以謝生靈諸道事例差使結歡法信出於官中答幣歸於私室駐留供備迎送優豐進獻不副常程結好却為公事惟奏缺闕不思本源且鄰境結歡何必事須厚幣來者若為私物去者何必官錢道慕空門名為釋子若非精進何以住持應城及諸州府僧尼元敕人數外不得轉令私度如有死亡等闕即任據人數填補年終聞奏待五年限滿時每收補皆須選擇有戒行事業者勿令濫雜之輩於此容身天下刑獄申到法寺及刑部有經數年不得了絶省寺人吏競邀賂出入律文大理寺及刑部官僚不親公事致使一案之內半死獄中從今後委中書門下每日點檢如停滯者大則貶降小則勒停其刑部郎中員外切須選擇亦不得輒冀奉使以望賄財有文案則併送對廳行貨財則獨收私第準咸通十一年條流諸州刺史三千里外限三十箇月二千里外限二十七箇月近者勒刺史到郡交代則可以計到郡月滿便且除移如新除者則須待月限滿除替其餘內外諸官並依咸通十一年條流如有限未滿錯替者任經中書門下過狀便與追敕有過失須替則不在此限兩省官本令先任四赤令貴欲知人疾苦近者才三五月則替何殊罔生空倍擾人從今後宜以十五月為限兩畿令府判司從前吏部注擬頃年或除三人兩人近者乃至除望縣令及部尉等中書自不存體百司何以仰瞻其進馬千牛本限五年方滿近者旋替年深致使入仕多門三銓無闕從今後如或用年深闕補人兵部郎官必議貶降詞科出身士林所重本貴踐歷漸至顯榮近者惟扇澆風皆務躁進麻衣才脫結綬王畿是能十年宦途今來半歲遷授頗為言為弊須舉重明自今以後進士及第並須滿二周年後諸道藩鎮及戶部度支鹽鐵及在京諸司方得奏請如未及奏官限內有攝職處一任隨牒攝其宏文館集賢院奏請直館校理並依此月限如出身後諸道奏巳請初銜未得兩考者輒便奏畿內尉充在職兩考方得依資除官改轉其授使下官先自有月限資序一一須守舊規不得超越比擬準咸通十四年十月九日敕文處分關節取受本身值財素來貧無亦多舉債祗緣從來赦文未甚分明賞罰若行必當止絶自今以後如有人錢買官納銀求職敗露之後言告之初取與同罪卜射無捨其錢物等并令沒官送御史臺以贓罰收管如是波斯番人錢亦準此處分其匱坊人戶明知事情不來陳告所有物業並不納官嚴加懲斷決流邊遠庶絶此類用其清平樂官乞託本自人情既越舊規過於債負雖纍有明敕尚不遵行兩巡不切追擒教場又不鈐轄從來上於方鎮近日方鎮與樂官人事轉多別有遷除例皆乞覓喧呼門戶擁塞階庭以此得官人不願除授自今以後除方鎮外兩巡使及諸司外巡切加擒捉如有此色具送本司枷禁勘責痛加懲斷以絶此風近歲以來風俗奢侈不營根本各務誇張及第登科傾資靖産屋闕一字竟踰於制度喪葬皆越於禮儀為冊使弔贈之臣或爭財貨乞賜章服之類不畏慚羞致使兒童或輕朝列念茲靡愧常行歎嗟委中書門下次第條流稍為改革輸其常賦尚慮不充更或加徵其何以濟近年百姓流散稅錢巳多如聞自朝廷用軍有終百姓正稅外每貫紐四十五十文巳是數年至今不矜放黎氓冤抑腿脊瘡疾所徵錢則將充諸色支分所添兵則逐月銷減每思此事深可嘆傷其天下緣用軍奏加紐貫之外更有敢徵一文其長吏及判官録事參軍並準入己贓仍不在以官贖之限其鄭州庚道尉在任日加徵稅錢如或却徵亦依此例衡鏡之司去留雖切念其羈寓須與商量吏部選人如聞纍年駮放至多或文狀粟錯或書判差遲有司守文不得不爾況選人例迫饑寒遠來調集頻年被駮情實可矜既遇鴻恩合與優假委吏部檢勘去冬選人若有此色除非身名渝濫及缺選缺考外並以比遠殘闕取其情願者特與却收注擬諸道奏官奏者緣要闕舊人不理從今後並須分明具不理罪愆先加懲責有罪空替則是惠姦其奏前資及見任多有虛豎頭銜用錢計會從今以後有官更奏者便仰兼遞告身進奏院以憑點檢如告身不到不在奏行其虛銜所奏只與九品初任仍奏狀內須是三代官諱及鄉貫戶頭年幾餘各依資奏請河北三道不在此限守土長人切資士族品流混雜必害生靈刺史縣令如是本州百姓及商人等準元敕不令任當處官不繫高下蓋以事體不可兼又十室九親多有憎愛一切阻礙公事難行近年此色至多各仰本道遞相檢察當日勒停百姓商人亦不合為本縣鎮將若有違越必舉典刑裨補除任實在獎勞奏請繁多則為過濫咸通七年赦書條流諸州府奏軍將官不許除上佐如有功須獎即於本管內除授仍不得占優厚處近日諸道不守條章或分兩三度奏來所貴前後不相見但行會計貴得人多從今以後諸道軍將官並限七月表到京令之初行宜武臣之敘進據所合奏人數一表令如有別勞效者即待明年七月不得兩度貴行欺隱忠在社稷誓著山河或盟府書勳或閟宮配食宜舉賞延之典式彰義烈之名故尚父汾陽王贈太師晟贈太尉秀實贈司徒顏杲卿太師真卿張巡許遠南霽雲子孫中未甄獎者每家與一人正員官安金藏頃申忠節實異等倫合為疇庸以勸義士如有子孫與一人正員官武德以來配享功臣名迹尤著節義顯聞子孫淩替官閥廢墜未經甄録者委中書門下搜訪嗣人量加優獎慶連宗室義重維城洎文武羣僚恪恭事務用酬勞績宜降恩私亞獻撫王紘榮王㥽等各賜物一百匹夾侍正衣進圭捧圭各賜物五十匹亞獻終獻正衣各賜物四十匹大長公主嗣王郡主縣主各賜物內外文武見任及致仕官三品巳上賜爵一級四品巳下加一階合入三品五品缺考未合敘者待考足日聽敘封孔聖之後加虞賓之恩式表崇儒以明繼絶文宣王後及二王三恪各與一子官其祠廟委所司量加修飭義在奉親道惟睦族將申孝敬合示恩榮皇五等巳上親三品巳上賜爵一級五品巳上加一階六品巳下及前資常選散官選日優與處分未有出身陪位者準會昌五年正月三日赦書處分應陪位皇五等巳上親三品巳上賜爵一級四品巳下加一階四等親並諸色陪位者五品巳上加一階六品巳下各白衣并賜勳兩轉其前資及後出身各減一選皆懷追養之願盡有榮終之心授任封崇式光存歿常參官及諸州府長官父母見在未有追封者并量與五品致仕官及階并邑號如有官者量與進改如官巳至五品巳上者即與五品階父母亡歿未經追贈者量與追贈及邑號任榮輔相寄重藩方洎於親軍咸秉忠節俾令追贈以顯榮名中書門下及節度使帶平章事各與一子八品正員官祖父母父母亡歿各與追贈巳經追贈者更與追贈節度使與一子正員九品官東都留守度支鹽鐵使觀察處置都團練防禦經略招討使皇城留守各與一子出身先亡歿未追贈者各與追贈虔奉典章肅供祀事宜覃渥澤以獎勞能禮儀使大禮使京兆府尹各與一子正員九品官應郊廟升壇行事官溥恩外中書門下尚書省御史臺三品巳上特加一級四品巳下各加一階如入三品者量減三考入四品者量減三考入五品者量減兩考仍待考足日聽敘其合選人與減一選內行事者官三品巳上賜爵一級四品巳下更加一階內侍省及內坊官四品巳上各賜勳五轉五品巳下各賜勳三轉應從駕至郊廟者溥恩之外三品巳上賜爵一級四品巳下各加一階白衣賜勳兩轉位列牙爪職掌警衛念其宣力宜加疇勞闕維中和元年歲次辛丑七月丁未朔十八日甲子皇帝遣將仕郎內侍省內府局令員外置同正員上柱國賜紫金魚袋袁易賜紫道士杜光庭等備香火之奠封丈人山為希夷公惟山高極太清下蟠厚地含雪霜於陰谷吐日月於陽崖助銅柱以標雄齊玉壘而增固本大末小諒千載而不傾布澤施雲實萬物而斯植雖郡祠豐潔山廟肅清未聞崇建之名徒有丈人之說朕以黃巢干紀翠輦蒙塵火未滅於燎原書每煩於揮羽竊思冥助冀仗靈功俾資千仞之崇式示三公之秩況希夷懿號蘋藻佳羞齊誠宣室之中虔祝雲衢之外陰兵俟役孽豎期消重新日月之光再奉宗祧之祀別申明命永鎮坤維尚饗嗣皇帝臣某以流星謫見分野慮災謹遣賜紫道士杜光庭等於宗元觀修靈寶道場丈人觀設周天大醮伏以至道無形時符於人事元天垂戒必見於星文非憑悔謝之門豈格修禳之念是用齊心宣室稽首名山為百姓希恩設周天大醮臣自塵驚關輔駕出褒梁九廟靡依羣生失庇致祖宗之大業危若綴旒念士庶之求生勢同纍卵省過敢忘於罪己恤人深切於救焚布服蔬餐贖愆尤於既往祈天悔過希保助於將來大道以慈惠為基高明以廣大為本降福必歸於有德除災當務於庇人使沴氣潛消飛星暗逝蜀郡士庶永絶於札瘥京國黔黎早離於霾曀誓將仁育以答元功仰望靈恩不任懇悃之至
