front:
  text: 全唐文欽定全唐文卷八百十九甚夷守濠州文學後為館驛巡官
  hash: sha256:1a40f124cc06bfcb4185abd00add44e78107979c14c8feba18f49e5ad14684f9
  markers:
  - {type: head, offset: 13, content: 邢甚夷, id: KR4h0168_NFKB_819-h1, level: 1}
body:
  text: 太姥神廟於巢湖邊久矣其靈跡所自陰隲之功傳於人間斯不復序無何中和中為行寇所燼其屋壁竹樹無孑遺焉時以國創中興日不暇給雖人懷敬尚而孰能葺修故靈儀殿庭備位而已合肥數年前嘗為鄰郡所覬我軍設備營於柘塘陰有所關亟戰未利士因怠鬬咸思迴戈今太守尚書時九苞未彰隱於將領亭午之際惽然寐酣忽夢靚粧人連掣其袂比及寤已見披堅輩盡飾歸裝公由是倳刃以遏之號令以壯之翌交鋒乃有享獲公記靚粧者即太姥神向非夢來幾致師潰尋祝曰苟終垂祐當營祠而酬爾後以伐叛摧兇不虛其歲汲汲於追奔逐北豈暇於掇日興功文德初淮南節度畱後兼行軍司馬宏農公司空酬公前功奏以知郡有詔宜依龍紀元年秋七月大梁淮南兩道連帥東平王沛國公中令以公能理奏請正授其年十月綸誥至公乃減費聚俸將踐願言故匠得良工材獲異木不日不月懋功就焉觀乎鴛瓦攙空虹梁用壯妙臻土木美極丹青既竭精誠悉合制度君子咸謂公心匠宏贍信誓端売心無負於神祇焉公之理民也以仁明其統衆也以嚴正遠聲色以律下屏讒佞以清心屯甲士護封疆不黷武放肆積金穀備支費無潤屋覬覦嘗欣祿已及親每患政未及物其懲惡也雖親戚腹心無所隱其賞善也雖樵漁牧圉無所遺其待士也雖襤褸龍鍾無不延其聽訟也雖衆惑㣥疑無不辯加以推忠向國盡力酬知視榮華如浮雲以功業為己任則不知古之良二千石相去幾何故得寇輩每來棄甲遐遁農經二稔賡歌有年商貨駿奔厂墨易霧塞民之遂性如大駕未遊前且昔在昇平未易致此况今多事不亦難乎哉甚夷宦遊求知蒙待不次既覩盛事其可無言因請刊貞珉紀不朽希數千年後知廬江有賢太守也時龍紀元年己酉十一月十一日己亥記尚能官太常奉禮郎撫州屬縣南城則古之緊邑也漢高祖六年會將軍灌嬰襲滅項籍之後割豫章南境分立為縣以飛猿南豐二源合派又以西崗土貴勢強而肇其址也以其城在洪州府城之南故曰南城其後歷於晉宋雖興亡而則多唯斯邑而不滅至吳太平二年始立臨川郡以隸南城而屬之焉管一十三鄉周巡六百里林奇谷秀則鶴嶺牛山無以加水遶川環則洞庭陂澤不足比人繁土沃桑耕有秋學富文清取舍無悞既狀周道兼貫魯風萬戶魚鱗實謂名邑暨乎咸通初狂蜑不賓嘯聚而來犯我郊阯國師既舉斯邑舟車通濟令以轉輸雖則民勞功業未墾及至乾符之歲水旱不常或波蕩林邱或塵揚沼沚蝗螟敗害歲力凋虛教勸不從兌攴襄斯舉天反其度地亦為妖火既燎原鯨潛鼓鬣生靈浸敝宸睿是憂非朝典之不施乃俗暴而難整遂使敵震郊野禍作蕭牆縱陳湯網以籠羅或有弄戈而怙亂是以皇都失禦玉輦蒙塵既乖華封之仁爭起有苗之叛近茲嵓澤乘時寇興皆拋順靜之規各振縱橫之志猶賴寶祚延遠百工得人於是有我常侍武銳孫吳文英廉藺心韜杜庫性蘊班籌乃召我兵共征不譓因得名重於臨淄將帥威過於屬部諸侯奪劍一呼強梗淪伏緝綏撫甚疆境帖然郡縣如初鄉關法舊次命文德之臣繼總兵師克復咸京巨盜既平採訪忠讜謂以汝南公道存修巳信在佐君端雅聲彰溫亮言顯成紀綱之範為經濟之箴慶匹豐泰之期清諧中和之樂糾其政化奉以昭蘇旌德業以分憂錫賢能而封秩乃皆寵渥為南康太守焉時以麾幢未行邊鄙猶擾乃召諸將而謂曰凡征伐卷舒在乎人意戡難輔時在乎人機今以烽燧尚興祲氛未息因觀聖人作易而有豫防雖同鶴以擇林亦慮蠆而有毒宜得營壘備其梟鴟乃遣行教布令不日萬人公乃指畫規模勻其版築悅而不勞寬而得衆齊心似一樂運如流不越二旬其功告畢周回一十三里闊一丈六尺高二雉露屋一千一百三十間敵樓三十三所東西鑿八門南北二門門則通衢焉於是崇墉截漢昆陽不足以為堅峭崿凌雲金城不足以為壯控五嶺封疆之要扞七州寇徼之虞覬覦者不得動其心眦睚者無以運其智可以拒鸛鵝之陳可以拔烏合之徒內則軌轍齊驅堪敷權畧外則民人側目愕以堅勞護吾君租稅之封授黎庶安居之業得此名邑克全大寧為今辰定難之基是岳牧勳庸之績可謂能高異代善亞先賢象偕魯北以利民憂入晉陽而翦敵以尚能茂修片善命述宏圖才雖匪於英華事得銘於雄麗刊於燕石以紀殊功時以大順三年龍集辛亥三月四日記保和大順時人八卦成列象在其中聖人則之剛柔險易動靜悠促亦皆備矣是則金木水火輪移消長乾坤震巽羅列高下揆情偽至於化匠稽微闡極於大成蓋有有無不有矣物物無不物矣至如舉一趨百制邇應遠者有夫光宅焉宅天下者崤雒之強歟宅邦邑者岡阜之勝歟宅閭巷者隆坦之宜歟自穴居至於大壯猶椎輪形於玉輅其必如此按撫之郡庭初際於亥壬綿歷年代寶應中太守王公圓以其勢卑於郵里疑悍民而沮長因徙於西陲自爾亦匪厥中觀夫用壯而非剛虛右而擁左總詳其眹則二千石列郡比比有不大遷者是其事矣大中中刺史蔡公京審於三地思事再革以勞費滋廣意行力止乾符中巨盜起梁宋兵火照天下干戈日用屠薙鋒起畿甸失禦郡邑曠守斯時也豺狼塞路瓦礫遮轍此之官舍棄如焚如荊蒿蒙春井野一色洎汝南危公奮長劍倡義旅併翦㣥惡克莅百城草剏碁布紉隳績斷詔下之日默究形勝且曰幼少嘗聞前任遺議今也運會萃吾指陳大凡元亨中正會要方乘宜拔乎嵩高麾震揖巽朝辛附癸在控於躍伏苟差毫髮其致懸殊爾乃決意卜築應手經始舍去舊地推移一區而勝秀逸得嚴整鬱備納溪山複疊之勢吐原野蟠連之色有若龍騫鳳舉花攢綺錯於是左通臺門南正㦸扉三扃三廳大寢小寢局署狴帑環迴星列峨東軒以資眺覽峙西閣而備宴見奢儉折中材力攸允廣陌繩分列肆鱗矚繚崇墉備固護之態襟平陸延爽塏之景然後政化以安之禮法以康之仁和以富之遠者來而近者休險陂革而幹蠱用星霜既周閭井以繁年穀登穰士馬精研連帥倚為右屏天子寵為良牧百姓歌之聲聞九重璽書慰勉增爵褒命其猶珠貫公少秉奇志年甫壯室遭時建名起家而萬石非偉許國而一心彌厲而後乃今譽積望洽豐德懿範繼以揮綽雖山河之重巖廊之峻恐無自避也君子曰地載萬物賢人應之蓋合其用而享其祉忤其道而戾其契匪私於富貴勿抑於隆盛也若成王之定鼎邾文之遷繹奉春之建都踵其數而舉其徵者矣保和前紀羅城內慙拙文暇日復聆當世之譚曰事成乎身及乎人力之次也顧惟是續盍表悠久載讓弗克唯而直書巨唐龍集庚戌年在大順律中南呂戊寅日張保和記夫開物成務聖人馭世之通規保大定功諸侯因時而善治醇素既降智慮萌生物乖結繩之約城有重門之警國崇雉堞境藉金湯物理固然其來尚矣且如秉四方之用行五等之道酌損益於未兆裁取舍於永存總括沖機富有大業者則羅城版築久逸暫勞千載一時義斯見矣請言其實國家自貞觀甫平之初文軌均化干羽率服武事鮮備郊壘夷沒間者天寶建中之亂或釁起兩河或毒流三輔江漢之外攙搶殆微故支郡屬邑封閈而已洎先帝幼沖之始數丁九六物極屯難長鯨吞噬以橫流大厲元黃而噫氣饑饉仍荐兵戈重復暴骸徧野游魂慘天人煙斷絕羅城莽為邱墟螫毒馮陵松楸斬為干盾天涯地角邈然喪亂之事邱甸要荒紛如征伐之苦臨川古為奧壤號曰名區翳野農桑俯津闤闠北接江湖之脈賈貨駢肩南衝嶺嶠之支豪華接袂既而封豕豗發飢鷙攫碎相視為盜割據而逞連延數載羅列闕二字絲綸捶闕品節既慢汝南危公挺英逸之資運匡濟之畧倡起忠義志惟掃平初黃天感嘯聚歡踴衆踰數萬兵棼殄熾勢摩中原刺史李公闕二字先為脅逐始僭劇號大署偽屬其餘孽堡妖壘互相支屬犬牙魚貫肘跗繩約莫不競好兇吻爭踐王師出征比比而北總戎闕一字錢闕三字外壤公爰初誓衆靡盈數隊兄弟親愛翼以從焉勵力一致所向神速誠明激天故恢廓闕二字由是兇邪清辟次第澡雪不五六稔諸惡畢拔羶慕送款飲清歸轍不可勝既公擒縱之外按舉無必推誠以同務剔剗蠧舊剏成闕一字指揮而化二道馴致勤王之事撈疲薾挽養瘡痍誘還逋逃闕一字復耕種凡據鞍甲蒙矢石引少擊衆環攻鏖戰不繹銳闕一字暖席涉乎七載破嵓洞擒酋豪偃戈闕一字析踰二十算四邑以之康定鄰疆自因慄伏中和五年三月下明詔假符竹褒美成節慰安井閭於戲物不終否天樹司牧亦明矣當拱天闕之際孰知其故闕六字之詳所以非其時無以彰其才微其用不能靜其亂偉夫忘身循義大節橫秋氣凌丹霄精貫白日其中正之行闕五字義士子來摧虜剛悍鑠絕歿虺蝪其武烈也寬以得衆靜而有法導德齊禮敦本今古其文昭也舉善遏惡先教後令去不急之務流洪彰之名其政術也四者立而衆美附之條張而百姓服鼎新綱紀草創廨署於時乘輿暴露海內沸闕一字兵不遏地靡有定公闕一字檢制之中收今日始未遑接棟惟謹然烽彼皆眩惑於狼心我豈因循於雉堞所謂大君憂寄闕三字在守土赤子依投豈忘城壁苟無捍閉之所有如緩急之事外乃備預五材經營百堵目運心匠規令矩定金甌取勝鐵甕事奇荷鍤蜂攢以闕舉杵雷興而膠固無執撲之勞非奪農之志崇崇帶繞他山之秀色爭來屹屹雲平列岫之祥光俯協歲在丁未律中南呂始事冬十一月訖去奢也周十五里高二仞酌中也敞八門通馳道便事也古人有言大夫出疆以利國家為巳任賢者處世能安社稷是盛業矧夫九圍多難之日闕二字失馭之年一呼而豪闕三字再而領綱振不驕矜以任欲能撙節以茂績衆心成城一德化俗其勤也杜當陽之武庫廉叔度之嘉謠漢宣帝每云所欲共理天下者惟守宰而已今天步未康去疚有一於是東顧之勞可罷有十於是太平之作可待異時登天朝翼景命舒之於五侯九伯表之於煙閣麟臺濟時策勛在我羿彀豈惟撫城獨稱不朽豈惟撫民獨居多佑者哉保和謬當殊遇闕一字詳具美奉命紀錄顧慚不文大順元年下闕鉅宰相收子乾寧初以尚書郎知制誥充翰林學士拜中書舍人戶部侍郎封晉陽縣男從昭宗東遷為左散騎常侍卒門下昔在太宗時則有房杜持國鈞在元宗時則有姚宋司政柄降於列聖代濟名臣是以股肱元首之間未有不相資以成者也况我荐逢艱運方討叛臣宜搜間代之賢冀適濟時之用其有懷材已試亮節孔彰俾膺霖雨之求期正彞倫之敘式舉茂典吾無所私翰林學士承旨銀青光祿大夫守尚書左丞知制誥上柱國嘉興縣開國男食邑三百戶陸扆簡節正音溫光瑞玉咸濩抱降神之韻珪璋挺華國之容包倚相之典墳紹平原之詞藻爰自高才赴召丹地代言絲綸必本於典謨獻納巳觀其事業仍歲扈和鑾之狩六年專詔誥之勤讜正自持聞望彌峻况爾伯祖贄昔以才行嘗居禁林當德宗避狄之時實乃祖納忠之日積其偉節升于鼎司書命諫章流在人口是用選自密勿陟之台衡昭于前光期於休命職我人柄貳茲地官既表殊恩且明丕訓於戲奸宄尚熾干革未平生靈流離宗社蓁莽爾其舉墜典正頹綱進賢良遠姦慝勿依違而避事無拱默以叨恩庶乎艱難有望康濟往踐乃位敬而戒之可尚書戶部侍郎同中書門下平章事餘如故門下朕聞有國家者內則立四輔以貞百度外則建㣥臣以寧八區持吾重權惟此二事其有弼諧之道巳溢於簡編是期訓撫之規更滿於方岳中外迭處古今所榮扶危匡國致理功臣金紫光祿大夫門下侍郎兼戶部尚書同中書門下平章事監修國史判度支諸道鹽鐵轉運等使上柱國瑯琊郡開國公食邑二千戶王搏長淮允慶維岳降神抱文行忠信以飾身範珪璧瑞璜而為器動多偉節言必匪躬自踐歷清華汪洋令望左垣謇諤之稱凜然古風右掖絲綸之功垂作雅誥爾後恤刑著效免賦推能陟於梅霖掌我金穀果罄致君之道無慚出相之門忠謀必成茂績仍舉朕念於越多罹兇狂狡童既平疲俗未泰是思被我寬政播之皇風厚其澆漓滌彼汙染再造其任求才惟艱輟於三台先以十乘不改巖廊之任用資垣翰之光於戲阻於重江負於滄海地號殷厚屬為剽輕雖兵革乍銷而閭井猶弊撫循之理可不慎諸副吾任賢俟爾報政可檢校戶部尚書同中書門下平章事散官勳如故充威勝軍節度浙江東道管內觀察處置宣撫等使使持節越州諸軍事守處州剌史門下越自去秋狩于太華萬乘所至兆人是歸而大無不周細無不具其間舉重典振頹綱封畿肅清宮闕斷度罔有廢事其故何哉吾有誠臣社稷之福今馮翊近藩襟帶河渭撫馭不謹煙塵忽驚將竢廓清爰考前績官占蔽志吾何疑焉具官某星緯炳靈山河間氣理先正本謀必應機知義安居士皆盡力厚生利用人得保家閭閻則咸仰吏師軍旅則共推良將范宣子先興讓典成安君止用作謀以標式大朝準繩列鎮一受命則表章十上以得請為期一推心則忠孝兩全以奉公為本總是全德實吾偉人今者沙澤之陽疆理相接厲階斯構改作是宜俾兼統制之權允竚撫綏之惠爾當視同如華濟猛以寬則吾坦然人俟安一敬服丕命以孚于休門下叩黃鐘者大則大應建殊績者多則多醻匪我之私惟人所召亦若樹桃李者而獲甘實勤麃蓘者必蓄羨糧安有豐功而無貴仕况我襄峴奧壤荊吳要津資上將之撫寧興庶人之歌詠宜旌善政以馭殊榮豈惟醻庸式俾垂勸具官趙凝訓承馬服術茂龍韜蘊倜儻之宏才負縱橫之遠畧性惟忠厚連營懷敢死之心德尚寬和比屋佩來蘇之化加以戴君義切許國誠殷集列岳之梯航贊大朝之經濟憂時奉法曾不捨於朝昏問俗撫封固尋彰於遠邇使鳳闕罷拆夏水澄源歡康以布於百城政令克齊於五屬是用特申異數用顯休勳封崇既盛於一時寵貴仍遷於右座爾其彌勤後効益暢前修為垣翰之準繩遂鄉閭之帖泰永刊鐘釜以奉簡書厥惟丕承勿忝休命門下朕博採大易眇觀詩訓觀柔剛感咸之象賦鳴鳩肅雍之德將以視天下之內理敘人倫之大端宜于家邦厚示風化矧九廟在上籩豆是薦三揖在下彞章具陳得不敬乃禕褕稱茲典禮俾承光於軒耀式正位於坤儀淑妃何氏明配圓靈德符厚載珪璋特達鸞鳳萎葳同輦必辭脫簪能諫四德克備六宮是推述壼職以彌勤煥彤史而斯美况惟元子既登儲貳順考古道雅協徽章受貞吉辰蕆於盛典咨爾克持婦政以率內和齊莊是儀用諧靜德明章之道允在茲乎公虞姓諱鼎字少微本會稽人祕書監兼宏文館學士贈禮部尚書銀青光祿大夫永興郡公諡文懿諱世南八世孫曾祖玟江州刺史祖敏宜春令父汀東魯別駕公性敏好問學月開日益卓然老成登咸通十年進士為校書郎累遷至御史裏行舉彈無所避謇然有聲於時尋陟饒州刺史視事嚴且明人吏歛手莫敢為非乾符二年黃巢寇饒州公出禦之戰甚力賊益至勢不能支城遂陷公及劉鄭二馬衙出奔夜宿芝山祠夢神曰一馬之前錦然之田逢禾即止遇早即遷既覺莫喻其意次日道由餘干政新鄉馬爪石而伏公登山禱曰天其或者欲謀居此乎馬乃起騰至錦田早禾源與夢適符遂家焉公遭時艱不克居其鄉因見山水清秀洎田宅為休老計聞人道國事升降消息即喟然長歎不食竟日無事與山翁野老相往返歷歷談桑麻事意泊如也公生會昌元年九月九日卒同光元年十月十六日春秋八十三即以其年十月十八日葬於安仁崇義鄉善政里饒山之陽夫人王氏父式觀察使女男一人盤孫一人文仲未葬前盤來乞銘曰予嘗有託於夫子也冀出一言為永遠記况鉅與公同年知公為最深銘安得而辭耶銘曰厥存不爽厥施為何宜爾子孫其類並多鄴字正封臨淄人上嗣位九年以宗室弄兵皇居失守大駕東狩至於華嶽明年同華連帥太傅許公罷藩邸兵復諸子位正皇儲立母后朝廷乂安中外咸若又明年宮闕復就乘輿反正封少華佑順侯崇祀也始者內兵擴起右輔騷然驚蹕難追宗社不復扶持關輔徒為扃鐍抗表奉迎莫迴天睠公即馳單騎詣行在所肉袒徒跣雪泣上言曰廟主不行陵寢不告蒼黃順動莫知攸往况西無正名之伐東異省方之行南征無復國之期北濟乏召君之慮華當闕右不遠王畿未虧巡狩之名免負出君之恥可以為百辟會朝之地諸侯輸貢之府地雖不廣足以助供億兵則非衆足以備扞禦時也讜論確然宸心不返宣問往復至于再三嘉謨不聽忠言不納大事將去㣥心洶然關內諸侯惟公獨任非神啟聖不能釋明主之疑非神佑忠不能壯純臣之節既而上察公之志不可奪也諒公之言不可復也由是天迴日轉龍起雲從乃睠是邦因駐清蹕上復交泰之道下無疑間之憂內難既夷外兵以息皇嗣之不正者濱於五紀今則因公以正之坤儀之不定者殆乎百稔今則因公以定之君臣以協父子以親夫婦以倫有國之大本也公一舉而得之豈筆舌所能論哉咸以公仗順討逆神實佑之佑順之封非神莫尸璽書爰來牲幣以告是命下客書石誌之鄴耳目奇功縑緗具美授簡執筆畧無愧辭姑錄許公貞順之誠少華保佑之實以明報神以勸事君至於極天鎮地之崇固國經邦之力降神生賢之運仙峯靈掌之奇嶽有舊封國有常祀今之紀述故不復云頌曰惟華之始因山以紀蓮峯東秀終南西峙少華居中不封不紀歲在景辰暴兵中起天子震驚蒙塵旅次豈無近藩諸侯莫至惟我許公聞風奮臂一騎迎鑾六龍迴轡行朝有亭行廟有位宗戚以歸兵戎以弭爰立母后始正皇嗣乃君乃臣乃父乃子家國大倫禮無違事祉既啟侯封亦明祀金天之毗佑順之美乃刻貞珉永證惇史蟾昭宗時棣州刺史平盧節度使王敬武卒其子師範自稱畱後昭宗命崔安潛代之師範拒命蟾迎安潛師範攻之拔其城遂見害花開寶殿文粲瑤堦百堵興而門闥崇萬楹而廊廡對寺有名僧五千人塗字禮山江南人光啟四年進士中原黃賊煽亂前進士崔塗避地於渠州春日獨遊冲相寺由此登眺翌日乃歸珦昭宗時人噫夫人姓張氏其淑慎貞素稟自生知退讓儉遜不從於訓祇奉晨夕終始如一吁言乎不祿廾我私室蘭摧春霧蓮墜秋風隟影難迴逝波不返男一人高姐電影未分槿花己落女二人長曰奴哥穠花未開嚴霜暗墮次曰郭兒丱髮未總繼我門嗣夫人年四十有三以景福元年冬十二月二十日卜兆於府城之南雲門之下樹邱隴而銘銘曰日月有度兮生死無常白晝其速兮元夜何長澠水為鄰兮雲門是鄉千年萬祀兮春露秋霜時景福元年歲次壬子十二月辛未朔二十日庚寅孫珦紀遠河中節度使璵孫龍紀元年登第大順初以員外郎知制誥充翰林學士正拜中書舍人乾寧三年轉戶部侍郎博陵縣男轉兵部以本官同平章事遷中書侍郎兼吏部尚書天祐初從昭宗東遷洛陽罷相守僕射二年柳璨希朱全忠旨貶白州長史被殺於白馬驛門下書云用命賞于祖不用命戮于社然自三代以還未有不戮暴亂不賞功庸而安國家定社稷者也近者徵其銳旅討彼元兇不越月而捷書繼聞未逾旬而鎮城連下易如拉朽勢若建瓴諒非昭代之才孰濟勤王之績我有懋賞爾其聽之某官切玉雄鋒摩霄健翼智符靈蔡節貫寒松繼乃父之休勳鎮于巨屏誓忘家之壯志控彼邊陲積粟訓兵安人阜俗不忝登壇之寄彌光出將之門近者宋文通顯背國恩堅違君命將清叛亂爰仗忠良首奉詔書龔行討伐選射㦸盤矛之將率控弦帶甲之徒既巳先啟行復深入其阻立志無慚於馬革輕生不讓於鴻毛矧聞纔出封疆繼降城鎮既臨賊境克保隴城振貔武之威聲斷螳螂之怒臂而又不勞經費自備糗糧惟踴躍以用兵不因循而翫寇今則方憑妙畧共殄長鯨雖伐罪弔民已覩訓齊之令而誅妖翦怪合資掃蕩之謀是用俾壯軍威仍加相印以勵始終之効勿辜倚注之恩敬之戒之服我丕訓門下梁漢古封河池名郡有關山之險阻當巴蜀之要衝苟非勳賢不可輕授我今有命允為當人某官截海雄姿追風逸步得左馬右人之術洞玉鈐金匱之書加以幼慕功名早懷壯㮣攬轡蘊澄清之志臨風多慷慨之詞頃在禁宮屢竭忠節四奉指揮之任久彰翊衞之榮洎委節旄俾之鎮撫當巨逆梟夷之後是邠郊凋瘵之秋而爾復茂政能益堅撫字未周星律已播謳謠方深倚注之恩用安黎庶旋屬干戈之患每軫焦勞既互有奏陳慮多嫌隙冀寧生聚爰職改更復以未戮奸兇方思勳舊殄寇既資於上畧總戎宜錫其名邦俾居十乘之榮以長萬夫之氣爾其便提驍果亟赴征行破其城社之妖刷我宗祧之恥然後仗茲龍節蒞彼雄藩高居將相之尊永保山河之誓人臣之節丈夫之榮何以加焉爾其自勉昭緯贈刑部侍郎存誠曾孫乾寧中為禮部侍郎知貢舉為崔允所惡出為磎州刺史伏以禮貴從宜過猶不及祀有常典禮當據經謹按德明追尊實為遐遠徵諸歷代莫有其倫自古典禮該詳無踰周室后稷實始封之祖文王乃建極之君且不聞后稷之前別議立廟以至二漢則可明徵劉累梁魏則近有蕭曹稽彼簡書並無追號迨于興聖則事非有據蓋以始王於凉遂列為祖類長沙於後漢之代等楚元於宋高之朝悉無尊祀之名足為憲章之騐重以顯祖懿祖皆非宗有德而祖有功親盡宜祧禮當毀瘞遷於二廟亦出一時且武德之初議宗廟之事神堯聽之太宗叅之碩學通儒森然在列而不議立臯陶凉武昭之廟蓋知其非所宜立也尊太祖代祖為帝而以獻祖為宣簡公懿祖為懿王卒不加帝號者謂其親盡則毀明矣春秋左氏傳孔子在陳聞魯廟災曰其桓僖乎已而果然蓋以親盡不毀宜致天災炯然之徵不可忽也據太常禮院狀所引至德二載克復後不作宏農府君廟神主及晉韋宏屋朽乃已之議頗為明據深協禮經其興聖等四室請依禮院之議昌謀官左補闕天子以吳郡公為東川節度命中使錫節旄綿州刺史楊守厚畱中使舉兵向東川陰結東川督將竇行實為應龍劍節度楊守正武宣節度楊守忠以兵助之迫城顧公斬行實縱兵擊守厚走之龍劍武宣二軍往來綿劍間掠人民焚廬舍入靈應行祠翦伐林木飼馬殿庭其軍病死向半公曰順濟王奠吾土久矣今凟褻斯甚神寧居之故廟距府十舍躬行視祀則離鎮委於吏屬則不虔於是遙祀於北山上陳徙廟之意命司存鳩工度材六月興役十月就功邃宇重門騰廊飛軒大殿東向南僚北吏置位施器簡工揆用皆公智匠觸類長之則知他日佑天子鎮寰宇肅廟朝扶教化正上下辨等衰掄才任之使萬物各得其所亦如是也圖元大順元年鄉貢進士內黃為大邑亶甲之東壖也即為藩閫咽喉而神散血脈前吞馬頰右控龍崗列王豹變之鄉七雄虎踞之地張賓崔皓曾施神國之謀荀彧田豐亦運制勝之策高旗長轂雨驟雲屯綿歷歲華其來有日矣洎故南陽郡主恣其酷虐縱彼兇狂納奸佞之言忘忠鯁之諫內廾貔貅之士外連烏雜之兵禍及生靈毒流草木致使交鋒洹水決戰斯疆尸滿郊原血流平地曹公之入徐壤靡有孑遺項氏之陟襄郊疑無噍類爰我相國謂左右曰然已息干戈未蘇疲俗活吾赤子須藉良材乃衆舉博陵公玭為之令尹語於相國曰公甲門茂族禮樂名家蒞事惟能應機不滯累曾撫字頗善畜牧若令尹以用於心可上稱尊意當如是說召見怡顏親受化說以其斯道令尹既得其命尋至茲封煙燐之蹤燎庶土之尚爍刀劍之跡染閭巷之猶腥蘊室壞摧極目荒毀燕棲春樹人宿燒屯十家之中黔首無一半矣國門之內肯使畱二三焉莫不測問鄉閭躬詢比屋傷嗟待之起念通宵憧憧往來孜孜朝夕而又撫之以惠成之以能均訐勸之恩有推攜之能末途暮歲歸俗如流襁負盈途接踵而至然後重修驛署置門榻之尢新再搆旗亭飾廊房之亦美相國乃賞其功幹遷任新鄉耆老攀車兒童臥轍諠譁塞路行莫能行遞相讓之遂再陳請乃問於相國相國聞而喜焉謂左右曰當來所舉信不罔乎有此政聲宜從請矣即可恩以遠錫爵可就加纔歷周朞兩授寵秩初允勸畱之請旋加正直之名信及蝤虫民聲揚相府政追前哲名邁古賢不徇私而立身不苟媚而取俗陶淵明之五柳更益芳聲宓子賤之一琴尤光茂績我令尹潛敷陰隲顯著誠明愈四鄉之瘡痍蘇百里之疲瘵洋洋德美嘉譽孔彰聊書不朽之功以紀他山之石縣尉樊公偲儒囤騰芳詞林茁秀心澄皎月德瑩冰壺勸彼農桑出不嫌於乘露聞其疾苦歸匪憚於帶星與令尹盡節奉公勞神瘁思席無暫暖身不求安固力規畫不日完輯此乃聲流衆口德叶㣥情裨贊之功可謂大矣列在貞珉以述政能大順元年閏九月十日鄉貢進士蘇圖元撰
