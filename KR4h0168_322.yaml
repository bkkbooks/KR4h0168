body:
  text: 嗟乎或愛之而不見者有之矣何必周秦異代夷夏殊軌阻嚴城之九重限方舟之一水苟時事之多怨故人遐而室邇關山起於足下堂上遠乎千里聳專專之目成遽將逝而復止詩人所以思婉孌而搔首賦城隅之有俟吁不得其已也惟夙昔之良會夢佳期於北方款渤澥之三山吸流霞之景光含芳詞以況予云惠好之不忘願報義於永日陪遊宴於帝鄉廣莫忽而號怒鯨波洶而騰張俄驚魂以輟寐問窮髮之茫茫將揭厲以復從駭風濤之匪量思投軀以靡吝撫遺體以兢惶晨切切以悽悽夕屏營以彷徨追前歡之俯邇歎此恨之悠長於是收神返慮澄澹靜默冥然就寢兀若無識冀良宵之復遇希舊遊之可即徒有願兮且未克憂深沈兮萃胸臆風兮雨兮思君子兮何極政教之始莫重乎郊祀郊祀之先莫尊乎昊天是以前王垂之於典訓後帝奉之以周旋以事大矣其儀盛焉日之至也所以明氣之至丘之圜也亦以象天之圜於是致齊於宮合樂於律㣥有司肅肅以儆戒百執事乾乾而莊慄牲用騂犢以貴誠酌用元酒以明質豈但愛人而尊祖葢欲報天而主日天子迺乘玉輅駕蒼虯搢方珽服大裘率九儀之卿士從五等之諸侯旌旗露卷冠葢雲浮展國容於御路行大禮乎郊丘百役既備司儀辨位劒佩紛紜以陸離鐘鼓鏗訇而沸渭君明其義臣敬其事執鸞刀以啟毛奠蒼璧以為贄爵一獻而上下胥悅樂六成而神祇鹿君至後乃取血膋陳玉幣寘於積薪之上燔於泰壇之際飛燎烟於太清合蕭光於上帝是以神降我福人懷我惠時罔凶荒物無疵癘致洪化於仁壽豈不由肅敬於大祭客有旅遊函關欽茲至道觀祀事於國典仰明靈於有昊敢陳輿頌式播元造頌曰日南至兮既望祀太一兮圜丘上萬斯年兮承天貺升彼墟兮遐眺荊江邇矚樊沔頹沲以隱嶙欹缺而嵼野茫茫其靡極何人戶之單尠悵青春兮始交又白日兮將晚悲事事之艱阻慨征途之未返憑寒皋以盡目究林莽之深淺烟迴起於殘燎鳥㣥飛於絕巘曾是感時而戀舊孰不酸辛而僶俛也矧乎㝢縣乖刺關河阻遏去枌榆兮地表離骨肉兮天末涕橫墮以若注懷永痛其如割悠悠蒼天不日不月曷其有佸撫艱勤之此土偶四海而承平方神武之君臨尚未遑於戢兵警山戎之外虞重燕代之專征罄帑藏之實窮干甲之精陸隘幽冀水填滄溟其為盛也入師長於庶僚出董率於連城冢婦降於王姬餘子超乎正卿睚眦則浹日誅夷攀附則累歲尊榮玉帛車輿鐘鼓臺亭煥赫而鏗鍧三十年中初不戒其滿盈終大都之偶國逸漏網之奔鯨潰亂河淇虔劉汴滎覆東洛隳陝坰抗靡堅陣守無完營呼吸三旬遂至乎上京爟燧燭於王宮潼關為之晝扃既而將吏逋竄烝民駭散崩騰郡邑空閭閈荒涼我汝潁牢落我雎渙傳置載馳於商鄧兵符薦集於淮漢彼邦畿之尹守藩牧之垣翰莫不光膺俊選踐履清貫榮利溢乎姻族繁華恣其侈翫或拘囚就戮或胥附從亂曾莫愧其愚懦又奚聞於殉難甚乎昔先王之經國仗文武之二事苟茲道不之墮實經天而緯地邦家可得而理禍亂無從而至今執事者反諸而儒書是戲蒐狩鮮備忠勇翳鬱澆風橫肆蕩然一變而風雅殄瘁故時平無直躬之吏世難無死節之帥其所由來者尚矣不其哀哉變之始也予旅寓於淇園初提挈而南奔崩波滑臺逼迸夷門兦車徒於鼎城擯圖籍於轘轅背維嵩遵汝墳迴環乎郟葉飄泊乎穰宛嗟歲聿之云暮結窮陰之涸冱市蕭條以罕人盜充斥以盈路微奔走之僕御有啼呼之幼孺川層冰而每涉塗積雪而猶步晝兮夜兮曾莫解於馳騖惟寢與食曷嘗忘於恐懼略南鄉之左鄙淩北津之勁渡偉夫峴首之為鎮也峻隅百雉危甍萬井森松篁之薈蔚劃厂墨街以周整前山縈依而秀拔斜漢杳映以清迥秔稌蔗橘雜荊衡之蓄桑麻黍粟侔冀魏之境漢之盛也移南國之冠葢晉之衰也為北門之捍屏今方嶽之仁明惠久要於平生幸羇旅而獲宥旋載筆於戎旌陪後車乎南紀儼四牡以專征歷隤墉而訊諸乃楚鄢之遺城昔漢皇之標季間諸侯之釋位聞景升之是牧嘆興廢於茲地其後綏懷勁楚抗衡強魏雄九域以高視為一方之所庇亦謀猷所賴而致也於時寇盜蜂聚生民失土賢雖避世才亦擇主有臥龍之奇英視江漢而胥宇遭劉后之側席聿疇咨於草莽若游魚之在水尚三顧而後語其始也亦將棱威漢沔用武荊楚俟時觀釁終然義舉然後包并河洛盪滌陳汝迎帝配天不失厥序既中流之顛覆故宏算而乖阻信雲長之寡謀亦天命之弗與猶復廓卭峨之險奮賨濮之旅鋪敦隴阺震攝關輔致中原於旰食振衰漢之遺緒洸洸乎俾千祀而景慕宜其易名於忠武不其偉歟方其躬耕漢渚獨詠梁甫輕夫管樂莫之云許伊唱高而和寡亦惆悵於前古道不同不相為謀斯之謂矣荊雲兮蔽虧朔雁兮差池雲有迴兮雁有歸嗟予行兮愴遲遲諒窮愁兮莫諼雖九醞兮奚施兦舅孝廉元君才高位下一命屈臨河尉尋遭風瘵有加無瘳憂悒迄逾一紀故不復仕而風標俊傑文史清雋則君所著別傳詳矣舅於予有教授之恩隻辭片字皆資訓誘既而射策桂林校書芸閣道為知已遇名為海內稱舅氏之力也天寶元年秋八月奉使求遺書於人間越來月屆於臨河之舊邑覽物增懷泫然有賦羊曇是日獨吟零落之篇周翼終身寧忘吐哺之愛辭曰登孤城兮見河水之漫漫城有隍兮水有瀾歘翻覆兮無端俯崇墉兮辛酸心斷絕兮河水之干借如韓伯懷恩羊曇念昔追北渚之曩餞嘆西州之忽覿曾一顧而不忘況仁深與密戚也惟佩觿之弱歲荷哲舅之矜憐枉月旦之殊品超等夷而獨偏過雖小而必誡善無微而不甄備潤身之黼藻聞染翰之蹄筌豈期文嗣作者價參時賢謬崑墟而比玉濫逢島而懷鉛匪舅德其焉爾諒師資乎在焉痛才高而位下悲道悠而運促甫一命於茲城蹇無媒兮窘束傃層飇而墜羽淩永路而傾軸悼晉豎之行深哀秦良之莫贖昔自公而暇豫陪作賦於茲樓懷一紀以如昨愴今晨而獨遊俯蕭條之邑里對零落之徂秋舊館悽其在目長川逝而不留徒臨風而揮涕孰知夫四望可以銷憂者也天寶八載予以前校理罷免降資參廣陵大府軍事任在限外無官舍是處寓居於紫極宮之道學館因領其教職焉廟庭之右有大櫻桃樹厥高累數尋條暢薈蔚攢柯比葉擁蔽風景腹背微禽是焉棲託頡頏上下喧呼甚適登其喬枝則俯逼軒屏中外斯隔余實惡之懼寇盜窺窬因是為資遂命伐焉聊託興茲賦以儆夫在位者爾賦曰古人有言芳蘭當門不得不鉏眷茲櫻之攸止亦在物之宜除觀其體異修直材非棟榦外陰森以茂密中紛錯而交亂先㣥卉以效諂望嚴霜而彫換綴繁英兮霰集駢朱實兮星燦故當小鳥之所啄食妖姬之所攀翫也赫赫閟宇元之又元長廊霞截高殿雲褰實吾君聿修祖德論道設教之筵宜乎蒔以芬馥樹以貞堅莫匪夫松篠桂檜茝若蘭荃猗具美而在茲爾何德而居焉擢無用之璅質蒙本枝而自庇汨㣥林而非據專廟庭之右地雖先寢而式薦豈和羹之正味每俯臨乎蕭牆姦回得而窺覬諒何惡之能為終物情之所畏於是命尋斧伐盤根密葉剝攢柯焚朝光無陰夕鳥不喧肅肅明明蕩乎階軒嗟乎草無滋蔓瓶不假器苟恃勢而將偪雖見親而益忌譬諸人事也則翼吞并於潛沃魯出逐於強季綝峻擅而吳削倫冏專而晉墜其大者虎遷趙嗣鸞竊齊位由履霜而莫戒聿堅冰而洊至嗚呼乃終古覆車之軌轍豈尋常散木之足議白鷴羽族之幽奇也素質黑章爪觜純丹體備冠距頗類夫雞翟神貌清閒不雜於眾禽棲心遐深與人境罕接固莫得而馴狎也上聞而徵焉處以雕籠致以驛楃虎是將集長楊游太液行有日矣天寶辛卯歲予飄泊江介流宕踰時秋八月自山陰前次東陽方議夫南登西泛極聞見之義諒褊懷所素蓄而未之從也會有命自天召赴京闕適與茲鳥偕至於會稽之傳舍觀其宛頸旁睨迴惶掩抑往往孤鳴音韻淒涼如慕侶而不獲因感而賦之曰鳥之生矣於彼南山彩必元素文不綺斑備文武之正飾懋妖姬之殊顏情莽眇以耿潔貌軒昂以安閒無馴擾之近性故不愜於人寰遊必海裔棲必雲間冀養拙以自保袪未萌之憂患不然豈陋彼都邑之佳麗顧投身乎阻艱以其標自然之靜故名之曰白鷴者歟何天聽之緬邈辱微禽之瑣細偶一日之見羈委微軀以受制望層城以斂翼懷眾侶而孤唳從廏置之駿奔仰君門以遐逝君門兮九重洞杳窱兮穹崇池太液兮島方壺萬族翔泳乎其中晝聒未央之繁絃夕驚長樂之虛鐘顧疎野之賤迹豈敢求一枝而見容越水清兮鏡色吳山遠兮天逼窺淺深以颺影逗清冥兮一息謂杉松可得永日而噪聚蓴荇足以窮年而唼食一與心賞兮暌違念歸飛兮何極鸚能言而入座鶴善舞而登軒殊二者之常態諒慚惶於主恩是以雖信美而非其志獨屏營而兢魂者焉清商兮暮急白露兮朝溼伊寒蟬之早聞知涼風之初入散亂搖颺翛寥歘吸前聲未盡後響仍及邇層檐而驚歸向茂樹而遙集足令志士傷惋征夫佇立動閨人之夜悲垂塞客之秋泣況乎日晏天空晴景微風命儔嘯侶乍西或東既更鳴而迭息亦處異而音同催渡漢之離雁伴橫階之思蛩空庭曖其已寂遐路杳而難窮伊蜩螗之至細王睢獨而猶稟體孤高而自適候時節而斯審其處也敦兮若樸乃蝤蠐而未化其出也道之將行必沆瀣而方飲豈徒爾雅辨其名體詩人咏夫章句味編本草之錄聲徹上林之賦歌郕宰之化偶范緌而見稱飾趙王之冠與貂尾而胥附莊篇載痀僂之志孔氏感螳螂之捕苟動靜不爽飛鳴有度因依密葉蕭散凝露韜餘陰於歲晚等㣥蟄於時暮茲括囊而用吉又曾何鳥雀之能喻天寶十載予以史臣推擇待詔闕下僻直多忤連歲不偶未選敘求參河南府軍事府尹裴公以予浮名枉顧遇焉而尹之外姻或綰紀綱之局怙勢矜權求府僚降禮於已予清慎自守不能附會爰逝我陳嫌怒遂搆又同官多貴遊右戚酒食之會絲竹之娛無間旬朔予人質鄙野雅不之好常願鷗鳥為儔江海是處往歲久遊剡中將遂終焉朝旨迫召故不獲展著白鷴賦以寄斯意至是鬱悒彌用增想廳階之下蹊有莎草故參軍宋之問徙於伊川而植焉結根五紀帛丿糸羃庭際廣不累步高樹十餘間以雜果陰蔽其上俗吏往來必淩踐之歎其稟山野之姿而託非其所以就窘迫因而賦曰厭公門之窘束玩纖草於茲庭奚卑弱之斯極豈雨露之愆靈尚含和以順時隨春夏之淒清軒房洞啟廣階修直槐楊蔽虧桃李對植橫層陰之冥密綴繁英之翕赩既高低以異姿亦濃淡而殊色胥徒牒訴雜沓乎其側遊塵浮烟蒙翳而不息雖蕭颯以自得亦喧卑而見逼宜夫坐莽浪之野帶江湖之涘託根山阿搖穎綠水芊帛丿糸靃靡連豆乎十數里何推遷而運會繆產蒔於庭隅憂好尚之傾奪見芟夷於難除既無心於寵辱又奚誘於親疎承斚瀝之甘潤蔽衣衿之曳婁雖為幸於斯日諒稟性之云殊聞哲王之布澤迨蕭葦而霑鋪苟一類而失所猶納隍之在予矧皇穹之播氣陶庶彙於靈樞曷茲卉之攸託慘終年而莫舒吾將徵宰物之至理聿歸問於元虛者焉予同生繼夭憯戚所萃已未歲夏六月旅寄韋城憂傷感疾腫生於左脇之下彌旬不愈楚痛備至友生于逖張南容在大梁聞之以言於方牧李公公予之舊知也俯垂驚嗟遠致是散題曰蓮蘂命和以蘇用附腫上又覆以油帛以羃之其瘳如洗一夕復故感恩歎異於以賦焉彼散維黃曰蓮之蘂有輕其質如雪伊灑君子賚焉厥疾遄已揆艱疾之永戚矧羇孤之遠情諒積悲而成疢爰彼腫而斯嬰遘徂夏之赫曦蹇憂虞於此城堆以壅蓄介於腰腹如烟斯焮如蠆斯觸靡宵靡晝莫獲偃伏亦既浹辰寘予於毒惴然其恐兮如集於木幸于張之久要干至貴而為言感知已於名公降踰涯之厚恩旅信宿以問至致良散以斯存於是滫以蘇膏羃以油帛茲焉塗附未始竟夕有瘳如神兮厥痛斯滌彼挂帆而奔駟曾莫速乎靈跡雖兼金與製錦豈厥價而能敵異哉討奇篇於綠帙搜祕卷於青囊奚要術之備列獨無聞於此方苟佳名之是徵乃菡萏之餘芳原夫託根清泚敷蘤馨香宜蠲穢而蕩邪救吾人之疾瘍於以用之終然允臧愷悌君子德音不忘昔禽蛇之見拯尚有答於隨噲矧圓首之為貴聿稱靈於覆載慚力微而施重懼隕墜於酬戴蓮之蘂兮永以為佩攝提歲拂衣海嶽應調函洛詠佩服之皋蘭美縶維之場藿徵良圖以趨事窘中道以摧落昔謬價於當年今後來之不若眾飛鉗以抵巇余矩枘而規鑿悲介直之不可媒想雲林以自託眷眷離憂行行獨愁邅我車而北上朅吾道以東遊愛遲遲之暮景登泛泛之輕舟過巖邑以信次纜縈波之下流於時丙丁守位恢台肇節朱雲四騰瑤草半歇景蟲蟲而熾旱風翳翳以歊熱赫中潬之平沙滲通川而殆竭則有危檣巨舸長艥廣艘龍翼錦軸雀顱方艚材木蘭兮竹箭紉齒革與羽毛頓修笮於迴塘駢曲岸以戢篙於是迅拏輕槳河舠漢艇乘時泝洄赴利馳騁混漁商而沸雜期數日而俄頃事也時哉咸適其才吁嗟大艦安得而來借如三江五湖之渺漫礐石飄沙之汨淈望赤岸以天低臨清波而景沒峻艫衝濤以直透高颿雲卷而上彗朝發乎荊衡夕止乎揚越晷刻千里之外一何去留之倏忽彼斗筲鍾鬲之餘捷徑趨時之末曾壓溺以不暇亦何知於歲月材微則致遠而自覆量大則俟時而可貴苟或喻於窮通又奚分於器類運之來也賈長淵高視於三台謀不用焉梅子真近辭於一尉吾將斂策以飲氣覩維舟而歔欷臣某言伏奉制書皇太子以今月嘉辰肅膺典冊少陽輔德前星耿耀凡在生靈豫增慶幸臣聞立嗣必子爰徵古訓惟賢乃建式固宗祧周漢以還憲章未改伏惟開元神武皇帝陛下嚴祗寶祚光啟睿圖則哲其難至公有在惟天為大萬邦所以作貞如日之昇重離所以增煥況瓊枝挺秀玉葉資神允釐監撫儀形雅頌春華秋實嘗俯俟於嘉言一物三善諒行稱於至德固以靈祇叶贊景命昭宣馳道之前猶應著令寢門之外方候問安臣忝貳藩條局守官次不獲預陪大禮稱慶闕庭延首承華以忻以抃臣某言臣聞郊祀盡敬粢盛豐潔則天降休祉地生靈芝大哉斯瑞元和正氣有感而昭敷者爾古先哲后所由盡心臣本郡道學講堂中梁有芝英產見六莖其本正向堂門素色純淨流輝棟宇臣遐考曩歷旁窺瑞牒多矣至若神爵九枝青龍三幹菌蠢池籞葳蕤甸服猶復登諸宗廟被以頌聲又況極道德之至精鑠元元之景命超漢軼魏光圖掩牒之祕瑞伏惟開元天寶聖文神武皇帝陛下大孝尊先元功兆物奐清宮於郡國驅赤縣於仁壽天弗違而寶歷重昌瑞有答而金英特秀觀其審曲面勢負陰抱陽當九月而生聿符陽數挺六莖之表遙叶樂章昭聖祚於天長返皇風於古始加之冰霰奪色緇塵不染迎曉日而相鮮與秋雲而共潔雖復晨敷者五競爽於丹田歲秀者三擢榮於元圃以茲視彼奚其瑣碎臣姓忝宗枝任叨藩守揚吹萬之化預稟陶鈞聳倍百之情寧忘肺腑臣某言臣林莽介賤幼而強學竊聞諸大易之說曰觀乎天文以察時變觀乎人文以化成天下夫察乎變者立德以貞其象成乎化者立言以贊其功故太極列三階五緯於上聖人著三墳五典於下至哉文乎天人合應名數指歸之大統也今之言文字者始於太昊徵訓典者本於唐堯振頹綱者孰若漢朝興盛言者莫如聖代是則太昊朕之軒轅章之唐堯祖之虞舜述之漢高作之光武維之祖宗開之陛下因之臣愚以為太昊至於我高祖太宗軒轅之於我開元聖文神武皇帝陛下稱廣運者四代繼成功者四君咸宜布昭睿典光熙德政矣然則伏羲創文籍黃帝立史官太古淳奧權輿樸略至陶唐氏而後大備故孔子美之曰堯之為君也煥乎其有文章由是敘帝王之書首唐虞之典於堯則曰欽明文思於舜則曰誕敷文德文之時義大矣哉夏商已後德弗及舜仲尼雜目其書而不為典言未能察變成化比唐虞之際也何則夏之興也泣辜殊於政理殷之興也慚德乖於雅樂周之興也謂武微於盡善其不為帝典宜矣陵夷僭亂以暨暴秦剗亂墳籍瞽聾兆庶王者之風殄矣生人之道窮矣天之未喪斯文也故帝道復興於漢家數百年中而憲章具舉夫其推步律歷帝堯分命之典也增修封禪帝舜時巡之義也約三章之法以正咎繇之刑班四時之舞以續后夔之樂臣竊覩三代之作貽範垂訓體國綏人雖載祀帛丿糸長德澤深遠皆因循轍迹故弗易其事孔子曰殷因於夏禮周因於殷禮所損益可知也未有踵七雄交爭之末繼六籍焚如之後帝典缺而更張淳風醨而載洽若大漢者也且義帝之喪三軍縞服異夫湯武之放弒其君矣諸呂之亂浹辰底定異夫羿浞之驟移其祚矣中興之盛華戎率服異夫吳楚之僭竊其名矣夫如是有漢之美固可以比肩虞后千載一時之運歟曹馬以還曾何足擬四分五裂朝成暮敗其間雖晉平吳蜀隋舉陳國混并未幾危兦荐及法令不足以禁齊人聲名不足以垂後裔其於帝道疎矣又況乎南遷淮海北起胡戎者邪茲又二朝之不若也臣聞乾道運行否終則泰上帝有以輔文明之哲后表光宅之休期必將乘喪亂之極繼驅除之運故有周之末禮樂崩壞連橫合縱俱非正朔則秦氏略定而漢代以興在晉之兦㝢縣崩折南吳北虜各擅名號則隋氏削平而聖朝以作此天意一也不然何秦隋二葉而兦也若彼唐漢一家之盛也如此於赫盛唐正百王之闕思文陛下光五聖之嗣啟運應期之符弔人伐罪之義制禮作樂之本郊天禪地之位萬庾三登之穰河海晏清之瑞舞七旬而殊俗格歌六律而薰風至故以騰子姒而絕景挹媯祁而高議矣又何東晉後魏梁陳周齊之足道哉誠宜詔史官敷帝載炳唐虞之故實黜商周之遺制矣漢氏已略之於前皇唐復曠之於後臣實惜焉知而不述則臣子之罪也臣實愚淺陋竊不自揆敢緣聖朝稽古之道陛下文思之德耕牧餘暇輒復著書討尋載籍於茲一紀謹上今文續尚書一部凡若干篇卷始有漢二典次我唐二典以續夫前書堯舜之典也其餘文景明章之後魏晉宋齊已還南訖有陳北起元魏歷周隋洎夫高氏以至聖朝總一十二代詔策章疏頌歌符檄忠臣之正議武士之權謀類而刊之次以年代以續夫夏商周秦魯之篇也臣聞古者右史記事左史記言舉其大略前書之義備矣孔聖沒而微言絕暴秦興而挾書罪雖戰國遺策舊章駮亂於從橫漢臣著紀新體互紛於表志其道末者其文雜其才淺者其意煩豈聖人存易簡之旨盡芟夷之義也昔文宣脩五帝之書究三王之季臣性非天縱學異人師稟生何幸親奉聖代此皆文武聖皇之遺旨臣愚曷足以知之何者臣嘗伏讀貞觀實錄昔太宗因聽政之暇觀覽尚書謂侍臣曰朕每庶幾唐虞亦欲公等齊肩稷契又曰令數百年外讀我國史豈獨窺兩漢哉臣故知有漢之功業與我唐之化理俱可以繼夫唐虞之盛也伏惟陛下元德昭升至仁廣被迺二十一年正月制曰各勵精一志共興元化俾蒼生登於仁壽天下還於淳樸愚臣緬述太宗之旨伏思陛下之詔固非取類於三代之間也勒成帝典不亦宜乎陛下睿思雄飛宸章間發質文一變風雅大興臣聞水之細者江海假其深材之短者棟梁資其峻陛下必謂臣所著小有可觀賜以召見闕庭一垂試問臣採摭之外亦以學文縱不能光揚盛美猶庶乎細水短材之益則聖旨之含容大矣臣之誠願畢矣臣某言臣聞在昔上皇之御極也則元化有助嘉祥必臻故升中於天而四靈是格若夫出洛登壇青文丹甲之瑞王霸以降遼哉敻乎不可得而聞已然其緬邈郊藪葳蕤簡牒與時升降者亦往往而存未有含道德之純粹闡祖宗之休命俛視千載潛通百靈允符祕祉若今之盛者也伏惟皇帝陛下至誠允迪懸解自衷神有契而斯輔道惟深而不測故錙銖繫表寤寐胥庭七曜垂文則元言焯敘千秋表節則綠錯來儀以今月某日所部江都縣崇虛觀講聖注道德經於元元皇帝座隅有毛龜出見翠毫金介爍日霏烟迹殊生育來緣感召應陛下長靈之期符先聖谷神之妙知來藏往實見於茲休徵委集萬方幸甚手舞足蹈倍百恆情無任喜悅之至謹奉表以聞臣言臣聞事君之義有犯無隱故心苟所至願必上聞所以罄露塵涓裨助山海則匪躬之節著致主之情竭矣臣實蕪庸志業非遠幸逢明聖累忝驅策位登四品官亞九卿叨竊已多答效無紀常願刳肝碎骨仰報於天此臣景行前修悃終夕不能已也臣某中謝臣聞諸傳曰天災流行國家代有雖升平之代秉哲之君禮義不刑罰斯中而適當其際化理不回故商武受命之賢王周宣中興之令主桑林未禱金石以銷禮疑其大統則陰陽之數義實固然推其至理則時事之端政乖取此誠細有所遺驗諸方志昭然可辨雖日月薄蝕無損於明而宵旰兢慄未喻其道良足惜也伏惟開元聖文神武皇帝陛下道格上蒼功深下濟叶兩儀之高厚等四序之運行告成岱宗而靈饗聿應展禮農籍而嘉禾實穎烝烝過於虞后翼翼邁於周文故元祖契會昌之符蒼生踐仁壽之域臣竊觀圖諜所記生靈以來巍巍赫赫未有如聖朝之盛者也而水旱小數時或和一旬不雨仍延聖慮臣竊以殷周之事考之斯可得而言矣臣聞道德經曰大軍之後必有凶年論語亦曰加之以師旅因之以饑饉葢云暴骨中原感動和氣疵癘是作災害用生故強死之魂傳稱為鬼積尸之氣禮有驅除不徒言也臣竊觀成湯之受命也前有伐葛之役後有升陑之師凡七十二征而天下服故其詩曰武王載斾有虔秉鉞如火烈烈莫我敢遏宣王之中興也亦南征淮甸北伐太原外攘夷狄復文武之境土故其詩曰六月棲棲戎車既飭四牡騤騤載是常服則二王用師而定也明矣未聞有岐昌掩骼之政秦穆封尸之令旱暵之故不亦宜乎不然則月令孟春之命掩骼埋胔周禮蜡氏掌凡國之骴禁埋而置楬焉豈虛設也臣聞之五材並用誰能去兵小則施諸市朝大則陳諸原野我國家櫜鞬理定十紀於斯陛下重之以懷柔申之以靈武三韓左袵夷於郡縣六狄解辮願為臣妾書詩所載未之聞也而西戎醜類尚興艽野之師東胡噍餘猶儆柳城之戍陛下爰整其旅弔厥匪人雖有征無戰不聞遺鏃之失而恃險與馬猶積抗輪之斃故血膏草莽骸聚邱山史不絕書士有餘勇以為常矣臣又聞之帝王者則天而法地長物以子人如天之無不幬如地之無不載故天無遺人雖古先哲王內諸華而外夷狄亦云要服者貢荒服者王聲教所加合於一揆所以伐其叛而柔其服重其生而哀其死詩曰普天之下莫非王土書曰丕冒海隅莫不率俾此之謂也頃春之季恆陽小宿麥未登首種不入賴陛下憂勞日昃以萬物為心天且不違應如影響閏月云暮時雨滂流我田我私既浹祁祁之澤彼黍彼稷方成油油之稼此天慶陛下至矣人感陛下深矣而密雲未洒忽復二旬時屬炎蒸土仍滲漉元元之望又加於茲昔燕祠寡婦延闔境之潤漢察寃囚致隨車之雨今陛下當措刑之代濟必封之甿吏不苛刻人無怨訴亢之由有異於彼愚臣不敏竊有所見謂宜分遣制使往校邊庭凡戰陣之處骸骨所在即將埋掩仍施厲禁則儀刑萬國仁洽九泉存兦均雨露之恩華夷同日月之照庶膏液與聖私齊運旱苗將朽骨俱榮不任云云臣某言中書省馬崇至自蜀郡伏奉八月一日制書大赦天下罪無輕重咸蒙洗滌覆宗之辜亦賜原宥惠澤浹於存沒恩榮被乎出處聲動夷夏氣感風雲含齒戴髮孰非幸甚鑠哉沛乎虞后肆赦羲文作解之盛典也臣某中賀臣聞乾靈肇運亭育萬方其德至普而或水旱流行氛沴表見然後蕩之以祥風煦之以和氣而品物熙焉聖人立極平章庶政其道至明亦或四凶在朝三苗逆命然後寘諸嚴刑被以文德而官方正焉伏惟開元天寶聖文神武證道孝德皇帝陛下纘戎累聖惟新舊服天成地平萬邦作乂德禮備舉符應爰臻下加有隩四紀於茲矣由是嚮明端拱齊居元默布大信於㣥后絕嫌疑於纖芥狐鼠憑依俶擾天紀陛下垂泣辜之旨降勤卹之令將士勵節黎庶歸仁咸思赴蹈指期蕩定開泰之辰計不云遠臣又聞之昔上皇御辨祗車巡於谷口盛漢膺運賓旅奮乎關中葢風謠尚武可以大殲醜類會昌建福可以永保邦家前古休期復見茲日臣嘗叨近侍謬佐藩牧千里景從不及扈遊之觀百城風靡空懼分憂之責魂馳井絡戀結巴渝無任感激悅豫之至
