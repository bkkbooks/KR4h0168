front:
  text: 全唐文欽定全唐文卷三百二十二穎士字茂挺梁鄱陽王恢七世孫開元二十三年舉進士對策第一天寶初補祕書正字劾免留客濮陽學者皆從授業號蕭夫子召為集賢校理嘗作伐櫻桃賦譏李林甫見疾免官林甫死更調河南府參軍事安祿山有寵穎士知將亂託疾遊少室山乾元初授揚州功曹參軍至官信宿去客死汝南年五十二門人共諡曰文
  hash: sha256:06bbf73f7b467e542b6d05c3eafe34c2cf7a6ee3912df1907fddc11172f680b1
