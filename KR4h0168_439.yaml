front:
  text: 全唐文欽定全唐文卷四百三十九肇宰相貫之父大歷中為中書舍人纍上疏言得失為元載所惡左遷京兆少尹改祕書少監載誅除吏部侍郎諡曰貞
  hash: sha256:88315459ff13666542536ae907a6597be008bef8b6a4c06bd2190d3206afc761
  markers:
  - {type: head, offset: 14, content: 韋肇, id: KR4h0168_NFKB_439-h1, level: 1}
body:
  text: 有武備者國之嘉謨習武事者人之令圖其在易也徵之擊柝其在禮也取彼懸弧蓋居安慮危而兵不可去策名委質而藝不可無我皇富有四海光宅八區然猶軫懷未達惕慮不虞欲以廣盛業於二柄選雄才於百夫時乃駕幸於層樓闢場乎九軌森其羽衛揭以弧矢列竹替佩而儼立端冕旒而高視詔曰惟爾力人惟爾爪士食我場藿今則至矣歌乎采蘩試可乃已於是拜手稽首足之蹈之騁技於非常之日爭鋒於拔類之時則有六鈞用壯百中無疑和容就列省括於茲射用藏弓不獨主皮之善發殊罕忌而無失鵠之嗤可謂措杯至習舍拔必至盡其妙而不棄前修擅其功而若有餘地天顏既矚且賞麗龜之功人意所傾敢爭射隼之利又若蒙輪之俊超乘如飛騁廣場之永埒覽繁弱而忘歸左旋右抽擢兩肩於敏手奮髯增氣示衆目以餘威立表取準臨危應機盤過身之矛所投皆中執如組之轡所向無違宸心用多其勇捷觀者咸服其精微至有術非五善取非十全不能定是非於己分而又爭利害於君前莫不心戰股栗落羽驚弦豈搜揚之不至諒工拙之相懸夫試也者為求於衆捷也者為同於天非僥幸之可竊用旌勸之無偏是以詣闕者數百計而升明者才一二焉其或進而不濫動必合雅靡蹲甲以自媒思觀禮之見假始僶俯於法度忽蒼黃於取舍信其命而有之亦不得而無也宜乎召墨客授行者書絶藝於詞臣傳不朽於天下若夫天地忌滿鬼神害盈方輿以之東缺圓蓋以之西傾百川因茲灌注七曜由是貞明故聖人以沖虛作式賢達以撝謙為情於是盤盂設誡几杖必紀金人貽誨於周書撲滿流規於漢史順之者福逆之者恥乃垂訓於小人咸取象於君子豈若方圓有度規矩合儀不虛不滿能安能危考衆器之論最實莫先於宥巵不隨日兮時昃不與月兮暫虧體執謙損性尚沖撝知盈概而必覆故止足而何期惟上聖之設法處中庸而在茲使廉恕以效貪殘改質金張可望形而謝寵許史可覩容而辭秩疏廣感此而挂冠范蠡勗茲而自逸覽斯器之為美何餘物之能匹原夫出自聖者之心成乎匠人之手匪雕匪刻可大可久鄙巨壑之難盈惡漏巵而虛受寧取類於瓦杯以供堯舜不願同於金爵惟資桀紂故一化於陶鈞歷千載而不朽由是魯君之廟置諸戶庭左鄰東序右界西扃惟仲尼之多聖賴弟子而為銘僕又何德輕塵翰墨雖不假於先容實有愧於觀國夫以天覆高兮地載卑道幽元兮不可窺日始中而還昃月將盈而復虧滿而不已則溢高而不已則危誠古聖之深戒作來者之明規示豫以倚伏教豫以謙撝雖蒙昧而不敏請將心而事斯故遠求類物近方諸已鸚鵡何智兮隴坻先鳴靈龜何愚兮長塗曳尾智者禍兮受雕籠之斃愚者福兮終廟堂之祉信通塞之暫昧乃榮枯之一指何茲器之雖朴以堪誡而成珍稟質陶甄之匠賦容埏埴之人不雕飾以眩目寧儉素以全身始含虛而任受忽多藏而纍真入之有徑出之無因其滿也渾兮似蚌珠未開於重淵之下其拆也杳兮若雞卵初分於太古之辰豈不以驟積而靡散貴得其豐孰知其難裂陶鎔之璅璅出金錢之粲粲見之者無不興嗟聞之者盡皆含嘆若夫窅窅宦子營營市人若恥貧賤之域同趨富貴之津得利足以潤已至盈足以敗身猗歟前跡安可再循豫遂削營欲之心守謙光之道念此物之雖賤宜吾人之所保鑒周鼎之覆餗看魯器之傾倒猥逢長倩之贈永為子孫之好欲窮墨妙之意以養太元之草劒者主生殺之氣匣者同隱見之心鳴於其中或幽閒以為恨出乎其外信利用以則深豈徒飾以雕玉比之兼金銼雄鋩而不舉緘異氣而嘗沈者哉故劒利於人匣因於劒蓋所以為重俾神物而不褻亦所以表能將瑞光而亦驗其始也若耶之溪涸赤堇之山開良金既選歐冶爰來合純精而鑄鍊召太一與風雷厥功既勤曠歲月而方就厥狀斯見法陰陽之所裁於是工技之儔金鏤為匣制其象也錯玳瑁與瓊瑰韜而藏諸祕龍鱗與龜甲故楚王之未識我含其章風胡之將鑒我耀其光發匣而覩爛然非常環啓蚌以吐月刃披雲而降霜若金隄始開橫秋水之漫漫如青天欲倚散陽彩之煌煌夫惟義也動而必吉夫惟神也行而無跡號龍泉而其善可珍指斗牛而其光可射用晦之際思顧盻而無遺出幽之時思佩服之無斁伊昔三劒氣凌九霄臨敵高揮而血流千里復讎虛擊而疾不崇朝苟蒙蔽而未發雖晏陰之莫昭且劒之在匣蓄鋭而誰玩劒之出匣器利而能斷亦將試銛鍔於鯨鯢決浮雲於天漢或提擕之未及尚埋淪而可歎願進用於張華如見知於雷煥器為用兮則多體自然兮能幾惟茲瓢之雅素稟成象而王褱偉安貧所飲顏生何愧於賢哉不食而懸孔父嘗嗟夫吾豈離芳葉配金壺雖人斯造製而天與規模柄非假操而直腹非待剖而刳靜然無似於物豁爾虛受之徒黃其色以居貞圓其首以持重非憎乎林下逸人何事而喧可惜乎樽中夫子寧拙於用笙匏同出詎為樂音以見奇牢氶巳各行用謝婚姻之所共受質於不宰成形而有待與簞食而義同方抔飲而功倍省力而易就因性而莫改豈比夫爾戈爾矛而勞乎鍛乃礪乃於是薦芳席娛密座動而委命雖提挈之由君用或當仁信斟酌而在我挹酒漿則仰惟北而有別充玩好則校司南以為可有以小為貴有以約為珍瓠之生莫先於晉壤杓之類奚取於梓人昔者滄流曾變蠡名而願測今茲廟禮請代龍號而惟新勿謂輕之掌握無使辱在埃塵為君酌人心而不倦庶反朴以還淳遵大路乎新謀倚善人之廣運沙之積也得禦濕之宜隄乃名焉審用功之分爰謀爰度是築是隱使夫晴靡磽確之煩雨無塗潦之窘若然者施之城闕豈但三條之通用之郊坰可以千里而近伊功足紀斯美奚擬臺或虧簣我終始兮無然山不讓塵我包含兮亦爾應物兮寧倦安卑兮詎恥俾時行各得其所由故日用不知其所以君勿謂泥滓之賤君其乘宏益之深高而不危仰諸侯之殊化直而能正定志士之夙心何止禦浸淫而為岸或當披隤阤而揀金其處也周帝城之內徒有羡於瑤池其堅也雖衆人之力固自得於金椎亦由道存而命舛天縱而非師是以遽奔衝應馳騖洞萬戶兮旁啓紛九門兮爭赴往來相接見軒蓋之成陰蹊徑自開何桃李之足樹役無妨時利莫尚茲豈踰於衢且以夫大為防也能保其固匪同中聚而雨之仰對高闕兮熒熒夾植喬木兮青青無偏無頗庶託情於王道不騫不圯長委質於地靈願得乘御輦蔭宮槐敢邀功於捷徑期展效於微埃徒以為臨曲沼登高臺誠不如賦沙隄之盛觀足以騁作賦之才宿贈僕射逖子辟河東掌書記代宗朝歷刑部郎中中書舍人出為華州刺史先聖立言蓋非為已後學敬教可以潤身且非亂常如何議辟乙門殊闕里室有儒書雖則家藏未遑邦禁同原伯之不悅或可見非比韋氏之能傳實惟濟美鄰人誠為妄糾彼已未越彞倫遽欲論刑何縣吏之從昧不置於理知郡司之有孚翽官京兆尹出鎮山西東道為亂兵所害天寶初有獻書闕下者言巴蜀之間有石鏡見於巖之半仁壽之字昭然可觀僕深奇之因而為賦主上恢大寶闡鴻休仁風揚而元德布壽星輝而皇化流故得仙靈啓瑞石鏡涵秋無往不形鑒乃侔於止水有鼎而應道可以喻虛舟懿夫化自天鈞質非鎔造亭午光射靈朝曙早來洞穴之九仙對商山之四皓炳昆岫之龍燭倒風壇之竹掃光能照乘不遺罔象之珠跡在幽巖為啓崆峒之道動如秋水之澄皎如寒雪之凝駐清夜之圓月挂長河之片冰其形不由於拂拭其勢豈假於鉤繩君則無心惟德之斯感山非自爾喜神之有憑左猿吟右虎嘯萬籟相目舌㣥容必召雖復晉有金飾之美魏有銀華之妙何如庸魅而野鹿羞窺愛舞而山雞自照昔之寫形仁壽見膽咸陽倚玳瑁而稱麗挂珊瑚而益光名傳歲月事著縑緗咸播美於千古孰歸功於我皇鏡為之鑒與明德之合符石類於金惟聖躬之初應可以示後世之千葉可以軌前王之萬乘記事之簡以光良史之書頌美之詞更動詩人之興法天法地之謂仁不騫不崩之謂壽惟仁也故能昭泰惟壽也故能長久萬人咸識鄙石室之仙經六體自然輕漢園之臥柳我大君猶抑而不納謙而不有小人無益於補天庶斯文之不朽皇矣上帝臨下有則元德升聞榮問充塞三光明而品物昭報四氣序而黎人不忒雖休勿休惟靜惟默偉夫自然之丹甑方作瑞於明德應皇運而無疆報時豐於有國其業可大其功可久既申命以自天類有孚而盈缶循環外映爰假象以為名濩落內虛信當無而入有明夫既耨既穫表此不稂不莠將有開而必先固茲器之可守天應靈貺人期至豐不汲而滿將寶鼎而齊列不炊而沸與溫泉而比崇異鈞陶之有作符造化之為功千箱以之而發詠萬姓無嗟乎屢空且夫人為國本食乃人天朝有代耕之秩野多擊壤之賢豈不以休徵畢至瑞應無邊正色斯呈以明於聖感天資可尚是表其豐年影亭亭於瑞日光泛泛於祥煙九功咸序八政攸先超三皇而軼五帝尚何足夫比肩述代宗時人維永泰元年歲次乙已二月十七日新平郡王薨於西京之內邸春秋四十一粵以其年五月七日遷窆於萬年縣龜川鄉細柳原禮也王諱儼字伯莊睿宗之曾孫元宗之孫奉天皇帝之長子也幼而溫良夙乃碩茂動皆執禮言必稱詩皇孫之中德行推美周邦右戚漢典開封代繼讓王之尊親承太伯之嗣先朝友愛奕葉追崇常佳南楚之風每玩西園之月仁者不壽遘疾而終皇上軫棠棣之悲懷雁行之慘輟朝震悼義切天倫燕云封龜占從吉俄辭舊邸言向佳城近灞陵之高原當細柳之古地丹旐將引元甲啓行器備飾終禮有異等嗣子年在童幼執喪而哀詔葬之儀悲深先遠豐碑之窆詞在刊銘銘曰文昭武穆天孫帝子好古推賢樂善歸美親承太伯業繼賢王漢屏斯重周卿有光人閲於水夜遷於壑長坂蘭摧小山桂落細柳之地灞陵之川泉扃一閉幽千年諫元宗時人臣某言臣今日己時至臨臯驛西開府魚朝恩見奉宣進止賜臣錦戰袍等又未時至管城驛縣中使至賜臣瓜兩顆聖慈薦及寵賜頻加榮有同於衣錦恩乃及於挾纊重裘莫比被練非堅以此臨戎期於盡敵況傅之香澤分以甘瓜推食解衣未足為喻誓當畢命少答殊私身膏草野實伸至願無任受恩稠疊之至臣晏言臣實凡淺謬典樞衡元元未安庶政多闕涓塵罕録尸素空慚臣女壻元帥判官駕部員外郎知制誥潘炎入侍帷幄又司戎政嫌疑之地顛沛是憂頃者纍表陳聞冀炎得歸省闥不謂天聽未達尚阻愚誠內懷冰炭若墜泉谷臣某誠惶誠恐臣聞統天下者以天下舉直錯枉不私其親故能啓至公之門塞㣥邪之路伏惟元聖文武皇帝陛下紹休聖緒惟新寶歷內百揆外清四海鵷鸞之士充庭漸階而臣與潘炎俱忝近密兵權國政在臣二人是使惡炎者易為辭嫉臣者易為毀倘炎獲戾臣無以見雪脫臣遇謗炎無以自明此臣所以寤寐兢惶罔知攸止昔霍光為大司馬長女壻度遼將軍范明友次女壻羽林監任勝為東西宮衛尉威勢崇重冠於一時不能抑退卒見傾覆前史所惡書而貶之又劉宏為鎮南將軍事時朝廷以其女壻夏侯陟為襄陽太守宏表陟親戚舊制不得相監有詔聽從竟免禍敗先賢所尚美而書之臣雖才謝古人智不經遠每憂覆餗大懼妨賢竊惟瓜李之嫌寧望桑藿之許今是以瀝肝上請昧死聞天必元帥藉炎咨謀則臣甘引退如或廟堂留臣擇用伏願終許罷炎庶遂劉宏之心無成子孟之禍無任懇願迫切之至臣某言皇太子者王之枝葉固當使之繁茂以蔭本根國家自頃以來率由此道莫不重其職任以維四方如朔方范陽河南隴右劒南等州節度大使并五府大都督一切並用皇子以相監統內以制姦宄外以威寇戎雖未合封建舊章亦所以廣維城磐石之義也自羯胡肆逆海內糜沸務求武將授以兵權於是大使大都督之職廢而不復用矣近日僕固瑒梟夷之後陛下以朔方巨鎮寇逆未平將授其使賜臣靈州大都督單于安西大都護朔方節度使此一時之事非經久之術今妖氛電掃中外小康忝職樞衡代天理物固合遵守舊典宣明國章豈可復竊大名紊亂常式此臣所以內外冰炭俯仰增慚伏乞選之親王授以斯任俾臣兼靈州長史及副大都護節度大使佐理其中并諸府節度亦望準此處置四夷聞親王分鎮必當遠近畏威將亦絶其覦心不敢妄動又大元帥頃者並無親王為之自皇太子冊在春宮遂罷斯職今但置元帥司馬而元帥未有其人四方將帥之臣無所稟命亦望陛下復授皇太子以振兵威此國家要務也臣前月已具聞奏陳其事猶懼陛下未察愚言不以為念是以敢再三抵冒昧死上陳倘允臣所祈天下幸甚無任懇願之至臣奉某月日敕令臣河西揀招五千人赴磧西逐面防捍者臣到安西之日安西早已翻營軍令有行困不敢息鐵衣不解吹角便行邊庭路長去去彌遠往還三萬里辛苦二周年朝行雪山暮宿冰澗溪深路細水粗闕二字大約一程少亦百渡人膚皴裂道上血流畜蹄穿跙路傍骨積征馬被甲塞草不肥戰士戎衣胡風盡化今邊秋早冷赤肉迎霜臣準敕放還實恐磧途凍死伏惟矜慈育物遠念單寒請令安西給付綿帛蓋其凍露路免僵尸生入鐵門死將不朽有唐建中二年歲次辛酉十一月三日瀛州景城縣主簿彭涗字巨源卒於官明年十有一月季弟字長源迎神葬於古漁陽城北采貴里之原存歿急難於此極天倫之戚君之先世祿至高祖奕葉瓊枝在邦已聞曾祖順皇朝都水使者祖杲御史中丞嶺南採訪使考棲梧蒲州司馬生君身長六尺性倜儻善屬文工楷隸廣德中有季父仕於恆因省遇亂來遊幽薊與宏農揚鏻太原王譒河東柳挺以文相友為當時高唱及太尉遂寧王司徒義陽公魯衛更榮秉旄此府恩殊寄重深沈朱戶君嘗儒服曳裾宴語東閣雖梁邸之待孫羊竇家之歡崔班彼一時也無何李惟嶽以恆趙叛有詔司徒討逆議者若師出乎闕一字莫之間屝屨資糧佇我文吏君解巾始拜此命縣與賊鄰防虞初闕雈蒲之盜起於倉卒長吏請避寇君曰擊柝待暴家人有備況國邑乎苟逃下闕詵永泰時人夫工文者或懦於勇烈善武者或昧於政理徐則失於斷疾則寡於謀至若文而有勇武而有政徐而能斷疾而能謀者公有之矣公諱羲仲字羲仲其先南陽人也高祖出宰榆次因家太原昔宋襄公之母弟敖仕於晉至伯宗為三郤所害州黎奔楚其子家於南陽以王父字為氏公其後也遠祖均東漢為九江太守纍遷司徒六條分而千里雲行五教敷而四方風動厥有成績罔或不臧自東漢迄於聖代英賢間發史牒詳焉曾祖隋雍州牧鄱陽將軍諱義國之選也烈考皇靈州録事參軍諱良獻人之望也皆纘承前緒垂祐後昆秉德不回世濟其美公則靈州府君之仲子也允文允武惟忠惟孝丱歲失趨庭之訓絶漿有類於參乎弱齡喪倚門之慈泣血不殊於柴也曾未弱冠克自激昂不安顏子之貧遂投班生之筆乃慷慨而言曰文武不墜在人宏之遂從安思順破魚海敗五城授上柱國又從哥舒翰破吐蕃收九曲前後討伐稠疊勳庸纍遷遊擊將軍左武衛中郎將暨乾元中秦州防禦使都督楊公公之懿親邦之碩德也懷郭有道之深識行祁大夫之內舉以公才兼文武德備剛柔表為司議參軍尚賢也至上元初楊公為同州刺史又表公兼韓城令當縣團練使任能也欃槍未攘獫狁孔棘既因之以師旅又加之以饑饉寇盜蟻聚於我疆黔黎鳥散於他境城壁頽圯廠墨戶閉隳嗷嗷彼方望公如歲公於是完城郭修器械均賦斂峙糗糧城郭之完也則矗長雲以倚天器械之修也則騰徑霜以撲地均乃賦則流人不召而來峙乃糧則軍士不戒而備農狎於野商復於肆去其煩苛敦其簡易曾不期月而人知所庇解印未幾朝廷多之遷澄城令無何楊公拜御史中丞嶺南節度乃咨參公謀授以參軍時宦官呂太一怙恃寵靈凌虐神主前節度張休為之棄甲公於是稽韜略演遁法算之以孤虛考之以風角潛軍間道克復舊藩甲士不勤而凶黨殲矣所謂不戰而勝者也乃大貢方賄丕敘庶績朝議嘉焉授大理少卿兼監察御史仍充節度判官懋賞也棘署亞卿表其赤心而刺外柏臺柱史俾其白簡以正邪方將振翼南溟竭誠北闕曜威靈於象郡布渥澤於龍川豈上天不惠降此大戾閲水去而不留藏舟奄其長逝以永泰三年四月六日寢疾捐館於上京務本里第春秋四十有二以其年五月十八日葬畢陌原禮也公之元昆曰夷仲早世而殞公之季弟曰昌仲為光祿寺丞撫孤追往號慟靡及惟公禮以檢身忠以奉國其事上也敬其臨下也簡御衆以寬撫孤以義率性而仁愛及物因心而孝友過人從官之祿利散霑於疏屬承家之資産悉付與同生宗族之所嗟稱寮友之所景慕者也夫人昌黎郡君豆盧氏太原交城令元偉之孫寧州真寧尉廣洽之女也調諧琴瑟志厲冰霜施襟結縭作嬪君子婉嫕淑慎宜其家人伯道無兒豈獨悲於晉史共姜誓死寧專美於衛詩痛失翼於凌虛思招福而遺有終願削髮禪寂衲衣空門愍幼女之未嫁抑深心而少止歲月逾邁陵谷有遷願播芳猷記之貞石詵也不佞知其為人哀彼談公念茲歸祔乃為銘曰於穆君子問望不已文武並茂忠孝兼美德所立兮奕奕韓邑嗷嗷疲人命公為宰厥政惟新化所及兮小臣不帥肆虐荒裔師徒不勤渠魁自殪資令謀兮聖朝懋賞俾崇乃秩卿月照庭臺霜輝質沐鴻休兮天地不仁殲我邦彥百身莫贖孰不興怨行之積兮孀妻孤女魂斷骨驚爰紀貞石永播芳名美無斁兮
