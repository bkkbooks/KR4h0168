front:
  text: 全唐文欽定全唐文卷九百四十一杜光庭十三
  hash: sha256:17fa433a41b95ce895f974d759b604b1b25abebd33ee4a5b4a34a74d17b43812
body:
  text: 伏以日闕震方為天中之都會瑤壇桂殿乃人世之福庭或真聖之所晏遊或神仙之所窟宅莫不藏奇韞秀演貺流祥濟祐人天幽贊邦國惟茲古觀果顯殊禎得天寶真符出老君祕記金文鳥印篆字虬蟠分明而瑞跡如新拂拭而苔痕尚在幾千年之前定聖主開圖二百歲之昌期吾皇享國御名國姓生日年辰一一指陳重重符驗繼書薄德備列姓名載詳圖籙之文益切兢營之懇遐瞻煙岫仰感靈恩輒因醮酌之筵遙寘焚修之念上願洪基克固比溟渤以無涯聖壽增延並岷峨而更峻九圍順化萬宇歸仁誓虔忠孝之誠以副真靈之祐不任大蜀皇帝謹稽首北邙化得道章真人夫以紫府高真元洲上士乘颷駕歘坐有立無昇汗漫以遊神入鴻濛而隱景或明符邦社旁濟生民或幽贊帝王共清否塞李順興保持靜帝陶貞白佐佑蕭王子年潛諫於府君意期密悟於昭烈禀之則受禧介福忽之則違吉貽憂煥彼縑緗皎同日月今者百姓郭迴芝採藥於仙居觀得真人天寶年所畱銅牌六十字之周旋名姓與年辰備在二百年之藏祕錢文與篆跡皆全嗣續具明日時無爽苔侵土蝕固當靈將護持應驗合符實荷真人示見顧惟薄德顯契休徵事超於赤伏黃圖理冠於鳳銜龍負既覩延長之數敢忘兢業之懷爰啟醮壇冀酬元德仍薙藂刈棘揆日僝工俾翠檻朱簷鼎新舊址郴樓遼柱重認歸途虔祝真靈鑒茲昭報三十六天宮之遠必降威光萬四千甲子之期永言佩服不任伏以道列三界地載㣥生或仙人修鍊之鄉或真官總治之所靈基有覩神化無方朕寅奉上元光膺大寶俯循區域在潔禋祠邇者軍國事繁干戈歲用未遑周普常抱惕兢思述虔恭庶消災咎今命三洞道士並遣使臣嚴備醮儀潛通元鑒所願四時有裕六氣不侵壽命延長邦家興盛皇枝帝祚百辟千官內自朝廷外及區宇億兆之衆福祐咸均敬記青詞粗陳丹懇不任伏以天分列宿地布名區燦垂象於圓羅儼福庭於方澤明施主掌以祐邦家竊惟玉局洞臺元元降跡鎮茲都會密邇城闉年祀徒深光靈不泯虛寂靡殊於林谷貽祥每及於烝黎常切敬恭敢忘瞻奉伏自祇膺歷數啟創朝廷象闕端門須就正陽之位霜壇羽殿遂從遷革之宜而石室洞門老君真像陳暮燭朝香之禮惟務恪虔接龍墀鳳闕之嚴彌加崇潔固可以與天共永終古長存尚慮主宰神龍陰陽官屬興功擾動衆役喧驚既踐暴以為憂憑醮祈而懺謝爰自吉日式備香壇翹注匪遙真靈必鑒伏惟元元降祐大道開恩赦已往之尤違錫將來之禎祚使寶圖延永社稷安寧風雨均調龍神輯睦災期蕩滌罪咎銷平其有真符太乙之運行將移地分火曜土星之臨照欲及身宮願迴力以護持致微躬之昭泰烽爟不飛於四境沴瘥無撓於兆人永誓丹襟上奉元貺不任伏以至道生成元功陶鑄陰陽主宰品彙區分禀質誕形仰資神化臣獲逢道廕叨荷朝恩被服寵光主張戎伍省功庸而未著顧塵忝而已深夙夜揣循敢忘惕勵尚慮秉修或闕履行多違旋積愆瑕未申懺滌或五行三命有刑剋之期九曜列星有照臨之數或宿仇未釋或往債未祛神道難明常情靡測因成災滯悔謝無由輒於本命之辰虔申醮酌依天真科格拜伏大章伏惟高聖感通真靈鑒護察其丹懇降以元恩災厄銷平壽涯延益潛增祿祚廣赦罪愆解已往之恩讎錫將來之福祐誓傾忠孝永奉君親不任伏聞元化肇分二儀構象融結定陰陽之位神明司匡御之權太乙天尊高皇上帝坐勾陳而臨察命神使以周行於是五行八風天一地二揚鑣雲路駕景星躔順九野以遐觀潛施炯誡歷諸方而俯燭顯示吉凶惟古及今敢忘砥礪臣以直符所屆在明堂之宮四神所行居咸池之位所宜蠲潔用罄禱祈皇帝受命上元握符承統宏慈儉之化敦清淨之基思洽太和以康萬國昨者以鄰封背義越境干盟殘剽蒸黎侵淩郡邑旋平凶孽盡廓氛埃指麾元自於睿謀讚助實資於神力今則封疆寧晏襃漢肅清星紀迴天歲聿云暮當此月壬申之日乃新歲首值之辰輒備壇場虔申告謝修太乙大醮燃金籙神鐙下照幽關上通元極蕩祛災滯延降福祥伏願宗廟安昌社稷隆固寶圖攸永聖壽遐長繼雲官火紀之崇邁炎漢姬周之業速臻一統克致大同六宮式表於匡扶百揆共傾於忠讜三元朗照四序均調歲有豐登俗無疵癘龍神悅豫成五風十雨之祥川嶽乂康流澤馬器車之瑞昭明丹懇上答真靈仰祈鑒祐之恩廣錫延洪之福不任伏聞一氣肇胎萬形資始高垂象緯明判剛柔統御之權歸於至聖天命帝以司牧帝承天而撫臨攝提握耀之初君臣定位揖讓干戈之世道德兼行時危則元德彌彰運否則洪休自廣大蜀英武睿聖光孝皇帝德符穹昊功被生靈受命儀乾永康三極神明符讚人間之玉燭調時律歷均和天上之珠囊叶度俗臻豐衍歲有蕃登美瑞嘉祥日書月至猶復晝乾夕惕恭已奉天夤敬幽明憂勤億兆專拯溺救焚之念無蕩心悅目之娛軫慮萬方期於仁壽昨者以四神行運在咸池之宮直符所臨次明堂之野旋興戈甲尋致剋平彼背盟構逆之徒思漂杵燔枯之敗斯則神歆睿德天助皇威睹變災成福之祥示國泰祚延之兆今則歲聿云暮氣序將交荷即日之元恩禱新春之景貺願酬聖力輒罄齋誠燃金籙神燈備河圖大醮伏惟高尊鑒省大帝感通十神常介其休光三載允承於福祐寶圖隆永宗廟安寧皇帝等壽五山齊明二景八紘順化萬國宅心皆臻有道之風盡掃不庭之孽皇太子重明耀彩文教聿昌輔贊睿謀延洪大業六宮百揆咸均翼戴之心兆庶六軍俱享乂康之福龍神密衞川嶽恒安幽顯飛沉永承洪澤不任伏聞大道垂文元元演教佐時助國宣化度人功格象先惠周物表寶章上御人間之懇願必通天澤下臨真境之休貞允降㣥生蒙祐巨細無遺某今年大運所闕值三殺之位小運支木當衰弱之中干祿納音俱逢土塞飛旗四殺仍在寅鄉羅睺躔剋姓之宮土星臨乖背之宿火曜行度將入身宮行年所經况當地網又醫方所診藏氣未調榮衞未和正氣衰薄六脉未復九府猶虛恐構災凶更深厄運又恐積生往世寃債未除運意行心罪瑕旋結須憑章奏冀達懺祈是敢依按明科選求良日列詞備信拜奏章文請天官吏兵降鑒營護某內安腑臟外去災凶上解星辰臨照之期下銷年命刑妨之咎寃讎和釋債訟蠲平六氣舒通百關調理衰危超度命祿增延北宮迴短促之年南極注遐長之壽伏惟至真大道太上三尊常宏憫濟之慈允錫安貞之福誓虔忠孝克勵身心讚明君化育之仁報至道生成之澤不任伏以大道宣功三靈資始禀形賦命表識定生體化育於坤偶乾奇配吉凶於天曹地府三官考校罪福無遺五帝主張死生咸繫臣顧惟塵陋獲奉休明籍係中樞名參內署鵷鸞闕下叨步武以多慚日月光中揣分涯而增懼微功未著積過必深每慮前世宿瑕此生罪咎未申懺滌難遂原除又恐三命五行天文年運或逢厄會或值災期犯神明主宰之司違仁義元儒之訓或侵人利已或故殺誤傷罪目易盈善功難就或壽齡促少或禀祿單微常於元命之辰式備醮祈之禮兼將課念上奉明靈旋以天步艱危神州紛擾或脫身林嶺或奔命道途五任於茲不遑醮奏香燈既曠寢食難安今屬銜命西南稅鑣岷劍道路無阻關梁大開帝澤天波遐通於四裔歡聲喜色震曜於一方况此少城實惟仙府可以冥心貢懇可以禱福祈真爰卜令辰仍當本命賫持信禮撰備香花併以此時追填往醮精誠有達靈鑒必通伏惟採納丹襟降流洪福獲酬昔願更洽新恩賜臣災厄蠲銷祿算延遠存亡俱泰眷屬咸安上願社稷興昌乾坤肅靜三光順軌六氣均調武偃文修時和俗阜克迴鑾輅永固龍圖俱諧虔祝之心盡睹太平之運不任伏聞五緯禀生三才列位荷陶鈞於至道感孕育於上元而歷運推移陰陽升降吉凶倚伏寒暑循環否往泰來災生福過考諸物理斯為格言况在庸虛敢忘戒懼臣行年之內併屬災期大運居甲辰之中小運當丁已之上又茲兩月咸值四宮是地網之鄉兼本卦之位恐成厄會無所告禳更慮宿曜加臨飛旗應變五行刑剋三命衰微雖驛馬臨年恐災能制福退思履行內省身心須在懺祈用明哀懇爰憑吉日虔備醮壇延降尊靈以希照鑒伏惟三官五帝下燭丹誠斗極星君俯流鴻澤注延生之籙錫以福祥焚積罪之書赦其瑕咎解災凶於地網銷厄運於巽宮使壽紀增新休貞允萃公私和泰眷屬安寧永承濟護之恩敢負真靈之祐不任伏聞易象垂文取諸大壯聖人著法代彼橧巢棟宇聿興古今是則由陰陽而定位配刑德以裁規爰命衆神各司其職逆之則凶而獲戾順之則吉而降祥臣頃以所居不庇風雨因時改作隨便營修越月踰時巨功告畢但慮起土運石增下損高畚鍤所侵不知禁忌穿鑿所及有犯神明未申醮謝之儀常切兢憂之懇兼以所居之地五姓相因歲月既深主宰非一慮其神識尚有淹延憑此醮祈俱令遷拔是敢肅嚴庭宇恭啟法壇請靈寶符文按太元科典降延真聖披露懇誠伏惟五帝鑒臨衆神昭祐勅下符吏宣告地司安鎮龍神銷平犯觸使凶殃殄息真氣滂流禳未兆之災衰納惟新之福祚蕩伏尸故氣遷滯魄遊魂自明及幽咸得其所六甲五行之象九宮八卦之方各靜封隅永垂貞吉闔門清泰舉室康宜勉勤修勵之心以副真靈之貺不任伏以大道凝真元功化育清濁之源既異陰陽之位亦殊南斗上宮實司生籍上惟邦國徧洎人倫壽紀短長祿祚豐薄咸歸主宰無間纎微臣等獲遇聖朝躬逢道運覆載禀質動用愆違處世立身寧無過咎未申懺謝因構災危又恐宿曜行年九宮三命或逢災厄或遇刑衝神道難知凡情罔測須資香火用罄禱析敢以吉辰虔申大醮伏願流光下燭元鑒俯臨察丹切之心降龎洪之福祛災度厄增祿延年削罪目於陰曹上生名於陽籍公私和暢眷屬康宜存歿沾恩幽明蒙祐不任伏以博厚成形中黃定位統水火而稱長冠金木以居尊孕育萬靈苞含五緯上惟邦國下及人倫凶吉攸司安危是繫臣本宮震卦五鬼所臨運氣飛旗仍當此月恐為災厄尤切憂惶虔考吉辰精修醮禮伏惟鑒其丹懇錫以鴻休迴危就安變凶成吉解災除厄增祿延年眷屬康寧公私和泰不任伏聞道分一氣人配三靈善惡發於丹誠吉凶應於元極苟興嘉願必叶殊祥况在名山俯臨仙洞炷香祈願瀝懇陳詞必能響達神明顯垂福祉伏以當川安撫副使張琳禀澄達之識秉清正之心穎鑒無私忠貞不撓推公奉主虛懷同止水之明御下恤人從善有轉規之易况連營貔虎四時之犒賞皆豐積歲干戈千里之輓輸無闕言惟憂國志絕營家每切勤恭動忘寢食人皆受賜孰不知恩臣孤孑官名低擢翅羽恃其拯護方果奮飛思禱真靈用申答効今屬陽和動煦林谷舒春爰記生辰虔修大醮仰星文而貢懇徧川嶽以歸心香雜溪雲燈和嶺月千巖景寂午夜風清展肅恭莊敬之儀備薀藻蘋蘩之禮伏願光迴三景飈降十仙鑒茲醮酌之誠錫以昭彰之福延二首六身之壽除五行三命之災善功克懋於仙階陰德光隆於世緒然後封隅寧謐邊徼晏清瘥癘無侵戈鋋罷用聖主洽垂衣之理藩垣著柔服之恩幽顯咸安飛沉各遂敢忘砥礪以奉休明不任伏以聖主明王必臻符瑞膺圖受籙爰著謳歌既居億兆之尊遂忝帝王之命洎臨大寶將及六年教化未浹於生靈華裔尚乖於正朔兢兢業業罔敢遑寧慮刑法之不均慮賞罰之非當屯兵絡野念富庶之未臻暴骨盈川固殺傷之不一每思首謝用贖愆尤敢言圖讖之文併屬庸虛之士今年七月八日漢州什邡縣百姓郭迴芝於仙居觀採藥掘地得銅牌長七寸廣四寸上六十字云老子通天記云丁卯年甲戍乙亥王生享二百年天子王從建王元膺王萬感王岳王則王道宜五字篆文未詳後云洛州北邙化章宏道天寶年畱此明後聖代顧惟薄德遽捧殊祥云歷數之延長紀子孫之次第佩服元貺益用兢慙敢罄深衷專深醮謝伏冀畢朝福地總召名山各駕仙車共歆丹懇示安社稷咸泰人民致風雨之不愆俾干戈之載戢翳賴靈貺深置於懷不任伏聞惟天降祐彰瑞於河圖洛書惟帝法天受命而膺符執契古今所禀歷數迭興臣運偶元休德慙寡昧承土德陵夷之後億兆無依叶金莖啟創之初寰瀛推戴恭膺大寶於茲六年常以未明求衣日旰忘食兢兢業業上奉穹旻今則銅版靈文出於古觀示太上降祥之兆應承乾受命之徵名姓具彰年辰畢載斯乃豫定於九天之上先期於億歲之前祕篆昭宣真文煥赫告延洪於寶祚表遐永於孫謀省已循懷以兢以懼欽惟靈睠彌切勵修是用虔肅寶齋依歸至道庶諧多福永庇萬方不任伏以景列上元山分下土乾坤交應罪福攸司緬彼靈蹤鎮於天府藏雲噴雨旁資生化之功玉洞瓊巖深閟神仙之宅果叶殊休之運爰膺開國之祥惟此命辰配茲真境契清明之嘉候耀大火之靈光當人天禱福之期是鸞鶴上賓之日式陳醮祝用達精誠坐宣室以馳心望白雲而稽首所冀旁流景貺幽贊鴻圖㣥生共樂於和平萬國必同於書軌永言修奉以答元功不任伏以列宿麗天㣥山鎮地爰通氣象以福邦家每申望秩之儀必介惟新之祐皇帝承天啟歷應運執符本命之山實惟茲化洞含雲雨峰戛煙霞必有光靈潛宏讚祐况當令序式備醮祈翹首歸心恭希景貺伏惟諸天上聖俯鑒明誠三真衆仙同流巨渥使帝圖延永社稷隆昌二十四峰克膺於聖壽百千萬歲長固於皇基四海九州咸賓睿化五兵戢息百穀豐穰俱登仁壽之鄉並契正真之道不任伏聞三境九清琳房日闕凝雲結氣宅聖棲真因法象於上天授規模於下土觀宇之製其在茲乎所以進退全和必資嚴潔朝元降福固在清虛况乎仙跡靈壇所務蠲邪蕩穢用期安靜以契修焚當觀鳳闕乾岡龜城福地肇興隋運綿歷唐年呈祥則瑞露凝甘發地則香泉涌浪累彰禎異煥彼簡編碑鏤天章額題御筆崇樓戛漢玉殿參雲披文則劉美才盧照鄰金玉相宣闡教則黎元興蔡守沖英奇間出昭灼蕃盛垂二百年偶以蠻蜑憑淩王師禦捍撤我層閣壞我循廊庭荒而綠草欺人樓碎而洪鐘委地或贍軍之日彤階為屠宰之場或屯旅之時綉檻為狴牢之所腥羶溢鼻褻瀆傷神寂寂虛壇久息吟元之韻蕭蕭古牖空餘擁座之塵肸蠁不虧光靈有待我皇帝承天啟祚縱聖康時駕豪傑而濟橫流攬英雄而拯危運超羲掩皞邁舜逾堯屬念重元凝情大教以為清靜者理人之要無為者成化之源三皇則務道為先五帝則宏德為本爰敷渥澤載葺凋零浹旬而碧嶂層分不日而飛軒四合瓊舒御殿將嚴當宁之容嶽立麟臺即寫扶天之貌香花芬馥繕飾周圓徒榮廕祐之恩未展醮祈之禮言念於此憂心惄然又自去載以來繼有危懼講堂摧圯道侶淪亡慮虧昭謝之儀是獲真靈之譴敢虔衆懇恭啟福筵伏惟大聖貽休元尊降鑒錫殊祥於金運增福壽於聖躬一統寰區大同文軌五兵韜戢百穀豐登咸成不宰之功共樂太平之化道衆等同臻景貺各沐元慈法教隆昌龍神和豫旁資幽顯普及生靈克遂逍遙盡蒙禎泰往逝者生神丹霍見居者耀籍青元法界含生光承道廕犯觸之咎俱乞銷平臣等不任伏以太上元元陶融萬化五老上帝統御㣥生九曜宣照燭之光三官主賞刑之籍共司品彙以播元功由是北臺陳校勘之科南府示奬延之籙蓋欲使人倫之內知懲勸之方各勵精修用寡尤悔有過者可期於懺滌有災者可至於祈禳廣此宏私大彰神化真經奧典幽顯蒙恩臣猥以塵凡早崇至道棲心稽首常依清靜之門世網俗厂田坴莫遂逍遙之願久嬰微恙猶未痊除近屬傷寒尤增羸瘵值大運小運與生日相刑土星火星照行年之位天符飛旗臨本宮之上飛天火曜居今歲之中支命納音氣皆衰薄以茲厄會倍切兢憂是敢虔罄丹誠叩祈元聖恭修醮禮披瀝上聞伏惟大道宏慈至真下濟垂好生之澤降罔極之恩賜臣以罪咎原除寃仇和釋災凶消解疾疹瘳痊續將盡之年齡錫惟新之祿祚息幽陰之債訟絕往世之考延六氣內調衆邪摧殄得勵為臣之節永奉昌期誓勤修道之心常宏大教不任
