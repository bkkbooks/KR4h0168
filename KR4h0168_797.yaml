front:
  text: 全唐文欽定全唐文卷七百九十七皮日休二
  hash: sha256:77ae30af6442754603a416556e8eb4a15379cdea792fbd929b7cf4bf05a8a081
body:
  text: 天地吾知其至廣也以其無所不覆載日月吾知其至明也以其無所不照臨江海吾知其至大也以其無所不容納料廣以寸管測景以尺圭航大以一葦廣不能逃其數明不能私其質大不能忘其險偉哉夫子後天地而生知天地之始先天地而沒知天地之終非日非月光之所及者遠不江不海浸之所及者溥三代禮樂吾知其損益百王憲章吾知其消息君臣以位父子以親家國以肥鬼神以享道未可詮其有物釋未可證其無生一以貫之我先師夫子聖人也帝之聖者曰堯王之聖者曰禹師之聖者曰夫子堯之德有時而息禹之功有時而窮夫子之道久而彌芳遠而彌光用之則昌舍之則亡昔否於周今泰於唐不然何被袞而垂裳冕旒而王者哉距彭澤東十里有仙邃源奧處號曰富陽文士李中白隱焉五年冬別中白歲且翅再自淝陵之江左因訪於是至其門驂不暇緤而目爽神王恍恍然逮若入於異境矣訴別苦外不復遊一詞且樂其得也木秀於芝泉甘於飴霽峰倚空如碧毫掃粉障色正鮮溫鳴溪潀潀源內士冖柘籥韝出琉璃液石有怪者驍然闖然若將為人者禽有異者嘐嘐然若將天馴耶每空齋寥寥寒月方午松竹交韻其正聲雅音笙師之吹竿邠人之鼓籥不能過也况延白雲為升堂之侶結清風為入室之賓其為趣則生而未覩矣中白所尚皆古以時不合己故隱是境將至老嗚呼世有用君子之道隱者乎有則是境不足留吾中白也昔余與中白有俱隱湘衡之志中白以時不合己果償本心余以尋求計吏不諧夙念今至是境語及名利則芒刺在背矣夫賓之來也不逾於邑謂彭澤縣邑距是十里至是者不為易矣其延之旦不晡乎晡不夕乎則俟賓之所果不可低庳於是巨其寢西向百步則築賓亭焉兩其室而一其廈且曰賓將病暑吾則敞其簷賓將病寒吾則奧其牖自竟是功則鮮薧之饋罍樽之費縱倍於前矣其功始於咸通二年秋八月後五年五月中白館余於是且禱其記而名之者纍月讓不獲因曰古者有高隱殊逸未被爵命敬之者以其德業號而稱之元德元晏是也夫學高行遠謂之通志深道大謂之元男子通稱謂之子謂請以通元子為其號請以棲賓為亭名噫知我者不謂我為佞友矣五年五月朔日記禮山林川谷邱陵能出雲為風雨見怪物皆曰神若然者龍亦能為風雨見怪物則其澤之在民厚矣神而祀之又宜矣常熟澤國也風雨怪物日作於民在有其地者苟祀之至民被其利祀之不至民受其禍汝南周君為令之初年夏且旱禜其神於破山之潭上果雨以應君曰受其賜徒禜以報不可也於是命工以土木介其象為寶宮以蔭之著之於典以潔其祀於是風雨時怪物止水旱不為厲民經大荒連歲以穰其神之澤乎君之祀乎凡雩者春秋之道皆書之勤民之祀也君為其祠已乞文其事日休佳君之為志在民故從之咸通十三年二月十九日襄陽皮日休記明皇世章句之風大得建安體論者推李翰林杜工部為尤介其間能不愧者惟吾鄉之孟先生也先生之作遇景入詠不拘奇抉異令齷齪束人口者涵涵然有干霄之興若公輸氏當巧而不巧者也北齊美蕭慤芙蓉露下落楊柳月中疏先生則有微雲淡河漢疏雨滴梧桐樂府美王融日霽沙嶼明風動甘泉濁先生則有氣蒸雲夢澤波撼嶽陽城謝眺之詩句精者有露溼寒塘草月映清淮流先生則有荷風送香氣竹露滴清響此與古人爭勝於釐毫間也他稱是者衆不可悉數嗚乎先生之道復何言耶謂乎貧則天爵於身謂乎死則不朽於文為士之道亦以至乎先生襄陽人也日休襄陽人也既慕其名亦覩其貌蓋仲尼思文王則嗜昌歜七十子思仲尼則師有若吾於先生見之矣説者曰王右丞筆先生貌於郢之亭每有觀型之志四年榮陽鄭公誠刺是州余將抵江南舟羲舟而詣之果以文見貴則先生之貌縱視矣先是亭之名取先生之諱公曰焉有賢者名為趨廝走養朝夕言於刺史前耶命易之以先生姓日休時在宴因曰春秋書紀季公子友仲孫湫字者貴之也故書名曰貶書字曰貴况以賢者名署於亭乎君子是以知公樂善之深也百祀之弊一朝而去則民之弊也去之可知矣見善不書非聖人之志宴豆既徹立而為文咸通四年四月三日記三代之賞臣下以爵不以地不以器逮夫後世君弱臣強撥去古法能立一功者先伺君地焉能立一勳者先窺君器焉由是於魯有三桓於齊有田常於楚有白公是賞過有僭生焉甚者奪主從來尚矣且姬之列侯守其本封勝其主爵錫之以鈇鉞分之以鐘彞休戚其民生殺於國其貴已極矣遇天下無事則行其德化奉其貢職居則待乎巡狩行則赴於會同遇天下有事則申之以鐘鼓行之以征伐上以定王室下以正諸侯真侯伯之職業也是常節也苟周天子有賜宜以德讓之豈當更受其地也苟讓不獲聽受之者其爵可也其器可也且天子之地方千里不千里則不足以待諸侯諸侯之地既侵天子之甸猶削枝者必及乎幹剸肉者必至乎骨何者勢使之然也如晉文既定襄王於郟鄏王勞之以地陽人不服晉侯圍之乃辱其宗祊苦其人民虐其甥舅嗚乎其亦不仁矣是晉文雖有入天子之功而有凌天子之威也當王之賜宜讓曰臣重耳以眇眇之德處專征之任遇翟寇肆虐天王少違宗廟臣敢興下國之師殺凶臣定王室乃臣之常也不足賞也苟天王特念小伐不置諸刑列唐叔之祚獲臣有奉為賞厚矣苟以畿內之地為臣之邑是上濫其賜下僭其受也雖天王之薦寵臣其若宗廟之靈百姓之心後世之罪何而晉文曾不是讓又請隧焉豈內輕衰周之凌遲外恃諸侯之強盛而為耶殊不知周王之尚守乎典禮也且王曰昔我先王之有天下也規方萬里焉以為甸服以供上帝山川百神之祀以備百姓兆民之用且王之所賜田皆在周甸也王明知在甸內與乎晉者是力不足制晉也如力足制晉肯以規方千里之內地與夫諸侯哉是王之語晉侯以規方千里者譏其受地也文公不悟卒而受之嗚乎文公之霸也有召君之譏請隧之僭不為甚矣甚者在陽樊也聖人務安民不先置不仁以見其仁焉不先用不德以見其德焉苟如是是見危者已墜而欲援觀鬬者將死而方救噫其亦不仁矣以高辛之仁化用一摯摯之不善天下之民輔堯以為君以唐堯之仁化用一鯀鯀之不績天下之民譟禹以為功夫如是摯之與鯀是高辛唐堯誠用之也非先置也推其誠而用之人民尚倍之如是况先置者耶當晉獻驪姬之亂後奚齊卓子之死餘重耳在翟夷吾居秦以秦穆之力制翟而安晉其能必矣夫重耳之賢也天下知之又其從者足以相人國如先立之必能誅亂公子去暴大夫翼德於成周宣化於汾晉而穆公反取公子縶之言乃先置夷吾是為惠公公之入也背內外之賂誅本立之臣蒸先父之室故生民興誦死者無報卒身獲於秦而子殺於晉嗚乎致是也非晉人之罪秦人之罪也夫摯立八年不善而去鯀用三載弗績而誅况晉惠公之在位作宗廟之蠧蠍為社稷之稂莠一立十五年其為害也大矣今之學者以秦穆為繆尚疑其諡得斯文也可以諡繆為定忠之為稱也蓋欲委身以事主不以猜誤二其心不以辨説二其心不以疑懼二其心者也上有過諍於公不揚名於私豈猜誤之足入乎上有忌愈乎進不愈乎退豈辨説之足入乎上有間懼乎心不懼乎事豈疑懼之足入乎夫苟祿吝生而仕者上有過言未息而懼乎誅諫未再而去乎位自以得古人三諫不從之義然幸其生貪其祿是猜誤而二其心也上有忌必姦於心機媚於聲氣不思己之不聰而謂上之受謗不思道有未可而謂辨之足從必從辨而去是辨説二其心者也上有間必佞彼愛取乎厚也必諂彼幸求其捨也有愛不可佞幸不可諂即苟而已矣是疑懼二其心者也嗚乎劉項之作也淮陰不以猜誤而去項乎淮南不以疑懼而去項乎曲逆不以辨説而去項乎去彼而就彼果謂忠乎果謂不忠乎是利則存不利則亡者也則丁公臨敵捨敵無殺誠惻隱之仁者豈有猜誤辨説疑懼者耶有利則存不利則亡者耶與其不忠則彼三侯者未可免鼎鑊之誅刀鋸之刑也是高祖斬之果不為當噫漢之初立未為無人丁公就刑未聞有上言而戾者將固之命也悲夫夫剛柔之分在乎性得失之機繫乎用苟剛暴則勝柔柔久則勝剛物之常理也或用之以剛處柔以柔處剛其機必得矣如以剛處剛以柔處柔其機必失矣周昌之性剛也呂后之性剛也漢祖以百歲後以趙王如意為憂故輟昌相趙嗚乎漢高之意非逞志於一時納慮於一諫而相昌乎不然何其用之失也如以昌之剛足固趙國則趙之兵甲能當漢乎是不可一也如以昌之剛足固趙王則呂氏之徵王特一郵夫之力耳不可二也如以昌之節足以存趙不過乎死死則趙王就徵耳是不可三也卒使百歲之後如意冤僇周昌憤死惜哉漢祖未崩前以周勃統南軍以昌領北軍以陳平為謀主則呂后之令産祿之謀不能當臨大難而不回秉大節而不墜者也苟使握軍政執相權昌必能之其奈何誤用沈約作齊紀論云太廟四時之祭各以生平所嗜饗之漢明帝夢光烈皇后明旦車駕至廟躬拂帷幄親易粉澤前史以為美談此亦先代之舊典也日休曰薦饗之儀籩豆之數聖人之制定矣苟非通如周孔不相沿襲者謂時有人乎無其人制之謂乎非也宜矣修其書不正而反贊之謂乎妄也又宜矣夫屈到嗜芰屈建薦之為乎合禮曾晢嗜羊棗曾子不食謂乎不忍一隅之國禮文不備宜哉約以方之漢明大孝過矣周詩曰駟騵彭彭注曰馬白腹曰騵議者言上周下殷沈約又云騵者蓋三家之色相勝又示周殷相代也日休曰天之命也必以二德則文王自信矣何為不受殷禪哉詩曰文王受命作周又曰文王有明德俾其率天下之義師取一隅之凶主南面於殷其能昭昭矣然非人事不可也天時未可也豈不可謂殷之賢人尚衆冀匡紂而易政也豈能以駟騵之色示乎代殷哉嗚乎禪代之事符於天命必不可以駟騵之色勝之也謂堯之運為火歟則車服一當從其色則堯不當乘白馬冠黃收衣純衣也故聖人繼運以德受禪以仁如以馬之色示於代殷則吾以聖人用於左道矣或曰若然者奚著曰毛公誤箋沈約過釋祐元和中作宮體詩詞曲豔發當時輕薄之流重其才合譟得譽及老大稍窺建安風格誦樂府録知作者本意講諷怨譎時與六義相左右此為才之最也祜初得名乃作樂府豔發之詞其不羈之狀往往間見凝之操履不見於史然方干學詩於凝贈之詩曰吟得新詩草裏論戲反其詞謂朴裏老也方干世所謂古者且能譏凝則凝之朴略椎魯從可知矣樂天方以實行求才薦凝而抑祜其在當時理其然也令狐楚以祜詩三百篇上之元稹曰雕蟲小技或獎激之恐害風教祜在元白時其譽不甚持重杜牧之刺池州祜且老矣詩益高名益重然牧之少年所為亦近於祜為祜恨白理亦有之余嘗謂文章之難在發源之難也元白之心本乎立教乃寓意於樂府雍容宛轉之詞謂之諷諭謂之間適既持是取大名時士翕然從之師其詞失其旨凡言之浮靡豔麗者謂之元白體二子規規攘臂解辨而習俗既深牢不可破非二子之心也所以發源者非也可不戒哉洛陽新城三老董公説高祖為義帝發喪在漢之取天下也三傑而已矣蕭何苦民力以給兵輸韓信殺民命以騁戰功留侯設詭策以離秦項當其時未聞以仁義説於君者而董公乃諭之以喪義帝至使天下宗漢者為其喪義帝也夫高祖以曹參雖有攻城野戰之功不如蕭何也信矣焉至於苦民力殺民命設詭策反不若董公之功也哉如高祖為天子以公為師友行其道於時其利可知矣公之道已行於漢而不覩封賞之體又當時史氏無一字以裦者因為讚以旌之項氏狂攘賊我懷王天命未的孰存與亡皤皤董公一言漢昌一人弒君天下皆傷一人哭君天下皆喪項由是弱漢由是強扶義而征可至軒黃唱仁而戰可至武湯用於天道折彼雄鋩繄公之道與漢而光商君者用於孝公制其法而秦給御其謀而魏敗封邑未居轘刑以及嗚乎商君之匡秦雖不必盡是然亦至矣太史貶之過實非以欺公子卭刑公孫虔拒杜摯之説者乎然有一事亦足救斯非也余悲商君忠而受刑因重述其行事以讚曰商君之於孝公也一二見孝公不悟其説非皇王之道行之難不及其身者乎斯公之罪也在商君有心於是道不亦多乎當商君一二説孝公行之商君必為阿衡矣嗚乎卒以苛令特用自蒙於僇悲夫皮子嘗謂心為己帝耳目為輔相四支為諸侯己帝苟不德則輔相叛諸侯亂古之人失天下喪家國者良由是也帝身且不德能帝天下乎能主家國乎因為心口耳目手足針書之於紳安不忘危慎不忘節窮不忘操貴不忘道行古人之事有如符節者其在六針乎大化之精孕之曰人大純之靈形之曰心心由是君身由是臣中既齟齬外乃紛綸耳厭聞義目惡覩仁手持亂柄足踐禍門舜為天子舜不得尊其不尊者與心為臣紂為天子紂乃得尊其得尊者與心為君天子之外復有尊者乃舜之心將舜之身天子之外復有卑者乃紂之心將紂之身危乎惕哉臣之諫君輔相不明諸侯不賓君為穢壤臣為賊塵未及於斯良可自勤嗚乎吾君無忽茲文古銘金人謂無多言忽有所發不可不論既有所論復謂多言中庸之士由茲保身吾謂斯銘未足以珍出為忠臣言則及君入為孝子言則及親非君與親則宜默云謗訕之言出如奫淪一息之波流於無垠猜毀之言出如鈞天鈞天之樂聞於無聞佞媚之言出如絲棼一入於人治亂不分間諜之言出如鷹鸇鷹鸇之迅一舉凌天無嗜於酒酒能亂國無嗜於味味能敗德以道為飲以文為食成我之名繄乃勉力聽於無聽默默元性聞於無聞洋洋化源勿恃己善不服人仁勿矜己藝不敬人文勿耽鄭聲其亂乃神勿信美談其殛乃身聽誤多害聽妄多敗近賢則聰近愚則瞶堯居九重聽在民耳故得大舜授彼神器勿聽他富熒惑乃志勿聞他貴墮壞乃義慎正今非慎明古是捨是何適古樂而已愧爾瞭然為吾所視高覩古人有如鄰里勿分秋毫分於邦里勿視邦祿視於人紀惟書有色豔於西子惟文有華秀於百卉見彼之倨污甚塗炭見彼之賢帛丿糸甚葛藟勿顧厲階紊吾大志勿視怨府損吾高義入吾明者何人而已古之忠臣古之孝子上立大業中光信史苟不善是蚿蝝之類惟爾之指屈伸由已勿執亂權勿樹賊子勿秉非道勿持非理勿擠孤危勿援姦宄慎握吾操俾直於矢慎杖我心俾平如砥翦惡如草揚姦如粃為而不矜作而不恃智如公倕勿為小巧機如偃師勿為奇伎身高道端毫直國史敬之戒之俟為天吏惟爾跰跰為吾所先居必擇地行必依賢勿踐亂階勿履利門勿蹈怨府勿躡禍源鳳凰乃禽不棲凡木騶虞乃獸不踐生物唯爾棲踐保茲無忽動生於欲行生於為欲則不妄為則不疑吾道未喪於何不之勿生季世有爵必危勿居亂國有祿必尸往無市怨去無取口某蟲迹無顯露名勿求知聲無取猜譽無致疑坦道如砥履過蒺藜四海如家去劇縶維日慎一日言茲在茲冥冥默默惟道之域處不違仁居無悖德勿欺孩孺衣冠失則不慢皂隸語言成隙深山雖樂豺狼爾殛深林雖安虺蜴爾螫居不必野唯性之寂止不必廣惟心之適勿傲乎名要乎聘帛勿矯乎節取乎祿食躬雖已安若敵鋒鏑味雖以甘若含冰蘗成吾高風惟靜之力皮子性嗜酒雖行止窮泰非酒不能適居襄陽之鹿門山以山稅之餘繼日而釀終年荒醉自戲曰醉士居襄陽之洞湖以舶舟宿載醇酎一甔往來湖上遇興將酌因自諧曰醉民於戲吾性至荒而嗜於此其亦為聖哲之罪人也又自戲曰醉士自諧曰醉民將天地至廣不能容醉士醉民哉又何必廁絲竹之筵粉黛之坐也襄陽元侯聞醉士醉民之稱訂皮子曰子耽飲之性於喧靜豈異耶皮子曰酒之道豈止於充口腹樂悲歡而已哉甚則化上為淫溺化下為酗禍是以聖人節之以酬酢諭之以誥訓然尚有上為淫溺所化化為亡國下為酗禍所化化為殺身且不見前世之飲禍耶路酆舒有五罪其一嗜酒為晉所殺慶封易內而耽飲則國朝遷鄭伯有窟室而耽飲終奔於駟氏之甲欒高嗜酒而信內卒敗於陳鮑氏衛侯飲於籍圃卒為大夫所惡嗚乎吾不賢者性實嗜酒尚懼為酆舒之僇過此吾不為也又焉能俾喧為靜乎俾靜為喧乎不為靜中淫溺乎不為酗禍之波乎既淫溺酗禍作於心得不為慶封乎鄭伯有乎欒高乎衛侯乎蓋中性不能自節因針以自符針曰酒之所樂樂其全真寧能我醉不醉於人皮子少且賤至於食自甘粢糲而已未嘗食於鄉里食於親戚食於州鄙有鄧邑大夫嚮皮子之名曾未相贄具厚羞以賓之皮子辭大夫訂之曰子自甘粢糲則可矣於鄉里親戚州鄙何有皮子曰一杯之食至鮮矣苟專其味必不能自抑既不能自抑日須豐其羞既日須豐其羞則貧也不能無不足因是妄求苟欲之心生窮貪極嗜之名生且大夫不見前世之味禍乎故羊斟不及華元受其謀黿羹不均子家肆其禍熊蹯不熟殺宰夫而趙盾弒雙雞易鶩饋子雅而慶舍死嗚乎吾不仁者乎誠賴其用所欲不可求所嗜不可得方自甘粢糲而已使我生於鐘鼎之家膏梁之門日縱異嗜年成奇欲未必不為御者之奔華元也子家之伐靈公也晉霛之殺宰夫也盧蒲癸之殺慶舍也此猶之禽獸欲爭食而死者矣故食於天子者則死其天下食於諸侯者則死其國食於大夫者則死其邑食於士者則死其家又焉能以鄉里親戚州鄙為讓乎大夫曰善自惟食之性不能自節亦猶酒之性也復針以自符針曰寧能我食不食於人復食於人是食其身六年皮子副諸侯貢士之薦入京程至藍田關覩山形關勢回抱於天秀欲染眸危將驚魄噫將造物者心是而加力耶不然者何壯觀若斯之盛也易曰王公設險以守其國信矣哉若為天下之樞機萬世之閫閾者非茲關而莫守也因陳其規是為藍田關銘曰天輔唐業地造唐關千巖作鎖萬嶂為拴難圖其形莫壯其秀雙扉未開天地如斗軋然畫啓人流如濟似畫秦圖鋪於馬底嶮不可侵惟王之心矧夫茲關獨可規臨隋氏有鼎其器非古以詐為金以賊為鑄以虐火煎四海以毒氣蒸九土天假唐力扛之仁地以澤撲虐火以德銷毒氣既折其足又齧其耳噫戲聖王無畜茲器夫垂後以德者當時逸而後時美垂後以功者當時勞而後時利若然者守道之主惟恐德不美後時逸於己民也夸力之主惟恐功不及當時勞於己民也故天下事不逸不足守不勞不可去致其利害生於賢愚之主自古然耶則隋之疏淇汴鑿太行在隋之民不勝其害也在唐之民不勝其利也今自九河外復有淇汴北通涿郡之漁商南運江都之轉輸其為利也博哉不勞一夫之荷畚一卒之鑿險而先功巍巍得非天假暴隋成我大利哉尚恐國家有淇汴太行之役因獻纖誡是為汴河銘汴河濔濔循禹之軌厥有暴隋鑿通淮泗晝泣疲民夜哭溺鬼似赭流川如松貫地龍舟未故江都已弒陳迹空存逝波不止在隋則害在唐則利嗚乎聖王守舊而已
