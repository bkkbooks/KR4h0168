front:
  text: 全唐文欽定全唐文卷六百八十五湜字持正睦州新安人第進士補陸渾尉仕至工部郎中
  hash: sha256:418390bee28f87c78550e38f87f36f95cbbaa82fff852db2f594f4555d9c0f01
  markers:
  - {type: head, offset: 14, content: 皇甫湜, id: KR4h0168_NFKB_685-h1, level: 1}
body:
  text: 歸去來兮將息我以勌遊日月出入如忽忽然兮何東西南北之悠悠淹踵楚以轢宋幾途梁而軌周旋巴鄧兮結鞅事崤函兮相輈褫予魄於波瀾委予迹於靈邱來默默兮無定徃區區兮曷求朝吾既去夫帝鄉越嵩華而並河經淮水兮凌大江抵揚州之寄家亘年歲以不居謂須臾息足於蓬蝸曾不得暖床之席扁舟渺兮前程途時浩瀚兮月逶迤陟火嶺之峩峩既脫身於水險聊憇美兮雲波彼夷越之都府於滄瀛之曲阿將窮耳目兮又泝東南眇千里兮烟霞閩禺會衝諸海親日飛蟲伏蠆鑠肉消骨溽蒸湫閉浸淫歐鬱城薄沴兮雲生山遇炎兮火出戾止逾月館城之東垣垝肩及庭蕪膝容屋下羅星戶內泠風淖泥淤瀲虺毒陰攻地淹於澤水貴於玉療渴者胝肩趨庭者踵足眠發夕兮反覆坐終日兮拳局念假宿之若狂嗟爾居人兮誰寘於毒駕言出遊期於少蘇烏夷犬戎咽水囂衢狀貌㣥分頭角萬殊渠股反舌蟲聲鬼軀面綠眼青目空目宂遠紆見人驚異直愕不起忽如呵鬬側言真喜腥臊濁澤吹厂墨襲里躬顛僕眩屼然雙止入室何處出門何從冠帶不襲言詞不通茸果卒歲輕葛禦冬朝避天火夕逃海風如何君子棲遲斯邦喟舒息兮無所竮鬱咽兮誰與安讀書之下幃兮樂儒行之環堵苟吾道之無爽又何陋於斯土顧言行之有常雖蠻夷兮可處燕市屠狗趙人博徒絕聖棄智忘貧化麄望見相識聞聲來趨時與追隨聊須臾雲盎盎兮雨紛紛夜明月而不見人情眷戀於江介夢綢繆於渭濱公孫遊兮蓮勺尼父聘兮蔡陳一困身於王者一固窮兮聖人思九州之博大胡自陷於斯民盍歸來兮無自苦恨傷獨孤者傷君子也蓋傷君子有道而無命也河南獨孤申步勝冠舉進士博學宏辭登科典校秘書不幸短命無後其人也君子也天厚之才而嗇之年又亡其家傷哉余獲知於君也久而叨磨漸之益焉不幸淪喪所知追想其人作賦傷之也惜逝者之日遠兮心隱憫而內傷顧來者之不可與期兮云誰嗣子之芬芳思夫君之好修兮企千載之相望紆文章於六經兮儒林為之有光何事業之始酣而志力之方剛宜盛德之日新俾滋大而熾昌飛霜肅其早零兮意慘慘而不長俄銷鑠以委絕兮還四氣之無當謂明神正直兮始吾以為信然天賞善而聽卑兮吾乃今知其過之必夷夷而長久兮蹇煩遠而歷茲斯美人兮下泉雖為芳蘭兮誰與佩之追徃日之謌懽兮曾宿息而不離我不見其幾何兮殄七日而及斯涕浪浪以相接兮痛湛湛而不移謂陽光而烜燎兮遽蔑爾其焉之或左右之歔欷兮若感慟兮虛儀懷玉音之清泠兮佀屬耳而依依嗟眷想之若存兮竟天地而長辭願一撫而無孤更出涕而淋漓聞古人所孜孜兮貴身沒而名存顏冉不登下壽兮無百里而愈尊齊梁趙楚之君非不富且貴兮人不得而稱之嗚呼自古而固然兮予何歎乎今人昔劉伶作酒德頌以折搢紳處士予嘗為沈湎所困因作醉賦寄任山尹君君嗜此物亦以警之爾沈湎於酒有晉之七賢心遊於夢境墮於烟六府漫漫四支綿綿逶隨真淳陶和渾鮮遺天地之濶大失膏火之燒煎寂寂邈邈歸根復朴居若死灰行猶飄殼車屢墜兮無傷衣鎮濡兮不覺機發而動魂交而瞑合文子之淳味反騷人之獨醒曾不知其耳目尚何懼於雷霆寓四體之合真歸一元而太寧麴蘖既散竹桂滋已百慮森傷七情紛始風飄火爇矜夸跱跂嗟海鳥之聚還顧息肩兮未幾蘇門子聞而笑之曰子之於道其猶醯雞歟彼至仁者之於天地根性命於虛無拂披聚散脫遺寰區形猶大象心冥太初故大道不失而至道可居也今乃假荒惑之物沈耳目之機其解須臾憂恚繁滋中心不可捐外患生於時為疹為毒為狂為醨負責人道陰陽戾違束乎巫醫敺乎有司辱身滅名痿肺淫支狼狽顛蹶為人大嗤不得盡年玉色先衰曾不知都無醉時使人困苦兮如茲㣥雞兮喧卑獨鶴兮超特何靜躁之殊致顧仙凡之異德今乃同處斯為失職恃軒昂之貌棲恥鑿垣抱清迥之心餓羞爭食恐沈於眾何德之孤志在寥廓跡依泥塗戀祥雲於紫蓋憶仙馭於清都處眾而將齊一鶚離㣥而每羡雙鳧孰曰其微易散茲乃實繁有徒在識家而競入悲得食而相呼憂心悄悄慍于㣥小憇霓裳於永夜鮮玉羽於清曉思太湖之澡刷念秋漠之清矯涅而不緇素以為表寂寞清唳依違馴擾同李陵之入胡滿目異類似屈原之在楚眾人皆醉或振羽以將鳴或峩冠而瞪視囂囂煩耳紛紛撲地安知警露之質豈識凌雲之意獨立不懼誠則莫之與京碩大無朋所謂拔乎其萃何憂乎彼衆我寡而患乎去同即異慘澹無色低徊不平困眼前之擾擾哀足下之營營動必以誠鄙度關之詐戒之在鬬非擅場之名誰恤大以舍小念彼濁而此清和而不同卑以自牧動憂違衆居常慎獨彼雖距似金形似木終羞與噲等為伍孰慮夫下交之瀆是宜翔金穴集芝田冀松喬於碧落侶鸞鳳於紫煙而乃忽齒陋質於階下混庸衆於君前惆悵非所昂藏自賢顧彼雞矣相㣥若是多多益辨兩兩而比自謂鳥中之賢且具天下之美與之遊息甚可嗤鄙每戒比之匪人常恥獨為君子時乎有在物不終否爾惡能浼我哉吾當一舉千里冰之積也不厚人之履也難任此焉投足可為寒心彼墊溺之攸慮在恐懼而誠深慎同數馬之人然非萬石誡若倚衡之子不以千金水始凝冰未壯乏六尺之為厚非七月之所尚螽斯之股兮猶且不同齊人之紈兮曾無以况雖鞠躬而欲涉何跬步之能抗有同居累卵之危無殊坐積薪之上股粟兮在茲魂驚於所之怵惕求前豈人心之難測趦趄有畏類狐性之多疑每縮縮而若墜常兢兢而自持與巢幕兮焉比將臨泉兮是擬丈夫不處斯畏其沒身夫子所懲不惟於滅趾徐子忘其故步尚書越其素履行自失於佻佻舄無施於几几視之豈無履而若虛非北陸積堅之始是東風初解之餘水蟲隔而纎鱗必露秋蟬比而輕翼不如當履道未成其難汔濟縱善行無跡不可躊躇兢慎圖其不敗震懾謂其將壞步搖搖爾式彰君子之行身飄飄然誰謂邑人不戒如何克已若此履冰與習坎而相類符執玉而可懲故疊足是虞側身以進言忘足履之適自近廉隅庶幾心腑之中無貽悔吝得過隕易危之吉靡濡首失容之釁行之止於三思戒實先於六慎有珍禽兮在南土金碧其容質蔽芾其毛羽翫夫色必自鑒以呈形愛其儀故乃見而屢舞從裔壤貢丹墀未識僛僛之狀徒觀采采之姿是詢孺子爰發此思知照水而自窺尚且心乎愛矣俾對鏡而言舞不勞歌以送之於是爛出雕籠鶯成綺翼奇章若繢翠彩如織瞥然影起乍躞蹀以多姿歘爾形分遂蹁躚而可則苞七步之節奏備八佾之程式俄俯仰乍逡巡透雪彩而姿逸洞銀華而色新錦臆雙呈因疑其若合花毛兩向未知其孰真視月中兔形自隱窺臺上鵲影慙陳駭目自遺百戲忘餐奚顧八珍對百鍊而流睇翻五色而交麗異巴渝而折旋類夏采而行綴搖金距非知善鬬所為轉朱身庶與來儀相契方激昂而匪懈將偃仰而增銳誰云不節之儀式表能勤之繼映朱光而影耀射金景而私照兩邊而分寸不差一體而纎毫必肖類鳳因簫感哂鶴為琴召豈假為冠於漢然仰我威容不同似木於齊方稱乎觀妙宜其鸞回於綺殿雪落於青瑣雖自好而則然必假鑒而獲可變態盡其妍不曲折擬諸形容幸無私於一照庶餘光而可從問曰蓋聞昔之令主體上聖之資御大寧之時猶懼理之未至也求賢以致用猶懼動之不中也咨諫以聞過矧維寡昧膺受多福思負荷之重警風波之虞求賢咨諫豈敢怠忽至若窮神知化以盛其德經武緯文以大其業考古會極通教化之源明目達聰周視聽之表斯夙夜之所志也子大夫何以匡建而致之乎自中代以還求理者繼作皆意甚砥礪而效難彰明莫不欲還朴厚而澆風常扇莫不欲遵儉約而侈物常貴莫不欲遠小人而巧諛常進莫不欲近莊士而忠直常疎莫不欲勉人於義而廉隅常不修莫不欲禁人為非而抵冒常不息其所謬盭豈無根源爰自近歲仍敷大澤霜露所墜霑濡必同滌瑕穢以導人心省徭役以豐物力蠲田租以厚農室葺國學以振儒風督廢職以振綱維備衆官以序賢俊庶繼先志臻於治平而改行者未聞輸勞者未艾農者無以免艱食學者無以通微言立事之績未紀於庶功乏才之歎未輟於終食蠧於法者無不去而法未修明切於政者無不行而政未光大豈丕變其俗道廣而難濟乎豈不得其門事繁而愈失乎佇聞嘉言無或隱諱周之受田有經制漢之名田有恒數今疆畛相接半為豪家流庸無依率是編戶本於交易焉奪富以補貧將欲因循豈損多而益少酌於中道其術如何取人唯其行不必文采命官唯其才不必資考然則行非造次而備察才非錯綜而徧知不必文采為輕重而士可進退不必資考為程準而吏有條貫適變矯枉渴於良規何方可以序六氣來百祥何施可以壽㣥生仁衆姓徵於前訓而有據議於當代而易從勿猥勿并以稱朕意對臣伏見陛下徵天下之士親策於庭求賢思理亦云至矣然臣未知將以為虛策乎將以求實效乎以為虛策則後之搢紳者觀書於太史氏曰天子之憂人如此急賢如此徵賢良方正直言極諫之士親禮而問之斯亦足以為名矣若以得人為務社稷之計為心則不宜待之如是也夫王者其道如天其威如神以聘問先之以禮貌接之造膝而言虛心以受猶恐懼隕越而不得盡其所懷况乎坐之階庭試以文字拳曲俯僂承問而上對乎且天下之事難一二以疏舉臣所當言又有非臣下所宜聞知清問所不說又鬱而不得發彊附之於篇考視者必以為餘煩又擯而不得通矣陛下何惜一賜臣容足之地於冕旒之前使得熟數之乎可採則行之無用則罷之何損於明也然臣不敢有望於是謹旁緣聖問粗竭愚瞽儻陛下憐察其志而其誅賜之異日之問而卒其說則覆照之下形氣之生孰不幸甚制策曰蓋聞昔之令主體上聖之姿御大寧之時猶懼理之未至也求賢以致用猶懼動之不中也咨諫以聞過矧唯寡昧膺受多福思負荷之重警風波之虞求賢咨諫豈敢怠忽至若窮神知化以盛其德經武緯文以大其業考古會極通教化之源明目達聰周視聽之表斯夙夜之所志子大夫將何以匡建而致之乎此陛下之憂勤切至也臣聞堯舜以天下為已憂而未以位為樂也臣又聞百事之成也必在敬之其失也必在慢之今陛下念前王之戒而不敢怠忽思為國之經而不忘夙夜求賢咨諫延及微賤臣有以見堯舜之心矣夫法天地之道以施政順陰陽之和以育物事無不序動無不時此窮神知化之盛德也武以止殺禁暴則兵宜戢文以經邦致明則化必行此經武緯文之大業也崇禮而明義好士而尊儒斥魏晉己降衰末之法稽周漢以前盛明之禮斯考古會極之方也任賢而勿貳招諫而必行屏近習之纎佞進周行之骨鯁斯明目達聰之道也抑臣又聞先王所以不視而明不聽而聰披頸負之萌斷非僻之緒其義易知也蓋左右僕御唯正之供必有足信者必有知禮者出使足以盡情偽居常足以助聽覽左右之臣既如是矣而又日與公卿大夫講論政事史書其舉官箴其闕以至於百工庶人莫不諫而謗焉濟濟多士為之股肱赳赳武夫為之爪牙茲所以永有天下也今宰相之進見亦有數侍從之臣皆失其職百執事奉朝請以進而律且有議及乘輿之誅未知為陛下出納喉舌者為誰乎為陛下爪牙者為誰乎日夕侍起居從遊豫與之論臣下之是非賞罰之臧否者復何人也股肱不得而接何疾如之爪牙不足以衞其危甚矣夫裔夷虧殘之微褊險之徒皂隸之職豈可使之掌王命握兵柄內膺腹心之寄外當耳目之任乎此壯夫義士所以寒心銷志泣憤而不能已也誠能復周之舊典去漢之末禍還諫官史官侍臣之職使之左右前後日延宰相與論義理有位於朝者咸引而進之溫其色以安其意久其對以進其詞可採者必行有犯者無罪王之爪士宜擇公卿大臣總統而分理之則政不足平刑不足措人不足和財不足豐蠻夷戎狄不足臣休徵嘉瑞不足致矣又何慮乎視聽之表有所不周乎制策曰自中代以還求理者繼作皆意甚砥礪而效難彰明莫不欲還朴厚而澆風常扇莫不欲遵儉約而侈物常貴莫不欲遠小人而巧諛常進莫不欲近莊士而忠直常疎莫不欲勉人於義而廉隅常不修莫不欲禁人為非而抵冒常不息其所謬盭豈無根源者臣聞一日克已復禮天下歸仁焉王者之謂也故人不從上之令而從其所行夫上古之君躬率以正軌度其信恕已及物自誠而明此其所以其化如神天下如截也中代以還則異乎此至誠不著而欲任法以防人忠恕不行而欲縱身以檢物雖砥礪其意而事實不符此所以有其意而無其效也夫欲人之朴厚而不先之以少私寡欲無為至誠所以澆風常扇也欲人之儉約而不率之以卑宮菲食沈珠貴穀所以侈物常貴也欲遠小人而好悅耳之言所以巧諛常進也欲近莊士而惡咈口之慮所以忠直常疎也欲勉人於義而貪濁在位所以廉隅常不修也欲禁人為非而法制不一所以抵冒常不息也則謬盭之本其在茲乎陛下誠能一皆反之其效可立彰明矣制策曰爰自近歲仍敷大澤霜露所墜霑濡必同滌瑕穢以導人心省徭役以豐物力蠲田租以厚農室葺國學以振儒風督廢職以補綱維備衆官以序賢俊庶繼先志臻於治平而改行者未聞輸勞者未艾農者無以免艱食學者無以通微言立事之績未紀於庶工乏才之歎未輟於終食蠧於法者無不去而法未修明切於政者無不行而政未光大豈丕變其俗道廣而難濟乎豈不得其門事繁而愈失乎佇聞嘉言無或隱諱者臣以陛下滌瑕穢而改行未聞正言不自其本故也夫欲人之改行率德在明賞罰不在滌瑕穢也故賞當善罰當惡天下曉然逃惡而趨善賞當功罰當罪天下聳然遠罪而趨功則人自為理而上無為矣此堯舜之所以利天下也夫賞罰者報也賞之失稱罰之不當咎孰甚焉伏見兵興以來開權宜之道行苟且之政臺省之官王公之爵溢於州郡徧於輿臺將帥之臣借緋紫於使令定官員而奏請名器輕於土芥操柄擅於爪牙此其所以賞人而人不勸也州縣之斷獄月以千數連年累紀未聞有一疑獄而决於朝者未聞有一屈人而訴於闕者豈天下長吏盡如臯陶哉律令格式具而不遵鄉縣州府各自為制所怒則專殺為常臆斷則自生愚意且欲人知所避而能自達不其難乎况乎賦役之不恒衣食之不足尚不懼死焉能避罪此其所以罰人而人不沮也賞之不勸罰之不沮欲人改行其或難焉雖滌其瑕穢惠奸貸法而已又何為也伏惟陛下慎用賞賞必當功則天下之善勸矣慎用刑刑必當罰則天下之罪沮矣夫擇人而用之則僭濫不作審人而赦之則廉恥自生如是則無所改其行無所滌其瑕矣又何足憂之陛下省徭役而輸勞者未艾小惠未徧而有司長吏或壅而未承故也若陛下加惠而俯察之則物力何懼乎不豐勞者何憂乎未艾陛下蠲田租以厚農室而人猶艱食者生者猶少而費者猶多故也商乘堅而厭肥工執輕而仰給兵橫行而厚祿僧道無為而取資勞苦頓瘁終歲矻矻濱於死而為農者亦愚且少矣况乎兩稅不均失變通救弊之法百端橫賦隨長吏自為之政乎若均工商老釋之勞逸輕田野布帛之征稅蠲橫暴之賦减鎮防之兵則耕者如雲積者若山矣臣請再為陛下精言之夫賤珍奇之貨斥雕琢之淫則工商之道自息矣黜異端之學使法不亂而教不煩則老釋之流當屏矣且天下所以葸葸然者豈非以兵乎使稅之厚人之屈而不可蠲復者豈非以商乎今昆夷未平邊備未可去中夏或虞鎮防未可罷若就其功則莫若減而練之也今之將帥勝任而知兵者亦寡矣怙衆以固權位行賂以結恩澤因循鹵莽保持富貴而已豈暇教訓以時服習其事乎今若特加申令使之教閱簡奮勇秀出之才去屠沽負販之黨則十分之士可省其五矣多而無用曷若少而必精乎又若州府虛張名籍妄求供億盡設其給以豐其私今若核其名實糾以文法則五分之兵又可省其半矣夫眾之虛曷若寡之實乎一則以強兵一則以寡賦若江淮州郡遠寇戎屬清平自非具使令備儀注者一切可罷以其經費代征徭蕩逋懸然後慎擇長吏曲加綏撫不四三年而家給人和則橫暴不作賦斂自均至理而升平矣尚何虞於人猶艱食乎陛下葺國學以振儒風而微言猶鬱者蓋其所由干祿而得仕者以章句記讀而不由義理故也若變其法則可以除其弊矣陛下督廢職以補綱維而立事之績未紀於庶工者實有司之臯也今職備而不舉法具而不行諫諍之臣備員不聞直聲彈察之臣塞路未嘗直指公卿大夫則偷合苟容持祿養交為親戚計遷除領簿而已興利之臣專以聚斂計數為務共理之吏專以附上剝下為功習而為常漸以成俗標異而圭角者悔吝立及和光而淈泥者富貴立須雖陛下焦勞聰明如此之切至將何益焉伏請下明詔為畫一之法使居是官理是人奉是法者必有名績然後許遷擢攷功之殿最焉敢阿比而干刑司則能者日進不能者日退而庶工立事之績將褒揚紀述之不暇矣陛下備眾官以序賢俊而乏才之嘆未輟於終食者由在上者遷之太亟在下者刻之太深故也古之取人也拔十得五猶以為多曲輪直桷各適其用今則不然舉於禮部則曰幽昧者凡陋而不可採選於吏部則曰聲名者虛浮而不可用工文者則懼華而不實敦質者則懼朴而寡能冠蓋之族則以為因依微賤之人則以為幽險上求之愈切下損之彌細夫士何負於有司而乃蹇頓之抑刻之如是哉才能如積抑鬱在下一朝闕輔相之職卿大夫之官不得則曰岳不降神時之乏人於是循環其所己用者遞遷居上者不知格限無聞聲績或一時超拜或再歲四遷以是為適當然耳是仕進之門常闔而天子之官天子之權當途者五六人迭居持之而已以陛下之明聖夫豈不欲國之得人乎以宰相之公忠夫豈不欲人之足用乎蓋從來已久因循如是耳伏惟陛下申勅朝廷州府令每歲各舉所知於禮部禮部於計偕常選之中訪察推擇得其人則待以不次之位遇以非常之恩不得其人則必行殿罰以懲踰濫則周之以寧舜之以封坐而致矣乏才之嘆何有於聖朝哉陛下謂蠹於法者無不去而法未修明切於政者無不行而政未光大者由有司長吏不得其人也捨人務政雖勤何益臣伏見赦令節文周備纎悉空文虛聲溢於視聽而實功厚惠未有分寸及於蒼生聖德不宣王澤不流雖陛下寤寐思理宰相憂勤奉職又何為也夫將直其枝必正其根朝廷乃根也州郡乃枝也今朝廷之號令有朝出而夕改者矣主司之法式有昨破而今行者矣伏惟陛下正綱以張萬目澄源以清萬派則四方大幸矣由是言之非道廣而難濟事繁而愈失也實承詔將事者之罪耳制策曰周之受田有經制漢之名田有恒數今疆畛相接半為豪家流庸無依率是編戶本於交易焉奪富而補貧將欲因循豈損多而益寡酌於中道其術如何者臣聞古之道不可變也古之法不必行也夏之桀殷之紂周之幽厲井田法非亡也而天下大亂我太宗元宗井田法非修也而天下大理夫貞觀開元之際不受田而均不名田而贍者朝廷正法令行一人之寃得以聞一吏之犯得以誅由此致也是政之舉化之成則田自均人自贍而天下陶然化矣豈待曲吏而事為乎其與貞觀開元非異時也法苟未行人苟失職徒易其制更其業擾人斂怨而已耳制策曰取人唯其行不必文采命官唯其才不必資考然則行非造次而備察才非錯綜而徧知不以文采為重輕而士可進退不必資考為程準而吏有條貫適變矯枉渴於良規者今之取士以文字記讀為法其素履實行則無門而知使由文字而進者徃徃犯姦贓為梟獍以成其弊也乾元以還版籍斯壞所在游寄莫知從來伏惟勅天下人士未歸者一皆復貫願留者則令著籍置鄉校縣學州庠以教訓其子弟長育其才自鄉升之縣自縣升之州自州升之禮部公卿子弟長於京輦者則使之必由太學然後登有司如是其幼弱其壯老發言舉足云為進取可得而知矣然後參以才藝試以器用誠取人之急務伏惟陛下裁之若資考之限其章句之庸才資蔭之常調者仍宜舊貫賢能之士則行臣嚮者之謀從有司長吏之舉其賞必行其罰信焉可也制策曰何方可以序六氣來百祥何施可以壽㣥生仁衆姓徵於前訓而有據議於當代而易從勿猥勿并以稱朕意者臣聞古者山林藪澤皆有時禁動作之為無差月令則六氣以序百祥以來而生生之類莫不躋仁壽之域矣今捨此而不務殺胎毀卵傷仁撓和而奉胡夷之法以正月五月九月斷天下之屠欲蕃物產而祈福祐斯亦無謂矣伏惟陛下動遵月令前訓可據之文也事稽時禁當代易從之道也施之而不已執之而有恒則帝皇之美遠慙於今日矣臣謹對居蓬衣白之士所以勤力苦心矻矻皇皇出其家辭其親甘窮餓而樂離別者豈有貳事哉篤守道而求知也有位之人所以休聲茂功鑠光保大不絕勳而窮名者亦無異術焉樂育材而得人也人無所知雖賢如仲尼窮死而道屯况其下者乎未得其人雖聖如唐堯水不抑而凶未去况其下者乎故上之於人下之求知相須若此之急而相得若此之難者何也蓋以在位者居高而聽深在下者行卑而迹賤其事勢不同出處相懸故也况乎上之人負其位不肯求下之人負其才不肯屈此其所以相須若此之急相得若此之難也湜自學聖人之道誦之於口銘之於心徒恨今之人待士之分以虛華而已今之士望人之分以毫末而已上下相鼓波流相翻抱特行者混衆人抱奇才者乏卓識智與愚相混古之道不行是以役役棲棲獨鬱鬱而無語竊以閣下以周召之才居周召之職獨智傑出孜孜以下問收接而博觀自江而西沈潛液澤傳之天下汪洋喧鬧是以發憤而來非有他也欲以望閣下之輝光窺閣下之深高下靡豪傑之風以快平生之心耳伏惟降其尊嚴而省覽之裁其可否而去就之無以淺微察其辭觀其志而不錄其辠幸甚謹獻舊文十首以先面贄干犯左右惶懼於旌門之前臣聞一人莫非王臣尺土莫非王有山川林藪之所產殖雨露春秋之所成就莫非王材誠宜推至公以示無外今國家既有公府又為私藏使州郡貢賦之外進奉相及恐非以天下為家示天下無私之道也且任土之貢生產有常履畝之收等籍既定人識所出吏難為姦進奉既無程度莫知紀極恣橫徵發因緣贓私驅陛下赤子措之不存之地侈君之嗜慾惑君之聰明實大姦之門大罪之竇也臣雖熟知陛下上聖之姿深仁之理凡內藏之實以充讌賜非務積藏如四遠未知何如百姓受弊何如後嗣平中之主由此而傷儉德萌侈心何雖漢有少府水衡筦榷山澤之利終不若領之於大農也且地之財無盡王之用不會何必固之內府以開濫關耶伏望陛下罷內藏歸之公府約別進合之古制徵斂有常財用無虧絕姦之根源除政之粃蠧全大體興大和天下大幸伏見正月十一日赦書陛下深念疲人懇責貪吏徃之隨使貢來一皆罷之此實白日之明層雲之澤也凡諸州府必有羨餘不歸之王廷必沒於私室伏請每使當罷必上其數而謹其收水旱之不虞疾疫之不期以振罷羸以代蠲免軍旅之事工役之用以給其費以供其須居常之歲閉藏以待時無敢散洩而干刑司如是則大賚於人大伸於用矣辱書適曛黑使者立復不果一二承來意之厚傳曰言及而不言失人粗書其愚為足下答幸察來書所謂今之工文或先於奇怪者顧其文工與否耳夫意新則異於常異於常則怪矣詞高則出於眾出於眾則奇矣虎豹之文不得不炳於犬羊鸞鳳之音不得不鏘於烏鵲金玉之光不得不炫於瓦石非有意於先之也迺自然也必崔嵬然後為岳必滔天然後為海明堂之棟必撓雲霓驪龍之珠必錮深泉足下以少年氣盛固當以出拔為意學文之初且未自盡其才何遽稱力不能哉圖王不成其弊猶可以霸其僅自見也將不勝弊矣孔子譏其身不能者幸勉而思進之也來書所謂浮艷聲病之文恥不為者雖誠可恥但慮足下方今不爾且不能自信其言也何者足下舉進士舉進士者有司高張科格每歲聚者試之其所取迺足下所不為者也工欲善其事必先利其器足下方伐柯而捨其斧可乎哉恥之不當求也求而恥之惑也今吾子求之矣是徒涉而恥濡足也寧能自信其言哉來書所謂汲汲於立法寧人者迺在位者之事聖人得勢所施為也非詩賦之任也功既成澤既流詠歌紀述光揚之作作焉聖人不得勢方以文詞行於後今吾子始學未仕而急其事亦太早計矣凡來書所謂數者似言之未稱思之或過其餘則皆善矣既承嘉惠敢自疎怠聊復所謂俟見方盡湜再拜湜白生之書辭甚多志氣甚橫流論說文章不可謂無意若僕愚且困迺生詞競於此固非宜雖然惡言勿從不可不卒勿怪夫謂之奇則非正矣然亦無傷於正也謂之奇即非常矣非常者謂不如常者謂不如常乃出常也無傷於正而出於常雖尚之亦可也此統論奇之體耳未以文言之失也夫文者非他言之華者也其用在通理而已固不務奇然亦無傷於奇也使文奇而理正是尤難也生意便其易者乎夫言亦可以通理矣而以文為貴者非他文則遠無文即不遠也以非常之文通至正之理是所以不朽也生何嫉之深耶夫繪事後素既謂之文豈苟簡而已哉聖人之文其難及也作春秋游夏之徒不能措一辭吾何敢擬議之哉秦漢以來至今文學之盛莫如屈原宋玉李斯司馬遷相如揚雄之徒其文皆奇其傳皆遠生書文亦善矣比之數子似猶未勝何必心之高乎傳曰言之不出恥躬之不逮也生自視何如哉書之文不奇易之文可謂奇矣豈礙理傷聖乎如龍戰於野其血元黃見豕負塗載鬼一車突如其來如焚如死如棄如此何等語也生輕宋玉而稱仲尼班馬相如為文學按司馬遷傳屈原曰雖與日月爭光可矣生當見之乎若相如之徒即祖習不暇者也豈生稱誤耶將識分有所至極耶將彼之所立卓爾非強為所庶幾遂讐嫉之耶其何傷於日月乎生笑紫貝闕兮珠宮此與詩之金玉其相何異天下人有金玉為之質者乎被薜荔兮帶女蘿此與贈之以芍藥何異文章不當如此說也豈為怒三四而喜四三識出之白而性入之黑乎生云虎豹之文非奇夫長本非長短形之則長矣虎豹之形於犬羊故不得不奇也他皆倣此生云自然者非性不知天下何物非自然乎生又云物與文學不相侔此喻也凡喻必以非類豈可以彈喻單乎是不根者也生稱以知難而退為謙夫無難而退謙也知難而退宜也非謙也豈可見黃門而稱貞哉生以一詩一賦為非文章抑不知一之少便非文章耶直詩賦不是文章耶如詩賦非文章三百篇可燒矣如少非文章湯之盤銘是何物也孔子曰先行其言既為甲賦矣不得稱不作聲病文也孔子曰必也正名乎生既不以一第為事不當以進士冠姓名也夫煥乎郁郁乎之文謂制度非止文詞也前者捧卷軸而來又以浮艷聲病為說似商量文詞當與制度之文異日言也近風教偷薄進士尤甚迺至有一謙三十年之說爭為虛張以相高自謾詩未有劉長卿一句已呼阮籍為老兵矣筆語未有駱賓王一字已罵宋玉為罪人矣書字未識偏傍高談稷契讀書未知句度下視服鄭此時之大病所當嫉者生美才勿似之也傳曰惟善人能受盡言孔子曰君子無所爭必曰射乎問於湜者多矣以生之有心也聊有復不能盡不宣湜再拜湜白時論所以難在諭其本而善守之使千流萬轉不遷於末則蕩而失其憒眊無睹囂囂相訾何所得哉始與生言奇不言正也故論止於奇生以正抑其奇然後參正流焉譬與生說先牛馬以說駱駝而非云也云以無傷於正猶易之凡言無咎本皆有咎此未了也易之無咎不一本有咎由慎故免亦曰咎自巳招不可咎人亦曰義生以凡目之當是讀書未熟自僕云無傷也生言非常之物如何得常故當爾也所以千年聖而愚比肩也生言天象形象非常者皆為妖妄如天出景星地出醴泉蓋非常謂之妖可乎假如妖星熒惑天所常懸牛溲馬勃地所常有足尚乎生何窒生以松栢不艷比文章此不知類也凡比必於其倫松栢可比節操不可比文章大人虎變君子豹變此文章比也有以質為貴者有以文為貴者引茅屋越席易黼藻元黃之用可乎生云奇與易作者何別在所為耳請考之於實生為易矣試為僕作難者視何如相如揚雄也恐生乃不能非不為也楚詞史記太元之不朽也豈為資笑謔乎哉如鳥鵲啁啾聲斷便已人如不聞爾何足貴也所言詩書之文不奇舉多言之也易處多奇處少爾易文大抵奇也易處幾希矣孟子常引詩云周餘黎民靡有孑遺豈周遂不遺一民哉僕之言猶是生云知難而退為謙是知不可取然後止非可取而不取也菽麥異生而師惑之何哉生之師且惑菽麥生卷中文能囊包天地耶此不遜悌之言吾不信也詩載臣之譏君曰嗚呼小子未知臧否非面命之言提其耳此過於以時奉譏也詩人尚不聞得罪生何諱之深乎易曰匪我求童蒙童蒙求我生奉書相干宜有答也又再三瀆瀆則不告也韓退之復張籍書曰頑然不入者親以言諭之不入則其觀吾書固將無所得矣生勗之而已湜求聞來京師三年矣一年以未成顛蹶二年以不試狼狽及今三年而不遇有司且夫以方輪鹿軸而求疾驅迅馳祗足見其坎坷杭杭輗款而來不安未見其能取一也退則惟其初未通人事謂人之得失或為在已始求賓興眼中始無人而心巉然謂其天下公議可抵而掇也律身以古人而不知時凡所出行動與今戾其所聞見可揭而行也是以矜勢自取窮辱不能展轉其心乃於再三夫如是可以怨天耶尤人耶罪時耶縱橫耶反覆耶無所歸適乃幡然復故即日貧策羸而歸將復愚見自鈍唫於數晦永無夸人之望出潼關歷峽游洛順河而東一路逢識友為道所歸者其疎者口余親者面余咸以為年未勝冠當役力於名達銳心於取進而遽以行止為論是為佻薄為太早計謀進而黜退而不能以為年之少得失未可知不可當遽歸何言止耶則顏子當奔驅進取不宜遽安一室閒而樂也然而顏子安之者時也以為老而將亡然必當止耶則太公當幽潛伏死不宜復出磻溪而干文王也然而太公干文王者時也夫行止何惑哉不先時而已矣又有以榮為諭者是又不然以所聞所得之道在於我者也故不由其道矣雖富而貴為辱滋甚顧吾道何如哉必富貴而後榮是秦齊梁楚之君當與大舜侔曾參不得為孝猗頓動天地矣且今之取進者曲拳折人非以為屈疾趨卑拜非以為沖妄歸聽以拘錄細計騁門室之辨鈞色適之欲以入其身必見以為恭低顏以為惡且悅其所為容焉必以在乎㣥萃默其口而止蓬其外而起理吾盡知之矣然而未言道吾盡知之矣然而未行不必為粹深淺慎且不測其所為與焉必下矣與其上援之聲與力拔與雙疊登而取階崇而級厚頤然不知羞偃然如固有之其所為然也且直已行道之人常其禮貌定其交際身不以形勢屈口不以觀望柔行特其拂心言苦而倒耳是之則受非之則辭惟道所存矣夫順人之與拂其人也豈不懸哉必怒其所為矣在於㣥萃之秀出心畏所加識之高下目之所取動而正則枉者嫉為而是則非者形默則相忌云則不合如是而求志之得道之光德之貴名之白聲之充難矣固當决鬱而未通密塞而無歸浪滂而不救亦其所為然也語曰陳力就列不能者止傳曰見險而能止者知矣哉困則知變窮則思反必之後圖余懼其無所為及也行當持手於窮澗貫利瀕江穀土練麻而養逍遙溫飽期不失其所以為心而已自外皆休請矣人心為何如也夫窮與達非其相反皆繫於所遭今達而光吾師禹臯陶窮而獨善吾師顏子窮哀天下負其道以轘軫諸侯以全仁義吾師仲尼古聖人迹之得失何殊未全聞彼泰其心此改其樂也故士無遇不遇視其時當其道不失其已百經怪時董生之賢乃賦士不遇司馬遷又從而悲之離騷之文又大於哀自非邇聖人必有偏而不起之弊耳比有城游郡而處其相知心者不一二其餘面而已是以憤懣而誰說意氣不得泄今又遠去江南若復默口將懼無復故出興舒疊僂指而質言之不慙亦唯子之故也
