front:
  text: 全唐文欽定全唐文卷七百李德裕五
  hash: sha256:2e5099b2713b7df5ba55b71d01fff32096657b0e16685ef5fc8934c0cfd1ab9c
body:
  text: 近數得邊將奏報知卿等本國自有離亂可汗遇禍雖未悉虛實良深震悼我國家與卿等本國代結姻好久為親戚協德同心常為諸蕃所羡故得邊候不聳封疆晏然卿等忽領師徒漠南屯集又數至天德侵掠頗擾邊人聚師無名忠義俱失既乖舊好良用憮然若卿等本國所立新主非可汗至親人心不從擾亂未定卿等只合自申方畧竭效忠誠安靜本蕃以圖勳績亦合遣使告朕具述此心若新立可汗是中國至親人已歸附卿等便合早自相率保國寧家與可汗協心以修舊好豈得寄命塞上久勞師人朕緣與卿本國情義至深事同一體又緣公主在彼未知存亡故遣使臣魏謩往諭朕意卿宜備陳誠欵不得虛詞兼禁戢師徒勿為侵軼近聞天德遊奕軍將曾有交鋒卿等既犯塞垣亦是邊將常事今已各令諸鎮不許交兵卿宜曉諭部落各令知悉皇帝敬問紇扢斯可汗時屬載陽想彼休泰朕撫臨萬㝢子育㣥生思致洽和用臻至理將軍踏布合祖等至鑒表具知可汗生戴斗之鄉居寒露之野智謀精果材志沉雄威動龍荒聲馳象魏眷言丕績深用注懷我太宗文皇帝聖德高於百王英材軼於千古內定諸夏外服百蠻貞觀四年西北蕃君長詣闕頓顙請上尊號為天可汗是後降璽書西北蕃君長皆稱皇帝為天可汗臨統四夷實自茲始暨貞觀六年太宗遣使臣王義宏至可汗本國將命鎮撫貞觀二十一年可汗本國君長身自入朝太宗授左屯衞將軍堅昆都督至天寶末年朝貢不絕則可汗祖先已受我國家恩德計可汗國中遺老必自流傳朕纘奉丕圖思申舊好比聞天寶以後為回鶻所隔久阻誠回鶻自謂天驕罔修仁義肆行殘忍凌虐諸蕃知可汗代為仇讐果能報復滅其國邑皆已立君驅彼酋渠盡逾沙漠茂功壯節近代無儔回鶻當中國伐叛之時嘗展勳力列聖嘉其大順累降姻親今失國亡逃寄於塞上只合早歸窮受朕撫循而乃轉自鴟張益懷狼顧在陰山之外誘惑小蕃乘我無虞即來侵掠恣為邊患今已四年朕大徵甲兵久欲除剪比令幽州太原兩道節度使皆充招撫以示綏懷望其悛心猶務含育而凌蔑公主頻擬傷殘馳突邊城敢謀盜竊近太原節度使劉沔不勝其忿潛出偏師乘其譸張使襲牙帳虜眾大潰穹廬盡焚元惡傷殘脫身潛竄已取得太和公主即至闕庭回鶻殘兵不滿千人散投山谷旬日之內必合梟禽朕再見公主良用欣慰可汗既為讐怨須盡殲夷倘留餘燼必生後患想遠聞慶快當愜素心聞可汗受氏之源與我同族漢北平太守材氣天下無雙結髮事邊控弦貫石自後子孫多習武畧代為將門至嫡孫都尉提精卒五千深入大漠單于舉國來敵莫敢抗威身雖陷沒名震蠻貊我國家承北平太守之後可汗又是都尉苗裔以此合族尊卑可知昨聞太和公主為可汗兵眾所得可汗以同姓之國使遣歸還有以見可汗秉禮義之心重親隣之好朕深用感嘆至於涕零公主尋為回鶻刼奪久不歸國可汗所遣使臣皆被誅戮朕言念傷痛至今不忘昨見可汗表求訪公主使公主上天入地必須覔得今邊將憤惋已立奇功回鶻罪人計日可致即當顯戮以謝可汗况回鶻夷滅種族必盡與可汗便為鄰國各保舊疆繼好息人事同一體從此邊陲罷警弓矢載櫜必當諸部服從皆懷健羡知我兩國永為宗盟想可汗明智自有良算故令太僕卿兼御史中丞趙蕃持節充使以答深誠質於神明用存大信朕言不貳可不勉歟又自古外蕃皆須因中國冊命然後可彈壓一方今欲冊命可汗特加美號緣未知可汗之意且遣諭懷待趙蕃回日別命使展禮以申和好彼間將相並存問之遣書指不多及皇帝敬問黠戛斯可汗溫仵合將軍至覽書及所獻馬百匹鶻十聯具悉可汗特稟英姿生知雄畧奮揚威武底定龍荒掃回鶻之穹居報怨以直護公主之罽幕事大以誠又遣貴族信臣載馳朔漠名馬鷙鳥遠涉流沙既展同姓之親克副懷柔之旨眷言勳績深慰予衷朕護奉丕圖撫寧萬國豈望化孚有截致殷湯來享之明實恐德未徧覆愧漢宣兼臨之盛况與彼國壤隔內外非正朔所加禮既不施政豈宜及但以惜可汗宗盟之國願保先名為可汗宏遠之謀須除後患所以具古今禍福往諭至懷昔呼韓邪單于以郅支尚存國難未靖稱蕃事漢福及子孫後漢單于比以大父依漢而安繼襲其號上書款塞永願藩蔽漠南遂致朔塞底寧烽燧永息近則回鶻結大國之援雄長北蕃諸部率從莫敢不服一隅安樂百有餘年此事昭然可汗所覩况今回鶻種類未盡介居蕃漢之間爰及黑車子久畏其威素服其信慮彼再振常持兩端須令小蕃知朕親厚可汗棄絕回鶻實在和好分定內附約盟則邪計奸謀無由而入故欲顯加冊命昭示萬方况登里可汗回鶻舊號是國家頃年所賜非回鶻自制此名今回鶻國已破亡理當嫌避朕以可汗先祖往在貞觀身自入朝太宗授以左衞將軍堅昆都督朕思欲繼太宗之舊典彼亦宜遵先祖之明誠便以堅昆為國施於冊命更加美號以表懿親况堅者不朽之名昆者有後之稱示不忘本豈不美歟朕昨命禮部尚書鄭肅等與彼使臣面陳大計溫仵合將軍等皆諭朕旨願言結成豈必契徑路之金舉留犁之酒保茲誠信固在厥初頃者回鶻至塞上請國家精兵十萬送至漠北漸歸本蕃又請借漢界一城養育疲羸以圖興復朕以可汗之故盡不聽從今回鶻是國家叛臣為可汗讐敵須去根本方保永安是天亡之時易於攻取古人云天與不取反受其咎可汗須乘此機便早務芟夷回鶻未滅以前可汗勿以飲食為甘弋獵為樂勵兵秣馬不可暫閑所恨隔在諸蕃國家難於同力倘更近塞豈復稽誅又恐餘孽歸降可汗未能盡戮納有罪之眾受逋逃之臣倘收吾憎必開邊隙此則蕃養虺毒自生厲階前年回鶻宰相等向漢使云李靖擒頡利後國中只有三二十人便郤興復雖在危困尚爾張皇可汗深察此言豈得不慮又聞合羅川回鶻牙帳未盡毀除想其懷土之心必有思歸之志速要平其區落無使孑遺既表成功彼當絕望可汗已攄積年之憤自為一代之雄至於居處服章皆宜變革焉得安於所習姑務因循則何以震耀北方彈壓諸部朕撫有中夏愛育生靈常恐百姓未安一物失所豈願更廣威畧遙制要荒但緣與可汗方保和盟義同憂樂纖微之事皆欲備言想可汗與將相籌謀副茲誠意此使到日必諒朕心即宜速遣報章此當遣重臣冊命夏熱想可汗休泰將相以下並存問之遣書指不多及皇帝敬問黠戛王時及陽和想比佳適注吾合素等至省表幷進馬事具悉國王陰山雄勁朔野英雄包智畧以周身推誠明而有眾聲高夷落威重藩疆專遣使臣遠獻名馬嚮化之誠既展輸忠之効頗明臨軒省章輟食嘉歎眷言忠藎寧忘寢興頃於貞觀中彼國常奉朝貢亦授官爵寵賜而還爾後但訝音耗久乖不知中為回鶻所隔及覽來表方嘉壯圖蓄銳多年乘機大舉快雪寃憤豁開心懷回鶻之營壘既平國家之山河不間既為鄰境遂閱貢章又知破回鶻之時取得太和公主特遣專使送歸闕庭雖聞行至中途却為回鶻所奪在國王遵以禮義推之和寧遠同族之譏嫌厚親鄰之恩信賢明如此愧慰難名回鶻頃以失國為詞塞相託朕以勳親是念拯䘏屢加曾不知恩漸開稔惡賤棄公主侵暴平人日尋干戈時竊牛馬朕為全舊好不下明誅歲月滋深邊防將倦各用長策繼彰殊勳焚帳幕而公主歸還透網羅而元惡逃遁顧其餘類何所寄生國王遠聞想同深慰然猶恐奔竄尚有凶姦又慮侵彼封疆將復讐怨國王亦須嚴為備擬善設機謀同務討除盡其根本無貽後患勉繼前修親仁善鄰惟彼與此勿謂遐遠常存寤思因注吾合素回且先詔示其他禮命續專遣使宣慰想宜知悉皇帝敬問黠戛斯可汗將軍諦德伊斯難殊至覽書幷白馬二匹具悉可汗降精斗極雄朔漠以稱君稟耀旄頭分天街而建國特負英豪之氣夙推統御之才眷想嘉猷載深寤嘆來書云溫仵合將軍歸國後漢使不來溫仵合去日朕書具云速遣報章此當遣重臣冊命自是可汗未諭此意報答稍遲此則尋欲遣使只自延望來信又云金石路已隔絕葢為山川悠遠未得自與可汗封壤接連非是兩國之情猶有阻隔想可汗明識無復致疑又云兩地遣書彼此不會且書不可以盡言言不可以盡意况蕃漢文字傳譯不同只在共推赤心永保盟好豈必緣飾詞語以此交歡每欲思維先恩好意不更疑惑便是明誠又云欲除却兩楹間惡剌此之一事實是嘉言緣回鶻雄據北方代為君長諸蕃臣伏百有餘年今可汗掃其穹居大雪讐恥功業既高於前古威聲已振於北荒固當深務遠圖豈可更留餘燼黑車子不度德量力敢保寇讐則是輕侮可汗獨不向化此而可忍孰不可容况可汗前來云求訪公主使上天入地必須覔得今若舍而不問何以取信朕懷想可汗乘彼盛秋長驅精騎問回鶻逋逃之罪行黑車後服之誅取若拾遺役無再舉從茲盪定豈不美歟來書又云送公主到彼無一語來緣公主纔離可汗五日便被回鶻刼奪所遣來使盡被殺傷公主二年之中流離沙漠事已隔遠所以不再敘言然趙蕃去日已具感悅之心足表殷勤之意又聞今秋欲移就回鶻牙帳滅其大國便保舊居足使諸蕃畏威回鶻絕望稍近邊境頗謂良圖所云請發兵馬期集去處緣黑車子猶去漢界一千餘里在沙漠之中從前漢兵未嘗到彼比聞回鶻深意常欲投竄安西待至今秋朕當令幽州太原振武天德緣邊四鎮要路出兵料可汗攻討之時回鶻必當潛遁各令邀截便可梟擒此是軍期須合符契想可汗必全大信用叶一心諦德伊斯難殊朕已於三殿面對兼賜宴樂並依來表不更滯留朕續遣重臣便申冊命故先達此旨令彼國明知冊命之禮並依回鶻故事可汗爰始立國臨長諸蕃須示鄰壤情深宗盟義重以此鎮撫誰敢不從宜體至懷共宏遠畧春暖想可汗休泰將相以下並存問之遣書指不多及勅石雄晉絳密邇王畿地當襟帶自卿與將士等扼其險要勇冠諸軍捍彼奔衝為我砥柱每刻期深入屢挫狂鋒批抗擣虛導遊刃永言勳績豈忘於懷昔商伐鬼方三年乃剋周公東征三年不歸憲宗平淮西文宗定滄海士不解甲或三四年想卿等久在戎行心經此役且士之生代本為功名仗義從軍固當殉命居平則孝養父母成長則子孫衣食所資無非國力有事則投袂而起負甲先登撫養之恩惟此為報今者纔近半歲未曰勞師功在垂成往無不捷將士等各宜感勵成此功名上黨既平天下無事從此永安家室不復征行近者楊弁首為猖狂扇惑亂卒今則身膏齊斧戮及妻拏生為不忠之人死為負義之鬼身名俱滅可不痛哉諸部既安王師益振乘此聲勢必殄餘妖故令中使宣慰兼賜優賞卿等便須鼓行而進徑入賊界下營從此駐軍速圖進取勿使功業歸於別帥爵賞在於他人勉務壯圖副茲厚遇想宜知悉劉稹乳臭騃童未有所識皆是郭誼王協幸其昏弱矯託軍情妄獻表章欲求繼襲志在肆行禍福自擅兵權稱感從諫之恩誓同生死及見山東三郡皆已歸降事迫勢窮歸惡劉稹令其一門受戮便欲自取寵榮不義不忠古無其比朕以誘陷劉稹皆是此二人販賣圖全義難容捨已令澤潞冀氏兩路遣軍只取郭誼王協及同惡之類其他軍人一切不問仍各有優賞後從勅處分如兩道兵馬未到以前有忠義之士先非同惡者能自擒戮郭誼等所與優賞並同裴問王釗例處分已詔石雄王宰到彼不令侵擾軍人百姓如秋毫有犯便按軍法各宜勉思機計共保忠誠勿受奸人扇動妄生疑忌互相告報咸使明知勅自爾祖歸國家依附邊塞為我赤子編於黔黎牛馬蕃孳種落殷盛不侵不叛頗効信誠比聞邊將不守朝章失於綏輯因緣征歛害及無辜念爾遠人莫知控告特命朕之愛子實總元戎所冀㣥帥聽命而不敢自專諸部懷寃而有所披訴奉我憲令以保和寧如聞莫顧私恩遂懷憑恃攘奪不避於官物驅掠罔憚於平人擅興甲兵恣行攻劫豈有朝廷內地輙此鴟張道路阻艱商旅殆絕朕便欲詔命諸鎮同力勦除深慮玉石難分善惡同斃今再為條制各使得宜却令節將指揮許其處斷如實有寃濫政乖公平並遣巡院奏聞朝廷必為申理如或不知恩貸猶敢猖狂國有典章必難容捨故茲宣示當體朕懷勅李思忠首率蕃兵歸誠向闕念其忠特許來朝而又久慕華風願留京邑俾參環衞用報勛庸其歸義軍使宜停將士等同叶義心所宜優寵况聞諸道軍鎮皆置馬軍選擇蕃渾尤不易得緣此將健久工騎射頗出常倫列於牙旗足壯戎閫宜分諸道節度使團練收管便給本道衣糧稍加安存務令得所勅昔馮異之守盟津已建軍號近光弼之保伊洛先據三城葢以河有造舟之危山有摧輪之險左右機軸表裡金湯既當形勝之地實為要害之郡令所制置豈限常規積萬庾於敖前尤資地利列二矛於河上須壯軍聲其河陰縣宜割屬孟州仍改為望縣其河清縣却還河南府收管縣官等並准前勅處分其東都鎮遏兵馬依前屬東都防禦使鄭滑汝州防戍兵各一千人令宏敬權指揮事平後續有處分勅成德軍魏博皆出兵甲俯臨賊境秋氣已至攻取是時元逵宏敬制勝伐謀必有成算固須命使遠訪嘉猷又回鶻雖已遁逃尚存餘燼今朔風始勁塞草具腓猶慮未革梟音敢懷狼顧迫於饑窘復擾邊城仲武久欲蕩除俾無噍類成其志業壯彼威聲亦在使臣往喻朕意各宜奮厲早建殊勛解甲來還免彼祁寒之候止戈除害庶臻仁壽之期咨爾帥臣副茲委遇宜令刑部侍郎兼御史中丞李回充幽州鎮魏等道宣慰維會昌二年歲次壬戍四月乙丑朔十四日戊寅攝太尉光祿大夫守司空兼門下侍郎同中書門下平章事臣德裕銀青光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事臣夷行金紫光祿大夫尚書右僕射兼中書侍郎同中書門下平章事臣珙銀青光祿大夫守中書侍郎同中書門下平章事臣紳金紫光祿大夫檢校司徒兼太子太保臣僧孺及文武百官等六千五百七十四人言臣聞羲皇首太古之號成湯顯神武之稱我高祖皇王是憲尊名若古貽厥丕訓為子孫之法豈不善始善述哉矧乃巨唐受命繼體承業理運將至大君以興昊穹所以開至聖也曩者明兩未定帝華不協舍允傳聖深惟至公先后所以昭天命也亦猶堯發於唐侯文興於代邸神明之祚不其難哉伏惟皇帝陛下清明溥鬯光耿四海元德莫鄰天休大賚日角見表氣志如神爰初定命正心理物如辰居極而天下無邪矣由是昭德塞違尊賢遠佞禹不自滿成不敢康罔盤於田不邇於色自閨壺以施王教由家道而刑國風去比周覈名實攬乾綱擇聖紀修舊典協誠質扢嘉壇泰乙進正臣以端治表禮故老以求讜言遠無蔽獄近無留命祈元祖而膏雨降祀靈岳而嘉穀登省刑罰而蓬孛消發倉廩而螽螟息去歲龍旂承祀大輅親郊捧玉瓚而一獻光靈來格振金石而六變魄寶昭臨然猶古訓是學緝熙於道天文炳煥雲漢其章溫恭敬遜承太任之教和樂愷悌洽戚藩之心德風偃於㣥黎威霆動乎絕域又以敬養不逮於長樂昭配未升於禰宮每懷嗣徽烝烝而慕所以奉若慈訓對越兩儀因心立制永錫其教寬虔劉之罪興惻隱之仁迴電收霜為之反禾及單于慕義景附朔邊耀德戢兵謙臨是受至於備文物展國容莫不先甲而布甘澤丁辰而廓陰翳和景晏溫卿靄絪縕斯所謂神祗之心應矣天人之際交矣於是服冕之士戴鶡之倫暨藩侯邦伯黃髮駘背不謀而進曰陛下元默天晬輝光日新大矣孝熙四極爰臻誠宜玉版溫潤鏤鴻明之德神寶焜燿薦萬斯之年丕惟大典不可辭也陛下猶謙退固拒至於三四㣥臣不已乃曰俞哉夫徧覆包含之謂仁極深研幾之謂聖憲度著明之謂文蠻夷震懾之謂武感而遂通之謂神無思不服之謂孝臣等不勝大願謹奉玉冊玉寶上尊號曰仁聖文武至神大孝皇帝伏惟陛下乾健不息謙尊而光樂戒其耽禽戒其荒壽乃侔於殷宗俗乃厚於成康貽燕後昆受福無疆臣德裕等誠歡誠躍頓首頓首謹言維會昌五年歲次乙丑正月己酉朔一日己酉光祿大夫守太尉兼門下侍郎同中書門下平章事臣德裕光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事臣悰朝議大夫守尚書右僕射兼中書侍郎同中書門下平章事臣讓夷朝議大夫守中書侍郎兼戶部尚書同中書門下平章事臣鉉及文武百官大中大夫太常卿臣孫等六千二百二人言臣聞在昔周宣獫狁內侵四牡薄伐以定王國則詩人大其功暨於漢宣北夷乖亂呼韓慕義郅支遠遁則策著其美惟此二代稱為中興間者開成之末星孛如雲螟飛蔽天先帝戚之黎人懼焉乃授至聖遺大投艱迄茲成功厥有冥數伏惟仁聖文武至神大孝皇帝表應龍翼粹含乾剛神全而正氣凝宇定而天光發智燭千里動必察微心鏡萬機物來斯應於是五材用四維張建中和之極綴前聖之綱重樞機修法制刑御家之理無出壺之言銷讒邪遠佞倖絕背公之黨退好徑之人內嚴體貌增堂陛之峻外絕締交去輔車之勢古所謂受命於天惟舜獨正也又曰一心定而萬物服惟陛下得之曩者北狄矜功耗蠧中國種類磐牙根柢封殖異術肺腑縞衣如荼挾邪作蠱浸淫宇內倒懸不解百有餘年既而龍祠堙滅擕國塞質帝女蹙海疆有狼顧平城之心鯨吞咸洛之志爰命梟將搴旗刈㫋兵鏖穹廬火烈荊榛颺罽幙碎轒車宛六吂月馬凡遁逃貴主生還剗滅妖迹剿除醜類故名王結髮冠帶入臣堅昆稽首鞮譯來獻而又奸臣放命二紀陸梁據太行之固下窺洛邑通故綘之道旁晲近關樹其遺孽以竊兵柄議者僉曰精兵十萬積穀十年泉魚不察湯網宜懸陛下雄斷霆聲㣥疑冰釋揚清風而掃雲致迅雷而破山任馮異則拔天井而震上黨仗吳漢則發突騎而窺邯鄲壺關失險山東奪魄屬有戍邊叛將竊發參墟人心搖蕩異議放肆陛下臨朝而言曰二寇獲罪於天予所不捨未三旬而定晉陽纔朞年而滅潞子不以金購豨將多降不勞師克粵首馳報非至德感物孰能臻於此乎由是台宰百辟藩屏將帥上言曰成伐東夷而肅慎來賀景剪七國而王室乃安莫不始於武功終致刑措將以禋上帝薦祖宗宜受鴻名以答元貺陛下猶謙遜而五讓之勤請弗已乃屈已以俞之雲漢為章所以昭法度也神明其德所以成教化也巍乎有功帝堯之則也勤於大道元祖之訓也臣等不勝大願謹奉玉冊玉寶上尊號曰仁聖文武章天成功神德明道大孝皇帝伏惟陛下不有其名以保其成不德其功以戒其盈享殷宗之福致周道之平熙我王度永振金聲臣德裕等誠歡誠躍頓首頓首謹言臣某言伏以臣之事君猶子之事父若情有所隱志在苟安不事披誠即為冒寵臣某誠惶誠恐頓首頓首伏惟仁聖文武至神大孝皇帝去邪用相有大舜之功柔遠固存臻漢宣之理故得王道正直海內清和邊朔底寧干戈永戢文明之化方致永熙螢爝之光所宜自息豈敢虛矯上負君親臣始自孩童常多疾病逮於壯歲猶甚虛羸屬廉問江南荏苒八歲移鎮巴蜀首尾三年暑濕所侵遂成沉痼患風毒脚氣十五餘年服藥過虛又得渴疾每日自午已後瞑眩失常形骸僅存心氣俱竭唯恐晚歸私第殪盡道途臣伏見國史岑文本受委既深形骸頓竭太宗嘗謂左右知其將盡韋處厚積以虛憊不早退身侍立之時仆於玉階之下臣竊以二臣為戒不敢遑安所冀陛下宏太宗之仁下軫念於無及臣得延處厚之數免自促於明時伏望陛下察臣懇誠矜臣衰耗得罷繁務退守州行稍獲安閑漸自頤養一二年後或冀有瘳臣倘餘齒尚存筋力未朽必當灰身粉骨上報聖慈不任祈恩之至謹奉表臣某言臣今日已進讓表驚寵之心不遑啟處再陳恐懇實懼為煩臣某中謝伏見國初已來授此官惟有七人尚父子儀猶以懇辭而免近者智興載義皆超拜太傅太保只緣朝廷重惜此官裴度守司徒十年竟不遷授以臣僭越必致顛擠况臣既無汗馬之勞涓塵莫効又有負薪之疾曠廢至多唯陛下寵以美名榮皆過實而臣靦顏自處竊位偷安非止獲朝野之譏實恐受神明之譴輒披丹猶冀聽從伏望息罷新恩且守舊秩不任祈恩迫切之至臣某言臣聞廟器不盈周公戒其必覆馬力已竭顏氏知其必顛臣竊感之以憂以蹙臣某中謝昔子文避祿竟之逃死冶厪辭卿迫於懼禍伏以上公亢極本待勛臣其間或授時賢皆是元老臣既非耆艾又乏戰功奉宸算而曾靡運籌假英威而未嘗推轂有何勞効蒙此殊榮夙夜自思至今戰汗伏見廣德二年九月十七日代宗授尚父汾陽王此官三讓而免至大歷十四年閏五月三日德宗再申前命重授尚父不許陳讓三載而終臣竊思尚父十五餘年得延光寵豈非牢讓而致闕一字隲所持昨者恭惟聖獎至深恩義加等祗受典冊未敢固辭臣伏念齒髮雖雕心力猶壯實願贊陛下升平之運見萬方仁壽之期東封告成大典咸備然後散金娛老歸守邱園貪全盛時不忍自促所以再陳懇上凟皇明竭至敬而不敢繁文陳至誠而不為飾讓心懇詞直度獲聽從伏望特追新恩却守舊秩臣不任懇迫屏營之至臣某言臣聞道不欲盈元祖之至誠人惡其上魯史之明規既以迫於愚衷敢慮動而生悔臣某中謝臣頃居宰弼獲戾於時既望汨以懷沙甘赴湘而溺死自謂永違白日莫覩青天雖文宗墜履不遺驟分圭瑞而微臣傷弓是懼常蹈春冰伏值陛下大明初升臨照四海知臣常忝禁署逮事穆宗念已廢之舊物憫既傷之弱羽召自滄海擢授黃閣明德每覆其瑕玼至仁常矜其衰疾參贊萬務倏已六年裘冕禋郊再覩配天之禮干戈問罪三見拘原之功所謂百生遭逢千載際會徵倚伏之數惟恐罹灾思存亡之機所宜知止非慕三公乞骸之節敢希二疏解組之風忍去盛時自貽深戚實以久嬰沉痼年漸衰遲宗族孤單兄弟衰落先臣松檟近在東都家屬數人皆居上國不欲遠離京闕只願歸老田園伏望陛下深鑒孤忠特遂丹懇察臣上報聖德不必須在鼎司改授閑官優游暮齒所冀自知稅駕無李斯之嘆音便得懸輿復韋賢之故事進退惶灼伏地涕零不任兢惶感切之至謹奉表陳乞以聞臣某等伏奉今日制拆寺蘭若共四萬六千六百餘所還俗僧尼幷奴婢為兩稅戶共約四十一萬餘人得良田約數千頃其僧尼令隸主客戶大秦穆護襖二十餘人並令還俗者臣聞仲尼祖述堯舜憲章文武大宏聖道以黜異端末季以來斯道久廢不遇大聖孰能拯之臣某等中謝伏以三王之前皆垂拱而理不可得而言也厥後周美成康漢稱文景至化深厚大道和平人自稟於孝慈俗必臻於仁壽豈嘗有外夷之教玷中夏之風東漢楚王英始盛桑門之饌淪於左道桓帝更增犀葢之飾歸於亂政魏之三祖西晉太康雖君非大聖臣非上哲然猶祖尚老莊斯教未行至東晉因吳人之佻薄襲孫權之弊政始建塔廟乃譯梵書宋齊梁陳其教浸盛好大不經之說陋乃詩書因報拔濟之談隆於仁孝運祚浮促篡奪相尋二百年間五變朝市君無殷宗之福臣靡衞武之年感驗寂寥斯可明矣高祖神堯皇帝方欲剗除斯弊掃刷中區時屬宰臣蕭瑀本梁氏之子孫尋覆車之軌轍廢格明詔以迄於今遂使土木興妖山林增構一巖之秀必極雕鐫一川之腴已布高剎鬼功不可人力寧堪耗蠧生靈侵减正稅國家大蠧千有餘年伏惟仁聖文武章天成功神德明道大孝皇帝陛下明紹於天粹合於道黜霸圖而功盛入聖學而德優常欲天下之動咸貞於一以一言之蔽思必無邪先定宸心獨發英斷破逃亡之藪皆列齊人收高壤之田盡歸王稅正㣥生之大惑返六合之澆風出前聖之模為後王之法巍巍功德煥炳圖書臣竊位樞衡莫能裨益愧無將明之効徒懷鼓舞之心千古未逢百生何幸不任忭賀踴躍之至臣伏見賈誼云守圉捍敵之臣誠死城郭封疆故曰聖人有金城者此物此志也自天寶之後俗尚浮華士罕仗義人懷苟免至有棄城郭委符節者其身不以為恥當代不以為非臣恐風俗既成紀綱皆廢此當今之急務教化所宜先也臣訪聞處士李源即故禮部尚書東都留守贈司徒忠烈公憕之少子天與貞孝嗣茲忠烈以父死國難哀厂田坴終身自司農寺主簿絕心祿仕垂五十年放懷山澤罕至人落暨於衰暮多依慧林佛寺以其本憕別業就寓殘生從僧住持不舉烟爨隨僧一食以至五十餘年嗜欲靡窺精麤同眾寺之舊殿則憕之寢堂源過必敬趨未嘗登踐其端心執孝無有不至忘形患苦絕意貪緣迎斥浮虛就專志節則孰能挺操不易沉身無聲處薄自頤終老彌篤且憕之忠烈實冠古今當逆羯屠陷飇驅響從而憕抗節誓心約義同列居朝守位抵刃就終臣節之光繇憕益勸而源名銷迹滅徵訪不加實主於居方之臣歷政之闕也况源嘗守沉默不語是非或心交靜求理契深要一言開析百慮洗然致君阜時指象如見抱此貞用棄於清朝臣竊為陛下深惜伏乞就授一官召赴京闕仍以事迹宣付史館則聖代有求賢之盛朝廷美得材之難憕之貞烈如存源之承荷不墜忠孝之美幷集憕門光嗣德於一時激為臣於千古
