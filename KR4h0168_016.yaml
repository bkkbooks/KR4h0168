front:
  text: 全唐文欽定全唐文卷十六帝諱顯高宗第七子顯慶元年生二年封周王儀鳳二年徙封英王改名哲永隆元年八月立為皇太子宏道元年十二月即位嗣聖元年武后廢帝為廬陵王房州安置聖歷元年復立為皇太子仍名顯神龍元年正月復辟十一月上尊號應天皇帝三年八月加尊號應天神龍皇帝立二年被廢復位四年年五十五諡曰孝和皇帝廟號中宗追尊太和大聖大昭孝皇帝集四十卷
  hash: sha256:35ca726792c42b2fb003d968c87ad04775eacc63fc4990022319fcf881ba63a9
  markers:
