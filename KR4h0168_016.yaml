body:
  text: 顧以虛庸早向墳典每欲研精政術極意書林但往在幼年未閑將衞竭誠耽誦因即損心比日以來風虛更積中奉恩旨不許重勞加以趨侍含元溫凊朝夕承親無自專之道遵禮以色養為先所以屢闕坐論時乖學緒公潛申雅勗式薦忠規敬尋來請良符宿志自非精思審諭義均弼諧豈能盡此藥言形於墨撫躬三省感愧兼深門下九重嚴邃非閭閻之可聞萬邦遐曠因表䟽而方達朕尊居黃屋心念蒼生微物不安每切納隍之慮一人失業更縈宵旰之懷思欲下情上通無令壅隔所以明四聰者也其官人百姓等有冤滯未申或獄訟失職或賢才不舉或進獻謀猷如此之流任其投匭凡百士庶宜識朕懷朕聞唯天為大所以上序三宗唯帝為尊於是宏開七廟故知肇興衢室爰申宗祀之規為建明堂或廣嚴禋之禮莫不八窻四達分氣於災涼複廟重簷定尊卑於昭穆實為國之洪訓乃經邦之茂典我國家睿祖神宗重光累葉道軼羲農之上功侔造化之初冠今昔而居尊掩寰區而作大朕承天撫運纉聖開元披鳳歷而乘時握龍圖而建極春秋變易每增霜露之心日月推移倍切蒸嘗之思然而城臨丹鳳清廟久安水控元龜神基未立金輿往幸空展望於瑤祠玉輦來巡實幸親於碣石三川帝里八水皇州豈都邑之相誇而郊畿之有謝所以交風奧壤還開鴈之庭揆日明區更置馴龍之室巍巍紫座無虧薦鮪之途奕奕彤宮遂得獻羔之所加以總章霧闢重屋煙披懸晦日於梅梁掛晴虹於桂棟是以用斯珪璧奠彼牲牢唱孤竹之簫管奏空桑之琴瑟爰於祔享之日乃至禋宗之辰景色殊常煙雲冠古或凱風南至縈喜氣而分輝或驟雨東來引祥雲而合嚮固可以作樂崇德殷薦上帝而碧海遙澄覺三邊之霧捲丹霄上廓看九野之塵清祖宗之靈貺昭然宇宙之神心可見虔誠既展盛禮斯宏宜覃作解之恩以廣奉先之德但赦者小利而大害始泰而終否著小人之幸非君子之幸今歲巳來頻敷渥命徒長僥倖愈犯憲章非所以宏獎風猷發揮名教深慮無知者因茲獲罪有識者緣此致譏遐思管仲之篇緬想吳漢之說恐負丕構慨然長想昔孔明相蜀王猛佐秦咸以數赦為言俱稱肆眚非便朕惟新闡政方事澄源期望古而裁規具修今而布澤伏以禮申崇祔情展泰禋式流曠蕩之恩兼明懲勸之道可大赦雒州境內天下諸州見禁囚徒罪應致死者特宜免死配流者入徒餘並原宥京文武三品以上賜爵一級四品以上各加一階外文武官九品以上賜爵一轉皇親嗣王仍特許佩金魚袋內外職事官三品以上及四品清官並中書門下五品官父巳亡者並量加追贈自宏道以前經任相三年以上及秦府晉府僚佐四品以上並食實封功臣雖經罪責不至破家子孫無任京官者特宜優與一官英府周府舊寮五品以上子孫亦宜準此天下百姓為父後者各賜右爵一級大酺三日鸞臺尊王子弟分裂山河式優征賦永固藩屏并州牧左衞大將軍太子左千牛衞率兼安北大都護相王旦地惟茂親躬此明德性安卑薄誠切沖讓頃以所食相州願入天府章表懇到至於再三朕難違固請曲成美志然以王國所費觸類宏多漢晉巳來寵錫彌盛或食邑五萬戶或連城數十里豈可遂其攬分之情忘其推恩之典宜於相州加實封一萬戶進號安國相王主者施行鸞臺睦親之序誠有節而難踰襃善之方諒無和而不洽太平公主延祥紫極稟慶彤闈月至漸宮下金娥而毓照星分漢渚迴寶婺以凝姿踐素依仁更緝柔閑之範聞詩蹈禮還表婉順之容毓悟發於天機聰明協於神授所以特鍾先愛偏荷聖慈動輒承恩言必中旨故秦臺下鳳禮越於常儀魯館乘龍榮該於美選自蜃軒即路蛩巖閟寢途遙千里時亢九炎攀從莫由荒號孰寄公主親承委屬代申悲苦涉履山川念徒行而彌切奠奉明夕哀獨薦而逾勤宮務畢脩闈容胥備中外咸允情理兼極朕以其雖有殊效蓋是恒途而凡典樞機固事奏請豈可以私親之嫌累夫公道之分宜增湯沐之榮以表肅雍之譽可加實封五千戶進號鎮國公主鸞臺相王旦長女第三女第四女等毓靈河漢稟訓天人蕙問清淑蘭儀婉順徽章所披抑有王旦闕之封式開湯沐之邑長女可封壽昌縣主第三女可封淮陽縣主第四女可封壽光縣主鸞臺某王某第幾女䟽芳桂苑發艷椒庭繡袵初笄巳觀於婉淑瑤筐載弄更表於柔閑韶容將寶婺分暉惠質與瓊娥比秀承規蹈禮既漸訓於河洲延賞推恩宜加榮於湯沐可封永年縣主鸞臺相王第五女資靈桂魄稟訓蘭宮六行昭宣四德淳備夭桃穠李既挺淑令之姿紅綬青緺宜開湯沐之邑可封仙源縣主忠正之臣自昔攸尚襃贈之典舊章所重故贈大理卿徐有功節操貞勁器懷亮直洵古人之志業實一代之賢良司彼刑書深存敬慎周興來俊臣等性惟殘酷務在誅夷不順其情立加誣害有功卓然守法雖死不移無屈撓之心有忠烈之議當其執斷並遇平反定國釋之何以加此朕惟新庶政追想前跡其人既沒其德可稱追往贈終慰茲泉壤可贈越州都督仍遣使就家弔祭賜物百段授一子官門下建侯之典豈獨於懿親茅土之榮必覃於茂績侍中上柱國齊國公敬暉侍中上柱國譙郡開國公桓彥範銀青光祿大夫守中書令兼修國史上柱國漢陽郡開國公張柬之銀青光祿大夫中書令博陵郡開國公崔元暐中書令兼檢校安國相王府長史上柱國南陽郡開國公袁恕己等早竭忠讜夙罄腹心在身喻於股肱在物均於舟楫除兇而殄逆更安社稷之基策命而襃崇爰申建侯之寵敬暉可封為平陽郡王彥範可封為扶陽郡王仍賜姓韋柬之可封為漢陽郡王兼特進勳及食實封各如故元暐可封為博陵郡王恕己可封為南陽郡王仍令準例朔朢朝參便即不須推讓主者施行古之御天下者以大寶為公器以崇高為外物仰則乾行順性命之理俯思坤載成博厚之德將以財成至道保邦靜人用清三微以齊七政能臻夫此者豈一人之力哉實賴㣥方共康庶績自季葉淪替偭棄公道官匪其人教無所習懷才修潔者則依違以自容通方宏偉者則放蕩以求利繇是淳化日消澆風歲長典章訛弊甿俗凋殘逶迤陵頹莫能振理朕以薄德丕承寶命夙夜惟寅憂勞無怠昧旦端冕心被寰瀛日晏罷朝念周黎庶頃者勵精推擇傍求牧宰冀聞善政惠康乃乂虛己勵勤美化猶怠貪官傲吏屢黷於爰書失職流亡幾淪於版籍豈刑賞之柄不協其中將仁恩之誠未孚於下永言國本良深軫悼古者天子巡狩省方觀俗而錫鑾備駕或以為煩故分命輶軒博採謠頌將以彰善癉惡激濁揚清散皇明以燭幽揚仁風以被物實資令德允屬通才惟懷永圖式鑒成憲宜於左右臺及內外五品以上官識理通明立性堅白無所詘撓志在澄清者二十人分為十道巡察使二周年一替以廉按州部俾其董正㣥吏觀撫兆人議獄緩刑扶危拯滯若能抗辭直筆不憚權豪仁恕為懷黜陟咸當別加獎擢優以名器如脂韋苟全籧篨戚施高下在心顧望依附者將遷削屏棄肅以憲章咸竭乃心以副朕意共理天下者在良二千石宜令中書門下於內外揀擇必取材望兼優公清特著可以宣風導俗具以名聞門下朕聞展禮褅祖昊穹著其成命就陰即陽墳典明其大節故豺獺有祭下不隔於微品犧牲畢陳上以光於嚴配軒皇用事則雍旁五祠漢帝潔齊則城南七里用能使敬而不黷求而不匱祈穀則九載可登焚柴則三載無闕是知上靈大德不私於亭毒之仁正直聰明有感於馨香之薦瞻高欲語無易茲道我高祖神堯皇帝開階立極配永循機太宗文武聖皇帝仗金策而清四方運璇璣而齊七政高宗天皇大帝與乾坤合其德與日月合其明則天大聖皇后建補天立極之功受河圖洛書之統五精歸運四葉重光朕虔順樂推欽承睠命紹宏基於累聖日慎斯兢執大象於㣥生夙興加勵遠人殊俗占風而集蠻邸美瑞休符繫月而輝史筆故得三邊靜柝五兵銷刃寰宇大寧人神式序而德慙被物誠謝動天水旱尚臻陰陽猶舛永以憂懼無忘鑒寐然則事天事地莫盛乎禋祀弗躬弗親孰申乎誠敬朕自臨四海於今五年幸承祧社之靈未展郊丘之謁方今朔風律南至登辰乘上日而恭饗奉高禋而肅事揚宗祖之休命酌壇場之令典百神受職三才合契備殷薦之容行昭報之禮豈惟靈光所燭但驗其徵方冀後先不違實受其福至若五刑之屬十惡為重自頃恩赦罕聞該及朕以眇身膺乎大寶下人不足每切如子之傷上帝所臨敢逃在予之責閒居三月未弭厥靜念終朝載增寅畏侑神伊始與物維新用宏曠蕩之恩以答高明之貺可大赦天下聖人布化用百姓為心王者垂仁以八荒無外故能光宅遐邇財成品物繇是隆周理歷啟柔遠之圖強漢乘時建和親之義斯蓋御㝢長策經邦茂範朕受命上靈克纂洪業總三才而統極混六合以為家聲教所覃建木棗林之外提封爰亘弱水流沙之表悠然至道高詠薰風載戢干戈大張禮樂庶幾前烈克致和平睠彼吐蕃僻在西服皇運之始早申朝貢太宗文武聖皇帝德侔覆載情深億兆思偃兵甲遂通姻好數十年閒一方清淨自文成公主往嫁其國因多變革我之邊隅亟興師旅彼之蕃落頗聞彫弊頃者賛普及祖母可敦酋長等屢披誠款積有歲時思託舊親請崇姻好金城公主朕之少女長自宮闈言適遠方豈不鍾念但朕為人父母志恤黎元若允誠祈更敦和好則邊土寧晏兵役休息遂割深慈為國大計受築外館聿膺嘉禮彼吐蕃賛普即以今月二十七日進發朕親自送於郊外卿操烈寒松心橫勁草累遷臺閣咸播聲猷不屈二兇之威獨全一至之節每念嘉歎無忘寢興但青璅位隆黃樞寄切爰奪苴麻之禮擢居審省之曹朝命巳行即宜斷哀念功之典書有明訓贈終之數禮著彞式党項大首領故右監門衞將軍員外置同正員使持節達洫等一十二州諸軍事兼靜邊州都督仍充防禦部落使拓跋思泰頃者戎醜違命爰從討襲躬親矢石奮其忠勇方申翦馘之勳俄軫喪元之痛壯節彌亮美名可嘉宜崇寵章俾慰泉壤可贈特進兼左金吾衞大將軍賜物五百段米粟五百石仍以其子守寂襲其官爵門下闕宿揚輝爰稱婺女絳河分彩是曰天孫柔德所資乃生淑媛長寧公主等孕靈圓魄稟粹方儀載極幽閒用光婉順皇基再造景命維新凡在懿親咸申禮命肅雍之地未展徽章宜正此銀宮署茲金榜並開湯沐廣宣朝慶可依前件駙馬都尉楊慎交分榮戚里藉寵公門恭肅著於立身恪勤効於從政鳳凰樓上宛符琴瑟之歡烏鵲橋前載協松蘿之契宜覃茅土式廣山河君臣朝序貴賤之禮斯殊兄弟天倫先後之儀亦異聖人之制率繇斯道朕臨茲寶極位在崇高負扆當陽雖受宗枝之敬退朝私謁仍用家人之禮近代以來罕遵軌度王及公主曲致私情姑叔之尊拜於子姪違法背禮情用惻然自今巳後宜從革弊安國相王及鎮國太平公主更不得輒拜衞王重俊兄弟及長寧公主姊妹等宜告宗屬知朕意焉門下長寧公主安樂公主等金波毓彩寶婺凝輝蘊詩禮於心臺暢柔明於性府肅雍成德婉娩居懷非弄玉之能方豈修瑤之是美特荷掌中之愛尤鍾膝下之慈宜錫寵榮再崇湯沐可更加食實封一千戶通前滿二千戶故李昭德勤恪在公強直自達立朝正色不吐剛以茹柔當軸厲詞必抗情以歷詆墉隍府寺樹勣良多變更規模歿而不朽道淪福善業虧嫉惡名級不追風流將沫式旌壤樹光被幽明可贈左御史大夫朕凝懷紫宙滌想丹闕考千古之澆淳稽百王之治亂蒿宮茅柱實興國之清猷玉席珠衣乃危邦之弊化朕自承天纂運佩日披圖希齊鷇飲之年願躡鶉居之代漢文提舄少小留心晉武焚裘生平措意頃為皇符肇建寶廟初登眷彼王公多為進奉莫不龍歌令節蛟食芳辰椒花獻頌之時菊蘂浮觴之日或雕金鏤玉採六合之珍奇或翦翠裁紅飾三春之草樹上行延納下務徵求鄽閈紛紜公私逼迫昇平欲濟蠧害非輕言念於茲深無所謂即宜懲革勿至因循門下紫極八座非德勿居丹屏六曹惟賢是擇金紫光祿大夫李承嘉靈襟岐嶷識宇嚴明早聞通德之名夙有大臣之望雄才逐日共騏驥而齊驅迅翼搏風與鵷鴻而並翥柏臺憲府高膺弄印之榮芝甸神州獨著題輿之任堅同白玉直若朱繩臺閣風生權豪氣懾洪材可重茂秩須崇宜加曳履之班式獎從橋之對避車要秩非德靡升專席雄班惟賢是屬侍中楊再思衣冠舊齒廊廟宏才寒暑不易其心始終弗虧其度在明時而有立居暗室以無欺投水陳謨邁漢朝之三傑霑沙作相掩虞日之五臣森乎抱松柏之心凜乎貫冰霜之氣佇因獻替兼肅權豪宜分務於鸞扃俾効能於烏署絳衣近侍秩亞貂蟬青瑣崇班職參鴛鷺實神化之有寄信賢才之攸重通議大夫韋嗣立忠規奕葉孝緒蟬聯家匡元鷰之朝人輔彤雲之代芝蘭並秀見謝砌之階庭麒麟齊驅有劉山之昆季入光振鷺譽滿三臺出據憑熊聲流十部近者命茲鸞渚巳擢鴈行纔出芸扃奄歸蒿里永言荊樹坐折連枝眷彼恒山空餘一鳥俾遷榮於皁蓋宜襲寵於黃樞明光畫省務總樞要建禮仙門職惟喉舌尚書左丞張錫白虹良寶紫電雄鋒家傳鵲印之祥世襲貂冠之緒文遒吐鳳思縟騰蛟質映南金材逾東箭自提綱左轄執中臺奏郭奕而無慙射崔洪而不愧紫樞佇俊彤管須賢宜升賜劒之榮式表委珠之潔禮防君子自昔通規律禁小人由來共貫朕情存革務志在懲愆欲申作解之恩慮開僥倖之路非所以納人軌物垂裕後昆既屬陽和之辰宜敦耕稼之業三農啟方陳敬愛之規百姓為心爰軫泣辜之念將申慮降再釋狴牢庶無滯禁之冤仍示小懲之誡其都城之內見禁囚徒朕特親慮令所司具為條例聞奏烏臺峻秩望總鐵冠蒼佩崇班威高石室誠副相之榮級實次卿之通任前岐州蘇珦詞吞楚澤量湛黃陂既光大廈之材堪入巨川之用西京展驥道掩題輿右輔憑熊風超露冕朱帷霧撤初停州縣之勞白霜凝宜屏權豪之氣朕聞將帥興功本期於邦國帝王懸賞用答於疇庸持節朔方道大總管右屯衞大將軍張仁愿器宇端雅風神秀傑謀韜玉帳寄重金壇故得累司文武歷參邊鎮薊州作牧既紓東顧之憂榆塞總兵方釋北垂之慮而乃躬先士卒負土築城橫卻月於天街劃長雲於地脈宜列河山之賞式崇帶礪之榮進封韓國公賜物三百段及衣裳一副門下悼往興哀事極於理義飾終追遠禮著於經國故邵王重潤漸履雲霄分輝日月體謙恭之質蘊忠順之誠愛敬盡於宮闈仁孝聞於區㝢地居長嫡允膺崇樹天不憗留奄隨運往朕丕膺寶命廼眷承祧瞰朱邸而無從傃青方而結欷宜加贈典正位元儲可贈皇太子所司備禮改葬主者施行門下朕聞古之教者家有塾黨有庠術有序國有學蓋立訓之基也故上務之則敦本下由之則成俗豈可使顓門殆絕或乖其義入室將廢莫知其道乎朕承百王之末接千歲之統虛心問政早朝晏罷勵精求古忘寢與食思所以奉前聖之典謨矯茲深弊致後生於軌物遵我大猷去歲京畿不稔倉廩未實爰命樂㣥暫停課藝遂令子音罔嗣吾道空歸居無濟濟之業行有憧憧之歎雖日月以冀而歲時迭往今者逋治疑嘗麥且周於黎獻永言釋菜寧於生徒每用惕然良非所謂其國子監學生等麥熟後並宜追集務盡師資諸州牧宰亦倍加導誘先勤學教必使俊造無濫名實有歸庶博士弟子京邑由斯日就鴻生鉅儒海內為之風化有司可即詳下稱朕意焉主者施行門下易著鳴謙禮稱辭貴以崇讓而退滿推心自得其道彌光前昭容上官氏相門積善儒宗雅訓文學冠時柔嘉順則內守恬淡外防奢侈發於少長持以周旋樂無靡嫚衣必澣濯珠璣不珍墳籍為寶故能誠切一室功宣兩朝讜議日聞屢援楚筆忠規歲納方輕漢輦惟此邦媛鬱為宮師遂能德綜十倫孝高百行頃罹創巨爰命權奪秩茂左嬪思被光寵志齊班女懇陳撝挹而賢明之業經濟之才素風逾邁清輝益遠不成厥美將蔽斯言今依表奏以憲圖史可起復婕妤主者施行門下子喬羽化或畱連於故祠康成道存尚延佇於舊邑矧夫跡膺仙籙名偶聖朝追想遺塵載殷遠念故玉清觀道士贈太中大夫昇真先生王遠知性與道合神從化游初窮帝解之微自得天倪之理時歷三代韞祕術以韜光年逾十紀屬睿圖之啟運藏往知來察幽鑒遠亟符先渥緬惟贈卹之恩聿申後命宜峻襃崇之禮可贈金紫光祿大夫昇元先生餘如故主者施行朕聞大隱忘情不去朝市至人無迹何所凝滯王高標峻尚雅操孤貞有咸一之用宏體二之德學究深遠理詣精微草芥貂蟬錙銖纓紱蔭松山而辭竹苑去朱邸而就清溪逍遙林壑傲睨箕潁有年歲矣朕虔膺聖鑑重闡皇基保乂邦家輯寧區宇求賢採彥俯谷窺山王之所居接近嵩岳長望高烈思滿風煙將令移蹕具茨追尋大隗鳴鑾峒岫詢問廣成機務殷繁有懷莫遂今遣國子司業杜慎盈以禮命徵辟掃夔龍之第虛稷契之筵神化丹青朕之志也豈以黃屋之貴傾彼白雲之心通變之宜希從降志延佇閶闔若在汾陽敦夷齊之行可以激貪尚顏閔之道用能勸俗新除太子中舍人王友貞德義泉藪人倫茂異孝愛始於事親忠信表於行己富有文史廉於財貨久歷官常累聞課績有古人之風保君子之德乃抗志塵外棲情物表深歸解脫之門誓守薰修之戒頃如徵命作護儲闈固在辭榮累陳情懇堅持淨義不登於車服惟悅於禪向味靡求於珍饌朕方崇獎廉退懲抑澆浮雖思廊廟之賢豈違山林之願宜加優秩仍遂雅懷可太子中舍人員外置給全祿以畢其身任其在家修道仍令所在州縣存問四時送祿至其住所故紀王女東光縣主忠性純孝雅操貞烈感興運之方啟痛亡靈之不追休戚是同悲喜交集發言鯁塞因致殂謝聞之傷惋震於予懷忠孝之情深可嘉尚宜命史官編入國史虢州人故楊初成往者運屬殷憂志懷忠讜將迎六飛之駕奄罹五刑之罰身既伏誅家又從坐言念誠節深可哀矜宜有襃榮式旌忠順可贈左騎衞左一府郎將卿履謹尚遜忌盈戒滿詞志勤勤請謝王位然懸爵所以勸善申至公也裂土所以疇庸非徇私也故漢德之盛異姓而王者八人魏祚之隆同功而邑者千戶今卿列爵之貴未越於漢圖食邑之豐纔半於魏制而遽形牘一何甚也朕承三代之丕業荷七廟之威靈惟唐據承祧之尊於周保元良之重至於復予休命配天大業雖歷數有歸亦謳歌所繼然狐鼠不掘終貽城社之憂頑兇未除實負朝廷之懼卿誠亮白日忠勵秋霜懷直道以立身固一心而徇國自二兇搆患潛圖不軌惡跡初彰釁萌始露卿之大節義在不虧烈士之首期於必碎及難作宮禁禍生肘腋卿上銜天命外發兵符行正卯之戮既於兩觀磔蚩尤之屍俄成四冢曾不延晷鬱成大功分壤錫珪固其宜矣行當勉以自愛享此睂壽乘几杖之榮極鄉園之樂崇讓小節念勿為也則天大聖皇后往以憂勞不豫兇豎弄權暉等因興甲兵剗除妖孽朕錄其勞效備極寵榮自謂勳高一時遂欲權傾四海擅作威福輕侮國章悖道棄義莫斯之甚然收其薄効猶為隱忍錫其郡王之重優以特進之榮不謂谿壑之志殊難盈滿既失大權多懷怨望乃與王同皎窺覘內禁潛相謀結更欲稱兵絳闕圖廢椒宮險迹醜詞驚視駭聽屬以帝圖伊始務靜狴牢所以久為含容未能暴諸遐邇自同皎伏法釁跡彌彰儻若無其發明何以懲茲悖亂迹其巨逆合寘嚴誅緣其昔立微功所以特從寬宥咸宜貶降出佐遐藩暉可崖州司馬柬之可新州司馬恕己可竇州司馬元暐可白州司馬並員外置郭山惲業優經史識綜古今八索九邱由來遍覽前言往行實所該詳昨者因有豫遊式延朝彥既乘歡洽咸使詠歌遂能志在輔時雅申諷諭謇謇之誠爾切諤諤之志愈明宜有襃揚美茲鯁直可錫時服一副中天竺國大首領大野迷地羅梵摩等殊邦慕德重譯來朝是加襃獎用益誠心可果毅都尉賜緋袍銀帶放還蕃卿等累覃邦化多歷年所城池郡邑冠蓋相望往緣邊牧非人遂令卿等失業念彼雄藩鞠為茂草今卿等削摧異俗歸誠本朝頻獻封章益明忠款克復州鎮宛如平昔失活將尚公主永為藩臣入拜闕庭良深慰喜卿等涉路遠來得平安好否近屬節假不得早與卿等相見且向曹司安置待後進止國之大綱惟刑與政刑之不中其政乃虧劉光業王德壽王處貞屈貞筠鮑思恭劉景陽等庸流賤職姦吏險夫以麤暴為能官以凶殘為奉法往從按察害虐在心倏忽加刑呼吸就戮暴骨流血其數甚多冤濫之聲盈於海內朕惟新布澤恩被人祇撫事長懷尤深惻隱光業等五人積惡成釁並謝生涯雖其人巳殂而其跡可貶所有官爵並宜追奪其枉被殺人各令州縣以禮埋葬還其官蔭劉景陽身今見在情不可矜特以會恩免其嚴罰宜從貶降以雪冤情可棣州樂單縣員外尉自今內外法官各宜敬慎其文深刺骨跡徇凝脂高下任情輕重隨意必置嚴典以彰癉惡其酷吏邱神勣來子珣萬國俊周興來俊臣魚承煜王景昭索元禮傅遊藝王宏義張知默裴籍焦仁亶侯思立郭霸李仁敬皇甫文備陳嘉言等其人巳死其垂拱巳來枉濫殺人有官者並令削奪唐奉一依前配流李秦授曹仁哲並與嶺南惡處故司空勣往因敬業毀廢墳塋朕追想元勳永懷佐命昔竇憲干紀無累安豐之祠霍禹亂常猶全博陸之祀罪不相及國之通典宜特垂恩禮令所司速為起墳所有官爵並宜追復
