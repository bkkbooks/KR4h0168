front:
  text: 全唐文欽定全唐文卷四百二十一炎字公南鳳翔天興人肅宗朝禮部郎中知制誥遷中書舍人德宗立拜門下侍郎同中書門下平章事轉中書侍郎罷為左僕射貶崖州賜死年五十五後詔復官諡肅愍左丞孔戣駮之更曰平厲
  hash: sha256:02b85e2d94b603db3ed0f2016f60566d8ae1e57b701c84a92005b5d554e86f18
