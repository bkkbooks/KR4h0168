body:
  text: 臣聞享天降命惟德也戡難奉時惟聖也必有非常之運是興撥亂之功以蒼生為憂不以濡足為患以寧濟為業不以修身為道此陶唐所以捨而不畏舜禹所以受而不疑靈武舊宮皇帝躍龍之所日者姦臣竊命四海蕩波我聖皇天帝探命歷之數啓龍圖作受命之書付與我皇帝皇帝方遊崆洞以求至道於是㣥公卿士負玉旒金璽望氣於芒碭之野三進於閶闔之中曰臣聞在昔蚩尤連禍大盜中國神農氏兵莫能勝天降元女敕軒轅氏大定其災厥後堯有九州之害而命禹禹以四海之功而受舜陛下主鬯大位十有九年精爽者皆美德馨乾坤也必聞幽贊元德上達景福有歸六聖覩命歷之期兆人有臨難之請陛下畏災運而不取棄黎元而不顧以至仁為薄以大寶為輕臣等若不克所請與億兆之衆將被髮拊膺號於天而訴於帝矣皇帝唯然改容曰豈人心歟丁卯廣平王俶太尉光弼司徒子儀尚書左僕射冕兵部尚書輔國與北軍將士西土耆老萬五千人排闥以訴帝曰今豺狼穴居宮闕陛下兆庶為餌宗廟為墟若臣等誠懇未通是高祖不歆於太廟且陛下涉渭則洪流涸回鑾則慶雲見布澤而川池廣勤道而嘉禾生靈祇髣佛元貺幽感臣聞符命待聖而作天運否終而會葳蕤肸蠁會也睿武英明聖也臣等敢昧死上聞帝乃灑齋宮啓金匱嗚咽拜受詔有司大赦天下改元曰至德元年尊聖父為文武大皇帝是日煙雲變作士庶踴躍黃龍見於東郊紫氣滿於天門翌日也數百里衣裳會兼旬也數千里朝貢會踰月也天下兵車會浹時也四方戎狄會以一旅成百萬之師率胡夷平社稷之難禮郊祀戴聖皇與人合誠心以氣消夭癘動罔不吉歆無不報是以白鹿擾於王庭靈芝産於延英化動而功成淵默而頌聲言禪代者陋蒼梧易姓之名語嗣守者羞陶唐積善之辱述戡定者歎四紀而復夏美中興者嗤四七而滅新於戲神祇之所歸往品物之所法象鼓飛龍於尺水仗大義而東向矢謨發號實在茲都願篆石宮庭以垂萬古俾過山澤知風雨之奧窮造化識天地之蘊臣炎稽首敢獻頌曰赫赫河圖啓天之祜雲從億萬皇在九五惟昔陶唐克傳舜禹濩也武也夫何足數彼妖者勃惟暴惟貪天實即命人將不堪皇曰內禪於再於三盡武之善去湯之慙兵車百萬洶洶雷震橫會九州為行為陳恃力者踣從命者順孝以奉天神而撫運至德唐堯崇功大禹皤皤北叟垂白而覩沛邑空歌周原已古排律頌聲永介茲土舜有兩階之舞周有孟津之會皇帝有岐陽之搜德莫勤乎安國勛莫配乎立極利萬物莫近乎去暴蓋受天元符與人請命冥契相合億兆有歸以昌則感神鬼之心以征則去雲雷之難維唐七葉姦臣犬吠於二京皇帝龍鳴於河北觀兵雍上建都發號以朝萬國心嚮天地志通幽昧淳精四達大造元成於是巢山駕海之㣥狼纛鳥章之君不期而趨於闕下者四十有三萬元帥廣平王俶太尉光弼司徒子儀等稽首言曰臣聞天啓聖以俟時聖感時而赴難非神功不能當大運非元德不能合人心故軒轅之道也伏蚩尤宗周之仁也稱襁負陛下之德大瑞於人和人和而動天天與和合氣百姓因之以獨化四夷因之以子來王師得之以貞勝意者河洛徯怨後東征之期人靈駿奔望西狩之禮天子方齊寶輅講金匱之書翌日霓旌武賁大車之輪黃鉞靈鼉彤弓太阿荊韓楚魏之廣七閩五獠之長金鼓百萬車徒九合大陳於東郊皇帝建白旄以誓於軍曰維高祖歆於上天四宗重光照臨下土百有五十祀至於聖皇總武之干戈備文之法象蕞爾逆虜敢迷天紀盜我符璽黷我威靈使四海之內兵革縱橫肝腦塗裂昊蒼降鑒錫命於豫俾纘夏已墜之功寬堯未刑之族於戲余匪玉帛山河是愛惟蒼生災害是憂匪天命威力是憑惟人心忠義是保咨爾張目成天羅植髮成干櫓布和成將帥厲氣成風雲若作進退爾惟旗鼓若斷首尾爾惟常蛇若戮鯨鯢爾惟干將若拯沉溺爾惟巨艦夏有一旅之衆武有十人之謨志定金石信非盟誓爾其念哉是時天威動六合兵氣連太白乾坤為之坱軋河嶽為之振蕩彼狐鳴鑿齒之徒不崇朝而聲反於謳歌形歸於蹈舞者幾過半矣故鄠杜之師以形勝灞上之凶以威逐桃林之陳以奇破河洛之孽以氣摧帝乃開天牢回豹尾陵皓氣掃欃槍應龍秉鉞元女侍坐乃考夏氏配天之義備漢皇建武之典雲髦玉輅山動地踴降自西雍幸於京師萬姓前導百靈為衛布德澤望陵寢悲黍稷之將秀覽城闕之為墟以雷雨洗川澤以皇風清怨怒以大賞議勤勞以成功告宗廟以祥刑去聾昧以惠政哀困窮清蹕而奉聖皇稱觴以朝前殿於是東國耆老長安士庶排玉輅入天庭動千門呼萬歲煙雲下繞林藪山回神靈頌於堂精魄感於廟王侯慶於國父子洽於家鐘石反於懸罍俎陳於席華戎踴躍喜氣磅礡日退三舍天聲萬里神謀不得窺其奧天道不能後其時斯一會之略也然後動變化為爐假仁義為途陶氣象鑿耳目與人合司契以道浸澆醨全犀象之形斷珠玉之脛然後以景星燭夜甘露清氣升閬風對天姥捨鴻名以還太素乘大歷而統人紀俾不思而降不祭而歆以元和感生淳古於是宰臣聚而言曰主上以神武清難至德遂人崇勛絶瑞光照萬古開闢日月於今六年百姓豈忘功於帝乎人臣盍謝生於天乎請相與鑿石於誓師之場告成於得衆之地斯王道之盛典臣炎稽首敢獻頌曰天命帝兮蕩妖昏交風雨兮會秦門惟聖德兮漫海外五單于兮勇士會俗鳥獸兮家雲島越浮山兮泛青草徵羽騎兮列天營啓金縢兮賜長纓日為車兮雷為鼓醢鯨鯢兮掃煙雨開明堂兮饗文祖帝為皇兮后為母歌雲臺兮册玉府篆穹石兮駕終古維唐至德二年春正月武威郡胡洎九蕃夷落內伺師旅之間外合狼豕之凶據金城害州伯蛇變交戟之下炎焚大澤之中二月乙丑皇帝以五命之服詔太僕崔稱總中權專上將誓軍前之士卻城下之盟又命內常侍劉日新振鼓鐸之音護羌戎之長林竦蝟合會於東郊粵庚午高牙大斾鐵馬長鎩噴以清笳陳以雲蛇列於四衝蓬頭執戟鼓以靈鼉進於逵路趫悍獷癸虎裘猿臂北陵於土門之隊鉤車雲梯強弩堅楯齊傅於西烽之亭於是引熊虎之師杖龍蛇之劍矛戟四起煙塵火色金鼓一振天地徘徊血亂元黃聲囂瓦屋是風雲皆入陳彼草木盡為兵日月垂照於窮鄉皇靈赫臨於天外名王貴馬大玉文貝素女錦衣百金之産萬井之資皆委於入貢之府布於有地之宮是時也千人踊萬人賀美太階之符見頌偃伯之議興特進金城太守李萬頃洎五邑長吏軍政大夫等言曰蓋聞王命先天以奉時賢臣合統以偕運靡乘乎帝籙不能撥亂罔應乎間氣不得遭逢故大人之作必先靖難以摧凶取暴為治國以任賢仗能為建功磅礡乎茅茨之下葳蕤乎元古之上使軒轅得之以勝蚩尤大夏得之以勝有扈西伯得之去殷伐崇我太宗得之奄有遼海上皇得之克平巨猾陛下得之再清宇宙掃蕩氛孽允若大唐之新命復高祖之天下臣等恭惟六聖騰光百有五十祀周賁海宇鋪敷菌蠢丹穴之賮孤竹之君金罽括羽委命下吏陛下建大號纘鴻業歸勛祖禰昭事聖皇是必天錫忠良佐成命器二臣所應皇運之統伏崇羽之凶太康西人永永來裔願篆石志美以為頌云詔虎臣兮殪天狐載火旗兮耀昆吾霽塵壘兮被戎都門下王制以二老分理諸侯則周召之任及乎漢魏以還多亦軍國兼總絳侯所以參掌武事安石所以外綏戎政况華夷甫寧金革方偃實在於文武戮力上下同心則輔弼之臣豈憚勞也金紫光祿大夫門下侍郎同中書門下平章事持節河南副元帥都統河南淮西山南東道諸節度行營使兼東都留守王縉體含元和器蘊金璞以才茂邦傑以識通時化叶我期運任當衡石竭股肱之力開耳目之明陟於艱難致君以道統是經術麗茲闕人屬江淮海岱之虞總授鉞旌旄之寄鎮禦方夏撫寧師人保合太和總宣庶績忠而佐命功比安劉勤以施下惠同思杜叶藩維之志建竹帛之勳闕二字朝謨載申啓沃與二三髦碩同力叶誠俾豫端拱以宏至道乃眷北土古之幽都限夷既雄負海稱固思致於理言恤其人爰藉台臣宏敷廟算持薊門之麾斾兼遼陽之鉦鼓俾膺戎重式允時望可兼幽州長史持節充幽州節度副大使知節度事餘並如故門下東周以召公相宅西漢以蕭何居首則保之寄多屬輔臣今以廟堂碩老坐而敷政和恆居師用乂厥服特進行門下侍郎中書門下平章事山劍副元帥太清宮使崇元館大學士上柱國衛國公杜鴻漸誕受天和陶合一氣德言敬直動於神明定義中興光贊大業陳三代之禮樂成一朝之制度雄詞奧學洞究天人以道弼豫於茲五載每有大事乃心忠勤至於危難尤思赴蹈叶和堂上之謨匡濟天下之務出鎮梁益西南晏然人之具瞻朕所毗倚實仗宏化兼撫東郊宜以二南之風用增九鼎之重可兼東都留守餘如故主者施行敕朕聞君臣之分義固金石將相之職任同安危在昔哲王罔不注意體合股肱則付之以大位道形終始則載之以丹書所以保親諸侯宏樹一德者也朕自纂統於茲三載兢兢業業日慎一日任夫難任安夫難安實賴公侯藩輔作鎮於外將帥戎士盡瘁勤王冀忠賢之同德躋億兆於仁壽思達寤寐動推至誠大開胸懷彰示天下雖姦邪不逞搆造異端離間往來反白作黑下動危疑之勢上陳似是之言焚其表章前後數四未嘗不置以極法竄於窮荒庶夫讒諛杜口謠妄卷迹中外上下俱臻大和豈止同體之不疑萬方之知我而已金紫光祿大夫檢校刑部尚書襄州刺史山南東道節度使梁崇義往以邦家不寧襄漢未靜奮自諸將纍建戎勳忠謀僉一保大安衆授鉞南紀表正江山勤輯士人克謹侯度惠化周洽俗阜風移踰二十年績用光備內修貢職首課方州朕夙茂勳德用崇爵命而忠規益勵亟請來朝期啓乃心以成吾事尋以郭昔鄭茂勳鄭和叔等姦謀參會庸狡妄作朕雖聽斷無惑置以嚴科猶聞疑二不安外求援助是何顛沛以舉謂我齷齪而闕憮然懷想深用歎惜夫禹湯前古之聖后也一夫不獲有納隍之懼齊桓霸者之中人也舉讎棄怨致九合之功朕上而為君子有萬國涉道日淺誠明未敷使心腹耳目之臣負義懷忠之士坐相猜阻交質往來搆此異端頓虧大節頃亦頻遣將命諭達至情近得章奏猶云隔在恩外言之有犯豈為是乎終用咎悔永思更始今豫命爾檢校戶部尚書同中書門下平章事餘並如故兼賜以鐵券鏤其庸期於永終與國無極是表至公之舉用昭勿二之懷嗚呼其敬之哉無再聽邪説無外蓄私心唯臣道是固惟國章是守天命可畏敬順豫言其管內諸將三軍官健久勤征鎮咸著忠勞數年已來未更敘録比類諸道實合甄收其大將委中書門下即條件進擬自餘委本使一月內具名聞奏仍令殿中侍御史張著與使孟遊仙同往宣諭布告軍府令悉朕懷凡百役之費一錢之斂先度其數而賦於人量出以制入戶無主客以見居為簿人無丁中以貧富為差不居處而行商者在所州縣稅三十之一度所取與居者均使無僥利居人之稅秋夏兩徵之俗有不便者正之其租庸雜徭悉省而丁額不廢申報出入如舊式其田畝之稅率以大歷十四年墾田之數為準而均徵之夏稅無過六月秋稅無過十一月逾歲之後有戶增而稅減輕及人散而失均者進退長吏而以尚書度支總統焉蜀地富饒寧據有之貢賦不入與無蜀同若其有功則義不可奪是蜀地敗故失之勝亦不得也不若留寧發范陽戍兵雜禁兵往擊之何憂不克因得納親兵於其腹中蜀將必不敢動然後更授他帥使千里沃野復為國有是因小害而收大利也財賦者邦國大本而生人之喉命天下治亂重輕繫焉先朝權制以中人領其職五尺宦豎操邦之柄豐儉盈虛雖大臣不得知則無以計天下利害陛下至德惟人是恤參計敝蠧莫與斯甚臣請出之以歸有司度宮中經費一歲幾何量數奉入不敢以闕如此然後可以議政惟陛下審察皇帝肇建節制之任位以上將主四方之兵濟河而西五侯四將十有六縣大海磅礡乎終始山河回流其左右旄頭虎力之徑劍服穹廬之長煌煌乎長轂千乘橫合萬里皆主乎是邦故秦已上為戎都漢已下為巨防有城府襟帶焉有良將大勳焉有五都汚雜焉其風悍其國險鮮車龍服囂然相蕩非古之戰守曷以成其業而樹其風者哉昔在武德之初上用雄武大才則我隴西李王肅明乎神化大冡宰宇文公駙馬喬公出將我前軍中興之後循吏繼作則館陶侯郭公爽鳩氏司馬公相國韋公蕭公庶績交修以被升平之化當今王室多故雲海沸騰則僕射哥舒公以縱橫之奇判總軍國其意者將復用雄武大才乎君子曰武德之官神以略其化成中興之政儉以行其俗阜當今之理動以闔其人安宜乎盡天下之才隨質文之變以永來裔大康乎斯時天寶十二年夏六月記周有召伯樹王風之始漢得留侯稱佐命之傑功赫於帝典名鏤於河圖維唐之受命大殪戎於西周皇帝感黷武之風思二南之化詢求卿士惠澤窮荒乃命兵部侍郎杜公名鴻漸自河登車主盟西塞公英明博達淳粹先覺碩德漢庭之老中興佐命之勛體含一氣精合五老伊昔皇運中否河海風塵天子方偽遊北門之野公負霸王之略感社稷之危緬懷風雲以身許國隱括王道旁觀歷象謂宇宙不可終閉兆庶不可無君龍吟空山雲起大澤追昌言以排世難告天命以成帝業日月盡蝕載之高懸鯨鯤躍波戮而為醢史也奏嚮天之樂儒也觀嗣夏之書故登朝為夔龍纂戎為方召至於是邦也清其心而妙其用厚其惠而感其和與物也氣之陽春含靈也工之士冖柘籥以為獷俗不足以勸賞故先悅以茂功貪人不可以害㣥故問罪以去姦訛言不可以疑衆故畢詞以為戮於是八藩以之匍匐三師以之投褒㣥盜以之出奔巫人以之伏死古之作者不貴成功貴以德不憚濟世憚先仁樂生下齊明道者謂其強孫武講軍事上者知其固西門禱河明刑者恨其暴子玉佐楚治兵者慮其剛而公形體兼才智周乎萬類之變嚮合乎四會之中是神降歟詩云愷悌君子民之父母其來也邱陵如無其去也風雨可懷故吏兼侍御史唐朝英洎邑老其州長吏陳奉先等以炎耳目馨香記之篆刻庶乎觀斯文者有襄南之慕頌遺美者深潁上之風銘曰彧彧杜公虯蟠於奧人美其華我覩其操王用謨畫大邦以造三錫輅車纂戎之號威肅惠時明神所勞何彼塞翁靡人仁報徘徊頌石永代作好西北之巨鎮曰燕支本胸奴王庭昔漢武納渾邪開右地置武威張掖而山界二郡之間連峯委會雲蔚岱起積高之勢四面千里陽崖有栝柏之材備幹革陰壑有堅剛之璞化五兵維人氣雄其畜多馬虜得之以制陰國主天街周以之興秦以之霸漢得之以斷右臂却南牧西距於海北瀦於河自外而望上也熊熊乎一氣旁蔭朔鹵前衡塞門與積石來朝崑崙相長洎陟蒼蒼臨峻極則形變六合空同大荒青冥在混元之中絶壁揭宇宙之外舊史云封祀之山八中國之外三自夏缺壤奠漢疆土宇時更百王莫能配天其意者將纘禹之業以俟聖人乎維唐百有十載賁元化之紀息金革之虞茫蠢蒸然萃於聖澤於是左丹穴右崆洞古所未賓咸頓首於路門之外天子登神宮勒金版將復義於㣥嶽告成於昊蒼議夫此山天合氣以正秋方地與神以主西國俾虯螭者為師為旅貔虎者為妾為臣不在於巨靈乎其封神為寧濟公錫之鞶帶備厥禮物詔邦牧太子少保哥舒公卜吉日築祠於高麓之陽每歲盛秋以笙鏞之器錡釜之品率封內以望之索㣥神以會之亞旅師氏旄頭弩牙金鼓七校車徒十萬從饗於廟庭大閲於山外所以因天界以崇聖功乘地險而恢遠略也觀夫叢巖懸抱煙雨屑窣宮庭晃其間暮林石古而幽陰神其居之可以禱安靜矣拊空桑變鍾石神其聽之可以感和樂矣大玉通帛熊蹯桂漿粲其傾筐采章煌煌神其歆之可以祚有年矣維石巖巖日月不老維靈是與生此熊羆神其薦之可以奉吾君矣於戲陳信克享正詞幽感宜乎有祈而降有祭而歆龍也無風雨之蛇也無氣焰之作此神之職又何羞焉乃作頌曰揭靈山兮天地界勢奔突兮風雲駭峰蹲龍兮入天門氣變蛇兮煙嵐昏祐自天兮得終古被華蟲兮駕朱虎
