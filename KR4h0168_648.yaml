front:
  text: 全唐文欽定全唐文卷六百四十八元稹二
  hash: sha256:eeabbce50e3c2be26f3340ab1e922ce8b20dd824942d0f4a2a0dcca14606c8b2
body:
  text: 敕宣議郎內侍省宮間局令賜緋魚袋劉惠通願吾愛之俾在左右將我密命達於四方去盡行人之詞還致諸臣之復言必忠信事無尢違使朕不出戶而知三軍之意者爾有力焉深念其勤將以為報階秩兼進用示恩榮可依前件敕夫一邑之政而猶資老者之智用壯者之決况朝廷之大得不以耆年重望居表正之地以儀刑百辟乎惟爾金紫光祿大夫檢校尚書右僕射兼吏部尚書韓臯始以直言事代宗皇帝司諫諍復以文章政術事德宗皇帝為舍人中丞京兆尹在順宗憲宗時出領藩方入備卿長逮豫小子歷事五君勤亦至矣而又處權近之位未嘗以恩幸自寵於一時當趣嚮之間終不以薄厚見窺於衆目豈所謂徐公之行已有常而詩人之風雨不改耶日者銓核㣥才兼勞揆務頗煩倫擬有異優崇罷去職勞正名端揆俾絶積薪之歎且明尚齒之心凡百庶僚無忘咨稟可守尚書左僕射餘如故敕尚書郎會天下之政上可以封還制誥下可以升負牧守居可以優遊殿省出可以察視違尤非第一流不議茲選守職方郎中上騎都尉韋審規等皆歷踐臺閣嫻達憲章或滿嵗當遷或擇才斯授皆極一時之妙足為三署之光於戲提紀綱而分命六聰左右司之職甚重登生齒以比董九賦人曹郎之任非輕勉竭彌綸之心勿虛俊茂之舉可依前件敕義成軍前度支判官朝議郎檢校刑部員外郎兼侍御史上柱國賜緋魚袋羅讓昔陶宏景一代高人始願四十為尚書而猶不遂國朝選署尤用其良以爾讓敏而好學直而能溫甲乙亟登班資歷踐頃將軍辟士權資孫楚之坐籌今曹府掄材復獎馬宮之射策無忘辨護以宣程品日省月試用勸百工可尚書工部員外郎敕朝議郎行左補闕上柱國邱紓諫諍之臣入言於密勿之際㣥下莫得而知然而政有汙崇由爾之得失也朝議郎行太常博士上柱國陳鴻禮秩之官草儀於朝廷之內四方之所觀聽是以察其事為見爾之能否矣以爾紓久於侍從可以序遷以爾鴻堅於討論可以事舉並命省闥足謂恩榮慎乃攸司無違夙夜紓可膳部員外郎鴻可虞部員外郎敕諸道鹽鐵轉運東都後兼侍御史裴注等法者古今所公共也一日去之則百職盡墜是以秦漢以降御史府莫不用剛果徑正之士以維持紀綱季代而遷埋輪破柱之徒絶不復出朕甚異焉去嵗以來比命御史丞為宰相蓋欲慰薦人之不敢為也爾等或以吏最或以文學當僧孺慎揀之初遇朝廷渴用之日又安可回惑顧慮於豪黠而姑以揖讓步趨之際為塞責乎可依前件敕正議大夫行宗正丞嗣虢王溥守隨州司馬員外置同正員李逢等昔我憲宗章武皇帝法堯睦族深惟本枝乃詔執事曰伯父叔季幼子童孫在屬籍者必命卿長以才行聞而溥等國族之良雅副茲選糾訓㣥僕允王官各率乃誠無替厥職溥可權知太僕少卿逢可守袁王府長史餘如故敕張籍傳云王澤竭而詩不作又曰采詩以觀人風斯亦警豫之一事也以爾籍雅尚古文不從流俗切磨諷興有政經而又居貧宴然廉退不競俾任石渠之職思聞木鐸之音可守祕書郎敕環太微諸星有上將次將之列所以拱衛宸極誰何不若豫置上將軍以禦侮率是道也前皇城留守張奉國謙能養勇明以資忠卑飛翕翼於未擊之前痛心疾首於見危之際常一作能擒狡猾克定妖氛行賞計功屢升榮級朕愛其忠厚難以外遷稍移婁胃之間不失爪牙之任為吾守禁勉爾干城可檢校兵部尚書兼左衛上將依前充皇城使敕十二衛大將軍典掌禁旅張皇六師猶藩垣之捧宸極也為任不細是以出則授以弧矢驅犬羊於虜庭入則委以爪牙領貔貅於魏闕中外遞用僉謂恩榮前朔方靈鹽定遠等城節度副大使知節度事觀察處置押蕃落等使元從奉天定難功臣開府儀同三司檢校工部尚書兼靈州大都督府長史大夫上柱國安定郡王食邑三千戶杜叔良將門之子不墜弓裘頗閲詩書素明韜略頃以五原近寇禦侮才難遂俾驅攘實資毅勇星霜屢換節制斯勤雖不立奇功而無忘慎固尚多毗倚乃命徼巡勉服新恩以彰前效可驃騎大將軍行左領軍衛大將軍元從功臣勳封如故敕薛昌朝等國有政職之要其一曰具員所以稽績用而升秩序也爾等典掌衆務勤歷一作勞嵗時無畏一作疒衆厥官能舉其政擇才以佐諸邸選士以列東朝亦吾蘊崇本枝之意也爾無易之可依前件敕王自勵左右禁旅非才力過人而忠厚謹信者不在壁壘庫樓之地惟爾自勵備吾選中平蔡之師亦有功伐追思舍爵之賞擢授曳裾之寮特示新恩且仍舊職可檢校太子賓客兼原王府咨議參軍依前殿中侍御史如故敕建邦之王府置長史司馬以紀掾屬之秩序而稽其職業也前寧州刺史薛昌族前泌州刺史烏重儒等皆勳伐之子孫並良能之牧守朕河山在念肯忘獎勞藩邸求才實思高選昔阮孚以嘯咏自樂龐秀有忠烈可佳更任王宮咸稱國器今之榮授其在茲乎佇移汝理郡之方以豫維城之固昌族可行絳王府長史重儒可守冀王府司馬散官勳如故敕具官楊巨源詩律鏗金詞鋒切玉相如有凌雲之勢陶潛多把菊之情朝請郎前守華陰縣令郭同元文戰得名吏途稱最劉超推出納之善王渙著抑挫之名皆用巳長各居官守固其滿秩議以序遷稽其器局之良宜參尹正之亞巨源可守河中少尹同元可權知興元少尹敕王師魯等古稱南海為難理蓋蠻蛋獠俚之雜俗有珠璣瑁之奇貨為吏者不能潔身無以格物是以非吳處默之清德不可以耀遠人非孫子荊之長才不可以參密畫爾等皆當茂遷取重元戎更職命官各如來奏可依前件敕崔鄘等翺等近制藩府臣僚自軍司馬以下皆得選任其良執事者所移異職而鄘等事訴以狀聞各以秩遷毗於新邑勉爾誠志俾無尢違鄘可監察裏行充澤潞等州觀察支使翺可協律郎充昭義軍書記敕兵部郎中佐夏官理邦國以平不若辨九法九伐之重輕稽五兵五楯之衆寡非踐更臺閣從容聞望者不在茲位流品既清選任彌重朝議郎守尚書考功郎中上護軍賜緋魚袋蕭祐才行忠信達於豫聞課吏陟明誕若攸職拾青紫於儒術擅金石之揮毫允謂賢能宜當慰薦可守尚書兵部郎中散官勳賜如故敕劉泰清文武並用必推其才久次不遷則有升敘以爾踐更吏職星嵗頗淹例當酬勞用進常秩分我武衛以列周廬斯亦信臣之任也其勤厥職式副豫恩可遊擊將軍守左武衛將軍敕郭皎材任爪牙姻聯肺腑領轅門之右廣假桂苑之元寮夙著威名嘗頒勇爵元戎啓狀慶澤覃恩宜輟豹韜之雄以資雁沼之畫可行冀王府咨議參軍餘如故敕莒王府司馬王承迪恭王府咨議參軍賜緋魚袋王承慶等乃祖乃父有勞邦家而承迪等亦效忠於我伯仲叔季罔漏恩榮或典方州或升清貫惟恐未稱豈礙彞章兼秩憲臺勉當優異承迪可守普州刺史承慶可莒王府司馬兼侍御史賜如故敕裴寰等尹正務重自掾屬巳下至於邦畿之長往往選署以聞從而可之亦委任責成之義也以爾等或理謀居最或保任稱能將委劇曹亦專近邑各懋乃職用酬爾知可依前件敕邵伯聽事於棠陰之下而人勿翦其樹我知之非忠信仁愛以得之耶今自關東由洛而右數百里之地盡置為軺車臣所理蓋有以表率方夏張皇京洛聿求其良用副優寄朝請大夫守華州刺史兼御史中丞衛中行始以詞賦深美軒然有名甲乙符升遂拾青紫逮其書命文鋒益銛能搴菁華以集麗則出補近郡號為廉能勤而不煩簡而不苟郊迓館穀賓至如歸長劭農人咸用胥悅移領巨鎮疇將爾先况封壤因連習俗參合用之政乂關陝之氓吾固有虞於爾矣至於觀聽他邑儀刑下寮旁臨傅説之巖特假趙堯之印遺風未泯官業具存苟能行之無患不至可守陝州大都督府長史兼御史大夫充陝虢等州都防禦觀察處置等使敕鄭仁弼諸侯辟士古實有之近制二千石以上乘軺車者則開幕選才由古道也仁弼等有勞參畫重允以聞威等著稱詞華䎖亦致請臺省茂膺兼命式示恩榮無忘切磨用副匡益可依前件敕前劒南三川榷鹽判官殿中侍御史內供奉蕭睦前知鹽鐵轉運山南東道院事殿中侍御史周載等由文學古施於有政三驗所至莫非良能河池近藩南平東險綏戎阜俗必藉長才副我虛求一作懷牧茲凋瘵事時農勸用節人安三年有成惟乃之效睦可鳳州刺史載可渝州刺史敕王陟等列諸侯之賓者遷次淹速得與上臺比倫其或饋餉務繁參畫禮重亦得輟自他職副其所求爾等或以政聞或以藝舉守臣上請信不豫欺各竭乃誠以修厥績可依前件敕盧崿等宣城重地較緍之數嵗不下百餘萬管幹劇職靈鹽近戎分務簡僚不易宜稱爾等研究儒術修明政經勉慎所從以承其長可依前件敕楊進頃者師道潛遣凶徒將焚京洛姦謀指日忠告先期俾無赬尾之災實賴赤心之效雖居禁衛未免食貧言念前勞宜沾厚秩式佐郡府仍壯軍容尚旌撲滅之功以示優崇之賞可守亳州長史仍令宣武軍節度收隨要中驅使門下惟梁州會險形束襟帶皇都南開蜀國西控戎落地宜用武政必兼文茲惟信臣膺是專委橫海軍節度使烏重允才本雄勇器惟溫茂承纍將之業不以驕人歷重兵之權每思下士沉威不耀至信自彰立奇節於遏亂之初成休勳於蕩寇之日焯然來效夙簡朕心自經理海邦訓齊戎旅災荒之後安阜為難政以和均人斯悅勸善績可舉壯猷克宣是用遷鎮近藩更宏遠略恢復西土尹正南都式寵忠勳宜服榮獎可檢校司空充山南西道節度使敕前成德軍節度巡官盧捷朕以鎮冀數州之地刑賞廢置盡委之於宏正度爾才能宜為長佐且願兼榮允吾台臣是用兩可饒陽大邑無陋厥官可依前件門下夫以區區秦伯而猶念晉國曰其君是惡其人何罪况朕均養億兆為之君親燕人冀人皆吾乳哺而育之安忍以豺狼驅脅之故絶其飛走盡致網羅止行犯命之誅是用開其一面河東節度觀察處置等使金紫光祿大夫守司空兼門下侍郎同中書門下平章事太原尹北都留守上柱國晉國公食邑三千戶裴度昔者區域之中蜂蟻巢聚蔡有逆孽齊有狡童厥初圖征疑議滿野不懼不惑挺然披攘苟無司南允罔能濟佑我憲考為唐神宗實惟股肱運用心力肆朕小子蒙受景靈冀服於前燕平於後而撫馭失理盤牙復生求思弭寧中夜有得國有元老夫何患焉用是急宣懇惻之誠就加招撫之命於戲頃者師道元濟乘纍代襲授之資藉山東結連之勢以丞相布畫於千里之外使諸將持重於四封之中而猶劉悟裂蛇豕之驅李祐潰鯨鯢之腹蓋順逆之情異而忠孝之道明也况彼幽鎮無名暴征以丞相進觀其宜以諸將齊奮其力斧鑕之刑坐迫椒蘭之氣外薰誰不自愛其生焉能與亂同死度宜開懷緩帶以待其歸可依前守司空兼門下侍郎同中書門下平章事河東節度使充幽鎮兩道招撫使餘如故門下傳云死者不可復生刑者不可復續是以先王斬一支指殺一犬彘莫不伏念隱悼至於旬時決而行者蓋不得巳也豫於鎮人亦然伏念俟其悛革詎止旬時前命相臣招懷撫諭矜其詿誤示以生門期於盡脫網羅豈欲驅之陷穽而豺狼當道荊棘牽衣雖欲歸之於仁厥路無由而至况王師壓境義勇爭先朕每抑其鋒鋩未忍覆其巢穴是猶愛稂莠而傷稼穡養癰疽以潰肌膚獨懷兒女之仁慮失祖宗之典今上台居鎮算畫無遺操晉陽之利兵驅屈産之良馬舉河東義成之衆合滄景澤潞之師當元翼授命之初乘田布雪寃之頃舉毛拾芥其易可知兼用恩威尚存招致宜令河東節度使裴度充鎮州四面招討使於戲以一城之卒敵天下之師徇猖獗之徒抗君父之命吾哀爾輩死實無名苟能自新亦冀容汝主者施行門下百谷所以朝巨海海不疑其二於我也五嶽所以鎮厚地地不畏其軋於已也故山澤之氣上騰天應之則為雲為雨台輔之精下降君得之則稱帝稱皇是以採㣥疑者終不能成大功推至信者必有以來大順况朕志先定臣誠素通偃七十年之干戈垂千萬代之竹帛非我獨斷安能遽行某官劉總生知禮樂神授機符移孝資忠本仁祖義學弄之始畫地而壁壘勢成言兵之時聚米而山川形具象賢秉哲脫俗遺榮慕清淨以為宗會富貴之來逼自居劇鎮亟立殊勳威定兩藩化行八部日者除凶淮甸易帥常山張吾犄角之雄賴爾股肱之力加以深衷早達密款屢聞求奉浮圖之真願棄全燕之重誠嘉素尚難遂過中縱妻子之可捐豈君父之能捨朕惟鄒魯之地鄆實居多俗尚師儒人推朴厚施之美化豈無衆善之因革其非心寧失大雄之旨是用正名台座重委藩方爾其張我四維敷我五教握龍節以率下露蟬冕以行春宜體夔龍之令圖勿徇巢由之獨行可守司徒兼侍中使持節鄆州諸軍事守鄆州刺史充天平軍節度鄆曹濮等州觀察處置等使散官勳封如故主者施行門下朕聞西方有金仙子自著書云昔我於無量劫中捨國城妻子以求法要朕嘗聞其語未見其人安知股肱之間目驗茲事脫身羈網誠樂所從捨我縶維能無永嘆遂其高尚良用憮然具官劉總五嶽孕靈三台降瑞位兼將相代襲勳庸視軒冕若浮雲棄妻孥猶脫屣屢陳章表懇願捨家勉喻再三終然不奪朕又移之重鎮寵以上公莫顧中人之情遂超開士之迹於戲張良却粒尚想高蹤范蠡登舟空瞻遺象功留鼎鼐誓著山河長存魚水之歡勿忘香火之願宜賜法號大覺仍賜僧臘五十夏主者施行門下古之命將莫不登諸齋壇告於郊廟分其閫限推其車轂非所以寵異崇大而姑息之蓋先王之懋典授之專柄然後遷延者必罪選懦者必懲式所以使恩威并流而人人無辭於賞罰也橫海軍節度滄德棣等州觀察處置等使銀青光祿大夫檢校司空使持節滄州諸軍事兼滄州刺史御史大夫上柱國邠國公食邑三千戶烏重允嘗以懷汝之師南伐叛蔡博大持重不要奇勝不用鈇鉞不嚴刁斗舉必樂信戰必克寸期寇讐知其仁士卒懷其惠梟獍就執第其勳庸雖坐樹不言而圖功甚大先皇帝分命水土換其旌旄俾廉於滄以長橫海幽鎮既亂人心或搖師衆無譁而湯池自固者重允蓋有之矣而又明於斥堠善揣敵情動靜以聞茲實賴汝是用升其秩序以大威聲進位上公式光戎律此所以慰薦爾之忠力也爾其勉之於戲甘之誓曰用命賞于祖不用命戮于社朕奉祖宗而守社稷也其能私賞罰於天下乎賞既不俟於成功罰固難期於後效矣若驚之寵無忘戒之可檢校司徒依前充橫海軍節度使門下昔者魯侯伯禽徒以周公之故遂荒大東重耳以定傾之勞子孫不絶於晉昔我太師西平王在德宗時能復京邑書於鼎彞每懷宗廟之安實念山河之永而又繼其英哲克生令人惟弟惟兄莫非頗牧尚想德施於十代何吝恩積於一門鳳翔節度使檢校尚書左僕射李願生長綺紈之中而素風自得蘊鬱驍雄之氣而性與溫恭怡怡於季孟之間翼翼於班行之內始為夏帥遂著能名蹄角齒毛之良一無取於夷落而不貪之寶大布朔陲洎領徐方會征淮右鄰寇陰狡將鴟張來犯東郊冀延晷刻爾乃提持戈戟淬礪卒徒一戰而蜂蠆盡殲不時而梟獍就戮聿來岐下號令益明繕完甲兵為我保障朕以浚郊重地尢藉長材俾為司空以表東夏持我邦憲用清爾人夫四海九州非不廣也然而靈武魏博至於大梁斷長補短方數千里皆爾伯仲又何加焉於戲睢陽在爾之東張巡效忠之誠尚在夷門在爾之境侯嬴報恩之迹猶存又安知憧憧往來之徒不有以仁義匡於爾者勉服休命其惟戒之可檢校司空兼汴州刺史宣武軍節度使散官勳如故門下朕聞將星明則英豪用靈旗指則氛銷徑草可以受疾風盤根然後見利器苟非處劇何以用長况幽并少年燕趙奇士居常以紫騮自騁失意則白刃相讐將領斯難是先才傑昭義軍節度副大使知節度事澤潞磁邢洺等州觀察制置使金紫光祿大夫檢校尚書右一作左僕射兼潞州大都督府長史御史大夫上柱國彭城郡王食邑三百戶劉悟天與忠誠人推敬讓蘊孟賁之勇不以力聞避廉頗之強使之心服是以居危邦以智勉臨大節以功高嘗見委於先朝屢作藩於右地朕以遼陽巨鎮自我康寧姑欲撫之以仁然後示之以禮而守臣嬰疾幕吏擅權撓政行私虧恩剝下過為箠楚妄作威稜不均饗士之羊徒養乘軒之鶴致滋擾一作撓變職此之由不有將才孰懲兒戲敷求朕志深謂汝諧是用拔奇式冀宣力帖以亞相寵之上公俾光十乘之行以壯三軍之氣可檢校司空兼幽州大都督府長史御史大夫充幽州盧龍軍節度副大使知節度事觀察處置押奚契丹兩蕃經略盧龍等使散官勳封如故門下昔潢池驟變則龔遂亟行河內去思而寇恂來復所以順人情而急時病也况雞澤衡漳附於上黨控帶河洛扼束燕趙其土瘠其人徑養理訓習尢所重難而幽州盧龍軍節度使檢校司空劉悟前臨是邦其政方睦甲兵完利師徒具嚴刑當罪而人不寃賞當功而財不費軍政威而非虐吏道察而不苛州里行信讓之風鄉曲除武斷之患方將久次以惠斯人而難起幽陵救深焚溺輟於既理與彼惟新乘軒才及於邢郊妖彗忽生於冀分空沉台座未辨魁渠豫懷震驚物聽傾駭校其遠邇當有後先遂駐腹心之雄以供臂指之用復還龍節再息棠陰勉受新恩無移舊貫可依前檢校司空兼潞州大都督府長史兼御史大夫昭義軍節度副大使知節度事澤潞磁邢洺等州觀察使勳封如故門下昔楚師多寒楚子巡而撫之士皆如挾纊明號令之可以動人也由是天以雷震蘇蟄氣兵以鼓鼙作戰力高官重秩可以興起人之壯心我無愛焉加以戎師亦所以作萬夫之氣而增一鼓之雄也義成軍節度使檢校工部尚書陳楚茂昭之甥酷似其舅總齊義武於今六年以兩郡之賦輿備三軍之供費民不勞耗而兵能繕完政有經矣今遼陽冀方紛亂交虐楚實間居於此其勤可知自非國之千城物之利器安能為我保障芟夷寇讐欲將激其茂勳夫何吝於好爵加之左揆以盛中權苟有庸功豈無後命於戲書云功懋懋賞言其當也傳曰捨爵策勳言其速也今則寇未平而進律馘方獻而先恩吾於將臣可謂無所負也苟不自效其如法何可檢校左僕射使持節定州諸軍事兼定州刺史充義武軍節度使散官勳封如故主者施行門下吏久其職人安其業此前代所以稱理者也况奪三軍慈愛之師換百姓仁惠之長有迎新送故之斃因朝令夕改之煩自非有為而為曷若且仍其舊前天平軍節度使檢校禮部尚書馬總始以檄奏翩翩早從軍府儒學之外自此知兵踐歷他官所至皆理處馭南海仁聲甚遙還珠之祥前事復出先皇帝以淮夷未殄命相出征總雖元僚亦佐參畫大憝既翦台輔復歸遂以丞相度旌旗授之於總總果善於其職蔡人宜之會鄆寇底平復換麾棨丕變汙俗大蘇惸嫠不時成功周月報政朕飽其聲績渴見儀形如聞就路之初頗有擁轅之戀由是罷徵黃霸復借寇恂誠阻急賢之心姑務從人之欲仍加憲部以壯戎藩勉服新恩用彰前效可檢校刑部尚書依前天平軍節度使門下經曰父母之讐不同天雖及匹夫而猶寢苫枕干以期必報是以子胥不徇伍奢之死卒能發既藏之墓鞭不義之尸取貴春秋垂名萬古而况於身登將壇父死人手家讐國恥并在一門當懷嘗膽之心豈俟絶漿之禮金革無避其在斯乎前四鎮北庭行軍兼涇原節度使檢校右一作左散騎長侍御史大夫田布咨爾先臣惟國元老首自河朔來朝帝廷而又東取青齊北討燕趙提挈義旅勤勞王家冒白刃而不疑推赤心而自信屬冀方求帥余所重難輟自大名付茲巨鎮而中台暗折上將妖侵蟊賊潛置於腹心豺狼勃興於肘腋人神憤痛朝野驚嗟深軫豫懷誓擒元惡以爾布詩書并習忠孝兩全嘗用魏師克征淮孽素行恩信共著勳庸豈無奮激之圖為報寇讐之黨且魏之諸將由爾父而崇高魏之三軍蒙爾父之仁愛昔既同其美利今豈忘其深寃爾其淬礪勇夫敬恭義士一飯之飽必同於卒伍一毫之費必用於干矛非算畫勿萌於心非軍旅勿宣於口居則席藳寒則抱氷以喪禮處之若哀心感者必有為橫身刎頸感智捐軀下報營魂旁清醜類於戲至誠可託稔惡難逃矧彼凶狂去將安往墨縗居體元纛在前提鼓執金無忘哀敬可起復寧遠將軍守右金吾衛大將軍員外同正員檢校工部尚書兼魏州大都督府長史御史大夫充魏博等州節度觀察處置等使勳賜如故主者施行門下士之捐妻子冒白刃忠於許國勇於忘家貢先見之明於㣥疑之際者大則書竹帛以示後次則建麾棨以臨戎功不見圖則勞者何勸忠不見賞則悖者何誅聿求其人用激爾類守右金吾衛將軍權勾當左街事楊元卿衣冠貴胄文武長材嘗求三略之師恥學一夫之敵是以陷豺狼之穴履尾甚危蓄鷹鶻之心卑飛待擊請分金以間楚願奉璧以伐虞身以智全家因義喪誅蔡之始實有力焉及典方州尢彰績效自居環尹益茂勳勤西旅未平實資良帥手叐於不次式佇奇功爾其闢我土疆謹我封守視我士卒如爾子攘我夷狄如爾讐勉竭乃誠以敷朕意珥貂持簡用示兼榮可朝散大夫檢校左散騎常侍使持節涇州諸軍事兼涇州刺史御史大夫充四鎮北庭行軍兼涇原等州節度觀察處置等使勳賜如故主者施行門下鷹隼擊則妖鳥除弧弓張則天狼滅湯沐具而蟣蝨相弔針石熾而癰疽立潰苟得韓盧而示之狡兔則可備俎豆而俟脯醢矣復何憂於越逸乎夫將者亦蟣蝨之湯沐而渠魁之韓盧也我得之矣又何患焉檢校右散騎常侍深州刺史牛元翼挺生河朔之間迥鍾海嶽之秀幼為兒戲營壘已成長學神樞風雲諳曉衆推然諾已任安危善用奇兵尢精技擊陳安之矛丈八顏高之弓六鈞或山立於軍前或肉飛於馬上而又謙能養勇孝以資忠雖膽力過人而心誠許國自常山作沴上將罹災慟哭轅門誓清妖孽羽書三奏驛騎四馳上請廟謀旁徵鄰援指期斬叛克寸已圖功斷自豫衷開懷用爾夫以爾之材力而取彼之凶殘是猶以火焚枯以石壓卵蟲臂拒轍雞肋承拳萬萬相殊破之必矣而况於鎮之黎人皆朕之赤子爾之部曲即鎮之卒徒聞爾鼙鼓之音懷爾椒蘭之德吾知此輩誰不革心爾其寒者衣之飢者食之無廢室廬無害農稼苟獲戎首置之藳街下以報忠臣之寃上以告先帝之廟則蚩蚩從亂豫又何誅於戲殺人盈城爾其深戒孥戮誓衆朕不忍言再換蟬冠新持武節恩不虛授爾其敬之可檢校右散騎常侍充深冀等州節度觀察等使門下王庭湊山東一叛卒也非有席勳籍寵之資強大結連之勢一朝驅朕赤子弄吾甲兵是猶以羊將狼其下必當潰其心腹而猶越月踰時莫見舂其喉者豈非常山無帥趙子弟未有所歸耶翕而受之我有長畫檢校右散騎常侍深冀等州節度觀察等使牛元翼燕趙間號為飛將望其旗幟者莫不風靡雨散圖其戰伐不可勝書而又忠孝謹廉慈仁和惠愛養士伍均如鳲鳩鎮之三軍爭在麾下自領深冀殷若雷霆居四戰之中堅一城之守以少擊衆以智料愚鼓角不驚而梯衝自隕人願為用寇不敢前掃吾氛煙捨此安往前所謂我有長畫莫若命爾以來鎮人是用益以二州超之八座帥我成德廉其四封爾宜來者懷之迷者諭之老者視之幼者撫之狂者遏之逆者絶之惟是六者爾其懋哉可鎮州大都督成德軍節度使鎮深冀趙等州觀察處置等使敕今天下官人之道或幾乎息矣禮樂之用又安能施設於俗化哉是以選賢與能之柄或礙於胥徒冠婚喪祭之儀不行於卿士蠧理害教斯孰甚焉改而更張我則未暇就為之制其在於選任素重之望以鎮之乎金紫光祿大夫檢校尚書右僕射韓臯銀青光祿大夫守吏部尚書趙宗儒等仕宦臺閣周環六僚或三四朝或五十載新進趨風之士更至迭處於將相間而臯等精義不渝物務尢徑事朕小子猶吾祖宗肆豫沖人庭實彪炳夫銓鏡萬品不無倦勤簫韶九成頗延頤養更用舊老以均勞逸至於官業非子敢知祗聽法儀庶用咨稟換保傅之重仍端揆之榮唯恐不多無以優異臯可檢校尚書右僕射兼吏部尚書宗儒可守太子少傅兼太常卿事散官勳封如故敕銀青光祿大夫守太子少傅兼判太常卿事趙宗儒昔叔孫通徒以綿蕝草具之功遂獲封侯之賞况朕始見天地初朝祖宗哀勵祗嚴不克是懼惟爾肇自清廟逮於還官贊導法儀踰於四百俯伏趨數訖無尢違夫何叔孫可用是比顧朕沖昧實賴老成不有甄升孰明勤盡奉常正秩左揆兼榮六樂九儀興替在此無忘勗率以厚人倫可檢校尚書左僕射兼太常卿散官勳如故敕中大夫守御史大夫賜紫金魚袋李絳昔先皇帝誨豫小子曰堯時有神羊在廷屈軼指佞汝知之乎夫邪正在人焉有異物朕有臣李絳猶漢臣之汲黯也我百嵗後爾其用之為神羊屈軼斯可矣豫小子銘鏤丕訓夙夜求思是用致理之初闕付授邦憲且欲吾丞相以降皆卑下之以示優遇朕亦常命安其步武無為屑屑之儀而絳屢以疾辭不寧其職又焉敢以勞倦之故煩先帝舊臣昔晉僕射何季元病足求免猶命坐家視事張子儒拜大司馬仍令兼録尚書則臥理不獨專於郡符端右可以旁綏戎政由古道也爾其處議持平勉居喉舌慎所觀聽為人司南可檢校尚書右僕射兼兵部尚書散官勳封如故敕漢諸儒議鹽鐵者百輩終莫能罷以其均口賦利則貴賤盡征於王府矣而國家嵗漕關東之粟帛以實京師亦重事也并是兩者非才勿居劒南西川節度副大使知節度事中散大夫檢校戶部尚書兼成都尹御史大夫賜紫金魚袋王播昔我憲宗章武皇帝梟琳於夏擒闢於蜀縛錡於吳而又繼之以元濟師道之役十五年間蓋煩費矣然而資用饒而人不加賦朕甚異焉謀及耆艾以求其故皆曰蜀帥播是時司管榷者八年忠而能勤善於其職先皇帝咨訪委遇用之不疑下竭其才而上專其任也是用徵自益部授之刑曹復以舊務煩之式所以藉爾奉力之熟耳於戲知人則哲憲考能之顧茲不明敢有二事爾其追奉先眷佐豫沖人忠盡始終以服休命可守刑部尚書充諸道鹽鐵轉運等使散官勳如故敕朝散大夫守中書舍人充翰林學士護軍賜紫金魚袋杜元㯋昔我憲宗章武皇帝熏灼威明兵定八極大索俊乂以徵謀猷其在禁林尢集賢彥越正月夕庚子將棄倦勤付朕末乃詔元㯋佑豫沖人以導揚丕訓爾亦祗奉顧命咨授一作援舊章輔釐哀憂俾克依據是夜而六宮承式厥明而百吏受遺草定法儀茲實賴汝官不稱事豫懷歉然而又詞源奧深機用周敏授之以詔而益辦扣之以疑而益明慎獨以修身推誠以事朕職勞可舉德懋宜升不俟踰時寧拘滿嵗綸誥清秩版圖劇曹例無兼榮特示甄寵豫以國士待一作遇汝汝以忠臣報豫效乃肺肝司朕耳目可守尚書戶部侍郎知制誥依前翰林學士散官勳如故敕書云臣作朕股肱耳目言天下不可一人理也今國家崇建執事以任股肱妙選侍臣實司耳目股肱良則心膂正耳目審則視聽明苟非端人何以近我而朝議郎守尚書兵部郎中知制誥充翰林學士上護軍賜紫金魚袋沈傳師潔靜精微風流儒雅名因道勝信在言前謙而愈光卑以自牧專對無不達㣥居若不知而又煥有文章發為辭誥使吾禁中無漏露之患而朕語言與三代同風勤亦至矣事我滿嵗命汝即真勉竭乃誠以輔台德可守中書舍人依前翰林學士散官勳賜如故敕朝議大夫權知尚書戶部侍郎判度支上柱國賜紫金魚袋崔稜惟朕憲考亟征不廷熏剔幽妖擒滅罪疾用力滋廣理才是切而姦臣乘上之急刻刮以充其求帝用憫然思克憂濟乃詔南服傳置甚繁爾稜授以耗登之書俾陳生聚之術善於其職嚴而不殘辟名用物者逃無所入滅私奉公者得以自明吏不敢欺人不加賦公費當其所則不吝上求非其故則不獻挺直廉厚真為吏師試可甄明嵗滿當陟朕保其始爾思其終始終不渝乃可用乂可守尚書戶部依前判度支散官勳賜如故敕周文王侍從之臣無可使結襪者我知之矣左右前後無非令人朕以將壯之年臣妾天下司其忿懥其在於持重溫良之士以鑒之乎前陝虢等州都防禦觀察處置等使中散大夫守陝州大都督府長史賜紫金魚袋裴向搢紳之徒言其閨門之行僅至於衣無常主兒無常父矣推是為政仁何遠乎是以發自王畿至於陝服多歷年所終無尢違每移孝友之風以懲強暴之俗甘棠之下廉讓興焉子欲用為垂璫夾乘之官以代吾盤盂韋弦之戒不亦可乎可守左散騎常侍餘如故敕朝散大夫守尚書吏部郎中上護軍崔郾昔我太宗文皇帝以魏徵為人鏡而姦膽形於下逆耳聞於上及徵沒而猶歎過失之不聞夫以朕之不敏不明託於人上月環其七而善惡薎聞豈諫爭之臣未盡規於不德耶朕甚懼焉以爾郾端厚誠明濟之文學柔而能立謙而逾光命汝弼豫式冀無過於戲宋景公一諸侯耳而陳星退之詞齊威王獨何人哉能辨日聞之佞爾其極諫朕不漏言可守諫議大夫餘如故敕先帝付朕四海九州之重尚賴威靈天下甫定思獲議論文章之臣以在左右俾之詳考今古周知物情而朝議郎行尚書司門員外郎白居易州里舉進士有司升甲科元和初對詔稱旨翺翔翰林藹然直聲留在人口朕嘗視其詞賦甚喜與相如并處一時由是召自南賓序補郎位會牛僧孺以御史丞解制誥職嗣掌書命人推爾先豫亦飽其風猷爾宜副茲超異可守尚書主客郎中知制誥餘如故敕聞匹夫之愛其子者猶求明哲為之師賢善為之友而况乎羽翼元子賓遊東朝非舊德耆年孰副茲選前守光祿卿騎都尉賜紫金魚袋孟子周詞藝飾身端厚居業歷官中外休有令聞人推君子之風朝洽名卿之目副豫求舊咨爾誠明勉修諷諭之詞以俟元良之德可守太子賓客勳封如故
