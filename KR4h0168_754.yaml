front:
  text: 全唐文欽定全唐文卷七百五十四杜牧七
  hash: sha256:7c0f0203e7ec54f75cf155fb143da445a8cae3b7abe34bd78bc2f21f16dd5bcc
body:
  text: 兵非危也穀非殫也而戰必挫北是曰不循其道也故作戰論焉論曰河北視天下猶珠璣也天下視河北猶四支也珠璣苟無豈不活身四支苟去吾不知其為人何以言之夫河北者俗儉風渾淫巧不生朴毅堅強果於戰耕名城堅壘峉嶭相貫高山大河盤互交鏁加以土息健馬便於馳敵是以出則勝處則饒不窺天下之產自可封殖亦猶大農之家不待珠璣然後以為富也天下無河北則不可河北既虜則精甲銳卒利刀良弓健馬無有也卒然夷狄驚四邊摩封疆出表裏吾何以禦之是天下一支兵去矣河東盟津滑臺大梁彭城東平盡宿厚兵以塞虜衝是六郡之師嚴飭護疆不可他使是天下二支兵去矣六郡之師厥數三億低首仰給橫拱不為則沿淮已北循河之南東盡海西叩洛經數千里赤地盡取纔能應費是天下三支財去矣咸陽西北戎夷大屯嚇呼膻臊徹于帝居周秦單師不能排闢於是盡剷吳越荊楚之饒以啖戍兵是天下四支財去矣乃使吾用度不周徵徭不常無以膏齊民無以接四夷禮樂刑政不暇修治品式條章不能備具是天下四支盡解頭腹兀然而已焉有人解四支其自以能久為安乎今者誠能治其五敗則一戰可定四支可生夫天下無事之時殿閤大臣偷處榮逸為家治具戰士離落兵甲鈍弊車馬刓弱而未嘗為之簡帖整飭天下雜然盜發則疾敺疾戰此宿敗之師也何為而不北乎是不蒐練之過者其敗一也夫百人荷戈仰食縣官則挾千夫之名大將小裨操其餘贏以虜壯為幸以師老為娛是執兵者常少糜食者常多築壘未乾公囊已虛此不責實科食之過其敗二也夫戰輒小勝則張皇其功奔走獻狀以邀上賞或一日再賜一月累封或凱旋未歌書品已崇爵命極矣田宅廣矣金繒溢矣子孫官矣焉肯搜奇外死勤於戎乎此賞厚之過其敗三也夫多喪兵士顛翻大都則跳身而來刺邦而去回視刀鋸菜色甚安一歲未更旋已立於壇墀之上矣此輕罰之過其敗四也夫大將將兵柄不得專恩臣詰責第來揮之至如堂然將陣殷然將鼓一則曰必為偃月一則曰必為魚麗三軍萬夫環旋翔佯愰駭之間虜騎乘之遂取吾之鼓旗此不專任責成之過其敗五也元和時天子急太平嚴約以律下常團兵數十萬以誅蔡天下乾耗四歲然後能取此蓋五敗不去也長慶初盜據子孫悉來走命是內地無事天子寬禁厚恩與人休息未幾而燕趙甚亂引師起將五敗益甚登壇注意之臣死竄且不暇復焉能加威於反虜哉今者誠欲調持干戈洒掃垢汙以為萬世安而乃踵前非是不可為也古之政有不善士傳言庶人謗發是論者亦且將書于謗木傳于士大夫非偶言而巳往年兩河盜起屠囚大臣劫戮二千石國家不議誅洗束兵自守反修大歷貞元故事而行始息之政是使逆輩益橫終倡患禍故作守論焉論曰厥今天下何如哉干戈朽鈇鉞鈍含宏混貸煦育逆孽殆為故常而執事大人曾不歷算周思以為宿謀方且嵬岸抑揚自以為廣大繁昌莫已若也嗚呼其不知乎其俟蹇頓顛傾而後為之支計乎且天下幾里列郡幾所而自河以北蟠城數百金堅蔓織角奔為寇伺吾人之顦顇天時之不利則將與其朋伍羅絡郡國將駭亂吾民於掌股之上耳今者及吾之壯不圖擒取而乃偷處恬逸第第相付以為後世子孫背脅疽根此復何也今之議者咸曰夫倔強之徒吾以良將勁兵以為銜策高位美爵充飽其腸安而不撓外而不拘亦猶豢擾虎狼而不拂其心則忿氣不萌此大歷貞元所以守邦也亦何必疾戰焚煎吾民然後以為快也愚曰大歷貞元之間適以此為禍也當是之時有城數十千百卒夫則朝廷待之貸以法故於是乎闊視大言自樹一家破制削法角為尊奢天子養威而不問有司守恬而不呵王侯通爵越錄受之覲聘不來凡杖扶之逆息虜允皇子嬪之裝緣采飾無不備之是以地益廣兵益強僭擬益甚侈心益昌於是土田名器分劃殆盡而賊夫貪心未及畔岸遂有淫名越號或帝或王盟詛自立恬淡不畏走兵四畧以飽其志者也是以趙魏燕齊卓起大倡梁蔡吳蜀躡而和之其餘混澒軒囂欲相效者往往而是運遭孝武宵旰不忘前英後傑夕思朝議故能大者誅鋤小者惠來不然周秦之郊幾為犯獵哉大抵生人油然多欲欲而不得則怒怒則爭亂隨之是以教笞於家刑罰於國征伐於天下此所以裁其欲而塞其爭也大歷貞元之閒盡反此道提區區之有而塞無涯之爭是以首尾指支幾不能相運掉也今者不知非此而反用以為經愚見為盜者非止於河北而已嗚呼大歷貞元守邦之術永戒之哉呂公善相人言女呂后當大貴宜以配季季後為天子呂后復稱制天下王呂氏子弟悉以大國隋文帝相工來和輩數人亦言當為帝者後篡竊果得之誠相法之不謬矣呂氏自稱制通為后凡二十餘年閒隋文自篡至滅凡三十六年閒男女族屬殺滅殆盡當秦末呂氏大族也周末楊氏為八柱國公侯相襲久矣一旦以一女子一男子偷竊位號不三二十年閒壯老嬰兒皆不得其死不知一女子為呂氏之福耶為禍耶一男子為楊氏之禍耶為福耶得一時之貴滅百世之族彼知相法者當曰此必為呂氏楊氏之禍乃可為善相人矣今斷一指得四海凡人不欲為况以一女子一男子易一族哉余讀荀卿非相因感呂氏楊氏知卿為大儒矣井廢輒不塞於古無所據今之州府廳事有井廢不塞居第在堂上有井廢亦不塞或匣而護之或橫木以土覆之至有歲久木朽陷人以至於死世俗終不塞之不知出何典故而井不可塞井雖列在五祀在都邑中物之小者也若盤庚五遷其都若社稷宗廟尚毀其舊而獨井豈不塞邪古者井田九頃八家環而居之一夫食一頃中一頃樹蔬鑿井而八家共汲之所以籍齊民而重泄地氣以小喻大人身有瘡不醫即死木有瘡久不封即亦死地有千萬瘡於地何如哉古者八家共一井今家有一井或至大家至於四五井十倍多於古地氣漏泄則所產脆薄人生於地內今之人不若古之人渾剛堅一寧不由地氣洩漏哉易曰改邑不改井此取象言安也非井不可塞也天下每州春秋二時天子許抽常所上賦錫宴其刺史及州吏必廓其地為大宇以張其事黃州當是地有古井不塞故為文投之而實以土孟子言人性善荀子言人性惡楊子言人性善惡混曰喜曰哀曰懼曰惡曰欲曰愛曰怒夫七者情也情出於性也夫七情中愛者怒者生而自能是二者性之根惡之端也乳兒見乳必挐求不得即啼是愛與怒與兒俱生也夫豈知其五者焉既壯而五者隨而生焉或有或亡或厚或薄至於愛怒曾不須臾與乳兒相離而至於壯也君子之性愛怒淡然不出於道中人可以上下者有愛拘於禮有怒懼於法也世有禮法其有踰者不敢恣其情世無禮法亦隨而熾焉至於小人雖有禮法而不能制愛則求之求之不得即怒怒則亂故曰愛怒者性之本惡之端與乳兒俱生相隨而至於壯也凡言性情之善者多引舜禹言不善者多引丹朱商均夫舜禹二君子生人以來如二君子者凡有幾人不可引以為喻丹朱商均為堯舜子夫生於堯舜之世被其化皆為善人况生於其室親為父子蒸不能潤灼不能熱是其惡與堯舜之善等耳天止一日月耳言光明者豈可引以為喻人之品類可與上下者眾可與上下之性愛怒居多愛怒者惡之端也荀言人之性惡比於二子荀得多矣荀文若為操畫策取兗州比之高光不棄關中河內官渡不令還許比楚漢成臯凡為籌計比擬無不以帝王許之海內付之事就功畢欲邀名於漢代委身之道可以為忠乎世皆曰曹馬且東漢崩裂紛披都遷主播天下大亂操起兵東都提獻帝於徒步困餓之中南征北代僅三十年始定三分之業司馬懿安完之代竊發肘下奪偷權柄殘虐狡譎豈可與操比哉若使操不殺伏后不誅孔融不囚楊彪從容於揖讓之間雖慙於三代天下非操而誰可以得之者紂殺一比干武王斷首燒屍而滅其國桓靈四十年間殺千百比干毒流其社稷可以血食乎可以壇墠父天拜郊乎假使當時無操獻帝復能正其國乎假使操不挾獻帝以令天下英雄能與操爭乎若使無操復何人為蒼生請命乎教盜穴牆發櫃多得金玉已復不與同挈得不為盜乎何况非盜也文若之死宜然耶國家大事牧不當言言之實有罪故作罪言生人常病兵兵祖於山東允於天下不得山東兵不可死山東之地禹畫九土一曰冀州舜以其分野太大離為幽州為并州程其水土與河南等常重十一二故其人沉鷙多材力重許可能辛苦自魏晉已下衍浮羨淫工機纎雜意態百出俗益卑蔽人益脆弱唯山東敦五種本兵矢他不能蕩而自若也復產健馬下者日馳二百里所以兵常當天下冀州以其恃強不循理冀其必破弱雖已破弱冀其復強大也并州力足以并吞也幽州幽陰慘殺也故聖人因其風俗以為之名黃帝時蚩尢為兵階自後帝王多居其地豈尚其俗都之邪自周劣齊霸不一世晉文常傭役諸侯至秦萃銳三晉經六世乃能得韓遂折天下脊復得趙因拾取諸國秦未韓信聯齊有之故蒯通知漢楚輕重在信光武始於上谷成於鄗魏武舉官渡三分天下有其二晉亂胡作至宋武號為英雄得蜀得關中盡得河南地十分天下有其八然不能使一人渡河以窺胡至于高齊荒蕩宇文取得隋文因以滅陳五百年間天下乃一家隋文非宋武敵也是宋不得山東隋得山東故隋為王宋為霸由此言之山東王者不得不可為王霸者不得不可為霸猾賊得之是以致天下不安國家天寶末燕盜徐起出入成臯函潼間若涉無人地郭李輩常以兵五十萬不能過鄴自爾一百餘城天下力盡不得尺寸人望之若迴鶻吐蕃義無有敢窺者國家因之畦河修障戍塞其街蹊齊魯梁蔡被其風流因亦為寇以裏拓表以表撐裏混澒迴轉顛倒橫斜未嘗五年間不戰生人日頓委四夷日猖熾天子因之幸陜幸漢中焦焦然七十餘年矣嗚呼運遭孝武澣衣一肉不畋不樂自卑宂中拔取將相凡十三年乃能盡得河南山西地洗削更革罔不順適唯山東不服亦再攻之皆不利以返豈天使生人未至於帖泰耶豈其人謀未至耶何其艱哉何其艱哉今日天子聖明超出古昔志於理平若欲悉使生人無事其要在先去兵不得山東兵不可去是兵殺人無有已也今者上策莫如自治何者當貞元時山東有燕趙魏叛河南有齊蔡叛梁徐陳汝白馬津盟津襄鄧安黃壽春皆戍厚兵凡此十餘所纔足自護治所實不輟一人以他使遂使我力解勢弛熟視不軌者無可柰何階此蜀亦叛吳亦叛其他未叛者皆迎時上下不可保信自元和初至今二十九年間得蜀得吳得蔡得齊凡收郡縣二百餘城所未能得唯山東百城耳土地人戶財物甲兵校之往年豈不綽綽乎亦足自以為治也法令制度品式條章果自治乎賢才奸惡搜選置捨果自治乎障戊鎮守干戈車馬果自治乎井閭阡陌倉廩財賦果自治乎如不果自治是助虜為虐環土三千里植根七十年復有天下陰為之助則安可以取故曰上策莫如自治中策莫如取魏魏於山東最重於河南亦最重何者魏在山東以其能遮趙也既不可越魏以取趙固不可越趙以取燕是燕趙常重於魏魏常操燕趙之性命也故魏在山東最重黎陽距白馬津三十里新鄉距盟津一百五十里陴壘相望朝駕暮戰是二津虜能潰一則馳入城臯不數日間故魏於河南間亦最重今者願以近事明之元和中纂天下兵誅蔡誅齊頓之五年無山東憂者以能得魏也昨日誅滄頓之三年無山東憂者亦以其能得魏也長慶初誅趙一日五諸侯兵四出潰解以失魏也昨日誅趙一日罷如長慶時亦以失魏也故河南山東之輕重常懸在魏明白可知也非魏強大能致如此地形使然也故曰取魏為中策最下策為浪戰不計地勢不審攻守是也兵多粟多敺人使戰者便於守兵少粟少人不敺自戰者便於戰故我嘗失於戰虜常困於守山東之人叛且三五世矣今之後生所見言語舉止無非叛也以為事理正當如此沉酣入骨髓無以為非者指示順向詆侵族臠語曰叛去酋酋起矣至於有圍急食盡餤屍以戰以此為俗又豈可與决一勝一負哉自十餘年來凡三收趙食盡且下堯山敗趙復振下博敗趙復振館陶敗趙復振故曰不計地勢不審攻守為浪戰最下策也國家始踵隋制開十六衛將軍總三十員屬官總一百二十八員署守分部夾峙禁省厥初歷今未始替削然自今觀之設官言無謂者其十六衛乎本原事跡其實天下之大命也始自貞觀中既武遂文內以十六衛畜養戎臣之開折衝果毅府五百七十四以儲兵伍或有不幸方二三千里為寇土數十百萬人為寇兵蠻夷戎狄踐踏四作此時戎臣當提兵居外至如天下平一暴勃消削單車一符將命四走莫不信順此時戎臣當提兵居內當其居內也官為將軍綬有朱紫章有金銀千百騎趨奉朝謁第觀車馬歌兒舞女念功賞勞出於曲賜所部之兵散舍諸府上府不越一千二百人三時耕稼襏襫耞耒一時治武騎劍兵矢裨衛以課父兄相言不得業他籍藏將府伍散田畝力解勢破人人自愛雖有蚩尤為師帥雅亦不可使為亂耳及其當居外也緣部之兵被檄乃來受命於朝不見妻子斧鉞在前爵賞在後以首爭首以力搏力飄暴交捽豈暇異略雖有蚩尤為師帥雅亦無能為叛也自貞觀至于開元末百三十年間戎臣兵伍未始逆篡此聖人所能柄統輕重制障表裏聖算神術也至於開元末愚儒奏章曰天下文勝矣請罷府兵詔曰可武夫奏章曰天下力強矣請搏四夷詔曰可於是府兵內剷邊兵外作戎臣兵伍湍奔矢往內無一人矣起遼走蜀繚絡萬里事五強寇十餘年中亡百萬人尾大中乾成燕偏重而天下掀然根萌燼燃七聖旰食求欲除之且不能也由此觀之戎臣兵伍豈可一日使出落鈐鍵哉然為國者不能無也居外則叛居內則篡使外不叛內不篡兵不離伍無自焚之患將保頸領無烹狗之諭古今已還法術最長其置府立衛乎近代已來於其將也弊復為甚也人囂曰廷詔命將矣名出視之率市兒輩葢多賂金玉負倚幽陰折券交貲所能也絕不識父兄禮義之教復無慷慨感槩之氣百城千里一朝得之其強傑愎勃者則撓削法制不使縛已斬族忠良不使違已力壹勢便罔不為寇其陰泥巧狡者亦能家算口斂委於邪倖由卿市公去郡得都四履所治指為別館或一夫不幸而壽則戛割生人畧匝天下是以天下每每兵亂湧溢齊人乾耗鄉黨風俗淫窳衰薄教化恩澤壅抑不下召來災殄被及牛馬嗟乎自愚而知之人其盡知之乎且武者任誅如天時有秋文者任治如天時有春是天不能倒春秋是豪傑不能總文武是此輩受鉞誅暴乎曰於是乎在某人行教乎曰於是乎在欲禍蠧不作者未之有也伏惟文皇帝十六衛之旨誰復而原其實天下之大命也故作原十六衛天不生夫子於中國中國當何如曰不夷狄如也荀卿祖夫子李斯師荀卿一日宰天下盡誘天子之徒與書坑而焚之曰徒能亂人不若刑名獄吏治世之賢也彼商鞅者能耕能戰能行其法基秦為強曰彼仁義虱官也可以置之自董仲舒劉向皆言司馬遷良史也而遷以儒分之為九曰博而寡要勞而無功不如道家者流也自有天地以來人無有不死者海上迂怪之士特出言曰黃帝鍊丹砂為黃金以餌之晝日乘龍上天誠得其藥可如黃帝以燕昭王之賢破強齊幾於霸秦始皇漢武帝之雄材滅六強擗四夷盡非凡主也皆甘其說耗天下捐骨肉而不辭至死而不悟莫尊於天地莫嚴於宗廟社稷梁武帝起為梁國者以筍脯麥丏牲為薦祀之禮曰佛之教牲不可殺以天子之尊捨身為其奴散髮布地親命其徒踐之有天地日月為之主陰陽鬼神為之佐夫子巍然統而辯之復引堯舜禹湯文武周公為之助則其徒不為劣其治不為僻彼四君二臣不為無知一旦不信背而之他仍族滅之儻不生夫子紛紜冥昧百家鬬起是已所是非已所非天下隨其時而宗之誰敢非之縱有非之者欲何所依據而為其辭是楊墨駢慎已降百家之徒廟貌而血食十年一變法百年一改教橫斜高下不知止泊彼夷狄者為夷狄之俗一定而不易若不生夫子是知其必不夷狄如也韓吏部夫子廟碑曰天下通祀惟社稷與夫子社稷壇而不屋取異代為配未若夫子巍然當座用王者禮以門人為配自天子至於庶人親北面而師之夫子以德社稷以功固有次第哉因引孟子曰生人已來未有如夫子者也自古稱夫子者多矣稱夫子之德莫如孟子稱夫子之尊莫如韓吏部故書其碑陰云皇帝召丞相延英便殿講議政事及於循吏且稱元和中興之盛言理人者誰居第一丞相墀言臣嘗守土江西目覩觀察使韋丹有大功德被于八州歿四十年稚老歌思如丹尚存丞相敏中丞相植皆曰臣知丹之為理所至人愛所去人思江西之政熟於聽聞乃命守臣覈于眾上丹之功狀大中三年正月二十日詔書授史臣尚書司勳員外郎杜牧曰汝為丹序而銘之以美大其事臣某伏念天寶建中艱難之餘根於河北枝蔓於齊魯梁蔡闢為章句書生以蜀叛錡為宗室老以吳叛其他高下其目跂而欲飛者往往皆是憲宗皇帝高聽古議廣諫益聖任賢使能考校法度號令未出威先雷霆十有四年擒殛兇狠方行四海罔不率伏當是時凡五徵兵解而復合僅八周歲天下晏然不告勞苦實以守土多循良吏而丹居第一周召伯治人於陜西召穆公有武功於宣王時仲尼採甘棠江漢之詩絃而歌之列於風雅班固敘漢宣帝中興名臣言治人者亦首述黃霸龔遂次將相下今下明詔刻丹治效令得與元和功臣彰中興得人之盛懸於無窮用古道也謹按韋氏自漢丞相賢已降代有達官孝寬有大功於後周封鄖國公鄖公曾孫幼平為岐州參軍生抱貞為梓州刺史生政為漢州雒縣丞贈右諫議大夫雒縣生武陽公公字文明以明五經登科授校書郎咸陽尉以監察御史殿中侍御史佐張獻甫於邠寧府徵為太子舍人遷起居郎檢校吏部員外郎侍御史河陽行軍司馬未行改駕部員外郎會新羅國以喪來告且請立君拜司封郎中兼御史中丞章服金紫弔冊其嗣新羅再以喪告不果行改容州經畧使築州城環十三里因悉城管內十三州教種茶麥多開屯田黃賊畏服詔加大中大夫貞元末拜河南少尹連拜檢校秘書監兼御史中丞鄭滑行軍司馬皆未至拜右諫議大夫憲宗即位劉闢以蜀叛議者欲行貞元故事請釋不誅公再上疏曰今不誅闢則朝廷可以指臂而使者惟兩京耳此外而誰不為叛因拜劍南東川節度使兼御史大夫時劉闢急攻梓州公至漢中表言攻急守堅不可易帥高崇文客軍遠鬬無所資若與梓州綴其士心必能有功遂召拜晉慈隰三州觀察使不半歲元和二年二月拜洪州觀察使洪據章江上控百越為一都會屋居以茅竹為俗人火之餘烈日久風竹戛自焚小至百家大至盪空霖必江溢燥必火作火水夾攻人無固志傾搖懈怠不為旬月生產計公始至任計口取俸除去冗事取公私錢教人陶瓦伐山取材堆謺億計人能為屋取官材瓦免其半賦徐責其直自載酒食以勉其勞初若艱勤日成月就不二周歲凡為瓦屋萬四千間樓四千二百間縣市營廏名為棟宇無不創為泒湖入江節以斗門以走暴漲闢開廣衢南北七里盪渫汚壅築隄五尺長十二里隄成明年江與隄平鑿六百陂塘灌田一萬頃益勸桑苧機織廣狹俗所未習教勸成之凡三周年成就生遂手為目覩無不如志公之為政去害興利機決勢去如孫吳乘敵不可當向輔以經術仁撫智誘慈母之心赤子之欲求必得之故人自盡力所指必就子產治鄭未及三年國人尚謗黃霸治潁川前後八年始曰愈治考二古人行事與公相次第不知如何元和五年薨年五十八其銘曰章武皇帝披攘經營凡十四年五大徵兵人不告病肩於太寧將相是矣豈無循良考第理行誰高武陽武陽所至為人父母於洪之功洞無前古洪始有居水火是苦二者夾攻死無處所曰天所然不嗟不訴武陽始至材瓦是聚公錢不足以俸為助能為居宇貰貸付與日載酒餚如撫稚乳不督不程誘以美語未二周星創數萬堵幾半重樓如詩翬羽錮以長隄繚四千步明年水平人始歌舞災久事鉅一日除去灌田萬頃益種桑苧俗所未有罔不完具寂寥千年誰守茲土大中聖人元和是師圖讚功勞武陽豈遺乃命史臣刻序碑辭寵假武陽為人慰思訓勸守吏勉於為治牧字牧之曾祖某河西隴右節度使祖某司徒平章事岐國公贈太師考某駕部員外累贈禮部尚書牧進士及第制策登科宏文館校書郎試左武衛兵曹參軍江西團練巡官轉監察御史裏行御史淮南節度掌書記拜真監察御史分司東都以弟病去官授宣州團練判官殿中侍御史內供奉遷左補闕史館修撰轉膳部比部員外郎皆兼史職出守黃池睦三州遷司勳員外郎史館修撰轉吏部員外以弟病乞守湖州入拜考功郎中知制誥周歲拜中書舍人牧平生好讀書為文亦不由人曹公曰吾讀兵書戰策多矣孫武深矣因注其書十三篇乃曰上窮天時下極人事無以加也後當有知之者去歲七月十日在吳興夢人告曰爾當作小行郎復問其次曰禮部考功為小行也言其終典耳今歲九月十九日歸夜困亥初就枕寢得被勢久酣而不夢有人朗告曰爾改名畢十月二日奴順來言炊將熟甑裂子曰皆不祥也十一月十日夢書片紙皎皎白駒在彼空谷傍有人曰空谷非也過隙也予生於角星昴畢於角為第八宮曰病厄宮亦曰八殺宮土星在焉火星繼木星工楊晞曰木在張於角為第十一福德宮木為福德大君子救於其旁無虞也予曰自湖守不周歲遷舍人木還福於角足矣土火還死於角宜哉復自視其形視流而疾鼻折山根年五十斯壽矣某月某日終於安仁里妻河東裴氏朗州刺史偃之女先牧若干時卒長男曰曹師年十六次曰祝柅年十二別生二男曰蘭曰興一女曰真皆幼以某月日葬於少陵司馬村先塋銘曰後魏太尉禺封平安公及予九世皆葬少陵嗟爾小子亦克厥終安于爾宮
