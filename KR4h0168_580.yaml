front:
  text: 全唐文欽定全唐文卷五百八十柳宗元十二
  hash: sha256:03d4730bd05ffaca7c1c1d25c211a5eb1b9fa4a3eb6f333a409c115d34f2a790
body:
  text: 禮檀弓曰祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也是必禮與敬皆足而後祭之義行焉周禮祭僕視祭祀有司百官之戒具誅其不敬者漢以侍御史監祠唐開元禮凡大祠若干中祠若干咸以御史監視祠官有不如儀者以聞其刻印移書則曰監祭使寶應中尤異其禮更號祠祭使俄復其初又制凡供祠之吏雖當齋戒得以決罰由是禮與敬無不足者聖人之於祭祀非必神之也蓋亦附之教焉事於天地示有尊也不肅則無以教敬事於宗廟示廣孝也不肅則無以教愛事於有功烈者示報德也不肅則無以勸善凡肅之道自法制始奉法守制由御史出者也故將有事焉則祠部上其日吏部上其官奉制書以來告然後頒於有司以謹百事太常修其禮光祿合其物百工之役先一日咸至於祠而考閱焉御史會公卿有司執簡而臨之故其粢盛牲牢酒醴菜菓之饌必實於庖廚鐘鼓笙竽琴瑟戛擊之樂簨簴綴兆之數必具於庭內樽彞罍洗俎豆醆斚之器必潔於壇堂之上奉奠之士贊禮之童樂工舞師洎執殳而衞者咸引數引數一作列若其實設箠朴於堂下以修官刑而㣥吏莫敢不備物羅奏牘於几上以嚴天憲而眾官莫敢不盡誠而祭之日先升立於西階之上以待卒事其禮之周旋樂之節奏必周知之退而視其燔燎瘞埋終之以敬也居常則飭四方祀貢之物以時登於王府服器之修具祠宇之繕理牛羊毛滌之節三宮御廩之實畢備而聽命焉舊以監察御史之長居是職貞元十九年十二月御史多缺予班在三人之下進而領焉明年中山劉禹錫始復舊制由禮與敬以臨其人而官事益理制令有不宜於時者必復於上革而正之於是始為記求簿書得為是職者若干人書焉周人置虞庠於四郊以養國老教冑子祭統曰天子設四學蓋其制也易傳太初篇曰天子旦入東學晝入南學夕入西學暮入北學蔡邕引之以定明堂之位焉大戴禮保傅篇曰帝入東學以貴仁入南學以貴信入西學以貴德入北學以貴爵賈生述之以明太子之教焉故曰為大教之宮而四學具焉參明堂之政原大教之極其建置之道宏也後魏大和中立學於四門置助教二十人隋氏始隸於國子而降置五人皇朝始合於太學又省至三人員位彌簡其官尤難非儒之通者不列也四門學之制掌國之上士中士下士凡三等侯伯子男凡四等其子孫之為冑子者及庶士庶人之子為俊士者使執其業而居其次就師儒之官而考正焉助教之職佐博士以掌鼓篋榎楚之政令分其人而教育之其有通經力學者必於歲之杪升於禮部聽簡試焉課生徒之進退必酌於中道非博雅莊敬之流固不得臨於是故有去而升於朝者賀祕書由是為博士歸散騎由是為左拾遺舊制以拾遺為八品清官故必以名實者居於其位貞元中王化既成經籍少間有司命太學之官頗以為易專名譽好文章者咸恥為學官至是河東柳立始以前進士求署茲職天水武儒衡閩中歐陽詹又繼之是歲為四門助教凡三人皆文士京師以為異余與立同祖於方輿公與武公武公一作武君同升於禮部與歐陽生同志於文四門助教署未嘗紀前人名氏余故為之記而由夫三子者始殷頌曰邦畿千里周制千里之內曰甸服穀梁謂之寰內諸侯為王內臣其制甚重今京兆尹理京師部二十有三縣幅員之廣其猶古也縣吏之長曰令曰丞丞之位正八品下蓋丞述六職以輔其令也秦漢有丞相今一作令尚書有左右丞御史有中丞至於九卿之列亦皆有丞下以達天下之縣政有大小其旨同也武功為甸內大縣桉其圖古后稷封有斄之地秦作四十一縣斄美陽武功各異至是合焉蓋嘗為稷州已而復縣其土疆沃美高厚有邱陵墳衍之大其植物豐暢茂遂有秬秠藿菽之宜其人善樹藝其俗有禮讓宜乎其大雅之遺烈焉貞元十五年改邑於南里既成新城凡官署舊記壁壞文逸而未克繼之者後三年而潁川陳南仲居是官邑人宜之號為簡靖因其族子存持地圖以來謁余為記夫以武功疆理之大人徒之多而陳生以簡靖輔其理斯固難矣漢高帝嘗詔天下凡以戰得爵七大夫公乘以上令丞與抗禮故為吏益難今天子崇武念功與漢初相類分禁旅以守縣道武功為多陳生為丞於是而又職盜賊其為理無敗事吾庸可以度哉為之記云貞元十八年五月某日新作食堂於縣內之右始會食也自兵興以來西郊捍戎縣為軍壘二十有六年㣥吏咸寓於外兵去邑荒棟宇傾又十有九年不克以居由是縣之聯事離散而不屬凡其官僚罕或覿見及是主簿某病之於是且掌工役之任俾復其邑居廩庫既成學校既修取其餘材以構斯堂其上棟自南而北者二十有二尺周阿峻嚴列楹齊同其飾之文質階之高下視邑之大小與㣥吏之品秩不陋不盈高山在前流水在下可以俯仰可以宴樂堂既成得羨財可以為食本月權其贏羞膳以充乃合㣥吏於茲新堂升降坐起以班先後始正位秩之敘禮儀笑語講議往復始會政事之要筵席肅莊籩豆靜嘉燔炮烹飪益以酒醴始獲僚友之樂卒事而退舉欣欣焉曰惟禮食之來古也今京師百官咸有斯制甸服亦王之內邑且官有聯屬則宜統會以齊之也嚮之離而今之合其得失也遠甚我是以肅焉而莊衎焉而和㣥疑以亡嘉言以彰旨乎其在此堂也不惟其馨香醉飽之謂某之力也夫宜伐石以志使是道也不替於後乃列其事來告使余書之古者交政於四方謂之使今之制受命臨戎職無所統屬者亦謂之使凡使之號蓋專焉而行其道者也開元以來其制愈重故取御史之名而加焉至於今若干年其兼中丞者若干人其使絕域統兵戎桉州部專貨食而柔遠人固王略齊風俗和關石大者戡復於內拓定於外皆得以壯其威張其聲其用遠矣假是名以莅厥職而尊嚴若是况乎總憲度於朝端樹風聲於天下其所以翼於君正於人者尤可以知也武公以厚德在位甚宜其官視其署有記諸使中丞者而多闕漏於是求其故於詔制而又質於史氏增益備具遂命其屬書之且曰由其號而觀其實後之居於斯者有以敬於事凡萬國之會四夷之來天下之道途畢出於邦畿之內奉貢輸賦修職於王都者入於近關則皆重足錯轂以聽有司之命徵令賜予布政於下國者出於甸服而後桉行成列以就諸侯之館故館驛之制於千里之內尤重自萬年至於渭南其驛六其蔽曰華州其關曰潼關自華而北界於櫟陽其驛六其蔽曰同州其關曰蒲津自灞而南至於藍田其驛六其蔽曰商州其關曰武關自長安至於盩厔其驛十有一其蔽曰洋州其關曰華陽自武功而西至於好畤其驛三其蔽曰鳳翔府其關曰隴關自渭而北至於華原其驛九其蔽曰坊州自咸陽而西至於奉天其驛六其蔽曰邠州由四海之內總而合之以至於關由關之內束而會之以至於王都華人夷人往復而授館者旁午而至傳吏奉符而閱其數縣吏執牘而書其物告至告去之役不絕於道寓望迎勞之禮無曠於日而春秋朝陵之邑皆有傳館其飲飫餼饋咸出於豐給繕完築復必歸於整頓列其田租布其貨利權其入而用其積於是有出納奇贏之數勾會考校之政大歷十四年始命御史為之使俾考其成以質於尚書季月之晦必合其簿書以視其等列而校其信宿必稱其制有不當者反之於官尸其事者有勞焉則復於天子而優升之勞大者增其官其次者降其調之數又其次猶異其考績官有不職則以告而罪之故月受俸二萬於太府史五人承符者二人皆有食焉先是假廢官之印而用之貞元十九年南陽韓泰告於上始鑄使印而正其名然其嗣當斯職未嘗有記之者追而求之蓋數歲而往則失之矣今余為之記遂以韓氏為首且曰修其職故首之也唐制嶺南為五府府部州以十數其大小之戎號令之用則聽於節度使焉其外大海多蠻夷由流求訶陵西抵大夏康居環水而國以百數則統於押蕃舶使焉內之幅員萬里以執秩拱稽時聽教命外之羈屬數萬里以譯言贄寶歲帥貢職合二使之重以治於廣州故賓軍之事宜無與校大且賓有牲牢饔餼嘉樂好禮以同遠合疏軍有犒饋宴饗勞旋勤歸以㣥力一心於是治也閈閎階序不可與他邦類必厚棟大梁夷庭高門然後可以上充於揖讓下周於步武今御史大夫扶風公廉廣州且專二使增德以來遠人申威以修戎政大饗宴合樂從其豐盈先是為堂於治城西北陬其位公北向賓眾南向奏部伎於其西視泉池於其東隅奧庳仄庭廡下陋日未及晡則赫炎當目汗眩更起而禮莫克終故凡大宴饗大賓旅則寓於外壘儀型不稱公於是始斥其制為堂南面橫八楹縱十楹饗宴之位化為東序西又如之其外更衣之次膳食之宇列觀以游目偶亭以展聲彌望極顧莫究其往泉池之舊增濬益植以暇以息如在林壑問工焉取則師輿是供問役焉取則蠻隸是徵問材焉取則隙宇是遷或益其闕伐山浮海農賈拱手張目視具乃十月甲子克成公命饗於新堂幢牙茸纛金節析羽旆旗旟旞咸飾於下鼓以鼖晉金以鐸鐃公與監軍使肅上賓延㣥僚將校士吏咸次於位卉裳罒炎刂衣胡夷蜑蠻睢盱就列者千人以上鉶鼎體節燔炮胾炙羽鱗貍互之物沈泛醍盎之齊均飫於卒士興王之舞服夷之伎揳擊吹鼓之音飛騰幻怪之容寰觀於遠邇禮成樂遍以敘而賀且曰是邦臨護之大五人合之非是堂之制不可以備物非公之德不可以容眾曠於往初肇自今茲太和有人以觀遠方古之戎政其曷用加此華元名大夫也殺羊而御者不及霍去病良將軍也餘肉而士有飢色猶克稱能以垂到今矧茲具美其道不廢願勒於金石以永示後祀遂相與來告且乞辭某讓不獲乃刻於茲石凡諸侯述職之禮必有棟宇建於京師朝覲為修容之地會計為交政之所其在周典則皆邑以具湯沭其在漢制則皆邸以奉朝請唐興因之則皆院以備進奏政以之成禮於是具由舊章也皇帝宅位十一載悼邊氓之未乂惡兇虜之猶阻博求㣥臣以朗寧王張公為能俾其建節剖符守股肱之郡統爪牙之職董制三軍撫柔萬人乃新斯院宏我舊制高其閈閎壯其門閭以奉王制以修古典至敬也以尊朝覲以率貢職至忠也執忠與敬臣道畢矣公嘗鳴珮執玉展禮天朝又嘗伐叛獲醜獻功魏闕其餘歸時事修常職賓屬受辭而來使旅賁奉章而上謁稽疑於大宰質政於有司下及奔走之臣傳遞之役川流環運以達教令大凡展采於中都率由是焉故領斯院者必獲歷閶闔登太清仰萬乘之威而通內外之事王宮九關而不間轅門十舍而如近斯乃軍府之要樞邠寧之能政也惟公端明而厚溫裕而肅宏略特出大志高邁施德下邑而黎人咸懷設險西陲而戎虜伏息茂功溢於太常盛烈動於人聽則斯院之設乃他政之末者也贊公於他政之末故詞不周德稱公於天子之都故禮不稱位斯古道也貞元十二年十月六日河東柳宗元為記御史大夫嚴公牧於梁五年嗣天子舉周漢進律增秩之典以親諸侯謂公有功德理行就加禮部尚書是年四月使中謁者來錫公命賓僚吏屬將校卒士黧老童孺填溢公門舞躍歡呼願建碑紀德垂億萬祀公固不許退而相與怨咨遑遑如不飲食於是西鄙之人密以公刊山導江之事願刻巖石曰惟梁之西其蔽曰某山其守曰興州興州之西為戎居歲備亭障實以精卒以道之險隘兵困於食守用不固公患之曰吾嘗為興州凡其土人之故吾能知之自長舉北至於青泥山又西抵於成州過栗亭川踰寶井堡崖谷峻隘十里百折負重而上若蹈利刃盛秋水潦窮冬雨雪深泥積水相輔為害顛踣騰藉血流棧道糗糧芻藳填谷委山馬牛㣥畜相藉物故餫夫畢力守卒延頸嗷嗷之聲其可哀也若是者綿三百里而餘自長舉之西可以導江而下二百里而至昔之人莫得知也吾受命於君而育斯人其可已乎乃出軍府之幣以備器用即山僦功由是轉巨石仆大木焚以炎火沃以食醯摧其堅剛化為灰燼畚鍤之下易甚朽壞乃闢乃墾乃宣乃理隨山之曲直以休人力順地之高下以殺湍悍厥功既成咸如其素於是決去壅土疏導江濤萬夫呼抃莫不如志雷騰雲奔百里一瞬既會既遠澹為安流烝徒謳歌枕臥而至戍人無虞專力待寇惟我公之功疇可侔也而無以酬德致其大願又不可得命矧公之始來屬當惡歲府庾甚虛器備甚殫饑饉昏札死徙充路賴公節用愛人克安而生老窮有養幼乳以遂不問不使咸得其志公命鼓鑄庫有利兵公命屯田師有餘糧選徒練旅有眾孔武平刑議獄有眾不黷增石為防膏我稻粱歲無凶災家有積倉傳館是飾旅忘其歸杠梁以成人不履危若是者皆以戎隙帥士而為之不出四方之力而百役巳就且我西鄙之職官故不能具舉惟公和恆直方廉毅信讓敦尚儒學抑損貴位率忠與仁以厚其誠其有可以安利於人者行之堅勇不俟終日其興功濟物如此其大也昔之為國者惟水事為重故有障大澤勤其官而受封國者矣西門遺利史起興歎白圭壑鄰孟子不與公能夷險休勞以惠萬代其功烈尤章章焉不可葢也是用假辭謁工勒而存之用永憲於後祀賢者之興而愚者之廢廢而復之為是循而習之為非恆人猶且知之不足乎列也然而復其事必由乎賢者推是類以從於政其事可少哉賢莫大於成功愚莫大於恡且誣桂之中嶺而邑者曰全義衞公城之南越以平盧遵為全義視其城塞北門鑿他雉以出問之其門人曰餘百年矣或曰巫言是不利於令故塞之或曰以賓旅之多有懼竭其餼饋者欲迴其途故塞之遵曰是非恡且誣歟賢者之作思利乎人反是罪也余其復之詢於㣥吏吏叶厥謀上於大府大府以俞邑人便焉讙舞里閭居者思止其家行者樂出其途由道廢邪用賢棄愚推以革物宜民之蘇若是而不列殆非孔子徒也為之記云宏農公刺潭三年因東泉為池環之九里邱陵林麓距其涯坻島渚洲交其中其岸之突而出者水縈之若玦焉池之勝於是為最公曰是非離世樂道者不宜有此卒授賓客之選者譙國戴氏曰簡為堂而居之堂成而勝益奇望之若連艫縻艦與波上下就之顛倒萬物遼廓眇忽樹之松柏杉櫧被之菱芡芙渠鬱然而陰粲然而榮凡觀望浮游之美專於戴氏矣戴氏嘗以文行累為連率所賓禮貢之澤宮而志不願仕與人交取其退讓受諸侯之寵不以自大其離世歟好孔氏書旁及莊文莫不總統以至虛為極得受益之道其樂道歟賢者之舉也必以類當宏農公之選而專茲地之勝豈易而得哉地雖勝得人焉而居之則山若增而高水若闢而廣堂不待飾而已奐矣戴氏以泉池為宅居以雲物為朋徒攄幽發粹日與之娛則行宜益高文宜益峻道宜益懋交相贊者也既碩其內又揚於時吾懼其離世之志不果矣君子謂宏農公刺潭得其政為東池得其勝授之得其人豈非動而時中者歟於戴氏堂也見公之德不可以不記大凡以觀游名於代者不過視於一方其或傍達左右則以為特異至若不騖遠不陵危環山洄江四出如一夸奇競秀咸不相讓徧行天下者唯是得之桂州多靈山發地峭堅林立四野署之左曰灕水水之中曰訾氏之洲凡嶠南之山川達於海上於是畢出而古今莫能知元和十二年御史中丞裴公來莅茲邦都督二十七州諸軍州事盜遁姦革德惠敷施期年政成而富且庶當天子平淮夷定河朔告於諸侯公既施慶於下乃合僚吏登茲以嬉觀望悠長悼前之遺於是厚貨居氓移於閒壤伐惡木刜奧草前指後畫心舒目行忽然若飄浮上騰以臨雲氣萬山西向重江東隘聯嵐含輝旋視具宜常所未覩倏然互見以為飛舞奔走與遊者偕來乃經工化一作庀材考極相方南為燕亭延宇垂阿步簷更衣周若一舍北有崇軒以臨千里左浮飛閣右列間館比舟為梁與波昇降苞灕山含龍宮昔之所大蓄在亭內日出扶桑雲飛蒼梧海霞島霧來助游物其隙則抗月檻於迴谿出風榭於篁中晝極其美又益以夜列星下布顥氣迴合邃然萬變若與安期羨門接於物外則凡名觀遊於天下者有不屈伏退讓以推高是亭者乎既成以燕歡極而賀咸曰昔之遺勝槩者必於深山窮谷人罕能至而好事者後得以為己功未有直治城挾闤闠車輿步騎朝過夕視訖千百年莫或異顧一旦得之遂出於他邦雖博物辯口莫能舉其上者然則人之心目其果有遼絕特殊而不可至者耶蓋非桂山之靈不足以王褱觀非是洲之曠不足以極視非公之鑒不能以獨得噫造物者之設是久矣而盡之於今余其可以無籍乎冬十月作新亭於馬退山之陽因高邱之阻以面勢無欂櫨節梲之華不斲椽不翦茨不列墻以白雲為藩籬碧山為屏風昭其儉也是山崒然起於莽蒼之中馳奔雲矗亘數十百里尾蟠荒陬首注大溪諸山來朝勢若星拱蒼翠詭狀綺綰繡錯蓋天鍾秀於是不限於遐裔也然以壤接荒服俗參夷徼周王之馬迹不至謝公之屐齒不及巖徑蕭條登探者以為嘆歲在辛卯我仲兄以方牧之命試於是邦夫其德及故信孚信孚故人和人和故政多暇由是嘗徘徊此山以寄勝槩迺塈迺塗作我攸宇於是不崇朝而木工告成每風止雨收烟霞澄鮮輒角巾鹿裘率昆弟友生冠者五六人步山椒而登焉於是手揮絲桐目送還雲西山爽氣在我襟袖以極萬類攬不盈掌夫美不自美因人而彰蘭亭也不遭右軍則清湍修竹蕪沒於空山矣是亭也僻介閩嶺佳境罕到不書所作使盛跡鬱湮是貽林間之媿故志之將為穹谷堪巖淵池於郊邑之中則必輦山石溝澗壑淩絕嶮阻疲極人力乃可以有為也然而求天作地生之狀咸無得焉逸其人因其地全其天昔之所難今於是乎在永州實惟九疑之麓其始度土者環山為城有石焉翳於奧草有泉焉伏於土塗虵虺之所蟠狸鼠之所游茂樹惡木嘉葩毒卉亂雜而爭植號為穢墟韋公之來既逾月理甚無事望其地且異之始命芟其蕪行其塗積之邱如蠲之瀏如既焚既釃奇勢迭出清濁辨質美惡異位視其植則清秀敷舒視其蓄則溶漾紆餘怪石森然周於四隅或列或跪或立或仆竅穴逶邃堆阜突怒乃作棟宇以為觀遊凡其物類無不合形輔勢效伎於堂廡之下外之連山高原林麓之崖間厠隱顯邇延野綠遠混天碧咸會於譙門之外一作內己乃延客入觀繼以宴娛或贊且賀曰見公之作知公之志公之因土而得勝豈不欲因俗以成化公之擇惡而取美豈不欲除殘而佑仁公之蠲濁而流清豈不欲廢貪而立廉公之居高以望遠豈不欲家撫而戶曉夫然則是堂也豈獨草木土石水泉之適歟山原林麓之觀歟將使繼公之理者視其細知其大也宗元請志諸石措諸壁編一作屋漏以為二千石楷法御史中丞清河男崔公來莅永州間日登城北墉臨於荒野藂翳之隙見怪石特出度其下必有殊勝步自西門以求其墟伐竹披奧欹側以入帛丿糸谷跨谿皆大石林立渙若奔雲錯若置碁怒若虎鬬企若鳥厲抉其穴則鼻口相呀搜其根則蹄股交峙環行卒愕疑若搏噬於是刳闢朽壤翦焚榛薉決溝澮導伏流散為疎林洄為清池寥廓泓渟若造物者始判清濁效奇於茲地非人力也乃立游亭以宅厥中直亭之西石若掖分可以眺望其上青壁斗絕沈於淵源莫究其極自下而望則合乎攢巒與山無窮明日州邑耋老雜然而至曰吾儕生是州藝是野眉厖齒鯢未嘗知此豈天墜地出設茲神物以彰我公之德歟既賀而請名公曰是石之數不可知也以其多而命之曰萬石亭耋老又言曰懿夫公之名亭豈專狀物而已哉公嘗六為二千石既盈其數然而有道之士咸恨公之嘉績未洽於人敢頌休聲祝於明神漢之三公秩號萬石我公之德宜受茲錫漢有純臣惟萬石君我公之化始於閨門道合於古祐之自天野夫獻辭公壽萬年宗元嘗以牋奏隸尚書敢專筆削以附零陵故事時元和十年正月五日記
