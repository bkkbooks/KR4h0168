front:
  text: 全唐文欽定全唐文卷六百二十三申錫字慶臣史失其何所人第進士寶歷中累轉禮部員外郎充翰林侍講學士文宗大和二年拜尚書左丞進同中書門下平章事五年罷為右庶子再貶開州司馬七年卒開成元年詔復正議大夫尚書左丞同中書門下平章事贈兵部尚書諡曰貞
  hash: sha256:790ac83aa9e8194d98b35c7896faa6aaaf88a2f9185c08abdc2298b379f93b59
