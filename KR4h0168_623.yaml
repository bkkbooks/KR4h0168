body:
  text: 夫辰象上分於天聖人以躔次而辯乎九土川嶽下鎮於地王者以疆理而準乎四海我唐受命以立人極參天地之數體皇王之道懸爵祿裂郡縣以牧兆庶以敘㣥材是以內有宰衡宗工之職尹正天下緝熙庶績外有方伯連率之任董訓戎律考察風俗伸之而憲章大備本之而神人協和交暢龐鴻耿耀休烈故能光宅萬國德隆三代忠賢間出翼戴扶衞騰英聲於夷夏炳洪模於簡冊建中四祀盜據宮闕德宗皇帝遵避翟之義行巴漢之狩時則有若太師西平王戡大難定大功拯遏橫流匡復社稷精誠貫於日月神用迅於風雷陰德感於生靈元忠書於甲令超卓百氏芬華一門此公之代業也至若貳師成功於西域飛將名播於北平校尉奪胡虜之氣侍中踐戎馬之地太尉父子以大議佐國樂安弟兄以持功居位博士講論於武觀諫議朝拜於蘭臺亠兊州以清約率下白馬以功直著績植節抱義秉武興文何代無人今古相望此公之冑緒也以言乎西平王則長源峻址從而可知也以言乎公則蕃衍茂大推而可知也公名聽字正思西平王第八子也幼有遠略長而喜書辛賢將帥之風推歸慶忌周勃簡重之體多屬條侯常加心義揣磨功名感激探前古成敗之事識先儒勸懼之旨雖任子以著令輕起家而就拜釋褐三遷調補祕書省著作佐郎鴻翼將摶於九霄驥足未展於千里始慷慨而徇志故優游以從軍自是改殿中侍御史領襄陽行府之職有酈定進者故為西平王麾下小將也後以事獲罪械傳靈臺公知其有武力他日之可用也以部曲故吏送之咸陽定進感公之知唯恐不得其死及討劉闢負羽前驅以功入為左神策軍將軍因以激語感動軍尉曰西平王嘗以此軍收京師宜選子弟參用慰撫詧常山恣睢不修職貢詔發禁旅涉河問罪公欲因事自顯決然請行至止之日公陰察潞帥盧從史首鼠兩端輔車合眾公獻策於護軍中尉吐突承璀請遂擒之承璀不之應也以權不在已未敢先動乃察疏其事指言可取雖將不內御而詔已中決頃刻未就危變在慮公曰事集國家無遺鏃之費坐復五州之地不集獨可斬一夫之首以徇三軍之士給出潞壘縳於檻車協力同功以時參定特拜左驍衞將軍兼御史中丞破虜書勳功高出冠於諸將疇庸茂典衞尉入侍於未央朝廷益器全才將委重任試以牧人之術觀其馭眾之能旋授蔚州刺史自蔚州五遷至楚州刺史以忠信治軍旅以慈惠恤鰥孤以易簡為吏師以謹嚴親警衞守三郡將兩軍去如始至言皆可復而富利之及於人功實之濟於國者布在州里播於聲詩公之守飛狐也屬艱難之後開元舊制寖以隳廢鎔冶牟利殽雜為巧雖死罪必報而奸弊不禁公剏開五鑪日鑄炫錢五萬作為儉式無敢誤犯人受其賜於今稱之公之據安陸也以上蔡不庭專部進討公提徒步之卒餌狼虎之口當矢石者十七戰拔營柵者十四所麾申州外壁摲鍾山全邑其所挫敗不可勝紀公之牧山陽也會鄆盜挺禍天兵壓境公引壽春金痍之旅雜淮陰篙楫之師與五諸侯分疆夾擊水陸兼道直趨昫山公獨當一面首下四邑奉詔最後成功最先傳海拒河人心惶駭繫公勇進殆至撲滅自楚州三遷至太原尹河東道節度使自中憲六加至檢校右僕射司徒若貫珠疊玉天與神授不知其所以然也公之節制夏臺也執專征之弓矢驅犯塞之犬羊堡壁作固於金湯烽燧不驚於疆埸三月而報政周歲而策勳去病轉戰於隴西張堪殷富於河北我有餘俗時多與能公之分閫靈武也兵三覆以敗戎虜田萬畝以實倉箱地搜遺利百千計歲省公費二十萬破羌之略合充國之前規積粟之多曷唱沙之有備公之居守太原也一年而枹鼓不鳴刑政以清二年而足食足兵荒閑輯寧三年而事有常經皆可作程五倫之去會稽攀車叩馬陳暠之離益部老泣幼啼各極一時不謝二子寶歷元祀公朝京師敬宗皇帝引對便殿勞問之禮有以加等秉圭入覲韓侯更錫其輅車鳴玉在朝士會亦加於冕服賜諸侯以鈇鉞換大將之旌旗改拜義成軍節度使鄭滑潁等州觀察處置等使兼滑州刺史餘並如故崇廟中受脤之重膺闑外推轂之寄威令先路仁聲載途班白孩提踊悅相賀畏賈父而來晚恐杜母之不至公行將入境坐鮮溫席問黎人之疾苦推征賦之輕重相山川之頹壞審倉廩之虛實閱甲卒之眾寡量衣食之薄厚如風偃草大革言為俗元和中歲師旅薦興鄰境官軍寄食吾地物力殫屈比屋流離簿書有堆委之煩閭井有徵責之弊逋租宿貿繫於空文一旦之間盡削名數以度量權衡緡鏹可計者大凡七十八萬若大旱之沐膏澤窮陰之煦陽和感動人心聲走區夏朱暉之明惠貸劉寵之去煩苛方其事實不啻過也施於有政曾未逾時爰適樂郊就庇德宇視遠猶邇相與如歸外入版籍者二千家新墾荒萊者三千頃信臣之耕農歲闢桓階之人戶月增比其惠懷曷足多也先是瀕河之地殆百萬畝以權力相假以富利相瞻因其饒衍竊占經界公視其沃瘠之上下與其藝植之勞逸稽夫家之數計種食之費度地任力隨而受之農其茂功土化甘壤一軍絕歉食之歎萬井興多稼之謠王景之起廢蕪崔瑗之變蒲藺較其功利無以加也日者水旱無備帑藏不充兵食有菽麥之雜軍裝乏繒纊之制公省溢員之職罷冗貿之徒收散墜之羨財减浮靡之甚費用此惠濟沛然有餘行及其期不愆於數耿秉簡易以經務叚頻仁愛以垂聲參其能否非所貴也戎馬之地氣尚雜習三河之所殷會四方之所枕帶逋逃容隱而為藪萑蒲積習以成風人用輕生吏不知禁公糾察有制寬猛相濟涉道途者若游於堂室設門廬者罕用於關鍵重裝大賈通行晝夕岑熙之犬不驚吠黃霸之路不拾遺考其政術詎可稱也軍有親老加之以衣服卒有死喪賻之以布帛籍有虛缺差第其功勞職有罷免選任其子弟而又勤其部伍習其武藝辯背水登山之形勢明攻城野戰之便利校弓矢之疏密試劍㦸之鋩鈍人百其勇士一其誠懷德惠而恐沒其身負恩澤而不愛其死郄縠之義府斯在韓信之軍法以行宜乎表正㣥方藩屏王略居三公之府作十連之率自朔方以抵於右輔自沛郡以至於滑臺出入數十年帛丿糸亘數千里重侯奕業龍節武符森棨㦸以連戶擁旌軒而接壤皆公之弟兄更拜迭代自兩漢以來未有如公茂族顯赫於天下也握重兵居要地而人心不厭受高壽食厚祿而時情未滿實以西平王勳德方傳於帶礪而公之績用克紹於堂構者也聖皇踐位之明年以大和紀歲號庶政惟新萬物更始雲龍協而君臣同德天地交而邦國泰寧三州耆艾百城庶吏介冑之士緇黃之徒莫不感公之仁飲公之惠填城溢郭越月逾時或裹糧以即路或零涕而乞拜公始諭之以義終則詰之以威而人心逾熾勢不可遏監軍使宋守義列疏其事上方憂勤理道屬任長帥於是降發中之命旌得賢之舉披文以徵乎衞鼎述德以方乎晉鐘宣暢能事允歸行實公抗疏牢讓謙懼不稱然帝心所重終不得請君子謂公之建一碑也獲三善焉邦人愛戴形於文奏一善也懇辭疊至乞寢篆紀二善也茂功顯跡存乎不朽三善也成此異美煥乎國風庶元凱之勳永垂芳於峴首竇憲之績不專耀於燕然詞臣奉詔勒銘貞石其詞曰天地正氣間生人傑雲雷遘屯卓立勳節社稷匡復神祇感悅方夏乂寧祆氛盪滅德不望報功無自伐拯彼生靈遏其潰穴公之代業兮耿乎前烈其一海嶽粹精炳為英靈代濟忠賢國有典刑下績侯服上應將星桓桓武功郁郁文經才實兼姿登翼泰寧出車受脤疊耀帝庭公之似續兮播乎德馨其二剖符三郡鈇鉞四鎮待物以誠示人必信靈邱法鑄安陸接刃淮陰降旗朔方乘釁鳴沙翦寇并州不陣惟道是從惟義是順公之報政兮秉圭入覲其三郊勞有禮宴喜有容披呈肝膽協契雲龍振耀來儀欣戴時邕宏宣利澤懋建功庸錫以輅車賜之歌鐘麾幢迭代帶礪分封公之事業兮載援高蹤其四西自朔方亘於右輔東及淮徐達於鄭圃政循兄弟軍傳子父陟為龍光襲彼龜組並列門㦸俱開幕府輝煥丹青超卓今古公之慶鍾兮享此多祜其五廣武絕澗黎陽要津河山氣象京洛風塵勁卒利兵暢轂文茵殿於是邦牧彼疲人當朝受命指日遄臻華巔熙熙翦髮欣欣公之戾止兮煦然如春其六淄右不虔王師問罪兵車騷動道途繁會徵責征營伏竄顛沛昭布惠訓周知利害虛籍必除逋租盡貸罔不禮畏罔不愛戴公之去弊兮同傷是賴其七商歸市井農復田疇甍棟雲羅轝馬川流昔歎兩岐今也惟杯昔歌五袴今也重裘門罕扄固路無苛畱俾之懽康不復勞愁公之惠化兮實在賢侯其八邈岐壘垣增除戎器精練武旅馳驅介駟屝履餘資倉儲大備其下皆讓與人共利金散廊廡風行土地善則歸人材無所棄公之諮訪兮允協軍志其九輝宣理行旌別循良尊臨千里表率一方彼邦之人出言有章媚於天子觀為國光豈無竹帛豈無旂常願茲篆刻可揭康莊公之德政兮垂休無疆其十執易貞元元年進士官右補闕大唐將軍能扶贊神武斬艾不王者曰太尉扶風王薨二十二年而長子蔚州牧御史大夫武陵王鉞自朔易歸葬於萬年銅人原貞元戊寅歲五月六日克窆焉禮也嗚呼自代宗末洎今上貞元二紀之間所求乎高明昌盛之家伯仲肯構之力而能保勳烈於上繼事業於下包前慶以滋大食舊德而日新者蔚州有焉公諱某字某其先茂陵人在堯舜揖讓之盛則庭堅作士而五刑五流克明伯益作虞而草木鳥獸咸若在殷周質文之際則造父啟封而秦始大宣孟作忠而晉蕃衍此其泉源之奧焉洎炎靈反動伏波為漢室天柱文教中興南郡為孔門木鐸此其祖宗之表焉在皇朝松安嶲鄯四府都督隴右節度加郿鄜三州刺史右武左武二衞大將軍扶風公食邑千戶贈光祿卿府君諱正會公之曾祖也左司禦率府兵曹參軍贈太子少保府君諱晟公之皇祖也四鎮北庭涇原鄭潁等節度使開府儀同三司尚書左僕射知省事兼御史大夫扶風郡王贈司徒太尉府君諱璘公之烈考也於戲在元宗時太尉仗劍萬里建績二庭實獵邊陲振揚公閫七戎六狄莫敢內侮蓋神貺靈慶公生伊西實忠精是感也在肅宗時太尉乃唱大義以踰絕域提一旅以應王師既清西夏乃定有洛功葢郡帥勳在二京公與母弟績戀於大荒來寧上國覩茲盛業實勳烈有嗣也在代宗時太尉乃總大兵居上將載雲旗控朔陲旄頭銷於舁穀蟻聚遁於虎落業揮而載氣讋戎旃火烈其威金聲方革羶腥不敢邇邊者十年公實耳目旌門手足閨壺萬鍾之賦自我以財成七校之雄多予以暢遂實父蠱裕而天寵浹內行積而公議歸也故公自初命四遷至太子左贊善大夫歷光祿少卿左驍衞將軍從祖司徒節制太原奏統中軍兵馬拜左衞將軍武陵王尋加御史丞丁內艱起復右衞將軍兼雲州刺史大同軍使遷代州刺史石嶺鎮北兵馬使代北軍使為本道所請復將中軍兼御史大夫遷蔚州刺史橫野軍使代北都知兵馬使嗚呼公之致身也以言乎天性則挺奇表於勁俗叶嘉慶於神州徇國可以彰忠克家可以明孝以言乎朝容則階貴冑以統環衞著通籍以履周行仍朱戶可稱赫翼宸居是謂嚴重以言乎邦政則本慈惠以撫三郡導滋殖以厚萬人乘塞寢柝智也告終罷市仁也以言乎戎律則盡瘁以被乎戰陣戮力以承其師帥書功在代郊可不曰勇哉啟手足歸全可不曰果哉總眾美而可覆恤平昔其如在藹有茂實念無媿辭夫人南陽郡樊氏故侍御史衢州別駕晁之女之死之歎母天莫移嗣子前汾州平遙尉澹次泳湘漸汭深免喪之哀心目皆瞿長女歸濮陽吳會次服沙門之教次歸汝南周邕洎幼女三人婉稚年以室處公之令弟皓右神武軍將兼御史中丞稟天策以警紫垣統禁旅而環黃屋貞忠一德同力帝家存沒永違茹哀天壤次晞前太常寺奉禮郎次煜前揚州參軍並擢宏文館明經盛矣夫光祿之威憺西陲少保之道高齊俗太尉之神扶聖祚君侯之惠敷朔郊將軍之忠衞宸極君子曰田宗三王彼可全矣石氏萬石我何謝焉嗚呼非夫人明柔慈愛孰撫吾室非愛弟仁厚忠肅孰昌吾族而諸孤能承佐先軌懼隕厥問周爰叔父之仁旨載揚景行之遺烈敢稽代緒以表道周銘曰將星有耀燭天煌煌武庫多材我宗最良在昔光祿登壇保疆乃擁節旄以扼河湟左袵畏慕右地雄張降及司徒其道大彰遭德孔艱致命一匡既復區夏乃軌豺狼彤弓專征元戎啟行實倡九牧以定四方賢哉長嗣居焉廟堂庸勳是承父子皆王再秉龍韜中軍以揚出授魚符北地周康古人有言遏逸前光令子罔愆繼序不忘精騰魄復天望地藏高墳揭然豐碑在旁雨露既濡松柏蒼蒼獨有代功著於縑緗膺博陵人為徐泗濠節度使張建封客鏡之鑒也雲不能蔽風不能搖涵虛待物物莫之撓有同君子執恒德不惑於變故志而賦焉太陰之精流為金英隱耀山谷待人啟明在鏡未辨因扣得聲良工揀擇銷鍊專誠我非工不能成器工非我無以發名於是考斗建候天清波上飛焰日中鑄成磨洗既畢澄瑩秋日玉匣初開寒光飛出仰映晴空天地洞通萬象在中虛涵不窮湛為寒潭搖為飛電任在公以無心有妍媸而自見鬼無遁靈怪無隱形潛應變蝕氣運青冥向陽烏而燧發照金波而水泠或青春曉霽挂於廣庭照耀承霤皓景延晝乍見紅顏之外透忽驚粉壁而中漏待物以虛無大不受煙蘿遙列於階前青翠倒寫於堂後或夜懸高閣或遠臨澄江色合天而為一規分月而成雙元蟾躍影於藻井姮娥飛艷於前窗有時深房倚在暗壁隔簾帷之重掩誘雲山而入隙方高臨以思元見寥天之凝碧若乃窮陰歲暮風沙號怒雲掩七曜而光絕波揚百川而影滅宇宙晦蒙我獨皎潔㣥物蕩搖不撓澄澈時清則動日月而揚輝天昏則與氛霧而迴別人皆持此以飾容予將鑒之以明節至道惟微明者見之佛性本空達者悟之若根非宿植智非天假叩虛求有終無得焉爰有高門之慶鍾為釋門之秀曰靈識和尚俗姓趙氏本天水人唐御史大夫范陽節度使章之孫侍御史陶之子不敢遠述世德尊梵教也和尚生而聰明嬰孩有異鶴不舉翼居然沖天之姿蓮未出池已為不染之質弱歲不樂浮華稽請父母入道年十五削髮二十受具一悟真乘永離纏縛地超殊境愛斷俗緣心游寂寞縱自在於方外身等池水遺哀樂於世間遂衲衣蔬食趺坐一床身不偃臥以至終壽水澄則照萬象皆澄心湛不動眾自來歸法既流行身乃歸化以貞元十六年五月二十三日夜右脅著地疊足涅槃於揚州江陽縣向善寺春秋六十夏臘三十弟子自悟等心受遺教耳絕惠音雙樹既枯百身何逮今與弟子志悟等建塔於江陽縣弦歌里以膺久閱行實故命為銘曰雲生虛空行無所止偶過為雨施澤則已㣥生既蘇昏醉醒起乃順大化反真太始默誨黎甿哀傾都市人妄悲傷我無生死示身於世如漚浮水起滅相尋夭壽一矣塔閑九原法流千祀後人聞風仰德於此宣貞元時人考龔黃之跡窮卓魯之化不孤良吏可謂能賢甲惠訓聿修仁政斯舉丕變舊染化居恒風歎歌邵之徒勤想借寇之無及冀全遺愛遂建生祠歿無媿於張蒼存不謝於王渙因心所感縱獲福而何傷唯道是從豈為術之能致告之誠謬訴乃有孚渠牟京兆萬年人初為道士復為僧興元中韓滉鎮浙西奏授校書郎進四門博士貞元十二年擢右補闕內供奉歲中至諫議大夫再擢太常卿貞元十七年卒年五十三贈刑部尚書諡曰忠故人清河房茂長刺商山成簡靜之化曰隱居之類也畫茲圖以貽予緬乎沈吟想似之不足故為文以懿之詞曰煥煥煌煌為圭為璋孰光乎不耀之光幽幽深深為山為林孰繫乎不繫之心足知乎虛室生白元門不關流水去住清風往還豈比夫稷契在世巢由在山一物有累兩心不閑者哉閑之謂何簪裾薜蘿本不干我豈云其他熙熙忻忻與時為春匡漢避秦惟茲四人於德之鄰不孤其身於澗之濱不迷其津繪事後素孰知其故想像儀形念茲丹青煜煜紫芝深谷逶迤俛仰今古空林住時鳳豈無德鸞皆有㣥出處語默商山白雲臯字仲聞太傅滉子擢賢良科貞元中累拜尚書右丞元和時授忠武軍節度使入為吏部尚書兼太子少傅長慶元年拜尚書右僕射為東都畱守卒年七十九贈太子太保諡曰貞妙哉嵇生之為是曲也其當晉魏之際乎其音商主秋聲秋也者天將搖落肅殺其歲之晏乎又晉成金運商金聲也所以知魏云季而晉將代也慢其商絃而與宮同音是臣奪君之義也此所以知司馬氏將篡也司馬懿受魏明帝顧託後嗣反有篡奪之心自誅曹爽逆節彌露王陵都督揚州謀立荊王彪毋邱儉文欽諸葛誕前後相繼為揚州都督咸有匡復魏室之謀皆為懿父子所殺叔夜以揚州故廣陵之地彼四人者皆魏室文武大臣咸敗散於廣陵故名其曲為廣陵散言魏氏散自廣陵始也止息者晉雖暴興終止息於此也其哀憤躁蹙憯痛迫脅之旨盡在於是矣永嘉之亂其應乎叔夜撰此將貽後代之知音者且避晉魏之禍所以託之神鬼也
