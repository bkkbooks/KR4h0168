front:
  text: 全唐文欽定全唐文卷三百三十四翰潤州人開元十八年進士又擢宏詞科官禮部員外郎
  hash: sha256:067c656492552d64089b58d8b693197ee3ddd204c98869042bb064bf2b7e7cdf
  markers:
  - {type: head, offset: 14, content: 陶翰, id: KR4h0168_NFKB_334-h1, level: 1}
body:
  text: 惟冰也有堅凝之貞惟壺也有虛受之明謝周流之弱質託鎔鑄以成名直方任器規圓愜情對光輝而比色因擊扣而馳聲冰假壺以為用壺含冰而轉清及夫歡呈朝晏之餘瑞表經綸之初尢荀吳之失對陷王霸之後車既遇賞以為樂乃獲成於所如但觀夫推移在道澄徹如王時見瑩而則明或將摧而不曲故曰冰貴於水器尊者壺國因時而必用軍每擊而何虞若乃周將酬客魯欲藏冰揖籍父其何忌顧申豐而可憑是以用之者廣須之者多遇嶭鼓而擊誦豳詩而何至時冰銷滴潤壼罄成酣乃挾纊以荷德豈知漏而興慚昔者趙衰從徑魏主其逐雖有餒而仍攜顧無麋而未宿每覽餘軌當思踐迹志未吐於生平容已衰於疇昔倘開冰之可薦庶投壺而無斁況霜空旦寒晚景仍墜雖杼軸而不輟猶髣佛而無記將投皎潔之姿願假含容之意邈哉瑞獸生乎青邱資挾溫以流潤得頤素而成裘故縝豪錯毳匪剛斯柔象㣥哲以濟美軼千年而取優配華玩於車服曜珍奇於貴遊殷祀典以崇賁飾禮容而克修暨夫秋沈金氣冬舉元律進卿相之門登王侯之室寒袪溫薦恩纏好密任藏用以卷舒委涼暄以升黜將綌衣以遞御與紈扇而更出苟人事之宜然諒廢興之若一嘉其全真定色育精含徽千金振價衆服騰輝朝臨皓雪且狀乎寒披鶴氅曉安朱架又象乎高懸玉衣雖質文之可別蓋貴賤而同歸故崇侈者取貴而尚戒奢者含貞以非矧乎從損而益工兼素腋德之攸親豈惟物新晏嬰相齊以推弊孟嘗獻秦而獲珍貞休利乎蕃玦悔吝生乎妄人儻茲道之無替遮遺芳於後塵有國之制不易於常典王者之政未忘於繼絶人則不幸同叔向之有言天道如何比鄧攸之無子甲義當為後情切自孤名不絶於本枝愛未遷於他室克聞鳲鳩之德寧爽螟蛉之義知子之道必全見父之行無改將議繼體那慙象賢主禮方列於宗門入仕曷由於庇蔭苟從法之差等亦在禮之何傷所由無端雖不憂懼訴者有據應異無文百度之間見於甲令九流之內言念胥徒在邦必達於大體為政不遺於小物歲之云宴更議初勳勞之可書仍祈後績慕縉雲之職名級願遷瞻巽風之命節文當協所由以司存必舉稽彼三章訴者以理實無言徵諸五品既詳於法難屈爾詞冬天子至自河華中使至司功崔公朝於京師禮也今天下有道聲教必被要荒來格況其邇者乎政莫大於殷會使莫大於述職故學於禮足以專對崔公近之矣及夫三物成者斯義歟征驂如飛郊暮來祖渭上西眺寒原無色賦皇華而送崔氏行焉國家既誅卭筰之遊魂收滇池之陳地以蠻陬君長未即序徼外新國約非甚堅將欲宣王風布中典必候才英矣監察御史王公志標徑節天假異能秉心而忠義必聞多方而文武不墜我中丞鮮于公以功名立破城江南關啓而虜不敢窺城峻而敵不敢守者皆倚匡時之策仗橫行之氣不然者豈有夕捨一尉旦麾三軍盱衡於不毛之間決勝於大荒之表取廷評者浹月登憲府者周星繡衣照於江原風霜掃於劒壁斯不足畏矣中朝名雅向義趨風餞筵傾誠翰墨紛矚百壺追送來登董原之野萬嶺蒼然更繞華陽之國豫以授簡敢無斯文夫子以忠義為名以才能為用頃年投筆多制勝之謨間歲策勳有斯皇之命以西師之未解右地之多虞何寧此材豈獲居息我主將所以封弱水擒月氐略康居取勃律雖出車之任事屬於才能而入幕之賢功歸於帷幄嗟乎非萬里無以見遠圖非三軍無以知壯節古人於是歷孔道窮河源豈勤勞而樂行役甘絶域而厭諸夏必以為擔石者能喪志安懷者也而拜命封侯功成事立不同日言矣勉哉封子守其嘉謀輶軒將馳繡服將假雖天下險阻玉關之風故不足為子慮耳帝鄉山川徙倚將遠別路雲樹蒼茫欲秋可以贈離杯可以贈離唱乃命座客唯然賦詩子始以詞進而果以政聞拔起翰林激昂儒服朝升一尉暮入五府漢東之駕才返河南之檄適至皇皇之命未嘗寧居將欲拒其辟書韜其利用若清規雄烈已異於天下矣周鄭之風好僻齊魯之政或訛使戎臣所以政疑於勵精鋭於振舉以東夏候子得無戒之哉於是中朝名士左補闕任侯序其詠歌太常主簿楊公鳩其晏餞筆墨以之聚至文章以之感合不有君子胡寧是焉中條氣凝河冰將壯關中送客美使者之賢泗上諸侯盛主人之禮慎爾行役勉哉軺軒別筵再興詞賦間作故我有後甲之作凡百英華作故我有後甲之術斷句凡百作凡不屬下句在任氏之唱者實隸於斯矣壯哉大河之功也南分淮泗東委溟渤呀呷長川呼吸萬里若舟楫是戒風濤無虞則三萬之廩可得而西矣故朝廷大役實難其人李公精義宏高德量魁達聲聞關右義徹浙川我侍御史嶭公資之以成務也於是驛騎首路列筵在庭山川且長語笑云隔勵其節宣其規使白波徐清紅粟流衍則國家之事濟矣勉旃故交不敏詩以投贈之人生相知心乎僕之心嘗語君矣相天疑以志相忠以言以居則無悶以動則無悔孰謂子非天下之知已乎同官為僚同志為友豈不欲晤語終日盡平生之歡然而天時者盈虛也人事者倏忽也一合一否與時而來不有聚何以同二人心不有散何以見四方志長揖而去勉哉東軒楊花初飛郊草先碧自秦及洛雲山千里子襟之首章善矣吾從也頃林胡大寇邊殺右將軍於是幽薊之北門不啓天子方憂朔漠之事問盧龍之策公安得收其宏略匣長劒塊然為一尉哉夫感於事則忠義全登於危則臣節見必也海水晏燕山空代雲胡沙談笑而靜蓋王師之義全言未畢征馬將散三嘯於離郊之上敬而辭焉夫公銜紼海裔東歸玉門戎夏已康金甲已息伊大夫皆受賜矣矧司戶公詩禮是勗庭闈是故疑假輶軒登隴雲而四望矣吾朋乃驅征騎攜旨酒歌白雲以贈之關河始風秋草尚碧衆皆詩人也安闕乎文哉士之相知故不在舊僕一覩君詞志慷慨情幹絶人是欲片心樹善君子風義相感笑言卒獲時不與而清秋至樂未央而別恨生則臨歧撫然把袂如失蘭可佩也掇而贈君酒可忘憂酌以酬我且士為疑當世虛己之運主司推心之時而不能翰飛沖天淩勵徑翮非人英也子之往矣吾無間然乃徵詩寮以壯行色襄陽孟浩然精朗奇素幼高為文天寶年始遊西秦京師詞人皆歎其曠絶也觀其匠思幽妙振言孤傑信詩伯矣不然者何以有聲於江楚間嗟乎夫子有如是才如是志且流落未遇風塵所已疑然謂天下無否泰無時命豈不謬哉翰讀古人文見長楊羽獵子虛賦壯哉至廣漢城西三千里清江夤緣兩山如劒中有微徑西入岷峨闕一字有奇幽皆感子之興矣勉旃故交不才以文投贈自延陵季子來詣上國齊魯晉鄭賢豪風靡及夫顧陸入洛亦稱南金今錢塘惠上人捉一盂振一錫則呼吸詞府頡頏朝顏長江之南世有詞人舊矣於是侍御史王公維太子舍人裴公總寄彼好事於焉首唱賢才翕集文墨敷芬作者為之不寧詞林為之一振此公家本富春棲於天竺白雲青岫方丈之居江風海濤一杯而泛窮其奧旨即空王之法門賾其精心有真如之理性不然我㣥公風流虛佇歌詠間作者豈無哉正月祴裳東旅征帆南岸眺吳山而可見值湖水之將碧震澤千里孤舟渺然比思我曹時開離贈卷也才格可得而仰也文章可知而畏也故往年有公連之捷矣九流之學日盛三鼓之音未歇今茲有天官之厄矣天將啓子於世故命以才授子於亨故先以屈屈伸理也才位時也子姑感激毫翰增修詞律沖天之舉吾倚而待焉歡洽豈常離言實早河嶽西別悠哉鎬京庭闈東瞻誰謂家遠草色將變雲天浩然詩而詠言將以述志噫天生秀明雋而才之有九流胡蒙而屯之故君子守之以知息之命而固有須也不然者盧氏子魁岸特達而若是尚脈脈於公車之下而三歲不覿哉灞城春潤風喧景遲鶯聲始調柳色堪醉當此而裹足千里背闕一字而東豈意者歟衆皆賦詩以慰行旅吾常遊江表得二謝焉青青子襟始在童丱時已辨其梢雲噴浪之兆江河蕭散垂二十秋忽然上京再瑩心目詩騷之興天假流略之奧日新才藝克備文鋒甚鋭吾以此自負不為非知人矣金門未偶征蓋言旋雲峯閉於武閣春野開於楚鄧蓋將窮討策府琢磨詞律他日之奮六翮登九霄未為後耳春水尚寒郊草無色何以贈別必在乎斯文田子行於古而志於文雅多清調將有新律鋒鏑甚鋭將來者其憚之勿以三年未鳴六翮小挫則遂有清溪白雲之意夫才也者命在其中矣屈也者伸在其中矣將子少安吾以是觀德灞亭柳緑昆池草青於何送歸無易詠歌余聞宥天下不聞理天下故夏臺門疑而生白秋官淡而守中不然我㣥公法家之流惟刑是恤亦何暇閣挂巾車鏘鏘乎在此堂矣司直鴈門田侯行修器博心遠地偏於是啓郊園之扉主簿天水薑侯詞才俊秀雅志堅直於是傳翰林之檄嗟乎城池不越井邑不移林篁忽深山鬱斗起出回塘而入蒼翠更指深亭因曲岸而捫穹嵌忽升絶頂雲天極思河山滿目菡萏春色蒼茫遠空煙間之宮闕九重砌下之亭臯千里臨眺之壯也樽酒既醉舞袖登筵歡洽在斯獻酬無算措九州於樂府移三典於頌章皆我順堯之心除秦之政所以偶春服之晏也咸請賦詩綰元宗朝為記室參軍聖人作孚萬物惟乂百僚分事命南正而司天五緯連衡遵北辰而列象莫不上稽天道下授人時率由舊章克備常典辨躔次之無忒識運行之有度南躔日至爰有望於靈臺東陸春歸方可觀於太室必若官非代掌業異家藏復王朔漢有王朔望氣英華作霸非之精才有唐都之祕術不在其位理宜勗於間邪有犯於時辭豈逃於語怪惟彼甲也能微訟乎僮則無良異疇人之子弟乙惟嫉惡復呂氏之刑書庭際遐瞻寧用圭而測景樓中仰視徒以管而窺天攻乎異端既殊冰操在乎正本請置霜科欽若典章丕承政道九州封域始昭於禹訓五等爵土終叶於殷謨馴致者何率由斯在聖朝恢國本建方位才優者疏以爵位功永者頒以邑田是則秩子男而靡出帝畿介藩屏而用崇王室惟德是宅非賢孰居甲以克搆承宗疇庸錫社雖荷封茅之寵猶居食采之列成功覽分一簣尚缺於為山賜則加榮九等未膺於就國因而勇退殊匪躁求陳力就列先賢攸重惟刑與禮循理何傷知古元宗朝帛丿糸州昌明縣令臣伏見近日纍降詔書委當道監軍使於諸觀內求精選丹兼通藥性者一二人送赴上都至闕下試驗不精亦不加罪至哉精求宏告天地若誠如此山川豈祕其靈文神明安隱其元象臣自幼年與道合虛情性守一頗歷歲月至於留心藥物向此二紀意謂無出周易參同契但能尋究此書即自見其道臣數年屬意於此精覺開悟尚猶未免朦朧至於金石紀綱亦略見其端緒臣忽因間暇吟詠之餘著日月元樞論一卷本欲藏諸名山傳之同好今幸遇有道聖明之君志慕元風若沈默不言實恐天下無好之志今陛下若需還丹切恐難遂其志臣所著書謹憑當道監軍使隨表進上伏望聖慈討天下精通藥理之士考究若以斯論可採臣當無隱於陛下若以為不可臣自味於風塵之外亦不愧於不取臣不揆庸瑣輒獻芻蕘伏增戰越之至夫馳騖於名利之場者惟尊爵祿以為意逍遙於無為之域者獨貴神仙之可尊名位非德行可致道術非博學而得故仲尼不享其高爵劉向不達其祕言即知命有所定分有所歸固不計其才能之與清濁矣古今修仙學道藜莠蓬蒿不啻多也得之者麟鳳鵬鸞不亦稀乎且道之至祕者莫過還丹還丹之近驗者必先龍虎龍虎所自出者莫若參同契世之習此書近乎髣佛其徒實繁達乎元義者未之有也昔抱朴子神仙傳云魏真人參同契五相類凡二篇其説似解釋周易其實假借爻象以論作丹之意也又有元光先生不知何代人也覩日月混元經其序云徐從事擬龍虎之文撰參同契上卷傳魏君魏君又述中卷傳淳于叔通淳于叔通又製下卷表三才也此則葛稚川錦平城四字訣全乖人無識者復有蕭先生亦不知何代人也又注龍虎敘云參同契者擬龍虎上經本出真人徐從事因越上虞人魏伯陽造五相類以解前篇遂改為參同契其後淳于叔通補述其類取象三才乃為三卷又叔通親事徐君夜寤不寐仰觀元象以配卦爻而著其書研詳三説理有異同元光之談失之窮遠若以魏伯陽造五相類以解前篇遂改為參同契此非其審也凡五相類豈不云參同契者敷陳梗概不能專一泛濫而説今更撰録補塞遺脫故復作五類則大易情性盡矣若不然者則未備也三卷之前未有此書此亦是以辨中卷是魏伯陽所撰不然者故不合云今更撰録補塞遺脫其義益明矣夫參同契者參考三才之理敘其符契而已非為因三卷而得參同也所以五相類者蓋論還丹之道與五行之理相類也所以本經云參考三才又云推演五行即此所見設題之本旨也而不達者強生疑言殊不究此經篇章雖異旨趣皆同莫不以乾坤為鼎天地之道成焉坎離為藥南北之位分焉龍虎為名東西之界列焉若論火候定生成莫不循卦節應鍾律消息合刑賞故黃鍾氣至即陽生於復漸歷臨泰至已而陽爻數終蕤賓氣至即陰生於姤漸歷遁否至亥而陰爻數窮如循還未始有極期六合三才四時五行之理備矣夫鼎者所以鼎其鼎也藥者所以藥其藥也鼎藥一也豈容非類哉而有惑者妄生穿鑿謂肝青為父是曾青也肺白為母是鉛銀也腎黑為子是磁石也脾黃為祖是雌雄也殊不究經云挺除武都八石廾捐豈更用元精雄黃之類也哉謂還丹自赤而成紫色者曾青之氣染入而已又大非也且草木乘春而生生即青及其花含文彩實熟黃赤其中豈有假曾雄乎謂還丹因染而成紫色不知黃金黑錫赤銅藍玉是何物染乎蓋陰陽之氣自然變化也況還丹順天地生成之道合金水自然之質豈得無變化者哉只為五金八石硝礬硇石㣥方衆藥之中或有用之於龍虎大丹亦無用處豈非經旨隱而難辨耶抑亦心竅窒塞而莫可曉也且世上聞虎者多識虎者少夫流珠為龍龍即日也黃芽為虎虎即月也此二物者日月精氣咸有變化之理故餌之者亦能變化所謂變化者變丹砂為水銀自陽返陰也水銀復為丹砂自陰返陽也故流珠丹亦名火青丹變黑鉛為黃丹自陰返陽也化黃丹為黑鉛自陽返陰也二物謂之陰倏然而為陽矣謂之陽忽然而成陰矣互為夫婦更為父母此蓋陰陽感激而成雖聖賢莫測所以魏夫子敘云雲芽之靈龍吟方泉景雲絡霄虎嘯虛無衝風四振陽燧昭明朱光鬱起方諸見陰元液清溢皆為自然也此大還丹妙用其實一也上古有水銀一味而獨不成丹者蓋有龍而無虎不如是又何假四象五行亦何求於陰陽男女哉是以必有不因於物亦不因於人而往往任其大道自化者矣上經豈不云賢者能特行不肖與母俱夫與母俱乃知豈非自然之正也如紀綱八石本乎二物龍虎一體而開三條審乎二物易乎一源可知至元也所以千舉萬敗者其由不達三五與一之理此非大道曲隱由思慮之未至老子所謂能知一萬事畢亦為此義也世人徒知還丹可以度世即不知度世之理從何生焉蓋餌日月精華故也日月者天生元女地長黃男是也虎者金也龍者汞也金汞相抱得自然性服食之者豈不神哉所以黃庭經云日月精華救老殘豈非二景之事乎答曰媾二景之暉者其徒實繁服五晨之霞者數亦不少然當此道住世長生者鮮矣至於餌一藥服一丹獲延駐長生者目所見多矣由是論長生之術必在保養服食內外兼資方始有望若獨任一端徒亦不免虛勞耳學者云鉛非鉛也此恐昧甚者歟且上經云真人至妙若有若無髣佛大淵乍沈乍浮中經云真人潛深淵浮遊守規中此蓋銷鉛為水暖汞投之初入則寂爾無聲火烈花浮迥然獨異此豈不以物處於太泉深淵者乎若謂斯鉛非鉛者又不可知也或人為鼎正當有土者是妄也真鉛者火鉛是也夫水位北方卦主坎坎主六戊戊即土也火位南方卦主離離主六已已亦土也真人之意惟以戊已之氣而為土非以土地而為土也此坎戊月精離已日光之義也經豈不云乎人所稟軀元精雲布因氣託初陰陽為度夫作丹者亦以法象人也稟父母四氣以立為形魂魄隨起乃有精神矣然即父母之體豈中有土乎是知一陰一陽而為水火火以水為夫水以火為妻其道自成於戊已夫萬物莫不終始於土功用莫逃於水火陰陽若謂土者五行之數列在鼎中則龍為木精鼎中何能無杞梓之屬其道甚明知之者鮮矣夫金能生水水亦能生金水生金者則鉛中出黃芽是其性也五金訣云鉛能制汞汞能伏金金汞成形故名製伏此一理也夫木能生火火亦能生木者則丹砂中出汞亦是其性所謂木者木受太陽之愛化為流珠太陽者日也日出於東東者木位太陰者月也月出於西西者金位故還丹以元象為準日月之符在乎晦朔會合刑德之氣順乎卯酉出入乾坤徘徊子午以天地為雌雄以陰陽為父母故左名為龍右名為虎經曰汞日為流珠青龍與之俱理在於此有淺見之士或以水銀和山澤銀合於器中燒呼為樹子始即二物相抱後乃銀汞異處或經一年至二年鉛母既成赤粉其中伏火功深則十存四五效淺者十有二三服之者不聞益人亦往往反損蓋緣五行之氣不足法象之理有乖或有曰鉛從銀生定以鉛精合汞名曰龍虎殊不知黃芽雖出於鉛實非鉛也以非鉛為藥而為正矣故云黃芽不是鉛不離鉛中作是也故為龍虎者必先以黃芽為正也經云終始自相因此謂制汞以類合類故名於終始相因之義也夫父之制子子之制孫者人倫之正也火性銷金金伐木榮者還丹之感也又有術士或以龍虎歌云陰在上陽下奔首尾武中間文但常在爐上置水一甌出五符經語此要言也夫還丹起於陽生終於陰極者陽伏於下陰在於上假令雖有生者必待陰衰之後水旺之時也向者自復觀卦彌歷十月鉛黃既謝丹道將成子生母胞不相涉入陽消陰息金勝水衰魂魄相安剛柔合體然後設陰爐於上張炎火於下經所謂舉水以激火奄然滅光明又云水盛坎侵陽火衰離晝昏陰陽相飲食交感道自然斯乃順時合宜與氣相得之理也真人意者以金丹久為火化形氣乾虛欲使受其陰津以潤肌骨蓋妙盡於此矣嘗見天下好道者財竭不知貧力盡不知困深可哀也莫不以鉛黃花與水銀相和燒之謂之紫粉或以朱砂雄黃水銀硫黃曾青空青及諸礬雲母等同合和蒸煉煮煆而服之或以諸礬新碌諸灰結水銀名為紅銀化為粉屑以服之凡此衆類制作多門若修煉如法形氣不散尚可愈人之疾亦別無所益若散失精華空有滓惡但能稍熱更無所堪或用藥汁以煮硫黃澄濾以研成玉粉或用硫黃以染銅葉研煉而成赤丹煮之此於諸術之中最為凡淺至於砒霜以化銅鐵縮錫此蓋為飢寒之徒非道者所處也然得妙者亦百無一矣世有不知道者謂五金是金銀銅鐵錫也八石是雄硫砒礬膽曾青磁也殊不知子午以成三戊巳自為五是以八石之名得陰陽之數此還丹之道備矣所以前輩道流云不用二青及四黃河車自有五神光經云九還七返八歸六居此義隱非久通元者莫得論焉世人多將黑鉛化為黃粉即牛糞汁或麥丏糟之類和其鉛粉同溲團燒之鉛汁流下如此九度謂之九煉鉛精天下學者皆以此為九還七返是鉛精丹砂又不知八歸六居復是何物夫金生數四成數九木生數三成數八火生數二成數七此三者皆本生之氣相合故名返還六居者水生數一成數六金本生水水不得與金合居然自謂之六居天地左轉日月右行俯而視之則金能生水木能生火仰而觀之水返生金火返生木子當右轉午乃東旋卯酉界隔主定二名此之謂也故知天道不隱人自迷之今謂此書為日月元樞者亦取此也蓋世上學者茫茫漠漠竟馳於金石即無消息之見復無明師可道則利在於黃白之術得不妄動動則終敗也夫修還丹者有十難焉一精神不惑二財力不足三藥物不正四分兩不同五修煉非法六陳布乖度七火候愆期八徒侶不端九誠心懈怠十成而不祕有此十者一有所虧所失者大而況不成有全虧者乎所以學而得者萬無一矣至於經年歷歲守爐看火屏息營運休廢生業前期未卜內懷疑誤久勤則力屈甚貴則生怨中道而上者謂之難類也豈容易哉自非捐俗求仙越世高迹稟性精一盡於名利者安可造次議久視之要臣不揆庸愚好道學仙久覽參同契不因其師苦患乏財力不能早修也又恐荏苒過時使後學者久困迷途枉費資産雖不盡露真詮而亦頗聞元要夫以和璞為石荊國之衆也謂碔砆為玉者天下皆是也又不知所謂碔砆焉和璞焉悠悠然莫知所問惟候感通以望神仙之教也建開元中進士大歷中為盱眙尉祀事孔殷以供百神禮容不肅奚崇三獻興言國典厥在司存頒之猶恐不供不頒將何集事俾左社右廟奚捧幣薦牲方澤圜丘曷焚柴埋玉欲加之罪安得有詞必也禮或重輕法存降殺將定所刑之典須明所祭之神議以從徒宜其後命喪定等列在乎中制爵為公侯招以上服禮則有數甲其謂何必若錫重五侯寵加八命寢於中霤固當復彼東榮適在他邦是何升其左轂冕服則順鐵冠奚為如或有愆於儀不象厥德僭而有作同彼季孫孝則莫彰異夫曾子所謂殺禮宜其聚慝徵大夫之轍理既有違論司敗之刑法將何逭
